[translation]
2005302-1 = "A garota ninja busca tratamento!"
2005302-2 = "Hyakkiyako - Uma certa sala de aula no 38º prédio escolar antigo"
2005302-3 = "（Preocupado, fui até onde Michiru estava）"
2005302-6 = "Se, Sensei...!?"
2005302-7 = "Você realmente veio!?"
2005302-8 = "[s] \"Michiru, você está bem!?\""
2005302-9 = "Ah, n-não é isso..."
2005302-10 = "Eu disse que era um ferimento, mas..."
2005302-11 = "……Bem, não sou eu."
2005302-12 = "[s] \"……?\""
2005302-13 = "É que... minhas roupas é que ficaram 'feridas', por assim dizer."
2005302-14 = "……Para ser mais exata, meu vestido."
2005302-15 = "Está bem rasgado, desse jeito..."
2005302-16 = "[s] \"Nossa... o que aconteceu?\""
2005302-17 = "Bem..."
2005302-18 = "Eu estava praticando a Arte Ninja da 'Escalada de Carvalho' e caí da árvore..."
2005302-19 = "[s1] \"Ou seja...\"\n[s2] \"Você estragou sua roupa enquanto subia em uma árvore.\""
2005302-22 = "Que resumo foi esse!?"
2005302-23 = "Parece que eu estava brincando demais e acabei rasgando a roupa!"
2005302-24 = "……Bom, não deixa de ser verdade, mas..."
2005302-25 = "……Ah, eu não estava brincando, viu!? #nEra treinamento, acima de tudo!"
2005302-26 = "Hmph..."
2005302-27 = "……Sensei, talvez você ainda tenha um entendimento um pouco superficial sobre os ninjas!"
2005302-28 = "Sendo assim!"
2005302-29 = "Enquanto vamos até a costureira, vou te dar uma aula sobre ninjas!"
2005302-31 = "（Assim, acabei indo com Michiru até a costureira）"
2005302-33 = "Rua Comercial de Hyakkiyako"
2005302-35 = "……Ou seja, ninjas também usam roupas que não sejam pretas!"
2005302-36 = "Aquelas vestes pretas que cobrem até o rosto são usadas apenas à noite."
2005302-37 = "Durante o dia, elas chamam muita atenção, então costumamos usar roupas normais."
2005302-38 = "O básico do ninja é 'não se destacar'..."
2005302-39 = "Você deve usar roupas adequadas para cada situação!"
2005302-40 = "Por exemplo, se a missão for em uma festa, você usa um vestido como este..."
2005302-41 = "Claro, se for à noite, pode ser preto também."
2005302-42 = "Dizem que um certo ninja, para se camuflar, não usava roupas e pintava o corpo com tinta nanquim..."
2005302-43 = "E ultimamente, existem até roupas ninja com camuflagem óptica――"
2005302-53 = "[ns] \"Ei, não é aqui?\""
2005302-54 = "……Opa!"
2005302-55 = "Bem-vindos~"
2005302-56 = "Bem, eu gostaria de pedir para consertar meu vestido rasgado..."
2005302-57 = "Sim, entendi. #nPode deixar comigo?"
2005302-58 = "Sim..."
2005302-62 = "……Ah."
2005302-64 = "Eu estou vestindo ele agora mesmo, não estou!?"
2005302-66 = "Bem, você trouxe outra roupa para trocar?"
2005302-67 = "……Não trouxe."
2005302-68 = "Diga-me, existe algum jeito de consertar enquanto eu ainda estou vestindo..."
2005302-69 = "Como é uma máquina de costura, é simplesmente perigoso..."
2005302-70 = "É, faz sentido..."
2005302-71 = "Ah, droga, e olha que viemos até aqui..."
2005302-72 = "Ugh, bem, não é como se não houvesse um jeito..."
2005302-73 = "Se eu trocar para a roupa de ninja...!"
2005302-74 = "[s] \"Você não disse que não tinha uma roupa para trocar?\" "
2005302-75 = "Está tudo bem, tudo bem!"
2005302-76 = "É só passar tinta no corpo, igual a um certo ninja das lendas!"
2005302-77 = "[s] \"...Isso é seguro?\" "
2005302-78 = "Hehe, sendo uma ninja, isso é o de menos..."
2005302-79 = "..."
2005302-83 = "N-não pode, isso não! "
2005302-84 = "Absolutamente não! "
2005302-85 = "Se..."
2005302-86 = "Seu pervertido, Sensei!!"
2005302-87 = "[s3] \"Ei, eu!?\" \n[s4] \"Isso é uma calúnia...!\""
2005302-91 = "（Depois disso, Michiru trocou para um traje esportivo que comprou ali perto e deixou o vestido guardado）"
2005302-92 = "（...Eu paguei a conta）"
