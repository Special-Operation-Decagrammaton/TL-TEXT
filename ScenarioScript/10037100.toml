[translation]
10037100-1 = "第10話;天を抱き、麓へ辿りし"
10037100-4 = "――何をめそめそしている！"
10037100-8 = "なんだ！？"
10037100-15 = "そんなの、どうだっていいだろう！"
10037100-16 = "すべての生徒には、意見を表する権利がある！"
10037100-17 = "そしてすべての生徒会長には、その意見を聞き入れ、学園を導く権利がある！"
10037100-19 = "い、一体何を！？"
10037100-20 = "つまり――お前らのやっていることは、朝の挨拶にもならないということだ！"
10037100-21 = "伝統を守らない？変化を起こした？"
10037100-22 = "お前たちがやっている行為だって、「変化」じゃないのか！？"
10037100-23 = "わ[ruby=わたし]、私た[/ruby]ちは、ただ門主様に諫言を述べているだけで……！"
10037100-31 = "しかし、その手段として選んだのが「極端な方法」と「変化」である、と。#nそうは思いませんか？"
10037100-36 = "い、言われてみれば、たしかに……！？"
10037100-41 = "玄龍門の門主は山海経を守護すべき……ええ、たしかに仰る通りです。"
10037100-42 = "であれば、京劇部の部長は京劇部を守るべきではありませんか？"
10037100-43 = "今のカグヤ様がやっていることは――本当に京劇部のためになるのでしょうか？"
10037100-44 = "私からすれば、少し疑問ですけれど。"
10037100-46 = "え、あ、その……。"
10037100-48 = "玄龍門の皆さんも同じです。#n山海経を守るのは大切です。"
10037100-49 = "ですが、皆さんは山海経の一部である「玄龍門」という組織の構成員です。"
10037100-50 = "であれば、まず組織のトップを守るのが、皆さんの真の義務ではありませんか？"
10037100-52 = "それは……そうだな……。"
10037100-53 = "一理あるけど……彼女はどうして山海経と玄龍門の事情に詳しいんだ……？"
10037100-55 = "それは、さきほど書記長も仰っていた通り――"
10037100-56 = "レッドウィンターではこの程度の騒動など、挨拶にもならないくらい――いつもの事、ですから。"
10037100-57 = "我らレッドウィンターの厳冬の前では、みなが公平である……"
10037100-58 = "そして、それは我らの心を熊のように強靭なものとするのだ！"
10037100-62 = "チェリノ会長！私が道を開きます！"
10037100-63 = "うむ！頼もしいな、マリナ委員長！#n我がレッドウィンターの流儀を見せてやるのだ！"
10037100-68 = "はい！さぁ、突撃だ！#nウラー！"
