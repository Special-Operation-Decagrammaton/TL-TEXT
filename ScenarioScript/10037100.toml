[translation]
10037100-1 = "Episódio 10: Abraçando o céu, chegando ao sopé"
10037100-4 = "――Por que está aí choramingando!"
10037100-8 = "O que foi!?"
10037100-15 = "Isso não importa nem um pouco!"
10037100-16 = "Todos os alunos têm o direito de expressar suas opiniões!"
10037100-17 = "E toda presidente do conselho estudantil tem o direito de ouvir essas opiniões e guiar a academia!"
10037100-19 = "O-o que você está fazendo!?"
10037100-20 = "Em outras palavras――o que vocês estão fazendo não serve nem para um cumprimento de bom dia!"
10037100-21 = "Não proteger a tradição? Causar uma mudança?"
10037100-22 = "O ato que vocês estão cometendo também não é uma \"mudança\"!?"
10037100-23 = "N-nós estamos apenas oferecendo uma admoestação à Mestra do Portão...!"
10037100-31 = "No entanto, o meio que escolheram foi um \"método extremo\" e uma \"mudança\", não é?#nNão acham?"
10037100-36 = "P-pensando bem, é verdade...!?"
10037100-41 = "A Mestra do Portão da Genryumon deve proteger a Shanhaijing... sim, você tem toda razão."
10037100-42 = "Sendo assim, a chefe do Clube de Ópera de Pequim não deveria proteger o Clube de Ópera de Pequim?"
10037100-43 = "O que a Kaguya-sama está fazendo agora――realmente será benéfico para o Clube de Ópera de Pequim?"
10037100-44 = "Do meu ponto de vista, tenho minhas dúvidas."
10037100-46 = "Eh, ah, isso..."
10037100-48 = "O pessoal da Genryumon também.#nProteger a Shanhaijing é importante."
10037100-49 = "Mas vocês são membros de uma organização chamada \"Genryumon\", que é parte da Shanhaijing."
10037100-50 = "Sendo assim, proteger o topo da organização não seria o seu verdadeiro dever?"
10037100-52 = "Isso é... verdade..."
10037100-53 = "Faz sentido, mas... por que ela conhece tão bem os assuntos da Shanhaijing e da Genryumon...?"
10037100-55 = "É como o Secretário-Geral disse há pouco――"
10037100-56 = "Em Red Winter, esse tipo de confusão não serve nem para um cumprimento――é algo de rotina."
10037100-57 = "Diante do inverno rigoroso de nossa Red Winter, todos são iguais..."
10037100-58 = "E isso torna nossos corações tão resistentes quanto o de um urso!"
10037100-62 = "Presidente Cherino! Eu abrirei o caminho!"
10037100-63 = "Sim! Que confiável, Comissária Marina!#nVamos mostrar a eles o estilo de Red Winter!"
10037100-68 = "Sim! Agora, avancem!#nUra!"
