[translation]
2005405-1 = "Sob o mesmo céu estrelado"
2005405-2 = "[ns] \"Conseguimos passar por mais um dia, não é...\""
2005405-5 = "Sim. Você já jantou?"
2005405-6 = "[s] \"Comi agorinha. Acho que estou começando a sentir falta de uma comida comum...\""
2005405-7 = "Comer rações congeladas em sistema de rodízio acaba enjoando, não é mesmo..."
2005405-8 = "Não é ruim, mas também não é nada especial. É mais ou menos isso."
2005405-9 = "De qualquer forma, já que você já se alimentou, tome isto."
2005405-10 = "É um remédio para enjoo."
2005405-11 = "[s1] \"Obrigado. Eu costumo enjoar em veículos, então isso ajuda muito.\"\n[s2] \"Eu não costumo enjoar, então estou bem.\""
2005405-12 = "Fufu. Estar preparada para tudo — esse é o meu dever como equipe de suporte de vida."
2005405-13 = "Você pode confiar mais em mim, sabia?"
2005405-14 = "Ainda assim, sempre existe a possibilidade de um \"imprevisto\"."
2005405-15 = "Já que estamos aqui, seria um desperdício se você passasse mal, não acha?"
2005405-21 = "...Então."
2005405-22 = "Podemos começar o teste de desempenho?"
2005405-23 = "[ns] \"A qualquer momento!\""
2005405-26 = "[ns] \"Uwaaaaaa!\""
2005405-28 = "Sensei, o que achou?"
2005405-29 = "[ns] \"Essa moto é muito rápida!\""
2005405-30 = "É uma cadeira de rodas!"
2005405-31 = "[ns] \"Essa cadeira de rodas é muito mais rápida que uma moto!!\""
2005405-32 = "Lá vamos nós! #nSegure-se mais forte na minha cintura!"
2005405-33 = "Se você cair e se machucar, eu terei problemas!"
2005405-34 = "[ns] \"Entendido!!!\""
2005405-41 = "Suu... haa... #nFufu, me sinto renovada."
2005405-42 = "Como foi a experiência de andar na cadeira de rodas?"
2005405-43 = "Ela quase não trepida, e acelerações ou frenagens bruscas são moleza."
2005405-44 = "Se eu desativar todos os limitadores, ela leva apenas 0,956 segundos para atingir 100 km/h."
2005405-45 = "...Dito isso, como você está comigo, não vou dirigir de forma tão imprudente."
2005405-46 = "[s] \"Por favor, dirija com segurança absoluta!\""
2005405-47 = "Com certeza. Eu deixo a direção mais ousada para os testes que faço durante a noite."
2005405-48 = "...Sim? Para eu pegar leve nos passeios noturnos?"
2005405-49 = "..."
2005405-50 = "Isso é... bem..."
2005405-51 = "Embora sirva como teste de desempenho da cadeira de rodas... vamos considerar isso como uma missão de reconhecimento."
2005405-52 = "...Não, eu entendo o que você quer dizer. #nQue esse é o papel da Toki ou da Eimi, e que drones poderiam cobrir isso, certo?"
2005405-53 = "..."
2005405-54 = "Mas... se deixarmos tudo por conta do pessoal em campo, nossa percepção não acaba ficando distorcida?"
2005405-55 = "A discrepância entre a equipe de campo e a equipe de análise — esse é o berço dos julgamentos errados!"
2005405-56 = "[s] \"Entendi...\""
2005405-57 = "...Embora eu tenha dito isso."
2005405-58 = "Existem coisas que só podem ser vistas aqui, neste lugar e neste horário."
2005405-59 = "Provavelmente, é um subproduto que nem mesmo o administrador deste lugar percebe."
2005405-60 = "...Algo totalmente natural. Poderíamos chamar de a própria forma como o mundo existe."
2005405-61 = "Tudo tem uma intenção e um resultado claros... com esse pensamento, não se pode medir este mundo."
2005405-62 = "É por isso que a astrologia, a numerologia e o simbolismo são interessantes."
2005405-63 = "Eles nos transmitem \"fragmentos do mundo\" de forma sutil, porém secreta — #ntalvez seja por isso."

2005405-64 = "Dito isso, neste lugar, o conhecimento que estudei provavelmente não será útil."
2005405-65 = "[s] \"Por que isso?\""
2005405-66 = "Porque as \"leis dos céus\" são fundamentalmente diferentes."
2005405-67 = "A posição das estrelas, seus movimentos e as fórmulas matemáticas que as entrelaçam..."
2005405-68 = "Para nós, este é um lugar que poderíamos chamar de um novo 'céu e terra'."
2005405-69 = "Claro, construir uma nova teoria astrológica do zero também seria bom."
2005405-70 = "Não há nada mais divertido do que criar uma teoria a partir de uma folha em branco."
2005405-71 = "No entanto... é uma pena que não pareçamos ter tempo suficiente para isso."
2005405-75 = "[wa:500]― [log=히마리 결전]É estranho, não é?[/log]"
2005405-77 = "― [log=히마리 결전]Assim como no Millennium, [wa:2080]aqui também podemos olhar para o céu noturno.[/log]"
2005405-80 = "[wa:2020]― [log=히마리 결전]As estrelas que brilham [wa:1890]são diferentes daquelas que conhecemos.[/log]"
2005405-82 = "― [log=히마리 결전]É difícil colocar em palavras... [wa:3400]uma sensação difícil de descrever.[/log]"
2005405-85 = "[ns] \"Mas para mim, Himari, você parece muito mais misteriosa.\""
2005405-86 = "[wa:440]― [log=히마리 결전]Sim...!?[/log]"
2005405-88 = "― [log=히마리 결전]Ah, [wa:1480]obrigada. [wa:2500]Bem... [wa:2330]vou aceitar isso como um elogio.[/log]"
2005405-91 = "[wa:1060]― [log=히마리 결전]...Mesmo estando sob o mesmo céu noturno.[/log]"
2005405-93 = "― [log=히마리 결전]Não significa necessariamente que possamos entender um ao outro.[/log]"
2005405-96 = "[wa:520]― [log=히마리 결전]Mas, pelo menos, [wa:2200]já que estamos sob o 'mesmo' céu noturno.[/log]"
2005405-98 = "― [log=히마리 결전]Acho que isso pode ser, [wa:2990]pelo menos, um ponto de partida para nos entendermos.[/log]"
2005405-101 = "[wa:1370]― [log=히마리 결전]É assim que [wa:2000]eu penso.[/log]"
2005405-103 = "― [log=히마리 결전]Sensei, [wa:2010]o que você acha?[/log]"
2005405-109 = "O que achou?#nDa experiência de hoje... na cadeira de rodas."
2005405-110 = "[s3] \"Foi realmente impressionante.\"\n[s4] \"Quero que me leve de novo.\""
2005405-113 = "Ah, eh..."
2005405-114 = "V-você mesmo me convidou, Sensei..."
2005405-115 = "...Ehem."
2005405-116 = "Já está tarde."
2005405-117 = "Vamos voltar antes que os outros fiquem preocupados."
2005405-120 = "(O caminho de volta foi feito com uma direção extremamente segura)"
