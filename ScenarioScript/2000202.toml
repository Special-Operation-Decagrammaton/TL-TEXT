[translation]
2000202-1 = "Bem-vindo ao laboratório da Saya!"
2000202-2 = "Em frente ao laboratório da Saya - Corredor"
2000202-4 = "[ns] Bater na porta."
2000202-6 = "Ughhh, não aguento mais!"
2000202-8 = "Não importa o quanto você seja a veterana Saya, não aguentamos mais isso! #nNós não somos suas cobaias!"
2000202-9 = "É isso mesmo! Não vamos mais participar dos seus experimentos, veterana!"
2000202-10 = "P-pessoal, acalmem-se. Desta vez, com certeza vai dar certo!"
2000202-11 = "Você diz isso sempre! Você não disse a mesma coisa da última vez?!"
2000202-12 = "Aquele elixir que dizia dar resistência a todos os venenos fez minha pele ficar igual à de um sapo venenoso quando passei...!"
2000202-13 = "E aquele elixir de invulnerabilidade que dizia permitir bloquear espadas com as mãos nuas fez minha pele começar a rachar como pedra...!"
2000202-14 = "Mas, no fim das contas, é um fato que você conseguiu bloquear todos os venenos e espadas, não é?"
2000202-15 = "Não importa o que diga, não aceitamos ficar com aparências estranhas!"
2000202-16 = "É verdade, não vamos mais confiar nos remédios da veterana Saya!"
2000202-17 = "E-esperem! Desta vez é o verdadeiro elixir da imortalidade—"
2000202-19 = "Ugh... elas foram embora."
2000202-21 = "Ah, Sensei. Você veio! Eu estava te esperando!"
2000202-22 = "[s] Fugir."
2000202-23 = "...Espere, onde você pensa que vai me deixando para trás?!"
2000202-24 = "O elixir que as alunas mencionaram? #nHahaha! Não se preocupe! O elixir que desenvolvi desta vez é diferente dos anteriores, ele terá um efeito garantido."
2000202-25 = "Desta vez, o Sensei vai me ajudar com o experimento!"
2000202-26 = "[s] Fugir."
2000202-27 = "Eu disse para não fugir!"
2000202-28 = "Está perguntando se não dá para pedir para outra aluna? #nNão dá, preciso do Sensei para esta pesquisa!"
2000202-29 = "Para verificar o \"efeito de rejuvenescimento\", é difícil ver os resultados em alunas jovens, então preciso de um \"adulto\" para comparar melhor os efeitos!"
2000202-30 = "Vamos, vamos, Sensei. Não vai doer... #nFaça logo o experimento!"
2000202-32 = "Laboratório da Saya"
2000202-34 = "Bem-vindo ao meu laboratório, Sensei."
2000202-35 = "Ah, não toque naquelas amostras ali. Elas ainda estão vivas."
2000202-36 = "[s] Perguntar que tipo de pesquisa ela faz aqui."
2000202-37 = "Eu não disse agora pouco? Estou pesquisando para criar o elixir da imortalidade."
2000202-38 = "Claro que, no processo, acabo desenvolvendo outros remédios secretos, mas... #no objetivo final do Clube de Pesquisa de Alquimia é criar o elixir da imortalidade. Hahaha!"
2000202-39 = "[s] Perguntar o que ela quer fazer ao criar o elixir da imortalidade."
2000202-40 = "Hum? Isso é óbvio. #nSem envelhecer, vivendo eternamente como uma estudante, pesquisando infinitamente..."
2000202-41 = "[s] \"E depois?\""
2000202-42 = "E depois, ser respeitada pelas pessoas, aproveitar os elogios, e então..."
2000202-43 = "[s] \"...E depois?\""
2000202-44 = "Bem, e depois... #nUgh, que chato! O Sensei só precisa ficar quieto e seguir a minha pesquisa!"
2000202-47 = "Saya me entregou um frasco suspeito."
2000202-48 = "Aqui está, este é o novo elixir da imortalidade que desenvolvi. Não parece milagroso só de olhar?"
2000202-49 = "[s1] \"...\"\n[s2] \"...Isso é realmente o elixir da imortalidade?\""
2000202-50 = "Hum, está duvidando? A grande eu nunca minto!"
2000202-51 = "Hum, está duvidando? A grande eu nunca minto!"
2000202-52 = "Se você beber tudo de uma vez, o Sensei voltará aos seus tempos de juventude!"
2000202-53 = "[s] Beber o remédio a contragosto."
2000202-57 = "E então, parece que está fazendo efeito? Sente que está ficando muito mais jovem?"
2000202-58 = "[s] \"Minhas mãos...\""
2000202-59 = "...Suas mãos?"
2000202-60 = "[s] \"Minhas mãos estão brilhando em dourado!\""
2000202-61 = "Hahaha! Como esperado de mim. #nValew a pena aplicar a alquimia na alquimia tradicional. Mais um sucesso!"
2000202-62 = "Por que está me olhando com esse olhar suspeito? #nSe o seu corpo inteiro virou ouro, você nunca vai envelhecer nem apodrecer, então, no fim das contas, você conseguiu um corpo imortal, não é?"
2000202-63 = "Como esperado, eu sou um gênio! Hahaha!"
2000202-64 = "[s] Dizer para devolver o meu corpo ao normal."
2000202-65 = "O quê? Você não gostou do corpo imortal que acabou de ganhar?#nQue seja, não tem jeito."
2000202-66 = "Não precisa se preocupar. O elixir desta vez é um protótipo, então você voltará ao normal em um dia."
2000202-67 = "Até lá, aproveite ao máximo essa pele radiante e brilhante. Uwahahaha!"
