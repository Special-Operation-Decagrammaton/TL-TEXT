[translation]
1002805-1 = "A ecologia das coelhinhas"
1002805-3 = "（Embora fosse feriado no calendário, eu vim ao Millennium Science School a trabalho）"
1002805-4 = "（Ao passar no café na volta, ele estava aberto, mas não havia nenhum aluno por lá, talvez por ser feriado. Ou era o que eu pensava...）"
1002805-5 = "Ah, é o Mestre!"
1002805-6 = "Eu estava pensando em ir te procurar depois, que sorte te encontrar aqui!"
1002805-7 = "[s1] \"……？\"\n[s2] \"Asuna?\""
1002805-13 = "Por que o Mestre está aqui? Trabalho?"
1002805-14 = "Ué, mas hoje não é feriado? Por que você está trabalhando?"
1002805-15 = "……？"
1002805-16 = "Por que você está com essa cara de triste? Está tudo bem? Está sentindo dor em algum lugar?"
1002805-17 = "Não é nada……?"
1002805-18 = "Hum, fico feliz em saber!"
1002805-19 = "……Hm? Por que eu estou vestida de coelhinha de novo, você pergunta?"
1002805-20 = "É que eu ainda não entendi muito bem essa história de coelhinha! Se tem algo que eu não sei, eu quero descobrir, né?"
1002805-21 = "Mas, mesmo vestindo a roupa de coelhinha, eu não viro uma coelha de verdade……."
1002805-22 = "Sendo assim,"
1002805-23 = "para que serve esse traje de coelhinha, afinal?"
1002805-24 = "Quando perguntei isso para alguém, me disseram: \"Não seria porque as pessoas ficam felizes quando você usa?\" e então……."
1002805-25 = "Mas eu ainda não entendo bem. Além disso, se isso deixa as pessoas felizes, todo mundo deveria usar, mas não parece ser uma roupa comum do dia a dia."
1002805-26 = "Ninguém soube me explicar nada além disso."
1002805-27 = "Por isso, decidi verificar por conta própria, e é por isso que estou usando agora!"
1002805-28 = "Já que ninguém me explica, só me resta descobrir sozinha!"
1002805-32 = "Por isso, eu vim aqui ontem também, mas……."
1002805-33 = "De repente, o dono do café apareceu e disse: \"Sinto muito, mas poderia se retirar por hoje...\" Então, decidi voltar hoje!"
1002805-34 = "Mas hoje não tem ninguém além do Mestre. Ahaha, é verdade, é feriado, né!"
1002805-35 = "[s] \"Entendo……?\""
1002805-39 = "……Ah."
1002805-40 = "……Acho que a Asuna acabou de perceber uma coisa."
1002805-41 = "Ninguém me explicou, mas……."
1002805-42 = "O Mestre é um Sensei, e ser um Sensei significa que você é alguém que \"ensina e guia\", não é……!?"
1002805-43 = "[s3] \"Bem, de certa forma……?\"\n[s4] \"Err…….\""
1002805-44 = "Sendo assim, me ensine, Mestre…… digo, Sensei!"
1002805-45 = "Sendo assim, me ensine, Mestre…… digo, Sensei!"
1002805-46 = "O que é uma coelhinha? Por que as pessoas ficam felizes quando alguém usa essa roupa?"
1002805-47 = "Ficam felizes só de ver uma coelhinha? Ou eu preciso fazer algo a mais vestida assim?"
1002805-48 = "……？"
1002805-49 = "Isso não é o mais importante……?"
1002805-50 = "É mesmo?"
1002805-51 = "Não é o traje em si, mas o motivo pelo qual decido usá-lo que é importante……?"
1002805-52 = "……O que você quer dizer com isso?"
1002805-53 = "Às vezes eu uso por mim mesma, mas quando uso para deixar alguém feliz, a pessoa que vê sente uma alegria dupla……?"
1002805-54 = "Hum…… É meio difícil de entender, parece que entendi, mas ao mesmo tempo não, sabe?"
1002805-55 = "Ah, então e quanto ao meu uniforme de empregada de sempre?"
1002805-56 = "Como ele é diferente disso?"
1002805-57 = "……Eh?"
1002805-58 = "No sentido fundamental, é a mesma coisa? Sério, é mesmo?"
1002805-59 = "O traje de coelhinha e o uniforme de empregada são a mesma coisa……"
1002805-60 = "É complicado, né?"
1002805-61 = "Hum, ah. Mudando de assunto……"
1002805-62 = "Este traje de coelhinha, eu vesti por sua causa, Mestre!"
1002805-63 = "……se eu dissesse isso, o Mestre ficaria feliz?"
1002805-64 = "Ah, claro que, além disso, a Asuna faria qualquer coisa pelo Mestre!"
1002805-65 = "……?"
1002805-66 = "……Quer que eu prepare um café? Claro que sim, mas por que de repente? Por que está cobrindo o rosto assim?"
1002805-67 = "Mas se o Mestre diz isso, eu vou preparar agora mesmo!"
1002805-68 = "Então, depois que você beber, me diga se ficou feliz, tá bom?"
1002805-69 = "Então a Asuna já vai indo!"
1002805-74 = "(Assim, ganhando tempo para que ele pudesse recuperar a compostura, passei um momento divertido com a Asuna enquanto conversávamos sobre várias coisas)"
