[translation]
1002805-1 = "バニーガールの生態"
1002805-3 = "（暦上は休日だけれど、仕事でミレニアムサイエンススクールへと来ていた）"
1002805-4 = "（帰りにカフェに寄ると、営業はしていたものの、休日だからか生徒たちは誰ひとり来ていなかった。と思いきや……）"
1002805-5 = "あ、ご主人様だ！"
1002805-6 = "後で探しにいこうと思ってたら、こんなところで会えるなんて！"
1002805-7 = "[s1] \"……？\"\n[s2] \"アスナ？\""
1002805-13 = "ご主人様はどうしてここに？お仕事？"
1002805-14 = "あれ、でも今日は休日だよね？何で仕事してるの？"
1002805-15 = "……？"
1002805-16 = "何で悲しそうな顔してるの？大丈夫？どこか痛いの？"
1002805-17 = "問題無い……？"
1002805-18 = "うん、それなら良かった！"
1002805-19 = "……ん？どうしてまたバニー衣装なのって？"
1002805-20 = "だって、バニーさんについてまだよく分かってないから！知らないことは知りたいでしょ？"
1002805-21 = "にしても、バニーガールの衣装を着てもウサギにはなれないなんて……。"
1002805-22 = "だとしたら、"
1002805-23 = "バニーガールって何のための衣装なんだろうね？"
1002805-24 = "っていう風に聞いてみたら、「それを着ると喜ぶからじゃないでしょうか？」って言われて……。"
1002805-25 = "でも、それもまたよく分からないんだよね。それに、誰かが喜ぶならみんなが着れば良いのに、これは普段着ってわけでもないみたいだし。"
1002805-26 = "それ以上は、誰も教えてくれなくって。"
1002805-27 = "だから実際に確かめてみようと思って、こうして着てるところなの！"
1002805-28 = "誰も教えてくれないから、自分で確かめるしかないなって！"
1002805-32 = "それで、昨日もここに来たんだけど……。"
1002805-33 = "何だか急にカフェの店主さんが来て「申し訳ありませんが、本日はお引き取りいただけると……」って言われちゃって。だから、今日出直してきたの！"
1002805-34 = "でも、今日はご主人様以外誰もいないね。あははっ、そりゃ休日だからそっか！"
1002805-35 = "[s] \"なるほど……？\""
1002805-39 = "……あ。"
1002805-40 = "……アスナ、気づいちゃったかもしれない。"
1002805-41 = "誰も教えてくれなかったけど……。"
1002805-42 = "ご主人様は先生なわけだし、先生ってことは、「教え導いてくれる人」だよね……！？"
1002805-43 = "[s3] \"まあ、確かに……？\"\n[s4] \"えーっと……。\""
1002805-44 = "というわけで、じゃあ教えてご主じ……先生！"
1002805-45 = "というわけで、じゃあ教えてご主じ……先生！"
1002805-46 = "バニーガールって、何なの？どうしてバニーガールの服を着ると嬉しくなるの？"
1002805-47 = "バニーガールを見るだけで嬉しいの？それともこの格好で、さらに何かしないといけないの？"
1002805-48 = "……？"
1002805-49 = "そこは大事じゃない……？"
1002805-50 = "そうなの？"
1002805-51 = "衣装そのものじゃなくて、着ようと思う理由が大事……？"
1002805-52 = "……どういうこと？"
1002805-53 = "自分のために着ることもあるし、誰かを喜ばせるために着ると、それを見た相手が二重の意味で嬉しい……？"
1002805-54 = "うーん……何だか分かるような分からないような、難しいね～？"
1002805-55 = "あ、じゃあいつものメイド服は？"
1002805-56 = "あれとはどう違うの？"
1002805-57 = "……え？"
1002805-58 = "根本的な意味では同じ？え、そうなの？"
1002805-59 = "バニーガール衣装とメイド服が同じ……"
1002805-60 = "難しいね？"
1002805-61 = "んー、あ。じゃあまた別の話だけど……"
1002805-62 = "このバニーガールの衣装、ご主人様のために着たのっ！"
1002805-63 = "……って言われたら、ご主人様は嬉しい？"
1002805-64 = "あ、もちろんこれ以外でも、アスナはご主人様のためになら何でもするよ！"
1002805-65 = "……？"
1002805-66 = "……コーヒーを淹れてきてほしい？もちろん良いけど、急にどうしたの？そんなに顔を覆い隠して。"
1002805-67 = "でもご主人様がそう言うなら、すぐに淹れてきてあげる！"
1002805-68 = "じゃあそれを飲んだら、嬉しいかどうか教えてね？"
1002805-69 = "じゃあアスナ、行ってきまーす！"
1002805-74 = "（そうして時間を稼いで緩んだ表情を直した後、色々なやり取りを経ながら、アスナと楽しい時間を過ごした）"
