[translation]
10035095-3 = "Haa, haa..."
10035095-4 = "Meca-jacaré, parada total!"
10035095-5 = "Parece que conseguimos derrotá-lo sem problemas!"
10035095-6 = "É, está saindo fumaça do motor. Acho que desta vez a neutralização foi concluída."
10035095-12 = "Pff... pfff!"
10035095-13 = "Hahahaha!"
10035095-14 = "O que é isso! Aquele jacaré! Ele não é nada fraco! Hahaha!"
10035095-16 = "E pensar que ele estava fugindo até agora..."
10035095-19 = "[ns] \"Bom trabalho a todos.\""
10035095-20 = "Foi graças ao comando do Sensei."
10035095-21 = "Obrigada por tudo mais uma vez."
10035095-25 = "O, o jacaré está ali! Atirem!!"
10035095-26 = "Dono, ele já foi derrotado!"
10035095-27 = "...Hm?"
10035095-28 = "Entendo. Co-cof..."
10035095-30 = "...A neutralização do Meca-jacaré foi concluída."
10035095-31 = "Podemos deixar o resto com vocês?"
10035095-33 = "S-sim!"
10035095-34 = "Vocês, venham por aqui!"
10035095-40 = "Primeiro, levem os feridos para a enfermaria! Priorizem o suporte aos clientes!"
10035095-43 = "Sim!"
10035095-47 = "Ai, ai... torci o pé durante a evacuação..."
10035095-48 = "Vou guiá-la até a enfermaria."
10035095-51 = "D-desculpe! Estou procurando um amigo que se perdeu...!"
10035095-52 = "Por favor, descreva as características dele."
10035095-55 = "[ns1] \"Parece que já está tudo bem...\"\n[ns2] \"Parece que foi resolvido sem problemas.\""
10035095-58 = "Foi um mal menor, pelo menos."
10035095-59 = "Se ele tivesse causado confusão dentro do prédio, poderia ter sido um desastre."
10035095-60 = "Sim, fico aliviada que não haja feridos graves."
10035095-61 = "Com isso, o caso está encerrado!"
10035095-67 = "Bem, é bom que tenham derrotado o Meca-jacaré, mas..."
10035095-68 = "Ainda tem algo estranho, não tem?"
10035095-70 = "Sim?"
10035095-72 = "Quando o jacaré avançou contra a Cão Raivoso mais cedo..."
10035095-77 = "Aquele jacaré parou de se mover de repente, não foi?"
10035095-78 = "Graças a isso, tivemos uma abertura para neutralizá-lo, mas... #nPor que ele parou?"
10035095-80 = "Não foi coincidência? Tipo, deu um bug por um instante."
10035095-81 = "Será que ele não viu a diretora e ficou com medo, então desviou?"
10035095-83 = "Não tem como ser isso."
10035095-87 = "Cão Raivoso, você não fez alguma coisa?"
10035095-89 = "Não, eu não fiz nada."
10035095-90 = "Então, como você explica o que aconteceu?"
10035095-91 = "...Eu também não sei ao certo."
10035095-92 = "[s] \"Talvez a gente descubra se analisar o Meca-jacaré.\""
10035095-94 = "Verdade. Não podemos simplesmente deixá-lo aqui, vamos desmontá-lo um pouco."
10035095-95 = "Será que podemos mexer nele sem permissão?"
10035095-97 = "Não tem problema, né? De qualquer forma, agora é só um monte de ferro."
10035095-102 = "Vejamos... uau, o acabamento é muito bom."
10035095-103 = "Sim. Pela qualidade da solda, parece ter sido feito por um artesão muito habilidoso..."
10035095-105 = "Um artesão não faria uma coisa dessas, faria?"
10035095-106 = "Tanto faz, eu vou abrir para ver."
10035095-115 = "[ns3] \"É uma estrutura muito complexa...\"\n[ns4] \"Mesmo olhando por dentro, não entendo nada.\""
10035095-118 = "Nossa, nunca vi uma fiação dessas... Não é algo para amadores mexerem."
10035095-119 = "S-só de olhar, já estou ficando tonta..."
10035095-120 = "Tsc! Pelo menos escrevam o nome de quem criou isso!"
10035095-125 = "Ah, ali está!"
10035095-129 = "[ns5] \"Hã...?\"\n[ns6] \"Essa voz é...\""
