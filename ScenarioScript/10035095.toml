[translation]
10035095-3 = "はぁ、はぁ……。"
10035095-4 = "メカワニ、完全停止！"
10035095-5 = "無事、倒したようです！"
10035095-6 = "うん、エンジンから煙が出てるね。今度こそ制圧完了か。"
10035095-12 = "ふっ……ふふっ！"
10035095-13 = "はははははっ！"
10035095-14 = "なんだ！ワニのやつ！弱いじゃないの！はははっ！"
10035095-16 = "さっきまで逃げ回ってたくせに……。"
10035095-19 = "[ns] \"みんな、お疲れさま。\""
10035095-20 = "先生の指揮のおかげです。"
10035095-21 = "今回もありがとうございました。"
10035095-25 = "わ、ワニはあそこだ！撃てぇぇっ！！"
10035095-26 = "オーナー、もう倒れています！"
10035095-27 = "……ん？"
10035095-28 = "そうか。こ、こほん……。"
10035095-30 = "……メカワニの制圧は完了しました。"
10035095-31 = "後のことは、お任せしてもよろしいですか。"
10035095-33 = "え、ええ！"
10035095-34 = "お前たち、こっちだ！"
10035095-40 = "まず怪我人を医務室に！お客様のサポートを優先しろ！"
10035095-43 = "はいっ！"
10035095-47 = "いたた……避難する時に、足を挫いてしまって……。"
10035095-48 = "医務室までご案内いたします。"
10035095-51 = "す、すみません！はぐれた友人を探しているんです……！"
10035095-52 = "特徴をお教えください。"
10035095-55 = "[ns1] \"もう大丈夫そうだね……。\"\n[ns2] \"無事に解決したみたい。\""
10035095-58 = "不幸中の幸いってやつだね。"
10035095-59 = "屋内で暴れられたら、大惨事になってたかも。"
10035095-60 = "はい、重傷者もないようで、安心しました。"
10035095-61 = "これで一件落着ですね！"
10035095-67 = "まあ、メカワニを倒したのはいいけどさ。"
10035095-68 = "まだ気になることが残ってるんじゃない？"
10035095-70 = "はい？"
10035095-72 = "さっき、ワニが狂犬の方に突進した時――"
10035095-77 = "ワニのやつ、急に動きを止めてたでしょ。"
10035095-78 = "あれのおかげで制圧する隙ができたけど……。#nなんで止まったの？"
10035095-80 = "偶然じゃないのー？一瞬、バグったとかさ。"
10035095-81 = "局長を見て、怖くなって避けたんじゃないですか？"
10035095-83 = "そんなわけないじゃん。"
10035095-87 = "狂犬、何かやらかしたんじゃないの？"
10035095-89 = "いや、私は何もしていない。"
10035095-90 = "じゃあ、さっきのはどう説明すんのさ？"
10035095-91 = "……私にもよく分からないんだ。"
10035095-92 = "[s] \"メカワニを分析すれば分かりそう。\""
10035095-94 = "だね。放置するわけにもいかないし、ちょっと解体してみよっか。"
10035095-95 = "勝手に手を出して、いいものなんでしょうか？"
10035095-97 = "別にいいんじゃないの？どうせもう鉄の塊でしょ。"
10035095-102 = "どれどれ……へぇ、結構いい仕上がりだねぇ。"
10035095-103 = "はい。溶接の具合からして、かなり腕のある職人さんが作ったようです……。"
10035095-105 = "職人がこんなもの作るわけないでしょ？"
10035095-106 = "いいから開けてみるわよ。"
10035095-115 = "[ns3] \"すごく複雑な構造だね……。\"\n[ns4] \"中を見ても、よく分からない。\""
10035095-118 = "いやぁ、こんな配線初めて見たよ……。素人の出る幕じゃないね。"
10035095-119 = "み、見ただけで、目が回りそうです……。"
10035095-120 = "ちっ！作ったやつの名前ぐらい書いておきなさいよ！"
10035095-125 = "あっ、あそこだ！"
10035095-129 = "[ns5] \"あれ……？\"\n[ns6] \"この声は……？\""
