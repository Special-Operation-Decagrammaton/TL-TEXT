[translation]
10053090-1 = "Epílogo; Tsuchinoko azul"

10053090-2 = "(3º dia)"

10053090-3 = "Uau! ! ! Solte! ! ! Solte! ! ! \r\n"

10053090-5 = "Ainda dá tempo! ! ! Quase não é seguro agora! ! ! \r\n\r\n"

10053090-10 = "Não seja estúpido! As montanhas à noite são realmente perigosas! \r\n\r\n\r\n"

10053090-11 = "Mas se eu errar hoje, será o pior infortúnio da minha vida...! ! ! ! \r\n\r\n\r\n\r\n"

10053090-12 = "Nem precisa ser Tsuchinoko! Se você pegar uma cobra nessa hora...! ! \r\n\r\n\r\n\r\n"

10053090-13 = "Por favor, ajude-me a parar com isso sem que todos vejam! ! \r\n\r\n"

10053090-17 = "Não, estamos fazendo tudo ao nosso alcance para detê-los...! !"

10053090-21 = "Esse cara é realmente humano? ? Este poder... não é um tanque...! ?"

10053090-25 = "Ah, meu pé escorregou - ugh! ! Raspei meu joelho! !"

10053090-30 = "Todos, por favor, acalmem-se! \r\n"

10053090-31 = "Konoka-kun, tenho algo importante para lhe contar. \r\n"

10053090-36 = "Não adianta parar! Não importa o quanto o diretor me diga, não vou ouvir! \r\n\r\n\r\n"

10053090-37 = "Não, essa não é minha intenção. Eu só quero que você ouça. Acabei de perceber. \r\n\r\n"

10053090-38 = "De acordo com meus cálculos, o “pior terceiro dia” de Konoka-kun é--! \r\n"

10053090-40 = "Já passou...! ! \r\n"

10053090-46 = "…………."

10053090-47 = "………… peido?"

10053090-48 = "Me senti estranho desde a primeira vez que ouvi isso. #nA adivinhação geralmente se refere à sorte daquele dia. \r\n"

10053090-49 = "Porém, se você está falando da fortuna do terceiro dia... #nNão é o primeiro dia? e."

10053090-50 = "Em outras palavras, o “pior terceiro dia” de Konoka foi ontem! \r\n"

10053090-51 = "Meu pior dia já acabou... isso significa...? \r\n"

10053090-52 = "…………."

10053090-53 = "Mas não houve nada de especial...?"

10053090-58 = "Isso é o que é adivinhação, certo? \r\n"

10053090-59 = "Só me lembro de ter sido impressionante. Chama-se \"Lei de Murphy\" --\r\n"

10053090-73 = "……não. \r\n"

10053090-74 = "Lá estava! ! Havia muitos deles! ? A pior coisa que aconteceu! ! \r\n\r\n\r\n"

10053090-75 = "Fui atacado por algo que parecia um robô! ! \r\n\r\n"

10053090-76 = "Atacado por um estranho sukeban à noite! ! \r\n\r\n"

10053090-77 = "É tudo sobre o pior! \r\n\r\n\r\n"

10053090-82 = "Talvez você queira dizer nós?"

10053090-83 = "Não há necessidade de dizer que é o pior... #nFoi ruim eu ter atacado você à noite. \r\n"

10053090-88 = "Ah, desculpe.... \r\n"

10053090-89 = "……sim? \r\n"

10053090-90 = "Shhh! Essa é a pior coisa a fazer! ! \r\n"

10053090-91 = "Eu sinto que fui enganado de alguma forma! ! \r\n"

10053090-96 = "Bem, o pior é como um tanque, mas isso é um exagero... \r\n"

10053090-97 = "Ou seja, mesmo depois de três dias, o pior dia não chegou...?"

10053090-101 = "Não, talvez...! ? \r\n"

10053090-102 = "Quer dizer, eu já conheci Tsuchinoko! ?"

10053090-103 = "Não, não, não vi nada parecido com uma cobra desde que cheguei aqui ――\r\n"

10053090-106 = "Ou melhor, o que é exatamente Tsuchinoko? #nNão existe outra característica além da cobra gorda?"

10053090-110 = "Hmm... essa é uma pergunta difícil. Em primeiro lugar, “cobra gorda” não é preciso. \r\n"

10053090-111 = "É chamado assim porque é fácil de entender, mas na verdade é uma silhueta em forma de diamante."

10053090-112 = "E o mais incrível é sua habilidade de pular! Aparentemente ele pode voar quase 1 metro no local! \r\n"

10053090-115 = "Shhh! ! Shhh! ! ! \r\n"

10053090-116 = "É Tsuchinoko! ! ! ! \r\n\r\n"

10053090-122 = "Eh, espere, o que aconteceu de repente? ?"

10053090-123 = "Por que você está me abraçando de repente? ?"

10053090-124 = "Não, isso..."

10053090-128 = "Talvez esta aventura tenha sido a verdadeira Tsuchinoko..."

10053090-129 = "コノカまでそれ言うの！ ?"

10053090-131 = "(...Assim, a aventura em busca de Tsuchinoko chegou ao fim.)"

10053090-139 = "Bem, me sinto bem quando meu quarto está limpo! \r\n"

10053090-140 = "Por que você limpou? Você já está indo para casa? \r\n"

10053090-141 = "Não é um desperdício porque aluguei por uma semana? Eu ainda tenho que jogar."

10053090-142 = "O que! ? Era disso que se tratava a história? ? #nFicou claro que eles estavam procurando uma entrada para uma base secreta de alienígenas... \r\n\r\n"

10053090-147 = "Hum, a limpeza terminou, então já é hora de mim... \r\n\r\n\r\n"

10053090-148 = "Não desista. Você nunca mais voltará. \r\n\r\n\r\n\r\n\r\n"

10053090-149 = "Se isso acontecer, vamos ficar com fome e nos divertir. \r\n\r\n\r\n\r\n"

10053090-154 = "Kivotos - Mistério não confirmado - Investigação de Tsuchinoko para afastar o mal -"

