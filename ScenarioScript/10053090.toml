[translation]
10053090-1 = "エピローグ;青いツチノコ"
10053090-2 = "（3日目）"
10053090-3 = "うわあああぁ！！！離せ！！！離せよ！！！\r\n"
10053090-5 = "まだ間に合う！！！今ならギリギリセーフ！！！\r\n\r\n"
10053090-10 = "バカ言わないで！夜の山は本当に危ないんだから！\r\n\r\n\r\n"
10053090-11 = "でも今日を逃したら人生最悪の不幸が……！！！！\r\n\r\n\r\n\r\n"
10053090-12 = "いっそツチノコじゃなくてもいい！この際ヘビでも捕まえれば……！！\r\n\r\n\r\n\r\n"
10053090-13 = "みんなも見てないで止めるの手伝ってよ！！\r\n\r\n"
10053090-17 = "いや、うちらも全力で止めてるんですけど……！！"
10053090-21 = "こいつ本当に人間か！？この力……戦車じゃないのか……！？"
10053090-25 = "あっ、足が滑っ――うぎゃああああ！！膝すりむいたぁぁ！！"
10053090-30 = "みんな、少し落ち着いてくれ！\r\n"
10053090-31 = "コノカ君、重要な話があるんだ。\r\n"
10053090-36 = "止めてもムダっすよ！いくら所長に言われたって聞かないっすから！\r\n\r\n\r\n"
10053090-37 = "いや、そのつもりはない。ただ聞いてほしい。さっき気づいたんだ。\r\n\r\n"
10053090-38 = "吾輩の計算によれば、コノカ君の「最悪の3日目」は――！\r\n"
10053090-40 = "とっくに過ぎていたんだ……！！\r\n"
10053090-46 = "…………。"
10053090-47 = "…………へ？"
10053090-48 = "最初に聞いた時から違和感があったんだ。#n占いというのは、普通「その日」の運勢を指すものだからね。\r\n"
10053090-49 = "にもかかわらず3日目の運勢を語るのなら……#nそれは当日が1日目なのではないか？と。"
10053090-50 = "つまりコノカ君の「最悪の3日目」は昨日だったということだ！\r\n"
10053090-51 = "あたしの最悪の日は、もう終わってた……ってこと……？\r\n"
10053090-52 = "…………。"
10053090-53 = "でも、別に何もなかったけど……？"
10053090-58 = "占いなんてそんなもんでしょ。\r\n"
10053090-59 = "印象的なのを覚えてるだけなんだって。いわゆる「マーフィーの法則」ってやつで――\r\n"
10053090-73 = "……いや。\r\n"
10053090-74 = "あったじゃん！！山ほどあったでしょ！？最悪の出来事！！\r\n\r\n\r\n"
10053090-75 = "ロボットみたいなのに襲われて！！\r\n\r\n"
10053090-76 = "夜は変なスケバンに襲撃されて！！\r\n\r\n"
10053090-77 = "最悪なことばっかりじゃん！\r\n\r\n\r\n"
10053090-82 = "もしかして、うちらのことですか？"
10053090-83 = "最悪って、そこまで言わなくてもいいじゃんか……。#n夜襲ったのは悪かったけど。\r\n"
10053090-88 = "あ、ごめん……。\r\n"
10053090-89 = "……ん？\r\n"
10053090-90 = "シャーッ！最悪な行動でしょそれ！！\r\n"
10053090-91 = "なんか誤魔化されそうになったじゃん！！\r\n"
10053090-96 = "まぁ、戦車程度で最悪は大げさだけど……。\r\n"
10053090-97 = "つまり3日経っても最悪の日は来なかったってこと……？"
10053090-101 = "いや、もしかして……！？\r\n"
10053090-102 = "もうツチノコに会ってたってこと！？"
10053090-103 = "いやいや、ここに来てからヘビっぽいのなんて見てな――\r\n"
10053090-106 = "ていうか、そもそもツチノコって何なの？#n太ってるヘビ以外に特徴ないわけ？"
10053090-110 = "ふむ……鋭い質問だね。まず、「太ったヘビ」という表現は正確じゃないんだ。\r\n"
10053090-111 = "分かりやすいからそう呼ばれているだけで、#n実際は菱形に近いシルエットなのだそうだよ。"
10053090-112 = "そして何よりすごいのが跳躍力！その場で1メートル近く飛べるそうだ！\r\n"
10053090-115 = "シャーッ！！シャーーーッ！！！\r\n"
10053090-116 = "ツチノコだーーーっ！！！！\r\n\r\n"
10053090-122 = "えっ、ちょ、いきなり何！？"
10053090-123 = "なんで急に抱きつくのよ！？"
10053090-124 = "いや、その……。"
10053090-128 = "もしかしたらこの冒険こそが、本当のツチノコだったのかも……。"
10053090-129 = "コノカまでそれ言うの！？"
10053090-131 = "（……こうして、ツチノコを追い求めた冒険は幕を閉じた）"
10053090-139 = "いや～、やっぱ部屋がキレイだと気分いいねぇ！\r\n"
10053090-140 = "なんで片づけしたの？もう帰るんでしょ？\r\n"
10053090-141 = "1週間レンタルしたんだからもったいないじゃん？まだ遊んで行かないと。"
10053090-142 = "なにっ！？そういう話だったのか！？#nてっきり、異星人の秘密基地への入口を探しているのだとばっかり……。\r\n\r\n"
10053090-147 = "あの～、掃除も終わりましたし、私はそろそろ……。\r\n\r\n\r\n"
10053090-148 = "諦めな。絶対帰してくれないぞ。\r\n\r\n\r\n\r\n\r\n"
10053090-149 = "こうなったら、もう腹くくって遊び倒そうぜ。\r\n\r\n\r\n\r\n"
10053090-154 = "キヴォトス・未確認ミステリー～邪を払うツチノコ大調査～"
