[translation]
10047095-4 = "[ns] \"はぁ……はぁ……！\""
10047095-7 = "あっ、マスター！こっちです！"
10047095-8 = "念のため、カラスを送っておいてよかったぁ……。"
10047095-9 = "ふふっ。ですが……まだ試練は続きそうです。"
10047095-11 = "よし！追い詰めたぞ！"
10047095-12 = "もう逃げ場はない、全員投降しろ！"
10047095-14 = "うぅ、あとは寮監隊の宿舎だけなのに……。"
10047095-15 = "思ったより……警備が厳しかった……。"
10047095-16 = "……ふふ、[ruby=あまた]数多[/ruby]の失敗の果てに、美しい成功があるもの。"
10047095-17 = "本来、芸術の道とは険しいものですから。"
10047095-18 = "簡単には手に入らずとも、いつか答えを見つけられると信じて進む。#nそれこそが、芸術への――"
10047095-23 = "――挑戦。"
10047095-24 = "……ですから！"
10047095-26 = "何をうだうだと……！#n全員、現行犯で確――"
10047095-37 = "な、何だ？鐘の音？"
10047095-38 = "この方向は、まさか……？"
10047095-39 = "……「名もなき鐘」の方ですね。"
10047095-40 = "鳴ってる……滅亡を謳う――"
10047095-41 = "伝説の鐘が！！"
