[translation]
10047095-4 = "[ns] \"Haa... haa...!\""
10047095-7 = "Ah, Mestre! Por aqui!"
10047095-8 = "Ainda bem que enviei os corvos por precaução..."
10047095-9 = "Hehe. Mas... parece que a provação ainda vai continuar."
10047095-11 = "Certo! Encurralamos eles!"
10047095-12 = "Não há mais para onde fugir, todos se rendam!"
10047095-14 = "Ugh, e pensar que só faltava o dormitório da equipe de supervisão..."
10047095-15 = "A segurança estava... mais rigorosa do que eu pensava..."
10047095-16 = "...Hehe, após inúmeras falhas, vem um belo sucesso."
10047095-17 = "Afinal, o caminho da arte é algo íngreme."
10047095-18 = "Mesmo que não seja fácil de alcançar, sigo em frente acreditando que um dia encontrarei a resposta. #nIsso é, para a arte..."
10047095-23 = "— um desafio."
10047095-24 = "...Por isso!"
10047095-26 = "Por que tanta enrolação...! #nTodos, confirmem o flagrante—"
10047095-37 = "O que é isso? Som de um sino?"
10047095-38 = "Essa direção, não pode ser...?"
10047095-39 = "...É na direção do \"Sino Sem Nome\"."
10047095-40 = "Está tocando... o sino que anuncia a destruição—"
10047095-41 = "O sino lendário!!"
