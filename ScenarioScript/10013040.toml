[translation]
10013040-1 = "Episódio 4; Rumo ao próximo"
10013040-5 = "[ns] \"――E é basicamente isso, resolvemos um dos pontos por aqui.\""
10013040-6 = "Uhe~. Um contrato de franquia, hein... parece um bom método."
10013040-7 = "B-bem, é apenas uma decisão de negócios, sabe!"
10013040-8 = "[s] \"E então, como estão as coisas por aí?\""
10013040-9 = "Ufufu. Por aqui, também acabamos de dar uma bronca em umas crianças malvadas☆"
10013040-10 = "Sim. Neutralizamos as Sukeban de biquíni, que eram a maior dor de cabeça desta região."
10013040-12 = "Nós também pretendemos continuar avançando assim!"
10013040-13 = "Vamos continuar nos esforçando!"
10013040-14 = "[s] \"Bom trabalho. Vamos continuar nos esforçando.\""
10013040-18 = "Puxa..."
10013040-19 = "[s] \"Você está com uma cara preocupada, o que houve?\""
10013040-20 = "Ah, não... é que..."
10013040-21 = "Fiquei pensando se não acabamos empurrando nossos problemas para alunas de outras escolas...#nNão consegui parar de pensar nisso..."
10013040-22 = "[s] \"Não se preocupe com isso. Todas elas se ofereceram para ajudar.\""
10013040-23 = "É mesmo, não é?"
10013040-24 = "[s1] \"Sim. E o pessoal de Abydos é forte.\"\n[s2] \"Então, com certeza, elas vão resolver tudo.\""
10013040-27 = "……Muito obrigada. Se o Sensei diz isso, seria falta de educação da minha parte continuar preocupada."
10013040-28 = "Vou confiar nelas e deixar nas suas mãos."
10013040-29 = "[s] \"Então, qual é o próximo destino?\""
10013040-30 = "Ah, sobre isso, já decidimos."
10013040-35 = "Agora que o caso dos \"Mineiros de Enxofre em busca da fonte termal lendária\" foi resolvido, o lugar para onde devemos ir agora é――"
10013040-36 = "Aqui!"
