[translation]
10013040-1 = "第4話;次に向かって"
10013040-5 = "[ns] \"――といった具合に、こっちは一ヶ所解決したところ。\""
10013040-6 = "うへ～。フランチャイズ契約かぁ……いい方法じゃん。"
10013040-7 = "ま、まぁ、事業的な決定にすぎないけどね！"
10013040-8 = "[s] \"それで、そっちはどう？\""
10013040-9 = "うふふっ。こちらもちょうど、悪い子たちを叱ってたところです☆"
10013040-10 = "ん。この地域で一番の悩みの種だった、水着スケバンを無力化させてきたよ。"
10013040-12 = "私らもこんな感じでどんどん進めていくつもり！"
10013040-13 = "引き続き、お互い頑張りましょう！"
10013040-14 = "[s] \"お疲れ様。引き続き頑張ろう。\""
10013040-18 = "ふぅ……"
10013040-19 = "[s] \"難しい顔してるけど、どうしたの？\""
10013040-20 = "あっ、いえ……その……"
10013040-21 = "こちらの問題を他校の生徒さんに押しつけてしまったんじゃないかと……#nそんな事を考えてしまって……。"
10013040-22 = "[s] \"それなら大丈夫だよ。みんな、手伝いを名乗り出てくれたんだから。\""
10013040-23 = "そう、なんでしょうか？"
10013040-24 = "[s1] \"うん。それにアビドスのみんなは強いから。\"\n[s2] \"だからきっと、解決してくれるよ。\""
10013040-27 = "……ありがとうございます。先生がそこまで仰るのなら、悩むのは失礼ですね。"
10013040-28 = "皆さんを信じてお任せしようと思います。"
10013040-29 = "[s] \"それで、次の目的地は？\""
10013040-30 = "あっ、それでしたらもう決めてあります。"
10013040-35 = "「幻の泉脈を探す硫黄の鉱夫たち」との件が解決した今、私たちが次に向かうべき場所は――"
10013040-36 = "ここです！"
