[translation]
10027120-1 = "第12話;レッドウィンターの平凡なる一日"
10027120-3 = "ヤクモ！？"
10027120-4 = "へ、編集長……いえ、部長！？"
10027120-11 = "友情と努力と根性のストーリー……実に素晴らしかったです。#nどこかに記録でも残しておきたくなるぐらい。それで、ですが……。"
10027120-13 = "（……なんか嫌な予感。こいつが理由もなく褒めるわけないし……）"
10027120-15 = "まずは、あのときお約束した「原稿」の話をしましょうか！"
10027120-17 = "……原稿、ですか？"
10027120-18 = "えっと……これには事情があって。#nこの間、こいつに原稿の執筆を頼まれたんだよね……。"
10027120-20 = "（なんでこのタイミングで……？）"
10027120-22 = "ちゃんと覚えていたんですね！#nなので……"
10027120-23 = "メルの描いた「ルナ22巻」の原稿を、頂いていきますよ！"
10027120-28 = "えっ！？これはダメだけど！？#nこれは、モミジのために描いたものだし！"
10027120-29 = "あれぇ？でも契約書、交わしましたよねぇ？"
10027120-30 = "それは……！確かに、そうだけど……！"
10027120-31 = "[s] \"「ルナ」じゃないとダメなの？\""
10027120-32 = "ええ。メルさんの「ルナ」でなければ……"
10027120-33 = "でも私だって鬼じゃないですよぉ？著作権をくれ、と言っているわけではありません。正式に貸していただけないかと、お願いをしているのです。"
10027120-34 = "まぁ……長期譲渡になる可能性も、それなりにありますけどねぇ。"
10027120-35 = "[s] \"メルが描いた同人誌で、一体何を……？\""
10027120-36 = "そ、そうだよ！同人誌で何する気？#nまさか……出版でもするの？"
10027120-38 = "いくら私が幻の「ルナ22巻」の結末を描き上げた素晴らしい同人誌を出したとしても！そんなのアウトだからね！？"
10027120-43 = "……。"
10027120-44 = "……。"
10027120-45 = "メル先輩……。"
10027120-47 = "私、なんか変なこと言った！？"
10027120-48 = "私は常識人ですよぉ？二次創作同人原稿を作者に無断で商業出版だなんて……ダメだって分かってますよぉ。"
10027120-49 = "じゃなきゃ何？どうして私の原稿を……？"
10027120-50 = "簡単なお話です。#nまずは今回の騒ぎを振り返りましょう。"
10027120-51 = "ことの発端――メルは友人と喧嘩しました。そして仲直りをするために、自分に害となることを知りながら渡された毒を飲み干した。"
10027120-52 = "……その毒、あんたに渡されたんだけどね。"
10027120-53 = "とにかくです。メルはかの有名なシャーレの先生に助力を請い、更には犬猿の仲であるライバルとぶつかり、和解し……認められるための努力を惜しまなかった。その結果……"
10027120-54 = "あんたんとこの部長でしょ？なんとかしてくんない？"
10027120-56 = "……そう言われましても。部長は元々ああいう方です。突拍子もないことを思いついては実行する……おそらく、今回は……。"
10027120-58 = "……訪れたクライマックス、メルは自分のすべてを絞り出して作品を作り上げた……！#nまさに友情とバイオレンス、ハプニングとイベントてんこ盛りの……"
10027120-59 = "素晴らしいエンターテインメント！そう思いませんか！？"
10027120-60 = "[s] \"言われてみれば……たしかに？\""
10027120-61 = "コラ！そこ同意しない！"
10027120-63 = "そこでです。私、[ruby=あらまき]荒槇[/ruby]ヤクモは決めました。そう……実は、メルが出版部に来たその瞬間、頭の中ではすでに百年の計が立っていたのです。"
10027120-64 = "涙なしでは見られないメルの大冒険を、レッドウィンターに留まらず、キヴォトスの全生徒に売り飛ば……いえ、見てもらいたいと。"
10027120-65 = "この大騒動劇を、必ずや我が出版部の力で、「実写映画化」してみせると！！！"
10027120-70 = "……へ？"
10027120-71 = "……は？"
10027120-72 = "はい……？"
10027120-76 = "[ns] \"出版部って、そんなことまでしてるの？\""
10027120-78 = "もちろんです。昨今、出版業界と映画業界の協力は主流になってきましたから。ネット小説が映画化したり、逆に人気映画を小説化して出版したり、と。"
10027120-79 = "つまりIPの拡張は、時代の流れに応えるマストな事業手段なのです！"
10027120-81 = "流石は部長……侮れませんね。"
10027120-82 = "あんたまで感心してどうすんのよ！"
10027120-84 = "というわけで……原稿、お借りしますね。使い道は無限にあります！映画のプロモーションにも活用できそうですし……"
10027120-85 = "……おっと、そんな顔しないでください。あとでちゃんとお返ししますから。期間は少々……いえ、結構長引きそうですけどねぇ。"
10027120-86 = "ど、どれぐらい？"
10027120-87 = "映画製作が順調に進む前提で、あと1年……？いえ、2年くらいでしょうか？"
10027120-88 = "そんなに待てないわよ！ダメ！絶対！貸さない！"
10027120-89 = "そう言わずにぃ～私はそんなに信用なりませんかぁ？#n出版部の底力、しっかりお見せしますって。"
10027120-90 = "何度言っても、ダメなものはダメだから！"
10027120-91 = "そうですか……分かりました。"
10027120-92 = "あれ、すんなりと諦めてくれた……？いや、あんたっていつも大人しくなった途端、とんでもないことをするよね……"
10027120-93 = "私は鬼じゃありません。しかし、ここレッドウィンターには契約を守らない傍若無人な態度に罰を下す鬼が存在するのです！"
10027120-98 = "レッドウィンター連邦学園の校則に訴えます！#n事務局のみなさん！ここですよ！"
10027120-106 = "ここに友人との約束を守らないいけない子と……"
10027120-107 = "我が事務局を倒し逃亡した問題児がいると聞いたぞ！"
10027120-108 = "[s] \"その問題児の中に、私も入ってたりする……？\""
10027120-109 = "せ、先生！？どうしてここに……！？"
10027120-110 = "もしかして、校則を破ったいけない子って……先生のことだったのか！？"
10027120-111 = "[s] \"それは違うんだけど！\""
10027120-112 = "ふむ……残念だが、レッドウィンターの神聖な校則を破ったのなら、たとえ先生相手だとしても見逃すことはできない！"
10027120-113 = "何が何でも反省室に連れて行く！大丈夫だ！反省室なら私もよく行ってるからな！それなりに快適だ！"
10027120-114 = "[s] \"だから、違うってば！\""
10027120-116 = "事務局まで巻き込むなんて、ヤクモ、あんた……！"
10027120-117 = "契約とは、非情なものですよぉ。ムフフ。"
