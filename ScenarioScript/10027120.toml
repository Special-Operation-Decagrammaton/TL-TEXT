[translation]
10027120-1 = "Episódio 12; Um dia comum em Red Winter"
10027120-3 = "Yakumo!?"
10027120-4 = "E-Editora-chefe... não, diretora!?"
10027120-11 = "A história de amizade, esforço e determinação... foi realmente maravilhosa. #nA ponto de eu querer registrar em algum lugar. Mas, sobre isso..."
10027120-13 = "(...Sinto um mau pressentimento. Ela não me elogiaria sem motivo...)"
10027120-15 = "Primeiro, vamos falar sobre o \"manuscrito\" que você me prometeu naquela época!"
10027120-17 = "...O manuscrito?"
10027120-18 = "Bem... tem um motivo para isso. #nOutro dia, ela me pediu para escrever um manuscrito..."
10027120-20 = "(Por que agora...?)"
10027120-22 = "Você se lembrou direitinho! #nEntão..."
10027120-23 = "Vou levar o manuscrito do \"Luna Vol. 22\" que a Meru desenhou!"
10027120-28 = "Hã!? Isso não pode, né!? #nEu desenhei isso para a Momiji!"
10027120-29 = "Ora, ora? Mas nós assinamos um contrato, não assinamos?"
10027120-30 = "Isso é...! É verdade, mas...!"
10027120-31 = "[s] \"Não pode ser outro que não o 'Luna'?\""
10027120-32 = "Sim. Se não for o \"Luna\" da Meru..."
10027120-33 = "Mas eu não sou um monstro, sabe? Não estou pedindo os direitos autorais. Estou pedindo formalmente que você me empreste."
10027120-34 = "Bem... existe uma chance de ser um empréstimo de longo prazo, mas..."
10027120-35 = "[s] \"O que você vai fazer com o doujinshi que a Meru desenhou...?\""
10027120-36 = "I-Isso mesmo! O que você pretende fazer com um doujinshi? #nNão me diga que... vai publicar?"
10027120-38 = "Mesmo que eu tenha criado um doujinshi maravilhoso com o final do lendário \"Luna Vol. 22\"! Isso é proibido, sabia!?"
10027120-43 = "..."
10027120-44 = "..."
10027120-45 = "Meru-senpai..."
10027120-47 = "Eu disse algo estranho!?"
10027120-48 = "Eu sou uma pessoa sensata, sabe? Publicar comercialmente um manuscrito de doujinshi sem a permissão do autor... eu sei que isso é errado."
10027120-49 = "Então o que é? Por que quer meu manuscrito...?"
10027120-50 = "É simples. #nPrimeiro, vamos relembrar a confusão de agora pouco."
10027120-51 = "O início de tudo — Meru brigou com uma amiga. E para se reconciliar, ela bebeu o veneno que lhe deram, mesmo sabendo que lhe faria mal."
10027120-52 = "...Aquele veneno foi você quem deu, né."
10027120-53 = "De qualquer forma. Meru pediu ajuda ao famoso Sensei do Schale, enfrentou sua rival, reconciliou-se... e não poupou esforços para ser reconhecida. Como resultado..."
10027120-54 = "Ela é a diretora do seu departamento, não é? Não pode dar um jeito nisso?"
10027120-56 = "...Mesmo que me peça isso. A diretora sempre foi desse jeito. Ela tem ideias repentinas e as coloca em prática... provavelmente, desta vez..."
10027120-58 = "...No clímax, Meru deu tudo de si para criar a obra...! #nCheia de amizade, violência, acontecimentos e eventos..."
10027120-59 = "Um entretenimento maravilhoso! Não acha!?"
10027120-60 = "[s] \"Pensando bem... é verdade?\""
10027120-61 = "Ei! Não concorde com isso!"
10027120-63 = "Por isso, eu, Aramaki Yakumo, decidi. Sim... na verdade, no momento em que a Meru chegou ao Departamento de Publicação, eu já tinha um plano de cem anos na cabeça."
10027120-64 = "Quero que a grande aventura da Meru, que não pode ser vista sem lágrimas, não fique apenas em Red Winter, mas seja vendida... não, vista por todos os alunos de Kivotos."
10027120-65 = "Com o poder do nosso Departamento de Publicação, faremos uma \"adaptação cinematográfica live-action\" desta grande confusão!!!"
10027120-70 = "...Hã?"
10027120-71 = "...O quê?"
10027120-72 = "Sim...?"
10027120-76 = "[ns] \"O Departamento de Publicação faz esse tipo de coisa?\""
10027120-78 = "Com certeza. Ultimamente, a cooperação entre a indústria editorial e a cinematográfica tornou-se comum. Romances da internet viram filmes, e filmes populares viram romances publicados, por exemplo."
10027120-79 = "Ou seja, a expansão de IP é uma estratégia de negócios essencial para acompanhar os tempos!"
10027120-81 = "Como esperado da diretora... não dá para subestimá-la."
10027120-82 = "Até você está impressionada, o que está fazendo!?"
10027120-84 = "Sendo assim... vou pegar o manuscrito emprestado. As possibilidades de uso são infinitas! Também pode ser usado na promoção do filme..."
10027120-85 = "...Opa, não faça essa cara. Vou devolver depois, com certeza. O prazo vai ser um pouco... não, vai demorar bastante, na verdade."
10027120-86 = "Q-quanto tempo?"
10027120-87 = "Assumindo que a produção do filme corra bem, mais um ano...? Não, talvez uns dois anos?"
10027120-88 = "Eu não posso esperar tanto! Nem pensar! De jeito nenhum! Não vou emprestar!"
10027120-89 = "Não diga isso~ Você não confia em mim?#nVou mostrar a verdadeira força do Departamento Editorial."
10027120-90 = "Não importa quantas vezes você peça, o que é não, é não!"
10027120-91 = "Entendo... Compreendido."
10027120-92 = "Ué, ela desistiu tão fácil...? Não, você sempre faz algo absurdo assim que finge estar calma..."
10027120-93 = "Eu não sou um demônio. No entanto, aqui em Red Winter, existem demônios que punem aqueles que agem de forma arrogante e não cumprem seus contratos!"
10027120-98 = "Vou recorrer ao regulamento da Academia Federal de Red Winter!#nPessoal da Secretaria! É aqui!"
10027120-106 = "Ouvi dizer que aqui tem uma criança malcriada que não cumpre promessas com os amigos..."
10027120-107 = "E uma aluna problemática que derrotou nossa Secretaria e fugiu!"
10027120-108 = "[s] \"Será que eu também estou incluído nessa lista de alunos problemáticos...?\""
10027120-109 = "P-Sensei!? Por que você está aqui...!?"
10027120-110 = "Será que a criança malcriada que quebrou o regulamento... era o Sensei!?"
10027120-111 = "[s] \"Não é nada disso!\""
10027120-112 = "Hum... É uma pena, mas se você quebrou o sagrado regulamento de Red Winter, não posso deixar passar, mesmo que seja o Sensei!"
10027120-113 = "Vou te levar para a sala de reflexão custe o que custar! Não se preocupe! Eu vou lá com frequência, então é até que confortável!"
10027120-114 = "[s] \"Eu já disse que não é isso!\""
10027120-116 = "Envolver a Secretaria nisso, Yakumo, você...!"
10027120-117 = "Contratos são coisas impiedosas, sabe? Mufufu."
