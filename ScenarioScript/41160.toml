[translation]#[Texto revisado, mas pode haver alterações como Censura.] Em aguardo de revisão de formatação de texto. - Filipe 10/06.
41160-1 = "Episódio 16: Propina"
41160-5 = "Vocês de novo..."
41160-6 = "A 'Cachorra Louca' da Academia Policial Valkyrie..."
41160-8 = "……Meu nome é Kanna. Exijo que me tratem pelo meu título de Chefe do Escritório de Segurança Pública."
41160-9 = "Não que eu odeie o apelido, mas não me lembro de termos intimidade para nos chamarmos assim."
41160-10 = "Muito bem, Senhora Chefe da Segurança Pública, o que a traz ao nosso quintal?"
41160-11 = "Vocês têm a coragem de me fazer essa pergunta, sabendo muito bem dos crimes que estão cometendo?"
41160-12 = "Ocupação ilegal de um parque destinado ao uso civil e perturbação da paz pública... Recebi o chamado e vim enquadrar as culpadas."
41160-13 = "Ué, mas quem deu passe livre pra gente acampar aqui foi a Chefe do Escritório de Defesa. Através da Schale, mas foi ela."
41160-14 = "Desde quando a Chefe de Segurança Pública da Valkyrie rosna contra as ordens dos próprios superiores?"
41160-15 = "Acho que vocês estão sofrendo de surdez seletiva."
41160-16 = "A Chefe de Defesa jamais disse, em momento algum, que vocês 'tinham permissão para ficar neste parque'."
41160-17 = "Ela disse que 'iria congelar as medidas disciplinares contra vocês'. Somente isso."
41160-23 = "……E, para deixar claro, a gestão urbana dos parques não está sob a jurisdição do Escritório de Defesa."
41160-24 = "Trocando em miúdos: vocês vão usar a burocracia para justificar a nossa expulsão, é isso?"
41160-25 = "……Você sabe muito bem que a gente não tem teto pra onde ir."
41160-26 = "Que coração de gelo você tem, hein, Senhora Chefe?"
41160-27 = "M-Mas... por que a Segurança Pública tá agindo diretamente aqui...?"
41160-28 = "Problemas de perturbação da paz não deviam cair no colo da Guarda de Trânsito...?"
41160-33 = "Sim. Sob circunstâncias normais, sim."
41160-34 = "……Mas a nossa situação não tem nada de 'normal'."
41160-36 = "Eu não faço ideia do que tá rolando na sua cabeça, mas cê veio tentar tirar a gente na marra?"
41160-37 = "Por mim tudo bem. Só quero saber se você já esqueceu da humilhação que vocês tomaram no nosso último round."
41160-38 = "Cadete Kazekura. Eu mediria as palavras se fosse você."
41160-39 = "Os meus informantes disseram que a tempestade do outro dia afogou todo o arsenal de vocês na lama. Confere?"
41160-40 = "……"
41160-41 = "Ouvi dizer que vocês venderam sucata pra conseguir munição nova, mas... será que o que sobrou é suficiente pra segurar um ataque massivo no parque?"
41160-42 = "Desta vez, a Segurança Pública conseguiu um patrocinador e trouxe poder de fogo de sobra para varrer vocês daqui."
41160-43 = "Eu reconheço que vocês são a elite tática. Mas tática não vence de uma montanha de chumbo."
41160-50 = "A escolha é simples. Façam rápido."
41160-51 = "Baixem as armas e saiam do parque por bem, ou tentem a sorte contra nós com o que sobrou desse lixo que vocês chamam de armamento."
41160-53 = "Heh. Cê veio armada até os dentes mesmo, hein."
41160-54 = "Falta de munição não impede a gente de te mandar pro hospital de maca!"
41160-55 = "M-Mas a gente dá conta de lutar contra todo esse efetivo...?"
41160-56 = "O q-que a gente faz, Miyako-chan...?"
41160-62 = "Nós não vamos..."
41160-63 = "[s] \"Acho melhor darmos um passo para trás.\""
41160-67 = "……O Sensei da Schale? O que o senhor está fazendo aqui...?"
41160-68 = "……Fui informada pela Chefe de Defesa que a Schale assumiria o encargo do Esquadrão RABBIT."
41160-69 = "Contudo, o senhor não tem jurisdição neste caso civil. Mesmo que o senhor tente me dar uma ordem direta, a expulsão não será revogada."
41160-70 = "A reurbanização da Vila dos Coelhinhos é um projeto aprovado e inegociável."
41160-71 = "[s1] \"Eu entendo a sua posição, mas você não pode expulsar elas do dia pra noite e esperar que não haja retaliação.\"\n[s2] \"Me dê alguns dias. Dê a elas tempo para pensar no próximo passo.\""
41160-72 = "Tempo para pensar...? Elas já tiveram dias de sobra debaixo dessas lonas para entenderem a situação em que se meteram."
41160-73 = "Tempo para pensar...? Elas já tiveram dias de sobra debaixo dessas lonas para entenderem a situação em que se meteram."
41160-77 = "……Mas que seja."
41160-78 = "Como estou em dívida com a Schale... Ordenarei que as minhas tropas recuem por hoje."
41160-79 = "Mas não confunda tolerância com anistia."
41160-80 = "Eu dou a vocês até o fim do mês. Se ainda houver um único equipamento da SRT neste parque no dia do vencimento... Nós usaremos a força bruta e letal."
41160-81 = "……Nós da Segurança Pública também temos os nossos fardos para carregar."
41160-85 = "……Tropas, recuar!"
41160-95 = "Deu pra trás de novo por causa da Schale e ainda quer pagar de cachorra brava... que mico."
41160-96 = "No entanto, é inegável que a modernização do arsenal delas é real."
41160-97 = "Moe, você confirma que aqueles fuzis são da linha de produção da 'Kaiser Industry'?"
41160-99 = "Tiro e queda. Eu reconheço aquele modelo de longe."
41160-100 = "O que não entra na minha cabeça é: como que a Valkyrie, que vive de pires na mão, conseguiu grana pra comprar da Kaiser? É absurdo."
41160-101 = "Ela mencionou algo sobre um 'patrocinador'..."
41160-102 = "[s] \"……Isso cheira a corrupção e propina.\""
41160-103 = "……'Propina'?"
41160-104 = "Você tá falando daqueles esquemas ilegais de 'comissão' por baixo do pano?"
41160-105 = "Mas qual seria o sentido da 'Kaiser Industry' pagar propina militar pra Valkyrie...?"
41160-107 = "（Contei para elas o que a vendedora de Inarizushi e os rumores da rua tinham me revelado.）"
41160-110 = "……Entendo perfeitamente o esquema."
41160-111 = "A 'Kaiser Construction', responsável por demolir e reconstruir essa área, e a 'Kaiser Industry', que trafica as armas, pertencem à mesma corporação-mãe."
41160-112 = "Lavar o dinheiro entre elas é fácil. A 'Kaiser Construction' repassa parte do orçamento da obra para a 'Kaiser Industry', que converte esse dinheiro sujo em arsenal de ponta e repassa 'de graça' para a Segurança Pública..."
41160-114 = "E, como pagamento por essas armas, a Segurança Pública usa o seu poder militar para expulsar violentamente qualquer civil ou sem-teto que esteja atrapalhando a obra da Kaiser."
41160-115 = "……Mas isso é crime de corrupção explícita!"
41160-116 = "É. Máfia corporativa da pior espécie."
41160-117 = "A escola de polícia, que deveria derramar sangue pra proteger o povo... se vendeu para virar os cães de guarda de uma megacorporação."
41160-118 = "Polícia e corporação dando as mãos pra massacrar civis..."
41160-119 = "Esse mundo tá podre de vez."
41160-120 = "E a gente não tem p-poder pra mudar isso..."
41160-121 = "[s] \"Claro, tudo o que montamos agora é só especulação teórica. Precisamos de provas.\""
41160-122 = "Tem razão."
41160-123 = "Pode ser que a Segurança Pública não tenha feito acordo nenhum com a Kaiser e esse armamento tenha vindo de outra fonte obscura."
41160-125 = "Os registros fiscais da Valkyrie rodam em servidor local blindado. Tentar invadir o banco de dados do lado de fora é suicídio cibernético."
41160-126 = "Tsc, se a gente tivesse a droga de um documento que provasse esse acordo sujo..."
41160-127 = "Como a gente vai conseguir um absurdo desses...?"
41160-133 = "……Se invadirmos a sede da Valkyrie, os registros de transações ilegais devem estar fisicamente lá."
41160-138 = "Miyako, cê perdeu o juízo de vez?!"
41160-139 = "Cê tá sugerindo que a gente invada a Fortaleza da Valkyrie?! Tem centenas de cadetes armadas patrulhando aquilo ali!"
41160-140 = "Isso seria suicídio tático até com apoio aéreo!"
41160-141 = "Com os nossos recursos atuais... é 100% de chance de morte..."
41160-142 = "A gente não podia só ligar pra polícia e fazer uma denúncia anônima?"
41160-143 = "[s] \"Chamar a polícia para investigar a corrupção da própria polícia?\""
41160-144 = "……Ah, é. Os dois são da Valkyrie. Que porcaria."
41160-145 = "Existe uma organização militar superior a eles, criada justamente para investigar e intervir com força letal caso a polícia ou qualquer outra facção se corrompa..."
41160-151 = "Esse era o dever da SRT."
41160-153 = "É, a gente foi criada pra isso, né."
41160-154 = "Se não formos nós... Kivotos vai apodrecer na mão deles."
41160-155 = "Mas será que a gente deve...?"
41160-156 = "Nós nem temos mais escola... somos desertoras..."
41160-157 = "[s] \"……Se é nisso que a justiça de vocês acredita, a escola não importa. Só vão.\""
41160-159 = "……Sensei?"
41160-165 = "[ns3] \"Vão e botem pra quebrar. Se a bomba estourar e tudo der errado, a Schale assume a culpa e arquiva o caso.\"\n[ns4] \"Só prometam que não vão voltar com um buraco de bala no peito, ok?\""
41160-170 = "……O senhor é mesmo um homem muito estranho."
41160-171 = "Sensei, você tem noção do peso da palavra 'culpa' quando se trata de invasão militar num prédio do governo?!"
41160-172 = "Hah, ele é um completo imbecil irresponsável. Eu adoro."
41160-173 = "Fufu~..."
41160-178 = "Mas, graças ao seu aval, não há mais hesitação em nossos corações."
41160-179 = "……Nós somos as herdeiras do legado da SRT. A força-tarefa de intervenção brutal de Kivotos."
41160-184 = "Para manter a ordem, nós localizamos e expurgamos a corrupção..."
41160-185 = "Descarregamos todo o nosso poder de fogo no alvo sem piedade..."
41160-186 = "……E desaparecemos nas sombras antes do sangue secar."
41160-188 = "A Valkyrie se vendeu e virou capanga de uma empresa corrupta... Nenhuma lei normal vai ser capaz de puni-las."
41160-189 = "Esta é, na sua mais pura essência, uma missão de Execução da SRT."
41160-193 = "Esquadrão RABBIT, preparar para infiltração de alto risco."
41160-194 = "O objetivo primário é roubar o disco de dados com as provas de corrupção militar e financeira da Valkyrie..."
41160-196 = "Iniciando a 'Operação Trevo'!"
41160-198 = "Próximo Episódio: Operação Trevo (1)"