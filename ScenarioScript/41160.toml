[translation]
41160-1 = "Episódio 16: Propina"
41160-5 = "Você é…"
41160-6 = "O 'cão louco' da Academia Valkyrie…"
41160-8 = "…Kanna. Me chame de Chefe do Bureau, no mínimo."
41160-9 = "Não é um apelido que eu desgoste, mas não temos intimidade para apelidos."
41160-10 = "Chefe do Bureau, o que o traz aqui?"
41160-11 = "Está perguntando isso depois de saber do que fizeram?"
41160-12 = "Há indivíduos ocupando ilegalmente um parque público, causando inquietação na comunidade… vim reprimir."
41160-13 = "Dito isso, quem disse que poderíamos ficar aqui foi a Diretora do Escritório de Defesa, viu? Bem, através da Schale."
41160-14 = "A Chefe do Bureau da Valkyrie pode desobedecer ordens de superiores?"
41160-15 = "Parece que está enganada."
41160-16 = "A Diretora do Escritório de Defesa nunca disse que 'vocês podem ficar neste parque'."
41160-17 = "Ela apenas disse que 'a punição de vocês será suspensa'."
41160-23 = "…Além disso, a administração do parque não é de competência do Escritório de Defesa."
41160-24 = "Então, a Sra. está legitimamente nos exigindo que nos retiremos… é isso?"
41160-25 = "…Sabe que não temos para onde ir."
41160-26 = "Que personalidade forte, hein, Chefe do Bureau?"
41160-27 = "M-mas o Bureau viria pessoalmente…?"
41160-28 = "Questões de segurança não são de competência do Esquadrão de Segurança?"
41160-33 = "Ah, basicamente, sim."
41160-34 = "…Em circunstâncias normais."
41160-36 = "Não sei bem, mas veio nos expulsar à força?"
41160-37 = "Não me importo, mas já esqueceram o resultado da última vez?"
41160-38 = "Kazekura, é melhor escolher melhor as palavras."
41160-39 = "Ouvi dizer que na última tempestade, a maior parte do equipamento do Esquadrão RABBIT alagou."
41160-40 = "……"
41160-41 = "Também ouvi que venderam coisas usadas para comprar equipamento novo. Mas duvido que seja o suficiente para cobrir o parque todo."
41160-42 = "O Bureau, desta vez, obteve grande quantidade de armamentos com o apoio de patrocinadores."
41160-43 = "Sei que são elites, mas se conseguirão superar a desvantagem numérica é outra história."
41160-50 = "Vamos, decidam logo."
41160-51 = "Sair do parque pacificamente ou enfrentar uma batalha com essas armas de segunda categoria."
41160-53 = "Hmph, parece que está falando sério."
41160-54 = "Mesmo sem armas, posso dar uma lição em vocês."
41160-55 = "M-mas, será que dá para vencer…?"
41160-56 = "O-o que fazemos, Miyako-chan…?"
41160-62 = "Nós…"
41160-63 = "[s] \"Com licença, pode esperar um pouco?\""
41160-67 = "…Professor da Schale? O que o senhor está fazendo aqui…"
41160-68 = "…Ouvi da Diretora do Escritório de Defesa que o tratamento do Esquadrão RABBIT estava a cargo da Schale."
41160-69 = "Mas isso é outra questão. Mesmo que seja por ordem do senhor, não posso mudar de ideia."
41160-70 = "A revitalização da Vila dos Coelhinhos já foi decidida."
41160-71 = "[s1] \"Mas é complicado pedir que saiam de repente.\"\n[s2] \"Não pode dar um tempinho para elas pensarem?\""
41160-72 = "Acho que já tiveram tempo suficiente."
41160-73 = "Acho que já tiveram tempo suficiente."
41160-77 = "…Está bem."
41160-78 = "Estou em dívida com o senhor… por hoje, vou recuar."
41160-79 = "Mas não posso deixar isso indefinidamente."
41160-80 = "Grosso modo, até o fim deste mês. Se ainda estiverem aqui, serei forçada a usar a força."
41160-81 = "…Nós também temos uma 'linha a defender'."
41160-85 = "…Recuar!"
41160-95 = "Da última vez também foi por causa da Schale, e agora fala com essa arrogância."
41160-96 = "Mas parece que o armamento deles realmente estava reforçado."
41160-97 = "Moe, aquelas armas são da 'Kaiser Industry', não são?"
41160-99 = "Sim."
41160-100 = "Mesmo assim, como aquela pão-dura da Valkyrie conseguiu comprar armas da Kaiser? Não entendo."
41160-101 = "Aliás, ela disse 'patrocinadores'…"
41160-102 = "[s] \"…Propina.\""
41160-103 = "…'Propina'?"
41160-104 = "É aquele negócio de 'comissão'? Parte do que pagam volta?"
41160-105 = "Mesmo que seja, o que a 'Kaiser Industry' ganharia com isso…?"
41160-107 = "(Compartilho com o Esquadrão RABBIT o que pensei.)"
41160-110 = "…Entendo."
41160-111 = "A 'Kaiser Construction', responsável pela revitalização da Vila dos Coelhinhos, é da mesma holding que a 'Kaiser Industry'."
41160-112 = "Transferir fundos é relativamente fácil. Se os lucros que a 'Kaiser Construction' teria com a revitalização fossem antecipados como armas pela 'Kaiser Industry' e repassados ao Bureau…"
41160-114 = "E em troca, o Bureau expulsaria os andarilhos."
41160-115 = "…Isso não é ilegal?"
41160-116 = "Sim, é ilegal."
41160-117 = "Uma academia policial que deveria servir aos cidadãos trabalhando para uma empresa privada."
41160-118 = "Polícia e empresas aliadas para atacar cidadãos…"
41160-119 = "Isso não faz o menor sentido."
41160-120 = "Nós também não estamos em posição de julgar…"
41160-121 = "[s] \"Claro, ainda é especulação…\""
41160-122 = "Sim,"
41160-123 = "Não sabemos se o Bureau realmente fez negócio com a Kaiser Industry."
41160-125 = "Registros da Valkyrie… devem estar num servidor local. Hacking externo parece impossível."
41160-126 = "Droga, se tivéssemos uma prova concreta…"
41160-127 = "Tem algum jeito…"
41160-133 = "…Se nos infiltrarmos na Valkyrie, talvez haja registros das transações."
41160-138 = "Miyako, você está louca?"
41160-139 = "Quer dizer na sede da Valkyrie? Quantas pessoas você acha que tem naquela fortaleza?"
41160-140 = "Mesmo com um bom apoio, seria difícil…"
41160-141 = "Com nossa força atual, talvez…"
41160-142 = "Não podemos só denunciar?"
41160-143 = "[s] \"Um problema policial, para a polícia?\""
41160-144 = "…É mesmo. Ambos são da Valkyrie."
41160-145 = "Quando há um problema na Valkyrie, a autoridade superior para investigar…"
41160-151 = "Seria a SRT."
41160-153 = "É mesmo."
41160-154 = "Só nós podemos fazer algo… senão, ninguém mais resolve."
41160-155 = "Mas será que vai dar certo…"
41160-156 = "Do jeito que estamos, sem escola…"
41160-157 = "[s] \"…Se é nisso que vocês acreditam.\""
41160-159 = "…Professor?"
41160-165 = "[ns3] \"Vão com Deus. Se der merda, a culpa é minha.\"\n[ns4] \"Tentem não se machucar.\""
41160-170 = "…Que cara estranho."
41160-171 = "Professor, o senhor sabe o que significa 'responsabilidade'?"
41160-172 = "Hmph, sabia que era idiota."
41160-173 = "Fufu…"
41160-178 = "Mas, graças ao senhor, minha decisão está tomada."
41160-179 = "…Nós somos a SRT. A força especial acionada para crimes complexos em Kivotos."
41160-184 = "Para manter a ordem, subjugar criminosos rapidamente…"
41160-185 = "Empregar todo o poder de fogo num instante…"
41160-186 = "…e sumir antes que percebam."
41160-188 = "Que a Valkyrie esteja conspirando com uma empresa privada para agir ilegalmente… por maior que seja a probabilidade, os trâmites normais não vão esclarecer."
41160-189 = "É exatamente o tipo de missão que justifica a intervenção da SRT."
41160-193 = "Pessoal, preparem-se."
41160-194 = "Para garantir provas da propina ilegal do Bureau da Valkyrie…"
41160-196 = "Iniciaremos a 'Operação Trevo'!"
41160-198 = "Próximo Episódio: Operação Trevo (1)"