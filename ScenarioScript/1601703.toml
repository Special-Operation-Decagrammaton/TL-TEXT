[translation]
1601703-1 = "I hate this world "
1601703-2 = "（Fui até o local que a Aoba me indicou）"
1601703-8 = "[ns]\"Acho que é por aqui...\""
1601703-12 = "Ah! P-Sensei...!"
1601703-17 = "O-Obrigada por ter vindo..."
1601703-18 = "V-Você realmente veio..."
1601703-22 = "Bem! O m-motivo de eu ter chamado você hoje é..."
1601703-23 = "É a m-manutenção desta passagem de nível... Ela não para de piscar..."
1601703-24 = "Ela ativa mesmo quando não tem nenhum trem passando..."
1601703-28 = "E-Eu sei que está uma bagunça..."
1601703-29 = "[s] \"Precisamos consertar isso logo.\""
1601703-30 = "Sim. Por enquanto, vou dar uma olhada..."
1601703-35 = "Certo, a fiação está ok..."
1601703-36 = "Será que é o sensor...?"
1601703-40 = "N-Nesse caso..."
1601703-44 = "E-Ei...!"
1601703-49 = "M-Mais uma vez...!"
1601703-54 = "[ns] \"E-Ei, isso é realmente seguro!?\""
1601703-58 = "A-Aconteceu alguma coisa!?"
1601703-59 = "[s] \"É que você está batendo com força usando uma chave inglesa...\""
1601703-60 = "……？"
1601703-64 = "……Ah!"
1601703-65 = "……Bem."
1601703-66 = "A-A maioria das máquinas conserta quando a gente bate nelas..."
1601703-67 = "Hehe... Sempre fiz assim até agora..."
1601703-68 = "[s] \"……E-Entendi.\""
1601703-69 = "D-De qualquer forma... isso deve resolver..."
1601703-70 = "Se a gente enrolar muito... o próximo trem vai chegar..."
1601703-71 = "V-Vou acelerar um pouco o ritmo..."
1601703-78 = "P-Pronto, acabou...!!"
1601703-91 = "……F-Ficou silencioso."
1601703-92 = "[s] \"Será que... consertou?\""
1601703-93 = "V-Vamos observar um pouco."
1601703-96 = "（Observei a passagem de nível por um tempo junto com a Aoba...）"
1601703-100 = "（Confirmamos que ela só funciona normalmente quando o trem passa）"
1601703-103 = "……Hehe... Que bom."
1601703-104 = "[s] \"Esse método realmente funciona, hein...\""
1601703-105 = "S-Se bater não funcionasse... eu teria que tentar o plano B..."
1601703-106 = "A-Ainda bem que o plano A resolveu... Ufa."
1601703-107 = "Obrigada pelo seu trabalho duro, Sensei..."
1601703-108 = "[s1] \"Eu não ajudei muito, mas...\"\n[s2] \"Fico feliz se pude ser útil...\""
1601703-113 = "S-Sobre isso..."
1601703-114 = "Na verdade..."
1601703-115 = "E-Eu provavelmente conseguiria fazer sozinha..."
1601703-116 = "M-Mas, como o Sensei disse que eu sempre posso contar com você..."
1601703-117 = "Por isso..."
1601703-118 = "E-Eu pensei... que talvez pudesse ter um pouquinho de esperança..."
1601703-119 = "F-Fiquei surpresa... que você tenha vindo..."
1601703-120 = "U-Uuu..."
1601703-121 = "D-Desculpe te incomodar mesmo estando ocupado! Hiiya..."
1601703-125 = "[ns3] \"Obrigado por me chamar.\"\n[ns4] \"Afinal, é dever do Sensei atender aos pedidos dos alunos.\""
1601703-130 = "É, é mesmo..."
1601703-131 = "O Sensei... atende aos nossos pedidos..."
1601703-132 = "[s5] \"E-eu não sou tão perfeito assim!?\"\n[s6] \"Eu também cometo erros de vez em quando...\""
1601703-137 = "He, hehe..."
1601703-138 = "O, o Sensei também... é igual a nós, então..."
1601703-139 = "......Ah. O, obrigado por hoje!#nSe... se você quiser... de novo..."
1601703-140 = "Ehehe."
1601703-142 = "(Voltei para casa enquanto conversava sobre coisas triviais com Aoba)"
