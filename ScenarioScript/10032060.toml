[translation]
10032060-1 = "Episódio 6: Um mal-entendido absurdo"
10032060-3 = "……Por aqui."
10032060-10 = "Que estranho, ela está mais rápida do que antes. #nComo ela consegue se mover tão rápido carregando aquele cliente……"
10032060-11 = "Parece que ela deu um jeito. Bem, é a Saori Joumae, afinal de contas……"
10032060-12 = "Mas, deixando isso de lado……"
10032060-16 = "Este caminho deve levar ao estacionamento subterrâneo……"
10032060-17 = "……Precisamos alcançá-la antes que ela se encontre com os subordinados e escape."
10032060-18 = "Tem muita gente caída por aqui…… Será que eles brigaram entre si?"
10032060-19 = "Não, provavelmente foi a Saori Joumae que fez isso."
10032060-20 = "Entendo, como esperado dela……"
10032060-24 = "……Hein?"
10032060-25 = "Sozinha? Esse tanto de gente?"
10032060-26 = "[s1] \"Bem, é a Saori, afinal……\"\n[s2] \"Talvez ela esteja acostumada a lutar em lugares assim.\""
10032060-29 = "……Você conhece bastante sobre isso, Sensei."
10032060-30 = "Quem diria que você tinha conhecidos desse meio…… Bem, tratando-se do Sensei, não é de se estranhar."
10032060-31 = "……Mas, no fim das contas, nós te colocamos em uma situação difícil, né."
10032060-32 = "Dada a sua posição, Sensei, você não pode tomar partido de ninguém, certo? #nQue tal voltar agora? Não se preocupe com a gente."
10032060-33 = "……Hum?"
10032060-34 = "Como assim não pode voltar……"
10032060-35 = "[s3] \"Preciso impedir que isso vire um problema maior.\"\n[s4] \"Seria terrível se alguém inocente fosse envolvido.\""
10032060-39 = "Não é que essa é uma resposta bem a cara do Sensei!"
10032060-40 = "Bem…… é verdade."
10032060-41 = "Já vamos chegar ao estacionamento, vamos nos apressar."
10032060-42 = "Se o Don Arancino escapar, a Saori Joumae terá vencido."
10032060-43 = "Mas se conseguirmos pegá-lo antes disso, a vitória será nossa!!"
10032060-45 = "E-eu também vou dar o meu melhor!!"
10032060-56 = "[ns5] \"……Aru?\"\n[ns6] \"O que foi? Está pensando em algo?\""
10032060-59 = "N-não, nada!?"
10032060-60 = "Quer dizer…… é só que estou preocupada se tudo bem continuar assim……"
10032060-61 = "Tipo, o Sensei……"
10032060-62 = "Deveria estar fazendo o BD……"
10032060-66 = "[ns7] \"……BD?\"\n[ns8] \"……Ah.\""
10032060-69 = "Desse jeito, você não vai conseguir cumprir seu objetivo original, não é……?"
10032060-70 = "O Sensei tinha seu próprio trabalho para fazer, mas por nossa causa……"
10032060-71 = "Era para você apenas nos guiar, mas acabou se envolvendo no nosso trabalho……"
10032060-75 = "…………É, é só isso!"
10032060-76 = "Mas, pensando bem! O Sensei é nosso consultor de negócios!"
10032060-77 = "……Hein?"
10032060-78 = "Que não preciso me preocupar com o BD? #nMas, não é um trabalho importante……?"
10032060-79 = "[s9] \"Isso também é um trabalho importante para mim.\"\n[s10] \"Além disso, eu não sou o consultor de negócios de vocês?\""
10032060-82 = "…………."
10032060-83 = "……Sensei."
10032060-84 = "Fu, fufu…… Gostei disso."
10032060-85 = "Se você diz isso, então não preciso mais me conter."
10032060-86 = "Mas não se preocupe. O lema da Problem Solver 68 é retribuir qualquer favor, não importa o que aconteça."
10032060-87 = "Essa dívida, um dia, com certeza…… eu pagarei em nome da Problem Solver!"
10032060-88 = "Vamos, Sensei! Já estamos chegando no estacionamento!!"
