[translation]
10032060-1 = "第6話;とんでもない誤解"
10032060-3 = "……こっち。"
10032060-10 = "おかしいね、さっきよりも速くなってる。#nあの依頼人を連れて、こんなに早く移動できるなんて……"
10032060-11 = "何か手を打ったようね。まあ、他でもな[ruby=じょうまえ]い錠前サ[/ruby]オリなんだし……"
10032060-12 = "それより……"
10032060-16 = "この道は、地下の駐車場に繋がっているはず……"
10032060-17 = "……部下と合流して脱出される前に追いつかないと。"
10032060-18 = "やたらと人が倒れているけれど……仲間割れでもしたのかしら？"
10032060-19 = "いや、たぶん錠前サオリにやられたんだと思う。"
10032060-20 = "なるほど、流石だわ……"
10032060-24 = "……え？"
10032060-25 = "一人で？これだけの人数を？"
10032060-26 = "[s1] \"まあ、サオリだからね……\"\n[s2] \"こういう場所で戦うのには慣れてるからかな。\""
10032060-29 = "……結構詳しいんだね、先生。"
10032060-30 = "まさか、こっち方面の知り合いが居たなんて……いや、先生なら不思議じゃないか。"
10032060-31 = "……でも、やっぱり困らせたよね。"
10032060-32 = "先生の立ち場的に、どっちの味方をするわけにもいかないでしょ。#n今からでも帰るのはどう？私たちのことはいいから。"
10032060-33 = "……うん？"
10032060-34 = "そうはいかないって、どうして……"
10032060-35 = "[s3] \"騒ぎが大きくなる前に防がないと。\"\n[s4] \"もし誰かが巻き込まれたら大変だからね。\""
10032060-39 = "いや～まさに先生らしい答えだね！"
10032060-40 = "まぁ……そうだよね。"
10032060-41 = "もうすぐ駐車場に着くよ、急ごう。"
10032060-42 = "ドン・アランチーノに脱出された時点で、錠前サオリの勝ちだから。"
10032060-43 = "その前にこっちの手に渡れば、私たちの勝ちだけどね！！"
10032060-45 = "わ、私も頑張ります！！"
10032060-56 = "[ns5] \"……アル？\"\n[ns6] \"どうしたの？何か考え事？\""
10032060-59 = "う、ううん！？"
10032060-60 = "えっと……ただ、このままでいいのか心配で……"
10032060-61 = "その、先生は……"
10032060-62 = "BDを作るはずだったのに……"
10032060-66 = "[ns7] \"……BD？\"\n[ns8] \"……あっ。\""
10032060-69 = "これじゃあ、本来の目的を達成できないでしょう……？"
10032060-70 = "先生には先生の仕事があったのに、私たちのせいで……"
10032060-71 = "案内役をするつもりが、こちらの仕事に巻き込んじゃって……"
10032060-75 = "…………そ、それだけよ！"
10032060-76 = "でも、そうね！先生はうちの経営顧問なんだから！"
10032060-77 = "……え？"
10032060-78 = "BDのことは気にしなくていいって？#nでも、大切な仕事なんじゃ……"
10032060-79 = "[s9] \"これも私にとって大切な仕事だから。\"\n[s10] \"それに私は、アルたちの経営顧問なんでしょ？\""
10032060-82 = "…………。"
10032060-83 = "……先生。"
10032060-84 = "ふ、ふふっ……気に入ったわ。"
10032060-85 = "そこまで言ってくれるのなら、もう何も遠慮する必要は無いわね。"
10032060-86 = "でも、心配無用よ。便利屋68は、受けた恩を何があっても返すのが信条。"
10032060-87 = "この恩は、いつか必ず……便利屋の名にかけて！"
10032060-88 = "さあ、先生！もうすぐ駐車場に着くわよ！！"
