[translation]
80000137-1 = "Eu preciso ir até o Museu do Amor!"
80000137-2 = "（Enquanto trabalhava no Schale, senti a presença da Love.）"
80000137-3 = "（Vou dar uma olhada lá fora.）"
80000137-5 = "Beco próximo ao Schale"
80000137-10 = "……Hmm, tudo certo."
80000137-11 = "Ah, mas antes disso, preciso arrumar o cabelo……."
80000137-12 = "[ns1] \"Love!\"\n[ns2] \"É a Love!\""
80000137-18 = "Uwaaa!?#nQue susto!!"
80000137-19 = "Para com isso!#nVocê não sabe que não se deve fazer ataques surpresa!?"
80000137-20 = "E o que você está fazendo aqui? E o trabalho?"
80000137-21 = "[s] \"Senti a presença da Love!\""
80000137-22 = "O que é isso, como assim…… deixa pra lá, acho melhor nem perguntar.#nAliás, você não está feliz demais não?"
80000137-23 = "Bem, veio na hora certa."
80000137-24 = "Eu também tinha algo para te entregar."
80000137-25 = "[s3] \"Um gorro de tricô?\"\n[s4] \"Um diário de troca?\"\n[s5] \"Um álbum de formatura do fundamental?\""
80000137-29 = "Por que você iria querer essas coisas!?"
80000137-30 = "Você não sabe que dia é hoje……?#nNossa, o quanto você está ocupado?"
80000137-34 = "Não me faça ficar preocupada…… quer dizer, não é isso, toma, aqui!"
80000137-35 = "Comprei na loja de conveniência, então se contente com isso."
80000137-36 = "Eu não tive tempo nem confiança para fazer algo artesanal……."
80000137-37 = "A parte do Sensei que comprei agora pouco, deixa ver…… essa aqui é a minha…… nham……."
80000137-41 = "Nhum, nham…… é, o que você está fazendo……."
80000137-46 = "……Hmm, huff?"
80000137-47 = "[s6] \"Você se machucou em algum lugar!?\"\n[s7] \"Está com febre!?\"\n[s8] \"Está com fome!?\""
80000137-51 = "Afa, afo!!#nEu estou com um chocolate na boca, não tem como eu responder!"
80000137-52 = "Eu deveria ter comprado dois, mas não estou achando."
80000137-53 = "Será que deixei cair quando fui abordada mais cedo……?"
80000137-54 = "[s] \"Tudo bem, só o seu gesto já me deixa feliz!\""
80000137-55 = "Não pode, é o Dia dos Namorados, afinal."
80000137-56 = "Hmm……."
80000137-60 = "Eu acabei mordendo, mas tudo bem se a gente dividir esse?"
80000137-65 = "Ah, minhas mãos estão um pouco sujas, pode fazer isso para mim?"
80000137-66 = "Deve ser fácil quebrar no meio."
80000137-70 = "[ns] \"Deixa comigo!\""
80000137-71 = "Ah, puxa…… eu queria ter entregue direito."
80000137-72 = "Aqui, quebre ao meio de qualquer jeito――"
80000137-78 = "……."
80000137-79 = "Não é um aviso de trabalho?"
80000137-80 = "[s] \"Ah…… é verdade.\""
80000137-84 = "Anda logo, pode ir."
80000137-85 = "Tem alguém precisando de ajuda, não tem?"
80000137-86 = "[s] \"Desculpa, Love…… com certeza, venha me visitar de novo!\""
80000137-90 = "Ah, já entendi!#nOlhe para frente e corra! É perigoso, sabia!?"
80000137-97 = "……Francamente."
80000137-98 = "……A próxima vez, é?"
80000137-99 = "Bem, quando tivermos tempo de novo……."
80000137-100 = "Bom…… acho que vou procurar uma máquina de venda automática."
80000137-106 = "Ué?#nOnde está o chocolate……."
80000137-110 = "Até agora pouco, eu tenho certeza que o Sensei……."
80000137-111 = "……E-ele levou tudo!?"
