[translation]
1301202-1 = "Grande Investigação Despreocupada"
1301202-2 = "Distrito Central de Kivotos - 4º Distrito Comercial"
1301202-3 = "Ah, Sensei. Obrigado pelo seu trabalho duro!"
1301202-4 = "Então, recomeçando, vamos começar a patrulha de hoje!"
1301202-5 = "[s] \"Entendido. Tem algo em específico que eu deva prestar atenção?\""
1301202-6 = "Entendo, essa é uma ótima pergunta! Não há nada de especial apenas para hoje, mas se eu tivesse que dizer..."
1301202-7 = "Talvez eu já tenha mencionado antes, mas o trabalho da polícia é, basicamente, prevenir crimes e eliminar antecipadamente qualquer fator que possa causar danos aos cidadãos."
1301202-8 = "Portanto, vamos verificar e checar minuciosamente tudo o que parecer suspeito ao nosso redor!"
1301202-9 = "[s] \"Mas toda essa área parece bem pacífica...\""
1301202-10 = "Você é ingênuo, Sensei! As sementes do crime estão escondidas em toda parte!"
1301202-11 = "Dizem que investigadores veteranos conseguem sentir o cheiro de um crime mesmo em locais que parecem pacíficos à primeira vista!"
1301202-12 = "Vejamos... hum, hum, entendo. Sinto o cheiro de um caso suspeito..."
1301202-17 = "Finalmente... com isso... é...!"
1301202-18 = "Se não for... rápido... talvez..."
1301202-24 = "...Sensei, você está vendo? Ali, naquela ponta..."
1301202-25 = "Aquela pessoa... sinto uma aura suspeita."
1301202-26 = "Com um sorriso audacioso, segurando um vaso estranho com tanto cuidado..."
1301202-27 = "[s1] \"Não será apenas porque é algo frágil que ela está carregando com cuidado...?\"\n[s2] \"Não será apenas porque é algo caro que ela está tratando com cuidado...?\""
1301202-28 = "Não, para alguém carregando algo frágil, o jeito de andar está antinatural."
1301202-29 = "Não, para alguém carregando algo de luxo, o jeito de andar está antinatural."
1301202-30 = "Pelo que percebo, aquilo certamente é..."
1301202-31 = "Uma bomba, sem dúvida!"
1301202-32 = "[s] \"Uma bomba!?\""
1301202-34 = "Sim, esta área é um importante distrito administrativo de Kivotos."
1301202-35 = "Não sei se ela foi instruída por estudantes delinquentes ou se está agindo por vontade própria, mas... não há dúvida de que é um membro de um grupo terrorista mal-intencionado tentando paralisar a administração!"
1301202-36 = "Que bom que percebemos antes que se tornasse um ataque terrorista em larga escala!"
1301202-37 = "[s] \"Nesse caso, não seria melhor prender logo de uma vez...?\""
1301202-38 = "Não. No D.U., apenas possuir uma bomba não constitui um crime."
1301202-39 = "Portanto, vamos segui-la silenciosamente até que o suspeito instale a bomba e, no momento em que tentar cometer o crime, nós o prenderemos!"
1301202-40 = "Ah, o suspeito começou a se mover!"
1301202-41 = "Sensei, vamos segui-lo rapidamente!"
1301202-47 = "Hum... estranho..."
1301202-48 = "Não há sinal algum de que ela vá usar a bomba."
1301202-49 = "Até onde ela pretende ir...?"
1301202-50 = "[s] \"Será que, na verdade, ela é apenas uma cidadã comum?\""
1301202-51 = "Não, minha intuição de oficial me diz que não pode ser isso!"
1301202-52 = "Com certeza, logo agora..."
1301202-60 = "Uau!? E-ei, espere um pouco!!"
1301202-62 = "Haha, olha só, carregando um vaso que parece caro! Isso é meu agora!"
1301202-64 = "L-ladrão! Pega ladrão!"
1301202-66 = "Ah, outro suspeito... não, um criminoso!?"
1301202-67 = "A bomba foi roubada! Se não pegarmos logo..."
1301202-68 = "Você aí, pare! Se não parar, eu vou atirar!"
1301202-73 = "Depois disso, embora Kirino tenha perseguido o ladrão..."
1301202-87 = "Uuu... não acredito que, àquela distância, eu não acertei nem um tiro..."
1301202-88 = "Deixamos a pessoa escapar, mas como ela ficou abalada com os tiros, acabou descartando a bomba, então conseguimos recuperá-la em segurança!"
1301202-89 = "Bem, então, vamos examinar esta bomba novamente..."
1301202-91 = "Ora, que cheiro é este...?"
1301202-92 = "Ah, muito obrigada por terem recuperado para mim!"
1301202-93 = "Por pouco, meu precioso Nukazuke enviado da minha terra natal não foi roubado!"
1301202-94 = "Nu, nuka-zuke...!?"
1301202-95 = "Sim. Todo ano, nesta época, me enviam nuka-zuke da minha terra natal."
1301202-96 = "Ultimamente estou sem apetite... Veio na hora certa, mas por pouco não foi roubado antes que eu pudesse dar uma única mordida! Muito obrigada!"
1301202-97 = "E-então, quer dizer que não era uma bomba...?"
1301202-98 = "...Hã, bomba? Do que você está falando?"
1301202-99 = "Ah, como forma de agradecimento, vou dividir um pouco desse nuka-zuke com você. É muito gostoso!"
1301202-102 = "Ah, m-muito obrigada..."
1301202-104 = "Então não era uma bomba nem um terrorista... Sinto que perdi o fôlego..."
1301202-105 = "Minha intuição como oficial ainda precisa melhorar..."
1301202-106 = "[s3] \"Mas foi bom ter impedido o furto, não foi?\"\n[s4] \"Por acaso você está um pouco desapontada por não ser um crime...?\""
1301202-107 = "Sim, é verdade. Isso não significa que eu possa ser transferida para o Departamento de Segurança, mas, acima de tudo, consegui proteger a segurança de um cidadão."
1301202-108 = "N-não é nada disso!? Como aluna da Academia de Polícia Valkyrie, o bem-estar dos cidadãos é a minha prioridade!"
1301202-109 = "Sendo assim, este nuka-zuke é a minha medalha de honra como policial!"
1301202-110 = "No entanto... é uma quantidade considerável para eu comer sozinha..."
1301202-111 = "Ah, então que tal comermos juntos no jantar, assim que a patrulha terminar?"
1301202-113 = "Depois disso, patrulhei mais um pouco a área com Kirino e, em seguida, voltamos ao Schale para comer o nuka-zuke juntos."
1301202-114 = "...O nuka-zuke da medalha de honra estava delicioso, mas como estava um pouco salgado para comer sem arroz, acabamos saindo para comprar o jantar."
