[translation]
21050-1 = "Episódio 5; Eu sou a Aris"
21050-2 = "Millennium - Depto. de Desenvolvimento de Jogos"
21050-4 = "Hmmm, eu ainda tô preocupada..."
21050-5 = "Disfarçar essa garota como membro do nosso clube... Isso vai mesmo dar certo?"
21050-6 = "Verificando o significado de 'dar certo'... Estimando como 'uma situação sem problemas e em boas condições', afirmativo."
21050-7 = "......Não, não dá pra ser afirmativo não! Vão desconfiar da gente na hora com ela falando desse jeito!"
21050-8 = "Vamos desistir!? Isso é impossível!"
21050-10 = "Escolher a opção de desistir agora é que é impossível. Nós temos que proteger o Departamento de Desenvolvimento de Jogos de qualquer jeito."
21050-11 = "Senão, a Yuzu vai ficar sem lugar... Não podemos deixar que ela volte para o dormitório..."
21050-12 = "......"
21050-13 = "É, tem razão..."
21050-16 = "Conseguimos dar um jeito nas roupas até certo ponto, então agora só precisamos de uma arma e... fazer a matrícula dela pra pegar uma carteirinha de estudante."
21050-17 = "Deixa a carteirinha de estudante comigo, eu dou um jeito."
21050-18 = "Midori, você e a Yuzu vão ensinar a Aris a 'como falar'."
21050-19 = "E-Ensinar a como falar?"
21050-20 = "Como você disse, se ela continuar do jeito que está, as pessoas podem desconfiar."
21050-21 = "Mesmo que elas já estejam dizendo coisas do tipo 'Vocês não têm amigos, então não devem ser capazes de recrutar novos membros'..."
21050-22 = "Se por algum acaso a Yuuka perguntar para ela 'Você é realmente do Departamento de Desenvolvimento de Jogos?'..."
21050-25 = "E ela responder: 'Afirmativo. Em resposta à sua pergunta, apresento a resposta da Aris. Eu sou membro do Departamento de Desenvolvimento de Jogos'."
21050-26 = "......Se algo assim acontecer, tudo pode ir por água abaixo."
21050-27 = "Não, isso é verdade, mas..."
21050-28 = "Haa..."
21050-29 = "Não tem jeito, vou tentar fazer o que eu puder."
21050-30 = "Beleza, deixo com você então!"
21050-33 = "E-Espera um pouco!"
21050-34 = "Hmmm..."
21050-36 = "???"
21050-37 = "Ehm... Aris-chan?"
21050-38 = "Afirmativo. O nome desta unidade é, Aris."
21050-39 = "Ok, então vou te chamar de Aris-chan. Mas ensinar a como falar, hein... Parando para pensar, como as pessoas aprendem isso? Normalmente, elas aprendem naturalmente assistindo a vídeos ou imitando o que as pessoas ao redor falam, eu acho."
21050-40 = "......Hmmm. Será que tem algum programa educacional infantil solto pela internet..."
21050-43 = "(*Olhando em volta*)"
21050-44 = "?"
21050-45 = "Objeto não identificado detectado, iniciando verificação."
21050-46 = "Hm?"
21050-47 = "Ah, i-isso é...!?"
21050-51 = "Ehm... é um pouco embaraçoso, mas na verdade os jogos que nós criamos estão gravados aí dentro. Bom, eles receberam péssimas avaliações, mas..."
21050-52 = "Ah, já sei!"
21050-53 = "Ele acabou ficando em 1º lugar no Ranking de Piores Jogos, e eu não sei o que a Aris-chan vai achar dele, mas..."
21050-54 = "Aris-chan, quer tentar... jogar o nosso jogo?"
21050-55 = "Como você tem que avançar no jogo 'conversando', jogá-lo pode servir de estudo para você."
21050-56 = "......?"
21050-57 = "A intenção por trás das suas falas e ações até o momento não pode ser compreendida perfeitamente. Contudo..."
21050-58 = "......Afirmativo, Aris vai jogar o jogo."
21050-59 = "S-Sério!? E-Espera um pouquinho, eu já vou preparar tudo!"
21050-62 = "Beleza, tudo pronto!"
21050-63 = "......"
21050-66 = "Aris, iniciando o jogo..."
21050-68 = "Pelo título já dá pra ter uma ideia, mas este jogo é um RPG de fantasia com elementos de contos de fadas e cheio de cores vivas."
21050-69 = "[56cd7b]No Século Cosmos de 2354, a humanidade foi engolida pelas chamas do fogo da calamidade..."
21050-71 = "......?"
21050-72 = "É que, embora seja um jogo clássico, nós misturamos vários elementos diferentes. Se usássemos as tendências do momento sem mudar nada seria ruim, mas focar demais no clássico deixaria ele muito ultrapassado."
21050-73 = "......"
21050-74 = "Pressionando o botão..."
21050-75 = "[56cd7b]Iniciando o tutorial."
21050-77 = "[56cd7b]Primeiro, pressione o botão B para equipar a arma que está na sua frente."
21050-79 = "Botão B..."
21050-82 = "(BOOOOOOOM!!)"
21050-83 = "???"
21050-84 = "[FF6666]＜GAME OVER＞"
21050-86 = "?!?!"
21050-87 = "Ahahahaha!"
21050-89 = "Não existe nada mais chato do que uma história que dá pra prever o que vai acontecer! Na verdade, aqui você não devia ter seguido as instruções, você tinha que apertar o botão A!"
21050-90 = "Mana...? Você não tinha dito que ia fazer a carteirinha de estudante?"
21050-91 = "Eu até fui, mas como já tava tarde, não tinha ninguém lá. Vou de novo amanhã."
21050-92 = "Deixando isso de lado, mesmo olhando de novo pra isso, acho essa parte um pouco cruel demais."
21050-95 = "......"
21050-96 = "V-Vou tentar mais uma vez..."
21050-97 = "Reiniciando... Emoção impossível de explicar em texto gerada."
21050-98 = "Ah, acho que eu sei o que é! Deve ser 'interesse' ou 'expectativa', algum tipo de emoção assim!"
21050-99 = "Independentemente de como você olhe para isso, eu diria que é 'raiva' ou 'confusão'..."
21050-101 = "[56cd7b]Arma equipada."
21050-103 = "Equipamento completo..."
21050-104 = "Oh, tá indo bem. Se você continuar avançando, a cereja do bolo dos RPGs vai..."
21050-105 = "[FF6666]Você encontrou um inimigo!"
21050-107 = "!?"
21050-108 = "[56cd7b]Um Punipuni selvagem apareceu!"
21050-110 = "Tensão, excitação, interesse."
21050-111 = "Aperta o botão A! Não é mentira dessa vez!"
21050-112 = "Botão A... 'Espada Secreta - Tsubame Gaeshi: Ataca o inimigo 2 vezes'."
21050-113 = "Estou indo, contra o Punipuni..."
21050-114 = "Espada Secreta! Tsubame――"
21050-115 = "[56cd7b]BANG!"
21050-117 = "[56cd7b]O ataque acertou em cheio, morte instantânea."
21050-120 = "[FF6666]＜GAME OVER＞"
21050-122 = "?!?!"
21050-123 = "[56cd7b]Punipuni: Não importa o quanto você tenha treinado sua esgrima, você não tem o menor poder contra a minha arma de fogo... Pff."
21050-126 = "Hmmm, acho que um Punipuni falando 'pff' é um pouco não natural demais."
21050-127 = "......Eu acho que o problema não é esse."
21050-130 = "Parada de pensamento, o processamento computacional não consegue acompanhar."
21050-131 = "A-Aris-chan? Você tá bem?"
21050-132 = "......"
21050-133 = "Reboot, reiniciando o jogo."
21050-134 = "Desta vez, tentarei entender o alcance de tiro da arma para eliminar o Punipuni sem me aproximar demais."
21050-135 = "Isso, exatamente! Continue tentando sem desistir e encontre a resposta depois de muitas tentativas e erros! É esse o encanto dos jogos estilo retrô!"
21050-137 = "(2 horas depois...)"
21050-138 = "......Erro fatal detectado no sistema de processamento computacional e no sistema de comunicação."
21050-139 = "Aguenta firme, Aris, se você superar essa parte, o tão esperado clímax vai chegar!"
21050-140 = "Uuuh...!"
21050-141 = "Por mais que eu tente entender, essa de agora foi porque você não conseguiu se lembrar do termo 'herbívoro', aí você escreveu 'estado vegetativo', não foi, mana!?"
21050-142 = "No momento em que a Aris leu o texto 'Desculpe-me. Como eu estou em estado vegetativo (homem-planta), não posso falar com mulheres levianamente', ela apagou por um instante!"
21050-143 = "......Pergunta. Por que a mãe é a heroína, mas ao mesmo tempo é a esposa de uma vida passada,"
21050-144 = "E além disso, por que um amigo meio-irmão, do qual ela se separou na infância, viajou no tempo para visitar essa esposa... #n Não, para começar, o termo 'amigo meio-irmão' não está registrado no banco de dados do dicionário de Kivoto――"
21050-145 = "Erro detectado, erro detectado!"
21050-146 = "F-Fica firme, Aris-chan! Já tá quase no clímax!"
21050-147 = "......Reboot."
21050-148 = "Restaurando os processos."
21050-149 = "......Ufa."
21050-150 = "Isso é, um jogo..."
21050-153 = "Retomando a partida."
21050-155 = "(1 hora depois...)"
21050-156 = "Me, ma, ta..."
21050-158 = "Incrível, Aris! Embora os dois desenvolvedores estivessem te ajudando, você conseguiu chegar no True End em 3 horas!"
21050-159 = "I-Isso também é verdade, mas..."
21050-160 = "Será que quanto mais ela joga o jogo, mais..."
21050-161 = "Os padrões de fala da Aris-chan estão ficando cada vez mais variados...!?"
21050-164 = "Ó Herói, caso busques o meu consentimento, eu te concederei a minha afirmação."
21050-165 = "Uhum, acho... que sim?"
21050-166 = "Como ela aprendeu tudo direto do jogo, algumas coisas podem soar meio não naturais... Mas acho que melhorou muito do que quando ela só alinhava as palavras!"
21050-167 = "E-Enfim, sobre isso..."
21050-168 = "Dá um frio na barriga perguntar isso frente a frente, mas..."
21050-172 = "O-O que você achou do nosso jogo? Foi divertido!?"
21050-173 = "......"
21050-174 = "......Explicação impossível."
21050-175 = "E-Ehh!? Por que!?"
21050-176 = "......Buscando expressões similares."
21050-177 = "Carregando..."
21050-178 = "P-Por um acaso, ela tá procurando xingamentos...? Não deve ser isso, né?"
21050-179 = "......O divertimento,"
21050-180 = "Ele existe claramente..."
21050-181 = "Oooh!"
21050-182 = "Quanto mais se avança no jogo..."
21050-183 = "É como estar viajando por um mundo diferente..."
21050-184 = "Sinto como se estivesse sonhando... Quero jogar de novo..."
21050-188 = "De novo..."
21050-190 = "......"
21050-191 = "(Gota)"
21050-193 = "Eehh!?"
21050-194 = "A-Aris-chan!? Por que você tá chorando!?"
21050-195 = "Já não é óbvio!? Significa que o nosso jogo foi tão emocionante que a fez chorar!"
21050-196 = "I-Isso é meio absurdo demais... Quero dizer, era para esse jogo ser um RPG focado em comédia..."
21050-197 = "Obrigada, Aris! Em vez das palavras daqueles críticos, as suas lágrimas me deixam 100 vezes mais feliz! Ah, quero contar isso logo pra Yuzu...!"
21050-199 = "......E-Eu assisti a tudo prestando muita atenção."
21050-200 = "(Crec)"
21050-201 = "Eh? O armário abriu sozinho..."
21050-203 = "Kyaaaah! U-U-Um fantasma!?"
21050-204 = "Se acalma, Midori! Não atira o PlaySation nela! Ele já tá quase quebrando!"
21050-206 = "......"
21050-207 = "......?"
21050-208 = "Yuzu!"
21050-209 = "Yuzu-chan, a gente procurou por você em todo canto e não achou! Desde quando você tava dentro do armário?"
21050-210 = "D-Desde a hora que vocês voltaram das Ruínas..."
21050-211 = "Isso faz um tempão!? Você ficou dentro do armário esse tempo todo? Ah, por acaso foi porque você ficou com medo da Aris-chan?"
21050-212 = "Poxa, você podia pelo menos ter mandado uma mensagem no MomoTalk ou algo do tipo, eu tomei o maior susto..."
21050-213 = "Ah, Aris, é a primeira vez que você a vê, não é? Esta é a nossa presidente do Departamento de Desenvolvimento de Jogos, a Yuzu."
21050-216 = "(Desliza)"
21050-219 = "?"
21050-220 = "Ehm, isso, bem..."
21050-221 = "A, a, a..."
21050-222 = "A...?"
21050-223 = "......Obrigada."
21050-224 = "Por dizer que o nosso jogo era divertido... E por dizer que quer jogar de novo..."
21050-225 = "Por chorar... Muito, muito obrigada."
21050-226 = "???"
21050-229 = "Ser divertido, querer jogar de novo... eram essas palavras que eu sempre quis ouvir."
21050-233 = "Yuzu-chan..."
21050-235 = "Próximo Episódio; O Método para Aprender Palavras"