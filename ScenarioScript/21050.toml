[translation]#[Texto Final , mas eventualmente pode haver alterações na formatação de texto. - Filipe 29/06.]
21050-1 = "Episódio 5: Eu Sou a Aris."
21050-2 = "Millennium · Clube de Desenvolvimento de Jogos"
21050-4 = "Hmm, no fim das contas eu tô preocupada……"
21050-5 = "Disfarçar essa garota de membro do nosso clube……\nserá que vai dar certo mesmo?"
21050-6 = "Verificando o significado de \"dar certo\"……\nestima-se: \"situação em que o estado não está\nruim e nenhum problema ocorre\". Afirmativo."
21050-7 = "……Que afirmativo que nada! Com esse jeito\nde falar ela vai levantar suspeita na hora!"
21050-8 = "Vamos desistir disso!? Isso é impossível!"
21050-10 = "Desistir agora é que tá fora de cogitação.\nCuste o que custar, a gente tem que proteger\no nosso Clube de Desenvolvimento de Jogos."
21050-11 = "Senão, o lugar da Yuzu…… e voltar pro\ndormitório também tá fora de questão……"
21050-12 = "……"
21050-13 = "É…… verdade, né."
21050-16 = "A roupa já tá mais ou menos resolvida, agora\nfalta arma e…… fazer o registro de aluna\ne conseguir a carteirinha estudantil."
21050-17 = "Da carteirinha eu dou um jeito."
21050-18 = "Midori, você e a Yuzu ensinem\na Aris a \"falar\"."
21050-19 = "F-falar?"
21050-20 = "Do jeito que ela tá, como a Midori disse,\npode ser que levantem suspeita."
21050-21 = "Ainda mais que já jogaram na nossa cara: \"vocês,\nque não têm nem amigos, não têm como recrutar\nmembro novo nenhum\"……"
21050-22 = "Se, por algum acaso, a Yuuka perguntar pra ela\n\"você é mesmo do Clube de Desenvolvimento\nde Jogos?\"……"
21050-25 = "\"Afirmativo. Em resposta à sua pergunta,\napresento a réplica de Aris: sou membro\ndo Clube de Desenvolvimento de Jogos.\""
21050-26 = "……se ela soltar uma dessas,\npode botar tudo a perder."
21050-27 = "É…… isso é verdade, mas……"
21050-28 = "Haah……"
21050-29 = "Não tem jeito, vou tentar o que der pra tentar."
21050-30 = "Boa, então deixo com você!"
21050-33 = "P-peraí!"
21050-34 = "Hmmm……"
21050-36 = "???"
21050-37 = "É-é…… Aris…… né?"
21050-38 = "Afirmativo. Designação desta unidade: Aris."
21050-39 = "Tá, então vou te chamar de Aris. Mas, falando\nem ensinar a falar…… pensando bem, como será\nque se aprende isso? O normal é a pessoa ir vendo\nvídeo e imitando o que ouve, e pegar com o tempo."
21050-40 = "……Hmm. Será que tem algum programa educativo\ninfantil jogado por aí na internet……"
21050-43 = "(Olha pra um lado, olha pro outro)"
21050-44 = "?"
21050-45 = "Objeto não identificado detectado.\nIniciando verificação."
21050-46 = "Hm?"
21050-47 = "A-ah, i-isso é……!?"
21050-51 = "Bom…… é meio vergonhoso, mas na verdade tem\num jogo que a gente fez aí dentro. Só que, bom,\nele foi massacrado pela crítica."
21050-52 = "Ah, é mesmo!"
21050-53 = "Ele acabou em 1º lugar no ranking de jogo porcaria,\nentão não sei o que a Aris vai achar, mas……"
21050-54 = "Aris, o nosso jogo……\nnão quer experimentar?"
21050-55 = "Dá pra avançar nele \"conversando\", então\njogar um pouco também pode servir de estudo."
21050-56 = "……?"
21050-57 = "A intenção de tudo o que foi dito até aqui não\nposso captar por completo. Porém……"
21050-58 = "……Afirmativo. Aris vai jogar."
21050-59 = "S-sério!? P-peraí um pouquinho,\njá vou deixar tudo configurado!"
21050-62 = "Pronto, configuração concluída!"
21050-63 = "……"
21050-66 = "Aris, iniciando o jogo……"
21050-68 = "Pelo título já dá pra perceber, mas este jogo é\num RPG de fantasia clássico, cheio de cores\ne com clima de conto de fadas."
21050-69 = "[56cd7b]Ano 2354 da Era Cosmos: a humanidade\nfoi envolta nas chamas de um fogo apocalíptico……"
21050-71 = "……?"
21050-72 = "Bom, clássico até é, mas a gente misturou vários\nelementos, sabe. Só seguir a tendência não dá,\nmas se apegar demais ao clássico também envelhece,\nentão……"
21050-73 = "……"
21050-74 = "Apertando o botão……"
21050-75 = "[56cd7b]Iniciando o tutorial."
21050-77 = "[56cd7b]Primeiro, aperte o botão B\ne equipe a arma à sua frente."
21050-79 = "Botão B……"
21050-82 = "(BÃÃÃÃNG!!)"
21050-83 = "???"
21050-84 = "[FF6666]＜FIM DE JOGO＞"
21050-86 = "!?!?"
21050-87 = "Ahahahaha!"
21050-89 = "Não tem nada mais chato do que um desfecho\nque dá pra prever! Na real, aqui não é pra seguir\na instrução: é o botão A que tem que apertar!"
21050-90 = "Mana……? Você não tinha dito\nque ia fazer a carteirinha?"
21050-91 = "Fui lá, mas devia ser tarde, não tinha ninguém.\nVou de novo amanhã."
21050-92 = "Mas, deixando isso de lado, revendo agora,\nessa parte aqui eu acho meio cruel mesmo."
21050-95 = "……"
21050-96 = "V-vou começar mais uma vez……"
21050-97 = "Reiniciando…… está ocorrendo uma emoção\nimpossível de descrever em texto."
21050-98 = "Ah, essa eu acho que sei! Com certeza é \"interesse\"\nou \"expectativa\", uma emoção desse tipo!"
21050-99 = "Por qualquer ângulo isso aí é \"raiva\"\nou \"confusão\", eu acho……"
21050-101 = "[56cd7b]Arma equipada."
21050-103 = "Equipamento concluído……"
21050-104 = "Oh, que bom. Seguindo assim, vem a flor\ndo RPG, que é o combate……"
21050-105 = "[FF6666]Um encontro foi iniciado!"
21050-107 = "!?"
21050-108 = "[56cd7b]Um Punipuni selvagem apareceu!"
21050-110 = "Tensão, euforia, interesse."
21050-111 = "Aperta o botão A! Dessa vez não é mentira!"
21050-112 = "Botão A…… \"Lâmina Secreta, Revés da Andorinha:\nataca o inimigo 2 vezes\"."
21050-113 = "Lá vou eu, contra o Punipuni……"
21050-114 = "Lâmina Secreta! Andorin——"
21050-115 = "[56cd7b]BÃÃNG!"
21050-117 = "[56cd7b]O ataque acertou. Morte instantânea."
21050-120 = "[FF6666]＜FIM DE JOGO＞"
21050-122 = "!?!?"
21050-123 = "[56cd7b]Punipuni: Por mais que aprimores tua\nespada, diante da minha arma de fogo\nés impotente…… hunf."
21050-126 = "Hmm, acho que um Punipuni soltando um \"hunf\"\nrealmente fica meio sem naturalidade, né."
21050-127 = "……Não acho que o problema esteja aí."
21050-130 = "Pensamento interrompido.\nO processamento não consegue acompanhar."
21050-131 = "A-Aris? Você tá bem?"
21050-132 = "……"
21050-133 = "Reiniciando. Retomando."
21050-134 = "Desta vez, vou me esforçar pra calcular o alcance\nda arma e eliminar o Punipuni sem me aproximar\ndemais."
21050-135 = "Isso, exatamente isso! Tentar de novo sem desistir\ne, no fim da tentativa e erro, achar a resposta!\nÉ essa a paixão de um jogo com cara de retrô!"
21050-137 = "(2 horas depois……)"
21050-138 = "……Erro fatal nos sistemas de processamento\ne de expressão de intenções."
21050-139 = "Força aí, Aris, se você passar daqui\nvem o clímax tão esperado!"
21050-140 = "Uuh……!"
21050-141 = "Isso aí, olhando por qualquer lado, é culpa\nda mana: como não conseguiu lembrar do termo\n\"homem herbívoro\", foi e escreveu\n\"homem em estado vegetativo\"!?"
21050-142 = "No instante em que ela leu o texto \"Me desculpe.\nComo estou em estado vegetativo, não consigo\npuxar conversa com mulher assim de leve\",\na Aris apagou por um segundo!"
21050-143 = "……Pergunta. Por que a mãe é a heroína,\ne ao mesmo tempo é, na verdade, a esposa\nde uma vida passada,"
21050-144 = "e ainda por que, até essa esposa, vem um amigo por\nparte de outra mãe — de quem ela se separou na\ninfância — dando um salto no tempo……#nNão, pra começar, a expressão \"amigo por parte de\noutra mãe\" não consta na base de dados dos\ndicionários de Kivotos——"
21050-145 = "Erro detectado, erro detectado!"
21050-146 = "F-força, Aris! Falta pouquinho\npro clímax!"
21050-147 = "……Reiniciando."
21050-148 = "Processo recuperado."
21050-149 = "……Ufa."
21050-150 = "Então isto…… é um jogo……"
21050-153 = "Retomando."
21050-155 = "(1 hora depois……)"
21050-156 = "ma… te… me……"
21050-158 = "Você é demais, Aris! Mesmo com as duas\ndesenvolvedoras juntas, chegar no final\nverdadeiro em 3 horas!"
21050-159 = "I-isso é verdade, mas,"
21050-160 = "será que, quanto mais ela joga de verdade……"
21050-161 = "o jeito de falar da Aris vai ficando cada vez\nmais variado……!?"
21050-164 = "Ó, herói, se buscas o meu consentimento,\neu hei de concedê-lo."
21050-165 = "É, de fato…… talvez?"
21050-166 = "Como ela aprendeu direto do jogo, ainda tá um\npouco artificial talvez…… mas, comparado a quando\nela só enfileirava palavras, melhorou um montão!"
21050-167 = "A-aliás, sobre aquilo……"
21050-168 = "Perguntar isso olhando no olho\nme dá um friozinho na barriga, mas……"
21050-172 = "O n-nosso jogo, o que você achou?\nFoi divertido!?"
21050-173 = "……"
21050-174 = "……Impossível de descrever."
21050-175 = "H-heein!? Por quê!?"
21050-176 = "……Buscando expressões similares."
21050-177 = "Carregando……"
21050-178 = "S-será que ela tá procurando um xingamento……?\nNão é isso, né?"
21050-179 = "……Diversão,"
21050-180 = "isso existe, de forma inequívoca……"
21050-181 = "Oooh!"
21050-182 = "Quanto mais eu avançava no jogo……"
21050-183 = "mais era como viajar por um outro mundo……"
21050-184 = "como se eu estivesse sonhando, essa sensação……\nmais uma vez……"
21050-188 = "mais uma vez……"
21050-190 = "……"
21050-191 = "(Plóc)"
21050-193 = "Heein!?"
21050-194 = "A-Aris!? Por que você tá chorando!?"
21050-195 = "Tá na cara! É porque o nosso jogo\nfoi emocionante a esse ponto!"
21050-196 = "P-por mais que seja, não é pra tanto……\naliás, esse jogo era pra ser um RPG\nmais pro lado da comédia……"
21050-197 = "Obrigada, Aris! Mais do que a opinião de qualquer\ncrítico por aí, essas lágrimas me deixam 100 vezes\nmais feliz! Aah, quero contar pra Yuzu logo……!"
21050-199 = "……E-eu vi, vi tudinho, do começo ao fim."
21050-200 = "(Criiii——)"
21050-201 = "Hã? O armário abriu sozinho……"
21050-203 = "Kyaaaah! F-f-fantasma!?"
21050-204 = "Calma, Midori! Não joga o KivoStation!\nDessa vez ela quebra de vez!"
21050-206 = "……"
21050-207 = "……?"
21050-208 = "Yuzu!"
21050-209 = "Yuzu, depois de tanto a gente procurar e não\nachar! Desde quando você tava dentro do armário?"
21050-210 = "D-desde a hora em que todo mundo\nvoltou das Ruínas……"
21050-211 = "Faz um tempão!? Você ficou esse tempo todo dentro\ndo armário? Ah, será que foi porque ficou com\nmedo da Aris?"
21050-212 = "Era só ter avisado pelo MomoTalk, sei lá,\nlevei um susto……"
21050-213 = "A-Aris, é a primeira vez pra você, né. Essa pessoa\naqui é a Yuzu, a presidente do nosso\nClube de Desenvolvimento de Jogos."
21050-216 = "(Aproxima-se devagar)"
21050-219 = "?"
21050-220 = "Hã, ãh, é que……"
21050-221 = "A-a-a……"
21050-222 = "A……?"
21050-223 = "……Obrigada."
21050-224 = "Por dizer que o jogo foi divertido……\npor dizer que queria jogar de novo……"
21050-225 = "Por chorar por causa dele……\nde verdade, muito obrigada."
21050-226 = "???"
21050-229 = "Que foi divertido, que queria de novo……\neram essas palavras que eu sempre quis ouvir."
21050-233 = "Yuzu……"
21050-235 = "Próximo episódio: Um Jeito de Aprender a Falar."