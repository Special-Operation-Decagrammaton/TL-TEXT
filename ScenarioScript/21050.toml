[translation]
21050-1 = "Episódio 5; Eu sou a Alice"
21050-2 = "Departamento de Desenvolvimento de Jogos da Millennium"
21050-4 = "Hmm, estou preocupada..."
21050-5 = "Fingir que essa garota é um membro do nosso clube... será que isso vai dar certo mesmo?"
21050-6 = "Confirmando o significado de 'dar certo'... presumo que signifique 'uma situação em que o estado não é ruim e nenhum problema ocorreu', afirmativo."
21050-7 = "...Não, não, não dá para afirmar nada! Com esse jeito de falar, ela vai ser descoberta com certeza!"
21050-8 = "Vamos desistir disso!? Isso é impossível!"
21050-10 = "Desistir agora é que é impossível. Temos que proteger o nosso Departamento de Desenvolvimento de Jogos a todo custo."
21050-11 = "Se não fizermos isso, o lugar da Yuzu... não podemos simplesmente voltar para o dormitório..."
21050-12 = "..."
21050-13 = "É, você tem razão..."
21050-16 = "O uniforme já está mais ou menos resolvido, agora só falta a arma e... fazer o registro estudantil para conseguir a carteirinha."
21050-17 = "Sobre a carteirinha, eu dou um jeito."
21050-18 = "Midori, você e a Yuzu ensinem a Alice a 'como falar'."
21050-19 = "C-como falar?"
21050-20 = "Do jeito que ela está agora, como a Midori disse, ela pode acabar sendo descoberta."
21050-21 = "Já dizem por aí que 'vocês, que nem amigos têm, não deveriam estar recrutando novos membros'..."
21050-22 = "Se, por acaso, a Yuuka perguntar 'vocês são realmente um Departamento de Desenvolvimento de Jogos?'..."
21050-25 = "Afirmativo, apresentando a resposta da Alice à sua pergunta. Eu sou um membro do Departamento de Desenvolvimento de Jogos."
21050-26 = "...Se ela disser algo assim, tudo pode ir por água abaixo."
21050-27 = "É, você tem razão, mas..."
21050-28 = "Haa..."
21050-29 = "Não tem jeito, vamos tentar o que pudermos."
21050-30 = "Beleza, então conto com vocês!"
21050-33 = "E-espera um pouco!"
21050-34 = "Hmm..."
21050-36 = "???"
21050-37 = "E-ei, Alice...-chan?"
21050-38 = "Afirmativo. O nome desta unidade é Alice."
21050-39 = "Certo, então vou te chamar de Alice-chan. Mas, sobre o jeito de falar... pensando bem, como se aprende isso? Normalmente, acho que é algo que se aprende naturalmente assistindo a vídeos ou imitando as pessoas ao redor."
21050-40 = "...Hmm. Será que tem algum programa educativo para crianças na internet..."
21050-43 = "(Olha em volta)"
21050-44 = "?"
21050-45 = "Objeto não identificado detectado, iniciando verificação."
21050-46 = "Hm?"
21050-47 = "Ah, i-isso é...!"
21050-51 = "Bem... é um pouco vergonhoso, mas na verdade, o jogo que nós fizemos está aí dentro. Bom, ele foi muito criticado, na verdade."
21050-52 = "Ah, já sei!"
21050-53 = "Ele ficou em primeiro lugar no ranking de jogos ruins, e não sei o que a Alice-chan vai achar, mas..."
21050-54 = "Alice-chan, você não quer... jogar o nosso jogo?"
21050-55 = "Como você pode progredir enquanto 'conversa', jogar pode ser um bom exercício."
21050-56 = "...?"
21050-57 = "Não consigo compreender perfeitamente a intenção por trás das suas palavras até agora. Porém..."
21050-58 = "...Afirmativo, Alice vai jogar."
21050-59 = "S-sério!? E-espera um pouco, vou preparar tudo agora mesmo!"
21050-62 = "Pronto, tudo preparado!"
21050-63 = "..."
21050-66 = "Alice, iniciando o jogo..."
21050-68 = "Talvez você perceba pelo título, mas este jogo tem um toque de conto de fadas e é um RPG de fantasia clássico e colorido."
21050-69 = "[56cd7b]No ano 2354 da Era Cosmos, a humanidade foi envolta pelas chamas do apocalipse..."
21050-71 = "……？"
21050-72 = "Bem, embora eu diga que é o caminho clássico, na verdade estou misturando vários elementos. Não dá para seguir as tendências à risca, mas se ficar preso demais ao clássico, acaba ficando ultrapassado."
21050-73 = "……。"
21050-74 = "Vou apertar o botão……"
21050-75 = "[56cd7b]Iniciando o tutorial."
21050-77 = "[56cd7b]Primeiro, pressione o botão B para equipar a arma à sua frente."
21050-79 = "Botão B……"
21050-82 = "（CABUUUM！！）"
21050-83 = "？？？"
21050-84 = "[FF6666]＜GAME OVER＞"
21050-86 = "！？！？"
21050-87 = "Ahahahaha!"
21050-89 = "Não tem nada mais chato do que um desenrolar previsível! Na verdade, você não deveria seguir as instruções aqui, tinha que apertar o botão A!"
21050-90 = "Irmã……? Você não disse que ia fazer sua carteira de estudante?"
21050-91 = "Eu fui, mas acho que estava tarde e não tinha ninguém lá. Vou voltar amanhã."
21050-92 = "Deixando isso de lado, olhando de novo, acho que essa parte está um pouco terrível."
21050-95 = "……。"
21050-96 = "V-vou começar de novo……."
21050-97 = "Reiniciando…… uma emoção impossível de explicar em texto foi gerada."
21050-98 = "Ah, acho que sei o que é! Com certeza é algo como \"interesse\" ou \"expectativa\"!"
21050-99 = "De qualquer forma, eu acho que é \"raiva\" ou \"confusão\"……."
21050-101 = "[56cd7b]Arma equipada."
21050-103 = "Equipamento concluído……."
21050-104 = "Oh, bom. Se continuar assim, o combate, que é o ponto alto de um RPG……"
21050-105 = "[FF6666]Um encontro ocorreu!"
21050-107 = "！？"
21050-108 = "[56cd7b]Um Punipuni selvagem apareceu!"
21050-110 = "Tensão, euforia, interesse."
21050-111 = "Aperte o botão A! Dessa vez não é mentira!"
21050-112 = "Botão A…… \"Espada Secreta Tsubame Gaeshi: Ataca o inimigo duas vezes\""
21050-113 = "Lá vou eu, contra o Punipuni……"
21050-114 = "Espada Secreta! Tsubame——"
21050-115 = "[56cd7b]PÁ!"
21050-117 = "[56cd7b]O ataque acertou, morte instantânea."
21050-120 = "[FF6666]＜GAME OVER＞"
21050-122 = "！？！？"
21050-123 = "[56cd7b]Punipuni: Não importa o quanto você treine sua esgrima, diante da minha arma você é impotente…… Hmph."
21050-126 = "Hmm, acho que não soa natural o Punipuni dizer \"Hmph\"."
21050-127 = "……Acho que o problema não é esse."
21050-130 = "Parada de pensamento, o processamento de dados não está acompanhando."
21050-131 = "Ah, Alice? Você está bem?"
21050-132 = "……。"
21050-133 = "Reiniciando, recomeçando."
21050-134 = "Desta vez, vou tentar entender o alcance da arma e eliminar o Punipuni sem chegar perto demais."
21050-135 = "Isso, exatamente! Tentar repetidamente sem desistir e encontrar a resposta através de tentativa e erro! Esse é o romance dos jogos retrô!"
21050-137 = "（2 horas depois……）"
21050-138 = "……Sistema de processamento de dados e sistema de expressão de vontade com erro fatal."
21050-139 = "Força, Alice, se passar por isso, o clímax tão esperado está logo ali!"
21050-140 = "Uuu……!"
21050-141 = "Isso claramente aconteceu porque você não conseguiu lembrar da palavra \"herbívoro\" e escreveu \"vegetal humano\" por culpa da minha irmã, não foi!?"
21050-142 = "No momento em que leu o texto: 'Desculpe. Como sou um vegetal, não posso falar casualmente com mulheres', a Alice-chan perdeu a consciência por um instante!"
21050-143 = "……Pergunta. Por que a mãe é a heroína, e ainda por cima é na verdade a esposa de uma vida passada,"
21050-144 = "e por que um amigo de infância, de quem ela se separou ainda criança, viajou no tempo para encontrar essa esposa……#nNão, antes de tudo, a expressão 'amigo de infância' não está registrada no dicionário de Kivotos――"
21050-145 = "Erro detectado, erro detectado!"
21050-146 = "F-força, Alice-chan! Falta pouco para o clímax!"
21050-147 = "……Reiniciando."
21050-148 = "Recuperando processos."
21050-149 = "……Ufa."
21050-150 = "Isto é, um jogo……."
21050-153 = "Retomando."
21050-155 = "（1 hora depois……）"
21050-156 = "Ma-ma-ta-me……"
21050-158 = "Incrível, Alice! Mesmo com nós duas desenvolvendo, conseguir o final verdadeiro em 3 horas!"
21050-159 = "I-isso também, mas,"
21050-160 = "será que, quanto mais você joga……"
21050-161 = "o padrão de fala da Alice-chan está ficando cada vez mais variado……!?"
21050-164 = "Ó heroína, se buscas o meu consentimento, eu o concederei."
21050-165 = "Sim, talvez seja verdade……?"
21050-166 = "Como ela aprendeu direto do jogo, ainda pode estar um pouco artificial…… mas comparado a quando ela só listava palavras, melhorou muito!"
21050-167 = "A-a propósito, sobre isso……"
21050-168 = "Fico nervosa em perguntar isso cara a cara……"
21050-172 = "O-o que achou do nosso jogo? Foi divertido!?"
21050-173 = "……."
21050-174 = "……Inexplicável."
21050-175 = "E-ehhh!? Por quê!?"
21050-176 = "……Buscando expressões similares."
21050-177 = "Carregando……"
21050-178 = "V-você está procurando por críticas ruins……? Não é isso, né?"
21050-179 = "……A diversão,"
21050-180 = "ela, claramente existe……"
21050-181 = "Ohhh!"
21050-182 = "Quanto mais eu avanço no jogo……"
21050-183 = "É como se eu estivesse viajando por outro mundo……"
21050-184 = "Como se estivesse sonhando, essa sensação…… mais uma vez……"
21050-188 = "Mais uma vez……"
21050-190 = "……"
21050-191 = "（Sniff）"
21050-193 = "Ehh!?"
21050-194 = "A-Alice-chan!? Por que você está chorando!?"
21050-195 = "É óbvio! Significa que o nosso jogo foi emocionante a esse ponto!"
21050-196 = "I-isso é demais…… quer dizer, esse jogo deveria ser um RPG focado em comédia……."
21050-197 = "Obrigada, Alice! Essas lágrimas valem 100 vezes mais do que qualquer crítica de especialistas! Ah, mal posso esperar para contar para a Yuzu……!"
21050-199 = "……Eu, vi tudo, direitinho."
21050-200 = "（Creeeak）"
21050-201 = "Hã? O armário abriu sozinho……"
21050-203 = "Aaaaaah! U-u-um fantasma!?"
21050-204 = "Calma, Midori! Não jogue o PlayStation! Ele vai quebrar!"
21050-206 = "……."
21050-207 = "……?"
21050-208 = "Yuzu!"
21050-209 = "Yuzu-chan, a gente procurou por toda parte e não te achou! Desde quando você estava dentro do armário?"
21050-210 = "De, desde que vocês voltaram das ruínas..."
21050-211 = "Isso foi há muito tempo!? Você ficou esse tempo todo dentro do armário? Ah, será que foi porque você estava com medo da Alice-chan?"
21050-212 = "Você podia ter avisado pelo Momotalk ou algo assim, que susto..."
21050-213 = "Ah, a Alice ainda não a conhece. Essa é a nossa presidente do Clube de Desenvolvimento de Jogos, a Yuzu."
21050-216 = "(Desliza)"
21050-219 = "？"
21050-220 = "Bem, é, tipo..."
21050-221 = "A, a, a..."
21050-222 = "Ah...?"
21050-223 = "......Obrigada."
21050-224 = "Por dizer que o jogo é divertido... por dizer que quer jogar de novo..."
21050-225 = "Por ter chorado por ele... muito obrigada."
21050-226 = "？？？"
21050-229 = "Dizer que é divertido, que quer jogar de novo... essas são as palavras que eu sempre quis ouvir."
21050-233 = "Yuzu-chan..."
21050-235 = "Próximo episódio: Como aprender palavras"
