[translation]
2003605-1 = "Memórias incontáveis"
2003605-2 = "（Fui para Abydos para ajudar Serika com a limpeza）"
2003605-10 = "Você veio."
2003605-11 = "Eu disse que não precisava vir..."
2003605-12 = "Eu conseguiria fazer isso sozinha..."
2003605-13 = "Vou pegar uns doces, então sente-se, Sensei."
2003605-14 = "……Tudo bem?"
2003605-15 = "Você veio só para me ajudar a limpar mesmo...?"
2003605-16 = "Haa..."
2003605-17 = "Desse jeito, parece que eu te chamei só porque queria que você me ajudasse a limpar..."
2003605-18 = "Não era minha intenção te fazer trabalhar..."
2003605-19 = "……Hm?"
2003605-20 = "Você diz que não pensa assim?"
2003605-21 = "Depois de ouvir isso, não aceitar a sua gentileza também seria..."
2003605-22 = "……Mas, hum."
2003605-26 = "……Não adianta ser teimosa, acho que vou aceitar sua ajuda."
2003605-27 = "Em troca, que tal eu te pagar um lámen depois como agradecimento?"
2003605-28 = "Fufu, então está decidido!#nE já que disse que ia ajudar, prepare-se!#nNão vou te perdoar se fizer corpo mole!"
2003605-29 = "Então..."
2003605-30 = "Vamos começar!!"
2003605-33 = "（Comecei a limpar junto com a Serika）"
2003605-34 = "（Como as caixas já estavam guardadas, focamos em tirar o pó）"
2003605-36 = "Pronto, ficou limpo."
2003605-37 = "Bom trabalho, Sensei!"
2003605-38 = "[s1] \"Você também, Serika.\"\n[s2] \"Quando o quarto fica limpo, a gente se sente melhor, né?\""
2003605-41 = "É verdade, obrigada, Sensei.#nComo fizemos juntos, terminamos rápido."
2003605-42 = "Isso tudo é graças a você, Sensei..."
2003605-46 = "……Hm?"
2003605-47 = "[s3] \"Aquela caixa de papelão não estava ali antes, né?\"\n[s4] \"O que será que tem dentro?\""
2003605-50 = "Ah, isso..."
2003605-51 = "Esqueci de guardar."
2003605-52 = "Pensei em deixar por último e acabei esquecendo..."
2003605-56 = "……Ué?#nComo você percebeu que essa caixa não estava aqui antes, Sensei?"
2003605-57 = "Por acaso você decorou nossa sala inteira...?"
2003605-58 = "[s5] \"Só tive uma impressão.\"\n[s6] \"Não tem nada que chame tanta atenção assim.\""
2003605-61 = "Foi mal aí!#nPor não ter nada de importante!"
2003605-62 = "……Bem, isso aqui também não é nada demais."
2003605-66 = "[ns7] \"Um traje de banho...?\"\n[ns8] \"Ah, aquele de quando fomos ao resort...\""
2003605-69 = "Eu escolhi um bem fofo porque queria aproveitar, mas#ndesde então não tive chance de usar..."
2003605-70 = "Está pegando poeira no armário."
2003605-71 = "Fiquei pensando se deveria simplesmente deixar guardado..."
2003605-72 = "……Mas, no fim, achei um desperdício jogar fora."
2003605-76 = "……Eh?"
2003605-77 = "O que você disse, Sensei?"
2003605-78 = "V-você quer que eu experimente...!?"
2003605-79 = "……Agora, aqui!?"
2003605-80 = "[s9] \"Se você usar de vez em quando, não vai ficar esquecido!\"\n[s10] \"Não existe regra que diga que só pode usar na praia!\""
2003605-83 = "O que você está dizendo!?#nTraje de banho é para usar na praia ou na piscina, é óbvio!"
2003605-84 = "Nossa, você fica me provocando desse jeito..."
2003605-85 = "……Haa."
2003605-86 = "Está tudo bem, não se preocupe.#nEu não vou jogar fora."
2003605-87 = "É que, como posso dizer..."
2003605-88 = "É o traje de banho que eu usei quando fomos ao resort com todo mundo..."
2003605-89 = "O, o Sensei também disse, não disse?"
2003605-93 = "O, o..."
2003605-94 = "Uma lembrança, você disse..."
2003605-95 = "..."
2003605-96 = "............"
2003605-97 = "O, o que é isso...!?"
2003605-98 = "Que cara é essa?!"
2003605-99 = "[s11] \"Snif... estou emocionado, Serika-chan.\"\n[s12] \"Você cresceu tanto, Serika-chan...\""
2003605-102 = "Aaaaaah, chega!!"
2003605-103 = "Não me trate como criança!!"
2003605-104 = "Eu sabia que não devia ter entrado em contato!#nE não vou te pagar nenhum lámen!"
2003605-105 = "A, até quando você vai ficar rindo?!"
2003605-107 = "Chega! Eu disse para parar de rir!!"
