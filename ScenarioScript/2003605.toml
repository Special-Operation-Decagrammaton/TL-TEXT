[translation]
2003605-1 = "思い出は数え切れず"
2003605-2 = "（セリカの掃除を手伝うために、アビドスへ向かった）"
2003605-10 = "来てくれたんだ。"
2003605-11 = "来なくて大丈夫って言ったのに……。"
2003605-12 = "これくらい、別に一人でも……。"
2003605-13 = "お菓子でも持ってくるから座ってて、先生。"
2003605-14 = "……大丈夫？"
2003605-15 = "本当に掃除を手伝うためだけに……？"
2003605-16 = "はあ……。"
2003605-17 = "それだと、先生に掃除を手伝ってもらいたくて連絡したみたいじゃない……。"
2003605-18 = "手伝わせたかったわけじゃないのに……。"
2003605-19 = "……うん？"
2003605-20 = "そんな風には思ってないって？"
2003605-21 = "ここまで言われて、先生の好意を受け取らないのも……。"
2003605-22 = "……けど、う～ん。"
2003605-26 = "……意地を張っても仕方ないし、お願いしようかな。"
2003605-27 = "その代わり、今度お礼にラーメンを奢るってことでどう？"
2003605-28 = "ふふっ、じゃあ決まりね！#nあと、やるって言ったからには覚悟してよね！#n手を抜いたら許さないんだから！"
2003605-29 = "それじゃ……"
2003605-30 = "始めるわよ！！"
2003605-33 = "（セリカと一緒に掃除を始めた）"
2003605-34 = "（荷物は片付いていたため、拭き掃除が中心だった）"
2003605-36 = "よし、きれいになったわね。"
2003605-37 = "お疲れ様、先生！"
2003605-38 = "[s1] \"セリカこそお疲れ様。\"\n[s2] \"部屋がきれいになると、気分もスッキリするね。\""
2003605-41 = "そうね、ありがとう先生。#n二人でやったから、早く終わったわね。"
2003605-42 = "これも全部、先生のおかげ……"
2003605-46 = "……ん？"
2003605-47 = "[s3] \"そんなダンボール、前は無かったよね？\"\n[s4] \"何が入ってるんだろう？\""
2003605-50 = "ああ、これね……。"
2003605-51 = "片付け忘れてたわ。"
2003605-52 = "最後にやろうと思って、ついそのまま……。"
2003605-56 = "……あれ？#nなんで先生は、このダンボールが前は無かったって気づいたのよ。"
2003605-57 = "まさか、私たちの教室を完全に記憶してるの……？"
2003605-58 = "[s5] \"何となく思っただけだよ。\"\n[s6] \"そんなに目立つ物もないから。\""
2003605-61 = "悪かったわね！#n碌な物が無くって！"
2003605-62 = "……まあ、これもそんな大したものじゃないけど。"
2003605-66 = "[ns7] \"水着……？\"\n[ns8] \"あ、リゾートに行った時の……。\""
2003605-69 = "せっかくならと思って可愛い水着を選んだけど、#nあれ以来着る機会も無くって……。"
2003605-70 = "タンスの肥やしになってるのよね。"
2003605-71 = "ただ置いておくのもどうかと思ったけど……。"
2003605-72 = "……さすがに、捨てるのはもったいないかなって。"
2003605-76 = "……え？"
2003605-77 = "なんて言ったの、先生？"
2003605-78 = "き、着てみてほしい……！？"
2003605-79 = "……今、ここで！？"
2003605-80 = "[s9] \"たまに着てあげれば、肥やしにせず済むよ！\"\n[s10] \"海でしか着てはいけないルールなんて無いから！\""
2003605-83 = "なに言ってるの！？#n水着は海とかプールで着るものに決まってるでしょ！"
2003605-84 = "まったく、そうやってからかって……。"
2003605-85 = "……はぁ。"
2003605-86 = "大丈夫よ、心配しないで。#n捨てはしないから。"
2003605-87 = "その、なんと言うか……。"
2003605-88 = "みんなとリゾートに行った時の水着だし……。"
2003605-89 = "せ、先生も言ってたでしょ？"
2003605-93 = "お、お……。"
2003605-94 = "思い出、だって……。"
2003605-95 = "……。"
2003605-96 = "…………。"
2003605-97 = "な、何……！？"
2003605-98 = "何よ、その表情は！"
2003605-99 = "[s11] \"ぐすっ……感動したよ、セリカちゃん。\"\n[s12] \"立派になったね、セリカちゃん……。\""
2003605-102 = "あああああああっ、もう！！"
2003605-103 = "子供扱いしないで！！"
2003605-104 = "やっぱり連絡しなきゃ良かった！#nラーメンも奢ってあげないんだから！"
2003605-105 = "い、いつまで笑ってるのよ！"
2003605-107 = "もう！笑わないでってば！！"
