[translation]
51090-1 = "第9話;[ruby=ふわ]不破[/ruby]レンゲ"
51090-2 = "……なんであんたがここにいるんだ？"
51090-3 = "[ruby=みども]身共[/ruby]はレンゲ先輩を探して、文化部を回っていたのです！"
51090-4 = "ですが、まさか修行部の皆様とご一緒だったとは……"
51090-6 = "レンゲちゃんは、以前から修行部を体験してみたいと言っていたので。"
51090-7 = "ふぁああ～……それで今……体験入部中、なの……すぅ……"
51090-8 = "これはアレだ！#n私が撮った修行部の宣伝映像が役に立ったって事だね！"
51090-9 = "お二人はお知り合いだったんですね。#nそういえば、同じ水色の羽織……"
51090-10 = "あ！本当だ！レンゲ先輩も百花繚乱なの？"
51090-12 = "あぁ……そ、そうだよ。"
51090-13 = "いや、隠そうとしてたわけではないんだけど……"
51090-14 = "青春活動のために様々な部活の体験入部をされているのですよね？"
51090-15 = "……っっ！？"
51090-16 = "ま、待て。ユカリ、なんであんたがそれを……！"
51090-17 = "レンゲ先輩を探して、先輩のご自宅へ伺いましたの！"
51090-18 = "扉に「青春の旅に出る」という紙が残されておりましたので……"
51090-23 = "レンゲ先輩が体験入部をされているとお聞きして、そういうことなのではないかと……"
51090-24 = "[s] \"部活動はたしかに青春だもんね。\""
51090-25 = "ええ！"
51090-26 = "青春への憧憬……身共も感動いたしました。"
51090-27 = "ああもう！そんなに連呼しないでくれ！"
51090-28 = "誰だってそういう置き手紙を残したくなる時があるだろ……"
51090-29 = "学生時代はあっという間に過ぎていくから気をつけろ――っていうし。"
51090-30 = "[s] （誰かに言われたのかな……）"
51090-31 = "あーいや、恥ずかしがる事でもないんだが…… "
51090-36 = "……そうだよ。あんたの言う通り、アタシは青春を送るために修行部に入ったんだ。"
51090-37 = "今まで鍛錬の日々で失ってきた青春を……#nアタシの青春を取り戻すために！"
51090-38 = "……だからユカリ。あんたが何でアタシを探してるのかは知らないけど、もう決めたんだ。この修行部で、アタシは青春を送るって。だから大人しく帰っ――"
51090-40 = "修行部での青春活動がどのようなものなのか、身共も気になりますわ！"
51090-41 = "アタシの話、ちゃんと聞いてたか！？"
51090-42 = "レンゲ先輩がここまでなさるほどの事ですもの……#n身共も気になります！"
51090-43 = "だ、だから、アタシの青春活動は……"
51090-44 = "その……"
51090-50 = "そ、そうだ！修行部でアタシは、「熟睡レディーファイター」になるための修行をやってるんだよ！"
51090-57 = "ふぇ？"
51090-58 = "ふぁあ……？"
51090-59 = "レンゲちゃん……そんな目標を持っていたのですね！？"
51090-60 = "[s] \"……眠りながら戦うってこと？\""
51090-65 = "な、何だっていいだろ！"
51090-66 = "青春には変わりないんだから！"
51090-68 = "そ……そんな……"
51090-69 = "たしかにユカリから見たら変な事かもしれないが……"
51090-70 = "す……素晴らしいですの！目標に向かって真っ直ぐ駆け抜けていくお姿！"
51090-71 = "流石は身共が尊敬するレンゲ先輩ですわ！"
51090-72 = "えっ……う、うん？"
51090-77 = "キキョウ先輩はこのことをご存じでしょうか？"
51090-78 = "きっとキキョウ先輩なら全力で応援――"
51090-80 = "するわけないだろ！アイツは絶対笑うに決まってるし、むしろ一番知られたくないんだけど！？"
51090-81 = "そ、それより！アタシに何か用なのか？"
51090-82 = "……へ？"
51090-83 = "へ、じゃないだろ……"
51090-84 = "そもそも、百花繚乱の活動は休止中だろ？"
51090-85 = "それに、あんたは今お祭りの準備で一番忙しいんじゃ……"
51090-87 = "わーわー！！！"
51090-88 = "[s] \"……？\""
51090-89 = "こほんっ！レンゲ先輩を探していたのには、もちろん理由がありますの。"
51090-90 = "身共は、これよりナグサ先輩に「百花繚乱継承戦」を申し込もうと思っております。"
51090-91 = "ですから……レンゲ先輩のお力をお借りしたいのです。"
51090-96 = "…………は？継承戦？"
51090-97 = "一体……どういうつもりだ？"
51090-99 = "（私たちはレンゲに、陰陽部であったことやユカリの考えを話した）"
51090-101 = "キキョウ先輩の仰る通りでしたの！"
51090-102 = "ナグサ先輩は大雪原におりました……！"
51090-104 = "…………。"
51090-106 = "ですから、身共は百花繚乱を元に戻すべく――"
51090-107 = "「継承戦」でナグサ先輩を倒し……"
51090-108 = "委員長の座を受け継いでみせますの！"
51090-113 = "…………。"
51090-114 = "レンゲ先輩、一緒に帰りましょう。"
51090-115 = "キキョウ先輩のいる百花繚乱に！そして継承戦の証人として――"
51090-116 = "ユカリ……お前はまだ……"
51090-117 = "まだそんな……"
51090-118 = "ええ！"
51090-123 = "そん[ruby=たわごと]な戯言を[/ruby]言ってるのか。"
51090-128 = "……えっ。"
51090-129 = "お前も知っての通り、百花繚乱にはすでに「解散令」が出されている。"
51090-130 = "キキョウ自ら、参謀の権限を使って決断したんだ。"
51090-131 = "そんな……百花繚乱が解散令を……？#nえっと、それは……"
51090-132 = "[s] \"ミモリ、これにはちょっと複雑な事情があって……\""
51090-134 = "そ、そんなはずありませんわ！"
51090-135 = "解散令など、すべて間違いで……！"
51090-137 = "――間違いなんかじゃない。"
51090-142 = "アヤメ委員長が姿を消したあの日から……いつかはこうなる運命だったんだよ。 "
51090-143 = "委員長はたしかにすごい人だ……だが、あんたも含めてみんな、いつ委員長がいなくなってもおかしくないと思っていただろう？"
51090-144 = "……！"
51090-145 = "座を受け継ぐべきナグサ先輩は、残されたアタシたちには目もくれず委員長を探しに行ってしまった。"
51090-146 = "あの時点で、百花繚乱は終わってたんだ。"
51090-148 = "そんなこと……ありませんわ！"
51090-149 = "そ、それに……レンゲ先輩ご自身が、百花繚乱はまだ終わっていないと証明してくださったじゃないですか！"
51090-150 = "レンゲ先輩は先ほども[ruby=すだまいちざ]魑魅一座[/ruby]に立ち向かってくださりました！あれは、百花繚乱としての責任を……"
51090-152 = "それはユカリの勘違いだ。"
51090-158 = "あれはアタシの青春を邪魔しようとしたヤツらをしばいただけ。アタシはアタシのために戦った。"
51090-160 = "レンゲちゃん……。"
51090-161 = "……。"
51090-163 = "そ、それでは……百花繚乱がいなくなってしまったら、#n百鬼夜行の平和は……"
51090-164 = "ハッ……それこそ[ruby=うぬぼれ]自惚れ[/ruby]だったんだよ。"
51090-165 = "[s] \"どういうこと……？\""
51090-166 = "シャーレの先生、だったな。"
51090-167 = "空が赤くなった日の事を覚えてるか？"
51090-168 = "……！"
51090-173 = "あのとき、百鬼夜行は本当にめちゃくちゃだった。"
51090-174 = "街に怪物が現れた、あの日――百花繚乱を呼ぶ声がそこかしこから聞こえてきたよな。"
51090-175 = "だが、委員長も副委員長も不在のアタシたちは、目の前の人を助けるだけで手一杯で、それ以上のことなんて何もできなかった。"
51090-176 = "アタシもキキョウも……ユカリ、あんたも。#nどうにか事態を収拾しようと駆け回ったよな。"
51090-177 = "アタシたちが動いた結果、何が変わったか覚えてるか？"
51090-178 = "[s] \"……どうなったの？\""
51090-179 = "――何も。#n何一つ……変わらなかったんだよ。"
51090-185 = "あんたも当事者だったから分かるだろ。百花繚乱がいなくたって問題は解決した。#n――百鬼夜行に、百花繚乱は必要ない。"
51090-186 = "そう……あのとき百花繚乱が居なかったことで証明されてしまった[ruby=・   ・]事実[/ruby]がこれだ。"
51090-188 = "委員長が居なかろうが、副委員長が居なかろうが……百花繚乱が解散したって何一つ百鬼夜行は変わらない。誰もアタシたちを必要としていないんだ。"
51090-190 = "それなら、こんな風に…… "
51090-191 = "帰ってこない委員長を待ち続けて苦しむ必要も……無いだろ？"
51090-192 = "ですが……それでも！"
51090-193 = "れ、レンゲ先輩だって……ナグサ先輩や、百花繚乱での活動が好きだったじゃないのですか！？"
51090-195 = "レンゲは優秀な子。私みたいな半人前なんかよりも、ずっと。"
51090-196 = "そんなレンゲを誇らしく思ってる。#nね、ユカリもそう思うでしょ？"
51090-197 = "ええ！ "
51090-198 = "ユカリ、今のはナグサ先輩よりもレンゲが優秀だって言ってるんだけど。"
51090-199 = "ハッ……！？"
51090-200 = "ちょっ！聞いてるこっちが恥ずかしくなるからやめてくれないか！？"
51090-201 = "アタシより強いナグサ先輩に言われても素直に喜べないって！"
51090-208 = "……ふふっ。"
51090-210 = "いつも先陣を切って道を開くレンゲ先輩を……#nナグサ先輩は誇りに思っていたのに……！"
51090-211 = "……！！"
51090-212 = "知るか！結局アタシたちは見放されたんだよ！"
51090-213 = "過去は過去だ。#nナグサ先輩はもう帰ってこない……それどころか……"
51090-214 = "あの人は……を返却しようとしたんだ。それでもあんたは……！"
51090-215 = "[s] （レンゲはなんて言ったんだろう……？）"
51090-216 = "ですが……"
51090-217 = "今が苦しくないとは言いません……それでもナグサ先輩が戻ってきて、また皆様と集まれたら……"
51090-218 = "身共が「継承戦」で勝つことができれば……#n身共の気持ちを、ナグサ先輩に分かっていただければ……もう一度、あの日々を……！"
51090-219 = "きっと……あの時みたいに……笑えると……"
51090-221 = "……ユカリは昔からそうだったよな。#n自分が正しいと思ったら、ひたすらにまっすぐ突き進む。"
51090-223 = "いつだって自信に溢れていて……その気になれば、何だってできると思っていてさ。"
51090-224 = "本当に――自分を曲げないヤツだ。"
51090-227 = "会話だけじゃなく、真っ向からぶつからないと納得しないのも……相変わらずだな。"
51090-231 = "こうなったら、力尽くで分からせてやるよ。"
51090-235 = "ユカリ……覚悟はいいか？"
