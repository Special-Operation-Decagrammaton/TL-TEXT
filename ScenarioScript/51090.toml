[translation]
51090-1 = "Episódio 9; Fuwa Renge"
51090-2 = "......Por que você está aqui?"
51090-3 = "Eu estava visitando os clubes culturais procurando por você, Renge-senpai!"
51090-4 = "Mas, nunca imaginei que você estaria com o Clube de Treinamento..."
51090-6 = "A Renge-chan já tinha dito que queria experimentar o Clube de Treinamento."
51090-7 = "Fuaaa~... Então ela está... participando como experiência... zzz..."
51090-8 = "Ah, é isso! #n Isso quer dizer que o vídeo promocional do Clube de Treinamento que eu gravei foi útil!"
51090-9 = "Vocês duas se conhecem, né? #n Falando nisso, estão com o mesmo haori azul-claro..."
51090-10 = "Ah! É verdade! A Renge-senpai também é da Hyakkaryouran?"
51090-12 = "Ah... s-sim."
51090-13 = "Não é que eu estivesse tentando esconder, mas..."
51090-14 = "Você está visitando vários clubes para experimentar as atividades da juventude, não é?"
51090-15 = "......!?"
51090-16 = "E-Espera aí. Yukari, como você sabe disso...!"
51090-17 = "Fui à sua casa procurando por você, Renge-senpai!"
51090-18 = "Havia um papel na porta dizendo 'Vou em uma jornada da juventude'..."
51090-23 = "Quando ouvi que você estava participando de experiências em clubes, achei que era isso que você queria dizer com..."
51090-24 = "[s] \"As atividades de clube certamente são parte da juventude.\""
51090-25 = "Sim!"
51090-26 = "Sua admiração pela juventude... eu também fiquei emocionada."
51090-27 = "Ah, caramba! Pare de repetir isso toda hora!"
51090-28 = "Todo mundo tem momentos em que quer deixar um bilhete assim..."
51090-29 = "E sempre dizem, 'Cuidado que os anos de estudante passam num piscar de olhos'."
51090-30 = "[s] (Será que alguém disse isso para ela...?)"
51090-31 = "Aah, não, não é algo do qual eu devesse me envergonhar... "
51090-36 = "......É verdade. Como você disse, eu entrei no Clube de Treinamento para aproveitar a minha juventude."
51090-37 = "A juventude que perdi em dias de treinamento até agora... #n Para recuperar a minha juventude!"
51090-38 = "......Por isso, Yukari. Não sei por que você está me procurando, mas eu já decidi. Eu vou viver minha juventude aqui neste Clube de Treinamento. Então, volte quiet――"
51090-40 = "Também estou curiosa para saber como são as atividades de juventude no Clube de Treinamento!"
51090-41 = "Você ouviu alguma coisa do que eu disse!?"
51090-42 = "Para a Renge-senpai chegar a este ponto... #n eu também quero saber!"
51090-43 = "P-Por isso, minhas atividades da juventude são..."
51090-44 = "Ehm..."
51090-50 = "I-Isso mesmo! No Clube de Treinamento, estou treinando para me tornar a 'Lutadora do Sono Profundo'!"
51090-57 = "Eh?"
51090-58 = "Fuaa...?"
51090-59 = "Renge-chan... você tinha esse objetivo!?"
51090-60 = "[s] \"......Você quer dizer lutar dormindo?\""
51090-65 = "T-Tanto faz!"
51090-66 = "Ainda é juventude!"
51090-68 = "I... isso..."
51090-69 = "Claro, pode parecer estranho do ponto de vista da Yukari, mas..."
51090-70 = "É... maravilhoso! Sua postura correndo diretamente em direção ao seu objetivo!"
51090-71 = "Como esperado da Renge-senpai que eu admiro!"
51090-72 = "Eh... a-ah?"
51090-77 = "A Kikyou-senpai sabe disso?"
51090-78 = "Com certeza a Kikyou-senpai te apoiaria com todas a as forç――"
51090-80 = "Claro que não! Ela com certeza vai rir, e na verdade é quem eu menos quero que saiba!?"
51090-81 = "D-Deixando isso de lado! O que você quer comigo?"
51090-82 = "......Eh?"
51090-83 = "Não vem com 'Eh'..."
51090-84 = "Pra começo de conversa, as atividades da Hyakkaryouran estão suspensas, não estão?"
51090-85 = "Além disso, você deve estar super ocupada agora com os preparativos para o festival..."
51090-87 = "Waa-waa!!!"
51090-88 = "[s] \"......?\""
51090-89 = "*Ahem*! Claro que há um motivo para eu estar te procurando, Renge-senpai."
51090-90 = "A partir de agora, pretendo desafiar a Nagusa-senpai para uma 'Batalha de Sucessão da Hyakkaryouran'."
51090-91 = "Por isso... gostaria de contar com a sua ajuda, Renge-senpai."
51090-96 = "............Hã? Batalha de sucessão?"
51090-97 = "Mas que diabos... você tá pensando em fazer?"
51090-99 = "(Nós contamos à Renge o que aconteceu no Clube Yin-Yang e os pensamentos da Yukari)"
51090-101 = "O que a Kikyou-senpai disse estava certo!"
51090-102 = "A Nagusa-senpai estava no campo de neve...!"
51090-104 = "............"
51090-106 = "Portanto, para eu trazer a Hyakkaryouran de volta――"
51090-107 = "Vou derrotar a Nagusa-senpai na 'Batalha de Sucessão'..."
51090-108 = "E assumir a posição de presidente!"
51090-113 = "............"
51090-114 = "Renge-senpai, vamos voltar juntas."
51090-115 = "Para a Hyakkaryouran onde a Kikyou-senpai está! E como testemunha da batalha de sucessão――"
51090-116 = "Yukari... você ainda..."
51090-117 = "Ainda..."
51090-118 = "Sim!"
51090-123 = "Ainda tá falando essa besteira?"
51090-128 = "......Eh."
51090-129 = "Como você sabe, o 'Decreto de Dissolução' já foi emitido para a Hyakkaryouran."
51090-130 = "A própria Kikyou usou sua autoridade como estrategista para tomar essa decisão."
51090-131 = "Não pode ser... a Hyakkaryouran emitir um decreto de dissolução...? #n Ehm, isso..."
51090-132 = "[s] \"Mimori, a situação é um pouco complicada...\""
51090-134 = "I-Isso não pode ser verdade!"
51090-135 = "O decreto de dissolução e coisas assim, é tudo um erro...!"
51090-137 = "――Não é um erro."
51090-142 = "Desde aquele dia em que a Presidente Ayame desapareceu... era o nosso destino acabar assim."
51090-143 = "A presidente é realmente uma pessoa incrível... mas todos, inclusive você, achavam que ela poderia desaparecer a qualquer momento, não achavam?"
51090-144 = "......!"
51090-145 = "A Nagusa-senpai, que deveria assumir o cargo, saiu em busca da presidente sem dar a mínima para nós que ficamos."
51090-146 = "Naquele momento, a Hyakkaryouran acabou."
51090-148 = "Isso não... é verdade!"
51090-149 = "A-Além disso... a própria Renge-senpai provou que a Hyakkaryouran ainda não acabou!"
51090-150 = "A Renge-senpai enfrentou a Trupe Sudama agora há pouco! Aquilo foi a responsabilidade da Hyakkaryouran..."
51090-152 = "Isso é um mal-entendido seu."
51090-158 = "Aquilo foi só eu batendo nas pessoas que tentaram atrapalhar a minha juventude. Eu lutei por mim mesma."
51090-160 = "Renge-chan......"
51090-161 = "......"
51090-163 = "E-Então... se a Hyakkaryouran desaparecer, #n a paz da Hyakkiyako vai..."
51090-164 = "Hah... isso sim é presunção nossa."
51090-165 = "[s] \"Como assim...?\""
51090-166 = "Você é o Sensei da Schale, né."
51090-167 = "Você se lembra do dia em que o céu ficou vermelho?"
51090-168 = "......!"
51090-173 = "Naquele momento, a Hyakkiyako estava um caos total."
51090-174 = "Aquele dia, quando os monstros apareceram na cidade―― podíamos ouvir vozes chamando a Hyakkaryouran por todos os lados, não podíamos?"
51090-175 = "Mas nós, sem a presidente e sem a vice-presidente, mal conseguíamos ajudar as pessoas na nossa frente, não conseguíamos fazer nada além disso."
51090-176 = "Eu, a Kikyou... e você também, Yukari. #n Corremos de um lado para o outro tentando resolver a situação."
51090-177 = "Você se lembra do que mudou como resultado das nossas ações?"
51090-178 = "[s] \"......O que aconteceu?\""
51090-179 = "――Nada. #n Absolutamente nada... mudou."
51090-185 = "Você também estava envolvida, então sabe. Os problemas se resolveram mesmo sem a Hyakkaryouran. #n ――A Hyakkiyako não precisa da Hyakkaryouran."
51090-186 = "É... esse é o [ruby=·   ·   ·   ·]fato[/ruby] que foi provado pela ausência da Hyakkaryouran naquela época."
51090-188 = "Com ou sem presidente, com ou sem vice-presidente... A dissolução da Hyakkaryouran não vai mudar absolutamente nada na Hyakkiyako. Ninguém precisa de nós."
51090-190 = "Então, não há necessidade... "
51090-191 = "De continuar sofrendo esperando por uma presidente que nunca vai voltar... não é?"
51090-192 = "Mas... mesmo assim!"
51090-193 = "V, você também... amava as atividades com a Nagusa-senpai e a Hyakkaryouran, não é!?"
51090-195 = "A Renge é uma garota excepcional. Muito mais do que alguém inexperiente como eu."
51090-196 = "Eu sinto orgulho dessa Renge. #n Né, Yukari, você também acha, não é?"
51090-197 = "Sim! "
51090-198 = "Yukari, eu acabei de dizer que a Renge é melhor do que a Nagusa-senpai, ouviu."
51090-199 = "Hah...!?"
51090-200 = "Ei! Dá pra parar com isso, me dá vergonha de ouvir!"
51090-201 = "Mesmo vindo da Nagusa-senpai, que é mais forte do que eu, não consigo ficar feliz com isso!"
51090-208 = "......Fufu."
51090-210 = "A Nagusa-senpai sentia muito orgulho... #n da Renge-senpai, que estava sempre na vanguarda abrindo caminho...!"
51090-211 = "......!!"
51090-212 = "Não me importa! No fim das contas, fomos abandonadas!"
51090-213 = "O passado é passado. #n A Nagusa-senpai não vai voltar... pior ainda..."
51090-214 = "Ela... estava tentando devolver aquilo. E você ainda...!"
51090-215 = "[s] (O que será que a Renge quis dizer...?)"
51090-216 = "Mas..."
51090-217 = "Não direi que não é doloroso agora... mesmo assim, se a Nagusa-senpai voltar e pudermos nos reunir com todas de novo..."
51090-218 = "Se eu conseguir vencer a 'Batalha de Sucessão'... #n Se a Nagusa-senpai entender meus sentimentos... poderemos ter aqueles dias de novo...!"
51090-219 = "Com certeza... poderemos sorrir... como naquela época..."
51090-221 = "......A Yukari sempre foi assim. #n Quando decide que algo está certo, segue em frente sem hesitar."
51090-223 = "Sempre cheia de confiança... acreditando que pode fazer qualquer coisa se quiser."
51090-224 = "Você realmente―― não se deixa dobrar."
51090-227 = "E que você não se contenta só com palavras, mas precisa bater de frente... isso também não mudou."
51090-231 = "Sendo assim, vou te fazer entender à força."
51090-235 = "Yukari... está pronta?"
