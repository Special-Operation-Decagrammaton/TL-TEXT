[translation]
51090-1 = "Episódio 9; Fuwa Renge"
51090-2 = "……Por que você está aqui?"
51090-3 = "Eu estava procurando pela Renge-senpai e passei por todos os clubes culturais!"
51090-4 = "Mas eu nunca imaginei que você estivesse com o pessoal do Clube de Treinamento……"
51090-6 = "A Renge-chan disse que queria experimentar como é o Clube de Treinamento há algum tempo."
51090-7 = "Fuaaa…… Por isso agora…… estou participando como membro experimental…… zzz……"
51090-8 = "Isso é ótimo!#nSignifica que o vídeo promocional do Clube de Treinamento que eu fiz foi útil!"
51090-9 = "Então vocês duas se conhecem. #nAgora que você mencionou, esse haori azul claro……"
51090-10 = "Ah! É verdade! A Renge-senpai também é do Hyakkiyako Ryoran?"
51090-12 = "Ah…… S-sim, é isso mesmo."
51090-13 = "Não que eu estivesse tentando esconder, mas……"
51090-14 = "Você está participando de vários clubes como membro experimental para viver sua juventude, não é?"
51090-15 = "……!?"
51090-16 = "E-espere. Yukari, por que você sabe disso……!"
51090-17 = "Eu fui até a sua casa procurando por você, senpai!"
51090-18 = "Havia um bilhete na porta dizendo: \"Partindo em uma jornada pela juventude\"……"
51090-23 = "Ouvi dizer que a Renge-senpai estava participando de clubes experimentais, então imaginei que fosse isso……"
51090-24 = "[s] \"Participar de clubes é realmente uma forma de viver a juventude, né.\""
51090-25 = "Sim!"
51090-26 = "O anseio pela juventude…… Eu também fiquei comovida."
51090-27 = "Ah, chega! Não precisa ficar repetindo isso!"
51090-28 = "Todo mundo tem momentos em que quer deixar um bilhete desses, não tem?……"
51090-29 = "Dizem que os tempos de estudante passam num piscar de olhos, então é bom aproveitar."
51090-30 = "[s] (Será que alguém disse isso para ela……)"
51090-31 = "Ah, não, não é como se fosse algo vergonhoso……"
51090-36 = "……É isso mesmo. Como você disse, eu entrei no Clube de Treinamento para viver minha juventude."
51090-37 = "Para recuperar a juventude que perdi durante todos esses dias de treinamento……#nPara recuperar a minha juventude!"
51090-38 = "……Então, Yukari. Não sei por que você está me procurando, mas já decidi. Vou viver minha juventude neste Clube de Treinamento. Então, volte para casa quietinha――"
51090-40 = "Eu também estou curiosa para saber como são as atividades de juventude no Clube de Treinamento!"
51090-41 = "Você ouviu o que eu disse!?"
51090-42 = "Se a Renge-senpai se deu ao trabalho de fazer tudo isso……#nEu também estou curiosa!"
51090-43 = "E-então, as minhas atividades de juventude são……"
51090-44 = "Bem……"
51090-50 = "I-isso mesmo! No Clube de Treinamento, estou treinando para me tornar uma \"Lutadora Dama do Sono Profundo\"!"
51090-57 = "Hã?"
51090-58 = "Fuaa……?"
51090-59 = "Renge-chan…… Então você tinha esse objetivo!?"
51090-60 = "[s] \"……Você quer dizer lutar enquanto dorme?\""
51090-65 = "N-não importa o que seja!"
51090-66 = "Ainda conta como juventude!"
51090-68 = "I-isso é……"
51090-69 = "Pode parecer estranho para você, Yukari, mas……"
51090-70 = "É…… É maravilhoso! Ver você seguindo em frente em direção ao seu objetivo!"
51090-71 = "Como esperado da Renge-senpai, a quem eu tanto respeito!"
51090-72 = "Ah…… S-sim?"
51090-77 = "A Kikyou-senpai sabe disso?"
51090-78 = "Tenho certeza de que a Kikyou-senpai apoiaria você com tudo――"
51090-80 = "Claro que não apoiaria! Ela com certeza riria de mim, e é a última pessoa que eu quero que saiba disso!?"
51090-81 = "M-mais importante! Você tem algum assunto comigo?"
51090-82 = "……Hã?"
51090-83 = "Não é bem um 'ei'..."
51090-84 = "Para começar, as atividades do Hyakkaryouran estão suspensas, não estão?"
51090-85 = "Além disso, você não está super ocupada com os preparativos do festival agora...?"
51090-87 = "Uau, uau!!!"
51090-88 = "[s] \"……?\""
51090-89 = "Ehem! Existe, é claro, um motivo para eu estar procurando pela veterana Renge."
51090-90 = "Eu pretendo desafiar a veterana Nagusa para a 'Batalha de Sucessão do Hyakkaryouran' a partir de agora."
51090-91 = "Por isso... eu gostaria de pedir a ajuda da veterana Renge."
51090-96 = "…………Hã? Batalha de sucessão?"
51090-97 = "O que... o que você está pensando?"
51090-99 = "（Nós contamos para Renge sobre o que aconteceu no Departamento Yin-Yang e sobre o que Yukari estava pensando）"
51090-101 = "A veterana Kikyou estava certa!"
51090-102 = "A veterana Nagusa estava na Grande Planície Nevada……!"
51090-104 = "…………."
51090-106 = "Por isso, eu pretendo restaurar o Hyakkaryouran――"
51090-107 = "Derrotar a veterana Nagusa na 'Batalha de Sucessão'..."
51090-108 = "E assumir o posto de presidente!"
51090-113 = "…………."
51090-114 = "Veterana Renge, vamos voltar juntas."
51090-115 = "Para o Hyakkaryouran, onde a veterana Kikyou está! E como testemunha da Batalha de Sucessão――"
51090-116 = "Yukari... você ainda..."
51090-117 = "Ainda está dizendo essas..."
51090-118 = "Sim!"
51090-123 = "Que bobagens você está dizendo?"
51090-128 = "……Ah."
51090-129 = "Como você bem sabe, uma 'Ordem de Dissolução' já foi emitida para o Hyakkaryouran."
51090-130 = "A própria Kikyou tomou essa decisão usando sua autoridade como estrategista."
51090-131 = "Não pode ser... O Hyakkaryouran recebeu uma ordem de dissolução...?#nBem, isso é..."
51090-132 = "[s] \"Mimori, isso tem um contexto um pouco complicado...\""
51090-134 = "I-isso é impossível!"
51090-135 = "Uma ordem de dissolução, tudo isso deve ser um erro...!"
51090-137 = "――Não é erro nenhum."
51090-142 = "Desde aquele dia em que a presidente Ayame desapareceu... era o destino que isso acontecesse algum dia."
51090-143 = "A presidente era, de fato, uma pessoa incrível... mas todos, inclusive você, não achavam que seria estranho se ela desaparecesse a qualquer momento?"
51090-144 = "……!"
51090-145 = "A veterana Nagusa, que deveria ter herdado o posto, saiu para procurar a presidente sem nem olhar para nós que ficamos para trás."
51090-146 = "Naquele momento, o Hyakkaryouran já tinha acabado."
51090-148 = "Isso não é... verdade!"
51090-149 = "E além disso... a própria veterana Renge provou que o Hyakkaryouran ainda não acabou!"
51090-150 = "A veterana Renge enfrentou a Trupe Chimi agora mesmo! Aquilo foi uma responsabilidade como parte do Hyakkaryouran..."
51090-152 = "Isso é um mal-entendido da Yukari."
51090-158 = "Aquilo foi só eu dando uma surra em quem tentou atrapalhar a minha juventude. Eu lutei por mim mesma."
51090-160 = "Renge-chan..."
51090-161 = "……."
51090-163 = "E-então... se o Hyakkaryouran desaparecer, #na paz de Hyakkiyako..."
51090-164 = "Hah... isso sim era pura presunção."
51090-165 = "[s] \"O que você quer dizer...?\""
51090-166 = "Sensei de Schale, não é?"
51090-167 = "Você se lembra do dia em que o céu ficou vermelho?"
51090-168 = "……!"
51090-173 = "Naquela época, Hyakkiyako estava um verdadeiro caos."
51090-174 = "Naquele dia em que monstros apareceram na cidade... vozes clamando pela Hyakka Ryoran podiam ser ouvidas por toda parte, não podiam?"
51090-175 = "Mas, sem a presidente ou a vice-presidente, nós estávamos ocupadas demais tentando salvar as pessoas à nossa frente e não conseguimos fazer nada além disso."
51090-176 = "Eu, Kikyou... e você, Yukari. #nNós corremos para todos os lados tentando resolver a situação, não foi?"
51090-177 = "Você se lembra do que mudou como resultado das nossas ações?"
51090-178 = "[s] \"……O que aconteceu?\""
51090-179 = "――Nada. #nAbsolutamente nada... mudou."
51090-185 = "Você também estava lá, então sabe bem. O problema foi resolvido mesmo sem a Hyakka Ryoran. #n――Hyakkiyako não precisa da Hyakka Ryoran."
51090-186 = "É isso... o fato que foi provado pelo simples fato de a Hyakka Ryoran não estar lá naquela época é este."
51090-188 = "Não importa se a presidente está ausente, ou se a vice-presidente não está... mesmo que a Hyakka Ryoran se dissolva, Hyakkiyako não muda em nada. Ninguém precisa de nós."
51090-190 = "Sendo assim, desse jeito..."
51090-191 = "Não há necessidade de continuar sofrendo enquanto espera por uma presidente que não vai voltar, certo?"
51090-192 = "Mas... mesmo assim!"
51090-193 = "Re-Renge-senpai também... você não gostava das atividades com a Nagusa-senpai e a Hyakka Ryoran!?"
51090-195 = "Renge é uma garota talentosa. Muito mais do que alguém como eu, que não passa de uma aprendiz."
51090-196 = "Tenho orgulho de uma Renge como ela. #nEi, Yukari, você também pensa assim, não é?"
51090-197 = "Sim!"
51090-198 = "Yukari, o que ela acabou de dizer é que a Renge é mais talentosa que a Nagusa-senpai."
51090-199 = "Hã...!?"
51090-200 = "Ei! Pare com isso, eu fico com vergonha só de ouvir!"
51090-201 = "Não dá para ficar feliz honestamente quando a Nagusa-senpai, que é mais forte que eu, diz isso!"
51090-208 = "……Fufu."
51090-210 = "A Nagusa-senpai tinha orgulho da Renge-senpai, que sempre estava na linha de frente abrindo caminho...!"
51090-211 = "……!!"
51090-212 = "Que se dane! No fim das contas, fomos abandonadas!"
51090-213 = "O passado é passado. #nNagusa-senpai não vai mais voltar... e além disso..."
51090-214 = "Aquela pessoa tentou devolver... Mesmo assim, você..."
51090-215 = "[s] (O que será que a Renge disse...?) "
51090-216 = "Mas..."
51090-217 = "Não vou dizer que não é doloroso agora... mas se a Nagusa-senpai voltasse e pudéssemos nos reunir com todos novamente..."
51090-218 = "Se eu conseguir vencer a \"Batalha de Sucessão\"... #nSe eu conseguir fazer a Nagusa-senpai entender meus sentimentos... poderemos viver aqueles dias mais uma vez...!"
51090-219 = "Tenho certeza... que poderíamos sorrir... como naquela época..."
51090-221 = "……Yukari, você sempre foi assim. #nQuando acredita que algo é o certo, você segue em frente sem hesitar."
51090-223 = "Sempre cheia de confiança... achando que, se quiser, pode fazer qualquer coisa."
51090-224 = "Você é realmente... alguém que não se curva."
51090-227 = "Não é só na conversa, você também não se convence a menos que nos enfrentemos de frente... como sempre."
51090-231 = "Já que chegamos a esse ponto, vou te fazer entender à força."
51090-235 = "Yukari... está preparada?"
