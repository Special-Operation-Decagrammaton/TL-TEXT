[translation]
2003805-1 = "Vida Saudável Diária"
2003805-2 = "Além de me apresentar o restaurante, você ainda vai pagar a conta...?"
2003805-3 = "Sinto que estou sempre recebendo favores seus."
2003805-4 = "[s1] \"Não precisa se preocupar com isso.\"\n[s2] \"Eu conheço bem Shanhaijing!\""
2003805-7 = "Nesse caso, aceitarei gentilmente a sua oferta, Sensei."
2003805-8 = "Obrigada, Sensei."
2003805-9 = "Com licença, poderia nos trazer o cardápio?"
2003805-14 = "……Ah. Sim, aqui está."
2003805-15 = "……?"
2003805-19 = "(……Ela parece um pouco estranha, não acha?)"
2003805-20 = "(A voz dela não tem energia, e a expressão também...)"
2003805-21 = "(Pensando bem, é hora do almoço, mas o restaurante está tão vazio...)"
2003805-25 = "[ns] \"Já decidiu o que vai querer, Tomoe?\""
2003805-29 = "Bem... tudo parece tão delicioso que estou indecisa."
2003805-34 = "[ns] \"Ufa, estou satisfeito.\""
2003805-35 = "Fufu."
2003805-36 = "Você comeu com muito gosto, foi um prazer ver."
2003805-37 = "Eu também acabei comendo demais."
2003805-38 = "[s] \"Com licença, a conta, por favor.\""
2003805-39 = "Com certeza. #nDiga-me, o que achou do sabor...?"
2003805-40 = "Eu estava querendo perguntar isso há algum tempo..."
2003805-41 = "Há algo que esteja te preocupando?"
2003805-42 = "N-não. Peço desculpas por incomodá-lo com minhas preocupações. #nSe a comida estava saborosa, para mim já é o suficiente."
2003805-43 = "Se quiser, pode me contar o que está acontecendo."
2003805-44 = "Na verdade..."
2003805-45 = "Ultimamente, o número de clientes diminuiu muito."
2003805-46 = "Você tem alguma ideia do porquê?"
2003805-47 = "……Sim, acho que é por causa da televisão. #nO programa vai começar agora, veja."
2003805-49 = "É o quadro Vida Saudável Diária! #nVocês sabiam?"
2003805-50 = "Depois de comer, vocês já sentiram o coração acelerado, o corpo pesado, #nazia ou mal-estar, não já?"
2003805-51 = "Para descobrir o motivo, nós fomos investigar!"
2003805-52 = "E então... para nossa surpresa, descobrimos que a comida chinesa é a culpada!"
2003805-53 = "Dizem que nas ruas estão chamando de \"Síndrome da Comida Chinesa\"!"
2003805-54 = "Dizem que é por causa da grande quantidade de sal, banha e especiarias."
2003805-55 = "Embora ainda seja uma hipótese, comer comida chinesa demais pode acumular gordura nas veias, #ncansar o corpo e até causar dores musculares!"
2003805-56 = "Além disso, pode levar à destruição da família e da sociedade—"
2003805-61 = "……Peço perdão."
2003805-62 = "Eu não consegui continuar assistindo..."
2003805-63 = "Ultimamente, esse boato de que comida chinesa faz mal à saúde tem se espalhado."
2003805-64 = "Então é por isso que você está passando por dificuldades. #nNo caminho para cá, notei que as ruas estavam bem desertas..."
2003805-65 = "[s] \"Vamos verificar como está a cidade.\""
2003805-67 = "Como esperado, há pouquíssimas pessoas por aqui."
2003805-68 = "Neste horário de almoço, deveria estar muito mais movimentado."
2003805-69 = "……."
2003805-70 = "Eu decidi, Sensei."
2003805-71 = "[s] \"O-o que você decidiu...?\""
2003805-72 = "Eu sempre tomei cuidado para não interferir #nem problemas de outras escolas, tanto quanto possível."
2003805-73 = "Mas, depois de ter sido tão bem recebida com comida chinesa tantas vezes..."
2003805-74 = "Não posso simplesmente ignorar esse problema."
2003805-75 = "Concordo..."
2003805-76 = "Por enquanto, vamos em direção à praça."
2003805-78 = "[ns3] \"Chegamos na praça, mas...\"\n[ns4] \"O que você pretende fazer...?\""
2003805-81 = "Fufu, é o seguinte..."
2003805-82 = "Um discurso de rua!"
2003805-83 = "[s] \"Um discurso de rua...!?\""
2003805-84 = "Sim, se eu contar a \"verdade\" para todos..."
2003805-85 = "A má reputação da culinária chinesa certamente desaparecerá."
2003805-86 = "Então, vou começar imediatamente!"
2003805-92 = "(Tomoe começou a discursar no meio da praça)"
2003805-94 = "Povo de Shanhaijing, que tarde maravilhosa. #nJá almoçaram?"
2003805-95 = "Hoje, vim aqui para contar a verdade a todos vocês."
2003805-96 = "Ultimamente, parece que está se espalhando o boato de que a culinária chinesa não faz bem à saúde."
2003805-97 = "Por exemplo, dizem que o coração dispara, que se sentem mal, e por aí vai..."
2003805-98 = "Escutem bem, pessoal. #nTudo isso não passa de boatos infundados!"
2003805-103 = "Mas, não é verdade que banha de porco faz mal à saúde...?"
2003805-104 = "Ouvi dizer que causa arteriosclerose também..."
2003805-106 = "Certamente, entendo o que querem dizer. #nMas, se me ouvirem, vocês vão entender!"
2003805-107 = "Primeiro, a banha de porco é uma excelente fonte de vitaminas e minerais! #nAlém disso, ela tem mais ácidos graxos insaturados do que a carne bovina ou ovina, ajudando na manutenção da saúde!"
2003805-108 = "Apesar de ter cerca de um terço do colesterol da manteiga, ela pode ser aplicada em diversos ingredientes!"
2003805-109 = "Por exemplo, é usada até em bolos lunares, não é? #nEm Red Winter, comemos banha de porco salgada no pão! #nÉ um alimento essencial para sobreviver ao frio!"
2003805-110 = "Pessoal, pensem com calma. #nAté hoje, vocês sofreram algum problema de saúde por comer banha de porco?"
2003805-112 = "(Depois disso, Tomoe explicou, um por um, os motivos pelos quais a culinária chinesa não faz mal à saúde)"
2003805-114 = "...A má fama da culinária chinesa é uma conspiração do quadro de saúde daquele programa!"
2003805-115 = "Em quem vocês vão acreditar? #nNo meu desejo de que apenas se lembrem das qualidades da culinária chinesa? #nOu em um programa malicioso que tenta lucrar explorando o coração das pessoas!?"
2003805-120 = "A culinária chinesa é, na verdade, boa para a saúde..."
2003805-121 = "Nós fomos enganados..."
2003805-122 = "Pensando bem, a gente come isso há tempos, né?"
2003805-123 = "Verdade! #nSe a culinária chinesa fizesse mal, já teria acontecido algo com a gente há muito tempo!"
2003805-124 = "Vou comer comida chinesa depois de muito tempo!"
2003805-125 = "É isso aí!"
2003805-131 = "[ns5] \"I-incrível...!\"\n[ns6] \"Todo mundo foi para a rua da culinária chinesa!\""
2003805-135 = "Minha oratória ainda não perdeu o jeito."
2003805-136 = "[s] \"Mas no meio do caminho, não virou um papo de que era bom para a saúde?\""
2003805-137 = "Fufu."
2003805-138 = "Cobrir mentiras com outras mentiras é o básico da propaganda."
2003805-140 = "(Depois disso, a rua da culinária chinesa bateu seu recorde histórico de vendas)"
2003805-141 = "(O boato se espalhou ainda mais, e um pequeno boom de culinária chinesa aconteceu por todo o Kivotos)"
