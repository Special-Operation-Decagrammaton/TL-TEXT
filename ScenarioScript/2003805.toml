[translation]
2003805-1 = "毎日健康生活"
2003805-2 = "お店を紹介してくださっただけでなく、ご馳走までしてくださるとは……。"
2003805-3 = "何だか、ずっとお世話になっておりますね。"
2003805-4 = "[s1] \"気にしなくて大丈夫だよ。\"\n[s2] \"これでも山海経のことは詳しいから！\""
2003805-7 = "でしたら、ここは素直に先生のご厚意をお受けしましょう。"
2003805-8 = "ありがとうございます、先生。"
2003805-9 = "すみません、メニューを頂けませんか？"
2003805-14 = "……あっ。はい、こちらになります。"
2003805-15 = "……？"
2003805-19 = "（……少し様子がおかしいですね？）"
2003805-20 = "（声に元気がありませんし、顔色も……）"
2003805-21 = "（そういえば、昼食の時間帯なのに客入りが……）"
2003805-25 = "[ns] \"トモエは決まった？\""
2003805-29 = "そうですね……どれも美味しそうで迷ってしまいます。"
2003805-34 = "[ns] \"ふぅ、お腹いっぱいだね。\""
2003805-35 = "ふふっ。"
2003805-36 = "本当に美味しそうに召し上がっていましたね。"
2003805-37 = "私も、つい食べすぎてしまいました。"
2003805-38 = "[s] \"すみません、お会計お願いします。\""
2003805-39 = "かしこまりました。#nその、味のほうはどうでしたか……？"
2003805-40 = "先ほどから気になっていたのですが……。"
2003805-41 = "何か心配事でもあるのでしょうか？"
2003805-42 = "い、いえ。お客様に気を遣わせてしまい、申し訳ありません。#n美味しく召し上がっていただけたなら、それで充分です。"
2003805-43 = "私でよければ、お話を聞かせてもらえませんか？"
2003805-44 = "実は……。"
2003805-45 = "最近、お客さんが減ってしまいまして。"
2003805-46 = "原因に心当たりはありますか？"
2003805-47 = "……はい、テレビの影響だと思います。#nちょうどコーナーが始まりそうですね。"
2003805-49 = "毎日健康生活のコーナーです！#n皆さんは知っていましたか？"
2003805-50 = "食後、心臓がドキドキしたり体が重くなったり、#n胸焼けを起こしたり気分が悪くなった経験はありますよね？"
2003805-51 = "その理由を探るべく、私たちは取材をしてきました！"
2003805-52 = "すると……なんと驚いたことに、中華料理が原因だと分かったのです！"
2003805-53 = "巷では、「中華料理症候群」と呼ばれているのだとか！"
2003805-54 = "多量の塩分やラード、香辛料が含まれているから、だそうです。"
2003805-55 = "まだ仮説ですが、中華料理を食べ過ぎると血管に脂が溜まり、#n疲れが取れず筋肉痛になる恐れも！"
2003805-56 = "さらに、家庭や社会までも崩壊し――"
2003805-61 = "……申し訳ありません。"
2003805-62 = "もう、見ていられず……。"
2003805-63 = "最近、中華料理は健康に良くないという話が広まってるんです。"
2003805-64 = "それで、大変な思いをしているのですね。#nお店に来る途中も、人通りが少なかったような……。"
2003805-65 = "[s] \"街の様子を確認してみよう。\""
2003805-67 = "やはり、そもそも人が少ないですね。"
2003805-68 = "お昼時なら、本来もっと賑わっているはず。"
2003805-69 = "……。"
2003805-70 = "決めました、先生。"
2003805-71 = "[s] \"な、何を……？\""
2003805-72 = "他学園の問題には、#n可能な限り干渉しないよう気をつけておりました。"
2003805-73 = "ですが、中華料理で何度もおもてなしを受けたというのに……。"
2003805-74 = "この問題を見過ごすわけにはいきません。"
2003805-75 = "そうですね……。"
2003805-76 = "とりあえず、広場に向かいましょう。"
2003805-78 = "[ns3] \"広場まで来たけど……。\"\n[ns4] \"何をするつもりなの……？\""
2003805-81 = "ふふっ、それはですね……。"
2003805-82 = "街頭演説です！"
2003805-83 = "[s] \"街頭演説……！？\""
2003805-84 = "はい、私が皆さんに「真実」を語れば……。"
2003805-85 = "中華料理に対する悪いイメージは、必ず消えることでしょう。"
2003805-86 = "では、すぐに始めます！"
2003805-92 = "（トモエが広場の真ん中で演説を始めた）"
2003805-94 = "山海経の皆さん、素敵な午後ですね。#nお食事はもうお済みですか？"
2003805-95 = "本日、私は皆さんに真実をお伝えするために来ました。"
2003805-96 = "近頃、中華料理が体に良くない、という噂が広がっているようですね。"
2003805-97 = "たとえば、心臓がドキドキしたり、気分が悪くなったり、と……。"
2003805-98 = "良いですか、皆さん。#nこれらは、すべてデマに過ぎません！"
2003805-103 = "でも、ラードが体に悪いのは本当なんじゃ……？"
2003805-104 = "動脈硬化を進めるとも聞いたけど……。"
2003805-106 = "たしかに、仰りたいことは分かります。#nですが、私の話を聞いていただければ、分かってもらえるでしょう！"
2003805-107 = "まず、ラードはビタミンやミネラルの優れた供給源なのです！#nそのうえ、牛肉や羊肉よりも不飽和脂肪酸が多く、健康維持に役立ちます！"
2003805-108 = "バターの約3分の1のコレステロールにもかかわらず、様々な食材に応用が可能！"
2003805-109 = "たとえば、月餅にも使われていますよね？#nレッドウィンターではラードを塩漬けしたものを、パンに挟んで食べています！#n寒さを乗り切るための、大切な食品です！"
2003805-110 = "皆さん、冷静に考えてみてください。#nこれまでラードを口にしてきたせいで、健康被害を受けましたか？"
2003805-112 = "（その後もトモエは、中華料理が体に悪くない理由を一つひとつ説明していった）"
2003805-114 = "……中華料理の悪評が流れているのは、#nあの番組の健康コーナーによる陰謀なのです！"
2003805-115 = "皆さんは、どちらを信じますか？#nただ中華料理の良さを思い出してほしいという私の気持ちですか？#nそれとも、人の心に付け込んで利益を得ようとする悪辣な番組ですか！？"
2003805-120 = "中華料理って、むしろ健康に良かったんだ……。"
2003805-121 = "私たち、騙されてたんだね……。"
2003805-122 = "そもそも、ずっと食べてきたじゃん？"
2003805-123 = "たしかに！#nもし中華料理が体に悪いんだったら、とっくに何か起きてるはずだよ！"
2003805-124 = "久しぶりに、中華料理を食べるとするか！"
2003805-125 = "それだ！"
2003805-131 = "[ns5] \"す、すごい……！\"\n[ns6] \"みんな中華料理通りに向かったね！\""
2003805-135 = "私の話術も、まだまだ衰えていませんね。"
2003805-136 = "[s] \"でも途中から、逆に健康に良いって話になってたような？\""
2003805-137 = "ふふっ。"
2003805-138 = "嘘を嘘で塗りつぶしてしまうのは、プロパガンダの基本ですよ。"
2003805-140 = "（その後、中華料理通りは過去最高の売上記録を更新した）"
2003805-141 = "（噂はさらに広まり、キヴォトス中でちょっとした中華料理ブームが起こった）"
