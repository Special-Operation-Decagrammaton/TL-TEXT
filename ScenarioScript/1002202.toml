[translation]
1002202-1 = "Um passeio na praia com a Presidente"
1002202-5 = "……Sensei."
1002202-6 = "[s1] \"A Hina-chan é tão fofa!!!!\"\n[s2] \"É a Hina-chan de biquíni!\""
1002202-7 = "A-a sua voz está muito alta……! Eu entendi, então, por favor, fale mais baixo……."
1002202-8 = "A-a sua voz está muito alta……! Eu entendi, então, por favor, fale mais baixo……."
1002202-9 = "Se você ficar fazendo esse barulho e alguém notar…… não vai ter sentido nenhum a gente ter se encontrado aqui em segredo."
1002202-10 = "[s] \"É verdade, me desculpe.\""
1002202-11 = "Não tem problema. Mas, mesmo assim, acho que não conhecem muito o meu rosto por aqui…… foi por isso que eu chamei você para vir aqui, Sensei."
1002202-12 = "Esta área é tranquila, quase não tem alunos de Gehenna por perto, e os alunos de Trinity também não costumam vir aqui."
1002202-13 = "[s] \"Então, o que devemos fazer neste lugar onde a disciplina não está sendo perturbada……?\""
1002202-14 = "……."
1002202-15 = "Isso é……."
1002202-16 = "……Bem."
1002202-17 = "[s] \"……Entendi, então é um ensaio para o acampamento! Eu topo!\""
1002202-18 = "……."
1002202-19 = "Francamente, Sensei……."
1002202-20 = "Eu gostaria que você parasse de brincar comigo……."
1002202-21 = "[s] \"Eu não estou brincando 'com' a Hina, eu quero brincar 'junto' com a Hina!\""
1002202-22 = "D-de qualquer jeito, não é isso! Primeiro de tudo, eu não vim aqui para brincar……!"
1002202-23 = "Se eu não entender direito como é o mar no verão, não vou conseguir lidar bem caso algo aconteça durante o treinamento do acampamento de verão……."
1002202-25 = "Se há algo que não sei, preciso começar tentando aprender. Nesse sentido, talvez seja mesmo um \"ensaio\", como você disse."
1002202-26 = "[s] \"Entendido.\""
1002202-27 = "Ufa……."
1002202-28 = "De qualquer forma, precisamos garantir que ninguém descubra que estamos aqui……."
1002202-29 = "Tenho que voltar em algumas horas, mas acho que é tempo suficiente para ter uma noção geral da praia por aqui."
1002202-30 = "Então, bem, por onde começamos――"
1002202-37 = "……?"
1002202-38 = "Ah, um contato da escola……."
1002202-39 = "Desculpe, Sensei. Espere um pouco."
1002202-40 = "[s] \"Tudo bem, pode ir.\""
1002202-41 = "Eu volto logo……."
1002202-44 = "(Como Hina começou a falar ao telefone, me afastei um pouco)"
1002202-46 = "(Já se passou um bom tempo, mas Hina não volta)"
1002202-47 = "(Preocupado se algo aconteceu, no momento em que ia entrar em contato――)"
1002202-49 = "(Recebi uma MomoTalk da Hina)"
1002202-50 = "Sensei, me ajude"
1002202-51 = "[s] \"……!?\""
1002202-55 = "Haa…… desculpe, Sensei. Obrigado por vir."
1002202-56 = "Como posso dizer, acabei sendo pega por umas pessoas estranhamente prestativas……."
1002202-57 = "[s] \"Então te levaram para o posto de crianças perdidas…….\""
1002202-58 = "……."
1002202-59 = "Haa…… eu disse várias vezes que não sou uma aluna do primário……."
1002202-60 = "Eu entendo que elas agiram com boas intenções, mas……."
1002202-61 = "Não importa quantas vezes eu dissesse que não estava perdida, elas só me olhavam com um olhar gentil e diziam: \"Está tudo bem, deixe com a gente\"……."
1002202-62 = "Elas não me ouviam de jeito nenhum, por que será……."
1002202-63 = "[s] \"Por que será, né…….\""
1002202-64 = "……Por que?"
1002202-65 = "[s] \"……Não é nada.\""
1002202-66 = "Haa, chega…… que incômodo……."
1002202-67 = "[s] \"Mas é surpreendente que você tenha sido levada tão facilmente.\""
1002202-68 = "……Se eu revelasse minha identidade de forma descuidada, acho que as coisas ficariam mais complicadas. Eu poderia ter dado um jeito à força se fosse necessário, mas eles não eram pessoas más, afinal."
1002202-69 = "Se houvesse alguém por perto me vigiando e eles decidissem atacar de repente, seria um problema para aquela pessoa."
1002202-70 = "Além disso, se soubessem que o Sensei do Schale e a Presidente do Comitê Disciplinar de Gehenna estavam sozinhos na praia..."
1002202-71 = "Alguma agência de notícias poderia transformar isso em um grande escândalo e transmitir em dirigíveis de reportagem 24 horas por dia..."
1002202-72 = "[s] \"Eu quero acreditar que não chegaria a tanto...\""
1002202-73 = "……Ufa."
1002202-74 = "Bem, de qualquer forma, agora eu sei o que devemos fazer."
1002202-75 = "Isso aconteceu porque eu estava sozinha. Por isso, não se afaste do meu lado. Entendido, Sensei?"
1002202-76 = "[s] \"Entendido, ficarei sempre ao seu lado.\""
1002202-77 = "……Sim. Eu vou proteger você, Sensei."
1002202-78 = "Então, ainda temos uns 30 minutos, você poderia me acompanhar novamente?"
1002202-80 = "(Passei o tempo restante aproveitando um passeio pela praia junto com a Hina.)"
