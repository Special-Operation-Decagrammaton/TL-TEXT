[translation]
10038005-1 = "Prólogo: Preparativos para o festival"
10038005-4 = "Resumo dos eventos anteriores"
10038005-8 = "（O intercâmbio entre a Escola Secundária Shanhaijing e a Academia Red Winter foi realizado）"
10038005-9 = "Nós de Shanhaijing planejamos realizar um intercâmbio com a Red Winter em breve."
10038005-12 = "Como o 'Genryumon', estamos preocupados com este intercâmbio."
10038005-13 = "Todos aqui não têm experiência com isso. #nAlém disso, há quem evite o intercâmbio em si."
10038005-16 = "（Em meio à ansiedade, o intercâmbio foi realizado — e as alunas do Secretariado da Red Winter chegaram a Shanhaijing em segurança）"
10038005-19 = "Oh... então este é o lugar...!"
10038005-21 = "É Shanhaijing, não é!"
10038005-22 = "Parece que as pesquisas prévias estavam corretas."
10038005-23 = "Tomoe! O que são aquelas telhas? #nElas têm um formato estranho!"
10038005-29 = "（Aquele é o tal de que todos falam...!）"
10038005-30 = "（Não acredito que eles realmente vieram...!）"
10038005-33 = "（Kaguya, a chefe do Clube de Ópera de Pequim, que valoriza as tradições e a cultura de Shanhaijing, mantém contato com Kai Shintani —）"
10038005-37 = "!? O-o que você está...? Para começo de conversa, eu e o Clube de Ópera de Pequim não temos tal qualificação...!"
10038005-39 = "Ora, que coisa estranha a se dizer. Você, a chefe do Clube de Ópera de Pequim, que entende e protege as tradições de Shanhaijing melhor do que ninguém, diz que 'não tem qualificação'?"
10038005-40 = "……!"
10038005-41 = "Bem, no fim das contas, talvez não passe de conversa fiada de alguém que foi banido."
10038005-42 = "Nós vamos apresentar uma nova ópera... #ne se falharmos?"
10038005-43 = "Interessante. Existe mesmo a necessidade de discutir se será um sucesso ou um fracasso?"
10038005-46 = "（Seguindo as instruções de Kai Shintani, Kaguya encena uma nova ópera — e faz uma admoestação à Kisaki, a líder do portão）"
10038005-50 = "— Em nome das tradições de Shanhaijing, eu denuncio Kisaki Ryuge, a líder do Genryumon!"
10038005-52 = "（No entanto, graças à atuação do Secretariado da Red Winter, a confusão do Clube de Ópera de Pequim foi contida —）"
10038005-55 = "Todas as alunas têm o direito de expressar suas opiniões!"
10038005-56 = "E todas as presidentes de conselho estudantil têm o direito de ouvir essas opiniões e guiar a academia!"
10038005-59 = "（O intercâmbio terminou com sucesso）"
10038005-62 = "Fufu, parece que você ficou muito satisfeita com o intercâmbio desta vez, Secretária-Geral Cherino."
10038005-63 = "Sim, Shanhaijing foi... uma grande aventura!"
10038005-65 = "Sinto muito pelos vários problemas causados pelo incidente do Clube de Ópera de Pequim."
10038005-66 = "Eu, a Secretária-Geral da Red Winter, não me importo com essas pequenas coisas!"
10038005-67 = "Sim, Líder. A Presidente Cherino é uma pessoa magnânima!"
10038005-69 = "（Mas a faísca chamada Kai Shintani ainda permanecia —）"
10038005-72 = "Esperei por muito tempo — embora eu tenha chegado a ser confinada no Departamento Correcional..."
10038005-73 = "— Finalmente, este momento chegou."
10038005-74 = "Eu vou recuperar o que é meu. #nNão deixarei ninguém atrapalhar."
10038005-76 = "（Nuvens negras que ainda não se dissiparam envolviam Shanhaijing...）"
10038005-84 = "Não está quase na hora...?"
10038005-88 = "Ah, é aqui?"
10038005-93 = "Não está um pouco cedo demais?"
10038005-94 = "A aula acabou mais cedo. E não tenho nada para fazer mesmo."
10038005-95 = "Haa... você está livre, hein. Que inveja."
10038005-96 = "……Não, esquece."
10038005-100 = "……."
10038005-101 = "……O clima no Genryumon ultimamente não está meio estranho? Está tudo bem?"
10038005-105 = "……Isso não é algo com que vocês devam se preocupar."
10038005-106 = "Não, você é péssimo em esconder as coisas."
10038005-107 = "Nem eu mesmo sei. #nJá não sei mais o que é o quê..."
10038005-108 = "Desde o intercâmbio de dias atrás, o clima no Genryumon não só não se acalmou, como só piorou."
10038005-109 = "……Bem, parece que não é só no Genryumon."
10038005-110 = "Bem... é verdade."
10038005-111 = "Ei, está rolando um boato por aí..."
10038005-112 = "...A Mestra do Portão está realmente tentando abrir as portas de Shanhaijing? Como a Associação Genbu faz."
10038005-116 = "...Cuidado com o que você diz."
10038005-117 = "Mas, no intercâmbio de outro dia, os alunos de outras escolas estavam andando por aí como queriam."
10038005-118 = "Isso é verdade, mas..."
10038005-119 = "E olha que o Festival do Luar vai começar em breve..."
10038005-120 = "Se for assim, ainda mais alunos de outras escolas virão..."
10038005-122 = "Chega de boatos. Isso não me diz respeito. Eu só tenho que cumprir meu trabalho."
10038005-123 = "E você diz isso sendo da Genryumon."
10038005-124 = "Não adianta pensar nisso, não é? Eu sou uma aluna do primeiro ano e não tenho tantas informações assim."
10038005-128 = "Ah... bem, é verdade. Não faz sentido a gente ficar pensando nisso... Vamos para o Shangri-la."
10038005-143 = "O Festival do Luar está chegando!"
10038005-144 = "[s] \"Festival do Luar?\""
10038005-148 = "Ah... é verdade, Sensei, você é alguém de fora."
10038005-149 = "Às vezes, acabo esquecendo disso. Preciso tomar cuidado."
10038005-150 = "[s] \"Fico feliz que a Mina pense assim de mim, mas... o que é o Festival do Luar?\""
10038005-154 = "O Festival do Luar é um festival tradicional de Shanhaijing realizado nesta época todos os anos."
10038005-157 = "As barracas se alinham principalmente ao longo da rua da Associação Genbu, mas o festival em si é um evento grandioso que envolve todo o território de Shanhaijing."
10038005-158 = "Todos os anos, alunos de fora vêm para o Festival do Luar, mas..."
10038005-159 = "Não há planos de abrir áreas além da rua da Associação Genbu para alunos de fora. Esse é o costume."
10038005-160 = "[s] \"Hum, será que é mesmo necessário restringir tanto?\""
10038005-163 = "A Genryumon, que deve valorizar a tradição e servir de exemplo para Shanhaijing, não pode quebrá-la. Não seria um bom exemplo se desrespeitássemos algo que foi transmitido dessa forma, não acha?"
10038005-164 = "— Originalmente, o Festival do Luar era um evento sazonal para orar por uma boa colheita e celebrar os frutos do ano."
10038005-165 = "Não sei desde quando, mas por causa da Associação Genbu, tornou-se um festival onde alunos de outras escolas vêm para passear."
10038005-166 = "Francamente, quando se trata de negócios, eles ignoram a tradição imediatamente..."
10038005-167 = "Quem é que limpa a bagunça depois?! Eles não assumem a diplomacia com as outras escolas e, no fim, sobra para nós resolvermos..."
10038005-168 = "[s] \"Calma, calma, respire um pouco...\""
10038005-169 = "Cof, cof. Por causa disso, o Festival do Luar atual tornou-se um grande evento visitado por alunos de outras escolas."
10038005-170 = "Todos os anos, durante o dia, as barracas de bolos lunares ficam alinhadas, e à noite, desfrutamos da ópera de Pequim e olhamos para os fogos de artifício, orando pela paz do ano... A intenção da Genryumon é que a escola não tenha nada a ver com isso."
10038005-171 = "Por isso, nesta época, relaxamos a vigilância sobre a Associação Genbu e não fiscalizamos os alunos de outras escolas, mas..."
10038005-172 = "Bem..."
10038005-173 = "Você se lembra do intercâmbio com Red Winter outro dia?"
10038005-174 = "Desde então, a resistência contra alunos de outras escolas dentro de Shanhaijing tem aumentado... Estou um pouco preocupada se é uma boa ideia realizar o Festival do Luar assim."
10038005-175 = "[s] \"Entendo... O que você acha, Mina?\""
10038005-179 = "Eu... como sempre, seguirei as ordens da Mestra do Portão. Não há nada além disso."
10038005-180 = "Hmph. Não é querendo me gabar, mas admiro minha própria lealdade."
10038005-181 = "...Deixando de lado minha própria postura, também devo ouvir a opinião dos outros."
10038005-182 = "Afinal, elas provavelmente têm pensamentos diferentes dos meus."
10038005-185 = "Por enquanto, pelo que ouvi, não houve objeções quanto à realização do festival em si. O Festival do Luar é uma tradição de Shanhaijing, afinal."
10038005-186 = "No entanto, houve muitas opiniões contrárias ao relaxamento das restrições para alunos de outras escolas e para a Associação Genbu."
10038005-189 = "Somado ao fato de que a resistência contra alunos de outras escolas está aumentando, dizem que devemos ser ainda mais cautelosos."
10038005-190 = "Para começar, o Festival do Luar é originalmente um festival de Shanhaijing. Só se tornou um local de passeio para alunos de outras escolas porque a Associação Genbu transformou isso em um negócio por conta própria."
10038005-191 = "É por isso que há quem veja que permitir essas coisas e relaxar a vigilância apenas durante esse período prejudica o prestígio da Genryumon."
10038005-192 = "— As opiniões estão divididas até mesmo dentro da Genryumon."
10038005-193 = "Mas não sei se devo transmitir essas opiniões à Mestra do Portão... E, se eu for transmitir, como devo escolher as palavras..."
10038005-194 = "[s] \"Entendo. Então foi por isso que você me chamou.\""
10038005-195 = "Desculpe, Sensei. É uma história vergonhosa, mas não sinto que conseguiria transmitir isso bem..."
10038005-196 = "? Entendo... Então é algo difícil até para um adulto..."
10038005-197 = "...Sinto-me um pouco mais leve. Agradeço, Sensei."
10038005-202 = "Ho, entendo. Então foi essa a situação que ocorreu."
10038005-206 = "！？"
10038005-207 = "[s] \"Essa voz...!\""
10038005-212 = "Faz tempo... ou talvez não, Sensei. #nFico feliz em poder encontrar você assim novamente."
10038005-213 = "M-M-M-M-M-M-Mestra da Porta!?"
10038005-214 = "Que barulheira. #nEu já estou ciente das opiniões dentro da Genryumon."
10038005-215 = "E-Eu! Isso é... bem!"
10038005-216 = "――Está tudo bem. Você tem feito um bom trabalho. #nComo Mestra da Porta, vou anunciar a decisão de agora."
10038005-217 = "S-Sim, senhora!"
10038005-218 = "Entendo a ansiedade das alunas. #nAssim como as opiniões e preocupações dentro da Genryumon."
10038005-219 = "No entanto――é justamente por isso que o Festival do Luar será realizado como sempre."
10038005-221 = "O-O que você quer dizer com isso...!"
10038005-223 = "Os ventos não estão favoráveis e as vozes de preocupação são altas."
10038005-228 = "Mas a Shanhaijing não é do tipo que se abala por tão pouco. Não――nós não devemos nos abalar. #nNão é verdade, Mina?"
10038005-229 = "……！"
10038005-230 = "Como desejar! #nÉ justamente em momentos como este que devemos agir como em tempos normais...!"
10038005-231 = "É bom que entenda rápido. #nEntão, você sabe o que deve ser feito, certo?"
10038005-232 = "Sim, Mestra da Porta! #nPor favor, deixe tudo comigo!"
10038005-239 = "Puxa... se eu soubesse que você viria, teria preparado uma reunião de uma forma um pouco diferente."
10038005-240 = "[s] \"Mas estou feliz por te ver de novo assim. Kisaki.\""
10038005-241 = "Fufu, você continua o mesmo de sempre."
10038005-242 = "Se a Shanhaijing pudesse ser tão serena quanto você, eu diria para você aproveitar o Festival do Luar, mas..."
10038005-243 = "Hm? Você já está ansioso pelo Festival do Luar?"
10038005-244 = "Fufu, entendo... se você está ansioso, então preciso corresponder a essa expectativa."
10038005-245 = "A ópera chinesa――pode ser difícil devido a várias circunstâncias."
10038005-246 = "Mas poderemos aproveitar o lançamento de lanternas, os fogos de artifício e as apresentações musicais."
10038005-250 = "Muito bem. Então vamos, Sensei."
10038005-251 = "[s] \"Eh? Para onde?\""
10038005-252 = "――Para o local de preparação do Festival do Luar."
10038005-253 = "Fufu, não se preocupe tanto. #nO Sensei só precisa ficar ao meu lado."
10038005-254 = "Vou preparar bastante fruta e bolos lunares, viu? Pode ficar na expectativa."
10038005-255 = "[s] \"Ah... as calorias...! O açúcar e a gordura...!\""
10038005-256 = "Você realmente precisa se preocupar com isso?"
10038005-257 = "Fufu, então prepararei doces especiais com bastante tempero só para você."
10038005-262 = "Ora, não precisa se acanhar. #nUma hospitalidade farta, a ponto de não conseguir comer tudo, é o estilo da Shanhaijing, afinal♪"
