[translation]
10038005-1 = "プロローグ;祭りの準備"
10038005-4 = "これまでのあらすじ"
10038005-8 = "（山海経高級中学校とレッドウィンター連邦学園の交流会が開催された）"
10038005-9 = "我ら山海経は、近日中にレッドウィンターと交流会を行う予定での。"
10038005-12 = "「玄龍門」としては、この交流会を案じておるのじゃ。"
10038005-13 = "皆、経験が無いからの。#nそもそも、交流会そのものを敬遠している者もおる。"
10038005-16 = "（不安が渦巻く中、交流会は開催され――レッドウィンター事務局の生徒は、無事山海経に到着した）"
10038005-19 = "おぉ……ここが……！"
10038005-21 = "[ruby=せんがいきょう]山海経[/ruby]なのですね！"
10038005-22 = "事前の調査に間違いはないようですね。"
10038005-23 = "トモエ！あの瓦はなんだ？#n不思議な形をしているぞ！"
10038005-29 = "（あれが噂の……！）"
10038005-30 = "（まさか、本当に来るなんて……！）"
10038005-33 = "（山海経の伝統と文化を重んじる京劇部部長のカグヤは、[ruby=しんたに]申谷[/ruby]カイと連絡を取り合い――）"
10038005-37 = "！？な、何を！？そもそも[ruby=わたし]、私と[/ruby]京劇部に、そのような資格など……！"
10038005-39 = "ほう、妙なことを言うんだな。山海経の伝統を誰よりも理解し、守ってきた京劇部の部長に、「資格がない」とでも？"
10038005-40 = "……！"
10038005-41 = "まあ、所詮は追放された者の[ruby=ざれごと]戯言[/ruby]に過ぎないかもしれないがねぇ。"
10038005-42 = "私たちが、新しい京劇を、披露する……#nもし、失敗すれば？"
10038005-43 = "面白い。成功か失敗かを論ずる必要が？"
10038005-46 = "（[ruby=しんたに]申谷[/ruby]カイの指示を受けたカグヤは、新たな京劇を上演し――門主のキサキに諫言する）"
10038005-50 = "――山海経の伝統の名のもと、玄龍門の門主、[ruby=りゅうげ]竜華[/ruby]キサキを糾弾するっ！"
10038005-52 = "（しかし、レッドウィンター事務局の活躍で京劇部の騒動は鎮圧され――）"
10038005-55 = "すべての生徒には、意見を表する権利がある！"
10038005-56 = "そしてすべての生徒会長には、その意見を聞き入れ、学園を導く権利がある！"
10038005-59 = "（交流会は無事、成功に終わった）"
10038005-62 = "ふふ、今回の交流会、とても満足だったようですね。チェリノ書記長。"
10038005-63 = "うむ、山海経は……大冒険だったな！"
10038005-65 = "京劇部の件で、色々と苦労をかけて面目ない。"
10038005-66 = "おいら、レッドウィンターの書記長はそんな些細なことなど、気にしないのだ！"
10038005-67 = "はい、門主様。チェリノ会長は寛大なお方ですから！"
10038005-69 = "（だが、[ruby=しんたに]申谷[/ruby]カイという名の火種は、依然として残ったまま――）"
10038005-72 = "長い時を待った――かつては矯正局に収監されたこともあったが……"
10038005-73 = "――ついに、この時がきた。"
10038005-74 = "私は、私のものを取り戻す。#n誰にも邪魔させないよ。"
10038005-76 = "（未だ晴れぬ暗雲が、山海経を包み込んでいた……）"
10038005-84 = "そろそろ時間じゃない……？"
10038005-88 = "あ、ここかな？"
10038005-93 = "少し早すぎないか？"
10038005-94 = "授業早く終わってさ。別にやることもないし。"
10038005-95 = "はぁ……暇なんだな。羨ましいことだ。"
10038005-96 = "……いや、何でもない。"
10038005-100 = "……。"
10038005-101 = "……最近の玄龍門の空気、なんか変じゃない？大丈夫？"
10038005-105 = "……お前らが気にするようなことじゃない。"
10038005-106 = "いや、隠すの下手すぎるし。"
10038005-107 = "私にも分からないんだ。#nもう、何がなんだか……。"
10038005-108 = "先日の交流会以降、玄龍門の空気は落ち着かないばかりか悪化する一方でな。"
10038005-109 = "……まあ、それは玄龍門だけじゃないみたいだけど。"
10038005-110 = "まあ……そうだな。"
10038005-111 = "ねえ、ちょっと噂になってるんだけどさ……"
10038005-112 = "……門主様って、やっぱり山海経の門戸を開こうとしているの？#n玄武商会みたいに。"
10038005-116 = "……言葉には気をつけるんだな。"
10038005-117 = "だって、この間の交流会で他校の生徒が好き勝手に歩き回ってたじゃん。"
10038005-118 = "それは、そうだが……。"
10038005-119 = "もうすぐ月影祭が開かれるっていうのに……。"
10038005-120 = "そうしたら、もっと他校の生徒が来るだろうし……。"
10038005-122 = "噂話はそこまでだ。私には関係ない。#n私は自身の仕事を全うするまでだ。"
10038005-123 = "玄龍門なのにそんな事いうんだ。"
10038005-124 = "考えても仕方ないことだろう？#n私は1年生だし、そこまで情報を持っているわけでもない。"
10038005-128 = "はぁ……まぁ、そうだよね。#n私達が考えても意味ないか……桃源郷にでも行こ。"
10038005-143 = "月影祭が近い！"
10038005-144 = "[s] \"月影祭？\""
10038005-148 = "ああ……先生は外部の人間だったな。"
10038005-149 = "たまに、うっかり忘れてしまうことがある。気をつけなければ。"
10038005-150 = "[s] \"ミナがそんな風に思ってくれるのは嬉しいんだけど……それで、月影祭って？\""
10038005-154 = "月影祭は、毎年この時期に開催している山海経の伝統的な祭りだ。"
10038005-157 = "玄武商会通りを中心に出店が立ち並ぶんだが、祭り自体は山海経全土をあげて盛大に行なうものでな。"
10038005-158 = "毎年、外部の生徒が月影祭にやって来るのだが――"
10038005-159 = "玄武商会通り以外を外部の生徒に開放する予定はない。それがしきたりだからな。"
10038005-160 = "[s] \"うーん、無理に規制する必要あるかな？\""
10038005-163 = "伝統を重んじ、山海経の手本となるべき玄龍門がそれを破ってはならない。#nそのように受け継がれてきたものを我らが軽んじては示しがつかないだろう？"
10038005-164 = "――本来、月影祭は豊穣を祈願しその年の実りを祝う季節行事だったんだ。"
10038005-165 = "それがいつからか、玄武商会のせいで他校生が観光に来るような祭りとなってしまった。"
10038005-166 = "まったく、あいつらは商売の事となると途端に伝統を軽んじて――"
10038005-167 = "後始末は一体誰がするというのだ！#n他校との外交を肩代わりするでもなく――結局は我々が尻拭いをする羽目に……。"
10038005-168 = "[s] \"まぁまぁ、いったん落ち着いて……。\""
10038005-169 = "こほん。そういうわけで、今の月影祭は他校生も訪れる一大行事となっているんだ。"
10038005-170 = "例年、昼は月餅の屋台が立ち並び――夜は京劇を楽しんで花火を見上げ、一年の安寧を祈る……そこに学園は関係ないというのが、玄龍門の意向ではある。"
10038005-171 = "だから、この時期は玄武商会への監視を緩め、他校生の取り締まりもしていないのだが――"
10038005-172 = "その……。"
10038005-173 = "先日の、レッドウィンターとの交流会を覚えているだろうか？"
10038005-174 = "あれ以来、山海経内部での他校生への反発が強くなっていてな……このまま月影祭を開催して良いものなのか、少し悩んでいるんだ。"
10038005-175 = "[s] \"なるほどね……ミナはどう思うの？\""
10038005-179 = "私は――いつも通り、門主様の命に従う。それ以外にない。"
10038005-180 = "ふっ。自分で言うのもなんだが、己の忠誠心には感心するばかりだ。"
10038005-181 = "……私自身のスタンスはさておき、皆の意見も聞くべきではある。"
10038005-182 = "彼女たちは、私とは違う考えを持っているだろうからな。"
10038005-185 = "ひとまず、聞いた範囲では祭りを開くことそのものへの異論はなかった。#n月影祭は山海経の伝統行事だからな。"
10038005-186 = "しかし、他校生や玄武商会への規制を緩めることには反対という意見が多かった。"
10038005-189 = "他校生への反発が強くなっている状況というのも相まって、殊更慎重に行なうべきだ、と。"
10038005-190 = "そもそも――月影祭は本来山海経の祭りだ。玄武商会が勝手に商売にしたせいで他校生が物見遊山に来るようになってしまっただけに過ぎないからな。"
10038005-191 = "だからこそ――それらを許容し、その期間だけ監視を緩める行為そのものが玄龍門の威光を損なうとの見方もある。"
10038005-192 = "――玄龍門内部でも意見が割れているところではあるがな。"
10038005-193 = "ただ、門主様にこれらの意見をお伝えすべきなのか――#nそして、伝えるとするなら、一体どう言葉を尽くすべきなのか……"
10038005-194 = "[s] \"なるほど。それで私を呼んだんだね。\""
10038005-195 = "すまない、先生。不甲斐ない話だが、私にはうまく伝えられそうになくて……。"
10038005-196 = "？そうか……大人であっても難しいことなんだな……。"
10038005-197 = "……少し心が軽くなった。#n感謝する、先生。"
10038005-202 = "ほう、なるほどな。#nそのような事態になっておったとは。"
10038005-206 = "！？"
10038005-207 = "[s] \"この声は……！\""
10038005-212 = "久方ぶり……ではないのう、先生。#nまたこうして顔を合わせることができて、嬉しく思うぞ。"
10038005-213 = "も、もももももも、門主様！？"
10038005-214 = "騒がしいのう。#n玄龍門内部の意見については、妾も承知しておる。"
10038005-215 = "わ、私は！その……ええと！"
10038005-216 = "――良い。其方は十分やってくれておる。#n門主として、此度の沙汰を告げようかの。"
10038005-217 = "は、はっ！"
10038005-218 = "生徒たちの不安は理解しておる。#n玄龍門内部の意見も、憂慮もな。"
10038005-219 = "じゃが――だからこそ、月影祭は[ruby=・   ・   ・   ・   ・]いつも通り[/ruby]開催する。"
10038005-221 = "ど、どういうことですか……！"
10038005-223 = "風向きは悪く、不安の声も大きい。"
10038005-228 = "じゃが、その程度で揺らぐような山海経ではない。否――揺らいではならない。#nそうであろう、ミナ？"
10038005-229 = "……！"
10038005-230 = "仰る通りです！#nこのような時こそ、平時と同じであるべきで……！"
10038005-231 = "理解が早くて助かるのう。#nでは、何をすべきかも分かるな？"
10038005-232 = "はい、門主様！#nこの私にすべてお任せください！"
10038005-239 = "ふう……其方が来ていると知っていたのなら、もう少し違う形での再会を用意したというのに。"
10038005-240 = "[s] \"でも、こうしてまた会えて嬉しいよ。キサキ。\""
10038005-241 = "ふふ、其方は相変わらずじゃのう。"
10038005-242 = "山海経も其方のように泰然自若としていられるのなら、月影祭を楽しんでいってくれと言えるのじゃが……"
10038005-243 = "うん？もう月影祭を楽しみにしているのか？"
10038005-244 = "ふふ、そうさな……其方が楽しみにしているのであれば、その期待に応えねばならぬな。"
10038005-245 = "京劇――は、諸事情で難しいやもしれぬが。"
10038005-246 = "灯篭流しや花火、演奏を楽しむことはできよう。"
10038005-250 = "うむ。それでは行こうかの、先生。"
10038005-251 = "[s] \"えっ？どこに？\""
10038005-252 = "――月影祭の準備会場に、じゃ。"
10038005-253 = "ふふ、そう心配するでない。#n先生はただ妾の隣にいるだけで良い。"
10038005-254 = "果物も月餅も、多めに用意しておくからのう？期待しててくりゃれ。"
10038005-255 = "[s] \"ああ……カロリーが……！糖と脂肪が……！\""
10038005-256 = "そんなことを気にする必要があるのかえ？"
10038005-257 = "ふふ、ならば其方専用の薬味たっぷりの菓子を用意するとしよう。"
10038005-262 = "なに、遠慮はいらぬぞ。#n食べきれぬほどのもてなしこそが、山海経の流儀じゃからの♪"
