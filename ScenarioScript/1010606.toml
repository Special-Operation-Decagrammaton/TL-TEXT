[translation]
1010606-1 = "こういうのがお好きだと聞きました"
1010606-2 = "トリニティ大聖堂"
1010606-3 = "（サクラコから連絡をもらい、トリニティ大聖堂へ向かった）"
1010606-4 = "あっ、もうお越しいただいたのですね。"
1010606-5 = "大変大変っ！#nサクラコちゃん、まだ心の準備が～！"
1010606-6 = "[s1] \"……さ、サクラコさん？\"\n[s2] \"いつもとテンションが……。\""
1010606-10 = "じゃ～ん！アイドル☆サクラコ、とーじょ～！"
1010606-11 = "今日は特別に、先生だけのアイドルになっちゃいますよ～！"
1010606-12 = "先生は何がしたいのかなぁ？#nアイドル☆サクラコが、なーんでもしてあげるっ♡"
1010606-13 = "……あっ、でもぉ？"
1010606-18 = "サクラコ"
1010606-19 = "[7cd0ff]シスターフッド[-]"
1010606-20 = "変なお願いは、"
1010606-22 = "変なお願いは、ダ"
1010606-24 = "変なお願いは、ダ～"
1010606-26 = "変なお願いは、ダ～メ♡"
1010606-29 = "[ns3] \"えっ！？\"\n[ns4] \"ま、まずは説明してほしいんだけど！？\""
1010606-33 = "……？"
1010606-34 = "お、おかしいですね……。"
1010606-35 = "皆様に、これで良いと言われたのですが……。"
1010606-36 = "こんなはずでは……。"
1010606-37 = "……え？"
1010606-38 = "何を言われたのか、ご説明しますと……。"
1010606-39 = "……ふぅ。"
1010606-40 = "致し方ありません。"
1010606-41 = "ややこしくなる前に、お話するとしましょう。"
1010606-42 = "その、ただ先生に楽しんでいただきたかったのです。"
1010606-43 = "[s5] \"私に……？\"\n[s6] \"楽しんでもらう？\""
1010606-46 = "はい、そうです。"
1010606-47 = "先生には何から何までお世話になっていますから……。"
1010606-48 = "シスターフッドの皆様も、お礼をしたいと仰っておりまして。"
1010606-49 = "何がお好きなのか、何をされたら嬉しいのか考えてみたのですが……。"
1010606-50 = "どれが一番喜んでもらえるのか、答えが出ず……。"
1010606-51 = "シャーレの仕事をお手伝いする案もありました。"
1010606-52 = "しかし、アイドルの衣装を有効活用するべきでは、という声が挙がったのです。"
1010606-53 = "[s7] \"それでこうなったんだね。\"\n[s8] \"今日はサクラコが一人で来たの？\""
1010606-56 = "はい、そうです。#n皆様と話し合って決定いたしました。"
1010606-57 = "アイドルとしての設定や「アイドルスペシャルデートコース」を含め、全部です。"
1010606-61 = "……インターネットで調べた情報も、少々取り入れましたが。"
1010606-62 = "[s9] （……だよね）\n[s10] （本当に少々なのかな……？）"
1010606-65 = "アイドルと一日を過ごせたら、先生も喜ぶはず、と。"
1010606-66 = "全員の意見が一致したのです。"
1010606-67 = "そして、シスターフッドを代表し、私がここにおります。"
1010606-68 = "……私では力不足でしたね、申し訳ありません。"
1010606-69 = "[s11] \"すごく嬉しいよ！\"\n[s12] \"アイドルのサクラコちゃんも可愛いよ！\""
1010606-72 = "……先生？"
1010606-73 = "ええと……。"
1010606-74 = "先程まで困っていたのに急な変わりよう……何かあったのですか？"
1010606-75 = "……お礼をしようと思った理由、ですか？"
1010606-76 = "そうでした、まだ肝心な部分をお伝えしておりませんでしたね。"
1010606-77 = "もちろん、日頃から感謝を伝えておりますが……。"
1010606-78 = "言葉だけでは、足りないと思いまして。"
1010606-79 = "ですが、やはり衣装の力に頼っていては……。"
1010606-80 = "……え？"
1010606-81 = "衣装だけではない、と……？"
1010606-82 = "気持ちが大切なのは、分かっておりますが……。"
1010606-83 = "[s13] \"今は分からなくても大丈夫だよ。\"\n[s14] \"逆の立場になったら、きっと分かると思うよ。\""
1010606-86 = "ふむ、そうですか……。"
1010606-90 = "先生がそう仰るのでしたら、安心しました。"
1010606-91 = "ふふっ……。"
1010606-92 = "……フフフフフッ。"
1010606-93 = "[s15] \"……さ、サクラコさん？\"\n[s16] \"なんか雰囲気が……。\""
1010606-96 = "では、お言葉に甘えて……。"
1010606-97 = "……先生。"
1010606-98 = "ここからは、アイドル☆サクラコの時間だよっ！"
1010606-99 = "夢中にしてあげるから、覚悟してよね♡"
1010606-101 = "（その後、サクラコとシスターフッドが用意した「アイドルスペシャルデートコース」（？）を楽しんだ）"
1010606-102 = "（デートと呼ぶには予想外の出来事ばかりだったが、とても楽しい時間を過ごした）"
