[translation]
51170-1 = "Episódio 17; A lenda urbana que caminha pela cidade (1)"
51170-2 = "Local do Festival das Lanternas - Praça"
51170-4 = "Nossa preparação está concluída!"
51170-12 = "A chegada da Sacerdotisa!"
51170-20 = "Ah! Magnífico!#nCombina perfeitamente com você, senhorita!"
51170-22 = "Não está apertado?#nQuer algo para beber ou..."
51170-24 = "Não, não se preocupe.#nEstou acostumada."
51170-25 = "Fufu... Sim! Sim! Como esperado da jovem dama da família Kageyuzukoji.#nEstávamos esperando por este momento há muito tempo."
51170-26 = "Fico tão feliz que a senhorita tenha retornado da Hyakkiyako...!"
51170-27 = "Agora não há mais com o que se preocupar, tudo correrá sem problemas."
51170-32 = "Ehem, Yukari-san."
51170-33 = "Como você sabe, a dança da sacerdotisa será realizada pela \"Sacerdotisa de Kageyuzukoji\" para encerrar o festival—"
51170-34 = "Planejamos transmitir isso pela televisão e pela internet."
51170-35 = "O significado da dança é Sokogeishin — despedir-se do antigo e receber o novo..."
51170-37 = "É uma dança que carrega o significado de pintar um amanhã e um futuro melhores!"
51170-38 = "Ouvi dizer que a última vez que dançaram foi há 20 anos, não acredito que poderei ver isso de novo!"
51170-39 = "Fina está muito animada!"
51170-44 = "Aqui estão os procedimentos do ritual—"
51170-45 = "Nesse caso, não precisa se preocupar.#nA senhorita aprendeu os procedimentos do ritual desde pequena."
51170-46 = "……Entendo."
51170-48 = "Sim— é meu dever."
51170-49 = "Farei com perfeição, por favor, não se preocupe."
51170-50 = "Se é assim, tudo bem, mas..."
51170-51 = "Você tem certeza... de que está tudo bem...?"
51170-52 = "Sim."
51170-53 = "Eu..."
51170-54 = "Eu... estou bem."
51170-55 = "Entendido."
51170-56 = "Então, vamos lá!"
51170-61 = "Sim... é assim que deve ser."
51170-66 = "Tudo."
51170-72 = "—foi isso que aconteceu."
51170-73 = "Você realmente fez isso... uma batalha de sucessão com a Yukari..."
51170-74 = "Nossa, eu já fiquei surpresa por terem feito uma batalha de sucessão."
51170-75 = "……Por que você está me contando isso?"
51170-76 = "…………."
51170-77 = "Aquela garota encontrou você antes de ir para a sala de mediação, não foi?"
51170-78 = "Por isso achei que deveria te avisar."
51170-79 = "Aquela idiota... mesmo depois de tudo que eu disse... ela ainda não desistiu..."
51170-80 = "……Tsc, não me importa. Eu avisei.#nDisse que não adiantaria nada voltar."
51170-81 = "Então chega, Kikyou."
51170-82 = "…………Chega?"
51170-83 = "Não precisa mais entrar em contato comigo desse jeito."
51170-84 = "Não preciso da sua preocupação.#nEu já... decidi que vou buscar a minha própria juventude."
51170-85 = "Não tenho mais nenhum interesse na Hyakkiyako."
51170-91 = "……………………Entendo."
51170-92 = "É verdade, você saiu daqui justamente em busca disso."
51170-93 = "……Sim. Eu também pensava assim, então tudo bem. O assunto termina aqui.#nFaça o que quiser, Renge."
51170-94 = "Afinal, ainda somos amigas... desejo a sua felicidade."
51170-95 = "……É, espero que você ganhe uns 10 quilos de pura felicidade."
51170-96 = "Hã!? Espera, o que você está—"
51170-100 = "Aquela idiota...! Falando tudo o que quer...!!"
51170-101 = "Droga...!"
51170-102 = "Pois fique você também com a sua... fe-li-ci-da-de!!"
51170-103 = "Haaa... nossa..."
51170-104 = "Já acabou tudo... #nPor que ainda agora..."
51170-106 = "Ah!?"
51170-107 = "O que houve, Renge-senpai!?"
51170-108 = "Renge-chan?"
51170-109 = "Hã...?"
51170-114 = "Não... não é nada."
51170-115 = "Coisa minha, ou melhor, algo que já acabou."
51170-116 = "Sobre o Hyakkiyako Ryoran... não é?"
51170-117 = "Bem, é, mas..."
51170-118 = "Não, já está tudo bem. O Hyakkiyako Ryoran não importa mais!"
51170-119 = "Já que é um festival, como membro do Clube de Treinamento, preciso aproveitar... não tenho tempo para me preocupar com outras coisas."
51170-120 = "Bem, é... aproveitar o festival também faz parte do treinamento! #nA juventude não espera por ninguém. Uma garota deve correr pela noite!"
51170-121 = "O quê!? Tsubaki-bucho, Mimori-fukubucho, Kaede!"
51170-127 = "A Renge-chan não é boa em mentir, né."
51170-129 = "Hm...?"
51170-132 = "Dizer que 'não importa'... você não pensa isso de verdade."
51170-133 = "É verdade! Renge-senpai, desde que chegou aqui, você só fala do Hyakkiyako Ryoran!"
51170-135 = "N-não, não é para tanto...!?"
51170-136 = "Se você realmente não se importasse... acho que não teria ficado brava depois que a ligação terminou."
51170-141 = "A Tsubaki-chan tem razão. Renge-chan, você não quer que termine assim, quer?"
51170-142 = "Fufufu~! A Mimori-senpai é, nada mais nada menos, a leitora de mentes mais forte de Hyakkiyako!"
51170-143 = "Mentiras não funcionam na frente dela!!"
51170-144 = "Ah, Kaede-chan... não é nada disso!"
51170-150 = "……Por que todo mundo está dizendo essas coisas?"
51170-151 = "Já acabou tudo... não é?"
51170-152 = "Não importa o quanto eu grite, Nagusa-senpai e os outros não vão voltar."
51170-153 = "Então é melhor deixar para lá."
51170-154 = "Eu pensei em largar tudo e buscar a juventude... mas por quê."
51170-155 = "Mas, Renge... você foi gentil com a Yukari."
51170-156 = "Eu? Com a Yukari...? Não tem como."
51170-157 = "Naquela época, eu só dizia coisas que machucavam a Yukari..."
51170-158 = "Renge, você disse que se a pessoa que espera só sofre, então é melhor que ela desapareça."
51170-159 = "As palavras da Renge naquela época foram para o bem da Yukari... #nEu acho que todos percebemos que foi uma mentira para que a sua kouhai não se machucasse."
51170-160 = "Renge-chan, você disse que é amiga de infância da Kikyou-chan, não é?"
51170-161 = "…………."
51170-162 = "Às vezes, acabamos dizendo o contrário do que sentimos. Especialmente quando estamos preocupados."
51170-163 = "O sentimento de preocupação acaba vencendo... e acabamos falando coisas que não pensamos."
51170-164 = "Isso acontece comigo também, então eu entendo bem."
51170-166 = "Hã, a Mimori-senpai também!?"
51170-167 = "Fufu... sim, é verdade, Kaede-chan."
51170-168 = "A Tsubaki-chan e eu somos amigas de infância... #nJá passamos por muita coisa, sabe?"
51170-169 = "Né, Tsubaki-chan?"
51170-171 = "……A Mimori fica assustadora quando está brava de verdade."
51170-173 = "Isso eu também entendo~!"
51170-174 = "E-ei!?"
51170-175 = "Vocês duas..."
51170-179 = "Por isso, Renge-chan."
51170-184 = "Eu já..."
51170-185 = "Já deixei o Hyakkiyako Ryoran e estou fazendo um teste no Clube de Treinamento... não faz mais sentido..."
51170-186 = "Mas Renge-chan, você ainda tem, não tem?#nPalavras que deseja dizer às pessoas queridas."
51170-187 = "......Será que ainda dá tempo? Será que não vão me achar intrometida?"
51170-188 = "Acho que o que importa é o seu 'sentimento', Renge-chan."
51170-189 = "Vice-presidente Mimori..."
51170-195 = "......O teste de Renge no Clube de Treinamento termina aqui. Isso é uma ordem da presidente."
51170-197 = "Hã!?"
51170-199 = "Vá fazer o que você quer fazer."
51170-200 = "Nós também vamos ajudar."
51170-201 = "Pela nossa amizade do antigo Clube de Treinamento, né! Não é?"
51170-203 = "Tsubaki, Mimori, Kaede..."
51170-209 = "......Sim. Entendido."
51170-211 = "Ouvi da Kikyou."
51170-212 = "Que talvez eu tenha feito a Yukari passar por momentos difíceis."
51170-213 = "E que ela pediu para eu ir ver como ela está, porque está preocupada."
51170-215 = "......É bem a cara dela pedir para os outros fazerem o que ela mesma deveria fazer."
51170-216 = "Eu vou conversar com a Yukari."
51170-219 = "Sim. Então, vamos lá encontrá-la agora."
51170-220 = "Beleza! Vamos todas juntas!"
51170-222 = "Pessoal, obrigada."
51170-230 = "Ah, fogos de artifício!"
51170-231 = "Parece que o festival começou."
51170-232 = "Antes que a gente se atrase--"
51170-237 = "Uaaah! F-fujam!!"
51170-242 = "O que será que aconteceu?"
51170-253 = "......Eh, eh? Tsubaki-senpai, Mimori-senpai! A-aquilo é o que...!?"
51170-254 = "!!"
51170-256 = "Hmm, não sei dizer, mas...#nNão parece que vamos conseguir ser amigos deles, né~"
51170-266 = "......!#nTodos, cuidado!"
51170-267 = "Lá vem eles!!"
51170-278 = "Q-q-que é isso!!?"
51170-284 = "Unyaaaah!?"
51170-297 = "Presidente! Você está bem!?"
51170-298 = "Presidente...!!"
51170-300 = "Ah, s-sim!"
51170-301 = "Eu estou bem... mas, o local do festival...!"
51170-302 = "Esse monstro... de onde ele veio!?"
51170-304 = "Presidente, isso... é igual àquela vez em que o céu ficou vermelho..."
51170-305 = "E-eh!?#nÉ... igual àquela vez!?"
51170-306 = "Presidente... Izuna-chan!#nO-o que faremos!?"
51170-308 = "O-o-o que a gente faz!?"
51170-309 = "Uau! Tem mais ali também...!"
51170-314 = "(Devo fugir daqui!?)"
51170-315 = "(Mas ainda tem gente no local do festival...)"
51170-316 = "(Mas, mas, não posso colocar a Izuna e a Tsukuyo em perigo...)"
51170-324 = "Uwaaa!?"
51170-325 = "Presidente!!"
51170-332 = "Não precisam se preocupar! Chefe, Tsukuyo!"
51170-335 = "I-Izuna?"
51170-336 = "Izuna-chan...?"
51170-338 = "Agora, Hyakkiyako tem o Mestre aqui!"
51170-339 = "O Mestre confiou em nós, do Clube de Pesquisa Ninjutsu!"
51170-345 = "A Izuna fará o seu melhor para retribuir essa confiança!"
51170-346 = "......É verdade! A Izuna tem razão. #nMuito bem, então primeiro, vamos ajudar todo mundo aqui!"
51170-347 = "Com certeza, o Sensei vai dar um jeito nisso!"
51170-352 = "Até lá, nós, do Clube de Pesquisa Ninjutsu — como agentes especiais —, vamos proteger a todos!"
51170-354 = "S-sim, entendido!"
51170-355 = "Sim! Então, operação iniciada! Nin-nin!"
51170-365 = "Vice-chefe Kaho! Algo não identificado apareceu ao redor do local do festival... parece que está causando um tumulto!"
51170-366 = "Dizem que há feridos surgindo um atrás do outro no distrito oeste!"
51170-367 = "Vice-chefe Kaho! Recebemos relatos de que um monstro não identificado apareceu na rua comercial...!"
51170-369 = "Vice-chefe Kaho! O que devemos fazer...!!"
51170-371 = "Pessoal, por favor, acalmem-se...!"
51170-372 = "Isso é... o que seria..."
51170-373 = "Um monstro não identificado no local do festival... o que devemos fazer..."
51170-374 = "Um invasor desconhecido que começou a agir assim que o festival começou... só existe uma pista para prever isso."
51170-379 = "Um invasor desconhecido que começou a agir assim que o festival começou... só existe uma pista para prever isso..."
51170-380 = "Apenas uma."
51170-382 = "......O Clube Kachoufuugetsu."
51170-387 = "Julguei que aquela carta não passava de uma ameaça... algo como os pequenos incidentes de sempre."
51170-392 = "Eu queria evitar envolver o Schale em assuntos tão triviais e ficar em dívida... foi o que pensei."
51170-393 = "......Desde o início, foi um erro de julgamento?"
51170-395 = "Para começar, o Clube Kachoufuugetsu é uma existência lendária que só existe nos registros."
51170-396 = "Deveria ter assumido que eles tinham uma forma física — é isso?"
51170-397 = "Onde e o que eu deixei passar...? #nAlgum elemento que não considerei... alguma outra pista...?"
51170-399 = "Niya-sama."
51170-401 = "......Pelo timing, será que tem relação com Kuzunoha...? #nNão, ou talvez..."
51170-402 = "Niya-sama..."
51170-403 = "Será que o pessoal do Hyakka Ryouran...? #nA presidente que desapareceu... será que há alguma informação que desconhecemos...?"
51170-404 = "Para me preparar para a ameaça, eu deveria ter investigado isso...?"
51170-405 = "Niya-sama...!"
51170-406 = "Preciso reunir as informações que não conhecia... que não consegui obter... #nPreciso entender onde e o que deixei passar —"
51170-411 = "Niya —"
51170-422 = "Chefe Niya, feio isso. #nUm peteleco em você~"
51170-430 = "Au...!? #nCh-Chise...!?"
51170-431 = "Chise-chan!?"
51170-436 = ".............."
51170-437 = "!!"
51170-438 = "Não tenha medo."
51170-439 = "Sem desviar o olhar,"
51170-440 = "vamos encarar isso~"
51170-441 = "Chefe. Não pode ficar parada aí."
51170-442 = "Veja, todos estão com medo."
51170-447 = "Chise-chan..."
51170-448 = "......Ah."
51170-449 = "Ah..."
51170-450 = "............"
51170-455 = "Nyahaha, é verdade. A Chise tem razão."
51170-456 = "Como chefe do Departamento de Yin e Yang, não posso dar um mau exemplo em uma situação dessas."
51170-457 = "Kaho, você poderia entrar em contato com o Comitê Organizador do Festival?#nPara compartilhar a situação atual."
51170-459 = "S-sim!"
51170-466 = "Ué... não está completando a chamada...#nParece que algo está interferindo na comunicação...?"
51170-467 = "Hmm... bem, não seria surpresa se estivessem fazendo algo do tipo."
51170-468 = "Certo... bem, então eu mesma irei até lá..."
51170-469 = "Kaho, você poderia investigar com as associações comerciais de Hyakkiyako que estão colaborando com o festival?"
51170-470 = "A prioridade agora é organizar a situação e estabelecer uma base.#nPode organizar as informações por horário e tipo, por favor?"
51170-471 = "Podemos buscar os responsáveis mais tarde, conto com você."
51170-473 = "...Sim, compreendido.#nDeixe comigo!"
51170-474 = "Então, pessoal, a partir de agora, nós do Departamento de Yin e Yang agiremos sob as ordens da Niya-sama!"
51170-476 = "Daqui em diante, é uma corrida contra o tempo! Vamos dar o nosso melhor!#nConto com vocês!"
51170-477 = "Sim!!"
51170-479 = "Próximo episódio: A Lenda Urbana que Caminha pela Cidade (2)"
