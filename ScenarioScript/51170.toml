[translation]
51170-1 = "Episódio 17; Histórias de Fantasmas Caminhando Pela Cidade (1)"
51170-2 = "Local do Festival das Lanternas - Praça"
51170-4 = "Os preparativos por aqui estão prontos!"
51170-12 = "É a entrada da Miko-sama, de~su!"
51170-20 = "Ah! Esplêndido! #n Ficou muito bem na senhorita!"
51170-22 = "Não está apertado? #n Gostaria de algo para beber...?"
51170-24 = "Não, não se incomode. #n Eu estou acostumada."
51170-25 = "Fufu... Sim! Com certeza! Afinal, você é a filha da família Kadenokouji. #n Eu aguardei ansiosamente por este momento."
51170-26 = "Estou tão feliz que a senhorita tenha voltado da Hyakkaryouran...!"
51170-27 = "Com isso, não há mais com o que se preocupar, tudo ocorrerá sem problemas."
51170-32 = "*Ahem*, Yukari-san."
51170-33 = "Como você sabe, a 'Miko da Família Kadenokouji' realizará a Dança da Miko para encerrar o festival――"
51170-34 = "Planejamos transmitir isso ao vivo pela televisão e pela internet."
51170-35 = "A dança simboliza a Despedida do Antigo e as Boas-Vindas ao Novo―― despedir-se do antigo e dar as boas-vindas ao novo..."
51170-37 = "É uma dança que carrega o significado de imaginar um amanhã, um futuro melhor!"
51170-38 = "Ouvi dizer que a última vez foi a dança de 20 anos atrás, mas poder ver de novo assim! "
51170-39 = "A Pina está super animada de~su!"
51170-44 = "Eu resumi os procedimentos do ritual aqui――"
51170-45 = "Sobre isso, não há necessidade de se preocupar. #n A senhorita foi ensinada sobre os procedimentos do ritual desde pequena."
51170-46 = "......Entendo."
51170-48 = "Sim―― é meu dever. "
51170-49 = "Realizarei com perfeição, então, por favor, fiquem tranquilas."
51170-50 = "Se é assim, tudo bem..."
51170-51 = "Mas você tem... certeza de que está bem...?"
51170-52 = "Sim."
51170-53 = "Eu..."
51170-54 = "Eu... estou bem."
51170-55 = "Entendido."
51170-56 = "Então, vamos lá!"
51170-61 = "Sim... isso é o certo."
51170-66 = "Tudo."
51170-72 = "――Isso foi o que aconteceu."
51170-73 = "Sério que ela fez isso... uma batalha de sucessão contra você, Yukari... "
51170-74 = "Caramba, eu já estava surpresa dela ter pedido uma Batalha de Sucessão, mas..."
51170-75 = "......Por que você se deu ao trabalho de me contar isso?"
51170-76 = "............"
51170-77 = "Aquela garota encontrou com você antes de vir para a sala de mediação, não encontrou?"
51170-78 = "Por isso, achei melhor te avisar, só por garantia."
51170-79 = "Aquela garota... depois de tudo que eu disse... ainda não tinha desistido... "
51170-80 = "......Tsc, não me importo. Eu avisei a ela. #n Que não adianta nada voltar."
51170-81 = "Então está tudo bem, Kikyou."
51170-82 = "......Tudo bem, você diz?"
51170-83 = "Você não precisa ficar entrando em contato comigo assim."
51170-84 = "Não preciso de preocupação. #n Eu já decidi... que vou procurar a minha própria juventude."
51170-85 = "Eu não tenho mais interesse na Hyakkaryouran."
51170-91 = "........................Entendo."
51170-92 = "É verdade, você saiu daqui em busca disso. "
51170-93 = "......Sim. Eu também pensava assim, então está tudo bem. Fim de papo. #n Faça o que quiser, Renge."
51170-94 = "Nós ainda somos amigas, afinal... desejo-lhe felicidades."
51170-95 = "......Sim, espero que você engorde uns 10 quilos de tanto comer por estar feliz."
51170-96 = "Hã!? O que você tá――"
51170-100 = "Aquela garota...! Falando tudo o que quer...!!"
51170-101 = "Droga...!"
51170-102 = "Desejo muita f-e-l-i-c-i-d-a-d-e pra você também!!"
51170-103 = "Haaaah... que raiva..."
51170-104 = "Apesar de tudo já ter acabado... #n Por que ainda..."
51170-106 = "Uwaa!?"
51170-107 = "O que foi, Renge-senpai!?"
51170-108 = "Renge-chan?"
51170-109 = "Fuaa...?"
51170-114 = "Não... não foi nada."
51170-115 = "Um assunto meu, por assim dizer, uma coisa que já acabou."
51170-116 = "Sobre a Hyakkaryouran... certo?"
51170-117 = "É, por aí..."
51170-118 = "Não, eu já estou bem. Não me importo mais com a Hyakkaryouran!"
51170-119 = "É um festival e tanto, tenho que curtir como membro do Clube de Treinamento... não tenho tempo para me preocupar com outras coisas."
51170-120 = "Ehm, qual era o lema mesmo... curtir o festival também faz parte do treinamento! #n A juventude não espera. A garota deve correr pela noite!"
51170-121 = "Não é! Presidente Tsubaki, Vice-presidente Mimori, Kaede!"
51170-127 = "A Renge-chan é ruim de mentir, não é."
51170-129 = "Hm...?"
51170-132 = "Dizer 'Não me importo mais com a Hyakkaryouran'... não é o que você realmente pensa."
51170-133 = "É verdade! Renge-senpai, desde que você chegou aqui, só falou sobre a Hyakkaryouran!"
51170-135 = "N, não, não é pra tanto...!?"
51170-136 = "Se você realmente não se importasse... não ficaria tão irritada depois de desligar o telefone, eu acho."
51170-141 = "Como a Tsubaki-chan disse. Renge-chan, você não quer que isso acabe assim, não é?"
51170-142 = "Fufufu~! A Mimori-senpai é nada menos que! A maior leitora de mentes da Hyakkiyako!"
51170-143 = "Mentiras não funcionam com ela~!!"
51170-144 = "Ah, Kaede-chan... não é nada disso!"
51170-150 = "......Por que todas vocês dizem coisas assim."
51170-151 = "Isso tudo... já é passado."
51170-152 = "Não importou o quanto levantamos a voz, a Nagusa-senpai e as outras não voltaram."
51170-153 = "Então seria melhor simplesmente acabar com tudo."
51170-154 = "Eu pensei em largar tudo e ir em busca da minha juventude... então por quê."
51170-155 = "Mas, Renge... você foi gentil com a Yukari."
51170-156 = "Eu? Com a Yukari...? Claro que não."
51170-157 = "Naquela hora eu só disse coisas que machucavam a Yukari..."
51170-158 = "Você disse que se as pessoas que esperam só vão sofrer, então é melhor que desapareça."
51170-159 = "As suas palavras daquela vez foram para o bem da Yukari... #n Acho que todos perceberam que era uma mentira para que a sua kouhai não se machucasse."
51170-160 = "Você disse que era amiga de infância da Kikyou-chan, não foi?"
51170-161 = "............"
51170-162 = "Às vezes acabamos dizendo coisas que não são o que realmente pensamos. Principalmente quando estamos preocupadas."
51170-163 = "Às vezes a preocupação é tanta... que acabamos dizendo palavras que não queremos."
51170-164 = "Isso acontece comigo também, então eu entendo muito bem."
51170-166 = "Eh, com você também, Mimori-senpai!?"
51170-167 = "Fufu... sim, é verdade, Kaede-chan."
51170-168 = "A Tsubaki-chan e eu somos amigas de infância... #n Já passamos por muitas coisas, sabia?"
51170-169 = "Não é, Tsubaki-chan."
51170-171 = "......A Mimori quando fica brava de verdade é assustadora."
51170-173 = "Acho que consigo imaginar isso~!"
51170-174 = "E, ehh?"
51170-175 = "Vocês duas..."
51170-179 = "Por isso, Renge-chan."
51170-184 = "Eu já..."
51170-185 = "Saí da Hyakkaryouran e estou fazendo um período de experiência no Clube de Treinamento... a essa altura..."
51170-186 = "Mas, Renge-chan, você ainda as tem, não tem? #n Palavras que quer dizer para as pessoas que são importantes para você."
51170-187 = "......Será que ainda posso... Será que não vão me achar intrometida?"
51170-188 = "Eu acho que o que importa são os 'sentimentos', Renge-chan."
51170-189 = "Vice-presidente Mimori..."
51170-195 = "......O período de experiência da Renge termina aqui. Essa é uma ordem da presidente."
51170-197 = "Eh!?"
51170-199 = "Vá fazer o que você quer."
51170-200 = "Nós também vamos ajudar."
51170-201 = "Em nome dos laços como ex-membro do Clube de Treinamento, certo? Não é?"
51170-203 = "Tsubaki, Mimori, Kaede..."
51170-209 = "......Sim. Entendido."
51170-211 = "Eu ouvi da Kikyou."
51170-212 = "Ela disse que achava que poderia ter magoado a Yukari."
51170-213 = "E pediu para eu ir dar uma olhada porque estava preocupada."
51170-215 = "......Fazer os outros fazerem o que ela poderia fazer sozinha é bem a cara dela."
51170-216 = "Eu vou tentar falar com a Yukari."
51170-219 = "Sim. Então, vamos ao encontro dela agora."
51170-220 = "Certo! Todas prontas para partiiir!"
51170-222 = "Pessoal, obrigada."
51170-230 = "Ah, fogos de artifício!"
51170-231 = "Parece que o festival já começou."
51170-232 = "Antes de nos atrasarmos――"
51170-237 = "Uwaaah! F, fujam!!"
51170-242 = "O que será que aconteceu."
51170-253 = "......Eh, eh? Tsubaki-senpai, Mimori-senpai! O, o que é aquilo...!?"
51170-254 = "!!"
51170-256 = "Hmm, não sei o que é, mas... #n não parece que vai ser nosso amigo~"
51170-266 = "...! #n Pessoal, cuidado!"
51170-267 = "Lá vem ele!!"
51170-278 = "O-o que é issssoooo!!?"
51170-284 = "Unyaaah!?"
51170-297 = "Presidente! A senhora está bem!?"
51170-298 = "Presidente...!!"
51170-300 = "Ah, s, sim!"
51170-301 = "Eu estou bem... mas o local do festival...!"
51170-302 = "De onde veio... esse monstro!?"
51170-304 = "Presidente, isso... é igual a quando o céu ficou vermelho antes..."
51170-305 = "E, ehh!? #n I, igual... àquela vez!?"
51170-306 = "Presidente... Izuna-chan! #n O, o que vamos fazer!?"
51170-308 = "O-o-o que vamos fazer!?"
51170-309 = "Uwa! Tem mais daqueles ali também...!"
51170-314 = "(A gente deve fugir!?)"
51170-315 = "(Mas ainda tem pessoas no local do festival...)"
51170-316 = "(Mas, mas, não posso colocar a Izuna e a Tsukuyo em perigo...)"
51170-324 = "Uwawa!?"
51170-325 = "Presidente!!"
51170-332 = "Não há motivo para preocupação! Presidente, Senhorita Tsukuyo!"
51170-335 = "I-Izuna?"
51170-336 = "Izuna-chan...?"
51170-338 = "Porque o Mestre está aqui na Hyakkiyako agora!"
51170-339 = "O Mestre confiou em nós do Clube de Pesquisa de Ninjutsu!"
51170-345 = "A Izuna dará tudo de si para corresponder a essa confiança!"
51170-346 = "......É verdade! É como a Izuna disse. #n Tudo bem, então primeiro vamos salvar o pessoal daqui! "
51170-347 = "O Sensei-dono com certeza vai dar um jeito em tudo!"
51170-352 = "Até lá, nós, do Clube de Pesquisa de Ninjutsu―― Agentes Especiais, vamos proteger todos até o fim!"
51170-354 = "S, sim, entendido!"
51170-355 = "Sim! Então vamos iniciar a missão! Nin-nin!"
51170-365 = "Vice-presidente Kaho! Algo não identificado apareceu ao redor do local do festival... Parece que há um tumulto ocorrendo!"
51170-366 = "Dizem que há vários feridos no Distrito Oeste!"
51170-367 = "Vice-presidente Kaho! Recebemos relatos de que um monstro não identificado apareceu na área comercial...!"
51170-369 = "Vice-presidente Kaho! O que faremos...!!"
51170-371 = "Pessoal, acalmem-se...!"
51170-372 = "O que... diabos é isso."
51170-373 = "Um monstro não identificado no local do festival... o que devemos fazer."
51170-374 = "Atacantes desconhecidos que começaram a agir exatamente no momento em que o festival começou... a única pista para prever isso..."
51170-379 = "Atacantes desconhecidos que começaram a agir exatamente no momento em que o festival começou... a única pista para prever isso..."
51170-380 = "É apenas uma."
51170-382 = "......Clube das Flores, Pássaros, Vento e Lua."
51170-387 = "Achei que aquela carta fosse uma mera ameaça... do nível dos tumultos de sempre."
51170-392 = "Eu não queria envolver a Schale num problema tão pequeno e ficar devendo um favor... Eu pensei assim, mas."
51170-393 = "......Então foi um erro de julgamento desde o início?"
51170-395 = "Pra começo de conversa, o Clube das Flores, Pássaros, Vento e Lua é uma entidade que só existe nos registros e boatos."
51170-396 = "Então―― quer dizer que eu deveria ter presumido que eles tivessem uma existência física."
51170-397 = "O que foi que eu deixei passar...? #n Fatores que eu não considerei... Haveria alguma outra pista...?"
51170-399 = "Senhorita Niya."
51170-401 = "......Considerando o momento, será que há alguma ligação com a Kuzunoha...? #n Não, ou talvez..."
51170-402 = "Senhorita Niya..."
51170-403 = "No lado da Hyakkaryouran...? #n A presidente que desapareceu... haveria alguma informação que não sabíamos...?"
51170-404 = "Para nos prepararmos contra as ameaças, devíamos ter investigado por aquele lado...? "
51170-405 = "Senhorita Niya...!"
51170-406 = "Precisamos coletar as informações que eu não conhecia... as informações que não consegui obter... #n Eu tenho que descobrir exatamente onde e o que eu deixei passar――"
51170-411 = "Niya――"
51170-422 = "Presidente Niya, preste atenção. #n Peteleco~"
51170-430 = "Augh...!? #n C-Chise...!?"
51170-431 = "Chise-chan!?"
51170-436 = ".................."
51170-437 = "!!"
51170-438 = "Não tenha medo"
51170-439 = "Sem desviar os olhos"
51170-440 = "Vamos encarar~"
51170-441 = "Presidente. Não pode ficar parada."
51170-442 = "Olhe, estão todos com medo."
51170-447 = "Chise-chan..."
51170-448 = "......Ah."
51170-449 = "Aaah..."
51170-450 = "............"
51170-455 = "Nyahaha, é verdade. Você está certa, Chise."
51170-456 = "Afinal de contas, sou a presidente do Clube Yin-Yang, não serei um bom exemplo nesse estado."
51170-457 = "Kaho, pode entrar em contato com o Comitê de Operações do Festival? #n Para compartilhar a situação atual."
51170-459 = "S-Sim!"
51170-466 = "Ué... Não completa a ligação... #n Parece que... algo está interferindo na comunicação...?"
51170-467 = "Hmmm... Bem, não seria surpresa se eles estivessem fazendo isso."
51170-468 = "Deixe-me ver... tudo bem, então eu vou até lá..."
51170-469 = "Kaho, você pode ir conversar com as associações comerciais da Hyakkiyako que cooperaram com o festival~?"
51170-470 = "O mais urgente agora é organizar a situação e estabelecer uma base de informações. #n Pode organizar as informações por hora e por categoria~?"
51170-471 = "Deixaremos a responsabilidade para depois, conto com você."
51170-473 = "......Sim, entendido. #n Deixe comigo!"
51170-474 = "Muito bem, pessoal, a partir de agora o Clube Yin-Yang agirá sob as instruções da Senhorita Niya!"
51170-476 = "Agora é uma corrida contra o tempo! Vamos dar o nosso melhor! #n Conto com a colaboração de todos!"
51170-477 = "Sim!!"
51170-479 = "Próximo Episódio; Histórias de Fantasmas Caminhando Pela Cidade (2)"
