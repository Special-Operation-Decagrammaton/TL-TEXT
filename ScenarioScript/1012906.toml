[translation]
1012906-1 = "O brilho que eu persegui"

1012906-2 = "(O lugar sobre o qual Suzumi me contou...)"

1012906-3 = "(Era um parque de diversões tranquilo em Trinity)"

1012906-6 = "(Depois de um tempo, um pardal veio)"

1012906-10 = "Está tarde!"

1012906-11 = "Pedimos desculpas por mantê-lo esperando."

1012906-12 = "[s1] \"Está tudo bem!\"\n[s2] \"Acabei de chegar também.""

1012906-15 = "Obrigado pela sua consideração."

1012906-16 = "Ah, cheguei atrasado por causa dessa roupa..."

1012906-17 = "Na verdade ontem――"

1012906-18 = "Talvez eu estivesse cansado, então coloquei a caneta à base de água na máquina de lavar junto com minhas roupas..."

1012906-19 = "...A única coisa segura eram essas roupas."

1012906-20 = "Bem, só por precaução... explicamos a situação às pessoas do parque de diversões com antecedência e obtivemos sua aprovação."

1012906-21 = "Não há nenhum show de heroínas mágicas hoje, então não acho que poderia ser confundida com um dos membros do elenco."

1012906-22 = "[s3] \"Foi um desastre...\"\n[s4] \"É ótimo que você tenha conseguido lidar com isso com calma!""

1012906-25 = "É importante verificar com antecedência, então..."

1012906-26 = "(Uma chance de conhecer o professor...)"

1012906-27 = "(Eu não queria vê-la partir...)"

1012906-28 = "[s5] \"Esse vestido realmente combina com você!\"\n[s6] \"Perfeito para um parque de diversões!""

1012906-31 = "Bem... isso foi bom."

1012906-33 = "(Depois, aproveitei o parque de diversões com Suzumi.)"

1012906-34 = "(A roupa de Suzumi era muito popular entre as crianças e ela foi abordada muitas vezes.)"

1012906-38 = "Coma! Giga relâmpago mortal!"

1012906-39 = "Droga, outro monstro...! Não há limite!"

1012906-40 = "...Isso é algum tipo de performance?"

1012906-41 = "“A grande batalha com o exército de monstros”… Entendo, é um show de heróis."

1012906-42 = "……."

1012906-44 = "(Suzumi assistiu ao show por um tempo.)"

1012906-51 = "Ah."

1012906-52 = "com licença. Eu simplesmente me apaixonei por isso..."

1012906-53 = "[s] \"...Suzumi, você está preocupada com alguma coisa?\""

1012906-54 = "Você pode até dizer que é um problema..."

1012906-55 = "Acho que todos vocês gostam de histórias sobre heróis que salvam alguém."

1012906-56 = "Tanto o herói anterior quanto a garota mágica nesta fantasia. #nEle é um personagem desse tipo de história."

1012906-57 = "A razão pela qual todo mundo quer que os heróis apareçam é porque eles não existem..."

1012906-58 = "...Isso é o que eu estava pensando."

1012906-59 = "[s7] \"Se ele é um herói, ele está bem na minha frente.\"\n[s8] \"Ele estava vestindo roupas de herói e fazendo grandes coisas como um herói.""

1012906-64 = "Sim, o que é isso?"

1012906-65 = "……."

1012906-66 = "Estou um pouco hesitante em me chamar de herói, mas..."

1012906-67 = "Não é ruim para meu professor me chamar assim..."

1012906-68 = "Sempre me encare diretamente..."

1012906-69 = "Estas são as palavras de uma professora que honestamente me deixa feliz."

1012906-70 = "[s9] \"Porque Suzumi é muito legal!\"\n[s10] \"Porque Suzumi é muito legal!""

1012906-73 = "Obrigado, senhor."

1012906-74 = "Obrigado por ouvir esta história chata."

1012906-75 = "...Ficou completamente escuro."

1012906-81 = "...Neste momento, sinto que posso alcançar as estrelas mesmo daqui."

