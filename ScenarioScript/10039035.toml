[translation]
10039035-2 = "――シスターさん！"
10039035-3 = "本当に素晴らしい活躍でした！#nご協力ありがとうございます……！"
10039035-4 = "お、お役に立てたならなによりです……。"
10039035-5 = "いやぁ、大助かりだったよ。"
10039035-6 = "[s1] \"キリノの動きを完全にコピーしてたよ。\"\n[s2] \"マリーはダンスが上手なんだね。\""
10039035-9 = "つい夢中になっていました……えへへ。"
10039035-10 = "そういえば、二人はアイドルについて勉強してるんだっけ？"
10039035-11 = "せっかく助けてくれたのに、ダンスをちょっと教えただけってのもねぇ。"
10039035-12 = "い、いえ……私のことはお気になさらず！"
10039035-13 = "ふふっ、大丈夫。"
10039035-14 = "私が何かするわけじゃないよ。"
10039035-15 = "シスターさんも一緒にダンスレッスンを受けてみない？"
10039035-16 = "私が……。"
10039035-17 = "……ううん、キリノが話を通しとくから。"
10039035-19 = "つ、ついにフブキがやる気を……！"
10039035-20 = "生徒が増えると楽できるしね～。"
10039035-21 = "[s3] （いつも通りのフブキだった……）\n[s4] \"マリーにとっても良い話だと思う。\""
10039035-24 = "皆さん……！"
10039035-25 = "フブキ～、キリノ～！"
10039035-28 = "……げっ。"
10039035-32 = "助けてくれてありがとー！流石うちの常連さん！"
10039035-33 = "ライブ、楽しみにしてるよ！#nその日はシフト入れずに……#nというか、臨時休業にして店長も行くんじゃないかな！"
10039035-34 = "う……。"
10039035-39 = "[ns5] \"二人とも、人気なんだね。\"\n[ns6] \"大活躍だったね。\""
10039035-44 = "なるほど……。"
10039035-45 = "もし、アイドルになったら……。"
10039035-46 = "……ふふっ。"
10039035-47 = "とても楽しそうですね。"
10039035-59 = "ダンス、クリア"
