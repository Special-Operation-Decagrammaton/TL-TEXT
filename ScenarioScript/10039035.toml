10039035-11 = "Já que você nos ajudou tanto, seria pouco apenas te ensinar a dançar."
10039035-12 = "N-não…… por favor, não se preocupe comigo!"
10039035-13 = "Fufu, está tudo bem."
10039035-14 = "Não é como se eu fosse fazer algo demais."
10039035-15 = "Irmã, por que você não faz uma aula de dança com a gente?"
10039035-16 = "Eu……."
10039035-17 = "……Não se preocupe, a Kirino vai cuidar de tudo."
10039035-19 = "F-finalmente a Fubuki está motivada……!"
10039035-20 = "Se tivermos mais alunas, vai ser mais fácil pra mim~."
10039035-21 = "[s3] (Era a Fubuki de sempre……)\n[s4] \"Acho que é uma boa oportunidade para a Mari também.\""
10039035-24 = "Pessoal……!"
10039035-25 = "Fubuki~, Kirino~!"
10039035-28 = "……Ih."
10039035-32 = "Obrigada por nos ajudar! Como esperado da nossa cliente fiel!"
10039035-33 = "Estou ansiosa pelo show!#nNão vou colocar ninguém no turno naquele dia……#nNa verdade, acho que o gerente vai até fechar a loja pra ir também!"
10039035-34 = "Ugh……."
10039035-39 = "[ns5] \"Vocês duas são bem populares, hein.\"\n[ns6] \"Vocês arrasaram.\""
10039035-44 = "Entendo……."
10039035-45 = "Se eu me tornasse uma idol……."
10039035-46 = "……Fufu."
10039035-47 = "Parece ser muito divertido."
10039035-59 = "Dança, concluída"
