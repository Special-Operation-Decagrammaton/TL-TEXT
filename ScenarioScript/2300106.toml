[translation]
2300106-1 = "Uma mesa posta apenas para o Sensei"
2300106-2 = "（Após vários dias de noites em claro trabalhando no Schale, recebi um contato da Fuuka）"
2300106-3 = "（Assim que recebi a mensagem, fui apressado para o local combinado, mas...）"
2300106-4 = "（No momento em que cheguei ao local, o céu de repente se distorceu）"
2300106-9 = "Gehenna Academy - 12ª Enfermaria"
2300106-10 = "S-Sensei!? Você está bem!?"
2300106-11 = "Você acordou? Sabe quem eu sou!?"
2300106-12 = "[s] \"Fuuka? Hum... o que está acontecendo?\""
2300106-13 = "Quando cheguei ao local combinado na hora marcada, o Sensei estava desmaiado."
2300106-14 = "O médico da enfermaria disse que foi exaustão."
2300106-15 = "[s] \"Ah, agora que você mencionou, ontem eu também passei a noite em claro...\""
2300106-16 = "…A culpa é minha."
2300106-17 = "[s] \"Não, não é nada disso.\""
2300106-18 = "Não, é tudo culpa minha... O Sensei já está tão ocupado com o trabalho no Schale que mal tem tempo para dormir..."
2300106-19 = "E eu ainda chamei você por puro egoísmo, dizendo que queria preparar uma refeição, e por causa dessa desnecessidade, as coisas acabaram assim..."
2300106-20 = "Me desculpe..."
2300106-21 = "[s] \"Fuuka, não é assim.\""
2300106-22 = "Eh...?"
2300106-23 = "[s] \"Eu fiquei feliz em poder comer a comida que você preparou.\""
2300106-24 = "Sempre..."
2300106-25 = "O Sensei sempre diz coisas gentis assim..."
2300106-26 = "Enquanto esperava o Sensei acordar, fiquei pensando o tempo todo."
2300106-27 = "Será que, por puro egoísmo, eu não acabei forçando o Sensei a comer o que eu queria preparar?"
2300106-28 = "Por isso, desta vez, quero que o Sensei me diga."
2300106-29 = "O que você quer comer?"
2300106-30 = "[s] \"O que eu quero comer...\""
2300106-33 = "Schale - Área Residencial"
2300106-34 = "Você quer comida caseira... tem certeza de que é só isso?"
2300106-35 = "[s] \"Sim, porque é a comida caseira feita por você, Fuuka.\""
2300106-36 = "Se o Sensei insiste tanto, tudo bem..."
2300106-37 = "Certo, deixe comigo!"
2300106-40 = "[wa:2000]— Eu imaginei que seria assim... [wa:2500]Você estava comendo só comida instantânea de novo, não estava?"
2300106-43 = "[wa:1800]— Não pode, [wa:1200]você precisa se alimentar direito."
2300106-46 = "— Eu vou preparar algo agora mesmo, [wa:2000]espere um pouco."
2300106-49 = "— Poxa, [wa:1500]não cuidar da própria saúde [wa:1400]é um péssimo hábito seu, Sensei."
2300106-52 = "— Sim? [wa:1000]V- [wa:1000]você quer comer a minha comida todos os dias, [wa:3000]é isso?"
2300106-54 = "— A- [wa:500]ahahaha... [wa:1700]S- [wa:800]se estiver tudo bem para o Sensei... [wa:2500]Claro, [wa:1000]eu não me importo, mas..."
2300106-57 = "Schale - Área Residencial"
2300106-58 = "Sempre que quiser comer comida caseira daqui para frente, pode me chamar."
2300106-61 = "Assim, quantas vezes forem necessárias... eu virei correndo preparar para você."
