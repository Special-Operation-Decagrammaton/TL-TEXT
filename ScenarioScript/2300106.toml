[translation]
2300106-1 = "今日は先生だけのための食卓"
2300106-2 = "（数日間、シャーレの仕事で徹夜が続く中、フウカから連絡が来た）"
2300106-3 = "（メールをもらってから、急いで約束の場所に向かったのだけど）"
2300106-4 = "（約束の場所に着いた瞬間、急に空が歪んだ）"
2300106-9 = "ゲヘナ学園・第12保健室"
2300106-10 = "せ、先生！？大丈夫ですか！？"
2300106-11 = "気が付きましたか？私が誰か分かりますか！？"
2300106-12 = "[s] \"フウカ？えっと……何がどうなってるの？\""
2300106-13 = "時間になって約束の場所に向かったら、先生が倒れていたんです。"
2300106-14 = "保健室の先生のお話では、過労だと。"
2300106-15 = "[s] \"ああ、そういえば昨日も徹夜で……。\""
2300106-16 = "……私のせいです。"
2300106-17 = "[s] \"違うよ、そんなことない。\""
2300106-18 = "いいえ、全部、私のせいで……先生はただでさえシャーレのお仕事で、寝る暇もないくらいお忙しいのに……。"
2300106-19 = "私が料理を振舞うって言って好き勝手に呼び出したり、余計なことをしたせいで、こんなことになってしまって……。"
2300106-20 = "すみません……。"
2300106-21 = "[s] \"フウカ、それは違うよ。\""
2300106-22 = "え……？"
2300106-23 = "[s] \"私はフウカの手料理を食べられて嬉しかったよ。\""
2300106-24 = "いつも……。"
2300106-25 = "いつも先生はそうやって、優しいことを言ってくださいますね……。"
2300106-26 = "私、先生が目を覚ますのを待ちながら、ずっと考えました。"
2300106-27 = "もしかしたら私は、私のわがままで、先生に私が食べさせたいと思った料理を無理強いしてしまっていたんじゃないかと。"
2300106-28 = "なので、今回は先生から教えてください。"
2300106-29 = "先生が食べたいものは、何ですか？"
2300106-30 = "[s] \"私が食べたい物……。\""
2300106-33 = "シャーレ・居住区"
2300106-34 = "家庭料理が食べたいなんて……本当にそれでいいんですか？"
2300106-35 = "[s] \"他でもない、フウカが作ってくれる家庭料理だから。\""
2300106-36 = "先生がそこまでおっしゃるなら、いいのですが……。"
2300106-37 = "はい、私に任せてください！"
2300106-40 = "[wa:2000]― こうなっていると思っていました……。[wa:2500]またインスタントばかり食べてましたね？"
2300106-43 = "[wa:1800]― ダメですよ、[wa:1200]食事はちゃんと取らないと。"
2300106-46 = "― 私がすぐ作りますから、[wa:2000]ちょっと待っててください。"
2300106-49 = "― もう、[wa:1500]健康に気を付けないのは[wa:1400]先生の悪い癖ですよ。"
2300106-52 = "― はい？[wa:1000]ま、[wa:1000]毎日私の作った料理が食べたい、[wa:3000]ですか？"
2300106-54 = "― あ、[wa:500]あはは……[wa:1700]せ、[wa:800]先生さえよろしければ……。[wa:2500]もちろん、[wa:1000]私は構わないのですが……。"
2300106-57 = "シャーレ・居住区"
2300106-58 = "これからも家庭料理が食べたくなったら、私のことを呼んでくださいね。"
2300106-61 = "そしたら何度でも……私がすぐに伺って、作りますから。"
