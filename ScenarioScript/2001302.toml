[translation]
2001302-1 = "Verificação de Segurança"
2001302-2 = "Escritório do Schale"
2001302-4 = "Ao retornar ao escritório após terminar alguns trabalhos, encontrei Chihiro sentada em frente ao PC."
2001302-5 = "[ns1] \"Chihiro, bom trabalho.\"\n[ns2] \"Como está aquela manutenção?\""
2001302-6 = "Sim, isso em si não é um problema."
2001302-7 = "Sim, isso em si não é um problema."
2001302-8 = "Eu só queria verificar os logs e conferir o cache."
2001302-9 = "Felizmente, até agora, não há registros de ninguém invadindo o servidor. Também não encontrei nenhum vírus estranho."
2001302-10 = "……Mas isso não significa que não haja problemas."
2001302-11 = "[s] \"Problemas……?\""
2001302-12 = "……"
2001302-13 = "O problema é a sua consciência de segurança, Sensei!"
2001302-14 = "Por que a senha do PC está escrita no monitor!?"
2001302-15 = "[s] \"É que eu não consigo lembrar de senhas complexas…….\""
2001302-16 = "Mesmo assim, deixar escrito em um lugar onde qualquer um pode ver é inaceitável!"
2001302-17 = "Se alguém mal-intencionado visse isso, não apenas os dados do Sensei e do Schale, mas até os registros das alunas envolvidas poderiam vazar……."
2001302-18 = "O Schale possui autoridade extrajudicial, então você precisa levar isso a sério."
2001302-19 = "O Sensei deveria ter mais consciência de quão importantes são as informações que você manuseia."
2001302-20 = "[s] \"Me desculpe…….\""
2001302-21 = "Bem, como eu disse antes, parece que está tudo bem por enquanto, então……."
2001302-22 = "Mas você precisa ter mais cuidado daqui para frente."
2001302-31 = "Vamos lá, Sensei. Mude a senha. Pode ser algo um pouco mais fácil de lembrar."
2001302-32 = "[s3] \"1, 2, 3, 4……\"\n[s4] \"q, w, e, r……\""
2001302-33 = "……Ei."
2001302-34 = "……Ei."
2001302-35 = "Não adianta nada usar uma senha tão fraca que qualquer um usaria!"
2001302-36 = "[s] \"Pensei que seria fácil de lembrar…….\""
2001302-37 = "Facilidade de lembrar é importante até certo ponto, mas eu disse \"um pouco\"!"
2001302-38 = "Tem que ser uma sequência de caracteres ou números especial que só o Sensei saiba."
2001302-39 = "[s] \"……Como a minha data de nascimento?\""
2001302-40 = "Isso também não! Se for um hacker que está mirando especificamente no Sensei, ele certamente já teria essa informação."
2001302-41 = "Isso é o básico do básico em segurança, Sensei……."
2001302-42 = "Use caracteres que não sejam óbvios. E, se possível, inclua caracteres especiais, misturando letras maiúsculas e minúsculas."
2001302-43 = "Caso contrário, podem acabar descobrindo com uma macro simples."
2001302-44 = "[s5] \"Entendi…….\"\n[s6] \"Segurança é complicado, né…….\""
2001302-45 = "É complicado, mas é necessário. A senha do PC é como a chave da porta de entrada."
2001302-46 = "É complicado, mas é necessário. A senha do PC é como a chave da porta de entrada."
2001302-47 = "Tratar isso com desleixo é como deixar a chave da porta dentro da caixa de correio."
2001302-48 = "[s] \"…….\""
2001302-49 = "Essa cara…… ei, não me diga que você faz isso com a chave da entrada, Sensei?"
2001302-50 = "Ah…… não acredito que o problema não é só na rede……."
2001302-51 = "……Já chega, vou explicar os conceitos de segurança desde o início. Preste atenção."
2001302-53 = "Depois disso, recebi um sermão de dezenas de minutos da Chihiro sobre consciência de segurança."
