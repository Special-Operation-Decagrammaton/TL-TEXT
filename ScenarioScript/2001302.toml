[translation]
2001302-1 = "セキュリティチェック"
2001302-2 = "シャーレ・オフィス"
2001302-4 = "幾つかの仕事を終えてオフィスへ戻ると、チヒロがPCの前に座っていた。"
2001302-5 = "[ns1] \"チヒロ、お疲れ様。\"\n[ns2] \"例のメンテナンスの件はどう？\""
2001302-6 = "うん、それ自体は問題無し。"
2001302-7 = "うん、それ自体は問題無し。"
2001302-8 = "ログを洗って、キャッシュを確認しておきたいだけだったから。"
2001302-9 = "幸いにも今のところは、誰かがサーバーに侵入した記録も無いし。変なウイルスとかも無かった。"
2001302-10 = "……でも、問題が無いってわけじゃない。"
2001302-11 = "[s] \"問題……？\""
2001302-12 = "……"
2001302-13 = "先生のセキュリティ意識の問題！"
2001302-14 = "どうしてPCのパスワードが、モニターのところに書かれてるの！？"
2001302-15 = "[s] \"複雑なパスワードは覚えられなくって……。\""
2001302-16 = "だからってこんな、誰でも見られるところに書いておくなんてダメ！"
2001302-17 = "もし悪意のある誰かにこれが見られたら、先生やシャーレのことはもちろん、関係のある生徒たちの記録まで流出するかもしれないのに……。"
2001302-18 = "シャーレは超法規的権限を持ってるんだから、その辺もちゃんとしないと。"
2001302-19 = "先生は自分がどれだけ重要な情報を扱ってるのか、もっと自覚した方が良い。"
2001302-20 = "[s] \"ごめんなさい……。\""
2001302-21 = "まあさっきも言った通り、今のところは大丈夫そうだったから良いけど……。"
2001302-22 = "これからは気を付けないと。"
2001302-31 = "ほら、先生。パスワードを新しくして。多少覚えやすいものでも良いから。"
2001302-32 = "[s3] \"1、2、3、4……\"\n[s4] \"q、w、e、r……\""
2001302-33 = "……ちょっと。"
2001302-34 = "……ちょっと。"
2001302-35 = "そんな誰でも使うような、強度の低いパスワードじゃ意味無い！"
2001302-36 = "[s] \"覚えやすいかなって……。\""
2001302-37 = "覚えやすさもある程度大事だけど、「多少」って言ったでしょ！"
2001302-38 = "きちんと先生にしか分からないような、特別な文字列とか数字じゃないと。"
2001302-39 = "[s] \"……自分の誕生日とか？\""
2001302-40 = "それもダメ！明確に先生を狙ってるハッカーだったら、それも漏れてるはず。"
2001302-41 = "セキュリティにおける初歩の初歩だよ、先生……。"
2001302-42 = "そういうのじゃない文字列で。それとできれば特殊文字を入れつつ、大文字と小文字も混ぜて。"
2001302-43 = "そうしないと、簡単なマクロとかで開けられかねないから。"
2001302-44 = "[s5] \"そうなんだ……。\"\n[s6] \"大変だね、セキュリティ……。\""
2001302-45 = "大変でもやるの。PCのパスワードは玄関のカギと同じ。"
2001302-46 = "大変でもやるの。PCのパスワードは玄関のカギと同じ。"
2001302-47 = "それを雑に扱うのは、玄関の鍵を郵便ポストに入れておくような行為だよ。"
2001302-48 = "[s] \"……。\""
2001302-49 = "その顔……ねえ、まさかとは思うけど先生。エントランスの鍵を郵便ポストに入れてたりしないよね？"
2001302-50 = "はぁ……ネットワーク系の問題だけじゃないなんて……。"
2001302-51 = "……もう、一からセキュリティの概念について説明するから。ちゃんと聞いて。"
2001302-53 = "その後チヒロから数十分にわたって、セキュリティ意識に関するお説教をもらった。"
