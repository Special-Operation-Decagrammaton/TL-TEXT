[translation]
52040-1 = "Episódio 4; A Nobre da Família Kadenokouji"
52040-6 = "Nós, a família Kadenokouji, construímos laços de confiança com famílias renomadas e organizações dentro e fora de Hyakkiyako desde tempos antigos."
52040-7 = "Oferecemos refeições e abrigo aos dignitários que visitam Hyakkiyako e, em troca, pedimos ajuda para os problemas do nosso clã――"
52040-8 = "Justamente agora, um médico que nos ajuda muito está hospedado aqui."
52040-13 = "Um médico...?"
52040-15 = "Ele não é uma pessoa famosa, mas possui uma arte médica peculiar... #n Eu mesma superei uma doença no passado graças aos medicamentos dele."
52040-16 = "Não sei se, tendo abandonado meus deveres como Miko, ainda posso contar com o poder da família Kadenokouji. #n Mas..."
52040-17 = "Isso também é para que a Nagusa-senpai melhore!"
52040-23 = "Desculpe, Yukari. Esse braço――"
52040-28 = "Ah? #n ......Senhorita! Você voltou!?"
52040-36 = "Estávamos preocupados por não ter notícias. #n Que bom que você parece bem!"
52040-37 = "O fato de ter retornado significa que você retomará seus deveres como Miko――"
52040-46 = "――Não parece ser esse o caso, né."
52040-47 = "Bem-vindos, amigos da senhorita."
52040-48 = "Ouvi dizer que o Comitê de Mediação de Conflitos Hyakkaryouran está muito ocupado... #n Qual é o motivo da visita?"
52040-49 = "Vim como um membro da família Kadenokouji para fazer um pedido. #n Sei que estou sendo atrevida, mas..."
52040-50 = "Um pedido...? Se for uma ordem, farei o que for preciso――"
52040-51 = "Gostaria de pedir a ajuda do médico que está hospedado na nossa casa."
52040-55 = "A-A senhorita se feriu...!?"
52040-56 = "Quem eu gostaria que fosse examinado é esta senpai aqui."
52040-57 = "É um ferimento que não pode esperar. Por favor, eu imploro."
52040-61 = "......Entendido. Vou trazê-lo imediatamente."
52040-68 = "(Algum tempo depois...)"
52040-73 = "Senhorita, trouxe o médico."
52040-78 = "......Ah, então este é o paciente urgente?"
52040-83 = "Hmm, eu pretendia evitar preparar remédios por um tempo, mas..."
52040-84 = "A família Kadenokouji sempre nos ajudou―― #n muito bem, vamos ver o que posso fazer."
52040-86 = "Ora!"
52040-88 = "(Essa aparência, de algum lugar...)"
52040-93 = "Ah!"
52040-97 = "Renge, você reconhece de algum lugar?"
52040-98 = "Ele usa óculos muito estilosos...!"
52040-103 = "Só isso!?"
52040-108 = "Muito prazer, membros da Hyakkaryouran. #n Sou Riku, um médico viajante que estuda medicina por todo Kivotos."
52040-109 = "Por alguns motivos, estava sem um lugar para ficar, #n e a família Kadenokouji gentilmente me acolheu."
52040-110 = "Não sei se serei de grande ajuda, #n mas se puder retribuir essa bondade, ficarei feliz em ajudar."
52040-111 = "Muito obrigada...!"
52040-112 = "O que eu gostaria que examinasse é o braço desta pessoa aqui."
52040-119 = "Opa... um ferimento externo? #n Minha especialidade é medicina interna, mas――"
52040-124 = "Vamos dar uma olhada. Pode tirar a bandagem?"
52040-125 = "......"
52040-135 = "Não importa quantas vezes eu veja... é um ferimento terrível."
52040-136 = "Qual é o diagnóstico?"
52040-141 = "Isso é muito interessante..."
52040-142 = "Você sente dor no braço?"
52040-146 = "......Às vezes."
52040-147 = "Nesse caso, deve ser o que chamamos de 'dor do membro fantasma'."
52040-151 = "......Dor do membro fantasma?"
52040-152 = "Sim, é um tipo de distúrbio neurológico."
52040-153 = "Quando uma parte do corpo é perdida ou amputada, #n estímulos falsos são enviados aos nervos terminais da área afetada, #n fazendo com que uma dor intensa irradie por uma parte que, teoricamente, não existe mais..."
52040-155 = "Mas..."
52040-156 = "O braço da Nagusa-senpai está aqui..."
52040-158 = "Não, o braço não está aqui."
52040-159 = "Pelo que vejo... foi cortado há alguns meses #n e agora está abandonado em algum lugar distante―― algo desse tipo."
52040-160 = "Por exemplo... na escuridão eterna―― dentro do 'Crepúsculo', talvez?"
52040-164 = "......Como você sabe disso?"
52040-165 = "Viajo por todo Kivotos para coletar ingredientes medicinais."
52040-166 = "Animais e plantas selvagens mudam sua aparência e efeitos de acordo com o ambiente onde crescem. #n No entanto, o que crescia no 'Distrito Norte' de Hyakkiyako #n tinha propriedades únicas."
52040-167 = "Mesmo uma planta que parece comum é, na verdade, um ser morto enquanto vive―― #n um estado semelhante a uma 'sombra' que não emite sopro de vida."
52040-168 = "Os habitantes locais diziam: 'Aquilo foi engolido pelo Crepúsculo'."
52040-169 = "......Seu braço não deve estar na mesma condição?"
52040-173 = "......Sim. Este ferimento é uma marca do Crepúsculo."
52040-178 = "Então ele não era um charlatão..."
52040-179 = "......Renge. Ele é um convidado da família Kadenokouji. Cuidado com o que diz."
52040-181 = "Conseguir identificar a causa tão rápido, como esperado de um médico!"
52040-182 = "E então... como podemos curar o braço da Nagusa-senpai?"
52040-186 = "Existe apenas uma maneira de curar completamente a dor do membro fantasma. É recuperar a parte perdida."
52040-187 = "Até recuperar o braço, essa dor provavelmente continuará."
52040-194 = "Então, não temos escolha a não ser ir até lá..."
52040-195 = "Não há outro método...?"
52040-196 = "É apenas um paliativo... mas exercícios podem aliviar a dor."
52040-197 = "Existe uma série de exercícios que um conhecido meu, que costuma ficar de cama, começou a fazer pela saúde. #n Enviarei o vídeo mais tarde."
52040-198 = "Obrigada. Vou assistir."
52040-199 = "Mas, tenha isso em mente:"
52040-205 = "O tempo não cura esse ferimento. #n Pelo contrário, quanto mais você adiar, #n mais isso corroerá seu corpo e mente como uma doença incurável."
52040-206 = "Não recomendo deixar para depois."
52040-210 = "......"
52040-211 = "Cuide-se."
52040-217 = "Ele disse para recuperar o braço que ainda está aqui. É um enigma...?"
52040-218 = "Mas, como a Nagusa-senpai disse, se a causa do ferimento é o Crepúsculo, #n tratamentos normais são inúteis, certo?"
52040-219 = "Eu também nunca ouvi falar de um método para recuperar algo engolido pelo Crepúsculo..."
52040-220 = "Para começar, o 'Crepúsculo' e a 'Hyakumonogatari', #n até aquele dia, eu pensava que fossem apenas... #n contos de fadas."
52040-227 = "Ei, tem uma história que eu quero que vocês ouçam."
52040-228 = "Eu... ainda não contei tudo a vocês."
52040-234 = "Vergonhoso e assustador... sobre aquele dia do qual não consegui falar."
52040-238 = "O que aconteceu entre mim e a Ayame. #n Vocês... podem ouvir tudo?"
52040-242 = "Próximo Episódio; Desejos Além das Memórias"

