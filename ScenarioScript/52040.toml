[translation]
52040-1 = "Episódio 4; A Nobre da Família Kade-no-Koji"
52040-6 = "Nós, da família Kade-no-Koji, construímos laços de confiança com famílias nobres e organizações dentro e fora de Hyakkiyako desde os tempos antigos."
52040-7 = "Oferecemos refeições e abrigo aos notáveis que visitam Hyakkiyako e, em troca, pedimos ajuda com os problemas da nossa linhagem..."
52040-8 = "Justamente agora, um médico que nos presta serviços está hospedado aqui."
52040-13 = "Um médico...?"
52040-15 = "Ele não é uma pessoa famosa, mas possui técnicas médicas peculiares... Antigamente, eu mesma superei uma doença com os remédios dele."
52040-16 = "Não sei se, tendo abandonado meus deveres como sacerdotisa, ainda posso contar com o poder da família Kade-no-Koji. Mas..."
52040-17 = "Tudo isso é para que a Nagusa-senpai melhore!"
52040-23 = "Desculpe, Yukari. Este braço está..."
52040-28 = "Ora? ...Senhorita! A senhora voltou!?"
52040-36 = "Estávamos preocupados por não termos notícias. Fico muito feliz em vê-la bem!"
52040-37 = "Se a senhora retornou, significa que retomará seus deveres como sacerdotisa...?"
52040-46 = "Parece que... não é bem esse o caso."
52040-47 = "Sejam bem-vindos, amigos."
52040-48 = "Ouvi dizer que o Comitê de Mediação de Conflitos Hyakka Ryoran está muito ocupado... Qual seria o motivo da visita?"
52040-49 = "Como membro da família Kade-no-Koji, vim fazer um pedido. Sei que é um pedido ousado, mas..."
52040-50 = "Um pedido...? Se for algo que possamos fazer, faremos imediatamente..."
52040-51 = "Gostaria de pedir a ajuda do médico que está hospedado em nossa casa."
52040-55 = "A, a senhorita está ferida...!?"
52040-56 = "Quem precisa ser examinada é esta senpai aqui."
52040-57 = "O ferimento é urgente. Por favor, eu imploro."
52040-61 = "...Entendido. Vou buscá-lo imediatamente."
52040-68 = "(Algum tempo depois...)"
52040-73 = "Senhorita, trouxe o médico."
52040-78 = "...Ora, seria esta a paciente urgente de quem falou?"
52040-83 = "Hum, eu pretendia evitar preparar remédios por um tempo, mas..."
52040-84 = "Como a família Kade-no-Koji sempre cuidou de mim, vamos lá, vou dar uma mãozinha."
52040-86 = "Nossa!"
52040-88 = "(Essa aparência, em algum lugar...)"
52040-93 = "Ah!"
52040-97 = "Renge, você se lembra de algo?"
52040-98 = "Ele usa óculos muito estilosos...!"
52040-103 = "É nisso que você está prestando atenção!?"
52040-108 = "Muito prazer, pessoal da Hyakka Ryoran. Meu nome é Riku, um médico viajante que estuda medicina por todo o Kivotos."
52040-109 = "Por alguns motivos, eu estava sem lugar para ficar, e a família Kade-no-Koji gentilmente me acolheu."
52040-110 = "Não sei se serei de grande ajuda, mas se puder retribuir esse favor, ficarei feliz em oferecer meu auxílio."
52040-111 = "Muito obrigada...!"
52040-112 = "O que precisa ser examinado é o braço desta pessoa."
52040-119 = "Ora... um trauma físico. Minha especialidade é medicina interna, mas..."
52040-124 = "Deixe-me ver. Pode tirar a bandagem?"
52040-125 = "..."
52040-135 = "Não importa quantas vezes eu veja... é um ferimento terrível."
52040-136 = "Qual é o seu diagnóstico?"
52040-141 = "Isso é muito interessante..."
52040-142 = "Você sente dor no braço?"
52040-146 = "...Às vezes."
52040-147 = "Nesse caso, deve ser o que chamamos de dor do membro fantasma."
52040-151 = "...Dor do membro fantasma?"
52040-152 = "Sim, é um tipo de distúrbio neurológico."
52040-153 = "Quando uma parte do corpo é perdida ou amputada, estímulos falsos são enviados aos nervos periféricos da área afetada, causando uma dor intensa em um membro que, teoricamente, não deveria existir..."
52040-155 = "Mas……."
52040-156 = "O braço da Nagusa-senpai está devidamente……."
52040-158 = "Não, o braço não está aqui."
52040-159 = "Pelo que parece…… foi decepado há alguns meses e #nagora está abandonado em algum lugar distante — é mais ou menos isso."
52040-160 = "Por exemplo…… nas profundezas da escuridão eterna — no \"Crepúsculo\", talvez?"

52040-164 = "……Como você sabe disso?"
52040-165 = "Eu tenho viajado por várias partes de Kivotos para coletar ingredientes medicinais."
52040-166 = "A fauna e a flora selvagens mudam sua aparência e propriedades dependendo do ambiente em que nascem e crescem. #nNo entanto, o que crescia no \"Distrito Norte\" de Hyakkiyako #npossuía propriedades singulares."

52040-167 = "Mesmo plantas que pareciam comuns estavam, na verdade, mortas enquanto vivas — #num estado semelhante a uma \"sombra\" que não demonstrava o sopro da vida."

52040-168 = "Os habitantes locais diziam: \"Aquilo foi engolido pelo Crepúsculo\"."

52040-169 = "……O seu braço não seria o mesmo caso?"
52040-173 = "……Sim. Esta ferida é um vestígio do Crepúsculo."
52040-178 = "Então ele não era um charlatão……."
52040-179 = "……Renge. Ele é um convidado da família Kadenokouji. Controle a língua."
52040-181 = "Conseguir identificar a causa tão rapidamente, como esperado de um médico!"
52040-182 = "E então…… o que podemos fazer para curar o braço da Nagusa-senpai?"
52040-186 = "Existe apenas uma maneira de curar completamente a dor do membro fantasma. É recuperar o corpo perdido."
52040-187 = "Até recuperar o braço, essa dor provavelmente continuará."
52040-194 = "Pelo visto, não temos escolha a não ser ir até lá……."
52040-195 = "Não existe nenhum outro método……?"
52040-196 = "É apenas um paliativo…… mas dizem que exercícios ajudam a aliviar a dor."
52040-197 = "Uma conhecida que costuma ficar acamada #niniciou uma rotina de exercícios pela saúde. #nEnviarei o vídeo para vocês mais tarde."
52040-198 = "Obrigada. Vou dar uma olhada."
52040-199 = "Mas, por favor, tenham isto em mente."
52040-205 = "O tempo não cura esta ferida. #nPelo contrário, quanto mais tempo se perde, #nmais ela corrói o corpo e a mente como algo incurável."
52040-206 = "Não recomendo que deixem para depois."
52040-210 = "……."
52040-211 = "Melhoras."
52040-217 = "Dizer para recuperar um braço que já está lá. Seria um enigma……?"
52040-218 = "Mas, como a Nagusa-senpai disse, se a causa da ferida é o Crepúsculo, #ntratamentos comuns são inúteis, não é?"
52040-219 = "Eu também nunca ouvi falar de um método para recuperar algo que foi engolido pelo Crepúsculo……."
52040-220 = "Para começar, até aquele dia, o \"Crepúsculo\" e as \"Cem Histórias\" eram como a Kuzunoha-sama — #ncoisas que eu achava que só existiam em contos de fadas."

52040-227 = "Ei, tem uma coisa que eu quero que vocês ouçam."
52040-228 = "Eu…… ainda não contei tudo para vocês."
52040-234 = "Por vergonha e medo…… eu não conseguia falar sobre aquele dia."
52040-238 = "O que aconteceu entre mim e a Ayame. #nVocês…… podem me ouvir?"
52040-242 = "Próximo episódio: O Desejo Além das Memórias"
