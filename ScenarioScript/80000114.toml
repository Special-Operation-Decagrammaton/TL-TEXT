[translation]
80000114-1 = "二人だけの秘密"
80000114-2 = "（昼下がり、シャーレで事務作業をしていると誰かが訪ねてきた）"
80000114-8 = "やっほー！イブキだよーっ！"
80000114-9 = "先生も元気にしてた？"
80000114-10 = "[s] \"もちろんだよ、イブキ！\""
80000114-11 = "えへへ、ここで問題です！"
80000114-12 = "今日、イブキがシャーレに来た理由は分かる～？"
80000114-13 = "[s1] \"もしかして、私に会いに来てくれたの？\"\n[s2] \"一緒に遊びたかったからとか？\""
80000114-16 = "惜しいけど残念っ！"
80000114-17 = "今日は、先生にあげたい物があって来たの！"
80000114-18 = "……じゃーん！"
80000114-25 = "今日はバレ……バレタイン……？#nそう、バレンタインの日って聞いたの！"
80000114-26 = "イブキ、よく分かんないけど、一緒に甘いもの食べるんでしょ？"
80000114-27 = "だから、先生にこれあげようと思って！#nイブキ、作ってきたの！"
80000114-28 = "イブキ特製、チョコプリンだよ！"
80000114-29 = "[s] \"すごく美味しそう！\""
80000114-30 = "でしょでしょ？"
80000114-31 = "チョコレートもプリンも！全部イブキの大好きなものなの！"
80000114-32 = "絶対美味しいよ！早く食べてみて、先生！"
80000114-33 = "[s3] \"ありがとう。じゃあ、さっそく頂くね。\"\n[s4] （チョコプリンを食べる）"
80000114-39 = "どう？先生？美味しい？"
80000114-40 = "[s5] \"本当に甘くて美味しいよ！\"\n[s6] \"すっごく甘くて美味しいね！\""
80000114-43 = "（……じーっ）"
80000114-44 = "[ns] （もう一口食べる）"
80000114-47 = "……ごくり。"
80000114-51 = "[ns] \"……あ、ごめん。イブキのスプーンも持ってくるね。\""
80000114-52 = "だ、ダメ！"
80000114-53 = "そのプリンは、先生のために持ってきたものだし……それに……"
80000114-54 = "……夜ごはんの前だもん。"
80000114-55 = "先輩がね、ごはんの前におやつ食べちゃダメって言ってたから……"
80000114-56 = "イブキは帰ったら夜ごはんだから、プリンは先生が……うぅ。"
80000114-57 = "[s] \"イブキは偉いね、先輩との約束をちゃんと守って。\""
80000114-58 = "……うん。"
80000114-59 = "[s] \"でも、バレンタインデーは一緒に甘いものを食べる日なんでしょ？\""
80000114-60 = "……！"
80000114-61 = "けど……それじゃ夜ご飯入らなくなっちゃう……先輩に言われたのに……"
80000114-62 = "（……ごくり）"
80000114-63 = "[s] \"なら、こっそりちょっとだけ食べよっか。\""
80000114-64 = "ちょっとだけ……？"
80000114-65 = "[s] \"うん、2人だけの秘密だよ。\""
80000114-66 = "先生と……2人だけの秘密……"
80000114-67 = "うん！食べたい！"
80000114-68 = "本当は先生と一緒に食べたかったの！"
80000114-69 = "[s] \"うん、みんなには内緒だよ。\""
80000114-70 = "えへへ、いただきます！"
80000114-72 = "（その後、イブキと一緒にこっそりチョコプリンを食べた）"
