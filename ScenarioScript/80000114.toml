[translation]
80000114-1 = "Um segredo só nosso"
80000114-2 = "（No início da tarde, enquanto eu trabalhava no Schale, alguém veio me visitar）"
80000114-8 = "Iahô! É a Ibuki!"
80000114-9 = "Sensei, você tem passado bem?"
80000114-10 = "[s] \"Claro que sim, Ibuki!\""
80000114-11 = "Ehehe, aqui vai uma pergunta!"
80000114-12 = "Você sabe por que a Ibuki veio ao Schale hoje?"
80000114-13 = "[s1] \"Por acaso você veio me ver?\"\n[s2] \"Será que é porque queria brincar comigo?\""
80000114-16 = "Passou perto, mas errou!"
80000114-17 = "Eu vim hoje porque tenho algo para te dar, Sensei!"
80000114-18 = "……Tcharam!"
80000114-25 = "Hoje é o Vale... Valentain...?#nIsso, ouvi dizer que é o dia de São Valentim!"
80000114-26 = "Eu não entendo muito bem, mas a gente come coisas doces juntos, né?"
80000114-27 = "Por isso, pensei em te dar isto!#nEu mesma fiz!"
80000114-28 = "É um pudim de chocolate especial da Ibuki!"
80000114-29 = "[s] \"Parece delicioso!\""
80000114-30 = "Né, né?"
80000114-31 = "Chocolate e pudim! São as minhas coisas favoritas!"
80000114-32 = "Com certeza está gostoso! Experimenta logo, Sensei!"
80000114-33 = "[s3] \"Obrigado. Então, vou provar agora mesmo.\"\n[s4] （Comendo o pudim de chocolate）"
80000114-39 = "E aí? Sensei? Está gostoso?"
80000114-40 = "[s5] \"Está realmente doce e delicioso!\"\n[s6] \"Está muito doce e gostoso!\""
80000114-43 = "（……encarando）"
80000114-44 = "[ns] （Dando mais uma colherada）"
80000114-47 = "……glup."
80000114-51 = "[ns] \"……Ah, desculpe. Vou buscar uma colher para você também, Ibuki.\""
80000114-52 = "N-não pode!"
80000114-53 = "Esse pudim é algo que eu trouxe para você, Sensei... e além disso..."
80000114-54 = "……Ainda não é hora do jantar."
80000114-55 = "A senpai disse que não posso comer doces antes da refeição..."
80000114-56 = "Eu vou jantar quando chegar em casa, então o pudim é para você, Sensei... ugh."
80000114-57 = "[s] \"Você é muito responsável, Ibuki, cumprindo direitinho a promessa que fez à sua senpai.\""
80000114-58 = "……Sim."
80000114-59 = "[s] \"Mas, o dia de São Valentim não é um dia para comermos doces juntos?\""
80000114-60 = "……!"
80000114-61 = "Mas... se eu comer, não vou conseguir jantar... e a senpai me avisou..."
80000114-62 = "（……glup）"
80000114-63 = "[s] \"Então, que tal comermos só um pouquinho escondidos?\""
80000114-64 = "Só um pouquinho...?"
80000114-65 = "[s] \"Sim, será um segredo só nosso.\""
80000114-66 = "Um segredo... só meu e do Sensei..."
80000114-67 = "Sim! Eu quero comer!"
80000114-68 = "Na verdade, eu queria mesmo era comer com você, Sensei!"
80000114-69 = "[s] \"Certo, vamos manter segredo de todo mundo.\""
80000114-70 = "Ehehe, então vou comer!"
80000114-72 = "（Depois disso, comi o pudim de chocolate escondido junto com a Ibuki）"
