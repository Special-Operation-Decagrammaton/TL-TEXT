[translation]
1002006-1 = "O que você pretende fazer?"
1002006-2 = "（Eu estava quase desmaiando de exaustão, mas decidi ir até o local onde Koharu me chamou.）"
1002006-3 = "（Parece que ela estava me esperando, pois já consigo vê-la.）"
1002006-4 = "Ah, Sensei. Por aqui... eu estava esperando."
1002006-5 = "N-normalmente, eu não tomaria uma atitude tão arriscada quanto chamar o Sensei para um lugar perigoso como este, mas..."
1002006-6 = "[s1] \"Um lugar perigoso...?\"\n[s2] \"O que você está tramando agora...?\""
1002006-7 = "E-ei, é claro que é, não é?"
1002006-8 = "E-ei, é claro que é, não é?"
1002006-9 = "Depois da aula, sem ninguém por perto, na entrada da escola..."
1002006-10 = "Basicamente, não passa quase ninguém, e tem aquela sensação de suspense de não saber quando alguém pode aparecer..."
1002006-11 = "Isso é muito usado como cenário nessas situações, e parece que tem gente que gosta desse suspense, mas..."
1002006-12 = "……Ah!"
1002006-13 = "S-será que o Sensei também é do tipo que gosta disso...?"
1002006-14 = "Droga, eu não tinha pensado nisso...!?"
1002006-15 = "Se for realmente o caso, essa situação é...!!"
1002006-16 = "[s3] \"Não, calma, está tudo bem...\"\n[s4] \"Bem, se não tem nada para fazer, posso ir embora...?\""
1002006-17 = "……Sério mesmo?"
1002006-18 = "Sério, sério mesmo, posso confiar em você...?"
1002006-19 = "Você não está tentando me fazer baixar a guarda, está...?"
1002006-20 = "E-espera...!"
1002006-21 = "Eu tenho um assunto real para tratar...!"
1002006-22 = "Bem, então, tipo..."
1002006-23 = "Aqui, pegue... uns biscoitos que comprei na loja da Momo Friends."
1002006-24 = "V-você me ajudou com os estudos da última vez, então é como um agradecimento..."
1002006-25 = "N-não tem segundas intenções, entendeu?"
1002006-26 = "[s] \"Obrigado, vou comer com prazer.\""
1002006-27 = "Sim... n-não tem nenhum outro significado além disso, de verdade."
1002006-28 = "E-eu não misturei nada estranho nem nada..."
1002006-29 = "E-eu sei que esse tipo de situação acontece muito, mas...!"
1002006-30 = "Dar um primeiro para você provar, i-isso não significa nada, tá entendendo...!?"
1002006-31 = "[s5] \"Como sempre, você viajou para um mundo estranho...\"\n[s6] \"Estou ficando cada vez mais tonto...\""
1002006-32 = "Q-que cara é essa..."
1002006-33 = "Q-que cara é essa..."
1002006-34 = "P-por que o Sensei está fazendo essa cara...? Na verdade, quem deveria querer fazer isso sou eu..."
1002006-35 = "Para começo de conversa, eu chamei você aqui para garantir que o Sensei não fizesse nada estranho..."
1002006-36 = "[s7] ……Está na hora de dar uma lição.\n[s8] ……Vou te assustar um pouquinho."
1002006-46 = "Hii!? S-Sensei...!?"
1002006-49 = "[wa:200]— O, [wa:600]o que...!?"
1002006-52 = "— （A, [wa:600]ahn... [wa:1200]isso é, [wa:1050]será que...!?）"
1002006-55 = "[wa:250]— E- [wa:500]eu [wa:500]não [wa:600]disse [wa:300]nada [wa:700]de errado, disse!?"
1002006-58 = "— （Espera, [wa:850]será que [wa:500]se continuar assim [wa:450]eu, [wa:1000]com o Sensei...!?）"
1002006-61 = "— （E- [wa:600]esse [wa:600]tipo de [wa:850]situação, [wa:850]eu já vi várias vezes nos livros...!）"
1002006-63 = "[wa:100]— （Sério, [wa:1200]será que vai entrar naquele roteiro mesmo!?）"
1002006-66 = "[wa:200]— （A, [wa:700]aquilo, [wa:1100]e aquilo outro, [wa:750]e tal...）"
1002006-69 = "— （!? [wa:1000]N- [wa:650]não me diga [wa:950]que [wa:500]até isso...!?）"
1002006-72 = "— V- [wa:750]você finalmente [wa:450]revelou [wa:300]sua verdadeira face, [wa:900]Sensei...!?"
1002006-75 = "— （Ferrou, ferrou, ferrou...!）"
1002006-77 = "[wa:100]— （E- [wa:600]eu [wa:350]ainda não estou [wa:900]preparada para isso!?）"
1002006-80 = "[ns] Fazer carinho na cabeça."
1002006-83 = "……?"
1002006-84 = "……Ê, ah, uaaaaah!!?!?"
1002006-87 = "……."
1002006-88 = "Ê, eh……?"
1002006-89 = "（Depois disso, enquanto ajudava Koharu, que tinha caído sentada de susto, a se levantar e a acalmava, assim que voltei para o Schale, desabei de sono）"
