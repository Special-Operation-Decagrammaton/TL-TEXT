[translation]
1002006-1 = "何するつもり？"
1002006-2 = "（今にでも疲労で倒れそうだったけれど、とりあえずコハルに呼ばれた場所に行ってみた）"
1002006-3 = "（先に待っていたようで、コハルの姿が見えてきた）"
1002006-4 = "あ、先生。こっち……待ってた。"
1002006-5 = "い、いつもだったら、こんな危険な場所に先生を呼ぶなんて、リスクの高い行動はしないんだけど……。"
1002006-6 = "[s1] \"危険な場所……？\"\n[s2] \"今度はまた何を考えてるのか……。\""
1002006-7 = "だ、だってそうでしょ？"
1002006-8 = "だ、だってそうでしょ？"
1002006-9 = "誰もいない放課後、学校の入口……。"
1002006-10 = "基本的に人通りは少ないけれど、いつ誰が来るか分からないスリル感……。"
1002006-11 = "よくそういう時の背景としても使われるし、人によってはそのスリル感が好きみたいだけど……。"
1002006-12 = "……はっ！"
1002006-13 = "も、もしかして、先生もそういうのが好きなタイプ……？"
1002006-14 = "やっちゃった、それは考えてなかった……！？"
1002006-15 = "もし本当にそうだとしたら、この状況は……！！"
1002006-16 = "[s3] \"いや、落ち着いて、大丈夫だから……。\"\n[s4] \"えっと、用事がないなら帰っても良いかな……？\""
1002006-17 = "……本当に？"
1002006-18 = "本当の本当に、信頼して良いの……？"
1002006-19 = "そうやって油断させようとか思ってない……？"
1002006-20 = "ま、待って……！"
1002006-21 = "ちゃんと用事あるから……！"
1002006-22 = "えっと、じゃあその……。"
1002006-23 = "はい、これ……モモフレンズのショップで買ったクッキー。"
1002006-24 = "こ、この前は勉強見てもらったし、お礼として……。"
1002006-25 = "べ、別に他意は無いから……分かってる？"
1002006-26 = "[s] \"ありがとう、美味しくいただくね。\""
1002006-27 = "うん……ほ、本当にそれ以外に意味は無いから。"
1002006-28 = "べ、別に、変なものとかも混ぜてないし……。"
1002006-29 = "そ、そういう展開がよくあるのは知ってるけど……！"
1002006-30 = "先に一つあげるねとか、そ、そういうことをしても別に意味無いんだからね……！？"
1002006-31 = "[s5] \"毎度のごとく変な世界に行っちゃった……。\"\n[s6] \"ますますクラクラしてきた……\""
1002006-32 = "な、なにその表情……。"
1002006-33 = "な、なにその表情……。"
1002006-34 = "ど、どうして先生がそういう顔をするの……？むしろそうしたいのはこっち側って言うか……。"
1002006-35 = "そもそも私は、先生が変なことをしないよう監視するために……"
1002006-36 = "[s7] ……そろそろお灸をすえてみよう。\n[s8] ……ちょっとだけ脅かしてみよう。"
1002006-46 = "ひっ！？せ、先生……！？"
1002006-49 = "[wa:200]― な、[wa:600]何……！？"
1002006-52 = "― （あ、[wa:600]あれっ……[wa:1200]これって、[wa:1050]まさか……！？）"
1002006-55 = "[wa:250]― べ、[wa:500]別に[wa:500]私、[wa:600]何も[wa:300]間違ったことは[wa:700]言ってないでしょ！？"
1002006-58 = "― （待って、[wa:850]もしかして[wa:500]このままだと[wa:450]私、[wa:1000]先生と……！？）"
1002006-61 = "― （こ、[wa:600]こういう[wa:600]展開、[wa:850]本で何度も見たことある……！）"
1002006-63 = "[wa:100]― （本当に、[wa:1200]本当にあの流れに入っちゃうの！？）"
1002006-66 = "[wa:200]― （あ、[wa:700]あんなこととか、[wa:1100]こんなこと、[wa:750]とか……）"
1002006-69 = "― （っ！？[wa:1000]ま、[wa:650]まさか、[wa:950]そんな[wa:500]ことまで……！？）"
1002006-72 = "― つ、[wa:750]ついに[wa:450]本性を[wa:300]表したわね、[wa:900]先生……！？"
1002006-75 = "― （やばいやばいやばい……！）"
1002006-77 = "[wa:100]― （ま、[wa:600]まだ[wa:350]覚悟とか[wa:900]全然できてないんだけど！？）"
1002006-80 = "[ns] 頭を撫でる。"
1002006-83 = "……？"
1002006-84 = "……え、あ、うああぁぁぁっ！！？！？"
1002006-87 = "……。"
1002006-88 = "え、えっ……？"
1002006-89 = "（その後、腰を抜かしてしまったコハルを立たせつつ宥めた後、シャーレに戻った瞬間に倒れるようにして眠った）"
