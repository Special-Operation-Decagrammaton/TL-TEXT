[translation]
10006010-1 = "～リハーサル編～;初音ミクのスペシャルライブ in キヴォトス"
10006010-5 = "みなさん、こんにちは！バーチャル・シンガーの初音ミクです！"
10006010-6 = "こんな風にお会いするのは、初めての方も多いかと思います。"
10006010-7 = "ここキヴォトスでみなさんと会うことができて、私、とっても嬉しいです！"
10006010-8 = "今回このように、キヴォトスでライブをさせてもらうにあたって……"
10006010-9 = "なんと、こうして実際の身体を用意していただきました！"
10006010-10 = "ふふっ、どうですか？とっても素敵だと思いません？"
10006010-11 = "ただ、この身体になったばかりなこともあって、まだ上手くリズムが取れなくって……。"
10006010-12 = "実際にこの身体を作ってくれたエンジニアさん曰く、細かいチューニングを行うためにはもっと本番に近い動きのデータが必要、とのことなんです。"
10006010-13 = "ですのでこうして今回リハーサルとして、みなさんの前で「特別な予行演習」をさせていただくことになりました！"
10006010-14 = "というわけでみなさん、応援よろしくお願いしますね！"
10006010-15 = "あ、でもこのリハーサルの後、本番にもちゃーんと来てくださいよ？"
