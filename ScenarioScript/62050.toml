[translation]
62050-1 = "Episódio 5; Basílica de Arius"
62050-7 = "A veterana disse para nos reunirmos na [ruby=Basílica]Grande Basílica[/ruby], mas..."
62050-8 = "Quase não usamos este lugar desde aquele dia..."
62050-13 = "Basílica de Arius..."
62050-14 = "Há muito tempo... começamos a usar este lugar depois que Arius foi exilada, não foi?"
62050-16 = "Sim. E acho que o nome 'Basílica' foi dado naquela época."
62050-17 = "Mas por que agora, depois de tanto tempo...?"
62050-22 = "……Não sei direito."
62050-23 = "O que este lugar é... para [ruby=Arius]nós[/ruby] agora?"
62050-24 = "……Por que a veterana nos reuniu aqui?"
62050-30 = "Todas já estão aqui?"
62050-36 = "……Vocês parecem ansiosas."
62050-37 = "Está tudo bem. Eu me sinto da mesma forma."
62050-38 = "Primeiro, há uma coisa que quero confirmar."
62050-39 = "Se o meu entendimento estiver correto, todas vocês aqui hoje――"
62050-45 = "devem ter ouvido a voz descrita no 'Apocalipse'."
62050-46 = "Se houver alguém que não ouviu, por favor, sinta-se à vontade para dizer."
62050-52 = "……Parece que não há ninguém. #nEntão, aquela voz chegou a todas nós."
62050-53 = "……No entanto, ainda não estou convicta se aquela voz realmente se refere ao próprio 'Apocalipse'."
62050-54 = "Hã...? Por que diz isso? #nFoi tão claro... e todas nós ouvimos...?"
62050-55 = "As escrituras do Apocalipse não se limitam a isso."
62050-56 = "「E olhei, e ouvi uma [ruby=águia]águia[/ruby] voar pelo meio do céu, dizendo com grande voz:」"
62050-57 = "「Ah, calamidade, calamidade, calamidade para aqueles que habitam na terra.」"
62050-58 = "「Pois os outros três anjos ainda estão para tocar suas trombetas.」"
62050-59 = "……A razão pela qual não tenho certeza é a primeira parte―― o trecho sobre a [ruby=águia]águia[/ruby] voando pelo céu."
62050-60 = "Esqueça uma águia, eu não vi sequer a silhueta de um pássaro."
62050-61 = "Alguém aqui viu uma águia... ou algo parecido com um pássaro?"
62050-65 = "……Pelo visto, ninguém aqui também. Entendido."
62050-66 = "E mais uma coisa. #n……Acredita-se que o som das trombetas ecoará sete vezes, correto?"
62050-67 = "Sim... deveria ser assim."
62050-68 = "E de acordo com a voz, o som das trombetas já ecoou quatro vezes. Isso também está correto?"
62050-69 = "……Exatamente."
62050-70 = "……No entanto, eu nunca ouvi o som de uma trombeta até agora. #nE quanto a vocês?"
62050-75 = "Eu ouvi!"
62050-76 = "Eu não ouvi nada!"
62050-77 = "O quê? Mas o som estava tão alto?!"
62050-78 = "Por isso que eu já te disse antes! #nSerá que você não ouviu errado...?!"
62050-79 = "Mas todo mundo ouviu a voz, não foi?"
62050-86 = "Entendi. Sendo assim……"
62050-87 = "……."
62050-88 = "Pessoal? O que vou fazer agora é apenas uma verificação, então não se preocupem."
62050-89 = "Quem ouviu o som das trombetas, por favor, vá para a esquerda; quem não ouviu, vá para a direita."
62050-105 = "(……O número de pessoas do lado que ouviu é visivelmente menor.)"
62050-109 = "(Olhando bem, parece que há outros pontos em comum...?)"
62050-110 = "Certo, obrigada."
62050-111 = "Agora, vou lhes dizer a minha conclusão no momento."
62050-118 = "Acho que devemos ir até 'Porta Pacis' e investigar a verdade por trás desses acontecimentos."
62050-123 = "Porta Pacis?! Veterana, você está falando sério...?"
62050-124 = "A veterana sempre fala sério... e especialmente em momentos como este."
62050-126 = "Mas aquele não é um lugar onde nem a Madame costumava entrar...?"
62050-127 = "Mas a Madame não está mais aqui..."
62050-128 = "E nem tudo o que a Madame dizia estava necessariamente certo..."
62050-130 = "Pode até ser, mas..."
62050-132 = "Eu entendo a ansiedade de vocês."
62050-133 = "Mas se há alguma pista... também é verdade que, pelo menos dentro de Arius, não há outro lugar senão 'Porta Pacis'."
62050-134 = "……Afinal, a história de Arius e as várias interpretações das escrituras estão guardadas lá."
62050-135 = "M-Mas se entrarmos em 'Porta Pacis'..."
62050-136 = "……Pois é."
62050-137 = "Se aqueles sem qualificação, sem fé, ou que perderam a fé entrarem――"
62050-138 = "perderão a si mesmos no final e vagarão por Arius para sempre. #nÉ o que dizem."
62050-142 = "Mesmo assim, precisamos encarar isso. #nEste fenômeno que está acontecendo bem aqui, na nossa Arius."
62050-143 = "……Um lugar onde acontecem coisas que desafiam a compreensão humana."
62050-144 = "Essa é Arius."
62050-147 = "Muito menos... quando tentaram fazer com que nós 'não existíssemos' para desviar o olhar da verdade e esconder seus próprios pecados――"
62050-148 = "não podemos seguir pelo mesmo caminho daquela Trinity imoral."
62050-151 = "Ainda é apenas uma hipótese, mas o fato de o conteúdo do Apocalipse ter se tornou realidade pode ser devido à influência de Trinity e――"
62050-152 = "do 'Sensei' da SCHALE."
62050-154 = "O-O Sensei?! Deixando Trinity de lado, o Sensei..."
62050-155 = "O Sensei parecia uma boa pessoa..."
62050-156 = "Sim. Acho que o Sensei é uma boa pessoa. Eu também admito isso."
62050-157 = "……Mas as boas intenções nem sempre trazem bons resultados. #nVocês devem saber muito bem disso."
62050-158 = "……."
62050-159 = "De qualquer forma, a [ruby=Trinity]Corporação de Cavaleiros de Resgate[/ruby] pisou em solo de Arius mais uma vez."
62050-160 = "De fato, o Apocalipse se manifestou logo em seguida."
62050-161 = "Ou seja, já que foi o 'Sensei' quem trouxe Trinity para cá――"
62050-162 = "é natural pensar que a causa deste incidente também reside em Trinity... e, por extensão, no Sensei."
62050-168 = "É-É verdade, talvez seja isso..."
62050-169 = "Mesmo sem fazer coisas desnecessárias como estudar ou fazer exames..."
62050-170 = "Nós teríamos dado um jeito de continuar vivendo do nosso próprio modo."
62050-171 = "Para começar, o que é estudar? Tem algum sentido?"
62050-172 = "É difícil, eu não entendo nada e dá sono."
62050-173 = "É uma perda de tempo. Que desperdício."
62050-174 = "Bem, é verdade que a gente não tinha mais nada para fazer, mas..."
62050-176 = "(Estas são... as do lado que 'não ouviu' a trombeta.)"
62050-181 = "……Mas acho que eu não odiava estudar."
62050-182 = "Eu também. Pude entender um pouco como é o mundo lá fora..."
62050-183 = "Em vez de treinar formas de machucar os outros..."
62050-184 = "Para falar a verdade, eu não entendi absolutamente nada da matéria... e foi bem chato. #nEra entediante e dava sono, mas..."
62050-185 = "Mesmo assim... foi bom."
62050-186 = "Poder ter alguém que realmente me escutasse e conseguir expressar minhas próprias palavras..."
62050-192 = "(E estas são as do lado que 'ouviu' a trombeta...?)"
62050-196 = "(……Não pode ser!?)"
62050-197 = "(Não... devo observar a situação mais um pouco...)"
62050-201 = "A propósito, pessoal."
62050-202 = "Na pior das hipóteses, se os anjos tocarem todas as sete trombetas... o que vocês acham que vai acontecer?"
62050-204 = "Hã? I-Isso quer dizer...!"
62050-205 = "Não pode ser!"
62050-207 = "Mas no Apocalipse..."
62050-208 = "É verdade. Nós estudamos bastante o Apocalipse, se é que estudamos alguma coisa. #nEntão, se as sete trombetas tocarem..."
62050-213 = "Arius vai... ser destruída?"
62050-216 = "……."
62050-217 = "Sim. #nSe as descrições das escrituras estiverem corretas, o mundo começará a ser destruído."
62050-218 = "Arius é apenas o lugar que anuncia esse começo."
62050-219 = "Se as coisas prosseguirem conforme o que está escrito... a próxima etapa será a vez dos sete anjos derramarem as taças sobre a terra."
62050-221 = "O-O que a gente faz?!"
62050-222 = "S-Se for agora, ainda...!"
62050-226 = "！！！"
62050-227 = "Temos que 'purificar' Arius!"
62050-228 = "Purificar...?"
62050-229 = "！！！"
62050-230 = "Isso mesmo! O Sensei, o Squad... #nprecisamos expulsar todos de Arius!"
62050-231 = "M-Mas e os estudos? E o exame também...?"
62050-232 = "Não estamos em condições de nos preocupar com isso agora!"
62050-233 = "Não é hora para ficar pensando nisso!"
62050-235 = "Sim... por isso eu queria ouvir a opinião de vocês diante dessa situação."
62050-236 = "Sendo assim, abri as portas da Basílica de Arius, que não era usada há muito tempo."
62050-237 = "Esta é uma capela falsa... e uma terra distorcida pela Madame, no entanto..."
62050-238 = "……mesmo assim, sempre foi a capela dos [ruby=Arius]aqueles que foram exilados[/ruby]."
62050-239 = "Precisamos trazê-la de volta para a nossa Arius!"
62050-240 = "Ainda restam três toques de trombeta, não é?!"
62050-241 = "M-Mas... nós não ouvimos isso...?"
62050-242 = "Se 'purificarmos' tudo, não vai dar mais para ouvir, então não precisa se preocupar com isso!"
62050-244 = "M-Mas..."
62050-245 = "(E eu me esforcei tanto revisando a matéria...)"
62050-246 = "(Terminar tudo assim, pela metade... é meio...)"
62050-251 = "Com licença... vocês não acham que... talvez não seja culpa de Trinity ou do Sensei...?"
62050-256 = "Hã?"
62050-257 = "Quem disse isso agora?"
62050-258 = "Aquela garota é..."
62050-265 = "……Poderia continuar o que estava dizendo?"
62050-266 = "S-Sim. #nBem... isso é só o que eu acho, mas..."
62050-267 = "Não há... nenhuma prova concreta de que o que está escrito no Apocalipse vá acontecer exatamente assim, há...?"
62050-269 = "！！！"
62050-270 = "Quem aquela garota pensa que é...?!"
62050-271 = "I-Isso é uma blasfêmia contra as escrituras...!"
62050-273 = "……Por que você pensa assim?"
62050-275 = "Porque, no fim das contas, nós não vimos a águia..."
62050-276 = "E estava escrito que uma terrível calamidade aconteceria toda vez que uma trombeta tocasse..."
62050-277 = "Mas não houve nenhum sinal disso..."
62050-279 = "Não brinque com isso!"
62050-280 = "O próprio fato de Trinity ter invadido este lugar já não é uma calamidade?!"
62050-281 = "Pense bem, o mesmo vale para o Sensei!"
62050-282 = "E para o Squad também!"
62050-283 = "Isso! Aquele bando do Squad!"
62050-284 = "Para falar a verdade, eles dão mais raiva do que Trinity..."
62050-285 = "É verdade... #nAgindo como se fossem as únicas que entendem tudo...!"
62050-286 = "Sendo que elas fugiram de Arius em primeiro lugar!!!"
62050-289 = "Elas deveriam ser capazes!"
62050-290 = "Elas deveriam ter feito algo!"
62050-293 = "Se era o Squad, elas deveriam ter nos liderado, não é?!"
62050-294 = "Mesmo sendo chamadas de Sangue Real!!!"
62050-297 = "Por quê...? Veterana Saori... por que você foi embora...?"
62050-298 = "Por que fugiu de nós...?"
62050-299 = "Havia tantas garotas que admiravam você...!"
62050-302 = "Tudo é em vão? O que há de tão em vão nisso...?"
62050-303 = "Você também estava aqui. Você era igual a nós..."
62050-304 = "E agora age como se tivesse sido salva, sozinha... apenas você...!"
62050-309 = "……."
62050-310 = "……."
62050-311 = "……."
62050-312 = "Quando olho para aquelas garotas, de repente começo a pensar."
62050-313 = "Se está tudo bem continuar assim. #nSe está tudo bem viver desse jeito."
62050-314 = "O que será do nosso futuro...?"
62050-319 = "Sim, na verdade..."
62050-320 = "[ruby=Nós também]Nós também[/ruby] queríamos."
62050-321 = "Queríamos ter vivido por um caminho diferente do de agora."
62050-324 = "Mas algo assim――"
62050-325 = "já não é mais possível...!"
62050-329 = "É possível sim!!"
62050-330 = "！！！"
62050-331 = "Com certeza... com certeza é possível! #nTalvez... provavelmente, com certeza..."
62050-332 = "……Como?"
62050-333 = "B-Bem, para isso teríamos que perguntar ao Sensei, mas..."
62050-334 = "E-Eu não sei muito bem... mas o Sensei com certeza deve saber de coisas que nós não sabemos!"
62050-340 = "……."
62050-341 = "O Sensei de novo?"
62050-342 = "Sensei pra lá, Sensei pra cá, já estou de saco cheio!"
62050-343 = "Quem o Sensei pensa que é? Se fizermos tudo o que ele diz, as coisas vão dar certo magicamente?"
62050-348 = "É claro que não!!!!"
62050-349 = "Você aí, faz um tempo que está defendendo o lado deles, não é?"
62050-350 = "Você saiu e depois voltou, certo? #nCom certeza foi corrompida por ideias estranhas!"
62050-351 = "Arius sempre foi assim. #nO Sensei fez alguma coisa por nós? E Trinity――?"
62050-352 = "Trinity...!!!"
62050-354 = "Para começar! Foi Trinity! Foi ela quem nos deixou desse jeito!!!"
62050-355 = "……Veterana."
62050-356 = "Você vai escutar o que essa garota está dizendo?"
62050-361 = "Isso é..."
62050-363 = "Você está do [ruby=・]n[/ruby][ruby=・]o[/ruby][ruby=・]s[/ruby][ruby=・]s[/ruby][ruby=・]o[/ruby] lado, não é, veterana? Não é?"
62050-364 = "Você vai proteger [ruby=・]A[/ruby][ruby=・]r[/ruby][ruby=・]i[/ruby][ruby=・]u[/ruby][ruby=・]s[/ruby], não vai?"
62050-366 = "Prove, veterana!!!"
62050-368 = "P-Por favor... me dê um pouco de tempo."
62050-373 = "[log]Prova[/log]"
62050-376 = "[log]Prova[/log]"
62050-379 = "[log]Prova Prova[/log]"
62050-382 = "[log]Prova Prova[/log]"
62050-385 = "[log]Prova Prova Prova[/log]"
62050-388 = "[log]Prova Prova Prova Prova[/log]"
62050-391 = "[log]Prova Prova Prova Prova Prova Prova[/log]"
62050-395 = "[log]Prova!!![/log]"
62050-399 = "V-Vete...rana..."
62050-400 = "E-Eu... não... é isso..."
62050-401 = "É sério, de verdade, não é isso... eu só..."
62050-402 = "Veterana, você não disse... que iria proteger a casa de todo mundo... o nosso ninho...?"
62050-403 = "……！"
62050-407 = "Posso lhe fazer apenas uma pergunta?"
62050-408 = "S-Sim!"
62050-413 = "Você... ouviu o som da trombeta?"
62050-417 = "……Sim."
62050-418 = "Entendo."
62050-419 = "……Sinto muito."
62050-424 = "！！！"
62050-425 = "Veterana! Me desculpe! Eu nunca mais farei isso! #nNão vou mais dizer nada! Vou obedecer a tudo o que me disser!"
62050-426 = "Não vou mais falar sobre querer fazer algo, ou sobre aulas e estudos!"
62050-427 = "Me desculpe! Eu só fui corrompida por ideias estranhas porque saí lá fora! Por isso! Por isso... por favor, mais uma vez...! Eu vou recomeçar...!"
62050-429 = "Pessoal."
62050-430 = "Levem a senhorita Maia para fora da Basílica."
62050-431 = "……Para que ela nunca mais possa retornar a este lugar."
62050-432 = "Eu vou junto."
62050-433 = "Entendido!"
62050-442 = "Veterana Subaru!!!"
62050-447 = "Veterana!!!"
62050-448 = "Me desculpe! A culpa é toda minha! Você está certa, veterana! Eu estava errada em tudo, absolutamente tudo!"
62050-449 = "Por isso, por favor――"
62050-456 = "Pessoal."
62050-457 = "Sim!"
62050-458 = "Está tudo bem agora. Podem voltar na frente."
62050-460 = "Entendido, veterana!"
62050-466 = "Não me―― abandone!"
62050-474 = "……！"
62050-475 = "Veterana! Veterana! Veteraaaanaaaa!!!"
62050-476 = "Guh... uuuh..."
62050-477 = "Aah, aaaaaah...!"
62050-478 = "Uwaaaaaaaaaaaaaaaaaaaaaa...!!!"
62050-482 = "Próximo Episódio; Criança Perdida"