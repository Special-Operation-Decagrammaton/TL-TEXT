[translation]
62050-1 = "Episódio 5; Basílica de Arius"
62050-7 = "Senpai, você disse para nos reunirmos aqui, mas..."
62050-8 = "Quase não usamos este lugar desde aquele dia..."
62050-13 = "Basílica de Arius..."
62050-14 = "Há muito tempo... começamos a usar este lugar depois que Arius foi exilada."
62050-16 = "Sim. Acho que foi nessa época que demos o nome de Basílica."
62050-17 = "Mas, por que agora..."
62050-22 = "……Eu não sei dizer ao certo."
62050-23 = "O que este lugar... significa para nós agora?"
62050-24 = "……Por que o Senpai nos reuniu aqui?"
62050-30 = "Estão todas aqui?"
62050-36 = "……Vocês parecem inquietas."
62050-37 = "Não se preocupem. Eu me sinto da mesma forma."
62050-38 = "Primeiro, preciso confirmar uma coisa."
62050-39 = "Se minha percepção estiver correta, todas vocês aqui hoje..."
62050-45 = "Ouviram a voz descrita no 'Apocalipse'."
62050-46 = "Se alguém não ouviu, por favor, não hesite em dizer."
62050-52 = "……Parece que todas ouviram. #nEntão, aquela voz chegou a todas nós."
62050-53 = "……No entanto, ainda não tenho certeza se aquela voz significa o 'Apocalipse' em si."
62050-54 = "Eh...? Por que diz isso? #nFoi tão claro... todas nós ouvimos...?"
62050-55 = "O relato do Apocalipse não termina aí."
62050-56 = "“E vi, e ouvi um anjo voar pelo meio do céu, dizendo com grande voz:”"
62050-57 = "“Ai! ai! ai! dos que habitam sobre a terra!”"
62050-58 = "“Porque os outros três anjos estão para tocar as trombetas.”"
62050-59 = "……A razão pela qual não tenho certeza é a parte inicial — a menção à 'águia' voando pelo céu."
62050-60 = "Eu não vi nenhuma águia, nem mesmo qualquer sinal de pássaro."
62050-61 = "Alguém aqui viu uma águia... ou algo parecido com um pássaro?"
62050-65 = "……Parece que ninguém viu. Entendido."
62050-66 = "E mais uma coisa. #n……Diz-se que o som da trombeta deve soar sete vezes, correto?"
62050-67 = "Sim... era para ser assim."
62050-68 = "E, de acordo com a voz, o som da trombeta já soou quatro vezes. #nIsso também está correto, não está?"
62050-69 = "……Exatamente."
62050-70 = "……Mas eu não ouvi o som da trombeta nenhuma vez até agora. #nE vocês?"
62050-75 = "Eu ouvi, sim!"
62050-76 = "Eu não ouvi nada!"
62050-77 = "Eh, mas o som foi tão alto!?"
62050-78 = "Foi por isso que eu disse antes! #nNão será que você ouviu errado...?"
62050-79 = "Mas todas nós ouvimos a voz, não ouvimos?"
62050-86 = "Entendido. Então..."
62050-87 = "……"
62050-88 = "Pessoal? O que faremos agora é apenas uma verificação, não se preocupem."
62050-89 = "Quem ouviu o som da trombeta, por favor, vá para a esquerda; quem não ouviu, vá para a direita."
62050-105 = "(……O número de pessoas que ouviu é claramente menor.)"
62050-109 = "(Olhando bem, parece haver outros pontos em comum...)"
62050-110 = "Sim, obrigada."
62050-111 = "Bem, aqui está a conclusão até o momento."
62050-118 = "Acredito que devemos ir até 'Porta Pacis' e investigar a verdade por trás desses eventos."
62050-123 = "Porta Pacis!? Senpai, você está falando sério...?"
62050-124 = "O Senpai sempre falou sério... especialmente em momentos como este."
62050-126 = "Aquele lugar não é onde nem a Madame ousava entrar...?"
62050-127 = "Mas a Madame já não está mais aqui..."
62050-128 = "E nem tudo o que a Madame dizia estava necessariamente correto..."
62050-130 = "Isso é verdade, mas..."
62050-132 = "Eu entendo a preocupação de vocês."
62050-133 = "Mas, se existe alguma pista... é um fato que, pelo menos dentro de Arius, não há outro lugar além da \"Porta Pacis\"."
62050-134 = "...Pois é lá que a história de Arius e as diversas interpretações das escrituras estão guardadas."
62050-135 = "Ma-mas, se entrarmos na \"Porta Pacis\"..."
62050-136 = "...Pois é."
62050-137 = "Se alguém sem qualificação, sem fé, ou que perdeu a fé entrar lá —"
62050-138 = "Perderá a si mesmo no fim do caminho e vagará por Arius para sempre. #nÉ o que dizem."
62050-142 = "Ainda assim, precisamos encarar isso. #nO fenômeno que está acontecendo em nossa própria Arius."
62050-143 = "...Um lugar onde coisas além da compreensão humana acontecem."
62050-144 = "Porque é isso que Arius é."
62050-147 = "Muito menos... não podemos seguir o mesmo caminho daquela Trinity imoral, que desviou o olhar da verdade e tentou fazer com que nós \"nunca tivéssemos existido\" para esconder seus próprios pecados —"
62050-148 = "Não podemos seguir o mesmo caminho que eles."
62050-151 = "Embora ainda não passe de uma hipótese, o conteúdo do Apocalipse ter se tornado realidade pode ser influência da Trinity e —"
62050-152 = "Do \"Sensei\" do Schale."
62050-154 = "O-o Sensei!? Deixando a Trinity de lado, o Sensei..."
62050-155 = "O Sensei parecia ser uma pessoa boa..."
62050-156 = "Sim. Eu também reconheço que o Sensei é uma boa pessoa."
62050-157 = "...Mas boas intenções nem sempre geram bons resultados. #nVocês deveriam saber disso muito bem."
62050-158 = "..."
62050-159 = "De qualquer forma, ele pisou novamente nas terras de Arius."
62050-160 = "E, de fato, o Apocalipse se manifestou logo depois disso."
62050-161 = "Ou seja, já que foi o \"Sensei\" quem trouxe a Trinity para cá —"
62050-162 = "É natural pensar que a causa deste incidente também reside na Trinity... e, por extensão, no Sensei."
62050-168 = "I-isso pode ser verdade..."
62050-169 = "Estudar, fazer provas... não precisávamos de nada disso..."
62050-170 = "Poderíamos ter dado um jeito de viver do nosso próprio jeito, não é?"
62050-171 = "E afinal, o que é estudar? Tem algum sentido?"
62050-172 = "É difícil, eu não entendo nada e dá sono."
62050-173 = "É perda de tempo. Um desperdício."
62050-174 = "Bem, não é como se tivéssemos outra coisa para fazer, mas..."
62050-176 = "(Esta aqui é do lado que \"não ouviu\" o som da trombeta...)"
62050-181 = "...Mas, talvez eu não odiasse estudar."
62050-182 = "Eu também não. Pelo menos entendi um pouco de como o mundo lá fora funciona..."
62050-183 = "Melhor do que treinar métodos para ferir alguém..."
62050-184 = "Sinceramente, eu não entendia nada do conteúdo... era chato. #nEra entediante e dava sono, mas..."
62050-185 = "Ainda assim... foi bom."
62050-186 = "O fato de alguém realmente ouvir o que eu tinha a dizer e eu poder transmitir minhas próprias palavras..."
62050-192 = "(Esta aqui é do lado que \"ouviu\" o som da trombeta...?)"
62050-196 = "(...Não pode ser!?)"
62050-197 = "(Não... devo observar um pouco mais...)"
62050-201 = "A propósito, pessoal."
62050-202 = "Se, por um acaso, o anjo tocasse todas as 7 trombetas... o que vocês acham que aconteceria?"
62050-204 = "Hã? I-isso é...!"
62050-205 = "Não pode ser!"
62050-207 = "Mas no Apocalipse..."
62050-208 = "É verdade. Nós estudamos muito sobre o Apocalipse, lembra? #nPor isso, se as 7 trombetas tocassem..."
62050-213 = "Arius... seria destruída?"
62050-216 = "……。"
62050-217 = "Sim. #nSe o que está escrito nas escrituras estiver correto, o mundo começará a perecer."
62050-218 = "Arius é apenas o lugar que anuncia esse início."
62050-219 = "Se as coisas seguirem conforme o escrito... será a vez dos sete anjos inclinarem suas taças sobre a terra, não é?"
62050-221 = "O-o-o que a gente faz!?"
62050-222 = "A-agora ainda dá tempo...!"
62050-226 = "!!!"
62050-227 = "Precisamos "purificar" Arius!"
62050-228 = "Purificar...?"
62050-229 = "!!!"
62050-230 = "Isso mesmo! O Sensei e o Esquadrão... #ntemos que expulsar todos de Arius!"
62050-231 = "M-mas e os estudos? E as provas também..."
62050-232 = "Não é hora de pensar nisso agora, né!?"
62050-233 = "Não dá para ficar se preocupando com essas coisas!"
62050-235 = "Sim... por isso eu queria ouvir a opinião de vocês nesta situação."
62050-236 = "Por isso, abri as portas da Basílica de Arius, que não eram usadas há muito tempo."
62050-237 = "Este lugar é uma capela falsa... e também um solo distorcido pela Madame, mas..."
62050-238 = "......ainda assim, sempre foi a capela de Arius."
62050-239 = "Temos que devolver Arius para nós!"
62050-240 = "Ainda faltam tocar três trombetas, não é!?"
62050-241 = "M-mas... nós não ouvimos nada sobre isso...?"
62050-242 = "Se a gente "purificar" tudo, não vamos mais ouvir nada, então não precisa se preocupar com isso!"
62050-244 = "M-mas..."
62050-245 = "(Eu até tinha revisado a matéria direitinho...)"
62050-246 = "(Terminar desse jeito, pela metade... é um pouco...)"
62050-251 = "A-ah... vocês não acham que... talvez não seja culpa da Trinity ou do Sensei...?"
62050-256 = "Hã?"
62050-257 = "Quem disse isso?"
62050-258 = "Aquela garota é..."
62050-265 = "......Pode continuar o que estava dizendo?"
62050-266 = "S-sim. #nBem... isso é só o que eu penso, mas..."
62050-267 = "Não existe nenhuma prova... de que o que está escrito no Apocalipse vai acontecer exatamente como diz, né...?"
62050-269 = "!!!"
62050-270 = "Quem é essa garota...!?"
62050-271 = "I-isso é uma blasfêmia contra as escrituras...!"
62050-273 = "......Por que você pensa assim?"
62050-275 = "Porque, afinal, nós não vimos a águia..."
62050-276 = "Estava escrito que cada vez que uma trombeta tocasse, uma calamidade terrível aconteceria..."
62050-277 = "Mas não houve sinal nenhum disso..."
62050-279 = "Não brinca comigo!"
62050-280 = "O fato da Trinity ter invadido aqui já não é uma calamidade!?"
62050-281 = "Pense bem, o Sensei também!"
62050-282 = "E o Esquadrão!"
62050-283 = "Isso! Aquele pessoal do Esquadrão!"
62050-284 = "Sinceramente, me irritam mais que a Trinity..."
62050-285 = "É verdade... #nFicam com essa cara de quem sabe de tudo...!"
62050-286 = "Eles que fugiram de Arius primeiro!!!"
62050-289 = "Se fossem eles, teriam conseguido!"
62050-290 = "Se fossem eles, teriam dado um jeito!"
62050-293 = "Se fosse o Esquadrão, eles deveriam ter nos guiado, não deveriam!?"
62050-294 = "Mesmo sendo chamada de Sangue Real!!!"
62050-297 = "Por que...? Saori-senpai... por que você foi embora...?"
62050-298 = "Por que... você fugiu de nós...?"
62050-299 = "Tantas de nós te admiravam tanto...!"
62050-302 = "Vazio? O que você quer dizer com vazio...?"
62050-303 = "Você também estava aqui. Você era igual a nós..."
62050-304 = "Agora vem com essa cara de quem foi salva, sozinha... só você...!"
62050-309 = "..."
62050-310 = "............"
62050-311 = ".............."
62050-312 = "Quando olho para elas, eu penso de repente."
62050-313 = "Será que está tudo bem continuar assim?#nSerá que está tudo bem viver desse jeito?"
62050-314 = "Como será o nosso futuro...?"
62050-319 = "Ah, na verdade."
62050-320 = "Eu queria..."
62050-321 = "Ter vivido um caminho diferente do de agora."
62050-324 = "Mas isso é algo que..."
62050-325 = "Já não é mais possível...!"
62050-329 = "É possível sim!!!"
62050-330 = "!!!"
62050-331 = "Com certeza... com certeza é possível!#nTalvez... provavelmente, com certeza..."
62050-332 = "...Como?"
62050-333 = "I-isso é algo que teríamos que perguntar ao Sensei, mas..."
62050-334 = "E-eu não sei direito... mas o Sensei com certeza deve saber coisas que nós não sabemos!"
62050-340 = "..."
62050-341 = "De novo o Sensei?"
62050-342 = "Sensei isso, Sensei aquilo, eu já estou farta!"
62050-343 = "O que tem o Sensei? Se fizermos o que ele diz, tudo vai dar certo?"
62050-348 = "Não tem como isso ser verdade!!!!"
62050-349 = "Você, desde agora pouco... só está defendendo o lado deles, não é?"
62050-350 = "Você saiu e voltou, não foi?#nCom certeza você foi contaminada por ideias estranhas!"
62050-351 = "Arius sempre foi assim. #nO que o Sensei fez por nós? E a Trinity...?"
62050-352 = "Trinity...!!!"
62050-354 = "Para começar! Foi a Trinity! Que nos deixou desse jeito!!!"
62050-355 = "...Senpai."
62050-356 = "Você vai dar ouvidos ao que ela diz?"
62050-361 = "Isso é..."
62050-363 = "Senpai, você está do nosso lado, não está? Diga que sim."
62050-364 = "Você vai nos proteger, não vai?"
62050-366 = "Prove isso, Senpai!!!"
62050-368 = "P-por favor... me dê um tempo."
62050-373 = "[log]証明[/log]"
62050-376 = "[log]証明[/log]"
62050-379 = "[log]証明証明[/log]"
62050-382 = "[log]証明証明[/log]"
62050-385 = "[log]証明証明証明[/log]"
62050-388 = "[log]証明証明証明証明[/log]"
62050-391 = "[log]証明証明証明証明証明証明[/log]"
62050-395 = "[log]証明！！！[/log]"
62050-399 = "Se... Senpai..."
62050-400 = "E-eu... não... não é isso..."
62050-401 = "Sério, é sério, não é nada disso... Eu só estava..."
62050-402 = "Senpai, você não disse que aqui... que a casa de todos... era para proteger o ninho...?"
62050-403 = "……！"
62050-407 = "Posso te perguntar uma coisa?"
62050-408 = "S-sim!"
62050-413 = "Você... ouviu o som da trombeta?"
62050-417 = "…………Sim."
62050-418 = "Entendo."
62050-419 = "……Me desculpe."
62050-424 = "！！！"
62050-425 = "Senpai! Me desculpe! Eu nunca mais farei isso!#nNão direi mais nada! Farei exatamente o que me for dito!"
62050-426 = "Não vou mais falar sobre querer fazer algo, ou sobre aulas, ou estudos, nunca mais!"
62050-427 = "Me desculpe! Eu só tive pensamentos estranhos porque saí lá fora! Por isso! Por favor... me deixe... recomeçar...!"
62050-429 = "Pessoal."
62050-430 = "Levem a Maia para fora da Basílica."
62050-431 = "……E garantam que ela nunca mais volte a este lugar."
62050-432 = "Eu vou junto."
62050-433 = "Entendido!"
62050-442 = "Subaru-senpai!!!"
62050-447 = "Senpai!!!"
62050-448 = "Me desculpe! A culpa é toda minha! Você tem razão, Senpai! Eu estava errada sobre tudo, absolutamente tudo!"
62050-449 = "Por isso, eu te imploro—"
62050-456 = "Pessoal."
62050-457 = "Sim!"
62050-458 = "Já está tudo bem. Podem voltar primeiro."
62050-460 = "Entendido, Senpai!"
62050-466 = "Não me... não me abandone!"
62050-474 = "……！"
62050-475 = "Senpai! Senpai! Senpaaaaaai!!!"
62050-476 = "Droga... ugh..."
62050-477 = "Ah, aaaaaah...!"
62050-478 = "Uwaaaaaaaaaaaaaaaaaaaaaaa...!!!"
62050-482 = "Próximo episódio: A criança perdida"
