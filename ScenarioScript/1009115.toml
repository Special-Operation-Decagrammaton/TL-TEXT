[translation]
1009115-1 = "あたたかな音色"
1009115-2 = "（カズサとの待ち合わせ場所に向かうと……）"
1009115-4 = "オーディオルーム・ロビー"
1009115-8 = "こ……ここは？ "
1009115-9 = "デミントン・オーディオルームへようこそ。"
1009115-10 = "本日はどのようなご用件でしょうか？ "
1009115-11 = "オーディオルーム……？"
1009115-12 = "色んな機器で音を楽しめる……？#n……ふうん。"
1009115-13 = "こんな場所があったんだね。"
1009115-14 = "なんか……大人の空間って感じがするかも。"
1009115-15 = "お飲み物は、何になさいますか？"
1009115-16 = "えっ……の、飲み物？何か頼むの？"
1009115-18 = "[ns] \"アイスティーを2つ、お願いします。\""
1009115-19 = "茶葉はトリニティキャンディブレンドでよろしいでしょうか？"
1009115-20 = "それでは、オンザロックスでご用意いたしますね。"
1009115-21 = "お部屋はこちらです。"
1009115-23 = "オーディオルーム・内部"
1009115-24 = "ここで音楽を聴くの？"
1009115-25 = "……なんか、さっきの先生。#nすごく、大人……みたいな感じした。"
1009115-26 = "[s] \"大人だからね。\""
1009115-27 = "ふぅん？"
1009115-28 = "ここにはよく来るの？#n慣れてるっぽかったけど。"
1009115-29 = "……ははっ。冗談だよ、冗談。"
1009115-30 = "え？#nあー……そう。"
1009115-31 = "ネットで調べて……そっか……。"
1009115-35 = "なんか、すみません……。"
1009115-36 = "[s] \"謝らなくていいよ！\""
1009115-37 = "き、気を取り直して……。"
1009115-38 = "言ってたヤツ、持ってきたよ。"
1009115-43 = "あ、これは別にアルバムを出したわけじゃなくて……。"
1009115-44 = "お願いして作ってもらったの。1枚から作ってくれるところがあってさ。"
1009115-45 = "最近はデータ送ったら焼いてくれるとこ、増えてるんだ。"
1009115-49 = "……。"
1009115-50 = "いや、まぁ……プレーヤーもないのにどうしてって思うかもしれないけど。"
1009115-51 = "[s] \"そんなことないよ！？\""
1009115-52 = "まあ、普通そう思うよね……。"
1009115-53 = "[s] \"本当にそんなこと思ってないよ……！\""
1009115-54 = "でもそういう時もあるっていうか……。"
1009115-55 = "ショーウィンドウで、かわいいケーキを見たら気分じゃなくても突然食べたくなる感じっていうか。"
1009115-56 = "お願いしたら作れるって聞いて、やってみたくなったんだよね。"
1009115-57 = "自分の歌がこうして記録されるっていうのもそうだし……LP盤ってちょっとレトロな魅力もあるなーって思って。"
1009115-58 = "だから、お願いしてみたの。"
1009115-59 = "プレーヤーがないから聞けないんだけど、せっかく作ったのに飾るだけなのももったいないじゃん？"
1009115-60 = "それに、レコードの音は温かいって聞いて……ちょっと気になったんだ。"
1009115-61 = "だから、プレーヤーを探してて……もしかしたら先生なら持ってるかな～って。"
1009115-62 = "シャーレにはなかったみたいだけど。"
1009115-63 = "でも、先生に聞いてみて正解だったかも……ふふ。"
1009115-64 = "……それじゃあ、一緒に聞いてくれる？"
1009115-65 = "レコードに指紋がつかないように気をつけて……っと。"
1009115-69 = "ターンテーブルに乗せて……。"
1009115-70 = "この後は……あれ……。"
1009115-71 = "針ってレコードの内側に乗せるの？それとも外側？"
1009115-72 = "[s] \"え、それは……。\""
1009115-77 = "（ちょうどアイスティーを持ってきた店員が手伝ってくれた）"
1009115-78 = "（こうしてカズサの持ってきたLP盤の鑑賞会が始まった）"
1009115-80 = "……やっぱ、ちょっと恥ずかしいね。"
1009115-81 = "自分一人で聞けばよかったかも……まあもう遅いけど。"
1009115-82 = "それで……どう、かな？"
1009115-83 = "[s1] \"なんだか初々しくていいね……。\"\n[s2] \"カズサらしいよ。\""
1009115-89 = "初々しい、か……。 "
1009115-90 = "んー……。"
1009115-91 = "[s] \"ご、ごめん。気に障った？\""
1009115-92 = "ううん。ただ、その通りだなって。"
1009115-93 = "これ、初めてつっかえずに最後まで演奏できた時の録音なんだ。"
1009115-94 = "完奏したのが初めてだったっていうだけで、やっぱり色々と技量は足りてないし。"
1009115-95 = "急に走ったりする子もいれば、ちょっとだけ飛んじゃう子もいるし……。"
1009115-96 = "私も……声が裏返ったりしたし。"
1009115-97 = "まぁでも、だからこそこうやって残したかったんだよね。"
1009115-98 = "普通に売ってるアルバムってほら、最高の演奏を残すものじゃん？#nでも、私たちはプロじゃないし。これは記録として残したいものだからさ。"
1009115-99 = "ちょっとくらい粗があったほうが、思い出としていいっていうか。"
1009115-100 = "そんな風に思うんだ……。"
1009115-101 = "[s] \"これも「感性」だね。\""
1009115-102 = "そういうこと！"
1009115-103 = "……。"
1009115-104 = "あ、曲が終わった。 "
1009115-105 = "[s] \"あれ？まだ続きがあるみたいだけど……。\""
1009115-107 = "（聞き慣れた声の、馴染みある歌が聞こえてきた）"
1009115-108 = "（だがカズサの声ではない）"
1009115-109 = "（これは……） "
1009115-111 = "[ns] \"あれ？この声って……！\""
1009115-112 = "ふふ。気づいちゃった？"
1009115-113 = "[s3] \"これって私……！？\"\n[s4] \"いつの間に！？\""
1009115-116 = "この前、一緒にカラオケに行ったじゃん。その時に録音してたんだ。"
1009115-117 = "最新のカラオケってすごいよね。録音から転送までボタン一つなんだもん。"
1009115-118 = "ほら、後ろの方からタンバリンの音しない？#n私が叩いてたやつ。"
1009115-119 = "[s5] \"本当だ……。\"\n[s6] \"待って、どうして私の歌がアルバムに……？\""
1009115-122 = "ほ、ほら……先生もバンドのために色々頑張ってくれたでしょ？"
1009115-123 = "だから、アルバムに残しておきたかったの。"
1009115-124 = "……なんか、いいねこういうの。"
1009115-125 = "声が……温かい。"
1009115-126 = "……。"
1009115-130 = "あ、いや……音質のこと！#nデジタルにはない特有のノイズの話……！"
1009115-132 = "その……それが……#nあったかくて、いいなって……思っただけ。"
