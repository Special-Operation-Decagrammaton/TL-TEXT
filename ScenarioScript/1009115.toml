1009115-91 = "[\"Puxa, me desculpe. Eu o ofendi? \"\"\n1009115-92 = \"Não. Apenas achei que estava certo.\"\n1009115-93 = \"Esta foi a primeira vez que consegui jogar até o fim sem ficar preso.\"\n1009115-94 = \"Só porque foi a primeira vez que fiz uma apresentação completa, ainda me faltavam muitas habilidades.\"\n1009115-95 = \"Algumas crianças correm repentinamente, outras simplesmente voam por algum tempo. ......\"\n1009115-96 = \"Eu também tinha ...... minha voz virada do avesso.\"\n1009115-97 = \"Bem, mas é por isso que eu queria deixar as coisas assim.\"\n1009115-98 = \"Os álbuns que costumam ser vendidos, sabe, devem preservar as melhores performances, certo? #nMas não somos profissionais. Queremos que isso seja um registro.\"\n1009115-99 = \"É melhor ter algumas arestas como lembrança.\"\n1009115-100 = \"É assim que vejo as coisas. ......\"\n1009115-101 = \"[\"Essa é outra 'sensibilidade'. \"\"\n1009115-102 = \"Esse tipo de coisa!\"\n1009115-103 = \".......\"\n1009115-104 = \"Ah, a música acabou.\"\n1009115-105 = \"[s]\"Huh? Parece que há mais por vir. ...... \"\"\n1009115-107 = \"(Ouve-se uma voz familiar, cantando uma música familiar)\"\n1009115-108 = \"(Mas não a voz de Kazusa).\"\n1009115-109 = \"(Isso pode ser encontrado em ......)\"\n1009115-111 = \"[ns] \"Huh? Que voz é essa? ......! \"\"\n1009115-112 = \"Hmm. Você notou isso?\"\n1009115-113 = \"[s3] \"Este sou eu ......! \"\n[s4] \"Quando isso aconteceu! \"\n[s3]\""

