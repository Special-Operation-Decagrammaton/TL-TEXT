[translation]
10050005-1 = "Prólogo; Sem Risco, Sem Recompensa."
10050005-2 = "Academia Federal Red Winter - Biblioteca"
10050005-7 = "Meru-senpai, você está bem...?"
10050005-8 = "Eu pareço estar bem...?"
10050005-9 = "Não..."
10050005-10 = "...Aprendi uma coisa."
10050005-11 = "Não quero muito ouvir, mas... o que é?"
10050005-12 = "Quando você fica uns três dias sem comer nada... a fome acaba sumindo, sabia?"
10050005-13 = "Mas você também não tem energia nenhuma..."
10050005-14 = "Isso provavelmente é só agora. Daqui a pouco, você não vai conseguir pensar em nada além de comida, não acha?"
10050005-15 = "Eu já estou assim, então não tem problema, né...?"
10050005-16 = "Você já está assim, não é..."
10050005-17 = "E então... quando a reforma do refeitório termina?"
10050005-18 = "Supostamente amanhã, mas..."
10050005-19 = "Então amanhã poderemos comer... que bom..."
10050005-20 = "Você disse a mesma coisa ontem, sabe..."
10050005-21 = "...Outra greve?"
10050005-22 = "Provavelmente..."
10050005-23 = "...Vai levar mais uma semana, pelo visto."
10050005-24 = "Nós não deveríamos começar a agir logo...?"
10050005-25 = "Todo mundo começou a procurar comida com olhos injetados de sangue..."
10050005-26 = "Nós chegamos a esse ponto justamente por termos agido, não foi?"
10050005-27 = "Isso tudo é porque os livros não vendem!"
10050005-28 = "Ai... gritei alto demais..."
10050005-33 = "Ugh... é porque o conselho administrativo não libera a verba do clube...!"
10050005-34 = "Tentamos vender livros para conseguir dinheiro, mas não deu em nada..."
10050005-35 = "Se continuar assim, o futuro da Frente de Libertação do Conhecimento..."
10050005-36 = "Dessa forma, a civilização será enterrada na escuridão e a humanidade seguirá o caminho do declínio..."
10050005-42 = "Saudações, pessoal da Frente de Libertação do Conhecimento. A responsável pelo Departamento de Publicações, Aramaki Yakumo, chegou. Mufufu."
10050005-43 = "Como sempre, uma postura nada elegante, Meru-san. Acho que nem preciso dizer, mas... o chão da biblioteca não é uma cama, sabe? Por favor, levante-se."
10050005-44 = "Sim, sim... diga o que quiser..."
10050005-45 = "Ora, Meru-san sendo tão obediente assim. Você está se sentindo mal? Está mesmo bem?"
10050005-47 = "Talvez eu não esteja bem... Diretora Yakumo, Takane-senpai."
10050005-48 = "Hmm... o que exatamente aconteceu?"
10050005-49 = "Bem... é que, desculpem. Vocês teriam algo para comer?"
10050005-50 = "...Como é?"
10050005-52 = "Ughhh!! Minha barriga dói!!"
10050005-53 = "É porque você comeu tudo de uma vez depois de três dias sem nada. Deve ter sobrecarregado seu estômago. Aqui, beba água."
10050005-54 = "Obrigada, Diretora Yakumo, Takane-senpai... Achei que não fosse sobreviver."
10050005-55 = "De nada. Quando estamos em apuros, devemos ajudar uns aos outros. É claro que cobrarei o valor devido, viu? Mufufu."
10050005-57 = "Isso é um pouco assustador... mas bem, elas me salvaram quando eu estava quase morrendo, então não tem jeito..."
10050005-58 = "Entendi que a situação de vocês é por causa do atraso na verba do clube. Mas a situação parece um pouco mais grave do que isso."
10050005-59 = "Bem... tentamos adiantar vários cronogramas... mas acabamos nos esforçando demais..."
10050005-60 = "Ah, sobre aquele manuscrito que trouxeram de repente na semana passada? Quando disseram que pagariam a impressão depois, será que..."
10050005-61 = "Eu não deveria ter feito aquilo..."
10050005-62 = "Entendo... mas isso não é justificativa."
10050005-63 = "Certo, paguem logo as despesas de impressão."
10050005-64 = "Você consegue dizer isso vendo essa situação!? Que insensível! Pode levar qualquer coisa que encontrar por aí!"
10050005-65 = "Ora, tem certeza?"
10050005-66 = "...Sério?"
10050005-67 = "Sim. E eu farei questão de cobrar pelo serviço."
10050005-68 = "Um demônio...! Tem um demônio aqui!?"
10050005-70 = "Mas, ainda assim, é estranho, Meru-san."
10050005-71 = "Por mais que você desenhe o que bem entende e não se importe com a demanda..."
10050005-72 = "Ei, espera aí, você veio aqui só para me insultar!? O que é isso!?"
10050005-73 = "Ouça até o fim. Isso significa que você tem fãs fiéis. #nAlém disso, é estranho que você não consiga nem pagar pelas suas refeições, mesmo tendo a Momiji-san como uma editora competente."
10050005-74 = "É que... nós também... não esperávamos que as vendas fossem tão baixas..."
10050005-75 = "Ainda tem estoque? Posso dar uma olhada?"
10050005-80 = "E, então...?"
10050005-81 = "...Por enquanto, entendi o motivo."
10050005-82 = "O, o que seria...?"
10050005-83 = "Meru-san. Seus manuscritos são, basicamente, arbitrários e tendem a priorizar seus próprios desejos em vez dos leitores."
10050005-84 = "É por isso que você tem fãs fiéis, mas... #nNão há quase nada de apelo popular."
10050005-85 = "E... o que é isso!? O estilo único da Meru-san desapareceu e você tentou adotar um apelo popular de forma superficial, não foi? #nEstá tudo pela metade!"
10050005-86 = "Desse jeito, nem os fãs fiéis que liam suas obras antes, nem o público geral vão se interessar! #nEm uma escala de 5 pontos... dou 2... não, 1,5 ponto!"
10050005-87 = "Então, o que aconteceu exatamente? Momiji-san."
10050005-88 = "B-bem... pensamos em seguir uma linha diferente desta vez... para ver se finalmente fazíamos uma obra que agradasse ao público geral..."
10050005-89 = "Como adiantamos bastante o prazo, a Meru-senpai acabou perdendo o controle... e não tivemos tempo suficiente para a edição e revisão..."
10050005-90 = "Hum... parece que há outros problemas também."
10050005-92 = "O que você quer dizer...?"
10050005-93 = "Aos olhos do nosso Departamento de Publicações—"
10050005-94 = "Não posso deixar de discordar desse método!"
10050005-95 = "Hii!?"
10050005-96 = "Gua!?"
10050005-97 = "O que é isso? É um manuscrito medíocre em todos os sentidos... e, aliás, onde você anunciou o novo lançamento?"
10050005-98 = "É, é que... não tive muito tempo para fazer propaganda..."
10050005-99 = "Não venha com desculpas!! Mesmo que você tenha fãs, se não houver divulgação, ninguém vai aparecer, não é mesmo!?"
10050005-100 = "Se quisesse, teria encontrado várias formas de fazer isso, não teria?"
10050005-101 = "M-mas uma boa obra é algo que os fãs encontram naturalmente!"
10050005-102 = "Não seja ingênua! Para começar, você sabe por que o conceito de marketing existe?"
10050005-103 = "Quantos produtos você acha que foram parar no depósito porque, apesar de serem bons, a divulgação foi um desastre? #nBem, para ser exata, eu nem sei!"
10050005-104 = "Pelo menos o suficiente para encher a biblioteca da Frente de Libertação do Conhecimento!"
10050005-105 = "Você não está exagerando!?"
10050005-107 = "Não, na verdade, estou até subestimando a escala..."
10050005-108 = "É por isso que escritores são assim... só sabem criar e não têm o menor interesse no que vem depois!"
10050005-109 = "Por que você está tão exaltada hoje!?"
10050005-110 = "...É porque você despertou a fúria da nossa chefe."
10050005-112 = "De qualquer forma, entendi a situação. Se esse estoque não for vendido... você não conseguirá pagar os custos de impressão."
10050005-113 = "Hum, hum... mas..."
10050005-114 = "Chefe? Estou com um pressentimento ruim."
10050005-115 = "É só impressão sua... Mufufu."
10050005-116 = "Meru, quer fazer um negócio?"
10050005-117 = "Negócio...? Se pudesse escolher, não gostaria de conversar sobre isso com você. #nBem, mas agora não estou em posição de recusar."
10050005-118 = "Exatamente. Você acha mesmo que tem o poder de escolha agora, Meru?"
10050005-119 = "Grr..."
10050005-120 = "Se você pagar os custos de impressão agora mesmo, sem faltar um centavo, #nnão precisaremos nem conversar, sabia?"
10050005-121 = "Tsc... entendi, seja breve."
10050005-122 = "Gosto de pessoas práticas. #nPor que não deixa a venda consignada conosco?"
10050005-124 = "Hã...?"
10050005-125 = "...Oi?"
10050005-126 = "Claro que não é grátis. A chave é a divisão de papéis.#nGostaríamos de cuidar da publicidade do seu doujinshi e vendê-lo em seu nome."

10050005-127 = "Em troca, cobraremos uma parte da receita... uma comissão. O que você acha?"

10050005-128 = "Eu-eu odeio isso! Nunca me diverti trabalhando com você! ?"

10050005-129 = "Ah, espere, Mel-senpai! Acho que o gerente Yakumo tem alguma verdade nisso...!"

10050005-130 = "Atualmente, quase não existe nenhum negócio de vendas por correspondência em casa... Acho que seria uma boa ideia pedir ajuda."

10050005-131 = "Não é melhor do que ter que manter estoque e ir à falência?"

10050005-132 = "Além disso, onde devo colocá-lo... os livros são pesados ​​e volumosos...?"

10050005-134 = "Ah, ele é alguém com quem posso conversar. Bom, ter um parceiro de negócios que possa fazer propostas como essa é valioso, não é mesmo?"

10050005-135 = "Gah... isso é frustrante... Mas como diz Momiji, não há outra opção...#nAh, entendo... vamos lá!"

10050005-136 = "Tudo bem, então vamos redigir um contrato. Que tal uma divisão de 9:1?"

10050005-137 = "...Só para ter certeza, aqui é 9, certo?"

10050005-138 = "Sem chance?"

10050005-139 = "Eu pensei assim! Esse ladrão! !"

10050005-141 = "Gerente! ? Não importa o que aconteça, é demais! ?"

10050005-143 = "rua vermelha de inverno"

10050005-144 = "Suspiro... consegui um contrato."

10050005-145 = "Enviaremos um valor pré-determinado dependendo das vendas."

10050005-146 = "No entanto, é uma quantia bastante grande. O que exatamente você estava planejando fazer?"

10050005-147 = "Bem, vamos lá, Takane. Mostraremos o verdadeiro poder do nosso departamento editorial!"

10050005-152 = "Eu nunca esperei isso...!"

10050005-157 = "Não vendi um único livro."

10050005-158 = "Por que! ? Foi definitivamente a estratégia perfeita!"

10050005-159 = "Minha impressão é... O livro de Merly é interessante à sua maneira..."

10050005-160 = "Red Winter provavelmente carece de novidades."

10050005-161 = "Principalmente desta vez, foi estranho, nem maníaco nem popular."

10050005-162 = "Não importa quão interessante seja uma história, você se cansará dela depois de ouvi-la três vezes.#nDiz-se que existe apenas um tema que a maioria dos escritores consegue abordar."

10050005-163 = "Pessoas excelentes escolhem dois temas e os gênios escolhem três ou mais. Não há dúvida de que Merly adicionou muitos sabores diferentes ao longo dos anos..."

10050005-164 = "Pelo menos em Red Winter, acho que você poderia dizer que me acostumei..."

10050005-165 = "...Sim, esse é um bom ponto. No entanto, há um problema fundamental aqui."

10050005-166 = "? O que é?"

10050005-168 = "A situação financeira dos alunos do Red Winter é terrível!"

10050005-169 = "Bem, não seria inútil dizer isso?"

10050005-170 = "No entanto, quando as pessoas não têm dinheiro, a primeira coisa que fazem é cortar a sua vida cultural."

10050005-171 = "Diretor... você ainda é do departamento editorial? ?"

10050005-172 = "Porque você entende! Você não está no ramo editorial?"

10050005-173 = "Mas mesmo em tal situação, nossa missão é de alguma forma encontrar uma saída..."

10050005-174 = "Em qualquer caso, mais de metade das despesas do clube destinam-se aos custos de publicidade e impressão do Presidente Cellino do \"Urso Vermelho\"! ?"


10050005-175 = "Não é isso que dizemos nós mesmos.#n「レッドベア」の編集長だって、粛清されてからまだ姿を見せておりませんし。"

10050005-176 = "Bem... eu também peguei pessoas do departamento editorial do Red Bear no departamento de publicação."

10050005-177 = "Suspiro... até aquele incidente, o departamento editorial devia estar funcionando muito bem..."

10050005-178 = "Não, ao aceitar a redação minhas finanças melhoraram muito, não foi?"

10050005-179 = "Por outro lado, comecei a receber interferência da secretaria..."

10050005-180 = "Hummm. Isso pode ser verdade para Takane, já que ele é um crítico."

10050005-181 = "Porém, como responsável pela gestão de um departamento editorial, a situação atual não é tão ruim."

10050005-182 = "Bem, de qualquer forma, a causa do problema foi encontrada."

10050005-183 = "O que é?"

10050005-184 = "isso é--"

10050005-185 = "Eu estava tentando ganhar dinheiro em um lugar onde só havia pessoas que não tinham dinheiro para isso!"

10050005-186 = "É óbvio que a situação financeira da Red Winter é pior do que a de outras escolas!"

10050005-187 = "Embora haja dinheiro na árvore da paciência, ele não se aplica necessariamente a nós!"

10050005-188 = "I-isso é verdade, mas não haveria outras coisas que poderíamos fazer...?"
10050005-189 = "Sim, com certeza há."
10050005-190 = "E isso seria...?"
10050005-191 = "Dizem que no comércio, o primeiro fator é a localização. O segundo, a localização. E o terceiro, a localização."
10050005-192 = "Em suma, basta irmos para um lugar onde as pessoas tenham condições. #nSe tiverem o hábito de leitura, melhor ainda."
10050005-193 = "Existe um lugar assim?"
10050005-194 = "Sim, claro. Esse lugar é..."
10050005-196 = "— a Academia Trinity."
10050005-199 = "Espere, Chefe!? Você pretende fazer negócios em Trinity!? #nÉ um distrito autônomo diferente!?"
10050005-200 = "Sem risco, não há retorno! Vamos, me siga, Takane. #nSe ficar para trás, vou te deixar para trás."
10050005-205 = "Chefe...? Chefe!!?"
