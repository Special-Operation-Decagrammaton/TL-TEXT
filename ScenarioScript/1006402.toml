[translation]
1006402-1 = "深まる誤解"
1006402-2 = "D.U.近くの商店街・呉服店"
1006402-6 = "あの……。"
1006402-7 = "……あぁっ、申し訳ございません。"
1006402-8 = "休憩中に邪魔しちゃって悪いけど……新しく着物を買いたくて。"
1006402-9 = "わ、分かりました。すぐにご案内いたします！"
1006402-10 = "どうぞこちらへ……。"
1006402-12 = "（着物屋を開いてから、かれこれ10年は経った)"
1006402-13 = "（数多くのお客様に接してきた経験で、今や顔を見るだけでお相手の立場が直感で分かるように……）"
1006402-14 = "（時期的に成人式の晴れ着を駆け込みで買って行かれるのかと思ったが……)"
1006402-15 = "（裏地の素材まで慎重に確かめる眼光に、全身から放つ殺気……このお客様は裏の世界で名の通っている方に違いない！）"
1006402-16 = "（万が一にも不手際を起こして、お客様の機嫌を損ねたら、とんでもない目に……！)"
1006402-18 = "当店ではお客様のような、気品ある方にお似合いの品を豊富に取り揃えています！"
1006402-19 = "必ずや、お気に召す最高の1枚をご提案いたします。#n私にお任せください！"
1006402-20 = "いや、そこまでの着物じゃなくて良いんだけど……。"
1006402-25 = "まず、こちらのお着物はいかがですか？"
1006402-26 = "最高級の絹で織られた魅惑的な着物でございます。#nこれに袖を通せば、街行く人々の目を釘付けにすることでしょう！"
1006402-30 = "これはちょっと……露出が多すぎる気が。"
1006402-31 = "私としたことが、高貴なお方にとんだ無礼を……！"
1006402-32 = "少々お待ちくださいっ！"
1006402-37 = "で、では、こちらのお着物はいかがでしょう？"
1006402-38 = "虎と龍を金糸で施した豪華な刺繍は、お客様の威厳をさらに強めてくれるに違いありません！"
1006402-42 = "……今度は派手過ぎない？"
1006402-43 = "な、なるほど……確かにお客様は、こんな派手な装いをせずとも十分なオーラをお持ちですものね……。"
1006402-44 = "申し訳ございません！すぐに次の品を……。"
1006402-49 = "当店で取り扱っている最高級の鎧です……！"
1006402-53 = "もはや着物ですらないけど……。"
1006402-55 = "ひ、ひいっ……！？"
1006402-56 = "た、大変失礼いたしました！"
1006402-57 = "どうか命だけはお許しください……！"
1006402-58 = "そんなつもりないけど……。"
1006402-59 = "[s] \"……カヨコ？\""
1006402-60 = "あれ、先生……？"
1006402-61 = "[s1] \"近くを通ったら、カヨコの声が聞こえて。\"\n[s2] \"何かあったの？\""
1006402-62 = "それが……。"
1006402-63 = "それが……。"
1006402-65 = "（その後、店員に事情を説明して誤解を解いた）"
1006402-67 = "そ、そうでしたか……。#nすみません、勝手に黒亀組かどこかのお偉方かと……。"
1006402-68 = "つい先走ってしまい……申し訳ございませんでした。"
1006402-69 = "気にしなくて良いよ。怪しい人と思われるのには慣れてるから。"
1006402-70 = "分かってくれたなら、他の着物を見せてくれる？#n……今度は普通の物で。"
1006402-71 = "でしたら……こちらはいかがですか？"
1006402-72 = "黒地の品があるデザインになってまして、お客様の髪色に映えるかと。#n成人式に参加する生徒さん向けですので、お手頃になっております！"
1006402-73 = "うーん、デザインは気に入ったけど……。"
1006402-74 = "黒の着物だと暗く見えないかな。#nただでさえ顔が怖いってよく言われるのに……。"
1006402-75 = "先生はどう思う？"
1006402-76 = "[s3] \"よく似合うと思うよ。\"\n[s4] \"カヨコの可愛さ倍増だね！\""
1006402-78 = "可愛いだなんて……。"
1006402-79 = "……からかわないで、先生。"
1006402-83 = "じゃあ、これにしようかな。"
1006402-84 = "もうお決めになったのですか？#nまだ他にもご紹介していない商品が……。"
1006402-85 = "大丈夫。前に着てたのと雰囲気が似てるし、黒が嫌なわけじゃないから。"
1006402-86 = "……それに、先生が似合うと思うって言ってくれたし……。"
1006402-87 = "かしこまりました、こちらでご用意いたします！"
1006402-93 = "……ありがとう。#n先生には、いつも助けられてばかりな気がする。"
1006402-94 = "お礼って言うのもなんだけど、今度これを着たところ見せてあげる。"
1006402-95 = "今すぐに……とはいかないかな。色々と準備があるから。"
1006402-96 = "[s] \"分かった。楽しみにしてるよ！\""
1006402-97 = "じゃあ、またね。先生。"
