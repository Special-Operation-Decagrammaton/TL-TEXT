[translation]
1600005-1 = "間違っていないもの"
1600005-2 = "……！せ、先生……来てくださったんですね……今回も……！"
1600005-3 = "来てくださって、本当にありがとうございます……。"
1600005-4 = "も、もう二度と私には会ってくださらないのではと思って、私……。"
1600005-5 = "……大丈夫だから気にしなくていい、ですか……？い、いえ！そういうわけには……！"
1600005-6 = "い、いえその！決して先生のお言葉に従いたくないですとかそういったことではなく……！"
1600005-7 = "わ、分かりました……ありがとうございます……。"
1600005-8 = "そ、その……今回こそ……ちゃんとした上納品を……。"
1600005-11 = "こ、こちらです、自信はないのですが……。"
1600005-12 = "[s1] \"限定版のプラモデル！？\"\n[s2] \"数量限定の美少女フィギュア！？\""
1600005-13 = "ま、まだあります……これと、これと……これも、もしかしたらお気に召していただけるかなと……。"
1600005-14 = "ま、まだあります……これと、これと……これも、もしかしたらお気に召していただけるかなと……。"
1600005-15 = "この前みたいに、私が作ったものじゃないので……大丈夫だと思います、多分……この前は本当にすみません……。"
1600005-18 = "（ハルカが背負っている袋から、溢れるように貴重なグッズが出てきた）"
1600005-19 = "（どれもすごく高価な、もしくは知る人ぞ知るかなり貴重なものだった）"
1600005-20 = "（なんでハルカが私の好みを把握しているのかはさておき、どうやって手に入れたんだろう……）"
1600005-21 = "い、いかがでしょう、先生……？"
1600005-22 = "や、やっぱりイマイチでしたか……！？"
1600005-23 = "[s3] \"すごい、どれも良い物ばっかり！\"\n[s4] \"こんなにたくさん、どこで手に入れたの？\""
1600005-24 = "……。"
1600005-25 = "……。"
1600005-26 = "……ふふ……ふふふ……。"
1600005-27 = "喜んでいただけて、私、嬉しいです……先生……。"
1600005-28 = "これからもまたこうやって……先生のために……。"
1600005-29 = "ジジッ！"
1600005-30 = "……？"
1600005-31 = "……ん？急にチャンネルが変わった？"
1600005-32 = "ニュース速報……？"
1600005-33 = "あ……うぁ……。"
1600005-34 = "[s] \"……ハルカ？\""
1600005-35 = "……。"
1600005-37 = "（どの放送も次々とニュース速報に変わっていく）"
1600005-38 = "速報です。本日の早朝、商店街で窃盗事件が発生しました。"
1600005-39 = "現金を置いていった上で高価なグッズを奪っていくという、一見変わった犯行であり……"
1600005-40 = "犯人は単純な金銭目的ではなく、他に何か別の目的があるのではという線で捜査が進められています。"
1600005-41 = "関係者によりますと、時間帯からしてまだ犯人はトリニティ自治区にいると思われており……"
1600005-42 = "……"
1600005-43 = "[s] \"……ハルカ？\""
1600005-44 = "……っ！！！"
1600005-45 = "そ……その、これは……！"
1600005-46 = "こ、こんなに早くバレるとは思わなくて……！きっと夜になるまで捜査は始まらないと思っていたのですが……！"
1600005-47 = "え、え……？そういう話じゃない……？そ、そうですか、すみません、そもそもちゃんとバレないようなやり方をするべきでした……。"
1600005-48 = "え？それでもない？う、うう……すみません……。"
1600005-49 = "すみません……すみませんすみませんすみませんすみませんすみません……。"
1600005-50 = "[s] \"返しに行こう。\""
1600005-51 = "え、はい！？ど、どうして……！まだ私だとバレたわけでも追跡されているわけでもないですし……！"
1600005-52 = "い、いえ！これは決して口答えというわけではなく……！"
1600005-53 = "……わ、分かりました。先生がそう仰るなら……。"
1600005-55 = "（その後、商店街の全てのお店を回りながら、ハルカが奪ってきたグッズを返した）"
1600005-56 = "（ハルカと一緒に頭を下げて謝罪し、まだどれも封を開けていなかったため全部返品という形で済んだ）"
1600005-58 = "……。"
1600005-59 = "すみません……本当にすみません……。"
1600005-60 = "私のせいでこんな、先生まで謝ることになってしまって……。"
1600005-61 = "先生に喜んでほしかったのに、私、迷惑ばかりかけて……本当に……私はいつも……。"
1600005-62 = "……もう。"
1600005-63 = "もうこれ以上……先生には迷惑をかけないように……。"
1600005-64 = "[s5] \"迷惑なんかじゃないよ。\"\n[s6] \"何も無くても、連絡してくれるだけで嬉しい。\""
1600005-65 = "え……？"
1600005-66 = "え……？"
1600005-67 = "で、でも……こんなに迷惑をおかけしてしまったのに……。"
1600005-68 = "何も無くてもって、そんな……私が……先生に……？"
1600005-69 = "い、いえ！決して嫌だとかそういうことを言いたいわけではないのですが……！でも……！"
1600005-70 = "あ、う……うぅ……。"
1600005-71 = "わ、分かりました……先生がそう仰るのであれば、ど、努力……します……。"
1600005-72 = "……あ、あの……先生……。"
1600005-73 = "本当に……怒って、ませんか……？私のことが嫌いになったとか……。"
1600005-74 = "……全然？ど、どうして……こんな私のことを……。"
1600005-75 = "[s7] \"当たり前だよ。\"\n[s8] \"ハルカはまだ、たくさん失敗して良いんだよ。\""
1600005-76 = "……え？そ、それは、どういう……。"
1600005-77 = "……え？そ、それは、どういう……。"
1600005-78 = "……わ、分かりません……私には、そんな……どうしてそれが、理由になるのか……。"
1600005-79 = "ゆっくり理解していけば大丈夫……？"
1600005-80 = "……。"
1600005-81 = "す、すみません、まだ私はこんななので、まだちゃんと理解できていないのですが……"
1600005-82 = "そうします、ゆっくり、これから……。"
1600005-83 = "……えへ……えへへ……。"
1600005-84 = "……ありがとうございます、先生……。"
1600005-86 = "（その後、ハルカはしばらくモジモジした後、早歩きで消えていった）"
1600005-87 = "（帰り道、ハルカのおかげで（？）まだ売れていなかった限定版のグッズを買うことができた）"
