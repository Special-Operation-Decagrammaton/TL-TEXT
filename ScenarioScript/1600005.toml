[translation]
1600005-1 = "Algo que não está errado"
1600005-2 = "……! Se, Sensei... você veio... desta vez também...!"
1600005-3 = "Muito obrigado por ter vindo..."
1600005-4 = "Eu pensei que você nunca mais iria querer me ver, então eu..."
1600005-5 = "...Está tudo bem, então não precisa se preocupar, você diz...? N-não! Eu não posso simplesmente..."
1600005-6 = "N-não, é que! Não é que eu não queira seguir as palavras do Sensei, é só que...!"
1600005-7 = "E-entendido... muito obrigada..."
1600005-8 = "E-então... desta vez... eu trouxe um tributo adequado..."
1600005-11 = "A-aqui está, embora eu não tenha muita confiança..."
1600005-12 = "[s1] \"Um modelo de plástico de edição limitada!?\"\n[s2] \"Uma figura de garota em edição limitada!?\""
1600005-13 = "A-ainda tem mais... este, e este... e talvez este aqui também, pensei que você pudesse gostar..."
1600005-14 = "A-ainda tem mais... este, e este... e talvez este aqui também, pensei que você pudesse gostar..."
1600005-15 = "Não foi algo que eu fiz como da última vez... então acho que está tudo bem, talvez... sinto muito pelo que aconteceu da última vez..."
1600005-18 = "(Da bolsa que Haruka carrega nas costas, itens valiosos começam a transbordar)"
1600005-19 = "(Todos eram itens extremamente caros ou muito raros, conhecidos apenas por colecionadores)"
1600005-20 = "(Deixando de lado como a Haruka sabe do meu gosto, como ela conseguiu tudo isso...?)"
1600005-21 = "O-o que achou, Sensei...?"
1600005-22 = "A-ainda não foi bom o suficiente...!?"
1600005-23 = "[s3] \"Incrível, são todas coisas ótimas!\"\n[s4] \"Tantas coisas assim, onde você conseguiu?\""
1600005-24 = "……"
1600005-25 = "……"
1600005-26 = "……Fufu... fufufu..."
1600005-27 = "Fico feliz que tenha gostado, Sensei..."
1600005-28 = "De agora em diante, continuarei fazendo isso... pelo Sensei..."
1600005-29 = "Zzzzt!"
1600005-30 = "……?"
1600005-31 = "...Hm? O canal mudou de repente?"
1600005-32 = "Plantão de notícias...?"
1600005-33 = "Ah... ugh..."
1600005-34 = "[s] \"...Haruka?\""
1600005-35 = "……"
1600005-37 = "(Todas as transmissões mudam sucessivamente para o plantão de notícias)"
1600005-38 = "Plantão de notícias. Hoje cedo, um caso de roubo ocorreu no centro comercial."
1600005-39 = "Foi um crime incomum, onde o criminoso deixou dinheiro para trás enquanto levava itens valiosos..."
1600005-40 = "A investigação segue a linha de que o criminoso não tinha um objetivo financeiro simples, mas sim outro propósito."
1600005-41 = "Segundo os envolvidos, devido ao horário, acredita-se que o criminoso ainda esteja no distrito de Trinity..."
1600005-42 = "……"
1600005-43 = "[s] \"...Haruka?\""
1600005-44 = "……!!! "
1600005-45 = "I-isso... é que...!"
1600005-46 = "E-eu não achei que seria descoberta tão rápido...! Eu pensei que a investigação só começaria à noite...!"
1600005-47 = "H-hã...? Não é sobre isso...? E-entendo, sinto muito, eu deveria ter feito de um jeito que não fosse descoberta desde o início..."
1600005-48 = "Hã? Também não é isso? U-uuu... sinto muito..."
1600005-49 = "Sinto muito... sinto muito, sinto muito, sinto muito, sinto muito, sinto muito..."
1600005-50 = "[s] \"Vamos devolver tudo.\""
1600005-51 = "Hã, o quê!? P-por que...! Ainda não descobriram que fui eu, nem estou sendo perseguida...!"
1600005-52 = "N-não! Isso não é uma resposta atravessada...!"
1600005-53 = "...E-entendido. Se o Sensei diz..."
1600005-55 = "(Depois disso, visitamos todas as lojas do centro comercial e Haruka devolveu os itens que havia levado)"
1600005-56 = "(Junto com Haruka, abaixei a cabeça para pedir desculpas, e como nenhum dos itens tinha sido aberto, conseguimos resolver tudo como uma devolução)"
1600005-58 = "……。"
1600005-59 = "Desculpe…… sinto muito mesmo……."
1600005-60 = "Por minha causa, até o Sensei teve que pedir desculpas……."
1600005-61 = "Eu queria que o Sensei ficasse feliz, mas só causei problemas…… sério…… eu sempre……."
1600005-62 = "……Chega."
1600005-63 = "Não vou mais…… causar problemas para o Sensei……."
1600005-64 = "[s5] \"Não é um incômodo.\"\n[s6] \"Mesmo que não aconteça nada, só de você entrar em contato, eu já fico feliz.\""
1600005-65 = "Eh……?"
1600005-66 = "Eh……?"
1600005-67 = "Ma, mas…… mesmo tendo causado tantos problemas……."
1600005-68 = "Dizer que não importa se não acontecer nada, isso…… eu…… para o Sensei……?"
1600005-69 = "N-não! Não é que eu queira dizer que não gosto disso, mas……! Mas……!"
1600005-70 = "Ah, u…… uuu……."
1600005-71 = "E-entendido…… se o Sensei diz isso, eu vou…… me esforçar……."
1600005-72 = "……A, aquele…… Sensei……."
1600005-73 = "Você…… realmente não está bravo, está……? Tipo, que você passou a me odiar……."
1600005-74 = "……De jeito nenhum? Po, por que…… alguém como eu……."
1600005-75 = "[s7] \"É óbvio.\"\n[s8] \"Haruka, você ainda pode errar bastante.\""
1600005-76 = "……Eh? I, isso, o que quer dizer……."
1600005-77 = "……Eh? I, isso, o que quer dizer……."
1600005-78 = "……Eu, não entendo…… para mim, isso…… por que isso seria um motivo……."
1600005-79 = "Se eu for entendendo aos poucos, vai ficar tudo bem……?"
1600005-80 = "……."
1600005-81 = "De, desculpe, eu ainda sou assim, então ainda não consegui entender direito, mas……"
1600005-82 = "Vou fazer isso, aos poucos, daqui para frente……."
1600005-83 = "……Ehehe…… ehehehe……."
1600005-84 = "……Muito obrigada, Sensei……."
1600005-86 = "(Depois disso, Haruka ficou se contorcendo por um tempo e então saiu andando apressada)"
1600005-87 = "(No caminho de volta, graças (?) à Haruka, consegui comprar o item de edição limitada que ainda não tinha sido vendido)"
