[translation]
2601106-1 = "O talento do esforço"
2601106-2 = "（Recebo uma mensagem de Saten e vou até o estande de tiro, quando...）"
2601106-7 = "（Logo na entrada, vejo Saten praticando tiro）"
2601106-11 = "……Certo, desta vez vai."
2601106-16 = "……Hmm?"
2601106-17 = "Ué? Eu jurei que atirei do mesmo jeito que antes……"
2601106-21 = "……Ufa. Bem, é o que tem para hoje."
2601106-22 = "[s1] \"Praticando tiro?\"\n[s2] \"Por que esse suspiro? O que houve?\""
2601106-25 = "……Ah, Sensei. Por que está aqui?"
2601106-26 = "Você leu minha mensagem……?"
2601106-30 = "Ahaha, eu não achei que você realmente viria……"
2601106-31 = "Bem, não é como se eu tivesse algum assunto urgente. #nDesculpe por ter feito você vir até aqui."
2601106-32 = "……Não me preocupe? #nFico aliviada em ouvir isso."
2601106-33 = "Ah, eu estou praticando tiro agora……"
2601106-34 = "Na verdade, não tem nenhum motivo especial para isso."
2601106-35 = "…………Haa."
2601106-36 = "Para ser sincera, eu estava com uma pontinha de esperança."
2601106-37 = "Tipo, vai que eu tenho talento para o tiro!"
2601106-38 = "Eu não tenho muitas chances de disparar uma arma normalmente. #nJá que vim para Kivotos, pensei em tentar."
2601106-39 = "Bem…… como pode ver."
2601106-40 = "Ahaha, eu não estava esperando tanto assim, então está tudo bem."
2601106-41 = "……É só que, é um pouco decepcionante!"
2601106-42 = "No meu mundo original, eu também tentei várias coisas para descobrir meu talento, mas……"
2601106-43 = "Até agora, não colhi nenhum resultado concreto."
2601106-44 = "M-mas, tentar coisas novas é bom, não é? #nNão perco nada só por falhar!"
2601106-45 = "[s3] \"Saten, você é incrível!\"\n[s4] \"Isso é algo muito admirável!\""
2601106-52 = "……Eh?"
2601106-53 = "S-sério mesmo!?"
2601106-54 = "Isso é algo digno de elogios?"
2601106-55 = "……Pode me dizer o porquê?"
2601106-56 = "[s5] \"Com certeza, essa é uma das suas qualidades incríveis.\"\n[s6] \"Essa determinação não é algo que todo mundo tem.\""
2601106-59 = "Entendo…… eu nunca imaginei que ouviria isso de você."
2601106-60 = "……Sensei, você realmente pensa assim, não é?"
2601106-64 = "……Hehehe. Bem, não é uma sensação ruim! #nEstou genuinamente feliz."
2601106-65 = "Se eu continuar tentando várias coisas, talvez eu encontre algo!"
2601106-66 = "Já que estou aqui……"
2601106-67 = "Vou atirar só mais um pouquinho!"
2601106-75 = "（Embora tenha dito \"só mais um pouquinho\", Saten continuou praticando por um bom tempo……）"
2601106-82 = "（À medida que se acostumava com a arma e sua postura se estabilizava, a precisão de seus disparos aumentava）"
