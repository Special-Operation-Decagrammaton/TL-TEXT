[translation]
1600320-1 = "Parceira preciosa"
1600320-2 = "（Enviei uma mensagem para Suzumi dizendo que cheguei）"
1600320-6 = "（Pouco tempo depois, vi a silhueta de Suzumi se aproximando de longe）"
1600320-11 = "Haa... haa. S-sinto muito, Sensei. #nPeço perdão por tê-lo feito esperar..."
1600320-12 = "......Ah."
1600320-20 = "......P-perdão pela indelicadeza."
1600320-21 = "[s1] \"Ei, aconteceu alguma coisa?\"\n[s2] \"Por que tirou os fones de ouvido?\""
1600320-24 = "N-não, não é nada demais..."
1600320-25 = "......Desculpe, é que eu estava com eles colocados."
1600320-32 = "É que..."
1600320-33 = "São os fones de ouvido que costumo usar durante as patrulhas, sabe..."
1600320-34 = "Como eu estava com pressa, acabei vindo com eles. #nC-claro que a música estava pausada, mas é que..."
1600320-35 = "......Não, não é nada. Acabei fazendo você parar por causa das minhas coisas. #nNão posso atrasar a agenda do Sensei, então vamos seguir logo."
1600320-36 = "E-então, vamos lá..."
1600320-44 = "............"
1600320-45 = "[s3] \"Suzumi, você está bem...?\"\n[s4] \"Você parece distraída, aconteceu algo...?\""
1600320-51 = "S-sim!? Ah, não..."
1600320-52 = "Hmm..."
1600320-53 = "Desculpe. #nAcabei fazendo você se preocupar comigo."
1600320-54 = "É sobre... aqueles fones de ouvido de agora pouco."
1600320-55 = "Fiquei pensando nisso o tempo todo..."
1600320-56 = "Fiquei com medo de ter passado uma impressão estranha para você, Sensei..."
1600320-57 = "[s5] \"Impressão estranha...?\"\n[s6] \"Hum... o que quer dizer com isso?\""
1600320-60 = "É que... mesmo sendo parte do comitê de vigilância e estando em patrulha, eu estava usando fones de ouvido..."
1600320-61 = "Claro, o volume estava baixo e não é sempre que faço isso. #nBasicamente, só ouço durante as pausas da patrulha."
1600320-62 = "Só que... quando a patrulha dura muito tempo, eu sinto vontade de mudar um pouco o clima..."
1600320-63 = "Eu nunca negligenciaria as atividades do comitê de vigilância."
1600320-64 = "Mas fiquei preocupada que, ao me ver assim, você pudesse ter ficado com uma má impressão. #nFiquei... ansiosa."
1600320-65 = "......Eh?"
1600320-66 = "Você não se importa? #nS-se é assim, fico aliviada..."
1600320-67 = "[s7] \"Estou dizendo isso de coração.\"\n[s8] \"Porque eu sei o quanto você se esforça, Suzumi.\"\n[s9] \"Mesmo nos momentos em que não estou olhando.\""
1600320-71 = "Isso é..."
1600320-72 = "............"
1600320-73 = "............Sim."
1600320-74 = "Muito obrigada. #nEu estava tão preocupada com a impressão que causava em você, Sensei, que acabei esquecendo do que é importante."
1600320-75 = "Afinal, a patrulha é algo que comecei por vontade própria."
1600320-76 = "Normalmente eu não penso nessas coisas, mas quando estou na sua frente, parece que perco o meu ritmo..."
1600320-77 = "Preciso refletir sobre isso."
1600320-78 = "......Mas, graças ao que você disse, meu coração ficou mais leve."
1600320-79 = "Muito obrigada mesmo, Sensei."
1600320-80 = "......Sim?"
1600320-81 = "Os fones de ouvido? #nNão, não fiz nenhuma modificação neles."
1600320-82 = "São fones comuns, vendidos em qualquer loja, sem nada de especial."
1600320-83 = "Acho que só o fato de eu usá-los há muito tempo... #nNão é nada tão especial assim."
1600320-84 = "Como carrego eles para todo lado, estão um pouco arranhados."
1600320-85 = "Já cheguei a entrar em combate usando os fones durante a patrulha, mas, talvez por sorte, eles nunca quebraram."
1600320-86 = "Se eles quebrassem, você pergunta?"
1600320-90 = "Hmm... #nAcho que eu pediria para consertarem e continuaria usando."
1600320-91 = "[s10] \"Você cuida muito bem deles.\"\n[s11] \"Então os fones também são seus parceiros, Suzumi.\""
1600320-94 = "Parceiros..."
1600320-95 = "É verdade... quando o Sensei diz isso, acabo pensando que talvez seja mesmo verdade."
1600320-96 = "……Fufu."
1600320-97 = "Quando estou com o Sensei... até as conversas mais triviais parecem muito divertidas."
1600320-98 = "……É um sentimento, estranho."
1600320-99 = "Eu sempre achei que estava patrulhando sozinha, mas não era o caso. Minha arma e meus fones de ouvido sempre estiveram ao meu lado."
1600320-100 = "[s12] \"Sim, e eu também estou aqui.\"\n[s13] \"Pode me chamar quando quiser. Claro, não só para patrulhas.\""
1600320-103 = "……Ah."
1600320-107 = "……Ugh."
1600320-108 = "Isso, bem..."
1600320-109 = "D-desculpe. As palavras não estão saindo."
1600320-111 = "Agradeço o seu sentimento, mas #nnão posso deixar que se incomode tanto por mim."
1600320-112 = "Eu sei muito bem o quanto o Sensei é ocupado."
1600320-113 = "Por isso..."
1600320-116 = "……Hmm."
1600320-117 = "……Desculpe, será que... poderia fingir que eu não disse nada?"
1600320-118 = "Eu sempre sou grata ao Sensei."
1600320-119 = "Mesmo tão ocupado com o trabalho, você ainda cuida de mim... muito obrigada. #nSe o Sensei não se importar, bem, só de vez em quando..."
1600320-120 = "……Se puder, eu gostaria de pedir."
1600320-126 = "……Não. #nEu adoraria, Sensei."
