[translation]
33160-1 = "Episódio 16; Alguns fragmentos"
33160-6 = "Azusa……."
33160-7 = "Quanto será que você sofreu para tomar essa decisão…… Aquele presente que você valorizava tanto, como se fosse sua própria vida. Usá-lo como uma ferramenta de assassinato……."
33160-8 = "Originalmente, era uma bomba preparada para destruir meu halo……."
33160-9 = "Usar aquilo que você não usou naquela época, justamente neste momento……."
33160-12 = "Cof, cof! Ugh, guh……!"
33160-13 = "¡!"
33160-14 = "Princesa, Princesa!!!!"
33160-15 = "……."
33160-16 = "……Mas Saori está a salvo. Embora esteja gravemente ferida, seu halo não foi destruído."
33160-17 = "Mas, e Atsuko, que a protegeu……?"
33160-18 = "Princesa!! Não, Atsuko! Aguente firme!!"
33160-19 = "Atsuko, essa garota chamada Princesa……."
33160-20 = "Deve ser uma pessoa muito importante para Saori, não é?"
33160-22 = "……."
33160-23 = "O poder do Sangue Real enfraqueceu. Isso significa que houve uma mudança na força vital……?"
33160-24 = "Hmm, será que isso vai atrapalhar o experimento…… Mas ainda não……."
33160-25 = "……."
33160-26 = "……Ah, entendo."
33160-27 = "Então ela já tinha preparado uma precaução…… Faz sentido, sendo um Sangue Real tão valioso."
33160-28 = "Bem, não importa. Vai levar um pouco de tempo, mas…… afinal, somos camaradas. O mínimo que posso fazer é isso."
33160-33 = "Bem, vamos começar."
33160-35 = "¡……."
33160-36 = "Princesa, você está bem!?"
33160-37 = "(Acena com a cabeça)"
33160-38 = "Ah, que bom. Princesa……."
33160-43 = "……Eu não vou perdoar."
33160-44 = "Azusa…… como pôde causar um ferimento desses na Princesa……."
33160-45 = "Eu nunca vou te perdoar, Azusa!!"
33160-47 = "Atsuko não morreu……."
33160-48 = "Aquela bomba, se fosse comigo, com certeza meu halo teria sido 'destruído'."
33160-49 = "Mesmo Saori, que não foi atingida diretamente, sofreu aquele dano."
33160-50 = "O halo daquela garota, Atsuko…… parece estar sendo protegido por alguém."
33160-51 = "……."
33160-52 = "……No entanto, grandes obstáculos estão surgindo no plano do Esquadrão Arius."
33160-53 = "O ataque a Trinity ainda não foi realizado, e o poder da Associação de Santos Justina enfraqueceu devido ao ferimento de Atsuko."
33160-54 = "Além do fato de que a batalha na Antiga Catedral está se acalmando……"
33160-55 = "Ambas as academias estão em um impasse, e o transporte dos feridos já começou."
33160-56 = "……Azusa. Espero que isso, pelo menos, alivie um pouco o seu desespero……."
33160-58 = "Encontramos feridos, vamos transportá-los!!"
33160-59 = "Tragam uma maca para cá!"
33160-60 = "Ali, ainda há mais alguns feridos!"
33160-62 = "Chefe! Resgatamos os membros do Pandemonium da aeronave que caiu no lago! Disseram que a Presidente Makoto também estava entre eles!"
33160-63 = "Como esperado da Presidente, ela tem sorte como sempre. Até cair no lago foi uma sorte……"
33160-64 = "Continuem com o resgate em todos os locais. Basicamente, todos devem ser levados obrigatoriamente para a UTI."
33160-65 = "Sim!"
33160-66 = "E quanto ao Comitê Disciplinar?"
33160-67 = "Atualmente, a oficial administrativa Ako está coordenando tudo. Segundo as informações, a Presidente do Comitê está gravemente ferida e inconsciente."
33160-68 = "……."
33160-69 = "Presidente do Comitê Disciplinar…… Ela, que era quem mais desejava este tratado……."
33160-70 = "……Diretora?"
33160-71 = "……Não, não é nada. Continuem com o resgate dos feridos."
33160-75 = "……."
33160-76 = "……Parece que vai chover. Vamos nos apressar."
33160-79 = "A Presidente Tsurugi, do Comitê de Justiça, está gravemente ferida! E a Vice-Presidente Hasumi está em estado crítico!"
33160-80 = "Sakurako-sama também está em estado crítico! A enfermaria da Brigada de Socorro está lotada, então estamos levando-a para o dormitório da biblioteca antiga!"
33160-85 = "Ah, não... Sakurako-sama..."
33160-86 = "……E a Nagisa-san?"
33160-87 = "Sobre ela, dizem que ainda estão procurando!"
33160-88 = "……."
33160-89 = "……! Recebemos informações de que alguns extremistas estão prestes a declarar guerra contra Gehenna!!"
33160-91 = "O quê!?"
33160-92 = "Não, não podem fazer isso agora...!"
33160-96 = "Há relatos de que o Comitê de Justiça está tentando invadir a Catedral! Houve um confronto no saguão central com as irmãs que tentavam impedi-los!"
33160-97 = "O quê...!?"
33160-101 = "O caos está por toda parte..."
33160-102 = "Precisamos parar o combate logo e focar no resgate...!"
33160-105 = "(Com tantas variáveis e nesta situação, o que eu deveria fazer...)"
33160-106 = "(Seia-chan...)"
33160-108 = "(Sensei...)"
33160-110 = "Gehenna - Enfermaria"
33160-111 = "A Presidente desapareceu!?"
33160-112 = "S-sim... ela estava deitada aqui até agora pouco..."
33160-113 = "Procurem por ela imediatamente! Com aqueles ferimentos, onde ela poderia ter ido...!?"
33160-114 = "S-sim, senhor!"
33160-119 = "Presidente..."
33160-121 = "……Parece que a Presidente do Comitê Disciplinar desapareceu."
33160-122 = "O que terá acontecido com o coração dela, que se esforçou tanto até agora..."
33160-124 = "Tea Party - Sala de Aula"
33160-125 = "O texto da declaração de guerra está pronto!?"
33160-126 = "Sim, está tudo certo!"
33160-127 = "Ótimo, então vamos fazer isso imediatamente...!"
33160-131 = "Espere!"
33160-132 = "O quê, Hanako-san...? Por que você está aqui!?"
33160-133 = "Pelo regulamento escolar, uma declaração de guerra não pode ser feita sem um anfitrião!"
33160-134 = "……."
33160-135 = "Vocês viram aquela gravação, não viram!? O inimigo não é Gehenna!"
33160-136 = "Aquilo certamente é 'outra coisa' sendo manipulada por Arius!"
33160-137 = "Através das ruínas espalhadas pelo distrito de Trinity e das catacumbas que se conectam ao subsolo delas—"
33160-139 = "……Prendam-na."
33160-145 = "O quê!?"
33160-147 = "Urawa Hanako-san... é uma pena que as coisas tenham chegado a este ponto."
33160-148 = "O que você está...!?"
33160-149 = "Eu vi a gravação, é claro. Aquele grupo desconhecido, a 'Associação de Santos Justina'."
33160-150 = "Eu sei que eles têm relação com a Sisterhood. É justamente por isso que estamos agindo assim."
33160-151 = "A brincadeira de detetive acabou, Hanako-san."
33160-152 = "……!"
33160-153 = "Também confirmamos a posição de lançamento dos mísseis de cruzeiro. Eram as ruínas da catedral, sob a jurisdição da Sisterhood."
33160-154 = "Arius invadiu nosso distrito através das catacumbas abaixo delas... essa é certamente uma possibilidade."
33160-155 = "Mas, e se Arius e a Sisterhood estivessem mancomunados desde o início?"
33160-156 = "……! Isso não é…!"
33160-157 = "Eles são um grupo extremamente sigiloso. Não seria de se estranhar que fossem capazes de algo assim."
33160-158 = "Nós, da facção Pater, decidimos responder rapidamente a essa situação perigosa."
33160-159 = "Isso significa que, não pode ser…"
33160-160 = "Sim. Quanto à facção Filius e à facção Sanctus, que se opuseram à nossa decisão ou preferiram se abster, já as mantemos sob custódia."
33160-161 = "Um golpe de estado…!"
33160-162 = "Não, não é isso. Afinal, ainda temos uma integrante legítima do Tea Party aqui."
33160-163 = "……!?"
33160-167 = "Mika-sama, a líder da facção Pater e membro do Tea Party."
33160-168 = "Vamos libertá-la e, como ela deseja, iniciar uma guerra total contra Gehenna."
33160-169 = "……!!!"
33160-172 = "……."
33160-173 = "Mika-san, venha por aqui."
33160-174 = "……Hum?"
33160-179 = "Azusa… o que você pretende fazer agora?"
33160-180 = "Graças à sua determinação, muitas pessoas foram salvas. No entanto, embora os dogmas tenham enfraquecido, a 'Sociedade de Justiça' ainda existe."
33160-181 = "Hina, a presidente do Comitê Disciplinar de Gehenna, desapareceu, e Hanako está prestes a ser presa."
33160-182 = "E Mika está sendo libertada."
33160-183 = "Então este é o fim."
33160-184 = "No final, tudo foi sem sentido, uma história como um sonho vazio e fútil…"
33160-185 = "……Ainda não."
33160-186 = "Azusa…?"
33160-188 = "Não é hora de desistir, Azusa."
33160-189 = "Mexa-se, pense. Se tiver tempo para ficar triste e desanimada, procure uma solução agora mesmo, de qualquer jeito…"
33160-190 = "O próximo plano… o próximo…"
33160-195 = "Não posso parar, preciso me mover… preciso de um jeito…"
33160-196 = "A 'Sociedade de Justiça' não desapareceu… Saori e Atsuko estão bem… isso é… não, mas…"
33160-197 = "Preciso ir… farei qualquer coisa para salvar a Saori…"
33160-198 = "Se não…"
33160-206 = "Azusa… você ainda pretende lutar?"
33160-207 = "Sabendo que tudo é fútil, mesmo assim você…"
33160-208 = "Tendo perdido tudo, por que você…"
33160-210 = "Tem uma briga acontecendo ali! Alguém vá parar aquilo!"
33160-211 = "Um incidente ocorreu no 5º prédio escolar! O que faremos!?"
33160-213 = "U-uh…"
33160-214 = "E-eu…"
33160-215 = "Ué? Você… não era do Clube de Estudos Suplementares? Por que está aqui? Você não deveria estar proibida de retornar?"
33160-216 = "I-isso é, bem…"
33160-217 = "Bom, não é hora para isso agora. Se não tem nada para fazer, pode ir até a prisão? Disseram que um grupo estranho pode aparecer por lá…"
33160-221 = "E-eu…!"
33160-223 = "Sa-Saori-san…"
33160-224 = "Líder…"
33160-226 = "Agora mesmo, o ataque à Trinity…"
33160-227 = "Antes disso, há algo que precisamos fazer."
33160-228 = "A Hime-chan se machucou e há problemas com a manifestação da 'Sociedade de Justiça'…"
33160-229 = "…Precisamos voltar àquela Antiga Catedral e atualizar os dogmas."
33160-230 = "……."
33160-231 = "…Entendido, vamos para a Antiga Catedral."
33160-232 = "Partiremos imediatamente."
33160-233 = "……."
33160-234 = "Vamos lá!"
33160-236 = "Senhorita Mika, por aqui."
33160-237 = "Senhorita Mika!!"
33160-238 = "Desculpe a demora, você está livre agora!"
33160-242 = "Hmm... entendi. É, acho que entendi a situação. Ou seja..."
33160-243 = "Vocês são todos meus fãs, é isso? Ah, que coisa. Querem que eu dê um autógrafo?"
33160-244 = "N-não, não é isso. Como deve ter visto, atualmente a Trinity está..."
33160-246 = "Sim, eu entendi a maior parte. E o que vocês são? Não me diga que estão pensando em declarar guerra contra Gehenna?"
33160-247 = "Sim, exatamente! Esta é a chance de eliminar aqueles de Gehenna de uma vez por todas!"
33160-248 = "Como a senhorita desejava, um conflito total contra Gehenna...!"
33160-249 = "Vamos, dê a ordem de batalha para toda a Trinity agora mesmo!"
33160-250 = "…Ah."
33160-251 = "Vocês têm boa memória, hein. Sim, eu odeio Gehenna com todas as minhas forças."
33160-252 = "…E daí? Por que vieram aqui pedir ordens?"
33160-253 = "…Como é?"
33160-254 = "Vocês já suprimiram as outras facções, não é? Na verdade, nem precisam de uma declaração de guerra formal. Podiam simplesmente atacar Gehenna agora mesmo, mas em vez disso, querem que eu sinta o ódio por vocês e dê a ordem... Que coisa interessante vocês estão fazendo, não?"
33160-255 = "S-senhorita Mika!? O que você está...!"
33160-256 = "Ahaha, desculpe se te ofendi."
33160-257 = "Sim, eu odeio Gehenna. Odeio tanto que, se tivesse a chance, faria algo a respeito."
33160-258 = "Mas, sabe, eu não estou muito a fim disso agora. Então, me desculpem, mas poderiam ir embora?"
33160-259 = "A-a fim...?"
33160-260 = "Você tem noção de quão importante é este momento? E você quer ignorar isso por causa de um simples capricho..."
33160-261 = "…'Simples'? Do que você está falando? Isso é o que mais importa, não é?"
33160-262 = "Eu odeio Gehenna por causa dos meus sentimentos e do meu humor. O que há de errado nisso? Não tem nenhum motivo oculto ou objetivo por trás disso, entende?"
33160-263 = "Vocês sabem que não precisam de uma declaração de guerra oficial nessa situação, não sabem? E ainda assim, vêm me pedir para odiar por vocês... que coisa estranha."
33160-264 = "Podem ir embora agora? Não estou com vontade e isso está começando a ficar irritante."
33160-265 = "…O que você disse?"
33160-266 = "Quer que eu limpe seus ouvidos? Estou dizendo que é patético não conseguir odiar alguém sem receber uma ordem."
33160-267 = "Sua... como se atreve a dizer isso...!"
33160-272 = "…!"
33160-273 = "Sua garotinha mimada e ignorante! Nós nos demos ao trabalho de te tirar da prisão e você fica toda cheia de si...!"
33160-277 = "Ah, chega..."
33160-283 = "…Isso dói."
33160-287 = "Entenda a sua posição! Você está prestes a ser destituída do Tea Party!"
33160-291 = "Nós nos demos ao trabalho de vir até aqui, e você nos trata assim...!"
33160-300 = "…."
33160-301 = "O-o que vocês estão fazendo!?"
33160-302 = "Q-quem é você!?"
33160-303 = "N-não façam bullying! Por que estão todos juntos contra ela...!"
33160-305 = "E-eu não vou permitir isso!!"
33160-306 = "…!"
33160-309 = "[ns] Abre os olhos."
33160-315 = "[ns] Senta-se."
33160-317 = "P-Sensei!? Você acordou...!!"
33160-318 = "Você não pode se mover ainda! Sensei, onde você pensa que vai...!?"
33160-320 = "…Sensei, você pretende continuar enfrentando tudo isso?"
33160-321 = "As alunas, sem ser nada além de..."
33160-322 = "…Apenas por serem alunas?"
33160-323 = "[s] \"Porque eu acredito que é assim que deve ser.\""
33160-324 = "…Mas, Sensei."
33160-325 = "O que se coloca diante de você é o ódio e a desconfiança. A personificação daquilo que, ao longo de um tempo quase eterno, foi se acumulando."
33160-328 = "[ns] \"Bem, então, primeiro vou ficar cara a cara com isso.\""
33160-332 = "Próximo episódio: A verdadeira face do ódio"
