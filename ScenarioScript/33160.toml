[translation]
33160-1 = "Episódio 16; Alguns Fragmentos"
33160-6 = "Azusa..."
33160-7 = "O quanto você deve ter sofrido com essa decisão...? O presente que você valorizava mais do que sua própria vida... e você o usou como uma arma para matar..."
33160-8 = "Aquela era uma bomba originalmente preparada para destruir o meu halo..."
33160-9 = "Aquela que você não usou naquela época, foi usada agora..."
33160-12 = "*Cof, cof!* Ugh, guh...!"
33160-13 = "!"
33160-14 = "Princesa, Princesa!!!!"
33160-15 = "......"
33160-16 = "......Mas a Saori está bem. Embora esteja gravemente ferida, o halo dela não foi destruído."
33160-17 = "Mas, e a Atsuko, que a protegeu...?"
33160-18 = "Princesa!! Não, Atsuko! Fique comigo!!"
33160-19 = "Atsuko... aquela garota que chamam de 'Princesa'..."
33160-20 = "Deve ser alguém muito importante para a Saori."
33160-22 = "......"
33160-23 = "O poder do Sangue Real enfraqueceu. Isso significa que... uma anomalia com a sua vida...?"
33160-24 = "Hum, isso vai atrapalhar os meus experimentos... mas, ainda..."
33160-25 = "......"
33160-26 = "......Ah, entendo."
33160-27 = "Ela já tinha os preparativos prontos... Compreensível, já que se trata do precioso Sangue Real."
33160-28 = "Bom, vai levar algum tempo, mas... somos companheiros, afinal. Isso é o mínimo."
33160-33 = "Pois bem, vamos começar."
33160-35 = "Ugh..."
33160-36 = "Princesa, você está bem!?"
33160-37 = "(Assentimento)"
33160-38 = "Ah, graças a Deus. Princesa..."
33160-43 = "......Eu não vou perdoar."
33160-44 = "Azusa... como você se atreve a ferir a Princesa assim..."
33160-45 = "Eu nunca vou perdoar você, Azusa!!"
33160-47 = "A Atsuko não morreu..."
33160-48 = "Com aquela bomba, se fosse eu, meu halo com certeza teria sido 'destruído'."
33160-49 = "Mesmo a Saori, que não foi atingida em cheio, sofreu todo aquele dano."
33160-50 = "O halo daquela garota, Atsuko... parece estar sendo protegido por alguém."
33160-51 = "......"
33160-52 = "......Mas o plano do Esquadrão Arius começou a enfrentar grandes obstáculos."
33160-53 = "Ainda não atacaram a Trinity, e com o ferimento da Atsuko, o poder da Sociedade dos Santos Justina também está enfraquecendo."
33160-54 = "Além disso, a batalha no Tabernáculo parece estar se acalmando..."
33160-55 = "As duas academias estão em um impasse, e também já começaram a transportar os feridos."
33160-56 = "......Azusa. Se isso amenizar um pouco o seu desespero, ficarei feliz..."
33160-58 = "Ferido encontrado, iniciando o transporte!!"
33160-59 = "Tragam a maca para cá!"
33160-60 = "É ali, ainda há mais alguns feridos!"
33160-62 = "Chefe! Resgatamos os conselheiros do Pandemonium da aeronave que caiu no lago! Dizem que a Presidente Makoto também estava a bordo!"
33160-63 = "A Presidente tem sorte como sempre. Ter caído no lago também foi muita sorte..."
33160-64 = "Continuem com os resgates nas várias áreas. Basicamente, todos devem ser levados compulsoriamente para a UTI."
33160-65 = "Sim, senhora!"
33160-66 = "E quanto ao Comitê Disciplinar?"
33160-67 = "No momento, a Administradora Akko está organizando as coisas. Segundo as informações, a Presidente está gravemente ferida e inconsciente."
33160-68 = "......"
33160-69 = "A Presidente do Comitê Disciplinar... que deve ter sido a pessoa que mais desejava esse tratado..."
33160-70 = "......Chefe?"
33160-71 = "......Não, não é nada. Continuem o resgate aos feridos."
33160-75 = "......"
33160-76 = "......Acho que vai chover. Vamos rápido."
33160-79 = "A Presidente do Comitê de Realização da Justiça, Tsurugi, está gravemente ferida! A Vice-Presidente Hasumi está em estado crítico!"
33160-80 = "A Sakurako-sama também está em estado crítico! O posto médico dos Cavaleiros Hospitalários está lotado, elas estão sendo transportadas para a área de descanso da biblioteca antiga!"
33160-85 = "Ah, aaaah... Sakurako-sama..."
33160-86 = "......E a Nagisa-san?"
33160-87 = "Elas disseram que ainda estão procurando por ela!"
33160-88 = "......"
33160-89 = "...! Temos informações de que alguns radicais farão uma declaração de guerra contra Gehenna em breve!!"
33160-91 = "O quê!?"
33160-92 = "Não podemos, fazer isso logo agora...!"
33160-96 = "Informações apontam que o Comitê de Realização da Justiça está tentando invadir a Catedral! Houve um confronto no Salão Central com as irmãs que tentaram impedi-las!"
33160-97 = "O quê...!?"
33160-101 = "O caos está se espalhando por toda parte..."
33160-102 = "Precisamos parar os combates rapidamente e nos concentrar no resgate...!"
33160-105 = "(Muitas variáveis a considerar, e ainda nesta situação, o que eu devo fazer...)"
33160-106 = "(Seia-chan...)"
33160-108 = "(Sensei...)"
33160-110 = "Enfermaria de Gehenna"
33160-111 = "A Presidente desapareceu!?"
33160-112 = "S-Sim... ela estava deitada aqui até agora..."
33160-113 = "Procurem por ela agora mesmo! Com aquele ferimento, para onde ela...!"
33160-114 = "S-Sim, senhora!"
33160-119 = "Presidente..."
33160-121 = "......Parece que a Presidente do Comitê desapareceu."
33160-122 = "O que será que aconteceu com o coração da garota que trabalhou tão duro até agora..."
33160-124 = "Sala de Aula da Tea Party"
33160-125 = "O texto da declaração de guerra já está pronto!?"
33160-126 = "Sim, está pronto!"
33160-127 = "Ótimo, então vamos logo...!"
33160-131 = "Esperem!"
33160-132 = "Hã, Hanako Urawa-san...? O que faz aqui!?"
33160-133 = "Segundo as regras da escola, uma declaração de guerra não pode ser feita sem a Anfitriã!"
33160-134 = "......"
33160-135 = "Vocês viram aquelas imagens, não é!? O inimigo não é Gehenna!"
33160-136 = "Aquilo, com certeza, é 'algo diferente' sendo manipulado pela Arius!"
33160-137 = "Eles devem ter passado pelas catacumbas interligadas aos vários sítios arqueológicos no Distrito Autônomo da Trinity, e então――"
33160-139 = "......Prendam-na."
33160-145 = "!?"
33160-147 = "Hanako Urawa-san... é uma pena que as coisas tenham chegado a este ponto."
33160-148 = "O que...!?"
33160-149 = "De fato, confirmamos as imagens. Aquele grupo desconhecido, a 'Sociedade dos Santos Justina'."
33160-150 = "Sabemos muito bem que há uma relação com a Irmandade. É exatamente por isso que estamos agindo."
33160-151 = "Sua brincadeira de detetive acabou, Hanako-san."
33160-152 = "......!"
33160-153 = "Também confirmamos o local de lançamento do míssil de cruzeiro. Foi a ruína do santuário, que está sob os cuidados da Irmandade."
33160-154 = "A Arius usou as catacumbas sob elas e invadiu nosso distrito sem permissão... é verdade que essa possibilidade existe."
33160-155 = "Mas, e se a Arius e a Irmandade estivessem unidas desde o começo?"
33160-156 = "...! Isso não é...!"
33160-157 = "Elas são um grupo extremamente reservado. Não seria surpresa se fossem capazes de fazer algo assim."
33160-158 = "Nós, da Facção Pater, decidimos tomar uma atitude rápida frente a esta situação perigosa."
33160-159 = "Isso quer dizer que... não acredito."
33160-160 = "Sim. Nós já prendemos os membros da Facção Filius e Sanctus, que se opuseram ou se abstiveram à nossa decisão."
33160-161 = "Isso é um golpe de estado...!?"
33160-162 = "Não, não é. Afinal, a Trinity ainda tem uma membra legítima da Tea Party."
33160-163 = "......!?"
33160-167 = "A líder da Facção Pater e membra da Tea Party, Mika-sama."
33160-168 = "Nós vamos libertá-la e iniciar a guerra total contra Gehenna que ela tanto desejou."
33160-169 = "......!!!"
33160-172 = "......"
33160-173 = "Mika-san, por aqui."
33160-174 = "......Humm?"
33160-179 = "Azusa... o que você fará a seguir?"
33160-180 = "Sua determinação salvou muitas pessoas. Mas, embora os mandamentos tenham se enfraquecido, a 'Sociedade dos Santos Justina' ainda continua firme."
33160-181 = "A Presidente do Comitê Disciplinar de Gehenna, Hina, desapareceu para algum lugar, e a Hanako está prestes a ser presa."
33160-182 = "E a Mika está sendo solta."
33160-183 = "Então esse é o final."
33160-184 = "No fim de tudo, uma história vazia que parecia com um sonho onde tudo foi inútil..."
33160-185 = "......Ainda não."
33160-186 = "Azusa...?"
33160-188 = "Ainda não é hora para frustrações, Azusa."
33160-189 = "Aja, pense. Se você tem tempo para chorar e se frustrar, tem tempo para tentar encontrar outro jeito e dar um passo..."
33160-190 = "O próximo plano... o próximo..."
33160-195 = "Não posso ficar parada, preciso fazer algo... achar algum jeito..."
33160-196 = "A 'Sociedade dos Santos Justina' não sumiu... a Saori e a Atsuko estão bem... isso significa que... não, mas..."
33160-197 = "Eu tenho que ir... vou parar a Saori, não importa o que custe..."
33160-198 = "Se não..."
33160-206 = "Azusa... você ainda quer lutar?"
33160-207 = "Mesmo sabendo que tudo é vaidade, ainda assim você..."
33160-208 = "Depois de perder tudo, por que você ainda..."
33160-210 = "Estão brigando lá! Alguém tem que parar!"
33160-211 = "Um incidente no Prédio 5! O que a gente faz!?"
33160-213 = "U-Uugh..."
33160-214 = "E-Eu..."
33160-215 = "Ué? Você... você não era do Clube de Reposição? O que está fazendo aqui? Achei que você ainda não pudesse voltar pras funções..."
33160-216 = "E-Isso é... hã..."
33160-217 = "Bom, não é hora pra isso. Se não estiver fazendo nada, pode ir até a prisão? Me disseram que parece que estão se juntando umas pessoas suspeitas lá..."
33160-221 = "E-Eu...!"
33160-223 = "S-Saori-san..."
33160-224 = "Líder..."
33160-226 = "Agora mesmo, ordenar um ataque contra a Trinity...!"
33160-227 = "Antes disso, tem uma coisa que eu preciso fazer."
33160-228 = "A Princesa está machucada, o que tá causando problemas com a materialização da 'Sociedade dos Santos Justina'..."
33160-229 = "......Nós precisamos voltar ao Tabernáculo e renovar o mandamento."
33160-230 = "......"
33160-231 = "......Entendido, vamos em direção ao Tabernáculo."
33160-232 = "Partiremos imediatamente."
33160-233 = "......"
33160-234 = "Vamos!"
33160-236 = "Mika-sama, por aqui."
33160-237 = "Mika-sama!!"
33160-238 = "Pedimos perdão pela demora, você agora é livre!"
33160-242 = "Huumm... Entendi? Sim, já deu pra pegar o básico da situação. Ou seja..."
33160-243 = "Vocês todos são meus fãs, não é? Ah, não tem jeito. Querem que eu distribua uns autógrafos?"
33160-244 = "N-Não, não é isso. A senhora deve ter visto, a Trinity no momento está――"
33160-246 = "É, eu sei de quase tudo. Mas o que vocês querem comigo? Não me digam que estão planejando declarar guerra à Gehenna?"
33160-247 = "Sim, exatamente! Esta é a chance de aniquilarmos Gehenna de vez!"
33160-248 = "Assim como a senhora sempre desejou, uma guerra total contra Gehenna...!"
33160-249 = "Por favor, ordene toda a Trinity à guerra agora mesmo!"
33160-250 = "......Ahah."
33160-251 = "Vocês têm boa memória. É, eu detesto Gehenna."
33160-252 = "......E daí? Qual o problema? Por que vocês querem tanto uma ordem minha?"
33160-253 = "......Como?"
33160-254 = "Vocês suprimiram as outras facções, não foi? Na verdade, nem precisamos mais da burocracia de uma declaração de guerra. Podiam muito bem atacar Gehenna agora mesmo, e ainda assim me pedem para eu ficar brava no lugar de vocês e dar a ordem... o que é isso? Que coisa engraçada."
33160-255 = "M-Mika-sama!? Do que a senhora...!"
33160-256 = "Ahaha, desculpe se ofendi."
33160-257 = "Sim, eu odeio Gehenna. O suficiente para querer acabar com eles se a chance surgisse."
33160-258 = "Mas, eu não tô afim disso agora. Então, será que vocês poderiam me dar licença?"
33160-259 = "A-Afim...?"
33160-260 = "A senhora tem noção da importância desse momento? E a senhora trata isso como uma questão de 'estar afim'..."
33160-261 = "......'Questão'? Do que você tá falando? Esse é o motivo mais importante, não é?"
33160-262 = "Eu odeio Gehenna por conta da minha vontade e dos meus sentimentos. O que há de errado nisso? Não tem nenhum motivo oculto ou objetivo por trás disso, ok?"
33160-263 = "Vocês sabem que não precisam de uma declaração de guerra nesse tipo de situação, né? Mesmo assim ficam pedindo que eu os odeie no lugar de vocês... que coisa estranha..."
33160-264 = "Podem ir embora, por favor? Não tô a fim disso agora e a paciência já tá acabando."
33160-265 = "......O que a senhora disse?"
33160-266 = "Vocês querem que eu limpe os ouvidos de vocês? Eu disse: se não receberem ordens, nem odiar vocês conseguem."
33160-267 = "Sua... Você pode continuar falando isso, mas...!"
33160-272 = "......Ah!"
33160-273 = "Sua princesa ingênua! Nós viemos até aqui para te tirar da prisão, e você fica cheia de marra...!"
33160-277 = "Ai, que saco..."
33160-283 = "......Aí doeu."
33160-287 = "Entenda a sua posição! Você está prestes a ser deposta da Tea Party!"
33160-291 = "Tivemos a boa vontade de vir até aqui, e você age assim...!"
33160-300 = "......"
33160-301 = "O-O que vocês tão fazendo!?"
33160-302 = "Q-Quem é você!?"
33160-303 = "B-Bullying não pode! Por que todo mundo se juntou para atacar ela assim...!"
33160-305 = "I-Isso... eu não vou permitir isso!!"
33160-306 = "......!"
33160-309 = "[ns] Abre os olhos."
33160-315 = "[ns] Levanta-se."
33160-317 = "S-Sensei!? Você acordou...!!"
33160-318 = "Não pode se mexer ainda! Sensei, onde você pensa que vai...!?"
33160-320 = "......Sensei, você ainda pretende enfrentar isso?"
33160-321 = "Só porque as alunas não são outra coisa senão..."
33160-322 = "......Suas alunas?"
33160-323 = "[s] \"Porque eu acredito que esse é o caminho certo.\""
33160-324 = "......Mas, Sensei."
33160-325 = "O que está diante de você é o ódio e a desconfiança. O acúmulo de tempos quase eternos, agora materializado."
33160-328 = "[ns] \"Sendo assim, primeiro eu vou dar de cara com ele.\""
33160-332 = "Próximo Episódio; A Verdadeira Natureza do Ódio"