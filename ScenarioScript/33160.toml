[translation]
33160-1 = "Episódio 16;Alguns Fragmentos"
33160-6 = "Azusa……."
33160-7 = "Quanto essa decisão deve ter te feito sofrer…… o presente que você, de verdade, estimava como a própria vida. Usá-lo como ferramenta de assassinato……."
33160-8 = "A bomba que, originalmente, foi preparada pra destruir a minha aureola……."
33160-9 = "Aquela que você não usou naquela hora, justo neste momento……."
33160-12 = "Cof, cof! Uh, gh……!"
33160-13 = "Gh!"
33160-14 = "Hime, Hime!!!!"
33160-15 = "……."
33160-16 = "……Mas a Saori está bem. É um ferimento grave, mas a aureola não quebrou."
33160-17 = "Porém, a Atsuko, que a protegeu com o corpo……?"
33160-18 = "Hime!! Não pode, Atsuko! Firme!!"
33160-19 = "A Atsuko, aquela menina chamada Hime……."
33160-20 = "deve ser alguém importante pra Saori."
33160-22 = "……."
33160-23 = "O poder do sangue real enfraqueceu. Isto é uma anomalia na vida……?"
33160-24 = "Hum, será que compromete o experimento…… mas ainda……."
33160-25 = "……."
33160-26 = "……Ah, entendo."
33160-27 = "Ela já havia deixado uma salvaguarda preparada…… sei; é por ser um precioso sangue real, então."
33160-28 = "Bom, tanto faz; vai levar um tempinho, mas…… somos, nem que seja de nome, camaradas. Isso, ao menos, eu faço."
33160-33 = "Muito bem, mãos à obra."
33160-35 = "Gh……."
33160-36 = "Hime, você está bem!?"
33160-37 = "(assente)"
33160-38 = "Ah, que bom. Hime……."
33160-43 = "……Imperdoável."
33160-44 = "Azusa…… como ousou ferir a Hime desse jeito……."
33160-45 = "Eu jamais vou te perdoar, Azusa!!"
33160-47 = "A Atsuko não morreu……."
33160-48 = "Aquela bomba, de fato, se fosse eu, sem dúvida a aureola teria \"quebrado\"."
33160-49 = "Até a Saori, que não foi atingida em cheio, sofreu aquele dano."
33160-50 = "A aureola daquela menina, a Atsuko…… parece estar sendo protegida por alguém."
33160-51 = "……."
33160-52 = "……Mas o plano do Squad de Arius está sofrendo um grande revés."
33160-53 = "O ataque a Trinity segue não realizado, e, com o ferimento da Atsuko, o poder do Conselho dos Santos de Justina também enfraqueceu."
33160-54 = "Somando-se a isso, o combate na catedral antiga está se acalmando……"
33160-55 = "as duas academias estão num impasse, e o transporte dos feridos também começa."
33160-56 = "……Azusa. Se, com isto, o seu desespero se abrandar nem que seja um pouco, já seria bom……."
33160-58 = "Ferido localizado, transportando!!"
33160-59 = "Uma maca aqui!"
33160-60 = "É pra lá; ainda há alguns feridos!"
33160-62 = "Chefe! Do dirigível que caiu no lago, resgatamos as deputadas do Pandemonium! Dizem que a presidente Makoto estava entre elas!"
33160-63 = "Como esperado da presidente, sortuda como sempre. Ter caído no lago também foi sorte……"
33160-64 = "Continuem o resgate em cada ponto. Em princípio, todas, compulsoriamente, pra UTI."
33160-65 = "Sim!"
33160-66 = "E o lado do Comitê Disciplinar?"
33160-67 = "No momento, dizem que a administradora Ako está coordenando. A presidente, segundo informações, está gravemente ferida e inconsciente."
33160-68 = "……."
33160-69 = "A presidente do Comitê Disciplinar…… logo ela, que provavelmente mais desejava este tratado……."
33160-70 = "……Chefe?"
33160-71 = "……Não, não é nada. Continuem o resgate dos feridos."
33160-75 = "……."
33160-76 = "……Talvez chova. Vamos nos apressar."
33160-79 = "A presidente Tsurugi, do Comitê de Realização da Justiça, gravemente ferida! A vice-presidente Hasumi está em estado grave!"
33160-80 = "A senhorita Sakurako também está em estado grave! A enfermaria da Ordem dos Cavaleiros de Socorro está lotada; transportando pro dormitório da Biblioteca Antiga!"
33160-85 = "A-ah…… senhorita Sakurako……."
33160-86 = "……E a Nagisa?"
33160-87 = "Sobre ela, dizem que a busca continua!"
33160-88 = "……."
33160-89 = "……Gh! Informação de que uma parte dos radicais vai, em breve, declarar guerra a Gehenna!!"
33160-91 = "Siim!?"
33160-92 = "Não pode; fazer uma coisa dessas agora, aqui……!"
33160-96 = "Informação de que o Comitê de Realização da Justiça está tentando entrar na grande catedral! Houve choque no hall central com as irmãs que tentavam impedir!"
33160-97 = "Q-quê……!?"
33160-101 = "Confusão por todo lado……."
33160-102 = "Temos que parar logo os combates e nos concentrar no resgate……!"
33160-105 = "(Variáveis demais, e ainda esta situação; o que é que eu faço, afinal……)"
33160-106 = "(Seia……)"
33160-108 = "(Sensei……)"
33160-110 = "Gehenna - Enfermaria"
33160-111 = "A presidente sumiu!?"
33160-112 = "S-sim…… até agora há pouco ela estava deitada aqui……."
33160-113 = "Procurem-na imediatamente! Com aqueles ferimentos, pra onde, afinal……!"
33160-114 = "S-sim!"
33160-119 = "Presidente……."
33160-121 = "……A presidente do Comitê Disciplinar, pelo visto, desapareceu."
33160-122 = "O que terá acontecido com o coração dela, que se manteve firme por todo esse tempo……"
33160-124 = "Tea Party - Sala de aula"
33160-125 = "O texto da declaração de guerra ficou pronto!?"
33160-126 = "Sim, tudo certo!"
33160-127 = "Ótimo, então, imediatamente……!"
33160-131 = "Esperem!"
33160-132 = "Q-quê, Hanako Urawa……? Por que você está aqui!?"
33160-133 = "A declaração de guerra, pelo regulamento, não pode ser proclamada sem a host!"
33160-134 = "……."
33160-135 = "Vocês viram aquele vídeo, não viram!? O adversário não é Gehenna!"
33160-136 = "Aquilo é, com certeza, \"outra coisa\", manipulada pela Arius!"
33160-137 = "Pelas ruínas espalhadas pelo distrito autônomo de Trinity, e pelas catacumbas ligadas ao subsolo delas――"
33160-139 = "……Prendam-na."
33160-145 = "!?"
33160-147 = "Hanako Urawa…… é lamentável que tenha chegado a isto."
33160-148 = "O que……!?"
33160-149 = "O vídeo, de fato, nós confirmamos. Aquele grupo de identidade desconhecida, o \"Conselho dos Santos de Justina\"."
33160-150 = "Que aquilo tem relação com a Sisterhood, isso nós sabemos. É justamente por isso que estamos agindo assim."
33160-151 = "A brincadeira de detetive acabou, Hanako."
33160-152 = "……!"
33160-153 = "A posição de lançamento do míssil de cruzeiro também confirmamos. Era a ruína da catedral sob administração da Sisterhood, não era?"
33160-154 = "A Arius, pelas catacumbas que ficam embaixo dela, invadiu por conta própria o nosso distrito autônomo…… de fato, essa possibilidade também existe."
33160-155 = "Mas, e a linha de que, desde o começo, Arius e Sisterhood estavam de mãos dadas?"
33160-156 = "……Gh! Isso jamais……!"
33160-157 = "É um grupo de sigilo absoluto àquele ponto. Não seria estranho que conseguissem ao menos isso."
33160-158 = "Nós, a facção Pater, decidimos responder com rapidez a esta situação perigosa."
33160-159 = "Isso quer dizer, não me diga que……."
33160-160 = "Sim. Quanto às facções Filius e Sanctus, que se opuseram à nossa decisão ou reservaram o julgamento, já detivemos os seus membros."
33160-161 = "Um golpe……!"
33160-162 = "Não, não é. Afinal, ainda há, pra começo de conversa, 1 membro legítimo do Tea Party."
33160-163 = "……!?"
33160-167 = "A chefe da facção Pater e membro do Tea Party, a senhorita Mika."
33160-168 = "Vamos libertá-la e, como ela sempre desejou, começar a guerra total contra Gehenna."
33160-169 = "……!!!"
33160-172 = "……."
33160-173 = "Senhorita Mika, por aqui."
33160-174 = "……Hmm?"
33160-179 = "Azusa…… o que você pretende fazer agora?"
33160-180 = "Pela sua determinação, muitas pessoas foram salvas. Mas, embora o preceito tenha enfraquecido, o \"Conselho dos Santos de Justina\" segue existindo."
33160-181 = "A presidente do Comitê Disciplinar de Gehenna, Hina, sumiu pra algum lugar, e a Hanako está prestes a ser presa."
33160-182 = "E a Mika está sendo libertada."
33160-183 = "No fim, este é o desfecho."
33160-184 = "No fim, tudo é sem sentido; uma história vã demais, como um sonho……."
33160-185 = "……Ainda não."
33160-186 = "Azusa……?"
33160-188 = "Não é hora de se abater, Azusa."
33160-189 = "Mexa-se, pense. Se há tempo pra se abater e ficar triste, que seja pra, mesmo agora, procurar um método, dar um jeito……"
33160-190 = "O próximo plano…… o próximo é……"
33160-195 = "Não dá pra ficar parada; tenho que me mexer…… algum método……."
33160-196 = "O \"Conselho dos Santos de Justina\" não sumiu…… a Saori e a Atsuko estão bem…… isso quer dizer…… não, mas……"
33160-197 = "Tenho que ir…… custe o que custar, a Saori……."
33160-198 = "Senão……"
33160-206 = "Azusa…… você ainda pretende lutar?"
33160-207 = "Sabendo que tudo é vão, e mesmo assim você……"
33160-208 = "Depois de perder tudo, por que tanto……"
33160-210 = "Confusão com violência lá adiante! Alguém vai lá parar!"
33160-211 = "Incidente no Prédio 5! O que fazemos!?"
33160-213 = "U-uu……."
33160-214 = "E-eu……."
33160-215 = "Ué? Você…… você não tava no Clube de Aulas de Reforço? Por que tá aqui? Não era proibido voltar ainda?"
33160-216 = "I-isso, é que……."
33160-217 = "Bom, não é hora pra isso. Se você não tem o que fazer, dá pra ir pro lado da prisão? Falaram que tá pra pintar uma aglomeração estranha por lá……."
33160-221 = "E-eu……!"
33160-223 = "S-Saori……."
33160-224 = "Líder……."
33160-226 = "Agora mesmo, o ataque a Trinity……!"
33160-227 = "Antes disso, há uma coisa que precisa ser feita."
33160-228 = "A-a Hime se feriu, e a manifestação do \"Conselho dos Santos de Justina\" está com problemas……."
33160-229 = "……Precisamos voltar àquela catedral antiga e renovar o preceito."
33160-230 = "……."
33160-231 = "……Entendido; vamos rumo à catedral antiga."
33160-232 = "Partimos imediatamente."
33160-233 = "……."
33160-234 = "Vamos!"
33160-236 = "Senhorita Mika, por aqui."
33160-237 = "Senhorita Mika!!"
33160-238 = "Desculpe a demora; a senhorita está livre!"
33160-242 = "Hmm…… sei? Sim, entendi mais ou menos a situação. Ou seja……"
33160-243 = "vocês são todas minhas fãs, é isso? Iá, fazer o quê. Quer que eu dê uns autógrafos?"
33160-244 = "N-não, não é isso. Como deve ter visto, Trinity, neste momento――"
33160-246 = "Sim, eu sei, mais ou menos. E aí, o que é este povo todo aqui? Sei que é improvável, mas não me digam que tão pensando em declarar guerra a Gehenna?"
33160-247 = "Sim, exatamente! Agora é a chance de apagar aquele povo de Gehenna!"
33160-248 = "Como a senhorita sempre desejou, a guerra total contra Gehenna……!"
33160-249 = "Vamos, a ordem de combate pra toda Trinity, imediatamente!"
33160-250 = "……Aha."
33160-251 = "Que memória boa a de vocês. Sim, eu odeio Gehenna com todas as forças."
33160-252 = "……E aí? E daí? Por que vocês vieram querendo tanto assim uma ordem?"
33160-253 = "……Hã?"
33160-254 = "Vocês contiveram as outras facções, né? Na prática, o trâmite da declaração de guerra já nem é necessário. Era só partir pra cima de Gehenna agora mesmo; e vocês querem que eu me irrite no lugar de vocês, que eu dê a ordem…… que é isso, que coisa mais engraçada de se fazer?"
33160-255 = "S-senhorita Mika!? O que a senhorita……!"
33160-256 = "Ahaha, desculpa se ofendi."
33160-257 = "Sim, eu odeio Gehenna. A ponto de, se houver chance, querer dar um jeito nela."
33160-258 = "Mas, sabe, a eu de agora não tá muito nesse clima. Então, foi mal, dá pra vocês irem embora?"
33160-259 = "C-clima……?"
33160-260 = "A senhorita entende o quão grave é este momento? E, por uma mera questão de clima……"
33160-261 = "……\"Mera\"? Do que você tá falando; isso é o mais importante, não é?"
33160-262 = "Eu odeio Gehenna por uma questão de clima, de sentimento meu. O que há de errado nisso? Não existe motivo nem objetivo escondido por trás, viu?"
33160-263 = "Numa situação destas, declaração de guerra nem é necessária; vocês sabem, né? E, mesmo assim, vêm me pedir pra odiar no lugar de vocês; que coisa mais estranha……."
33160-264 = "Dá pra irem embora? Não tô nesse clima agora, e já tá começando a me dar preguiça."
33160-265 = "……Como é que é?"
33160-266 = "Quer que eu limpe seus ouvidos? Eu tô dizendo que vocês nem odiar conseguem sem receber ordem."
33160-267 = "Essa daí, deixamos falar e……!"
33160-272 = "……Gh."
33160-273 = "Sua mocinha mimada e alienada! A gente se dá ao trabalho de te tirar da cadeia, e você fica se achando……!"
33160-277 = "Ah, francamente……."
33160-283 = "……Que dor."
33160-287 = "Entenda a sua posição! Você, que tá a um passo de ser destituída do Tea Party!"
33160-291 = "A gente veio até aqui por você, e é assim que……!"
33160-300 = "……."
33160-301 = "O-o que vocês tão fazendo!?"
33160-302 = "Q-quem é você!"
33160-303 = "B-bullying não pode! Por que tanta gente junta, pra cima de uma só……!"
33160-305 = "U-uma coisa dessas, EU não vou permitir!!"
33160-306 = "……!"
33160-309 = "[ns] Abre os olhos."
33160-315 = "[ns] Levanta o corpo."
33160-317 = "S-Sensei!? O senhor acordou……!!"
33160-318 = "Ainda não pode se mexer! Sensei, aonde o senhor pretende ir……!?"
33160-320 = "……Sensei, você pretende, custe o que custar, enfrentar?"
33160-321 = "Pra que os alunos não sejam nada além……"
33160-322 = "……de, simplesmente, alunos?"
33160-323 = "[s] \"Porque é assim que deve ser; eu acredito nisso.\""
33160-324 = "……Mas, Sensei."
33160-325 = "O que se ergue diante de você são o ódio e a desconfiança. A concretização deles, acumulada por um tempo tão longo que beira o eterno."
33160-328 = "[ns] \"Então, primeiro, eu vou encarar isso de frente.\""
33160-332 = "Próximo Episódio;A Verdadeira Face do Ódio"
