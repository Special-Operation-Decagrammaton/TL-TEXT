[translation]
2001105-1 = "Só mais um pouco"
2001105-4 = "（Cheguei um pouco antes do horário combinado com a Serika）"
2001105-5 = "（Esperei, e embora o horário combinado tenha passado, Serika não apareceu no local）"
2001105-6 = "[s] \"Será que ela ficou ocupada com o trabalho de meio período...?\""
2001105-8 = "（Cerca de 20 minutos se passaram desde o horário combinado...）"
2001105-10 = "[ns] \"Não pode ser, será que ela desmaiou em algum lugar...?\""
2001105-11 = "（Lembrei-me de quando a Serika desmaiou por excesso de trabalho e decidi sair correndo para procurá-la）"
2001105-22 = "[ns] \"Serika...\""
2001105-34 = "[ns] \"Serika...!\""
2001105-46 = "[ns] \"...Ah!\""
2001105-50 = "Com licença, será que você poderia sair daí logo...?"
2001105-52 = "Hmm, não se mexe nem um pouco, né..."
2001105-53 = "Dá pena de tirar, mas eu deixei o Sensei esperando..."
2001105-54 = "[s] （Essa voz de agora, é a da Serika...?）"
2001105-55 = "（Vou em direção à origem da voz）"
2001105-58 = "[ns] \"Serika!?\""
2001105-59 = "Ah, Se-Sensei...?"
2001105-60 = "[s1] \"...Que bom.\"\n[s2] \"Ei, quem é essa?\""
2001105-61 = "Bem, é que..."
2001105-62 = "Bem, é que..."
2001105-65 = "[wa:350]― De-, [wa:1050]desculpa, [wa:700]Sensei..."
2001105-67 = "― Como pode ver, [wa:1200]eu não consigo [wa:350]me mexer..."
2001105-70 = "[ns3] \"Ela parece estar dormindo tão tranquilamente, é fofa.\"\n[ns4] \"De certa forma, parece com a Serika.\""
2001105-71 = "[wa:350]― Hã, [wa:850]o-, [wa:400]o que [wa:500]isso quer dizer!?"
2001105-72 = "[wa:350]― Hã, [wa:850]o-, [wa:400]o que [wa:500]isso quer dizer!?"
2001105-74 = "[wa:100]― Quer dizer, [wa:1300]você está me elogiando...?"
2001105-77 = "[wa:350]― Ah, [wa:1400]falando nisso, [wa:2400]desculpa [wa:1050]por ter quebrado a promessa..."
2001105-79 = "― Hã, [wa:1450]descansar [wa:500]aqui [wa:350]juntos...?"
2001105-82 = "[ns] \"Não, fico aliviado que você não tenha desmaiado. Não é exatamente uma compensação, mas――\""
2001105-83 = "[wa:100]― Já que você [wa:350]trabalhou [wa:700]tanto,"
2001105-85 = "[wa:50]― Queria que você [wa:600]descansasse um pouco agora, [wa:1900]entende...?"
2001105-88 = "― Haha, [wa:1000]que coisa."
2001105-90 = "[wa:100]― Sério, [wa:1400]o Sensei sempre [wa:1150]faz isso..."
2001105-93 = "― Mas, [wa:1550]tudo bem. [wa:1900]Então, só um pouquinho,"
2001105-95 = "― Vamos descansar [wa:550]assim juntos. [wa:1550]Sensei."
2001105-98 = "（E assim, passei o dia sentado na varanda com a Serika, descansando tranquilamente）"
