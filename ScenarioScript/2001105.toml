[translation]
2001105-1 = "もう少しだけ"
2001105-4 = "（セリカとの約束の時間より少し前に到着した）"
2001105-5 = "（そのまま待って、約束の時間を過ぎたものの、セリカは約束の場所に現れない）"
2001105-6 = "[s] \"バイト、忙しくなっちゃったとか……？\""
2001105-8 = "（約束の時間から、約20分が過ぎ……）"
2001105-10 = "[ns] \"まさか、どこかで倒れてるとか……。\""
2001105-11 = "（以前セリカが過労で倒れてしまったことが頭をよぎり、急いでセリカを探しに行くことにした）"
2001105-22 = "[ns] \"セリカ……。\""
2001105-34 = "[ns] \"セリカ……！\""
2001105-46 = "[ns] \"……っ！\""
2001105-50 = "あの、そろそろどいてくれないかな……？"
2001105-52 = "うーん、ビクともしてくれないわね……。"
2001105-53 = "どかすのは忍びないけど、先生を待たせちゃってるし……。"
2001105-54 = "[s] （今の、セリカの声……？）"
2001105-55 = "（声が聞こえてきた方へ向かう）"
2001105-58 = "[ns] \"セリカ！？\""
2001105-59 = "あっ、せ、先生……？"
2001105-60 = "[s1] \"……良かった。\"\n[s2] \"あれ、その子は……？\""
2001105-61 = "えっと、その……"
2001105-62 = "えっと、その……"
2001105-65 = "[wa:350]― ご、[wa:1050]ごめん、[wa:700]先生……。"
2001105-67 = "― この通り、[wa:1200]ちょっと[wa:350]動けなくって……。"
2001105-70 = "[ns3] \"すごく気持ちよさそうに寝てるね、可愛い。\"\n[ns4] \"何だかセリカに似てるかも。\""
2001105-71 = "[wa:350]― え、[wa:850]そ、[wa:400]それって[wa:500]どういう意味！？"
2001105-72 = "[wa:350]― え、[wa:850]そ、[wa:400]それって[wa:500]どういう意味！？"
2001105-74 = "[wa:100]― っていうかそれ、[wa:1300]褒めてるの……？"
2001105-77 = "[wa:350]― あ、[wa:1400]そういえばその、[wa:2400]約束破って[wa:1050]ごめんなさい……。"
2001105-79 = "― え、[wa:1450]ここで[wa:500]一緒に[wa:350]休む……？"
2001105-82 = "[ns] \"ううん、倒れたとかじゃなくて良かった。代わりってわけじゃないけど――\""
2001105-83 = "[wa:100]― ずっと[wa:350]アルバイト[wa:700]頑張ってたんだから、"
2001105-85 = "[wa:50]― 今くらい[wa:600]ゆっくりしてほしい、[wa:1900]って……？"
2001105-88 = "― あはっ、[wa:1000]何それ。"
2001105-90 = "[wa:100]― ほんと、[wa:1400]先生はいつも[wa:1150]そうやって……。"
2001105-93 = "― でも、[wa:1550]うん。[wa:1900]じゃあちょっとだけ、"
2001105-95 = "― こうして一緒に[wa:550]ゆっくりしよっか。[wa:1550]先生。"
2001105-98 = "（そうしてその日は、セリカと縁側に腰掛けてゆっくり過ごした）"
