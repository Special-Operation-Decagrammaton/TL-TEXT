[translation]
1011706-1 = "ガール・イン・ペイン"
1011706-3 = "ヒカリさんじょー。"
1011706-4 = "[s] \"調子良さそうだね、ヒカリ。\""
1011706-5 = "うん－絶好調ー。"
1011706-6 = "ヒカリ先生と遊びたいー。"
1011706-7 = "仕事忙しー？"
1011706-8 = "[s] \"すっごく……\""
1011706-9 = "ぶー。"
1011706-10 = "[s] \"……と見せかけて！今日は早めに終わったよ。\""
1011706-11 = "うぉー。"
1011706-12 = "先生えらい、なでなでー。"
1011706-13 = "おやつ買いにいこー？#nヒカリお金あるー。"
1011706-14 = "[s] \"うん。ちょうど外の空気も吸いたかったし。\""
1011706-16 = "（ヒカリと外に出た）"
1011706-19 = "やっぱこれー、団子アイスクリーム。"
1011706-23 = "うおー、パチパチキャンディのデイジーカッター味ー！"
1011706-25 = "（ヒカリといろんなお菓子を楽しんでいると、いつの間にか日が暮れていた）"
1011706-29 = "うー食べすぎたー。"
1011706-30 = "口のなかあまあまー。"
1011706-31 = "[s] \"確かに結構食べたよね……。\""
1011706-32 = "あっ！"
1011706-33 = "[s] \"どうしたのヒカリ？\""
1011706-34 = "……。"
1011706-35 = "……歯がいたい……かも。"
1011706-36 = "もうだめだー……。"
1011706-37 = "[s] \"だ、大丈夫？\""
1011706-38 = "ちょっと見てー。 "
1011706-41 = "[wa:900]― [log=히카리]ここ、[wa:1200]ここー……[/log]"
1011706-44 = "[ns] \"どこだろ……？奥歯？\""
1011706-46 = "[wa:950]― [log=히카리]そ～[wa:920]……[wa:350]おくのほ～[/log]"
1011706-47 = "[wa:3290]― [log=히카리]はがー[wa:1120]いたいー[/log]"
1011706-50 = "― [log=히카리]せんせー、[wa:1400]みえるー？[/log]"
1011706-53 = "[ns] \"大丈夫そうに見えるけど……。\""
1011706-55 = "[wa:900]― [log=히카리]みぎのおくばがねー[wa:2590]いたいのー[/log]"
1011706-58 = "[wa:570]― [log=히카리]うう、[wa:1080]そこ……[wa:1580]ズキズキー。[/log]"
1011706-61 = "[ns1] \"たしかに……\"\n[ns2] \"あんまり触るとよくないよ……。\""
1011706-64 = "[wa:670]― [log=히카리]えー[wa:1150]どうすればいいのー[wa:2250]ヒカリ[wa:850]死亡フラグー？[/log]"
1011706-65 = "[wa:3950]― [log=히카리]たすけてー[wa:1670]せんせー……。[/log]"
1011706-71 = "[ns] \"甘いもの食べ過ぎかも……\""
1011706-72 = "うー欲望に負けたー。"
1011706-73 = "悪魔の囁きによわいー……。"
1011706-74 = "[s] \"今日寝る前にしっかり歯磨きして、明日歯医者に行こう！\""
1011706-75 = "歯医者、ウルトラデンジャラスー。"
1011706-76 = "ヒカリ歯医者やだー。"
1011706-77 = "[s3] \"でも、ずっと痛いの嫌でしょ？\"\n[s4] \"歯医者に行けばすぐ治るし！\""
1011706-80 = "ううー。"
1011706-81 = "ううぅ……。"
1011706-82 = "ヒカリ長生きする。"
1011706-83 = "まだ遊びたいし……先生と……"
1011706-84 = "歯医者……行くー。"
1011706-85 = "[s] \"よし、その調子！\""
1011706-87 = "（翌日、一緒に歯医者に行って治療を受けた）"
1011706-88 = "（ヒカリが治療を受けている間、ずっと手を握ってあげた）"
