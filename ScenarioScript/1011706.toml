[translation]
1011706-1 = "garota com dor"

1011706-3 = "Hikari-sanjo."

1011706-4 = "[s] \"Parece que você está bem, Hikari.\""

1011706-5 = "Sim, estou indo muito bem."

1011706-6 = "Eu quero brincar com Hikari-sensei."

1011706-7 = "Você está ocupado com o trabalho?"

1011706-8 = "[s] \"Então...\""

1011706-9 = "Vaia."

1011706-10 = "[s] \"Eu fingi que estava...! Terminei cedo hoje.""

1011706-11 = "Uau."

1011706-12 = "Ótimo professor, me dê um tapinha."

1011706-13 = "Vamos comprar alguns lanches? #nHikari tem dinheiro."

1011706-14 = "[s] \"Sim. Eu só queria tomar um pouco de ar fresco.""

1011706-16 = "(Ele saiu com um estrondo)"

1011706-19 = "Afinal, isso é sorvete de bolinho."

1011706-23 = "Uau, doce torresmo com sabor de cortador de margarida!"

1011706-25 = "(Enquanto eu saboreava vários doces com Hikari, o sol estava se pondo antes que eu percebesse.)"

1011706-29 = "Nossa, eu comi demais."

1011706-30 = "Muito doce na boca."

1011706-31 = "[s] \"Você certamente comeu muito...\""

1011706-32 = "Ah!"

1011706-33 = "[s] \"O que há de errado, Hikari?\""

1011706-34 = "……."

1011706-35 = "...Talvez eu precise de dentes..."

1011706-36 = "Eu não posso mais fazer isso..."

1011706-37 = "[s] \"Ei, você está bem?\""

1011706-38 = "Dê uma olhada."

1011706-41 = "[wa:900]― [log=히카리]Aqui, [wa:1200]Aqui...[/log]"

1011706-44 = "[ns] \"Onde...? Dentes de trás?\""

1011706-46 = "[wa:950]― [log=히카리]Então~[wa:920]…[wa:350]Okunoho~[/log]"

1011706-47 = "[wa:3290]― [log=히카리]Hagaa[wa:1120]Itai[/log]"

1011706-50 = "― [log=히카리]Sensei, [wa:1400] Você consegue ver? [/registro]"

1011706-53 = "[ns] \"Parece bom, mas...\""

1011706-55 = "[wa:900]― [log=히카리]Okubagane de Migi [wa:2590] Itai no [/log]"

1011706-58 = "[wa:570]― [log=히카리]Ugh, [wa:1080]Aí... [wa:1580]Thrub. [/registro]"

1011706-61 = "[ns1] \"De fato...\"\n[ns2] \"Não é bom tocar demais...\""

1011706-64 = "[wa:670]― [log=히카리]Eh [wa:1150]O que devo fazer?[wa:2250]Hikari[wa:850]Bandeira da morte? [/registro]"

1011706-65 = "[wa:3950]― [log=히카리]Ajude-me [wa:1670]Sensei... [/log]"

1011706-71 = "[ns] \"Talvez eu coma muitos doces...\""

1011706-72 = "Ugh, perdi meu desejo."

1011706-73 = "Viva para os sussurros do diabo..."

1011706-74 = "[s] \"Vamos escovar bem os dentes antes de dormir hoje e ir ao dentista amanhã!""

1011706-75 = "Dentista, Ultra Perigoso."

1011706-76 = "Dentista Hikari."

1011706-77 = "[s3] \"Mas você não quer que doa o tempo todo, né?\"\n[s4] \"Se você for ao dentista, vai sarar na hora!""

1011706-80 = "Eca."

1011706-81 = "Uuuu..."

1011706-82 = "Viva uma vida longa."

1011706-83 = "Eu ainda quero brincar...com meu professor..."

1011706-84 = "vou ao dentista..."

1011706-85 = "[s] \"Ok, é isso!""

1011706-87 = "(No dia seguinte, fomos juntos ao dentista e recebemos tratamento.)"

1011706-88 = "(Segurei a mão de Hikari durante todo o tempo em que ela estava recebendo tratamento)"

