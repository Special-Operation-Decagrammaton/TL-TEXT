[translation]
103050-1 = "Episódio 5; O que há em Abydos (2)"
103050-5 = "Força Tarefa/Sala de Aula"
103050-8 = "Hum..."
103050-15 = "Hum... hum... bem-vindo a Abydos...?"
103050-17 = "Por favor, me desculpe."
103050-18 = "Quando a Kaiser Corporation atacou a Torre Sanctum... #nPresident me disse."
103050-21 = "Assuma o controle da Torre Sanctum."
103050-22 = "...Eu coloquei em minhas mãos uma arma superantiga. O poder da Torre Sanctum era agora necessário."
103050-23 = "A Kivotos está agora sob o controle da Kaiser Corporation. #nNós não somos a Gematria ou o Conselho Estudantil da Federação... seremos os mestres da Cidade Acadêmica."
103050-26 = "Eu não tinha muito tempo na época, então não tive tempo para pensar sobre o que isso significava... mas agora que penso nisso, não é uma coisa natural de se dizer."
103050-27 = "“Arma superantiga”…Não consigo imaginar uma palavra dita pelo chefe de uma empresa privada."
103050-28 = "E em tempos de paz, você nunca teria notado... #n \"Kaiser Corporation\" e \"Super Ancient Weapon\" - os pontos de contato entre os dois."

103050-29 = "Sim... aqueles dois..."
103050-33 = "Eu vejo."
103050-34 = "Hoshino-senpai?"
103050-40 = "O que Kaiser procurava no deserto de Abydos era uma “arma superantiga”, certo?"
103050-43 = "Deserto de Abydos/perto da área de escavação"
103050-44 = "Tio, estou pensando em você há muito tempo. #nA razão pela qual Kaiser roubou as terras da Região Autônoma de Abydos..."
103050-45 = "Eu estava me perguntando por que estava se transformando em um deserto...#nFoi isso que aconteceu."
103050-47 = "Ou melhor, o que é uma “arma superantiga”? ? #nVocê fez isso por algo assim! ?"
103050-48 = "Era disso que o Kaiser estava falando sobre a \"caça ao tesouro\"..."

103050-50 = "...Bem, essa arma é poderosa. #nEles não vendem essas coisas nas lojas."
103050-51 = "Sim. A Kaiser Corporation então atacou o Conselho Estudantil da Federação para ativar a \"arma superantiga\"."

103050-52 = "Agora, eu não me importo se eu transformar todos os Kivotos em meus inimigos - quase posso chamar isso de #n..."
103050-53 = "Se essa é a razão pela qual havia tantos PMCs Kaiser no deserto recentemente..."
103050-54 = "Os velhos deveriam ir para o deserto de Abydos agora e obter a “arma superantiga”."
103050-56 = "Mas... esse lugar é propriedade privada de Kaiser..."
103050-57 = "Sim, mas é uma emergência. #nVamos ao estilo Shiroko-chan a partir daqui."
103050-62 = "Shiroko-senpai...estilo! ?"
103050-68 = "Ah, espere! Não quero dizer isso..."
103050-69 = "Ha, eu não gosto muito disso...#nA questão é que eu não preciso descobrir, certo? Farei isso rapidamente."
103050-70 = "Vou pegar emprestado por um tempo para pegar Shiroko-chan☆"
103050-78 = "Suspiro... eu entendo. Vou pegá-lo emprestado para resolver a situação... #nO Kaiser PMC já foi evacuado da base, então deve estar sem tripulação por enquanto."
103050-79 = "É assim mesmo?"
103050-80 = "sim. No entanto, continua sendo propriedade privada da Kaiser. #nAlém disso, pode voltar por acaso, então tome cuidado."
103050-85 = "Uau, eu estava esperando uma briga, então está um pouco estranho."
103050-92 = "Hehehe, Ayane-chan fica tão fofa quando coloca a máscara corretamente ☆"
103050-98 = "Ah, ah... isso é..."
103050-99 = "Então, por que não trazemos a “arma superantiga” aqui?"
103050-100 = "Não é tão grande coisa quanto eu pensava..."
103050-102 = "Não, provavelmente é difícil trazê-lo."
103050-103 = "Himari-san...?"
103050-104 = "Então voltaremos mais tarde. #nGostaríamos de pedir a todos que garantam sua segurança até a chegada de todos."
103050-106 = "“Arma superantiga” é realmente tão grande."
103050-108 = "Sim."
103050-109 = "Segundo a professora, aquela “arma superantiga” é..."
103050-115 = "Aparentemente é um navio de guerra espacial."

103050-121 = "Navio de guerra espacial! ?"
103050-131 = "O que vocês estão fazendo? ?"
103050-132 = "O que é isso...? ?"
103050-141 = "Eu vejo. Eles estão voltando porque Sanctum desapareceu."
103050-142 = "No entanto, esta é originalmente a região autônoma de Abydos!"
103050-143 = "Isso mesmo! Kaiser não está apenas sentado!"
103050-145 = "Mas, no papel..."
103050-146 = "Ugh, você está bem...?"
103050-147 = "Bem, toda a área de Kivotos ainda está tumultuada, então mesmo que algo aconteça, tenho certeza que o sensei fará algo a respeito."
103050-148 = "Esse é o poder dos adultos, não é?"
103050-149 = "Ah, haha..."
103050-158 = "Uau,"
103050-159 = "Ele ainda estava lá! ?"
103050-160 = "Ok, vou manter meu ânimo!"
103050-161 = "sim! Mova para as coordenadas especificadas."
103050-162 = "Sensei, por favor me oriente!"
103050-163 = "[ns] \"Ok, vamos começar!\""
