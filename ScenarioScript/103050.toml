[translation]
103050-1 = "第5話;アビドスに在るもの（２）"
103050-5 = "対策委員会・教室"
103050-8 = "ふむ……。"
103050-15 = "えっと……その……アビドスに、ようこそ……？"
103050-17 = "失礼いたします。"
103050-18 = "カイザーコーポレーションがサンクトゥムタワーを襲撃した際……#nプレジデントは私に言いました。"
103050-21 = "サンクトゥムタワーを掌握するのだよ。 "
103050-22 = "……超古代兵器が手に入ったものでね。サンクトゥムタワーの力が必要になった、というわけさ。"
103050-23 = "これでキヴォトスは、カイザーコーポレーションの支配下になる。#nゲマトリアでも、連邦生徒会でもない……我々が学園都市の主となるのだ。"
103050-26 = "当時は余裕がなかったので、その意味を考える時間もありませんでしたが……今思うと不自然な物言いです。"
103050-27 = "「超古代兵器」……私企業のトップが口にする単語とは思えません。"
103050-28 = "そして、平時であれば気付くことはなかったでしょう……#n「カイザーコーポレーション」と「超古代兵器」――この2つの接点など。"
103050-29 = "はい……その2つは――"
103050-33 = "なるほどねぇ～"
103050-34 = "ホシノ先輩？"
103050-40 = "カイザーがアビドス砂漠で探してたのって、#n「超古代兵器」だったって事だよね？"
103050-43 = "アビドス砂漠・発掘区域付近"
103050-44 = "おじさん、ずっと気になってたんだよね。#nカイザーがアビドス自治区の土地を奪った理由……"
103050-45 = "砂漠化しちゃってるのにどうして、って思ってたんだけど……#nそういう事だったんだねぇ～"
103050-47 = "というか、「超古代兵器」って何よ！？#nそんな物のためにあんな事したっていうの！？"
103050-48 = "カイザーが言っていた「宝探し」も、その事だったんですね……"
103050-50 = "……まぁ、それだけ強力な武器なんでしょ。#nそんなもの、お店で売ってないからねぇ。"
103050-51 = "ええ。そして、カイザーコーポレーションは「超古代兵器」を起動させるために連邦生徒会を襲撃しました。 "
103050-52 = "最早、キヴォトス全土を敵に回しても構わない――#nとでも言わんばかりの勢いで……。"
103050-53 = "最近、砂漠にカイザーPMCが多かったのもそれが理由なんだとしたら……"
103050-54 = "おじさんたちも、今からアビドス砂漠に行って「超古代兵器」を手に入れたらいいわけだ。"
103050-56 = "で、ですが……あの場所はカイザーの私有地で――"
103050-57 = "うん、でも緊急事態だからさ。#nここからはシロコちゃんスタイルで行こうか。"
103050-62 = "シロコ先輩……スタイル！？"
103050-68 = "ま、待ってください！そういう意味ではなくて――"
103050-69 = "はぁ、あんまり気は乗らないけど……#n要はバレなきゃいいんでしょ？ちゃちゃっとやるわよ。"
103050-70 = "シロコちゃんを捕まえるために、ちょ～っと借りるだけですから☆"
103050-78 = "はぁ……分かりました。事態の収拾のために、借りるだけ……#nカイザーPMCは既に基地から撤収していますので、今は無人のはずです。"
103050-79 = "ありゃ、そうなの？ "
103050-80 = "はい。ですが、カイザーの私有地であることに変わりはありません。#nそれに、ひょっこり戻ってくるかもしれませんので、気をつけてくださいね。"
103050-85 = "うへ～、戦う事を想定してたから、ちょっと拍子抜けだよ。"
103050-92 = "うふふっ、ちゃんと覆面をつけてくれるアヤネちゃん、可愛いです☆"
103050-98 = "あ、あう……そ、それは……"
103050-99 = "じゃあ、ここに「超古代兵器」を持ってくればいいのよね？"
103050-100 = "思ったより大したことないわね……"
103050-102 = "いえ――おそらく、持ってくるのは難しいかと。"
103050-103 = "ヒマリさん……？"
103050-104 = "ですので私たちも後から参ります。#n皆さんは、全員が到着するまでの間、安全の確保をお願いできればと。"
103050-106 = "「超古代兵器」ってそんなに大きいんだねぇ～"
103050-108 = "ええ。"
103050-109 = "先生によると、かの「超古代兵器」は――"
103050-115 = "[ruby=・   ・   ・   ・]宇宙戦艦[/ruby]、なのだそうです。"
103050-121 = "宇宙戦艦！？"
103050-131 = "なっ、何だお前らは！？ "
103050-132 = "これは……一体！？"
103050-141 = "そっか。サンクトゥムが消えたから戻ってきてるんだね。"
103050-142 = "ですが、ここは元々[ruby=私たち]アビドス[/ruby]の自治区です！"
103050-143 = "そうよ！カイザーは勝手に居座ってるだけじゃない！"
103050-145 = "で、ですが、書類上は……"
103050-146 = "うう、大丈夫でしょうか……"
103050-147 = "まあ、キヴォトス全域はまだ混乱の真っ只中だし、#n何かあったとしても、先生がなんとかしてくれるんじゃない？"
103050-148 = "これが大人のパワー、ですね☆"
103050-149 = "あ、あはは……"
103050-158 = "わっ、"
103050-159 = "まだいたの！？ "
103050-160 = "よ～し、気合入れていくよ～！"
103050-161 = "はい！指定座標に移動します。"
103050-162 = "先生、指揮をお願いします！"
103050-163 = "[ns] \"それじゃ、始めるよ！\""
