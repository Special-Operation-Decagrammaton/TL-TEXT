[translation]
103050-1 = "Episódio 5; Aquilo Que Se Encontra Em Abydos (2)"
103050-5 = "Comitê de Medidas de Precaução - Sala de Aula"
103050-8 = "Hmm..."
103050-15 = "Err... bem... sejam bem-vindas... a Abydos...?"
103050-17 = "Com licença."
103050-18 = "Quando a Corporação Kaiser atacou a Torre Sanctum...#no Presidente me disse o seguinte:"
103050-21 = "Queremos assumir o controle da Torre Sanctum. "
103050-22 = "……É que botamos as mãos em uma arma superantiga. Então a força da Torre Sanctum se tornou necessária, sabe."
103050-23 = "Com isso, Kivotos ficará sob o domínio da Corporação Kaiser.#nNão de Gematria, nem do Conselho Estudantil Geral... Nós seremos os governantes da cidade acadêmica."
103050-26 = "Como a situação era crítica na hora, eu não tive muito tempo para pensar sobre o que isso significava... Mas, agora que parei para analisar, foi uma fala bem estranha."
103050-27 = "Uma \"arma superantiga\"... Não me parece o tipo de palavra que o líder de uma empresa privada usaria."
103050-28 = "Em tempos normais, eu nunca teria notado a ligação...#nEntre a \"Corporação Kaiser\" e uma \"arma superantiga\"."
103050-29 = "Sim... essas duas coisas..."
103050-33 = "Entendi a moral~"
103050-34 = "Hoshino-senpai?"
103050-40 = "O que a Kaiser tava procurando lá no deserto de Abydos...#nera essa tal \"arma superantiga\", não é?"
103050-43 = "Arredores da Área de Escavação no Deserto de Abydos"
103050-44 = "O tio aqui sempre achou isso meio estranho.#nO motivo de a Kaiser ter roubado as terras do distrito de Abydos..."
103050-45 = "Eu sempre me perguntava o porquê deles quererem um lugar que tava virando só areia...#nEntão era por isso, né~"
103050-47 = "Aliás, o que diabos é uma \"arma superantiga\"!?#nNão me diga que eles fizeram tudo aquilo só por causa de uma coisa dessas!?"
103050-48 = "Então era disso que a Kaiser estava falando quando mencionaram uma \"caça ao tesouro\"..."
103050-50 = "……Bom, isso significa que deve ser uma arma bem forte, né.#nAfinal, não é o tipo de coisa que se acha pra comprar em qualquer lojinha."
103050-51 = "Uhum. E então a Corporação Kaiser atacou o Conselho Estudantil Geral só pra conseguir ativar essa \"arma superantiga\". "
103050-52 = "Com uma intensidade de quem não se importa nem um pouco...#nem ter toda Kivotos como inimiga."
103050-53 = "Se esse é o motivo pelo qual andava tendo tanta gente da Kaiser PMC no deserto ultimamente..."
103050-54 = "Então a gente só precisa ir lá pro deserto de Abydos agora mesmo e pegar essa \"arma superantiga\" pra nós."
103050-56 = "M-Mas... aquele lugar é propriedade privada da Kaiser, e..."
103050-57 = "Uhum, mas a gente tá numa situação de emergência, sabe.#nDaqui pra frente vamos no Estilo Shiroko-chan."
103050-62 = "Estilo... Shiroko-senpai!?"
103050-68 = "E-Espera aí! Não foi isso que eu quis dizer――"
103050-69 = "Haa, eu não boto muita fé nisso...#nMas, no fim, o importante é a gente não ser pega, não é? Vamos acabar logo com isso."
103050-70 = "A gente só vai pegar emprestado rapidinho pra conseguir capturar a Shiroko-chan☆"
103050-78 = "Haa... Tudo bem, então. É só um empréstimo pra gente conseguir resolver toda essa situação...#nA Kaiser PMC já retirou as tropas da base, então não deve ter ninguém lá no momento."
103050-79 = "Opa, é mesmo? "
103050-80 = "Sim. Mas isso não muda o fato de que a área ainda é propriedade privada da Kaiser.#nAlém do mais, eles podem aparecer de repente, então, por favor, tomem cuidado."
103050-85 = "Uhe~, a gente já tava até preparada pra uma batalha, acabou sendo até meio anticlimático."
103050-92 = "Ufufu, a Ayane-chan usando a máscara direitinho é tão fofinha☆"
103050-98 = "A-Ah... b-bom..."
103050-99 = "Então, a gente só precisa trazer a \"arma superantiga\" pra cá?"
103050-100 = "Vai ser mais fácil do que eu imaginava..."
103050-102 = "Na verdade――acho que vai ser um pouco difícil trazer ela pra cá."
103050-103 = "Himari-san...?"
103050-104 = "Por isso, nós também vamos ir pra aí.#nGostaria de pedir que vocês garantissem a segurança do local até que todas cheguem."
103050-106 = "Essa \"arma superantiga\" é tão grande assim, é~"
103050-108 = "Sim."
103050-109 = "De acordo com o Sensei, essa tal \"arma superantiga\" é――"
103050-115 = "Uma nave de guerra espacial."
103050-121 = "Uma nave de guerra espacial!?"
103050-131 = "M-Mas o que vocês estão fazendo aqui!? "
103050-132 = "O que diabos... é isso!?"
103050-141 = "Ah, entendi. Como o Sanctum sumiu, eles voltaram pra cá."
103050-142 = "Mas esse lugar originalmente faz parte do distrito de Abydos!"
103050-143 = "É verdade! A Kaiser só se apossou dele sem permissão!"
103050-145 = "M-Mas, de acordo com os documentos..."
103050-146 = "Uu, será que vai ficar tudo bem..."
103050-147 = "Bem, toda Kivotos ainda tá no meio de uma bagunça gigantesca.#nE mesmo se der ruim, o Sensei dá um jeito pra gente, não dá?"
103050-148 = "O verdadeiro poder de um adulto em ação☆"
103050-149 = "A-Ahaha..."
103050-158 = "Uwah,"
103050-159 = "Ainda tem mais deles!? "
103050-160 = "Muito bem, vamo com tudo~!"
103050-161 = "Sim! Nos movendo para as coordenadas designadas."
103050-162 = "Sensei, contamos com os seus comandos!"
103050-163 = "[ns] \"Então, vamos começar!\""