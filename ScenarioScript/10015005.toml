[translation]
10015005-1 = "プロローグ;大運動会の前夜"
10015005-5 = "[ruby=晄輪大祭]キヴォトス大運動会[/ruby]……それは「健全なる精神は健全なる肉体に宿る」という理念に基づき、運動を通じた生徒たちの成長を目的とした催し。"
10015005-7 = "生徒たちが武器を置き、学園問わず互いに切磋琢磨し、#n公明正大に競技を繰り広げる祭典。"
10015005-8 = "学園都市の歴史と共に、古くから続いてきたこのイベントは各学園によって、2年毎に開催され、キヴォトス全体の安寧にとっても大きな役割を果たしてきました。"
10015005-15 = "どれほど仲が悪い学園同士でも、大運動会の期間だけは武器を置いて敵対行為を中断するのが、昔からの不文律でしたが……"
10015005-19 = "今回は、連邦生徒会長の失踪を皮切りに様々な事件が相次いで発生したため、#n大運動会が開かれないのではないかという懸念もありました。"
10015005-23 = "……しかし、幸いシャーレと多くの学園の皆さんが助けてくださったおかげで、#n今回の大運動会も無事、開催する事と相成りました。"
10015005-28 = "ということで今年のキヴォトス大運動会は――"
10015005-34 = "私たち、ミレニアムサイエンススクールで開催することになりました～。"
10015005-35 = "[s1] \"わあー！\"\n[s2] \"おめでとう？\""
10015005-38 = "……まずは先生。急な要請にも関わらず、ここまで来ていただいてありがとうございます。"
10015005-39 = "……それとノア、前振りが長い！"
10015005-40 = "今のやたら長い説明、必要だったの？"
10015005-41 = "私はただ、開会の辞を引用しただけですよ？"
10015005-42 = "文章を変に要約すると、言葉の持つ意味が歪曲して伝わったり、色褪せたりしてしまいますから。"
10015005-43 = "報告を受けた内容を伝える過程で、故意に内容を省略してしまうのは「書記」の任務を遂行していると言えません。"
10015005-44 = "[s] \"……書記？\""
10015005-45 = "そういえば、先生にご挨拶をするのは初めてですね。"
10015005-46 = "私の名前はノア。#nミレニアムサイエンススクールの生徒会――「セミナー」の書記を務めております。"
10015005-47 = "よろしくお願いいたしますね、[USERNAME]先生。"
10015005-48 = "[s] \"こちらこそ、よろしくね。\""
10015005-49 = "何だか今日は、やたらとテンションが高いわね……？"
10015005-50 = "とにかく、早く本題に入りましょう。"
10015005-51 = "……そういうユウカちゃんの方は、何だか普段よりご機嫌斜めですね。"
10015005-52 = "私はただセミナーの一員として、礼儀正しくシャーレの先生に挨拶しただけなのに……何かユウカちゃんの機嫌を損ねることでもありましたか？"
10015005-53 = "先生が私に好意を抱くと、不都合があったりするとか……"
10015005-58 = "ああ……もしかして「嫉妬」、ですか？"
10015005-60 = "べ、別に、そもそも不機嫌じゃないけど！？"
10015005-61 = "それに、一体何にどう嫉妬するっていうのよ！"
10015005-62 = "もう、早く続けるわよ！#n先生も待ってるじゃない！"
10015005-63 = "はいはい。#nそれでは、説明を再開しますね。"
10015005-64 = "先ほど話したようにキヴォトス大運動会……通称「[ruby=こうりんたいさい]晄輪大祭[/ruby]」は、2年周期で開催されるキヴォトス最大級のお祭りの一つです。"
10015005-65 = "そのためこの大運動会は――これを主管する学園の力量を、外部にアピールできる絶好のチャンスでもあります。"
10015005-67 = "キヴォトス中の生徒が、一つの学園に注目する……そんな機会もそうそうありませんから。"
10015005-68 = "この期間に良い印象を残せれば、学園の運営にも大いに役立つというわけです。"
10015005-69 = "新入生の誘致から、学園に必要な物資を供給してくれる業者との取引まで……。"
10015005-71 = "私たちミレニアムサイエンススクールは、キヴォトスでも最新鋭の科学技術を保有した専門的な学校ですので、大運動会を通じて私たちの技術を大いに披露する予定でした。"
10015005-72 = "最適なルートを自動で案内する自律型スマート案内システムですとか、#n競技中の誤審防止のための超高精度カメラ付きターゲットですとか……。"
10015005-73 = "この数ヵ月、ミレニアムのすべての部活がこの大運動会のために全力を尽くしたと言っても過言ではないほどです。"
10015005-75 = "そして、大運動会が目前に迫った本日、私たちセミナーは機材や装置を点検し、#nリハーサルを行う予定だったのですが……。"
10015005-76 = "[s] \"……何か問題が起きてるの？”"
10015005-77 = "はい……残念ながら、そういうことです。"
10015005-84 = "今から12時間前、「新素材開発部」の部室で#nその……ちょっとした、爆発事故が発生しました。"
10015005-85 = "きっとまた何か、変な引火素材でも混ぜたんでしょうけど……"
10015005-86 = "幸い怪我人はいませんでしたが……#n大運動会で使われる予定だった応援ロボットが破損し、緊急修理が必要な状態です。"
10015005-88 = "さらに、示し合わせたかのように、次々とスタジアムで機材を盗まれただの、一部施設が破壊されただの、幾つもの通報が殺到し……"
10015005-89 = "[s3] \"それは……大変だね。\"\n[s4] \"じゃあもしかして、大会は延期に……？\""
10015005-92 = "いえ。リハーサルの日程には少々影響があったものの、大会の延期とまでは行きません。"
10015005-93 = "そのロボットを修理するための機材調達自体は、それほど難しいことではないので。"
10015005-94 = "ただ、盗難事件の方は未解決のままです。できればその痕跡も新しいうちに、犯人を捜索したいところなのですが……"
10015005-95 = "今のセミナーは大運動会を控えているため、事件を捜査する余裕がないんです。"
10015005-96 = "そこで……よろしければ先生に、この事件の犯人を探してもらえないかなと思いまして。"
10015005-97 = "[s5] \"それは構わないけど……。\"\n[s6] \"他は手伝わなくて大丈夫？\""
10015005-100 = "ええ、それは大丈夫です。"
10015005-101 = "大運動会の準備は、計画に沿ってほぼ完璧に進んでいますから！"
10015005-102 = "もちろん、多少の遅れは生じていますが……#nまだ誤差の範囲内です！"
10015005-103 = "応援ロボットの修理を300分以内に済ませれば、#nギリギリ実行委員会の事務所に行く時間は確保できるから……"
10015005-104 = "新たに追加された修理費用を算出して、選手リストを整理して関連校に発送すれば、いくら遅くても開会式が始まる1850秒前までには準備を終えられる計算に……"
10015005-105 = "[s] （全然大丈夫ではなさそうだけど……）"
10015005-111 = "ユウカちゃん、紅茶を持ってきました。"
10015005-112 = "……ど、どうして急に？"
10015005-113 = "ユウカちゃん、徹夜作業をする時はいつもこのくらいの時間に何かしら飲んでいるじゃないですか。"
10015005-114 = "今日も必要かなと思って、先に準備しておきました。"
10015005-115 = "それはそうだけど……ノアが急に優しくなると怖いわね。"
10015005-116 = "……でもありがとう、頂くわ。"
10015005-124 = "……あれ？なんか味が変だけど……これ、普通の紅茶？"
10015005-125 = "カフェインで気が引き締まるどころか、何だか一気に体が怠くなっていくような……"
10015005-135 = "……やっぱり。"
10015005-136 = "ユウカちゃんに今必要なのは、完璧な計算ではなく休息だったということですね。"
10015005-137 = "[s] \"な、何を飲ませたの！？\""
10015005-138 = "心配しなくても大丈夫です。#n先ほどユウカちゃんに淹れたのは、ただのハーブティーですから。"
10015005-139 = "このハーブティーには緊張をほぐし、熟睡を助ける効果があります。"
10015005-140 = "まさか、緊張が解けるや否や気絶してしまうとは……"
10015005-141 = "ユウカちゃん、ずいぶんと無理をしていたようですね。"
10015005-142 = "[s] \"それじゃあ大運動会の準備は……。\""
10015005-146 = "先生……図々しいお願いだとは承知していますが、お願い致します。"
10015005-147 = "今回の大運動会が無事に開催できるよう、#n私たち「ミレニアム」を手伝っていただけませんか？"
10015005-148 = "[s] \"それは、ユウカのお願いとは別の意味で……？\""
10015005-149 = "ええ。スタジアムで起きた盗難事件の方は、ヴァルキューレ警察学校に任せても構いません。"
10015005-150 = "ユウカちゃんとしては面子の問題で、大運動会の問題を他校には任せられないと思っているようですが……"
10015005-151 = "先ほども申し上げたように「大運動会」はキヴォトスの全生徒で作り上げていく、みんなのお祭りですから。"
10015005-152 = "そして、もちろん「全生徒」にはユウカちゃんも含まれます。"
10015005-153 = "この大運動会を誰よりも楽しみにしてきたユウカちゃんが、無理をしすぎて自分だけお祭りを楽しめなくなるなんて……あまりにも悲しいことですから。"
10015005-154 = "ユウカちゃんの友人として、そんな状況は見ていられません。"
10015005-155 = "[s7] \"それくらいなら。\"\n[s8] \"いくらでも手伝うよ。\""
10015005-158 = "ふふ……ありがとうございます。先生。"
10015005-159 = "それでは、ユウカちゃんが起きる前に……手伝ってくれる生徒を探しましょうか。"
10015005-163 = "#video;10015"
