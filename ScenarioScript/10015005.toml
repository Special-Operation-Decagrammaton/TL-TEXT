[translation]
10015005-1 = "Prólogo; A Véspera do Grande Festival Esportivo"
10015005-5 = "O Grande Festival Esportivo de Kivotos... é um evento baseado no princípio de que \"uma mente sã reside em um corpo são\", com o objetivo de promover o crescimento das alunas através do esporte."
10015005-7 = "Um festival onde as alunas deixam suas armas de lado, competem de forma justa e se esforçam mutuamente, independentemente de suas escolas."
10015005-8 = "Junto com a história da cidade acadêmica, este evento, realizado a cada dois anos por diferentes escolas, tem desempenhado um papel importante na paz de toda Kivotos."
10015005-15 = "Mesmo entre escolas que não se dão bem, era uma regra não escrita de longa data que, durante o período do Grande Festival Esportivo, elas deixariam as armas de lado e suspenderiam as hostilidades, mas..."
10015005-19 = "Desta vez, devido a uma série de incidentes que começaram com o desaparecimento da Presidente do Conselho Estudantil Geral, houve preocupações de que o Grande Festival Esportivo pudesse não acontecer."
10015005-23 = "...No entanto, felizmente, graças à ajuda do Schale e de muitas alunas de várias escolas, o Grande Festival Esportivo desta vez também pôde ser realizado com sucesso."
10015005-28 = "Sendo assim, o Grande Festival Esportivo de Kivotos deste ano será..."
10015005-34 = "Realizado aqui, na Millennium Science School~."
10015005-35 = "[s1] \"Uau!\"\n[s2] \"Parabéns?\""
10015005-38 = "...Primeiro, Sensei. Obrigado por vir até aqui, apesar do pedido repentino."
10015005-39 = "...E Noah, a introdução está muito longa!"
10015005-40 = "Essa explicação excessivamente longa era realmente necessária?"
10015005-41 = "Eu apenas citei o discurso de abertura, sabe?"
10015005-42 = "Se resumirmos o texto de forma estranha, o significado das palavras pode ser distorcido ou perder o brilho."
10015005-43 = "Omitir deliberadamente o conteúdo ao transmitir um relatório não pode ser considerado o cumprimento do dever de uma \"secretária\"."
10015005-44 = "[s] \"...Secretária?\""
10015005-45 = "Falando nisso, é a primeira vez que cumprimento o Sensei."
10015005-46 = "Meu nome é Noah. Sou a secretária do conselho estudantil da Millennium Science School, o \"Seminar\"."
10015005-47 = "Conto com você, Sensei [USERNAME]."
10015005-48 = "[s] \"Digo o mesmo, prazer em conhecê-la.\""
10015005-49 = "Por que você está tão animada hoje...?"
10015005-50 = "De qualquer forma, vamos direto ao ponto."
10015005-51 = "...Por outro lado, Yuuka-chan, você parece estar de mau humor hoje, mais do que o normal."
10015005-52 = "Eu apenas cumprimentei o Sensei do Schale educadamente como um membro do Seminar... Será que fiz algo que desagradou a Yuuka-chan?"
10015005-53 = "Será que o fato de o Sensei ter afeição por mim é um problema para você..."
10015005-58 = "Ah... será que isso é \"ciúme\"?"
10015005-60 = "N-não é nada disso, eu nem estou de mau humor!"
10015005-61 = "Além disso, por que eu teria ciúmes de algo assim!"
10015005-62 = "Ai, vamos continuar logo! O Sensei também está esperando!"
10015005-63 = "Sim, sim. Então, vou retomar a explicação."
10015005-64 = "Como mencionei antes, o Grande Festival Esportivo de Kivotos, também conhecido como \"Kourin Taisai\", é um dos maiores festivais de Kivotos, realizado em um ciclo de dois anos."
10015005-65 = "Por isso, este Grande Festival Esportivo é também uma excelente oportunidade para a escola que o organiza demonstrar sua competência para o mundo exterior."
10015005-67 = "Não é sempre que as alunas de toda Kivotos focam sua atenção em uma única escola..."
10015005-68 = "Se conseguirmos deixar uma boa impressão durante este período, será de grande ajuda para a administração da escola."
10015005-69 = "Desde atrair novos alunos até negociar com fornecedores que nos suprem com materiais necessários..."
10015005-71 = "Como a Millennium Science School é uma escola especializada que possui a tecnologia científica mais avançada de Kivotos, planejávamos exibir nossa tecnologia ao máximo através do Grande Festival Esportivo."
10015005-72 = "Seja um sistema de guia inteligente autônomo que orienta automaticamente a rota ideal, ou alvos com câmeras de ultraprecisão para evitar erros de julgamento durante as competições..."
10015005-73 = "Não é exagero dizer que, nos últimos meses, todos os clubes da Millennium se dedicaram ao máximo por este Grande Festival Esportivo."
10015005-75 = "E hoje, com o Grande Festival Esportivo se aproximando, nós do Seminar planejávamos inspecionar os equipamentos e realizar um ensaio, mas..."
10015005-76 = "[s] \"...Algum problema aconteceu?\""
10015005-77 = "Sim... infelizmente, é isso."
10015005-84 = "Há 12 horas, na sala do \"Departamento de Desenvolvimento de Novos Materiais\", ocorreu... bem, um pequeno acidente de explosão."
10015005-85 = "Com certeza elas misturaram algum material inflamável estranho de novo..."
10015005-86 = "Felizmente não houve feridos, mas o robô de torcida que seria usado no Grande Festival Esportivo foi danificado e precisa de reparos urgentes."
10015005-88 = "Além disso, como se tivessem combinado, começaram a chegar várias denúncias de que equipamentos foram roubados no estádio e que algumas instalações foram destruídas..."
10015005-89 = "[s3] \"Isso é... terrível.\"\n[s4] \"Então, será que o evento será adiado...?\""
10015005-92 = "Não. Embora tenha havido um pequeno impacto no cronograma do ensaio, não chegará ao ponto de adiar o evento."
10015005-93 = "A aquisição dos equipamentos para consertar o robô não é algo tão difícil."
10015005-94 = "No entanto, o caso de roubo continua sem solução. Se possível, gostaríamos de procurar o culpado enquanto os vestígios ainda estão frescos..."
10015005-95 = "O Seminário está ocupado com a Grande Competição Esportiva, então não temos tempo para investigar incidentes."
10015005-96 = "Por isso... se não for incômodo, pensei em pedir ao Sensei para encontrar o culpado deste incidente."
10015005-97 = "[s5] \"Por mim tudo bem, mas...\"\n[s6] \"Não precisa de ajuda com o resto?\""
10015005-100 = "Sim, isso está tudo bem."
10015005-101 = "Os preparativos para a Grande Competição Esportiva estão seguindo o plano quase perfeitamente!"
10015005-102 = "Claro, houve alguns atrasos, mas... #nainda está dentro da margem de erro!"
10015005-103 = "Se eu terminar o conserto dos robôs de torcida em 300 minutos, #nainda consigo garantir tempo para ir ao escritório do comitê executivo..."
10015005-104 = "Se eu calcular os custos de reparo recém-adicionados, organizar a lista de atletas e enviar para as escolas relacionadas, calculo que conseguirei terminar os preparativos pelo menos 1850 segundos antes da cerimônia de abertura..."
10015005-105 = "[s] （Não parece nada bem, na verdade...）"
10015005-111 = "Yuuka-chan, trouxe chá para você."
10015005-112 = "……Po-por que de repente?"
10015005-113 = "Yuuka-chan, você sempre bebe algo a essa hora quando trabalha a noite toda, não é?"
10015005-114 = "Pensei que precisaria hoje também, então preparei com antecedência."
10015005-115 = "É verdade, mas... é assustador quando a Noa é gentil do nada."
10015005-116 = "……Mas obrigada, vou aceitar."
10015005-124 = "……Ué? O gosto está estranho... isso é chá comum?"
10015005-125 = "Em vez de ficar alerta com a cafeína, sinto meu corpo ficando pesado de repente..."
10015005-135 = "……Como eu pensei."
10015005-136 = "O que a Yuuka-chan precisa agora não é de cálculos perfeitos, mas de descanso."
10015005-137 = "[s] \"O-o que você deu para ela beber!?\""
10015005-138 = "Não precisa se preocupar. #nO que acabei de servir para a Yuuka-chan é apenas um chá de ervas."
10015005-139 = "Este chá de ervas tem o efeito de relaxar a tensão e ajudar a ter um sono profundo."
10015005-140 = "Quem diria que ela desmaiaria assim que a tensão passasse..."
10015005-141 = "A Yuuka-chan estava se esforçando demais, pelo visto."
10015005-142 = "[s] \"Então, e os preparativos para a Grande Competição Esportiva...\""
10015005-146 = "Sensei... sei que é um pedido abusivo, mas por favor, ajude-nos."
10015005-147 = "Para que a Grande Competição Esportiva deste ano ocorra sem problemas, #npoderia nos ajudar, a \"Millennium\"?"
10015005-148 = "[s] \"Isso é, de uma forma diferente do pedido da Yuuka...?\""
10015005-149 = "Sim. Quanto ao caso de roubo no estádio, podemos deixar com a Escola de Polícia Valkyrie."
10015005-150 = "A Yuuka-chan parece achar que, por uma questão de honra, não pode deixar os problemas da Grande Competição Esportiva para outras escolas..."
10015005-151 = "Mas, como eu disse antes, a \"Grande Competição Esportiva\" é um festival de todos, construído por todos os alunos de Kivotos."
10015005-152 = "E, claro, \"todos os alunos\" inclui a Yuuka-chan."
10015005-153 = "Seria muito triste se a Yuuka-chan, que esperava por esta Grande Competição Esportiva mais do que ninguém, se esforçasse tanto a ponto de não conseguir aproveitar o festival."
10015005-154 = "Como amiga da Yuuka-chan, não posso ficar parada vendo essa situação."
10015005-155 = "[s7] \"Se for só isso.\"\n[s8] \"Vou ajudar no que for preciso.\""
10015005-158 = "Fufu... obrigada, Sensei."
10015005-159 = "Então, antes que a Yuuka-chan acorde... vamos procurar alunos que possam ajudar?"
10015005-163 = "#video;10015"
