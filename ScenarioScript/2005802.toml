[translation]
2005802-1 = "エリカとショッピング"
2005802-2 = "（事務用品を買うために地下商店街へ訪れたところ……）"
2005802-5 = "やっほ～#n先生。"
2005802-6 = "[s1] \"こんにちは、エリカ。\"\n[s2] \"何してたの？\""
2005802-9 = "この辺ってバラエティショップが多くてさ。"
2005802-10 = "何かないかな?って見にきたの。"
2005802-11 = "通販で探したり、流行ってるヤツのポップアップストアとかもあるけど……。"
2005802-12 = "あんまり好きじゃないんだよね。"
2005802-13 = "それに、こうやってウィンドウショッピングしてると、#n意外とドストライクなものが見つかったりもするからさ。"
2005802-14 = "先生も分かる？#nこう、ビビッてくるというか。"
2005802-15 = "[s3] \"そういうのあるよね。\"\n[s4] \"めっちゃ分かる。\""
2005802-18 = "あと、限定品とかも見つかったり。"
2005802-19 = "ラッキーって気持ちになるから好きなんだよね。#nこうやってぶらぶらするの。"
2005802-20 = "こうして先生と会えたのもその一つだし？"
2005802-21 = "[s] \"せっかくだし一緒に見て回る？\""
2005802-22 = "あ、いいの？"
2005802-23 = "やったー！#nでも、先生が興味ありそうなものじゃないかもよ？"
2005802-24 = "私の好みが気になる……？"
2005802-25 = "まあ、それなら仕方ないね。#nふふっ、嬉しい。"
2005802-29 = "んじゃ、こっち。#n行こっか。"
2005802-31 = "（エリカとウィンドウショッピングを楽しんだ）"
2005802-38 = "ねえねえ先生。#nこれとかどう思う？"
2005802-39 = "[s] \"ヒョウ……のストラップ？"
2005802-40 = "そう！レオパード柄のグッズってあんまないんだよね。ラッキー♪"
2005802-41 = "[s] \"そういえばエリカの銃も同じ柄だったよね？\""
2005802-42 = "あははっ、覚えててくれたんだ。#n割とよく選びがちなんだよね。"
2005802-43 = "理由……？"
2005802-44 = "あー……うーん……。"
2005802-45 = "なんだろね……個性的、だからかな？"
2005802-46 = "なんとなく、ほら。レオパード柄って自由な感じするじゃん？"
2005802-47 = "だからなんとなく好きで。あははっ。"
2005802-48 = "[s5] \"個性は大事だからね。\"\n[s6] \"自分の好きなものを見つけていく過程も。\""
2005802-51 = "……。"
2005802-52 = "おー、なんか今の、先生っぽかったね。"
2005802-53 = "自分が好きなものを見つけていく、かぁ……。"
2005802-54 = "意外とそういうのって難しいよね。#n私、コレ！って人に言える好み、あんまりないんだよね。"
2005802-55 = "「自分はこういう人」、「自分の好みはこれ」ってハッキリ言える人のこと、すごいって思うもん。"
2005802-56 = "私はあんまりハッキリしていないっていうか……好き嫌いが無いというか……。"
2005802-57 = "まあでも、逆にいい所もあるかも？好きになろうとしたら好きになれるし。#n少しずつ慣れていくって感じ？"
2005802-58 = "よし、これ買ってくるね！"
2005802-59 = "[ns] \"せっかくだし、プレゼントするね。\""
2005802-62 = "そんなのいいよ！別に先生に出してもらうほどのものじゃないし！"
2005802-63 = "これくらい自分で買えるし！"
2005802-64 = "せっかく外で会えたのに、変に気を遣わなくていいから。"
2005802-65 = "先生はそういうつもりじゃないにしても……#nまぁいいや。とにかく、私にはそういうのしなくていいから！"
2005802-66 = "気持ちだけは受け取っとくね。#n今日はありがとう、一緒にウィンドウショッピングしてくれて。"
