[translation]#[Não revisado] - Filipe 09/06/26
2005802-1 = "Erika e as compras"
2005802-2 = "(Foi a uma galeria subterrânea comprar material de escritório...)"
2005802-5 = "Oiii~ professor."
2005802-6 = "[s1] \"Olá, Erika.\"\n[s2] \"O que estava fazendo?\""
2005802-9 = "Aqui tem muitas lojas variadas, né."
2005802-10 = "Vim ver se encontrava alguma coisa."
2005802-11 = "Também tem como pesquisar online, ou lojas pop-up de coisas da moda..."
2005802-12 = "Não gosto muito."
2005802-13 = "E também, quando fico olhando vitrines assim, acabo encontrando coisas que batem direto com o meu gosto."
2005802-14 = "Você entende, professor? Aquela coisa de 'falar comigo'."
2005802-15 = "[s3] \"Isso acontece.\"\n[s4] \"Entendo completamente.\""
2005802-18 = "Ah, às vezes acho itens limitados também."
2005802-19 = "Me sinto com sorte, por isso gosto. De ficar andando assim."
2005802-20 = "Te encontrar também faz parte da sorte, né?"
2005802-21 = "[s] \"Já que estamos aqui, quer dar uma volta comigo?\""
2005802-22 = "Ah, pode?"
2005802-23 = "Oba! Mas não sei se você vai se interessar..."
2005802-24 = "Quer saber do meu gosto?"
2005802-25 = "Bem, se é assim, tudo bem. Fufu, que bom."
2005802-29 = "Então, vamos por aqui."
2005802-31 = "(Aproveitou o tempo fazendo vitrines com Erika)"
2005802-38 = "Ei, professor. O que você acha disso?"
2005802-39 = "[s] \"Uma pulseira... de leopardo?\""
2005802-40 = "Isso! Não tem quase nada com estampa de leopardo por aqui, que sorte♪"
2005802-41 = "[s] \"A sua arma também tem essa estampa, né?\""
2005802-42 = "Ahaha, você lembrou. É que eu acabo escolhendo sempre essa estampa."
2005802-43 = "Motivo?"
2005802-44 = "Ah... hmm..."
2005802-45 = "Sei lá, acho que é por ser peculiar?"
2005802-46 = "De repente, sabe? A estampa de leopardo passa uma sensação de liberdade."
2005802-47 = "Por isso eu gosto. Ahaha."
2005802-48 = "[s5] \"A individualidade é importante.\"\n[s6] \"O processo de encontrar o que a gente gosta também.\""
2005802-51 = "..."
2005802-52 = "Uau, essa foi bem de professor."
2005802-53 = "Encontrar o que a gente gosta, hein..."
2005802-54 = "É mais difícil do que parece, né. Eu não consigo definir com clareza o que eu gosto."
2005802-55 = "Admiro quem consegue dizer 'eu sou assim' ou 'meu gosto é isso'."
2005802-56 = "Eu não sou tão definida... não tenho muitas preferências..."
2005802-57 = "Mas isso tem seu lado bom também? Consigo gostar do que me propuserem... É mais uma questão de me acostumar?"
2005802-58 = "Certo, vou comprar isso!"
2005802-59 = "[ns] \"Já que é assim, vou te dar de presente.\""
2005802-62 = "Não precisa! Não é uma coisa cara para você pagar!"
2005802-63 = "Eu mesma posso comprar!"
2005802-64 = "Nós nos encontramos por acaso, não precisa se preocupar."
2005802-65 = "Sei que não é maldade... enfim, não precisa fazer isso por mim!"
2005802-66 = "Fico com a intenção. Obrigada pela companhia."