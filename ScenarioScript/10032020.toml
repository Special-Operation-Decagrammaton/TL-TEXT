[translation]
10032020-1 = "Episódio 2: Mais Hard-boiled"
10032020-2 = "……Você quer que a gente sequestre o 'Don Arancino', o chefão da união de gangues……?"
10032020-4 = "Sim, exatamente."
10032020-5 = "Você precisa explicar isso direito. #nDizendo que você mesmo é um membro da 'Família Arancino'……"
10032020-6 = "E quer que a gente sequestre o seu próprio chefe…… não faz sentido nenhum."
10032020-7 = "É natural que não entenda."
10032020-8 = "Mas isso também é pelo bem da organização."
10032020-9 = "……O chefe está fora de controle. Se continuar assim, a organização chegará ao fim."
10032020-13 = "Ou seja, você quer que a gente pare o chefe antes disso? #nEssa é uma operação de grande escala, você tem noção disso, né?"
10032020-14 = "……Com certeza. Imagino que o perigo e a dificuldade sejam consideráveis. #nMas fique tranquila, preparei uma quantia condizente."
10032020-15 = "Não é apenas uma questão de dinheiro……"
10032020-17 = "Sem problemas! Nesse caso, nós da Soluções 68 somos as pessoas certas para o trabalho."
10032020-19 = "……Presidente!?"
10032020-20 = "……!?"
10032020-25 = "Se é um trabalho perigoso, não é algo bem hard-boiled?"
10032020-26 = "Fufufu…… é o trabalho perfeito para nós. #nPode deixar esse pedido com a gente."
10032020-28 = "Kufufu. A Aru-chan está super empolgada~"
10032020-29 = "……."
10032020-30 = "……Haa."
10032020-34 = "Haha, não esperava que aceitassem tão prontamente……"
10032020-35 = "Essa postura de não hesitar nem por um segundo, os rumores parecem ser verdadeiros…… Soluções 68."
10032020-36 = "Se tudo correr bem, pagarei quatro vezes o valor do adiantamento."
10032020-37 = "……Posso esperar por isso, não posso?"
10032020-38 = "……Está duvidando? Da nossa competência?"
10032020-39 = "De jeito nenhum. Peço desculpas se a ofendi…… é um vício meu. #nDepois de tanto tempo no submundo, a gente acaba ficando cauteloso."
10032020-40 = "……Don Arancino é cauteloso e sempre arma várias camadas de planos. #nPor favor, tomem muito cuidado."
10032020-41 = "Fufufu……"
10032020-42 = "Basta superarmos todos os planos dele, não é?"
10032020-43 = "Fico feliz em ouvir isso. Então, assim que as datas forem definidas, compartilharei as informações detalhadas."
10032020-44 = "Prepararei a planta do prédio e a lista de participantes."
10032020-45 = "……Então, entrarei em contato novamente."
10032020-53 = "……Ei, presidente?"
10032020-54 = "Ah, Aru-sama……?"
10032020-55 = "……O que foi, pessoal?"
10032020-56 = "Só por precaução…… vocês sabem que tipo de gente é a 'Família Arancino'?"
10032020-57 = "……Be-bem? Pelo nome, são gângsteres, né?"
10032020-58 = "B-bom…… isso está correto, mas……"
10032020-65 = "……!?"
10032020-67 = "O-o-o-o-o quêêêêêê!!!???"
10032020-69 = "S-s-sério!? O topo da união…… não eram apenas gângsteres comuns!?"
10032020-70 = "D-digo…… como uma organização tão gigante descobriu onde fica nosso escritório……!?"
10032020-71 = "……A gente nem esconde, afinal, até colocamos anúncios."
10032020-72 = "Mais importante, é um pouco surpreendente. #nA presidente encontrar pessoas do submundo é algo comum, mas……"
10032020-73 = "Aru-chan…… será que você ficou com medo?"
10032020-77 = "E-eu não estou com medo! E-eu só fiquei um pouco tensa! #nAlém disso, sendo uma organização gigante, a recompensa deve ser enorme!"
10032020-78 = "O conteúdo do pedido também é hard-boiled, então com isso……!"
10032020-79 = "Kufufu. A Aru-chan reagiu exatamente como eu esperava, que divertido~"
10032020-80 = "……Tem certeza mesmo?"
10032020-81 = "Eu sei que não deveria falar isso, mas…… acho que esse pedido vai ser bem difícil."
10032020-82 = "É justamente por ser difícil que vamos aceitar! #nNão dá para ficar aceitando pedidos de procurar gatos ou lidar com delinquentes de rua para sempre!"
10032020-88 = "Hm? Eu não me importo de procurar gatos, mas..."
10032020-89 = "E-eu também...! Se for com a Aru-sama, não me importo nem de dormir ao relento...!!"
10032020-91 = "Aaaaaah! Não traga esse assunto à tona!!\nAlém disso, dormir ao relento não aconteceu tantas vezes assim!"
10032020-92 = "De qualquer forma, essa é a chance perfeita para espalhar o nome da nossa Problem Solver 68!"
10032020-93 = "Pessoal, escutem bem. Vamos completar esse trabalho a qualquer custo!"
10032020-94 = "E assim, vamos fazer nosso nome no submundo... e nos tornar vilãs implacáveis e duronas!"
10032020-101 = "Mais, mais...!"
10032020-111 = "Ainda mais duronas...!!"
10032020-115 = "...E é isso que aconteceu até agora."
10032020-117 = "Então, primeiro revistamos a casa de ópera e derrotamos os capangas do chefe!"
10032020-118 = "Eu também dei uma investigada, e... parece que aquela história é verdade."
10032020-119 = "É um fato que o chefe da aliança de gangues está tramando algo maligno para expandir seu poder..."
10032020-120 = "Então, de certa forma, acho que podemos dizer que é para o bem de todos."
10032020-121 = "Bem, não vou negar que é uma desculpa, mas não estamos nos envolvendo em maldades como você pensa, Sensei."
10032020-128 = "...Ah!"
10032020-129 = "I-isso de ser para o bem de todos não tem nada a ver! Foi coincidência!\nNós só aceitamos o dinheiro e fazemos o trabalho, só isso!"
10032020-131 = "E-exatamente! Isso foi decidido pela Aru-sama!"
10032020-132 = "...Haa."
10032020-136 = "[ns1] \"Um trabalho para sequestrar o chefe da gangue...\"\n[ns2] \"Realmente, este trabalho é bem 'durão'.\""
10032020-140 = "Fufufu... Você também acha isso, não é, Sensei?"
10032020-141 = "Finalmente chegou um trabalho digno da Problem Solver 68!\nPor isso, preparamos até trajes especiais para todas."
10032020-142 = "Claro, eu sinto muito por não ter contado ao Sensei com antecedência..."
10032020-143 = "Mas Sensei... por favor, deixe-nos continuar com o trabalho."
10032020-144 = "...Eh? Você realmente permite?"
10032020-145 = "V-você tem certeza que vai nos perdoar tão facilmente?"
10032020-151 = "Por que você está perguntando de volta, presidente?"
10032020-152 = "Ahahahaha!! A Aru-chan está nervosa~"
10032020-158 = "M-mas... sério, é verdade...?"
10032020-159 = "...Por quê?"
10032020-160 = "[s3] \"Porque eu não vim aqui para dar sermão hoje.\"\n[s4] \"Além disso, eu confio em vocês.\""
10032020-163 = "...Sensei."
10032020-167 = "Fufu, fufufu..."
10032020-168 = "Eu sabia que o Sensei entenderia.\nO caminho durão que estamos trilhando..."
10032020-169 = "Como esperado, meu julgamento não estava errado... Fufufu."
10032020-170 = "E pensar que ela estava preocupada até agora~"
10032020-171 = "...Tudo bem. Em troca, nós também precisamos apoiar o Sensei com tudo."
10032020-172 = "A 'investigação da ópera' do Sensei..."
10032020-173 = "Eu, como presidente da Problem Solver 68, assumo a responsabilidade."
10032020-174 = "Ah, claro, até o chefe da gangue aparecer.\nDepois disso, vamos cuidar do nosso trabalho."
10032020-175 = "E quanto a encontrar os caras que estão infiltrados?"
10032020-176 = "Podemos fazer as duas coisas ao mesmo tempo!\nDe qualquer forma, vamos percorrer a casa de ópera do mesmo jeito."
10032020-182 = "Uau~ tipo espiãs?\nEntão, acho que vou me trocar e colocar um vestido também~"
10032020-183 = "V-vestido...? N-não me diga que eu também...?"
10032020-184 = "Ah, não! Não é que eu não goste, mas é que... será que alguém como eu pode usar isso..."
10032020-185 = "M-mas se eu for a única sem vestido, vou acabar me destacando e causando problemas para todas..."
10032020-189 = "V-vou me trocar agora mesmo...!!"
10032020-193 = "Kufufu. Espere só um pouquinho, Sensei!"
10032020-199 = "...Hmm."
10032020-200 = "...Sensei."
10032020-205 = "Pegue isto."
10032020-206 = "[s5] \"……Um walkie-talkie?\"\n[s6] \"Será que eu deveria ajudar também...?\""
10032020-209 = "Ainda bem que trouxe um reserva."
10032020-210 = "Não estou dizendo para nos aliarmos. É só pela sua segurança."
10032020-211 = "Não acho que vá virar um problema, mas... por precaução. Tem muitos gângsteres por aqui."
10032020-215 = "Da minha parte... eu preferiria que o Sensei fosse embora."
10032020-216 = "……Bem, não é como se você fosse me ouvir se eu pedisse, né?"
10032020-217 = "[s7] \"Sim. Não posso simplesmente ir embora e deixar uma aluna para trás.\"\n[s8] \"Estamos preocupados um com o outro, não é?\""
10032020-220 = "Haa……"
10032020-221 = "……Eu sei. É justamente por isso que decidi te entregar isso."
10032020-226 = "Tome cuidado, Sensei. Ainda não aconteceu nada, mas……"
10032020-227 = "Se você baixar a guarda em momentos como este, coisas ruins acabam acontecendo."
10032020-228 = "……Se eu tenho algum palpite sobre o que pode acontecer?"
10032020-229 = "Não, por enquanto nada em específico. Se tivesse, eu teria te mandado embora sem nem perguntar."
10032020-230 = "Isso é, como posso dizer, fruto da minha experiência até agora…… eu acho."
10032020-235 = "……Bem, é só um palpite, na verdade."
