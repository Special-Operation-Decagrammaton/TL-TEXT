[translation]
10032020-1 = "第2話;よりハードボイルドに"
10032020-2 = "……ギャング連合のトップ「ドン・アランチーノ」をさらってほしい……？"
10032020-4 = "ああ、その通りだ。"
10032020-5 = "しっかり説明してくれないと。#n自ら「アランチーノ・ファミリー」の一員だと言っておきながら……"
10032020-6 = "自分たちのボスをさらってほしいなんて……納得いかないね。"
10032020-7 = "理解できないのも当然だな。"
10032020-8 = "けど、これも組織のため。"
10032020-9 = "……ボスは暴走している。このままでは、組織が終りを迎えてしまう。"
10032020-13 = "つまり、その前にボスを止めてほしいってこと？#n結構な規模の作戦になるけど、そっちも分かってるよね？"
10032020-14 = "……もちろんだ。危険性も難易度も相当だとは思う。#nだが安心してほしい、相応の額は用意している。"
10032020-15 = "単に、お金の問題じゃ……"
10032020-17 = "問題ないわ！それなら、我々便利屋68が適任ね。"
10032020-19 = "……社長！？"
10032020-20 = "……！？"
10032020-25 = "危険な依頼ってことは、ハードボイルドじゃない？"
10032020-26 = "ふふふ……うちにピッタリな仕事ね。#nその依頼、私たちに任せてちょうだい。"
10032020-28 = "くふふ。アルちゃん、テンション上がってるね～"
10032020-29 = "……。"
10032020-30 = "……はぁ。"
10032020-34 = "ははっ、ここまで快く引き受けてくれるとは……"
10032020-35 = "一瞬も躊躇わないその姿勢、噂は本当のようだな……便利屋68。"
10032020-36 = "この件がうまくいったら、前金の4倍を支払おう。"
10032020-37 = "……期待していいんだろうな？"
10032020-38 = "……疑っているのかしら？私たちの実力を。"
10032020-39 = "まさか。気を悪くしたのなら悪かった……私の悪癖でな。#n組織に身を置いてから長いと、つい用心深くなるものだ。"
10032020-40 = "……ドン・アランチーノは用心深く、何重にも策を弄するのが常。#nくれぐれも気をつけてくれ。"
10032020-41 = "ふふふ……"
10032020-42 = "全ての策を上回れば良いだけでしょう？"
10032020-43 = "それを聞けて良かった。では、日程が決まったら詳細な情報を共有しよう。"
10032020-44 = "建物の間取りや参加者のリストも全て準備しておく。"
10032020-45 = "……では、また連絡する。"
10032020-53 = "……あの、社長？"
10032020-54 = "あ、アル様……？"
10032020-55 = "……どうしたのよ、みんな。"
10032020-56 = "念のため聞くけど……「アランチーノ・ファミリー」って、どういう連中か知ってる？"
10032020-57 = "……さ、さあ？名前からしてギャングよね？"
10032020-58 = "ま、まあ……合ってはいるけど……"
10032020-65 = "……！？"
10032020-67 = "なななな、なっ、何ですってーーーーーー！！！？？？"
10032020-69 = "ほ、ほ、本当！？れ、連合のトップだなんて……ただのギャングじゃなくて！？"
10032020-70 = "と、というか……どうしてそんな巨大組織が私たちの事務所の位置を……！？"
10032020-71 = "……そもそも隠してないでしょ、広告まで出してるんだし。"
10032020-72 = "それより、ちょっと意外だね。#n社長が裏世界の人と会うのは、よくあることなのに……"
10032020-73 = "アルちゃん……もしかして怖気づいちゃった？"
10032020-77 = "お、怖気づいてなんかいないわよ！ち、ちょっと緊張しただけ！#nそれに巨大組織ってことは、報酬がたんまり入ってくるに違いないわ！"
10032020-78 = "依頼の内容もハードボイルドだし、これなら……！"
10032020-79 = "くふふ。アルちゃん、ほんと思った通りの反応で面白い～"
10032020-80 = "……本当にいいの？"
10032020-81 = "私が言うのもアレだけど……今回の依頼、結構大変だと思うよ。"
10032020-82 = "大変だからこそ、請けるに決まってるでしょう！#n猫探しや街の不良を相手にする依頼なんて、いつまでもやってらんないのよ！"
10032020-88 = "ん？私は別に猫探しでもいいけど？"
10032020-89 = "わ、私も……！アル様と一緒なら、野宿したって構いません……！！"
10032020-91 = "わあああっ！その話は持ち出さないで！！#nそれに野宿なんて滅多に無かったじゃない！"
10032020-92 = "とにかく、これは我々便利屋68の名を知らしめる絶好のチャンスなの！"
10032020-93 = "みんな、よく聞きなさい。この依頼、絶対に成功させるわよ！"
10032020-94 = "そうして裏世界で名を轟かせ……極悪非道のハードボイルドになるのよ！"
10032020-101 = "もっと、もっと……！"
10032020-111 = "よりハードボイルドに……！！"
10032020-115 = "……ていうのが、今までの話。"
10032020-117 = "それで、まずオペラハウスの中を捜索して、ボスの取り巻きを倒してたところ！"
10032020-118 = "私も一応調べてみたけど……あの話は本当みたい。"
10032020-119 = "ギャング連合のボスが勢力を伸ばすために、悪巧みを目論んでいるのは事実だし……"
10032020-120 = "だからこれはある意味、みんなのためって言っていいと思う。"
10032020-121 = "まあ、言い訳なのは否定しないけど、先生が思うような悪事に手を染めてるわけじゃないから。"
10032020-128 = "……はっ！"
10032020-129 = "み、みんなのためになるとか、そんなの関係ないわ！偶然よ！#n私たちは、ただお金を受け取って仕事をする、それだけ！"
10032020-131 = "そ、その通りです！これはアル様が決定したことなんです！"
10032020-132 = "……はぁ。"
10032020-136 = "[ns1] \"ギャングのボスをさらう仕事……\"\n[ns2] \"たしかに、今回の依頼は「ハードボイルド」だね。\""
10032020-140 = "ふふふ……やっぱり、先生もそう思うわよね？"
10032020-141 = "ついに我々便利屋68に相応しい仕事が来たのよ！#nだからこうして、みんなで特別な衣装まで用意したわけ。"
10032020-142 = "もちろん、あらかじめ先生に言ってなかったのは……悪いと思ってるわ。"
10032020-143 = "でも先生……どうか、このまま依頼を続けさせてほしい。"
10032020-144 = "……え？本当にいいの？"
10032020-145 = "そ、そんなあっさり許しちゃって大丈夫？"
10032020-151 = "社長が聞き返してどうするのよ。"
10032020-152 = "あはははは！！アルちゃんテンパってる～"
10032020-158 = "で、でも……ええ、本当に……？"
10032020-159 = "……どうして？"
10032020-160 = "[s3] \"今日は指導するために来たわけじゃないからね。\"\n[s4] \"それに、みんなのことは信じてるから。\""
10032020-163 = "……先生。"
10032020-167 = "ふふ、ふふふ……"
10032020-168 = "先生なら分かってくれると思ったわ。#n私たちが歩む、ハードボイルドの道を……"
10032020-169 = "やはり、私の目に狂いは無かったわけね……ふふふっ。"
10032020-170 = "さっきまで不安がってたのにね～"
10032020-171 = "……いいわ。その代わり、私たちも先生を全力でサポートしなくちゃね。"
10032020-172 = "先生の「オペラ調査」……"
10032020-173 = "この便利屋68の社長が、責任を持って引き受けたわ。"
10032020-174 = "あ、もちろんギャングのボスが姿を現すまでね。#nその後は、仕事にかからせてもらうわ。"
10032020-175 = "じゃあ、潜入してる奴らを捜し出すのは？"
10032020-176 = "同時に行なえばいいのよ！#nどの道、オペラハウスを回るのは同じなんだし。"
10032020-182 = "へえ～スパイみたいな？#nじゃあ、私もまたドレスに着替えちゃおうかな～"
10032020-183 = "ど、ドレス……？ま、まさか私もですか……？"
10032020-184 = "あ、いえ！決して嫌ってわけじゃありませんが、その……私なんかが着てもいいのか……"
10032020-185 = "で、でも私だけドレスを着ずに浮いたら、みんなに迷惑を……"
10032020-189 = "す、すぐ着替えてきます……！！"
10032020-193 = "くふふ。ちょ～っと待っててね、先生！"
10032020-199 = "……うーん。"
10032020-200 = "……先生。"
10032020-205 = "これ、受け取って。"
10032020-206 = "[s5] \"……トランシーバー？\"\n[s6] \"やっぱり私も手伝った方がいいのかな……？\""
10032020-209 = "予備を持ってきておいて良かった。"
10032020-210 = "別にグルになれって言いたいわけじゃないよ。ただ、身の安全のため。"
10032020-211 = "大事になるとは思わないけど……一応ね。ギャングもいっぱい居るし。"
10032020-215 = "私としては……先生に帰ってもらいたいところだけど。"
10032020-216 = "……まあ、そう言ったところで聞かないよね。"
10032020-217 = "[s7] \"うん。生徒を残して帰るわけにはいかないから。\"\n[s8] \"心配してるのは、お互い様だね。\""
10032020-220 = "はぁ……"
10032020-221 = "……分かってる。だからこそ、渡しておこうと思ったの。"
10032020-226 = "気を付けて、先生。まだ何も起きてないけど……"
10032020-227 = "こういう時に油断してると、良くないことが起きるんだから。"
10032020-228 = "……何か心当たりはあるかって？"
10032020-229 = "いや、今のところは特に。あったら有無を言わさず帰ってもらってた。"
10032020-230 = "これは何というか、今までの経験によるもの……かな。"
10032020-235 = "……まあ、勘みたいなものね。"
