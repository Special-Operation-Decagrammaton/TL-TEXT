[translation]
80000044-1 = "Gamer que não desiste"
80000044-2 = "（Por algum motivo, um torneio de jogos de luta estava sendo realizado no fliperama para comemorar o Dia dos Namorados）"
80000044-9 = "Meu único objetivo é vencer! Vou subir de nível rapidinho e garantir o troféu de chocolate que é o prêmio!"
80000044-10 = "Fique de olho na minha performance, Sensei!"
80000044-11 = "E assim, a história de sucesso de Saiba Momoi começou!"
80000044-12 = "Lá vou eu!"
80000044-20 = "Waaaaah! Não acredito que fui eliminada na primeira rodada!?"
80000044-22 = "（E assim, eu estava consolando a Momoi, que foi eliminada do torneio logo de cara）"
80000044-23 = "Aquele combo de apelação é trapaça!"
80000044-24 = "Ficar spamando chute fraco no canto da tela, não tem vergonha não!?"
80000044-25 = "Só porque não é proibido oficialmente, não significa que pode!"
80000044-26 = "O confronto direto e a leitura de jogo não são o que fazem a alma de um gamer arder de verdade!?"
80000044-27 = "[s] \"Com certeza, a Momoi tentando dar um golpe especial arriscado foi muito legal.\""
80000044-28 = "Viu só!?"
80000044-29 = "Mesmo com a defesa vulnerável, se me derem uma abertura daquelas, só me resta usar o Angry Arts!"
80000044-30 = "[s] \"Então, aquela abertura também foi calculada...\""
80000044-31 = "Waaaaaaah!"
80000044-32 = "Ugh... o troféu..."
80000044-33 = "[s] \"Você queria muito ele, né...\""
80000044-34 = "É que, já que era um torneio de Dia dos Namorados..."
80000044-35 = "Eu ia levantar o troféu de chocolate junto com o chocolate de prêmio lá no alto do pódio, como prova da minha vitória, e..."
80000044-36 = "Meu plano perfeito era te dar de presente de um jeito bem descolado, Sensei...!"
80000044-37 = "[s] \"Plano...?\""
80000044-38 = "Ah, esquece! Esquece o que eu disse!"
80000044-39 = "Ugh, hoje eu só cometo erros..."
80000044-40 = "[s] \"Só o seu sentimento já me deixa feliz, Momoi.\""
80000044-41 = "Lá vem o golpe especial do Sensei! Eu sabia que você ia usar, mas...!"
80000044-42 = "Isso é injusto, não dá nem pra defender! Que maturidade de adulto é essa!?"
80000044-46 = "E-eu não posso simplesmente desistir assim..."
80000044-52 = "Ah, a máquina de garra... aquela que dá pra pegar doces..."
80000044-53 = "Tive uma ideia! Espera um pouco, Sensei!"
80000044-57 = "[ns] \"Momoi?\""
80000044-62 = "Pronto, Sensei! Toma!"
80000044-64 = "[s] \"Isso é um chocolate com brinquedo?\""
80000044-65 = "Sim, isso mesmo!"
80000044-66 = "É um chocolate que vem com a figura do mascote de \"Punho de Cassiopeia\", o jogo de luta que estava rolando hoje!"
80000044-67 = "É algo que quem conhece, conhece, ou melhor, acho que quase todo mundo conhece,"
80000044-68 = "o termo técnico é \"shokugan\"!"
80000044-69 = "[s1] \"Isso é um termo técnico...?\"\n[s2] \"Por que isso...?\""
80000044-70 = "É que, originalmente, eu ia te dar o troféu e o chocolate..."
80000044-71 = "É que, originalmente, eu ia te dar o troféu e o chocolate..."
80000044-72 = "Mas eu falhei, e não podia desistir assim..."
80000044-73 = "Então, por enquanto, toma isso que eu ganhei com o meu próprio esforço!"
80000044-74 = "É tipo, me perdoa por agora... ou de certa forma, é quase a mesma coisa..."
80000044-75 = "Hehehe..."
80000044-76 = "......D-desculpa. Acho que estou falando besteira, esquece o que eu disse..."
80000044-77 = "[s3] \"Você recebeu o importante chocolate da Momoi!\"\n[s4] \"Você recebeu o lendário chocolate da Momoi!\""
80000044-83 = "[ns] \"Obrigado. Vamos comer juntos, Momoi.\""
80000044-84 = "Ah...!"
80000044-88 = "Sim, ainda bem que consegui pegar dois!"
80000044-89 = "Então, vamos usar os brinquedos que saíram para nos enfrentarmos depois! Sensei!"
