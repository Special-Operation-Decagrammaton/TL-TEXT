[translation]
80000044-1 = "諦めないゲーマー"
80000044-2 = "（なぜかバレンタインデーを記念して、ゲームセンターで格ゲー大会が開催されていた）"
80000044-9 = "目標は優勝だけ！すいすい勝ち上がって、絶対に賞品の「チョコレートトロフィー」を手に入れるから！"
80000044-10 = "ちゃんとこの雄姿を見ててね、先生！"
80000044-11 = "そうして才羽モモイの、サクセスストーリーが始まったのだった！"
80000044-12 = "行っくよーーー！"
80000044-20 = "うわぁぁぁぁん！一回戦敗退なんて嘘だぁぁ！？"
80000044-22 = "（そうして大会で即脱落してしまったモモイを慰めていた）"
80000044-23 = "あのハメ技はずるでしょ！！"
80000044-24 = "画面端で小キック連打とか、恥ずかしくないわけ！？"
80000044-25 = "いくら公式に禁止されてないからって、それは無しだよ！"
80000044-26 = "正面衝突とそこからの読み合いこそ、ゲーマー魂が一番燃える戦いじゃないの！？"
80000044-27 = "[s] \"確かに、捨て身で必殺技を出そうとするモモイはカッコよかった。\""
80000044-28 = "でしょ！？"
80000044-29 = "防御力に心配はあれど、あそこまで隙を見せられたらアングリーアーツしかないじゃん！"
80000044-30 = "[s] \"で、その隙も計算された隙だったと……。\""
80000044-31 = "うわああぁぁぁぁん！"
80000044-32 = "うぅ……トロフィーが……。"
80000044-33 = "[s] \"すごく欲しかったんだね……。\""
80000044-34 = "だって、せっかくバレンタインデー記念の大会だったし……。"
80000044-35 = "チョコトロフィーと副賞のチョコレートも一緒に、高い壇の上でこう優勝の証として、バッ！と掲げて……"
80000044-36 = "先生にクールにプレゼントするっていう、私の完璧な作戦が……！"
80000044-37 = "[s] \"作戦……？\""
80000044-38 = "あっ、違う！今のは無し！"
80000044-39 = "ううっ、何か今日ミスしてばっかり……。"
80000044-40 = "[s] \"モモイの気持ちだけでも嬉しいよ。\""
80000044-41 = "出た、先生の必殺技！絶対出すと思ってたけど……！"
80000044-42 = "ガード不能とかズルい！何その大人の余裕！？"
80000044-46 = "こ、このままおとなしく引き下がるわけには……。"
80000044-52 = "あ、クレーンゲーム……お菓子が取れるやつ……。"
80000044-53 = "良いこと思いついた！ちょっと待ってて先生！"
80000044-57 = "[ns] \"モモイ？\""
80000044-62 = "はい、先生！これあげる！"
80000044-64 = "[s] \"これ、おもちゃ付のチョコレート？\""
80000044-65 = "うん、そう！"
80000044-66 = "今日やってた格ゲー「カシオペアの拳」のマスコットキャラ、そのフィギュアが入ってるチョコレートなの！"
80000044-67 = "知る人ぞ知る、というか知らない人とか多分あんまりいない、"
80000044-68 = "専門用語では「食玩」って呼ばれるやつだね！"
80000044-69 = "[s1] \"専門用語、なのかな……？\"\n[s2] \"どうしてこれを……？\""
80000044-70 = "その、元々は先生にトロフィーとチョコをプレゼントするはずだったのに……"
80000044-71 = "その、元々は先生にトロフィーとチョコをプレゼントするはずだったのに……"
80000044-72 = "失敗しちゃったし、でもそれで諦めるわけにはいかないし……"
80000044-73 = "だから取り敢えず、私が自分の力で勝ち取ったこれをプレゼント！"
80000044-74 = "ちょっと今はこれで許してほしいっていうか……ある意味同じ感じっていうか……。"
80000044-75 = "えへへっ……。"
80000044-76 = "……ご、ごめん。自分でも変なこと言ってる気がしてきた、やっぱり無かったことに……。"
80000044-77 = "[s3] \"モモイからの大事なチョコレートを手に入れた！\"\n[s4] \"伝説のモモイのチョコレートを手に入れた！\""
80000044-83 = "[ns] \"ありがとう。一緒に食べよう。モモイ。\""
80000044-84 = "あっ……！"
80000044-88 = "うん、ちょうど二つ取れたところだし！"
80000044-89 = "じゃあ出てきたおもちゃで、この後ふたりで対決しよ！先生！"
