[translation]
2001306-1 = "ブラック＆ホワイト"
2001306-2 = "チヒロのセキュリティ業務を手伝うため、一緒にとある開発会社を訪れていた。"
2001306-3 = "こんにちは、「ヴェリタス」の[ruby=かがみ]各務[/ruby]チヒロです。"
2001306-4 = "サーバーメンテナンスの件でお伺いしました。"
2001306-5 = "やっと来たか、遅いじゃないか……！？"
2001306-6 = "確か、メンテナンスは午後10時とお伺いしましたが……？"
2001306-7 = "それはそうだけど、こっちはこの時間まで君らを待っていたんだよ？"
2001306-8 = "普通そういう時は、顧客のために早く来るのが筋じゃないか？"
2001306-9 = "……失礼いたしました。"
2001306-10 = "これだから、どこの馬の骨とも分からない正体不明のハッカー集団は……。"
2001306-11 = "実力はさておき、ビジネスマナーもなってないのは困る。"
2001306-12 = "ああ、今回の要項はそこの書類に整理して記載してあるからよろしくね。"
2001306-13 = "念のためだけど、我が社のサーバールームには最新の監視システムが搭載されてる。"
2001306-14 = "リアルタイムでログが送られてくるから、何か少しでも怪しい挙動をすればすぐ警告が鳴るようになってる。変な悪戯は遠慮するように。"
2001306-15 = "勿論です、ではすぐに作業に取り掛かります。"
2001306-19 = "[ns] \"……大丈夫？\""
2001306-20 = "大丈夫、失礼なのは今に始まったことじゃないから。客商売だと、本当に色んな相手がいるし。"
2001306-21 = "「ヴェリタス」って名前を聞いただけで、一気に態度を変えられちゃうこともある。"
2001306-22 = "……それについてはまあ、私たちも今まで色々とやってきたから何とも言えないんだけど。"
2001306-23 = "とにかくやっちゃおう、もう夜も長くない。"
2001306-26 = "設定周りは問題無し……"
2001306-27 = "あとは、バックアップ用のデータをコピーして……"
2001306-28 = "……何これ？"
2001306-29 = "[s] \"どうしたの？\""
2001306-30 = "何か、データベースにやたらとデータがたくさん……"
2001306-31 = "これ……アプリをダウンロードした顧客の個人情報？どうやって……？"
2001306-32 = "こっちは、帳簿に記載されてない変な取引記録……。"
2001306-33 = "うーん…………ちょっと失礼。"
2001306-37 = "……やっぱり。配信してるアプリに変なものが仕込んである。これで顧客の情報を集めてた、と。"
2001306-38 = "その情報を保険会社に売って、変な稼ぎ方をしてるわけか……分かりやすい手口。"
2001306-39 = "[s1] \"それ、犯罪じゃ……？\"\n[s2] \"……警察に通報しようか。\""
2001306-40 = "犯罪ではあるけど……これを通報するかどうかはまた別の問題。"
2001306-41 = "犯罪ではあるけど……これを通報するかどうかはまた別の問題。"
2001306-42 = "セキュリティ担当者がクライアントの許可無しに、勝手にサーバーを開けてデータを得る……これもまた違法行為。警察に連絡したところで、ちゃんとした証拠としてはきっと受理されない。"
2001306-43 = "それにヴェリタスが顧客の情報を漏洩したなんて噂が広がったら、うちの子たちも困る。"
2001306-44 = "たとえ「正義感から出た行動」だって理解してもらったとしても、私たちを信じて仕事を任せる会社も大きく減るはず。"
2001306-45 = "[s] \"じゃあ……。\""
2001306-46 = "参ったね。"
2001306-47 = "本当に、参っちゃうな……。"
2001306-48 = "…………。"
2001306-51 = "（次の日の朝……）"
2001306-52 = "「速報です。有名なアプリ開発会社の社長A氏が、自社のアプリケーションコードの中へ、密かにバックドアを埋め込んでいたことが判明。そこからユーザーの個人情報を収集していたとのことです」"
2001306-53 = "「この事実は、匿名のハッカーがネット上でそのコードを公開したことが発端となって明らかとなりました。これによってA氏の会社の株価は大幅に下落し、現在破産の危機とも言われています」"
2001306-54 = "「A氏は現在もこの事実を認めてはいませんが、証拠は明白とされ、否定的な世論を覆すのは至難の業だと――」"
2001306-58 = "[ns] \"………。\""
2001306-59 = "………。"
2001306-60 = "[s3] \"……チヒロ？\"\n[s4] \"もしかしなくても……、\""
2001306-63 = "な、何の話？私は昨日「最先端の監視システム」とやらの下で、サーバーをメンテナンスするのに大変だったわけで。"
2001306-64 = "キヴォトスのどこかに、正義感から行動しちゃった凄腕のハッカーがいるんだろうね。"
2001306-65 = "多分……。"
2001306-69 = "[ns] \"………。\""
2001306-70 = "……ごめん、私。"
2001306-71 = "犯罪を見逃すのも嫌で、ヴェリタスの信用が損なわれるのも避けたい。でも、どうしても頭にきて……これしか手段が思いつかなかった。"
2001306-72 = "本当はこんな不当な手段じゃなくて、ちゃんと自分がやったことの責任は持たなきゃいけなかったのに……ハッカー失格かもしれない。"
2001306-73 = "いつもあの子たちに、ハッカー倫理についてうるさく言ってたのにね。いざとなったら自分がこんな力任せで子供っぽい解決を選んじゃうなんて……。"
2001306-74 = "……先生、幻滅した？それか、怒ってる？"
2001306-75 = "[s] \"……ううん。次はちゃんとするんでしょ？\""
2001306-79 = "[ns] \"チヒロは、ヴェリタスの副部長だもんね。\""
2001306-81 = "……大人ってズルいなぁ。"
2001306-82 = "ま、確かに……私もヴェリタスの一員だったしね。"
2001306-83 = "結果的には失敗に見えちゃう感じになったし……もっと頑張っていかないと。あの子たちにも誇れるように。"
2001306-87 = "……だからこれは、あの子たちには秘密にね？"
