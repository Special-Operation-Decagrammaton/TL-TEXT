[translation]
2001306-1 = "Preto & Branco"
2001306-2 = "Para ajudar Chihiro com o trabalho de segurança, visitei uma certa empresa de desenvolvimento com ela."
2001306-3 = "Olá, aqui é a Chihiro Kagami da Veritas."
2001306-4 = "Viemos por conta da manutenção do servidor."
2001306-5 = "Finalmente chegaram? Não estão um pouco atrasados...?"
2001306-6 = "Até onde eu sabia, a manutenção estava marcada para as 22h, não é...?"
2001306-7 = "Isso é verdade, mas eu fiquei esperando vocês até agora, sabia?"
2001306-8 = "Normalmente, não seria o correto chegar mais cedo para atender o cliente?"
2001306-9 = "……Peço desculpas."
2001306-10 = "É por isso que esse grupo de hackers desconhecidos, que ninguém sabe de onde veio, é assim..."
2001306-11 = "Deixando de lado a competência, é um problema não terem etiqueta profissional."
2001306-12 = "Ah, os requisitos para desta vez estão organizados naquele documento ali, então conto com vocês."
2001306-13 = "Só para constar, a sala de servidores da nossa empresa possui o sistema de monitoramento mais moderno."
2001306-14 = "Os logs são enviados em tempo real, então qualquer comportamento suspeito fará o alarme disparar imediatamente. Evitem qualquer gracinha."
2001306-15 = "Com certeza. Então, vamos começar o trabalho imediatamente."
2001306-19 = "[ns] \"……Você está bem?\""
2001306-20 = "Estou bem. Não é a primeira vez que são rudes comigo. Trabalhando com atendimento, a gente lida com todo tipo de gente."
2001306-21 = "Às vezes, só de ouvirem o nome \"Veritas\", a atitude das pessoas muda completamente."
2001306-22 = "……Sobre isso, bem, nós também já fizemos muita coisa até hoje, então não posso dizer muita coisa."
2001306-23 = "De qualquer forma, vamos terminar logo. A noite ainda é longa."
2001306-26 = "As configurações estão normais..."
2001306-27 = "Agora, só preciso copiar os dados de backup e..."
2001306-28 = "……O que é isso?"
2001306-29 = "[s] \"O que houve?\""
2001306-30 = "Tem uma quantidade excessiva de dados no banco de dados..."
2001306-31 = "Isso aqui... são informações pessoais dos clientes que baixaram o aplicativo? Como eles conseguiram...?"
2001306-32 = "E aqui, registros de transações estranhas que não estão no livro contábil..."
2001306-33 = "Hummm... com licença por um momento."
2001306-37 = "……Eu sabia. Eles esconderam algo estranho no aplicativo que distribuem. Eles estavam coletando informações dos clientes com isso."
2001306-38 = "Eles vendem essas informações para seguradoras e ganham dinheiro de um jeito sujo... um método bem óbvio."
2001306-39 = "[s1] \"Isso não é crime...?\"\n[s2] \"……Devemos denunciar à polícia?\""
2001306-40 = "É um crime, sim... mas denunciar ou não é outra história."
2001306-41 = "É um crime, sim... mas denunciar ou não é outra história."
2001306-42 = "Um responsável pela segurança acessar o servidor e obter dados sem a permissão do cliente... isso também é um ato ilegal. Mesmo que a gente contate a polícia, isso provavelmente não será aceito como prova válida."
2001306-43 = "Além disso, se o boato de que a Veritas vazou informações de clientes se espalhar, o pessoal da minha equipe vai ter problemas."
2001306-44 = "Mesmo que entendam que foi uma \"ação motivada pelo senso de justiça\", o número de empresas que confiam em nós para trabalhar diminuiria drasticamente."
2001306-45 = "[s] \"Então...\""
2001306-46 = "Que situação."
2001306-47 = "Sério, que situação complicada..."
2001306-48 = "…………."
2001306-51 = "(Na manhã seguinte...)"
2001306-52 = "\"Notícia urgente. Foi revelado que o Sr. A, presidente de uma famosa empresa de desenvolvimento de aplicativos, inseriu secretamente um backdoor no código de seu aplicativo. Dizem que ele estava coletando informações pessoais dos usuários a partir daí.\""
2001306-53 = "\"Este fato veio à tona depois que um hacker anônimo publicou o código na internet. Com isso, as ações da empresa do Sr. A caíram drasticamente, e dizem que ele está à beira da falência.\""
2001306-54 = "\"O Sr. A ainda não admitiu o fato, mas as evidências são claras, e reverter a opinião pública negativa será uma tarefa extremamente difícil...\""
2001306-58 = "[ns] \"…….\""
2001306-59 = "……."
2001306-60 = "[s3] \"……Chihiro?\"\n[s4] \"Não me diga que...\""
2001306-63 = "D-do que você está falando? Ontem eu estava ocupada demais fazendo a manutenção do servidor sob aquele \"sistema de monitoramento de ponta\"."
2001306-64 = "Deve ter algum hacker habilidoso em algum lugar de Kivotos que agiu por senso de justiça, não é?"
2001306-65 = "Provavelmente..."
2001306-69 = "[ns] \"………。\""
2001306-70 = "……Desculpe, eu."
2001306-71 = "Eu não queria deixar o crime passar impune, e também queria evitar que a reputação da Veritas fosse prejudicada. Mas eu estava tão irritada que... não consegui pensar em outra forma de resolver isso."
2001306-72 = "Na verdade, eu deveria ter assumido a responsabilidade pelo que fiz da maneira correta, em vez de usar métodos tão injustos... Talvez eu não seja uma hacker digna."
2001306-73 = "Eu sempre fico pegando no pé daquelas garotas sobre a ética hacker. E, na hora H, acabo escolhendo uma solução tão infantil e bruta como essa..."
2001306-74 = "……Sensei, você se decepcionou? Ou está bravo?"
2001306-75 = "[s] \"……Não. Você vai fazer direito da próxima vez, não vai?\""
2001306-79 = "[ns] \"A Chihiro é a vice-presidente da Veritas, afinal.\""
2001306-81 = "……Os adultos são tão astutos."
2001306-82 = "Bem, é verdade... Eu também sou um membro da Veritas, afinal."
2001306-83 = "No fim das contas, parece que tudo terminou em fracasso... Preciso me esforçar mais. Para que elas possam se orgulhar de mim."
2001306-87 = "……Então, mantenha isso em segredo delas, está bem?"
