[translation]
10000010-1 = "Episódio 1: Bem-vindo à Hyakkiyako"
10000010-2 = "Falando em Hyakkiyako, é aquela cafeteria famosa, né?"
10000010-3 = "O Anmitsu de morango da Hyakkiyako é simplesmente o melhor."
10000010-4 = "Eles têm várias coisas deliciosas, mas o melhor de tudo é..."
10000010-6 = "「「「O sorriso fofo da Shizuko-tan!」」」"
10000010-8 = "(Eu só perguntei o caminho, mas depois de ouvir essa frase dezenas de vezes, finalmente cheguei à Hyakkiyako)"
10000010-12 = "Chefeee! Seja muito bem-vindo!"
10000010-13 = "Ouvi dizer que o senhor viria direto do Schale, então eu, Fina, estive esperando de todo o meu coração!!!"
10000010-14 = "[s1] \"E-eh, sim...?\"\n[s2] \"S-Schale?\""
10000010-15 = "Ei, Fina! O Sensei está confuso, sabia!"
10000010-16 = "Ei, Fina! O Sensei está confuso, sabia!"
10000010-17 = "E-eh, mas..."
10000010-18 = "A presidente disse agorinha que, quando o Sensei chegasse, era para darmos uma recepção grandiosa e surpreendente."
10000010-19 = "Não, não, não! Isso era só sobre causar uma boa primeira impressão como funcionária da Hyakkiyako!"
10000010-20 = "Isso, primeira impressão!"
10000010-21 = "Ao causar uma primeira impressão super fofa, nós vamos garantir que o nível de afeição do Sensei já comece no máximo, esse é o plano..."
10000010-22 = "[s] \"Err...\""
10000010-23 = "……Ah!?"
10000010-24 = "E-err, o que eu acabei de dizer foi, ou seja..."
10000010-25 = "Te-hepero...!"
10000010-26 = "Não é isso... cof, cof!"
10000010-29 = "Seja bem-vindo, Sensei!"
10000010-30 = "Bem-vindo à Hyakkiyako! Nyan-nyan!"
10000010-31 = "[s] \"Nyan-nyan...?\""
10000010-32 = "Hehe, então, por favor, deixe-me guiá-lo para dentro!"
10000010-33 = "Fina, um cliente!"
10000010-34 = "Sim! Eu, a humilde Fina, receberei o chefe com toda a minha dedicação!!!"
10000010-35 = "Eu já disse que não é nada disso!!"
10000010-37 = "Mas, de qualquer forma, Sensei, você realmente veio!"
10000010-38 = "[s] \"Já que você me convidou, não podia faltar.\""
10000010-39 = "Ehehe, então, vamos nos apresentar formalmente."
10000010-40 = "Eu sou Kawawa Shizuko."
10000010-41 = "Pertencente à Academia Hyakkiyako, sou a presidente do Comitê de Operações do Festival e proprietária da Hyakkiyako, a tradicional cafeteria que é o orgulho da nossa escola!"
10000010-42 = "Ao mesmo tempo, também sou a garota-propaganda da Hyakkiyako, ou seja, uma espécie de ídolo para todos!"
10000010-43 = "E eu sou uma funcionária da Hyakkiyako!"
10000010-44 = "Meu nome é Fina, e estou em busca de aprimorar o caminho da cavalaria!"
10000010-45 = "[s] \"Prazer em conhecê-las, vocês duas.\""
10000010-46 = "Cof. Então, Sensei, esta é a sua primeira vez na Academia Hyakkiyako, certo?"
10000010-47 = "Então, vamos conversar enquanto aproveitamos para fazer o marketing do nosso Comitê de Operações do Festival."
10000010-50 = "Direto ao ponto: que tipo de lugar é a Academia Hyakkiyako? Começando agora!"
10000010-52 = "A Academia Hyakkiyako é um distrito escolar que, desde muito tempo, se desenvolveu tendo o turismo como seu pilar central."
10000010-54 = "Existem muitas formas de entretenimento, como festivais, fontes termais e música, mas..."
10000010-55 = "O que merece mais destaque de tudo é a gastronomia!"
10000010-57 = "É um lugar onde todas as culturas e estudantes se cruzam e ganham vida. É esse tipo de lugar!"
10000010-59 = "E nós, do \"Comitê de Operações do Festival\", somos responsáveis pelo \"festival\", que ostenta a maior escala dentro da indústria turística de Hyakkiyako."
10000010-60 = "Embora o nome seja \"Comitê de Operações\", somos um clube que cuida de quase tudo, desde o planejamento até a execução e a gestão geral! Hehe!"
10000010-61 = "E este lugar, o Hyakkiyado, é o esconderijo super legal do nosso \"Comitê de Operações do Festival\"!"
10000010-62 = "E agora mesmo, o \"Festival das Flores de Cerejeira da Primavera de Hyakki\" que preparamos está acontecendo!"
10000010-63 = "Este é o poder do nosso Comitê de Operações do Festival!"
10000010-64 = "[s] \"A cidade está cheia de energia, é um ótimo festival.\""
10000010-65 = "Sim. Graças ao esforço e à cooperação de muitas pessoas, o festival está animado assim, mas..."
10000010-66 = "Ultimamente, apareceram alguns sujeitos para atrapalhar..."
10000010-67 = "Hoje de manhã, de repente, vandalizaram vários lugares, é realmente irritante..."
10000010-68 = "[s] \"Falando nisso, sobre o que você queria 'conversar'...\""
10000010-69 = "Sim, é verdade que eu queria convidar o Sensei puramente para o \"Festival das Flores de Cerejeira da Primavera de Hyakki\", mas..."
10000010-72 = "Presidente! Ataque inimigo!"
10000010-73 = "Ah, não! Logo agora que eu estava falando deles! Não dá para aguentar isso!!"
10000010-74 = "Ah..."
10000010-75 = "E-err, ah, que medo, Shizuko... Brincadeirinha... Hehe."
10000010-76 = "B-bem, de qualquer forma! Vamos discutir os detalhes quando chegarmos ao local!"
10000010-79 = "Muahahaha! Nós somos os demônios e espíritos que vagam pelas ruas de Hyakkiyako."
10000010-80 = "Nosso nome é... Trupe Sudama, Estilo das Ruas!"
10000010-81 = "Vamos lá pessoal, como planejado, destruam, destruam e destruam tudo!"
10000010-83 = "[ns3] \"Isso também faz parte do Festival das Flores de Cerejeira?\"\n[ns4] \"Os festivais de hoje em dia são bem extravagantes, né?\""
10000010-84 = "C-claro que não!! Como um festival poderia ser assim?!"
10000010-85 = "C-claro que não!! Como um festival poderia ser assim?!"
10000010-86 = "Bem, Kivotos é grande, então talvez exista, mas... de qualquer forma, eles são apenas um estorvo!"
10000010-87 = "Tentar atrapalhar o nosso precioso Festival das Flores de Cerejeira! Eu não vou perdoar!"
10000010-89 = "Ha! Você acha mesmo que um simples comitê organizador de festival está à nossa altura?!"
10000010-92 = "Tanto faz, vamos acabar com eles. Todos, atacar!"
