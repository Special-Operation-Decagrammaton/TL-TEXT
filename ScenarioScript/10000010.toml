[translation]
10000010-1 = "第1話;百夜堂へようこそ"
10000010-2 = "百夜堂っていえば、あの有名な喫茶店だね。"
10000010-3 = "百夜堂のイチゴ餡蜜が最高でねえ。"
10000010-4 = "色々美味しいものがあるんだけど、何より最高なのは……"
10000010-6 = "「「「シズコたんの可愛い笑顔！」」」"
10000010-8 = "（道を聞いただけなのに、何故かそんな台詞を何十回も聞いた末に、ようやく百夜堂へとたどり着いた）"
10000010-12 = "お頭ァァ！ようこそいらっしゃいマシタッ！"
10000010-13 = "わざわざシャーレ組からいらっしゃると聞いて、このフィーナ！心よりお待ちしておりマシタァッッッ！！！"
10000010-14 = "[s1] \"う、うん……？\"\n[s2] \"しゃ、シャーレ組？\""
10000010-15 = "ちょっとフィーナ！先生が困ってるでしょ！"
10000010-16 = "ちょっとフィーナ！先生が困ってるでしょ！"
10000010-17 = "エ、でも……"
10000010-18 = "先生が来たらビックリするくらい盛大にお出迎えの挨拶をって、さっき委員長が。"
10000010-19 = "いやいやいや、それはあくまでも百夜堂の従業員としての、第一印象的な話だから！"
10000010-20 = "そう、第一印象！"
10000010-21 = "第一印象をとびっきり可愛くしておくことで、最初から先生の好感度MAXで行こうというこの……"
10000010-22 = "[s] \"えっと……。\""
10000010-23 = "……はっ！？"
10000010-24 = "え、えっと、今のはその、つまり……"
10000010-25 = "て、てへぺろ……っ！"
10000010-26 = "じゃなくて……こほんっ！"
10000010-29 = "いらっしゃいませ、先生！"
10000010-30 = "百夜堂へようこそ！にゃんにゃん！"
10000010-31 = "[s] \"にゃんにゃん……？\""
10000010-32 = "えへっ、では中へご案内いたします！"
10000010-33 = "フィーナ、一名様！"
10000010-34 = "はいっ！不肖フィーナ！お頭を全力でおもてなしいたしマスッッッ！"
10000010-35 = "だからそういうのじゃなくって！！"
10000010-37 = "それにしても先生、本当に来てくださったんですね！"
10000010-38 = "[s] \"せっかく呼んでくれたからね。\""
10000010-39 = "えへへっ、ではあらためて自己紹介を。"
10000010-40 = "私は[ruby=かわわ]河和[/ruby]シズコ。"
10000010-41 = "百鬼夜行連合学院所属、お祭り運営委員会の委員長であり、この百鬼夜行自慢の伝統的な喫茶店「百夜堂」のオーナー！"
10000010-42 = "それと同時に百夜堂の看板娘でもあって、つまりはみんなのアイドルみたいなものです！"
10000010-43 = "そしてワタシは百夜堂の従業員！"
10000010-44 = "任侠の道を究めんとする、フィーナと申しマス！"
10000010-45 = "[s] \"よろしくね、二人とも。\""
10000010-46 = "こほん。それで先生は、百鬼夜行連合学院に来るのは初めてなんですよね？"
10000010-47 = "では、私たちお祭り運営委員会のPRを兼ねてお話しましょう。"
10000010-50 = "ズバリ、百鬼夜行連合学院とはどういうところなのか、始まり始まり～！"
10000010-52 = "百鬼夜行連合学院は、昔から観光業を中心に発達した学院自治区です。"
10000010-54 = "お祭り、温泉、音楽といった様々な娯楽がたくさんあるのですが……"
10000010-55 = "何よりも注目すべきは、グルメ！"
10000010-57 = "ありとあらゆる文化と生徒たちとが交わり、息づいている。そんな場所なんです！"
10000010-59 = "そして私たち「お祭り運営委員会」は、その百鬼夜行の観光業の中でも最大級の規模を誇る「お祭り」を担当しています。"
10000010-60 = "「運営委員会」という名前ですが、企画から運営、そして全般的な管理まで、そのほとんどを担当してる部活なんです！えっへん！"
10000010-61 = "そしてここ百夜堂は、私たち「お祭り運営委員会」のCoooolなアジトなんデス！"
10000010-62 = "そして今まさに、私たちが準備してきた「百夜ノ春ノ桜花祭」が開催中！"
10000010-63 = "これが私たち、お祭り運営委員会の力です！"
10000010-64 = "[s] \"街にも活気が溢れてて、良いお祭りだね。\""
10000010-65 = "はい。色んな方の努力や協力があって、こうして盛り上がってはいるのですが……。"
10000010-66 = "最近、邪魔をしてくるやつらが現れまして……。"
10000010-67 = "今朝もいきなりあちこち荒らされたし、ほんっとに……。"
10000010-68 = "[s] \"そういえば「相談したいこと」って……。\""
10000010-69 = "はい、先生を純粋に「百夜ノ春ノ桜花祭」へご招待したかったのも本当なのですが……"
10000010-72 = "委員長！敵襲デス！"
10000010-73 = "ああもうっ、言ってるそばからあいつら！ほんっとやってらんない！！"
10000010-74 = "あっ……"
10000010-75 = "え、っと、きゃーシズコ怖ーい……なーんちゃってー……えへっ。"
10000010-76 = "と、とにかく！詳しいことは現場に向かってからで！"
10000010-79 = "ふはははっ！あたしらは、百鬼夜行の路上に屯する魑魅魍魎。"
10000010-80 = "その名も……[ruby=すだまいちざ]魑魅一座[/ruby]・路上流っす！"
10000010-81 = "さあみんな、ご要望通りに荒らして荒らして荒らしまくりな！"
10000010-83 = "[ns3] \"あれも桜花祭の一環？\"\n[ns4] \"最近のお祭りは派手だね。\""
10000010-84 = "そ、そんなわけないじゃないですか！！こんなお祭りがあってたまるもんですか！"
10000010-85 = "そ、そんなわけないじゃないですか！！こんなお祭りがあってたまるもんですか！"
10000010-86 = "いや、キヴォトスは広いし、あるかもだけど……とにかくあれはただの邪魔者です！"
10000010-87 = "せっかくの桜花祭を邪魔しようとするだなんて！許せマセン！"
10000010-89 = "はっ、たかがお祭りの運営委員会ごときが、あたしらの相手になるとでも！？"
10000010-92 = "まあいい、相手してやんな。全員、突撃！"
