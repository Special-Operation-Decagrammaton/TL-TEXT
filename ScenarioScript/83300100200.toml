83300100200-8 = "Por causa do Pandemonium, a carga de treinamento aumentou 200% em relação ao ano passado, mas..."
83300100200-9 = "Graças ao esforço de todos, conseguimos terminar sem problemas."
83300100200-10 = "Francamente, o que será que eles... aqueles tanukis. Mas com isso, eles devem ficar quietos por um tempo."
83300100200-17 = "……Hm? Está meio barulhento, não está?"
83300100200-18 = "É verdade... será que aconteceu alguma coisa?"
83300100200-19 = "Acabamos de voltar e eu queria descansar um pouco, mas..."
83300100200-20 = "Vou dar uma olhada na situação."
83300100200-26 = "Ah, sim...! Então, eu vou com você!"
