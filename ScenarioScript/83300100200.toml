[translation]
83300100200-6 = "耐寒訓練お疲れ様でした、委員長。"
83300100200-7 = "うん、アコもお疲れ様。"
83300100200-8 = "万魔殿のせいで訓練量が昨年より200%も増えてしまったけれど……"
83300100200-9 = "みんなが頑張ってくれたおかげで、無事に終えられた。"
83300100200-10 = "まったく、何なんでしょうね……あのタヌキどもは。でもこれで、しばらくは大人しくしているはずです。"
83300100200-17 = "……ん？何だか騒がしいわね。"
83300100200-18 = "そうですね……何かあったのでしょうか？"
83300100200-19 = "戻ってきたばかりだし、少し休みたいところだけど……"
83300100200-20 = "少し様子を見てくる。"
83300100200-26 = "あっ、はい……！では、私もご一緒します！"
