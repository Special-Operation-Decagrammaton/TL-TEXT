[translation]
80000012-1 = "街での遭難"
80000012-2 = "（シャーレの仕事でアビドス高等学校に向かう途中、勘違いして違う駅で下りてしまった）"
80000012-10 = "（とりあえず真っすぐ進み続けていたが結局、街の真ん中で遭難してしまった……）"
80000012-12 = "アビドス・住宅街"
80000012-16 = "……。"
80000012-17 = "……先生？"
80000012-18 = "ここ、学校に行く道じゃないけど……どうしてこんなところに……。"
80000012-19 = "[s] シロコに事情を説明する。"
80000012-20 = "間違えて違う路線の地下鉄に乗ったけど、とりあえず降りて歩き続けたら迷子になった……？"
80000012-21 = "確かにアビドス自治区には、ほとんど周囲に何もない駅がたくさんあるから……"
80000012-22 = "変なところで降りると、慣れてない人にとっては迷うのも分かる。"
80000012-23 = "今後そういう時は慌てないで、ずっと同じ方向に歩いて行った方が良いよ。こうして来て良かった。"
80000012-24 = "とりあえずどこかの方向に50kmぐらい歩けば、街にたどり着けるはずだから。"
80000012-25 = "[s] \"50kmを「とりあえず」はちょっと……。\""
80000012-26 = "ん、そっか……。"
80000012-27 = "とにかく、もう心配しなくていいよ。"
80000012-28 = "この辺の道は分かるから、学校まで案内するね。"
80000012-29 = "……ん？足に力が入らないって？"
80000012-30 = "低血糖症かな。"
80000012-31 = "何か食べられるもの……。"
80000012-36 = "……ライディング用のやつだけど。"
80000012-37 = "このチョコバーで良ければ、どう？"
80000012-38 = "[s] ありがたく頂く。"
80000012-42 = "……。"
80000012-43 = "なんだか、先生に初めて会った時を思い出すね。"
80000012-44 = "あの時もこうして、遭難した先生にエナジードリンクを渡したっけ。"
80000012-45 = "[s] \"その時からずっと……今でも、シロコには助けてもらってばかりだね。\""
80000012-46 = "ううん、そんなことは無い。むしろ助けてもらってるのは、私の方。"
80000012-47 = "私が先生にしてあげられるのは、これくらいしか無いけど……。"
80000012-48 = "でも、少しでも支え合えるのは、すごく嬉しい。"
80000012-49 = "[s] \"うん。これからもよろしくね、シロコ。\""
80000012-50 = "ん、こちらこそ。"
80000012-51 = "……末永くよろしくね、先生。"
80000012-55 = "（その後、シロコの案内で無事にアビドス高等学校に着いた。）"
