[translation]
80000012-1 = "Perdido na cidade"
80000012-2 = "（A caminho da Escola de Abydos para um trabalho do Schale, acabei me confundindo e descendo na estação errada）"
80000012-10 = "（Continuei andando em linha reta por um tempo, mas acabei me perdendo no meio da cidade...）"
80000012-12 = "Abydos - Área Residencial"
80000012-16 = "……."
80000012-17 = "……Sensei?"
80000012-18 = "Este não é o caminho para a escola... Por que você está em um lugar como este?"
80000012-19 = "[s] Explicar a situação para Shiroko."
80000012-20 = "Peguei o metrô da linha errada por engano, e quando desci e continuei andando, acabei me perdendo...?"
80000012-21 = "É verdade que o Distrito Autônomo de Abydos tem muitas estações que não têm quase nada ao redor..."
80000012-22 = "Entendo que, para alguém que não está acostumado, é fácil se perder se descer em um lugar estranho."
80000012-23 = "Da próxima vez, não entre em pânico e continue andando na mesma direção. Fico feliz que tenha conseguido chegar até aqui."
80000012-24 = "Se você andar uns 50km em qualquer direção, eventualmente deve chegar a uma cidade."
80000012-25 = "[s] \"50km é um pouco demais para um 'eventualmente'...\""
80000012-26 = "Hmm, entendi..."
80000012-27 = "De qualquer forma, não precisa mais se preocupar."
80000012-28 = "Eu conheço bem as estradas por aqui, então vou te guiar até a escola."
80000012-29 = "……Hm? Suas pernas estão fracas?"
80000012-30 = "Deve ser hipoglicemia."
80000012-31 = "Precisa de algo para comer..."
80000012-36 = "……É um para ciclismo, mas..."
80000012-37 = "Se não se importar com esta barra de chocolate, quer?"
80000012-38 = "[s] Aceitar com gratidão."
80000012-42 = "……."
80000012-43 = "De certa forma, isso me lembra de quando conheci o Sensei pela primeira vez."
80000012-44 = "Naquela época, eu também te dei uma bebida energética quando você estava perdido."
80000012-45 = "[s] \"Desde aquela época até agora... continuo sendo ajudado por você, Shiroko.\""
80000012-46 = "Não, não é verdade. Na verdade, sou eu quem é ajudada por você."
80000012-47 = "Isso é tudo o que posso fazer pelo Sensei, mas..."
80000012-48 = "Ainda assim, fico muito feliz por podermos nos apoiar um pouco."
80000012-49 = "[s] \"Sim. Conto com você daqui para frente também, Shiroko.\""
80000012-50 = "Hmm, digo o mesmo."
80000012-51 = "……Conte comigo por muito tempo, Sensei."
80000012-55 = "（Depois disso, cheguei em segurança à Escola de Abydos com a ajuda da Shiroko.）"
