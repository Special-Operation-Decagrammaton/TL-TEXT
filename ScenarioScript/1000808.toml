[translation]
1000808-1 = "Na noite brilhante"
1000808-2 = "Millennium - Corredor"
1000808-3 = "Haha, Sensei. Obrigado pelo trabalho duro até tarde da noite."
1000808-4 = "O que eu quero te mostrar fica em um lugar secreto."
1000808-5 = "Um lugar que eu nunca contei para ninguém..."
1000808-6 = "Por que? Porque é onde eu costumo ir quando mato aula, então seria um problema se mais alguém descobrisse..."
1000808-7 = "Por isso, você é o único que vou levar lá, Sensei."
1000808-8 = "Então, Sensei."
1000808-9 = "Feche os olhos."
1000808-11 = "Rápido."
1000808-13 = "Segure minha mão."
1000808-16 = "Hya! E-essa não é a minha mão!"
1000808-17 = "Ufa, que susto..."
1000808-18 = "...Vem, por aqui."
1000808-22 = "(Ding)"
1000808-23 = "Hehe, percebeu? Ah, é um elevador."
1000808-24 = "Hm? Se vamos subir? Com certeza."
1000808-25 = "Dizem que a velocidade desse elevador é de 2000 metros por minuto."
1000808-26 = "(Zzzzzzz...)"
1000808-27 = "..."
1000808-28 = "............"
1000808-29 = ".............."
1000808-30 = "(Bum!)"
1000808-31 = "(Ding)"
1000808-32 = "Pronto, chegamos."
1000808-33 = "Vamos, caminhe devagar para frente."
1000808-37 = "(Wooooosh...)"
1000808-38 = "Pode abrir os olhos, Sensei."
1000808-39 = "[s] \"...!\""
1000808-42 = "― Bem-vindo, [wa:1000] Sensei. [wa:1700] Ao meu lugar especial, [wa:1200] seja bem-vindo!"
1000808-45 = "― Eu amo esta escola. [wa:3500] E também... [wa:1000] este momento."
1000808-48 = "― Se estou com medo? [wa:3000] Nem um pouco. [wa:1500] Só estou, [wa:1000] com o coração acelerado."
1000808-51 = "― Bem, [wa:1000] de vez em quando, matar aula não é tão ruim assim. [wa:2000] Hahaha!"
1000808-54 = "Millennium - Terraço"
1000808-55 = "Ah, foi divertido."
1000808-56 = "Eu te contei, mas não vá contar para mais ninguém, viu."
1000808-57 = "[s] \"Sim, será um segredo só nosso.\""
1000808-58 = "..."
1000808-59 = "Um segredo só nosso..."
1000808-60 = "E-eu sinto que os segredos entre mim e o Sensei estão aumentando cada vez mais... Será que estou imaginando coisas?"
1000808-62 = "N-não é que eu não goste disso!!"
1000808-63 = "..."
1000808-64 = "E-eu realmente, não desgosto, sabe."
1000808-65 = "..."
1000808-66 = "P-por isso."
1000808-67 = "...Continue contando comigo, Sensei."
1000808-70 = "Quando estou com o Sensei, sinto que daqui para frente...#nteremos muitos segredos como este."
