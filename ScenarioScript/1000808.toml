[translation]
1000808-1 = "輝く夜に"
1000808-2 = "ミレニアム・廊下"
1000808-3 = "ははっ、先生。夜遅くにお疲れさん。"
1000808-4 = "見せたいものは、秘密の場所にあってさ。"
1000808-5 = "まだ誰にも教えたことのない場所で……。"
1000808-6 = "何でかって、あたしが授業をサボる時によく行くところだから、他の誰かに場所がバレたら困るんだよな……。"
1000808-7 = "だから連れて行くのも、先生だけな。"
1000808-8 = "じゃあ、先生。"
1000808-9 = "目を閉じて。"
1000808-11 = "早く。"
1000808-13 = "あたしの手を握って。"
1000808-16 = "ひぁっ！そっ、そこは手じゃねぇよ！"
1000808-17 = "ふう、マジでびっくりした……。"
1000808-18 = "……ほら、こっち。"
1000808-22 = "（チン）"
1000808-23 = "ふふ、気づいたか？ああ、エレベーターだ。"
1000808-24 = "ん？上がるのかって？もちろん。"
1000808-25 = "ここのエレベーターの速度、分速2000mらしいぜ。"
1000808-26 = "（ウイイィィィィィン……）"
1000808-27 = "……"
1000808-28 = "…………"
1000808-29 = "………………"
1000808-30 = "（ゴゥン！）"
1000808-31 = "（チーン）"
1000808-32 = "さ、到着。"
1000808-33 = "ほら、ゆっくり前へ歩いて。"
1000808-37 = "（ヒュォーーッ……）"
1000808-38 = "目、開けてもいいぞ、先生。"
1000808-39 = "[s] \"……！\""
1000808-42 = "― ようこそ、[wa:1000]先生。[wa:1700]あたしだけの特等席、[wa:1200]歓迎するぜ！"
1000808-45 = "― あたしはこの学園が好きだ。[wa:3500]それに……[wa:1000]この瞬間も。"
1000808-48 = "― 怖くないのかって？[wa:3000]全然。[wa:1500]ただ、[wa:1000]ドキドキはしてる。"
1000808-51 = "― まあ、[wa:1000]たまにはサボるのも悪くねぇな。[wa:2000]ははは！"
1000808-54 = "ミレニアム・屋上"
1000808-55 = "あー楽しかった。"
1000808-56 = "先生には教えたけど、他のやつに教えるんじゃねえぞ。"
1000808-57 = "[s] \"うん、二人だけの秘密にするよ。\""
1000808-58 = "……。"
1000808-59 = "二人だけの秘密……。"
1000808-60 = "な、なんか先生とあたしだけの秘密が、どんどん増えてる気がするな……あたしの勘違いか？"
1000808-62 = "い、嫌ってわけじゃねぇから！！"
1000808-63 = "……。"
1000808-64 = "ほ、本当に、嫌じゃない、から。"
1000808-65 = "……。"
1000808-66 = "だ、だから。"
1000808-67 = "……これからも、よ、よろしくな、先生。"
1000808-70 = "先生と一緒にいると、これから先も……#nこんな秘密が、たくさんできてく気がするな。"
