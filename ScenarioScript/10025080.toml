[translation]
10025080-1 = "第8話;怪しい影"
10025080-2 = "[ruby=やとうら]夜戸浦[/ruby]村・鬼の[ruby=がんしょう]岩礁[/ruby]の上"
10025080-4 = "うーん……今日はやたらと霧が濃いな。"
10025080-5 = "師匠に教わった磯釣りを試してみたかったんだけどな……"
10025080-6 = "……そうだ、とりあえず写真だけでも撮るか。"
10025080-7 = "濃霧の海をバックにシャッターを切れば、サムネ映えする神秘的な1枚が――"
10025080-13 = "ん……？あれは何だ？"
10025080-19 = "……船？"
10025080-26 = "データの移行も完了っと。 "
10025080-27 = "はい。これで出入りする船の記録と、貨物の詳細を簡単に管理できるよ。"
10025080-28 = "わぁ……あの大量の報告書が、こんな見やすく……"
10025080-29 = "助かります、ありがとうございました！#nこれで労働時間を削減できます！"
10025080-30 = "大したことじゃないし、気にしないで～"
10025080-37 = "この、あぷり…‥とかいうやつは、どう使うんだ？#n最近の技術は、どうも難しくてな……"
10025080-39 = "思ってるよりも簡単ですよ！今度教えますね。"
10025080-40 = "というか、こんな複雑そうなアプリをすぐに作ってしまうなんて……#nミレニアムの生徒じゃないなら、どちらの学園から来たんですか？"
10025080-41 = "あっ、えー……ただの通りすがりのプログラマーというか……"
10025080-48 = "師匠！大変です！！"
10025080-50 = "……誰が師匠じゃ。"
10025080-52 = "で、何があった？誰か海にでも落っこちたか？"
10025080-53 = "いや、そうじゃないんですけど……さっき「鬼の[ruby=がんしょう]岩礁[/ruby]」で妙なものが撮れたんですよ。"
10025080-54 = "……妙なもの、じゃと？"
10025080-55 = "あそこは傾斜もあって危険だから、悪天候の日には近づくなと何度も――"
10025080-56 = "それは、その～師匠に教わった磯釣りを、さっそく試してみたくてですね……"
10025080-57 = "とにかく、これを見てください。#nここです、ここ。なにか映ってません？"
10025080-63 = "……船？"
10025080-64 = "船にしては、ちょっと変わった形だな。"
10025080-65 = "こんな霧の濃い日に船を出すなんて、危険では……"
10025080-67 = "……変ですね。今日はどの船も出港しないはずですが。"
10025080-68 = "じゃ、じゃあこれは……"
10025080-75 = "……「再来の船」じゃな。"
10025080-76 = "「再来の船」、ですか？"
10025080-77 = "ああ、「深きもの」が陸に上がるときに使うと言われておる。"
10025080-78 = "ワシも漁に出ているとき遠くから見かけはしたが、#nこれほど近くで見るのは初めてじゃ。"
10025080-79 = "言い伝えによると、「深きもの」は半月に一度陸に上がり、村からのお供えを船で持って帰る。そして、お供えに見合った見返りを与える――とな。"
10025080-81 = "気に入ったお供えがあった場合、お供えをした者を海に連れ帰り、自分たちと同じ存在として取り込む。"
10025080-82 = "ひ、ひぃぃっ……"
10025080-88 = "[ns] \"……その船を追いかけようとは思いませんでしたか？\""
10025080-89 = "なにを言う！連れ去られると分かっておるのにか！？"
10025080-90 = "好奇心に負けて「再来の船」の後を追った者は、誰一人帰ってきやしなかった。"
10025080-91 = "じゃから、禁忌と呼ばれておる。#n不用意に近づけば、必ず代償を支払うことになるもの。"
10025080-92 = "この海は……禁忌と恐怖の支配から抜け出せない。"
10025080-98 = "[ns] \"……ミヤコはどう思う？\""
10025080-99 = "私は……"
10025080-100 = "人の手によって造られた船だと思います。"
10025080-101 = "……人の手によってじゃと？#n「再来の船」が？"
10025080-102 = "い、いえ、その……村の言い伝えを否定するとか、そういったつもりではなく……"
10025080-103 = "ただ、神秘的な存在が作った船というには、不自然な点が多いので。"
10025080-104 = "例えば、デッキの柵ですが……"
10025080-105 = "人が乗り込むのなら、転落を防止するために必要です。"
10025080-106 = "しかし、水中を自由に泳げる「深きもの」に、果たして必要でしょうか？#nそもそも、柵がなければ船から落ちる程度の存在なのでしょうか？"
10025080-107 = "…‥また、こちらのブリッジのような構造物ですが、通常の航海であれば問題なくとも、海底に潜るとなると水の抵抗を受け、すぐに損傷してしまいます。"
10025080-108 = "にもかかわらず、複雑な形のブリッジが原型を留めているということは、この船は水中に潜っていない可能性が高いです。"
10025080-109 = "以上のことから……これは「深きもの」の船ではなく、私たちと同じ人が乗っていると私は結論づけました。"
10025080-115 = "…………。"
10025080-116 = "そうですね……言われてみれば、バージ船のような気が……"
10025080-121 = "これがブリッジなら、こっちは貨物を積むためのクレーンか？"
10025080-122 = "……もしかして、これって「レッド・フック・エクスプレス」のコンテナじゃないか？"
10025080-123 = "だな……どうして俺たちは、こんな普通の船に怯えてたんだ。"
10025080-127 = "…‥無知、だったのじゃ。"
10025080-128 = "知識が無ければ、そもそも考えに至らん。#n……そして人は、自分の知識で理解できないものに恐怖を抱いてしまう。"
10025080-129 = "ワシらは恐怖に囚われるあまり、言い伝えの真相を探ろうとしてこなかった。"
10025080-130 = "じゃが、もし恐怖を利用して我々の村で悪事を働いているのなら……"
10025080-131 = "[ruby=やとうら]夜戸浦[/ruby]村の漁業組合長として、手加減はせんぞ。"
10025080-132 = "ああ、不正を見逃すわけにはいかないな。"
10025080-138 = "それで、あの「再来の船」――いや、正体不明の船を追い払う方法はあるのか？"
10025080-139 = "それは……"
10025080-141 = "まぁ、追い払うのは簡単だよ。"
10025080-142 = "たとえ「再来の船」だったとしても、水上で移動する以上、推進器が存在するから。"
10025080-143 = "そこを1発ドカーンと派手にやれば、海の上で動けなくなる。"
10025080-144 = "後は船に乗り込んで、中を調査したら良いんじゃない？"
10025080-146 = "でも、水中にある推進器をどうやって爆破するつもりですか？"
10025080-148 = "それは心配しないで。"
10025080-149 = "うちの小隊には、水中の爆破任務も遂行できる[ruby=RABBIT2]優秀なポイントマン[/ruby]がいるからね。"
10025080-150 = "ほらな。水中作戦用の装備が必要になるかもしれないって言っただろ？"
10025080-151 = "うんうん、ダサい格好で来た甲斐があったねぇ。"
10025080-152 = "これのどこがダサいって！？"
10025080-153 = "……はぁ、爆薬は残ってるか？"
10025080-154 = "C4が40パウンドくらい……足りるかな？"
10025080-155 = "十分だ。それなら「再来の船」どころか、上まで飛ばせるだろ。"
10025080-156 = "……ミヤコ、作戦許可を。"
10025080-158 = "承認します。"
10025080-159 = "準備が整い次第、RABBIT2は水中から目標に接近し、推進器を爆破してください。"
10025080-160 = "他の隊員はゴムボートで待機。#nRABBIT2の爆破タイミングに合わせて接近し乗船を！"
10025080-162 = "了解！"
10025080-169 = "戦ったときにも感じたのじゃが、もしかしてキミたちは……"
10025080-170 = "人違いですよ。"
10025080-172 = "――私たちは、通りすがりの観光客ですから。"
