[translation]
10025080-1 = "Episódio 8; Sombra Suspeita"
10025080-2 = "Vila Yatoura - Sobre o recife dos demônios"
10025080-4 = "Hmm... A neblina está muito densa hoje."
10025080-5 = "Eu queria ter tentado a pesca de costão que o mestre me ensinou, mas..."
10025080-6 = "...Certo, vou tirar pelo menos uma foto por enquanto."
10025080-7 = "Se eu disparar o obturador com o mar coberto de neblina ao fundo, conseguirei uma foto mística que vai ficar ótima na miniatura—"
10025080-13 = "Hm...? O que é aquilo?"
10025080-19 = "...Um barco?"
10025080-26 = "Transferência de dados concluída."
10025080-27 = "Pronto. Com isso, você pode gerenciar facilmente o registro dos barcos que entram e saem, além dos detalhes da carga."
10025080-28 = "Uau... Aquela montanha de relatórios ficou tão fácil de ler..."
10025080-29 = "Isso ajuda muito, muito obrigada! #nAgora vou conseguir reduzir as horas de trabalho!"
10025080-30 = "Não foi nada, não precisa se preocupar~"
10025080-37 = "Como se usa esse tal de... aplicativo? #nA tecnologia de hoje em dia é complicada demais para mim..."
10025080-39 = "É mais simples do que parece! Eu te ensino na próxima."
10025080-40 = "Aliás, conseguir criar um aplicativo tão complexo assim tão rápido... #nSe você não é uma aluna da Millennium, de qual escola você veio?"
10025080-41 = "Ah, bem... eu sou só uma programadora de passagem..."
10025080-48 = "Mestre! É uma emergência!!"
10025080-50 = "...Quem é que você está chamando de mestre?"
10025080-52 = "E então, o que aconteceu? Alguém caiu no mar?"
10025080-53 = "Não, não é isso... é que eu tirei uma foto de algo estranho no \"Recife dos Demônios\" agora pouco."
10025080-54 = "...Algo estranho, você disse?"
10025080-55 = "Aquele lugar é perigoso por causa da inclinação, eu disse várias vezes para não se aproximar em dias de mau tempo—"
10025080-56 = "É que, sabe... eu queria testar logo a pesca de costão que o mestre me ensinou..."
10025080-57 = "De qualquer forma, olhe isto. #nAqui, bem aqui. Não tem algo aparecendo?"
10025080-63 = "...Um barco?"
10025080-64 = "É um formato um pouco incomum para um barco."
10025080-65 = "Sair com um barco em um dia com uma neblina tão densa assim, não é perigoso...?"
10025080-67 = "...Estranho. Nenhum barco deveria sair do porto hoje."
10025080-68 = "E-então, o que é isso..."
10025080-75 = "...É o \"Barco do Retorno\"."
10025080-76 = "\"Barco do Retorno\", você diz?"
10025080-77 = "Sim, dizem que é o que os \"Profundos\" usam quando sobem à terra."
10025080-78 = "Eu também já vi de longe enquanto pescava, #nmas é a primeira vez que vejo tão de perto."
10025080-79 = "Segundo a lenda, os \"Profundos\" sobem à terra uma vez a cada quinze dias, levam as oferendas da vila no barco e, em troca, dão uma recompensa equivalente às oferendas."
10025080-81 = "Se eles gostarem da oferenda, levam quem a ofereceu para o mar e os transformam em seres iguais a eles."
10025080-82 = "I-iiih..."
10025080-88 = "[ns] \"...Você não pensou em perseguir aquele barco?\""
10025080-89 = "O que você está dizendo! Sabendo que seria levado embora!?"
10025080-90 = "Ninguém que cedeu à curiosidade e seguiu o \"Barco do Retorno\" jamais voltou."
10025080-91 = "É por isso que é chamado de tabu. #nSe você se aproximar descuidadamente, certamente pagará o preço."
10025080-92 = "Este mar... não consegue escapar do domínio do tabu e do medo."
10025080-98 = "[ns] \"...O que você acha, Miyako?\""
10025080-99 = "Eu..."
10025080-100 = "Acho que é um barco construído por mãos humanas."
10025080-101 = "...Por mãos humanas, você disse? #nO \"Barco do Retorno\"?"
10025080-102 = "N-não, é que... não é minha intenção negar a lenda da vila..."
10025080-103 = "É só que, para um barco feito por seres místicos, há muitos pontos que não fazem sentido."
10025080-104 = "Por exemplo, o corrimão do convés..."
10025080-105 = "Se pessoas fossem embarcar, ele seria necessário para evitar quedas."
10025080-106 = "Mas será que isso é realmente necessário para os \"Profundos\", que conseguem nadar livremente debaixo d'água?#nAlém disso, será que eles são do tipo que cairia de um barco se não houvesse uma grade?"
10025080-107 = "…E quanto a essa estrutura, que parece uma ponte de comando, embora não houvesse problemas em uma navegação comum, se ela mergulhasse no fundo do mar, sofreria com a resistência da água e seria danificada imediatamente."
10025080-108 = "Apesar disso, o fato de a ponte, com seu formato complexo, manter sua forma original, indica que é muito provável que este navio não esteja mergulhando na água."
10025080-109 = "Com base no exposto... concluí que este não é um navio dos \"Profundos\", mas sim um navio tripulado por pessoas como nós."
10025080-115 = "…………."
10025080-116 = "É verdade... agora que você mencionou, parece mesmo uma balsa..."
10025080-121 = "Se isso é a ponte de comando, então aquilo ali é um guindaste para carregar carga?"
10025080-122 = "...Por acaso, isso não seria um contêiner da \"Red Hook Express\"?"
10025080-123 = "É mesmo... por que estávamos com tanto medo de um barco tão comum?"
10025080-127 = "...Foi por ignorância."
10025080-128 = "Sem conhecimento, não se consegue nem chegar a uma conclusão.#n...E as pessoas sentem medo daquilo que não conseguem compreender com seu próprio conhecimento."
10025080-129 = "Ficamos tão presos ao medo que nem tentamos investigar a verdade por trás das lendas."
10025080-130 = "Mas, se estão usando esse medo para cometer maldades em nossa vila..."
10025080-131 = "Como chefe da associação de pesca da vila de Yatoura, não serei nada gentil."
10025080-132 = "É, não podemos deixar passar essa irregularidade."
10025080-138 = "Então, existe alguma maneira de afugentar aquele \"Navio do Retorno\" — ou melhor, esse navio de identidade desconhecida?"
10025080-139 = "Isso é..."
10025080-141 = "Bem, afugentá-lo é fácil."
10025080-142 = "Mesmo que seja o \"Navio do Retorno\", já que ele se move sobre a água, ele precisa de um propulsor."
10025080-143 = "Se dermos um estouro bem dado ali, ele ficará imobilizado no mar."
10025080-144 = "Depois é só subir a bordo e investigar o interior, não é?"
10025080-146 = "Mas como você pretende explodir o propulsor que está debaixo d'água?"
10025080-148 = "Não se preocupe com isso."
10025080-149 = "Nosso esquadrão conta com uma excelente especialista em vanguarda que também pode realizar missões de demolição subaquática."
10025080-150 = "Viu só? Eu não disse que talvez precisássemos de equipamento para operações subaquáticas?"
10025080-151 = "Pois é, valeu a pena ter vindo com esse visual cafona."
10025080-152 = "O que tem de cafona nisso aqui!?"
10025080-153 = "...Haa, ainda temos explosivos?"
10025080-154 = "Cerca de 40 libras de C4... será que é o suficiente?"
10025080-155 = "É mais que suficiente. Com isso, não só o \"Navio do Retorno\", mas dá para mandar tudo pelos ares."
10025080-156 = "...Miyako, autorização para a operação."
10025080-158 = "Autorizado."
10025080-159 = "Assim que estiverem prontas, a RABBIT 2 deve se aproximar do alvo por baixo d'água e explodir o propulsor."
10025080-160 = "As outras integrantes aguardem no bote de borracha.#nSincronizem a aproximação e o embarque com o momento da explosão da RABBIT 2!"
10025080-162 = "Entendido!"
10025080-169 = "Senti isso quando lutamos, mas será que vocês são..."
10025080-170 = "Você se enganou de pessoa."
10025080-172 = "— Nós somos apenas turistas de passagem."
