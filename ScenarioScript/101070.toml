[translation]
101070-1 = "Episódio 7; A Convocação do Comitê de Medidas de Emergência"
101070-2 = "（Um convite do Conselho Estudantil Geral para participar do Comitê de Medidas de Emergência foi entregue aos distritos autônomos de cada academia.）"
101070-4 = "Isso é..."
101070-5 = "Aconteceu alguma coisa, Ayane-chan?"
101070-7 = "Senhorita Sakurako..."
101070-8 = "……É do Conselho Estudantil Geral, não é?"
101070-10 = "……。"
101070-12 = "……O Conselho Estudantil Geral anunciou a formação de um Comitê de Medidas de Emergência."
101070-13 = "Eu ouvi dizer que o Sensei contou ao Conselho Estudantil Geral sobre o sonho, mas..."
101070-14 = "Sim. Mas não acho que isso sozinho seria o suficiente para fazer o Conselho agir dessa forma...#nTalvez exista algum outro motivo por trás disso..."
101070-15 = "Eu... não confio em um Conselho Estudantil Geral sem a Presidente.#nA Interina, Nanagami Rin, é inofensiva... e é exatamente por isso que não posso confiar nela."
101070-16 = "O Conselho Estudantil Geral está basicamente no olho do furacão agora.#nDe qualquer forma, precisamos discutir sobre o que faremos com o Sensei."
101070-17 = "Se considerarmos que esta é a nossa chance――então não há motivo para recusar."
101070-18 = "……Desde que o Sensei esteja lá, tudo vai dar certo."
101070-19 = "Mas a lista do comitê inclui os representantes de várias academias, como a Sociedade Pandemonium... a Big Sister, a ditadora da Red Winter e a Lorde das Trevas...#nA maioria não deve nem dar as caras, mas..."
101070-20 = "Eu me pergunto se eles conseguiriam ter uma discussão civilizada mesmo que se reunissem todos no mesmo lugar...#nJá seria um milagre se não começassem uma guerra――"
101070-28 = "Ah, Nagi-chan, Seia-chan! O que estão fazendo aqui?"
101070-29 = "M-Mika-san..."
101070-30 = "Uau, o que é isso?! Um Comitê de Medidas de Emergência?#nE a Tea Party inteira foi convidada? "
101070-31 = "O que deu neles? Digo, o clima tá meio \"eu tenho que ir também\"?#nAh, depois de tanto tempo sem sair――"
101070-35 = "Hmm... A Gehenna também vem? Logo aquela Sociedade Pandemonium."
101070-36 = "……。"
101070-37 = "Mika-san... Eu te imploro..."
101070-38 = "Hã? Que foi, Nagi-chan?#nEu não vou causar confusão, tá bom? Relaxa aí☆"
101070-39 = "O Sensei vai estar lá, por que eu faria uma coisa dessas, né?"
101070-44 = "……。"
101070-45 = "Haa... Mais uma dor de cabeça..."
101070-46 = "Isso! Isso mesmo!#nFinalmente, o momento chegou, Iroha!"
101070-47 = "Hã, do que você está falando...?"
101070-48 = "É hora de fazer tanto o Conselho Estudantil Geral quanto a Schale reconhecerem a presença da nossa Sociedade Pandemonium! "
101070-49 = "Já interceptei as mensagens para o Comitê Disciplinar!#nKikiki... Vamos dar início ao nosso plano sem a presença daquelas intrometidas!"
101070-50 = "……Eu gostaria que me dissesse de qual plano estamos falando primeiro, Makoto-senpai. "
101070-51 = "Além disso, duvido muito que o Conselho Estudantil Geral nos coloque no mesmo espaço que a Trinity.#nIsso por si só já colocaria a reunião toda em risco."
101070-52 = "Bom, como disseram que o Sensei também vai, acho que vai dar tudo certo, mas..."
101070-54 = "……Há 51.234 mensagens não lidas. "
101070-57 = "……Há 51.235 mensagens não lidas. "
101070-59 = "Senhora Mestra! Veja isto..."
101070-60 = "Fale baixo――Eu já li."
101070-61 = "S-Sim...!"
101070-62 = "Não cabe a nós interferirmos, mas precisamos ficar de olho na situação."
101070-64 = "……Que inusitado.#nQuem diria que entrariam em contato com um distrito distante como o nosso."
101070-65 = "Nyahaha, não acha que eles têm nos mandado mensagens demais ultimamente?"
101070-66 = "……Isso não é motivo de alegria, Senhorita Niya."
101070-67 = "Tem razão, nyahahaha. "
101070-68 = "――Se a Hyakkaryouran estivesse aqui, eu empurraria tudo pra elas."
101070-70 = "Eu não tenho visto a Presidente ultimamente, aconteceu alguma coisa?"
101070-71 = "Você não sabia? Teve um golpe de estado na semana passada, então ela fugiu para as montanhas nevadas."
101070-72 = "De novo? E quem foi dessa vez?"
101070-73 = "Ué? Sei lá. Afinal, golpes de estado não são novidade por aqui."
101070-74 = "É verdade.#nQuantos dias será que ela vai demorar pra voltar dessa vez, hein?"
101070-80 = "Sensei, chegou um e-mail do Conselho Estudantil Geral."
101070-81 = "A Administradora Rin está convocando os representantes dos principais distritos autônomos."
101070-82 = "Hmmm! Tem um arquivo anexado pela Rin-san direcionado a você, Sensei..."
101070-84 = "Parece que detectaram massas de energia de altíssima concentração por toda Kivotos."
101070-86 = "Mas o problema é que não conseguiram confirmar nada visualmente..."
101070-87 = "E o motivo dessa convocação é para que cada distrito trabalhe em conjunto#npara descobrir a causa e a verdadeira natureza desse fenômeno!"
101070-88 = "E como vão reunir alunas de vários lugares diferentes, ela previu que vai ser difícil organizar tantas opiniões,#nentão ela quer pedir a sua ajuda, Sensei!"
101070-89 = "[s] \"Obrigado pelo resumo, Arona.\""
101070-90 = "De nada! Um veículo providenciado pelo Conselho Estudantil Geral deve estar chegando em breve!#nEles disseram que vão nos escoltar até a Torre Sanctum!"
101070-91 = "Vou continuar analisando as informações que a Rin-san nos enviou. "
101070-92 = "Se eu descobrir mais alguma coisa, te aviso!"
101070-93 = "[s] \"Certo, conto com você.\""
101070-99 = "Viemos buscá-lo, Sensei."
101070-100 = "Daqui em diante, vamos escoltá-lo#naté a Torre Sanctum, o quartel-general do Conselho Estudantil Geral."
101070-101 = "[s] \"A Valkyrie?\""
101070-102 = "Sim. Preparamos um helicóptero no heliporto de emergência da Schale."
101070-104 = "É por aqui, vamos indo."
101070-105 = "[ns1] Subir no helicóptero.\n[ns2] Entrar."
101070-111 = "……。"
101070-112 = "……。"
101070-113 = "[s] \"Usar um helicóptero de transporte tático só pra locomoção, isso que é luxo, hein.\""
101070-114 = "……Sim, nós somos da Academia de Polícia, afinal. "
101070-115 = "Nossa situação financeira é bem confortável."
101070-116 = "[ns3] \"……………………。\"\n[ns4] \"……………………？\""
101070-120 = "De qualquer forma, parece que a situação financeira de toda a Valkyrie não anda muito bem... Até pra repor a munição é um sacrifício."
101070-121 = "Desse jeito, vai acabar parecendo que o armamento da Academia de Polícia Valkyrie é uma piada de tão fraco."
101070-123 = "……。"
101070-124 = "……。"
101070-125 = "[ns5] \"Quem são vocês?\"\n[ns6] \"Vocês não são alunas da Valkyrie, não é?\""
101070-128 = "……。"
101070-129 = "……。"
101070-135 = "[ns7] \"…………！！\"\n[ns8] \"Kaiser PMC……！！\""
101070-138 = "Você tem uma boa intuição, Sensei.#nMas percebeu um pouco tarde demais."
101070-139 = "Capturamos o Sensei da Schale. "
101070-140 = "Bom trabalho. Agora, continuem com o plano."
101070-142 = "Hehe... E então, General.#nA missão foi um sucesso?"
101070-148 = "……Sim, garantimos o alvo sem problemas."
101070-149 = "Como esperado de você."
101070-150 = "Sem a presença do Sensei, o Comitê de Medidas de Emergência vai desmoronar...#nE a autoridade da Administradora Rin vai cair por terra. "
101070-151 = "Com isso, estamos um passo mais perto do nosso objetivo de dissolver a Schale――"
101070-152 = "……？"
101070-157 = "Guh…… Ugh……！？"
101070-161 = "……Esse é o seu objetivo, não é? Chefe de Defesa. "
101070-162 = "Nós nunca estivemos interessados na sua justiça desde o início.#nNa verdade, seria um problema para nós se o plano de dissolver a Schale prosseguisse."
101070-163 = "É que o nosso plano mudou há pouco tempo."
101070-168 = "Presidente, sou eu."
101070-169 = "Ah.#nGeneral, o plano está correndo bem?"
101070-170 = "Sim, sem imprevistos."
101070-173 = "Pois é. Como conseguimos encontrar aquele Oopart no deserto...#nNão precisamos mais nos aliar à força militar do Conselho Estudantil Geral――aquele Departamento de Defesa."
101070-174 = "Nem sequer precisaremos da ajuda de Gematria.#nCom aquilo em nossas mãos, não deve haver problemas em agir por conta própria."
101070-175 = "Assim que vocês assumirem o controle do Conselho Estudantil Geral, nós garantiremos o controle administrativo da Torre Sanctum aqui do nosso lado."
101070-176 = "Dessa forma, toda a autoridade executiva de Kivotos não será mais do Conselho Estudantil Geral――#n――e sim da nossa Corporação Kaiser."
101070-177 = "……Ah, não se preocupe. Sem problemas."
101070-179 = "……Entendido. "
101070-183 = "Aguardem na área alvo até o Comitê de Medidas de Emergência terminar.#nIniciaremos a invasão aproveitando a brecha enquanto o Conselho Estudantil Geral estiver vulnerável."
101070-184 = "Nossos alvos são a Administradora do Conselho Estudantil Geral e as presidentes dos comitês.#nNão é necessário capturar todas as presidentes... no entanto, certifiquem-se de capturar a Administradora."
101070-185 = "Entendido."
101070-186 = "E o que faremos com a Chefe de Defesa?"
101070-187 = "Transfira-a para a prisão na sede da PMC.#nLá, o exército particular dela não a encontrará."
101070-188 = "Sem o Sensei e sem a Chefe de Defesa――o Comitê de Medidas de Emergência entrará em colapso rapidinho.#nAssim que tomarmos o Conselho Estudantil Geral e o Presidente assegurar o controle administrativo da Torre Sanctum... a D.U. entrará sob lei marcial."
101070-189 = "Sendo assim, poderemos seguir para a segunda fase do plano."
101070-190 = "General, o que devemos fazer com o Sensei?"
101070-192 = "Até a hora chegar, tranquem-no em algum lugar onde ninguém o encontre.#nAlém disso... dêem um tiro na perna dele pra garantir que não tente nenhuma gracinha."
101070-193 = "Sim, senhor!"
101070-197 = "[ns] （O cano da arma...！）"
101070-203 = "Próximo episódio; A Chegada da Luz"