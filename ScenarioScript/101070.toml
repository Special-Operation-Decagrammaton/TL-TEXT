[translation]
101070-1 = "Episódio 7; Convocação do comitê de resposta a emergências"

101070-2 = "(Um pedido para participar do comitê de resposta a emergências foi enviado pelo Conselho de Estudantes da Federação para a região autônoma de cada escola.)"

101070-4 = "isso é……"

101070-5 = "O que aconteceu com Ayane-chan?"

101070-7 = "Sakurako-sama..."

101070-8 = "...Do Conselho Estudantil da Federação, certo?"

101070-10 = "……."

101070-12 = "...O Conselho Estudantil da Federação declarou o estabelecimento de um comitê de resposta a emergências."

101070-13 = "Ouvi dizer que seu professor contou ao Conselho Estudantil da Federação sobre seu sonho, mas..."

101070-14 = "Sim. No entanto, isso por si só não deveria ser suficiente para o Conselho Estudantil da Federação agir...#nTalvez haja algo mais acontecendo..."

101070-15 = "Eu... eu não confio no Conselho Estudantil da Federação sem um presidente do conselho estudantil. #nA deputada Rin Nanagami é uma pessoa inofensiva... mas é por isso que não posso confiar nela."

101070-16 = "O Conselho Estudantil da Federação está atualmente no meio de uma tempestade. #nDe qualquer forma, você precisa discutir seus planos futuros com seu professor."

101070-17 = "Se você acha que esta é sua chance, não há necessidade de recusar."

101070-18 = "...Desde que o professor esteja comigo, isso não importa."

101070-19 = "No entanto, a lista do comitê inclui representantes de todos os tipos de escolas, incluindo as Irmãs Gug, o Ditador do Inverno Vermelho e o Monarca Negro...#nA maioria deles provavelmente não responderá ao chamado..."

101070-20 = "É mesmo possível que eles se reúnam e tenham uma discussão adequada...#nÉ como um milagre que uma guerra não comece..."

101070-28 = "Ah, Nagi-chan, Seia-chan! O que você está fazendo aqui?"

101070-29 = "M-Mika..."

101070-30 = "Uau, o que é isso! Comitê de resposta a emergências? #nE todos estão participando da festa do chá?"

101070-31 = "O que aconteceu com isso? Ou melhor, sinto que tenho que ir também? #nAh, já faz um tempo que não saímos..."

101070-35 = "Huh... Gehenna está vindo também? Salão dos Dez Mil Demônios."

101070-36 = "……."

101070-37 = "Mika-san... por favor..."

101070-38 = "Huh? O que foi, Nagi-chan? #nVocê não vai causar nenhum problema, certo? Não se preocupe☆"

101070-39 = "Não tem como você fazer isso mesmo tendo um professor, certo?"

101070-44 = "……."

101070-45 = "Suspiro... outra coisa problemática..."

101070-46 = "Isso mesmo! Isso mesmo! #nFinalmente chegou a hora, Iroha!"

101070-47 = "えっと、何の話ですか……？"
101070-48 = "É hora do Conselho Estudantil da Federação e da placa de Petri reafirmarem isso!"

101070-49 = "Já paramos de contatar a comissão disciplinar! #nKikikikki... Vamos começar nosso plano sem eles!"

101070-50 = "...Eu gostaria que você me contasse primeiro qual é o seu plano, Makoto-senpai."

101070-51 = "Além disso, não acho que o Conselho Estudantil da Federação fará de nós e da Trinity o mesmo espaço. #nO progresso do episódio em si estará em perigo."

101070-52 = "Bom, o professor disse que viria também, então acho que vai dar certo de alguma forma..."

101070-54 = "...Existem 51.234 mensagens não lidas."

101070-57 = "...Existem 51.235 mensagens não lidas."

101070-59 = "Senhor! Aqui..."

101070-60 = "Abaixe a voz - eu já vi isso."

101070-61 = "Ah, sim...!"

101070-62 = "Não é lugar para uma concubina interferir, mas tenho que ficar de olho na situação."

101070-64 = "...Isso é raro. #nNão posso acreditar que mesmo uma região autônoma remota como a nossa tenha sido contatada."

101070-65 = "Nyahaha, você não sente que tem recebido mais ligações ultimamente?"

101070-66 = "...Não é algo que me deixa feliz, Niya-sama."

101070-67 = "Isso também é verdade, nyahahaha."

101070-68 = "――百花繚乱がいたら全部押し付けられたんだけど。"
101070-70 = "Não tenho visto o presidente ultimamente, aconteceu alguma coisa?"

101070-71 = "Você não sabe? Houve um golpe na semana passada, então fugi para as montanhas nevadas."

101070-72 = "Também? Quem é desta vez?"

101070-73 = "foto? Não sei. Um golpe de Estado não é apenas um ou dois."

101070-74 = "certamente. #nEu me pergunto quantos dias depois ele estará de volta desta vez."

101070-80 = "Professor, recebi um e-mail do Conselho Estudantil da Federação."

101070-81 = "O Sr. Lin, o responsável administrativo, reunirá os estudantes representativos das principais regiões autónomas."

101070-82 = "Hum! Também há dados anexados do Sr. Rin para o professor..."

101070-84 = "Parece que concentrações extremamente elevadas de corpos energéticos foram observadas em Kivotos."

101070-86 = "Porém, na realidade, não é possível verificar visualmente..."

101070-87 = "A razão deste encontro é que cada região autónoma trabalhe em conjunto para descobrir a causa e a identidade deste fenómeno!"

101070-88 = "Como existem alunos de vários bairros, decidimos que seria difícil organizar as nossas opiniões, por isso gostaríamos de pedir a ajuda do professor #n!"

101070-89 = "[s] \"Obrigado por organizar isso, Alona.\""

101070-90 = "sim! Parece que um carro arranjado pelo Conselho Estudantil da Federação chegará em breve! #n Você vai me proteger até a Torre do Santuário?"

101070-91 = "Continuarei analisando as informações fornecidas pelo Sr. Lin."

101070-92 = "Se eu descobrir mais alguma coisa, te aviso!"

101070-93 = "[s] \"Sim, por favor.\""

101070-99 = "Vim buscá-lo, senhor."

101070-100 = "De agora em diante, iremos protegê-los até a Torre Sanctum, sede do Conselho Estudantil da Federação."

101070-101 = "[s] \"Valquíria?\""

101070-102 = "sim. Temos um helicóptero disponível no heliponto de emergência de Petri."

101070-104 = "Aqui estamos, vamos."

101070-105 = "[ns1] Entre no helicóptero. \n[ns2] Entre."

101070-111 = "……."

101070-112 = "……."

101070-113 = "[s] \"É meio luxuoso usar um helicóptero de transporte tático para transporte.\""

101070-114 = "...Sim, é uma academia de polícia."

101070-115 = "Ele é alguém que tem muitas finanças."

101070-116 = "[ns3] \"…………………….\"\n[ns4] \"……………………?\""

101070-120 = "Em primeiro lugar, parece que Valquíria como um todo não está em boa situação financeira... e reabastecer as balas também é uma luta."

101070-121 = "Por alguma razão, se as coisas continuarem como estão, o armamento da Academia de Polícia Valquíria parecerá bastante fraco."

101070-123 = "……."

101070-124 = "……."

101070-125 = "[ns5] \"Quem são vocês?\"\n[ns6] \"Vocês não são estudantes da Valquíria, são?\""

101070-128 = "……."

101070-129 = "……."

101070-135 = "[ns7] \"…………!!\"\n[ns8] \"Kaiser PMC...!!\""

101070-138 = "Você tem boa intuição, sensei. #nMas percebi isso um pouco tarde."

101070-139 = "Conseguimos um professor de placa de Petri."

101070-140 = "Obrigado pelo seu trabalho duro. Então vamos continuar com o plano."

101070-142 = "Hehe... o que você acha, General? #nA missão foi bem sucedida?"

101070-148 = "...Ah, eu protegi com segurança."

101070-149 = "Como esperado, não é?"

101070-150 = "Com a perda do professor, a força-tarefa de emergência desmorona...#nA autoridade do administrador Lin cairá por terra."

101070-151 = "Com isso, estamos um passo mais perto do nosso objetivo de desmontar placas de Petri."

101070-152 = "...?"

101070-157 = "Ugh... Ugh...! ?"

101070-161 = "...Esse é o seu objetivo, certo? Diretor do Gabinete de Defesa."

101070-162 = "Não temos interesse na sua justiça desde o início. #nNa verdade, seria um problema se o plano de desmantelar a placa de Petri continuasse como está."

101070-163 = "Os planos mudaram há algum tempo."

101070-168 = "Presidente, sou eu."

101070-169 = "ah. #nGeral, seu plano está funcionando?"

101070-170 = "Sim, sem demora."

101070-173 = "Oh sim. Porque consegui encontrar Oparts no deserto. #nO poder militar do Conselho Estudantil da Federação --- Não há mais necessidade de unir forças com aquela sala de defesa."

101070-174 = "Nem precisamos de cooperação com a Gematria. Enquanto tivermos isso nas nossas mãos, não haverá problema se agirmos por conta própria."

101070-175 = "Se você assumir o controle do Conselho Estudantil da Federação, garantiremos o controle administrativo da Torre Sanctum."

101070-176 = "Se fizermos isso, a autoridade administrativa do Kivotos será transferida não para o Conselho Estudantil da Federação, mas para nós da Kaiser Corporation."

101070-177 = "...Ah, não se preocupe. Sem problemas."

101070-179 = "……Entendido."

101070-183 = "Espere no local alvo até que o comitê de resposta a emergências termine. #nAproveite a oportunidade quando o Conselho Estudantil da Federação estiver indefeso e entre correndo."

101070-184 = "Os alvos são os administradores e presidentes do Conselho Estudantil da Federação. #nNão é necessário garantir a segurança de todos os presidentes dos comitês... No entanto, certifique-se de garantir apenas os funcionários administrativos."

101070-185 = "Entendido."

101070-186 = "E o chefe da defesa?"

101070-187 = "Transfira-o para a prisão na sede da PMC. #nMesmo o exército particular dela não conseguirá encontrar você lá."

101070-188 = "Na ausência do professor e do diretor do gabinete de defesa, a força-tarefa de emergência entra em colapso rapidamente. #nSe assumirmos o controle do Conselho Estudantil da Federação e o presidente garantir o controle administrativo da Torre Sanctum... a lei marcial será imposta ao D.U."

101070-189 = "Então você pode passar para a segunda fase do seu plano."

101070-190 = "General, e você, senhor?"

101070-192 = "Até essa hora chegar, mantenha-o trancado para que ninguém saiba onde está. #nAlém disso...basta dar um tiro na perna para não fazer imitações desnecessárias."

101070-193 = "Sim!"

101070-197 = "[ns] (O focinho...!)"

101070-203 = "Da próxima vez: A chegada da luz"

