[translation]
101070-1 = "第7話;非常対策委員会の招集"
101070-2 = "（連邦生徒会から各学園の自治区に対し、非常対策委員会への出席依頼が届けられた）"
101070-4 = "これは……"
101070-5 = "アヤネちゃんどうしたの？"
101070-7 = "サクラコ様……"
101070-8 = "……連邦生徒会から、ですね。"
101070-10 = "……。"
101070-12 = "……連邦生徒会が、非常対策委員会の設立を宣言しました。"
101070-13 = "先生が、連邦生徒会に夢のことを伝えたとは聞いていたが……"
101070-14 = "ええ。ですが、それだけで連邦生徒会が動くほどの事態にはならないはず……#n何か他の事情があるのかもしれませんね……。"
101070-15 = "私は……生徒会長のいない連邦生徒会を信頼しておりません。#n代行の七神リンさんは無害な方ですが……だからこそ、信用できないのです。"
101070-16 = "連邦生徒会は今、嵐の中にいるも同然。#nいずれにせよ、行く末を先生と話し合う必要がある。"
101070-17 = "其れがこの機であると考えるのなら――断る必要も無いだろう。"
101070-18 = "……先生が一緒なら、どうとでもなるはずだ。"
101070-19 = "ですが、委員会のリストには[ruby=パンデモニウム・ソサエティー]……万魔殿、ビ[/ruby]ッグシスター、レッドウィンターの独裁者、黒い君主などあらゆる学園の代表がおります……#nこのほとんどは招集に応じないでしょうけれど……"
101070-20 = "彼らが一堂に会して、きちんとした議論が進められるのかすら……#n戦争が起きないだけでも奇跡のような――"
101070-28 = "あっ、ナギちゃん、セイアちゃん！ここで何してるの？"
101070-29 = "ミ、ミカさん……"
101070-30 = "わぁ、何これ！非常対策委員会？#nしかも、ティーパーティーは全員参加？ "
101070-31 = "どうしちゃったのさこれ？というか、私も行かなきゃな雰囲気？#nあっ、久しぶりのお出かけに――"
101070-35 = "へぇ……ゲヘナも来るんだ？[ruby=・]あ[/ruby][ruby=・]の[/ruby]万魔殿が。"
101070-36 = "……。"
101070-37 = "ミカさん……お願いですから……"
101070-38 = "えっ？なになにナギちゃん？#nトラブルなんか起こさないよ？心配しないでよね☆"
101070-39 = "先生もいるのに、そんなことするわけないじゃん、ね？"
101070-44 = "……。"
101070-45 = "はぁ……また面倒なものが……"
101070-46 = "そうだ！そうなのだ！#nついに、この時が来たのだぞイロハ！"
101070-47 = "えっと、何の話ですか……？"
101070-48 = "連邦生徒会とシャーレ両方に、[ruby=パンデモニウム・ソサエティー]私たち万魔殿の存在[/ruby]を再認識させる時だ！ "
101070-49 = "既に、風紀委員への連絡は差し止めている！#nキキキッ……やつら無しで、私たちの計画を始めるのだ！"
101070-50 = "……何の計画なのか、先に教えてほしいですマコト先輩。 "
101070-51 = "あと、連邦生徒会が私たちとトリニティを同じ空間にはしないと思います。#n話の進行自体が危うくなりますし。"
101070-52 = "まあ、先生も来ると仰ってましたし、なんとかなるとは思いますが……"
101070-54 = "……未読メッセージが51,234件あります。 "
101070-57 = "……未読メッセージが51,235件あります。 "
101070-59 = "門主様！こちらを……"
101070-60 = "声を落とせ――既に目は通してある。"
101070-61 = "は、はい……！"
101070-62 = "妾が干渉する場ではないが、様子は見ておかねばな。"
101070-64 = "……珍しいですね。#n私たちのような辺境の自治区にまで、連絡が来るなんて。"
101070-65 = "にゃはは、最近、連絡が増えた気がしな～い？"
101070-66 = "……喜ばしいことではありませんよ、ニヤ様。"
101070-67 = "それもそうねぇ、にゃははは。 "
101070-68 = "――百花繚乱がいたら全部押し付けられたんだけど。"
101070-70 = "最近、会長の姿が見えないけど、何かあったの？"
101070-71 = "知らないの？先週クーデターがあったから、雪山に逃げてったよ。"
101070-72 = "また？今度は誰？"
101070-73 = "え？知らなーい。クーデターだって一回や二回じゃないし。"
101070-74 = "たしかに。#n今回は何日後に帰ってくるんだろ。"
101070-80 = "先生、連邦生徒会からメールが届きました。"
101070-81 = "行政官のリンさんが、主要自治区の代表生徒を招集するそうです。"
101070-82 = "むむ！リンさんから、先生宛の添付データもありますね……"
101070-84 = "キヴォトス全域で、超高濃度のエネルギー体が観測されたそうです。"
101070-86 = "でも実際のところ、目視での確認はできず……"
101070-87 = "各自治区が協力し合って、この現象の原因と正体を突き止めるのが、#n今回の招集理由だそうです！"
101070-88 = "色々な自治区の生徒が集まる分、意見の整理が難しいと判断したため、#n先生の力を借りたいとの事です！"
101070-89 = "[s] \"まとめてくれてありがとう、アロナ。\""
101070-90 = "はい！まもなく連邦生徒会側が手配した車が来るようです！#nサンクトゥムタワーまでの警護をしてくださるとか！"
101070-91 = "私は引き続き、リンさんから頂いた情報を調べてみますね。 "
101070-92 = "何かまた判明した情報があったら、お話しますね！"
101070-93 = "[s] \"うん、お願い。\""
101070-99 = "お迎えに上がりました、先生。"
101070-100 = "ここから先は、連邦生徒会の本部であるサンクトゥムタワーまで#n私たちが警護いたします。"
101070-101 = "[s] \"ヴァルキューレが？\""
101070-102 = "はい。シャーレの非常ヘリポートにヘリを用意しております。"
101070-104 = "こちらです、参りましょう。"
101070-105 = "[ns1] ヘリに乗る。\n[ns2] 内部に入る。"
101070-111 = "……。"
101070-112 = "……。"
101070-113 = "[s] \"移動で戦術輸送ヘリを使うなんて、なんだか豪華だね。\""
101070-114 = "……ええ、警察学校ですので。 "
101070-115 = "財政には余裕がある方ですから。"
101070-116 = "[ns3] \"……………………。\"\n[ns4] \"……………………？\""
101070-120 = "そもそもどうやらヴァルキューレ全体として、財政状況が良くないそうで……弾丸の補充にも一苦労です。"
101070-121 = "何だかこのままでは、ヴァルキューレ警察学校の武装がまるで貧弱みたいに見えてしまいそうです。"
101070-123 = "……。"
101070-124 = "……。"
101070-125 = "[ns5] \"君たちは誰？\"\n[ns6] \"ヴァルキューレの生徒じゃ、ないよね？\""
101070-128 = "……。"
101070-129 = "……。"
101070-135 = "[ns7] \"…………！！\"\n[ns8] \"カイザーPMC……！！\""
101070-138 = "勘がいいじゃないか先生。#nだが、少し気づくのが遅かったがな。"
101070-139 = "シャーレの先生を確保しました。 "
101070-140 = "ご苦労。では、引き続き計画を進める。"
101070-142 = "ふふっ……いかがでしょう、ジェネラル。#n任務は成功しましたか？"
101070-148 = "……ああ、無事確保した。"
101070-149 = "流石ですね。"
101070-150 = "先生を失った非常対策委員会は瓦解……#nリン行政官の権威は、地に落ちることでしょう。 "
101070-151 = "これで、シャーレ解体という私たちの目標にまた一歩――"
101070-152 = "……？"
101070-157 = "くっ……うっ……！？"
101070-161 = "……それは君の目標だろう？防衛室長。 "
101070-162 = "我々は最初から君の正義に興味は無い。#nむしろ、シャーレを解体する計画をそのまま進められては困る。"
101070-163 = "少し前に計画が変わったのでな。"
101070-168 = "プレジデント、私です。"
101070-169 = "ああ。#n将軍、計画はうまくいってるか？"
101070-170 = "はい、滞りなく。"
101070-173 = "ああそうだ。砂漠でオーパーツを見つけることができたからな。#n連邦生徒会の武力――あの防衛室と手を組む必要も無くなった。"
101070-174 = "ゲマトリアとの連携すら不要だ｡#nアレが我々の手にある以上､独断で動いても問題は無いだろう｡"
101070-175 = "君たちが連邦生徒会を掌握すれば、こちらでサンクトゥムタワーの行政制御権を確保しよう。"
101070-176 = "そうすれば、このキヴォトスの行政権限は連邦生徒会ではなく――#n――我々カイザーコーポレーションに移ることになる。"
101070-177 = "……ああ、心配するな。問題無い。"
101070-179 = "……分かりました。 "
101070-183 = "目標地点で、非常対策委員会が終了するまで待機。#n連邦生徒会が無防備になった隙を狙って、突入する。"
101070-184 = "ターゲットは、連邦生徒会の行政官、及び委員長だ。#n委員長は全員確保する必要は無い……ただし、行政官だけは必ず確保しろ。"
101070-185 = "分かりました。"
101070-186 = "防衛室長はいかがしましょう？"
101070-187 = "PMC本部の監獄に移送しろ。#nそこなら彼女の私兵にも見つからないだろう。"
101070-188 = "先生と防衛室長の不在――非常対策委員会はすぐに瓦解する。#n我々が連邦生徒会を掌握し、プレジデントがサンクトゥムタワーの行政制御権を確保すれば……D.U.に戒厳令が下されるだろう。"
101070-189 = "そうすれば、計画の第2段階に移行できる。"
101070-190 = "ジェネラル、先生はいかがしますか？"
101070-192 = "その時が来るまで、誰にも行方が分からないよう閉じ込めておけ。#nあとは……余計な真似をしないように脚でも一発撃っておけ。"
101070-193 = "イエッサー！"
101070-197 = "[ns] （銃口が……！）"
101070-203 = "次回;光の到来"
