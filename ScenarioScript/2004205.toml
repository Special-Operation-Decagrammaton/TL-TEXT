[translation]
2004205-1 = "O ponto alto do acampamento"
2004205-2 = "Arredores de Millennium - Área de Acampamento"
2004205-6 = "Ufa, a barraca está pronta..."
2004205-7 = "Agora é só aproveitar o acampamento!"
2004205-8 = "Obrigada, Sensei. #nAfinal, eu não estou acostumada com esse tipo de coisa..."
2004205-9 = "[s] \"De nada.\""
2004205-11 = "[ns] \"Então, o monstro apareceu?\""
2004205-12 = "Dizem que o monstro especial, o \"Corvo da Insônia\", só aparece à noite."
2004205-13 = "De acordo com informações da comunidade online, basta ligar a função de comunicação em um local específico por volta das 19h, mas..."
2004205-14 = "[s] \"Ainda são 2 da tarde, sabia?\""
2004205-15 = "Sim, mas é perigoso andar pela trilha da montanha ao anoitecer..."
2004205-16 = "Então decidi vir mais cedo, montar a barraca e esperar pelo \"Corvo da Insônia\"!"
2004205-17 = "Eu consigo matar o tempo de qualquer jeito!"
2004205-18 = "Hehe, é um plano perfeito, não é?"
2004205-19 = "[s1] \"Não é um plano ruim, mas...\"\n[s2] \"O que vamos fazer para passar o tempo?\""
2004205-22 = "Se eu tiver meu celular, a noite chega num piscar de olhos."
2004205-23 = "Podemos até assistir a um filme juntos..."
2004205-28 = "Ué, a bateria!?"
2004205-29 = "Por que... se eu carreguei direitinho ontem."
2004205-30 = "Não me diga que o cabo não estava conectado? #nO que eu faço, só restam 5%..."
2004205-34 = "S-Sensei... você não tem um carregador portátil?"
2004205-35 = "[s] \"Desculpe, eu esqueci...\""
2004205-39 = "Ah não, logo num dia tão importante, cometer um erro desses..."
2004205-40 = "Se eu deixar o celular desligado até as 19h, acho que ainda consigo encontrar o Corvo da Insônia..."
2004205-41 = "...Mas o que eu faço até lá!?"
2004205-42 = "[s3] \"Que tal aproveitar para observar a natureza?\"\n[s4] \"Que tal tentar desenhar alguma coisa?\""
2004205-45 = "...Não acho que vou conseguir me concentrar com essa preocupação da bateria."
2004205-46 = "Ah, não tem jeito."
2004205-47 = "Vou tentar meditar, igual à Chihiro-senpai..."
2004205-49 = "(Um tempo depois...)"
2004205-51 = "Que tédiooooo!"
2004205-52 = "Sensei, isso é entediante demais!"
2004205-53 = "Eu achei que tinha ficado de olhos fechados por um tempão, mas só se passaram 10 minutos!"
2004205-54 = "Não tem nada para fazer? #nVou acabar ficando maluca de tédio desse jeito!"
2004205-55 = "[s] \"Eu só trouxe livros comigo...\""
2004205-57 = "[ns] \"Vou dar uma olhada na mochila...\""
2004205-58 = "Vejamos..."
2004205-59 = "A lanterna de manivela... vou enjoar rápido."
2004205-60 = "A caixa de som sem fio... precisaria ligar o celular."
2004205-61 = "A TV portátil... não pega sinal aqui."
2004205-65 = "...Ué. #nEssa TV portátil, parece que já vi antes."
2004205-66 = "[s] \"Não foi aquela que você trouxe quando veio de plantão?\""
2004205-68 = "[ns] \"Você mexeu nela bastante, não foi?\""
2004205-69 = "Ah, é verdade...!"
2004205-70 = "Achei um jeito, Sensei!"
2004205-75 = "Se eu iniciar o firmware personalizado que instalei e ajustar o terminal... pronto!"
2004205-79 = "[ns] \"Tem um monstro espacial na tela...!?\""
2004205-80 = "Você lembra, Sensei?"
2004205-81 = "Quando eu estava viciada no desafio \"BOOM\", eu instalei isso em vários aparelhos eletrônicos do Schale, lembra?"
2004205-82 = "[s] \"Ah, aquele jogo retrô, né?\""
2004205-84 = "[ns] \"Fiquei surpresa quando o jogo começou no painel da geladeira...\""
2004205-85 = "Bom, acabei exagerando e levei uma bronca por isso..."
2004205-86 = "Enfim, essa TV portátil também tem o \"BOOM\" instalado!"
2004205-87 = "Ou seja, isso é um console dedicado ao \"BOOM\"!"
2004205-88 = "[s] \"Você pretende jogar \"BOOM\" até anoitecer?\""
2004205-89 = "Não, não pretendo jogar tanto assim."
2004205-90 = "Já zerei várias vezes e os gráficos são bem antigos, afinal."
2004205-91 = "Só pensei em passar o tempo por uns 30 minutos."
2004205-95 = "（Maki pega a TV portátil e entra na barraca）"
2004205-96 = "（...Mesmo depois de algumas horas, Maki não saiu da barraca）"
2004205-98 = "（Cerca de 5 horas depois...）"
2004205-101 = "[ns] Entro na barraca para chamar a Maki."
2004205-107 = "[wa:420]― [log=마키 캠핑]Ugh, [wa:1020]ugh...[/log]"
2004205-109 = "― [log=마키 캠핑]Morri no mesmo lugar de novo...[/log]"
2004205-112 = "[ns] \"Maki, você ainda está jogando...?\""
2004205-114 = "[ns] \"Já está na hora, mas――\""
2004205-116 = "[wa:640]― [log=마키 캠핑]Quer dizer, [wa:1020]os controles desse controle são difíceis...[/log]"
2004205-119 = "[wa:1000]― [log=마키 캠핑]Só falta o chefão final...[/log]"
2004205-121 = "― [log=마키 캠핑]Mas eu continuo errando no mesmo lugar...[/log]"
2004205-124 = "[ns] \"Você não tinha dito que já tinha zerado várias vezes...?\""
2004205-126 = "[wa:780]― [log=마키 캠핑]É diferente do habitual, então a dificuldade aumentou... [wa:2400]será que é por isso?[/log]"
2004205-128 = "― [log=마키 캠핑]Surgiu um espírito competitivo estranho em mim.[/log]"
2004205-131 = "[wa:1000]― [log=마키 캠핑]E não tem outro entretenimento aqui...[/log]"
2004205-133 = "― [log=마키 캠핑]Acabo me concentrando no jogo por causa disso.[/log]"
2004205-136 = "― [log=마키 캠핑]Será que [wa:1080]isso é o que chamam de o verdadeiro prazer de acampar?[/log]"
2004205-139 = "[ns] \"Já está na hora, tudo bem? Consegue terminar?\""
2004205-141 = "[wa:550]― [log=마키 캠핑]Hã!? [wa:680]Já está tão tarde assim!? [wa:1240]O que eu faço...[/log]"
2004205-144 = "[wa:750]― [log=마키 캠핑]Sensei~ [wa:1300]só mais uma vez... [wa:1470]prometo que essa é a última...[/log]"
2004205-146 = "― [log=마키 캠핑]Espera só mais um pouquinho![/log]"
2004205-154 = "Consegui!#nZerei, Sensei!"
2004205-155 = "Faz tempo que não fico tão vidrada no \"BOOM\" assim...#nPelo visto, tem coisas que só dá para aproveitar acampando mesmo."
2004205-156 = "Ué, sinto que estou esquecendo de algo importante..."
2004205-157 = "Ah, é, o celular!"
2004205-158 = "Sensei, que horas são agora?"
2004205-159 = "[s] \"7h30...\""
2004205-160 = "Já passaram 30 minutos!?#nE se ele tiver ido embora...!"
2004205-161 = "\"Corvo da Insônia\", apareça!"
2004205-162 = "<SYSTEM>O \"Corvo da Insônia\" voou para longe."
2004205-163 = "Ah não, ele fugiu!"
2004205-164 = "Eu vim até o acampamento no meu dia de folga#njustamente para capturar esse monstro especial..."
2004205-165 = "Já nem sei mais por que eu vim... ah..."
2004205-166 = "Já que cheguei até aqui, não posso voltar de mãos vazias..."
2004205-167 = "Sensei, pode marcar o tempo para mim?"
2004205-168 = "Já que as coisas ficaram assim,#nvou tentar um desafio de Time Attack no \"BOOM\" pela TV portátil!"
2004205-170 = "（Depois disso, passei o resto do tempo jogando com a Maki até tarde）"
