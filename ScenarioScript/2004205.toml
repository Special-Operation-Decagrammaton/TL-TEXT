[translation]
2004205-1 = "キャンプの醍醐味"
2004205-2 = "ミレニアム近郊・キャンプ場"
2004205-6 = "ふぅ、テントはこれでオッケーっと……。"
2004205-7 = "あとはキャンプを楽しむだけだね！"
2004205-8 = "ありがとう、先生。#nやっぱり、こういうのって慣れてないから……。"
2004205-9 = "[s] \"どういたしまして。\""
2004205-11 = "[ns] \"それで、モンスターは出てきた？\""
2004205-12 = "特殊モンスターの「不眠症カラス」は、夜にしか現れないんだって。"
2004205-13 = "ネットのコミュニティー情報によると、特定の場所で19時くらいに通信機能をオンにすれば良いらしいけど――"
2004205-14 = "[s] \"まだ昼の2時だよ？\""
2004205-15 = "うん、でも夕方に山道を歩くのは危ないし……。"
2004205-16 = "先に来てテントを張っておいて、「不眠症カラス」を待つことにしたの！"
2004205-17 = "時間ならいくらでも潰せるから！"
2004205-18 = "ふふっ、完璧な計画でしょ。"
2004205-19 = "[s1] \"悪くない計画だけど……。\"\n[s2] \"何をして過ごすの？\""
2004205-22 = "スマホさえあれば、あっという間に夜になってるよ。"
2004205-23 = "一緒に映画でも――"
2004205-28 = "あれ、バッテリーが！？"
2004205-29 = "どうして……昨日ちゃんと充電したのに。"
2004205-30 = "まさか、ケーブルが刺さってなかったとか？#nどうしよう、もう5％しか……。"
2004205-34 = "せ、先生……モバイルバッテリー持ってない？"
2004205-35 = "[s] \" ごめん、忘れちゃった……。 \""
2004205-39 = "うわーん、大事な日なのにこんなミスをするなんて……。"
2004205-40 = "19時まで電源を切っておけば、不眠症カラスには会えると思うけど……。"
2004205-41 = "……それまで何をしてれば良いの！？"
2004205-42 = "[s3] \"たまには自然を眺めてみるのはどう？\"\n[s4] \"絵を描いてみるのはどう？\""
2004205-45 = "……バッテリーが気になって今は集中できそうにないかな。"
2004205-46 = "うぅ、仕方ない。"
2004205-47 = "チヒロ先輩みたいに瞑想でもしてみよっか……。"
2004205-49 = "（しばらくして……）"
2004205-51 = "ひーーーまーーー！"
2004205-52 = "先生、退屈すぎるよ！"
2004205-53 = "ずっと目を閉じてたと思ったのに、まだ10分しか経ってないじゃん！"
2004205-54 = "何かない？#nこのままじゃ退屈でおかしくなりそう！"
2004205-55 = "[s] \"本しか持ってきてないんだよね……。\""
2004205-57 = "[ns] \"バッグを確認してみるよ……。\""
2004205-58 = "どれどれ……。"
2004205-59 = "手回しの懐中電灯は……すぐ飽きそう。"
2004205-60 = "ワイヤレススピーカーは……スマホの電源を入れる必要があるし。"
2004205-61 = "ポータブルテレビは……ここじゃ電波が入らない。"
2004205-65 = "……あれ。#nこのポータブルテレビ、見覚えがあるような。"
2004205-66 = "[s] \"前に当番で来た時、持って帰ったやつじゃない？\""
2004205-68 = "[ns] \"たしか色々と触ってたよね。\""
2004205-69 = "そっか……！"
2004205-70 = "良い方法が見つかったよ、先生！"
2004205-75 = "インストールしておいたカスタムファームウェアを起動して、端末を調整すれば……できた！"
2004205-79 = "[ns] \"画面に宇宙怪物が……！？\""
2004205-80 = "覚えてる、先生？"
2004205-81 = "あたしが「BOOM」チャレンジにハマってた時、シャーレのいろんな電子機器にインストールしてたじゃん？"
2004205-82 = "[s] \"あのレトロゲームのことだよね。\""
2004205-84 = "[ns] \"冷蔵庫のパネルでゲームが始まった時はビックリしたよ……。\""
2004205-85 = "まぁ、やりすぎて怒られたんだけどね……。"
2004205-86 = "とにかく、このポータブルテレビにも「BOOM」がインストールしてあるの！"
2004205-87 = "つまり、これは「BOOM」専用のゲーム機だよ！"
2004205-88 = "[s] \"夜になるまで「BOOM」をするつもり？\""
2004205-89 = "ううん、そこまで遊ぶつもりはないよ。"
2004205-90 = "何度もクリアしてるし、グラフィックも古いからね。"
2004205-91 = "とりあえず、30分くらい軽く時間を潰そうかなって。"
2004205-95 = "（マキはポータブルテレビを持って、テントの中に入った）"
2004205-96 = "（……数時間が経過しても、マキはテントから出てこなかった）"
2004205-98 = "（約5時間後……）"
2004205-101 = "[ns] マキを呼ぶために、テントの中に入る。"
2004205-107 = "[wa:420]― [log=마키 캠핑]うっ、[wa:1020]うぐぐ……。[/log]"
2004205-109 = "― [log=마키 캠핑]また同じとこで死んじゃった……。[/log]"
2004205-112 = "[ns] \"マキ、まだ遊んでるの……？\""
2004205-114 = "[ns] \"そろそろ時間だけど――\""
2004205-116 = "[wa:640]― [log=마키 캠핑]というか[wa:1020]パッドの操作ムズ……。[/log]"
2004205-119 = "[wa:1000]― [log=마키 캠핑]あとはもうラスボスだけなんだけど……[/log]"
2004205-121 = "― [log=마키 캠핑]同じとこでミスっちゃうんだよね……。[/log]"
2004205-124 = "[ns] \"何度もクリアしてるんじゃなかったっけ……？\""
2004205-126 = "[wa:780]― [log=마키 캠핑]普段と違うから難易度上がってるし……[wa:2400]だからなのかな。[/log]"
2004205-128 = "― [log=마키 캠핑]妙に競争心が湧いちゃって。[/log]"
2004205-131 = "[wa:1000]― [log=마키 캠핑]他に娯楽もないしさー……[/log]"
2004205-133 = "― [log=마키 캠핑]逆にゲームに集中しちゃうかんじ。[/log]"
2004205-136 = "― [log=마키 캠핑]もしかして、[wa:1080]これがキャンプの醍醐味ってやつなのかな？[/log]"
2004205-139 = "[ns] \"そろそろ時間だけど大丈夫？終われる？\""
2004205-141 = "[wa:550]― [log=마키 캠핑]えっ！？[wa:680]もうこんな時間！？[wa:1240]どうしよう……[/log]"
2004205-144 = "[wa:750]― [log=마키 캠핑]先生ぇ～[wa:1300]あともう一回だけ……[wa:1470]本当にこれで最後にするから……[/log]"
2004205-146 = "― [log=마키 캠핑]もうちょっとだけ待って！[/log]"
2004205-154 = "やった！#nクリアしたよ、先生！"
2004205-155 = "ここまで「BOOM」に熱中したのって、いつぶりだろう……#nやっぱり、キャンプでしか味わえないものもあるんだね。"
2004205-156 = "あれ、大事なことを忘れてるような……。"
2004205-157 = "そうだ、スマホ！"
2004205-158 = "先生、今って何時？"
2004205-159 = "[s] \"7時30分……。\""
2004205-160 = "もう30分も過ぎてるの！？#nいなくなってたらどうしよう……！"
2004205-161 = "「不眠症カラス」、出てきて！"
2004205-162 = "<SYSTEM>「不眠症カラス」はどこかへ飛んで行ってしまった。"
2004205-163 = "うわーん、逃げられちゃった！"
2004205-164 = "この特殊モンスターを捕まえるために、#nわざわざ休日にキャンプ場まで来たのにぃ……。"
2004205-165 = "なんのために来たのかもう分かんないよ……はぁ……。"
2004205-166 = "ここまで来て、手ぶらで帰るわけにはいかないし……。"
2004205-167 = "先生、時間を計ってくれる？"
2004205-168 = "こうなったからには、#nポータブルテレビで「BOOM」のタイムアタックにチャレンジするよ！"
2004205-170 = "（その後、マキと一緒に遅くまでゲームをして過ごした）"
