[translation]
42050-1 = "Episódio 5; A Sombra da Veterana"
42050-3 = "……Ei, o que está acontecendo aqui?"
42050-4 = "Eu estava checando as câmeras de segurança no nó próximo, quando de repente #n colocaram um saco de papel na minha cabeça……."
42050-6 = "E-eu também…… estava escondida quando fui atacada por trás……."
42050-7 = "Fui vendada e jogada em um lugar que não faço ideia de onde seja…… e fiquei rolando de um lado para o outro……."
42050-8 = "Ugh…… ainda estou me sentindo enjoada……."
42050-9 = "E por que a Saki também está amarrada aqui com a gente? #n Vocês não tinham entrado juntas com a Miyako?"
42050-10 = "Sobre isso…… eu também não entendo muito bem."
42050-11 = "Quando estávamos entrando no corredor central, recebi um impacto forte na cabeça……."
42050-12 = "Quando dei por mim, já estava assim."
42050-13 = "Quer dizer…… que fomos sequestradas?"
42050-14 = "Não sei os detalhes, mas……."
42050-15 = "Tsc…… baixamos demais a guarda."
42050-16 = "Ei…… o alvo que atacamos era um traficante de armas ilegal, certo……?"
42050-17 = "Se for esse o caso, por que nos manter vivas? Será que é para nos vender para algum lugar……?"
42050-18 = "Talvez nos enviem para um centro de pesquisa para testes de novas armas…… #n ou nos vistam com roupas cheias de babados para fazerem sabe-se lá o quê……."
42050-20 = "……A última parte não parece provável, não é?"
42050-21 = "Não se preocupem. A Miyako ainda está lá fora."
42050-22 = "Tenho certeza de que a Miyako virá nos salvar――"
42050-26 = "Pessoal, vocês estão bem!?"
42050-27 = "Miyako……!"
42050-28 = "Miyako-chan, você veio nos salvar……!"
42050-29 = "Ah…… bem…… é que……."
42050-31 = "……Eu também acabei sendo capturada."
42050-32 = "Essa é a quarta…… todas reprovadas."
42050-37 = "Se isso fosse um teste de CQB da SRT, todas teriam tirado nota vermelha."
42050-39 = "E-esse equipamento, não pode ser……."
42050-40 = "As veteranas do FOX Squad……? #n P-por que vocês estão aqui……."
42050-41 = "Bem, falando de um jeito simples―― foi uma pegadinha que preparamos para nossas calouras."
42050-42 = "Ouvi dizer que vocês têm estado ativas por todo Kivotos ultimamente, #n então achei que tivessem crescido um pouco…… mas parece que me enganei."
42050-43 = "Invadir um lugar desconhecido sem nenhum suporte…… #n é praticamente pedir para ser alvejada. Vocês acharam que estavam em um piquenique?"
42050-45 = "Calma, calma, Kurumi-chan. Já acabou, vamos deixar por isso mesmo."
42050-46 = "Acho que elas não esperavam por uma situação como essa. #n Além disso, para lidar com mercenários comuns ou traficantes de armas, aquela tática é suficiente."
42050-47 = "……Ingênuo. O inimigo nem sempre aparece exatamente como você espera."
42050-48 = "……Sinto muito."
42050-50 = "B-bom, vamos fazer uma pausa para um lanche! #n Eu fiz um monte de inarizushi!"
42050-51 = "Vamos conversar enquanto comemos, certo?"
42050-52 = "Acho que temos muitas coisas para colocar em dia."
42050-53 = "……Sim."
42050-55 = "Ah, qual é! Vocês se preocupam demais com detalhes. #n É por isso que a reação de vocês é lenta."
42050-56 = "O que vocês fariam se, em um lugar onde é difícil manusear a arma como agora, o inimigo aparecesse de outra direção?"
42050-57 = "……Trocar para a arma secundária e atirar, talvez?"
42050-58 = "No manual, sim. #n Mas, em combate real, a resposta correta é 'golpear diretamente com a coronha'."
42050-59 = "Em vez de trocar de arma, usar a coronha permite atacar o inimigo mais rapidamente. #n Bem, a resposta certa muda dependendo da proteção do inimigo e da distância, mas……"
42050-61 = "Ugh…… não sou boa em situações de combate que fogem do manual……."
42050-62 = "Não se torna uma veterana tão facilmente. #n Vocês precisam se esforçar mais."
42050-66 = "Hmm, essa textura é…… ovas de salmão? #n Surpreendentemente, combina bem com inarizushi."
42050-67 = "Ei, não pegue isso! Eu tinha deixado guardado para comer depois!"
42050-68 = "Ahaha, desculpa, desculpa. #n Não fique tão irritada na frente das calouras."
42050-69 = "Toma, vou te dar um com ovo."
42050-70 = "Eu não quero ovo! Eu quero ovas de salmão!"
42050-72 = "Ei, ei, nada de brigar. #nAinda tem um monte de inari-zushi aqui."
42050-76 = "Aqui, Miyu-chan, pode comer sem cerimônia."
42050-77 = "Ah, ahn... Será que alguém como eu pode mesmo comer um inari-zushi tão chique assim...?"
42050-78 = "Claro. Eu fiz pensando em comermos todos juntos."
42050-79 = "Mu-muito obrigada..."
42050-83 = "......É, é delicioso!"
42050-85 = "Ah~, fazia quanto tempo que eu não comia o inari-zushi da Nico-senpai?"
42050-86 = "Não se vende em lugar nenhum um inari-zushi com tantos temperos diferentes assim."
42050-87 = "Fufu, obrigada. Valeu a pena ter começado a preparar desde cedo."
42050-88 = "Especialmente o caldo para cozinhar o tofu frito, é uma receita original minha. #nAcho que você não vai encontrar em outro lugar."
42050-89 = "(...Falando nisso, parece que comi um inari-zushi parecido com este recentemente... #nSerá que foi impressão minha...?)"
42050-94 = "Aquele... eu gostaria de perguntar, #ncomo vocês me encontraram?"
42050-95 = "Não é por nada não, mas... eu achei que estava muito bem escondida..."
42050-97 = "Ah, por acaso você é a Miyu? #nA que dizem que tirou nota máxima no treinamento de camuflagem!"
42050-98 = "I-iiih...!?"
42050-99 = "Sério, foi uma camuflagem perfeita! #nEu não fazia ideia até a Nico me passar as coordenadas!"
42050-101 = "Mu-muito obrigada... vo-você está muito perto..."
42050-102 = "Você usa algum equipamento de camuflagem especial? #nTambém estou curiosa sobre a ampliação da sua mira!"
42050-103 = "U-uuuuu..."
42050-106 = "De, de qualquer forma, fico feliz em saber que quem comprou as armas foram as veteranas do FOX Squad. #nAssim, não parece que as armas da SRT serão usadas para o mal."
42050-107 = "Verdade. E se o dinheiro veio das veteranas, não precisamos nos preocupar com a procedência."
42050-111 = "..."
42050-112 = "Com licença, veteranas. Posso perguntar uma coisa?"
42050-113 = "Sim, claro. Pode perguntar o que quiser."
42050-114 = "...Naquele incidente, o que foi que vocês levaram do Schale?"
42050-115 = "Bem... isso é..."
42050-116 = "E então — quando o fechamento da SRT foi decidido, por que vocês atacaram o prédio do Conselho Estudantil Federal?"
42050-117 = "Isso é..."
42050-122 = "Ainda não podemos contar a vocês."
42050-123 = "...É confidencial?"
42050-124 = "Não."
42050-125 = "É porque, por enquanto, vocês ainda não estão do \"nosso\" lado."

42050-126 = "Espere um pouco. #nNós não somos todas agentes da SRT...?"
42050-127 = "Po-por que algo assim..."
42050-128 = "...Vou fazer uma pergunta."
42050-129 = "O que você faria se recebesse a missão de se opor ao sensei do Schale?"
42050-131 = "..."
42050-135 = "Exato, vocês não conseguem decidir."
42050-137 = "Pois as armas — elas têm valor justamente por não tomarem decisões por conta própria."
42050-139 = "Obrigado pelo seu árduo trabalho na execução de uma operação extremamente difícil, Capitã do Esquadrão Tsukiyuki."
42050-140 = "— A partir de hoje, o RABBIT Squad está dissolvido. #nCada membro do esquadrão deve atuar como um destacamento do FOX Squad a partir de agora."
42050-141 = "Dissolvido...? O RABBIT Squad...?"
42050-142 = "Não nos interpretem mal."
42050-143 = "Nós também não temos a intenção de prejudicá-las. #nRespeitaremos a autoridade que a Capitã Tsukiyuki possui."
42050-144 = "Ora, é apenas o caso de nós assumirmos novamente a responsabilidade que foi imposta às nossas subordinadas devido a um acidente repentino."
42050-145 = "De agora em diante, deixem todas as escolhas difíceis conosco."
42050-146 = "Mas... se for pela restauração da Academia Especial SRT, nós também temos determinação..."
42050-147 = "Todas vocês não estão exaustas por causa desse longo acampamento?"
42050-148 = "..."
42050-149 = "Não há mais necessidade de assumir a responsabilidade pela reconstrução da Academia SRT."
42050-150 = "Deixem o resto conosco e foquem em cumprir seu dever como armas."
42050-151 = "……Nós, o RABBIT Squad……."
42050-152 = "……Vamos lá, Capitã Tsukiyuki — tome uma decisão."
42050-153 = "Você não esqueceu qual é o seu dever como arma, esqueceu?"
42050-154 = "Não há nada mais patético do que brandir a justiça com uma faca enferrujada enquanto se está hesitante."
42050-155 = "Nó, nós……."
42050-157 = "[ns] \"……Espere um pouco!\""
42050-158 = "Ué, uma invasora?"
42050-159 = "Como você chegou aqui……!?"
42050-163 = "……Sensei [USERNAME]?"
42050-164 = "[s1] \"Olá, pessoal do FOX Squad.\"\n[s2] \"Aquele Inari Sushi de mais cedo estava delicioso.\""
42050-165 = "……Sensei [USERNAME]? Por que você está aqui?"
42050-166 = "……."
42050-167 = "……Sensei [USERNAME]? Por que você está aqui?"
42050-168 = "N-não me diga que você nos seguiu……?"
42050-169 = "[s3] \"É que de repente todos sumiram…….\"\n[s4] \"Fui perguntando pela cidade até encontrar vocês.\""
42050-177 = "……É um prazer conhecê-lo, Sensei [USERNAME]."
42050-178 = "Já ouvi falar muito sobre você. Dizem que foi você quem uniu Kivotos quando ela estava em pânico devido à ausência da Presidente do Conselho Estudantil Federal."
42050-179 = "……Em nome da Academia SRT, gostaria de expressar minha profunda gratidão."
42050-180 = "[s] \"De nada.\""
42050-181 = "No entanto, o que estou discutindo com a Capitã Tsukiyuki é um assunto interno da Academia SRT."
42050-182 = "Portanto, gostaríamos que deixasse o resto conosco."
42050-183 = "Pois ouvimos dizer que o senhor é um adulto que respeita a vontade dos alunos."
42050-184 = "[s] \"Isso é verdade.\""
42050-186 = "[ns5] \"Mas, como é algo repentino, parece que todos estão confusos.\"\n[ns6] \"Poderia dar um pouco mais de tempo para a Miyako?\""
42050-189 = "……Entendido."
42050-190 = "Como esperado do sensei do Schale. #nÉ um comentário digno de alguém que conquistou a confiança de todos os alunos."
42050-195 = "Nós…… detestamos adultos como você."
42050-196 = "[s] \"……Entendo.\""
42050-197 = "……Agora que o Dia D se aproxima, não há necessidade de se tornar um inimigo do sensei."
42050-198 = "——FOX Squad, retirar. #nTodos os membros do esquadrão devem retornar ao QG e se preparar para a próxima operação."
42050-206 = "……Capitã Tsukiyuki. #nAcabei de enviar uma coordenada para o seu smartphone."
42050-207 = "Se você pretende aceitar minha proposta, vá até esse local."
42050-208 = "Eu……."
42050-209 = "……Um dia, vocês também entenderão."
42050-210 = "……."
42050-214 = "Próximo episódio: A angústia da veterana"
