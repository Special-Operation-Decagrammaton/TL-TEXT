[translation]#[Texto revisado, mas pode haver alterações como Censura.] Em aguardo de revisão de formatação de texto. - Filipe 11/06.
42050-1 = "Episódio 5: A Sombra da Veterana"
42050-3 = "……Ei, alguém me explica o que diabos tá acontecendo aqui?"
42050-4 = "Eu tava monitorando as câmeras num nó de rede próximo e do nada... botaram um saco de papel na minha cabeça e me capotaram."
42050-6 = "E-Eu também... eu tava perfeitamente camuflada e alguém simplesmente me imobilizou por trás..."
42050-7 = "Me vendaram, me jogaram no chão e me arrastaram pra esse buraco escuro... ai... meu corpo todo dói..."
42050-8 = "Ugh... ainda tô com vontade de vomitar..."
42050-9 = "E por que diabos a Saki também tá amarrada aqui com a gente?#nVocê não tava liderando a invasão com a Miyako lá dentro?"
42050-10 = "É isso... que eu também não consigo entender."
42050-11 = "Quando eu fui virar o corredor central, meu cérebro apagou com uma pancada absurda..."
42050-12 = "Quando abri os olhos, eu tava amarrada igual um porco."
42050-13 = "Então quer dizer que... o nosso esquadrão inteiro foi capturado?"
42050-14 = "Não me pergunte como eles fizeram isso, mas estamos ferradas."
42050-15 = "Tch... eu baixei a guarda. Que erro amador e ridículo."
42050-16 = "Ei... o nosso alvo era uma gangue de traficantes de armas do mercado negro, certo...?"
42050-17 = "Se eles não mataram a gente, isso significa que nós fomos capturadas pra sermos vendidas vivas no submundo...?!"
42050-18 = "Será que vamos ser enviadas para algum laboratório sujo pra servirmos de cobaia química...?#nOu pior... eles vão nos vestir com aquelas roupas humilhantes e fazer... fazer..."
42050-20 = "……Acho que o seu cérebro tá indo longe demais, Moe."
42050-21 = "Não entrem em pânico. A Miyako não foi pega."
42050-22 = "A capitã vai limpar esse lugar e abrir essa porta pra gente a qualquer moment--"
42050-26 = "Meninas! Vocês estão feridas?!"
42050-27 = "Miyako...!"
42050-28 = "Miyako-chan! Graças a Deus você veio resgatar a gente...!"
42050-29 = "Ahm... na verdade... sobre isso..."
42050-31 = "……Eu também fui capturada."
42050-32 = "E assim termina o abate. Quatro coelhinhas presas. O esquadrão inteiro reprovado com louvor."
42050-37 = "Se isso fosse um exame oficial de CQB da SRT, vocês estariam varrendo o pátio por um ano."
42050-39 = "E-Espera... essas armas... essas fardas..."
42050-40 = "Vocês são... as veteranas do Esquadrão FOX...?!#nMas... como... por que vocês estão aqui...?"
42050-41 = "Resumindo a ópera: nós armamos uma festinha surpresa e vocês caíram direitinho no bolo."
42050-42 = "Os ventos de Kivotos só falavam do 'famoso e letal' Esquadrão RABBIT.#nEu achei que as calouras tinham criado garras de verdade... mas parece que continuam cegas e presunçosas."
42050-43 = "Invadir uma zona cega sem suporte e sem conhecer o terreno...?#nIsso não é tática militar, é implorar pra tomar um tiro na cabeça. Vocês acharam que tavam num acampamento de férias?!"
42050-45 = "Pega leve com as crianças, Kurumi-chan. O exercício já acabou."
42050-46 = "Não seja tão dura. Elas são inexperientes e o nosso nível tático é outro.#nPra varrer capangas da Kaiser ou traficantes de rua, o teatrinho delas funcionou até que bem."
42050-47 = "……Essa mentalidade mata. Nunca presuma que o inimigo vai agir dentro da sua caixinha de conforto."
42050-48 = "……Nós entendemos. Desculpe, veterana."
42050-50 = "Chega de sermão, vamos pro que interessa: a comida!#nEu preparei uma bacia de Inarizushis fresquinhos pra vocês!"
42050-51 = "Vamos comer e botar o papo em dia, que tal?"
42050-52 = "Acho que... nós temos muitas pendências pra acertar depois desse longo tempo."
42050-53 = "……Sim."
42050-55 = "Argh! Você pensa demais antes de agir, Saki!#nÉ por causa dessas pausas mentais que você tomou uma surra lá no corredor!"
42050-56 = "Se a sua arma principal engasgar ou ficar presa num corredor fechado e o inimigo brotar nas suas costas, qual é a sua reação tática?"
42050-57 = "……Largar o fuzil e sacar a arma secundária no coldre para suprimir?"
42050-58 = "No papel, perfeito.#nNa vida real, até você sacar a pistola, o seu cérebro já tá pintando a parede."
42050-59 = "Em combates letais e confinados, perder tempo trocando de arma é suicídio.#nVocê agarra o que tem na mão e esmaga o crânio dele com a coronha do fuzil."
42050-61 = "Urgh... a diferença entre a teoria da sala de aula e o banho de sangue real é monstruosa..."
42050-62 = "A maestria é forjada na base do trauma.#nTreine até seus ossos sangrarem se não quiser morrer."
42050-66 = "Uau, essa textura explodindo na boca... é ovas de salmão?#nNunca imaginei que combinasse tanto com Inarizushi."
42050-67 = "EI! Larga isso! Eu deixei essa peça guardada pra comer por último!!"
42050-68 = "Ahaha, foi mal, foi mal.#nNão perde a classe na frente das calouras, Kurumi."
42050-69 = "Toma, pega esse de ovo como compensação."
42050-70 = "Eu não quero o de ovo de galinha maldita! Eu quero as ovas!!"
42050-72 = "Meninas, comportamento. Sem brigas à mesa.#nAinda tem sushi de sobra pra todo mundo."
42050-76 = "Aqui, Miyu-chan. Coma sem medo."
42050-77 = "E-Eh... t-tem certeza de que um lixo como eu é digno de comer algo tão sofisticado que a veterana preparou...?"
42050-78 = "Que bobagem é essa. Eu cozinhei com todo o carinho do mundo pra vocês quatro comerem."
42050-79 = "M-Muito obrigada... me sinto honrada..."
42050-83 = "……Nossa... é divino...!"
42050-85 = "Haaa~ Fazia tanto tempo que eu não sentia o sabor da comida da Niko-senpai."
42050-86 = "Esse Inarizushi recheado com temperos exóticos... não se encontra em nenhum restaurante da cidade."
42050-87 = "Fufu, fico muito feliz em ouvir isso. Eu acordei de madrugada e passei horas no fogão preparando o caldo."
42050-88 = "O molho em que eu fervo a massa frita é uma receita secreta passada a sete chaves.#nEu duvido muito que vocês tenham provado algo parecido por aí."
42050-89 = "（……Peraí. Eu tenho a nítida lembrança de ter comido um sushi de gosto incrivelmente parecido há poucos dias...#nSerá que eu tô enlouquecendo...?）"
42050-94 = "Veteranas... com todo o respeito...#nComo vocês descobriram a minha posição no telhado?"
42050-95 = "Eu não quero soar arrogante, mas... a minha camuflagem estava termicamente anulada e o ângulo era cego..."
42050-97 = "Ah, então você é a famosa Miyu?!#nA lenda viva que gabaritou o exame de infiltração furtiva da SRT?!"
42050-98 = "Hiiiih...!! Sim... perdão...!!"
42050-99 = "Cara, sua camuflagem era assustadora de tão perfeita!#nSe a Niko não tivesse me passado as suas coordenadas precisas no ponto eletrônico, eu juro que teria pisado em você sem perceber!"
42050-101 = "O-Obrigada pelo elogio... m-mas veterana, você está perto demais..."
42050-102 = "Que tipo de manto térmico experimental você tava usando?!#nE o zoom daquela mira?! Me deixa dar uma olhada!!"
42050-103 = "Uuuuu... alguém me salva..."
42050-106 = "Bem, pondo as brincadeiras de lado... é um alívio saber que o nosso arsenal furtado acabou nas mãos do Esquadrão FOX.#nPelo menos sei que o armamento da SRT não tá nas ruas atirando em civil."
42050-107 = "Concordo. E como foram vocês que nos pagaram em espécie, a gente nem precisa suar frio rastreando a origem do dinheiro."
42050-111 = "……"
42050-112 = "Com licença, Capitã Yukino. Tem uma peça nesse quebra-cabeça que não encaixa."
42050-113 = "Pode falar, Miyako. Sou toda ouvidos."
42050-114 = "……Durante a crise... o que exatamente vocês roubaram do cofre da Schale?"
42050-115 = "Ahm... sobre isso... nós..."
42050-116 = "E mais. Quando o conselho assinou a ordem de encerramento da SRT... por que o Esquadrão FOX executou um atentado terrorista contra o prédio do Governo Estudantil Geral?!"
42050-117 = "Isso é..."
42050-122 = "Vocês não têm autorização de segurança para ouvir essas respostas."
42050-123 = "……Arquivos Confidenciais?"
42050-124 = "Negativo."
42050-125 = "É porque, no momento, vocês ainda não se provaram leais aos 'Nossos' objetivos."
42050-126 = "Como assim?!#nNós somos do mesmo sangue! Somos todas SRT!"
42050-127 = "P-Por que a frieza de repente, veteranas...?"
42050-128 = "……Deixe-me testar a lealdade de vocês."
42050-129 = "Se a missão exigir que vocês puxem o gatilho e eliminem o Sensei da Schale... vocês puxariam?"
42050-131 = "……"
42050-135 = "O seu silêncio já é a resposta. O cérebro de vocês está contaminado por laços e emoções fúteis."
42050-137 = "A única utilidade e valor de uma arma―― reside no fato de que ela não pensa, ela apenas executa."
42050-139 = "O sacrifício que vocês fizeram mantendo as engrenagens rodando nessas ruas imundas até agora foi notável, Capitã Tsukiyuki."
42050-140 = "――Mas a brincadeira de vocês acaba hoje. O Esquadrão RABBIT está oficialmente dissolvido.#nA partir deste segundo, vocês quatro são soldados rasos sob a custódia total do Esquadrão FOX."
42050-141 = "Dissolvido...?! Apagar o Esquadrão RABBIT...?!"
42050-142 = "Mantenha a calma. Ninguém vai machucar vocês."
42050-143 = "Não vejam isso como um rebaixamento. E as suas habilidades de liderança ainda serão úteis."
42050-144 = "Mas vocês são apenas calouras. O peso do mundo caiu sobre seus ombros de forma covarde quando a escola fechou.#nNós, as veteranas, estamos apenas tomando a responsabilidade que nunca deveria ter sido de vocês de volta."
42050-145 = "De agora em diante, não pensem. Deixem as escolhas morais cruéis para nós e durmam em paz."
42050-146 = "Não! Se as mãos vão ficar sujas de sangue pela ressurreição da SRT, nós também carregamos a nossa parcela de――"
42050-147 = "Vocês estão quebradas. O frio do parque, a fome, a guerra de trincheiras esgotou a alma de vocês."
42050-148 = "……"
42050-149 = "O fardo da 'Reconstrução' não pertence a cadetes do primeiro ano."
42050-150 = "Entreguem suas mentes a nós e se concentrem apenas em puxar o gatilho quando mandarmos. Sejam armas perfeitas."
42050-151 = "……O nosso esquadrão RABBIT não é uma ferramenta cega..."
42050-152 = "……A decisão final é sua, Capitã Tsukiyuki. Qual é a sua resposta?"
42050-153 = "Vocês não esqueceram qual é o propósito de uma arma, esqueceram?"
42050-154 = "Uma lâmina cega e enferrujada pela hesitação, balbuciando sobre moralidade na frente do inimigo... é patética."
42050-155 = "Nós, não podemos..."
42050-157 = "[ns] \"……Ei, abaixem as armas! Parem com isso agora!\""
42050-158 = "Hã?! Quem deixou o invasor entrar?!"
42050-159 = "As portas estavam seladas! Como ele entrou...?!"
42050-163 = "……Sensei?!"
42050-164 = "[s1] \"E aí, garotas do Esquadrão FOX. Quanto tempo.\"\n[s2] \"O Inarizushi secreto da Niko estava espetacular, a propósito.\""
42050-165 = "……Sensei?! O que o senhor está fazendo nessa zona vermelha?!"
42050-166 = "……"
42050-167 = "……Sensei?! O que o senhor está fazendo nessa zona vermelha?!"
42050-168 = "V-Você veio seguindo os nossos passos na chuva furtivamente...?!"
42050-169 = "[s3] \"Quando eu percebi, as coelhinhas já tinham sumido do parque sem dar tchau...\"\n[s4] \"Fiquei preocupado e vim rastreando o cheiro de pólvora pela cidade até achar o buraco.\""
42050-177 = "……Eu presumo que as apresentações não sejam necessárias, Sensei da Schale."
42050-178 = "Nós ouvimos muitos contos de fadas a seu respeito. O 'Farol de Esperança' que segurou as rédeas de Kivotos e apaziguou o caos quando o trono ficou vazio..."
42050-179 = "……Em nome da extinta Academia SRT, eu deveria expressar minha profunda gratidão por salvar nossa cidade."
42050-180 = "[s] \"Agradecer é o mínimo. Mas eu não estou aqui por vocês.\""
42050-181 = "Entendo. Mas as negociações que estou conduzindo com a Capitã Tsukiyuki são assuntos internos e militares estritamente ligados à SRT."
42050-182 = "Sendo assim, convido você a se retirar imediatamente da zona e nos deixar resolver o nosso problema de insubordinação."
42050-183 = "Afinal... os boatos dizem que o nobre Sensei sempre respeita a 'vontade' e a autonomia de suas amadas alunas, não é mesmo?"
42050-184 = "[s] \"A vontade delas é a única bússola que eu sigo.\""
42050-186 = "[ns5] \"Mas dar um xeque-mate psicológico nelas em um porão escuro não é 'respeitar a vontade de ninguém'.\"\n[ns6] \"Elas estão acuadas. Você vai dar espaço e tempo para a Miyako pensar, ou eu vou ter que me meter na força bruta?\""
42050-189 = "……Como desejar, Sensei."
42050-190 = "Admito que sua língua é tão afiada quanto sua reputação. Vejo por que tantos peões estão dispostos a morrer por você."
42050-195 = "E é exatamente por isso... que eu sinto repulsa por adultos da sua laia."
42050-196 = "[s] \"……Fico honrado com o ódio, Yukino.\""
42050-197 = "……O Dia-D se aproxima e os ponteiros estão contra nós. Derramar sangue da Schale hoje traria complicações políticas desnecessárias ao conselho."
42050-198 = "――Esquadrão FOX, abortar missão atual e preparar exfiltração imediata.#nRecuar para o QG e polir o equipamento para a operação final."
42050-206 = "……Ouça com atenção, Capitã Tsukiyuki.#nAcabo de injetar as coordenadas de um ponto de encontro criptografado no seu celular tático."
42050-207 = "Se ainda restar uma gota de lealdade à SRT nas suas veias e você decidir se curvar à minha oferta... encontre-me lá."
42050-208 = "Eu... eu não sei..."
42050-209 = "……Pense a respeito. Cedo ou tarde, a névoa vai dissipar e vocês vão enxergar o lado certo da história."
42050-210 = "……"
42050-214 = "Próximo Episódio: A Agonia das Calouras"