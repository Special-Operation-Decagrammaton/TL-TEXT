[translation]
10026080-1 = "第8話;調査ポイントE「滝裏の洞窟」"
10026080-4 = "……あっ、ようやく見えてきました！"
10026080-5 = "それにしても、長い道のりでしたね。#n随分と登ってきたように思いますし……。"
10026080-6 = "滝の裏に、秘密の洞窟ですか……。"
10026080-7 = "たしかに、外から見るだけでは、その存在に気づけませんね。#nいかにも聖徒会の秘密が隠されていそうな……"
10026080-8 = "みなさん、お揃いですね？"
10026080-9 = "は～い。"
10026080-10 = "は、はい……なんとか……。"
10026080-11 = "先生、少しお疲れのようですし、休憩を入れましょうか？"
10026080-12 = "[s1] \"日頃の運動不足が……。\"\n[s2] \"もう少しは頑張れるよ……。\""
10026080-15 = "はは……そこそこ険しい道を登ってきましたからね。#nすみません、私がペース配分を考えていれば……"
10026080-16 = "あれ、ウイさんは……？#n先ほどまで私の隣に居たはずですが……"
10026080-17 = "ウイさん……？"
10026080-21 = "ふうっ……はあっ……はぁ……ふぅ……はぁ……"
10026080-22 = "……ああっ……もう……どうして……本当に最悪……"
10026080-23 = "いや……また……よくない、言葉が……ふぅ……はぁ……"
10026080-24 = "はぁ……なんとか……着きまし、た……"
10026080-29 = "ウイさん！？"
10026080-31 = "ふはぁ……ちょっとは、落ち着きました……#n待っていただきありがとうございます……。"
10026080-32 = "まったく……まともに道も整備されてませんし……#n遺跡の調査に来たはずが、どうして山登りを……。"
10026080-33 = "でも……おそらく、それだけ重要な物があるのでしょう。"
10026080-34 = "……私たちが今まで調べてきた場所は、全てカモフラージュ。"
10026080-37 = "この先に隠された、聖徒会の恐ろしい秘密から目を逸らすための……"
10026080-38 = "もしかしたら、拷問室や処刑場……#nいえ、もっと恐ろしい儀式を執り行う場の可能性も……！"
10026080-39 = "そして、ついに……隠されてきたシスターフッドの真相が……！！"
10026080-43 = "[ns3] \"ウイ、それ以上はストップだよ。\"\n[ns4] \"気をつけるって、約束したよね？\""
10026080-46 = "……あ。"
10026080-47 = "また余計な言葉を……"
10026080-48 = "え、えっと……実際に見てみないことには、分かりませんし……はい。#nな、何も見つからないことを、願っています……よ。"
10026080-49 = "どうか、何も見つかりませんように……"
10026080-53 = "……うぅ。"
10026080-54 = "すみません。自分の言葉なのに、違和感が……慣れないことはするもんじゃないですね……"
10026080-55 = "[s5] \"まだ一日目だからね、これからだよ。\"\n[s6] \"とりあえず、調査を始めようか？\""
10026080-58 = "はい……。"
10026080-60 = "滝の洞窟の中"
10026080-62 = "ここが……滝の中……まさか、本当に洞窟があるとは……。"
10026080-63 = "外からは、全く見えませんでしたね。#nたしかに、これなら秘密が隠されていてもおかしくなさそうです。"
10026080-68 = "ん……？"
10026080-69 = "[s7] \"……ウイ？\"\n[s8] \"どうかしたの？\""
10026080-72 = "す、すみません……！水の音がうるさいので……！"
10026080-73 = "……よく聞こえなくて……！"
10026080-74 = "なるほど……"
10026080-75 = "……■■■■■■■■■■■■■♡"
10026080-76 = "■■■■■■■■♡♡♡"
10026080-77 = "[s] \"……？\""
10026080-78 = "ふふっ。ここでなら、何を言っても問題ありませんね。#nコハルちゃんもどうですか？"
10026080-79 = "やらないわよ！なんでやると思ったの！？"
10026080-80 = "[s9] \"こ、この辺りは何かないかな……！\"\n[s10] \"よし、調査しよっか……！\""
10026080-85 = "（全員で洞窟の中に入り……）"
10026080-86 = "（しばらく進んだところで、大きな木箱がいくつか現れた）"
10026080-87 = "[ns11] \"あれ、これは……。\"\n[ns12] \"木箱……？\""
10026080-90 = "な、なぜこんなところに箱が……？"
10026080-91 = "それも、人の身長くらいはありそうです。まるで……"
10026080-95 = "…[ruby=ひつぎ]…棺で[/ruby]すかね。"
10026080-101 = "ここに置かれている理由は分かりませんが……#n見た目からして、他にないでしょう。"
10026080-102 = "ひ、棺ですか……！？#nど、どうして、こんなところに……！"
10026080-103 = "……ヒナタさん。それと……コハル、さんも。"
10026080-104 = "はい！？わ、私もですか……？"
10026080-105 = "すみませんが……#nお二人は少し離れたところで、後ろを向いて待っていただければと。"
10026080-106 = "……万が一に備えて、ですね。"
10026080-107 = "ま、万が一……？それは、どういう……"
10026080-108 = "もしかしたら……"
10026080-109 = "……本物の棺かもしれません。"
10026080-110 = "亡くなった方には失礼かと思いますが……これも、調査に必要ですので。"
10026080-111 = "で、でしたら！重いかもしれませんし、私が――"
10026080-112 = "――いえ、ヒナタさん。"
10026080-113 = "……！？"
10026080-114 = "お二人は、あちらで待っていてください。"
10026080-115 = "これは、私の気持ちの問題ですが……#n「もしも」の時、ヒナタさんに傷を負ってほしくはないんです。"
10026080-116 = "……なので、その……ここは私に任せてください。"
10026080-118 = "えっと……"
10026080-119 = "は、はい……ですが、もし何かあったら、すぐに声を上げてくださいね？"
10026080-125 = "……あの。"
10026080-126 = "私は一緒に居ても良いのですか……？"
10026080-127 = "……？"
10026080-128 = "あ……すみません。#nは、ハナコさんは、こういったものに耐性があるかと思いまして……"
10026080-129 = "もしアレでしたら、ハナコさんも後ろを向いていただいて大丈夫です。#n確認するだけですので、一人でも問題ありませんし。"
10026080-130 = "あはは……ウイさんは、私にどんなイメージを……"
10026080-131 = "……まあ、仰る通りですが。では、さっそく確認してみましょうか？"
10026080-132 = "先生も……よろしいですね？"
10026080-133 = "[s13] \"うん、大丈夫だよ。\"\n[s14] \"失礼にならないよう慎重にね。\""
10026080-136 = "……はい。"
10026080-137 = "それでは、少しずつ開けてみます。"
10026080-138 = "……うっ……お、重いですね。"
10026080-142 = "……暗くて中が……"
10026080-143 = "……えっ？"
10026080-144 = "あら、これはまた……"
10026080-148 = "……な、何ですか、今の音は！？"
10026080-149 = "な、なに！？どうなってるの！？"
10026080-155 = "またこうなってしまうのですね……。"
10026080-156 = "どうやら、招かれざる客がいらっしゃったみたいですね。"
10026080-157 = "……ふふっ。どちらかと言えば、私たちが招かれざる客のような気もしますけど。"
10026080-159 = "そ、そんな冗談を言っている場合では……"
10026080-165 = "[ns15] \"まずは外に出よう！\"\n[ns16] \"みんな、走るよ！\""
10026080-168 = "もう、なんで毎回こうなるのよ！？"
10026080-169 = "……では、指揮をお願いします。"
10026080-170 = "先生！"
