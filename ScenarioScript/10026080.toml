[translation]
10026080-1 = "Episódio 8; Ponto de Investigação E \"Caverna Atrás da Cachoeira\""
10026080-4 = "……Ah, finalmente conseguimos ver!"
10026080-5 = "Mas, nossa, que caminho longo, não é?#nSinto que subimos bastante……."
10026080-6 = "Uma caverna secreta atrás da cachoeira, é……."
10026080-7 = "Realmente, só de olhar de fora, é impossível notar a existência dela.#nParece exatamente o tipo de lugar onde os segredos da Associação de Estudantes estariam escondidos……"
10026080-8 = "Pessoal, estão todos aqui?"
10026080-9 = "Sim."
10026080-10 = "S-sim…… de alguma forma……."
10026080-11 = "Sensei, parece um pouco cansado, que tal fazermos uma pausa?"
10026080-12 = "[s1] \"A falta de exercício diário…….\"\n[s2] \"Ainda consigo aguentar um pouco…….\""
10026080-15 = "Haha…… subimos por um caminho bem íngreme, afinal.#nDesculpe, se eu tivesse pensado melhor no ritmo……"
10026080-16 = "Ué, onde está a Ui……?#nAté agora pouco ela estava ao meu lado……"
10026080-17 = "Ui……?"
10026080-21 = "Fuu…… haa…… haa…… fuu…… haa……"
10026080-22 = "……Ah…… chega…… por que…… sério, que horror……"
10026080-23 = "Não…… de novo…… não é bom, essas palavras…… fuu…… haa……"
10026080-24 = "Haa…… de alguma forma…… chegamos……"
10026080-29 = "Ui!?"
10026080-31 = "Fuhaa…… já me acalmei um pouco……#nObrigada por me esperarem……."
10026080-32 = "Francamente…… o caminho nem é pavimentado direito……#nEra para ser uma investigação de ruínas, por que estamos fazendo alpinismo……."
10026080-33 = "Mas…… provavelmente, é porque tem algo muito importante aqui."
10026080-34 = "……Os lugares que investigamos até agora, tudo não passava de camuflagem."
10026080-37 = "Para desviar a atenção dos segredos terríveis da Associação de Estudantes escondidos aqui adiante……"
10026080-38 = "Talvez, uma sala de tortura ou um local de execução……#nNão, pode ser até um lugar onde realizam rituais ainda mais aterrorizantes……!"
10026080-39 = "E, finalmente…… a verdade sobre a Sisterhood que estava escondida será revelada……!!"
10026080-43 = "[ns3] \"Ui, pare por aí.\"\n[ns4] \"Você prometeu que teria cuidado, lembra?\""
10026080-46 = "……Ah."
10026080-47 = "De novo falando demais……"
10026080-48 = "E-e, bem…… não saberemos até vermos com nossos próprios olhos…… sim.#nE-espero que não encontremos nada…… mesmo."
10026080-49 = "Por favor, que não tenha nada aqui……"
10026080-53 = "……Ugh."
10026080-54 = "Desculpe. Mesmo sendo minhas próprias palavras, sinto um desconforto…… Não deveria tentar fazer coisas às quais não estou acostumada……"
10026080-55 = "[s5] \"Ainda é o primeiro dia, é só o começo.\"\n[s6] \"Bom, vamos começar a investigação?\""
10026080-58 = "Sim……."
10026080-60 = "Dentro da caverna da cachoeira"
10026080-62 = "Então aqui é…… dentro da cachoeira…… quem diria que realmente existia uma caverna……."
10026080-63 = "De fora, não dava para ver nada.#nRealmente, não seria estranho se houvesse segredos escondidos aqui."
10026080-68 = "Hm……?"
10026080-69 = "[s7] \"……Ui?\"\n[s8] \"Aconteceu alguma coisa?\""
10026080-72 = "D-desculpe……! O barulho da água é muito alto……!"
10026080-73 = "……Não consigo ouvir direito……!"
10026080-74 = "Entendo……"
10026080-75 = "……■■■■■■■■■■■■■♡"
10026080-76 = "■■■■■■■■♡♡♡"
10026080-77 = "[s] \"……?\""
10026080-78 = "Fufu. Aqui, não tem problema falar qualquer coisa.#nKoharu-chan, quer tentar também?"
10026080-79 = "Eu não vou fazer isso! Por que você achou que eu faria!?"
10026080-80 = "[s9] \"E-eu vou ver se encontro algo por aqui……!\"\n[s10] \"Certo, vamos começar a investigar……!\""
10026080-85 = "(Todos entram na caverna……)"
10026080-86 = "(Depois de avançarem um pouco, vários caixotes de madeira apareceram)"
10026080-87 = "[ns11] \"Ué, isso é...\"\n[ns12] \"Uma caixa de madeira...?\""
10026080-90 = "Po-por que tem uma caixa em um lugar como este...?"
10026080-91 = "E ela parece ter quase a altura de uma pessoa. É como se fosse..."
10026080-95 = "…Um caixão, eu diria."
10026080-101 = "Não sei por que está aqui, mas...#npela aparência, não deve ser outra coisa."
10026080-102 = "U-um caixão...!?#nPo-por que, em um lugar como este...!"
10026080-103 = "……Hinata-san. E também... Koharu-san."
10026080-104 = "Sim!? E-eu também...?"
10026080-105 = "Desculpe, mas...#nserá que vocês duas poderiam se afastar um pouco e ficar de costas enquanto esperam?"
10026080-106 = "……É por precaução, caso aconteça algo."
10026080-107 = "Po-precaução...? O que você quer dizer com..."
10026080-108 = "Talvez..."
10026080-109 = "……Pode ser um caixão de verdade."
10026080-110 = "Sei que é desrespeitoso com quem quer que esteja lá dentro, mas... isso também é necessário para a investigação."
10026080-111 = "E-então! Pode ser pesado, eu posso—"
10026080-112 = "—Não, Hinata-san."
10026080-113 = "……!?"
10026080-114 = "Por favor, esperem ali."
10026080-115 = "É uma questão de sentimento pessoal...#nmas, se algo acontecer, não quero que a Hinata-san se machuque."
10026080-116 = "……Então, por favor... deixe isso comigo."
10026080-118 = "Bem..."
10026080-119 = "Tu-tudo bem... mas, se acontecer alguma coisa, por favor, chame a gente imediatamente, está bem?"
10026080-125 = "……Com licença."
10026080-126 = "Eu posso ficar aqui também...?"
10026080-127 = "……?"
10026080-128 = "Ah... desculpe. É que, Hanako-san, achei que você tivesse mais resistência para esse tipo de coisa..."
10026080-129 = "Se preferir, Hanako-san, você também pode ficar de costas. É só uma verificação, então não tem problema se eu fizer sozinha."
10026080-130 = "Ahaha... Ui-san, que tipo de imagem você tem de mim..."
10026080-131 = "……Bem, como você disse. Então, vamos verificar logo?"
10026080-132 = "Sensei também... está de acordo?"
10026080-133 = "[s13] \"Sim, tudo bem.\"\n[s14] \"Seja cautelosa para não ser desrespeitosa.\""
10026080-136 = "……Sim."
10026080-137 = "Então, vou abrir um pouco."
10026080-138 = "……Ugh... é, é pesado."
10026080-142 = "……Está escuro lá dentro e..."
10026080-143 = "……Eh?"
10026080-144 = "Ora, isso é..."
10026080-148 = "……O-o que foi esse barulho agora!?"
10026080-149 = "O-o que foi!? O que está acontecendo!?"
10026080-155 = "Então vai acabar assim de novo..."
10026080-156 = "Parece que temos convidados indesejados."
10026080-157 = "……Fufu. Se for por esse lado, sinto que nós é que somos os convidados indesejados."
10026080-159 = "E-esse não é o momento para piadas..."
10026080-165 = "[ns15] \"Primeiro, vamos sair daqui!\"\n[ns16] \"Pessoal, corram!\""
10026080-168 = "Meu Deus, por que isso acontece toda vez!?"
10026080-169 = "……Então, por favor, assuma o comando."
10026080-170 = "Sensei!"
