[translation]
80000141-1 = "Plano Perfeito (Provisório)"
80000141-2 = "[ns] \"Bom dia, Kei-chan!\""
80000141-3 = "Haa..."
80000141-4 = "[s1] \"Um suspiro!?\"\n[s2] \"Até que esse seu lado é bom, Kei-chan!\""
80000141-9 = "Francamente..."
80000141-10 = "..."
80000141-11 = "Por que eu..."
80000141-12 = "..."
80000141-13 = "...De qualquer forma, vou terminar o que tenho que fazer e voltar logo."
80000141-14 = "Aqui, pegue."
80000141-20 = "[ns] \"I-isso é...?\""
80000141-21 = "...Eu achei por aí agora pouco."
80000141-22 = "E como o Schale estava perto, por coincidência."
80000141-23 = "Só porque é Dia dos Namorados, você não estava esperando algo feito à mão ou um chocolate caro, estava?"
80000141-24 = "Impossível. #nPara o Sensei, um chocolate comprado em loja que eu achei é o suficiente."
80000141-25 = "(Embora eu tenha tentado dizer: 'Mesmo assim, fico feliz!')"
80000141-26 = "(Embora eu tenha tentado dizer: 'Mesmo assim, fico feliz!')"
80000141-27 = "(Olhando mais de perto...)"
80000141-29 = "[ns] \"...Hm?\""
80000141-30 = "A-aconteceu alguma coisa? #nÉ só um chocolate barato, então coma logo."
80000141-31 = "[ns] \"Isto...\""
80000141-33 = "[ns3] (Não parece uma embalagem de loja?)\n[ns4] (O formato do chocolate não parece algo produzido em massa...)\n[ns5] (Sinto um aroma diferente dos produtos industrializados)"
80000141-39 = "(De qualquer forma, coloquei o chocolate na boca)"
80000141-43 = "...O-o que foi?"
80000141-44 = "[s] \"Obrigado, Kei-chan.\""
80000141-45 = "D-do que você está falando?"
80000141-46 = "[ns] \"Você se deu ao trabalho de fazer.\"\n[ns] \"O gosto de sal está bem forte... mas, por isso mesmo, está gostoso!\""
80000141-49 = "...?"
80000141-50 = "...!?!?"
80000141-51 = "Hã!?!?!?!"
80000141-57 = "(Kei correu, mergulhou e enterrou o rosto na almofada do sofá)"
80000141-58 = "(Parece um avestruz, é fofo)"
80000141-68 = "Aaaaah!!! #nUwaaaaaaaah!!!"
80000141-69 = "I-isso é impossível, impossível, não deveria ser possível! #nPelo menos se eu tivesse provado antes...!!!"
80000141-70 = "E-estava tudo perfeito até a metade! #nEra um plano perfeito!!!"
80000141-72 = "[ns] \"Err... quer provar agora para ver?\""
80000141-73 = "Fique quieto por um momento!!!"
80000141-80 = "(Kei jogou a almofada com toda a força!)"
80000141-86 = "(Sensei desviou desesperadamente!)"
80000141-93 = "...Devolva."
80000141-94 = "[s] \"Mas é um chocolate feito à mão...\""
80000141-95 = "Já chega, devolva! #nDepois eu te dou um de verdade!!"
80000141-96 = "P-por que você insiste tanto nisso? Com certeza não está gostoso..."
80000141-97 = "Porque é o único no mundo...?"
80000141-101 = "!!!"
80000141-102 = "~~~~~~!!!"
80000141-109 = "(Enquanto fugia desesperadamente da Kei, comi mais um pedaço)"
80000141-111 = "[ns] \"Não entenda errado, Kei-chan. Está realmente gostoso.\""
80000141-112 = "Hã...?"
80000141-113 = "[s] \"...O sal está bem presente, mas isso é o que o torna bom.\""
80000141-114 = "Desta vez, eu vou matar o Sensei e..."
80000141-115 = "[s] \"Não pode ser...\""
80000141-116 = "Eu também vou morrer!!!!!!"
80000141-129 = "Por favor, não fale mais comigo, eu te odeio."
80000141-130 = "……?"
80000141-131 = "Não, utilidade...?"
80000141-132 = "O que você quer dizer com isso...?"
80000141-133 = "Comer com algo doce cria um ciclo infinito...?"
80000141-134 = "Se está calor lá fora, repor o sal é como matar dois coelhos com uma cajadada só...?"
80000141-135 = "……."
80000141-136 = "Você acha que isso é consolo!?!?"
80000141-137 = "……Haa."
80000141-141 = "……Não, o erro foi meu."
80000141-142 = "De qualquer forma, se eu tivesse ao menos provado antes...!!"
80000141-143 = "[s] \"Obrigado, Kei.\""
80000141-144 = "……Pelo quê? Por estar salgado?"
80000141-145 = "[s] \"Porque é verdade que eu fiquei feliz.\""
80000141-150 = "Nesse caso, eu te perdoo……."
80000141-151 = "……Fufu."
80000141-153 = "(Tirei os doces que estava escondendo e provei junto com a Kei)"
80000141-154 = "(A combinação ficou melhor do que o esperado e devoramos tudo num instante)"
80000141-160 = "(O chocolate, é claro...)"
80000141-166 = "(Também fiquei feliz por ter visto as várias expressões da Kei)"
