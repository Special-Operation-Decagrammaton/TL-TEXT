[translation]
10021015-13 = "……。"
10021015-14 = "Não dá... eu não consigo..."
10021015-15 = "Não consigo..."
10021015-17 = "Só isso... eu não consigo..."
10021015-18 = "Sensei, me desculpe... eu não consigo... é impossível..."
10021015-20 = "Eu não desejei que as coisas terminassem assim..."
10021015-24 = "……。"
10021015-25 = "……Entendo."
10021015-30 = "Plana-pathes silenciou — e Shiroko, de outra linha temporal, caiu."
10021015-31 = "Haa... haa..."
10021015-32 = "N-nós vencemos...?"
10021015-33 = "Parece que sim..."
10021015-34 = "Por que... se eu deveria ter acumulado muito mais experiência..."
10021015-35 = "Lutei, me debati, sobrevivi... então por que...#npor que as coisas terminaram assim?"
10021015-37 = "Será que... ainda não foi o suficiente...?"
10021015-38 = "[ns] Aproxima-se de Shiroko, que está caída."
10021015-41 = "Sensei..."
10021015-42 = "[ns] \"Está tudo bem. Eu tenho algo que quero dizer àquela Shiroko.\""
10021015-44 = "Sim..."
10021015-50 = "Ah... é verdade."
10021015-51 = "Você disse que tinha algo para me contar, não disse, Sensei?"
10021015-52 = "O que é..."
10021015-53 = "[s] \"Então, agora eu quero que você me conte, Shiroko.\""
10021015-54 = "……Contar o quê?"
10021015-58 = "[ns1] \"O que, exatamente, aconteceu?\"\n[ns2] \"O que foi que aconteceu?\""
10021015-64 = "Por que..."
10021015-65 = "Por que você me perguntaria algo assim...?"
10021015-66 = "Eu já disse... eu sou a existência que destrói o mundo..."
10021015-67 = "Levei o mundo à ruína... matei o Sensei... usei a \"Arca\","
10021015-68 = "e vim até aqui para destruir também o mundo desta linha temporal..."
10021015-69 = "Você ainda quer saber... \"o que\" aconteceu comigo?"
10021015-74 = "Você acha que existe algum motivo por trás disso?#nPara mim... que estou tentando destruir o mundo."
10021015-75 = "[ns] \"…………。\""
10021015-78 = "……Mesmo que, como resultado disso, você seja traído por alguém?"
10021015-81 = "Por que... Sensei, por que você é assim...?"
10021015-82 = "[s3] \"Se o Sensei não acreditar em seus alunos, nada começará...\"\n[s4] \"Como adulto, eu quero acreditar em todos vocês.\""
10021015-85 = "………………………………。"
10021015-90 = "Sensei! Desculpe a demora!!"
10021015-91 = "Viemos ajudar, Sensei!!"
10021015-92 = "Depressa! Vai explodir a qualquer momento!!"
10021015-93 = "Sensei, Shiroko-chan... vocês estão bem?"
10021015-94 = "Hoshino-senpai, pessoal..."
10021015-95 = "Shiroko-chan, desculpe a demo—"
10021015-96 = "……Hm?"
10021015-100 = "……。"
10021015-101 = "Você é..."
10021015-117 = "U... uuu...………………!"
10021015-124 = "Uaaaaaaaah――――！！！！"
10021015-134 = "Aaaaaaaah――――！！！！"
10021015-135 = "Aaaaaaaaah――――！！！！"
10021015-136 = "……。"
10021015-137 = "……！？"
10021015-138 = "Ah……！？"
10021015-142 = "……。"
10021015-146 = "É, culpa... é minha culpa...!"
10021015-147 = "Porque eu estou aqui, o mundo... foi destruído...#nMesmo que eu não desejasse nada disso..."
10021015-150 = "Eu não desejei um fim como este..."
10021015-151 = "Eu não queria ter matado o Sensei...!"
10021015-152 = "Me desculpe... eu sou tão..."
10021015-153 = "Me desculpe por ser uma covarde que nem sequer conseguiu terminar o que começou.#nMas eu já... não aguento mais... é impossível, não dá mais..."
10021015-154 = "É minha culpa... tudo por causa de eu ter estado em Abydos..."
10021015-155 = "Se eu não estivesse aqui..."
10021015-156 = "Se ao menos eu não existisse――!!"
10021015-157 = "Se eu soubesse que acabaria assim... eu não deveria ter aceitado..."
10021015-158 = "Eu estava com frio, com fome... e nem sabia por que estava aqui..."
10021015-159 = "Mas era tão quente..."
10021015-160 = "Como era quente... eu não queria mais sentir frio..."
10021015-161 = "Eu não queria ficar sozinha...!"
10021015-164 = "Eu estava errada... Se naquela época eu não tivesse aceitado o cachecol e tivesse apenas caído..."
10021015-165 = "Já que ia acabar assim de qualquer jeito..."
10021015-166 = "Se fosse assim... Se eu tivesse percebido isso mais cedo... talvez o Sensei... talvez todos estivessem vivos."
10021015-167 = "Porque eu estou aqui... porque eu cometi um erro...!"
10021015-170 = "Me desculpe..."
10021015-171 = "Por matar o Sensei... por destruir o mundo... me desculpe..."
10021015-172 = "O Sensei... foi engolido pelo Cromatismo..."
10021015-173 = "Ele me chamou aqui... para apagar todos os mundos."
10021015-174 = "Eu... eu sou..."
10021015-176 = "……！"
10021015-177 = "O, o que isso significa...！？"
10021015-178 = "……N, não pode ser."
10021015-184 = "……Parece algo que a 'eu' de outra linha temporal vivenciou."
10021015-185 = "Sim...?"
10021015-186 = "O quê... isso quer dizer que...!"
10021015-187 = "O mundo foi destruído...?#nO Sensei...?"
10021015-188 = "……。"
10021015-191 = "[ns] \"Shiroko...\""
10021015-193 = "[ns] \"Você sofreu por muito tempo, não foi?\""
10021015-197 = "……Entendi."
10021015-198 = "Eu sempre fiquei intrigada com o olhar daquela 'Shiroko'..."
10021015-199 = "Mas, depois de ouvir as palavras do Sensei agora, finalmente entendi."
10021015-202 = "Aquele é... um olhar que a 'Shiroko-chan' jamais teria."
10021015-203 = "Mas eu já tinha visto em algum lugar... e me trazia uma sensação nostálgica."
10021015-204 = "Quem será que era... havia alguém parecido."
10021015-205 = "Hmm..."
10021015-206 = "Ah..."
10021015-207 = "Lembrei."
10021015-210 = "Você estava aqui."
10021015-213 = "Francamente... eu te procurei tanto,"
10021015-214 = "……Senpai Yume."
10021015-218 = "……Igual a mim."
10021015-219 = "Eu achei que parecia familiar... e faz sentido, não é?#nAquilo era igual a mim."
10021015-221 = "……。"
10021015-222 = "……E-Ei, hum...#nEssa Shiroko-senpai veio de outro mundo, certo?"
10021015-223 = "Sim, é isso."
10021015-224 = "Pela habilidade de \"interpretação multidimensional\" da Arca...?#nEspere, então..."
10021015-225 = "M-Mas é isso mesmo, não é...!?"
10021015-226 = "Essa \"Shiroko\" é uma das possibilidades do que eu poderia me tornar..."
10021015-231 = "……O cachecol."
10021015-235 = "Você ainda o tem, não é?"
10021015-236 = "Eu... onde será que eu o coloquei?"
10021015-237 = "Não consigo me lembrar... quando foi que eu o perdi... eu já não sei mais."
10021015-238 = "Era algo tão importante, por que será..."
10021015-239 = "Foi depois que a Hoshino-senpai morreu...?"
10021015-240 = "Quando a Serika desapareceu...?"
10021015-241 = "Ou quando a Ayane desligou o suporte de vida?"
10021015-242 = "Quando recebi a notícia de que a Nonomi tinha deixado Abydos e \"se tornado aquilo\"? Ou então——"
10021015-243 = "——Quando recebi a notícia de que não havia mais chances de ressuscitar o Sensei?"
10021015-245 = "Quando foi, mesmo... eu——"
