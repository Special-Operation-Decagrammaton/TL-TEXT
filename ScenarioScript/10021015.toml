[translation]
10021015-13 = "……。"
10021015-14 = "だめ……私には……"
10021015-15 = "できない……"
10021015-17 = "これだけは……私には……"
10021015-18 = "先生、ごめんなさい……私には……無理……"
10021015-20 = "こんなことを、望んだわけじゃないの……"
10021015-24 = "……。"
10021015-25 = "……そっか。"
10021015-30 = "プレナパテス、沈黙――そして、別の時間軸のシロコさんは、倒れました。"
10021015-31 = "はぁ……はぁ……。"
10021015-32 = "か、勝ったのでしょうか……私たち。"
10021015-33 = "そうみたいだね……"
10021015-34 = "どうして……私の方がたくさん経験を積んできたはずなのに……"
10021015-35 = "戦って、藻掻いて、生き抜いて……なのにどうして……#nこうなってしまったんだろう。"
10021015-37 = "まだ……足りなかったのかな……。"
10021015-38 = "[ns] 倒れているシロコに近づく。"
10021015-41 = "先生……"
10021015-42 = "[ns] \"大丈夫。あのシロコに伝えたいことがあるんだ。\""
10021015-44 = "うん……。"
10021015-50 = "ああ……そうだった。"
10021015-51 = "伝えたいことがあるって……言ってたよね、先生。"
10021015-52 = "何を――"
10021015-53 = "[s] \"それじゃあ今度は教えてほしいんだ、シロコ。\""
10021015-54 = "……何を？"
10021015-58 = "[ns1] \"一体、「何」があったの？\"\n[ns2] \"「何」が、起きたの？\""
10021015-64 = "どうして……"
10021015-65 = "そんなことを、聞くの……？"
10021015-66 = "言ったでしょ……私は、世界を滅ぼす存在……"
10021015-67 = "世界を滅亡に導いて……先生を殺して……「箱舟」を利用して、"
10021015-68 = "今度は、別の時間軸の世界までも滅亡させるためにやってきた、と……。"
10021015-69 = "そんな私に、「何」があったか……聞く、の？"
10021015-74 = "何か、事情があると、思ってるの？#n世界を滅亡させようとする……私に。"
10021015-75 = "[ns] \"…………。\""
10021015-78 = "……たとえその結果として、誰かに裏切られても？"
10021015-81 = "どうして……先生はどうして、そんなに……。"
10021015-82 = "[s3] \"先生が生徒を信じないと、何も始まらない……。\"\n[s4] \"大人だから、みんなを信じたい。\""
10021015-85 = "………………………………。"
10021015-90 = "先生！お待たせしました！！"
10021015-91 = "助けに来ましたよ、先生！！"
10021015-92 = "急いで！そろそろ爆発するわよ！！"
10021015-93 = "先生、シロコちゃん……大丈夫？"
10021015-94 = "ホシノ先輩に、みんな……"
10021015-95 = "シロコちゃん、お待た――"
10021015-96 = "……ん？"
10021015-100 = "……。"
10021015-101 = "君は……"
10021015-117 = "う……ううっ…………っ…………！"
10021015-124 = "うあああぁぁぁあああ――――！！！！"
10021015-134 = "あああぁぁぁあああああああ――――！！！！"
10021015-135 = "あああぁぁぁぁぁあああああああ――――！！！！"
10021015-136 = "……。"
10021015-137 = "……！？"
10021015-138 = "あっ……！？"
10021015-142 = "……。"
10021015-146 = "わ、たし……わたし、の、せい、なの……！"
10021015-147 = "わたし、が、いるから、せかいが……滅亡、した……#nそんな、こと、望んで、ないのに……"
10021015-150 = "こんな結末、望んで、なかった……"
10021015-151 = "先生を、殺したく、なかった……！"
10021015-152 = "ごめん、なさい……わたし、は、こんな……"
10021015-153 = "最後、まで、やり通せもしない、意気地なしで、ごめんなさい。#nでも、私は、もう……だめ……むり、だよ、もう……"
10021015-154 = "わたしの、せい……すべて、は、わたし、がアビドスに、いたせい……"
10021015-155 = "わたし、が、いなければ……"
10021015-156 = "わたし、さえ、いなければ――！！"
10021015-157 = "こうなると、分かって、いたら……もらう、べきじゃ、なかった……"
10021015-158 = "さむくて、おなかへってて、……なんで、ここにいるのかも、分からなくて……"
10021015-159 = "でも、あたたかくて……"
10021015-160 = "あたたかい、から……もう、これ以上、さむいのは、イヤ、だから……"
10021015-161 = "さみしい、のは、イヤ、だから……！"
10021015-164 = "私が、間違っていたの……あの時、マフラーをもらわずに、そのまま、倒れていたら……"
10021015-165 = "どうせ、こうなって、しまうのなら……"
10021015-166 = "そうしたら……私が……早く、そのことに気付いていたら、先生は――みんなは、生きて、いたかも、しれないのに。"
10021015-167 = "私が、ここにいるから……私が、間違ったせいで……！"
10021015-170 = "ごめんなさい……"
10021015-171 = "先生を殺して……世界を滅ぼして……ごめんなさい……"
10021015-172 = "先生が……色彩に、飲み込まれて……"
10021015-173 = "私を、ここに呼んだの……すべての世界を、消すために。"
10021015-174 = "私……わたし、は……"
10021015-176 = "……！"
10021015-177 = "ど、どういうことなの……！？"
10021015-178 = "……ま、まさか。"
10021015-184 = "……別の時間軸の私が経験したこと、みたい。"
10021015-185 = "はい……？"
10021015-186 = "なっ……それって……！"
10021015-187 = "世界が滅亡……？#n先生が……？"
10021015-188 = "……。"
10021015-191 = "[ns] \"シロコは……\""
10021015-193 = "[ns] \"ずっと、苦しんでいたんだね。\""
10021015-197 = "……そっか。"
10021015-198 = "おじさんさ、「シロコ」の眼差しが、ずっと気になってたんだよね……"
10021015-199 = "でも、今の先生の言葉を聞いて、やっと分かったよ。"
10021015-202 = "あれは……「シロコちゃん」は絶対にしない眼差し。"
10021015-203 = "でも、どこかで見たことがあって……懐かしい感じがしたんだ。"
10021015-204 = "誰だったかな……似てる人が、いたんだよね。"
10021015-205 = "うーん……"
10021015-206 = "ああ……"
10021015-207 = "思い出した。"
10021015-210 = "ここに居たんですね。"
10021015-213 = "まったく……探しましたよ、"
10021015-214 = "……ユメ先輩。"
10021015-218 = "……私と同じ。"
10021015-219 = "見覚えがあると思ったんだけど……それもそうだよね。#nアレは、私と同じだったんだよ。"
10021015-221 = "……。"
10021015-222 = "……え、ええっと……#nこちらのシロコ先輩は、別の世界から来た、んですよね？"
10021015-223 = "うん、そう。"
10021015-224 = "箱舟の「多次元解釈」の能力で……？#nあれ、それでは……"
10021015-225 = "で、でもそういうことなのよね……！？"
10021015-226 = "この「シロコ」は、私がそうなる可能性の一つ……"
10021015-231 = "……マフラー。"
10021015-235 = "あなたは、まだ持ってるんだね。"
10021015-236 = "私は……どこにやったんだっけ。"
10021015-237 = "思い出せない……いつ、それを失くしたのかも……もう、分からない。"
10021015-238 = "すごく大切だったのに、どうしてだろ……"
10021015-239 = "ホシノ先輩が、死んだ後だったっけ……"
10021015-240 = "セリカが行方不明になった時……？"
10021015-241 = "それとも、アヤネが生命維持装置を外した時？"
10021015-242 = "ノノミが、アビドスを離れて「そうなった」と連絡をもらった時？それとも――"
10021015-243 = "――先生が、もう蘇生の可能性がないという連絡を、もらった時？"
10021015-245 = "いつ、だったかな……私――"
