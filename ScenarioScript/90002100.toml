[translation]
90002100-1 = "Episódio 10; 000, 00, 0"
90002100-2 = "Continente de Aço!"
90002100-3 = "U-uma batalha de conquista...!#n...Ugh."
90002100-4 = "Você está com um equipamento novo, não está? Tem que se esforçar mais!"
90002100-5 = "M-mas..."
90002100-6 = "Irmã, pare de incomodar. A Yuzu está desconfortável."
90002100-7 = "Que má fama você me dá!#nEu estou dizendo isso para encorajar a Yuzu!"
90002100-11 = "Exatamente! A coragem é a arma mais importante para um herói!"
90002100-12 = "Por que você também está entrando na onda..."
90002100-14 = "[ns] \"Primeiro vamos para a área do Binah, certo?\""
90002100-15 = "Sim. Naquela área, há um firewall protegendo o Continente de Aço.#nSe conseguirmos romper, a conquista do restante será um pouco mais fácil."
90002100-16 = "O objetivo inicial é garantir o núcleo do Binah e obter acesso à rede do Continente de Aço.#nA partir daí, deixarei o julgamento com o Sensei."
90002100-17 = "Nesse caso, seria melhor nos dividirmos em dois grupos.#nCom este navio de transporte, a mobilidade é excelente."
90002100-18 = "Vamos mudar a formação das equipes de forma flexível conforme a necessidade."
90002100-19 = "Mas, depois de ocupar a área, temos que chamar a Kei, certo?"
90002100-20 = "Sim. Assim, a Kei poderá extrair as informações do núcleo do profeta e transformá-las em nossa força de combate."
90002100-21 = "...Poderia não falar como se eu fosse um organismo que utiliza as habilidades dos inimigos?"
90002100-22 = "Ah, então a Kei também conhece esse jogo!#nAquele é um jogo lendário!"
90002100-24 = "[ns] \"A Kei também gosta de jogos?\""
90002100-25 = "Claro que não!#nIsso é apenas porque as memórias e experiências de quando me sincronizei com a Alice ainda restam aqui—!"
90002100-26 = "Entendo... Então, para a Kei, as memórias da Alice eram algo desnecessário..."
90002100-27 = "N-não é isso!#nQuer dizer, o que eu quis dizer foi, tipo...!"
90002100-28 = "Tudo bem... A Alice quer valorizar a Kei também...#nNão importa o que a Kei pense sobre a Alice..."
90002100-29 = "Eu disse que não é isso! Alice, me escute!!"
90002100-30 = "Kei, não se preocupe. A Alice está bem..."
90002100-31 = "Alice—!!"
90002100-37 = "(Ao contrário da Kei, que estava em pânico, a Alice se virou para cá e—)"
90002100-38 = "(...deu um sorriso travesso!)"
90002100-40 = "[ns] \"Alice, vamos parar com as provocações por aqui.\""
90002100-41 = "Hehe, desculpe, Kei."
90002100-42 = "Sim? Provocação...?"
90002100-43 = "[ns] \"A Kei reage de um jeito tão engraçado...\""
90002100-44 = "Hehe, é verdade."
90002100-45 = "..."
90002100-46 = "............"
90002100-47 = ".............."
90002100-48 = "Sensei—!!!"
90002100-50 = "Então, vamos nessa.#nEu, Toki, auxiliarei o Sensei como uma empregada perfeita."
90002100-51 = "Com esse visual, não parece muito uma empregada...?"
90002100-52 = "...Auxiliarei o Sensei como uma agente perfeita."
90002100-53 = "Você muda rápido, hein..."
90002100-54 = "Responder agilmente conforme a situação. Não acha que isso é típico de uma agente excelente?"
90002100-55 = "V."
90002100-56 = "[s] \"É, pois é...\""
90002100-57 = "Ei, vamos começar logo?"
90002100-58 = "Todos, voltem para seus postos."
90002100-59 = "Então, devolvo o comando ao Sensei."
90002100-60 = "[s] \"Dá um frio na barriga.\""
90002100-61 = "Ora, você não está acostumado a comandar?"
90002100-62 = "[s] \"É verdade. Vamos fazer como sempre.\""
90002100-67 = "[ns] \"Muito bem, vamos começar a operação de ataque ao Binah!\""
