[translation]
70008010-1 = "Aqueles que não se prendem a nada (1)"
70008010-3 = "（Um dia de primavera pacífico...）"
70008010-5 = "Aaaaaah!! Eu não aguento mais isso!!"
70008010-8 = "Ué! O que deu em você de repente?"
70008010-10 = "Precisa mesmo perguntar!?"
70008010-11 = "Hã...? Mas limpar não é algo tão ruim assim, né?"
70008010-12 = "É isso! Esse é o problema!#nTodo dia, todo santo dia, só limpando!"
70008010-13 = "Bem, é porque fomos derrotados pelo pessoal da Hyakka Ryoran."
70008010-14 = "Isso! Da próxima vez que a gente ganhar, vamos fazer eles limparem tudo!"
70008010-15 = "Opa, boa ideia!"
70008010-16 = "Ah, mas ultimamente... quando vejo lixo na rua, acabo pegando sem querer.#nA cidade fica limpa, e limpar não é tão ruim assim, sabe..."
70008010-17 = "Ué, você também? Na verdade, eu também estou assim—"
70008010-22 = "Daaaaa!#nNão fiquem empolgados com esse tipo de assunto!"
70008010-23 = "O nome da Chimi Ichiza vai chorar de vergonha!#nVamos fazer algo que seja mais a nossa cara!"
70008010-24 = "Algo que seja a cara da Chimi Ichiza...?"
70008010-25 = "É isso! Aquilo...!"
70008010-29 = "Ué... o que será que é a cara da Chimi Ichiza...?"
70008010-31 = "Esconderijo da Chimi Ichiza - Estilo de Rua"
70008010-32 = "Uuuu..."
70008010-34 = "O que foi, líder? Ainda pensando naquilo?"
70008010-35 = "Não importa o que seja a nossa cara, né?#nSe a gente se divertir, já está ótimo!"
70008010-37 = "A-Aconteceu algo grave!!"
70008010-41 = "Líder! Líder! É uma emergência!"
70008010-42 = "Esquece isso, fala logo o que é, fala logo!"
70008010-43 = "Ah, na verdade não é nada urgente. Eu só queria te dar um susto, então exagerei..."
70008010-53 = "Gaaaaah!! Seu idiota!!!"
70008010-54 = "Ué! Socooorro!!"
70008010-55 = "Ahahahaha! O líder explodiu!"
70008010-57 = "...E então? O que era afinal?"
70008010-58 = "Ah, é verdade. Bem... aqui, pegue.#nÉ um convite endereçado ao líder."
70008010-59 = "Um convite? De quem?"
70008010-60 = "Disseram que se eu falasse 'Chimi Ichiza Night', você entenderia."
70008010-61 = "O quê!? É sério!?"
70008010-63 = "O que é isso?#n...Você sabe?"
70008010-64 = "Já ouvi falar em algum lugar..."
70008010-65 = "Vocês, e ainda se dizem da Chimi Ichiza? Escutem bem!"
70008010-71 = "É uma reunião secreta que existe desde os primórdios da fundação da Chimi Ichiza."
70008010-75 = "Dizem que é uma reunião onde apenas os 'verdadeiros' membros da Chimi Ichiza são convidados!"
70008010-78 = "Isso é a Chimi Ichiza Night!"
70008010-79 = "Nossos esforços finalmente foram reconhecidos!"
70008010-84 = "Ah, é..."
70008010-86 = "O que foi, que desânimo é esse? Não estão felizes!?"
70008010-87 = "...Sinceramente, não entendi muito bem."
70008010-88 = "E outra, a história da Chimi Ichiza é tão longa assim?#nEu jurava que tinha sido o líder quem criou."
70008010-89 = "Esquece, esquece. Não dá para conversar com vocês."
70008010-90 = "De qualquer forma, não podemos deixar o pessoal da Chimi Ichiza Night nos subestimar.#n...Talvez esteja na hora de preparar as máscaras."
70008010-91 = "Mas o líder não usa máscara..."
70008010-93 = "Shiii! Não fala isso! Vai que tem algum motivo perigoso por trás!"
70008010-94 = "Ah, desculpa."
70008010-96 = "Esses dois, se deixar, falam demais...!"
70008010-97 = "É só que não tinha nenhuma máscara que combinasse comigo!"
70008010-99 = "É verdade... as máscaras que estão na moda não têm personalidade... e as que focam em personalidade são bregas..."
70008010-100 = "Eu entendo~ Foi super difícil para mim até escolher essa máscara também..."
70008010-102 = "Para nós, a máscara é praticamente quem nós somos... temos que expressar todas as nossas emoções através de uma única expressão."
70008010-103 = "Dizem que a lendária Trupe Chimi, que empatou 100 vezes contra a presidente do Comitê Hyakkiyako de dois anos atrás, tinha várias máscaras e as trocava de acordo com suas emoções."
70008010-104 = "...Não usar máscara na Noite da Trupe Chimi é o mesmo que andar pelado pela cidade!"
70008010-105 = "Mas, com certeza vão rir da gente se usarmos uma máscara comum!"
70008010-107 = "Isso significa que...!"
70008010-109 = "Vamos sair para procurar uma máscara!!"
70008010-111 = "Finalmente a líder também vai usar uma máscara!"
70008010-112 = "Na verdade, eu já encontrei uma!"
70008010-114 = "Eu já disse! Isso não é brincadeira! Levem a sério!!"
