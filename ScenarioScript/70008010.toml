[translation]#[Texto Final. - Filipe 08/07.]
70008010-1 = "Aqueles Que Não se Prendem a Nada (1)"
70008010-3 = "(Um dia de primavera tranquilo……)"
70008010-5 = "AHHHH! Não aguento mais!"
70008010-8 = "Uau! Que isso, do nada?"
70008010-10 = "Não precisa dizer pra entender, né!?"
70008010-11 = "Hã……? Limpeza não é tão ruim."
70008010-12 = "É disso que eu tô falando! Todo santo dia, só limpeza!"
70008010-13 = "Bom, a gente perdeu pras Cem Flores……"
70008010-14 = "É! Da próxima vez que a gente ganhar, vamos fazer ELAS limparem!"
70008010-15 = "Oh, boa!"
70008010-16 = "Ah, mas ultimamente…… quando vejo lixo na rua, acabo pegando.#nA cidade fica mais limpa, e a limpeza não é tão ruim……"
70008010-17 = "Hã, você também? Na verdade, eu também――"
70008010-22 = "AAAHHH!#nNao fiquem animados com isso!"
70008010-23 = "O nome da Trupe Fantasma vai chorar!#nFaçam coisas mais 'nossas'!"
70008010-24 = "Coisas 'nossas'……?"
70008010-25 = "Isso! É……!"
70008010-29 = "Ué…… o que é ser da Trupe Fantasma……?"
70008010-31 = "Esconderijo da Trupe Fantasma – Grupo de Rua"
70008010-32 = "Uuu……"
70008010-34 = "O que foi, líder? Ainda pensando no que aconteceu?"
70008010-35 = "Só se divertir já é o suficiente!"
70008010-37 = "É-ur-gên-cia!!"
70008010-41 = "Líder! Líder! Emergência!"
70008010-42 = "Vai direto ao ponto!"
70008010-43 = "Ah, na verdade não é emergência. Só queria assustar vocês……"
70008010-53 = "Gah!! Sua……!"
70008010-54 = "Socorro!"
70008010-55 = "Hahahaha! A líder explodiu!"
70008010-57 = "……Então? Qual era o problema?"
70008010-58 = "Ah, isso. Aqui.#nUm convite para a líder."
70008010-59 = "Convite? De quem?"
70008010-60 = "A 'Noite da Trupe Fantasma'…… se falar isso, ela vai entender."
70008010-61 = "O quê!? Sério?"
70008010-63 = "O que é isso?#n……Você sabe?"
70008010-64 = "Já ouvi falar……"
70008010-65 = "Vocês são mesmo da Trupe Fantasma? Escutem bem!"
70008010-71 = "É uma reunião secreta que existe desde a fundação da Trupe Fantasma."
70008010-75 = "Dizem que só os 'verdadeiros' são convidados!"
70008010-78 = "Essa é a Noite da Trupe Fantasma!"
70008010-79 = "Todo o nosso esforço foi reconhecido!"
70008010-84 = "Hmm……"
70008010-86 = "O quê? Não tá feliz?"
70008010-87 = "……Sinceramente, não sei bem."
70008010-88 = "Aliás, a Trupe Fantasma tem uma história tão longa?#nAchei que a líder tinha criado tudo."
70008010-89 = "Chega. Com vocês não dá."
70008010-90 = "Enfim, não posso ser desprezada pelos outros da Noite.#n……talvez seja hora de arrumar uma máscara."
70008010-91 = "Mas a líder nunca usa máscara……"
70008010-93 = "Shhh! Não fala! Pode ter algum motivo secreto!"
70008010-94 = "Ah, foi mal."
70008010-96 = "Esses……!"
70008010-97 = "É só que não tinha uma máscara adequada!"
70008010-99 = "É verdade…… as máscaras da moda não têm personalidade…… e as personalizadas são feias……"
70008010-100 = "Entendo~ eu também sofri muito até escolher essa……"
70008010-102 = "Pra gente, a máscara é a própria identidade…… expressar toda emoção em uma só expressão."
70008010-103 = "Há dois anos―― a lendária Trupe Fantasma que empatou cem vezes com a líder das Cem Flores tinha várias máscaras e trocava conforme a emoção."
70008010-104 = "……Na Noite da Trupe Fantasma, não usar máscara é como andar nu!"
70008010-105 = "Mas uma máscara comum vai ser ridicularizada!"
70008010-107 = "Então……!"
70008010-109 = "Vamos procurar uma máscara!!"
70008010-111 = "Finalmente a líder vai ter uma máscara!"
70008010-112 = "Na verdade, já encontrei uma!"
70008010-114 = "Já falei! Não é brincadeira! Levem a sério!!"