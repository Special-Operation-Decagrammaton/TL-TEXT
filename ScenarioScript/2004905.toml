[translation]
2004905-1 = "日光浴だって……つまらない"
2004905-2 = "（サンベッドを抱えてミサキの元へ向かった）"
2004905-4 = "やっぱり来たんだ……。"
2004905-5 = "それ……サンベッド？しかも二つ？"
2004905-6 = "日光浴だっけ？#n……やるなんて一言も言ってないんだけど。"
2004905-10 = "はぁ……分かった。"
2004905-11 = "[s] \"……え？本当に？\""
2004905-12 = "……何？"
2004905-13 = "……答えるのが早くてビックリ、って。"
2004905-14 = "やるって言うのも駄目なの？"
2004905-15 = "……気分が乗ってるわけじゃないよ。#nどうせやるなら、さっさと済ませたいってだけ。"
2004905-16 = "どうせ、無意味なんだから。"
2004905-17 = "……で、ここに横になればいいの？"
2004905-21 = "（ミサキと並んで横になり、空を見上げた）"
2004905-23 = "……暑い。"
2004905-24 = "[s] \"暑さには慣れてるって言ってなかった？\""
2004905-25 = "「好き」と「慣れてる」は別でしょ。"
2004905-26 = "何でわざわざこんなこと……。"
2004905-27 = "[s1] \"セロトニンが分泌されて、気持ちが落ち着いたり……。\"\n[s2] \"体の中でビタミンDを作れるとも言われてるかな……？\""
2004905-30 = "なにそれ。"
2004905-31 = "どうせ変わらないよ。"
2004905-32 = "[s] \"そうかなぁ……。\""
2004905-33 = "……。"
2004905-37 = "……ねえ、先生。"
2004905-38 = "[s3] \"通り雨……！？\"\n[s4] \"とりあえず、そこの海の家に避難しよう！\""
2004905-44 = "はぁ、はぁ……。"
2004905-45 = "[s] \"座ろっか。\""
2004905-48 = "結局、こうなるんだよ。"
2004905-49 = "[ruby=はな]最初[/ruby]から、私は何かを楽しむのに向いてない。"
2004905-50 = "どうせ、こうやって裏切られる。"
2004905-51 = "それなら期待なんてしない方がいい……。"
2004905-52 = "そうすれば、失望することもないから。"
2004905-53 = "感情が揺らぐことも……無駄な苦労をする必要も……。"
2004905-54 = "[ns] \"……。\""
2004905-58 = "雨……止んだね。"
2004905-59 = "それで、どうする？"
2004905-60 = "日光浴……続けるの？"
2004905-61 = "[s] \"……うん、続けよう。\""
2004905-62 = "えっ……本気？"
2004905-63 = "[s5] \"具体的な効果を得られなかったとしても……。\"\n[s6] \"ミサキとの思い出は残るからね。\""
2004905-66 = "……。"
2004905-67 = "なにそれ。"
2004905-68 = "思い出って……。"
2004905-69 = "虚しさに勝るものなの？"
2004905-70 = "[s7] \"だから、一緒に続けてみない？\"\n[s8] \"答えが見つかるかもしれないよ。\""
2004905-73 = "またそんなこと言って……。"
2004905-74 = "……。"
2004905-75 = "はぁ……。"
2004905-76 = "正直、よく分からないけど……。"
2004905-77 = " ……いいよ、つきあってあげる。"
