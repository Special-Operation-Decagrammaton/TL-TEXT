[translation]
2004905-1 = "Tomar sol... que tédio."
2004905-2 = "（Carreguei as espreguiçadeiras e fui até onde Misaki estava）"
2004905-4 = "Você veio mesmo..."
2004905-5 = "Isso é... uma espreguiçadeira? E trouxe duas?"
2004905-6 = "Sobre tomar sol...#nEu não disse em momento algum que ia fazer isso."
2004905-10 = "Haa... entendi."
2004905-11 = "[s] \"...Hein? Sério?\""
2004905-12 = "...O quê?"
2004905-13 = "...Estou surpresa por você ter respondido tão rápido, só isso."
2004905-14 = "Não posso dizer que vou fazer?"
2004905-15 = "...Não é que eu esteja com vontade.#nSe é para fazer, só quero terminar logo."
2004905-16 = "De qualquer forma, não faz sentido."
2004905-17 = "...Então, é só deitar aqui?"
2004905-21 = "（Deitei ao lado de Misaki e olhei para o céu）"
2004905-23 = "...Está quente."
2004905-24 = "[s] \"Você não disse que estava acostumada com o calor?\""
2004905-25 = "Uma coisa é estar acostumada, outra é gostar, né?"
2004905-26 = "Por que se dar ao trabalho de fazer isso..."
2004905-27 = "[s1] \"Dizem que libera serotonina e ajuda a acalmar...\"\n[s2] \"E também dizem que ajuda o corpo a produzir vitamina D...?\""
2004905-30 = "Que papo é esse?"
2004905-31 = "Não vai mudar nada de qualquer jeito."
2004905-32 = "[s] \"Será mesmo...?\""
2004905-33 = "..."
2004905-37 = "...Ei, Sensei."
2004905-38 = "[s3] \"Uma chuva passageira...!?\"\n[s4] \"Vamos nos abrigar naquela casa de praia ali!\""
2004905-44 = "Haa, haa..."
2004905-45 = "[s] \"Vamos sentar um pouco.\""
2004905-48 = "No fim, sempre acaba assim."
2004905-49 = "Desde o início, eu não sirvo para aproveitar nada."
2004905-50 = "De qualquer forma, sempre serei traída assim."
2004905-51 = "Sendo assim, é melhor nem ter expectativas..."
2004905-52 = "Assim, não tem como se decepcionar."
2004905-53 = "Sem oscilações emocionais... sem precisar passar por esforços inúteis..."
2004905-54 = "[ns] \"...\""
2004905-58 = "A chuva... parou."
2004905-59 = "E então, o que vamos fazer?"
2004905-60 = "Vamos continuar... tomando sol?"
2004905-61 = "[s] \"...Sim, vamos continuar.\""
2004905-62 = "Hã... você fala sério?"
2004905-63 = "[s5] \"Mesmo que não tenhamos um efeito concreto...\"\n[s6] \"Pelo menos teremos uma lembrança com a Misaki.\""
2004905-66 = "..."
2004905-67 = "Que papo é esse?"
2004905-68 = "Lembranças..."
2004905-69 = "Será que elas superam o vazio?"
2004905-70 = "[s7] \"Por isso, por que não continuamos juntos?\"\n[s8] \"Talvez a gente encontre uma resposta.\""
2004905-73 = "Você sempre diz essas coisas..."
2004905-74 = "..."
2004905-75 = "Haa..."
2004905-76 = "Sinceramente, não entendo muito bem, mas..."
2004905-77 = " ...Tudo bem, eu te acompanho."
