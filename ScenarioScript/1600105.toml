[translation]
1600105-1 = "Feito de Surpresa"
1600105-3 = "（Estava trabalhando a noite toda, mas não vejo o fim disso em lugar nenhum）"
1600105-8 = "（Quando encostei a cabeça na mesa para descansar um pouco, minha consciência foi se esvaindo lentamente...）"
1600105-11 = "（……）"
1600105-12 = "……Mestre."
1600105-13 = "……Mestre?"
1600105-16 = "Mestre? Ué, que estranho, achei que você tinha acabado de acordar."
1600105-17 = "[s] \"Asuna...?\""
1600105-18 = "Ah, bom dia, Mestre! Vim como prometido!"
1600105-19 = "Como você parecia muito cansado, pensei que era a chance perfeita para eu te servir como agradecimento!"
1600105-20 = "Aqui? É a área residencial do Schale, né? Como você tinha dormido na mesa, eu te trouxe para cá."
1600105-21 = "Hm? Por que essa cara? Ficou com vergonha? E mais importante, não pode dormir na mesa só porque está cansado, sabia?"
1600105-22 = "A mesa estava cheia de energéticos e pilhas de documentos... Se continuar assim, seu corpo vai pifar!"
1600105-23 = "Vamos, vamos, por enquanto esqueça tudo isso e aceite o serviço da Asuna, tá?"
1600105-24 = "O delivery já deve estar chegando, então vamos comer juntos!"
1600105-25 = "……Hm? Até uma empregada pede delivery às vezes, é gostoso, né!"
1600105-26 = "Como eu entrei? Pela porta."
1600105-27 = "……A senha?"
1600105-28 = "Ah, aquela máquina? Eu só fui apertando os botões achando que era assim e abriu, sabe?"
1600105-29 = "……Ahahahaha!! Que cara é essa? Você continua tão fofo, Mestre!"
1600105-30 = "……Hm? O que foi? Pode ficar aqui, não tem problema!"
1600105-31 = "Ainda tem documentos? Ah, aqueles que estavam na mesa?"
1600105-32 = "Era só separar os que eram parecidos, né? Eu já resolvi isso, então está tudo bem! Não li muito bem, mas..."
1600105-33 = "Acho que está tudo certo, mas... quer que eu traga se estiver preocupado?"
1600105-35 = "（Asuna trouxe alguns documentos organizados para eu ver）"
1600105-36 = "（Embora ela tenha dito que não leu direito, estavam classificados com uma precisão inacreditável）"
1600105-37 = "Hm? Como eu fiz isso? ...Intuição?"
1600105-38 = "Ficou bom? Que bom!"
1600105-39 = "Ah, eu já limpei e lavei as roupas, então o Mestre não precisa se preocupar com absolutamente nada!"
1600105-40 = "Tem algo que você queira que eu faça? Pode pedir qualquer coisa!"
1600105-41 = "Comida? Banho? Ou talvez..."
1600105-42 = "[s1] \"Meus ombros estão um pouco tensos, talvez...\"\n[s2] \"...Então, acho que vou pedir uma massagem.\""
1600105-43 = "Opa! O Mestre está ficando acostumado a ser o \"Mestre\", hein! Pode continuar pedindo assim!"
1600105-44 = "Opa! O Mestre está ficando acostumado a ser o \"Mestre\", hein! Pode continuar pedindo assim!"
1600105-45 = "Então, aqui vai a massagem especial da Asuna!"
1600105-46 = "Prontinho, vire de costas, por favor?"
1600105-48 = "Na nuca, assim, e... nos ombros, desse jeito. Vou massagear envolvendo tudo, tá?"
1600105-52 = "（Embora o toque fosse gentil e sem muita força, os músculos tensos foram relaxando e foi muito bom）"
1600105-53 = "……E então? Está sentindo o efeito?"
1600105-54 = "Ah, o Mestre faz barulhos de gatinho quando recebe massagem, sabia?"
1600105-55 = "Pronto, OK! Ficou um pouco mais relaxado?"
1600105-56 = "Sim, que bom! Eu fico feliz também!"
1600105-57 = "Eh, por que? Ora, porque eu sou uma empregada!"
1600105-58 = "Servir bem ao Mestre é a maior alegria para uma empregada!"
1600105-59 = "Hm? Esse papo de \"servir bem\" soa como uma agente? Ahaha! Talvez seja mesmo."
1600105-60 = "……Hm? O que foi?"
1600105-61 = "……Eh, para a Asuna?"
1600105-62 = "O Mestre quer me servir?"
1600105-63 = "……Como assim?"
1600105-64 = "……Ah, agora é a minha vez de receber uma massagem nos ombros?"
1600105-65 = "Eba! Isso é muito bom! É uma sensação nova ser servida, mesmo sendo uma empregada!"
1600105-66 = "Então, aqui está!"
1600105-69 = "Tudo pronto! Então, conto com você, Mestre!"
1600105-70 = "[s] (Massageia os ombros de Asuna)"
1600105-72 = "……Hmm."
1600105-73 = "……Hyan!?"
1600105-74 = "……?"
1600105-75 = "[s] \"……?\""
1600105-76 = "……???"
1600105-77 = "Ei, o, o que foi? O que você fez agora, Mestre?"
1600105-78 = "……Você só massageou meus ombros? Sério mesmo?"
1600105-79 = "E, ei? N, não, não é nada, eu só me assustei um pouco……?"
1600105-80 = "E, está tudo bem! Está tudo bem, então continue!"
1600105-81 = "[s] (Massageia a região do pescoço de Asuna)"
1600105-83 = "……."
1600105-84 = "……Haun!?"
1600105-85 = "……???"
1600105-86 = "O, o que foi isso!? O que é isso? É a primeira vez que sinto algo assim……?"
1600105-87 = "……Ei? Ei? O que eu deveria fazer?"
1600105-88 = "É melhor parar……? Não, e, está tudo bem!"
1600105-89 = "É que, não é que eu não goste, é só que, isso é……."
1600105-90 = "Bem……."
1600105-91 = "M, mais uma vez! Por favor, com delicadeza!"
1600105-92 = "N, não estou nervosa! Está tudo bem! T, talvez……!"
1600105-93 = "……Hmm, fa, nnu…… Mestre…… está tudo bem, então……."
1600105-94 = "C, continue assim……"
1600105-97 = "Opa! Entrega chegando!!"
1600105-98 = "(……)"
