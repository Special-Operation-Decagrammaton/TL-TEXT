[translation]
1600105-1 = "メイドインサプライズ"
1600105-3 = "（徹夜で仕事をしていたのだが、一向に終わりが見えてこない）"
1600105-8 = "（ちょっと休むつもりで机でうつぶせになると、そのまま意識がゆっくりと……）"
1600105-11 = "（……）"
1600105-12 = "……様。"
1600105-13 = "……ご主人様？"
1600105-16 = "ご主人様？あれ、おっかしいなー、今起きたかと思ったんだけど。"
1600105-17 = "[s] \"アスナ……？\""
1600105-18 = "あ、おはようご主人様！約束通り来たよ！"
1600105-19 = "ちょうどすごく疲れてるみたいだったから、お礼にご奉仕するチャンスかと思って！"
1600105-20 = "ここ？シャーレの居住区だよ？ご主人様が机で寝ちゃってたから、運んじゃった。"
1600105-21 = "ん？どしたのその顔、恥ずかしかった？それよりも、いくら疲れてたからって机で寝ちゃダメでしょー？"
1600105-22 = "机も栄養ドリンクと書類の束ばっかりだったし……そのままだと、身体が壊れちゃうよ？"
1600105-23 = "ほらほら、とりあえず今だけでも一旦全部忘れて、大人しくアスナのご奉仕を受けよ？"
1600105-24 = "そろそろデリバリーも届く頃だろうから、一緒に食べよっか！"
1600105-25 = "……ん？メイドだってデリバリー頼むことはあるよ、美味しいじゃん！"
1600105-26 = "どうやって入ってきたのって……入り口から。"
1600105-27 = "……暗証番号？"
1600105-28 = "あ、あの機械？多分こんな感じかなーってポチポチしたら開いたよ？"
1600105-29 = "……あははははっ！！何その顔、相変わらず可愛いなーご主人様！"
1600105-30 = "……んー？どうしたの、ここにいていいんだよ？"
1600105-31 = "書類が残ってる？あ、あの机の上のやつ？"
1600105-32 = "似たようなの同士で分ければ良かったんだよね？それなら私が済ませといたから大丈夫！あんまちゃんと読んでないけど。"
1600105-33 = "多分大丈夫だと思うけど……気になるなら持ってくる？"
1600105-35 = "（アスナが整理された書類を幾つか持ってきて見せてくれた）"
1600105-36 = "（ちゃんと読んでないと言っていたけれど、信じられないぐらい正確に分類されていた）"
1600105-37 = "ん？どうやってやったのって？……勘？"
1600105-38 = "ちゃんとできてる？良かった～！"
1600105-39 = "あ、掃除と洗濯はもうしておいたから、ご主人様はもうなーんにも気にしなくていいんだよ？"
1600105-40 = "何かしてほしいことある？何でも言ってみて！"
1600105-41 = "食事？お風呂？それとも……"
1600105-42 = "[s1] \"ちょっと肩が凝ってる、かも……。\"\n[s2] \"……じゃあ、マッサージでもお願いしようかな。\""
1600105-43 = "おー！ご主人様も「ご主人様」するのに慣れてきたね！そんな感じでどんどん頼んでいいよ！"
1600105-44 = "おー！ご主人様も「ご主人様」するのに慣れてきたね！そんな感じでどんどん頼んでいいよ！"
1600105-45 = "それじゃ、アスナの特製マッサージを！"
1600105-46 = "はーい、後ろ向いてー？"
1600105-48 = "首の後ろを、んしょ、んっ……肩の方は、こうや、って。包み込むみたいに揉んでいくね～。"
1600105-52 = "（あまり力を入れてない優しい手つきだったけれど、固まった筋肉がほぐれていって気持ちよかった）"
1600105-53 = "……どう？効いてる感じ、する？"
1600105-54 = "あはっ、マッサージされてるご主人様、ネコみたいな声出すんだね？"
1600105-55 = "はい、OK～！ちょっとは楽になった？"
1600105-56 = "うん、それは良かった！私も嬉しい！"
1600105-57 = "え、どうしてって？そりゃメイドだもん！"
1600105-58 = "ご主人様へのご奉仕が上手くいくことは、メイドとして最高の喜びだから！"
1600105-59 = "ん？「上手くいく」って辺りがエージェントっぽい？あはは！まあそうかもねー。"
1600105-60 = "……ん？なあに？"
1600105-61 = "……え、アスナに？"
1600105-62 = "ご主人様がご奉仕？"
1600105-63 = "……どういうこと？"
1600105-64 = "……あ、今度は逆に私の肩を揉んでくれるの？"
1600105-65 = "やったー！それは嬉しいかも！メイドなのにご奉仕してもらうなんて新鮮！"
1600105-66 = "じゃあ、はいっ！"
1600105-69 = "準備OK！じゃあご主人様よろしくー！"
1600105-70 = "[s] （アスナの肩を揉む）"
1600105-72 = "……んっ。"
1600105-73 = "……ひゃんっ！？"
1600105-74 = "……？"
1600105-75 = "[s] \"……？\""
1600105-76 = "……？？？"
1600105-77 = "え、な、なに？今、ご主人様なにしたの？"
1600105-78 = "……ただ肩を揉んだだけ？ほんとに？"
1600105-79 = "え、ええ？い、いや、何でもない、ただちょっとびっくりして……？"
1600105-80 = "だ、大丈夫！大丈夫だから続けて！"
1600105-81 = "[s] （アスナの首辺りを揉む）"
1600105-83 = "……。"
1600105-84 = "……はぅんっ！？"
1600105-85 = "……？？？"
1600105-86 = "な、なに！？なにこれ？こんなの初めてなんだけど……？"
1600105-87 = "……え？え？どうすればいいの？"
1600105-88 = "やめたほうが……？ううん、だ、大丈夫！"
1600105-89 = "その、全然嫌とかじゃなくて、これは、その……。"
1600105-90 = "えーっと……。"
1600105-91 = "も、もう一回！優しくお願いね！"
1600105-92 = "う、ううん緊張してない！大丈夫！た、多分……！"
1600105-93 = "……んっ、ふぁ、んぅ……ご主人様……大丈夫、だから……。"
1600105-94 = "そ、そのまま……"
1600105-97 = "ちーっす！配達でーす！！"
1600105-98 = "（……）"
1600105-99 = "（その後、大人しく二人でご飯を食べた）"
