[translation]
10044040-1 = "第4話;何を載せて走るのか"
10044040-2 = "遅かった……。"
10044040-3 = "ここにもないー。"
10044040-5 = "バスにまで乗ったのに……。"
10044040-6 = "[ns] \"ところで……。\""
10044040-8 = "[ns] \"その列車は何を積んでるの？\""
10044040-13 = "あれ、言ってなかったっけ？"
10044040-14 = "先生にはまだー。"
10044040-15 = "そっか、そういやそうだね。"
10044040-17 = "い、今まで何も聞かずに手伝ってくれていたんですか……。"
10044040-18 = "[s1] \"急ぎだって言われたから……。\"\n[s2] \"生徒の要望に応えるのが先生だからね。\""
10044040-21 = "ふ、不思議な人ですね……。"
10044040-22 = "パヒャヒャッ、やるじゃん先生。"
10044040-23 = "じゃあ発表しちゃおっかな！#n積荷の中身は――！"
10044040-28 = "分かんない！"
10044040-29 = "[s] \"……え？\""
10044040-31 = "別に中身に興味ないし。"
10044040-32 = "時間通りー決まった場所に運ぶだけー。"
10044040-33 = "そ！だから知る必要もないの。"
10044040-34 = "[s] \"た、たしかに！？\""
10044040-36 = "な、納得しないでください……！"
10044040-37 = "つ、積荷の中身くらい把握してるのが当たり前なんですけど……！"
10044040-38 = "えー、なんだっけな……教えてもらったような気はするんだけど……。"
10044040-39 = "右からー左にー聞き流しー。"
10044040-40 = "えぇ……本当に、なんで幹部やってられてるんですか！？"
10044040-41 = "だ～か～ら～！そんなのどうでもいいんだって！"
10044040-42 = "やることは同じだよー？"
10044040-43 = "じゃ、じゃあ……お二人は言われた仕事をこなすだけで満足なんですか……？"
10044040-44 = "なにか問題ー？"
10044040-45 = "も、問題……って言うほどじゃないんですけど……。"
10044040-46 = "そ、その……自分のことは、自分で決めたいじゃないですか。"
10044040-47 = "うーん、どうだろ。その気持ちも分かるけどさ。"
10044040-48 = "でも、アオバだって同じじゃん？"
10044040-49 = "うっ……。"
10044040-50 = "やりたくてやってるようにはあんま見えないんだよね。"
10044040-51 = "そ、そういうとこばっかり鋭いんですから……。"
10044040-52 = "ええ、その通りですよ！で、でも……！#nじ、自分のことくらい自分で決めたいじゃないですか……！"
10044040-53 = "こ、こんなこと言うつもりじゃなかったんですけど……と、とにかく！"
10044040-54 = "わ、私は……下っ端の整備士ですから。#n自分の人生を自分で決めるのは、ただの夢物語かもしれませんけど……！"
10044040-55 = "お、お二人は幹部……ですし。人の上に立つ存在なんでしょう！？"
10044040-57 = "上にもーもっと上はいるよー。"
10044040-58 = "そーそー。私らは、ただの中間管理職。"
10044040-60 = "そ、そんな……。"
10044040-61 = "まー、ぶっちゃけこの仕事も最初は退屈だと思ってたけどさ。"
10044040-62 = "何もやらなかったら、もっとつまんないじゃん？"
10044040-63 = "か、幹部でも同じ……？#nえ、じゃあ私は、何を目指せば……。"
10044040-64 = "テキトー、楽しければーおっけー。"
10044040-65 = "[ns3] \"ちょっと話はそれちゃったけど……。\"\n[ns4] \"貨物の中身は知らないってことだね。\""
10044040-68 = "すごく大事なものだったと思うよー？"
10044040-69 = "中見てみるー？"
10044040-70 = "ぜ、絶対ダメなんですけど……。"
10044040-71 = "中身は知ってて当然なんでしょ？"
10044040-72 = "それとこれとは別で……か、勝手に開けるとか論外なんですけど……。"
10044040-73 = "パヒャヒャッ！バレなきゃいいの！へーきへーき！"
10044040-74 = "先生も気になるでしょー？"
10044040-75 = "え、ダメ……？つまんないのー。"
10044040-76 = "うぅ……もう帰りたい……。"
10044040-84 = "ヒカリ、どしたの？"
10044040-85 = "列車見つけたー今は隣の駅ー。"
10044040-86 = "え、ほんと？どうやって？"
10044040-87 = "てってれー、通信機ー。"
10044040-88 = "パヒャヒャッ！さすがヒカリ！"
10044040-89 = "そ、その手があったんですね……。"
10044040-90 = "で、でもまた発車してしまったら……。"
10044040-91 = "そうさせなきゃいいだけっしょ！ヒカリ、ちょっと貸して！"
10044040-96 = "あーあー、聞こえてる？"
10044040-97 = "は、はい……。"
10044040-98 = "CCC[ruby=たちばな]の橘ノ[/ruby]ゾミだよ～。#nねぇねぇ、そっちに貨物列車が一本来てるよね？"
10044040-99 = "それ、ちょっと止めといてもらえる？すぐ行くからさ。"
10044040-100 = "なんかシステムエラーで勝手に発車しがちだから、ちゃんと見といてね！"
10044040-101 = "その……当駅では、大型貨物列車を長く停車させるのは無理でして……。"
10044040-102 = "旅客列車の運行もありますし……。"
10044040-103 = "とりあえず停車させといて！方法は任せるから！#nでないと大事件になっちゃうんだよね。"
10044040-104 = "え？どういうことです？#nそれより……いま、クロ――"
10044040-105 = "ちょーじゅーよー。"
10044040-106 = "はい？"
10044040-107 = "その列車には、すっっっごく大事なモノが積まれてるから――"
10044040-108 = "何があっても知られちゃいけないんだよね。"
10044040-111 = "……。"
10044040-112 = "おーい、聞いてる？もしもーし？"
10044040-113 = "あ、あの……ウソみたいですけど、本当のことなので……。"
10044040-114 = "あ……いえ、その……。"
10044040-120 = "いま……クロノスチャンネルの取材中、でして――"
10044040-124 = "特ダネだ！！！"
10044040-125 = "皆さん！聞きましたか！？"
10044040-131 = "今ここにある貨物列車に、とても大事な何かが積まれているとのことです！！"
10044040-132 = "キヴォトスの運命を左右するほどのモノでしょうか！？"
10044040-133 = "果たしてその正体は！？"
10044040-134 = "クロノスが最後までお届けします！！！！"
10044040-137 = "[ns] \"……。\""
10044040-139 = "あっ……えっ……。"
10044040-143 = "はは、終わったかも。"
