[translation]
10044040-1 = "Episódio 4; O que estamos carregando?"
10044040-2 = "Tarde demais..."
10044040-3 = "Não está aqui também."
10044040-5 = "E olha que até pegamos o ônibus..."
10044040-6 = "[ns] \"A propósito...\""
10044040-8 = "[ns] \"O que esse trem está carregando?\""
10044040-13 = "Ué, eu não tinha dito?"
10044040-14 = "Para o Sensei, ainda não."
10044040-15 = "Ah, é verdade, agora que você falou."
10044040-17 = "V-vocês estavam me ajudando sem nem perguntar nada até agora...?"
10044040-18 = "[s1] \"Disseram que era urgente, então...\"\n[s2] \"É o papel do Sensei atender aos pedidos dos alunos, afinal.\""
10044040-21 = "V-vocês são pessoas estranhas..."
10044040-22 = "Pahyahya, você é demais, Sensei."
10044040-23 = "Então, acho que vou revelar! #nO conteúdo da carga é...!"
10044040-28 = "Não sei!"
10044040-29 = "[s] \"...Hã?\""
10044040-31 = "Não tenho interesse no que tem dentro."
10044040-32 = "É só levar para o lugar certo na hora certa."
10044040-33 = "Isso! Por isso não precisamos saber."
10044040-34 = "[s] \"I-isso faz sentido!?\""
10044040-36 = "N-não concorde com isso...!"
10044040-37 = "É o básico saber o que se está transportando...!"
10044040-38 = "Hmm, o que era mesmo... Tenho a impressão de que me contaram..."
10044040-39 = "Entrou por um ouvido e saiu pelo outro."
10044040-40 = "Sério... Como vocês conseguem ser executivos assim!?"
10044040-41 = "É que... tanto faz! Não importa!"
10044040-42 = "O trabalho é o mesmo, não é?"
10044040-43 = "E-então... vocês dois ficam satisfeitos apenas cumprindo as ordens?"
10044040-44 = "Algum problema?"
10044040-45 = "P-problema... não chega a ser um problema, mas..."
10044040-46 = "É que... eu gostaria de decidir as minhas próprias coisas."
10044040-47 = "Hmm, não sei. Eu entendo esse sentimento, mas..."
10044040-48 = "Mas a Aoba não é igual?"
10044040-49 = "Ugh..."
10044040-50 = "Não parece que você faz isso porque quer."
10044040-51 = "Vocês são sempre tão afiados nessas horas..."
10044040-52 = "Sim, é verdade! M-mas...! #nE-eu quero decidir as minhas próprias coisas...!"
10044040-53 = "E-eu não pretendia dizer isso, mas... e-enfim!"
10044040-54 = "E-eu sou apenas uma mecânica de baixo escalão. #nDecidir o meu próprio destino pode ser apenas um sonho distante, mas...!"
10044040-55 = "V-vocês são executivos... pessoas que estão acima dos outros, não são!?"
10044040-57 = "Sempre tem alguém acima de nós."
10044040-58 = "Pois é. Nós somos apenas gerentes de nível médio."
10044040-60 = "I-isso não pode ser..."
10044040-61 = "Bom, para ser sincera, no começo eu achava esse trabalho entediante também."
10044040-62 = "Mas se você não fizer nada, é ainda mais chato, não é?"
10044040-63 = "M-mesmo sendo executivos...? #nE-então, o que eu deveria buscar..."
10044040-64 = "Se for divertido, está tudo bem."
10044040-65 = "[ns3] \"Nos desviamos um pouco do assunto...\"\n[ns4] \"Então você não sabe o que tem na carga.\""
10044040-68 = "Acho que era algo bem importante, viu?"
10044040-69 = "Quer dar uma olhada?"
10044040-70 = "I-isso é absolutamente proibido, mas..."
10044040-71 = "Você já sabe o que tem dentro, não sabe?"
10044040-72 = "Uma coisa é uma coisa, outra é... a-abrir sem permissão é algo fora de cogitação..."
10044040-73 = "Pahyahya! Se ninguém descobrir, tá tudo bem! Relaxa, relaxa!"
10044040-74 = "O Sensei também está curioso, não está?"
10044040-75 = "Ué, não pode...? Que sem graça."
10044040-76 = "Uuu... eu só quero ir para casa agora..."
10044040-84 = "Hikari, o que houve?"
10044040-85 = "Achei o trem, ele está na estação vizinha agora."
10044040-86 = "Sério? Como você conseguiu?"
10044040-87 = "Tcharam! Com o comunicador."
10044040-88 = "Pahyahya! Como esperado da Hikari!"
10044040-89 = "E-essa opção existia..."
10044040-90 = "M-mas e se ele sair da estação de novo..."
10044040-91 = "É só não deixar isso acontecer! Hikari, me empresta um pouco!"
10044040-96 = "Ah, ah, está me ouvindo?"
10044040-97 = "S-sim..."
10044040-98 = "Aqui é a Nozomi, da CCC!#nEi, ei, tem um trem de carga chegando aí, né?"
10044040-99 = "Pode segurar ele aí por um tempo? Já estamos indo."
10044040-100 = "Por causa de um erro no sistema, ele costuma sair sozinho, então fique de olho, tá!"
10044040-101 = "Bem... nesta estação, não é possível manter um trem de carga grande parado por muito tempo..."
10044040-102 = "Também temos a operação dos trens de passageiros..."
10044040-103 = "Dê um jeito de mantê-lo parado! O método não importa!#nSe não, vai virar um grande problema."
10044040-104 = "Hã? Como assim?#nAlém disso... agora, o Chrono—"
10044040-105 = "Sup-per im-por-tan-te."
10044040-106 = "Sim?"
10044040-107 = "Esse trem está carregando algo extremamente importante, então—"
10044040-108 = "Ninguém pode descobrir o que é, aconteça o que acontecer."
10044040-111 = "..."
10044040-112 = "Ei, está ouvindo? Alô?"
10044040-113 = "A-ah, desculpe... parece mentira, mas é a verdade, então..."
10044040-114 = "Ah... não, é que..."
10044040-120 = "Agora... estamos no meio de uma reportagem do Canal Chronos, então—"
10044040-124 = "É um furo de reportagem!!!"
10044040-125 = "Pessoal! Vocês ouviram isso!?"
10044040-131 = "Disseram que o trem de carga que está aqui agora carrega algo muito importante!!"
10044040-132 = "Será algo capaz de mudar o destino de Kivotos!?"
10044040-133 = "Qual será a verdadeira identidade disso!?"
10044040-134 = "O Chronos trará tudo até o fim!!!!"
10044040-137 = "[ns] \"...\""
10044040-139 = "Ah... é..."
10044040-143 = "Haha, acho que já era."
