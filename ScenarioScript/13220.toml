[translation]
13220-1 = "第22話;暴走列車"
13220-5 = "残念なお知らせなんだけど、カイザーに追いつかれそうでさぁ。"
13220-6 = "そんな……！"
13220-7 = "んー、無理かも。"
13220-8 = "[s] \"どうしようか……。\""
13220-9 = "……仕方ないし、私らが足止めしてあげるよ。#n先に列車を降りて、目的地に向かいなって。"
13220-10 = "うぉー、必殺複線ドリフトのでばーん！"
13220-12 = "で、ですが……。"
13220-14 = "セクター35-9なら、こっから1時間くらいで着くっしょ。#n私らのことは、別に心配しなくておっけー。"
13220-15 = "時間稼いだら白旗上げるしー。"
13220-17 = "……はい、分かりました。"
13220-18 = "助けていただいて、ありがとうございます。"
13220-20 = "あははっ！なんか正義の味方みたいじゃん。#nそんなキャラじゃないのにさ。"
13220-21 = "なに言ってるのさー、ノゾミ。#nヒーローで良いじゃーん。"
13220-23 = "……列車が止まった瞬間、走れば良いのよね？"
13220-24 = "ん、先生は私が守る。#nしっかり掴まってて。"
13220-25 = "[s] \"ありがとう、シロコ。\""
13220-31 = "衝撃に備えなよ！"
13220-32 = "さーん、にー……。"
13220-38 = "どかーーーん！"
