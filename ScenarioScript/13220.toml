[translation]
13220-1 = "Episódio 22; Trem Desgovernado"
13220-5 = "Tenho uma notícia ruim, parece que o Kaiser está nos alcançando."
13220-6 = "Não pode ser...!"
13220-7 = "Hmm, talvez não dê."
13220-8 = "[s] \"O que faremos...?\""
13220-9 = "……Não tem jeito, nós vamos segurá-los. #nDesçam do trem primeiro e sigam para o destino."
13220-10 = "Uou, hora do meu golpe especial: drift nos trilhos!"
13220-12 = "Ma-mas..."
13220-14 = "O Setor 35-9 fica a cerca de uma hora daqui. #nNão precisam se preocupar com a gente, vai ficar tudo bem."
13220-15 = "Depois que ganharmos tempo, a gente se rende."
13220-17 = "……Sim, entendi."
13220-18 = "Obrigada por nos ajudar."
13220-20 = "Ahaha! Parece até que somos defensoras da justiça. #nE olha que esse nem é o nosso estilo."
13220-21 = "O que você está dizendo, Nozomi? #nSer heroínas é legal, não é?"
13220-23 = "……Assim que o trem parar, é só correr, certo?"
13220-24 = "Sim, eu protegerei o Sensei. #nSegure-se firme."
13220-25 = "[s] \"Obrigado, Shiroko.\""
13220-31 = "Preparem-se para o impacto!"
13220-32 = "Três, dois..."
13220-38 = "CABUUUM!"
