[translation]
70005030-1 = "Registro de um certo 19 de fevereiro (2)"
70005030-2 = "Então, qual é o assunto?"
70005030-3 = "Eu vim até D.U. só porque você pediu, mas..."
70005030-4 = "Presidente, é que..."
70005030-5 = "E-eu recebi um contato da Associação Genbu de Shanhaijing..."
70005030-6 = "Shanhaijing? Associação Genbu?"
70005030-7 = "Quer dizer... é um encontro de intercâmbio entre escolas?"
70005030-8 = "Esse tipo de coisa não é nosso trabalho, não é?"
70005030-9 = "C-cof... eu me equivoquei."
70005030-10 = "Na verdade, é que... recebi um contato de uma... isso! De uma \"amiga\" da Associação Genbu..."
70005030-11 = "Tínhamos marcado de nos divertir juntas em D.U. hoje...!"
70005030-12 = "A Ako... tem uma amiga na Associação Genbu...?"
70005030-13 = "..."
70005030-14 = "Desculpe, Ako. Eu tenho te sobrecarregado muito ultimamente."
70005030-15 = "...Não precisa inventar desculpas só para tirar uma folga..."
70005030-16 = "O-o que você quer dizer com isso!?"
70005030-17 = "Eu acho que entendo mais ou menos..."
70005030-18 = "Haa..."
70005030-19 = "Vocês duas, por favor, fiquem quietas!"
70005030-20 = "P-presidente! I-isso é, bem..."
70005030-21 = "..."
70005030-22 = "De qualquer forma, o importante é que isso é um assunto particular."
70005030-26 = "(Importante...?)"
70005030-28 = "Opa! Estava esperando por vocês!"
70005030-29 = "...Faz tempo, não é, Ako?"
70005030-30 = "S-sim! Faz tempo, Lumi-san..."
70005030-33 = "...!"
70005030-34 = "(Sério mesmo... uma amiga da Associação Genbu...?)"
70005030-35 = "(Mas essas pessoas são... a presidente da Associação Genbu, a gerente e a diretora executiva da Genryumon... #nAquela aluna pequena é...)"
70005030-36 = "Bem, Ako-san... ouvi a história da presidente..."
70005030-37 = "S-sim. Comitê de Disciplina de Gehenna... não, amiga! #nEu sou Konoe Mina. E esta aqui é..."
70005030-42 = "Ryuge Kisaki. Em uma ocasião como esta... seria indelicado usar títulos, não acha?"
70005030-43 = "Antes de entrarmos no assunto... peço perdão, mas deixem-me acender um incenso."
70005030-48 = "Hm? Que aroma curioso..."
70005030-49 = "Sim, de alguma forma, acalma a mente..."
70005030-50 = "..."
70005030-51 = "(Ryuge Kisaki... não há dúvidas. #nA presidente do conselho estudantil de Shanhaijing, também chamada de \"Monarca Negra\", a líder da Genryumon...!)"
70005030-52 = "Ako."
70005030-53 = "S-sim! Presidente!"
70005030-54 = "Pode me explicar detalhadamente?"
70005030-55 = "C-como eu disse, eu vim com minha amiga Lumi-san...!"
70005030-57 = "Ako. Já que estamos todas reunidas, não acha melhor parar de esconder as coisas?"
70005030-58 = "Eu explico o que aconteceu. Né, Kisaki?"
70005030-59 = "Sim. Posso deixar isso com você. Especialmente em uma situação como esta."
70005030-60 = "E então... amigas de Gehenna. Podem me chamar de \"Kisaki\" sem cerimônias."
70005030-61 = "Ah, bem... eu também, pode me chamar de \"Hina\"..."
70005030-63 = "..."
70005030-64 = "Em suma —"
70005030-65 = "Houve um erro na entrega. As encomendas de ambos os lados acabaram sendo trocadas."
70005030-66 = "Parece que tanto a Mina quanto o Comitê de Disciplina fizeram o seu melhor, mas... #nTalvez isso seja o que chamam de uma peça do destino."
70005030-67 = "Hum... vamos passar ao assunto principal."
70005030-73 = "Aqui, este é o bolo que deveria ter sido entregue ao Comitê Disciplinar."
70005030-78 = "…Obrigada. Aqui, este é o seu bolo."
70005030-79 = "É engraçado, parece uma troca de presentes. #nFufu... que experiência curiosa."
70005030-88 = "Quem diria que faríamos aniversário no mesmo dia."
70005030-89 = "Uma chance em 365... e ainda termos a mesma idade, é algo bem raro."
70005030-90 = "O destino é algo realmente misterioso."
70005030-91 = "É... verdade."
70005030-92 = "Hoje vai ser um dia especial. Obrigada, pessoal."
70005030-93 = "Por um momento, pensei que tudo daria errado..."
70005030-94 = "Fico feliz que tenhamos conseguido entregar o bolo em segurança."
70005030-95 = "Se tivéssemos cooperado desde o início, não teria virado esse problema todo..."
70005030-96 = "Bem, bem, o que importa é que deu tudo certo, não é?"
70005030-97 = "Kisaki, Hina. Aqui, isto é da minha parte."
70005030-98 = "Você fez uma quantidade e tanto... Não vai sobrar mesmo com todo mundo comendo?"
70005030-99 = "Temos que tomar cuidado para não ficarmos cheios antes de comer o bolo."
70005030-101 = "Se sobrar, é só levar para casa."
70005030-102 = "Fufu, é verdade."
70005030-104 = "Então, mais uma vez... Presidente Hina, Líder Kisaki! Feliz aniversário!"
70005030-105 = "Parabéns! Líder, Presidente."
70005030-107 = "Sim. Obrigada."
70005030-108 = "Um encontro entre Shanhaijing e Gehenna... ou melhor, uma reunião \"particular\"."
70005030-109 = "Espero que, no futuro... mesmo que seja informal, que possamos fazer isso como hoje..."
70005030-110 = "Expandir nosso círculo de amizades passo a passo e aprofundar nossos conhecimentos."
70005030-111 = "Aliás... por que a festa de aniversário foi reservada em nome da Associação Genbu? #nE ainda por cima num karaokê...?"
70005030-112 = "Foi um pedido especial da presidente."
70005030-113 = "Festa de aniversário tem que ser no karaokê, né!"
70005030-115 = "Dito dessa forma, até que faz sentido..."
70005030-116 = "É mesmo...?"
70005030-117 = "Vamos lá, quem vai começar? Se ninguém for, eu vou começar cantando!"
70005030-128 = "A próxima sou eu...!"
70005030-139 = "Vou passar o bastão com elegância...!"
70005030-152 = "Ei! O que vocês vão fazer com esse clima?!"
70005030-153 = "M-mas por que está perguntando para mim...?"
70005030-155 = "Não tem jeito. Deixe comigo..."
70005030-177 = "(Olhando para o mapa enviado, cheguei ao karaokê onde todos estão)"
70005030-179 = "[ns] \"Ei, pessoal!\""
70005030-181 = "P-Professor...!?"
70005030-183 = "Professor...!?"
70005030-187 = "[ns] \"Feliz aniversário! Hina! Kisaki!\""
70005030-189 = "N-não é nada! Eu não tinha a intenção de chamar o Professor, viu?!"
70005030-190 = "Pensei que seria útil ter um favor a meu favor no futuro... Professor, agradeça-me, está bem?"
70005030-191 = "Foi a Ako que entrou em contato...?"
70005030-192 = "A Administradora Ako também? Que coincidência! Eu chamei o Professor porque queria que ele viesse..."
70005030-193 = "Ah, bem, é que..."
70005030-194 = "…Entendo. Então as duas convidaram o Professor. Mina, Ako, agradeço a vocês."
70005030-195 = "…Professor, fico feliz que tenha vindo."
70005030-196 = "[s1] \"É aniversário de vocês, claro que eu tinha que aparecer!\"\n[s2] \"Mina, Ako, obrigado por me avisarem!\""
70005030-199 = "Hum... bem, é o esperado."
70005030-200 = "…Desta vez é uma exceção, viu?"
70005030-201 = "[ns3] \"Bem... já que a minha entrada como adulto deixou o clima meio frio!\"\n[ns4] \"Vou assumir a responsabilidade e animar as coisas!\""
70005030-204 = "Hã? Eu não acho que o clima tenha esfriado, mas..."
70005030-205 = "Ora, ora, esse é apenas o jeito do Sensei de se divertir."
70005030-206 = "Ah, entendo..."
70005030-210 = "[ns] \"Hina e Kisaki, vamos cantar juntas!\""
70005030-211 = "Eh? Mas eu... não sou muito boa em cantar..."
70005030-212 = "Eu também não costumo elevar a voz assim..."
70005030-216 = "Hum... então você diz que é essencial que nós cantemos?"
70005030-217 = "Pois é... acho que mostrar esse lado de vez em quando pode ser interessante."
70005030-218 = "T-tudo bem. Então, vamos lá..."
70005030-231 = "[ns] \"Vamos animar isso aqui!!\""
70005030-237 = "（Assim, a festa de aniversário de 19 de fevereiro, que ficou tão animada, chegou ao fim com sucesso... mas...）"
70005030-238 = "（Como resultado de ter sido levado pelo clima e me divertido com a mesma energia que todos...）"
70005030-239 = "（A dor intensa que veio depois me fez lembrar que eu sou um \"adulto\".）"
70005030-240 = "Registro de um certo 19 de fevereiro"
