[translation]#[Texto Final. - Filipe 08/07.]
70005030-1 = "Registro de um Certo 19 de Fevereiro (2)"
70005030-2 = "Então, qual é o motivo?"
70005030-3 = "Viemos até D.U. sem saber……"
70005030-4 = "Presidente, é que……"
70005030-5 = "R-recebemos um contato da Câmara de Comércio Genbu de Sankakkei……"
70005030-6 = "Sankakkei? Câmara Genbu?"
70005030-7 = "Quer dizer…… um encontro entre escolas?"
70005030-8 = "Isso não é trabalho nosso?"
70005030-9 = "C-cof cof…… errei."
70005030-10 = "Na verdade, recebi um contato de uma…… 'amiga' da Câmara Genbu……"
70005030-11 = "E hoje, tínhamos combinado de passear juntas em D.U.……!"
70005030-12 = "Ako tem…… amigas na Câmara Genbu?"
70005030-13 = "……"
70005030-14 = "Desculpa, Ako. Deve ter sido duro até agora."
70005030-15 = "……Não precisa mentir só pra ter folga……"
70005030-16 = "O-que você quer dizer?"
70005030-17 = "Eu meio que entendo……"
70005030-18 = "Haa……"
70005030-19 = "Fiquem quietas, por favor!"
70005030-20 = "P-Presidente! Isso é……"
70005030-21 = "……"
70005030-22 = "Enfim, o importante é que é PRIVADO."
70005030-26 = "(Importante……?)"
70005030-28 = "Oh! Estavam esperando?"
70005030-29 = "……Quanto tempo, Ako?"
70005030-30 = "S-sim! Quanto tempo, Rumi……"
70005030-33 = "……!"
70005030-34 = "(Ela realmente tem amigas na Câmara Genbu?)"
70005030-35 = "(Mas essas pessoas são…… a presidente da Câmara Genbu, a gerente, e a executiva do Portão do Dragão Negro……#n……e aquela aluna baixinha……)"
70005030-36 = "Bem, Ako…… a presidente já me contou……"
70005030-37 = "Sim. Sou Mina Konoe.#nE esta é……"
70005030-42 = "Sou Kisaki Ryuge. Não cabe títulos neste momento."
70005030-43 = "Antes de começarmos…… com licença, vou acender um incenso."
70005030-48 = "Hmm? Que cheiro diferente……"
70005030-49 = "É, parece que acalma……"
70005030-50 = "……"
70005030-51 = "(Kisaki Ryuge…… sem dúvida.#n……a líder do Portão do Dragão Negro, também conhecida como a 'Monarca Negra' de Sankakkei!)"
70005030-52 = "Ako."
70005030-53 = "S-sim! Presidente!"
70005030-54 = "Pode me explicar direito?"
70005030-55 = "B-bem, como eu disse, vim com minha amiga Rumi……!"
70005030-57 = "Ako. Já que estamos todos aqui, não tem mais por que esconder."
70005030-58 = "Deixa que eu explico. Certo, Kisaki?"
70005030-59 = "Sim. Confio em você, especialmente nessas ocasiões."
70005030-60 = "E vocês, amigas de Gehenna…… podem me chamar de 'Kisaki'."
70005030-61 = "Ah, sim…… pode me chamar de 'Hina' também……"
70005030-63 = "……"
70005030-64 = "Resumindo――"
70005030-65 = "ocorreu uma troca de encomendas. As cargas de ambos os lados foram invertidas."
70005030-66 = "Mina e o Comitê de Disciplina fizeram o possível……#nmas foi um capricho do destino."
70005030-67 = "Hmm―― vamos ao que interessa."
70005030-73 = "Aqui, este é o bolo que deveria ter chegado ao Comitê de Disciplina."
70005030-78 = "……Obrigada. Aqui, seu bolo."
70005030-79 = "Parece uma troca de presentes.#nFufu…… é uma experiência estranha."
70005030-88 = "Quem diria que fazemos aniversário no mesmo dia."
70005030-89 = "Um em 365…… ainda mais com a mesma idade, é raro."
70005030-90 = "As coincidências são realmente estranhas."
70005030-91 = "É…… verdade."
70005030-92 = "Hoje vai ser um dia especial. Obrigada a todos."
70005030-93 = "Por um momento achei que ia dar ruim……"
70005030-94 = "Fico feliz que os bolos chegaram."
70005030-95 = "Se tivéssemos cooperado desde o começo, não teria dado problema……"
70005030-96 = "O que importa é que no final deu certo, né?"
70005030-97 = "Kisaki, Hina. Isto é meu presente."
70005030-98 = "Você fez uma quantidade enorme…… vai sobrar mesmo com todos comendo?"
70005030-99 = "É melhor não encher muito antes do bolo."
70005030-101 = "Se sobrar, levamos pra casa."
70005030-102 = "Fufu, isso é verdade."
70005030-104 = "Então, de novo…… Presidente Hina, Líder Kisaki! Feliz aniversário!"
70005030-105 = "Feliz aniversário! Líder! Presidente!"
70005030-107 = "É. Obrigada."
70005030-108 = "Um encontro entre Sankakkei e Gehenna―― ou melhor, uma reunião 'privada'."
70005030-109 = "Que no futuro, mesmo que de forma não oficial, como hoje……"
70005030-110 = "possamos ampliar nossos laços e aprofundar o conhecimento."
70005030-111 = "Aliás…… por que a festa foi reservada em nome da Câmara Genbu?#nE num karaokê……?"
70005030-112 = "Foi pedido da presidente."
70005030-113 = "Festa de aniversário tem que ser em karaokê!"
70005030-115 = "Quando você diz assim, até parece fazer sentido……"
70005030-116 = "É mesmo……?"
70005030-117 = "Vamos, quem começa? Se ninguém, eu vou começar!"
70005030-128 = "Agora sou eu……!"
70005030-139 = "Vou passar o bastão com estilo……!"
70005030-152 = "Ei! O que fazemos com esse clima?"
70005030-153 = "N-não me pergunte……"
70005030-155 = "Não tem jeito. Vou ter que……"
70005030-177 = "(Segui o mapa enviado e cheguei ao karaokê)"
70005030-179 = "[ns] \"Olá, pessoal!\""
70005030-181 = "S-Sensei!?"
70005030-183 = "Sensei!?"
70005030-187 = "[ns] \"Feliz aniversário! Hina! Kisaki!\""
70005030-189 = "N-não foi por acaso! Eu não chamei o Sensei!?"
70005030-190 = "Pensei que criar uma dívida com ele seria útil depois…… então me agradeça, Sensei?"
70005030-191 = "Ako que avisou……?"
70005030-192 = "Ako também? Que coincidência! Eu chamei o Sensei porque queria que viesse……"
70005030-193 = "Ah, é que……!"
70005030-194 = "……Entendo. Ambas convidaram o Sensei. Mina, Ako, obrigado."
70005030-195 = "……Sensei, que bom que veio."
70005030-196 = "[s1] \"É aniversário, claro que eu apareço!\"\n[s2] \"Mina, Ako, obrigado por avisar!\""
70005030-199 = "Hm…… foi o mínimo."
70005030-200 = "……Esta vez foi especial, ok?"
70005030-201 = "[ns3] \"Então…… vou dar uma animada aqui!\"\n[ns4] \"Vou quebrar o gelo!\""
70005030-204 = "Hã? Acho que não está gelado……"
70005030-205 = "É o jeito do Sensei."
70005030-206 = "Hmm……"
70005030-210 = "[ns] \"Hina, Kisaki, cantem também!\""
70005030-211 = "Hã? Mas eu não sei cantar……"
70005030-212 = "Eu também não gosto de fazer barulho……"
70005030-216 = "Hmm―― então vocês querem que a gente cante?"
70005030-217 = "Talvez seja bom mostrar esse lado de vez em quando."
70005030-218 = "T-tá bom. Então……"
70005030-231 = "[ns] \"Vamo animar, gente!!\""
70005030-237 = "(Assim, a festa de aniversário de 19 de fevereiro terminou com grande sucesso…… mas……)"
70005030-238 = "(Levado pela animação, me empolguei igual a todos……)"
70005030-239 = "(e a dor que veio depois me lembrou que eu sou um 'adulto')"
70005030-240 = "Registro de um Certo 19 de Fevereiro"