[translation]
83306085400-6 = "Eu encontrei."
83306085400-7 = "O quê! É verdade!?"
83306085400-8 = "Então, quem diabos é o culpado!?"
83306085400-9 = "Com o poder de mim, Makoto, vou punir esse culpado impiedosamente!"
83306085400-10 = "É difícil dizer, mas, provavelmente..."
83306085400-16 = "Ah! Makoto-senpai! Hina-senpai! Aquele pudim!"
83306085400-17 = "Oh! Ibuki! Que bom que você chegou! Estávamos justamente falando sobre o pudim que foi roubado por um malfeitor..."
83306085400-18 = "Ibuki encontrou! Eu achei o pudim dentro da barraca agorinha!"
83306085400-19 = "Mas eu pensei que se deixasse lá, as formigas, os ursos e os coelhinhos iam levar embora...!"
83306085400-20 = "Então a Ibuki guardou no baú do tesouro!"
83306085400-21 = "Eu pensei em esperar a Makoto-senpai, a Iroha-senpai, a Satsuki-senpai e a Chiaki-senpai chegarem para comermos todos juntos!"
83306085400-22 = "……Pelo visto, é isso."
83306085400-23 = "I-I-I-Ibuki..."
83306085400-24 = "Hm? O que foi~?"
83306085400-25 = "A-A-Ahhh... E-Eu não sabia disso..."
83306085400-26 = "Me desculpe, Ibuki...! Eu sou a culpada por não ter entendido os seus sentimentos aaaaaaa!!!"
83306085400-27 = "……Eh?"
