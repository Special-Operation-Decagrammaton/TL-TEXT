[translation]
83306085400-6 = "見つけたわ。"
83306085400-7 = "なんだと！本当か！？"
83306085400-8 = "それで、一体どこのどいつが犯人だ！？"
83306085400-9 = "このマコト様の権力で、犯人を徹底的に懲らしめてやろう！"
83306085400-10 = "言いづらいのだけど、たぶん……"
83306085400-16 = "あ！マコト先輩！ヒナ先輩！そのプリン！"
83306085400-17 = "おお！イブキ！いいところに来てくれた！悪い奴に盗まれたプリンを、ちょうど……"
83306085400-18 = "イブキね！さっきテントの中でプリンを見つけたんだ！"
83306085400-19 = "でも放っておいたらアリさんやクマさん、ウサギさんが持っていっちゃうと思って……！"
83306085400-20 = "イブキが宝箱に入れておいたの！"
83306085400-21 = "後でマコト先輩とイロハ先輩！サツキ先輩！チアキ先輩が来たら！みんなで一緒に食べようと思って！"
83306085400-22 = "……らしいけど。"
83306085400-23 = "い、い、い、イブキ……"
83306085400-24 = "ん？なあに～？"
83306085400-25 = "あ、あ、あああっ……そ、そうとは知らず……"
83306085400-26 = "悪かった、イブキ……！イブキのそんな気持ちを汲み取れない私が悪かったあああああ！！！"
83306085400-27 = "……えっ？"
