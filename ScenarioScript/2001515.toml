[translation]
2001515-1 = "A primeira lembrança"
2001515-2 = "（Visitei a loja pop-up de Mushiking com a Kaede……）"
2001515-6 = "[ns1] \"Que fila enorme……。\"\n[ns2] \"Parece que vai demorar um pouco……。\""
2001515-10 = "É assim mesmo no dia do lançamento de edições limitadas."
2001515-11 = "Especialmente desta vez, já que é um protetor de cartas lendário que todos achavam que nunca seria relançado."
2001515-12 = "Se eu perder a chance de comprar agora, quem sabe quando será relançado de novo……。"
2001515-13 = "[s3] \"Protetor de cartas, é aquilo, né?\"\n[s4] \"Tipo um saquinho que a gente coloca para proteger a carta……\""
2001515-16 = "Isso mesmo! Existem vários tipos, sabe……。"
2001515-17 = "Ah, é mais fácil mostrar do que explicar! #nVou te mostrar minha coleção de protetores!"
2001515-18 = "[s] \"Coleção de protetores!?\""
2001515-19 = "Sim, são meus tesouros!…… Tcharam!"
2001515-25 = "[ns] \"Parece que foram bem usados.\""
2001515-26 = "Esse foi o primeiro protetor que eu comprei."
2001515-27 = "Antigamente, eu nem sabia que protetores existiam."
2001515-28 = "Eu acabava sujando as cartas com o suor das mãos ou dobrando as pontas……。"
2001515-29 = "Deixei minhas cartas preciosas todas acabadas."
2001515-30 = "Naquela época, eu pensava que era só comprar outras depois, mas……。"
2001515-31 = "No fim das contas, a gente precisa cuidar bem das cartas. #nSe não, não merecemos ser duelistas."
2001515-32 = "Pensando agora, por que eu fiz aquilo……!"
2001515-33 = "Eu queria voltar no tempo e impedir a mim mesma～～！"
2001515-34 = "[s5] \"Está tudo bem, não se preocupe.\"\n[s6] \"Todo mundo cresce aprendendo com essas coisas.\""
2001515-37 = "Mas eu quero me tornar uma dama maravilhosa o mais rápido possível!"
2001515-38 = "Não faz sentido ter pressa……? O que você quer dizer?"
2001515-39 = "É como uma batalha de cartas……? Estou ficando cada vez mais confusa……。"
2001515-40 = "A ordem de jogar……?"
2001515-41 = "Ah, entendi. Se eu não pensar bem antes de jogar, vou acabar ficando sem recursos, né."
2001515-42 = "Então, seguir as etapas uma por uma também é um atalho para me tornar uma dama maravilhosa……"
2001515-43 = "Hmm…… talvez você tenha razão!"
2001515-44 = "Como esperado do Sensei! #nVou seguir os passos certos e me tornar uma dama maravilhosa!"
2001515-45 = "[s] \"Sim, estou ansioso para ver.\""
2001515-46 = "Voltando ao assunto dos protetores…… #nDependendo do torneio, você precisa deles para participar."
2001515-47 = "Como eu não sabia disso, perdi minha estreia por W.O……."
2001515-48 = "Ugh…… eu queria ter estreado com estilo e chegado ao topo dos duelistas……!"
2001515-49 = "[s] \"Entendo, eu não sabia disso…….\""
2001515-50 = "Por exemplo, se alguém marcar o verso de uma carta forte, pode trapacear, né?"
2001515-51 = "Como os protetores impedem esse tipo de trapaça, eles são obrigatórios nos torneios."
2001515-52 = "As cartas estão cheias dos sonhos, da alma, da paixão e das lembranças dos duelistas!"
2001515-53 = "Quem não cuida das cartas não tem o direito de ser um duelista!"
2001515-54 = "É por isso que os protetores, que são como a armadura das cartas, são tão importantes!"
2001515-55 = "[s] \"A armadura das cartas, é verdade……!\""
2001515-56 = "Ah, isso soou bem elegante, não foi? #nO que achou, Sensei?"
2001515-57 = "……hehe, consegui!"
2001515-58 = "Obrigada, Sensei!"
2001515-59 = "[s] \"De nada. Mas, falando nisso, você realmente gosta muito de Mushiking, né.\""
2001515-60 = "Ahaha…… se eu começar a explicar o porquê, vai demorar muito."
2001515-61 = "É uma história um pouco vergonhosa do passado, sabe……。"
2001515-65 = "[ns] （Uma \"história do passado\" vindo de alguém da idade da Kaede……）"
2001515-66 = "……Talvez eu já tenha dito antes, mas eu venho do interior."
2001515-67 = "No interior, não tem muitas coisas para brincar, então as opções são limitadas."
2001515-69 = "Eu costumava caçar lagostins…… ou pegar besouros……."
2001515-70 = "Claro, isso também é super divertido!#nQuando estou brincando com meus amigos, o tempo passa voando!"
2001515-71 = "Ainda assim, em algum lugar do meu coração... eu buscava algo que me deixasse ainda mais empolgada."
2001515-73 = "Foi nessa hora que eu conheci o Mushiking!"
2001515-75 = "Quando vi pela primeira vez, fiquei chocada!#nTinha besouros e cervídeos desenhados nas cartas..."
2001515-76 = "E pensar que dava para competir contra outras pessoas usando essas cartas!!!"
2001515-77 = "No começo, eu realmente não conseguia acreditar!"
2001515-78 = "A emoção que senti naquela hora foi incrível... como posso explicar..."
2001515-79 = "Isso! Foi como descobrir um novo continente!"
2001515-80 = "[s] \"Foi um choque e tanto, hein...!\""
2001515-81 = "Porque é incrível, sabe!"
2001515-82 = "As regras são muito mais elaboradas do que brincar de pega-pega!"
2001515-83 = "Como a forma de jogar as cartas e montar o deck muda completamente a estratégia!"
2001515-84 = "E, basicamente, o fato de que nunca existe uma partida igual à outra também é fascinante."
2001515-85 = "Quanto mais você luta contra pessoas diferentes, mais percebe que existem estratégias infinitas.#nJogos são realmente incríveis, né!"
2001515-86 = "Se não fosse pelo Mushiking,#nprovavelmente eu nunca teria conhecido esse mundo profundo dos jogos de cartas na minha vida!"
2001515-87 = "[s] \"Foi um bom encontro, então.\""
2001515-88 = "Encontro, será que dá para chamar assim?"
2001515-89 = "Hmm, não sei bem... mas, talvez seja isso mesmo!"
2001515-91 = "Próximo cliente, por favor, pode entrar."
2001515-92 = "Ah! Parece que é a nossa vez!#nVamos entrar logo, Sensei!"
2001515-94 = "（E assim, conseguimos comprar as capas de carta limitadas do Mushiking na loja temporária sem problemas）"
