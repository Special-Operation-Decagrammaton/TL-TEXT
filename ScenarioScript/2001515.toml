[translation]
2001515-1 = "はじめての思い出"
2001515-2 = "（カエデと一緒にムシクイーンのポップアップストアを訪れた……）"
2001515-6 = "[ns1] \"すごい列……。\"\n[ns2] \"結構並びそうだね……。\""
2001515-10 = "限定版の発売日はこんなものだよ。"
2001515-11 = "特に今回は、復刻が絶望視されてた幻のスリーブだからね。"
2001515-12 = "買い逃しちゃったら、次はいつ復刻するやら……。"
2001515-13 = "[s3] \"カードスリーブって、あれだよね？\"\n[s4] \"カード保護のために被せる、袋みたいな……\""
2001515-16 = "そうなの！色々種類があってね……。"
2001515-17 = "あ、見たほうが早いよね！#n私のスリーブコレクション見せてあげる！"
2001515-18 = "[s] \"スリーブコレクション！？\""
2001515-19 = "うん、宝物なんだ！……ジャーン！"
2001515-25 = "[ns] \"良い感じに使い込まれてるね。\""
2001515-26 = "これ、初めて買ったスリーブなんだ。"
2001515-27 = "昔はスリーブの存在も知らなくてさ。"
2001515-28 = "手汗で汚しちゃったり、角を折っちゃったりして……。"
2001515-29 = "大切なカードをボロボロにしちゃってたんだ。"
2001515-30 = "あの頃はまた買い直せばいっかって考えてたけど……。"
2001515-31 = "やっぱりカードは、大切にしないと。#nバトラー失格だよ。"
2001515-32 = "今思い返すと、どうしてあんなことを……！"
2001515-33 = "あの頃の自分を止めたいよ～～！"
2001515-34 = "[s5] \"大丈夫、大丈夫。\"\n[s6] \"みんなそうやって成長するものだよ。\""
2001515-37 = "でも、私はできるだけ早く素敵なレディーになりたいから！"
2001515-38 = "急ぎすぎても意味がない……？どういうこと？"
2001515-39 = "カードバトルと同じ……？ますます分からなくなってきた……。"
2001515-40 = "出す順番……？"
2001515-41 = "あ、そっか。後のことをちゃんと考えて出さないと、ジリ貧になっちゃうもんね。"
2001515-42 = "順番通りにこなしていくのも、素敵なレディーへの近道、かぁ……。"
2001515-43 = "うーん……確かにそうかも！"
2001515-44 = "さすが先生だね！#n適切なステップを踏んで、素敵なレディーになろっと！"
2001515-45 = "[s] \"うん、楽しみにしてるよ。\""
2001515-46 = "話はスリーブに戻るんだけど……。#n大会によっては、参加するためにスリーブが必要なことがあって。"
2001515-47 = "それを知らなかったせいで、私のデビュー戦は不戦敗……。"
2001515-48 = "うぅ……華麗にデビューしてバトラーの頂点に立ちたかったのに……！"
2001515-49 = "[s] \"そうなんだ、知らなかった……。\""
2001515-50 = "例えば、強いカードの裏面に目印を付けたりすると、ズルができちゃうでしょ？"
2001515-51 = "そういう不正行為を防げるから、大会ではスリーブをつけることになってるの。"
2001515-52 = "カードにはバトラーの夢と魂、そして色んな情熱と思い出が詰まってるんだ！"
2001515-53 = "カードを大切にしない者に、バトラーの資格は無い！"
2001515-54 = "だからこそ、カードの鎧とも言えるスリーブは大事なの！"
2001515-55 = "[s] \"カードの鎧、か。そうだね……！\""
2001515-56 = "あ、今の結構素敵な感じだったんじゃない？#nどう？先生。"
2001515-57 = "……えへへ、やった！"
2001515-58 = "ありがと、先生！"
2001515-59 = "[s] \"ううん。それにしても、本当にムシクイーンが好きなんだね。\""
2001515-60 = "あはは……どうして好きなのかを話し始めると、長くなっちゃうかも。"
2001515-61 = "ちょっと恥ずかしい昔話なんだけどね……。"
2001515-65 = "[ns] （カエデの年で「昔話」……）"
2001515-66 = "……前も言ったかもだけど私、田舎の出身なんだ。"
2001515-67 = "田舎だとあんまり遊べるものがなくて、できることが限られてるの。"
2001515-69 = "ザリガニを獲ったり……カブトムシを捕まえたり……。"
2001515-70 = "もちろん、それもすっごく楽しいんだけど！#n友達と一緒に遊んでたら、あっという間なんだけどね！"
2001515-71 = "それでも心のどこかで……もっとワクワクするようなものを求めてたの。"
2001515-73 = "そんな時に――ムシクイーンに出会ったってわけ！"
2001515-75 = "初めて見た時はもうビックリだよ！#nカードにカブトムシとかクワガタが描かれてて……"
2001515-76 = "そのカードで、人と勝負できるなんて！！！"
2001515-77 = "最初は本当に信じられない気持ちだったの！"
2001515-78 = "あの時の感動は本当にすごくて……例えるなら……。"
2001515-79 = "そう！新大陸を発見したみたいな！"
2001515-80 = "[s] \"かなりの衝撃だったんだ……！\""
2001515-81 = "だってすごいんだよ！"
2001515-82 = "鬼ごっことかより、もっとルールが練られてて！"
2001515-83 = "手札の出し方、デッキの組み方で戦法が全然変わるなんて！"
2001515-84 = "あと基本的に、同じ勝負が一度しか発生しないのも魅力だよね。"
2001515-85 = "色んな人と戦えば戦うほど、無限の戦法があるって分かってくるの。#nゲームって本当にすごいよね！"
2001515-86 = "ムシクイーンがなかったら、#nこんなに奥深いカードゲームの世界を一生味わえないままだったかもしれない！"
2001515-87 = "[s] \"良い出会いだったんだね。\""
2001515-88 = "で、出会いって言うのかな？"
2001515-89 = "うーん、よく分かんないけど……でも、確かにそうかも！"
2001515-91 = "次のお客様、ご入場ください。"
2001515-92 = "あ！私たちの番みたい！#n早く入ろう、先生！"
2001515-94 = "（そうしてポップアップストアで無事、限定版のムシクイーンスリーブを購入した）"
