[translation]
10008110-1 = "Episódio 11; A Batalha de Defesa do Grande Sorte"
10008110-3 = "Ch-chefe! Um número considerável deles está avançando, e um conflito armado começou!"
10008110-4 = "Se continuar assim, é só uma questão de tempo até que cheguem ao escritório!"
10008110-5 = "Droga...! Quem diria que seríamos atrapalhados até esse ponto...!!"
10008110-6 = "Estamos adiantados em relação ao plano, mas não temos escolha."
10008110-7 = "Vamos pegar a caixa de ofertas e fugir!"
10008110-12 = "Achei vocês!"
10008110-13 = "O quê!? Não me diga que essa situação foi causada por vocês...!?"
10008110-14 = "Sim, exatamente. Vocês nos fizeram de bobas por tempo demais!"
10008110-15 = "Ficaram aí bancando os espertos falando sobre redes sociais,"
10008110-16 = "mas quem vive por elas, morre por elas!"
10008110-18 = "……Bem, você tem um ponto."
10008110-19 = "Só porque somos temporárias, não pensem que somos apenas obedientes!"
10008110-20 = "Não vamos deixar vocês escaparem!"
10008110-22 = "Grr, que insolentes...!"
10008110-23 = "Reúnam mais tropas!"
10008110-24 = "Não adianta trazer mais gente. Aumentar o número não muda nada, derrotar pessoas como vocês é moleza...!"
10008110-25 = "I-isso é... a maior parte das forças do Grupo Kurokame está sendo impedida perto do portão principal...!"
10008110-26 = "O-o que você quer dizer com isso!?"
10008110-29 = "Muito bem, vamos começar~!"
10008110-30 = "Crianças más vão receber um castigo~☆"
10008110-35 = "……O preço por esmagar nossos sonhos é alto."
10008110-38 = "E-então chamem os que não estão no portão principal!"
10008110-39 = "Não é só isso! Além do portão principal, há outros invasores vindo de todos os lados...!"
10008110-40 = "……!!"
10008110-43 = "Grupo Kurokame, foi isso que disseram...?"
10008110-44 = "Causar uma confusão dessas logo no dia de Ano Novo,"
10008110-45 = "o que vocês têm na cabeça!?"
10008110-46 = "Mostrem a fúria de quem está trabalhando no feriado, avancem!"
10008110-49 = "Sim!!"
10008110-54 = "Eu entendo o sentimento, mas como membro do Comitê Disciplinar, não acho que essa forma de falar seja adequada..."
10008110-55 = "Bem, acho que hoje podemos abrir uma exceção."
10008110-56 = "Por enquanto, vamos deixá-los causar o quanto quiserem."
10008110-57 = "……Muito bem, pessoal do Grupo Kurokame, vou prender todos vocês."
10008110-60 = "P-por que, como isso foi acontecer...!"
10008110-61 = "Fufu... quer que eu te conte a resposta?"
10008110-62 = "Porque, na verdade..."
10008110-63 = "Vocês cometeram o erro de se tornarem inimigos da Problem Solver 68!"
10008110-65 = "I-isso foi incrível! Aru-sama!"
10008110-66 = "……Não, acho que foi só uma mistura de sorte e cooperação."
10008110-67 = "A Aru-chan não para quando se empolga, né~! Kufufu!"
10008110-72 = "……A presidente de vocês nunca ouve que é um pouco 'descarada'?"
10008110-73 = "C-cala a boca!"
10008110-74 = "De qualquer forma, agora é a hora de mostrar nossa determinação!"
10008110-75 = "Sensei, contamos com você também, certo?"
10008110-76 = "[s] \"Sim. Então, vamos nessa.\""
