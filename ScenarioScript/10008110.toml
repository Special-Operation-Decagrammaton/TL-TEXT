[translation]
10008110-1 = "第11話;大吉殿攻防戦"
10008110-3 = "ぼ、ボス！かなりの数が押し寄せてきており、武力衝突が発生しております！"
10008110-4 = "このままですと、事務所まで押し寄せてくるのも時間の問題です！"
10008110-5 = "くっ……！まさかここまで邪魔をされることになるとは……！！"
10008110-6 = "予定より早いですが、仕方ありません。"
10008110-7 = "賽銭箱を持って脱出しましょう！"
10008110-12 = "見つけたわよ！"
10008110-13 = "なっ！？もしやこの事態、あなた方が……！？"
10008110-14 = "ええそうよ、よくも散々コケにしてくれたわね！"
10008110-15 = "SNSがどうとか偉そうに言ってたけれど、"
10008110-16 = "そういう当人ほどSNSで滅びるものなのよ！"
10008110-18 = "……まあ、一理あるね。"
10008110-19 = "バイトだからって、ただ従順なだけだと思わないでよね！"
10008110-20 = "逃がさないんだから！"
10008110-22 = "ぐっ、生意気な……！"
10008110-23 = "もっと兵力を集めなさい！"
10008110-24 = "また来たところで同じこと。数を増やせばあなた方ごとき、制圧するのは朝飯前……！"
10008110-25 = "そ、それが……現在黒亀組の兵力の大半が、正門付近で邪魔されてるとかで……！"
10008110-26 = "ど、どういうことですか！？"
10008110-29 = "さぁ、やっていこうか～！"
10008110-30 = "悪い子たちにはお仕置きですよ～☆"
10008110-35 = "……夢を踏みにじった代償は大きい。"
10008110-38 = "せ、正門以外にいる分を呼べば良いではありませんか！"
10008110-39 = "それだけではありません！正門以外にも、あちこちから別の襲撃者が……！"
10008110-40 = "……！！"
10008110-43 = "黒亀組、だったか……。"
10008110-44 = "元旦からこんな騒ぎを起こすなんて、"
10008110-45 = "何を考えてるんだ！"
10008110-46 = "休日出勤の怒りを見せてやる、行け！"
10008110-49 = "はいっ！！"
10008110-54 = "気持ちは分かるのですが、その言い方はちょっと風紀委員会としてどうかと……。"
10008110-55 = "まあ今日くらいは許容ですかね。"
10008110-56 = "とりあえず、好きなだけ暴れさせておきましょうか。"
10008110-57 = "……では黒亀組のみなさん、あなたたちを全員拘束させてもらいます。"
10008110-60 = "な、なぜ、どうしてこんなことに……！"
10008110-61 = "ふふっ……その答え、教えてあげましょうか？"
10008110-62 = "何故ならそれは……"
10008110-63 = "私たち、便利屋68を敵に回したからよ！"
10008110-65 = "か、かっこいいです！アル様！"
10008110-66 = "……いや、偶然と協力のおかげだと思うけど。"
10008110-67 = "アルちゃんは一度調子に乗ると止まらないからね～！くふふっ！"
10008110-72 = "……あんたたちの社長、周りから時々「図々しい」とか言われない？"
10008110-73 = "う、うるさいわね！"
10008110-74 = "とにかく、今こそ私たちの意地を見せる時よ！"
10008110-75 = "もちろん先生も、お願いね？"
10008110-76 = "[s] \"うん。じゃあ、行こうか。\""
