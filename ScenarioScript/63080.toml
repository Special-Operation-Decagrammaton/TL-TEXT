[translation]
63080-1 = "Episódio 8; Hora do Chá"
63080-2 = "Primeiramente, gostaria de agradecer sinceramente por tudo o que aconteceu desta vez."
63080-3 = "[s] \"Nagisa, você também se esforçou muito.\""
63080-4 = "Não há de quê. Eu..."
63080-5 = "...Não, aceitarei suas palavras com gratidão agora."
63080-6 = "Sobre o local onde as alunas de Arius estudarão e farão as provas...#nPor favor, não se preocupe."
63080-7 = "Existe um antigo prédio escolar em Trinity que não está sendo usado no momento."
63080-8 = "Farei os arranjos para que vocês possam usá-lo sem custo algum."
63080-9 = "[s1] \"Um antigo prédio escolar sem uso...\"\n[s2] \"Emprestar sem custo...\""
63080-14 = "Há algo que o preocupa...?"
63080-15 = "Está surpreso com a rapidez dos preparativos?"
63080-16 = "O que você quer dizer com isso?#nTodas as coisas só brilham quando cumprem seu papel da maneira correta."
63080-17 = "Sim? As provas?#nNaturalmente, os membros do Chá das Cinco também as farão, mas..."
63080-18 = "Nós somos justamente as pessoas cujas qualificações seriam questionadas se nossas notas fossem ruins, sabe?"
63080-19 = "Mas ambas são excelentes, então não estou particularmente preocupada."
63080-20 = "...Ah, as notas da Mika?"
63080-24 = "..."
63080-25 = "Sensei."
63080-26 = "A Mika é, como posso dizer..."
63080-27 = "O exemplo clássico de alguém que \"tem inteligência natural, mas não se esforça\"."
63080-30 = "Longe de ser pouco inteligente, a Mika é, na verdade, o oposto."
63080-31 = "É só que... ela simplesmente não se dispõe a usar essa inteligência."
63080-32 = "É apenas uma suposição minha, mas... acho que ela acha trabalhoso pensar em detalhes..."
63080-35 = "Bem, por isso, as provas não serão um problema... sempre foi assim...#nAh..."
63080-36 = "Além disso, se as notas fossem ruins, ela não teria sido escolhida para o Chá das Cinco, não é?"
63080-37 = "[s] \"Nagisa, você também passa por maus bocados...\""
63080-38 = "Apenas essas palavras já me trazem conforto..."
63080-39 = "Bem, vamos deixar as introduções de lado."
63080-40 = "Sobre o desfecho desta vez... não é exagero dizer que os problemas entre Trinity e Arius são a própria história de ambas as escolas."
63080-41 = "Baseando-se nos mesmos eventos, cada uma herdou a história com interpretações completamente diferentes."
63080-42 = "A história é um acúmulo de fatos que ocorreram, mas quem os registra são as pessoas."
63080-43 = "..."
63080-44 = "O problema é a existência de interpretações divergentes."
63080-45 = "É por isso que pretendo comparar nossas histórias ponto a ponto.#nNo final, pretendo compilar tudo em um estado que qualquer um possa consultar."
63080-46 = "[s] \"Será que vai dar certo...\""
63080-47 = "Claro, ambas as versões provavelmente divergem muito... e, no processo de conciliação, atritos e conflitos aumentarão temporariamente."
63080-48 = "Mas superar o passado significa ter o olhar corajoso de encará-lo sem nuvens."
63080-49 = "Além disso, pretendo pedir a perspectiva de especialistas."
63080-50 = "Se for para comparar registros e realizar pesquisas... há pessoas que aceitariam de bom grado."
63080-55 = "Tenho certeza de que muitas coisas mudarão daqui para frente.#nMas... acredito que seremos capazes de superar isso."
63080-56 = "A Trinity que eu conheço não é tão frágil assim."
63080-57 = "Pode ser que surjam disputas políticas internas durante esse processo, mas..."
63080-58 = "..."
63080-59 = "Para a anfitriã do Chá das Cinco, pode-se dizer que essa é a minha especialidade."
63080-60 = "[s] \"...\""
63080-61 = "A política é assim mesmo."
63080-62 = "Para obter algo de alguém, você oferece algo que possui."
63080-63 = "Repetindo trocas e concessões dessa forma—"
63080-64 = "Você não deve abrir mão, até o fim, apenas daquilo que você realmente quer proteger."
63080-65 = "No entanto, é comum perdermos de vista o nosso propósito inicial."
63080-66 = "Eu acabo esquecendo até mesmo quem eu sou e o que eu estava tentando fazer."
63080-67 = "[s] \"O que é que você quer proteger, Nagisa?\""
63080-71 = "Eu..."
63080-72 = "Eu quero que Trinity seja a melhor escola possível."
63080-73 = "Quero que as alunas sintam orgulho da escola que frequentam... que seja esse tipo de lugar."
63080-74 = "E que, um dia, ao olharem para trás para a vida escolar em Trinity—"
63080-75 = "Elas possam sorrir e lembrar que foi um tempo precioso e insubstituível."
63080-84 = "Espero que as experiências que obtiveram aqui se tornem tesouros valiosos para elas."
63080-85 = "Embora o caminho ainda seja longo, é claro."
63080-86 = "Dito isso, eu mesma... gostaria de ter um pouco desse tesouro também..."
63080-87 = "Para isso, é claro que..."
63080-88 = "Acho que é necessário observar tudo o que nos cerca com um olhar mais calmo."
63080-89 = "Isso foi algo que você me ensinou, Sensei."
63080-90 = "[s] \"...Nagisa.\""
63080-91 = "Sim?"
63080-92 = "[s] \"Sinto muito por aquela época.\""
63080-93 = "...Eh?"
63080-94 = "[s] \"Por não ter tentado acreditar em você quando deveria.\""
63080-97 = "[ns] \"E também... por ter dito coisas terríveis para você.\""
63080-99 = "[ns3] \"Eu...\"\n[ns4] \"Não deveria ter falado daquela maneira.\""
63080-103 = "Sensei...?"
63080-104 = "Por que... por que está dizendo isso agora...?"
63080-105 = "Sim? Porque... você nunca tinha conseguido dizer antes?"
63080-106 = "Se-Sensei! Não precisa se curvar tanto assim...!"
63080-111 = "...Ué?"
63080-116 = "De-desculpe... eu..."
63080-117 = "[s5] \"Você não precisa se segurar.\"\n[s6] \"A culpa é minha, afinal.\""
63080-123 = "[ns7] \"Eu também preciso me tornar um adulto exemplar logo.\"\n[ns8] \"Sinto muito por ser um Sensei tão imaturo.\""
63080-126 = "Sen...sei..."
63080-127 = "Sensei..."
63080-128 = "..."
63080-129 = "Peço perdão."
63080-130 = "Poderia... apenas por um momento... virar de costas para mim...?"
63080-133 = "(Conforme o pedido de Nagisa, virei de costas)"
63080-134 = "(Enquanto eu permanecia ali por um tempo...)"
63080-139 = "(Um pequeno peso foi depositado nas minhas costas com um toque suave)"
63080-143 = "...Foi doloroso."
63080-144 = "[s] \"...Sinto muito.\""
63080-145 = "Até agora, por tanto, tanto tempo..."
63080-146 = "[s] \"Sim...\""
63080-147 = "Eu pensei nisso muitas vezes."
63080-148 = "É claro que o que eu fiz é de minha responsabilidade."
63080-149 = "Mas..."
63080-150 = "Por que você foi tão rigoroso apenas comigo? Eu me perguntava..."
63080-151 = "Certamente, como anfitriã do Tea Party, essa é a minha posição."
63080-152 = "Acho que não há como evitar as críticas severas que recebi pelo caso do Clube de Estudos Suplementares..."
63080-153 = "Ainda assim..."
63080-158 = "Uuu..."
63080-159 = "(Como se estivesse expelindo todo o sofrimento que guardou até agora... as mãos de Nagisa batiam levemente em minhas costas várias vezes)"
63080-160 = "(Aquele toque frágil...)"
63080-161 = "(Cada uma delas... tocou profundamente o meu coração...)"
63080-164 = "[ns] \"...Você se acalmou?\""
63080-165 = "Sim."
63080-166 = "...Peço perdão por ter deixado você ver um lado tão deplorável meu."
63080-167 = "[s] \"Mais uma vez, eu realmente... sinto muito.\""
63080-168 = "Sensei, por favor, não se preocupe tanto com isso. Se continuar dizendo essas coisas, eu também..."
63080-169 = "..."
63080-170 = "Então, vamos fazer o seguinte."
63080-171 = "Para não repetirmos o mesmo erro, vamos ambos ter um pouco mais de cuidado daqui para frente."
63080-172 = "E, a menos que seja algo extremamente necessário, não tocaremos mais neste assunto."
63080-173 = "Para selar essa promessa... vamos brindar com chá."
63080-174 = "[s] \"Aceito.\""
63080-175 = "Então..."
63080-176 = "[s] \"...Um brinde.\""
63080-177 = "Um brinde."
63080-182 = "[ns] \"Que aroma maravilhoso...\""
63080-185 = "Naturalmente. Seria um problema se não fosse."
63080-189 = "...Ah, falando nisso. Você não disse que tinha algo para me contar...?"
63080-194 = "(O que eu contei para Subaru — não, o que ela leu na minha mente — sobre o que aconteceu logo após o incidente do Tratado de Eden)"
63080-195 = "(Falei sobre o chamado \"consenso\" entre a facção Pater e a facção Sanctus)"
63080-198 = "..."
63080-199 = "............"
63080-200 = ".............."
63080-201 = "[s] \"Nagisa...?\""
63080-202 = "Hmph."
63080-203 = "[s] \"Hmph...?\""
63080-204 = "...Fufu."
63080-205 = "Fufufufu..."
63080-206 = "Entendo, então era isso."
63080-207 = "Já consigo imaginar quem são essas duas pessoas. Afinal, relatórios relacionados também chegaram até mim."
63080-208 = "Sinceramente..."
63080-209 = "Agradeço de coração."
63080-210 = "Foi uma informação muito valiosa. Fufufufu..."
63080-211 = "[s] \"Eita...\""
63080-212 = "Dizendo que cuidaria bem das coisas, mas entregando um trabalho desse nível."
63080-213 = "E, apesar disso, o conteúdo do relatório foi apresentado de forma impecável."
63080-214 = "[s] \"Nagisa...?\""
63080-215 = "Não se preocupe."
63080-216 = "Cuidarei deste assunto de forma amigável."
63080-217 = "Sim, farei o meu melhor para que você não precise se preocupar, Sensei."
63080-218 = "Afinal, política é uma questão de causa justa e timing."
63080-219 = "Por exemplo, o fato de eu ter permitido tal ato de engano... pode ser visto como uma prova de que a autoridade dos representantes de cada facção ainda não foi restaurada."
63080-220 = "Especialmente a posição e o tratamento da Mika, que são preocupantes."
63080-221 = "Mesmo que seja difícil voltar ao que era antes, talvez eu deva propor uma melhoria na situação..."
63080-225 = "(O sorriso de Nagisa enquanto ela dizia isso...)"
63080-226 = "(Embora ela estivesse sorrindo, seus olhos não sorriam)"
63080-227 = "...Bem, vamos encerrar por aqui esses assuntos pesados que dão dor de cabeça."
63080-228 = "No tempo que resta... você poderia me fazer companhia para um chá?"
63080-229 = "[s] \"Por mim tudo bem, mas... por que essa formalidade toda?\""
63080-230 = "Isso é..."
63080-231 = "Já que finalmente chegamos a uma pausa."
63080-232 = "Sobre a nossa relação... a relação entre mim e o Sensei até agora..."
63080-233 = "E sobre os vários fatores que criaram essa distância entre nós."
63080-234 = "Não acha que seria bom —"
63080-235 = "tentarmos preencher essas lacunas?"
63080-236 = "[s] \"……！\""
63080-241 = "[ns] \"Prometemos que não íamos falar sobre isso, não foi!?\""
63080-242 = "Ora."
63080-243 = "Eu não pretendi dizer nada em específico, no entanto..."
63080-244 = "[s] \"Não foi praticamente o que você disse?\""
63080-245 = "Fufu. Quem sabe...?"
63080-246 = "Então, Sensei."
63080-247 = "Aaaah?"
63080-248 = "[s] \"O quê!?\""
63080-249 = "Se me rejeitar desse jeito... você me odeia...?"
63080-250 = "[s] \"Se você fala desse jeito...\""
63080-251 = "Fufu."
63080-252 = "Isso também pode ser considerado uma forma de \"política\", não acha?"
63080-254 = "(Reconhecendo que estou sendo manipulado pela Nagisa...)"
63080-255 = "(No momento em que decidi me preparar para o que viesse —)"
63080-260 = "Iahô☆#nNagi-chan, vim te visitar!"
63080-266 = "Mika-san!?#nE até a Seia-san...!?"
63080-270 = "Ué, Sensei!?#nUau, se eu soubesse, teria me preparado mais...!"
63080-271 = "Ora? Seguindo a premonição de que algo divertido aconteceria, decidi aparecer por capricho..."
63080-272 = "Quem diria que eu encontraria algo assim."
63080-274 = "Se, Sensei? O que faremos!?#nNão queria que esse assunto fosse ouvido por elas... especialmente pela Mika-san!"
63080-275 = "[s] (Calma. O assunto em si já tinha acabado!)"
63080-276 = "!!!"
63080-277 = "……É verdade."
63080-281 = "……Ehem. Bem-vindas, vocês duas.#nDa próxima vez, pelo menos batam na porta.#nEstamos na frente de um convidado, o Sensei, sabia?"
63080-282 = "Tá bom... mas, se era assim, você deveria ter preparado o ambiente direito."
63080-283 = "Eu queria que tivessem me avisado antes..."
63080-287 = "(Nagisa piscou para mim, dando um sinal)"
63080-288 = "[ns9] \"É verdade. Eu deveria ter te avisado também.\"\n[ns10] \"Eu queria fazer uma surpresa para a Mika.\""
63080-293 = "Sério!? De verdade!?#nIsso é muito legal, mas..."
63080-294 = "Ehehe, Sensei, você é demais."
63080-299 = "……."
63080-300 = "O Sensei é realmente... um pecador."
63080-301 = "[s11] \"N-não precisa exagerar...\"\n[s12] \"Ué? Por que você diz isso!?\""
63080-302 = "Você tem pouca autoconsciência, afinal."
63080-303 = "Por que não coloca a mão na consciência e pensa um pouco?"
63080-304 = "Haa... já que chegamos a esse ponto, vamos fazer um \"chá da tarde\" com todas reunidas, como não fazíamos há tempos."
63080-305 = "Já que o Sensei está aqui, afinal."
63080-306 = "Isso! Concordo!"
63080-307 = "Ué? Será que... é a primeira vez que tomamos chá as quatro juntas?"
63080-308 = "Não, será que não?"
63080-309 = "Não importa qual seja a resposta."
63080-310 = "O que importa é que estamos todas reunidas aqui agora. Apenas esse fato."
63080-311 = "Embora, para a Mika, provavelmente quase tudo no mundo pareça sempre novo."
63080-312 = "Se~ia~chan?#nVocê está querendo dizer que eu sou esquecida?"
63080-313 = "Se você pensa assim, então deve ser verdade."
63080-314 = "Se você continuar sendo tão cínica, talvez acabe se distanciando de todo mundo, sabia?"
63080-315 = "Vamos considerar as medidas apenas quando essa situação realmente acontecer."
63080-316 = "Eu mesma já não sou mais capaz de ler o futuro, afinal."
63080-317 = "Você só sabe dar desculpas esfarrapadas!"
63080-318 = "……Fufu."
63080-320 = "Haa…… vocês duas. Esqueceram que o Sensei está conosco?"
63080-332 = "[ns13] \"Fico feliz em ver que vocês se dão bem.\" \n[ns14] \"Dizem que quem briga é porque se gosta, não é?\""
63080-335 = "Se você diz isso…… eu realmente, sinto muito……."
63080-337 = "Próximo episódio: Estudo para o exame"
