[translation]
10034050-1 = "Episódio 5; Por quem"
10034050-4 = "[ns1] \"Não conseguimos contato...?\"\n[ns2] \"Ela também não foi para a escola?\""
10034050-7 = "Sim... hoje é o segundo dia."
10034050-9 = "Se fosse só um dia, eu até entenderia."
10034050-10 = "Mas não conseguir contato nenhum? Isso é estranho, não é?"
10034050-11 = "...Essa sua reação, Sensei, você também não sabia?"
10034050-12 = "S-se for esse o caso, não deveríamos entrar em contato com o Comitê de Justiça?"
10034050-13 = "Sensei, você tem alguma ideia de onde ela possa estar?"
10034050-14 = "[s3] \"Alguma ideia...\"\n[s4] \"Onde será que a Airi iria...?\""
10034050-17 = "Que situação, eu já procurei em todos os lugares que me vieram à mente."
10034050-18 = "Não brigamos, e os ensaios estavam indo bem..."
10034050-19 = "É difícil acreditar que ela simplesmente parou de responder do nada."
10034050-21 = "Se fosse eu que tivesse sumido, todo mundo agiria como sempre... mas isso aqui é preocupante."
10034050-22 = "Bem, se fosse a Natsu, é claro que..."
10034050-26 = "...Ei, é hora de fazer piada?"
10034050-27 = "Aliás, você tinha consciência disso, né..."
10034050-28 = "...Não acham que ela estava agindo de um jeito estranho?"
10034050-29 = "...?"
10034050-30 = "...Estranho, em que sentido?"
10034050-31 = "Como posso dizer, não consigo explicar direito..."
10034050-32 = "O que é isso... quer dizer, se você percebeu, por que não disse nada na hora?"
10034050-33 = "...Desculpa."
10034050-34 = "Era algo muito sutil, apenas uma sensação..."
10034050-35 = "O sorriso dela parecia um pouco apagado..."
10034050-36 = "Como posso dizer, aquele..."
10034050-37 = "...Como se ela estivesse em um beco sem saída?"
10034050-38 = "[s5] \"Em um beco sem saída...?\"\n[s6] \"...Isso é por causa dos ensaios?\""
10034050-41 = "Ela parecia estar tensa. Não sei, como se estivesse com medo..."
10034050-42 = "Superficialmente, ela continuava sorrindo como sempre."
10034050-43 = "A Natsu também sentiu isso..."
10034050-44 = "...Hã? Fui a única que não percebeu nada?"
10034050-45 = "Bem, não dá para te culpar. Ela mesma parecia não querer falar sobre isso."
10034050-46 = "...Mas eu não esperava que ela fosse desaparecer sem deixar uma palavra."
10034050-47 = "Então é certo que algo aconteceu..."
10034050-48 = "...?"
10034050-49 = "Sensei, você sabe de alguma coisa?"
10034050-53 = "...Sensei?"
10034050-54 = "O que tem o teclado da Airi?"
10034050-59 = "...O que é isso?"
10034050-60 = "Uma carta...?"
10034050-61 = "...O que diz dentro?"
10034050-62 = "Por que uma carta..."
10034050-63 = "[s7] \"É bem a cara dela mesmo.\"\n[s8] \"Eu sabia que a Airi deixaria algo para trás.\""
10034050-66 = "Podemos ler isso, né...?"
10034050-72 = "...\"Para todos\"."
10034050-73 = "...\"Me desculpem\"."
10034050-74 = "...?"
10034050-75 = "...??"
10034050-76 = "...Me desculpem?"
10034050-82 = "\"Me desculpem por ser um peso para vocês\"."
10034050-83 = "「Vou procurar alguém que toque melhor do que eu para ficar no meu lugar」."
10034050-85 = "……Hã?"
10034050-90 = "「Se eu continuar, vou acabar atrapalhando todo mundo……」."
10034050-91 = "「Acho que as coisas vão funcionar melhor assim」."
10034050-92 = "……「Desculpa」."
10034050-93 = "…………？？？"
10034050-96 = "Q-que é isso……."
10034050-98 = "O que isso significa……?"
10034050-106 = "……Ei."
10034050-107 = "Será que foi certo deixar tudo nas mãos do Sensei?"
10034050-109 = "Deve estar tudo bem."
10034050-110 = "O Sensei… aquela pessoa disse que cuidaria disso."
10034050-111 = "……Ele parecia saber de algo sobre o problema que a Airi está enfrentando……#nProvavelmente essa é a resposta certa."
10034050-112 = "……Não queremos que todo mundo se envolva e o problema acabe ficando maior, então passo."
10034050-118 = "……O que esse olhar significa?"
10034050-119 = "……Não, é só que eu estava lembrando de algo."
10034050-120 = "Eu entendo o que você quer dizer, mas……."
10034050-121 = "Sinto que ficar aqui só esperando não é o caminho certo."
10034050-122 = "O que nós podemos fazer agora……."
10034050-123 = "……Droga, não consigo pensar em nada que preste. #nSó consigo pensar em preparar uns doces para quando a Airi voltar……."
10034050-124 = "Que tal a gente reunir todos os chocolates com menta de Kivotos?"
10034050-125 = "Ah, qual é! Não é disso que estamos falando!"
10034050-126 = "……Para começar, a ideia da banda não foi estranha desde o início?"
10034050-127 = "Não é um problema de alguns dias atrás, é desde aquela época……."
10034050-128 = "E não é a primeira vez que a Airi insiste tanto na própria opinião?"
10034050-133 = "……Verdade."
10034050-134 = "Pode ser que sim."
10034050-135 = "Nunca ouvi dizer que ela gostava tanto de bandas assim……."
10034050-136 = "Sinto que, naquela época, o olhar dela ainda estava relativamente normal."
10034050-137 = "Depois disso, foi aumentando a pressão, ou melhor… uma espécie de obsessão? #nParecia que ela estava sendo encurralada aos poucos……."
10034050-138 = "Por que ela decidiu montar uma banda…… #nCom certeza deve haver um motivo."
10034050-139 = "É verdade, deve ter tido algum gatilho……."
10034050-140 = "Pensar nisso talvez não seja perda de tempo."
10034050-144 = "……?"
10034050-145 = "……Ué?"
10034050-146 = "Se for esse o caso, a resposta já não está clara?"
10034050-147 = "……O que você quer dizer?"
10034050-148 = "Natsu, você sabe de alguma coisa?"
10034050-149 = "O motivo de ela ter sugerido já está claro."
10034050-153 = "……Para ser selecionada na abertura do festival escolar."
10034050-154 = "E o medo de não conseguir alcançar isso…… seria esse o motivo?"
10034050-156 = "Mas por que ela precisaria ter medo disso?"
10034050-157 = "Não é como se houvesse um problema real se não formos selecionadas."
10034050-158 = "Não parece que ela ficou com vergonha de subir no palco depois de ter sugerido a ideia……."
10034050-159 = "Mesmo que a gente falhasse, o máximo que aconteceria seria não podermos comer semla……."
10034050-163 = "……?"
10034050-164 = "……?"
10034050-165 = "……?"
10034050-169 = "……！！"
10034050-170 = "……Ah."
10034050-171 = "Ahhh! Espera um pouco!"
10034050-172 = "……O que foi, o que aconteceu?"
10034050-173 = "Acho que entendi tudo……!"
10034050-174 = "Para começar, o convite da Airi não foi insistente demais?"
10034050-175 = "Você lembra o que ela fez quando nossa reação foi hesitante?"
10034050-176 = "Ela nos mostrou o cartaz e nos convenceu……."
10034050-177 = "Disse que se ganhássemos, poderíamos comer semla juntas."
10034050-178 = "……Como se tivesse forjado uma \"coincidência\"."
10034050-179 = "Isso mesmo!#nA Airi disse que o cartaz estava lá por acaso, mas."
10034050-183 = "E se, desde o início, o objetivo fosse comer o semla……!"
10034050-188 = "……Não, não, você não acha que está tirando conclusões precipitadas demais?"
10034050-189 = "Você acha?#nNa verdade, não parece algo típico da Airi, que adora doces?"
10034050-190 = "Mas se fosse esse o caso, acho que ela teria nos contado desde o começo……."
10034050-191 = "Às vezes, uma donzela tem motivos que não pode revelar."
10034050-193 = "Viu só, a Natsu está dizendo a mesma coisa!"
10034050-194 = "Só pode ser isso!"
10034050-195 = "É por isso que a Airi estava tão preocupada!"
10034050-196 = "Em resumo, a Airi queria muito comer semla!"
10034050-197 = "E ela ficou obcecada com isso!"
10034050-203 = "……Você está falando sério?#nNós também queremos experimentar o semla, e normalmente ela pediria nossa opinião, não é?"
10034050-204 = "Pense na personalidade da Airi.#nMesmo que fosse para comer semla, ela certamente se sentiria culpada por nos envolver nisso."
10034050-205 = "……Bem, isso é verdade, ela não é a Natsu."
10034050-207 = "O que você acha que eu sou……?"
10034050-208 = "Organizando a situação, a Airi queria tocar na banda, mas……."
10034050-209 = "Na verdade, ela só queria comer semla, é isso?"
10034050-210 = "E então, Kazusa, você se convenceu?#nAgora as peças finalmente se encaixaram!"
10034050-211 = "Bem, o que a Yoshimi diz tem um fundo de verdade, mas……."
10034050-212 = "……Eu ainda acho que a Airi teria vindo falar com a gente."
10034050-213 = "……Bem, eu entendo que você esteja chocada por ela não ter contado."
10034050-214 = "É que ela queria muito experimentar aquele semla.#nQuer dizer, é aquele semla, né?"
10034050-215 = "Então a causa nobre foi estabelecida.#nSó resta completar a apresentação em si."
10034050-216 = "……Mas."
10034050-217 = "Se ela pensasse que, por causa da sua própria falta de habilidade,#nnós não conseguiríamos comer o semla……."
10034050-218 = "Bem, ela se culparia, não é? Especialmente a Airi!"
10034050-219 = "Tente imaginar você mesma."
10034050-220 = "A situação em que, por sua causa, ninguém consegue comer o doce lendário!#nE ainda por cima, sendo que foi você quem sugeriu!"
10034050-221 = "……Isso, bem."
10034050-222 = "……Q.E.D.#nDemonstração concluída."
10034050-226 = "……Ah."
10034050-227 = "A Airi, viu só……."
10034050-228 = "Poxa, ela deveria ter nos contado desde o início!"
10034050-229 = "Você mesma disse que ela não conseguia fazer isso."
10034050-230 = "É verdade, mas……!"
10034050-231 = "No fim das contas, o objetivo era o semla…….#nSe for assim, não seria resolvido se conseguíssemos um?"
10034050-232 = "Conseguir o semla pela Airi…… hehe, muito rock."
10034050-233 = "A Airi estava preocupada justamente porque não é tão fácil de conseguir, não é?"
10034050-234 = "Mas, mesmo que alguém que toque melhor que a Airi viesse no lugar dela, você não acha que seria diferente?"
10034050-235 = "Claro que sim."
10034050-236 = "Falta uma semana para o festival escolar, não podemos simplesmente abandonar a Airi……."
10034050-237 = "O festival escolar não teria graça sem a Airi!"
10034050-238 = "Já que chegamos a esse ponto, vou conseguir um semla agora mesmo e dar para a Airi comer!"
10034050-239 = "Isso é ótimo, mas como?"
10034050-240 = "Foi o comitê organizador do festival escolar que preparou, #nnão tem como a gente conseguir, né?"
10034050-241 = "I-isso é..."
10034050-248 = "……？"
10034050-249 = "Por que está confusa??"
10034050-250 = "……Hã?"
10034050-251 = "Não, eu disse que não tem como conseguir..."
10034050-252 = "……？"
10034050-253 = "Você mesma disse isso agorinha."
10034050-254 = "Que o comitê organizador do festival escolar preparou..."
10034050-255 = "……？"
10034050-256 = "Não acredito que você vai dizer isso..."
10034050-257 = "Você não vai conseguir só pedindo 'por favor, me dê um semla', né?"
10034050-258 = "Não, espera..."
10034050-262 = "……Não me diga."
10034050-263 = "Você está falando de 'roubar'?"
10034050-264 = "Esse evento é organizado pelo Chá das Cinco!? #nDeve ter um monte de guardas por lá...!"
10034050-265 = "Se a gente for pega, vai dar muito ruim!"
10034050-266 = "Pensando bem, é impossível!"
10034050-267 = "Não é por nada, mas somos nós, lembra?"
10034050-268 = "Apenas alunas comuns que gostam de doces."
10034050-269 = "O que você está dizendo?"
10034050-270 = "Já esqueceu? #nAo nosso lado, temos uma veterana de guerra que sobreviveu a milhares de campos de batalha."
10034050-271 = "……Hã?"
10034050-276 = "Contemplem, a temível fera que um dia dominou o submundo..."
10034050-281 = "……Esta lenda viva!"
10034050-286 = "……！？#nEi, Natsu! Você está falando sério...!!"
10034050-291 = "Desculpe, mas eu estou falando sério."
10034050-292 = "……Para começar, a situação é essa."
10034050-293 = "Agora que a Airi sumiu... #nEu acho que todas nós sentimos o mesmo, não é?"
10034050-294 = "I-isso é...!"
10034050-295 = "Na verdade, Kazusa, eu que pergunto. Você não estava pensando nisso também?"
10034050-296 = "Tipo, 'eu conseguiria passar por isso' — não é, Azusa Kazusa!"
10034050-297 = "Não, é que..."
10034050-298 = "Droga...!"
10034050-299 = "…………"
10034050-305 = "……Haa."
10034050-306 = "……Vou avisar logo."
10034050-307 = "Não há garantia de sucesso. #nSe o Comitê de Justiça entrar em ação, não sei o que pode acontecer."
10034050-308 = "Além disso, mesmo que a gente consiga... #nVocê sabe o que acontece depois?"
10034050-309 = "Fufu, é claro que sei."
10034050-314 = "……O Clube de Doces do Pós-Aula acaba aqui."
10034050-315 = "O orçamento e a sala do clube, tudo vai para o ralo."
10034050-316 = "Você sabe muito bem. #nMesmo assim..."
10034050-318 = "……Mesmo assim?"
10034050-320 = "O que vem depois dessas palavras?"
10034050-321 = "Essas palavras são o que você realmente sente?"
10034050-322 = "Kazusa, o que a sua alma está gritando?"
10034050-323 = "Não é só a Kazusa, e você, Yoshimi?"
10034050-324 = "……eh?"
10034050-325 = "E-eu?"
10034050-326 = "Hmm... #nSe o Comitê de Justiça descobrir, o Clube de Doces do Pós-Aula acaba, né..."
10034050-327 = "Sem falar que existe a possibilidade de sermos suspensas."
10034050-328 = "……Bem, isso não importa. O que é importante não é isso."
10034050-329 = "Proteger um clube que não consegue nem proteger a Airi é uma piada de muito mau gosto."
10034050-330 = "Porque o Clube de Doces do Pós-Aula é..."
10034050-335 = "Yoshimi..."
10034050-336 = "Hehe, eu sabia. Todas nós pensamos da mesma forma, né."
10034050-337 = "……Vamos, não temos tempo."
10034050-338 = "Natsu..."
10034050-339 = "Kazusa Kyoyama... não, a besta mágica que dorme em Trinity."
10034050-340 = "Querendo ou não, este dia chegaria..."
10034050-346 = "……Não é hora de voltar a ser o Grupo de Doces do Pós-Aula?"
10034050-352 = "Isso... conheça a caçada da besta mágica..."
10034050-357 = "Pela Airi... não."
10034050-358 = "……Por todas nós."
10034050-364 = "……Torne-se a Cath Palug."
