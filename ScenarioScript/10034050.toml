[translation]
10034050-1 = "第5話;誰が為に"
10034050-4 = "[ns1] \"連絡が取れない……？\"\n[ns2] \"学校も休んでるの？\""
10034050-7 = "うん……今日で二日目。"
10034050-9 = "一日くらいなら、全然分かるけどね。"
10034050-10 = "連絡すら取れないなんて、おかしいでしょ？"
10034050-11 = "……その反応、先生も知らなかったんだ？"
10034050-12 = "だ、だとしたら、正義実現委員会に連絡した方が良いんじゃない？"
10034050-13 = "先生、何か心当たりとかは？"
10034050-14 = "[s3] \"心当たり……。\"\n[s4] \"どこだろう、アイリの行きそうな場所……。\""
10034050-17 = "参ったわね、普通に思いつく場所は探したんだけど。"
10034050-18 = "喧嘩したわけじゃないし、練習も順調だったし……。"
10034050-19 = "急に連絡が取れなくなるなんて、まだ信じられないくらい。"
10034050-21 = "音信不通になったのが私だったら、みんないつも通りだっただろうけど……これは困ったね。"
10034050-22 = "まあ、ナツだったらそりゃ……。"
10034050-26 = "……って、冗談言ってる場合？"
10034050-27 = "そもそもあんた、自覚あったのね……。"
10034050-28 = "……少し、様子がおかしかった気がしない？"
10034050-29 = "……？"
10034050-30 = "……おかしいって、どの辺が？"
10034050-31 = "何て言うか、上手く言葉にできないんだけど……。"
10034050-32 = "なにそれ……って言うか、気になったなら#nどうしてその時に言わなかったのよ？"
10034050-33 = "……ごめん。"
10034050-34 = "本当に微妙な、ほんの感覚程度の話で……。"
10034050-35 = "どこか少しだけ、笑顔が曇ってて……。"
10034050-36 = "何て言うか、その……。"
10034050-37 = "……どこか、ちょっと行き詰まってるような？"
10034050-38 = "[s5] \"行き詰まってる……？\"\n[s6] \"……それは、練習が？\""
10034050-41 = "肩に力が入ってた感じ。#n何だろ、怖がってるって言うか……。"
10034050-42 = "表面的には、いつもみたいに笑ってくれてたけど。"
10034050-43 = "ナツもそうだったんだ……。"
10034050-44 = "……え？#n何も気づいてなかったの、私だけ？"
10034050-45 = "まあ無理もないよ。#n本人も、すごく言いたくなさそうだったし。"
10034050-46 = "……でも、一言も残さず姿をくらますとは思わなかった。"
10034050-47 = "何かがあったのは確実、か……。"
10034050-48 = "……？"
10034050-49 = "先生、何か知ってるの？"
10034050-53 = "……先生？"
10034050-54 = "アイリのキーボードがどうかした？"
10034050-59 = "……それは？"
10034050-60 = "手紙……？"
10034050-61 = "……中身は？"
10034050-62 = "手紙なんてどうして……。"
10034050-63 = "[s7] \"やっぱりこういう子だよね。\"\n[s8] \"アイリなら何かしら残してると思ったよ。\""
10034050-66 = "これ、見て良いのよね……？"
10034050-72 = "……「みんなへ」。"
10034050-73 = "……「ごめんなさい」。"
10034050-74 = "……？"
10034050-75 = "……？？"
10034050-76 = "……ごめんなさい？"
10034050-82 = "「足を引っ張って、ごめんなさい」。"
10034050-83 = "「私の代わりに、もっと楽器が上手な人を探してくるね」。"
10034050-85 = "……は？"
10034050-90 = "「私がいたら、みんなまでダメになっちゃうし……」。"
10034050-91 = "「その方が、上手く行くと思うから」。"
10034050-92 = "……「ごめんね」。"
10034050-93 = "…………？？？"
10034050-96 = "な、何これ……。"
10034050-98 = "どういうこと……？"
10034050-106 = "……ねぇ。"
10034050-107 = "全部先生に任せちゃって良かったの？"
10034050-109 = "大丈夫でしょ。"
10034050-110 = "先生が…、あの人が「任せて」って言ったんだから。"
10034050-111 = "……アイリが抱えてる問題にも心当たりがありそうだったし……#n多分これが正解。"
10034050-112 = "……みんなで動いて、問題が大きくなっちゃいました、みたいなことはパス。"
10034050-118 = "……その視線の意味は？"
10034050-119 = "……いや、ちょっと思い出してただけ。"
10034050-120 = "言ってることは何となく分かるけど……。"
10034050-121 = "ここで待ってるだけってのも、違う気がするのよね。"
10034050-122 = "私たちが、今やれること……。"
10034050-123 = "……ダメだ、[ruby=ろく]碌[/ruby]な考えが思いつかない。#nアイリが帰ってきた時のために、スイーツでも用意しておくくらいしか……。"
10034050-124 = "キヴォトス中のチョコミントでも集めておこっか。"
10034050-125 = "ああ、もう！そういう話じゃないでしょ！"
10034050-126 = "……そもそも、バンドの話を言い出したところから変じゃなかった？"
10034050-127 = "ここ数日の問題じゃなくて、あの時から……。"
10034050-128 = "それにアイリがここまで自分の意見を押し通したのって、初めてじゃない？"
10034050-133 = "……確かに。"
10034050-134 = "それはそうかも。"
10034050-135 = "そこまでバンドが好きだったなんて聞いたことないし……。"
10034050-136 = "あの時の目は、まだ比較的いつも通りだった気がするけど。"
10034050-137 = "その後、徐々にプレッシャーっていうか……強迫観念みたいな？#n少しずつ、追い詰められた感じで……。"
10034050-138 = "どうして、バンドをやろうと思ったのか……#nきっと、何か理由があるはず。"
10034050-139 = "そうだね、何かしらのきっかけが……。"
10034050-140 = "それを考えるのは、無駄にならないかも。"
10034050-144 = "……？"
10034050-145 = "……あれ？"
10034050-146 = "だとしたら、もう答えは出てるんじゃ？"
10034050-147 = "……どういう意味？"
10034050-148 = "ナツは何か、心当たりあるの？"
10034050-149 = "言い出した理由なら既に明確。"
10034050-153 = "……学園祭のオープニングで入選するため。"
10034050-154 = "それを達成できないことを恐れてた……っていうのは？"
10034050-156 = "だから、どうして怖がる必要があるのよ？"
10034050-157 = "入選できなかったところで、問題があるわけじゃないんだし。"
10034050-158 = "言い出した後に、ステージに立つのが恥ずかしくなった……ってわけでもなさそうだよね。"
10034050-159 = "仮に失敗したところで、セムラが食べられないくらいで……。"
10034050-163 = "……？"
10034050-164 = "……？"
10034050-165 = "……？"
10034050-169 = "……！！"
10034050-170 = "……あ。"
10034050-171 = "ああああっ！ちょっと待って！"
10034050-172 = "……何、どうしたの？"
10034050-173 = "全部分かった気がする……！"
10034050-174 = "そもそも、アイリにしては勧誘が強引じゃなかった？"
10034050-175 = "私たちの反応が微妙だった時、どうしたか覚えてない？"
10034050-176 = "ポスターを見せて、私たちを説得した……。"
10034050-177 = "入選したら、みんなでセムラを食べられるって。"
10034050-178 = "……まるで「偶然」を装ったように。"
10034050-179 = "そうそう！#nたまたまポスターがあったってアイリは言ってたけど。"
10034050-183 = "最初から、セムラを食べるためだったとしたら……！"
10034050-188 = "……いやいや、いくら何でも飛躍しすぎじゃない？"
10034050-189 = "そう？#nむしろ、スイーツ好きのアイリらしいんじゃ？"
10034050-190 = "でもそれだったら、最初から話してくれたと思うけど……。"
10034050-191 = "時に、乙女には語れない理由がある。"
10034050-193 = "ほら、ナツもこう言ってるじゃない！"
10034050-194 = "どう考えてもこれよ！"
10034050-195 = "だからアイリはあんなに悩んでたんだわ！"
10034050-196 = "つまり、アイリはセムラがどうしても食べたかった！"
10034050-197 = "それで思い詰めちゃったのよ！"
10034050-203 = "……本気で言ってんの？#nセムラを食べてみたいのは私たちも一緒だし、普通相談してくれるでしょ？"
10034050-204 = "アイリの性格を考えてみなさいよ。#nいくらセムラを食べるためとはいえ、そのために私たちを巻き込むのは申し訳なかったに違いないわ。"
10034050-205 = "……それは確かにまあ、ナツじゃないんだし。"
10034050-207 = "私を何だと思って……？"
10034050-208 = "状況を整理すると、アイリはバンドをやりたがってたけど……。"
10034050-209 = "実際はセムラが食べたかった、ってことかぁ。"
10034050-210 = "どう、カズサも納得した？#nこれでようやく辻褄が合ったわね！"
10034050-211 = "まぁ、ヨシミの言うことにも一理あるけど……。"
10034050-212 = "……アイリなら、相談してくれると思うんだけどな。"
10034050-213 = "……まあ、言ってくれなくてショックなのも分かるけど。"
10034050-214 = "それだけセムラを食べてみたかったのよ。#nだって、あのセムラよ？"
10034050-215 = "大義名分が成立したわけだね。#n残るは演奏自体を完遂させるのみ、と。"
10034050-216 = "……でも。"
10034050-217 = "自分の実力が足りないせいで、#nセムラを食べることができなくなるかもしれないと思ったら……。"
10034050-218 = "まぁ、自分を責めるわよね！特にアイリは！"
10034050-219 = "あんたも想像してみなさいよ。"
10034050-220 = "自分のせいで、みんなが伝説のスイーツを食べられなくなった状況を！#nしかも、言い出したのが自分だとしたら？"
10034050-221 = "……それは、まぁ。"
10034050-222 = "……Q.E.D.#n証明完了、だね。"
10034050-226 = "……はぁ。"
10034050-227 = "アイリってば……。"
10034050-228 = "もうっ、最初から話してくれたら良かったのに！"
10034050-229 = "それができなかったんだって、あんたが言ったんでしょ。"
10034050-230 = "たしかにそうだけどっ……！"
10034050-231 = "結局、目的はセムラだった……。#nだとしたら、それを手に入れたら解決するんじゃ？"
10034050-232 = "アイリのために、セムラを手に入れる……にひ、実にロック。"
10034050-233 = "そう簡単に手に入らないからアイリも悩んでたんでしょ。"
10034050-234 = "けど、いくら演奏の上手い人がアイリの代わりに来ても、それは違うと思わない？"
10034050-235 = "当然じゃない。"
10034050-236 = "学園祭本番までの残り一週間、アイリを放ってはおけないし……。"
10034050-237 = "せっかくの学園祭、アイリ抜きじゃ楽しめないわ！"
10034050-238 = "こうなったら、今すぐセムラを手に入れてアイリに食べさせるわよ！"
10034050-239 = "それは良いけど、どうやって？"
10034050-240 = "学園祭の運営委員会だから用意できたわけで、#n私たちじゃ手に入れようが無いじゃん。"
10034050-241 = "そ、それは……。"
10034050-248 = "……？"
10034050-249 = "何を悩んでるの？？"
10034050-250 = "……は？"
10034050-251 = "いや、だから手に入れる方法が無いって話で……。"
10034050-252 = "……？"
10034050-253 = "さっき、自分で言ってたのに。"
10034050-254 = "学園祭の運営委員会が用意してる……って。"
10034050-255 = "……？"
10034050-256 = "何を言うかと思ったら……。"
10034050-257 = "「セムラをください」って言って、貰えるわけないでしょ。"
10034050-258 = "いや、待って……。"
10034050-262 = "……まさかだけど。"
10034050-263 = "「奪っちゃえば良い」って話？"
10034050-264 = "このイベント、ティーパーティーの主催よ！？#n見張りだってたくさんいるはずだし……！"
10034050-265 = "もしバレたら、絶対にヤバいでしょ！"
10034050-266 = "普通に考えて絶対無理！"
10034050-267 = "自分で言うのも何だけど、私たちよ？"
10034050-268 = "ちょっとスイーツが好きなごく普通の一般生徒。"
10034050-269 = "何を言ってるのさ。"
10034050-270 = "忘れてしまったのかね？#n我々の傍らには幾千もの修羅場を争い抜けてきた歴戦の兵がいることを。"
10034050-271 = "……はぁ？"
10034050-276 = "刮目せよ、かつて暗黒街を牛耳っていた恐怖の魔獣……。"
10034050-281 = "……この生きる伝説を！"
10034050-286 = "……！？#nちょっ、ナツ！あんたね……！！"
10034050-291 = "悪いけど、私は本気だよ。"
10034050-292 = "……そもそも、状況が状況。"
10034050-293 = "アイリがいなくなっちゃった今……#nその気持ちは、みんな同じだと思ってるけど？"
10034050-294 = "そ、それは……！"
10034050-295 = "むしろカズサ、こっちから聞きたいね。自分でも思ってたんじゃない？"
10034050-296 = "「私なら突破できるのに」って――ねぇ、[ruby=キャスパリーグ]杏山カズサ[/ruby]！"
10034050-297 = "いや、だから……。"
10034050-298 = "くっ……！"
10034050-299 = "…………。"
10034050-305 = "……はぁ。"
10034050-306 = "……先に言っとくけど。"
10034050-307 = "成功する保証は無いからね。#nそれこそ正義実現委員会が動くんなら、どうなるか分かんないし。"
10034050-308 = "それに、もし成功しても……#nその後のこと、分かってる？"
10034050-309 = "ふふっ、それは勿論。"
10034050-314 = "……放課後スイーツ部は、ここで終わり。"
10034050-315 = "部費も部室も、全部がパー。"
10034050-316 = "ちゃんと分かってるじゃん。#nそれでも……"
10034050-318 = "……それでも？"
10034050-320 = "その先に連なる言葉は？"
10034050-321 = "その言葉は、本当の気持ち？"
10034050-322 = "他でも無い杏山カズサ、その魂は何を叫んでる？"
10034050-323 = "カズサだけじゃない、ヨシミは？"
10034050-324 = "……へ？"
10034050-325 = "わ、私？"
10034050-326 = "うーん……。#nもし正義実現委員会にバレたら、放課後スイーツ部は無くなる、かぁ……。"
10034050-327 = "それどころじゃなくて、停学になる可能性もあるけど。"
10034050-328 = "……ま、別にそれは構わないか。大事なのはそっちじゃないし。"
10034050-329 = "アイリも守れない部活を守るなんて冗談、面白くもなんともない。"
10034050-330 = "だって、放課後スイーツ部は……。"
10034050-335 = "ヨシミ……。"
10034050-336 = "にひ、知ってたよ。全員、考えは一緒だってね。"
10034050-337 = "……さ、時間が無い。"
10034050-338 = "ナツ……。"
10034050-339 = "[ruby=きょうやま]杏山カ[/ruby]ズサ……いや、トリニティに眠る魔獣よ。"
10034050-340 = "この日が訪れることを、望むと望まざるとに関わらず……。"
10034050-346 = "……再び、放課後スイーツ団に戻る時なんじゃないかな？"
10034050-352 = "そう……魔獣の狩りを知るがいい……"
10034050-357 = "アイリのため……いや。"
10034050-358 = "……みんなのために。"
10034050-364 = "……キャスパリーグになってくれ。"
