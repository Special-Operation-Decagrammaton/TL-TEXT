[translation]
10027020-1 = "Episódio 2; Volume Final"
10027020-3 = "Droga... de todas as pessoas, eu tinha que encontrar você..."
10027020-4 = "Chamar alguém de 'você' assim... que vocabulário encantador para alguém que se autodenomina a popular escritora Merly. Que tal se o próximo presente que eu lhe der for um dicionário?"
10027020-5 = "N-não preciso disso! E, sinceramente, só de pensar em um presente seu, já sinto que vou ter um pesadelo..."
10027020-6 = "Ora, ora? É apenas um gesto de gentileza para expandir seu vocabulário limitado... Parece que não há muitos livros na biblioteca, não é? Sempre fazendo um bom trabalho."
10027020-7 = "Dispenso sua gentileza! Esse seu 'bom trabalho' soa tão sarcástico que chega a ser irritante!"
10027020-8 = "Ora... você está bem afiada para ser a Merly."
10027020-10 = "……！"
10027020-11 = "……！"
10027020-17 = "[ns1] \"Certo, certo, parem por aí as duas.\"\n[ns2] \"Não vamos levar isso adiante, está bem?\""
10027020-20 = "Quem é esta pessoa...?"
10027020-21 = "Hmm? É a primeira vez que você conhece a Takane?#nBem, então não tem jeito. Eu vou te a-pre-sen-tar."
10027020-22 = "Ser apresentada por você... que humilhação."
10027020-23 = "Mas pedir para uma pessoa que você acabou de conhecer se apresentar... isso é falta de educação demais, não acha?"
10027020-24 = "Não é? Pois é, se você não se desculpar pela grosseria de agora há pouco, não vou te apresentar a ninguém~"
10027020-29 = "Já chega!"
10027020-37 = "Q-que susto! Não atire nos meus pés do nada!#nEu já disse para parar com esse hábito!#nE é por isso que você nunca faz amigos, sabia?!"
10027020-38 = "Ora. Não é como se eu quisesse ouvir isso de alguém como a Merly, que fica isolada em eventos de doujin sem conseguir cumprimentar ninguém."
10027020-39 = "Você falou mesmo! Mesmo sendo verdade!"
10027020-45 = "[ns3] \"Ei...\"\n[ns4] \"Vocês esqueceram que eu estou aqui?\""
10027020-48 = "Ah."
10027020-49 = "Ah."
10027020-50 = "Ah, bem... essa pessoa é..."
10027020-59 = "Ora. Ora, ora, ora."
10027020-60 = "Muito prazer, Sensei. Meu nome é Takane Miyoshi.#nEu escrevo críticas de obras para a revista 'Red Bear', publicada pelo Departamento Editorial."
10027020-61 = "Já ouvi falar muito de você... nunca imaginei que chegaria o dia em que eu conheceria pessoalmente o Sensei [USERNAME] do Schale."
10027020-62 = "[s] \"Departamento Editorial...?\""
10027020-63 = "Sim. É o clube responsável por tudo, desde a redação até a publicação dos materiais impressos na Academia Red Winter."
10027020-64 = "Não é por me gabar, mas... como crítica, eu leio e escrevo resenhas sobre todos os livros publicados em Red Winter."
10027020-65 = "Não, isso é se gabar sim..."
10027020-66 = "Fufu, se tiver um tempo livre, por favor, venha visitar nosso Departamento Editorial."
10027020-67 = "Ignorando a mim?! E outra, o Sensei já tem um compromisso marcado comigo, sabia?"
10027020-68 = "Ora... que coisa rara. Eu pensava que, mesmo que o mundo estivesse à beira da destruição, a Merly continuaria trancada em sua sala de trabalho..."
10027020-69 = "Bem... sabe como é, até eu faço viagens de pesquisa de vez em quando..."
10027020-70 = "História interessante. Normalmente, esse tipo de coisa não é tarefa para um assistente?"
10027020-71 = "Ora... não vejo nenhum assistente por aqui, não é?"
10027020-73 = "Onde está a Momiji?"
10027020-74 = "Ah... bem, eu pedi para ela cuidar de outro assunto agora...!"
10027020-76 = "Hmm? Isso é muito estranho. Um assunto que precisa ser priorizado acima da sua vinda para cá..."
10027020-77 = "……."
10027020-78 = "Você está agindo de forma estranha, Merly.#nOnde foi parar aquela sua energia irritante de sempre?"
10027020-79 = "Ah, isso não é preocupação... digamos que é apenas uma consideração mínima. Sinta-se grata."
10027020-80 = "...Não, não precisa agradecer. Seria estranho receber agradecimentos seus..."
10027020-81 = "Certo, certo... você continua sendo uma pessoa difícil como sempre."
10027020-82 = "[s5] \"Ei... Takane, você disse que lê\"\n[s6] \"todos os livros publicados em Red Winter, não foi?\""
10027020-85 = "Sim. Repito, não é por me gabar."
10027020-86 = "Tá, tá, não precisa repetir isso várias vezes..."
10027020-87 = "[s] \"Então... você por acaso conhece a 'Luna'?\""
10027020-88 = "'Luna'...?"
10027020-89 = "Bem... é claro que eu conheço, mas..."
10027020-90 = "……Eu fico curiosa sobre o motivo de você estar perguntando isso de forma tão específica."
10027020-91 = "[s] \"Nós estamos procurando o volume final de 'Luna'.\""
10027020-93 = "O volume final de 'Luna'……?"
10027020-103 = "……Entendo, então foi por isso que a Momiji foi embora para algum lugar."
10027020-104 = "……"
10027020-105 = "Eu sabia que um dia esse dia chegaria, Meru."
10027020-106 = "O que você sabe sobre isso, afinal?!"
10027020-107 = "Deveria refletir melhor sobre a sua própria reputação. #nNa verdade, é surpreendente que isso não tenha acontecido antes."
10027020-108 = "Não quero ouvir isso de você! #nAs pessoas se afastam porque você fala de um jeito irônico e indireto, igualzinho aos seus artigos de crítica cheios de palavras complicadas!"
10027020-109 = "A forma é essencial em uma crítica. #nApontar perspectivas que outros ignoraram e descobrir o valor de uma obra é o que define a crítica. Você ainda não consegue entender essa nobreza?"
10027020-110 = "Ha! Sem a obra, você nem conseguiria fazer uma crítica, não é?!"
10027020-111 = "Uma crítica brilhante faz o valor da obra brilhar ainda mais! #nUma obra sem leitores não tem significado algum."
10027020-113 = "Tem um monte dessas jogadas por aí! Tipo os livros de propaganda da Presidente Cherino!"
10027020-114 = "Isso é um sofisma!"
10027020-119 = "[ns7] \"Ei, ei, acalmem-se as duas.\"\n[ns8] \"Sobre o volume final de 'Luna'…….\""
10027020-122 = "Ah, é verdade……."
10027020-123 = "……."
10027020-124 = "Entendi a situação, Sensei."
10027020-125 = "E também entendo por que o Sensei tentaria ajudar uma criatura com tão pouca sociabilidade, é claro."
10027020-126 = "Ela já está me tratando como um animal selvagem……."
10027020-127 = "Mas――para ir direto ao ponto……"
10027020-128 = "……O volume final de 'Luna' envolve circunstâncias um tanto complexas……"
10027020-129 = "Pelo menos, não é algo que se possa encontrar da noite para o dia."
10027020-130 = "Fala logo de uma vez! Que enrolação."
10027020-131 = "Você está falando como se soubesse muito sobre 'Luna' desde agora…… Você também está colecionando 'Luna'? É por isso que está tentando nos impedir?"
10027020-132 = "As coisas têm uma ordem, não têm? Poderia se limitar a uma pergunta de cada vez?"
10027020-133 = "……."
10027020-134 = "Bem――se for a Meru, talvez."
10027020-135 = "――Visite o Departamento Editorial."
10027020-136 = "Hã? Departamento Editorial? Por quê?"
10027020-137 = "As pistas para o volume final devem estar lá."
10027020-138 = "Se você estiver realmente procurando por alguém――"
10027020-139 = "……você conseguirá chegar lá."
10027020-140 = "……Hm? O que isso significa?"
10027020-142 = "Bem, eu vou indo. #nVamos nos encontrar novamente se houver uma oportunidade, Sensei [USERNAME]."
10027020-143 = "……Desta vez, sem a Meru, é claro."
10027020-144 = "É por isso que você sempre fala demais!"
10027020-150 = "Ei!! Explique isso direito!"
