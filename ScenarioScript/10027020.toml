[translation]
10027020-1 = "第2話;最終巻"
10027020-3 = "げっ……よりによって、あんたと会うなんて……"
10027020-4 = "人を「あんた」呼ばわりだなんて……自称人気作家メルリーさんらしい素敵な言葉遣いですね。今度のプレゼントは単語辞典にでもいたしましょうか？"
10027020-5 = "い、いらないわよ！というか、あんたからのプレゼントなんて悪い夢見そう……"
10027020-6 = "あらあら？多彩な語彙を増やしてあげようという心遣いですのに……図書館にはあまり本がないのですね。いつもご苦労さまです。"
10027020-7 = "心遣い無用よ！「ご苦労さまです」なんて、嫌味ったらしいったらありゃしない！"
10027020-8 = "あら……メルリーさんにしては鋭いじゃないですか。"
10027020-10 = "……！"
10027020-11 = "……！"
10027020-17 = "[ns1] \"はいはい、二人ともそこまで。\"\n[ns2] \"それ以上は、やめとこうね。\""
10027020-20 = "この方は……？"
10027020-21 = "ふ～ん？タカネさんは初めて会ったんだ？#nそれじゃあ仕方ないね。私が紹介してあ・げ・る。"
10027020-22 = "貴女に紹介されるなんて……屈辱的なのですけれど。"
10027020-23 = "ですが、初対面の方に自己紹介をお願いするなど、無礼にもほどがありますわね……"
10027020-24 = "そうでしょう～？いやぁ、これは今までの非礼を詫びてくれないと紹介なんてしたくないなぁ～？"
10027020-29 = "いい加減になさい！"
10027020-37 = "び、ビックリしたぁ！急に足元撃たないでよ！#nその癖を直せって言ってるでしょうが！#nってかそういう事ばっかしてるからいつまでも友達できないんでしょ！"
10027020-38 = "あら。同人イベントで誰にも挨拶できずに孤立しているメルリーさんに言われたくありませんわね。"
10027020-39 = "言ったな！事実だけど！"
10027020-45 = "[ns3] \"あのぉ～\"\n[ns4] \"私がいること忘れてない～？\""
10027020-48 = "あ。"
10027020-49 = "あら。"
10027020-50 = "あー、えっと……この人は……。"
10027020-59 = "あら。あら、あら、あら。"
10027020-60 = "初めまして、先生。[ruby=みよし]三善[/ruby]タカネと申します。#n出版部が発行している雑誌「レッドベア」で作品の評論を書いておりますの。"
10027020-61 = "お噂はかねがね……まさかシャーレの[USERNAME]先生に直接お会いできる日が来るとは、夢にも思いませんでした。"
10027020-62 = "[s] \"出版部……？\""
10027020-63 = "ええ。レッドウィンター連邦学園で発行されている出版物の執筆から発行までを一手に担う部活です。"
10027020-64 = "自慢ではありませんが……私も評論家の一人として、レッドウィンターで出版される本には[ruby=・    ・]全て[/ruby]目を通し、批評を書いておりますの。"
10027020-65 = "いや、それは自慢でしょ……。"
10027020-66 = "ふふ、今度お時間がございましたら、一度当出版部にもお立ち寄りくださいませ。"
10027020-67 = "無視か！っていうか、先生は私との先約があるんだけど？"
10027020-68 = "あら……それは珍しいこともあるのですね。#n世界が滅亡の危機に瀕しても、作業部屋に閉じこもるのがメルリーさんだと思っていたのですが……"
10027020-69 = "えっと……まぁ、私だってたまには取材旅行的なこともするのよ……"
10027020-70 = "興味深いお話ですね。普通、そういうのはアシスタントに頼むものでは？"
10027020-71 = "あら……アシスタントの姿が見えませんわね？"
10027020-73 = "モミジさんはどちらに？"
10027020-74 = "あー……その、今はちょっと別の用事をお願いしてて……！"
10027020-76 = "ふぅん？それは変なお話ですわね。貴女がここに来ること以上に優先しなきゃいけない用事、だなんて……"
10027020-77 = "……。"
10027020-78 = "なんだか様子がおかしいですわよ、メルリーさん。#n普段のうるさいくらいの元気はどこにいってしまったのかしら？"
10027020-79 = "ああ、これは心配ではなく……そうですね、つま先程度の配慮ですわ。感謝なさってくださいね。"
10027020-80 = "……いえ、感謝しなくて結構ですわ。貴女に感謝されるのは気持ち悪いですし……"
10027020-81 = "はいはい……相変わらず面倒くさいんだから。"
10027020-82 = "[s5] \"あのさ……タカネはレッドウィンターから出てる本は\"\n[s6] \"全部読んでるって言ってたよね？\""
10027020-85 = "ええ。改めて申し上げますが、これは決して自慢ではありません。"
10027020-86 = "はいはい、何度も言わなくていいっての……"
10027020-87 = "[s] \"じゃあ……『ルナ』の事も知ってたりする？"
10027020-88 = "『ルナ』ですか……？"
10027020-89 = "そうですね……もちろん知っておりますが……"
10027020-90 = "……わざわざ、そのように訊ねる理由が気になるところではありますね。"
10027020-91 = "[s] \"私たち、『ルナ』の最終巻を探しているんだ。\""
10027020-93 = "『ルナ』の最終巻を……？"
10027020-103 = "……なるほど、モミジさんはそれでどこかに行ってしまった、と。"
10027020-104 = "……"
10027020-105 = "いつかはこういう日が訪れると思っておりましたよ、メルリーさん。"
10027020-106 = "あんたに何が分かるっていうのよ！"
10027020-107 = "ご自身の人望をよくお考えになってくださいな。#nむしろ、今までこうなっていなかった方が驚きなくらいですわ。"
10027020-108 = "あんたに言われたくないわよ！#n小難しい言葉ばっか並べた評論文と同じくらい皮肉で遠回しな話し方してるから人が離れてくんでしょうが！"
10027020-109 = "評論というのは形式が大切なのですわ。#n他人が見落とした観点を指摘し、作品の価値を発見することこそが評論。その高尚さをまだご理解できていないのですか？"
10027020-110 = "はん！作品がなければ批評すらできないでしょうがよ！"
10027020-111 = "素晴らしい評論は作品の価値をさらに輝かせるのですよ！#n読者のいない作品に意義などありませんわ。"
10027020-113 = "そんなの、そこら辺に転がってるじゃない！チェリノ会長のプロパガンダ本とかさぁ！"
10027020-114 = "詭弁ですわ！"
10027020-119 = "[ns7] \"はいはい、二人とも落ち着いて。\"\n[ns8] \"『ルナ』の最終巻の話なんだけど……。\""
10027020-122 = "あ、そうだった……。"
10027020-123 = "……。"
10027020-124 = "事情はよく分かりました、先生。"
10027020-125 = "何故先生があのような社会性の低い生物を助けようとするのかも、ね。"
10027020-126 = "もはや野生動物扱いかよ……。"
10027020-127 = "ですが――結論から申し上げますと……"
10027020-128 = "……『ルナ』の最終巻には、少々複雑な事情が絡んでおりまして……"
10027020-129 = "少なくとも、一朝一夕で見つけられるようなものではありません。"
10027020-130 = "はっきり言いなさいよ！まどろっこしいわね。"
10027020-131 = "さっきから『ルナ』の事よく知ってるみたいに話してるけど……あんたも『ルナ』を集めてるの？だから私たちを牽制してるとか？"
10027020-132 = "物事には順序というものがあるでしょうに……質問は一つに絞っていただけませんこと？"
10027020-133 = "……。"
10027020-134 = "そうですね――メルリーさんなら、あるいは。"
10027020-135 = "――出版部を訪ねなさい。"
10027020-136 = "え？出版部？なんで？"
10027020-137 = "最終巻の手がかりは、そこにあるはずですので。"
10027020-138 = "貴女が本気で、誰かのために探しているのであれば――"
10027020-139 = "……に到達できるでしょう。"
10027020-140 = "……ん？どういう事？"
10027020-142 = "では、私はこれで。#nまた機会があればお会いしましょう、[USERNAME]先生。"
10027020-143 = "……今度はメルリーさん抜きで、ね。"
10027020-144 = "だから一言多いっての！"
10027020-150 = "ちょっと！！ちゃんと説明しなさいよ！"
