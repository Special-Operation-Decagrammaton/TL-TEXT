[translation]
10020005-7 = "Daqui em diante é a nossa vez."
10020005-8 = "Demorou, mas cheguei! A protagonista desta operação acaba de entrar em cena!"
10020005-12 = "Vamos começar a reunião de estratégia para a \"Batalha de Ocupação da Arca\"."
10020005-18 = "Esta batalha de ocupação é... uma luta para hackear a \"Arca\" dentro do limite de tempo e tomar o controle dela."
10020005-23 = "A \"Arca de Atra-Hasis\" é um gigantesco dispositivo de computação de interpretação multidimensional... A Arca inteira é, na verdade, um computador quântico."
10020005-24 = "Ou seja, cada uma dessas estruturas é um dispositivo de processamento para realizar interpretações multidimensionais."
10020005-25 = "Por isso, precisamos hackear cada área desta Arca e tomar o controle delas pouco a pouco para o nosso lado."
10020005-26 = "É por isso que chamamos de \"Batalha de Ocupação\"!"
10020005-28 = "Exatamente — literalmente, vamos ocupando o território inimigo."
10020005-29 = "Ao ocuparmos a Arca dessa forma... e tomarmos o sistema de controle no final... será a nossa vitória."
10020005-30 = "Depois disso, basta ativar a \"sequência de autodestruição\" para destruir a Arca."
10020005-31 = "Claro, o inimigo não vai ficar parado assistindo. Acho que vamos enfrentar muitos inimigos enquanto avançamos na ocupação..."
10020005-32 = "Mas, como o Sensei está aqui, não estou nem um pouco preocupada."
10020005-33 = "[s] \"Sim, pode deixar comigo.\""
10020005-34 = "Além disso... a Arca, no momento, está sendo contida graças à Alice, impedindo que ela realize interpretações multidimensionais."
10020005-35 = "Naturalmente, há um limite para manter isso. #nQuando o tempo limite acabar, o estado de supressão da Arca terminará e ela desaparecerá novamente nas dimensões."
10020005-36 = "Se isso acontecer... nunca mais poderemos entrar em contato com a Arca."
10020005-37 = "Vou deixar o tempo restante até o fim da supressão da \"interpretação multidimensional\" exibido separadamente."
10020005-43 = "Esse tempo é o limite da nossa batalha de ocupação."
10020005-45 = "Agora, vou explicar a estrutura interna da \"Arca\"."
10020005-50 = "A Arca é dividida principalmente em quatro áreas."
10020005-60 = "A 1ª Área, localizada na parte externa—"
10020005-61 = "Em seguida, a 2ª Área—"
10020005-62 = "E a 3ª Área."
10020005-63 = "Por fim, a 4ª Área, localizada no centro."
10020005-64 = "Atualmente, nossa nave está dentro da 1ª Área."
10020005-65 = "Portanto, começaremos a ocupação pela 1ª Área — após ocuparmos a 2ª e a 3ª áreas externas, #nseguiremos para a 4ª Área por último."
10020005-66 = "Cada área possui um \"Motor Dimensional\" instalado. #nEste é o núcleo do dispositivo de computação de interpretação multidimensional, o coração da Arca."
10020005-67 = "Se destruirmos todos os quatro \"Motores Dimensionais\" da Arca, poderemos assumir o controle do sistema da Arca."
10020005-69 = "E, finalmente... se conseguirmos fazer a Arca se autodestruir, a operação será um sucesso."
10020005-70 = "Assim, a paz deverá retornar a Kivotos."
10020005-74 = "Depois disso, basta o Sensei e todos voltarem para a nave e retornarem à superfície, e será perfeito!"
10020005-76 = "Nossa explicação termina aqui — agora é a vez do \"Schale\"."
10020005-77 = "Sensei, contamos com você!"
10020005-81 = "Sensei, força. Nós também vamos dar o nosso melhor."
10020005-82 = "Por favor, dê o seu melhor."
10020005-86 = "[ns] \"Obrigado, pessoal da Veritas. Vamos dar o nosso melhor juntos.\""
10020005-87 = "...Pessoal da Veritas, obrigado pelas explicações."
10020005-88 = "Então, a partir de agora—"
10020005-89 = "A Batalha de Ocupação da \"Arca de Atra-Hasis\" está iniciada!"
10020005-90 = "[s] \"Então, vamos nessa!\""
10020005-92 = "Vou deixar aqui os suprimentos necessários para a operação, então venha reabastecer quando quiser~"
10020005-93 = "Sim...! #nEu darei suporte ao Sensei até o fim!"
