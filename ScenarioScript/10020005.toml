[translation]
10020005-7 = "ここからは私たちの番だね。"
10020005-8 = "おっまたせ～！今回の作戦の主役、登場～！"
10020005-12 = "「箱舟占領戦」の作戦会議を始めます。"
10020005-18 = "この占領戦は……制限時間内に「箱舟」をハッキングし、制御権を奪う戦い。"
10020005-23 = "「アトラ・ハシースの箱舟」は、巨大な多次元解釈演算装置……この箱舟全体が、量子コンピュータになっている。"
10020005-24 = "つまり、この構造物の一つ一つが、多次元解釈を行うための演算装置ってこと。"
10020005-25 = "なので、この箱舟の各エリアを[ruby=ハッキング]占領[/ruby]し、制御権を少しずつこっち側のものにしなきゃいけない。"
10020005-26 = "だから「占領戦」ってわけ！"
10020005-28 = "そう――文字通り、相手の領土を占領していくよ。"
10020005-29 = "そうやって箱舟を占領していって――最後に管制システムを奪ったら……私たちの勝利。"
10020005-30 = "そうしたら、後は「自爆シーケンス」を作動させて箱舟を破壊できる。"
10020005-31 = "もちろん、敵も黙ってないだろうけどね。占領戦を進めていく中で、多くの敵と戦うことになると思うけど……"
10020005-32 = "まあ、先生がいるから、そこまで心配はしてないよ。"
10020005-33 = "[s] \"うん、任せて。\""
10020005-34 = "それと……今の箱舟は、アリスのおかげで多次元解釈ができないよう、抑えられている状態なんだけど。 "
10020005-35 = "当然、それを維持するのだって限度がある。#n制限時間が過ぎたら、箱舟の抑制状態は終わって、再び多次元の中に消えてしまうだろうね。"
10020005-36 = "そうなってしまったら――二度と箱舟への接触はできない。"
10020005-37 = "「多次元解釈」抑制終了までの時間は、別途表示させておくね。"
10020005-43 = "この時間が、占領戦のタイムリミットだよ。"
10020005-45 = "では、今から「箱舟」の内部構造を説明します。"
10020005-50 = "箱舟は、大きく分けて4つのエリアから成っています。"
10020005-60 = "外郭に位置している、第1エリア――"
10020005-61 = "続いて第2エリア――"
10020005-62 = "そして第3エリア。"
10020005-63 = "最後は、中央に位置している第4エリア。"
10020005-64 = "現在私たちの船は、第1エリアの内部にいます。 "
10020005-65 = "なので、第1エリアから占領を開始――外郭の第2・第3エリアを占領後、#n最後に第4エリアという順で進めていきます。"
10020005-66 = "各エリアごとに「次元エンジン」が設置されています。#nこれが箱舟の核である、多次元解釈演算装置のコアです。"
10020005-67 = "箱舟に存在する4つの「次元エンジン」を全て破壊すれば、箱舟の管制システムを掌握可能となります。"
10020005-69 = "そして、最終的に――箱舟を自爆させることができれば、作戦は成功です。"
10020005-70 = "そうすれば、キヴォトスに平和が戻ってくるはず。"
10020005-74 = "その後、先生とみんなが船に乗って地上に戻ってくれば完璧ってわけ！"
10020005-76 = "私たちの説明はここまで――次は「シャーレ」の番だよ。"
10020005-77 = "先生、後はよろしく～"
10020005-81 = "先生、ファイト。私たちも頑張るね。"
10020005-82 = "頑張ってください。"
10020005-86 = "[ns] \"ありがとう、ヴェリタスのみんな。一緒に頑張ろう。\""
10020005-87 = "……ヴェリタスのみなさん、ご説明ありがとうございました。"
10020005-88 = "それでは、これより――"
10020005-89 = "「アトラ・ハシースの箱舟」占領戦を、開始します！"
10020005-90 = "[s] \"それじゃ、行くよ！\""
10020005-92 = "作戦に必要そうな物は、ここに用意しておくから、いつでも補給に来てね～"
10020005-93 = "はい……！#n最後まで先生をサポートいたします！"
