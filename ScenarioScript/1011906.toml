[translation]
1011906-1 = "O verão de Yuki Onna"
1011906-3 = "(Enquanto trabalhava nas placas de Petri, esperava o aluno de plantão.)"
1011906-4 = "[ns1] \"Deve ter sido Nagusa hoje...\"\n[ns2] \"Talvez algo tenha acontecido...\""
1011906-10 = "Desculpe por estar atrasado."
1011906-11 = "Eu estava perdido..."
1011906-12 = "[s] \"Ok, não se preocupe com isso.\"\"\n1011906-17 = \"[ns] \"...Há algo errado?\"\"\n1011906-18 = \"...Não, está tudo bem.\"\n1011906-19 = \"Em vez disso, cumpra o seu dever...\"\n1011906-20 = \"[s3] \"Não se esforce demais.\"\n[s4] \"A saúde vem em primeiro lugar.\""

1011906-23 = "...Talvez eu esteja perdendo um pouco com o calor."
1011906-24 = "Se você descansar, você se recuperará..."
1011906-28 = "[ns5] \"Aqui, ligue o ventilador.\"\n[ns6] \"Vou pegar uma bebida gelada para você na sala de descanso.\""
1011906-31 = "Não posso causar mais problemas ao sensei desse jeito..."
1011906-37 = "Me desculpe... só vou fazer uma pausa..."
1011906-39 = "(Dei uma bebida gelada para Nagusa e fiquei ao lado dela até ela se sentir melhor.)"
1011906-41 = "Ufa... sinto que as coisas melhoraram um pouco."
1011906-42 = "Obrigado, senhor. Isso foi útil."
1011906-43 = "[s] \"De nada.\""
1011906-47 = "[ns7] \"Estava realmente tão quente hoje?\"\n[ns8] \"Eu não percebi porque estava aqui o tempo todo.\""
1011906-50 = "Não, nem tanto. este é o meu problema."
1011906-51 = "Eu... eu não gosto do calor."
1011906-52 = "Mesmo um ligeiro aumento na temperatura pode aumentar a probabilidade de você ficar doente."
1011906-53 = "...Quando eu era pequeno, costumava ser chamado de \"Yuki-onna\"."

1011906-54 = "As crianças são tranquilas nessas situações."
1011906-55 = "[s] \"Ela é uma linda youkai, então ela não é de todo ruim, certo?\""
1011906-56 = "...Eu realmente não gosto disso."
1011906-57 = "[s] \"Por quê?\""
1011906-58 = "A história de Yuki Onna tem um final triste de qualquer maneira."
1011906-59 = "Não importa o quanto Yuki-onna tente, as pessoas ficarão longe dela. #nPorque parece frio."
1011906-60 = "Até mesmo sua existência foi negada e ele teve um fim infeliz... Não achei que fosse problema de outra pessoa."
1011906-61 = "Mas também posso ver porque Yuki-onna é odiada."
1011906-62 = "Neve fria ou sol quente... Não preciso perguntar qual você prefere."
1011906-63 = "[s] \"...Essa bebida ainda está gelada, não está?\""
1011906-64 = "foto? Sim, sobrou muito gelo."
1011906-65 = "[s] \"Quando está quente, você quer gelo frio.\""
1011906-66 = "Isso é verdade... mas..."
1011906-67 = "[s9] \"Assim como o gelo de inverno e o gelo de verão têm significados completamente diferentes.\"\n[s10] \"Mesmo que seja a mesma coisa, a maneira como você percebe isso mudará se você olhar de um ângulo diferente.\""
1011906-73 = "[ns11] \"Acredite em você e em seus amigos.\"\n[ns12] \"Algum dia, tenho certeza que você terá um final feliz.\""
1011906-76 = "...Nunca houve uma história sobre uma mulher da neve que vivia no verão."
1011906-83 = "Hehe...talvez eu mal possa esperar um pouquinho pelo verão. #nObrigado, sensei."
