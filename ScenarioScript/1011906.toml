[translation]
1011906-1 = "雪女の夏"
1011906-3 = "（シャーレの仕事をこなしながら、当番の生徒を待っていた）"
1011906-4 = "[ns1] \"今日はナグサだったはず……。\"\n[ns2] \"何かあったのかな……。\""
1011906-10 = "遅れてごめんなさい。"
1011906-11 = "道に迷っていたの……。"
1011906-12 = "[s] \"いいよ、気にしないで。\""
1011906-17 = "[ns] \"……どこか具合悪い？\""
1011906-18 = "……いや、大丈夫。"
1011906-19 = "それより、当番の仕事を――"
1011906-20 = "[s3] \"無理はしないで。\"\n[s4] \"健康第一だよ。\""
1011906-23 = "……ちょっと暑さに負けてるかも。"
1011906-24 = "休めば回復はするから……。"
1011906-28 = "[ns5] \"ここで扇風機にあたってて。\"\n[ns6] \"休憩室から冷たい飲み物でも持ってくるよ。\""
1011906-31 = "そんな……先生にこれ以上迷惑をかけるわけには――"
1011906-37 = "ごめんなさい……素直に休むね……。"
1011906-39 = "（ナグサに冷たい飲み物を渡して、元気になるまでそばにいた）"
1011906-41 = "ふぅ……ちょっとよくなった気がする。"
1011906-42 = "ありがとう、先生。助かったよ。"
1011906-43 = "[s] \"どういたしまして。\""
1011906-47 = "[ns7] \"今日ってそんなに暑かったっけ？\"\n[ns8] \"ずっとここにいたから、気づかなかった。\""
1011906-50 = "いや、そこまでじゃないよ。これは私の問題。"
1011906-51 = "私……暑さに弱いほうなんだ。"
1011906-52 = "気温が少し上がるだけで、体調を崩しやすくなるの。"
1011906-53 = "……小さい頃はよく「雪女」って呼ばれてた。"
1011906-54 = "子供はこういうところで安直だからね。"
1011906-55 = "[s] \"美人な妖怪だし、悪い事ばかりでもないんじゃない？\""
1011906-56 = "……私はあんまり好きじゃないかな。"
1011906-57 = "[s] \"どうして？\""
1011906-58 = "雪女の物語はどうせ悲しい結末だから。"
1011906-59 = "雪女がいくら頑張っても、人々は遠ざかってしまう。#n冷たく見えるからって。"
1011906-60 = "存在すら否定されて、不幸な結末を迎えるのが……他人事には思えなかった。"
1011906-61 = "でも、雪女が嫌われる理由も分かるんだ。"
1011906-62 = "冷たい雪と、暖かい日差し……どちらが好きかなんて、聞くまでもない。"
1011906-63 = "[s] \"……その飲み物、まだ冷えてるよね？\""
1011906-64 = "え？うん、氷もいっぱい残ってる。"
1011906-65 = "[s] \"暑いとさ、冷たい氷が欲しくなるよね。\""
1011906-66 = "それは……そうだけど……。"
1011906-67 = "[s9] \"冬の氷と、夏の氷で意味が全然違うように。\"\n[s10] \"同じものでも、見る角度が違えば捉え方は変わってくる。\""
1011906-73 = "[ns11] \"自分と仲間を信じてあげて。\"\n[ns12] \"いつかきっと、幸せな結末を迎えられるから。\""
1011906-76 = "……夏を生きた雪女の話は今までなかったよね。"
1011906-83 = "ふふ……ちょっとだけ、夏が待ち遠しくなったかも。#nありがとう、先生。"
