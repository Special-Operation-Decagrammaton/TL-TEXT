[translation]
11060-2 = "Episódio 6;Missão de Resgate!"
11060-3 = "Quarto da Serika"
11060-4 = "(Ding Dong)"
11060-5 = "Serika-chan? Serika-chan, você está aí?"
11060-7 = "(Ding dong Ding dong)"
11060-8 = "Serika-chan, o que está acontecendo? Você não esteve atendendo o telefone..."
11060-9 = "Onde ela deixa as chaves reserva..."
11060-11 = "(Abre porta)"
11060-12 = "Serika-chan...? Você ainda não voltou?"
11060-13 = "...Isso nunca aconteceu antes."
11060-14 = "Pode ser que...!"
11060-16 = "E o celular dela?"
11060-17 = "Parece que está desligado há algumas horas..."
11060-18 = "O chefe dela me disse que ela saiu da loja na hora certa.#nAcho que ela não voltou para casa desde então."
11060-19 = "Ela nunca ficou fora de casa tão tarde antes..."
11060-20 = "Espera... E se for a Gangue do Capacete?"
11060-21 = "Huh? A Gangue do Capacete e a Serika...!?"
11060-22 = "Vamos esperar por agora. Hoshino-senpai e o Sensei estão investigando."
11060-23 = "..."
11060-25 = "(Porta abre)"
11060-26 = "Desculpa pela espera pessoal."
11060-27 = "Hoshino-senpai! Sensei!"
11060-28 = "[s] \"Chegamos.\""
11060-29 = "Como foi, senpai?"
11060-30 = "Usando a autoridade do Sensei, conseguimos acessar a rede central gerenciada pelo Conselho Estudantil Geral."
11060-31 = "Na rede central... #nSensei, a sua autoridade se estende até a isso..."
11060-32 = "Uhe~ Claro que foi secretamente. Se formos descobertos, teremos que escrever uma carta de desculpas, né?"
11060-33 = "Huh!? Você vai ficar bem, Sensei?"
11060-34 = "[s1] \"Vai ficar tudo bem, é pela segurança da Serika.\"\n[s2] \"Está tudo bem, desde que não descubram.\""
11060-35 = "Sensei..."
11060-36 = "Bem, isso é verdade, mas..."
11060-37 = "..."
11060-38 = "...Tudo bem."
11060-39 = "Obrigada, Sensei."
11060-40 = "A localização do celular da Serika estava bem aqui, antes de perder o contato."
11060-41 = "Isso é a parte da cidade onde a desertificação está avançando, certo?"
11060-42 = "É um distrito abandonado... As únicas pessoas que se juntam lá são deliquentes #nporque a ordem não pode ser imposta."
11060-43 = "Confirmamos em analíses de fatores de risco pra escola anteriores que as forças da Gangue do Capacete #nKata-Kata estavam se reunindo nesse local."
11060-44 = "Então... é realmente trabalho da Gangue do Capacete Kata-Kata!"
11060-45 = "Entendo, então elas sequestraram a Serika-chan a caminho de casa e a levaram para o seu esconderijo?"
11060-46 = "Atacar a nossa escola não foi o suficiente para elas, então decidiram fazer reféns e nos ameaçar."
11060-47 = "Não adianta pensar nisso! Temos que nos apressar e ajudar a Serika-chan!"
11060-48 = "Claro."
11060-49 = "Vamos logo então!"
11060-50 = "[s] \"Vamos\""
11060-53 = "(clunk clunk)"
11060-54 = "Uh, hmm..."
11060-55 = "...Huh?"
11060-56 = "!?"
11060-57 = "Aonde eu tô? eu fui sequestrada?!"
11060-58 = "Ow... a minha cabeça..."
11060-59 = "(clunk clunk)"
11060-60 = "...A caçamba de um caminhão?"
11060-61 = "A Gangue do Capacete... para onde elas estão me levando?"
11060-62 = "Está escuro... mas um pouco de luz está vindo por uma fresta."
11060-63 = "Será que consigo ver lá fora?"
11060-64 = "O deserto... ferrovias!?"
11060-65 = "O lugar onde fica a ferrovia... Então, aqui é o deserto nos arredores de Abydos!?"
11060-66 = "...No deserto, não tem como entrar em contato com elas aqui! #nMesmo se conseguisse escapar, não vai ser possível avisar a todas do clube..."
11060-67 = "O que devo fazer? todas devem estar preocupadas..."
11060-68 = "..."
11060-69 = "...Será que vão me enterrar em algum lugar nesse deserto? #nPara que ninguém me encontre..."
11060-70 = "Elas vão pensar que fui embora da cidade igual as outras estudantes..."
11060-71 = "Será que elas acham que eu as traí?"
11060-72 = "Eu vou morrer sem esclarecer esse mal-entendido..."
11060-73 = "Eu... não posso deixar isso acontecer."
11060-74 = "..."
11060-75 = "Uh..."
11060-76 = "(Funga)"
11060-77 = "(BUM!!!)"
11060-78 = "Uuuuwaaa!?"
11060-80 = "(Colisão)"
11060-81 = "(Tosse tosse)"
11060-83 = "O que?! Uma explosão!? O caminhão explodiu!?"
11060-84 = "Foi atingido por algum projétil... mas de onde veio?"
11060-85 = "Encontrei a Serika! Confirmo: ela está viva!"
11060-86 = "A-Ayane-chan?!"
11060-87 = "Também vejo ela, Confirmo: Serika está quase chorando!"
11060-88 = "!?"
11060-89 = "O que?! Minha fofa Serika-chan estava chorando? #nTava chorando porque sentiu nossa falta? #nNem achava que se importava com a gente!"
11060-90 = "Huuh!? Vocês são tão irritantes! E eu não tava chorando!!"
11060-91 = "Mentira! Posso confirmar que vi lágrimas no seus olhos!"
11060-92 = "Por favor, não chore Serika-chan! Nós enxugaremos suas lágrimas!"
11060-93 = "Ugh, parem! Eu já disse que não é verdade!! Calem a boca!!"
11060-94 = "[s] \"Estou aliviado que está bem\"."
11060-95 = "Huh, Sensei?? Você também veio aqui? Como?"
11060-96 = "[s3] \"Eu sou um stalker, lembra?\"\n[s4] \"É o dever do herói salvar a princesa sequestrada!\""
11060-97 = "Ei, para de fazer piadas! Seu Sensei pervertido!"
11060-98 = "Vo... Você..."
11060-99 = "Você é estúpido!?"
11060-100 = "Do que você está falando?! Tá querendo levar um soco?! #nQ-quem você pensa que é para me chamar de princesa?!"
11060-101 = "Uhe~ parece que está bem. Serika foi resgatada."
11060-102 = "Que alívio Serika-chan... Pensei que algo tinha acontecido com você..."
11060-103 = "Ayane-chan..."
11060-104 = "Não abaixem a guarda ainda. Conseguimos parar o caminhão, mas ainda estamos no meio do território inimigo."
11060-105 = "Quando o inimigo descobrir, que o veículo que transportava a refém foi destruído, vão atacar."
11060-106 = "Um grande número de tropas da Gangue do Capacete Kata-Kata foi avistada a frente!"
11060-107 = "Também confirmo diversas armas pesadas de grande porte! #nEstão nos cercando gradualmente!"
11060-108 = "Que timing perfeito... Bem, então vamos quebrar o cerco delas e voltar pra casa?"
11060-109 = "...Cuidado. Elas tem um tanque pesado modificado."
11060-110 = "Sabemos, é uma versão melhorada do Flak 41."
11060-113 = "Então..."
11060-117 = "Vamos?"