[translation]
84300100300-6 = "やっほ～ティーパーティーさん！"
84300100300-11 = "……私のことか？"
84300100300-12 = "うんっ！この写真、あなたでしょ？"
84300100300-16 = "……ああ、そうだね。"
84300100300-18 = "ちょっ、アスナ先輩、いきなりそんな……！"
84300100300-19 = "トリニティの偉い人なのだから、もう少しちゃんと……！"
84300100300-25 = "……君たちは？"
84300100300-26 = "ん、私？私はアスナだよ！"
84300100300-28 = "[ruby=かくだて]角楯[/ruby]カリンだ。ミレニアムEXPOのガイドを担当している。"
84300100300-32 = "いや……担当することにな……りました。よろしくお願いします。"
84300100300-33 = "……ごめん。敬語はあまり慣れてなくて。"
84300100300-34 = "気遣いは無用だ。楽な話し方で構わない。"
84300100300-35 = "むしろ、こちらが礼を言うべきだね。出迎え、ありがとう。"
84300100300-36 = "依頼主からは、失礼のないように、と……。"
84300100300-37 = "……学園間の交流が目的だろう？堅苦しい雰囲気はそぐわない。"
84300100300-38 = "それに、円滑なコミュニケーションが取れればそれで問題ない。#nこれはトリニティ側の正式な申し入れと受け取ってもらって構わない。"
84300100300-39 = "正式な……？それでいいのだろうか……。"
84300100300-41 = "じゃあ、私もいつも通り話すね！ティーパーティーさん！"
84300100300-43 = "さっきまでと変わらなくないか……？"
84300100300-44 = "時に……ガイド役と言ったか。トリニティ生の引率は私の役割だと思っていたが……。"
84300100300-45 = "「引率」と「ガイド」は違うものではないか？#nいずれにせよミレニアムの「案内」は任せてくれ。"
84300100300-46 = "ふむ……。"
84300100300-50 = "……どうかしたのか？"
84300100300-51 = "……いや。"
84300100300-52 = "ガイド役は他にも居るのかい？"
84300100300-54 = "うん！あと3人いるよ！"
84300100300-55 = "今通話繋いでるけど……ちょっと話していく？"
84300100300-64 = "こんにちは。「[ruby=むろかさ]室笠[/ruby]アカネ」と申します。#nよろしくお願いしますね。"
84300100300-65 = "「[ruby=あすま]飛鳥馬[/ruby]トキ」です。#n何かあればいつでもお申し付けください。ピース、ピース。"
84300100300-66 = "「いつでも」は少し難しいかもしれませんが……。"
84300100300-78 = "あっ、少々お待ちを……みなさん、そっちは……。"
84300100300-83 = "……みなさーん？"
84300100300-87 = "申し訳ありません。こちらも立て込んでいて……。"
84300100300-88 = "どうか、楽しい時間をお過ごしくださいね。"
84300100300-92 = "では私もこれで。"
84300100300-98 = "あ……切れちゃった！"
84300100300-99 = "あちらでもトリニティの生徒を案内してる。#n思ったより参加人数が多かったから、二班に分けたんだ。"
84300100300-101 = "そうか。 "
84300100300-102 = "では、案内をよろしく頼むよ。行こうか。"
84300100300-104 = "ちゃんとついてきてね！"
84300100300-109 = "あっ、待って、先輩……！"
84300100300-114 = "はぁ……一人で先に行ったら案内の意味が……。"
84300100300-118 = "私たちはゆっくり行こう。"
