[translation]
84300100300-6 = "Iupii, pessoal do Tea Party!"
84300100300-11 = "……Está falando comigo?"
84300100300-12 = "Isso mesmo! Essa foto é você, não é?"
84300100300-16 = "……Ah, sim, sou eu."
84300100300-18 = "Ei, Asuna-senpai, de repente assim……!"
84300100300-19 = "Você é uma pessoa importante de Trinity, então deveria ser um pouco mais formal……!"
84300100300-25 = "……E vocês, quem são?"
84300100300-26 = "Hum, eu? Eu sou a Asuna!"
84300100300-28 = "Eu sou Kakudate Karin. Estou encarregada de ser a guia da Millennium EXPO."
84300100300-32 = "Não, quer dizer…… eu fui encarregada disso. Prazer em conhecê-la."
84300100300-33 = "……Desculpe. Não estou muito acostumada a usar linguagem formal."
84300100300-34 = "Não precisa se preocupar com isso. Pode falar de um jeito mais descontraído."
84300100300-35 = "Na verdade, sou eu quem deveria agradecer. Obrigado por vir nos receber."
84300100300-36 = "O cliente pediu para não sermos indelicadas, então……."
84300100300-37 = "……O objetivo não é o intercâmbio entre as escolas? Uma atmosfera rígida não combina com isso."
84300100300-38 = "Além disso, não haverá problemas se conseguirmos nos comunicar bem.#n Pode considerar isso como uma solicitação oficial do lado de Trinity."
84300100300-39 = "Oficial……? Será que tudo bem assim……."
84300100300-41 = "Então, vou falar do meu jeito de sempre! Pessoal do Tea Party!"
84300100300-43 = "Não está exatamente igual a como estava antes……?"
84300100300-44 = "Diga-me…… você disse que é uma guia. Eu achava que escoltar os alunos de Trinity era minha função……."
84300100300-45 = "Escolta e guia não são coisas diferentes?#n De qualquer forma, deixe a 'orientação' da Millennium conosco."
84300100300-46 = "Hum……."
84300100300-50 = "……Aconteceu alguma coisa?"
84300100300-51 = "……Não, nada."
84300100300-52 = "Existem outros guias por aí?"
84300100300-54 = "Sim! Tem mais três!"
84300100300-55 = "Estou conectada com elas agora…… quer falar um pouco?"
84300100300-64 = "Olá. Meu nome é Murokasa Akane.#n É um prazer conhecê-la."
84300100300-65 = "Sou Asumaya Toki.#n Se precisar de algo, é só pedir. Paz, paz."
84300100300-66 = "Embora dizer 'qualquer coisa' seja um pouco difícil……."
84300100300-78 = "Ah, espere um momento…… pessoal, aí está……."
84300100300-83 = "……Pessoal?"
84300100300-87 = "Peço desculpas. Estamos muito ocupadas por aqui também……."
84300100300-88 = "Por favor, aproveitem bem o tempo de vocês."
84300100300-92 = "Bem, vou indo também."
84300100300-98 = "Ah…… a chamada caiu!"
84300100300-99 = "Elas também estão guiando alunos de Trinity por lá.#n Como o número de participantes foi maior do que o esperado, dividimos em dois grupos."
84300100300-101 = "Entendo."
84300100300-102 = "Então, conto com a sua orientação. Vamos nessa?"
84300100300-104 = "Tente me acompanhar, hein!"
84300100300-109 = "Ah, espere, senpai……!"
84300100300-114 = "Haa…… se ela for na frente sozinha, qual é o sentido de ser guia……."
84300100300-118 = "Vamos indo com calma."
