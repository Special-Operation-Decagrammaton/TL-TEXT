[translation]
10040130-1 = "後日談その5;みんなが寝静まった夜"
10040130-2 = "う、うっ……。"
10040130-3 = "も、もう……飲めないわ……。"
10040130-4 = "ふ、ふふ……来年は……世界をもっと、カラフルに……。"
10040130-10 = "あら……？#nもうお目覚めでしたか。"
10040130-11 = "最近、徹夜続きだったと伺ったような……大丈夫ですか？"
10040130-12 = "ちょっと仮眠しちゃってたから、眠りが浅かったみたい。"
10040130-13 = "まあ、まだサーバーのメンテナンスも残ってるし。"
10040130-14 = "コユキのハッキング対策も、徹底的にやっておきたいから。#nちょうどよかったかも。"
10040130-15 = "ふふっ。本当に、実直な方です。"
10040130-19 = "ひとつお聞きしても良いでしょうか？"
10040130-20 = "なに？"
10040130-21 = "どうして、セミナーに入らなかったんですか？"
10040130-22 = "今さらな質問だね……？"
10040130-23 = "ですね。でも、一緒に過ごすうちに、気になってしまって。#nヴェリタスは本来、情報を自由に共有できる世界を求め、#n統制に抵抗するため作られた部活……でしたよね？"
10040130-24 = "だというのに、チヒロ副部長はミレニアム全体のセキュリティを#n守ってくれていますし、ヴェリタスの他の皆さんのような奔放さも、あまり感じられません。"
10040130-26 = "自由には責任が伴う、って言うでしょ。自由と無秩序をはき違えないように、#n私はそこを意識してるから。"
10040130-27 = "とはいえ……#n他人の選択にまで責任を負いたがるのは、私は良くないと思ってる。"
10040130-28 = "リオ会長のことですね？"
10040130-29 = "まあ、強いて言えば。"
10040130-30 = "でも……#n今でこそ対立してるけど、リオと考えが一致してた時期もあったんだよ。"
10040130-31 = "ヒマリと三人で、ミレニアムの難題を解決しようとしてたんだ……。"
10040130-32 = "ヒマリ部長もですか？#nちょっと想像できないですね。"
10040130-33 = "仲が良かった、とは言ってないよ。"
10040130-37 = "いや……もしかすると仲良しだったかも。"
10040130-38 = "リオ会長は、気持ちを表に出さない方ですから。"
10040130-39 = "ヒマリもそうだよ。"
10040130-40 = "だから、もしかすると仲直りするきっかけを探してるのかも。"
10040130-41 = "あ。今の、ヒマリには内緒ね。たぶん怒るから。"
10040130-42 = "もちろんです。ふふっ。"
10040130-44 = "ふーっ……随分遅い時間になっちゃった。"
10040130-45 = "メンテナンスも終わったし、そろそろ帰ろうかな。"
10040130-46 = "ご苦労様でした。いつもありがとうございます。"
10040130-47 = "まあ、それこそいつもやってるから。たいしたことじゃないよ。"
10040130-48 = "そのいつもは、明日も、来年も……今日みたく続くのでしょうか？"
10040130-49 = "……どうだろう。#nでも、きっと続くんじゃないかな。"
10040130-50 = "私は書記なので……どんな変化も欠かさず記録する者として、#nこの穏やかな日常が続いてくれたら、うれしいです。"
10040130-52 = "そういうわけで……#n今年も変わらず、よろしくお願いしますね、先輩。"
10040130-53 = "うん。こちらこそ、よろしく。"
