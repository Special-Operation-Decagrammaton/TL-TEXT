[translation]
10040130-1 = "Epílogo parte 5; Uma noite em que todos dormem"
10040130-2 = "U-ugh..."
10040130-3 = "N-não... não consigo mais beber..."
10040130-4 = "He-hehe... ano que vem... vou deixar o mundo... mais colorido..."
10040130-10 = "Oh...?#nJá acordou?"
10040130-11 = "Ouvi dizer que você tem passado noites em claro ultimamente... está tudo bem?"
10040130-12 = "Eu tirei um cochilo rápido, então meu sono estava leve."
10040130-13 = "Bem, ainda falta a manutenção do servidor."
10040130-14 = "E quero deixar as medidas contra o hacking da Koyuki bem reforçadas. #nVeio a calhar."
10040130-15 = "Hehe. Você é realmente uma pessoa íntegra."
10040130-19 = "Posso lhe perguntar uma coisa?"
10040130-20 = "O quê?"
10040130-21 = "Por que você não entrou para o Seminário?"
10040130-22 = "Essa é uma pergunta um tanto tardia, não acha...?"
10040130-23 = "É verdade. Mas, conforme passamos tempo juntas, fiquei curiosa. #nA Veritas foi criada originalmente como um clube que buscava um mundo onde as informações pudessem ser compartilhadas livremente, #nresistindo ao controle... não foi?"
10040130-24 = "Apesar disso, a vice-presidente Chihiro protege a segurança de toda a Millennium, #ne não sinto essa mesma liberdade desenfreada que os outros membros da Veritas possuem."
10040130-26 = "Dizem que a liberdade vem acompanhada de responsabilidade, não é? #nEu me preocupo em não confundir liberdade com desordem."
10040130-27 = "Dito isso... #neu não acho bom querer assumir a responsabilidade pelas escolhas dos outros."
10040130-28 = "Está falando da presidente Rio?"
10040130-29 = "Bem, se for para dizer algo, sim."
10040130-30 = "Mas... #nembora estejamos em lados opostos agora, houve uma época em que eu e a Rio tínhamos pensamentos alinhados."
10040130-31 = "Nós três, junto com a Himari, tentávamos resolver os problemas difíceis da Millennium..."
10040130-32 = "A presidente Himari também? #nNão consigo nem imaginar."
10040130-33 = "Não disse que éramos amigas próximas."
10040130-37 = "Não... talvez, na verdade, fôssemos sim."
10040130-38 = "A presidente Rio é alguém que não demonstra seus sentimentos."
10040130-39 = "A Himari também é assim."
10040130-40 = "Por isso, talvez elas estejam procurando uma chance de se reconciliarem."
10040130-41 = "Ah. Não conte isso para a Himari agora. Ela provavelmente ficaria brava."
10040130-42 = "Com certeza. Hehe."
10040130-44 = "Ufa... já está bem tarde."
10040130-45 = "A manutenção terminou, acho que já vou indo para casa."
10040130-46 = "Obrigada pelo seu trabalho duro. Sempre agradeço por tudo."
10040130-47 = "Bem, é algo que faço sempre. Não é nada demais."
10040130-48 = "Esse 'sempre' continuará amanhã, no próximo ano... assim como hoje?"
10040130-49 = "...Quem sabe. #nMas, tenho certeza de que continuará."
10040130-50 = "Como sou a secretária... como alguém que registra cada mudança sem falta, #nficaria feliz se esse cotidiano tranquilo continuasse."
10040130-52 = "Sendo assim... #neste ano também, conto com você, veterano(a)."
10040130-53 = "Sim. Eu que conto com você."
