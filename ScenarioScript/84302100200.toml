[translation]
84302100200-5 = "Vou explicar a operação brevemente. Neru, o centro de dados onde você vai se infiltrar... o objetivo é conectar fisicamente a ferramenta de hacking."
84302100200-6 = "Pegue o USB que está em cima da mesa. Os dados estão nele."
84302100200-7 = "……Ferramenta de hacking?"
84302100200-8 = "Fui eu quem a criou. #nSe ela funcionar, poderemos controlá-lo remotamente, mesmo daqui do esconderijo. #nEmbora, para o primeiro passo, seja necessária uma conexão física."
84302100200-9 = "Eu cuido do resto depois, #nvocê só precisa plugar o USB no PC de gerenciamento do centro de dados."
84302100200-10 = "Só plugar, é? Você fala como se fosse fácil. Bem, pelo menos me poupa trabalho."
84302100200-14 = "……Não é como se eu tivesse dito que não consigo fazer, né?"
84302100200-15 = "Sim, eu estou te pedindo justamente porque sei que você consegue."
84302100200-16 = "Ah... e não se esqueça de levar a chave de segurança."
84302100200-17 = "Você vai precisar dela para destravar a porta da sala. #nEntre em contato imediatamente caso surja algum problema."
84302100200-19 = "……Sério, suas operações são meticulosas, ou melhor, preocupadas demais."
84302100200-20 = "Desde antigamente... hah, chega a ser nostálgico."
84302100200-21 = "Naquela época, éramos só você e a Asuna. Diferente de você, a Asuna não é muito boa em seguir ordens detalhadas."
84302100200-22 = "Se eu busco precisão, é natural que a operação gire em torno de você."
84302100200-23 = "É verdade... bem, acho que cada uma tem seu jeito de lidar com as situações, não é?"
84302100200-24 = "Então tá, vou me preparar."
84302100200-25 = "Certo. A chave de segurança está em cima da caixa. Conto com você."
