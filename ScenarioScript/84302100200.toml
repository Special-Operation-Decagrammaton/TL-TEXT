[translation]
84302100200-5 = "作戦を手短に説明するわね。ネル、これから貴女に潜入してもらうデータセンターだけど……ハッキングツールを物理的に接続することが目標になるわ。"
84302100200-6 = "机の上にあるUSBを持って行ってちょうだい。 データが入っているわ。"
84302100200-7 = "……ハッキングツール？"
84302100200-8 = "私が作ったものよ。#nこれが機能すれば、この隠れ家からでも遠隔で制御できるようになる。#nとはいえ最初の一歩は、物理的な接続が必要なのだけれど。"
84302100200-9 = "後のことはこちらでやるから、#n貴女はデータセンターの管理PCにUSBを差すだけでいいわ。"
84302100200-10 = "差すだけ、って。軽く言ってくれるじゃねぇか。まぁ、面倒が省けていいけどよ。"
84302100200-14 = "……別に、できない、とは言ってねぇからな？"
84302100200-15 = "ええ、できると思っているから依頼しているわ。"
84302100200-16 = "ああ……セキュリティキーを持っていくのも忘れないでちょうだい。"
84302100200-17 = "部屋のロックを解除するのに必要になるわ。#nトラブルが起きた時はすぐに連絡を。"
84302100200-19 = "……ほんと、お前の作戦って几帳面っていうか、心配性っていうか。"
84302100200-20 = "昔っから……はぁ、ちょっと懐かしいくらいだ。"
84302100200-21 = "あの当時は貴女とアスナだけだったわね。アスナは貴女と違って、細かい命令を遂行するのに向かない。"
84302100200-22 = "正確性を求めるのであれば、貴女中心の作戦になるのは自然なことだった。"
84302100200-23 = "そうだな……まぁ、それぞれの状況に応じたやり方ってことでいいんじゃないか？"
84302100200-24 = "んじゃ、準備してくるわ。"
84302100200-25 = "ええ。セキュリティキーは箱の上よ。頼むわね。"
