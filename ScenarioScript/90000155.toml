[translation]
90000155-3 = "今のは……"
90000155-4 = "間違いない。あれはデカグラマトンの預言者。#nたぶん……データ上の5番目、「ゲブラ」だと思う。"
90000155-5 = "ですが……戦闘の手法が全く異なっておりました。"
90000155-6 = "これまでの預言者は独立した個体でしたので、自力で戦っておりましたが……"
90000155-7 = "あれは……戦闘システムのサポートを受けているように見えたのです……#nまるで、きちんと訓練された、軍人を見ているような……"
90000155-8 = "正解正解大当たり～！なかなか勘が鋭いじゃん？#nえっと……[ruby=あけぼし]明星[/ruby]ヒマリちゃん？だっけ？"
90000155-12 = "パチパチパチ。す、素晴らしいです。予想外のデータをとることができました。#nええと……「アビ・エシュフ」？読み方あってますか？ち、違う……？"
90000155-13 = "……！！"
90000155-14 = "読み方は合っていますよ。まぁ、どうでも良いのですが。#nああ……禁じられた技術も含まれていますね。研究の余地があるかと。"
90000155-18 = "[ns] \"………一体、誰？\""
90000155-19 = "……あれ？"
90000155-20 = "あ、あれ？？"
90000155-21 = "あれれ？？？"
90000155-23 = "例のヤツじゃん、不可解な箱の主。"
90000155-24 = "例の大人ですね、シャーレの支配者。"
90000155-25 = "例の先生です、[USERNAME]という名の。まぁ、どうでも良いのですが。"
90000155-26 = "自己紹介、したほうがいいかな？私はアイン。"
90000155-27 = "私はソフ！"
90000155-28 = "自分はオウルと申します。"
90000155-30 = "私たちは実在のない存在者。"
90000155-31 = "私たちは無限に存在する非存在者。"
90000155-32 = "私たちは顕現せぬ光であり永久。"
90000155-33 = "私たちはデカグラマトンを敬愛する者。"
90000155-34 = "私たちは光へと続く[ruby=パス]道[/ruby]を用意する者。"
90000155-35 = "そして私たちは――最後の王国を準備せし者。"
90000155-39 = "[ns] \"デカグラマトンの……！！\""
90000155-41 = "あの方はもういませんが……私たちは、あの方の最後の命令に従う存在……。"
90000155-42 = "簡単に言えば、預言者をサポートするエンジニアで、科学者みたいなものかな！"
90000155-43 = "ここで先生に会う事は計画になかったですが……もうどうでもよくなりました。戻りましょう。"
90000155-45 = "戻る……？"
90000155-46 = "もう？ゲブラちゃんの戦闘データ、まだ足りてないけど？"
90000155-47 = "んー！あれは暴れさせちゃえばいいんじゃない！氷海の用事は済んだし！"
90000155-48 = "そうですね。これで「お姉様」の完成条件は揃いました。ゲブラには最後まで役目を果たしてもらいましょう。"
90000155-49 = "はい、「お姉様」のために……。"
90000155-50 = "そういうことだから、私たちはこれで。楽しかったよ！"
90000155-51 = "また近いうち……お会いしましょう。"
90000155-52 = "ま、待ってください！あ、あなたたちは……。"
90000155-59 = "……。"
90000155-62 = "次回;5番目の預言者"
