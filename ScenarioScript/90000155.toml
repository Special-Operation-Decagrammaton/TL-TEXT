[translation]
90000155-3 = "Isso foi……"
90000155-4 = "Sem dúvida. Aquele é um profeta de Decagrammaton.#nProvavelmente…… o quinto nos dados, acho que é o \"Geburah\"."
90000155-5 = "Mas…… o método de combate era completamente diferente."
90000155-6 = "Os profetas anteriores eram indivíduos independentes, então lutavam por conta própria, mas……"
90000155-7 = "Aquele…… parecia estar recebendo suporte de um sistema de combate……#nComo se estivéssemos olhando para um soldado devidamente treinado……"
90000155-8 = "Acertou, acertou, na mosca! Você é bem perspicaz, não é?#nHum…… Himari Akeboshi, era esse o nome?"
90000155-12 = "Clap, clap, clap. I-incrível. Consegui dados inesperados.#nHum…… \"Abi-Eshuh\"? A pronúncia está correta? N-não……?"
90000155-13 = "……！！"
90000155-14 = "A pronúncia está correta. Bem, não que isso importe.#nAh…… também inclui tecnologias proibidas. Acho que há espaço para pesquisa."
90000155-18 = "[ns] \"………Quem é você?\""
90000155-19 = "……Ué?"
90000155-20 = "H-hein??"
90000155-21 = "Uééé???"
90000155-23 = "É aquele cara, o dono da caixa misteriosa."
90000155-24 = "É aquele adulto, o governante do Schale."
90000155-25 = "É aquele Sensei, chamado [USERNAME]. Bem, não que isso importe."
90000155-26 = "Devo me apresentar? Eu sou Ain."
90000155-27 = "Eu sou Soph!"
90000155-28 = "Eu me chamo Owl."
90000155-30 = "Nós somos seres sem existência real."
90000155-31 = "Nós somos não-seres que existem infinitamente."
90000155-32 = "Nós somos a luz que não se manifesta e a eternidade."
90000155-33 = "Nós somos aqueles que amam e respeitam Decagrammaton."
90000155-34 = "Nós somos aqueles que preparam o caminho que leva à luz."
90000155-35 = "E nós somos — aqueles que preparam o reino final."
90000155-39 = "[ns] \"De Decagrammaton……!!\""
90000155-41 = "Aquele ser já não está mais aqui, mas…… nós somos existências que seguem a última ordem dele……"
90000155-42 = "Simplificando, somos como engenheiros e cientistas que dão suporte aos profetas!"
90000155-43 = "Não estava nos planos encontrar o Sensei aqui…… mas não importa mais. Vamos voltar."
90000155-45 = "Voltar……?"
90000155-46 = "Já? Ainda não temos dados de combate suficientes da Geburah, sabe?"
90000155-47 = "Hum! Não seria melhor deixar ela causar um pouco de caos? Já terminamos o que tínhamos que fazer no Mar de Gelo!"
90000155-48 = "É verdade. Com isso, as condições para a conclusão da \"Irmã Mais Velha\" estão reunidas. Vamos deixar Geburah cumprir seu papel até o fim."
90000155-49 = "Sim, pela \"Irmã Mais Velha\"……"
90000155-50 = "É isso, então nós vamos indo. Foi divertido!"
90000155-51 = "Nos veremos novamente em breve……"
90000155-52 = "E-espere! V-vocês……"
90000155-59 = "……"
90000155-62 = "Próximo episódio: O 5º Profeta"
