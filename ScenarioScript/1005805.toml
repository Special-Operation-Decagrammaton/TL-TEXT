[translation]
1005805-1 = "アフタヌーンティー"
1005805-6 = "[ns] \"ミネとティータイムなんて楽しみだな。\""
1005805-9 = "一段ずつ楽しんでいただけるように、ケーキスタンドでお持ちしました。"
1005805-10 = "一段目には、卵とキュウリのサンドイッチにバルサミコ酢仕立てのサラダ。"
1005805-11 = "二段目には、ヨーグルトにスコーン、クロテッドクリーム。"
1005805-12 = "三段目には、フルーツとティラミスをご用意しました。"
1005805-13 = "お飲み物はコーヒーと紅茶からお好きなほうを選んでいただければと。"
1005805-14 = "[s1] \"す、すごい豪華だね……ありがとう、いただきます。\"\n[s2] \"ちなみに、パウンドケーキとかあったりする？\""
1005805-15 = "いえ、先生のお口に合えばうれしい限りです。"
1005805-16 = "パウンドケーキ、ですか……？"
1005805-17 = "そうですね、今はないのですが……。"
1005805-18 = "もし必要でしたら、今からどんな手を使ってでも必ずやご用意します。"
1005805-19 = "先生が召し上がりたいのでしたら、是が非でも……！"
1005805-20 = "……え、今の気分的に聞いてみただけ？何となくティラミスの気分に変わってきた？"
1005805-21 = "それは良かったです。用意した身としても嬉しい限りです。"
1005805-22 = "それでは、紅茶を淹れさせていただきますね。"
1005805-26 = "……。"
1005805-27 = "……？私は食べないのか、ですか？"
1005805-28 = "そうですね……私が主催したティータイムだというのに、私だけ食べないというのもおかしな話ですよね。"
1005805-29 = "ですが、その……。"
1005805-33 = "[ns] \"悩み事があるなら聞くよ？\""
1005805-37 = "……これは私の悪い癖でもあるのですが、思い悩んだ時に、よくティータイムを開くようにしているのです。"
1005805-38 = "和やかな雰囲気の場を提供すれば、私だけでなく皆さんも心を開いて話してくださることが多いので……。"
1005805-39 = "ただ、こうしてティータイムに……何と言いますか、先生を巻き込んでしまって良いものなのかと……。"
1005805-40 = "[s3] \"これだけもてなされたうえに、ミネの悩みを打ち明けてもらえるなんて……。\"\n[s4] \"むしろ嬉しいくらいだよ。\""
1005805-43 = "ありがとうございます。それなら……お話してもよろしいでしょうか？"
1005805-44 = "私が悩んでいるのは……"
1005805-45 = "……。"
1005805-56 = "他でもない、先生のことです。"
1005805-60 = "[ns] \"……私？\""
1005805-61 = "理由は分からないのですが、先生のことを思うと……。"
1005805-62 = "何だか心が乱れます。"
1005805-63 = "[s5] \"えっと……？\"\n[s6] \"意外な方面で驚いたというか、嬉しいというか……。\""
1005805-66 = "どうして先生のことを考えると、心が乱れるのでしょうか。"
1005805-67 = "その原因が知りたくて、先生をお招きしようと思った次第です。"
1005805-68 = "私としては、こう推察しています。"
1005805-69 = "先生がこちらにお越しになってから、キヴォトスでは以前にもまして事故や事件が絶えなくなったからではないか……と。"
1005805-73 = "[ns] \"な、なるほど……？\""
1005805-74 = "可能であれば、誰も傷付かない平和なキヴォトスが理想ですよね。"
1005805-75 = "なので、それを実現するためにはどうすれば良いのか考えたのです。"
1005805-76 = "先生が意図的に事件を引き起こすような方ではないと分かってはいるのですが、これだけ多くの事件が起こっているということは――"
1005805-77 = "[s] \"あ、あの……ミ、ミネさん？\""
1005805-78 = "先生の身柄を拘束すれば、全てが解決するのではないかと！"
1005805-79 = "[s7] \"待って！！？！？\"\n[s8] \"冤罪です！！\""
1005805-82 = "大丈夫です、先生！救護騎士団は、いつでも先生を温かく迎え入れる準備ができております！"
1005805-83 = "政治的な紛争に巻き込まれることもなければ、他の部活や団体が介入することもありません！"
1005805-84 = "何しろ、私たちはいついかなるときも「救護」を一番に重んじていますから！"
1005805-85 = "[s] \"そういうことじゃなくてね！？\""
1005805-86 = "さあ、心も身体も私に委ねてください！"
1005805-87 = "私たちの全てを賭して、あらゆる事件から先生を開放して差し上げます！"
1005805-92 = "[ns] \"ストーーーーップ！！\""
1005805-94 = "……と、申し上げたいところですが……。"
1005805-95 = "世の中そう簡単に解決するようでしたら、誰も困ってはいませんよね。"
1005805-96 = "[s] \"わ、分かってくれた……？\""
1005805-97 = "はい……実のところ論じるまでもなく、最初から分かっておりました。"
1005805-98 = "先生の行動を制限して全てを解決できるようなら、私よりも前に沢山の方々が行っていたはず……。"
1005805-99 = "すでに事態は動き出しているということくらい、私にも分かりますので。"
1005805-100 = "そして、これは私の直感ではありますが……。"
1005805-101 = "……先生の行動に制限をかけてしまうと、さらに大きな問題に発展するという予感があるのです。"
1005805-102 = "[s] \"それじゃあ、今日のティータイムは……？\""
1005805-103 = "常日頃から先生には大変お世話になっていると、救護騎士団の皆さんから耳にしております。"
1005805-104 = "そこでお礼も兼ねておもてなしをしつつ、つい出来心が芽生えたといいますか……。"
1005805-105 = "[s9] \"ちょっと心臓に悪かったかな……。\"\n[s10] \"今日のミネは心配げな表情だったから、一安心だよ。\""
1005805-108 = "ふふっ。"
1005805-109 = "ですが、こうして他愛のない話に花を咲かせてこそ、ティータイムなのではないでしょうか？"
1005805-110 = "先生、改めて今日はお付き合いいただき、ありがとうございました。"
