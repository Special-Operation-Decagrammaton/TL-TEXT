[translation]
10002170-1 = "後日談その4;彼女が店主をする理由"
10002170-2 = "へいお待ちっ！"
10002170-4 = "わ～いっ！"
10002170-5 = "うちの自慢の看板メニュー「チーズ明太焼きそば」だ、味わって食べてくんな！"
10002170-6 = "ついでにお嬢ちゃんの感想なんかも貰えると嬉しいね。"
10002170-7 = "分かった！じゃあいっただっきま～す！"
10002170-10 = "モグモグ……。"
10002170-11 = "うん、美味しい～！"
10002170-12 = "おっ、良い食べっぷりだねお嬢ちゃん！"
10002170-13 = "それにしても驚いたよ、倒れてるところを見つけた時は熱中症か！？って思って焦ったけど……"
10002170-14 = "まさか空腹で倒れてたとは。まあ大ごとじゃなくて良かったが、いったいどんだけお腹が空いてたんだ？"
10002170-15 = "せっかくの夏の海だし、美味しい食べ物がたくさんあるだろうから、"
10002170-16 = "お腹を空かせて行こ～！って思ったんだけど……。"
10002170-17 = "あんまりにもお腹空かせすぎたのと、ここまで暑いと思わなくって……。"
10002170-18 = "でもおかげで生き返ったよ！ありがと、おじさん！"
10002170-19 = "いやいや、こっちもお礼を言いたいくらいさ。"
10002170-20 = "営業を再開する前に、自分の腕が鈍ってないかを確認できる良い機会になったからな。"
10002170-21 = "良い食べっぷりも見せてもらえたし、お嬢ちゃんの反応を見るに、今年の夏もうちは安泰みたいだしな！がっはっはっはっはっは！"
10002170-22 = "でもおじさんの料理、確かに美味しいんだけどー……。"
10002170-23 = "うん？"
10002170-24 = "うーん、何て言うんだろ……ちょっと無難というか、"
10002170-25 = "もうちょっと何か足せそうって言うか……！"
10002170-26 = "うん！せっかくの夏なんだし、もっと挑戦的になっても良いと思うの！"
10002170-27 = "ふむ、なるほど。挑戦か……一理あるな。"
10002170-28 = "あっ、そうだ！ちょうど給食部からもらってきた……この特製ソース！これをかけたら、もっと美味しくなるかも？"
10002170-29 = "ほう……かの有名なゲヘナ学園、そこの食事を預かる部活の特製ソースと聞いちゃあ、試してみるしかねぇな！"
10002170-30 = "どれ……じゃあ、ちょっとくれるかい？"
10002170-31 = "はい、どうぞ！"
10002170-34 = "うぉっ、こいつぁ真っ黒で、しかも光沢のあるソースだな……。"
10002170-35 = "これは何の匂いだ？黒ゴマか？"
10002170-36 = "まあ良いか、とりあえず味見を……。"
10002170-38 = "黒ゴマ？ジュリはこれ確か、マンゴーで作ったソースって言ってたけど……？"
10002170-39 = "え、マン――"
10002170-41 = "ごぼぁっ！！？！？"
10002170-46 = "あれ、おじさん……？"
10002170-48 = "ええっ、どうしたの！？おじさん！？大丈夫！？"
10002170-49 = "な、何で急に……！？"
10002170-50 = "はっ……！もしかして、この夏の暑さのせいで？こんな炎天下の中で、私のために料理を作ってくれたから……！？おじさぁん！！"
10002170-51 = "すみませ～ん、注文いいですか～？"
10002170-52 = "ああっ、よりにもよってこんなタイミングでお客さんが！"
10002170-53 = "ど、どうしよう……！"
10002170-56 = "……うん、決めた！確か先生も、お返しの精神は大事って言ってたし……！"
10002170-57 = "心配しないで、おじさん。おじさんの犠牲は無駄にはしないから！"
10002170-58 = "私が、このお店を守ってみせる！"
10002170-59 = "すみませーん、店員さーんいませんかー？"
10002170-61 = "はいはーい！今行くからちょっと待ってて～！"
