[translation]
10002170-1 = "Epílogo 4: O motivo dela ser a dona da loja"
10002170-2 = "Aqui está o seu pedido!"
10002170-4 = "Ebaaa!"
10002170-5 = "Este é o nosso famoso Yakisoba de Queijo com Mentaiko, aproveite!"
10002170-6 = "E se puder, adoraria saber o que você achou, mocinha."
10002170-7 = "Entendido! Então, vou começar a comer!"
10002170-10 = "Mastigando..."
10002170-11 = "Hum, que delícia!"
10002170-12 = "Ah, que belo apetite você tem, mocinha!"
10002170-13 = "Mas fiquei surpreso. Quando te encontrei desmaiada, fiquei preocupado achando que era insolação..."
10002170-14 = "Quem diria que você estava desmaiada de fome. Bem, ainda bem que não foi nada grave, mas quanta fome você estava?"
10002170-15 = "Já que é verão na praia e deve ter muita comida gostosa,"
10002170-16 = "eu pensei: 'Vou ficar com bastante fome antes de ir!' mas..."
10002170-17 = "Eu acabei ficando com fome demais e não achei que estaria tão quente assim..."
10002170-18 = "Mas graças a isso, me sinto revivida! Obrigada, tio!"
10002170-19 = "Não, não, eu é que deveria agradecer."
10002170-20 = "Foi uma ótima oportunidade para verificar se minhas habilidades não enferrujaram antes de reabrir a loja."
10002170-21 = "Vi que você comeu com gosto e, pela sua reação, parece que o nosso verão está garantido! Hahaha!"
10002170-22 = "Mas a comida do tio é realmente gostosa, só que..."
10002170-23 = "Hum?"
10002170-24 = "Bem, como posso dizer... é um pouco comum, talvez?"
10002170-25 = "Sinto que daria para adicionar algo a mais...!"
10002170-26 = "Isso! Já que é verão, acho que você poderia ser mais ousado!"
10002170-27 = "Hum, entendo. Ousadia, é? Você tem um ponto."
10002170-28 = "Ah, já sei! Acabei de ganhar do Clube de Merenda... este molho especial! Se colocar isso, talvez fique ainda mais gostoso?"
10002170-29 = "Ora... se é um molho especial do famoso Clube de Merenda da Academia Gehenna, então não tenho escolha a não ser experimentar!"
10002170-30 = "Muito bem... então, pode me dar um pouco?"
10002170-31 = "Sim, aqui está!"
10002170-34 = "Uau, esse molho é bem preto e brilhante..."
10002170-35 = "Que cheiro é esse? Gergelim preto?"
10002170-36 = "Bem, tanto faz, vou provar..."
10002170-38 = "Gergelim preto? A Juri disse que esse molho era feito de manga..."
10002170-39 = "Ei, man..."
10002170-41 = "Guhhh!!??!"
10002170-46 = "Ei, tio...?"
10002170-48 = "Ah não, o que houve!? Tio!? Você está bem!?"
10002170-49 = "Por, por que de repente...!?"
10002170-50 = "Ah...! Será que foi por causa do calor deste verão? Você cozinhou para mim debaixo desse sol escaldante...!? Tiooooo!!"
10002170-51 = "Com licença, posso fazer um pedido?"
10002170-52 = "Ah não, logo agora que um cliente chegou!"
10002170-53 = "O, o que eu faço...!"
10002170-56 = "...Certo, decidi! O Sensei disse que o espírito de retribuição é importante..."
10002170-57 = "Não se preocupe, tio. O seu sacrifício não será em vão!"
10002170-58 = "Eu vou proteger esta loja!"
10002170-59 = "Com licença, tem algum atendente aí?"
10002170-61 = "Já vou! Estou indo, espere um pouquinho!"
