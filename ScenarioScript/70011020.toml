[translation]#[Texto Final. - Filipe 08/07.]
70011020-1 = "A Melancolia de Misuzu Kanbara (2)"
70011020-2 = "Quanto vale isso?"
70011020-6 = "Hã……?"
70011020-7 = "Bem…… eu perguntei se você não tem amigos lá fora……"
70011020-8 = "Então. Se fizer isso, quanto vai ganhar?"
70011020-9 = "É difícil de entender…… fazer amigos não é por dinheiro……"
70011020-10 = "Então não serve pra nada."
70011020-11 = "Bem…… no mundo, há coisas que o dinheiro não compra……"
70011020-12 = "Ei."
70011020-13 = "'Dinheiro não compra'……? Ha."
70011020-14 = "Não desperdiça meu tempo com sua satisfação pessoal."
70011020-15 = "Ah, não é isso…… eu……"
70011020-17 = "Ei――"
70011020-19 = "Oi!"
70011020-20 = "Huff!?"
70011020-21 = "Você me chamou, não foi? Não dorme na minha frente."
70011020-22 = "Ah, desculpa…… estou um pouco cansada."
70011020-23 = "O quê, virou a noite?"
70011020-24 = "Bom, algo assim…… hehe."
70011020-25 = "……Sabe por que foi chamada?"
70011020-26 = "Ah, sim. Mais ou menos."
70011020-27 = "Não quero te pressionar. Só quero saber o motivo.#nHá algo na sua rotina que te incomoda?"
70011020-28 = "Nada."
70011020-29 = "Nada…… não é uma resposta ruim."
70011020-30 = "Mas também não é boa."
70011020-31 = "Vi seu registro, mas papel não conta tudo. Por que tentou fugir?"
70011020-32 = "……Não tem motivo."
70011020-33 = "Só achei que eu também podia."
70011020-34 = "Fugir……"
70011020-35 = "……E o que te fez pensar que podia?"
70011020-36 = "Bom, ouvi que sete pessoas já fugiram."
70011020-37 = "Lá fora chamam de 'Sete Prisioneiros'."
70011020-38 = "Então pensei que eu também."
70011020-39 = "Sete fugas…… é verdade."
70011020-40 = "Mas foram apenas sete."
70011020-41 = "Desde a fundação da Agência, não houve outras fugas além dessas.#nNaquela época, impedimos qualquer fuga adicional."
70011020-42 = "Ah, é? Diferente do que ouvi.#nAchei que a segurança da Agência fosse uma piada."
70011020-43 = "E a 'Raposa do Desastre' entrava e saía à vontade, né?"
70011020-44 = "……Wakamo, sim."
70011020-45 = "……"
70011020-46 = "Voltando ao assunto. Não estamos falando de Wakamo."
70011020-47 = "De qualquer forma, não restringimos a saída para causar sofrimento."
70011020-48 = "Como deve saber, há dois casos de internação: 'alunas que a escola desistiu de orientar' ou 'alunas sem matrícula'."
70011020-49 = "Em outras palavras, são casos que a escola considera perdidos."
70011020-50 = "Que descrição cruel."
70011020-51 = "Claro, os critérios variam por escola.#nAlgumas, como Gehenna, não enviam ninguém para a Correcional, outras descartam por um erro bobo."
70011020-52 = "Então, 'ter estado na Correcional' não é um grande obstáculo para o futuro."
70011020-53 = "É para me consolar?"
70011020-54 = "……Mais ou menos."
70011020-55 = "A Valkyrie é responsável pela segurança de Kivotos.#nNão podemos deixar casos problemáticos soltos."
70011020-56 = "Mas se houver arrependimento, sempre é possível a liberação."
70011020-57 = "A Correcional não é uma 'prisão'."
70011020-58 = "Não precisa fugir."
70011020-59 = "Tá, tá. Basta me arrepender."
70011020-63 = "Mais uma pergunta importante."
70011020-64 = "O que você pretendia fazer depois de fugir?"
70011020-65 = "Hã? Já disse que não tem motivo."
70011020-66 = "O motivo foi 'achei que dava'…… certo?#nEntão, depois de fugir, o que faria?"
70011020-67 = "Por que tanta insistência? Não precisa saber."
70011020-68 = "Precisa sim. A verdade só se sabe ouvindo da própria pessoa."
70011020-69 = "……Tá, vou falar! Mas!…… não ri, viu?"
70011020-73 = "……Hoje é meu aniversário."
70011020-74 = "Mas cheguei aqui faz pouco tempo. Não tenho amigos……"
70011020-75 = "Então pensei em ver uns amigos.#n……Não ia fugir de verdade, ia voltar!"
70011020-76 = "……Entendo."
70011020-77 = "Hunf, vocês não vão acreditar."
70011020-78 = "Me desculpo por ter passado essa impressão. Mas……"
70011020-84 = "――Desculpa, pode trazer aquilo?"
70011020-85 = "Sim, o que você deixou comigo?"
70011020-87 = "O que é isso?"
70011020-88 = "Queria ter dado num clima mais alegre… desculpa.#nE também――"
70011020-89 = "Feliz aniversário."
70011020-96 = "Ah…… hã……?"
70011020-97 = "É pouco, mas fiz um gorro de tricô.#nSeu cabelo loiro é bonito, pensei que um tom pastel combinaria. Usei fio rosa claro.#nEspero que goste."
70011020-98 = "Espera…… você sabia do meu aniversário? E ainda um presente……"
70011020-99 = "É um aniversário importante da sua vida, que não vai se repetir."
70011020-100 = "Passá-lo na Correcional deve ser doloroso.#n……Quis pelo menos amenizar."
70011020-101 = "Mas ainda é insuficiente."
70011020-102 = "Se não se importar…… pode me dar o contato de seus amigos?"
70011020-103 = "……Hã?"
70011020-104 = "Vou tentar organizar para que eles venham aqui e comemorem com você."
70011020-105 = "……Pode fazer isso?"
70011020-106 = "Como assim?"
70011020-107 = "Sou uma presa…… e ainda tentei fugir?"
70011020-108 = "A Correcional não é uma 'prisão'."
70011020-109 = "Portanto, você não é uma 'criminosa'."
70011020-111 = "Nossa, bom trabalho!"
70011020-112 = "É a diretora! Ela saiu da sala chorando!"
70011020-113 = "Fazer alguém chorar num dia tão feliz…… isso me dói."
70011020-114 = "Não, você não a maltratou."
70011020-115 = "Agora entendo por que tantas alunas mudam ao ver a diretora."
70011020-116 = "Mas…… isso é mérito delas.#nEu só converso ao lado."
70011020-117 = "Se o outro não quer conversar……"
70011020-118 = "Aliás, pessoas com pensamento desviante――"
70011020-119 = "……?"
70011020-120 = "Ah…… desculpa. Finja que não ouviu."
70011020-121 = "Obrigado pela manhã. Bom trabalho."
70011020-122 = "Que nada, é minha função! Pode chamar quando quiser!"
70011020-127 = "……Havia pessoas assim.#nParece que não viviam no mesmo mundo, com quem nenhuma palavra funcionava――"
70011020-129 = "――'prisioneiros'."
70011020-137 = "Agora, a nova diretora da Correcional, 'Misuzu Kanbara', vai falar.#nTodos, uma salva de palmas――"
70011020-141 = "Emergência! Internas fugiram!"
70011020-142 = "São 7!"
70011020-143 = "Fuga em massa!!"
70011020-145 = "(Foi exatamente no dia em que Misuzu assumiu a Correcional)"
70011020-146 = "(Naquele ano, o número de voluntários para a Correcional caiu 80%)"
70011020-147 = "A Melancolia de Misuzu Kanbara"