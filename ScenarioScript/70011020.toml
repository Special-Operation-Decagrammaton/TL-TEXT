[translation]
70011020-1 = "A Melancolia de Misaki Kangahara (2)"
70011020-2 = "Quanto isso vai render?"
70011020-6 = "Hã...?"
70011020-7 = "Bem... eu quis dizer 'você não tem amigos lá fora?'..."
70011020-8 = "É isso que eu disse. Se você fizer isso, quanto de lucro vai dar?"
70011020-9 = "É um pouco difícil de entender... Fazer amigos não é por causa de dinheiro..."
70011020-10 = "Então não serve para nada."
70011020-11 = "Bem... existem muitas coisas no mundo que o dinheiro não pode comprar..."
70011020-12 = "Ei."
70011020-13 = "'O dinheiro não pode comprar'... Hah."
70011020-14 = "Pode parar de desperdiçar meu tempo com a sua satisfação pessoal?"
70011020-15 = "Ah, n-não é isso... E-eu..."
70011020-17 = "Ei—"
70011020-19 = "Ei!"
70011020-20 = "Hafuh!?"
70011020-21 = "Foi você quem me chamou, não foi? Não durma na minha frente."
70011020-22 = "Ah, me desculpe... É que estou um pouco cansada."
70011020-23 = "O que houve, passou a noite em claro?"
70011020-24 = "Bem, algo parecido com isso... Ehehe."
70011020-25 = "...Mas enfim. Você sabe por que foi chamada aqui?"
70011020-26 = "Ah, sim. Mais ou menos."
70011020-27 = "Não quero te interrogar. Só quero saber o motivo. #nVocê está insatisfeita com a sua vida cotidiana?"
70011020-28 = "Nada em especial."
70011020-29 = "Nada em especial... Entendo. Não é uma resposta ruim."
70011020-30 = "Embora também não seja uma resposta boa."
70011020-31 = "Eu li o seu registro de vida, mas não consegui entender apenas pelo papel. Por que tentou fugir?"
70011020-32 = "...Não tem um motivo especial."
70011020-33 = "Eu só pensei que talvez eu também conseguisse."
70011020-34 = "Fugir, é..."
70011020-35 = "...Poderia me dizer qual é a base dessa sua confiança?"
70011020-36 = "Ora, dizem que sete pessoas já fugiram daqui antes, não é?"
70011020-37 = "Aqueles que chamam de 'Sete Prisioneiros' lá fora."
70011020-38 = "Então, pensei que eu também conseguiria."
70011020-39 = "A fuga de sete pessoas... isso é um fato."
70011020-40 = "No entanto, isso significa que apenas sete pessoas conseguiram escapar."
70011020-41 = "Desde a fundação do Departamento Correcional, nunca permitimos que ninguém além desses sete fugisse. #nMesmo naquela época, conseguimos impedir que mais fugas ocorressem."
70011020-42 = "Humm... É diferente do que eu ouvi. #nA segurança do Departamento Correcional não era uma bagunça?"
70011020-43 = "A 'Raposa da Calamidade' não entrava e saía quando bem entendia?"
70011020-44 = "...Você está falando da Wakamo."
70011020-45 = "..."
70011020-46 = "Voltemos ao assunto principal. Não estamos falando da Wakamo agora."
70011020-47 = "De qualquer forma, não restringimos as saídas porque queremos fazer vocês sofrerem."
70011020-48 = "Como você deve saber, existem dois casos para ser internado no Departamento Correcional: #n'Alunos que a escola desistiu de orientar' ou 'alunos cuja matrícula é desconhecida'."
70011020-49 = "Em outras palavras, são alunos problemáticos que as escolas não conseguem mais lidar."
70011020-50 = "Que jeito horrível de falar."
70011020-51 = "Claro, os critérios variam de escola para escola. #nComo a Gehenna recentemente, há escolas que não enviam ninguém para o Departamento Correcional, #nmas também há escolas que abandonam alunos por um erro trivial."
70011020-52 = "Portanto, o fato de 'ter estado no Departamento Correcional' não significa necessariamente que será um grande obstáculo para o seu futuro."
70011020-53 = "Isso é uma tentativa de me consolar...?"
70011020-54 = "...De certa forma."
70011020-55 = "A Escola de Polícia Valkyrie é a instituição responsável pela segurança de Kivotos. #nNão podemos deixar alunos problemáticos e imprevisíveis à solta."
70011020-56 = "Dito isso, se você se arrepender e mudar de atitude, a soltura é permitida a qualquer momento."
70011020-57 = "Afinal, o Departamento Correcional não é uma \"prisão\"."
70011020-58 = "Você não precisa se dar ao trabalho de tentar escapar."
70011020-59 = "Tá, tá, entendi. É só me arrepender, né?"
70011020-63 = "Mais uma coisa. Tenho uma pergunta importante."
70011020-64 = "Ao tentar escapar, o que você pretendia fazer?"
70011020-65 = "Hã? Eu já disse, não tem um motivo específico."
70011020-66 = "O motivo para decidir fugir foi \"porque achei que conseguiria\"... certo?#nEntão, se tivesse conseguido escapar, o que pretendia fazer depois?"
70011020-67 = "Por que você insiste tanto nisso? Não precisa perguntar, né?"
70011020-68 = "Não é bem assim. A verdade não pode ser conhecida até que a própria pessoa a diga."
70011020-69 = "…Tá bom, eu falo, satisfeito? Mas... não vai rir, hein?"
70011020-73 = "…Hoje é meu aniversário."
70011020-74 = "Mas é que eu acabei de chegar aqui. Não tenho nenhum amigo próximo..."
70011020-75 = "Então, eu só queria encontrar meus amigos por um instante...#nEu não queria fugir de verdade, pretendia voltar direitinho!"
70011020-76 = "…Entendo."
70011020-77 = "Humph, de qualquer jeito vocês não vão acreditar mesmo."
70011020-78 = "Sinto muito se fiz você pensar assim. Mas..."
70011020-84 = "— Com licença, poderia trazer aquele item?"
70011020-85 = "Sim, é aquele que guardamos há pouco, certo?"
70011020-87 = "O que é isso?"
70011020-88 = "Eu queria ter entregue em um clima mais ameno, se possível... sinto muito.#nE também..."
70011020-89 = "Feliz aniversário."
70011020-96 = "Ah... hã...?"
70011020-97 = "É algo simples, mas tricotei um gorro para você.#nComo seu cabelo loiro é lindo, achei que tons pastéis cairiam bem, então usei um fio rosa claro.#nEspero que goste."
70011020-98 = "Espera... você sabia que era meu aniversário? E ainda me deu um presente..."
70011020-99 = "Porque é um aniversário importante da sua época de estudante, que nunca mais voltará."
70011020-100 = "Passar um dia desses no Departamento Correcional deve ser muito doloroso.#nPensei que isso pudesse ser um pequeno consolo..."
70011020-101 = "Afinal, só isso não é o suficiente, não é?"
70011020-102 = "Se não for um incômodo... poderia me dar o contato dos seus amigos?"
70011020-103 = "…Hã?"
70011020-104 = "Vou tentar organizar para que eles venham aqui e possamos comemorar juntos."
70011020-105 = "…Pode fazer uma coisa dessas?"
70011020-106 = "Como assim...?"
70011020-107 = "Porque eu sou uma prisioneira... e ainda por cima tentei fugir, sabe?"
70011020-108 = "Ainda assim, o Departamento Correcional não é uma \"prisão\"."
70011020-109 = "Portanto, você não é uma \"criminosa\"."
70011020-111 = "Nossa, bom trabalho!"
70011020-112 = "Como esperado da diretora! Ela estava chorando muito quando saiu da sala, sabia?"
70011020-113 = "Fazer alguém chorar em um dia tão feliz... meu coração dói..."
70011020-114 = "Não, não, não é como se você tivesse intimidado ela."
70011020-115 = "Agora entendo por que dizem que tem tantas alunas que se redimiram depois de ver a diretora."
70011020-116 = "Dito isso... tudo isso é fruto do esforço delas mesmas.#nEu apenas estou ao lado delas para conversar."
70011020-117 = "Se a outra pessoa não tiver vontade de conversar..."
70011020-118 = "Para começar, com pessoas que possuem pensamentos desviantes..."
70011020-119 = "…?"
70011020-120 = "Ah... sinto muito. Por favor, esqueça o que acabei de dizer."
70011020-121 = "Obrigada por vir tão cedo. Bom trabalho."
70011020-122 = "Não, esse é o meu dever! Pode me chamar a qualquer momento!"
70011020-127 = "…Existiam pessoas assim.#nPessoas com quem nenhuma palavra funcionava, e que pareciam não viver no mesmo mundo que nós—"
70011020-129 = "—Os prisioneiros."
70011020-137 = "Vamos receber com uma salva de palmas a nova diretora do Departamento Correcional, Misuzu Mihara. #nTodos, uma grande salva de palmas para ela—"
70011020-141 = "É uma emergência! Os prisioneiros escaparam!!"
70011020-142 = "São sete deles!!"
70011020-143 = "É uma fuga em massa!!!"
70011020-145 = "(Foi exatamente nesse dia que Misuzu Mihara assumiu o cargo de diretora do Departamento Correcional)"
70011020-146 = "(E naquele ano, o número de candidatos para o Departamento Correcional caiu 80% em relação ao ano anterior)"
70011020-147 = "A Melancolia de Misuzu Mihara"
