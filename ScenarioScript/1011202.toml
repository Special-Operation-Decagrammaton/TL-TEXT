[translation]
1011202-1 = "no ônibus"

1011202-3 = "(Tenho que ir direto para o Millennium hoje)"

1011202-4 = "(Os ônibus parecem estar bastante lotados a esta hora do dia...)"

1011202-15 = "[ns] \"Ugh, tem muita gente...\""

1011202-19 = "(Se você for para trás...)"

1011202-24 = "Hein, mestre?"

1011202-25 = "[s] \"Essa voz...\""

1011202-28 = "Uau, você realmente é meu mestre!"

1011202-29 = "[s1] \"Bom dia, Asuna.\"\n[s2] \"Você está de uniforme hoje!\""

1011202-32 = "Sim, porque as atividades do clube estão encerradas!"

1011202-36 = "Não é revigorante ver meu uniforme?"

1011202-37 = "[s] \"Isso é raro.\""

1011202-41 = "Hehe, o que você acha? #nCombina com você?"

1011202-46 = "...Mestre?"

1011202-47 = "Huh, quem é essa pessoa... assustador..."

1011202-51 = "[ns3] \"Uh, sim. Combina com você, Asuna...!\"\n[ns4] \"A palavra \"mestre\" aqui é um pouco... \""

1011202-57 = "Ah, entendo."

1011202-58 = "Não sou mais empregada doméstica."

1011202-59 = "Então, devo ligar para você, professor?"

1011202-64 = "S-Sensei...?"

1011202-65 = "Não acredito que ele está deixando seus alunos o chamarem de \"mestre\"..."

1011202-69 = "[ns5] \"…….\"\n[ns6] (O mal-entendido se espalha...)"

1011202-77 = "Bem, aqui vai uma mensagem para nossos clientes."

1011202-82 = "O grampo contínuo que você verá em breve realizará um desvio inercial a uma velocidade crítica porque o diamante está empurrando."

1011202-83 = "[ns] \"Sim?\""

1011202-87 = "Por favor, segure-se nos corrimãos e esteja seguro."

1011202-91 = "Ahaha. #nSensei, é perigoso se você não agarrar!"

1011202-98 = "[ns] \"Uh, uau!?\""

1011202-105 = "Ei!"

1011202-111 = "Professor, você está bem?"

1011202-112 = "[s] \"De alguma forma...\""

1011202-113 = "Ahaha, foi divertido! #nTodo mundo vai e volta para a direita e para a esquerda!"

1011202-114 = "Me senti como se estivesse em uma montanha russa!"

1011202-115 = "[s] \"Se você se sente assim no ônibus, você está fora, certo?\""

1011202-119 = "[ns] \"…….\""

1011202-120 = "(Acabei massageando um ao outro no carro e cheguei bem perto de Asuna.)"

1011202-121 = "[ns] \"Asuna...Não é pequeno? Você está bem?\""

1011202-122 = "Hum?"

1011202-123 = "Não é pequeno?"

1011202-127 = "Hehehe, já faz um tempo que não nos vemos tão de perto!"

1011202-128 = "[s] \"Isso não parece certo...\""

1011202-132 = "[ns7] (move o corpo)\n[ns8] \"Hmph!\""

1011202-135 = "Ahaha!"

1011202-136 = "Que cara engraçada!"

1011202-137 = "[s] \"Estou trabalhando duro como professor de várias maneiras...\""

1011202-138 = "Eles cuidaram de você porque era pequeno?"

1011202-139 = "Na verdade, é mais fácil deixar o professor assumir o seu peso, não é?"

1011202-140 = "[s] \"Esse é o problema...\""

1011202-141 = "Hehe, eu posso ouvir seu batimento cardíaco! #nDokudoku é incrível!"

1011202-143 = "(Só assim, 10 minutos que pareceram 10 anos se passaram...)"

1011202-144 = "(desci no ponto de ônibus de destino)"

