[translation]
1004315-1 = "O que foi gravado foi a pureza"
1004315-4 = "（Cheguei ao local combinado com Wakamo exatamente no horário）"
1004315-8 = "Ufufu... Eu estava esperando por você, meu querido."
1004315-9 = "Finalmente, este momento para passarmos a sós..."
1004315-10 = "[s1] \"A praia é linda, não é?\"\n[s2] \"E é muito tranquila também.\""
1004315-13 = "Não podemos permitir que nada atrapalhe este momento precioso que passarei com você—"
1004315-14 = "Eu, Wakamo, já cuidei da limpeza com antecedência."
1004315-15 = "Não deve haver nem um inseto sequer nesta praia."
1004315-16 = "[s3] \"Err... sobre essa limpeza...\"\n[s4] \"Você quer dizer isso literalmente, né...?\""
1004315-19 = "Sim, limpeza."
1004315-20 = "Eu me livrei dos fragmentos de conchas espalhados pela areia e do lixo que a maré trouxe, mas..."
1004315-24 = "A-algum problema com a minha limpeza?"
1004315-25 = "[s] \"Não! Desculpe pelo mal-entendido! Fico feliz!\""
1004315-26 = "Ufufu, obrigada."
1004315-27 = "Valerá a pena ter limpado os delinquentes que estavam por perto também."
1004315-28 = "[s] \"Então não era um mal-entendido!?\""
1004315-29 = "Fique tranquilo."
1004315-30 = "Se houvesse um alvoroço, seria um incômodo para você. #nDepois de conversar bastante e pedir educadamente—"
1004315-31 = "Todos eles gentilmente cederam o local para nós."
1004315-32 = "[s] \"B-bem, ainda bem então.\""
1004315-33 = "Vamos, vamos aproveitar a praia a sós."
1004315-34 = "[s] \"O que vamos fazer?\""
1004315-35 = "Eu só queria poder caminhar pela praia com você..."
1004315-36 = "Ouvir o som das ondas e desfrutar de uma conversa casual, só isso..."
1004315-37 = "[s] \"Só isso é o suficiente?\""
1004315-38 = "Sim."
1004315-39 = "Pensei que você, que é tão ocupado, merecia passar um momento de paz."
1004315-40 = "Se você puder esquecer o cansaço do dia a dia enquanto caminhamos pela praia assim..."
1004315-41 = "E se eu puder ser sua companhia... então esta Wakamo será muito feliz."
1004315-42 = "[s] \"Entendo. Nesse caso...\""
1004315-44 = "（Caminhando pela praia com Wakamo）"
1004315-50 = "Ufufu, adoraria que este momento durasse para sempre."
1004315-51 = "[s5] \"Se o cotidiano de Wakamo se tornasse pacífico--\"\n[s6] \"Teríamos muito mais oportunidades de passar o tempo assim.\""
1004315-57 = "...Isso não é possível."
1004315-58 = "Para mim, o cotidiano sempre esteve longe de ser pacífico."
1004315-59 = "Além disso... eu não confio em mais ninguém."
1004315-60 = "Minha confiança e minha fé... pertencem apenas a você, Sensei."
1004315-61 = "[s] \"Por que você confia em mim?\""
1004315-62 = "...Porque, no instante em que vi você, meu coração foi roubado."
1004315-63 = "Fiquei confusa com meus próprios sentimentos."
1004315-64 = "Decidi não confiar em ninguém, então por que não conseguia tirar os olhos de você?"
1004315-65 = "...Então, decidi observar você de longe."
1004315-66 = "Para ver se você era realmente... alguém em quem eu pudesse confiar..."
1004315-67 = "Eu queria conhecer você melhor."
1004315-68 = "E, assim, descobri uma coisa."
1004315-69 = "Você é uma pessoa verdadeiramente boa."
1004315-70 = "Percebi que, a qualquer momento e em qualquer situação, você lida com as pessoas de forma sincera."
1004315-71 = "Por isso—decidi acreditar."
1004315-72 = "Que, se fosse você, certamente me entenderia."
1004315-73 = "...Isso responde à sua pergunta?"
1004315-74 = "Algum dia... eu contarei tudo a você. #nPor isso, por favor, agora..."
1004315-75 = "[s] \"Sim. Eu acredito em você.\""
1004315-76 = "Ufufu, obrigada. Eu sou realmente muito feliz por você ser o meu Sensei."
1004315-77 = "[s] \"Eu também fico feliz que a Wakamo seja minha aluna.\""
1004315-78 = "Ah... que palavras tão doces e sinceras...!"
1004315-79 = "A, a propósito..."
1004315-80 = "V, você também não gostaria de... entrar debaixo da sombrinha...?"
1004315-81 = "Não que eu tenha segundas intenções, mas..."
1004315-82 = "Estou preocupada que você acabe se queimando de sol..."
1004315-86 = "[ns] \"...Wakamo, você quer dividir o guarda-chuva, não é?\""
1004315-87 = "...V, você percebeu."
1004315-88 = "Como esperado de você... sinto vontade de me esconder num buraco...!"
1004315-89 = "Ah... n, não tenho como encarar você depois dessa!"
1004315-93 = "[ns7] \"Ei, Wakamo!?\"\n[ns8] \"Está tudo bem! Você pode ser sincera!\""
1004315-96 = "...!!"
1004315-97 = "V, você tem razão. Eu preciso ser sincera comigo mesma..."
1004315-98 = "Não posso continuar fugindo só por causa da vergonha..."
1004315-99 = "E, esta Wakamo não vai mais fugir!"
1004315-103 = "Ei!"
1004315-107 = "Ah, sentir o seu calor... é como um sonho."
1004315-108 = "...Foi a decisão certa não fugir."
1004315-113 = "A partir de hoje, esta sombrinha é o meu tesouro mais precioso."
1004315-114 = "Um guarda-chuva aberto no dia em que confirmamos nossos sentimentos. #nNão há prova de amor maior do que esta."
1004315-115 = "Vou gravar o meu nome e o seu no cabo."
1004315-116 = "Com isso, o amor dos dois será eterno—"
1004315-121 = "A, aquela pessoa ali, será que é...!?"
1004315-122 = "...Fomos interrompidos."
1004315-123 = "Mas não posso causar um alvoroço. Embora seja uma pena..."
1004315-124 = "Por hoje, vou me retirar por aqui."
1004315-128 = "[ns9] \"Nós vamos fugir juntos!\"\n[ns10] \"Afinal, a Wakamo é minha aluna.\""
1004315-131 = "Eu e o Sensei, juntos...?"
1004315-132 = "...Ah!"
1004315-133 = "Aquela brincadeira que não conseguimos terminar antes, \"Ahaha, tente me pegar~\", é isso!?"
1004315-134 = "[s] \"E, eu acho que não é bem isso...\""
1004315-135 = "Espere aí!"
1004315-142 = "Ufufu. Então, vamos fugir juntos."
1004315-143 = "—Até o fim de Kivotos♡"
1004315-145 = "(...E assim, desfrutei de uma fuga a sós com a Wakamo)"
