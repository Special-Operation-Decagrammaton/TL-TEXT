[translation]
1004315-1 = "刻まれたのは純情"
1004315-4 = "（時間通り、ワカモと約束した場所に到着した）"
1004315-8 = "うふふっ……お待ちしておりました、あなた様。"
1004315-9 = "ついに二人きりで過ごす、この時が……。"
1004315-10 = "[s1] \"きれいな浜辺だね。\"\n[s2] \"それに、とっても静か。\""
1004315-13 = "あなた様と過ごす大切な場に、邪魔が入ってはいけませんから――"
1004315-14 = "このワカモ、あらかじめ掃除を済ませておきました。"
1004315-15 = "浜辺には虫一匹いないはずです。"
1004315-16 = "[s3] \"えーっと……掃除っていうのは……。\"\n[s4] \"言葉通りの意味、だよね……？\""
1004315-19 = "ええ、掃除です。"
1004315-20 = "砂浜に散らばる貝殻の破片や、流れ着いていたゴミの処分をしていましたが……。"
1004315-24 = "な、なにか[ruby=わたくし]私[/ruby]の掃除に手抜かりが？"
1004315-25 = "[s] \"ううん！誤解してごめんね！嬉しいよ！\""
1004315-26 = "うふふっ、ありがとうございます。"
1004315-27 = "近くにいた不良のみなさんも掃除した甲斐がありました。"
1004315-28 = "[s] \"やっぱり誤解じゃない！？\""
1004315-29 = "ご安心ください。"
1004315-30 = "騒ぎとなれば、あなた様のご迷惑となりますから。#n言葉を尽くし、丁重にお願いをしたところ――"
1004315-31 = "皆さん、快くこの場を譲ってくださりました。"
1004315-32 = "[s] \"そ、それなら良かった。\""
1004315-33 = "さあ、早く二人きりの浜辺を楽しみましょう。"
1004315-34 = "[s] \"何して過ごそうか？\""
1004315-35 = "私はただ、あなた様と浜辺を歩ければ、と……。"
1004315-36 = "波の音を聞きながら、他愛もない会話を楽しめれば、それで……。"
1004315-37 = "[s] \"それだけでいいの？\""
1004315-38 = "ええ。"
1004315-39 = "ご多忙なあなた様にも、穏やかなひとときを過ごしてほしいと思ったのです。"
1004315-40 = "こうして浜辺を歩く間、日頃の疲れを忘れてもらえれば……。"
1004315-41 = "そして、そのお供ができれば……このワカモは幸せですから。"
1004315-42 = "[s] \"うん。それなら……。\""
1004315-44 = "（ワカモと一緒に浜辺を歩く）"
1004315-50 = "うふふっ、この時間が永遠に続けばいいのですが。"
1004315-51 = "[s5] \"ワカモの日常が平和になれば――\"\n[s6] \"こうやって過ごせる機会も、もっと増えるのに。\""
1004315-57 = "……それはできません。"
1004315-58 = "私にとって、日常は平穏からほど遠いものでした。"
1004315-59 = "それに……私は他の誰も信用しておりません。"
1004315-60 = "私の信用も信頼も……先生、あなた様一人のものです。"
1004315-61 = "[s] \"どうして私を信じるの？\""
1004315-62 = "……あなた様を一目見た瞬間、心を奪われてしまったからです。"
1004315-63 = "私は、自分自身の気持ちに戸惑いを覚えました。"
1004315-64 = "誰も信じないと決めたのに、どうしてあなた様からは目を離せないのかと。"
1004315-65 = "……それで、遠くからあなた様を見つめてみることにしたのです。"
1004315-66 = "本当に……信頼できるお方なのかどうか……。"
1004315-67 = "あなた様を、もっと知りたくて。"
1004315-68 = "そうして、分かったことがあります。"
1004315-69 = "あなた様は、本当に善きお方です。"
1004315-70 = "いつ、どんなときでも、相手と真摯に向き合う方だとわかりました。"
1004315-71 = "だから――信じることにしたのです。"
1004315-72 = "この方なら、きっと私を理解してくれると。"
1004315-73 = "……回答になっておりますでしょうか？"
1004315-74 = "いつか……私のすべてをお話いたします。#nですから、どうか今は……。"
1004315-75 = "[s] \"うん。信じるよ。\""
1004315-76 = "うふふっ、ありがとうございます。あなた様が先生で、私は本当に幸せです。"
1004315-77 = "[s] \"私も、ワカモが私の生徒で良かったと思ってるよ。\""
1004315-78 = "あぁっ……嘘偽りのない、なんて甘美なお言葉……！"
1004315-79 = "と、ところで……。"
1004315-80 = "あ、あなた様も……日傘の下に……入りませんか……？"
1004315-81 = "決して他意はありませんが……。"
1004315-82 = "あなた様が日焼けしてしまわないか、心配です……。"
1004315-86 = "[ns] \"……ワカモは、相合傘がしたいんだね？\""
1004315-87 = "……お、お気づきだったのですね。"
1004315-88 = "流石はあなた様……穴があったら入りたい気分です……っ！"
1004315-89 = "あぁ……こ、これでは合わせる顔がありません！"
1004315-93 = "[ns7] \"えっ、ワカモ！？\"\n[ns8] \"大丈夫！素直になっていいんだよ！\""
1004315-96 = "……！！"
1004315-97 = "お、おっしゃる通りですね。自分には素直にならなくては……。"
1004315-98 = "恥ずかしいからといって逃げていては……。"
1004315-99 = "こ、このワカモ、もう逃げません！"
1004315-103 = "えいっ！"
1004315-107 = "あぁ、あなた様の温もりが伝わってきて……まるで夢のよう。"
1004315-108 = "……逃げなくて、正解でした。"
1004315-113 = "今日よりこの日傘は私の大切な宝物です。"
1004315-114 = "互いの気持ちを確かめ合った、大切な日にさした傘。#n愛の印として、これ以上の物はありません。"
1004315-115 = "柄に、私とあなた様の名前を刻んでおきましょう。"
1004315-116 = "これで、二人の愛は永遠に――"
1004315-121 = "あ、あそこに居るのはまさか……！？"
1004315-122 = "……邪魔が入りましたね。"
1004315-123 = "ですが、騒ぎを起こすわけにはいきません。名残惜しいですが……。"
1004315-124 = "今日は、この辺りで失礼させていただきます。"
1004315-128 = "[ns9] \"逃げるときも一緒だよ！\"\n[ns10] \"ワカモは私の生徒なんだから。\""
1004315-131 = "私と先生が、一緒に……？"
1004315-132 = "……あぁ！"
1004315-133 = "この前やりそこねていた、「アハハ、ワタシを捕まえてごらん～」ですね！？"
1004315-134 = "[s] \"ちょ、ちょっと違うかも……。\""
1004315-135 = "待ちなさーい！"
1004315-142 = "うふふっ。では、一緒に逃げましょうか。"
1004315-143 = "――キヴォトスの[ruby=・]果[/ruby][ruby=・]て[/ruby]まで♡"
1004315-145 = "（……そうして、ワカモと二人だけの逃避行を楽しんだ）"
