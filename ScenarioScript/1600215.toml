[translation]
1600215-1 = "Óculos de formato peculiar"
1600215-2 = "（Kotori ficou preocupada e visitou o Millennium）"
1600215-3 = "Ah, Sensei!!"
1600215-7 = "Por que veio ao Millennium? É trabalho?"
1600215-8 = "Não é? Então por que..."
1600215-9 = "......Eh?"
1600215-10 = "Veio me ver?"
1600215-11 = "Bem... p-por que será?"
1600215-13 = "（Expliquei o motivo de ter vindo ver a Kotori）"
1600215-15 = "Ah..."
1600215-16 = "U-uh... entendo..."
1600215-17 = "D-desculpe... parece que acabei te dando trabalho."
1600215-18 = "Eu nunca imaginei que você viria até aqui por minha causa...#nEu deveria ter pensado melhor antes de falar."
1600215-19 = "Como pode ver, o conserto dos óculos terminou sem problemas.#nEstá tudo bem!"
1600215-20 = "Ah, não, será que não está \"tudo bem\"...?"
1600215-21 = "Eu fiz o Sensei vir até aqui à toa, na verdade, não é um problema?"
1600215-22 = "[s1] \"Está tudo bem, fico feliz só de ter confirmado que você está bem.\"\n[s2] \"Fico feliz em poder ver a Kotori depois de tanto tempo.\""
1600215-25 = "U-uh..."
1600215-26 = "Fico grata por dizer isso, mas..."
1600215-27 = "......Eh?"
1600215-28 = "Tem algo que você quer saber...?"
1600215-32 = "Algo que quer saber...!?"
1600215-33 = "O que é? Pode perguntar qualquer coisa!"
1600215-34 = "Eu, Toyomi Kotori, explicarei tudo!#nSe eu souber, responderei agora mesmo, se não, pesquisarei e te direi depois!!"
1600215-35 = "Como forma de agradecimento por ter vindo, por favor!#nDeixe-me responder às suas perguntas, Sensei!!"
1600215-36 = "[s3] \"Posso mesmo?\"\n[s4] \"Qualquer pergunta?\""
1600215-39 = "Sim, com certeza!!"
1600215-40 = "Pode perguntar qualquer coisa, sem reservas! Vamos, fique à vontade!!"
1600215-44 = "[ns] \"...Então...\""
1600215-48 = "[ns5] \"Esses óculos são especiais?\"\n[ns6] \"Você os usa com muito cuidado todos os dias, né.\""
1600215-51 = "Sim, sobre estes óculos! Eles são...!"
1600215-55 = "......Eh."
1600215-56 = "Bem, m-meus... meus óculos? Eles são... bem..."
1600215-61 = "A-ah...#nD-desculpe. Foi uma pergunta inesperada e minha mente deu um branco por um instante..."
1600215-62 = "Uuh... agora que penso nisso, acho que algo parecido aconteceu antes..."
1600215-63 = "Ah, ahaha... eu sinto que, toda vez que me perguntam algo sobre mim mesma,#neu acabo ficando assim..."
1600215-64 = "Au au au..."
1600215-65 = "......N-não. Não posso continuar assim!"
1600215-66 = "Preciso me recompor! Prometi ao Sensei que explicaria qualquer coisa!"
1600215-67 = "Cof, cof. Inspira, expira..."
1600215-68 = "[s7] \"S-se for difícil responder, não precisa...\"\n[s8] （Ela precisa até respirar fundo...）"
1600215-73 = "......Não, está tudo bem. Já me acalmei um pouco.#nEntão, como prometido, vou explicar!"
1600215-74 = "Embora não seja nada demais..."
1600215-76 = "Meus óculos têm um formato um pouco peculiar, não é?#nVeja, a parte abaixo do olho esquerdo."
1600215-77 = "Por causa desse formato, é difícil trocar as lentes."
1600215-78 = "Mas estes óculos possuem um efeito que óculos comuns não têm."
1600215-79 = "É por isso que eu os uso intencionalmente!"
1600215-80 = "Como você sabe, eu tenho o hábito de explicar muitas coisas.#nE, às vezes, essas explicações acabam ficando longas..."
1600215-81 = "Mas com estes óculos,#neu consigo atrair o olhar de quem está ouvindo, mesmo nessas horas."
1600215-82 = "É como um ponto de foco para chamar a atenção!#nNa verdade, é bem eficaz!"
1600215-83 = "[s9] \"Entendi!\"\n[s10] \"Até que é bem prático.\""
1600215-87 = "Hehe... você compreendeu, então."
1600215-88 = "Essas pequenas coisas são úteis para #nmanter a concentração e transmitir informações de forma fluida!"
1600215-89 = "……Mas talvez tenha sido eficaz demais, porque ultimamente, só de verem estes óculos, #ntodo mundo começa a fugir……"
1600215-90 = "[s11] （……Entendo）\n[s12] \"Então eles se tornaram parte da sua identidade.\""
1600215-93 = "Sim. Ah, mas para quem eu conheço pela primeira vez, eles ainda têm o efeito original!"
1600215-94 = "……Na verdade, quando os óculos quebraram desta vez, #neu até pensei em voltar a usar óculos normais."
1600215-98 = "[ns13] \"……Kotori?\"\n[ns14] \"O que houve?\""
1600215-101 = "……Hehe."
1600215-102 = "Mas, no fim das contas, decidi continuar usando eles."
1600215-103 = "Porque estes óculos me trouxeram efeitos felizes que vão além das explicações!"
1600215-105 = "（Depois de conversar um pouco com a Kotori e fazer uma refeição leve, voltei para o Schale）"
