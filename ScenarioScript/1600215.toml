[translation]
1600215-1 = "変わった形のメガネ"
1600215-2 = "（コトリが心配になり、ミレニアムを訪ねた）"
1600215-3 = "あっ、先生！！"
1600215-7 = "どうしてミレニアムに？お仕事ですか？"
1600215-8 = "違うんですか？ならどうして……"
1600215-9 = "……え？"
1600215-10 = "私に、会いに？"
1600215-11 = "えっと……ど、どうしてでしょう？"
1600215-13 = "（コトリに会いにきた理由を説明した）"
1600215-15 = "あー……"
1600215-16 = "う、うーん……なるほど……"
1600215-17 = "す、すみません……気を遣わせてしまったみたいで。"
1600215-18 = "まさか私のためにここまで来てくださるとは思わず……#nもう少し考えて話すべきでしたね。"
1600215-19 = "ご覧の通り、メガネの修理は無事に終わりましたので。#nなんの問題もありません！"
1600215-20 = "あ、いえ、「なんの問題もない」わけではないんでしょうか……？"
1600215-21 = "先生に無駄足を踏ませてしまいましたし、むしろ問題しかないのでは……？"
1600215-22 = "[s1] \"大丈夫だよ、確認できただけでも嬉しいから。\"\n[s2] \"久しぶりにコトリと会えてよかった。\""
1600215-25 = "う、うぅ……"
1600215-26 = "そう言っていただけるのは、ありがたいのですが……"
1600215-27 = "……え？"
1600215-28 = "気になることがある……？"
1600215-32 = "気になること……！？"
1600215-33 = "なんでしょう！なんでも聞いてください！"
1600215-34 = "この[ruby=とよみ]豊見[/ruby]コトリが説明します！#n知ってることなら今すぐに、知らないことなら調べた後に！！"
1600215-35 = "来てくださったお礼という意味でも、是非！#n先生の質問に答えさせてください！！"
1600215-36 = "[s3] \"いいの？\"\n[s4] \"どんな質問でも？\""
1600215-39 = "はい、もちろんです！！"
1600215-40 = "本当になんでも大丈夫ですから！さあ、遠慮なくどうぞ！！"
1600215-44 = "[ns] \"……じゃあ……\""
1600215-48 = "[ns5] \"そのメガネは特別なものなの？\"\n[ns6] \"毎日大切に使っているよね。\""
1600215-51 = "はい、このメガネについてですね！これは……！"
1600215-55 = "……え。"
1600215-56 = "えと、わ、私の……私の、メガネですか？これは……その……"
1600215-61 = "あ、あれ……？#nす、すみません。予想外の質問で、一瞬頭が……"
1600215-62 = "うぅ……そ、そういえば前にも似たようなことがあったような……"
1600215-63 = "あは、あはは……わ、私ってなんだか、#n自分のことを質問される度に、こうなってる気がしますね……"
1600215-64 = "あうあうあう……"
1600215-65 = "……い、いえ。このままじゃダメです！"
1600215-66 = "しっかりしないと！なんでも説明する――そう先生に約束しましたので！"
1600215-67 = "コホン。すーはー、すーはー……"
1600215-68 = "[s7] \"こ、答えにくかったら大丈夫だよ……？\"\n[s8] （深呼吸するほどなんだ……）"
1600215-73 = "……いえ、大丈夫です。少し落ち着きましたから。#nでは約束通り、説明しましょう！"
1600215-74 = "とはいえ、大したことでもないのですが……"
1600215-76 = "私のメガネは少し変わった形をしていますよね？#nほら、左目の下の部分が。"
1600215-77 = "こういう形だから、レンズを新しくするのも難しくて。"
1600215-78 = "ですがこのメガネには、普通のメガネにはない効果があるんです。"
1600215-79 = "だからこそ、私が意図的にかけているのですから！"
1600215-80 = "ご存じの通り、私は色々と説明してしまう癖があります。#nそして、その説明は時々長くなってしまうことも……"
1600215-81 = "ですがこのメガネがあれば、#nそういう時でも聞いている方の視線を集められるんです。"
1600215-82 = "いわば、注目してもらうポイントみたいなものですね！#n実は結構、効果があるんですよ！"
1600215-83 = "[s9] \"なるほど！\"\n[s10] \"意外と実用的だったんだ。\""
1600215-87 = "ふっふっふ……わかってくださいましたか。"
1600215-88 = "こういう些細なことが、#n集中力の維持と円滑な情報伝達に役立っているのです！"
1600215-89 = "……ですが効果がありすぎたのか、最近はこのメガネを見ただけで#nみんな逃げるようになってしまったんですよね……"
1600215-90 = "[s11] （……なるほど）\n[s12] \"アイデンティティになっているんだね。\""
1600215-93 = "はい。あっ、でも初めて会う方には、本来の効果がありますよ！"
1600215-94 = "……実は今回メガネが壊れた時、#nいっそのこと普通のメガネに戻そうかなとも思ったんです。"
1600215-98 = "[ns13] \"……コトリ？\"\n[ns14] \"どうしたの？\""
1600215-101 = "……えへへ。"
1600215-102 = "でもやっぱり、このままかけ続けることにしました。"
1600215-103 = "だってこのメガネは、説明以外でも嬉しい効果を発揮してくれましたから！"
1600215-105 = "（しばらくコトリと雑談をした後、軽く食事をしてシャーレに戻った）"
