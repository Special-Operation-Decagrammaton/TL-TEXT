102020-411 = "こちら、トリニティのセイア様にも繋いでいただければと……"
102020-413 = "クズノハの行方は……手がかりは見つかったのか？"
102020-414 = "にゃはは。#nちょ～っと、皆さんの前でお話するのは気が引ける話題でしてね～"
102020-415 = "はぁ……クズノハの行方を探せだなんて……もう驚きもしませんよ。"
102020-417 = "――結論から申し上げますと、クズノハという名の生徒は、この百鬼夜行に存在した事がありません。"
102020-418 = "[s] \"存在したことが無い……？\""
102020-420 = "やはり、か……想定はしていたが。"
102020-421 = "生徒名簿に登録された記録がありません。"
102020-422 = "ですが……大預言者クズノハという存在はいるといいますか……いた、といいますか～"
102020-423 = "……どういうことだ？"
102020-424 = "「クズノハ」は……都市伝説のような生徒でして～#n百鬼夜行の一部の生徒が、会ったことがあると口にするものの、実態がないのですね。"
102020-425 = "……！"
102020-426 = "ええ……まさか、百鬼夜行以外の生徒がその名を口にするとは思わなかったほどに……にゃははっ。"
102020-430 = "……一点だけ、クズノハの記録が残っています。"
102020-431 = "古今東西の民話や伝承が記録されている奇談集に、僅かな記載があるだけなので……信憑性は決して高くないですが――"
102020-432 = "構わない、どんな内容なんだ？"
102020-433 = "遠い昔、まだ「百鬼夜行連合学院」が、連合ではなく――#n各々が自治区を持ち互いに憎しみ合っていた戦乱の時代。"
102020-434 = "大預言者「クズノハ」が「百花繚乱」を設立し、百鬼夜行の紛争を調停したという逸話です。"
102020-435 = "「百花繚乱」……？"
102020-436 = "……ああ、百鬼夜行の均衡を保つために作られた組織、#n「百花繚乱紛争調停委員会」――調停者、か。"
102020-437 = "にゃはは。流石はトリニティのお嬢様、よくご存じで……"
102020-438 = "ええ、百花繚乱はそんな集団……調停者、均衡者といいますか……"
102020-439 = "たしかに、クズノハに会ったと主張する者は……みな「百花繚乱」の歴代委員長でした。"
102020-440 = "今もなお、百花繚乱の委員長は、クズノハと通じる権利を持っており、#n彼女から指示を受けている――などの噂もありますが……"
102020-441 = "百花繚乱だけが、クズノハの存在を信じているのです。"
102020-442 = "いえ、もしかすると……彼女たちしか、クズノハと会う事ができないのかもしれませんね……"
102020-443 = "いずれにせよ、都市伝説レベルの噂話でしかありませんが。"
102020-444 = "……私は、代々「百花繚乱」に語り継がれている伝承なのだと考えておりました。"
102020-445 = "目に見えない、秘密のお友達的な？"
102020-446 = "……ま、私たちが真実を知ることはないやろうね。問題となることも無いがゆえに、禁じる必要も無い。"
102020-450 = "……百花繚乱の委員長から聞くしか無い、か。"
102020-451 = "んー、それも難しいといいますか～……色々と事情がありましてね。"
102020-452 = "ええ……「百花繚乱」は廃部になる予定ですので。"
102020-453 = "……っ！！"
102020-454 = "ん？いやいや、まだ公的には廃部になっとらんよ～？"
102020-455 = "近いうちにそうなります――委員長と副委員長と連絡が取れないのですから。"
102020-456 = "委員会の活動が停止してからかなり経ちます。残された委員の意欲も低下し、辞めたいと声を上げる生徒もいるとのことですので。"
102020-457 = "あの二人に何があったのか気になるところですが……誰も行方を知らないようで……"
102020-458 = "百花繚乱はその実態把握が難しい集団ですので……申し訳ありません。"
102020-459 = "そうねぇ。百花繚乱の窮状が明るみに出たら、魑魅一座がどう出ることやら……#n一応秘密にはしてるんだけどねぇ～"
102020-460 = "まだ自治区の生徒には知られていませんが……時間の問題かと思います、ニヤ様。 "
