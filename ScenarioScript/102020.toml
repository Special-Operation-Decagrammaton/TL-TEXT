102020-465 = "ニヤ様……？"
102020-466 = "先生は、キヴォトスに現れた「色彩」という現象――#nソレに攻撃された生徒を助ける方法が欲しいのでしょう？"
102020-467 = "そうねぇ……大変な事だし、大事な生徒さんだもの。#nうんうん、分かりますわぁ～"
102020-468 = "私もそれには同意しますが……一体、どのように……？"
102020-469 = "おっほん。それはねぇ～"
