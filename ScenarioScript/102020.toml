102020-391 = "私たちの目標は、キヴォトスに到来した6つの塔「虚妄のサンクトゥム」を破壊すること――"
102020-392 = "同時に、各自治区の避難や防衛作戦を遂行する事です。"
102020-393 = "全ての作戦は「シャーレ」の[USERNAME]先生を中心に展開します。"
102020-394 = "全自治区の防衛及び避難状況の把握。そしてサンクトゥムの攻略……#n全て先生の方で確認していただかなくてはなりません。大丈夫でしょうか？"
102020-395 = "[s] \"うん、大丈夫。いけるよ。\""
102020-396 = "ひゃ～先生も忙しくなるねぇ。"
102020-397 = "で、ではみなさん……時計をキヴォトス標準時にご設定いただけますでしょうか？"
102020-399 = "「虚妄のサンクトゥム」、最終臨界点までの予想時間は、#n残り14日と23時間59分59秒……"
102020-401 = "これが私たちに残された時間ってことだね。"
102020-402 = "は、はい。よろしくお願いします……#nこの時間で――作戦を立て、攻略を終えねばなりません……"
