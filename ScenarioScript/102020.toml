102020-433 = "Há muito tempo, houve um período de guerra em que a “Hyakki Yagyo Union Academy” não era uma federação, mas cada uma tinha sua própria região autônoma e se odiava."

102020-434 = "É uma anedota que o grande profeta ``Kuzunoha'' estabeleceu ``Hyakka Ryouran'' e mediou a disputa entre Hyakki Yagyo."

102020-435 = "“Hyakka Ryouran”…?"

102020-436 = "...Ah, a organização criada para manter o equilíbrio de Hyakki Yagyo, #n ``Hyakka Ryouran Comitê de Mediação de Disputas'' -- um mediador, hein?"

102020-437 = "Nyahaha. Como esperado, conheço a jovem de Trinity..."

102020-438 = "Sim, Hyakka Ryouran é um desses grupos... você poderia chamá-lo de mediador, equilibrador..."

102020-439 = "Na verdade, as pessoas que afirmaram ter conhecido Kuzunoha... eram todos ex-presidentes do ``Hyakka Ryouran.''"

102020-440 = "Mesmo agora, há rumores de que o presidente Hyakka Ryouran tem o direito de se comunicar com Kuzunoha e receber instruções dela..."

102020-441 = "Apenas Hyakka Ryouran acredita na existência de Kuzunoha."

102020-442 = "Não, talvez... eles podem ser os únicos que podem conhecer Kuzunoha..."

102020-443 = "Em qualquer caso, nada mais é do que um boato ao nível de uma lenda urbana."

102020-444 = "...Achei que fosse uma tradição passada de geração em geração."

102020-445 = "Um amigo invisível e secreto?"

102020-446 = "...Bem, acho que nunca saberemos a verdade. Como não há problema, não há necessidade de proibi-lo."

102020-450 = "...Não tenho escolha senão ouvir o presidente do Comitê das Cem Flores."

102020-451 = "Hmm, você diria que isso também é difícil... Existem várias circunstâncias."

102020-452 = "Sim... ``Hyakka Ryoran'' está programado para ser descontinuado."

102020-453 = "...! !"

102020-454 = "sim? Não, o clube ainda não foi extinto oficialmente, não é?"

102020-455 = "Isso acontecerá num futuro próximo - já que não consigo entrar em contato com o presidente e o vice-presidente."

102020-456 = "Já faz muito tempo que as atividades do comitê cessaram. Os restantes membros do comité estão a ficar menos motivados e alguns estudantes estão até a expressar o seu desejo de desistir."

102020-457 = "Estou curioso para saber o que aconteceu com aqueles dois... mas ninguém parece saber onde eles estão..."

102020-458 = "Hyakka Ryouran é um grupo cuja situação real é difícil de compreender, por isso peço desculpas."

102020-459 = "deixe-me ver. Se a situação de Hyakka Ryouran vier à tona, eu me pergunto o que acontecerá com a Trupe Chimi... #nMas estou mantendo isso em segredo por enquanto."

102020-460 = "Ainda não é do conhecimento dos estudantes da região autônoma... Acho que é só uma questão de tempo, Niya-sama."

102020-461 = "deixe-me ver……"

102020-462 = "Em outras palavras, atualmente não há como encontrar Kuzunoha...?"

102020-463 = "Sim... infelizmente."

102020-464 = "...Mas talvez não haja outro jeito?"

102020-465 = "Niya-sama...?"

102020-466 = "A professora quer uma forma de ajudar os alunos que foram atacados pelo fenômeno chamado “cor” que apareceu nos Kivotos, certo?"

102020-467 = "Bem... é um grande negócio, e ele é um aluno importante. #nSim, eu entendo."

102020-468 = "Eu também concordo com isso... mas como...?"

102020-469 = "Opa. Não é isso ~"

102020-470 = "Eu tenho uma boa ideia... então por favor espere um pouco ♪ Nyahahaha."

102020-472 = "Próxima vez; Preparação da operação (1)"

