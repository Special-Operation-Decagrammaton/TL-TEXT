102020-422 = "No entanto…… digamos que a Grande Profetisa Kuzunoha exista…… ou melhor, que já tenha existido~"
102020-423 = "……Como assim?"
102020-424 = "A \"Kuzunoha\"…… é meio que uma lenda urbana por aqui~#nAlgumas alunas da Hyakkaryouran dizem já ter se encontrado com ela, mas não há provas concretas."
102020-425 = "……！"
102020-426 = "É…… eu nunca imaginei que uma aluna de fora da Hyakkaryouran mencionaria esse nome…… nyahaha."
102020-430 = "……Existe apenas um registro que menciona a Kuzunoha."
102020-431 = "É apenas uma breve menção em um livro de contos bizarros que reúne mitos e lendas de todas as épocas e lugares…… então a confiabilidade não é das melhores, mas――"
102020-432 = "Não tem problema. O que diz nele?"
102020-433 = "Em um passado distante, quando a \"Academia Unida Hyakkaryouran\" ainda não era uma união――#nEra uma época de caos e guerra onde cada facção tinha seu próprio território e todas se odiavam."
102020-434 = "A anedota conta que a Grande Profetisa \"Kuzunoha\" fundou a \"Hyakkaryouran\" e mediou os conflitos de toda a região."
102020-435 = "\"Hyakkaryouran\"……?"
102020-436 = "……Ah, a organização criada para manter o equilíbrio em Hyakkaryouran,#no \"Comitê de Mediação de Conflitos Hyakkaryouran\"――Os mediadores, não é."
102020-437 = "Nyahaha. Como esperado da senhorita de Trinity, você é muito bem informada……"
102020-438 = "Pois é, a Hyakkaryouran é esse tipo de grupo…… mediadores, pessoas que mantêm o equilíbrio, por assim dizer……"
102020-439 = "De fato, as únicas pessoas que já afirmaram ter se encontrado com a Kuzunoha…… foram todas Presidentes da \"Hyakkaryouran\"."
102020-440 = "Até hoje rolam boatos de que a Presidente da Hyakkaryouran tem o direito de se comunicar com a Kuzunoha,#ne de que ela recebe ordens diretamente dela――"
102020-441 = "Apenas a Hyakkaryouran acredita que a Kuzunoha realmente existe."
102020-442 = "Ou talvez…… seja o caso de apenas elas conseguirem se encontrar com a Kuzunoha……"
102020-443 = "De qualquer maneira, não passa de um boato a nível de lenda urbana."
102020-444 = "……Eu sempre acreditei que fosse só uma tradição passada de geração em geração na \"Hyakkaryouran\"."
102020-445 = "Tipo um amigo imaginário secreto?"
102020-446 = "……Bom, a gente nunca vai descobrir a verdade. Como isso não causa nenhum problema, não há motivo para proibi-las de acreditar."
102020-450 = "……Então a única forma de descobrir é perguntando para a Presidente da Hyakkaryouran, é isso?"
102020-451 = "Hm, digamos que isso também seja um tanto complicado~…… Temos nossas razões."
102020-452 = "É…… O Clube \"Hyakkaryouran\" está prestes a ser dissolvido."
102020-453 = "……っ！！"
102020-454 = "Hm? Não, não, oficialmente ele ainda não foi fechado, tá legal~?"
102020-455 = "Mas será em breve――não conseguimos entrar em contato nem com a Presidente nem com a Vice-Presidente."
102020-456 = "Já faz bastante tempo que as atividades do comitê pararam. O ânimo dos membros restantes caiu e dizem que já tem alunas pedindo para sair."
102020-457 = "Nós também estamos curiosas sobre o que aconteceu com aquelas duas…… mas parece que ninguém sabe o paradeiro delas……"
102020-458 = "O Comitê Hyakkaryouran é um grupo muito difícil de monitorar…… Sinto muito."
102020-459 = "Pois é. Se o estado deplorável em que a Hyakkaryouran se encontra vier à tona, sabe-se lá o que a Trupe Chimi faria……#nEstamos tentando manter isso em segredo~"
102020-460 = "As alunas do distrito ainda não sabem…… mas acredito que seja apenas uma questão de tempo, Senhorita Niya. "
102020-461 = "Tem razão……"
102020-462 = "Ou seja, na situação atual, não há nenhum meio de encontrar a Kuzunoha……?"
102020-463 = "É…… Infelizmente."
102020-464 = "……Mas, talvez não seja um beco totalmente sem saída~?"
102020-465 = "Senhorita Niya……?"
102020-466 = "O Sensei quer um meio de salvar as alunas atacadas……#npor esse fenômeno chamado \"Chroma\" que apareceu em Kivotos, não quer?"
102020-467 = "Faz sentido…… É uma crise e tanto, e elas são alunas preciosas.#nUhum, eu te entendo~"
102020-468 = "Eu concordo com você, mas…… como você pretende fazer isso……?"
102020-469 = "Aham. Sobre isso~"
102020-470 = "Eu tive uma ideia brilhante…… Só esperem um pouquinho, tá?♪ Nyahaha."
102020-472 = "Próximo episódio; Preparações para a Operação (1)"