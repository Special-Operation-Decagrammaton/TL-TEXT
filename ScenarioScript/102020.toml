[translation]
102020-1 = "第2話;作戦会議"
102020-4 = "はぁ……はぁ……。"
102020-5 = "いやぁ、ちょっと乱暴だったかなぁ……。"
102020-7 = "アビドス高等学校の駐輪場"
102020-8 = "ホシノ先輩……"
102020-9 = "でも、下手に加減したらこっちがやられる可能性だってあったからねぇ～#nこの子、かなり強かったし。"
102020-10 = "……。"
102020-11 = "でもおかしいなぁ。こんな子がいたなんて……おじさん全然知らなかったよ。"
102020-12 = "お名前は？"
102020-13 = "……シロコ[ruby=すなおおかみ]。砂狼シ[/ruby]ロコ。"
102020-14 = "へぇ……シロコちゃんっていうんだ。#nそれで、シロコちゃんはここで何をしてたんだい？"
102020-15 = "……。"
102020-16 = "ここさ、廃墟に見えるけど……一応アビドス分校――#nいや、アビドス本校なんだよ。"
102020-17 = "その制服……初めて見ました。"
102020-18 = "ね。それに、そんな薄着じゃ寒いよ。"
102020-20 = "えっと、シロコちゃんはどこの学園？"
102020-21 = "……分からない。"
102020-22 = "……？"
102020-23 = "気づいたら、ここにいた。#n名前以外……分からない……"
102020-24 = "そ、それって……もしかして記憶喪失！？#n最近流行ってるっていうアレ？おじさん、そういうのちょっと疎いんだよな～"
102020-25 = "では……シロコちゃんは、名前以外何も分からない、と……？#n通っている学園も、電話番号も、メールアドレスも……？"
102020-26 = "（こくり）"
102020-28 = "……。"
102020-29 = "……。"
102020-30 = "ほ、ホシノ先輩、どうしましょう？"
102020-31 = "ん～困ったねぇ。"
102020-33 = "とりあえず……なか入ろっか、シロコちゃん。"
102020-34 = "えっ！？い、一緒に行くんですか？"
102020-36 = "これ、巻いておきな～"
102020-39 = "マフラー……？"
102020-40 = "うん。無いよりはいいかなって。"
102020-41 = "どう？ちょっとはマシになったでしょ？"
102020-42 = "……うん。"
102020-44 = "あったかい。"
102020-47 = "先輩…… "
102020-48 = "シロコちゃんを探そう。#n――嫌な予感がする。"
102020-49 = "ですが……"
102020-50 = "おじさん、ちょっとシャーレの呼び出しはパスするね。#nノノミちゃんは先に行ってて。"
102020-51 = "……シロコちゃんがどこにいるのか、まだ分かっていませんよね。#n先輩一人で、一体どうやって探すんですか？"
102020-52 = "……。"
102020-53 = "彼女の時とは違うんですよ？#nシロコちゃんは遭難したわけじゃないんです。"
102020-54 = "――同じだよ。"
102020-56 = "今は――違いますよ。"
102020-57 = "……！！"
102020-65 = "いた！先輩たち、ここで何してるのよ！！"
102020-66 = "ホシノ先輩……一緒に、先生に会いに行きましょう。"
102020-67 = "……みんな。"
102020-68 = "先生が、きっと助けてくれますから。"
102020-70 = "……ホシノ先輩。"
102020-71 = "……。"
102020-72 = "……そうだね。 "
102020-73 = "先生が、助けてくれるよね……きっと……いつもみたいに。"
102020-74 = "だから、大丈夫だよね……そうだよね……？"
102020-78 = "……。"
102020-79 = "……。"
102020-83 = "……はい、きっと大丈夫です！"
102020-87 = "……。"
102020-88 = "各自治区から、続々と生徒が集まってきて……まもなくこちらに到着する予定です……。"
102020-89 = "……。"
102020-90 = "……先輩さぁ、連邦生徒会じゃなくてシャーレに居て大丈夫なの～？"
102020-91 = "……サンクトゥムタワーが破壊され、代行である私は不信任状態ですから。 "
102020-92 = "連邦生徒会は瓦解したも同然。#n他の室長を招集したところで、動いてくれるとは到底思えません。"
102020-93 = "今は、「シャーレ」が唯一の希望なのです。"
102020-94 = "……そう。#n分かったけどさぁ……後片付けが大変かもよ。 "
102020-96 = "……そうですね。"
102020-97 = "ですが……それは、この件が全て解決してから考える事です。"
102020-98 = "モモカ、アユム。その時まで、よろしくお願いしますね。"
102020-99 = "は、はい……！こ、こちらこそ……"
102020-100 = "う、なんかこれ、余計な事に首突っ込んじゃったような……。 "
102020-101 = "ま、でもリン先輩がそう言うのなら、ついていくよ。どこまでも、ね。"
102020-105 = "……。"
102020-107 = "ん、誰？"
102020-109 = "……[ruby=おにかた]鬼方[/ruby]カヨコさん。"
102020-110 = "一番乗りか……まあ、いいけど。"
102020-111 = "先に言っとくけど……私は専門家じゃないし、あまり役に立てないと思う。"
102020-112 = "……あなたを呼んだのは、連邦生徒会ではなくシャーレの先生です。"
102020-113 = "知ってる。だから来た。"
102020-121 = "来たわよ、代行！これは私たちの方で現状を分析したレポート。#n大した量じゃないけど――"
102020-122 = "ゲヘナ風紀委員会所属、[ruby=あまう]天雨[/ruby]アコです。#nシャーレの要請に応じるべく、ただいま到着しました。"
102020-124 = "ユウカさん、アコさん。"
102020-125 = "ところで、先生はどちらに？ "
102020-126 = "先生は現在、D.U.を守るべく席を外しております。#nまもなく帰還されるかと。"
102020-127 = "いま忙しいんだ、先生……"
102020-128 = "って、先生はカヨコさんまで呼んでいたんですか……！？"
102020-129 = "……まあ、そういうこと。"
102020-130 = "はぁ……"
102020-135 = "なるほど……この方々と手と手を取り合う事になるのですね♡"
102020-136 = "ん……？[ruby=うらわ]浦和[/ruby]ハナコ……？"
102020-137 = "ふふっ、お久しぶりですユウカさん。"
102020-138 = "アビドス高等学校代表、[ruby=おくそら]奥空[/ruby]アヤネです。#n先生の要請を受け、ただいまシャーレに到着しました！"
102020-139 = "あら、奥空さん……"
102020-140 = "あっ、あはは……ハナコさんもいらしたんですね……お元気でしたか？#n……その、"
102020-141 = "ええ、アヤネさん――事情は伺っております。"
102020-142 = "必ず、シロコさんを見つけ出しましょう。私も微力ながらお力添えします。"
102020-143 = "はい……ありがとうございます。"
102020-144 = "悲しんでいるだけでは、何も変わらないですから……#n今は、とにかく行動しなくちゃ……"
102020-145 = "……そうですね。私のお友達も、似たようなお話をよくしていました。"
102020-146 = "アヤネさんは、強い方ですね……私よりも、ずっと。"
102020-147 = "……い、いえ。#nその……私は……"
102020-148 = "もっと自信を持ってください。大丈夫、あなたは強い方です。"
102020-149 = "……。"
102020-154 = "えーっと、先生は今、D.U.全域に出現した正体不明の兵を相手に交戦中だよ。"
102020-155 = "そろそろ片付くみたい。一旦、こっちに戻ってくるって～"
102020-157 = "分かりました。先生が到着次第、すぐに会議室へ向かいましょう。"
102020-179 = "皆様お手元の資料をご覧ください。#nこちらが作戦計画書となります。"
102020-180 = "これほどの資料を、いつの間に……"
102020-181 = "ご自身も大変だったでしょうに……本当にお疲れ様でした、リン行政官。"
102020-182 = "今はリンで大丈夫です。#n行政官としての権限は停止されておりますので。"
102020-183 = "ああ、そうでしたね……失礼しました。"
102020-184 = "連邦生徒会長代行の権限は停止され、例の塔によってサンクトゥムタワーは倒壊――そして、今動けるのはシャーレだけ。"
102020-185 = "なるほど……。"
102020-186 = "連邦生徒会はサンクトゥムタワーに頼りすぎなんじゃないの？"
102020-187 = "……ノア、今から報告書を送るから確認しておいてちょうだい。あと――"
102020-188 = "わ、私たち対策委員会が入手した情報と相違ないか、確認します！"
102020-196 = "結論から申し上げますと、あの塔を2週間以内に破壊しなくてはなりません。"
102020-197 = "……。"
102020-198 = "現在、キヴォトスに出現した6つの塔。#nそれらを今から「虚妄のサンクトゥム」と命名します。"
102020-199 = "えーっと、つまり。あれは偽物のサンクトゥムタワーって事？#nまぁ、それならこの空の色も超高濃度エネルギー体のことも納得がいくけど……。"
102020-201 = "これを……2週間以内に破壊する、と……？"
102020-202 = "はい、そうです。"
102020-204 = "こちらは、セイアちゃん……いえ、ティーパーティーとシスターフッドが協力し、#n古書館から発見したデータです。"
102020-205 = "今まで、ティーパーティーとシスターフッドが力を合わせるだなんて、想像すらできなかったのですが……これも先生のお陰ですね。"
102020-207 = "此れは預言ではなく――私自身が体験したものであるがゆえに、断言しよう。"
102020-208 = "今起きている忌まわしい変化――其れは、「色彩」と呼ばれる存在が我々の世界に足を踏み入れたが故に引き起こされた現象だ。"
102020-210 = "――「色彩」に関しては、シスターフッドが所有している古書にも記録があります。"
102020-211 = "あれは――人々を「狂気」に陥れる光です。"
102020-213 = "「色彩」……？#n狂気に、陥る……？いったい何の話？"
102020-214 = "ユウカちゃん、信じ難いのは分かりますが……#nこれらは全て事実です。"
102020-215 = "ノア？"
102020-216 = "今、エンジニア部が例のタワーを分析してくれていまして……#nそこから人の精神を錯乱させる信号を感知しました。"
102020-218 = "どうやら、この光に触れると、人格と意識に変化が起こるようだね。#n一種の精神攻撃のようだけど――"
102020-219 = "だが、説明できない事が多すぎる。もっとデータがないと……"
102020-220 = "うん。私たちの持ってる装置では、信頼度は10%未満。#nあくまで仮説でしかない。"
102020-221 = "それで、ヴェリタスにデータ解析をお願いしたんだ。#n――でも、これでもまだ足りない。"
102020-222 = "こういう時こそ、別の観点からも解析すべきです！#nというわけで、トリニティ古書館の本を持ってきました！どこに置きましょう？"
102020-223 = "あ、そうです！このままでは読みづらいですし、全部バラしてスキャンしちゃいますか？電子化すれば持ち運びやすいですし、検索性も――"
102020-224 = "借り物なんだからそれはダメ。#nそれに、そんな事したらトリニティの図書委員長に殺されるよ……"
102020-226 = "これはまだ仮説の段階だけど――あの塔から感じるエネルギー……"
102020-227 = "このままいけば、約300時間後に臨界点に到達するよ。"
102020-228 = "放っておいたら――最終的にはキヴォトス全域にアレが広がるだろうね。"
102020-229 = "カフェインが……足りない……"
102020-230 = "妖怪MAX、あと10箱くらい注文しますか？"
102020-232 = "これは――以前、私が先生に告げた予知夢そのものだ。"
102020-233 = "天から巨大な塔が飛来し、虚空が緋色に染められ――"
102020-234 = "不吉な塔は、まるで悲鳴を上げるように鳴動し……この世界を少しずつ削りとって……そうして、世界の破片を「何か」に被せていった。"
102020-236 = "（終末の預言……？）"
102020-237 = "（そっか……そう……#n　まあ、トリニティにもありそうだよね）"
102020-238 = "……。 "
102020-239 = "約300時間――つまり、2週間後に「色彩」がキヴォトス全域に広がるのだとしたら、早期決戦をしなければなりませんね。"
102020-241 = "削られた世界の欠片が嵐のように吹き荒れる中で、黒い光が天から舞い降りて……世界が終焉に傾いていく……。 "
102020-242 = "そうして……キヴォトスのすべてが崩壊し―― "
102020-244 = "塵一つ残さずに、すべてが虚無へと消える。"
102020-246 = "[ns] \"それと、「色彩」に触れてしまった人を元に戻す方法も探さなきゃね。\""
102020-248 = "……。 "
102020-253 = "……そうだな。"
102020-254 = "私が口にできる事は殆ど無い……然し、或いは彼女なら――"
102020-255 = "百鬼夜行の大預言者、クズノハ。#n――彼女を探すべきかもしれない。"
102020-256 = "にゃはは～、クズノハ、ですか？"
102020-257 = "……。"
102020-259 = "いやぁ～ここでその名を聞くとは思わなかったというか。"
102020-260 = "ふむ……おおよそ状況は理解できました。#nカホが「連邦生徒会が、クズノハの事で話があるそうです」と言っていたのは、このことだったんですね。ふむむ……。"
102020-261 = "まあ、こちらは後ほど、二人で話しましょ、先生♪"
102020-262 = "ちょ～っと込み入った事情があるのですが……#nなにやら重要そうですし……ま、なんとかしてみましょう。"
102020-264 = "[ns] \"ありがとう、ニヤ。\""
102020-265 = "にゃはは、ではでは～"
102020-269 = "まとめますと、「虚妄のサンクトゥム」はこのままでは約2週間後に臨界点到達の見込みとなります。"
102020-270 = "そうなったら…… "
102020-271 = "世界は終焉を迎える……すべてが終わりですね。"
102020-273 = "それを防ぐために、「虚妄のサンクトゥム」を破壊する……"
102020-274 = "まぁなんとも、シンプルな話ですね。"
102020-275 = "そう――[ruby=・]2[/ruby][ruby=・   ・   ・   ・   ・]週間以内に[/ruby]、ね。"
102020-276 = "――「虚妄のサンクトゥム」は、計6か所存在します。"
102020-277 = "アビドス砂漠、D.U.近郊の遊園地、ミレニアム郊外の閉鎖地域、トリニティとゲヘナの境界付近、ミレニアム近郊の新しい都市――そして、D.U.の中心地点。"
102020-278 = "この中ですと、D.U.のエネルギー体が一番大きいので、#nまずは他の5つを破壊してからD.U.の塔を処理した方が良いかと……"
102020-279 = "でしたら良かったのですが――そう簡単なお話でもないみたいですよ。"
102020-281 = "ヒマリ先輩……！？ "
102020-282 = "ふふふっ、ええ――#nミレニアムの超天才病弱美少女ハッカー、満を持しての登場です♪"
102020-283 = "……天才？"
102020-284 = "病弱美少女……？"
102020-286 = "私たちは、ビッグシスターが残したデータを利用して「虚妄のサンクトゥム」にアクセスを試みたのですが……"
102020-287 = "「虚妄のサンクトゥム」を防衛している存在に阻まれました。#n――通常の戦力では到底太刀打ちできないようなものに。"
102020-288 = "トキ、データ収集はもう大丈夫。無理せず撤収して。"
102020-290 = "ぐっ……！ですが……"
102020-298 = "そして、面白いことに――"
102020-299 = "「虚妄のサンクトゥム」を守っている存在――あれらは今までキヴォトスに出現した、奇怪な現象の全てが凝縮されているのです。"
102020-300 = "デカグラマトンの預言者、トリニティの[ruby=ミメシス]複製[/ruby]、そして先日ミレニアムの廃墟で観測された「Divi:Sion」――"
102020-301 = "そう――"
102020-303 = "アビドス砂漠"
102020-305 = "デカグラマトン3番目の預言者――「ビナー」。"
102020-307 = "D.U.近郊の廃墟化した遊園地"
102020-310 = "スランピアに[ruby=ミメシス]複製[/ruby]されたアミューズドール――「シロ&クロ」。"
102020-312 = "トリニティとゲヘナの境界付近"
102020-314 = "「聖徒の交わり」――「ヒエロニムス」。"
102020-316 = "ミレニアム郊外の閉鎖地域"
102020-318 = "デカグラマトン4番目の預言者――「ケセド」。"
102020-320 = "ミレニアム近郊の都市"
102020-324 = "デカグラマトン8番目の預言者――「ホド」……"
102020-326 = "[ns] \"なるほど……そういう事なんだね。\""
102020-327 = "……先生は、彼らをご存知なのですね。"
102020-328 = "――それぞれの守護者を倒さなければ、#n「虚妄のサンクトゥム」を破壊する事はできません。"
102020-330 = "――まぁでも、要は、各地の守護者を倒せば万事解決なのよね？"
102020-331 = "そういう事ですね。#n時間も無いですから、すぐにでも準備を――#n6つのエリアを同時攻撃……連合作戦を想定して動きましょう。"
102020-332 = "そうだね、時間も限られてるし。"
102020-334 = "みんな一旦落ち着いてよ～#nやる気があるのは分かったけどさ～ちょっと話聞いて？"
102020-335 = "この作戦を進行するなら、各自治区の市民や生徒の避難先の確保、それと同時に自治区の治安維持もしなきゃいけなくなるんだよ。"
102020-336 = "ゲヘナ、百鬼夜行、レッドウィンター、山海経、トリニティ、D.U.……#n各地から襲撃の報告が寄せられてるからね。敵は守護者だけじゃないって事。"
102020-337 = "それについてはご心配なく。"
102020-339 = "各自治区の治安維持は私たちが対応いたします。#n――これこそが本来、私たちの務めですので。"
102020-340 = "異論はありませんよね、ミカさん、セイアさん？"
102020-341 = "あははっ♪ま、そんな感じで任せちゃってよ☆"
102020-342 = "今回はちゃーんと大人しく、ナギちゃんとセイアちゃんが言う通りに動くからさ。#nトリニティの方は心配しないで。"
102020-343 = "もちろん……先生が助けに来てくれるなら、それはそれで嬉しいんだけどね♪"
102020-344 = "私たちだけでも何とかなるよ。#n――だから任せて、先生。"
102020-345 = "ああ。未来はもう見えないが――"
102020-346 = "皆が手と手を取り合う事が肝要というのは承知しているよ。"
102020-348 = "ゲヘナ自治区の防衛は私たちに任せてくれ。"
102020-349 = "私たち風紀委員が、責任を持って生徒の避難と護衛を担当します。"
102020-351 = "私たちも加勢します。"
102020-352 = "救急医学部……！ "
102020-353 = "その方が、風紀委員長も安心して作戦に取り組めると思いますので。"
102020-354 = "……セナ部長、"
102020-355 = "ありがとうございます。"
102020-357 = "その代わり、チナツは救急医学部に帰ってきてください。"
102020-358 = "……！？#nそ、それは……！"
102020-359 = "……冗談です。"
102020-361 = "分かりました。では、私たちも準備いたします。"
102020-362 = "レッドウィンターの同志の事は、私たちに任せろ！"
102020-364 = "百鬼夜行自治区は、私たちにお任せを。"
102020-365 = "うん。任せて、先生～"
102020-366 = "修行部もいるよ～"
102020-368 = "みんなの避難と救護は、私たちお祭り運営委員会が担当します！ "
102020-369 = "はい！ちょうど社長が借りている建物もありますから！#nそこを避難所にするんですよね？"
102020-370 = "まるでお祭りみたいでワクワクしますね！"
102020-371 = "……あ、えっと……少し、不謹慎でしたね……すみません。"
102020-372 = "まぁ……たくさんの人をケアして、支援するわけだから……#n本質的には似てるの、かも……？"
102020-374 = "ここはぼく様たちに任せるのだ！"
102020-375 = "ええ。梅花園の子供たちや市民、生徒さんは#n私たちが責任をもって保護します……！"
102020-376 = "はい……！私も頑張ります！"
102020-378 = "避難場所や食糧が足りなくなったら、私たち玄武商会に言ってね。"
102020-379 = "こんな状況だもの玄龍門も黙ってないよ。#nキサキも何かしらしてくれるでしょ！"
