102020-386 = "ビッグシスターは、常に不測の事態に備えていました。#nそれこそ、偏執的と言えるほどに。"
102020-387 = "いつ来るかも分からない危機に備えて要塞都市を作り上げるほどの彼女の執念は、#n玉に瑕でもありましたが……ふふっ、役に立つ時もあるのですね。"
