[translation]
10027045-1 = "Episódio 4; Reunião Secreta"
10027045-8 = "Academia Red Winter - Estrada da Montanha"
10027045-9 = "Haa, haa...! O que é isso, afinal!?#nUrsos, coelhos e até drones...? De onde estão vindo esses ataques?"
10027045-14 = "[ns1] \"Atravessando a montanha~ cruzando o campo de neve~\"\n[ns2] \"Até onde~ será que temos que ir~\""
10027045-17 = "......Sensei, você parece estar bem tranquilo."
10027045-18 = "Hm? Suas mãos estão congelando? Você estava usando a música para disfarçar!?"
10027045-19 = "Você deveria ter me dito... aqui, pegue um aquecedor de mãos."
10027045-30 = "Eu já tenho o meu, então não se preocupe...#nA Red Winter é desse jeito, então sempre carrego um comigo porque é essencial para o frio..."
10027045-31 = "Haa... pelo menos não é no fundo das montanhas, mas...#npor que se reunir em um lugar tão remoto assim..."
10027045-32 = "Se elas têm tanta paixão assim, deveriam usar na \"Frente de Libertação do Conhecimento\"..."
10027045-39 = "Senpai Meru, consegui a nova edição!"
10027045-40 = "Isso não é aquele tipo de coisa que chamam de 'nova edição', mas na verdade é uma edição antiga?"
10027045-41 = "B-bem, olhando de um ponto de vista objetivo, talvez sim!#nMas para nós, é uma nova edição!"
10027045-42 = "......Já que é a primeira vez que vemos, dá no mesmo..."
10027045-43 = "Bem, é verdade... a entrada de novos conhecimentos enriquece a alma."
10027045-48 = "......"
10027045-49 = "Não, esquece.#nEsqueça o que eu disse agora."
10027045-55 = "Local do Evento Doujin"
10027045-57 = "[ns] \"É aqui... será?\""
10027045-58 = "Parece que sim.#nMas ainda assim..."
10027045-62 = "Não acredito... que um encontro presencial esteja acontecendo em um lugar tão remoto..."
10027045-63 = "Tem bastante estandes. Com muitos livros empilhados..."
10027045-64 = "[s] \"Todos estão lendo ou comprando livros em silêncio.\""
10027045-65 = "É verdade... aliás, essa atmosfera...#nEu já não vi isso em algum lugar antes...?"
10027045-69 = "[ns] \"Ah, Meru. Isso aqui, por acaso...?\""
10027045-70 = "Achou alguma coisa?#n...Espere um pouco... o que é isso?"
10027045-75 = "\"Luna: The Last\"!? Será que isso é...!?"
10027045-76 = "[s] \"Este livro tem 'Amostra' escrito nele.\""
10027045-77 = "Ah, entendi. É um exemplar de demonstração."
10027045-78 = "Ah... se quiser, pode dar uma olhada."
10027045-79 = "(Hm...? Essa interação... sinto um estranho déjà vu...!?)"
10027045-83 = "B-bem, de qualquer forma! Vamos ler isso.#nPode ser o volume final de \"Luna\" que estávamos procurando...!"
10027045-93 = "[ns] \"Ah... faz tempo que não lia uma história tão boa...\""
10027045-95 = "[ns3] \"As duas Lunas unindo forças,\"\n[ns4] \"lutar contra o inimigo final com 1 milhão de poder é de chorar...\""
10027045-98 = "Não, não, espere um pouco! Isso não está estranho!?"
10027045-99 = "\"Luna\" é um mangá shoujo... se formos usar as palavras da Momiji, deveria ser sobre vida, punk, bandas e filmes... não deveria ser esse o conteúdo!#nComo é que de repente virou uma batalha de esquadrão com fusões e sangue quente no clímax final!?"
10027045-100 = "[s] \"Mas foi uma boa história, não foi!?\""
10027045-101 = "B-bem, a estrutura da história e a disposição dos quadros foram impressionantes, mas..."
10027045-102 = "Mas dizer que este é o volume final de \"Luna\"... não está um pouco errado?#nNão tinha algo estranho com o desenvolvimento e a continuidade?"
10027045-103 = "[s5] \"Ué? Tem outro \"Luna\" aqui.\"\n[s6] \"Desta vez é... \"Finale of Luna\"?\""
10027045-110 = "(O volume final de \"Luna\"... não é apenas um!?)"
10027045-111 = "(Isso significa que, será que...?)"
10027045-117 = "Parece que também tem um exemplar de demonstração deste, vamos ler!"
10027045-129 = "[ns] \"Droga... as duas Lunas seguindo caminhos diferentes...\""
10027045-130 = "Não, não, não, espere um pouco! Não tem algo errado?"
10027045-131 = "Claro, desta vez o conteúdo era sobre vida, punk, bandas e filmes... mas \"Luna\" sempre construiu meticulosamente o desenvolvimento das duas se reconhecendo e se reconciliando, não foi!?"
10027045-132 = "Jogar tudo isso fora e terminar com uma separação assim, não é estranho!?"
10027045-133 = "[s] \"Mas foi uma história emocionante, não foi!?\""
10027045-134 = "Claro, eu entendo que a parte emocional e a composição foram maravilhosas, mas!"
10027045-135 = "Ainda assim, não sinto que este seja o volume final de \"Luna\"..."
10027045-139 = "[ns7] \"Meru, tem um 'Luna' aqui também...\"\n[ns8] \"O título é 'Lunaris', não é...?\""
10027045-146 = "(O volume final de 'Luna' exposto em cada estande... é tudo diferente?)"
10027045-147 = "(Não pode ser... eu queria acreditar que pelo menos isso não fosse verdade... mas isso é...)"
10027045-151 = "Ah, Sensei!#nNão leia sozinho! Vamos ler juntos!"
10027045-164 = "[ns] \"Ah... ninguém sabe o paradeiro das duas Lunas, mas...\""
10027045-165 = "...'Nossas vidas restantes começam agora', isso é um final...?"
10027045-166 = "Não, não, não, pelo menos eu não consigo aceitar isso! Termine direito!#nPor que o conteúdo mudou de repente para algo completamente diferente? O eixo temporal saltou do nada, e é só um monte de narração resolvendo coisas de um epílogo do epílogo do epílogo!"
10027045-167 = "[s] \"Mas a arte é muito boa, não é!?\""
10027045-168 = "Claro que eu sei que a arte é excelente, mas!"
10027045-169 = "Mas um mangá não é bom só porque a arte é bonita, certo?"
10027045-170 = "Isso é o mesmo que desenhar apenas as cenas que você quer desenhar!"
10027045-171 = "[s] \"Meru, tem um 'Luna' ali também...\""
10027045-172 = "Não, já chega, Sensei.#nEu já entendi o que são esses 'Luna' aqui e que tipo de lugar é este..."
10027045-178 = "Se quiserem, podem dar uma olhada! Peguem pelo menos um cartão postal gratuito!"
10027045-179 = "É a primeira vez que trazemos isso para um evento! ...Por favor, sintam-se à vontade para pegar e dar uma olhada!"
10027045-180 = "'G. Luna' é limitado a um exemplar por pessoa! Por favor, respeitem a fila!"
10027045-184 = "..."
10027045-185 = "Este é um evento de doujinshi.#nE não é apenas um evento qualquer... é um evento exclusivo de 'Luna'."
10027045-186 = "[s] \"Bem... eu não entendo nada do que a Meru-san está dizendo!\""
10027045-187 = "Bem, em outras palavras..."
10027045-196 = "[ns9] \"Entendi...! Os fãs de 'Luna'.\"\n[ns10] \"Estão distribuindo doujinshis de criação própria do volume final!\""
10027045-199 = "Isso. Tudo o que tem aqui são doujinshis de 'Luna'. E como só vejo volumes finais inventados, acho que eles devem estar fazendo um evento temático só sobre o volume final."
10027045-200 = "Desenvolvimentos inimagináveis, tramas que ignoram o cânone... ou até mesmo desenhar apenas a narração do epílogo... tudo isso é permitido porque é tudo 'criação de fãs'."
10027045-201 = "[s] \"Então é o volume final de 'Luna' que cada pessoa imaginou.\""
10027045-202 = "Sim, por isso não existe um conteúdo igual ao outro.#nPorque a interpretação de cada um está refletida aqui..."
10027045-203 = "...Embora pareça que, entre eles, existam coisas que são mais desejos e vontades do que interpretações..."
10027045-204 = "[s] \"Mas isso não é também a força motriz da criação?\""
10027045-205 = "Ugh. Por que você é tão perspicaz nessas horas?"
10027045-206 = "Hm? É porque você conseguiu sentir isso apenas lendo os doujinshis?"
10027045-207 = "O amor das pessoas aqui por 'Luna'... é, talvez seja isso."
10027045-208 = "Mas por que será que estão fazendo um evento assim..."
10027045-209 = "..."
10027045-216 = "No fim das contas... você chegou aqui. Meru-san."
10027045-221 = "Eh...?"
