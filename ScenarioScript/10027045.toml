[translation]
10027045-1 = "第4話;秘密会合"
10027045-8 = "レッドウィンター連邦学園・山道"
10027045-9 = "はあ、はあ……！一体何なの！？#n熊にウサギにドローンまで……！？一体どこから攻撃してきてんのよ？"
10027045-14 = "[ns1] \"山を越え～雪原を渡り～\"\n[ns2] \"一体～どこまで向かえばいいんだろう～\""
10027045-17 = "……先生は余裕がありそうね。"
10027045-18 = "ん？手が凍りそう？歌で誤魔化してたの！？"
10027045-19 = "言ってくれればよかったのに……はい、カイロ。"
10027045-30 = "私の分はあるから大丈夫……#nレッドウィンターはこんなんだし、防寒必須だから持ち歩いてるの……"
10027045-31 = "はあ……山奥じゃないのがせめてもの救いだけど、#nなんでこんな僻地に集まるんだろ……"
10027045-32 = "こんな情熱があるなら、むしろ「知識解放戦線」で……"
10027045-39 = "メル先輩、新刊が手に入りました！"
10027045-40 = "それ、新刊って書いて既刊って読むヤツじゃないの？"
10027045-41 = "きゃ、客観的に見たらそうかもしれませんけど！#n私たちにとっては新刊ですよ！"
10027045-42 = "……初めて見るという点では、同じですから……。"
10027045-43 = "まぁ、そうね……新しい知識の流入は、心を豊かにしてくれるし。"
10027045-48 = "……"
10027045-49 = "いや、何でもない。#n今のは忘れて。"
10027045-55 = "同人会場"
10027045-57 = "[ns] \"ここ……かな？\""
10027045-58 = "みたいだね。#nそれにしても……"
10027045-62 = "信じらんない……本当にこんな僻地でオフ会が開かれてるなんて……"
10027045-63 = "結構ブースがあるね。本がいっぱい積まれてて……"
10027045-64 = "[s] \"みんな静かに本を読んだり、買ったりしてるね。\""
10027045-65 = "そうね……というか、この雰囲気……#nどこかで見覚えがあるような……？"
10027045-69 = "[ns] \"あ、メル。これってもしかして……？\""
10027045-70 = "何か見つけた？#n……ちょっと待って……これって？"
10027045-75 = "『ルナTheLast』！？もしかしてこれが……！？"
10027045-76 = "[s] \"この本には「Sample」って書いてあるね。\""
10027045-77 = "あ、そうか。これは見本誌なんだ。"
10027045-78 = "あ……よかったらお手にとってみてください。"
10027045-79 = "（ん……？なんかこのやり取り……妙な既視感が……！？）"
10027045-83 = "と、とりあえず！これ、読んでみよう。#n私たちが探し回っていた『ルナ』の最終巻かもしれないし……！"
10027045-93 = "[ns] \"ああ……久しぶりにいい話を読んだ……。\""
10027045-95 = "[ns3] \"二人のルナが力を合わせて、\"\n[ns4] \"100万パワーで最後の敵と戦う光景は涙なしでは……。\""
10027045-98 = "いやいや、ちょっと待って！それ何かおかしくない！？"
10027045-99 = "『ルナ』は少女漫画系の……モミジの言葉を借りたら、人生とパンクとバンドと映画……そういう内容のはずなんだけど！？#nどうやったら戦隊と合体と熱血で最後のクライマックスに急発進しちゃうのさ！？"
10027045-100 = "[s] \"でもいい話だったよ！？\""
10027045-101 = "た、たしかに話の構成やコマ割りなんかは印象的だったけど……"
10027045-102 = "でも、これが『ルナ』の最終巻っていうのは……ちょっと違うんじゃない？#n何か伏線とか連続性とか色々おかしくなかった？"
10027045-103 = "[s5] \"あれ？ここにも『ルナ』がある。\"\n[s6] \"今回は……『フィナーレ・オブ・ルナ』？\""
10027045-110 = "（『ルナ』の最終巻は……ひとつじゃない！？）"
10027045-111 = "（ということは、まさか……？）"
10027045-117 = "これにも見本誌があるみたいだし、読んでみよっか！"
10027045-129 = "[ns] \"くっ……2人のルナがそれぞれの道に進むなんて……。\""
10027045-130 = "いやいやいや、ちょっと待って！何かおかしくない？"
10027045-131 = "もちろん、今回はちゃんと人生とパンクとバンドと映画……そういう内容ではあったけど！でも『ルナ』は今まで2人がお互いを認め合って和解していく伏線を緻密に張ってきたよね！？"
10027045-132 = "その伏線を全部放り投げて、こんな離別エンドっておかしくない！？"
10027045-133 = "[s] \"でも切ない話だったよ！？\""
10027045-134 = "もちろん感情線とか構図とか、そういう部分が素晴らしかったのは分かるけどさぁ！"
10027045-135 = "でもこれが『ルナ』の最終巻ではないような……。"
10027045-139 = "[ns7] \"メル、ここにも『ルナ』があるんだけど……。\"\n[ns8] \"「ルナリス」というタイトルだね……？\""
10027045-146 = "（それぞれのブースに展示されている『ルナ』の最終巻が……全部違う？）"
10027045-147 = "（まさか……それだけは違うと思いたかったけど……これって……）"
10027045-151 = "あっ、先生！#n一人で先に読まないで！一緒に読もう！"
10027045-164 = "[ns] \"ああ……2人のルナの行方は誰も知らないけど……。\""
10027045-165 = "……「残された私たちの人生はこれからだ」、エンディング……だと？"
10027045-166 = "いやいやいや、少なくとも私は納得できないよ！ちゃんと終わらせてよ！#n何で急に全く違う内容で展開してるの！いきなり時間軸が飛んで、後日談の後日談の後日談……みたいなナレーション回収ばっかじゃない！"
10027045-167 = "[s] \"でも、作画はとても良いよ！？\""
10027045-168 = "もちろん作画が優れているのは分かってるけど！"
10027045-169 = "でも漫画って作画が綺麗だから良いってものじゃないでしょう？"
10027045-170 = "こんなの、自分が描きたいシーンだけ描いてるのと同じじゃない！"
10027045-171 = "[s] \"メル、あそこにも『ルナ』が……。\""
10027045-172 = "いや、もういいよ先生。#nここにある『ルナ』が何なのかも、この場所がどういう場所なのかも分かったから……"
10027045-178 = "よかったら見ていってください！無配のポストカードだけでもどうぞ！"
10027045-179 = "イベント初出しです！……よかったら手にとって御覧ください！"
10027045-180 = "『G.ルナ』はお一人様1冊までです！順番を守ってください！"
10027045-184 = "……。"
10027045-185 = "ここは同人即売会なんだ。#nそれもただの即売会じゃなくて……『ルナ』オンリーの。"
10027045-186 = "[s] \"えっと……メルさんが何を言っているのか、全く分かりません！\""
10027045-187 = "えっと、つまり……"
10027045-196 = "[ns9] \"なるほど……！『ルナ』のファンが。\"\n[ns10] \"最終巻の二次創作同人誌を頒布しているんだね！\""
10027045-199 = "そう。ここにあるのは全部『ルナ』の同人誌。その中でも捏造最終巻しか見当たらないから、最終巻プチオンリーとかでも開いてるんじゃないかな。"
10027045-200 = "想像を絶する展開も、伏線を無視した展開も……突然エピローグのナレーションだけを描いても許されるのは……全部「二次創作」だからだよ。"
10027045-201 = "[s] \"個々人が想像した『ルナ』の最終巻なんだね。\""
10027045-202 = "うん、だから一つとして同じ内容がないんだ。#nそれぞれの解釈が反映されているから……"
10027045-203 = "……中には解釈というか、願望や欲望を形にしたものとかもあるみたいだけど……"
10027045-204 = "[s] \"でもそういうのって、創作の原動力でもあるんじゃない？\""
10027045-205 = "うっ。なんでこういう時だけ鋭いのさ。"
10027045-206 = "ん？読んできた同人誌から、その部分だけは伝わってきたから？"
10027045-207 = "ここにいる人達の『ルナ』に対する愛情……そうだね。"
10027045-208 = "でも、なんでこんなイベントをやってるんだろ……"
10027045-209 = "……。"
10027045-216 = "結局――ここにたどり着いたのですね。メルリーさん。"
10027045-221 = "え……？"
