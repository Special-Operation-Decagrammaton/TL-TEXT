[translation]
1014205-1 = "Delicious things are irresistible"
1014205-2 = "(I came to the sea with Nagusa again, but...)"
1014205-6 = "(The sun is just too strong today...)"
1014205-8 = "Ugh...\r\n"
1014205-9 = "At this rate... I feel like I'm going to melt.\r\n"
1014205-10 = "[s] \"Shall we head to the nearby shopping district?\""
1014205-11 = "Yeah. If we go there, there will be plenty of shade to rest in."
1014205-12 = "And there will probably be more people looking at us there than here."
1014205-13 = "[s1] \"Ooh...\"\r\n[s2] \"You mean you want to attract people's attention?\""
1014205-16 = "...I just want to clear up the misunderstanding."
1014205-17 = "There's no other meaning behind."
1014205-18 = "..."
1014205-19 = "I'm not lying, really."
1014205-20 = "So please, stop looking at me like that."
1014205-21 = "I might look cool, but I'm actually easily embarrassed.\r\n"
1014205-22 = "[ns] \"M-My apologies...\""
1014205-24 = "(After that, we visited the shopping district near the coast.)"
1014205-28 = "There are so many... interesting-looking shops here."
1014205-29 = "Over there is a shooting gallery... It looks like there are prizes for each score."
1014205-30 = "[s] \"If you did it, Nagusa, it seems like you could get the highest score, right?\""
1014205-31 = "I suppose so, but..."
1014205-32 = "Other people might enjoy it more."
1014205-37 = "Do you want to try it, Sensei?"
1014205-38 = "I'll teach you from right next to you."
1014205-39 = "[s] \"Yeah, I'm counting on you .\""
1014205-41 = "(After that, we visited the shopping district near the coast.)\r\n"
1014205-47 = "(However... all I got was the participation prize candy...)\r\n"
1014205-49 = "Fufu, that's a shame. With a little more luck, you might have gotten the prize one #ntier up."
1014205-50 = "[s] \"What was one tier above the participation prize?\""
1014205-51 = "Let's see..."
1014205-52 = "It says... \"1 Skewer Exchange Ticket\""
1014205-53 = "And the one above that is \"Skewer Set Exchange Ticket\"..."
1014205-54 = "..."
1014205-55 = "Sensei. Let's do it one more time. #nI'll support you."
1014205-56 = "[s] \"Aren't your personal feelings getting a bit mixed up in this!?\""
1014205-61 = "...Just kidding."
1014205-62 = "Actually... I'm aware of it. #nThat I eat too much yakitori."
1014205-63 = "That's why I've been holding back."
1014205-64 = "[s] \"So, how many skewers do you eat a week?\""
1014205-65 = "Th-That's..."
1014205-66 = "...A secret."
1014205-67 = "A-Anyway, let's go somewhere else. If I stay here, I feel like I'll give in to#ntemptation."
1014205-76 = "(And of all places, the place we ended up coming to was...)\r\n"
1014205-81 = "Welcome! How about some yakitori~!\r\n"
1014205-85 = "……。\r\n\r\n"
1014205-86 = "[s3] \"...\"\r\n[s4] \"You didn't come here on purpose, did you?\""
1014205-89 = "Just a coincidence..."
1014205-90 = "It's true. Believe me."
1014205-91 = "[s5] \"...\"\r\n[s6] \"Do you want to eat one?\""
1014205-94 = "..."
1014205-95 = "...No, I'm fine.\r\n"
1014205-96 = "[s] \"Your face says you actually want me to buy it! \""
1014205-97 = "U-Uuugh..."
1014205-98 = "……Fine. It would be rude to turn down your kindness, Sensei."
1014205-99 = "I'll have one skewer of yakitori, please."
1014205-100 = "With salt."
1014205-101 = "It's hot out, so I was just craving something salty."
1014205-102 = "[s] \"You've been sweating, after all.\""
1014205-106 = "[ns] \"Excuse me, one yakitori with salt, please!\""
1014205-108 = "Coming right up! Wait just a moment!"
1014205-111 = "(After a little while...)"
1014205-113 = "Here you go! Sorry for the wait~\r\n"
1014205-118 = "Well then..."
1014205-123 = "[ns] \"Is it good?\""
1014205-124 = "...It's a magnificent balance.\r\n"
1014205-125 = "The texture of the meat and green onions is exquisite."
1014205-126 = "It's fragrant, and the saltiness is just right."
1014205-127 = "Such a rich flavor in a single bite..."
1014205-128 = "I think I'll come back to buy more."
1014205-129 = "[s] \"Just listening to you makes me hungry.\""
1014205-130 = "Do you want to try some too, Sensei?"
1014205-136 = "...Ah.\r\n"
1014205-137 = "I-I haven't touched this side with my mouth... not that it means anything.\r\n\r\n"
1014205-138 = "[s] \"Yeah, thanks. I'll take your word for it.\""
1014205-139 = "S-Sensei...!\r\n\r\n"
1014205-141 = "(After that, I had a fun time walking through the shopping district with Nagusa.)"