[translation]
1014205-1 = "おいしいものは制御不能"
1014205-2 = "（またナグサと海に来たけど……）"
1014205-6 = "（今日に限って日差しが強すぎる……）"
1014205-8 = "ううっ……。\r\n"
1014205-9 = "このままだと……溶けてしまいそう。\r\n"
1014205-10 = "[s] \"近くの商店街へ行こうか。\""
1014205-11 = "うん。それなら、あちこち日陰があって休めるね。"
1014205-12 = "私たちを見てくれる人も、ここよりは多いだろうから。"
1014205-13 = "[s1] \"おおー……。\"\r\n[s2] \"人の視線を集めたいってこと？\""
1014205-16 = "……私は誤解を解きたいだけ。"
1014205-17 = "それ以外の意味はないから。"
1014205-18 = "……。"
1014205-19 = "嘘じゃないよ、ほんとに。"
1014205-20 = "だから、そんな顔で見るのはやめて。"
1014205-21 = "クールに見えるけど、実は恥ずかしがり屋なんだから。\r\n"
1014205-22 = "[ns] \"し、失礼しました……。\""
1014205-24 = "（その後、海岸近くの商店街を訪れた）"
1014205-28 = "なんだか……楽しそうなお店がたくさんあるね。"
1014205-29 = "あっちは射的……得点ごとに景品があるみたい。"
1014205-30 = "[s] \"ナグサがやったら、最高点を取れそうだね？\""
1014205-31 = "そうだろうけど……。"
1014205-32 = "他の人の方が楽しめるかも。"
1014205-37 = "先生、やってみる？"
1014205-38 = "隣で教えてあげるから。"
1014205-39 = "[s] \"うん、よろしくお願いします。\""
1014205-41 = "（その後、ナグサによる指導のもと水鉄砲射撃を始めた）\r\n"
1014205-47 = "（しかし……もらえたのは参加賞の飴だけだった……）\r\n"
1014205-49 = "ふふっ、残念。運が良ければ、1つ上の賞も取れそうだったけど。"
1014205-50 = "[s] \"参加賞の1つ上って何だった？\""
1014205-51 = "えっと……。"
1014205-52 = "「串焼き1本引換券」……って書いてある。"
1014205-53 = "さらに上は「串焼きセット引換券」……。"
1014205-54 = "……。"
1014205-55 = "先生。もう1回やろう。#n私もサポートするから。"
1014205-56 = "[s] \"ちょっと私情が入っちゃってない！？\""
1014205-61 = "……冗談。"
1014205-62 = "実は……自覚してるんだ。#n焼き鳥、食べ過ぎだって。"
1014205-63 = "だから控え目にしてるんだよ。"
1014205-64 = "[s] \"それで、1週間に何本食べてるの？\""
1014205-65 = "そ、それは……。"
1014205-66 = "……内緒。"
1014205-67 = "と、とりあえず他の所に行こう。ここにいたら、誘惑に負けちゃいそう。"
1014205-76 = "（それで来た場所が、よりにもよって……）\r\n"
1014205-81 = "いらっしゃ～い！焼き鳥はいかが～！\r\n"
1014205-85 = "……。\r\n\r\n"
1014205-86 = "[s3] \"……。\"\r\n[s4] \"わざとこっちに来たんじゃないよね？\""
1014205-89 = "ただの偶然……。"
1014205-90 = "本当だよ。信じて。"
1014205-91 = "[s5] \"……。\"\r\n[s6] \"1本、食べる？\""
1014205-94 = "……。"
1014205-95 = "……ううん、大丈夫。\r\n"
1014205-96 = "[s] \"本当は買って欲しいって顔してる！\""
1014205-97 = "う、うううっ……。"
1014205-98 = "……分かった。先生の好意を断ったら失礼だから。"
1014205-99 = "焼き鳥、1本だけお願い。"
1014205-100 = "塩で。"
1014205-101 = "ちょうど暑いし、塩気のあるものが食べたいんだ。"
1014205-102 = "[s] \"汗もかいたもんね。\""
1014205-106 = "[ns] \"すみません、焼き鳥1本、塩で！\""
1014205-108 = "はいよ～！ちょっと待ってね！"
1014205-111 = "（しばらくして……）"
1014205-113 = "はいっ！お待たせ～！\r\n"
1014205-118 = "それじゃ……。"
1014205-123 = "[ns] \"おいしい？\""
1014205-124 = "……見事なバランスだね。\r\n"
1014205-125 = "肉とネギの歯ごたえが絶妙だし。"
1014205-126 = "香ばしくて、塩加減もちょうど良い。"
1014205-127 = "一口でこんなに豊かな味わい……。"
1014205-128 = "また買いに来ようかな。"
1014205-129 = "[s] \"聞いているだけでもお腹が空いてくるね。\""
1014205-130 = "先生も食べてみる？"
1014205-136 = "……あ。\r\n"
1014205-137 = "こ、こっちは口つけてないから……別に意味はないけど。\r\n\r\n"
1014205-138 = "[s] \"うん、ありがとう。そういうことにしておくね。\""
1014205-139 = "せ、先生……！\r\n\r\n"
1014205-141 = "（その後、ナグサと商店街を歩きながら楽しい時間を過ごした）"
