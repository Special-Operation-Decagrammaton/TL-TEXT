[translation]
1014205-1 = "Delicious Things Are Uncontrollable"
1014205-2 = "(I came to the beach with Nagusa again, but...)"
1014205-6 = "(The sun is way too strong today...)"
1014205-8 = "Ugh... \r\n"
1014205-9 = "At this rate... I feel like I'm going to melt. \r\n"
1014205-10 = "[s] \"Shall we head to the nearby shopping district?\""
1014205-11 = "Yeah. That way, there'll be plenty of shade to rest in."
1014205-12 = "And there will probably be more people around to see us than here."
1014205-13 = "[s1] \"Oh...\"\r\n[s2] \"Are you saying you want to attract attention?\""
1014205-16 = "...I just want to clear up the misunderstanding."
1014205-17 = "There's no other meaning behind it."
1014205-18 = "..."
1014205-19 = "I'm not lying, really."
1014205-20 = "So, stop looking at me with that face."
1014205-21 = "I might look cool, but I'm actually quite shy. \r\n"
1014205-22 = "[ns] \"M-my apologies...\""
1014205-24 = "(After that, we visited the shopping district near the beach)"
1014205-28 = "There are so many fun-looking shops here."
1014205-29 = "That one over there is a shooting gallery... it looks like you get prizes based on your score."
1014205-30 = "[s] \"If you tried it, Nagusa, you'd probably get the top score, right?\""
1014205-31 = "I suppose so, but..."
1014205-32 = "Maybe others would enjoy it more."
1014205-37 = "Sensei, do you want to try?"
1014205-38 = "I'll teach you from right here."
1014205-39 = "[s] \"Yeah, I'm counting on you.\""
1014205-41 = "(After that, I started the water gun shooting game under Nagusa's guidance.)\r\n"
1014205-47 = "(However... all I got was a participation prize candy...)\r\n"
1014205-49 = "Haha, too bad. If you had a bit more luck, you could've gotten the next prize up."
1014205-50 = "[s] \"What was the prize one step above the participation prize?\""
1014205-51 = "Uh..."
1014205-52 = "It says... 'One Skewer Exchange Ticket'."
1014205-53 = "And the one above that is a 'Skewer Set Exchange Ticket'..."
1014205-54 = "..."
1014205-55 = "Sensei. Let's try one more time. #nI'll support you."
1014205-56 = "[s] \"Aren't you letting your personal feelings get in the way!?\""
1014205-61 = "...Just kidding."
1014205-62 = "Actually... I'm aware of it. #nThat I eat too much yakitori."
1014205-63 = "That's why I've been holding back."
1014205-64 = "[s] \"So, how many do you eat in a week?\""
1014205-65 = "Th-that is..."
1014205-66 = "...a secret."
1014205-67 = "A-anyway, let's go somewhere else. If I stay here, I might give in to temptation."
1014205-76 = "(And the place we ended up at was, of all places...)\r\n"
1014205-81 = "Welcome! How about some yakitori!\r\n"
1014205-85 = "...\r\n\r\n"
1014205-86 = "[s3] \"...\"\r\n[s4] \"You didn't come here on purpose, did you?\""
1014205-89 = "It's just a coincidence..."
1014205-90 = "It's true. Believe me."
1014205-91 = "[s5] \"...\"\r\n[s6] \"Do you want to have one?\""
1014205-94 = "..."
1014205-95 = "...No, I'm fine. \r\n"
1014205-96 = "[s] \"Your face says you really want me to buy you one!\""
1014205-97 = "U-ugh..."
1014205-98 = "...Fine. It would be rude to turn down your offer, Sensei."
1014205-99 = "I'll have one skewer, please."
1014205-100 = "Salt flavor."
1014205-101 = "It's hot out, so I'm craving something salty."
1014205-102 = "[s] \"We did work up a sweat, after all.\""
1014205-106 = "[ns] \"Excuse me, one yakitori, salt flavor!\""
1014205-108 = "Coming right up! Just a moment!"
1014205-111 = "(A little while later...)"
1014205-113 = "Here you go! Thanks for waiting!\r\n"
1014205-118 = "Well then..."
1014205-123 = "[ns] \"Is it good?\""
1014205-124 = "...The balance is perfect. \r\n"
1014205-125 = "The texture of the meat and the green onion is exquisite."
1014205-126 = "It's savory, and the saltiness is just right."
1014205-127 = "Such a rich flavor in just one bite..."
1014205-128 = "Maybe I'll come back to buy more."
1014205-129 = "[s] \"Just listening to you makes me hungry.\""
1014205-130 = "Do you want to try some, Sensei?"
1014205-136 = "...Ah. \r\n"
1014205-137 = "I-I haven't touched this side, so... it doesn't mean anything, but. \r\n\r\n"
1014205-138 = "[s] \"Yeah, thanks. I'll take it that way.\""
1014205-139 = "S-Sensei...!\r\n\r\n"
1014205-141 = "(After that, I spent a fun time walking through the shopping district with Nagusa.)"