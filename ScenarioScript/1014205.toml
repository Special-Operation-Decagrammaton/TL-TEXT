[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1014205-1 = "Coisas Gostosas São Incontroláveis" 
1014205-2 = "（Vim à praia com a Nagusa de novo, mas...）" 
1014205-6 = "（Justamente hoje, o sol está forte demais...）" 
1014205-8 = "Ugh...\n" 
1014205-9 = "Desse jeito... eu vou acabar derretendo.\n" 
1014205-10 = "[s] \"Vamos para a rua de comércio aqui perto?\"" 
1014205-11 = "Sim. Lá tem vários lugares com sombra\npara descansarmos." 
1014205-12 = "E deve ter muito mais gente\npara nos olhar do que aqui." 
1014205-13 = "[s1] \"Ooooh...\"\n[s2] \"Quer dizer que você quer atrair olhares?\"" 
1014205-16 = "......Eu só quero desfazer o mal-entendido." 
1014205-17 = "Não tem nenhum outro significado por trás." 
1014205-18 = "......" 
1014205-19 = "Não é mentira, é sério." 
1014205-20 = "Então, pare de me olhar com essa cara." 
1014205-21 = "Eu pareço fria e contida,\nmas na verdade sou bem tímida, sabia.\n" 
1014205-22 = "[ns] \"P-Peço desculpas...\"" 
1014205-24 = "（Depois disso, visitamos a rua de\ncomércio perto da praia.）" 
1014205-28 = "Parece que... tem muitas\nbarraquinhas divertidas por aqui." 
1014205-29 = "Aquilo ali é tiro ao alvo...\ne parece ter prêmios dependendo da pontuação." 
1014205-30 = "[s] \"Se a Nagusa tentar, certeza que\nconsegue a pontuação máxima, né?\"" 
1014205-31 = "Provavelmente, mas..." 
1014205-32 = "Acho que as outras pessoas\nse divertiriam mais." 
1014205-37 = "Sensei, quer tentar?" 
1014205-38 = "Eu te ensino aqui do lado." 
1014205-39 = "[s] \"Sim, conto com a sua ajuda.\"" 
1014205-41 = "（Depois disso, com as instruções da Nagusa,\ncomecei a atirar com a arma de água.）\n" 
1014205-47 = "（No entanto... tudo o que consegui\nfoi uma bala de prêmio de consolação...）\n" 
1014205-49 = "Fufu, que pena. Se tivesse mais sorte,\nacho que conseguiria o próximo prêmio." 
1014205-50 = "[s] \"O que era o prêmio acima do de consolação?\"" 
1014205-51 = "Deixe-me ver..." 
1014205-52 = "Tá escrito... 'Cupom para 1 Espetinho de Yakitori'." 
1014205-53 = "E o prêmio acima desse\né um 'Cupom para um Combo de Yakitori'..." 
1014205-54 = "......" 
1014205-55 = "Sensei. Vamos tentar de novo.\nEu também vou te dar suporte." 
1014205-56 = "[s] \"Acho que você tá misturando\nas suas emoções nisso aí!\"" 
1014205-61 = "......Tô brincando." 
1014205-62 = "Na verdade... eu tenho consciência disso.\nDe que eu ando comendo yakitori demais." 
1014205-63 = "Por isso estou tentando me controlar." 
1014205-64 = "[s] \"E quantos espetinhos você tem comido por semana?\"" 
1014205-65 = "I-Isso é..." 
1014205-66 = "......Segredo." 
1014205-67 = "P-Por enquanto, vamos para outro lugar.\nSe eu ficar aqui, vou acabar cedendo à tentação." 
1014205-76 = "（Mas o lugar para onde viemos,\nde todos os lugares...）\n" 
1014205-81 = "Bem-vindos! Vão querer um yakitori?!\n" 
1014205-85 = "......\n\n" 
1014205-86 = "[s3] \"......\"\n[s4] \"Você não veio pra cá de propósito, né?\"" 
1014205-89 = "Foi só uma coincidência..." 
1014205-90 = "É verdade. Acredite em mim." 
1014205-91 = "[s5] \"......\"\n[s6] \"Quer comer um?\"" 
1014205-94 = "......" 
1014205-95 = "......Não, eu estou bem.\n" 
1014205-96 = "[s] \"Seu rosto diz claramente que\nvocê quer que eu compre!\"" 
1014205-97 = "U-Uuuu..." 
1014205-98 = "......Entendi. Recusar a gentileza do Sensei\nseria falta de educação." 
1014205-99 = "Só um espetinho, por favor." 
1014205-100 = "Salgado." 
1014205-101 = "Como está quente, bateu uma vontade\nde comer algo salgado." 
1014205-102 = "[s] \"E você também suou bastante, não é?\"" 
1014205-106 = "[ns] \"Com licença, um yakitori salgado, por favor!\"" 
1014205-108 = "É pra já! Esperem só um minutinho!" 
1014205-111 = "（Um tempo depois...）" 
1014205-113 = "Aqui está! Desculpem a demora!\n" 
1014205-118 = "Então... itadakimasu." 
1014205-123 = "[ns] \"Está gostoso?\"" 
1014205-124 = "......É um equilíbrio formidável.\n" 
1014205-125 = "A textura da carne e da cebolinha\né simplesmente perfeita." 
1014205-126 = "É aromático, e a quantidade de sal\nestá no ponto certo." 
1014205-127 = "Um sabor tão rico em apenas uma mordida..." 
1014205-128 = "Acho que vou vir comprar mais depois." 
1014205-129 = "[s] \"Só de ouvir me dá fome.\"" 
1014205-130 = "Quer experimentar, Sensei?" 
1014205-136 = "......Ah.\n" 
1014205-137 = "E-Eu não encostei a boca nesse lado...\nNão que isso signifique alguma coisa, mas.\n\n" 
1014205-138 = "[s] \"Sim, obrigado. Vamos fingir que sim.\"" 
1014205-139 = "S-Sensei...!\n\n" 
1014205-141 = "（Depois disso, passei um momento muito divertido\ncaminhando com a Nagusa pela rua de comércio.）" 