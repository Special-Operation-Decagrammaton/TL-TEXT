[translation]
1007606-1 = "説明したくない気持ち"
1007606-2 = "（すべての競技が終わった後、1人でスタジアムに残っているコトリを見かけた）"
1007606-6 = "（コトリはベンチに座り、がらんとしたグラウンドを無言で眺めていた）"
1007606-7 = "……あれ、先生。"
1007606-8 = "すみません……。#n来ていただきたくて言ったわけじゃ、なかったのですが……。"
1007606-9 = "[s1] \"大丈夫？\"\n[s2] \"元気ないね。\""
1007606-12 = "あはは……顔に出ちゃってましたか……？"
1007606-13 = "……はぁ。"
1007606-14 = "自分でも思うんです。いつもの私らしくないって……。"
1007606-15 = "だけど、何だか力が出なくて……#nもちろん疲れているせいもあるのでしょうが……。"
1007606-16 = "理由を考えていたんですけど……よくわからなくて……。"
1007606-17 = "……そうですね……寂しい、のかもしれません。"
1007606-18 = "私、大運動会をずいぶん楽しんでいたみたいです。#nスポーツは、苦手なくせに……。"
1007606-19 = "実は賑やかな雰囲気が好きだったんですかね？あはは……。"
1007606-20 = "……だから、でしょうか？#nこれで全部終わりと思うと、少し気分が沈んでしまって……。"
1007606-21 = "……はい？"
1007606-22 = "この先イベントはいくらでもあるし、大運動会も次がある……？"
1007606-23 = "確かに、そうですね……。"
1007606-24 = "私も、そう思います……。"
1007606-25 = "……。"
1007606-26 = "でも……「次回」の大運動会は、#n「今回」と同じものではありません。"
1007606-27 = "ただ、似ているだけ。中身はまったく違います……。"
1007606-28 = "「今回」はもう二度と戻ってこないのです……。#n「次回」があるからと考えるのは、#nただの「ポジティブシンキング」に過ぎません……。"
1007606-32 = "…………あっ。"
1007606-33 = "あ、えっと……わ、私、今なんて……？"
1007606-34 = "……えっ！？#nす、すみません！先生の話にケチをつけるなんて……！"
1007606-35 = "ううう……私、体調が悪いのかも……。#n早く帰って休むことにします……。"
1007606-36 = "[s3] \"正直に言ってくれてありがとう。\"\n[s4] \"コトリとちゃんと話ができて嬉しいよ。\""
1007606-39 = "え？先生……？"
1007606-40 = "違う視点から考えてみる、ですか……？"
1007606-41 = "どういう風に……？"
1007606-42 = "……え？"
1007606-43 = "二度と戻ってこないからこそ、いい……？"
1007606-44 = "それはどういう……。"
1007606-45 = "[s5] \"唯一だから特別！とかね。\"\n[s6] \"だからこそ大切な時間だ！みたいな。\""
1007606-48 = "え、えっと……。"
1007606-49 = "それは「ポジティブシンキング」と、どう違うのでしょうか……？"
1007606-50 = "……え？"
1007606-51 = "あれ……？"
1007606-52 = "……不思議です。どうしてでしょう……？"
1007606-53 = "先生の話を聞いたら……少し元気になってきました。"
1007606-54 = "言葉が変わっただけだと思ったのに……一体どうして……？"
1007606-55 = "でも……先生のおっしゃる通りかもしれません。"
1007606-57 = "……たった、一度きりの時間。"
1007606-58 = "前回でも次回でもなく、「今回」を後悔したくないから――"
1007606-60 = "だからみんな、一生懸命向き合っていたのですね。この大運動会に。"
1007606-61 = "……はい。"
1007606-62 = "それから……。"
1007606-64 = "……もしかしたらこの時間も、#n「今回」の大運動会だからできたのかもしれません。"
1007606-65 = "ここまで頑張って、そして自分で考えて……。"
1007606-66 = "またひとつ、新たに学ぶ機会が得られて。"
1007606-67 = "そのお陰で、今……。"
1007606-69 = "先生と、並んで夕陽を眺めていることができているのかもしれませんね……。"
1007606-73 = "えへ、えへへ……。"
1007606-74 = "ポジティブシンキング……意外と効果絶大ですね……。"
1007606-75 = "[s7] \"……もう大丈夫？\"\n[s8] \"いつものコトリに戻ったね。\""
1007606-78 = "はい！先生からのアドバイス、すごく効果がありました！#nありがとうございます！"
1007606-79 = "……え？"
1007606-80 = "さっきと温度差がすごい、と？"
1007606-81 = "えへへ……。"
1007606-82 = "……先生。"
1007606-83 = "私がこんなことを言うと驚かれるかもしれませんが……。"
1007606-84 = "世の中にはですね……。"
1007606-85 = "「言わぬが花」、という言葉が存在するんですよ？"
1007606-86 = "[s9] \"コ、コトリ！？今なんて！？\"\n[s10] \"何とおっしゃいましたか、コトリさん！？\""
1007606-89 = "ふふっ、予想通りの反応ですね！"
1007606-90 = "でも、こればかりはダメです。絶対に説明しませんから！"
1007606-91 = "……。"
1007606-92 = "その代わり、というのは変ですけど……。"
1007606-93 = "もう少し、このまま……。"
1007606-95 = "せめて日が暮れるまでは……そばにいてくださいね。"
