[translation]
1007606-1 = "Sentimentos que não quero explicar"

1007606-2 = "(Após o término de todas as competições, vi Kotori permanecendo sozinha no estádio.)"

1007606-6 = "(Kotori sentou no banco e olhou silenciosamente para o campo vazio.)"

1007606-7 = "...É isso, Sensei."

1007606-8 = "desculpe……. #nEu não disse isso porque queria que você viesse, mas..."

1007606-9 = "[s1] \"Você está bem?\"\n[s2] \"Você não parece bem.\""

1007606-12 = "Haha... isso apareceu no seu rosto...?"

1007606-13 = "... Haa."

1007606-14 = "Eu também acho. Não é como sempre..."

1007606-15 = "Mas por alguma razão, não tenho forças...#nClaro, provavelmente é porque estou cansado..."

1007606-16 = "Eu estava pensando no motivo, mas... não entendi direito..."

1007606-17 = "...Bem...talvez seja solitário."

1007606-18 = "Acho que gostei muito do grande dia esportivo. #nMesmo eu não sendo bom em esportes..."

1007606-19 = "Você realmente gostou da atmosfera animada? Ahaha…."

1007606-20 = "...É por isso? #nQuando pensei que era o fim, me senti um pouco deprimido..."

1007606-21 = "……sim?"

1007606-22 = "Há muitos eventos pela frente e haverá mais um grande dia esportivo...?"

1007606-23 = "Na verdade, isso é verdade...."

1007606-24 = "Eu também acho...."

1007606-25 = "……."

1007606-26 = "Mas...o “próximo” grande dia desportivo não é a mesma coisa que “este”."

1007606-27 = "É que eles são semelhantes. O conteúdo é completamente diferente...."

1007606-28 = "\"Dessa vez\" nunca mais vai voltar... #nPensar que haverá uma \"próxima vez\" é apenas \"pensamento positivo\"..."

1007606-32 = "......Ah."

1007606-33 = "Ah, hum... eu... o que estou fazendo agora...?"

1007606-34 = "...Eh! ? #nDesculpe! Não acredito que você está sendo tão mesquinho com o que a Senseia diz...!"

1007606-35 = "Ugh... talvez eu não esteja me sentindo bem... #nVou para casa mais cedo e descansar..."

1007606-36 = "[s3] \"Obrigado por ser honesto.\"\n[s4] \"Estou feliz por ter conseguido falar com Kotori corretamente.\""

1007606-39 = "foto? Sensei……?"

1007606-40 = "Você gostaria de pensar sobre isso de uma perspectiva diferente?"

1007606-41 = "De que maneira...?"

1007606-42 = "……foto?"

1007606-43 = "Está tudo bem porque você nunca mais vai voltar...?"

1007606-44 = "O que é aquilo...?"

1007606-45 = "[s5] \"É especial porque é o único!\"\n[s6] \"É por isso que é um momento tão importante!\""

1007606-48 = "Hum, uh…."

1007606-49 = "Em que difere do “pensamento positivo”?"

1007606-50 = "……foto?"

1007606-51 = "Huh...?"

1007606-52 = "...Isso é estranho. Por que...?"

1007606-53 = "Depois de ouvir a história da Senseia, me senti um pouco melhor."

1007606-54 = "Achei que fosse apenas uma palavra diferente, mas por que diabos?"

1007606-55 = "Mas... pode ser como o Sensei diz."

1007606-57 = "...Só uma vez."

1007606-58 = "Não da última vez nem da próxima, não quero me arrepender \"desta vez\"..."

1007606-60 = "É por isso que todos trabalharam tanto para enfrentá-lo. Para este grande dia esportivo."

1007606-61 = "……sim."

1007606-62 = "depois disso……."

1007606-64 = "...Talvez desta vez também tenha sido possível porque #n \"desta vez\" foi o grande dia dos esportes."

1007606-65 = "Eu trabalhei duro até agora e pensei nisso sozinho..."

1007606-66 = "Mais uma oportunidade de aprender algo novo."

1007606-67 = "Graças a isso, agora..."

1007606-69 = "Talvez seja porque consigo assistir o pôr do sol lado a lado com minha Senseia..."

1007606-73 = "Hehe, hehehe..."

1007606-74 = "Pensamento positivo... é surpreendentemente eficaz..."

1007606-75 = "[s7] \"...Você está bem agora?\"\n[s8] \"Você voltou aos seus modos habituais.\""

1007606-78 = "sim! O conselho do Sensei foi muito eficaz! #nObrigado!"

1007606-79 = "……foto?"

1007606-80 = "Há uma grande diferença de temperatura em relação a antes?"

1007606-81 = "Ehehe…."

1007606-82 = "……Sensei."

1007606-83 = "Você pode se surpreender quando digo isso, mas..."

1007606-84 = "No mundo..."

1007606-85 = "Não existe um ditado que diz: “Eu não digo isso, mas é uma flor”?"

1007606-86 = "[s9] \"K-Kotori!? E agora!?\"\n[s10] \"O que você disse, Kotori-san!?\""

1007606-89 = "Hehe, essa é a reação esperada!"

1007606-90 = "Mas isso por si só não é bom. Eu nunca vou explicar isso!"

1007606-91 = "……."

1007606-92 = "É estranho dizer isso, mas..."

1007606-93 = "Fique assim por mais um tempinho..."

1007606-95 = "Por favor, fique ao meu lado, pelo menos até o sol se pôr."

