[translation]
10043050-1 = "第5話;大切なのは折れない心"
10043050-3 = "……そうでしたか。#nレイさんもお疲れでしょう。"
10043050-4 = "[s] \"観客席を見てまわるだけでも一苦労だもんね。\""
10043050-5 = "体力的にも精神的にも……"
10043050-6 = "労力のかかる作業だと思います。"
10043050-7 = "[s] \"スミレも大丈夫？\""
10043050-8 = "私は平気です。体力には自信がありますから。"
10043050-9 = "……そういえば、さきほど数名の不審人物を見つけたんです。"
10043050-10 = "この格好ならば怪しまれません。"
10043050-11 = "行きましょう！"
10043050-20 = "まず、あちらの方です。"
10043050-26 = "3球目は……ストレートを空振り。"
10043050-27 = "4球目……フォークボールはストライクならず。"
10043050-33 = "5球目はヒット。#n……だけど、これはショートフライか。この試合のチーム打率は……。"
10043050-34 = "防御率の方も……。"
10043050-39 = "トレーナー。あの方はさっきからずっと試合を記録しています。"
10043050-40 = "[s] \"たしかに、普通の観客には見えないかも……。\""
10043050-41 = "はい。野球に詳しくない私から見ても……。"
10043050-42 = "執拗に試合を記録している姿は、不自然です。"
10043050-43 = "では、様子をうかがってきますね。"
10043050-44 = "「ドリンクの売り子さん」として。"
10043050-47 = "[ruby=打撃指標数]OPS[/ruby]を計算すれば……。"
10043050-52 = "こんにちは！ドリンクはいかがですか？"
10043050-53 = "うわっ！？……びっくりした。"
10043050-54 = "……1杯頼むよ。"
10043050-55 = "はい、どうぞ。"
10043050-61 = "ええと……次のバッターは……。"
10043050-62 = "何を記録しているんですか？"
10043050-63 = "あぁ……バッターの打率やピッチャーの球種をちょっとな……。"
10043050-64 = "なんだよ、記録してたら悪いのか？"
10043050-65 = "……。"
10043050-66 = "お前には関係ないだろ！"
10043050-70 = "（見ましたか、トレーナー？）"
10043050-71 = "[s1] （……話を聞いたほうがいいかも）\n[s2] （荒っぽいことはだめだよ？）"
10043050-74 = "（はい、トレーナー！）"
10043050-81 = "くっ……！試合情報をブックメーカーにアップして、がっぽり稼ぐ計画が……！"
10043050-86 = "違法な賭博サイトに情報を上げるなんて……。"
10043050-87 = "応援してやってんだ、こんくらいいいだろ！"
10043050-88 = "いいえ。"
10043050-89 = "ファンは選手に力を与える大切な存在ではありますが……。"
10043050-90 = "……ルールは守るべきです！"
10043050-91 = "利用客のマナーが悪いジムは、活気を失ってしまいますからね！"
10043050-92 = "ちっ……！"
10043050-97 = "別の計画は阻止したようですが……。"
10043050-98 = "例の犯人ではありませんでしたね。"
10043050-99 = "[s] \"でも、スミレの言っていたことは正しいよ。\""
10043050-100 = "ありがとうございます。トレーナー。"
10043050-101 = "さあ、捜索に戻りましょう！"
10043050-102 = "次はあちらに！"
10043050-107 = "いけ！いけ！頑張れ！"
10043050-108 = "勝利の太鼓で力を送るぞー！"
10043050-114 = "[ns] \"ただの応援団じゃない！？\""
10043050-115 = "いいえ、トレーナー。"
10043050-116 = "太鼓で応援していると見せかけて……。"
10043050-117 = "モールス信号を送っています！"
10043050-121 = "（スミレの考えすぎかと思いきや……）"
10043050-126 = "な、なぜ……ブレーブスのファンに紛れ、サインを流出させる計画がバレたんだ……！"
10043050-131 = "モールス信号は一通り勉強しました！暗号を使用する部活に、トレーニングを推奨することもありますから。"
10043050-132 = "[s3] \"トレーニングのために……\"\n[s4] \"そこまで……！\""
10043050-135 = "これだけは言わせてください。"
10043050-136 = "公正なルールがあるからこそ、勝利は価値あるものとなります。"
10043050-137 = "ルールを破る人がいたら、どんな勝利だって意味はありません。"
10043050-138 = "公正な戦いのためにも「スポーツマンシップ」を守らなくては……。"
10043050-143 = "……で、でも、私だって怖いんだ。"
10043050-144 = "万が一、レイダースが負けたらって……。"
10043050-145 = "想像してみろよ。連勝続きの中で、初めて負けたらどうなるか……。"
10043050-146 = "でも……ボールと同じで、どこに転がっていくか分からないのが勝負か……。"
10043050-147 = "[s5] \"ボールがどこへ転がっても受け入れるのが、\"\n[s6] \"「スポーツ」です。\""
10043050-151 = "[ns7] \"勝利を焦って、\"\n[ns8] \"不安をなくしたいのはわかりますが……\""
10043050-155 = "……。"
10043050-157 = "……そうだな。悪かった……。"
10043050-159 = "そこまで熱くなるのも、野球愛ゆえです。"
10043050-160 = "その情熱を、どこかに向けたいとお考えでしたら……"
10043050-161 = "ミレニアムのジムでトレーニングに励むのはいかがですか？"
10043050-162 = "[s] \"スミレ……意外と営業向きかもね……。\""
10043050-166 = "営業、ですか……？"
10043050-169 = "またしても、犯人ではありませんでした……。"
10043050-170 = "なかなか簡単にはいきませんね。"
10043050-171 = "[s] \"決めてかかるのも危ないからね……。\""
10043050-172 = "はい……反省しています。"
10043050-173 = "モールス信号はスタジアムの歓声に紛れ、伝わることはなかったようです。"
10043050-174 = "……皆さんの熱気には、感心するしかありません。"
10043050-175 = "[s] \"ま、まあね……\""
10043050-176 = "はい。皮肉ではなく、素直に感心しましたが……。"
10043050-177 = "……すみません。私は建前や冗談が得意ではなく。"
10043050-180 = "周りからも、真面目すぎると言われることがあります。"
10043050-181 = "もう少しユーモアのある性格だったなら……。"
10043050-182 = "ときどき、そう思うことがありますね。"
10043050-185 = "[ns9] \"でも、そこが……\"\n[ns10] \"スミレの良いところじゃない？\""
10043050-188 = "ありがとうございます。"
10043050-189 = "ふふっ……トレーナーは、どんなことにも美点を見つけてくれそうですね。"
10043050-193 = "あっ……その、私なりの冗談……です。"
10043050-194 = "気にしてないよ、ですか？そ、それでしたら……"
10043050-195 = "……。"
10043050-196 = "なぜ私が会場の熱気に感心したかというと……"
10043050-197 = "諦めずに挑戦を続けるチームと、応援をやめないファンの皆さんに、心を動かされたのです。"
10043050-198 = "トレーナー。"
10043050-202 = "いえ……[ruby=・]先[/ruby][ruby=・]生[/ruby]。"
10043050-203 = "[s] \"……！？\""
10043050-205 = "[ns] （スミレの話に耳を傾ける）"
10043050-206 = "私は……"
10043050-207 = "挑戦を続ける人が好きなんです。"
10043050-208 = "私自身、トレーニングを応援する側でもありますしね。"
10043050-209 = "ですが、「挑戦」は何よりも難しい。その理由はわかりますか……？"
10043050-210 = "[s] \"意志を試される……から？\""
10043050-214 = "そうなんです。"
10043050-215 = "人の心には、裏表があります。"
10043050-216 = "「なりたい自分」と「やりたいこと」は違うものですよね。"
10043050-217 = "例えば――"
10043050-220 = "ある方が、ダイエットに挑戦するとします。"
10043050-221 = "「なりたい自分」を目指して、食事管理や運動に挑む――"
10043050-222 = "ですが、そんな中でも「やりたいこと」が頭をよぎります。"
10043050-223 = "きっと、チーズやベーコンのたっぷり入ったクリームパスタを想像するだけで――"
10043050-224 = "食事管理をやめたくなってしまうでしょう。"
10043050-225 = "[ns] \"なんだか私もお腹が空いてきたよ。\""
10043050-226 = "ふふっ、そうですか。"
10043050-229 = "――その人が誘惑に負け、ついスイーツカフェに入ったとしましょう。"
10043050-230 = "ひさびさに食べるチョコアイスは、その甘さが口の中に広がり、とても美味しいはず。"
10043050-231 = "きっと、幸せですよね。"
10043050-232 = "……ですが、「なりたい自分」からは遠ざかっていく。"
10043050-235 = "そうして、些細なことで固めた決意は崩れてしまうんです。"
10043050-236 = "私は単純な性格ではありますが――"
10043050-237 = "私とトレーニング部が、物好きと思われていることくらいは知っています。"
10043050-238 = "それでも……誰かの決意を後押しして、「なりたい自分」にしてあげたいと思っているのです。"
10043050-241 = "トレーニングを終え、疲れ果てた方々の中にも――"
10043050-242 = "トレーニングを投げ出さず。"
10043050-243 = "翌日、再びジムへと訪れる方が現れます。"
10043050-246 = "そういう人の理想に向かうお手伝いができるのなら……"
10043050-247 = "それは――とても素晴らしいことだと思っています。"
10043050-248 = "誰かに決意させることは、私にはできません。"
10043050-249 = "だから、私は目標に向かって頑張る人が好きなんです。"
10043050-250 = "そして、それを導く人のことも。"
10043050-251 = "そういう意味で……先生のことを、好ましく思っています。"
10043050-252 = "[s] \"す、スミレ！？\""
10043050-253 = "ふふっ、どうしてそんなに驚くんですか？"
10043050-258 = "トレーナー？"
10043050-262 = "（突然の言葉に、固まってしまった……）"
10043050-263 = "（スミレの視線が向けられたその時……）"
10043050-268 = "お？売り子さん、やっと見つけた！"
10043050-269 = "飲み物ありませんか？#n今、他に誰もいなくて……。"
10043050-273 = "誰もいない……？"
10043050-274 = "[s] \"どういうこと？\""
10043050-275 = "ひとまず……こちら、ドリンクです。"
10043050-279 = "ありがとう！助かったぁー！"
10043050-283 = "……おかげで生き返りました！"
10043050-284 = "いつから他の売り子さんがいなくなりました？"
10043050-285 = "……1回？いや、2回表？場内が盛り上がったときだったかな……"
10043050-286 = "一番ドリンクの需要が高まる時に姿を消した、と……。"
10043050-287 = "トレーナー、これは……"
10043050-288 = "ええ。私も怪しいと思います。その売り子さんたちの行き先に、きっと……。"
10043050-293 = "ふぁあ……ずっと応援歌を歌ってたら、喉が渇いて……。"
10043050-297 = "[ns] \"ハナエ、また会ったね。\""
10043050-298 = "あれ？"
10043050-299 = "先生！"
10043050-303 = "なるほど！スミレさんはみなさんにドリンクを配っているのですね！"
10043050-304 = "そうなんです。一杯どうぞ。"
10043050-309 = "ありがとうございます！ごくっごくっ……ぷはぁ！"
10043050-310 = "これでまた、元気よく応援できそうです！"
10043050-311 = "スミレさん……まるで救護騎士団みたいですね！"
10043050-313 = "ふふっ。どちらかと言えば、健康騎士団でしょうか。"
10043050-314 = "それも素敵ですね！"
10043050-318 = "そういえば――"
10043050-319 = "他の売り子さんはあちらに向かってましたけど……スミレさんは行かなくていいんですか？"
10043050-323 = "！！！"
10043050-324 = "[s] \"あっちというと……\""
10043050-325 = "あの目立つ席です！"
10043050-330 = "あそこは……"
10043050-331 = "[s] \"バックネット裏の席……？\""
10043050-332 = "ええ！"
10043050-333 = "応援歌をあそこから歌ったら、とっても響きそうです！"
10043050-340 = "（スタジアム全体を見渡せる席に、他の売り子が……）"
10043050-344 = "（つまり……？）"
10043050-352 = "先生！スミレ先輩！今さっき犯人から連絡が！"
10043050-353 = "また、一方的に訳の分からないことを言っていたんですが……。"
10043050-355 = "その中に手がかりがあったかもしれません！"
10043050-356 = "[s] \"本当に！？\""
10043050-357 = "お手柄ですレイさん。#nそれで、手がかりとは……？"
10043050-358 = "電波です！スタジアムを周りながら通話をしていたら……。"
10043050-359 = "場所によって、ノイズが変化していたんです！"
10043050-360 = "一番ノイズが少ない場所に、きっと……！"
10043050-365 = "電波状況を分析し、位置を特定するのですね。"
10043050-366 = "[s] \"じゃあ、次は……！\""
10043050-367 = "ええ、トレーナー。"
10043050-368 = "次の電話が勝負ですね！"
10043050-370 = "今度こそ、犯人の居場所を突き止めてみせます！"
