[translation]
10043050-1 = "Episódio 5; O importante é um coração inabalável"
10043050-3 = "……Entendo. #nVocê também deve estar exausta, Rei."
10043050-4 = "[s] \"Só de dar uma volta pelas arquibancadas já é um trabalho árduo, né.\""
10043050-5 = "Tanto fisicamente quanto mentalmente……"
10043050-6 = "Acho que é uma tarefa que exige muito esforço."
10043050-7 = "[s] \"Você está bem também, Sumire?\""
10043050-8 = "Eu estou bem. Tenho confiança na minha resistência física."
10043050-9 = "……Aliás, acabei de encontrar algumas pessoas suspeitas."
10043050-10 = "Com este disfarce, não levantaremos suspeitas."
10043050-11 = "Vamos lá!"
10043050-20 = "Primeiro, ali naquela direção."
10043050-26 = "O terceiro arremesso…… foi uma bola rápida que ele não acertou."
10043050-27 = "Quarto arremesso…… a bola de garfo não foi strike."
10043050-33 = "O quinto arremesso foi uma rebatida. #n……Mas, isso é um fly curto? Qual será a média de rebatidas do time nesta partida……."
10043050-34 = "E a média de corridas permitidas também……."
10043050-39 = "Treinador. Aquela pessoa está registrando a partida desde agora há pouco."
10043050-40 = "[s] \"De fato, talvez não pareça um espectador comum…….\""
10043050-41 = "Sim. Mesmo para mim, que não entendo muito de beisebol……."
10043050-42 = "A forma como ele registra a partida obsessivamente é estranha."
10043050-43 = "Então, vou lá verificar a situação."
10043050-44 = "Como uma \"vendedora de bebidas\"."
10043050-47 = "Se eu calcular o OPS……."
10043050-52 = "Olá! Gostaria de uma bebida?"
10043050-53 = "Uau!?…… Que susto."
10043050-54 = "……Me vê uma."
10043050-55 = "Sim, aqui está."
10043050-61 = "Hum…… o próximo rebatedor é……."
10043050-62 = "O que você está registrando?"
10043050-63 = "Ah…… só a média de rebatidas do rebatedor e o tipo de arremesso do arremessador……."
10043050-64 = "O que foi? Tem algo de errado em registrar?"
10043050-65 = "……."
10043050-66 = "Isso não é da sua conta!"
10043050-70 = "(Você viu, Treinador?)"
10043050-71 = "[s1] (……Talvez seja melhor perguntar a ele)\n[s2] (Nada de violência, entendeu?)"
10043050-74 = "(Sim, Treinador!)"
10043050-81 = "Droga……! Meu plano de subir as informações da partida para a casa de apostas e ganhar uma bolada……!"
10043050-86 = "Subir informações para um site de apostas ilegal……."
10043050-87 = "Eu estou torcendo, não tem problema fazer isso!"
10043050-88 = "Não tem."
10043050-89 = "Embora os fãs sejam uma presença importante que dá força aos atletas……."
10043050-90 = "……As regras devem ser respeitadas!"
10043050-91 = "Porque uma academia com clientes que não têm modos acaba perdendo sua energia!"
10043050-92 = "Tsc……!"
10043050-97 = "Parece que impedimos outro plano, mas……."
10043050-98 = "Não era o criminoso em questão, né."
10043050-99 = "[s] \"Mas o que a Sumire disse está correto.\""
10043050-100 = "Obrigada, Treinador."
10043050-101 = "Vamos, vamos voltar às buscas!"
10043050-102 = "O próximo é ali!"
10043050-107 = "Vai! Vai! Força!"
10043050-108 = "Vou enviar forças com o tambor da vitória!"
10043050-114 = "[ns] \"Não são apenas líderes de torcida!?\""
10043050-115 = "Não, Sensei."
10043050-116 = "Fingindo que estão torcendo com os tambores..."
10043050-117 = "Eles estão enviando código Morse!"
10043050-121 = "(Pensei que a Sumire estava exagerando, mas...)"
10043050-126 = "P-por que... o plano de se infiltrar entre os fãs dos Braves e vazar os sinais foi descoberto...!"
10043050-131 = "Eu estudei código Morse de cabo a rabo! Às vezes, recomendo treinamento para clubes que usam criptografia."
10043050-132 = "[s3] \"Para fins de treinamento...\"\n[s4] \"Chegar a esse ponto...!\""
10043050-135 = "Deixe-me dizer apenas uma coisa."
10043050-136 = "A vitória só tem valor porque existem regras justas."
10043050-137 = "Se alguém quebra as regras, qualquer vitória perde o sentido."
10043050-138 = "Para que a disputa seja justa, precisamos manter o \"espírito esportivo\"..."
10043050-143 = "...M-mas, eu também estou com medo."
10043050-144 = "E se, por acaso, os Raiders perderem..."
10043050-145 = "Imagine só. Depois de tantas vitórias seguidas, o que aconteceria se perdessem pela primeira vez..."
10043050-146 = "Mas... assim como uma bola, o esporte é imprevisível, não sabemos para onde vai rolar..."
10043050-147 = "[s5] \"Aceitar para onde quer que a bola role\"\n[s6] \"é o que chamamos de 'esporte'.\""
10043050-151 = "[ns7] \"Entendo que você queira eliminar a ansiedade\"\n[ns8] \"por estar impaciente pela vitória, mas...\""
10043050-155 = "..."
10043050-157 = "...É verdade. Me desculpe..."
10043050-159 = "Ficar tão entusiasmado assim é por causa do seu amor pelo beisebol."
10043050-160 = "Se você estiver pensando em canalizar essa paixão para algum lugar..."
10043050-161 = "Que tal se dedicar aos treinos na academia do Millennium?"
10043050-162 = "[s] \"Sumire... talvez você tenha jeito para vendas...\""
10043050-166 = "Vendas, você diz...?"
10043050-169 = "Mais uma vez, não era o culpado..."
10043050-170 = "As coisas não são tão simples assim, não é?"
10043050-171 = "[s] \"Tirar conclusões precipitadas também é perigoso...\""
10043050-172 = "Sim... estou refletindo sobre isso."
10043050-173 = "Parece que o código Morse se misturou aos gritos da torcida no estádio e não foi transmitido."
10043050-174 = "...Não posso deixar de admirar o entusiasmo de todos vocês."
10043050-175 = "[s] \"B-bem, é...\""
10043050-176 = "Sim. Não foi sarcasmo, eu realmente admiro isso..."
10043050-177 = "...Sinto muito. Não sou boa com formalidades ou piadas."
10043050-180 = "Às vezes, as pessoas ao meu redor dizem que sou séria demais."
10043050-181 = "Se eu tivesse uma personalidade um pouco mais bem-humorada..."
10043050-182 = "Às vezes, penso nisso."
10043050-185 = "[ns9] \"Mas não é justamente isso...\"\n[ns10] \"que faz da Sumire quem ela é?\""
10043050-188 = "Obrigada."
10043050-189 = "Fufu... Sensei, parece que você consegue encontrar qualidades em qualquer coisa."
10043050-193 = "Ah... isso foi... uma piada do meu jeito..."
10043050-194 = "Você não se importa? S-se for assim..."
10043050-195 = "..."
10043050-196 = "A razão pela qual fiquei admirada com o entusiasmo no local é que..."
10043050-197 = "Fiquei comovida com a equipe que continua desafiando sem desistir e com os fãs que não param de torcer."
10043050-198 = "Sensei."
10043050-202 = "Não... Sensei."
10043050-203 = "[s] \"...!?\""
10043050-205 = "[ns] (Escuta o que Sumire tem a dizer)"
10043050-206 = "Eu..."
10043050-207 = "Eu gosto de pessoas que continuam se desafiando."
10043050-208 = "Eu mesma também estou do lado que apoia o treinamento, afinal."
10043050-209 = "Mas, o 'desafio' é a coisa mais difícil de todas. Você sabe o motivo...?"
10043050-210 = "[s] \"Por causa da força de vontade sendo testada...?\""
10043050-214 = "Exatamente."
10043050-215 = "O coração das pessoas tem dois lados."
10043050-216 = "O 'eu que quero ser' e o 'o que quero fazer' são coisas diferentes, não são?"
10043050-217 = "Por exemplo—"
10043050-220 = "Digamos que alguém decida fazer uma dieta."
10043050-221 = "Mirando no 'eu que quero ser', a pessoa tenta controlar a alimentação e se exercitar—"
10043050-222 = "Mas, mesmo assim, o 'o que quero fazer' passa pela cabeça dela."
10043050-223 = "Com certeza, só de imaginar um macarrão ao molho cremoso cheio de queijo e bacon—"
10043050-224 = "A pessoa vai querer desistir do controle alimentar, não é?"
10043050-225 = "[ns] \"Até eu fiquei com fome agora.\""
10043050-226 = "Fufu, é mesmo?"
10043050-229 = "—Digamos que essa pessoa ceda à tentação e entre em uma cafeteria."
10043050-230 = "O sorvete de chocolate que ela não comia há tempos, com aquela doçura se espalhando na boca, deve ser muito gostoso."
10043050-231 = "Com certeza, é uma felicidade, não é?"
10043050-232 = "...Mas, ela está se afastando do 'eu que quer ser'."
10043050-235 = "E assim, a determinação construída por coisas triviais acaba desmoronando."
10043050-236 = "Eu tenho uma personalidade simples, mas—"
10043050-237 = "Eu sei que eu e o Clube de Treinamento somos vistos como excêntricos."
10043050-238 = "Mesmo assim... eu quero apoiar a determinação de alguém e ajudá-lo a se tornar o 'eu que ele quer ser'."
10043050-241 = "Mesmo entre aqueles que terminam o treino exaustos—"
10043050-242 = "Existem pessoas que não desistem."
10043050-243 = "E no dia seguinte, aparecem na academia novamente."
10043050-246 = "Se eu puder ajudar essas pessoas a alcançarem seus ideais..."
10043050-247 = "Isso é... algo maravilhoso, eu acho."
10043050-248 = "Eu não posso forçar a determinação de ninguém."
10043050-249 = "Por isso, eu gosto de pessoas que se esforçam em direção aos seus objetivos."
10043050-250 = "E também da pessoa que as guia."
10043050-251 = "Nesse sentido... eu tenho um carinho especial por você, Sensei."
10043050-252 = "[s] \"S-Sumire!?\""
10043050-253 = "Fufu, por que está tão surpreso?"
10043050-258 = "Treinador?"
10043050-262 = "(Fiquei paralisado com as palavras repentinas...)"
10043050-263 = "(No momento em que o olhar de Sumire se voltou para mim...)"
10043050-268 = "Oh? Vendedora, finalmente te achei!"
10043050-269 = "Tem bebidas?#nNão tem mais ninguém por aqui agora..."
10043050-273 = "Ninguém...?"
10043050-274 = "[s] \"O que isso significa?\""
10043050-275 = "Por enquanto... aqui está a bebida."
10043050-279 = "Obrigado! Me salvou!"
10043050-283 = "...Graças a isso, voltei à vida!"
10043050-284 = "Desde quando os outros vendedores sumiram?"
10043050-285 = "...Na primeira entrada? Não, na parte baixa da segunda? Acho que foi quando o estádio ficou agitado..."
10043050-286 = "Sumiram justamente quando a demanda por bebidas estava no auge, hein..."
10043050-287 = "Treinador, isso é..."
10043050-288 = "Sim. Eu também acho suspeito. Com certeza, no destino desses vendedores..."
10043050-293 = "Ah... cantar o hino de torcida esse tempo todo me deixou com sede..."
10043050-297 = "[ns] \"Hanae, nos encontramos de novo.\""
10043050-298 = "Ué?"
10043050-299 = "Sensei!"
10043050-303 = "Entendi! Então a Sumire-san está distribuindo bebidas para todos!"
10043050-304 = "Exatamente. Aceite uma."
10043050-309 = "Muito obrigado! Glup, glup... ahhh!"
10043050-310 = "Com isso, sinto que posso voltar a torcer com toda a energia!"
10043050-311 = "Sumire-san... você parece até um membro da Unidade de Socorro!"
10043050-313 = "Fufu. Se for assim, talvez eu seja da Unidade de Saúde."
10043050-314 = "Isso também é maravilhoso!"
10043050-318 = "Falando nisso..."
10043050-319 = "As outras vendedoras foram para aquela direção... você não precisa ir também, Sumire-san?"
10043050-323 = "!!!"
10043050-324 = "[s] \"Quando você diz 'aquela direção'...\""
10043050-325 = "Aquele assento que se destaca!"
10043050-330 = "Aquele lugar é..."
10043050-331 = "[s] \"O assento atrás da rede de proteção...?\""
10043050-332 = "Isso mesmo!"
10043050-333 = "Se eu cantar o hino de lá, a voz vai ecoar muito bem!"
10043050-340 = "(As outras vendedoras estão indo para os assentos com a melhor vista do estádio...)"
10043050-344 = "(Ou seja...?)"
10043050-352 = "Sensei! Sumire-senpai! Acabei de receber um contato do culpado!"
10043050-353 = "Ele disse coisas sem sentido de forma unilateral novamente, mas..."
10043050-355 = "Pode ter havido uma pista no meio disso!"
10043050-356 = "[s] \"Sério!?\""
10043050-357 = "Bom trabalho, Rei-san. #nEntão, qual seria a pista...?"
10043050-358 = "O sinal de rádio! Enquanto eu circulava pelo estádio durante a chamada..."
10043050-359 = "O ruído mudava dependendo do local!"
10043050-360 = "No lugar onde o ruído for menor, certamente..."
10043050-365 = "Você vai analisar a condição do sinal para identificar a localização, não é?"
10043050-366 = "[s] \"Então, o próximo passo é...!\""
10043050-367 = "Sim, treinador."
10043050-368 = "A próxima ligação será decisiva!"
10043050-370 = "Desta vez, vamos descobrir onde o culpado está!"
