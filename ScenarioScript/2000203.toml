[translation]
2000203-1 = "Elixir da Imortalidade"
2000203-2 = "Laboratório da Saya"
2000203-3 = "Ei, Sensei! Eu estava te esperando."
2000203-4 = "Como eu te avisei, finalmente, desta vez eu realmente consegui criar o elixir da imortalidade!"
2000203-5 = "Vai perguntar se a pele vai ficar dourada de novo?#nNão, não, olhe só para o Nezuke."
2000203-7 = "Com esse pelo brilhante e esses olhos cintilantes... você não acha que ele deve ter voltado a ser como era quando filhote?"
2000203-8 = "…Diz que não dá para saber a idade porque ele é um rato?#nNada disso, olhe bem."
2000203-10 = "[s] Perguntar a idade do Nezuke."
2000203-11 = "A idade do Nezuke? Eu o crio desde que eu tinha 10 anos, então ele deve ter pelo menos uns 6 anos, não acha?"
2000203-12 = "Pensando bem, para um rato, ele já é um vovô bem velhinho..."
2000203-13 = "Mas graças ao elixir que eu o fiz tomar diligentemente para os meus experimentos, o Nezuke ainda está cheio de energia.#nNão é, Nezuke?"
2000203-14 = "Nezuke não responde, ele parece estar assustado."
2000203-15 = "Nezuke...! Por que você fica calado logo agora?#nSe alguém de fora vir, vai parecer que eu estou te maltratando!"
2000203-16 = "…Hum? Se eu às vezes prendo o Nezuke em bombas e as arremesso?"
2000203-17 = "Isso não é maltrato! Ele só estava me ajudando com o experimento. Hahaha."
2000203-18 = "O Nezuke é um assistente fiel que me ajuda com as minhas pesquisas.#nNão é, Nezuke?"
2000203-19 = "Como sempre, Nezuke não responde, ele parece estar assustado."
2000203-20 = "Ah, seu... se não vai abrir a boca, eu vou te forçar a dizer que sim!"
2000203-21 = "[s] Perguntar sobre o elixir da imortalidade."
2000203-22 = "Ah, é verdade. Eu quase esqueci."
2000203-23 = "Aqui, este é o elixir da imortalidade que desenvolvi desta vez."
2000203-26 = "Saya entregou um frasco colorido e suspeito."
2000203-27 = "[s1] \"……。\"\n[s2] \"……Desta vez realmente funciona, né?\""
2000203-28 = "Você ainda duvida de mim? Este remédio já foi testado no Nezuke, então não precisa se preocupar."
2000203-29 = "Você ainda duvida de mim? Este remédio já foi testado no Nezuke, então não precisa se preocupar."
2000203-30 = "Desta vez, você com certeza vai voltar a ser um estudante do ensino médio, Sensei!"
2000203-31 = "[s] Beber o remédio."
2000203-35 = "E então? Sente que rejuvenesceu?"
2000203-36 = "[s] \"Minha mão...\""
2000203-37 = "Sua mão?"
2000203-38 = "[s] \"Estão nascendo pelos cinzas na minha mão!\""
2000203-39 = "Pelos cinzas? Não pode ser..."
2000203-40 = "Os ingredientes que coloquei nesta poção foram, se não me engano, patas traseiras de sapo, raízes de prímula, um punhado de pelos do Nezuke, e então..."
2000203-41 = "Ah, não, eu me confundi! Por engano, eu não fiz o elixir da imortalidade, mas sim uma poção que faz crescer pelos cinzas e brilhantes pelo corpo todo!"
2000203-42 = "O-o que eu faço, Sensei? V-você quer que eu traga uma lâmina de barbear?"
2000203-43 = "[s] Pedir para voltar ao normal."
2000203-47 = "A-ahhh! Não chegue perto! Você parece um gato gigante e assustador!"
