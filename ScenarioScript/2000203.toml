[translation]
2000203-1 = "不老不死の霊薬"
2000203-2 = "サヤの研究室"
2000203-3 = "やあ、先生！待っていたのだ。"
2000203-4 = "連絡した通り、ぼく様はようやく、今度こそ本当に不老不死の霊薬を作るのに成功したのだ！"
2000203-5 = "また肌が金色に変わるのかって？#n違う違う、このネズ助を見てみて。"
2000203-7 = "このツヤツヤな毛と、キラリと輝く目……幼い頃のネズ助に戻ったに違いない、と思わない？"
2000203-8 = "……ネズミだから歳が分からないって？#nそんなことないのだ、ほらちゃんと見て。"
2000203-10 = "[s] ネズ助の年齢を聞く。"
2000203-11 = "ネズ助の年齢？ぼく様が10歳の時から飼ってたから、少なくとも6歳は越えてるんじゃないかな？"
2000203-12 = "そう考えると、ネズミにしてはまあまあ歳を取ったおじいちゃんネズミなのだ……。"
2000203-13 = "でもぼく様が実験のためにこまめに飲ませた霊薬のおかげで、ネズ助は今でも全然元気なのだ。#nそうだろう、ネズ助？"
2000203-14 = "ネズ助の返事がない、怯えているようだ。"
2000203-15 = "ネズ助ぇ……！どうしてこのタイミングで口をつぐむのだ？#n知らない人が見たらぼく様がお前をいじめてるみたいじゃないか！"
2000203-16 = "……うん？たまに爆弾にネズ助をくっつけて投げてないかって？"
2000203-17 = "あれはいじめじゃない！ただ実験に付き合ってもらっただけなのだ。ふっふっふっ。"
2000203-18 = "ネズ助は忠実な助手として、ぼく様の実験を手伝ってくれてるだけなのだ。#nそうだろう、ネズ助？"
2000203-19 = "相変わらずネズ助の返事がない、怯えているようだ。"
2000203-20 = "こいつっ、口を開かないなら、無理やりにでもそう言わせてやるのだ！"
2000203-21 = "[s] 不老不死の霊薬について聞く。"
2000203-22 = "あ、そうだった。忘れるとこだったのだ。"
2000203-23 = "さあ、これが今回開発した不老不死の霊薬なのだ。"
2000203-26 = "サヤが怪しげな、色鮮やかなフラスコを渡してきた。"
2000203-27 = "[s1] \"……。\"\n[s2] \"……今回は本当に効果があるんだよね？\""
2000203-28 = "まだぼく様を疑ってるのだ？今回の薬はすでに、ネズ助でも実験済みだから心配無用なのだ。"
2000203-29 = "まだぼく様を疑ってるのだ？今回の薬はすでに、ネズ助でも実験済みだから心配無用なのだ。"
2000203-30 = "今度こそ、高校生の頃の先生に戻れるはずだから！"
2000203-31 = "[s] 薬を飲む。"
2000203-35 = "さて、どう？若くなった感じする？"
2000203-36 = "[s] \"手に……。\""
2000203-37 = "手に？"
2000203-38 = "[s] \"手に灰色の毛が生えてる！\""
2000203-39 = "灰色の毛？そんなはずが……。"
2000203-40 = "この秘薬に入れた材料は確か、カエルの後ろ足、月見草の根っこ、ネズ助の毛を一握り、それから……。"
2000203-41 = "うわっ、勘違いしてた！間違えて不老不死の霊薬じゃなくて、全身にツヤツヤの灰色の毛が生える霊薬を作ってしまったのだ！"
2000203-42 = "ど、どうしよう、先生？か、剃刀とか持ってくる？"
2000203-43 = "[s] 体を元に戻してと言う。"
2000203-47 = "う、うわぁっ！近寄らないで！巨大な化け猫みたいで怖いのだ！"
