[translation]
201020-1 = "Episódio 2; O Dia de Folga da Administradora-Chefe (2)"
201020-2 = "Em frente ao prédio do Conselho Estudantil Federal"
201020-3 = "(Sábado de manhã)"
201020-4 = "(A figura de Rin está parada em frente ao prédio...)"
201020-8 = "[ns] \"Rin...?\""
201020-9 = "……É um mal-entendido."
201020-10 = "Dá para ver pela minha cara. Portanto, é um mal-entendido. #nPrimeiro, deixe-me explicar."
201020-11 = "[s] \"Vamos ouvir, então.\""
201020-12 = "Esta manhã, quando acordei no dormitório, tentei vestir meu uniforme."
201020-13 = "Mas Aoi — não, a Chefe do Departamento Financeiro disse que \"isso não seria diferente de trabalhar\" e levou todos os meus uniformes embora..."
201020-14 = "……Eu não tive escolha a não ser vestir isto. Por favor, entenda."
201020-15 = "[s1] \"Ah, eu acho que está ótimo.\"\n[s2] \"Combina muito com você, está uma gracinha.\""
201020-18 = "…………."
201020-19 = "……Repito, não pense que isto é um encontro."
201020-20 = "[s] \"Tudo bem. Eu estou pensando que é um encontro.\""
201020-21 = "O quê...!"
201020-22 = "Haa... Vou fingir que não ouvi isso."
201020-23 = "Se eu for reagir a tudo, meu dia de folga vai acabar só com isso."
201020-24 = "……Então, quais são os planos para hoje?"
201020-25 = "[s] \"Ué? Eu que tenho que decidir para onde vamos?\""
201020-26 = "Não foi você quem me convidou, Sensei?"
201020-27 = "Não me diga que..."
201020-28 = "Se você não tem um plano, eu vou embora —"
201020-29 = "[s3] \"N-não! Eu preparei um plano perfeito!\"\n[s4] \"Preparei o melhor roteiro com a perspectiva de um local!\""
201020-32 = "Perspectiva de um local..."
201020-33 = "Sinto que vivo em D.U. há mais tempo que você, mas..."
201020-34 = "……Não, experimentar D.U. sob a perspectiva do Sensei também não é ruim."
201020-39 = "Então, vamos?"
201020-41 = "Distrito Shiratori - Beco da periferia da antiga Lamini Town"
201020-44 = "Aqui é...?"
201020-45 = "[s5] \"É um ponto de comida de rua em Lamini Town.\"\n[s6] \"É um lugar onde você pode aproveitar várias comidas de barraca.\""
201020-48 = "Já tinha ouvido falar, mas... não sabia que era tão movimentado."
201020-49 = "Tantas barracas... e tem até filas em alguns lugares."
201020-50 = "Hum... parece que seria bom revisar a distribuição da equipe de segurança."
201020-51 = "Mais tarde, entrarei em contato com a Valkyrie —"
201020-52 = "[s] \"Eu queria que você esquecesse o trabalho hoje...\""
201020-56 = "Oh, Sensei."
201020-57 = "Sozinho de novo? Se ainda não comeu, que tal aqui? Vou te dar um desconto!"
201020-58 = "[s7] \"Olá.\"\n[s8] \"Hoje estou acompanhado de uma aluna.\""
201020-61 = "Hã? Ei, ei, por que você veio para Lamini?"
201020-62 = "Nessas horas, você deveria levar ela a um lugar decente!"
201020-63 = "Eu sei que você é um professor muito popular entre as alunas, mas... #nmesmo assim, comer em uma barraca de rua não é um pouco falta de delicadeza?"
201020-64 = "Desse jeito, a aluna vai acabar perdendo o interesse em você, sabia?"
201020-65 = "[s] \"Vou levar isso em consideração...\""
201020-66 = "(...Parece que você é bem próximo dos cidadãos, não é?)"
201020-69 = "[ns] \"O que você recomenda para hoje?\""
201020-70 = "Bem... que tal o yakisoba de frutos do mar? #nTrouxemos lulas frescas do Porto Kanezaki."
201020-71 = "[s] \"Então, por favor, dois desses!\""
201020-72 = "Fechado! Sempre às ordens!"
201020-80 = "Aqui está, demorou! Dois yakisobas de frutos do mar! Comam enquanto está quente!"
201020-81 = "Ah, muito obrigada."
201020-85 = "……Falando nisso, faz tempo que não como yakisoba."
201020-86 = "[s9] \"Ah, desculpe. Acabei pedindo sem perguntar...\"\n[s10] \"Por acaso você não gosta de yakisoba?\""
201020-89 = "Não, não é isso."
201020-90 = "É que, normalmente, eu só como coisas práticas que consigo comer enquanto trabalho, então..."
201020-91 = "Quase nunca tenho a oportunidade de comer algo feito na hora assim. #nMuito menos comida de barraca."
201020-92 = "……Era diferente quando a Presidente do Conselho Estudantil Federal estava aqui."
201020-93 = "Por mais ocupada que estivesse, ela era o tipo de pessoa que sempre arranjava tempo para ir comer um lanche. #nEu também costumava comer muita comida de barraca assim com ela."
201020-97 = "Está delicioso... É um sabor nostálgico, igual ao de antigamente."
201020-98 = "Fico feliz em ouvir isso. É difícil entender o gosto dos estudantes de hoje em dia."
201020-99 = "Até pouco tempo atrás, a moda era comida super apimentada, e agora, pelo que parece, a moda é colocar queijo em tudo, não é?"
201020-100 = "Vendo essas coisas, eu ficava preocupado se deveria mudar o meu cardápio também."
201020-101 = "Acho importante se adaptar às mudanças. #nMas acredito que manter um sabor que não muda também tem o seu valor."
201020-102 = "……Não importa o quão drásticas sejam as mudanças, sempre haverá momentos em que sentiremos falta do sabor das nossas memórias."
201020-103 = "Se você diz isso, até me dá vontade de me esforçar um pouco mais, hahaha!"
201020-107 = "……A propósito, mocinha, você já veio na minha loja antes? #nSinto que já vi esse rosto em algum lugar."
201020-108 = "Ah, eu..."
201020-109 = "[s11] \"É a Rin-chan!\"\n[s12] \"Ela é uma administradora do Conselho Estudantil Federal!\""
201020-110 = "Quem é \"Rin-chan\"?"
201020-112 = "Ah, agora que você falou, já vi você no Canal Chronos. #nÉ a Presidente Interina do Conselho Estudantil Federal que apareceu na coletiva de imprensa de emergência!"
201020-113 = "Você está tão arrumada que eu nem te reconheci!"
201020-114 = "Não, não é nada disso..."
201020-115 = "Ah, aproveitando a conversa, queria te perguntar uma coisa."
201020-116 = "Teve algum problema com a rede de água de D.U.? Às vezes ela fica instável."
201020-117 = "Ontem mesmo a água cortou do nada. Pensei até em fechar a loja."
201020-118 = "Peço desculpas pelo transtorno."
201020-119 = "A restauração da Torre Sanctum, que gerencia a infraestrutura, ainda não foi concluída, #ne por isso o fornecimento de eletricidade e água pode ficar instável às vezes."
201020-120 = "Estamos trabalhando para aumentar o número de funcionários da administração, então, por favor, peço que compreenda."
201020-121 = "Ah, não, desculpe, não queria que você tivesse que se explicar tanto assim..."
201020-125 = "[ns] \"A reconstrução da Torre Sanctum não tinha terminado?\""
201020-126 = "A reconstrução do edifício foi concluída. #nNo entanto, o sistema de controle, que é a essência da Torre Sanctum, ainda não foi restaurado... #nA situação atual é que estamos usando equipamentos substitutos para improvisar."
201020-127 = "Como mencionei anteriormente, o sistema de controle da Torre Sanctum só pode ser operado pela Presidente do Conselho Estudantil Federal. #nFazer a manutenção disso e reconstruí-lo do zero são problemas de dimensões diferentes."
201020-128 = "Foi uma sorte que o sistema substituto tenha dado conta até agora... #nMas, comparado à capacidade de controle original da Torre Sanctum, ainda é insuficiente..."
201020-129 = "[ns13] (A Rin entrou no modo de trabalho...)\n[ns14] (Preciso mudar de assunto logo.)"
201020-132 = "[ns] \"Já estamos cheios, que tal irmos assistir a um filme?\""
201020-133 = "Tem alguma recomendação?"
201020-134 = "[s15] \"Tem um filme novo que está dando o que falar entre os estudantes.\"\n[s16] \"Já ouviu falar de 'As Grandes Aventuras de Schuppo'?\""
201020-137 = "Schuppo, você diz... Aquele mascote canino que foi adotado no concurso de design organizado pela Administração Rodoviária e Sala de Tráfego de D.U."
201020-138 = "Ouvi dizer que abriram o concurso público porque os \"Momo Friends\" não eram adequados para documentos oficiais..."
201020-139 = "Parece que a repercussão não foi tão boa quanto esperavam. #nDizem que vários departamentos apontaram isso como um desperdício de dinheiro público."
201020-140 = "[s17] \"Acho que a opinião varia de pessoa para pessoa...?\"\n[s18] \"Se você assistir, talvez mude de ideia!\""
201020-143 = "Sim. É uma boa oportunidade, e não seria ruim verificar a reação dos cidadãos no cinema."
201020-144 = "[s] \"Vamos esquecer o trabalho...\""
201020-146 = "(Depois disso, Rin continuou preocupada com o trabalho...)"
201020-148 = "Em frente ao cinema na cidade de D.U."
201020-149 = "[ns19] \"O conteúdo era surpreendentemente sério, né...\"\n[ns20] \"O que você achou, Rin?\""
201020-152 = "Bem..."
201020-153 = "Achei que o corredor que leva à saída de emergência era estreito demais para o tamanho do cinema."
201020-154 = "Pode se tornar um gargalo em caso de evacuação. #nVou solicitar que garantam um espaço adequado."
201020-155 = "[s] \"Você reparou nisso!?\""
201020-157 = "（Embora eu tenha andado pela cidade para mudar de assunto...）"
201020-159 = "Sobre as roupas que comprou agora há pouco, você pegou o recibo corretamente?"
201020-160 = "Para manter o controle das despesas, é melhor guardar todos os recibos."
201020-161 = "Sim? Tem alguém que não quer que os recibos sejam vistos...?"
201020-162 = "Não me diga que está falando dos funcionários do departamento financeiro?"
201020-165 = "Sumomo, estou no Distrito Central de Aoba agora."
201020-166 = "A Torre Seiun não deveria ter sido demolida no mês passado?#nPor que ela ainda está de pé?"
201020-167 = "……Sim? Adiamento? As negociações com a empreiteira sobre os custos não avançaram, é isso?"
201020-168 = "……Isso não me foi reportado."
201020-169 = "……Por favor, envie um relatório detalhado até a próxima terça-feira."
201020-171 = "（Rin parecia não estar conseguindo aproveitar o feriado por causa do trabalho no Conselho Estudantil Geral）"
201020-173 = "[ns21] （Eu não pretendia vir aqui, mas...）\n[ns22] （Para tirar a Rin do trabalho, não tive escolha!）"
201020-176 = "……Sensei, onde estamos?"
201020-178 = "[ns] \"É um fliperama!\""
201020-180 = "[ns23] \"Falando em encontro no feriado, é fliperama!\"\n[ns24] \"Você já veio a um fliperama antes?\""
201020-181 = "Como eu disse, não é um encontro... não, esqueça."
201020-182 = "……Um fliperama, é? É a minha primeira vez."
201020-183 = "Não, é a primeira vez mesmo."
201020-184 = "[s] \"Por quê!?\""
201020-185 = "……Porque nunca tive oportunidade."
201020-186 = "E também não tinha um interesse especial."
201020-187 = "Como não era algo que me fizesse falta no dia a dia, nunca pensei em gastar meu tempo com isso."
201020-188 = "[s25] \"Então quer dizer que tem coisas que a Rin não conhece.\"\n[s26] \"Então...\""
201020-194 = "[ns27] \"Vamos disputar no 'Student Fighter 2'!\"\n[ns28] \"Quem perder terá que atender a um pedido do vencedor!\""
201020-197 = "Sim? Por que isso de repente?"
201020-198 = "Eu nem sei como operar isso, o que você está..."
201020-199 = "[s29] \"Não tem problema se quiser fugir.\"\n[s30] \"Se tem medo da derrota, é só admitir.\""
201020-202 = "Não vou cair em uma provocação tão óbvia."
201020-206 = "Para começar, não entendo o motivo de apostar em um jogo.#nSe jogássemos normalmente—"
201020-207 = "Hã? Ter algo em jogo torna as coisas mais sérias?"
201020-208 = "Que exagero... isso soa exatamente como alguém que eu conheço—"
201020-210 = "Ei, ei, Rin-chan! Vamos jogar Othello?#nAchei no depósito!"
201020-211 = "Então vamos disputar! Quem perder paga o suco!"
201020-212 = "Hã? Porque se não for assim, você vai jogar de qualquer jeito, né?"
201020-213 = "Para tirar o seu melhor, Rin-chan... vamos nessa!"
201020-215 = "Uwaaaa... eu perdi!"
201020-218 = "……Desde que esteja dentro dos limites do bom senso, tudo bem."
201020-219 = "[s] \"Limites do bom senso...?\""
201020-220 = "Exatamente o que eu disse. Pagar um suco, trocar de turno no trabalho, coisas assim..."
201020-221 = "Mesmo sendo o Sensei, acredito que você não faria um pedido absurdo."
201020-225 = "Não nego que ter uma recompensa adequada torna as coisas mais divertidas."
201020-226 = "Já que viemos ao fliperama, vou acompanhar você por uma partida."
201020-231 = "Então, a primeira partida servirá como treino para os controles..."
201020-233 = "<ROUND 1 FIGHT!>"
201020-238 = "Entendo, então é assim que se usa a habilidade..."
201020-243 = "……Então é assim que se desvia dos ataques."
201020-244 = "……Entendo."
201020-246 = "<[USERNAME] WIN!>"
201020-247 = "……Continue."
201020-249 = "<ROUND 2 FIGHT!>"
201020-250 = "Vou manter distância... e pressionar."
201020-255 = "A guarda baixa está cheia de aberturas..."
201020-262 = "<Nanagami Rin VENCEU!>"
201020-263 = "<ROUND FINAL!>"
201020-268 = "……."
201020-274 = "…………."
201020-285 = "<Nanagami Rin Perfeito!>"
201020-287 = "[ns31] \"Sem levar dano... e eu perdi!?\"\n[ns32] \"É mesmo a sua primeira vez!?\""
201020-290 = "Sim, eu já disse antes. É a minha primeira vez."
201020-291 = "Para começar, é a primeira vez que jogo um jogo como este. #nÉ simples quando você se acostuma."
201020-292 = "Como o número de processamentos paralelos é baixo, foi fácil me concentrar. #nComparado a isso, o trabalho no Conselho Estudantil Federal é..."
201020-293 = "[s33] \"Que talento assustador...\"\n[s34] \"Talvez a Rin tenha talento para ser uma gamer genial...\""
201020-296 = "Você está me superestimando. Comparada a alguém que leva os jogos a sério, nem de longe."
201020-297 = "Por exemplo――"
201020-301 = "...Mudando de assunto, posso receber a recompensa de agora pouco?"
201020-302 = "[s35] \"Não me importo, mas...\"\n[s36] \"Na frente dos outros... tudo bem?\""
201020-305 = "O que você está pensando!"
201020-306 = "Haa... venha comigo."
201020-307 = "Faz tempo que não vejo uma pessoa que quero encontrar."
201020-309 = "Próximo episódio: O Gambito da Rainha"
