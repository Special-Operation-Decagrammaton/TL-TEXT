[translation]#[Texto Final. - Filipe 12/07.]
201020-1 = "Episódio 2; A Folga da Administradora-Chefe (2)"
201020-2 = "Em frente ao prédio do Conselho Estudantil Geral"
201020-3 = "(Sábado de manhã)"
201020-4 = "(Parada em frente ao prédio, Rin estava――)"
201020-8 = "[ns] \"Rin……? Mas que belezinha é es……\""
201020-9 = "……É um mal-entendido."
201020-10 = "Seu rosto diz tudo. Por isso repito: é um mal-entendido.#nPrimeiro, permita-me explicar."
201020-11 = "[s] \"Sou todo ouvidos.\""
201020-12 = "Hoje de manhã, ao acordar no dormitório, fui vestir meu uniforme."
201020-13 = "Mas a Aoi―― digo, a Chefe de Finanças disse que \"assim seria o mesmo que trabalhar\"#ne levou todos os meus uniformes embora……"
201020-14 = "……Não me restou opção além desta roupa.#nPeço que compreenda."
201020-15 = "[s1] \"Quê? Por mim você rasgava as fardas e andava assim pra sempre.\"\n[s2] \"O visual ficou perfeitamente fofo e realçou a sua beleza.\""
201020-18 = "…………"
201020-19 = "……Repito mais uma vez: não considero isto um encontro."
201020-20 = "[s] \"Tudo bem. Pode negar o quanto quiser, mas pra mim isso é um encontro.\""
201020-21 = "O quê……!"
201020-22 = "Haa…… vou fingir que não ouvi isso."
201020-23 = "Se eu for reagir a cada gracinha, a folga acaba antes de começar."
201020-24 = "……E então, qual é o plano de hoje?"
201020-25 = "[s] \"Opa. Até o roteiro sou eu que decido?\""
201020-26 = "O convite partiu de você, Sensei, não?"
201020-27 = "Não me diga que……"
201020-28 = "Se estiver sem plano nenhum, vou voltar para casa――"
201020-29 = "[s3] \"N-Não! Tá tudo planejadinho!\"\n[s4] \"Preparei o roteiro perfeito de quem é da área!\""
201020-32 = "Visão de quem é da área……"
201020-33 = "Tenho a impressão de que EU vivo no D.U. há mais tempo que você……"
201020-34 = "……Não. Conhecer a D.U. pela sua perspectiva, Sensei, também não é má ideia."
201020-39 = "Bem, vamos?"
201020-41 = "Distrito de Shiratori - Vielas da antiga Vila Ramini"
201020-44 = "O que é este lugar……?"
201020-45 = "[s5] \"Bem-vinda ao paraíso gorduroso da comida de rua de Ramini.\"\n[s6] \"Uma selva gastronômica sem leis sanitárias chatas onde tudo é saboroso!\""
201020-48 = "Eu já tinha ouvido falar…… mas não imaginava tanto movimento."
201020-49 = "Quantas barracas…… algumas até com fila."
201020-50 = "Hm…… seria bom revisar o posicionamento do pessoal da segurança."
201020-51 = "Mais tarde, aviso a Valkyrie――"
201020-52 = "[s] \"Hoje eu queria você longe do trabalho……\""
201020-56 = "Opa, Sensei!"
201020-57 = "Solteiro e faminto na praça de novo? Se ainda não comeu, cola aqui! Faço um precinho!"
201020-58 = "[s7] \"Boa tarde, chefe.\"\n[s8] \"Hoje não rola ser solteirão, eu trouxe uma garota especial comigo!\""
201020-61 = "Hã? Qualé, por que diabos vieram pra Ramini?"
201020-62 = "Nessas horas, tem que levar a menina num lugar chique!"
201020-63 = "Sei que você é esse professor famoso, queridinho da estudantada.#nMas levar a aluna pra comer em barraca?#nCadê a sensibilidade?"
201020-64 = "Desse jeito, uma hora as alunas enjoam de você, hein!"
201020-65 = "[s] \"Os conselhos doerão no orgulho, chefe…… Vou gravar isso na memória……\""
201020-66 = "(……Pelo visto, o Sensei é próximo até dos cidadãos.)"
201020-69 = "[ns] \"O que recomenda hoje?\""
201020-70 = "Deixa eu ver…… que tal um yakisoba de frutos do mar?#nCheguei com um monte de lula fresquinha do porto de Kanezaki."
201020-71 = "[s] \"Então vão ser dois, por favor!\""
201020-72 = "É pra já! Obrigadão!"
201020-80 = "Aí, saindo! Dois yakisobas de frutos do mar! Comam enquanto tá quente!"
201020-81 = "M-Muito obrigada."
201020-85 = "……Aliás, faz bastante tempo que não como um yakisoba."
201020-86 = "[s9] \"Ah, foi mal. Pedi sem te consultar……\"\n[s10] \"Por acaso não gosta de yakisoba?\""
201020-89 = "Não, não é isso."
201020-90 = "É que normalmente só como coisas práticas#nque dá pra comer enquanto trabalho……"
201020-91 = "Quase não tenho a oportunidade de comer algo feito na hora.#nAinda mais comida de barraquinha."
201020-92 = "……Na época da Presidente do Conselho Estudantil Geral, era diferente."
201020-93 = "Por mais ocupada que estivesse, ela sempre arranjava tempo pra sair pra um lanche.#nEu comi muita comida de rua como esta, junto com ela."
201020-97 = "Delicioso…… o mesmo sabor nostálgico de antigamente."
201020-98 = "Fico feliz! O gosto da molecada de hoje tá cada vez mais difícil de entender."
201020-99 = "Outro dia a moda era pimenta extrema; agora é enfiar queijo em tudo, né não?"
201020-100 = "Vendo essas coisas, fico na dúvida se devia mudar minhas receitas também."
201020-101 = "Acho importante se adaptar às mudanças.#nMas proteger um sabor que não muda tem exatamente o mesmo valor."
201020-102 = "……Por mais brusca que seja a mudança#nsempre há dias em que sentimos falta do sabor das lembranças."
201020-103 = "Ouvindo isso, até me dá ânimo pra continuar na labuta, hahaha!"
201020-107 = "……Aliás, mocinha, você já veio na minha barraca antes?#nTenho a sensação de que te conheço de algum lugar."
201020-108 = "Ah, eu……"
201020-109 = "[s11] \"É a Rinzinha!\"\n[s12] \"É a administradora do Conselho Estudantil Geral chata que manda e desmanda!\""
201020-110 = "Quem aqui é \"Rinzinha\"?"
201020-112 = "Ahh, é verdade, já te vi no Canal Kronos!#nA Presidente interina que apareceu naquela coletiva de emergência!"
201020-113 = "Como cê tá toda arrumada, nem reconheci!"
201020-114 = "Não, isto não é o que――"
201020-115 = "Ah, é! Aproveitando o papo, deixa eu te perguntar."
201020-116 = "Aconteceu algo com a água de D.U.?#nDe vez em quando o fornecimento falha."
201020-117 = "Ontem mesmo cortou do nada.#nQuase que fechei a barraca por causa disso."
201020-118 = "Pedimos desculpas pelo transtorno."
201020-119 = "A restauração da Torre Sanctum, que gere a infraestrutura, ainda não terminou.#nPor isso, às vezes o fornecimento de energia e água fica instável."
201020-120 = "Estamos reforçando a equipe de manutenção; contamos com a sua paciência."
201020-121 = "Ah, não…… te fazer falar tudo isso, agora até me sinto mal……"
201020-125 = "[ns] \"A reconstrução da Torre Sanctum não tinha acabado?\""
201020-126 = "A reconstrução do prédio está concluída.#nMas o sistema de controle, a essência da Torre Sanctum, ainda não foi restaurado……#nHoje seguimos improvisando com equipamentos substitutos."
201020-127 = "Como já expliquei, o sistema de controle da Torre Sanctum#nsó pode ser operado pela Presidente do Conselho Estudantil Geral.#nFazer a manutenção dele e reconstruí-lo são problemas de dimensões diferentes."
201020-128 = "Foi uma sorte no meio do azar o sistema substituto dar conta……#nMas comparado à capacidade original da Torre Sanctum, está longe de ser o bastante……"
201020-129 = "[ns13] (A Rin entrou em modo de trabalho……)\n[ns14] (Preciso mudar de assunto, rápido!)"
201020-132 = "[ns] \"Agora que estamos de barriga cheia, que tal um cinema?\""
201020-133 = "Tem alguma recomendação?"
201020-134 = "[s15] \"Tem um filme novo que é febre entre as alunas.\"\n[s16] \"Já ouviu falar de \"As Grandes Aventuras de Shuppo\"?\""
201020-137 = "Shuppo…… o cachorrinho mascote escolhido no concurso da Agência Viária do D.U.\ncom o Departamento de Transporte."
201020-138 = "Soube que abriram o concurso porque os \"MomoFriends\" eram inadequados para documentos oficiais……"
201020-139 = "Mas a repercussão está aquém do esperado.#nVários setores já apontaram o projeto como desperdício de dinheiro público."
201020-140 = "[s17] \"Gosto é gosto, né……?\"\n[s18] \"Vendo na prática, vai que mudam de ideia!\""
201020-143 = "Sim. É uma boa oportunidade de conferir no cinema a reação dos cidadãos."
201020-144 = "[s] \"Esquece o trabalho um pouquinho……\""
201020-146 = "(Depois disso, Rin continuou com a cabeça no trabalho o tempo todo……)"
201020-148 = "Em frente ao cinema do D.U."
201020-149 = "[ns19] \"Era mais sério do que eu esperava……\"\n[ns20] \"O que achou, Rin?\""
201020-152 = "Vejamos……"
201020-153 = "Para o tamanho da sala, o corredor até a saída de emergência me pareceu estreito."
201020-154 = "Pode virar um gargalo numa evacuação.#nVou solicitar a adequação do espaço."
201020-155 = "[s] \"Isso que te preocupou?!\""
201020-157 = "(Rodamos a cidade pra tentar mudar de assunto, mas……)"
201020-159 = "A roupa que comprou agora há pouco…… pegou o recibo direitinho?"
201020-160 = "Para controlar os gastos, é melhor guardar todos os recibos juntos."
201020-161 = "Como? Existe gente que não quer ter os recibos vistos……?"
201020-162 = "Não estamos falando de funcionários do Departamento de Finanças, estamos?"
201020-165 = "Sumomo, estou agora no distrito central de Aoba."
201020-166 = "A Torre Seiun não seria demolida no mês passado?#nPor que ela ainda está de pé?"
201020-167 = "……Como? Adiada? A negociação de custos com a empreiteira não avançou, é?"
201020-168 = "……Não recebi relatório algum sobre isso."
201020-169 = "……Entregue um relatório completo do caso até terça-feira que vem."
201020-171 = "(O trabalho do Conselho não deixava Rin aproveitar a folga de jeito nenhum)"
201020-173 = "[ns21] (Eu não pretendia ir lá, mas……)\n[ns22] (É o jeito, se eu quero tirar a Rin do trabalho!)"
201020-176 = "……Sensei, o que é aqui?"
201020-178 = "[ns] \"Um fliperama!\""
201020-180 = "[ns23] \"Encontro de folga pede fliperama!\"\n[ns24] \"Já veio num fliperama antes?\""
201020-181 = "Já falei que não é um encontro…… quer saber? Esqueça."
201020-182 = "……Um fliperama. É a primeira vez que venho."
201020-183 = "Não, é a primeira vez."
201020-184 = "[s] \"Como assim?!\""
201020-185 = "……Nunca tive a oportunidade."
201020-186 = "Também nunca tive interesse particular."
201020-187 = "Era algo que não fazia falta na minha vida#nentão nunca pensei em investir tempo nisso."
201020-188 = "[s25] \"Então até você tem seus pontos fracos.\"\n[s26] \"Nesse caso…… Deixa que o Mestre te ensina a viciar!\""
201020-194 = "[ns27] \"Te desafio um X1 no \"Student Fighter 2\"!\"\n[ns28] \"Quem perder atende um pedido de quem ganhar!\""
201020-197 = "Como é? Do nada?"
201020-198 = "Eu nem conheço os controles, o que pretende com isso……"
201020-199 = "[s29] \"Pode fugir se quiser.\"\n[s30] \"Se teme a derrota, basta admitir.\""
201020-202 = "Não caio numa provocação tão descarada."
201020-206 = "Pra começar, não vejo motivo pra apostar na vitória.#nSe jogarmos normalmente――"
201020-207 = "Hã? Que ter algo em jogo deixa a disputa mais séria?"
201020-208 = "Que exagero…… parece até uma certa pessoa falando――"
201020-210 = "Ei, ei, Rinzinha! Bora jogar um jogo de Othello ilegal?#nQue eu achei no depósito!?"
201020-211 = "Então é um X1!#nQuem perder paga um pastel com caldo de cana pra quem ganhar!"
201020-212 = "Quê? Ah, é que sem isso você não vai levar a sério!"
201020-213 = "É pra arrancar todo o seu potencial, Rinzinha…… X1!"
201020-215 = "Aaahh…… eu perdiii!"
201020-218 = "……Se for dentro do razoável, tudo bem."
201020-219 = "[s] \"Como assim, \"dentro do razoável\"……?\""
201020-220 = "É literal. Pagar um pastel com caldo de cana, trocar uma tarefa de trabalho……"
201020-221 = "Presumo que nem você faria um pedido fora do razoável, Sensei."
201020-225 = "Não que eu não entenda que uma recompensa moderada torna tudo mais divertido."
201020-226 = "Já que viemos ao fliperama, vou acompanhar você em uma partida."
201020-231 = "Bem, que a primeira partida sirva de treino dos comandos……"
201020-233 = "<ROUND 1 FIGHT!>"
201020-238 = "Entendi, com isto se usa a skill……"
201020-243 = "……E assim se esquiva dos ataques."
201020-244 = "……Compreendo."
201020-246 = "<[USERNAME] WIN!>"
201020-247 = "……Continue, por favor."
201020-249 = "<ROUND 2 FIGHT!>"
201020-250 = "Manter distância…… e pressionar."
201020-255 = "Sua guarda baixa está cheia de brechas……"
201020-262 = "<Nanagami Rin WIN!>"
201020-263 = "＜FINAL ROUND!>"
201020-268 = "……"
201020-274 = "…………"
201020-285 = "<Nanagami Rin Perfect!>"
201020-287 = "[ns31] \"Perdi…… sem causar NENHUM dano?!\"\n[ns32] \"É mesmo sua primeira vez?!\""
201020-290 = "Sim, eu já disse, não disse? É a primeira vez."
201020-291 = "Aliás, é meu primeiro jogo desse tipo.#nAcostumando, é bem simples."
201020-292 = "Com poucos processos em paralelo, é fácil manter o foco.#nJá as tarefas do Conselho Estudantil Geral, por outro lado……"
201020-293 = "[s33] \"Que talento assustador……\"\n[s34] \"Vai ver você é uma gamer genial, Rin……\""
201020-296 = "Você me superestima. Comparada a quem leva os jogos a sério, estou longe."
201020-297 = "Por exemplo――"
201020-301 = "……Já posso cobrar a recompensa de agora há pouco?"
201020-302 = "[s35] \"Pode, mas……\"\n[s36] \"Na frente de todo mundo assim……? Pode isso?\""
201020-305 = "O que está pensando?!"
201020-306 = "Haa…… apenas me acompanhe."
201020-307 = "Tem uma pessoa que faz tempo que eu quero rever."
201020-309 = "Próximo Episódio;Gambito da Rainha"