[translation]
201020-1 = "Episódio 2: O Fim de Semana da Chefe de Administração (2)"
201020-2 = "Pátio em frente ao Prédio do Conselho Estudantil Geral"
201020-3 = "（Manhã de Sábado）"
201020-4 = "（A Rin me aguarda em pé diante do prédio, mas o visual dela...）"
201020-8 = "[ns] \"Rin...? Mas que belezinha é es...\""
201020-9 = "……Isso é um mal-entendido."
201020-10 = "Pela cara suja do senhor, a sua mente já deturpou a imagem inteira. Portanto, mal-entendido.#nPermita-me purificar a sua visão dos fatos."
201020-11 = "[s] \"Sou todo ouvidos.\""
201020-12 = "Hoje pela manhã, ao abrir os olhos, direcionei-me ao guarda-roupa para vestir a farda."
201020-13 = "Entretanto, a Aoi... ou melhor, a Chefe do Departamento de Finanças, invadiu meus aposentos, confiscou todas as peças do meu uniforme e proferiu a heresia: 'Se vestir terno, será o mesmo que ir trabalhar'."
201020-14 = "……Fui refém das circunstâncias logísticas e obrigada a vestir essa moda casual. Peço que seu cérebro não puxe conclusões indecorosas."
201020-15 = "[s1] \"Quê? Por mim você rasgava as fardas e andava assim pra sempre.\"\n[s2] \"O visual ficou perfeitamente fofo e realçou a sua beleza.\""
201020-18 = "……"
201020-19 = "……Reitero a minha ordem de ontem: pare de flertar na rua, isso Não é um encontro."
201020-20 = "[s] \"Pode negar o quanto quiser. Mas pro meu coração sedento, isso é um encontro.\""
201020-21 = "Que descarame...!"
201020-22 = "Haaah... Vou deletar esse absurdo carnal do meu cache."
201020-23 = "Se eu perder tempo repreendendo cada gracinha imoral do seu vocabulário, o sábado acabará antes mesmo de andarmos um quarteirão."
201020-24 = "……Enfim, qual a rota que o seu planejamento traçou para hoje?"
201020-25 = "[s] \"Ué? A 'auditoria' não era sua? Pensei que você me levaria pro abate.\""
201020-26 = "O arquiteto da ideia insalubre de uma 'folga em conjunto' foi o senhor."
201020-27 = "Não me diga que... você teve a audácia de aparecer de mãos abanando?"
201020-28 = "Sem um protocolo ou mapa de turismo minimamente sólido, eu encerro a excursão civil agora mes――"
201020-29 = "[s3] \"C-Calma! Eu tava zoando! O plano tá arquivado no cérebro!\"\n[s4] \"Fiz um planejamento recheado das iguarias de D.U. que só quem bate perna nas vielas sujas conhece!\""
201020-32 = "Vielas sujas..."
201020-33 = "A minha estadia e mapeamento topográfico em D.U. é vastamente superior à sua vida como turista imigratório, mas enfim..."
201020-34 = "……Mergulhar nas ruas sob a lente excêntrica da Schale possui valor estatístico.#nPode ser no mínimo tolerável."
201020-39 = "Lidere a marcha, Sensei."
201020-41 = "Distrito de Shiratori - Vielas Exteriores da Antiga Vila Ramini"
201020-44 = "Mas que lugar..."
201020-45 = "[s5] \"Bem-vinda ao paraíso gorduroso da comida de rua de Ramini.\"\n[s6] \"Uma selva gastronômica sem leis sanitárias chatas onde tudo é saboroso!\""
201020-48 = "Já me entregaram laudos sobre o aquecimento financeiro do setor comercial da Vila... mas a aglomeração aqui supera as margens."
201020-49 = "A densidade orgânica de pedestres e as barracas sem padronização métrica geram funis caóticos nas ruas."
201020-50 = "Hmm... Os índices criminais indicam que o contingenciamento tático precisa ser reestruturado aqui."
201020-51 = "Vou assinar um decreto provisório ordenando que a Valkyrie remaneje――"
201020-52 = "[s] \"Rin... Lembra da promessa de trancar o modo presidente no armário hoje...?\""
201020-56 = "Opa, Sensei da Schale!"
201020-57 = "Solteiro e faminto na praça de novo? Chega aí que eu dou aquela chorada na porção pra alegrar o seu sábado, campeão!"
201020-58 = "[s7] \"Boa tarde, chefe.\"\n[s8] \"Hoje não rola ser solteirão, eu trouxe uma garota especial comigo!\""
201020-61 = "Eita?! Aí você quebrou o protocolo do xaveco, garotão! Trazer a dama de honra pra encher o bucho no meio da fuligem de Ramini?!"
201020-62 = "Tira a mão do bolso! Se tá acompanhado, tem que arrastar a garota pra um bistrô com talher de prata pelo menos!"
201020-63 = "Pode até ser que você sustente a pose de 'Sensei charmoso' na escola... mas dar Yakisoba frito no papel alumínio num date é atestado de ogro, hein."
201020-64 = "Tratando o mulherio na pão-durice desse jeito, você vai virar freira logo logo!"
201020-65 = "[s] \"Os conselhos doerão no orgulho, chefe... Vou me esforçar pra virar um sugar daddy...\""
201020-66 = "（……Ele conversa com comerciantes rudimentares como se fosse do mesmo bando. Os murmúrios degradantes na rua eram 100% literais.）"
201020-69 = "[ns] \"O que as suas panelas estão chorando de bom hoje, mestre?\""
201020-70 = "A estrela do fim de semana é o Yakisoba de Frutos do Mar!#nLimpei as peixarias dos portos de Kanezaki na madruga. As lulas tão perfeitas."
201020-71 = "[s] \"Beleza, me vê dois baldes dessa perfeição aí!\""
201020-72 = "É pra já! O freguês é deus na terra!"
201020-80 = "Cuidado pra não torrar a língua! Dois Yakisoba de Frutos do Mar fervendo na chapa! Engole antes do queijo derreter!"
201020-81 = "A-Agradeço o serviço civil."
201020-85 = "……As estatísticas confirmam: ingerir Yakisoba de rua era um dado que não entrava no meu organismo há eras."
201020-86 = "[s9] \"Opa, mal aí. O cheiro me atiçou e eu saí comprando sem te perguntar...\"\n[s10] \"O seu estômago nobre torce o nariz pra comida de rua?\""
201020-89 = "Negativo. Não sofro de patologias digestivas que me impecam de digerir óleo."
201020-90 = "Apenas o meu cronograma não permite paradas biológicas desnecessárias... A minha dieta baseia-se em rações sintéticas e barras calóricas que posso mastigar enquanto analiso documentos com a outra mão..."
201020-91 = "Consumir alimentos frescos e em temperaturas ebulitivas é uma quebra radical da minha eficiência.#nQuem dirá sentar em caldeirões rústicos na rua e sujar os dedos."
201020-92 = "……Mas antigamente, as logísticas alimentares eram frequentemente rompidas por Ela."
201020-93 = "A Presidente Desaparecida contrariava as planilhas. Mesmo no meio de colapsos burocráticos, a teimosa arrastava a gente pras vielas só pra enfiar comida na boca.#nNós dividimos caloria e rimos muito nos bancos sujos dessa Vila."
201020-97 = "As pupilas gustativas não esquecem... O sal e a textura da lula.#nÉ a mesmíssima fórmula do passado..."
201020-98 = "Ouvir esse elogio limpa meu cansaço, guria! Hoje em dia, o tiozão aqui sua frio tentando entender os fetiches gustativos bizarros dessa juventude."
201020-99 = "Até ontem o delírio era entupir a carne de pimenta e sair chorando! Hoje se não afogar o macarrão numa piscina de queijo amarelo derretido, as garotas nem tiram foto!"
201020-100 = "Tava quase entrando em depressão e cogitando picotar o caderno de receitas do meu avô pra virar lanchonete hipster e não falir."
201020-101 = "O darwinismo biológico dita que adaptar-se ao mercado garante a sobrevivência celular.#nPorém, não curvar a espinha e sustentar o legado tradicional possui um valor moral e social intangível."
201020-102 = "……O mundo pode girar rápido e destruir as coisas na rua, mas a alma humana sempre vai chorar pedindo um prato que ressuscite a paz da infância dela."
201020-103 = "Mas que discurso poético de intelectual! O tiozão aqui ficou até arrepiado! Vou segurar a panela velha firme e forte, hahahaha!"
201020-107 = "……Pera aí. A sua cara não me é estranha, guria. Eu não te vi nos noticiários ou te dei troco no passado? O nariz arrebitado é o mesmo..."
201020-108 = "Ah... eu sou a oficial..."
201020-109 = "[s11] \"Ela é a Rin-chan!\"\n[s12] \"A garota engravatada chata que manda e desmanda no Conselho Estudantil!\""
201020-110 = "Quem o senhor ousa chamar publicamente de Rin-ch――"
201020-112 = "EITA GOTA SERENA! AGORA A FICHA CAIU! Eu assisti esse rosto carrancudo no pronunciamento do caos no canal da Kronos!"
201020-113 = "Misericórdia, vestida com roupinha normal de adolescente bonitinha, eu passei reto e não reconheci a Presidente Ditadora da cidade!!"
201020-114 = "Não meça as palavras para chamar meu cargo de... tsc, esquece."
201020-115 = "Pô, então já que eu tô diante da majestade, me tira uma dúvida da rua."
201020-116 = "As caldeiras fluviais de D.U. tão bichadas de novo? Esses canos têm alergia a água, porque engasgam direto."
201020-117 = "Ontem de tarde cortaram a água no meio de lavar as lulas, e eu quase tive um derrame cerebral achando que ia apodrecer tudo no calor!"
201020-118 = "O cenário sanitário é inadmissível. Eu acato toda a culpa governamental perante o senhor."
201020-119 = "Infelizmente, a Sanctum Tower, a engrenagem-mãe de Kivotos, encontra-se em estado de colapso vegetativo.#nIsso corrompe os laudos hídricos e fratura as matrizes de energia nas subestações vitais."
201020-120 = "Emitirei memorandos forçando os engenheiros a sacrificarem seus turnos para sanar esses gargalos em praça pública. Rogo pela sua clemência."
201020-121 = "A-Ah, que isso, patroa... A senhora cuspiu tanta palavra burocrática que o tiozão aqui ficou até com vergonha no coração de ter gritado do cano..."
201020-125 = "[ns] \"Mas Rin... As empreiteiras não já tinham consertado as paredes da Sanctum Tower e cimentado o abismo?\""
201020-126 = "O ferro e os alicerces arquitetônicos estão erguidos, sim.#nContudo, o cérebro que mantém a torre viva, o Sistema de Controle Primário, jaz em pedaços...#nA nossa logística deplorável se resume a rodar a cidade amarrada em fios de cobre e processadores substitutos de emergência."
201020-127 = "Como declarei nos autos oficiais, a alma e os algoritmos absolutos da Sanctum Tower acatam única e exclusivamente a biometria da Presidente Desaparecida.#nPuxar tijolos novos é o trabalho fácil; reescrever um código sagrado impenetrável sem a deusa matriz... beira a utopia."
201020-128 = "A gambiarra atual segurar a água e luz em 30% já foi um milagre militar...#nMas operando nessa patologia miserável, a estrutura inteira chora."
201020-129 = "[ns13] （O cérebro envenenado por ofícios dela ativou o Modo Presidente Burocrata...）\n[ns14] （Se eu não atirar uma distração, ela não vai piscar o resto do sábado.）"
201020-132 = "[ns] \"Chega de política e infraestrutura no meu encontro. A barriga tá cheia, bora mergulhar no escurinho do cinema pra curtir um filmezinho gostoso?\""
201020-133 = "A sua heurística de entretenimento recomenda algum material com alta aprovação estatística?"
201020-134 = "[s15] \"A cena das bilheterias tá fervendo com um lançamento unânime no gosto das alunas.\"\n[s16] \"Já cruzou com o poster do cachorrinho de 'As Excelentes Aventuras do Shuppo'?\""
201020-137 = "Shuppo... as planilhas constam. O mascote em formato de cachorro derivado da aberração do consórcio entre a Secretaria de Trânsito e Rodovias."
201020-138 = "Os parasitas do Setor de Design sugeriram a licitação do personagem dizendo que as licenças dos 'MomoFriends' dariam processo autoral no manual de rodovias..."
201020-139 = "Contudo, o relatório aponta repulsa generalizada e índices baixíssimos de aprovação.#nA ouvidoria está explodindo de comitês denunciando a obra como peculato descarado."
201020-140 = "[s17] \"Calma lá, julgamentos estéticos não obedecem laudos fiscais, né?\"\n[s18] \"Se a gente botar o olho na tela, pode rolar um apelo carismático invisível no cachorro que os engravatados perderam!\""
201020-143 = "Dado o apelo. Aproveitar o confinamento na sala de projeção para aferir a reação passional da massa jovem servirá perfeitamente como pesquisa sócio-antropológica in loco."
201020-144 = "[s] \"Sai do escritório por cinco minutos, Rin... socorro...\""
201020-146 = "（Mesmo depois do filme iniciar, a aura letal de planilhas não descolou da Rin...）"
201020-148 = "Frente ao Prédio do Cinema Central de D.U."
201020-149 = "[ns19] \"Olha, pra um mascote do Detran, o enredo escondeu umas lições pesadinhas até...\"\n[ns20] \"E então? O cérebro mastigou bem a moral da obra, Rin?\""
201020-152 = "Vou emitir meu laudo crítico..."
201020-153 = "Diante do escopo volumétrico de cadeiras estofadas, a largura cimentada do corredor leste que desemboca na porta corta-fogo foi reduzida criminosamente."
201020-154 = "Um abismo estrutural.#nEm caso de incêndio, aquilo se tornará um funil de pisoteamento letal. Vou redigir um embargo sanitário e mandar os bombeiros arrombarem o alvará deles amanhã."
201020-155 = "[s] \"VOCÊ PASSOU DUAS HORAS CALCULANDO A PLANTA DA SAÍDA DE EMERGÊNCIA AO INVÉS DE OLHAR PRA TELA?!\""
201020-157 = "（Numa tentativa suicida de fazer o chip de administradora dela queimar, forcei um tour pelas vitrines de D.U... Porém...）"
201020-159 = "Esses trajes fúteis que você empurrou no caixa. O balconista rubricou e emitiu as notas de compra sem falsificações ou supressão tributária?"
201020-160 = "Guarde esses papéis com a própria vida. Na próxima inspeção dos fundos da Schale, se eu cruzar dados soltos, você sofrerá punição da Aoi."
201020-161 = "Quê? O seu sarcasmo podre acabou de insinuar que 'certos burocratas não deixam rastro fiscal das suas bolsas de luxo'?"
201020-162 = "Está acusando cegamente e caluniando a probidade intocável das membras da Divisão Financeira?!"
201020-165 = "Sumomo, copie na frequência. Os meus pés bateram no Setor Central de Aoba."
201020-166 = "A licitação da implosão controlada da Seiun Tower tinha prazo carimbado pro calendário passado.#nPor que caralhos essa torre leprosa de concreto sujo ainda fere os meus olhos na avenida?"
201020-167 = "……Como ousa balbuciar a palavra 'adiamento'? 'Os empreiteiros barraram a retroescavadeira acusando reajuste do teto financeiro'?"
201020-168 = "……Essa blasfêmia não passou nas portas do meu escritório."
201020-169 = "……Eu quero a papelada do embargo e os testículos desse empreiteiro servidos numa bandeja na minha mesa até terça cedo. Câmbio desligo."
201020-171 = "（O veneno ditatorial das engrenagens do trabalho consumiu ela. O sábado de romance tava indo pro ralo.）"
201020-173 = "[ns21] （A minha bússola moral se recusava a afundar ela naquele antro decadente mas...）\n[ns22] （Pra desativar o cérebro dela a força, só injetando o vício das máquinas!)"
201020-176 = "……Sensei, que aglomeração barulhenta e antinatural é essa?"
201020-178 = "[ns] \"Bem-vinda ao purgatório dos viciados em dopamina e desocupados da cidade: Fliperamas!\""
201020-180 = "[ns23] \"A regra do rolê manda que o encontro sagrado só se solidifica depois de torrar a mesada numa cabine escura dessas!\"\n[ns24] \"A sua santidade já deitou as mãos num joystick de arcade sujo, Oficial Rin?\""
201020-181 = "Pela última vez neste inferno biológico, isso não é um encont――... quer saber, cansei os lábios."
201020-182 = "……Fliperama. Pelas métricas logísticas do meu passado, isso computa como minha estreia nesses arredores."
201020-183 = "Corrijo-me: é absolutamente a minha estreia."
201020-184 = "[s] \"Nem fodendo! A sua adolescência pulou toda a fase imoral e suja da rebeldia colegial?!\""
201020-185 = "……Porque as circunstâncias cerebrais nunca me guiaram ao buraco inútil."
201020-186 = "E as minhas conexões neurais repudiam o tédio inócuo e ineficaz."
201020-187 = "A sobrevivência respiratória e o andamento civilizado do Estado nunca exigiram a operação de caixas piscantes e barulhentas. O desperdício orçamentário nisso é uma abominação."
201020-188 = "[s25] \"Hahah, a muralha de gelo caiu. A invencível e temida 'Administradora de Kivotos' treme perante os botões neon!\"\n[s26] \"Deixa que o Mestre te ensina a viciar...\""
201020-194 = "[ns27] \"A carnificina será no X1 de 'Student Fighter 2'!\"\n[ns28] \"E vamos apostar a pele e a moral! Quem levar soco e perder, vira cachorrinho do ganhador e obedece a um comando submisso e vergonhoso do vencedor!\""
201020-197 = "As suas pautas de fetiches estão corrompendo a atmosfera, pare!"
201020-198 = "Como as suas engrenagens ousam coagir a autoridade máxima, desprovida de prévios tutoriais, para uma extorsão desumana num salão comercial...?"
201020-199 = "[s29] \"O botão do choro tá ali na saída. Foge da aposta com o rabo entre as pernas se quiser...\"\n[s30] \"Se o pavor de ser moída nos punhos digitais pesa, ajoelhe e peça perdão pra coroa que tá perdoado.\""
201020-202 = "Tsc. O seu condicionamento de psicologia barata e manipulativa é patético. Não passarei vergonha."
201020-206 = "Por qual razão civil forçaríamos apostas obscenas num pedaço de placa eletrônica?#A mera degustação orgânica bastar――"
201020-207 = "Ahm? 'Se não houver humilhação ou desgraça no placar final, as glândulas de adrenalina não explodem na fúria guerreira'?"
201020-208 = "Que discurso asqueroso e deprimente... o senhor replica cartilhas inteiras de uma certa viciada degenerada que eu co..."
201020-210 = "«Oe oe Rin-chan!! Bora amassar o crânio na porrada num campeonato ilegal de Othello?!#nO lixo do almoxarifado tinha as peças encardidas no canto!»"
201020-211 = "«Taca os pinos no tabuleiro! E nada de joguinho pra frouxos: quem engolir chumbo tem que falir e esvaziar a carteira na máquina pra pagar suco de luxo pra galera!!»"
201020-212 = "«Hã? Por que a aposta de agiotagem?! Ué, sem botar as roupas e o salário em jogo na partida, tu só vai empurrar o pino morto pra lá e pra cá sem suar a alma!»"
201020-213 = "«Pra tirar a Deusa Burocrática do modo letárgico e puxar os demônios dela... a aposta tem que quebrar a banca!! Bora pro X1 do inferno!!»"
201020-215 = "«Gyaaaaa!! As minhas peças foram trucidadas DE NOVO!!»"
201020-218 = "……Eu bato o martelo, desde que a penalidade respeite estritamente o código de decência e os direitos humanos fundamentais."
201020-219 = "[s] \"Como é a flexibilidade desse seu 'Código de Decência' no dicionário, Excelência...? Eu posso pedir coisas... sapecas?\""
201020-220 = "Feche as comportas do cérebro para patifarias. Exigir o custeio de bebidas enlatadas fúteis ou transferências estapafúrdias de expediente laboral são o teto legal."
201020-221 = "Mesmo sendo um adulto impulsivo com históricos suspeitos, eu exijo crer que as suas exigências jamais cruzariam a linha da humilhação pública."
201020-225 = "A sua tese evolucionária de que a 'ameaça de perda' engatilha o vício não está imune ao raciocínio lógico biológico."
201020-226 = "Como o ar sujo desta casa entrou nos meus pulmões, baixarei meu escudo burocrático para manusear as suas placas alienígenas numa partida."
201020-231 = "Vamos... O round número um está carimbado como simulação de ambientação métrica e telemetria mecânica. Inicie."
201020-233 = "<ROUND 1 FIGHT!>"
201020-238 = "Entendo... O gatilho primário espalha frames de dano na diagonal inferior se girar noventa graus... e detona a sintaxe letal."
201020-243 = "……Enquanto reverter o analógico neutraliza a física e os hitbox de invasão."
201020-244 = "……Os laudos de inputs penetraram meu cérebro. Limpo."
201020-246 = "<[USERNAME] WINS!>"
201020-247 = "……Calibração de telemetria cerebral efetuada. Prossiga sem travas de segurança."
201020-249 = "<ROUND 2 FIGHT!>"
201020-250 = "Cálculo vetorial da sua distância medíocre de escape... Supressão de ar engatilhada e barreira espacial forjada."
201020-255 = "Você escancarou a defesa nas cinturas e joelhos com latência vexatória. Esmagamento eminente em 3 milissegundos."
201020-262 = "<七神リン WINS!>"
201020-263 = "＜FINAL ROUND!>"
201020-268 = "……"
201020-274 = "…………"
201020-285 = "<七神リン Perfect!>"
201020-287 = "[ns31] \"PERFECT... A BARRA VERDE TÁ INTACTA?! VOCÊ ME MASSACROU SEM DEIXAR UM FIO DE CABELO CAIR?!\"\n[ns32] \"Rin... sua monstra... jura por deus que você nunca bateu num fliperama na vida?!\""
201020-290 = "E não foi a mesma alegação imutável que declarei agorinha? O meu batismo nessas telas profanas ocorreu sob o seu teto."
201020-291 = "As linhas arquitetônicas do design são infantis. As matrizes lógicas e de reflexo competem no nível pré-escolar.#nApós a dissecação empírica dos dados, a carne joga no automático."
201020-292 = "A matemática paralela aqui se reduz a seis gatilhos e uma barra de exaustão, deixando o foco sem interferências crônicas.#nComparado ao inferno algorítmico do Conselho Estudantil onde os números se multiplicam por milhões... os punhos digitais são um passeio calmo."
201020-293 = "[s33] \"A sua mente é psicopata e insana... que dom terrível você tem...\"\n[s34] \"Se a Rin abrisse mão da papelada civil e abraçasse a seita dos e-Sports, os times profissionais iriam beijar os pés dela como uma deusa ditadora implacável...\""
201020-296 = "Se as adulações passassem do limite, beirariam o escárnio legal. Perante mutantes viciadas que afundam ossos nas cadeiras diuturnamente na rede esportiva... o meu cérebro sucumbiria em pó."
201020-297 = "A semelhança dos cérebros alienígenas da dupla de gêmeas do Clube de Desenvolvimento de Jogos... e da maldita fantasma de hacker..."
201020-301 = "……Bom. As atas da partida dão fim ao espetáculo. Como monarca desta sessão, assumirei a extorsão do prêmio humilhante sobre o senhor. Hora de honrar o sangue derramado."
201020-302 = "[s35] \"Ugh, a derrota pesou e a coleira é sua. Manda a braba, tô preparado pra submissão...\"\n[s36] \"Só por Deus... Eu imploro, não exige aberrações ou perversões obscenas comigo num local apinhado de civis...\""
201020-305 = "O QUE A FORNALHA SUJA DO SEU CÉREBRO TÁ FANTASIANDO NUM LUGAR DESSES, SEU MARGINAL?!!"
201020-306 = "Haaah... Lacre a boca indigna e marche. O perdedor não apita na rota."
201020-307 = "Toda essa nostalgia desenterrou fantasmas na minha alma burocrática.#nExijo visitar o sarcófago de alguém muito inconveniente."
201020-309 = "Próximo Episódio: O Gambito da Rainha"