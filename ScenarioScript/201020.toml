[translation]
201020-1 = "Episode 2;The Chief Administrative Officer's Day Off (2)"
201020-2 = "In front of the General Student Council building"
201020-3 = "(Saturday morning)"
201020-4 = "(Rin stands in front of the building—)"
201020-8 = "[ns] \"Rin...?\""
201020-9 = "...It’s a misunderstanding."
201020-10 = "You can tell by looking at my face. So, it is a misunderstanding. #nPlease, let me explain first."
201020-11 = "[s] \"Let's hear it.\""
201020-12 = "I woke up in the dorms this morning and went to put on my uniform."
201020-13 = "But Aoi—no, the Head of the Finance Office—said, 'That’s no different from work,' and took all my uniforms away..."
201020-14 = "...I had no choice but to wear this. I hope you understand."
201020-15 = "[s1] \"Oh, I think it looks great, actually.\"\n[s2] \"It suits you well and you look cute.\""
201020-18 = "......."
201020-19 = "...I will reiterate: I do not consider this a date."
201020-20 = "[s] \"That's fine. I'm considering it a date.\""
201020-21 = "Wh—!"
201020-22 = "Haa… I’ll pretend I didn’t hear that."
201020-23 = "If I reacted to everything you said, my entire day off would be over before it started."
201020-24 = "...So, what is the plan for today?"
201020-25 = "[s] \"Huh? You mean I'm the one deciding where we go?\""
201020-26 = "Weren't you the one who invited me, Sensei?"
201020-27 = "Don't tell me..."
201020-28 = "If you have no plan, I shall be taking my leave—"
201020-29 = "[s3] \"N-no! I've got a perfect plan all set!\"\n[s4] \"I've prepared the best plan from a local's perspective!\""
201020-32 = "A local's perspective..."
201020-33 = "I feel like I’ve spent more time living in D.U. than you have, though..."
201020-34 = "...No, experiencing D.U. from your perspective doesn't sound too bad."
201020-39 = "Then, shall we go?"
201020-41 = "Shiratori District, Old Lamini Town Outer Alley"
201020-44 = "Where is this...?"
201020-45 = "[s5] \"It's a street food spot in Lamini Town.\"\n[s6] \"A place where you can enjoy all sorts of street food.\""
201020-48 = "I had heard of it, but... I didn't realize it was this crowded."
201020-49 = "So many stalls... and there are lines forming at some of them, too."
201020-50 = "Hmm... It seems we should review the security personnel deployment here."
201020-51 = "I'll contact Valkyrie later—"
201020-52 = "[s] \"I was hoping you'd leave work behind for today...\""
201020-56 = "Oh, Sensei."
201020-57 = "Alone again today? If you haven't eaten yet, how about my place? I'll give you a discount!"
201020-58 = "[s7] \"Hello.\"\n[s8] \"I'm with a student today.\""
201020-61 = "Huh? Hey now, what are you doing bringing her to Lamini?"
201020-62 = "When you're with someone like that, you should take them somewhere proper!"
201020-63 = "I know you're a popular teacher among the students, but still. #nDoesn't eating at a street stall lack a bit of delicacy?"
201020-64 = "Keep that up and your students will lose interest in you, you know?"
201020-65 = "[s] \"I'll keep that in mind...\""
201020-66 = "(...It seems you are quite close with the citizens.)"
201020-69 = "[ns] \"What do you recommend today?\""
201020-70 = "Let's see... how about the seafood yakisoba? #nI just got a fresh shipment of squid from Kanezaki Port."
201020-71 = "[s] \"Then, we'll take two of those!\""
201020-72 = "You got it! Thanks for your business!"
201020-80 = "Here you go, sorry for the wait! Two seafood yakisobas! Eat 'em while they're hot!"
201020-81 = "Th-thank you very much."
201020-85 = "...Come to think of it, it’s been a long time since I’ve had yakisoba."
201020-86 = "[s9] \"Oh, sorry. I just ordered without asking...\"\n[s10] \"Is yakisoba not your thing?\""
201020-89 = "No, that's not it."
201020-90 = "It's just that I usually only eat things that are quick and easy while I work..."
201020-91 = "I rarely have the chance to eat something freshly made like this. #nEspecially not street food."
201020-92 = "...It was different when the General Student Council President was around."
201020-93 = "No matter how busy she was, she was the type to make time to go grab a snack. #nI used to eat a lot of this kind of street food with her."
201020-97 = "It's delicious... It's a nostalgic taste, just like I remember."
201020-98 = "That's good to hear. It's hard to keep up with students' tastes these days."
201020-99 = "One minute it's super spicy food, the next it's all about adding cheese to everything, right?"
201020-100 = "Seeing that, I was worried if I should change my recipe too."
201020-101 = "I believe adapting to change is important. #nBut I also believe there is equal value in protecting a taste that never changes."
201020-102 = "...No matter how rapid the changes are, there are times when one longs for the taste of memories."
201020-103 = "Hearing you say that makes me want to keep at it a little longer, ha ha ha!"
201020-107 = "...By the way, miss, have you been to my shop before? #nI feel like I've seen you somewhere."
201020-108 = "Oh, I am..."
201020-109 = "[s11] \"This is Rin!\"\n[s12] \"She's an administrative officer for the General Student Council!\""
201020-110 = "Who is 'Rin'?"
201020-112 = "Oh, wait, I've seen you on Chronos Channel. #nYou're the Acting President who appeared at the emergency press conference!"
201020-113 = "You're all dressed up, so I didn't recognize you!"
201020-114 = "No, this isn't like that—"
201020-115 = "Right, while I've got you here, I wanted to ask."
201020-116 = "Is something wrong with the D.U. water supply? It's been acting up lately."
201020-117 = "The water cut out suddenly yesterday, too. I almost thought about closing the shop."
201020-118 = "I apologize for the inconvenience."
201020-119 = "The Sanctum Tower, which manages the infrastructure, has not finished its restoration, #nso there are times when electricity and water supplies become unstable."
201020-120 = "We are working on increasing the number of management staff, so please bear with us."
201020-121 = "Ah, no, I feel bad for making you say all that..."
201020-125 = "[ns] \"Isn't the reconstruction of the Sanctum Tower finished?\""
201020-126 = "The building's reconstruction is complete. #nHowever, the control system—the essence of the Sanctum Tower—has not been fully restored... #nWe are currently making do with substitute equipment."
201020-127 = "As I mentioned before, the Sanctum Tower's control system can only be handled by the General Student Council President. #nMaintaining it and rebuilding it are problems of entirely different dimensions."
201020-128 = "It is a blessing in disguise that the substitute system is holding up... #nbut it is nowhere near the original control capacity of the Sanctum Tower."
201020-129 = "[ns13] (Rin has entered work mode...)\n[ns14] (I need to change the subject quickly.)"
201020-132 = "[ns] \"I'm stuffed. Want to go see a movie?\""
201020-133 = "Do you have any recommendations?"
201020-134 = "[s15] \"There's a new movie that's the talk of the students.\"\n[s16] \"Have you heard of 'The Great Adventure of Shuppo'?\""
201020-137 = "Shuppo, you say... That’s the dog mascot adopted in the design contest hosted by the D.U. Road Management Bureau and the Traffic Office, right?"
201020-138 = "I heard they held an open call because 'Momo Friends' was deemed unsuitable for official documents..."
201020-139 = "It seems the response hasn't been as favorable as expected. #nVarious departments have pointed out that it's a waste of taxpayer money."
201020-140 = "[s17] \"Isn't it up to the individual to decide?\"\n[s18] \"You might feel differently if you actually watch it!\""
201020-143 = "Yes. It is a good opportunity, and checking the citizens' reactions at the theater wouldn't be a bad idea."
201020-144 = "[s] \"Let's leave work behind...\""
201020-146 = "(After that, Rin still seemed to be preoccupied with work...)"
201020-148 = "In front of a movie theater in D.U."
201020-149 = "[ns19] \"That was surprisingly serious content...\"\n[ns20] \"What did you think, Rin?\""
201020-152 = "Well..."
201020-153 = "I felt that the aisles leading to the emergency exits were too narrow for the size of the theater."
201020-154 = "They could become a bottleneck during an evacuation. #nI will request that they ensure sufficient space."
201020-155 = "[s] \"That's what you focused on!?\""
201020-157 = "(Even though we walked around town to change the subject...)"
201020-159 = "Did you get a proper receipt for the clothes you bought earlier?"
201020-160 = "You should keep your receipts organized to keep track of your expenses."
201020-161 = "Yes? There's someone who doesn't want their receipts seen...?"
201020-162 = "Surely you don't mean the executives in the Finance Office, do you?"
201020-165 = "Sumomo, I am currently in the Aoba Central District."
201020-166 = "Wasn't the Seiun Tower scheduled to be demolished last month? #nWhy is it still standing?"
201020-167 = "...Yes? Postponed? The discussions with the contractors regarding costs haven't progressed, you say."
201020-168 = "...I haven't been reported on this."
201020-169 = "...Please submit a report on the matter by next Tuesday."
201020-171 = "(Rin seemed unable to enjoy her day off due to General Student Council work.)"
201020-173 = "[ns21] (I didn't intend to go there, but...)\n[ns22] (It's the only way to get Rin away from work!)"
201020-176 = "...Sensei, where is this?"
201020-178 = "[ns] \"It's an arcade!\""
201020-180 = "[ns23] \"Arcades are a staple for a day off date!\"\n[ns24] \"Have you ever been to an arcade before?\""
201020-181 = "I told you, this is not a date... No, never mind."
201020-182 = "...An arcade, is it? This is my first time."
201020-183 = "Yes, it is my first time."
201020-184 = "[s] \"How come!?\""
201020-185 = "...I’ve never had any reason to come."
201020-186 = "I didn't have any particular interest in it, either."
201020-187 = "It wasn't something I needed for my daily life, so I never thought to spend my time here."
201020-188 = "[s25] \"So there are things you're unfamiliar with, Rin.\"\n[s26] \"In that case...\""
201020-194 = "[ns27] \"Let's have a match in 'Student Fighter 2'!\"\n[ns28] \"The loser has to grant one wish to the winner!\""
201020-197 = "Yes? What is this all of a sudden?"
201020-198 = "I don't even know the controls, what are you..."
201020-199 = "[s29] \"You're free to run away if you want.\"\n[s30] \"If you're afraid of losing, just admit it.\""
201020-202 = "I won't fall for such transparent provocation."
201020-206 = "Besides, I don't see the reason to bring wagers into a game. #nIf we just play normally—"
201020-207 = "Huh? You say having something at stake makes you more serious?"
201020-208 = "How dramatic... You sound just like someone else—"
201020-210 = "Hey, hey, Rin! Want to play Othello with me? #nI found it in the storage room!"
201020-211 = "Let's have a match! The loser buys the other a drink!"
201020-212 = "Eh? Because if we don't do this, you'll just play half-heartedly, right?"
201020-213 = "To bring out Rin's full potential... it's a match!"
201020-215 = "Waaaaah... I lost!"
201020-218 = "...As long as it is within the bounds of common sense, I don't mind."
201020-219 = "[s] \"Within the bounds of common sense...?\""
201020-220 = "Exactly as it sounds. Buying a drink, taking over a shift..."
201020-221 = "Even though you are Sensei, I trust you wouldn't make an unreasonable request."
201020-225 = "I suppose I can understand that having a decent reward makes things more enjoyable."
201020-226 = "Since we've come all the way to the arcade, I'll play along just this once."
201020-231 = "Then, for the first round, I'll use it to practice the controls..."
201020-233 = "<ROUND 1 FIGHT!>"
201020-238 = "I see, so I use skills like this..."
201020-243 = "...So this is how you dodge attacks."
201020-244 = "...I see."
201020-246 = "<[USERNAME] WIN!>"
201020-247 = "...Please continue."
201020-249 = "<ROUND 2 FIGHT!>"
201020-250 = "Keep my distance... and check."
201020-255 = "The low guard is wide open..."
201020-262 = "<Rin Nanagami WIN!>"
201020-263 = "<FINAL ROUND!>"
201020-268 = "...."
201020-274 = "......."
201020-285 = "<Rin Nanagami Perfect!>"
201020-287 = "[ns31] \"I lost... without taking a single hit!?\"\n[ns32] \"Is this really your first time!?\""
201020-290 = "Yes, I told you earlier. It is my first time."
201020-291 = "In fact, this is my first time playing a game like this. #nIt's simple once you get used to it."
201020-292 = "Since there are fewer parallel processes to handle, it was easy to focus. #nCompared to that, General Student Council work is..."
201020-293 = "[s33] \"That's a terrifying talent...\"\n[s34] \"Maybe Rin has the talent of a genius gamer...\""
201020-296 = "You're overestimating me. Compared to someone who takes games seriously, I am nothing."
201020-297 = "For example—"
201020-301 = "...If you don't mind, may I claim my reward from earlier?"
201020-302 = "[s35] \"I don't mind, but...\"\n[s36] \"In public...? Are you sure?\""
201020-305 = "What are you thinking!"
201020-306 = "Haa... just follow me."
201020-307 = "There is someone I’ve been wanting to see for a long time."
201020-309 = "Next Episode;Queen's Gambit"