[translation]
201020-1 = "Эпизод 2;Выходной главного администратора (2)"
201020-2 = "Перед зданием Генерального Студенческого Совета"
201020-3 = "(Суббота, утро)"
201020-4 = "(Рин стоит перед зданием —)"
201020-8 = "[ns] «Рин...?»"
201020-9 = "...Это недоразумение."
201020-10 = "Вы и сами видите это по моему лицу. Так что это недоразумение. #nПожалуйста, позвольте мне сначала всё объяснить."
201020-11 = "[s] «Я слушаю»."
201020-12 = "Я проснулась сегодня утром в общежитии и собиралась надеть форму."
201020-13 = "Но Аои — вернее, глава Финансового управления — заявила: «Это ничем не отличается от работы», — и забрала всю мою форму..."
201020-14 = "...У меня не было выбора, кроме как надеть это. Надеюсь на ваше понимание."
201020-15 = "[s1] «О, а по-моему, выглядит отлично».\n[s2] «Тебе очень идёт, и ты выглядишь мило»."
201020-18 = "......."
201020-19 = "...Повторю ещё раз: я не считаю это свиданием."
201020-20 = "[s] «Всё в порядке. Зато я считаю это свиданием»."
201020-21 = "Чт—?!"
201020-22 = "Ха-а... Я притворюсь, что не слышала этого."
201020-23 = "Если бы я реагировала на каждое ваше слово, мой единственный выходной закончился бы, так и не начавшись."
201020-24 = "...Итак, какой у нас план на сегодня?"
201020-25 = "[s] «А? То есть решать, куда мы пойдём, должен я?»"
201020-26 = "Разве не вы меня пригласили, Сенсей?"
201020-27 = "Только не говорите мне..."
201020-28 = "Если у вас нет плана, я, пожалуй, пойду —"
201020-29 = "[s3] «Н-нет! У меня уже готов идеальный план!»\n[s4] «Я подготовил лучший маршрут с точки зрения местного жителя!»"
201020-32 = "С точки зрения местного жителя..."
201020-33 = "Вообще-то, мне кажется, что я прожила в Д.У. дольше вашего..."
201020-34 = "...Впрочем, взглянуть на Д.У. вашими глазами — звучит не так уж плохо."
201020-39 = "Тогда пойдём?"
201020-41 = "Район Ширатори, старый переулок города Ламини"
201020-44 = "Где мы...?"
201020-45 = "[s5] «Это улица с уличной едой в городе Ламини».\n[s6] «Место, где можно попробовать самую разную уличную еду»."
201020-48 = "Я слышала об этом месте, но... не думала, что здесь будет так многолюдно."
201020-49 = "Так много лавок... а к некоторым даже выстроились очереди."
201020-50 = "Хм... Похоже, нам стоит пересмотреть схему размещения сотрудников службы безопасности в этом районе."
201020-51 = "Надо будет позже связаться с Валькирией —"
201020-52 = "[s] «Я надеялся, что сегодня ты оставишь работу позади...»"
201020-56 = "О, Сенсей."
201020-57 = "Сегодня опять один? Если ещё не ел, как насчёт моей лавки? Я сделаю тебе скидку!"
201020-58 = "[s7] «Здравствуйте».\n[s8] «Я сегодня со студентом»."
201020-61 = "А? Погоди, и зачем ты притащил её в Ламини?"
201020-62 = "Когда ты с кем-то вроде неё, тебе следует отвести её в приличное место!"
201020-63 = "Я знаю, что ты популярный учитель среди студентов, но всё же. #nОбедать в уличной лавке — как-то несолидно, не думаешь?"
201020-64 = "Продолжай в том же духе, и твои студенты потеряют к тебе интерес, смекаешь?"
201020-65 = "[s] «Я приму это к сведению...»"
201020-66 = "(...Похоже, вы довольно близки с горожанами.)"
201020-69 = "[ns] «Что посоветуете сегодня?»"
201020-70 = "Поглядим... как насчёт якисобы с морепродуктами? #nМне как раз привезли свежих кальмаров из порта Канесаки."
201020-71 = "[s] «Тогда нам две порции!»"
201020-72 = "Принято! Спасибо за заказ!"
201020-80 = "Вот, пожалуйста, извините за ожидание! Две якисобы с морепродуктами! Ешьте, пока горячая!"
201020-81 = "Б-большое спасибо."
201020-85 = "... Если подумать, я уже очень давно не ела якисобу."
201020-86 = "[s9] «Ой, прости. Я просто заказал, даже не спросив...»\n[s10] «Тебе не нравится якисоба?»"
201020-89 = "Нет, дело не в этом."
201020-90 = "Просто во время работы я обычно ем только то, что можно перекусить быстро и на ходу..."
201020-91 = "Мне редко выпадает возможность поесть чего-то свежеприготовленного. #nТем более уличной еды."
201020-92 = "...Когда Президент Генерального Студенческого Совета была на месте, всё было иначе."
201020-93 = "Какой бы занятой она ни была, она всегда находила время, чтобы перекусить. #nМы часто ели с ней подобную уличную еду."
201020-97 = "Вкусно... Это тот самый ностальгический вкус, прямо как в моих воспоминаниях."
201020-98 = "Приятно слышать. В наши дни тяжело успевать за вкусами студентов."
201020-99 = "В одну минуту они без ума от супер-острой еды, а в следующую — пихают сыр абсолютно во всё, верно?"
201020-100 = "Глядя на это, я даже переживал, не стоит ли мне тоже изменить рецепт."
201020-101 = "Я считаю, что адаптироваться к переменам важно. #nНо я также верю, что защита вкуса, который никогда не меняется, имеет не меньшую ценность."
201020-102 = "...Какими бы стремительными ни были перемены, бывают моменты, когда тоскуешь по вкусу воспоминаний."
201020-103 = "После ваших слов мне хочется продолжать своё дело ещё немного дольше, ха-ха-ха!"
201020-107 = "...Кстати, барышня, вы бывали в моей лавке раньше? #nМне кажется, я где-то вас видел."
201020-108 = "О, я..."
201020-109 = "[s11] «Это Рин!»\n[s12] «Она администратор Генерального Студенческого Совета!»"
201020-110 = "Кто такая «Рин»?"
201020-112 = "О, погодите, я видел вас на канале Кронос. #nВы же исполняющая обязанности Президента, которая выступала на экстренной пресс-конференции!"
201020-113 = "Вы так нарядились, что я вас и не узнал!"
201020-114 = "Нет, всё совсем не так —"
201020-115 = "Раз уж вы здесь, я хотел спросить."
201020-116 = "Что-то не так с водоснабжением в D.U.? В последнее время оно барахлит."
201020-117 = "Вчера тоже внезапно отключили воду. Я уже всерьёз думал закрывать лавку."
201020-118 = "Прошу прощения за неудобства."
201020-119 = "Башня Святилища, которая управляет инфраструктурой, ещё не полностью восстановлена, #nпоэтому иногда подача электроэнергии и воды становится нестабильной."
201020-120 = "Мы работаем над увеличением штата управляющего персонала, так что, пожалуйста, проявите терпение."
201020-121 = "А, нет, мне даже неудобно, что я заставил вас оправдываться..."
201020-125 = "[ns] «Разве реконструкция Башни Святилища ещё не завершена?»"
201020-126 = "Восстановление самого здания завершено. #nОднако система управления — само сердце Башни Святилища — восстановлена не полностью... #nВ настоящее время мы обходимся запасным оборудованием."
201020-127 = "Как я уже упоминала ранее, с системой управления Башни Святилища могла работать только Президент Генерального Студенческого Совета. #nЕё поддержание и её перестройка — это проблемы совершенно разного масштаба."
201020-128 = "Это счастье в несчастье, что резервная система вообще справляется... #nно она и близко не стоит к первоначальной управляющей мощности Башни Святилища."
201020-129 = "[ns13] (Рин перешла в рабочий режим...)\n[ns14] (Мне нужно срочно сменить тему.)"
201020-132 = "[ns] «Я объелся. Не хочешь сходить в кино?»"
201020-133 = "У вас есть какие-нибудь рекомендации?"
201020-134 = "[s15] «Вышел новый фильм, о котором только и говорят среди студентов».\n[s16] «Ты слышала о „Великом приключении Шуппо“?»"
201020-137 = "Шуппо, говорите... Это ведь собака-талисман, утверждённая на конкурсе дизайна, который проводили Бюро управления дорогами Д.У. и Транспортное управление, верно?"
201020-138 = "Я слышала, что они объявили открытый конкурс, потому что „Momo Friends“ посчитали неподходящими для официальных документов..."
201020-139 = "Похоже, отклик оказался не таким благоприятным, как ожидалось. #nРазличные ведомства отметили, что это пустая трата денег налогоплательщиков."
201020-140 = "[s17] «Разве это не личное дело каждого — решать, нравится фильм или нет?»\n[s18] «Ты можешь изменить своё мнение, если действительно посмотришь его!»"
201020-143 = "Что ж. Это хорошая возможность, да и проверить реакцию горожан в кинотеатре будет неплохой идеей."
201020-144 = "[s] «Давай оставим работу позади...»"
201020-146 = "(После этого Рин, похоже, всё ещё была поглощена мыслями о работе...)"
201020-148 = "Перед кинотеатром в Д.У."
201020-149 = "[ns19] «Это был на удивление серьёзный сюжет...»\n[ns20] «Что думаешь, Рин?»"
201020-152 = "Ну..."
201020-153 = "Мне показалось, что проходы, ведущие к аварийным выходам, слишком узкие для зала такого размера."
201020-154 = "Они могут стать бутылочным горлышком при эвакуации. #nЯ потребую, чтобы они обеспечили достаточное пространство."
201020-155 = "[s] «Так вот на чём ты сосредоточилась?!»"
201020-157 = "(Пусть даже мы ходили по городу, чтобы отвлечься...)"
201020-159 = "Вы взяли надлежащий чек за одежду, которую купили ранее?"
201020-160 = "Вам следует держать чеки в порядке, чтобы отслеживать свои расходы."
201020-161 = "Что? Есть кое-кто, кто не хочет, чтобы его чеки видели...?"
201020-162 = "Вы ведь не имеете в виду руководителей Финансового управления, верно?"
201020-165 = "Сумомо, я сейчас нахожусь в Центральном районе Аоба."
201020-166 = "Разве снос башни Сэйун не был запланирован на прошлый месяц? #nПочему она всё ещё стоит?"
201020-167 = "...Да? Отложено? Обсуждения с подрядчиками касательно стоимости не продвинулись, говорите."
201020-168 = "...Мне об этом не докладывали."
201020-169 = "...Пожалуйста, предоставьте отчёт по этому вопросу к следующему вторнику."
201020-171 = "(Рин, похоже, была не в состоянии наслаждаться своим выходным из-за работы в Генеральном Студенческом Совете.)"
201020-173 = "[ns21] (Я не планировал туда идти, но...)\n[ns22] (Это единственный способ оттащить Рин от работы!)"
201020-176 = "...Сенсей, где мы?"
201020-178 = "[ns] «Это залы игровых автоматов!»"
201020-180 = "[ns23] «Игровые автоматы — это классика для свидания в выходной!»\n[ns24] «Ты когда-нибудь бывала в игровых автоматах раньше?»"
201020-181 = "Я же говорила вам, это не свидание... Хотя ладно, неважно."
201020-182 = "...Зал игровых автоматов, значит? Я здесь впервые."
201020-183 = "Да, я здесь в первый раз."
201020-184 = "[s] «Как так?!»"
201020-185 = "...У меня никогда не было причин приходить сюда."
201020-186 = "Особого интереса у меня это тоже не вызывало."
201020-187 = "Это не то, что требовалось мне для повседневной жизни, поэтому я никогда не думала проводить здесь своё время."
201020-188 = "[s25] «Значит, есть вещи, с которыми ты не знакома, Рин».\n[s26] «В таком случае...»"
201020-194 = "[ns27] «Давай устроим матч в „Student Fighter 2“!»\n[ns28] «Проигравший должен исполнить одно желание победителя!»"
201020-197 = "Что? Что это ещё за внезапность?"
201020-198 = "Я даже управления не знаю, о чём вы..."
201020-199 = "[s29] «Ты вольна убежать, если хочешь».\n[s30] «Если боишься проиграть, просто признай это»."
201020-202 = "Я не поддамся на такую очевидную провокацию."
201020-206 = "К тому же я не вижу причин делать ставки в игре. Если мы просто сыграем как обычно —"
201020-207 = "А? Вы говорите, что когда на кону что-то стоит, это заставляет относиться к делу серьёзнее?"
201020-208 = "Как пафосно... Вы звучите точь-в-точь как кое-кто другой —"
201020-210 = "Эй, эй, Рин! Не хочешь сыграть со мной в Отелло? #nЯ нашла его в кладовой!"
201020-211 = "Давай устрим матч! Проигравший покупает победителю напиток!"
201020-212 = "А? Ну потому что, если мы этого не сделаем, ты будешь играть спустя рукава, верно?"
201020-213 = "Чтобы раскрыть весь потенциал Рин... это поединок!"
201020-215 = "Уа-а-а... Я проиграла!"
201020-218 = "...Пока это находится в рамках здравого смысла, я не против."
201020-219 = "[s] «В рамках здравого смысла...?»"
201020-220 = "Именно так, как это и звучит. Купить напиток, подменить на дежурстве..."
201020-221 = "Пусть вы и Сенсей, я верю, что вы не станете загадывать неразумные вещи."
201020-225 = "Полагаю, я могу понять, что при наличии достойной награды процесс становится увлекательнее."
201020-226 = "Раз уж мы проделали весь этот путь до игровых автоматов, я сыграю с вами только в этот раз."
201020-231 = "Тогда в первом раунде я попрактикуюсь в управлении..."
201020-233 = "<РАУНД 1 БОЙ!>"
201020-238 = "Понятно, значит, навыки используются вот так..."
201020-243 = "...Так вот как уклоняться от атак."
201020-244 = "...Ясно."
201020-246 = "<ПОБЕДА [USERNAME]!>"
201020-247 = "...Пожалуйста, продолжайте."
201020-249 = "<РАУНД 2 БОЙ!>"
201020-250 = "Держать дистанцию... и проверять."
201020-255 = "Нижний блок полностью открыт..."
201020-262 = "<ПОБЕДА Нанагами Рин!>"
201020-263 = "<ФИНАЛЬНЫЙ РАУНД!>"
201020-268 = "...."
201020-274 = "......."
201020-285 = "<Нанагами Рин: Чистая победа!>"
201020-287 = "[ns31] «Я проиграл... не нанеся ни одного удара?!»\n[ns32] «Это точно твой первый раз?!»"
201020-290 = "Да, я же говорила вам ранее. Я здесь впервые."
201020-291 = "На самом деле я впервые играю в подобную игру. #nВ ней легко освоиться, стоит только привыкнуть."
201020-292 = "Поскольку здесь нужно обрабатывать меньше параллельных процессов, сосредоточиться было просто. #nПо сравнению с этим, работа в Генеральном Студенческом Совете..."
201020-293 = "[s33] «Это пугающий талант...»\n[s34] «Возможно, у Рин талант гениального геймера...»"
201020-296 = "Вы меня переоцениваете. По сравнению с теми, кто занимается играми серьёзно, я ничто."
201020-297 = "Например —"
201020-301 = "...Если вы не против, могу ли я получить свою награду за прошлый матч?"
201020-302 = "[s35] «Я не против, но...»\n[s36] «Прямо на публике...? Ты уверена?»"
201020-305 = "О чём вы вообще думаете!"
201020-306 = "Ха-а... просто идите за мной."
201020-307 = "Есть кое-кто, кого я уже очень давно хотела навестить."
201020-309 = "Эпизод 3;Ферзевый гамбит"