[translation]
214-1 = "[ruby=Late Night with the Lore]真夜中はロアと共に[/ruby]"
214-5 = "ミスター・オーウェルの『真夜中はロアと共に』へようこそ。"
214-6 = "そういうこったぁ！"
214-7 = "今宵も迷える皆様にお届けする、深夜番組――"
214-8 = "司会は、新時代の世界を定義する権力――この世すべてのパノプリをお届けする者、#nミスター・オーウェルでお届けいたします。"
214-9 = "今宵、ご紹介するテクストは、凡庸な2つの記号が混ざり合った、大衆的なクリーピーパスタです。"
214-10 = "その名も――「ドラム缶ガニ」。"
214-14 = "そういうこったぁ！そういうこったぁ！"
214-15 = "ドラム缶ガニを構成する記号は至ってシンプル。"
214-16 = "人食いガニを誰かが裏で操っているという荒唐無稽な「噂」――#n港を飲み込むほど巨大なカニでなければ人を食べることなどできないという「常識」――"
214-17 = "それらが融合し――誰も想像し得なかった形として、新たなテクストと成りました。"
214-18 = "そういうこったぁ！"
214-19 = "この複製されし世界に現れた新たなクリーピーパスタは、メディアが作り上げた虚像の影響を受けたのでしょうか？"
214-20 = "それとも、世界の外側からやってきた「黒い白鳥」が残した矛盾の痕跡なのでしょうか？"
214-21 = "仮想のコミュニティが炎上し、聖なる枝が灰になるまで――さあ、奮って討論にご参加くださいませ！"
214-22 = "このショーは、皆様で作り上げるものなのですから！"
214-23 = "そういうこったぁ！"
214-28 = "さて――あなたは、あの記号からどのようなテクストを読み取りましたか？"
214-29 = "止め処無い奇談の図書館には、砂漠の砂のように数多の原典が存在いたします。"
214-30 = "コミュニティに流布する残酷な創作の怪談が顕現したものか――"
214-31 = "それとも、オールドメディアのパロディーやオマージュか。"
214-32 = "はたまた、創作者の気まぐれによって生み出されたアレンジなのか――"
214-33 = "――解釈に正解はありません。"
214-34 = "記号の価値は、消費者である皆様によって決められるのですから。"
214-35 = "そういうこったぁ！"
214-36 = "おっと――それでは、CMのお時間です。"
214-37 = "次のテクストをご紹介するまで、チャンネルはそのままで！"
214-38 = "そういうこったぁ！"
