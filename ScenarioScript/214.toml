[translation]
214-1 = "Поздний вечер с Лором"
214-5 = "Добро пожаловать на «Поздний вечер с Лором» от Мистера Оруэлла."
214-6 = "Именно так!"
214-7 = "Сегодня мы вновь представляем вам ночную передачу для всех вас, заблудшие души —"
214-8 = "Её ведёт не кто иной, как сила, определяющая мир новой эры, — создатель всех паноплий этого мира, #nМистер Оруэлл."
214-9 = "Текст, с которым мы познакомим вас сегодня, — это популярная крипипаста, смешанная с двумя посредственными символами."
214-10 = "Его имя — «Бочковой краб»."
214-14 = "Именно! Всё верно!"
214-15 = "Символы, из которых состоит Бочковой краб, чрезвычайно просты."
214-16 = "Абсурдный «слух» о том, что кто-то дёргает за ниточки за спиной краба-людоеда, — и «здравый смысл», согласно которому краб никак не мог бы съесть человека, если бы не был достаточно велик, чтобы проглотить целиком целую гавань —"
214-17 = "Они слились воедино — и превратились в новый текст в форме, которую никто и представить себе не мог."
214-18 = "Именно так!"
214-19 = "Оказалась ли эта новая крипипаста, возникшая в воссозданном мире, под влиянием иллюзии, порождённой медиа?"
214-20 = "Или же это след противоречия, оставленный «Чёрным лебедем», пришедшим извне этого мира?"
214-21 = "Пока виртуальное сообщество не сгорело дотла, а священные ветви не обратились в пепел — подходите, пожалуйста, присоединяйтесь к нашему обсуждению с величайшим энтузиазмом!"
214-22 = "В конце концов, это шоу делаете вы сами!"
214-23 = "Именно так!"
214-28 = "Ну а теперь — какой именно текст вы прочитали в этом символе?"
214-29 = "В библиотеке бесконечных странных историй бесчисленные оригинальные тексты существуют подобно песчинкам в пустыне."
214-30 = "Является ли это проявлением жестокой вымышленной истории о призраках, циркулирующей в сети —"
214-31 = "Или же это пародия или оммаж старым медиа?"
214-32 = "А может быть, аранжировка, рождённая по прихоти создателя —"
214-33 = "— Когда дело доходит до интерпретации, правильного ответа не существует."
214-34 = "Ибо ценность символа определяется вами, потребителями."
214-35 = "Именно так!"
214-36 = "Ой — что ж, пора прерваться на рекламу."
214-37 = "Не переключайте канал, пока мы не представим вам следующий текст!"
214-38 = "Именно так!"