[translation]
214-1 = "[ruby=Late Night with the Lore]Noite Adentro com o Folclore[/ruby]"
214-5 = "Bem-vindos ao 'Noite Adentro com o Folclore' do Sr. Orwell."
214-6 = "É isso aí!"
214-7 = "O programa noturno para todos vocês que andam perdidos nesta noite –"
214-8 = "Apresentado por mim, Sr. Orwell – aquele que define o mundo da nova era, que traz todo o panoplírio deste mundo para vocês."
214-9 = "O texto que apresento hoje é uma creepypasta popular, nascida da fusão de dois símbolos medíocres."
214-10 = "Seu nome é – 'Caranguejo do Tambor'."
214-14 = "É isso aí! É isso aí!"
214-15 = "Os símbolos que compõem o Caranguejo do Tambor são extremamente simples."
214-16 = "O 'boato' absurdo de que alguém controla um caranguejo devorador de homens – e o 'senso comum' de que um caranguejo teria que ser enorme o suficiente para engolir um porto para poder comer uma pessoa –"
214-17 = "Eles se fundem – e se tornam um novo texto, numa forma que ninguém poderia imaginar."
214-18 = "É isso aí!"
214-19 = "Essa nova creepypasta que surgiu neste mundo replicado teria sido influenciada por imagens falsas criadas pela mídia?"
214-20 = "Ou seria um vestígio de contradição deixado pelo 'cisne negro' vindo de fora do mundo?"
214-21 = "Até que a comunidade virtual pegue fogo e o ramo sagrado se reduza a cinzas – ora, participem animadamente do debate!"
214-22 = "Afinal, este show é construído por todos vocês!"
214-23 = "É isso aí!"
214-28 = "Pois bem – que tipo de texto você extraiu daquele símbolo?"
214-29 = "A biblioteca de contos incessantes possui inúmeros originais, como grãos de areia no deserto."
214-30 = "Seriam as cruéis histórias de terror criadas e disseminadas na comunidade que se manifestaram?"
214-31 = "Ou seriam paródias ou homenagens à velha mídia?"
214-32 = "Ou ainda, arranjos criados pelo capricho do autor?"
214-33 = "– Não há resposta certa para a interpretação."
214-34 = "O valor do símbolo é decidido por vocês, os consumidores."
214-35 = "É isso aí!"
214-36 = "Opa – então, vamos ao intervalo comercial."
214-37 = "Até apresentarmos o próximo texto, fiquem ligados!"
214-38 = "É isso aí!"