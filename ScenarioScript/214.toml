[translation]
214-1 = "Late Night with the Lore"
214-5 = "Welcome to Mr. Orwell's Late Night with the Lore."
214-6 = "That's right!"
214-7 = "Tonight, we once again bring you a late-night program for all you lost souls—"
214-8 = "Hosted by none other than the power that defines the world of the new era—the bringer of all the panoplies of this world, #nMr. Orwell."
214-9 = "Tonight, the text we will be introducing is a popular creepypasta mixed with two mediocre symbols."
214-10 = "Its name—'The Drum Crab'."
214-14 = "That's right! That's right!"
214-15 = "The symbols that make up the Drum Crab are extremely simple."
214-16 = "The absurd 'rumor' that someone is pulling the strings behind a man-eating crab—and the 'common sense' that a crab couldn't possibly eat a human unless it was large enough to swallow a whole harbor—"
214-17 = "They fused together—and became a new text in a form no one could have ever imagined."
214-18 = "That's right!"
214-19 = "Did this new creepypasta that appeared in this replicated world fall under the influence of an illusion created by the media?"
214-20 = "Or is it a trace of contradiction left behind by a 'Black Swan' that came from the outside of the world?"
214-21 = "Until the virtual community burns down and the sacred branches turn to ash—come, please join our discussion with great enthusiasm!"
214-22 = "After all, this show is made by all of you!"
214-23 = "That's right!"
214-28 = "Now then—what kind of text did you read from that symbol?"
214-29 = "In the library of endless strange tales, countless original texts exist like the sands of a desert."
214-30 = "Is it the manifestation of a cruel, fictional ghost story circulating in the community—"
214-31 = "Or is it a parody or homage to old media?"
214-32 = "Or perhaps, an arrangement born from the whim of a creator—"
214-33 = "—There is no correct answer when it comes to interpretation."
214-34 = "For the value of a symbol is determined by you, the consumers."
214-35 = "That's right!"
214-36 = "Oops—well then, it's time for a commercial break."
214-37 = "Keep your dial right where it is until we introduce the next text!"
214-38 = "That's right!"