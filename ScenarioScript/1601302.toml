[translation]
1601302-1 = "コハルの使命"
1601302-2 = "（一人で余暇を満喫しようと思い、滝の音に耳を傾けていたところ……）"
1601302-10 = "（どこからか、[ruby=せわ]忙[/ruby]しない足音が聞こえてきた）"
1601302-14 = "[ns1] \"コハル……？\"\n[ns2] \"結構遅かったけど、迷ってたのかな……？\""
1601302-22 = "やっと見つけた、先生！！"
1601302-25 = "私が先生を探してた理由くらい分かるわよね？"
1601302-26 = "こんな人気のない場所で何してたの？#n隠そうとしたって無駄よ！"
1601302-27 = "……滝を眺めながら、ぼーっとしてた？"
1601302-28 = "ふん！そんな話、一体誰が信じると思ってるの？"
1601302-29 = "またいつもみたいに、変な妄想してたんじゃないの？"
1601302-30 = "え？本当に違うの……？"
1601302-31 = "大人には、孤独な時間が必要……？"
1601302-32 = "夏だから、とか言われても……"
1601302-33 = "……意味分かんないんだけど。"
1601302-34 = "うーん、夏……無人島……"
1601302-38 = "そういう、ものなの……かな。"
1601302-39 = "[s3] \"時間も場所も違えば……当然、その意味も。\"\n[s4] \"コハルも、いつか分かると思うよ……きっとね。\""
1601302-42 = "そんなはずないわよ……！"
1601302-43 = "変なこと考えてない先生なんて、ありえないし……！"
1601302-44 = "……私？"
1601302-45 = "ここに来てから、何か変わったこと……？"
1601302-46 = "私は先生を監視するために来たんだから。#n先生から目を離すわけにはいかないでしょ？"
1601302-47 = "私が見てない間に、また変なことをするかもしれないし……"
1601302-48 = "それをちゃんと監視するのが正義実現委員会としての使命なの！"
1601302-49 = "うーん。でも、今日の先生は普段とちょっと違うような……"
1601302-53 = "それなら、私は何のために無人島まで……"
1601302-54 = "[s5] \"コハル……？\"\n[s6] \"難しく考える必要は無いんじゃない？\""
1601302-57 = "でも、そんな簡単に……"
1601302-58 = "……え？"
1601302-59 = "夏だから、って……"
1601302-60 = "なんでも夏のせいにすれば良いと思ってない？"
1601302-61 = "そ、そうやって私を騙そうとしても無駄よ、先生！#n絶対に騙されないんだから！"
1601302-62 = "まぁ……でも……"
1601302-63 = "……うん。#nでも、今日は変なことしないって分かったから、それは信じてあげる。"
1601302-64 = "……？"
1601302-65 = "なら、もう帰るのかって？"
1601302-66 = "ば、バカ言わないで！"
1601302-67 = "というか……私がそばにいたら何か問題あるの？"
1601302-68 = "[s7] \"そんな事は全くないけど……。\"\n[s8] \"もちろん、ずっとここにいても大丈夫だよ？\""
1601302-71 = "な、なんか怪しい……帰ってほしそうな気がするもん。#n私が目を離したら、何をするか分からないし……"
1601302-72 = "やっぱり、監視を続ける事にするわ。"
1601302-73 = "もう、何言われても騙されないんだからね。"
1601302-78 = "……別に、問題ないのよね？"
1601302-79 = "[s9] \"私は構わないけど……。\"\n[s10] \"退屈かもしれないよ？\""
1601302-82 = "誤魔化そうとしても無駄！"
1601302-84 = "（そう言って、コハルは隣に座り、周囲をキョロキョロと見回し始めた）"
1601302-91 = "（自然を感じながら身体を休めていると、いつの間にか1時間ほど経過し……）"
1601302-92 = "（……ふと、隣に目をやると、コハルは疲れたのかウトウトしていた）"
1601302-95 = "[wa:300]― [log=코하루 수영복]……えっと……。[/log]"
1601302-98 = "― [log=코하루 수영복]……先生……[wa:1050]その……[wa:1250]いつまでこうしてるの……？[/log]"
1601302-100 = "― [log=코하루 수영복]意味分かんない……。[/log]"
1601302-103 = "[ns11] \"先に帰って休んでも大丈夫だよ。\"\n[ns12] \"私もしばらくしたら戻るから。\""
1601302-104 = "[wa:300]― [log=코하루 수영복]そう……[wa:1400]んむ……。[/log]"
1601302-105 = "[wa:300]― [log=코하루 수영복]そう……[wa:1400]んむ……。[/log]"
1601302-107 = "― [log=코하루 수영복]じゃあ、[wa:670]帰ろっかな……。[/log]"
1601302-110 = "― [log=코하루 수영복]……はっ！！[/log]"
1601302-113 = "― [log=코하루 수영복]（ダメダメダメ！）[/log]"
1601302-115 = "[wa:100]― [log=코하루 수영복]（私は今何をっ！）[/log]"
1601302-118 = "[wa:350]― [log=코하루 수영복]（危ない！[wa:800]また先生に[wa:580]騙されるところだった）[/log]"
1601302-121 = "― [log=코하루 수영복]（警戒を緩めるなんて……）[/log]"
1601302-123 = "― [log=코하루 수영복]（ダメ、[wa:500]絶対にダメ！）[/log]"
1601302-126 = "[wa:200]― [log=코하루 수영복]私を油断させようとしたって[wa:1550]無駄なんだからっ！[/log]"
1601302-129 = "― [log=코하루 수영복]……むんっ！[/log]"
1601302-133 = "（そうしてコハルは再び姿勢を正し、眠気との戦いを再開するも……）"
1601302-139 = "（……ほどなくして、静かな呼吸音が聞こえ始めた）"
1601302-143 = "（その後、もうしばらく大自然に癒やされてから、コハルを起こさないようにおんぶして拠点に戻った）"
