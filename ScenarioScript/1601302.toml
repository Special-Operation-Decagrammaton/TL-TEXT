[translation]
1601302-1 = "A Missão de Koharu"
1601302-2 = "（Pensando em aproveitar o tempo livre sozinha, eu estava ouvindo o som da cachoeira quando...）"
1601302-10 = "（De algum lugar, ouvi passos apressados）"
1601302-14 = "[ns1] \"Koharu...?\"\n[ns2] \"Você demorou um pouco, será que se perdeu...?\""
1601302-22 = "Finalmente te encontrei, Sensei!!"
1601302-25 = "Você sabe muito bem por que eu estava te procurando, não sabe?"
1601302-26 = "O que você estava fazendo em um lugar tão deserto assim?#nNão adianta tentar esconder!"
1601302-27 = "......Estava olhando para a cachoeira, distraído?"
1601302-28 = "Hum! Quem você acha que vai acreditar numa história dessas?"
1601302-29 = "Não estava tendo aquelas suas fantasias estranhas de sempre, não?"
1601302-30 = "Hã? É verdade que não...?"
1601302-31 = "Adultos precisam de um tempo a sós...?"
1601302-32 = "Mesmo que diga que é por causa do verão..."
1601302-33 = "......Eu não entendo o que isso significa."
1601302-34 = "Hum, verão... ilha deserta..."
1601302-38 = "É... assim que as coisas são, será?"
1601302-39 = "[s3] \"Se o tempo e o lugar forem diferentes... o significado também muda, naturalmente.\"\n[s4] \"Acho que um dia você vai entender, Koharu... com certeza.\""
1601302-42 = "Não pode ser...!"
1601302-43 = "É impossível que um Sensei não esteja pensando em coisas estranhas...!"
1601302-44 = "......Eu?"
1601302-45 = "Algo mudou desde que chegamos aqui...?"
1601302-46 = "Eu vim aqui para vigiar você, Sensei.#nNão posso tirar os olhos de você, né?"
1601302-47 = "Pode ser que você faça algo estranho enquanto eu não estiver olhando..."
1601302-48 = "Vigiar isso corretamente é a minha missão como membro do Comitê de Justiça!"
1601302-49 = "Hum. Mas o Sensei de hoje parece um pouco diferente do habitual..."
1601302-53 = "Nesse caso, por que eu vim até uma ilha deserta..."
1601302-54 = "[s5] \"Koharu...?\"\n[s6] \"Não precisa pensar tanto nisso, precisa?\""
1601302-57 = "Mas, tão facilmente assim..."
1601302-58 = "......Hã?"
1601302-59 = "Dizer que é por causa do verão..."
1601302-60 = "Você não acha que pode colocar a culpa de tudo no verão?"
1601302-61 = "N-não adianta tentar me enganar assim, Sensei!#nEu não vou ser enganada de jeito nenhum!"
1601302-62 = "Bem... mas..."
1601302-63 = "......É.#nMas, já que entendi que você não vai fazer nada estranho hoje, vou acreditar nisso."
1601302-64 = "......?"
1601302-65 = "Então, está perguntando se eu já vou embora?"
1601302-66 = "N-não diga bobagens!"
1601302-67 = "Aliás... tem algum problema se eu ficar por perto?"
1601302-68 = "[s7] \"Não tem problema nenhum...\"\n[s8] \"Claro, pode ficar aqui o tempo que quiser.\""
1601302-71 = "I-isso é suspeito... sinto que você quer que eu vá embora.#nSe eu tirar os olhos de você, não sei o que você pode fazer..."
1601302-72 = "Decidi que vou continuar vigiando."
1601302-73 = "Não importa o que diga, não vou ser enganada."
1601302-78 = "......Não tem problema nenhum, né?"
1601302-79 = "[s9] \"Eu não me importo, mas...\"\n[s10] \"Pode ser entediante, sabe?\""
1601302-82 = "Não adianta tentar me enrolar!"
1601302-84 = "（Dizendo isso, Koharu sentou-se ao lado e começou a olhar em volta, de um lado para o outro）"
1601302-91 = "（Enquanto descansava o corpo sentindo a natureza, cerca de uma hora se passou...）"
1601302-92 = "（...De repente, ao olhar para o lado, vi que Koharu estava cochilando, talvez por cansaço）"
1601302-95 = "[wa:300]― [log=코하루 수영복]......Bem...[/log]"
1601302-98 = "― [log=코하루 수영복]......Sensei...[wa:1050] esse...[wa:1250] até quando vamos ficar assim...?[/log]"
1601302-100 = "― [log=코하루 수영복]Não faz sentido...[/log]"
1601302-103 = "[ns11] \"Pode ir embora e descansar primeiro.\"\n[ns12] \"Eu volto logo também.\""
1601302-104 = "[wa:300]― [log=코하루 수영복]É...[wa:1400] hum...[/log]"
1601302-105 = "[wa:300]― [log=코하루 수영복]É...[wa:1400] hum...[/log]"
1601302-107 = "― [log=코하루 수영복]Então, [wa:670]acho que vou voltar...[/log]"
1601302-110 = "― [log=코하루 수영복]...Ah!![/log]"
1601302-113 = "― [log=코하루 수영복](Não, não, não!)[/log]"
1601302-115 = "[wa:100]― [log=코하루 수영복](O que eu estou fazendo?!)[/log]"
1601302-118 = "[wa:350]― [log=코하루 수영복](Perigo! [wa:800]Eu quase fui [wa:580]enganada pelo Sensei de novo)[/log]"
1601302-121 = "― [log=코하루 수영복](Como pude baixar a guarda...)[/log]"
1601302-123 = "― [log=코하루 수영복](Não, [wa:500]definitivamente não!)[/log]"
1601302-126 = "[wa:200]― [log=코하루 수영복]Não adianta tentar me fazer baixar a guarda, [wa:1550]é inútil![/log]"
1601302-129 = "― [log=코하루 수영복]...Hmph![/log]"
1601302-133 = "(Dito isso, Koharu endireita a postura novamente e retoma sua batalha contra o sono, mas...)"
1601302-139 = "(...Pouco tempo depois, sons de respiração tranquila começaram a ser ouvidos)"
1601302-143 = "(Depois disso, após aproveitar um pouco mais da cura da natureza, carreguei Koharu nas costas para voltar à base sem acordá-la)"
