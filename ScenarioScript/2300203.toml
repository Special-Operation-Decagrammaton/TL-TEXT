[translation]
2300203-1 = "Insônia"
2300203-2 = "Enfermaria"
2300203-3 = "Olá, Sensei!"
2300203-4 = "Preparei a cama para você, já que provavelmente não conseguiu dormir bem na noite passada!"
2300203-5 = "Temos apenas uns 30 minutos, mas acho que se você descansar nessa cama fofinha, vai conseguir aliviar bastante o seu cansaço."
2300203-6 = "[s] \"Mas, tirar uma soneca durante o expediente...\""
2300203-7 = "Tirar uma soneca faz muito bem para o corpo!"
2300203-8 = "Quando alguém que está privado de sono tira uma soneca, isso não só ajuda a recuperar o cansaço, como também ajuda a recuperar a concentração."
2300203-9 = "Pelo bem do seu trabalho, por favor, aceite!"
2300203-10 = "[s] \"Bom, então só um pouquinho...\""
2300203-11 = "Sim! Então, assim que você se deitar, vou te ajudar a dormir profundamente."
2300203-13 = "Mirando na carótida, com toda a força...!"
2300203-16 = "Sensei, não se mexa! Por pouco eu não acertei o seu rosto!?"
2300203-17 = "[s] \"Não, não, não! O que você está fazendo!?\""
2300203-18 = "Hã? Eu só pensei em te deixar inconsciente para que você pudesse dormir profundamente, Sensei...?"
2300203-19 = "Li em um livro que, se atingir a carótida, é possível desmaiar instantaneamente sem sentir dor."
2300203-20 = "Vou te acordar direitinho quando o horário de almoço terminar, então pode dormir tranquilo, Sensei!"
2300203-21 = "[s1] \"Acho que isso é um pouco diferente de dormir!\"\n[s2] \"Isso é um caso que precisa de supervisão profissional!\""
2300203-22 = "É mesmo? Bem, então vamos tentar outro método..."
2300203-23 = "É mesmo? Bem, então vamos tentar outro método..."
2300203-24 = "Então, que tal este anestésico que faz até um elefante desmaiar instantaneamente?"
2300203-25 = "Vai dar uma picadinha, mas o efeito é garantido~☆"
2300203-26 = "...Isso também não serve? Entendo... #nNesse caso, só nos resta o chá de ervas com efeito calmante..."
2300203-27 = "[s] \"Só o chá de ervas já me deixa muito feliz...\""
2300203-28 = "Tem certeza de que isso é o suficiente?"
2300203-29 = "Sendo assim, vou preparar o chá de ervas agora mesmo, espere um pouquinho!"
2300203-31 = "Depois disso, tomei o chá de ervas quentinho que a Hanae preparou e tirei uma soneca revigorante na enfermaria."
