[translation]
2300203-1 = "不眠症"
2300203-2 = "保健室"
2300203-3 = "こんにちは、先生！"
2300203-4 = "きっと昨夜もよく眠れなかったであろう先生のために、私がベッドを整えておきました！"
2300203-5 = "30分くらいしかありませんが、ふかふかのベッドで寝られれば疲労もぐっと解消できると思います。"
2300203-6 = "[s] \"でも、勤務中にお昼寝は……。\""
2300203-7 = "お昼寝はすごく体にいいんですよ！"
2300203-8 = "睡眠不足の人がお昼寝すると、疲労回復効果だけではなく、集中力を取り戻させてくれる効果もあるんです。"
2300203-9 = "お仕事のためにも、どうぞ！"
2300203-10 = "[s] \"それじゃあちょっとだけ……。\""
2300203-11 = "はい！では横になったら、私も熟睡できるようさらにお手伝いしますね。"
2300203-13 = "狙いを定めて、頸動脈に向けて、思いっきりっ……！"
2300203-16 = "先生、動かないでください！危うく顔面に行くところでしたよ！？"
2300203-17 = "[s] \"いやいやいや何してるの！？\""
2300203-18 = "え？私はただ、先生がぐっすり眠れるように気絶させてあげようと思っただけで……？"
2300203-19 = "本で読みました、頸動脈を打つと、痛みも無くすぐに気絶できるらしいです。"
2300203-20 = "お昼休みが終わる頃にはきちんと起こしてあげますので、先生は安心して寝ててください！"
2300203-21 = "[s1] \"それは寝るのとはちょっと違うと思う！\"\n[s2] \"専門家の監修が必要な案件！\""
2300203-22 = "そうですかー。えっと、では他の方法を……。"
2300203-23 = "そうですかー。えっと、では他の方法を……。"
2300203-24 = "では、象も一瞬で気絶するというこちらの麻酔薬はいかがですか？"
2300203-25 = "ちょっとチクっとしますが、効果は抜群ですよ～☆"
2300203-26 = "……これもダメ？そうですか……。#nとなるとあとは、安眠効果のあるハーブティーぐらいしかないですね……。"
2300203-27 = "[s] \"ハーブティーだけですっごく嬉しいよ……。\""
2300203-28 = "本当にそれで大丈夫ですか？"
2300203-29 = "でしたら、すぐにハーブティーを用意してきますので、ちょっと待っててくださいね！"
2300203-31 = "その後、ハナエが淹れてくれた温かいハーブティーを飲んで、保健室で気持ちよく昼寝をした。"
