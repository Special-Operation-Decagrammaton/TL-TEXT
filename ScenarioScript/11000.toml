[translation]
11000-5 = "[FF6666]...Nós ansiamos pelos sete lamentos.[-]"
11000-7 = "[FF6666]...Carregamos o koan de Jericó.[-]"
11000-10 = "Senha aprovada."
11000-13 = "Bem-vindo ao \"Baú de Shittim\", [USERNAME] Sensei."
11000-36 = "...Foi tudo minha culpa."
11000-37 = "Minhas escolhas, e todas as suas consequências."
11000-45 = "Teve que chegar a esse ponto para eu realizar que você estava certo todo esse tempo..."
11000-50 = "...Pode parecer descarado, mas eu tenho que pedir por sua ajuda."
11000-51 = "[USERNAME] Sensei."
11000-52 = "Você vai esquecer o que estas palavras, mas não importa."
11000-53 = "Mesmo sem suas memórias, provavelmente faria a mesma decisão dentro das mesmas circunstãncias..."
11000-56 = "É por isso que... São as escolhas que importam, não nossas experiencias passadas."
11000-57 = "Há escolhas que só você pode fazer."
11000-71 = "Eu falei de responsabilidade antes."
11000-72 = "Naquela época eu realmente não entendia, mas... entendo agora."
11000-73 = "Ser adulto, responsabilidade e o dever como adulto.#nE as escolhas que você faz são uma extensão desses ideais."
11000-74 = "E até mesmo o significado por trás delas."
11000-75 = "..."
11000-76 = "Sensei."
11000-77 = "Você é a pessoa que eu confio,"
11000-78 = "Só você pode nos livrar deste destino distorcido..."
11000-79 = "E encontrar as escolhas que nós levará à uma nova realidade."
11000-82 = "Então Sensei, por favor..."
11000-85 = "...sei."
11000-86 = "...Sensei, por favor, acorde."
11000-87 = "[USERNAME] Sensei! !"
11000-89 = "Saguão do Conselho Estudantil Geral"
11000-91 = "..."
11000-92 = "[s] \"...?\""
11000-93 = "Você parecia cansado, mas eu não achei que você cairia no sono enquanto esperava."
11000-94 = "...Você devia estar sonhando. Por favor, acorde e concentre-se."
11000-95 = "Irei explicar a situação atual novamente."
11000-96 = "Meu nome é Nanagami Rin eu sou a Oficial Chefe do Conselho Estudantil Geral na cidade acadêmica de Kivotos."
11000-97 = "E você é o Sensei que convocamos aqui... aparentemente"
11000-98 = "......ah. A razão pela qual falei de forma especulativa é porque não sei os detalhes de como você veio aqui."
11000-99 = "..."
11000-100 = "Você está confuso, não está? Eu entendo."
11000-101 = "Sinto muito. Mas por enquanto, por favor, siga-me."
11000-102 = "Tem uma coisa que eu preciso que você faça."
11000-103 = "..."
11000-104 = "Vamos dizer que isso é um assunto importante que afetará o destino da Cidade Acadêmica..."
11000-106 = "[ns] Siga-me."
11000-111 = "(Wiiiiiiiin――)"
11000-114 = "Bem-vindo à Kivotos, Sensei."
11000-115 = "Kivotos é uma enorme Cidade Acadêmica composta por milhares de escolas. É aqui também que o Sensei trabalhará a partir de agora."
11000-116 = "Eu imagino que seja bem diferente do lugar que chama de \"casa\", então você pode ter dificuldade em se acostumar no começo..."
11000-117 = "Mas se você é Sensei, provavelmente não precisa se preocupar tanto."
11000-118 = "Afinal, a Presidente do Conselho Estudantil Geral é quem o escolheu."
11000-119 = "...Explicarei isso mais tarde."
11000-120 = "(ding)"
11000-122 = "Sala de Recepção"
11000-123 = "(Pessoas falando...)"
11000-124 = "Espere um minuto! Presidente falsa! Estavamos esperando! Ligue para a Presidente do Conselho Estudantil Geral de verdade!"
11000-125 = "...Huh? Quem é o adulto ao seu lado?"
11000-126 = "Estava esperando vê-la, Oficial Chefe."
11000-127 = "Vim ver a Presidente do Conselho Estudantil Geral. A Presidente do Comitê de Morais Públicas #ndemanda uma resposta satisfatória sobre a situação atual."
11000-130 = "Ah... Se esse timing não é incoviniente."
11000-131 = "Olá, a todos as convidadas que representam conselhos estudantis de escolas vizinhas, comitês de disciplina e outras que vieram por terem tempo livre demais."
11000-132 = "Eu estou ciente do que vocês andarilhas-quero dizer, pessoas importantes vieram aqui me visitar."
11000-133 = "Vocês estão aqui para responsabilizár-nos pelo caos que está acontecendo na Cidade Acadêmica agora... certo?"
11000-134 = "Se você sabe tanto, faça alguma coisa! Você representa o Conselho Estudantil Geral!"
11000-135 = "Milhares de distritos escolares autônomos estão um caos! Outro dia, o parque eólico da nossa escola foi destruído!"
11000-137 = "Nós também recebemos a informação de que alguns estudantes suspensos da Agência Correcional Federal haviam fugido."
11000-138 = "A frequência com que delinquentes como Sukeban atacam estudantes no caminho para a escola aumentou rapidamente recentemente. #nEstá se tornando difícil manter a ordem pública."
11000-139 = "A distribuição ilegal de armas de origem desconhecida, como tanques e helicópteros, também aumentou mais de 2000%. #nNesse ritmo a vida escolar normal em Kivotos desaparecerá."
11000-141 = "..."
11000-142 = "O que a Presidente do Conselho Estudantil Geral está fazendo em uma situação como esta? Por que ela não aparece há semanas? #nDeixe-me vê-la agora!"
11000-143 = "..."
11000-144 = "A Presidente do Conselho Estudantil Geral não está atualmente em seu cargo. Para ser sincera, ela desapareceu."
11000-146 = "...O que!?"
11000-147 = "...! !"
11000-148 = "Como esperado aqueles rumores eram..."
11000-150 = "Concluindo, o Conselho Estudantil Geral perdeu sua autoridade sob a Torre Sanctum, porque a Presidente desapareceu."
11000-151 = "Nós estavamos procurando uma maneira de ignorar a autenticação mas nada funcionava... Até agora."
11000-152 = "Então agora há uma maneira, Oficial Chefe?"
11000-153 = "Sim."
11000-154 = "Sensei aqui é a solução."
11000-156 = "!?"
11000-157 = "!"
11000-158 = "Essa pessoa?"
11000-159 = "[s] \"Eu?\""
11000-160 = "Espere um minuto. Aliás, quem diabos é esse \"Sensei\"? Por que ele está aqui?"
11000-161 = "Parece que ele veio de outro lugar que não é Kivotos... mas ele é Sensei."
11000-163 = "Este é [USERNAME] Sensei, ele trabalhará como Sensei em Kivotos a partir de agora e foi especialmente nomeado pela Presidente do Conselho Estudantil Geral."
11000-164 = "Nomeado pela desaparecida Presidente do Conselho Estudantil Geral...? Tudo está ficando cada vez mais confuso..."
11000-165 = "[s] (Cumprimente a todas com um sorriso)"
11000-166 = "O-Olá, Sensei. Eu sou da Escola Científica Millennium..."
11000-167 = "E-espera, esqueça introduções...!"
11000-168 = "Não se preocupe com essa garota barulhenta. Continuando..."
11000-169 = "Quem você está chamando de barulhenta?? Eu sou a Hayase Yuuka! Lembre-se desse nome Sensei!"
11000-170 = "[s] \"Prazer em conhecê-la.\""
11000-172 = "...Você originalmente veio aqui como conselheiro encarregado de um clube iniciado pela Presidente do Conselho Estudantil Geral."
11000-173 = "O Clube de Investigação Federal: Schale."
11000-174 = "Esse não é apenas um clube normal, é uma espécie de instituição extralegal. #nPor se tratar de um clube federal, é possível registrar alunas de todas as escolas de Kivotos sem quaisquer restrições."
11000-175 = "Também é possível realizar atividades de combate sem restrições na região autónoma de cada escola."
11000-176 = "Não sei por que a Presidente do Conselho Estudantil Geral criou uma organização com tanta autoridade, mas..."
11000-177 = "A sala de Schale está localizada a cerca de 30 km daqui. #nAtualmente, o prédio está quase vazio, mas por ordem da Presidente do Conselho Estudantil Geral, \"certas coisas\" foram trazidas para o porão."
11000-178 = "Eu tenho que levar o Sensei lá."
11000-179 = "Momoka, precisamos de um helicóptero para ir direto para Schale."
11000-180 = "Schale? ...Oh, no distrito externo? Há uma grande confusão lá"
11000-181 = "Uma grande confusão...?"
11000-182 = "Uma estudante suspensa que escapou da Agência Correcional Federal causou uma comoção. Agora é um campo de batalha."
11000-183 = "..."
11000-184 = "É como se elas tivessem rancor do Conselho Estudantil Geral e estivessem liderando o caminho com as delinquentes locais, incendiando a área ao seu redor. #nParece que conseguiram um tanque Crusader!"
11000-185 = "Então, parece que eles estão tentando ocupar o prédio da Schale porque é propriedade do Conselho Estudantil Geral. Acham que tem algo importante lá dentro."
11000-186 = "..."
11000-187 = "Bem, já está uma bagunça, então não é nada demais... ah, Senpai, chegou a entrega que pedi, então entro em contato depois!"
11000-188 = "(zumbido)"
11000-189 = "..."
11000-190 = "(tremendo)..."
11000-191 = "[s1] \"Você está bem?\"\n[s2] \"Respire fundo Rin, Respire fundo.\""
11000-192 = "...E-estou bem...Houve um pequeno problema, mas não é grande coisa."
11000-193 = "...E-estou bem...Houve um pequeno problema, mas não é grande coisa."
11000-195 = "(Encara)"
11000-196 = "...?"
11000-197 = "O que? por que você está olhando para nós?"
11000-198 = "Fico animada pelo fato de haver aqui pessoas maravilhosas que representam cada escola."
11000-199 = "Huh?"
11000-200 = "Para trazer paz a Kivotos, precisamos desesperadamente da ajuda de todos vocês. Vamos."
11000-202 = "Ei, espere um minuto!? O-Onde você estamos indo??"
11000-205 = "Arredores de D.U., Perto da sala do clube Schale"
11000-206 = "(Swooish!!)"
11000-207 = "(BOOOOOOM!)"
11000-208 = "O que, o-o que é isso!?"
11000-209 = "(Tatatatata!!)"
11000-210 = "Por que NÓS temos que lutar contra os delinquentes?!"
11000-211 = "Para recuperar o controle da Torre Sanctum, precisamos recapturar aquela sala do clube..."
11000-212 = "Eu sei disso...! Mas ainda sou membra do conselho estudantil da minha escola e é assim que sou tratada?! Por que eu...!"
11000-214 = "(Papapapapa!)"
11000-215 = "Oww! Isso dói!! Eles estão usando balas JHP ilegais!?"
11000-216 = "Por favor, deite-se, Yuuka. Além disso, as balas de ponta oca não são consideradas ilegais."
11000-217 = "De agora em diante vai ser ilegal na minha escola! Isso vai deixar uma cicatriz!"
11000-218 = "Nós precisamos lembrar que Sensei está aqui agora."
11000-219 = "Proteger o Sensei é prioridade. #nRecapturar aquele prédio é o próximo passo."
11000-220 = "Hasumi está certa. O Sensei é de outro lugar que não é Kivotos, então..."
11000-221 = "Ao contrário de nós, mesmo uma única bala pode colocar a sua vida em perigo. Por favor, não esqueça isso!"
11000-222 = "Eu entendo. Sensei, por favor, não vá para o campo de batalha! Fique neste lugar seguro enquanto lutamos!"
11000-223 = "[s3] \"Eu assumirei o comando, deixe comigo.\"\n[s4] \"Siga minhas instruções de agora em diante.\""
11000-224 = "O-o que? Você vai nos comandar? Bem... você é o Sensei..."
11000-225 = "O-o que? Você vai nos comandar? Bem... você é o Sensei..."
11000-226 = "Entendido. De agora em diante, nós seguiremos as suas instruções Sensei."
11000-227 = "É natural que alunas sigam as palavras do Sensei. Contaremos com você"
11000-229 = "Ok, então vamos!"
