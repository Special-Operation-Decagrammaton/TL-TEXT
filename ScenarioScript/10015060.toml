[translation]
10015060-1 = "第6話;応援という名の戦車"
10015060-9 = "何、あのロボット？ものすごく固いじゃん！"
10015060-18 = "マキの徹甲弾が全て弾かれた……一体どんな素材を使ったの？"
10015060-19 = "加速力もすごい……車体に照準を合わせることさえ難しいですね。"
10015060-21 = "エンジニア部……あの短時間で一体なんて怪物を……。"
10015060-23 = "そんなに褒められると、少し照れくさいですね！"
10015060-24 = "でも、依頼を受けた以上、雑に仕上げるわけにはいかない……。"
10015060-25 = "任された仕事に対して、最善を尽くすのが私たちエンジニア部のモットーだからね。"
10015060-27 = "褒めてない！！"
10015060-36 = "はぁ、はぁ……もう大丈夫よね？"
10015060-37 = "このロボット、すごい……！"
10015060-38 = "やはりミレニアムのマイスターが作った作品というか……"
10015060-39 = "これだけの戦闘力を備えたロボットなら、いくらでも他の生徒たちの足を引っ張れそう。"
10015060-40 = "……ところで、エンジニア部はこんな凄まじい性能の戦車を大運動会のどこで使おうとしたのかしら。"
10015060-41 = "そんな事はどうでもいいわよ。大運動会について考えたって、嫌な記憶を思い出すだけだし……。"
10015060-42 = "とりあえず、見つからないようにするわよ！"
10015060-48 = "う、うわっ！こっちに転がってくる！"
10015060-49 = "ちょ、ちょっとマキ押さないで、転ぶ……！"
10015060-51 = "ウタハ部長、あの戦車を無力化させる方法は？#nあなたたちが作った物でしょ？"
10015060-52 = "悪いけど、今の私たちの力だけでは不可能だね。"
10015060-53 = "あの戦車……いや、応援ロボットの装甲は、#nかなりの衝撃を受けても壊れない高硬度圧延装甲でできているんだ。"
10015060-54 = "はい。何重にも圧延した鉄板に超高周波を流し、表面硬化処理をしましたので！"
10015060-55 = "修理が難しいのが短所だけど……防御力だけは折り紙つき。"
10015060-57 = "……あなたたちは、どうしていつもこんな事ばかりに本気出すの？"
10015060-58 = "最初に犯人がロボットをハッキングしたように、#nヴェリタスが制御権を奪うのは難しいだろうか……？"
10015060-59 = "制御に使われるマルチチャンネルに干渉して主導権を奪ってくることもできるけど、機体が動いている状況ではあまりオススメしたくないかな。"
10015060-60 = "電波干渉で命令が混線して、機体が暴走する危険もあるからね。"
10015060-61 = "……そうなったら、本当に誰も対処できない事になりかねない。"
10015060-62 = "こうなった以上、爆弾でカタピラを切るしか……"
10015060-63 = "割り込んで申し訳ありませんが、その案は再考をお願いいたします。"
10015060-67 = "カタピラを切るほどの強力な爆薬を使ったら、#n他の生徒がその爆発に巻き込まれて怪我をする危険もあります。"
10015060-68 = "それに、機能と形はともかく……#n現時点で動かせる応援ロボットは、エンジニア部のアレしかなさそうなので……"
10015060-69 = "今はできるだけダメージを最小限に抑えたまま、あの戦車――#n失礼、あの応援ロボットを制圧したいと思います。"
10015060-70 = "でも、10トン近いロボットをどうやって無傷で制圧する？"
10015060-71 = "あんな暴れ牛のような戦車、近づきたくもないですが……"
10015060-72 = "そうだね、カウボーイじゃあるまいし！"
10015060-73 = "カウボーイ……ふふ、それも面白いアイデアですね。"
10015060-78 = "いい案が一つ浮かんだのですが……皆さん、少し手を貸していただけませんか？"
10015060-90 = "……みんなどこ行ったの？諦めたのかしら？"
10015060-91 = "そんなわけないでしょ。セミナーの役員が今回の「[ruby=こうりんたいさい]晄輪大祭[/ruby]」に費やした費用はいくらだと思ってるの、この程度で諦めるわけないわよ。"
10015060-92 = "あいつらは、今も大運動会を続ける方法を探しているはずよ。"
10015060-93 = "あれ？あの生徒は……"
10015060-100 = "う、うわぁ……ば、バレちゃった～……。"
10015060-101 = "「晄・反・会」の目を避けて、旗を持ってこっそり逃げようと思ってたのに～……。"
10015060-103 = "………そんな派手な格好、見落とすわけないでしょ。"
10015060-105 = "「トラック・クラッシャー」、すぐに追いなさい！"
10015060-113 = "ちょっと待った！君たちの相手はそっちじゃない！"
10015060-114 = "その戦車……いや、応援ロボットの相手は私が代わりにしよう！"
10015060-120 = "あれ？今度は別の方から……？"
10015060-121 = "何を考えているか分からないけど、喧嘩なら買うわよ！"
10015060-122 = "待って、気をつけて。何か雰囲気がおかしいよ……罠じゃない？"
10015060-123 = "なんかあっちに、旗が鉄条網みたいにたくさん掛けられてるけど……"
10015060-124 = "大丈夫。どうせ「トラック・クラッシャー」の装甲を貫通できるような武器はこの辺にないよ。"
10015060-125 = "それに、あんな細い針金なんかで戦車を止められるわけが……"
10015060-142 = "と、止まった？"
10015060-143 = "ど、どうして……！？"
10015060-145 = "説明しましょう！"
10015060-146 = "車輪の上にレールを繋げて接地力を高めたカタピラは、地形の影響をほとんど受けずに簡単に悪路を走破できますが、起動輪とカタピラの間に異物が挟まると故障しやすいという短所がありますね！"
10015060-147 = "そのため、このように複数の段で設置したワイヤーの上を走行すると、ワイヤーがカタピラに吸い込まれて走行障害を起こします！"
10015060-148 = "ふふ……図面上でカタピラと起動輪の間にワイヤーが入りそうだったので、#n言ってみましたが……やはり正解でしたね。"
10015060-149 = "旗に用いるために注文したこの特許ワイヤーは、[ruby=ひっぱりりょく]引張力[/ruby]とせん断力に優れているため、中々切れにくいんです。"
10015060-150 = "エンジンの故障を誘発することはありませんが……#nカタピラの間に巻き込まれたワイヤーを全て外すには、かなり時間がかかると思います。"
10015060-152 = "い、いくらなんでもエンジニア部のマイスターが作ったものなのに、こんな単純なトラップで走行不能になるとかあり得る？"
10015060-154 = "えっと……言われてみればそうですね。#nこんな致命的な短所があったのに、どうして改善しなかったのでしょうか？"
10015060-155 = "傾斜路を移動しやすい機能を入れてほしいとは頼まれたけど、#n鉄条網地帯を開拓できる機能を入れてほしいとは言われてないからね。"
10015060-156 = "開発にかけられる費用は無限ではない。#n機能を選別し、具現化させてこそクライアントを満足させることができるわけさ。"
10015060-157 = "……それは理解してるのに、どうして応援ロボットに15mm機関砲なんてつけたの？"
10015060-158 = "何を言ってるんだ。#n15mm機関砲はロマンだろう？"
10015060-160 = "だ、大丈夫よ！慌てないで！"
10015060-162 = "たとえカタピラに異常が発生しても、厚い装甲と機関砲はまだまだ平気だから――"
10015060-169 = "……え？"
10015060-170 = "ここにいらっしゃったんですね、会員の皆さん。"
10015060-172 = "う、うわぁああっ！？"
10015060-174 = "す、スミレ部長？え、どうやって私たちがここにいるって分かったの！？"
10015060-176 = "使われていない倉庫から声が聞こえたので念のためだったのですが……#nやはりここでしたか。"
10015060-177 = "いくら小声で話しても、私の耳からは逃れられません。"
10015060-178 = "ボールを転がしながら走るトレーニングは何度もしていましたが、逃げるボールを追いかけるのは初めてなので……普段使わない筋肉がかなり鍛えられました。"
10015060-179 = "特別な運動体験を、ありがとうございます。お礼にこれから――"
10015060-183 = "――特別トレーニングを開始します！"
10015060-185 = "い、いやだ～！！"
