[translation]
10015060-1 = "Episódio 6; Tanque em nome do apoio"
10015060-9 = "Que robô é aquele? Ele é incrivelmente resistente!"
10015060-18 = "As balas perfurantes da Maki ricochetearam todas... Que tipo de material eles usaram?"
10015060-19 = "A aceleração também é impressionante... É difícil até mesmo mirar na carroceria."
10015060-21 = "Departamento de Engenharia... Que tipo de monstro eles criaram em tão pouco tempo..."
10015060-23 = "Fico um pouco envergonhada quando me elogiam tanto assim!"
10015060-24 = "Mas, já que aceitamos o pedido, não podemos fazer um trabalho de qualquer jeito..."
10015060-25 = "Dar o nosso melhor no trabalho que nos foi confiado é o lema do nosso Departamento de Engenharia."
10015060-27 = "Eu não estava elogiando!!"
10015060-36 = "Haa, haa... Já estamos seguras, né?"
10015060-37 = "Esse robô é incrível...!"
10015060-38 = "Como esperado de uma obra feita pelos mestres do Millennium..."
10015060-39 = "Com um poder de combate desses, esse robô poderia atrapalhar as outras alunas o quanto quisesse."
10015060-40 = "...Aliás, onde o Departamento de Engenharia pretendia usar um tanque com esse desempenho absurdo no Grande Festival Esportivo?"
10015060-41 = "Não importa. Pensar no Grande Festival Esportivo só me traz lembranças ruins..."
10015060-42 = "Por enquanto, vamos tentar não ser encontradas!"
10015060-48 = "U-uau! Ele está rolando para cá!"
10015060-49 = "Ei, Maki, não empurra, eu vou cair...!"
10015060-51 = "Chefe Utaha, qual é o método para neutralizar esse tanque? #nFoi vocês que construíram, não foi?"
10015060-52 = "Sinto muito, mas com a nossa força atual, é impossível."
10015060-53 = "A blindagem daquele tanque... não, daquele robô de apoio, é feita de aço laminado de alta dureza que não quebra mesmo recebendo impactos consideráveis."
10015060-54 = "Sim. Nós aplicamos um tratamento de endurecimento de superfície passando frequências ultra-altas em chapas de ferro laminadas várias vezes!"
10015060-55 = "O ponto negativo é que é difícil de consertar, mas a defesa é garantida."
10015060-57 = "...Por que vocês sempre levam essas coisas tão a sério?"
10015060-58 = "Assim como o culpado hackeou o robô no início, #nserá que seria difícil para o Veritas tomar o controle...?"
10015060-59 = "Até podemos interferir no multicanal usado para o controle e tomar a liderança, mas não recomendo fazer isso enquanto a máquina estiver em movimento."
10015060-60 = "Existe o risco de a interferência de rádio causar um cruzamento de comandos e a máquina sair do controle."
10015060-61 = "...Se isso acontecer, ninguém poderá lidar com a situação."
10015060-62 = "Já que chegou a esse ponto, só nos resta cortar as esteiras com uma bomba..."
10015060-63 = "Peço desculpas pela interrupção, mas peço que reconsiderem essa ideia."
10015060-67 = "Se usarem um explosivo forte o suficiente para cortar as esteiras, #nhá o risco de outras alunas serem atingidas pela explosão e se ferirem."
10015060-68 = "Além disso, deixando de lado a função e a forma... #nno momento, parece que o único robô de apoio que podemos mover é aquele do Departamento de Engenharia..."
10015060-69 = "Agora, quero subjugar aquele tanque — perdão, aquele robô de apoio — mantendo os danos no mínimo possível."
10015060-70 = "Mas como vamos subjugar um robô de quase 10 toneladas sem causar danos?"
10015060-71 = "Não quero nem chegar perto daquele tanque que parece um touro enfurecido..."
10015060-72 = "É verdade, não somos caubóis!"
10015060-73 = "Caubóis... Fufu, essa é uma ideia interessante."
10015060-78 = "Tive uma boa ideia... Pessoal, poderiam me dar uma mãozinha?"
10015060-90 = "...Para onde todos foram? Será que desistiram?"
10015060-91 = "Não tem como. Você sabe quanto a diretoria do Seminar gastou neste \"Grande Festival Esportivo\"? Não tem como desistirem por causa disso."
10015060-92 = "Eles devem estar procurando um jeito de continuar o Grande Festival Esportivo agora mesmo."
10015060-93 = "Ué? Aquela aluna é..."
10015060-100 = "U-uau... F-fui descoberta..."
10015060-101 = "Eu queria fugir escondida com a bandeira, evitando os olhos do \"Comitê de Execução do Festival\"..."
10015060-103 = ".........Não tem como deixar passar despercebido alguém com um visual tão chamativo."
10015060-105 = "\"Destruidor de Caminhões\", persiga-os imediatamente!"
10015060-113 = "Espere um pouco! O oponente de vocês não é esse!"
10015060-114 = "Eu cuidarei daquele tanque... não, daquele robô de apoio!"
10015060-120 = "Ué? Agora de outra direção...?"
10015060-121 = "Não sei o que você está pensando, mas se quer briga, eu aceito!"
10015060-122 = "Espere, tome cuidado. A atmosfera está estranha... não acha que é uma armadilha?"
10015060-123 = "Tem um monte de bandeiras penduradas ali, parecendo arame farpado..."
10015060-124 = "Está tudo bem. De qualquer forma, não há armas por aqui capazes de perfurar a blindagem do 'Truck Crusher'."
10015060-125 = "Além disso, não tem como um arame tão fino parar um tanque..."
10015060-142 = "P-parou?"
10015060-143 = "P-por que...!?"
10015060-145 = "Deixe-me explicar!"
10015060-146 = "As lagartas, que aumentam a tração ao conectar trilhos sobre as rodas, podem atravessar terrenos acidentados facilmente com pouco impacto do terreno, mas têm a desvantagem de falharem facilmente se um objeto estranho ficar preso entre a roda motriz e a lagarta!"
10015060-147 = "Por isso, ao passar por cima desses fios instalados em vários níveis, o fio é sugado para dentro da lagarta, causando uma falha na locomoção!"
10015060-148 = "Fufu... eu vi no projeto que o fio poderia entrar entre a lagarta e a roda motriz, então... #nresolvi testar... e pelo visto, eu estava certa."
10015060-149 = "Este fio patenteado que encomendei para usar nas bandeiras tem uma excelente força de tração e resistência ao cisalhamento, por isso é muito difícil de cortar."
10015060-150 = "Não vai causar uma falha no motor, mas... #nacho que vai levar um bom tempo para remover todos os fios presos entre as lagartas."
10015060-152 = "M-mas como é possível que algo feito pelos mestres do Clube de Engenharia fique imobilizado por uma armadilha tão simples?"
10015060-154 = "Bem... agora que você mencionou, é verdade. #nPor que não corrigimos uma falha tão fatal quanto essa?"
10015060-155 = "Pediram para colocar uma função que facilitasse a movimentação em rampas, mas #nnão pediram para colocar uma função que pudesse atravessar zonas de arame farpado."
10015060-156 = "O orçamento para o desenvolvimento não é infinito. #nÉ preciso selecionar e implementar as funções para satisfazer o cliente."
10015060-157 = "...Eu entendo isso, mas por que você colocou um canhão automático de 15mm no robô de torcida?"
10015060-158 = "Do que você está falando? #nUm canhão automático de 15mm é puro romance, não é?"
10015060-160 = "T-tá tudo bem! Não entrem em pânico!"
10015060-162 = "Mesmo que a lagarta tenha um problema, a blindagem grossa e o canhão ainda estão funcionando, então—"
10015060-169 = "...Hã?"
10015060-170 = "Então vocês estavam aqui, membros."
10015060-172 = "A-aaaaah!?"
10015060-174 = "S-Sumire-bucho? Como você sabia que estávamos aqui!?"
10015060-176 = "Ouvi vozes vindo de um armazém que não deveria estar sendo usado, então vim verificar por precaução... #ne pelo visto, era aqui mesmo."
10015060-177 = "Não importa o quão baixo vocês falem, não conseguirão escapar dos meus ouvidos."
10015060-178 = "Eu já treinei muito correndo enquanto rolava uma bola, mas é a primeira vez que persigo uma bola que está fugindo... então exercitei bastante músculos que não costumo usar."
10015060-179 = "Obrigada pela experiência de exercício especial. Como agradecimento, agora..."
10015060-183 = "—vou começar o treinamento especial!"
10015060-185 = "N-não, por favor!!"
