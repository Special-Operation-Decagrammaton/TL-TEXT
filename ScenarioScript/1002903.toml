[translation]
1002903-1 = "2ª Aula: \"Matéria: Tolerância\""
1002903-3 = "（Logo após receber a notificação no Momotalk, Natsu veio ao Schale）"
1002903-4 = "（Tendo a premonição de que seria uma conversa longa, dirijo-me à sala de descanso）"
1002903-12 = "Entendo, entendo, este é um lugar com uma atmosfera muito boa."
1002903-13 = "Poderíamos até fazer deste lugar a nossa sala do clube e ficar aqui para sempre..."
1002903-14 = "Estou brincando, estou brincando~ Não precisa levar a sério, Sensei."
1002903-15 = "Hoje, eu queria encontrar uma forma de dissipar essa tristeza que surgiu de repente."
1002903-16 = "……Hm? Isto?"
1002903-17 = "Bem, continuando de onde paramos, acho que podemos chamar de \"material didático\"?"
1002903-21 = "Na verdade, só isso não é o suficiente."
1002903-22 = "……?"
1002903-23 = "O que quer dizer com \"não aconteceu nada\"...? Ah, está preocupado por causa do Momotalk?"
1002903-24 = "Desculpe, desculpe, estou bem mesmo. Não foi algo que aconteceu comigo de verdade."
1002903-25 = "É só que eu vi as notícias de manhã e pensei nisso. Sabe, coisas assim acontecem de vez em quando."
1002903-26 = "Histórias sobre pessoas que, sem se entenderem, lutam para excluir umas às outras... e as tragédias que nascem disso..."
1002903-27 = "Por causa dessa repetição, acabamos não percebendo o que há do outro lado da fronteira. E mesmo quando percebemos, a frustração de não conseguir chegar lá."
1002903-28 = "……É como alguns fanáticos por doces que acham que só o sabor que eles gostam é o melhor e não conseguem aceitar a preferência dos outros~"
1002903-29 = "E aí, eu não consegui guardar isso só para mim e quis conversar, mas, bem, se eu falasse isso do nada para outros alunos, eles ficariam confusos, né?"
1002903-30 = "Por isso, vim falar com o Sensei, que parece ser alguém com quem posso conversar sobre essas coisas de repente."
1002903-31 = "Bem, por causa disso, em qualquer mundo ou lugar, sempre existem histórias e conflitos."
1002903-32 = "Se chocolate com menta é bom ou não, se o verdadeiro café é apenas o expresso, se americano é uma heresia..."
1002903-36 = "……Bem,"
1002903-37 = "Acho que é mais rápido mostrar diretamente, não é?"
1002903-46 = "（Natsu vai até o canto da sala de descanso e liga a máquina de café）"
1002903-52 = "Sensei, você gosta de expresso?"
1002903-53 = "[s1] \"Gosto bastante. Costumo beber quando estou trabalhando.\"\n[s2] \"Não sou muito fã de coisas amargas...\""
1002903-54 = "Entendi, entendi."
1002903-55 = "Então, o que acha disto? Pode ser uma preferência pessoal, mas..."
1002903-56 = "Entendi, entendi."
1002903-57 = "Então, o que acha disto? Pessoalmente, eu prefiro este aqui, mas..."
1002903-58 = "Algo que está no extremo oposto do expresso..."
1002903-63 = "（Natsu mexe na sacola de papel que trouxe e tira algo de dentro）"
1002903-64 = "O sinônimo de doçura padrão,"
1002903-65 = "\"Sorvete de baunilha\"! Tcharam!"
1002903-66 = "Apesar da aparência, eu também sou uma estudante do ensino médio na flor da idade. Eu gosto dessas coisas."
1002903-67 = "A frieza e a doçura que derretem na boca... e ainda assim, não é enjoativo, parece que dá para comer o quanto quiser...!"
1002903-68 = "O básico e, ao mesmo tempo, uma técnica suprema... é um dos melhores doces, tanto no nome quanto na prática. Só isso já é um doce completo."
1002903-69 = "……Mas, Sensei."
1002903-70 = "\"Expresso é o melhor\", \"Sorvete de baunilha é o melhor\"... Existe um patamar que não se alcança apenas com esse tipo de disputa e insistência. Você sabia?"
1002903-71 = "[s3] \"Um patamar que não se alcança?\"\n[s4] \"O que quer dizer?\""
1002903-72 = "Ver para crer. Vamos, contemple!"
1002903-73 = "Ver para crer. Vamos, contemple!"
1002903-79 = "（Natsu coloca o sorvete de baunilha em uma tigela e começa a despejar o expresso recém-coado por cima）"
1002903-80 = "（O café quente derrete o sorvete de baunilha aos poucos, misturando-se lentamente...）"
1002903-81 = "Chama-se \"Affogato\". Você sabia?"
1002903-82 = "A fusão do sorvete de baunilha, o representante da doçura, com o expresso, o representante do amargor."
1002903-83 = "Dizem que, entre os milhares de doces que existem, este é um dos mais famosos por ser uma iguaria."
1002903-84 = "Olhe para esse visual maravilhoso. Este novo patamar que abraça tanto quem gosta de doces quanto quem gosta de amargos."
1002903-85 = "Um sabor que jamais seria alcançado por uma mentalidade que insiste demais em apenas um lado e exclui o outro."
1002903-86 = "……Sim, maravilhoso."
1002903-87 = "Se todos fossem assim, se tivessem pelo menos um pouco dessa capacidade de aceitação..."
1002903-88 = "Não precisaríamos ter medo de nada, nem lutar uns contra os outros, não é?"
1002903-89 = "……"
1002903-90 = "[s5] \"Natsu, você é gentil.\"\n[s6] \"Acho que o fato de você pensar assim primeiro também é uma forma de aceitação.\""
1002903-91 = "……Entendi."
1002903-92 = "……Entendi."
1002903-93 = "Hmm……"
1002903-97 = "Na verdade, não era essa a intenção da nossa conversa de hoje."
1002903-98 = "Porque, normalmente, ouvir coisas como \"do nada\", \"estranho\" ou \"não entendo nada\"... era o meu dia a dia."
1002903-99 = "Claro, eu entrei em contato justamente porque pensei que poderia ouvir palavras diferentes vindo de você, Sensei, mas..."
1002903-100 = "Acabei ouvindo algo inesperadamente romântico. Que surpresa, que surpresa."
1002903-101 = "……Acho que não precisava nem ter tido aula hoje. Será que isso é o que chamam de \"ensinar o padre a rezar a missa\"? Mas isso soa um pouco rude, não é?"
1002903-102 = "……Ah."
1002903-103 = "Bem, sendo assim, acho que não precisamos de aula de reforço hoje..."
1002903-109 = "……Quer dividir um affogato comigo?"
1002903-111 = "(Depois disso, saboreei um affogato junto com a Natsu.)"
1002903-112 = "(A expressão da Natsu ao voltar para casa parecia muito mais radiante do que quando ela chegou.)"
