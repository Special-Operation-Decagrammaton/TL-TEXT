[translation]
1002903-1 = "2時間目「科目：包容」"
1002903-3 = "（モモトークの通知を受け取ってからすぐ、ナツがシャーレに来ていた）"
1002903-4 = "（何となく長い会話になる予感がして、休憩室へと向かう）"
1002903-12 = "なるほどなるほど、これは良い雰囲気の場所だぁ。"
1002903-13 = "いっそここを私たちの部室ってことにして、いつまでも居座るとか……"
1002903-14 = "なんて冗談冗談～、真剣に考えなくて良いんだよ先生。"
1002903-15 = "今日はね、突如として降り注いだこの悲しみをどうにか払拭したいな、って思ってね。"
1002903-16 = "……ん？これ？"
1002903-17 = "まあ前回に引き続き、「教材」ってところかな？"
1002903-21 = "実は、これだけだと足りないんだけどね。"
1002903-22 = "……？"
1002903-23 = "本当に何も無かったの、って……？あー、モモトークのことで心配してくれてる？"
1002903-24 = "ごめんごめん、本当に大丈夫だよー。私に実際起きたことじゃないし。"
1002903-25 = "ただ、朝のニュースを見ててそう思っただけ。ただこういうの、時々あるんだよねぇ。"
1002903-26 = "お互いに理解することもできずに排除しようと争う、そんな物語……そこから生まれる悲劇の数々……。"
1002903-27 = "その繰り返しのせいで気づかずにいる、境界線の向こう側。たとえ気づいても、そこにたどり着けないというこのもどかしさ。"
1002903-28 = "……まるで自分の気に入った味だけを最高とし、相手の好みを認められない一部のスイーツマニアみたいだね～。"
1002903-29 = "で、ちょっと抱えきれなくておしゃべりしたくなったんだけど、まあ急にこんなこと言われても普通の生徒たちじゃあ困っちゃうでしょ？"
1002903-30 = "だからこんな形で急に話しかけても良さそうな先生に、ね。"
1002903-31 = "まあそんなわけでどんな世界、どんな場所にだって、物語と葛藤はあるんだよ。"
1002903-32 = "チョコミントがどうとか、本当のコーヒーはエスプレッソだけだだとか、アメリカーノは邪道だとか……"
1002903-36 = "……まあ、"
1002903-37 = "直接見せた方が早いかな？"
1002903-46 = "（ナツは休憩室の隅っこへと向かい、コーヒーマシンを起動させた）"
1002903-52 = "先生はエスプレッソ、好き？"
1002903-53 = "[s1] \"結構好きかな。仕事の時もよく飲んでる。\"\n[s2] \"苦いのはちょっと……\""
1002903-54 = "そっかそっかー。"
1002903-55 = "じゃあこれはどう？私的な好みになっちゃうかもだけど……"
1002903-56 = "そっかそっかー。"
1002903-57 = "じゃあこれはどう？私的にはこっちの方が好みなんだけど……"
1002903-58 = "エスプレッソとはだいぶ対極に位置するもの……"
1002903-63 = "（ナツは持ってきた紙袋をガサガサさせると、中から何かを取り出した）"
1002903-64 = "スタンダードな甘さの代名詞、"
1002903-65 = "「バニラアイス」！どばーん！"
1002903-66 = "こう見えて私も、旬の女子高生だからね。こういうの好きなの。"
1002903-67 = "口の中でとろける冷たさと甘さ……それでいてしつこくなく、いくらでも食べれちゃいそうなその魅力……！"
1002903-68 = "初歩にして奥義……名実共に最高のスイーツのひとつだよね。これだけでも十分完成されたスイーツだし。"
1002903-69 = "……でもね、先生。"
1002903-70 = "「エスプレッソが最高」「バニラアイスが最高」……そんな微妙に食い違った論争と固執だけじゃ、到達できない境地があるんだよ。知ってる？"
1002903-71 = "[s3] \"到達できない境地？\"\n[s4] \"どういうこと？\""
1002903-72 = "百聞は一見に如かず。さあ、とくと見るが良い！"
1002903-73 = "百聞は一見に如かず。さあ、とくと見るが良い！"
1002903-79 = "（ナツはバニラアイスを皿に盛って、その上に淹れたばかりのエスプレッソを注ぎ始めた）"
1002903-80 = "（バニラアイスを熱いコーヒーが少しずつ溶かしていき、ゆっくりと混ざり合って……）"
1002903-81 = "「[ruby=Affogato]アフォガート[/ruby]」って言うの。知ってた？"
1002903-82 = "甘みの代表格とも言えるバニラアイスと、苦味の代表格とも言えるエスプレッソの融合。"
1002903-83 = "一説によると優に数千を超えると言われているスイーツの中でも、絶品だと名高いもののひとつなんだー。"
1002903-84 = "見て、この素敵なビジュアル。甘いものが好きな人も、苦いものが好きな人も、どっちも包み込むこの新しい境地。"
1002903-85 = "どちらか一方だけにこだわり過ぎて、他方を排斥するような考え方では、絶対にたどり着けない味。"
1002903-86 = "……うん、素晴らしい。"
1002903-87 = "誰もがこんな感じだったら、少しでもこんな包容力を持っていたら……。"
1002903-88 = "何かに怯えたり、お互いに戦う必要なんて無いのにねぇ。"
1002903-89 = "……。"
1002903-90 = "[s5] \"ナツは、優しいね。\"\n[s6] \"まずはそう思えることも、包容力だと思うよ。\""
1002903-91 = "……そっかー。"
1002903-92 = "……そっかー。"
1002903-93 = "うーん……"
1002903-97 = "実は、こういう流れのつもりじゃなかったんだけどねー、今日は。"
1002903-98 = "いつもは「唐突」とか「おかしい」とか、「よく分かんない」とか……そういうのが日常茶飯事だったから。"
1002903-99 = "もちろん、先生ならそういうのとは違う言葉が聞けるかなって思ったからこそ連絡した―、みたいなところはあるんだけど……。"
1002903-100 = "予想外にロマンチックな言葉を聞いちゃったなー。びっくりびっくり。"
1002903-101 = "……今日の授業は、私が教える必要なんてなかったね。「猿に木登り」って、このことかな？でもこれもなんか、失礼な響きかも？"
1002903-102 = "……あは。"
1002903-103 = "まあ、そしたら補習授業も今日は要らなそうだし……。"
1002903-109 = "……アフォガート、一緒に食べる？"
1002903-111 = "（その後、ナツと一緒にアフォガートを味わった）"
1002903-112 = "（帰路につく時のナツの表情は、来た時よりずいぶん明るいものに見えた）"
