[translation]
10009025-2 = "いやー、無事に捕まえられて良かったー！"
10009025-3 = "先生、ありがとうございます！本当に助かりました！"
10009025-4 = "[s] \"今度は矯正局から脱出……？\""
10009025-5 = "はい。どうやらその矯正局の施設は、かなり老朽化が進んでいたとかで……。"
10009025-6 = "その隙を突かれちゃったみたいだね。いやー、怖い怖い。"
10009025-7 = "さすがは「災厄の狐」さんと言ったところでしょうか……。"
10009025-8 = "[s] \"それ以前の問題のような……？\""
10009025-9 = "まあまあ、流石に予想外のアクシデントだったからしょうがないよ。"
10009025-10 = "でも大丈夫。次は別の、「最新式の設備が導入された施設」に移監することにしたから！"
10009025-11 = "はい、今度こそ大丈夫です！お任せください！"
10009025-12 = "[s] \"えっと……うん、お疲れ様。頑張ってね。\""
10009025-18 = "では先生、パトロールを続けましょうか。"
10009025-19 = "[s] \"セナは本当に冷静だね……。\""
10009025-21 = "（若干の不安を残しつつ、パトロールを再開することにした）"
