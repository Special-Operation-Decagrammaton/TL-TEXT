[translation]
10009025-2 = "Nossa, que bom que conseguimos capturar sem problemas!"
10009025-3 = "Sensei, muito obrigado! Você realmente nos salvou!"
10009025-4 = "[s] \"Desta vez foi uma fuga do Centro Correcional...?\""
10009025-5 = "Sim. Pelo que parece, as instalações daquele Centro Correcional estavam bastante deterioradas..."
10009025-6 = "Parece que ela aproveitou essa brecha. Nossa, que medo, que medo."
10009025-7 = "Como esperado da 'Raposa do Desastre', eu diria..."
10009025-8 = "[s] \"Não é um problema anterior a isso...?\""
10009025-9 = "Bem, bem, foi um acidente inesperado, então não tem como evitar."
10009025-10 = "Mas não se preocupe. Desta vez, decidimos transferi-la para outra instalação, uma com equipamentos de última geração!"
10009025-11 = "Sim, desta vez vai dar certo! Pode deixar com a gente!"
10009025-12 = "[s] \"Bem... é, bom trabalho. Boa sorte.\""
10009025-18 = "Então Sensei, vamos continuar com a patrulha?"
10009025-19 = "[s] \"Sena, você é realmente muito calma...\""
10009025-21 = "(Com um pouco de inquietação, decidimos retomar a patrulha)"
