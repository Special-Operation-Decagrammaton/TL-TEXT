[translation]
1007302-1 = "柄にもない格好"
1007302-4 = "（ウイを探して、島中を歩き回ること数時間……）"
1007302-11 = "（ようやく、海辺の岩陰に隠れているところを見つけた）"
1007302-15 = "[ns1] \"……やっと見つけた。\"\n[ns2] \"ウイ、どうしたの？\""
1007302-20 = "……先生？"
1007302-21 = "ど、どうしてここが分かったんですか……？#nそう簡単に、見つかるような場所では……"
1007302-22 = "それに、気にしないでくださいって伝えたのに……"
1007302-23 = "……え？"
1007302-24 = "ずっと、探して……？#nず、ずっとって……？"
1007302-29 = "……モモトーク送った時から！？"
1007302-30 = "……そ、そんなに、何時間も……"
1007302-31 = "言ったじゃないですか。先生には何も問題がないと……#nあるとしたら、それは私の方で。"
1007302-32 = "ですので……これ以上は、私に構わないでください。"
1007302-33 = "[s3] \"放ってなんかおけないよ。\"\n[s4] \"ウイのことが、心配だから。\""
1007302-36 = "ま、またそんな事いって……"
1007302-37 = "うう……。"
1007302-38 = "……ここにいる理由、ですか？"
1007302-39 = "その……わざわざ探していただくほどの事では無かったのですが……"
1007302-43 = "はぁ……"
1007302-47 = "その、なんと言いますか……こんな柄にもない格好をして、無人島で過ごすのが……"
1007302-48 = "恥ずかしくて、落ち着かなくて……"
1007302-49 = "私には、皆さんのように魅力的ではないですし……特段、華があるわけでもありません。"
1007302-50 = "自分でも分かっているんです。#n周囲からの印象なんて……"
1007302-51 = "いつもは一人、古書館で過ごしているのに……突然、無人島に行くよう言われたかと思えば、今度はこんな布面積の少ない格好をする羽目になって……"
1007302-52 = "その……"
1007302-53 = "色々と、疲れてしまってるんです……私としても、想定外の出来事ですし……"
1007302-54 = "……あ。"
1007302-55 = "ちょっと待ってください。先生が何を言おうとしているのかくらい、もう分かります。"
1007302-56 = "「似合ってるよ」とか「可愛いよ」とか……そういう言葉は、必要ありません。"
1007302-57 = "別に、慰めてほしいわけではありませんので……"
1007302-58 = "口先だけの言葉なんて聞きたくありません。#n今は、1人でいたいんです。"
1007302-59 = "……。"
1007302-60 = "……え？"
1007302-61 = "そういうつもりではない、んですか……？"
1007302-62 = "[s5] \"むしろ、ここでなら気楽に過ごせると思うよ。\"\n[s6] \"落ち着いて一緒に考えてみよっか。\""
1007302-65 = "それは……どういう意味でしょう……？"
1007302-66 = "……少し、時間をください。"
1007302-70 = "あれ……"
1007302-71 = "たしかに、言われてみれば……"
1007302-72 = "ここは……トリニティと違って、他の方はいませんし……"
1007302-73 = "いるのは、一緒に来た方々だけ。"
1007302-74 = "まだ完全に打ち解けたわけではありませんが……#nあの方々を迷惑だとは、思っていません。"
1007302-75 = "[s7] \"それは、みんな一緒なんだよ。\"\n[s8] \"だから、休みに遠くへ行ったりするんじゃないかな。\""
1007302-78 = "ふむ……他の方々も同じ悩みを。だから遠くへ……ですか。"
1007302-79 = "……その通りかもしれません。"
1007302-82 = "日常の喧騒から離れて、誰も知らない場所で過ごす……"
1007302-83 = "人を避けて隅っこに隠れている、いつもの私と一緒ですね。"
1007302-86 = "……たしかに、筋は通っています。"
1007302-87 = "つまりは、こういった格好にも意味が……？"
1007302-88 = "[s9] \"特別な思い出になると思うよ。\"\n[s10] \"非日常感を味わうスパイスみたいな。\""
1007302-91 = "なるほど……"
1007302-92 = "……そう思うと、少し納得できます。"
1007302-93 = "まあ、普段からこんな格好で過ごしてたら、変ですよね。"
1007302-94 = "[s11] \"えっと、それは……\"\n[s12] \"…………。\""
1007302-97 = "……冗談です。"
1007302-98 = "先生は、人を乗せるのが本当にお上手ですね。#nもちろん、悪い意味ではないので、誤解なさらず。"
1007302-99 = "口先だけの言葉には聞こえませんし、話していると、心が安らぐと言いますか……"
1007302-100 = "……これは、本心ですよ。"
1007302-101 = "先生の言葉からは……す、少しは気持ちが伝わってきますし。"
1007302-105 = "今まで、数え切れないほど耳にしてきました。#n心にもないお世辞や、ご機嫌取りの言葉……"
1007302-106 = "そのどれもが空っぽなことに気づいて、いつしか会話そのものが、時間の無駄としか思えなくなったんです。"
1007302-107 = "そうして徐々に人と距離を置くようになって……"
1007302-108 = "いつの間にか、人の気持ちを素直に受け入れられない……こんな私が出来上がっていました。"
1007302-109 = "陰気で、後ろ向きな人嫌い。#nいつもネガティブで、文句ばかり。"
1007302-110 = "そんな中、相手にしてくれるのは、優しくて口やかましい後輩たちだけで……#nそれが、私[ruby=・    ・    ・]でした[/ruby]。"
1007302-111 = "後輩にも申し訳なくなります。こんな私に付き合わせてしまって……"
1007302-112 = "でも、こんな私の隣に……それでも居てくれる方々がいます。"
1007302-113 = "変な人ですよ、本当に……"
1007302-114 = "私みたいなのを、まだ「先輩」と呼んで、度々訪ねてきてくれる後輩。#n何ひとつ得なんてないのに、こんな無人島まで付いてきてくれる人……"
1007302-115 = "……先生だって、そうです。#nむしろ、先生が一番変わっています。"
1007302-116 = "[s13] \"まぁ、それは自分が一番わかってるよ。\"\n[s14] \"類は友を呼ぶのかもね。\""
1007302-121 = "……ふっ。"
1007302-122 = "……ふふっ。まったく、先生は……"
1007302-123 = "……はい。"
1007302-124 = "……そういう事にしておきましょう。"
