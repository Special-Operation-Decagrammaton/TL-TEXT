[translation]
10016010-1 = "Episódio 1: Comitê Executivo em Chamas"
10016010-2 = "Sala do Comitê Executivo do Festival Esportivo"
10016010-10 = "……Obrigada por se reunirem aqui, mesmo com a agenda cheia."
10016010-11 = "Já que a cerimônia de abertura terminou sem problemas, vou explicar o cronograma e algumas precauções para o futuro."
10016010-12 = "Bem, houve um \"pequeno\" problema durante a cerimônia de abertura, mas……"
10016010-13 = "Ora…… O lado de Millennium considera aquilo um assunto trivial?"
10016010-14 = "E-er, bem, isso é……"
10016010-15 = "A representante dos atletas de Trinity fez comentários que mancharam a autoridade do Festival Esportivo em público, não podemos simplesmente ignorar isso."
10016010-16 = "Acredito que este é um caso em que a responsabilidade deve ser cobrada da Academia Trinity."
10016010-17 = "……"
10016010-18 = "M-m-me desculpem……."
10016010-19 = "Nós da Sisterhood também não imaginávamos que as coisas chegariam a esse ponto……"
10016010-20 = "N-não! Não é que não imaginávamos de forma alguma, mas……#nQuem diria que a situação chegaria a esse nível……"
10016010-21 = "Haa…… Então a possibilidade existia, não é?"
10016010-22 = "Fufu…… Que tal Trinity assumir a responsabilidade e se retirar do comitê executivo desta vez?"
10016010-23 = "Deixem o preenchimento das vagas restantes com o nosso Comitê Disciplinar."
10016010-24 = "――Aumentar o número de estudantes de Gehenna, é?"
10016010-25 = "A administradora pretende arruinar o Festival Esportivo?"
10016010-26 = "Acho que já está arruinado por causa de alguma academia, não acha?"
10016010-27 = "E-er…… P-por favor, todos, acalmem-se um pouco!"
10016010-28 = "O Festival Esportivo é um evento onde todos, independentemente da academia, dão as mãos para competir, não é?"
10016010-29 = "Se todos souberem que o comitê executivo está brigando assim antes mesmo das competições começarem……"
10016010-30 = "Tenho certeza de que ficarão tristes……."
10016010-31 = "……Peço desculpas."
10016010-32 = "Mesmo que saibam que o comitê executivo está brigando internamente, acho que haveria mais estudantes felizes do que tristes……."
10016010-36 = "Obrigada por intervir.#n――Seu nome é Iochi, não é?"
10016010-37 = "N-não…… Na verdade, peço desculpas por causar problemas……."
10016010-38 = "E, por favor, sinta-se à vontade para me chamar de Mari."
10016010-39 = "（……Acho que entendi um pouco por que essas duas foram escolhidas como membros do comitê executivo de Trinity）"
10016010-45 = "……Por causa disso, o conteúdo das seguintes modalidades foi parcialmente alterado.#nConsiderando o tempo necessário para a preparação, a ordem ajustada e os intervalos estão listados no panfleto, então deem uma olhada."
10016010-46 = "Embora sejam mudanças de última hora, não houve objeções de nenhuma das escolas participantes."
10016010-47 = "Alguma pergunta?"
10016010-48 = "[s] \"Posso perguntar uma coisa?\""
10016010-49 = "Professor do Schale, [USERNAME], por favor."
10016010-50 = "Há algo que lhe preocupa?"
10016010-51 = "[s1] \"Ouvi dizer que Millennium está organizando este Festival Esportivo…….\"\n[s2] \"Estudantes de outras escolas também podem fazer parte do comitê executivo……?\""
10016010-52 = "Sim. As competições do Festival Esportivo precisam ser operadas de forma justa para que nenhuma academia ou grupo específico seja favorecido."
10016010-53 = "Sim. As competições do Festival Esportivo precisam ser operadas de forma justa para que nenhuma academia ou grupo específico seja favorecido."
10016010-54 = "Se todos os processos de operação e gestão forem assumidos apenas pelos funcionários da escola anfitriã, é fácil ocorrerem irregularidades e surgirem insatisfações.#nPor isso, o comitê executivo é dividido entre várias academias, não apenas a anfitriã."
10016010-55 = "Além disso, como estudantes de várias academias se reúnem no Festival Esportivo, a possibilidade de problemas entre estudantes também aumenta, é claro.#nMesmo que a situação chegue a esse ponto, ter membros do comitê executivo da respectiva academia permite uma resolução rápida."
10016010-56 = "Originalmente, existe o costume de que os membros do comitê executivo do Festival Esportivo sejam os representantes dos conselhos estudantis de cada distrito escolar, mas……"
10016010-58 = "……Por que o Pandemonium Society e o Tea Party não vieram para o Festival Esportivo deste ano?"
10016010-59 = "Exatamente…… Nós, do Comitê Disciplinar, também queríamos protestar."
10016010-60 = "O tanuki do \"Pandemonium Society\"…… não, a presidente Makoto disse o seguinte."
10016010-62 = "O Pandemonium Society, que está no topo de Gehenna, entrar no comitê executivo para cuidar de estudantes comuns?"
10016010-63 = "……Eu, Makoto-sama, não vou fazer algo tão trabalhoso! Recuso!"
10016010-64 = "Em vez disso, vocês do Comitê Disciplinar assumam toda a responsabilidade! Kiki-ki!"
10016010-66 = "……E o Tea Party?"
10016010-67 = "Recebemos um telegrama de felicitações da Nagisa-sama, que atua como a atual anfitriã do Tea Party."
10016010-69 = "Ela está ocupada tanto profissionalmente quanto pessoalmente e lamenta muito não ter podido participar do \"Festival Esportivo\"."
10016010-70 = "Como um pedido de desculpas sincero, deixei algumas folhas de chá de boa qualidade com a Hasumi-san."
10016010-71 = "……Dito isso, desejo do fundo do meu coração que o Festival Esportivo de Halo seja um sucesso."
10016010-73 = "……No fim das contas, você não veio só porque achou trabalhoso, não é?"
10016010-74 = "――Que comentário grosseiro. #nO Chá das Cinco é uma responsabilidade pesada que acumula diversos assuntos de dentro e de fora da academia."
10016010-75 = "Sendo a Nagisa-sama como é…… ela certamente conteve seu desejo de participar e me confiou essa tarefa com o coração partido."
10016010-76 = "Ah, se é assim, o Pandemônio também está sempre……"
10016010-77 = "Haa…… não há como defender aqueles tanukis."
10016010-78 = "Eles provavelmente passam o trabalho chato para a Presidente Hina enquanto tramam planos inúteis pelas costas."
10016010-79 = "A propósito, esse chá seria, por acaso…… #nO mesmo que mencionaram há pouco sobre o Chá das Cinco?"
10016010-80 = "……Você não vai me enviar uma fatura com um valor absurdo mais tarde, vai?"
10016010-81 = "――Não se preocupe. #nO chá que enviei para Gehenna é o mais barato que comprei na loja de conveniência."
10016010-82 = "Ora, isso é…… devo agradecer por não ser água."
10016010-83 = "A-ah…… pessoal, por favor, um pouco mais de calma……"
10016010-87 = "……Entendi o motivo de os conselhos estudantis de ambas as escolas não terem participado por enquanto."
10016010-88 = "Ainda assim……"
10016010-89 = "Pelo menos a presidente não deveria ter vindo?"
10016010-90 = "Acho que elas são as únicas capazes de subjugar alunas problemáticas com apenas um olhar……."
10016010-91 = "Sobre isso…… tínhamos outras coisas para pedir à Presidente Hina, então……."
10016010-92 = "Outras coisas……?"
10016010-93 = "Como dizem, o excesso é tão ruim quanto a falta…… #nEspero que entenda como colocar a pessoa certa no lugar certo."
10016010-94 = "Tsurugi é a presidente do Comitê de Justiça, mas esse tipo de tarefa externa sempre foi minha responsabilidade."
10016010-95 = "Além disso, se a Tsurugi acabasse sendo membro do comitê executivo, o número de competições em que ela poderia participar também……."
10016010-96 = "Ah……"
10016010-97 = "Isso significa que……"
10016010-98 = "Vocês enviaram as alunas que são \"desastradas nos esportes\" enquanto reservaram as alunas que são a força de combate de cada academia para serem atletas……?"
10016010-100 = "D-desastrada nos esportes? Que maneira horrível de falar!"
10016010-101 = "Não sou muito boa em esportes, mas…… #npelo menos, como vice-presidente do Comitê de Justiça, tenho o condicionamento físico mínimo necessário."
10016010-102 = "Gehenna tem muitas atletas excelentes, então não pretendo participar das competições. É só isso."
10016010-103 = "Eu concordo com isso. #nQuanto mais atletas excelentes participarem, mais perto estaremos da vitória geral."
10016010-107 = "……Dá para parar com isso!?"
10016010-108 = "Eu entendo que a vitória geral é importante, mas isso não significa que vocês podem deixar o trabalho do comitê executivo de lado, certo!? #nSó pensam na própria academia!"
10016010-109 = "Enquanto nós da Millennium estamos fazendo tudo seriamente, vocês fazem o que querem…… #nnós também não desistimos da vitória, sabia!?"
10016010-111 = "……A Millennium não tinha pouco interesse em esportes desde antigamente?"
10016010-112 = "Eu também ouvi isso. #nElas sempre ficam fora do ranking na seleção de beisebol entre academias, e suas excentricidades são mais comentadas do que o desempenho nas partidas……."
10016010-114 = "I-isso é verdade, mas……"
10016010-115 = "O Festival Esportivo de Halo desta vez será realizado na Millennium, afinal……"
10016010-116 = "Com o treinamento que utiliza a tecnologia e a capacidade analítica que a Millennium Science School ostenta, #neste ano nós vamos conquistar a vitória geral!"
10016010-124 = "O que eu faço…… o clima está mais tenso do que eu imaginava……."
10016010-125 = "Ouvi dizer que poderia ajudar no festival que deseja a paz de Kivotos, #nentão participei com alegria…… mas nunca imaginei que chegaria a esse ponto……."
10016010-126 = "[s3] \"É prova de que estão se esforçando de verdade, então pode encarar de forma positiva.\"\n[s4] \"Todos estão motivados, por isso a discussão está esquentando.\""
10016010-127 = "Se o Sensei diz isso, acho que ficará tudo bem……."
10016010-128 = "Se o Sensei diz isso, acho que ficará tudo bem……."
10016010-132 = "O que é esse traje de ginástica que enfatiza o busto? #nEm Trinity vocês nem conseguem vestir o uniforme de ginástica direito?"
10016010-133 = "I-isso é…… o zíper travou……"
10016010-134 = "Você, que diz isso, está em posição de criticar o traje dos outros!?"
10016010-135 = "Espero que todos consigam terminar o Festival Esportivo de Halo sem se ferir……."
