[translation]
1007903-1 = "aura natural"

1007903-2 = "(Quando soube que havia um problema, corri para o parque...)"

1007903-3 = "(Quando cheguei perto, ouvi a voz de Misaka.)"

1007903-5 = "Não... pare com isso já."

1007903-6 = "Estou realmente em apuros."

1007903-7 = "Se você não tiver calma, você vai acabar..."

1007903-10 = "[ns1] \"Misaka!\"\n[ns2] \"O que aconteceu!?"

1007903-17 = "Ah, Senseia...?"

1007903-18 = "Apenas no lugar certo."

1007903-19 = "Ha, já faz um tempo que é assim. #nSerá que o Sensei vai me dizer alguma coisa?"

1007903-20 = "[s3] \"Em primeiro lugar, todos se acalmem.\"\n[s4] \"Não sei o que aconteceu, mas todos estão se dando bem.\""

1007903-24 = "Essas pessoas de repente começaram a me chamar de \"irmã\"..."

1007903-29 = "[ns5] \"...Huh?\"\n[ns6] \"O-O que você quer dizer...?\""

1007903-32 = "...Bem, é exatamente como você disse."

1007903-33 = "...Bem, é exatamente como você disse."

1007903-34 = "Mas... não importa como você olhe, ela é uma “irmã”!"

1007903-35 = "Isso mesmo! A idade não importa!"

1007903-36 = "Também adoro que ela não tenha medo de Senseies adultos!"

1007903-37 = "Ah, problema de novo..."

1007903-38 = "……foto? Ah, eu não expliquei direito."

1007903-39 = "Isso é... demoraria muito para explicar em detalhes..."

1007903-40 = "Simplificando, salvei alguém que estava prestes a sofrer um acidente... com um choque eléctrico."

1007903-41 = "Foi por muito pouco! De repente, uma estrutura de aço caiu do canteiro de obras!"

1007903-42 = "Se não fosse pelo misterioso poder da minha irmã que me fez voar, esse cara já estaria gravemente ferido!"

1007903-43 = "Minha irmã ouviu isso com estrondo! !"

1007903-47 = "……de qualquer forma."

1007903-48 = "Desde então sempre fui assim...Quando me perguntaram por que ajudava os outros, respondi que não precisava de um motivo para ajudar os outros, o que parece ter sido um dos motivos pelos quais fui querido..."

1007903-49 = "Digo como se fosse óbvio, mas não é uma coisa fácil de fazer! ?"

1007903-50 = "Ainda mais que ajudariam delinquentes como nós... #nNão seria estranho se lhes armassem uma armadilha!"

1007903-51 = "Então eu não sei sobre isso..."

1007903-52 = "Bem, achei as roupas um pouco estranhas, mas não sabia até que me disseram que era um delinquente."

1007903-53 = "Esse espírito de ajudar não importa quem seja o outro...!"

1007903-54 = "Afinal, você é a irmã mais velha...! !"

1007903-58 = "[ns7] \"Achei que você estivesse envolvido em um incidente...\"\n[ns8] \"Estou aliviado por você não estar.\""

1007903-64 = "Não, não! Não quero que você se sinta à vontade! ?"

1007903-65 = "Além disso, ainda estou no ensino médio e não quero que os alunos do ensino médio me chamem de irmã mais velha!"

1007903-66 = "É por isso que a idade não importa!"

1007903-67 = "Isso mesmo, vou apresentar os outros também! #nSe sua irmã desejar, por favor reúna todos os delinquentes daqui..."

1007903-68 = "Ah, já! Pare com isso! #nSe alguém me perguntasse, pensaria que eu também era um delinquente!"

1007903-69 = "Não mais. Porque eu te avisei, certo? #nNão haverá próxima vez."

1007903-70 = "Ugh... Como esperado de sua irmã, ela é realmente um lobo solitário."

1007903-71 = "Bem, é verdade que são pessoas fracas como nós que se reúnem e sentem que estamos ficando mais fortes..."

1007903-72 = "Essa foi uma péssima ideia! Estou voltando! !"

1007903-73 = "Então, por favor, me escute! ! !"

1007903-74 = "Sensei! Não fique calado, diga alguma coisa! #nSe o Sensei falar, ele vai ouvir! ?"

1007903-78 = "……Sensei?"

1007903-82 = "[ns9] Verifique trabalhos inacabados em seu smartphone. \n[ns10] \"Desculpe, tive uma ligação de trabalho... você disse alguma coisa?\""

1007903-85 = "Não seja estúpido! !"

1007903-87 = "(Depois... eu convenci os delinquentes e fiz com que voltassem pacificamente.)"

1007903-88 = "(...com um aviso para que não te siga persistentemente)"

