[translation]#[Texto Final. - Filipe 08/07.]
70001010-1 = "Águas Termais (1)"
70001010-8 = "Capitã! Aquele baixinho tá vindo com o gabinete……!"
70001010-9 = "Tsc. Então o golpe de hoje também acaba aqui……!"
70001010-10 = "Não pensem que isso vai acabar assim!"
70001010-11 = "Na próxima, com certeza vou expulsar aquele baixinho e trazer uma nova era para Red Winter――"
70001010-17 = "Todo mundo! Purga! Purga!"
70001010-18 = "Gabinete de Cherino"
70001010-20 = "Ufa…… pelo menos isso acabou."
70001010-25 = "Presidente Cherino! Todos os envolvidos no golpe foram presos!"
70001010-26 = "Hmm, bom trabalho. Presidente Marina!"
70001010-27 = "Em reconhecimento ao seu feito, concedo a você a 'Medalha de Bigode de Primeira Classe'……"
70001010-28 = "……Hmm? Mas a 'Medalha de Bigode de Primeira Classe' já não foi concedida no golpe anterior?"
70001010-29 = "Secretária Tomoe, quantos golpes tivemos esta semana?"
70001010-33 = "Duas tentativas fracassadas e cinco bem-sucedidas."
70001010-34 = "……Ora, não houve um único dia tranquilo esta semana."
70001010-35 = "Que tal chamarmos um pintor para fazer uma pintura de guerra, para que a luta da presidente contra os golpes desta semana seja imortalizada para as futuras gerações?"
70001010-36 = "Já chega de pinturas de guerra……#n……Aliás, no golpe passado, aquele pintor era o líder do golpe……"
70001010-40 = "……Então, qual é a reclamação dessa vez?"
70001010-41 = "Hã……? Reclamação?"
70001010-42 = "Por mais impulsivos que eles sejam, não é possível mobilizar tanta gente sem motivo."
70001010-43 = "Golpes que antes aconteciam a cada 3 dias, agora ocorreram 7 dias seguidos."
70001010-44 = "O que há de errado com a Red Winter que eu governo?"
70001010-45 = "Bem…… isso é……"
70001010-49 = "Segundo a investigação, os líderes desta vez exigiam melhorias nas instalações de banho da academia."
70001010-50 = "Instalações de banho……?#nMas Red Winter já tem isso."
70001010-51 = "Mas por que isso virou motivo de golpe agora……?"
70001010-52 = "……Provavelmente porque experimentaram a 'Fonte Termal 227'."
70001010-53 = "Fonte Termal 227?#nPor que esse nome apareceu agora?"
70001010-57 = "A Fonte Termal 227 era uma das fontes mais luxuosas que Red Winter já teve."
70001010-58 = "Depois de experimentar aquele banho de luxo, os alunos ficaram insatisfeitos com as instalações antigas dos dormitórios."
70001010-61 = "Hunf, pra mim não fez diferença."
70001010-62 = "Se tem água quente, já está bom.#nOs dormitórios de Red Winter têm água quente!"
70001010-64 = "……Das 7h às 9h e das 19h às 21h apenas, claro."
70001010-66 = "E nos dias em que o aquecedor quebra e só sai água fria……"
70001010-68 = "O que é isso. Os chuveiros de Red Winter têm espaço para centenas de alunos ao mesmo tempo."
70001010-69 = "Não é exagero dizer que são os maiores de Kivotos!"
70001010-71 = "Mas é só um espaço sem divisórias, com torneiras enferrujadas……"
70001010-73 = "Ah…… como sinto falta daquele tempo de relaxar na fonte termal depois do trabalho……"
70001010-74 = "Aquele leite com café gelado depois do banho era uma delícia――"
70001010-79 = "M-mas, claro!#nPor mais doce que o leite com café seja, nunca chegará aos pés da 'Cherionka' que a presidente Cherino criou!"
70001010-80 = "Aliás, desejar luxos como fontes termais é pensamento burguês……"
70001010-81 = "……"
70001010-82 = "É-verdade! Acredite em mim, presidente Cherino! Por favor, não me purge……!"
70001010-83 = "……Vamos reformar as instalações de banho de Red Winter."
70001010-84 = "C-como……?"
70001010-85 = "Não ouviu, presidente Marina?"
70001010-86 = "Eu disse que vamos reformar as instalações de banho de Red Winter."
70001010-90 = "Se até os membros do gabinete estão reclamando, então a maioria dos alunos deve ter as mesmas queixas."
70001010-91 = "Um grande líder deve sempre ouvir a voz do povo……"
70001010-92 = "Não sou tão incompetente a ponto de ignorar as reclamações dos alunos e impor minha vontade!"
70001010-93 = "Além disso, seria um problemão se eles fizessem um golpe só por causa de banho……"
70001010-94 = "Excelente ideia, presidente!"
70001010-95 = "Perdoar os alunos que se rebelaram contra sua autoridade com tanta generosidade e acolhê-los com um coração aberto…… Tomoe, estou emocionada!"
70001010-96 = "Humpf, óbvio. Eu sou a presidente do conselho estudantil de Red Winter, além de chefe do Departamento de Embelezamento Ambiental, secretária-geral, representante dos clubes esportivos e etc…… a Cherino-sama!"
70001010-97 = "Os alunos de toda a academia, ao saberem que a presidente vai reformar os banheiros, vão chorar de emoção tamanha a sua generosidade."
70001010-98 = "Devo mandar o 'Urso Vermelho' fazer uma reportagem especial?"
70001010-99 = "Hmm, pode deixar. Secretária Tomoe."
70001010-107 = "Então, sobre a reforma dos banheiros……"
70001010-112 = "……Bom, é só dobrar o tamanho dos chuveiros, né?"
70001010-113 = "Bem…… acho que essa não é bem a direção certa――"
70001010-117 = "Ampliar os chuveiros é uma boa ideia, mas que tal deixarmos isso com os especialistas?"
70001010-118 = "Especialistas……?#nExiste alguém assim em Red Winter?"
70001010-119 = "Sim. Temos alguém que já administrou uma grande fonte termal com sucesso."
70001010-120 = "Isso é……"
70001010-123 = "Aqueles dias de fome e frio no prédio antigo, escrevendo petições sem parar……"
70001010-124 = "Finalmente nossa voz chegou até a presidente Cherino!"
70001010-125 = "……Vamos ser soltas, né?"
70001010-129 = "Não, liberdade condicional."
70001010-130 = "Vocês nunca demonstraram um pingo de arrependimento, e ainda têm a audácia de esperar a liberdade?"
70001010-131 = "Mas que isso!"
70001010-132 = "A gente escreveu cartas de desculpas direitinho e ficou quieta no castigo!"
70001010-133 = "……Quietas?"
70001010-134 = "B-bem, de vez em quando a gente dava uma espiada no Sensei……"
70001010-139 = "……Quando subiram no poste perto da Schale, foram presas pela Valkyrie."
70001010-144 = "Viu só? Libertar alunas que não se arrependem e ainda reincidem mancha minha autoridade!"
70001010-145 = "……Que decepção, achamos que íamos ser soltas."
70001010-146 = "Se não é pra nos libertar, por que nos chamou?"
70001010-147 = "……Tenho um favor a pedir a vocês."
70001010-148 = "Se resolverem esse problema, esquecerei seus erros.#nTambém darei a vocês uma medalha honrosa e um cargo no gabinete!"
70001010-149 = "Não ligo pra medalhas da Cherino……"
70001010-150 = "Até agora vocês nem ligaram pra gente, e de repente nos chamam pra pedir um favor…… o que estão tramando?"
70001010-151 = "Não me diga que vão reabrir a história da fonte termal clandestina――"
70001010-152 = "Não, não é isso.#nTodos nós do gabinete ficamos muito impressionados com a dedicação de vocês."
70001010-153 = "Construir uma fonte termal do zero e receber tão bem os visitantes de dentro e de fora da academia… vocês da Turma Especial 227 são um exemplo para todos os trabalhadores de Red Winter."
70001010-154 = "Bom…… mesmo sendo sem permissão."
70001010-158 = "É verdade que não tínhamos permissão do gabinete, mas……"
70001010-159 = "Por isso, desta vez, pensamos em dar a vocês a oportunidade de administrar as instalações de banho."
70001010-160 = "Hã? Quer dizer…… vão reabrir a Fonte Termal 227?"
70001010-161 = "Hunf, os delinquentes de Gehenna quase fizeram a academia ser engolida pelo mar de lava. Não tem como permitir a reabertura."
70001010-162 = "Para ser mais exata, o que queremos é a administração dos banheiros dos dormitórios."
70001010-163 = "Desta vez, atendendo aos pedidos dos alunos, decidimos reformar completamente as instalações de banho."
70001010-164 = "Por isso, queremos consultar a Turma Especial 227, que tem experiência em administrar uma grande fonte termal."
70001010-165 = "Ah, então não é uma fonte termal, é só o banheiro do dormitório……"
70001010-166 = "Então não dá pra vender bebidas na lojinha."
70001010-167 = "No futuro, planejamos adicionar outras instalações, mas primeiro precisamos de um grande banheiro para atender a todos."
70001010-168 = "Gostaríamos que a Turma Especial 227 visitasse as instalações de banho de outras academias e depois decidisse qual equipamento adotar."
70001010-169 = "Visitar outras academias……?"
70001010-170 = "Sim. Não temos dinheiro nem tecnologia suficientes para fazer a reforma sozinhas."
70001010-171 = "Por isso, queremos encomendar o mesmo modelo que já existe em outras academias."
70001010-172 = "Se o gabinete fizesse isso, poderia haver conflito de interesses, por isso pedimos a ajuda de vocês."
70001010-173 = "Claro, todas as despesas serão pagas pelo gabinete.#nPodem visitar o que quiserem, desde que esteja relacionado a banheiros."
70001010-174 = "Isso é um tratamento que alunos normais nunca teriam! Sintam-se honradas!"
70001010-176 = "Hmm…… tá tudo tão fácil que até desconfio……"
70001010-177 = "Mas Shigure-chan, essa é a nossa chance!"
70001010-178 = "Se a gente conseguir, podemos sair do prédio antigo!#nE quem sabe reabrir a fonte termal!"
70001010-179 = "Além disso, a gente pode experimentar os banheiros de várias academias de graça!#nNão temos nada a perder, então por que não aceitar?"
70001010-180 = "Bom, se Nodoka diz que devemos, não vou me opor……"
70001010-181 = "Tá! Vamos fazer!"
70001010-185 = "Em nome da saudosa Fonte Termal 227, vamos construir o melhor banheiro que todos os alunos de Red Winter vão adorar!"
70001010-187 = "Fufu, que animadoras."
70001010-188 = "Então…… fico na torcida."