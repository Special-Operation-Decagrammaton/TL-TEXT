[translation]
70001010-1 = "Thermae Red Winter (1)"
70001010-8 = "Capitã! Aquela nanica está liderando a secretaria e vindo para cá...!"
70001010-9 = "Tsc. Então o golpe de hoje acaba aqui...!"
70001010-10 = "Não pense que isso acaba aqui!"
70001010-11 = "Na próxima, com certeza expulsaremos aquela nanica e traremos uma nova era para a Academia Federal de Red Winter—"
70001010-17 = "Expurgo em todos! É um expurgo!"
70001010-18 = "Escritório da Cherino"
70001010-20 = "Ufa... finalmente as coisas se acalmaram."
70001010-25 = "Presidente Cherino, prendemos todos os envolvidos no golpe!"
70001010-26 = "Hum, muito bem. Comissária Marina!"
70001010-27 = "Para elogiar seu feito, concederei a você a 'Ordem do Bigode de Primeira Classe'..."
70001010-28 = "...Hum? A 'Ordem do Bigode de Primeira Classe' não foi a que concedi no último golpe?"
70001010-29 = "Secretária Tomoe, quantas vezes isso aconteceu nesta semana?"
70001010-33 = "Foram 2 tentativas frustradas e 5 golpes bem-sucedidos."
70001010-34 = "...Nossa, não tivemos um único dia de paz esta semana."
70001010-35 = "Para que o feito da presidente, que continuou enfrentando golpes durante toda esta semana, seja transmitido às gerações futuras, devo chamar um pintor para fazer um quadro de guerra?"
70001010-36 = "Chega de quadros de guerra... #nAlém disso, no último golpe, o próprio pintor era o mentor..."
70001010-40 = "...Então, qual é a reclamação desta vez?"
70001010-41 = "Sim...? Reclamação, você diz?"
70001010-42 = "Por mais impulsivos que eles sejam, seria impossível mobilizar tantas pessoas sem um motivo específico."
70001010-43 = "Afinal, os golpes que costumavam ocorrer a cada três dias, aconteceram sete dias seguidos."
70001010-44 = "O que há de errado com a Academia Federal de Red Winter que eu governo?"
70001010-45 = "Bem... é que, sabe..."
70001010-49 = "Segundo a investigação, os mentores desta vez iniciaram o golpe exigindo melhorias nas instalações de banho da Academia Federal de Red Winter."
70001010-50 = "Instalações de banho...? #nMas isso já existe na nossa Academia Federal de Red Winter."
70001010-51 = "Mas por que as instalações de banho seriam o motivo agora...?"
70001010-52 = "...Talvez seja porque eles experimentaram o 'Resort de Fontes Termais 227'."
70001010-53 = "Resort de Fontes Termais 227? #nPor que esse nome surgiu?"
70001010-57 = "O Resort de Fontes Termais 227 era uma fonte termal luxuosa, sem igual na Academia Federal de Red Winter."
70001010-58 = "Depois de experimentar águas luxuosas, parece que eles ficaram insatisfeitos com as instalações obsoletas do dormitório."
70001010-61 = "Humph, para mim não faz muita diferença."
70001010-62 = "Não deveria haver problema, desde que saia água quente. #nOs dormitórios da Academia Federal de Red Winter também têm água quente!"
70001010-64 = "...Embora apenas por duas horas, a partir das 7 da manhã e das 7 da noite."
70001010-66 = "E tem dias que o aquecedor quebra e só sai água fria..."
70001010-68 = "O que você está dizendo? O chuveiro da Academia Federal de Red Winter ostenta um espaço onde centenas de alunos podem entrar ao mesmo tempo."
70001010-69 = "Não é exagero dizer que é o maior de Kivotos!"
70001010-71 = "É apenas um espaço com torneiras enferrujadas alinhadas, sem divisórias entre os vizinhos, mas..."
70001010-73 = "Ah... sinto falta daquele tempo em que eu curava o cansaço do dia em uma fonte termal espaçosa depois do trabalho..."
70001010-74 = "O leite com café gelado depois do banho é o ápice da felicidade—"
70001010-79 = "C-c-claro! #nPor mais doce que seja o leite com café, ele não chega aos pés do 'Cheryonka' feito pela presidente Cherino!"
70001010-80 = "Além disso, buscar um luxo como uma fonte termal é um pensamento burguês..."
70001010-81 = "..."
70001010-82 = "É, é a minha opinião sincera! Acredite em mim, presidente Cherino! Por favor, apenas não me expulse...!"
70001010-83 = "...Vamos reformar as instalações de banho da Academia Federal de Red Winter em grande escala."
70001010-84 = "S-sim...?"
70001010-85 = "Você não estava ouvindo, Comissária Marina?"
70001010-86 = "Eu disse que vamos reformar as instalações de banho da Academia Federal de Red Winter."
70001010-90 = "Se até os funcionários de confiança da secretaria estão dizendo isso, além dos outros alunos, é óbvio que a maioria dos alunos compartilha da mesma insatisfação."
70001010-91 = "Um grande líder é aquele que sempre ouve a voz do povo..."
70001010-92 = "Eu não sou incompetente a ponto de ignorar a insatisfação dos alunos e forçar decisões arbitrárias!"
70001010-93 = "Além disso, seria um problema se um golpe de estado fosse iniciado por causa de um simples banho..."
70001010-94 = "Uma ideia maravilhosa, Presidente!"
70001010-95 = "Perdoar com tamanha generosidade e acolher com um coração tão vasto até mesmo os alunos que se rebelaram contra a sua autoridade... Tomoe está comovida!"
70001010-96 = "Humph, é claro. Eu sou a Presidente do Conselho Estudantil da Academia Federal de Red Winter, Chefe do Departamento de Embelezamento Ambiental, Secretária-Geral, Representante dos Clubes Esportivos e muito mais... Eu sou a Cherino!"
70001010-97 = "Ao saberem que a Presidente vai reformar as instalações de banho, todos os alunos da academia certamente derramarão lágrimas de gratidão por tamanha benevolência."
70001010-98 = "Devo entrar em contato com o 'Red Bear' agora mesmo para que escrevam uma matéria especial?"
70001010-99 = "Sim, deixo isso com você, Chefe de Gabinete Tomoe."
70001010-107 = "Bem, sobre a reforma das instalações de banho..."
70001010-112 = "...Por enquanto, basta dobrar o tamanho do chuveiro, não é?"
70001010-113 = "Bem... acho que a direção disso está um pouco errada..."
70001010-117 = "Aumentar o chuveiro é uma boa ideia, mas que tal deixarmos este assunto para um especialista?"
70001010-118 = "Um especialista...? Existe alguém adequado para isso em nossa Academia Federal de Red Winter?"
70001010-119 = "Sim. Na Academia Federal de Red Winter, temos alguém que conseguiu operar com sucesso uma instalação termal em larga escala."
70001010-120 = "Isso é..."
70001010-123 = "Os dias em que escrevíamos petições continuamente enquanto suportávamos a vida no antigo prédio escolar, com fome e frio..."
70001010-124 = "Finalmente nossas vozes desesperadas chegaram à Presidente Cherino!"
70001010-125 = "...Nós seremos libertadas, certo?"
70001010-129 = "Não, é apenas uma liberdade condicional."
70001010-130 = "É muita audácia esperar ser libertada quando não mostraram o menor sinal de arrependimento até agora."
70001010-131 = "Não pode ser!"
70001010-132 = "Nós estávamos cumprindo detenção silenciosamente, enviando cartas de desculpas seriamente sob as condições precárias do antigo prédio escolar!"
70001010-133 = "...Silenciosamente?"
70001010-134 = "B-bem, às vezes nós espiávamos o Professor [USERNAME]..."
70001010-139 = "...Vocês foram presas pelos alunos da Valkyrie quando subiram no poste perto do Schale, não foram?"
70001010-144 = "Viram só? Libertar alunos que repetem infrações sem se arrepender minimamente afetaria minha autoridade!"
70001010-145 = "...Perdi meu tempo ficando feliz à toa."
70001010-146 = "Se não é para nos libertar, por que nos chamou de repente?"
70001010-147 = "...Tenho um pedido para vocês."
70001010-148 = "Se resolverem este caso, ignorarei seus erros passados. Darei a vocês medalhas de honra e até cargos na secretaria!"
70001010-149 = "Não me importo com as medalhas da Presidente Cherino, mas..."
70001010-150 = "Até agora vocês nem ligavam para nós, e de repente nos chamam para pedir um favor... O que vocês estão planejando?!"
70001010-151 = "Não me diga que vocês pretendem trazer à tona o caso de termos operado as fontes termais sem permissão..."
70001010-152 = "Não, não é isso. Nós, da Secretaria de Red Winter, ficamos muito impressionados com a diligência de vocês."
70001010-153 = "O sucesso da turma especial, que construiu instalações termais do zero e atendeu clientes de dentro e fora da academia, é um exemplo para todos os trabalhadores da Academia Federal de Red Winter."
70001010-154 = "Bem... embora tenha sido uma operação sem permissão."
70001010-158 = "É verdade que não tínhamos a permissão da secretaria, mas..."
70001010-159 = "Por isso, desta vez, pensamos em dar a vocês a oportunidade de operar as instalações de banho."
70001010-160 = "Hã? Isso significa que... vamos reviver o Resort Termal 227?"
70001010-161 = "Humph, por causa daqueles encrenqueiros de Gehenna, a academia quase foi engolida por um mar de lava. Não há como eu permitir o re-desenvolvimento daquilo."
70001010-162 = "Para ser mais precisa, o que queremos que vocês gerenciem são as instalações de banho do dormitório da academia."
70001010-163 = "Desta vez, atendendo aos pedidos dos alunos, decidimos reformar completamente as instalações de banho."
70001010-164 = "Por isso, pensamos em consultar a turma especial 227, que tem experiência na operação de grandes instalações termais."
70001010-165 = "Ah, então não são as fontes termais, é só o banho do dormitório..."
70001010-166 = "Então não vai dar para vender bebidas na lojinha."
70001010-167 = "Embora tenhamos planos de adicionar outras instalações no futuro, a prioridade agora é preparar uma instalação de banho em larga escala que muitos alunos possam usar."
70001010-168 = "Gostaríamos que a turma especial 227 visitasse as instalações de banho de outras academias e considerasse qual equipamento deveríamos introduzir."
70001010-169 = "Visitar outras academias...?"
70001010-170 = "Sim. Como nos faltam recursos financeiros e técnicos, é difícil reformar apenas por conta própria."
70001010-171 = "Por isso, desta vez, queremos encomendar algo igual às instalações que já existem."
70001010-172 = "Como pode haver conflito de interesses se nós, da secretaria, formos, gostaríamos que a turma especial cuidasse disso."
70001010-173 = "Claro, todas as despesas necessárias para a visita serão totalmente custeadas pelo secretariado da Red Winter.#nPodem observar livremente tudo o que estiver relacionado à operação das instalações de banho."
70001010-174 = "Normalmente, esse tipo de tratamento seria impossível para alunas comuns! Sintam-se honradas!"
70001010-176 = "Hmm... as coisas estão acontecendo tão rápido que, na verdade, estou ficando com um pé atrás..."
70001010-177 = "Mas Shigure-chan, essa é a nossa chance!"
70001010-178 = "Se conseguirmos um feito aqui, poderemos sair da vida difícil no prédio antigo da escola!#nTalvez até possamos reabrir a operação da nossa fonte termal!"
70001010-179 = "Além disso, podemos experimentar as instalações de banho de várias escolas de graça, sabe?#nNão temos nada a perder, então por que não aceitar?"
70001010-180 = "Bem, se a Nodoka diz isso, não vou me opor, mas..."
70001010-181 = "Sim, sim! Nós aceitamos!"
70001010-185 = "Em nome da extinta Estância Termal 227, buscaremos criar as melhores instalações de banho que satisfaçam todas as alunas da Academia Federal Red Winter!"
70001010-187 = "Fufu, isso é muito encorajador."
70001010-188 = "Então... contamos com vocês."
