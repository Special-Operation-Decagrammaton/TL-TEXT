[translation]
83306095100-7 = "あっ、委員長！お疲れ様です！"
83306095100-8 = "うん、お疲れ様。"
83306095100-9 = "ところで……ここってパトロールのルート外よね？"
83306095100-10 = "それが……教室にマコト議長を誹謗中傷する落書きがあるという通報を受けました。"
83306095100-11 = "そのため、教室を片付ける必要がありまして……"
83306095100-12 = "なるほど……あなた一人に押し付けるわけにはいかないわ。"
83306095100-13 = "私も手伝う。"
83306095100-14 = "は、はいっ！ありがとうございます！"
