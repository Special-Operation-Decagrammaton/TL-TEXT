[translation]
22210-1 = "Episódio 21; O que esse nome significa."
22210-2 = "[ns] \"Neru! Conto com você!\""
22210-4 = "......Não importa a natureza do ataque, ele não vai funcionar contra meu 'Armamento'."
22210-5 = "Nesse estado de ferimento, qualquer resistência a mais é inútil!"
22210-6 = "………Hã,"
22210-7 = "Quem se importa com isso."
22210-8 = "Eu já decidi."
22210-9 = "Vou te derrotar aqui..."
22210-11 = "Não estou a fim de perder tempo."
22210-12 = "Então, para ir salvar a nanica――"
22210-13 = "Não é tarde demais para fazer isso 'depois' de te derrotar."
22210-15 = "Eu vou trazer a nanica de volta!"
22210-16 = "Vamos lá, novatas! #n É a nossa revanche!"
22210-17 = "Asuna!!"
22210-18 = "......!?"
22210-19 = "Sim! #n Ahaha! Atacar~~!"
22210-23 = "Um ataque como esse..."
22210-33 = "......!? Você desviou de tudo...!?"
22210-34 = "Sim! #n É o que chamam de instinto selvagem, né?"
22210-35 = "Karin."
22210-39 = "Um tiro de sniper... fora do campo de visão!"
22210-44 = "Eu não vou cair com tão pouco――"
22210-56 = "......Akane! Vamos pressionar agora! Destruam tudo!"
22210-57 = "Sim! Líder!"
22210-67 = "Quebrar a porta e invadir a torre...?"
22210-68 = "Como, afinal...?"
22210-70 = "............Bem, não é tão fácil quanto parece..."
22210-71 = "Verdade. Mais do que fácil..."
22210-72 = "Ahaha! #n Isso não é meio caótico demais para ser chamado de estratégia?"
22210-74 = "B, bem, é verdade... talvez devêssemos esquecer o que eu disse..."
22210-75 = "Não, vamos fazer isso."
22210-76 = "E, esse tipo de estratégia!?"
22210-78 = "......Tem certeza? #n O que você disse antes não passa de uma hipótese."
22210-79 = "Eu, eu sei disso. #n Mas, é uma estratégia feita por ninguém menos que a 'testuda'."
22210-80 = "T, testuda...?"
22210-81 = "Ela pode estar na maior enrascada, mas mostra coragem pelos amigos sem hesitar."
22210-82 = "Não tem como eu não gostar da estratégia de alguém assim, tem?"
22210-83 = "Neru-senpai, você conhece bem a Yuzu, né! Quando vocês ficaram tão próximas?"
22210-84 = "É porque... vocês jogam muito juntas no dia a dia?"
22210-85 = "Por que você está falando disso agora!?"
22210-86 = "Entendi suas intenções. Mas, líder, com esses ferimentos..."
22210-87 = "Hã? O que você está dizendo? Se não vamos arriscar tudo aqui, quando vamos arriscar? #n Preciso corresponder às expectativas delas."
22210-88 = "Consigo aguentar isso na base da força de vontade."
22210-89 = "――E vocês? Não vou obrigar ninguém a ajudar."
22210-90 = "Nós..."
22210-91 = "......Não tem jeito. Se é a decisão da líder."
22210-92 = "Sim! Se a líder decidiu, eu sigo!"
22210-94 = "......Mas tem certeza? Tentar essa estratégia só com a C&C..."
22210-95 = "Sim. Se a líder decidiu, nós apenas seguiremos."
22210-96 = "......E, se tivermos que lutar de novo, o plano é um pouco diferente do anterior."
22210-97 = "[s] \"Se todos dizem isso... tudo bem.\""
22210-98 = "......Todos concordaram com a estratégia, né?"
22210-99 = "Porque encontrei o local perfeito para executar a estratégia..."
22210-100 = "Vou iniciar a navegação―― vamos!"
22210-120 = "[ns] \"Seguindo reto... o objetivo está bem na nossa frente!\""
22210-123 = "(É imprudente)"
22210-124 = "(Isso definitivamente não é uma escolha racional)"
22210-125 = "(A C&C, é claro, e o Sensei da Schale também, já foram derrotados pelo 'Armamento' da Toki uma vez. #n Esse é um fato imutável)"
22210-126 = "(Portanto, pensando racionalmente... #n naturalmente, a próxima estratégia não seria um ataque frontal, mas algo indireto)"
22210-127 = "(No entanto, e se isso... fosse uma estratégia criada pelo Sensei da Schale...?)"
22210-131 = "Toki! Autorizo o uso do canhão principal!"
22210-132 = "Sim, senhora."
22210-136 = "A energia está se concentrando na torre central! Todos, cuidado――"
22210-147 = "[ns1] \"Aquilo agora... era um laser...?\"\n[ns2] \"Ela ainda estava escondendo uma coisa dessas...?\""
22210-153 = "(O que foi aquilo agora...)"
22210-154 = "(Não foi uma decisão baseada em taxas de vitória ou dados...)"
22210-155 = "(Senti um mau pressentimento... e só por esse motivo, mudei minha decisão...?)"
22210-156 = "(Não pode ser... como eu poderia fazer uma escolha tão irracional... #n Foi apenas um erro de percepção)"
22210-157 = "[s] \"......Rio.\""
22210-158 = "......Até aqui."
22210-159 = "O resultado determinado através do 'Armamento'―― #n O futuro calculado pelos dados, ninguém pode mudar."
22210-160 = "Sensei da Schale... você deveria saber desde o momento em que foi derrotado pelo 'Armamento'. #n Que a probabilidade de vencer a gente é zero."
22210-161 = "Mesmo assim, por que você nos desafiou... eu não entendo."
22210-162 = "Se você encontrou alguma pequena chance de vitória em algum lugar, #n isso é inútil, uma ação extremamente irracional."
22210-163 = "Se você fez seus alunos feridos passarem por isso por causa de uma ilusão tão trivial..."
22210-164 = "......Eu ficarei profundamente desapontada."
22210-165 = "[s] \"Isso é...\""
22210-166 = "O Sensei não deu ordens desse tipo."
22210-167 = "Akane?"
22210-168 = "Não, na verdade, precisamos corrigir esse conceito desde o início."
22210-169 = "Nós não lutamos acreditando em taxas de vitória ou dados."
22210-170 = "......O quê?"
22210-173 = "Líder."
22210-174 = "Hã? O que foi, Akane?"
22210-175 = "Como eu já disse, #n a chance da estratégia da Chihiro dar certo é muito baixa."
22210-176 = "Mesmo assim, com esse corpo......"
22210-177 = "Quem se importa."
22210-178 = "Taxas de vitória, possibilidades... coisas pequenas assim não importam."
22210-179 = "Isso você ou o Sensei podem resolver."
22210-181 = "O que importa é 'você quer salvar a nanica ou não?', só isso, né?"
22210-185 = "......Fufu."
22210-186 = "Sempre pensei isso, mas... Líder, você mudou um pouco."
22210-187 = "......Com certeza, isso é..."
22210-188 = "Desde aquele dia em que conhecemos aquelas garotas... aos poucos."
22210-192 = "Mas, pensando bem... embarcar em uma aventura para salvar uma amiga sequestrada."
22210-193 = "Nós, parece que..."
22210-194 = "――parecemos protagonistas de um jogo."
22210-196 = "Queremos salvar uma amiga querida... sim, só isso."
22210-197 = "......"
22210-198 = "Ah, falando nisso, Presidente Rio. #n Você não esqueceu, esqueceu?"
22210-199 = "――O outro nome da Neru-senpai."
22210-200 = "Codinome: Double-O."
22210-201 = "O 'Símbolo da Vitória Prometida' da nossa Millennium."
22210-202 = "............!?"
22210-208 = "Te peguei."
22210-210 = "Como ela consegue se mover mesmo recebendo o canhão principal de frente......!?"
22210-211 = "Infelizmente, acabei de levar um bem parecido agorinha!"
22210-215 = "Hackeei o elevador de carga da torre central!"
22210-216 = "[ns] \"Neru!! Agora!\""
22210-223 = "Elevador......? #n Não pode ser, o destino delas é......!?"
22210-225 = "F, foi uma ideia que a Momoi deu antes."
22210-226 = "Eh!? Eu!?"
22210-227 = "Se usarmos o elevador... talvez......"
22210-229 = "......!!!"
22210-230 = "A falha no 'Armamento'......! #n Não pode ser, desse jeito......!?"
22210-232 = "Toki! Saia daí rápido!! Elas estão......!"
22210-233 = "Elas pretendem paralisar o sistema de evasão do 'Armamento' usando o elevador!!"
22210-234 = "Não, é tarde demais."
22210-240 = "Eu já te disse antes, não disse?"
22210-242 = "Que não existe ninguém em toda Kivotos que consiga me vencer se entrar no meu alcance."
22210-245 = "......"
22210-246 = "Ah... eu não te contei isso? #n Bom, tanto faz."
22210-251 = "Acelere!"
22210-252 = "Aumente a aceleração gravitacional em 10 vezes!!"
22210-261 = "......Sistema de evasão paralisado."
22210-262 = "............Muito bem."
22210-263 = "Agora você não pode mais usar trapaças. #n Vamos lutar de igual para igual, novata?"
22210-268 = "Haa... acabou?"
22210-283 = "Pfft..."
22210-284 = "Tsc, não foi nada demais."
22210-291 = "Isso é..."
22210-292 = "O mais forte da Millennium..."
22210-294 = "Double-O..."
22210-297 = "Próximo Episódio; Pavane pela Princesa (1)"