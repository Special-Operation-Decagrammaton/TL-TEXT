[translation]
22210-1 = "第21話;その名が示すのは。"
22210-2 = "[ns] \"ネル！頼んだよ！\""
22210-4 = "……どのような攻撃であろうと、私の「武装」には通じません。"
22210-5 = "そんな手負いの状態で、これ以上の抵抗は無意味です！"
22210-6 = "………は、"
22210-7 = "んなの、知るかよ。"
22210-8 = "あたしはもう決めたんだ。"
22210-9 = "ここで、てめぇを倒して……"
22210-11 = "面倒なのはごめんだからよぉ。"
22210-12 = "それなら、チビを助けに行くのは――"
22210-13 = "てめぇを倒した「後」でも、遅くねぇって事だ。"
22210-15 = "チビを連れ戻しに行くってなぁ！"
22210-16 = "おら、後輩ども！#nあたしらのリベンジマッチだ！"
22210-17 = "アスナ！！"
22210-18 = "……！？"
22210-19 = "はーい！#nあははっ！突撃～～！"
22210-23 = "こんな攻撃など……"
22210-33 = "……！？全部、避けた……！？"
22210-34 = "うん！#n野生の勘？ってやつ？"
22210-35 = "カリン。"
22210-39 = "視野外からの……狙撃！"
22210-44 = "その程度でやられる訳――"
22210-56 = "……アカネ！このまま押し込むぞ！ぶっ壊しちまえ！"
22210-57 = "はい！部長！"
22210-67 = "ドアを壊してタワー内部に侵入を……？"
22210-68 = "一体、どうやって……？"
22210-70 = "…………それって、言うほど簡単じゃないけど……。"
22210-71 = "そうですね。簡単というより……。"
22210-72 = "あははっ！#n作戦というには結構めちゃくちゃなんじゃない？"
22210-74 = "そ、そうですね……やっぱり、わたしの話はなかった事に……。"
22210-75 = "いや、やろう。"
22210-76 = "こ、こんな作戦をですか！？"
22210-78 = "……大丈夫なの？#nさっき話したのは、結局仮説に過ぎないんだよ。"
22210-79 = "は、んなもん分かってらぁ。#nだが、他の誰でもない「おでこ」が出した作戦だからな。"
22210-80 = "お、おでこ……？"
22210-81 = "こいつは、どれだけピンチに陥ってようが、友達のためなら臆せず度胸を見せる。"
22210-82 = "そんなヤツの作戦を、あたしが気に入らないわけねぇだろ？"
22210-83 = "ネル先輩ってユズの事よく知ってるんだね！いつの間に仲良くなったの？"
22210-84 = "やっぱ……普段ユズとゲームでいっぱい戦ってるから？"
22210-85 = "なんで今その話が出てくんだよ！？"
22210-86 = "ご意向は分かりました。ですが部長、その傷ではやはり……"
22210-87 = "あぁ？何言ってんだ？ここで無茶しないで、いつ無茶すんだよ？#nこいつらがかけてくれた期待には、ちゃんと応えなきゃな。"
22210-88 = "こんくらい根性でなんとかなるっての。"
22210-89 = "――んで、お前らは？別に無理に手伝えとは言わねぇ。"
22210-90 = "私たちは……"
22210-91 = "……仕方ないですね。リーダーの決定なら。"
22210-92 = "うん！部長が決めたことだし、従うよ～！"
22210-94 = "……でも大丈夫なの？C&Cだけでその作戦を進めるだなんて……"
22210-95 = "ええ。部長がそう決めたのであれば、私たちは従うだけです。"
22210-96 = "……それに、また戦うことになるのでしたら、前回とは少し違う予定ですから。"
22210-97 = "[s] \"みんながそう言うのなら……分かった。\""
22210-98 = "……みんな、作戦に同意したんだね？"
22210-99 = "作戦実行に適した場所を見つけたから……"
22210-100 = "ナビを開始するよ――行こう！"
22210-120 = "[ns] \"このまま真っ直ぐ……目標は目の前だよ！\""
22210-123 = "（無謀だ）"
22210-124 = "（これは絶対に、合理的な選択ではない）"
22210-125 = "（C&Cはもちろん、シャーレの先生もすでに一度トキの「武装」に負けている。#n　それは不変の事実）"
22210-126 = "（だから、合理的に考えれば……#n　自然と、次に取る作戦は正面突破ではなく絡め手になる）"
22210-127 = "（けれど、もしもこれが……シャーレの[USERNAME]先生が編み出した作戦だったとしたら……？）"
22210-131 = "トキ！主砲の使用を許可するわ！"
22210-132 = "イエス、マム。"
22210-136 = "中央タワーに電力が集まってる！みんな、気をつけ――"
22210-147 = "[ns1] \"さっきの……あれは、レーザー……？\"\n[ns2] \"こんなものを……まだ隠していたの……？\""
22210-153 = "（今のは一体なんだったのだろう……）"
22210-154 = "（勝率やデータに基づく判断ではなく……）"
22210-155 = "（嫌な予感がした……ただそれだけの理由で、判断を変更した……？）"
22210-156 = "（そんな……私がそんな非合理的な選択をするはずが……#n　単純に感覚を勘違いしただけ）"
22210-157 = "[s] \"……リオ。\""
22210-158 = "……ここまでよ。"
22210-159 = "「武装」を通じて確定した結果――#n　データで算出された未来は、誰も覆すことなどできない。"
22210-160 = "シャーレの先生……貴方なら「武装」に敗れた時点で分かっていたはずよ。#n私たちに勝てる確率なんて、ゼロだということを。"
22210-161 = "それなのに、何故私たちに挑んできたのか……理解ができないわ。"
22210-162 = "僅かな勝機というものをどこかに見出していたのであれば、#nそんなものは無意味で、非合理きわまりない行動よ。"
22210-163 = "もし、そんな些細な錯覚を理由に、満身創痍の生徒にこんな事をさせたのであれば……"
22210-164 = "……心底、失望するよ。"
22210-165 = "[s] \"それは……。\""
22210-166 = "先生は、そのような指揮をしておりません。"
22210-167 = "アカネ？"
22210-168 = "いえ、そもそもその認識を最初から訂正する必要がありますね。"
22210-169 = "私たちは別に、勝率やデータを信じて戦ったわけではありません。"
22210-170 = "……なに？"
22210-173 = "部長。"
22210-174 = "あ？どうした、アカネ。"
22210-175 = "すでに申し上げた通り、#nチヒロさんが仰った作戦が成功する可能性は非常に低いです。"
22210-176 = "なのにそんな身体で……。"
22210-177 = "知るか。"
22210-178 = "勝率だの可能性だの、そんな細々とした事はどうでもいい。"
22210-179 = "んなもんは、お前か先生に任せればなんとかなる。"
22210-181 = "大事なのは「チビを助けたいか、否か」それだけだろ？"
22210-185 = "……ふふっ。"
22210-186 = "やはり、以前から思っていましたが……部長、少し変わりましたね。"
22210-187 = "……きっと、それは。"
22210-188 = "あの子たちと会った、あの日から……少しずつ。"
22210-192 = "それにしても……誘拐された友人を救うために冒険に出るだなんて。"
22210-193 = "私たち、まるで……。"
22210-194 = "――ゲームの主人公みたいですね。"
22210-196 = "大切な友人を救いたい……ええ、ただそれだけです。"
22210-197 = "……。"
22210-198 = "あ、そういえばリオ会長。#nまさか忘れていませんよね？"
22210-199 = "――ネル先輩のもう一つの名前。"
22210-200 = "コールサイン・ダブルオー。"
22210-201 = "私たちミレニアムの「約束された勝利の象徴」ということを。"
22210-202 = "…………！？"
22210-208 = "とらえた。"
22210-210 = "主砲を正面から浴びたのに動けるだなんて……！？"
22210-211 = "あいにく、この間も似たようなのを食らったばっかでな！"
22210-215 = "中央タワーの貨物エレベーターをハッキングしたよ！"
22210-216 = "[ns] \"ネル！！今だよ！\""
22210-223 = "エレベーター……？#nまさか、あの子たちの目的地って……！？"
22210-225 = "も、モモイが前に言ったアイデアなんだけど。"
22210-226 = "え！？私！？"
22210-227 = "エレベーターを活用したら……もしかしたら……。"
22210-229 = "……！！！"
22210-230 = "「武装」の欠点……！#nまさか、そんなやり方で……！？"
22210-232 = "トキ！早くそこから出て！！あの子たちは……！"
22210-233 = "エレベーターで「武装」の回避システムを麻痺させるつもりよ！！"
22210-234 = "いや、遅ぇ。"
22210-240 = "あたし、前に言ったことあったよな？"
22210-242 = "あたしの間合いに入って勝てるヤツなんか、このキヴォトスのどこにもいないって。"
22210-245 = "……。"
22210-246 = "あ……てめぇには言ってなかったか？#nまぁ、どっちでもいいんだけど。"
22210-251 = "加速させて！"
22210-252 = "重力加速度を10倍に！！"
22210-261 = "……回避システム麻痺。"
22210-262 = "…………さて、と。"
22210-263 = "これでチートは使えねぇ。#n正々堂々戦うとしようぜ、後輩？"
22210-268 = "はぁ……終わりですか。"
22210-283 = "ぺっ……"
22210-284 = "ケッ、大したことねぇな。"
22210-291 = "これが……"
22210-292 = "ミレニアム最強の……"
22210-294 = "ダブルオー……"
22210-297 = "次回;王女のためのパヴァーヌ（１）"
