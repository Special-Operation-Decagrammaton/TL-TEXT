[translation]
22210-1 = "Episódio 21; O que esse nome indica."
22210-2 = "[ns] \"Neru! Conto com você!\""
22210-4 = "……Não importa que tipo de ataque seja, ele não funcionará contra a minha \"armadura\"."
22210-5 = "Nesse estado de ferida, qualquer resistência adicional é inútil!"
22210-6 = "………O quê,"
22210-7 = "quem se importa com isso."
22210-8 = "Eu já me decidi."
22210-9 = "Vou te derrotar aqui e agora……"
22210-11 = "Não estou a fim de lidar com complicações."
22210-12 = "Sendo assim, ir salvar a baixinha――"
22210-13 = "não será tarde demais, mesmo \"depois\" de derrotar você."
22210-15 = "Vou buscar a baixinha de volta!"
22210-16 = "Ei, suas novatas!#nÉ a nossa revanche!"
22210-17 = "Asuna!!"
22210-18 = "……!?"
22210-19 = "Sim!#nAhaha! Ataquem～～!"
22210-23 = "Um ataque desses……"
22210-33 = "……!? Ela desviou de tudo……!?"
22210-34 = "Sim!#nO que chamam de instinto selvagem?"
22210-35 = "Karin."
22210-39 = "Um tiro…… vindo de fora do campo de visão!"
22210-44 = "Não tem como eu ser derrotada por esse nível de――"
22210-56 = "……Akane! Vamos avançar agora! Destrua tudo!"
22210-57 = "Sim! Chefe!"
22210-67 = "Destruir a porta e invadir o interior da torre……?"
22210-68 = "Como, exatamente……?"
22210-70 = "…………Isso não é tão simples quanto parece……."
22210-71 = "É verdade. Mais do que simples……."
22210-72 = "Ahaha!#nNão é meio loucura chamar isso de estratégia?"
22210-74 = "I-isso mesmo…… talvez seja melhor esquecer o que eu disse……."
22210-75 = "Não, vamos fazer isso."
22210-76 = "V-vamos mesmo seguir esse plano!?"
22210-78 = "……Tem certeza?#nO que eu disse antes não passa de uma hipótese."
22210-79 = "Eu sei disso. Mas, é um plano feito pela \"Testa\", então não tem como ser ruim."
22210-80 = "T-testa……?"
22210-81 = "Essa garota, não importa o quão encurralada ela esteja, mostra coragem pelos amigos sem hesitar."
22210-82 = "Como eu poderia não gostar de um plano feito por alguém assim?"
22210-83 = "A Neru-senpai conhece bem a Yuzu, hein! Quando vocês ficaram tão próximas?"
22210-84 = "Será que é…… porque vocês vivem batalhando nos jogos?"
22210-85 = "Por que você trouxe esse assunto agora!?"
22210-86 = "Entendi suas intenções. Mas, Chefe, com esses ferimentos, ainda assim……"
22210-87 = "Ah? O que você está dizendo? Se não for para se arriscar aqui, quando é que vamos nos arriscar?#nTenho que retribuir a expectativa que elas depositaram em nós."
22210-88 = "Dá para resolver isso na base da força de vontade."
22210-89 = "――E vocês? Não vou forçar ninguém a ajudar."
22210-90 = "Nós……"
22210-91 = "……Não tem jeito. Se é a decisão da líder."
22210-92 = "Sim! Foi a Chefe quem decidiu, então vamos seguir!～"
22210-94 = "……Mas será que vai dar certo? Levar esse plano adiante só com a C&C……"
22210-95 = "Sim. Se a Chefe decidiu assim, nós apenas obedeceremos."
22210-96 = "……Além disso, se tivermos que lutar de novo, o plano é um pouco diferente do anterior."
22210-97 = "[s] \"Se todos dizem isso... então entendi.\""
22210-98 = "……Pessoal, vocês concordam com o plano, certo?"
22210-99 = "Encontrei um local adequado para executar a operação, então……"
22210-100 = "Iniciando a navegação — vamos nessa!"
22210-120 = "[ns] \"Direto por aqui... o alvo está bem à nossa frente!\""
22210-123 = "(É imprudente)"
22210-124 = "(Isso definitivamente não é uma escolha racional)"
22210-125 = "(A C&C, e até mesmo o Sensei do Schale, já perderam uma vez para o \"Armamento\" da Toki. #n Esse é um fato imutável)"
22210-126 = "(Portanto, pensando racionalmente... #n naturalmente, a próxima estratégia não seria um ataque frontal, mas sim um estratagema)"
22210-127 = "(Mas, e se isso... fosse um plano criado pelo Sensei [USERNAME] do Schale...?)"
22210-131 = "Toki! Autorizo o uso do canhão principal!"
22210-132 = "Sim, madame."
22210-136 = "A energia está se concentrando na torre central! Pessoal, cuidado—"
22210-147 = "[ns1] \"Aquilo de agora... foi um laser...?\"\n[ns2] \"Como você... ainda escondia algo assim...?\""
22210-153 = "(O que foi aquilo agora...)"
22210-154 = "(Não foi uma decisão baseada em taxas de vitória ou dados...)"
22210-155 = "(Tive um mau pressentimento... foi apenas por esse motivo que mudei a decisão...?)"
22210-156 = "(Não pode ser... eu não deveria tomar uma decisão tão irracional... #n Foi apenas um erro de percepção)"
22210-157 = "[s] \"……Rio.\""
22210-158 = "……Até aqui você vai."
22210-159 = "O resultado determinado através do \"Armamento\" — #n o futuro calculado pelos dados não pode ser alterado por ninguém."
22210-160 = "Sensei do Schale... você deveria saber desde o momento em que perdeu para o \"Armamento\". #n Que a probabilidade de vocês vencerem é zero."
22210-161 = "Mesmo assim, não consigo entender por que nos desafiaram..."
22210-162 = "Se vocês encontraram alguma pequena chance de vitória em algum lugar, #n isso é um ato sem sentido e extremamente irracional."
22210-163 = "Se vocês fizeram alunas feridas passarem por isso apenas por causa de uma ilusão tão trivial..."
22210-164 = "……Estou profundamente decepcionada."
22210-165 = "[s] \"Isso é...\""
22210-166 = "O Sensei não deu esse tipo de comando."
22210-167 = "Akane?"
22210-168 = "Não, na verdade, precisamos corrigir essa percepção desde o início."
22210-169 = "Nós não lutamos acreditando em taxas de vitória ou dados."
22210-170 = "……O quê?"
22210-173 = "Chefe."
22210-174 = "Ah? O que foi, Akane?"
22210-175 = "Como eu disse antes, #n a possibilidade de o plano da Chihiro-san dar certo é extremamente baixa."
22210-176 = "Mesmo assim, com esse corpo..."
22210-177 = "Que se dane."
22210-178 = "Taxa de vitória, possibilidades, essas coisas pequenas não importam."
22210-179 = "Essas coisas, se eu deixar com você ou com o Sensei, vai dar um jeito."
22210-181 = "O que importa é \"querer salvar a pequena ou não\", só isso, não é?"
22210-185 = "……Fufu."
22210-186 = "Como eu pensava... Chefe, você mudou um pouco."
22210-187 = "……Com certeza, isso é..."
22210-188 = "Desde aquele dia, quando conhecemos aquelas crianças... pouco a pouco."
22210-192 = "Ainda assim... sair em uma aventura para salvar uma amiga sequestrada."
22210-193 = "Nós parecemos..."
22210-194 = "—Como protagonistas de um jogo, não é?"
22210-196 = "Queremos salvar uma amiga querida... sim, é apenas isso."
22210-197 = "……."
22210-198 = "Ah, falando nisso, Presidente Rio. #n Você não esqueceu, esqueceu?"
22210-199 = "――O outro nome da senpai Neru."
22210-200 = "Callsign Double-O."
22210-201 = "O símbolo da nossa \"vitória prometida\" em Millennium."
22210-202 = "…………！？"
22210-208 = "Te peguei."
22210-210 = "Como ela ainda consegue se mover depois de receber um tiro direto do canhão principal……！？"
22210-211 = "Infelizmente, eu acabei de levar um golpe parecido agora pouco!"
22210-215 = "Hackeei o elevador de carga da torre central!"
22210-216 = "[ns] \"Neru!! Agora é a hora!\""
22210-223 = "Elevador……？#nNão me diga que o destino delas é……！？"
22210-225 = "B-bem, foi uma ideia que a Momoi teve antes."
22210-226 = "Eh!? Eu!?"
22210-227 = "Se usarmos o elevador…… talvez……."
22210-229 = "……！！！"
22210-230 = "O ponto fraco do \"Armamento\"……!#nNão acredito que elas vão usar esse método……！？"
22210-232 = "Toki! Saia daí rápido!! Elas estão……!"
22210-233 = "Elas pretendem paralisar o sistema de esquiva do \"Armamento\" usando o elevador!!"
22210-234 = "Não, é tarde demais."
22210-240 = "Eu já te disse isso antes, não disse?"
22210-242 = "Que não existe ninguém em Kivotos que consiga me vencer se entrar no meu alcance."
22210-245 = "……."
22210-246 = "Ah…… eu não tinha te dito isso?#nBem, tanto faz."
22210-251 = "Acelere!"
22210-252 = "Aumente a aceleração gravitacional em 10 vezes!!"
22210-261 = "……Sistema de esquiva paralisado."
22210-262 = "…………Muito bem, então."
22210-263 = "Agora você não pode mais trapacear.#nVamos lutar de forma justa, kohai?"
22210-268 = "Haa…… acabou?"
22210-283 = "Pah……"
22210-284 = "Tsc, não é grande coisa."
22210-291 = "Isso é……"
22210-292 = "A mais forte de Millennium……"
22210-294 = "Double-O……"
22210-297 = "Próximo episódio: Pavane para a Princesa (1)"
