[translation]
2300305-1 = "ネットカフェにようこそ"
2300305-2 = "キヴォトス・市内中心街"
2300305-3 = "今日はありがとう。おかげで新作のグラフィックボードを二個も買えた。"
2300305-4 = "最近、グラフィックボードを暗号通貨の採掘とか変な用途に使う人が多いこともあって、なかなか手に入らないんだよね。"
2300305-5 = "そのせいで、私みたいな善良な方向にパソコンを使うハッカーたちが割を食ってるよ。"
2300305-6 = "……善良なハッカーって言うと、なんだか変な風に聞こえるかもしれないけど、少なくとも私たちはお金のために他人に被害を与えたりはしないから。"
2300305-7 = "さ、それじゃあ用事も終わったことだし、早くミレニアムに戻ろうか。"
2300305-8 = "なんだか空が薄暗くて、今にも雨が降りそうだし……。"
2300305-10 = "……言ってるそばから、本当に降ってきちゃったね。"
2300305-11 = "どうしよう。雨の予報じゃなかったから傘を置いてきちゃったし……。"
2300305-12 = "このままだとせっかく買ったグラフィックボードが雨に濡れちゃう……。#n近くに、どこか雨宿りできそうな場所とかないかな？"
2300305-13 = "[s] 近くにあったネットカフェを指差す。"
2300305-14 = "ネットカフェ？そういえば、いつかマキから聞いたことがある。#n仕切りで分かれた薄暗くて狭い部屋で、インターネットとか色んなことを楽しむ場所、だよね？"
2300305-15 = "……。"
2300305-16 = "……この状況だし、仕方ないよね。せっかく手に入れたグラフィックボードが封を開ける前に壊れるといけないし……。"
2300305-17 = "それに、私もネットカフェがどういうところなのか気になってたから。"
2300305-18 = "えっと、じゃあ、入ってみようか……？"
2300305-21 = "― ふう……[wa:2100]急に夕立だなんて。"
2300305-23 = "[wa:250]― 最近は、[wa:1350]天気予報も[wa:1150]信頼できなくて[wa:1700]困るね。"
2300305-26 = "[wa:650]― さて……[wa:1850]この後、[wa:1200]何をしようか？"
2300305-29 = "[wa:50]― （ん……[wa:1450]今の言葉、[wa:1800]もしかして[wa:750]変な意味に聞こえたかな？）"
2300305-32 = "[wa:900]― （でも、[wa:800]ネットカフェなんて[wa:1400]私も初めてだし、"
2300305-33 = "."
2300305-34 = "― 普通[wa:900]こういう所で[wa:1400]何をするものなのかも[wa:1650]知らないし……）"
2300305-37 = "― （というか[wa:1000]この空間、[wa:1850]狭くて……"
2300305-39 = "[wa:50]― 先生の顔が[wa:1600]近い……っ）"
2300305-42 = "― え、[wa:500]さ、[wa:750]先に[wa:750]シャワーを[wa:600]浴びてくるって？"
2300305-44 = "― ちょっと、[wa:750]なっ、[wa:850]どうして？！"
2300305-47 = "― あ、[wa:850]雨に濡れたから、[wa:1950]髪を洗いに？"
2300305-49 = "― ……ごめん、[wa:1700]いや、[wa:1000]気にしないで。"
2300305-52 = "― ネットカフェには、[wa:1400]シャワーの設備も[wa:1150]あるんだね。"
2300305-55 = "― あ、[wa:650]見て、[wa:350]先生。[wa:1350]ドリンクバーが[wa:700]無料だって。"
2300305-57 = "― エナジードリンクも[wa:1350]あるかな？"
2300305-60 = "― ネットも自由に使えるし、[wa:2550]ドリンクも無料だし。"
2300305-62 = "― これは素晴らしい、[wa:2250]完全に[wa:1050]私のような[wa:950]人間のための空間。"
2300305-65 = "[wa:250]― ここになら、[wa:1100]いつまででも[wa:900]ずっと[wa:1150]いられそうだね？"
2300305-68 = "― あ、[wa:600]えっと……[wa:1500]今のも、[wa:850]別に変な意味では[wa:1500]ないから。"
2300305-70 = "― 誤解[wa:500]しないでね……。"
2300305-73 = "キヴォトス・市内中心街"
2300305-74 = "雨、上がってるね。良かった。"
2300305-75 = "偶然だったけど、なかなか面白いところだったね。"
2300305-76 = "次は、ちゃんと着替えを持って……。"
2300305-78 = "えっと……違くて、今の「次」っていうのは……。"
2300305-79 = "近くを通った時に、「偶然」雨が降ったら、ってことだから。"
2300305-80 = "……それ以外、特に深い意味はないからね？"
