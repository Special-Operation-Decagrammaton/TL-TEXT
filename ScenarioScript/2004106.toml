[translation]
2004106-1 = "秘密の場所"
2004106-3 = "（向かう途中、リオとの通話を思い返してみた）"
2004106-5 = "繰り返しになるのだけれど、私のアジトは複数の場所にあって――"
2004106-6 = "今回は、その中のひとつに貴方を招待したいの。"
2004106-7 = "……二人だけの秘密の場所、とも言えるかしら。"
2004106-8 = "セキュリティ上の問題はないから、心配は不要よ。"
2004106-9 = "もし、この場所が特定されたら……。"
2004106-10 = "それは貴方が誰かに口外したことを意味するわ。"
2004106-11 = "……その時は、相応の賠償を請求することになるわね。"
2004106-12 = "でも、貴方を信じているわ。"
2004106-13 = "[s] \"その信頼に応えてみせるよ！\""
2004106-14 = "では、また後ほど会いましょう。"
2004106-15 = "楽しみにしているわ。"
2004106-17 = "（リオが教えてくれた番号に電話をかけた）"
2004106-22 = "……えっ。せ、先生！？#n"
2004106-23 = "もう時間なの！？#nずっとカーテンを閉めていたから……！"
2004106-24 = "ど、どうすれば……。"
2004106-25 = "[s] \"リオ、何かあったの！？\""
2004106-26 = "な、何でもないわ！"
2004106-34 = "（リオの身が心配で、アジトまで走って向かった！）"
2004106-43 = "[ns] \"リオ！\""
2004106-45 = "せ、先生！？#nこんなに早く……。"
2004106-46 = "いえ、約束の時間で間違いないのだけれど……。"
2004106-47 = "[ns1] \"ごめん……。\"\n[ns2] \"……まだ掃除中だったんだね。\""
2004106-50 = "うぅ……。"
2004106-51 = "[ns] \"これ、コンビニ弁当の容器？\""
2004106-52 = "……ええ。"
2004106-53 = "そうね……隣はお茶とジュースのペットボトルよ。"
2004106-59 = "ち、違うの！それはゴミじゃないわ！#n実験装置と試薬で、それは工具……！"
2004106-60 = "……。"
2004106-61 = "……恥ずかしい姿を見せたわね。"
2004106-62 = "自分一人で、ちゃんと片付けられると思っていたのだけれど……。"
2004106-63 = "[s] \"前はどうしてたの？\""
2004106-64 = "……トキが。"
2004106-65 = "[s] \"そうだったんだ……でも、大丈夫だよ。\""
2004106-66 = "片付けも、学習すればできるようになる……？"
2004106-67 = "貴方も苦手だったの？"
2004106-68 = "そ、そう……。"
2004106-73 = "……先生、どこに行くのかしら。"
2004106-74 = "[s] \"ゴミ袋を買ってくるね。\""
2004106-75 = "わ、分かったわ……。"
2004106-81 = "本当に、片付いたわね……。"
2004106-82 = "……これでまだ半分！？"
2004106-83 = "掃除の概念が違う気がするのだけれど……。"
2004106-84 = "何を手伝えば良いのかしら？"
2004106-85 = "休んでいれば大丈夫、と言われても……。"
2004106-86 = "私だけ休むわけにはいかないわ。"
2004106-89 = "[wa:1780]― [log=리오]こういう事をさせるために、[wa:1540]貴方を呼んだわけじゃ、[/log]"
2004106-90 = "[wa:1630]― [log=리오]ないのだけれど……[/log]"
2004106-93 = "― [log=리오]自分でやるわ。[wa:1420]先生は座っていてちょうだい。[/log]"
2004106-96 = "[wa:950]― [log=리오]あ、[wa:830]貴方はもう少し、[wa:1390]先生としての自覚を持ちなさい。[/log]"
2004106-98 = "― [log=리오]こんなことで[wa:360]時間を浪費するなんて[wa:1440]非合理的よ。[/log]"
2004106-101 = "― [log=리오]他にもっと[wa:440]重要な仕事があるでしょう？[/log]"
2004106-104 = "[ns3] \"生徒の生活を守ることも、大事な仕事だよ。\"\n[ns4] \"今の私の仕事は、リオの「お世話」だからね。\""
2004106-107 = "[wa:570]― [log=리오]ッ……！[wa:770]な、[wa:960]なにを……[/log]"
2004106-109 = "― [log=리오]私の[wa:1300]「お世話」……！？[/log]"
2004106-112 = "[wa:1120]― [log=리오]り……[wa:590]理解に苦しむわ……[wa:1900]でも……[/log]"
2004106-114 = "― [log=리오]……貴方は、[wa:2330]そういう人だったわね。[/log]"
2004106-117 = "[wa:2120]― [log=리오]……分かったわ。[/log]"
2004106-119 = "― [log=리오]最後まで受け止めましょう。[/log]"
2004106-122 = "― [log=리오]貴方がする……[wa:1930]「お世話」とやらを。[/log]"
2004106-128 = "……これが「掃除」。"
2004106-129 = "本物の綺麗好きからしたら、まだ完璧とは言えない、と？"
2004106-130 = "たしかに、そもそも山積みのゴミ袋が残っているわね。"
2004106-131 = "……トキはたしかに、ちゃんと捨ててくれていたわね。"
2004106-132 = "貴方も、こんな片付いた部屋で過ごしてるのね。"
2004106-133 = "一般的な感覚で言うと……。"
2004106-134 = "これが普通なのかしら？"
2004106-135 = "[s5] \"……あれ？\"\n[s6] （かなり頑張ったんだけど……）"
2004106-138 = "もしかして、また何か言ってしまったかしら……。"
2004106-139 = "気にする必要はないって、それはどういう……？"
2004106-148 = "ど、どうして急に頭を？"
2004106-149 = "……。"
2004106-150 = "もう少し、このまま……。"
2004106-153 = "[ns] \"よし、何か食べにいこう。\""
2004106-154 = "たしかに食事の時間ではあるのだけれど、まだお腹は……。"
2004106-155 = "……ああ、そうね。#nアジトの片付けをしてくれたのだから、貴方は空腹になって当然だわ。"
2004106-156 = "気づけなくてごめんなさい。"
2004106-157 = "けれど、外に出かけるのは……。"
2004106-158 = "[s7] \"ここは旧都心だし……。\"\n[s8] \"ミレニアムから離れてるから大丈夫だよ、きっと。\""
2004106-161 = "……ええ、先生が言うのなら信じましょう。"
2004106-162 = "それと、あらためてお礼を……ありがとう、先生。"
2004106-163 = "じゃあ――"
2004106-167 = "きゃっ！？"
2004106-172 = "（リオがゴミ袋の山につまづいて転んでしまった）"
2004106-173 = "[ns] \"リオ！？\""
2004106-177 = "……だ、大丈夫よ。#n貴方が咄嗟にかばってくれたおかげね。"
2004106-178 = "[s] \"立てる？\""
2004106-179 = "ええ、もちろん立てるわ……。"
2004106-180 = "……。"
2004106-181 = "その、先生……。"
2004106-182 = "少し、もう少しだけ……。"
2004106-187 = "このままでも、良いかしら？"
2004106-188 = "[s] \"……良いよ？\""
2004106-189 = "……ありがとう、先生。"
2004106-193 = "……本当に、感謝するわ。"
2004106-195 = "（なぜか、いつもよりぎこちないリオと夕飯を食べてから）"
2004106-196 = "（シャーレに戻った）"
