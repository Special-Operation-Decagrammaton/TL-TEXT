[translation]
2004106-1 = "Lugar secreto"
2004106-3 = "（No caminho, lembrei-me da conversa com Rio）"
2004106-5 = "Como eu disse antes, meu esconderijo fica em vários lugares e..."
2004106-6 = "Desta vez, quero convidar você para um deles."
2004106-7 = "…Poderíamos dizer que é um lugar secreto só para nós dois."
2004106-8 = "Não há problemas de segurança, então não precisa se preocupar."
2004106-9 = "Se este lugar for descoberto..."
2004106-10 = "Isso significará que você contou a alguém."
2004106-11 = "…Nesse caso, terei que exigir uma compensação adequada."
2004106-12 = "Mas eu confio em você."
2004106-13 = "[s] \"Eu vou honrar essa confiança!\""
2004106-14 = "Então, nos vemos mais tarde."
2004106-15 = "Estou ansiosa por isso."
2004106-17 = "（Liguei para o número que Rio me deu）"
2004106-22 = "…Ah. Se, Sensei!?#n"
2004106-23 = "Já está na hora!?#nComo eu mantive as cortinas fechadas o tempo todo...!"
2004106-24 = "O, o que eu faço..."
2004106-25 = "[s] \"Rio, aconteceu alguma coisa!?\""
2004106-26 = "N, não é nada!"
2004106-34 = "（Preocupado com Rio, corri até o esconderijo!）"
2004106-43 = "[ns] \"Rio!\""
2004106-45 = "Se, Sensei!?#nTão cedo..."
2004106-46 = "Não, o horário combinado está correto, mas..."
2004106-47 = "[ns1] \"Desculpe...\"\n[ns2] \"...Você ainda estava limpando, né?\""
2004106-50 = "Ugh..."
2004106-51 = "[ns] \"Isso é uma embalagem de marmita de conveniência?\""
2004106-52 = "…Sim."
2004106-53 = "Pois é... ao lado estão as garrafas de chá e suco."
2004106-59 = "N, não é isso! Isso não é lixo!#nSão equipamentos experimentais e reagentes, e aquilo são ferramentas...!"
2004106-60 = "..."
2004106-61 = "…Mostrei uma cena vergonhosa para você."
2004106-62 = "Eu pensei que conseguiria arrumar tudo sozinha..."
2004106-63 = "[s] \"Como você fazia antes?\""
2004106-64 = "…Toki fazia."
2004106-65 = "[s] \"Entendi... mas está tudo bem.\""
2004106-66 = "Arrumar também é algo que se aprende a fazer...?"
2004106-67 = "Você também não era bom nisso?"
2004106-68 = "I, isso mesmo..."
2004106-73 = "…Sensei, onde você vai?"
2004106-74 = "[s] \"Vou comprar sacos de lixo.\""
2004106-75 = "E, entendi..."
2004106-81 = "Realmente, ficou arrumado..."
2004106-82 = "…Isso ainda é só a metade!?"
2004106-83 = "Sinto que temos conceitos diferentes sobre limpeza..."
2004106-84 = "No que eu deveria ajudar?"
2004106-85 = "Mesmo que você diga para eu descansar..."
2004106-86 = "Eu não posso ser a única a descansar."
2004106-89 = "[wa:1780]― [log=리오]Não foi para fazer esse tipo de coisa que eu, [wa:1540]chamei você aqui,[/log]"
2004106-90 = "[wa:1630]― [log=리오]mas...[/log]"
2004106-93 = "― [log=리오]Eu mesma farei isso. [wa:1420]Sensei, por favor, sente-se.[/log]"
2004106-96 = "[wa:950]― [log=리오]Ah, [wa:830]tenha um pouco mais de consciência do seu papel como Sensei.[/log]"
2004106-98 = "― [log=리오]Desperdiçar [wa:360]tempo com algo assim é [wa:1440]irracional.[/log]"
2004106-101 = "― [log=리오]Você não tem outras [wa:440]tarefas mais importantes?[/log]"
2004106-104 = "[ns3] \"Proteger a vida dos alunos também é um trabalho importante.\"\n[ns4] \"Meu trabalho agora é 'cuidar' de você, Rio.\""
2004106-107 = "[wa:570]― [log=리오]Tsc...! [wa:770]O, [wa:960]o que você...[/log]"
2004106-109 = "― [log=리오]Me [wa:1300]\"cuidar\"...!? [/log]"
2004106-112 = "[wa:1120]― [log=리오]Eu... [wa:590]tenho dificuldade em entender... [wa:1900]mas...[/log]"
2004106-114 = "― [log=리오]...Você sempre foi [wa:2330]esse tipo de pessoa, não é?[/log]"
2004106-117 = "[wa:2120]― [log=리오]...Entendido.[/log]"
2004106-119 = "― [log=리오]Vou aceitar até o fim.[/log]"
2004106-122 = "― [log=리오]Esse tal de... [wa:1930]\"cuidar\" que você tanto fala.[/log]"
2004106-128 = "...Então isso é \"limpar\"."
2004106-129 = "Para alguém que é realmente obcecado por limpeza, ainda não está perfeito, é isso?"
2004106-130 = "De fato, ainda restam pilhas de sacos de lixo aqui."
2004106-131 = "...Toki realmente os descartou corretamente, não foi?"
2004106-132 = Você também vive em um quarto tão arrumado assim?"
2004106-133 = "Pelo senso comum..."
2004106-134 = "Será que isso é o normal?"
2004106-135 = "[s5] \"...Ué?\"\n[s6] (Eu me esforcei bastante, mas...)"
2004106-138 = "Será que eu disse algo errado de novo...?"
2004106-139 = "Não precisa se preocupar, o que você quis dizer com isso...?"
2004106-148 = "P-por que você está fazendo carinho na minha cabeça de repente?"
2004106-149 = "..."
2004106-150 = "Só mais um pouco, assim..."
2004106-153 = "[ns] \"Certo, vamos sair para comer algo.\""
2004106-154 = "De fato, é hora da refeição, mas eu ainda não estou com fome..."
2004106-155 = "...Ah, entendo. #nJá que você limpou o esconderijo, é natural que esteja com fome."
2004106-156 = "Sinto muito por não ter percebido."
2004106-157 = "Mas, sair para fora é..."
2004106-158 = "[s7] \"Aqui é o antigo centro da cidade...\"\n[s8] \"Estamos longe de Millennium, então deve ficar tudo bem.\""
2004106-161 = "...Sim, se o Sensei diz, eu acredito."
2004106-162 = "E, agradecendo novamente... obrigado, Sensei."
2004106-163 = "Então—"
2004106-167 = "Ah!"
2004106-172 = "(Rio tropeçou em uma pilha de sacos de lixo e caiu)"
2004106-173 = "[ns] \"Rio!?\""
2004106-177 = "...E-estou bem. #nGraças a você que me protegeu rapidamente."
2004106-178 = "[s] \"Consegue ficar de pé?\""
2004106-179 = "Sim, claro que consigo..."
2004106-180 = "..."
2004106-181 = "Diga, Sensei..."
2004106-182 = "Um pouco, só mais um pouco..."
2004106-187 = "Tudo bem se ficarmos assim?"
2004106-188 = "[s] \"...Tudo bem.\""
2004106-189 = "...Obrigado, Sensei."
2004106-193 = "...Eu realmente agradeço."
2004106-195 = "(Depois de jantar com uma Rio estranhamente mais tímida que o normal)"
2004106-196 = "(Retornamos ao Schale)"
