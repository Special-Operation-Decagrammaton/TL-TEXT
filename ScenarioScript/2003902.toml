[translation]
2003902-1 = "宮中のかくれんぼ"
2003902-2 = "玄龍門・私室"
2003902-4 = "――今[ruby=わらわ]の妾は[/ruby]幽閉されたも同然じゃ。"
2003902-5 = "[s1] \"いきなりどうしたの！？\"\n[s2] \"一体何があったの！？\""
2003902-8 = "玄龍門内部の事情ゆえ、説明するのが手間……もとい、口にするのが難しい政治的な問題でな。"
2003902-9 = "ひいては――玄武商会との関係、キヴォトスにおける山海経の立ち位置……"
2003902-10 = "その他、護衛の暴走、各部長による部費増額申請、夕餉の献立などなど……"
2003902-11 = "解決の糸口が見つからぬ様々な状況が招いてしまった結果……とも言えるのじゃろう。"
2003902-12 = "[s] \"えっと……よく分からないんだけど……。\""
2003902-13 = "うむ、無理もない。"
2003902-14 = "[s] \"もしかして、からかわれてる……？\""
2003902-15 = "考えるより行動せよ――という言葉もあるのじゃぞ、先生。"
2003902-16 = "目は口ほどに物を言い――足は口ほどに物を言う。"
2003902-17 = "――即ち、先生は妾と共に、この状況を打破すべきなのじゃ！"
2003902-18 = "[s] \"えっと……ここから連れ出してほしいってこと……？\""
2003902-19 = "話が早いのは其方の美徳じゃの。"
2003902-20 = "じゃが、ここ[ruby=りくわかく]六和閣[/ruby]から抜け出すのは、そう容易なことではない。"
2003902-21 = "妾なりに、準備しておってな。"
2003902-25 = "[ns] \"ま、まさか……！\""
2003902-26 = "ああ、これのことじゃ。"
2003902-34 = "さあ、早く参ろう。"
2003902-37 = "なんとか、ここまで辿り着いたが……"
2003902-38 = "……？ここの方が危険なのではないか？"
2003902-39 = "うむ……先生の言う通りではある。#nここは六和閣の最深部――"
2003902-40 = "厳重な警備のもと、見張りも交代制になっておっての……"
2003902-45 = "あれ……？#nこの時間帯の当番は私だけど……"
2003902-46 = "もしかしてあの子、スケジュールを勘違いしてるとか？"
2003902-47 = "いや……ここに配属されるような者が、そんな基本的なミスをするはずがない！"
2003902-48 = "何奴だ！スパイか！？"
2003902-49 = "っ……！"
2003902-50 = "[ns] （キサキが危ない……！）"
2003902-52 = "[ns3] \"あ、えっと！私の護衛……かな？\"\n[ns4] \"そ、そう！そんな感じ！\""
2003902-55 = "先生？いらっしゃってたんですね。"
2003902-56 = "これは失礼いたしました。#n先生の護衛だったのですね……！"
2003902-57 = "……あれ？おかしいな。#nそもそもシャーレの先生が[ruby=ここ]六和閣[/ruby]で警護を受ける必要が……？"
2003902-58 = "[s] \"あ、えっと……それが……！\""
2003902-59 = "これは、一種のおもてなしです。"
2003902-60 = "おもてなし……？あ！"
2003902-61 = "もしかして、これは門主様の勅令で……？"
2003902-62 = "ええ、そうなります。"
2003902-63 = "っ！……た、大変失礼いたしました！先生！"
2003902-64 = "あ、あはは……どうか玄龍門でごゆっくりとお過ごしください……！"
2003902-68 = "なんとか上手く切り抜けられたようじゃのう。"
2003902-69 = "ご苦労じゃった、先生。このまま抜け出せば――"
2003902-70 = "我々の勝利と言えよう。"
2003902-72 = "（そうやって、キサキの脱走（？）の計画は続き……）"
2003902-75 = "[ns] \"あっちから警備の人が来るよ！\""
2003902-76 = "玄龍門の者が先生の護衛をしているという噂は、すでに六和閣中に広まっている……"
2003902-77 = "言い換えれば、先生のそばにいる者は、此処から出られぬ事を意味する。"
2003902-78 = "ふむ……であれば、他の者に変装する必要があるのう。"
2003902-88 = "なっ！玄武商会！？どうしてここに！？"
2003902-89 = "さっさと出ていけ！"
2003902-90 = "ふふ、予想通りじゃ。#n早く逃げるとしよう。"
2003902-96 = "なんとか、六和閣からは出られたものの……"
2003902-97 = "玄武商会の者が、この近隣をうろついておれば目立つじゃろう。"
2003902-98 = "先生のそばに居てもおかしくない者に変装せねばなるまい。"
2003902-99 = "[s] \"いい案があるの……？\""
2003902-100 = "ふふ、もちろんじゃ。#n即ち――"
2003902-108 = "こんにちは先生！キキです！#n今日は一緒に梅花園の外をお散歩する日ですよね？"
2003902-109 = "[s5] \"…………。\"\n[s6] \"た、たしかに、これならいけるかも……。\""
2003902-112 = "わ～い！#nキキ、先生のこと大好き～！"
2003902-119 = "あれ、先生？ここには何の用で……あぁ、なるほど。#n園児の世話をしているところなんですね。"
2003902-120 = "いつもご苦労様です。#nほら、そこの君も。先生の言うことはちゃんと聞くんだぞ？"
2003902-121 = "大丈夫です！シュン教官からも同じこと言われました！"
2003902-122 = "[s7] \"……………………。\"\n[s8] \"あ、あまり……心配、しないでね……。\""
2003902-125 = "はい。それではお願いします。"
2003902-126 = "（……あれ？）"
2003902-127 = "（なんか今、すっごく冷たい視線を浴びたような……）"
2003902-130 = "[ns] \"そろそろ……いいんじゃないかな。\""
2003902-131 = "うむ。"
2003902-137 = "ふふ、ご苦労じゃったの、先生。"
2003902-138 = "おかげで楽しく脱走ごっこ……もとい、無事脱出することができた。"
2003902-139 = "ん？本当に幽閉されておったのか、じゃと？"
2003902-140 = "……。"
2003902-141 = "どうして、それを聞くのじゃ？"
2003902-142 = "六和閣でも、付近の路地でも、玄龍門の構成員が妾を探していないようじゃった……？"
2003902-146 = "――やはり先生の目は誤魔化せぬのう。"
2003902-147 = "そうじゃ。すべては、妾の芝居よ。"
2003902-148 = "ふふ、おかげで楽しい時間を過ごさせてもらったぞ。"
2003902-149 = "[s9] \"え、えっと……つまりこれは、\"\n[s10] \"最初からキサキに騙されてたってこと！？\""
2003902-152 = "ふふ、どうじゃろうな？"
2003902-153 = "じゃがな、先生。玄龍門の門主……いや、各学園の生徒会長は……"
2003902-154 = "己が属する学園に幽閉されている、と言っても過言ではないのじゃよ。"
2003902-155 = "妾は――そんな不自由な生徒会長のためにも、息抜きは必要じゃと思っておる。#n無論、教育的指導という意味においてもな。"
2003902-156 = "[s] \"ここで「教育的」と言っていいのかどうか……。\""
2003902-157 = "ふふ。何はともあれ、此度は妾の興味本位に先生を付き合わせてしまったのも事実。"
2003902-158 = "謝罪をここに。#n必要であれば埋め合わせもしよう――"
2003902-159 = "[s] \"うーん……でも、私も楽しかったから大丈夫。\""
2003902-160 = "そ、そうか……？"
2003902-161 = "まこと、先生は予想外のことを申してくれる。"
2003902-162 = "……先生。"
2003902-163 = "今日はこのまま……妾に付き合ってはくれぬか？"
2003902-165 = "門主様！門主様――！#nどこにいらっしゃいますか――！"
2003902-169 = "おや。門主の不在が玄龍門にバレてしまったようじゃのう。"
2003902-170 = "……致し方あるまい。"
2003902-175 = "先生、参るぞ。"
2003902-176 = "[s] \"ん？どこに？\""
2003902-177 = "もちろん、玄龍門じゃ。"
2003902-178 = "ふふ。まさか――付き合わぬとは申すまい？"
2003902-179 = "無論……[ruby=そなた]其方[/ruby]が拒むのであれば、妾も止めはしないが……。"
2003902-180 = "[s] \"うぅ……その言い方はズルいよ！\""
2003902-181 = "ふふ、知っておる。#n門主たるもの、すべてを適材適所に使うものじゃからな。"
2003902-182 = "さて。"
2003902-183 = "残りの時間も……よろしく頼むぞ、先生。"
2003902-185 = "（そうやってキサキと一緒に、玄龍門に幽閉（？）されてしまったのだった……）"
