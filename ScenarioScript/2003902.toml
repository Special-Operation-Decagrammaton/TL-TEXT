[translation]
2003902-1 = "Esconde-esconde no palácio"
2003902-2 = "Genryumon - Aposentos privados"
2003902-4 = "――Agora, eu estou praticamente em confinamento."
2003902-5 = "[s1] \"O que aconteceu de repente!?\"\n[s2] \"O que exatamente houve!?\""
2003902-8 = "Devido aos assuntos internos da Genryumon, explicar é trabalhoso... ou melhor, é um problema político difícil de se falar."
2003902-9 = "E, consequentemente―― a relação com a Associação Comercial Genbu, a posição de Shanhaijing em Kivotos..."
2003902-10 = "Além disso, o descontrole da escolta, os pedidos de aumento de orçamento de cada chefe de departamento, o cardápio do jantar, e por aí vai..."
2003902-11 = "Pode-se dizer que é o resultado de várias situações para as quais não encontro uma solução..."
2003902-12 = "[s] \"Hum... eu não entendi muito bem...\""
2003902-13 = "Sim, é compreensível."
2003902-14 = "[s] \"Por acaso, você está zombando de mim...?\""
2003902-15 = "Existe um ditado que diz: 'Aja antes de pensar', Sensei."
2003902-16 = "Os olhos falam tanto quanto a boca―― e os pés falam tanto quanto a boca."
2003902-17 = "――Ou seja, Sensei, você deve romper esta situação junto comigo!"
2003902-18 = "[s] \"Hum... você quer que eu te tire daqui...?\""
2003902-19 = "Sua rapidez em entender as coisas é uma virtude."
2003902-20 = "No entanto, sair daqui do Rikuwakaku não é uma tarefa fácil."
2003902-21 = "Eu me preparei à minha maneira."
2003902-25 = "[ns] \"N-não pode ser...!\""
2003902-26 = "Ah, é isto mesmo."
2003902-34 = "Vamos, partamos logo."
2003902-37 = "Conseguimos chegar até aqui, mas..."
2003902-38 = "...? Não é ainda mais perigoso aqui?"
2003902-39 = "Hum... o que você diz é verdade. #nEste é o ponto mais profundo do Rikuwakaku――"
2003902-40 = "Sob vigilância rigorosa, e os guardas fazem turnos..."
2003902-45 = "Ué...? #nO turno deste horário é meu, mas..."
2003902-46 = "Será que aquela criança se confundiu com o cronograma?"
2003902-47 = "Não... alguém designado para este posto não cometeria um erro tão básico!"
2003902-48 = "Quem está aí! É um espião!?"
2003902-49 = "Ah...!"
2003902-50 = "[ns] (Kisaki está em perigo...!)"
2003902-52 = "[ns3] \"Ah, hum! Minha escolta... eu acho?\"\n[ns4] \"I-isso mesmo! Algo assim!\""
2003902-55 = "Sensei? Você veio nos visitar."
2003902-56 = "Peço perdão pela indelicadeza. #nEntão você era a escolta do Sensei...!"
2003902-57 = "...Ué? Que estranho. #nPor que o Sensei do Schale precisaria de escolta no Rikuwakaku...?"
2003902-58 = "[s] \"Ah, hum... é que...!\""
2003902-59 = "Isso é um tipo de hospitalidade."
2003902-60 = "Hospitalidade...? Ah!"
2003902-61 = "Por acaso, isso seria por decreto da Mestra do Portão...?"
2003902-62 = "Sim, é exatamente isso."
2003902-63 = "Ah! ...P-peço mil desculpas! Sensei!"
2003902-64 = "Ah, ahaha... por favor, sinta-se à vontade na Genryumon...!"
2003902-68 = "Parece que conseguimos passar por isso com sucesso."
2003902-69 = "Bom trabalho, Sensei. Se escaparmos assim――"
2003902-70 = "Poderemos dizer que é a nossa vitória."
2003902-72 = "(E assim, o plano de fuga (?) de Kisaki continua...)"
2003902-75 = "[ns] \"Tem gente da segurança vindo por ali!\""
2003902-76 = "O boato de que alguém da Genryumon está escoltando o Sensei já se espalhou por todo o Rikuwakaku..."
2003902-77 = "Em outras palavras, quem estiver ao lado do Sensei não poderá sair daqui."
2003902-78 = "Hum... sendo assim, precisaremos nos disfarçar de outra pessoa."
2003902-88 = "O quê! A Associação Genbu!? Por que estão aqui!?"
2003902-89 = "Saiam daqui agora mesmo!"
2003902-90 = "Fufu, como eu esperava. #nVamos fugir logo."
2003902-96 = "Conseguimos sair do Pavilhão Rokuwa, mas..."
2003902-97 = "Se membros da Associação Genbu ficarem rondando por aqui, vai chamar muita atenção."
2003902-98 = "Precisamos nos disfarçar de alguém que não pareça estranho estando ao lado do Sensei."
2003902-99 = "[s] \"Você tem um bom plano...?\""
2003902-100 = "Fufu, é claro. #nOu seja——"
2003902-108 = "Olá, Sensei! Sou a Kiki! #nHojé é o dia de passear fora do Jardim Amehana, não é?"
2003902-109 = "[s5] \"............\" \n[s6] \"B-bem, acho que desse jeito pode funcionar...\""
2003902-112 = "Eba! #nKiki adora o Sensei!"
2003902-119 = "Ué, Sensei? O que faz por aqui... Ah, entendi. #nEstá cuidando das crianças, não é?"
2003902-120 = "Sempre trabalhando duro. #nEi, você aí também. Ouça bem o que o Sensei diz, entendeu?"
2003902-121 = "Tudo bem! A instrutora Shun me disse a mesma coisa!"
2003902-122 = "[s7] \"..................\" \n[s8] \"N-não precisa... se preocupar tanto...\""
2003902-125 = "Sim. Então, por favor."
2003902-126 = "(...Ué?)"
2003902-127 = "(Senti como se tivesse recebido um olhar muito frio agora há pouco...)"
2003902-130 = "[ns] \"Acho que... já está bom por aqui.\""
2003902-131 = "Hum."
2003902-137 = "Fufu, bom trabalho, Sensei."
2003902-138 = "Graças a você, pude me divertir brincando de fugir... ou melhor, conseguimos escapar em segurança."
2003902-139 = "Hm? Você está perguntando se eu estava realmente presa?"
2003902-140 = "..."
2003902-141 = "Por que você pergunta isso?"
2003902-142 = "Nem no Pavilhão Rokuwa, nem nos becos próximos, os membros da Genryumon pareciam estar me procurando..."
2003902-146 = "——Como esperado, não dá para enganar o olhar do Sensei."
2003902-147 = "É isso mesmo. Tudo não passou de uma encenação minha."
2003902-148 = "Fufu, graças a isso, passei um tempo muito divertido."
2003902-149 = "[s9] \"E-espera... então isso significa que...\" \n[s10] \"Eu fui enganado pela Kisaki desde o começo!?\""
2003902-152 = "Fufu, quem sabe?"
2003902-153 = "Mas veja bem, Sensei. O líder da Genryumon... não, os presidentes estudantis de cada escola..."
2003902-154 = "Não é exagero dizer que eles vivem confinados em suas próprias escolas."
2003902-155 = "Eu acredito que, para esses presidentes estudantis tão limitados, um momento de descanso é necessário. #nClaro, também no sentido de uma orientação educacional."
2003902-156 = "[s] \"Não sei se dá para chamar isso de 'educacional'...\""
2003902-157 = "Fufu. De qualquer forma, é verdade que desta vez fiz o Sensei me acompanhar por puro interesse pessoal."
2003902-158 = "Peço desculpas por isso. #nSe necessário, farei uma compensação——"
2003902-159 = "[s] \"Hum... mas eu também me diverti, então está tudo bem.\""
2003902-160 = "S-sério...?"
2003902-161 = "Realmente, o Sensei sempre diz coisas inesperadas."
2003902-162 = "...Sensei."
2003902-163 = "Você não gostaria de... continuar me acompanhando hoje?"
2003902-165 = "Líder! Líder——! #nOnde a senhora está——!"
2003902-169 = "Ora. Parece que a Genryumon descobriu que a líder não está."
2003902-170 = "...Não tem jeito."
2003902-175 = "Sensei, vamos."
2003902-176 = "[s] \"Hm? Para onde?\""
2003902-177 = "Para a Genryumon, é claro."
2003902-178 = "Fufu. Você não vai dizer que não vai me acompanhar, vai?"
2003902-179 = "Claro... se você recusar, eu não vou te impedir, mas..."
2003902-180 = "[s] \"Ugh... esse jeito de falar é injusto!\""
2003902-181 = "Fufu, eu sei. Como líder da seita, devo usar tudo no lugar certo, afinal."
2003902-182 = "Bem."
2003902-183 = "O tempo que resta... conto com você, Sensei."
2003902-185 = "(E assim, acabei sendo mantido em confinamento (?) na Genryumon junto com Kisaki...)"
