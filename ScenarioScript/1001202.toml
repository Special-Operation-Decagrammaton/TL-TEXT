[translation]
1001202-1 = "トレーナー参上！"
1001202-2 = "ミレニアム・ジム"
1001202-3 = "あ、先生……いえ、トレーナー！来てくださったんですね！"
1001202-4 = "お待ちしておりました。"
1001202-5 = "あはは、まだトレーナーって呼ぶのは慣れませんね。"
1001202-6 = "約束通り、自分でトレーニングのメニューを作ってきました。"
1001202-7 = "これでいいかどうか、確認していただけませんか？"
1001202-10 = "（スミレが渡してきたスマホには、なんだか難しそうな言葉がたくさん書いてあった）"
1001202-12 = "いかがでしょうか、トレーナー？"
1001202-13 = "ダンベルオーバーヘッドエクステンションは上腕の発達、特に上腕三頭筋に良い運動だそうです。"
1001202-14 = "この運動ではしなやかな腕を作ることができ、こちらのレッグエクステンションの方では……。"
1001202-15 = "[s] \"えっと、スミレ？\""
1001202-16 = "足の筋力を……あっ、はい、何でしょうかトレーナー！"
1001202-17 = "[s] \"これは、無理しすぎじゃない？\""
1001202-18 = "うーん……確かに以前に比べると、少し無理して負荷を高めています。"
1001202-19 = "きっと以前の私なら、消化しきれないメニューだと思います。"
1001202-20 = "ですが、今は違います。"
1001202-21 = "その理由は、ト、トレーナーがいるからです！"
1001202-22 = "[s] \"そ、そっか。でも、私は専門的な知識を持ってないけど。\""
1001202-23 = "大丈夫です！"
1001202-24 = "トレーナーはそばにいるだけで力になってくれる存在！"
1001202-25 = "私がオーバートレーニングしないように、止めてくださる役割を担ってくれていますから。"
1001202-26 = "こんな体系的なトレーニングができるようになったのは、すべてトレーナーのおかげです。"
1001202-27 = "[s] \"それならよかった。\""
1001202-28 = "よ、良かったのは私の方です。"
1001202-29 = "トレーナーに出会う前の私は、何も知らないひよっこに過ぎませんでしたから。"
1001202-31 = "ミレニアム・保健室"
1001202-32 = "先日"
1001202-33 = "（ガラガラ）"
1001202-34 = "あっ、先生。"
1001202-35 = "[s] \"体調はどう？\""
1001202-36 = "大丈夫です！軽い脱水症状でしたので。"
1001202-37 = "3回ぐらい倒れましたけど、今はもう大丈夫です。"
1001202-38 = "はい？どうしてこうなったのか、ですか？"
1001202-39 = "それは……最近学校のテストの準備をしていて、じっと座ってる時間が長かったもので。"
1001202-40 = "それで少し運動量を増やそうと思いまして、急に強度の高いトレーニングをしたのが原因だったようです。"
1001202-41 = "[s] \"そんなに無理しなくても、今のままで十分じゃない？\""
1001202-42 = "いいえ。"
1001202-43 = "トレーニングは毎日、きちんと、確実にやらなくてはいけません。"
1001202-44 = "そうしないと……。"
1001202-45 = "[s] \"そうしないと？\""
1001202-46 = "起こってしまうのです……筋肉の損失が！"
1001202-47 = "いいですか？今まで培ってきた筋肉たちが無くなることを想像してみてください。"
1001202-48 = "地獄です、苦痛です、絶対にあってはならないことです！"
1001202-49 = "[s1] \"そ、そうなんだ。\"\n[s2] \"お、落ち着いて。\""
1001202-50 = "あっ！す、すみません。ちょっと興奮してしまいました。"
1001202-51 = "あっ！す、すみません。ちょっと興奮してしまいました。"
1001202-52 = "ふぅー……。"
1001202-53 = "とにかく、筋肉の損失を防ぐためには不可欠なことだったのです。"
1001202-54 = "[s] \"運動は、健康を守るためにするものだと思うよ。\""
1001202-55 = "もちろんです、私もそう思います。"
1001202-56 = "そのためにこうして、一生懸命……。"
1001202-57 = "[s] \"脱水症状を起こすのは、健康的じゃないと思うよ？\""
1001202-58 = "……！"
1001202-59 = "あ、はい、それは……そう、ですね。"
1001202-60 = "すみません、先生。"
1001202-61 = "はあ……。"
1001202-62 = "普段は規則正しくトレーニングができていたのに。"
1001202-63 = "少しでも気持ちが焦ると、こうしてミスをしてしまいます。"
1001202-64 = "誰かが見てくれるといいなと思うのですが……周りにお願いできそうな人もいないですし。"
1001202-65 = "どうすればいいのでしょうか。"
1001202-66 = "……。"
1001202-67 = "[s3] トレーニングを手伝うと申し出る。\n[s4] \"準備万端のトレーナー、今ここに参上！\""
1001202-68 = "はい！？"
1001202-69 = "はい！？"
1001202-70 = "先生が手伝ってくれるんですか？"
1001202-71 = "そ、そんな、良いのでしょうか？"
1001202-72 = "ありがとうございます！先生！"
1001202-73 = "いえ、これからはトレーナーと呼んだ方がいいでしょうか？"
1001202-74 = "[s5] \"うん、それでもいいよ。\"\n[s6] \"トレーナーと呼ぶことを許可しよう。\""
1001202-75 = "はい！"
1001202-76 = "はい！"
1001202-79 = "さて、では！"
1001202-80 = "今日のトレーニングを、始めましょうか？"
1001202-81 = "よろしくお願いします、トレーナー。"
