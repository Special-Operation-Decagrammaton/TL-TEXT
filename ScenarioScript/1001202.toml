[translation]
1001202-1 = "Treinador, cheguei!"
1001202-2 = "Ginásio do Millennium"
1001202-3 = "Ah, Sensei... não, Treinador! Você veio!"
1001202-4 = "Eu estava esperando por você."
1001202-5 = "Ahaha, ainda não me acostumei a te chamar de Treinador."
1001202-6 = "Como prometido, eu mesma criei o menu de treino."
1001202-7 = "Poderia verificar se está bom?"
1001202-10 = "（No celular que Sumire me entregou, havia muitos termos que pareciam complicados）"
1001202-12 = "O que acha, Treinador?"
1001202-13 = "Dizem que a extensão de tríceps com halteres é um bom exercício para o desenvolvimento do braço, especialmente para o tríceps."
1001202-14 = "Com esse exercício, posso criar braços flexíveis, e quanto a esta extensão de pernas..."
1001202-15 = "[s] \"Ei, Sumire?\""
1001202-16 = "A força muscular das pernas... ah, sim, o que foi, Treinador!"
1001202-17 = "[s] \"Isso não é forçar demais?\""
1001202-18 = "Hmm... certamente, comparado a antes, estou forçando um pouco mais a carga."
1001202-19 = "Tenho certeza de que, se fosse a antiga eu, não conseguiria completar esse menu."
1001202-20 = "Mas agora é diferente."
1001202-21 = "O motivo é que o Treinador está aqui!"
1001202-22 = "[s] \"E-entendi. Mas eu não tenho conhecimento profissional, sabe?\""
1001202-23 = "Não tem problema!"
1001202-24 = "O Treinador é alguém que me dá forças só por estar ao meu lado!"
1001202-25 = "Você assume o papel de me impedir para que eu não faça um treino excessivo."
1001202-26 = "Conseguir fazer um treino tão sistemático assim é graças ao Treinador."
1001202-27 = "[s] \"Fico feliz em ouvir isso.\""
1001202-28 = "E-eu é que fico feliz."
1001202-29 = "Antes de conhecer o Treinador, eu não passava de uma novata que não sabia de nada."
1001202-31 = "Enfermaria do Millennium"
1001202-32 = "Outro dia"
1001202-33 = "（Porta abrindo）"
1001202-34 = "Ah, Sensei."
1001202-35 = "[s] \"Como está se sentindo?\""
1001202-36 = "Estou bem! Foi apenas uma leve desidratação."
1001202-37 = "Eu desmaiei umas três vezes, mas agora já estou bem."
1001202-38 = "Sim? Quer saber por que isso aconteceu?"
1001202-39 = "É que... ultimamente estive me preparando para as provas da escola e passei muito tempo sentada."
1001202-40 = "Então, pensei em aumentar um pouco a quantidade de exercícios, e parece que o motivo foi ter feito um treino de alta intensidade de repente."
1001202-41 = "[s] \"Não precisa se esforçar tanto, não está bom do jeito que está?\""
1001202-42 = "Não."
1001202-43 = "O treino deve ser feito todos os dias, de forma correta e consistente."
1001202-44 = "Se não..."
1001202-45 = "[s] \"Se não?\""
1001202-46 = "Acontece... a perda muscular!"
1001202-47 = "Entende? Tente imaginar os músculos que cultivei até agora desaparecendo."
1001202-48 = "É o inferno, é uma tortura, é algo que nunca deve acontecer!"
1001202-49 = "[s1] \"E-entendi.\"\n[s2] \"C-calma aí.\""
1001202-50 = "Ah! D-desculpe. Acabei me empolgando um pouco."
1001202-51 = "Ah! D-desculpe. Acabei me empolgando um pouco."
1001202-52 = "Ufa..."
1001202-53 = "De qualquer forma, era algo indispensável para evitar a perda muscular."
1001202-54 = "[s] \"Acho que o exercício serve para proteger a saúde, sabe?\""
1001202-55 = "Com certeza, eu também penso o mesmo."
1001202-56 = "É por isso que estou me esforçando tanto assim..."
1001202-57 = "[s] \"Acho que ter uma desidratação não é nada saudável, sabia?\""
1001202-58 = "……！"
1001202-59 = "Ah, sim, isso é... verdade, você tem razão."
1001202-60 = "Desculpe, Sensei."
1001202-61 = "Haa..."
1001202-62 = "Eu costumo conseguir treinar de forma regular e disciplinada."
1001202-63 = "Mas, quando fico um pouco ansiosa, acabo cometendo erros como este."
1001202-64 = "Eu gostaria que alguém pudesse me observar... mas não tem ninguém por perto a quem eu possa pedir."
1001202-65 = "O que eu deveria fazer?"
1001202-66 = "……。"
1001202-67 = "[s3] Oferecer-se para ajudar no treinamento.\n[s4] \"Um treinador totalmente preparado acaba de chegar!\""
1001202-68 = "Hein!?"
1001202-69 = "Hein!?"
1001202-70 = "O Sensei vai me ajudar?"
1001202-71 = "S-será que tudo bem mesmo?"
1001202-72 = "Muito obrigada! Sensei!"
1001202-73 = "Não, de agora em diante, seria melhor eu te chamar de treinador?"
1001202-74 = "[s5] \"Sim, pode ser.\"\n[s6] \"Eu autorizo você a me chamar de treinador.\""
1001202-75 = "Sim!"
1001202-76 = "Sim!"
1001202-79 = "Bem, então!"
1001202-80 = "Vamos começar o treinamento de hoje?"
1001202-81 = "Conto com você, treinador."
