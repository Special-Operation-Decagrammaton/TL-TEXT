[translation]
1006605-1 = "出撃準備完了！"
1006605-2 = "（アリスが教えてくれた場所に駆けつけた）"
1006605-3 = "（恐る恐るチャイムを鳴らすと……）"
1006605-7 = "先生ですか！？"
1006605-8 = "[s] \"うん、入っていいかな？\""
1006605-9 = "ま、待ってください！"
1006605-10 = "今は、まだ……！"
1006605-11 = "[s] \"でも大事な話があるって……。\""
1006605-12 = "それはそう、なのですが……！"
1006605-13 = "うう……まさかこんなに早く……#nいえ、早く来てくれるのはアリスも嬉しいのですが……！"
1006605-19 = "[ns] \"アリス、大丈夫！？\""
1006605-21 = "（アリスが心配になり、ドアを開けた）"
1006605-22 = "（すると……）"
1006605-25 = "[wa:300]― せ、[wa:600]先生！？"
1006605-27 = "[wa:900]― アリス、[wa:700]まだ[wa:400]準備中なので……"
1006605-30 = "[wa:800]― メイドを克服し、[wa:1500]ジョブチェンジした[wa:900]アリスの[wa:300]姿……"
1006605-32 = "[wa:500]― 先生に[wa:500]見せようと[wa:400]思ったのですが……"
1006605-35 = "[wa:1000]― アリスの支度が[wa:600]整うまで、"
1006605-37 = "[wa:500]― もう少しだけ[wa:900]待っていてください。"
1006605-40 = "[ns] \"アリスはもう、メイドは怖くないんだね。\""
1006605-41 = "[wa:300]― その通りです！[wa:1600]もう[wa:300]メイドは[wa:300]怖くありません！"
1006605-43 = "[wa:500]― これも[wa:400]全部、[wa:1100]先生が[wa:400]居てくれた[wa:600]おかげです。"
1006605-46 = "[wa:400]― 先生と[wa:600]一緒なら……"
1006605-48 = "[wa:700]― アリスは[wa:900]どんなダンジョンでも[wa:900]攻略できますから。"
1006605-51 = "[wa:300]― はいっ！[wa:1000]アリス、[wa:1100]冒険の[wa:500]準備が[wa:300]整いました！"
1006605-54 = "（アリスが身支度を最後まで終えるのを待って……）"
1006605-59 = "お待たせしました！先生、どうですか？"
1006605-60 = "[s] \"うん、とても似合ってるよ。\""
1006605-61 = "そう言ってもらえてアリスは嬉しいです。"
1006605-62 = "先生も、アリスはメイド服を克服できたと思いますか？"
1006605-63 = "[s] \"うん、できてるんじゃないかな。\""
1006605-64 = "パンパカパーン！先生に評価されました！#nこれでアリスはより高いステージへ進むことができます！"
1006605-65 = "[s] \"高いステージって……どこ？\""
1006605-66 = "すなわち――最強のメイド勇者になることです！"
1006605-67 = "メイドと勇者を両方極め、#n悪を倒して世界を救う強いメイドになるのです！"
1006605-68 = "[s] \"うん、いいんじゃないかな。\""
1006605-69 = "先生の同意を得ました！こういう時のアリスは、まさに無敵です！"
1006605-73 = "さあ、今こそ出撃の時です！先生、共に旅立ちましょう！"
1006605-74 = "広い大地が、たくさんの経験が――"
1006605-75 = "メイドの世界がアリスたちを待っています！"
1006605-77 = "（アリスと手を取り合い、シャーレを目指して歩んでいった）"
