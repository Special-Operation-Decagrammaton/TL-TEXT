[translation]
10041060-1 = "Episódio 6; Sala da Big Sister"
10041060-7 = "Algoritmo Big Sister……."
10041060-9 = "……É a minha mancha. Tanto tê-lo criado, quanto tê-lo usado."
10041060-10 = "Mancha……?"
10041060-11 = "Quem diria que ouviria essas palavras saindo da sua boca."
10041060-12 = "É a verdade. Naquela época, eu só buscava eficiência e não tive dúvidas."
10041060-13 = "……Hoje em dia, eu jamais criaria algo assim."
10041060-14 = "Dizendo isso e ainda assim…… pretende usar o sistema? #n……Além disso, se ele foi deixado em um estado funcional, acho que isso por si só já é um problema."
10041060-15 = "……Eu o isolei quando deixei o Millennium. #nPara que nunca mais pudesse ser usado."
10041060-16 = "Mas agora não há outro jeito. Para resolver isso, só usando ele……"
10041060-17 = "Esta é…… estritamente uma decisão minha, e minha responsabilidade."
10041060-22 = "Portanto, vocês duas não precisam se preocupar. #nSe quiserem, podem ir embora agora mesmo."
10041060-27 = "……Hã?"
10041060-28 = "Espere, como assim ir embora?"
10041060-30 = "Vocês duas não têm relação com este 'pecado'. Sou eu quem deve carregar isso sozinha."
10041060-31 = "Eu não concordei com nada disso. Se eu for embora, quem vai operar aquilo?"
10041060-32 = "Por isso, daqui em diante eu……"
10041060-33 = "Você vai sozinha? Até aquele lugar?"
10041060-37 = "Graças a você, consegui garantir a rota mínima. Não deve ser impossível."
10041060-38 = "Além disso, para entrar na Sala da Big Sister, minha autenticação biométrica é necessária. #nSe tentarem forçar a entrada, será um problema."
10041060-39 = "Ao usar minha própria autenticação, registros ficarão gravados, mas…… será que este é o momento para se preocupar com isso?"
10041060-44 = "Você pode acabar sendo considerada a culpada."
10041060-45 = "Sim, mas isso não é importante."
10041060-46 = "É importante, sim."
10041060-50 = "O mesmo vale para o caso do Clube de Engenharia e do Clube de Desenvolvimento de Jogos. #nVocê está em uma situação onde todos suspeitam de você."
10041060-51 = "……Mas este é o meu pecado."
10041060-52 = "Não posso permitir que outras pessoas corram mais riscos por minha causa."
10041060-57 = "Haha……!"
10041060-62 = "……?"
10041060-63 = "Estou decepcionado."
10041060-64 = "……Decepcionado?"
10041060-65 = "Exato. Pretende me deixar de fora de novo dizendo essas coisas?"
10041060-66 = "Eu até perdoo uma vez por você estar pensando em mim, mas……"
10041060-67 = "Não serei tão compreensivo na segunda vez."
10041060-68 = "Eu não tive essa intenção……."
10041060-73 = "Depois de nos usar até o limite, vai dizer que vai se sacrificar sozinha? #nÉ esse tipo de coisa que me irrita."
10041060-77 = "Ah……."
10041060-79 = "Parece que pensamos da mesma forma."
10041060-80 = "É. Depois de ser tratada assim, não tem como ser diferente."
10041060-85 = "O que quer dizer com isso?"
10041060-86 = "Serei direta."
10041060-92 = "Rio, eu não posso confiar em você."
10041060-96 = "O quê……!?"
10041060-97 = "Não pode confiar……?"
10041060-98 = "Não importa como você tente, não vai conseguir entrar lá sozinha."
10041060-99 = "Usar minha rota como referência? Acha que basta apenas decorar o caminho?"
10041060-100 = "Sendo sincera, a garota ali…… hum, como é mesmo."
10041060-101 = "É Seia Yurizono."
10041060-102 = "A Seia é muito mais confiável que você."
10041060-104 = "Isso, é……."
10041060-106 = "Estou dizendo isso por você."
10041060-107 = "Agora, você está se deixando levar pelas emoções e prestes a arruinar a operação. #nSe o objetivo é a infiltração, deveríamos ser nós a fazê-lo, não você."
10041060-108 = "Mesmo que aquela máquina seja sua criação, não deveria nos excluir. Isso não é irrelevante para a operação?"
10041060-109 = "É exatamente isso."
10041060-110 = "Eu cuido do ataque. E vou localizar a posição deles."
10041060-111 = "Desta vez, vou destruir aquela máquina bizarra."
10041060-112 = "Assim, tanto eu quanto a Seia..."
10041060-116 = "Você também vai se sentir mais aliviado... não é?"
10041060-121 = "……!"
10041060-122 = "Não há outro jeito. Se continuarmos assim, você não mudará nada mesmo depois que isso tudo acabar."
10041060-123 = "……Passei o dia conversando com você e cheguei a uma conclusão. Você é uma pessoa cansativa."
10041060-124 = "Eu também tenho uma personalidade bastante complicada... mas parece que você não tem comparação."
10041060-126 = "Você tem um bom olho, hein."
10041060-127 = "Vocês dois..."
10041060-128 = "Não temos tempo. Deixaremos os detalhes para depois."
10041060-129 = "Gostei, bem direto! Você sempre teve esse tipo de personalidade?"
10041060-130 = "Sinto muito por não atender às suas expectativas... mas minha personalidade é do tipo que deixa as pessoas ao redor ainda mais desconfortáveis."
10041060-131 = "……Se estiver curioso, posso demonstrar mais tarde."
10041060-132 = "Que piada engraçada! Se tivermos a chance, me mostre."
10041060-134 = "Não era para ser assim..."
10041060-139 = "Ei, o que você está fazendo?"
10041060-145 = "Você vai nos guiar, não vai?"
