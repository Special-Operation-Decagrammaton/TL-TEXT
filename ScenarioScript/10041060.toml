[translation]
10041060-1 = "第6話;ビッグシスタールーム"
10041060-7 = "ビッグシスターアルゴリズム……。"
10041060-9 = "……私の汚点よ。作ったことも、使ったことも。"
10041060-10 = "汚点……？"
10041060-11 = "お前の口からそんな言葉が出るとはな。"
10041060-12 = "事実だもの。効率ばかりを追っていた、当時の私は迷わなかった。"
10041060-13 = "……今なら、絶対にこんなもの作らないわ。"
10041060-14 = "そうまで言いながら……システムを使うつもりなのかい？#n……そもそも、使用可能な状態で放置されているのなら、それはそれで問題だと思うのだが。"
10041060-15 = "……ミレニアムを去る時に隔離したの。#n二度と使うことができないよう。"
10041060-16 = "でも今は他に方法がない。解決するにはこれを使うしか……"
10041060-17 = "これは……あくまで私の決定であり、私の責任よ。"
10041060-22 = "だから二人は気にしなくていい。#nなんなら帰ってもらっても構わないわ。"
10041060-27 = "……は？"
10041060-28 = "待て、帰れって何だよ？"
10041060-30 = "二人はこの「罪」と関係ない。私一人が背負うべきなのよ。"
10041060-31 = "そんなことは聞いてねえ。あたしが帰ったらアレは誰が使うんだよ？"
10041060-32 = "だから、ここからは私が……"
10041060-33 = "自分で行くのか？あの場所に？"
10041060-37 = "貴女のお陰で、最低限のルートは確保できたわ。不可能ではないはずよ。"
10041060-38 = "それにビッグシスタールームに入るには、私の生体認証が必要よ。#n無理やり突破しようとすれば、厄介なことになるわ。"
10041060-39 = "自分の認証を使う以上、記録は残るけれど……今はそれを懸念している場合かしら？"
10041060-44 = "君が犯人と思われかねない。"
10041060-45 = "ええ、でもそれは重要ではない。"
10041060-46 = "重要だろう。"
10041060-50 = "エンジニア部やゲーム開発部の件だってそうだ。#n君が怪しまれる状況となっている。"
10041060-51 = "……でもこれは私の罪だわ。"
10041060-52 = "これ以上他の人にリスクを負わせるわけにはいかないの。"
10041060-57 = "ハハッ……！"
10041060-62 = "……？"
10041060-63 = "ガッカリだ。"
10041060-64 = "……ガッカリ？"
10041060-65 = "そうだ。またそういって私を除け者にするつもりかい？"
10041060-66 = "私を思ってのことも一度までは許すが……"
10041060-67 = "二度目についてはその限りでは無いのだよ。"
10041060-68 = "私はそういうつもりじゃ……。"
10041060-73 = "散々こき使っておいて、じゃあ一人で犠牲になりますってか？#nそういうとこがムカつくって言ってんだよ。"
10041060-77 = "っ……。"
10041060-79 = "我々の考えは同じなようだ。"
10041060-80 = "ああ。こんな扱いをされちゃあな。"
10041060-85 = "どういうことかしら。"
10041060-86 = "率直に言う。"
10041060-92 = "リオ、君を信用することはできない。"
10041060-96 = "なっ……！？"
10041060-97 = "信用できない……？"
10041060-98 = "どうやったってお前には無理だろ、あそこに入るの。"
10041060-99 = "あたしのルートを参考にするだぁ？道だけ覚えればいいと思ってんのか？"
10041060-100 = "ぶっちゃけお前よりもこっちのお嬢ちゃん……えーっと。"
10041060-101 = "百合園セイアだ。"
10041060-102 = "セイアの方がよっぽど信用できるぞ。"
10041060-104 = "そ、れは……。"
10041060-106 = "君のために言う。"
10041060-107 = "今、君は感情に振り回され作戦を台無しにしようとしている。#n潜入が目的ならば、君ではなく私たちがやるべきだ。"
10041060-108 = "あの機械が君の作品とはいえ、私たちを外すべきではない。作戦とは無関係な事項だろう？"
10041060-109 = "そう言うこった。"
10041060-110 = "突撃はあたしが受け持つ。そんであいつらの位置を探る。"
10041060-111 = "今度こそ、あの気味わりぃ機械をぶっ潰してやるよ。"
10041060-112 = "そうすればあたしもセイアも……"
10041060-116 = "お前も気が楽になるはずだ……だろ？"
10041060-121 = "……！"
10041060-122 = "この方法しかない。このままだと、君は今回の件が終わっても何も変わらないだろう。"
10041060-123 = "……今日一日、君と話して分かったことがある。君は疲れる人だ。"
10041060-124 = "私も大概面倒な性格だが……どうやら君は私の比ではないようだね。"
10041060-126 = "見る目あるじゃねえか。"
10041060-127 = "二人とも……。"
10041060-128 = "時間がない。詳細は後にしよう。"
10041060-129 = "いいねぇ、さっぱりしてて！本当はこういう性格だったのか？"
10041060-130 = "期待に沿えなくて済まないが……もっと周りの居心地を悪くさせるような性格だよ。"
10041060-131 = "……気になるなら、後で披露しようか。"
10041060-132 = "面白い冗談だな！機会があったら見せてくれよ。"
10041060-134 = "こんなはずでは……。"
10041060-139 = "おい、何やってんだ。"
10041060-145 = "道案内、するんだろ？"
