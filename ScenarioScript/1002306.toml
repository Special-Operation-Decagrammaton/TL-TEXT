[translation]
1002306-1 = "Banho de areia"
1002306-3 = "O que você está fazendo?"
1002306-4 = "[s1] \"Como pode ver.\"\n[s2] \"Um banho de areia.\""
1002306-5 = "……Haa."
1002306-6 = "……Haa."
1002306-7 = "Você disse que estava deitado na areia, então achei que estivesse tentando olhar por baixo das saias das alunas que passavam, mas..."
1002306-8 = "Fiquei aliviada por ser apenas um banho de areia, mas também perdi o interesse."
1002306-9 = "[s3] \"O que você pensava de mim?\"\n[s4] \"Além disso, quase todo mundo está de roupa de banho, não tem como olhar por baixo de nada!\""
1002306-10 = "Bem, pensando bem, é verdade que a maioria das alunas está de roupa de banho."
1002306-11 = "Bem, pensando bem, é verdade que a maioria das alunas está de roupa de banho."
1002306-12 = "Mas, deixando isso de lado..."
1002306-13 = "Está tão quente e você se colocou em uma situação onde não consegue se mover dentro da areia..."
1002306-14 = "Será que o Sensei é um pervertido que gosta de sofrer?"
1002306-15 = "[s] \"Iori, por que não tenta também? Talvez você entenda como é bom depois de experimentar.\""
1002306-16 = "Nem pensar. Se eu cobrisse meu corpo inteiro com essa areia quente, acho que acabaria me queimando."
1002306-17 = "[s5] \"Surpreendentemente, não é tão quente assim.\"\n[s6] \"Pelo contrário, ficar aqui dentro é até mais fresco.\""
1002306-18 = "Sério...? Parece suspeito..."
1002306-19 = "Sério...? Parece suspeito..."
1002306-20 = "Mas, de fato, a expressão do Sensei agora não parece a de alguém que está sofrendo..."
1002306-21 = "Então, só um pouquinho..."
1002306-22 = "[s] \"Certo, então deite-se aqui.\""
1002306-28 = "[ns] Coloco areia aos poucos sobre o corpo de Iori."
1002306-30 = "Ah, que cócegas... Ué? Mas é verdade, não está tão quente quanto eu pensei."
1002306-31 = "Será porque a areia bloqueia a luz direta do sol? É verdade, na verdade está até um pouco fresco."
1002306-32 = "[s] \"Tirar uma soneca aqui é a melhor coisa que existe.\""
1002306-33 = "É tentador, mas não posso fazer isso. Se um membro do Comitê Disciplinar for vista tirando uma soneca na praia, que exemplo eu daria para as outras alunas...?"
1002306-34 = "Além disso, o calor já está drenando minhas energias e, ultimamente, tenho dormido pouco por causa do trabalho..."
1002306-35 = "Por isso, preciso sair logo..."
1002306-36 = "………"
1002306-38 = "Nn, ahhh... A-ah? Será que eu... dormi?"
1002306-39 = "Ah... a sensação da areia era tão boa que acabei cochilando..."
1002306-40 = "Preciso sair daqui antes que alguém me veja..."
1002306-45 = "Hmph, nnnn...! P-por quê!? Não consigo me mexer nem um pouco...!?"
1002306-46 = "E, aliás, sinto como se meu corpo estivesse sendo pressionado muito mais do que antes..."
1002306-52 = "O　Q　U　E　 É　 I　S　S　O　!　?"
1002306-54 = "[ns] \"Ah, acordou? Bom dia.\""
1002306-55 = "B-bom dia... não, Sensei! O que exatamente você construiu em cima do meu corpo!?"
1002306-56 = "[s7] \"Não é incrível? Me elogie, me elogie.\"\n[s8] \"Deu bastante trabalho.\""
1002306-57 = "Não é isso que eu estou perguntando! Que tipo de brincadeira indecente você fez enquanto eu dormia!"
1002306-58 = "Não é isso que eu estou perguntando! Que tipo de brincadeira indecente você fez enquanto eu dormia!"
1002306-60 = "Nn, guhh...! I-isso, é só areia, por que está tão duro...!?"
1002306-61 = "[s] \"Misturei um pouco de cimento para não quebrar facilmente.\""
1002306-62 = "O quê!? Cimento!? Isso não é nível de brincadeira, é!?"
1002306-63 = "Por que você faria algo assim...!"
1002306-64 = "[s] \"É que eu não queria que quebrasse depois de tanto esforço...\""
1002306-65 = "Sua motivação é de uma criança!? E por que você construiu isso em cima de mim!"
1002306-66 = "Droga...! Onde estão minhas granadas ou minha arma...!?"
1002306-67 = "[s] Tira uma foto de Iori com o celular."
1002306-74 = "O-o que você está fazendo! Pare com isso!"
1002306-76 = "Não tire fotos! Eu disse para não tirar!"
1002306-77 = "Ugh... Grrr, quando eu sair daqui, você vai ver só!? Não vou deixar barato, ouviu bem!!"
1002306-79 = "Depois de observar Iori se debatendo por um tempo, desmoronei a estátua de areia para ajudá-la a sair."
1002306-84 = "...Depois disso, levei um soco bem dado da Iori, quase pra valer."
