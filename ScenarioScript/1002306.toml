[translation]
1002306-1 = "砂風呂"
1002306-3 = "何をやってるんだ？"
1002306-4 = "[s1] \"見ての通り。\"\n[s2] \"砂風呂だよ。\""
1002306-5 = "……はあ。"
1002306-6 = "……はあ。"
1002306-7 = "先生が砂浜で横になってるって言うからきっと、通りすがりの生徒たちのスカートの中を覗こうとでもしてるんだろうな、って思ったら……。"
1002306-8 = "普通に砂風呂だったなんて、安心したけど拍子抜けした。"
1002306-9 = "[s3] \"私のことを何だと思ってたの？\"\n[s4] \"そもそも水着の子がほとんどだから、覗きようがない！\""
1002306-10 = "まあでも確かによく考えてみたら、ほとんどの生徒が水着姿だもんね。"
1002306-11 = "まあでも確かによく考えてみたら、ほとんどの生徒が水着姿だもんね。"
1002306-12 = "でも、それはそれとして……。"
1002306-13 = "こんなに暑いのに、自分から砂の中で身動きが取れない状態になって……"
1002306-14 = "やっぱり先生は苦しいのが好きなヘンタイなのか？"
1002306-15 = "[s] \"イオリもどう？一度やってみたら気持ちが分かるかもよ？\""
1002306-16 = "嫌だ。ただでさえ熱い砂で全身を覆われたりなんかしたら、火傷しそう。"
1002306-17 = "[s5] \"意外とそんなに熱くないよ。\"\n[s6] \"逆に、こうして中にいる方が熱くないよ。\""
1002306-18 = "ほんとか……？なんだか怪しい……。"
1002306-19 = "ほんとか……？なんだか怪しい……。"
1002306-20 = "でも確かに、今の先生は別に苦痛に耐えてる時の表情じゃないし……。"
1002306-21 = "じゃあ、少しだけ……。"
1002306-22 = "[s] \"うん、じゃあここで横になって。\""
1002306-28 = "[ns] イオリの身体の上に少しずつ砂をかける。"
1002306-30 = "なっ、なんかくすぐったい……あれ？でも確かに、思ったより熱くないな。"
1002306-31 = "砂があるせいで、太陽の直射日光が当たらないからか……確かに、むしろちょっと涼しいくらいかも。"
1002306-32 = "[s] \"そのまま昼寝したりすると最高なんだよね。\""
1002306-33 = "ちょっと魅力的だけど、流石にそれはダメだ。風紀委員が堂々と砂浜で昼寝なんかしてたら、他の生徒たちに示しがつかないだろ……？"
1002306-34 = "というかただでさえ熱くて体力が削られてるし、ここ最近遅くまでやることがあって寝不足だったし……。"
1002306-35 = "だから、そろそろ出ない、と……"
1002306-36 = "………"
1002306-38 = "んっ、くぁぁっ……あ、あれ？私、もしかして寝てた……？"
1002306-39 = "あー……つい砂の感触が気持ち良くって、うたた寝を……。"
1002306-40 = "誰かに見られる前に、早く出ないと……。"
1002306-45 = "ふっ、んんんっ……！な、何で！？びくともしない……！？"
1002306-46 = "っていうか何だか、さっきより明らかに身体が圧迫されてるような……。"
1002306-52 = "な　ん　だ　こ　れ　は　っ　！　？"
1002306-54 = "[ns] \"あっ、起きた？おはよう。\""
1002306-55 = "お、おはよ……じゃなくて先生！私の身体の上にいったい何を作ってるんだ！？"
1002306-56 = "[s7] \"すごくない？褒めて褒めて。\"\n[s8] \"結構大変だったよ。\""
1002306-57 = "そういうことを聞いてるんじゃない！人が寝てる間に、何ハレンチな悪戯をしてるんだ！"
1002306-58 = "そういうことを聞いてるんじゃない！人が寝てる間に、何ハレンチな悪戯をしてるんだ！"
1002306-60 = "んっ、くぅっ……！こ、これ、ただの砂なのに、なんでこんなに固く……！？"
1002306-61 = "[s] \"簡単に壊れないように、ちょっとセメントを混ぜたから。\""
1002306-62 = "はぁ！？セメント！？それ悪戯のレベルじゃないだろ！？"
1002306-63 = "どうしてそんなことを……！"
1002306-64 = "[s] \"せっかく作ったのに壊れたら嫌だなって……。\""
1002306-65 = "動機が子どもか！？っていうか、じゃあ何でそれを私の上に建てたんだ！"
1002306-66 = "くそっ……！どこかに手榴弾とか銃は……！？"
1002306-67 = "[s] スマホでイオリの写真を撮る。"
1002306-74 = "な、何をしてるんだ！やめろっ！"
1002306-76 = "撮るな！撮るなって！"
1002306-77 = "ううっ……もうっ、ここから抜け出したら覚えてろよ！？ただじゃおかないからな！！"
1002306-79 = "しばらくの間イオリがもがくのを眺めてから、砂の像を崩して助け出してあげた。"
1002306-84 = "……その後イオリに、かなり本気に近いグーで殴られた。"
