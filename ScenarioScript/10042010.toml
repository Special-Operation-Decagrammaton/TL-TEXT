[translation]
10042010-1 = "Episódio 1; Como um milagre"
10042010-2 = "Cozinha do café"
10042010-3 = "Hã...?"
10042010-4 = "Surpreendentemente, não parece ruim...?"
10042010-5 = "Não, pode ser apenas a aparência."
10042010-9 = "Vou provar..."
10042010-10 = "Oh, ficou muito bom. #nEstou com pressa, então vou levar!"
10042010-16 = "G-Gerente!? #nIsso é...!"
10042010-22 = "Finalmente chegou~ Estou morrendo de fome. #nItadakimasu!"
10042010-23 = "(N-Não...!)"
10042010-24 = "Hmm~♪ Como sempre, a panqueca daqui é deliciosa!"
10042010-25 = "Me dá uma mordida!"
10042010-26 = "Ei, isso não é uma mordida, não é!? #nIsso se chama metade, sabia!?"
10042010-27 = "Parecia tão gostoso que eu não resisti♪ #nDesculpa, desculpa."
10042010-28 = "Hã...?"
10042010-29 = "(Deliciosa...? A minha comida?)"
10042010-30 = "(Isso não é um sonho, é...?)"
10042010-34 = "Ai!"
10042010-35 = "(...É, é real?)"
10042010-36 = "Veio ver a reação dos clientes?"
10042010-37 = "Eu entendo. Ver alguém comendo a comida que você preparou com gosto faz a gente se sentir feliz também."
10042010-38 = "Eu queria que você ficasse observando com calma, mas chegaram pedidos extras. #nPode cuidar da cozinha para mim?"
10042010-39 = "Eh...?"
10042010-40 = "S-Sim! Farei o meu melhor!"
10042010-42 = "Tantos pedidos extras..."
10042010-43 = "N-Não é hora de ficar impressionada! #nPreciso me mexer logo!"
10042010-48 = "Panqueca pronta!"
10042010-57 = "Aqui, por favor, sirva!"
10042010-61 = "Obrigado, Juri! Continue assim!"
10042010-68 = "Mesa 1, por favor, sirva!"
10042010-77 = "Mesa 3, desculpe a demora!"
10042010-82 = "Hã...? Agora há pouco, parecia que tinha algo aqui...?"
10042010-83 = "I-Impressão minha, né...?"
10042010-84 = "Ainda assim... #nConseguir fazer uma comida de verdade... que felicidade!"
10042010-87 = "AAAAAAHHHHHH!?"
10042010-88 = "Eh?"
10042010-89 = "U-Um grito...?"
10042010-92 = "Q-Q-Que é isso!?"
10042010-93 = "Está se contorcendo...!"
10042010-97 = "Ugh, algo estranho grudou na minha roupa! #nQue nojo!"
10042010-98 = "T-Tenho que fugir logo!"
10042010-104 = "O que é aquilo!! #nIiiihhh!? N-Não chegue perto de mim!!"
10042010-110 = "S-Socorro! #nE-Eu nem sou gostosa, não me coma!"
10042010-111 = "Q-Que droga é essa!? V-Vai embora!"
10042010-112 = "E-Ei, espere!"
10042010-117 = "N-Não ataque os clientes!"
10042010-123 = "Uwaaaaah!?!?"
10042010-124 = "C-Cliente!?"
10042010-132 = "J-Juri!? Você está bem? Se machucou?"
10042010-133 = "O que diabos era aquilo...!?"
10042010-134 = "S-sim, está tudo bem. #nAquilo é... bem..."
10042010-141 = "Fugiu!"
10042010-142 = "O-o que eu faço! #nA reputação do café...!"
10042010-143 = "Antes da nossa reputação, o que diabos era aquilo...?"
10042010-147 = "...Um telefone?"
10042010-151 = "...Sensei!?"
10042010-156 = "A-alô...?"
10042010-157 = "[s] \"Bom dia, Juri. Como está o trabalho de meio período?\""
10042010-158 = "B-bem, é que..."
10042010-159 = "[s1] \"...Aconteceu alguma coisa?\"\n[s2] \"Se estiver ocupada, ligo de novo depois...\""
10042010-162 = "B-bem, é que...!"
10042010-169 = "AAAH!! #nAs panquecas estão se movendo!!!"
10042010-170 = "E-elas fugiram!?"
10042010-174 = "Juri!? #nQue grito foi esse...!?"
10042010-175 = "S-senpai!? #nVocê está com o sensei agora?"
10042010-176 = "Ah, sim... acabei de receber um contato do sensei..."
10042010-177 = "[s3] \"Já entendi a situação mais ou menos.\"\n[s4] \"De qualquer forma, estamos indo para aí!\""
10042010-180 = "M-mas, logo no seu dia de folga...!"
10042010-186 = "Está tudo bem, não precisa se preocupar."
10042010-187 = "Ajudar uma colega que está em apuros é o mínimo."
10042010-188 = "Obrigada por se preocupar comigo."
10042010-189 = "Mas agora, precisamos resolver essa situação antes de qualquer coisa."
10042010-190 = "S-sim..."
10042010-194 = "[ns] (Nessas horas...)"
10042010-196 = "Sala do Comitê Disciplinar da Academia Gehenna"
10042010-199 = "Hm?"
10042010-203 = "Espere, esse número é..."
10042010-207 = "Sensei?"
10042010-208 = "[s] \"Iori, você está livre agora?\""
10042010-209 = "...Por que a ligação repentina?"
10042010-210 = "[s5] \"Preciso da sua ajuda, Iori.\"\n[s6] \"Pode vir aqui um instante?\""
10042010-213 = "O que foi de repente...? #nAlgum problema aconteceu?"
10042010-214 = "[s7] \"Como esperado da Iori! É bom falar com alguém que entende rápido!\"\n[s8] \"Pode-se dizer que sim.\""
10042010-217 = "Ah, entendi..."
10042010-222 = "...É do sensei?"
10042010-223 = "Sim. Ele pediu para eu ir até lá."
10042010-224 = "Será que aconteceu alguma coisa...?"
10042010-225 = "Quem sabe? Não sei os detalhes, mas deve ser alguma bobagem de qualquer jeito."
10042010-226 = "Aqui em Gehenna, a menos que um monstro apareça, nada é tão grave assim."
10042010-227 = "Verdade. De qualquer forma, vamos pensar melhor depois de chegar ao local."
10042010-232 = "Sim, vamos!"
