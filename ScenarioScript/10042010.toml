10042010-209 = "……急にどうしたんだ？"
10042010-210 = "[s5] \"イオリに手伝ってもらいたくて。\"\n[s6] \"ちょっとこっちに来てくれる？\""
10042010-213 = "急に何……？#n面倒事でも起きたの？"
10042010-214 = "[s7] \"流石イオリ！話が早くて助かるよ！\"\n[s8] \"そうとも言えるかな。\""
10042010-217 = "はあ、分かった……。"
10042010-222 = "……先生からですか？"
