[translation]
10042010-1 = "第1話;奇跡のような"
10042010-2 = "カフェのキッチン"
10042010-3 = "あれ……？"
10042010-4 = "意外と、悪くないような……？"
10042010-5 = "いえ、見た目だけの可能性もあります。"
10042010-9 = "味見を……。"
10042010-10 = "お、良くできてるね。#n急いでるから持ってくよ！"
10042010-16 = "て、店長！？#nそれは……！"
10042010-22 = "やっときたよ～お腹ぺこぺこ。#nいただきまーす！"
10042010-23 = "（だ、ダメ……！）"
10042010-24 = "ん～♪やっぱ、ここのパンケーキ美味しい！"
10042010-25 = "一口ちょうだい！"
10042010-26 = "ちょっ、一口じゃなくない！？#nそれ半分っていうんだけど！？"
10042010-27 = "美味しそうだったから、つい♪#nごめんごめん。"
10042010-28 = "あれ……？"
10042010-29 = "（美味しい……？私の料理が？）"
10042010-30 = "（これは、夢じゃないですよね……？）"
10042010-34 = "痛っ！"
10042010-35 = "（……げ、現実？）"
10042010-36 = "お客さんの反応を見にきたのかい？"
10042010-37 = "分かるよ。自分が作った料理を美味しそうに食べてくれる姿を見てると、こっちまで幸せをもらえるからね。"
10042010-38 = "ゆっくり見ていってと言いたいところだけど、追加注文が届いてるんだ。#nキッチンの方をお願いしてもいいかな？"
10042010-39 = "え……？"
10042010-40 = "は、はい！頑張ります！"
10042010-42 = "追加注文がこんなに……。"
10042010-43 = "か、感心してる場合じゃありません！#n早く手を動かさないと！"
10042010-48 = "パンケーキ、上がりました！"
10042010-57 = "こちら、提供お願いします！"
10042010-61 = "ありがとう、ジュリさん！このまま頼むよ！"
10042010-68 = "1番テーブルさん、提供お願いします！"
10042010-77 = "3番テーブルさん、お待たせしました！"
10042010-82 = "あれ……？今、何かいたような……？"
10042010-83 = "き、気のせいですよね……？"
10042010-84 = "それにしても……#nちゃんとした料理が作れるなんて……幸せです！"
10042010-87 = "きゃあああぁぁぁぁっ！？"
10042010-88 = "え？"
10042010-89 = "ひ、悲鳴……？"
10042010-92 = "な、な、なにこれ！？"
10042010-93 = "くねくね動いてる……！"
10042010-97 = "うっ、服に変なのついちゃった！#n気持ち悪っ！"
10042010-98 = "は、早く逃げなきゃ！"
10042010-104 = "なにあれ！！#nひいぃぃっ！？こ、こっち来ないで！！"
10042010-110 = "た、助けてぇっ！#nわ、私なんか食べても、美味しくないんだからっ！"
10042010-111 = "な、なんだよこいつ！あ、あっち行けっ！"
10042010-112 = "ちょ、ちょっと！"
10042010-117 = "お、お客様を襲っちゃダメです！"
10042010-123 = "うわあぁっ！？！？"
10042010-124 = "お、お客様！？"
10042010-132 = "じゅ、ジュリさん！？大丈夫？怪我は？"
10042010-133 = "アレは一体なんなんだ……！？"
10042010-134 = "は、はい、大丈夫です。#nあれは……その――"
10042010-141 = "逃げた！"
