10042010-143 = "うちの評判以前に、一体アレはなんなんだ……？"
10042010-147 = "……電話？"
10042010-151 = "……先生！？"
10042010-156 = "も、もしもし……？"
10042010-157 = "[s] \"おはよう、ジュリ。バイトの調子はどう？\""
10042010-158 = "そ、それが……。"
10042010-159 = "[s1] \"……何かあったの？\"\n[s2] \"忙しいならまた掛け直すね……。\""
10042010-162 = "え、えっとですね……！"
10042010-169 = "キャーッ！！#nパンケーキが動いてる！！！"
10042010-170 = "に、逃げた！？"
10042010-174 = "ジュリ！？#n今の声は……！？"
10042010-175 = "せ、先輩！？#n今、先生と一緒なんですか？"
10042010-176 = "あ、うん……ちょうど先生から連絡をもらって……。"
10042010-177 = "[s3] \"状況は大体分かった。\"\n[s4] \"とりあえず、私たちもそっちに向かうね！\""
10042010-180 = "で、でも、せっかくのお休みの日に……！"
