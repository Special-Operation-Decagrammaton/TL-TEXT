10042010-187 = "困ってる後輩を助けるのは当然だもの。"
10042010-188 = "気を遣ってくれてありがとうね。"
10042010-189 = "でも、今はそれよりも事態を収拾しなきゃ。"
10042010-190 = "は、はい……。"
