[translation]
104030-1 = "Episódio 3; Resistência (2)"

104030-2 = "Suspiro…suspiro…."

104030-3 = "...Você não está desistindo."

104030-4 = "Sim."

104030-5 = "……sim."

104030-6 = "[s] \"Em resposta a ``O que devo fazer?''\""

104030-11 = "[ns1] \"Tenho certeza que Shiroko sabe melhor.\"\n[ns2] \"Todos trabalharemos juntos para impedir isso - como sempre.\""

104030-14 = "[ns] \"Mesmo que todos estejam trabalhando duro, não podemos desperdiçar isso.\""

104030-16 = "[ns] \"Vamos destruir este lugar e retornar à superfície.\""

104030-17 = "……Sim. Os professores sempre foram assim."

104030-18 = "Mesmo em tempos de necessidade desesperada, mesmo quando você sabe que é impossível..."

104030-28 = "Confirmando o processo de manifestação do Sanctum [ruby=Encarnação]. Ativa temporariamente o Santuário congelado."

104030-34 = "Isso irá acelerar o cálculo."

104030-35 = "[ns] \"…………!?\""

104030-39 = "O que está acontecendo! ? #nTempo restante...!"

104030-40 = "O que diabos está acontecendo desta vez? ?"

104030-42 = "O tempo suprimível está diminuindo rapidamente! #nNão aguento mais minhas inibições!"

104030-43 = "Uau, por que está diminuindo tão rapidamente? ? #nNesse ritmo, o tempo acabará antes que o "terminal" seja destruído...!"

104030-44 = "O que diabos está acontecendo...?"

104030-47 = "――Algo está interferindo na supressão... Será que o inimigo adquiriu um novo meio de cálculo...?"

104030-49 = "--Sanctum está se manifestando na terra! !"

104030-53 = "T-no chão! ? Onde! ! ?"

104030-54 = "Atualmente estou confirmando... Porém, os seis santuários que foram planejados..."

104030-55 = "O inimigo está escondendo isso de forma inteligente...#nProcure o local onde há interferência de comunicação não natural! !"

104030-56 = "Todos os Kivotos? #nNo estado hackeado, como esperado..."

104030-57 = "...! !"

104030-63 = "……."

104030-64 = "Chefe Himari, descobrimos um novo "santuário" durante a nossa busca."

104030-65 = "Isso nunca foi observado antes. Eu me pergunto se isso se manifestará. #nÉ necessária uma resposta rápida."

104030-66 = "Envie as coordenadas――"

104030-70 = "...Comunicação cortada. É a influência do Sanctum?"

104030-82 = "A manifestação já começou...?"

104030-88 = "……."

104030-89 = "Se este é o trunfo do inimigo...devemos parar a sua manifestação imediatamente..."

104030-90 = "Porém, se eu desistir..."

104030-94 = "……パワードスーツシステム「アビ・エシュフ」へ移行します。"

104030-99 = "... Vou parar você aqui."

104030-100 = "Diretora Himari, professores, todos... até lá, por favor...! !"

104030-106 = "--A velocidade de redução do tempo de supressão voltou ao normal!"

104030-107 = "O que...! ? Você está dizendo que Sanctum é instável? #nem--"

104030-108 = "O que diabos... Não há nenhuma mudança específica nos dados. Mesmo sendo #n, por que...?"

104030-112 = "Esse sinal...! ?"

104030-113 = "--Conecte-se com [ruby=Abi-Eshuh]"Abi-Eshuh"[/ruby]! !"

104030-119 = "... Toki! !"

104030-120 = "Que bom que você conseguiu conectá-lo com "armado"."

104030-121 = "E Toki...? !"

104030-122 = "...Já faz muito tempo, Rio-sama. Estou feliz que você esteja seguro."

104030-133 = "Oh! Por favor, recue, Toki! ! #nSó você tem tantos oponentes――"

104030-134 = "Sim... enviarei uma equipe de suporte imediatamente. Retire-se temporariamente!"

104030-139 = "--Isso não é possível."

104030-143 = "Este é um local remoto do Millennium Borough. #nMesmo a unidade mais próxima demorará para chegar."

104030-144 = "Enquanto eu ganho tempo... por favor, pare este Santuário...!"

104030-153 = "...! !"

104030-154 = "Toki! !"

104030-159 = "Grupo de pesquisa gourmet! Por favor, relate a situação! !"

104030-164 = "Uhhhh! !"

104030-165 = "Uau! ! Incrível!"

104030-166 = "Estamos indo para lá em alta velocidade! !"

104030-167 = "No entanto, eu estava em apuros porque estava sendo perseguido por mais inimigos do que esperava ~★"

104030-169 = "Fuuka-san, decidiremos na próxima esquina!"

104030-170 = "Eu entendo! ! Isso é tudo que posso pagar!"

104030-171 = "Fuuka-san, na frente! ! É perigoso! !"

104030-176 = "Uau! ?"

104030-177 = "Oh não! ! !"

104030-178 = "Ah! !"

104030-179 = "Ei, espere! #nKyaaa! ?"

104030-185 = "professor……"

104030-186 = "[s] \"Sim, vamos lutar aqui. Vamos superar isso juntos com todos.""

104030-190 = "……Sim."

