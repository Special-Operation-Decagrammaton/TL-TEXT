[translation]
104030-1 = "Episódio 3; Resistência (2)"
104030-2 = "Haa……haa……."
104030-3 = "……Você não vai desistir, né."
104030-4 = "Uhum."
104030-5 = "……Entendi."
104030-6 = "[s] \"Aquela sua pergunta sobre 'o que eu vou fazer'... aqui tá a minha resposta――\""
104030-11 = "[ns1] \"Acho que você, mais do que ninguém, sabe bem a resposta, Shiroko.\"\n[ns2] \"Nós vamos juntar nossas forças e parar isso――como a gente sempre fez.\""
104030-14 = "[ns] \"Todo mundo tá dando o sangue lá fora, não posso deixar o esforço delas ser em vão.\""
104030-16 = "[ns] \"Nós vamos destruir esse lugar e voltar pra superfície.\""
104030-17 = "……Uhum. Você sempre foi assim, Sensei."
104030-18 = "Mesmo nas situações mais desesperadoras, mesmo sabendo que era impossível――"
104030-28 = "Confirmando o processo de manifestação do Sanctum. Reativando temporariamente o Sanctum em estado de congelamento."
104030-34 = "Acelerando o processamento a partir de agora."
104030-35 = "[ns] \"…………!?\""
104030-39 = "Q-O que tá acontecendo!?#nO tempo restante tá...!"
104030-40 = "O-O que foi dessa vez!?"
104030-42 = "O tempo de supressão tá diminuindo muito rápido!#nNão vou conseguir segurar por muito mais tempo!"
104030-43 = "Ué, por que tá diminuindo tão rápido assim!?#nDesse jeito, o tempo vai acabar antes da gente conseguir destruir o 'terminal'...!"
104030-44 = "O que diabos tá acontecendo...?"
104030-47 = "――Tem alguma coisa interferindo na supressão... Não me diga que o inimigo conseguiu um novo meio de processamento...?"
104030-49 = "――Um Sanctum acabou de se manifestar na superfície!!"
104030-53 = "N-Na superfície!? Onde!!?"
104030-54 = "T-Tô checando... Mas não bate com nenhum dos 6 Sanctums que a gente já esperava――"
104030-55 = "O inimigo tá escondendo isso muito bem...#nProcurem algum lugar com uma interferência de comunicação que não pareça natural!!"
104030-56 = "Em toda Kivotos?#nMas a gente tá hackeada, isso é meio――"
104030-57 = "……!!"
104030-63 = "……。"
104030-64 = "Diretora Himari, encontrei um novo 'Sanctum' durante a busca."
104030-65 = "É algo que nunca foi detectado antes. Se continuar assim, ele vai acabar se manifestando.#nPrecisamos lidar com isso rápido."
104030-66 = "Enviando as coordenadas――"
104030-70 = "……Comunicação cortada. Deve ser interferência do Sanctum."
104030-82 = "Será que a manifestação já começou...?"
104030-88 = "……。"
104030-89 = "Se esse for o trunfo do inimigo... tenho que impedir a manifestação agora mesmo..."
104030-90 = "Mas, se eu recuar agora――"
104030-94 = "……Iniciando o sistema da armadura de combate 'Abi-Eshuh'."
104030-99 = "……Eu vou segurar as pontas por aqui."
104030-100 = "Diretora Himari, Sensei, pessoal... Por favor, deem um jeito até lá...!!"
104030-106 = "――A velocidade de redução do tempo de supressão voltou ao normal!"
104030-107 = "Hã...!? Será que aquele Sanctum tá num estado instável?#nOu talvez――"
104030-108 = "O que diabos tá acontecendo... Nos dados, não tem nenhuma mudança aparente.#nEntão por que..."
104030-112 = "Aquele sinal é...!?"
104030-113 = "――Vou conectar com a 'Abi-Eshuh'!!"
104030-119 = "……Toki!!"
104030-120 = "Então você conseguiu se conectar com a 'Armadura', que bom."
104030-121 = "T-Toki...?!"
104030-122 = "……Quanto tempo, Rio-sama. Fico feliz que esteja bem."
104030-133 = "Tsc! Recua daí agora, Toki!!#nVocê não vai aguentar sozinha contra tantos inimigos assim――"
104030-134 = "Isso... vou mandar uma equipe de reforço agora mesmo. Bate em retirada por enquanto!"
104030-139 = "――Eu não posso fazer isso."
104030-143 = "Este lugar fica bem longe do distrito da Millennium.#nAté mesmo a equipe mais próxima ia demorar um bom tempo pra chegar."
104030-144 = "Enquanto eu ganho tempo... por favor, deem um jeito de impedir a manifestação desse Sanctum...!"
104030-153 = "……!!"
104030-154 = "Toki!!"
104030-159 = "Sociedade de Pesquisa Gourmet! Por favor, me passem o relatório da situação!!"
104030-164 = "Eita pega!!"
104030-165 = "Uau~~!! Que incrível!"
104030-166 = "Nós estamos a caminho na velocidade máxima!!"
104030-167 = "Mas, a gente tá sendo perseguida por muito mais inimigos do que imaginávamos, então digamos que estamos numa baita enrascada~★"
104030-169 = "Fuuka-san, vamos virar com tudo na próxima curva!"
104030-170 = "Já entendi!! Tirar uma curvinha dessas de letra é moleza!"
104030-171 = "Fuuka-san, na frente!! Cuidado!!"
104030-176 = "Uwaaaahhhhhh!?"
104030-177 = "Nãoooooo!!!"
104030-178 = "Aaaah~~!!"
104030-179 = "E-Espera aí!#nKyaaaah!?"
104030-185 = "Sensei..."
104030-186 = "[s] \"Sim, nós vamos lutar. Vamos superar isso junto com todo mundo.\""
104030-190 = "……Uhum."