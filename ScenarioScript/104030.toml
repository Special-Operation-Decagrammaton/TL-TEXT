[translation]
104030-1 = "第3話;抵抗（２）"
104030-2 = "はぁ……はぁ……。"
104030-3 = "……諦めないんだね。"
104030-4 = "うん。"
104030-5 = "……そう。"
104030-6 = "[s] \"「どうする？」に対しての返事だけど――\""
104030-11 = "[ns1] \"たぶん、シロコならよく知ってると思う。\"\n[ns2] \"みんなで力を合わせて止めるよ――いつもみたいに。\""
104030-14 = "[ns] \"みんなが頑張っているのに、無駄になんかできない。\""
104030-16 = "[ns] \"私たちはここを破壊して、地上に戻る。\""
104030-17 = "……うん。先生はこれまでもそうだった。"
104030-18 = "絶体絶命の時でも、不可能だと分かっていても――"
104030-28 = "サンクトゥム[ruby=インカーネーション]の顕現プ[/ruby]ロセスを確認中。凍結状態のサンクトゥムを一次的に活性化。"
104030-34 = "これより、演算を加速します。"
104030-35 = "[ns] \"…………！？\""
104030-39 = "なっなにごと！？#n残り時間が……！"
104030-40 = "こ、今度はいったい何なの！？"
104030-42 = "抑制可能時間が急速に減っています！#nこれ以上、抑制を維持できません！"
104030-43 = "うわっ、なんでこんな速さで減るの！？#nこのままじゃ「端末」を壊す前に時間切れになっちゃう……！"
104030-44 = "いったい、何が起きてるの……？"
104030-47 = "――何かが抑制を邪魔してる……まさか、敵が新しい演算手段を獲得した……？"
104030-49 = "――地上にサンクトゥムが顕現しています！！"
104030-53 = "ち、地上！？どこに！！？"
104030-54 = "か、確認中です……ですが、予定されていた6つのサンクトゥムには――"
104030-55 = "敵が巧妙に隠しているのね……#n不自然な通信妨害がある場所を探して！！"
104030-56 = "キヴォトス全域をですか？#nハッキングされた状態では、流石に――"
104030-57 = "……！！"
104030-63 = "……。"
104030-64 = "ヒマリ部長、捜索中に新しい「サンクトゥム」を発見しました。"
104030-65 = "今までに観測されたことのないものです。このままでは顕現してしまうかと。#n迅速な対応が必要です。"
104030-66 = "座標を送信し――"
104030-70 = "……通信切断。サンクトゥムの影響でしょうか。"
104030-82 = "すでに、顕現が始まったのでしょうか……？"
104030-88 = "……。"
104030-89 = "これが敵の切り札なのであれば……すぐにでも顕現を阻止しなくては……"
104030-90 = "ですが、私が撤退したら――"
104030-94 = "……パワードスーツシステム「アビ・エシュフ」へ移行します。"
104030-99 = "……ここは、私が食い止めます。"
104030-100 = "ヒマリ部長、先生、皆さん……それまでに、どうか……！！"
104030-106 = "――抑制時間の減少速度が通常に戻りました！"
104030-107 = "なっ……！？あのサンクトゥムは不安定な状況だとでもいうの？#nそれとも――"
104030-108 = "一体、何が……データ上、特に変化はありません。#nだというのに、どうして……。"
104030-112 = "あの信号は……！？"
104030-113 = "――[ruby=Abi-Eshuh]「アビ・エシュフ」[/ruby]と繋ぎます！！"
104030-119 = "……トキ！！"
104030-120 = "「武装」と繋ぐ事ができましたか、良かった。"
104030-121 = "と、トキ……？！"
104030-122 = "……ご無沙汰しております、リオ様。ご無事で何よりです。"
104030-133 = "ッ！撤退してください、トキ！！#nあなた一人でその数の相手は――"
104030-134 = "ええ……すぐ支援部隊を送ります。一時退却なさい！"
104030-139 = "――それはできません。"
104030-143 = "ここはミレニアム自治区から離れた場所です。#n一番近い部隊でも、到着までに時間を要するでしょう。"
104030-144 = "私が時間を稼ぐ間……どうか、このサンクトゥムの阻止を……！"
104030-153 = "……！！"
104030-154 = "トキ！！"
104030-159 = "美食研究会！状況報告をお願いします！！"
104030-164 = "うっひゃああ！！"
104030-165 = "わぁ～～！！すっご～い！"
104030-166 = "最高速度で向かってる真っ最中よ！！"
104030-167 = "ですが、思っていた以上にたくさんの敵に追いかけられててピンチと言いますか～★"
104030-169 = "フウカさん、次のコーナーで決めますよ！"
104030-170 = "分かったわよ！！あれくらいなら全然余裕！"
104030-171 = "フウカさん、前！！危ないです！！"
104030-176 = "うわぁぁああぁぁあ！？"
104030-177 = "いやぁあーーー！！！"
104030-178 = "あぁ～～！！"
104030-179 = "ちょ、ちょっと！#nキャーーッ！？"
104030-185 = "先生……"
104030-186 = "[s] \"うん、ここは戦うよ。みんなと一緒に乗り越えよう。\""
104030-190 = "……うん。"
