[translation]
13140-1 = "Episódio 14; Comitê de Contramedidas"
13140-9 = "……。"
13140-10 = "Guh...……。"
13140-21 = "Ugh, ugh……。"
13140-27 = "Shi, Shiroko-senpai!"
13140-28 = "Você está bem!?"
13140-29 = "Eu não sabia que ela era tão forte……."
13140-34 = "……Como esperado, a Shiroko-chan é forte. #nImagino que um dia ela vai acabar me superando."
13140-39 = "Haah, haah……。"
13140-40 = "……Mas esse dia não é hoje."
13140-41 = "Hoshino-senpai……."
13140-42 = "Foi a Nonomi-chan quem me salvou naquela época, quando o mundo inteiro parecia ser meu inimigo."
13140-43 = "Se eu não tivesse conhecido a Nonomi-chan, eu não estaria aqui hoje."
13140-44 = "……。"
13140-45 = "Por isso, agora é a minha vez de salvar vocês."
13140-46 = "Não posso deixar a Nonomi-chan se tornar uma agressora."
13140-47 = "Não vou deixar que o tempo que passamos juntas seja apagado."
13140-48 = "……。"
13140-49 = "……Está tudo bem, confie na sua senpai."
13140-50 = "……。"
13140-56 = "Acho que deve haver um jeito…… com certeza."
13140-57 = "O Sensei deve vir nos ajudar."
13140-58 = "……É verdade, se o Sensei estivesse aqui, a situação poderia ser diferente."
13140-59 = "Mas o Sensei não pode vir. #nEle está no hospital."
13140-60 = "……。"
13140-61 = "A existência do canhão ferroviário, que nega os ideais da Yume-senpai……."
13140-62 = "A semente do conflito que o fundo de investimento privado está tentando plantar……."
13140-63 = "Se rastrearmos a origem, tudo leva ao Conselho Estudantil de Abydos."
13140-64 = "Não sei por que a senpai fez um contrato como esse."
13140-65 = "Porque eu não estava ao lado dela naquela época……."
13140-66 = "……Mas, se a Yume-senpai soubesse da existência do canhão ferroviário, #nela com certeza tentaria parar o plano."
13140-67 = "É por isso que eu preciso ir."
13140-68 = "O início de tudo está no contrato que o Conselho Estudantil de Abydos assinou."
13140-69 = "O Comitê de Contramedidas não tem nada a ver com isso."
13140-70 = "Eu mesma vou dar um fim a esse problema."
13140-75 = "……Não vá, senpai."
13140-76 = "Eu…… não conheço a pessoa que era a presidente do conselho estudantil."
13140-77 = "Por isso, não consigo entender os sentimentos que a senpai tinha quando estava no Conselho Estudantil de Abydos."
13140-78 = "Eu só tenho as memórias de quando entrei para o Comitê de Contramedidas……."
13140-79 = "As lembranças que criei no Comitê de Contramedidas são o meu mundo."
13140-84 = "Então, por que você diz algo tão triste……?"
13140-85 = "Shiroko-chan……."
13140-86 = "A Hoshino-senpai também faz parte de todos nós, não faz?"
13140-91 = "……Desculpe, Shiroko-chan. #nMesmo assim, eu preciso ir."
13140-93 = "Não me faça rir!!!"
13140-104 = "……Ou seja, você está nos deixando para trás, não é?"
13140-113 = "Então, não é a mesma coisa de antes……!!"
13140-116 = "Desde quando você tem tantas unidades da Amagumo……."
13140-119 = "Você vai agir da mesma forma que naquela época!? #nHoshino-senpai, você não aprende com os erros!?"
13140-120 = "Graças ao Sensei, conseguimos ficar juntas assim!"
13140-123 = "……Desculpe,"
13140-124 = "Ayane."
13140-128 = "Desta vez, eu não vou ceder."
13140-132 = "……Já que a veterana Hoshino é tão teimosa, vou fazê-la entender à força!"
13140-138 = "Prepare-se, veterana!!"
13140-140 = "Próximo episódio: As ordens da vice-presidente do conselho estudantil"
