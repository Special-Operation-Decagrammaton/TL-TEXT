[translation]
13140-1 = "第14話;[ruby=みんな]対策委員会[/ruby]"
13140-9 = "……。"
13140-10 = "げほっ……。"
13140-21 = "くっ、うぅ……。"
13140-27 = "し、シロコ先輩！"
13140-28 = "大丈夫！？"
13140-29 = "こんなに強かったなんて……。"
13140-34 = "……やっぱり、シロコちゃんは強いね。#nいつか追い越されちゃうんだろうなぁ。"
13140-39 = "はあっ、はぁ……。 "
13140-40 = "……でも、その[ruby=・   ・   ・]いつか[/ruby]は今じゃない。"
13140-41 = "ホシノ、先輩……。"
13140-42 = "世界のすべてが敵に見えてた、あの頃の私を救ってくれたのは、ノノミちゃんだった。"
13140-43 = "もしノノミちゃんに会えてなかったら、私に「今」はない。"
13140-44 = "……。"
13140-45 = "だから、今度は私が救う番。"
13140-46 = "ノノミちゃんを加害者にさせちゃいけない。"
13140-47 = "みんなで過ごした時間を、なかったことにはさせない。"
13140-48 = "……。"
13140-49 = "……大丈夫、おじさんを信じてよ。"
13140-50 = "……。"
13140-56 = "何か、方法ならあると思う……きっと。"
13140-57 = "先生が来てくれるはずだから。"
13140-58 = "……たしかに、先生が一緒にいれば状況は違ったかもね。"
13140-59 = "でも、先生は来られない。#n病院にいるから。"
13140-60 = "……。"
13140-61 = "ユメ先輩の理想を否定する列車砲の存在も……。"
13140-62 = "私募ファンドが起こそうとしている争いの火種も……。"
13140-63 = "元を辿れば、アビドス生徒会に行き着く。"
13140-64 = "どうして先輩が、こんな契約をしたのかは分からない。"
13140-65 = "その時、私はそばにいなかったから……。"
13140-66 = "……でも、もしユメ先輩が列車砲の存在を知ったら、#n必ず計画を止めに行く。"
13140-67 = "だから、私は行かなくちゃいけないんだ。"
13140-68 = "事の始まりは、アビドス生徒会が結んだ契約にあるよ。"
13140-69 = "[ruby=みんな]対策委員会[/ruby]は、関係ない。"
13140-70 = "この問題は、私が一人で終わらせる。"
13140-75 = "……行かないで、先輩。"
13140-76 = "私は……生徒会長がどんな人か知らない。"
13140-77 = "だから、先輩がアビドス生徒会で過ごしてた頃の気持ちは、#n分かってあげられない。"
13140-78 = "私には、対策委員会に来てからの記憶しかないから……。"
13140-79 = "対策委員会で過ごした思い出が、私にとっての世界なんだよ。"
13140-84 = "なのに、どうしてそんな寂しいこと言うの……？"
13140-85 = "シロコちゃん……。"
13140-86 = "ホシノ先輩も、[ruby=・   ・   ・]みんな[/ruby]でしょ？"
13140-91 = "……ごめんね、シロコちゃん。#nそれでも行かなきゃいけないんだ。"
13140-93 = "笑わせないでください！！！"
13140-104 = "……つまり、私たちを置いていくってことですよね？"
13140-113 = "それでは、前と変わらないじゃないですか……！！"
13140-116 = "いつの間に、雨雲号を何台も……。"
13140-119 = "またあの時と同じ行動を取るんですか！？#nホシノ先輩には学習能力がないんですか！？"
13140-120 = "先生のおかげで、こうして一緒にいられるようになったのに！"
13140-123 = "……ごめんね、"
13140-124 = "アヤネちゃん。"
13140-128 = "これだけは譲れないよ。"
13140-132 = "……分からず屋のホシノ先輩には、力尽くで理解してもらいます！"
13140-138 = "覚悟して、先輩！！"
13140-140 = "次回;副生徒会長の命令"
