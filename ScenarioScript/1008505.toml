[translation]
1008505-1 = "世界一大きいサーバー"
1008505-2 = "ヴェリタス・休憩室"
1008505-3 = "（時は遡り――昨晩ヴェリタスの部室で、ハレがサーバーのメンテナンスをしていると……）"
1008505-9 = "負荷は問題無し、復旧プロセスもちゃんと動いてる……"
1008505-10 = "アプリケーションのログにも異常は無いし、先輩に報告しておこうかな。"
1008505-11 = "えっと、メールクライアントは……"
1008505-16 = "……メール？メンテナンス中なのに、どうやって……。"
1008505-22 = "……「挑戦状」？"
1008505-28 = "[ns1] \"メンテナンス中に届くはずのないメールが来て……\"\n[ns2] \"それが匿名の「挑戦状」だった……？\""
1008505-31 = "そう。差出人は不明、内容も変な感じで……。"
1008505-32 = "件名にはただ、「挑戦状」って。"
1008505-33 = "[s] \"誰かの悪戯とか……？\""
1008505-34 = "いつもなら、私もそう思う。でも、メールが届いたのはメンテナンスの最中だったから……。"
1008505-35 = "調べたけど、サーバーを経由した痕跡も無し。"
1008505-36 = "つまり差出人は、私のPCをハッキングしたんだよ……。"
1008505-37 = "ここまで大胆な手法だと、ちょっと頭に来ちゃうね。"
1008505-38 = "[s3] \"ヴェリタスのPCを、リアルタイムでハッキングって……\"\n[s4] \"普通に考えて、信じられないような腕前だね。\""
1008505-41 = "うん、そんな人はキヴォトス全土を見てもそういない……。"
1008505-42 = "とにかく、このままスルーはできないんだ。ハッカーのプライドに賭けて。"
1008505-43 = "[s] \"……そういえば、メールの内容には何て？\""
1008505-44 = "それが、暗号化された座標と一緒に……"
1008505-45 = "「キヴォトスで最も多くの情報を持つサーバーが此処に」……ってメッセージが。"
1008505-46 = "流石に冗談だと思うけど……"
1008505-47 = "今はこの座標しか情報が無いの。"
1008505-48 = "[s] \"じゃあ、その場所まで行ってみようか。\""
1008505-49 = "あっ……この座標なんだけど、ちょっと問題があって……。"
1008505-50 = "その……"
1008505-52 = "調べたところ、山の中だったんだけど……。"
1008505-53 = "[s5] \"山の奥深くだったり？\"\n[s6] \"すごく高い山だったり？\""
1008505-54 = "その……いざ登ってみて何も無かったら、無駄足っていうか……。"
1008505-55 = "ううん、普通の人なら全然登れる距離と標高なんだけど……"
1008505-56 = "その……いざ登ってみて何も無かったら、無駄足っていうか……。"
1008505-57 = "先生も知っての通り、私は野外活動に向いてないし……。"
1008505-58 = "もしこのハッカーがそこまで見越して、私にまた無駄足を踏ませようとしてたら……みたいな？"
1008505-59 = "うーん、何か山に登らず済む方法は……。"
1008505-60 = "バッテリー搭載のドローンを大量に飛ばすとか、人工衛星のハッキングとか？"
1008505-64 = "[ns] \"そこまでするくらいなら、一緒に山まで行かない？\""
1008505-65 = "それ以外の方法を求めて先生を呼んだのに……。"
1008505-66 = "……まあでも仕方ないね。それに、先生が一緒なら。"
1008505-67 = "……とりあえず、着替えてこようかな。"
1008505-73 = "（準備を済ませたハレと一緒に、指定された場所へと向かった）"
1008505-78 = "はぁ、はぁ……はぁ、はぁ……。"
1008505-79 = "[s7] \"ハレ、大丈夫？\"\n[s8] \"水でも飲む？\""
1008505-82 = "だい、じょうぶ……まだ、何とか……。"
1008505-83 = "でも、ここまで来させておいて……何もなかったら……"
1008505-84 = "本当に許せない……覚悟しておいてほしい……"
1008505-87 = "[ns] \"……あ、着いた。\""
1008505-88 = "ふぅ……。"
1008505-89 = "……この建物、何？"
1008505-93 = "最新の地図アプリにも表示されてないんだけど。"
1008505-94 = "[s] \"捨てられたデータセンター……とか？\""
1008505-95 = "ううん、それなら流石に知ってるはず。"
1008505-96 = "それに、これはデータセンターの造りじゃない。空調機も見当たらないし……。"
1008505-97 = "……何なら、セキュリティ対策もされて無さそう。"
1008505-98 = "[s] \"じゃあとりあえず、入ってみようか。\""
1008505-99 = "……うん、そうだね。正体を突き止めてみよう。"
1008505-108 = "やっぱり……データセンターの構造じゃない。"
1008505-109 = "変な空間。それに、古いけど幾つもの出入りの形跡……とても「キヴォトスで最も多くの情報を持つサーバー」があるとは……"
1008505-113 = "……これ、PC？"
1008505-114 = "[s] \"ほんとだ、壁に……何かの端末？\""
1008505-115 = "とにかく、起動してみて……。"
1008505-122 = "……？"
1008505-127 = "[ns9] \"天井が開いた！？\"\n[ns10] \"ハレ、気を付けて！\""
1008505-130 = "これって……先生、ちょっと待ってて。"
1008505-136 = "……はぁ、なるほどね。"
1008505-137 = "先生、これ読んでみて。"
1008505-138 = "[s] \"「キヴォトス公立 第3天文台へようこそ」……。\""
1008505-139 = "うん、古くなって閉館した場所みたい。"
1008505-140 = "電波望遠鏡の老化に伴って……って話、そういえば前に聞いたことあったかも。"
1008505-141 = "この天井が開いたのも、空を眺める時に使うんだと思う。出入りの形跡があるのも当然だね。"
1008505-142 = "まったく、やられたよ……。"
1008505-143 = "[ns11] \"なら「キヴォトスで最も多くの情報を持つサーバー」っていうのは……\"\n[ns12] \"嘘だった、ってことなのかな。\""
1008505-146 = "真意はメールの差出人にしか分からないけど……"
1008505-147 = "私は、全くの嘘だとは思わないかな。"
1008505-148 = "星々の放射エネルギーを情報として換算すると、それは私たちの手にある容量を遥かに超える。"
1008505-149 = "ともすれば、この夜空を……それにアクセスできるこの場所を「すごいサーバー」って表現するのも、まあ悪くはないかなって。"
1008505-155 = "……もうすぐ、日が暮れるね。"
1008505-156 = "先生、良かったら一緒に星を見ない？"
1008505-157 = "……こんなに手が届きそうなのに、勿体ないなって。"
1008505-158 = "[s] \"うん、是非。\""
1008505-165 = "（そしてハレと一緒に、星がよく見える場所へと向かい……）"
1008505-168 = "[wa:1450]― [log=하레 캠핑]空が、[wa:1350]光でいっぱい……。[/log]"
1008505-171 = "― [log=하레 캠핑]こんなに[wa:450]きらきらした夜空は、[/log]"
1008505-173 = "― [log=하레 캠핑]はじめてかも。[/log]"
1008505-176 = "[wa:2150]― [log=하레 캠핑]あの光[wa:1050]一つ一つが、[/log]"
1008505-178 = "― [log=하레 캠핑]膨大な情報を持つ[wa:1700]ノードだと思うと、[/log]"
1008505-181 = "― [log=하레 캠핑]なんか、[wa:1450]畏敬の念すら[wa:1500]覚えるかも。[/log]"
1008505-184 = "[wa:1050]― [log=하레 캠핑]私の知っている[wa:1100]情報をすべて重ねても[/log]"
1008505-186 = "― [log=하레 캠핑]あの光には、[wa:1500]届かないんだろうな……[/log]"
1008505-189 = "[wa:1650]― [log=하레 캠핑]……それでも私は、[wa:1720]諦めない。[/log]"
1008505-191 = "[wa:200]― [log=하레 캠핑][ruby=ヴェリタス]真理[/ruby]は必ず、[wa:1800]光を向くものだから。[/log]"
1008505-194 = "[wa:1350]― [log=하레 캠핑]空の上にある[wa:1800]遠くの星へ、[/log]"
1008505-196 = "― [log=하레 캠핑]敬意を込めた[wa:1150]挨拶を。[/log]"
1008505-199 = "― [log=하레 캠핑]こんにちは、[wa:2050]お元気ですか？[/log]"
1008505-202 = "（その後もハレと一緒に、夜空が唄う物語に耳を澄ませ……学校に戻ったのは、明け方になってからのことだった）"
