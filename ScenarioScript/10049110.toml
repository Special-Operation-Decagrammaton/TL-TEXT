[translation]
10049110-1 = "Epílogo parte 1; Como vai você?"
10049110-4 = "Aqui estão as próximas notícias."
10049110-5 = "No último fim de semana, o evento no parque de diversões Borderland terminou com um grande sucesso."
10049110-6 = "Intitulado 'Garota Mágica Heavy Caliber: Especial de Borderland', o evento contou com apresentações do elenco que foram muito bem recebidas."
10049110-7 = "Devido à atuação extremamente realista, surgiram várias especulações sobre a identidade dos membros do elenco, e..."
10049110-8 = "Sobre este assunto, os responsáveis pelo parque evitaram responder, dizendo que 'por questões de privacidade, não podemos comentar', e acrescentaram: 'aguardem pela próxima apresentação'."
10049110-9 = "Além disso, há rumores de que o Sensei do Schale esteve envolvido como diretor da apresentação, mas, até o momento, não houve nenhuma declaração oficial do Schale."
10049110-10 = "Próxima notícia."
10049110-11 = "O Conselho Estudantil Geral está preparando um projeto de lei para prevenir falsificações e propagandas enganosas..."
10049110-13 = "Ué, só isso? #nNão tem... mais um monte de coisas para falar!"
10049110-14 = "Tipo, 'a White foi incrível', ou 'a Pink foi uma fofura', #nou 'a Ella deu medo'!"
10049110-15 = "Não, acho que foi melhor assim."
10049110-16 = "Às vezes, é melhor continuar sem saber de certas coisas."
10049110-17 = "Ah! É verdade! A identidade das garotas mágicas também é envolta em mistério..."
10049110-18 = "Eu não fiquei famosa como garota mágica, mas... tudo bem! #nEu sou a Uzawa Reisa, a superestrela do Esquadrão de Vigilância!"
10049110-19 = "A Reisa está cheia de energia, como sempre."
10049110-20 = "Ah. Olá."
10049110-21 = "Sinto que estive com vocês dois agorinha mesmo... mas já se passaram três dias desde a última vez que nos vimos, não é?"
10049110-22 = "Sim, nos vimos há três dias...?"
10049110-23 = "Hum... Shimiko-san, você está cansada...?"
10049110-24 = "É brincadeira, brincadeira!"
10049110-25 = "A Shimiko-san também sabe fazer piadas...!"
10049110-26 = "Estou lendo um livro chamado 'Como treinar seu senso de humor: Aprenda lendo isto'."
10049110-27 = "Acabei de comprar, então só li algumas páginas... mas, nesse ritmo, acho que vou terminar logo."
10049110-28 = "A Shimiko-san sempre faz tudo com muita dedicação, não é?"
10049110-29 = "Dizem que, antes de tudo, você deve ler o manual de instruções. Eu realmente acredito que os livros são manuais para fazer qualquer coisa."
10049110-30 = "Será que... você também estudou para se tornar uma executiva do mal!?"
10049110-31 = "Com certeza. Mas... não tive tempo, então fiz apenas o básico."
10049110-32 = "Eu nunca tinha tido contato com obras sobre garotas mágicas, mas achei muito interessante."
10049110-33 = "Eu também estou assistindo ao anime de Heavy Calibers agora."
10049110-34 = "Ontem, assisti até o episódio 7 da 3ª temporada, então entendi por que o traje da White é rosa."
10049110-35 = "...Foi uma história muito boa sobre justiça."
10049110-36 = "Oh!"
10049110-37 = "Então, você precisa ver o filme também! O recém-lançado 'Heavy Calibers: Broken Arrow' também foi excelente!"
10049110-38 = "Quando vocês terminarem de assistir, eu explico tudo para vocês!"
10049110-40 = "Estou ansiosa por isso. Venham sempre à biblioteca!"
10049110-44 = "A patrulha de hoje está tranquila."
10049110-45 = "Tirando os problemas triviais de sempre, acho que está tudo calmo."
10049110-46 = "Estou tããão feliz que a Suzumi-san esteja bem!"
10049110-47 = "O rosto da Suzumi-san quando ela ajuda alguém e recebe um agradecimento é o mais incrível de todos!"
10049110-48 = "É por isso que eu amo esta cidade onde a Suzumi-san está!"
10049110-49 = "Eu mesma não sabia que tipo de expressão eu fazia normalmente."
10049110-50 = "Obrigada por me contar."
10049110-54 = "..."
10049110-55 = "Você... não vai sair do Esquadrão de Vigilância, vai?"
10049110-60 = "Fufu..."
10049110-61 = "Suzumi-san?"
10049110-62 = "Depois de um discurso tão apaixonado, é claro que eu não vou sair."
10049110-63 = "Eu vou continuar. Eu não estou mais... confusa."
10049110-68 = "Ah, estava uma delícia."
10049110-69 = "Estamos de barriga cheia!"
10049110-70 = "Talvez eu tenha comido um pouco demais..."
10049110-71 = "Quando se tem a chance de comer, é melhor aproveitar e comer bastante."
10049110-75 = "Eca, aqueles caras estranhos de antes...!"
10049110-76 = "E-Ei, nós não fizemos nada de errado, tá?!"
10049110-77 = "Se formos atacadas agora, minha barriga vai explodir..."
10049110-78 = "Eu ainda não disse nada, mas..."
10049110-79 = "...Obrigada pelo outro dia."
10049110-80 = "E sobre a recompensa... sinto muito por ter estragado tudo."
10049110-81 = "Foi incrível ver você voando! Parecia um foguete!"
10049110-82 = "Mas, graças a vocês, a situação foi resolvida. Muito obrigada mesmo."
10049110-83 = "Não pense que eu ajudei de propósito."
10049110-84 = "Além disso, a recompensa foi por água abaixo, mas deu para comer bastante churrasco. Já está bom assim."
10049110-85 = "Churrasco?!"
10049110-86 = "O Sensei pagou para a gente. Como uma recompensa pelo que aconteceu antes."
10049110-87 = "Vocês comeram muito, hein."
10049110-88 = "O Sensei estava com uma cara meio triste na hora de pagar a conta, mas..."
10049110-89 = "Fico feliz que vocês tenham sido recompensadas..."
10049110-90 = "É raro ouvir algo assim vindo do Grupo de Autodefesa, viu."
10049110-91 = "...Hum. Já terminei de beber."
10049110-92 = "Arremesso!"
10049110-96 = "Ah, quase."
10049110-97 = "Se tivesse entrado, teria sido uma cesta de três pontos."
10049110-98 = "Bom, já vamos indo. Se cuidem, vocês também."
10049110-103 = "Espere um pouco."
10049110-104 = "O quê?"
10049110-105 = "Por favor, jogue isso no lixo corretamente."
10049110-106 = "Ah, que preguiça... #nO suco acabou respingando um pouco, não quero nem tocar nisso..."
10049110-107 = "Quem for limpar provavelmente vai pensar a mesma coisa."
10049110-108 = "Vamos, jogue fora como deve ser."
10049110-110 = "Tá, tá, então..."
10049110-111 = "Ei, você está dando ordens para a nossa capitã?"
10049110-112 = "Capitã! Vamos mostrar para eles do que somos capazes!"
10049110-113 = "Hã? Não... espera... o quê?"
10049110-114 = "(Eu já ia jogar no lixo mesmo...)"
10049110-115 = "Não tem jeito. Reisa?"
10049110-116 = "Sim! Mágica――!!!"
10049110-117 = "Eu já cansei dessa história de garota mágica!!"
