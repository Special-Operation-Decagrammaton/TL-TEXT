[translation]
33200-1 = "Episódio 20;O Nome do Paraíso É (1)"
33200-2 = "O centro abriu; a gente vai pelo lado oeste."
33200-3 = "Entendido!"
33200-4 = "……Eu também ajudo."
33200-5 = "Hasumi……!"
33200-6 = "Chinatsu, lutar lado a lado assim é a primeira vez desde aquela hora, né."
33200-7 = "Ihihihihi……."
33200-8 = "Iih, até a presidente do Comitê de Realização da Justiça……."
33200-13 = "……Entendido, conto com vocês."
33200-14 = "Oi, oi, presidentinha do Comitê Disciplinar. A gente também vai ajudar~."
33200-15 = "A vice-presidente de Abydos……!"
33200-16 = "Opa, opa, que tristeza. É \"Hoshino\", viu. A gente se viu outro dia; o titio ficaria feliz se você lembrasse!"
33200-17 = "Olha quem fala, veterana Hoshino; você também tá me chamando de \"presidentinha do Comitê Disciplinar\". Lembra mesmo o meu nome?"
33200-18 = "Não, não, imagina, é~ deixa ver……"
33200-19 = "……Chega de papo."
33200-21 = "Vamos."
33200-22 = "Entendido!"
