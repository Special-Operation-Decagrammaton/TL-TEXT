[translation]
90101100-1 = "Episode 10: Unchanging Values"
90101100-6 = "Seriously... that's way too tough."
90101100-7 = "This is FOX3! The .45 caliber rounds aren't penetrating the target's armor!"
90101100-8 = "Requesting fire support!"
90101100-14 = "Guiding to Point Beta for a sniper shot."
90101100-15 = "FOX4, switch to HE rounds and reload. Hold your current position."
90101100-16 = "Are you sure AP rounds won't work?"
90101100-17 = "Just piercing the armor isn't enough."
90101100-18 = "It seems it also possesses regenerative abilities."
90101100-19 = "If we keep using weak attacks, its outer shell will only get thicker."
90101100-20 = "Is that what they call 'biological armor'? It's a real pain to deal with."
90101100-21 = "FOX2, can you land a slug round in its belly?"
90101100-23 = "I need to be at point-blank range for it to be effective... can you buy me some time?"
90101100-24 = "I'll use the remote-controlled crane to draw its attention."
90101100-31 = "...I can hold it for 10 seconds."
90101100-32 = "Confirmed!"
90101100-38 = "Target hit confirmed!"
90101100-42 = "FOX4. Can you snipe the spot FOX2 opened up?"
90101100-43 = "That's its weak point."
90101100-44 = "Distance 700m. Wind direction 12 knots from the north."
90101100-45 = "Piece of cake."
90101100-49 = "Tango down."
90101100-50 = "Now, FOX3. Detonate the claymore!"
90101100-51 = "Eat lead, you creepy crustacean!"
90101100-60 = "Whoa, what is this!?#nWater is spraying out of the crab's mouth!"
90101100-61 = "Ugh... it reeks. I hope the smell comes out..."
90101100-62 = "...I'll have to do some laundry when I get back."
90101100-64 = "Ah, ahhh..."
90101100-65 = "The anomaly has been defeated. This sector is safe now."
90101100-66 = "N-no way... the rumored crab was actually..."
90101100-67 = "To think that something like a crab would..."
90101100-72 = "Looks like they're pretty shocked."
90101100-73 = "Can't blame them after seeing something like that."
90101100-74 = "The family's assets... the art pieces... we worked so hard to protect them..."
90101100-75 = "And now everything, including the warehouse, is destroyed...!"
90101100-76 = "I can't face the Boss anymore...!"
90101100-77 = "Wait, that's what you're worried about?"
90101100-78 = "So that's why you were so obsessed with guarding this port."
90101100-79 = "You brought this on yourselves. No sympathy here."
90101100-80 = "If we leak this info to the Valkyrie Public Safety Bureau, they'll handle it for us."
90101100-81 = "Unlike the rumors of a monster crab, this is more than enough reason for Valkyrie to move."
90101100-85 = "............"
90101100-86 = "[s] \"Are you okay?\""
90101100-87 = "Yes, I am fine. I was in the rear the whole time."
90101100-88 = "It was Nico and Kurumi who were in danger—"
90101100-89 = "[s] \"I'm not talking about the operation.\""
90101100-93 = "[ns1] \"I was bothered by how you were interrogating them earlier.\"\n[ns2] \"Did something come to mind?\""
90101100-96 = "At that time..."
90101100-97 = "I apologize. I became uncharacteristically emotional."
90101100-98 = "I suddenly remembered the past... and I got angry."
90101100-99 = "[s] \"At them?\""
90101100-100 = "...I don't know."
90101100-101 = "I was angry, but when I think about it, it's unclear who that anger was directed at."
90101100-102 = "Was it at them, or at my past self for making the same mistakes?"
90101100-103 = "...Or perhaps at society itself, where these things keep repeating."
90101100-104 = "I suppose it's a childish complaint.#nEven so, I just couldn't forgive this situation for not going the way it should."
90101100-105 = "[s3] \"It's not just a child's problem.\"\n[s4] \"Even adults get angry when things don't go their way.\""
90101100-108 = "Is that so... for you too, Sensei?"
90101100-109 = "[s5] \"Of course.\"\n[s6] \"If you weren't bothered, it would just mean you never expected anything in the first place.\""
90101100-115 = "As the Carpaccio Family member said, their actions were not legally problematic."
90101100-116 = "They simply spread urban legends to create an image and used that to gain an advantage in the bidding."
90101100-118 = "But as a result, many people were terrorized and suffered real harm."
90101100-119 = "I've felt this for a while... no matter how strict the rules are, you can't fully bind a villain."
90101100-120 = "Villains are experts at finding loopholes in the rules."
90101100-122 = "Complex rules only inconvenience citizens and can create innocent victims."
90101100-123 = "Is there such a thing as perfect justice... or perfect rules without loopholes?"
90101100-124 = "[s] \"It's better to assume... that they don't exist.\""
90101100-125 = "...I see. Is that so?"
90101100-126 = "[s] \"Most rules weren't made for the sake of people, after all.\""
90101100-130 = "...Excuse me?"
90101100-131 = "[s7] \"People tend to think rules are made for them—\"\n[s8] \"But in reality, people are more often changed to fit the rules.\""
90101100-136 = "[ns9] \"Once a rule is set, it's not easily changed.\"\n[ns10] \"...Unlike the fickle hearts of people.\""
90101100-139 = "[ns] \"That's why people are easily bound by rules created in the past.\""
90101100-140 = "Then, to avoid being bound by the past—"
90101100-141 = "What should people, who cannot understand each other and keep wavering, use as their guide?"
90101100-142 = "[s] \"Use unchanging values as your compass.\""
90101100-143 = "Unchanging... values."
90101100-144 = "[ns] \"Is your sense of justice still the same, Yukino?\""
90101100-148 = "...I want to believe it is."
90101100-149 = "[s] \"Then let's reorganize the rules with that unchanging justice as our axis.\""
90101100-150 = "Yes."
90101100-156 = "What are you two talking about so seriously?"
90101100-157 = "Are you keeping secrets?"
90101100-158 = "Don't be ridiculous.#nWe were just discussing how to report this to the General Student Council after cleaning up the site."
90101100-164 = "I'm back~"
90101100-165 = "Good work, FOX2.#nWere there any other civilians at the site?"
90101100-166 = "Nope. I had it cordoned off, so I don't think anyone got caught up in it.#nIt was a good thing we contacted the Port Authority beforehand."
90101100-167 = "Oh, right. While I was looking around the site, I found this where the crab fell."
90101100-169 = "[ns] \"This is...\""
90101100-170 = "It doesn't look like crab remains."
90101100-171 = "It's like a piece of glass... or rather, a mirror reflecting another world."
90101100-172 = "We've seen this before, haven't we?"
90101100-173 = "Something similar was left behind when we defeated the 'Kune-kune'."
90101100-174 = "That one reflected the meadow where the Kune-kune was standing, but...#nthis one doesn't show anything."
90101100-175 = "It's a dark blue... maybe the deep sea where the crab was born?"
90101100-176 = "Regardless, the fact that the Loa we've been dealing with leave behind similar 'byproducts' means—"
90101100-178 = "The possibility that the recent surge in urban legends and the accompanying disappearances are not coincidental has increased."
90101100-179 = "Though, we still lack enough evidence to draw any conclusions."
90101100-180 = "Sensei. Could you please keep this piece of glass for us again?"
90101100-181 = "[s] \"Sure, I'll hold onto it.\""
90101100-182 = "Phew... I'm exhausted..."
90101100-183 = "Well, let's head home—"
90101100-187 = "Hmm...? Is that... a small crab walking between the containers over there?"
90101100-188 = "Is your sense of reality messed up from fighting the big one?#nThat's just a normal-sized adult."
90101100-189 = "But why are there so many of them all of a sudden?"
90101100-193 = "...Oh, wait. Could it be?#nAren't these the crabs the Carpaccio Family bought up for their threats?"
90101100-194 = "They must have escaped when the warehouse collapsed."
90101100-195 = "They're heading toward the sea."
90101100-200 = "Watching them return to the sea in a swarm, with the ruined warehouse behind them... it's kind of creepy."
90101100-201 = "It's like they're returning home after finishing their job..."
90101100-202 = "Looks like there will be plenty of crabs in these waters for a while."
90101100-203 = "If you add eyewitness accounts of crabs destroying buildings to that—"
90101100-204 = "A new urban legend about 'monster crabs destroying people's homes' might be born."
90101100-205 = "I don't want that! One was already a pain, a whole swarm is impossible!"
90101100-209 = "In other words, it seems it's still a bit too early to declare the operation over."
90101100-210 = "All units, we will now proceed to collect all the crabs wandering the port."
90101100-214 = "All of them...? Us?"
90101100-215 = "How long is it going to take to pick all these up!"
90101100-216 = "[s11] \"But if it's to leave no loose ends...\"\n[s12] \"I'll help too.\""
90101100-219 = "Seriously..."
90101100-221 = "I am so done with crabs!!"
90101100-223 = "(To catch the crabs that escaped from the warehouse, I spent the whole night running around the port with the FOX Squad...)"
90101100-225 = "Next Episode: Epilogue"