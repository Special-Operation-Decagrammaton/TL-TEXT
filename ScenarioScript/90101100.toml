[translation]
90101100-1 = "Episódio 10; O valor que não muda"
90101100-6 = "Qual é... Ele é muito duro."
90101100-7 = "Aqui é a FOX3! Calibre .45 não atravessa a couraça do alvo!"
90101100-8 = "Solicito suporte de fogo!"
90101100-14 = "Estou o atraindo para o Ponto Beta pra obter ângulo pro tiro."
90101100-15 = "FOX4, troca a munição pra Alta Explosiva e recarrega. Aguarde em posição."
90101100-16 = "Não é melhor a de penetração?"
90101100-17 = "Só furar a armadura não vai adiantar de nada."
90101100-18 = "Pelo visto, ele também consegue se regenerar."
90101100-19 = "Se a gente continuar com esses soquinhos, a carapaça dele só vai ficar mais grossa."
90101100-20 = "Como é que eles chamam mesmo? \"Blindagem viva\"? Lutar contra isso na prática é osso, viu."
90101100-21 = "FOX2, consegue mandar um balote direto na barriga dele?"
90101100-23 = "Pra ter efeito de verdade, vou ter que colar nele... Consegue me dar um tempinho?"
90101100-24 = "Vou usar aquele guindaste de controle remoto pra chamar a atenção dele."
90101100-31 = "...Você tem 10 segundos."
90101100-32 = "Confirmado!"
90101100-38 = "Impacto no alvo confirmado!"
90101100-42 = "FOX4. Consegue meter bala no buraco que a FOX2 abriu?"
90101100-43 = "Esse é o ponto fraco dele."
90101100-44 = "Distância 700m. Vento de norte a sul, 12 nós."
90101100-45 = "Moleza."
90101100-49 = "Tango abatido."
90101100-50 = "Agora, FOX3. Detonar as minas!"
90101100-51 = "Vai pro inferno, crustáceo nojento!"
90101100-60 = "Eca, que que é isso?! Tá jorrando água da boca do caranguejo!"
90101100-61 = "Ew... cheiro de peixe morto. Isso sai na lavagem, né...?"
90101100-62 = "...Temos que lavar a roupa assim que chegar em casa."
90101100-64 = "Ah, ahhh..."
90101100-65 = "A anomalia foi neutralizada. O setor tá limpo."
90101100-66 = "I-Isso não pode ser verdade... o caranguejo dos boatos realmente..."
90101100-67 = "Tudo isso... por causa de um mero caranguejo..."
90101100-72 = "Ela parece que tomou um baita de um choque de realidade."
90101100-73 = "Também, depois de ver uma bizarrice dessas, não julgo."
90101100-74 = "As ações da Família... as peças de arte... A gente protegeu isso com unhas e dentes..."
90101010-75 = "O armazém e tudo mais... tudo destruído...!"
90101100-76 = "Eu não tenho nem cara pra olhar pro chefe depois dessa...!"
90101100-77 = "Ah, era com isso...?"
90101100-78 = "Era por isso que vocês tavam tão obcecados com a segurança desse porto."
90101100-79 = "Colheram o que plantaram. Nem dá pra ter pena."
90101100-80 = "Se a gente jogar isso no colo do Departamento de Segurança Pública da Valkyrie, eles mesmos dão um fim nisso."
90101100-81 = "Diferente de um mero boato de um caranguejo gigante, isso aí é motivo de sobra pra Valkyrie se mexer."
90101100-85 = "............"
90101100-86 = "[s] \"Tá tudo bem?\""
90101100-87 = "Tô, tô bem sim. Eu fiquei na retaguarda o tempo todo."
90101100-88 = "A Niko e a Kurumi que bateram de frente com o perigo"
90101100-89 = "[s] \"Não tô falando da operação.\""
90101100-93 = "[ns1] \"Fiquei encucado com você na hora do interrogatório.\"\n[ns2] \"Aconteceu alguma coisa que mexeu com você?\""
90101100-96 = "Aquela hora..."
90101100-97 = "Me desculpe. Acabei me exaltando, coisa que não é muito da minha laia."
90101100-98 = "Lembrei de umas paradas do passado... e perdi a linha."
90101100-99 = "[s] \"Com eles?\""
90101100-100 = "...Não tenho certeza."
90101100-101 = "Eu tava irritada, mas parando pra pensar agora, nem sei ao certo com quem eu tava brava."
90101100-102 = "Com eles, ou comigo mesma por já ter feito a mesma burrada no passado."
90101100-103 = "...Ou talvez a minha raiva fosse com a própria sociedade que permite que essas coisas fiquem se repetindo."
90101100-104 = "Sei que parece chilique de criança. Mas mesmo assim, eu não conseguia engolir essa situação saindo dos trilhos."
90101100-105 = "[s3] \"Isso não é exclusividade de criança não.\"\n[s4] \"Adulto também sobe nas tamancas quando as coisas não saem como o planejado.\""
90101100-108 = "Até o senhor... Sensei?"
90101100-109 = "[s5] \"Lógico.\"\n[s6] \"Muito pelo contrário, se eu não ligasse, seria sinal de que eu não tava esperando nada desde o começo.\""
90101100-115 = "Como a moça da Família Carpaccio disse, o que eles fizeram não era contra a lei."
90101100-116 = "Eles só queriam manipular a opinião pública espalhando histórias de terror e usar isso pra passar na frente na hora do leilão."
90101100-118 = "Mas o saldo dessa brincadeira foi um monte de gente aterrorizada e tomando prejuízo."
90101100-119 = "Eu já sentia isso antes, mas... Não importa o quão rígida seja a regra, não dá pra prender gente ruim de verdade."
90101100-120 = "Eles são experts em achar brechas nas regras."
90101100-122 = "Regras muito mirabolantes só dão dor de cabeça pros civis e podem acabar lascando quem tá só na boa fé."
90101100-123 = "Será que rola uma regra perfeita, sem nenhuma brecha... como uma justiça divina, inabalável?"
90101100-124 = "[s] \"Melhor tirar o cavalo da chuva... porque isso não rola não.\""
90101100-125 = "...Suspeitava desde o princípio."
90101100-126 = "[s] \"Porque a grande maioria das regras não são feitas pras pessoas.\""
90101100-130 = "...Como é que é?"
90101100-131 = "[s7] \"O povo costuma achar que as regras são feitas pra ajudar eles, mas\"\n[s8] \"Mas na prática, é a galera que tem que rebolar pra se encaixar nas regras.\""
90101100-136 = "[ns9] \"Porque depois que botam a regra no papel, não é qualquer ventinho que muda ela.\"\n[ns10] \"...Bem diferente do coração das pessoas, que muda que nem o tempo.\""
90101100-139 = "[ns] \"É por isso que a gente vive engessado pelas regras que a galera do passado criou.\""
90101100-140 = "Então, como a gente faz pra não ficar preso no passado"
90101100-141 = "O que as pessoas que não se entendem e vivem balançando devem usar de base pra viver?"
90101100-142 = "[s] \"Eles precisam focar no valor que não muda.\""
90101100-143 = "Valor que... não muda."
90101100-144 = "[ns] \"A sua justiça ainda continua a mesma coisa de sempre, não é?\""
90101100-148 = "...Queria botar fé que sim."
90101100-149 = "[s] \"Então bora botar a casa em ordem, com essa sua justiça imutável como nosso norte.\""
90101100-150 = "Pode deixar."
90101100-156 = "Cês tão papeando super sério aí já faz uma cota, tão aprontando o quê?"
90101100-157 = "Tão armando alguma por trás da gente?"
90101100-158 = "Não fale bobeiras. Só tava conversando sobre como a gente ia passar o relatório pra Federação depois de dar um pente fino no local."
90101100-164 = "De volta à base~"
90101100-165 = "Bom trabalho, FOX2. Tinha mais algum civil por lá?"
90101100-166 = "Uhum. Como a gente fechou tudo, acho que ninguém deu azar de sobrar no meio do fogo cruzado. Foi uma baita sacada ter avisado a agência portuária antes."
90101100-167 = "Ah, lembrei. Quando tava dando uma geral na área, achei isso aqui onde o caranguejão tombou."
90101100-169 = "[ns] \"Isso é...\""
90101100-170 = "Não tá com cara de ser pedaço do caranguejo."
90101100-171 = "Caco de vidro... Parece mais com um espelho refletindo outro mundo."
90101100-172 = "A gente já bateu o olho numa parada igual antes, não bateu?"
90101100-173 = "Quando a gente botou o \"Kunekune\" pra dormir, tinha um troço bem parecido no chão."
90101100-174 = "Naquela vez, tava refletindo um pasto onde o Kunekune costuma dar as caras...Mas dessa vez não tá refletindo nadica de nada."
90101100-175 = "É um azul bem escuro... Será que é o fundo do mar onde o caranguejo surgiu?"
90101100-176 = "Não importa o que seja, se esses mitos com que a gente tá quebrando o pau deixam esses \"brindes\" parecidos pra trás"
90101100-178 = "A chance dessa chuva de lendas urbanas e desaparecimentos não ser só coincidência aumentou e muito."
90101100-179 = "Dito isso, ainda não temos bala na agulha pra chegar a nenhuma conclusão."
90101100-180 = "Sensei. Pode dar uma segurada nesse caco de vidro por enquanto, que nem na última vez?"
90101100-181 = "[s] \"Beleza, deixa comigo.\""
90101100-182 = "Ufa... tô morta com farofa..."
90101100-183 = "Vamos meter o pé então"
90101100-187 = "Ué...? Ali... não tem um caranguejinho andando no meio dos contêineres?"
90101100-188 = "Cê não tá com a visão deturpada depois de trombar com aquele bicho gigante?Isso aí é um caranguejo adulto tamanho padrão."
90101100-189 = "Mas por que diabos brotou um monte deles do nada?"
90101100-193 = "...Ah, saca só.E se esses forem os caranguejos que a Família Carpaccio comprou pra tocar o terror na galera?"
90101100-194 = "O armazém foi pro chão, aí eles deram no pé."
90101100-195 = "Eles tão indo pro mar."
90101100-200 = "Pense num bagulho medonho, essa filera de caranguejo voltando pro mar, tendo aquele armazém estraçalhado como cenário de fundo..."
90101100-201 = "Parece até que tão voltando depois de cumprirem o objetivo deles..."
90101100-202 = "Pelo visto, a pesca de caranguejo vai estar a todo vapor por aqui nos próximos dias."
90101100-203 = "E se juntar isso com os boatos de um caranguejo que demole prédios"
90101100-204 = "Vai ver nasce uma nova lenda urbana sobre \"O Caranguejo Monstruoso que arranca o teto do povo\"."
90101100-205 = "Deus me livre e guarde! Um só já foi osso, um exército deles nem a pau, Juvenal!"
90101100-209 = "Pelo visto, é cedo demais pra gente cantar vitória."
90101100-210 = "Todas as operadoras, a partir de agora deem um jeito de recolher todos os caranguejos espalhados pelo porto."
90101100-214 = "Todos...? A gente vai ter que fazer isso?"
90101100-215 = "Mas olha o tanto! Quando é que a gente vai terminar de catar isso tudo?!"
90101100-216 = "[s11] \"Tem que ser, né? Pra não dar b.o. no futuro...\"\n[s12] \"Eu dou uma mãozinha.\""
90101100-219 = "Aiai, que saco..."
90101100-221 = "EU NÃO AGUENTO MAIS VER CARANGUEJO NA MINHA FRENTE!!"
90101100-223 = "(E assim, passei a noite inteira correndo pelo porto feito louco junto com o Esquadrão FOX pra catar os caranguejos que fugiram do armazém...)"
90101100-225 = "No próximo episódio: Epílogo"

