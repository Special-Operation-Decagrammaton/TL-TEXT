[translation]#[Texto Final. - Filipe 05/07.]
90101100-1 = "Episódio 10; O Valor Que Não Muda"
90101100-6 = "Peraí…… duro demais, né!"
90101100-7 = "Aqui é FOX3! O calibre .45 não passa da blindagem do alvo!"
90101100-8 = "Solicito apoio de fogo!"
90101100-14 = "Guiando o alvo em direção ao ponto Beta para o disparo de precisão."
90101100-15 = "FOX4, troque para munição HE e recarregue. Aguarde na posição atual."
90101100-16 = "Não seria melhor munição AP?"
90101100-17 = "Só perfurar a blindagem não basta."
90101100-18 = "Pelo visto, ele também tem capacidade regenerativa."
90101100-19 = "Com ataques fracos, a casca só vai ficando mais grossa."
90101100-20 = "É a tal \"blindagem orgânica\", né? Encarar uma ao vivo é osso~"
90101100-21 = "FOX2, consegue socar um slug na barriga dele?"
90101100-23 = "Pra fazer efeito de verdade, tem que ser à queima-roupa…… segura ele um pouco pra mim?"
90101100-24 = "Vou chamar a atenção dele com o guindaste de controle remoto."
90101100-31 = "……Dez segundos, no máximo."
90101100-32 = "Confirmado!"
90101100-38 = "Impacto no alvo confirmado!"
90101100-42 = "FOX4. Consegue acertar o ponto que a FOX2 abriu?"
90101100-43 = "Ali é o ponto fraco."
90101100-44 = "Distância de 700m. Vento de norte pra sul, 12 nós."
90101100-45 = "Moleza."
90101100-49 = "Tango down."
90101100-50 = "Agora, FOX3. Detona a Claymore!"
90101100-51 = "Morre, crustáceo nojento!"
90101100-60 = "Uwah, que é isso?!#nTá jorrando água da boca do caranguejo!"
90101100-61 = "Eca…… cheiro de maresia podre. Isso sai da roupa…… né?"
90101100-62 = "……Chegando em casa, é lavar tudo."
90101100-64 = "Ah, aaah……"
90101100-65 = "A assombração caiu. A área está segura."
90101100-66 = "N-Não…… o caranguejo do boato existia mesmo……"
90101100-67 = "Logo…… logo um caranguejo……"
90101100-72 = "O choque parece que foi grande, hein~"
90101100-73 = "Depois de ver AQUILO, até entendo."
90101100-74 = "Os títulos de dívida da Família…… as obras de arte…… eu protegi tudo com unhas e dentes……"
90101100-75 = "E foi tudo destruído junto com o armazém……!"
90101100-76 = "Não tenho mais como olhar na cara do chefe……!"
90101100-77 = "Ah, é ISSO que te dói……?"
90101100-78 = "Então era por isso que ela se agarrava tanto à segurança do porto."
90101100-79 = "Bem feito. Sem margem pra pena."
90101100-80 = "É só vazar a informação pro departamento de segurança pública da Valkyrie que eles resolvem."
90101100-81 = "Diferente do boato do caranguejo, motivo pra Valkyrie agir é o que não falta."
90101100-85 = "…………"
90101100-86 = "[s] \"Tudo bem?\""
90101100-87 = "Sim, eu estou bem. Fiquei na retaguarda o tempo todo."
90101100-88 = "Quem se expôs ao perigo foram a Niko e a Kurumi――"
90101100-89 = "[s] \"Não é da operação que eu tô falando.\""
90101100-93 = "[ns1] \"Fiquei preocupado com a hora do interrogatório.\"\n[ns2] \"Algo te tocou fundo, não foi?\""
90101100-96 = "Naquela hora……"
90101100-97 = "Me desculpe. Me deixei levar pela emoção, o que não é do meu feitio."
90101100-98 = "De repente me lembrei do passado…… e a raiva subiu."
90101100-99 = "[s] \"Raiva dela?\""
90101100-100 = "……Não sei."
90101100-101 = "Eu estava com raiva, mas, pensando bem, não sei dizer de quem era essa raiva."
90101100-102 = "Dela? Ou do meu eu do passado, que cometeu o mesmo erro?"
90101100-103 = "……Ou da própria sociedade, onde essas coisas se repetem sem parar."
90101100-104 = "Sei que é uma frustração infantil.#nMesmo assim, eu não consegui perdoar essa situação que não se move como deveria."
90101100-105 = "[s3] \"Isso não é coisa só de criança.\"\n[s4] \"Quando nada sai como planejado, adulto também sente raiva.\""
90101100-108 = "Até você…… Sensei?"
90101100-109 = "[s5] \"Claro.\"\n[s6] \"Aliás, se não doesse, é porque nunca houve expectativa.\""
90101100-115 = "Como disse a integrante da Família Carpaccio, o ato em si não violava a lei."
90101100-116 = "Espalharam uma história de terror, criaram uma imagem e a usaram pra se favorecer na licitação. Só isso."
90101100-118 = "Mas o resultado foi muita gente exposta ao medo, e danos reais."
90101100-119 = "Eu já sentia isso antes…… por mais rígidas que sejam as regras, não dá pra amarrar os maus por completo."
90101100-120 = "Os maus são especialistas em achar as brechas das regras."
90101100-122 = "E regras complexas só impõem transtorno aos cidadãos; podem até criar vítimas de boa-fé."
90101100-123 = "Como uma justiça absoluta…… será que existe uma regra perfeita, sem brechas?"
90101100-124 = "[s] \"É melhor…… assumir que não existe.\""
90101100-125 = "……Imaginei."
90101100-126 = "[s] \"A maioria das regras não foi feita pras pessoas, afinal.\""
90101100-130 = "……Como?"
90101100-131 = "[s7] \"Costumam achar que as regras são feitas pras pessoas, mas――\"\n[s8] \"na prática, é mais comum as pessoas serem moldadas pelas regras.\""
90101100-136 = "[ns9] \"Porque uma regra, uma vez criada, não muda fácil.\"\n[ns10] \"……Diferente do coração das pessoas, que muda toda hora.\""
90101100-139 = "[ns] \"Por isso é tão fácil ficar preso às regras que o passado criou.\""
90101100-140 = "Então, para não ficar presa ao passado――"
90101100-141 = "quem vive oscilando, sem conseguir se entender com os outros…… em que deveria se apoiar?"
90101100-142 = "[s] \"Num valor que não muda. Ele é a bússola.\""
90101100-143 = "Um valor…… que não muda."
90101100-144 = "[ns] \"A sua justiça continua a mesma, Yukino?\""
90101100-148 = "……Eu quero acreditar que sim."
90101100-149 = "[s] \"Então reorganize as regras em torno dessa justiça que não muda.\""
90101100-150 = "Sim."
90101100-156 = "Que papo sério é esse aí, hein?"
90101100-157 = "Tá rolando conluio pelas costas?"
90101100-158 = "Não diga besteira.#nSó discutíamos como reportar ao Conselho Estudantil Geral após organizar a cena."
90101100-164 = "Voltei~"
90101100-165 = "Bom trabalho, FOX2.#nHavia outros cidadãos no local?"
90101100-166 = "Não. A área tava interditada; ninguém deve ter sido envolvido.#nAvisar o escritório do porto com antecedência foi a decisão certa."
90101100-167 = "Ah, é mesmo. Dando uma volta pela cena, eu achei isto onde o caranguejo caiu."
90101100-169 = "[ns] \"Isso é……\""
90101100-170 = "Não parece destroço do caranguejo."
90101100-171 = "Um caco de vidro…… ou melhor, um espelho que reflete outro mundo."
90101100-172 = "A gente já viu um desses antes, né?"
90101100-173 = "Quando derrotamos o \"Kunekune\", caiu um parecido."
90101100-174 = "Aquele refletia uma paisagem tipo o campo onde o Kunekune ficava……#nNesse não dá pra ver nada."
90101100-175 = "É um azul escuro…… o fundo do mar onde o caranguejo nasceu, será?"
90101100-176 = "Seja como for, se os Lores que enfrentamos deixam \"subprodutos\" de natureza parecida――"
90101100-178 = "aumenta a chance de a explosão recente de lendas urbanas, e os desaparecimentos junto delas, não serem coincidência."
90101100-179 = "Embora ainda faltem provas pra concluir qualquer coisa."
90101100-180 = "Sensei. Pode guardar este caco de vidro desta vez também?"
90101100-181 = "[s] \"Claro, deixa comigo.\""
90101100-182 = "Haa…… que canseira……"
90101100-183 = "Bora voltar logo e――"
90101100-187 = "Hm……? Ali…… não tem um caranguejinho andando entre os contêineres?"
90101100-188 = "Lutar contra aquele gigante bagunçou seus sentidos?#nAquilo ali é um adulto de tamanho normal."
90101100-189 = "Mas por que apareceu essa multidão do nada?"
90101100-193 = "……Ah, será?#nNão são os caranguejos que a Família Carpaccio comprava pra usar de ameaça?"
90101100-194 = "O armazém desabou e eles fugiram."
90101100-195 = "Estão indo em direção ao mar."
90101100-200 = "Uma multidão voltando pro mar, com o armazém destruído às costas…… que cena sinistra."
90101100-201 = "Parece até que cumpriram a missão e estão indo embora……"
90101100-202 = "Essa região vai dar caranguejo bom por um tempo, hein."
90101100-203 = "Agora, se somarem a isso os relatos de um caranguejo destruindo prédios――"
90101100-204 = "pode nascer uma lenda nova: \"o caranguejo monstro que destrói casas\"~"
90101100-205 = "Nem pensar! UM já deu trabalho; uma horda, jamais!"
90101100-209 = "Ou seja: ainda é cedo pra declarar o fim da operação."
90101100-210 = "Todas as operadoras: recolham com afinco os caranguejos que perambulam pelo porto."
90101100-214 = "Todos……? Nós?"
90101100-215 = "Com essa quantidade, terminamos quando?!"
90101100-216 = "[s11] \"Mas, se é pra não deixar ponta solta……\"\n[s12] \"Eu ajudo também.\""
90101100-219 = "Ai, francamente……"
90101100-221 = "Chega de caranguejo pra miiiim!!"
90101100-223 = "(Para capturar os caranguejos fugitivos do armazém, corri pelo porto a noite inteira com o Esquadrão FOX……)"
90101100-225 = "Próximo Episódio;Epílogo"
