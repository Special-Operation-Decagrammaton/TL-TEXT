[translation]
1301106-1 = "桃色のスタンプラリー"
1301106-2 = "ミレニアム電気街・春葉原"
1301106-6 = "うっ、もっと早く気付けばよかった……！"
1301106-7 = "[s] \"どうしたの？\""
1301106-8 = "このウルトラマリンシスターズのスタンプラリー……。"
1301106-9 = "40周年のイベントだから、春葉原全域を探し回って、この紙にスタンプを40個集めたら限定グッズに交換してくれる、っていう仕組みみたいなんだけど。"
1301106-10 = "よく見たら制限時間があって、今日の午後2時までって……。"
1301106-12 = "どうしよう先生、もう2時間も残ってないよ！"
1301106-13 = "あの限定グッズ、すっごく欲しかったのに……これじゃ……！"
1301106-14 = "[s] \"落ち着いて、モモイ。\""
1301106-15 = "先生……？"
1301106-16 = "[s] \"まだ絶望するには早いと思うよ？\""
1301106-17 = "で、でも先生、今からじゃ到底……"
1301106-18 = "[s1] \"モモイは独りじゃない、でしょ？\"\n[s2] \"モモイの特技の出番だよ。\""
1301106-19 = "それって、どういう……？"
1301106-21 = "それって、どういう……？"
1301106-23 = "あ……っ！1Pと2Pの協力プレイ！"
1301106-24 = "確かにそうかも！"
1301106-25 = "チャレンジする前から、不可能なクエストかどうかなんて分からない……！"
1301106-26 = "よし、先生！じゃあここで二手に別れよう！"
1301106-27 = "半分ずつ手分けしてスタンプを集めれば……！"
1301106-28 = "そっちはお願い！先生！"
1301106-29 = "[s] \"了解！\""
1301106-31 = "（奔走の結果、何とか時間内にスタンプ20個を集めることができた）"
1301106-33 = "[ns] \"とりあえずこっちは全部集まったけど……。\""
1301106-34 = "あっ、先生！こっちこっち！"
1301106-37 = "[wa:600]― 見て、[wa:500]先生！[wa:1000]こっち側のスタンプ、[wa:1150]全部集められたよ！"
1301106-39 = "― これでクエストクリア、[wa:1400]だね！[wa:1100]やった！"
1301106-42 = "[wa:1000]― 最初は[wa:450]どうなるかと思ったけど……。"
1301106-44 = "― やっぱり[wa:450]先生と私、[wa:1400]相性バッチリだね！"
1301106-47 = "[wa:1750]― って、[wa:250]うわぁっ！？[wa:550]先生！？"
1301106-49 = "[wa:100]― 汗まみれじゃん！[wa:1550]大丈夫！？"
1301106-52 = "[wa:150]― あはっ、[wa:1100]大丈夫なら良かった。"
1301106-54 = "― 今日も先生のおかげで、[wa:1500]すっごく[wa:500]楽しかったよ！"
1301106-57 = "[wa:750]― もしまた[wa:800]こういうイベントがあったら、"
1301106-59 = "― その時もまた、[wa:1100]一緒に参加しようね！[wa:1550]先生！"
1301106-62 = "時間も……大丈夫だね。さっ、じゃあ交換所に行こう！"
1301106-63 = "先生と一緒に頑張った証の戦利品、ちゃんと手に入れないとね！"
1301106-64 = "あ、感謝の気持ちとして、私が飲み物奢ってあげる！"
1301106-66 = "（モモイが買ってくれた飲み物を少しずつ飲みながら、二人でゆっくり交換所へと向かった）"
