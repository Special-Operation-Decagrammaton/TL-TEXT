[translation]
1301106-1 = "Rally de Selos Cor-de-Rosa"
1301106-2 = "Distrito Eletrônico de Millennium - Akihabara"
1301106-6 = "Ah, eu devia ter percebido isso antes...!"
1301106-7 = "[s] \"O que houve?\""
1301106-8 = "Esse rally de selos das Ultramarine Sisters..."
1301106-9 = "Como é um evento de 40º aniversário, parece que o esquema é procurar por toda Akihabara e coletar 40 selos neste papel para trocar por brindes exclusivos."
1301106-10 = "Mas, olhando bem, tem um limite de tempo... termina hoje às duas da tarde..."
1301106-12 = "O que eu faço, Sensei? Não restam nem duas horas!"
1301106-13 = "Eu queria tanto aquele brinde exclusivo... mas desse jeito...!"
1301106-14 = "[s] \"Calma, Momoi.\""
1301106-15 = "Sensei...?"
1301106-16 = "[s] \"Acho que ainda é cedo para perder as esperanças, não acha?\""
1301106-17 = "M-mas Sensei, desse jeito é impossível..."
1301106-18 = "[s1] \"A Momoi não está sozinha, está?\"\n[s2] \"É hora de usar o seu talento especial.\""
1301106-19 = "O que você quer dizer com isso...?"
1301106-21 = "O que você quer dizer com isso...?"
1301106-23 = "Ah...! Cooperação entre o Jogador 1 e o Jogador 2!"
1301106-24 = "É verdade, pode ser isso mesmo!"
1301106-25 = "Não dá para saber se uma missão é impossível antes de tentar...!"
1301106-26 = "Certo, Sensei! Então vamos nos separar aqui!"
1301106-27 = "Se dividirmos o trabalho e coletarmos metade cada um...!"
1301106-28 = "Fica com essa parte, por favor! Sensei!"
1301106-29 = "[s] \"Entendido!\""
1301106-31 = "(Como resultado da correria, conseguimos coletar 20 selos dentro do tempo)"
1301106-33 = "[ns] \"Bom, pelo menos a minha parte já está completa...\""
1301106-34 = "Ah, Sensei! Aqui, aqui!"
1301106-37 = "[wa:600]— Olha, [wa:500] Sensei! [wa:1000] Eu consegui coletar [wa:1150] todos os selos deste lado!"
1301106-39 = "— Missão cumprida, [wa:1400] né! [wa:1100] Conseguimos!"
1301106-42 = "[wa:1000]— No começo [wa:450] eu achei que não ia dar..."
1301106-44 = "— Como esperado, [wa:450] eu e o Sensei [wa:1400] formamos uma dupla perfeita!"
1301106-47 = "[wa:1750]— Espera, [wa:250] uau!? [wa:550] Sensei!?"
1301106-49 = "[wa:100]— Você está todo suado! [wa:1550] Está tudo bem!?"
1301106-52 = "[wa:150]— Ah, [wa:1100] que bom que está tudo bem."
1301106-54 = "— Hoje também foi [wa:1500] super [wa:500] divertido, graças ao Sensei!"
1301106-57 = "[wa:750]— Se tiver [wa:800] outro evento assim,"
1301106-59 = "— Da próxima vez, [wa:1100] vamos participar juntos de novo! [wa:1550] Sensei!"
1301106-62 = "O tempo também... está tranquilo. Vamos, vamos para o posto de troca!"
1301106-63 = "Temos que garantir o nosso prêmio, a prova de que nos esforçamos juntos!"
1301106-64 = "Ah, e como forma de agradecimento, eu pago uma bebida para você!"
1301106-66 = "(Enquanto tomávamos a bebida que a Momoi comprou, fomos caminhando calmamente até o posto de troca)"
