[translation]
1001108-1 = "プレゼント選び"
1001108-2 = "キヴォトス市内・ショッピングモール"
1001108-3 = "先生、手伝いに来てくださって本当にありがとうございます。"
1001108-4 = "私一人では、子供たちが何が好きなのか、分からないこともあって不安でしたので。"
1001108-5 = "先生も、子供たちが何が好きなのかはあまり自信が無い、ですか？"
1001108-6 = "大丈夫です、私たち二人で考えればきっと、子供たちに満足してもらえる素敵なプレゼントが見つかるはずです。"
1001108-7 = "[ruby=ばいかえん]梅花園[/ruby]の子たちが好きそうなプレゼントは、何ですかね～。"
1001108-8 = "あらっ、これ見てください。モモフレンズのキャラクターグッズですよ！"
1001108-9 = "ふふ、梅花園にもこのキャラクターグッズを集めている子が何人かいるようですから……#nこのアルパカの人形をプレゼントしたら喜んでくれるでしょうか？"
1001108-10 = "え、どことなく怖そうに見えますか？……確かにこの黒い点の目は、見る人によっては怖いかもしれませんね。幼い園児たちの教育には少し良くないかもしれません。"
1001108-11 = "それではどんなプレゼントがいいでしょうか……？#n人形？本？もしくは甘い食べ物？"
1001108-12 = "こんな時は、子供たちの気持ちになって考えてみるのがいいですね。#n先生でしたら、誕生日のプレゼントで何が欲しいですか？"
1001108-13 = "[s1] \"現金かな。\"\n[s2] \"お金かな。\""
1001108-14 = "あはは……も、もちろんお金を貰えれば何でも欲しい物が買えますが、お祝いの意味合いが薄くなってしまいますし、あまり教育にもよくないので……。"
1001108-15 = "あはは……も、もちろんお金を貰えれば何でも欲しい物が買えますが、お祝いの意味合いが薄くなってしまいますし、あまり教育にもよくないので……。"
1001108-16 = "他の、園児たちが好きそうな物を考えた方がよさそうです。"
1001108-17 = "[s] \"シュンは誕生日のプレゼントに何をもらいたい？\""
1001108-18 = "私ですか？そういえば自分の欲しいものはあまり考えたことないですね……。"
1001108-19 = "新しい洋服も良いですし、お茶の時間に食べる甘いお茶菓子も良いのですが、やはり……。"
1001108-20 = "[s] \"やはり……？\""
1001108-21 = "その、先生と一緒に過ごす、このような……。"
1001108-22 = "な、なんでもありません！今のは忘れてください！"
1001108-23 = "ふう、やっぱり園児たちにプレゼントするものは、他の場所で探した方が良さそうですね。#n普段は食べられない珍しいお菓子とか……。"
1001108-24 = "[s] \"それなら私、美味しいケーキのお店を知ってるよ。\""
1001108-25 = "あら、そうなんですか？それでは、それにしましょう。"
1001108-26 = "誕生日の記念として、みんなでケーキを分けあって食べられたら、きっとみんな喜びますね。"
1001108-28 = "さあ、先生。案内してください！"
