[translation]
1001108-1 = "Escolhendo um presente"
1001108-2 = "Cidade de Kivotos - Shopping Center"
1001108-3 = "Sensei, muito obrigada por vir me ajudar."
1001108-4 = "Eu estava preocupada, pois sozinha não sabia ao certo do que as crianças gostam."
1001108-5 = "Sensei, você também não tem muita certeza do que as crianças gostam?"
1001108-6 = "Não tem problema, se pensarmos juntos, com certeza encontraremos um presente maravilhoso que as crianças vão adorar."
1001108-7 = "O que será que as crianças do Baikaen gostariam de ganhar?"
1001108-8 = "Ah, olhe só isso. São produtos da Momo Friends!"
1001108-9 = "Fufu, parece que tem algumas crianças no Baikaen que colecionam esses itens... #nSerá que elas ficariam felizes se eu desse essa pelúcia de alpaca de presente?"
1001108-10 = "Ah, parece um pouco assustadora? ...É verdade, esses olhos de pontos pretos podem parecer assustadores para algumas pessoas. Talvez não seja muito bom para a educação das crianças pequenas."
1001108-11 = "Então, que tipo de presente seria bom...? #nBonecos? Livros? Ou talvez doces?"
1001108-12 = "Nessas horas, é bom tentar pensar como as crianças. #nSensei, se fosse você, o que gostaria de ganhar de presente de aniversário?"
1001108-13 = "[s1] \"Dinheiro, talvez.\"\n[s2] \"Dinheiro, talvez.\""
1001108-14 = "Ahaha... b-bem, é claro que com dinheiro você pode comprar o que quiser, mas o significado da celebração acaba se perdendo, e também não é muito educativo..."
1001108-15 = "Ahaha... b-bem, é claro que com dinheiro você pode comprar o que quiser, mas o significado da celebração acaba se perdendo, e também não é muito educativo..."
1001108-16 = "Parece melhor pensarmos em outras coisas que as crianças possam gostar."
1001108-17 = "[s] \"O que você gostaria de ganhar de presente de aniversário, Shun?\""
1001108-18 = "Eu? Agora que você mencionou, nunca parei para pensar no que eu mesma gostaria..."
1001108-19 = "Roupas novas seriam boas, e doces para a hora do chá também, mas, na verdade..."
1001108-20 = "[s] \"Na verdade...?\""
1001108-21 = "Bem, passar um tempo com você, Sensei, como estamos fazendo agora..."
1001108-22 = "N-não é nada! Esqueça o que eu disse!"
1001108-23 = "Ufa, acho melhor procurarmos o presente para as crianças em outro lugar. #nTalvez alguns doces raros que elas não costumam comer..."
1001108-24 = "[s] \"Nesse caso, eu conheço uma loja de bolos deliciosa.\""
1001108-25 = "Ah, é mesmo? Então vamos escolher isso."
1001108-26 = "Como comemoração de aniversário, se todos puderem dividir um bolo, com certeza todos ficarão felizes."
1001108-28 = "Vamos lá, Sensei. Por favor, me guie!"
