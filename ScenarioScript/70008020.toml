[translation]#[Texto Final. - Filipe 08/07.]
70008020-1 = "Aqueles Que Não se Prendem a Nada (2)"
70008020-4 = "Ah."
70008020-5 = "Ui."
70008020-6 = "Agora não……!"
70008020-7 = "……"
70008020-8 = "Haa……"
70008020-9 = "Q-que foi essa reação!"
70008020-10 = "O que você fez agora?"
70008020-11 = "Ainda não fiz nada!"
70008020-12 = "Ainda……?"
70008020-13 = "P-pergunta tendenciosa!"
70008020-14 = "……Deixa eu ver."
70008020-15 = "Não, hoje realmente não fiz nada…… tô com pressa――"
70008020-19 = "Essa voz…… é a Arata?"
70008020-21 = "Ora, é verdade. Trouxe amigas também?"
70008020-22 = "Desculpa, hoje não tenho nada pra pedir."
70008020-27 = "……Conhecida?"
70008020-28 = "Só fiz umas compras pra ganhar mesada."
70008020-29 = "Pra festival precisa de dinheiro……"
70008020-31 = "Vamos, entrem. Tenho yokan. Vou preparar chá."
70008020-32 = "Pode mesmo? Líder, o que fazemos?"
70008020-34 = "Idiota! Boba! Não tem o que fazer!"
70008020-36 = "Ah, é verdade…… desculpa, hoje tô com pressa……"
70008020-37 = "Tudo bem, tudo bem. Se tiver fome, venha sempre."
70008020-42 = "Elas são meio turbulentas, mas são boas garotas."
70008020-43 = "Ah…… sim."
70008020-44 = "Somos todos de Hyakkiyako, então sejam amigas."
70008020-46 = "Shh! Shh!! Vão logo!"
70008020-48 = "Arata, timidez tem limite――"
70008020-49 = "Vamos, deixa com os jovens. Nós vamos indo."
70008020-53 = "Hmm?"
70008020-58 = "Ser amiga?"
70008020-59 = "Nem ferrando!"
70008020-60 = "Ser amiga das Cem Flores, de jeito nenhum!"
70008020-65 = "Líder! Não nos deixe!"
70008020-72 = "Haa, haa…… consegui despistar?"
70008020-73 = "Ué?#nHoje não precisava fugir, né……"
70008020-78 = "Haa, haa…… líder, você ficou mais rápida."
70008020-79 = "É de tanto fugir……"
70008020-80 = "Cala boca! Ficar mais rápido é bom!"
70008020-81 = "Mas…… a conversa de antes não foi boa?"
70008020-82 = "O quê?"
70008020-83 = "Ser amiga das Cem Flores, assim não precisa fugir."
70008020-84 = "É. As Cem Flores são elites, talvez dêem cupons de festival."
70008020-85 = "Você tá falando sério……!?"
70008020-87 = "Não precisa ficar tão brava……"
70008020-88 = "Escuta? A Trupe Fantasma e as Cem Flores nunca serão amigas. É assim que é."
70008020-90 = "Hã…… quem decidiu isso?"
70008020-91 = "Isso…… é desde o começo!! Quem decidiu foi……!"
70008020-92 = "……"
70008020-93 = "Enfim! Não repitam essa bobagem!"
70008020-95 = "……Parece que a líder também não sabe, né?"
70008020-96 = "Melhor não perguntar."
70008020-98 = "Haa…… por causa dela perdemos tempo."
70008020-99 = "As lojas só têm coisas comuns…… não tem uma máscara especial?"
70008020-100 = "Hyakkiyako não é toda turística?"
70008020-101 = "Devia ter pesquisado antes……"
70008020-105 = "……Aquilo!"
70008020-106 = "Achei!!"
70008020-112 = "Hã?"
70008020-113 = "Hã…… hã!? O quê!?"