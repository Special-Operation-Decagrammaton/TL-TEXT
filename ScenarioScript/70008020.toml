[translation]
70008020-1 = "Aqueles que não se prendem a nada (2)"
70008020-4 = "Ah."
70008020-5 = "Hic."
70008020-6 = "Por que logo agora...!"
70008020-7 = "……."
70008020-8 = "Haa……."
70008020-9 = "Q-que reação é essa!"
70008020-10 = "O que você aprontou dessa vez?"
70008020-11 = "Eu não fiz nada ainda!!"
70008020-12 = "Ainda……?"
70008020-13 = "I-isso é uma pergunta capciosa!"
70008020-14 = "……Deixa eu investigar um pouco."
70008020-15 = "Não, hoje eu realmente não fiz nada... quer dizer, eu estou com pressa――"
70008020-19 = "Essa voz é…… Arata, não é?"
70008020-21 = "Ora, é verdade. Você trouxe amigos também?"
70008020-22 = "Sinto muito, mas não tenho nada para pedir hoje."
70008020-27 = "……Conhecidos?"
70008020-28 = "Só fiz um favor para ganhar um trocado."
70008020-29 = "Porque preciso de dinheiro para o festival……."
70008020-31 = "Ora, ora, entrem um pouco. Temos yokan. Vou preparar um chá também."
70008020-32 = "Podemos mesmo!? Líder, o que fazemos?"
70008020-34 = "Idiota! Estúpida! Não tem o que fazer nem deixar de fazer!"
70008020-36 = "Ah, é verdade…… Desculpe, hoje estou com um pouco de pressa……."
70008020-37 = "Entendo, entendo. Se estiverem com fome, venham sempre que quiserem."
70008020-42 = "Eles podem ser travessos, mas no fundo são boas crianças."
70008020-43 = "Ah…… sim."
70008020-44 = "Já que são todos de Hyakkiyako, tratem de se dar bem."
70008020-46 = "Xô! Xô!! Vão embora logo!!"
70008020-48 = "Arata, não precisa exagerar ao esconder o constrangimento――"
70008020-49 = "Vamos, vamos, deixemos o resto com os jovens. Vamos nos retirar."
70008020-53 = "Hmm?"
70008020-58 = "Nos dar bem?"
70008020-59 = "Nem ferrando!!"
70008020-60 = "Me dar bem com a Hyakka Ryoran? Dispenso, de jeito nenhum!!"
70008020-65 = "Líder! Não me deixe para trás~!"
70008020-72 = "Haa, haa, será que despistamos……?"
70008020-73 = "Ué? #nHoje não precisávamos ter fugido, precisávamos……?"
70008020-78 = "Haa, haa…… Líder, você ficou mais rápida, hein……."
70008020-79 = "É porque a gente só vive fugindo……."
70008020-80 = "Cala a boca! Ficar mais rápida é uma coisa boa, não é?!"
70008020-81 = "Mas…… aquela conversa de agora, não foi boa?"
70008020-82 = "O quê?"
70008020-83 = "De se dar bem com a Hyakka Ryoran. Se fizéssemos isso, não precisaríamos mais fugir, certo?"
70008020-84 = "É verdade. A Hyakka Ryoran é de elite, talvez até ganhássemos vales para o festival?"
70008020-85 = "Você está falando sério……!?"
70008020-87 = "Não precisa ficar tão brava……."
70008020-88 = "Escutem bem! A Trupe Chimi e a Hyakka Ryoran não podem se dar bem, aconteça o que acontecer. Já está decidido!"
70008020-90 = "Eh…… quem foi que decidiu isso……?"
70008020-91 = "I-isso…… é desde o começo!! A pessoa que decidiu isso……!"
70008020-92 = "……."
70008020-93 = "De qualquer forma! Não ouse falar uma bobagem dessas de novo!!"
70008020-95 = "……Parece que nem o líder sabe muito sobre isso, né?"
70008020-96 = "É melhor não perguntar mais sobre isso."
70008020-98 = "Haa... perdemos um tempo precioso por causa daquele cara."
70008020-99 = "A rua comercial só tem coisas sem graça... não tem nenhuma máscara especial que chame a atenção...?"
70008020-100 = "Hyakkiyako não é toda feita de pontos turísticos?"
70008020-101 = "Se eu soubesse, teria pesquisado melhor antes de vir..."
70008020-105 = "……Ali!"
70008020-106 = "Eu encontrei!!"
70008020-112 = "Hm?"
70008020-113 = "Eh... eh!? O quê!?"
