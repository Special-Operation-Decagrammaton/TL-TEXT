[translation]
10017060-1 = "第６話;若草者・語"
10017060-2 = "キヴォトス市内"
10017060-5 = "ハナエちゃん、目的地は……？"
10017060-9 = "もう少しです！"
10017060-10 = "よりによって、こんな真逆の方面で……。"
10017060-11 = "うぅ、落ち着かないクリスマスです……。"
10017060-12 = "ふふっ……まあ、私たちは救護騎士団ですから。"
10017060-13 = "ですね。どうか、誰も怪我していませんように……！"
10017060-15 = "ドカアアアァァァン！！！"
10017060-19 = "きゃぁっ！？"
10017060-20 = "ひゃあぁぁっ！？"
10017060-21 = "この爆音、まさか……？"
10017060-22 = "急ぎましょう、先輩！"
10017060-23 = "そうですね……！"
10017060-25 = "カフェ<White&Mason>入口"
10017060-28 = "はぁ、はぁ……!"
10017060-29 = "ごめんなさい、ツルギ先輩……もう……。"
10017060-34 = "ひひっ……。"
10017060-35 = "さすがは、ツルギ委員長……#n「トリニティの戦略兵器」の名は伊達ではありませんね……。"
10017060-36 = "きぇぇぇぇ……"
10017060-37 = "そろそろ、帰ったらどうだ……"
10017060-38 = "そうはいきません！"
10017060-39 = "……どうして、こんなことを？"
10017060-40 = "「どうして」ですって！？#nあれだけのことをしておいて、分かっていらっしゃらないと！？"
10017060-41 = "正義実現委員会ともあろう者が、こんなことに……！"
10017060-42 = "これは、相当強度の高い「救護」が必要でしょうか！"
10017060-43 = "きええぇぇぇぇぇっ！"
10017060-48 = "団長！"
10017060-49 = "団長、大丈夫ですか……！？"
10017060-51 = "ハナエ、セリナ、来てくれましたか。"
10017060-52 = "私はまだ大丈夫です。"
10017060-53 = "苦言を呈する勇気を持ってして、初めて「友」と名乗れるでしょうから。"
10017060-54 = "倒れるわけにはいきません、この思いが彼女たちに届くまで！"
10017060-55 = "[s1] \"あっ、ツルギだ。\"\n[s2] \"こんばんは、ツルギ。\""
10017060-58 = "せ、せせせせせ先生！？"
10017060-61 = "（ど、どうしてよりにもよって先生の前で、こんなところを……！？)"
10017060-64 = "き、きえええぇぇぇっ！？"
10017060-69 = "あっ……！？#n委員長さん、生まれたばかりのアリクイみたいに倒れてしまいました！"
10017060-70 = "何をしたんですか、先生！？"
10017060-71 = "[s3] \"何もしてませんけど！？\"\n[s4] \"私！？\""
10017060-75 = "これは一体何の騒ぎですか！？"
10017060-79 = "ツ、ツルギ！？気をしっかり、何があったのですか！？#nどうしてそんな生まれたばかりのアリクイみたいに……！？"
10017060-80 = "ついにお出ましですか、ハスミ副委員長。"
10017060-81 = "救護騎士団のみなさん……？"
10017060-82 = "クリスマスの日に、正義実現委員会への襲撃……。"
10017060-83 = "……場合によっては政治的な問題に飛び火しかねないということ、みなさんならお分かりですよね？"
10017060-84 = "それでもこのような行為に及んだ理由……聞かせていただけますか？"
10017060-85 = "返答次第では、我々としても……！"
10017060-87 = "え、えっ……！？"
10017060-88 = "わ、私たちは……！"
10017060-90 = "友として、目を覚ましに来ただけです！"
10017060-91 = "説明になっていませんよ！？"
10017060-92 = "ハスミ副委員長も、この事態の深刻さが分からないとおっしゃってるのですか！？"
10017060-93 = "悲しいです、心から！"
10017060-94 = "私たちはただ、あなたたちに「救護」を提供します！"
10017060-95 = "正義実現委員会の崇高なる正義が、#nもう一度この地に戻って来られるように！"
10017060-96 = "目を覚ますまで、私たちは手を下してでも……！"
10017060-97 = "あの、話が見えないのですが……。"
10017060-98 = "善意の方々の物を奪うことの、どこが正義なのですか！"
10017060-99 = "私たちが、何を奪ったと……？#n一から事情を話してもらえませんか？"
10017060-100 = "それに何より……ここで暴れるのはやめてください！"
10017060-101 = "この「White&Mason」を借りるのが、どれだけ大変だったか分かりますか！？#nそれも、他の部活や委員会の牽制と陰謀を突破して！"
10017060-102 = "ツルギを交渉現場に行かせてまで！#nようやく借りられたというのに！"
10017060-103 = "ツルギ委員長を交渉に出すのはズルではありませんか！？"
10017060-104 = "委員会の皆のため、手段と方法を選んでいる場合ではなかったんです！"
10017060-105 = "前半までは良い話ですけれど！"
10017060-106 = "とにかく！#nそれだけ苦労したというのに、大騒ぎにさせないでください！"
10017060-107 = "ここで暴れ続けると、全部台無しになりかねないんです！"
10017060-108 = "それでもダメなものはダメです！#n今からでも遅くありません、戻ってきてください！"
10017060-109 = "相変わらず頑固で時々意味の分からない……！いつもそうです、1年生の時もあのパウンドケーキを……!"
10017060-110 = "それは言わない約束ですよね！？#nそういう副委員長こそ、新入生の時にプリンを……!"
10017060-111 = "それ以上その話をしたら、本当に政治問題にしますよ……。"
10017060-112 = "先に話を出したのは副委員長の方でしょう！？"
10017060-113 = "[s5] \"あの……？\"\n[s6] \"何の話かさっぱりだけど、私も混ぜてもらって良い？\" "
10017060-117 = "せ、先生！ちょうど良いところに#n聞いてください、ミネ団長が急に……!"
10017060-118 = "変なところを見せてしまい恐縮なのですが、ハスミ副委員長が……!"
10017060-119 = "私が先に話しているのですよ！"
10017060-120 = "先生と今日先に会ったのは私です！"
10017060-134 = "……本当に話になりませんね。"
10017060-135 = "その点だけは同意です。"
10017060-137 = "わ、私たちは一体どうすれば……"
10017060-138 = "……。"
10017060-139 = "セリナ、ハナエ。"
10017060-140 = "この場に最も必要な「救護」とは何か……そこに今、言葉を尽くしている時間はありません。"
10017060-141 = "自分で考えて、判断してください。"
10017060-142 = "私を助けて、正義実現委員会の目を覚ますのも良いでしょう。"
10017060-143 = "或いは……治療が必要な、正義実現委員会の少女たちを助けるのも良いことです。"
10017060-144 = "いつどこでも、救護の心を持つこと。#nそれが私たちにとって最も大事なことですから。"
10017060-157 = "ど、どうしましょう先輩！？"
10017060-158 = "……まずは、団長の方を。それが最終的に、一番良いはずです。"
10017060-159 = "だ、大丈夫なんでしょうか……？"
10017060-160 = "どちらかを捨てる、ということではありません。"
10017060-161 = "つまり、両方ともやるんです！"
10017060-163 = "……『救護が必要な場に救護を』？"
10017060-164 = "はい、『救護が必要な場に救護を』！#nそれが私たち、救護騎士団ですから！"
10017060-165 = "ですが、こんなに多くの方々が怪我をして……"
10017060-166 = "全部が終わった後、救護騎士団と正義実現委員会は仲直りできるのでしょうか……？"
10017060-167 = "ハナエちゃん……治せないはずがありません。"
10017060-168 = "え……？"
10017060-169 = "だって、私たちが治療するんですから。"
10017060-170 = "……！"
10017060-171 = "覚悟は、必要ですけどね？"
10017060-172 = "そ、そうですね！"
10017060-173 = "すごく忙しくなりそうです。"
10017060-174 = "でもどうせなら、私は笑顔でやります！"
10017060-176 = "よろしくお願いしますね！"
10017060-177 = "行きますよ、正義実現委員会……！"
10017060-178 = "あなたたちの視界を照らしてみせます……戻ってきてください！"
