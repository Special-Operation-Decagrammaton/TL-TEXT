[translation]
10017060-1 = "Episódio 6: Jovem e Palavras"
10017060-2 = "Cidade de Kivotos"
10017060-5 = "Hanae-chan, o destino é...?"
10017060-9 = "Estamos quase chegando!"
10017060-10 = "Logo agora, em uma direção tão oposta..."
10017060-11 = "Ugh, que Natal inquietante..."
10017060-12 = "Fufu... bem, nós somos da Unidade de Socorro."
10017060-13 = "É verdade. Por favor, que ninguém esteja ferido...!"
10017060-15 = "BOOOOM!!!"
10017060-19 = "Kyaa!?"
10017060-20 = "Hyaaa!?"
10017060-21 = "Esse estrondo, será que...?"
10017060-22 = "Vamos nos apressar, senpai!"
10017060-23 = "Com certeza...!"
10017060-25 = "Entrada do Café <White&Mason>"
10017060-28 = "Haa, haa...!"
10017060-29 = "Desculpe, Tsurugi-senpai... eu não consigo mais..."
10017060-34 = "Hihi..."
10017060-35 = "Como esperado da Presidente Tsurugi... O título de \"Arma Estratégica da Trinity\" não é apenas um enfeite..."
10017060-36 = "Kieeee..."
10017060-37 = "Por que não volta para casa agora..."
10017060-38 = "Não posso fazer isso!"
10017060-39 = "...Por que você está fazendo isso?"
10017060-40 = "Como assim \"por que\"!? Depois de fazer tudo isso, você ainda não entende!?"
10017060-41 = "Sendo do Comitê de Justiça, chegar a esse ponto...!"
10017060-42 = "Será que isso requer um \"socorro\" de alta intensidade!?"
10017060-43 = "Kieeeeeee!"
10017060-48 = "Líder!"
10017060-49 = "Líder, você está bem...!?"
10017060-51 = "Hanae, Serina, vocês vieram."
10017060-52 = "Eu ainda estou bem."
10017060-53 = "Pois só tendo a coragem de expressar críticas é que se pode ser chamado de \"amigo\"."
10017060-54 = "Não posso cair, até que esse sentimento chegue até elas!"
10017060-55 = "[s1] \"Ah, é a Tsurugi.\"\n[s2] \"Boa noite, Tsurugi.\""
10017060-58 = "Se-se-se-sensei!?"
10017060-61 = "(Po-por que, logo na frente do Sensei, em um lugar como este...!)"
10017060-64 = "Ki-kieeee!?"
10017060-69 = "Ah...!? A Presidente caiu como um tamanduá recém-nascido!"
10017060-70 = "O que você fez, Sensei!?"
10017060-71 = "[s3] \"Eu não fiz nada!\"\n[s4] \"Eu!?\""
10017060-75 = "Que confusão é essa aqui!?"
10017060-79 = "T-Tsurugi!? Mantenha a calma, o que aconteceu!? Por que você está como um tamanduá recém-nascido...!"
10017060-80 = "Finalmente deu as caras, Vice-Presidente Hasumi."
10017060-81 = "Pessoal da Unidade de Socorro...?"
10017060-82 = "No dia de Natal, um ataque ao Comitê de Justiça..."
10017060-83 = "...Vocês sabem que, dependendo da situação, isso pode se tornar um problema político, certo?"
10017060-84 = "Poderiam me dizer o motivo de terem chegado a tal ato...?"
10017060-85 = "Dependendo da resposta, nós também teremos que...!"
10017060-87 = "E-eh...!?"
10017060-88 = "N-nós...!"
10017060-90 = "Como amiga, só vim aqui para te fazer acordar!"
10017060-91 = "Isso não é uma explicação!?"
10017060-92 = "Vice-presidente Hasumi, você também está dizendo que não entende a gravidade desta situação!?"
10017060-93 = "É triste, do fundo do meu coração!"
10017060-94 = "Nós apenas queremos oferecer \"socorro\" a vocês!"

10017060-95 = "Para que a sublime justiça do Comitê de Realização da Justiça possa#nretornar a este lugar mais uma vez!"
10017060-96 = "Até que vocês acordem, nós vamos usar a força se for preciso...!"
10017060-97 = "Com licença, não estou entendendo nada do que está acontecendo..."
10017060-98 = "Onde está a justiça em tirar as coisas de pessoas bem-intencionadas!"
10017060-99 = "O que exatamente nós tiramos...?#nPoderia nos explicar a situação desde o início?"
10017060-100 = "E acima de tudo... parem de causar confusão aqui!"
10017060-101 = "Você tem ideia de quão difícil foi alugar este \"White & Mason\"!?#nTivemos que superar as obstruções e conspirações de outros clubes e comitês!"

10017060-102 = "Tivemos até que mandar a Tsurugi para o local da negociação!#nE só conseguimos alugar depois de tudo isso!"
10017060-103 = "Não é trapaça enviar a presidente Tsurugi para negociar!?"
10017060-104 = "Pelo bem de todos no comitê, não estávamos em posição de escolher meios ou métodos!"
10017060-105 = "Até a primeira parte, é uma história bonita, mas!"
10017060-106 = "Enfim!#nDepois de tanto esforço, não deixem que isso vire uma bagunça!"
10017060-107 = "Se continuarem causando confusão aqui, tudo pode ir por água abaixo!"
10017060-108 = "Mesmo assim, o que está errado, está errado!#nAinda não é tarde demais, por favor, voltem atrás!"
10017060-109 = "Você continua teimosa e às vezes incompreensível...! Sempre foi assim, desde o primeiro ano, com aquele bolo de libra...!"
10017060-110 = "Tínhamos um acordo de não falar sobre isso, não tínhamos!?#nFalando nisso, a vice-presidente, quando era caloura, comeu o pudim...!"
10017060-111 = "Se você falar mais sobre isso, eu realmente vou transformar isso em um problema político..."
10017060-112 = "Foi você quem tocou no assunto primeiro, vice-presidente!?"
10017060-113 = "[s5] \"Com licença...?\"\n[s6] \"Não entendi nada, mas posso me juntar à conversa?\""
10017060-117 = "Se-Sensei! Que bom que chegou!#nEscute, a Comandante Mine de repente...!"
10017060-118 = "Sinto muito por mostrar uma cena tão feia, mas a vice-presidente Hasumi...!"
10017060-119 = "Eu estou falando primeiro!"
10017060-120 = "Fui eu quem encontrei o Sensei primeiro hoje!"
10017060-134 = "...Isso realmente não tem cabimento."
10017060-135 = "Pelo menos nisso nós concordamos."
10017060-137 = "O-o que devemos fazer..."
10017060-138 = "..."
10017060-139 = "Serina, Hanae."
10017060-140 = "O que é o \"socorro\" mais necessário neste momento... não temos tempo para gastar palavras com isso agora."

10017060-141 = "Pensem por si mesmas e tomem uma decisão."
10017060-142 = "Podem me ajudar e tentar fazer o Comitê de Realização da Justiça acordar."
10017060-143 = "Ou... podem ajudar as garotas do Comitê de Realização da Justiça que precisam de tratamento."
10017060-144 = "Ter um coração voltado ao socorro, a qualquer hora e em qualquer lugar.#nIsso é o mais importante para nós."
10017060-157 = "O-o que faremos, veterana!?"
10017060-158 = "...Primeiro, vamos cuidar da comandante. No fim das contas, essa deve ser a melhor opção."
10017060-159 = "S-será que vai dar certo...?"
10017060-160 = "Não significa que vamos abandonar um lado."
10017060-161 = "Ou seja, vamos fazer os dois!"
10017060-163 = "...'Socorro onde o socorro é necessário'?"
10017060-164 = "Sim, 'Socorro onde o socorro é necessário'!#nPorque nós somos o Esquadrão de Socorro!"
10017060-165 = "Mas, com tantas pessoas feridas..."
10017060-166 = "Depois que tudo terminar, será que o Esquadrão de Socorro e o Comitê de Realização da Justiça conseguirão se entender...?"
10017060-167 = "Hanae-chan... não existe nada que não possamos curar."
10017060-168 = "Eh...?"
10017060-169 = "Porque somos nós que vamos tratar deles."
10017060-170 = "……！"
10017060-171 = "É preciso ter determinação, não é?"
10017060-172 = "I-isso mesmo!"
10017060-173 = "Parece que vai ficar muito ocupado."
10017060-174 = "Mas, já que é assim, eu farei tudo com um sorriso!"
10017060-176 = "Conto com você!"
10017060-177 = "Vamos lá, Comitê de Realização da Justiça……!"
10017060-178 = "Eu vou iluminar o caminho de vocês…… por favor, voltem!"
