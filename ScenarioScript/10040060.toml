[translation]
10040060-1 = "Episódio 6; Testemunha Koyuki!"
10040060-4 = "É aqui, né..."
10040060-5 = "Este é um dos túneis subterrâneos que não são mais usados."
10040060-6 = "Não há câmeras de vigilância ou sistemas de detecção de intrusos instalados aqui. #nEmbora esteja dentro da jurisdição do Seminar, é um lugar que eles não conseguem monitorar."
10040060-7 = "É, é mesmo... ugh."
10040060-8 = "É escuro e não tem ninguém, é meio assustador..."
10040060-9 = "Eu não acredito que um lugar desses existia..."
10040060-10 = "Este é o único caminho para escapar sem passar pelos sistemas de segurança."
10040060-11 = "Eu entendo isso... mas, tipo, sabe..."
10040060-15 = "N-não, esquece. #nDeve ser só impressão minha..."
10040060-17 = "……?"
10040060-18 = "Por favor, siga em frente. Não podemos perder tempo."
10040060-19 = "Só que... daqui em diante, não poderemos dar suporte."
10040060-20 = "[s1] \"O que você quer dizer?\"\n[s2] \"Problemas de comunicação?\""
10040060-23 = "Sim, é um lugar onde o sinal não chega."
10040060-24 = "É um pouco confuso, mas não é nada que faça alguém se perder. #nSe você seguir como eu disse antes, não haverá problemas."
10040060-25 = "Quando chegar do outro lado, há uma saída subterrânea."
10040060-26 = "Eu avisei a Maki para esperar lá, então fujam juntas."
10040060-28 = "Falando nisso... está realmente muito escuro. Desse jeito, é fácil tropeçar, não é?"
10040060-29 = "Seria um problema se alguém se machucasse... não dá para acender a luz?"
10040060-30 = "Vamos ser encontrados imediatamente..."
10040060-31 = "[s3] \"Mas é perigoso se alguém se machucar...\"\n[s4] \"Não tem como ligar de algum jeito?\""
10040060-34 = "...Até você, Sensei?"
10040060-35 = "Hmm. Acho que as luzes acendem, mas o problema é o que vem depois."
10040060-36 = "Se usarmos eletricidade, a sala de controle será notificada. #nOu seja, nossa localização será revelada."
10040060-37 = "Claro, se conseguirmos escapar antes que nos peguem, tudo bem, mas..."
10040060-38 = "Sensei, o que vamos fazer?"
10040060-39 = "...Tem certeza de que quer ligar?"
10040060-40 = "Porque não quer que ninguém se machuque...?"
10040060-44 = "...Entendido."
10040060-45 = "Isso é bem a sua cara, Sensei. Não tem jeito."
10040060-46 = "Ao virar na parede à direita, há um interruptor logo ali."
10040060-47 = "Mas, como eu disse antes, eles vão perceber imediatamente. #nPor favor, escape o mais rápido possível."
10040060-48 = "Entendido! Parede da direita~♪ Parede da direita~♪"
10040060-49 = "Achei~!"
10040060-54 = "...Ué?"
10040060-55 = "Ouvi um som como se algo tivesse ligado..."
10040060-61 = "Q-que é isso!? Por que está fazendo esse barulho!?"
10040060-62 = "Isso é..."
10040060-63 = "Um drone...!"
10040060-64 = "Eeeeeeeeeh!?"
10040060-65 = "[ns5] \"Já sabiam desde o início!?\"\n[ns6] \"Eles nos cercaram...\""
10040060-68 = "P-pelo menos temos que sair daí...!"
10040060-69 = "Fujam rápido...!"
