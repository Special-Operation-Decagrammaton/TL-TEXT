[translation]
10040060-1 = "第6話;ウィットネス・コユキ！"
10040060-4 = "ここ、ですね……。"
10040060-5 = "もう使われてない地下通路のひとつです。"
10040060-6 = "監視カメラや侵入検知システム等は設置されてません。#nセミナーの管轄範囲内ではありますが、感知できない場所です。"
10040060-7 = "そ、そうなんですね……うぅ。"
10040060-8 = "暗いしひと気もなくて、なんか怖いなぁ……。"
10040060-9 = "こんな場所があったなんて……。"
10040060-10 = "セキュリティシステムを避けて逃げられるのは、ここしかないからね。"
10040060-11 = "それは分かってます……けど、なんか、その……。"
10040060-15 = "や、やっぱりいいです。#nたぶん気のせいですから……。"
10040060-17 = "……？"
10040060-18 = "そこを進んでください。もたもたしていられません。"
10040060-19 = "ただ……ここから先、私たちは支援できそうにありません。"
10040060-20 = "[s1] \"どういうこと？\"\n[s2] \"通信の問題とか？\""
10040060-23 = "はい、電波の届かない場所なので。"
10040060-24 = "多少入り組んではいますが、迷子になるほどではないので。#nさきほどお話したとおりに進めば問題ないでしょう。"
10040060-25 = "反対側に着いたら、地下道があるんだ。"
10040060-26 = "マキにそこで待機してるように連絡しておいたから、一緒に脱出して。"
10040060-28 = "それはそうと……本当に真っ暗ですね。これじゃあ、転んじゃいそうですけど？"
10040060-29 = "怪我したら大変ですし……電気をつけちゃダメですか？"
10040060-30 = "すぐ見つかってしまいますよ……。"
10040060-31 = "[s3] \"でも怪我したら危ないから……\"\n[s4] \"なんとかつけられないかな。\""
10040060-34 = "……先生まで？"
10040060-35 = "うーん。灯りならつくと思うけど、問題はその後だよね。"
10040060-36 = "電力を使うと、制御室に通知が行く。#nつまり、位置がバレちゃう。"
10040060-37 = "もちろん、捕まえる前に逃げ切っちゃえば良いんだけど……。"
10040060-38 = "先生、どうする？"
10040060-39 = "……本当につけて良いの？"
10040060-40 = "誰にも怪我してほしくないから……？"
10040060-44 = "……分かった。"
10040060-45 = "先生らしいですね、仕方ありません。"
10040060-46 = "右の壁を曲がると、すぐにスイッチがあります。"
10040060-47 = "ですが先ほどお話したとおり、向こうはすぐ気づくはずです。#n可能な限り素早く脱出してください。"
10040060-48 = "わかってますよ！みっぎの壁～♪みっぎの壁～♪"
10040060-49 = "ありましたぁ～！"
10040060-54 = "……あれ？"
10040060-55 = "なにか起動したような音が……。"
10040060-61 = "な、なんですかこれ～！？なんでこんな音がするんですか～！？"
10040060-62 = "これは……。"
10040060-63 = "ドローンです……！"
10040060-64 = "えええええええ！？"
10040060-65 = "[ns5] \"最初からバレてたの！？\"\n[ns6] \"先回りされてるなんて……。\""
10040060-68 = "と、とりあえずそこから出ないと……！"
10040060-69 = "急いで逃げて……！"
