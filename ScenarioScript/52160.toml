[translation]
52160-1 = "Episódio 16; Flor Artificial"
52160-4 = "……A fuligem se acumulou, não é mesmo."
52160-5 = "Será que isso também, originalmente, era um galho tingido pela neve?"
52160-6 = "Que aroma agradável…… Você também gostaria de beber? Shuro."
52160-7 = "S-sim! Se é a senhorita Kokuriko quem está servindo……!"
52160-12 = "O trabalho na noite passada foi cansativo, não foi."
52160-13 = "Você uniu forças com Azami, repeliu a Hyakkiyako no \"Registro de Monstros de Inatei\"…… e, além disso, capturou o Sensei do Schale."
52160-14 = "Eu estava preocupada que vocês pudessem estar em conflito, mas…… você é uma boa menina, Shuro."
52160-15 = "N-não, aquilo foi porque o outro lado, por conta própria……"
52160-16 = "Hum…… aconteceu alguma coisa?"
52160-17 = "Ah, sobre isso……"
52160-18 = "……Eu me esforcei pela senhorita Kokuriko."
52160-19 = "Para o belo desfecho de uma história, as dificuldades são inevitáveis."
52160-20 = "Não sei o que aconteceu, mas considero que capturar o Sensei do Schale foi um mérito seu."
52160-21 = "Ele é como um tronco flutuante que turva o grande rio.#nSubstituindo o desespero pela esperança, a tragédia pela comédia, e intervindo na história――"
52160-22 = "Para nós, que transformamos rumores em histórias de fantasmas…… ele é, por assim dizer, um inimigo natural."
52160-23 = "Se tivéssemos que enfrentar ele e a Hyakkiyako ao mesmo tempo……#nmesmo com o poder do livro de mistérios, teria sido difícil vencer, não é."
52160-24 = "Mas, graças a você tê-lo separado dos alunos, conseguimos capturá-lo.#nVocê é realmente uma boa menina, Shuro."
52160-25 = "Senhorita Kokuriko……!"
52160-26 = "Apenas―― há uma coisa que não entendo, sabe?"
52160-27 = "Ouvi dizer que o Sensei sempre prioriza os alunos acima da própria vida.#nMas, naquela hora, ele perseguiu você, Shuro, que deveria ser sua inimiga…… você tinha algum plano secreto?"
52160-32 = "I-isso é……"
52160-36 = "……Eh?"
52160-37 = "……Sensei do Schale?"
52160-38 = "Por que você apareceu de repente……?"
52160-39 = "\"Vim te salvar.\""
52160-40 = "Mas……"
52160-41 = "Você…… você tentou me matar……"
52160-42 = "O-o que você está entendendo errado!?"
52160-43 = "Você acha que, com isso, eu vou me tornar uma boa menina!?"
52160-44 = "\"Não preciso de motivos para salvar alguém que está em perigo.\""
52160-45 = "\"Como ser humano, é a coisa natural a se fazer.\""
52160-49 = "……Na verdade, nem eu mesma entendo muito bem."
52160-50 = "Ouvi dizer que ele costuma ter comportamentos excêntricos.#nNaquela hora, não teria sido apenas um capricho dele……?"
52160-54 = "……Pois é.#nImprevisível…… essa pode ser a força e, ao mesmo tempo, a fraqueza dele."
52160-55 = "Diga-me, senhorita Kokuriko……"
52160-56 = "O que houve?"
52160-60 = "Quando capturamos o Sensei do Schale……"
52160-64 = "Vamos, atire logo nele!"
52160-75 = "Eh……?"
52160-78 = "O Tsukumogami criado a partir do \"Registro de Monstros de Inatei\" atacou a mim, e não a Hyakkiyako."
52160-79 = "Originalmente, seres nascidos de livros de mistérios não deveriam causar dano aos \"aliados\"……"
52160-84 = "……Pois é."
52160-85 = "I-isso mesmo, não é? Por que de repente ele me……"
52160-86 = "Se o coração que serve de semente para uma história de fantasmas é frágil e efêmero,#nentão o que nasce dele também o é."
52160-87 = "Já que não podemos confiar no coração humano que pende tão facilmente…… existe alguma razão para confiar nas assombrações que nascem dele?"
52160-88 = "No fim das contas, é como uma miragem que desaparece quando os rumores se acalmam.#nNão adianta se preocupar com isso."
52160-93 = "A \"Ayame\" que estava com a Hyakkiyako é a história dos cem contos criada pelo coração da Nagusa…… não é?"
52160-94 = "A forma como ela ria e se entristecia junto com a Nagusa…… parecia tão real……"
52160-95 = "Pelo menos, ela mesma parecia não ser diferente de uma aluna comum."
52160-96 = "……Senhorita Kokuriko."
52160-97 = "É possível que uma história de fantasmas, nascida de um conto de terror, acredite piamente que é uma das alunas?"
52160-101 = "……Que pergunta tola."
52160-102 = "É uma pergunta que não tem sentido nem necessidade de eu responder, mas..."
52160-103 = "Por que você está perguntando isso?"
52160-104 = "Se por acaso... eu, que não tenho memória alguma além da senhorita Kokuriko —"
52160-105 = "Quando os rumores se acalmarem... o que acontecerá comigo?#nEu fiquei curiosa..."
52160-110 = "Ora... o chá esfriou."
52160-111 = "Então... a conversa termina aqui?"
52160-112 = "Bem... vou dar uma olhada na situação."
52160-113 = "A Hyakkiyako e o sensei do Schale estão aqui.#nNão há mais ninguém para atrapalhar."
52160-114 = "Continuaremos a conversa quando o mundo estiver em chamas... pode ser assim?#nShuro."
52160-121 = "……Sim."
52160-123 = "Próximo episódio: O Retorno da Presidente"
