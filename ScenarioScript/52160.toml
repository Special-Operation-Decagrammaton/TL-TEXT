[translation]
52160-1 = "Episódio 16; Flor Artificial"
52160-4 = "......Fuligem acumulou, não é."
52160-5 = "Será que isso, originalmente, era um galho tingido pela neve?"
52160-6 = "Que aroma agradável...... você também quer beber? Shuro."
52160-7 = "S, sim! Se é a Kokuriko-sama quem está servindo......!"
52160-12 = "O trabalho de ontem à noite foi cansativo, não foi?"
52160-13 = "Você deu as mãos a Azami, repeliu a Hyakkaryouran com o 'Inotei Mononokeroku'... e, além disso, capturou o Sensei da Schale."
52160-14 = "Eu estava preocupada que vocês pudessem estar em conflito um com o outro, mas...... você é uma boa menina, Shuro."
52160-15 = "N, não, aquilo foi porque eles......"
52160-16 = "Hum...... aconteceu alguma coisa?"
52160-17 = "Ah, sobre isso......"
52160-18 = "......Eu me esforcei pela Kokuriko-sama."
52160-19 = "Dificuldades sempre acompanham o belo desfecho de uma história."
52160-20 = "Não sei o que aconteceu, mas acredito que capturar o Sensei da Schale foi mérito seu."
52160-21 = "Aquele homem é como um tronco flutuante que turva o grande rio. #n Ele substitui o desespero por esperança, a tragédia por comédia, e intervém na história――"
52160-22 = "Para nós, que transformamos boatos em histórias de fantasmas...... ele é, por assim dizer, um inimigo natural."
52160-23 = "Se tivéssemos que enfrentar ele e a Hyakkaryouran ao mesmo tempo...... #n mesmo com o poder dos livros misteriosos, teria sido difícil vencer."
52160-24 = "Mas, graças ao fato de você tê-lo separado das alunas, conseguimos capturá-lo. #n Você é realmente uma boa menina, Shuro."
52160-25 = "Kokuriko-sama......!"
52160-26 = "Só que―― tem uma coisa que eu não entendo."
52160-27 = "Ouvi dizer que o Sensei prioriza as alunas acima de si mesmo. #n Mas, naquela hora, ele perseguiu você, Shuro, que deveria ser a inimiga...... você tinha algum plano secreto?"
52160-32 = "Is, isso é......"
52160-36 = "......Eh?"
52160-37 = "......Sensei da Schale?"
52160-38 = "Por que você veio correndo......?"
52160-39 = "\"Vim te salvar.\""
52160-40 = "Mas......"
52160-41 = "Eu...... tentei te matar......"
52160-42 = "O, o que você está pensando, sua idiota!?"
52160-43 = "Você acha mesmo que isso faria de você uma 'boa menina'!?"
52160-44 = "\"Não preciso de motivos para salvar uma aluna em perigo.\""
52160-45 = "\"É o que se espera de um ser humano.\""
52160-49 = "......Na verdade, nem eu entendo muito bem."
52160-50 = "Dizem que ele sempre faz coisas imprevisíveis. #n Naquela hora também, será que não foi apenas um capricho......?"
52160-54 = "......É verdade. #n Imprevisibilidade...... talvez essa seja sua força e também sua fraqueza."
52160-55 = "Ei, Kokuriko-sama......"
52160-56 = "O que foi?"
52160-60 = "Quando capturei o Sensei da Schale......"
52160-64 = "Vamos, atire logo!"
52160-75 = "Eh......?"
52160-78 = "A assombração criada pelo 'Inotei Mononokeroku' atacou a mim, não a Hyakkaryouran."
52160-79 = "Originalmente, as existências nascidas dos livros misteriosos não deveriam causar dano aos 'aliados'......"
52160-84 = "......É verdade."
52160-85 = "C, certo? Por que de repente atacou a mim......"
52160-86 = "Se o coração que serve como semente para uma história de fantasma é frágil e efêmero, #n o que nasce dele também o é."
52160-87 = "É impossível confiar em corações humanos que vacilam tão facilmente...... então, que razão haveria para confiar nas assombrações que nascem deles?"
52160-88 = "No fim das contas, são como o calor tremeluzente que desaparece assim que os boatos se acalmam. #n Não há sentido em se preocupar com isso."
52160-93 = "A 'Ayame' que estava com a Hyakkaryouran era uma Hyakumonogatari criada pelo coração da Nagusa...... não era?"
52160-94 = "A forma como ela ria e chorava junto com a Nagusa...... parecia tão real......"
52160-95 = "Pelo menos, ela mesma parecia não ser diferente de uma aluna comum."
52160-96 = "......Kokuriko-sama."
52160-97 = "Será que uma Hyakumonogatari nascida de uma história de fantasma pode acreditar genuinamente que é uma aluna?"
52160-101 = "......Que pergunta boba."
52160-102 = "É uma pergunta que eu não preciso nem tenho motivo para responder......"
52160-103 = "Por que você pergunta isso?"
52160-104 = "Se, por acaso...... eu, que não tenho nenhuma lembrança além de você, Kokuriko-sama――"
52160-105 = "O que aconteceria quando os boatos se acalmarem? #n Fico curiosa......"
52160-110 = "Ora...... o chá esfriou."
52160-111 = "Então, a conversa acaba aqui?"
52160-112 = "Bem...... vou dar uma olhada lá fora."
52160-113 = "A Hyakkaryouran e o Sensei da Schale estão aqui. #n Não há mais ninguém para nos atrapalhar."
52160-114 = "Continuaremos essa conversa―― no momento em que o mundo for consumido pelas chamas... está bem assim para você? #n Shuro."
52160-121 = "......Sim."
52160-123 = "Próximo Episódio; O Retorno da Presidente"

