[translation]
52160-1 = "第16話;造花"
52160-4 = "……[ruby=すす]煤[/ruby]が、積もったねえ。"
52160-5 = "これも、元は雪に染められた枝だったんやろか。"
52160-6 = "ええ香り……おまえさんも飲むかえ？シュロ。"
52160-7 = "は、はい！コクリコ様が淹れてくださるのなら……！"
52160-12 = "[ruby=せんや]先夜[/ruby]はご苦労だったねえ。"
52160-13 = "アザミと手を取って、「[ruby=とうていぶっかいろく]稲亭物怪録[/ruby]」で百花繚乱を退け……その上、シャーレの先生を捕らえたときた。"
52160-14 = "てっきり、いがみ合ってるんじゃないかと案じていたんやけど……ええ子やね、シュロ。"
52160-15 = "い、いえ、あれは向こうが勝手に……。"
52160-16 = "ふむ……何かあったのかえ？"
52160-17 = "あっ、その……。"
52160-18 = "……コクリコ様のために頑張りました。"
52160-19 = "物語の美しき終幕のためには、苦難がつきものさね。"
52160-20 = "何があったかは知らへんけど、シャーレの先生を捕らえたのはおまえさんの功やと思うとるよ。"
52160-21 = "アレは、大河を濁らせる流木のようなもの。#n絶望を希望に、悲劇を喜劇へとすり替え、物語へと介入する――"
52160-22 = "風聞を怪談とする我らにとっての……いわば天敵。"
52160-23 = "あの者と百花繚乱を同時に相手取ることになっていたら……#n例え怪書の力を以てしても、勝つのは難しかったやろねぇ。"
52160-24 = "でも、おまえさんが生徒と引き離してくれたおかげで、捕らえることができた。#n本当に良い子やね、シュロ。"
52160-25 = "コクリコ様ぁ……！"
52160-26 = "ただ――ひとつ、分からんことがあってなぁ？"
52160-27 = "先生は、常に自分の身よりも生徒を優先すると聞くからねぇ。#nでも、あの時は敵であるはずのシュロを追った……おまえさん、何か秘策でもあったのかえ？"
52160-32 = "そ、それは……。"
52160-36 = "……え？"
52160-37 = "……シャーレの先生？"
52160-38 = "なんで飛び出して……？"
52160-39 = "\"助けにきたよ。\""
52160-40 = "でも……。"
52160-41 = "手前は……手前を殺そうとしたのに……。"
52160-42 = "な、なにを勘違いしてるんですかぁ！？"
52160-43 = "そんなことで、手前がいい子になるとでも！？"
52160-44 = "\"危険に陥った子を助けるのに理由はいらない。\""
52160-45 = "\"人として、当然のことだよ。\""
52160-49 = "……実は、手前にもよく分かっていないんです。"
52160-50 = "普段から奇行に走ることもあると聞きます。#nあの時も、気まぐれを起こしたのでは……？"
52160-54 = "……そうさな。#n予測不可能……それが、あの者の強みであり、弱みやもしれんね。"
52160-55 = "あの、コクリコ様……。"
52160-56 = "どうしたのかえ？"
52160-60 = "シャーレの先生を捕まえた時……。"
52160-64 = "ほら、さっさと[ruby=や]撃[/ruby]るんですよぉ！"
52160-75 = "え……？"
52160-78 = "「稲亭物怪録」から作られた付喪神は、百花繚乱ではなく手前を襲いました。"
52160-79 = "本来、怪書から生まれた存在は、「味方」に危害を加えないはずなのに……。"
52160-84 = "……そうさな。"
52160-85 = "そ、そうですよね？どうして急に手前を……。"
52160-86 = "怪談の種となる心が脆く儚いものなれば、#nそこから生まれるものも然り。"
52160-87 = "あっけなく傾く人の心を信じられないというのに……そこから生まれ出ずる怪異を信頼できる道理があるかえ？"
52160-88 = "所詮は噂が静まれば消えゆく陽炎のようなもの。#n気にしても詮無きことさね。"
52160-93 = "百花繚乱と一緒にいた「アヤメ」は、ナグサの心が生み出した百物語……なんですよね？"
52160-94 = "ナグサと共に笑い、悲しむ姿は……なんだか本物みたいで……。"
52160-95 = "少なくとも彼女自身は、普通の生徒と変わらないように見えました。"
52160-96 = "……コクリコ様。"
52160-97 = "怪談から生まれた百物語が、自分を生徒の一人だと信じ込むことはあるんですか？"
52160-101 = "……愚問さね。"
52160-102 = "我が答える意味も、必要もない問いやけど……。"
52160-103 = "何故、それを聞くのかえ？"
52160-104 = "もしも……コクリコ様のこと以外、何の記憶も持っていない手前が――"
52160-105 = "噂が、静まった時……どうなって、しまうのか。#n気になって……。"
52160-110 = "おや……お茶が冷めてしまったね。"
52160-111 = "それで――話は終わりかえ？"
52160-112 = "さて……少し、様子を見てこようかね。"
52160-113 = "百花繚乱も、シャーレの先生も此処にいる。#n他に邪魔者はおらんからね。"
52160-114 = "話の続きは――世が焼け落ちたその時に……それでええ？#nシュロ。"
52160-121 = "……はい。"
52160-123 = "次回;委員長の帰還"
