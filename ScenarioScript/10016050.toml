[translation]
10016050-1 = "Episódio 5; Patrulha nos arredores"
10016050-5 = "Senhorita Tsukuyo, senhorita Tsukuyo! Olhe só!"
10016050-6 = "Dizem que é uma camiseta holográfica especial da Millennium que te deixa invisível quando você a veste!"
10016050-7 = "Com isso, poderemos nos infiltrar nas linhas inimigas sem precisar de ninjutsu...!"
10016050-8 = "Disseram que podemos experimentar, então por que não vestimos juntas, senhorita Tsukuyo?"
10016050-9 = "M-mas, não sei se tem um tamanho para alguém grande como eu..."
10016050-10 = "Se eu forçar e a roupa acabar rasgando..."
10016050-11 = "Não se preocupe! A placa diz que tem vários tamanhos!"
10016050-12 = "Vamos, vamos...!#nJá que é uma chance de pesquisar um novo ninjutsu, vamos juntas!"
10016050-19 = "Uau! A Millennium tem um monte de comidas feitas com máquinas misteriosas!"
10016050-20 = "Senpai Chise! A Kaede quer comer o takoyaki daquela máquina automática ali!"
10016050-21 = "Algo... um bom haiku parece estar surgindo."
10016050-22 = "Ei, senpai Chise? Está me ouvindo?"
10016050-23 = "...Hmm, lembrei."
10016050-25 = "Gi#nr#ngi#nr#ngi#nr#ngi#nra"
10016050-27 = "O#ns#ns#nr#ng#na#nra"
10016050-29 = "Bo#nli#nna#nde#nra#nme"
10016050-32 = "O que estão vendendo ali não é ramune, é takoyaki, sabia?"
10016050-33 = "Senpai~ vamos logo comer takoyaki~"
10016050-38 = "Uau, a Millennium também tem um grupo de torcida!"
10016050-39 = "Desde uniformes escolares e roupas de líder de torcida com materiais especiais até drones holográficos... vocês estão com tudo!"
10016050-40 = "Ah... não, não é bem um grupo de torcida oficial..."
10016050-43 = "Fufu, é isso mesmo. Nós somos os especialistas em torcida que cuidam de todo o apoio da Millennium—#nMeisters!"
10016050-44 = "Pelo seu uniforme, você é uma aluna da Trinity, certo?"
10016050-45 = "Sim, sou eu! Vim junto com as veteranas do Esquadrão de Socorro para tratar os atletas feridos!"
10016050-46 = "Ao cuidar dos pacientes, além do corpo, a saúde mental também é muito importante..."
10016050-47 = "Se as veteranas tratam o corpo com remédios e bandagens, #neu pretendo tratar o coração com a minha torcida!"
10016050-48 = "Hum... sinto o entusiasmo e a sinceridade da sua torcida através da sua voz..."
10016050-49 = "Parece que seremos ótimas rivais para o grupo de torcida da Millennium!"
10016050-53 = "Oh! Uma competição de torcida?"
10016050-54 = "Uma competição de torcida, onde se disputa a habilidade e o vigor dos grupos, é um dos pontos altos do Grande Festival Esportivo!"
10016050-55 = "Mas, como tenho que participar da corrida de obstáculos em breve... é uma pena não poder participar desta competição."
10016050-57 = "E-então, quer que eu vá na corrida de obstáculos no lugar da Kotori?"
10016050-58 = "Eu não sou boa nem em torcer nem em esportes, mas tenho um pouco mais de confiança correndo..."
10016050-59 = "Essa atitude não é boa, Hibiki."
10016050-60 = "O \"Festival Kourin Taisai\" é um festival esportivo que desafia os limites e as possibilidades do corpo..."
10016050-61 = "Na verdade, é justamente ao desafiar o que você não é boa que você consegue reconhecer o seu valor!"
10016050-62 = "Que palavras maravilhosas...!"
10016050-63 = "Para não perder para o vigor do líder de torcida da Millennium, eu também vou torcer com todas as minhas forças!"
10016050-64 = "Aceito o seu desafio!"
10016050-68 = "Queria que isso acabasse logo..."
10016050-72 = "[ns] \"Parece que todos estão aproveitando o Grande Festival Esportivo à sua maneira...\""
10016050-74 = "Err... S-senhorita Natsu...#nO que é exatamente esse parfait..."
10016050-77 = "Hm? Você tem interesse neste parfait?"
10016050-78 = "Conseguir notar o valor deste parfait de relance...#nComo esperado de um membro do Comitê de Justiça. Você tem um bom olho."
10016050-79 = "Este parfait foi comprado no \"L'Oiseau Bleu\" da área das barracas."
10016050-80 = "Os parfaits do L'Oiseau Bleu já são difíceis de conseguir normalmente, mas o da barraca é ainda mais raro."
10016050-81 = "É-é mesmo... não, não é isso que é o problema—"
10016050-82 = "Diferente do parfait da loja principal, que é montado com chantilly e frutas na hora após o pedido,#neste aqui foi preparado com antecedência e trazido refrigerado."
10016050-83 = "Como não é feito na hora, ele vem com três camadas de sorvete...#nO fato de ter um visual impressionante também é um charme, não é?"
10016050-84 = "Esse desequilíbrio é o doce da juventude que só pode ser apreciado no Festival de Esportes――"
10016050-85 = "Espere um pouco! Não é que eu esteja interessada nesse parfait, mas sim..."
10016050-86 = "Eu só queria dizer para você não comer o parfait enquanto caminha..."
10016050-87 = "……Hm? Por que não posso comer enquanto caminho?"
10016050-88 = "Porque o regulamento escolar proíbe...#nAlém disso, é falta de educação..."
10016050-89 = "De fato, comer e beber enquanto caminha é proibido pelo regulamento de Trinity..."
10016050-91 = "Mas será que podemos dizer que essa definição também se aplica ao Festival de Esportes?!"
10016050-92 = "D-definição?"
10016050-93 = "Normalmente, usa-se talheres para comer, mas o correto não é comer curry autêntico com as mãos?"
10016050-94 = "Então, qual seria a forma correta de aproveitar um parfait servido em um recipiente descartável para viagem?"
10016050-96 = "Isso mesmo, talvez o correto aqui seja comer o parfait enquanto caminha……!"
10016050-98 = "P-pensando bem, talvez você tenha razão……!?"
10016050-99 = "……Não confunda os membros do clube com palavras estranhas, Natsu-san."
10016050-100 = "A proibição de comer e beber enquanto caminha não é exceção no Festival de Esportes."
10016050-101 = "Droga, não era uma exceção..."
10016050-102 = "E ainda por cima parece tão gostoso..."
10016050-103 = "Ehem,#nSe você caminhar comendo um parfait grande, pode acabar sujando a roupa de outras pessoas."
10016050-104 = "Para evitar problemas, por favor, sente-se em um local de descanso designado para comer seu parfait."
10016050-105 = "Isso é um problema... Comprei isso escondido...#nSe eu sentar para comer, talvez outros membros do clube me encontrem."
10016050-106 = "Se me encontrarem, já era... Vão acabar me pedindo para comprar um para eles também."
10016050-107 = "……Não tem jeito.#nVice-presidente... coma este parfait no meu lugar."
10016050-108 = "Sim?#nEu... devo comer?"
10016050-109 = "É uma pena não poder comer o parfait que consegui com tanto esforço, mas se alguém que conhece o valor deste doce comer por mim, eu me dou por satisfeita."
10016050-110 = "Bem, vou procurar os outros membros, então... com licença!"
10016050-114 = "Receber um parfait tão grande de repente...#nIsso é complicado..."
10016050-115 = "Mesmo sem isso, eu estava resistindo à tentação...#nSe eu comer algo tão calórico, toda a minha determinação terá sido em vão..."
10016050-116 = "……."
10016050-117 = "Mas, desperdiçar comida também é――"
10016050-118 = "[s] \"Não seria bom comer pelo menos um pouco?\""
10016050-119 = "……Se, se, Sensei!? Desde quando você está aí!?"
10016050-120 = "[s] \"Estou aqui faz um tempo.\""
10016050-121 = "E-entendo."
10016050-122 = "Eu estava justamente prestes a passar este parfait para um membro do clube."
10016050-123 = "Hã!? Já que a Natsu-san deu para a Hasumi-san, seria melhor se você mesma comesse..."
10016050-124 = "Não, eu já almocei o suficiente há pouco tempo.#nNão preciso de mais ingestão calórica."
10016050-125 = "Além disso, vocês estavam patrulhando a disciplina sob este calor escaldante...#nPor favor, coma algo gelado e descanse um pouco."
10016050-126 = "Ah, muito obrigada……."
10016050-130 = "Haa……."
10016050-131 = "[s1] \"Está tudo bem? Você parece um pouco cansada.\"\n[s2] \"Hasumi, por que não descansa um pouco também?\""
10016050-132 = "Não, estou bem.#nNão estou participando das competições, e ainda tenho bastante energia……."
10016050-133 = "Não, estou bem.#nNão estou participando das competições, e ainda tenho bastante energia……."
10016050-134 = "Além disso... nunca se sabe quando outro aluno que viola o regulamento escolar, como o de antes, pode aparecer."
10016050-135 = "Comparado a isso, os comitês executivos de Millennium e Gehenna..."
10016050-136 = "É bom aproveitar o festival, mas não posso aceitar que abandonem suas responsabilidades."
10016050-137 = "[s3] \"Já que é um festival...\"\n[s4] \"Não seria bom aproveitar um pouquinho?\""
10016050-138 = "Não. Cada pessoa tem seu papel.#nAproveitar o festival também é apenas o papel de alguém."
10016050-139 = "Não. Cada pessoa tem seu papel.#nAproveitar o festival também é apenas o papel de alguém."
10016050-140 = "Como mencionei antes, a organização do Grande Festival de Esportes é apenas uma extensão das tarefas escolares."
10016050-141 = "Como sempre, estou apenas cumprindo meu dever como vice-presidente do Comitê de Justiça."
10016050-148 = "Ué, não é o Sensei [USERNAME]?"
10016050-149 = "Olá, Sensei. Que coincidência!"
10016050-150 = "[s5] \"Ei. Kirino, Fubuki.\n[s6] \"Estão em patrulha?\""
10016050-151 = "Sim! Nós da Academia de Polícia Valkyrie estamos realizando o serviço de segurança dentro e fora do local para que os alunos possam aproveitar o festival com segurança!"
10016050-152 = "Sim! Nós da Academia de Polícia Valkyrie estamos realizando o serviço de segurança dentro e fora do local para que os alunos possam aproveitar o festival com segurança!"
10016050-153 = "Nossa... o estádio de atletismo é enorme, né...#nDemorei um tempão só para dar uma volta..."
10016050-154 = "Eu estava tão feliz por não ter que participar daquela partida chata...#nQuem diria que eu acabaria patrulhando o entorno do estádio, onde não tem uma sombra sequer..."
10016050-155 = "Devia ter fingido estar doente e ficado descansando no dormitório..."
10016050-156 = "Não pode fazer isso, Fubuki. Se descobrirem que você fingiu doença, pode acabar recebendo uma punição disciplinar, sabe?"
10016050-157 = "Quando terminarmos a patrulha, eu pago um donut robótico especial da Millennium para você, então vamos nos esforçar juntas até o fim!"
10016050-158 = "Será que o gosto de um donut feito por um robô é diferente...?"
10016050-159 = "Falando nisso, quem é a pessoa ao seu lado...? É a vice-presidente do Comitê de Justiça de Trinity!"
10016050-160 = "[s] \"Vocês duas se conhecem?\""
10016050-161 = "Sim. Estávamos com dificuldade para conter uns delinquentes que tentavam sabotar a partida durante a manhã, mas..."
10016050-162 = "Naquela hora, ela nos ajudou com um disparo de precisão!#nGraças a isso, conseguimos prender os alunos infratores sem problemas. Agradeço novamente!"
10016050-163 = "Não há de quê. Na verdade, eu é que sempre recebo ajuda de vocês da Academia de Polícia Valkyrie."
10016050-164 = "Sempre que algo acontece, vocês relatam rapidamente...#nGraças a isso, conseguimos resolver os incidentes antes que tomem proporções maiores."
10016050-165 = "...Então é verdade o que dizem sobre o Departamento de Segurança Pública, que vocês chegam ao local do incidente mais rápido que qualquer um."
10016050-166 = "Ah, ahaha... Fico até sem jeito sendo elogiada assim..."
10016050-167 = "A propósito, houve algum problema durante a patrulha?"
10016050-168 = "Não. Não acho que tenha havido nenhum aluno ou objeto suspeito, mas..."
10016050-169 = "Ah, falando nisso, um pouco antes encontramos um aluno que, mesmo não sendo da equipe de organização, estava carregando equipamentos necessários para a competição por conta própria."
10016050-170 = "Ele estava carregando equipamentos pesados, como vigas de aço e caixas cheias de balas de arremesso, mas recusou ajuda dizendo que não precisava."
10016050-171 = "Ele era tão dedicado que, assim que a partida terminou, começou a carregar os equipamentos antes mesmo da comissão executiva."
10016050-172 = "...Isso é um pouco suspeito."
10016050-173 = "De acordo com os documentos da Hayase, os equipamentos usados neste Grande Festival Esportivo deveriam ser transportados por robôs, então não deveria haver necessidade de transporte manual..."
10016050-174 = "É, é mesmo?#nEntão, para onde aquele aluno estava levando os equipamentos?"
10016050-175 = "Primeiro, precisamos confirmar a identidade desse aluno..."
10016050-176 = "Kirino, por favor, nos guie até o local onde você encontrou esses alunos."
10016050-177 = "Sim! Vou guiá-los imediatamente!"
10016050-178 = "Droga... sinto cheiro de um problema trabalhoso..."
