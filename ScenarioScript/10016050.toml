[translation]
10016050-1 = "第5話;周辺パトロール"
10016050-5 = "ツクヨ殿、ツクヨ殿～！見てください！"
10016050-6 = "着たら透明になれるミレニアム特製ホログラムTシャツだそうです！"
10016050-7 = "これがあれば、忍術いらずで敵陣に潜入できそうですね……！"
10016050-8 = "試着もできるそうなので、ツクヨ殿も一緒に着てみませんか？"
10016050-9 = "で、でも、私のような大きい子用のサイズがあるかどうか……"
10016050-10 = "無理に着て服が破れちゃったりなんかしたら……"
10016050-11 = "心配ご無用！看板には、色々なサイズがあると書いてあります！"
10016050-12 = "さあ、さあ……！#nせっかく新しい忍術を研究するチャンスなのですから、共に参りましょう！"
10016050-19 = "わあ！ミレニアムは不思議な機械で作った食べ物がい～っぱいあるね！"
10016050-20 = "チセ先輩ー！カエデはあっちにある自動たこ焼き機械のたこ焼きが食べたい！"
10016050-21 = "なにか……良い句がひらめきそう。"
10016050-22 = "ねえ、チセ先輩～？聞いてる？"
10016050-23 = "……うーん、思い出した。"
10016050-25 = "ぐ#nる#nぐ#nる#nと"
10016050-27 = "音#nと#n転#nが#nる"
10016050-29 = "ラ#nム#nネ#n玉"
10016050-32 = "あっちで売ってるのはラムネじゃなくてたこ焼きだよ？"
10016050-33 = "先輩～早くたこ焼き食べに行こうよ～"
10016050-38 = "わあ、ミレニアムにも応援団があるんですね！"
10016050-39 = "特殊素材の学ランやチア服にホログラムドローンまで……気合バッチリですね！"
10016050-40 = "あ……いや、これは正式な応援団ってわけじゃ――"
10016050-43 = "ふふ、その通りだよ。私たちはミレニアムの応援を一手に担う応援の専門家――#nマイスターさ！"
10016050-44 = "君はその服装を見るに、トリニティの生徒かな？"
10016050-45 = "はい、そうです！救護騎士団の先輩と一緒に、怪我をした選手の治療に来ました！"
10016050-46 = "患者さんのお世話をする時は、身体はもとより、心の健康も大切ですから……"
10016050-47 = "先輩たちが薬と包帯で身体を治療するなら、#n私は応援で心を治療しようと思っているんです！"
10016050-48 = "ふむ……声から応援への熱意と真心を感じる……"
10016050-49 = "私たちミレニアム応援団のいいライバルになりそうだね！"
10016050-53 = "おおっ！応援合戦ですか？"
10016050-54 = "応援団の技量と勢いを競う応援合戦は、大運動会の見どころの一つですからね！"
10016050-55 = "ですが、私はもうすぐ障害物競走に参加しないといけませんので……この応援合戦に参加できないのが残念です。"
10016050-57 = "じゃ、じゃあ、コトリの代わりに私が障害物競走に出ようか？"
10016050-58 = "応援も運動も両方とも苦手だけど、走る方がまだ自信があるから……"
10016050-59 = "そういう態度はよくないよ、ヒビキ。"
10016050-60 = "「[ruby=こうりんたいさい]晄輪大祭[/ruby]」は肉体の限界と可能性に挑むスポーツの祭典……"
10016050-61 = "むしろ、普段苦手なことに挑戦してこそ、その価値を認識することができるんだ！"
10016050-62 = "素敵なお言葉です……！"
10016050-63 = "ミレニアムの応援団長さんの勢いに負けないよう、私も一生懸命応援します！"
10016050-64 = "その挑戦、受けて立とう！"
10016050-68 = "早く終わってほしい……"
10016050-72 = "[ns] \"みんなそれぞれ大運動会を楽しんでいるみたいだね……。\""
10016050-74 = "えっと……な、ナツさん……#nそのパフェは一体……"
10016050-77 = "ん？このパフェに興味があるのかな？"
10016050-78 = "このパフェの価値が一目でわかるなんて……#nさすが正義実現委員会の部員だね。お目が高い。"
10016050-79 = "このパフェは屋台エリアの「ルワゾー・ブッレ」で購入したもの。"
10016050-80 = "ルワゾー・ブッレのパフェは普段から入手困難だけど、屋台のパフェはもっとレアなものだよ。"
10016050-81 = "そ、そうなんですか……いえ、それが問題なのではなく――"
10016050-82 = "注文後すぐホイップをトッピングし、果物を盛りつける本店のパフェと違って、#nこれはあらかじめ作り置いて、冷蔵状態で持ってきたものなんだ。"
10016050-83 = "作り立てではない分、アイスを3段盛りにしているから……#n圧倒的なヴィジュアルを兼ね備えているのも魅力だよね。"
10016050-84 = "このアンバランスさこそ「晄輪大祭」でしか味わえない青春のスイーツ――"
10016050-85 = "ちょっと待ってください！そのパフェに興味があるのではなく……"
10016050-86 = "歩きながらパフェを食べるのはやめてくださいと伝えたかっただけで……"
10016050-87 = "……ん？どうして歩きながら食べてはいけないんだ？"
10016050-88 = "校則で禁止していますから……#nそれに、行儀悪いですし……"
10016050-89 = "たしかに歩行中の飲食はトリニティの校則で禁じている……"
10016050-91 = "しかし、晄輪大祭でもその定義が通用すると言えるのだろうか！"
10016050-92 = "て、定義ですか？"
10016050-93 = "通常、食事は食器を用いるが、本場のカレーは手で食事をするのが正しいだろう？"
10016050-94 = "ならば持ち運べるよう、使い捨て容器で提供されたパフェを正しく楽しむ方法は何だろうか？"
10016050-96 = "そう、ここでは歩きながらパフェを食べるのが正しいのではないだろうか……！"
10016050-98 = "い、言われてみればそんな気も……！？"
10016050-99 = "……変な言葉で部員を惑わせないでください、ナツさん。"
10016050-100 = "歩行中の飲食禁止は晄輪大祭も例外ではありません。"
10016050-101 = "げっ、例外ではなかったのか……"
10016050-102 = "しかもそんなにおいしそうな……"
10016050-103 = "こほん、#n大きなパフェを食べながら歩いたら、他の方の服を汚すこともあるでしょう。"
10016050-104 = "トラブル防止のため、パフェは指定された休憩場所で座って食べてください。"
10016050-105 = "それは困るな……これはこっそり買ったものなんだ……#n席に座って食べていたら、他の部員に見つかってしまうかもしれない。"
10016050-106 = "見つかってしまったが最後……自分の分も買ってくれと頼まれる事になるだろう。"
10016050-107 = "……仕方ない。#nこのパフェは副委員長……君が代わりに食べてくれ。"
10016050-108 = "はい？#n私……ですか？"
10016050-109 = "せっかく手に入れたパフェが食べられないのは残念だが、#nこのスイーツの価値を知っている人間が代わりに食べてくれるなら納得もできよう。"
10016050-110 = "それでは、私は他の部員を探しに行くので……お先に失礼！"
10016050-114 = "突然こんな大きなパフェをもらいましても……#n困りますね……"
10016050-115 = "そうでなくとも、誘惑を我慢していたのに……#nこんなカロリーが高そうな食べ物を食べてしまっては、せっかくした決心が……"
10016050-116 = "……。"
10016050-117 = "でも、食べ物を捨てるのも――"
10016050-118 = "[s] \"一つくらいは食べてもいいんじゃないかな？\""
10016050-119 = "……せ、せ、先生！？いつからここに！？"
10016050-120 = "[s] \"さっきからいたよ。\""
10016050-121 = "そ、そうでしたか。"
10016050-122 = "ちょうどこのパフェを部員に譲ろうとしていたところでした。"
10016050-123 = "えっ！？ナツさんがハスミさんに譲ったものですから、直接召し上がった方が……"
10016050-124 = "いえ、私はさきほど十分な量の昼食を食べましたので。#nこれ以上のカロリー摂取は不要です。"
10016050-125 = "そうでなくとも、皆さん蒸し暑い天気の中、風紀の取り締まりをしていたのですから……#n冷たいものでも食べて少し休んできてください。"
10016050-126 = "あ、ありがとうございます……。"
10016050-130 = "はぁ……。"
10016050-131 = "[s1] \"大丈夫？ちょっと疲れてるみたいだけど。\"\n[s2] \"ハスミも少し休んだら？\""
10016050-132 = "いえ、私は大丈夫です。#n試合に出てるわけでもないですし、まだまだ体力も残っていますから……。"
10016050-133 = "いえ、私は大丈夫です。#n試合に出てるわけでもないですし、まだまだ体力も残っていますから……。"
10016050-134 = "それに……いつ、また先程のように校則を違反する生徒が現れるかも分かりませんからね。"
10016050-135 = "それに比べて、ミレニアムとゲヘナの実行委員ときたら……"
10016050-136 = "お祭りを楽しむのは結構ですが、ご自身の責務を放棄するのはいただけません。"
10016050-137 = "[s3] \"せっかくのお祭りなんだから……\"\n[s4] \"少しくらいは楽しんでもいいんじゃないかな？\""
10016050-138 = "いえ。人にはそれぞれの役割があります。#nお祭りを楽しむ事も、誰かの役割に過ぎません。"
10016050-139 = "いえ。人にはそれぞれの役割があります。#nお祭りを楽しむ事も、誰かの役割に過ぎません。"
10016050-140 = "先ほどもお話しましたが、大運動会の運営も学園業務の延長に過ぎません。"
10016050-141 = "私はいつものように正義実現委員会の副委員長として、私の責務を果たすだけですから。"
10016050-148 = "あれ、[USERNAME]先生じゃん？"
10016050-149 = "こんにちは、先生。奇遇ですね！"
10016050-150 = "[s5] \"やあ。キリノ、フブキ。\n[s6] \"パトロール中？\""
10016050-151 = "はい！私たちヴァルキューレ警察学校は、生徒が安全にお祭りを楽しめるよう会場の内外で警備業務を遂行しています！"
10016050-152 = "はい！私たちヴァルキューレ警察学校は、生徒が安全にお祭りを楽しめるよう会場の内外で警備業務を遂行しています！"
10016050-153 = "いやぁ……アスレチックスタジアムは広いですねぇ……#n一周するのにも時間がかかってしまって……。"
10016050-154 = "面倒な試合に参加しなくてもいいって言われて喜んでたのに……#nまさか日陰一つない競技場周辺をパトロールし続ける事になるとは……"
10016050-155 = "仮病使って寮で休んでれば良かった……。"
10016050-156 = "ダメですよ、フブキ。仮病だとバレたら、あとで懲戒を受けるかもしれませんよ？"
10016050-157 = "今回のパトロールが終わったら、#nミレニアム特製ロボットドーナッツをおごりますので、#n最後まで一緒に頑張りましょう！"
10016050-158 = "ロボットが作るドーナッツって味も違ったりするのかなぁ……"
10016050-159 = "そういえば、隣の方は……トリニティ正義実現委員会の副委員長ですね！"
10016050-160 = "[s] \"二人は顔見知りなの？\""
10016050-161 = "はい。午前中に試合を妨害しようとする不良の鎮圧に苦労していたのですが……"
10016050-162 = "その時、狙撃で本官を助けてくださったのです！#nお陰様で無事不良生徒を逮捕できました。改めて感謝申し上げます！"
10016050-163 = "いえ。私の方こそ、ヴァルキューレ警察学校の皆さんにはいつも助けていただいてますから。"
10016050-164 = "なにか起こるたびに、迅速に報告していただいて……#nお陰で事件が大きくなる前に解決することができています。"
10016050-165 = "……誰よりも早く事件現場に現れるという生活安全局の話は本当だったのですね。"
10016050-166 = "は、はは……そんなに褒められると、何だかむずがゆいですね……。"
10016050-167 = "ところで、パトロール中になにか問題はありましたか？"
10016050-168 = "いえ。特段、怪しそうな生徒や物はなかったと思いますが……"
10016050-169 = "あ、そういえば先ほど進行スタッフではないのに率先して競技に必要な備品を運んでくれた生徒と出会いました。"
10016050-170 = "鉄骨やら、砲丸がたくさん入った箱やらの重い備品を運んでいるのに、#n「助けは要らない」と断っていましたね。"
10016050-171 = "試合が終わるやいなや、実行委員より先に備品を運ぶくらい意欲的な生徒だったねぇ。"
10016050-172 = "……何か、怪しいですね。"
10016050-173 = "[ruby=はやせ]早瀬[/ruby]さんの資料によると、今回の大運動会に使われる備品はロボットで運ばれるため、人の手で運ぶ必要はないはずですが……"
10016050-174 = "そ、そうなのですか？#nでは、あの生徒は備品を一体どこに運んでいたのでしょうか？"
10016050-175 = "まずはその生徒の正体を確認しなければならないですね……。"
10016050-176 = "キリノさん、その生徒たちに会った場所まで案内をお願いします。"
10016050-177 = "はい！すぐご案内します！"
10016050-178 = "げっ……面倒くさそうな事件の気配……。"
