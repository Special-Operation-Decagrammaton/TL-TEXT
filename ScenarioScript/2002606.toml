[translation]
2002606-1 = "キヴォトスの生徒が不幸なのはなぜ？"
2002606-2 = "シャーレ・執務室"
2002606-3 = "（今日のシャーレ当番は、ミノリだった)"
2002606-8 = "む……。"
2002606-9 = "むう…………。"
2002606-10 = "[s] \"何か悩みでもあるの？\""
2002606-11 = "……ああっ、申し訳ない。#nシャーレの仕事をサボタージュするつもりはないぞ。"
2002606-12 = "ただ、少し気になることがあってな……。"
2002606-13 = "[s] \"聞かせてもらえる？\""
2002606-14 = "他でもない、[USERNAME]先生のことだ……。"
2002606-15 = "[s] \"……私？\""
2002606-16 = "前にモモトークで、キヴォトスの全生徒が幸せになれる方法について話しただろう。"
2002606-17 = "不幸な生徒が生まれる理由は、#n一部のブルジョワがプリンのように希少な資源を独占するからだ。"
2002606-18 = "しかし、プリンとは異なり、その資源が無形の場合……"
2002606-19 = "どのように分配したら良いのか、悩んでいたんだ。"
2002606-20 = "[s] \"話が見えないんだけど……。\""
2002606-21 = "シャーレ当番を希望する生徒が後を絶たないことを、先生は知っていたか？"
2002606-22 = "考えてみれば、当然だろう。先生と2人で過ごせる貴重な時間を得られるからな。当番と言っても業務量は少ないうえ、むしろ相談事を解決してもらえるときた。"
2002606-23 = "つまり……シャーレ当番の時間は、生徒を幸せにする無形の資源と言える！"
2002606-24 = "しかし、先生の時間は限られている。シャーレの当番になれるチャンスは、誰にでも訪れるわけではない。一部の生徒が、何度も当番に選ばれることもあるじゃないか。"
2002606-25 = "これはブルジョワどもがプリンを何個も食べるのと同じだ。#n社会を不平等たらしめる原因に違いない！"
2002606-26 = "[s] \"そ、そうなのかな……？\""
2002606-27 = "プリンは公平に分けられるが、先生の時間はそうもいかないだろう。"
2002606-28 = "全生徒に1日ずつ当番を割り振っても、先生と会えないまま卒業する生徒は存在する。"
2002606-29 = "たとえば、1日に数百人ずつ、時間単位で当番を割り振れば……"
2002606-30 = "[s1] \"それは難しいね……。\"\n[s2] \"説明に時間を取られて、仕事が回らなくなるかな……。\""
2002606-33 = "その通り。生徒の幸せを実現するために仕事が回らなくなっては、元も子もない。"
2002606-34 = "これは全て、先生が1人しかいないのに対して、キヴォトスの生徒数が膨大だから発生した問題だ。"
2002606-35 = "先生の身体が分裂できるなら良いんだが……"
2002606-36 = "[s3] \"それは無理だよ！？\"\n[s4] \"恐ろしいことを！\""
2002606-39 = "ふふっ……冗談だ、冗談。"
2002606-40 = "そんなことは実現できないと分かっている。"
2002606-41 = "そもそも、そう簡単に幸せになる方法が見つかるものなら、我々の同志たちは必死に戦ってないだろう。"
2002606-42 = "[ns] \"ミノリの悩みは、十分わかったよ。\""
2002606-44 = "[ns5] \"でも、当番をすれば幸せになれるわけじゃないから。\"\n[ns6] \"私のことが苦手な生徒もいるだろうし……。\""
2002606-47 = "いや、そんなこと、絶対にあり得ない！"
2002606-48 = "現にあたしは、一緒にいるだけで幸せを感じるほど居心地がいい。"
2002606-49 = "それこそ可能なら、毎日現場に先生を連れていきた――"
2002606-56 = "あ、あたしは今、なんて……？"
2002606-57 = "独り言とはいえ、工務部の部長として労働者たちの模範となるべき者が……"
2002606-58 = "……まるでブルジョワの[ruby=ごと]如[/ruby]く、先生を独占しようと考えるとは！"
2002606-59 = "[s] \"……そっち？\""
2002606-60 = "この頃、学園外の資本家から依頼を何度か受けたせいで、自分でも気づかぬうちに染まってしまったのか……！"
2002606-61 = "先生、あたしは反省をしなくてはならない！"
2002606-62 = "そこに座って、よく聞いていてくれ！#nなにか誤りがあれば、厳しく指摘を頼むぞ！！"
2002606-63 = "[ns] \"そこまでしなくても……。\""
2002606-66 = "（その後、ミノリの反省という名の自己批判を聞き留めた）"
