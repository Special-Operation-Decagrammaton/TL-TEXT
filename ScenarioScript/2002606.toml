[translation]
2002606-1 = "Por que as alunas de Kivotos são infelizes?"
2002606-2 = "Schale - Escritório"
2002606-3 = "（A responsável pelo Schale hoje era a Minori）"
2002606-8 = "Hmm..."
2002606-9 = "Hmmmm..."
2002606-10 = "[s] \"Está com algum problema?\""
2002606-11 = "Ah... peço perdão. #nNão tenho a intenção de sabotar o trabalho no Schale."
2002606-12 = "É só que tem algo me incomodando um pouco..."
2002606-13 = "[s] \"Pode me contar?\""
2002606-14 = "Não é nada menos que sobre você, [USERNAME] Sensei..."
2002606-15 = "[s] \"...Eu?\""
2002606-16 = "Lembra que conversamos no MomoTalk sobre como fazer com que todas as alunas de Kivotos sejam felizes?"
2002606-17 = "A razão pela qual existem alunas infelizes é porque #numa parte da burguesia monopoliza recursos raros, como se fossem pudins."
2002606-18 = "No entanto, ao contrário do pudim, se esse recurso for intangível..."
2002606-19 = "Eu estava pensando em como seria a melhor forma de distribuí-lo."
2002606-20 = "[s] \"Não estou entendendo onde quer chegar...\""
2002606-21 = "Você sabia que a fila de alunas querendo ser responsáveis pelo Schale nunca acaba, Sensei?"
2002606-22 = "Pensando bem, é natural. Elas ganham um tempo precioso a sós com você. Além disso, o volume de trabalho é baixo e você ainda resolve os problemas delas."
2002606-23 = "Ou seja... o tempo como responsável pelo Schale pode ser considerado um recurso intangível que traz felicidade às alunas!"
2002606-24 = "Mas o seu tempo é limitado, Sensei. A chance de ser responsável pelo Schale não aparece para todas. Algumas alunas acabam sendo escolhidas várias vezes, não é?"
2002606-25 = "Isso é o mesmo que burgueses comendo vários pudins. #nCom certeza é uma causa da desigualdade social!"
2002606-26 = "[s] \"S-será mesmo...?\""
2002606-27 = "Pudins podem ser divididos de forma justa, mas o seu tempo não funciona assim, não é?"
2002606-28 = "Mesmo que você dedicasse um dia para cada aluna, ainda existiriam aquelas que se formariam sem nunca ter tido um tempo com você."
2002606-29 = "Por exemplo, se dividíssemos o tempo em turnos de horas para centenas de pessoas por dia..."
2002606-30 = "[s1] \"Isso é difícil...\"\n[s2] \"Perderíamos tempo demais explicando e o trabalho não renderia...\""
2002606-33 = "Exatamente. Se o trabalho parar de render por causa da busca pela felicidade das alunas, não teremos alcançado nada."
2002606-34 = "Isso tudo acontece porque só existe um Sensei, enquanto o número de alunas em Kivotos é gigantesco."
2002606-35 = "Seria bom se você pudesse se dividir..."
2002606-36 = "[s3] \"Isso é impossível!?\"\n[s4] \"Que ideia assustadora!\""
2002606-39 = "Fufu... brincadeira, brincadeira."
2002606-40 = "Eu sei que isso é impossível de realizar."
2002606-41 = "Além disso, se fosse tão fácil encontrar um método para a felicidade, nossos camaradas não estariam lutando tão arduamente."
2002606-42 = "[ns] \"Entendi bem a sua preocupação, Minori.\""
2002606-44 = "[ns5] \"Mas ser responsável não garante a felicidade.\"\n[ns6] \"Deve haver alunas que nem gostam de mim...\""
2002606-47 = "Não, isso é absolutamente impossível!"
2002606-48 = "Na verdade, eu me sinto tão confortável que só de estar ao seu lado já me sinto feliz."
2002606-49 = "Se fosse possível, eu levaria você para o canteiro de obras todos os dias—"
2002606-56 = "Ah, o que eu acabei de...?"
2002606-57 = "Mesmo sendo um pensamento em voz alta, alguém que deveria ser um exemplo para os trabalhadores como chefe do Departamento de Obras..."
2002606-58 = "...pensar em monopolizar o Sensei como se fosse uma burguesa!"
2002606-59 = "[s] \"...É nisso que você está pensando?\""
2002606-60 = "Será que, por ter aceitado vários pedidos de capitalistas de fora da escola ultimamente, acabei sendo corrompida sem perceber...!?"
2002606-61 = "Sensei, eu preciso refletir!"
2002606-62 = "Sente-se aí e ouça com atenção! #nSe houver algum erro, por favor, aponte-o rigorosamente!!"
2002606-63 = "[ns] \"Não precisa chegar a tanto...\""
2002606-66 = "（Depois disso, ouvi a autocrítica de Minori, que ela chamou de reflexão）"
