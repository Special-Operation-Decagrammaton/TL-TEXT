[translation]
84309100100-5 = "急な呼び出しになってごめんなさい。応答が早くて助かるわ。"
84309100100-6 = "珍しく急いでいるようだったが……今度は何が？"
84309100100-7 = "あまり時間が無いの。準備をしながら話を聞いてちょうだい。"
84309100100-8 = "そんなに急かすってことは……よっぽどの事態なんだな？"
84309100100-9 = "……ついに、何か起こったのか？"
84309100100-10 = "いや、しかしそれでは……。"
84309100100-11 = "今回は「予防」ではなく「収拾」に当たってもらうわ。"
84309100100-12 = "別に出張るのは良いんだけどよ。"
84309100100-13 = "もう発生しちまってるなら、手遅れじゃねぇのか？"
84309100100-15 = "いいえ。幸い、まだ気づいた人はいないはずよ。それでも、このままではいずれ騒ぎになる。"
84309100100-16 = "会場内部の警備システムが誤作動を起こして、臨戦態勢になっているの。もしセンサーに引っかかったら、一巻の終わり。"
84309100100-17 = "会場に誰もいない夜のうちに修正すれば、最悪の事態を避けられる。"
84309100100-18 = "……明日の開場を迎えたら最後、被害者と目撃者が生まれてしまう、と。"
84309100100-19 = "……ん？要はシステムの誤作動なんだろ？だったらセミナーに知らせればいいんじゃねえの？わざわざ潜入してまでやることか？"
84309100100-20 = "いや、その場合も「結果」は変わらないさ。そこに至るまでの経路が異なるだけだ。"
84309100100-21 = "どのみちセミナーは、C&Cに解決を依頼するだろう？"
84309100100-22 = "結局あたしの仕事になるわけか……。"
84309100100-23 = "チッ。"
84309100100-25 = "それともう一つ……私たちで解決できるなら、セミナーの子たちを起こさなくて済むでしょう？"
84309100100-26 = "セミナーはただでさえ会期中忙しいのだから。寝不足で業務効率が落ちるのは、可能な限り回避すべきだわ。"
84309100100-28 = "……可愛い後輩たちの睡眠を邪魔したくない、ってか？"
84309100100-29 = "その想いを尊重しようじゃないか。喜んで力を貸そう。"
84309100100-34 = "そっ……。"
84309100100-35 = "そうは言っていない、わ……。"
84309100100-37 = "はぁ……ちょっとは素直になれよな、ほんとに。"
84309100100-38 = "……ネル、私はいつでも大丈夫だ。警備システムを直しに行こう。"
84309100100-39 = "お前もお前で、ついてくる気満々だしよ……。"
84309100100-40 = "邪魔をしているようなら、身を引くが……。"
84309100100-44 = "……ふっ。"
84309100100-45 = "なんだかんだ、あたしも嫌じゃねぇんだよな。"
84309100100-46 = "お荷物にはなっていないようで、何よりだよ。"
84309100100-47 = "いや、荷物だぞ？まっ、持ち歩いてもいいと思える荷物ってとこだな。"
84309100100-48 = "……精進しよう。"
84309100100-50 = "……話を続けていいかしら。警備システムを操作するためのハッキングツールを用意したわ。目標に辿り着いたら、端末に接続してちょうだい。"
84309100100-51 = "それと、なるべく設備を壊さないでくれると嬉しいわ。"
84309100100-55 = "セミナー……ユウカやノアに余計な負担をかけたくはないもの。"
84309100100-56 = "コユキは？"
84309100100-57 = "コユキ？彼女は……。"
84309100100-58 = "いや、言ってみただけだから忘れてくれ。"
