[translation]
84309100100-5 = "Desculpe por te chamar de repente. Fico grata pela sua resposta rápida."
84309100100-6 = "Você raramente parece tão apressada... O que aconteceu desta vez?"
84309100100-7 = "Não temos muito tempo. Escute enquanto se prepara."
84309100100-8 = "Se está com tanta pressa assim... é porque a situação é grave, não é?"
84309100100-9 = "……Finalmente, algo aconteceu?"
84309100100-10 = "Não, mas se for assim……."
84309100100-11 = "Desta vez, não quero que façam uma 'prevenção', mas sim uma 'contenção'."
84309100100-12 = "Não que eu me importe de entrar em ação, mas..."
84309100100-13 = "Se já aconteceu, não é tarde demais?"
84309100100-15 = "Não. Felizmente, ninguém deve ter notado ainda. Mesmo assim, se continuar assim, vai virar um escândalo."
84309100100-16 = "O sistema de segurança dentro do local de eventos está com defeito e entrou em modo de combate. Se dispararmos qualquer sensor, estaremos acabadas."
84309100100-17 = "Se corrigirmos enquanto não há ninguém no local durante a noite, poderemos evitar o pior cenário."
84309100100-18 = "……Ou seja, se esperarmos até a abertura de amanhã, haverá vítimas e testemunhas."
84309100100-19 = "……Hm? No fim das contas, é só um defeito no sistema, né? Então não seria melhor avisar o Seminar? Precisamos mesmo nos infiltrar para resolver isso?"
84309100100-20 = "Não, o 'resultado' seria o mesmo. A única diferença seria o caminho até lá."
84309100100-21 = "De qualquer forma, o Seminar pediria para a C&C resolver, não é?"
84309100100-22 = "No fim, o trabalho sobra para mim……."
84309100100-23 = "Tsc."
84309100100-25 = "E tem mais uma coisa…… se nós pudermos resolver, não precisaremos acordar as meninas do Seminar, certo?"
84309100100-26 = "O Seminar já está ocupado o suficiente durante o período do evento. Devemos evitar ao máximo que a falta de sono prejudique a eficiência do trabalho delas."
84309100100-28 = "……Não quer atrapalhar o sono das suas queridas kouhais, é isso?"
84309100100-29 = "Vamos respeitar esse sentimento. Fico feliz em ajudar."
84309100100-34 = "Isso……."
84309100100-35 = "Eu não disse isso……."
84309100100-37 = "Ah…… tente ser um pouco mais honesta, sério."
84309100100-38 = "……Neru, eu estou pronta a qualquer momento. Vamos consertar o sistema de segurança."
84309100100-39 = "Você também, já está toda pronta para vir junto……."
84309100100-40 = "Se eu estiver atrapalhando, posso me retirar, mas……."
84309100100-44 = "……Pff."
84309100100-45 = "No fim das contas, eu também não acho ruim."
84309100100-46 = "Fico feliz em saber que não estou sendo um peso."
84309100100-47 = "Não, você é um peso sim. Mas é o tipo de peso que eu não me importo de carregar por aí."
84309100100-48 = "……Vou me esforçar mais."
84309100100-50 = "……Posso continuar? Preparei uma ferramenta de hacking para manipular o sistema de segurança. Quando chegarem ao objetivo, conectem-se ao terminal."
84309100100-51 = "E, se possível, agradeceria se não destruíssem o equipamento."
84309100100-55 = "Seminar…… não quero sobrecarregar a Yuuka e a Noa desnecessariamente."
84309100100-56 = "E a Koyuki?"
84309100100-57 = "Koyuki? Ela……."
84309100100-58 = "Não, esquece, só falei por falar."
