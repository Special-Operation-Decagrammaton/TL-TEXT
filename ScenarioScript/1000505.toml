[translation]
1000505-1 = "Está brilhando, ainda que fracamente."
1000505-2 = "Já é incrível que consigam produzir luz, mas usá-la para proteger o próprio corpo é algo fascinante, não é?"
1000505-3 = "Acho que, se criarem luz nas profundezas escuras do oceano, os predadores vão acabar encontrando, mas parece que, se formarem um cardume, isso acaba servindo como intimidação."
1000505-4 = "Uhe~ como será que é essa cena? Deve ser algo impressionante."
1000505-5 = "[s1] \"O plano de hoje é sobre peixes?\"\n[s2] \"O que vamos procurar hoje?\""
1000505-6 = "Uhe~ você é apressado, Sensei."
1000505-7 = "Uhe~ você é apressado, Sensei."
1000505-8 = "Será que o espírito de caçador de tesouros finalmente despertou em você? É um bom sinal."
1000505-9 = "Abydos tem uma história muito antiga, então existem espaços escondidos por toda parte, e procurá-los é bem divertido!"
1000505-10 = "Da última vez foi um depósito, então que tal irmos ao antigo prédio escolar que foi fechado?"
1000505-13 = "Abydos - Terceiro Prédio Escolar Antigo"
1000505-14 = "Cof, cof... tem muita poeira aqui também."
1000505-15 = "Está cheio de tralha por todos os lados, acho que quase nada aqui é aproveitável."
1000505-16 = "Sensei, tome cuidado para não tropeçar em nada."
1000505-17 = "[s3] \"Não seria melhor vir durante o dia?\"\n[s4] \"Isso é arrepiante...\""
1000505-18 = "Uhe, uma caça ao tesouro no meio da noite tem seu charme. Além disso, não tem o risco de outras pessoas descobrirem."
1000505-19 = "Uhe~ Sensei, por acaso você está com medo?"
1000505-20 = "Está tudo bem, tudo bem. Fique bem coladinho atrás de mim."
1000505-21 = "Então, vamos seguir em frente."
1000505-22 = "Se encontrar algo bom, tem que pegar logo. A regra da caça ao tesouro é que o achado é de quem encontrar."
1000505-25 = "Hmm. Andamos bastante, mas não encontramos nada que pareça útil..."
1000505-26 = "Será que as coisas boas já foram levadas há muito tempo?"
1000505-29 = "(Ranger)"
1000505-32 = "Este lugar... parece que era usado pelos veteranos há muito tempo. Eu mesma nunca vim aqui, então não sei bem."
1000505-33 = "(Sussurro)"
1000505-34 = "...Hm?"
1000505-35 = "Você não ouviu um barulho?"
1000505-36 = "Veio daquela direção..."
1000505-37 = "A-aaaaah?!"
1000505-39 = "(Estrondo)"
1000505-40 = "(Squeak, squeak)"
1000505-41 = "..."
1000505-42 = "Ai, ai... que susto..."
1000505-43 = "Um rato, é? Poxa, que susto que ele deu na gente."
1000505-44 = "Por causa disso, toda a tralha que estava empilhada caiu."
1000505-45 = "[s] \"…………….\""
1000505-46 = "..."
1000505-47 = "Uhe, Sensei? Por que essa cara de convencido?"
1000505-48 = "Você por acaso ia dizer que até a Hoshino se assusta?"
1000505-49 = "Mesmo eu, em uma situação dessas, é claro que levaria um susto, né?"
1000505-50 = "...Bem, já que pude ver essa expressão rara do Sensei... ué?"
1000505-52 = "Olha só, Sensei. No meio da tralha que caiu agora pouco... tem algo brilhando."
1000505-53 = "[s] Pega um papel que brilha fracamente."
1000505-55 = "Isso é... um adesivo fluorescente?"
1000505-56 = "E de peixe, ainda por cima!"
1000505-57 = "Este aqui é um peixe tropical... e este é um turbante, uma lula, um peixe-lua... uhe, tem até uma água-viva!"
1000505-58 = "Que tesouro incrível, Sensei!"
1000505-59 = "[s] \"Está velho e o brilho está um pouco fraco...\""
1000505-60 = "Uhe, mas é isso que o torna legal, não sei explicar direito..."
1000505-61 = "Porque ele ficou brilhando aqui sozinho, em um lugar onde ninguém notaria."
1000505-62 = "[s5] \"Toma.\"\n[s6] \"Um presente.\""
1000505-63 = "Hm? V-você vai me dar?"
1000505-64 = "Hm? V-você vai me dar?"
1000505-65 = "Mas foi você quem achou, Sensei, então a regra diz que isso é seu..."
1000505-66 = "[s] Entregar."
1000505-69 = "Ah... ué... o-obrigada, Sensei."
1000505-72 = "Hee..."
1000505-73 = "...Que pescaria incrível de peixinhos fofos!"
1000505-74 = "Vou colar no teto de casa! Deve ficar incrível se eu apagar a luz e ficar olhando!"
1000505-75 = "Uhe~, vamos logo para casa, Sensei!"
1000505-77 = "(Voltei para casa junto com a Hoshino, que parecia estar se divertindo)"
