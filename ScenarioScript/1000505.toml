[translation]
1000505-1 = "うっすらだけど輝いてる"
1000505-2 = "光を生み出すだけでもすごいのに、それで自分の身体を保護するなんて、不思議だよね。"
1000505-3 = "暗い深海で光を作ると捕食者にバレると思うけど、一人ならともかく大勢で集めて群れを作れば逆に威嚇になるみたい。"
1000505-4 = "うへ～どんな光景なのかな？きっとものすごいんだろうな。"
1000505-5 = "[s1] \"今日の予定って、魚の話？\"\n[s2] \"今日は何を探すの？\""
1000505-6 = "うへ～せっかちだなあ、先生は。"
1000505-7 = "うへ～せっかちだなあ、先生は。"
1000505-8 = "ようやくトレジャーハンターの魂が目覚めたのかな、いい兆候じゃん。"
1000505-9 = "アビドスはかなり歴史が古いからあちこちに隠れた空間があって、それを探し出すのは結構楽しいんだよ！"
1000505-10 = "前回は倉庫だったから、今度は閉鎖された旧校舎に行ってみようか？"
1000505-13 = "アビドス・第三旧校舎"
1000505-14 = "ケホケホ、ケホケホ……ここもホコリがすごいな。"
1000505-15 = "あちこちガラクタだらけ、ほとんど使えそうな物はないと思うけど。"
1000505-16 = "先生、足を引っかけて転ばないように気を付けて。"
1000505-17 = "[s3] \"昼に来た方がよくない？\"\n[s4] \"ぞくぞくするね……。\""
1000505-18 = "うへ、真夜中の宝探しってロマンがあるじゃん。しかも他の人にバレる心配もないし。"
1000505-19 = "うへ～、先生、まさか怖いの？"
1000505-20 = "大丈夫、大丈夫。このおじさんの後ろにピタッとくっ付いてきて。"
1000505-21 = "じゃあもっと進んでみようか。"
1000505-22 = "良いものを見つけたらすぐに拾わないとダメだよ。宝探しは見つけた人のものってルールなんだから。"
1000505-25 = "うーん。結構歩き回ったけど特に使えそうなものは見つからないね……。"
1000505-26 = "やっぱり良さそうなものはとっくに持っていかれちゃったか……。"
1000505-29 = "（ガラガラ）"
1000505-32 = "ここは……ずいぶん昔先輩たちが使ってた場所みたいだね。おじさんも来たことないからよく分からないけど。"
1000505-33 = "（がさっ）"
1000505-34 = "……うん？"
1000505-35 = "何か、音が聞こえなかった？"
1000505-36 = "あっちの方だったけど……。"
1000505-37 = "う、うああああっ？！"
1000505-39 = "（がたがたん）"
1000505-40 = "（チュウ、チュウ）"
1000505-41 = "……。"
1000505-42 = "う、うあ……。びっくりしたあ……。"
1000505-43 = "ネズミかぁ……まったく、人をびっくりさせてー。"
1000505-44 = "おかげで積んでたガラクタが全部落ちてきちゃったじゃん。"
1000505-45 = "[s] \"……………。\""
1000505-46 = "……。"
1000505-47 = "うへ、せんせ～？何さそのドヤ顔？"
1000505-48 = "まさか、ホシノでも驚くんだね、なんて言うつもりかー？"
1000505-49 = "いくら私でもこんな状況ならびっくりするに決まってるでしょ～？"
1000505-50 = "……まあ先生の珍しい表情も見れたから……あれ？"
1000505-52 = "これ見て、先生。さっき落ちてきたガラクタの中……何か光ってる。"
1000505-53 = "[s] うっすら光ってる紙を拾う。"
1000505-55 = "これ……夜光ステッカー？"
1000505-56 = "しかも魚の！"
1000505-57 = "これは熱帯魚で……こっちはサザエ、イカ、マンボウ……うへ、クラゲもある！"
1000505-58 = "すごいお宝じゃん、先生！"
1000505-59 = "[s] \"古くてちょっと光が弱いかも……。\""
1000505-60 = "うへ、それがカッコいいんじゃん、ちょっとうまく説明できないけど……。"
1000505-61 = "誰も気づいてくれないところで、一人でこうやって輝いてたんだから。"
1000505-62 = "[s5] \"あげる。\"\n[s6] \"プレゼント。\""
1000505-63 = "うん？お、わ、私にくれるの？"
1000505-64 = "うん？お、わ、私にくれるの？"
1000505-65 = "でも拾ったのは先生なんだから、これは先生のものってルールだし……。"
1000505-66 = "[s] 渡す。"
1000505-69 = "あ……う……あ、ありがとう、先生。"
1000505-72 = "へえ……。"
1000505-73 = "……可愛い魚たちが大漁だ！"
1000505-74 = "家の天井に貼っておこ！電気を消して眺めたらすごいかも！"
1000505-75 = "うへ～、早く帰ろう、先生！"
1000505-77 = "（楽しそうなホシノと一緒に帰った）"
