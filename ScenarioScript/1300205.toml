[translation]
1300205-1 = "出禁"
1300205-2 = "キヴォトス・飲食店街"
1300205-3 = "ルンルン～、今日はどこのお店に行きましょうか？"
1300205-4 = "今はお財布事情がちょっと厳しいですし、お手頃な価格でたくさん食べられる、食べ放題のお店に行きたいところです。"
1300205-5 = "となるとやはり……焼肉！食べ放題と言えば焼肉、焼肉と言えば食べ放題ですよね！"
1300205-6 = "それでは晩ご飯には少し早い時間帯ですが、お店に入りましょうか。"
1300205-10 = "1名お願いします～、とりあえずカルビと――"
1300205-12 = "いらっしゃませ。えっと、注文はお席に着いた後に……って、はっ！"
1300205-14 = "（この子はまさか、大食い大会の常連チャンピオン、[ruby=わにぶち]鰐渕[/ruby]アカリじゃないか！？）"
1300205-15 = "（以前、商店街の大食い大会で、カルビ30人前を一瞬で平らげてしまったという……）"
1300205-16 = "（ダメだ……！こんなお客さんに食べ放題なんて提供した暁には、うちのお店が潰れてしまう！）"
1300205-18 = "あ、あのう……お客様。大変申し訳ございませんが、今日はもう材料が切れてしまいまして……。"
1300205-19 = "あら？さっき他のお客さんが入ってませんでしたか？"
1300205-20 = "あのお客様の分が最後だったもので……申し訳ありません！"
1300205-21 = "材料が切れたのなら仕方ないですね～。#nああ、今日は焼肉の気分だったのに。"
1300205-22 = "仕方ありません、他のお店を探しましょうか……。"
1300205-24 = "確かこの辺に、食べ放題のお寿司のお店が……。"
1300205-25 = "焼肉ほどではないですけど……お寿司を好きなだけ食べられる機会もそうそうありませんからね。"
1300205-26 = "では今日の晩ご飯は、お寿司に決定です！"
1300205-30 = "1名です～、とりあえずマグロと――"
1300205-33 = "（この子はまさか、大食い大会の常連チャンピオン、[ruby=わにぶち]鰐渕[/ruby]アカリじゃないか！？）"
1300205-34 = "（ダメだ！この子にはマグロ丸ごと一本でも足りない！）"
1300205-36 = "す、すみません！よく確認してみたら、今日はこの後来るお客さんの分でもういっぱいでして、予約が無いお客様を受け入れられず……！"
1300205-37 = "ええ、そんな……。"
1300205-38 = "予約でいっぱいなら仕方ないですね。では他のお店に……。"
1300205-40 = "うう……お腹が空きました……。"
1300205-41 = "今日は行く先々がどこも材料切れか予約でいっぱいかで、入れそうにないですね。"
1300205-42 = "いつも食べ過ぎていたから、食べ放題の神様から罰が下ったのでしょうか……。"
1300205-43 = "[s] \"どうしたの？すごい憂鬱そうな表情だけど。\""
1300205-44 = "あっ、先生。#n先生もお食事ですか？"
1300205-45 = "今日はせっかく、食べ放題のお店でお腹いっぱいになるまで思いっきり食べようと思ったのに、行く先々で断られてしまいまして……。"
1300205-46 = "結局お店が見つからず、いまだに晩ご飯が食べられていないんです。"
1300205-47 = "[s] \"食べ放題のお店じゃなくて、普通のお店じゃダメ？\""
1300205-48 = "今は、普通のお店で満足に食べられるほどお金が無くって……。"
1300205-49 = "うう……ずっとお腹が空きっぱなしで、体に力が入らなくなってきました……。#nもう食べ放題のお店は諦めて、普通のお店に入るしか……。"
1300205-50 = "[s] \"回転寿司でもいいなら、いくらでもご馳走するよ。\""
1300205-51 = "ほ、本当ですか？#nはい、ぜひ！回転寿司、大好きです！"
1300205-52 = "でも好きなだけ、なんて……良いのでしょうか？"
1300205-53 = "……フフッ。でしたら、遠慮なく♥"
1300205-55 = "お店に入るまで、アカリが言っていることの意味に気がつけなかった……。"
1300205-58 = "[wa:300]― んんっ、[wa:950]美味しい～！"
1300205-61 = "― こんなに[wa:350]美味しいお寿司なら、"
1300205-63 = "― いくらでも[wa:400]食べられそうです！"
1300205-66 = "[wa:400]― 今のところ[wa:750]何皿くらい食べたのか、[wa:1750]ですか？"
1300205-69 = "― フフッ、"
1300205-71 = "[wa:100]― 先生は[wa:550]今まで食べたお寿司の数を[wa:1300]覚えているのですか？[wa:2000]……なんて。"
1300205-74 = "[wa:300]― うーん、[wa:1500]大体[wa:500]100皿ぐらいでしょうか……。"
1300205-76 = "[wa:50]― でも、[wa:700]普段に比べたら[wa:1000]だいぶ抑えている方ですよ。"
1300205-79 = "― まだ私のお腹は[wa:1370]半分も満たされていませんから！"
1300205-82 = "[wa:300]― これ以上食べて、[wa:1400]本当に良いんですか？"
1300205-84 = "[wa:50]― 先程から[wa:700]先生の額に、[wa:1450]冷や汗が流れてません？"
1300205-87 = "[wa:250]― あっ、[wa:850]この金のお皿に乗ったお寿司、"
1300205-89 = "[wa:50]― きっと[wa:400]美味しいんでしょうね～。"
1300205-92 = "― 先生、[wa:1350]これ[wa:1000]食べても良いですか？"
1300205-94 = "― この[wa:850]一皿1,000円するお寿司、[wa:2170]食べちゃいますよ？"
1300205-97 = "キヴォトス・飲食店街"
1300205-98 = "ごちそうさまでした、先生！"
1300205-99 = "まさかお寿司の材料が無くなって売り切れ閉店だなんて、思いもよらない結末でしたね。"
1300205-100 = "先生はお腹いっぱい食べられましたか？私はまだあと50皿くらいは食べられそうですが……。"
1300205-102 = "では、もう一軒、別のお寿司屋さんに行きましょうか？"
1300205-104 = "なんて、冗談ですよ。これ以上食べてしまうと、先生のお財布が本当に危なそうですし。"
1300205-105 = "代わりにと言ってはなんですが、次回は私の方から、先生が満足するまでご馳走させていただきますね。"
1300205-106 = "え、今日の額に比べたら、一回の食事だと全然安上がりになりそう……ですか？"
1300205-107 = "ウフフ、そうですね。先生はそんなに食べる方ではありませんし、やっぱり一回じゃ足りませんよね。"
1300205-108 = "では……これから十回でも百回でも。お食事、付き合ってくれますか？♥"
