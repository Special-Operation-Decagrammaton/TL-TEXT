[translation]
1300205-1 = "Proibida a entrada"
1300205-2 = "Kivotos, Distrito Gastronômico"
1300205-3 = "Run-run~, a qual restaurante vamos hoje?"
1300205-4 = "Minha situação financeira atual está um pouco complicada, então adoraria ir a um rodízio onde eu possa comer bastante por um preço acessível."
1300205-5 = "Sendo assim, só pode ser... churrasco! Quando se fala em rodízio, pensa-se em churrasco, e quando se fala em churrasco, pensa-se em rodízio, não é?"
1300205-6 = "Bem, ainda está um pouco cedo para o jantar, mas vamos entrar no restaurante."
1300205-10 = "Uma pessoa, por favor~. Para começar, quero costela e..."
1300205-12 = "Seja bem-vinda. Hum, o pedido será feito depois que se sentar... espere, ah!"
1300205-14 = "(Essa garota... não é a Akari, a campeã recorrente dos concursos de comida!?)"
1300205-15 = "(Dizem que, da última vez, ela devorou 30 porções de costela num piscar de olhos em um concurso no centro comercial...)"
1300205-16 = "(Não pode ser...! Se eu oferecer um rodízio para uma cliente dessas, meu restaurante vai à falência!)"
1300205-18 = "A-ah... cliente. Sinto muito, mas os ingredientes acabaram por hoje..."
1300205-19 = "Ué? Mas aquele outro cliente não acabou de entrar?"
1300205-20 = "A porção daquele cliente foi a última... sinto muito!"
1300205-21 = "Se os ingredientes acabaram, não há o que fazer.~#nAh, eu estava com tanta vontade de comer churrasco."
1300205-22 = "Não tem jeito, vamos procurar outro lugar..."
1300205-24 = "Se não me engano, tem um rodízio de sushi por aqui..."
1300205-25 = "Não é tão bom quanto churrasco, mas... não é sempre que se tem a chance de comer sushi à vontade."
1300205-26 = "Então, o jantar de hoje está decidido: será sushi!"
1300205-30 = "Uma pessoa~. Para começar, quero atum e..."
1300205-33 = "(Essa garota... não é a Akari, a campeã recorrente dos concursos de comida!?)"
1300205-34 = "(Não! Nem um atum inteiro seria o suficiente para ela!)"
1300205-36 = "D-desculpe! Verifiquei aqui e, na verdade, já estamos lotados com os clientes que virão a seguir. Não podemos aceitar clientes sem reserva...!"
1300205-37 = "Ah, não pode ser..."
1300205-38 = "Se está lotado, não há o que fazer. Vamos para outro lugar..."
1300205-40 = "Uuu... estou com tanta fome..."
1300205-41 = "Por onde eu passo hoje, ou os ingredientes acabaram ou está tudo lotado. Não consigo entrar em lugar nenhum."
1300205-42 = "Será que o deus dos rodízios está me punindo por comer demais sempre?..."
1300205-43 = "[s] \"O que houve? Você parece tão deprimida.\""
1300205-44 = "Ah, Sensei.#nVocê também veio jantar?"
1300205-45 = "Eu queria aproveitar hoje para comer até não aguentar mais em um rodízio, mas fui recusada em todos os lugares que tentei..."
1300205-46 = "No fim, não encontrei nenhum restaurante e ainda não consegui jantar."
1300205-47 = "[s] \"Por que não tenta um restaurante comum em vez de um rodízio?\""
1300205-48 = "No momento, não tenho dinheiro suficiente para comer o quanto eu gostaria em um restaurante comum..."
1300205-49 = "Uuu... estou com tanta fome que não tenho mais forças...#nAcho que vou ter que desistir do rodízio e entrar em um restaurante comum mesmo..."
1300205-50 = "[s] \"Se um sushi giratório servir, eu pago o quanto você quiser.\""
1300205-51 = "V-verdade?#nSim, por favor! Eu adoro sushi giratório!"
1300205-52 = "Mas... comer o quanto eu quiser... tem certeza?"
1300205-53 = "...Fufu. Nesse caso, não vou me segurar, hein?♥"
1300205-55 = "Eu não percebi o que a Akari queria dizer até entrarmos no restaurante..."
1300205-58 = "[wa:300]― Hmm, [wa:950] que delícia!"
1300205-61 = "― Com um sushi [wa:350] tão gostoso assim,"
1300205-63 = "― acho que consigo [wa:400] comer o quanto quiser!"
1300205-66 = "[wa:400]― Quantos pratos [wa:750] eu comi até agora, [wa:1750] você pergunta?"
1300205-69 = "― Fufu,"
1300205-71 = "[wa:100]― Sensei, [wa:550] você está contando [wa:1300] quantos sushis eu comi? [wa:2000]... Brincadeirinha."
1300205-74 = "[wa:300]― Hum, [wa:1500] acho que uns [wa:500] 100 pratos..."
1300205-76 = "[wa:50]― Mas, [wa:700] comparado ao normal, [wa:1000] estou até me segurando bastante."
1300205-79 = "― Porque meu estômago [wa:1370] nem chegou na metade ainda!"
1300205-82 = "[wa:300]― Você tem [wa:1400] certeza de que quer que eu continue comendo?"
1300205-84 = "[wa:50]― Desde agora há pouco, [wa:700] não está escorrendo um suor frio na testa do Sensei?"
1300205-87 = "[wa:250]― Ah, [wa:850] este sushi servido no prato de ouro,"
1300205-89 = "[wa:50]― Deve ser [wa:400] delicioso, não é?"
1300205-92 = "― Sensei, [wa:1350] eu [wa:1000] posso comer isto?"
1300205-94 = "― Este [wa:850] sushi de 1.000 ienes o prato, [wa:2170] eu vou comer, viu?"
1300205-97 = "Kivotos, Distrito Comercial"
1300205-98 = "Estava uma delícia, Sensei!"
1300205-99 = "Quem diria que os ingredientes do sushi acabariam e eles fechariam por falta de estoque, foi um desfecho inesperado, não é?"
1300205-100 = "O Sensei conseguiu comer até ficar satisfeito? Eu ainda acho que conseguiria comer uns 50 pratos a mais, mas..."
1300205-102 = "Então, que tal irmos a outro restaurante de sushi?"
1300205-104 = "Brincadeira, é só uma piada. Se comermos mais do que isso, a carteira do Sensei vai ficar realmente em perigo."
1300205-105 = "Como compensação, da próxima vez, eu farei questão de pagar uma refeição para o Sensei até que fique satisfeito."
1300205-106 = "Hã? Comparado com a conta de hoje, uma refeição sairia bem mais barato... é isso?"
1300205-107 = "Ufufu, é verdade. O Sensei não é de comer tanto assim, então uma vez só não seria o suficiente, né?"
1300205-108 = "Então... de agora em diante, dez ou até cem vezes. Você vai me acompanhar nas refeições? ♥"
