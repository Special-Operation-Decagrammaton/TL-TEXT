[translation]
10039130-1 = "Epílogo 5: Princesa da Justiça"
10039130-2 = "（Ao ouvir que o Comitê de Justiça estava preparando uma peça, decidi ir ver como estavam as coisas）"
10039130-7 = "Sensei, por aqui!"
10039130-8 = "[s] \"Ichika!? Esse traje ficou muito bom em você!\""
10039130-9 = "Haha. #nSabe qual é o meu papel?"
10039130-10 = "[s] \"É o papel do príncipe, não é?\""
10039130-11 = "Acertou! #nBem, acabou sendo decidido assim por acaso."
10039130-12 = "Mas eu treinei bastante."
10039130-13 = "Já que está aqui, por favor, fique para assistir."
10039130-14 = "[s1] \"Claro.\"\n[s2] \"Que tipo de peça é?\""
10039130-17 = "Bem, é uma peça clássica chamada \"A Princesa da Floresta Paralisada\"."
10039130-18 = "Como o título sugere, é uma história onde o príncipe supera várias dificuldades #npara salvar a princesa paralisada."
10039130-22 = "É surpreendentemente interessante. #nEntão, vamos lá?"
10039130-27 = "（Encontrei Tsurugi sentada em um dos assentos do teatro）"
10039130-31 = "P-P-P-P-Sensei!?"
10039130-32 = "[s3] \"Bom dia, Tsurugi.\"\n[s4] \"Posso me sentar ao seu lado?\""
10039130-37 = "Uaaaah, kiiieee..."
10039130-41 = "Ah, desculpe. #nTenho que ficar em silêncio aqui..."
10039130-42 = "...B-bom dia, Sensei. Por favor, sente-se aqui..."
10039130-44 = "（Sentei-me ao lado de Tsurugi e observei o ensaio da peça）"
10039130-48 = "Ah, a princesa nasceu!"
10039130-54 = "A próxima fala é..."
10039130-55 = "\"Nós preparamos um presente para a princesa\"..."
10039130-57 = "Nós preparamos um presente para a princesa!"
10039130-58 = "\"Princesa, isto é a beleza\"..."
10039130-59 = "Princesa, isto é a beleza."
10039130-63 = "[ns] \"Por acaso, você decorou todas as falas?\""
10039130-67 = "Ah, sim..."
10039130-68 = "Já que todos estão se esforçando tanto..."
10039130-69 = "[s] \"Incrível! Qual é o seu papel, Tsurugi?\""
10039130-70 = "...Eu não tenho um papel. #nEu só ajudo com os adereços e participo das discussões sobre o roteiro..."
10039130-71 = "Parece que ler romances de amor foi útil."
10039130-72 = "...Além disso, há muitos alunos mais adequados do que eu."
10039130-73 = "Eu só acabo assustando todo mundo..."
10039130-74 = "[s] \"...Entendo, mesmo tendo decorado até as falas.\""
10039130-75 = "Não se preocupe com isso... só de assistir já é divertido."
10039130-79 = "Para mim, isso já basta..."
10039130-80 = "[s5] \"Se você diz, Tsurugi...\"\n[s6] \"Estou ansioso pela apresentação oficial.\""
10039130-83 = "Fufu... sim, é um trabalho de confiança."
10039130-85 = "（Assim, passei o dia observando o ensaio com Tsurugi）"
10039130-89 = "（No dia seguinte, fui novamente à Trinity para assistir à peça）"
10039130-95 = "[ns7] \"Quantos espectadores...!\"\n[ns8] \"É muito popular!\""
10039130-99 = "Ah, Mestre!"
10039130-101 = "Oh, Sensei!"
10039130-102 = "O-olá, Sensei..."
10039130-103 = "[s9] \"Vocês também vieram!\"\n[s10] \"Vieram assistir à peça?\""
10039130-106 = "Fufufu, exatamente!"
10039130-107 = "No palco, usando várias atuações e ferramentas, #ntornamos o irreal em realidade, sabe!"
10039130-108 = "Ou seja, a atuação é parecida com o Ninjutsu!"
10039130-109 = "Sendo assim, isso também faz parte do treinamento!"
10039130-110 = "Como esperado da nossa presidente...!#nEu também vou dar o meu melhor, nin-nin!"
10039130-111 = "Além disso, se gravarmos nossas reações e postarmos com o título \"Reação de alunas de outra escola\", acho que as visualizações do \"Diário Ninja da Michiru\" vão disparar..."
10039130-113 = "C-com certeza terá um bom efeito...#nO Carnaval da Trinity é um evento gigantesco que atrai a atenção de todo o Kivotos..."
10039130-114 = "A-acho que existe uma expressão para usar nessas horas..."
10039130-115 = "Hum, seria... tirar proveito da situação?"
10039130-116 = "Ou seria... usar a autoridade alheia para se promover...?"
10039130-117 = "Bem, esqueçam as palavras difíceis!"
10039130-118 = "[s11] \"Então esse era o plano...!\"\n[s12] \"Como esperado do Clube de Pesquisa Ninjutsu!\""
10039130-121 = "Mestre, você também veio assistir à peça?"
10039130-122 = "Que tal assistir com a gente?"
10039130-123 = "Se for o Sensei, é muito bem-vindo.#nAcho que conseguiremos ótimas reações!"
10039130-124 = "[s] \"Desculpe, eu tenho um compromisso...\""
10039130-128 = "[ns] \"Eu preciso ir agora.\""
10039130-129 = "Entendo, se é uma missão, não há o que fazer!#nSe precisar de algo, entre em contato com a Izuna a qualquer momento!"
10039130-130 = "B-boa sorte... Sensei."
10039130-131 = "Nós vamos aproveitar para praticar a filmagem antes de começar."
10039130-133 = "(Não posso esquecer de pedir permissão para filmar dentro do local depois...)"
10039130-138 = "[ns] \"Aquilo é...\""
10039130-144 = "...Que problemático."
10039130-145 = "O-o que devemos fazer..."
10039130-147 = "...Primeiro, precisamos encontrar alguém para substituir."
10039130-153 = "Ah, Sensei.#nVeio nos ver hoje também, né?"
10039130-155 = "Sensei...!"
10039130-156 = "S-Sensei..."
10039130-157 = "[s] \"Pessoal, aconteceu alguma coisa?\""
10039130-159 = "Bem..."
10039130-160 = "Na verdade..."
10039130-161 = "A aluna que faria o papel da princesa foi atingida por um foguete no caminho e se feriu."
10039130-162 = "[s] \"Não pode ser...\""
10039130-163 = "Felizmente, não foi nada grave, mas ela não tem condições de subir ao palco..."
10039130-164 = "Ah..."
10039130-165 = "A princesa precisa pular através de arcos de fogo e desviar de balas, sabe?"
10039130-166 = "Por isso, poucas pessoas conseguem fazer esse papel..."
10039130-167 = "[s] \"É um papel bem difícil, hein...\""
10039130-168 = "É que queríamos que a peça fosse o mais fiel possível à obra original..."
10039130-169 = "De qualquer forma, precisamos encontrar uma substituta rápido..."
10039130-170 = "Se não, a peça será cancelada..."
10039130-175 = "Kieee..."
10039130-179 = "[ns13] \"Acho que a pessoa ideal está bem aqui.\"\n[ns14] \"Que tal a Tsurugi atuar?\""
10039130-186 = "¡?"
10039130-191 = "C-cof, cof...!#nGu-fuaaa...!"
10039130-192 = "Sensei, isso é..."
10039130-193 = "[s15] \"A Tsurugi decorou todas as falas...\"\n[s16] \"E nem preciso mencionar a capacidade física dela.\""
10039130-196 = "[ns] \"Não seria perfeita para o papel de princesa?\""
10039130-197 = "S-Sensei...!?"
10039130-198 = "Na verdade, faz sentido."
10039130-199 = "Hasumi...!?"
10039130-200 = "Como o Sensei disse, acho que a Tsurugi é a pessoa ideal para o papel de princesa."
10039130-201 = "M-mas eu... não combino nada com o papel de princesa..."
10039130-206 = "Eu concordo também."
10039130-207 = "A-até a Ichika...?"
10039130-208 = "Tsurugi-senpai, você estava levando essa peça a sério, não estava?"
10039130-209 = "Você veio mais cedo que todo mundo para os ensaios, montou o palco e até cuidou do roteiro e dos figurinos, não foi?"
10039130-210 = "Você deve ter decorado até a posição de cada ator no palco, #neu sei que você consegue, Tsurugi-senpai!"
10039130-211 = "M-mas..."
10039130-212 = "Eu não tenho talento para atuar..."
10039130-213 = "Você costuma ver muitos romances e filmes, não vê?"
10039130-214 = "Mas..."
10039130-215 = "Eu já vi você imitando cenas famosas de vez em quando."
10039130-216 = "I-isso é!"
10039130-217 = "É vergonhoso, pare com isso..."
10039130-218 = "Não precisa ter vergonha. #nA experiência da Tsurugi certamente será útil."
10039130-219 = "..."
10039130-224 = "Vai dar tudo certo, com certeza!"
10039130-225 = "[s] \"Eu também acho que você consegue, Tsurugi.\""
10039130-227 = "E-eu, bem..."
10039130-231 = "U-uu..."
10039130-232 = "...Eu vou tentar."
10039130-234 = "Obrigada, Tsurugi."
10039130-235 = "Então, vamos nos trocar logo!"
10039130-237 = "K-kieee..."
10039130-244 = "Ufa, conseguimos resolver o papel da princesa, mas..."
10039130-245 = "[s] \"Ainda tem algum problema?\""
10039130-249 = "Sim, na verdade..."
10039130-250 = "Parece que quem faria o papel da árvore também foi pego pelo foguete..."
10039130-251 = "Seria bom se pudéssemos pedir para alguém..."
10039130-256 = "[ns17] \"Eu conheço alguém que seria perfeita para isso...\"\n[ns18] \"Quer que eu peça para ela?\""
10039130-261 = "S-sério?"
10039130-265 = "[ns] (Entrando em contato com o Clube de Pesquisa Ninjutsu)"
10039130-273 = "Opa!"
10039130-274 = "Se é assim, pode deixar com a gente do Clube de Pesquisa Ninjutsu!"
10039130-276 = "Izuna está muito feliz por poder ser útil ao Mestre!"
10039130-277 = "Se for o papel da árvore, eu tenho confiança...!"
10039130-278 = "[s19] \"Não é um papel de destaque, mas...\"\n[s20] \"...Tudo bem para você?\""
10039130-281 = "Nas peças da escola, eu sempre fazia o papel da árvore."
10039130-282 = "Fiquei um pouco triste por não conseguir fazer outros papéis, mas..."
10039130-283 = "Depois que entrei no Clube de Pesquisa Ninjutsu, aprendi que cada pessoa tem seu papel!"
10039130-285 = "Tsukuyo..."
10039130-286 = "Tsukuyo-dono..."
10039130-288 = "Qualquer papel é importante. #nEu gosto de quem eu sou agora."
10039130-289 = "Além disso..."
10039130-290 = "Se eu puder ser útil para o pessoal do Comitê de Justiça, ficarei muito feliz!"
10039130-292 = "Izuna também acha isso!"
10039130-293 = "Muito bem dito, Tsukuyo!"
10039130-295 = "Já que vamos participar da peça, acho que dá para postar dois vídeos!"
10039130-296 = "[s21] \"Esse era o seu objetivo!?\"\n[s22] \"Obrigado, pessoal.\""
10039130-304 = "(Assim, cada um começou os preparativos para a peça)"
10039130-312 = "A peça do Comitê de Justiça não parece interessante?"
10039130-313 = "E dizem que é \"A Princesa da Floresta Paralisada\"."
10039130-314 = "Incrível! #nJá está lotado, sabia?"
10039130-315 = "Olha, as alunas de Wild Hunt também vieram!"
10039130-316 = "[s] \"Pessoal, boa sorte……!\""
10039130-322 = "Está quase começando……!"
10039130-325 = "Era uma vez……."
10039130-326 = "Em um certo lugar, havia uma princesa."
10039130-335 = "[ns] \"Oh……!\""
10039130-336 = "Uau, a atriz que faz a princesa é muito linda!"
10039130-337 = "Tinha uma garota assim no Comitê de Justiça?"
10039130-341 = "[ns] \"Tsurugi, será que ela está nervosa……?\""
10039130-342 = "……."
10039130-346 = "As miosótis estão florescendo lindamente."
10039130-347 = "[s] \"Oh……!\""
10039130-351 = "A voz dela é tão bonita……."
10039130-352 = "Parece uma princesa de verdade……!"
10039130-354 = "（Ao contrário da preocupação, a atuação de Tsurugi estava maravilhosa）"
10039130-358 = "Naquele momento, a princesa é picada pela agulha da roca……!"
10039130-362 = "Ah……!"
10039130-367 = "E assim, o corpo da princesa ficou paralisado……."
10039130-368 = "Princesa, por que……."
10039130-369 = "Ah……."
10039130-370 = "Eu já sei como termina, mas……."
10039130-371 = "Ainda fico tão nervosa quanto na primeira vez que vi……!"
10039130-377 = "Oh, bela princesa……!"
10039130-378 = "Para proteger seus cabelos negros como o céu noturno e seus lábios vermelhos que superam até as rosas……."
10039130-379 = "……Vim apressado em meu cavalo branco para buscá-la!"
10039130-380 = "Uau! Quem será que está fazendo o papel de príncipe…… Que incrível!"
10039130-381 = "Caramba…… Acho que estou me apaixonando!"
10039130-383 = "（Depois disso, a peça seguiu bem e finalmente chegou ao clímax）"
10039130-386 = "（Nesta parte, preciso relaxar o corpo……）"
10039130-390 = "（Se-Sensei……！）"
10039130-391 = "（Nossos olhares se cruzaram……！）"
10039130-392 = "（……Olhe para mim！）"
10039130-397 = "[ns23] Torcer gesticulando.\n[ns24] （Tsurugi, força!）"
10039130-402 = "（O Sensei…… está torcendo por mim……！）"
10039130-407 = "（N-não pode ser. Se eu ficar consciente do Sensei…… u-uhhhhhh！）"
10039130-412 = "G-guuuuuuu…… GIEEEEAAAAAAHHHHHH！！！！"
10039130-418 = "P-princesa……."
10039130-423 = "……Princesa!"
10039130-427 = "Com isso, ficará tudo bem……!"
10039130-428 = "Fique tranquila, princesa!"
10039130-432 = "G-gieeeee……!"
10039130-433 = "Pois jurei que, aconteça o que acontecer, continuarei sendo seu aliado……!"
10039130-434 = "G-guuoooo……！！"
10039130-437 = "……O que será que deu na atriz da princesa de repente?"
10039130-438 = "Será que ela está paralisada de verdade……?"
10039130-439 = "[s] （Droga……！）"
10039130-443 = "I-isso é……!"
10039130-444 = "Será que…… ela está trazendo o expressionismo para o teatro!?"
10039130-445 = "Hã……?"
10039130-446 = "É muito realista e impactante!"
10039130-447 = "Eu nunca imaginei que ela fosse se entregar tanto ao papel assim..."
10039130-448 = "Quem diria que eu expandiria meus horizontes aqui em Trinity... É simplesmente magnífico!"
10039130-454 = "As alunas de Wild Hunt estão aplaudindo...!"
10039130-455 = "Hã, o que está acontecendo?"
10039130-456 = "Eu não entendo muito bem, mas acho que deve ser algo incrível, não é!?"
10039130-462 = "[ns] \"Esses aplausos...\""
10039130-465 = "(Eu não faço ideia do que está acontecendo, mas...)"
10039130-466 = "(Senpai Tsurugi, vamos continuar assim!)"
10039130-472 = "GUOOOOOOOOOOO!!"
10039130-474 = "(A peça do Comitê de Realização da Justiça foi um sucesso.)"
10039130-475 = "(No entanto, Tsurugi, que recebeu os aplausos durante o encerramento, desmaiou ali mesmo.)"
