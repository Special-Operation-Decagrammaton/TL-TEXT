[translation]
10039130-1 = "後日談その5;ジャスティス☆プリンセス"
10039130-2 = "（正義実現委員会が演劇を準備していると聞き、様子を見に行くことに）"
10039130-7 = "先生、こっちっすよ！"
10039130-8 = "[s] \"イチカ！？格好良いね、その衣装！\""
10039130-9 = "ははっ。#n何の役か分かりますか？"
10039130-10 = "[s] \"王子様の役だよね？\""
10039130-11 = "正解っす！#nまぁ、成り行きで決まって。"
10039130-12 = "でも、結構練習したんすよ。"
10039130-13 = "せっかくですし、先生も見ていってください。"
10039130-14 = "[s1] \"もちろん。\"\n[s2] \"どんな演劇なの？\""
10039130-17 = "えっと、「麻痺した森の姫」という古典劇っす。"
10039130-18 = "題名の通り、王子様が数々の苦難を乗り越えて、#n麻痺したお姫様を救う物語っすね。"
10039130-22 = "これが意外と面白いんすよ。#nそれじゃ、行きましょうか。"
10039130-27 = "（劇場の座席に座っているツルギを発見した）"
10039130-31 = "せ、せせせせ、先生！？"
10039130-32 = "[s3] \"おはよう、ツルギ。\"\n[s4] \"隣、座っても良いかな？\""
10039130-37 = "うあぁぁ、きええぇぇぇ……。"
10039130-41 = "あっ、すみません。#nここでは静かにしないと……。"
10039130-42 = "……お、おはようございます、先生。どうぞ、こちらにお座りください……。"
10039130-44 = "（ツルギの隣に座って、劇の練習を眺めた）"
10039130-48 = "ああ、姫が誕生した！"
10039130-54 = "次の台詞は……。"
10039130-55 = "「我々が姫に贈り物をご用意しました」……。"
10039130-57 = "我々が姫に贈り物をご用意しました！"
10039130-58 = "「姫、これは美しさです」……。"
10039130-59 = "姫、これは美しさです。"
10039130-63 = "[ns] \"もしかして、台詞を全部覚えてるの？\""
10039130-67 = "あっ、はい……。"
10039130-68 = "せっかく、みんなが頑張っているわけですし……。"
10039130-69 = "[s] \"すごいね！ツルギはどんな役なの？\""
10039130-70 = "……役は、ありません。#n私は小道具の準備や脚本の話し合いに参加するだけで……。"
10039130-71 = "恋愛小説を読んでいたのが、役に立ったようです。"
10039130-72 = "……それに、私よりも相応しい生徒は多いですから。"
10039130-73 = "私なんて、みんなに怖がられるだけですし……。"
10039130-74 = "[s] \"……そっか、台詞まで覚えてるのに。\""
10039130-75 = "気にしないでください……見ているだけでも楽しいですから。"
10039130-79 = "私には、これで充分です……。"
10039130-80 = "[s5] \"ツルギがそう言うのなら……。\"\n[s6] \"本番も楽しみにしてるね。\""
10039130-83 = "ふふ……はい、自信作です。"
10039130-85 = "（こうして、この日はツルギと練習を見学した）"
10039130-89 = "（翌日、本番の演劇を見るために再びトリニティへ足を運んだ）"
10039130-95 = "[ns7] \"こんなに観客が……！\"\n[ns8] \"すごい人気だね！\""
10039130-99 = "あっ、主殿！"
10039130-101 = "おー、先生殿！"
10039130-102 = "こ、こんにちは、先生……。"
10039130-103 = "[s9] \"みんなも来てたんだ！\"\n[s10] \"劇を見にきたの？\""
10039130-106 = "ふっふっふっ、その通り！"
10039130-107 = "舞台では、いろんな演技や道具を使って、#n非現実を現実にしてるでしょ！"
10039130-108 = "つまり、演劇は忍術と似てると言える！"
10039130-109 = "というわけで、これも修行の一環！"
10039130-110 = "さすがです、部長……！#nイズナも頑張ります、ニンニン！"
10039130-111 = "それに、私たちの様子を撮影して「別学園の生徒の反応」ってタイトルをつけて投稿すれば、「少女忍法帖ミチルっち」の再生回数が伸びるんじゃないかなって……。"
10039130-113 = "き、きっと効果は、あると思います……#nトリニティ[ruby=カーニバル]謝肉祭[/ruby]は、キヴォトス全域で注目される、巨大イベントですから……。"
10039130-114 = "こ、こういう時に使う言葉があったような……。"
10039130-115 = "えっと、漁夫の利……？"
10039130-116 = "虎の威を借る狐、でしたっけ……？"
10039130-117 = "まあ、難しい言葉は置いといて～！"
10039130-118 = "[s11] \"そういう作戦だったのか……！\"\n[s12] \"さすがは忍術研究部！\""
10039130-121 = "主殿も劇を見に来たのですか？"
10039130-122 = "イズナたちと一緒に見るのはどうでしょう！"
10039130-123 = "先生殿なら歓迎だよ。#n良いリアクションが撮れそうだし！"
10039130-124 = "[s] \"ごめんね、ちょっと用事があって……。\""
10039130-128 = "[ns] \"私は行かなきゃいけないんだ。\""
10039130-129 = "なるほど、任務でしたら仕方ありません！#n何かあれば、いつでもイズナに連絡してください！"
10039130-130 = "が、頑張って、ください……先生。"
10039130-131 = "私たちは始まる前に撮影練習でもしてようかな。"
10039130-133 = "（場内の撮影許可は、あとで忘れずに聞いておこう……）"
10039130-138 = "[ns] \"あれは……。\""
10039130-144 = "……困りましたね。"
10039130-145 = "ど、どうすれば……。"
10039130-147 = "……まずは、代わりの人を探さなくてはなりません。"
10039130-153 = "あ、先生。#n今日も来てくれたんすね。"
10039130-155 = "先生……！"
10039130-156 = "せ、先生……。"
10039130-157 = "[s] \"みんな、何かあったの？\""
10039130-159 = "その……。"
10039130-160 = "実は……。"
10039130-161 = "姫役の生徒が、来る途中でロケットに当たり負傷したとのことです。"
10039130-162 = "[s] \"そんな……。\""
10039130-163 = "幸い、大事には至らなかったようですが、舞台に上がるのは厳しく……。"
10039130-164 = "はあ……。"
10039130-165 = "姫役は火の輪くぐりをしたり、銃弾を避ける場面があるんすよね。"
10039130-166 = "だから、できる人は限られてるんすよ……。"
10039130-167 = "[s] \"大変な役だね……。\""
10039130-168 = "なるべく原作通りの劇にしたかったっすから……。"
10039130-169 = "とにかく、急いで代わりの方を……。"
10039130-170 = "このままじゃ、劇が中止に……。"
10039130-175 = "きえぇぇ……。"
10039130-179 = "[ns13] \"適任者なら、ここにいると思うよ。\"\n[ns14] \"ツルギが演じるのはどう？\""
10039130-186 = "っ！？"
10039130-191 = "げ、げほ、げほ……！#nぐふあぁっ……！"
10039130-192 = "先生、それは……。"
10039130-193 = "[s15] \"ツルギなら全部の台詞を覚えてるし……。\"\n[s16] \"身体能力は、言うまでもないよね。\""
10039130-196 = "[ns] \"姫役にピッタリじゃないかな。\""
10039130-197 = "せ、先生……！？"
10039130-198 = "たしかに、一理あります。"
10039130-199 = "ハスミ……！？"
10039130-200 = "先生の仰る通り、ツルギこそ姫役に適任だと思います。"
10039130-201 = "わ、私は……姫なんて、似合わないのに……。"
10039130-206 = "私も同意見っす。"
10039130-207 = "い、イチカまで……？"
10039130-208 = "ツルギ先輩、この演劇に本気だったすよね？"
10039130-209 = "練習もみんなより早く来て舞台をセッティングしたり、#n脚本の構成や衣装の用意までやってくれたじゃないっすか。"
10039130-210 = "演者の立ち位置も頭に入ってるでしょうし、#nツルギ先輩なら行けると思うっす！"
10039130-211 = "で、でも……。"
10039130-212 = "演技力もなければ……。"
10039130-213 = "普段から、恋愛小説や映画をたくさん見ているでしょう？"
10039130-214 = "けど……。"
10039130-215 = "たまに名シーンを真似してるところも見ていますよ。"
10039130-216 = "そ、それは！"
10039130-217 = "恥ずかしいから、やめて……。"
10039130-218 = "恥ずかしがらなくて良いのです。#nツルギの経験は、きっと役立ちます。"
10039130-219 = "……。"
10039130-224 = "絶対大丈夫っすよ！"
10039130-225 = "[s] \"私も、ツルギならできると思う。\""
10039130-227 = "え、えっと……。"
10039130-231 = "う、うぅ……。"
10039130-232 = "……やって、みる。"
10039130-234 = "ありがとうございます、ツルギ。"
10039130-235 = "じゃ、さっそく着替えるっすよ！"
10039130-237 = "き、きええぇ……。"
10039130-244 = "ふぅ、これで姫役は何とかなりましたが……。"
10039130-245 = "[s] \"まだ問題が残ってるの？\""
10039130-249 = "はい、実は……。"
10039130-250 = "木の役の方もロケットに巻き込まれたようで……。"
10039130-251 = "どこかに頼める方がいれば良いのですが……。"
10039130-256 = "[ns17] \"ちょうど適任の子に心当たりがあるから……。\"\n[ns18] \"お願いしてみようか？\""
10039130-261 = "ほ、本当ですか？"
10039130-265 = "[ns] （忍術研究部に連絡する）"
10039130-273 = "おー！"
10039130-274 = "それなら、我々忍術研究部にどーんと任せて！"
10039130-276 = "主殿のお役に立てるだなんて、イズナ嬉しいです！"
10039130-277 = "木の役でしたら、自信あります……！"
10039130-278 = "[s19] \"目立つ役じゃないけど……。\"\n[s20] \"……それでも大丈夫？\""
10039130-281 = "学芸会では、いつも木の役をしていましたので。"
10039130-282 = "ほかの役をできなかったのは、少し残念でしたが……。"
10039130-283 = "忍術研究部に入ってから、人にはそれぞれ役割があると学びました！"
10039130-285 = "ツクヨ……。"
10039130-286 = "ツクヨ殿……。"
10039130-288 = "どんな役も、大切ですから。#n私は今の自分が……好き、です。"
10039130-289 = "それに……。"
10039130-290 = "正義実現委員会の皆さんの役に立てるなら、とても嬉しいです！"
10039130-292 = "イズナもそう思います！"
10039130-293 = "よく言ってくれたよ、ツクヨ！"
10039130-295 = "劇に出演するんだし、二本は動画投稿できそうだね！"
10039130-296 = "[s21] \"それが目的だったの！？\"\n[s22] \"ありがとう、みんな。\""
10039130-304 = "（こうして各自、演劇の準備に取りかかった）"
10039130-312 = "正義実現委員会の演劇、楽しみじゃない？"
10039130-313 = "しかも、「麻痺した森の姫」なんだってね。"
10039130-314 = "すごい！#nもう満席だよ？"
10039130-315 = "あそこにワイルドハントの生徒も来てるよ！"
10039130-316 = "[s] \"みんな、頑張って……！\""
10039130-322 = "そろそろ始まりそう……！"
10039130-325 = "昔、昔……。"
10039130-326 = "あるところに、お姫様がいました。"
10039130-335 = "[ns] \"おぉ……！\""
10039130-336 = "わあ、お姫様役、めっちゃ綺麗！"
10039130-337 = "正義実現委員会にあんな子いたっけ？"
10039130-341 = "[ns] \"ツルギ、緊張してるのかな……？\""
10039130-342 = "……。"
10039130-346 = "[ruby=ワスレナグサ]勿忘草[/ruby]が、美しく咲いていますね。"
10039130-347 = "[s] \"おお……！\""
10039130-351 = "声、きれい……。"
10039130-352 = "本物のお姫様みたい……！"
10039130-354 = "（心配とは裏腹に、ツルギの演技はとても素晴らしかった）"
10039130-358 = "その時、姫は糸紡ぎの針に刺されてしまう……！"
10039130-362 = "きゃっ……！"
10039130-367 = "こうして姫の体は麻痺してしまいました……。"
10039130-368 = "姫よ、どうして……。"
10039130-369 = "あぁ……。"
10039130-370 = "もう結末は分かっているけど……。"
10039130-371 = "初めて見た時と同じくらい緊張するね……！"
10039130-377 = "おお、美しき姫よ……！"
10039130-378 = "夜空の如く漆黒の髪、薔薇にも勝る紅い唇を守るため……。"
10039130-379 = "……白馬に乗って、急ぎお迎えに参りました！"
10039130-380 = "わぁ！#n王子役の人、誰なんだろう……格好良い！"
10039130-381 = "やばい……私、好きになりそう！"
10039130-383 = "（その後も演劇は順調に進み、いよいよクライマックスに）"
10039130-386 = "（このパートは、体の力を抜いて……）"
10039130-390 = "（せ、先生……！）"
10039130-391 = "（先生と目が……！）"
10039130-392 = "（……私を見て！）"
10039130-397 = "[ns23] 身振り手振りで応援する。\n[ns24] （ツルギ、頑張れ！）"
10039130-402 = "（先生が……私に、エールを……！）"
10039130-407 = "（い、いけない。先生を意識すると……う、うぅぅぅぅ！）"
10039130-412 = "く、くぅぅううう……ぎえええぇぇええええぇぇぇっ！！！！"
10039130-418 = "ひ、姫……。"
10039130-423 = "……姫！"
10039130-427 = "これで大丈夫です……！"
10039130-428 = "ご安心を、姫！"
10039130-432 = "き、きえええぇぇ……！"
10039130-433 = "たとえ何があろうと、あなたの味方で在り続けると誓いましたから……！"
10039130-434 = "ぐ、ぐうぉぉぉ……！！"
10039130-437 = "……姫役の人、急にどうしたんだろう？"
10039130-438 = "本当に麻痺してるとか……？"
10039130-439 = "[s] （しまった……！）"
10039130-443 = "こ、これは……！"
10039130-444 = "まさか……表現主義を演劇に持ち込んでいるのですね！？"
10039130-445 = "え……？"
10039130-446 = "とてもリアリティで迫力があります！"
10039130-447 = "役そのものに、ここまで溶け込むだなんて……。"
10039130-448 = "まさか、トリニティで新たな見識を広められるとは……素晴らしい！"
10039130-454 = "ワイルドハントの生徒が拍手してる……！"
10039130-455 = "え、どういうこと？"
10039130-456 = "よく分かんないけど、たぶんすごいんじゃない！？"
10039130-462 = "[ns] \"この歓声は……。\""
10039130-465 = "（何がどうなってるか分からないっすけど……）"
10039130-466 = "（ツルギ先輩、このまま続けるっすよ！）"
10039130-472 = "ぐおおおおおおぉっ！！"
10039130-474 = "（正義実現委員会の演劇は、成功に終わった）"
10039130-475 = "（しかし、カーテンコールで拍手をもらったツルギは、その場で気絶してしまった）"
