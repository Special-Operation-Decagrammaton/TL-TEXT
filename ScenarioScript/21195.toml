[translation]
21195-3 = "Millennium - Corredor do Antigo Prédio Escolar"
21195-4 = "Haa, haa..."
21195-5 = "A-Acho que conseguimos fugir?"
21195-6 = "O, o que a gente faz agora...?"
21195-7 = "Já entregamos o jogo para o Millennium Prize e tudo..."
21195-8 = "Por enquanto, vamos continuar fugindo até que o resultado saia!"
21195-9 = "Vocês acharam mesmo que poderiam fugir?"
21195-10 = "!?"
21195-12 = "(Tatatatata!)"
21195-13 = "Kyaah!"
21195-14 = "Midori!"
21195-18 = "......"
21195-19 = "Entendo."
21195-20 = "Não é à toa que achei cada decisão muito bem tomada."
21195-21 = "Foi você quem comandou essas baixinhas e atacou o Depósito de Itens Confiscados da Millennium, não foi?"
21195-22 = "Foi você, né."
21195-23 = "Sensei... é assim que devo chamá-lo?"
21195-24 = "Aquele 'Sensei' que a Akane investigou... parece que os boatos não eram exagerados..."
21195-25 = "[s1] \"O que você quer? É uma revanche?\"\n[s2] \"Sobre baixinhas, a sua altura é a mesma de todo mundo aqui, não é...?\""
21195-26 = "Hah! Acha mesmo que eu viria até aqui por um motivo tão besta?"
21195-27 = "Se for para dizer algo, primeiro... você aí da testa grande."
21195-28 = "Naquela hora, você teve a audácia de me enganar direitinho, não é mesmo...?"
21195-29 = "Hiii...! M-Me desculpe!"
21195-30 = "Você foi muito bem, vou te elogiar por isso."
21195-31 = "......Eh?"
21195-32 = "Conseguiu fingir que estava com medo e tremer toda para me enganar daquele jeito. Que bela habilidade de atuação."
21195-33 = "(Acho que o medo não era atuação... eu acho.)"
21195-34 = "Bom, não importa... E você aí com essa arma absurdamente grande."
21195-35 = "O que você tá falando! Eu sou do 3º ano, sabia!? Quer que eu te conte o que aconteceu com os caras que falaram da minha altura no final!?"
21195-36 = "......Acalme-se, líder."
21195-37 = "Isso me parece quase nostálgico. Pensar que ainda existia alguém capaz de falar sobre a altura da Neru-senpai na cara dela."
21195-38 = "Fuu, fuu..."
21195-39 = "Quase perdi a calma agora... Bem, não me importo com isso. Ei, você aí com essa arma inútil de grande."
21195-41 = "(*Olhando em volta*)"
21195-42 = "É você, você mesma!"
21195-43 = "Está falando da Aris?"
21195-44 = "Isso mesmo, é com você que eu quero falar."
21195-45 = "Fiquei sabendo que você deu um trabalhão pra C&C...?"
21195-46 = "Vamos ter uma conversinha."
21195-48 = "Ah, Aris, eu conheço esse padrão."
21195-49 = "'Você foi a primeira a fazer isso comigo...'"
21195-50 = "É um evento de declaração de amor, não é. A Maid Baixinha-sama está apaixonada pela Aris. CG obtida."
21195-51 = "N-Não fode, sua pirralha! E quem você tá chamando de Maid Baixinha-sama!? Tá querendo morrer!?"
21195-52 = "Hiii...!"
21195-53 = "Q-Que medo!!"
21195-55 = "Haa..."
21195-56 = "Vocês têm o dom de me irritar, mas beleza."
21195-57 = "Vocês podem estar entendendo errado, mas não estou aqui pra me vingar por causa do trabalhão que deram pra C&C."
21195-58 = "Tinha um monte de coisas suspeitas ali, mas para a gente, foi tudo dentro de um pedido legítimo. E vocês também só atingiram o objetivo de vocês nos enfrentando."
21195-59 = "Não guardo ressentimentos por isso... mas, de repente, fiquei interessada."
21195-60 = "Interessada...?"
21195-61 = "Talvez fosse melhor dizer 'confirmar'..."
21195-62 = "Vem cá, vamos brincar um pouco."
21195-63 = "Se você lutar comigo e ganhar, eu vou embora de fininho."
21195-64 = "Não há forma mais rápida de entendermos uma à outra do que essa. O que acha, não é nada complicado, não é?"
21195-65 = "......"
21195-66 = "Entendido."
21195-67 = "Oh, parece que você tá cheia de vontade."
21195-68 = "É como... um evento de batalha de duelo, não é? Compreendido."
21195-69 = "Even... quê?"
21195-70 = "Naquela hora o lugar era apertado e nós tínhamos a missão de levar o 'Espelho' de volta, mas..."
21195-71 = "Agora...!"
21195-72 = "Lá vou eu, Carga de Poder Mágico 100%...!"
21195-74 = "Tch, isso é...!"
21195-75 = "Luz!!"
21195-77 = "BOOOOOOOMMMM!!"
21195-79 = "Ugh!"
21195-80 = "Uau!"
21195-81 = "Que poder incrível...!"
21195-82 = "Capaz de obliterar a parede da escola com tanta facilidade...!"
21195-85 = "I-Incrível..."
21195-86 = "Nunca vi tanto poder de fogo assim..."
21195-87 = "......Nós vencemos?"
21195-88 = "Aris-chan! Não pode falar essa frase à toa!"
21195-89 = "Ah, a Neru-senpai era do 3º ano. Vou refazer."
21195-90 = "N-Nós conseguimos derrotá-la...?"
21195-91 = "Não, não é um problema de nível de formalidade...!"
21195-95 = "[ns] \"Ainda não.\""
21195-97 = "(Tatatatata!)"
21195-98 = "Uwaah!?"
21195-101 = "É verdade que não é um poder de fogo comum..."
21195-102 = "Mas é só isso."
21195-104 = "N-Novamente, carregando o poder mágico...!"
21195-106 = "Muito lenta."
21195-107 = "Ah...!"
21195-108 = "(Baque!)"
21195-109 = "Kyaah!"
21195-111 = "A sua arma realmente é forte. Mas, mesmo depois de puxar o gatilho, leva no mínimo uns décimos de segundo até atirar."
21195-112 = "Além disso, por causa desse poder de fogo tão alto, se o oponente chegar a uma certa distância de você, não tem como atirar."
21195-113 = "Se você fizesse isso, você seria pega na pressão da explosão."
21195-114 = "E entre todos em Kivotos, não existem muitas pessoas que possam me vencer nessa distância..."
21195-115 = "......Não, na verdade, não há ninguém."
21195-116 = "Uugh..."
21195-117 = "Aris!"
21195-120 = "Fiquei mais decepcionada do que imaginei. Não consigo acreditar que aquelas garotas tenham perdido para isso..."
21195-121 = "......"
21195-122 = "(Swoosh!)"
21195-123 = "Ugh!"
21195-124 = "Ela usou o cano da arma... como um porrete!?"
21195-125 = "Hah, não foi uma má decisão num combate de curto alcance... mas..."
21195-128 = "Ainda assim, a essa distância, a vantagem é esmagadora para mim."
21195-129 = "Mesmo que você tente atirar, não vai conseguir mirar em mim."
21195-130 = "......Não preciso mirar."
21195-131 = "Lá vou eu!"
21195-132 = "Eu já disse que é inútil... Hm?"
21195-134 = "Preparando-se para atirar nessa situação...? Ei, não me diga que você...!?"
21195-135 = "Não em mim... mas no chão!?"
21195-136 = "Ficou louca!? Se você atirar assim, você também vai...!"
21195-137 = "Luz!!"
21195-139 = "(BOOOOOOOMMMM!)"
21195-141 = "Aris-chan! Ugh, a fumaça tá atrapalhando a visão...!"
21195-142 = "O chão desabou quase todo... Encontrei a Aris!"
21195-143 = "D-Dano físico em 48%... Desejo recuar!"
21195-145 = "[s] \"Eu te carrego.\""
21195-146 = "Por favor, rápido!"
21195-147 = "(Correndo——)"
21195-149 = "Líder!"
21195-150 = "S-Será que ela está bem? Não me diga que foi pega nos escombros..."
21195-151 = "Eu consegui ver a Aris-chan por um segundo agora há pouco, ela estava bem machucada. A nossa pequena líder já deve estar esmagada como uma panqueca..."
21195-153 = "......Quem você tá chamando de pequena!?"
21195-155 = "Ah."
21195-156 = "Uau~ Como esperado da nossa líder! Você tá vivinha da silva!"
21195-157 = "De que lado vocês estão, afinal...!"
21195-158 = "No momento a Aris perdeu sua capacidade de combate, nós vamos atrás delas? Ela estava bem machucada, então devem estar indo para a enfermaria."
21195-159 = "Sim, mesmo que a Millennium tenha mais de uma dezena de enfermarias... Com certeza as encontraremos logo."
21195-162 = "......"
21195-163 = "............"
21195-164 = "Líder?"
21195-165 = "......Ah."
21195-166 = "Não, deixa pra lá. Não vamos perseguí-las, vamos voltar."
21195-167 = "Lutar já foi o suficiente pra espairecer a cabeça."
21195-168 = "......"
21195-169 = "Nosso objetivo já foi basicamente alcançado. E agora também sei por que a Rio tem tanto interesse no Departamento de Desenvolvimento de Jogos..."
21195-170 = "E também..."
21195-171 = "Entendi! Você ficou interessada no Sensei~!"
21195-172 = "Hah, claro que não! N-Não é nada disso...!"
21195-173 = "Fufu, eu compreendo seus sentimentos. Mas, isso me deixa um pouco preocupada."
21195-174 = "Olhando para a constituição física daquelas meninas, provavelmente o gosto do Sensei é..."
21195-175 = "Pelo menos para a líder, essa não é uma má notícia."
21195-176 = "Calem a boca! Se continuarem falando merda, eu vou arrebentar vocês!?"
21195-177 = "Haa..."
21195-180 = "O Sensei, e o Departamento de Desenvolvimento de Jogos, é..."
21195-184 = "Hah."
21195-185 = "Aguardem e verão. Vou fazer com que vocês paguem muito caro por terem me tratado como baixinha."
21195-187 = "......Lutar com tudo me deixou com fome. Ei, vamos comer lámen."
21195-189 = "Parece ótimo."
21195-190 = "Apoio a ideia~!"
21195-191 = "......Pensando bem, a líder estava em fase de crescimento."
21195-194 = "Chega de falar merdaaaa!!"
21195-196 = "Próximo Episódio; Millennium Prize"