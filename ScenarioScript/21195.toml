[translation]
21195-3 = "Corredor do Antigo Prédio Escolar de Millennium"
21195-4 = "Haa, haa..."
21195-5 = "C-conseguimos escapar?"
21195-6 = "E-e agora, o que a gente faz...?"
21195-7 = "A submissão para o Millennium Prize já foi encerrada..."
21195-8 = "Por enquanto, vamos continuar fugindo até que o resultado saia!"
21195-9 = "Achou mesmo que conseguiria escapar?"
21195-10 = "！?"
21195-12 = "（Dadada!）"
21195-13 = "Kyaa!"
21195-14 = "Midori!"
21195-18 = "..."
21195-19 = "Entendo."
21195-20 = "Com razão, achei que cada decisão tomada foi muito boa."
21195-21 = "Tanto comandar essas baixinhas agora pouco, quanto atacar o depósito de itens apreendidos de Millennium."
21195-22 = "Era você, não era?"
21195-23 = "Devo te chamar de... Sensei?"
21195-24 = "Aquele tal de \"Sensei\" que a Akane investigou... parece que os rumores não eram exagerados..."
21195-25 = "[s1] \"Qual é o assunto? Vingança?\"\n[s2] \"Baixinhas? Mas a altura delas não é mais ou menos a mesma que a de todo mundo...?\""
21195-26 = "Ha! Não viria aqui por um motivo tão idiota assim."
21195-27 = "Se for para dizer algo, primeiro... você aí, de testa exposta."
21195-28 = "Naquela hora, como você ousou me enganar...?"
21195-29 = "Hii...! D-desculpe!"
21195-30 = "Nada mal, vou te elogiar por isso."
21195-31 = "...Eh?"
21195-32 = "Fingir estar com medo e tremer toda para me enganar. Que grande atuação."
21195-33 = "（Acho que o medo não era atuação, mas... talvez）"
21195-34 = "Bem, deixando isso de lado... você aí, que está segurando essa arma ridiculamente grande."
21195-35 = "Não é nada disso! Eu sou uma aluna do terceiro ano, sabia!? Quer saber o que aconteceu com as pessoas que comentaram sobre a minha altura!?"
21195-36 = "...Calma, líder."
21195-37 = "De certa forma, isso é até nostálgico. Ainda existe alguém que consegue falar sobre a altura da Neru-senpai."
21195-38 = "Fuu, fuu..."
21195-39 = "Por pouco eu não perco a calma... mas bem, esse assunto não importa. Ei, você aí, que está segurando essa arma desnecessariamente grande."
21195-41 = "（Olha para os lados）"
21195-42 = "É com você, você mesma!"
21195-43 = "Está falando da Alice?"
21195-44 = "Isso, eu tenho um assunto com você."
21195-45 = "Parece que você deu um golpe certeiro na C&C, não foi...?"
21195-46 = "Chega aqui um pouco."
21195-48 = "A-Alice conhece esse padrão."
21195-49 = "\"Você foi a primeira pessoa a fazer isso comigo...\""
21195-50 = "É um evento de confissão. A pequena empregada está apaixonada pela Alice. Imagem desbloqueada."
21195-51 = "N-não brinca comigo, seu idiota! E quem é que você está chamando de pequena empregada!? Quer morrer!?"
21195-52 = "Hii...!"
21195-53 = "Q-que medo!!"
21195-55 = "Haa..."
21195-56 = "Você sabe como me irritar, mas tudo bem."
21195-57 = "Como você pode estar entendendo errado, vou deixar claro: não é exatamente uma vingança por ter dado um golpe na C&C."
21195-58 = "Havia partes suspeitas por toda parte, mas, para nós, foi algo que aconteceu durante um trabalho legítimo. Vocês apenas alcançaram o objetivo de vocês nos enfrentando."
21195-59 = "Não guardo rancor por isso, mas... agora, meu interesse aumentou."
21195-60 = "Interesse...?"
21195-61 = "Talvez fosse melhor dizer que é uma confirmação, mas..."
21195-62 = "Vamos lá, que tal me enfrentar um pouco?"
21195-63 = "Se você conseguir me vencer em uma luta, eu vou embora pacificamente."
21195-64 = "Para nos entendermos, essa é a maneira mais rápida. E então? Não é um pedido difícil, certo?"
21195-65 = "……"
21195-66 = "Entendido."
21195-67 = "Oh, parece que está bem motivada."
21195-68 = "Um evento de combate um contra um... entendi perfeitamente."
21195-69 = "Even... o que você disse?"
21195-70 = "Daquela vez o espaço era apertado e eu tinha a missão de levar o \"Espelho\" de volta, mas..."
21195-71 = "Agora...!"
21195-72 = "Lá vou eu, carga de mana em 100%...!"
21195-74 = "Tsc, isso é...!"
21195-75 = "Luz!!"
21195-77 = "BOOOOM!!"
21195-79 = "Ugh!"
21195-80 = "Uau!"
21195-81 = "Que poder de fogo..."
21195-82 = "Capaz de destruir a parede da escola tão facilmente...!"
21195-85 = "I-incrível..."
21195-86 = "Nunca vi um poder de fogo desses..."
21195-87 = "...Será que funcionou?"
21195-88 = "Alice-chan! Você não deve dizer essa frase sem pensar!"
21195-89 = "Ah, a Neru-senpai é do terceiro ano. Vou reformular."
21195-90 = "V-você foi derrotada...?"
21195-91 = "Não, não é uma questão de usar linguagem formal...!"
21195-95 = "[ns] \"Ainda não.\""
21195-97 = "(Dadada!)"
21195-98 = "Ah!?"
21195-101 = "Certamente, não é um poder de fogo comum, mas..."
21195-102 = "É só isso."
21195-104 = "V-vou carregar a mana mais uma vez...!"
21195-106 = "Lenta demais."
21195-107 = "Ah...!"
21195-108 = "(Bam!)"
21195-109 = "Kyaa!"
21195-111 = "Sua arma é realmente forte. Mas depois de puxar o gatilho, leva pelo menos alguns milissegundos para disparar."
21195-112 = "Além disso, por causa desse poder de fogo excessivo, se o oponente chegar perto o suficiente, você não consegue atirar."
21195-113 = "Porque você mesma seria atingida pela explosão."
21195-114 = "E não há muitas pessoas em Kivotos que consigam me vencer nessa distância..."
21195-115 = "...Não, não há ninguém."
21195-116 = "Uuu..."
21195-117 = "Alice!"
21195-120 = "Foi mais decepcionante do que eu pensava. É difícil acreditar que aqueles caras foram derrotados por esse nível..."
21195-121 = "……"
21195-122 = "(Vuum!)"
21195-123 = "Ugh!"
21195-124 = "Ela girou o cano da arma...!?"
21195-125 = "Hah, não é uma má decisão para um combate corpo a corpo... mas ainda assim."
21195-128 = "Como sempre, a essa distância, eu tenho uma vantagem esmagadora."
21195-129 = "Mesmo que você tente disparar, não vai conseguir mirar em mim."
21195-130 = "……Não preciso de mira."
21195-131 = "Lá vou eu!"
21195-132 = "Eu disse que não ia dar... hã?"
21195-134 = "Preparando para disparar nessa situação...? Ei, não me diga que você...!?"
21195-135 = "Não em mim... mas no chão!?"
21195-136 = "Você enlouqueceu!? Se disparar assim, você também vai...!"
21195-137 = "Ó luz!!"
21195-139 = "（BOOOOM!）"
21195-141 = "Alice! Droga, a fumaça está bloqueando minha visão...!"
21195-142 = "O chão quase desmoronou... Achei você, Alice!"
21195-143 = "D-dano corporal em 48%... Solicito recuo!"
21195-145 = "[s] \"Eu a carregarei.\""
21195-146 = "Por favor, rápido!"
21195-147 = "（Vupt—）"
21195-149 = "Líder!"
21195-150 = "S-será que ela está bem? Não me diga que ela foi soterrada pelos escombros..."
21195-151 = "Eu vi a Alice por um segundo agora pouco, ela estava bem machucada. A essa altura, nossa pequena líder deve estar toda esmagada..."
21195-153 = "……Quem você chamou de pequena!?"
21195-155 = "Ah."
21195-156 = "Uau, como esperado da nossa líder! Você está inteirinha!"
21195-157 = "De que lado você está, afinal...!?"
21195-158 = "A Alice está sem condições de lutar agora, vamos persegui-la? Ela estava bem ferida, deve estar indo para a enfermaria."
21195-159 = "Sim, embora o Millennium tenha dezenas de enfermarias... não deve ser difícil de achar."
21195-162 = "……."
21195-163 = "…………."
21195-164 = "Líder?"
21195-165 = "……Ah."
21195-166 = "Não, esquece. Sem perseguição, vamos voltar."
21195-167 = "Já quebrei tudo o que queria, estou satisfeita."
21195-168 = "……."
21195-169 = "O objetivo foi praticamente alcançado. Já entendi por que a Rio se interessa pelo Departamento de Desenvolvimento de Jogos..."
21195-170 = "Além disso..."
21195-171 = "Já sei! Você ficou curiosa sobre o Sensei, não foi~?"
21195-172 = "C-cala a boca, não é nada disso! É que, tipo...!"
21195-173 = "Fufu, entendo como se sente. Mas é um pouco preocupante."
21195-174 = "Vendo o porte físico daquelas garotas, o gosto do Sensei provavelmente é..."
21195-175 = "Pelo menos para a líder, não é uma má notícia."
21195-176 = "Cala a boca! Se continuar falando essas coisas, eu vou te dar uma surra!"
21195-177 = "Haa..."
21195-180 = "Sensei, e o Departamento de Desenvolvimento de Jogos, hein..."
21195-184 = "Hah."
21195-185 = "Pode esperar. Vou fazer vocês pagarem por terem me chamado de nanica."
21195-187 = "……Fiquei com fome depois de destruir tudo. Ei, vamos comer um lámen."
21195-189 = "Boa ideia."
21195-190 = "Concordo, concordo~!"
21195-191 = "……Pensando bem, a líder está na fase de crescimento."
21195-194 = "JÁ CHEGA DISSOOO!!"
21195-196 = "Próximo episódio: Millennium Price"
