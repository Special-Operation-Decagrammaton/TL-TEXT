[translation]#[Texto Final , mas eventualmente pode haver alterações na formatação de texto. - Filipe 29/06.]
21195-3 = "Millennium · Corredor do Prédio Antigo"
21195-4 = "Hah, hah……"
21195-5 = "C-conseguimos escapar?"
21195-6 = "E-e agora, o que a gente faz……?"
21195-7 = "A inscrição no Prêmio Millennium já tá feita\nmesmo, então……"
21195-8 = "por ora, até sair o resultado,\nbora continuar fugindo!"
21195-9 = "Acharam mesmo que iam conseguir escapar?"
21195-10 = "!?"
21195-12 = "(Ratatatá!)"
21195-13 = "Kyaa!"
21195-14 = "Midori!"
21195-18 = "……"
21195-19 = "Saquei."
21195-20 = "Com razão eu achava cada decisão bem acertada."
21195-21 = "Tanto comandar essas pirralhas agora há pouco,\nquanto invadir o depósito de apreensões da Millennium."
21195-22 = "Era você, então."
21195-23 = "\"Sensei\"…… é assim que eu te chamo?"
21195-24 = "O tal \"Sensei\" que a Akane investigou……\nparece que os boatos não eram exagero……"
21195-25 = "[s1] \"Qual o assunto? Vingança?\"\n[s2] \"Pirralhas? A altura delas não é mais ou menos a mesma que a sua……?\""
21195-26 = "Há! Eu não viria por um motivo bobo desses, ora."
21195-27 = "Se for pra dizer, primeiro……\nvocê aí, da testa de fora."
21195-28 = "Naquela hora, você teve a coragem\nde me enganar……?"
21195-29 = "Iih……! M-me desculpa!"
21195-30 = "Mandou bem, vou te elogiar."
21195-31 = "……Hã?"
21195-32 = "Fingir de assustada, tremelicando, e me enganar.\nE tanta capacidade de atuação."
21195-33 = "(O assustada não era atuação, eu acho……\nprovavelmente.)"
21195-34 = "Bom, isso pouco importa…… você aí, da arma\nabsurdamente gigante."
21195-35 = "Que nada! Eu sou do 3º ano, viu!? Quer que eu te\nconte o que aconteceu, no fim, com quem ousou\ncomentar sobre a minha altura!?"
21195-36 = "……Calma, líder."
21195-37 = "Até que é uma novidade. Quem diria que ainda havia\nalguém capaz de falar de altura pra cima da Neru."
21195-38 = "Ufa, ufa……"
21195-39 = "Quase perdi a calma…… mas, enfim, essa conversa\npouco importa. Ei, você aí, da arma inutilmente\ngigante."
21195-41 = "(Olha pra um lado, olha pro outro)"
21195-42 = "É você, você!"
21195-43 = "É da Aris que você fala?"
21195-44 = "Isso. É com você que eu tenho assunto."
21195-45 = "Você deu um belo soco no C&C, pelo que dizem……?"
21195-46 = "Dá pra trocar uma palavrinha."
21195-48 = "A-Aris, esse padrão eu conheço."
21195-49 = "\"Você foi a primeira a me fazer\numa coisa dessas……\""
21195-50 = "É um evento de confissão. A senhorita maid-baixinha\nestá apaixonada pela Aris. Still desbloqueado."
21195-51 = "P-para de palhaçada, sua peste! E, aliás, quem é\nque você chamou de maid-baixinha!? Tá querendo\napanhar até morrer!?"
21195-52 = "Iih……!"
21195-53 = "Q-que medo!!"
21195-55 = "Haah……"
21195-56 = "Vocês conseguem me irritar de um jeito, hein.\nBom, tanto faz."
21195-57 = "Talvez você esteja entendendo errado, então vou\ndeixar claro: não é bem vingança pelo soco no C&C."
21195-58 = "Teve um monte de coisa suspeita por aí, mas, do\nnosso lado, foi tudo dentro de um pedido legítimo.\nVocês, por sua vez, só cumpriram o objetivo\nde vocês tendo a gente como adversária."
21195-59 = "Não é que eu guarde rancor disso, mas……\nfiquei subitamente interessada."
21195-60 = "Interessada……?"
21195-61 = "Talvez seja melhor dizer \"querendo confirmar\"……"
21195-62 = "Bom, deixa eu te dar uma palhinha de luta."
21195-63 = "Se você lutar comigo e vencer, eu recuo\nquietinha, do jeito que tá."
21195-64 = "Pra se entender um ao outro, esse é o caminho mais\nrápido. E aí, não é nada complicado, é?"
21195-65 = "……"
21195-66 = "Entendido."
21195-67 = "Oh, veio cheia de gás, é?"
21195-68 = "Uma batalha de evento, um a um…… algo assim,\nentendido."
21195-69 = "Eve…… o quê você falou?"
21195-70 = "Naquela hora o espaço era apertado, e eu tinha a\nmissão de levar o \"Espelho\" de volta, mas……"
21195-71 = "agora……!"
21195-72 = "Lá vou eu, carga de mana 100%……!"
21195-74 = "Tch, isto é……!"
21195-75 = "Surja, ó luz!!"
21195-77 = "KABÃÃÃM!!"
21195-79 = "Kh!"
21195-80 = "Uau!"
21195-81 = "Que poder absurdo……!"
21195-82 = "Capaz de pulverizar a parede do prédio\nassim, tão fácil……!"
21195-85 = "Q-que incrível……"
21195-86 = "Um poder de fogo desses, nunca vi……"
21195-87 = "……Será que conseguiu?"
21195-88 = "Aris! Essa frase você não pode falar à toa!"
21195-89 = "Ah, a Neru é do 3º ano. Vou reformular."
21195-90 = "S-será que ela foi derrotada……?"
21195-91 = "Não, o problema não é o pronome de tratamento……!"
21195-95 = "[ns] \"Ainda não.\""
21195-97 = "(Ratatatá!)"
21195-98 = "Uaah!?"
21195-101 = "De fato, não é um poder de fogo qualquer, mas……"
21195-102 = "é só isso."
21195-104 = "M-mais uma vez, carregar a mana……!"
21195-106 = "Tarde demais."
21195-107 = "Ah……!"
21195-108 = "(Tóc!)"
21195-109 = "Kyaa!"
21195-111 = "A sua arma é forte, sem dúvida. Mas, depois de\npuxar o gatilho, até o disparo leva, no mínimo,\nuns décimos de segundo."
21195-112 = "Além disso, por causa desse poder de fogo forte\ndemais, se o adversário entrar até uma certa\ndistância, você não consegue atirar."
21195-113 = "Porque a própria explosão pega você junto."
21195-114 = "E, nesta distância, quem é capaz de me vencer, em\ntoda a Kivotos, não há muita……"
21195-115 = "……não, não há ninguém."
21195-116 = "Uuh……"
21195-117 = "Aris!"
21195-120 = "Foi mais decepcionante do que eu esperava. Que com\num nível desses elas tenham derrotado aquelas,\nestá longe de……"
21195-121 = "……"
21195-122 = "(Vrooom!)"
21195-123 = "Gh!"
21195-124 = "Ela girou o cano da arma……!?"
21195-125 = "Ha, pra combate corpo a corpo, não é uma\ndecisão ruim…… mas, sabe."
21195-128 = "Como sempre, nesta distância, eu tenho\nvantagem esmagadora."
21195-129 = "Mesmo que você tente disparar,\nnão consegue me mirar."
21195-130 = "……Mira, não é necessária."
21195-131 = "Lá vou eu!"
21195-132 = "Já falei que não tem como…… hm?"
21195-134 = "Preparar o disparo nesta situação……? Ei,\nnão me diga que você……!?"
21195-135 = "Não em mim…… no chão!?"
21195-136 = "Você é louca!? Atirando assim,\nvocê também……!"
21195-137 = "Surja, ó luz!!"
21195-139 = "(KABÃÃÃM!)"
21195-141 = "Aris! Uh, a fumaça tá tampando a visão……!"
21195-142 = "O chão quase desabou todo…… achei, a Aris!"
21195-143 = "D-dano corporal de 48%……\nsolicito a retirada!"
21195-145 = "[s] \"Eu carrego você.\""
21195-146 = "Por favor, rápido!"
21195-147 = "(Tép-tép-tép——)"
21195-149 = "Líder!"
21195-150 = "S-será que ela tá bem, não me diga que ficou\nsoterrada nos escombros……"
21195-151 = "Por um instante agora eu vi a Aris, mas ela tava\nbem machucada. A esta altura, com certeza a nossa\nlideresinha tá toda esmagad……"
21195-153 = "……Quem é que tá pequena!?"
21195-155 = "Ah."
21195-156 = "Uau, é a nossa líder mesmo! Tá inteiraça!"
21195-157 = "Afinal você tá do lado de quem, hein……!"
21195-158 = "A Aris, agora, tá sem capacidade de combate; vamos\nperseguir assim mesmo? Ela tava bem ferida, deve\nestar indo pra enfermaria."
21195-159 = "Sim, embora a Millennium tenha mais de uma dezena\nde enfermarias…… a gente acha rapidinho."
21195-162 = "……"
21195-163 = "…………"
21195-164 = "Líder?"
21195-165 = "……Ah."
21195-166 = "Não, deixa. Nada de perseguição, a gente volta."
21195-167 = "Depois de aprontar pra valer, já deu pra aliviar."
21195-168 = "……"
21195-169 = "O objetivo, no geral, foi cumprido. Já entendi o\nmotivo de a Rio se interessar pelo Clube de\nDesenvolvimento de Jogos……"
21195-170 = "E, além disso……"
21195-171 = "Já saquei! Você ficou de olho no Sensei, né~!"
21195-172 = "Q-que nada! N-não é nada disso……!"
21195-173 = "Fufu, eu entendo o sentimento. Mas, estou um\npouquinho preocupada."
21195-174 = "Pelo porte daquelas garotas, o gosto do\nSensei provavelmente é……"
21195-175 = "Pelo menos pra líder, não é uma informação ruim."
21195-176 = "Cala a boca! Se ficar falando essas coisas,\neu te arrebento!?"
21195-177 = "Haah……"
21195-180 = "O Sensei, e o tal Clube de Desenvolvimento\nde Jogos, é……"
21195-184 = "Ha."
21195-185 = "Pode esperando. O preço por ter me tratado de\nbaixinha, eu vou cobrar, com toda a certeza."
21195-187 = "……De tanto aprontar, deu fome. Ei, bora\ncomer um lámen."
21195-189 = "Boa ideia~."
21195-190 = "Apoiado, apoiado~!"
21195-191 = "……Aliás, a líder tava em fase de crescimento."
21195-194 = "Já chegaaa!!"
21195-196 = "Próximo episódio: Prêmio Millennium."