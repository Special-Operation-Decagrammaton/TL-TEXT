[translation]
80000011-1 = "Canção de Amor do Armário"
80000011-2 = "Centro Comercial - Loja de Discos"
80000011-9 = "Ué. Lançaram um single limitado do \"Black Death Poison\"."
80000011-10 = "Eles quase não lançaram músicas novas nesta temporada, então por que um single limitado de repente? Deixa eu ver..."
80000011-14 = "Uma canção de amor para o Dia dos Namorados?"
80000011-15 = "O \"Black Death Poison\", que sempre seguiu uma linha de heavy metal pesado, por que decidiram se aventurar nesse gênero musical...?"
80000011-16 = "Hmm, bem, eu gosto deles mesmo... vou comprar para experimentar."
80000011-17 = "Com licença, eu gostaria deste álbum..."
80000011-18 = "(Ah, o álbum de edição limitada do \"Black Death Poison\", \"O Amor é Algo que Você Conquista Atirando no Coração\", certo?)"
80000011-19 = "(Este é um single limitado em comemoração ao Dia dos Namorados, então estamos dando um presente especial para todos que comprarem.)"
80000011-20 = "Um presente especial?"
80000011-21 = "(Sim, para quem comprar...)"
80000011-26 = "(Daremos este chocolate em formato de crânio de boi como brinde!)"
80000011-27 = "..."
80000011-28 = "(Ah, aconteceu alguma coisa?)"
80000011-29 = "...Não, é que é tão grande que fiquei surpresa."
80000011-30 = "(Entendo. Então, aproveite o novo single do \"Black Death Poison\" e tenha um bom Dia dos Namorados.)"
80000011-35 = "Acabei aceitando, mas... o que eu faço com esse chocolate...?"
80000011-36 = "É muita quantidade para comer, e levar isso daqui até o escritório da Problem Solver 68 também é complicado..."
80000011-37 = "[s] \"Ei, Kayoko.\""
80000011-38 = "Ah, Sensei."
80000011-39 = "Que coincidência, você também veio comprar discos?"
80000011-40 = "[s] \"Pode-se dizer que sim.\""
80000011-42 = "[s] \"A propósito, esse chocolate é enorme.\""
80000011-43 = "Ah... eu comprei o álbum do meu grupo favorito e ganhei isso de brinde."
80000011-44 = "É um estorvo para carregar, mas não quero jogar fora o brinde da minha banda favorita, então eu estava sem saber o que fazer..."
80000011-48 = "Se quiser, Sensei, você pode ficar com ele?"
80000011-49 = "[s] \"Se não se importa, Kayoko, eu aceito com prazer.\""
80000011-50 = "Que bom. Na verdade, eu não sabia o que fazer se você não aceitasse esse chocolate."
80000011-52 = "Ah, e... eu sei que hoje é Dia dos Namorados, mas não tem nenhum significado especial, viu..."
80000011-53 = "Isso não é nada desse tipo. Entendeu?"
80000011-55 = "(Depois disso, voltei para o Schale carregando o enorme chocolate em formato de crânio que a Kayoko me deu.)"
80000011-56 = "(O chocolate, esculpido com perfeição, era tão bonito que fiquei com pena de comer e acabei pendurando na parede.)"
