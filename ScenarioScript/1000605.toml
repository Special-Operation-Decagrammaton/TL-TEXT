[translation]
1000605-1 = "秘密の取引"
1000605-2 = "ブラックマーケット"
1000605-4 = "お、やっと来たか。"
1000605-5 = "シャーレの先生が、急に私たちのブラックマーケットのところに近づいてきたときは何事かと疑ってたけど……。"
1000605-6 = "くすくすっ、まさか先生もこんなことに興味があるとはね。#n見直したよ。"
1000605-7 = "[s] \"本物？\""
1000605-8 = "もちろん、私たちブラックマーケットの商人の仕事は確かさ。"
1000605-9 = "お金さえきちんとくれれば何でも持ってきてやるのが、私たちのモットーだからね。"
1000605-10 = "[s] ブラックマーケットの商人と、ブツを取引する。"
1000605-12 = "さて、じゃあ金額を確認させてもらおうか……。"
1000605-16 = "そこまでだ、悪党！"
1000605-17 = "うわっ？なぜゲヘナの風紀委員会がこんなところに……！"
1000605-18 = "取引は完了したことだし……さらば！"
1000605-20 = "あっ！止まれ、この密輸犯めっ！"
1000605-24 = "ちっ……逃したか。でももう一人は捕まえたから……"
1000605-27 = "……先生？"
1000605-28 = "どうしてここに……#nいや、それよりも、さっきあの密輸犯と何を取引したんだ？"
1000605-29 = "[s1] \"誤解。\"\n[s2] \"言えない。\""
1000605-30 = "……また何か、言いづらそうなことに手を出したのか。"
1000605-31 = "……また何か、言いづらそうなことに手を出したのか。"
1000605-32 = "情けない……。"
1000605-33 = "とにかく現行犯をそのまま返すわけにはいかない。#n取引したモノを返して。"
1000605-34 = "[s3] 駄々をこねる。\n[s4] 聞こえなかったふりをする。"
1000605-35 = "子供じゃないんだから、早く出せ！"
1000605-36 = "聞こえないふりしてないで、早く出せ！"
1000605-38 = "イオリに取引したモノを奪われた。"
1000605-39 = "これは……アルバム？#nってこれ、私の小学校の卒業アルバム！？"
1000605-40 = "……なんで先生がこんなものを？"
1000605-41 = "[s5] \"イオリの卒アルが他の人の手に渡らないように……。\"\n[s6] \"シャーレの仕事にどうしても必要な資料で……。\""
1000605-42 = "嘘をつくな！絶対怪しいことに使おうとしただろ！"
1000605-43 = "嘘をつくな！絶対怪しいことに使おうとしただろ！"
1000605-44 = "この……ヘンタイっ！！"
1000605-46 = "その後、イオリにものすごく怒られたが、幸いにもアルバムはもらえた。"
