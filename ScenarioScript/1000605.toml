[translation]
1000605-1 = "Negociação secreta"
1000605-2 = "Mercado negro"
1000605-4 = "Oh, finalmente chegou."
1000605-5 = "Quando o Sensei do Schale apareceu de repente aqui no nosso mercado negro, eu fiquei desconfiada do que poderia ser..."
1000605-6 = "Hehe, quem diria que o Sensei também tem interesse nessas coisas. #nSubi no meu conceito."
1000605-7 = "[s] \"É autêntico?\""
1000605-8 = "Claro, o trabalho de nós, comerciantes do mercado negro, é garantido."
1000605-9 = "Nosso lema é trazer qualquer coisa, desde que você pague o valor correto."
1000605-10 = "[s] Negociar mercadorias com o comerciante do mercado negro."
1000605-12 = "Muito bem, então deixe-me verificar o valor..."
1000605-16 = "Aí está você, canalha!"
1000605-17 = "Ué? Por que o Comitê de Disciplina de Gehenna está aqui...!"
1000605-18 = "A negociação já foi concluída... até mais!"
1000605-20 = "Ah! Pare aí, seu contrabandista!"
1000605-24 = "Droga... escapou. Mas pelo menos peguei o outro..."
1000605-27 = "...Sensei?"
1000605-28 = "Por que você está aqui... #nNão, esqueça isso, o que você estava negociando com aquele contrabandista agora pouco?"
1000605-29 = "[s1] \"É um mal-entendido.\"\n[s2] \"Não posso dizer.\""
1000605-30 = "...Você se meteu em algo difícil de explicar de novo, não foi?"
1000605-31 = "...Você se meteu em algo difícil de explicar de novo, não foi?"
1000605-32 = "Que patético..."
1000605-33 = "De qualquer forma, não posso deixar você ir assim depois de um flagrante. #nEntregue o que você negociou."
1000605-34 = "[s3] Fazer birra.\n[s4] Fingir que não ouviu."
1000605-35 = "Você não é mais uma criança, entregue logo!"
1000605-36 = "Não finja que não ouviu, entregue logo!"
1000605-38 = "Iori confiscou o item negociado."
1000605-39 = "Isso é... um álbum? #nEspera, esse é o meu álbum de formatura do primário!?"
1000605-40 = "...Por que o Sensei tem uma coisa dessas?"
1000605-41 = "[s5] \"Para evitar que o álbum da Iori caísse em mãos erradas...\"\n[s6] \"É um material indispensável para o trabalho no Schale...\""
1000605-42 = "Não minta! Com certeza você ia usar para algo suspeito!"
1000605-43 = "Não minta! Com certeza você ia usar para algo suspeito!"
1000605-44 = "Seu... pervertido!!"
1000605-46 = "Depois disso, levei uma bronca enorme da Iori, mas, felizmente, consegui ficar com o álbum."
