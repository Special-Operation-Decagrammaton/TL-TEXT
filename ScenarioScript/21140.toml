[translation]
21140-1 = "Episódio 14; Maid VS Meisters"
21140-2 = "Millennium - Corredor"
21140-4 = "Desbloqueando o último obturador! Hehe, agora este andar exclusivo do conselho estudantil está sob meu controle~♪ Bem, o depósito de itens apreendidos onde o \"espelho\" está fica logo ali..."
21140-5 = "Momoi, abaixe-se!"
21140-7 = "Hã?"
21140-8 = "(BOOM!)"
21140-9 = "Aaaaaah!"
21140-10 = "E-essa bala que passou pela minha cabeça agora há pouco, que poder destrutivo absurdo foi esse!? Tem um buraco na parede!?"
21140-11 = "Uma bala de 13.97mm para fuzil antitanque!? Que sorte, se a irmã fosse 5cm mais alta, teria acertado em cheio na testa..."
21140-12 = "Ufa, com certeza. Que bom que sou baixinha... não, espera, não é nada bom!"
21140-13 = "Isso significa que já entramos na zona de tiro."
21140-14 = "...Da atiradora da C&C, a Karin-senpai."
21140-15 = "Midori, abaixe-se! Lá vem outra!"
21140-16 = "(KABOOM!)"
21140-17 = "Aaaah!?"
21140-19 = "Millennium - Telhado do 3º Prédio"
21140-20 = "...Entendo, não é uma má estratégia."
21140-21 = "São pequenas e rápidas, difícil de acertar..."
21140-22 = "...Mas já entendi a velocidade e o padrão. O vento está fraco e não há nada bloqueando a visão... Talvez elas achem que estão seguras por estarem encostadas na parede."
21140-23 = "Que pena. O próximo tiro, eu acerto 100%..."
21140-24 = "Será mesmo?"
21140-25 = "!?"
21140-26 = "Meus cálculos mostram algo diferente. A probabilidade da sua bala atingir aquelas garotas é de 0%."
21140-27 = "Quem está aí!?"
21140-30 = "(Whirrr, clank)"
21140-31 = "...Hã?"
21140-34 = "(Ratatatata!)"
21140-36 = "O-o que é aquilo!?"
21140-37 = "Deixe-me apresentar."
21140-38 = "A nova criação do Clube de Engenharia, uma \"cadeira\" de combate bípede capaz de operar em qualquer clima: o Trono do Trovão."
21140-40 = "Por que você fez uma cadeira andar... e ainda por cima tem uma catapulta!?"
21140-41 = "É uma pena que você não consiga entender o charme da \"Raiden-chan\"..."
21140-42 = "...Não entendo, mas consegui ter uma noção geral."
21140-43 = "Eu estava curiosa há tempos. Como o Clube de Desenvolvimento de Jogos conseguiu passar pela segurança do conselho estudantil de Millennium e chegar até aqui."
21140-44 = "...Então vocês estavam cooperando com aquele \"Sensei\"."
21140-45 = "Então as informações da Himari também eram uma armadilha para nos confundir...?"
21140-46 = "Isso significa que..."
21140-52 = "!!"
21140-55 = "Raiden-chan!"
21140-56 = "Entendo. É bem resistente para não ter sido perfurada... embora esteja caída e chutando o ar."
21140-57 = "Uma cadeira que atira, interessante..."
21140-58 = "Mas, se pretendia me parar de verdade, deveria ter vindo com um ataque surpresa. Mesmo com essa \"cadeira\", vir me enfrentar de frente..."
21140-59 = "Isso foi um erro de cálculo, Utaha."
21140-60 = "Você realmente achou que poderia me vencer em um confronto direto neste telhado aberto, sem nada para se esconder?"
21140-61 = "..."
21140-62 = "Você tem razão, não há nada para se esconder aqui..."
21140-65 = "Exato, nem mesmo um teto."
21140-67 = "?"
21140-69 = "(Vwooom—)"
21140-70 = "...Que som é esse!?"
21140-71 = "（Dogooon!）"
21140-73 = "Não pode ser, um canhão de tiro curvo!? De onde veio isso!?"
21140-74 = "Da minha Hibiki, do outro lado da Torre Millennium."
21140-75 = "Para você conseguir atirar na Hibiki, teria que atravessar várias paredes e tetos. #nE a menos que você também faça um disparo curvo, não conseguirá. Então, estando diante de mim, será que você consegue fazer um dos dois?"
21140-76 = "Droga...!?"
21140-77 = "Fufu, quer que eu repita?"
21140-79 = "Como calculado."
21140-81 = "Millennium - Interior do Prédio Escolar"
21140-82 = "……Os disparos pararam."
21140-83 = "São a Utaha-senpai e a Hibiki-chan! Enquanto elas mantêm a Karin-senpai ocupada, vamos nos apressar!"
21140-85 = "（Gogogogogogo――!）"
21140-86 = "Eeeh! O-o que é isso, um terremoto?"
21140-87 = "Parece uma explosão, mas... não pode ser!?"
21140-89 = "Millennium - Prédio Escolar"
21140-94 = "Ugh... a aula ainda não... terminou...!"
21140-95 = "Iiiih, achei que ia morrer! Onde foi que ela escondeu tanta bomba assim...!"
21140-98 = "Ufa, eu realmente não queria danificar as instalações da escola..."
21140-99 = "Yuuka, sinto muito, mas tive que destruir a porta de metal à força. Qual a localização atual do Departamento de Desenvolvimento de Jogos?"
21140-100 = "A Karin estava segurando eles até agora, mas ela os perdeu de vista."
21140-101 = "Mas... eu sei para onde eles estão indo."
21140-102 = "Eles estão indo para o depósito de itens confiscados do conselho estudantil, onde o 'Espelho' está. Então, vou pegar o elevador e ir para lá agora mesmo."
21140-103 = "（Pipip――）"
21140-106 = "!?"
21140-107 = "O que houve? Yuuka? Yuuka??"
21140-108 = "Não acredito, ela cortou a energia...!?"
21140-109 = "Droga, chegar a esse ponto...!!"
21140-111 = "Millennium - Interior do Prédio Escolar"
21140-112 = "Aquele apagão de agora, significa que o plano da Utaha-senpai e da Hibiki funcionou, né?"
21140-113 = "Sim, deve ser. Ah, Sensei. O chão está escuro, por favor, tome cuidado."
21140-114 = "Se passarmos por aqui..."
21140-115 = "Sim, já devemos estar no depósito de itens confiscados do conselho estudantil. Finalmente, com isso...!"
21140-116 = "Oh, finalmente chegaram!"
21140-117 = "?"
21140-118 = "!?"
21140-120 = "Demoraram, hein? Esperei bastante~."
21140-121 = "Bem-vindos, Departamento de Desenvolvimento de Jogos! E, hum... Senpai, era isso?"
21140-122 = "Ah, não, não, lembrei! É 'Sensei'!"
21140-123 = "Eu estava esperando ansiosamente para te encontrar~!"
21140-124 = "Ah, Asuna-senpai!? Por que você está aqui!?"
21140-125 = "Por que? Hum... por intuição?"
21140-126 = "Sabe, pressentimentos e intuição, essas coisas existem, né? Pensei que se esperasse aqui, poderia encontrar o Sensei e vocês também."
21140-127 = "Eu tive esse pressentimento!"
21140-128 = "Não são palavras difíceis, mas não entendi nada do que ela disse..."
21140-129 = "Bom, então vamos começar?"
21140-130 = "Hum, só por precaução, começar o quê...?"
21140-131 = "A batalha! Eu adoro lutar!"
21140-132 = "Ah, é verdade. Ainda não me apresentei."
21140-133 = "C&C Call Sign Zero-One, Asuna!"
21140-134 = "Lá vou eu!"
21140-135 = "Eu sabiaaaa!?"
21140-137 = "Próxima vez; Uma crise se aproxima"
