[translation]
21140-1 = "Episódio 14; Maid VS Meisters"
21140-2 = "Millennium - Corredor"
21140-4 = "Última persiana, destravada! Fufu, agora esse andar exclusivo do Conselho Estudantil é o meu playground~♪ Bom, estamos quase no Depósito de Itens Confiscados onde está o 'Espelho'..."
21140-5 = "Momoi, pro chão!"
21140-7 = "Eh?"
21140-8 = "(BOOOOOOOMMMM!)"
21140-9 = "Uwaaaahh!"
21140-10 = "Q-Que tiro com poder absurdo foi esse que acabou de passar por cima da minha cabeça!? Tem um buraco na parede!?"
21140-11 = "Munição de 13.97mm para rifle anti-materiais!? Ainda bem, se a mana fosse 5cm mais alta, seria um tiro na testa..."
21140-12 = "Ufa, tem raz... não é isso, não! Que bom que eu sou baixa o quê!"
21140-13 = "Isso quer dizer que, a partir daqui, nós já estamos dentro da área de tiro."
21140-14 = "......Da atiradora de elite da C&C, Karin-senpai."
21140-15 = "Midori, pro chão! Aí vem outro!"
21140-16 = "(BDOOOOOMMMM!)"
21140-17 = "Uwaaaah!?"
21140-19 = "Millennium - Telhado do 3º Prédio Escolar"
21140-20 = "......Entendo, você até que não é tão ruim."
21140-21 = "Pequena e ágil, difícil de acertar..."
21140-22 = "......Mas eu já peguei o padrão e a velocidade. Quase não tem vento e nada obstruindo a minha visão... Elas devem estar pensando que 'estão seguras se ficarem de costas para a parede'."
21140-23 = "Que pena. O próximo tiro tem 100% de chance de acerto..."
21140-24 = "Eu duvido muito."
21140-25 = "!?"
21140-26 = "Meus cálculos são um pouco diferentes. A probabilidade de sua bala acertar aquelas crianças é de 0%."
21140-27 = "Quem está aí!?"
21140-30 = "(Whirrr, clank)"
21140-31 = "......Hã?"
21140-34 = "(Tatatatata!)"
21140-36 = "Q-Que diabos é isso!?"
21140-37 = "Deixe-me apresentá-lo."
21140-38 = "A mais nova obra do Clube de Engenharia. A 'cadeira' de combate bípede para qualquer clima, o Trono do Trovão."
21140-40 = "Por que uma cadeira está andando... e ainda por cima tem uma catapulta nela!?"
21140-41 = "Que pena que você não consiga compreender o encanto da 'Trovãozinha'..."
21140-42 = "......Não que eu entenda o porquê de existir, mas entendi do que se trata."
21140-43 = "Eu estava curiosa desde o começo. Como o Departamento de Desenvolvimento de Jogos conseguiu passar pela segurança do Conselho Estudantil da Millennium e chegar tão longe."
21140-44 = "......Então quer dizer que vocês estão cooperando com aquele 'Sensei'."
21140-45 = "Como suspeitei, a informação da Himari também era só uma armadilha para nos confundir...?"
21140-46 = "Isso quer dizer que..."
21140-52 = "!!"
21140-55 = "Trovãozinha!"
21140-56 = "Entendo. Se esse tiro não conseguiu perfurar, significa que foi construída de forma robusta... Embora tenha caído e esteja batendo as pernas no ar."
21140-57 = "Uma cadeira que atira, que interessante..."
21140-58 = "Mas se você realmente queria me deter, deveria ter me atacado de surpresa. Mesmo com essa 'cadeira' do seu lado, me desafiar num combate direto..."
21140-59 = "Esse foi um erro de cálculo, Utaha."
21140-60 = "Você achou mesmo que poderia me vencer num ataque frontal neste telhado largo sem nada para me bloquear?"
21140-61 = "......"
21140-62 = "Você tem razão. Realmente, aqui não há nada para te bloquear..."
21140-65 = "Sim, nem mesmo um teto."
21140-67 = "?"
21140-69 = "(Whoosh——)"
21140-70 = "......Que som é esse!?"
21140-71 = "(BOOOOOOMMMM!)"
21140-73 = "Não me diga que, fogo de artilharia indireto!? Mas de onde!?"
21140-74 = "Da nossa querida Hibiki, lá do outro lado da Millennium Tower."
21140-75 = "Para você conseguir atirar na Hibiki, precisaria perfurar várias paredes e tetos. #n A não ser, é claro, que consiga atirar de forma indireta como ela. E então, acha que pode fazer qualquer uma dessas coisas enquanto estiver bem na minha frente?"
21140-76 = "Ugh...!?"
21140-77 = "Fufu, devo repetir o que eu disse?"
21140-79 = "Isso foi exatamente como os meus cálculos previam."
21140-81 = "Millennium - Interior do Prédio Escolar"
21140-82 = "......Os tiros pararam."
21140-83 = "Utaha-senpai e Hibiki-chan! Enquanto elas seguram a Karin-senpai, vamos nos apressar!"
21140-85 = "(Gogogogogogogo——!)"
21140-86 = "Eeeh! Q-Que isso, um terremoto?"
21140-87 = "Pareceu uma explosão... não me diga que!?"
21140-89 = "Millennium - Prédio Escolar"
21140-94 = "Gugh... A palestra ainda... não acabou...!"
21140-95 = "Hiii, achei que fosse morrer! Onde diabos ela tinha escondido tantos explosivos...!"
21140-98 = "Ufa, eu não queria destruir as instalações da escola se pudesse evitar..."
21140-99 = "Peço perdão, Yuuka, mas destruí a persiana à força. Qual a posição atual do Departamento de Desenvolvimento de Jogos?"
21140-100 = "A Karin estava segurando elas até agorinha, mas perdi elas de vista."
21140-101 = "Mas... eu sei para onde elas estão indo."
21140-102 = "Para onde o 'Espelho' está guardado, o Depósito de Itens Confiscados do Conselho Estudantil, não é mesmo? Irei para lá de elevador agora mesmo."
21140-103 = "(Bip——)"
21140-106 = "!?"
21140-107 = "O que houve? Yuuka? Yuuka??"
21140-108 = "Não me diga que... cortaram a energia!?"
21140-109 = "Ugh, a ponto de chegarem a fazer tudo isso...!!"
21140-111 = "Millennium - Interior do Prédio Escolar"
21140-112 = "A queda de energia agora há pouco significa que o plano da Utaha-senpai e da Hibiki funcionou, né?"
21140-113 = "Sim, com certeza. Ah, Sensei, tome cuidado. O chão está bem escuro."
21140-114 = "Se nós conseguirmos passar daqui..."
21140-115 = "Sim, o Depósito de Itens Confiscados do Conselho Estudantil já deve estar logo ali. Finalmente conseguimos...!"
21140-116 = "Oh, finalmente chegaram!"
21140-117 = "?"
21140-118 = "!?"
21140-120 = "Vocês demoraram~ Eu já tava esperando há um tempão~"
21140-121 = "Sejam bem-vindos, Departamento de Desenvolvimento de Jogos! E... hm... Senpai, não é?"
21140-122 = "Ah, não, não, lembrei! É 'Sensei'!"
21140-123 = "Eu tava super ansiosa para conhecer vocês, sabiam~?"
21140-124 = "A-Asuna-senpai!? O que você tá fazendo aqui!?"
21140-125 = "Se você me perguntar o porquê... Sinto que foi intuição?"
21140-126 = "Sabe como é, aquelas premonições e pressentimentos que a gente tem às vezes? Senti que se eu esperasse aqui, eu iria conhecer o Sensei e vocês~."
21140-127 = "Eu tive esse pressentimento!"
21140-128 = "Ela não tá usando nenhuma palavra difícil, mas eu não entendi bulhufas do que ela quis dizer..."
21140-129 = "Bom, vamos começar?"
21140-130 = "Ehm, só pra ter certeza... começar o quê...?"
21140-131 = "Uma batalha! Eu amooo lutar!"
21140-132 = "Ah, é mesmo. Ainda não tinha me apresentado."
21140-133 = "Call Sign Zero Um da C&C, Asuna!"
21140-134 = "Lá vou eu!"
21140-135 = "A gente já devia ter imaginadooooo!?"
21140-137 = "Próximo Episódio; Crise Iminente"