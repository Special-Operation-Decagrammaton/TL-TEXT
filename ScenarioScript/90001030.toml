[translation]
90001030-1 = "Episódio 3: O Segundo Encontro"
90001030-4 = "Já faz um bom tempo que estamos seguindo os rastros na geleira, mas... não há nada aqui."
90001030-5 = "Vamos organizar um pouco a situação."
90001030-6 = "Eimi, por favor, projete na tela."
90001030-7 = "Entendido, Chefe."
90001030-15 = "Nossas ações até agora podem ser divididas em três partes: #nO confronto com Geburah, a descoberta de rastros e a perseguição."
90001030-16 = "No entanto, nenhuma dessas ações nos levou a descobrir o que Geburah estava fazendo."
90001030-17 = "Não tem sido sempre assim? Chesed, que era uma fábrica de munições, e Kether, que protegia a área das ruínas submersas, foram pequenas exceções."
90001030-18 = "Diferente dos outros, desta vez fomos atacadas por três indivíduos que se autodenominam engenheiras de Decagrammaton."
90001030-19 = "Sim. E elas mencionaram o poder do \"Deus Sem Nome\"."
90001030-20 = "Mais precisamente, \"tecnologia proibida\"."
90001030-21 = "Vocês também já sabiam que isso está sendo usado em Aby-Eshuh, não é?"
90001030-22 = "...Sinto que há algo estranho nisso."
90001030-23 = "Decagrammaton e o \"Deus Sem Nome\" são existências independentes... #nEu cheguei a investigar uma vez, mas não há relação entre os dois."
90001030-25 = "Por que as engenheiras de Decagrammaton nos atraíram para cá... e o que elas estão buscando?"
90001030-26 = "Uma coisa é certa: elas estão agindo em nome da \"Irmã Mais Velha\"."
90001030-27 = "E, para isso, estão coletando dados de combate... Seria por causa de \"Aby-Eshuh\", onde a tecnologia dos Sacerdotes Sem Nome e dos Deuses Sem Nome foi aplicada...?"
90001030-28 = "Ou talvez seja por causa do Oopart deixado pela Presidente do Conselho Geral, a \"Caixa de Shittim\"...?"
90001030-29 = "[s] \"...\""
90001030-30 = "Ou quem sabe, a terrível \"onisciência\" de mim, Akeboshi Himari, a genial, pura e frágil garota hacker...?"
90001030-31 = "(Acho que não é isso)"
90001030-33 = "...Isto é apenas uma hipótese minha, mas."
90001030-34 = "Se o motivo de nos atraírem para a geleira for para completar a existência chamada \"Irmã Mais Velha\"..."
90001030-35 = "Podemos supor que a ação delas é uma busca por informações sobre Aby-Eshuh — ou seja, o poder do \"Deus Sem Nome\"."
90001030-36 = "Entendo... Se for assim, as peças realmente se encaixam."
90001030-37 = "[s] \"Informações sobre Aby-Eshuh?\""
90001030-38 = "Sim. Embora, claro, seja apenas uma suposição."
90001030-39 = "Elas provavelmente já conheciam a realidade do poder do \"Deus Sem Nome\"."
90001030-40 = "Se for esse o caso, o que elas precisariam a seguir seria..."
90001030-41 = "Exatamente... \"A verificação comparativa entre o conhecimento existente e os dados reais\"."
90001030-42 = "Quer dizer que elas lutaram contra nós para coletar dados sobre as habilidades e informações de combate de Aby-Eshuh?"
90001030-43 = "[s] \"Então, as batalhas até agora...\""
90001030-48 = "Sim. Tudo aconteceu exatamente como elas planejaram..."
90001030-49 = "O que elas pretendiam fazer com os dados coletados, eu não consigo saber ao certo."
90001030-50 = "Afinal, essa história toda é apenas uma hipótese..."
90001030-51 = "Mas, se estiver correta, as ações anteriores de Geburah também fazem sentido."
90001030-52 = "Hum... O caso de Geburah é preocupante, mas você disse que pode haver outro profeta, não é?"
90001030-53 = "Qual seria o objetivo dele na geleira?"
90001030-54 = "É muito provável que ele tenha um objetivo diferente de Geburah."
90001030-55 = "Fico curiosa para saber qual é a aparência dele."
90001030-56 = "No entanto, não temos nenhuma pista sobre isso por enquanto."
90001030-57 = "Considerando a escala dos rastros, podemos dizer que ele é bem grande..."
90001030-58 = "E que provavelmente é um profeta capaz de operar autonomamente por longos períodos."
90001030-59 = "O poder do Deus Sem Nome, Geburah, as engenheiras de Decagrammaton... e a possibilidade de outro profeta..."
90001030-60 = "[s] \"Sinto um presságio sinistro...\""
90001030-61 = "O que será que eles estão tramando...?"
90001030-62 = "É muito provável que haja algo mais escondido que ainda não conseguimos ver."
90001030-74 = "O quê!? O que está acontecendo!?"
90001030-75 = "Parece que fomos atingidos por fogo antiaéreo...! #nÉ perigoso continuar voando assim, o que faremos?"
90001030-76 = "As correntes de ar também estão desfavoráveis. Como devemos proceder?"
90001030-77 = "[s] \"Pouso de emergência!\""
90001030-78 = "Entendido. Executando pouso de emergência."
90001030-90 = "……Fomos cercados."
90001030-91 = "Vamos romper o cerco. #nToki?"
90001030-92 = "Sim, deixe comigo."
90001030-107 = "O número deles não diminui nem um pouco…… Será que eles também estão coletando dados?"
90001030-108 = "Não, isso é……!"
90001030-112 = "(Seguindo os rastros, havia soldados esperando como se já soubessem que viríamos……)"
90001030-113 = "(Será que isso foi uma armadilha? Ou talvez……)"
90001030-118 = "Ué? Eles começaram a recuar."
90001030-126 = "Não parece uma ação de quem percebeu estar em desvantagem. #nNa verdade……"
90001030-130 = "！？"
90001030-131 = "Isso é…… não pode ser!?"
90001030-139 = "Chefe! A 15 metros abaixo do solo――"
90001030-140 = "Gebra! Em um lugar como este……!"
