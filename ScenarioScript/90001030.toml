[translation]
90001030-1 = "第3話;二度目の邂逅"
90001030-4 = "氷河の痕跡を辿り始めて大分経ちますが……なにもないですね。"
90001030-5 = "少し状況を整理してみましょうか。"
90001030-6 = "エイミ、画面に出力してください。"
90001030-7 = "了解、部長。"
90001030-15 = "私たちの今までの行動は、次の3つに分けられます。#nゲブラとの交戦、痕跡の発見、そして追跡。"
90001030-16 = "しかし、どの行動もゲブラが何をしていたかを突き止めることには繋がりませんでした。"
90001030-17 = "今までだってそうじゃない？軍需工場だったケセドや、廃墟水没地区を守っていたケテルはちょっと例外だったけど。"
90001030-18 = "他と違って、今回はデカグラマトンのエンジニアを名乗る3人が攻撃してきました。"
90001030-19 = "ええ。そして、彼女たちは「名もなき神」の力について言及していました。"
90001030-20 = "正確には「禁じられた技術」、だけど。"
90001030-21 = "アビ・エシュフにそれが使われていることも把握していましたね。"
90001030-22 = "……少し違和感があります。"
90001030-23 = "デカグラマトンと「名もなき神」はそれぞれ独立した存在です……#n一度調べてみましたが、この二つに関連性はありませんでした。"
90001030-25 = "デカグラマトンのエンジニアが、何故私たちを呼び寄せたのか……そして、何を求めているのか。"
90001030-26 = "一つ確かなのは、彼女たちが「お姉様」のために動いているということです。"
90001030-27 = "そして、そのために戦闘データを収集している……それが無名の司祭と名もなき神々の技術が反映されている「アビ・エシュフ」なのか……。"
90001030-28 = "それとも連邦生徒会長の残したオーパーツ、「シッテムの箱」か……。"
90001030-29 = "[s] \"……。\""
90001030-30 = "もしくは、天才清楚系病弱美少女ハッカーである私、[ruby=あけぼし]明星[/ruby]ヒマリの恐るべき「全知」か……。"
90001030-31 = "（それは違うと思うけど）"
90001030-33 = "……ここからは私の仮説ですが。"
90001030-34 = "氷河に私たちを呼び寄せた理由が「お姉様」という存在を完成させるためだとしたら……。"
90001030-35 = "アビ・エシュフに関する情報――「名もなき神」の力を求めての行動だと推測できます。"
90001030-36 = "なるほど……それであればたしかに辻褄が合います。"
90001030-37 = "[s] \"アビ・エシュフの情報？\""
90001030-38 = "はい。といっても、あくまで仮定の話ですが。"
90001030-39 = "すでに向こうは「名もなき神」の力の実態を知っていたのでしょう。"
90001030-40 = "であれば、次に必要となるのは……。"
90001030-41 = "そう……「既存知識と実データの比較検証」。"
90001030-42 = "つまり、私たちと戦ってアビ・エシュフの能力や戦闘情報のデータを取っていたってこと？"
90001030-43 = "[s] \"じゃあ、これまでの戦闘は……。\""
90001030-48 = "はい。全て相手の思惑通り……ということになります。"
90001030-49 = "集めたデータで何をしようとしていたかまでは、流石に分かりません。"
90001030-50 = "そもそも、この話自体があくまで仮説ですし……。"
90001030-51 = "ですが、それが正しければ、ゲブラのこれまでの行動も説明がつきます。"
90001030-52 = "うーん……ゲブラの件も気になるけど、別の預言者がいるかもしれないんだよね？"
90001030-53 = "こっちは何の目的で氷河にいるんだろう？"
90001030-54 = "ゲブラとは異なる目的を持っている可能性が高いかと。"
90001030-55 = "どんな見た目なのか気になりますね。"
90001030-56 = "ただ、そちらに関しては今のところ何も手がかりがありません。"
90001030-57 = "痕跡の規模から考えると、かなりの大きさであること――"
90001030-58 = "そして、長時間自律稼働できる預言者であることくらいでしょうか。"
90001030-59 = "名もなき神の力とゲブラ、デカグラマトンのエンジニア――そして別の預言者の可能性……。"
90001030-60 = "[s] \"なんだか不吉な予感がするね……。\""
90001030-61 = "それらが一体何を考えて動いているのか……。"
90001030-62 = "私たちの目に映っていない、別の何かが隠されている可能性が高いです。"
90001030-74 = "ッ！？何事ですか！？"
90001030-75 = "対空砲撃を受けたみたい……！#nこのまま飛行を続けるのは危険だけど、どうする？"
90001030-76 = "気流も不利です。いかがしましょう？"
90001030-77 = "[s] \"緊急着陸！\""
90001030-78 = "了解。緊急着陸、実行します。"
90001030-90 = "……囲まれましたね。"
90001030-91 = "突破しようか。#nトキ？"
90001030-92 = "はい、お任せください。"
90001030-107 = "数が全く減らない……これもデータを集めてるのかな？"
90001030-108 = "いえ、これは……！"
90001030-112 = "（痕跡を辿った先に、待ち構えていたといわんばかりの兵……）"
90001030-113 = "（これは罠だったのでしょうか？それとも……）"
90001030-118 = "あれ？撤退し始めた。"
90001030-126 = "劣勢を察しての行動には見えません。#nというよりも……。"
90001030-130 = "！？"
90001030-131 = "これは……まさか！？"
90001030-139 = "部長！地下15m下から――"
90001030-140 = "ゲブラ！こんなところに……！"
