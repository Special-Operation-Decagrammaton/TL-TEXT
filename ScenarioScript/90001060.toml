[translation]
90001060-1 = "Episódio 6; Faíscas"
90001060-6 = "……。"
90001060-7 = "……。"
90001060-12 = "？"
90001060-17 = "[ns1] \"Segui os rastros, mas...\"\n[ns2] \"Um vulcão... na neve?\""
90001060-20 = "Está quente...!"
90001060-21 = "Que calor!"
90001060-22 = "Acho que a temperatura está ideal."
90001060-27 = "Para mim, ainda está um pouco frio. A Eimi que está fora de sintonia."
90001060-28 = "Os seres humanos, originalmente, consideram esta temperatura... não, uma temperatura ainda mais alta como a ideal."
90001060-29 = "Mas, calor é calor. Até agora pouco estava fresco e agradável."
90001060-33 = "Não dá, Sensei... eu vou tirar um pouco da roupa."
90001060-34 = "[s] \"Espere, Eimi! Se acalme!\""
90001060-35 = "Por quê? Os humanos são, por natureza, mais vulneráveis ao calor do que ao frio, sabe."
90001060-36 = "Se ficar muito quente, posso ter uma insolação..."
90001060-37 = "Se eu tiver uma insolação, minha consciência vai ficar confusa, terei espasmos, pressão baixa, sintomas de desidratação... e, no pior dos casos, pode levar à morte."
90001060-38 = "Nesse caso — seria difícil determinar a causa da morte."
90001060-39 = "Além disso, forçar-se a continuar a missão aguentando o calor é irracional."
90001060-40 = "[s3] \"Entendi que você entende muito sobre insolação, mas...\"\n[s4] \"Mas tente aguentar só um pouco...\""
90001060-43 = "……É difícil, não é, Sensei?"
90001060-44 = "Hã? Está emocionado por eu ter sentido pena de você?"
90001060-45 = "O que exatamente você está dizendo? #nNão existe ninguém que entenda o coração dos outros como se fosse o seu próprio—"
90001060-46 = "E que seja uma garota bonita, hacker genial, frágil e pura, gentil, onipotente e 'onisciente' que pode oferecer conforto?"
90001060-47 = "Posso fazer isso como se estivesse respirando. Sim, é fácil. #nDisse duas vezes porque é importante."
90001060-51 = "[ns] \"……Sim, sim. Como a Himari disse.\""
90001060-52 = "Mas parece que sua expressão não condiz com suas palavras...?"
90001060-56 = "O rastro termina por aqui. Estou verificando os arredores, mas..."
90001060-57 = "O terreno e a situação mudaram, afinal."
90001060-58 = "Além disso, em vários lugares..."
90001060-66 = "As máquinas estão funcionando."
90001060-67 = "Sim. Escavando o solo, transportando... parecem ocupadas."
90001060-68 = "Aquilo é... uma sonda de perfuração?"
90001060-69 = "Perfuração... é para cavar buracos no solo para exploração de recursos, certo? #nEntão, será que estão coletando algo aqui também?"
90001060-70 = "De fato, zonas vulcânicas são ambientes onde existem vários tipos de minérios."
90001060-71 = "Às vezes é possível extrair minério de cobre, ou coletar enxofre perto de vulcões ativos. #nMas—"
90001060-82 = "Presidente!?"
90001060-83 = "Será um bloqueio de sinal? Toki?"
90001060-85 = "Sim. Confirmei que ondas de interferência potentes estão sendo emitidas por toda a área. E então..."
90001060-90 = "……Será por causa da interferência? O Abi-Eshuh não está funcionando bem."
90001060-91 = "Tudo bem. Nessas horas, geralmente basta dar umas batidinhas que conserta."
90001060-93 = "E-Eimi!?"
90001060-100 = "Não consertou."
90001060-101 = "Que estranho... o ângulo estava ruim?"
90001060-102 = "[s] \"Acho que o problema não é esse...\""
90001060-103 = "Entendi..."
90001060-104 = "Não tem jeito. Vou mudar para o modo normal."
90001060-105 = "Guardar o Abi-Eshuh no trailer de transporte temporário que a Rio preparou..."
90001060-106 = "……Ora. O trailer também parece ter parado devido à interferência. #nNesse caso, o único método que me resta é—"
90001060-107 = "Significa que terei que desativar o Abi-Eshuh manualmente...?"
90001060-109 = "Eu também vou ajudar."
90001060-110 = "Muito obrigada."
90001060-116 = "Espere um pouco. Agora, com o equipamento que ainda funciona de alguma forma..."
90001060-117 = "Essa interferência de rádio está muito acima do nível normal, então se eu usá-la..."
90001060-118 = "Encontrei! Está sendo emitida dali."
90001060-128 = "Dá para ver uma instalação estranha... uma base de radar?"
90001060-129 = "Ou talvez seja a estação de rádio que está emitindo essa interferência."
90001060-130 = "De qualquer forma... se não resolvermos esse bloqueio, estaremos acabados."
90001060-131 = "Qual é a base disso?"
90001060-132 = "Se continuarmos assim, não poderemos usar o Abi-Eshuh. Não dá para negar que estamos com falta de poder de fogo."
90001060-133 = "E... eu não gostaria de admitir isso, mas..."
90001060-134 = "..."
90001060-135 = "...é muito perigoso ficar nesta região por muito tempo sem a navegação e as unidades AMAS da Rio."
90001060-136 = "Esta é, acima de tudo, uma decisão tomada pensando na segurança de todos vocês."
90001060-137 = "(Nossa, ela não consegue ser honesta quando se trata da Presidente...)"
90001060-138 = "Hum... você está pensando: 'A Himari-bucho não consegue ser honesta quando se trata da Rio-sama', não é, Eimi?"
90001060-140 = "!?!?"
90001060-142 = "Eu sou tão óbvia assim?"
90001060-143 = "Não, eu só tentei adivinhar."
90001060-144 = "Entendo..."
90001060-145 = "[s] \"De qualquer forma, vamos lá.\""
90001060-146 = "Sim, vamos fazer isso."
90001060-147 = "Eu serei a linha de frente."
90001060-148 = "Bucho, Sensei, todos, tomem cuidado."
