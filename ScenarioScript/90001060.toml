[translation]
90001060-1 = "第6話;火花"
90001060-6 = "……。"
90001060-7 = "……。"
90001060-12 = "？"
90001060-17 = "[ns1] \"痕跡を辿ってきたけど……。\"\n[ns2] \"雪の上に……火山が？\""
90001060-20 = "暖かい……！"
90001060-21 = "暑い！"
90001060-22 = "ちょうど良い気温かと。"
90001060-27 = "私にはまだ少し寒いくらいです。エイミがズレているんですよ。"
90001060-28 = "人間は本来、このくらいの……いえ、もっと高い気温が適温なのですよ。"
90001060-29 = "でも、暑いものは暑いよ。さっきまで涼しくてちょうど良かったのに。"
90001060-33 = "ダメだ、先生……私、ちょっと脱ぐね。"
90001060-34 = "[s] \"待って、エイミ！落ち着いて！\""
90001060-35 = "なんで？人間は本来、寒さより暑さに弱い生き物なんだよ。"
90001060-36 = "暑いと熱中症になっちゃうし……。"
90001060-37 = "熱中症になったら、意識が[ruby=もうろう]朦朧[/ruby]として、[ruby=けいれん]痙攣[/ruby]、低血圧、脱水症状を起こしちゃうし……最悪の場合死に至ることだってある。"
90001060-38 = "その場合――死因の特定が難しくなるの。"
90001060-39 = "というか、暑いのを無理に我慢して作戦を続けるのは非合理的だよ。"
90001060-40 = "[s3] \"熱中症に詳しいのはわかったけど……。\"\n[s4] \"でも少しだけ我慢して……。\""
90001060-43 = "……大変ですね、先生。"
90001060-44 = "え？私に同情される日が来るなんて、感無量？"
90001060-45 = "一体何を仰っているのですか？#n私ほど他人の心を自分のことのように理解でき――"
90001060-46 = "そっと寄り添える……清楚系病弱天才ハッカーかつ、優しくて万能で「全知」である美少女はいませんよ？"
90001060-47 = "この程度、息をするようにできますとも。ええ、簡単です。#n大事なことなので二度言いました。"
90001060-51 = "[ns] \"……うんうん。ヒマリの言う通りだね。\""
90001060-52 = "表情と言動が一致してないように見えますが……？"
90001060-56 = "この辺りで途切れてるね。周囲を調べてはいるけど……。"
90001060-57 = "地形も状況も変わりましたからね。"
90001060-58 = "それに、あちこちで……。"
90001060-66 = "機械が動いていますね。"
90001060-67 = "うん。地面を掘って、運んで……忙しそうだね。"
90001060-68 = "あれは……[ruby=しすいき]試錐機[/ruby]、でしょうか？"
90001060-69 = "試錐……資源探査のために地面に穴を掘ることだっけ？#nじゃあ、ここでも何かを採取してるのかな？"
90001060-70 = "たしかに、火山地帯は様々な鉱石が存在する環境ではあるわね。"
90001060-71 = "銅鉱石が採掘できることもあるし、活火山の近くで硫黄を採取できたりする。#nでも――"
90001060-82 = "会長！？"
90001060-83 = "ジャミングでしょうか！トキ？"
90001060-85 = "はい。今、強力な妨害電波が周辺全域に放たれていることを確認しました。そして……。"
90001060-90 = "……妨害電波の影響でしょうか、アビ・エシュフの調子が悪いです。"
90001060-91 = "大丈夫。こういう時はたいてい叩けば直るよ。"
90001060-93 = "え、エイミ！？"
90001060-100 = "直らないですね。"
90001060-101 = "おかしいな……角度が悪かった？"
90001060-102 = "[s] \"そういう問題じゃないと思う……。\""
90001060-103 = "そっか……。"
90001060-104 = "仕方がありません。通常モードに移行します。"
90001060-105 = "アビ・エシュフを、リオ様が用意してくださった臨時移動トレーラーに格納……。"
90001060-106 = "……なんと。トレーラーもジャミングの影響で停止しているようです。#nそうなると私に残された方法は――"
90001060-107 = "手動で、アビ・エシュフを解除するしかない、ということですか……。"
90001060-109 = "私も手伝うよ。"
90001060-110 = "ありがとうございます。"
90001060-116 = "待ってください。今、どうにか動く機器で――"
90001060-117 = "この妨害電波は通常のレベルを遥かに超えているので、それを利用すれば……。"
90001060-118 = "見つかりました！あそこから放たれています。"
90001060-128 = "変な施設が見えるけど……レーダー基地？"
90001060-129 = "それとも、この妨害電波を出している無線局でしょうか。"
90001060-130 = "とにかく……このジャミングを解決しなければ、私たちは一巻の終わりです。"
90001060-131 = "根拠は？"
90001060-132 = "このままではアビ・エシュフを使えなくなります。戦力不足は否めません。"
90001060-133 = "そして……これはあまり認めたくありませんが……。"
90001060-134 = "……。"
90001060-135 = "……リオのAMAS部隊とナビゲーションなしでいつまでもこの地域にいるのは、とても危険です。"
90001060-136 = "これはあくまで、皆さんの安全を考慮しての決断です。"
90001060-137 = "（まったく、会長のことになると素直じゃないんだから……）"
90001060-138 = "ふむ……「リオ様が関わるとヒマリ部長は素直じゃなくなるんだから」と思っていますね、エイミ。"
90001060-140 = "！？！？"
90001060-142 = "私、そんな分かりやすいっけ？"
90001060-143 = "いえ、言ってみただけです。"
90001060-144 = "そう……。"
90001060-145 = "[s] \"とりあえず、行ってみようか。\""
90001060-146 = "ええ、そうしましょう。"
90001060-147 = "私が先陣を切ります。"
90001060-148 = "部長も先生も、みんな気をつけてね。"
