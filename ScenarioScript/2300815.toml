[translation]
2300815-1 = "Sentimentos verdadeiros"
2300815-2 = "（Caminhamos até o shopping no horário combinado）"
2300815-4 = "Ufa... Realmente tem bastante coisa, não é?"
2300815-5 = "Coisas para usar no culto, itens para caridade, doces para distribuir no voluntariado..."
2300815-6 = "[s] \"É uma quantidade impressionante.\""
2300815-7 = "Sim. Fico muito grata por você ter vindo me ajudar, Sensei."
2300815-8 = "Muito obrigada, como sempre."
2300815-9 = "[s] \"Você sempre prepara tudo isso sozinha, Mari?\""
2300815-10 = "Ah, não! #nNormalmente nos revezamos por escala, mas..."
2300815-11 = "Como todos estão muito ocupados, acabo assumindo a maior parte das vezes."
2300815-12 = "Hoje, como ninguém mais pôde vir, acabei vindo sozinha..."
2300815-13 = "[s] \"Deve ser difícil...\""
2300815-14 = "Não, que isso. Se eu puder ajudar a todos, mesmo que um pouco, já fico feliz."
2300815-15 = "Além disso, só de olhar as vitrines do shopping, já me divirto."
2300815-16 = "Ah, Sensei, olhe só. #nQue bicho de pelúcia fofo..."
2300815-17 = "E ali tem roupas tão lindas..."
2300815-18 = "Este acessório também é uma gracinha..."
2300815-19 = "[ns] （Talvez seja a primeira vez que vejo a Mari tão animada assim...）"
2300815-20 = "Ei, vocês dois! Venham dar uma olhada se quiserem!"
2300815-21 = "Ah, será que... está falando conosco?"
2300815-22 = "Estou falando com a moça! Você estava olhando com olhos brilhantes faz um tempo."
2300815-23 = "Não precisa ficar olhando de longe, venha ver de perto!"
2300815-24 = "B-bem, aceitarei o convite..."
2300815-25 = "Este é um acessório que está na moda ultimamente! Um ótimo negócio!"
2300815-26 = "[ns] \"Se quiser, posso te dar de presente?\""
2300815-28 = "Hã!? P-para mim?"
2300815-29 = "[s1] \"Para a Mari, que sempre se esforça tanto.\"\n[s2] \"Me avise se gostar de mais alguma coisa.\""
2300815-32 = "Ah, bem..."
2300815-38 = "N-não... está tudo bem, obrigada..."
2300815-42 = "S-Sensei, fico muito feliz com sua gentileza, mas..."
2300815-43 = "Como uma irmã, devo evitar luxos desnecessários..."
2300815-44 = "C-claro que... este acessório é... muito bonito, mas... uuu..."
2300815-45 = "[s] \"Não tem problema, tem? Você sempre usa esse corsage, não usa?\""
2300815-46 = "Ah... isso...?"
2300815-50 = "Este corsage é..."
2300815-51 = "Eu comprei para não me esquecer dos votos da irmandade."
2300815-52 = "Assim como esta flor branca que nunca murcha, eu também não quero esquecer minhas origens..."
2300815-53 = "[s] \"Entendo, foi por isso.\""
2300815-58 = "Sensei... bem, eu poderia lhe contar a verdade?"
2300815-59 = "[s] \"A verdade?\""
2300815-63 = "Este não é um confessionário, mas... #nNa verdade, eu... menti..."
2300815-64 = "Este corsage..."
2300815-65 = "Eu comprei porque... ele era fofo..."
2300815-66 = "[s] \"Hum?\""
2300815-67 = "C-claro que... também tem o significado de não esquecer minhas origens, mas...!!"
2300815-68 = "Mas... eu só comprei porque achei fofo..."
2300815-72 = "Mesmo que uma irmã deva se esforçar para ser simples e econômica..."
2300815-73 = "Mas, ao ver os acessórios, acabei querendo me arrumar um pouco também..."
2300815-74 = "E-então... decidi usar o corsage..."
2300815-75 = "Uuu... eu tentei parecer melhor do que sou e acabei mentindo para o Sensei..."
2300815-76 = "Eu não sou uma irmã digna..."
2300815-77 = "……"
2300815-78 = "Mas, eu me sinto um pouco mais aliviada."
2300815-79 = "[s] \"É o seu jeito de se arrumar, Mari.\""
2300815-80 = "Sim... pensei que, contanto que fosse apenas isso, não teria problema..."
2300815-81 = "Mas, eu não sou uma irmã digna... não é?"
2300815-82 = "[s] \"Não, isso não é verdade.\""
2300815-83 = "H-hein!?"
2300815-84 = "[s3] \"Acho que não tem problema contanto que seja apenas isso.\"\n[s4] \"Antes de ser uma irmã, você é uma aluna.\""
2300815-87 = "V-você acha...?"
2300815-88 = "[s5] \"Você é uma aluna, afinal.\"\n[s6] \"Gostar de coisas fofas e querer se arrumar são sentimentos normais.\""
2300815-91 = "Sensei..."
2300815-92 = "...Ouvir você dizer isso me deixou um pouco mais tranquila."
2300815-93 = "O que é normal e o que não é..."
2300815-94 = "Para mim, ainda é difícil distinguir..."
2300815-95 = "Hehe, agradeço muito pelo seu carinho, Sensei."
2300815-96 = "Para mim, este corsage já é o suficiente."
2300815-97 = "[s] \"Então, que tal se formos comer alguma coisa juntos agora?\""
2300815-98 = "Ora... você já cuida tanto de mim, Sensei, não posso deixar que faça mais nada..."
2300815-99 = "……"
2300815-106 = "...Mas desta vez, vou aceitar a sua gentileza."
2300815-108 = "(Dito isso, comi com a Mari e voltamos para o Schale)"
