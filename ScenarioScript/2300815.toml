[translation]
2300815-1 = "本当の気持ち"
2300815-2 = "（約束の時間にショッピングモールへと足を運んだ）"
2300815-4 = "ふぅ……やっぱり結構量がありますね。"
2300815-5 = "礼拝の時に使うもの、チャリティーに出すもの、ボランティアで配るお菓子……。"
2300815-6 = "[s] \"すごい量だね。\""
2300815-7 = "はい。先生に来ていただけて、本当に助かりました。"
2300815-8 = "いつもありがとうございます。"
2300815-9 = "[s] \"いつもこの量をマリーひとりで準備してるの？\""
2300815-10 = "あっ、いえ！#n普段は当番制で持ち回りなんですけど……"
2300815-11 = "皆さんお忙しいので、私が引き受けることが多いんです。"
2300815-12 = "今日は、他にどなたも行けなかったので私一人ですが……。"
2300815-13 = "[s] \"大変だね……。\""
2300815-14 = "いえ。微力ながら、皆さんにお力添えできるのなら、なによりです。"
2300815-15 = "それに、ショッピングモールは見ているだけで楽しいですし。"
2300815-16 = "あっ、先生、見てください。#n可愛いぬいぐるみ……"
2300815-17 = "あっちには素敵なお洋服が……"
2300815-18 = "このアクセサリーも可愛いですね……。"
2300815-19 = "[ns] （こんなに浮かれてるマリー、初めて見るかも……）"
2300815-20 = "そこのお二人さん！よかったら見ていきな！"
2300815-21 = "えっ、私たちのこと……でしょうか？"
2300815-22 = "お嬢ちゃんのことだよ！さっきからキラキラした目で見てたじゃないか。"
2300815-23 = "そんな遠くからじゃなくて、もっと近くで見ていきな！"
2300815-24 = "お、お言葉に甘えて……"
2300815-25 = "これは最近流行りのアクセサリーでね！お値打ち品だ！"
2300815-26 = "[ns] \"良かったら、これプレゼントさせてくれないかな？\""
2300815-28 = "えっ！？わ、私にですか？"
2300815-29 = "[s1] \"いつも頑張っているマリーに、ね。\"\n[s2] \"他にも気に入ったものがあったら教えて。\""
2300815-32 = "あっ、えっと……。"
2300815-38 = "い、いえ……大丈夫、です……。"
2300815-42 = "せ、先生のお気持ちは、とても嬉しいのですが……。"
2300815-43 = "シスターとして、不必要な贅沢は……避けなければならないので……。"
2300815-44 = "も、もちろん……このアクセサリーは……とても可愛いのですが……うぅぅ……。"
2300815-45 = "[s] \"これくらい、いいんじゃないかな。いつもコサージュつけてるでしょ？\""
2300815-46 = "あ……これ、ですか……。"
2300815-50 = "このコサージュは……。"
2300815-51 = "シスターフッドの誓約を忘れないようにと買ったものなんです。"
2300815-52 = "この枯れない白い花のように、私も初心を忘れぬよう……。"
2300815-53 = "[s] \"そうだったんだね。\""
2300815-58 = "先生……その、本当のことを、お話しても、よろしいでしょうか。"
2300815-59 = "[s] \"本当のこと？\""
2300815-63 = "ここは懺悔室ではありませんが……#n実は私……ウソをつきました……。"
2300815-64 = "このコサージュは……"
2300815-65 = "か、可愛いから……買ったんです……。"
2300815-66 = "[s] \"うん？\""
2300815-67 = "も、もちろん……初心を忘れないように、という意味もあるのですが……！！"
2300815-68 = "でも……可愛かったから……買っただけなんです……。"
2300815-72 = "シスターは、質素倹約を心がけなければならないのに……。"
2300815-73 = "でも、アクセサリーを見ていると、私もオシャレをしてみたいと思ってしまって……。"
2300815-74 = "な、なので……コサージュをつけてみたんです……。"
2300815-75 = "うぅ……見栄を張って先生にウソまでついて……。"
2300815-76 = "シスター失格です……。"
2300815-77 = "……。"
2300815-78 = "でも、少しだけスッキリしました。"
2300815-79 = "[s] \"マリーなりのオシャレなんだね。\""
2300815-80 = "はい……この程度なら大丈夫かな、と……。"
2300815-81 = "でも、シスター失格です……よね？"
2300815-82 = "[s] \"ううん、そんなことないよ。\""
2300815-83 = "え、えぇ！？"
2300815-84 = "[s3] \"その程度なら大丈夫だと思う。\"\n[s4] \"シスターである前に、一人の生徒だからね。\""
2300815-87 = "そ、そう、ですかね……。"
2300815-88 = "[s5] \"生徒だもの。可愛いものが好きだったり、\"\n[s6] \"オシャレをしたくなるのは、普通の気持ちだと思うよ。\""
2300815-91 = "先生……。"
2300815-92 = "……そう仰っていただいて、少しだけ心が落ち着きました。"
2300815-93 = "どこまでが普通で、どこまでが普通ではないのか……"
2300815-94 = "私にはまだ、判別が難しいですが……。"
2300815-95 = "ふふ、先生のお気持ち、ありがたくいただきますね。"
2300815-96 = "私には、このコサージュだけで充分です。"
2300815-97 = "[s] \"じゃあ、代わりに今から一緒に食事でもどうかな？\""
2300815-98 = "もう……先生にはいつも世話になっているのに、これ以上していただくわけには……。"
2300815-99 = "……"
2300815-106 = "……でも今回は、お言葉に甘えさせていただきますね。"
2300815-108 = "（そうやって、マリーと一緒に食事をとってシャーレに戻った）"
