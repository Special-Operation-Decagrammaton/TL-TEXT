[translation]
102180-1 = "第18話;大雪原の中で"
102180-10 = "う、うわぁっ！部長！こっちも塞がれてしまいました！"
102180-11 = "うっ、一体どうなってるの……大雪原は比較的安全だって聞いてたのに……"
102180-12 = "敵がこんなにいるなんて聞いてないよー！"
102180-13 = "ま、まさか……私たちの後をつけて来たのでしょうか……？"
102180-14 = "イズナたちをですか！？#nどうやって特別任務のことを――"
102180-15 = "いや、この任務の事は誰にも言ってないし、そもそもそんな時間もなかったよ！"
102180-17 = "……キキキッ。"
102180-25 = "こ、こっちも……！囲まれてしまいました！#nど、どうしましょう、部長？"
102180-26 = "こ、このままじゃ、私たち……"
102180-27 = "だぁーっ！弱音を吐くんじゃない！！"
102180-28 = "部長……"
102180-30 = "部長……！"
102180-31 = "先生が、私たち忍術研究部を信じて任せてくれた任務だよ！#nこの程度のトラブルで失敗するわけにはいかないの！"
102180-32 = "そう――「忍者とは、一度交わした約束は必ず守るもの」！"
102180-33 = "ツクヨ、イズナ！「忍者」の絆を、見せつけるよ！"
102180-34 = "……絆の力、ですね！はいっ、部長！"
102180-35 = "はい！イズナも主殿との約束、必ず守ってみせます！"
102180-36 = "よし、いっくよー！！"
102180-41 = "ミチル流忍法っ！！"
102180-42 = "イズナ流忍法！"
102180-43 = "つ、ツクヨ流、忍法……！"
102180-50 = "今だ、いくぞ！！"
102180-51 = "「超無敵鉄甲「[ruby=とらまる]虎丸[/ruby]」」！！"
102180-52 = "降下！！！"
102180-53 = "そのネーミングはもうちょっとなんとか……はぁ……"
102180-54 = "はい、降下しますね。"
102180-68 = "……？#nあ、あれ……？"
102180-69 = "この音は……"
102180-71 = "部長、ツクヨ殿！！#n上を見てください、飛行船です！"
102180-72 = "な、何あれ！？何かが降ってきてる！？"
102180-80 = "なっ、何……"
102180-81 = "こ、これは……！"
102180-82 = "戦車が……！？#n降って、きました……！"
102180-91 = "キキキッ！バッチリのタイミングだったぞ、イロハ！"
102180-92 = "あははっ！すっご～い！降下～！"
102180-93 = "……ああ、はい。#nところで先輩、何でここに来たんですか？"
102180-94 = "知らないのか？危機に瀕した仲間を助けるために決まってるだろう！"
102180-95 = "……はい？"
102180-96 = "ああ、そうだ！正義の味方になるためだとも！！#nイブキが愛してやまない忍者のためにな！！"
102180-97 = "こんにちは、忍者のおねえちゃんたち！#nイブキが助けに来たよ～！！"
102180-99 = "あっ、あの声は……！"
102180-100 = "い、イブキ……！？"
102180-101 = "イロハさん、まで……どうして、ここに……？"
102180-103 = "キキキッ……このマコト様の情報網を甘く見てもらっては困る。#n危険な任務に忍者があたるという情報を掴んでいたのだ！"
102180-104 = "イブキの愛する忍者たちが怪我でもしたら、イブキが悲しむことは目に見えている。"
102180-105 = "だから上空で見守りつつ、危機一髪の瞬間を狙っていたのだ！"
102180-106 = "……はぁ。"
102180-107 = "じゃあ、ここに来たのも……イブキのために？"
102180-108 = "ああ、そうだとも！！イブキの好感度を上げるための絶好のチャンスを、みすみす逃すわけがあるまい！！"
102180-109 = "前回のプリン事件以降、イブキが目も合わせてくれないのだからな！"
102180-110 = "……イブキが大事に取っておいたプリンを食べるからでしょ。"
102180-111 = "お前のプリンだと思っていたのだ！"
102180-112 = "私のプリンでも良くないですよ……？"
102180-113 = "あの時のマコト先輩は嫌いだったけど、もう大丈夫！マコト先輩だーい好き！！"
102180-114 = "キャハハハハハハハッ――！！聞いたかイロハ？#n分かったら今すぐあの忍者たちを助けろ！！"
102180-118 = "超無敵鉄甲「[ruby=とらまる]虎丸[/ruby]」！！"
102180-120 = "はぁ、分かりましたよ……出撃。"
102180-121 = "おねえちゃんたち！イブキが助けるからね！"
102180-123 = "た、助けに、来てくれたのですね！ありがとう、ございます！"
102180-124 = "それじゃ！行くよ！"
102180-125 = "はい！！"
