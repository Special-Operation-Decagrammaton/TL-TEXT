[translation]
102180-1 = "Episódio 18;No Meio da Grande Planície Nevada"
102180-10 = "U-uaaah! Chefe! Esse lado também foi bloqueado!"
102180-11 = "Ugh... o que tá acontecendo...? Disseram que a Grande Planície Nevada era relativamente segura..."
102180-12 = "Ninguém falou que teria tantos inimigos assim!"
102180-13 = "N-não me diga... será que eles seguiram a gente...?"
102180-14 = "Seguir a Izuna e as outras!?#nMas como descobriram sobre a missão especial...?!"
102180-15 = "Não, eu não contei dessa missão pra ninguém! E nem tivemos tempo pra isso!"
102180-17 = "...... Kikiki."
102180-25 = "A-aqui também...! Estamos cercadas!#nO-o que fazemos, chefe?!"
102180-26 = "N-nesse ritmo... nós vamos..."
102180-27 = "Aaaah! Para de falar derrota agora!!"
102180-28 = "Chefe..."
102180-30 = "Chefe...!"
102180-31 = "Essa é uma missão que o Sensei confiou ao Clube de Pesquisa Ninja!#nA gente não pode fracassar por causa de um probleminha desses!"
102180-32 = "Isso mesmo... \"Um ninja sempre cumpre uma promessa feita\"!"
102180-33 = "Tsukuyo, Izuna! Vamos mostrar a força dos laços de um ninja!"
102180-34 = "...... O poder dos nossos laços...! Sim, chefe!"
102180-35 = "Sim! A Izuna também vai cumprir sua promessa com o Lorde, custe o que custar!"
102180-36 = "Beleza, vamo nessaaa!!"
102180-41 = "Arte Ninja do Estilo Michiru!!"
102180-42 = "Arte Ninja do Estilo Izuna!"
102180-43 = "A-arte ninja... do Estilo Tsukuyo...!"
102180-50 = "Agora! Vamos!!"
102180-51 = "\"Super Invencível Blindado 'Toramaru'\"!!"
102180-52 = "Descida!!!"
102180-53 = "Esse nome ainda precisa de um ajuste... ai ai..."
102180-54 = "Certo, iniciando descida."
102180-68 = "......?#nA-aquilo...?"
102180-69 = "Esse som é..."
102180-71 = "Chefe! Tsukuyo-dono!!#nOlhem pro céu, é um dirigível!"
102180-72 = "Q-que é aquilo!? Tem alguma coisa caindo!?"
102180-80 = "M-mas o quê..."
102180-81 = "I-isso é...!"
102180-82 = "Um tanque...?!#nTá caindo do céu...!"
102180-91 = "Kikiki! Timing perfeito, Iroha!"
102180-92 = "Ahahaha! Incrííível! Descendooo~!"
102180-93 = "...... Ah, certo.#nAliás, senpai, por que vocês vieram aqui?"
102180-94 = "Não é óbvio? Viemos salvar nossas companheiras em perigo!"
102180-95 = "...... Hein?"
102180-96 = "Isso mesmo! Viemos nos tornar heroínas da justiça!!#nPelas ninjas que a Ibuki tanto ama!!"
102180-97 = "Oláá, moças ninja!#nA Ibuki veio salvar vocês~!!"
102180-99 = "A-aquela voz é...!"
102180-100 = "I-Ibuki...!?"
102180-101 = "Até a Iroha-san... por que vocês estão aqui...?"
102180-103 = "Kikiki... não subestimem a rede de informações desta Makoto-sama.#nEu descobri que ninjas estavam encarregadas de uma missão perigosa!"
102180-104 = "Se as ninjas queridas da Ibuki se machucassem, era óbvio que ela ficaria triste."
102180-105 = "Então ficamos observando do céu, esperando o momento exato pra entrar em ação!"
102180-106 = "...... Ai ai."
102180-107 = "Então vocês vieram aqui também... por causa da Ibuki?"
102180-108 = "Mas é claro!! Eu não perderia uma chance perfeita dessas de aumentar minha afinidade com a Ibuki!!"
102180-109 = "Desde o incidente do pudim, ela nem olha mais na minha cara!"
102180-110 = "...... Porque você comeu o pudim que a Ibuki tava guardando."
102180-111 = "Eu achei que era o SEU pudim!"
102180-112 = "Mesmo se fosse o meu, ainda não podia comer, sabia...?"
102180-113 = "Naquela hora eu fiquei brava com a Makoto-senpai, mas agora tá tudo bem! Eu amo muuuito a Makoto-senpai!!"
102180-114 = "Kyahahahahahaha!! Ouviu isso, Iroha?!#nAgora anda logo e salva aquelas ninjas!!"
102180-118 = "\"Super Invencível Blindado 'Toramaru'\"!!"
102180-120 = "Ai ai... entendido... iniciando operação."
102180-121 = "Moças ninja! A Ibuki vai salvar vocês!"
102180-123 = "V-vocês vieram nos ajudar...! Muito obrigada!"
102180-124 = "Então tá! Vamos nessa!"
102180-125 = "Sim!!"
