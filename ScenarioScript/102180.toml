[translation]
102180-1 = "Episódio 18; No campo de neve pesada"

102180-10 = "Uau! Gerente! Este também está bloqueado!"

102180-11 = "Ugh, o que está acontecendo... Ouvi dizer que o campo de neve pesada é relativamente seguro..."

102180-12 = "Nunca ouvi falar que existem tantos inimigos!"

102180-13 = "Bem, de jeito nenhum... eles vieram atrás de nós...?"

102180-14 = "Izuna e os outros! ? #nQue tal a missão especial――"

102180-15 = "Não, eu não contei a ninguém sobre essa missão e, para começo de conversa, nem tive tempo para isso!"

102180-17 = "...Kikikikki."

102180-25 = "Ei, esse também...! Estou cercado! #nO que devemos fazer, gerente?"

102180-26 = "Nesse ritmo, nós..."

102180-27 = "Daa! Não reclame! !"

102180-28 = "Gerente..."

102180-30 = "Diretor...!"

102180-31 = "Essa é a missão que o professor nos confiou no Clube de Pesquisa de Ninjutsu e nos confiou! #nNão posso me dar ao luxo de falhar devido a esse nível de problema!"

102180-32 = "É isso mesmo - "Um ninja sempre cumpre uma promessa depois de feita!""

102180-33 = "Tsukuyo, Izuna! Vamos mostrar o vínculo do “ninja”!"

102180-34 = "...O poder dos títulos, não é? Sim, chefe!"

102180-35 = "sim! Izuna também cumprirá sua promessa ao Senhor!"

102180-36 = "Ok, vamos! !"

102180-41 = "Técnicas ninja estilo Michiru! !"

102180-42 = "Técnicas ninja estilo Izuna!"

102180-43 = "つ、ツクヨ流、忍法……！"

102180-50 = "Agora vamos! !"

102180-51 = "“Armadura de ferro super invencível “[ruby=Toramaru]Toramaru[/ruby]””! !"

102180-52 = "Descida! ! !"

102180-53 = "Algo um pouco melhor nesse nome...suspiro..."

102180-54 = "Sim, ele descerá."

102180-68 = "...? #nAh, isso...?"

102180-69 = "Este som..."

102180-71 = "Diretor, Tsukuyo-dono! ! #nOlhe acima, é uma aeronave!"

102180-72 = "O que é aquilo? ? Algo está caindo! ?"

102180-80 = "O que...?"

102180-81 = "Isso é...!"

102180-82 = "Um tanque...! ? #nEstá chovendo e chegou...!"

102180-91 = "Ki-ki-ki! O momento foi perfeito, Iroha!"

102180-92 = "Ahaha! Incrível! Descida ~!"

102180-93 = "...Ah, sim. #nA propósito, Senpai, por que você veio aqui?"

102180-94 = "Você não sabe? Ele deve ter decidido ajudar seus amigos em crise!"

102180-95 = "……sim?"

102180-96 = "Oh sim! É se tornar um aliado da justiça! ! #nPara o ninja que Ibuki tanto ama! !"

102180-97 = "Olá, senhoras ninjas! #nIbuki veio ajudar! !"

102180-99 = "Ah, aquela voz...!"

102180-100 = "I-Ibuki...! ?"

102180-101 = "Sr. Iroha... por que você está aqui...?"

102180-103 = "Kiki Kiki... Não quero que as pessoas subestimem a rede de informações de Makoto-sama. #nEles tinham informações de que os ninjas estariam em uma missão perigosa!"

102180-104 = "É óbvio que Ibuki ficaria triste se os ninjas que ele amava fossem feridos."

102180-105 = "É por isso que eu estava observando do céu, esperando por um perigo!"

102180-106 = "... Haa."

102180-107 = "Então, você veio aqui pelo Ibuki?"

102180-108 = "Ah, acho que sim! ! Não vou perder essa grande chance de aumentar a favorabilidade do Ibuki! !"

102180-109 = "Ibuki nem olhou para mim desde o último incidente com o pudim!"

102180-110 = "...É porque Ibuki está comendo o pudim que ela guardou com cuidado."

102180-111 = "Pensei que fosse o seu pudim!"

102180-112 = "Até meu pudim não é bom...?"

102180-113 = "Eu odiava Makoto-senpai naquela época, mas agora está tudo bem! Eu amo muito Makoto-senpai! !"

102180-114 = "Kyahahahahahahaha ――! ! Você ouviu isso? #nSe você sabe, ajude esses ninjas agora! !"

102180-118 = "Armadura de ferro super invencível “[ruby=Toramaru]Toramaru[/ruby]”! !"

102180-120 = "Ha, eu entendo... vamos lá."

102180-121 = "Irmãs! Ibuki vai te ajudar!"

102180-123 = "Ei, você veio me ajudar! obrigado!"

102180-124 = "É isso! Vamos!"

102180-125 = "sim! !"

