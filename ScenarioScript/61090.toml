[translation]
61090-1 = "第9話;授業の時間"
61090-2 = "ふぅ……。"
61090-3 = "うっ、ううっ……！"
61090-8 = "僅かな差だったが……。"
61090-9 = "これで、決着はついたはずだ。"
61090-10 = "スクワッド……少し、鈍りましたか？"
61090-11 = "そうかもしれないな。"
61090-12 = "だが、お前たちほどじゃない。#n動きが全体的に精彩を欠いている。"
61090-13 = "……！"
61090-14 = "で、どうするつもりなの？"
61090-15 = "「存在価値」は証明できたと思うけど。"
61090-19 = "まあ、しょうがないとは思うけど……。"
61090-20 = "あいつら、調子に乗って……！"
61090-21 = "どうせ「外」でいろいろ経験してきたんでしょ。#n最初から勝敗なんて見えてたんだし。"
61090-22 = "アリウスを捨てたくせに、今さら口出ししないでよ……！"
61090-23 = "はぁ……。"
61090-24 = "落ち着いて、ミサキ。"
61090-25 = "これは、私たちが受け止めるべきことだよ。"
61090-26 = "先生って大人もそう。#n勝手で、強引で……。"
61090-27 = "「アリウスのため」とか言いながら、どうせ裏では別のこと考えてるんでしょ……。"
61090-35 = "うわっ！？"
61090-36 = "ちょ、ちょっと！？大丈夫！？"
61090-37 = "気絶してる……。"
61090-38 = "予備動作もなしに、胸へのダブルタップからのヘッドショット……。"
61090-39 = "スバル先輩は鈍ったって言ってたけど……全然そんな感じじゃないよ……。"
61090-41 = "アツコ！？"
61090-42 = "ひいいいぃぃっ！？"
61090-43 = "私たちのことは何と言おうと構わない。#nでも、先生のことも悪く言うのはやめてくれる？"
61090-44 = "そのくらいの分別は、あると思ってるよ。"
61090-45 = "私も、まだアリウスの一員なんだからね？"
61090-46 = "は、はいっ！"
61090-47 = "……。"
61090-49 = "（みんな、どこか怯えたような顔で縮こまっている）"
61090-50 = "（もう少し、明るい雰囲気で話をするためには……） "
61090-51 = "[ns]\"よし、みんな！勉強をしよう！\""
61090-52 = "勉強って……一体何をしろっていうんですか！？#n私たちにはなにもないんですよ！"
61090-53 = "知識はない、教室もボロボロ。#n道具も、教える人すら……。"
61090-54 = "……言葉にすると悲しくなりますね。"
61090-55 = "[s1]\"大丈夫だよ。\"\n[s2]\"椅子と机と黒板さえあれば、どうとでもなるから。\""
61090-60 = "[ns]\"それに、教える人もちゃんといるよ。\""
61090-64 = "……本当にここでやるんですか？"
61090-65 = "[s3]\"机はあるし、椅子も起こせば問題ない。\"\n[s4]\"教卓も黒板もある！完璧な教室じゃないかな？\""
61090-68 = "「完璧」という言葉の定義が、私の知らない間に大きく変わったんでしょうか……。"
61090-69 = "意味を調べようにも、辞書なんてアリウスにはほとんど残っていないわけですが……。"
61090-70 = "いずれにせよ、今日はもういい時間です。#nもうすぐ夜になりますし……。"
61090-71 = "[s5]\"初回は短めだから大丈夫だよ。\"\n[s6]\"出席を取って、軽くガイダンスをして終わりかな。\""
61090-74 = "それで本当に大丈夫なのか……？"
61090-75 = "[s]\"大丈夫。私はサオリを信じてるよ！\""
61090-76 = "！？"
61090-77 = "！？"
61090-78 = "なぜこの流れで私の名前が出てくるんだ……？"
61090-79 = "[s7]\"それは……選抜された教育実習の先生方が！\"\n[s8]\"1時間目の授業を行うからです！\""
61090-82 = "その選抜はいつの間に行われてたの？"
61090-83 = "今……？……ああ、なるほどね。"
61090-84 = "まさか、先生の話していた「壮大な計画」はこれのことだったのか！？"
61090-85 = "勉強はちゃんとやってる？って、このための確認だったんだ……。"
61090-86 = "もっと事前に打ち合わせするとかできたでしょ……はぁ……。"
61090-87 = "では、私は……私が……？"
61090-88 = "[s]\"教えてください、サオリ先生！\""
61090-89 = "うん、教えてくださいな。サオリ先生。"
61090-90 = "アツコまで……！？"
61090-92 = "（サオリは、ぎこちない表情ながらも教壇に立った）"
61090-94 = "（何をどう教えれば……）"
61090-95 = "（ん？これは……社会の教科書か。……社会文化、社会契約論？）"
61090-99 = "（できる……これなら！）"
61090-100 = "授業を始める！着席！"
61090-101 = "え、本当に座らなきゃダメ？"
61090-102 = "あ、私……もう座ってるんだけど……。"
61090-103 = "ノートを開け。無ければ生徒手帳でもいい！#nそれなら全員一冊ずつ持っているはずだ。"
61090-104 = "それすら無いなら、隣のやつのを後で写しておけ。"
61090-105 = "聞くだけと、手を動かすのとでは、残る知識の量がまったく違うからな。"
61090-106 = "は、はいっ！"
61090-107 = "まんま、教官やってた頃のサオリ先輩だ……。"
61090-108 = "授業に入る前に、一つ言っておくことがある。"
61090-112 = "契約書は！本当に重要だ！！"
61090-113 = "けいやくしょ……？"
61090-114 = "なにそれ……外の文化……？"
61090-115 = "契約書とは、約束を忘れないために、相手と取り交わす書類のことだ。"
61090-116 = "これがなければ！どれだけ仕事こなしても！報酬を受け取れない！"
61090-117 = "苦労だけして、手ぶらで帰ってくるなんてザラだということだ！！"
61090-118 = "魂のこもった叫びだ……。"
61090-119 = "まさか……実体験……？"
61090-120 = "頑張って、サッちゃん……！"
61090-121 = "サオリ姉さん……！"
61090-123 = "……社会とは、実体のないものだ。#n構成員の契約で成り立っている、人工的な仕組みというのが「社会契約論」のメインだ。"
61090-124 = "つまり、最初から社会というものはなく、全ての人には生まれながらに与えられた固有の権利がある、ということだ。"
61090-125 = "あ、あのっ……質問、してもいいですか？"
61090-126 = "言ってみろ。"
61090-127 = "最初からないって言いましたけど、それなら……生まれつきの権利も存在しないんですか……？"
61090-128 = "いい質問だ。たしかに一見、矛盾しているように聞こえるかもしれない。"
61090-129 = "だが、こういう前提があると思ってほしい。"
61090-130 = "人間には生まれながらに権利がある、と「仮定する」ことが――"
61090-131 = "より良い社会を作る可能性を高めるのだと。"
61090-132 = "実際は違っても、そうだと「考えてしまった方が」結果的にはいいってこと……？"
61090-133 = "そんな風に考えたことなかった……！"
61090-137 = "時間だな。今日の授業はここまでだ。"
61090-138 = "質問があれば、次の授業で尋ねるといい。"
61090-139 = "予習は……まだ難しいだろうが、復習はしっかりやっておくように。"
61090-140 = "学習効果は、予習より復習のほうが高いからな。"
61090-144 = "その……どうだっただろうか……？"
61090-145 = "[s9]\"最高でした、サオリ先生……。\"\n[s10]\"感動しました、サオリ先生……。\""
61090-148 = "「先生」と呼ばれるほど、私はまだ……。"
61090-149 = "ともかく、うまくやれていたなら、よかった。"
61090-151 = "[ns]\"それじゃあ次は、物理担当のミサキ先生です！\""
61090-152 = "……私？しかも物理って……冗談でしょ？"
61090-153 = "は？弾道学は古典力学と近い……？"
61090-154 = "……。"
61090-155 = "完全に無関係でもないけどさ……。"
61090-156 = "はぁ……やればいいんでしょ。"
61090-159 = "まずは公式を覚えて。どうせ頭のスイッチ入ってないだろうし？"
61090-160 = "内容の理解までは求めてないから！その領域にないし。"
61090-161 = "数学も物理も、とりあえず暗記することが始まりだからね！"
61090-162 = "まあ……もし最初から理解できるなら、そっちの道をおすすめするけど。"
61090-163 = "でも、そういうタイプの子って、数値と統計で人を見ようとしたり――"
61090-164 = "他人の気持ちを理解できなくて、余計な騒ぎを起こすこともあるけどね……。"
61090-166 = "こんにちは。生物の授業を担当する[ruby=はかり]秤[/ruby]アツコです。"
61090-167 = "早速授業を始めようか。#n生物学は楽しいし、とても大切な分野なんだよ。"
61090-168 = "例えば「細胞」とは何か？"
61090-169 = "打撲がどんなプロセスを経て治っていくのか――実例を見ながら。"
61090-170 = "[s]\"アツコ！ストップ！ストップ！\""
61090-171 = "どうして止めるの？これは、すごく大事な話なんだよ？"
61090-172 = "ふふ、大丈夫。ちゃんと加減はわかってるつもり。"
61090-173 = "じゃあまずは「白血球と赤血球」から始めようか。"
61090-175 = "これで、細胞の構成要素とその役割についてはざっくり説明できたかな。"
61090-176 = "細胞は、生き物の一番基本になる単位とも言えるものだから、しっかり覚えておいてね。"
61090-178 = "……。"
61090-179 = "あ、あの……皆さん。えへへ……お久しぶりですね……。"
61090-180 = "えっと、それで……。"
61090-184 = "せ、先生！？わ、私はどうしたらいいんでしょうか……？"
61090-185 = "私、普段は雑誌くらいしか読んでないですし……専門的に知ってることなんて……。"
61090-186 = "[ns]\"……！\""
61090-188 = "[ns]（雑誌と聞いて、ひらめいた）"
61090-189 = "えっ？外の世界の暮らしについて話してみたら……って？"
61090-190 = "雑誌で見た服とか……食べものとか……？"
61090-191 = "……。"
61090-192 = "はい！それなら……話せそうです……！"
61090-194 = "あ、あらためて……こんにちは……。"
61090-195 = "突然でびっくりしちゃうかもしれないんですけど……あの……。"
61090-196 = "「ファッション」って、どう思いますか？"
61090-200 = "えへへ……そ、そうですよね。突拍子もない話題ですよね……。"
61090-201 = "でも、ファッションって……ただ服を着るんじゃなくて……#n他人からどう見られたいかを、自分で決めること……だと思うんです……。"
61090-202 = "そういうのって意外と……大事なんじゃないかなって……。"
61090-203 = "そ、それと……「外」の人たちの暮らし方とか……#n「生活」のことも……！"
61090-205 = "（ヒヨリの講義は、4人の中で一番好評だった）"
61090-209 = "（スクワッドのみんなが先生として活躍してくれたおかげか）"
61090-210 = "（アリウスの生徒たちから「授業」への警戒心が薄れていくのを感じた）"
61090-211 = "（まさに、この瞬間を待っていた！）"
61090-213 = "[ns11]\"――なので、こういう結論が導き出せます。\"\n[ns12]\"自明であるということは――\""
61090-219 = "（少なくない生徒たちが、しっかりと授業についてきてくれた）"
61090-225 = "（……もちろん、真逆の生徒もいたけれど）"
61090-226 = "（そのどちらもが「学園生活」なのだろうと思った）"
61090-228 = "[ns]\"今日の授業はここまで！お疲れさまでした！\""
61090-229 = "お疲れさまでした……。"
61090-230 = "うーん……頭痛い……。"
61090-231 = "でも、意外とやる価値あったかも？"
61090-232 = "ちょっとノート見せて。"
61090-233 = "さっき何やってたんだよ？"
61090-234 = "いや、ちょっとボーッとしてて……。"
61090-238 = "……。"
61090-240 = "とりあえず……ここは先生が自由に使ってくれ。"
61090-241 = "……すまない。こんな場所しか用意できなくて。"
61090-242 = "[s13]\"寝袋を持ってきたから大丈夫だよ。\"\n[s14]\"ほら。うん、悪くない。\""
61090-248 = "[ns]\"……サオリ？\""
61090-249 = "……先生。"
61090-250 = "ほんの少しでいい。"
61090-251 = "今日のことも含めて、相談したいことがあるんだが……いいだろうか。"
61090-253 = "次回;傷と痕跡"
