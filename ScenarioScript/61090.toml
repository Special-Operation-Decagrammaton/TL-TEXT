[translation]
61090-1 = "Episódio 9; Hora da aula"
61090-2 = "Ufa..."
61090-3 = "Uh, uhhh...!"
61090-8 = "Foi por pouco, mas..."
61090-9 = "Com isso, o resultado deve estar decidido."
61090-10 = "Esquadrão... vocês perderam um pouco o jeito?"
61090-11 = "Talvez seja verdade."
61090-12 = "Mas não tanto quanto vocês. #nSeus movimentos estão, no geral, sem brilho."
61090-13 = "……!"
61090-14 = "E então, o que pretende fazer?"
61090-15 = "Acho que já provamos nosso \"valor de existência\"."
61090-19 = "Bem, eu entendo que não tem jeito, mas..."
61090-20 = "Eles estão se achando demais...!"
61090-21 = "De qualquer forma, vocês ganharam muita experiência lá \"fora\", não foi? #nO resultado já estava na cara desde o início."
61090-22 = "Vocês abandonaram Arius, então parem de dar pitaco agora...!"
61090-23 = "Haa..."
61090-24 = "Acalme-se, Misaki."
61090-25 = "Isso é algo que nós devemos aceitar."
61090-26 = "Aquele adulto, o Sensei, também é assim. #nEgoísta, autoritário..."
61090-27 = "Dizem que é \"pelo bem de Arius\", mas com certeza estão pensando em outra coisa por trás, não é..."
61090-35 = "Ué!?"
61090-36 = "Ei, ei!? Você está bem!?"
61090-37 = "Ela desmaiou..."
61090-38 = "Sem nenhum movimento preparatório, um disparo duplo no peito seguido de um tiro na cabeça..."
61090-39 = "A Subaru-senpai disse que eles perderam o jeito, mas... não parece nada disso..."
61090-41 = "Atsuko!?"
61090-42 = "Hiiiiiiiii!?"
61090-43 = "Podem dizer o que quiserem sobre nós. #nMas, poderiam parar de falar mal do Sensei?"
61090-44 = "Acho que vocês têm o discernimento necessário para isso."
61090-45 = "Eu também ainda sou um membro de Arius, sabe?"
61090-46 = "S-sim!"
61090-47 = "……"
61090-49 = "(Todos estão encolhidos com uma expressão de medo)"
61090-50 = "(Para conseguir conversar em um clima um pouco mais leve...)"
61090-51 = "[ns]\"Muito bem, pessoal! Vamos estudar!\""
61090-52 = "Estudar... o que exatamente você quer que a gente faça!? #nNós não temos nada!"
61090-53 = "Não temos conhecimento, a sala de aula está em ruínas. #nNão temos ferramentas, nem mesmo alguém para ensinar..."
61090-54 = "...Falar sobre isso chega a ser triste."
61090-55 = "[s1]\"Está tudo bem.\"\n[s2]\"Desde que tenhamos cadeiras, mesas e um quadro-negro, daremos um jeito.\""
61090-60 = "[ns]\"Além disso, temos alguém para ensinar.\""
61090-64 = "...Você vai mesmo fazer isso aqui?"
61090-65 = "[s3]\"Temos mesas, e se levantarmos as cadeiras, não haverá problemas.\"\n[s4]\"Temos a mesa do professor e o quadro-negro! Não é uma sala de aula perfeita?\""
61090-68 = "Será que a definição da palavra \"perfeita\" mudou drasticamente enquanto eu não estava olhando...?"
61090-69 = "Mesmo que eu quisesse procurar o significado, quase não restaram dicionários em Arius..."
61090-70 = "De qualquer forma, já está tarde. #nLogo vai anoitecer..."
61090-71 = "[s5]\"A primeira aula será curta, então não se preocupe.\"\n[s6]\"Vamos fazer a chamada, dar uma orientação básica e terminar.\""
61090-74 = "Isso vai dar certo mesmo...?"
61090-75 = "[s]\"Vai dar. Eu acredito na Saori!\""
61090-76 = "!?"
61090-77 = "!?"
61090-78 = "Por que o meu nome apareceu nessa sequência...?"
61090-79 = "[s7]\"Porque as professoras estagiárias selecionadas!\"\n[s8]\"Vão dar a aula do primeiro período!\""
61090-82 = "Quando foi que essa seleção aconteceu?"
61090-83 = "Agora...? ...Ah, entendi."
61090-84 = "Não me diga que o \"grande plano\" que o Sensei mencionou era isso!?"
61090-85 = "Então o \"você está estudando direito?\" era para confirmar isso..."
61090-86 = "Poderiam ter combinado isso com antecedência, né... ah..."
61090-87 = "Então, eu... eu vou...?"
61090-88 = "[s]\"Por favor, nos ensine, Professora Saori!\""
61090-89 = "Sim, por favor, nos ensine. Professora Saori."
61090-90 = "Até a Atsuko...!?"
61090-92 = "(Saori subiu ao pódio, embora com uma expressão desconfortável)"
61090-94 = "(Como e o que eu deveria ensinar...)"
61090-95 = "(Hm? Isso é... um livro de estudos sociais? ...Sociedade e cultura, teoria do contrato social?)"
61090-99 = "(Dá para fazer... com isso, eu consigo!)"
61090-100 = "A aula vai começar! Sentem-se!"
61090-101 = "Ei, precisa mesmo sentar?"
61090-102 = "Ah, eu... já estou sentada..."
61090-103 = "Abram seus cadernos. Se não tiverem, a caderneta escolar serve!#nTodos devem ter uma dessas."
61090-104 = "Se nem isso tiverem, copiem do colega ao lado depois."
61090-105 = "A quantidade de conhecimento que fica na mente é completamente diferente entre apenas ouvir e colocar a mão na massa."
61090-106 = "S-sim!"
61090-107 = "Essa é exatamente a Saori-senpai da época em que era instrutora..."
61090-108 = "Antes de começarmos a aula, tenho uma coisa a dizer."
61090-112 = "Contratos! São extremamente importantes!!"
61090-113 = "Con-tratos...?"
61090-114 = "O que é isso... cultura do mundo exterior...?"
61090-115 = "Um contrato é um documento trocado com a outra parte para não esquecer as promessas feitas."
61090-116 = "Sem isso! Não importa o quanto você trabalhe! Você não receberá a recompensa!"
61090-117 = "É muito comum você se esforçar e acabar voltando de mãos vazias!!"
61090-118 = "Foi um grito vindo da alma..."
61090-119 = "Será que... é experiência própria...?"
61090-120 = "Dê o seu melhor, Sa-chan...!"
61090-121 = "Irmã Saori...!"
61090-123 = "...A sociedade é algo sem substância física.#nO ponto principal da \"teoria do contrato social\" é que ela é um mecanismo artificial formado pelo contrato entre seus membros."
61090-124 = "Ou seja, a sociedade não existe desde o início, e todos possuem direitos inerentes desde o nascimento."
61090-125 = "A-ah... posso fazer uma pergunta?"
61090-126 = "Diga."
61090-127 = "Você disse que ela não existe desde o início, então... os direitos de nascimento também não existem...?"
61090-128 = "Boa pergunta. De fato, pode parecer contraditório à primeira vista."
61090-129 = "Mas quero que pensem que existe a seguinte premissa."
61090-130 = "Que \"supor\" que os seres humanos possuem direitos desde o nascimento――"
61090-131 = "Aumenta a possibilidade de criar uma sociedade melhor."
61090-132 = "Mesmo que na realidade seja diferente, é melhor \"pensar que é assim\" para obter um resultado melhor...?"
61090-133 = "Nunca tinha pensado dessa forma...!"
61090-137 = "Está na hora. A aula de hoje termina aqui."
61090-138 = "Se tiverem perguntas, podem fazer na próxima aula."
61090-139 = "Preparar a matéria... talvez ainda seja difícil, mas certifiquem-se de revisar bem."
61090-140 = "O efeito de aprendizado é maior na revisão do que na preparação."
61090-144 = "Então... como será que foi...?"
61090-145 = "[s9]\"Foi incrível, Professora Saori......\"\n[s10]\"Fiquei muito emocionada, Professora Saori......\""
61090-148 = "Ainda não sou digna de ser chamada de \"professora\"..."
61090-149 = "De qualquer forma, fico feliz que tenha dado certo."
61090-151 = "[ns]\"Muito bem, a próxima é a professora de física, Misaki!\""
61090-152 = "……Eu? E física, ainda por cima…… Tá brincando, né?"
61090-153 = "Hã? Balística é próxima da mecânica clássica……?"
61090-154 = "……."
61090-155 = "Não que seja totalmente irrelevante, mas……"
61090-156 = "Ah…… tá bom, eu faço, satisfeita?"
61090-159 = "Primeiro, decorem as fórmulas. Nem adianta tentar pensar muito, né?"
61090-160 = "Não espero que entendam o conteúdo! Vocês não estão nesse nível ainda."
61090-161 = "Tanto matemática quanto física começam pela memorização, sabe?"
61090-162 = "Bom…… se vocês conseguirem entender desde o início, eu recomendo esse caminho."
61090-163 = "Mas, crianças desse tipo costumam tentar analisar as pessoas com números e estatísticas—"
61090-164 = "E acabam não entendendo os sentimentos alheios, causando confusões desnecessárias……"
61090-166 = "Olá. Eu sou Atsuko, e serei a professora de biologia."
61090-167 = "Vamos começar a aula imediatamente. #nA biologia é divertida e uma área muito importante."
61090-168 = "Por exemplo, o que é uma \"célula\"?"
61090-169 = "Como um hematoma se cura através de qual processo— vamos ver com um exemplo prático."
61090-170 = "[s]\"Atsuko! Para! Para!\""
61090-171 = "Por que parar? Esse é um assunto muito importante, sabe?"
61090-172 = "Fufu, não se preocupe. Eu sei medir o que estou fazendo."
61090-173 = "Então, vamos começar pelos \"glóbulos brancos e glóbulos vermelhos\"."
61090-175 = "Com isso, acho que expliquei o básico sobre os componentes e papéis das células."
61090-176 = "As células são a unidade fundamental de todos os seres vivos, então não se esqueçam disso."
61090-178 = "……."
61090-179 = "Ah, hum…… olá a todos. Ehehe…… faz tempo que não nos vemos……"
61090-180 = "Bem, então……"
61090-184 = "P-Professor!? O, o que eu devo fazer……?"
61090-185 = "Eu só costumo ler revistas…… não sei nada de forma profissional……"
61090-186 = "[ns]\"……!\""
61090-188 = "[ns] (Ao ouvir sobre revistas, tive uma ideia)"
61090-189 = "Hã? Falar sobre como é a vida no mundo exterior……?"
61090-190 = "Sobre as roupas que vi nas revistas…… ou sobre as comidas……?"
61090-191 = "……."
61090-192 = "Sim! Sobre isso…… eu acho que consigo falar……!"
61090-194 = "Ah, começando de novo…… olá……"
61090-195 = "Pode ser uma surpresa repentina, mas…… hum……"
61090-196 = "O que vocês acham de \"moda\"?"
61090-200 = "Ehehe…… é, né. É um assunto bem aleatório……"
61090-201 = "Mas a moda não é…… apenas vestir roupas…… #nEu acho que é sobre decidir por si mesma como você quer ser vista pelos outros……"
61090-202 = "Acho que esse tipo de coisa é…… surpreendentemente importante……"
61090-203 = "E, além disso…… sobre como as pessoas de \"fora\" vivem…… #ne sobre o \"cotidiano\" também……!"
61090-205 = "(A aula de Hiyori foi a mais bem recebida entre as quatro)"
61090-209 = "(Talvez graças ao fato de que todas do esquadrão se esforçaram como professoras)"
61090-210 = "(Senti que a cautela das alunas de Arius em relação às \"aulas\" estava diminuindo)"
61090-211 = "(Era exatamente esse momento que eu estava esperando!)"
61090-213 = "[ns11]\"――Portanto, podemos chegar a esta conclusão.\"\n[ns12]\"O fato de ser evidente significa que――\""
61090-219 = "(Muitas alunas acompanharam a aula com bastante atenção)"
61090-225 = "(……Claro, também houve alunas que pensaram o oposto)"
61090-226 = "(Pensei que ambos fossem parte da "vida escolar".)"
61090-228 = "[ns]\"A aula de hoje termina aqui! Bom trabalho a todos!\""
61090-229 = "Bom trabalho..."
61090-230 = "Hmm... minha cabeça dói..."
61090-231 = "Mas, surpreendentemente, talvez tenha valido a pena?"
61090-232 = "Deixa eu ver seu caderno um pouco."
61090-233 = "O que você estava fazendo agora há pouco?"
61090-234 = "Não, é que eu estava um pouco distraída..."
61090-238 = "..."
61090-240 = "Por enquanto... pode usar este lugar como quiser, Sensei."
61090-241 = "...Desculpe. É o único lugar que consegui preparar."
61090-242 = "[s13]\"Eu trouxe um saco de dormir, então está tudo bem.\"\n[s14]\"Veja só. É, não é nada mal.\""
61090-248 = "[ns]\"...Saori?\""
61090-249 = "...Sensei."
61090-250 = "Só um pouquinho."
61090-251 = "Tenho algo para discutir com você, incluindo o que aconteceu hoje... seria possível?"
61090-253 = "Próximo episódio: Feridas e Vestígios"
