[translation]
10033020-1 = "Episódio 2; Como uma montanha-russa"
10033020-4 = "Ainda não vamos partir?"
10033020-5 = "Nossa, que explicação prévia demorada."
10033020-6 = "De qualquer forma, a gente já deveria ter ido, né?#nAh, que sede."
10033020-7 = "Dá para não beber sem pedir, enquanto diz isso!?"
10033020-8 = "É só um golinho~."
10033020-9 = "Você sempre diz que é um golinho, mas acaba bebendo mais da metade!"
10033020-15 = "Que barulheira, embora seja o de sempre."
10033020-16 = "Ah, tem uma granada voando ali."
10033020-17 = "Até granada antitanque...#nEntão dá para usar isso no mesmo calibre do lança-granadas."
10033020-23 = "Nossa, o clima está ficando animado!"
10033020-24 = "Será que a viagem escolar vai começar de verdade...?"
10033020-25 = "Bem, a Hina e o Comitê Disciplinar vão dar um jeito, né."
10033020-26 = "Mas falando nisso, Hyakkiyako...#nComo será que é lá?"
10033020-27 = "É famosa pelo turismo, então deve ser um lugar legal, não?"
10033020-28 = "É verdade... Parece que outro discurso vai começar, acho que vou tirar uma soneca.#nMe acorde quando as coisas se acalmarem."
10033020-29 = "Então eu vou dormir também!"
10033020-34 = "Kikiki, que bom que se reuniram, meus colegas de Gehenna."
10033020-35 = "Vou elogiar a atitude louvável de vocês por terem vindo contemplar o rosto glorioso desta Makoto!"
10033020-36 = "Está vendo, Iroha!?#nIsto é o símbolo da minha glória!"
10033020-37 = "Faaa..."
10033020-38 = "Sim, sim, que bom, embora a maioria esteja cochilando.#nE a outra metade esteja causando confusão."
10033020-39 = "Como esperado da veterana!#nVou tirar uma foto para registrar!"
10033020-44 = "Ibuki também! Veterana Chiaki, a Ibuki também quer tirar uma foto~!"
10033020-45 = "Certo, então vamos tirar!#nIbuki-chan fica no meio, e a veterana Makoto na ponta!"
10033020-46 = "Chiaki, você diz isso com tanta naturalidade..."
10033020-47 = "Ora, ora, é por isso que ela é a veterana Makoto!"
10033020-48 = "Se for para a Ibuki sair bem na foto, não me importo nem um pouco!"
10033020-49 = "Bem, meus caros.#nCom o início da viagem escolar, tenho uma pergunta."
10033020-53 = "Estão prontos para celebrar os feitos desta Makoto!?"
10033020-54 = "Esta viagem escolar só existe graças ao Pandemonium Society...#ne graças a mim, Hanuma Makoto!"
10033020-55 = "Não há necessidade de idolatrar o Comitê Disciplinar.#nAfinal, eles só ficam fazendo reuniões chatas e escondidas com o Hyakkiyaran!"
10033020-56 = "Ah... isso vai demorar..."
10033020-77 = "...Em suma, é porque esta Makoto é grandiosa!"
10033020-78 = "Muito bem, tudo pronto!"
10033020-79 = "Vamos, Iroha!#nToque o sino bem alto para marcar nossa partida!"
10033020-85 = "Onde você quer que eu ache um sino...? Esquece, vamos logo."
10033020-86 = "Vamos, Ibuki, dê a mão."
10033020-87 = "Eba, partiu!"
10033020-92 = "Ah, Ibuki-chan."
10033020-93 = "Ibuki-chan, até mais! Estamos indo!"
10033020-95 = "Ué, a Ibuki também vai junto, sabia!?"
10033020-97 = "Ah, era isso. Desculpa."
10033020-98 = "Ahaha, então vai ser ainda mais divertido!"
10033020-99 = "O ônibus é ali, não é?"
10033020-104 = "Acho que sim!#nNossa... acho que coloquei bagagem demais!"
10033020-105 = "Por que não tira algumas coisas?#nHyakkiyako é um ponto turístico, deve ter de tudo por lá."
10033020-106 = "É verdade!#nCom certeza Hyakkiyako inteira estará nos esperando de braços abertos!"
10033020-111 = "E assim, chegou o dia da viagem escolar...!"
10033020-112 = "Hoje vou dar o meu melhor para todos...#nUé, cadê o cronograma!?"
10033020-117 = "[ns] \"Não é isso?\""
10033020-119 = "A-ah, muito obrigada!#nAgora, só falta os outros chegarem……."
10033020-120 = "[s1] \"Será que estão tendo dificuldade para se trocar?\"\n[s2] \"Estou ansioso para ver o traje que a Umika preparou.\""
10033020-123 = "Sim!#nEu preparei especialmente para este festival!"
10033020-124 = "[s] （……No fim das contas, a viagem escolar é um \"festival\" mesmo?）"
10033020-125 = "……?#nAconteceu alguma coisa?"
10033020-126 = "……E-eu não vou vestir, viu?#nNão é que eu não seja desse tipo, ou que eu não queira vestir, mas……."
10033020-127 = "Como esse papel sempre foi da presidente, eu acabo ficando um pouco envergonhada, por assim dizer……."
10033020-128 = "E-enfim!"
10033020-129 = "Eu mesma cuidei de tudo, desde as medidas até o design, então está perfeito…… ou deveria estar!#nFique na expectativa!"
10033020-130 = "[s] \"Com certeza.\""
10033020-131 = "Desculpem a demoraaa!!"
10033020-137 = "O que acharam desse visual?!"
10033020-138 = "[s] \"Incrível, esse clima diferente ficou ótimo em você!\""
10033020-139 = "Ehehe!#nEu, a humilde Fina, vou me esforçar como guia desta vez também!"
10033020-144 = "Ehehe, o que achou?#nNão pareço uma dama mais madura do que o normal!?"
10033020-145 = "[s] \"Imponente e madura! Perfeito!\""
10033020-146 = "Fufun!#nCom isso, eu também me torno uma dama madura e a melhor mordomo……!"
10033020-147 = "……Mordomo não tem nada a ver com isso?#nSerá? Mas sinto que esse tipo de posição é forte em qualquer anime……."
10033020-152 = "Uaaah…… De alguma forma, consegui me trocar sem dormir……."
10033020-153 = "[s] \"I-isso é um esforço e tanto……! Tsubaki, você também está linda!\""
10033020-154 = "Sonhar e fazer os outros sonharem, tudo isso faz parte do treinamento……."
10033020-156 = "[ns3] \"Entendi…… De qualquer forma, estamos prontos!\"\n[ns4] \"Então, Umika, com você!\""
10033020-163 = "Sim, então, vamos explicar novamente!"
10033020-164 = "Às 15h, o ônibus de Gehenna chegará!"
10033020-165 = "O desembarque deve levar cerca de 20 minutos, mas…… isso é apenas uma estimativa!"
10033020-166 = "Considerando o número de pessoas, é seguro prever que levará até por volta das 15h27!"
10033020-167 = "Então, por alto, começaremos a nos mover às 15h30!"
10033020-168 = "I-isso mesmo!#nA partir daí, vamos nos mover de riquixá!"
10033020-169 = "Bem, o número de pessoas que podem ir de riquixá de uma vez e o tempo estimado é……."
10033020-170 = "Por que você não pergunta diretamente para o responsável pelos riquixás?#nAcho que eles saberiam melhor!"
10033020-171 = "E-entendi!?#nMas, sem uma estimativa, não seria um incômodo para eles……!?"
10033020-172 = "[ns5] \"Calma, você consegue, todos estão com você.\"\n[ns6] \"Acredite em todos que confiam na Umika!\""
10033020-175 = "E-e-entendido……!?#nC-compreendido!"
10033020-179 = "Então, vou pular a parte do deslocamento. O primeiro lugar que vamos visitar é…… ah, ué?#nDiretora Tsubaki, parece que mudou em relação ao plano anterior……!?"
10033020-180 = "Faa…… é que o próximo lugar não ia dar tempo de chegar no horário de visita……."
10033020-181 = "E-era isso!?#nEntão, vou ajustar o cronograma e imprimir……!"
10033020-182 = "Já imprimi e enviei para eles também, então está tudo bem……."
10033020-183 = "Q-quando você fez isso!?"
10033020-184 = "Zzz, zzz……."
10033020-185 = "A Tsubaki-senpai é a diretora do Clube de Treinamento!#nQuando ela quer, ela faz acontecer!"
10033020-186 = "Entendi!#nO falcão talentoso esconde suas garras, é isso mesmo!"
10033020-188 = "A-ah, muito obrigada!#nE-então, a seguir……!"
10033020-193 = "Então vamos almoçar por aqui?"
10033020-194 = "Parece que sim. Ah, é um ekiben!"
10033020-195 = "Já estamos em Hyakkiyako, né?#nDá para esperar que seja gostoso."
10033020-196 = "Vejamos…… vegetais cozidos, salmão grelhado, omelete e onigiri.#nÉ bem a cara de um bento, muito bom!"
10033020-197 = "……Pensando bem, não estamos em uma \"estação\", então será que \"ekiben\" é o termo certo?"
10033020-198 = "Verdade, então vamos chamar de \"busben\"!"
10033020-204 = "……Explodiu de novo."
10033020-205 = "É por causa da disputa pela comida, né?"
10033020-206 = "Bem, contanto que o ônibus não seja destruído, acho que está tudo bem."
10033020-207 = "De qualquer forma, vamos comer!"
10033020-211 = "Está demorando, será que é porque isso é tão gostoso?"
10033020-212 = "A gente também vai participar?"
10033020-213 = "Hmm... eu passo, meu cabelo vai bagunçar."
10033020-214 = "Oh, um foguete antitanque voando por aí."
10033020-219 = "B-bem, como o tempo está acabando, vamos confirmar nossas áreas de responsabilidade e encerrar!"
10033020-220 = "Feena, hoje estou preparada para dar o meu sangue e suor!"
10033020-221 = "[s] \"Tente manter isso apenas como uma metáfora...?\""
10033020-224 = "Kaede, conto com você!#nAcho que muita gente vai chegar de uma vez depois, mas não se esforce demais, aja com elegância!"
10033020-225 = "Ok! Pode deixar comigo!"
10033020-226 = "[s] \"Como uma dama, eu confio em você!\""
10033020-229 = "Diretora Tsubaki, conto com você também!#nPor favor, tente ficar acordada!"
10033020-230 = "Sim... zzz..."
10033020-231 = "Diretora!?"
10033020-232 = "[s] \"E-ela com certeza vai acordar quando for importante!\""
10033020-234 = "(E assim, muitas alunas, carregando expectativas e entusiasmo...)"
10033020-240 = "(Embora algumas também pareçam estar carregando muitas preocupações...)"
10033020-253 = "(A viagem escolar da Academia Gehenna começa!)"
10033020-257 = "Então isso é Hyakkiyako..."
10033020-258 = "É algo tão... elegante!"
10033020-259 = "Que definição vaga..."
10033020-260 = "Mas você entende, não entende?"
10033020-262 = "Hii, hii, fuu... hii, hii, fuu..."
10033020-263 = "[s] \"Umika, respire fundo.\""
10033020-264 = "Suuu... haaa... pronto!"
10033020-269 = "O-olá, alunas da Academia Gehenna!#nBem-vindas a Hyakkiyako!"
10033020-270 = "Bem-vindas!"
10033020-277 = "Uma guia, faz sentido, é uma viagem escolar, afinal."
10033020-278 = "O que é aquilo, que fofo!!"
10033020-280 = "F-fofo...?"
10033020-281 = "Ieei!#nMuito obrigada!"
10033020-283 = "Ei, olha, é o Sensei!#nSensei!"
10033020-284 = "Quem diria que encontraríamos você durante a viagem, é destino!"
10033020-285 = "[s] \"Kirara, Erika!\""
10033020-287 = "Por acaso você vai passear com a gente também?#nParece divertido!"
10033020-288 = "Faz tempo, né...#nPrimeiro, que tal um aperto de mão?"
10033020-289 = "[s] \"Estou feliz por podermos nos encontrar assim.\""
10033020-290 = "Ah, deve ser porque estive lá fora por um tempo.#nAs mãos do Sensei são quentinhas, né?"
10033020-291 = "Como você deve imaginar, acho que teremos uma ou duas confusões. Conto com vocês."
10033020-292 = "Bem, se é o Sensei, você vai dar um jeito, né!"
10033020-293 = "[s] \"Como responsável, farei tudo o que estiver ao meu alcance.\""
10033020-294 = "Quando a viagem escolar acabar, você vai continuar nos vendo, né?"
10033020-295 = "Já está falando sobre o que vai acontecer depois...?"
10033020-296 = "Ué, a Erika-chan também quer conversar com o Sensei, não quer?"
10033020-297 = "Bem, isso é verdade, mas..."
10033020-298 = "Então decidido!#nDepois vamos trocar contatos, Sensei!"
10033020-300 = "Onde está minha bolsa?"
10033020-301 = "Será que, por acaso, é essa em que estou sentada?"
10033020-302 = "Ah! Isso mesmo! Quer saber, levanta logo esse bumbum. #nPor que você continua sentada a essa altura do campeonato!?"
10033020-304 = "B-bem, pessoal! #nSobre o cronograma daqui para frente..."
10033020-306 = "Mas é que... o chão suja e meu bumbum dói..."
10033020-307 = "Use o seu próprio, então!"
10033020-308 = "Nããão! Eu quero o seu!"
10033020-309 = "E-ei, vamos falar sobre o cronograma..."
10033020-311 = "Do que você está falando!? #nSe não vai se mexer, vou te jogar para longe à força!"
10033020-312 = "Pode tentar! #nEu vou levar isso comigo até o fim do mundo!"
10033020-313 = "(C-calma, eu... não posso cometer erros, nada de imprevistos... respira fundo...!)"
10033020-314 = "E-esta 'Academia Hyakkiyako' é um distrito escolar autônomo que se desenvolveu com foco no turismo!"
10033020-315 = "Na primavera temos a observação das flores, no verão os fogos de artifício, além das folhas de outono e águas termais... festivais focados em cada estação são realizados!"
10033020-316 = "Para que todos que nos visitam fiquem plenamente satisfeitos..."
10033020-317 = "Não somos controlados por uma única organização; #ntodos os clubes e comitês são independentes e dão o seu melhor todos os dias!"
10033020-318 = "Por causa dessa estrutura, houve uma época em que o equilíbrio de poder era instável, mas agora... nya-nyu...!"
10033020-319 = "(!?)"
10033020-321 = "...Como é que é?"
10033020-322 = "Guia-chan, força!"
10033020-324 = "Sim! De qualquer forma, alunas da Academia Gehenna!"
10033020-325 = "Espero que esta viagem de estudos se torne uma memória inesquecível para vocês!"
10033020-326 = "Divirtam-se ao máximo! #nÉ só isso!"
10033020-327 = "[ns] \"Certo, vamos seguir em frente!\""
10033020-328 = "S-sim...!"
10033020-332 = "Então, vamos começar com a famosa 'Excursão de Jinrikisha' de Hyakkiyako!"
10033020-336 = "Sim, sim! Subam logo! #nVamos guiá-los rápido como o vento, mas com toda segurança!"
10033020-338 = "Uau, então isso é um jinrikisha..."
10033020-339 = "Parece divertido! Eu vou nesse aqui!"
10033020-344 = "Cuidado para não cair, hein! #nEntão, partiu!"
10033020-350 = "O-obrigada por me cobrir, Feena... #nEu acabei ficando sobrecarregada..."
10033020-351 = "De nada, nessas horas a gente se ajuda!"
10033020-352 = "[s] \"É verdade. Tente relaxar um pouco os ombros.\""
10033020-353 = "Além disso, para mim também foi divertido liderar pela primeira vez!"
10033020-354 = "[ns] \"Sim. Então, vamos nós também?\""
10033020-355 = "Opa, vi pelo seu olhar que quer subir aqui!"
10033020-356 = "Isso! Três pessoas, por favor!"
10033020-357 = "Entendido! Então, fiquem sentadinhos aí... #nvamos com tudo!"
