[translation]
10033020-1 = "第2話;Like a roller coaster"
10033020-4 = "出発まだ～？"
10033020-5 = "いや事前説明なっが。"
10033020-6 = "とにかく行っちゃえば良いのにね。#nあー喉乾いた。"
10033020-7 = "って言いながら勝手に飲まないでくれない！？"
10033020-8 = "一口だけだから～。"
10033020-9 = "あんた、一口って言っていつも半分以上飲むじゃん！"
10033020-15 = "騒がしいね、いつも通りだけど。"
10033020-16 = "あ、グレネード弾飛んでる。"
10033020-17 = "対戦車榴弾まで……#nあれって、グレネードランチャーと同じ規格で使えるんだ。"
10033020-23 = "いやー盛り上がってきたね！"
10033020-24 = "修学旅行、ちゃんと始まるのかな……。"
10033020-25 = "まぁヒナっちとか風紀委員が何とかしてくれるっしょ。"
10033020-26 = "それにしても、百鬼夜行か……#nどんなとこなんだろうね。"
10033020-27 = "観光で有名なんだし、まぁ良いとこなんじゃない？"
10033020-28 = "そうだね……何かまた演説が始まりそうだし、ひと眠りしようかな。#n落ち着いたら起こして。"
10033020-29 = "ならあたしも一緒に寝るー！"
10033020-34 = "キキキッ、よくぞ集まってくれたな。ゲヘナの学友ども。"
10033020-35 = "このマコト様の尊顔を拝みに来たこと、#n殊勝だと誉めてやろうではないか！"
10033020-36 = "見ているか、イロハ！#nこれぞ私の、栄華の象徴だ！"
10033020-37 = "ふぁぁ……。"
10033020-38 = "はいはい、良かったですね、過半数が居眠りしてますけど。#nもう半分は暴れてますけど。"
10033020-39 = "さっすが先輩！#n記念に一枚撮っておきましょう！"
10033020-44 = "イブキも！チアキ先輩、イブキも写真撮る～！"
10033020-45 = "うん、じゃあ撮ろっか！#nイブキちゃんは真ん中ね、マコト先輩は端っこ！"
10033020-46 = "チアキ、堂々と言いますね……。"
10033020-47 = "まぁまぁ、それでこそマコト先輩でしょ！"
10033020-48 = "イブキが映えるなら、一向に構わん！"
10033020-49 = "さぁ、諸君。#n修学旅行の開始に伴って、ひとつ問おう。"
10033020-53 = "このマコト様の功績を称える準備は完璧か！？"
10033020-54 = "この修学旅行が生まれたのも、全て[ruby=パンデモニウムソサエティー]は万魔殿…[/ruby]…#nそして[ruby=はぬま]羽沼[/ruby]マコト様がいたからこそ！"
10033020-55 = "風紀委員会などを崇めることは無い。#n何せあやつらは所詮、百花繚乱とコソコソ面倒な会合をしているだけ！"
10033020-56 = "あー……これ長くなりますね……。"
10033020-77 = "……つまるところ、このマコト様が偉大だから、というわけだ！"
10033020-78 = "さぁ、準備は整った！"
10033020-79 = "行くぞイロハ！#n出発の号令として、派手に鐘を鳴らすのだ！"
10033020-85 = "どこに鐘があるんですか……良いから行きますよ。"
10033020-86 = "さぁイブキ、手を。"
10033020-87 = "わーい、しゅっぱーつ！"
10033020-92 = "あ、イブキちゃん。"
10033020-93 = "イブキちゃん、じゃあねー！行ってくるね～！"
10033020-95 = "え、イブキも一緒に行くんだよー！？"
10033020-97 = "あ、そうだったんだ。ごめんね。"
10033020-98 = "あははっ、じゃあもっともっと楽しくなりそう！"
10033020-99 = "バス、向こうの方だっけ？"
10033020-104 = "多分そのはず！#nんしょっ……あー、荷物入れ過ぎたかも！"
10033020-105 = "少し減らしていったら？#n百鬼夜行は観光地なんだし、向こうでも色々揃ってるでしょ。"
10033020-106 = "確かに！#n百鬼夜行全体が、きっと準備万端で待っててくれてるよね！"
10033020-111 = "というわけで、修学旅行当日となってしまいました……！"
10033020-112 = "今日は全力で皆さんを……#nってあれ、スケジュール表が無い！？"
10033020-117 = "[ns] \"これじゃない？\""
10033020-119 = "あ、ありがとうございます！#nあとは、他の皆さんが来れば……。"
10033020-120 = "[s1] \"着替えに手間取ってるのかな？\"\n[s2] \"ウミカが用意してくれた衣装、楽しみだな。\""
10033020-123 = "はい！#nこのお祭りのために、特別に誂えたものです！"
10033020-124 = "[s] （……結局、修学旅行は「お祭り」なのかな）"
10033020-125 = "……？#nどうかされましたか？"
10033020-126 = "……わ、私は着ませんよ？#nそういうタイプでもないですし、着たくないわけではありませんが……。"
10033020-127 = "いつもそういう役目は社長だったので、どうも照れてしまうと言いますか……。"
10033020-128 = "と、とにかく！"
10033020-129 = "採寸からデザインまでこの手で行いましたので、完璧……なはずです！#n楽しみにしててください！"
10033020-130 = "[s] \"それはもう。\""
10033020-131 = "おっ待たせ―！！"
10033020-137 = "どうデスか、この格好！"
10033020-138 = "[s] \"すごい、いつもと違う雰囲気で良いね！\""
10033020-139 = "えへへっ！#n不肖フィーナ、今回はガイドも頑張りマス！"
10033020-144 = "えへへっ、どうかな？#n私、いつも以上の大人なレディーって感じじゃない！？"
10033020-145 = "[s] \"凛々しくて大人っぽい！最高！\""
10033020-146 = "ふふんっ！#nこれで私も、大人なレディーにして最強のバトラーに……！"
10033020-147 = "……バトラーは関係ない？#nそうかな、こういうポジションってどのアニメでも強い気もするけど……。"
10033020-152 = "ふあぁ……何とか、寝ないで着替えられた……。"
10033020-153 = "[s] \"そ、それはお疲れ様……！ツバキも綺麗だね！\""
10033020-154 = "夢を見るのも、夢を見せるのも、全部修行だから……。"
10033020-156 = "[ns3] \"なるほど……とにかく、準備完了だね！\"\n[ns4] \"じゃあウミカ、よろしく！\""
10033020-163 = "はい、ではあらためて説明を！"
10033020-164 = "この後15時に、ゲヘナのバスが到着します！"
10033020-165 = "20分ほどで下車が完了する予定ですが……これはあくまで目安！"
10033020-166 = "恐らく人数からして、15時27分頃までかかると見て良いでしょう！"
10033020-167 = "ではざっくり、15時30分に移動開始になりそうデスね！"
10033020-168 = "そ、そうですね！#nそこからは、人力車で移動します！"
10033020-169 = "えぇっと、人力車で一度に移動できる人数と、所要時間の目安は……。"
10033020-170 = "それなら、人力車担当に直接聞いてみるのはどう？#nあっちの方が詳しいと思うし！"
10033020-171 = "な、なるほど！？#nですが、見積もりも無しでは迷惑になってしまうような……！？"
10033020-172 = "[ns5] \"落ち着いて、みんなならできるよ。\"\n[ns6] \"ウミカを信じてくれる、みんなを信じて！\""
10033020-175 = "え、えぇっと……！？#nしょ、承知しました！"
10033020-179 = "では、移動の件は省略。最初に見学する場所は……あ、あれ？#nツバキ部長、以前の予定と変わっているような……！？"
10033020-180 = "ふぁ……その次の場所が、受け入れ時間に間に合わなそうだったから……。"
10033020-181 = "そ、そうでしたか！#nでは、スケジュールの調整と印刷を……！"
10033020-182 = "印刷して、向こうにも送ったから大丈夫～……。"
10033020-183 = "い、いつの間に！？"
10033020-184 = "すぅ、すぅ……。"
10033020-185 = "ツバキ先輩は修行部の部長だもん！#nやる時はやるんだから！"
10033020-186 = "ナルホド！#n能ある鷹は爪を隠す、とはこのことデスね！"
10033020-188 = "あ、ありがとうございます！#nで、では次に……！"
10033020-193 = "ここで一旦お昼って感じ？"
10033020-194 = "だね。あ、駅弁だ！"
10033020-195 = "ここってもう百鬼夜行だよね？#n味も期待できそう。"
10033020-196 = "どれどれ～……煮物に焼き鮭、卵焼きにおにぎり。#nザ・お弁当って感じで良いね！"
10033020-197 = "……よく考えると、「駅」じゃないのに「駅弁」で良いのかな。"
10033020-198 = "確かに、じゃあ「バス弁」で！"
10033020-204 = "……また爆発してる。"
10033020-205 = "どうせおかずの取り合いでしょー？"
10033020-206 = "まあ、バスが大破しなければ良いかな。"
10033020-207 = "とにかく食べよー！"
10033020-211 = "長引いてるね、やっぱこれ美味しいからかな？"
10033020-212 = "あたしたちも参加する？"
10033020-213 = "んー……私はパス、髪の毛崩れちゃうし。"
10033020-214 = "おー、対戦車ロケット飛んでる。"
10033020-219 = "で、では時間も迫ってきたので、担当区域を確認しつつ解散にします！"
10033020-220 = "フィーナ、今日は粉骨砕身の覚悟で参りマス！"
10033020-221 = "[s] \"比喩に留めておいてね……？\""
10033020-224 = "カエデ、よろしくお願いします！#n後で一気に人が来ると思いますが、無理せず、でもスマートに！"
10033020-225 = "オッケー！まっかせて！"
10033020-226 = "[s] \"レディーとして、信じてるからね！\""
10033020-229 = "ツバキ部長も、お願いしますね！#n起きててくださいね！"
10033020-230 = "うん……ぐぅ……。"
10033020-231 = "部長ぉ！？"
10033020-232 = "[s] \"だ、大事な時には絶対起きてくれるから！\""
10033020-234 = "（そうして数多の生徒が、期待と興奮を抱きながら……）"
10033020-240 = "（一部では不安も沢山抱えてるみたいだけど……）"
10033020-253 = "（ゲヘナ学園の、修学旅行が幕を開ける！）"
10033020-257 = "これが百鬼夜行かぁ……。"
10033020-258 = "何かこう……雅だね！"
10033020-259 = "ざっくりだなぁ……。"
10033020-260 = "でも分かるでしょ？"
10033020-262 = "ひぃ、ひぃ、ふぅ……ひぃ、ひぃ、ふぅ……。"
10033020-263 = "[s] \"ウミカ、大きく息を吸って。\""
10033020-264 = "すぅー……はぁ……よし！"
10033020-269 = "こ、こんにちは、ゲヘナ学園の皆さん！#n百鬼夜行へようこそ！"
10033020-270 = "ヨウコソー！"
10033020-277 = "ガイドさんか、そりゃ修学旅行なんだし居るよね。"
10033020-278 = "何あれ、可愛いー！！"
10033020-280 = "か、かわ……？"
10033020-281 = "イェーイ！#nありがとうございマース！"
10033020-283 = "ってあれ、先生じゃん！#nせーんせー！"
10033020-284 = "まさか旅行中に会えるなんて、運命じゃん！"
10033020-285 = "[s] \"キララ、エリカ！\""
10033020-287 = "もしかして、先生も一緒に回ってくれるの？#n楽しそう！"
10033020-288 = "久しぶりだね……#nとりあえず、握手でもしておく？"
10033020-289 = "[s] \"こうして会えて嬉しいよ。\""
10033020-290 = "あはっ、しばらく外にいたからかな。#n先生の手、あったかいね？"
10033020-291 = "お察しの通り、ひと騒ぎもふた騒ぎもあると思うけど。よろしく。"
10033020-292 = "ま、先生なら何とかしてくれるでしょ！"
10033020-293 = "[s] \"引率として、やれるだけのことをするよ。\""
10033020-294 = "修学旅行が終わったら、それはそれでまた会ってくれるよね？"
10033020-295 = "今から終わった後の話……？"
10033020-296 = "だってー、エリカちゃんも先生とお話したいでしょ？"
10033020-297 = "まぁ、それはそうだけど……。"
10033020-298 = "じゃあ決定！#nあとで連絡先交換しよーね、先生！"
10033020-300 = "私のバッグどこー？"
10033020-301 = "もしかしてだけど、あたしが座ってるこれ？"
10033020-302 = "あー！それそれ！っていうか早くお尻上げてよ。#nなんでこの期に及んで座り続けるの！？"
10033020-304 = "で、では皆さん！#n今後のスケジュールについてですが――"
10033020-306 = "だってぇ、地面は汚れるしお尻痛いし……。"
10033020-307 = "自分のを使えば良いでしょ！"
10033020-308 = "いーやーだー！あんたのが良いの！"
10033020-309 = "え、えっと、スケジュールのお話を……"
10033020-311 = "何言ってんの！？#n動かないなら無理やり吹っ飛ばすよ！？"
10033020-312 = "それでも良いもん！#n世界の終わりまで持っていってやる！"
10033020-313 = "（お、落ち着いて、私……ミスは許されない、ハプニングも絶対ダメ……ここは深呼吸して……！）"
10033020-314 = "こ、この「百鬼夜行連合学院」は、#n観光業を中心として発達した学園自治区ですっ！"
10033020-315 = "春は花見、夏は花火、紅葉や温泉など、#n季節によって異なるものを主軸としたお祭りが開かれます……！"
10033020-316 = "お越しいただく方に、しっかり満足していただけるよう……。"
10033020-317 = "一つの組織が束ねるのではなく、#nすべての部活と委員会がそれぞれに独立し、日々全力で取り組んでいます！"
10033020-318 = "そういった成り立ちなので、一時期はパワーバランスが怪しい時期もありましたが、#n今ではにゃにゅっ……！"
10033020-319 = "（！？）"
10033020-321 = "……なんて？"
10033020-322 = "ガイドちゃん、頑張ってー！"
10033020-324 = "ハイっ！とにかくゲヘナ学園の生徒の皆サン！"
10033020-325 = "とにかく今回の修学旅行が、忘れられない思い出となりマスように！"
10033020-326 = "全力で楽しんでクダサイ！#n以上デスっ！"
10033020-327 = "[ns] \"よし、とにかく次に進めよう！\""
10033020-328 = "はっ、はいっ……！"
10033020-332 = "ではまず百鬼夜行の名物「人力車ツアー」から始めます！"
10033020-336 = "はいはーい！早く乗っちゃってください！#n風のように速く、でも安全にご案内しますよー！"
10033020-338 = "へえ、これが人力車……。"
10033020-339 = "面白そー！私こっち側！"
10033020-344 = "落ちないように気をつけてくださいねー！#nでは、出発～！"
10033020-350 = "か、カバーありがとうございます、フィーナ……#nいっぱいいっぱいになってしまい……。"
10033020-351 = "イエイエ、こういう時はお互い様デス！"
10033020-352 = "[s] \"そうだね。肩の力、少しずつ抜いていこう。\""
10033020-353 = "それにワタシにとっても、初の音頭で楽しかったデス！"
10033020-354 = "[ns] \"うん。じゃあ私たちも行こうか？\""
10033020-355 = "おっと、その目はこちらに乗りたいと見えた！"
10033020-356 = "イエス！3人お願いしマス！"
10033020-357 = "合点招致！それでは、おとなしく乗っててくださいねー……#n張り切って行きましょう！"
