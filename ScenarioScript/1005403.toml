1005403-103 = "De agora em diante, seria melhor se nada acontecesse..."

1005403-104 = "Se houver algo que eu possa fazer para ajudar, sinta-se à vontade para me ligar a qualquer momento. #nEu também quero ajudar os professores."

1005403-105 = "Ou você está me incomodando...?"

1005403-106 = "[s9] \"Não, nada disso. Estou ansioso por isso.\"\n[s10] Cortei meu dedo com Marie."

1005403-109 = "...!"

