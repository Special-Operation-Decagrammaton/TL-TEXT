1005403-78 = "...Mas é exatamente como a professora disse. #nLamentamos por causar preocupação."

1005403-79 = "Da próxima vez, tentarei não me esforçar muito e confiar nos membros do comitê executivo e nos professores."

1005403-80 = "...Eh?"

1005403-81 = "Você está se divertindo?"

