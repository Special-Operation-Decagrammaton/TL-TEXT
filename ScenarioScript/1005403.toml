1005403-83 = "Para ser sincero, no início fiquei muito ansioso, mas..."

1005403-84 = "Assim que a competição começou, tudo isso foi embora!"

1005403-85 = "Mesmo depois do grande dia desportivo, procuro encontrar tempo para fazer exercício."

1005403-86 = "……um."

1005403-87 = "E-eu sei que agora é tarde... mas você ainda não participou da competição, certo?"

1005403-88 = "Obrigado por sempre cuidar de nossos alunos..."

1005403-89 = "Hum... me desculpe. Só nós nos divertindo...."

1005403-90 = "[s7] \"Estou feliz que Marie parece estar gostando.\"\n[s8] \"Está tudo bem, estou me divertindo também.\""

1005403-91 = "professor……."

