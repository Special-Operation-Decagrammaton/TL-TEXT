1005403-70 = "Obrigado, senhor. #nObrigado por tornar isso mais fácil."

1005403-71 = "Como isso aconteceu...? #nBem, não foi como se nada de especial tivesse acontecido..."

1005403-72 = "Bom... tem alguém que precisa de ajuda entre as competições, então por favor ajude..."

1005403-73 = "[s5] \"Fazer suas próprias coisas e ao mesmo tempo ajudar os outros!?\"\n[s6] \"Não exagere. Estou preocupado com Marie.\""

1005403-76 = "Desculpe... estou muito curioso..."

