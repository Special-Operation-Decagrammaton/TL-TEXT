[translation]
10012095-2 = "Hoje aconteceram tantas coisas, não é?☆"
10012095-3 = "Eu fiquei tão feliz por ter ganhado o primeiro prêmio, mas só aconteceu confusão... Já chega, não aguento mais..."
10012095-5 = "Serika, não existe almoço grátis."
10012095-6 = "Falou a Senpai Shiroko, que estava toda animada preparando o traje de banho, né!?"
10012095-7 = "Uma coisa é uma coisa, outra coisa é outra coisa."
10012095-9 = "Mas bem, pelo menos conseguimos dar um jeito de voltar, que bom, que bom."
10012095-10 = "Sensei, mesmo tendo reservado seu tempo para vir até aqui, acabou acontecendo tudo isso..."
10012095-11 = "Uhe~ Depois que chegamos aqui também aconteceu de tudo, o Sensei nem conseguiu descansar direito, né?"
10012095-12 = "[s] \"Não, eu estou bem.\""
10012095-13 = "Você está... bem mesmo?"
10012095-14 = "[s1] \"Porque passamos momentos divertidos juntos.\"\n[s2] \"Foi um bom descanso.\""
10012095-17 = "Fufu... Fico feliz em ouvir isso☆"
10012095-18 = "[s] \"Pessoal, vocês se divertiram neste verão?\""
10012095-19 = "...P-por que a pergunta de repente!?"
10012095-20 = "A Serika-chan está ficando envergonhada~ Que fofa~"
10012095-21 = "Ugh! A-até a Senpai Hoshino!"
10012095-22 = "...Hum. Se é para dizer, obviamente..."
10012095-24 = "Sim~! Foi muiiiito divertido☆"
10012095-25 = "Apesar de tudo o que aconteceu... eu pude passar esse tempo com vocês e com o Sensei."
10012095-27 = "Hum. E você, Serika?"
10012095-29 = "E-eu!? B-bem, é que...!"
10012095-30 = "É, claro, f-f-foi diverti..."
10012095-31 = "[s] \"Bom, então eu já vou indo.\""
10012095-32 = "Entendi... Que pena, mas o Sensei é uma pessoa ocupada, né."
10012095-33 = "Nesse caso, precisamos nos apressar... senão não vamos conseguir te levar de helicóptero."
10012095-35 = "Nós ainda temos que arrumar as coisas, então pretendemos ficar até amanhã."
10012095-36 = "Ei, eu ainda não terminei de responder!"
10012095-37 = "Serika-chan, você pode terminar de contar isso com calma depois que a gente voltar, sabe?"
10012095-38 = "Ah, chega! Então acabou aqui!"
10012095-39 = "Acabou, pronto!"
10012095-41 = "[ns] \"Certo, então eu vou indo na frente.\""
10012095-42 = "Sim! Então, vou levar o Sensei até o Schale!"
10012095-43 = "Vá com cuidado~"
10012095-46 = "...Sensei, foi pouco tempo, mas conseguiu recarregar as energias?"
10012095-47 = "Foi o suficiente. Acho que recarreguei a bateria totalmente."
10012095-48 = "Espero que sim~"
10012095-49 = "Muito bem. Nós vamos voltar para o resort e arrumar as malas~"
10012095-50 = "Ah... quando eu chegar, tenho que pegar um turno no trabalho logo. As férias já estão acabando..."
10012095-54 = "Ah, o \"Vale do Resort\"..."
10012095-55 = "Ué? Nonomi-senpai, você não precisa mais disso, precisa?"
10012095-56 = "Fufu, pensei em levar de lembrança~"
10012095-57 = "Pronto."
10012095-59 = "...Ué?"
10012095-60 = "Nonomi-chan, o que foi?"
10012095-61 = "Bem... aqui, bem na bordinha... encontrei o nome do beneficiário final do \"Direito de Uso do Resort\"."
10012095-62 = "Hã, beneficiário final!?"
10012095-63 = "Você não tinha visto antes?"
10012095-64 = "Se é o beneficiário final, então é... o mentor por trás de toda essa confusão?"
10012095-65 = "A pessoa que espalhou esses \"Vales do Resort\" cheios de falhas para causar a \"Caça ao Resort\", não é?"
10012095-66 = "Quem será que é!?"
10012095-67 = "Ei, deixa eu ver isso~"
10012095-68 = "Sim, aqui está. Senpai Hoshino."
10012095-69 = "Hmm, hmm. Paraíso Assado~ Resumo de investimento e operação de resort..."
10012095-70 = "Hum."
10012095-73 = "……Hm?"
10012095-74 = "Comitê de Contramedidas de Recuperação do Resort de Abydos"
