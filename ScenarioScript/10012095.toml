[translation]
10012095-2 = "今日は本当にいろんな事がありましたね～☆"
10012095-3 = "せっかく一等が当たったって喜んでたのに、めちゃくちゃな事ばっか……もう嫌……。"
10012095-5 = "セリカ、タダより高い物はないよ。"
10012095-6 = "そういうシロコ先輩だって、喜んで水着を用意してたじゃん！？"
10012095-7 = "それはそれ、これはこれ。"
10012095-9 = "でもまぁ、なんとか帰れそうでよかった、よかった。"
10012095-10 = "先生も、わざわざ時間を割いていただいたのに、こんな事になってしまって……。"
10012095-11 = "うへ～ここ来てからも色々あったし、先生あんま休めなかったんじゃない？"
10012095-12 = "[s] \"ううん、私は大丈夫。\""
10012095-13 = "大丈夫……ですか？"
10012095-14 = "[s1] \"みんなで楽しく過ごせたから。\"\n[s2] \"いいバカンスだったよ。\""
10012095-17 = "ふふっ……それなら良かったです☆"
10012095-18 = "[s] \"みんなはこの夏、楽しかった？\""
10012095-19 = "……き、急に何よ！？"
10012095-20 = "セリカちゃん恥ずかしがってる～可愛いね～"
10012095-21 = "うっ！ ほ、ホシノ先輩まで！"
10012095-22 = "……ん。あえて言うなら当然――"
10012095-24 = "はい～！ と～っても楽しかったですよ☆"
10012095-25 = "いろいろあったけど……みんなと、先生と一緒に過ごせましたから。"
10012095-27 = "ん。セリカは、どう？"
10012095-29 = "わ、私！？そ、そりゃあ……！"
10012095-30 = "と、当然、た、た、楽しかっ……。"
10012095-31 = "[s] \"うん、じゃあ私はそろそろ帰るね。\""
10012095-32 = "そっか……残念だけど、先生忙しいもんね。"
10012095-33 = "それでしたら早めに動かないと……ヘリでお送りできなくなっちゃいます。"
10012095-35 = "私たちは片付けがあるから、明日まで残る予定。"
10012095-36 = "ねぇ、私の返事まだ終わってないんだけど！？"
10012095-37 = "セリカちゃん、その続きは今度、帰ってからゆっ～くり伝えてもいいんですよ？"
10012095-38 = "ああもう！じゃあこれで終わり！"
10012095-39 = "終わりだから！"
10012095-41 = "[ns] \"うん、じゃあ先に帰るね。\""
10012095-42 = "はい！それでは、先生をシャーレまで送ってきますね！"
10012095-43 = "いってらっしゃ～い。"
10012095-46 = "……先生、短い間でしたが、リフレッシュできたでしょうか？"
10012095-47 = "十分だよ。元気もフル充電できたんじゃないかな。"
10012095-48 = "だといいですね～"
10012095-49 = "さてと。おじさんたちは、リゾートに戻って荷物をまとめますか～"
10012095-50 = "はぁ……帰ったら早くバイト入らなきゃ。お休みもあとちょっとだし……。"
10012095-54 = "あっ「リゾート使用券」が……。"
10012095-55 = "あれ？ノノミ先輩、もうそれは必要ないんじゃない？"
10012095-56 = "ふふっ、記念に持って帰ろうかな～と思いまして。"
10012095-57 = "よいしょ。"
10012095-59 = "……あら？"
10012095-60 = "ノノミちゃん、どうしたの？"
10012095-61 = "えっと……この、ちょうど端っこの方に……「リゾート使用権」の最終権利者の名前を見つけまして。"
10012095-62 = "えっ、最終権利者！？"
10012095-63 = "さっき、見落としてたの？"
10012095-64 = "最終権利者ってことは……今回の騒動を起こした主犯？"
10012095-65 = "「リゾート狩り」が起こるように、穴だらけの「リゾート使用券」をばらまいた張本人ってことよね？"
10012095-66 = "一体誰なの！？"
10012095-67 = "ちょっとそれ、見せて～"
10012095-68 = "はい、どうぞ。ホシノ先輩。"
10012095-69 = "ふむふむ。ローストパラダイース～リゾート投資及び運営総括……"
10012095-70 = "ええと。"
10012095-73 = "……うん？"
10012095-74 = "アビドスリゾート復旧対策委員会"
