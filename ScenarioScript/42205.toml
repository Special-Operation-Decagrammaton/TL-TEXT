[translation]
42205-5 = "Uryaaaaaa——!!"
42205-11 = "FOX3, sua kouhai acabou de sair correndo, viu?"
42205-12 = "Atacar sabendo que tem um atirador por perto... que energia contagiante, não é?"
42205-14 = "……Aquela idiota, o que ela está pensando?"
42205-15 = "Atirar?"
42205-16 = "Não, espere. Você disse que eles poderiam ter tomado medidas contra franco-atiradores, lembra?"
42205-17 = "Além disso... um ponto de frente deve ser enfrentado por outro ponto de frente."
42205-18 = "FOX4, eu cuido disso aqui. Por favor, dê suporte na retaguarda."
42205-20 = "Entendido."
42205-32 = "Nos encontramos de novo, 'senpai'."
42205-34 = "……Eu já disse várias vezes para entrar no território inimigo escondida, sem ser notada."
42205-35 = "Haa... parece que você precisa de um treinamento extra!"
42205-44 = "Em uma situação onde o caminho é limitado e você entra no campo de visão do inimigo, ações furtivas não fazem sentido e..."
42205-45 = "A pistola calibre .45 que você usa não consegue perfurar meu equipamento à prova de balas."
42205-47 = "É verdade. Foi uma boa decisão encurtar a distância, mesmo estando preparada para levar alguns tiros."
42205-48 = "Mas, agora eu não sou o martelo, eu sou a bigorna."
42205-49 = "Cuidado com a nuca para não ser atingida por um tiro!"
42205-76 = "……CQC, você melhorou bastante."
42205-77 = "Entrar na guarda e usar a coronha em vez da arma secundária... você não é nada mal."
42205-78 = "Foi o que a senpai me ensinou."
42205-79 = "Você nunca esquece o que te ensinaram, né? Como esperado da aluna exemplar com nota máxima nas provas."
42205-80 = "É uma pena que eu não possa mais ficar ao lado de uma kouhai tão talentosa..."
42205-81 = "Essa frase deveria ser minha."
42205-82 = "Mesmo que seja pela restauração da SRT, não acredito que a senpai escolheria ameaçar a segurança dos civis..."
42205-83 = "——Não há necessidade de pensar no que a bigorna ou o martelo estão golpeando."
42205-84 = "Não hesite na hora de apontar a arma!"
42205-88 = "(……Muito bem, vou ganhar tempo assim para induzir o esgotamento das munições e então——)"
42205-89 = "Ei, olhe para cá——"
42205-94 = "Digam X!"
42205-100 = "Ugh……!"
42205-111 = "……Saki, você é séria demais."
42205-112 = "Tanto o tiro quanto o esconderijo seguem o manual, então eu sei exatamente qual será seu próximo movimento."
42205-113 = "É por isso que dizem que não é fácil se tornar um veterano, porque tem muita gente assim."
42205-115 = "……Você acha que venceu com isso?"
42205-116 = "Hã... você ainda tem um trunfo?"
42205-117 = "Ah, será que... você está esperando pelo tiro de suporte daquela atiradora fraca?"
42205-118 = "Acho que ela conseguiria me ferir, mas é difícil mudar o rumo da batalha com um tiro de precisão."
42205-119 = "Na verdade, se ela fizer isso, pode acabar sendo alvo de um contra-sniper..."
42205-125 = "……Senpai, o quanto você confia nos seus companheiros de esquadrão?"
42205-126 = "Por que a pergunta repentina?"
42205-127 = "A minha Miyu, se ela se esconder de verdade, ninguém consegue encontrá-la."
42205-128 = "Deixando de lado o CQB ou táticas de combate pessoal, tenho certeza absoluta de que ela nunca falha em um disparo."
42205-129 = "……Você realmente não acha nada? #nNeste momento, não seria estranho se a Otogi-senpai já estivesse dando suporte."
42205-130 = "Ah, talvez... pode ser que a nossa assassina já tenha acabado com a Otogi-senpai."
42205-132 = "………!"
42205-136 = "FOX4, você está bem? FOX4!"
42205-140 = "……Hm? Estou bem, por quê?"
42205-141 = "Você disse para esperar sem atirar porque poderiam ter medidas contra franco-atiradores, certo?"
42205-142 = "Que bom, eu pensei que a Otogi tinha sido derrotada..."
42205-151 = "Ah."
42205-155 = "Vou devolver as palavras que você me ensinou agora há pouco. #nQuando apontar a arma, não hesite――"
42205-156 = "……Parece que quem não conseguiu confiar nos subordinados até o fim foi você, veterana."
42205-164 = "FOX3, abatida."
42205-165 = "Kurumi, não acha que está tentando parecer legal demais só porque tem uma novata por perto? #nSer derrotada tão facilmente assim..."
42205-166 = "……Bem, não tem jeito. #nO alvo restante será eliminado por mim, a reserva."
42205-171 = "Drone chamariz, instalação concluída. Medidas contra ECCM também estão perfeitas... #nAgora não preciso me preocupar com um contra-sniper."
42205-172 = "Muito bem. #nPor enquanto, acho que vou começar eliminando o ponto de frente."
42205-173 = "……Falando nisso, onde está a sniper do Esquadrão RABBIT?"
42205-180 = "Ah... estou aqui..."
42205-181 = "U-uau...?"
42205-186 = "D-desde quando...? E, por que você está aqui...!?"
42205-188 = "Bem... eu também estava procurando um ponto de sniper para dar cobertura..."
42205-189 = "Como a veterana chegou primeiro... fiquei esperando o momento certo para falar com você atrás..."
42205-190 = "Mas... você estava ocupada com várias coisas... então não consegui falar..."
42205-191 = "Você não tentou evitar a visão do inimigo nem nada, ficou esperando atrás de mim esse tempo todo...?"
42205-192 = "Miyu, que garota assustadora..."
42205-194 = "Como esperado, ninguém nota a minha presença... então, um dia, vou acabar desaparecendo da memória de todos..."
42205-195 = "Mas... fico feliz por ter esse tipo de constituição."
42205-196 = "Graças a ninguém ter me notado... consegui salvar o pessoal do esquadrão."
42205-200 = "……Desculpe, veterana."
42205-206 = "E-espere um pouco...!"
42205-212 = "……FOX3, FOX4, abatidas."
42205-213 = "Nunca pensei que seria encurralada pelas minhas novatas a esse ponto."
42205-214 = "Ainda bem que desativei o console de controle do elevador central com antecedência..."
42205-220 = "Ué, o que é isso? Não tem nenhum nó respondendo?"
42205-221 = "Não me diga que você forçou a mudança para o modo offline!?"
42205-222 = "Sinto muito, Moe-chan. Este elevador está fora de serviço."
42205-223 = "Tenho um compromisso marcado para hoje."
42205-224 = "……Veterana Niko? Isso é obra sua, né?"
42205-225 = "Eu sei muito bem das suas habilidades de hacking, Moe-chan. Se tivesse tempo, você encontraria a falha de segurança deste console..."
42205-226 = "Então, para evitar conexões externas, cortei a linha fisicamente. Desculpe."
42205-227 = "Usar um truque tão covarde assim..."
42205-228 = "……Este corredor que leva à sala de operações não pode ser aberto com hacking, não importa o método que você use."
42205-229 = "Além disso... se ficar aí, os reforços da Kaiser Security vão chegar."
42205-230 = "Não diga que não avisei, vá embora com as outras novatas antes disso."
42205-235 = "……Se o que a veterana diz é verdade, significa que esta porta não abre de jeito nenhum por métodos eletrônicos, né?"
42205-236 = "Kuhihi... que máximo. É exatamente o que eu queria."
42205-241 = "Ei, Moe-chan...? O que você está pensando em fazer..."
42205-243 = "Uma porta resistente que não abre por mais que você dê ordens... forçá-la a abrir com força bruta..."
42205-244 = "Parece que tudo vai virar uma bagunça... só de imaginar, fico arrepiada... haa, haa..."
42205-245 = "Este elevador é uma porta eletrônica, então não abre por métodos físicos, sabe?"
42205-246 = "Se métodos físicos não funcionam... significa que é só explodir até funcionar, né?"
42205-251 = "Porque eu tenho um monte de explosivos aqui!"
42205-252 = "Deixa ver... agora tenho uns 10 pacotes de 1 libra de Semtex..."
42205-253 = "Vou colar tudo isso na porta e explodir!"
42205-255 = "E-se usar tantos explosivos assim... talvez a porta sofra danos, mas..."
42205-256 = "Antes disso, vocês podem acabar sendo pegas na explosão, sabia!?"
42205-257 = "Tudo bem! O pessoal do meu esquadrão está acostumado com isso!"
42205-258 = "Mesmo que estejam acostumadas, tentar uma invasão sabendo que pode se colocar em perigo..."
42205-259 = "Pensando pelo bom senso, isso é impossível――"
42205-272 = "Cof, cof... Abriu♪"
42205-274 = "Ah... Mais do que abrir..."
42205-275 = "O correto seria dizer que você forçou a abertura..."
42205-276 = "Eu disse que confiaria em você para cuidar disso... mas não imaginei que usaria todo o seu estoque de explosivos plásticos aqui."
42205-278 = "Bem, acho que até os veteranos da FOX nunca viram um arrombamento tão estúpido quanto esse."
42205-279 = "Quem diria que o temperamento da Moe, que não tem medo da destruição, seria útil em uma situação dessas..."
42205-280 = "O que é isso, está me zoando?"
42205-281 = "É um elogio, um elogio."
42205-285 = "……Bom trabalho, RABBIT 3."
42205-286 = "Bem, vocês também foram incríveis, RABBIT 2."
42205-288 = "O caminho para o elevador está garantido, então vamos descer de rapel até a frente da sala de operações!"
42205-289 = "Pessoal, prendam os arreios nos cabos."
42205-296 = "Então... vamos continuar a invasão!"
42205-303 = "Próximo episódio: Caverna de Calvanog (2)"
