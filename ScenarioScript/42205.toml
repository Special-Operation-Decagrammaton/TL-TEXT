[translation]#[Texto revisado, mas pode haver alterações como Censura.] Em aguardo de revisão de formatação de texto. - Filipe 11/06.
42205-5 = "DORYAAAAAAA――！！"
42205-11 = "FOX 3, a sua caloura acabou de saltar na linha de tiro do nada. Que audácia."
42205-12 = "Saber que o franco-atirador tá com o dedo no gatilho e morder a rota de frente... Elas têm sangue nos olhos! Adoro esse amadorismo excitado."
42205-14 = "……Aquela idiota perdeu o juízo institucional? O que ela pensa que vai fazer?"
42205-15 = "Quer que eu arranque a cabeça dela?"
42205-16 = "Não, segure o chumbo, Otogi. Nós mesmas calculamos que elas trariam contra-medidas letais para anular a sua linha visual."
42205-17 = "E além do mais... Vanguardista Ponta de Lança se resolve com Vanguardista Ponta de Lança. É uma questão de honra."
42205-18 = "FOX 4, essa presa é minha. Trave a retaguarda e me dê cobertura de rádio."
42205-20 = "Copiado. Limpe o chão com ela."
42205-32 = "Olha só quem cruzou o meu cano de novo... 'Veterana'."
42205-34 = "……Eu cansei de gastar saliva nas salas de aula te ensinando que, para invadir o território inimigo, você limpa os ângulos e entra nas sombras, Saki. Esqueceu as lições?"
42205-35 = "Haaah... Parece que o seu corpo tá implorando por uma sessão de reeducação física forçada no pátio!"
42205-44 = "Quando a rota afunila e a geometria do corredor te entrega de bandeja pro inimigo, brincar de furtividade é perda de tempo... E tem mais."
42205-45 = "Essa pistola calibre .45 que a senhora ostenta no coldre não tem energia cinética suficiente para perfurar as placas de cerâmica do meu colete balístico novo. Eu sou o escudo aqui."
42205-47 = "Fufu, excelente leitura de balística. Aceitar o coice do chumbo pra encurtar a distância e travar o combate corpo a corpo foi uma decisão agressiva soberba."
42205-48 = "Mas o manual que eu te ensinei tinha duas páginas, caloura. Eu não sou o martelo que bate... Eu sou a bigorna de aço que esmaga."
42205-49 = "Se você focou toda a sua visão em mim, o seu pescoço tá cego pro rifle de longo alcance lá em cima. Reze pra bala não estourar seu crânio!"
42205-76 = "……Hmph. Admito que o seu CQC evoluiu desde o último exame."
42205-77 = "Quebrar a distância pra anular o meu cano e socar a coronha do fuzil na minha traqueia... Você prestou atenção nas minhas aulas."
42205-78 = "Eu decorei cada soco e cada hematoga que a senhora me deu na escola, Kurumi-senpai."
42205-79 = "Fufu, então sua memória muscular é boa. Uma aluna exemplar de nota máxima na folha teórica."
42205-80 = "É uma pena monstruosa que o destino tenha quebrado a nossa farda e nos colocado em lados opostos da trincheira... Que desperdício de talento..."
42205-81 = "A hipocrisia da sua boca me dá nojo, veterana."
42205-82 = "Se o preço pra trazer os tijolos da SRT de volta é cometer genocídio civil e armar bombas sob ordens de políticos sujos... eu prefiro ver a nossa escola virar cinzas."
42205-83 = "――A bigorna e o martelo não têm o direito de questionar o que estão moldando, Saki. Nós só batemos o chumbo."
42205-84 = "Quando alinhar a mira na testa do inimigo, não balbucie moralidade. Atire!"
42205-88 = "（……Isso, continue latindo. Eu só preciso estender esse engajamento por mais trinta segundos, forçar o consumo de munição dela, e o flanqueamento da Miyako vai fuzilar as costas d――）"
42205-89 = "Olha pra cá, sua víbora corporativa――"
42205-94 = "Diga 'X' pro flash do chumbo!"
42205-100 = "Argh...!! Meu flanco――!!"
42205-111 = "……Saki, o seu maior defeito tático é ser metodicamente certinha demais."
42205-112 = "Onde você se esconde, a cadência do seu tiro, o seu recuo... tudo obedece tanto o manual que eu consigo ler o seu próximo movimento antes do seu dedo apertar o gatilho."
42205-113 = "Kivotos tá cheia de cadetes engessadas que só sabem copiar as páginas dos livros, é por isso que vocês nunca vão cruzar a linha e virar a Elite."
42205-115 = "……Você acha que essa rajada de raspão sela a minha derrota?"
42205-116 = "Hã... cê ainda tem cartas na manga, caloura?"
42205-117 = "Ah, deixa eu adivinhar... Você tá estendendo o tempo porque tem a fé cega de que aquela sniper chorona e invisível da sua equipe vai enfiar uma bala de precisão na minha cabeça?"
42205-118 = "Ela pode até arrancar sangue da minha pele, mas mudar a telemetria de uma guerra de trincheiras com um tiro de longe é fantasia de amador."
42205-119 = "E pior: no segundo em que o cano dela cuspir fogo, o clarão vai desenhar a coordenada mestre pro contra-ataque letal da Otogi... Ela vai virar poeira..."
42205-125 = "……Veterana, deixa eu te fazer uma pergunta de rádio: Qual é o tamanho real da fé que você tem nas costas da sua equipe?"
42205-126 = "Que droga de pergunta aleatória é essa no meio do tiroteio?"
42205-127 = "A nossa Miyu... quando ela decide sumir e se camuflar no cenário, nem os olhos dos deuses conseguem achar o rastro dela."
42205-128 = "Batalha simétrica de CQB ou manuais de escola não importam. Na precisão do abate, a fé que eu tenho no cano dela é de cem por cento."
42205-129 = "……Você realmente não achou anômalo o silêncio do rádio? A essa altura do campeonato, a Otogi-senpai já deveria ter estourado o meu capacete com chumbo pesado pra salvar a sua pele."
42205-130 = "Mas as guatitas dela estão mudas. Acho perfeitamente provável que o fantasma do meu esquadrão já tenha cortado o pescoço da sua sniper no escuro."
42205-132 = "……!! Não pode ser!!"
42205-136 = "FOX 4! Responda na frequência! FOX 4, você está inteira?!"
42205-140 = "……Hein? Alô? Sim, tô de boas, comendo um chiclete aqui. Que foi?"
42205-141 = "A ordem tática não era segurar o dedo e não atirar pra não denunciar a posição pras contra-medidas das calouras? Tô só mofando aqui."
42205-142 = "Graças a Deus... achei que a maldita tinha te executado pelas costas..."
42205-151 = "Ah."
42205-155 = "Vou te devolver a lição que a senhora acabou de cuspir na minha cara, Kurumi-senpai. Quando o cano alinhar com o alvo, não hesite."
42205-156 = "……No final das contas, a líder covarde que não conseguiu confiar na integridade da própria tropa até o fim... foi você."
42205-164 = "FOX 3, fora de combate. Linha rompida."
42205-165 = "Poxa, Kurumi... Você quis pagar de bonitona e fazer pose de mestre na frente da caloura e acabou estendida no asfalto? Que humilhação tática."
42205-166 = "……Bem, fazer o quê. O dever de limpar o resto desse lixo e trancar o perímetro recai nas costas da retaguarda aqui."
42205-171 = "Drone chamariz ativado. Sistema ECCM de contra-medidas digitais operando... Nenhuma sniper vai ler o meu rastro térmico."
42205-172 = "Vejamos... vou começar estourando os joelhos da vanguardista marrenta pra ela aprender a respeitar os mais velhos."
42205-173 = "……A propósito, onde foi que aquela sniper invisível da RABBIT se meteu?"
42205-180 = "Ahm... c-com licença... eu tô bem aqui atrás de você..."
42205-181 = "H-HIIIIH――?! QUE DROGA É ESSA?!"
42205-186 = "Q-Quando raios você...?! Como você escalou essa guarita sem fazer um mísero ruído de coturno, sua assombração?!"
42205-188 = "É que... eu também tava procurando um ninho tático bom pra dar apoio de tiro pras meninas..."
42205-189 = "Mas a senhora já tinha chegado primeiro e deitado o fuzil aí... Então eu fiquei parada aqui atrás esperando uma brecha educada pra te dar bom-dia..."
42205-190 = "Mas a senhora parecia tão ocupada gritando no rádio e xingando a Saki-chan... que eu fiquei com vergonha de interromper a sua linha de raciocínio..."
42205-191 = "Você não usou manto térmico ou infiltração de elite... você tava literalmente parada nas minhas costas respirando o meu ar o tempo todo e eu ignorei a sua existência?!"
42205-192 = "Miyu... você é uma criatura aterrorizante..."
42205-194 = "Pois é... como eu sou um lixo invisível que ninguém nota, eu sinto que um dia eu vou sumir dos registros e ninguém vai lembrar do meu nome..."
42205-195 = "Mas hoje... eu agradeço aos céus por ter nascido com essa falta de presença maldita."
42205-196 = "Graças ao fato de todo mundo me ignorar feito um inseto... eu pude salvar a retaguarda do meu amado esquadrão."
42205-200 = "……Me perdoe a indelicadeza do tiro, veterana."
42205-206 = "E-EI, ESPERA, NÃO PUXA O GATILH――"
42205-212 = "……FOX 3 e FOX 4 silenciadas. Fora de operação."
42205-213 = "Eu nunca, na pior das minhas planilhas, imaginei que as calouras teriam dentes tão afiados a ponto de trucidar a minha vanguarda."
42205-214 = "Ainda bem que o meu instinto mandou eu ir no painel e desligar o disjuntor do Elevador Central fisicamente..."
42205-220 = "Que droga é essa?! A tela tá morta, não tem um único nó de rede respondendo aos meus comandos!"
42205-221 = "Não me diga que as desgraçadas forçaram a desativação da linha pra modo offline de hardware?!"
42205-222 = "Mil desculpas, Moe-chan. Mas o acesso a esse elevador está estritamente bloqueado hoje."
42205-223 = "A Sala de Operações lá embaixo já tá com a agenda cheia."
42205-224 = "……Niko-senpai? Essa palhaçada de travar o painel foi obra das suas mãos de cozinheira, né?"
42205-225 = "Eu passei meses avaliando os seus relatórios e eu conheço o tamanho da sua genialidade cibernética, Moe. Se eu deixasse uma única linha de sinal ativa, você acharia uma brecha no firewall e roubaria o elevador de nós em minutos..."
42205-226 = "Então eu fui lá embaixo com um alicate e ranquei os cabos da parede com as minhas próprias mãos. Sem conexão física, sem hack. Sinto muito, querida."
42205-227 = "Usar uma tática tão primitiva e covarde dessas... Isso é trapaça institucional!!"
42205-228 = "……Grite o quanto quiser, a porta de aço tá trancada e nenhum comando digital do seu teclado vai fazer o elevador descer."
42205-229 = "E mais um detalhe de rádio: os alarmes do perímetro dispararam e as frotas pesadas da Kaiser Security estão descendo as escadas agora para cercar vocês."
42205-230 = "Ouça o conselho da veterana que te ama: pegue as suas amigas e bata em retirada antes do banho de chumbo começar."
42205-235 = "……Então, se eu entendi a sua lógica logística, senhora... significa que essa comporta de aço nunca mais vai abrir por vias eletrônicas normais, correto?"
42205-236 = "Kuhihi... Isso é espetacular. Era exatamente a resposta que o meu coração queria ouvir."
42205-241 = "Ahm... Moe-chan...? Que cara de psicopata é essa? O que você tá tramando...?"
42205-243 = "Uma comporta blindada de titânio pura, que se recusa a abrir por qualquer comando... sendo esmagada, despedaçada e arrombada pelo impacto de uma força esmagadora brutal..."
42205-244 = "Ver o metal entortar e virar estilhaço... Só de imaginar a explosão o meu corpo já fica todo arrepiado... haaa... haaa..."
42205-245 = "Moe, o trinco é magnético e hidráulico industrial! Força física de coronha não arranha esse titânio!"
42205-246 = "Se a força física normal não faz cócegas na porta... a gente soca explosivo plástico até o titânio chorar e pedir arrego, né?!"
42205-251 = "A nossa mochila logística tá transbordando carga de demolição, Niko-senpai!"
42205-252 = "Vejamos... eu tenho uns dez blocos de 1 libra de Semtex puro aqui na minha mão..."
42205-253 = "Vou amassar tudo nessa fresta da fechadura e ver o elevador voar pelos ares! Kuhihi!"
42205-255 = "E-Ei!! Você perdeu o juízo?! Se você detonar dez libras de Semtex num corredor confinado desses, a comporta pode até ceder... But"
42205-256 = "A onda de choque vai rebentar os seus próprios tímpanos e estraçalhar o corpo de vocês quatro junto com a parede!!"
42205-257 = "Relaxa os ombros, veterana! A minha tropa já tá calejada de quase morrer explodida nos treinos todo santo dia!"
42205-258 = "Calejada ou não, colocar a própria integridade física em risco extremo por causa de um arrombamento dinâmico imbecil..."
42205-259 = "Bate de frente com qualquer bom senso militar conceitua――"
42205-272 = "Cof... cof... caramba, quanta poeira... Mas olha só! A portinha abriu! ♪"
42205-274 = "Ahm... chamar esse monte de ferro retorcido e fumegante de 'porta aberta' é um erro gramatical..."
42205-275 = "O termo correto seria 'obliterada da existência pelo fogo'..."
42205-276 = "Eu dei a minha palavra de que confiava na capacidade destrutiva do esquadrão, Moe... mas eu juro que nunca projetei na minha cabeça que você ia queimar todo o nosso estoque de C4 tático numa única fechadura."
42205-278 = "Bem, aposto que a cúpula da FOX nunca testemunhou um arrombamento tão estúpido e violento na vida inteira delas."
42205-279 = "A loucura suicida da Moe e o tesão dela por destruição em massa finalmente serviram pra utilidade pública hoje..."
42205-280 = "Ei! Cê tá tirando sarro do meu romance balístico, Capitã?!"
42205-281 = "É um elogio de rádio, querida. Um elogio."
42205-285 = "……Belo espetáculo, RABBIT 3."
42205-286 = "Pff... o seu trabalho limpando a vanguarda também não foi de todo mal, RABBIT 2."
42205-288 = "O poço do elevador virou um túnel aberto. Engatem os mosquetões nos cabos de aço e iniciaremos descida de rapel vertical até a Sala de Operações inferior!"
42205-289 = "Esquadrão, travem as fivelas dos arreios nos coletes e preparem as mentes."
42205-296 = "O monstro tá lá embaixo... Avançar Infiltração Direta!"
42205-303 = "Próximo Episódio: A Caverna de Caerbannog (2)"