[translation]
42205-5 = "DERRUBAAA――!!"
42205-11 = "FOX3… sua caloura apareceu na linha de tiro como um furacão. Que audácia."
42205-12 = "Ela sabe que a atiradora está de prontidão e mesmo assim avança pelo corredor… Sangue nos olhos! Adoro ver esse ímpeto cru."
42205-14 = "…Aquela desgraçada perdeu o juízo? O que ela pensa que está fazendo?"
42205-15 = "Quer que eu estoure a munição?"
42205-16 = "Negativo, segura o fogo, Otogi. Nós mesmas calculamos que elas trariam contramedidas letais para anular sua mira."
42205-17 = "E outra… Ponta de lança se resolve com ponta de lança. É questão de honra."
42205-18 = "FOX4, essa presa é minha. Trave a retaguarda e cubra minha comunicaçāo."
42205-20 = "Entendido. Varra o chão com ela."
42205-32 = "Olha só quem resolveu cruzar meu cano de novo… 'Veterana'."
42205-34 = "……Quantas vezes eu tive que ensinar, na sala de aula, que para invadir território inimigo se entra na sombra, limpando os ângulos, Saki? Esqueceu todas as lições?"
42205-35 = "Haaah… Parece que vai ser preciso uma sessão de treinamento corretivo no pátio!"
42205-44 = "Quando o corredor afunila e a geometria te entrega de bandeja pro inimigo, tentar ser furtiva é perda de tempo… E mais."
42205-45 = "Essa pistola .45 que a senhora ostenta no coldre não tem energia cinética pra furar as placas de cerâmica do meu novo colete. Aqui quem manda é o escudo."
42205-47 = "Fufu, excelente leitura balística. Aceitar o risco do impacto pra encurtar a distância e partir pro corpo a corpo foi uma decisão agressiva e soberba."
42205-48 = "Mas o manual que eu mesma te ensinei tem duas páginas, caloura. Eu não sou o martelo… Eu sou a bigorna que esmaga."
42205-49 = "Se você focou todos os seus sentidos em mim, seu pescoço está cego para o rifle de longo alcance lá em cima. Reze pra bala não estourar seu crânio!"
42205-76 = "……Hmph. Admito que seu CQC evoluiu desde a última avaliação."
42205-77 = "Quebrar a distância pra anular meu cano e meter a coronha do fuzil na minha traqueia… Você prestou atenção nas minhas aulas."
42205-78 = "Decorei cada golpe e cada hematoma que a senhora me ensinou, Kurumi-senpai."
42205-79 = "Fufu, então sua memória muscular está afiada. Uma aluna exemplar nas provas teóricas."
42205-80 = "É uma tragédia sem tamanho que o destino tenha rasgado nossas fardas e nos colocado em lados opostos da trincheira… Que desperdício de talento…"
42205-81 = "Sua boca cheia de falsidade me dá ânsia, veterana."
42205-82 = "Se o preço para restaurar a SRT é cometer genocídio e plantar bombas sob ordens de políticos corruptos… então prefiro ver nossa escola virar cinzas."
42205-83 = "――A bigorna e o martelo não têm o direito de questionar o que estão forjando, Saki. Nós só batemos o chumbo."
42205-84 = "Quando alinhar a mira na testa do inimigo, não discuta filosofia. Atire!"
42205-88 = "(…Isso, continue latindo. Só preciso prolongar esse confronto por mais trinta segundos, forçar o consumo de munição dela… e o flanco da Miyako vai fuzilar as costas dela d――)"
42205-89 = "Olha pra cá, sua víbora――"
42205-94 = "Digam 'X' pro flash do chumbo!"
42205-100 = "Argh…!! Meu flanco――!!"
42205-111 = "……Saki, seu maior defeito tático é ser metodicamente certinha demais."
42205-112 = "Onde você se esconde, sua cadência de tiro, seu recuo… tudo obedece tanto ao manual que eu consigo ler seu próximo movimento antes do seu dedo apertar o gatilho."
42205-113 = "Kivotos está cheia de soldados de manual que só sabem repetir fórmulas, e é por isso que vocês nunca cruzam a linha e viram a Elite."
42205-115 = "……Acha mesmo que esse raspar de balas sela minha derrota?"
42205-116 = "Hã… você ainda tem trunfo na manga, caloura?"
42205-117 = "Ah, deixa eu adivinhar… Você está protelando porque confia cegamente que aquela atiradora fantasma do seu esquadrão vai enfiar uma bala de precisão na minha cabeça?"
42205-118 = "Ela pode até arrancar sangue da minha pele, mas achar que um tiro de longe define o rumo de uma guerra de trincheiras é fantasia de amadora."
42205-119 = "E pior: no segundo em que o cano dela cuspir fogo, o clarão vai desenhar as coordenadas perfeitas pro contra-ataque letal da Otogi… Ela vai virar pó…"
42205-125 = "……Veterana, deixa eu fazer uma pergunta tática: Qual é o tamanho real da fé que você tem nas costas da sua própria equipe?"
42205-126 = "Que pergunta aleatória é essa no meio do tiroteio?"
42205-127 = "A nossa Miyu… quando ela decide sumir e se camuflar no cenário, nem os deuses encontram o rastro dela."
42205-128 = "Batalha simétrica de CQB, manuais de escola… isso não importa. Na precisão do abate, a fé que eu tenho no cano dela é de cem por cento."
42205-129 = "……Você realmente não achou estranho o silêncio do rádio? A essa altura do campeonato, a Otogi-senpai já deveria ter enchido meu capacete de chumbo pra te salvar."
42205-130 = "Mas as galinhas dela estão mudas. Acho perfeitamente possível que o fantasma do meu esquadrão já tenha cortado o pescoço da sua atiradora no escuro."
42205-132 = "……!! Isso não pode ser…!!"
42205-136 = "FOX4! Responda na frequência! FOX4, você está inteira?!"
42205-140 = "……Hã? Alô? Sim, tô de boas, mastigando um chiclete aqui. O que foi?"
42205-141 = "A ordem tática era segurar o dedo e não atirar pra não entregar a posição pras contramedidas delas, não era? Tô só no tédio aqui."
42205-142 = "Ainda bem… achei que a maldita tinha te executado pelas costas…"
42205-151 = "Ah."
42205-155 = "Vou devolver a lição que a senhora acabou de cuspir na minha cara, Kurumi-senpai. Quando o cano alinhar com o alvo, não hesite."
42205-156 = "……No fim das contas, a comandante covarde que não conseguiu confiar na própria tropa até o fim… foi você."
42205-164 = "FOX3, fora de combate. Linha rompida."
42205-165 = "Poxa, Kurumi… Você quis pagar de durona e fazer pose de mestra na frente da caloura e acabou estendida no asfalto? Que humilhação tática."
42205-166 = "……Bem, fazer o quê. O dever de limpar o resto dessa escória e trancar o perímetro sobra pra retaguarda."
42205-171 = "Drone chamariz ativado. Sistema ECCM operando… Nenhuma atiradora vai ler meu rastro térmico."
42205-172 = "Vejamos… vou começar estourando os joelhos da vanguardista metida pra ela aprender a respeitar os mais velhos."
42205-173 = "……Aliás, onde foi que aquela atiradora fantasma da RABBIT se meteu?"
42205-180 = "Ahm… c-com licença… estou bem aqui atrás da senhora…"
42205-181 = "H-HIIH――?! QUE PORRA É ESSA?!"
42205-186 = "Q-Quando caralhos você…?! Como você subiu nessa guarita sem fazer o MENOR barulho, sua assombração?!"
42205-188 = "É que… eu também estava procurando um bom ninho de atiradora pra dar apoio pras meninas…"
42205-189 = "Mas a senhora já tinha chegado primeiro e deitado o fuzil aqui… Então eu fiquei paradinha atrás esperando uma brecha educada pra dar bom-dia…"
42205-190 = "Só que a senhora parecia tão ocupada gritando no rádio e xingando a Saki-chan… que eu fiquei com vergonha de interromper sua linha de raciocínio…"
42205-191 = "Você não usou manto térmico nem tática de infiltração de elite… você ficou literalmente parada nas minhas costas respirando meu ar o tempo todo e eu agi como se você fosse invisível?!"
42205-192 = "Miyu… você é uma criatura aterrorizante…"
42205-194 = "Pois é… como eu sou um lixo invisível que ninguém nota, tenho medo que um dia eu suma dos registros e ninguém lembre do meu nome…"
42205-195 = "Mas hoje… agradeço aos céus por ter nascido com essa maldição de não ter presença."
42205-196 = "Graças ao fato de todo mundo me ignorar como uma mosca… eu pude proteger a retaguarda do meu amado esquadrão."
42205-200 = "……Me perdoe a indelicadeza do tiro, veterana."
42205-206 = "E-EI, ESPERA, NÃO PUXA O GATILH――"
42205-212 = "……FOX3 e FOX4 silenciadas. Fora de operação."
42205-213 = "Eu nunca, na pior das minhas projeções, imaginei que as calouras teriam dentes tão afiados a ponto de trucidar minha vanguarda."
42205-214 = "Ainda bem que meu instinto mandou eu ir ao painel e desligar o disjuntor do elevador central com as próprias mãos…"
42205-220 = "Que porra é essa?! A tela está morta, não tem um mísero nó de rede respondendo aos meus comandos!"
42205-221 = "Não me diga que as desgraçadas desativaram a linha pro modo offline no hardware?!"
42205-222 = "Mil perdões, Moe-chan. Mas o acesso a este elevador está estritamente bloqueado hoje."
42205-223 = "A Sala de Operações lá embaixo já tem hora marcada."
42205-224 = "……Niko-senpai? Essa palhaçada de travar o painel foi obra das suas mãos, né?"
42205-225 = "Passei meses avaliando seus relatórios, Moe. Eu sei o tamanho da sua genialidade cibernética. Se eu deixasse uma única linha de sinal ativa, você acharia uma brecha no firewall e roubaria o elevador em minutos…"
42205-226 = "Então eu desci lá embaixo com um alicate e arranquei os cabos da parede com as minhas próprias mãos. Sem conexão física, sem hack. Sinto muito, querida."
42205-227 = "Usar uma tática tão primitiva e covarde dessas… Isso é trapaça institucional!!"
42205-228 = "……Grite o quanto quiser, a porta de aço está trancada e nenhum comando digital do seu teclado vai fazer o elevador descer."
42205-229 = "E mais um detalhe tático: os alarmes do perímetro dispararam e as tropas pesadas da Kaiser Security já estão descendo as escadas para cercar vocês."
42205-230 = "Aceite o conselho da veterana que te ama: pegue suas amigas e bata em retirada antes do banho de chumbo começar."
42205-235 = "……Então, se eu entendi sua lógica logística, senhora… significa que essa comporta de aço jamais será aberta por vias eletrônicas normais, correto?"
42205-236 = "Kuhihi… Isso é espetacular. Era exatamente a resposta que meu coração explosivo queria ouvir."
42205-241 = "Ahm… Moe-chan…? Que cara de psicopata é essa? O que você está tramando…?"
42205-243 = "Uma comporta blindada de titânio puro, que se recusa a obedecer a qualquer comando… sendo violentada, despedaçada e arrombada pelo impacto de uma força bruta esmagadora…"
42205-244 = "Ver o metal entortar e virar estilhaço… Só de imaginar a explosão meu corpo já se arrepia todo… haaa… haaa…"
42205-245 = "Moe, o trinco é magnético e hidráulico! Força física não arranha esse titânio!"
42205-246 = "Se a força física normal não resolve… a gente soca explosivo plástico até o titânio chorar e pedir arrego, não é?!"
42205-251 = "Nossa mochila tática está abarrotada de carga de demolição, Niko-senpai!"
42205-252 = "Vejamos… devo ter uns dez blocos de 500 gramas de Semtex puro aqui na minha mão…"
42205-253 = "Vou amassar tudo nessa fresta da fechadura e mandar o elevador pelos ares! Kuhihi!"
42205-255 = "E-Ei!! Você perdeu o juízo?! Se detonar cinco quilos de Semtex num corredor confinado desses, a comporta até pode ceder… mas a onda de choque vai estourar seus próprios tímpanos e triturar o corpo de vocês junto com a parede!!"
42205-256 = "Relaxa, veterana! Minha tropa já está acostumada a quase morrer explodida nos treinos todo santo dia!"
42205-257 = "Acostumada ou não, colocar a própria integridade física em risco extremo por causa de um arrombamento dinâmico imbecil…"
42205-258 = "Isso fere qualquer bom senso militar conceitua――"
42205-272 = "Cof… cof… caramba, quanta poeira… Mas olha só! A portinha abriu! ♪"
42205-274 = "Ahm… chamar esse amontoado de ferro retorcido e fumegante de 'porta aberta' é um erro gramatical brutal…"
42205-275 = "O termo correto seria 'obliterada da face do universo pelo fogo'…"
42205-276 = "Eu dei minha palavra de que confiava no poder destrutivo do esquadrão, Moe… mas eu juro que nunca imaginei que você fosse queimar todo o nosso estoque tático de C4 numa única fechadura."
42205-278 = "Bem, aposto que a cúpula da FOX nunca testemunhou um arrombamento tão estúpido e violento em toda a vida."
42205-279 = "A loucura suicida da Moe e seu fetiche por destruição em massa finalmente serviram para o bem comum hoje…"
42205-280 = "Ei! Cê está tirando sarro do meu romance balístico, Capitã?!"
42205-281 = "É um elogio de rádio, querida. Um elogio."
42205-285 = "……Belo espetáculo, RABBIT3."
42205-286 = "Hmph… o seu trabalho limpando a vanguarda também não foi nada mau, RABBIT2."
42205-288 = "O poço do elevador se tornou um túnel aberto. Prendam os mosquetões nos cabos de aço e iniciaremos descida de rapel vertical até a Sala de Operações inferior!"
42205-289 = "Esquadrão, travem as fivelas dos arreios nos coletes e preparem as mentes."
42205-296 = "O monstro está lá embaixo… Vamos em frente. Invasão total."
42205-303 = "Próximo Episódio: A Caverna de Caerbannog (2)"