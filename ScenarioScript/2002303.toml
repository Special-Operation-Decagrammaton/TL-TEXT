[translation]
2002303-1 = "張り込みの定番"
2002303-6 = "本件の被疑者は、警備局の車両を荒らし、#n積まれていた現金及び保安文書を盗んだ容疑をかけられている。"
2002303-7 = "現金と保安文書そのものは、別に大したものではないが……。"
2002303-8 = "コソドロごときに警備局の車両を荒らされたと世間に知られては、#n我々ヴァルキューレ警察学校の威信が地に落ちてしまう。"
2002303-9 = "あのバカ共の失態で、公安局まで動く羽目になるとは……。"
2002303-10 = "いいか、お前たち。本件は市民の信頼に直結する重要な案件だ。#n保安文書の流出を避けるのはもちろん、メディアが騒ぐ前に必ず検挙するぞ！"
2002303-11 = "公安局の内偵によれば、被疑者グループは砂尾町一帯を拠点とし、#n身分を偽って活動しているとのことだ。"
2002303-12 = "被疑者の特徴は、短い髭と折れた耳、#nそれと目元に大きな傷跡がある三毛猫のような……。"
2002303-20 = "[USERNAME]先生……？"
2002303-21 = "いつからいらしたのですか？#nいえ、そもそもどうしてここに……。"
2002303-22 = "[s1] \"カンナが張り込みをすると聞いて。\"\n[s2] \"手伝いに来たよ。\""
2002303-25 = "……お気持ちは大変ありがたいのですが。"
2002303-26 = "張り込みにそこまでの人数は必要ありません。#n時間も遅いですし、私たちに任せてお帰りください。"
2002303-27 = "[s] \"もしかして……私がいると邪魔？\""
2002303-28 = "そんなことはないのですが……。"
2002303-29 = "張り込んだところで、いつ被疑者が姿を現すか分かりません。#nそれに、ご多忙の先生を巻き込むのは、申し訳ないですし。"
2002303-30 = "遅くまで私たちの業務を手伝っていただくことで、体調を崩されないか心配です。"
2002303-31 = "[ns] \"体力がなくなったら、迷惑にならないうちに帰るから大丈夫だよ。\""
2002303-33 = "[ns3] \"それに、監視の目は多いほうがいいんじゃない？\"\n[ns4] \"怪しい人を見つけるのは得意だよ。\""
2002303-36 = "……そこまで仰るのなら、仕方ないですね。"
2002303-37 = "では……無理のない範囲で、お願いします。"
2002303-39 = "午前0時30分、視界は良好。#n今のところ、周辺で不審人物の目撃情報はなし。"
2002303-40 = "被疑者と思しきヤツが動くまで、このままか……。"
2002303-47 = "[ns] \"……ごめん、夜ご飯食べてなくて……。\""
2002303-48 = "いえ……そういえば、私も食事のことを忘れていました。"
2002303-49 = "先生、お腹が減っているのでしたら、近くのコンビニで何か食べてきても問題ありませんので。"
2002303-50 = "もしくは、日付も回ってしまいましたし、そろそろシャーレに戻っていただいても――"
2002303-51 = "[s] \"カンナは平気なの？\""
2002303-52 = "私は、普段から任務中食事を取らないので。"
2002303-53 = "任務中の食事は、後日経費として精算できますが、#n食事にかまけて監視が疎かになっては元も子もありません。"
2002303-54 = "眠気覚ましにコーヒーくらいは飲みますが……"
2002303-55 = "なので、私のことは気にせずに先生だけでどうぞ。"
2002303-56 = "[s] \"じゃあ、少し外すね。\""
2002303-57 = "はい。"
2002303-66 = "……思ったよりも、早いお戻りでしたね。"
2002303-67 = "明日もお仕事と伺ってますが、どうしてここまで……。"
2002303-68 = "……その袋は？"
2002303-69 = "[s5] \"カンナと一緒に食べようと思って。\"\n[s6] \"あんパンと牛乳だよ！\""
2002303-72 = "ふふっ……。#nあんパンですか。"
2002303-73 = "張り込みと聞けば、多くの人が思い浮かべるものですね。"
2002303-74 = "私は大丈夫ですので、先生が召し上がってください。"
2002303-75 = "[s7] \"えっ！？なんで！？\"\n[s8] \"あんパン、嫌いだった？\""
2002303-78 = "いえ……好みの問題ではありません。"
2002303-79 = "ただでさえ遅い時間ですし……お腹が膨れると、眠くなってしまうので。"
2002303-80 = "ヴァルキューレ警察学校の生徒が、#n食後の眠気で被疑者を取り逃がしたなんて知られては、キヴォトス中で笑い者にされます。"
2002303-81 = "なので、お気持ちだけ頂きますね。"
2002303-87 = "（その後、いろいろな食べ物をカンナに勧めてみたけど……)"
2002303-89 = "先生？今度こそお帰りになったのかと思いましたが……。"
2002303-90 = "ドーナッツを買ってきたのですか？#n私のお腹が空いていると思って……？"
2002303-91 = "先ほどもお伝えしましたが、私は張り込み中に食事を摂りません。"
2002303-92 = "申し訳ないですが、お気持ちだけ受け取っておきますね。"
2002303-94 = "この匂いは……。#nまた何か買ってきたのですか？"
2002303-95 = "……ハンバーガー？#n理由を伺っても……？"
2002303-96 = "前に刑事モノの映画で、張り込みをしながらハンバーガーを食べるシーンを見たから……ですか？"
2002303-97 = "先生、映画は映画です。#nそれに何度も言いましたが、私は――"
2002303-98 = "……というより、これ以上はジッとしていただきたいです。#n被疑者がこちらの動きに気付いて逃亡する恐れもありますので。"
2002303-100 = "……これは？"
2002303-101 = "[s9] \"焼きそばだよ！\"\n[s10] \"あんパンも定番だけど、焼きそばもたまに見るからね。\""
2002303-108 = "被疑者の身柄を確保できるかどうかという、こんな大事な状況で……"
2002303-109 = "焼きそばなんて食べてる場合じゃないでしょう！"
2002303-111 = "（また断られちゃった……)"
2002303-113 = "先生……どうしてそう何度も私の邪魔をされるのですか？"
2002303-114 = "また同じようなことを繰り返すおつもりでしたら……。"
2002303-115 = "公務執行妨害で逮捕します！"
2002303-116 = "[s11] \"じゃ、邪魔をするつもりなんてないよ！\"\n[s12] \"大事な任務中とはいえ、カンナに食事を抜いてほしくなくて……。\""
2002303-119 = "一食程度、大した問題ではありません。"
2002303-120 = "規則正しい食生活が健康を維持するために大切なことくらい分かっていますが、#n物事には優先順位というものがあります。"
2002303-121 = "警察にとって、事件の解決以上に大切なことなどありません。"
2002303-122 = "[s] \"事件よりも、カンナの健康のほうが大切だよ。\""
2002303-123 = "……本気で仰っているのですか？"
2002303-124 = "[s13] \"カンナのことが心配だから。\"\n[s14] \"肝心な時に体力がなかったら、捕まえられないよ？\""
2002303-127 = "はぁ……。"
2002303-128 = "分かりました。#nそれでは、あんパンを一つだけ頂きます。"
2002303-129 = "こういうところが、本当に……。"
2002303-130 = "ところで、これはどこで買ったものですか？"
2002303-131 = "この袋や容器のデザインはコンビニのものではないですし……。"
2002303-132 = "かといって、こんな時間では近くの飲食店はどこも閉まっているでしょう。"
2002303-133 = "[s] \"あそこの屋台で売ってたよ。\""
2002303-134 = "こんな人通りの少ない時間に屋台が？"
2002303-135 = "まさか……。"
2002303-136 = "先生、屋台の店員はどのような人相でした？"
2002303-137 = "[s] \"折れ耳で、目元に傷跡があって……あっ、三毛猫みたいな感じだったよ。\""
2002303-142 = "そいつだ！"
2002303-143 = "先生、その屋台の場所まで案内してください！"
2002303-147 = "（その後、カンナは屋台で何食わぬ顔をしていた犯人を見つけると、すぐに身柄を確保した)"
2002303-148 = "（ただ、張り込みが終わってからも、カンナはなかなか食べ物を受け取ろうとせず……)"
2002303-149 = "（購入した大量の食べ物は、他の生徒たちと分けて食べた)"
