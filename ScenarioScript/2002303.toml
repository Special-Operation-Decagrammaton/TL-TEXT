[translation]
2002303-1 = "O clássico da campana"
2002303-6 = "O suspeito deste caso é acusado de vandalizar um veículo da Secretaria de Segurança e roubar o dinheiro e os documentos confidenciais que estavam lá dentro."
2002303-7 = "O dinheiro e os documentos em si não são lá grande coisa, mas..."
2002303-8 = "Se o público souber que um simples ladrão de meia-tigela vandalizou um veículo da Secretaria de Segurança, o prestígio da nossa Academia de Polícia Valkyrie cairá por terra."
2002303-9 = "Por causa da incompetência daqueles idiotas, até a Divisão de Segurança Pública teve que ser mobilizada..."
2002303-10 = "Escutem bem, pessoal. Este caso é um assunto importante que afeta diretamente a confiança dos cidadãos. Além de evitar o vazamento dos documentos confidenciais, temos que prendê-lo antes que a mídia faça barulho!"
2002303-11 = "De acordo com a investigação interna da Divisão de Segurança Pública, o grupo suspeito tem como base a área de Sunao-cho e está operando sob identidades falsas."
2002303-12 = "As características do suspeito são: barba curta, orelha cortada e uma grande cicatriz perto do olho, parecendo um gato malhado..."
2002303-20 = "Professor [USERNAME]...?"
2002303-21 = "Desde quando você está aí? Não, na verdade, por que você está aqui...?"
2002303-22 = "[s1] \"Ouvi dizer que a Kanna estava fazendo uma campana.\"\n[s2] \"Vim ajudar.\""
2002303-25 = "...Agradeço muito a sua intenção, mas."
2002303-26 = "Não precisamos de tanta gente para uma campana. Já está tarde, então por favor, deixe conosco e vá para casa."
2002303-27 = "[s] \"Por acaso... eu estou atrapalhando?\""
2002303-28 = "Não é isso, mas..."
2002303-29 = "Não sabemos quando o suspeito vai aparecer. Além disso, sinto muito por envolver o professor, que já é tão ocupado."
2002303-30 = "Fico preocupada que você acabe ficando doente por nos ajudar com o trabalho até tão tarde."
2002303-31 = "[ns] \"Se eu ficar sem energia, vou embora antes de virar um estorvo, então não se preocupe.\""
2002303-33 = "[ns3] \"Além disso, não é melhor ter mais olhos vigiando?\"\n[ns4] \"Sou bom em encontrar pessoas suspeitas.\""
2002303-36 = "...Se você insiste tanto, não tenho escolha."
2002303-37 = "Então... por favor, faça apenas o que for possível."
2002303-39 = "00:30, visibilidade boa. Por enquanto, não há relatos de pessoas suspeitas na área."
2002303-40 = "Vamos continuar assim até que o suspeito se mova..."
2002303-47 = "[ns] \"...Desculpe, eu não jantei...\""
2002303-48 = "Não... agora que você mencionou, eu também esqueci de comer."
2002303-49 = "Professor, se você está com fome, não tem problema nenhum ir a uma loja de conveniência próxima comer algo."
2002303-50 = "Ou, como já passou da meia-noite, talvez seja hora de você voltar para o Schale—"
2002303-51 = "[s] \"A Kanna está bem?\""
2002303-52 = "Eu não costumo comer durante o serviço."
2002303-53 = "Refeições durante o serviço podem ser reembolsadas como despesas depois, mas não adianta nada se distrair com comida e descuidar da vigilância."
2002303-54 = "Eu tomo um café para espantar o sono, mas..."
2002303-55 = "Então, não se preocupe comigo e vá comer algo, professor."
2002303-56 = "[s] \"Então, vou sair um pouco.\""
2002303-57 = "Certo."
2002303-66 = "...Você voltou mais rápido do que eu pensava."
2002303-67 = "Ouvi dizer que você tem trabalho amanhã, por que se deu ao trabalho de vir até aqui..."
2002303-68 = "...O que tem nessa sacola?"
2002303-69 = "[s5] \"Pensei em comer com a Kanna.\"\n[s6] \"É pão doce e leite!\""
2002303-72 = "Fufu... Pão doce, é?"
2002303-73 = "É a primeira coisa que vem à mente de muitas pessoas quando se fala em campana."
2002303-74 = "Eu estou bem, então pode comer, professor."
2002303-75 = "[s7] \"Hã!? Por quê!?\"\n[s8] \"Você não gosta de pão doce?\""
2002303-78 = "Não... não é uma questão de gosto."
2002303-79 = "Já está muito tarde... e se eu ficar de barriga cheia, vou acabar sentindo sono."
2002303-80 = "Se souberem que uma aluna da Academia de Polícia Valkyrie deixou o suspeito escapar por causa de sono pós-refeição, seremos motivo de piada em todo o Kivotos."
2002303-81 = "Por isso, agradeço a intenção."
2002303-87 = "(Depois disso, tentei oferecer várias comidas para a Kanna, mas...)"
2002303-89 = "Professor? Pensei que desta vez você tinha ido embora..."
2002303-90 = "Você comprou rosquinhas? Achou que eu estava com fome...?"
2002303-91 = "Como eu disse antes, eu não como durante a campana."
2002303-92 = "Sinto muito, mas vou ter que recusar, embora agradeça a intenção."
2002303-94 = "Esse cheiro...#nVocê comprou algo de novo?"
2002303-95 = "...Hambúrguer?#nPosso saber o motivo...?"
2002303-96 = "Foi porque você viu uma cena em um filme policial onde comiam hambúrguer enquanto vigiavam um suspeito... é isso?"
2002303-97 = "Sensei, filme é filme.#nAlém disso, eu já disse várias vezes, eu—"
2002303-98 = "...Na verdade, eu gostaria que você ficasse parado.#nExiste o risco de o suspeito perceber nossa presença e fugir."
2002303-100 = "...O que é isso?"
2002303-101 = "[s9] \"É yakisoba!\"\n[s10] \"Pão doce também é um clássico, mas yakisoba também se vê de vez em quando, né.\""
2002303-108 = "Em uma situação tão importante, onde precisamos garantir a custódia do suspeito..."
2002303-109 = "Não é hora de ficar comendo yakisoba!"
2002303-111 = "(Fui recusada de novo...)"
2002303-113 = "Sensei... por que você insiste tanto em me atrapalhar?"
2002303-114 = "Se você pretende continuar fazendo isso..."
2002303-115 = "Vou te prender por obstrução de justiça!"
2002303-116 = "[s11] \"E-eu não tenho a intenção de te atrapalhar!\"\n[s12] \"Mesmo estando em uma missão importante, eu não queria que você ficasse sem comer, Kanna...\""
2002303-119 = "Pular uma refeição não é um grande problema."
2002303-120 = "Eu sei que uma alimentação regular é importante para manter a saúde, mas#nexistem prioridades nas coisas."
2002303-121 = "Para a polícia, não há nada mais importante do que resolver um caso."
2002303-122 = "[s] \"Mais do que o caso, a saúde da Kanna é mais importante.\""
2002303-123 = "...Você está falando sério?"
2002303-124 = "[s13] \"Porque estou preocupado com você, Kanna.\"\n[s14] \"Se você não tiver energia na hora H, não vai conseguir capturá-lo, né?\""
2002303-127 = "Haa..."
2002303-128 = "Entendido.#nNesse caso, vou aceitar apenas um pão doce."
2002303-129 = "Esse seu jeito, realmente..."
2002303-130 = "Aliás, onde você comprou isso?"
2002303-131 = "O design desta embalagem e do recipiente não é de loja de conveniência..."
2002303-132 = "E a essa hora, todos os restaurantes próximos já devem estar fechados."
2002303-133 = "[s] \"Comprei naquela barraca ali.\""
2002303-134 = "Uma barraca aberta a essa hora, com tão pouco movimento?"
2002303-135 = "Não pode ser..."
2002303-136 = "Sensei, como era a aparência do vendedor da barraca?"
2002303-137 = "[s] \"Orelhas dobradas, uma cicatriz perto dos olhos... ah, parecia um gato malhado.\""
2002303-142 = "É ele!"
2002303-143 = "Sensei, me guie até o local dessa barraca!"
2002303-147 = "(Depois disso, Kanna encontrou o criminoso, que agia como se nada tivesse acontecido na barraca, e imediatamente o prendeu.)"
2002303-148 = "(No entanto, mesmo após o fim da vigilância, Kanna ainda relutava em aceitar comida...)"
2002303-149 = "(A grande quantidade de comida comprada acabou sendo dividida com as outras alunas.)"
