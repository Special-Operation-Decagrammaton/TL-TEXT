[translation]
10008035-3 = "ぐあぁぁっ……！？"
10008035-4 = "わ、我々の偉大な夢が、今年の初夢が……。"
10008035-10 = "ふう、しょうもないやつらね。"
10008035-11 = "（……どうしてヘルメット団が賽銭箱を？それより、カイテンジャーの逃走ルートをどうやって……？）"
10008035-12 = "（もしかしてこれ、思ったより複雑な……）"
10008035-13 = "っていうか、早く追いかけた方が良くない？こうしてる間にもどんどん逃げられちゃうけど。"
10008035-14 = "そ、そうね！？"
10008035-15 = "ほら、早く行くわよ！"
10008035-17 = "は、はいっ！"
