[translation]
10008035-3 = "Guaaaa...!?"
10008035-4 = "N-Nosso grande sonho, o sonho da primeira noite do ano..."
10008035-10 = "Ufa, que pessoal mais patético."
10008035-11 = "(...Por que o Esquadrão Capacete estaria com a caixa de ofertas? E mais importante, como eles descobriram a rota de fuga dos Kaitenger...?)"
10008035-12 = "(Será que isso é mais complexo do que eu pensava...)"
10008035-13 = "Digo, não seria melhor a gente ir logo atrás deles? Enquanto ficamos aqui parados, eles estão fugindo cada vez mais."
10008035-14 = "V-Você tem razão!?"
10008035-15 = "Vamos, ande logo!"
10008035-17 = "S-Sim, senhora!"
