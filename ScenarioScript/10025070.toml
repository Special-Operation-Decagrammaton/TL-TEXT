[translation]
10025070-1 = "Episódio 7; Churrasco na Madrugada"
10025070-5 = "……Então."
10025070-6 = "Esse cara suspeito quer que a Miyu ensine ele a pescar?"
10025070-7 = "E-Ei, suspeito não... O que tem de errado comigo!?"
10025070-8 = "Você se diz pescador, mas não consegue nem pescar direito, né?"
10025070-9 = "I-Isso é porque..."
10025070-11 = "Bem, a gente quase nunca te viu pescando mesmo."
10025070-13 = "É verdade, mas..."
10025070-15 = "Ah, e ontem na praia, você estava recitando um feitiço estranho..."
10025070-17 = "……."
10025070-18 = "……Não dá mais para esconder."
10025070-19 = "Na verdade, eu... não sou exatamente um pescador, sou um criador de conteúdo que mantém um canal de pesca na internet."
10025070-20 = "Já ouviu falar do 'Canal do Urso Polar'?"
10025070-25 = "E-Ei, Moe?"
10025070-31 = "Dei uma olhada agora, e o canal tem uns 1000 inscritos."
10025070-32 = "……1000 pessoas, isso é muito?"
10025070-33 = "O canal oficial que a SRT usava antes de fechar a escola tinha mais ou menos isso também..."
10025070-35 = "E-Eu sei que o canal é pequeno agora, mas ele vai crescer logo!#nVi na internet que existe um algoritmo para isso...!"
10025070-36 = "Então, como você faz vídeos de pesca se nem sabe pescar?"
10025070-37 = "É que, com o avanço da internet, dá para fazer muita coisa sem precisar pescar de verdade."
10025070-38 = "Unboxing de equipamentos, gameplays de jogos de pesca, vlogs em aquários..."
10025070-39 = "Você pode mesmo se chamar de canal de pesca...?"
10025070-40 = "……Pois é, esse tipo de comentário tem aumentado."
10025070-41 = "Começamos a discutir sobre minhas habilidades e acabei soltando...#nQue no próximo vídeo eu ia pescar um peixe gigante no mar."
10025070-42 = "Mas, na verdade, nunca pesquei nem peixe pequeno, quanto mais um gigante... Então, depois de pensar em como conseguir um peixe grande em pouco tempo, acabei vindo parar na vila de Yatoura."
10025070-43 = "Existe algum segredo para pescar bem na vila de Yatoura?"
10025070-44 = "Ah... vi em algum site que parece existir uma entidade misteriosa no mar desta vila que controla os peixes."
10025070-45 = "Não custa tentar, pensei que se eu fizesse oferendas e orações para eles, até um iniciante como eu conseguiria pescar algo grande."
10025070-52 = "Então o feitiço de ontem era para... pedir uma boa pescaria."
10025070-53 = "Mesmo que um monte de peixe apareça, não adianta nada se você não conseguir pescar, né?"
10025070-55 = "P-Pois é, tentei pedir para os pescadores da vila me ensinarem, mas todos recusaram..."
10025070-56 = "Por favor...! Se eu voltar de mãos vazias, vou virar piada na internet.#nPor favor, me ensine os truques da pesca...!"
10025070-57 = "Peixes grandes podem ser difíceis, mas carapaus são fáceis de pescar, então..."
10025070-58 = "Se não se importar com isso, acho que posso ensinar..."
10025070-59 = "Sério!? Você me salvou!!#n...Não, muito obrigado, mestre!!!"
10025070-60 = "M-Mestre...?"
10025070-62 = "E por falar nisso, por que a gente marcou de se reunir à noite...?"
10025070-63 = "Por causa dessa mudança repentina de planos, a gente nem jantou."
10025070-64 = "D-Desculpa... mas esse horário é o melhor para pescar carapaus..."
10025070-65 = "Poderia ser de manhã, mas como os carapaus não enxergam bem, eles reagem ao cheiro, e como ficam menos alertas, é mais fácil de pescar..."
10025070-66 = "Entendi! Então, qual seria o comprimento ideal para a linha de pesca?"
10025070-67 = "D-Depende do ambiente, mas... um comprimento onde os carapaus estejam nadando...?"
10025070-68 = "Como devo mover a isca para fazer o carapau morder?"
10025070-69 = "Como se ela estivesse viva..."
10025070-71 = "Quando o peixe morder a isca, com que força devo girar o molinete?"
10025070-72 = "É só tomar cuidado para a linha não arrebentar..."
10025070-79 = "……Definitivamente, a Miyu não tem jeito para ser instrutora."
10025070-80 = "Ela é introvertida e aprendeu as habilidades por instinto, né."
10025070-81 = "Para quem é movido pelo instinto, é difícil explicar logicamente os pontos principais."
10025070-82 = "Nesse ritmo, vai ser sorte se ele conseguir pescar um, não vai?"
10025070-87 = "……Eu estava tentando ignorar, mas não dá mais para ficar só olhando."
10025070-93 = "Você é..."
10025070-100 = "Se não quiser desperdiçar a isca, me empreste isso um pouco."
10025070-101 = "Eu vou te ensinar."
10025070-102 = "Ma-mas antes, você disse que não tinha tempo para ensinar forasteiros..."
10025070-103 = "Humpf... É que um certo forasteiro resolveu os problemas por aqui. #nSobrou um tempo, só isso."
10025070-104 = "Toma. Deixe essa vara cara de lado e use isto."
10025070-105 = "……Ué? Essa vara de pescar não tem molinete? #n……Nossa, é muito leve!"
10025070-106 = "Para iniciantes, uma vara simples é o ideal. Como a estrutura é básica, é mais fácil pegar o jeito. Tente lançar uma vez."
10025070-111 = "Quando a ponta afundar, mova a isca como se fosse um ser vivo. #nSiga a correnteza e faça devagar――"
10025070-116 = "Agora!!"
10025070-121 = "Uau!? Está puxando muito forte!!?"
10025070-122 = "Quando sentir que o peso do peixe fisgou o anzol, #npuxe para cima sem deixar que levem sua vara!"
10025070-123 = "Só mais um pouco……!"
10025070-130 = "……Consegui pescar!!"
10025070-132 = "Uau, que tamanho impressionante."
10025070-133 = "Nunca vi um carapau tão grande assim..."
10025070-135 = "In-incrível…… É a primeira vez que pesco algo……!"
10025070-137 = "Muito obrigada!!"
10025070-138 = "Tanta comoção por causa de um carapau..."
10025070-139 = "Entendeu agora? De agora em diante, aprenda a lidar consigo mesma."
10025070-141 = "Dizem que a pesca não é uma luta contra o mar, mas sim contra si mesmo, afinal."
10025070-147 = "Ugh……"
10025070-148 = "A Saki não sabe ler o clima, né."
10025070-149 = "Estava um clima tão bom, poxa~?"
10025070-150 = "I-isso foi um caso de força maior! #nEu não como nada desde cedo……"
10025070-152 = "Falando nisso, já está bem tarde, não é?"
10025070-153 = "Que tal comermos o carapau que pescamos agora pouco?"
10025070-154 = "Concordo!"
10025070-156 = "Eu também, concordo……"
10025070-158 = "Kuhihi. Como será que vou preparar esse carapau?"
10025070-159 = "Será que grelhado no sal...? Não, sashimi também não seria nada mal..."
10025070-161 = "……Só o carapau vai ser pouco, não é?"
10025070-167 = "Toma, pode comer isso também."
10025070-169 = "Isso é……?"
10025070-170 = "Peixe que peguei na pesca da manhã. É pequeno demais para vender, mas garanto que o sabor é bom."
10025070-171 = "Mu-muito obrigada……"
10025070-172 = "Nossa…… Cavala, robalo, polvo e até mariscos……?"
10025070-173 = "I-isso é tão caro, tem certeza que podemos aceitar……?"
10025070-175 = "Eu disse que não servem para venda. Na vila, temos até sobrando."
10025070-176 = "Pode levar sem se preocupar."
10025070-178 = "Muito obrigada!!!"
10025070-187 = "Nossa…… Que cheiro bom desde que começou a assar……"
10025070-188 = "Esse aroma de peixe grelhado…… é irresistível!"
10025070-197 = "Com licença…… é proibido usar fogo aqui, mas……"
10025070-198 = "[s] \"Que cheiro delicioso.\""
10025070-200 = "Ah, Sensei―― e uma aluna da Valkyrie, pelo visto."
10025070-201 = "Digo, não pode usar fogo aqui?"
10025070-202 = "Se tiver permissão da associação, tudo bem, mas…… ah. Então o presidente da associação está com vocês."
10025070-209 = "[ns1] \"É que senti um cheiro bom por perto...\"\n[ns2] \"Pensei em me juntar a vocês, então comprei alguns ingredientes.\""
10025070-212 = "Ingredientes?"
10025070-213 = "Hum... berinjela, cogumelos, manteiga... alho, limão?"
10025070-214 = "Se adicionar o sabor da manteiga com o alho e espremer um pouco de limão no final..."
10025070-215 = "Vai ficar delicioso, com certeza!!"
10025070-216 = "O que você está fazendo, Moe? Coloca logo a manteiga!"
10025070-217 = "Eu já sei disso, não precisa me apressar!"
10025070-219 = "Hahaha. Já que o clima está esquentando, é a vez deste aqui."
10025070-220 = "Deste aqui...?"
10025070-221 = "É claro que é o kusaya!"
10025070-223 = "Ei, espera! Por que você trouxe kusaya?!"
10025070-224 = "O que há de errado com o kusaya? Combina perfeitamente com peixe grelhado."
10025070-225 = "É que o cheiro do kusaya é muito forte, é especial até comparado a outros peixes salgados..."
10025070-226 = "Ora! Se você comer um kusaya de verdade, vai mudar de ideia na hora!"
10025070-227 = "Vou abrir uma exceção e grelhar para vocês. Não se acanhem, experimentem."
10025070-232 = "Argh... com o calor, o cheiro ficou ainda pior...!"
10025070-233 = "Isso não é nada depois que você se acostuma. #nFrancamente, vocês fazem barulho por tudo..."
10025070-239 = "Ugh... o cheiro do kusaya passou para os outros peixes..."
10025070-240 = "Esse cheiro catastrófico... é tão forte que acho que não vai sair do corpo tão cedo..."
10025070-241 = "Mas isso torna o convite ainda mais catastrófico... haa, haa...!"
10025070-242 = "...Moe, se você for comer kusaya, não durma na mesma cama que eu hoje."
10025070-243 = "Que maldade~ Se for assim, é só nós duas ficarmos com cheiro de kusaya juntas."
10025070-245 = "Aí está, Saki, experimenta também."
10025070-246 = "Uwa, pa-pare com isso--!"
10025070-248 = "(Reunidos à beira-mar no meio da noite, passamos um momento divertido fazendo uma festa de peixe grelhado)"
