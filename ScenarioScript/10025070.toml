[translation]
10025070-1 = "第7話;深夜のバーベキュー"
10025070-5 = "……で。"
10025070-6 = "この胡散臭い人が、ミユに釣りを教えてくれって？"
10025070-7 = "う、胡散臭いって……お、オレのどこがだ！？"
10025070-8 = "釣り人を名乗っておいて、ロクに釣りができないんだってな？"
10025070-9 = "だっ、だからそれは……"
10025070-11 = "ま、釣りをしてるところほとんど見てないからねぇ。"
10025070-13 = "それはそう、だけど……"
10025070-15 = "あ、あと、昨日は海辺で、おかしな呪文を唱えてた……"
10025070-17 = "………。"
10025070-18 = "……これ以上は隠せないか。"
10025070-19 = "実はオレ……釣り人ってわけじゃなくて、ネットで釣り関連のチャンネルを運営してる動画投稿者なんだ。"
10025070-20 = "「シロクマちゃんねる」って、聞いたことないか？"
10025070-25 = "え、えっと……モエ？"
10025070-31 = "いま見てみたけど、チャンネル登録者数は1000人くらいだって。"
10025070-32 = "……1000人って、多いのか？"
10025070-33 = "SRTが廃校する前まで動いてた公式チャンネルが、たしか同じくらいだったかも……"
10025070-35 = "い、今は小さいチャンネルだけど、すぐ成長する予定なんだよ！#nそういうアルゴリズムがあるってネットで見てだな……！"
10025070-36 = "で、釣りのやり方も分からないのに、どうやって釣り動画を？"
10025070-37 = "それが最近はネットが発達したおかげで、自分が釣りをしなくても色々できてさ。"
10025070-38 = "釣りグッズの開封とか、釣りゲームの実況とか、水族館のVlogとか……"
10025070-39 = "釣りチャンネルを名乗っていいのか……？"
10025070-40 = "……まさに、そういうコメントが増えてだな。"
10025070-41 = "釣りの腕前で言い合いになって、つい言っちまったんだ……#n次の動画は海で大物を釣ってきてやるって。"
10025070-42 = "でも実際は、大物どころか雑魚すら釣った経験がないもんで……短期間でなんとか大物を釣れないか考えた結果、[ruby=やとうら]夜戸浦[/ruby]村にたどり着いたってわけよ。"
10025070-43 = "夜戸浦村に、釣りが上手くなる秘訣があるんですか？ "
10025070-44 = "やー……どっかのサイトで見たんだけど、この村の海には魚を自由に操る不思議な存在がいるみたいでな。"
10025070-45 = "ダメ元だけど、そいつらに供え物をしたり祈りを捧げれば、オレみたいな初心者でも大物を釣れるかなって。"
10025070-52 = "やはり、昨日の呪文は大漁祈願……のようなものだったんですね。"
10025070-53 = "大量の魚が集まってきたとして、結局自分で釣れなきゃ意味がないだろ？"
10025070-55 = "そ、それで村の漁師さんに教わろうと思ったんだけどよ、全員に断られちゃって……"
10025070-56 = "頼む……！このままボウズで帰ったらネットで笑い者にされちまう。#nどうかオレに釣りのコツを教えてくれないか……！"
10025070-57 = "大きい魚は難しいかもしれないけど、アジなら釣りやすいから……"
10025070-58 = "それでもよければ、教えられると思います……"
10025070-59 = "本当か！？助かったぜ！！#n……いや、ありがとうございます、師匠！！！"
10025070-60 = "し、師匠……？"
10025070-62 = "というか、どうしてまた夜に集合なの……？"
10025070-63 = "急に予定を変えたせいで、私たち夜ごはん食べられてないじゃん。"
10025070-64 = "ご、ごめん……でもアジを釣るにはこの時間が良くて……"
10025070-65 = "朝でも良かったんだけど、アジは目が良くないから臭いで反応してくれるのと、警戒心が薄れるから簡単に釣れるの……"
10025070-66 = "なるほど！では、釣り糸の長さはどれくらいがベストでしょうか？"
10025070-67 = "か、環境にもよるけど……アジが泳いでそうな長さ……？"
10025070-68 = "アジを食いつかせるには、どんな風にエサを動かせば良いでしょうか？"
10025070-69 = "生きているような感じで……"
10025070-71 = "魚がエサに食いついたら、どのくらいの勢いでリールを巻けば良いでしょうか？"
10025070-72 = "糸が切れないように、気をつけてもらえれば……"
10025070-79 = "……やっぱり、ミユは指導員に向かないタイプだな。"
10025070-80 = "内向的だし、スキルも感覚で身につけてるからねぇ。"
10025070-81 = "感覚派だと、押さえるべきポイントを論理的に説明するのは難しいし。"
10025070-82 = "この感じだと、1匹釣れればラッキーじゃないか？"
10025070-87 = "……気にせんようしてたが、これ以上は見てられんな。"
10025070-93 = "あなたは……"
10025070-100 = "エサを無駄にしたくなければ、ちょっと貸してみなさい。"
10025070-101 = "ワシが教えてやろう。"
10025070-102 = "で、でも前は、[ruby=よそもの]余所者[/ruby]に教える暇はないって……"
10025070-103 = "フンッ……どっかの[ruby=・  ・  ・]余所者[/ruby]が面倒事を片付けてくれたもんでな。#n時間が余っただけだ。"
10025070-104 = "ほれ。その高そうな竿は置いて、コレを使え。"
10025070-105 = "……あれ？この釣り竿、リールがないですよ？#n……め、めちゃくちゃ軽い！"
10025070-106 = "初心者には延べ竿がピッタリじゃ。なんせ構造が簡単だから感覚を掴みやすいからの。いっぺん投げてみい。"
10025070-111 = "先端が沈んだところで、エサを生き物のように動かす。#n海流に合わせてゆっくり――"
10025070-116 = "今じゃ！！"
10025070-121 = "うわあ！？すごい引いてますよ！！？"
10025070-122 = "魚の重みで針が合わさったのを感じ取ったら、#n竿を持っていかれないように引き上げろ！"
10025070-123 = "もう、少し……！"
10025070-130 = "……釣れたっ！！"
10025070-132 = "うお、すごい大きさだな。"
10025070-133 = "こんな大きいアジ、初めて見た……"
10025070-135 = "す、すげえ……初めて釣ったぞ……！"
10025070-137 = "ありがとうございます！！"
10025070-138 = "アジくらいで大げさなヤツめ……"
10025070-139 = "今ので分かったか。これからは、自分とよく向き合うことだ。"
10025070-141 = "釣りは、海との闘いではなく己との闘い――と言うくらいじゃからな。"
10025070-147 = "うっ……"
10025070-148 = "サキは空気が読めないねぇ。"
10025070-149 = "せっかくの良い雰囲気だったのにさ～？"
10025070-150 = "い、今のは不可抗力だろ！#n昼から何も食べてないし……"
10025070-152 = "そういえば、もうすっかりこんな時間ですね。"
10025070-153 = "先ほど釣ったアジをみんなで食べるのはどうでしょうか？"
10025070-154 = "賛成！"
10025070-156 = "私も、賛成……"
10025070-158 = "くひひ。このアジ、どう調理してやろうかな。"
10025070-159 = "やっぱ塩焼き……？いや、刺身も悪くないねぇ……"
10025070-161 = "……アジだけじゃ寂しいだろ。"
10025070-167 = "ほれ、こいつも食べるといい。"
10025070-169 = "これは……？"
10025070-170 = "朝の漁で捕れた魚だ。小さいから商品にならんが、味は保証する。"
10025070-171 = "あ、ありがとうございます……"
10025070-172 = "おおっ……サバにスズキ、タコや貝まで……？"
10025070-173 = "こ、こんなに高価なものを、いいんですか……？"
10025070-175 = "商品にならんものだと言ったろう。村じゃ持て余してるくらいじゃ。"
10025070-176 = "気にせず持っていけ。"
10025070-178 = "ありがとうございます！！！"
10025070-187 = "わ……焼きはじめから、いい匂い……"
10025070-188 = "この、焼き魚の香ばしいかおり……たまんな～い！"
10025070-197 = "あの……ここは火の使用が禁止されているんですが……"
10025070-198 = "[s] \"美味しい匂いがするね。\""
10025070-200 = "あ、先生――と、ヴァルキューレの生徒か。"
10025070-201 = "というかここ、火を使っちゃダメなのか？"
10025070-202 = "組合から許可を貰えば大丈夫ですが……って、ああ。組合長がご一緒でしたか。"
10025070-209 = "[ns1] \"近くで良い匂いがしてきたから……\"\n[ns2] \"混ぜてもらおうと思って、食材を買ってきたんだ。\""
10025070-212 = "食材？"
10025070-213 = "ふむ……ナス、きのこ、バター……ニンニク、レモン？"
10025070-214 = "バターとニンニクで風味を足して、仕上げにレモンを絞れば――"
10025070-215 = "ウマいに決まってる！！"
10025070-216 = "何してんだモエ、早くバターを乗せろ！"
10025070-217 = "言われなくても分かってるから、急かさないで！"
10025070-219 = "はっはっは。盛り上がってきたところで、[ruby=・  ・  ・]コイツ[/ruby]の出番かの。"
10025070-220 = "コイツって……？"
10025070-221 = "――「くさや」に決まっておろう！"
10025070-223 = "おわっ、ちょっと！くさやなんて持ってきてどうするんですか！"
10025070-224 = "くさやの何が悪いんじゃ。焼き魚と相性バッチシだろう。"
10025070-225 = "だって、くさやは臭いが強烈で、他の塩漬けと比べても特別……"
10025070-226 = "なっ！本当のくさやを食べたら、そんな考えは変わるに決まっとる！"
10025070-227 = "特別に、このワシが焼いてやる。遠慮せんで食べてみるといい。"
10025070-232 = "くぅっ……熱が加わって、臭いが余計……！"
10025070-233 = "こんなもん、慣れちまえばどうってこたない。#nったく、いちいち騒がしいの……"
10025070-239 = "うぅ……くさやの臭いが、他のお魚にも……"
10025070-240 = "この破滅的な臭い……ここまで強烈だと、しばらく身体から抜けなさそうだねぇ……"
10025070-241 = "でも、それがより破滅的な誘いを……はぁ、はぁ……！"
10025070-242 = "……モエ、お前くさやを食べるなら今日は一緒のベッドで寝るなよ。"
10025070-243 = "ひどいな～、それなら2人一緒にくさやの匂いになっちゃえば良いじゃん。"
10025070-245 = "ほーれ、サキも食べてみなって。"
10025070-246 = "うわっ、やっ、やめろ――！"
10025070-248 = "（夜更けに海辺で集まり、焼き魚パーティーをして楽しいひと時を過ごした）"
