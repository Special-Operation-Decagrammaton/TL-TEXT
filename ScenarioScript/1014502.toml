[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 24/06.]
1014502-1 = "Normal"
1014502-2 = "(Cheguei ao ponto de encontro antes da Kisaki)"
1014502-3 = "(O dia está lindo...)"
1014502-8 = "Então você já tinha chegado."
1014502-9 = "Fui eu quem te convidou, mas acabei me atrasando."
1014502-11 = "(Já que estamos aqui, vou tentar fazer uma brincadeirinha)"
1014502-13 = "[ns1] \"Não se preocupe de forma alguma. É uma honra conhecê-la, Senhora Monshu.\"\n[ns2] \"Para onde deseja que eu a guie?\""
1014502-16 = "Monshu, é? Não acha um tanto grosseiro usar esse título em um lugar como este?"
1014502-17 = "......"
1014502-18 = "Sensei."
1014502-19 = "Viemos até aqui em busca de descanso. Não é isso mesmo?"
1014502-20 = "E, por conta disso,"
1014502-21 = "Sem as amarras dos meus títulos diários. Quem está diante de você agora é――"
1014502-22 = "Apenas Ryuuge Kisaki, e nada mais."
1014502-23 = "[s3] \"Você tem razão...\"\n[s4] \"Desculpe, eu acabei te deixando chateada?\""
1014502-26 = "De jeito nenhum. Não é sobre isso."
1014502-27 = "Eu sei muito bem que aquilo que você disse foi só uma brincadeira."
1014502-28 = "Porém,"
1014502-29 = "Pelo menos no dia de hoje..."
1014502-30 = "Você também poderia agir me tratando apenas como 'Kisaki'?"
1014502-31 = "Claro, eu também me comportarei de acordo."
1014502-32 = "Sabe, eu também..."
1014502-33 = "Gostaria de ser tratada como... uma aluna comum... só um pouquinho."
1014502-34 = "[s] \"Entendido!\""
1014502-36 = "(Decidi que vou atender ao pedido da Kisaki)"
1014502-37 = "(......Mas)"
1014502-39 = "Estava uma delícia~! \nAh, mas e agora, o que a gente faz com os pratos? Tão todos lambuzados de óleo e molho..."
1014502-40 = "É só lavar ali no rio, qual o problema?"
1014502-44 = "Aquilo ali não me parece uma atitude admirável."
1014502-45 = "É o tipo de comportamento passível de punição."
1014502-46 = "No entanto, estamos fora dos limites de Shanhaijing... Não cabe a mim repreendê-los.\nContudo, também não posso simplesmente fechar os olhos..."
1014502-47 = "[s] \"Não acho que deveríamos ir lá intervir pessoalmente...\""
1014502-48 = "É verdade... Porém..."
1014502-49 = "Hm? Tem algum plano em mente, Sensei?"
1014502-51 = "(Liguei para a administração do parque)"
1014502-54 = "Isso causará transtornos aos outros visitantes, portanto, pedimos gentilmente que se abstenham de lavar louças no rio."
1014502-55 = "Tsc... E eu achando que ia dar pra fazer isso escondido."
1014502-56 = "Que saco... Alguém dedurou a gente, né?"
1014502-57 = "Já foi, já foi. Bora sair logo daqui~"
1014502-59 = "Montar barracas perto da água... O que fariam se o nível do rio subisse de repente?"
1014502-60 = "Deveria ter uma placa ali proibindo exatamente isso..."
1014502-61 = "Eles não notaram a placa... Ou estão fingindo que não viram?"
1014502-62 = "As regras nascem com base nos incidentes passados. Não deveriam se expor ao perigo tão abertamente..."
1014502-64 = "(Liguei para a administração do parque de novo)"
1014502-67 = "Isso é perigoso, por favor, movam suas barracas!"
1014502-68 = "Ah, qual é... o lugar aqui era tão bom."
1014502-69 = "Que pé no saco. Deixa a gente fazer o que quiser."
1014502-70 = "(Naquele exato momento, a correnteza do rio aumentou abruptamente e atingiu as barracas!)"
1014502-74 = "Uwaaaah!?"
1014502-76 = "Sensei, acione as equipes de resgate!"
1014502-81 = "(Os turistas foram resgatados em segurança)"
1014502-82 = "(A preocupação e os instintos afiados da Kisaki eram meticulosos demais para os de uma adolescente normal...)"
1014502-84 = "Eles vão pular lá de cima... !?"
1014502-85 = "Rios frequentemente são muito mais profundos do que aparentam na superfície.\nE o contrário também é perigoso."
1014502-86 = "Em um lugar onde não se sabe o que pode acontecer, agir com cautela é a chave da sobrevivência, mas eles...!"
1014502-88 = "(Liguei para a administração do parque mais uma vez)"
1014502-96 = "(Por onde passávamos, a Kisaki ficava ansiosa com as atitudes imprudentes dos turistas, me fazendo contatar a administração do parque repetidas vezes...)"
1014502-97 = "(E com isso, ela não parecia estar curtindo o seu dia de folga nem um pouco)"
1014502-99 = "Ufa... De alguma forma, estou exausta..."
1014502-100 = "[s] \"Ei, Kisaki.\""
1014502-101 = "O que foi?"
1014502-102 = "Deveríamos agir com mais calma... é isso?"
1014502-103 = "Umu... Era exatamente o que eu pretendia fazer, porém..."
1014502-104 = "[s5] \"Eu sei que sim.\"\n[s6] \"Mas eu gostaria que você relaxasse os ombros um pouco e tentasse não se preocupar tanto.\"\n[s7] \"Se acontecer algum problema ou imprevisto, deixa que eu assumo o controle.\""
1014502-108 = "Você está dizendo para eu... me apoiar e ser mimada por você...?"
1014502-109 = "Umu..."
1014502-110 = "......"
1014502-111 = "Isso quer dizer que..."
1014502-113 = "(A Kisaki enlaçou seu braço no meu e segurou a minha mão)"
1014502-115 = "Se é assim, eu posso fazer isto, certo?"
1014502-116 = "Fufu, por que esse espanto todo?"
1014502-117 = "Eu apenas estou seguindo o seu conselho à risca, não estou?"
1014502-119 = "......"
1014502-120 = "Sabe de uma coisa..."
1014502-121 = "Sinto que estou finalmente entendendo o verdadeiro significado de descansar."
1014502-122 = "......"
1014502-123 = "O dia de hoje me fez refletir sobre mim mesma."
1014502-124 = "......Que vexame."
1014502-125 = "Eu mesma pedi que queria passar o dia como uma aluna comum."
1014502-126 = "Mas continuar agindo exatamente da mesma forma de sempre não faz sentido nenhum."
1014502-127 = "[s8] \"Você faz isso inconscientemente, então não precisa se martirizar.\"\n[s9] \"Se livrar de um hábito tão enraizado é bem difícil mesmo.\""
1014502-131 = "Chamar isso de 'costume' pode soar bem, mas... coisas tão entranhadas não podem ser arrancadas apenas pelo próprio esforço."
1014502-132 = "......Eu também não era assim desde o começo."
1014502-133 = "Se você continuar usando uma roupa que não te serve, o seu corpo acaba se amoldando a ela um dia――"
1014502-134 = "Essa é uma verdade cruel, porém realista."
1014502-135 = "Então."
1014502-136 = "Nós ainda temos um resto de tempo sobrando no dia de hoje."
1014502-137 = "Você não me ajudaria, mais uma vez, a tentar passar um dia 'como uma aluna comum'?"
1014502-153 = "[ns] \"Conseguiu se divertir?\""
1014502-154 = "Umu."
1014502-155 = "Estou me sentindo perfeitamente radiante."
1014502-156 = "......Talvez fosse exatamente este tipo de momento que eu ansiava."
1014502-157 = "Realmente, não há como descrever melhor do que isso."
1014502-158 = "――O fato de que nós, seres humanos, nunca conhecemos de fato nossos verdadeiros desejos."
1014502-159 = "Sensei."
1014502-160 = "Acabei te envolvendo no meu capricho. Eu te agradeço."
1014502-161 = "[s] \"De nada. Qualquer hora dessas.\""
1014502-162 = "Fufu."
1014502-163 = "É, tem razão..."
1014502-164 = "Mas, pelo menos por hoje... é o suficiente."
1014502-165 = "[s] \"Eh...?\""
1014502-167 = "(A Kisaki deu um sorriso tranquilo e começou a caminhar em direção à pousada)"