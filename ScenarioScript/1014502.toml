[translation]
1014502-1 = "普通"
1014502-2 = "（キサキより早く待ち合わせ場所に着いた）"
1014502-3 = "（いい天気だ……）"
1014502-8 = "もう来ておったか。"
1014502-9 = "誘ったのは妾だというに、こちらが遅くなってしまったな。"
1014502-11 = "（せっかくだし、冗談を言ってみよう）"
1014502-13 = "[ns1] \"とんでもございません。門主様にお会いできて光栄です。\"\n[ns2] \"どちらにご案内しましょう？\""
1014502-16 = "門主、か。斯様なところでまでそう呼ぶのは無粋ではないかのう？"
1014502-17 = "……。"
1014502-18 = "先生。"
1014502-19 = "今は休息のためにここに来ておる。そうじゃな？"
1014502-20 = "なればこそ。"
1014502-21 = "日頃の肩書には縛られず。其方が相対する妾は――"
1014502-22 = "ただの[ruby=りゅうげ]竜華[/ruby]キサキであるつもりじゃ。"
1014502-23 = "[s3] \"そうだよね……。\"\n[s4] \"ごめん、怒らせちゃったかな。\""
1014502-26 = "まさか。そういうことではない。"
1014502-27 = "先ほどの発言とて、冗談だろうことは分かっておる。"
1014502-28 = "だが、しかしじゃ。"
1014502-29 = "せめて今日くらいは……。"
1014502-30 = "其方からも「キサキ」として接してはくれぬか。"
1014502-31 = "もちろん、妾も相応に振る舞おう。"
1014502-32 = "妾も、その……。"
1014502-33 = "[ruby=・   ・   ・   ・   ・]普通の生徒[/ruby]として扱われてみたい……などと思うのじゃが。"
1014502-34 = "[s] \"分かった！\""
1014502-36 = "（キサキのお願いに応えることにした）"
1014502-37 = "（……のだけれど）"
1014502-39 = "美味しかったね～！#nあ、でも、お皿どうする？油とソースでべとべと……。"
1014502-40 = "川で洗っちゃえば良くない？"
1014502-44 = "あまり褒められたことではないのう。"
1014502-45 = "あれは処罰の対象となりうる行為じゃ。"
1014502-46 = "じゃが、ここ[ruby=せんがいきょう]は山海経の[/ruby]外……妾が指摘することでもない。#nとはいえ、見過ごすわけにも……。"
1014502-47 = "[s] \"私たちが口を出すのはちょっと……。\""
1014502-48 = "そうさな……じゃが……。"
1014502-49 = "ん？先生に何か策があるのかえ？"
1014502-51 = "（管理事務所に連絡した）"
1014502-54 = "他のお客様のご迷惑となりますので、川で食器を洗う行為はご遠慮いただけますようお願い申し上げます。"
1014502-55 = "チェッ……こっそりいけると思ったのに。"
1014502-56 = "ダル……誰かチクったのかな？"
1014502-57 = "もういいじゃん。早く行こ～"
1014502-59 = "水辺にテントを立てるなど……増水したらどうするのじゃ。"
1014502-60 = "ここに立ててはならぬと、張り紙があったはずじゃが……。"
1014502-61 = "目に入っておらぬのか……それとも、見て見ぬふりをしているのか。"
1014502-62 = "掟は過去の事例から生まれるもの。みすみす危険に身をさらすこともないじゃろうに。"
1014502-64 = "（再び管理事務所に連絡をした）"
1014502-67 = "危険ですので、テントを移動させてください！"
1014502-68 = "えー……ここいい場所なのに。"
1014502-69 = "ウザっ。勝手にやるからほっといてよ。"
1014502-70 = "（その時、川が勢いを増してテントに襲いかかる！）"
1014502-74 = "うわああっ！？"
1014502-76 = "先生、救助隊の手配を！"
1014502-81 = "（観光客は無事に救助された）"
1014502-82 = "（キサキの気遣いは非常に細やかで、普通の高校生とは思えないほどだった……）"
1014502-84 = "あんなところから飛び込みを……！？"
1014502-85 = "川というものは、見た目以上に深いこともある。#nその逆も然り、じゃ。"
1014502-86 = "何が起こるか分からぬ地では、慎重に動くことが肝要じゃというのに……！"
1014502-88 = "（管理事務所に連絡した）"
1014502-96 = "（キサキは行く先々で観光客の身勝手な行動に気を揉み、その度に管理事務室へ連絡をしたが……）"
1014502-97 = "（その様子は、休日を楽しんでいるようには見えなかった）"
1014502-99 = "ふぅ……なんだか疲れたのう……。"
1014502-100 = "[s] \"ねえ、キサキ。\""
1014502-101 = "なんじゃ？"
1014502-102 = "もっと気楽に……か。"
1014502-103 = "ふむ……そうしようとは思っておったのじゃが……。"
1014502-104 = "[s5] \"分かってるよ。\"\n[s6] \"でも、気にせず肩の力を抜いてほしいかな。\"\n[s7] \"トラブルが発生したら私がなんとかするからさ。\""
1014502-108 = "甘えて良いと、そう言うのかえ……？"
1014502-109 = "ふむ……。"
1014502-110 = "……。"
1014502-111 = "つまりそれは……。"
1014502-113 = "（キサキが腕を絡めて、手を握ってきた）"
1014502-115 = "こうしてもよい、と？"
1014502-116 = "ふふ、何を驚いておる。"
1014502-117 = "其方の言う通りにしているだけじゃぞ？"
1014502-119 = "……。"
1014502-120 = "そうさな……。"
1014502-121 = "ようやく、休息の意味が分かってきたところじゃ。"
1014502-122 = "……。"
1014502-123 = "今日は己を振り返れたように思う。"
1014502-124 = "……面目ない。"
1014502-125 = "普通の生徒として過ごしたい。そう言ったのは妾だというに。"
1014502-126 = "いつもと同じことをしていては意味を成さぬな。"
1014502-127 = "[s8] \"無意識だろうし、気にしなくていいよ。\"\n[s9] \"習慣を変えるのって難しいよね。\""
1014502-131 = "慣れと言えば聞こえは良いが……染みついたものは、自分だけでは取り除けぬ。"
1014502-132 = "……妾とて、最初からこうではなかった。"
1014502-133 = "合わない服を着続ければ、いつしか身体が服に合わせてしまう――"
1014502-134 = "悲しくも、真実のようじゃな。"
1014502-135 = "して。"
1014502-136 = "今日の猶予はまだ残されている。"
1014502-137 = "改めて、「普通に過ごせる」よう助けてくれぬか？"
1014502-153 = "[ns] \"楽しめた？\""
1014502-154 = "うむ。"
1014502-155 = "晴れやかな気分じゃ。"
1014502-156 = "……妾が求めていたのは、このような時間だったのやもしれぬ。"
1014502-157 = "まったく、言い得て妙じゃな。"
1014502-158 = "――人は、自身の本当の望みを知らない、という話じゃ。"
1014502-159 = "先生。"
1014502-160 = "我が儘に付き合わせてしまったな。礼を言う。"
1014502-161 = "[s] \"どういたしまして。\""
1014502-162 = "ふふ。"
1014502-163 = "そうじゃの……。"
1014502-164 = "ひとまず今日のところは、な。"
1014502-165 = "[s] \"え……？\""
1014502-167 = "（微笑んだキサキは、宿へ向かって歩き出した）"
