[translation]
2001102-1 = "巫女さんのお勉強"
2001102-2 = "（セリカとの約束の場所に向かうと……）"
2001102-3 = "あっ、先生！こっちこっち。"
2001102-4 = "えっと、とにかく来てくれてありがとう、先生。"
2001102-5 = "先生、最近は今まで以上にシャーレのことで忙しいって聞いたのに……。"
2001102-6 = "[s1] \"セリカに呼ばれたら、いつでもすぐ来るよ。\"\n[s2] \"セリカに振り回されるの、好きだから！\""
2001102-7 = "そう、なの……？"
2001102-8 = "[s3] \"もちろん。\""
2001102-9 = "えっ……ちょ、ちょっと待って！？それってもしかして、と、特別、ってこと……！？"
2001102-10 = "そ、そんなこと急に言われても困るっていうか、え、えっ……！？"
2001102-11 = "[s4] \"大事な生徒だからね。\""
2001102-12 = "…………え？"
2001102-13 = "……それって、言葉通りの意味？"
2001102-14 = "うっ、ううっ……！"
2001102-15 = "ああもう、紛らわしいこと言わないでよ！"
2001102-16 = "全くもう、本当に……！"
2001102-17 = "ちょ、ちょっと待ったぁ！私が先生をいつ振り回……"
2001102-18 = "……いや、それなりにあったかもしれないけど、うん……。"
2001102-19 = "と、とにかくそれはごめん！でも今はその……！"
2001102-20 = "わ、私も反省、してるし……。"
2001102-21 = "[s5] \"ごめん、冗談。呼ばれたらいつでも来るよ。\""
2001102-22 = "……はぁ？"
2001102-23 = "って、じゃあ今の私の反省は何だったのさ！？"
2001102-24 = "少しでも申し訳ないと思った私がバカだった……！もうっ！"
2001102-26 = "ああもう、始まる前から疲れた……。"
2001102-27 = "[s] \"えっと、ごめんね？\""
2001102-28 = "はあ、もう良いわよ……先生は相変わらず先生だって分かったし。"
2001102-29 = "それに、先生が私の相談に乗るために、こうやって来てくれたのも事実だし？"
2001102-30 = "そのことは本当にありがたいと思ってるから……。"
2001102-31 = "[s] \"セリカはやっぱり優しいね！\""
2001102-32 = "ああもう、うるさい！話が進まないから黙って！"
2001102-33 = "とりあえず本題！"
2001102-34 = "モモトークでも言ったけど、巫女さんのバイトをしようと思って。"
2001102-35 = "やっぱり普通のバイトとはちょっと違う感じがするでしょ？"
2001102-36 = "だから少しでも知ってるなら、先生にアドバイスとか貰いたいなって思ったんだけど……。"
2001102-37 = "あっ、でもその前にこれ！とりあえず聞くより先に、私なりに調べてみたの。"
2001102-47 = "まずはね、どうやら巫女さんの起源っていうのは――"
2001102-48 = "[s6] \"そこから！？\"\n[s7] \"セリカ、時々やることが極端だよね……。\""
2001102-49 = "え、ダメ……？"
2001102-50 = "え、ダメ……？"
2001102-51 = "あ、もしかしてまず、このバイトを選んだ理由を聞きたいってこと？"
2001102-52 = "まあそんなに大した理由じゃないんだけど。"
2001102-53 = "実は今度のその巫女さんのバイトね、「完璧な巫女さんであればあるほど時給が上がる」っていうシステムなんだって！"
2001102-54 = "そうと聞いたら黙ってられないでしょ！？"
2001102-55 = "[s] \"セリカらしい理由だね……。\""
2001102-56 = "だからとにかく、巫女さんについて詳しくなろうと思って。"
2001102-57 = "より高い時給のために、より完璧な巫女にならないと！だから教えて、先生！"
2001102-58 = "（セリカの目は凄まじい熱意で輝いていた……）"
2001102-59 = "[s] \"巫女さんか……まずは、巫女さんといえば――\""
2001102-61 = "（近くのお店に行って、掃除道具を借りてきた）"
2001102-63 = "……箒？"
2001102-64 = "何で急に……？巫女さんと何か関係あるの？"
2001102-65 = "[s8] \"巫女さんと言えば箒だよ！\"\n[s9] \"箒といえば、巫女さんか魔女かの二択だよ！\""
2001102-66 = "そ、そうなの……？まあ、先生が言うならそうなんだろうけど……。"
2001102-67 = "そ、そうなの……？まあ、先生が言うならそうなんだろうけど……。"
2001102-68 = "で、これを使って何をしたら良いわけ？"
2001102-69 = "[s] \"それはもちろん、掃除を！\""
2001102-70 = "……あ、そのまんまなんだ。っていうか、本当にそれだけで良いの？"
2001102-71 = "うーん、まあ考えてても仕方ないし……"
2001102-73 = "うん、とりあえずやってみよっか！"
2001102-76 = "じゃあこっちの方から……"
2001102-79 = "んしょ、んしょ……！"
2001102-82 = "落ち葉とゴミを、かき集めて、っと……。"
2001102-84 = "[s] \"うん、良い感じ！\""
2001102-85 = "そ、そう？それなら良かったけど……。"
2001102-87 = "あんまり巫女さんへの理解は深まってないような……？"
2001102-89 = "（セリカの活躍で、公園がかなり綺麗になった）"
2001102-91 = "ふう、まあこんなもんかな？じゃあ先生、次は？"
2001102-92 = "[s] \"次は……[ruby=ごへい]御幣[/ruby]！\""
2001102-93 = "ごへい……？"
2001102-98 = "え、えっ？先生？"
2001102-101 = "この、棒の先に紙が何枚も付いてるやつ……これが御幣なんだ？うん、見たことはあるかも。名前は知らなかったけど。"
2001102-102 = "で、これでどうしたら良いの？"
2001102-103 = "……振りながら舞ったり、願いを込めたりする？どういうこと……？"
2001102-104 = "[s] \"とにかくやってみよう！いや、やってください！\""
2001102-105 = "そ、そう言われても……うーんと……。"
2001102-107 = "こ、"
2001102-109 = "こんな感じ……？"
2001102-110 = "うーん、やっぱりよく分かんない……今ので良いの？"
2001102-111 = "[s] \"バッチリ！じゃあ次は……\""
2001102-113 = "（その後もセリカと一緒に色んなことを話しながら、「巫女っぽいこと」を次々とやってもらった）"
2001102-114 = "「スペルカード」……？え、何それ、巫女さんと関係あるの？"
2001102-115 = "バラバラになった玉の欠片を集める……？え、弓矢？どういうこと？"
2001102-119 = "……これ、甘酒？え、そのまま飲んじゃダメなの？どうして？"
2001102-121 = "（そうして、約3時間にわたる熱い語りを経て……）"
2001102-122 = "[s] \"……こんなところかな？\""
2001102-123 = "つ、疲れた……普通のバイトより疲れた……。"
2001102-124 = "巫女さんとしての心構え……。"
2001102-125 = "それが、こんなに大変なことだったなんて……。"
2001102-126 = "でも、これでもしかして巫女さんのバイトはバッチリよね！？"
2001102-127 = "全部を習得できたわけじゃないけど、これくらいやれば……！"
2001102-128 = "[s] \"どうだろう……実は、その……\""
2001102-130 = "（セリカに素直に白状した）"
2001102-132 = "……え、全部ゲームとかアニメの知識？"
2001102-133 = "[s] \"だからあんまり気にしないで。そういうの好きな人はいるかもだけど。\""
2001102-134 = "……。"
2001102-135 = "[s] \"えっと……セリカさん？\""
2001102-137 = "……先生？それってつまり……"
2001102-138 = "今までの時間全部、からかってただけってこと！？ねぇっ！？"
2001102-139 = "ううっ、信じてたのに！口に入れて噛む回数とか覚えたのに！"
2001102-140 = "[s] \"流石セリカ、真面目だね……。\""
2001102-141 = "ああもうっ！！バカ！先生のバカ！"
2001102-143 = "ほんっとにもう………。"
2001102-144 = "何だったのよもう、アニメの知識じゃ無理じゃん……。"
2001102-145 = "偏った知識ばっかり増えた……。"
2001102-146 = "[s] \"ごめん、少しでも役に立つかなって……。\""
2001102-147 = "えぇ……その言い方はズルいじゃん……。"
2001102-148 = "はあ……。"
2001102-149 = "これじゃ相談って言うか、ふたりっきりで今日一日遊んでただけだし……。"
2001102-150 = "……ふたりっきり、か。"
2001102-152 = "はっ！？"
2001102-153 = "い、いや今のはそういう意味じゃなくて、デートとか言いたかったわけじゃないから！？"
2001102-154 = "誤解しないでよねっ！？"
2001102-155 = "[s] \"うん、大丈夫。\""
2001102-156 = "……。"
2001102-157 = "それはそれでなんか違くない！？そこは誤解してくれても良いところでしょ！？"
2001102-158 = "ああもうっ、分からず屋！"
2001102-160 = "（その後背中をぽかぽかと叩かれながら、セリカとしばらく巫女さんの話をした）"
