[translation]
2001102-1 = "Estudos de Miko"
2001102-2 = "（Ao chegar no local combinado com Serika...）"
2001102-3 = "Ah, Sensei! Aqui, aqui."
2001102-4 = "Bem, de qualquer forma, obrigada por vir, Sensei."
2001102-5 = "Ouvi dizer que você tem estado mais ocupado do que nunca com o Schale ultimamente..."
2001102-6 = "[s1] \"Se a Serika me chamar, eu venho na hora.\"\n[s2] \"É que eu gosto de ser levado de um lado para o outro por você!\""
2001102-7 = "É... sério...?"
2001102-8 = "[s3] \"Com certeza.\""
2001102-9 = "Hã... e-espera um pouco!? Isso significa que, por acaso, eu sou... e-especial...!?"
2001102-10 = "D-dizer algo assim do nada é complicado, tipo, hã, é...!?"
2001102-11 = "[s4] \"Você é uma aluna importante, afinal.\""
2001102-12 = "............Hã?"
2001102-13 = "......Isso foi no sentido literal?"
2001102-14 = "Ugh, ugh...!"
2001102-15 = "Ah, chega! Não diga coisas que confundem!"
2001102-16 = "Meu Deus, sério mesmo...!"
2001102-17 = "E-espera aí! Quando foi que eu te levei de um lado para o outro..."
2001102-18 = "......Não, talvez tenha acontecido algumas vezes, mas, é..."
2001102-19 = "B-bem, de qualquer forma, desculpa por isso! Mas agora, tipo...!"
2001102-20 = "E-eu também estou refletindo sobre isso..."
2001102-21 = "[s5] \"Desculpa, foi brincadeira. Eu venho sempre que você me chama.\""
2001102-22 = "......Hã?"
2001102-23 = "Espera, então o que foi essa minha reflexão agora há pouco!?"
2001102-24 = "Eu fui uma idiota por ter sentido qualquer remorso...! Ah, droga!"
2001102-26 = "Ah, meu Deus, já estou cansada antes mesmo de começar..."
2001102-27 = "[s] \"Bem, desculpa, tá?\""
2001102-28 = "Ah, esquece... já entendi que o Sensei continua sendo o Sensei."
2001102-29 = "Além disso, é verdade que você veio até aqui para me ouvir, não é?"
2001102-30 = "Eu sou realmente grata por isso..."
2001102-31 = "[s] \"A Serika é muito gentil, afinal!\""
2001102-32 = "Ah, chega, cala a boca! Assim a conversa não anda!"
2001102-33 = "Indo direto ao ponto!"
2001102-34 = "Como eu disse no Momotalk, estou pensando em trabalhar como Miko."
2001102-35 = "Parece ser um pouco diferente de um trabalho comum, não acha?"
2001102-36 = "Então, pensei que se você soubesse de algo, poderia me dar uns conselhos..."
2001102-37 = "Ah, mas antes disso! Em vez de só perguntar, eu mesma dei uma pesquisada."
2001102-47 = "Primeiro, parece que a origem das Miko é――"
2001102-48 = "[s6] \"Vai começar por aí mesmo!?\"\n[s7] \"Serika, você às vezes é bem extrema...\""
2001102-49 = "Hã, não pode...?"
2001102-50 = "Hã, não pode...?"
2001102-51 = "Ah, será que você queria saber o motivo de eu ter escolhido esse trabalho primeiro?"
2001102-52 = "Bem, não é nada tão importante assim."
2001102-53 = "Na verdade, esse trabalho de Miko tem um sistema onde \"quanto mais perfeita for a Miko, maior será o salário por hora\"!"
2001102-54 = "Se eu ouvi isso, não tem como ficar parada, né!?"
2001102-55 = "[s] \"Um motivo bem a sua cara...\""
2001102-56 = "Por isso, quero aprender tudo sobre as Miko."
2001102-57 = "Para ganhar um salário maior, preciso ser uma Miko perfeita! Então me ensine, Sensei!"
2001102-58 = "（Os olhos de Serika brilhavam com um entusiasmo avassalador...）"
2001102-59 = "[s] \"Miko, hein... Para começar, quando se fala em Miko――\""
2001102-61 = "（Fui até uma loja próxima e peguei alguns materiais de limpeza emprestados）"
2001102-63 = "……Vassoura?"
2001102-64 = "Por que de repente……? Isso tem alguma relação com sacerdotisas?"
2001102-65 = "[s8] \"Falando em sacerdotisas, é vassoura!\"\n[s9] \"Falando em vassoura, é uma escolha entre sacerdotisa ou bruxa!\""
2001102-66 = "É, é mesmo……? Bem, se o Sensei diz, deve ser verdade……."
2001102-67 = "É, é mesmo……? Bem, se o Sensei diz, deve ser verdade……."
2001102-68 = "E, o que eu deveria fazer com isso?"
2001102-69 = "[s] \"Ora, é claro, limpar!\""
2001102-70 = "……Ah, é só isso mesmo. Digo, é sério que é só isso?"
2001102-71 = "Hmm, bem, não adianta ficar pensando……"
2001102-73 = "Certo, vamos tentar logo!"
2001102-76 = "Então, começando por aqui……"
2001102-79 = "Heave, ho……!"
2001102-82 = "Juntando as folhas caídas e o lixo, pronto……."
2001102-84 = "[s] \"Isso, muito bom!\""
2001102-85 = "S-sério? Se você diz, fico feliz……."
2001102-87 = "Sinto que não aprendi muito sobre ser uma sacerdotisa……?"
2001102-89 = "(Graças ao esforço de Serika, o parque ficou bem limpo)"
2001102-91 = "Ufa, acho que é isso? Então, Sensei, qual é a próxima?"
2001102-92 = "[s] \"A próxima é…… Gohei!\""
2001102-93 = "Gohei……?"
2001102-98 = "E-ei? Sensei?"
2001102-101 = "Essa coisa com vários papéis na ponta de um bastão…… isso é um Gohei? Entendi, acho que já vi antes. Só não sabia o nome."
2001102-102 = "E, o que eu faço com isso?"
2001102-103 = "……Dançar enquanto balanço, ou fazer um pedido? O que você quer dizer com isso……?"
2001102-104 = "[s] \"De qualquer forma, vamos tentar! Não, por favor, faça!\""
2001102-105 = "M-mesmo pedindo assim…… hum……."
2001102-107 = "A-assim……"
2001102-109 = "Desse jeito……?"
2001102-110 = "Hmm, ainda não entendi direito…… isso está bom?"
2001102-111 = "[s] \"Perfeito! Então a próxima é……\""
2001102-113 = "(Depois disso, enquanto conversava com Serika sobre várias coisas, ela fez várias \"coisas de sacerdotisa\" uma após a outra)"
2001102-114 = "\"Spell Card\"……? Ei, o que é isso, tem relação com sacerdotisas?"
2001102-115 = "Coletar fragmentos de esferas espalhadas……? Ei, arco e flecha? O que você quer dizer?"
2001102-119 = "……Isso é Amazake? Ei, não pode beber direto? Por quê?"
2001102-121 = "(E assim, após cerca de 3 horas de uma conversa acalorada……)"
2001102-122 = "[s] \"……Acho que é isso?\""
2001102-123 = "E-estou exausta…… mais cansada do que em um trabalho de meio período comum……."
2001102-124 = "A mentalidade de uma sacerdotisa……."
2001102-125 = "Quem diria que seria algo tão difícil……."
2001102-126 = "Mas, com isso, o trabalho de sacerdotisa está garantido, né!?"
2001102-127 = "Não aprendi tudo, mas com isso……!"
2001102-128 = "[s] \"Não sei bem…… na verdade, é que……\""
2001102-130 = "(Confessei honestamente para Serika)"
2001102-132 = "……Ei, tudo isso é conhecimento de jogos e animes?"
2001102-133 = "[s] \"Por isso, não se preocupe muito. Embora possa haver pessoas que gostem disso.\""
2001102-134 = "……."
2001102-135 = "[s] \"Hum…… Serika-san?\""
2001102-137 = "……Sensei? Isso significa que……"
2001102-138 = "Você passou todo esse tempo apenas me provocando!? Ei!?"
2001102-139 = "Ugh, eu acreditei em você! Até decorei quantas vezes mastigar antes de engolir!"
2001102-140 = "[s] \"Como esperado da Serika, você é dedicada...\""
2001102-141 = "Ah, chega!! Idiota! Sensei, seu idiota!"
2001102-143 = "Sério mesmo..."
2001102-144 = "O que foi tudo isso? Não dá para resolver nada só com conhecimento de anime..."
2001102-145 = "Eu só acumulei um monte de conhecimento inútil..."
2001102-146 = "[s] \"Desculpe, eu achei que pudesse ser útil de alguma forma...\""
2001102-147 = "Ei... falar desse jeito é trapaça..."
2001102-148 = "Haa..."
2001102-149 = "Isso nem pareceu uma consulta, a gente só passou o dia inteiro brincando sozinhos..."
2001102-150 = "...Sozinhos, é?"
2001102-152 = "Hã!?"
2001102-153 = "N-não, eu não quis dizer nesse sentido, não estou dizendo que foi um encontro nem nada disso!?"
2001102-154 = "Não entenda errado, tá!?"
2001102-155 = "[s] \"Sim, tudo bem.\""
2001102-156 = "..."
2001102-157 = "Isso também não está certo!? Essa é a parte que você deveria ter entendido errado, não é!?"
2001102-158 = "Ah, chega, você é muito cabeça-dura!"
2001102-160 = "(Depois disso, enquanto levava tapinhas nas costas, conversei com a Serika sobre sacerdotisas por um tempo)"
