[translation]
3202-1 = "A Apresentação Especial da Princesa da Música (2)"
3202-2 = "（E finalmente, chegou o dia da apresentação do \"Festival de Agradecimento de Hyakkiyako\" da Chise）"
3202-3 = "Hoje é o dia da tão esperada apresentação da senhorita Chise!!"
3202-4 = "O festival do ano passado foi ótimo, né! Como será desta vez?"
3202-5 = "Vou tirar muitas fotos da senhorita Chise~~~!"
3202-6 = "No fim das contas, chegou o dia e não conseguimos perguntar nada."
3202-7 = "……Sim."
3202-8 = "Mas não devemos perguntar até que a Chise-chan decida nos contar."
3202-9 = "Nós apenas daremos suporte para que a Chise-chan possa terminar sua apresentação com tranquilidade."
3202-10 = "Então é só observar?"
3202-11 = "Como estamos fazendo agora?"
3202-12 = "Sim, exatamente. O palco pertence à Chise-chan."
3202-13 = "Nós devemos entender os sentimentos da Chise-chan e apoiá-la com tudo o que temos."
3202-14 = "Hum, então somos como uma força que atua nas sombras."
3202-15 = "Nyaha! Eu gosto desse tipo de coisa."
3202-16 = "Senhorita Niya, acho que isso é um pouco diferente, mas……"
3202-17 = "Vamos confiar na Chise-chan e observar."
3202-26 = "Daremos início agora ao \"Festival de Agradecimento de Hyakkiyako\"!"
3202-31 = "\"Festival de Agradecimento de Hyakkiyako\" é uma apresentação tradicional da Academia de Hyakkiyako, realizada para expressar gratidão a todos que contribuem com a academia."
3202-32 = "A apresentação de hoje será conduzida pela ídolo de Hyakkiyako, a Princesa da Música! A senhorita Chise Waraku."
3202-33 = "Então, senhorita Chise, por favor!"
3202-34 = "Sim, vamos lá~"
3202-39 = "Primeiro, teremos uma dança com guarda-chuvas."
3202-40 = "Usando o tingimento índigo, um artesanato da Academia de Hyakkiyako, para representar o espírito inabalável, o azul――"
3202-46 = "――não, quero dizer, com guarda-chuvas cor-de-rosa……#nE-er, ela está nos presenteando com uma dança tão bela quanto as pétalas de cerejeira!"
3202-50 = "A seguir, bonecas Kokeshi feitas com as técnicas tradicionais de Hyakkiyako――"
3202-54 = "――não é isso!#nO-olhem, é a entrada de uma adorável boneca de raposa e um Daruma!"
3202-59 = "Nyaha, parece que ela manteve segredo até das outras pessoas."
3202-60 = "Um festival de agradecimento completamente diferente do anterior……"
3202-61 = "Com isso, as pessoas que vieram ao local certamente ficarão confusas……!"
3202-62 = "Aaaaah! Senhorita Chise, que fofa!!"
3202-63 = "Senhorita Chiseeee!"
3202-64 = "A senhorita Chise está incrível hoje também!"
3202-66 = "……Não parece ser o caso, mas ainda assim!"
3202-71 = "E agora, o \"Festival de Agradecimento de Hyakkiyako\" está…… chegando ao fim."
3202-72 = "Para encerrar, teremos uma palavra da protagonista de hoje, a senhorita Chise."
3202-73 = "Por favor, diga algumas palavras!"
3202-74 = "Por favor, que ela siga o roteiro, pelo menos no discurso……!"
3202-75 = "Pessoal, obrigada por terem vindo hoje~"
3202-79 = "Na verdade, foi um pouco diferente das apresentações de sempre, vocês notaram?"
3202-80 = "Hoje eu queria agradecer especialmente a algumas pessoas, então mudei um pouco as coisas~"
3202-81 = "E-era isso mesmo……!"
3202-82 = "Então, quem seriam essas pessoas especiais para a senhorita Chise!"
3202-83 = "Bem, são……"
3202-85 = "A diretora Niya e a vice-diretora Kaho~"
3202-90 = "Hã!?"
3202-91 = "Ora…… ora, ora, ora?"
3202-95 = "A diretora e a vice-diretora sempre se esforçam para que eu possa me apresentar com alegria~"
3202-96 = "Por isso, hoje, eu queria dizer um muito obrigada para as duas."
3202-97 = "Então, o motivo dos itens da apresentação estarem diferentes era……"
3202-98 = "Para mim e para a Niya-sama...?"
3202-99 = "Então era isso, nyahaha."
3202-100 = "De fato, rosa é a cor que a Kaho mais gosta."
3202-102 = "Você até preparou bonecas que se parecem comigo e com a Niya-sama."
3202-103 = "Hmm, hmmm? A Kaho também pensou nisso?"
3202-104 = "O suco de laranja também... olhando bem, é da marca que a Niya-sama sempre bebe..."
3202-105 = "O copo para o ritual é de um personagem que eu gosto..."
3202-106 = "E o pudim também é a nossa sobremesa favorita..."
3202-107 = "Puxa vida. Essa você ganhou, hein."
3202-108 = "A Chise também tem esse lado, né. Vamos agradecer a ela depois."
3202-109 = "Mas, sobre o daruma se parecer comigo..."
3202-111 = "Waaaaah...! Chise-chan, muito obrigada!"
3202-112 = "Eu não sabia de nada e acabei duvidando da Chise-chan...!"
3202-113 = "Tá tudo bem."
3202-114 = "Diretora Niya, Vice-diretora Kaho. Obrigada por tudo sempre."
3202-115 = "Por isso..."
3202-116 = "Continuem contando comigo, tá?"
3202-118 = "Sim! Chise-chan!!"
3202-119 = "Nyahaha, pode deixar comigo~"
3202-121 = "......Mas, sobre o daruma..."
3202-126 = "——Foi isso o que aconteceu."
3202-127 = "[s1] \"A Kaho e a Niya devem ter ficado emocionadas.\"\n[s2] \"Que bom que elas ficaram felizes.\""
3202-130 = "Sim, a Kaho ficou chorando o tempo todo~"
3202-131 = "A Diretora Niya também ficou muito comovida..."
3202-132 = "Missão cumprida~"
3202-133 = "[s] \"A Chise ama muito o pessoal do Departamento de Yin-Yang, né.\""
3202-134 = "Sim, eu amo."
3202-135 = "Com a diretora e a vice-diretora — estaremos sempre juntas daqui para frente."
3202-136 = "Porque o Departamento de Yin-Yang só está completo com todas nós~"
3202-138 = "A apresentação especial da Princesa do Waraku"
