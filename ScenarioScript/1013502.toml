[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1013502-1 = "Alívio do Estresse "
1013502-3 = "……。"
1013502-4 = "[s] \"……。\""
1013502-5 = "……O que foi?\nPor que está me encarando tanto?"
1013502-6 = "Tem alguma coisa no meu rosto?\nNão, impossível.\nEu conferi no espelho antes de vir."
1013502-7 = "[s] \"Bem,\ncomo eu posso dizer……\""
1013502-8 = "？"
1013502-9 = "[s] \"Eu estava pensando\nem como as coisas deram tão certo.\""
1013502-10 = "……Suponho que sim."
1013502-11 = "[s] \"E... eu também estava pensando\nem como a Kei-chan\ncontinua tão fofa quanto antes……\""
1013502-12 = "E como foi que\no assunto parou nisso?!"
1013502-13 = "[s] \"Por acaso,\nvocê preferia o seu antigo corpo?\""
1013502-14 = "Claro que não!"
1013502-15 = "Eh?\nVocê está perguntando\nse eu não quero ser fofa...?"
1013502-16 = "……。"
1013502-17 = "…………。"
1013502-18 = "………………。"
1013502-19 = "Não é como se\neu odiasse isso... sabe."
1013502-20 = "[s] \"Mas também não gosta?\""
1013502-21 = "I-Isso é……。"
1013502-22 = "……。"
1013502-23 = "……sim."
1013502-24 = "Eu gosto, ok...?!\nSe eu tivesse que escolher, é claro!"
1013502-25 = "[s] \"Fufu.\""
1013502-26 = "O que é engraçado...?"
1013502-27 = "[s] \"Você não consegue mesmo\nser honesta, não é?\""
1013502-28 = "Arghhh~~~~~!!!!!"
1013502-30 = "Aparentemente, este corpo foi projetado\ntendo em mente operações nas linhas de frente, mas……"
1013502-31 = "Mas para algo feito com esse propósito,\nele é muito rígido e engessado."
1013502-32 = "Eh? Você acha que eu deveria aplicar\num pouco de WE-40 nas juntas...?\nComo ousa dizer um absurdo desses?!"
1013502-33 = "Isso não é propriamente um lubrificante,\né mais usado para limpeza de peças!\nIsso não seria a aplicação correta para ele!!"
1013502-34 = "Além do mais,\no 'rígido' foi só força de expressão!"
1013502-35 = "[s] \"Foi mal, foi mal……。\""
1013502-36 = "……Porém,\napesar dos defeitos."
1013502-37 = "É praticamente como ter catado\nalgo do chão e consertado.\nO simples fato dele funcionar propriamente\njá é motivo de sobra para gratidão."
1013502-38 = "Não me entenda mal,\nnão estou irritada com as circunstâncias."
1013502-39 = "Diria que, se eu sinto algo,\né agradecimento por tudo."
1013502-40 = "Nesta vida, raramente conseguimos tudo\nexatamente da forma como desejamos.\nConseguir pelo menos a metade do que queremos\njá é um baita avanço, não concorda?"
1013502-41 = "Por conta disso,\nse eu ainda tenho coisas para queimar,\nacredito que devo queimar todas elas até que tudo vire cinzas."
1013502-42 = "Até que esse fogo\nconsiga alcançar algo inexplorado."
1013502-43 = "De qualquer forma, parece que o destino final\ndesse corpo era o descarte total,\nde uma forma ou de outra."
1013502-44 = "……Ouvindo minhas próprias palavras\nme bateu uma melancolia."
1013502-45 = "[s] \"Como eu disse,\nserá que o antigo não era melhor……？\""
1013502-46 = "Isso!\nÉ completamente!!\nImpossível!!!"
1013502-47 = "Francamente...\nPelo visto, piadas também estão\nfora do seu alcance."
1013502-48 = "Além do mais, este corpo é\nmuito mais delicado do que a aparência sugere."
1013502-49 = "Embora de fora ele possa parecer\napenas um modelo diferente……"
1013502-50 = "Então...\nsabe como é, bem……"
1013502-51 = "[s] \"Todo mundo se importa\nde verdade com você, sabe?\""
1013502-52 = "I-Isso eu já sei!\nNão é isso que eu estava querendo dizer!"
1013502-53 = "Quero dizer, é……"
1013502-54 = "Uma fita,\nou talvez……"
1013502-55 = "……Eu estava me perguntando se não existe algo\npara... prender o cabelo, ou parecido."
1013502-56 = "[s] \"Uma fita?\""
1013502-57 = "……！！"
1013502-58 = "Deixa para lá! Finja que não ouviu nada!\nNão, o Sensei não ouviu absolutamente nada!!"
1013502-59 = "O-O que significa essa cara rindo de mim?!\nEu vou ficar brava para valer, ouviu bem?!"
1013502-60 = "Eh? Você quer falar com a Rio\ne pedir uma……？"
1013502-61 = "Mas por que\na Rio precisaria estar……"
1013502-62 = "……。"
1013502-63 = "……！！"
1013502-64 = "Você está fazendo isso de propósito,\nnão está?!"
1013502-65 = "[s1] \"Claro que não!\nA Rio manja muito dessas coisas……\"\n[s2] \"E eu estou só tentando ajudar\nde todo o coração a minha querida Kei-chan!\""
1013502-70 = "Esse é o seu maior problema,\nsabia?!!!"