[translation]
84301100200-5 = "Posso te perguntar uma coisa?"
84301100200-6 = "Se for algo que eu possa responder."
84301100200-7 = "Do seu ponto de vista, existem lugares onde as pessoas se reúnem ou pontos cegos?"
84301100200-8 = "Claro, eu confio nos alunos do Millennium."
84301100200-9 = "É só que, acho melhor estar ciente disso com antecedência."
84301100200-10 = "Entendo..."
84301100200-11 = "Não é como se você estivesse procurando lugares interessantes para visitar, certo?"
84301100200-12 = "Bem..."
84301100200-13 = "Sinto muito, mas não acho que posso responder."
84301100200-14 = "...Foi uma pergunta indelicada?"
84301100200-15 = "Se foi, peço desculpas—"
84301100200-16 = "Ah, não é isso que eu quis dizer."
84301100200-18 = "Tem um monte! Lugares preocupantes, tem tantos que nem dá para contar!"
84301100200-19 = "...Oh?"
84301100200-20 = "Porque aqui é o Millennium, né? Tem possibilidades por toda parte!#nNão seria estranho se já estivesse acontecendo alguma confusão em algum lugar!"
84301100200-21 = "Além disso, hoje é a Millennium EXPO. É o lugar para exibir os resultados das pesquisas diárias.#nVários clubes acabam se excedendo justamente por causa disso."
84301100200-22 = "O Seminário já deve ter feito as verificações, mas... não há garantias do que pode acontecer depois disso."
84301100200-23 = "É por isso que fomos encarregadas de ser guias.#nProteger os alunos da Trinity de problemas... em suma, somos um seguro."
84301100200-24 = "Isso mesmo! Se algo acontecer, temos que lidar com isso!"
84301100200-26 = "Vocês também passam por dificuldades, hein..."
84301100200-27 = "(Parece que a cultura escolar é mais livre do que eu imaginava.)"
84301100200-28 = "(...Então, vai ser difícil conseguir que elas apontem locais específicos, é?)"
84301100200-29 = "Sendo assim..."
84301100200-34 = "(Será que conseguiria uma resposta diferente se perguntasse aos alunos comuns?)"
