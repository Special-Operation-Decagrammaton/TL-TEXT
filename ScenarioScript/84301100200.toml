[translation]
84301100200-5 = "一つ、聞いても良いかい？"
84301100200-6 = "答えられることなら。"
84301100200-7 = "君の目から見て、人が集まる場所や、死角になるような所はあるだろうか。"
84301100200-8 = "無論、ミレニアムの生徒を信用はしている。"
84301100200-9 = "ただ、先に把握しておくに越したことはないと思ってね。"
84301100200-10 = "なるほど……。"
84301100200-11 = "見学したら面白い場所……とかでは無いんだよな？"
84301100200-12 = "そうだな……。"
84301100200-13 = "悪いが、答えられそうにない。"
84301100200-14 = "……不躾な質問だっただろうか。"
84301100200-15 = "それならば謝罪を――"
84301100200-16 = "あっ、そういう意味じゃないんだ。"
84301100200-18 = "いーっぱいあるの！不安な場所なんて数えきれないくらいだよ？"
84301100200-19 = "……ほう？"
84301100200-20 = "だってここはミレニアムだよ？そこら中に可能性があるんだから！#nもうどっかで騒ぎが起きててもおかしくないくらい！"
84301100200-21 = "それに、今日はミレニアムEXPO。日頃の研究成果を披露する場だ。#nいろんな部活がここぞとばかりに無理をすることもある。"
84301100200-22 = "セミナーのチェックは済んでいるだろうが……その後までは保障されていないからな。"
84301100200-23 = "私たちがガイドを任された理由もそこにある。#nトリニティの生徒をトラブルから守る……要は保険だ。"
84301100200-24 = "そう！何かあったら対処しないといけないからね！"
84301100200-26 = "君たちも苦労しているのだね……。"
84301100200-27 = "（想像よりも自由な校風のようだ）"
84301100200-28 = "（……二人に特定の場所を挙げてもらうのは難しい、か）"
84301100200-29 = "ならば……。 "
84301100200-34 = "（一般の生徒からなら、何か異なる回答を得られるだろうか）"
