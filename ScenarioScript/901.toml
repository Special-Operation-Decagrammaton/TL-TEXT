[translation]
901-1 = "セトの憤怒"
901-3 = "くるしい……くるしい……。 "
901-4 = "……う、うう……。 "
901-8 = "……。"
901-9 = "[ruby=Celestial pantheon]神々の星座[/ruby]……？"
901-10 = "それは…… "
901-11 = "それは小生が属していた世界……あの書に記録されている……超越的な存在たちです……。 "
901-12 = "今ここの概念とは異質的な……ヒヒヒ……はい。超越的な神格の顕現そのもの。 "
901-13 = "この存在たちは「神秘」だとか「恐怖」などで表現することは不可能です……。"
901-14 = "……そうです。強いて言うなら「崇高」以前、いえ、その向こうの観念でしょうか……それを何と呼べばいいのかは分かりませんが……"
901-18 = "……。"
901-19 = "その星座の中の一つの「セトの憤怒」……はい。そうです。 "
901-20 = "よくご存じとは思いますが……これは……砂漠と嵐と雷そのものでもあり、その力が意味する憤怒でもあります……。"
901-21 = "答えに……なりましたでしょうか……？"
901-22 = "でしたら……もう小生には構わないでください……。"
901-23 = "小生の苦行を邪魔しないでください……。"
901-24 = "では……。"
901-26 = "くるしい……。 "
901-27 = "くるしい……くるしい……うう……。"
