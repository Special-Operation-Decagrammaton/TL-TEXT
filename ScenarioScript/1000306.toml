[translation]
1000306-1 = "Consulta de problemas"
1000306-2 = "Academia Trinity - Sala de aula"
1000306-6 = "Ah..."
1000306-7 = "[s] \"Aconteceu alguma coisa?\""
1000306-8 = "Ah? P-Sensei!? Desde quando você está aí?"
1000306-9 = "Ah, você veio porque viu a minha mensagem?"
1000306-10 = "Desculpe, acho que acabei te preocupando à toa..."
1000306-12 = "Na verdade, o problema não é comigo, é sobre uma amiga minha..."
1000306-13 = "Como eu sempre pareço estar nas nuvens e sem preocupações, várias amigas costumam desabafar comigo."
1000306-14 = "Hoje também recebi um pedido de conselho de uma amiga, mas eu não pude fazer nada..."
1000306-15 = "Eu só fiquei ouvindo o que ela dizia e concordando com a cabeça."
1000306-16 = "Se eu não fosse uma pessoa tão comum, se eu tivesse o poder de resolver os problemas de alguma forma, nem eu nem ela estaríamos sofrendo assim..."
1000306-17 = "Fiquei me sentindo mal o dia todo por causa disso... Embora seja inevitável que eu me sinta assim..."
1000306-18 = "Hehe, pensando bem, acabei dizendo algo bem vergonhoso."
1000306-19 = "Mesmo que eu conte para o sensei, a situação da minha amiga não vai se resolver, mas eu precisava muito que alguém me ouvisse..."
1000306-20 = "[s] \"Eu acho que você já está fazendo algo maravilhoso pela sua amiga, Hifumi.\""
1000306-21 = "Eh? Eu, algo maravilhoso...?"
1000306-22 = "Eu só ouvi o que ela tinha a dizer..."
1000306-23 = "Claro, é melhor do que não fazer nada, mas será que só isso é o suficiente...?"
1000306-24 = "[s] \"Isso significa que você é uma amiga em quem ela pode confiar, a ponto de desabafar seus problemas.\""
1000306-25 = "Confiar..."
1000306-26 = "É verdade. Já que ela se deu ao trabalho de confiar em mim, eu não deveria ficar me sentindo para baixo..."
1000306-27 = "Com certeza, é muito melhor continuar apoiando minha amiga do meu jeito de sempre, não é?"
1000306-28 = "Muito obrigada. Graças a você, meu peso diminuiu um pouco."
1000306-29 = "Fufu. É verdade, só de ter alguém para ouvir, a gente se sente muito melhor."
1000306-30 = "Sensei, quando eu estiver preocupada de novo... por favor, me ouça também."
1000306-31 = "Eu confio tanto em você que quero poder fazer isso!"
