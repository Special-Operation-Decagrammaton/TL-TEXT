[translation]
1000306-1 = "お悩み相談"
1000306-2 = "トリニティ総合学園・教室"
1000306-6 = "はあ……。"
1000306-7 = "[s] \"何かあった？\""
1000306-8 = "あっ？せ、先生！？いつからここに？"
1000306-9 = "あ、私のメッセージを見て来てくださったんですか？"
1000306-10 = "すみません、余計な心配をおかけしちゃったかもしれません……。"
1000306-12 = "実は悩みがあるのは私じゃなくて、私の友達のことで……。"
1000306-13 = "私はいつもフワフワしてて悩み事が無さそうに見えるせいか、色んな友達がよく悩み事を打ち明けてくれるんです。"
1000306-14 = "今日もとある友達から相談を受けたんですが、私にできることは何もなくて……。"
1000306-15 = "ただその友達の話を聞いて、相づちを打っているだけでした。"
1000306-16 = "私がこんな平凡な人じゃなかったら、どうにか問題を解決できる力があったら、私もその友達も苦しくならなかったのに……。"
1000306-17 = "その事で一日中暗い気持ちになってしまっていました……私がこうなっても、仕方のないことなのですが……。"
1000306-18 = "えへへ、よく考えてみると、恥ずかしいことを言ってしまいましたね。"
1000306-19 = "先生に言っても、あの友達の事情が解決するわけでもないのですが、どうしても聞いていただきたくて……。"
1000306-20 = "[s] \"ヒフミはもうすでに素敵なことをしてあげてると思うよ。\""
1000306-21 = "え？私が、素敵なこと……？"
1000306-22 = "私はただ、友達の話を聞いてあげただけで……。"
1000306-23 = "もちろん何もできないよりは良いかもしれませんが、それだけで良いのでしょうか……？"
1000306-24 = "[s] \"悩みを話せるくらい、ヒフミは頼れる友達ってことだし。\""
1000306-25 = "頼れる……。"
1000306-26 = "そうですね。せっかく友達が私に頼ってくれたのに、私まで落ち込んじゃダメですね……。"
1000306-27 = "きっと、せめていつも通りの感じで友達を応援する方が、ずっといいですよね？"
1000306-28 = "ありがとうございます。おかげで、悩みが少し軽くなりました。"
1000306-29 = "ふふっ。本当に、誰かが話を聞いてくれるだけで、だいぶ楽になるんですね。"
1000306-30 = "先生も、私が悩んだ時はまた……私の話を聞いてください。"
1000306-31 = "そうしたいと思えるくらい、私も先生のこと、頼りにしてますから！"
