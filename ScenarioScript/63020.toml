[translation]
63020-1 = "Episódio 2; Mesmo assim"
63020-3 = "O que existe... além disso?"
63020-4 = "……！"
63020-5 = "Enquanto ouvia sua história, lembrei-me de antigamente. Por isso, acabei ficando curioso."
63020-6 = "……Dizem que se apegar a lembranças do passado é um sinal de velhice e fraqueza. #nVocê não está decaindo?"
63020-7 = "Talvez. Comparado a antigamente, sinto que meus sentidos ficaram mais lentos."
63020-8 = "Mas, em troca disso, certamente ganhei outras coisas."
63020-9 = "Esse tipo de conversa não é algo para se ter na frente do Sensei, mas..."
63020-10 = "Subaru. Você conhece a história do \"Instrutor Rigoroso e o Centurião Gentil\"?"
63020-11 = "Naturalmente. É um conceito que pode ser considerado indispensável para a gestão de uma organização."
63020-12 = "……Você não pretende dizer que você era esse \"Centurião Gentil\", pretende?"
63020-16 = "De jeito nenhum. Esse papel era seu, não era? #nDe qualquer forma, eu era o \"Instrutor Rigoroso\"."
63020-17 = "Pois as pessoas só conseguem viver da maneira como viveram até agora."
63020-19 = "É verdade. Eu só conseguia interagir com os outros da forma como aprendi e experimentei."
63020-20 = "O esquadrão era composto por elites. #nQuando se assume a liderança, treinos mais rigorosos do que o normal são impostos."
63020-22 = "……No fim das contas, eu não consegui superar o meu próprio passado."
63020-24 = "……É uma história realmente lamentável."
63020-25 = "Francamente... nunca pensei que acabaria tendo que te consolar, mas... não há necessidade de se menosprezar."
63020-26 = "Eu não disse? As pessoas só conseguem viver da maneira como viveram até agora."
63020-27 = "Sim. Eu também pensava assim."
63020-32 = "――Até o tempo em que eu estava em Arius."
63020-36 = "……O que você quer dizer com isso?"
63020-37 = "A forma de pensar das pessoas é, em grande parte, influenciada pela vida que levaram até ali. #nE a mentalidade que se adquire dessa forma acaba reproduzindo a própria vida."
63020-38 = "Sob esse ponto de vista, não se pode dizer que a sua opinião esteja errada."
63020-39 = "Mas... as pessoas possuem algo a mais."
63020-40 = "Isso é algo que... aprendi depois de sair de Arius."
63020-44 = "……E o que isso quer dizer?"
63020-45 = "Quer dizer que entendo bem o seu pensamento. Porque eu era igual a você."
63020-46 = "Mostrar o caminho a seguir para crianças que se perderam e infundir nelas a vontade de viver."
63020-47 = "Isso, ao mesmo tempo, deveria ter se tornado o significado e a vontade da sua própria vida."
63020-48 = "Mas... o que existe além disso? #nCom esse \"jeito de Arius\" que você defende, onde isso vai parar?"
63020-52 = "……Não precisa responder. Porque eu também sei a resposta. #nO que existe lá é... apenas ódio e raiva."
63020-53 = "Não há nada além disso. Não tem significado. Nada resta. É assim que esse método funciona."
63020-54 = "Se eu tivesse permanecido em Arius, sem saber que existia um mundo diferente..."
63020-55 = "Se eu não tivesse conhecido o \"Sensei\"... eu estaria vivendo exatamente da mesma forma que você."
63020-56 = "Continuaria interpretando o \"Instrutor Rigoroso\" para sempre, negando tudo o que eu não conhecia."
63020-57 = "――Enquanto carrego infinitamente no peito um ódio que eu acreditava ser nosso."
63020-58 = "Você pretende me criticar agora, dizendo que esse método está errado?"
63020-59 = "Para começar, não é algo que se possa julgar como certo ou errado."
63020-60 = "É apenas... que conhecer o \"outro\" pode ser útil, é disso que estou falando."
63020-61 = "O mundo exterior que você desconhece. #nQue tal \"aprender\" um pouco sobre ele e repensar as coisas?"
63020-62 = "……Porque a forma de pensar das pessoas muda ou oscila mais facilmente do que se imagina."
63020-63 = "Se alguém que não sabe de nada... por exemplo, a tal senhorita da Trinity que você mencionou, dissesse isso."
63020-64 = "Soaria como uma conversa fiada de um otimista ingênuo, cheia de hipocrisia e engano."
63020-65 = "Mas... e se a opinião for minha ou do esquadrão?"
63020-66 = "……Nós também rastejamos na base da pirâmide, não foi?"
63020-68 = "……Eu também não gostava de otimistas ingênuos."
63020-69 = "Para ser sincero, eu os odiava. Eu só conseguia sentir ódio."
63020-70 = "Sem nem olhar para as partes feias do mundo."
63020-71 = "Eu realmente detestava como eles impunham suas próprias convicções de forma imprudente."
63020-72 = "Mas houve uma exceção. Pelo contrário..."
63020-75 = "[log]Eu quero conversar com Saori de igual para igual.[/log]"
63020-77 = "[log]Se não existe uma chance, basta criá-la.[/log]"
63020-79 = "[log]E se isso não der certo, basta criar a próxima chance.[/log]"
63020-82 = "Conhecendo a crueldade do mundo..."
63020-83 = "Reconhecendo que o mundo é, desde a sua origem, algo feio..."
63020-85 = "Ainda assim, havia alguém que nunca desistia."
63020-86 = "No fim das contas, acabei sendo convencida."
63020-87 = "“Ainda assim”#n... Eu não gostava muito dessa expressão, para ser sincera."
63020-89 = "Não desistir e seguir em frente, mesmo estando em uma situação desfavorável.#nComecei a pensar que essas palavras também têm o seu significado."
63020-90 = "Você fala como se fosse superior, mas... você não é muito diferente, não é?"
63020-91 = "Mesmo sendo uma fugitiva que vive se escondendo!"
63020-96 = "Ah, é verdade."
63020-97 = "Por isso... pretendo parar com isso."
63020-98 = "……Hã!?"
63020-102 = "[ns] \"……O quê!?\""
63020-103 = "Já conversei com as outras três também."
63020-107 = "……Bem, é isso."
63020-108 = "Hehehe...#nSe a Saori-nee decidiu assim, então..."
63020-109 = "Afinal, não dá para continuar vivendo desse jeito para sempre."
63020-110 = "Sensei... sinto muito por ter decidido sem falar nada.#nEu pretendia conversar, mas nunca encontrávamos o momento certo."
63020-111 = "[s1] \"Isso... não tem problema, mas...\"\n[s2] \"Todas vocês, estão realmente bem com isso...?\""
63020-117 = "Sim. Quando este assunto terminar, nós vamos nos entregar."
63020-118 = "……Eu já estou cansada."
63020-119 = "Cansada de viver nas sombras e de não poder caminhar sob a luz do sol."
63020-120 = "Você esqueceu? Vocês são terroristas."
63020-121 = "Cometeram atos de terrorismo com \"intenção assassina\" e \"má fé\"."
63020-122 = "Você nem imagina o tamanho da punição que receberão, não é?"
63020-123 = "Imagino que sim.#n...Mas, ainda assim, é melhor do que continuar assim."
63020-124 = "Assumir a responsabilidade pelos meus próprios atos."
63020-125 = "Não quero mais fugir de mim mesma."
63020-126 = "Quanto às outras alunas de Arius, não precisa se preocupar."
63020-127 = "Direi que tudo foi liderado e executado por mim."
63020-128 = "……Bem, não deixa de ser uma verdade, de certa forma."
63020-129 = "Por isso, você também..."
63020-134 = "[log=니코 스바루][FF6666]O que você quer dizer com isso,[-][FF6666] Saori.[-][/log]"
63020-137 = "……O quê?"
63020-138 = "Estou perguntando o que você quer dizer."
63020-139 = "……Não, esquece, não precisa responder. Está óbvio demais."
63020-140 = "Vai se entregar? Não quer mais fugir?"
63020-141 = "Agora quer bancar a boazinha?"
63020-142 = "Ou acha que se tornou uma sábia que compreendeu a verdade?"
63020-143 = "Acha que pode ter pena do mundo e olhar para tudo com desdém?"
63020-147 = "Acha que conhece o mundo inteiro?"
63020-148 = "Não venha com essa cara de quem sabe tudo, olhando para Arius como se fosse sua propriedade."
63020-149 = "Isso não é... nada diferente do pessoal da Trinity...!"
63020-150 = "Já chega de brincadeira!"
63020-151 = "Você tem olhos, não tem?#nO que mudou desde que você foi embora?"
63020-152 = "Continua sendo um lugar em ruínas! Tem lugares que estão até piores do que naquela época!"
63020-153 = "O que você... acha que sabe sobre qualquer coisa!"
63020-154 = "Vocês também são iguais ao Sensei. Não se importaram com nada!"
63020-155 = "Ainda assim, fui eu quem protegeu tudo até agora! #n— Fomos nós!"
63020-159 = "Mesmo tendo jogado tudo para o alto e fugido!"
63020-160 = "Não é isso. Não pretendo falar de algo tão grandioso."
63020-161 = "Não pretendo me passar por um sábio que alcançou a verdade, e nem tenho tal qualificação."
63020-162 = "Eu, apenas..."
63020-163 = "Apenas—"
63020-166 = "(O céu que olhei pela primeira vez desde aquele dia estava apenas azul e límpido.)"
63020-167 = "(Foi por isso que percebi novamente.)"
63020-168 = "(Ah... certamente este mundo sempre esteve lá, sem nunca mudar.)"
63020-169 = "(O olho não se cansa de ver, e o ouvido não se satisfaz de ouvir.)"
63020-170 = "(O que já existe, existirá novamente depois.)"
63020-171 = "(O que foi feito antes, será feito novamente depois. Não há nada de novo debaixo do sol.)"
63020-172 = "(A felicidade, o sofrimento. A arrogância, a humildade. #n... Até mesmo a raiva e o ódio.)"
63020-173 = "(É exatamente isso—)"
63020-175 = "."
63020-178 = "— Apenas comecei a pensar que a minha vida é preciosa."
63020-179 = "...!"
63020-185 = "[log=니코 스바루]Não diga[/log]"
63020-186 = "[log=니코 스바루]isso.[/log]"
63020-187 = "[log=니코 스바루]Depois de trair[/log]"
63020-188 = "[log=니코 스바루]e fugir,[/log]"
63020-189 = "[log=니코 스바루]por que[/log]"
63020-190 = "[log=니코 스바루]você diz essas coisas?[/log]"
63020-193 = "[log=니코 스바루][FF6666]A vida é preciosa?[-][/log]"
63020-195 = "[log=니코 스바루][FF6666]Então, e quanto a nós[-][FF6666] que estamos aqui?[-][/log]"
63020-198 = "[log=니코 스바루][FF6666]...E quanto a mim, que tentei proteger este ninho[-][/log]"
63020-200 = "[log=니코 스바루][FF6666]pelas crianças que, não importa o que aconteça, um dia voltarão?[-][/log]"
63020-203 = "O passado! Ele nunca desaparece!!"
63020-204 = "Subaru!?"
63020-205 = "O passado permanece para sempre! O passado prova o presente!"
63020-206 = "Isto! Este Porta-Pasis! #nO passado da filial de Arius que está entrelaçado aqui, é o que eu sou!"
63020-207 = "No fim, a coisa mais importante neste mundo é você mesmo. #nSe você morrer, o mundo também morre!"
63020-208 = "Sendo assim... o seu modo de viver e a sua existência são — o próprio mundo!"
63020-209 = "Ninguém vai assumir a responsabilidade pela sua vida. #nPor isso, eu removi a ansiedade das crianças!"
63020-210 = "Para que, não importa o que aconteça, elas consigam sobreviver!"
63020-216 = "Você estava errada, Madame. Esse é um fato que não muda."
63020-217 = "Mas tudo o que você deixou para trás... não foi um erro completo."
63020-218 = "Nada acontece sem sentido. Os eventos ganham significado ao acontecerem."
63020-219 = "Por isso... não deve existir sofrimento sem sentido."
63020-220 = "Da mesma forma que não existe um passado sem sentido."
63020-225 = "N-não está um pouco... estranho...?"
63020-241 = "Sensei! Atrás de nós!"
63020-247 = "...Líder, você provocou um pouco demais."
63020-248 = "N-não... eu não tive a intenção de—"
63020-249 = "Vamos deixar essa conversa para depois."
63020-250 = "Agora—"
63020-256 = "[log]Quando soar o som da trombeta tocada pelo sétimo anjo.[/log]"
63020-258 = "[log]Aquele que destrói a terra, aquele que engana.[/log]"
63020-261 = "[log]Aqueles que mancham esse nome[/log]"
63020-263 = "[log]Finalmente chegou a hora de ser destruído.[/log]"

63020-266 = "――Vamos resolver o que está diante de nós primeiro."
63020-268 = "Próximo episódio: O Anjo Trompetista"
