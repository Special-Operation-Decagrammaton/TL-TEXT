[translation]
70006020-1 = "Gastronomia, biscoitos e primeiros socorros (2)"
70006020-2 = "……O início de tudo foi algo trivial."
70006020-4 = "Hospital Geral Santa Teresa - Lobby"
70006020-5 = "Hmm……."
70006020-9 = "Comandante? Aconteceu alguma coisa? Parece que não está muito bem……."
70006020-10 = "Ah! Então, para te animar, a Hanae vai te dar um incentivo!"
70006020-12 = "Não, estou bem. É só que ouvi alguns boatos estranhos recentemente……."
70006020-14 = "Boatos estranhos?"
70006020-15 = "Será que é…… aquele boato de que \"você coleciona suprimentos médicos porque gosta do cheiro de compressas\"?"
70006020-17 = "Não é isso."
70006020-18 = "Então, aquele boato de que \"você convida todos para o chá apenas para encontrar o próximo alvo de resgate\"?"
70006020-19 = "Não é isso……."
70006020-20 = "O boato de que \"você come biscoitos de proteína escondida para ganhar massa muscular\"……?"
70006020-21 = "Não é isso……!"
70006020-22 = "Ei, não, o que é isso, um atrás do outro……! Agora estou ficando curiosa sobre todos eles!"
70006020-23 = "Não se preocupe! Todos sabem que a verdadeira comandante não é assim!"
70006020-24 = "Se for esse o caso, não é estranho que existam tantos boatos sobre mim?"
70006020-25 = "Eu só queria…… levar o espírito de socorro ao maior número de pessoas possível……."
70006020-27 = "Por que as coisas chegaram a esse ponto……."
70006020-28 = "O que podemos fazer para que a comandante se livre desses boatos estranhos?"
70006020-32 = "Ah……! Que tal isto?"
70006020-33 = "Distribuir biscoitos feitos à mão!"
70006020-34 = "Se receberem biscoitos feitos com carinho, os mal-entendidos não se resolveriam naturalmente?"
70006020-36 = "Boa ideia! Já que vamos fazer isso, por que não fazemos algo fofo? Como pintinhos!"
70006020-37 = "Biscoitos de pintinho…… isso é adorável……."
70006020-39 = "……Foi por isso que decidimos fazer biscoitos de pintinho, mas…… tivemos um problema."
70006020-40 = "Eu…… nunca fiz biscoitos antes."
70006020-41 = "Serina e Hanae me ajudaram a fazer, mas o resultado foi desastroso."
70006020-42 = "Em vez de pintinhos, pareciam… criaturas de outro mundo, algo bem diferente nasceu ali……."
70006020-43 = "Então, recorri a contatos e pedi orientações a uma confeitaria famosa de Trinity, mas……."
70006020-44 = "Por algum motivo, me ensinaram uma receita de alta dificuldade……."
70006020-45 = "Mine-san, você queria biscoitos de pintinho, certo?"
70006020-46 = "Sim. Porque fofura é justiça."
70006020-47 = "Foi nessa época que encontrei a Fuuka-san aqui."
70006020-48 = "Como é perto de Schale, não é estranho que alunas de Gehenna e Trinity se encontrem, mas…… é uma combinação curiosa."
70006020-49 = "O que a traz por aqui?"
70006020-51 = "O motivo… bem, é que… #n\"Ah, não, me envolvi com alguém estranho de novo…\", foi o que pensei……."
70006020-53 = "Certo! As compras de hoje correram bem."
70006020-54 = "Com isso, estou feita por um tempo."
70006020-55 = "……Isso se aqueles ali não me atrapalharem de novo."
70006020-60 = "Hmm……."
70006020-64 = "O-olá… precisa de alguma coisa……?"
70006020-65 = "Olá. Você não tem interesse em atividades de socorro?"
70006020-66 = "……Hã?"
70006020-67 = "Perdoe-me. Meu nome é Aomori Mine, comandante do Esquadrão de Socorro da Academia Trinity."
70006020-69 = "T-Trinity? E ainda por cima a comandante do Esquadrão de Socorro!?"
70006020-70 = "Sim. No momento em que a vi, senti uma conexão."
70006020-71 = "Esse seu olhar atento ao avaliar os ingredientes… era exatamente como o meu ao escolher suprimentos médicos."
70006020-72 = "E-entendo……."
70006020-73 = "E, especialmente, essa sua expressão de quem se preocupa com tantas pessoas. Você também trabalha com \"socorro\", não é?"
70006020-74 = "Socorro...? Bem... eu sou a chefe do Departamento de Refeições, então..."
70006020-79 = "Como eu pensei...! Meus olhos não me enganaram!"
70006020-80 = "Poderia me conceder um pouco do seu tempo?#nSinto que, com você, podemos nos entender."
70006020-81 = "Mas eu sou uma aluna de Gehenna, sabe...?"
70006020-82 = "Diante do \"socorro\", a afiliação não tem significado.#nVocê não concorda?"
70006020-83 = "Bem... sim. #nSe alguém estiver com fome, eu quero servir comida, não importa quem seja..."
70006020-85 = "Embora existam algumas que dão um pouco de trabalho..."
70006020-86 = "\"Algumas que dão trabalho\"...?"
70006020-88 = "—Entendo. Então é por isso que vocês estavam falando da gente."
70006020-89 = "Eu também pretendo ajudar a fazer os biscoitos."
70006020-90 = "Acho que não tem problema nenhum em me dar bem com o Esquadrão de Socorro."
70006020-91 = "Então, desista por hoje. Vamos, pode ir embora. Eu vou comprar os ingredientes para os biscoitos agora."
70006020-92 = "...Tudo bem. O plano de fazer a Fuuka-san preparar nosso almoço ficará em espera."
70006020-93 = "Em troca, se não for pedir muito."
70006020-94 = "Mine-san. Se não for um incômodo, poderia deixar nós, do \"Clube de Pesquisa Gastronômica\", provarmos os biscoitos de pintinho?"
70006020-95 = "Desde que ouvi a história, senti um pressentimento gastronômico."
70006020-96 = "Fufu. Estou curiosa para saber qual é o gosto★"
70006020-97 = "Amo biscoitos! Amo muito!"
70006020-98 = "Se é para provar de graça, então tudo bem, né? Que sorte!"
70006020-100 = "Vocês, como sempre, se recuperam rápido demais..."
70006020-101 = "Provar, é...? De fato, o pessoal do Clube de Pesquisa Gastronômica parece entender mais disso do que nós."
70006020-102 = "Acho que não vai sair nada de bom se deixar eles se envolverem..."
70006020-104 = "Não precisa se preocupar. Pretendemos nos limitar apenas a ser os \"provadores\"."
70006020-105 = "Se a Fuuka-san estiver ajudando, não há risco de saírem biscoitos estranhos."
70006020-106 = "Bem, eu vou me esforçar para que isso não aconteça, mas..."
70006020-107 = "Comandante Mine, o que faremos?"
70006020-108 = "Eu sou a favor! Estou ansiosa para fazer doces com vocês!"
70006020-110 = "Entendo, então aceitarei a oferta... Pessoal, conto com vocês."
70006020-111 = "Estou com um mau pressentimento..."
70006020-128 = "(Algum tempo depois...)"
70006020-130 = "Sala de aula de culinária de Trinity"
70006020-131 = "Ah! Que cheiro bom! Será que os biscoitos já estão prontos?"
70006020-132 = "Já estão quase prontos. Espere quietinha."
70006020-134 = "Ouviu só? Vamos nos preparar também."
70006020-135 = "Acabamos vindo para a sala de aula de culinária de Trinity, mas... tem certeza de que está tudo bem?"
70006020-137 = "Sim, claro. É só aproveitar conforme o planejado."
70006020-141 = "Conforme o planejado."
70006020-142 = "Como assim, \"conforme o planejado\"... Vocês pretendem explodir tudo se não estiver gostoso!?"
70006020-143 = "Fufu, bem. Quem sabe."
70006020-145 = "Pessoal! Desculpem a demora!"
70006020-146 = "Os biscoitos da Comandante Mine ficaram prontos!"
70006020-152 = "Ufa..."
70006020-154 = "Comandante, mostre para todos!"
70006020-155 = "Eles certamente ficarão surpresos."
70006020-157 = "C-certo, entendi."
70006020-158 = "...Aqui estão!"
70006020-164 = "Ora. Vejam só..."
70006020-165 = "A aparência está perfeita."
70006020-166 = "Não são adoráveis? Dá até dó de comer!"
70006020-167 = "Incrível, incrível! Já posso comer!?"
70006020-169 = "Ser elogiada assim me deixa um pouco envergonhada...#nMas será que vão acreditar que fui eu quem fiz?"
70006020-170 = "Dizem que onde há fumaça, há fogo, mas..."
70006020-171 = "Boatos são apenas boatos. Se você acreditar em tudo, acabará perdendo a essência das coisas.#nÉ preciso olhar para a pessoa à sua frente. Assim, você verá que os boatos sobre a Mine-san estão errados."
70006020-172 = "Sério mesmo...!!"
70006020-174 = "Uau! Que bom, Comandante!"
70006020-175 = "Com isso, acho que as outras pessoas também vão conhecer a verdadeira Comandante!"
70006020-177 = "Espero que sim..."
70006020-178 = "Então... vamos à degustação."
70006020-183 = "Hehehe. Será que começo comendo pela cabeça? Ou pelo corpo?"
70006020-184 = "Acho que pela cabeça ela sofre menos, não acha?★"
70006020-186 = "Então, vamos comer...!"
70006020-197 = "E-este sabor...!"
70006020-198 = "Ora, ora..."
70006020-199 = "Nunca na minha vida comi um biscoito assim...!"
70006020-200 = "Como posso dizer..."
70006020-201 = "Está delicioso...!!"
70006020-203 = "O sabor do ovo e a doçura se espalhando pela boca... é irresistível!"
70006020-204 = "A textura crocante... o ponto de cozimento está perfeito."
70006020-205 = "Tem um gosto fofo! Já comi muitas coisas, mas é a primeira vez que sinto um 'gosto fofo'!"
70006020-206 = "...Cozinhar é saborear também os sentimentos de quem preparou."
70006020-207 = "Deste biscoito, consigo sentir a sinceridade da Mine-san."
70006020-208 = "Ah, isso é uma verdadeira iguaria."
70006020-209 = "U-um elogio desses..."
70006020-210 = "Fico muito feliz. Ser reconhecida pelo Clube de Pesquisa Gastronômica me deu confiança."
70006020-211 = "Para ser sincera, eu estava preocupada com o que faria se desse errado..."
70006020-212 = "Fufu. Ainda bem que não precisei explodir este lugar."
70006020-213 = "Então você estava mesmo planejando isso!?"
70006020-214 = "Mas não estava delicioso?"
70006020-215 = "Sim, sim! Ei, posso comer tudo isso?"
70006020-217 = "Claro. Tem bastante, então pode comer o quanto quiser."
70006020-218 = "Eba!"
70006020-220 = "Com isso, com certeza você conseguirá transmitir seus sentimentos para muitas pessoas!"
70006020-221 = "Sim! Acho que a Hasumi-san, do Comitê de Implementação da Justiça, também vai adorar!"
70006020-223 = "A vice-presidente Hasumi... espero que ela não ria de mim."
70006020-225 = "Ela é uma pessoa muito consistente quando se trata de sobremesas, então não tem como ela rir deste biscoito!"
70006020-226 = "Talvez este biscoito ajude a diminuir a distância entre vocês duas!"
70006020-228 = "Hu-hum..."
70006020-229 = "De qualquer forma, obrigada a todos. Sinto que, graças a vocês, consegui dar um passo à frente."
70006020-230 = "Especialmente à Fuuka-san, que me ajudou muito e fez um biscoito maravilhoso—"
70006020-234 = "Fuuka-san?"
70006020-236 = "Ué? Para onde ela foi? Ela estava aqui até agora pouco..."
70006020-237 = "Pensando bem, ela não estava aqui desde a hora da degustação..."
70006020-239 = "Bem, pessoal do Esquadrão de Socorro, nós já vamos..."
70006020-240 = "Nnh...!! Nnhhh-!!"
70006020-241 = "Fuuka-san!? Por que você está amarrada!?"
70006020-242 = "Quando foi que vocês pegaram a Fuuka-san...!?"
70006020-243 = "Foi quando vocês estavam ocupados ouvindo as opiniões sobre os biscoitos."
70006020-244 = "Pareciam estar completamente hipnotizados pelos biscoitos prontos★"
70006020-245 = "Naquele breve momento...?"
70006020-247 = "Ufufu. Nós passamos muito tempo com a Fuuka-san. Isso é moleza para nós."
70006020-248 = "Não é algo para se dizer com tanto orgulho, é...?"
70006020-249 = "Mmmph! Mmmmmmph!!"
70006020-250 = "A Fuuka está dizendo que quer preparar o almoço logo!"
70006020-251 = "Então vamos nessa. Primeiro, vou entrar em contato com a Juri..."
70006020-256 = "Ah, Haruna-san. Como foi? Você encontrou a veterana...?"
70006020-257 = "Sim, nós a "protegemos" com sucesso."
70006020-258 = "Parece que a Fuuka-san estava apenas ocupada escolhendo os ingredientes."
70006020-259 = "Entendo! Desculpe pelo incômodo, mas por favor, continue cuidando da veterana!"
70006020-260 = "Deixe conosco. Já estamos a caminho para levá-la de volta."
70006020-264 = "Bem, nós já vamos indo."
70006020-265 = "Obrigada pelos cookies★"
70006020-272 = "Que tipo de tratamento é esse com uma amiga...!"
70006020-273 = "Vou atrás deles! Onde houver necessidade de socorro, lá estarei!!"
70006020-278 = "U-um buraco na parede..."
70006020-279 = "Ahaha... parece que vai ser difícil desfazer esse mal-entendido por um bom tempo."
70006020-281 = "Clube de Pesquisa Gourmet...! Não vou deixar vocês escaparem!!"
70006020-282 = "Ufufu, desta vez vocês não vão nos pegar...!"
70006020-283 = "Mmmph! Mmmmmmmph!!!"
70006020-290 = "(Depois disso, uma perseguição frenética se desenrolou)"
70006020-291 = "Gastronomia, cookies e socorro"
