[translation]#[Texto Final. - Filipe 08/07.]
70006020-1 = "Gastronomia, Biscoitos e Socorro (2)"
70006020-2 = "……Tudo começou com algo simples."
70006020-4 = "Hospital Geral Santa Teresa – Saguão"
70006020-5 = "Hmm……"
70006020-9 = "Capitã? O que foi? Parece abatida……"
70006020-10 = "Ah! Então vou dar uma animada!"
70006020-12 = "Não, está tudo bem. Só ouvi uns boatos estranhos……"
70006020-14 = "Boatos estranhos?"
70006020-15 = "Será que é…… o boato de que 'reúne remédios porque gosta do cheiro de cataplasma'?"
70006020-17 = "Não."
70006020-18 = "Então, 'convida todos para o chá para encontrar o próximo paciente'?"
70006020-19 = "Não……"
70006020-20 = "O boato de que 'come biscoito de proteína escondido para ganhar força'?"
70006020-21 = "Não mesmo!"
70006020-22 = "Hã, mas que isso…… todos me deixaram curiosa!"
70006020-23 = "Não se preocupe! Todo mundo sabe que a capitã não é assim!"
70006020-24 = "Então por que tantos boatos?"
70006020-25 = "Eu só queria…… espalhar o espírito do resgate para o maior número de pessoas……"
70006020-27 = "Por que isso……"
70006020-28 = "Como fazer os boatos pararem?"
70006020-32 = "Ah…… que tal assim?"
70006020-33 = "Distribuir biscoitos caseiros!"
70006020-34 = "Com biscoitos feitos com carinho, os mal-entendidos vão desaparecer!"
70006020-36 = "Boa ideia! Vamos fazer algo fofo? Tipo um pintinho!"
70006020-37 = "Biscoito de pintinho…… que fofo……"
70006020-39 = "……Foi assim que decidimos fazer biscoitos de pintinho, mas…… tivemos um problema."
70006020-40 = "Eu…… nunca fiz biscoitos."
70006020-41 = "Serina e Hanae me ajudaram, mas o resultado foi desastroso."
70006020-42 = "Em vez de pintinhos, saíram…… criaturas de outro mundo…… algo totalmente diferente."
70006020-43 = "Então, por indicações, fui a uma confeitaria famosa de Trinity……"
70006020-44 = "mas por algum motivo, me deram uma receita difícil demais……"
70006020-45 = "A Mine queria biscoitos de pintinho, certo?"
70006020-46 = "Sim. Fofo é justiça."
70006020-47 = "Foi então que encontrei a Fuuka aqui."
70006020-48 = "Perto da Schale, não é estranho ver alunos de Gehenna e Trinity juntos, mas…… é uma combinação incomum."
70006020-49 = "Como isso aconteceu?"
70006020-51 = "O motivo…… bem.#nFoi tipo: 'ah, mais uma encrenqueira'……"
70006020-53 = "É! A compra de hoje foi boa."
70006020-54 = "Com isso, tô tranquila por um tempo."
70006020-55 = "……se aquelas não atrapalharem."
70006020-60 = "Hmm……"
70006020-64 = "O-olá…… posso ajudar?"
70006020-65 = "Olá. Se interessa por resgate?"
70006020-66 = "……Hã?"
70006020-67 = "Desculpa. Sou Mine, capitã da Ordem dos Cavaleiros de Resgate de Trinity."
70006020-69 = "T-Trinity? A capitã do resgate!?"
70006020-70 = "Sim. Quando te vi, senti uma conexão."
70006020-71 = "Seu olhar apurado para escolher ingredientes…… igual ao meu ao escolher equipamentos médicos."
70006020-72 = "É-verdade……"
70006020-73 = "Principalmente sua expressão de preocupação com os outros. Você também trabalha com 'resgate'?"
70006020-74 = "Resgate……? Bom, sou chefe da cantina……"
70006020-79 = "Sabia! Meu olho não falha!"
70006020-80 = "Podemos conversar um pouco?#nSinto que nos entenderíamos."
70006020-81 = "Mas sou de Gehenna……"
70006020-82 = "Diante do 'resgate', filiações não importam.#nNão concorda?"
70006020-83 = "Bom…… sim.#nSe alguém está com fome, quero alimentar, seja quem for……"
70006020-85 = "Mesmo que sejam umas encrenqueiras……"
70006020-86 = "'Encrenqueiras'……?"
70006020-88 = "――Entendo. Por isso nos contaram."
70006020-89 = "Também vou ajudar a fazer biscoitos."
70006020-90 = "Não custa se dar bem com a Ordem."
70006020-91 = "Então desista hoje. Vamos comprar os ingredientes."
70006020-92 = "……Tudo bem. Vou adiar o plano do almoço com a Fuuka."
70006020-93 = "Em compensação, Mine……"
70006020-94 = "Se não se importar, pode deixar a degustação dos biscoitos com o 'Clube de Gastronomia'?"
70006020-95 = "Desde que ouvi a história, senti o cheiro da boa comida."
70006020-96 = "Fufu. Estou curiosa★"
70006020-97 = "Amo biscoitos! Adoro!"
70006020-98 = "Degustação é de graça, né? Que bom!"
70006020-100 = "Vocês se recuperam rápido, hein……"
70006020-101 = "Degustação…… é, vocês entendem mais do que nós."
70006020-102 = "Acho que não vai dar coisa boa……"
70006020-104 = "Não se preocupe. Vamos ser só 'provadoras'."
70006020-105 = "Se a Fuuka ajudar, não vai dar ruim."
70006020-106 = "Bom, vou tentar não deixar isso acontecer……"
70006020-107 = "Mine, o que acha?"
70006020-108 = "Aprovo! Estou animada para fazer doces com vocês!"
70006020-110 = "É, vou aceitar a oferta…… obrigado a todos."
70006020-111 = "Tô preocupada……"
70006020-128 = "(Tempo depois……)"
70006020-130 = "Sala de Culinária de Trinity"
70006020-131 = "Ah! Cheiro bom! Os biscoitos tão quase prontos?"
70006020-132 = "Já vão sair. Espera aí."
70006020-134 = "É o que ela diz. Vamos nos preparar."
70006020-135 = "Viemos à sala de culinária de Trinity…… mas é seguro?"
70006020-137 = "Claro. É só se divertir conforme o plano."
70006020-141 = "Conforme o plano."
70006020-142 = "Conforme o plano…… se não for gostoso, vai explodir!?"
70006020-143 = "Fufu, quem sabe."
70006020-145 = "Pessoal! Desculpem a demora!"
70006020-146 = "Os biscoitos da Mine ficaram prontos!"
70006020-152 = "Ufa……"
70006020-154 = "Capitã, mostre a todos!"
70006020-155 = "Eles vão se surpreender."
70006020-157 = "T-tá."
70006020-158 = "……Aqui!"
70006020-164 = "Ora, ora……"
70006020-165 = "A aparência está perfeita."
70006020-166 = "Que fofo! Dá até dó de comer!"
70006020-167 = "Que lindo! Posso comer?"
70006020-169 = "Com tanto elogio, fico sem graça……#n……mas vão acreditar que fui eu que fiz?"
70006020-170 = "Onde há fumaça, há fogo, dizem……"
70006020-171 = "Boatos são só boatos. Se acreditar em tudo, perde a essência.#nÉ preciso olhar para a pessoa. Vejo que os boatos sobre você estão errados."
70006020-172 = "Sério……!!"
70006020-174 = "Uau! Que bom, capitã!"
70006020-175 = "Assim, todos vão conhecer a capitã de verdade!"
70006020-177 = "Tomara……"
70006020-178 = "Então…… vamos provar."
70006020-183 = "Hehe. Como como primeiro? Pela cabeça ou pelo corpo?"
70006020-184 = "Pela cabeça causa menos sofrimento★"
70006020-186 = "Então, vou comer……!"
70006020-197 = "E-este sabor……!"
70006020-198 = "Ora, ora……"
70006020-199 = "Nunca comi um biscoito assim……!"
70006020-200 = "Isso é……"
70006020-201 = "Delícia!!"
70006020-203 = "O sabor de ovo torrado e doce na boca…… maravilhoso!"
70006020-204 = "A textura crocante…… o ponto está perfeito."
70006020-205 = "Tem gosto de fofo! Já comi de tudo, mas gosto fofo é a primeira vez!"
70006020-206 = "……Cozinhar é saborear o sentimento do cozinheiro."
70006020-207 = "Esse biscoito transmite a sinceridade da Mine."
70006020-208 = "Ah, uma verdadeira iguaria."
70006020-209 = "S-são palavras tão gentis……"
70006020-210 = "Estou muito feliz. Ser reconhecida pelo Clube de Gastronomia me deu confiança."
70006020-211 = "Para ser sincera, estava preocupada de dar errado……"
70006020-212 = "Fufu. Ainda bem que não precisei explodir o lugar."
70006020-213 = "Então era essa a intenção!?"
70006020-214 = "Mas estava gostoso, né?"
70006020-215 = "É! Posso comer tudo?"
70006020-217 = "Claro. Tem bastante, comam à vontade."
70006020-218 = "Uhul!"
70006020-220 = "Com isso, com certeza vou conseguir transmitir meus sentimentos!"
70006020-221 = "Sim! A Hasumi da Comissão de Justiça também vai gostar!"
70006020-223 = "A Hasumi…… espero que ela não ria."
70006020-225 = "Ela é consistente quando se trata de sobremesas, não vai rir!"
70006020-226 = "Talvez esses biscoitos possam aproximar vocês duas!"
70006020-228 = "H-hmm……"
70006020-229 = "De qualquer forma, obrigado a todos. Sinto que dei um passo."
70006020-230 = "Especialmente a Fuuka, que me ajudou muito, e os biscoitos ficaram――"
70006020-234 = "Fuuka?"
70006020-236 = "Ué? Cadê ela? Estava aqui até agora……"
70006020-237 = "Agora que percebi, ela sumiu desde a degustação……"
70006020-239 = "Então, Cavaleiros de Resgate, nós vamos indo……"
70006020-240 = "Hmm……! Hmm――!!"
70006020-241 = "Fuuka!? Por que amarrada!?"
70006020-242 = "Quando levaram a Fuuka?"
70006020-243 = "Foi quando vocês estavam dando suas opiniões sobre os biscoitos."
70006020-244 = "Pareciam completamente distraídas com os biscoitos prontos★"
70006020-245 = "Naquele instante……?"
70006020-247 = "Ufufu. Passamos muito tempo com a Fuuka. Isso é fichinha."
70006020-248 = "Não é motivo de orgulho……?"
70006020-249 = "Hmm! Hmm――!!"
70006020-250 = "A Fuuka disse que quer fazer o almoço logo!"
70006020-251 = "Então vamos. Primeiro, avisar a Juri……"
70006020-256 = "Ah, Haruna. Conseguiu achar a senpai?"
70006020-257 = "Sim, a 'resgatamos'."
70006020-258 = "A Fuuka só estava ocupada comprando ingredientes."
70006020-259 = "Entendo! Desculpe o incômodo, mas continuem cuidando dela!"
70006020-260 = "Pode deixar. Vamos levá-la de volta."
70006020-264 = "Então, nós vamos."
70006020-265 = "Obrigado pelos biscoitos★"
70006020-272 = "Que tratamento com uma amiga……!"
70006020-273 = "Vamos atrás! – Socorro onde há necessidade!!"
70006020-278 = "U-um buraco na parede……"
70006020-279 = "Ahaha…… vai ser difícil acabar com os boatos."
70006020-281 = "Clube de Gastronomia! Não vão escapar!!"
70006020-282 = "Ufufu, dessa vez não vou ser pega……!"
70006020-283 = "Hmm! Hmm――!!"
70006020-290 = "(Em seguida, uma perseguição frenética aconteceu)"
70006020-291 = "Gastronomia, Biscoitos e Socorro"