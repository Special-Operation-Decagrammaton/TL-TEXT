[translation]
1000102-1 = "Regulação de temperatura corporal"
1000102-2 = "Millennium - Dentro do prédio escolar"
1000102-4 = "Ufa... bom trabalho na missão de hoje, Sensei."
1000102-5 = "[s] \"Bom trabalho para você também, Eimi.\""
1000102-6 = "Muito bem..."
1000102-8 = "Eimi começou a tirar a roupa de repente."
1000102-9 = "[s] \"O-o que você está fazendo!?\""
1000102-10 = "Hm? Estou tirando a roupa, aconteceu alguma coisa?"
1000102-11 = "Por que estou tirando a roupa de repente? Bem... é porque está calor, não é?"
1000102-12 = "Não pode tirar a roupa só porque está calor? #nMas, se eu continuar vestida, o calor do meu corpo não vai conseguir escapar, certo?"
1000102-13 = "Para dissipar o calor, tirar a roupa é o método mais eficiente."
1000102-14 = "[s] \"Mas não é vergonhoso tirar a roupa aqui fora?\""
1000102-15 = "Vergonhoso...? #nSer vergonhoso atrapalha em algo na execução da missão?"
1000102-16 = "[s] \"De qualquer forma, não pode tirar a roupa.\""
1000102-17 = "Entendi. Então, que outro método seria bom para baixar a temperatura corporal sem precisar tirar a roupa?"
1000102-18 = "Hmm..."
1000102-19 = "[s] \"Que tal tomar um sorvete?\""
1000102-20 = "Sorvete? É verdade, comer algo gelado baixa a temperatura corporal... #nTalvez seja uma boa forma de me refrescar."
1000102-21 = "[s] \"Vamos até a sorveteria fora da escola. Eu pago para você.\""
1000102-22 = "Tudo bem, mas nesse caso, eu pago o sorvete do Sensei."
1000102-23 = "Como assim, por quê? É mais "eficiente", não é?"
1000102-24 = "Fufufu... Vamos logo, Sensei. #nAntes que o suor seque."
1000102-26 = "Depois disso, dividi um sorvete com a Eimi e comemos juntos."
