[translation]
10052100-1 = "Gebura: Um árbitro corajoso que vai além da racionalidade."
10052100-3 = "……."
10052100-4 = "Por que novamente... um ambiente como um mar gelado! ?"
10052100-5 = "[s] \"Tenho certeza que é só nesta área...\""
10052100-6 = "Eu sei que! Estou com raiva de Gebura! #nPor que você é tão exigente com o ambiente frio?"
10052100-7 = "Foi o mesmo com Kokuma... Acho que cada profeta tem seu terreno ou ambiente favorito...?"
10052100-8 = "Eu vejo. É o mesmo que Chefe Himari discutindo com Eimi sobre a temperatura do refrigerador."
10052100-9 = "Como sempre digo, Amy simplesmente não sente muito frio, certo?"
10052100-10 = "Me sinto mal pelo Chefe Himari, mas para mim também é um ambiente nostálgico."
10052100-11 = "Seguindo o sinal do Decagrammaton que foi repentinamente detectado no mar gelado... acabei lutando contra Gebura."
10052100-12 = "[s] \"Então esta foi a primeira missão de Toki.\""
10052100-13 = "sim. Esta foi minha primeira missão como membro do Departamento de Investigação de Fenômenos Peculiares junto com meu sensei."
10052100-14 = "Além disso, estava muito frio naquela época. #nQuando vi Amy, me contive com entusiasmo."
10052100-15 = "O que você acha, senhor? Quando você me vê trabalhando duro, não quer me elogiar?"
10052100-16 = "[s] \"Toki sempre faz o seu melhor.\""
10052100-17 = "obrigado. Mas ainda não é suficiente. #nEu sou Toki, então exijo mais do meu sensei."
10052100-18 = "……sensei. Não é bom ser muito doce, certo?"
10052100-19 = "[s] \"...Parece?\""
10052100-20 = "é assim mesmo. Eu não posso evitar. Pois bem, ficarei um pouco longe e me sentirei solitário e deprimido."
10052100-21 = "Ah, isso! Não está frio agora...?"
10052100-22 = "sim. Este traje tem excelente proteção contra o frio, então o frio não é problema. #nObrigado pela sua preocupação, Yuzu."
10052100-23 = "...Ah! Se ele não tivesse a função de proteção contra o frio, ele poderia ter usado isso como desculpa para se agarrar ao seu sensei...? Que erro o que você fez comigo..."
10052100-25 = "Toki. Retomaremos a investigação no local em breve."
10052100-26 = "Acredita-se que a origem de Gebura seja uma sonda não tripulada colocada em uma base de pesquisa polar. #nComo sempre, sua IA foi hackeada por Dekagramaton."
10052100-27 = "Se eu usasse a expressão do Dekagramaton, ela seria chamada de \"inspiração\" em vez de hacking... mas vamos deixar isso de lado por um momento."

10052100-28 = "O que estou curioso é o que e como eles foram capazes de se transformar até esse ponto."
10052100-34 = "Ei, ei...! ?"
10052100-35 = "Você está aqui."
10052100-39 = "Sensei, por favor, dê orientação."
