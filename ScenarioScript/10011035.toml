[translation]
10011035-4 = "な、何なのさあいつら～！？"
10011035-5 = "[s] \"魑魅一座……。\""
10011035-6 = "す、魑魅一座って……あの噂の問題児集団！？"
10011035-7 = "「魑魅一座・気まぐれ流」、と名乗っていました！"
10011035-8 = "私も、聞いたこと、あります……「魑魅一座・気まぐれ流」は、魑魅一座の中でも、特に好戦的、と言われていて……。"
10011035-11 = "百鬼夜行の、伝統的なお祭り以外は、認めず……それ以外は全部、禁止しようと、するですとか……"
10011035-13 = "毎月のように、お祭り商品券を、要求してきたり……。"
10011035-15 = "陰陽部も、お祭り運営委員会も、自分たちの要求を受け入れてくれないから……って、どうにかお祭りを、自分たちが好きなように楽しもうと……そのために戦う、お祭り強硬派だ、と聞きました。"
10011035-17 = "何その漫画に出てきそうな悪役！"
10011035-18 = "[s] \"お祭り強硬派……？\""
10011035-20 = "第一、どうしてそんなやつらが私たちを襲うわけ！？"
10011035-24 = "大変です！お姫様役の方が、誘拐されてしまいました！"
10011035-28 = "お姫様役って……。"
10011035-29 = "つまり……"
10011035-30 = "イブキ殿！？"
10011035-31 = "[s] \"魑魅一座、もしかして交流会の邪魔をしようと……？\""
10011035-32 = "通報、しないと……！陰陽部か、百花繚乱に、早く……！"
10011035-33 = "ま、待った！それはダメ！"
10011035-37 = "[ns] \"？\""
10011035-38 = "あ、その、"
10011035-39 = "通報したらその、公演が……！"
10011035-41 = "……万魔殿のメンバーの誘拐です。"
10011035-42 = "外部に知られたら外交問題、学園間の抗争に発展しても不思議ではありません。"
10011035-43 = "そ、そうそう！だから知らせない方が良いんじゃないかなって……！"
10011035-44 = "特にゲヘナの議長はヤバい人だって聞くし、万が一これが万魔殿に知られたりなんかしたら……！"
10011035-45 = "[s] \"それについてはもう遅いかも……。\""
10011035-49 = "イブキが誘拐、ですか……万魔殿として、見過ごせない一大事ですね。"
10011035-54 = "え、万魔殿！？あなたが！？"
10011035-55 = "エエエェェェ！？もう完全にアウトじゃん！？"
10011035-56 = "外交問題待ったなしですか！？"
10011035-57 = "うぅ、何てことに……。"
10011035-58 = "はぁ……。"
10011035-59 = "[s] \"イロハ、その、落ち着いて状況を整理しよっか……。\""
10011035-60 = "何を仰るんですか、先生。私は今も、すごく冷静ですが。"
10011035-65 = "[ns] \"ちょっとそうは見えないかなー……？\""
10011035-66 = "はぁ、全くもう……。"
10011035-67 = "これだから私は反対だったんです。イブキにとって思い出になるのは良いことですが、やはり危険すぎました。"
10011035-68 = "全く、マコト先輩が強行するから……どう責任取ってくれるんですか……。"
10011035-69 = "[s] \"それについては一旦、マコトに言ってもらって……。\""
10011035-73 = "はぁ、気持ち的には憤懣遣る方無いところですが……。"
10011035-74 = "う、あ……。"
10011035-75 = "えっと、その……。"
10011035-76 = "ご、ごくり……。"
10011035-77 = "……まあ、結論としては一緒ですね。公に知らせるわけにはいきません。"
10011035-78 = "百鬼夜行とゲヘナの間で、政治的軋轢やら紛争やらを起こすわけにはいきませんから。"
10011035-79 = "……！"
10011035-81 = "[ns] \"イロハ……！\""
10011035-82 = "そっちの方が面倒になりそうなので。私は楽な方が好きです。"
10011035-83 = "[s] \"そういう理由だとは思ったけど……！\""
10011035-84 = "もしこれを知ったらマコト先輩は大暴れでしょうし、サツキ先輩は――"
10011035-85 = "まあ最終的にはいつも通り、私とイブキが振り回されることになるんでしょう。そういうのはもう疲れてるので。"
10011035-86 = "ですので、公に知らせるというのは無しですね。"
10011035-87 = "では、私たちは、どうすれば……。"
10011035-88 = "……やるしかない。"
10011035-89 = "部長？"
10011035-90 = "こうなったら方法は一つ！"
10011035-91 = "[s] \"方法って、つまり……。\""
10011035-92 = "外部に知られる前に、この事件を片付ける！"
10011035-93 = "つまりこの場にいる私たちで、イブキちゃんを助けるってこと！"
10011035-95 = "なるほど……！"
10011035-96 = "たしかに、その手がありましたね！"
10011035-97 = "私たちだけじゃなくて、ここには万魔殿の偉い人も、シャーレの先生もいる！"
10011035-98 = "だから、うん！きっと大丈夫なはず！"
10011035-99 = "[s] \"確かに、それがベストかもしれないけど……。\""
10011035-101 = "事態を隠し通すにしても、救出のためには動かなくてはいけません。誤魔化しながら動くには、制約が強いですが……"
10011035-105 = "あ～あ～、テステス……みなさん、聞こえてます～？"
10011035-109 = "[ns] \"飛行船からの、放送……？\""
10011035-111 = "にゃははは～♪みなさん、公演は楽しんでくれてますか～？"
10011035-112 = "万魔殿のみなさんのご協力もあり、スペシャルバージョンでお送りする今回の公演！"
10011035-113 = "少々予定外のこともありましたが、ご覧の通り「体験型イベント：和楽姫」がスタートしました！"
10011035-114 = "さあ、こちらをご覧ください！"
10011035-126 = "現在、お姫様を誘拐した悪党が逃走中！"
10011035-127 = "さあ果たして、誘拐されたお姫様を最初に救い出すのはいったい誰なのか？"
10011035-128 = "無事救出できた方には、私たち陰陽部から特別な賞品もプレゼント予定ですので……"
10011035-129 = "百鬼夜行にお越しのゲヘナ生のみなさん、そしていつも映画村を楽しんでくださる百鬼夜行生のみなさん。"
10011035-130 = "どうぞ、奮ってご参加ください♪"
10011035-131 = "私たちはそれとなく応援してますので～、にゃははっ！"
10011035-136 = "[ns] \"……なるほど。\""
10011035-137 = "……まだ事情を知らない人たちには「公演が続いてる」とアピールする。"
10011035-138 = "これで周囲の目を誤魔化す、と。悪くない選択です。"
10011035-139 = "あんの陰険部長め……じゃなくて、さ、さすがは陰陽部の部長！これならある程度の時間は稼げるかも！"
10011035-140 = "よし、もっと状況は分かりやすくなったかも！"
10011035-141 = "事態が深刻になる前に、私たちの手でイブキさんを救出する！"
10011035-143 = "はい、危機とあればそこから救い出すのが忍びの役目ですので！"
10011035-144 = "イブキさん、今頃心細くて、泣いてるかもしれません……行きましょう！"
10011035-145 = "……イブキ、すぐ迎えに行きます。"
10011035-146 = "[s] \"よし、じゃあ行こうか。\""
10011035-148 = "（まだ、まだ大丈夫……！公演を成功させて、忍術研究部の正式認可を貰う……）"
10011035-149 = "（大口を叩いちゃったし、イズナとツクヨよりも頑張らないと……。）"
10011035-150 = "（まだ、何とかなるはず……！）"
