[translation]
10011035-4 = "Q-quem são eles, afinal!?"
10011035-5 = "[s] \"O Chimi Ichiza...\""
10011035-6 = "O-o Chimi Ichiza? Aquele grupo de encrenqueiros que todo mundo comenta!?"
10011035-7 = "Eles se autodenominaram 'Chimi Ichiza - Estilo Caprichoso'!"
10011035-8 = "Eu também já ouvi falar... Dizem que o 'Chimi Ichiza - Estilo Caprichoso' é a facção mais beligerante dentro do Chimi Ichiza..."
10011035-11 = "Eles não aceitam nada que não seja um festival tradicional de Hyakkiyako... e tentam proibir todo o resto..."
10011035-13 = "Eles ficam exigindo vales-presente de festival quase todo mês..."
10011035-15 = "Como nem o Departamento Yin-Yang nem o Comitê Executivo do Festival atendem às exigências deles... ouvi dizer que eles são radicais do festival que lutam para aproveitar o evento do jeito que bem entendem."
10011035-17 = "Que tipo de vilão de mangá é esse!?"
10011035-18 = "[s] \"Radicais do festival...?\""
10011035-20 = "E, acima de tudo, por que eles nos atacariam!?"
10011035-24 = "É uma emergência! A pessoa que interpreta a princesa foi sequestrada!"
10011035-28 = "A pessoa que interpreta a princesa..."
10011035-29 = "Ou seja..."
10011035-30 = "Ibuki-dono!?"
10011035-31 = "[s] \"Chimi Ichiza, será que eles estão tentando atrapalhar o evento de intercâmbio...?\""
10011035-32 = "Precisamos denunciar...! Rápido, para o Departamento Yin-Yang ou para a Hyakka Ryoran...!"
10011035-33 = "E-espera! Isso não pode!"
10011035-37 = "[ns] \"?\""
10011035-38 = "Ah, é que..."
10011035-39 = "Se denunciarmos, a apresentação vai..."
10011035-41 = "...É o sequestro de um membro do Pandemonium."
10011035-42 = "Se isso chegar a ouvidos externos, não seria surpresa se virasse um problema diplomático ou um conflito entre escolas."
10011035-43 = "I-isso mesmo! Por isso acho melhor não avisar ninguém...!"
10011035-44 = "Dizem que a presidente de Gehenna é uma pessoa perigosa, e se o Pandemonium descobrir isso por acaso...!"
10011035-45 = "[s] \"Quanto a isso, talvez já seja tarde demais...\""
10011035-49 = "Ibuki foi sequestrada...? Como Pandemonium, é um assunto sério que não podemos ignorar."
10011035-54 = "Eh, Pandemonium!? Você!?"
10011035-55 = "Eeeeh!? Já não estamos completamente ferrados!?"
10011035-56 = "O problema diplomático é inevitável!?"
10011035-57 = "Ugh, que situação..."
10011035-58 = "Haa..."
10011035-59 = "[s] \"Iroha, vamos tentar manter a calma e organizar a situação...\""
10011035-60 = "O que está dizendo, Sensei? Eu estou extremamente calma agora."
10011035-65 = "[ns] \"Não parece muito, sabe...?\""
10011035-66 = "Haa, francamente..."
10011035-67 = "É por isso que eu era contra. É bom que a Ibuki tenha memórias, mas era perigoso demais."
10011035-68 = "Francamente, a Makoto-senpai insistiu tanto... como ela vai se responsabilizar por isso..."
10011035-69 = "[s] \"Sobre isso, vamos deixar para falar com a Makoto depois...\""
10011035-73 = "Haa, sinto uma frustração imensa, mas..."
10011035-74 = "U-ah..."
10011035-75 = "Bem, é que..."
10011035-76 = "G-gulp..."
10011035-77 = "...Bem, a conclusão é a mesma. Não podemos tornar isso público."
10011035-78 = "Não podemos permitir que surjam atritos políticos ou conflitos entre Hyakkiyako e Gehenna."
10011035-79 = "...!"
10011035-81 = "[ns] \"Iroha...!\""
10011035-82 = "Porque isso seria muito mais trabalhoso. Eu prefiro o caminho mais fácil."
10011035-83 = "[s] \"Eu imaginei que fosse por esse motivo...!\""
10011035-84 = "Se a Makoto-senpai descobrir, ela vai causar um alvoroço, e a Satsuki-senpai..."
10011035-85 = "Bem, no final das contas, como sempre, eu e Ibuki acabaremos sendo arrastadas para isso. Já estou cansada desse tipo de coisa."
10011035-86 = "Portanto, nada de avisar publicamente."
10011035-87 = "Então, o que devemos fazer...?"
10011035-88 = "…Não temos escolha a não ser agir."
10011035-89 = "Chefe?"
10011035-90 = "Se chegamos a esse ponto, só existe um jeito!"
10011035-91 = "[s] \"Um jeito, ou seja...\""
10011035-92 = "Resolver esse incidente antes que chegue aos ouvidos de todos!"
10011035-93 = "Ou seja, nós que estamos aqui vamos salvar a Ibuki-chan!"
10011035-95 = "Entendo...!"
10011035-96 = "Com certeza, essa é uma ótima ideia!"
10011035-97 = "Não somos apenas nós, aqui também estão os figurões do Pandemonium e o Sensei do Schale!"
10011035-98 = "Então, sim! Com certeza vai dar tudo certo!"
10011035-99 = "[s] \"Certamente, pode ser a melhor opção, mas...\""
10011035-101 = "Mesmo que tentemos manter a situação em segredo, precisamos agir para o resgate. As restrições são severas para agirmos sem levantar suspeitas, mas..."
10011035-105 = "Ah~ ah~, testando, testando... pessoal, estão me ouvindo~?"
10011035-109 = "[ns] \"Uma transmissão... vinda do dirigível?\""
10011035-111 = "Nyahaha~♪ Pessoal, estão aproveitando a apresentação~?"
10011035-112 = "Com a colaboração do pessoal do Pandemonium, estamos trazendo esta apresentação em uma versão especial!"
10011035-113 = "Houve alguns imprevistos, mas como podem ver, o \"Evento Interativo: Princesa Waraku\" começou!"
10011035-114 = "Vamos lá, olhem para cá!"
10011035-126 = "Neste momento, o vilão que sequestrou a princesa está em fuga!"
10011035-127 = "Então, quem será que vai conseguir resgatar a princesa sequestrada primeiro?"
10011035-128 = "Para quem conseguir realizar o resgate com sucesso, nós do Clube Yin-Yang daremos um prêmio especial, então..."
10011035-129 = "Aos alunos de Gehenna que vieram a Hyakkiyako, e aos alunos de Hyakkiyako que sempre aproveitam a Vila Cinematográfica."
10011035-130 = "Por favor, participem com entusiasmo♪"
10011035-131 = "Nós estaremos torcendo discretamente por vocês~, nyahaha!"
10011035-136 = "[ns] \"...Entendi.\""
10011035-137 = "…Eles estão anunciando para quem ainda não sabe da situação que \"a apresentação continua\"."
10011035-138 = "Com isso, eles enganam os olhos de quem está em volta. Não é uma má escolha."
10011035-139 = "Aquela chefe traiçoeira... digo, é, como esperado da chefe do Clube Yin-Yang! Com isso, talvez a gente consiga ganhar um tempo!"
10011035-140 = "Ótimo, talvez a situação tenha ficado mais fácil de entender!"
10011035-141 = "Antes que a situação fique grave, vamos resgatar a Ibuki com nossas próprias mãos!"
10011035-143 = "Sim, pois o papel de um ninja é resgatar aqueles que estão em perigo!"
10011035-144 = "A Ibuki deve estar se sentindo sozinha e chorando agora... vamos!"
10011035-145 = "…Ibuki, estou indo te buscar agora mesmo."
10011035-146 = "[s] \"Certo, então vamos lá.\""
10011035-148 = "(Ainda, ainda dá tempo...! Vou fazer a apresentação ser um sucesso e conseguir a aprovação oficial do Clube de Pesquisa Ninjutsu...)"
10011035-149 = "(Eu falei demais, então preciso me esforçar mais que a Izuna e a Tsukuyo...)"
10011035-150 = "(Ainda deve ter um jeito...!)"
