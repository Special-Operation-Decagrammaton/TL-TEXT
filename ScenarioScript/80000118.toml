[translation]
80000118-1 = "クレープの点数は……"
80000118-2 = "（キララから「落第しちゃうかも！」というメッセージを受けて、ゲヘナの調理実習室へ向かった）"
80000118-4 = "こっちこっち！"
80000118-5 = "聞いてよ先生！"
80000118-6 = "調理実習の評価が超ヤバいの！！"
80000118-7 = "[s] \"それにしてはテンション高いね！？\""
80000118-8 = "め～っちゃ気持ち込めて作ったのに！"
80000118-9 = "中身がちょーっとこぼれちゃったくらいで減点ってひどくない！？"
80000118-10 = "うん？作ってるもの？"
80000118-11 = "……チョコクレープ！"
80000118-12 = "うすーく焼いたクレープ生地に、チョコをたーっぷり載せるのがポイントなんだ♪"
80000118-13 = "なんだけど……生地を焼くのが難しくてさぁ……。"
80000118-14 = "[s] \"じゃあ、一緒にやってみようか。\""
80000118-15 = "ほんとに！？やった～♪"
80000118-17 = "（その後、キララと一緒にクレープ作りを始めた）"
80000118-18 = "（生地の厚さから火加減の調整まで、試行錯誤を重ね……）"
80000118-19 = "（なんとか、丸くて綺麗なクレープを焼き上げることができた……！）"
80000118-21 = "うわ、めっちゃ綺麗にできた！"
80000118-22 = "これにチョコクリームを塗って～♪"
80000118-23 = "チョコとチョコアイス、トッピングをたっぷり載せて♪#nまいちゃえば……。"
80000118-28 = "ジャーン！バレンタインのチョコクレープ、出来上がり♪"
80000118-29 = "どうどう？何点？"
80000118-30 = "[s] \"私が評価するの？\""
80000118-31 = "……本当は調理実習がヤバいってのウソなんだ。"
80000118-32 = "今日ってバレンタインじゃん？#nどーしても、先生に手作りのクレープを食べてもらいたくって！"
80000118-33 = "さ、食べて食べて♪#n味はどう？"
80000118-34 = "[s] \"う～ん……これは……！\""
80000118-35 = "これは……？"
80000118-36 = "[s] \"最高だね……！\""
80000118-37 = "あははっ、ありがと、先生♪"
80000118-39 = "（チョコレートが盛り沢山のクレープを、キララと一緒に食べた）"
