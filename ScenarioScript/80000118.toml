[translation]
80000118-1 = "A nota do crepe é..."
80000118-2 = "（Recebi uma mensagem da Kirara dizendo \"Vou acabar reprovando!\" e fui até a sala de aula de culinária de Gehenna）"
80000118-4 = "Aqui, aqui!"
80000118-5 = "Escuta só, Sensei!"
80000118-6 = "Minha avaliação na aula de culinária está um desastre total!!"
80000118-7 = "[s] \"Mas você parece bem animada para quem está em apuros!?\""
80000118-8 = "Eu coloquei todo o meu carinho nisso!"
80000118-9 = "Não é um absurdo perder pontos só porque o recheio transbordou um pouquinho!?"
80000118-10 = "Hm? O que eu estou fazendo?"
80000118-11 = "......Um crepe de chocolate!"
80000118-12 = "O segredo é colocar bastante chocolate em uma massa de crepe bem fininha♪"
80000118-13 = "Mas é que... assar a massa é tão difícil..."
80000118-14 = "[s] \"Então, vamos tentar fazer juntos?\""
80000118-15 = "Sério!? Obaaa♪"
80000118-17 = "（Depois disso, comecei a fazer o crepe junto com a Kirara）"
80000118-18 = "（Desde a espessura da massa até o ajuste do fogo, tentamos várias vezes...）"
80000118-19 = "（De alguma forma, conseguimos assar um crepe redondo e perfeito...!）"
80000118-21 = "Uau, ficou muito bonito!"
80000118-22 = "Agora é só passar o creme de chocolate~♪"
80000118-23 = "Colocar bastante chocolate, sorvete de chocolate e coberturas♪#nE se eu enrolar assim..."
80000118-28 = "Tcharam! Crepe de chocolate de Dia dos Namorados, pronto♪"
80000118-29 = "E então? Que nota eu tiro?"
80000118-30 = "[s] \"Eu que tenho que avaliar?\""
80000118-31 = "......Na verdade, é mentira que eu estava indo mal na aula de culinária."
80000118-32 = "Hoje é Dia dos Namorados, né?#nEu queria muito que você provasse um crepe feito por mim, Sensei!"
80000118-33 = "Vai, come logo♪#nO que achou do sabor?"
80000118-34 = "[s] \"Hmm... isso é...!\""
80000118-35 = "Isso é...?"
80000118-36 = "[s] \"Está incrível...!\""
80000118-37 = "Ahaha, obrigada, Sensei♪"
80000118-39 = "（Comi o crepe cheio de chocolate junto com a Kirara）"
