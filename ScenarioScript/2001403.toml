[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
2001403-1 = "A Coelha Perdida" 
2001403-2 = "Estrada na Montanha - Arredores de D.U." 
2001403-3 = "Phew, conseguimos bem mais do que eu imaginava." 
2001403-4 = "Essa cesta não vai dar conta, deveríamos ter trazido uma maior." 
2001403-5 = "Com essa quantidade, acho que a gente consegue sobreviver comendo só brotos de arália por uma semana... não, um mês inteiro!" 
2001403-6 = "[s] \"Isso é ótimo, mas... tem certeza de que eles vão durar um mês inteiro?\"" 
2001403-7 = "É claro que vamos processá-los para não estragarem, ué." 
2001403-8 = "Podemos salgar, secar ao sol... existem vários métodos para isso." 
2001403-9 = "[s] \"Você sabe bastante sobre brotos de arália, Saki.\"" 
2001403-10 = "Não é que só os brotos de arália sejam especiais, mas..." 
2001403-11 = "Eu diria que o meu foco são as plantas silvestres e cogumelos em geral.\nA grande vantagem é poder encontrar isso em qualquer lugar na natureza." 
2001403-12 = "Em situações onde não podemos contar com o abastecimento normal de suprimentos, as plantas silvestres se tornam uma fonte vital de alimento." 
2001403-13 = "Porém, muitas delas possuem alta toxicidade.\nPortanto, é crucial observar atentamente antes de coletar para saber se são seguras para consumo..." 
2001403-14 = "......Ou seja, tudo isso também é um tipo de treinamento de sobrevivência!" 
2001403-15 = "Mas, de tanto focar em colher e ficar jogando conversa fora,\nacho que viemos fundo demais na montanha..." 
2001403-16 = "......Onde nós estamos?" 
2001403-20 = "[ns] \"Parece que nós nos perdemos...\"" 
2001403-21 = "C-Calma lá, não entre em pânico, Sensei.\nEu trouxe um mapa e uma bússola justamente para situações como esta!" 
2001403-22 = "Com isso aqui em mãos, podemos encontrar o caminho facilmente através da leitura de mapas." 
2001403-23 = "[s] \"Leitura de mapas...?\"" 
2001403-24 = "Isso mesmo, é uma técnica de navegação.\nUsando a orientação da bússola, é possível determinar a sua própria localização e identificar o destino." 
2001403-25 = "Essa é uma habilidade básica de quase todos os operadores da SRT.\nPode relaxar e deixar tudo na minha mão." 
2001403-26 = "Vejamos, aquele pico que estamos vendo logo ali\nprovavelmente é o 'Pico Shiraishi', então..." 
2001403-27 = "Calculando a declinação magnética entre o Norte Verdadeiro e o Norte Magnético, e depois ajustando as coordenadas atuais..." 
2001403-28 = "Certo, entendi.\nNós estamos agora no ponto Charlie-9 (C-9)." 
2001403-29 = "A estrada mais próxima deve estar a cerca de\n3km na direção de 10 graus..." 
2001403-30 = "É por aqui, Sensei! Me siga!" 
2001403-35 = "（Algumas horas depois...）" 
2001403-37 = "A gente já caminhou bastante,\nmas eu ainda não vi sinal da estrada... Que estranho..." 
2001403-38 = "Os meus cálculos foram perfeitos..." 
2001403-39 = "......Não me diga que aquilo não era o 'Pico Shiraishi', mas sim o 'Pico Kuroishi'!?" 
2001403-40 = "Tch, basear os cálculos num ponto de referência incerto pode resultar nesse tipo de coisa num cenário prático... me desculpe." 
2001403-41 = "O sol já está quase se pondo também..." 
2001403-42 = "......Não tem jeito, vamos ter que fazer um acampamento de emergência por esta noite." 
2001403-46 = "......O que você tá fazendo, Sensei?" 
2001403-50 = "[ns] \"Ah, só checando a nossa localização pelo GPS do celular.\"" 
2001403-51 = "......GPS?" 
2001403-52 = "Cerca de 500 metros para o leste daqui,\ntem um ponto de ônibus que vai na direção da Schale...?" 
2001403-56 = "......Ei, por que diabos você não me disse isso antes." 
2001403-57 = "[s1] \"Me desculpe, é que ver você toda empolgada e se esforçando tanto foi fofo demais...\"\n[s2] \"Me desculpe, eu não queria jogar um balde de água fria no seu esforço...\"" 
2001403-58 = "......Hã?" 
2001403-59 = "......Hã?" 
2001403-60 = "E por um motivo tão besta desses, você preferiu quase nos forçar a dormir na rua..." 
2001403-61 = "Aaah cara, VOCÊ É IDIOTA!?" 
2001403-63 = "（Enquanto eu tentava acalmar uma Saki furiosa, pegamos o ônibus noturno de volta para a Schale.）" 
2001403-64 = "（......Fizemos um tempurá com os muitos brotos de arália que coletamos e saboreamos todos eles deliciosamente com a Saki.）" 