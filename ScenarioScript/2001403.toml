[translation]
2001403-1 = "迷えるウサギ"
2001403-2 = "D.U.郊外の山道"
2001403-3 = "ふう、思ったより量があるな。"
2001403-4 = "このかごじゃ足りないくらいだ、もっと大きいのを持ってくるべきだった。"
2001403-5 = "これだけあれば、この先1週間……いや、1ヶ月はタラボだけで生きていけるな！"
2001403-6 = "[s] \"それは良かったんだけど……それ、１ヶ月も長持ちする？\""
2001403-7 = "もちろん、腐らないように加工はする。"
2001403-8 = "塩漬けにしたり、乾かしたり……方法も幾つかあるからな。"
2001403-9 = "[s] \"サキ、タラボに詳しいんだね。\""
2001403-10 = "別に、タラボだけが特別ってわけじゃないが……。"
2001403-11 = "どちらかというと、山菜やキノコ全般だな。その辺で手に入るという点が良い。"
2001403-12 = "通常時の補給が期待できない状況下では、野草が大事な食糧源。"
2001403-13 = "だが、野草の中には毒性が強い種も多い。だから食べても大丈夫かどうか、採集前に観察が必要となる……。"
2001403-14 = "……つまりこれらは全て、ある種の生存訓練！"
2001403-15 = "と、採集したり色々話している内に、何だかだいぶ山奥まで来たな……。"
2001403-16 = "……ここはどこだ？"
2001403-20 = "[ns] \"道に迷っちゃったみたいだね……\""
2001403-21 = "ま、まあ慌てるな先生。こういう事態に備えて、ちゃんと地図とコンパスを持ってきている！"
2001403-22 = "これさえあれば読図法で、簡単に道が見つけられる。"
2001403-23 = "[s] \"読図法……？\""
2001403-24 = "ああ、地図を読む方法の一つだ。コンパスの方位を用いることで、自分の位置と目的地を把握する手法。"
2001403-25 = "SRTの隊員なら大抵身に着けているスキルだ、大船に乗ったつもりで任せてくれ。"
2001403-26 = "さて、あっちに見える峰がおそらく「白石峰」だから……"
2001403-27 = "真北と磁北の誤差を算出、それから現在の座標を……。"
2001403-28 = "よし、分かったぞ。私たちは今ここにいる[ruby=チャーリー]、C-9[/ruby]地点だ。"
2001403-29 = "一番近い道路は、10度方向に約3km離れたところにあるはず……"
2001403-30 = "こっちだ、先生！ついて来い！"
2001403-35 = "（数時間後……）"
2001403-37 = "結構歩いたはずだが、道路が見えてこない……妙だな……。"
2001403-38 = "計測は完璧だったはずなのに……。"
2001403-39 = "……まさか、あれは「白石峰」じゃなく「黒石峰」！？"
2001403-40 = "くっ、前提条件が定かでないなんて、実践ではこういうこともあるのか……すまない。"
2001403-41 = "もう日が暮れそうだし……。"
2001403-42 = "……仕方ないな、今晩はビバークか。"
2001403-46 = "……何をしてるんだ、先生？"
2001403-50 = "[ns] \"GPSで位置の確認をしようかなって。\""
2001403-51 = "……GPS？"
2001403-52 = "東側に500m行くと、シャーレ方面に向かうバス停が……？"
2001403-56 = "……おい、どうしてそれを先に教えてくれなかったんだ。"
2001403-57 = "[s1] “ごめん、ウキウキで頑張ってくれてるサキが可愛くて……。”\n[s2] “ごめん、サキの努力に水を差したくなくて……。”"
2001403-58 = "……は？"
2001403-59 = "……は？"
2001403-60 = "そんな理由で、野宿を覚悟する直前まで……"
2001403-61 = "ああもう、バカかお前っ！？"
2001403-63 = "（怒るサキをなだめながら、深夜のバスでシャーレに戻ってきた）"
2001403-64 = "（……たくさん取ったタラボは、天ぷらにしてサキと一緒においしく食べた）"
