[translation]
2001403-1 = "Coelho perdido"
2001403-2 = "Estrada de montanha nos arredores de D.U."
2001403-3 = "Ufa, tem mais do que eu pensava."
2001403-4 = "Esta cesta não vai ser suficiente, eu deveria ter trazido uma maior."
2001403-5 = "Com tudo isso, posso sobreviver apenas com brotos de arália pela próxima semana... não, pelo próximo mês!"
2001403-6 = "[s] \"Isso é ótimo, mas... será que dura um mês inteiro?\""
2001403-7 = "Claro, vou processá-los para não estragarem."
2001403-8 = "Posso conservá-los em sal, secá-los... existem vários métodos."
2001403-9 = "[s] \"Saki, você entende bastante de brotos de arália, hein?\""
2001403-10 = "Não é que os brotos de arália sejam especiais, mas..."
2001403-11 = "Na verdade, é sobre vegetais silvestres e cogumelos em geral. O bom é que você pode encontrá-los por aí."
2001403-12 = "Em situações onde não se pode contar com suprimentos regulares, plantas silvestres são uma fonte de alimento vital."
2001403-13 = "Porém, muitas plantas silvestres são altamente tóxicas. Por isso, é preciso observar antes de colher para saber se são seguras para comer..."
2001403-14 = "...Ou seja, tudo isso é um tipo de treinamento de sobrevivência!"
2001403-15 = "E, enquanto colhíamos e conversávamos, acabamos vindo parar bem fundo na montanha..."
2001403-16 = "...Onde estamos?"
2001403-20 = "[ns] \"Parece que nos perdemos...\""
2001403-21 = "B-bem, não entre em pânico, Sensei. Para situações como esta, eu trouxe um mapa e uma bússola!"
2001403-22 = "Com isso, posso usar técnicas de leitura de mapas para encontrar o caminho facilmente."
2001403-23 = "[s] \"Leitura de mapas...?\""
2001403-24 = "Sim, é um método de ler mapas. Usando a orientação da bússola, você determina sua posição e o destino."
2001403-25 = "É uma habilidade que quase todos os membros da SRT possuem, então pode confiar em mim."
2001403-26 = "Bem, aquele pico ali deve ser o \"Pico Shiraishi\", então..."
2001403-27 = "Calculando a diferença entre o norte verdadeiro e o norte magnético, e então as coordenadas atuais..."
2001403-28 = "Certo, entendi. Estamos no ponto C-9."
2001403-29 = "A estrada mais próxima deve estar a cerca de 3 km na direção de 10 graus..."
2001403-30 = "É por aqui, Sensei! Siga-me!"
2001403-35 = "(Algumas horas depois...)"
2001403-37 = "Deveríamos ter caminhado bastante, mas a estrada não aparece... Que estranho..."
2001403-38 = "A medição deveria estar perfeita..."
2001403-39 = "...Não me diga que aquele não era o \"Pico Shiraishi\", mas sim o \"Pico Kuroishi\"!?"
2001403-40 = "Droga, não ter as condições iniciais corretas... isso acontece em situações reais, eu suponho... sinto muito."
2001403-41 = "O sol já está se pondo..."
2001403-42 = "...Não tem jeito, vamos ter que acampar aqui esta noite."
2001403-46 = "...O que você está fazendo, Sensei?"
2001403-50 = "[ns] \"Estava pensando em verificar nossa localização com o GPS.\""
2001403-51 = "...GPS?"
2001403-52 = "Se formos 500 metros para o leste, há um ponto de ônibus que vai para o Schale...?"
2001403-56 = "...Ei, por que você não me disse isso antes?"
2001403-57 = "[s1] “Desculpe, é que a Saki se esforçando toda animada era tão fofa...”\n[s2] “Desculpe, eu não queria estragar o seu esforço, Saki...”"
2001403-58 = "...Hã?"
2001403-59 = "...Hã?"
2001403-60 = "Por causa disso, quase nos preparamos para dormir ao relento..."
2001403-61 = "Ah, qual é, você é idiota!?"
2001403-63 = "(Enquanto acalmava a Saki irritada, voltamos para o Schale no ônibus da madrugada)"
2001403-64 = "(...Os muitos brotos de arália que colhemos foram feitos em tempurá e comemos com gosto junto com a Saki)"
