[translation]
33120-1 = "Episódio 12; Caos Acelerado (2)"
33120-2 = "Como está o estado do Sensei!?"
33120-3 = "Ele está na sala da Cavalaria de Socorro agora! Segundo informações dos membros, ele perdeu muito sangue, mas os primeiros socorros foram feitos corretamente, então..."
33120-4 = "Então ele está a salvo...!?"
33120-5 = "S-sim. Felizmente, parece que a vida dele não corre perigo, mas ele ainda não recuperou a consciência..."
33120-6 = "Sem consciência... Sensei..."
33120-10 = "Os resultados da análise saíram! O que foi disparado contra a Antiga Catedral não era um motor ramjet!"
33120-11 = "!!"
33120-12 = "Se não era um ramjet... então como Gehenna conseguiu uma tecnologia de um nível tão impossível?"
33120-13 = "A posição de disparo também está sendo confirmada agora...!"
33120-14 = "Qual grupo de Gehenna foi? Se ao menos soubéssemos o local...!"
33120-15 = "N-não, é que..."
33120-16 = "Não conseguimos identificar a posição exata, mas... o ponto de disparo foi dentro do Distrito Autônomo de Trinity!"
33120-17 = "...!!"
33120-18 = "As imagens da câmera foram restauradas, são do momento em que a Antiga Catedral explodiu! Elas coincidem com o relatório das irmãs que estão em combate contra Gehenna na Antiga Catedral agora!!"
33120-20 = "Reproduzindo o vídeo!"
33120-35 = "Isso é..."
33120-36 = "Será que o Sensei e todos os outros estavam lutando contra...?"
33120-37 = "A-aquilo é..."
33120-38 = "...a 'Irmandade de Justina'."
33120-39 = "E-eh...!?"
33120-40 = "..."
33120-41 = "H-Hanako-san..."
33120-42 = "............"
33120-48 = "..........................."
33120-53 = "Irmandade de Justina, Tratado de Eden, aquele ataque..."
33120-61 = "Esquadrão Arius, Primeiro Concílio, Antiga Catedral, ponto de disparo e o momento..."
33120-67 = "Catacumbas, lendas urbanas do parque de diversões, a localização do Distrito Autônomo de Arius..."
33120-77 = "Guardiões dos preceitos............ Tratado de Eden...... 'Eden'............"
33120-80 = "..."
33120-81 = "H-Hanako-san...!? Você está bem!?"
33120-82 = "..."
33120-83 = "...É apenas uma hipótese."
33120-84 = "Baseia-se em dezenas de saltos lógicos, mas, se por um acaso isso for verdade..."
33120-85 = "Não existe uma maneira de resolver isso...?"
33120-86 = "...Eh?"
33120-87 = "Se continuar assim... Trinity e Gehenna serão literalmente apagadas do mapa de Kivotos."
33120-89 = "...Assim como aconteceu com Arius após o 'Primeiro Concílio' no passado."
33120-91 = "Próximo episódio; O outro lado inalcançável"
