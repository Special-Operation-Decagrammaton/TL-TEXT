[translation]
33120-1 = "Episódio 12;O Caos que Acelera (2)"
33120-2 = "E o estado do Sensei!?"
33120-3 = "No momento, no quarto da Ordem dos Cavaleiros de Socorro! Segundo as integrantes, há muita perda de sangue, mas os primeiros socorros foram feitos direitinho……"
33120-4 = "Ele está bem, né……!?"
33120-5 = "S-sim. Por sorte, não parece haver risco de vida, mas ele não recobrou a consciência……."
33120-6 = "A consciência…… Sensei……."
33120-10 = "Saiu o resultado da análise! O que foi disparado contra a catedral antiga não era de motor ramjet!"
33120-11 = "!!"
33120-12 = "Não é ramjet…… então, como é que Gehenna teria conseguido uma tecnologia de um nível tão impossível?"
33120-13 = "A posição de lançamento também está em verificação……!"
33120-14 = "Que gente de Gehenna foi; se ao menos soubermos o lugar……!"
33120-15 = "N-não, é que……"
33120-16 = "A posição exata não dá pra determinar, mas…… o ponto de lançamento é \"o interior do distrito autônomo de Trinity\"!"
33120-17 = "……!!"
33120-18 = "As imagens da câmera foram recuperadas; são do momento da explosão da catedral antiga! Batem com os relatos das irmãs, que estão agora em combate com Gehenna na catedral!!"
33120-20 = "Reproduzindo o vídeo!"
33120-35 = "Isto é……"
33120-36 = "O que o Sensei e todos enfrentavam era, não me diga……?"
33120-37 = "A-aquilo é……."
33120-38 = "……O \"Conselho dos Santos de Justina\"."
33120-39 = "H-hã……!?"
33120-40 = "……."
33120-41 = "H-Hanako……."
33120-42 = "…………."
33120-48 = "…………………………………."
33120-53 = "O Conselho dos Santos de Justina, o Tratado do Éden, aquele ataque……"
33120-61 = "O Squad de Arius, o Primeiro Concílio, a catedral antiga, o ponto e o momento do lançamento……"
33120-67 = "As catacumbas, a lenda de terror do parque de diversões, a localização do distrito autônomo de Arius……"
33120-77 = "Os guardiões dos preceitos………… o Tratado do Éden…… o \"Éden\"…………"
33120-80 = "……"
33120-81 = "H-Hanako……!? Você tá bem!?"
33120-82 = "……."
33120-83 = "……Não passa de hipótese."
33120-84 = "Pressupõe dezenas de saltos, mas, se, por acaso, isto for verdade……"
33120-85 = "um método pra resolver isto…… não existe……?"
33120-86 = "……Hã?"
33120-87 = "Do jeito que vai…… Trinity e Gehenna vão, literalmente, desaparecer do mapa de Kivotos."
33120-89 = "……Como, um dia, depois do \"Primeiro Concílio\", aconteceu com a Arius."
33120-91 = "Próximo Episódio;O Outro Lado Inalcançável"
