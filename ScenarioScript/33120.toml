[translation]
33120-1 = "Episódio 12; Confusão Acelerada (2)"
33120-2 = "Como está o Sensei!?"
33120-3 = "Ele está na sala dos Cavaleiros Hospitalários agora! Segundo os membros, ele perdeu muito sangue, mas os primeiros socorros foram feitos corretamente..."
33120-4 = "Então ele está a salvo...!?"
33120-5 = "S-Sim. Felizmente não parece correr risco de vida, mas... ele ainda não recuperou a consciência."
33120-6 = "A consciência... Sensei..."
33120-10 = "Os resultados da análise saíram! O que foi lançado em direção ao Tabernáculo não possuía motores ramjet!"
33120-11 = "!!"
33120-12 = "Não é ramjet... então como Gehenna conseguiu uma tecnologia de um nível tão impossível assim?"
33120-13 = "Também estamos confirmando o local de lançamento agora mesmo...!"
33120-14 = "Que pessoal de Gehenna foi? Se a gente pelo menos soubesse o lugar...!"
33120-15 = "N-Não, sobre isso..."
33120-16 = "Não podemos determinar a localização exata, mas... o local de lançamento foi 'dentro da área autônoma da Trinity'!"
33120-17 = "...!!"
33120-18 = "As imagens das câmeras foram recuperadas, são do momento em que o Tabernáculo foi explodido! Isso bate com o relatório das irmãs que estão em combate com Gehenna no Tabernáculo agora!!"
33120-20 = "Reproduzindo as imagens!"
33120-35 = "Isso é..."
33120-36 = "Com quem o Sensei e as outras estavam lutando... não me diga que...?"
33120-37 = "A-Aquilo é..."
33120-38 = "...É a 'Sociedade dos Santos Justina'."
33120-39 = "Hã, o quê...!?"
33120-40 = "......"
33120-41 = "H-Hanako-san..."
33120-42 = "............"
33120-48 = ".............................."
33120-53 = "Sociedade dos Santos Justina, Tratado do Éden, aquele ataque..."
33120-61 = "Esquadrão Arius, Primeiro Concílio, o Antigo Tabernáculo, o local de lançamento e o momento exato..."
33120-67 = "As catacumbas, as histórias de terror do parque de diversões, a localização do distrito de Arius..."
33120-77 = "As guardiãs dos mandamentos...... O Tratado do Éden...... 'Éden'......"
33120-80 = "......"
33120-81 = "H-Hanako-san...!? Você está bem!?"
33120-82 = "......"
33120-83 = "...É apenas uma hipótese."
33120-84 = "Baseada em dezenas de saltos lógicos, mas... se, por acaso, isso for verdade..."
33120-85 = "Não existe uma forma de resolver isso...?"
33120-86 = "...Hã?"
33120-87 = "Se continuar assim... Trinity e Gehenna vão, literalmente, desaparecer do mapa de Kivotos."
33120-89 = "...Exatamente como aconteceu com Arius depois do 'Primeiro Concílio'."
33120-91 = "Próximo Episódio; O Lado Inalcançável"