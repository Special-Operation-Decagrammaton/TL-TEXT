[translation]
52085-15 = "はぁ、はぁ……。"
52085-16 = "……まだまだ！"
52085-21 = "しっつこいなぁ……ナグサちゃんのくせに。"
52085-22 = "さっさと切り上げるつもりだったんですけどぉ――"
52085-29 = "ナグサ先輩！"
52085-30 = "……って、なんだよこれ！"
52085-31 = "先輩！大丈夫ですの！？"
52085-36 = "[ns] \"ナグサ、無事！？\""
52085-37 = "私は大丈夫、それより花鳥風月部の怪談家が……。"
52085-38 = "くそっ、もう嗅ぎつけましたか。"
52085-42 = "あの子……。"
52085-43 = "あの時の生意気チビだ！"
52085-48 = "誰が生意気チビですってぇ！？ "
52085-49 = "くっそぉ……あと少しなのに……！"
52085-50 = "……しょうがないですねぇ。#nでも、手前さん方がこの地に足を踏み入れたからには、#n物語を再開する機会はまだあるはず。"
52085-54 = "それではそれでは、今日はこの辺りでお暇させていただきますぅ。"
52085-59 = "逃がすかっ！"
52085-60 = "レンゲ、ユカリ。今度こそ捕まえるよ！"
52085-80 = "なんてすばしっこいんですの！"
52085-81 = "くっそー、イタチかあいつは……！"
52085-86 = "ふふん♪#nそぉんな動きじゃ、何年かかっても手前を捕まえられませんよぉ～？"
52085-87 = "それではぁ、次にお会いする日ま――"
52085-93 = "えっ……？"
52085-99 = "うぎゃあああっ！"
52085-108 = "……いいタイミングだったみたいだね。"
52085-109 = "みんな、ケガは？"
52085-113 = "うそ……。"
52085-114 = "この声……。"
52085-121 = "久しぶりだね、ナグサ。"
52085-125 = "それにみんなも。会えて嬉しいよ。"
52085-131 = "……アヤメっ！"
52085-133 = "次回;百花繚乱の委員長"
