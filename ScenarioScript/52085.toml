[translation]
52085-15 = "Haa, haa..."
52085-16 = "...Ainda não acabou!"
52085-21 = "Que insistente... logo você, Nagusa-chan."
52085-22 = "Eu pretendia encerrar isso logo, mas..."
52085-29 = "Nagusa-senpai!"
52085-30 = "...Mas o que é isso!"
52085-31 = "Senpai! Você está bem!?"
52085-36 = "[ns] \"Nagusa, você está bem!?\""
52085-37 = "Eu estou bem, mas a contadora de histórias do Clube Kachou Fuugetsu..."
52085-38 = "Droga, já nos farejaram."
52085-42 = "Aquela garota..."
52085-43 = "É aquela pirralha atrevida de antes!"
52085-48 = "Quem você chamou de pirralha atrevida!?"
52085-49 = "Droga... e pensar que faltava tão pouco...!"
52085-50 = "...Não tem jeito, né. #nMas, já que vocês pisaram nestas terras, #nainda deve haver uma chance de retomar a história."
52085-54 = "Sendo assim, vou me retirar por hoje."
52085-59 = "Não vou deixar você escapar!"
52085-60 = "Renge, Yukari. Vamos capturá-la desta vez!"
52085-80 = "Como ela é rápida!"
52085-81 = "Droga, ela é uma doninha ou o quê...!"
52085-86 = "Fufun♪ #nCom esses movimentos, vocês não vão me pegar nem daqui a vários anos, sabia?"
52085-87 = "Então, até o dia em que nos encontrarmos de novo..."
52085-93 = "Eh...?"
52085-99 = "Ugyaaaaa!"
52085-108 = "...Parece que foi um bom momento."
52085-109 = "Pessoal, alguém se feriu?"
52085-113 = "Não pode ser..."
52085-114 = "Essa voz..."
52085-121 = "Faz tempo, Nagusa."
52085-125 = "E vocês também. Fico feliz em vê-las."
52085-131 = "...Ayame!"
52085-133 = "Próximo episódio: A Presidente do Hyakka Ryouran"
