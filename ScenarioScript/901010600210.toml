[translation]
901010600210-8 = "Excuse me, do you have a moment?"
901010600210-14 = "Yes! Oh, you're a face I don't see around here often."
901010600210-15 = "Are you new to the area?"
901010600210-16 = "Yes. We're 'FOX EATS,' and we deliver everything from bento boxes to store advertisements!"
901010600210-17 = "We've just added Kanezaki Port to our delivery area. Please feel free to use our services!"
901010600210-18 = "That sounds nice. It's always a hassle to leave the port just for lunch..."
901010600210-19 = "I'll be sure to give it a try."
901010600210-20 = "By the way, what brings you here? Are you looking to ship something out of the port?"
901010600210-21 = "No, it's not about a shipment... I actually had a question for you."
901010600210-22 = "Do passenger trains stop at this station?"
901010600210-23 = "I was wondering if I could take a train from here to get outside..."
901010600210-24 = "This isn't a station for passenger trains, but there is one two-car commuter train that runs between the rail yard and the port early in the morning."
901010600210-25 = "It doesn't stop at any other stations, so almost no one besides port personnel uses it. If you'd like to ride, I can issue you a ticket."
901010600210-26 = "I see. So there is a way to leave the port other than the main gate."
901010600210-27 = "Um, could I ask you one more thing?"
901010600210-28 = "Has a passenger named 'Miyaguchi' ever used that commuter train?"
901010600210-29 = "I've lost contact with an acquaintance recently... and I'm trying to find them."
901010600210-30 = "I'm... I'm afraid I can't answer that."
901010600210-31 = "Passenger records are confidential information. I cannot provide them to outside parties. I hope you understand."
901010600210-32 = "No, you're right. I'm sorry for asking such an odd question."
901010600210-33 = "Have a good day!"