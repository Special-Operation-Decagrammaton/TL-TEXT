[translation]
901010600210-8 = "Com licença, posso falar um minuto?"
901010600210-14 = "Sim! Opa, seu rosto não é comum por aqui."
901010600210-15 = "Você é novo na região?"
901010600210-16 = "Sim, sou do 'FOX EATS', fazemos de tudo – desde entrega de bentô até divulgação de lojas!"
901010600210-17 = "Acabamos de adicionar o Porto Kanezaki à nossa área de entrega. Por favor, utilize nossos serviços!"
901010600210-18 = "Que bom. É um saco ter que sair do porto todo dia para almoçar..."
901010600210-19 = "Vou usar sim."
901010600210-20 = "Aliás, o que o traz aqui? É alguma encomenda para fora do porto?"
901010600210-21 = "Não, não é encomenda... é que eu queria tirar uma dúvida."
901010600210-22 = "Esta estação também atende trens de passageiros?"
901010600210-23 = "Fiquei curiosa para saber se dá para pegar um trem e sair daqui."
901010600210-24 = "Não param trens de passageiros aqui... mas de madrugada tem um trem de dois vagões que vai até o pátio de manobras."
901010600210-25 = "Como não para em nenhuma estação, só os trabalhadores do porto usam. Se quiser, posso emitir o bilhete."
901010600210-26 = "Entendo. Então há outros meios de sair do porto além do portão principal."
901010600210-27 = "Posso fazer mais uma pergunta?"
901010600210-28 = "O Sr. Miyaguchi já usou esse trem?"
901010600210-29 = "Recentemente, perdi o contato com um conhecido e estou tentando encontrá-lo."
901010600210-30 = "Isso... sinto muito, mas não posso responder."
901010600210-31 = "Registro de embarque é informação confidencial. Não podemos fornecer a terceiros."
901010600210-32 = "Imagina, eu que fui perguntar besteira. Desculpe."
901010600210-33 = "Tenha um bom dia!"