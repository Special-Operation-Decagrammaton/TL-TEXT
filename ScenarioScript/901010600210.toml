[translation]#[Texto Final. - Filipe 05/07.]
901010600210-8 = "Com licença, posso falar com você um minutinho?"
901010600210-14 = "Sim! Ora, não é uma cara conhecida por aqui."
901010600210-15 = "Você é nova na região?"
901010600210-16 = "Sim! Somos o 'FOX EATS' – entregamos desde marmita até divulgação de lojas!"
901010600210-17 = "Acabamos de incluir o porto de Kanezaki na nossa área de entrega. Esperamos que use nossos serviços!"
901010600210-18 = "Que bom. Até hoje eu tinha que sair do porto toda hora pra almoçar……"
901010600210-19 = "Vou experimentar."
901010600210-20 = "A propósito, qual é o seu serviço aqui hoje?#nÉ alguma encomenda pra fora do porto?"
901010600210-21 = "Não, não é encomenda…… é que eu queria perguntar uma coisa."
901010600210-22 = "Nessa estação, trens de passageiros também param?"
901010600210-23 = "Queria saber se dá pra pegar um trem e sair daqui."
901010600210-24 = "Não é uma estação de passageiros…… mas tem um trem de duas vagens que faz o trajeto entre o pátio de manutenção e o porto de manhã cedo."
901010600210-25 = "Não passa por nenhuma estação, então quase só os funcionários do porto usam.#nSe quiser embarcar, posso emitir um bilhete."
901010600210-26 = "Entendi. Então tem como sair do porto além do portão principal."
901010600210-27 = "Posso fazer mais uma pergunta?"
901010600210-28 = "O senhor já viu um passageiro chamado 'Miyaguchi' usar esse trem?"
901010600210-29 = "É que um conhecido meu sumiu e estou tentando localizar ele……"
901010600210-30 = "Isso…… me desculpe, mas não posso responder."
901010600210-31 = "Os registros de embarque são confidenciais. Não posso fornecer a terceiros. Compreenda."
901010600210-32 = "Não, é verdade. Eu que fui sem noção. Desculpe."
901010600210-33 = "Tenha um bom dia!"