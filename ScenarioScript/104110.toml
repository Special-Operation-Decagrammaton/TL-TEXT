[translation]
104110-1 = "Episódio 11; Epílogo (1)"
104110-2 = "Bom dia, Sensei."
104110-3 = "[s] \"Bom dia, Plana. Já se acostumou com o lugar?\""
104110-4 = "……Sim.#nA Arona-senpai tem me ajudado bastante..."
104110-5 = "Hehe... o leite de morango... é mesmo..."
104110-6 = "……Ela ainda tá dormindo, viu."
104110-7 = "[s] \"Pois é......\""
104110-8 = "Acorda, Arona-senpai."
104110-9 = "O Sensei chegou."
104110-10 = "Nham... uhihi..."
104110-11 = "Se você não acordar, vou cutucar suas bochechas, hein?"
104110-17 = "（Se levantando）"
104110-18 = "Nham... ah não... Ué?"
104110-19 = "Ué, ué, ué...?"
104110-20 = "Hã? O quê? O que tá acontecendo?"
104110-21 = "[s] \"Bom dia, Arona.\""
104110-22 = "A-Aaah!? J-Já é de manhã!?"
104110-23 = "Não é de manhã, já é de tarde.#nAcordar cedo e dormir cedo é o básico pra ter saúde."
104110-24 = "Auu... eu planejava ser um exemplo pra Plana-chan..."
104110-25 = "Primeiro vamos começar acordando cedo.#nVocê só vai ser um exemplo depois que conseguir isso."
104110-26 = "Por que as coisas chegaram nesse ponto... uuu..."
104110-27 = "[s] \"Deve ser difícil, mas se esforça aí, Plana.\""
104110-28 = "……Tô bem. Já tô me acostumando a cuidar da Arona-senpai."
104110-29 = "Isso é um clima ruim por causa da Arona...!#nEu só me atrasei um pouquinho..."
104110-30 = "M-Mas, mas... agora que a gente tá em duas com a Plana-chan, a Arca de Shittim ficou muito mais poderosa!"
104110-31 = "Com certeza. Eu também vou dar o meu melhor pelo Sensei."
104110-32 = "[s] \"Sim... contem comigo, vocês duas.\""
104110-34 = "……Sim, conte conosco, Sensei [USERNAME]."
104110-35 = "Pode deixar, Sensei! ...Ehehe."
104110-39 = "Nham... hehehe..."
104110-40 = "……A razão da Arona-senpai estar dormindo tanto é――"
104110-41 = "É porque eu... estou aqui.#nA carga na Arca de Shittim acabou ficando grande demais."
104110-42 = "……。"
104110-43 = "E eu entendi――a Presidente do Conselho Estudantil Geral também está desaparecida aqui, né."
104110-49 = "……Então ela também não está neste mundo, a Presidente do Conselho Estudantil Geral."
104110-51 = "Próximo episódio; Epílogo (2)"