[translation]
104110-1 = "第11話;後日談（１）"
104110-2 = "おはようございます、先生。"
104110-3 = "[s] \"おはようプラナ。もう、ここには慣れた？\""
104110-4 = "……はい。#nアロナ先輩がとても良くしてくださっていて……"
104110-5 = "へへ……イチゴミルクは……やっぱり……"
104110-6 = "……まだ眠っていますが。"
104110-7 = "[s] \"そうだね……。\""
104110-8 = "起きてください、アロナ先輩。"
104110-9 = "先生がいらっしゃいました。"
104110-10 = "むにゃ……うひひ……"
104110-11 = "起きないと頬をつつきますよ？"
104110-17 = "（むくり）"
104110-18 = "むにゃ……んもう……ありゃ？"
104110-19 = "ありゃ、ありゃりゃ……？"
104110-20 = "え？あれ？あれれ？"
104110-21 = "[s] \"おはよう、アロナ。\""
104110-22 = "う、うわああ！？も、もう朝ですか！？"
104110-23 = "朝ではなく昼です。#n早寝早起きは健康の基本ですよ。"
104110-24 = "あうぅ……プラナちゃんのお手本となる予定だったのに……"
104110-25 = "まずは早起きから始めましょう。#nお手本となるのはそれからです。"
104110-26 = "どうしてこんなことに……うぅ……。"
104110-27 = "[s] \"大変だろうけど頑張ってね、プラナ。\""
104110-28 = "……大丈夫です。アロナ先輩のお世話にも慣れてきました。"
104110-29 = "これは、アロナが悪い空気ですか…… ！？#nちょっと寝坊しただけなのに……！"
104110-30 = "で、でもでも、プラナちゃんと二人になったことで、シッテムの箱はパワーアップしたんですよ！"
104110-31 = "肯定。私も先生の力になります。"
104110-32 = "[s] \"うん……二人とも、これからもよろしくね。\""
104110-34 = "……はい、よろしくお願いします。[USERNAME]先生。"
104110-35 = "はい、先生！……えへへっ。"
104110-39 = "むにゃ……へへへ……"
104110-40 = "……アロナ先輩がよく眠るようになったのは――"
104110-41 = "私が……ここにいるからです。#nシッテムの箱への負担が大きくなってしまったから。"
104110-42 = "……。 "
104110-43 = "そして、理解しました――ここでも、連邦生徒会長は行方不明なのですね。"
104110-49 = "……この世界にも居ないのですね、連邦生徒会長。"
104110-51 = "次回;後日談（２）"
