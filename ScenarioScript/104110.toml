[translation]
104110-1 = "Episódio 11; Pós-escrito (1)"
104110-2 = "Bom dia, sensei."
104110-3 = "[s] \"Bom dia Prana. Você já está acostumado a vir aqui?\""
104110-4 = "……sim. #nArona-senpai tem sido muito legal comigo..."
104110-5 = "Hehe... leite com morango... como esperado..."
104110-6 = "...Mas ainda estou dormindo."
104110-7 = "[s] \"Isso mesmo...\""
104110-8 = "Por favor, acorde, Alona-senpai."
104110-9 = "A professora estava lá."
104110-10 = "Mmm... Uhihi..."
104110-11 = "Se você não acordar, vou dar um beijo na sua bochecha, ok?"
104110-17 = "(mukuri)"
104110-18 = "Mmm... Hmmm... Isso é verdade?"
104110-19 = "Sim, sim...?"
104110-20 = "foto? Huh? É isso?"
104110-21 = "[s] \"Bom dia, Alona.\""
104110-22 = "Uau! ? Já é de manhã! ?"
104110-23 = "É meio-dia, não é de manhã. #nDormir cedo e acordar cedo é a base de uma boa saúde."
104110-24 = "Aww... eu deveria ser um modelo para Prana-chan..."
104110-25 = "Vamos começar acordando cedo. #nIsso é o que faz de você um modelo."
104110-26 = "Por que isso aconteceu... Ugh..."
104110-27 = "[s] \"Vai ser difícil, mas faça o seu melhor, Prana.\""
104110-28 = "……tudo bem. Eu me acostumei a cuidar de Arona-senpai."
104110-29 = "Este ar é ruim para Arona...! ? #nMesmo que eu tenha dormido um pouco demais...!"
104110-30 = "Mas, mas, agora que estou com Prana-chan, a caixa de Shittemu ficou mais poderosa!"
104110-31 = "positivo. Também ajudarei o sensei."
104110-32 = "[s] \"Sim... estou ansioso para trabalhar com vocês dois.\""
104110-34 = "...Sim, muito obrigado. [USERNAME] Sensei."
104110-35 = "Sim, senhor! ...Hehehe."
104110-39 = "Hum... hehehe..."
104110-40 = "...Arona-senpai começou a dormir melhor porque..."
104110-41 = "Porque eu... estou aqui. #nPorque a carga sobre a caixa Shittem aumentou."
104110-42 = "……."
104110-43 = "E então eu entendi – o Presidente do Conselho Estudantil da Federação também está faltando aqui."
104110-49 = "...Você nem existe neste mundo, Presidente do Conselho Estudantil da Federação."
104110-51 = "Da próxima vez: Pós-escrito (2)"