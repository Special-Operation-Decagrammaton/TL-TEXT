[translation]
1011702-1 = "garota no trem"

1011702-2 = "cabine de trem"

1011702-4 = "[ns] \"...Tenho algum tempo livre.\""

1011702-5 = "(Se você estiver em movimento e tiver muito tempo disponível...)"

1011702-11 = "Vou dar uma olhada no seu ingresso."

1011702-12 = "Ok, pessoal, deixem sair."

1011702-16 = "[ns] \"Hikari...?\""

1011702-34 = "Ah, é o Sensei."

1011702-35 = "[s1] \"Olá Hikari, que coincidência.\"\n[s2] \"Eu estava no trabalho.\""

1011702-38 = "Sim, estou fazendo o meu melhor."

1011702-39 = "O Sensei está em viagem de negócios."

1011702-40 = "Espere um minuto."

1011702-45 = "[ns] \"??\""

1011702-47 = "(Depois de um tempo...)"

1011702-53 = "Uau! !"

1011702-57 = "[ns] \"Você está surpreso!?\""

1011702-58 = "Você deve ter ficado surpreso."

1011702-59 = "[s] \"Isso foi rápido.\""

1011702-60 = "Hikari, o mestre em perfuração de ingressos."

1011702-61 = "Terminei rapidamente."

1011702-67 = "Então, o que você quer jogar?"

1011702-68 = "[s] \"Brincar...!?\""

1011702-69 = "Isso mesmo, vamos comer juntos."

1011702-73 = "Stick divertido, sabor napalm."

1011702-74 = "[s3] \"Sabor Napalm...?\"\n[s4] \"Tem algum doce com esse gosto?\""

1011702-77 = "Parece napalm."

1011702-82 = "[ns5] \"Pó picante se espalha na minha boca...!\"\n[ns6] \"Quente, Geho...\""

1011702-85 = "É emocionante, não é?"

1011702-86 = "Pois bem, este é o próximo."

1011702-90 = "Doce Crackle, sabor edição limitada."

1011702-91 = "O original tem um gosto muito azedo, mas este parece ter um sabor super azedo."

1011702-95 = "Sim, hum."

1011702-96 = "[s] (Mas é assustador...)"

1011702-100 = "[ns] \"...Ah, ah.\""

1011702-104 = "[ns] \"Tãããão!!\""

1011702-105 = "Você parece uma ameixa em conserva."

1011702-106 = "[s] \"Hikari também é!\""

1011702-107 = "Ah..."

1011702-111 = "……."

1011702-112 = "Hum... é tão bom."

1011702-113 = "[s] \"Isso não é tão bom!\""

1011702-114 = "Hifari, Huffy é Huffy."

1011702-115 = "[s7] \"Azedo, você está bem!?\"\n[s8] \"Você foi espancado...!\""

1011702-119 = "(E então gostei do Hikari e de vários doces)"

1011702-126 = "[ns] \"A propósito...\""

1011702-130 = "[ns] \"Você está bem em não voltar ao trabalho?\""

1011702-132 = "Já estou acordado porque quero brincar com meu Sensei."

1011702-133 = "[s9] \"É isso!?\"\n[s10] \"Estou com ciúmes...!\""

1011702-136 = "O atual Hikari é chato."

1011702-137 = "Os Senseies também recomendam acordar cedo."

1011702-138 = "[s] \"Por mais que eu queira fazer isso...\""

1011702-139 = "Desculpe, Sensei. Boa sorte."

1011702-140 = "Mas Hikari está jogando."

1011702-142 = "(Hikari tocou o quanto quis até o fim e foi para casa.)"

