[translation]
1011702-1 = "ガール・イン・ザ・トレイン"
1011702-2 = "列車の客室"
1011702-4 = "[ns] \"……暇だなぁ。\""
1011702-5 = "（移動中、時間を持て余していると……）"
1011702-11 = "切符拝見しまーす。"
1011702-12 = "はーいみんな出してー。"
1011702-16 = "[ns] \"ヒカリ……？\""
1011702-34 = "あ、先生だー。"
1011702-35 = "[s1] \"こんにちはヒカリ、奇遇だね。\"\n[s2] \"仕事中だったんだ。\""
1011702-38 = "うんー頑張ってるー。"
1011702-39 = "先生出張だっけー。"
1011702-40 = "ちょっと待っててー。"
1011702-45 = "[ns] \"？？\""
1011702-47 = "（しばらくすると……）"
1011702-53 = "わっ！！"
1011702-57 = "[ns] \"ビックリしたぁ！？\" "
1011702-58 = "ビックリしたでしょー。"
1011702-59 = "[s] \"早かったね。\""
1011702-60 = "ヒカリ、切符の穴あけマスター。"
1011702-61 = "パパッと終わらせてきたー。"
1011702-67 = "んじゃ、何して遊ぶー？"
1011702-68 = "[s] \"遊ぶ……！？\""
1011702-69 = "そーだ、一緒に食べよー。"
1011702-73 = "たのしー棒、ナパーム味ー。"
1011702-74 = "[s3] \"ナパーム味……？\"\n[s4] \"そんな味のお菓子があるんだ？\""
1011702-77 = "ナパーム感あるよー。"
1011702-82 = "[ns5] \"ピリ辛の粉が口の中に散らばる……！\"\n[ns6] \"げほっ、げほっ……。\""
1011702-85 = "刺激的でしょー。"
1011702-86 = "んじゃ、次これー。"
1011702-90 = "パチパチキャンディ、限定版の[ruby=しょうめいだん]照明弾[/ruby]味ー。"
1011702-91 = "元は激すっぱ味だけど、こっちは激ヤバすっぱ味らしー。"
1011702-95 = "はい、あーん。"
1011702-96 = "[s] （こわいけど……）"
1011702-100 = "[ns] \"……あ、あーん。\""
1011702-104 = "[ns] \"すっっ……っぱいっ！！\""
1011702-105 = "梅干しみたいな顔してるー。"
1011702-106 = "[s] \"ヒカリもあーん、だよ！\""
1011702-107 = "あーん……"
1011702-111 = "……。"
1011702-112 = "んっ……すっふぁいねー。"
1011702-113 = "[s] \"すっぱそうじゃない！\""
1011702-114 = "ひふぁり、ふっふぁいのへいふぃー。"
1011702-115 = "[s7] \"すっぱいの平気！？\"\n[s8] \"やられた……！\""
1011702-119 = "（そうしてヒカリと色んなお菓子を楽しんだ）"
1011702-126 = "[ns] \"ところで……\""
1011702-130 = "[ns] \"仕事に戻らなくて大丈夫？\""
1011702-132 = "先生と遊びたいからもう上がってるよー。"
1011702-133 = "[s9] \"そんなことが！？\"\n[s10] \"羨ましいっ……！\""
1011702-136 = "今のヒカリはむてきー。"
1011702-137 = "先生も早上がり推奨ー。"
1011702-138 = "[s] \"そうしたいのは山々だけど……。\""
1011702-139 = "先生あわれー。がんばー。"
1011702-140 = "でもヒカリは遊ぶー。"
1011702-142 = "（ヒカリは終点まで存分に遊ぶと、帰っていった）"
