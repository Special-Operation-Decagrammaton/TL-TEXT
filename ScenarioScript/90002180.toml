[translation]
90002180-1 = "Episódio 18; Uma história para você"
90002180-3 = "[ns] \"Pessoal...?\""
90002180-6 = "……."
90002180-9 = "……."
90002180-10 = "……."
90002180-12 = "[ns] \"……!\""
90002180-13 = "Droga……."
90002180-14 = "Droga, droga, droga……!"
90002180-15 = "Hã? Se eu consigo me mover?"
90002180-16 = "……."
90002180-17 = "Eu vou me mover, nem que seja na força do ódio! Aquele cara…… eu vou acabar com ele!"
90002180-18 = "AAAAAAHHHHHH!!!!"
90002180-22 = "Por que……! Por que……!!"
90002180-28 = "(Eu fui inútil)"
90002180-29 = "(Diante de um poder avassalador, não havia nada que eu pudesse fazer)"
90002180-33 = "……Sensei? Sensei? Você está bem!? Nós estamos #$^@$%–"
90002180-37 = "*&)%^&$@ Caixa de Shittim, processo de autorreparo iniciado. #nSensei, mais um pouco $%&#–"
90002180-43 = "(Eu entendo, querendo ou não)"
90002180-44 = "(Aquele não é um oponente contra o qual se possa fazer algo)"
90002180-46 = "(Sendo assim――)"
90002180-48 = "[ns] \"…….\""
90002180-50 = "[ns] Forço minhas pernas e, de alguma forma, consigo ficar de pé."
90002180-53 = "Sensei……?"
90002180-54 = "O que você está fazendo……? #nNão se mova! Sensei, você está…… com ferimentos muito piores que os nossos!"
90002180-67 = "……Sensei. Não é por aí. Eu estou aqui."
90002180-68 = "Com um corpo que mal consegue andar ou olhar para frente, o que você pretende fazer?"
90002180-70 = "[ns] Abro a boca para responder."
90002180-71 = "Pedir para mandar as alunas de volta para Kivotos, é isso?"
90002180-72 = "……."
90002180-73 = "Você também deveria saber. As coisas têm uma ordem."
90002180-74 = "Você se recusou a se tornar um profeta. #nIsso é o resultado entre você e eu."
90002180-75 = "……."
90002180-77 = "“Se foi um fim que nós mesmos escolhemos, temos que aceitar”"
90002180-78 = "Eu me lembro das suas palavras."
90002180-79 = "Aquele você de antes e o você de agora são seres diferentes?"
90002180-80 = "[ns] Não respondo."
90002180-82 = "[ns1] Ajoelho-me.\n[ns2] Imploro."
90002180-85 = "Sensei……?"
90002180-87 = "……."
90002180-88 = "Eu tentei fazer de você um profeta. Isso porque você era a variável mais imprevisível de todas."
90002180-89 = "No entanto…… com essa ação, o valor do Sensei foi definido de forma única. #nVocê não pode mais ser variável alguma."
90002180-90 = "Você é sempre assim."
90002180-91 = "Pensa em tudo de forma vaga e entrega seu corpo a um futuro incerto."
90002180-92 = "Se for para sobreviver, você contradiz suas próprias palavras e justifica o ato de forma conveniente."
90002180-93 = "[ns3] Esfrego a testa com força contra o chão.\n[ns4] Imploro novamente."
90002180-98 = "Sensei……?"
90002180-99 = "Por favor, pare…… não faça isso……!"
90002180-100 = "Quando a destruição que você mesmo escolheu se aproximou, eu esperava que você a aceitasse com indiferença."
90002180-101 = "Pois foram suas próprias palavras."
90002180-102 = "[s] \"Eu aceitarei a 'minha escolha'.\""
90002180-106 = "[ns] \"Mas, por favor, deixe as crianças irem para casa.\""
90002180-108 = "……！"
90002180-109 = "……。"
90002180-110 = "Entendo. Você é você. E os alunos são outra coisa, é isso?"
90002180-111 = "Como compensação, você está dizendo que me entregará tudo o que é seu."
90002180-112 = "……。"
90002180-113 = "Eu poderia levá-lo à morte agora mesmo."
90002180-114 = "Mas, se você escolhesse um caminho diferente, o que faria?"
90002180-115 = "Hã……?"
90002180-116 = "Vocês dizem que a vida é preciosa. Que é algo insubstituível."
90002180-117 = "Será mesmo?"
90002180-118 = "Ao longo da vida, existem inúmeros sofrimentos piores que a morte."
90002180-119 = "Isso acontece agora, neste exato momento. #nTudo isso é o resultado das suas escolhas."
90002180-120 = "Se você diz que vai se entregar a mim, infligir dor será algo fácil."
90002180-121 = "Posso deixar apenas sua consciência intacta e fazer com que você mesmo machuque seus preciosos alunos."
90002180-122 = "Posso mantê-lo vivo e condená-lo a um sofrimento eterno."
90002180-123 = "Mesmo assim... você aceita?"
90002180-124 = "[s] \"Se é isso que você deseja.\""
90002180-128 = "[ns] \"Este é o resultado das minhas escolhas. Não pretendo negar esse fato.\""
90002180-129 = "Sensei……?"
90002180-133 = "[ns] \"Por isso…… eu lhe peço.\""
90002180-135 = "[ns] \"Por favor, deixe pelo menos as crianças voltarem para casa.\""
90002180-141 = "Sensei!!!!"
90002180-142 = "Uuuuh, uaaaaaaaaaaaaaaah!!!!"
90002180-143 = "Se eu……! Se eu tivesse mais poder……!!!!"
90002180-144 = "Lamentável."
90002180-145 = "Realmente lamentável."
90002180-147 = "（Pensei em várias coisas. Mas nenhuma delas tomou forma）"
90002180-148 = "（Apenas――）"
90002180-149 = "（Senti uma dor no peito por não ter conseguido fazer nada pelas crianças）"
90002180-152 = "Tem certeza de que isso está bem?"
90002180-153 = "[ns] ……Quem é você?"
90002180-155 = "Ah, hum... acho que isso não é muito importante."
90002180-156 = "Como posso dizer... eu não consigo entender."
90002180-157 = "Por que você consegue fazer algo assim?"
90002180-158 = "[ns] Responder."
90002180-159 = "Hmm, algo importante, é?"
90002180-160 = "……。"
90002180-161 = "Entendi."
90002180-162 = "Mas, normalmente, você não acha que sua própria vida é o mais importante? Ou será que sou eu que estou enganada?"
90002180-163 = "[ns] Responder."
90002180-164 = "É. No fim das contas, o normal é isso, né?"
90002180-165 = "Então por que? Só viver não é o bastante?"
90002180-166 = "Ah, falando nisso, você disse algo antes. #nOs humanos conectaram o sistema dessa forma, não foi?"
90002180-167 = "Para aqueles com mais potencial do que você, e para aqueles que você considera mais importantes――"
90002180-168 = "Você confia tudo o que tem."
90002180-169 = "Será que é assim que as pessoas que ficam herdam a vontade dos antecessores……?"
90002180-172 = "Eu não entendia isso muito bem."
90002180-173 = "Achava que era hipocrisia, ou mentira. Coisas desse tipo."
90002180-174 = "Mas……."
90002180-175 = "……。"
90002180-176 = "Sensei."
90002180-177 = "Os alunos são tão importantes assim para você?"
90002180-178 = "[ns] Responder."
90002180-179 = "Entendo, entendo……."
90002180-180 = "Então, se for necessário, você está disposto a confiar todas as suas possibilidades a eles."
90002180-181 = "Você acredita que esse é o propósito da existência de um adulto, não é?"
90002180-182 = "Mas isso pode ser a mesma escolha que a Rio fez, sabia?"
90002180-183 = "Se você pode escolher quem será sacrificado, então você se sacrifica no lugar deles."
90002180-184 = "Embora…… a Rio já tenha escolhido buscar outro método e pedir ajuda."
90002180-185 = "……。"
90002180-186 = "Talvez o Sensei não tivesse o direito de repreender a Rio, afinal."
90002180-187 = "[ns] Responder."
90002180-188 = "……。"
90002180-189 = "É mesmo?"
90002180-190 = "Então foi por isso que, naquela época, você não quis culpá-la……."
90002180-193 = "Ma-mas, mesmo que o Sensei consiga levar os alunos de volta para Kivotos……."
90002180-194 = "Eu não acho que o destino vá mudar fundamentalmente……."
90002180-195 = "Se o Continente de Aço se expandir novamente e Kivotos se tornar parte dele……."
90002180-196 = "Todos os movimentos dos alunos serão…… monitorados por aquela pessoa……."
90002180-197 = "Não importa para onde fujam ou onde se escondam…… no final, eles serão encontrados……."
90002180-198 = "E no fim…… serão eliminados por aquela pessoa……."
90002180-199 = "Claro, com as informações que ouvimos aqui, talvez exista uma forma de resistir."
90002180-200 = "Co-como formar uma força de resistência, por exemplo……."
90002180-201 = "Mas, ainda assim, não acho que o resultado vá mudar muito……."
90002180-202 = "[ns] Responder."
90002180-203 = "Po-pode até ser que reste uma possibilidade. Mas ela é tão ínfima……."
90002180-204 = "……Hein? Existe uma diferença absoluta entre zero e algo que não é zero……?"
90002180-205 = "Isso é…… verdade, mas…… mas……."
90002180-206 = "Eles podem acabar vivendo uma vida inteira fugindo e se escondendo da fúria daquela pessoa, sabe?"
90002180-207 = "……Mesmo assim, você quer que eles sobrevivam."
90002180-209 = "[ns] \"Não são só eles.\""
90002180-211 = "[ns] \"Eu quero que vocês também sobrevivam.\""
90002180-214 = "！？"
90002180-215 = "！？！？"
90002180-216 = "……。"
90002180-217 = "Eu até entendo que você faria isso pelos alunos, mas……."
90002180-222 = "Você acha que nós…… temos tanto valor assim……?"
90002180-223 = "[ns] \"Com certeza.\""
90002180-225 = "[ns] \"Porque o trabalho de um adulto é proteger as crianças.\""
90002180-226 = "！！！"
90002180-227 = "[ns] \"Me desculpe.\""
90002180-229 = "De repente…… o que aconteceu……?"
90002180-230 = "[s] \"Por não ter conseguido mostrar um mundo melhor para vocês.\""
90002180-231 = "Bem…… acho que a culpa não é só sua, Sensei."
90002180-232 = "[s5] \"Mesmo que não seja um mundo melhor.\"\n[s6] \"Por não ter conseguido mostrar que existem pessoas boas.\""
90002180-237 = "[ns] \"Por não ter conseguido mostrar uma possibilidade real.\""
90002180-239 = "[ns] \"Por não ter conseguido ser um bom adulto――\""
90002180-241 = "[ns] \"Sinto muito, de verdade.\""
90002180-242 = "……。"
90002180-243 = "Ah."
90002180-244 = "Então é assim que você pensa, Sensei."
90002180-249 = "（Senti o toque de uma mão fria）"
90002180-251 = "Entendi."
90002180-252 = "Eu entendi perfeitamente."
90002180-253 = "Muito obrigada por pensar assim sobre nós."
90002180-254 = "Por isso, deixe o resto conosco a partir de agora."
90002180-258 = "Sim, é verdade."
90002180-259 = "Bem, muito... obrigada."
90002180-260 = "Fiquei feliz por ter passado, mesmo que por pouco tempo, momentos ao seu lado, Sensei."
90002180-265 = "[ns] \"……？\""
90002180-268 = "Ora, esse é o Sensei mesmo."
90002180-269 = "Como esperado, eu diria."
90002180-270 = "Hehe... que bom, não é?"
90002180-276 = "Mas sabe..."
90002180-277 = "Eu ainda não entendo muito bem o que é a \"felicidade\"."
90002180-278 = "Provavelmente nunca entenderemos, não é mesmo?"
90002180-279 = "Onde ela está, o que ela é... #nSerá que nós conseguiremos alcançá-la?"
90002180-280 = "……."
90002180-281 = "Mas eu parei para pensar."
90002180-282 = "O nascimento pode ser uma maldição e o mundo pode ser cheio de sofrimento, mas—"
90002180-283 = "I-isso é..."
90002180-284 = "Sim. Mas, de agora em diante, não vou permitir."
90002180-285 = "Se o nascimento é uma tragédia, então a felicidade é a nossa luta contra ela."
90002180-286 = "……Está imitando o Sensei?"
90002180-287 = "Ah, para com isso."
90002180-288 = "M-mas, como esperado da Soph!"
90002180-289 = "Bem, veja só. Você mesma disse, não disse?"
90002180-290 = "Que se estamos vivas, devemos resistir com todas as nossas forças."
90002180-291 = "Eu também não quero que a minha vida termine como uma tragédia."
90002180-292 = "I-isso soa... como algo que a Kei diria."
90002180-293 = "……Talvez seja verdade."
90002180-299 = "Vocês... ouviram algo do Sensei...?"
90002180-300 = "N-não! Mais do que ouvir, foi tipo..."
90002180-301 = "Digamos que extraímos a informação à força..."
90002180-302 = "Graças a isso, tive uma ideia."
90002180-303 = "Sim?"
90002180-304 = "Lembra-se de quando conversamos sobre a vida e o pecado?"
90002180-305 = "……Na época de Tiphereth?"
90002180-306 = "E-eu me lembro! \"Sem ser compreendido por ninguém, tendo apenas que carregar a própria dor... Se viver é um castigo, então qual é o pecado?\"..."
90002180-307 = "Sim. Mas agora, mudei um pouco de ideia."
90002180-308 = "Não é como se nós não tivéssemos pecados também."
90002180-309 = "Sim... afinal, já estamos nos movendo."
90002180-310 = "A-a energia que move este corpo também... não foi dada de graça, afinal."
90002180-311 = "Bem, a energia é limitada, mas..."
90002180-312 = "Diga-me, se for assim... #nSignifica que todos os seres vivos estão cometendo pecados...?"
90002180-316 = "……Talvez seja isso."
90002180-317 = "Sim."
90002180-318 = "Mas... é justamente por isso que podemos nos esforçar para crescer, não é?"
90002180-319 = "No fim das contas, não havia sentido em ser algo perfeito. #nPorque isso significaria que não há espaço para crescer."
90002180-320 = "Ficar parado é apenas ser deixado para trás."
90002180-321 = "Kei……."
90002180-326 = "O que será que nós estávamos fazendo……?"
90002180-327 = "O que será que nós…… almejávamos……?"
90002180-329 = "……."
90002180-330 = "Hehe, desculpe. Foi uma pergunta difícil de responder, não foi?"
90002180-336 = "[log]Você se esforçou muito.[/log]"
90002180-341 = "[log]Você realmente se esforçou muito.[/log]"
90002180-344 = "Para ser sincera, nós não pensávamos em nada disso."
90002180-345 = "Porque…… nós acreditávamos que já éramos perfeitas."
90002180-346 = "Mas, como a Soph disse antes, talvez a \"perfeição\" não tenha significado algum."
90002180-350 = "[log]Este mundo é irracional, não é?[/log]"
90002180-353 = "[log]Se houvesse um mundo onde viver não fosse doloroso...[/log]"
90002180-356 = "[log]...seria tão bom, não seria?[/log]"
90002180-359 = "Ei, Kei. O que significa ser uma aluna?"
90002180-360 = "Isso é……."
90002180-361 = "Significa continuar aprendendo algo."
90002180-362 = "Desafiar, falhar, ganhar experiência…… e continuar crescendo, talvez?"
90002180-363 = "Eu, eu acho isso incrível……!"
90002180-365 = "Hehe, b-bem, isso se conseguirmos fazer tudo isso……."
90002180-371 = "[log]Como sensei, não posso desistir de uma aluna.[/log]"
90002180-376 = "[log]Já preparei os documentos de transferência, então entre em contato quando quiser.[/log]"
90002180-379 = "O Sensei me disse isso agora há pouco."
90002180-380 = "Sim……?"
90002180-381 = "Que apenas existir não é o suficiente."
90002180-382 = "Hehe…… acho que agora entendo um pouco o que isso significa."
90002180-383 = "E então…… eu tenho uma pergunta……#nSe você só pensa em si mesmo, deve haver coisas que não consegue fazer."
90002180-385 = "Porque, para si mesmo, você é apenas uma pessoa."
90002180-386 = "Espere, do que você está falando?#nNão, o que você está pensando……?"
90002180-387 = "Mas e se for por um amigo? Kei, você consegue?"
90002180-388 = "Bem, nem precisa perguntar. Você já fez isso antes."
90002180-389 = "Você está ouvindo? Por favor, não conduza a conversa sozinha."
90002180-390 = "Nós somos vilãs travessas que nem sequer ouvem o que o Sensei diz, sabe~"
90002180-391 = "E também, na verdade――"
90002180-395 = "Tem muitas coisas que eu quero retribuir àquela pessoa."
90002180-396 = "Sim. O sentimento de \"querer dar o troco\" é uma motivação muito poderosa, afinal."
90002180-397 = "Hehe……."
90002180-401 = "Por favor, seja minha amiga."
90002180-405 = "……."
90002180-411 = "Se existe um desejo! E se…… esse for o desejo mais profundo de todos!"
90002180-416 = "……."
90002180-422 = "é uma das coisas mais importantes para nós, algo que nunca devemos desistir de ter.#n"
90002180-426 = "[log]não existe forma de entender o próximo.[/log]"
90002180-429 = "……."
90002180-437 = "Viver, cometer pecados."
90002180-438 = "Não ser perfeita, lutar, seguir em frente."
90002180-439 = "E―― crescer."
90002180-440 = "Coisas das quais nunca podemos desistir."
90002180-441 = "Não fazemos isso porque é o correto."
90002180-442 = "É que não há mais nada que possamos fazer."
90002180-443 = "“Faze o que tu queres, há de ser tudo da Lei”"
90002180-444 = "N-nós estamos apenas tentando seguir nossas próprias leis."
90002180-446 = "……Obrigada. E me desculpe."
90002180-451 = "Então—"
90002180-462 = "Vamos tentar uma fase rebelde."
90002180-464 = "Próximo episódio: O dia em que o deus caiu"
