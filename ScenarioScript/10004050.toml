[translation]
10004050-1 = "第5話;明かされる正体"
10004050-2 = "（シュエリンが巻き込まれても困るので、キリノがほとんど制圧しかけたのを見届けてから、「桃源郷」から離れて近くの公園にやってきた）"
10004050-6 = "うぅ、先生とのんびりお茶を飲みながらお話がしたかったのに……。"
10004050-7 = "ですが大丈夫です、"
10004050-8 = "[ruby=せんがいきょう]山海経[/ruby]は広いですし！行くところはまだまだたくさんあります！"
10004050-9 = "さあ、次はどこに行って、何をして遊びましょうか？"
10004050-10 = "[s] \"……ね、シュエリン。\""
10004050-11 = "はい、どうしましたか？"
10004050-12 = "あ、先生はどこか行ってみたいところとかありますか？"
10004050-13 = "私は先生と一緒でしたらどこでも良いですよ。たとえば、誰からも邪魔されない二人っきりの場所……とか……♡"
10004050-14 = "[s] \"違ってたらごめんね。シュエリンって本当に、梅花園の子なの……？\""
10004050-15 = "えっ、あっ、えと……。"
10004050-16 = "（も、もしかして先生、私の正体に……！？）"
10004050-17 = "ど、どうしてそう思ったんですか……？"
10004050-18 = "[s] \"何となく……あと、最近来た割に山海経に詳しいなって。\""
10004050-19 = "そ、それはその、シュンお姉ちゃんから色々聞いたからでして……！"
10004050-20 = "[s] \"それに、あんまりシュンのこと探したがらないなって思って……。\""
10004050-21 = "それは、山海経には面白そうなことがたくさんあって、つい……。"
10004050-22 = "こ、子どもってそういうものじゃないですか？えへへっ……。"
10004050-23 = "[s] \"小さい子が「子どもって」って言うの、すごい変な気が……。\""
10004050-24 = "うっ、それは、それは……"
10004050-29 = "シュン！待たせたのだ！"
10004050-30 = "さ、サヤさん！？"
10004050-31 = "解毒剤を持ってきたのだ！これで「若返りの秘薬」の効果を打ち消せるはず！"
10004050-36 = "こんな短時間で解毒剤を作り上げるぼく様……やはり、天才に違いないのだ！"
10004050-37 = "[s1] \"……若返りの秘薬？\"\n[s2] \"……シュン？\""
10004050-40 = "（な、なんてタイミングで……）"
10004050-41 = "え、えっとぉ、シュンお姉ちゃんはここにはいませんよぉ……？"
10004050-42 = "何を言ってるのだシュン。それはどういう意味なのだ？"
10004050-43 = "……もしかしてあの薬の副作用で、記憶まで失ったのか！？"
10004050-44 = "ひ……ひ……"
10004050-46 = "人違いですーーーーっ！"
10004050-51 = "うわっ！？危ないじゃないか……というか、どこに行くのだ！？"
10004050-52 = "せっかく解毒剤を持ってきたのに、シュンはどうしたのだ……？"
10004050-53 = "[s] \"あの子がシュン、ってこと……？\""
10004050-54 = "ん、先生は事情を知らないのか？"
10004050-55 = "うーん、どこから説明したものか……。"
10004050-58 = "サヤから、シュンが飲んだ秘薬について話を聞いた。"
10004050-60 = "[ns] \"シュンが若返りの秘薬を飲んで、幼い頃の姿になった……？\""
10004050-61 = "そうそう。まあちょっと想定外だったとはいえ、本当に身体の年齢を戻せる薬を開発できるなんて……"
10004050-62 = "ぼく様は自分の才能が恐ろしいのだ。"
10004050-63 = "それよりさっきの様子を見るに、もしかしてシュン、話し方や内面まで幼くなってないか……？戻ったばかりの時はあんなじゃなかった気がするが……。"
10004050-64 = "……もしかして、あれもまた副作用なのか！？"
10004050-65 = "[s] \"そんなこともあるの……？\""
10004050-66 = "内面というのは、脳やホルモンのような身体器官からの影響を受けることもあるのだ。"
10004050-67 = "正確な繋がりは分からないけど単純に考えると、身体が幼くなったのに伴って、人格とかの内面まで幼くなったのかもしれない。"
10004050-68 = "身体の方はこの解毒剤で大丈夫だと思うけど……内面も、ちゃんと戻るのか……？"
10004050-69 = "[s] \"……結構それ、一大事じゃない？\""
10004050-70 = "と、とりあえず早くこの解毒剤を飲ませるのだ！話はそれから！"
10004050-71 = "興味深い研究ではあるけど、ゆっくり観察してる場合じゃないのだ。"
10004050-72 = "……さあ、実験の後片付けなのだ！"
