[translation]
10004050-1 = "Episódio 5: A identidade revelada"
10004050-2 = "（Como seria um problema se Xuelin fosse envolvida, esperei Kirino quase terminar de subjugar a situação antes de sair do \"Paraíso\" e ir para um parque próximo）"
10004050-6 = "Ugh, eu queria conversar com o Sensei enquanto tomávamos um chá tranquilamente..."
10004050-7 = "Mas não tem problema,"
10004050-8 = "Shanhaijing é enorme! Ainda há muitos lugares para irmos!"
10004050-9 = "Vamos lá, onde devemos ir agora e o que devemos fazer para nos divertir?"
10004050-10 = "[s] \"...Diga, Xuelin.\""
10004050-11 = "Sim, o que houve?"
10004050-12 = "Ah, Sensei, tem algum lugar que você queira visitar?"
10004050-13 = "Eu não me importo de ir a qualquer lugar, desde que esteja com o Sensei. Por exemplo, um lugar a sós, onde ninguém possa nos atrapalhar... ou algo assim...♡"
10004050-14 = "[s] \"Desculpe se eu estiver enganado. Mas você é realmente uma criança do Jardim das Ameixeiras...?\""
10004050-15 = "Eh, ah, bem..."
10004050-16 = "（S-será que o Sensei descobriu minha identidade...!?）"
10004050-17 = "P-por que você pensou isso...?"
10004050-18 = "[s] \"Não sei, apenas um palpite... Além disso, você conhece muito bem Shanhaijing para alguém que chegou recentemente.\""
10004050-19 = "I-isso é porque eu ouvi várias coisas da irmã Shun...!"
10004050-20 = "[s] \"E também, sinto que você não tenta procurar muito pela Shun...\""
10004050-21 = "É que Shanhaijing tem muitas coisas interessantes, então eu acabei me distraindo..."
10004050-22 = "C-crianças não são assim? Ehehe..."
10004050-23 = "[s] \"É muito estranho uma criança pequena dizer 'crianças são assim'...\""
10004050-24 = "Ugh, isso é, isso é..."
10004050-29 = "Shun! Esperei por você!"
10004050-30 = "S-Saya!?"
10004050-31 = "Eu trouxe o antídoto! Com isso, o efeito da \"Poção de Rejuvenescimento\" deve ser anulado!"
10004050-36 = "Eu mesma criei um antídoto em tão pouco tempo... Como esperado, devo ser um gênio!"
10004050-37 = "[s1] \"...Poção de Rejuvenescimento?\"\n[s2] \"...Shun?\""
10004050-40 = "（Q-que péssima hora para aparecer...）"
10004050-41 = "E-err, a irmã Shun não está aqui, sabe...?"
10004050-42 = "Do que você está falando, Shun? O que isso significa?"
10004050-43 = "...Será que por causa dos efeitos colaterais daquela poção, você perdeu até a memória!?"
10004050-44 = "Hi... hi..."
10004050-46 = "Você me confundiu com outra pessoa!"
10004050-51 = "Uau!? Que perigo... e aliás, para onde você vai!?"
10004050-52 = "Eu trouxe o antídoto com tanto esforço, o que aconteceu com a Shun...?"
10004050-53 = "[s] \"Aquela criança é a Shun...?\""
10004050-54 = "Hm, Sensei, você não sabe da história?"
10004050-55 = "Hmm, por onde eu deveria começar a explicar..."
10004050-58 = "Ouvi de Saya sobre a poção que Shun tomou."
10004050-60 = "[ns] \"Shun tomou uma poção de rejuvenescimento e ficou com a aparência de quando era criança...?\""
10004050-61 = "Exatamente. Bem, embora tenha sido um pouco inesperado, conseguir desenvolver uma poção que realmente reverte a idade física..."
10004050-62 = "Eu mesma fico assustada com o meu próprio talento."
10004050-63 = "Mas, vendo como ela agiu agora há pouco, será que a Shun não ficou infantil também na forma de falar e no seu interior...? Não me lembro dela ser assim quando voltou ao normal da primeira vez..."
10004050-64 = "...Será que isso também é um efeito colateral!?"
10004050-65 = "[s] \"Isso pode acontecer...?\""
10004050-66 = "O interior pode ser influenciado por órgãos físicos, como o cérebro e os hormônios."
10004050-67 = "Não sei a conexão exata, mas pensando de forma simples, pode ser que, conforme o corpo rejuvenesceu, a personalidade e o interior também tenham se tornado infantis."
10004050-68 = "Acho que o corpo ficará bem com este antídoto, mas... será que o interior também voltará ao normal...?"
10004050-69 = "[s] \"...Isso não é um problema sério?\""
10004050-70 = "P-por enquanto, vamos logo fazer ela tomar este antídoto! Conversamos depois!"
10004050-71 = "É uma pesquisa interessante, mas não é hora de ficar observando calmamente."
10004050-72 = "……Muito bem, hora de limpar a bagunça do experimento!"
