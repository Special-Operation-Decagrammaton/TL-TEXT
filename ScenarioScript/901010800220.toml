[translation]
901010800220-6 = "Hmm..."
901010800220-10 = "FOX2, o que foi?"
901010800220-11 = "Esta área parece ser a de mantimentos, mas tem uma coisa me incomodando."
901010800220-15 = "... Caranguejo demais."
901010800220-16 = "Caranguejo?"
901010800220-17 = "É. Não tem nenhum outro alimento, nem frutos do mar, só um monte de caixa de caranguejo."
901010800220-18 = "Quanto tem?"
901010800220-19 = "Umas 20 caixas com 10 caranguejos cada... umas 200 peças, acho."
901010800220-20 = "É uma quantidade enorme. O que eles vão fazer com tanto caranguejo?"
901010800220-22 = "Jantar?"
901010800220-23 = "Mesmo sendo fã de caranguejo, não se come tudo isso de uma vez."
901010800220-24 = "Perdeu a memória, FOX3? Lembra vividamente do primeiro ano, quando você comeu um mega-bowl de gyudon no jantar pós-treino..."
901010800220-28 = "Era só um bowl grande, tá? E por que você está lembrando disso?!"
901010800220-29 = "Eu não sou uma competidora de comida!"
901010800220-31 = "FOX2, detalhe o número de caixas e a quantidade de caranguejo."
901010800220-32 = "Depois da operação, quero investigar a origem desse caranguejo."
901010800220-33 = "Sim, entendi."