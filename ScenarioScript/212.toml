[translation]
212-1 = "ゲブラ：合理を越えた勇猛な仲裁者"
212-2 = "んー……んん～っ……。"
212-3 = "あ、先生。いらっしゃい。#n悪いんだけど、取込み中でね……。"
212-4 = "ん？珍しく忙しそう……？失礼な。いつもすっごく大変なんだけど！？"
212-5 = "あー、ごめん、ちょっと待っててね……。"
212-6 = "いま緊急事態でさ。#nキヴォトス全域のダイヤを見直してるとこなんだ。"
212-7 = "……もしかしたらこれ、シャーレが解決してくれたり？"
212-8 = "キヴォトスの物流のほとんどが、海上輸送に依存してるのは知ってる？"
212-9 = "船なら、列車の数十倍の量を一度に運搬できるからね。"
212-10 = "中でも重要な輸送ルートとして、「[ruby=きょくちこうろ]極地航路[/ruby]」って名前の航路があって。#n氷海を通過しないといけないぶん、輸送距離を大幅に短縮できるんだ。"
212-11 = "そんな大事な航路に正体不明の巨大自律型機械が現れたの！！"
212-12 = "そいつのせいで極地航路が使えなくなっちゃって……もう物流網がめちゃくちゃだよ……。"
212-13 = "はぁ……結果、キヴォトスの交通網を管理してる私たち――交通室が割食ってるんだよね。"
212-14 = "というか！一番マズいのは、このままだと明太子味のポテチが手に入らなくなるかもしれないの……！"
212-15 = "……あー、先生。甘く見てるね？これは由々しき事態なんだよ？"
212-16 = "明太子味のポテチがないと、私は一日たりとも生きていけないの。#nつまり、交通室が機能しなくなるってことなんだから。"
212-17 = "シャーレと連邦生徒会の総力を挙げて、航路を復旧しないと！"
212-18 = "というわけで……私がダイヤを調整して物流を立て直すから、先生があいつをやっつけてくれない？"
212-19 = "あ、行き先は極寒の地になるから、防寒をちゃんとしていった方がいいよ。#nラジエーターとかあるといいかもね。"
212-20 = "あと、極地航路が封鎖される直前に、貨物船からメッセージが届いたんだ。#n何かの手掛かりになるかも。"
212-21 = "＜彼の者の名は「[ruby=Geburah]ゲブラ[/ruby]」、合理を越えた勇猛な仲裁者なり。＞"
212-22 = "……他人の航路を脅かしてるくせに、仲裁って何だろね。大げさな異名だなあ。"
212-23 = "とにかく、早めの解決よろしくね～#n明太子味のポテチがあと3箱しかないからさ。"
