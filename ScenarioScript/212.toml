[translation]
212-1 = "Geburah: O Árbitro Valente que Supera a Razão"
212-2 = "Hmm... Hmmm~..."
212-3 = "Ah, Sensei. Bem-vindo. #nDesculpe, mas estou ocupada agora..."
212-4 = "Hm? Pareço ocupada, algo raro...? Que falta de educação. Eu sempre estou super atarefada, sabia!?"
212-5 = "Ah, desculpe, espere um pouco, tá bom..."
212-6 = "Estamos em uma situação de emergência. #nEstou revisando os horários de toda Kivotos."
212-7 = "...Será que a Schale poderia resolver isso para mim?"
212-8 = "Você sabia que a maior parte da logística de Kivotos depende do transporte marítimo?"
212-9 = "Navios conseguem carregar dezenas de vezes mais carga de uma só vez do que trens, afinal."
212-10 = "Dentre as rotas, existe uma muito importante chamada \"Rota Polar\". #nComo ela atravessa o mar de gelo, reduz drasticamente a distância de transporte."
212-11 = "E uma máquina autônoma gigante e desconhecida apareceu em uma rota tão importante quanto essa!!"
212-12 = "Por causa dela, a Rota Polar ficou inutilizável... a rede logística está uma bagunça..."
212-13 = "Haa... Como resultado, nós da Sala de Tráfego, que gerenciamos as redes de transporte de Kivotos, estamos pagando o pato."
212-14 = "Quer dizer! O pior de tudo é que, se continuar assim, talvez eu não consiga mais comprar batatas fritas sabor mentaiko...!"
212-15 = "...Ah, Sensei. Está subestimando a situação? Isso é um problema gravíssimo, sabia?"
212-16 = "Sem batatas fritas sabor mentaiko, eu não consigo viver nem por um dia. #nOu seja, isso significa que a Sala de Tráfego vai parar de funcionar."
212-17 = "Precisamos usar todo o poder da Schale e do Conselho Estudantil Geral para restaurar a rota!"
212-18 = "Sendo assim... eu vou ajustar os horários para colocar a logística nos eixos, então você poderia derrotar aquele bicho, Sensei?"
212-19 = "Ah, o destino é um lugar congelante, então é melhor se agasalhar bem. #nTalvez seja bom levar um aquecedor."
212-20 = "Além disso, pouco antes da Rota Polar ser bloqueada, recebemos uma mensagem de um navio de carga. #nPode ser uma pista."
212-21 = "<O nome dele é \"Geburah\", o árbitro valente que supera a razão.>"
212-22 = "...Que audácia, ameaçar a rota dos outros e se chamar de árbitro. Que apelido exagerado."
212-23 = "De qualquer forma, conto com uma solução rápida, viu? #nSó me restam 3 caixas de batatas fritas sabor mentaiko..."
