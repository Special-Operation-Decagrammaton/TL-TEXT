[translation]
10032030-1 = "第3話;怪しい奴ら"
10032030-20 = "……なっ！"
10032030-24 = "何なのよ、これぇーーー！！"
10032030-26 = "あはははは！アルちゃん、すっごくいい反応！"
10032030-27 = "そんなの「怪しい奴ら」に決まってるじゃん？#n爆弾まで大量に見つかるなんて！"
10032030-28 = "正確には「リストに載っていない身元不明の奴ら」ね。#nアランチーノ以外の勢力。"
10032030-29 = "もしかすると、テロリストかライバル組織かもしれない。"
10032030-30 = "……それより、軽く回った程度でこれだけの数が出てくるなんて、後どのくらい残ってるのやら……"
10032030-31 = "ど、ど、どうしてみんな落ち着いていられるの！？"
10032030-32 = "これだけのテロリストと爆弾が見つかったのよ！？#nどう考えてもおかしくない！？"
10032030-33 = "そもそもオペラハウスは劇を見る場所であって、誰かに危害を加えるための場所じゃないわよ！？"
10032030-34 = "[s1] \"え、今さら……！？\"\n[s2] \"一応、自覚はあったんだね……\""
10032030-37 = "か、からかってる場合じゃないでしょ、先生！"
10032030-38 = "まずは、どうして爆弾なんて設置したのか聞き出さないと！！"
10032030-39 = "う、うっ……！どうして分かったんだ？#n完璧に隠していたはずなのに……！"
10032030-40 = "専門家でもなければ、発見できない位置だったのに……一体どうやって？"
10032030-44 = "運が悪かったね、こっちにも爆弾の専門家が居るからさ。"
10032030-45 = "ハルカちゃんは、普段から数えきれないほどの爆弾を設置してるからね。#n場所を特定するのなんて、朝飯前だよ？"
10032030-46 = "へ、へへっ……えへへへっ……"
10032030-47 = "むしろ、こっちは別に探すつもりじゃなかったのに、こんな見つかっちゃうなんて……#nちょっとツメが甘いんじゃない～？"
10032030-53 = "そ、そんなバカな……！"
10032030-54 = "私たちを邪魔するってことは……お前たち、アランチーノの部下か！？"
10032030-60 = "どこ向いて喋ってるの？まずは、こっちの質問に答える。"
10032030-61 = "ひぃぃぃっ！？"
10032030-62 = "し、知らない！本当に！！#nただ、命令されたんだ……アランチーノを[ruby=や]殺[/ruby]れって……！"
10032030-63 = "……なるほど。つまり依頼されたってことね？"
10032030-64 = "でも、爆弾だと無関係な人まで巻き添えになる。それに爆音で周囲の目を集めてしまうでしょう。"
10032030-65 = "なのに、爆弾を使う理由なんてある？方法なら他にも色々あるのに。"
10032030-66 = "使わない理由も無いだろ？#nこれが一番確実だと思っただけだ。"
10032030-67 = "それに無関係の人が巻き込まれたところで、私たちの知ったことじゃないからな！"
10032030-72 = "……確実に始末したかったわけね。"
10032030-73 = "……あんた達の他は？どれくらい残ってる？"
10032030-74 = "さ、さあ……詳しくは知らんが、それらしき奴は何人か……"
10032030-78 = "そ、そうか……！お前たちも依頼を引き受けたんだな！？"
10032030-79 = "き、急に襲いかかってきたから、アランチーノ側かと思ってたが……#n聞いてくれ、私たちは敵じゃない！"
10032030-80 = "だから離してくれ！#n……そ、そうだ！手を組もう！お前たちにとっても、悪くない話じゃないか？"
10032030-81 = "ここで揉めてたって意味は無いだろう……#nお、おい！そこの変なの、お前がリーダーだろ？何とか言ってくれよ！"
10032030-82 = "いいから、まずはこれを外し……"
10032030-87 = "はず、し……"
10032030-93 = "ひぐっ……！？"
10032030-98 = "[ns4] \"……気絶しちゃった。\"\n[ns5] \"……容赦ないね。\""
10032030-103 = "い……"
10032030-104 = "今、なんて言いました……？"
10032030-105 = "アル様に向かって「おい」……？「変なの」……？"
10032030-106 = "お前なんかがアル様によくもそんな暴言を……"
10032030-107 = "許せません……"
10032030-108 = "許せません許せません許せません許せません許せません……！！"
10032030-115 = "ひ、ひぃぃぃっ！？！？わ、私は何も言ってないぞ！？"
10032030-119 = "……ハルカ、もういいわ。"
10032030-120 = "……！！"
10032030-121 = "……は、はいっ！"
10032030-122 = "状況は大体分かったわ。#n爆弾を仕掛けて、オペラハウスごと吹き飛ばそうって算段ね……"
10032030-123 = "たしかに面白い発想だわ……手っ取り早くもある。"
10032030-125 = "じゃ、じゃあ……！！"
10032030-129 = "……でも、残念だったわね。"
10032030-130 = "私たち便利屋68は、あなた達のような小物と手を組まないのよ。"
10032030-134 = "こ、小物だと……！？"
10032030-135 = "デカい口叩きやがって……！"
10032030-136 = "たかが私たちを捕まえたくらいで調子に乗るなよ！#nこのオペラハウスに、どれだけ集まってると思う！？"
10032030-137 = "もし仲間たちが知れば……！"
10032030-139 = "……そうだね。"
10032030-143 = "なら、その前に口を封じるだけ。"
10032030-147 = "うぐっ……！"
10032030-154 = "……続けて、社長。"
10032030-155 = "……あっ、うん。"
10032030-156 = "みんな、聞いてちょうだい。#n……ドン・アランチーノは、私たちの獲物よ。"
10032030-157 = "他の連中に譲ることも、手を組むことも論外。#nこれは私たちの仕事なんだから。"
10032030-158 = "……ターゲットが現れる前に、もう一度オペラハウスを見て回りましょう。"
10032030-164 = "え～全部調べるの？大変じゃない？"
10032030-165 = "連絡係から貰ったリストもあるし、不可能ではない。#n……時間は少しかかるけど。"
10032030-171 = "目的は何ひとつ変わってないわ。#n任務を遂行し、報酬を受取る。"
10032030-172 = "相手が誰であれ、社長の私の行く手を遮る者は、全員邪魔者よ。#nそして、邪魔者は排除するのみ。"
10032030-176 = "……行きましょう。"
10032030-182 = "あ、アル様！私も……！！"
10032030-188 = "はぁ……"
10032030-189 = "……結局こうなっちゃったね、先生。"
10032030-190 = "ああ言ってるけどさ、社長は……"
10032030-191 = "[s6] \"大丈夫だよ、分かってるから。\"\n[s7] \"アルらしいね。\""
10032030-194 = "くふふ……無関係な人まで巻き添えになるのは阻止したいんだろうね～さすがアルちゃん。"
10032030-195 = "まあ、本当にオペラハウスが爆発したら、一般の観客も大変なことになるし。"
10032030-196 = "どんどん面白くなってきたじゃん。いいね、いいね～！"
10032030-197 = "というわけで、先生……"
10032030-198 = "……もう少し、お願いね。"
