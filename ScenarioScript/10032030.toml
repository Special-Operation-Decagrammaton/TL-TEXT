[translation]
10032030-1 = "Episódio 3; Os Suspeitos"
10032030-20 = "……O quê?!"
10032030-24 = "O que é isso, afinal de contas?!"
10032030-26 = "Ahahaha! Aru-chan, que reação maravilhosa!"
10032030-27 = "Não é óbvio que são os \"suspeitos\"? #nQuem diria que encontraríamos tantas bombas!"
10032030-28 = "Para ser exata, são \"indivíduos não identificados que não estão na lista\". #nUma facção além da Arancino."
10032030-29 = "Pode ser que sejam terroristas ou uma organização rival."
10032030-30 = "……Mais importante, se encontramos tudo isso só de dar uma volta rápida, imagino quantas mais ainda restam……"
10032030-31 = "P-p-por que vocês estão todas tão calmas?!"
10032030-32 = "Encontramos terroristas e bombas aqui! #nComo isso não é algo para se preocupar?!"
10032030-33 = "Afinal, a casa de ópera é um lugar para assistir a peças, não para ferir os outros!"
10032030-34 = "[s1] \"Ué, só agora percebeu……?!\"\n[s2] \"Pelo menos você tem consciência disso……\""
10032030-37 = "Não é hora de brincar, Sensei!"
10032030-38 = "Primeiro, precisamos descobrir por que eles instalaram essas bombas!!"
10032030-39 = "U-ugh……! Como você descobriu? #nEu tinha escondido perfeitamente……!"
10032030-40 = "Nem um especialista conseguiria encontrar esse local…… Como vocês fizeram isso?"
10032030-44 = "Você teve azar, nós temos uma especialista em bombas aqui."
10032030-45 = "A Haruka-chan instala incontáveis bombas todos os dias. #nIdentificar onde elas estão é moleza para ela."
10032030-46 = "He, hehe…… ehehehe……"
10032030-47 = "Na verdade, a gente nem estava procurando, mas encontrar tantas assim…… #nVocês não estão sendo um pouco descuidados?"
10032030-53 = "I-isso é impossível……!"
10032030-54 = "Se estão atrapalhando a gente…… vocês são subordinados da Arancino?!"
10032030-60 = "Para onde você está olhando enquanto fala? Primeiro, responda à nossa pergunta."
10032030-61 = "Hiiiii!?"
10032030-62 = "E-eu não sei! De verdade!! #nSó me deram uma ordem…… para matar o Arancino……!"
10032030-63 = "……Entendo. Então vocês foram contratados?"
10032030-64 = "Mas, usando bombas, pessoas inocentes seriam atingidas. Além disso, o barulho da explosão atrairia a atenção de todos."
10032030-65 = "Por que usar bombas? Existem várias outras formas de fazer isso."
10032030-66 = "E por que não usar? #nSó achei que esse era o método mais garantido."
10032030-67 = "E se pessoas inocentes forem atingidas, não é problema nosso!"
10032030-72 = "……Então vocês queriam garantir o serviço."
10032030-73 = "……Além de vocês, tem mais alguém? Quantos ainda restam?"
10032030-74 = "E-eu não sei…… não sei os detalhes, mas tem mais alguns caras por aí……"
10032030-78 = "E-então é isso……! Vocês também aceitaram o contrato, não é?!"
10032030-79 = "V-vocês atacaram a gente do nada, então achei que fossem do lado da Arancino…… #nEscutem, nós não somos inimigos!"
10032030-80 = "Então me soltem! #n……I-isso! Vamos nos unir! Não é uma má proposta para vocês, não é?"
10032030-81 = "Não faz sentido brigar aqui…… #nO-oi! Aquela ali, a estranha, você é a líder, né? Diz alguma coisa!"
10032030-82 = "Esquece, primeiro tira isso……"
10032030-87 = "Tira, isso……"
10032030-93 = "Hic……!?"
10032030-98 = "[ns4] \"……Ela desmaiou.\"\n[ns5] \"……Que impiedosa.\""
10032030-103 = "O……"
10032030-104 = "O que você acabou de dizer……?"
10032030-105 = "Chamou a Aru-sama de \"oi\"……? De \"estranha\"……?"
10032030-106 = "Como alguém como você ousa dizer tamanha insolência para a Aru-sama……"
10032030-107 = "Eu não posso perdoar……"
10032030-108 = "Não posso perdoar, não posso perdoar, não posso perdoar, não posso perdoar, não posso perdoar……!!"
10032030-115 = "H-hiiiii!?!? E-eu não disse nada!?"
10032030-119 = "……Haruka, já chega."
10032030-120 = "……!!"
10032030-121 = "……S-sim!"
10032030-122 = "Entendi a situação. #nEntão o plano é plantar bombas e explodir a casa de ópera inteira, é isso……"
10032030-123 = "Certamente é uma ideia interessante…… e bem rápida também."
10032030-125 = "E-então……!!"
10032030-129 = "……Mas que pena para vocês."
10032030-130 = "Nós da Problem Solver 68 não nos aliamos a gente pequena como vocês."
10032030-134 = "G-gente pequena, disse……!?"
10032030-135 = "Não fale como se fosse grande coisa……!"
10032030-136 = "Não se ache só porque nos capturou! #nVocê tem ideia de quantos dos nossos estão reunidos nesta casa de ópera!?"
10032030-137 = "Se os nossos companheiros souberem……!"
10032030-139 = "……É verdade."
10032030-143 = "Então, só preciso calar a boca de vocês antes disso."
10032030-147 = "Ugh……!"
10032030-154 = "……Continue, Presidente."
10032030-155 = "……Ah, sim."
10032030-156 = "Pessoal, escutem. #n……Don Arancino é a nossa presa."
10032030-157 = "Ceder para outros ou formar alianças está fora de questão. #nEste é o nosso trabalho."
10032030-158 = "……Vamos dar mais uma volta pela casa de ópera antes que o alvo apareça."
10032030-164 = "Ehh~ vamos checar tudo? Não vai ser cansativo?"
10032030-165 = "Temos a lista que recebemos do contato, não é impossível. #n……Embora vá levar um pouco de tempo."
10032030-171 = "Nosso objetivo não mudou em nada. #nCompletar a missão e receber a recompensa."
10032030-172 = "Não importa quem seja, qualquer um que bloqueie o caminho da Presidente aqui é um estorvo. #nE estorvos devem ser eliminados."
10032030-176 = "……Vamos."
10032030-182 = "A-Aru-sama! Eu também……!!"
10032030-188 = "Haa……"
10032030-189 = "……No fim das contas, acabou assim, Sensei."
10032030-190 = "Ela diz aquilo, mas a Presidente……"
10032030-191 = "[s6] \"Tudo bem, eu entendo.\" \n[s7] \"É bem a cara da Aru.\""
10032030-194 = "Kufufu…… ela quer evitar que pessoas inocentes sejam pegas no fogo cruzado, né~ como esperado da Aru-chan."
10032030-195 = "Bem, se a casa de ópera realmente explodir, o público em geral estaria em apuros."
10032030-196 = "As coisas estão ficando cada vez mais interessantes. Gostei, gostei~!"
10032030-197 = "Sendo assim, Sensei……"
10032030-198 = "……Conte com você por mais um pouco."
