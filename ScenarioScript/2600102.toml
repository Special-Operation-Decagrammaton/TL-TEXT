[translation]
2600102-1 = "O Segredo do Adulto"
2600102-2 = "Schale - Escritório"
2600102-4 = "Dia de turno da Kotama. Ela trouxe um urso de pelúcia gigante para o escritório da Schale."
2600102-5 = "[ns] \"O que houve de repente?\""
2600102-6 = "Bem, é que... hum..."
2600102-7 = "Isso, é um presente. Um presente para o Sensei."
2600102-8 = "[s] \"Mas nem é meu aniversário!?\""
2600102-9 = "É que o Sensei tem me ajudado com muitas coisas até agora."
2600102-10 = "Depois de pensar muito, cheguei à conclusão de que deveria lhe dar um presente."
2600102-11 = "[s] \"Parece um pouco exagerado... mas aceitarei com gratidão.\""
2600102-12 = "Sim."
2600102-14 = "Diga, Sensei. Esse urso de pelúcia, se possível, poderia deixá-lo aqui no escritório da Schale?"
2600102-15 = "N-não que haja um motivo específico para isso."
2600102-16 = "É só que... acho que o próprio urso ficaria feliz se ficasse aqui."
2600102-17 = "Além disso, seria ideal que ele ficasse em uma posição de onde pudesse ver todo o escritório."
2600102-18 = "Ah, e por favor, não coloque nada na frente dele que bloqueie a visão, e evite umidade e ondas eletromagnéticas tanto quanto possível..."
2600102-19 = "[s] Investigar o interior do urso de pelúcia."
2600102-21 = "S-Sensei? O que está fazendo de repente..."
2600102-23 = "Um dispositivo suspeito foi descoberto atrás de um dos botões do urso de pelúcia."
2600102-24 = "I-isso é, bem... não é nada suspeito. É apenas..."
2600102-25 = "É apenas uma máquina para gravar os sons ao redor!"
2600102-26 = "[s] \"Sinto muito, mas não posso aceitar esse urso de pelúcia...\""
2600102-27 = "...Não foi do seu agrado? Não tem jeito, então..."
2600102-29 = "No entanto, as tentativas de Kotama continuaram depois disso..."
2600102-31 = "Sensei, trouxe um relógio de parede novo. Aqui está."
2600102-32 = "Desta vez é um relógio comum, sim."
2600102-33 = "[s] Investigar o relógio."
2600102-35 = "Havia um dispositivo de escuta escondido atrás dos ponteiros do relógio."
2600102-36 = "I-isso é... um relógio com função de gravação. Fora isso, não há nada de incomum."
2600102-37 = "[s] \"Devolvido.\""
2600102-38 = "Ufa... não deu certo, então."
2600102-40 = "Hoje preparei uma refeição para o Sensei."
2600102-41 = "Por favor, coma antes que esfrie."
2600102-42 = "Um dispositivo de escuta flutuava descaradamente sobre a sopa."
2600102-43 = "[s] ......"
2600102-44 = "...Você percebeu."
2600102-45 = "Pensei que, se fosse comida, talvez funcionasse, mas pelo visto não deu certo..."
2600102-47 = "O urso, o relógio, a comida... tudo falhou. Que método devo usar agora..."
2600102-48 = "[s] \"Por que você se esforça tanto para instalar dispositivos de escuta?\""
2600102-49 = "Não é que eu queira espionar. Eu só quero gravar a voz do Sensei."
2600102-50 = "[s] \"Se é assim, não precisa tentar esconder as coisas, não é...?\""
2600102-51 = "Isso é, bem..."
2600102-52 = "...É porque eu queria saber os segredos do Sensei que as outras alunas não conhecem."
2600102-53 = "Pensei que, se pudesse ouvir o escritório 24 horas por dia, talvez eu descobrisse os segredos do Sensei..."
2600102-54 = "[s1] \"Investigar meus segredos, para que exatamente...?\"\n[s2] \"Você pretende fazer algo terrível comigo, não é!? Tipo naqueles livros proibidos!\""
2600102-55 = "N-não, nada de estranho!"
2600102-56 = "N-não, nada de estranho!"
2600102-57 = "Eu só queria ter uma conversa normal com o Sensei..."
2600102-58 = "Para mim, o Sensei parece um adulto perfeito, sem um único defeito."
2600102-59 = "Claro, o Sensei me ajudou muito até agora, mas talvez por causa disso, a barreira para conversar normalmente com você tenha ficado cada vez mais alta..."
2600102-60 = "Se eu pudesse descobrir os segredos do Sensei que as outras alunas não conhecem, talvez pudéssemos conversar com mais naturalidade... foi o que eu pensei."
2600102-61 = "Dito isso, parece que instalar um dispositivo de escuta no Schale é difícil... Vou desistir de investigar os segredos do Sensei..."
2600102-62 = "[s] \"Na verdade, eu tenho medo de altura.\""
2600102-63 = "……Eh?"
2600102-64 = "[s] \"Lugares altos, esse é o meu ponto fraco.\""
2600102-65 = "E-entendo. Então o Sensei tem medo de altura..."
2600102-67 = "Fufu, peço desculpas, mas não consigo evitar um risinho. O Sensei trabalha em um lugar tão alto, mas tem medo de altura."
2600102-68 = "[s] \"Por isso é um segredo.\""
2600102-69 = "Sim. Mesmo o Sensei, que parece perfeito, tem um ponto fraco inesperado..."
2600102-70 = "Mas sinto que agora entendo um pouco melhor o Sensei do que antes."
2600102-71 = "Muito obrigada, Sensei."
