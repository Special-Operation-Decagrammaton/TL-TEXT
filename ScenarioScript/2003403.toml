[translation]
2003403-1 = "Para realizar um desejo"
2003403-2 = "Sim, chegamos ao festival de mochi★"
2003403-3 = "[s] \"……Entendi?\""
2003403-4 = "Fufu. Significa autossuficiência★"
2003403-10 = "Exatamente isso!"
2003403-11 = "Bem-vindo ao festival de mochi!"
2003403-12 = "Se faltar mochi, é só socar o seu próprio e comer, problema resolvido! Com a sensação de dever cumprido, com certeza ficará ainda mais gostoso."
2003403-13 = "[s] \"A propósito…… vai fazer isso vestida assim?\""
2003403-14 = "Fufu, quanto ao quimono, não se preocupe."
2003403-15 = "Não existe nenhuma regra que proíba fazer mochi usando quimono, não é?"
2003403-16 = "Se rasgar em algum lugar, é só costurar depois."
2003403-17 = "É muito mais importante poder comer o quanto eu quiser desse mochi delicioso★"
2003403-18 = "[s] \"……Bem, se a Akari diz isso.\""
2003403-19 = "Então, vamos começar?"
2003403-22 = "[wa:600]― [log=아카리 새해]Ufa……[/log]"
2003403-23 = "[wa:1230]― [log=아카리 새해]Exige mais [wa:1120]força do que eu pensava.[/log]"
2003403-26 = "― [log=아카리 새해]Está tudo bem, [wa:850]Sensei.[/log]"
2003403-27 = "[wa:1250]― [log=아카리 새해]Ainda consigo continuar.[/log]"
2003403-30 = "[wa:1280]― [log=아카리 새해]Fico feliz que esteja preocupado comigo……[/log]"
2003403-31 = "[wa:2200]― [log=아카리 새해]Mas, na verdade, [wa:1920]eu estou tão animada [wa:430]que não consigo me conter.[/log]"
2003403-34 = "[wa:730]― [log=아카리 새해]Que tipo de mochi vai sair daqui.[/log]"
2003403-35 = "[wa:2560]― [log=아카리 새해]E que tipo de pratos [wa:880]poderei preparar com ele……[/log]"
2003403-38 = "[wa:900]― [log=아카리 새해]……[wa:500]E pensar que,[/log]"
2003403-39 = "[wa:700]― [log=아카리 새해]poderei comer tudo isso com o Sensei……[/log]"
2003403-42 = "[wa:730]― [log=아카리 새해]……[wa:500]Ei, [wa:300]Sensei.[/log]"
2003403-45 = "― [log=아카리 새해]Quando o mochi estiver pronto,[/log]"
2003403-46 = "[wa:1200]― [log=아카리 새해]quero que você seja o primeiro a provar.[/log]"
2003403-49 = "― [log=아카리 새해]Tudo bem, né?[/log]"
2003403-52 = "Isso é incrível! Mesmo sendo sua primeira vez fazendo mochi……!"
2003403-56 = "Espetacular! Está macio e estica muito bem!"
2003403-57 = "O ozoni feito com esse mochi…… por favor, deixe-me provar também!"
2003403-58 = "É um mochi feito para o ozoni, mas……"
2003403-59 = "Já que estamos aqui, quero experimentar fazer vários pratos com mochi★"
2003403-60 = "[s] \"Você que vai fazer, Akari?\""
2003403-61 = "Hmm…… seria o ideal se eu mesma pudesse fazer, mas……"
2003403-62 = "Vou pedir para a cantina, que sempre mantém um bom relacionamento com o Clube de Pesquisa Gastronômica."
2003403-63 = "[s] (Não seria \"ainda\" mantém um bom relacionamento com a cantina……?)"

2003403-64 = "Sensei, vamos lá!"
2003403-69 = "Ozoni, oshiruko, ohagi, isobe-yaki…… Fufu, existem tantas iguarias feitas de mochi!"
2003403-71 = "(Depois disso, comi todos os tipos de pratos de mochi com a Akari)"
2003403-72 = "(……Não consegui comer tudo, mas o mochi da Akari estava delicioso)"
