[translation]
2003403-1 = "希望をかなえるために"
2003403-2 = "はい、餅つき大会にやってきました★"
2003403-3 = "[s] \"……なるほど？\""
2003403-4 = "フフ。自給自足ってことです★"
2003403-10 = "その通りでございます！"
2003403-11 = "ようこそ、餅つき大会へ！"
2003403-12 = "お餅が足りなければ、自分でついて食べて万事解決！達成感も加わって、さらに美味しくなること間違いなしです。"
2003403-13 = "[s]  \"ところで……その恰好で作るの？\""
2003403-14 = "フフッ、着物のことでしたら、大丈夫ですよ。"
2003403-15 = "着物姿でお餅をついてはいけないなんてルール、ないですし？"
2003403-16 = "どこか破れたとしても、繕えばいいだけの話です。"
2003403-17 = "美味しいお餅を好きなだけ食べられるほうが大事ですから★"
2003403-18 = "[s] \"……まあ、アカリがそう言うなら。\""
2003403-19 = "では、はじめましょうか？"
2003403-22 = "[wa:600]― [log=아카리 새해]ふぅ……[/log]"
2003403-23 = "[wa:1230]― [log=아카리 새해]思ったより、[wa:1120]力が要りますね。[/log]"
2003403-26 = "― [log=아카리 새해]大丈夫ですよ、[wa:850]先生。[/log]"
2003403-27 = "[wa:1250]― [log=아카리 새해]まだいけます。[/log]"
2003403-30 = "[wa:1280]― [log=아카리 새해]気遣ってくださって嬉しいです……[/log]"
2003403-31 = "[wa:2200]― [log=아카리 새해]でもやっぱり、[wa:1920]楽しみで[wa:430]仕方がないんです。[/log]"
2003403-34 = "[wa:730]― [log=아카리 새해]どんなお餅ができるのか。[/log]"
2003403-35 = "[wa:2560]― [log=아카리 새해]それで[wa:880]どんな料理が作れるのか……[/log]"
2003403-38 = "[wa:900]― [log=아카리 새해]……[wa:500]それを、[/log]"
2003403-39 = "[wa:700]― [log=아카리 새해]先生と一緒に食べられると思うと……[/log]"
2003403-42 = "[wa:730]― [log=아카리 새해]……[wa:500]ねえ、[wa:300]先生。[/log]"
2003403-45 = "― [log=아카리 새해]お餅ができたら、[/log]"
2003403-46 = "[wa:1200]― [log=아카리 새해]一番に食べてほしいです。[/log]"
2003403-49 = "― [log=아카리 새해]いいですよね？[/log]"
2003403-52 = "これはっ！餅つきは初めてでいらっしゃったのに……！"
2003403-56 = "見事です！柔らかくてよく伸びる！"
2003403-57 = "このお餅で作ったお雑煮……是非私にも食べさせてください！"
2003403-58 = "お雑煮用に作ったお餅ですが……"
2003403-59 = "せっかくですし、いろんなお餅料理を作ってみたいですね★"
2003403-60 = "[s] \"アカリが作るの？\""
2003403-61 = "ん～……自分で作れたら一番ですけれども……。"
2003403-62 = "ここは、美食研究会と日頃から良好な関係を築いている食堂に、お願いするとします。"
2003403-63 = "[s] （「まだ」良好な食堂、の間違いでは……？）"
2003403-64 = "先生、行きましょう！"
2003403-69 = "お雑煮にお汁粉、おはぎ、いそべ焼き……フフ、お餅の美食は、たくさんありますから！"
2003403-71 = "（その後、アカリと一緒にありとあらゆるお餅料理を食べた）"
2003403-72 = "（……全部は食べきれなかったけど、アカリのお餅はとても美味しかった）"
