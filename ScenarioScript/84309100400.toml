[translation]
84309100400-5 = "これで問題ねぇんだよな？"
84309100400-6 = "ええ。ハッキングツールの侵入を確認したわ。後はこのプロセスを修正すれば……。"
84309100400-7 = "これで制御権が我々の手に移ったのかい？"
84309100400-8 = "であれば、警備システムの遠隔操作で諸問題が解決できるようになるのだろうか。"
84309100400-9 = "技術的には可能だけれど……今回そんな細工はしていないの。必要なことだけ、最小限に対応したわ。"
84309100400-11 = "は……？"
84309100400-12 = "あのハッキングツールで、ここから遠隔操作できるようになったんじゃねぇの？"
84309100400-13 = "なんでこんな時に限ってやらねぇんだよ……。"
84309100400-17 = "……過干渉は必ずしも良い結果をもたらさないと、私も学んだの。"
84309100400-21 = "いや、そうだけどよ……。"
84309100400-22 = "なんというかそれとこれは……。"
84309100400-27 = "はぁ……何でもねぇ。その通りだな。"
84309100400-28 = "退屈せずに済んだということにしようか。"
84309100400-29 = "まぁ、そうだな。"
84309100400-30 = "残念そうだな。"
84309100400-31 = "……別に。"
84309100400-33 = "今日もお疲れ様。"
84309100400-34 = "また必要に応じて声をかけさせてもらうわ。"
