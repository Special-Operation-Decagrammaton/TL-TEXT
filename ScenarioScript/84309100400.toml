[translation]
84309100400-5 = "Com isso não tem problema, né?"
84309100400-6 = "Sim. Confirmei a entrada da ferramenta de hacking. Agora, se eu corrigir este processo..."
84309100400-7 = "Isso significa que o controle passou para as nossas mãos?"
84309100400-8 = "Se for esse o caso, será que poderemos resolver vários problemas operando o sistema de segurança remotamente?"
84309100400-9 = "Tecnicamente é possível, mas... desta vez eu não fiz esse tipo de ajuste. Fiz apenas o necessário, o mínimo possível."
84309100400-11 = "Hã...?"
84309100400-12 = "Com aquela ferramenta de hacking, não dava para controlar tudo remotamente daqui?"
84309100400-13 = "Por que você não fez isso logo agora..."
84309100400-17 = "...Eu também aprendi que interferir demais nem sempre traz bons resultados."
84309100400-21 = "Não, eu sei, mas..."
84309100400-22 = "É que uma coisa não tem nada a ver com a outra..."
84309100400-27 = "Ah... deixa pra lá. Você tem razão."
84309100400-28 = "Vamos considerar que, pelo menos, não ficamos entediados."
84309100400-29 = "É, pode ser."
84309100400-30 = "Parece decepcionado."
84309100400-31 = "...Não estou não."
84309100400-33 = "Bom trabalho hoje também."
84309100400-34 = "Entrarei em contato novamente caso seja necessário."
