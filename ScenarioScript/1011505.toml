[translation]
1011505-1 = "A atração do beisebol."

1011505-3 = ""Que calor incrível, né…….""

1011505-4 = "Hoje é o dia do jogo entre nossos eternos rivais!"

1011505-5 = "As duas equipes têm fãs famosos por ter uma relação estranha."

1011505-6 = "中にはこの試合を「uma luta tradicional」って呼ぶ人もいるくらいなんですよ！"

1011505-8 = "Uuu... uwa-aaan...!"

1011505-9 = "Aquele? O som de aplausos com um som de choros no meio?"

1011505-13 = "Irmãzinha……ah, a irmãzinha……onde……？"

1011505-14 = "Se, professor! Aquela menina..."

1011505-15 = "Pessoas estão demais, parece que algumas se perderam."

1011505-16 = "Ei, nesse momento..."

1011505-20 = "Por enquanto, levemos ele até a equipe do estádio, tá?"

1011505-21 = "Professor, aqui estou! Eu sei onde estou, não se preocupe!"

1011505-27 = "Não se preocupe, vamos estar juntos até que encontremos sua família!"

1011505-28 = "Realmente……？"

1011505-30 = "(Quadra de futebol estádio funcionários me guiaram e me levaram ao vestiário)"

1011505-31 = "(Conseguimos decidir esperar juntos até que a outra pessoa chegue)"

1011505-33 = "Você gosta de beisebol?"

1011505-34 = "Não entendi……apenas me seguiu."

1011505-35 = "Mas ela desapareceu…… Talvez não possamos mais nos encontrar."

1011505-36 = "Tudo bem! Provavelmente a família toda está completamente apaixonada pelo beisebol."

1011505-42 = "Aquele? O futebol falhado está indo para cá...?"

1011505-44 = "Uau, oh...!"

1011505-51 = "Yay! Eu peguei! Hoje você está muito engraçado, professor!"

1011505-52 = "……."

1011505-56 = "Isso? Essa bola, você quer?"

1011505-57 = "Uma, não quero. Se encontrar algo perdido, devolva para a polícia. #n, é o que a minha irmã mais velha disse."

1011505-58 = "Ah, agora entendi... essa bola é uma boa bola para pegar. # Na verdade, o beisebol tem algumas coisas diferentes em relação a outros esportes."

1011505-59 = "Que diferença……？"

1011505-60 = "Outros esportes de bola……esportes que usam bola, é verdade que eles usam a bola para marcar pontos, né? #nFutebol, por exemplo, ou Basquete."

1011505-61 = "Esse tipo de esporte não permite trocar a bola durante o jogo ou dar para o #n espectador."

1011505-62 = "Mas o beisebol é um esporte em que as pessoas marcam pontos, então a bola não é tão importante. #n Por isso, assim como, durante o jogo, podemos até dar a bola para os espectadores como um presente!"

1011505-63 = "A bola voa longe e os jogadores voltam para casa... É assim que você quer?"

1011505-64 = "Uuuu... não entendo bem..."

1011505-65 = "Ah, é verdade…… Explicar foi difícil, talvez."

1011505-71 = "Três strikes... você está fora!"

1011505-75 = "Olha! Strike out! Ele está fora! O faul que ele fez há pouco aumentou o número de strikes e agora ele está nervoso."

1011505-76 = "Seu objetivo é fazer com que a bola caia para baixo, usando uma curva para sacudir o batedor."

1011505-77 = "Por fim, com força total, acertou uma bola reta no meio, e com confiança, pegou o jogador que tentava chegar à base. Isso é um verdadeiro confronto direto!"

1011505-81 = "Não entendi…… não é interessante!"

1011505-82 = "Irmã, você não vem me procurar nem que seja um pouco, e é claro que você prefere o beisebol a mim."

1011505-83 = "O beisebol não é nada divertido!"

1011505-84 = "Basta ficar parado e bater a bola que veio."

1011505-85 = "Não é interessante em absoluto! Odio minha irmã! ... E também odeio o beisebol!"

1011505-86 = "……"

1011505-87 = "(Bola de beisebol é, divertido demais……？)"

1011505-88 = "(So eu me lembro, eu também pensava assim quando era pequeno...)"

1011505-89 = "Ei, sabes? O beisebol é um esporte que não é divertido."

1011505-90 = ""Ei, é mesmo assim?""

1011505-91 = "Se, senhor também?..."

1011505-95 = "Era isso, então, no beisebol, o que é importante é controlar tranquilamente um inning."

1011505-96 = "3 jogadores de bate bateram a primeira bola para uma bola aterrissar ou uma bola voar, resultando em 3 strikes consecutivos."

1011505-97 = "Não é necessário ser exagerado, mas é importante não cometer erros."

1011505-98 = "O beisebol é um esporte em que você precisa se esforçar muito, mesmo em lugares onde não é muito observado."

1011505-99 = "A cena de apresentação é importante, mas para vencer, é preciso se esforçar muito também nas partes menos visíveis."

1011505-100 = "Eu gosto daquela parte do beisebol."

1011505-101 = "Você conhece a águia branca? Parece ser elegante, mas, segundo dizem, ela está lutando desesperadamente para se mover debaixo da água."

1011505-102 = "Para manter uma aparência bonita que pode ser vista, está dando o seu máximo esforço em coisas que não podem ser vistas."

1011505-103 = "Você não acha que isso é legal?"

1011505-105 = "......"

1011505-106 = "Só isso…… talvez seja assim……?"

1011505-107 = "Sim, é isso mesmo."

1011505-108 = "Uma expressão de desapontamento."

1011505-109 = "Béisbol, talvez não seja ruim……？"

1011505-110 = "Claro!"

1011505-116 = "O sexto homem pegou bem a bola que caiu em curva."

1011505-117 = "O golpe que quebrou o meio do campo! Ele está correndo, correndo! Ele chuta a primeira base e continua em direção à segunda base!"

1011505-118 = "Yo, eu acertei! Vamos! Vamos em círculos! Corre até a segunda base! Corre até a segunda base!"

1011505-119 = "Ah! Não! Estou jogando com a bola!"

1011505-120 = "Certamente estou bem……Se eu conseguir fazer o slide, vou conseguir!……E agora é a hora da decisão!"

1011505-124 = "……Seguro! Seguro está! Uma ótima jogada de deslize! Converteu um single em um duplo!"

1011505-125 = "Fiz!"

1011505-126 = "Impressionante!"

1011505-127 = "Como está? O beisebol é divertido, né?"

1011505-128 = "ウン、すっごく面白い！なんかよく分かんないけど、ぐわーってなった！すごい！"

1011505-129 = "Fufufu, daqui em diante fica ainda mais engraçado!"

1011505-131 = "(A partida está cada vez mais fervorosa e avançando――)"

1011505-132 = "(A irmã mais velha também finalmente apareceu)"

1011505-133 = "(Com uma aparência bastante nervosa, parecia estar procurando com desespero)"

1011505-135 = "Muito obrigado……Não sei como agradecer….."

1011505-136 = "Está tudo bem? Fiquei muito preocupado, então foi um alívio que você tenha saído incólume."

1011505-137 = "Tudo bem! Não me senti sozinho, pois assistimos ao jogo de beisebol juntos!"

1011505-138 = "Tchau! Hoje foi muito divertido! Obrigado!"

1011505-143 = "Foi bom. E aquele, voltou para casa com um sorriso... hehe."

1011505-144 = ""Eu também fiquei emocionado com a análise de beisebol de Rei.""

1011505-145 = "Ei?! Falar sobre beisebol?!"

1011505-146 = "..."

1011505-147 = "Muuu! Você está me provocando demais, professor!"

1011505-148 = ""Não estou brincando com você.""

1011505-149 = "Então, por favor, não diga nada que possa me envergonhar…."

1011505-151 = "(Réi é que pôs a touca de novo muito fundo na cabeça, mas――)"

1011505-152 = "(ouvido até o fim estava completamente vermelho)"

