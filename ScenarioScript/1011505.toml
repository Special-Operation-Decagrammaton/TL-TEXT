[translation]
1011505-1 = "野球の面白さ"
1011505-3 = "[ns] \"すごい熱気だね……。\""
1011505-4 = "今日は永遠のライバル同士の試合ですから！"
1011505-5 = "両チームのファンは、仲が良いのか悪いのか不思議な関係で有名なんです。"
1011505-6 = "中にはこの試合を「伝統の一戦」って呼ぶ人もいるくらいなんですよ！"
1011505-8 = "うぅ……うわあん……！"
1011505-9 = "あれ？歓声の中に泣き声が……？"
1011505-13 = "お姉ちゃん……あれ、妹は……どこ……？"
1011505-14 = "せ、先生！あの子……。"
1011505-15 = "[s] \"人が多すぎて、はぐれちゃったみたいだね。\""
1011505-16 = "えっと、こういう時は……。"
1011505-20 = "とりあえず、球場スタッフのところまで連れて行ってあげましょうか。"
1011505-21 = "先生、こっちです！場所は私がわかりますから！"
1011505-27 = "大丈夫だよ、家族が見つかるまで、私たちが一緒にいるからね！"
1011505-28 = "本当……？"
1011505-30 = "（球場スタッフに案内されて休憩室に通された）"
1011505-31 = "（迎えが来るまで一緒に待つことにした）"
1011505-33 = "ねぇ、野球って好き？"
1011505-34 = "わかんない……ついてきただけだし……。"
1011505-35 = "でもいなくなっちゃった……もう会えないのかな……。"
1011505-36 = "大丈夫！きっと家族のみんなも、野球に夢中になっちゃってるだけだから。"
1011505-42 = "あれ？ファウルボールがこっちに……？"
1011505-44 = "よっ、ほっ……！"
1011505-51 = "やった！捕れました！今日はツイてますよ、先生！"
1011505-52 = "……。"
1011505-56 = "これ？このボール、欲しい？"
1011505-57 = "ううん、いらない。おとしものを見つけたら、おまわりさんにわたしなさい。#nって、お姉ちゃんが言ってたから。"
1011505-58 = "ああ、なるほど……このボールは貰っていいボールなんだよ。#n実は、野球って他のスポーツとちょっと違うところがあるの。"
1011505-59 = "ちがうところ……？"
1011505-60 = "他の球技……ボールを使うスポーツだと、ボールを使って点を取るよね？#nサッカーとか、バスケットボールとか。"
1011505-61 = "そういうスポーツだと、試合中にボールを変えたり、#n観客にあげちゃったりはしないんだけど……。"
1011505-62 = "でも野球はね、人が得点するスポーツだから、ボールはそんなに大事じゃないんだ。#nだからこうやって、試合中でも観客にボールをプレゼントしたりするの！"
1011505-63 = "ボールは遠くへ飛んで、選手たち[ruby=ホームベース]は家に[/ruby]帰ってくる……どう？カッコよくない？"
1011505-64 = "うーん……よく分かんない……。"
1011505-65 = "そ、そっか……説明が難しかったかな……。"
1011505-71 = "<スリーストライク……アウト！>"
1011505-75 = "見て！三振！アウトだよ！さっきのファウルでストライクが一つ増えて、バッターが焦ったんだ。"
1011505-76 = "それを狙って下に落ちる変化球でバッターを揺さぶって……"
1011505-77 = "最後は真ん中にズバッと直球を決めて、堂々とアウトを取る！これぞ真っ向勝負！"
1011505-81 = "わかんない……おもしろくない！"
1011505-82 = "お姉ちゃん、全然探しに来てくれないし……どうせ私より野球のほうが好きなんだ。"
1011505-83 = "野球なんて全然おもしろくない！"
1011505-84 = "ただ立ってるだけで、ボールが来たら打つだけじゃん……。"
1011505-85 = "全然おもしろくない！お姉ちゃん嫌い！……野球も大嫌い！"
1011505-86 = "……。"
1011505-87 = "（野球が、面白くない……？）"
1011505-88 = "（そういえば、私も小さい頃はそう思ってたな……）"
1011505-89 = "ねぇ、知ってる？野球って「面白くない」のが正しいスポーツなんだよ。"
1011505-90 = "[s] \"えっ、そうなの？\""
1011505-91 = "せ、先生もですか……？"
1011505-95 = "えっと、つまり、野球で大事なのは、淡々と1イニングを抑えることなんだよね。"
1011505-96 = "3人のバッターが最初のボールでゴロかフライを打って、三者凡退で終わらせる。"
1011505-97 = "派手ではないから、つまらなく見えがちだけど、絶対にミスしないことが大事なの。"
1011505-98 = "野球はね、注目されにくいところで頑張らないといけないスポーツなんだよ。"
1011505-99 = "見せ場ももちろん大事だけど、勝つために、地味な部分も必死に努力する――"
1011505-100 = "私は野球のそういうところが好き。"
1011505-101 = "白鳥って知ってる？優雅に見えるけど、水の下では必死に足を動かしてるんだって。"
1011505-102 = "目に見える美しい姿を保つために、見えないところで全力を尽くしてる。"
1011505-103 = "それって、かっこいいと思わない？"
1011505-105 = "……。"
1011505-106 = "そ、そうかな……そうかも……？"
1011505-107 = "そうだよ。"
1011505-108 = "うん……。"
1011505-109 = "野球、悪くないかも……？"
1011505-110 = "でしょ？"
1011505-116 = "6番打者、落ちる変化球をしっかり捉えました！"
1011505-117 = "右中間を破るヒット！走る走る！1塁を蹴ってそのまま2塁を狙います！"
1011505-118 = "ぃよぉーっし打ったーっ！行けー！周れ周れー！2塁まで！2塁まで走れ！"
1011505-119 = "あっ！ダメっ！ボール投げてるよ！"
1011505-120 = "きっと大丈夫……スライディングなら間に合う！……判定は！？"
1011505-124 = "……セーフ！セーフです！見事なスライディング！シングルヒットをツーベースにしました！"
1011505-125 = "やった！"
1011505-126 = "すごい！"
1011505-127 = "どう？野球、楽しいでしょ？"
1011505-128 = "うん、すっごく面白い！なんかよく分かんないけど、ぐわーってなった！すごい！"
1011505-129 = "ふふっ、ここからもっと面白くなっていくよ！"
1011505-131 = "（試合はますます熱を帯びて進み――）"
1011505-132 = "（お姉ちゃんも、ようやく姿を現した）"
1011505-133 = "（かなり慌てた様子で、必死に探していたようだ）"
1011505-135 = "本当に、ありがとうございます……何とお礼を言えばいいのか……。"
1011505-136 = "大丈夫？すっごく心配したんだから……とにかく無事でよかった。"
1011505-137 = "大丈夫だよ！一緒に野球見てたから寂しくなかったんだ！"
1011505-138 = "ばいばい！今日すごく楽しかった！ありがとう！"
1011505-143 = "良かったです。あの子、ちゃんと笑顔で帰れて……へへっ。"
1011505-144 = "[ns] \"私も、レイの野球論に感動したよ。\"  "
1011505-145 = "えっ！？野球論だなんて……。"
1011505-146 = "……"
1011505-147 = "もう！からかうのはやめてください、先生！"
1011505-148 = "[s] \"からかってるつもりはないよ。\""
1011505-149 = "なら、恥ずかしくなるようなことを、言わないでください……。"
1011505-151 = "（レイは帽子をぐっと深くかぶり直したが――）"
1011505-152 = "（耳の先まで真っ赤になっていた）"
