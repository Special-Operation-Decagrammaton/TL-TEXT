[translation]
2000805-1 = "De qualquer forma, a culpa é do Sensei!"
2000805-2 = "Academia Gehenna - Anexo"
2000805-3 = "（Preocupado com o conteúdo do Momotalk, fui visitar a Ako）"
2000805-12 = "……Ah, Sensei?"
2000805-13 = "[s] \"Bom trabalho.\""
2000805-14 = "Po-por que de repente……?"
2000805-18 = "……Ah. Agora que mencionou, eu tinha entrado em contato, não é?"
2000805-19 = "Agradeço a preocupação, mas realmente não aconteceu nada demais……."
2000805-20 = "Foi um dia bem comum. Sem nenhum acontecimento muito grande."
2000805-21 = "……O que está fazendo aqui a uma hora tão tarde da noite?"
2000805-22 = "Como sempre, há uma pilha de documentos que o Comitê Disciplinar precisa processar…… Esse tipo de trabalho acaba vindo parar nas mãos dos oficiais administrativos por questões de aprovação."
2000805-23 = "Bem, é como se fosse o destino de um oficial administrativo."
2000805-24 = "[s] \"Tem algo em que eu possa ajudar?\""
2000805-26 = "Hmm…… Se eu deixar na mão do Sensei, parece que o trabalho só vai aumentar……."
2000805-30 = "Ah, se for assim, poderia descartar o conteúdo desta caixa? Tenho certeza de que só tem coisas para jogar fora nela."
2000805-31 = "Vou dar uma olhada rápida, só por precaução……"
2000805-33 = "Eca, lixo enviado pela Pandemonium Society disfarçado de documentos e……"
2000805-35 = "Sapatos que não servem mais porque colocaram coisas perigosas neles ou jogaram coisas em cima……"
2000805-36 = "Uma coleira para animais de estimação com os dizeres: \"Sua cadela do Comitê Disciplinar!\"……"
2000805-37 = "[s1] \"Isso é bullying……?\"\n[s2] \"Ako, será que…….\""
2000805-38 = "……Sim? Ora, que cara é essa que você está fazendo……."
2000805-39 = "……Sim? Ora, que cara é essa que você está fazendo……."
2000805-40 = "Bem, pode ser que essa seja a intenção deles, mas…… não passa de um desabafo de frustração."
2000805-41 = "……Não importa. Isso não me causa dano algum."
2000805-42 = "Como oficial administrativa do Comitê Disciplinar, isso não é nada demais."
2000805-43 = "[s] \"……Mesmo que você ache que 'não importa', o estresse acaba acumulando, né.\""
2000805-44 = "……Haa."
2000805-45 = "Isso é algum tipo de insinuação? Fingindo ser atencioso, você está dizendo implicitamente que eu \"não estou conseguindo gerenciar meu estresse\"?"
2000805-46 = "Para mim, que sou quase perfeita em tudo o que se refere a gerenciamento?"
2000805-47 = "[s] \"De certa forma, talvez sim.\""
2000805-48 = "O quê!?"
2000805-49 = "Que resposta inesperada…… Bem, é claro que seria mentira dizer que não tenho estresse algum, mas……."
2000805-50 = "Só tem problemas, os membros do Comitê Disciplinar vivem me trazendo problemas, a presidente está sempre ocupada e é difícil encontrá-la…… e o trabalho não termina nem de madrugada……."
2000805-51 = "Bem, é frustrante e as coisas não saem como eu quero, então o estresse acaba acumulando, mas……."
2000805-52 = "Eu acho que consigo fazer meu próprio gerenciamento……."
2000805-53 = "Mas, pensando bem, ultimamente parece estar pior do que antes…… O que mudou recentemente…… Acho que foi o aumento das vezes que encontro o Sensei……."
2000805-57 = "……Ou seja, o meu estresse piorou por culpa do Sensei……?"
2000805-58 = "[s] \"Que conclusão inesperada!?\""
2000805-59 = "Sinto que é isso! Não pode ser outra coisa! Pensando bem, desde que comecei a encontrar o Sensei, a fonte das minhas preocupações só aumenta!"
2000805-60 = "Eu fico preocupada com o que o Sensei faz, e é irritante, ou melhor, é um incômodo, ou melhor, você é um estorvo…… Sinto uma raiva subindo……."
2000805-61 = "Estou me sentindo tão frustrada!"
2000805-62 = "[s] \"É mesmo……!?\""
2000805-63 = "Finalmente liguei os pontos!"
2000805-64 = "A queda de energia durante o trabalho, o defeito no elevador, aquele croquete queimado, a data de validade do pão…… tudo, tudo é culpa do Sensei!"
2000805-65 = "[s3] \"Isso é tirania!?\"\n[s4] \"O pão não tem nada a ver com isso, não é!?\""
2000805-66 = "Não! É culpa do Sensei! De qualquer forma, a culpa é do Sensei!"
2000805-67 = "Não! É culpa do Sensei! De qualquer forma, a culpa é do Sensei!"
2000805-68 = "[s] \"Isso não é descarregar a frustração em mim!?\""
2000805-69 = "I-isso não é verdade! Isso é um salto lógico!"
2000805-70 = "[s] \"Quem é que está saltando para conclusões!?\""
2000805-74 = "Fufu, parece que não vamos chegar a um acordo, não é mesmo..."
2000805-75 = "Já que chegamos a esse ponto, que tal uma aposta? Se você perder, vai ter que colocar esta coleira e latir como um cachorro!"
2000805-76 = "[s] \"...Ah, tudo bem.\""
2000805-77 = "..."
2000805-78 = "...Hã!?"
2000805-79 = "Ei, espera... era esse o rumo que a conversa ia tomar?"
2000805-80 = "Digo, veja bem, não é como se tivéssemos algum equipamento para apostar agora mesmo."
2000805-81 = "[s] \"Quer jogar uma moeda?\""
2000805-82 = "...!?"
2000805-83 = "E-espere um pouco, por favor!?"
2000805-84 = "É, certamente é simples e fácil de entender, mas... hã, você vai fazer isso mesmo?"
2000805-85 = "[s] \"Quer desistir?\""
2000805-86 = "...!"
2000805-87 = "V-você acha que eu fugiria de uma aposta!?"
2000805-88 = "Muito bem, eu aceito! Quem perder fica com a coleira!"
2000805-89 = "...Então, cara ou coroa. Você escolhe, Sensei. Eu fico com o lado oposto."
2000805-90 = "Em troca, eu vou jogar a moeda! Tudo bem para você?"
2000805-91 = "[s5] Cara.\n[s6] Coroa."
2000805-92 = "...Então eu fico com coroa."
2000805-96 = "Então...!"
2000805-102 = "...Está pronto?"
2000805-103 = "O resultado é..."
2000805-107 = "C-cara!?"
2000805-108 = "...Então eu fico com cara."
2000805-112 = "Então...!"
2000805-118 = "...Está pronto?"
2000805-119 = "O resultado é..."
2000805-123 = "C-coroa!?"
2000805-127 = "..."
2000805-128 = "E-então..."
2000805-129 = "...Sensei?"
2000805-130 = "[s] \"Ah... bem, então, regras são regras...\""
2000805-131 = "...!"
2000805-132 = "E-espere! A-aqui mesmo!?"
2000805-133 = "Digo, bem... aqui é um pouco..."
2000805-134 = "S-se eu fizer barulho, alguém pode acabar ouvindo..."
2000805-135 = "[s] \"Então vamos só colocar a coleira e terminar por aqui.\""
2000805-136 = "Não, digo, isso também..."
2000805-137 = "Ugh, uuu..."
2000805-140 = "[wa:400]― Ugh, [wa:1450]nesse estado...!"
2000805-143 = "[wa:350]― Essa humilhação, [wa:1950]eu nunca [wa:450]vou esquecer..."
2000805-146 = "[ns] \"...Então, o que quer fazer agora?\""
2000805-147 = "[wa:500]― Hã!? [wa:450]E- [wa:500]espere!"
2000805-149 = "― Isso não estava [wa:400]no nosso [wa:450]acordo, estava!?"
2000805-152 = "― U- [wa:700]um passeio!? [wa:1850]Você está louco!? [wa:1400]Desse jeito!?"
2000805-155 = "[wa:550]― I- [wa:850]isso já é demais..."
2000805-157 = "― D- [wa:1500]desculpe... [wa:1500]eu [wa:450]me empolguei demais..."
2000805-160 = "[wa:600]― A- [wa:1100]ah... [wa:1850]até quando [wa:500]eu tenho que [wa:470]ficar assim...?"
2000805-164 = "...Que humilhação."
2000805-165 = "Quem diria que eu acabaria sendo tratada desse jeito..."
2000805-166 = "[s] \"Desculpe, talvez eu pudesse ter feito as coisas de um jeito diferente...\""
2000805-170 = "……。"
2000805-171 = "……Não."
2000805-172 = "Pensando bem, eu também agi de forma imatura e disse coisas bastante absurdas..."
2000805-173 = "Quando estou com o Sensei, por algum motivo, não consigo me conter..."
2000805-174 = "Além disso, bem, eu me sinto muito mais aliviada agora..."
2000805-175 = "……E-enfim!"
2000805-176 = "Estamos quites agora!"
2000805-178 = "（Assim, mesmo deixando um clima um pouco constrangedor no ar, fiz as pazes com a Ako e voltamos para o Schale.）"
2000805-179 = "（Só depois de chegar ao Schale é que percebi que tinha trazido a coleira comigo.）"
