[translation]
2000805-1 = "とにかく先生のせいなんです！"
2000805-2 = "ゲヘナ学園・別館"
2000805-3 = "（モモトークの内容が心配になって、アコのところを訪れた）"
2000805-12 = "……あらっ、先生？"
2000805-13 = "[s] \"お疲れ様。\""
2000805-14 = "ど、どうして急に……？"
2000805-18 = "……ああ。そういえば連絡、していましたね。"
2000805-19 = "ご心配はありがたいのですが、本当に大したことは何も……。"
2000805-20 = "割と平凡な一日でしたよ。それほど大きな出来事も無く。"
2000805-21 = "……こんな夜遅くまで何を、ですか？"
2000805-22 = "いつも通り、風紀委員会として処理しなくてはならない書類が山積みで……こういう仕事は決裁の問題もあって、行政官に回ってきがちなんです。"
2000805-23 = "まあ、行政官としての宿命のようなものですね。"
2000805-24 = "[s] \"何か手伝えることとかある？\""
2000805-26 = "うーん……先生にお任せすると、かえって仕事が増えそうですし……。"
2000805-30 = "あぁ、でしたらこの箱の中身を処分していただけますか？確かもう捨てるものしか入っていないはずなので。"
2000805-31 = "一応ざっと見ますか……"
2000805-33 = "えぇっ[ruby=パンデモニウム・ソサエティー]と、万魔殿から[/ruby]送られてきた書類という名のゴミと……"
2000805-35 = "色々危ないものを入れられたりかけられたりして、もう使えない靴と……"
2000805-36 = "「この風紀委員会の犬め！」と書かれたペット用の首輪……"
2000805-37 = "[s1] \"これ、いじめ……？\"\n[s2] \"アコ、もしかして……。\""
2000805-38 = "……はい？全く、何て顔をしているんですか……。"
2000805-39 = "……はい？全く、何て顔をしているんですか……。"
2000805-40 = "まあ、向こうはそういう意図なのかもしれませんが……ただの八つ当たりのようなものですよ。"
2000805-41 = "……こんなものはどうでも良いのです。私にはダメージもありませんし。"
2000805-42 = "風紀委員会の行政官として、これくらい大したことありませんよ。"
2000805-43 = "[s] \"……「どうでも良い」って思えても、ストレスって溜まるよね。\""
2000805-44 = "……ふぅ。"
2000805-45 = "それはあれですか、気を回しているように見せかけて、暗に私が「ストレスを管理しきれていない」とでも言ってるんですか？"
2000805-46 = "管理と名の付くものにおいて、全て完璧に近いこの私に？"
2000805-47 = "[s] \"ある意味ではそうかも。\""
2000805-48 = "なっ！？"
2000805-49 = "ま、まさかの返しでしたね……まあ、もちろんストレスが一つも無いと言えば嘘ですが……。"
2000805-50 = "問題ばかりですし、風紀委員たちが次々に問題を抱えて大変ですし、委員長はいつもお忙しくて中々会えませんし……真夜中まで仕事も終わらず……。"
2000805-51 = "まあ色々と歯がゆくて思う通りにいかなくて、ストレスも溜まりはしますが……。"
2000805-52 = "自己管理……できてると思うのですけれど……。"
2000805-53 = "ですが確かに、考えてみると最近は以前よりひどいような……最近、最近変わったこと……先生と会うことが増えたくらいで……。"
2000805-57 = "……つまり、私のストレスが悪化したのは先生のせいなのでは……？"
2000805-58 = "[s] \"まさかの結論！？\""
2000805-59 = "何だかそんな気がしてきました！そうに違いありません！よく考えれば先生と会ってからというものの、悩みの種が増える一方です！"
2000805-60 = "先生の動向は気になりますし、目障りと言いますかイライラすると言いますか、お邪魔虫と言いますか……何だか怒りがこみ上げてきて……。"
2000805-61 = "何だかむしゃくしゃするんです！"
2000805-62 = "[s] \"そうなの……！？\""
2000805-63 = "ようやく点と点が繋がりました！"
2000805-64 = "仕事中の停電も、エレベータの故障も、あの焦げたコロッケも、パンの賞味期限も……全部、全部先生のせいです！"
2000805-65 = "[s3] \"横暴だ！？\"\n[s4] \"パンだけは違くない！？\""
2000805-66 = "いいえ！先生のせいです！とにかく先生のせいなんです！"
2000805-67 = "いいえ！先生のせいです！とにかく先生のせいなんです！"
2000805-68 = "[s] \"それは八つ当たりでは！？\""
2000805-69 = "そ、そんなことありません！論理の飛躍です！"
2000805-70 = "[s] \"飛躍してるのはどっち！？\""
2000805-74 = "ふふっ、どうやら話は平行線のようですね……。"
2000805-75 = "こうなったら賭けますか？負けたらこの首輪をつけて犬のようにワンと言ってもらいましょう！"
2000805-76 = "[s] \"……あ、良いよ。\""
2000805-77 = "……。"
2000805-78 = "……えっ！？"
2000805-79 = "え、あれ……今そういう流れでした？"
2000805-80 = "その、ほらあれじゃないですか、賭けと言っても今すぐに何か道具があるわけでも無く。"
2000805-81 = "[s] \"コイントスで良い？\""
2000805-82 = "……！？"
2000805-83 = "ちょ、ちょっと待ってください！？"
2000805-84 = "た、確かに手軽ですし分かりやすいですが……え、本当にやるんですか？"
2000805-85 = "[s] \"やめておく？\""
2000805-86 = "……っ！"
2000805-87 = "そ、そう言えば逃げるとでも思いましたか！？"
2000805-88 = "良いでしょう、乗りました！負けた方が首輪と言うことで！"
2000805-89 = "……では、表と裏。どちらにするかは先生が決めてください。私はその反対で。"
2000805-90 = "その代わり、コインは私が投げます！それで構いませんね？"
2000805-91 = "[s5] 表。\n[s6] 裏。"
2000805-92 = "……では、私が裏ですね。"
2000805-96 = "では……！"
2000805-102 = "……準備は良いですか？"
2000805-103 = "結果は……"
2000805-107 = "お、表！？"
2000805-108 = "……では、私が表ですね。"
2000805-112 = "では……！"
2000805-118 = "……準備は良いですか？"
2000805-119 = "結果は……"
2000805-123 = "う、裏！？"
2000805-127 = "……。"
2000805-128 = "そ、その……。"
2000805-129 = "……先生？"
2000805-130 = "[s] \"あー……えっとそしたら、ルールはルールってことで……。\""
2000805-131 = "……っ！"
2000805-132 = "ま、待ってください！こ、ここでですか！？"
2000805-133 = "その、えっと……ここは、ちょっと……。"
2000805-134 = "こ、声を出したら、聞こえてしまうかもしれませんし……。"
2000805-135 = "[s] \"じゃあ首輪だけ着けて終わりにしよっか。\""
2000805-136 = "いえ、その、それも……。"
2000805-137 = "うっ、うぅ……。"
2000805-140 = "[wa:400]― うぅっ、[wa:1450]こんな格好……っ！"
2000805-143 = "[wa:350]― この屈辱、[wa:1950]絶対に[wa:450]忘れませんからね……！"
2000805-146 = "[ns] \"……じゃあ、あとは何がしたい？\""
2000805-147 = "[wa:500]― えっ！？[wa:450]ま、[wa:500]待ってください！"
2000805-149 = "― これ以上は[wa:400]約束と[wa:450]違うじゃないですか！？"
2000805-152 = "― お、[wa:700]お散歩！？[wa:1850]正気ですか！？[wa:1400]このまま！？"
2000805-155 = "[wa:550]― そ、[wa:850]それは流石に……。"
2000805-157 = "― ご、[wa:1500]ごめんなさい……[wa:1500]少し[wa:450]調子に乗り過ぎました……"
2000805-160 = "[wa:600]― あ、[wa:1100]あの……[wa:1850]いつまで[wa:500]こうしていれば[wa:470]良いんですか……？"
2000805-164 = "……屈辱です。"
2000805-165 = "まさか、こんな扱いを受けることになるだなんて……。"
2000805-166 = "[s] \"ごめん、もうちょっと他にやりようがあったかも……。\""
2000805-170 = "……。"
2000805-171 = "……いえ。"
2000805-172 = "冷静に考えてみると私の方こそ、おとなげないことですとか、だいぶ無茶なことを言いましたし……。"
2000805-173 = "先生といると何だか、色々と我慢ができなくなって……。"
2000805-174 = "それにその、だいぶスッキリしたと言いますか……。"
2000805-175 = "……と、とにかく！"
2000805-176 = "これで全部チャラですから！"
2000805-178 = "（そうしてやや気まずい雰囲気を残しつつも、アコと仲直りをしてシャーレへと戻った。）"
2000805-179 = "（シャーレに到着してからようやく、そのまま首輪を持ってきてしまったことに気がついた。）"
