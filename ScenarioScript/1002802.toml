[translation]
1002802-1 = "A Ecologia da Asuna"
1002802-2 = "（De alguma forma, fiquei preocupado com a Asuna e fui até a lavanderia）"
1002802-5 = "（Como já é tarde da noite, o local está silencioso）"
1002802-6 = "Vrum, vrum, vrum..."
1002802-7 = "（Dá para ouvir o som da máquina de lavar funcionando dentro da lavanderia）"
1002802-8 = "[s] Vou em direção ao som."
1002802-15 = "……Hm?"
1002802-16 = "Ouvi um barulho agora há pouco...?"
1002802-17 = "[s1] \"……Asuna?\"\n[s2] \"Bom trabalho.\""
1002802-18 = "……?"
1002802-19 = "……?"
1002802-22 = "[wa:650]— Ué, [wa:1250] o que você está fazendo [wa:550] a essa hora, [wa:750] Mestre?"
1002802-25 = "— ……Eu? [wa:1350] Como pode ver, [wa:1300] vim lavar roupa!"
1002802-28 = "[wa:500]— ……Está perguntando por que estou vestida assim [wa:1250] mesmo tendo vindo lavar roupa?"
1002802-31 = "— Na verdade, [wa:1200] além desta roupa, [wa:900] eu coloquei tudo para lavar."
1002802-33 = "— Como coloquei até as roupas íntimas [wa:400] para lavar, [wa:1150] não tenho mais nada para vestir, sabe?"
1002802-36 = "[wa:1000]— Ei, [wa:1250] não estou mentindo, viu?"
1002802-38 = "— ……Se quiser, [wa:450] pode olhar [wa:1350] e conferir pessoalmente?"
1002802-41 = "[ns3] \"……!?\"\n[ns4] \"Não diga essas coisas tão levianamente...\""
1002802-44 = "[wa:650]— Ahaha, [wa:700] seu rosto ficou vermelho!"
1002802-46 = "— Mas, [wa:350] Mestre, [wa:800] por que você está aqui?"
1002802-49 = "— ……Eh, [wa:750] você veio me ver? [wa:1700] A essa hora?"
1002802-52 = "[wa:800]— Que alegria! [wa:1430] Eu estava justamente aqui sozinha, [wa:550] entediada!!"
1002802-53 = "."
1002802-54 = "— Obrigada, [wa:750] Mestre!! [wa:1450] Então, [wa:450] o que vamos fazer para nos divertir?"
1002802-59 = "Fufu, quem diria que eu encontraria o Mestre em um lugar desses."
1002802-60 = "Será que você ficou preocupado por causa daquela mensagem de antes? Desculpa, e obrigada!"
1002802-61 = "Nossa, ainda bem que eu mandei a mensagem—"
1002802-62 = "……!"
1002802-63 = "……."
1002802-64 = "[s5] \"……Asuna?\"\n[s6] \"Por que ficou séria de repente?\""
1002802-65 = "Será que isso, por acaso..."
1002802-66 = "Será que isso, por acaso..."
1002802-67 = "Parece que eu acabei dando uma ordem para o Mestre...!?"
1002802-68 = "[s7] \"……Uma ordem?\"\n[s8] \"Não precisa se preocupar tanto com isso...\""
1002802-69 = "É que, de certa forma, parece que os papéis se inverteram!"
1002802-70 = "Ahahaha. É, obrigada. Só comentei!"
1002802-71 = "Mas mesmo assim, você veio por causa daquela mensagem. Eu te deixei tão preocupado assim?"
1002802-72 = "……Ah, eu ainda não liguei a máquina de lavar!"
1002802-79 = "（Asuna coloca apressadamente as coisas que estavam no cesto de roupa suja dentro da máquina）"
1002802-84 = "（Depois de terminar tudo com agilidade, a máquina de lavar da Asuna começou a funcionar）"
1002802-87 = "Fufu~, concluído♪"
1002802-88 = "Hum, mas pensando bem, teria sido melhor eu ter mandado mensagem durante o dia, não à noite."
1002802-89 = "O Mestre também precisa dormir direito, né?"
1002802-90 = "……Hm?"
1002802-91 = "Você queria fazer o mesmo que eu, já que eu sempre apareço na hora certa?"
1002802-92 = "……."
1002802-93 = "Incrível! O que é isso? Quando a gente coloca em palavras, parece uma relação incrível, não é!?"
1002802-94 = "Eh? Por que, você não acha?"
1002802-95 = "Aparecermos um para o outro quando precisamos, é uma relação maravilhosa, né!"
1002802-96 = "Beleza, então sempre que o Mestre precisar de algo, a Asuna vai vir correndo! Tipo quando eu terminar de lavar as roupas e estiver livre!"
1002802-97 = "Ou então, quer que eu lave tudo para você daqui em diante? Por mim tudo bem!"
1002802-98 = "……Hm? Vai recusar?"
1002802-99 = "Ei, por que está com essa cara de vergonha? Ahaha, que fofo!"
1002802-100 = "É tão divertido ficar com o Mestre, ahahaha!"
1002802-102 = "（Depois que a Asuna terminou de lavar as roupas, passamos mais um tempo juntos）"
1002802-103 = "（……Quando voltamos para o Schale, o sol já estava nascendo）"
