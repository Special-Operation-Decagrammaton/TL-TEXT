[translation]
1002802-1 = "アスナの生態"
1002802-2 = "（何だかアスナのことが心配になり、コインランドリーへと向かった）"
1002802-5 = "（もう深夜なこともあって、辺りは静まり返っている）"
1002802-6 = "ゴウンゴウンゴウン……"
1002802-7 = "（クリーニング屋の中から、洗濯機が回る音が聞こえた）"
1002802-8 = "[s] 音がする方へと向かう。"
1002802-15 = "……ん？"
1002802-16 = "何か今、音が……？"
1002802-17 = "[s1] \"……アスナ？\"\n[s2] \"お疲れ様。\""
1002802-18 = "……？"
1002802-19 = "……？"
1002802-22 = "[wa:650]― あれ、[wa:1250]こんな時間に[wa:550]どうしたの、[wa:750]ご主人様？"
1002802-25 = "― ……私？[wa:1350]私は見ての通り、[wa:1300]洗濯をしに！"
1002802-28 = "[wa:500]― ……洗濯しに来たのに、[wa:1250]何でその格好なのって？"
1002802-31 = "― 実は今、[wa:1200]この衣装以外、[wa:900]全部洗っちゃってて。"
1002802-33 = "― 下着も[wa:400]全部入れちゃったから、[wa:1150]他に着るもの無くってさー？"
1002802-36 = "[wa:1000]― えー、[wa:1250]嘘じゃないよ～？"
1002802-38 = "― ……何なら[wa:450]直接見て、[wa:1350]確かめてみる？"
1002802-41 = "[ns3] \"……！？\"\n[ns4] \"そういうことを軽々しく言わないの……。\""
1002802-44 = "[wa:650]― あははっ、[wa:700]顔真っ赤！"
1002802-46 = "― ところで[wa:350]ご主人様は、[wa:800]どうしてここに？"
1002802-49 = "― ……え、[wa:750]私に会いに来てくれたの？[wa:1700]こんな時間に？"
1002802-52 = "[wa:800]― 嬉しー！[wa:1430]ちょうど一人で、[wa:550]退屈してたところだったの！！"
1002802-53 = "."
1002802-54 = "― ありがとう、[wa:750]ご主人様！！[wa:1450]じゃあ、[wa:450]何して遊ぼっか？"
1002802-59 = "ふふっ、まさかこんなところでご主人様に会えるなんてねー。"
1002802-60 = "もしかしてさっきの連絡で心配してくれちゃった？ごめんね、ありがと！"
1002802-61 = "いやー、連絡して良かっ――"
1002802-62 = "……！"
1002802-63 = "……。"
1002802-64 = "[s5] \"……アスナ？\"\n[s6] \"急に真面目な顔で、どうしたの？\""
1002802-65 = "これは、もしかして……。"
1002802-66 = "これは、もしかして……。"
1002802-67 = "私がご主人様に対して、命令しちゃった感じになってる……！？"
1002802-68 = "[s7] \"……命令？\"\n[s8] \"そんなに気にしなくても……。\""
1002802-69 = "うん、何だか逆転してる感じだなーって！"
1002802-70 = "あはははっ。うん、ありがとね。言ってみただけ！"
1002802-71 = "にしても、あの連絡で来てくれたんだよね。そんなに心配させちゃった？"
1002802-72 = "……あ、洗濯機まだ回してない！"
1002802-79 = "（アスナが洗濯カゴの中のものを、急いで洗濯機に入れていく）"
1002802-84 = "（てきぱきとそれらを済ませた後、アスナの洗濯機が稼働し始めた）"
1002802-87 = "ふふ～ん、完了♪"
1002802-88 = "うーん、でもこれなら夜じゃなくて、お昼に連絡した方が良かったね。"
1002802-89 = "ご主人様もちゃんと睡眠とらないと、ね？"
1002802-90 = "……ん？"
1002802-91 = "アスナがいつも良いタイミングで来てくれるから、同じことをしたかった？"
1002802-92 = "……。"
1002802-93 = "すごい！何それ、言葉にしてみるとすごい関係じゃない！？"
1002802-94 = "え？だってそう思わない？"
1002802-95 = "お互いに来てほしいときに来てくれるって、すっごく良い関係だよね！"
1002802-96 = "よーし、じゃあこれからもご主人様が何か必要な時には、いつでもアスナが駆けつけるからね！洗濯物をしてて手が空いた時とか！"
1002802-97 = "それか、これからは私が全部洗ってあげようか？それでも良いよ？"
1002802-98 = "……ん？遠慮しとく？"
1002802-99 = "えー、何で恥ずかしそうなの？あはは、可愛い！"
1002802-100 = "ご主人様と一緒だと楽しいなー、あはははっ！"
1002802-102 = "（その後アスナの洗濯が終わってからも、しばらくふたりで時間を過ごした）"
1002802-103 = "（……シャーレに帰る頃には、すでに朝日が昇っていた）"
