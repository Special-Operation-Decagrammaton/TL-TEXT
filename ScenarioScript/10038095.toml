[translation]
10038095-4 = "Eu estava tão preocupada sobre quanto tempo teria que ficar aqui! Obrigada, Mestra..."
10038095-6 = "Parece que você está bem, Saya. #nBem, não temos tempo. Vamos nos apressar."
10038095-7 = "Apressar... para onde?"
10038095-8 = "Para onde mais seria? Para o Clube de Pesquisa de Alquimia, é claro."
10038095-12 = "Hã!? Mas, Mestra... você está bem?"
10038095-16 = "Seu corpo... você não está se esforçando demais?"
10038095-17 = "Fufu... então era isso que estava te preocupando."
10038095-18 = "Existem coisas mais importantes agora, não acha? #nPrimeiro, recuperar o seu Clube de Pesquisa de Alquimia é a prioridade."
10038095-22 = "Vou na frente. Venha comigo."
10038095-28 = "M-Mestra!? Mestra!! Espere!"
10038095-33 = "Aconteceu alguma coisa?"
10038095-34 = "Se é a Mestra, ela com certeza vai recuperar o Clube de Pesquisa de Alquimia. #nPor que você está tão desesperada?"
10038095-39 = "I-Isso é...!"
10038095-40 = "Não... não é nada!"
10038095-45 = "(Estou preocupada com o estado do corpo da Mestra, mas...)"
10038095-46 = "(Também é verdade que, se não recuperarmos o Clube de Pesquisa de Alquimia, não poderei fazer remédios...)"
