[translation]
10038095-4 = "いつまでここに居ればいいのか、ずっと気が気じゃなかったのだ！ありがとうなのだ、門主……"
10038095-6 = "元気そうじゃのうサヤ。#nさて、時間がない。急ぐとしよう。"
10038095-7 = "急ぐって……どこに？"
10038095-8 = "それは無論――錬丹術研究会に、じゃ。"
10038095-12 = "えっ！？でも、門主……大丈夫なのか？"
10038095-16 = "身体は……無理をしすぎているのでは？"
10038095-17 = "ふふ……そんなことを気にしておったのか。"
10038095-18 = "今はそれよりも大事なことがあるじゃろうて。#nまずは、其方の錬丹術研究会を取り戻すのが先決じゃ。"
10038095-22 = "先に行くぞ。ついて来るがよい。"
10038095-28 = "も、門主！？門主！！待つのだ！"
10038095-33 = "どうかされましたか？"
10038095-34 = "門主様なら、絶対錬丹術研究会を取り戻してくださる。#n何をそんなに慌てる必要があるんだ？"
10038095-39 = "そ、それは……！"
10038095-40 = "いや……何でもないのだ！"
10038095-45 = "（門主の体の状態が心配だけど……）"
10038095-46 = "（錬丹術研究会を取り戻さなければ、薬が作れないのも事実なのだ……）"
