[translation]#[Texto Final. - Filipe 05/07.]
901010600320-6 = "Olá!"
901010600320-7 = "Bem-vinda――"
901010600320-8 = "Ora? Você aparece direto ultimamente, hein?"
901010600320-9 = "Hmm, acho que houve um mal-entendido, mas aqui trabalhamos com produtos frescos, não fazemos delivery."
901010600320-10 = "Ahaha, fica tranquilo. Não vim por causa de entrega não."
901010600320-11 = "Tô procurando um peixe pro jantar de hoje…… Tem cavala?"
901010600320-12 = "Cavala tem bastante. Como você quer?"
901010600320-13 = "Pensando em grelhar ou fritar."
901010600320-14 = "Nessa época a cavala tá gordinha, ótima pra sashimi também."
901010600320-15 = "Posso preparar o sashimi aqui. O que acha?"
901010600320-16 = "Hmm, tô na dúvida.#nSashimi parece bom…… mas também queria cavala frita……"
901010600320-17 = "……Dá pra fazer meio a meio?"
901010600320-18 = "Claro!"
901010600320-19 = "Metade pra sashimi e o resto pra fritura, né? Só um minutinho."
901010600320-20 = "Obrigada!"
901010600320-21 = "Fufu, o pessoal daqui é tão simpático."
901010600320-22 = "……O pessoal do portão principal, com exceção daqueles……"
901010600320-23 = "Os caras do portão principal…… a Família Carpaccio?"
901010600320-24 = "Hmm, não queria falar muito sobre eles, mas……"
901010600320-25 = "Se possível, evita contato com a Família Carpaccio.#nEles tão sempre envolvidos em fofoca ruim."
901010600320-27 = "Fofoca ruim…… aquela história dos juros altos?"
901010600320-28 = "Não, não é isso――"
901010600320-34 = "É o que acontece quando você não paga."
901010600320-35 = "Dizem que quem pega dinheiro com a Família Carpaccio e não paga sofre consequências graves.#nBom, mas quem deve e não paga é que tá errado, né."
901010600320-36 = "Consequências graves……?"
901010600320-37 = "É. A Família Carpaccio controla o registro de entrada e saída do porto, né?"
901010600320-38 = "Então, quando não tem movimento, eles trazem o devedor escondido pro porto――#nE dão um sumiço nele."
901010600320-39 = "Aqui é perto do mar, né?#nTem caixa e tambor pra caramba…… dá pra dar sumiço em um ou dois fácil."
901010600320-40 = "Bom, dizem que jogam num tambor cheio de caranguejo pra virar comida, mas…… isso é exagero, com certeza."
901010600320-41 = "Que medo."
901010600320-42 = "Mas não seria melhor receber o dinheiro de volta do que se livrar do devedor?"
901010600320-43 = "Daqui pra frente é só suposição minha…… mas cobrar dívida tem limite."
901010600320-44 = "Quem deve uma fortuna geralmente não tem capacidade de pagar, e recuperar os juros também não é fácil."
901010600320-45 = "Então, se venderem pra mercenários de PMC, dá pra recuperar uma parte――"
901010600320-49 = "Hum! Enfim, ultimamente anda perigoso, melhor você tomar cuidado."
901010600320-50 = "Você parece ser meio ingênua e prestativa…… não deixa alguém te enganar e te levar pra um lugar estranho, tá?"
901010600320-51 = "Sim, vou tomar cuidado."
901010600320-55 = "Prontinho! O sashimi e a cavala pra fritura!"
901010600320-56 = "Obrigada!"