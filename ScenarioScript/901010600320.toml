[translation]
901010600320-6 = "Hello!"
901010600320-7 = "Welcome—"
901010600320-8 = "Oh? I've been seeing you around a lot lately, haven't I?"
901010600320-9 = "Hmm, there seems to be some misunderstanding, but we deal in fresh food here, and we don't do deliveries."
901010600320-10 = "Ahaha, don't worry. I'm not here about a delivery today."
901010600320-11 = "I'm looking for some fish for dinner... do you have any horse mackerel?"
901010600320-12 = "We've got plenty of horse mackerel. How do you want to eat it?"
901010600320-13 = "I was thinking of grilling it or frying it."
901010600320-14 = "Horse mackerel is nice and fatty this time of year, so I'd recommend having it as sashimi, too."
901010600320-15 = "I can prepare it as sashimi for you right here. How about it?"
901010600320-16 = "Hmm, that's a tough choice. #nSashimi sounds delicious... but I really want some fried horse mackerel, too..."
901010600320-17 = "...Is it possible to do half and half?"
901010600320-18 = "Of course!"
901010600320-19 = "So, you want half for sashimi and the rest for frying, right? Just wait a moment."
901010600320-20 = "Thank you very much!"
901010600320-21 = "Hehe, everyone here at the port is so kind."
901010600320-22 = "...The person checking people at the main gate was a bit cold, though—"
901010600320-23 = "The folks checking the main gate... you mean the Carpaccio Family?"
901010600320-24 = "Hmm, I'd rather not talk about them, but..."
901010600320-25 = "If you can help it, you'd better stay away from the Carpaccio Family. #nThey're always at the center of bad rumors."
901010600320-27 = "Bad rumors... you mean about them lending money at high interest rates?"
901010600320-28 = "No, it's not that—"
901010600320-34 = "It's about what happens when you don't pay them back."
901010600320-35 = "They say if you borrow money from the Carpaccio Family and can't pay it back, you're in for a world of hurt. #nWell, it's your own fault for not paying back what you borrowed, though."
901010600320-36 = "A world of hurt... you mean?"
901010600320-37 = "Yeah. The Carpaccio Family manages the entry and exit logs for this port, right?"
901010600320-38 = "So, the rumor is that they bring debtors to the port when it's quiet— #nand dispose of them in secret."
901010600320-39 = "We're right by the sea, you know? #nAnd there are plenty of crates and oil drums around... it's convenient for getting rid of a person or two."
901010600320-40 = "Well, there's even a rumor that they stuff people into drums full of crabs to use as bait... though I think that part is definitely a lie."
901010600320-41 = "That sounds terrifying."
901010600320-42 = "But wouldn't it be more profitable to get the money back rather than disposing of the debtors?"
901010600320-43 = "This is just my guess, but... I think there's a limit to how much you can squeeze out of a debtor."
901010600320-44 = "By the time they've racked up a huge debt, most of them don't have the ability to pay it back, and it's not easy to collect the interest, either."
901010600320-45 = "So, if they sell them off to mercenaries like the PMC, they can at least get something out of it—"
901010600320-49 = "Ahem! Anyway, things have been dangerous lately, so you should be careful, too."
901010600320-50 = "I don't know about others, but you seem a bit naive and meddlesome... so keep that in mind so you don't get tricked and taken somewhere strange."
901010600320-51 = "Yes, I'll be careful."
901010600320-55 = "Anyway, sorry to keep you waiting! Here's your sashimi and your frying fish!"
901010600320-56 = "Thank you very much!"