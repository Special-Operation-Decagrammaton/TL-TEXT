[translation]
901010600320-6 = "Olá!"
901010600320-7 = "Bem-vindo –"
901010600320-8 = "Opa? Você apareceu bastante ultimamente, hein."
901010600320-9 = "Hmm, parece que houve um engano, mas aqui trabalhamos com pescado fresco, não fazemos delivery."
901010600320-10 = "Ahaha, fique tranquilo. Não vim por causa de delivery."
901010600320-11 = "Estou procurando um peixe para o jantar... tem cavala?"
901010600320-12 = "Cavala, sim. Como você quer?"
901010600320-13 = "Estou pensando em grelhada ou frita."
901010600320-14 = "Nessa época, a cavala está gorda, ótima para sashimi."
901010600320-15 = "Podemos preparar o sashimi aqui. Que tal?"
901010600320-16 = "Hmm, fico na dúvida. Sashimi parece bom... mas também estou a fim de cavala frita."
901010600320-17 = "... Dá para fazer metade metade?"
901010600320-18 = "Claro!"
901010600320-19 = "Metade sashimi, o resto para fritar? Só um momento."
901010600320-20 = "Muito obrigada!"
901010600320-21 = "Fufu, o pessoal do porto é muito gentil."
901010600320-22 = "... O segurança do portão principal foi um pouco frio, mas –"
901010600320-23 = "Aqueles caras do portão... é a Família Carpaccio?"
901010600320-24 = "Hmm... não gosto de falar deles, mas..."
901010600320-25 = "É melhor não se envolver com a Família Carpaccio. Eles são alvo de todo tipo de boato ruim."
901010600320-27 = "Boato ruim... sobre emprestar dinheiro com juros altos?"
901010600320-28 = "Não, não é isso –"
901010600320-34 = "É sobre o que acontece com quem não paga."
901010600320-35 = "Quem pega dinheiro com a Família Carpaccio e não devolve passa por maus bocados. Bem, quem deve, paga, mas..."
901010600320-36 = "Maus bocados?"
901010600320-37 = "Sim. Os registros de entrada e saída do porto são controlados por eles."
901010600320-38 = "Dizem que eles trazem os devedores no horário em que não há movimento e... se livram deles discretamente."
901010600320-39 = "O lugar é à beira-mar, né? E tem caixas, tambores... É o ambiente perfeito para fazer alguém sumir."
901010600320-40 = "Bem, também dizem que jogam os devedores dentro de um tambor cheio de caranguejo para dar de comer... mas aí já é exagero."
901010600320-41 = "Que horror."
901010600320-42 = "Mas não seria mais vantajoso para eles receber o dinheiro do que se livrar de quem deve?"
901010600320-43 = "Isso é especulação minha, mas acho que a cobrança tem limite."
901010600320-44 = "Quem acumula uma dívida grande já não tem capacidade de pagar, e não é fácil recuperar nem os juros."
901010600320-45 = "Por isso, vendê-los como mercenários para uma PMC ou algo assim daria um retorno –"
901010600320-49 = "Ahem! De qualquer forma, andam dizendo que está perigoso, é melhor você tomar cuidado."
901010600320-50 = "Você parece ser meio ingênua e boazinha... cuidado para não ser enganada e levada para algum lugar estranho."
901010600320-51 = "Sim, vou tomar cuidado."
901010600320-55 = "Prontinho! Aqui está o sashimi e a cavala para fritar!"
901010600320-56 = "Muito obrigada!"