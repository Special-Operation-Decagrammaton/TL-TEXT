[translation]
10050080-1 = "Episódio 8; A Guerra da Biblioteca Antiga"
10050080-2 = "[ns] \"Hã? Por que o Comitê de Justiça está aqui!?\""
10050080-3 = "Não sei os detalhes, mas não será que eles descobriram algo por aí!?"
10050080-4 = "Como o Sensei me pediu, eu estava agindo junto com as meninas do comitê, mas..."
10050080-13 = "...Então eu entrei em contato com o Sensei..."
10050080-14 = "[s] \"Obrigada, Koharu! Koharu, você é demais!\""
10050080-15 = "V-você acha? Hehehe..."
10050080-16 = "N-não, não é hora de ficar feliz! O que vamos fazer, Sensei!?"
10050080-17 = "Hm? Contatar a Shimiko também...? A-ah, é verdade! Isso também era trabalho do Comitê da Biblioteca."
10050080-22 = "Rápido... saia logo...!"
10050080-26 = "Olá, Koharu-san. Aconteceu alguma coisa?"
10050080-27 = "Shimiko-san! É uma emergência!!"
10050080-28 = "Hã?"
10050080-30 = "É algo realmente grave!?"
10050080-31 = "Eu não te avisei!?"
10050080-32 = "Não, isso não está no nível que a Koharu-san está pensando!"
10050080-33 = "Hã?"
10050080-34 = "Não temos tempo para explicações. De qualquer forma, vou me apressar para a Biblioteca Antiga..."
10050080-35 = "Koharu-san, por favor, vá se esconder em algum lugar."
10050080-36 = "O Comitê de Justiça e a Ui-senpai são como água e óleo!"
10050080-37 = "Hã? Por que eu também...?"
10050080-38 = "...Acho que se a Koharu-san for à Biblioteca Antiga, vai acabar sendo arrastada para isso."
10050080-40 = "Além disso, na pior das hipóteses, podem achar que você é uma informante!"
10050080-41 = "Entendido? Até que tudo isso termine, fique o mais longe possível desse assunto!"
10050080-45 = "Arrastada para isso, informante... com certeza deve ser verdade, mas..."
10050080-46 = "..."
10050080-47 = "...Mas eu tenho que ir."
10050080-48 = "Porque é o certo a se fazer."
10050080-57 = "Sensei...? O que houve com essa sua expressão?"
10050080-58 = "[s] \"Ui! Você estava aqui! Escute bem, agora mesmo--\""
10050080-62 = "...O que é agora..."
10050080-63 = "Espere, Sensei... não sei quem é, mas vou dizer umas verdades..."
10050080-64 = "[s] \"Ah, não, não é isso...!\""
10050080-65 = "Ui Kozeki, você está aí? Aqui é a Mashiro, do Comitê de Justiça."
10050080-66 = "...Comitê de Justiça? Por que..."
10050080-67 = "Olá, presidente Ui. Há quanto tempo."
10050080-68 = "...Por que estão aqui?"
10050080-69 = "Sim, na verdade..."
10050080-70 = "Recebemos uma denúncia de que há livros não autorizados suspeitos aqui!"
10050080-71 = "...Livros não autorizados?"
10050080-72 = "...E o que tem isso?"
10050080-77 = "Sim! Por causa disso... pedimos sua cooperação para realizar uma inspeção completa na Biblioteca Antiga agora!"
10050080-82 = "...Hã?"
10050080-83 = "Que tipo de inspeção...?"
10050080-84 = "Não, espere... o que você disse que vai fazer...?"
10050080-85 = "Inspeção... completa?"
10050080-86 = "...Ou seja."
10050080-87 = "Dentro desta Biblioteca Antiga?"
10050080-88 = "Sim, exatamente!"
10050080-89 = "Isso é..."
10050080-90 = "Você quer dizer que... vai levar todas elas agora?"
10050080-91 = "……Hã?"
10050080-92 = "Ah, sim. Se for necessário, é isso que faremos."
10050080-93 = "Algum problema?"
10050080-97 = "Sendo assim, peço a sua cooperação!"
10050080-98 = "Se não tem nada a esconder, não vejo motivo para recusar—"
10050080-99 = "Não diga bobagens—!!"
10050080-103 = "Fiquei ouvindo em silêncio... mas o que é isso!?#nLevar as minhas crianças?"
10050080-104 = "Você sabe onde está e com quem está falando!?"
10050080-105 = "Escute bem. Se alguém tocar em um único item aqui, não importa quem seja, eu vou..."
10050080-106 = "N-não pode! Essa declaração é uma ameaça ao Comitê de Justiça...!"
10050080-107 = "É um comportamento inaceitável! Jamais será perdoado—"
10050080-108 = "Isso é o que eu deveria dizer! Eu sei muito bem quem está por trás de vocês!"
10050080-109 = "O Chá das Cinco... uma organização cheia de conspirações e encobrimentos, que abusa do seu poder..."
10050080-110 = "No fim, a intenção de vocês era usar a investigação dos livros como desculpa para tomar a biblioteca para si, não era!?"
10050080-111 = "……Hã? Não, não, não é essa a intenção..."
10050080-112 = "Com licença, mas estamos apenas cumprindo nosso dever oficial!!"
10050080-113 = "Exatamente! Se vão agir assim, então usaremos a força...!!"
10050080-125 = "Escutem bem o que vou dizer..."
10050080-126 = "Sem a minha permissão, ninguém levará essas crianças daqui.#nNem sequer uma página."
10050080-127 = "Em outras palavras—"
10050080-128 = "Se querem tanto levá-las, terão que passar por cima de mim primeiro!"
10050080-133 = "……Entendido."
10050080-134 = "Entendi perfeitamente que não há vontade de cooperar."
10050080-135 = "Ao mesmo tempo, considero isso uma desobediência às ordens do Chá das Cinco e uma ameaça ao Comitê de Justiça."
10050080-136 = "A partir de agora, o Comitê de Justiça dará início à execução da justiça."
10050080-137 = "Ah, é mesmo? Era só o que faltava."
10050080-138 = "……Faz tempo, não é? Vamos ver do que vocês são capazes."
10050080-149 = "……Vamos nessa!!"
10050080-154 = "[ns] \"Parem com issooooo!\""
10050080-155 = "Por favor, parem!!"
10050080-156 = "Shimiko?"
10050080-157 = "Sensei?"
10050080-158 = "Pessoal, é um mal-entendido! Por que não conversamos civilizadamente!?"
10050080-159 = "……É, é mesmo?"
10050080-164 = "Sensei? Shimiko? Estão todos bem!?"
10050080-165 = "Ué? Koharu...? Por que você está aqui?"
10050080-166 = "Eu disse para você evacuar..."
10050080-167 = "M-mas... não pode! O que é errado, é errado!"
10050080-168 = "Mais gente...? Quantas pessoas vocês pretendem trazer...?"
10050080-169 = "E outra, Shimiko! Você estava do lado deles!?"
10050080-170 = "Eu até pensei que pudesse haver um traidor, mas nunca imaginei que fosse você! Dizem que não devemos confiar em ninguém, mas..."
10050080-179 = "Aaaah...! S-Shimiko...!!"
10050080-180 = "Sênior!! Você fez besteira de novo, não foi!?#nFalar de traidores... sem nem saber o que os outros sentem...!!"
10050080-181 = "E outra, é senso comum que não se deve atirar nas pessoas do nada, né!?#nQuantas pessoas você pretende mandar para o hospital dessa vez...!?"
10050080-182 = "N-não, eu só..."
10050080-183 = "Sem mais perguntas!!"
10050080-192 = "Aaaaaah!!"
10050080-194 = "Ah... bem..."
10050080-195 = "A situação ficou complicada, mas o objetivo do Comitê de Justiça ainda não foi alcançado."
10050080-196 = "Precisamos investigar os livros não autorizados. Julgamos que há uma alta probabilidade de estarem aqui."
10050080-197 = "A circulação de livros não autorizados em Trinity é uma situação que não podemos ignorar..."
10050080-198 = "Sim, concordo com isso. Não é que eu queira impedir vocês."
10050080-199 = "Ou seja, isso é..."
10050080-205 = "Pessoal, peço mil desculpas."
10050080-206 = "E-eu disse para vocês ficarem escondidas, não disse...!?"
10050080-207 = "Sim, disse, mas... achei que não seria o correto. #nNo fim das contas, tudo isso aconteceu por nossa causa."
10050080-208 = "Agradeço imensamente por terem nos ajudado, mas não desejo que haja conflitos dentro da mesma escola."
10050080-209 = "Vamos, Chefe, venha aqui também. Acho que devemos explicar tudo corretamente."
10050080-210 = "Ah, droga. Conseguimos nos infiltrar sem problemas, achei que seria fácil sair também."
10050080-211 = "...Chefe?"
10050080-212 = "...Peço mil desculpas."
10050080-213 = "Muito prazer, pessoal de Trinity. Somos do Departamento de Publicações da Academia Federal de Redwinter."
10050080-214 = "Publicações?"
10050080-215 = "Departamento?"
10050080-216 = "Sim. Acho melhor explicarmos como chegamos a essa situação."
10050080-217 = "Na verdade, nós..."
10050080-219 = "Ah... bem... ou seja."
10050080-220 = "O pessoal do Departamento de Publicações, para salvar as alunas da Frente de Libertação do Conhecimento que estavam morrendo de fome..."
10050080-221 = "Veio até Trinity para abrir novos canais de venda...?"
10050080-222 = "Bem... não é que eu quisesse ajudar aquelas garotas, é só que o dinheiro..."
10050080-223 = "Chefe?"
10050080-224 = "Desculpe..."
10050080-225 = "Mas, como posso dizer, havia também..."
10050080-226 = "Tínhamos o desejo de apresentar a mais pessoas os meios culturais que nós, de Redwinter, criamos."
10050080-227 = "Aquilo já estava saturado em Redwinter e não havia mais demanda."
10050080-228 = "E, por sorte, acabou fazendo bastante sucesso aqui em Trinity."
10050080-229 = "É verdade..."
10050080-230 = "A escala foi tão grande que tivemos que colaborar com o Comitê da Biblioteca para agir..."
10050080-231 = "Quem diria que o pessoal de Trinity estava ajudando vocês..."
10050080-232 = "Agora entendo por que a investigação foi tão difícil."
10050080-233 = "...Aconteceu tudo isso?"
10050080-234 = "Pois é, Presidente. Por favor, tente se interessar um pouco mais pelo que acontece lá fora."
10050080-235 = "Na verdade, isso também deveria ter sido trabalho da Presidente."
10050080-236 = "N-n-não... i-isso é um pouco pesado demais para mim..."
10050080-237 = "De qualquer forma, acredito que a cultura deve circular."
10050080-238 = "Uma cultura estagnada acabará se tornando um mal que atrasa o grupo."
10050080-239 = "E, sendo sincera, não dá lucro."
10050080-240 = "Bem, não viemos a Trinity com esse grande propósito desde o início, mas..."
10050080-241 = "Ao ver as alunas felizes, comecei a pensar em várias coisas."
10050080-242 = "Ora, então foi assim?"
10050080-243 = "Sim... afinal, existem histórias que se aproximam da perfeição justamente por não serem contadas, não é?"
10050080-244 = "Ugh, você vai falar disso aqui...!"
10050080-245 = "O título de Chefe não é à toa. Mufufu."
10050080-247 = "No entanto, o fato de serem livros não autorizados permanece..."
10050080-251 = "[ns] \"O Comitê da Biblioteca não poderia autorizar?\""
10050080-252 = "O Comitê da Biblioteca...?"
10050080-253 = "...É verdade. A responsabilidade por todos os livros que circulam em Trinity é do Comitê da Biblioteca."
10050080-254 = "Se este livro trazido pelo Departamento de Publicações for autorizado pelo Comitê, deixará de ser um livro não autorizado."
10050080-255 = "Embora eu ache que será necessário ajustar um pouco o conteúdo para se adequar a Trinity."
10050080-256 = "Como eu pensava... era desse nível."
10050080-257 = "Eu já sentia que era o caso, mas..."
10050080-262 = "[ns] \"Seguir esses procedimentos também não é uma forma de 'justiça'?\""
10050080-263 = "Entendo, você tem toda razão."
10050080-264 = "Mesmo em um lugar onde a justiça desmoronou, seguir o processo permite construir uma nova 'justiça'..."
10050080-265 = "Como esperado do Sensei! Aprendi muito!"
10050080-266 = "[s] \"Ah, s-sim! É exatamente isso!\""
10050080-267 = "Falando nisso, o que achou, presidente? Daquele livro."
10050080-268 = "Hã? P-por que está me perguntando..."
10050080-269 = "Você já leu, não leu? Tudo."
10050080-270 = "Como você sabe disso..."
10050080-271 = "Fufu, há quanto tempo você acha que eu estou com a presidente?"
10050080-272 = "Ai, ai, você nem consegue mentir..."
10050080-273 = "Ufa... bem, foi um bom livro. Na minha opinião."
10050080-274 = "A seriedade do departamento editorial e o entusiasmo de todos os criadores foram transmitidos claramente."
10050080-275 = "...Ultimamente, só tem tido negócios rápidos e superficiais, com muitos livros focados apenas no lucro. #nBem... foi melhor do que essas coisas."
10050080-276 = "E então, qual a conclusão?"
10050080-277 = "Eu... acho que está bom. Não acho que precise de ajustes, na verdade..."
10050080-278 = "Não sei sobre as outras pessoas... então deixo isso com a Shimiko."
10050080-279 = "Sim, entendido."
10050080-280 = "Obrigada, pessoal do Comitê da Biblioteca. Então, relatarei o caso dessa forma!"
10050080-281 = "[s] \"Então eu vou junto também. Vou dar uma palavrinha.\""
10050080-282 = "Eu também vou. Como a presidente provavelmente não vai."
10050080-283 = "Não vou."
10050080-284 = "Não posso causar mais problemas para o Sensei e para a Shimiko..."
10050080-285 = "..."
10050080-286 = "Não, então, por favor, cuide disso até o fim."
10050080-287 = "Originalmente, esta tarefa era para ser uma cooperação entre o Comitê de Justiça, o Comitê da Biblioteca e todos, incluindo o Sensei."
10050080-288 = "Fico feliz que tenha terminado bem. Ehehe."
10050080-289 = "Já que está resolvido, que tal darmos uma lida no livro aprovado pela presidente do Comitê da Biblioteca?"
10050080-290 = "Sim! Nós também queremos ler!"
10050080-291 = "(Gulp...)"
10050080-292 = "[s] (Isso, por acaso...)"
10050080-296 = "...!"
10050080-297 = "Isso é bem...!"
10050080-304 = "..."
10050080-305 = "Aaaaaahhh!?!?"
10050080-307 = "Conteúdo indecente não pode! Proibido! Pena de morte!!!"
