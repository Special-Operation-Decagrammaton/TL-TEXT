[translation]
1008002-1 = "[ruby=メンタルアウト]心理掌握[/ruby]"
1008002-2 = "（商店街の落ち着いた雰囲気のあるカフェに[ruby=しょくほう]、食蜂が[/ruby]いるのが見えた）"
1008002-6 = "……あらぁ、先生？"
1008002-7 = "奇遇ねぇ、こんなところで会えるなんて。"
1008002-8 = "今日は良いこと続きだし、ラッキーな日かも？"
1008002-9 = "[s1] ラッキー？\n[s2] 何かあったの？"
1008002-12 = "そうねぇ……今日は天気にも恵まれたしぃ……"
1008002-13 = "素敵なオーガニックカフェも見つけたわぁ。"
1008002-14 = "……それと、待ち望んでいた人にも会えたし？"
1008002-15 = "結構ラッキーな日と言っても、いいんじゃないかしらぁ？"
1008002-16 = "……先生も同じ気持ち？ふぅん、そう。"
1008002-20 = "残念だけど、今は「確認」する手段が無いのよねぇ。#nまぁ、先生は信頼できそうだしぃ、そういうことにしておいてあげる。"
1008002-21 = "……ん？確認？言葉通りの意味よぉ？"
1008002-22 = "生憎と、ここに来てからは別として、いつもは確認してるの。"
1008002-23 = "相手が何を考えているのかとかぁ、どんな思惑を持っているのか、とかね。"
1008002-24 = "頭の中を見てみないことには、本心なんて分からないでしょう？"
1008002-25 = "でも、ここでは力が使えないのよねぇ。#n本当に困ったものだわぁ。"
1008002-26 = "……まぁ、ちょ～っと本気を出せば、使えなくはないけどぉ☆"
1008002-30 = "ふーん？"
1008002-31 = "……もしかして、警戒、させちゃったかしら？"
1008002-32 = "[s3] \"ううん。ただ、何か困ってないかなと思って。\"\n[s4] \"いつもと違う状況だと、落ち着かないよね。\""
1008002-35 = "……あらぁ？"
1008002-36 = "警戒しないのねぇ？#nまぁ、そんな予測力はあったけどぉ。"
1008002-37 = "……信用してくれてありがとう、って？"
1008002-38 = "まったく、変わった人ねぇ……私が言うのも何だけど。"
1008002-39 = "状況が状況だけに、仕方なくだしぃ。"
1008002-40 = "……ガッカリしたかしらぁ？"
1008002-41 = "[s5] \"そんなことないよ。\"\n[s6] \"慣れない場所で、頑張ってると思うよ。\""
1008002-44 = "……疑うのがバカらしくなるくらい良い人ね、あなた。"
1008002-49 = "逆に確認したくなるわねぇ。#nやっぱり、一度覗いてみようかしら？"
1008002-50 = "……え？"
1008002-51 = "むしろ、覗かれたい、操作されたいって……？"
1008002-52 = "さすがに、ちょっとビックリしちゃったかも。"
1008002-53 = "ちょっと疑問力が湧いたわね……具体的に、どういうことかしらぁ？"
1008002-54 = "仕事が多くて大変だから、逃げたくなっちゃう、って？"
1008002-55 = "……つまりぃ？"
1008002-56 = "操作されていたら、怒られずに済むってコトかしらぁ？"
1008002-62 = "……先生。"
1008002-63 = "せっかく私が褒めてあげたのにぃ、さっきの言葉、取り消しちゃうゾ？#nもしかしたら、良い人かもって思ってたけど……ただのおバカさんだったのかもねぇ。"
1008002-64 = "それとも、わざとなのかもしれないけどぉ？"
1008002-65 = "ま、大人なんだから、それくらい自分で何とかなさい？"
1008002-66 = "私の能力をそんな風に使ってほしいなんて言ってきたの、あなたが初めてよぉ？"
1008002-67 = "…………。"
1008002-68 = "ダメなものはダメなんだゾ☆#n仮に能力を使うとしても、それだけは無いかしら。"
1008002-69 = "ん～……ま、でも。 "
1008002-70 = "私を助けてくれたお礼はしておきたいしぃ……"
1008002-71 = "[s7] \"もしかして……\"\n[s8] \"今回だけは特別に……！？\""
1008002-74 = "……。"
1008002-75 = "まさか。#n冗談もほどほどにしないと怒っちゃうゾ☆"
1008002-76 = "このオーガニックジュースでも飲んでみたら？#n眠気覚ましくらいにはなるかもねぇ。"
1008002-77 = "それじゃ……"
1008002-83 = "頑張ってね、先生。"
