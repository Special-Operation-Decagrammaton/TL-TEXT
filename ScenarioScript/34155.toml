[translation]
34155-3 = "Cof, cof..."
34155-4 = "Ah... ugh..."
34155-5 = "Finalmente, conseguimos neutralizar..."
34155-6 = "U-ugh... será que a derrotamos?"
34155-10 = "Nnn... que dor... ter o Sensei por perto é mesmo um problema..."
34155-11 = "[s1] \"Mika... Seia provavelmente está bem.\"\n[s2] \"Por isso, volte para Trinity... Eu não quero te machucar.\""
34155-12 = "Sensei..."
34155-13 = "Sensei..."
34155-14 = "Desculpa... eu sou sempre assim, né..."
34155-15 = "Uma aluna problemática como eu... que vive preocupando o Sensei... eu sei muito bem que não deveria estar ao seu lado..."
34155-19 = "Mas... eu..."
34155-21 = "Eu... para mim..."
34155-23 = "Eu não tenho mais para onde voltar... nem para Trinity... nem para lugar nenhum..."
34155-24 = "Eu sou a traidora de Trinity, a inimiga de todos... #n— a bruxa que feriu a Seia-chan tantas vezes..."
34155-25 = "Se eu for expulsa da escola, nunca mais poderei ver a Nagi-chan, nem as pessoas que são importantes para mim..."
34155-26 = "Se eu deixar de ser uma aluna... até o Sensei vai parar de me ver, uma problemática como eu..."
34155-27 = "Eu sei muito bem que um futuro feliz não me espera..."
34155-28 = "E-eu... sou uma vilã... uma assassina..."
34155-29 = "Por isso... só me resta isso..."
34155-30 = "Mas, vocês... por quê?"
34155-31 = "Eu perdi tudo o que era importante para mim! #n— Tudo foi tirado de mim!!"
34155-32 = "Vocês... por quê?"
34155-34 = "..."
34155-35 = "..."
34155-36 = "..."
34155-40 = "Vocês não pagarem nenhum preço, não terem nada tirado de vocês... isso é..."
34155-41 = "Se eu permitir algo assim... eu..."
34155-42 = "Eu... deixarei de ser quem eu sou..."
34155-43 = "Não restará nenhum significado para mim..."
34155-44 = "Eu..."
34155-45 = "O que eu devo fazer..."
34155-46 = "..."
34155-47 = "Não posso deixar o Esquadrão — a Saori — como está..."
34155-48 = "Não posso permitir que aquela mulher receba a proteção do Sensei sem pagar nenhum preço..."
34155-49 = "..."
34155-50 = "Então, Sensei, não tente me impedir."
34155-63 = "[ns] \"Mika!\""
34155-64 = "E-ela foi embora...?"
34155-65 = "O que ela pensa que é... aquela mulher."
34155-66 = "Você me odeia tanto assim, Mika?"
34155-67 = "...Talvez não tenha jeito."
34155-68 = "Líder, o que faremos? Aquela mulher parece que vai nos perseguir de novo... pode ser perigoso entrar na Basílica assim."
34155-69 = "Arius, o Conselho Estudantil... e agora uma perseguidora... não vamos dar conta de tudo."
34155-70 = "...Vamos entrar na Basílica pelo corredor do subsolo do prédio antigo."
34155-71 = "Não importa o que ela esteja planejando. Vamos... não temos tempo."
34155-75 = "S-sim!"
34155-79 = "...Não tem jeito, né."
34155-80 = "Vamos, Sensei."
34155-85 = "[ns3] Seguir ela.\n[ns4] (Mika...)"
34155-91 = "Próximo episódio: Corredor Subterrâneo"
