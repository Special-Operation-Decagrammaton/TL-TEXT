[translation]
34155-3 = "Cof, cof……."
34155-4 = "Haa…… gh……."
34155-5 = "Enfim, conseguimos contê-la……."
34155-6 = "U-uu…… será que a gente venceu?"
34155-10 = "Nnh…… que dor…… com o Sensei junto, complica mesmo……."
34155-11 = "[s1] \"Mika…… a Seia provavelmente está bem.\"\n[s2] \"Então volta pra Trinity…… eu não quero te machucar.\""
34155-12 = "Sensei……."
34155-13 = "Sensei……."
34155-14 = "Desculpa…… eu sou sempre assim, né……."
34155-15 = "Uma encrenqueira como eu…… uma aluna que só te dá preocupação…… eu sei muito bem que não pode ficar do seu lado……."
34155-19 = "Mas…… eu……."
34155-21 = "Eu…… pra mim……."
34155-23 = "já não existe um lugar pra voltar…… nem Trinity…… nem lugar nenhum……."
34155-24 = "Porque eu sou a traidora de Trinity, a inimiga de todos……#n――a bruxa que feriu a Seia tantas vezes……."
34155-25 = "Se eu for expulsa da academia, a Nagi, as pessoas queridas…… eu nunca mais vou poder ver……."
34155-26 = "Deixando de ser aluna…… uma encrenqueira como eu, nem o Sensei vai mais querer ver……."
34155-27 = "Que um futuro feliz já não existe pra mim, isso eu também sei muito bem……."
34155-28 = "E-eu sou…… uma vilã…… uma assassina……."
34155-29 = "Por isso…… o que me resta é SÓ ISTO, mais nada……."
34155-30 = "E, mesmo assim, vocês…… por quê?"
34155-31 = "Eu perdi tudo o que era importante!#n――Tudo, tudo me foi roubado!!"
34155-32 = "E vocês…… por quê?"
34155-34 = "……."
34155-35 = "……."
34155-36 = "……."
34155-40 = "Vocês, sem pagar preço nenhum, sem perder nada; uma coisa dessas……."
34155-41 = "Se eu permitir uma coisa dessas…… eu……"
34155-42 = "eu…… deixo de ser qualquer coisa……."
34155-43 = "Não sobra sentido nenhum pra mim……."
34155-44 = "Eu……."
34155-45 = "o que é que eu faço……."
34155-46 = "……."
34155-47 = "O Squad――a Saori, eu não posso deixar assim……"
34155-48 = "Essa mulher receber a proteção do Sensei sem pagar preço nenhum, não pode……."
34155-49 = "……."
34155-50 = "Por isso, Sensei, não me impeça, tá."
34155-63 = "[ns] \"Mika!\""
34155-64 = "E-ela foi embora……?"
34155-65 = "Que é essa mulher, afinal……."
34155-66 = "Você me odeia tanto assim…… Mika."
34155-67 = "……Talvez não haja o que fazer."
34155-68 = "Líder, e agora? Aquela mulher parece que vai vir atrás da gente de novo…… invadir a Basílica desse jeito talvez seja meio perigoso."
34155-69 = "A Arius, o Conselho dos Santos…… e ainda uma perseguidora…… não dá conta de tudo."
34155-70 = "……Seguimos pelo corredor sob o prédio velho e entramos na Basílica."
34155-71 = "Não importa o que ela esteja tramando. Vamos…… não há tempo."
34155-75 = "S-sim!"
34155-79 = "……Não tem jeito, né."
34155-80 = "Vamos, Sensei."
34155-85 = "[ns3] Segue junto.\n[ns4] （Mika……）"
34155-91 = "Próximo Episódio;O Corredor Subterrâneo"
