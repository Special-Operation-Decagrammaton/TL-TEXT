[translation]
1001206-1 = "Encontro"
1001206-2 = "Arredores de Millennium - Shopping Center"
1001206-3 = "……."
1001206-4 = "Ah, Treinador!"
1001206-5 = "Eu estava esperando por você!"
1001206-6 = "Hã? Equipamentos de musculação……?"
1001206-7 = "Não, não! Hoje não é sobre isso……."
1001206-8 = "É que, eu não consegui pensar em um lugar melhor além daqui, então acabei escolhendo este."
1001206-9 = "Senti que, com o Treinador, a gente só conversa sobre exercícios toda vez……."
1001206-10 = "Então, hoje eu queria conversar sobre coisas que não têm relação com exercícios……."
1001206-11 = "……."
1001206-13 = "De-desculpe! Treinador!"
1001206-14 = "Você já é tão ocupado, e eu te chamei por conveniência própria!"
1001206-15 = "[s1] \"Não, eu também gostaria de conversar sobre outras coisas com a Sumire.\"\n[s2] \"……Um encontro?\""
1001206-16 = "Sé-sério mesmo?"
1001206-17 = "Muito obrigada, Treinador!"
1001206-18 = "！？"
1001206-19 = "Hã? Um, um encontro? Na-não, eu, eu não sou esse tipo de pessoa……!"
1001206-20 = "Não, quer dizer, não é que eu não queira……!"
1001206-21 = "U-uuh……."
1001206-22 = "[s] \"Para onde vamos?\""
1001206-23 = "Ah, na verdade, hoje é um dia em que não tem problema consumir açúcar e gordura à vontade."
1001206-24 = "O chamado dia do lixo, sabe?"
1001206-25 = "Então, se não se importar, gostaria de ir comer alguma coisa?"
1001206-26 = "[s] \"Então vamos comer algo doce!\""
1001206-27 = "Sim!"
1001206-30 = "Uau……."
1001206-31 = "Eu já tinha ouvido falar por amigos e visto de fora, mas……"
1001206-32 = "Eu achava que lugares assim não eram muito para mim."
1001206-33 = "Vendo de perto, está cheio de coisas fofas, não é?"
1001206-34 = "Só de ter vindo aqui, já valeu a pena, Treinador."
1001206-35 = "O que deseja pedir?"
1001206-36 = "Ah, espere um pouco, por favor."
1001206-38 = "Hmm……."
1001206-39 = "Ah, este bolo……."
1001206-40 = "É muito fofo……!"
1001206-41 = "[s] \"Vai querer esse?\""
1001206-42 = "Sim!"
1001206-43 = "Ah, desculpe, antes disso."
1001206-44 = "Atendente, poderia me tirar uma dúvida?"
1001206-45 = "Sim, o que seria?"
1001206-46 = "Sobre este bolo com esse mascote fofo,"
1001206-47 = "vocês têm a tabela nutricional?"
1001206-48 = "……Sim?"
1001206-49 = "A quantidade total de calorias, açúcar e gordura, quanto tem de cada."
1001206-50 = "Pode não ser o tipo de coisa que se pergunta aqui, mas também estou curiosa sobre o teor de proteína."
1001206-51 = "E-eh, bem…… isso é……."
1001206-52 = "[s] \"Ei, Sumire……?\""
1001206-53 = "Sim, o que foi?"
1001206-55 = "……Ah."
1001206-56 = "Ah, eu de novo... d-desculpe!"
1001206-57 = "Desculpe, por favor, esqueça o que eu acabei de dizer..."
1001206-59 = "（Depois disso, pegamos os doces que pedimos e nos sentamos em uma mesa no café）"
1001206-60 = "Desculpe, Sensei, eu acabei me empolgando..."
1001206-61 = "Não é que eu esteja de dieta, mas entender os componentes da alimentação é a base do treinamento, por assim dizer..."
1001206-62 = "Seja para fortalecer os músculos ou apenas para manter a saúde do corpo, uma dieta baseada no conhecimento correto é essencial."
1001206-63 = "Falando nisso, você tem tomado o suplemento de proteína que eu te enviei?"
1001206-64 = "Como você deve saber, há um limite natural para a quantidade de proteína que se pode ingerir através da alimentação comum."
1001206-65 = "Por isso, tomar suplemento é uma forma prática de obter proteínas de altíssimo valor biológico."
1001206-66 = "O valor biológico aqui se refere aos nutrientes usados para a manutenção da saúde e o crescimento do corpo――"
1001206-67 = "[s3] \"Ei, Sumire...?\"\n[s4] \"Os doces estão...\""
1001206-68 = "……Ah."
1001206-69 = "……Ah."
1001206-70 = "E-eu acabei..."
1001206-71 = "Desculpe, Sensei."
1001206-72 = "Eu acabei me empolgando sozinha de novo..."
1001206-73 = "Quando o assunto é exercício, eu simplesmente não consigo evitar..."
1001206-74 = "Sinto muito, Sensei."
1001206-75 = "[s] \"Não tem problema, vamos comer logo.\""
1001206-76 = "……Sim, Sensei."
1001206-78 = "（Comi os doces deliciosos junto com a Sumire）"
1001206-80 = "[ns] \"Bem, vamos indo?\""
1001206-81 = "……Sim."
1001206-82 = "Hã? A minha expressão...?"
1001206-83 = "I-isso é porque..."
1001206-84 = "Eu estava pensando que, no fim das contas, hoje eu só falei de exercícios de novo..."
1001206-85 = "Eu queria ter tido uma conversa normal, só por hoje."
1001206-86 = "[s5] \"Eu gostei da nossa conversa normal.\"\n[s6] \"A nossa conversa normal, Sumire.\""
1001206-87 = "……Fufu."
1001206-88 = "……Fufu."
1001206-89 = "Sim, talvez você tenha razão."
1001206-90 = "Com licença, cliente!"
1001206-91 = "……Eu?"
1001206-92 = "O bolo que você comprou faz parte de uma promoção do evento, e estamos dando um bicho de pelúcia para os primeiros clientes."
1001206-93 = "Eu achei que já tinham acabado, mas verifiquei o estoque novamente e ainda sobrou um. Aqui está!"
1001206-95 = "Q-que fofo..."
1001206-96 = "Volte sempre!"
1001206-97 = "Sensei...!"
1001206-98 = "Esse bichinho é tão fofo...!"
1001206-99 = "[s] \"Sim, que bom, né?\""
1001206-100 = "Fufu, sim!"
1001206-101 = "Quando estou com o Sensei, tudo sempre termina de forma divertida e feliz."
1001206-103 = "Ei, Sensei."
1001206-104 = "Eu quero continuar fazendo várias coisas com você, incluindo os treinamentos."
1001206-105 = "Por isso, mais uma vez."
1001206-106 = "Conto com você, Sensei."
