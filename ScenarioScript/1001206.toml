[translation]
1001206-1 = "デート"
1001206-2 = "ミレニアム近郊・ショッピングモール"
1001206-3 = "……。"
1001206-4 = "あっ、トレーナー！"
1001206-5 = "お待ちしておりました！"
1001206-6 = "え？筋トレグッズ……？"
1001206-7 = "いえいえ！今日はそうではなく……。"
1001206-8 = "その、ここ以外にちょうど良い場所が思い浮かばず、ここにしてしまったのですが。"
1001206-9 = "なんだか、トレーナーとは毎回運動のことしか話してない気がしていたので……。"
1001206-10 = "今日は運動とは関係ないお話もしたいな、と……。"
1001206-11 = "……。"
1001206-13 = "す、すみません！トレーナー！"
1001206-14 = "ただでさえお忙しいのに、私の都合でお呼びしてしまい！"
1001206-15 = "[s1] \"ううん、スミレと他のことも話してみたいな。\"\n[s2] \"……デート？\""
1001206-16 = "ほ、本当ですか？"
1001206-17 = "ありがとうございます、トレーナー！"
1001206-18 = "！？"
1001206-19 = "え？で、デートですか？い、いや、わ、私がそんな……！"
1001206-20 = "いえその、嫌というわけでは……！"
1001206-21 = "う、うぅ……。"
1001206-22 = "[s] \"どこに行こっか？\""
1001206-23 = "あ、実は今日、糖分や脂肪を好きなだけ摂取しても問題ない日なんです。"
1001206-24 = "いわゆるチートデー、というものですね。"
1001206-25 = "なのでよろしければ、何か食べに行きませんか？"
1001206-26 = "[s] \"じゃあ甘いもの食べに行こう！\""
1001206-27 = "はい！"
1001206-30 = "わあ……。"
1001206-31 = "友人から話を聞いたり、外から見たりはしていましたが。"
1001206-32 = "こういうところは、私にはあまり縁のないところだなと思っていました。"
1001206-33 = "こうして来てみると、可愛いものでいっぱいですね。"
1001206-34 = "もうすでに、ここに来て良かったです、トレーナー。"
1001206-35 = "ご注文はいかがなさいますか？"
1001206-36 = "あっ、ちょっと待ってください。"
1001206-38 = "うーん……。"
1001206-39 = "あっ、このケーキ……。"
1001206-40 = "すごく可愛いです……！"
1001206-41 = "[s] \"それにする？\""
1001206-42 = "はい！"
1001206-43 = "あっ、すみませんその前に。"
1001206-44 = "店員さん、質問してもよろしいでしょうか？"
1001206-45 = "はい、なんでしょう？"
1001206-46 = "この可愛いマスコットが付いたケーキについてなのですが、"
1001206-47 = "成分表はありますか？"
1001206-48 = "……はい？"
1001206-49 = "全体のカロリー、糖分、脂肪分、それぞれどのくらいなのか。"
1001206-50 = "こういったものに求めるものではないかもしれませんが、たんぱく質の含有量も気になります。"
1001206-51 = "え、えっと……それは……。"
1001206-52 = "[s] \"あの、スミレ……？\""
1001206-53 = "はい、なんでしょう？"
1001206-55 = "……あっ。"
1001206-56 = "わ、私また……す、すみません！"
1001206-57 = "すみません、今言ったことは気にしないでください……。"
1001206-59 = "（その後、頼んだスイーツを受け取って、カフェの中の席に座った）"
1001206-60 = "すみませんトレーナー、つい……。"
1001206-61 = "ダイエット中というわけではないのですが、食事の成分を把握することはトレーニングの基礎と言いますか……。"
1001206-62 = "筋肉を鍛えるためにも、そうでなくても体の健康を維持するためにも、正しい知識に基づいた食生活は大切なんです。"
1001206-63 = "そういえば、以前お送りしたプロテインはちゃんと飲まれてますか？"
1001206-64 = "ご存知かと思いますが、一般的な食事でのたんぱく質の摂取量には自ずと限界があります。"
1001206-65 = "そこで、プロテインを飲むことで手軽に、そして非常に生物価の高いタンパク質が得られるんです。"
1001206-66 = "ここでいう生物価とは、健康の維持と身体の成長に使われる栄養素における――"
1001206-67 = "[s3] \"あの、スミレ……？\"\n[s4] \"スイーツが……。\""
1001206-68 = "……あ。"
1001206-69 = "……あ。"
1001206-70 = "つ、つい……！"
1001206-71 = "すみません、トレーナー。"
1001206-72 = "また私、ひとりで興奮してしまって……。"
1001206-73 = "運動の話になるとどうしても……。"
1001206-74 = "申し訳ありません。トレーナー。"
1001206-75 = "[s] \"ううん、とりあえず食べよっか。\""
1001206-76 = "……はい、トレーナー。"
1001206-78 = "（スミレと一緒に、美味しくスイーツを頂いた）"
1001206-80 = "[ns] \"さて、そろそろ帰ろっか？\""
1001206-81 = "……はい。"
1001206-82 = "え？顔色……？"
1001206-83 = "そ、それは……。"
1001206-84 = "結局、今日もつい運動の話ばかりしてしまったなと、思いまして……。"
1001206-85 = "今日だけは、普通の会話をしたかったのに。"
1001206-86 = "[s5] \"普通の会話が出来て楽しかったよ。\"\n[s6] \"スミレと私の、普通の会話。\""
1001206-87 = "……ふふっ。"
1001206-88 = "……ふふっ。"
1001206-89 = "はい、そうかもしれませんね。"
1001206-90 = "あの、お客様！"
1001206-91 = "……私ですか？"
1001206-92 = "お客様が購入されたケーキが現在イベントの対象になっておりまして、先着でぬいぐるみをお渡ししているんです。"
1001206-93 = "もう無いと思っていたのですが、あらためて在庫を確認してみたらまだ一つ残ってまして。どうぞ！"
1001206-95 = "か、可愛い……。"
1001206-96 = "それでは、またお越しください！"
1001206-97 = "トレーナー……！"
1001206-98 = "この子、すごく可愛いです……！"
1001206-99 = "[s] \"うん、良かったね。\""
1001206-100 = "ふふっ、はい！"
1001206-101 = "トレーナーと一緒にいると、いつも最後には楽しくて幸せになります。"
1001206-103 = "あの、トレーナー。"
1001206-104 = "これからもトレーナーと一緒に、トレーニングを含め、色々なことをしていきたいです。"
1001206-105 = "なので、あらためて。"
1001206-106 = "よろしくお願いします、トレーナー。"
