[translation]
80000095-1 = "Qual será a verdade?"
80000095-2 = "（Recebi uma mensagem da Kasumi e marcamos de nos encontrar em um lugar pouco movimentado）"
80000095-3 = "（Pouco tempo depois, vi a Kasumi caminhando tranquilamente de longe, acenando para mim）"
80000095-4 = "Opa, Sensei! Você é rápido!"
80000095-5 = "Hahahaha! Foi mal, foi mal, parece que te fiz esperar. #nEra para eu ter chegado antes, mas..."
80000095-6 = "Como você sabe, eu sou muito popular. #nDemorei um pouco para despistar o pessoal que estava me seguindo."
80000095-7 = "Foi por esse motivo que escolhi este lugar."
80000095-8 = "……Hm? #nQuer saber por que te chamei?"
80000095-9 = "Ei, ei, não se faça de desentendido. #nAté eu sei que dia é hoje."
80000095-10 = "É o Dia dos Namorados, que só acontece uma vez por ano, sabia?"
80000095-11 = "Ou será que... você não ficou feliz em receber chocolate de mim?"
80000095-12 = "Se for esse o caso, preciso pedir desculpas. #nAfinal, desperdicei o seu tempo precioso. Hahahaha!"
80000095-13 = "……Não foi isso? #nQue bom! Fico mais aliviada então."
80000095-14 = "Então, aqui está..."
80000095-15 = "Tcharam!"
80000095-20 = "[ns1] \"Uma... sandália?\"\n[ns2] \"É... chocolate?\""
80000095-23 = "Isso mesmo! Você se lembra, Sensei?"
80000095-24 = "Daquela vez na floresta, quando minha sandália quebrou e você me trouxe uma nova."
80000095-25 = "Pode ter sido um detalhe insignificante para você, mas... #neu sou do tipo que faz questão de retribuir favores."
80000095-26 = "Mas não teria graça devolver a mesma coisa... então, resolvi fazer em formato de chocolate!"
80000095-27 = "Ficou bem parecido, não ficou? #nSe olhar de longe, dá até para confundir com um chinelo de verdade."
80000095-28 = "……Hm?"
80000095-29 = "Se fui eu que fiz? ...Bem, o que você acha?"
80000095-30 = "Hahaha. De qualquer forma, a minha \"marca\" está nele, viu?"
80000095-31 = "Se é a marca da minha mão..."
80000095-32 = "……Ou do meu pé, eu não vou dizer."
80000095-36 = "[ns3] \"…………Hã?\"\n[ns4] \"…………Pé?\""
80000095-39 = "Hahahaha! Ora, ora!"
80000095-40 = "Vamos deixar esses detalhes de lado!"
80000095-44 = "……Opa."
80000095-45 = "Sensei... desculpe, mas vou ter que ir. #nParece que descobriram onde eu estou."
80000095-46 = "Seria um problema para você se te vissem comigo, não seria?"
80000095-47 = "Então, até mais! Aproveite bem quando chegar em casa!"
80000095-48 = "Até a próxima!!"
80000095-56 = "……Ah!!"
80000095-57 = "Já ia me esquecendo. Como eu fiz no formato de sandália, #nsinta-se à vontade para calçar antes de comer!"
80000095-58 = "Claro, a decisão é sua! Hahahaha!!"
80000095-66 = "（Depois disso, voltei ao Schale e examinei o chocolate que a Kasumi me deu）"
80000095-67 = "（……Ignorei a parte sobre as mãos e os pés e comi tudo, estava delicioso）"
