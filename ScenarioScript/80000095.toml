[translation]
80000095-1 = "真相は如何に"
80000095-2 = "（カスミから連絡をもらい、人通りの少ない場所で待ち合わせをすることになった）"
80000095-3 = "（しばらくすると、遠くから手を振りながらゆったり歩いてくるカスミの姿が見えた）"
80000095-4 = "おお～、先生！早いな！"
80000095-5 = "ハーハッハッハッハ！悪い悪い、待たせてしまったようだな。#n本来なら私が先に待っている予定だったのだが……"
80000095-6 = "知っての通り、私は人気者でね。#n追いかけてくる奴らを撒いていたら時間がかかってしまった。"
80000095-7 = "ここを選んだのも、そういう理由でな。"
80000095-8 = "……ん？#n何の用事かって？"
80000095-9 = "おいおい、とぼけないでくれよ？#n私でさえ今日が何の日か知ってるくらいなのに。"
80000095-10 = "年に一度のバレンタインデーなんだぞ？"
80000095-11 = "それとも……私にチョコレートをもらったところで嬉しくなかったか？"
80000095-12 = "そうだったのなら謝らなくてはな。#n先生の貴重な時間を無駄にしてしまったのだから。ハーッハッハッハ！"
80000095-13 = "……そうじゃなかったのか？#nそれは良かった！であれば、私も気が楽というもの。"
80000095-14 = "では、こいつを……"
80000095-15 = "ド～～～ン！"
80000095-20 = "[ns1] \"サン……ダル？\"\n[ns2] \"チョコレート……なの？\""
80000095-23 = "そうそう！先生は覚えてるか？"
80000095-24 = "以前、森で私のサンダルが壊れたときに新しい物を持ってきてくれただろう。"
80000095-25 = "先生にとっては些細な出来事だったかもしれないが……#n私は借りをしっかり返す主義でね。"
80000095-26 = "でも、同じ物を返しても面白くない……というわけで、チョコレートにしてみたのさ！"
80000095-27 = "それっぽくできてるだろう？#n遠目に見れば本物のスリッパと見間違うはずだ。"
80000095-28 = "……ん？"
80000095-29 = "手作りかって？……さあ、どっちだと思う？"
80000095-30 = "フッフッフ。いずれにせよ、私の「痕」は残っているぞ？"
80000095-31 = "それが手なのか……"
80000095-32 = "……それとも足なのかは言わないでおくが。"
80000095-36 = "[ns3] \"…………え？\"\n[ns4] \"…………足？\""
80000095-39 = "ハーッハッハッハ！まぁまぁ！"
80000095-40 = "そんな細かい話は置いとこうじゃないか！"
80000095-44 = "……おっと。"
80000095-45 = "先生……悪いが、この辺りで失礼する。#nどうやら、居場所がバレてしまったらしい。"
80000095-46 = "私と居るところを見られたら、先生も困るだろう？"
80000095-47 = "それではさらばだ！帰ったらじっくり味わってくれ！"
80000095-48 = "では、また会おう～！！"
80000095-56 = "……あ！！"
80000095-57 = "そうだ。せっかくサンダルとして作ったんだ。#n食べる前に履いてみてもいいからな～！"
80000095-58 = "もちろん、どうするかは先生に任せるが！ハーハッハッハッハ！！"
80000095-66 = "（その後、シャーレに戻ってからカスミにもらったチョコレートを確認した）"
80000095-67 = "（……手と足の件からは目を背け、美味しく頂いた）"
