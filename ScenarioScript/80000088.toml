[translation]
80000088-1 = "RABBIT4、贈ります"
80000088-2 = "シャーレ・執務室"
80000088-3 = "あ、先生……。"
80000088-4 = "お、おはようございます……。"
80000088-5 = "[s] \"おはよう、ミユ。どうかした？\""
80000088-6 = "その……今日はバレンタインデーと聞きまして……"
80000088-7 = "いつもお世話になっている先生に、ささやかなお礼をと思い……"
80000088-8 = "ど、どうぞ……つまらないものですが……。"
80000088-13 = "[ns] \"ありがとう！これは……？\""
80000088-14 = "チョコレートバークといいます……。"
80000088-15 = "本当はもう少し豪華なチョコレートを用意したかったのですが……#nその、状況的に難しくて……"
80000088-16 = "補給品のチョコレートと、採取した果物で作ってみました……。"
80000088-17 = "綺麗な形ではありませんが……#n私はこういうものしか用意できなくて……。"
80000088-18 = "うぅ……やっぱり期待外れでしたよね……？"
80000088-19 = "[s] \"そんなことないよ。ミユの気持ちがこもってて嬉しい。\""
80000088-20 = "ですが……先生は他の方々からもすでにたくさん頂いているでしょうし……"
80000088-21 = "こんなみっともないチョコレートなんて、#nすぐに記憶から消え去ってしまうと思います……。"
80000088-22 = "そうして私がバレンタインデーにプレゼントを#n贈ったことも、忘れられていくんでしょうね……。"
80000088-23 = "私は誰の記憶にも残らないまま、落ち葉のように捨てられて……"
80000088-27 = "[ns] ミユのチョコレートを食べる。"
80000088-28 = "先生……？"
80000088-32 = "[ns] ミユのチョコレートを全力で食べる！"
80000088-33 = "せ、先生……！？"
80000088-34 = "ちょ、ちょっと待ってください……突然どうしたんですか……！？"
80000088-35 = "そ、そんなに急いで食べたら――"
80000088-36 = "[s] \"……けほっ、けほっ！\""
80000088-37 = "だ、大丈夫ですか……？"
80000088-38 = "一気にたくさん食べると、喉に詰まらせてしまいますよ……。"
80000088-39 = "一体どうしてこんなことを……？"
80000088-40 = "[s1] \"ミユのチョコレートがすごく美味しくて……。\"\n[s2] \"……つい我を忘れちゃった。\""
80000088-41 = "……えっと、でもそれは補給品のチョコレートを溶かして固めただけで……"
80000088-42 = "……えっと、でもそれは補給品のチョコレートを溶かして固めただけで……"
80000088-43 = "中に入れたのも、その辺で手に入るような果物ですよ……？"
80000088-44 = "[ns] \"それでもすごく美味しいよ。絶対に忘れたりしない。\""
80000088-46 = "……やっぱり、先生は優しいですね。"
80000088-47 = "でも私……記憶に残らないのも怖いのですが……"
80000088-48 = "……先生が危ない目にあう方が、もっと嫌です。"
80000088-49 = "だから……"
80000088-50 = "チョコレートは少しずつ……大事に召し上がっていただけると嬉しいです。"
