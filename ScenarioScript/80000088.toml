[translation]
80000088-1 = "RABBIT4, presente."
80000088-2 = "Schale - Escritório"
80000088-3 = "Ah, Sensei..."
80000088-4 = "O-Olá..."
80000088-5 = "[s] \"Olá, Miyu. Aconteceu alguma coisa?\""
80000088-6 = "É que... ouvi dizer que hoje é Dia dos Namorados..."
80000088-7 = "Pensei em dar uma pequena lembrança ao Sensei, que sempre cuida tão bem de mim..."
80000088-8 = "P-por favor... não é nada demais, mas..."
80000088-13 = "[ns] \"Obrigado! O que é isso...?\""
80000088-14 = "Chama-se bark de chocolate..."
80000088-15 = "Na verdade, eu queria ter preparado um chocolate um pouco mais luxuoso, mas...#nbem, dadas as circunstâncias, foi difícil..."
80000088-16 = "Fiz usando o chocolate das rações e algumas frutas que colhi..."
80000088-17 = "Não tem uma forma muito bonita, mas...#né só isso que eu consegui preparar..."
80000088-18 = "Uuu... com certeza foi decepcionante, não foi...?"
80000088-19 = "[s] \"De jeito nenhum. Fico feliz porque tem o seu carinho, Miyu.\""
80000088-20 = "Mas... o Sensei deve ter recebido muitos outros chocolates de várias pessoas..."
80000088-21 = "Acho que um chocolate tão sem graça quanto este...#nvai desaparecer da sua memória num instante..."
80000088-22 = "E assim, o fato de eu ter dado um presente no Dia dos Namorados...#nprovavelmente também será esquecido, né..."
80000088-23 = "Eu serei descartada como uma folha seca, sem ficar na memória de ninguém..."
80000088-27 = "[ns] Comer o chocolate da Miyu."
80000088-28 = "Sensei...?"
80000088-32 = "[ns] Comer o chocolate da Miyu com toda a vontade!"
80000088-33 = "S-Sensei...!?"
80000088-34 = "E-espere um pouco... por que de repente...!?"
80000088-35 = "S-se comer tão rápido assim..."
80000088-36 = "[s] \"...cof, cof!\""
80000088-37 = "V-você está bem...?"
80000088-38 = "Se comer muito de uma vez, vai acabar engasgando..."
80000088-39 = "Por que você fez isso...?"
80000088-40 = "[s1] \"O chocolate da Miyu é muito gostoso...\"\n[s2] \"...acabei perdendo o controle.\""
80000088-41 = "...Bem, mas isso foi só chocolate de ração derretido e endurecido..."
80000088-42 = "...Bem, mas isso foi só chocolate de ração derretido e endurecido..."
80000088-43 = "E o que coloquei dentro também são apenas frutas que se encontram por aí, sabe...?"
80000088-44 = "[ns] \"Mesmo assim, é muito gostoso. Eu nunca vou esquecer.\""
80000088-46 = "...Como esperado, o Sensei é gentil."
80000088-47 = "Mas eu... embora tenha medo de não ser lembrada..."
80000088-48 = "...tenho ainda mais medo de que o Sensei se coloque em perigo."
80000088-49 = "Por isso..."
80000088-50 = "Ficaria feliz se pudesse comer o chocolate aos poucos... com cuidado."
