[translation]
10033060-1 = "第6話;夜に彷徨う悪戯な"
10033060-2 = "スケジュールは相変わらず遅れぎみですが……。"
10033060-3 = "皆さんの荷物を宿に置けたことですし、#nこの後はスムーズに進むはず……！"
10033060-4 = "先生、手伝ってくれてありがとね……平気？"
10033060-5 = "[ns] \"大丈夫、腰が痛いのは荷物のせいじゃないから……。\""
10033060-7 = "スケジュールのせいではありますが、無理しないでクダサイ……#nでは、進めマショウ。"
10033060-8 = "「肝試し」についてですが、あとは最終点検を残すのみデス！"
10033060-9 = "あ、じゃあゲヘナのみんなを呼んでくるね！"
10033060-11 = "はい、お任せしても良いですか？"
10033060-12 = "うん、ちょっと眠いけど頑張る！#n何せこれも、素敵なレディーになるための修行だから！"
10033060-16 = "じゃあ……こっちも始めようか？"
10033060-19 = "確かこの辺りで……。"
10033060-25 = "出マシタね！#nこんにちはこんばんはお疲れ様デース！"
10033060-26 = "あの……怖すぎたりはしませんでしたか？"
10033060-27 = "大丈夫かと、むしろ可愛くて素敵です。"
10033060-28 = "肝試しなのに「可愛い」もどうかと思いますが……。"
10033060-30 = "[ns] \"そろそろ次かな……？\""
10033060-33 = "こんな時間まで、お疲れ様……#n後で枕、貸してあげようか？"
10033060-34 = "いえいえ、お気持ちだけで。何せツバキ部長の枕は噂だと、#n良すぎて翌日の夕方まで起きられないと聞きますから。あっはっは！"
10033060-35 = "そうなんだよねー……。"
10033060-36 = "「噂」じゃないんですか！？"
10033060-40 = "この辺でおよそ、全体の3分の2くらいでしょうか。"
10033060-41 = "皆さん頑張ってくれてますし……#nこの肝試し祭りは、大成功を収められそうです。"
10033060-45 = "[ns] \"肝試し……祭り？\""
10033060-46 = "い、一般的には「お祭り」ではないかもですが……。"
10033060-47 = "しかし先生、考えてみてください。#nこれだけ多くの方が、全力で力を合わせ、#n計画に則って盛り上げようとしてくれる……。"
10033060-48 = "その結果、ゲヘナの方々は驚いたり笑ったりして、#nそれはもう良い思い出となることでしょう。"
10033060-49 = "こう聞くと、やはりこれも「お祭り」なのでは！？"
10033060-50 = "[s] \"そうかもしれない！\""
10033060-51 = "でしょう！？#nやはりこれらは、全てお祭り……初めてのガイドで緊張してばかりでしたが……。"
10033060-52 = "何だか、ここに来て元気が湧いてきました！"
10033060-53 = "ナルホド！#n全ては考え方次第、デスね！"
10033060-54 = "流石はウミカ、委員長の右腕！#n左腕として、今後も頑張りマス！"
10033060-55 = "そ、そこまで大したことでは……。"
10033060-61 = "キキキッ……その通り。#n大事なのは内容ではなく、それをどう見るかということ！"
10033060-62 = "[ns] \"こ、この笑い声は……！？\""
10033060-63 = "キヒャヒャヒャヒャッ！#n声だけで伝わるこの存在感、やはり溢れ出る威厳は止められないか！"
10033060-64 = "百鬼夜行のお姉さんたち、こんばんはー！#n先生、イブキも来たよー！"
10033060-65 = "お仕事中にすみませんね……こんばんは。"
10033060-66 = "ま、マコト議長、それに万魔殿の皆さん！？#nこ、こんな時間にどうして……！？"
10033060-67 = "ふふふっ、聞いて驚きなさい？#nなんと――"
10033060-69 = "お姉さんたちの応援に来たのー！"
10033060-70 = "あら、取られちゃった。"
10033060-71 = "まあ良いわ、何せイブキだもの。#nケーキの苺が欲しいと言われれば、可愛い後輩に譲る……"
10033060-72 = "この[ruby=きょうごく]京極[/ruby]サツキ。#n万魔殿の役員として、それくらいの心の広さは持ち合わせてるもの。"
10033060-73 = "キキキッ……それで良いぞ、サツキ。"
10033060-74 = "万魔殿たる者、寛容の心を持たなくてはな。"
10033060-75 = "おぉっ……何かそれっぽいこと言ってる！"
10033060-76 = "……初めて聞きましたが？"
10033060-78 = "キキキッ……！何を隠そう、このマコト様もまた然り！#n他校の手伝いを申し出るなどという、大海も[ruby=おのの]慄く[/ruby]ようなこの度量！"
10033060-79 = "こんな姿を知ってしまえば、#n我が校の生徒たちの忠誠心は更にうなぎ上り！"
10033060-80 = "この威容に驚嘆し、敬礼し、背中を反らして空を仰ぐだろう！"
10033060-81 = "これぞ万魔殿の議長にしてリーダー！#n万魔殿の頂点！"
10033060-82 = "それ、自分たちで言うのはどうかと……#nあと敬礼しながら空を仰ぐのは酷い光景かと。"
10033060-84 = "え、えぇっと、そう言ってくださるのは大変ありがたいのですが、#nむしろ何をお願いしたものか……。"
10033060-85 = "……ねぇねぇマコト先輩、あれなぁに？"
10033060-90 = "………？"
10033060-100 = "………っ。"
10033060-101 = "……わお？"
10033060-102 = "………。"
10033060-107 = "うっ、うっ……ぐすっ、ひぐっ……。"
10033060-108 = "イブキ！？"
10033060-110 = "ひ、非常事態だー！"
10033060-111 = "イブキぃ！？それからサツキ！？#n大丈夫か！？"
10033060-115 = "というかあれは一体なんだ！？"
10033060-116 = "！？"
10033060-117 = "（こんなの、予定には無いはず……！？）"
10033060-118 = "（と、とりあえず、担当者に連絡を……！）"
10033060-123 = "もしもし、こちらガイドチームです！#n肝試しコースの確認なのですが、こちらの座標に……！"
10033060-124 = "だ、誰もいないはず！？#nだとしたら、あれは……！？"
10033060-128 = "イロハ先輩、マコト先輩……イブキ怖い……。"
10033060-129 = "イブキ、大丈夫です。#n私たちがいますから。"
10033060-130 = "……にしても、変ですね。#n百鬼夜行側の反応も、なんだか……。"
10033060-136 = "くっ！#nこ、こうなったら、私の催眠術で……！"
10033060-137 = "……いや無理でしょう。"
10033060-139 = "[ns] \"……？あれってもしかして……？\""
10033060-140 = "……みんな、後ろに下がって。"
10033060-141 = "イロハ、何をしている！今すぐあれをしろ！#nイブキが泣いてるんだぞ！"
10033060-142 = "五月蠅いです、分かってます、でも「あれ」じゃ分かりません。"
10033060-143 = "……それはそうと、イブキを泣かせた罪は重いですよ。"
10033060-147 = "万魔殿、出動します！"
10033060-148 = "よーっし！突撃だ～！"
