[translation]
10033060-1 = "Episódio 6: Travessuras que vagam na noite"
10033060-2 = "O cronograma continua um pouco atrasado, mas..."
10033060-3 = "Já conseguimos deixar a bagagem de todos na pousada, então#ndaqui para frente deve fluir sem problemas...!"
10033060-4 = "Sensei, obrigada por ajudar... Você está bem?"
10033060-5 = "[ns] \"Estou bem, a dor nas costas não é por causa da bagagem...\""
10033060-7 = "É por causa do cronograma, mas por favor, não se esforce demais...#nBem, vamos continuar."
10033060-8 = "Sobre o \"teste de coragem\", só falta a inspeção final!"
10033060-9 = "Ah, então eu vou chamar o pessoal de Gehenna!"
10033060-11 = "Sim, posso deixar isso com você?"
10033060-12 = "Sim, estou um pouco com sono, mas vou me esforçar!#nAfinal, isso também é um treinamento para me tornar uma dama maravilhosa!"
10033060-16 = "Então... vamos começar por aqui também?"
10033060-19 = "Se não me engano, é por aqui..."
10033060-25 = "Apareceu!#nOlá, boa noite, bom trabalho!"
10033060-26 = "Diga... não ficou assustador demais?"
10033060-27 = "Acho que está tudo bem, na verdade, está fofo e maravilhoso."
10033060-28 = "É um teste de coragem, então não sei se \"fofo\" é o termo certo, mas..."
10033060-30 = "[ns] \"Será que é a próxima agora...?\""
10033060-33 = "Bom trabalho por ficar acordado até essa hora...#nQuer que eu te empreste meu travesseiro depois?"
10033060-34 = "Não, não, agradeço a intenção. Ouvi dizer que o travesseiro da Tsubaki é tão bom que, se você usar, não consegue acordar até o anoitecer do dia seguinte. Hahaha!"
10033060-35 = "É verdade, sim..."
10033060-36 = "Então não é só um \"rumor\"!?"
10033060-40 = "Por aqui, já cobrimos cerca de dois terços do total."
10033060-41 = "Todos estão se esforçando muito...#ne este festival de teste de coragem será um grande sucesso."
10033060-45 = "[ns] \"Teste de coragem... festival?\""
10033060-46 = "B-bem, talvez não seja um \"festival\" no sentido convencional, mas..."
10033060-47 = "Mas Sensei, pense bem.#nTantas pessoas unindo forças com tudo o que têm,#nseguindo o plano para tornar tudo mais animado..."
10033060-48 = "Como resultado, o pessoal de Gehenna vai se assustar e rir,#ne isso certamente se tornará uma ótima lembrança."
10033060-49 = "Ouvindo assim, não é que isso também é um \"festival\"!?"
10033060-50 = "[s] \"Pode ser que sim!\""
10033060-51 = "Viu só!?#nNo fim das contas, tudo isso é um festival... Eu estava tão nervosa por ser meu primeiro guia..."
10033060-52 = "Mas, de repente, sinto que recuperei as energias!"
10033060-53 = "Entendi!#nTudo depende de como você encara as coisas!"
10033060-54 = "Como esperado da Umika, o braço direito da presidente!#nComo braço esquerdo, continuarei me esforçando!"
10033060-55 = "N-não é para tanto..."
10033060-61 = "Kiki-ki... Exatamente.#nO que importa não é o conteúdo, mas como você o encara!"
10033060-62 = "[ns] \"E-essa risada...!?\""
10033060-63 = "Kihyahyahyahya!#nEssa presença que se transmite só pela voz, não tem como conter essa dignidade transbordante!"
10033060-64 = "Olá, irmãs de Hyakkiyako!#nSensei, a Ibuki também veio!"
10033060-65 = "Desculpem interromper o trabalho... Boa noite."
10033060-66 = "M-Makoto, e o pessoal do Pandemonium!?#nO que vocês estão fazendo aqui a essa hora...!?"
10033060-67 = "Fufufu, ouça e surpreenda-se?#nNa verdade—"
10033060-69 = "Viemos torcer por vocês!"
10033060-70 = "Ah, ela roubou minha fala."
10033060-71 = "Bem, não importa, afinal é a Ibuki.#nSe ela pedir o morango do bolo, eu cedo para a minha querida kouhai..."
10033060-72 = "Eu, Satsuki Kyogoku.#nComo oficial do Pandemonium, tenho essa magnanimidade."
10033060-73 = "Kiki-ki... Isso mesmo, Satsuki."
10033060-74 = "Quem faz parte do Pandemonium deve ter um coração generoso."
10033060-75 = "Oh... Ela está dizendo algo que parece importante!"
10033060-76 = "...É a primeira vez que ouço isso?"
10033060-78 = "Kiki-ki...! Não é segredo para ninguém que eu, Makoto-sama, também sou assim!#nOferecer ajuda para outra escola, essa minha magnanimidade faz até o oceano tremer!"
10033060-79 = "Ao verem essa minha forma, #na lealdade dos alunos da nossa escola vai disparar ainda mais!"
10033060-80 = "Eles ficarão maravilhados com essa imponência, baterão continência e olharão para o céu com as costas arqueadas!"
10033060-81 = "Esta é a presidente e líder do Pandemonium! #nO ápice do Pandemonium!"
10033060-82 = "Bem, não acho que seja apropriado dizer isso sobre si mesma... #ne acho que bater continência olhando para o céu seria uma cena terrível."
10033060-84 = "B-bem, sou muito grata por dizerem isso, mas... #nna verdade, não sei bem o que pedir..."
10033060-85 = "......Ei, ei, Makoto-senpai, o que é aquilo?"
10033060-90 = "………？"
10033060-100 = "………!"
10033060-101 = "……Uau?"
10033060-102 = "………。"
10033060-107 = "Ugh, ugh... *sniff*, *hic*..."
10033060-108 = "Ibuki!?"
10033060-110 = "E-emergência!"
10033060-111 = "Ibuki!? E Satsuki!? #nVocês estão bem!?"
10033060-115 = "E o que diabos é aquilo!?"
10033060-116 = "！？"
10033060-117 = "(Isso não deveria estar no cronograma...!?) "
10033060-118 = "(B-bem, por enquanto, vou entrar em contato com o responsável...!)"
10033060-123 = "Alô, aqui é a equipe de guia! #nSobre a verificação do percurso do teste de coragem, nestas coordenadas...!"
10033060-124 = "N-não deveria ter ninguém aqui!? #nSe for esse o caso, então o que é aquilo...!?"
10033060-128 = "Iroha-senpai, Makoto-senpai... Ibuki está com medo..."
10033060-129 = "Ibuki, está tudo bem. #nNós estamos aqui."
10033060-130 = "......Ainda assim, é estranho. #nA reação do lado de Hyakkiyako também está meio..."
10033060-136 = "Droga! #nS-se chegamos a esse ponto, vou usar minha hipnose...!"
10033060-137 = "......Não, isso é impossível."
10033060-139 = "[ns] \"......? Aquilo seria, por acaso...?\""
10033060-140 = "......Pessoal, recuem."
10033060-141 = "Iroha, o que você está fazendo! Faça alguma coisa com aquilo agora! #nA Ibuki está chorando!"
10033060-142 = "Cale a boca, eu sei, mas não dá para entender o que é \"aquilo\"."
10033060-143 = "......Além disso, o crime de fazer a Ibuki chorar é grave."
10033060-147 = "Pandemonium, em movimento!"
10033060-148 = "Certo! Vamos atacar!"
