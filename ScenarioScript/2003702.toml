[translation]
2003702-1 = "Polícia em Ação: Edição Praça de Alimentação"
2003702-2 = "（Recebi uma MomoTalk e fui ao encontro da Fubuki）"
2003702-6 = "Prof... não, Inspetora!#nQue bom que você veio!"
2003702-7 = "[s1] \"Inspetora...?\"\n[s2] \"O que exatamente você está planejando?\""
2003702-10 = "Calma, calma, relaxa."
2003702-11 = "Eu já vou te explicar."
2003702-12 = "Em resumo, quero que você me acompanhe pela praça de alimentação como salva-vidas para fiscalizarmos a higiene dos alimentos!"
2003702-13 = "[s3] \"Higiene...?\"\n[s4] \"Isso é bem repentino...\""
2003702-19 = "Não tem jeito mesmo."
2003702-20 = "Explicando de forma simples, é o seguinte."
2003702-21 = "Há 30 minutos, recebi a informação de que o \"Master Donuts\" aqui da praça de alimentação vai lançar um novo produto."
2003702-22 = "Assim que as vendas começarem, uma multidão de visitantes do parque vai se aglomerar aqui, né?"
2003702-23 = "[s] \"...\""
2003702-24 = "Então, pensei em provar a novidade antes que as vendas comecem!"
2003702-25 = "Aí percebi que, se eu fosse como inspetora de higiene alimentar, poderia fazer uma inspeção!"
2003702-26 = "Li o regulamento de ponta a ponta e vi que os inspetores de higiene alimentar devem ser do Conselho Estudantil Federal ou o Sensei do Schale."
2003702-27 = "...Você entendeu o que eu quero dizer, né, Sensei?"
2003702-28 = "[s] \"Fubuki, não me diga que...\""
2003702-29 = "Para garantir a segurança e a felicidade dos clientes..."
2003702-30 = "Nós temos o direito, não, o dever de provar a novidade da unidade do Master Donuts no parque aquático antes de todo mundo!"
2003702-34 = "[ns] \"...Eu imaginei que fosse algo assim.\""
2003702-35 = "Vamos, vamos! Depressa, depressa!"
2003702-38 = "Bem-vindos!"
2003702-39 = "Sinto muito, mas ainda não estamos no horário de funcionamento.#nPoderiam voltar mais tarde?"
2003702-40 = "Ah, não, não.#nNós não somos clientes."
2003702-41 = "Eu sou salva-vidas, e este aqui é o prof... inspetor de higiene alimentar do Schale."
2003702-42 = "Viemos verificar as condições de higiene dos alimentos, tudo bem?"
2003702-43 = "Ah, entendo!"
2003702-44 = "Então, podemos provar?"
2003702-45 = "Com certeza!#nTemos o novo donut recém-lançado!"
2003702-46 = "Humm, entendi."
2003702-50 = "Então, não vou recusar."
2003702-52 = "Sim, aqui está!"
2003702-53 = "Esta é a nossa novidade..."
2003702-62 = "O \"Donut de Pepino\"!"
2003702-63 = "Usamos um pepino fresco inteiro nele."
2003702-64 = "Q-que isso!?"
2003702-69 = "Até grupos de gourmets renomados elogiaram bastante."
2003702-70 = "Se adicionar o molho de menta com wasabi, fica ainda mais delicioso!"
2003702-71 = "[s5] （Não faço ideia de qual seja o gosto...!）\n[s6] （...Não quero nem imaginar o sabor）"
2003702-74 = "E-ei... será que precisamos mesmo comer isso?"
2003702-75 = "Não é que não seja do meu agrado...#nÉ que eu me pergunto se existe alguém que realmente goste de comer isso..."
2003702-76 = "B-bom, de qualquer forma, vamos deixar isso de fora da inspeção...!"
2003702-77 = "[s] \"É trabalho, Fubuki.\""
2003702-81 = "[ns] \"Isso também é para garantir a segurança e a felicidade dos clientes!\""
2003702-82 = "Vamos, por favor, coma!"
2003702-84 = "Escolhi especialmente um com um pepino bem grande para você!"
2003702-86 = "A-ahhh!#nUm desse tamanho não dá!"
2003702-88 = "（Depois disso, Fubuki terminou de comer o donut de pepino...）"
2003702-89 = "（...com uma cara de quem estava prestes a chorar）"
