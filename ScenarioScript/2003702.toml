[translation]
2003702-1 = "ポリス・ストーリー～フードコート編～"
2003702-2 = "（モモトークをもらい、フブキのところへ向かった）"
2003702-6 = "せん……いや監察官！#nよく来てくれたね！"
2003702-7 = "[s1] \"監察官って……？\"\n[s2] \"いったい何を企んでるの？\""
2003702-10 = "まぁまぁ、落ち着いてって。"
2003702-11 = "すぐ教えてあげるから。"
2003702-12 = "要するに、ライフセーバーの私とフードコートを回って、#n食品の衛生管理を取り締まってほしいんだ！"
2003702-13 = "[s3] \"衛生管理……？\"\n[s4] \"ずいぶんと急だね……。\""
2003702-19 = "しょうがないなぁ。"
2003702-20 = "簡単に説明すると、こういうこと。"
2003702-21 = "30分前に、ここのフードコートで#n「マスタードーナッツ」の新作が出るって情報を掴んだの。"
2003702-22 = "販売が開始されたら、#n大勢のパーク客が一気に集まるじゃん？"
2003702-23 = "[s] \"……。\""
2003702-24 = "なら、販売開始前に新作を味わっちゃお～と思ってさ。"
2003702-25 = "そこで、食品衛生監視員として検査に行けば良いって気付いたの！"
2003702-26 = "規定を隅々まで調べたら、#n食品衛生監視員は連邦生徒会かシャーレの先生が務めるらしいんだよね。"
2003702-27 = "……私が何を言いたいのか、先生なら分かってくれたでしょ？"
2003702-28 = "[s] \"フブキ、もしかして……。\""
2003702-29 = "利用客の安全と幸せを実現するため……。"
2003702-30 = "私たちには、マスタードーナッツ・ウォーターパーク店の新作を一足先に味わう権利、いや義務がある！"
2003702-34 = "[ns] \"……そんなことだろうと思ったよ。\""
2003702-35 = "さ、早く行くよ！急いで急いで！"
2003702-38 = "ご来店、ありがとうございます！"
2003702-39 = "大変申し訳ないのですが、まだ営業時間ではなくてですね。#n後ほどお越しいただけますか？"
2003702-40 = "あー、違う違う。#n私たちはお客さんじゃないよ。"
2003702-41 = "私はライフセーバーで、#nこっちはシャーレのせん……食品衛生監視員だよ。"
2003702-42 = "食品の衛生状態を確認しに来たんだけど、良いかな？"
2003702-43 = "ああ、そうでしたか！"
2003702-44 = "じゃ、試食させてもらうねー？"
2003702-45 = "もちろんです！#n新発売のドーナッツもありますので！"
2003702-46 = "へぇ～、そうだったんだ。"
2003702-50 = "なら、遠慮せず頂こうかな。"
2003702-52 = "はい、こちらです！"
2003702-53 = "これが当店の新作……。"
2003702-62 = "「キュウリドーナッツ」です！"
2003702-63 = "新鮮なキュウリが、なんと1本丸ごと使われているんですよ。"
2003702-64 = "な、何それっ！？"
2003702-69 = "著名な美食団体の方からも、かなり好評でして。"
2003702-70 = "ミントわさびソースを添えると、より一層美味しくいただけますよ！"
2003702-71 = "[s5] （どんな味か、さっぱり分からない……！）\n[s6] （……味を想像したくない）"
2003702-74 = "え、えっとー……これ、食べないとダメかな？"
2003702-75 = "ちょっと好みじゃないっていうか……。#nむしろ、これを好き好んで食べる人がいるのか疑問っていうか……。"
2003702-76 = "と、とにかく、これは対象外ってことで……！"
2003702-77 = "[s] \"仕事でしょ、フブキ。\""
2003702-81 = "[ns] \"これも利用客の安全と幸せを実現するためだよ！\""
2003702-82 = "さあ、どうぞ召し上がってください！"
2003702-84 = "特別にキュウリが大きい物をお選びしましたので！"
2003702-86 = "ひ、ひいっ！#nそんな大きいのは無理ぃ！"
2003702-88 = "（その後、フブキは新作のキュウリドーナツを食べきったが……）"
2003702-89 = "（……今にも泣き出しそうな顔をしていた）"
