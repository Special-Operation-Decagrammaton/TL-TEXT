[translation]
70013040-1 = "The Weed That Doesn't Bloom Alone (4)"
70013040-3 = "Main entrance of the hotel occupied by the Rigatoni Family"
70013040-6 = "Rear entrance of the hotel occupied by the Rigatoni Family"
70013040-10 = "Rooftop of a nearby building"
70013040-12 = "Whoa, the security is super tight. I guess it's gonna be hard to just walk in like this, huh?"
70013040-13 = "What should we do? We can't even contact Aru-sama... at this rate...!"
70013040-14 = "Hehehe, it's okay. I've got it all planned out."
70013040-15 = "So, Haruka-chan, first things first, let's get changed."
70013040-16 = "Get changed? Into what kind of clothes...?"
70013040-17 = "Clothes that won't give us away when we get close to them!"
70013040-19 = "A while later—"
70013040-21 = "S-shall we start? S-should I just wipe them out!?"
70013040-22 = "Nope, wait a sec. They're talking about something, let's listen in."
70013040-23 = "...Ugh, an emergency assembly at night, what happened?"
70013040-24 = "They caught those guys who messed with the boss before, but apparently a few of them escaped."
70013040-25 = "Huh? How many?"
70013040-26 = "Two."
70013040-27 = "Huh? ...We all had to gather for just two people?"
70013040-28 = "Just who are these guys anyway?"
70013040-29 = "The boss is being this nervous about them. Maybe they're as dangerous as Akemi of the Seven Prisoners."
70013040-30 = "No way, you mean there are other monsters like that out there?"
70013040-31 = "It looks like all the members have gathered..."
70013040-32 = "Hehehe, looks like I'll get my money's worth out of these bombs~"
70013040-33 = "Let's go, Haruka-chan."
70013040-40 = "Hey there~ Thanks for your hard work at this hour."
70013040-41 = "T-thank you for your hard work...!"
70013040-42 = "Hm? Who are you two?"
70013040-43 = "Everyone was called in, right? We're a little late."
70013040-44 = "I don't recognize those faces... Are you rookies?"
70013040-45 = "Yeah. That's why I don't really get it, but—"
70013040-46 = "You guys caught the boss of some amazing group, right? Are you sure they can't escape?"
70013040-47 = "They're on the top floor with the boss, so it's fine, right?"
70013040-48 = "Hehehe, I see~ Thanks!"
70013040-49 = "I'll give you a special present as a thank you."
70013040-55 = "Hm? What's with the sudden..."
70013040-60 = "A-an explosion at the entrance...!?"
70013040-61 = "Hey! What happened!?"
70013040-64 = "Alright! Let's head to the top floor while they're in a panic!"
70013040-65 = "Please wait for me, Aru-sama! I'm coming...!"
70013040-70 = "C-check the security cameras! Find the intruders...!!"
70013040-71 = "They're in the central hallway! Hurry!!"
70013040-73 = "Central hallway on the lower floor of the hotel"
70013040-84 = "What!? You mean they've broken in!?"
70013040-85 = "Don't let them get here under any circumstances...!!"
70013040-86 = "B-but those guys... they're tiny, but they're freakishly strong...!"
70013040-87 = "G-gahhh...!!"
70013040-88 = "Idiots! How are you struggling against two runts!?"
70013040-89 = "Hehehe..."
70013040-94 = "If the boss is only that capable, then the subordinates are just as pathetic."
70013040-95 = "Which means the employees under me are top-tier."
70013040-96 = "Making us your enemies—"
70013040-97 = "That was your biggest mistake."
70013040-98 = "Guh! You're a prisoner, don't act so high and mighty!"
70013040-104 = "Oh? Are you planning to shoot me?"
70013040-105 = "Go ahead."
70013040-106 = "But, remember this."
70013040-107 = "If my employees arrive and I have even a single scratch on me... it's going to be a disaster for you."
70013040-108 = "It would be wise to think carefully."
70013040-109 = "Guhhh...!"
70013040-113 = "President... that was bold, wasn't it?"
70013040-114 = "I-I was scared...! I was actually terrified...!!"
70013040-118 = "(...But I have to endure it.)"
70013040-119 = "(Because I believe in my employees...!)"
70013040-121 = "Middle floor of the hotel"
70013040-147 = "Upper floor of the hotel"
70013040-156 = "Haruka-chan! Are you okay?"
70013040-157 = "I-I'm fine! It was just a graze!"
70013040-158 = "More importantly, let's hurry!"
70013040-159 = "Aru-sama is... waiting for us...!"
70013040-163 = "What...!? You're already this close!?"
70013040-164 = "H-how on earth...!!"
70013040-165 = "You haven't changed a bit since that day."
70013040-166 = "No, I should say you've actually regressed."
70013040-167 = "Compared to that, we've become dramatically stronger."
70013040-168 = "That weak little girl who used to suffer because of you is now the strongest demolition expert in Problem Solver 68."
70013040-169 = "All those explosions you've been hearing? They were all her."
70013040-170 = "How about it? How does it feel to be cornered by your own mistakes?"
70013040-171 = "Eeeeeek...!"
70013040-176 = "President... you're pretty good."
70013040-177 = "I-I didn't think I'd be able to pull that off so coolly either...!"
70013040-183 = "Y-you actually made it this far...!!"
70013040-188 = "Aru-sama! Kayoko-kacho...! I've arrived! Are you hurt?"
70013040-189 = "Hehehe, I knew you'd come."
70013040-190 = "We're fine, so don't worry about us."
70013040-195 = "Hehehe, then we have to give this guy who caused us so much trouble a proper punishment, right~?"
70013040-196 = "............"
70013040-197 = "He, hehehe..."
70013040-198 = "Hahahaha...!"
70013040-199 = "You foolish brats! Who are you punishing?"
70013040-200 = "You're the ones who are going to be punished!"
70013040-201 = "Mercenaries! It's your turn...!!"
70013040-206 = "W-what? You were hiding!?"
70013040-207 = "We're surrounded...! Mutsuki! Haruka! Be careful!"
70013040-209 = "Hahaha, playtime is over!"
70013040-211 = "Fire...!!"
70013040-222 = "All rounds fired. Suppression complete."
70013040-223 = "Hehehe... Hahahaha!!"
70013040-224 = "After taking that many bullets, there's no way you're still standing."
70013040-225 = "Problem Solver President! You're next...!"
70013040-227 = "............"
70013040-228 = "............Not yet. Look over there."
70013040-232 = "............"
70013040-233 = "What!?"
70013040-235 = "Cough, cough-cough!"
70013040-236 = "Ugh... thanks for saving me. I guess I really can't beat Haruka-chan's toughness~"
70013040-239 = "W-what's going on? How could they withstand that much firepower..."
70013040-240 = "What... what on earth are you...!?"
70013040-242 = "I am... a weed..."
70013040-243 = "A weed that doesn't die no matter how many times it's trampled..."
70013040-247 = "..."
70013040-248 = "I'll wipe you all out."
70013040-249 = "Taking Aru-sama... and Kayoko-kacho hostage..."
70013040-250 = "And even trying to hurt Mutsuki-shitsucho right in front of me..."
70013040-251 = "I won't forgive you..."
70013040-252 = "I won't forgive you, I won't forgive you, I won't forgive you, I won't forgive you, I won't forgive you, I won't forgive you, I won't forgive you...!"
70013040-253 = "I won't forgive you...!"
70013040-254 = "E-eeeeeek!?"
70013040-268 = "P-please, spare me...! I-I'll never show my face in front of you again...!!"
70013040-269 = "I-I beg you! P-please...!!"
70013040-270 = "..."
70013040-271 = "...Aru-sama, what should we do?"
70013040-272 = "Hmph, let them go."
70013040-273 = "For guys whose reputation has hit rock bottom, staying alive is a harsher punishment."
70013040-274 = "Hehe, keep that in mind while you crawl through the gutter."
70013040-276 = "Remember who the truly cold-blooded, hard-boiled outlaws are!"
70013040-277 = "E-eeeeeek!?"
70013040-278 = "...Hehehe. As expected of Aru-sama, you're so cool."
70013040-279 = "You... you barely escaped with your life thanks to Aru-sama."
70013040-285 = "G-guh...!!"
70013040-291 = "Aru-chan and Kayoko-chan, are you okay?"
70013040-292 = "Yeah, we're fine."
70013040-293 = "I wish you two could've seen the President's villainous side."
70013040-294 = "Hehe, you'll be able to see my hard-boiled side for a long time to come."
70013040-299 = "Hehehe... I'm... glad..."
70013040-304 = "H-Haruka...!"
70013040-305 = "Haruka-chan...!"
70013040-306 = "Ugh..."
70013040-308 = "..."
70013040-309 = "...It's okay. It looks like she's just a little tired."
70013040-310 = "..."
70013040-311 = "...Thank you, Haruka. I owe you a huge debt this time."
70013040-313 = "N-not at all... It was Aru-sama who saved me..."
70013040-314 = "I still... haven't been able to repay your kindness..."
70013040-315 = "No, you've already repaid me enough. So from now on, you don't need to think about things like that."
70013040-316 = "Aru-sama... thank you."
70013040-317 = "U-um, Haruka-chan..."
70013040-318 = "You called yourself a 'weed' earlier... surely you don't still think that, right?"
70013040-319 = "Is it because I... called you 'Weed-chan' before...?"
70013040-320 = "..."
70013040-321 = "T-that's not it..."
70013040-322 = "I just... happen to like this nickname..."
70013040-323 = "H-Haruka-chaaaan...!"
70013040-331 = "Afterward, the Rigatoni Family was arrested by Valkyrie."
70013040-332 = "For Problem Solver 68, it was a night they would truly never forget."