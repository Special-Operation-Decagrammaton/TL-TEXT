[translation]
70013040-1 = "Uma erva daninha não floresce sozinha (4)"
70013040-3 = "Portão principal do hotel ocupado pela Família Rigatoni"
70013040-6 = "Portão dos fundos do hotel ocupado pela Família Rigatoni"
70013040-10 = "Terraço de um prédio próximo"
70013040-12 = "Uau, segurança ultra pesada. Vai ser difícil entrar assim, hein?"
70013040-13 = "O que fazemos? Não temos como contatar a Aru-sama... assim...!"
70013040-14 = "Kufufu, tranquilo. Já tenho um plano."
70013040-15 = "Então, Haruka-chan, primeiro vamos trocar de roupa."
70013040-16 = "Trocar de roupa? Para qual..."
70013040-17 = "Uma que não chame atenção!"
70013040-19 = "Um tempo depois –"
70013040-21 = "V-vamos começar? V-vamos acabar com eles!?"
70013040-22 = "Não, espera um pouco. Estão conversando, vamos ouvir."
70013040-23 = "... Ah, convocação de emergência à noite? O que houve?"
70013040-24 = "Pegaram uns caras que tinham mexido com o chefe, mas alguns escaparam."
70013040-25 = "Hã? Quantos?"
70013040-26 = "Dois."
70013040-27 = "Como? ... Convocaram todo mundo por causa de dois caras?"
70013040-28 = "Que tipo de gente são?"
70013040-29 = "O chefe está tão nervoso. Talvez sejam tão perigosos quanto a Akemi, a Sétima Prisioneira."
70013040-30 = "Pô, existem mais monstros desses?"
70013040-31 = "Parece que todos os membros se reuniram..."
70013040-32 = "Kufufu, vai dar para usar bomba à vontade."
70013040-33 = "Vamos, Haruka-chan."
70013040-40 = "Nossa, boa noite, hein, trabalharam até tarde."
70013040-41 = "B-boa noite!"
70013040-42 = "Hmm? Quem são vocês?"
70013040-43 = "Todo mundo foi convocado, né? Atrasei um pouco."
70013040-44 = "Cara nova... recrutas?"
70013040-45 = "Sim. Então não sei direito, mas..."
70013040-46 = "Disseram que capturaram o chefe de um grupo grande, né? Será que prenderam ele direito?"
70013040-47 = "O chefe está no último andar, então de boa."
70013040-48 = "Kufufu, é mesmo? Valeu!"
70013040-49 = "Como agradecimento, vou dar um presente especial."
70013040-55 = "Hã? Do nada..."
70013040-60 = "U-uma explosão na entrada...?"
70013040-61 = "Ei! O que houve?"
70013040-64 = "Beleza! Enquanto estão agitados, a gente sobe!"
70013040-65 = "Aguarde, Aru-sama! Já vou..."
70013040-70 = "V-verifiquem as câmeras! Encontrem os intrusos!"
70013040-71 = "N-nos corredores! Rápido!!"
70013040-73 = "Corredor central do andar inferior"
70013040-84 = "O quê!? Disseram que os caras invadiram!?"
70013040-85 = "Não deixem eles chegarem aqui!"
70013040-86 = "M-mas... eles são baixinhos e fortões..."
70013040-87 = "G-gwaaah..."
70013040-88 = "Puta merda! Não pode dois baixinhos darem trabalho!"
70013040-89 = "Fufufu..."
70013040-94 = "Com um chefe desse nível, os subordinados não poderiam ser diferentes."
70013040-95 = "Ou seja, os meus, que são comandados [ruby=·    ·    ·]por mim[/ruby], são os mais competentes."
70013040-96 = "Ter nos encarado foi –"
70013040-97 = "– o seu pior erro."
70013040-98 = "Guh! Está presa e ainda fala besteira!"
70013040-104 = "Ora? Vai atirar em mim?"
70013040-105 = "Fique à vontade."
70013040-106 = "Mas lembre-se de uma coisa."
70013040-107 = "Quando os meus funcionários chegarem, se eu estiver machucada... aí sim a coisa vai ficar feia."
70013040-108 = "É melhor pensar bem antes de agir."
70013040-109 = "Aargh...!"
70013040-113 = "Presidente... que ousadia, hein?"
70013040-114 = "E-eu estava com medo... estava com muito medo..."
70013040-118 = "(... Mas não posso recuar.)"
70013040-119 = "(Eu confio nos meus funcionários...!)"
70013040-121 = "Andar intermediário do hotel"
70013040-147 = "Andar superior do hotel"
70013040-156 = "Haruka-chan, está bem?"
70013040-157 = "T-tudo bem! Foi só um arranhão!"
70013040-158 = "Vamos logo! A Aru-sama... deve estar nos esperando..."
70013040-163 = "O quê...!? Já estão chegando perto!?"
70013040-164 = "C-como eles conseguiram...!"
70013040-165 = "Você não mudou nada desde aquela época."
70013040-166 = "Na verdade, diria que piorou."
70013040-167 = "Já nós... evoluímos dramaticamente."
70013040-168 = "Aquela garota fraca e amedrontada que vocês atormentavam... agora é a agente de demolição mais forte da nossa Empresa de Conveniência 68."
70013040-169 = "As explosões que vocês estão ouvindo são todas obra dela."
70013040-170 = "O que acha? Como se sente sendo encurralado pelo seu próprio erro?"
70013040-171 = "Eeek...!"
70013040-176 = "Presidente... bonita atuação."
70013040-177 = "E-eu não esperava ficar tão legal assim..."
70013040-183 = "Então... chegaram até aqui...!"
70013040-188 = "Aru-sama! Gerente Kayoko! Chegamos! Estão feridas?"
70013040-189 = "Fufufu, eu sabia que podia confiar."
70013040-190 = "Estamos bem. Não se preocupem."
70013040-195 = "Kufufu, agora temos que dar uma bela lição nesses chatos, né?"
70013040-196 = "..."
70013040-197 = "F-fufufu..."
70013040-198 = "Fuhahahaha!"
70013040-199 = "Seus idiotas! Lição em quem?"
70013040-200 = "Quem vai tomar lição são vocês!"
70013040-201 = "Mercenários! Hora de atuar...!"
70013040-206 = "O-o que? Estavam escondidos?"
70013040-207 = "Estamos cercados...! Mutsumi! Haruka! Cuidado!"
70013040-209 = "Cuhahaha, a brincadeira acabou!"
70013040-211 = "Atirem...!"
70013040-222 = "Todos os projéteis disparados. Neutralização completa."
70013040-223 = "Fufufu... fuhahaha!"
70013040-224 = "Depois de comer essa quantidade de balas, não sobra ninguém em pé."
70013040-225 = "Presidente da Empresa de Conveniência! Agora é a sua vez..."
70013040-227 = "..."
70013040-228 = "... Ainda não. Olha ali."
70013040-232 = "..."
70013040-233 = "O quê!?"
70013040-235 = "Cof, cof, cof!"
70013040-236 = "Uuh... obrigado por salvar. Ainda bem que você é durona, Haruka-chan."
70013040-239 = "C-como... aguentar aquele poder de fogo..."
70013040-240 = "O quê... v-você... quem é você?"
70013040-242 = "Eu sou... uma erva daninha..."
70013040-243 = "Uma erva daninha que não morre, mesmo sendo pisada..."
70013040-247 = "..."
70013040-248 = "Vou acabar com tudo."
70013040-249 = "Por ter feito a Aru-sama... e a gerente Kayoko de reféns..."
70013040-250 = "Por ter ferido a gerente Mutsumi na minha frente..."
70013040-251 = "Não vou perdoar."
70013040-252 = "Não vou perdoar não vou perdoar não vou perdoar não vou perdoar...!"
70013040-253 = "Não vou perdoar!"
70013040-254 = "E-eek!?"
70013040-268 = "M-me ajudem...! Nós nunca mais vamos aparecer na frente de vocês..."
70013040-269 = "P-por favor! É sério..."
70013040-270 = "..."
70013040-271 = "... Aru-sama, o que fazemos?"
70013040-272 = "Humpf, deixem eles ir."
70013040-273 = "Para quem arruinou a própria reputação, viver vai ser um castigo pior."
70013040-274 = "Fufu, eles vão se rastejar e lembrar."
70013040-276 = "Quem é a fora-da-lei implacável e verdadeiramente hard-boiled!"
70013040-277 = "E-eek!?"
70013040-278 = "... Ehehe. Aru-sama é tão legal."
70013040-279 = "Seu... foi a Aru-sama que te salvou, hein."
70013040-285 = "G-gah...!"
70013040-291 = "Aru-chan, Kayoko-chan, estão bem?"
70013040-292 = "Estamos bem."
70013040-293 = "Queria que vocês duas tivessem visto o jeito de vilã da presidente."
70013040-294 = "Fufu, vocês vão poder ver o meu lado hard-boiled muitas vezes ainda."
70013040-299 = "Ehehe... ainda bem..."
70013040-304 = "Haruka...!"
70013040-305 = "Haruka-chan...!"
70013040-306 = "Uuuh..."
70013040-308 = "..."
70013040-309 = "... Tudo bem. Só está um pouco cansada."
70013040-310 = "..."
70013040-311 = "... Obrigada, Haruka. Desta vez, ficamos com uma grande dívida com você."
70013040-313 = "N-nada disso... Quem me salvou foi a Aru-sama..."
70013040-314 = "Ainda não... não consegui retribuir totalmente o favor..."
70013040-315 = "Não, você já retribuiu e muito. Então, daqui para frente, não precisa pensar assim."
70013040-316 = "Aru-sama... obrigada."
70013040-317 = "Ah, Haruka-chan..."
70013040-318 = "Você se chamou de 'erva daninha'... será que ainda pensa assim?"
70013040-319 = "Por minha causa... que te chamei de 'plantinha' antes...?"
70013040-320 = "..."
70013040-321 = "N-não é isso..."
70013040-322 = "É que eu gosto desse apelido..."
70013040-323 = "Haruka-chan~"
70013040-331 = "Depois, a Valkyrie que chegou prendeu Rigatoni."
70013040-332 = "Foi uma noite inesquecível para a Empresa de Conveniência 68."