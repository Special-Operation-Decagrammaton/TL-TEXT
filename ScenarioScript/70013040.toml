[translation]#[Texto Final. - Filipe 08/07.]
70013040-1 = "Erva Daninha Que Não Floresce Sozinha (4)"
70013040-3 = "Portão da frente – Hotel ocupado pela Família Rigatoni"
70013040-6 = "Portão dos fundos – Hotel ocupado pela Família Rigatoni"
70013040-10 = "Terraço de outro prédio próximo"
70013040-12 = "Uau, segurança pesada. Vai ser difícil entrar."
70013040-13 = "O que fazer? Não temos contato com Al-sama…… se continuar assim……!"
70013040-14 = "Kufufu, relaxa. Já pensei nisso."
70013040-15 = "Então, Haruka-chan, vamos nos trocar."
70013040-16 = "Trocar? Que roupa?"
70013040-17 = "Roupa que não chame a atenção!"
70013040-19 = "Pouco depois――"
70013040-21 = "V-vamos começar? V-vamos explodir?"
70013040-22 = "Não, espera. Eles estão conversando. Vamos ouvir."
70013040-23 = "……Haa, convocação de emergência à noite. O que houve?"
70013040-24 = "Pegaram uns caras que mexeram com o chefe, mas alguns escaparam."
70013040-25 = "Hã? Quantos?"
70013040-26 = "Dois."
70013040-27 = "Hã?…… Reunimos todos por causa de dois?"
70013040-28 = "Que tipo de gente é?"
70013040-29 = "O chefe está tão nervoso. Talvez sejam tão perigosos quanto a Akemi dos Sete Prisioneiros."
70013040-30 = "Eita, existem mais monstros assim?"
70013040-31 = "Parece que todos os membros se reuniram……"
70013040-32 = "Kufufu, parece que vou me divertir com as bombas~"
70013040-33 = "Vamos, Haruka-chan."
70013040-40 = "Nossa, bom trabalho a essa hora."
70013040-41 = "B-bom trabalho……!"
70013040-42 = "Hã? Quem são vocês?"
70013040-43 = "Todos foram convocados, né? Me atrasei."
70013040-44 = "Cara nova…… novata?"
70013040-45 = "É. Então não sei bem……"
70013040-46 = "Disseram que pegaram o chefe de um grupo grande, né? Cuidaram pra ele não escapar?"
70013040-47 = "O chefe tá no último andar, então de boa."
70013040-48 = "Kufufu, entendi~ obrigada!"
70013040-49 = "Como agradecimento, vou dar um presente especial."
70013040-55 = "Hã? Do nada……"
70013040-60 = "U-uma explosão na entrada?"
70013040-61 = "Ei! O que foi?"
70013040-64 = "Beleza! Enquanto eles estão em pânico, vamos subir!"
70013040-65 = "Aguarde, Al-sama! Já vou!"
70013040-70 = "C-confirmem as câmeras! Achem os invasores!"
70013040-71 = "E-estão no corredor central! Rápido!"
70013040-73 = "Corredor central – andar inferior"
70013040-84 = "O quê! Eles invadiram?"
70013040-85 = "Não deixem eles chegarem aqui!"
70013040-86 = "M-mas eles…… são baixos, mas muito fortes!"
70013040-87 = "Gah……!"
70013040-88 = "Idiotas! Não podem lidar com duas crianças?"
70013040-89 = "Fufufu……"
70013040-94 = "Se o chefe é assim, os subordinados também."
70013040-95 = "Ou seja, minhas funcionárias são superiores."
70013040-96 = "O maior erro de vocês foi――"
70013040-97 = "nos ter como inimigos."
70013040-98 = "Ah! Uma prisioneira metida!"
70013040-104 = "Ora? Vai atirar em mim?"
70013040-105 = "Faça o que quiser."
70013040-106 = "Mas lembre-se: se eu estiver machucada quando minhas funcionárias chegarem…… vai ser feio."
70013040-107 = "É melhor pensar bem."
70013040-108 = "Ahhh!"
70013040-113 = "Presidente…… você é ousada, hein?"
70013040-114 = "E-eu tava com medo…… muito medo!"
70013040-118 = "(Mas tenho que aguentar)"
70013040-119 = "(Porque confio nas minhas funcionárias!)"
70013040-121 = "Andar intermediário"
70013040-147 = "Andar superior"
70013040-156 = "Haruka-chan! Tudo bem?"
70013040-157 = "T-tô bem! Só arranhou!"
70013040-158 = "Vamos logo!"
70013040-159 = "Al-sama está esperando!"
70013040-163 = "O quê!? Já chegaram tão perto?"
70013040-164 = "Como……!"
70013040-165 = "Você não mudou nada desde aquela vez."
70013040-166 = "Na verdade, piorou."
70013040-167 = "Nós, por outro lado, ficamos muito mais fortes."
70013040-168 = "Aquela garota frágil que você oprimia agora é a melhor especialista em explosivos da Oficina 68."
70013040-169 = "Todas as explosões que você ouviu foram dela."
70013040-170 = "Como se sente por ter sido encurralado pelos seus próprios erros?"
70013040-171 = "Ahhh!"
70013040-176 = "Presidente…… mandou bem."
70013040-177 = "E-eu também não esperava ser tão foda!"
70013040-183 = "Vo-vocês vieram até aqui!"
70013040-188 = "Al-sama! Kayoko! Chegamos! Estão feridas?"
70013040-189 = "Fufufu, eu sabia."
70013040-190 = "Estamos bem, não se preocupem."
70013040-195 = "Kufufu, agora vamos dar uma boa lição em quem nos deu tanto trabalho~"
70013040-196 = "…………"
70013040-197 = "F-fufufu……"
70013040-198 = "Fuahahahaha!"
70013040-199 = "Seus tolos! Quem vai ser punido?"
70013040-200 = "Vocês vão ser punidos!"
70013040-201 = "Mercenários! Hora de agir!"
70013040-206 = "O quê! Estavam escondidos?"
70013040-207 = "Estamos cercados……! Mutsuki! Haruka! Cuidado!"
70013040-209 = "Kuhahahaha, a brincadeira acabou!"
70013040-211 = "Atirem!"
70013040-222 = "Todos os tiros. Controle concluído."
70013040-223 = "Fufufu…… Fuahahaha!"
70013040-224 = "Com tanta munição, não deve ter sobrado ninguém."
70013040-225 = "Presidente da Oficina 68! Agora é sua vez!"
70013040-227 = "…………"
70013040-228 = "…………Ainda não. Olhe ali."
70013040-232 = "…………"
70013040-233 = "O quê!?"
70013040-235 = "Cof, cof cof!"
70013040-236 = "Uu…… obrigado por me salvar. Haruka-chan, você é durona demais~"
70013040-239 = "C-como? Aguentar todo esse fogo……"
70013040-240 = "O-que você é……?"
70013040-242 = "Eu sou…… uma erva daninha……"
70013040-243 = "Uma erva que não morre, mesmo sendo pisada."
70013040-247 = "……"
70013040-248 = "Vou eliminar todos."
70013040-249 = "Fizeram Al-sama e Kayoko de reféns……"
70013040-250 = "E ainda tentaram machucar a Mutsuki na minha frente……"
70013040-251 = "Imperdoável."
70013040-252 = "Imperdoável, imperdoável, imperdoável……!"
70013040-253 = "Imperdoável!"
70013040-254 = "A-ajuda!"
70013040-268 = "S-socorro! Nunca mais vou aparecer!"
70013040-269 = "Por favor!"
70013040-270 = "……"
70013040-271 = "……Al-sama, o que fazemos?"
70013040-272 = "Solte-os."
70013040-273 = "Para quem já está com a reputação arruinada, viver é um castigo maior."
70013040-274 = "Fufu, enquanto eles rastejam na miséria, vão se lembrar."
70013040-276 = "de quem é o fora-da-lei hard-boiled de verdade!"
70013040-277 = "A-ajuda!"
70013040-278 = "……Hehe. Al-sama é foda."
70013040-279 = "Você…… deve sua vida à Al-sama."
70013040-285 = "Gah!"
70013040-291 = "Al-chan, Kayoko-chan, estão bem?"
70013040-292 = "Sim, estamos."
70013040-293 = "Queria que vocês tivessem visto a presidente em ação."
70013040-294 = "Fufu, minha postura hard-boiled vai estar sempre disponível."
70013040-299 = "Hehe…… que bom……"
70013040-304 = "H-Haruka!"
70013040-305 = "Haruka-chan!"
70013040-306 = "Uu……"
70013040-308 = "……"
70013040-309 = "……Tudo bem. Ela só cansou."
70013040-310 = "……"
70013040-311 = "……Obrigado, Haruka. Fiquei com uma grande dívida com você."
70013040-313 = "N-nada disso…… quem me salvou foi a Al-sama……"
70013040-314 = "Ainda não paguei minha dívida……"
70013040-315 = "Já pagou e muito. Então não precisa mais pensar nisso."
70013040-316 = "Al-sama…… obrigada."
70013040-317 = "Ah, Haruka-chan……"
70013040-318 = "Você se chamou de 'erva daninha' antes…… você ainda pensa assim?"
70013040-319 = "Por minha culpa de ter te chamado de 'Erva-chan'?"
70013040-320 = "……"
70013040-321 = "N-não é isso……"
70013040-322 = "É que eu gosto desse apelido……"
70013040-323 = "Haruka-chaaan!"
70013040-331 = "Depois, a Valkyrie chegou e prendeu Rigatoni."
70013040-332 = "Foi uma noite inesquecível para a Oficina 68."