[translation]#[Texto Final. - Filipe 08/07.]
70009010-1 = "Contudo, a Patrulha do Dormitório Continua Correndo (1)"
70009010-3 = "Pássaros cantando, flores desabrochando…… que dia maravilhoso."
70009010-7 = "Num dia desses――"
70009010-10 = "tomar um espresso num café ao ar livre seria o máximo."
70009010-15 = "Mas a realidade é…… passar o dia todo no posto de controle."
70009010-22 = "……Acho que nostalgia é luxo."
70009010-23 = "Tá, tá, entendi.#nVou abrir o posto de controle."
70009010-30 = "Mostre sua autorização de saída."
70009010-31 = "Aqui."
70009010-33 = "Itens declarados…… nenhum.#nEntão, coopere com a revista corporal."
70009010-34 = "De novo?#nOnde você acha que eu vou esconder algo no uniforme……"
70009010-35 = "É nosso trabalho."
70009010-43 = "Ei, ei! Onde você tá tocando!?"
70009010-44 = "Ultimamente, tem havido muitas entradas de itens proibidos.#nRecebemos ordens de reforçar a revista."
70009010-49 = "Ai…… c-cócegas!#nP-para!"
70009010-50 = "……Parece que está limpa.#nObrigado pela cooperação."
70009010-51 = "Foi o que eu disse desde o começo!"
70009010-55 = "É por isso que a Patrulha do Dormitório……!"
70009010-56 = "Só estou fazendo meu trabalho direito……"
70009010-57 = "Haa…… reclamar não adianta……"
70009010-58 = "Próxima, por favor."
70009010-62 = "Aqui, autorização e bolsa."
70009010-63 = "Vou verificar o conteúdo."
70009010-70 = "Isso é…… batata frita com ovas de bacalhau."
70009010-72 = "É."
70009010-76 = "Apreendido."
70009010-77 = "Mentira!"
70009010-78 = "Não atende aos padrões de segurança alimentar da academia."
70009010-82 = "Segurança…… o quê?"
70009010-83 = "O nitrogênio no pacote é insuficiente,#n……e há risco de estourar durante o transporte."
70009010-84 = "M-mas……! Comer não faz mal!"
70009010-85 = "Regras são regras."
70009010-89 = "Hmm, uma boneca. Isso também……"
70009010-90 = "Ah, está na lista.#nBoneca Peroro de MomoFriends…… apreendida."
70009010-91 = "……Por quê?"
70009010-92 = "Bem, houve uma reclamação diplomática por causa de uma inconsistência no último episódio……#n……o que é isso?"
70009010-93 = "……Enfim, itens de MomoFriends estão proibidos por enquanto."
70009010-94 = "Você também não entendeu nada!"
70009010-99 = "Hã, isso……"
70009010-100 = "Abacaxi?"
70009010-101 = "É."
70009010-102 = "……Não esperava ver isso na bolsa.#nApreendido."
70009010-103 = "Por quê! É só fruta!"
70009010-104 = "Para erradicar a pizza de abacaxi, proibimos totalmente."
70009010-105 = "Quem decidiu isso?"
70009010-106 = "Fui eu.#nDetesto pizza de abacaxi."
70009010-108 = "É por interesse próprio!"
70009010-109 = "Itens com potencial para uso criminoso#n……podem ser apreendidos a critério do fiscal."
70009010-110 = "O que pizza de abacaxi tem de criminoso?"
70009010-114 = "Por último…… isto?"
70009010-115 = "Ah, a autobiografia da presidente de Gehenna…… acho.#nÉ um livro chamativo, mas tava em liquidação, aí achei que podia ser interessante."
70009010-116 = "Livro não registrado. Apreendido."
70009010-117 = "Isso pesava muito! E eu carreguei até aqui!"
70009010-118 = "Após investigação, se não houver problemas, será notificado.#nDepois, faça o procedimento formal para retirar."
70009010-119 = "É tudo. Pode passar."
70009010-124 = "Apreendeu tudo! Que critério é esse?#nEm outras escolas, todo mundo tem essas coisas!"
70009010-125 = "Os itens proibidos estão todos no manual."
70009010-127 = "Só vocês leram isso!"
70009010-132 = "Haa, é esse o problema……"
70009010-133 = "Apreendidos vão para o depósito…… próxima."
70009010-137 = "Isso……"
70009010-138 = "É bastante. Vou verificar."
70009010-139 = "Sim! Deve estar tudo declarado!"
70009010-145 = "Vamos ver…… 50 conjuntos de pincéis Red Flower, 50 conjuntos de pincéis Kruger SB, 100 telas tamanho 3, 100 tamanho 4, e um removedor de tinta……"
70009010-146 = "Hmm? Atrás da tela tem algo……"
70009010-147 = "Ah……!"
70009010-154 = "……Isto é?"
70009010-155 = "Como pode ver…… bombas de napalm de Millennium."
70009010-156 = "Submetralhadora e granadas…… tudo não declarado."
70009010-157 = "Ah~ é pessoal.#nAchei que dava pra levar junto."
70009010-161 = "Mas, precisa declarar isso?"
70009010-165 = "……É, declarar arma uma a uma é inviável.#nSeria como revistar todas as roupas."
70009010-166 = "Tudo bem, sem problemas. Pode passar."
70009010-167 = "Obrigado~"
70009010-172 = "Se todos fossem assim, o trabalho seria mais fácil.#n……Haa, próximo."
70009010-176 = "Olha! A autorização e os itens! Rápido!#nA inspiração chegou!"
70009010-177 = "S-sim. Um momento……"
70009010-182 = "Isto…… o que é?"
70009010-183 = "Uma estátua que trouxe de Trinity!#nMoida, vira uma tinta branca delicada!"
70009010-184 = "Você tem permissão do dono?"
70009010-185 = "Hã? Estava lá, então peguei.#nNão parece uma antiguidade?"
70009010-186 = "Parece, de fato."
70009010-187 = "Quem fez isso, ninguém sabe onde está."
70009010-188 = "Vou apreender.#nTenho perguntas a fazer, então aguarde――"
70009010-189 = "H-hã!?#nInspiração não espera!"
70009010-193 = "……Você quer roubar minha ideia!"
70009010-194 = "Quem está roubando é você.#nVai ser punida."
70009010-195 = "Punição……? Você quer suprimir a arte?"
70009010-196 = "Não, isso é crime……"
70009010-198 = "Não me curvo ao poder!#nA arte nasce da luta sem fim com o mundo!"
70009010-203 = "Ah!#nAqui é o posto de controle! Invasor!"
70009010-207 = "O quê!? Cadê?"
70009010-208 = "Persigam!"
70009010-210 = "O que foi? Tanta confusão."
70009010-211 = "Aquela pode entrar? Então devolve a minha!"
70009010-212 = "Agora, vou entrar escondida……!"
70009010-214 = "O-que é isso!? Recuem!"
70009010-215 = "Aqui, posto de controle! Emergência!#nAlunas estão tentando furar o bloqueio em grupo! Peço reforços!"
70009010-217 = "Agora! Expulsem a Patrulha que reprime a liberdade!"
70009010-218 = "Viva! Wild Hunt! Não somos escravos!"
70009010-229 = "Ah……"
70009010-236 = "Uma pomba."