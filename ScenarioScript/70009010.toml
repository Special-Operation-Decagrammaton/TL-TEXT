[translation]
70009010-1 = "Mas a Equipe de Monitoras continua correndo (1)"
70009010-3 = "Os pássaros cantam, as flores desabrocham... que dia maravilhoso."
70009010-7 = "Em um dia como este—"
70009010-10 = "Seria incrível poder tomar um expresso no terraço do café."
70009010-15 = "Bem, a realidade é... passar o dia inteiro no posto de controle."
70009010-22 = "...Ficar sentimental é um luxo, né?"
70009010-23 = "Sim, sim, entendi. #nA partir de agora, o posto de controle está aberto."
70009010-30 = "Por favor, apresente sua autorização de saída."
70009010-31 = "Aqui está."
70009010-33 = "Não há nada a declarar... #nEntão, por favor, colabore com a revista corporal."
70009010-34 = "De novo? #nOnde você acha que eu esconderia algo no uniforme...?"
70009010-35 = "Isso também faz parte do meu trabalho."
70009010-43 = "Ei, ei! Onde você está tocando!?"
70009010-44 = "Recentemente, tem havido muitos casos de contrabando de itens proibidos. #nRecebemos ordens superiores para tornar a revista corporal mais rigorosa."
70009010-49 = "Uau... c-côcegas! #nP-pare com isso!"
70009010-50 = "...Parece que está tudo em ordem. #nObrigada pela colaboração."
70009010-51 = "Eu não disse isso desde o começo?!"
70009010-55 = "É por isso que a Equipe de Monitoras é assim...!"
70009010-56 = "Eu só estou fazendo o meu trabalho honestamente..."
70009010-57 = "Haa... não adianta reclamar, né..."
70009010-58 = "Próximo, por favor."
70009010-62 = "Aqui, a autorização e a bolsa."
70009010-63 = "Certo, vou verificar o conteúdo."
70009010-70 = "Isto é... batata frita sabor mentaiko?"
70009010-72 = "Sim, e daí?"
70009010-76 = "Confiscado."
70009010-77 = "Você está brincando, né!?"
70009010-78 = "Não atende aos padrões de segurança alimentar da academia."
70009010-82 = "Segurança... o quê?"
70009010-83 = "Dizem que há pouco nitrogênio no pacote, #no que pode causar rasgos durante o transporte..."
70009010-84 = "M-mas... #nNão tem problema nenhum para comer, certo!?"
70009010-85 = "Regras são regras."
70009010-89 = "Hum, uma boneca. Esta também, se não me engano..."
70009010-90 = "Ah, está na lista. Boneca Peroro da Momo Friends... sim, confiscada."
70009010-91 = "...Por que isso?"
70009010-92 = "Bem, no episódio mais recente, o oficial quebrou o personagem, então houve um protesto diplomático... #n...O que é isso?"
70009010-93 = "...De qualquer forma, produtos da Momo Friends estão proibidos #npor tempo indeterminado."
70009010-94 = "Nem você sabe o motivo!"
70009010-99 = "Ei, isso é..."
70009010-100 = "Um abacaxi?"
70009010-101 = "Sim, e daí?"
70009010-102 = "...Não, é que eu não esperava encontrar isso na sua bolsa. #nIsso também será confiscado."
70009010-103 = "Por quê!? É só uma fruta!"
70009010-104 = "Para erradicar a pizza de abacaxi, proibimos totalmente."
70009010-105 = "Quem decidiu isso...?"
70009010-106 = "Eu. #nPorque eu odeio pizza de abacaxi."
70009010-108 = "Isso é só por conveniência própria!"
70009010-109 = "Itens com alta probabilidade de serem usados em crimes #npodem ser confiscados a critério do inspetor."
70009010-110 = "O que a pizza de abacaxi tem de criminosa..."
70009010-114 = "Por último... o que é isto?"
70009010-115 = "Ah, a autobiografia da presidente do conselho estudantil de Gehenna... eu acho?#nÉ um livro chamativo, mas como estava sendo vendido a preço de banana, achei que seria interessante."
70009010-116 = "Este é um livro não registrado. Vou confiscá-lo."
70009010-117 = "Isso aqui era super pesado, sabia!?#nTive o maior trabalho para trazer!"
70009010-118 = "Faremos uma investigação formal e, se não houver problemas, será notificado.#nDepois disso, por favor, siga os procedimentos documentais formais para retirá-lo."
70009010-119 = "Isso é tudo, então. Por favor, pode entrar."
70009010-124 = "Você confiscou tudo! Qual é o critério!?#nEm outras escolas, todo mundo pode levar!"
70009010-125 = "Os itens proibidos estão todos listados no livro de regras, sabia?"
70009010-127 = "Só vocês leem essa coisa!"
70009010-132 = "Haa, esse é exatamente o problema..."
70009010-133 = "Itens apreendidos vão para o depósito, e... pronto, próximo."
70009010-137 = "Heave... ho."
70009010-138 = "Tem bastante coisa. Bem, vou verificar o conteúdo."
70009010-139 = "Sim! Deve estar tudo conforme declarado!"
70009010-145 = "Vejamos... 50 conjuntos de 6 pincéis Red Flower, 50 conjuntos de Kruger SB do número 4 ao 8, 100 telas número 3 e 100 número 4, além de uma lata de removedor de tinta e..."
70009010-146 = "Hm? Tem algo atrás da tela..."
70009010-147 = "Ah...!"
70009010-154 = "...E isto aqui?"
70009010-155 = "Como pode ver... é uma bomba de napalm feita em Millennium."
70009010-156 = "Uma submetralhadora e granadas... são todos itens não declarados."
70009010-157 = "Ah... são meus pertences pessoais.#nPensei em trazer tudo de uma vez, já que estava vindo."
70009010-161 = "Mas precisa declarar até esse tipo de coisa?"
70009010-165 = "...De fato, se tivermos que declarar cada arma individualmente, não teremos fim.#nSeria como checar até as roupas que as pessoas vestem."
70009010-166 = "Sim, sem problemas. Pode prosseguir."
70009010-167 = "Muito obrigada~"
70009010-172 = "Se todos fossem assim, esse trabalho seria fácil.#n...Haa, próximo, por favor."
70009010-176 = "Ei! Aqui está o passe de saída e os itens que estou trazendo! Anda logo!#nMinha inspiração acabou de surgir!"
70009010-177 = "S-sim. Por favor, aguarde um momento..."
70009010-182 = "O que é... isso exatamente?"
70009010-183 = "É uma estátua que trouxe de Trinity!#nSe eu triturar isso para fazer tinta, consigo um branco delicado e suave!"
70009010-184 = "Com licença... você obteve permissão do dono?"
70009010-185 = "Hã? Estava lá, então eu peguei.#nDá para ver que é uma antiguidade, não dá?"
70009010-186 = "De fato, parece ser algo antigo."
70009010-187 = "Quem sabe onde está quem fez isso..."
70009010-188 = "Vou confiscar por enquanto.#nTenho várias perguntas a fazer, então espere aqui—"
70009010-189 = "O-o quê!?#nA inspiração não espera por ninguém!"
70009010-193 = "...Será que você está tentando roubar minhas ideias!?"
70009010-194 = "Quem está roubando é você.#nIsso será passível de sanção."
70009010-195 = "Sanção...? Você pretende suprimir a arte!!"
70009010-196 = "Não, eu disse que... isso é um crime..."
70009010-198 = "Eu não me curvo perante o poder!#nA arte nasce da luta interminável contra o mundo!!"
70009010-203 = "Ah!#nAqui é o posto de controle! Temos invasores!"
70009010-207 = "O quê!? Onde!?"
70009010-208 = "Persigam-nos imediatamente!"
70009010-210 = "O que foi? Que barulheira."
70009010-211 = "Por que aquela pessoa pode entrar com as coisas dela?#nEntão devolva as minhas também!"
70009010-212 = "Vou aproveitar a confusão e entrar de fininho...!"
70009010-214 = "Q-quem são vocês!? Recuem!!"
70009010-215 = "Aqui é o posto de controle! Situação de emergência!#nAs alunas estão tentando romper o bloqueio em grupo...! Solicito reforços!"
70009010-217 = "Agora! Expulsem a equipe de vigilância que suprime nossa liberdade!"
70009010-218 = "Viva! Wild Hunt! Nós não seremos escravos!"
70009010-229 = "Ah..."
70009010-236 = "É um pombo."
