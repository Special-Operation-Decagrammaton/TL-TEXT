[translation]
84303100200-6 = "Senhorita do Tea Party, você gosta de brincar de esconde-esconde? Da próxima vez, vou te encontrar bem mais rápido!"
84303100200-8 = "……Peço desculpas. Como esperado da Millennium. Há muitas coisas aqui que despertam meu interesse."
84303100200-10 = "Se for esse o caso, não me importo, mas……."
84303100200-11 = "……Não, não é minha intenção vigiar você."
84303100200-12 = "Mas, se for se ausentar por muito tempo ou se houver algo com que se preocupar, por favor, entre em contato."
84303100200-14 = "Estou lhe dando trabalho…… Agradeço pela sua consideração."
84303100200-18 = "Hm……?"
84303100200-21 = "(Uma mensagem da Rio?)"
84303100200-24 = "Desculpe pela pressa, mas…… vou me ausentar por um momento."
84303100200-26 = "Entendido."
84303100200-27 = "Estarei esperando aqui, então me chame quando terminar."
84303100200-29 = "Sim."
