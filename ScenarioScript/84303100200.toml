[translation]
84303100200-6 = "ティーパーティーさん、かくれんぼが好きなの？次はもっと早く見つけるからね！"
84303100200-8 = "……済まない。流石はミレニアム。興味を引かれるものが多くてね。"
84303100200-10 = "それなら構わないのだが……。"
84303100200-11 = "……いや、監視するつもりはないんだ。"
84303100200-12 = "でも長時間離れたり、心配事があったりする時は、連絡してほしい。"
84303100200-14 = "手間をかけるね……配慮に感謝する。"
84303100200-18 = "うん……？"
84303100200-21 = "（リオからの連絡？）"
84303100200-24 = "早速で悪いが……少し外すよ。"
84303100200-26 = "分かった。"
84303100200-27 = "ここで待っているから、終わったら声をかけてくれ。"
84303100200-29 = "ああ。"
