[translation]
52180-1 = "Episódio 18; Sonhos Diferentes no Mesmo Travesseiro"
52180-3 = "Hmph... grrr...! "
52180-4 = "Só... mais um pouco...!"
52180-8 = "Kikyou, não fique só olhando, me ajude!"
52180-9 = "Essa grade de ferro, só mais um pouco e vai abrir um espaço grande o suficiente para uma pessoa passar... isso! #n...O que foi...!"
52180-10 = "Por que não para com esse esforço inútil e tenta conservar um pouco de energia?"
52180-11 = "Eles nem colocaram guardas... o que significa que estão confiantes de que não vamos sair daqui."
52180-12 = "E é por isso que devo ficar parada!? #nEu tenho que tentar o que for possível, não tenho!?"
52180-13 = "Haa... eu estou tentando pensar em um método de fuga agora. #nNem todo mundo é do tipo que resolve as coisas na base da garra e da determinação como você."
52180-14 = "Para começar, se não tivéssemos confiado naquela Ayame desde o início..."
52180-15 = "Isso é verdade, mas..."
52180-16 = "B-bem, se você tem alguma ideia, diga logo!"
52180-17 = "Fique quieta um pouco, estou tentando me concentrar!"
52180-18 = "O quê, Kikyou, você—!"
52180-19 = "K-Kikyou-senpai, Renge-senpai! Por favor, acalmem-se!"
52180-20 = "Agora não é hora de discutir...!"
52180-26 = "[ns1] \"Que barulheira...\"\n[ns2] \"...Por quanto tempo será que eu dormi?\""
52180-29 = "Sensei [USERNAME]!"
52180-30 = "Mestre!"
52180-31 = "Sensei, está bem? Não se machucou?"
52180-32 = "[s3] \"Sim, minha cabeça dói um pouco, mas estou bem.\"\n[s4] \"Vocês também não se machucaram?\""
52180-37 = "Sim. Aqui só temos alguns arranhões leves."
52180-38 = "Como membros da Hyakkiyako, esse nível de coisa não é nada!"
52180-40 = "[ns] \"Onde estamos...?\""
52180-41 = "Estamos no subsolo da \"Mansão Higan\"."
52180-42 = "Nós perdemos a batalha contra o Departamento Kacho Fugetsu... e fomos trazidas para cá."
52180-43 = "Existe um depósito parecido no subsolo da família Kageyu-koji, mas... pensar que eles usam isso como uma prisão."
52180-44 = "Tsc, se ao menos nossas balas funcionassem contra eles..."
52180-45 = "[s5] \"Departamento Kacho Fugetsu...?\"\n[s6] \"O que aconteceu?\""
52180-48 = "Resumindo—"
52180-49 = "Tudo o que ouvimos e vimos daquela mulher no Distrito Norte era mentira."
52180-51 = "(Recebeu uma explicação sobre o que aconteceu enquanto estava desmaiado)"
52180-59 = "[ns] \"...Quem diria que Azami era um dos membros do Departamento Kacho Fugetsu.\""
52180-60 = "Sim. Aquela presidente que parecia tão gentil... é um choque."
52180-61 = "Foi uma encenação para nos enganar desde o começo. #nSó de lembrar daquele sorriso, sinto um calafrio."
52180-62 = "Então o distrito da filial de Ebisu e os moradores também eram falsos...?"
52180-63 = "Não, acho que aquelas pessoas não têm relação com isso."
52180-64 = "Mesmo que o Hyakkiyakou seja poderoso, não acho que eles conseguiriam criar até os ingredientes usados no festival."
52180-65 = "Além disso, algumas pessoas reagiram como se estivessem vendo Habu Azami pela primeira vez."
52180-66 = "[s] \"Então... a Ayame também era falsa?\""
52180-67 = "Sobre isso..."
52180-68 = "Nós também ficamos curiosas e perguntamos para a Nagusa-senpai, que esteve com a Ayame-senpai até o fim, mas..."
52180-69 = "Mas, sobre o que aconteceu... #nNagusa-senpai ficou completamente desolada."
52180-74 = "[ns7] \"...Você está bem?\"\n[ns8] \"Está se sentindo mal?\""
52180-77 = "...Estou bem."
52180-78 = "Desculpem... por eu ser imatura, acabei colocando todas em perigo."
52180-79 = "A senpai não tem culpa de nada! A culpa é toda do Departamento Kacho Fugetsu!"
52180-80 = "Sim, a Nagusa-senpai fez o seu melhor por todas nós!"
52180-81 = "Não adianta se culpar agora, não é?"
52180-82 = "Quem causou essa situação foi a Ayame-senpai, não você, certo?"
52180-83 = "……Não, não é culpa da Ayame. #nEla não está errada."
52180-84 = "Hã?"
52180-85 = "No fim das contas, foi porque eu não consegui entender a Ayame—"
52180-86 = "É verdade, sim. É tudo culpa sua, por ter se deixado levar por um sonho conveniente. #nNão é, Nagusa-chan?"
52180-92 = "Yabuki Shuro……!"
52180-93 = "Ah, ahahahaha!"
52180-94 = "O que é essa figura patética?"
52180-95 = "Para onde foi toda aquela arrogância de antes?"
52180-96 = "Não me diga que…… você realmente achou que aquela Ayame gentil e bondosa não era uma farsa? #nVocê confundiu a melhor amiga que via até em sonhos?"
52180-100 = "……Só mentiras."
52180-101 = "Você só estava fechando os olhos para a realidade inconveniente, não é?"
52180-102 = "Entendo…… então a Ayame-senpai que encontramos não era a verdadeira."
52180-103 = "Sim, exatamente!"
52180-104 = "Uma melhor amiga que aparece heroicamente para salvar seus companheiros em crise e tem um reencontro emocionante…… você não acha que esse clichê já passou dos limites?"
52180-105 = "Aquela Ayame…… não, aquilo é o seu próprio 'medo', Nagusa-chan, nascido do livro bizarro 'Toutei Bukkairoku'!"
52180-106 = "M-mas, aquela pessoa era tão radiante…… não parecia nada com medo."
52180-107 = "Como sempre, você não sabe de nada, não é?"
52180-108 = "O medo, às vezes, aparece na forma da felicidade, sabe?"
52180-109 = "Uma felicidade como um sonho, que você negou no fundo do coração por tanto tempo. #nNão existe nada mais assustador do que isso se tornar realidade, não é?"
52180-113 = "Quanto mais você desfruta de uma felicidade falsa…… mais cruel a realidade se torna quando ela aparece."
52180-114 = "……"
52180-115 = "É por isso que você não pode substituir a Ayame, Nagusa-chan."
52180-116 = "O que você sabe sobre a Nagusa-senpai!?"
52180-117 = "Ah! Não adianta ficar irritada!"
52180-118 = "Não importa o quanto você chore ou se enfureça, a realidade não vai mudar."
52180-119 = "Não importa o quanto vocês se esforcem, vocês nunca chegarão aos pés daquela Ayame!"
52180-120 = "De qualquer forma, vocês são apenas descartáveis que serão jogados fora um dia, não podem fazer nada!"
52180-121 = "[s] \"Shuro, eu quero te perguntar uma coisa.\""
52180-122 = "O que foi?"
52180-123 = "Já estou farta de ouvir suas desculpas esfarrapadas."
52180-124 = "O latido de um perdedor não significa nada para mim, sabe?"
52180-125 = "[s9] \"Você sabia de tudo desde o começo, não sabia?\"\n[s10] \"Aquele momento em que você foi baleada pela Ayame também foi atuação?\""
52180-131 = "……Hã?"
52180-132 = "Você queria perguntar algo tão estúpido assim? Você acabou com o meu clima, sabia?"
52180-133 = "É óbvio, não é? Tudo, absolutamente tudo, foi uma encenação para capturar vocês."
52180-134 = "Ser capturada por aquilo, atrair vocês para a Mansão Higan……"
52180-138 = "……Eh?"
52180-139 = "……Sensei do Schale?"
52180-142 = "Usar você como escudo também, tudo, tudo—"
52180-143 = "……foi uma atuação pela Kokuriko-sama!"
52180-146 = "[ns11] \"Não é algo que se diga estando capturada……\"\n[ns12] \"Além disso, talvez você já esteja cansada de ouvir isso……\""
52180-149 = "[ns13] \"……Não é algo ruim interpretar alguém que não é você mesmo.\"\n[ns14] \"Todo mundo faz isso, afinal.\""
52180-152 = "[ns] \"Mas, justamente por isso…… não vire as costas para as ações que você cometeu.\""
52180-154 = "[ns] \"Shuro, você fez o que tinha que fazer, não foi?\""
52180-155 = "Ha, hahaha…… e eu pensando no que você diria."
52180-156 = "Está tentando me convencer com esse papo furado?"
52180-157 = "Acha que eu trairia a Kokuriko-sama só porque fui salva?"
52180-158 = "Você realmente tem a cabeça nas nuvens……"
52180-159 = "Um pensamento infantil e ridículo, como uma brincadeira de casinha……"
52180-160 = "Tudo isso é uma ilusão estúpida, igual à Kuzunoha em quem vocês acreditam!"
52180-164 = "……Kuzunoha."
52180-165 = "……Por que você me salvou naquela época?"
52180-166 = "Por que você escolheu a mim, e não a Ayame... Teria sido melhor se tivesse me deixado lá..."
52180-167 = "Hã? Do que você está falando?"
52180-168 = "É como se você tivesse realmente encontrado a Kuzunoha..."
52180-169 = "[s15] \"Kuzunoha não é apenas um conto de fadas.\"\n[s16] \"Eu também recebi uma carta da Kuzunoha através da Nagusa antes.\""
52180-172 = "Você está dizendo que... a Kuzunoha existe?"
52180-173 = "A origem de todos os livros de mistérios, a primeira presidente do Comitê Hyakkiyako — a Grande Profetisa Kuzunoha?"
52180-174 = "Que bobagem... Você está zombando de mim, não está?#nSe for esse o caso――!"
52180-181 = "Não, mas..."
52180-182 = "A senhorita Cocolico disse que, naquela época, Nagusa estava bem no meio da grande planície nevada... e ainda assim, ela voltou viva."
52180-183 = "Naquela planície onde nem as feras se aproximam, quem teria salvado a Nagusa...?"
52180-184 = "Além disso, o Sensei do Schale... ele pode até inventar desculpas, mas não mente..."
52180-185 = "Se a Grande Profetisa Kuzunoha realmente estiver... no Templo do Crepúsculo..."
52180-186 = "Será que poderíamos criar um livro de mistérios para substituir o \"Ino Mononoke Roku\" perdido...?#nSe fizermos isso... a senhorita Cocolico também poderá... mais..."
52180-192 = "……Que pena, realmente uma pena, Nagusa-chan.#nDeve ser como estar sentada em uma cama de pregos, não é?"
52180-193 = "Ah, pobre Nagusa-chan.#nSinto uma compaixão profunda por você."
52180-194 = "Para uma Nagusa-chan tão... eu, que sou tão gentil, deveria lhe dar uma oportunidade?"
52180-195 = "……Uma oportunidade?"
52180-196 = "Nagusa-chan, você tem alguém que deseja salvar a qualquer custo, não tem?"
52180-201 = "Então, é só se encontrar com ela novamente... com a Kuzunoha."
52180-203 = "Próximo episódio: Memórias do Outro Lado"
