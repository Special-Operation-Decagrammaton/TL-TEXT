[translation]
52180-1 = "第18話;同床異夢"
52180-3 = "ふんっ……ぬぬぬぬぬ……！"
52180-4 = "もう……ちょっとで……！"
52180-8 = "キキョウ、見てないで手伝えよ！"
52180-9 = "この鉄格子、あとちょっとで人が通れるくらいの隙間ができ……そうっ！#n……なんだよ……！"
52180-10 = "そんな無駄なことしないで、ちょっとは体力を温存したら？"
52180-11 = "あいつらは監視も立ててない……つまり、私たちをここから出さないだけの自信があるってことだよ。"
52180-12 = "だからってじっとしてろってか！？#nやれることは試してみないとだろ！？"
52180-13 = "はぁ……今、脱出方法を考えてるところなんだけど。#nみんながあんたみたいに、気合と根性で解決するタイプじゃないの。"
52180-14 = "そもそも最初から[ruby=・]あ[/ruby][ruby=・]の[/ruby]アヤメを信じなければ……。"
52180-15 = "それは、そうだけど……。"
52180-16 = "な、何か考えがあるなら言ってくれよ！"
52180-17 = "集中したいからちょっと黙ってて！"
52180-18 = "なっ、キキョウお前――！"
52180-19 = "き、キキョウ先輩、レンゲ先輩！落ち着いてくださいまし！"
52180-20 = "今は言い争っている場合では……！"
52180-26 = "[ns1] \"なんだか騒がしいね……。\"\n[ns2] \"……私、どれくらい寝てたんだろう。\""
52180-29 = "[USERNAME]先生！"
52180-30 = "師匠！"
52180-31 = "先生、大丈夫？怪我はない？"
52180-32 = "[s3] \"うん、ちょっと頭は痛いけど平気。\"\n[s4] \"みんなも怪我はない？\""
52180-37 = "ああ。こっちは軽い擦り傷程度だよ。"
52180-38 = "百花繚乱たるもの、この程度へっちゃらですの！"
52180-40 = "[ns] \"ここは……？\""
52180-41 = "ここは「彼岸邸」の地下。"
52180-42 = "私たちは花鳥風月部との戦闘に負けて……ここに連れてこられた。"
52180-43 = "勘解由小路家の地下にも似たような倉庫がありますが……それを牢屋として使っているなんて。"
52180-44 = "ちっ、アイツらに銃弾が通ればな……。"
52180-45 = "[s5] \"花鳥風月部……？\"\n[s6] \"何があったの？\""
52180-48 = "結論から言えば――"
52180-49 = "北部自治区であの女から見聞きしたことは、全部ウソだったってこと。"
52180-51 = "（気絶していた時の出来事を説明してもらった）"
52180-59 = "[ns] \"……まさか、アザミが花鳥風月部の一人だったなんて。\""
52180-60 = "ええ。あの優しそうな会長さんが……しょっくです。"
52180-61 = "最初から私たちを騙すための芝居だったんだよ。#nあの笑顔、思い出すだけで寒気がする。"
52180-62 = "じゃあエビス分校の自治区も、住民もニセモノだったってことか……？"
52180-63 = "いや、あの人たちは関係ないんじゃないかな。"
52180-64 = "いくら百物語が強力だとしても、お祭りに使われる食材までは作り出せないと思うよ。"
52180-65 = "それに、一部の人は[ruby=はぶ]土生[/ruby]アザミに対して初対面みたいな反応だったし。"
52180-66 = "[s] \"じゃあ……アヤメもニセモノだったのかな？\""
52180-67 = "それなんだけどさ……。"
52180-68 = "私たちも気になって、アヤメ先輩と最後まで一緒だったナグサ先輩に聞いてみたんだけど……。"
52180-69 = "でも、何があったのかまでは……。#nナグサ先輩、ずっと塞ぎ込んでしまっておりまして。"
52180-74 = "[ns7] \"……大丈夫？\"\n[ns8] \"どこか具合でも悪い？\""
52180-77 = "……大丈夫。"
52180-78 = "ごめんなさい……私が未熟だから、みんなを危険な目に遭わせた。"
52180-79 = "先輩は何も悪くないだろ！全部花鳥風月部のせいだって！"
52180-80 = "ええ、ナグサ先輩は皆のために最善を尽くしていましたわ！"
52180-81 = "いま自分を責めてもしょうがないでしょ。"
52180-82 = "この事態を招いたのはあんたじゃなくてアヤメ先輩でしょ？"
52180-83 = "……ううん、アヤメのせいじゃない。#n彼女は間違ってないの。"
52180-84 = "は？"
52180-85 = "結局私が、アヤメを理解できていなかったから――"
52180-86 = "そうですよねぇ。都合のいい夢に甘えてた、[ruby=てめぇ]手前[/ruby]のせいですよぉ。#nねっ、ナグサちゃん？"
52180-92 = "[ruby=やぶき]箭吹[/ruby]シュロ……！"
52180-93 = "あはっ、アハハハッ！"
52180-94 = "何ですかぁ、その無様な姿。"
52180-95 = "あの時の威勢のよさは、どこ行っちゃったんですぅ？"
52180-96 = "まさかぁ……優しい優しいアヤメがニセモノだなんて思ってなかったんですぅ？#n夢にまで見た親友を、間違えちゃったんですかぁ？"
52180-100 = "……ウソばっかり。"
52180-101 = "都合の悪い現実に、蓋をしてただけですよねぇ？"
52180-102 = "そう……じゃあ、私たちが会ったアヤメ先輩は本物じゃなかったんだね。"
52180-103 = "ええ、そうですよぉ？"
52180-104 = "仲間の危機に颯爽と駆けつけて、感動の再会を果たす親友だなんてぇ……ご都合主義も大概にしてくださいよぉ？"
52180-105 = "あのアヤメ……いえ、「アレ」は、怪書「[ruby=とうていぶっかいろく]稲亭物怪録[/ruby]」から生まれた、ナグサちゃんの「恐怖」なんですよぉ！"
52180-106 = "で、でも、あのお方はとても明るくて……恐怖だなんてとてもそんな風には。"
52180-107 = "相変わらず、なぁんにも知らないんですねぇ？"
52180-108 = "恐怖は、ときに[ruby=・]幸[/ruby][ruby=・]せ[/ruby]の姿をしてやってくるんですよぉ？"
52180-109 = "心の中でずぅっと否定してきた、夢みたいな幸せ。#nそれが現実になるほど恐いことなんて、ないですよねぇ？"
52180-113 = "偽りの幸せを享受すればするほど……残酷な現実がくっきり浮かび上がるんですから。"
52180-114 = "っ……。"
52180-115 = "だ～か～らぁ、あなたはアヤメの代わりになれないんですよ、ナグサちゃん。"
52180-116 = "お前にナグサ先輩の何がわかるんだよ！？"
52180-117 = "アハッ！ムキになっても無駄ですよぉ？"
52180-118 = "いくら泣いたって怒ったって、現実は変わらないんですからぁ。"
52180-119 = "手前らがいくら努力したって、あのアヤメの足元にも及びませんよぉ？"
52180-120 = "どうせ、いつかは捨てられる消耗品に、何一つできやしないんですから！"
52180-121 = "[s] \"シュロ、一つ聞きたいんだけど。\""
52180-122 = "何ですかぁ？"
52180-123 = "もう屁理屈は聞き飽きてますよぉ。"
52180-124 = "負け犬の遠吠えなんて、手前には響きませんしぃ？"
52180-125 = "[s9] \"最初から、全部知ってたんだよね？\"\n[s10] \"あの時アヤメに撃たれたのも、演技だったのかな。\""
52180-131 = "……はぁ？"
52180-132 = "そんなくだらないことが聞きたかったんですぅ？手前、興醒めなんですけど？"
52180-133 = "当然でしょう？全部ぜ～んぶ、手前さん方を捕まえるためのお芝居だったんですから。"
52180-134 = "アレに捕まったのも、手前さん方を彼岸邸に誘い出したのもぉ……。"
52180-138 = "……え？"
52180-139 = "……シャーレの先生？"
52180-142 = "手前様を盾にしたのも、全部、全部――"
52180-143 = "……っ、コクリコ様のための演技だったんですからぁ！"
52180-146 = "[ns11] \"捕まっといて言うことでもないし……。\"\n[ns12] \"それに、もう聞き飽きてるかもしれないけど……。\""
52180-149 = "[ns13] \"……自分以外の何かを演じるのは、悪いことじゃない。\"\n[ns14] \"誰だってすることだからね。\""
52180-152 = "[ns] \"でも、だからこそ……自分がした行動に目を背けないで。\""
52180-154 = "[ns] \"シュロは、シュロのすべきことをしたんだよね？\""
52180-155 = "は、ハハッ……何を言うかと思えばぁ。"
52180-156 = "それっぽいこと言って、手前を引き入れようって魂胆ですかぁ？"
52180-157 = "助けられたからって、コクリコ様を裏切るとでもぉ？"
52180-158 = "ほんっと、頭お花畑なんですねぇ……。"
52180-159 = "幼稚でくだらない、おままごとみてぇな発想……。"
52180-160 = "全部、[ruby=てめえ]手前[/ruby]らが信じるクズノハと同じ、くだらないくだらない妄想ですよぉ！"
52180-164 = "……クズノハ。"
52180-165 = "……あの時どうして私を助けたのかな。"
52180-166 = "どうして、アヤメじゃなくて私を……あのまま放っておいてくれたらよかったのに……。"
52180-167 = "は？何言ってるんです？"
52180-168 = "まるで本当にクズノハと会ったかのような……。"
52180-169 = "[s15] \"クズノハはただのおとぎ話じゃないよ。\"\n[s16] \"私も前に、ナグサからクズノハの手紙をもらったんだ。\""
52180-172 = "クズノハが……いるっていうんですかぁ？"
52180-173 = "全ての怪書の始まりであり、百花繚乱の初代委員長――大預言者クズノハが？"
52180-174 = "そんな世迷言……手前をからかってるんですね？#nでしたら――！"
52180-181 = "いや、でも……。"
52180-182 = "コクリコ様は、あの時ナグサは大雪原のど真ん中にいたって……それなのに、生きて帰ってきてる。"
52180-183 = "獣も寄りつかない大雪原で、誰がナグサを……？"
52180-184 = "それに、シャーレの先生は……屁理屈をこねても嘘はつかない……。"
52180-185 = "本当に大預言者クズノハが……黄昏の寺院にいるのなら……。"
52180-186 = "失くした「稲生物怪録」の代わりの怪書が作れる……？#nそうしたら……コクリコ様だって、もっと手前を……。"
52180-192 = "……本当に本当に残念でしたねぇ、ナグサちゃん。#n針のむしろに座ってる気分でしょう？"
52180-193 = "ああ、可哀想なナグサちゃん。#n心の底から同情しちゃいますぅ。"
52180-194 = "そんなナグサちゃんに……優しい優しい手前が機会を差し上げましょうかぁ？"
52180-195 = "……機会？"
52180-196 = "ナグサちゃんは、なんとしてでも助けたい存在がいるのでしょう？"
52180-201 = "だったら、また会えばいいんですよぉ……クズノハに。"
52180-203 = "次回;彼岸の記憶"
