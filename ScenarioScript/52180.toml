[translation]
52180-1 = "Episódio 18; Sonhos de Camas Diferentes"
52180-3 = "Hunf...... nnnnnnn......!"
52180-4 = "Só mais um pouco......!"
52180-8 = "Kikyou, pare de olhar e venha ajudar!"
52180-9 = "Se eu abrir essa grade só mais um pouquinho, vai dar para uma pessoa passar......! ......Mas o que é isso......!"
52180-10 = "Por que não para com essa inutilidade e tenta conservar um pouco de energia?"
52180-11 = "Eles nem montaram guarda... isso significa que estão confiantes de que não vamos sair daqui."
52180-12 = "Então você quer que eu fique parada aí!? #n Temos que tentar tudo o que pudermos, não temos!?"
52180-13 = "Haa...... eu estou pensando em uma forma de escapar agora. #n Nem todo mundo é do tipo que resolve as coisas na base da força de vontade e coragem como você."
52180-14 = "Para começo de conversa, se você não tivesse confiado naquela Ayame desde o início......"
52180-15 = "Isso é verdade, mas......"
52180-16 = "E, então diga logo se tem algum plano!"
52180-17 = "Preciso de concentração, então fique quieta um pouco!"
52180-18 = "O quê, Kikyou, você――!"
52180-19 = "K, Kikyou-senpai, Renge-senpai! Por favor, acalmem-se!"
52180-20 = "Não é hora de discutir......!"
52180-26 = "[ns1] \"Parece meio barulhento aqui......\"\n[ns2] \"......Eu não sei quanto tempo dormi.\""
52180-29 = "Sensei [USERNAME]!"
52180-30 = "Mestre!"
52180-31 = "Sensei, você está bem? Não se feriu?"
52180-32 = "[s3] \"Sim, minha cabeça dói um pouco, mas estou bem.\"\n[s4] \"Vocês também não se feriram?\""
52180-37 = "Sim. Aqui, só alguns arranhões leves."
52180-38 = "Como membros da Hyakkaryouran, isso não é nada!"
52180-40 = "[ns] \"Onde estamos......?\""
52180-41 = "Estamos no subsolo da 'Mansão Higantei'."
52180-42 = "Perdemos a batalha contra o Clube das Flores, Pássaros, Vento e Lua...... e fomos trazidas para cá."
52180-43 = "Existe um depósito parecido no subsolo da Mansão Kadenokouji também...... mas usar isso como uma cela......"
52180-44 = "Tsc, se ao menos balas funcionassem contra eles......"
52180-45 = "[s5] \"Clube das Flores, Pássaros, Vento e Lua......?\"\n[s6] \"O que aconteceu?\""
52180-48 = "Em resumo――"
52180-49 = "Tudo o que ouvi e vi daquela mulher no Distrito Norte era mentira."
52180-51 = "(Expliquei o que aconteceu enquanto eu estava inconsciente)"
52180-59 = "[ns] \"......Quem diria que Azami era um dos membros do Clube das Flores, Pássaros, Vento e Lua.\""
52180-60 = "Sim. Aquela presidente gentil...... é um choque."
52180-61 = "Foi tudo uma peça para nos enganar desde o início. #n Só de lembrar daquele sorriso, sinto calafrios."
52180-62 = "Então isso significa que os moradores e o Distrito Autônomo da Filial Ebisu também eram falsos......?"
52180-63 = "Não, acho que eles não têm nada a ver com isso."
52180-64 = "Não importa o quão poderosa a Hyakumonogatari seja, acho que eles não conseguiriam criar os ingredientes usados no festival."
52180-65 = "Além disso, algumas pessoas reagiram como se fosse a primeira vez que viam Azami Habu."
52180-66 = "[s] \"Então...... a Ayame também era falsa?\""
52180-67 = "Sobre isso......"
52180-68 = "Ficamos curiosas e perguntamos para a Nagusa-senpai, que esteve com a Ayame-senpai até o final......"
52180-69 = "Mas quanto ao que aconteceu...... #n a Nagusa-senpai tem ficado muito deprimida."
52180-74 = "[ns7] \"......Você está bem?\"\n[ns8] \"Está se sentindo mal?\""
52180-77 = "......Estou bem."
52180-78 = "Desculpe...... como sou imatura, coloquei todos em perigo."
52180-79 = "A senpai não tem culpa de nada! A culpa é toda do Clube das Flores, Pássaros, Vento e Lua!"
52180-80 = "Exatamente, a Nagusa-senpai fez o seu melhor por todos nós!"
52180-81 = "Não adianta se culpar agora."
52180-82 = "Quem causou essa situação não foi você, foi a Ayame-senpai, não foi?"
52180-83 = "......Não, não é culpa da Ayame. #n Ela não estava errada."
52180-84 = "Hã?"
52180-85 = "No fim, tudo aconteceu porque eu não conseguia entender a Ayame――"
52180-86 = "Exatamente. É culpa sua, por ter se deixado levar por um sonho conveniente. #n Né, Nagusa-chan?"
52180-92 = "Shuro Yabuki......!"
52180-93 = "Aha, ahahaha!"
52180-94 = "O que foi, que figura patética."
52180-95 = "Para onde foi todo aquele entusiasmo de antes?"
52180-96 = "Não me diga que...... você não percebeu que a Ayame, tão gentil, era uma impostora? #n Você confundiu sua melhor amiga, com quem você tanto sonhou?"
52180-100 = "......Cheio de mentiras."
52180-101 = "Você só estava escondendo a realidade que não lhe convinha, não é?"
52180-102 = "Entendi...... então a Ayame-senpai que encontramos não era a verdadeira."
52180-103 = "Sim, é claro!"
52180-104 = "Uma melhor amiga que aparece heroicamente para salvar seus aliados em crise e tem um reencontro emocionante...... não seja tão simplista."
52180-105 = "Aquela Ayame...... não, 'Aquilo' era algo nascido do 'Inotei Mononokeroku', criado pelo seu próprio 'medo', Nagusa-chan!"
52180-106 = "M, mas aquela pessoa era tão alegre...... não parecia nada com medo."
52180-107 = "Como sempre, você não sabe de nada, né?"
52180-108 = "O medo, às vezes, aparece na forma de 'felicidade'."
52180-109 = "Uma felicidade como um sonho, que você negou em seu coração por tanto tempo. #n Não há nada mais assustador do que aquilo se tornar real, certo?"
52180-113 = "Quanto mais você aproveita essa felicidade falsa...... mais cruel a realidade se torna."
52180-114 = "Ugh......"
52180-115 = "P, por, isso você nunca será capaz de substituir a Ayame, Nagusa-chan."
52180-116 = "O que você sabe sobre a Nagusa-senpai!?"
52180-117 = "Aha! É inútil ficar brava!"
52180-118 = "Não importa o quanto você chore ou fique com raiva, a realidade não vai mudar."
52180-119 = "Não importa o quanto vocês se esforcem, nunca chegarão aos pés daquela Ayame."
52180-120 = "De qualquer forma, vocês são consumíveis que serão descartados um dia, não conseguem fazer nada!"
52180-121 = "[s] \"Shuro, quero te perguntar uma coisa.\""
52180-122 = "O que é?"
52180-123 = "Já estou farto de ouvir suas desculpas."
52180-124 = "Os latidos de um cão derrotado não me afetam, sabia?"
52180-125 = "[s9] \"Desde o início, você já sabia de tudo, não é?\"\n[s10] \"Aquele dia em que você foi atingida pela Ayame também foi uma atuação?\""
52180-131 = "......Hã?"
52180-132 = "Você queria perguntar algo tão sem graça assim? Isso acabou com o meu ânimo."
52180-133 = "É óbvio, não é? Tudo, tudinho, foi uma peça para capturar vocês."
52180-134 = "Ser capturada por aquilo e atrair vocês até a Mansão Higantei......"
52180-138 = "......Eh?"
52180-139 = "......Sensei da Schale?"
52180-142 = "Usar você como escudo e tudo mais, tudo foi――"
52180-143 = "......foi uma atuação pela Kokuriko-sama!"
52180-146 = "[ns11] \"Não é algo para se dizer sendo capturada......\"\n[ns12] \"E, talvez você já esteja farta de ouvir isso, mas......\""
52180-149 = "[ns13] \"......Não há nada de errado em interpretar algo além de si mesma.\"\n[ns14] \"Todos fazem isso, afinal.\""
52180-152 = "[ns] \"Mas é justamente por isso...... não desvie o olhar das suas próprias ações.\""
52180-154 = "[ns] \"Shuro, você fez o que precisava ser feito, certo?\""
52180-155 = "H, haha...... não sei o que dizer."
52180-156 = "Está tentando me atrair com palavras bonitas?"
52180-157 = "Só porque você me salvou, acha que vou trair a Kokuriko-sama?"
52180-158 = "Sério, vocês são tão ingênuos......"
52180-159 = "Ideias infantis, ridículas, como uma brincadeira de casinha......"
52180-160 = "Tudo não passa de delírios inúteis, iguais aos de Kuzunoha que vocês acreditam!"
52180-164 = "......Kuzunoha."
52180-165 = "......Por que você me salvou naquela época?"
52180-166 = "Por que, em vez de me deixar para trás...... não me salvou de mim mesma......"
52180-167 = "Hã? O que você está dizendo?"
52180-168 = "Como se você realmente tivesse encontrado a Kuzunoha......"
52180-169 = "[s15] \"Kuzunoha não é apenas um conto de fadas.\"\n[s16] \"Eu também recebi uma carta de Kuzunoha da Nagusa antes.\""
52180-172 = "Kuzunoha...... existe?"
52180-173 = "A pessoa que iniciou todos os livros misteriosos, a primeira presidente da Hyakkaryouran―― a Grande Profeta Kuzunoha?"
52180-174 = "Que conversa fiada...... você está brincando comigo? #n Se for assim――!"
52180-181 = "Não, mas......"
52180-182 = "A Kokuriko-sama disse que na época a Nagusa estava no meio do Grande Campo de Neve...... e ainda assim, ela voltou viva."
52180-183 = "Quem salvaria a Nagusa em um campo de neve onde nem os animais se aproximam......?"
52180-184 = "Além disso, o Sensei da Schale...... ele pode até ser evasivo, mas não mente......"
52180-185 = "Se a Grande Profeta Kuzunoha realmente estiver...... no Templo do Crepúsculo......"
52180-186 = "É possível criar um livro misterioso para substituir o 'Inotei Mononokeroku' perdido......? #n Então...... a Kokuriko-sama também confiaria mais em mim......"
52180-192 = "......Que pena, Nagusa-chan. #n Deve se sentir como se estivesse sentada em uma cama de pregos, não é?"
52180-193 = "Ah, coitada da Nagusa-chan. #n Sinto uma simpatia profunda por você."
52180-194 = "Para uma Nagusa-chan como você...... que tal se eu te desse uma chance?"
52180-195 = "......Uma chance?"
52180-196 = "Você tem alguém que quer salvar a qualquer custo, não tem?"
52180-201 = "Então, é só encontrá-la de novo...... a Kuzunoha."
52180-203 = "Próximo Episódio; Memórias do Outro Lado"
