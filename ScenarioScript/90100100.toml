[translation]
90100100-1 = "Episódio 10: Rumo à Escuridão"
90100100-4 = "[ns1] \"Sufocante... Que calor...\"\n[ns2] \"E escuro...\""
90100100-8 = "Peço perdão por atirar o senhor nesse caldeirão logístico."
90100100-9 = "As táticas desta caçada exigem confinamento de blecaute e controle cego da luminosidade... A lâmpada morre aqui."
90100100-10 = "Se o orçamento fornecesse Visores de Visão Noturna excedentes, a sua farda ganharia um... Mas as prateleiras de sobressalentes bateram no vazio."
90100100-11 = "[s3] \"Fica em paz, eu sobrevivo... As córneas estão engolindo a penumbra devagar...\"\n[s4] \"Mas a pauta é... aonde essas paredes e canos vão dar?\""
90100100-14 = "Essas veias de cimento desembocam nos exaustores do Complexo de Ar Condicionado Metropolitano da Estação Shirounagi."
90100100-15 = "A sangria térmica dos sistemas de purificação subterrâneos entope a área, por isso essa fogueira sufocante e a fumaça de sauna. Porém... forjar esse purgatório abafado e quente é a receita química ideal pra atrair o parasita [ruby=Kunekune]Alvo[/ruby] pra forca.#nRezo para que seus ossos aturem a fornalha."
90100100-16 = "[s] \"Eu dou conta do recado, fica fria. O trabalho sujo e pesado bate nas costas de vocês...\""
90100100-20 = "[ns5] \"Pausa o rádio um segundo... a aberração do Kunekune brota nessas catacumbas molhadas também?\"\n[ns6] \"As teses não cravavam e exigiam que a maldição só sugava vítimas em vias descampadas abertas e banhadas por sol cego?\""
90100100-23 = "As velhas teses e HDs mortos sustentavam esse viés cego, sim."
90100100-24 = "Todavia, o pente fino nas fichas balísticas e periciais chancelaram outro dogma: a matriz fotossintética e a radiação do sol são meros adornos figurantes na materialização."
90100100-25 = "Na caçada letárgica pretérita, as córneas da FOX4 devoraram a aberração e o cérebro dela derreteu na fumaça no asfalto quente...#nMas a FOX3 que só varria o asfalto cego sem mirar no mormaço, blindou a mente e saiu verde e limpa de loucura."
90100100-26 = "Se as correntes folclóricas dessa praga se desdobram da mitologia de contos europeus sobre fadas de calor mortíferas como 'A Bruxa do Meio-Dia' e lendas contra mortes de insolação...#nO catalisador não é a luz. É a fumaça e exaustão térmica atômica. Desde que as poças de suor fritem e o vapor d'água das Miragens distorça as retinas cegas, a assombração vai parasitar seja nas calçadas com sol escaldante em cima, ou nas fornalhas isoladas podres do esgoto lá embaixo."
90100100-27 = "Com o bônus paramilitar cego de que as paredes dos túneis bloqueiam a chance da bala comer refém e os civis mergulharem em fogo cruzado."
90100100-28 = "[s] \"……Faz todo o sentido atômico da guerra e tática segura pro povo, não posso negar...\""
90100100-32 = "[ns7] \"Talvez o radar da minha mente crie paranóia...\"\n[ns8] \"Mas... Você está construindo trincheiras e forçando muralhas puramente pra isolar os civis de estarem sequer perto da gente nas ruas?\""
90100100-35 = "……As teses da minha farda se limitam."
90100100-36 = "Se a pauta clama e assina na carne a probabilidade de civis sangrarem na poça por incompetência tática...#nVarrer o tabuleiro, isolar e chancelar a proteção dos inocentes mortais é o pilar atômico mais natural a ser forjado no manual de Liderança da força SRT."
90100100-40 = "« As calçadas da guerra abraçam e cospem as perdas baixas orgânicas, Yukino. É natural. »"
90100100-44 = "Minhas divisas clamam que somos esquadrões SRT―― Os Cães Paramilitares blindados encarregados unicamente de esmagar abismos de morte e proteger as calçadas cívicas dos moradores de Kivotos."
90100100-45 = "Tiroteio que joga os crânios civis pro caixão na calçada não possui dogma nem glória."
90100100-49 = "« Se travar o chumbo na guarnição fantasma agora, o sangue futuro deles sujará as rodovias inteiras!! »"
90100100-50 = "« O sangue derramado no omisso... A sua divisa carcerária engole a culpa depois?! »"
90100100-54 = "Nos túmulos pretéritos as nossas patentes engatilharam dor fúnebre massiva cega para calçadas puras. Engolir o rastro e regurgitar a desgraça idêntica apaga os ossos das fileiras."
90100100-58 = "« Fraqueza suja... A carcaça sequer sustenta espinha pra bancar as ordens ou aturar os funerais que forja. »"
90100100-60 = "« Sejais ditada pela justiça falsa heroica de salvação da multidão... Ou pela guerra vil que rasga as veias. Não tem fuga! »"
90100100-64 = "[ns] （……O vento sussurra assovios e correntes sonoras na minha nuca... As assombrações das paredes começaram a brincar...?）"
90100100-66 = "[ns9] \"……Limpo e Carimbado.\"\n[ns10] \"Abafe a tese fantasma por enquanto e grave: a carne e o suor de vocês intactos lidera o placar das pautas pra voltar pra casa amanhã. Sem mártires, recuar pro QG se a morte roçar perto.\""
90100100-69 = "Os avisos engolem e banham a minha doutrina."
90100100-73 = "Alerta logístico no canal cruzado, FOX2 marcando Ponto Charlie."
90100100-74 = "Os medidores fervem no asfalto com calor cego de 34 graus Celsius... O breu embaça a visão nítida, porém as termográficas pintam vapores e miragens atômicas distorcendo em cima dos escapamentos das fornalhas de exaustão de ar."
90100100-75 = "O canal escutou. Esquadrão, recuem os visores carnais. Córneas expostas desprotegidas contra os vapores do mormaço dão guilhotina na missão, tranquem as pálpebras até afivelarem o aparato de proteção."
90100100-76 = "[s] \"As trincheiras rogaram sobre 'ferramentas táticas' ontem à noite... Qual é o brinde?\""
90100100-80 = "Cravado... Os maravilhosos Óculos Visores de Visão Noturna!"
90100100-81 = "A cartilha letal de como o maldito Kunekune envenena cérebros esconde a biologia final... mas se as presas e unhas do bicho operam invadindo a luz crua nas redes de óptica orgânicas da cara, o cimento paramilitar protege.#nA premissa espelha os aparatos de deflexão e os micro-shutters que acoplo contra chamas e flashes nos meus Escudos Táticos de combate de choque pesado."
90100100-85 = "Cegar a lente no flashbang atira todo mundo pro saco igual, não atira?"
90100100-86 = "Contudo a patente garante sobrevida, nós não capotamos fuziladas com a íris ardendo nem comemos asfalto de primeira."
90100100-87 = "As malhas dos Visores NVGs paramilitares cimentam as barreiras com sensores eletrônicos digitais cegos. A óptica converte luz bruta externa no túnel e mastiga as ondas luminosas em puros laudos de sinal de pixel verde emulados pra tela de dentro.#nSe a lente processar fótons nocivos cegantes e radiação perigosa do monstro estilhaçando a tela... A placa mãe corta a energia e o vidro morre de vez pra salvar o HD cerebral natural e humano atrás do capacete."
90100100-88 = "As rezas e credos imploram pra física tática segurar as bruxarias atômicas fantasmagóricas nojentas dessa coisa...#nO vidro sintético e cabos elétricos isolarem magia suja não exalam 100% de garantia de blindar encantos infernais hipnóticos..."
90100100-89 = "Se as botas das tropas recuarem engasgadas na teoria do medo do escuro... outras corporações ou civis engolirão o asfalto sangrando amanhã da mesma forma para desmentir ou confirmar o óbito na prática."
90100100-90 = "Diante do vácuo, enfiar nosso chumbo primeiro rasga e mata o bicho ou enterra nós mesmas."
90100100-91 = "As escusas de sacrifício mártir covarde de laboratório da espiã atestam que as cartilhas paramilitares de codinome nos punem... nós deveríamos trocar os rótulos bélicos de FOX 'Raposas' pra cobaias suicidas inúteis de esgoto e minas de carvão 'Canários' e morrer na frente."
90100100-92 = "Qual foi o estalo na espinha?! As pernas da FOX4 travaram de suor frio com as assombrações invisíveis e o tiroteio não apitou na viela?"
90100100-93 = "A adrenalina lateja e sangra nas veias, a carnificina cega é deliciosa! Atire permissão letal no rádio, fuzilo agora e arrasto o bicho pro Além!!"
90100100-99 = "Rádio limpo. O destacamento engatilha pólvora tática para Invasão de Fogo e Choque Frontal e varrer tudo agora."
90100100-100 = "FOX4, puxe coordenadas, limpe latitude e jogue marcação térmica de alvo pra bala de Sniper furar limpo."
90100100-101 = "Carimbado, bala no tambor e visores fechados!"
90100100-108 = "Fornalha térmica de azimute 0-8-5 mapeada. O núcleo estala fogo fúnebre do lado de lá do alvo tático Romeo."
90100100-112 = "O vapor letal corrompido e a miragem mística cozinham os canos de exaustão fedendo enxofre no tubo ali. Coordenadas apontam na viela――"
90100100-113 = "O radar surtou e corrompeu? A lupa quebra as dimensões... O espelho do além reflete alvos mortos rasgando profundidade falsa pros confins do mundo de forma que o túnel não atesta espaço atômico para conter..."
90100100-119 = "Bússola morta confirmada."
90100100-123 = "……FOX3, destrave miras prontas e espere letal."
90100100-126 = "As paredes apodrecem na lente verde digital... Capim... Florestas e céu estrelado de prados abertos fúnebres brotam da refração da sauna de exaustor de metal do esgoto cego. E contorcendo morto nas moitas da bruma invisível daquela janela fúnebre--"
90100100-135 = "Avistamento do 'Espantalho Alvo'. A fumaça fúnebre rebola nos canos cegos de vapor!"
90100100-137 = "FOX4!!! O crânio tá verde?! O canal opera?! Você lembra dos meus ossos e RG na carteira militar e crachá?!"
90100100-138 = "Os tímpanos romperam na histeria demente ruidosa sônica dessa cadela de sargento...! Abalar frequências de decibéis gritando como morcega demente e histeria de porco no rádio cego não arranca o meu crachá tático militar de memória!"
90100100-139 = "Se a sanidade tá intocada e atômica, mastigue as respostas no protocolo certo, cadete!"
90100100-140 = "As escusas de paz caíram! A bússola bate na loucura estressada FOX1, o esquadrão já colapsou! As correntes amaldiçoadas atiraram a missão na vala das perdas!!"
90100100-142 = "O rádio discorda e limpa os arquivos. Segurar sanidade mental com as amarras digitais do visor pra não estilhaçar a mente morta, e carimbar a latitude balística letal exata do demônio... é a primeira glória que rompeu os muros de sangue da história paramilitar hoje."
90100100-143 = "Cortem contatos soltos! Esquadrão em linha bélica absoluta! Travem cabos Visores NVGs na cara agora e afivelem o plástico. Canais cruzados pro formato Infrared e liguem termográficas vermelhas para travar ponto central e alvo de fogo direto da artilharia nos olhos do inferno místico morto ali."
90100100-154 = "Fuso local cravado, hora morta do relógio zero. Deste minuto sombrio bélico em diante... As [ruby=FOX]Raposas Táticas Paramilitares de Kivotos[/ruby] estilhaçam a escuridão cega na baioneta letal e pólvora de canhão quente."