[translation]#[Texto Final. - Filipe 05/07.]
90100100-1 = "Episódio 10: Rumo à Escuridão"
90100100-4 = "[ns1] \"Que calor……\"\n[ns2] \"Que escuro……\""
90100100-8 = "Perdão pelo transtorno."
90100100-9 = "Esta operação exige manter o blecaute\ntático, então a iluminação está restrita."
90100100-10 = "Se sobrasse um equipamento de visão noturna,\neu emprestaria; mas não temos\nnem de reserva……"
90100100-11 = "[s3] \"Tudo bem. Dá pra enxergar um pouquinho.\"\n[s4] \"E então…… onde estamos?\""
90100100-14 = "Numa galeria subterrânea ligada à sala de\nclimatização da estação Shirounagi."
90100100-15 = "O calor das instalações subterrâneas escapa\npor aqui, então é abafado; mas é o lugar\nperfeito pra atrair o Kunekune.#nPedimos sua compreensão."
90100100-16 = "[s] \"Tudo bem. Difícil tá sendo pra vocês.\""
90100100-20 = "[ns5] \"Mas o Kunekune aparece num lugar desses?\"\n[ns6] \"Ele não era visto só em dia de céu limpo?\""
90100100-23 = "Era o que pensávamos até agora."
90100100-24 = "Mas, reexaminando os registros do caso,\nsurgiu a possibilidade de o clima não ser\num fator tão decisivo."
90100100-25 = "Na última operação, a FOX4 percebeu o\nKunekune e foi afetada;#nmas a FOX3, que não olhou a miragem,\nsaiu ilesa."
90100100-26 = "Se a lenda que originou o Kunekune vem do\ndemônio do meio-dia, um alerta contra\na insolação……#nentão, num ambiente abafado onde a miragem\nsobe, dá pra percebê-lo até no subsolo."
90100100-27 = "E, acima de tudo, aqui nenhum cidadão\nacaba arrastado pra operação."
90100100-28 = "[s] \"Isso é ótimo, de verdade, mas……\""
90100100-32 = "[ns7] \"Pode ser impressão minha, tá?\"\n[ns8] \"Mas vocês não estão evitando contato com os cidadãos de propósito?\""
90100100-35 = "……Quem sabe."
90100100-36 = "Se a questão é expor cidadãos ao perigo,#nevitar isso ao máximo é o mínimo\npara alguém da SRT."
90100100-40 = "Toda operação carrega danos colaterais."
90100100-44 = "Nós somos a SRT―― a força especial\nresponsável pela segurança dos\ncidadãos de Kivotos."
90100100-45 = "Uma operação que não garante a segurança\ndos cidadãos não tem sentido."
90100100-49 = "Se deixarmos essa coisa fugir agora,\no estrago depois será maior!"
90100100-50 = "Essa decisão…… você assume\na responsabilidade?"
90100100-54 = "Um dia, causamos grandes transtornos aos\ncidadãos. Não vamos tropeçar\nna mesma pedra."
90100100-58 = "Toda metida, sem nem ter coragem\nde arcar com as consequências."
90100100-60 = "Não importa a causa nobre que exista――"
90100100-64 = "[ns] (Por algum motivo, ouvi alucinações estranhas se sobrepondo……)"
90100100-66 = "[ns9] \"……Está bem.\"\n[ns10] \"Mas, aconteça o que acontecer, a segurança de vocês vem primeiro.\""
90100100-69 = "Vou gravar isso."
90100100-73 = "Aqui é FOX2. Cheguei ao ponto Charlie."
90100100-74 = "Temperatura atual de 34°C…… tá escuro e\ndifícil de ver, mas deve ter miragem\nsubindo da tubulação do ar."
90100100-75 = "Confirmado. Ninguém olha a miragem a olho\nnu até vestir o equipamento."
90100100-76 = "[s] \"O equipamento que falaram ontem seria……\""
90100100-80 = "Isso: óculos de visão noturna!"
90100100-81 = "Não sabemos como o Kunekune confunde a\nmente; mas, se ele interfere no nervo\nóptico,#nachei que o princípio deve ser parecido\ncom o do meu escudo antiflash."
90100100-85 = "Levar uma granada de luz na cara\nderruba igual, né?"
90100100-86 = "Mas, no mínimo, protege os olhos."
90100100-87 = "Os óculos de visão noturna projetam uma\nimagem reconstruída em sinais eletrônicos\npor um sensor de luz.#nSe entrar luz num nível nocivo pros olhos,\neles bloqueiam sozinhos."
90100100-88 = "Tomara que funcione mesmo……#nNão há garantia de que o Kunekune não\nnos confunda mesmo através deles……"
90100100-89 = "Mas, se a gente não testar,\noutra pessoa vai ter que testar."
90100100-90 = "Então melhor testar logo."
90100100-91 = "Sabendo disso, deviam ter chamado o\nesquadrão de Canário, não de Raposa."
90100100-92 = "Como é? Amarelou, FOX4? A gente\nnem testou ainda."
90100100-93 = "É alegria……! Vem, me dá a ordem, agora!"
90100100-99 = "Bem, vamos preparar a entrada."
90100100-100 = "FOX4, confirme as coordenadas do alvo."
90100100-101 = "OK, deixa comigo!"
90100100-108 = "Fonte de calor confirmada no azimute 0-8-5\na partir do ponto Romeo."
90100100-112 = "Miragem confirmada sobre a tubulação\nde climatização. Coordenadas――"
90100100-113 = "Ué? A escala de distância tá errada.\nO foco da imagem tá bem mais longe\nque a distância aparente."
90100100-119 = "Como eu suspeitava……"
90100100-123 = "……FOX3, aguarde."
90100100-126 = "Estou vendo um campo aberto que não deveria\nexistir nesta sala. E, atrás dele, algo\nbalançando de forma irregular――"
90100100-135 = "Aparição do \"espantalho branco\" confirmada."
90100100-137 = "FOX4! Tá me ouvindo?! Sabe quem eu sou?!"
90100100-138 = "Uau, que susto. Não precisa gritar,\neu sei quem você é."
90100100-139 = "Então responde direito, criatura!"
90100100-140 = "FOX1, essa daí pirou de vez!\nA operação falhou!"
90100100-142 = "Se ela confirmou a posição do alvo sem\nperder a consciência, está de bom tamanho."
90100100-143 = "Todas: visão noturna. Mudem para o modo IR\ne confirmem o foco."
90100100-154 = "A partir deste momento, as raposas\ndominam a escuridão."
