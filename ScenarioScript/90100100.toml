[translation]#[Texto Final. - Filipe 13/07.]
90100100-1 = "Episódio 10; Rumo à Escuridão"
90100100-4 = "[ns1] \"Que calor……\"\n[ns2] \"Que escuro……\""
90100100-8 = "Perdão pelo transtorno."
90100100-9 = "Esta operação exige manter o blecaute tático, então a iluminação está restrita."
90100100-10 = "Se sobrasse um equipamento de visão noturna, eu emprestaria; mas não temos nem de reserva……"
90100100-11 = "[s3] \"Tudo bem. Dá pra enxergar um pouquinho.\"\n[s4] \"E então…… onde estamos?\""
90100100-14 = "Numa galeria subterrânea ligada à sala de climatização da estação Shirounagi."
90100100-15 = "O calor das instalações subterrâneas escapa por aqui, então é abafado; mas é o lugar perfeito pra atrair o Kunekune.#nPedimos sua compreensão."
90100100-16 = "[s] \"Tudo bem. Difícil tá sendo pra vocês.\""
90100100-20 = "[ns5] \"Mas o Kunekune aparece num lugar desses?\"\n[ns6] \"Ele não era visto só em dia de céu limpo?\""
90100100-23 = "Era o que pensávamos até agora."
90100100-24 = "Mas, reexaminando os registros do caso, surgiu a possibilidade de o clima não ser um fator tão decisivo."
90100100-25 = "Na última operação, a FOX4 percebeu o Kunekune e foi afetada;#nmas a FOX3, que não olhou a miragem, saiu ilesa."
90100100-26 = "Se a lenda que originou o Kunekune vem do demônio do meio-dia, um alerta contra a insolação……#nentão, num ambiente abafado onde a miragem sobe, dá pra percebê-lo até no subsolo."
90100100-27 = "E, acima de tudo, aqui nenhum cidadão acaba arrastado pra operação."
90100100-28 = "[s] \"Isso é ótimo, de verdade, mas……\""
90100100-32 = "[ns7] \"Pode ser impressão minha, tá?\"\n[ns8] \"Mas vocês não estão evitando contato com os cidadãos de propósito?\""
90100100-35 = "……Quem sabe."
90100100-36 = "Se a questão é expor cidadãos ao perigo,#nevitar isso ao máximo é o mínimo para alguém da SRT."
90100100-40 = "Toda operação carrega danos colaterais."
90100100-44 = "Nós somos a SRT―― a força especial responsável pela segurança dos cidadãos de Kivotos."
90100100-45 = "Uma operação que não garante a segurança dos cidadãos não tem sentido."
90100100-49 = "Se deixarmos essa coisa fugir agora, o estrago depois será maior!"
90100100-50 = "Essa decisão…… você assume a responsabilidade?"
90100100-54 = "Um dia, causamos grandes transtornos aos cidadãos. Não vamos tropeçar na mesma pedra."
90100100-58 = "Toda metida, sem nem ter coragem de arcar com as consequências."
90100100-60 = "Não importa a causa nobre que exista――"
90100100-64 = "[ns] (Por algum motivo, ouvi alucinações estranhas se sobrepondo……)"
90100100-66 = "[ns9] \"……Está bem.\"\n[ns10] \"Mas, aconteça o que acontecer, a segurança de vocês vem primeiro.\""
90100100-69 = "Vou gravar isso."
90100100-73 = "Aqui é FOX2. Cheguei ao ponto Charlie."
90100100-74 = "Temperatura atual de 34°C…… tá escuro e difícil de ver, mas deve ter miragem subindo da tubulação do ar."
90100100-75 = "Confirmado. Ninguém olha a miragem a olho nu até vestir o equipamento."
90100100-76 = "[s] \"O equipamento que falaram ontem seria……\""
90100100-80 = "Isso: óculos de visão noturna!"
90100100-81 = "Não sabemos como o Kunekune confunde a mente; mas, se ele interfere no nervo óptico,#nachei que o princípio deve ser parecido com o do meu escudo antiflash."
90100100-85 = "Levar uma granada de luz na cara derruba igual, né?"
90100100-86 = "Mas, no mínimo, protege os olhos."
90100100-87 = "Os óculos de visão noturna projetam uma imagem reconstruída em sinais eletrônicos por um sensor de luz.#nSe entrar luz num nível nocivo pros olhos, eles bloqueiam sozinhos."
90100100-88 = "Tomara que funcione mesmo……#nNão há garantia de que o Kunekune não nos confunda mesmo através deles……"
90100100-89 = "Mas, se a gente não testar, outra pessoa vai ter que testar."
90100100-90 = "Então melhor testar logo."
90100100-91 = "Sabendo disso, deviam ter chamado o esquadrão de Canário, não de Raposa."
90100100-92 = "Como é? Amarelou, FOX4? A gente nem testou ainda."
90100100-93 = "É alegria……! Vem, me dá a ordem, agora!"
90100100-99 = "Bem, vamos preparar a entrada."
90100100-100 = "FOX4, confirme as coordenadas do alvo."
90100100-101 = "OK, deixa comigo!"
90100100-108 = "Fonte de calor confirmada no azimute 0-8-5 a partir do ponto Romeo."
90100100-112 = "Miragem confirmada sobre a tubulação de climatização. Coordenadas――"
90100100-113 = "Ué? A escala de distância tá errada. O foco da imagem tá bem mais longe que a distância aparente."
90100100-119 = "Como eu suspeitava……"
90100100-123 = "……FOX3, aguarde."
90100100-126 = "Estou vendo um campo aberto que não deveria existir nesta sala. E, atrás dele, algo balançando de forma irregular――"
90100100-135 = "Aparição do \"espantalho branco\" confirmada."
90100100-137 = "FOX4! Tá me ouvindo?! Sabe quem eu sou?!"
90100100-138 = "Uau, que susto. Não precisa gritar, eu sei quem você é."
90100100-139 = "Então responde direito, criatura!"
90100100-140 = "FOX1, essa daí pirou de vez! A operação falhou!"
90100100-142 = "Se ela confirmou a posição do alvo sem perder a consciência, está de bom tamanho."
90100100-143 = "Todas: visão noturna. Mudem para o modo IR e confirmem o foco."
90100100-154 = "A partir deste momento, as raposas dominam a escuridão."