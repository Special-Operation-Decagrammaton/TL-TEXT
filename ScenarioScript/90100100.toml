[translation]#[Texto revisado.] Em aguardo de revisão de formatação de texto. - Filipe 13/06.
90100100-1 = "Episódio 10: Rumo à Escuridão"
90100100-4 = "[ns1] \"Que sufoco... calor...\"\n[ns2] \"E escuro...\""
90100100-8 = "Desculpe pelo desconforto."
90100100-9 = "Precisamos ficar no escuro para atrair o alvo."
90100100-10 = "Se tivéssemos óculos de visão noturna extras... mas não temos."
90100100-11 = "[s3] \"Tranquilo. Estou me acostumando.\"\n[s4] \"Afinal, onde fica esse lugar?\""
90100100-14 = "Isso dá para os dutos de ar da Estação Shirounagi."
90100100-15 = "O calor do subsolo sobe, criando uma sauna. É o ambiente ideal para atrair o [ruby=Kunekune]alvo[/ruby].#nEspero que o senhor aguente o calor."
90100100-16 = "[s] \"De boa. O trabalho pesado é com vocês.\""
90100100-20 = "[ns5] \"Espera aí... o Kunekune aparece em lugares úmidos também?\"\n[ns6] \"Não era só em lugares abertos e ensolarados?\""
90100100-23 = "As teorias antigas diziam isso."
90100100-24 = "Mas análises recentes mostraram que o sol não é tão importante."
90100100-25 = "No primeiro incidente, a FOX4 viu o Kunekune e enlouqueceu.#nMas a FOX3, que só olhou a miragem sem ver a criatura, passou bem."
90100100-26 = "Se essa lenda veio do \"Demônio do Meio-dia\" europeu...#nO gatilho não é a luz, é o calor e a miragem. Se tiver vapor d'água e miragem, o Kunekune pode aparecer em qualquer lugar, até no esgoto."
90100100-27 = "A vantagem aqui é que não há civis para serem baleados."
90100100-28 = "[s] \"Faz sentido... taticamente seguro. Não posso negar.\""
90100100-32 = "[ns7] \"Pode ser paranoia minha...\"\n[ns8] \"Mas... você escolheu esse lugar para evitar civis, não foi?\""
90100100-35 = "……Talvez."
90100100-36 = "O princípio da SRT é proteger os cidadãos.#nSe há risco de envolvê-los, devemos evitá-lo."
90100100-40 = "Guerra sempre traz baixas colaterais, Yukino."
90100100-44 = "Nós somos a SRT. Cães de guarda de Kivotos. Nosso dever é proteger."
90100100-45 = "Atirar e matar civis não é honra nenhuma."
90100100-49 = "Se deixarmos essa ameaça escapar, mais sangue será derramado!!"
90100100-50 = "Você vai assumir a responsabilidade?!"
90100100-54 = "No passado, causamos muitos danos aos civis. Não podemos repetir o erro."
90100100-58 = "Fraqueza... sem coragem para arcar com as consequências."
90100100-60 = "Seja por justiça ou por maldade, não tem escapatória!"
90100100-64 = "[ns] （O vento parece sussurrar... ou é impressão?）"
90100100-66 = "[ns9] \"……Fechado.\"\n[ns10] \"Mas o mais importante é a segurança de vocês. Se a ameaça for real, recuem.\""
90100100-69 = "Entendido."
90100100-73 = "Alerta, FOX2 no Ponto Charlie."
90100100-74 = "Termômetros a 34°C. No escuro, a miragem está se formando sobre os dutos."
90100100-75 = "Todos, não olhem as miragens sem proteção."
90100100-76 = "[s] \"Essa tal 'ferramenta tática' que vocês mencionaram ontem... qual é?\""
90100100-80 = "Os óculos de visão noturna!"
90100100-81 = "Não sabemos exatamente como o Kunekune enlouquece as pessoas. Mas se ele afeta a visão, os NVGs podem proteger.#nO princípio é o mesmo do meu escudo anti-flash."
90100100-85 = "Um flashbang também cega a gente, não?"
90100100-86 = "Sim, mas ainda assim aguentamos mais."
90100100-87 = "Os NVGs convertem a luz externa em sinal eletrônico. Se a luz for perigosa, a tela desliga automaticamente.#nIsso pode proteger nosso cérebro do ataque."
90100100-88 = "Nem 100% de garantia... mas é melhor que nada."
90100100-89 = "Se a gente não arriscar, alguém terá que arriscar depois."
90100100-90 = "É melhor nós do que outros."
90100100-91 = "Devíamos ter nos batizado de \"Canários\" em vez de \"Raposas\"."
90100100-92 = "Por quê? FOX4 está com medo?"
90100100-93 = "É de nervoso! Vamos logo!"
90100100-99 = "Preparar para invasão."
90100100-100 = "FOX4, confirme as coordenadas do alvo."
90100100-101 = "OK, já tenho."
90100100-108 = "Miragem confirmada no azimute 0-8-5."
90100100-112 = "Vapor detectado nos dutos. Coordenadas――"
90100100-113 = "O quê? A distância está distorcida. A miragem está além do espaço físico."
90100100-119 = "Bússola morta, confirmado."
90100100-123 = "……FOX3, preparem-se."
90100100-126 = "Na visão digital... há grama... um campo estrelado... e se retorcendo no meio――"
90100100-135 = "Avistamento do \"Espantalho Alvo\"!"
90100100-137 = "FOX4!!! Você está bem?! Sabe quem sou?!"
90100100-138 = "Nossa, que gritaria. É claro que sei quem é."
90100100-139 = "Então responda direito!"
90100100-140 = "FOX1, ela já pirou! A missão fracassou!"
90100100-142 = "Ela não pirou. Pelo contrário, deu a localização exata do alvo sem desmaiar. É um avanço."
90100100-143 = "Todos, óculos de visão noturna. Liguem o infravermelho. Foco no alvo."
90100100-154 = "A partir deste momento, as Raposas Táticas dominam a escuridã."