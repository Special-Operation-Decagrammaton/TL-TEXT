[translation]
90100100-1 = "Episode 10;Into the Darkness"
90100100-4 = "[ns1] \"It's hot...\"\n[ns2] \"It's dark...\""
90100100-8 = "I apologize for the inconvenience."
90100100-9 = "We are currently under a blackout order for this operation, so lighting is restricted."
90100100-10 = "I would have lent you night-vision equipment if we had any to spare, but we don't even have backups..."
90100100-11 = "[s3] \"It's okay. I can see well enough.\"\n[s4] \"So... where are we?\""
90100100-14 = "This is an underground passage connected to the Shirounagi Station HVAC room."
90100100-15 = "It's sweltering because the heat from the underground facility vents here, but it's the perfect place to lure out the Kunekune. #nPlease understand."
90100100-16 = "[s] \"It's fine. You guys are the ones having a hard time, after all.\""
90100100-20 = "[ns5] \"Still, does the Kunekune really appear in a place like this?\"\n[ns6] \"I thought it was only observed on sunny days?\""
90100100-23 = "That is what we believed until now."
90100100-24 = "However, after scrutinizing the incident reports, the possibility has emerged that weather is not as critical a factor as we thought."
90100100-25 = "In the previous operation, FOX4 perceived the Kunekune and was affected, but FOX3, who did not see the heat haze, was unharmed."
90100100-26 = "If the urban legend that birthed the Kunekune originates from the 'Noon Devil'—a warning against heatstroke—then... #nIn a sweltering environment with heat haze, one should be able to perceive the Kunekune even underground."
90100100-27 = "Above all, in this location, no civilians will be caught in the crossfire."
90100100-28 = "[s] \"I suppose that's true, but...\""
90100100-32 = "[ns7] \"Maybe it's just my imagination, but...\"\n[ns8] \"Aren't you consciously avoiding contact with civilians?\""
90100100-35 = "...I wonder."
90100100-36 = "If you are talking about putting civilians in danger, #nit is only natural for us as SRT members to avoid that as much as possible."
90100100-40 = "Operations always come with collateral damage."
90100100-44 = "We are SRT—a special unit tasked with the safety of Kivotos citizens."
90100100-45 = "An operation that cannot guarantee the safety of civilians is meaningless."
90100100-49 = "If you let it get away now, it will cause even greater damage later!"
90100100-50 = "Can you take responsibility for that judgment?"
90100100-54 = "We once caused great trouble for the citizens. We cannot afford to repeat the same mistake."
90100100-58 = "You act so high and mighty, yet you aren't even prepared to take responsibility yourself."
90100100-60 = "No matter what justification you have—"
90100100-64 = "[ns] (For some reason, strange auditory hallucinations overlapped and echoed...)"
90100100-66 = "[ns9] \"...Understood.\"\n[ns10] \"But no matter what happens, everyone's safety is the top priority.\""
90100100-69 = "I will keep that in mind."
90100100-73 = "This is FOX2. Reached Point Charlie."
90100100-74 = "Current temperature is 34 degrees Celsius... It's dark and hard to see, but there should be heat haze above the HVAC pipes."
90100100-75 = "Confirmed. Everyone, be careful not to look at the heat haze with the naked eye until you have your equipment on."
90100100-76 = "[s] \"Is the equipment you mentioned yesterday...\""
90100100-80 = "That's right, night-vision goggles!"
90100100-81 = "I don't know how the Kunekune confuses people, but if it's interfering with the optic nerves, #nI thought the principle might be similar to my flash shield."
90100100-85 = "It's the same as being blinded by a flashbang, right?"
90100100-86 = "But at the very least, we can prevent our eyes from being damaged."
90100100-87 = "Night-vision goggles use sensors that react to light and project an image reconstructed into electronic signals. #nSo, if a harmful level of light enters, it automatically shuts off."
90100100-88 = "I hope this is really enough... #nThere's no guarantee we won't be confused by the Kunekune even through the goggles..."
90100100-89 = "But if we don't do it, someone else will have to try."
90100100-90 = "In that case, it's better to try it now."
90100100-91 = "If it's going to be like this, I should have named our squad Canary instead of Fox."
90100100-92 = "What's that supposed to mean? FOX4, are you scared? We haven't even tried it yet."
90100100-93 = "I'm excited...! Come on, give us the order, right now!"
90100100-99 = "Then, let's prepare for the breach as well."
90100100-100 = "FOX4, please confirm the target's coordinates."
90100100-101 = "OK, leave it to me!"
90100100-108 = "Heat source confirmed at bearing 0-8-5 from Point Romeo."
90100100-112 = "Heat haze confirmed occurring on the HVAC pipes. Coordinates are—"
90100100-113 = "Huh? The distance magnification is weird. The position where it's forming an image is much further away than the distance I'm seeing."
90100100-119 = "I knew it..."
90100100-123 = "...FOX3, stand by."
90100100-126 = "I can see a meadow that shouldn't be in this HVAC room. And beyond that, it's swaying irregularly—"
90100100-135 = "Confirmed appearance of the 'White Scarecrow'."
90100100-137 = "FOX4! Can you hear me!? Do you know who I am!?"
90100100-138 = "Whoa, you startled me. You don't have to shout like that, I know who you are."
90100100-139 = "Then answer me properly!"
90100100-140 = "FOX1, this girl is definitely not in her right mind! The operation is a failure!"
90100100-142 = "If you were able to confirm the target's location without losing consciousness, that's a job well done."
90100100-143 = "Everyone, equip your night-vision gear. Switch to IR mode and check your focus."
90100100-154 = "As of this moment, the Foxes will dominate the darkness."