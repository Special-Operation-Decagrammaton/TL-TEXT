[translation]
90100100-1 = "Episódio 10; Rumo à Escuridão"
90100100-4 = "[ns1] \"Está quente...\"\n[ns2] \"Está escuro...\""
90100100-8 = "Peço desculpas pelo inconveniente."
90100100-9 = "Como precisamos manter o blecaute durante esta operação, a iluminação está limitada."
90100100-10 = "Eu teria emprestado equipamentos de visão noturna se tivéssemos excedentes, mas não temos nem reservas..."
90100100-11 = "[s3] \"Tudo bem. Eu ainda consigo enxergar um pouco.\"\n[s4] \"E então... onde estamos?\""
90100100-14 = "Esta é uma passagem subterrânea conectada à sala de ventilação da Estação Shirounagi."
90100100-15 = "É abafado porque o calor das instalações subterrâneas escapa por aqui, mas é o lugar ideal para atrair o 'Kunekune'.#nPor favor, entenda."
90100100-16 = "[s] \"Está tudo bem. O trabalho difícil é o de vocês, afinal.\""
90100100-20 = "[ns5] \"Mas, mesmo em um lugar desses, o 'Kunekune' aparece?\"\n[ns6] \"Não era algo que só podia ser observado em dias ensolarados?\""
90100100-23 = "Até agora, pensávamos que sim."
90100100-24 = "No entanto, após examinar minuciosamente os registros do incidente, surgiu a possibilidade de que o clima não seja um fator tão importante assim."
90100100-25 = "Na operação anterior, a FOX4 percebeu o 'Kunekune' e foi afetada, mas a FOX3, que não viu a miragem, ficou ilesa."
90100100-26 = "Se a lenda urbana que deu origem ao 'Kunekune' deriva de um aviso contra a insolação...#nentão, em um ambiente abafado onde a miragem se forma, deve ser possível perceber o 'Kunekune' mesmo no subsolo."
90100100-27 = "E o mais importante: neste local, não há risco de civis serem envolvidos na operação."
90100100-28 = "[s] \"Eu concordo que isso é bom, mas...\""
90100100-32 = "[ns7] \"Pode ser só impressão minha, mas...\"\n[ns8] \"Você não está evitando se envolver com civis de propósito?\""
90100100-35 = "…Quem sabe."
90100100-36 = "Se estamos falando sobre colocar civis em perigo,#né natural para alguém da SRT tentar evitar isso ao máximo."
90100100-40 = "Operações sempre trazem danos colaterais."
90100100-44 = "Nós somos a SRT — uma unidade especial encarregada da segurança dos cidadãos de Kivotos."
90100100-45 = "Uma operação que não pode garantir a segurança dos civis não tem sentido."
90100100-49 = "Se deixá-lo escapar agora, causará danos muito maiores depois!"
90100100-50 = "Essa decisão... você consegue assumir a responsabilidade?"
90100100-54 = "No passado, causamos grandes problemas aos cidadãos. Não podemos cometer o mesmo erro."
90100100-58 = "Você nem tem coragem de assumir a responsabilidade, mas fala como se fosse superior."
90100100-60 = "Não importa qual seja a justificativa —"
90100100-64 = "[ns] (Por algum motivo, ouvi uma estranha alucinação auditiva sobreposta...)"
90100100-66 = "[ns9] \"...Entendido.\"\n[ns10] \"Mas, aconteça o que acontecer, a segurança de todos é a prioridade.\""
90100100-69 = "Vou levar isso em consideração."
90100100-73 = "Aqui é FOX2. Chegamos ao Ponto Charlie."
90100100-74 = "A temperatura atual é de 34 graus Celsius... está escuro e difícil de ver, mas deve haver uma miragem sobre os dutos de ventilação."
90100100-75 = "Confirmado. Todos, tomem cuidado para não olhar diretamente para a miragem até estarem com o equipamento."
90100100-76 = "[s] \"Será que o equipamento que você mencionou ontem é...\""
90100100-80 = "Isso mesmo, óculos de visão noturna!"
90100100-81 = "Não sei como o 'Kunekune' nos confunde, mas se ele interfere no nervo óptico,#npensei que o princípio fosse parecido com o do meu escudo de flash."
90100100-85 = "Se formos atingidos por uma granada de luz, o resultado é o mesmo, não é?"
90100100-86 = "Mas, pelo menos, podemos evitar que nossos olhos sejam danificados."
90100100-87 = "Os óculos de visão noturna usam sensores que reagem à luz e reconstroem a imagem em sinais eletrônicos.#nPor isso, se entrar um nível de luz prejudicial aos olhos, eles bloqueiam automaticamente."
90100100-88 = "Espero que isso realmente funcione...#nNão há garantia de que não seremos confundidos pelo 'Kunekune' mesmo através dos óculos..."
90100100-89 = "Mas se nós não fizermos isso, outra pessoa terá que tentar."
90100100-90 = "Então, é melhor tentarmos agora."
90100100-91 = "Se soubesse que seria assim, deveria ter chamado nosso esquadrão de 'Canários' em vez de 'Raposas'."
90100100-92 = "O que é isso? FOX4, você ficou com medo? Nem tentamos ainda."
90100100-93 = "Estou empolgada...! Vamos, me dê as ordens, agora mesmo!"
90100100-99 = "Então, vamos nos preparar para a invasão também."
90100100-100 = "FOX4, por favor, confirme as coordenadas do alvo."
90100100-101 = "OK, pode deixar!"
90100100-108 = "Fonte de calor confirmada na posição azimute 0-8-5 a partir do Ponto Romeo."
90100100-112 = "Miragem confirmada sobre os dutos de ventilação. As coordenadas são —"
90100100-113 = "Ué? A ampliação da distância está estranha. O ponto de foco da imagem está muito mais longe do que a distância que estou vendo."
90100100-119 = "Eu sabia..."
90100100-123 = "……FOX3, aguarde."
90100100-126 = "Dá para ver um campo de grama que não deveria estar nesta sala de ventilação. E, além disso, algo está oscilando irregularmente lá no fundo――"
90100100-135 = "Confirmo o surgimento do \"Espantalho Branco\"."
90100100-137 = "FOX4! Está me ouvindo!? Sabe quem eu sou!?"
90100100-138 = "Nossa, que susto. Não precisa gritar desse jeito, eu sei quem você é."
90100100-139 = "Então responda direito!"
90100100-140 = "FOX1, essa garota definitivamente não está em si! A operação foi um fracasso!"
90100100-142 = "Se conseguiram confirmar a posição do alvo sem perder a consciência, já é um bom trabalho."
90100100-143 = "Todos, equipem os dispositivos de visão noturna. Mudem para o modo IR e ajustem o foco."
90100100-154 = "A partir deste momento, nós dominaremos a escuridão."
