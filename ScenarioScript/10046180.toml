[translation]
10046180-3 = "うふふっ。"
10046180-4 = "……勘弁してほしいっす。"
10046180-5 = "まだ何も言っていませんよ？"
10046180-6 = "今日だけはほんと勘弁してほしいっす！"
10046180-7 = "あら……本格的に余裕がないみたいですね。"
10046180-8 = "でも、ご心配なく。"
10046180-9 = "私はイチカさんを手伝いに来たのですから。"
10046180-10 = "……。"
10046180-11 = "……怪しい。"
10046180-12 = "何か企んでいるに違いない……。#nでなければあの[ruby=うらわ]浦和[/ruby]ハナコが……。"
10046180-13 = "――とでも言いたそうな表情ですね？"
10046180-14 = "……！"
10046180-15 = "……冗談です。"
10046180-16 = "相変わらずポーカーフェイスがお上手ですね。"
10046180-17 = "本当に、何の用っすか？"
10046180-18 = "うーん、どうすれば信じてもらえるのでしょう？"
10046180-19 = "本当に、イチカさんを手伝いに来ただけ、ですよ。"
10046180-20 = "まあ、私の発案ではないのですが……。"
10046180-21 = "ふふっ、持つべきものは素敵な仲間、ですね♡"
10046180-22 = "……ここに来たのはハナコさん一人じゃないって意味っすか？"
10046180-23 = "それは……後のお楽しみということで。"
10046180-24 = "どうすれば信じていただけるのでしょう？#nもう後は敵意がないことをこの身をもって証明するしか……。"
10046180-25 = "……う～ん。"
10046180-26 = "はあ……分かったっすよ。"
10046180-27 = "あら。本当にいいのですか？"
10046180-28 = "あなたがそれを聞くんすか……？"
10046180-29 = "何を考えているかは知らないっすけど、人手が足りてないのは事実なんで。"
10046180-30 = "だから、よろしくっす。"
10046180-31 = "お互いの全てをさらけ出して話し合うのって、とっても気持ちいいですよね♡"
10046180-32 = "なんで誤解されそうな言い方をするんすか！"
10046180-33 = "ふふっ、事実ですから。では……。"
10046180-38 = "ひと夏のイケナイ思い出づくり……始めてみましょうか♡"
