10046180-28 = "Você realmente vai perguntar isso……?"
10046180-29 = "Não sei o que você está pensando, mas é verdade que estamos precisando de ajuda."
10046180-30 = "Então, conto com você."
10046180-31 = "Abrir o jogo e conversar sobre tudo é algo muito prazeroso, não é?♡"
