[translation]
10015050-1 = "Episódio 5: O Comitê Contra o Festival Esportivo"
10015050-4 = "Isso... é um robô para usar no Grande Festival Esportivo, né?"
10015050-5 = "Mas parece um 'tanque' de qualquer ângulo..."
10015050-6 = "Para que será que fizeram isso?"
10015050-7 = "Será que é para usar na corrida de rolar a bola gigante...?"
10015050-8 = "Não tem como rolar um bloco de ferro desses com as mãos. #nE ainda tem rodas embaixo, viu?"
10015050-9 = "Talvez seja para perseguir os corredores na maratona e controlar o ritmo..."
10015050-10 = "Só de pensar em ser perseguida por um robô, já me dá arrepios..."
10015050-11 = "Hum... nem me surpreendo mais com isso."
10015050-12 = "Eles sempre inventam desculpas sobre desenvolver um corpo saudável ou promover a amizade, #nenquanto fazem os alunos do Millennium sofrerem."
10015050-13 = "Com certeza, esse robô de combate é só mais uma das máquinas de tortura terríveis que eles criaram."
10015050-15 = "...Eu sabia, temos que cancelar esse 'Grande Festival Esportivo'!!"
10015050-20 = "Vocês falaram sobre o Grande Festival Esportivo agora pouco?"
10015050-21 = "Ai, meu Deus!?"
10015050-22 = "A, a chefe do Clube de Treinamento...? #nDesde quando ela está aí...?"
10015050-23 = "Ah, peço desculpas se as assustei."
10015050-24 = "É que ouvi a palavra 'Grande Festival Esportivo' de repente."
10015050-25 = "Conversando até tão tarde assim, sem dormir..."
10015050-26 = "Pelo visto, vocês também estão ansiosas pelo Grande Festival Esportivo de amanhã!"
10015050-28 = "Bem, é que..."
10015050-29 = "Nós não estávamos ansiosas pelo festival..."
10015050-30 = "Fufu, não precisa dizer mais nada, eu entendo. #nEu também não consigo dormir de tanta empolgação para o evento de amanhã."
10015050-31 = "O Grande Festival Esportivo... um evento baseado no princípio de que 'uma mente sã habita em um corpo são', visando o crescimento dos alunos através do esporte..."
10015050-32 = "Um festival onde, sob o lema de um Kivotos pacífico, alunos de todas as academias competem de forma justa e honesta, e que será realizado aqui, no nosso Millennium..."
10015050-33 = "Sim... é natural que estejam tão empolgadas a ponto de não conseguirem dormir!"
10015050-36 = "(Essa pessoa... por que ela continua falando sozinha sem nem esperar a resposta?)"
10015050-37 = "(É por isso que o pessoal do esporte é assim...)"
10015050-39 = "A propósito, em qual modalidade vocês pretendem competir?"
10015050-40 = "Não que eu quisesse ouvir a conversa, mas acho que ouvi vocês mencionarem a corrida de rolar a bola gigante..."
10015050-41 = "Ah, bem... isso! #nNós estávamos planejando participar da corrida de rolar a bola gigante."
10015050-42 = "Estávamos fazendo uma reunião de estratégia antes do evento..."
10015050-43 = "Estratégia... para a corrida de rolar a bola gigante?"
10015050-44 = "É, será que é estranho planejar uma estratégia para isso...?"
10015050-45 = "Não! Acho que é uma atitude excelente!"
10015050-49 = "Ao contrário do que muitos pensam, a corrida de rolar a bola gigante não é nada fácil!"
10015050-55 = "Para transportar a bola com estabilidade, é essencial ter força muscular na parte superior do corpo e explosão para controlar a direção rapidamente nos pontos de retorno."
10015050-57 = "Além disso, é preciso usar chuteiras com travas para facilitar a mudança de direção, considerando os quiques irregulares na pista, e treinar a musculatura das pernas—"
10015050-68 = "Ah, bem..."
10015050-69 = "D-desculpa... acho que já vamos indo..."
10015050-75 = "Chefe Sumire! Pegue aqueles alunos ali!"
10015050-76 = "Ué? Sensei e o pessoal do Veritas? #nE também..."
10015050-85 = "Até o pessoal do Clube de Engenharia!? #nO que é esse visual..."
10015050-86 = "Bem... essas roupas..."
10015050-87 = "É que estávamos perseguindo o Sensei... e não tivemos chance de trocar de roupa..."
10015050-92 = "Sobre esse traje, tudo começou quando a Hibiki começou a se interessar por cosplay no ano retrasado, mas—"
10015050-93 = "Desculpa, Kotori. Não temos tempo, vou pular a explicação."
10015050-94 = "Concluindo..."
10015050-95 = "Aqueles ali são os culpados que roubaram nosso robô de torcida!"
10015050-96 = "Culpados que roubaram o robô de torcida...?"
10015050-98 = "Robô... de torcida?"
10015050-99 = "Torcida……?"
10015050-100 = "[s1] \"Por que todo mundo está surpreso……\"\n[s2] \"Não somos nós as culpadas, ou algo assim……?\""
10015050-103 = "Nós nunca roubamos robôs de torcida! #nNós só..."
10015050-104 = "É isso mesmo! Nós só causamos explosões para atrapalhar o Grande Festival Esportivo e hackeamos o servidor, mas os robôs de torcida――"
10015050-105 = "Ah, droga……"
10015050-107 = "Fufu, parece que não há dúvidas de que elas são as culpadas."
10015050-108 = "Não sei por que vocês estão tentando atrapalhar o Grande Festival Esportivo, mas #npoderiam parar por aqui?"
10015050-109 = "O \"Festival Esportivo Kourin\" é o maior evento de Kivotos, carregado com os desejos de muitos estudantes."
10015050-110 = "Com a sabotagem de vocês, não só nós do Seminário, mas muitos estudantes estão em apuros."
10015050-111 = "Se devolverem os robôs agora, deixarei isso passar em branco, mas……"
10015050-112 = "Se a \"Calculista Cruel\" do nosso Seminário descobrir sobre isso……"
10015050-113 = "Deixo para vocês imaginarem qual será a reação dela."
10015050-115 = "\"Calculista Cruel\"…… Você está falando da Yuuka?"
10015050-116 = "……Eu também já ouvi rumores sobre isso."
10015050-117 = "Dizem que um estudante que criou uma invenção absurda e irritou a tesoureira Yuuka teve seu orçamento de pesquisa cortado e faliu……"
10015050-118 = "O corte de orçamento de pesquisa para um estudante de Millennium é basicamente uma sentença de morte…… que terrível……"
10015050-120 = "Mas a determinação da nossa \"Associação Anti-Festival\" não é fraca a ponto de ceder a esse tipo de ameaça!"
10015050-121 = "[s] \"Associação Anti-Festival……?\""
10015050-122 = "Isso mesmo…… Nós somos a \"Associação de Estudantes de Millennium que se opõe ao Festival Esportivo Kourin\"――"
10015050-123 = "Resumindo, a \"Anti-Festival\"!"
10015050-124 = "É um grande erro achar que todos os estudantes de Millennium estão esperando pelo Grande Festival Esportivo!"
10015050-125 = "Não acredito que existam estudantes que se opõem ao Grande Festival Esportivo……"
10015050-126 = "B-bem, sinto muito pelos estudantes que se prepararam com tanto esforço, mas……"
10015050-127 = "Nós também temos nossos motivos para não recuar!"
10015050-129 = "……Então, onde estão os robôs de torcida que vocês roubaram?"
10015050-130 = "Se não devolverem, vou recuperá-los usando métodos um pouco mais forçados."
10015050-132 = "Eu já disse que não roubamos robôs de torcida, entendeu?"
10015050-133 = "Parece que não conseguimos nos entender com palavras…… não tem jeito."
10015050-134 = "Vamos resolver isso com este \"tanque\" que roubamos do Departamento de Engenharia!"
10015050-139 = "Apareça, \"Destruidor de Caminhões\"!"
10015050-145 = "[ns] \"O-o que é aquilo!?\""
10015050-146 = "Espere um pouco, ninguém me avisou que tinha um tanque!"
10015050-147 = "Ahaha! O que é aquilo? É muito legal!"
10015050-148 = "Aquele robô em formato de bola, foi feito pelo Departamento de Engenharia? #nA pintura é um pouco decepcionante, mas o design é muito irado!"
10015050-149 = "……Sim. #nFico feliz que ainda esteja funcionando bem."
10015050-151 = "\"Destruidor de Caminhões\"…… Que senso de nomeação lamentável."
10015050-152 = "Se tivéssemos um pouco mais de tempo, poderíamos ter dado um nome muito mais incrível para aquele robô."
10015050-153 = "……Desculpe dizer isso, mas o senso de nomeação da senpai Utaha também não é lá essas coisas."
10015050-154 = "……Por enquanto, \"Destruidor de Caminhões\" não está bom?"
10015050-155 = "Hum…… já que quem está usando parece satisfeito, não tenho objeções, mas……"
10015050-156 = "……Pessoal do Departamento de Engenharia?"
10015050-161 = "Quando vi os projetos, já esperava algo do tipo, mas……"
10015050-163 = "O que exatamente é aquele tanque?"
10015050-164 = "Ah, bem…… é que……"
10015050-165 = "Como você pode ver, é um robô de torcida."
10015050-166 = "………"
10015050-172 = "É uma blindagem resistente, não é?"
10015050-173 = "Pediram para projetá-lo de forma robusta para que não quebrasse nem em acidentes inesperados!"
10015050-174 = "A blindagem, que passou por um tratamento térmico cuidadoso, não sofre nem um arranhão com balas comuns!"
10015050-181 = "As lagartas externas são……"
10015050-182 = "Para guiar os espectadores, é preciso conseguir se mover por qualquer lugar do local... não é?"
10015050-183 = "Dá para usar com tranquilidade até mesmo dentro de um estádio cheio de rampas."
10015050-190 = "……Por que um canhão automático de 15mm?"
10015050-191 = "Por mais que o Grande Festival Esportivo seja uma celebração, #nsempre existem fora da lei que ameaçam a paz por aí."
10015050-192 = "Para me preparar para imprevistos, instalei um modo de combate para que eu possa realizar a supressão armada de forma autônoma."
10015050-193 = "……Entendo."
10015050-194 = "[s] \"……Não se deixe convencer por isso!?\""
10015050-195 = "Ora, peço perdão... é que a ideia foi tão inovadora que eu não pude evitar."
10015050-203 = "É hora de fazer piada? Precisamos dar um jeito naquele tanque!"
10015050-204 = "……Eu teria um monte de perguntas, mas #nparece que este não é o momento para uma conversa calma."
10015050-205 = "Sensei, por favor, assuma o comando da operação."
