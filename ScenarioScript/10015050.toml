[translation]
10015050-1 = "第5話;晄輪大祭に反対する会"
10015050-4 = "これ……大運動会で使うロボットなんだよね？"
10015050-5 = "どうみても「戦車」だけど……"
10015050-6 = "これを何に使おうとして作ったのかしら？"
10015050-7 = "大玉転がしで、代わりに使うとか……？"
10015050-8 = "こんな鉄の塊を素手で転がせるわけないでしょ。#n下に車輪もついてるわよ？"
10015050-9 = "マラソンで、ペース調節のために後ろから追いかけてくるとか……"
10015050-10 = "ロボットから逃げ続けるなんて、考えただけでもぞっとする……"
10015050-11 = "ふん……今さら驚きもしないわ。"
10015050-12 = "あいつらは健全な肉体を育成するとか、親睦を図るとか――#nあらゆる言い訳をしながら、ミレニアム生を苦しめてきたからね。"
10015050-13 = "どうせ、この戦闘ロボットもあいつらが作った恐ろしい拷問機械の一つよ。"
10015050-15 = "……やっぱり「大運動会」は中止させなきゃ！！"
10015050-20 = "いま、大運動会の話をしましたか。"
10015050-21 = "ひ、ひいぃ！？"
10015050-22 = "ト、トレーニング部の部長……？#nいつの間に……？"
10015050-23 = "あ、驚かせてしまったらすみません。"
10015050-24 = "急に大運動会という単語が聞こえましたので。"
10015050-25 = "こんなに遅くまで、寝ないで話に花を咲かせているということは……"
10015050-26 = "やはり皆さんも、明日の大運動会を楽しみにしているようですね！"
10015050-28 = "それは、その……"
10015050-29 = "私たちは大運動会を楽しみにしていたのではなくて……"
10015050-30 = "ふふ、みなまで言わずとも分かります。#n明日の大会が楽しみで眠れないのは、私も同じですから。"
10015050-31 = "大運動会……それは「健全なる精神は健全なる肉体に宿る」という理念に基づき、運動を通じた生徒たちの成長を目的とした催し……"
10015050-32 = "泰平なるキヴォトスという理念を掲げて学園問わず互いに切磋琢磨し、公明正大に競技を繰り広げる祭典が、他でもない私たちミレニアムで開かれる……"
10015050-33 = "ええ……眠れないほど興奮して当然ですよね！"
10015050-36 = "（この人……どうして答えてもないのに、勝手に話を進めるの？）"
10015050-37 = "（これだから体育会系は……）"
10015050-39 = "ところで、皆さんはどの種目に出場する予定ですか？"
10015050-40 = "盗み聞きするつもりはなかったのですが、さっきちらっと大玉転がしという話を聞いた気がして……"
10015050-41 = "あー、えっと……そう！#n私たちは大玉転がしに出る予定だったのよ。"
10015050-42 = "大会を控えて、最後に作戦会議をしてたところだったの……"
10015050-43 = "大玉転がしで……作戦ですか？"
10015050-44 = "や、やっぱり大玉転がしで作戦を練るのはおかしいかな……？"
10015050-45 = "いえ！とても良い姿勢だと思います！"
10015050-49 = "大玉転がしは世間の認識と違って、甘くないですからね！"
10015050-55 = "ボールを安定して移送するためには、十分な上半身の筋力と、折り返し地点で素早く方向を制御するための瞬発力が必要不可欠です。"
10015050-57 = "それに、トラックで発生しうる不規則バウンドを考慮して方向転換しやすいスタッドを着用して下半身の筋力を鍛えないと――"
10015050-68 = "あ、えっと……"
10015050-69 = "ご、ごめん……そろそろ私たちは帰ろうかな……"
10015050-75 = "スミレ部長！そこの生徒たち、捕まえて！"
10015050-76 = "あれ？先生とヴェリタスの皆さん？#nそして……"
10015050-85 = "エンジニア部の皆さんまで！？#nその格好は一体……。"
10015050-86 = "その……この服は……"
10015050-87 = "先生を追いかけてたら……着替えるチャンスがなかったと言いますか……"
10015050-92 = "この衣装について説明しますと、ヒビキが一昨年コスプレに趣味を持ち始めた時まで遡りますが――"
10015050-93 = "ごめん、コトリ。時間がないから説明は省略させてもらうよ。"
10015050-94 = "結論から言うと……"
10015050-95 = "そこにいるのが、私たちの応援ロボットを盗んだ犯人だ！"
10015050-96 = "応援ロボットを盗んだ犯人……？"
10015050-98 = "応援……ロボット？"
10015050-99 = "応援……？"
10015050-100 = "[s1] \"なんでみんな驚いてるの……。\"\n[s2] \"犯人じゃない、とか……？\""
10015050-103 = "応援ロボットなんか盗んだことないわよ！#n私たちはただ……"
10015050-104 = "そうよ！私たちはただ、大運動会を邪魔しようと爆発を起こしたり、サーバーをハッキングしたりしたけど、応援ロボットは――"
10015050-105 = "あちゃー……"
10015050-107 = "ふふ、どうやら彼女たちが犯人で間違いないみたいですね。"
10015050-108 = "皆さんが大運動会を邪魔しようとする理由は分かりませんが、#nこの辺りでやめていただけませんか？"
10015050-109 = "「[ruby=こうりんたいさい]晄輪大祭[/ruby]」は多くの生徒の願いが込められた、キヴォトス最大規模のお祭りです。"
10015050-110 = "皆さんの妨害で、私たちセミナーはもちろん、多くの生徒が困っています。"
10015050-111 = "今からでもロボットを返していただければ、この事は不問にしますが……"
10015050-112 = "もし、私たちセミナーの「冷酷な算術使い」が、この事実を知ることになったら……"
10015050-113 = "どんな反応をするかは、ご想像にお任せします。"
10015050-115 = "「冷酷な算術使い」って……あのユウカのこと？"
10015050-116 = "……私も、噂は聞いたことある。"
10015050-117 = "とんでもない発明品を作ってユウカ会計の機嫌を損ねた生徒が、研究費を削減されて破産したとか……"
10015050-118 = "ミレニアム生の研究費削減は死刑宣告に他ならないのに……なんて恐ろしい……"
10015050-120 = "でも、そんな脅迫に屈するほど、私たち「晄・反・会」の意思は弱くないわ！"
10015050-121 = "[s] \"晄・反・会……？\""
10015050-122 = "そう……私たちは「晄輪大祭に反対するミレニアム生の会」――"
10015050-123 = "略して「晄反会」よ！"
10015050-124 = "ミレニアムの生徒全員が大運動会の開催を待っていると思ったら大間違いよ！"
10015050-125 = "大運動会に反対する生徒がいたなんて、そんな……"
10015050-126 = "も、もちろん一生懸命準備してきた生徒には悪いけど……"
10015050-127 = "私たちにも退けない理由があるんだよ！"
10015050-129 = "……それで、盗んだ応援ロボットはどこにあるの？"
10015050-130 = "返さないなら、多少強引な手を使ってでも回収するから。"
10015050-132 = "だから、私たちは応援ロボットなんて盗んでないって言ってるでしょ？"
10015050-133 = "どうにも言葉が通じないみたいだから……仕方ない。"
10015050-134 = "エンジニア部から盗んできたこの「戦車」で相手にしてやろうじゃないの！"
10015050-139 = "出て来い、「トラック・クラッシャー」！"
10015050-145 = "[ns] \"あ、あれ何！？\""
10015050-146 = "ちょっと待って、戦車があるなんて聞いてない！"
10015050-147 = "あはは！何あれ、すっごくカッコいい！"
10015050-148 = "あのボールみたいな形のロボット、エンジニア部で作ったの？#n塗装はちょっと残念だけど、デザインはめっちゃクールじゃん！"
10015050-149 = "……うん。#nまだ無事に作動してるみたいでよかった。"
10015050-151 = "「トラック・クラッシャー」……残念なネーミングセンスだね。"
10015050-152 = "時間がもう少し残っていたら、あのロボットに似合うもっと素敵な名前をつけてあげられたのに。"
10015050-153 = "……こんなこと言うのはアレですが、ウタハ先輩のネーミングセンスもどっこいどっこいですよ。"
10015050-154 = "……とりあえず「トラック・クラッシャー」でいいんじゃないかな？"
10015050-155 = "うむ……使い手が満足しているみたいだし、異論はないけれど……"
10015050-156 = "……エンジニア部の皆さん？"
10015050-161 = "図面を見た時、すでにある程度予想はしていましたが……"
10015050-163 = "あの戦車は、一体何ですか？"
10015050-164 = "あ、ええと……それが……"
10015050-165 = "ご覧の通り、応援ロボットだよ。"
10015050-166 = "………"
10015050-172 = "丈夫な装甲ですね？"
10015050-173 = "不慮の事故でも故障しないよう、頑丈に設計してほしいと頼まれましたから！"
10015050-174 = "丁寧に熱処理を施した装甲は、並大抵の弾丸ではびくともしません！"
10015050-181 = "外輪カタピラは……"
10015050-182 = "観客を案内するには、会場のどの場所でも移動できなければならない……でしょ？"
10015050-183 = "傾斜路の多いスタジアム内でも安心して使えるよ。"
10015050-190 = "……15mm機関砲は、何故？"
10015050-191 = "大運動会がいくらお祭りだとしても、#nその安寧を脅かす無法者はどこにでもいるものだからね。"
10015050-192 = "不測の事態に備えて、自主的に武力鎮圧ができるよう戦闘モードを搭載しているよ。"
10015050-193 = "……なるほど。"
10015050-194 = "[s] \"……説得されないで！？\""
10015050-195 = "あら、失礼しました……あまりにも斬新なアイデアだったので、思わず。"
10015050-203 = "漫才やってる場合？あの戦車をどうにかしないと！"
10015050-204 = "……お聞きしたいことは山ほどありますが、#nどうやら今は、ゆっくりお話ができるタイミングではなさそうですね。"
10015050-205 = "先生、現場の指揮をお願いいたします。"
