[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1003808-1 = "SRT, Iniciando Descanso!" 
1003808-2 = "Parque dos Coelhinhos" 
1003808-4 = "（Miyako estava parada com uma expressão sonolenta,\nolhando distraidamente em direção ao sol.）" 
1003808-5 = "（Parece que ela não me notou...）" 
1003808-6 = "Fuu…… O tempo está ótimo hoje." 
1003808-7 = "[s] \"Bom dia, Miyako.\"" 
1003808-8 = "S-Sensei? O que o traz aqui\ntão de repente……" 
1003808-9 = "Temos alguma emergência?\nOu recebemos uma nova missão……?" 
1003808-10 = "Eh……? Você viu a mensagem de agora há pouco\ne veio porque ficou preocupado comigo?" 
1003808-11 = "Ahaha…… N-Não foi absolutamente nada.\nNão aconteceu nada de errado……" 
1003808-12 = "Mas eu me senti mal por chamar você aqui sem motivo nenhum……\nEntão parei de digitar no meio do caminho." 
1003808-13 = "É bem estranho, não é?\nQuerer entrar em contato com você mesmo sem ter um motivo……" 
1003808-14 = "[s1] \"Não é nada estranho.\"\n[s2] \"Pode me chamar sempre que quiser.\"" 
1003808-15 = "Sério……? Fufu, muito obrigada\npor me dizer isso." 
1003808-16 = "Sério……? Fufu, muito obrigada\npor me dizer isso." 
1003808-17 = "Sensei, se não estiver muito ocupado,\nnão gostaria de aproveitar a luz do sol aqui no parque comigo um pouquinho?" 
1003808-18 = "O sol está quentinho e\nmuito agradável hoje." 
1003808-21 = "[s] Sento-me ao lado de Miyako." 
1003808-26 = "……Por que não senta\num pouquinho mais perto?" 
1003808-27 = "Dizem que coelhos não morrem de solidão, afinal……\nMas, veja bem, eu não sou um coelho." 
1003808-29 = "（Depois disso, aproveitei o banho de sol junto com a Miyako\ne retornei para a Schale.）" 