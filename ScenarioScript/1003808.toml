[translation]
1003808-1 = "SRT、休憩します！"
1003808-2 = "子ウサギ公園"
1003808-4 = "（ミヤコが気だるそうな表情で、太陽の方に顔を向けたままぼーっとしていた）"
1003808-5 = "（こちらに気づいてないみたいだ……）"
1003808-6 = "ふう……今日は良い天気ですね。"
1003808-7 = "[s] \"おはよう、ミヤコ。\""
1003808-8 = "せ、先生？急に何のご用で……。"
1003808-9 = "何か緊急のご用事が？それとも新しい任務が……？"
1003808-10 = "え……？さっきの私のメールを見て、心配して来てくださったんですか？"
1003808-11 = "あはは……ほ、本当に何でもありません。別に何かがあったわけではなくて……。"
1003808-12 = "それなのに、何も無いのに先生を呼んでしまったのが申し訳なくなって……途中で止めちゃいました。"
1003808-13 = "ほんと、変ですよね。何もないのに連絡したくなるなんて……。"
1003808-14 = "[s1] \"変じゃないよ。\"\n[s2] \"いつでも呼んでいいよ。\""
1003808-15 = "そうですか……ふふ、そう言ってくれて、ありがとうございます。"
1003808-16 = "そうですか……ふふ、そう言ってくれて、ありがとうございます。"
1003808-17 = "先生、もしお忙しくなければ一緒に、少しだけ、この公園で陽射しを楽しんでいきませんか？"
1003808-18 = "降り注ぐ光が暖かくて、心地良いですよ。"
1003808-21 = "[s] ミヤコの隣に座る。"
1003808-26 = "……もう少し、近くに座ったらどうですか？"
1003808-27 = "ウサギは寂しくても弱らないそうですが……私は、ウサギではないので。"
1003808-29 = "（その後、ミヤコと日向ぼっこを楽しんでからシャーレに戻った）"
