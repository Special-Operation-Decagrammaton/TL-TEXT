[translation]
1003808-1 = "SRT, hora do intervalo!"
1003808-2 = "Parque dos Coelhinhos"
1003808-4 = "（Miyako está com uma expressão sonolenta, olhando para o sol enquanto divaga）"
1003808-5 = "（Parece que ela não notou minha presença...）"
1003808-6 = "Ufa... hoje o dia está lindo, não é?"
1003808-7 = "[s] \"Bom dia, Miyako.\""
1003808-8 = "P-Professor? O que faz aqui de repente..."
1003808-9 = "Alguma emergência? Ou talvez uma nova missão...?"
1003808-10 = "Ah... você veio porque viu meu e-mail e ficou preocupado?"
1003808-11 = "Ahaha... n-não é nada, de verdade. Não aconteceu nada de especial..."
1003808-12 = "É que eu me senti mal por ter chamado o Professor sem motivo nenhum... então acabei desistindo no meio do caminho."
1003808-13 = "É realmente estranho, não é? Querer entrar em contato sem ter nada para dizer..."
1003808-14 = "[s1] \"Não é estranho.\"\n[s2] \"Pode me chamar quando quiser.\""
1003808-15 = "É mesmo...? Fufu, obrigada por dizer isso."
1003808-16 = "É mesmo...? Fufu, obrigada por dizer isso."
1003808-17 = "Professor, se não estiver muito ocupado, gostaria de aproveitar um pouco o sol aqui no parque comigo?"
1003808-18 = "A luz do sol está tão quente e agradável."
1003808-21 = "[s] Sentar ao lado de Miyako."
1003808-26 = "...Por que não se senta um pouco mais perto?"
1003808-27 = "Dizem que coelhos não morrem de solidão, mas... eu não sou um coelho."
1003808-29 = "（Depois disso, aproveitei o banho de sol com a Miyako antes de voltar para o Schale）"
