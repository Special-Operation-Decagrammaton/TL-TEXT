[translation]
10038050-1 = "Episódio 5; O cruzamento com o seu mundo"
10038050-15 = "Droga, não tem... fim...!"
10038050-16 = "O dia está amanhecendo."
10038050-20 = "Desde quando...?"
10038050-21 = "Já era madrugada quando chegamos. #nMas, realmente, não tem fim...!"
10038050-22 = "Não, os reforços inimigos pararam. #nNão acha que o fim está próximo?"
10038050-23 = "O problema é que... o nosso fim também parece estar próximo."
10038050-27 = "Dizer que está exausto por causa disso...!"
10038050-35 = "Você deveria parar com esse blefe. #nSeus joelhos estão tremendo, não estão?"
10038050-36 = "……！"
10038050-37 = "Não, ainda não! Eu sou a Diretora Executiva do Genryumon! #nAquela que simboliza as artes marciais do Genryumon!"
10038050-42 = "Mesmo que eu seja quebrada inúmeras vezes, eu nunca me dobrarei!"
10038050-56 = "（Mas, desse jeito, estamos em desvantagem numérica... O que eu deveria fazer...！）"
10038050-61 = "A chegada da Mestra do Portão!!!"
10038050-69 = "A chegada da Mestra do Portão!!!"
10038050-70 = "Essa voz é...!?"
10038050-78 = "Bom trabalho. #nMina, Reijo."
10038050-80 = "Me, Mestra do Portão!"
10038050-81 = "A Mestra do Portão veio pessoalmente...?"
10038050-83 = "Recebi os relatórios. #nE também sei o que está acontecendo no Clube de Pesquisa de Alquimia."
10038050-84 = "Mestra do Portão! Po, por favor, me puna! #nDeixei que tantas forças externas se infiltrassem assim—"
10038050-85 = "Já chega, retire-se e descanse."
10038050-89 = "……Se a minha suposição estiver correta, este assunto está em um nível que nem mesmo você conseguiria resolver."
10038050-91 = "O que diabos aconteceu no Clube de Pesquisa de Alquimia...?"
10038050-97 = "……Você saberá em breve."
10038050-103 = "Hehe, que recepção animada. #nFico até sem saber como reagir a uma recepção tão calorosa."
10038050-104 = "Ah— devo lamentar que o Genryumon tenha caído a ponto de não conseguir controlar nem isso?"
10038050-108 = "Ou devo ficar grato por a própria Mestra do Portão ter vindo?"
10038050-110 = "[ns] \"Quem é você...?\""
10038050-114 = "Aquele adulto é...?"
10038050-119 = "Ah, esse é o famoso Sensei."
10038050-120 = "Hehe, uma colheita inesperada. #nEu esperava que nosso encontro fosse algo significativo e emocionante."
10038050-121 = "Bem, talvez isso também possa ser chamado de um encontro emocionante, de certa forma."
10038050-122 = "Ah, mas... talvez eu quisesse ter te conhecido quando tivéssemos mais tempo para nos interessarmos um pelo outro, não é?"
10038050-123 = "[s] \"……。\""
10038050-124 = "……Hum. É a primeira vez que vê o Sensei? #nNa verdade, o mesmo vale para mais da metade dos alunos aqui."
10038050-125 = "E então, o que vai fazer? Shintani Kai. Vai se apresentar por conta própria? #nOu quer que eu poupe esse trabalho?"
10038050-130 = "……！？！？"
10038050-131 = "（Aquela pessoa é... a famosa Shintani Kai!? A ex-presidente do Clube de Pesquisa de Alquimia...??）"
10038050-133 = "Bondade excessiva vira veneno, Kisaki."
10038050-134 = "Se fosse a você de antigamente, diria que até o veneno pode se tornar remédio dependendo de como é usado."
10038050-135 = "Essa forma de pensar não mudou. Mas agora— é hora de usar o remédio como remédio e o veneno como veneno."
10038050-139 = "É um prazer conhecê-los. Pessoal do Genryumon— e Sensei."
10038050-140 = "Eu sou Shintani Kai— ah, também sou chamada de uma das Sete Prisioneiras. #nPrazer em conhecê-los."
10038050-142 = "[ns] \"……！\""
10038050-143 = "Hehe, Shanhaijing me baniu e tentou me tornar parte do passado, chamando-me de uma das Sete Prisioneiras..."
10038050-144 = "Mas eu não esqueci de Shanhaijing. #nE da mesma forma— nem do Clube de Pesquisa de Alquimia."
10038050-145 = "Veja só, Kisaki. Eu voltei."
10038050-151 = "……O que você pretende fazer?"
10038050-152 = "Vim recuperar o que é meu."
10038050-153 = "――O Clube de Pesquisa de Alquimia não pertence a você."
10038050-154 = "Hehe, eu sabia que você diria isso."
10038050-155 = "O que exatamente você pretende fazer com o Clube de Pesquisa de Alquimia?"
10038050-156 = "Você pergunta algo tão óbvio?#nÉ claro que é... a conclusão do Sentan."
10038050-157 = "……Mesmo que isso signifique mergulhar inúmeros estudantes em um sofrimento atroz?"
10038050-158 = "Se o Sentan for concluído, tudo isso será apenas um detalhe insignificante."
10038050-163 = "Ah... você poderia até ter trazido elas de volta, mas...#nVocê ficou no meu caminho. Você impediu tudo... você é a causa raiz que trouxe esse desastre, Kisaki."
10038050-164 = "Mas não se preocupe. Ainda me resta um pouco de compaixão, sabe?"
10038050-166 = "Ho. Isso é digno de espanto."
10038050-167 = "Hehe... mas não está chegando ao seu limite?#nEsse seu corpo, ele não vai aguentar por muito mais tempo, vai?"
10038050-168 = "……!?"
10038050-169 = "Você está com uma cara de quem quer saber como eu sei disso.#nAh, eu sei, sim. Seria estranho se eu não soubesse."
10038050-170 = "Eu posso te curar... o que me diz, Kisaki?"
10038050-171 = "Afinal... o motivo de você ter ficado assim é..."
10038050-176 = "Porque foi culpa minha, não é?"
10038050-177 = "……."
10038050-182 = "……Eu já suspeitava.#nSe não fosse você, quem mais poderia ser?"
10038050-187 = "(O que foi isso agora?)"
10038050-188 = "(Quem sabe...? Mas a Mestra parece estar sofrendo...)"
10038050-194 = "Vou lhe fazer uma proposta."
10038050-201 = "Se você me devolver o Clube de Pesquisa de Alquimia... eu cuidarei do seu estado com responsabilidade."
10038050-202 = "Se você me deixar conduzir todos os processos até a criação do Sentan em meu nome..."
10038050-203 = "O problema do seu corpo pode ser resolvido em um mês."
10038050-207 = "……."
10038050-208 = "Eu me lembro de todas as tragédias que você causou."
10038050-212 = "Muitos estudantes sofreram e o Shanhaijing caiu no caos."
10038050-213 = "Você, que criou tamanha tragédia... quer que eu te aceite de volta apenas para o meu próprio conforto?"
10038050-214 = "Minha resposta é a mesma de antes."
10038050-218 = "Enquanto você não se arrepender de tudo... não há lugar para você no Shanhaijing."
10038050-223 = "Sinceramente, você não muda nada."
10038050-227 = "Sendo assim... vamos encerrar essa conversa com a minha resposta para você."
