[translation]
10038050-1 = "第5話;君の世界との交差点"
10038050-15 = "クソッ、キリが……ない……！"
10038050-16 = "夜が明けてきましたね。"
10038050-20 = "いつの間に……？"
10038050-21 = "私たちが到着したのが既に深夜でしたから。#nしかし、本当にキリがない……！"
10038050-22 = "いや、敵の増員が止まっている。#n終わりが見えてきたんじゃないか？"
10038050-23 = "問題は……私たちも、終わりが見えてきたというところ、ですが。"
10038050-27 = "この程度で音をあげるなんてな……！"
10038050-35 = "あなたこそ、ハッタリもそこまでにしてください。#n膝が笑ってるじゃないですか！"
10038050-36 = "……！"
10038050-37 = "いや、まだだ！私は玄龍門の執行部長！#n玄龍門の武を象徴する者！"
10038050-42 = "幾度折れたとしても、曲げることなどできない！"
10038050-56 = "（しかし、このままでは多勢に無勢……一体どうすれば……！）"
10038050-61 = "門主様の、おなーりー！！！"
10038050-69 = "門主様の、おなーりー！！！"
10038050-70 = "この声は……！？"
10038050-78 = "ご苦労じゃった。#nミナ、レイジョ。"
10038050-80 = "も、門主様！"
10038050-81 = "門主様が直々に……？"
10038050-83 = "一連の報告は受けた。#n錬丹術研究会で何が起きているのかも、な。"
10038050-84 = "門主様！わ、私を処罰してください！#nこれだけの外部兵力をみすみすと潜入させてしまい――"
10038050-85 = "もうよい、下がって休め。"
10038050-89 = "……妾の推測通りであれば、この件はいくら其方であってもどうにもすることができぬ領域のもの。"
10038050-91 = "錬丹術研究会で、一体何が……？"
10038050-97 = "……じきに分かる。"
10038050-103 = "クク、随分と賑やかな歓迎だねぇ。#n熱烈に迎えられてどういう顔をすればいいのか悩んでしまうなぁ。"
10038050-104 = "ああ――玄龍門がこの程度さえ制圧できないほど落ちぶれたことを悲しむべきだろうか？"
10038050-108 = "はたまた――門主自ら出向いてもらえたことに感激すべきかな？"
10038050-110 = "[ns] \"君は……？\""
10038050-114 = "その大人は……？"
10038050-119 = "ああ、これが噂の先生か。"
10038050-120 = "ククッ意外な収穫だね。#n私たちの出会いは、有意義で感動的なものになることを期待していたのだけど。"
10038050-121 = "まあ、これもある意味では感動的な出会いと言えるのかもしれないが。"
10038050-122 = "ああ、でも――もう少し互いに興味関心を抱く余裕がある時に、出会いたかったかもしれないね？"
10038050-123 = "[s] \"……。\""
10038050-124 = "……ふむ。先生は初対面か。#nむしろ、この場にいる半数以上の生徒にとってもそうじゃろう。"
10038050-125 = "して、どうする？[ruby=しんたに]申谷[/ruby]カイ。自ら名乗りをあげるか？#nそれとも妾がその手間を省いてやろうか？"
10038050-130 = "……！？！？"
10038050-131 = "（あの人が……噂の、[ruby=しんたに]申谷[/ruby]カイ！？錬丹術研究会の……元会長だったという……？？？）"
10038050-133 = "過ぎたる親切は毒になるものだよ、キサキ。"
10038050-134 = "昔の其方であれば、毒も使いようによっては薬になると言ったじゃろうな。"
10038050-135 = "その考え方自体は変わってないさ。だが、今は――薬は薬として、毒は毒として使う時だからねぇ。"
10038050-139 = "会えて嬉しいよ。玄龍門の諸君――そして先生。"
10038050-140 = "私は[ruby=しんたに]申谷[/ruby]カイ――ああ、七囚人とも呼ばれている。#n以後、お見知りおきを。"
10038050-142 = "[ns] \"……！\""
10038050-143 = "ククッ、七囚人などと呼ばれる私を山海経は追放し、過去のものにしようとしたけれど……。"
10038050-144 = "私は山海経を忘れてなどいない。#nそれと同じくらい――錬丹術研究会のことも、ねぇ。"
10038050-145 = "見たまえ、キサキ。私はここに戻ってきたよ。"
10038050-151 = "……何をするつもりじゃ。"
10038050-152 = "私のものを取り戻しにきたのさ。"
10038050-153 = "――錬丹術研究会は其方のものではない。"
10038050-154 = "ククッ、君ならそう言うだろうね。"
10038050-155 = "錬丹術研究会で、一体何をするつもりなのじゃ。"
10038050-156 = "分かりきったことを聞くんだねぇ？#nもちろん――仙丹の完成だよ。"
10038050-157 = "……数多くの生徒を[ruby=とたん]塗炭[/ruby]の苦しみに落としながら、か？"
10038050-158 = "仙丹が完成すれば、すべては些末なことだ。"
10038050-163 = "ああ……彼女たちだって取り戻すことだってできたというのに――#n君が立ちはだかった。君がすべてを阻止し――厄災を引き起こした元凶だよ、キサキ。"
10038050-164 = "でも、心配しないでくれ。私にだって多少の情は残っているからねぇ。"
10038050-166 = "ほう。それは驚嘆に値するのう。"
10038050-167 = "ククッ……しかし、そろそろ限界なのではないかね？#nその身体、もう保たないんだろう？"
10038050-168 = "……！？"
10038050-169 = "何故私が知っているのか、という顔をしているね。#nああ、知っているとも。知らない方がおかしいくらいだ。"
10038050-170 = "私なら、君を治すことができるとも――なあ、キサキ？"
10038050-171 = "だって……君がそうなったのは――"
10038050-176 = "私のせいだからなあ？"
10038050-177 = "……。"
10038050-182 = "……見当はついておった。#n其方でなければ、他に誰がいるというのじゃ。"
10038050-187 = "（今の、どういうこと？）"
10038050-188 = "（さあ……？でも、門主様なんか苦しそう……？）"
10038050-194 = "一つ、提案をしよう。"
10038050-201 = "私に錬丹術研究会を返してくれるのなら――責任を持って君の状態を見てやろう。"
10038050-202 = "仙丹を作りあげるまでの全ての工程を、私の名で行わせてくれるというのなら――"
10038050-203 = "君の身体の問題など、一ヶ月で解決できる。"
10038050-207 = "……。"
10038050-208 = "其方が生み出したあらゆる惨劇の数々を――妾は覚えておる。"
10038050-212 = "多くの生徒が苦しみ、山海経は混沌に陥った。"
10038050-213 = "惨劇を生み出した其方を――妾一人の安息のために、再び受け入れろと？"
10038050-214 = "妾の答えはあの時と同じじゃ。"
10038050-218 = "其方が全てを改めぬ限り――山海経に居場所はない。"
10038050-223 = "本当、変わらないねぇ。"
10038050-227 = "であれば――君への返答をもってこの問答を終わらせるとしようか。"
