[translation]
1601205-1 = "ぬくもりをください"
1601205-2 = "シャーレ・執務室"
1601205-3 = "というわけで、来たわよ。"
1601205-4 = "[s] \"どういうこと……女子高生怖い、分からない……。\""
1601205-5 = "な、何で怖がるのよ！私と先生の仲じゃない！"
1601205-6 = "とにかく、このまま連休を終えてしまうなんて勿体ないわ。"
1601205-7 = "先生、何か良い考え無いの？"
1601205-8 = "[s1] \"せっかくジュンコが訪ねてきてくれたんだし……。\"\n[s2] \"連休の最後を美食で飾る、とか？\""
1601205-11 = "な、なんかそれ、私が24時間食べることしか頭にない人みたいじゃない！"
1601205-12 = "[s] \"違うの！？\""
1601205-13 = "そんなわけないでしょ！？撃つわよ！？"
1601205-14 = "[s] \"やっぱり女子高生怖い……。\""
1601205-22 = "とりあえず、考え無しに外に出てみたものの……。"
1601205-23 = "あ、クリスマスツリー。まだあったんだ。"
1601205-24 = "[s] \"設置して片付けるのも、大変だろうからね。\""
1601205-26 = "まあ、お祭りって後片付けが大変よね。"
1601205-27 = "それに、よく考えたらクリスマスからお正月ってすぐよね。"
1601205-28 = "え、春までクリスマスツリーを飾ってたことがある？"
1601205-29 = "……それはちょっと擁護できないわ。"
1601205-33 = "昨晩の雪、まだ溶けてないのね。"
1601205-34 = "新雪を見ると、足跡を残したくならない？"
1601205-35 = "……そのまま仰向けになって、手足を動かしたくなる？そんな子どもみたいな……"
1601205-36 = "大人だって、時には子どもに戻りたい……？"
1601205-37 = "……先生って時々、急に中身が変わったみたいなこと言うわよね。"
1601205-73 = "人が多いわね……みんな、私たちと同じなのかしら？"
1601205-74 = "連休が終わるのが寂しくて……ってことだとしたら、ちょっと面白いかも。"
1601205-75 = "え、年末年始が通り過ぎること自体が寂しいのかも……？"
1601205-76 = "確かに、それもあるわね。何だか、色んな事を感じる時期だわ。"
1601205-77 = "（グウウウウウ……)"
1601205-78 = "（ジュンコのお腹が盛大に鳴った)"
1601205-79 = "……。"
1601205-80 = "[s] \"……。\""
1601205-81 = "………。"
1601205-82 = "[s] \"………。\""
1601205-83 = "ち、ちちちち違う！違うんだってば！"
1601205-84 = "本当に違うの！えっと……違わないわけじゃないけど、とにかく違うから！良い？違うったら違うの！"
1601205-85 = "[s3] \"でも、そういえばジュンコ……。\"\n[s4] \"さっきからずっと食べ物見てたもんね。言い出せなくてごめん。\""
1601205-88 = "う……うるさいっ！！"
1601205-96 = "（派手に殴られた）"
1601205-97 = "（自業自得ながらだいぶ痛い……）"
1601205-99 = "[ns] \"はい、どうぞ。\""
1601205-100 = "これ、お汁粉……？"
1601205-101 = "うん、ちょうどそういう気分かも。"
1601205-102 = "ありがと、先生。いただきます。"
1601205-105 = "[wa:80]― はい、[wa:500]先生。[wa:900]一個あげる、"
1601205-108 = "― って、[wa:440]なんでそんなに驚くの！"
1601205-110 = "― た、[wa:600]たまたま多く入ってたの！"
1601205-113 = "[wa:1000]― というかこれ、"
1601205-115 = "― 先生が買ってくれたものだし……。"
1601205-118 = "[wa:100]― それに、[wa:800]今日は一日中……。"
1601205-121 = "[wa:870]― (そういえば、[wa:1200]今日はずっと先生と……)"
1601205-123 = "― (わ、[wa:700]私ってば、[wa:900]何を考えてるの！)"
1601205-126 = "― もう！[wa:900]私があげるって言ってるんだから"
1601205-128 = "[wa:100]― いいじゃない！"
1601205-131 = "はぁ……何だか変に疲れた。"
1601205-132 = "……私も疲れたなぁみたいな顔してない？"
1601205-133 = "先生は大人なんだから、しゃきっとしてもらわないと。"
1601205-134 = "あ、もうこんな時間……でも、みんな帰らないわね。"
1601205-135 = "ま、まあここにいる時点で、私たちも同じだけど……。"
1601205-136 = "[s] \"これからもよろしくね。\""
1601205-137 = "……え、な、何よ急に！？新年の挨拶！？"
1601205-138 = "や、その、嫌とかじゃなくて……。"
1601205-139 = "はぁ……何かツッコみたくてもツッコめない変な流れに……。"
1601205-143 = "……私の方こそ。これからもよろしくね、先生。"
