[translation]
1601205-1 = "Me dê um pouco de calor humano"
1601205-2 = "Schale - Escritório"
1601205-3 = "Sendo assim, eu cheguei."
1601205-4 = "[s] \"O que isso significa... Estudantes são assustadoras, não entendo...\""
1601205-5 = "P-por que você está com medo! Não somos próximos, Sensei?"
1601205-6 = "De qualquer forma, é um desperdício deixar o feriado acabar assim."
1601205-7 = "Sensei, você não tem nenhuma ideia boa?"
1601205-8 = "[s1] \"Já que a Junko se deu ao trabalho de vir me visitar...\"\n[s2] \"Que tal encerrar o feriado com uma iguaria gastronômica?\""
1601205-11 = "Q-que tipo de ideia é essa? Parece que eu só penso em comer 24 horas por dia!"
1601205-12 = "[s] \"Não é verdade?\""
1601205-13 = "Claro que não, né!? Quer levar um tiro!?"
1601205-14 = "[s] \"Definitivamente, estudantes são assustadoras...\""
1601205-22 = "Por enquanto, saímos sem rumo, mas..."
1601205-23 = "Ah, uma árvore de Natal. Ainda está aqui."
1601205-24 = "[s] \"Deve ser trabalhoso montar e desmontar, né.\""
1601205-26 = "Bem, a limpeza depois de um festival é sempre difícil."
1601205-27 = "Além disso, pensando bem, o Ano Novo vem logo depois do Natal."
1601205-28 = "Hã? Você já deixou a árvore de Natal montada até a primavera?"
1601205-29 = "...Isso é algo que eu não consigo defender."
1601205-33 = "A neve da noite passada ainda não derreteu."
1601205-34 = "Quando você vê neve fresca, não dá vontade de deixar pegadas?"
1601205-35 = "...Dá vontade de deitar de costas e mexer os braços e pernas? Que coisa de criança..."
1601205-36 = "Mesmo adultos, às vezes, querem voltar a ser crianças...?"
1601205-37 = "...Sensei, às vezes você diz coisas como se sua personalidade tivesse mudado de repente."
1601205-73 = "Tem muita gente aqui... Será que todos eles são como nós?"
1601205-74 = "Se for porque eles estão tristes pelo fim do feriado... seria um pouco interessante."
1601205-75 = "Hã, será que é porque a passagem do fim de ano em si é triste...?"
1601205-76 = "Com certeza, tem isso também. É uma época em que sentimos muitas coisas."
1601205-77 = "(Ronco alto do estômago...)"
1601205-78 = "(O estômago da Junko roncou alto)"
1601205-79 = "..."
1601205-80 = "[s] \"...\""
1601205-81 = "..."
1601205-82 = "[s] \"...\""
1601205-83 = "N-n-n-não é nada disso! Eu disse que não é!"
1601205-84 = "É sério, não é! Quer dizer... não é que não seja, mas de qualquer forma, não é! Entendeu? Eu disse que não é!"
1601205-85 = "[s3] \"Mas, falando nisso, Junko...\"\n[s4] \"Você estava olhando para a comida o tempo todo. Desculpe por não ter dito nada.\""
1601205-88 = "C-cala a boca!!"
1601205-96 = "(Levou um golpe certeiro)"
1601205-97 = "(Embora tenha sido merecido, dói bastante...)"
1601205-99 = "[ns] \"Aqui, pode pegar.\""
1601205-100 = "Isso é... Oshiruko?"
1601205-101 = "Sim, talvez seja exatamente o que eu estava querendo."
1601205-102 = "Obrigada, Sensei. Vou aceitar."
1601205-105 = "[wa:80]— Aqui, [wa:500] Sensei. [wa:900] Vou te dar um,"
1601205-108 = "— E, [wa:440] por que você está tão surpreso!"
1601205-110 = "— F- [wa:600] foi só coincidência ter vindo a mais!"
1601205-113 = "[wa:1000]— Quer dizer, isso,"
1601205-115 = "— Foi você quem comprou, Sensei..."
1601205-118 = "[wa:100]— Além disso, [wa:800] hoje o dia todo..."
1601205-121 = "[wa:870]― (Falando nisso, [wa:1200] hoje eu passei o dia todo com o Sensei...)"
1601205-123 = "― (Uau, [wa:700] o que eu estou pensando, [wa:900] meu Deus!)"
1601205-126 = "― Já chega! [wa:900] Eu disse que eu vou te dar, então..."
1601205-128 = "[wa:100]― Não tem problema, tem?"
1601205-131 = "Haa... De alguma forma, estou estranhamente cansada."
1601205-132 = "……Eu não estou com uma cara de quem também está cansada?"
1601205-133 = "O Sensei é um adulto, então precisa se manter firme."
1601205-134 = "Ah, já é essa hora... Mas, ninguém vai embora, né?"
1601205-135 = "B-bem, já que estamos aqui, nós somos iguais a eles..."
1601205-136 = "[s] \"Conto com você daqui para frente também.\""
1601205-137 = "……Eh, o-o que foi isso de repente!? Uma saudação de Ano Novo!?"
1601205-138 = "Não, é que, não é que eu não goste, mas..."
1601205-139 = "Haa... Entramos em um fluxo estranho onde eu quero retrucar, mas não consigo..."
1601205-143 = "……Eu que digo. Conto com você daqui para frente também, Sensei."
