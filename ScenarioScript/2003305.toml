[translation]
2003305-1 = "偉大な議長の休日"
2003305-2 = "（次の休日、シャーレ近くのショッピングモールにやって来た）"
2003305-3 = "[ns] \"今日はせっかくだし、お肉でも買って――ん？\""
2003305-8 = "[ns] \"……あれは、マコト？\""
2003305-9 = "うーん……これも違う。あれも……違うな。"
2003305-10 = "……くしゅんっ。"
2003305-11 = "どうなってるんだ……？同じ商品かと思えば、デラックスだとかインペリアルだとか……まさか期間限定版まであるとは……"
2003305-12 = "はくしょん！"
2003305-13 = "あぁ、このマコト様を惑わしてくるとは……"
2003305-14 = "は……は、はくしょんっ！"
2003305-15 = "ぐああ！もう少し分かりやすくならないのか！#n……ぐしゅんっ。"
2003305-16 = "[s] \"マコト、こんなところで何してるの？\""
2003305-17 = "ぬおわあぁぁぁぁぁ！？"
2003305-18 = "……は、はくしょん！ゲホゲホゲホゲホッ！！！"
2003305-19 = "[s] \"大丈夫！？\""
2003305-20 = "ゲホッゲホッ……はぁ、はぁ……っ、ぐしゅん。"
2003305-21 = "ゆったりとショッピングを楽しんでいるこの私に話しかけてくるなんて、どこの命知らずかと思いきや先生だったか。"
2003305-22 = "[s] （ゆったり楽しんでいるようには見えなかったけど……）"
2003305-23 = "……あぁ、ここで何をしてたのかって？"
2003305-24 = "必要なものがあっ――"
2003305-25 = "……あっ、っくしょん！"
2003305-26 = "ぐずっ……ずずっ。"
2003305-27 = "……必要なものがあって、ちょっと買い物に来ただけだ。"
2003305-28 = "[s] \"マコトが自分で買い物に来るなんて、ちょっと意外だね。\""
2003305-29 = "……ぐじゅんっ……ふぅ。"
2003305-30 = "……リーダーたるもの、自ら動くのは当然だろう。"
2003305-31 = "キキッ、そういう先生も買い物か？"
2003305-32 = "……新発売のペロロ様グッズを見に来た、って？#n……このカバのことか？"
2003305-33 = "……はっ……はっ、はっくしょん！"
2003305-34 = "ペロロ様はカバじゃない……？#nよく分からんな。"
2003305-35 = "[s1] \"そ、それよりマコトは何を買いに来たの？\"\n[s2] \"そのカゴに入ってるのって……\""
2003305-38 = "キシシッ。そうだ、見ての通り猫用のおもちゃとおやつの「にゃ～る」だ。"
2003305-39 = "全部、エンペラー・ライオンマル・ジュニア3世のためにな。"
2003305-40 = "[s] \"ライオンマルって、たしか……\""
2003305-41 = "そういえば、先生は会っていたか。"
2003305-42 = "キキッ。舌が肥えているのか、適当な餌をやっても食べようとすらしない。#nそれで今日は、わざわざ私が買いに来たのだ。"
2003305-43 = "[s] \"あっ、この間のモモトークは……すごく可愛がってるんだね。\""
2003305-44 = "この私が、猫を可愛がっているだと？"
2003305-45 = "何か勘違いしているな？"
2003305-46 = "[s] \"……うん？\""
2003305-47 = "この私がライオンマルを引き取ったのは、あくまでビジネスだ。"
2003305-48 = "つまり、投資目的だな。ライオンマルは、いずれ万魔殿のシンボルとなる。"
2003305-49 = "ライオンマルの内側には……凶暴な野生が眠っている。#nこいつは磨けば磨くほど光るに違いない。"
2003305-50 = "育て上げて、いつ[ruby=パンデモニウム・ソサエティー]か万魔殿の[/ruby]代表、[ruby=はぬま]羽沼[/ruby]マコト様の忠実なお供に――"
2003305-51 = "……はっくしょん！"
2003305-52 = "……するのが、最終的な目標だ。"
2003305-53 = "キキキッ……ぐすん……ずずっ、ライオンマルめ。"
2003305-54 = "このまま面倒を見てやれば、いつか勇ましいライオンに成長するはず……！"
2003305-55 = "[s] \"マコト、猫は大きくなってもライオンにはならないよ……\""
2003305-56 = "はっくしょん！"
2003305-57 = "キキッ、それは気合いが足りていないだけだな。"
2003305-58 = "そうしてライオンマル専用の動画投稿チャンネルを作り……#n万魔殿を宣伝するためにこき使ってやるのだ！"
2003305-59 = "さあ、どうだ先生よ。この私の壮大な計画を聞いた感想は。"
2003305-60 = "万魔殿の勢いが増す前に協力しておいた方が賢明じゃないのか？"
2003305-61 = "ここで私と手を組むのなら、まだ誰にも触れさせていないライオンマルの肉球を触る機会を与えよう。"
2003305-62 = "ん？いくら何でも肉球に釣られはしない、だと？"
2003305-63 = "キキッ。この写真を見れば、そうも余裕な態度でいられなくなるぞ？"
2003305-64 = "[s] \"やっぱり可愛がってるよね……？\""
2003305-65 = "そういう個人的な感情で……"
2003305-66 = "は……ずずっ。"
2003305-67 = "感情では――"
2003305-71 = "[ns] \"マコト、大丈夫？何だか顔色が……\""
2003305-72 = "は、は、はあっくしょん！"
2003305-73 = "ゲホゲホッ……グフッ！？"
2003305-78 = "[ns] \"ま……マコト！？\""
2003305-80 = "ゲヘナ・病院"
2003305-81 = "猫アレルギーですね。"
2003305-82 = "なっ……！？"
2003305-83 = "は、は――"
2003305-84 = "はくしょん！"
2003305-85 = "はっっくしょん！！！"
2003305-86 = "[s] \"…………やっぱり。\""
2003305-87 = "いや……そんなわけが……"
2003305-88 = "[s] \"マコト、ライオンマルを飼ってから何か変わったことは？\""
2003305-89 = "変わったこと……うむ。#nライオンマルを触るたびに、肌が痒くなったり、鼻水が垂れたり……"
2003305-90 = "くしゃみが止まらなくなったり、喉の痛みや咳が出たくらいだな。"
2003305-91 = "まさか、その程度でこの私が猫アレルギーだと？#n診断が間違っているんじゃないか！？"
2003305-92 = "[s] \"むしろ、どう考えても猫アレルギーだよ！？\""
2003305-96 = "軽度の症状なら、ある程度は抑えられますが……"
2003305-97 = "これほど重い場合は難しいでしょう。"
2003305-98 = "[s] \"じゃあ、猫の飼育は……\""
2003305-99 = "はい、とても申し上げにくいのですが……"
2003305-100 = "アレルギー症状が酷い状態で、一緒に暮らすのは危険かと……"
2003305-101 = "キキッ。"
2003305-102 = "キキキッ、キキキキキッ……！"
2003305-103 = "キャハハハッ…………"
2003305-104 = "ゲホッゲホッ！！"
2003305-105 = "[s] \"マコト……！\""
2003305-106 = "……ぐっ。アレルギーがあるから、猫と一緒に暮らすのはやめろだと？"
2003305-107 = "……そうはいかん。"
2003305-108 = "一度引き取った以上、たとえアレルギーを引き起こそうと最後まで責任を持って世話をする。それが、この羽沼マコト様の信念だ！"
2003305-109 = "先程の話は聞かなかったことにしよう。"
2003305-110 = "[s] \"マコト、本当に大丈夫なの……？\""
2003305-111 = "キシシッ、問題ない。もちろん、今までのように触れ合う頻度は減らそう。"
2003305-112 = "しかし、この程度でマコト様の偉大な計画は崩れやしない！"
2003305-113 = "ライオンマルを動画投稿サイトにデビューさせて、万魔殿の名を世に知らしめる立派な存在として育て上げてみせる。その日を楽しみにしているのだ、先生よ！"
2003305-114 = "[s] \"マコトらしい計画だね、私も応援するよ。\""
2003305-115 = "キキキッ！キキキキキッ！！！"
2003305-116 = "………………ゲホゲホッゲホッ！"
2003305-118 = "（それから数日後、シャーレで仕事をしていると……）"
2003305-122 = "[ns] \"……マコト？\""
2003305-124 = "不本意だが、ライオンマルの世話係は部員に任せることになった。"
2003305-125 = "とはいえ、今後も欠かさず見守るとも。#n先生にも、奴の勇ましい姿を定期的に共有してやろうじゃないか。"
2003305-126 = "今度こそ万魔殿に協力すると言うのなら……秘蔵の写真も送ってやるぞ？"
2003305-127 = "[ns] \"……やっぱり、ちゃんと可愛がってるんだね。\""
2003305-128 = "（そうして、マコトから送られてきたライオンマルの写真を見ながら、癒やしの時間を過ごした）"
