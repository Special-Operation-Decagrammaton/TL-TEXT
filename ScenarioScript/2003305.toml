[translation]
2003305-1 = "O feriado da grande presidente"
2003305-2 = "（No feriado seguinte, cheguei ao shopping perto do Schale）"
2003305-3 = "[ns] \"Já que hoje é um dia especial, vou comprar uma carne... hein?\""
2003305-8 = "[ns] \"...Aquela é a Makoto?\""
2003305-9 = "Hum... isso também não é. Aquilo também... não é."
2003305-10 = "...Atchim."
2003305-11 = "O que está acontecendo...? Achei que fossem o mesmo produto, mas tem 'Deluxe', 'Imperial'... e pensar que até tem uma edição limitada..."
2003305-12 = "Atchim!"
2003305-13 = "Ah, pensar que isso ia confundir a grande Makoto..."
2003305-14 = "Ah... ah, atchim!"
2003305-15 = "Grrr! Não poderiam deixar isso mais fácil de entender? #n...Snif."
2003305-16 = "[s] \"Makoto, o que está fazendo aqui?\""
2003305-17 = "Nuoooaahhh!?"
2003305-18 = "...Ah, atchim! Cof, cof, cof, cof!!!"
2003305-19 = "[s] \"Você está bem!?\""
2003305-20 = "Cof, cof... haa, haa... snif."
2003305-21 = "Eu estava aproveitando minhas compras tranquilamente, e quando me pergunto quem é o imprudente que vem falar comigo, era você, Sensei."
2003305-22 = "[s] （Não parecia que ela estava aproveitando tranquilamente...）"
2003305-23 = "...Ah, o que eu estava fazendo aqui?"
2003305-24 = "Eu precisava de algumas coisas e—"
2003305-25 = "...Ah, atchim!"
2003305-26 = "Snif... snif."
2003305-27 = "...Eu só vim fazer umas compras porque precisava de algumas coisas."
2003305-28 = "[s] \"É um pouco surpreendente ver a Makoto vindo fazer compras pessoalmente.\""
2003305-29 = "...Snif... ufa."
2003305-30 = "...Como líder, é natural que eu mesma tome a iniciativa."
2003305-31 = "Hehe, você também veio fazer compras, Sensei?"
2003305-32 = "...Veio ver os novos produtos do Peroro-sama? #n...Você está falando desse hipopótamo?"
2003305-33 = "...Ah... ah, atchim!"
2003305-34 = "O Peroro-sama não é um hipopótamo...? #nNão entendo nada disso."
2003305-35 = "[s1] \"Mas, mudando de assunto, o que a Makoto veio comprar?\"\n[s2] \"O que tem aí nessa cesta...\""
2003305-38 = "Kishishi. Isso mesmo, como pode ver, são brinquedos para gato e petiscos 'Nya-ru'."
2003305-39 = "Tudo para o Imperador Lionmaru Júnior III."
2003305-40 = "[s] \"Lionmaru, se não me engano...\""
2003305-41 = "Falando nisso, você já conheceu ele, Sensei?"
2003305-42 = "Hehe. Ele deve ter um paladar refinado, porque nem tenta comer se eu der qualquer ração. #nPor isso, hoje, eu mesma vim comprar pessoalmente."
2003305-43 = "[s] \"Ah, sobre aquele Momotalk de outro dia... você parece gostar muito dele.\""
2003305-44 = "Eu, gostar de um gato?"
2003305-45 = "Você está entendendo tudo errado."
2003305-46 = "[s] \"...Hum?\""
2003305-47 = "Eu adotei o Lionmaru estritamente por negócios."
2003305-48 = "Ou seja, é um investimento. O Lionmaru, eventualmente, se tornará o símbolo do Pandemonium."
2003305-49 = "Dentro do Lionmaru... dorme uma fera selvagem. #nTenho certeza de que, quanto mais eu treiná-lo, mais ele brilhará."
2003305-50 = "Vou criá-lo para ser o companheiro fiel da representante do Pandemonium, Hanuma Makoto—"
2003305-51 = "...Atchim!"
2003305-52 = "...Esse é o meu objetivo final."
2003305-53 = "Hehehe... snif... snif, esse Lionmaru..."
2003305-54 = "Se eu continuar cuidando dele assim, ele certamente crescerá e se tornará um leão corajoso...!"
2003305-55 = "[s] \"Makoto, gatos não viram leões quando crescem...\""
2003305-56 = "Atchim!"
2003305-57 = "Kiki, isso é só falta de determinação."
2003305-58 = "E assim, criarei um canal de vídeos dedicado ao Lionmaru... e farei ele trabalhar duro para promover o Pandemonium!"
2003305-59 = "E então, Sensei? O que achou do meu plano grandioso?"
2003305-60 = "Não seria mais sensato cooperar antes que o Pandemonium ganhe ainda mais força?"
2003305-61 = "Se você se aliar a mim agora, darei a oportunidade de tocar nas almofadinhas do Lionmaru, que ninguém mais tocou."
2003305-62 = "Hm? Você diz que não vai ser convencido por almofadinhas?"
2003305-63 = "Kiki. Se você vir esta foto, não vai conseguir manter essa atitude tão relaxada, não é?"
2003305-64 = "[s] \"Você realmente gosta dele, não é...?\""
2003305-65 = "Com sentimentos pessoais assim..."
2003305-66 = "Ha... snif."
2003305-67 = "Com sentimentos――"
2003305-71 = "[ns] \"Makoto, você está bem? Sua pele está meio...\""
2003305-72 = "Ha, ha, ha-atchim!"
2003305-73 = "Cof, cof... Guf!?"
2003305-78 = "[ns] \"Ma... Makoto!?\""
2003305-80 = "Gehenna - Hospital"
2003305-81 = "É alergia a gatos."
2003305-82 = "O quê...!?"
2003305-83 = "Ha, ha――"
2003305-84 = "Atchim!"
2003305-85 = "Atchiiim!!!"
2003305-86 = "[s] \"............Eu sabia.\""
2003305-87 = "Não... não pode ser..."
2003305-88 = "[s] \"Makoto, algo mudou desde que você adotou o Lionmaru?\""
2003305-89 = "Algo mudou... hum. Toda vez que toco no Lionmaru, minha pele coça e meu nariz escorre..."
2003305-90 = "E meus espirros não param, além de dor de garganta e tosse."
2003305-91 = "Por acaso, você acha que eu tenho alergia a gatos só por causa disso? O diagnóstico não está errado!?"
2003305-92 = "[s] \"Pelo contrário, como você pode pensar que não é alergia a gatos!?\""
2003305-96 = "Se os sintomas forem leves, podemos controlá-los até certo ponto, mas..."
2003305-97 = "Será difícil se for tão grave assim."
2003305-98 = "[s] \"Então, criar o gato...\""
2003305-99 = "Sim, é muito difícil dizer isso, mas..."
2003305-100 = "Com sintomas alérgicos tão severos, acho perigoso viverem juntos..."
2003305-101 = "Kiki."
2003305-102 = "Kikiki, kikikiki...!"
2003305-103 = "Kyahaha..."
2003305-104 = "Cof, cof!!"
2003305-105 = "[s] \"Makoto...!\""
2003305-106 = "...Guh. Você está dizendo para eu parar de viver com o gato porque tenho alergia?"
2003305-107 = "...Isso não vai acontecer."
2003305-108 = "Uma vez que o adotei, cuidarei dele com responsabilidade até o fim, mesmo que isso me cause alergia. Essa é a convicção de Hanuma Makoto!"
2003305-109 = "Vamos fingir que não ouvimos o que foi dito antes."
2003305-110 = "[s] \"Makoto, você está realmente bem...?\""
2003305-111 = "Kishishi, sem problemas. Claro, vou diminuir a frequência com que o toco, como antes."
2003305-112 = "Mas, nem mesmo isso vai arruinar o grande plano da Makoto-sama!"
2003305-113 = "Vou fazer o Lionmaru estrear em um site de vídeos e criá-lo para ser uma criatura magnífica que fará o nome do Pandemonium ser conhecido pelo mundo. Aguarde por esse dia, Sensei!"
2003305-114 = "[s] \"É um plano bem a sua cara, eu vou torcer por você.\""
2003305-115 = "Kikiki! Kikikiki!!!"
2003305-116 = "............Cof, cof, cof!"
2003305-118 = "(Alguns dias depois, enquanto eu trabalhava no Schale...)"
2003305-122 = "[ns] \"……Makoto?\""
2003305-124 = "É contra a minha vontade, mas decidi deixar os cuidados do Lion-maru a cargo dos membros do clube."
2003305-125 = "Dito isso, continuarei vigiando-o sem falta. #nQue tal compartilharmos regularmente a figura valente dele com o Sensei também?"
2003305-126 = "Se você disser que vai cooperar com o Pandemonium desta vez... eu até te envio algumas fotos exclusivas, sabe?"
2003305-127 = "[ns] \"……No fim das contas, você realmente cuida bem dele, né.\""
2003305-128 = "（E assim, enquanto olhava para as fotos do Lion-maru enviadas por Makoto, passei um momento relaxante）"
