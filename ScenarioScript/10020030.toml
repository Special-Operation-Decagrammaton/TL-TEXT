[translation]
10020030-9 = "Shiroko-senpai, você veio..."
10020030-10 = "Desta vez eu não vou deixar você escapar~"
10020030-15 = "Prepare-se!"
10020030-16 = "Shiroko-chan! Por favor, renda-se pacificamente!"
10020030-22 = "[ns1] \"Shiroko, eu só quero saber de uma coisa.\"\n[ns2] \"Por que você está seguindo as ordens de Phrenapates?\""
10020030-25 = "……Não é isso, Sensei."
10020030-26 = "Não sou eu quem está seguindo as ordens de Phrenapates — é o contrário."
10020030-27 = "[s] \"O 'contrário'...?\""
10020030-28 = "……O 'Guia do Cromatismo' é quem está seguindo as minhas ordens."
10020030-29 = "[ns] \"O que você quer dizer com isso...?\""
10020030-30 = "Localizei a posição atual da Shiroko-san!"
10020030-31 = "A Shiroko-san está na... 4ª área da Arca, em uma seção isolada. Capturei o sinal de lá!"
10020030-37 = "A 4ª área, você diz..."
10020030-39 = "Sim. Fica longe do 'Motor Dimensional' da 3ª área, onde vocês estão agora."
10020030-40 = "……."
10020030-41 = "Hm...? Mas a Shiroko-chan está bem aqui na minha frente...?"
10020030-45 = "……Aí também... está?"
10020030-46 = "I-isso é... o que significa...? Está indicando que a Shiroko-san também existe aí...?"
10020030-47 = "Na 4ª área e no 'Motor Dimensional' da 3ª área onde estamos agora...?"
10020030-48 = "O quê... A Shiroko-san está existindo em dois lugares ao mesmo tempo nesta Arca...? E-espere um pouco. Será que... eu, essa genial beldade, cometi um erro...?"
10020030-49 = "……Não, provavelmente não foi um erro. #nObrigada, você me deu uma informação valiosa."
10020030-50 = "Eh...?"
10020030-51 = "Entendi, então era isso — finalmente compreendi."
10020030-52 = "Eu achava que a Shiroko-chan tinha mudado por causa daquele tal de 'Cromatismo'... #nMas eu estava enganada."
10020030-53 = "……Não era nada disso."
10020030-59 = "Essa 'Shiroko' não é a 'Shiroko-chan' que nós conhecemos."
10020030-60 = "[s3] \"………………\"\n[s4] \"………………Eh?\""
10020030-64 = "Eh...!?"
10020030-65 = "O-o que você está dizendo, Hoshino-senpai?"
10020030-66 = "Não é... a Shiroko-senpai que nós conhecemos...?"
10020030-74 = "A, a Shiroko-senpai entrou em posição de combate novamente...!"
10020030-75 = "Por favor, preparem-se para contra-atacar!"
10020030-76 = "Para descobrir a verdade, precisamos enfrentá-la de frente. #nPor enquanto, vamos nos concentrar nesta batalha!"
10020030-77 = "[ns] \"……Entendido! Por enquanto, vamos avançar!!\""
10020030-78 = "Sim!! A partir de agora, vamos subjugar a Shiroko-senpai e destruir o 'Motor Dimensional'!!"
10020030-79 = "Sensei, por favor, lidere-nos!"
