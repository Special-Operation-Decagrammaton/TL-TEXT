[translation]
10020030-9 = "シロコ先輩、来ましたね……。"
10020030-10 = "今度こそ逃さないよ～"
10020030-15 = "覚悟してよね！"
10020030-16 = "シロコちゃん！おとなしく捕まってください！ "
10020030-22 = "[ns1] \"シロコ、1つだけ教えてほしい。\"\n[ns2] \"どうして、プレナパテスの命令を聞いてるの？\""
10020030-25 = "……違う、先生。"
10020030-26 = "私がプレナパテスの命令を聞いてるんじゃなくて――逆。"
10020030-27 = "[s] \"「逆」……？\""
10020030-28 = "……「色彩の[ruby=きょうどうしゃ]嚮導者[/ruby]」が、私の命令を聞いてるの。"
10020030-29 = "[ns] \"どういうこと……？\""
10020030-30 = "シロコさんの現在位置を特定しました！"
10020030-31 = "シロコさんは――箱舟の第4エリア、閉鎖されたセクションにいます。そこから信号をキャッチしました！"
10020030-37 = "第4エリア、というと……"
10020030-39 = "ええ。今みなさんが居る第3エリアの「次元エンジン」とは距離があります。"
10020030-40 = "……。"
10020030-41 = "ん……？シロコちゃんは、目の前にいるけど……？"
10020030-45 = "……そちらにも……ですか？"
10020030-46 = "こ、これは……一体……そちらにもシロコさんが存在すると表示されて――？"
10020030-47 = "第4エリアと、今いる第3エリアの「次元エンジン」に……？ "
10020030-48 = "なっ……シロコさんは、今この箱舟に二人同時に存在していると……？ま、待ってください。ま、さか……この天才美少女である私が、ミスを……！？ "
10020030-49 = "……いや、それは多分ミスじゃないよ。#n良いことを聞いたよ、ありがとね。"
10020030-50 = "え……？"
10020030-51 = "そっかぁ、そういう事だったんだねぇ――やっと分かったよ。"
10020030-52 = "「色彩」とかいうヤツのせいで、シロコちゃんが変わってしまった――#nそう思ってたんだけどさ。 "
10020030-53 = "……そうじゃなかったんだね。"
10020030-59 = "[ruby=アレ]「シロコ」[/ruby]は、私たちの知ってる「シロコちゃん」じゃない。"
10020030-60 = "[s3] \"………………\"\n[s4] \"………………え？\""
10020030-64 = "えっ……！？"
10020030-65 = "な、何言ってるのよホシノ先輩。"
10020030-66 = "私たちの知っている……シロコ先輩じゃ、ない……？"
10020030-74 = "し、シロコ先輩、再び戦闘態勢に突入……！ "
10020030-75 = "応戦をお願いします！"
10020030-76 = "真実が何かは、ちゃんとぶつかってみないとね。#n今はこの戦闘に集中するよ！"
10020030-77 = "[ns] \"……分かった！今はとりあえず、進もう！！\" "
10020030-78 = "はい！！これより、シロコ先輩を制圧し「次元エンジン」を破壊します！！ "
10020030-79 = "先生、指揮をお願いします！"
