[translation]
84308100400-5 = "（セイアは事の顛末を説明した）"
84308100400-8 = "……他に目立ったものはなかったよ。"
84308100400-9 = "悪意のある行動ではなかったと判明して良かったわ。"
84308100400-10 = "そういえば……。"
84308100400-11 = "ネルはどこかしら。一緒だったのではなくて？"
84308100400-15 = "それは……。"
84308100400-16 = "どうかしたの？"
84308100400-17 = "いや、じき戻るだろう。"
84308100400-21 = "どうも……彼女たちには説教が必要なようでね。"
84308100400-26 = "そ、そう……。"
