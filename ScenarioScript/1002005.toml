[translation]
1002005-1 = "O que você quer?"
1002005-2 = "Ah. Se, Sensei, por aqui..."
1002005-3 = "Sente-se ali... você precisa ficar onde eu possa te ver, entendeu?"
1002005-4 = "[s1] \"Você reservou um lugar para mim? Obrigado.\"\n[s2] \"Primeiro, quer beber alguma coisa?\""
1002005-5 = "S-sim. Eu já pedi as bebidas, então está tudo bem... não faça nada estranho, Sensei."
1002005-6 = "S-sim. Eu já pedi as bebidas, então está tudo bem... não faça nada estranho, Sensei."
1002005-7 = "Se você ficar fora da minha vista, eu não sei o que está fazendo e fico ansiosa... foi só por isso que te chamei."
1002005-8 = "E, e também..."
1002005-9 = "Além disso, eu tenho um assunto para tratar, mas..."
1002005-10 = "É, vigilância. Basicamente, é só para vigiar o Sensei como um membro do Comitê de Justiça, nada mais...!"
1002005-11 = "[s3] \"O assunto seria isso que você está tentando resolver agora, Koharu?\"\n[s4] Olho para o caderno aberto nas mãos de Koharu."
1002005-12 = "……!?"
1002005-13 = "……!?"
1002005-14 = "I-isso é..."
1002005-15 = "Bem, como posso dizer, é só uma coisa que surgiu..."
1002005-16 = "[s5] \"É aquela parte que você disse que queria que eu te explicasse outro dia?\"\n[s6] \"Você podia ter dito isso desde o começo.\""
1002005-17 = "É que, sabe..."
1002005-18 = "É que, sabe..."
1002005-19 = "S-sim..."
1002005-20 = "Se, Sensei, você vai me ajudar, né...?"
1002005-21 = "Digo, no sentido de estudar normalmente..."
1002005-22 = "……? Ah, obrigada."
1002005-23 = "V-você aceitou tão fácil assim...?"
1002005-24 = "Ah, a matéria?"
1002005-25 = "Ah, bem, é a partir daqui, primeiro..."
1002005-27 = "(Embora ela estivesse inquieta no começo, conforme avançávamos nos estudos, Koharu parecia estar se acalmando aos poucos.)"
1002005-28 = "(Apesar de ter muitas perguntas, não eram nada tão difícil.)"
1002005-29 = "(Embora tenha levado um tempo para entender a parte básica, depois disso, as coisas fluíram melhor do que o esperado.)"
1002005-31 = "Terminei..."
1002005-32 = "Sinceramente, eu não achei que fosse terminar... e tão rápido assim..."
1002005-33 = "Inacreditável..."
1002005-34 = "Isso é o Sensei..."
1002005-35 = "……?"
1002005-36 = "……Ah!"
1002005-37 = "B-bem, é claro, isso é o mínimo..."
1002005-38 = "Já que você é o Sensei..."
1002005-39 = "M-mas..."
1002005-40 = "É, Sensei... o-obrigada..."
1002005-41 = "……Sensei?"
1002005-42 = "O que você está olhando aí faz um tempo...?"
1002005-43 = "[s7] \"Que livro é esse que está aí?\"\n[s8] \"Tem algo nele que você queira perguntar também?\""
1002005-44 = "Isso... o que era mesmo, bem...?"
1002005-45 = "Isso... o que era mesmo, bem...?"
1002005-46 = "Este livro é... opa,"
1002005-47 = "……Ah."
1002005-48 = "……."
1002005-50 = "[s] \"…….\""
1002005-52 = "[s9] \"Então era esse tipo de livro mesmo...\"\n[s10] \"Acho que esse tipo de coisa ainda não é para a sua idade, Koharu...\""
1002005-53 = "……."
1002005-54 = "……."
1002005-55 = "……!"
1002005-56 = "……～～～～$#^@%#$@！！！！"
1002005-57 = "%$^#&%$%#$@^!!@#$^～～！！！"
1002005-59 = "(Clang, CLANGGGGG!!)"
1002005-61 = "(……Minhas memórias vão apenas até aquele ponto)"
1002005-62 = "(Desmaiei com a força da mesa sendo virada e não me lembro do que aconteceu depois)"
