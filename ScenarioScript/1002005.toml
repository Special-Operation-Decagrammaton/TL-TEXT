[translation]
1002005-1 = "何の用？"
1002005-2 = "あ。せ、先生、こっち……。"
1002005-3 = "そこに座って……ちゃ、ちゃんと私の目の届くところにいてもらわないと……。"
1002005-4 = "[s1] \"席、取っておいてくれたの？ありがとう。\"\n[s2] \"とりあえず、何か飲む？\""
1002005-5 = "う、うん。飲み物も私が先に頼んでおいたから大丈夫……先生は何も変なことしないで。"
1002005-6 = "う、うん。飲み物も私が先に頼んでおいたから大丈夫……先生は何も変なことしないで。"
1002005-7 = "見えないところにいると、何してるか分からなくて不安だから……それで呼んだだけ。"
1002005-8 = "そ、それと……"
1002005-9 = "それ以外にも一応、用はあるけど……。"
1002005-10 = "か、監視。基本的には、あくまで正義実現委員会の一員として先生を監視するためだから……！"
1002005-11 = "[s3] \"用事って、今コハルが解いてるそれ？\"\n[s4] コハルの手元に広げられたノートに目をやる。"
