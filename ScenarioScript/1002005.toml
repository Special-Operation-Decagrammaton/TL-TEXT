1002005-16 = "[s5] \"この前言ってた、教えてほしいところ？\"\n[s6] \"最初からそう言ってくれても良かったのに。\""
1002005-17 = "だって、その……。"
1002005-18 = "だって、その……。"
1002005-19 = "う、うん……。"
1002005-20 = "せ、先生、手伝ってくれるよね……？"
1002005-21 = "純粋に、普通に勉強をって意味で……。"
1002005-22 = "……？あ、ありがとう。"
1002005-23 = "そ、そんな簡単に承諾してくれるんだ……？"
1002005-24 = "え、範囲？"
1002005-25 = "あ、えっとここからだけど、まず……"
1002005-27 = "（しばらくは挙動不審だったけれど、勉強を進めるにつれてコハルも少しずつ落ち着いてきたようだった）"
1002005-28 = "（質問はたくさんあったものの、それほど難しいものではなく）"
1002005-29 = "（基本的な部分を理解するのに少し時間がかかったものの、その後は想像以上にするすると進むことができたようだった）"
1002005-31 = "終わった……。"
1002005-32 = "正直終わると思ってなかった……それに、こんなに早く……。"
1002005-33 = "信じられない……。"
1002005-34 = "これが、先生……。"
1002005-35 = "……？"
1002005-36 = "……はっ！"
1002005-37 = "そ、そりゃそっか、これくらい……。"
