[translation]
90000055-2 = "お疲れ様でした先生、エイミ。"
90000055-6 = "……データはこれだけあれば十分そうですね。"
90000055-7 = "うん。この程度なら大した敵じゃない。"
90000055-8 = "次は私の番ですね。収集したデータを逆追跡して……。"
90000055-14 = "ふむ……なるほど。"
90000055-15 = "そうですね……これは、少し時間がかかるかもしれません。"
90000055-16 = "ケセドの座標を計算しますので、お二人は少しだけ休んでいてください。"
90000055-17 = "うん、分かった。"
90000055-21 = "[ns] \"ありがとう。よろしくね、ヒマリ。\""
90000055-23 = "次回;「データ収集（６）ケセド」"
