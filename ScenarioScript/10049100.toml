[translation]
10049100-1 = "Episódio 10; Finale"
10049100-3 = "A-abram alas, por favor!!"
10049100-8 = "Ei, não empurra!"
10049100-9 = "O-o quê? Estão sendo perseguidos por uma garota mágica?"
10049100-11 = "[ns] \"Mashiro! Consegue dar suporte?\""
10049100-12 = "Estou relatando a situação, mas a permissão ainda não foi concedida."
10049100-13 = "Disseram que a intervenção ainda está sendo discutida pelo comitê."
10049100-14 = "Continuarei rastreando o alvo!"
10049100-15 = "Vocês são muito insistentes!!"
10049100-16 = "Já que é assim... vou dar uma lição em vocês com uma granada de luz com água de Yin-Yang!!"
10049100-21 = "Uma granada de luz!?"
10049100-22 = "(!? Na direção do Sensei!?)"
10049100-23 = "[ns] \"E-ei, espera!\""
10049100-27 = "[ns] \"Suzumi!? Você está bem!?\""
10049100-28 = "Sensei, você é quem deveria estar bem?"
10049100-29 = "Parece que você não se feriu... Que bom."
10049100-30 = "[s] \"Foi graças a você ter me protegido, Suzumi!\""
10049100-31 = "Eu... protegendo o Sensei."
10049100-35 = "Então eu ainda tenho o poder de proteger alguém..."
10049100-36 = "Ei, ei... alguma coisa White! Sensei também! Se continuarem assim, eles vão escapar!"
10049100-37 = "E outra... não acha que já está na hora de se afastar do Sensei?"
10049100-38 = "!!"
10049100-43 = "V-vou perseguir o alvo!"
10049100-53 = "Chefe! Por aqui! Rápido, para o lado de Gehenna—"
10049100-60 = "Argh!!"
10049100-62 = "Tem mais gente do que eu pensava. #nSe o combate se prolongar, os arredores também vão sofrer danos...!"
10049100-67 = "White! Minha munição acabou!"
10049100-68 = "A minha também, este é o último pente...!"
10049100-69 = "Droga, a minha também acabou. Devia ter trazido mais..."
10049100-70 = "Fufu... fufufu... isso é uma grande enrascada! #n—Mas!"
10049100-76 = "Não pensem que podem derrotar Mirai Azuma com tão pouco! #nCom meus movimentos brilhantes—!"
10049100-78 = "Ah!! Essa é uma fala exclusiva do esquadrão de vigilância! Não use sem permissão!!"
10049100-79 = "Opa! Uma multidão bem ali! Com licença, só um minutinho!"
10049100-85 = "Ai! Quem pisou no meu pé!?"
10049100-86 = "Shiii! Vão descobrir onde estamos! Não faça barulho!"
10049100-87 = "Essa pessoa também faz parte do elenco do show?"
10049100-89 = "Eles se misturaram à multidão... não consigo saber onde estão!"
10049100-90 = "Parece que estão se movendo agachados..."
10049100-91 = "Daqui para frente é a área de Gehenna... que problemático."
10049100-95 = "...Ué? Onde a Shimiko-san foi parar..."
10049100-99 = "Finalmente você chegou, minha serva!"
10049100-107 = "Minha serva e fiel subordinado, o mercador do mal, \"Silver Plate\"!"
10049100-108 = "Que plano surpreendente, agir nas sombras misturada à multidão!"
10049100-109 = "Heavy Calibers! Com isso, a vitória está praticamente garantida!"
10049100-110 = "Já que eu — a executiva do mal, Ela, e o mercador do mal, Silver Plate, formamos a \"Ordem dos Cavaleiros do Mal\", vocês não têm chance de vencer!"
10049100-111 = "Para nos derrotar, vocês precisariam da ajuda de muitas pessoas, não é?"
10049100-112 = "Ohohoho!! A vitória é da nossa Ordem dos Cavaleiros do Mal!"
10049100-113 = "Eh...?"
10049100-114 = "Silver Plate, você estava falando... comigo agora há pouco?"
10049100-118 = "Bem, *cof cof*."
10049100-119 = "O show ainda está acontecendo, mas gostaria de fazer um pequeno anúncio!"
10049100-121 = "Shimiko-san? O que você está..."
10049100-122 = "Voltei a ser a Shimiko de sempre!"
10049100-124 = "Neste momento, o mercador do mal, Silver Plate, está escondido entre vocês!"
10049100-125 = "As Heavy Calibers parecem ter perdido o rastro do Silver Plate!"
10049100-126 = "Por isso..."
10049100-127 = "Precisamos da ajuda de todos vocês!"
10049100-128 = "O Silver Plate tem cabelos prateados e veste roupas brancas!"
10049100-129 = "Se o encontrarem, por favor, nos avisem usando seus bastões luminosos ou a lanterna do celular!"
10049100-130 = "Com o apoio de vocês, vamos guiar as Heavy Calibers até o Silver Plate!"
10049100-131 = "E-eh...!?"
10049100-132 = "Ah, ele está ali!"
10049100-133 = "Shiii!"
10049100-134 = "Ahaha! É a vingança da pipoca!"
10049100-136 = "Vamos, unam forças!!"
10049100-143 = "Ah, ele veio para cá!"
10049100-144 = "Que interessante! Por onde ele passa, tudo fica iluminado!"
10049100-145 = "Dessa forma, consigo saber a localização dele...!"
10049100-146 = "Não é uma má ideia."
10049100-147 = "Parece até mágica! É um milagre causado pelo poder de todos!"
10049100-148 = "...Ah, acabei me distraindo. Vamos capturá-lo antes que ele saia da multidão!"
10049100-152 = "Então eu vou por aqui!"
10049100-153 = "Eu cuidarei deste lado!"
10049100-158 = "Ofegante... O que é isso, qual é o problema de vocês!"
10049100-159 = "O plano era perfeito! Quem diria que conseguiriam mobilizar centenas de pessoas com apenas algumas palavras!"
10049100-163 = "A praça!"
10049100-164 = "Se eu cruzar aquela fronteira..."
10049100-172 = "Auh!?"
10049100-173 = "Chegou ao fim!"
10049100-174 = "Renda-se pacificamente!"
10049100-175 = "Ainda não...!"
10049100-179 = "Ugh!"
10049100-180 = "Por que você está atrapalhando o meu caminho!?"
10049100-181 = "Vendendo produtos de má qualidade e enganando crianças."
10049100-182 = "Além disso, há vítimas que foram enganadas por produtos falsos."
10049100-183 = "Para começar, não se deve vender explosivos desse tipo em um parque de diversões."
10049100-188 = "Kyaaa!"
10049100-193 = "!!"
10049100-194 = "Isso não é apenas um explosivo! É uma granada de germânio! É ótima para estimular a circulação sanguínea!"
10049100-195 = "Ah, entendo! Será que... você não gostou do produto?"
10049100-196 = "Isso é um problema... vocês compraram por vontade própria... Mas tudo bem, eu entendi! Vou abrir uma exceção e devolver o seu dinheiro desta vez!"
10049100-197 = "Eu não comprei nada de você."
10049100-198 = "Então por que está fazendo isso!? Por que está agindo assim! Será que alguém te mandou aqui!?"
10049100-199 = "Não. Estou apenas seguindo a minha própria justiça."
10049100-200 = "Do que você está falando...!? Isso não traz lucro nenhum para você!"
10049100-201 = "Hmm? Olhando bem, parece uma aluna de Trinity... você percebeu?"
10049100-202 = "Esta é a área de Gehenna! Pretende causar confusão em outro distrito?"
10049100-203 = "Além disso, você já está sem munição, não é? Eu já saquei tudo!"
10049100-205 = "..."
10049100-209 = "Suzumi-san!"
10049100-210 = "Mashiro, você poderia me dar apoio...?"
10049100-212 = "Sinto muito. #nNo momento, o alvo está na área de Gehenna, o que viola as regras de engajamento."
10049100-213 = "Estou aguardando a confirmação da permissão para abrir fogo. Por favor, aguarde um momento."
10049100-214 = "Não pode ser...!"
10049100-215 = "O Comitê de Justiça não pode simplesmente dar o fora? #nNós estamos conduzindo negócios legítimos aqui!"
10049100-216 = "……."
10049100-217 = "Eu não faço parte do Comitê de Justiça."
10049100-218 = "Ah, é mesmo?"
10049100-219 = "Ora, então por que não disse isso antes? #nSe é assim, eu também não tenho tempo a perder. Com licença—"
10049100-220 = "Vou te dizer três coisas antes de terminar."
10049100-224 = "Primeiro, não jogue granadas de luz na direção do Sensei. É perigoso. #nO que você pretende fazer se acertar ele?"
10049100-228 = "Segundo, eu não sou do Comitê de Justiça. E é verdade que eu não consegui me tornar parte do Comitê de Justiça."
10049100-232 = "E, terceiro."
10049100-234 = "Será que... #nVocê não conseguiu entrar no Comitê de Justiça mesmo querendo?"
10049100-236 = "Eu não consegui me adaptar ao grupo e fugi... Sou uma falha para o Comitê de Justiça."
10049100-238 = "Do que você está falando de repente!?"
10049100-239 = "Então, vou explicar de uma forma mais fácil de entender."
10049100-240 = "Quem está na sua frente agora é—"
10049100-242 = "Você é igualzinha a nós!"
10049100-244 = "……."
10049100-249 = "...Alguém que não passa de uma delinquente."
10049100-250 = "O quê!?"
10049100-254 = "Ai!"
10049100-260 = "O que significa isso...?"
10049100-261 = "Mas, com este incidente, eu entendi uma coisa."
10049100-264 = "Eu tenho o poder de proteger alguém nestas mãos, mesmo que não seja justiça. #nSe eu puder usar esse poder corretamente com minhas próprias mãos—"
10049100-267 = "Isso já é o suficiente."
10049100-271 = "Como resultado— a justiça é algo que vem depois, afinal."
10049100-272 = "Ah, isso é uma granada de luz—"
10049100-279 = "Aaaaaaaahhhhhhh!"
10049100-280 = "Meus, meus olhosssss!"
10049100-281 = "Uaaaaaaahhhhhh!!"
10049100-283 = "Hã, o quê!? Que situação é essa!?"
10049100-288 = "Ah, ali é a linha de fronteira!"
10049100-289 = "Bem-vindos! Ao Distrito Autônomo de Trinity!"
10049100-291 = "E-eeeh!?"
10049100-292 = "Alvo confirmado entrando no Distrito Autônomo de Trinity. #n—Permissão para abrir fogo concedida. Posso atirar a qualquer momento."
10049100-293 = "Suzumi, a fala do seu golpe especial! Você ainda lembra!?"
10049100-294 = "Com certeza."
10049100-296 = "Es-espere um pouco!!"
10049100-298 = "Pela paz de todos! #nMesmo que ninguém entenda! Não importa a situação!"
10049100-299 = "Nós... continuaremos protegendo hoje também!"
10049100-304 = "Magical—Terramachina!!"
10049100-313 = "Atirar de longe é trapaçaaaaaa!!"
10049100-322 = "Ah! Fogos de artifício!"
10049100-323 = "Que lindo..."
10049100-324 = "Foi um bom show. É a primeira vez que vejo algo assim."
10049100-326 = "Hoje foi muito divertido!!"
10049100-327 = "Ei, ei, vamos brincar de Heavy Calibers?"
10049100-328 = "Tá bom! Vamos, vamos!"
10049100-329 = "A justiça vencerá!"
10049100-330 = "Bom trabalho a todos!"
10049100-334 = "Reisa, Shimiko, Mashiro, pessoal do Grupo Capacete..."
10049100-335 = "...Sensei."
10049100-336 = "[ns] \"Suzumi!\""
10049100-340 = "Esquadrão de Vigilância — patrulha de hoje concluída!"
10049100-353 = "Ei! Você acabou com a nossa recompensa!!!!!!"
10049100-354 = "Garota Mágica Heavy Caliber ~A Ambição de Era e a Qualificação da Justiça~"
