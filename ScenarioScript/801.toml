[translation]
801-1 = "大決戦"
801-5 = "お待たせしました、先生。"
801-6 = "今回は調停室の、[ruby=いわびつ]岩櫃[/ruby]アユムもお連れしました。"
801-7 = "こ、こんにちは。先生。 "
801-8 = "それでは、本題に。 "
801-9 = "ここは、キヴォトス各所で起きている事件に対し、より効率的な対応をすべく連邦生徒会が用意した部屋です。"
801-11 = "はい……作戦室として使っていただければと……！ "
801-12 = "過去に何度も発生した事件は、今後、ここから迅速に対応できるようになると思います……！"
801-14 = "はい。調停室の助力によりこの部屋を実現できました。#nお疲れ様でした、アユム。"
801-15 = "い、いえ……！"
801-16 = "全部リンせんぱ……リン行政官が企画されたことですし、財務室も協力してくださったので……！ "
801-17 = "……ともかく。今後はこの作戦室を活用していただければと。#n更なるご活躍を期待しています、先生。"
801-18 = "では、これで。 "
801-19 = "よ、よろしくお願いします！"
