[translation]
801-1 = "Grande Decisão"
801-5 = "Desculpe a espera, Sensei."
801-6 = "Desta vez, trouxe também a Ayumu, da Sala de Mediação."
801-7 = "O-olá, Sensei."
801-8 = "Bem, vamos ao que interessa."
801-9 = "Esta é uma sala preparada pelo Conselho Estudantil Geral para responder de forma mais eficiente aos incidentes que ocorrem em várias partes de Kivotos."
801-11 = "Sim... espero que possa usá-la como uma sala de operações...!"
801-12 = "Acredito que, a partir de agora, poderemos responder rapidamente aos incidentes que ocorreram várias vezes no passado...!"
801-14 = "Sim. Conseguimos concretizar esta sala com a ajuda da Sala de Mediação.#nBom trabalho, Ayumu."
801-15 = "N-não foi nada...!"
801-16 = "Tudo isso foi planejado pela Rin... pela Administradora Rin, e a Sala de Finanças também colaborou...!"
801-17 = "...De qualquer forma. Espero que utilize esta sala de operações daqui em diante.#nAguardo ansiosamente por seus feitos, Sensei."
801-18 = "Então, é isso."
801-19 = "E-estamos contando com você!"
