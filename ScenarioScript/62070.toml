[translation]
62070-1 = "Episódio 7; Porta Pacis (1)"
62070-3 = "[ns] \"Porta Pacis...?\""
62070-4 = "Existe um prédio chamado \"Porta Pacis\", mas... tudo o que eu sei é que ele é extremamente antigo..."
62070-5 = "Talvez vocês do esquadrão saibam algo a respeito..."
62070-7 = "N-nós também somos iguais...#nSó sabemos que o nome significa \"Portão da Paz\" e..."
62070-8 = "...que existe uma história dizendo que aquela porta nunca deve ser aberta."
62070-10 = "...Em uma guerra civil cujas origens foram esquecidas, os governantes de Arius foram sendo substituídos."
62070-11 = "Ainda assim, a regra de \"não se aproximar da Porta Pacis\" sempre foi mantida como um princípio inabalável."
62070-12 = "...Pensando bem, isso é algo muito estranho."
62070-13 = "Mesmo aqueles que lutavam entre si respeitavam essa regra...#nO que será que está adormecido lá dentro?"
62070-14 = "Estávamos ocupadas demais tentando sobreviver a cada dia... não tínhamos tempo para nos preocupar com coisas desnecessárias, não é?"
62070-15 = "Como sou do primeiro ano... me disseram que não precisava saber disso e que não deveria tentar descobrir..."
62070-16 = "..."
62070-17 = "Bem, isso é apenas algo que ouvi dizer, mas..."
62070-18 = "Dizem que o \"passado\" de Arius, que ninguém conhece, está adormecido lá."
62070-19 = "[s] \"O passado de Arius?\""
62070-23 = "Sobre as histórias antigas... não é diferente do que os veteranos nos ensinaram...?"
62070-24 = "A história que nos foi transmitida não é necessariamente a correta."
62070-25 = "Eu não vi pessoalmente, mas... parece que os registros de Arius que restaram em Trinity são completamente diferentes."
62070-26 = "P-por exemplo... nas histórias do Concílio... dizem que Arius foi excomungado porque iniciou conflitos armados..."
62070-27 = "...E ouvi dizer que Arius foi banido para estas terras por merecimento próprio."
62070-28 = "Dizem que a história é escrita pelos vencedores, e é verdade."
62070-33 = "..."
62070-34 = "[s] \"Atsuko?\""
62070-35 = "Hm? O que foi?"
62070-36 = "...Parece que você quer dizer algo?"
62070-37 = "..."
62070-38 = "É apenas uma hipótese, mas..."
62070-39 = "Se houvesse uma aluna que soubesse da \"história oculta\" tanto de Trinity quanto de Arius... o que vocês pensariam?"
62070-40 = "...Isso é impossível. As garotas de lá também só devem saber o que lhes foi ensinado."
62070-41 = "Acho que isso é o normal. Mas veja bem, sempre existem pessoas em qualquer lugar que tentam descobrir a verdade por conta própria."
62070-42 = "Por exemplo... o \"Comitê de Biblioteca\" de Trinity, talvez?"
62070-43 = "[s] \"Você conhece o Comitê de Biblioteca?\""
62070-44 = "Não conheço cada uma delas individualmente, mas ouvi um pouco sobre a organização."
62070-45 = "Ah, mas... dizem que a presidente tem uma personalidade incrível em vários sentidos."
62070-46 = "[s] (Não que ela esteja errada, mas...)"
62070-47 = "Espere, onde você descobriu isso? Nós não temos esse tipo de informação..."
62070-48 = "Fufu."
62070-49 = "Talvez fosse um privilégio do \"Sangue Real\"...?"
62070-50 = "Bem, afinal, eu era uma \"princesa\"."
62070-51 = "I-isso é verdade...#nAlguém como eu estar junto com uma princesa..."
62070-52 = "Não se preocupe com isso. Eu já não estou mais nessa posição.#nEu gostaria que você me chamasse apenas de \"Atsuko\"."
62070-56 = "S-sim!? M-mas...!"
62070-57 = "Nós somos do mesmo primeiro ano, não somos? Né, Maia?"
62070-58 = "I-isso é verdade, mas! Mas, mas, mas...!"
62070-59 = "Então vamos praticar. A-tsu-ko."
62070-63 = "A-Atsuko...-san."
62070-64 = "Isso, muito bem. Vamos, um aperto de mão."
62070-65 = "Iiiih..."
62070-70 = "...Voltando ao assunto, podemos assumir que a Atsuko sabia de coisas que nós nem sequer conseguíamos ver?"
62070-71 = "Bem, imagino que seja assim que as posições funcionam."
62070-72 = "E-então... foi por isso que você não nos contou... nada..."
62070-73 = "Sinto muito. Mas, se eu tivesse falado levianamente..."
62070-74 = "Sim. Provavelmente, teríamos sido colocados em perigo."
62070-75 = "I-iiih..."
62070-76 = "Não que eu não tenha pensado que poderia ter sido depois de sair de Arius... mas acho que agora é um assunto irrelevante."
62070-77 = "Mas parece que não dá mais para dizer isso."
62070-78 = "[s] \"Entendido.\""
62070-82 = "[ns] \"Eu mesmo entrarei em contato com a Ui.\""
62070-83 = "Ui, é esse o nome dela."
62070-88 = "Conto com você, Sensei."
62070-97 = "Você não está me tratando como uma enciclopédia conveniente, está!?"
62070-102 = "I-iiih...! Assustador... é assustador...!"
62070-103 = "U-uwaaaa... assustador... é assustador demais...!"
62070-104 = "A-até a Hiyori...? Eu achava que vocês do Esquadrão não tinham medo de nada..."
62070-105 = "N-nós também temos medo do que é assustador... Além disso... o mundo está cheio de coisas assustadoras..."
62070-111 = "[ns1] \"Desculpe... eu realmente preciso da ajuda da Ui.\"\n[ns2] \"Que tal 20 cupons de Americano? Da White&Mason!\""
62070-117 = "Presidente! O Sensei sempre nos ajuda, não ajuda? Acho que podemos ajudar também!"
62070-119 = "Ma-mas..."
62070-120 = "Se você continuar fazendo birra... vou te forçar a fazer uma \"viagem de negócios\" até o Sensei, viu?"
62070-121 = "Ueeeh!?"
62070-127 = "Ela é exatamente como dizem os rumores..."
62070-128 = "[s] \"Ela é muito habilidosa.\""
62070-129 = "Olá. Sou Atsuko Hakari, da Escola Arius. Prazer em conhecê-lo."
62070-130 = "Sou Saori Joumae."
62070-131 = "...Misaki Imashino."
62070-132 = "H-Hiyori Tsuchinaga... é. E-ehehe... A-ah... ouvi dizer que a Biblioteca Antiga é famosa até em Kivotos..."
62070-133 = "Vocês teriam... edições antigas de revistas?"
62070-134 = "Nós as preservamos digitalmente para recortes. Quer que eu envie os dados para o Sensei mais tarde?"
62070-138 = "S-sério?! O-obrigada! A-ah, m-mas... não tenho nada especial para retribuir..."
62070-139 = "Não se preocupe. Quem ama letras e conhecimento é nosso aliado."
62070-140 = "Uwaaaaaa! Ainda bem que estou viva...!"
62070-141 = "Bem... peço desculpas pela demora nas apresentações. Mais uma vez, sou Shimiko Endo."
62070-146 = "Ah, e-eu também!? Bem... meu nome é Maia Tachiki... P-prazer em conhecê-lo..."
62070-151 = "..."
62070-152 = "Presidente?"
62070-156 = "E-ehm... haa... Ui Kozeki... é... vamos logo ao que interessa..."
62070-157 = "[s] \"Como eu disse pelo Momotalk, a situação é a seguinte...\""
62070-158 = "Sim. Pesquisamos o máximo que pudemos por aqui também. Provavelmente, encontramos as informações que o Sensei queria."
62070-159 = "Vocês tinham documentos assim!?"
62070-160 = "Sim, mas... alguns deles são tratados como livros proibidos em Trinity."
62070-161 = "Eu entendo o motivo, mas..."
62070-162 = "O Chá das Cinco, a Sisterhood... Como são tão secretistas, acabam parecendo suspeitos..."
62070-163 = "Este é o Comitê de Biblioteca de Trinity — especificamente, a \"Biblioteca Antiga\". Temos quase tudo aqui."
62070-164 = "Claro, quando se trata de informações de outras escolas, talvez não seja perfeito..."
62070-165 = "...mas este lugar é o próprio passado de Trinity."
62070-166 = "...Aqueles que detêm o poder querem criar situações que lhes sejam convenientes."
62070-167 = "Escondem o que é inconveniente, distorcem os fatos... e tentam encobrir a verdade com mentiras ainda maiores..."
62070-168 = "...Mas nós não permitiremos isso."
62070-169 = "...Pode me contar o que descobriu?"
62070-170 = "Como uma \"ex\" Sangue Real de Arius... eu lhe peço."
62070-174 = "Sangue... Real? Você é...? "
62070-175 = "[s] \"Sim. É a verdade.\""
62070-179 = "……."
62070-180 = "Entendo. De qualquer forma, eu pretendia contar o que fosse possível..."
62070-181 = "Já que temos a garantia do Sensei, não há necessidade de esconder."
62070-185 = "……Porta Pacis. #nOriginalmente, era um edifício que deveria ser usado exatamente como o nome sugere."
62070-186 = "――Como o \"Portão da Paz\"."
62070-187 = "……Antigamente, a Escola Filial de Arius e a Academia Trinity se separaram. Foi construído naquela época."
62070-188 = "É difícil imaginar hoje em dia, mas... parece que tanto Trinity quanto Arius acreditavam que, eventualmente, poderiam chegar a uma solução pacífica."
62070-189 = "……Mas não foi o que aconteceu, né?"
62070-190 = "……Sim."
62070-191 = "No entanto, sobre essa parte, nem mesmo do nosso lado os registros são claros."
62070-192 = "……Dizem que o verdadeiro terror do poder não está em \"registrar\", mas sim em \"não registrar\"."
62070-193 = "Por isso, essa parte..."
62070-194 = "……Eu vou complementar."
62070-195 = "O \"gatilho\" da guerra civil que perdurou em Arius foi a disputa em torno da conclusão do Porta Pacis."
62070-199 = "M-mas é o Portão da Paz...!? Isso é o oposto do que deveria ser...!"
62070-200 = "U-uma história dessas... será que eu deveria estar ouvindo isso...?"
62070-202 = "……Mesmo sendo um edifício feito como um monumento, às vezes o significado acaba se invertendo, não é?"
62070-203 = "Talvez seja o limite do conceito de \"símbolo\". #nQuando se impõe um ideal, as pessoas acabam querendo resistir a ele."
62070-204 = "……Havia pessoas que acreditavam que, mesmo que não fosse agora, a paz chegaria em um futuro distante."
62070-205 = "Mas... também havia pessoas que pensavam que, mesmo construindo o \"Portão da Paz\", a paz nunca chegaria."
62070-206 = "Na base de cada pensamento, havia a opinião de que era possível dialogar com Trinity e――"
62070-207 = "a opinião de que o diálogo era impossível. E então..."
62070-209 = "Foi isso que deu início à guerra civil..."
62070-210 = "Sim. A raiva que estava voltada para fora começou a se voltar para dentro."
62070-211 = "……É o que dizem."
62070-212 = "Do nosso lado também, quase não restaram documentos históricos adequados."
62070-213 = "Mas a raiva que nasceu naquela época... atravessou o tempo e foi sendo transmitida."
62070-214 = "A raiva voltada para Trinity. E a raiva voltada para nós mesmos."
62070-215 = "……Já faz tanto tempo, não é?"
62070-216 = "……Nós, originalmente, vivemos através da \"empatia\"."
62070-217 = "Ao longo da nossa longa história... caminhamos até hoje sentindo \"empatia\" pelos outros."
62070-218 = "É verdade... às vezes olhamos para a história e nos aproximamos dos sentimentos das pessoas daquela época, ou――"
62070-219 = "vemos a mesma coisa e sentimos a mesma coisa."
62070-220 = "A raiva de Arius também foi transmitida assim. #n...Mas não existe apenas uma maneira de transmitir algo."
62070-221 = "O lado que venceu a guerra civil — aqueles que pensaram que \"o Porta Pacis não poderia mais ser um símbolo de paz\" — decidiu usá-lo de outra forma."
62070-222 = "Então... um grande \"arquivo de registros\" foi construído no subsolo do Porta Pacis. #nPara deixar diretrizes e lições para o futuro."
62070-223 = "Havia algo assim no subsolo daquele lugar...!?"
62070-224 = "Sim. E esse arquivo de registros... começou a anotar, um por um, os eventos que ocorreram em Arius."
62070-225 = "……Parece a biblioteca de Trinity."
62070-226 = "Tentar registrar e preservar algo... é algo próximo ao instinto, afinal... #nÉ um tipo de comportamento universal."
62070-228 = "Assim, o \"Porta Pacis\" e seu arquivo de registros assumiram o papel de biblioteca de Arius."
62070-229 = "Mas, até onde eu sei... deve ter sido há mais de 150 anos."
62070-230 = "O governante de Arius da época designou o arquivo de registros e o Porta Pacis como áreas proibidas."
62070-231 = "[s] \"Por que isso?\""
62070-232 = "Não sei o motivo exato. Mas..."
62070-233 = "Provavelmente foi porque eles não aguentavam mais, não é?"
62070-234 = "Com as histórias acumuladas e os sentimentos sombrios que ficaram grudados nelas."
62070-235 = "[s3] \"……Entendi.\"\n[s4] \"De alguma forma, acho que consigo entender…….\""
62070-238 = "……Controle de informações, é? Isso é algo que também acontece em Trinity, mas……#nSuspiro, não muda nada em lugar nenhum, não é."
62070-239 = "É por isso que pessoas no poder são……."
62070-240 = "O sentimento de raiva é útil para controlar as massas até certo ponto, mas se for longe demais, acaba tendo o efeito contrário……."
62070-241 = "Incitar o povo para tomar o poder…… e quando o papel termina, quem instigou é enterrado na escuridão. #nBem, essa é uma história que se repete inúmeras vezes na história……."
62070-243 = "I-isso…… O mundo lá fora é feito desse jeito……? #nI-isso é assustador…… Hiyori-san…… é assustador demais……."
62070-244 = "E-eu também…… não sinto que consigo viver em um mundo assim…… uaaaaan……."
62070-245 = "Ma-mas a Shimiko-san disse que me daria materiais de revistas, então…… #nainda vou manter…… um pouquinho de esperança……."
62070-247 = "Estou dizendo que coisas parecidas acontecem em Arius também……."
62070-248 = "Raiva excessiva tem o efeito contrário, é…… Sendo assim, faz sentido que a história de Arius tenha sido transmitida através da \"tradição oral\"."
62070-249 = "É verdade. Até que a Madame — Beatrice — assumisse o controle total, os governantes de Arius mudaram várias vezes, mas……."
62070-250 = "Acho que o motivo de terem imposto um controle de informações consistente foi esse."
62070-251 = "……Você já consegue dizer esse nome agora, hein."
62070-252 = "Sim. Acho que é o momento certo. Está tudo bem."
62070-253 = "Entendo…… #nMas a tradição oral também deve ter tido suas desvantagens."
62070-254 = "……Mesmo que houvesse diferenças de grau, o conteúdo contado por cada pessoa deve ter se distorcido aos poucos."
62070-256 = "Não tem como evitar isso, né."
62070-257 = "Ficar mais exagerado que o fato real, ou ser omitido desde o início…… é porque a subjetividade de quem conta acaba entrando."
62070-258 = "Não dá para afirmar que a história que ouvimos é a correta. #nProvavelmente, deve estar bem distorcida."
62070-259 = "Por isso, acho que revisar os registros adequados pode ser o primeiro passo para devolver Arius à sua forma correta."
62070-260 = "Além disso, mesmo que a gente divulgue os registros de Porta Pacis agora, não acho que vá sair nada muito importante."
62070-261 = "Sendo assim, por que a Subaru-senpai está tentando ir até lá……?"
62070-262 = "Provavelmente, a Subaru descobriu \"alguma coisa\"."
62070-263 = "Porque, depois que a Beatrice se foi, Arius deve ter se tornado um \"lugar onde tudo é permitido\"."
62070-264 = "I-isso…… era verdade…… Até que a Subaru-senpai restaurasse a ordem……."
62070-265 = "Uuu……."
62070-266 = "E também…… daqui em diante, vou contar algo que só eu sei."
62070-267 = "……Embora, talvez, a Subaru já saiba agora."
62070-272 = "Isso é…… sobre o quê……?"
62070-277 = "――Sobre o \"rito secreto\" de Arius escondido em Porta Pacis."
62070-281 = "Próximo episódio: Porta Pacis (2)"
