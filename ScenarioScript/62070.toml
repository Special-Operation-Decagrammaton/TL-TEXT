[translation]
62070-1 = "Episódio 7; Porta Pacis (1)"
62070-3 = "[ns] \"Porta Pacis...?\""
62070-4 = "Existe um edifício chamado 'Porta Pacis'... mas a única coisa que sei é que é extremamente antigo..."
62070-5 = "Talvez as integrantes do Squad saibam a respeito..."
62070-7 = "N-Nós estamos na mesma... #nApenas sabemos que o nome significa 'Portão da Paz' e..."
62070-8 = "...e a história de que o portão de lá nunca deve ser aberto, sob hipótese alguma."
62070-10 = "...Durante a guerra civil cujos primórdios foram esquecidos, os governantes de Arius mudaram várias vezes."
62070-11 = "Mesmo assim, a regra de 'não se aproximar de Porta Pacis' foi a única mantida consistentemente como uma lei absoluta."
62070-12 = "...Pensando bem agora, isso é bem estranho."
62070-13 = "Até mesmo as facções que lutavam entre si respeitavam essa regra... #nO que será que está adormecido lá?"
62070-14 = "Estávamos ocupadas demais tentando sobreviver a cada dia... não tínhamos o luxo de nos importar com coisas supérfluas..."
62070-15 = "Como sou do primeiro ano... me disseram que eu não precisava saber disso e que não deveria tentar descobrir..."
62070-16 = "……."
62070-17 = "No entanto, isso é apenas algo que ouvi falar, mas..."
62070-18 = "...Havia um boato de que o 'passado' oculto de Arius, desconhecido por todos, repousa ali."
62070-19 = "[s] \"O passado de Arius?\""
62070-23 = "Histórias antigas...? São diferentes das que a veterana me ensinou...?"
62070-24 = "A história que foi transmitida nem sempre é a correta."
62070-25 = "Eu não vi com meus próprios olhos... mas dizem que os registros de Arius mantidos em Trinity também são completamente diferentes."
62070-26 = "P-Por exemplo... sobre o Concílio... Dizem que Arius causou um conflito armado, então eles não tiveram escolha a não ser excomungá-los..."
62070-27 = "...E também ouvi histórias de que Arius foi banido para esta terra por pura consequência de seus próprios atos."
62070-28 = "A história é escrita pelos vencedores, como diz o ditado."
62070-33 = "……."
62070-34 = "[s] \"Atsuko?\""
62070-35 = "Hã? O que foi?"
62070-36 = "...Você parece querer dizer algo?"
62070-37 = "……."
62070-38 = "É apenas uma suposição, mas..."
62070-39 = "Se houvesse uma estudante que soubesse a 'história oculta' tanto de Trinity quanto de Arius... o que você acharia?"
62070-40 = "...Isso é impossível. Até as garotas de lá só devem saber o que lhes foi ensinado."
62070-41 = "Acho que isso seria o normal. Mas veja bem, sempre existem pessoas em todos os lugares que tentam buscar a verdade por si mesmas."
62070-42 = "Como... o 'Comitê de Biblioteca' de Trinity, por exemplo?"
62070-43 = "[s] \"Você conhece o Comitê de Biblioteca?\""
62070-44 = "Não conheço as integrantes individualmente, mas ouvi falar um pouco sobre a organização."
62070-45 = "Ah, mas... dizem que a presidente tem uma personalidade bem peculiar, em vários sentidos."
62070-46 = "[s] (Não está errado, mas...)"
62070-47 = "Espere, onde você descobriu isso? Nós não tínhamos esse tipo de informação..."
62070-48 = "Fufu."
62070-49 = "Talvez fosse... um privilégio do 'Royal Blood'?"
62070-50 = "Bem, afinal ela era a 'Princesa'."
62070-51 = "É-É verdade... #nAlguém como eu estar junto com uma princesa..."
62070-52 = "Não precisa se preocupar com isso. Eu não estou mais nessa posição. #nEu prefiro que me chame apenas de 'Atsuko'."
62070-56 = "S-Sim?! M-Mas...!"
62070-57 = "Nós somos do mesmo ano, não somos? Né, Maia?"
62070-58 = "S-Sim, é verdade! Mas, mas, mas...!"
62070-59 = "Então vamos praticar. A-tsu-ko."
62070-63 = "A-Atsuko... san."
62070-64 = "Muito bem. Pronto, aperte minha mão."
62070-65 = "Hieee..."
62070-70 = "...Voltando ao assunto, quer dizer que a Atsuko sabia de coisas que nós não conseguíamos enxergar?"
62070-71 = "Bem, suponho que posições sociais funcionem assim."
62070-72 = "P-Por isso... você nunca... nos contou nada..."
62070-73 = "Me desculpe. Mas se eu tivesse falado levianamente..."
62070-74 = "Sim. Provavelmente teríamos sido colocadas em perigo."
62070-75 = "H-Hieee..."
62070-76 = "Não posso deixar de pensar que você poderia ter falado após sairmos de Arius... mas acho que isso já não importa mais."
62070-77 = "Mas parece que não podemos mais dizer isso."
62070-78 = "[s] \"Entendi.\""
62070-82 = "[ns] \"Eu mesmo tentarei entrar em contato com a Ui.\""
62070-83 = "Então o nome dela é Ui-san."
62070-88 = "Contamos com você, Sensei."
62070-97 = "Você por acaso acha que eu sou uma enciclopédia conveniente?!"
62070-102 = "H-Hii...! Que medo... estou com medo...!"
62070-103 = "U-Uwaaa... assustadora... ela é assustadora demais...!"
62070-104 = "A-Até a Hiyori...? #nEu achava que as integrantes do Squad não tinham medo de nada..."
62070-105 = "N-Nós também temos medo das coisas... #nAlém disso... o mundo está cheio de coisas assustadoras..."
62070-111 = "[ns1] \"Desculpe... eu realmente preciso da ajuda da Ui.\"\n[ns2] \"Que tal 20 cupons de Americano? Daqueles da White & Mason!\""
62070-117 = "Presidente! O Sensei sempre nos ajuda, não é? #nAcho que seria bom ajudá-lo!"
62070-119 = "M-Mas..."
62070-120 = "Se continuar fazendo birra... #neu vou te obrigar a fazer uma 'viagem de negócios' até onde o Sensei está, viu?"
62070-121 = "Ueeeh?!"
62070-127 = "Ela é exatamente como dizem os boatos..."
62070-128 = "[s] \"Mas ela é muito talentosa.\""
62070-129 = "Olá. Sou [ruby=Hakari]Atsuko Hakari[/ruby], da Escola Filial de Arius. Prazer em conhecer."
62070-130 = "Sou [ruby=Jomae]Saori Jomae[/ruby]."
62070-131 = "...[ruby=Imashino]Misaki Imashino[/ruby]."
62070-132 = "S-Sou [ruby=Tsuchinaga]Hiyori Tsuchinaga[/ruby]... ehehe... #nA-An... ouvi dizer que a Biblioteca de Livros Antigos é famosa em Kivotos..."
62070-133 = "Por acaso... vocês teriam edições antigas de revistas?"
62070-134 = "Temos salvas digitalmente para fins de arquivo. #nQuer que eu envie os dados para o Sensei mais tarde?"
62070-138 = "É-É sério?! M-Muito obrigada! #nAh, m-mas... eu não tenho nada para dar em agradecimento..."
62070-139 = "Não se preocupe. Quem ama as palavras e o conhecimento é nosso aliado."
62070-140 = "Uwaaaaaaaaaan! Que bom que estou viva...!"
62070-141 = "Bem... desculpe a demora em me apresentar. Sou [ruby=Endo]Shimiko Endo[/ruby]."
62070-146 = "Ah, e-eu também?! #nEr... me chamo [ruby=Tachigi]Maia Tachigi[/ruby]... P-Prazer em conhecer..."
62070-151 = "……."
62070-152 = "Presidente?"
62070-156 = "A-Ah... *suspiro*... #nSou [ruby=Kozeki]Ui Kozeki[/ruby]... Vamos direto ao assunto principal de uma vez..."
62070-157 = "[s] \"A situação é exatamente como expliquei no MomoTalk...\""
62070-158 = "Sim. Nós pesquisamos o máximo possível por aqui. #nAcho que conseguimos encontrar as informações que você queria, Sensei."
62070-159 = "Encontrou documentos assim?!"
62070-160 = "Sim, mas... isso inclui itens que são tratados como [ruby=・]quase[/ruby][ruby=・]proibidos[/ruby] em Trinity."
62070-161 = "E eu até consigo entender o motivo..."
62070-162 = "Tea Party, Sisterhood... #nEles são tão cheios de segredos que tudo começa a parecer suspeito..."
62070-163 = "Este é o Comitê de Biblioteca de Trinity — especificamente a 'Biblioteca de Livros Antigos'. #nTemos quase tudo aqui."
62070-164 = "Claro, quando se trata de informações de outras escolas, pode não estar completo, mas..."
62070-165 = "...Até porque este lugar é o próprio [ruby=・]passado[/ruby][ruby=・]de[/ruby][ruby=・]Trinity[/ruby]."
62070-166 = "...Aqueles que detêm o poder querem criar situações convenientes para si mesmos."
62070-167 = "Eles escondem ou distorcem o que é inconvenient... tentando encobrir a verdade com mentiras ainda maiores..."
62070-168 = "...Mas nós não permitiremos isso."
62070-169 = "...Pode nos dizer o que descobriu?"
62070-170 = "Como uma 'ex'-Royal Blood de Arius... por favor."
62070-174 = "Royal... Blood? Você...?"
62070-175 = "[s] \"Sim. É verdade.\""
62070-179 = "……."
62070-180 = "Entendido. De qualquer forma, eu já pretendia contar o que sei..."
62070-181 = "E com a garantia do Sensei, não há necessidade de esconder nada."
62070-185 = "...Porta Pacis. #nOriginalmente, era um edifício destinado a ser usado exatamente como o nome sugere."
62070-186 = "―― Como o 'Portão da Paz'."
62070-187 = "...No passado, a Escola Filial de Arius e a Escola Integrada de Trinity romperam laços. Aquilo foi construído naquela época."
62070-188 = "É inimaginável hoje em dia... mas parece que tanto Trinity quanto Arius pensavam que poderiam eventualmente alcançar uma solução pacífica."
62070-189 = "...Mas não foi o que aconteceu, certo?"
62070-190 = "...Sim."
62070-191 = "No entanto, em relação a essa parte, os registros nem mesmo do nosso lado estão claros."
62070-192 = "...Afinal, dizem que o verdadeiro terror do poder não reside em 'registrar', mas sim em 'não registrar'."
62070-193 = "Por isso, essa parte..."
62070-194 = "...Deixe-me complementar."
62070-195 = "O 'gatilho' da guerra civil que persistiu em Arius foi a disputa em torno da conclusão de Porta Pacis."
62070-199 = "M-Mas era para ser o Portão da Paz...?! É o completo oposto...!"
62070-200 = "E-Está tudo bem eu ouvir uma história dessas...?"
62070-202 = "...Às vezes acontece de um edifício construído como monumento ter seu significado invertido sem que se perceba."
62070-203 = "Talvez seja o limite do conceito de ser um 'símbolo'. #nQuando nos impõem um ideal, tendemos a querer nos rebelar contra ele."
62070-204 = "...Havia pessoas que acreditavam que a paz chegará em um futuro distante, mesmo que não agora."
62070-205 = "Mas... também havia quem pensasse que, mesmo construindo um 'Portão da Paz', a paz jamais viria."
62070-206 = "Na base de cada pensamento, havia a opinião de que era possível dialogar com Trinity e――"
62070-207 = "―― a opinião de que o diálogo era inviável. E então..."
62070-209 = "Isso acabou se tornando o estopim da guerra civil, não foi...?"
62070-210 = "Sim. A raiva que antes era direcionada para fora começou a se voltar para dentro."
62070-211 = "...Foi o que ouvi."
62070-212 = "Embora quase não existam documentos históricos adequados do nosso lado também."
62070-213 = "Mas a raiva nascida naquele momento... transcendeu o tempo e continuou sendo herdada até hoje."
62070-214 = "A raiva direcionada a Trinity. E a raiva direcionada a si mesmos."
62070-215 = "...Apesar de já ser uma história de muito tempo atrás."
62070-216 = "...Nós fomos feitos originalmente para viver sentindo 'empatia'."
62070-217 = "Ao longo de uma vasta história... caminhamos até o dia de hoje sentindo 'empatia' pelos outros."
62070-218 = "É verdade... às vezes olhamos para trás na história e nos solidarizamos com os sentimentos das pessoas daquela época, ou――"
62070-219 = "―― vemos as mesmas coisas e sentimos a mesma coisa que elas."
62070-220 = "A raiva de Arius também foi herdada dessa forma. #n...Mas não existe apenas um método para herdar algo."
62070-221 = "O lado que venceu a guerra civil — o lado que pensava que Porta Pacis 'não podia mais servir como um símbolo da paz' — decidiu dar um uso diferente para ele."
62070-222 = "Por isso... um grande 'arquivo de registros' foi construído no subsolo de Porta Pacis. #nPara deixar diretrizes e advertências para o futuro."
62070-223 = "Algo assim existe embaixo daquele lugar...?!"
62070-224 = "Sim. E aquele arquivo de registros... passou a documentar detalhadamente, um por um, os acontecimentos ocorridos em Arius."
62070-225 = "...É quase como a biblioteca de Trinity."
62070-226 = "Tentar registrar e preservar algo... é algo próximo de um instinto... #nPode ser considerado um tipo de comportamento universal."
62070-228 = "Dessa forma, 'Porta Pacis' e seu arquivo de registros assumiram o papel de biblioteca de Arius."
62070-229 = "Mas, pelo que sei... foi há mais de 150 anos."
62070-230 = "O governante de Arius daquela época designou o arquivo de registros e Porta Pacis como uma zona de acesso proibido."
62070-231 = "[s] \"E por que fez isso?\""
62070-232 = "Não sei a razão exata. Mas..."
62070-233 = "Provavelmente foi porque achou que não dava mais para suportar."
62070-234 = "As histórias acumuladas e os sentimentos sombrios impregnados nelas."
62070-235 = "[s3] \"...Entendi.\"\n[s4] \"Acho que consigo compreender de alguma forma...\""
62070-238 = "...Controle de informação, não é? Trinity faz a mesma coisa, afinal... #n*Suspiro*, nenhum lugar é diferente."
62070-239 = "É por isso que as pessoas no poder são..."
62070-240 = "Sentimentos de raiva ajudam a controlar a população até certo ponto, mas se passarem do limite, causam o efeito oposto..."
62070-241 = "Eles inflamam a população para tomar o poder... e quando o papel deles termina, quem instigou é descartado nas sombras. #nBem, essa é uma história recorrente na história..."
62070-243 = "N-Não pode ser... O mundo lá fora funciona desse jeito...? #nQ-Que medo... Hiyori-san... isso é assustador demais..."
62070-244 = "N-Nossa... eu sinto que não vou conseguir sobreviver em um mundo assim... Uwaaaaaan..."
62070-245 = "M-Mas a Shimiko-san disse que ia me dar os arquivos das revistas... #nentão ainda vou manter... um pouquinho de esperança..."
62070-247 = "Estamos conversando sobre como coisas parecidas aconteceram [ruby=aqui]em Arius[/ruby] também..."
62070-248 = "Raiva excessiva causa o efeito oposto, é...? Se for assim, faz sentido que a história de Arius tenha sido transmitida através da 'tradição oral'."
62070-249 = "Verdade. Até que a Madame — Beatrice — assumisse o controle total, os governantes de Arius mudaram várias vezes..."
62070-250 = "Acho que esse era o motivo de o controle de informação ter sido imposto consistentemente."
62070-251 = "...Você já consegue pronunciar esse nome agora."
62070-252 = "Sim. Sinto que já é hora disso. Está tudo bem."
62070-253 = "Entendo... #nMas a tradição oral deve ter tido suas desvantagens também."
62070-254 = "...Mesmo que em graus diferentes, o conteúdo narrado inevitavelmente se distorce um pouco dependendo de quem conta."
62070-256 = "Não há o que fazer quanto a isso."
62070-257 = "As coisas se tornam mais exageradas do que os fatos, ou são simplesmente omitidas... porque a subjetividade do narrador entra em cena."
62070-258 = "A história que nós ouvimos também não pode ser considerada totalmente correta. #nProvavelmente está bastante distorcida."
62070-259 = "Por isso, penso que revisar os registros adequados pode ser o primeiro passo para trazer Arius de volta à sua forma correta."
62070-260 = "Além disso, sinto que expor os registros de Porta Pacis agora não revelaria nada de tão grandioso."
62070-261 = "Se for assim, por que a veterana Subaru estaria indo para lá...?"
62070-262 = "Provavelmente a Subaru descobriu 'algo'."
62070-263 = "Porque, após o desaparecimento de Beatrice, Arius deve ter se tornado um lugar onde 'tudo é permitido'."
62070-264 = "É-É verdade... Foi assim... Até que a veterana Subaru restabelecesse a ordem..."
62070-265 = "Ugh..."
62070-266 = "E também... a partir daqui, vou contar algo que só eu sei."
62070-267 = "...Embora, quem sabe, a Subaru também possa saber disso agora."
62070-272 = "Que tipo de... história seria essa...?"
62070-277 = "―― A história sobre o 'mistério sagrado' de Arius escondido em Porta Pacis."
62070-281 = "Próximo Episódio; Porta Pacis (2)"