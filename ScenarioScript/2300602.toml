[translation]
2300602-1 = "A garota-propaganda da Hyakkiyako!"
2300602-2 = "（Depois disso, visitei a \"Hyakkiyako\", uma cafeteria tradicional de Hyakkiyako onde Shizuko trabalha）"
2300602-5 = "Ah, Sensei!"
2300602-6 = "……Não, espere, *cof cof*."
2300602-8 = "Bem-vindo de volta! Mestre!"
2300602-9 = "[s] \"Err…… estou de volta?\""
2300602-10 = "Ah, desculpe te assustar com isso de repente. É que, por tradição, chamamos todos de \"Mestre\" aqui."
2300602-11 = "Por favor, venha por aqui…… aqui está o menu!"
2300602-12 = "A recomendação de hoje é o Anmitsu de morango!"
2300602-13 = "Claro, os outros doces japoneses também são deliciosos!"
2300602-14 = "[s1] \"Bem…… então eu vou querer o Daifuku de morango.\"\n[s2] \"Então…… vou querer o Anmitsu de morango que você recomendou.\""
2300602-15 = "Entendido! Por favor, aguarde um momento!"
2300602-16 = "Entendido! Por favor, aguarde um momento!"
2300602-19 = "（Talvez por causa do evento, o interior da loja estava bem cheio）"
2300602-20 = "（Mesmo com toda a agitação da loja, Shizuko brilhava mais que todos, e era fácil encontrá-la onde quer que estivesse）"
2300602-21 = "Aqui está o seu conjunto de Anpan de morango!"
2300602-22 = "Shizuko-chan, qual é a melhor forma de comer isso?"
2300602-23 = "Ah, tem um jeito especial para ficar ainda mais gostoso!"
2300602-24 = "Dê um gole nesse chá que está na sua mão e, depois, pegue um pedacinho do Anpan e dê uma mordida!"
2300602-25 = "Assim, você pode aproveitar o equilíbrio entre o doce e o amargo ao mesmo tempo!"
2300602-26 = "Ah, meu Deus, Shizuko-chan, você é tão fofa!"
2300602-27 = "Cada gesto seu é adorável!"
2300602-29 = "Aqui está o seu conjunto de Daifuku de morango!"
2300602-30 = "Ué, Daifuku de morango?"
2300602-31 = "Eu não tinha pedido um Yatsuhashi de morango em vez de Daifuku……?"
2300602-32 = "Ah, não……?"
2300602-33 = "Ah……! D-desculpe, Mestre!"
2300602-34 = "Shizuko, eu acabei me distraindo……!"
2300602-35 = "V-vou trazer um novo agora mesmo……! Me desculpe……!"
2300602-36 = "Isso……!"
2300602-37 = "Aconteceu! O evento da Shizuko-chan sendo desastrada!!"
2300602-38 = "Essa expressão de desculpas, o jeito que ela fica inquieta por ter cometido um erro……!"
2300602-39 = "O anjo estava bem aqui……."
2300602-40 = "N-não zombe de mim……."
2300602-42 = "（Depois disso, cada vez que Shizuko cometia um erro, os clientes ficavam super animados）"
2300602-43 = "（Parecia que a maioria dos clientes vinha justamente por causa da Shizuko）"
2300602-44 = "[s] \"Eles estão bem animados, hein…….\""
2300602-45 = "（E algum tempo depois……）"
2300602-47 = "Obrigada por esperar, Mestre!"
2300602-48 = "Aqui está o que você pediu……"
2300602-49 = "A versão deluxe do Manju de morango!"
2300602-50 = "[s3] \"Ué, eu não tinha pedido um Daifuku de morango……?\"\n[s4] \"Ué, eu não tinha pedido um Anmitsu de morango……?\""
2300602-51 = "Ah, a Shizuko errou de novo!"
2300602-52 = "Ah, a Shizuko errou de novo!"
2300602-53 = "D-desculpe, Mestre! Vou preparar o pedido certo agora mesmo……."
2300602-55 = "[s] \"Não precisa, parece delicioso, vou ficar com esse mesmo. Obrigado.\""
2300602-56 = "……!?"
2300602-57 = "……É-é só isso que vai fazer……!?"
2300602-58 = "[s] （Assente）"
2300602-59 = "……E-então, continuarei servindo você, está bem~?"
2300602-61 = "Ah, cuidado, Mestre! Shizuko, se continuar assim, vamos bater...!"
2300602-63 = "V-você desviou!?"
2300602-64 = "[s] \"Você está bem?\""
2300602-65 = "E-eu estou bem, sim~!"
2300602-66 = "P-próximo serviço...!"
2300602-68 = "Ahhh! Que erro terrível da Shizuko!"
2300602-69 = "Professor... não, Mestre, eu acabei colocando Tabasco na bebida que deveria servir para você por engano!"
2300602-70 = "[s] \"Como você consegue colocar tanto assim por engano!?\""
2300602-71 = "P-professor, você não consegue beber isso, né...?"
2300602-72 = "[s5] \"Por mais que eu tente, isso é um pouco demais...\"\n[s6] \"...Já que foi minha aluna fofa que preparou!\""
2300602-73 = "Ah, que desastrada que eu sou!"
2300602-74 = "Cometer um erro desses e causar problemas para o Professor! Uuu, Shizuko, Shizuko...!"
2300602-75 = "[s7] \"Pode fazer outro para mim?\""
2300602-76 = "Tão direto!?"
2300602-78 = "Sem hesitar e de uma vez!?"
2300602-79 = "[s8] \"Ugh... mais um!\""
2300602-80 = "E ainda pediu refil!? Mas você acabou de dizer \"ugh\", não disse!?"
2300602-81 = "…………."
2300602-82 = "...Ah, chega, não aguento mais!"
2300602-83 = "Professor! Venha aqui!"
2300602-86 = "(Sendo puxado pelo braço pela Shizuko para um canto da Hyakkiyako)"
2300602-87 = "O que você está fazendo desde agora, Professor!?"
2300602-88 = "[s9] \"Essa é a minha fala...\"\n[s10] \"Shizuko, o que você está fazendo?\""
2300602-89 = "Isso é, claro...!"
2300602-90 = "Isso é, claro...!"
2300602-91 = "É a especialidade da Hyakkiyako, o \"Serviço de Garota Desastrada\"!"
2300602-92 = "Eu não disse no Momotalk?"
2300602-93 = "Que eu iria \"te receber bem\"."
2300602-94 = "[s] \"...Receber bem com um serviço de garota desastrada?\""
2300602-95 = "Exatamente! Você viu a reação daqueles clientes, não viu?"
2300602-96 = "Com esse visual e essa fofura! Se uma garota tão atraente quanto eu te servir, você não fica impressionado?"
2300602-97 = "[s11] \"B-bem, talvez...\"\n[s12] \"...\""
2300602-98 = "Que reação sutil!?"
2300602-99 = "Diga alguma coisa!? Esse silêncio machuca as pessoas, sabia!?"
2300602-100 = "De qualquer forma, Mestre... como pode ver, sou bem popular entre os clientes como a garota-propaganda da Hyakkiyako."
2300602-101 = "Eu demonstro minha fofura desastrada e os clientes se sentem reconfortados com isso."
2300602-102 = "Não acha que é um negócio perfeito, onde ambos saem ganhando?"
2300602-103 = "Então, Professor, entre no clima também!"
2300602-105 = "Já que você viria, eu passei a noite inteira treinando especialmente para isso...!"
2300602-106 = "[s] \"Não, mesmo dizendo isso...\""
2300602-108 = "[s13] \"Shizuko já é fofa sem precisar fazer essas coisas,\"\n[s14] \"e eu não sei como reagir a mais do que isso.\""
2300602-112 = "...Ah,"
2300602-113 = "Hã!? D-dizer algo tão vergonhoso com essa cara séria...!"
2300602-114 = "P-por acaso o Professor é um natural!?"
2300602-115 = "Você passou do nível de desastrado e está tentando roubar meu posto de natural!?"
2300602-116 = "Ha, ha... ah, droga, foi por impulso..."
2300602-117 = "Foi sem querer, ou melhor... na frente do Professor, tudo parece perder o sentido..."
2300602-118 = "[s] \"Tudo isso faz parte de quem você é, Shizuko.\""
2300602-119 = "...Sério mesmo."
2300602-120 = "Você é uma pessoa estranha, Professor."
2300602-122 = "(Depois disso, recebi muitos doces japoneses como cortesia de uma Shizuko que parecia estar de muito bom humor)"
