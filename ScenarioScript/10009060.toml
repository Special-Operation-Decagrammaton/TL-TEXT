[translation]
10009060-1 = "第6話;決着"
10009060-2 = "矯正局南支部・第9矯正施設"
10009060-8 = "警備局の方々、忙しそうですね。"
10009060-9 = "まあ、今や前までとは比べ物にならないくらい、警備のレベルを上げてるからね……。"
10009060-10 = "ここまでやって脱獄されたら、"
10009060-11 = "もう「やっちゃいました」じゃ済まないだろうなぁ……。"
10009060-12 = "それが分かってるからこそ、ここまでガチガチに防備を固めてるんだろうけど。"
10009060-13 = "そうですね。それにミレニアムのお二人が、特にネットワーク周りのセキュリティをチェックしてくれてますし！"
10009060-14 = "その当人たち、さっき到着するやいなや「これ、本当にセキュリティとしての意味ある……？」とか言いながらげんなりした顔してたけどね。"
10009060-15 = "まあこれで流石に大丈夫……なはずなんだけど。"
10009060-16 = "フブキ、何か気になることでも？"
10009060-17 = "何かスッキリしないっていうか、引っ掛かるっていうか……。"
10009060-18 = "……考えすぎかねぇ。"
10009060-25 = "あの、ところでフブキ。"
10009060-26 = "さっき捕まえてからというものの「災厄の狐」さんがずっと無言で、すごく怖いのですが！？"
10009060-27 = "……まあ、舌先三寸で相手を惑わすようなやつらしいし、何も話しかけられない方がむしろ良いんじゃない？"
10009060-28 = "それは全部嘘だって、さっきフブキが言ってたじゃないですか……！？"
10009060-29 = "え、そうだっけ。"
10009060-30 = "まぁまぁ……。"
10009060-36 = "えーっと、そこの災厄の狐。"
10009060-37 = "一応警告しておくけど。"
10009060-38 = "いい加減にそろそろ、変なこと考えるのはやめた方が良いよ。"
10009060-39 = "こちとらあんたが脱獄したせいで始末書どころか、有休も成果給も消えるところだったんだから！"
10009060-41 = "え？フブキ、成果給なんて貰ったことありましたっけ？"
10009060-42 = "今そういうは良いの！警告なんだから、軽い見栄くらい張っても良いでしょ！"
10009060-43 = "な、なるほど！ではえっと……わ、私だって、反省文を100枚も書かされることになったんですからね！"
10009060-44 = "うっ、反省文を100枚も……。"
10009060-45 = "何で自分の見栄でダメージ受けるのさ！本当じゃないんでしょ！？"
10009060-46 = "まあとにかく……"
10009060-47 = "何にせよ、よくここまで暴れたもんだよ。"
10009060-48 = "最初の方はザルだったとはいえ、それは素直に驚いてる。"
10009060-49 = "「災厄の狐」っていうのも、強ち誇張じゃなかったみたいだね。"
10009060-51 = "……。"
10009060-52 = "ねぇ、あんたシャーレの先生を狙ってたでしょ？"
10009060-53 = "それは何で？前に負かされたから、その分の復讐とか？……まあ、別に何でも良いんだけどさ。"
10009060-54 = "とにかく、今度こそ諦めた方が良い。今回はヴァルキューレだけじゃなく、色んなところからみんな来てるんだから。"
10009060-55 = "そうですね。いくら災厄の狐さんだとしても、ここまで厚い警備をかいくぐれるはずはありません！"
10009060-56 = "……。"
10009060-57 = "……だんまり？"
10009060-58 = "それとも、落ち込んでるとか？"
10009060-59 = "まぁ、それは分からなくもないけど。せっかく矯正局から脱獄できたと思ったのに、こうして捕まっちゃったらそりゃ気落ちもするよ。"
10009060-60 = "でも悪いけど諦めてもらうよ。もう今は私たちだけじゃない、みんなの目線が集中してるんだから。"
10009060-62 = "フブキ、あの……。"
10009060-63 = "ん？どしたのキリノ。"
10009060-64 = "その、何と言いますか。フブキの言い方が何だかフラグっぽく聞こえてしまうと言いますか……。"
10009060-65 = "何言ってんのキリノ、"
10009060-66 = "フラグなんて信じてたらヴァルキューレやってられないよ。"
10009060-67 = "まさか今の発言のせいで、脱獄されちゃうわけでも――"
10009060-71 = "いぃっ！？"
10009060-72 = "な、何が起きたんです！？"
10009060-80 = "ねぇ、そっちにちゃんとワカモいるよね！？"
10009060-81 = "……え？"
10009060-82 = "は、はいっ！目の前にいますが……！？"
10009060-83 = "……じゃあこの状況は一体どういうこと？監視カメラにワカモが映って……"
10009060-84 = "待って、一人じゃない！？"
10009060-85 = "二人、いや三人……！？"
10009060-89 = "……っ！"
10009060-90 = "キリノ、そいつの仮面取って！"
10009060-91 = "え、"
10009060-92 = "えぇっ！？"
10009060-103 = "あ、バレた。"
10009060-104 = "だ、だだっ誰ですか！？"
10009060-109 = "……やられた。入れ替わってたなんて……！"
10009060-110 = "待った、ってことは本人は……！？"
10009060-111 = "いったい何が起きてるんですかこれ！？"
10009060-116 = "……まさかっ！"
10009060-120 = "あぁ、だいぶ時間がかかってしまいました……。"
10009060-121 = "このワカモ、ずっとこの瞬間だけを待ちわびて……。"
10009060-122 = "ようやく全ての視線が私から外れ、矯正局の方へと向きました。"
10009060-123 = "さぁ、ようやくお伺いできますわ……"
10009060-124 = "……先生♡"
