[translation]
10009060-1 = "Episódio 6: Conclusão"
10009060-2 = "Departamento Correcional, Filial Sul - Instalação Correcional nº 9"
10009060-8 = "O pessoal do Departamento de Segurança parece bem ocupado, hein."
10009060-9 = "Bem, agora o nível de segurança está incomparavelmente mais alto do que antes, então..."
10009060-10 = "Se alguém escapar depois de tudo o que fizemos,"
10009060-11 = "acho que um simples 'foi mal' não vai resolver as coisas..."
10009060-12 = "É justamente por saberem disso que reforçaram a segurança até esse ponto."
10009060-13 = "Com certeza. Além disso, as duas do Millennium estão verificando a segurança, especialmente a parte da rede!"
10009060-14 = "As próprias pessoas em questão chegaram aqui e, logo de cara, ficaram com uma cara de desânimo, dizendo: 'Isso aqui realmente serve como segurança...?'"
10009060-15 = "Bem, com isso, deveria estar tudo bem... teoricamente."
10009060-16 = "Fubuki, tem algo te incomodando?"
10009060-17 = "É como se algo não estivesse certo, ou talvez, algo que está me deixando com a pulga atrás da orelha..."
10009060-18 = "Será que estou pensando demais?"
10009060-25 = "Ei, a propósito, Fubuki."
10009060-26 = "Desde que a capturamos, a 'Raposa da Calamidade' ficou em silêncio absoluto, e isso é muito assustador!?"
10009060-27 = "Bem, dizem que ela é do tipo que engana os outros com lábia, então não seria melhor que ela não dissesse nada?"
10009060-28 = "Mas você mesma disse agora pouco que tudo o que ela diz é mentira...!?"
10009060-29 = "Ah, eu disse?"
10009060-30 = "Bom, enfim..."
10009060-36 = "Ei, você aí, Raposa da Calamidade."
10009060-37 = "Só para deixar avisado."
10009060-38 = "É melhor você parar de pensar em coisas estranhas de uma vez por todas."
10009060-39 = "Por sua causa, eu quase perdi não só o relatório de incidentes, mas também minhas férias e meu bônus de desempenho!"
10009060-41 = "Hã? Fubuki, você já recebeu algum bônus de desempenho?"
10009060-42 = "Não é hora para isso! É um aviso, então não tem problema dar uma leve exagerada, certo!"
10009060-43 = "Ah, entendi! Então, bem... e-eu também, tive que escrever 100 cartas de desculpas!"
10009060-44 = "Ugh, 100 cartas de desculpas..."
10009060-45 = "Por que você está se machucando com o seu próprio exagero? Isso nem é verdade, né!?"
10009060-46 = "Bem, de qualquer forma..."
10009060-47 = "Seja como for, é impressionante que você tenha causado tanto estrago."
10009060-48 = "Embora a segurança fosse falha no começo, ainda assim, estou genuinamente surpresa."
10009060-49 = "Parece que o título de 'Raposa da Calamidade' não era um exagero."
10009060-51 = "..."
10009060-52 = "Ei, você estava atrás do Sensei do Schale, não estava?"
10009060-53 = "Por que isso? Vingança por ter sido derrotada antes? Bem, tanto faz, não importa mesmo."
10009060-54 = "De qualquer forma, é melhor desistir agora. Desta vez, não é só a Valkyrie, tem gente de todos os lugares vigiando."
10009060-55 = "Exatamente. Mesmo que você seja a Raposa da Calamidade, não tem como passar por uma segurança tão reforçada!"
10009060-56 = "..."
10009060-57 = "...Silêncio?"
10009060-58 = "Ou será que você está deprimida?"
10009060-59 = "Bem, eu até entendo. Você achou que tinha conseguido escapar da Correcional, mas ser capturada assim deve ser desanimador."
10009060-60 = "Mas sinto muito, você terá que desistir. Agora não somos apenas nós, todos os olhos estão voltados para você."
10009060-62 = "Fubuki, hum..."
10009060-63 = "Hm? O que foi, Kirino?"
10009060-64 = "Bem, como posso dizer... o jeito que você falou soa como se estivesse atraindo má sorte..."
10009060-65 = "Do que você está falando, Kirino?"
10009060-66 = "Se fôssemos acreditar em presságios, não conseguiríamos trabalhar na Valkyrie."
10009060-67 = "Não me diga que, por causa do que você acabou de dizer, ela vai escapar—"
10009060-71 = "Aaaah!?"
10009060-72 = "O-o que aconteceu!?"
10009060-80 = "Ei, a Wakamo está mesmo aí com você, não está!?"
10009060-81 = "……Hã?"
10009060-82 = "S-sim! Ela está bem na minha frente, mas……!?"
10009060-83 = "……Então, o que significa essa situação? A Wakamo apareceu na câmera de segurança e……"
10009060-84 = "Espere, não é só uma!?"
10009060-85 = "Duas, não, três……!?"
10009060-89 = "……!"
10009060-90 = "Kirino, tire a máscara dessa pessoa!"
10009060-91 = "Hã,"
10009060-92 = "Eeeh!?"
10009060-103 = "Ah, fui descoberta."
10009060-104 = "Q-q-quem é você!?"
10009060-109 = "……Fomos enganados. Terem trocado de lugar……!"
10009060-110 = "Espere, isso significa que a verdadeira……!?"
10009060-111 = "O que exatamente está acontecendo aqui!?"
10009060-116 = "……Não pode ser!"
10009060-120 = "Ah, demorou bastante tempo……"
10009060-121 = "Esta Wakamo esteve esperando ansiosamente apenas por este momento……"
10009060-122 = "Finalmente, todos os olhares se desviaram de mim e se voltaram para a Agência Correcional."
10009060-123 = "Bem, finalmente posso ir te ver……"
10009060-124 = "……Sensei♡"
