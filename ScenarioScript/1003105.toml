[translation]
1003105-1 = "最初の一歩をあなたと"
1003105-2 = "（アルからの連絡をもらって、約束の場所に向かう）"
1003105-6 = "（元旦の街は、心なしか普段以上に綺麗で静かだった）"
1003105-8 = "（いつもよりもどこか透明な風景）"
1003105-9 = "（そのせいか、いつにも増して冷たい空気が肌に染み渡る）"
1003105-12 = "（早朝、外は鼻先や頬が赤くなるくらいに寒い）"
1003105-14 = "（服を突き抜ける冷気に急かされるようにして、歩みを進めていく）"
1003105-15 = "（そうして、約束の時間通りに到着して……）"
1003105-20 = "遅いじゃない、先生。"
1003105-21 = "[s] \"ごめんね。それより……。\""
1003105-22 = "ん？なあに？そんな間抜けな顔で。"
1003105-23 = "ふふふっ、何か言いたそうな顔ね。"
1003105-25 = "（チラッ）"
1003105-26 = "…………（チラッチラッ）"
1003105-27 = "[s1] \"そういえばアル、この前は言えなかったけど……。\"\n[s2] \"やっぱり、その着物……。\""
1003105-28 = "ちょ、ちょっと待って！！"
1003105-29 = "ちょ、ちょっと待って！！"
1003105-32 = "（い、今の沈黙の間は何？余計に緊張しちゃうじゃない！む、無理！今は無理！また後で！）"
1003105-33 = "（まだ心の準備が十分できてないから、これは次回！また次回にするわ！）"
1003105-36 = "そっ、その話はまた後にしましょう！それより今は、急いでることがあるから。"
1003105-37 = "[s] \"急いでること？\""
1003105-38 = "ええ、こうして朝早くから先生を呼んだ理由……。"
1003105-39 = "今日ここで、先生と一緒に新年のお参りがしたかったの。"
1003105-40 = "ここ、すごくご利益のあるところだそうよ。別に心から信じてるわけじゃないけど……先生、付き合ってくれる？"
1003105-41 = "[s] \"うん。\""
1003105-42 = "ふふっ。じゃあ行きましょう、先生！"
1003105-45 = "[wa:200]― ふふ、[wa:1500]歩くのが遅いわよ、[wa:1500]先生。"
1003105-47 = "[wa:150]― え？[wa:1050]私が速い、って？[wa:2800]そんなことないわよ。"
1003105-50 = "― まあ、[wa:1000]いつ何時も[wa:1350]用件には遅れたりしないようにって、"
1003105-52 = "― 普段から心がけてはいるけどね、[wa:2800]社長として。"
1003105-55 = "[wa:750]― 早起きは[wa:800]三文の徳……。"
1003105-58 = "[wa:150]― 今年の便利屋は、"
1003105-60 = "[wa:100]― 去年以上に[wa:800]機敏に、[wa:750]積極的に活動していくわよ。"
1003105-63 = "[wa:200]― もちろん、[wa:850]先生も一緒によ。"
1003105-66 = "― 私たち便利屋の活動は、"
1003105-68 = "[wa:50]― もう同業者である[wa:800]先生無しでやっていくなんてわけには[wa:1250]いかないんだから。"
1003105-71 = "[wa:800]― そうして一緒に[wa:750]仕事をする時間が、"
1003105-73 = "― これからもずっと、[wa:1850]ずっと続いていくといいわね。"
1003105-76 = "― ……あ、[wa:750]あくまでも[wa:700]仕事！[wa:750]仕事としての話だから！"
1003105-79 = "[wa:150]― （だ、[wa:900]だめっ、[wa:1500]今、[wa:550]自分が何を言ってるのか、"
1003105-81 = "[wa:200]― 自分でも[wa:400]よくわからなくなってる……！）"
1003105-88 = "今日は朝早くからありがとう、先生。"
1003105-89 = "結構寒かったけど、大丈夫かしら？"
1003105-90 = "[s] \"うん、全然大丈夫。\""
1003105-91 = "そ、そう……。"
1003105-92 = "なら用事も済んだことだし、もうそろそろ帰りましょうか……？"
1003105-93 = "[s] \"アル。\""
1003105-94 = "う、うん？なに、先生？"
1003105-95 = "[s3] \"タイミング失ってたけど、その着物すごく似合ってるよ。\"\n[s4] \"ずっと言いそびれてたけど、すごく綺麗だよ。\""
1003105-96 = "……っ！？"
1003105-97 = "……っ！？"
1003105-101 = "ふ、ふふふっ、当たり前じゃない。何と言ったって、私は便利屋68のリーダーだもの。"
1003105-107 = "でも、褒めてくれて嬉しいわ。ありがとう、先生♪"
