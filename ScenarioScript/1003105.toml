[translation]
1003105-1 = "O primeiro passo com você"
1003105-2 = "（Recebo uma mensagem da Aru e vou até o local combinado）"
1003105-6 = "（A cidade no dia de Ano Novo parecia mais limpa e silenciosa do que o habitual）"
1003105-8 = "（Uma paisagem de alguma forma mais transparente do que sempre）"
1003105-9 = "（Talvez por isso, o ar frio penetra na pele mais do que nunca）"
1003105-12 = "（No início da manhã, o frio lá fora é o suficiente para deixar a ponta do nariz e as bochechas vermelhas）"
1003105-14 = "（Apresso meus passos, como se estivesse sendo instigado pelo ar frio que atravessa minhas roupas）"
1003105-15 = "（E assim, chego no horário combinado...）"
1003105-20 = "Você está atrasado, Sensei."
1003105-21 = "[s] \"Desculpe. Mas antes disso...\""
1003105-22 = "Hm? O que foi? Com essa cara de bobo."
1003105-23 = "Fufufu, você está com uma cara de quem quer dizer algo, não é?"
1003105-25 = "（Olhadinha）"
1003105-26 = "............（Olhadinha rápida）"
1003105-27 = "[s1] \"Falando nisso, Aru, eu não consegui dizer antes, mas...\"\n[s2] \"Na verdade, esse quimono...\""
1003105-28 = "Es-espera um pouco!!"
1003105-29 = "Es-espera um pouco!!"
1003105-32 = "（Q-que silêncio foi esse agora? Isso me deixa ainda mais nervosa! N-não dá! Agora não dá! Fica para depois!）"
1003105-33 = "（Ainda não estou preparada mentalmente, então isso fica para a próxima! Vou deixar para a próxima!）"
1003105-36 = "Es-esse assunto, vamos deixar para depois! Mais importante, agora temos algo urgente para fazer."
1003105-37 = "[s] \"Algo urgente?\""
1003105-38 = "Sim, o motivo de eu ter chamado o Sensei tão cedo de manhã..."
1003105-39 = "Eu queria fazer a visita de Ano Novo aqui com você hoje, Sensei."
1003105-40 = "Dizem que este lugar é muito abençoado. Não que eu acredite de coração, mas... Sensei, você me acompanha?"
1003105-41 = "[s] \"Sim.\""
1003105-42 = "Fufu. Então vamos, Sensei!"
1003105-45 = "[wa:200]— Fufu, [wa:1500] você está andando devagar, [wa:1500] Sensei."
1003105-47 = "[wa:150]— Eh? [wa:1050] Eu estou andando rápido? [wa:2800] Que nada."
1003105-50 = "— Bem, [wa:1000] eu sempre me esforço para [wa:1350] nunca me atrasar para compromissos,"
1003105-52 = "— Como presidente, [wa:2800] é algo que levo a sério."
1003105-55 = "[wa:750]— Quem cedo madruga, [wa:800] Deus ajuda..."
1003105-58 = "[wa:150]— A Problem Solver 68 deste ano,"
1003105-60 = "[wa:100]— vai agir de forma [wa:800] mais ágil [wa:750] e proativa do que no ano passado."
1003105-63 = "[wa:200]— Claro, [wa:850] com você junto, Sensei."
1003105-66 = "— As atividades da nossa Problem Solver,"
1003105-68 = "[wa:50]— não podem mais [wa:800] continuar sem você, [wa:1250] que é do mesmo ramo."
1003105-71 = "[wa:800]— E esse tempo que passamos [wa:750] trabalhando juntos,"
1003105-73 = "— Espero que continue assim [wa:1850] para sempre."
1003105-76 = "— ...Ah, [wa:750] é apenas [wa:700] trabalho! [wa:750] Estou falando como trabalho!"
1003105-79 = "[wa:150]— (N- [wa:900] não, [wa:1500] agora, [wa:550] eu mesma não sei,"
1003105-81 = "[wa:200]— o que estou dizendo...!)"
1003105-88 = "Obrigada por vir tão cedo hoje, Sensei."
1003105-89 = "Estava bem frio, você está bem?"
1003105-90 = "[s] \"Sim, estou totalmente bem.\""
1003105-91 = "Ah, entendo..."
1003105-92 = "Já que terminamos o que tínhamos para fazer, será que já podemos ir embora...?"
1003105-93 = "[s] \"Aru.\""
1003105-94 = "U-uh? O que foi, Sensei?"
1003105-95 = "[s3] \"Eu perdi o momento, mas esse quimono combina muito com você.\"\n[s4] \"Eu não tinha conseguido dizer antes, mas você está muito bonita.\""
1003105-96 = "......!?"
1003105-97 = "……！？"
1003105-101 = "He, hehehe, é claro que sim. Afinal de contas, eu sou a líder da Problem Solver 68."
1003105-107 = "Mas fico feliz que tenha me elogiado. Obrigada, Sensei♪"
