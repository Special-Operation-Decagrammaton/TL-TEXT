10052090-29 = "Huh? Kei também sabe disso?"

10052090-30 = "Bem... aprendi a maior parte dos dados e do histórico até agora."

10052090-31 = "Você não disse isso...?"

10052090-33 = "Isso mesmo..."

10052090-34 = "Bem, sobre a situação atual. #nEu me pergunto se a expressão ``profundamente emocional'' deveria ser usada em situações como essa?"

10052090-36 = "...!"

10052090-37 = "...!"

10052090-38 = "Por que você está assim?"

10052090-39 = "Ah... não, isso."

10052090-42 = "Por que você está assim?"

10052090-44 = "Ah... não, isso."

10052090-45 = "Também penso que o presidente mudou em relação a antes."

10052090-46 = "Vou falar francamente! ?"

10052090-48 = "Posso considerar isso um bom significado? Ou..."

10052090-50 = "Você está de repente perdendo seu julgamento? ?"

10052090-51 = "Kay, acalme-se. Se você fica com raiva o tempo todo, pode acabar cometendo um erro no seu circuito emocional, certo?"

10052090-53 = "Eu não posso negar. Seu corpo ainda não foi totalmente analisado."

10052090-54 = "Se ocorrer um erro fatal, talvez eu não consiga lidar com isso."

10052090-61 = "Ah... já...!"

10052090-62 = "[s] \"...Kei-chan, você está bem?\""

10052090-63 = "Se eu desmaiar de estresse, é tudo culpa sua..."

10052090-67 = "Kay! ? Não! Alice, eu não quero isso!"

10052090-68 = "Não... eu só estava tentando dizer isso..."

10052090-69 = "[s] \"É um monte de problemas...\""

10052090-70 = "Obrigado pela compreensão, Sensei..."

10052090-76 = "Agora é hora de trabalhar, Kay. O Sensei está procurando um lugar seguro."

10052090-77 = "É melhor trabalhar para não ter que pensar em coisas desnecessárias..."

10052090-78 = "Bem, vamos começar."

