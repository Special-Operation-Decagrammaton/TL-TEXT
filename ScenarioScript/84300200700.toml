[translation]
84300200700-5 = "……De qualquer forma, parece que não tenho escolha."
84300200700-9 = "……Hm? Trinity?"
84300200700-10 = "Por acaso você é... uma das figuronas do Tea Party?"
84300200700-11 = "Este não é um lugar para uma senhorita como você, sabia?"
84300200700-12 = "……É assim que você trata seus convidados?"
84300200700-13 = "Para dissipar qualquer suspeita, farei minha apresentação. #nSou Seia Yurizono, um dos membros do Tea Party da Academia Trinity."
84300200700-14 = "É mesmo?"
84300200700-15 = "Você? Veio até aqui? Por conta própria?"
84300200700-16 = "Sim."
84300200700-17 = "Haha...! Você não tem cara de quem faria algo assim..."
84300200700-18 = "Gostei. Se fossem as nossas \"figuronas\", elas jamais escolheriam esse método."
84300200700-20 = "Isso não é verdade. Eu sou..."
84300200700-21 = "Não se intrometa. Eu não estava falando sério."
84300200700-22 = "Cada um tem suas aptidões. É só isso, não é?"
84300200700-24 = "……Entendo, sendo assim, tudo bem."
84300200700-28 = "Não pode ser... Você é Rio Tsukatsuki?"
84300200700-29 = "Pensei que você não estivesse mais em Millennium."
84300200700-33 = "Sim. Pode considerar que sim."
84300200700-34 = "Mas, sobre isso... há alguns motivos por trás."
84300200700-35 = "Eu também gostaria de perguntar. #nSeia Yurizono, por que você está aqui?"
84300200700-36 = "Você é..."
84300200700-42 = "……Isso não é um problema. Não se preocupe com isso."
84300200700-43 = "Neru, traga Seia para o esconderijo. #nContinuar a conversa aqui é muito arriscado."
84300200700-47 = "Ela? Tá falando sério?"
84300200700-49 = "(Essa garota...)"
84300200700-51 = "Já que ela descobriu sobre nós, não podemos deixá-la ir embora assim. #nNeru, isso aconteceu no momento em que você foi vista pela Seia."
84300200700-52 = "Mas não dava pra ignorar a situação daquele jeito."
84300200700-53 = "Droga... Entendido. É só levar ela, né?"
84300200700-58 = "É o que ela disse. Venha comigo."
84300200700-59 = "Já vou avisando, não tente nada engraçado. #nSó porque você é do Tea Party, não espere tratamento especial."
84300200700-65 = "Se a pessoa na comunicação é Rio Tsukatsuki... então ela é Neru Mikamo?"
84300200700-66 = "……Pelo visto, a situação é bem mais séria do que parece."
