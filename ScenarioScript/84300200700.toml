[translation]
84300200700-5 = "……いずれにせよ、私に選択肢は無いようだね。"
84300200700-9 = "……ん？トリニティ？ "
84300200700-10 = "もしかして……ティーパーティーのお偉いさんか？"
84300200700-11 = "ここは、お嬢様の来るようなとこじゃねぇぞ？"
84300200700-12 = "……それが客人に示す態度なのだね。"
84300200700-13 = "疑いを晴らす意味も込めて、自己紹介をしよう。#nトリニティ総合学園のティーパーティーが一翼、[ruby=ゆりぞの]百合園[/ruby]セイアだ。"
84300200700-14 = "へえ？"
84300200700-15 = "お前が？わざわざここまで。自分で？"
84300200700-16 = "ああ。"
84300200700-17 = "ははっ……！そんなことするような奴にゃ見えねぇが……。"
84300200700-18 = "気に入った。うちの「お偉いさん」なら、絶対選ばねぇやり方だ。"
84300200700-20 = "それは違うわ。私は――"
84300200700-21 = "急に入ってくんなよ。別に本気で言ってねぇから。"
84300200700-22 = "向き不向きがある。それだけの話だろ？"
84300200700-24 = "……そう、ならいいわ。"
84300200700-28 = "まさか……[ruby=つかつき]調月[/ruby]リオなのか？"
84300200700-29 = "ミレニアムにはもう居ないと思っていたが。"
84300200700-33 = "ええ。その認識で問題ないわ。"
84300200700-34 = "ただ、これには……少し事情があるの。"
84300200700-35 = "こちらからも聞きたいのだけれど。#n百合園セイア、なぜ貴女がここに？"
84300200700-36 = "貴女は――"
84300200700-42 = "……あれは問題ねぇ。気にすんな。"
84300200700-43 = "ネル、隠れ家までセイアを連れて来てちょうだい。#nそこで会話を続けるのはリスクが大きい。"
84300200700-47 = "こいつを？本気か？"
84300200700-49 = "（こいつ……）"
84300200700-51 = "私たちのことを知られた以上、このまま彼女を帰すわけにはいかない。#nネル――貴女がセイアに目撃された時点でね。"
84300200700-52 = "だからってあの状況で放っとけるかよ。"
84300200700-53 = "ったく……分かった。連れてきゃいいんだろ？"
84300200700-58 = "だ、そうだ。ついて来いよ。"
84300200700-59 = "言っとくけど、つまんねぇことすんなよ？#nティーパーティーだからって、特別扱いはしねぇからな。"
84300200700-65 = "通信の相手が調月リオ……ならば、彼女は[ruby=みかも]美甘[/ruby]ネルか？"
84300200700-66 = "……どうやら、ただ事ではなさそうだね。"
