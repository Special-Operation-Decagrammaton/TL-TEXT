[translation]#[Não revisado] - Filipe 09/06/26
2005808-1 = "Erika, base secreta"
2005808-2 = "(Depois do trabalho, combinou de se encontrar com Erika)"
2005808-5 = "Ah, professor, oi."
2005808-6 = "Você sempre trabalha tanto, hein. Veio a Gehenna a negócios?"
2005808-7 = "[s1] \"Mais ou menos.\"\n[s2] \"Professor, eu não estou brincando, viu?!\""
2005808-10 = "Tá, tá, eu sei."
2005808-11 = "Que bom te ver."
2005808-12 = "[s] \"Como você disse, o céu está muito bonito.\""
2005808-13 = "Né? Hoje está lindo mesmo."
2005808-14 = "Ah, você tem um tempinho agora?"
2005808-15 = "Tem um lugar que queria te mostrar."
2005808-16 = "Você pode? Fufu, que bom."
2005808-20 = "Então, vem comigo."
2005808-22 = "(Seguiu Erika até um certo prédio)"
2005808-26 = "Que silêncio, né? Nesse horário, todo mundo já foi embora."
2005808-27 = "O pessoal vai embora bem rápido. Bem, não tem nada aqui mesmo."
2005808-28 = "Eu gosto de curtir a escola deserta assim."
2005808-32 = "[ns] \"Erika, você trocou de perfume?\""
2005808-36 = "Hã, como é?"
2005808-37 = "[s3] \"Achei diferente do de sempre.\"\n[s4] \"Esse também é gostoso.\""
2005808-40 = "Ah... é... mudei para um que me recomendaram."
2005808-41 = "Bom, se o cheiro é bom, que bom... é."
2005808-42 = "Aliás, ninguém normalmente repara nessas coisas... Você é meio estranho, ou muito observador..."
2005808-43 = "Deixa pra lá. Vem cá."
2005808-48 = "Olha, sua mão."
2005808-50 = "(Erika puxou a sua mão e chegaram a...)"
2005808-56 = "[wa:602]– [log=에리카]Bem-vindo, [wa:994]professor.[/log]"
2005808-58 = "– [log=에리카]Este lugar é a minha [wa:946]base secreta –[wa:603] só minha.[/log]"
2005808-61 = "[wa:2193]– [log=에리카]Onde venho quando quero [wa:1949]ficar sozinha.[/log]"
2005808-63 = "– [log=에리카]Fufu, [wa:1592]mas [wa:577]'base secreta' [wa:1630]é até meio [wa:487]exagerado.[/log]"
2005808-66 = "[wa:813]– [log=에리카]... É que eu queria [wa:938]compartilhar isso [wa:1285]com você, professor.[/log]"
2005808-68 = "– [log=에리카]A paisagem [wa:1483]que sempre vejo, [wa:1712]a atmosfera que sinto, [wa:1775]essas coisas.[/log]"
2005808-71 = "[wa:810]– [log=에리카]Não sei explicar direito...[wa:1250]mas é [wa:910]só um [wa:310]sentimento.[/log]"
2005808-73 = "– [log=에리카]É que... [wa:2110]mostrar um lugar secreto é uma prova de que você é especial.[/log]"
2005808-76 = "– [log=에리카]Você é uma [wa:1406]pessoa [wa:721]especial [wa:693]pra [wa:521]mim.[/log]"
2005808-79 = "[wa:171]– [log=에리카]... Fufu.[/log]"
2005808-81 = "– [log=에리카]Aqui é [wa:290]silencioso, né?[/log]"
2005808-84 = "– [log=에리카]Mas... [wa:1848]o meu coração está [wa:2337]um pouco [wa:329]agitado.[/log]"
2005808-89 = "Aqui realmente não vem ninguém."
2005808-90 = "Desde a primeira vez que vim, sempre foi só meu."
2005808-91 = "Bom, eu gosto de ter o lugar só para mim."
2005808-92 = "Gostou?"
2005808-93 = "Então vou guardar um cantinho para você também."
2005808-94 = "Ufa..."
2005808-95 = "Deveria ser uma paisagem comum... mas hoje parece diferente."
2005808-96 = "Bem, eu sei o motivo... mas é meio estranho ver na prática."
2005808-98 = "(Ficou um tempo olhando o pôr do sol com Erika)"
2005808-99 = "(Só saiu do terraço depois que o sol se pôs no horizonte)"
2005808-101 = "Nossa, o sol se põe rápido, hein."
2005808-102 = "[s] \"Você sempre fica até essa hora?\""
2005808-103 = "Não."
2005808-104 = "O corredor escuro me dá medo, então não gosto muito."
2005808-105 = "Normalmente, saio do terraço enquanto ainda está claro... mas"
2005808-110 = "Hoje estava com você."
2005808-111 = "Não precisa nem conversar, só de estar ao lado já me deixa calma... acabei ficando mais tempo."
2005808-112 = "Ah, agora que você falou, professor, não tem problema? Ficou tarde."
2005808-113 = "[s5] \"Eu também gostei.\"\n[s6] \"Fazia tempo que não tinha um momento tranquilo assim.\""
2005808-118 = "Vai dizer essas coisas de novo..."
2005808-119 = "Bem, esse seu jeito..."
2005808-120 = "O corredor, escuro e perigoso –"
2005808-125 = "Dá sua mão."
2005808-127 = "(Andaram juntos pelo corredor escuro...)"
2005808-128 = "(Mesmo quando chegaram a um lugar iluminado, Erika não soltou a mão)"