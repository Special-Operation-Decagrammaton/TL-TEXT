[translation]
2005808-1 = "Erika and Secret Hideout"
2005808-2 = "(I'm meeting with Erika after work.)"
2005808-5 = "Ah, yahoo, Sensei."
2005808-6 = "You're always working hard. You have business to do in Gehenna?"
2005808-7 = "[s1] \"A little.\"\n[s2] \"I'm not just playing around, you know!?\""
2005808-10 = "Yes, yes, I know~."
2005808-11 = "I'm happy we can meet like this."
2005808-12 = "[s] \"Just as you said, the sky was really beautiful.\""
2005808-13 = "Right? It's really beautiful today."
2005808-14 = "Ah, that's right, do you have some time right now?"
2005808-15 = "There's a place I want to show you."
2005808-16 = "You have time? Hehe, glad to hear it."
2005808-20 = "Well then, follow me."
2005808-22 = "(I followed Erika and headed towards a certain building.)"
2005808-26 = "Quiet, isn't it. #nEveryone's already gone home by this time."
2005808-27 = "They tend to go home pretty quickly. Well, there's nothing to do even if you stay #nlong."
2005808-28 = "I like to enjoy the quiet campus like this."
2005808-32 = "[ns] \"Did you change your perfume, Erika?\""
2005808-36 = "Eh, yeah!?"
2005808-37 = "[s3] \"It feels different from usual.\"\n[s4] \"This one is nice too.\""
2005808-40 = "Ah... y-yeah..."
2005808-41 = "I changed it to the one that was recommended."
2005808-42 = "Well, as long as it smells nice, that's good... yeah."
2005808-43 = "I mean... people don't usually notice things like this, do they? #nYou're kind of weird, Sensei, or strangely sharp..."
2005808-44 = "Well, whatever. Come here."
2005808-48 = "Here, your hand. Give me your hand."
2005808-50 = "(Where I arrived after being pulled by Erika's hand was...)"
2005808-56 = "[wa:602]― [log=에리카]Welcome, [wa:994]Sensei.[/log]"
2005808-58 = "― [log=에리카]This is, [wa:946]my own [wa:603]secret hideout―[/log]"
2005808-61 = "[wa:2193]― [log=에리카]The place I come to [wa:1949]when I want to be alone.[/log]"
2005808-63 = "― [log=에리카]Hehe, [wa:1592]but for a [wa:577]secret hideout, [wa:1200]it might be a little big.[/log]"
2005808-66 = "[wa:813]― [log=에리카]……Somehow, [wa:1285]I want to share it with you, Sensei.[/log]"
2005808-68 = "― [log=에리카]I mean the scenery I always see [wa:1483]...or the air I [wa:1500]feel.[wa:1775][/log]"
2005808-71 = "[wa:810]― [log=에리카]Even if you ask me the reason [wa:1250]all I can say is [wa:910]I don't [wa:310]know…….[/log]"
2005808-73 = "― [log=에리카]Yeah…… [wa:1600]Telling you about a secret place is [wa:1500]proof that it's special.[/log]"
2005808-76 = "― [log=에리카]Sensei, [wa:650]it means you are [wa:800]my [wa:721]special person.[/log]"
2005808-79 = "[wa:171]― [log=에리카]……Hehe.[/log]"
2005808-81 = "― [log=에리카]It's [wa:290]quiet here, right?[/log]"
2005808-84 = "― [log=에리카]Well, but…… [wa:1848]my heart is [wa:2337]a little [wa:329]restless right now.[/log]"
2005808-89 = "Nobody really comes here."
2005808-90 = "Ever since the first time I came here, it's been my own place."
2005808-91 = "Well, I'm happy because I can have it all to myself."
2005808-92 = "How is it? Do you like it?"
2005808-93 = "Then I'll save a spot for you too, Sensei."
2005808-94 = "Phew..."
2005808-95 = "It should be a familiar scenery... but I feel like it's somehow different today."
2005808-96 = "Well, I know the reason why... #nIt's just, it's strange to actually experience it."
2005808-98 = "(I watched the sunset with Erika for a while.)"
2005808-99 = "(We left the rooftop after the sun sunk below the horizon.)"
2005808-101 = "Wow, the sun sets fast."
2005808-102 = "[s] \"Are you always here until this time?\""
2005808-103 = "No."
2005808-104 = "The hallways at night are a bit scary, so not really."
2005808-105 = "Usually I leave the rooftop while there's still daylight, but..."
2005808-110 = "I was with you today, Sensei."
2005808-111 = "Even if we don't say anything, just having you next to me somehow calms me #ndown... so I accidentally stayed too long."
2005808-112 = "Ah, speaking of which, are you okay, Sensei? Isn't it getting late?"
2005808-113 = "[s5] \"I had fun too.\"\n[s6] \"I was able to spend some relaxing time for the first time in a while.\""
2005808-118 = "You're saying things like that again..."
2005808-119 = "Well, that side of you is..."
2005808-120 = "The hallways are dangerous and scary when they're dark, so--"
2005808-125 = "Lend me your hand."
2005808-127 = "(We walked the dark hallway together...)"
2005808-128 = "(Even after arriving at a bright area, Erika didn't let go of my hand.)"