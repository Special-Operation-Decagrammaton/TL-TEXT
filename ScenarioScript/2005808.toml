[translation]
2005808-1 = "エリカ、秘密基地"
2005808-2 = "（仕事終わりにエリカと会うことになった）"
2005808-5 = "あっ、先生やっほ。"
2005808-6 = "いつも大変だね。ゲヘナにまで来る用事？"
2005808-7 = "[s1] \"ちょっとね。\"\n[s2] \"先生、別に遊んでるわけじゃないからね！？\""
2005808-10 = "はいはい、分かってますよー。"
2005808-11 = "こうやって会えて嬉しい。"
2005808-12 = "[s] \"教えてもらった通り、空すごく綺麗だった。\""
2005808-13 = "でしょ？今日本当に綺麗だよね。"
2005808-14 = "あ、そうだ今ちょっと時間大丈夫？"
2005808-15 = "ちょっと、教えたい場所があって。"
2005808-16 = "時間大丈夫そう？ふふ、よかった。"
2005808-20 = "じゃあ、ついてきて。"
2005808-22 = "（エリカの後に続いてとある建物へ向かった）"
2005808-26 = "静かでしょ。#nこの時間はもうみんな帰っちゃってるからさ。"
2005808-27 = "割とすぐに帰っちゃうんだよね。まぁ、長居してても何も無いし。"
2005808-28 = "私はこうやって、静かな校内を楽しんだりするんだけどね。"
2005808-32 = "[ns] \"エリカ、香水変えた？\""
2005808-36 = "へ、うん！？"
2005808-37 = "[s3] \"いつもと違う気がして。\"\n[s4] \"こっちもいいね。\""
2005808-40 = "あっ……う、うん……。"
2005808-41 = "オススメされたやつ、に変えてみた。"
2005808-42 = "まあ、いい匂いなら、よかった……うん。"
2005808-43 = "というか、こういうのって普通気付かないよね？#n先生ってなんか不思議っていうか、妙に鋭いっていうか……。"
2005808-44 = "まぁいいや。こっち来て。"
2005808-48 = "ほら、手。出して。"
2005808-50 = "（エリカに手を引かれてたどり着いたのは……）"
2005808-56 = "[wa:602]― [log=에리카]ようこそ、[wa:994]先生。[/log]"
2005808-58 = "― [log=에리카]ここが、[wa:946]私だけの[wa:603]秘密基地――[/log]"
2005808-61 = "[wa:2193]― [log=에리카]一人の時間が欲しい時に、[wa:1949]来る場所。[/log]"
2005808-63 = "― [log=에리카]ふふっ、[wa:1592]でも[wa:577]秘密基地っていうには、 [wa:1630]ちょっと[wa:487]広いかも。[/log]"
2005808-66 = "[wa:813]― [log=에리카]……なんか、[wa:1285]先生に[wa:938]共有したかったんだよね。[/log]"
2005808-68 = "― [log=에리카]私がいつも見ている[wa:1483]景色とか……[wa:1712]感じてる空気、[wa:1775]とか。[/log]"
2005808-71 = "[wa:810]― [log=에리카]理由を聞かれても[wa:1250]なんとなく、[wa:910]しか[wa:310]言えないんだけど……。[/log]"
2005808-73 = "― [log=에리카]そうだね……[wa:2110]秘密の場所を教えるのって、[wa:2336]特別の証だからさ。[/log]"
2005808-76 = "― [log=에리카]先生は、[wa:1406]私の[wa:721]特別な[wa:693]人[wa:521]ってこと。[/log]"
2005808-79 = "[wa:171]― [log=에리카]……ふふっ。[/log]"
2005808-81 = "― [log=에리카]ここは[wa:290]静かでしょ？[/log]"
2005808-84 = "― [log=에리카]まあでも……[wa:1848]私の心は、[wa:2337]ちょっと[wa:329]騒がしいんだけどね。[/log]"
2005808-89 = "ここに来る人って本当にいないんだ。"
2005808-90 = "初めて来た時からずーっと、私だけの場所。"
2005808-91 = "まあ、独り占めできるから嬉しいんだけど。"
2005808-92 = "どう？気に入った？"
2005808-93 = "じゃあ先生の場所も、取っておいてあげる。"
2005808-94 = "ふぅ……。"
2005808-95 = "見慣れた景色のはずなのに……今日はなんか違う気がする。"
2005808-96 = "まあ理由は分かってるんだけどさ……。#nなんか、実際に体験すると不思議だね。"
2005808-98 = "（エリカとしばらく夕焼けを眺めた）"
2005808-99 = "（屋上を出たのは、水平線に日が沈んでからだった）"
2005808-101 = "わ、日が落ちるの早いね。"
2005808-102 = "[s] \"いつもこんな時間までいるの？\""
2005808-103 = "ううん。"
2005808-104 = "夜の廊下ってちょっと怖いからあんまり。"
2005808-105 = "いつもはまだ日があるうちに屋上を出るんだけど……。"
2005808-110 = "今日は先生と一緒だったし。"
2005808-111 = "何も話さなくても、隣にいるだけでなんか落ち着くから……#nうっかり長居しちゃった。"
2005808-112 = "あ、そういえば先生は大丈夫？遅くなっちゃったんじゃない？"
2005808-113 = "[s5] \"私も楽しかったから。\"\n[s6] \"久しぶりにゆっくりした時間を過ごせたよ。\""
2005808-118 = "またそういうコト言って……。"
2005808-119 = "まあ、そういうところが……。"
2005808-120 = "廊下、暗いと危ないし怖いからさ――"
2005808-125 = "手、貸してね。"
2005808-127 = "（暗い廊下を一緒に歩き……）"
2005808-128 = "（明かりの灯る場所に到着しても、エリカは手を離さずにいた）"
