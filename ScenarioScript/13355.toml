[translation]
13355-3 = "きみたちに、このくるしみは……。"
13355-7 = "ううん、知ってる。"
13355-8 = "だって、私は……。"
13355-11 = "あ、ああっ……なんだ、アレは……？"
13355-12 = "……死の神、アヌビス？"
13355-13 = "あ、あんなもの、無理に決まっている。"
13355-14 = "なぜ二つの神聖が同時に？"
13355-15 = "それも、ホルスに匹敵するほどの存在が……。"
13355-16 = "……なぜ、なぜ、なぜ！"
13355-17 = "なぜだッ――！！"
13355-18 = "こんなチートが許されるのか！？"
13355-19 = "コデックスに反している！ルール違反だろこんなの……！#nクソッ、匿名の行人は何をしている……あの役立たずが！"
13355-20 = "こんな存在がいるなら先に言えよッ！"
13355-25 = "「セトの[ruby=ふんぬ]憤怒[/ruby]」の顕現が、止まってしまった……。"
13355-26 = "……これでは、エンディングにたどり着けない。"
13355-27 = "いや、今こそ五つ目の攻略法の出番だ。"
13355-28 = "まさか、ここまで手こずらせてくるとは……[USERNAME]よ！"
13355-29 = "だが、最後に笑うのは――"
13355-33 = "この小生に決まっているッッ！"
13355-35 = "次回;手帳"
