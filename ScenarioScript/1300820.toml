[translation]
1300820-1 = "お気に入りのバッグ"
1300820-4 = "はあ、はあ、はあ……！"
1300820-5 = "いい？先生、ここから動かないでね。"
1300820-11 = "私が良いって言うまで、絶対に出てきちゃダメよ。#n約束、絶対ね。"
1300820-12 = "[s1] \"わ、分かったけど……\"\n[s2] \"セリカは心配性だね。\""
1300820-15 = "だ、誰が心配性よ！先生のバカっ！"
1300820-16 = "とにかく、流れ弾には気をつけるのよ！"
1300820-21 = "（セリカは返事も聞かずに走り出してしまった……）"
1300820-27 = "なんだ、何か作戦があって逃げてるのかと思えば、行き止まりじゃねぇか。"
1300820-31 = "くくっ、最初から素直に言うこと聞いてたら、手加減してやったのになぁ？#n……覚悟はできてんのか？"
1300820-37 = "……よく言うわね。"
1300820-38 = "覚悟が必要なのはどっちなのか、分からせてあげる！"
1300820-39 = "ああ、もう！ムカついてきたっ！"
1300820-42 = "ぐっ……い、[ruby=いて]痛[/ruby]ぇな！クソッ……！"
1300820-43 = "どうなってんだ？#n最初はあんな逃げ腰だったっていうのに……！"
1300820-50 = "これで終わりだと思ってるんじゃないわよね？"
1300820-51 = "チッ！一時撤退だ！"
1300820-55 = "お、おいっ！1人で逃げんなよ！！"
1300820-59 = "待ちなさい！ここでケリをつけてやるんだから！"
1300820-61 = "[s] \"まぁまぁ、セリカ。そこまでにしておこう？\""
1300820-68 = "先生！？隠れててって言ったじゃん！#nどうして出てきちゃったの！？"
1300820-69 = "……このままじゃ収拾がつかなくなりそうって？"
1300820-70 = "な、なによ！#n私が目の前のことしか見えなくなってるみたいじゃない！"
1300820-71 = "[s] \"セリカが無事なら、それで大丈夫だからさ。\""
1300820-72 = "……そんな心配されたくらいで、[ruby=うなず]頷く[/ruby]と思ってるの？"
1300820-77 = "……あれ？"
1300820-78 = "バッグの紐、切れちゃった……#nヤバ、角も破れてるし……"
1300820-79 = "……。"
1300820-80 = "[ns] \"セリカ？\""
1300820-81 = "お気に入りのバッグだったのに……"
1300820-86 = "仕方ないわね……だいぶ前に買ったものだし……"
1300820-90 = "……。"
1300820-91 = "はぁ……気に入ってたんだけど、なぁ……"
1300820-92 = "[s] \"……セリカ、こっちおいで！\""
1300820-93 = "え、先生？急にどうしたの？#nって、ちょっと……どこ行くのよ！"
1300820-97 = "そ、そんなに引っ張らなくても大丈夫だから！"
1300820-103 = "先生、ここは……？"
1300820-104 = "そろそろ教えてくれても……"
1300820-105 = "[s3] \"いいからいいから、ここは先生に任せて。\"\n[s4] \"店長、いませんか？\""
1300820-111 = "お、先生じゃないか。今日はどうしたんだい？"
1300820-112 = "[s] \"それがですね……\""
1300820-115 = "なるほど、君のカバンが……"
1300820-116 = "これ……なんだけど……"
1300820-122 = "うむ……バッグのストラップが切れてしまったのか。#n角も少し破れちゃっている……"
1300820-123 = "他にも、あちこちに傷があるね……"
1300820-124 = "うぅ……"
1300820-125 = "でも、君がこのバッグを大切にしている気持ちは伝わってくるよ。"
1300820-126 = "ほ、本当……！？"
1300820-127 = "ああ、しっかり手入れされているのが見て取れる。#n良い持ち主に恵まれて、きっとバッグも喜んでるはずさ。"
1300820-128 = "そ、そう……かしら？なんか、恥ずかしいわね……"
1300820-129 = "よし、一仕事といこう。……これはやり甲斐があるな。"
1300820-135 = "[ns] \"良かったね、セリカ。\""
1300820-136 = "う、うん……"
1300820-137 = "けど、たかがスポーツバッグに[ruby=おおげさ]大袈裟[/ruby]よ。#n先生も、店長も……"
1300820-138 = "[s] \"でもセリカにとっては大切なバッグなんだよね？\""
1300820-139 = "な、なに言ってんの！アレはただ！"
1300820-143 = "ただ……"
1300820-144 = "……。"
1300820-145 = "[s] \"何か思い出があるんじゃない？\""
1300820-146 = "ううん、思い出って言うほどじゃないわ。"
1300820-147 = "ただ……初めてのバイト代で買ったってだけ。"
1300820-148 = "学校、バイト、スポーツ、銃の手入れ……#nどこにでも持っていける丈夫なバッグって広告を見かけて……"
1300820-149 = "[s] \"その通りだったね。\""
1300820-150 = "先生も、そう思ってくれる……？"
1300820-151 = "……へへ。うん、今日まで私を支えてくれてたくらいだし。"
1300820-152 = "自分でも不思議なくらい、愛着が湧いちゃって……"
1300820-153 = "まあきっと、それだけ丈夫でずっと使ってたからというのもあるんでしょうけど。"
1300820-154 = "こう見えても私、物を見る目にはちょっと自信があるから！"
1300820-155 = "[s] \"……。\""
1300820-156 = "な、なによ先生……急に黙って。"
1300820-160 = "もう！その顔はなに！"
1300820-161 = "……。"
1300820-162 = "汚れちゃったし、ちょっと手洗ってくる……！"
1300820-169 = "よし、できた。一度持ってみてくれるかい？"
1300820-170 = "わぁ……新品同然じゃない！#nストラップも丈夫なものに変わってるし……"
1300820-171 = "どうだ、気に入ってくれたかい？"
1300820-172 = "すっごく！……それ以上に、ビックリしたけど……"
1300820-173 = "なら良かった。はは、まだまだ私も隠居するには早いな。"
1300820-174 = "あ、ありがとう、店長。#nじゃあ、お会計を……"
1300820-175 = "ああ、そうだな……今日は特別に、基本料だけで構わない。"
1300820-176 = "えっ、いいの？"
1300820-177 = "先生には、ウチをご贔屓にしてもらってるからね。#nそれに物を大切にしてる子を見ると私も嬉しいし、初めて来てくれたからサービスだ。"
1300820-178 = "……。"
1300820-184 = "ありがとう、店長！私、これからも大切にする！"
1300820-185 = "あっ、バイトの時間だ……遅れちゃう！#nごめん、先生！また今度ちゃんとお礼させて！"
1300820-189 = "……で。"
1300820-190 = "これで良かったのかい、先生？"
1300820-191 = "[ns] （[ruby=うなず]頷く[/ruby]）"
1300820-192 = "結構な金額だが……まあ、私は代金を支払ってもらえるなら構わない。"
1300820-193 = "ここまでする理由を教えてくれないか、先生？"
1300820-194 = "[s5] \"あれは、セリカにとって大切な思い出の品ですから。\"\n[s6] \"お金には代えられない価値があるんです。\""
1300820-200 = "……そうか。"
1300820-201 = "心配しないでくれ。どんな風に使っても数年は壊れないさ。"
1300820-203 = "（その後、用事を済ませてからシャーレに戻った）"
