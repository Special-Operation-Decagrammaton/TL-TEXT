[translation]
1300820-1 = "Bolsa favorita"
1300820-4 = "Haa, haa, haa...!"
1300820-5 = "Entendeu? Sensei, não saia daqui."
1300820-11 = "Não saia de jeito nenhum até eu dizer que pode. #nPromete, entendeu?"
1300820-12 = "[s1] \"T-tá bom, mas...\"\n[s2] \"A Serika é muito preocupada, hein.\""
1300820-15 = "Q-quem é preocupada?! Seu idiota, Sensei!"
1300820-16 = "De qualquer forma, cuidado com as balas perdidas!"
1300820-21 = "(Serika saiu correndo sem nem esperar pela resposta...)"
1300820-27 = "Qual é, pensei que você estava fugindo por causa de algum plano, mas é um beco sem saída, não é?"
1300820-31 = "Hehe, se tivesse me escutado desde o início, eu teria pegado leve, sabe? #n...Está preparada?"
1300820-37 = "...Que cinismo."
1300820-38 = "Vou te mostrar quem é que precisa estar preparado!"
1300820-39 = "Ah, chega! Isso está me deixando irritada!"
1300820-42 = "Grr... I-isso dói! Droga...!"
1300820-43 = "O que está acontecendo? #nEla estava fugindo tanto agora pouco...!"
1300820-50 = "Você não acha que isso acaba aqui, né?"
1300820-51 = "Tsc! Recuar por enquanto!"
1300820-55 = "Ei, ei! Não fuja sozinha!!"
1300820-59 = "Espere! Eu vou acabar com isso aqui mesmo!"
1300820-61 = "[s] \"Calma, calma, Serika. Vamos parar por aqui, tá?\""
1300820-68 = "Sensei!? Eu disse para ficar escondido! #nPor que você saiu de lá!?"
1300820-69 = "...Você acha que a situação ia sair do controle se não fizesse nada?"
1300820-70 = "Q-que seja! #nParece até que eu não consigo ver nada além do que está na minha frente!"
1300820-71 = "[s] \"Se a Serika estiver bem, então está tudo certo.\""
1300820-72 = "...Você acha que eu vou concordar só porque você se preocupou comigo?"
1300820-77 = "...Ué?"
1300820-78 = "A alça da bolsa arrebentou... #nDroga, o canto também rasgou..."
1300820-79 = "..."
1300820-80 = "[ns] \"Serika?\""
1300820-81 = "Era minha bolsa favorita..."
1300820-86 = "Não tem jeito... comprei faz muito tempo..."
1300820-90 = "..."
1300820-91 = "Haa... eu gostava tanto dela..."
1300820-92 = "[s] \"...Serika, vem aqui!\""
1300820-93 = "Hã, Sensei? O que foi de repente? #nEi, espera... onde você está me levando!"
1300820-97 = "N-não precisa me puxar com tanta força!"
1300820-103 = "Sensei, onde estamos...?"
1300820-104 = "Já pode me contar..."
1300820-105 = "[s3] \"Calma, calma, deixa com o Sensei.\"\n[s4] \"Gerente, está aí?\""
1300820-111 = "Oh, Sensei. O que traz você aqui hoje?"
1300820-112 = "[s] \"É que...\""
1300820-115 = "Entendo, a bolsa dela..."
1300820-116 = "É esta... aqui..."
1300820-122 = "Hum... a alça da bolsa arrebentou. #nO canto também está um pouco rasgado..."
1300820-123 = "Tem marcas de desgaste por toda parte também..."
1300820-124 = "Uuu..."
1300820-125 = "Mas dá para ver o quanto você cuida bem dessa bolsa."
1300820-126 = "S-sério...?"
1300820-127 = "Sim, dá para ver que ela foi bem cuidada. #nCom uma dona tão cuidadosa, a bolsa com certeza deve estar feliz."
1300820-128 = "S-sério...? Nossa, que vergonha..."
1300820-129 = "Muito bem, hora de trabalhar. ...Isso vai valer a pena."
1300820-135 = "[ns] \"Que bom para você, Serika.\""
1300820-136 = "Ah, sim..."
1300820-137 = "Mas é um exagero por causa de uma simples bolsa esportiva. O Sensei e o gerente também..."
1300820-138 = "[s] \"Mas ela é uma bolsa importante para você, não é, Serika?\""
1300820-139 = "O-o que você está dizendo! Aquilo é só uma bolsa!"
1300820-143 = "Só uma..."
1300820-144 = "..."
1300820-145 = "[s] \"Você não tem alguma lembrança com ela?\""
1300820-146 = "Não, não é nada que eu chamaria de lembrança."
1300820-147 = "É só que... eu comprei com o meu primeiro salário de meio período."
1300820-148 = "Eu vi um anúncio dizendo que era uma bolsa resistente, que dava para levar para a escola, para o trabalho, para o esporte, para cuidar da arma..."
1300820-149 = "[s] \"E era verdade, não era?\""
1300820-150 = "Você também acha isso, Sensei...?"
1300820-151 = "...Hehe. É, ela me acompanhou até hoje, afinal."
1300820-152 = "Eu mesma me surpreendo com o quanto acabei me apegando a ela..."
1300820-153 = "Bem, com certeza é porque ela é resistente e eu a usei por muito tempo."
1300820-154 = "Pode não parecer, mas eu tenho um pouco de confiança no meu olho para escolher as coisas!"
1300820-155 = "[s] \"...\""
1300820-156 = "O-o que foi, Sensei... Por que ficou em silêncio de repente?"
1300820-160 = "Ah! Que cara é essa!"
1300820-161 = "..."
1300820-162 = "Ela ficou suja, vou ali lavar rapidinho...!"
1300820-169 = "Pronto, terminei. Pode tentar segurar?"
1300820-170 = "Uau... parece novinha em folha! Até a alça foi trocada por uma bem resistente..."
1300820-171 = "E então, gostou?"
1300820-172 = "Muito! ...Mas, mais do que isso, estou surpresa..."
1300820-173 = "Fico feliz. Haha, ainda é cedo demais para eu me aposentar."
1300820-174 = "O-obrigada, gerente. Então, quanto fica..."
1300820-175 = "Ah, sobre isso... hoje, por ser especial, cobrarei apenas o valor básico."
1300820-176 = "Sério, pode ser?"
1300820-177 = "O Sensei sempre prestigia a nossa loja. Além disso, fico feliz em ver alguém que cuida bem das suas coisas, e como é a primeira vez que você vem, é uma cortesia."
1300820-178 = "..."
1300820-184 = "Obrigada, gerente! Vou continuar cuidando dela com carinho!"
1300820-185 = "Ah, é hora do trabalho... vou me atrasar! Desculpa, Sensei! Depois eu te agradeço direito!"
1300820-189 = "...Então."
1300820-190 = "Isso foi o certo a se fazer, Sensei?"
1300820-191 = "[ns] (Assente)"
1300820-192 = "É uma quantia considerável, mas... bem, contanto que eu receba o pagamento, não me importo."
1300820-193 = "Pode me dizer o motivo de ir tão longe, Sensei?"
1300820-194 = "[s5] \"Porque aquele é um objeto com lembranças importantes para a Serika.\"\n[s6] \"Tem um valor que o dinheiro não pode comprar.\""
1300820-200 = "...Entendo."
1300820-201 = "Não se preocupe. Não importa como ela use, não vai quebrar por alguns anos."
1300820-203 = "(Depois disso, resolvi meus assuntos e voltei para o Schale)"
