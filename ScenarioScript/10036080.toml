[translation]
10036080-1 = "第8話;伝説のスケバン"
10036080-3 = "かつて、ヴァルキューレ警察学校にとって悪夢のような事件がありました。"
10036080-8 = "12台の警備車両、2台の戦車が全損し、多数の怪我人を出した大惨事。#nその甚大な被害は、たった一人による犯行だったのです。"
10036080-13 = "あの身体能力は他の追随を許しません。"
10036080-18 = "悪名高き「七囚人」の一人であり、「伝説のスケバン」――"
10036080-24 = "うふふっ。美しい夜ですわね、皆さん。"
10036080-25 = "すぅぅぅ、はぁ……やっぱり、シャバの空気は格別です。"
10036080-28 = "[ruby=くりはま]栗浜[/ruby]アケミ……！"
10036080-30 = "覚えていただけていたようで、感激ですわ。"
10036080-31 = "あらためて、ご挨拶いたしましょう。"
10036080-32 = "[s] （彼女が伝説のスケバン……？）"
10036080-33 = "私の名は、栗浜アケミ。"
10036080-34 = "こう見えて、スケバンをしておりますの。"
10036080-35 = "皆さんにお会いできる日を、いまかいまかと待ち焦がれておりましたのよ？"
10036080-36 = "……私のこと、覚えていらっしゃるでしょう？"
10036080-38 = "……！"
10036080-40 = "忘れられては、困りますのよ。"
10036080-41 = "うふふっ。#nだって、皆さんの密告によって私は捕まったんですもの。"
10036080-42 = "矯正局で過ごした時間が、懐かしいですわね……。"
10036080-43 = "どうやってアンタたちに復讐しようかと考えていた毎日が！"
10036080-44 = "では――お覚悟を。"
10036080-46 = "か、覚悟……！？"
10036080-48 = "ええ……今から、私にブッ殺される覚悟です。"
10036080-50 = "ひ、ひいっ……！"
10036080-51 = "やっぱり、あのスケバンに奇襲を指示していたのは、お前だったんだな！"
10036080-53 = "はい……？"
10036080-60 = "ね、姐様ぁぁぁっ！！！！"
10036080-62 = "あらまあ、皆さんどうしてこちらに？"
10036080-63 = "もちろん、姐様の仇を討つためですよ！"
10036080-64 = "そんな、私はもうスケバンではありませんわ。#n矯正局から脱獄してきた囚人に過ぎませんのよ。"
10036080-65 = "そんなこと言わないでください！"
10036080-66 = "ウチらを守るために、捕まったようなものじゃないですか！"
10036080-67 = "ヴァルキューレめ……よくも姐様を！"
10036080-68 = "皆さん、そこまで私のことを想っていてくださったのですね……。"
10036080-69 = "感動いたしましたわ……！"
10036080-70 = "うふふ。やはり、あの教授に頼んでおいて正解でした。"
10036080-71 = "姐様も、ニヤニヤ教授に依頼を！？"
10036080-72 = "まさか、あいつが言ってた「彼女」が、姐様だったとは……！"
10036080-76 = "[ns] （ニヤニヤ教授、どこかで聞いた覚えがあるような……）"
10036080-82 = "スキだらけだな！"
10036080-83 = "さっきまで矯正局に捕まってたんなら、腕が鈍ってるに違いねぇ！"
10036080-84 = "ここで倒しちまえば、ヘルメット団の株はうなぎ登りだぜ！"
10036080-90 = "うふふ、良いですわね。"
10036080-91 = "ですが、この戦いは私が一人で参りましょう。"
10036080-92 = "ここまで頑張ってくださったことには、感謝いたします。"
10036080-93 = "うふふ、ここからは私とエリザベスでお相手するといたしましょう！"
10036080-94 = "さぁ、行きますわよ！"
10036080-97 = "うわあぁぁっ！"
10036080-98 = "お、お前たち、逃げるんじゃねぇ！"
10036080-102 = "――ぎゃあぁぁぁっ！#nやっぱ無理だ逃げろ！"
10036080-114 = "姫、危なっ――！"
10036080-123 = "くっ……"
10036080-124 = "み、ミサキさん！"
10036080-126 = "ミサキ！"
10036080-127 = "みんなが危ない……！"
10036080-128 = "先生……！"
10036080-129 = "[s] \"分かった！\""
10036080-130 = "そこまでだ！"
10036080-132 = "はい？"
10036080-137 = "なっ、私のエリザベスが……！"
10036080-138 = "[s] （あの武器、そんな名前だったんだ……）"
10036080-139 = "許せません……！"
10036080-141 = "大人しく立ち去れ。"
10036080-142 = "そうすれば、見逃してやろう。"
10036080-143 = "どちら様でしょう？"
10036080-144 = "私に指図するだなんて……。"
10036080-145 = "この程度で、私が引き下がるとでも！？"
10036080-146 = "立ちふさがる者は……。"
10036080-147 = "一人残らず、徹底的に教育して差し上げましょう！"
