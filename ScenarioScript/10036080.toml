[translation]
10036080-1 = "Episódio 8; A Sukeban Lendária"
10036080-3 = "Houve um incidente que, certa vez, foi um pesadelo para a Academia de Polícia Valkyrie."
10036080-8 = "Uma catástrofe onde 12 veículos de patrulha e 2 tanques foram totalmente destruídos, deixando inúmeros feridos.#nE aquele dano imenso foi causado por apenas uma pessoa."
10036080-13 = "Aquela habilidade física não tem comparação."
10036080-18 = "Uma das infames \"Sete Prisioneiras\", a \"Sukeban Lendária\"—"
10036080-24 = "Fufu. Que noite linda, não é, pessoal?"
10036080-25 = "Suspiro... Ah... Como esperado, o ar do mundo exterior é algo especial."
10036080-28 = "Kurihama Akemi...!"
10036080-30 = "Fico emocionada por terem se lembrado de mim."
10036080-31 = "Vamos nos cumprimentar formalmente."
10036080-32 = "[s] (Ela é a Sukeban Lendária...?)"
10036080-33 = "Meu nome é Kurihama Akemi."
10036080-34 = "Apesar da aparência, eu sou uma sukeban."
10036080-35 = "Eu estava esperando ansiosamente pelo dia em que poderia encontrar vocês, sabia?"
10036080-36 = "...Vocês se lembram de mim, não é?"
10036080-38 = "...!"
10036080-40 = "Seria um problema se vocês tivessem esquecido."
10036080-41 = "Fufu. #nAfinal, fui presa por causa da denúncia de vocês."
10036080-42 = "O tempo que passei no Centro Correcional traz lembranças..."
10036080-43 = "Cada dia que passei pensando em como me vingar de vocês!"
10036080-44 = "Então... preparem-se."
10036080-46 = "P-preparem-se...!?"
10036080-48 = "Sim... preparem-se para serem mortos por mim agora."
10036080-50 = "I-iiih...!"
10036080-51 = "Então era você quem estava dando ordens para aquela sukeban atacar de surpresa!"
10036080-53 = "Sim...? "
10036080-60 = "Irmã mais velhaaaaa!!!!"
10036080-62 = "Ora, ora, por que todos vocês estão aqui?"
10036080-63 = "Claro que é para vingar a senhora, irmã mais velha!"
10036080-64 = "Não digam isso, eu não sou mais uma sukeban. #nSou apenas uma prisioneira que escapou do Centro Correcional."
10036080-65 = "Não diga uma coisa dessas!"
10036080-66 = "A senhora foi presa justamente para nos proteger, não foi?!"
10036080-67 = "Maldita Valkyrie... como ousaram fazer isso com a irmã mais velha!"
10036080-68 = "Pessoal, vocês pensavam tanto assim em mim..."
10036080-69 = "Estou comovida...!"
10036080-70 = "Fufu. Como esperado, foi uma boa decisão pedir ajuda àquele professor."
10036080-71 = "A irmã mais velha também fez um pedido ao professor sorridente!?"
10036080-72 = "Não acredito que a \"ela\" de quem ele falava era a irmã mais velha...!"
10036080-76 = "[ns] (Professor sorridente... sinto que já ouvi esse nome em algum lugar...)"
10036080-82 = "Ela está cheia de aberturas!"
10036080-83 = "Se ela estava presa no Centro Correcional até agora, com certeza está enferrujada!"
10036080-84 = "Se a derrotarmos aqui, o prestígio do Grupo Capacete vai subir às alturas!"
10036080-90 = "Fufu, que interessante."
10036080-91 = "Mas, nesta luta, eu irei sozinha."
10036080-92 = "Agradeço por terem se esforçado tanto até aqui."
10036080-93 = "Fufu, de agora em diante, eu e Elizabeth cuidaremos de vocês!"
10036080-94 = "Vamos lá!"
10036080-97 = "Aaaaaah!"
10036080-98 = "V-vocês, não fujam!"
10036080-102 = "—Gyaaaaa! #nNão dá, vamos fugir!"
10036080-114 = "Princesa, cuidado――!"
10036080-123 = "Droga..."
10036080-124 = "Mi, Misaki!"
10036080-126 = "Misaki!"
10036080-127 = "Todos estão em perigo...!"
10036080-128 = "Sensei...!"
10036080-129 = "[s] \"Entendido!\""
10036080-130 = "Já chega!"
10036080-132 = "Sim?"
10036080-137 = "O quê, a minha Elizabeth...!"
10036080-138 = "[s] (Então aquele era o nome da arma...)"
10036080-139 = "Eu não vou perdoar isso...!"
10036080-141 = "Vão embora pacificamente."
10036080-142 = "Se fizerem isso, eu deixarei que escapem."
10036080-143 = "Quem seria você?"
10036080-144 = "Como ousa me dar ordens..."
10036080-145 = "Você acha mesmo que eu vou recuar por causa disso!?"
10036080-146 = "Aqueles que ficarem no meu caminho..."
10036080-147 = "Eu vou educar cada um de vocês, até o último!"
