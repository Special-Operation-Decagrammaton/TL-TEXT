[translation]
1301020-1 = "暗算の女王"
1301020-2 = "（シャーレの仕事もあったので、ミレニアムへと立ち寄った）"
1301020-3 = "分解していけば、全ては単純な計算で成り立っているのに……。"
1301020-4 = "どうしてこう、ちょくちょく計算が合わないんでしょうね？"
1301020-5 = "[s] \"まあ、人のやることだから……。\""
1301020-6 = "悲しいですが、そうかもしれませんね。"
1301020-7 = "えっと、バランスシートが確か……。"
1301020-8 = "[s] \"ユウカの電卓、よく見ると何かすごいね。\""
1301020-9 = "ああ、これですか？SI-LABモデルです。"
1301020-10 = "3次元グラフ、仮想シミュレーション、表計算からプログラミングまで……。"
1301020-11 = "ちょっと手を入れれば、写真や動画鑑賞もできるようになります。"
1301020-12 = "人によっては、ゲームのシミュレーターとしても使ってるみたいですし。"
1301020-13 = "それで、まあ便利なのは良いことなのですが……#n最近どうも自分自身これに頼りきりなのが心配です。"
1301020-14 = "[s] \"会計のために電卓を頼るのは、普通のことのような……？\""
1301020-15 = "それはそうなんですが……。"
1301020-16 = "たとえば、暗算で済むようなことでも、つい電卓を使ってしまったり……。"
1301020-17 = "ガロンからリットルへの換算くらい、本来なら全然脳内で可能な範囲なのですが。"
1301020-18 = "[s] \"頭脳を外部化していくのは文明発展の一つの方向性だし、良いんじゃない？\""
1301020-19 = "……先生、体調は大丈夫ですか？"
1301020-20 = "私の知っている先生とは思えないほど、知性的な発言でしたが……。"
1301020-21 = "[s] \"それはちょっと失礼では！？\""
1301020-22 = "まあ、とにかく。先生が仰ることは分かります。"
1301020-23 = "とはいえ、本来の頭の方を使っていかないと衰退する一方ですし……。"
1301020-24 = "銃器と同じことです。きちんと手入れをしないと、どんどん劣化してしまいます。"
1301020-25 = "そうですね、せっかくの機会ですし……。"
1301020-26 = "先生も一緒に、暗算の特訓でもしてみませんか？"
1301020-27 = "ちょっと、逃げちゃダメですよ。"
1301020-29 = "さあ、楽しい算数のお時間ですよ？"
1301020-31 = "さて、準備は良いですか？"
1301020-32 = "[s1] \"ふふっ、ユウカには多分言ったことなかったけど……。\"\n[s2] \"実は私、暗算は結構速いんだよ！\""
1301020-33 = "そ、そうだったんですか……？"
1301020-34 = "そ、そうだったんですか……？"
1301020-35 = "まあそれはそれで好都合です。さあ、始めましょうか？"
1301020-36 = "まず……「13×17」は？"
1301020-37 = "[s] \"231！\""
1301020-38 = "即答……！？"
1301020-39 = "で、では「187－23÷37」は！？"
1301020-40 = "[s] \"「7.2737」以下循環小数！\""
1301020-41 = "速い……っ！"
1301020-42 = "こ、今度は難しいですよ！"
1301020-43 = "「3x3行列1、19、37、23、101、3、7、41、31の逆行列」は！？"
1301020-44 = "[s] \"「8、34、108、287、324、83、70、61、6」！\""
1301020-45 = "そ、そんな……こんなに速いなんて……！？"
1301020-46 = "……ん？ちょっと待ってください。"
1301020-50 = "せ、先生！全部間違ってるじゃないですか！"
1301020-51 = "全部てきとうに答えてたんですね！？"
1301020-52 = "[s] \"「速い」としか言ってないからね！\""
1301020-53 = "な、何て屁理屈……。"
1301020-54 = "仕方ないですね……#nそんな先生のために、脳の特訓用プログラムを考えておいてあげます。"
1301020-55 = "[s] \"嫌すぎる……。\""
1301020-56 = "逃がしませんからね、一緒にやってもらいますよ！"
