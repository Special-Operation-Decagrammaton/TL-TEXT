[translation]
1301020-1 = "A Rainha do Cálculo Mental"
1301020-2 = "（Como eu tinha trabalho no Schale, passei pelo Millennium）"
1301020-3 = "Se você decompor tudo, verá que tudo é feito de cálculos simples, então..."
1301020-4 = "Por que será que as contas não batem com tanta frequência?"
1301020-5 = "[s] \"Bem, é porque são humanos que fazem...\""
1301020-6 = "É triste, mas talvez seja isso mesmo."
1301020-7 = "Hum, o balancete está, se não me engano..."
1301020-8 = "[s] \"A calculadora da Yuuka é incrível quando se olha de perto.\""
1301020-9 = "Ah, esta aqui? É o modelo SI-LAB."
1301020-10 = "Gráficos 3D, simulações virtuais, planilhas, até programação..."
1301020-11 = "Se você fizer algumas modificações, dá até para ver fotos e vídeos."
1301020-12 = "Algumas pessoas até usam como simulador de jogos, pelo que parece."
1301020-13 = "E, bem, é bom que seja útil, mas...#nUltimamente, estou preocupada por estar dependendo demais dela."
1301020-14 = "[s] \"Depender de uma calculadora para contabilidade não é algo normal...?\""
1301020-15 = "Isso é verdade, mas..."
1301020-16 = "Por exemplo, mesmo em coisas que daria para fazer de cabeça, acabo usando a calculadora..."
1301020-17 = "Converter galões para litros, por exemplo, deveria ser algo perfeitamente possível de fazer mentalmente."
1301020-18 = "[s] \"Externalizar o cérebro é uma das direções do desenvolvimento da civilização, não é bom?\""
1301020-19 = "……Sensei, você está se sentindo bem?"
1301020-20 = "Foi um comentário tão inteligente que nem parece o Sensei que eu conheço..."
1301020-21 = "[s] \"Isso é um pouco ofensivo, não acha!?\""
1301020-22 = "Bem, de qualquer forma. Eu entendo o que você quer dizer."
1301020-23 = "Ainda assim, se não usarmos o cérebro de verdade, ele só vai definhar..."
1301020-24 = "É a mesma coisa que com armas de fogo. Se não fizer a manutenção adequada, elas vão se deteriorar rapidamente."
1301020-25 = "Certo, já que estamos aqui..."
1301020-26 = "Sensei, que tal fazermos um treinamento intensivo de cálculo mental juntos?"
1301020-27 = "Ei, nada de fugir."
1301020-29 = "Vamos lá, é hora de uma matemática divertida!"
1301020-31 = "Bem, está pronto?"
1301020-32 = "[s1] \"Hehe, acho que nunca te contei, Yuuka...\"\n[s2] \"Na verdade, eu sou bem rápido no cálculo mental!\""
1301020-33 = "S-sério...?"
1301020-34 = "S-sério...?"
1301020-35 = "Bem, isso é conveniente. Então, vamos começar?"
1301020-36 = "Primeiro... quanto é 13 × 17?"
1301020-37 = "[s] \"231!\""
1301020-38 = "Respondeu na hora...!?"
1301020-39 = "E-então, quanto é 187 - 23 ÷ 37!?"
1301020-40 = "[s] \"7.2737 dízima periódica!\""
1301020-41 = "Rápido...!"
1301020-42 = "E-essa agora é difícil!"
1301020-43 = "Qual é a matriz inversa de uma matriz 3x3 com os valores 1, 19, 37, 23, 101, 3, 7, 41, 31!?"
1301020-44 = "[s] \"8, 34, 108, 287, 324, 83, 70, 61, 6!\""
1301020-45 = "N-não pode ser... como pode ser tão rápido...!?"
1301020-46 = "……Hm? Espere um pouco."
1301020-50 = "S-Sensei! Você errou tudo!"
1301020-51 = "Você estava respondendo qualquer coisa, não estava!?"
1301020-52 = "[s] \"Eu só disse que era 'rápido', não que estava certo!\""
1301020-53 = "Q-que desculpa esfarrapada..."
1301020-54 = "Não tem jeito...#nPara esse Sensei, vou preparar um programa de treinamento cerebral especial."
1301020-55 = "[s] \"Que horror...\""
1301020-56 = "Eu não vou deixar você escapar, você vai fazer isso comigo!"
