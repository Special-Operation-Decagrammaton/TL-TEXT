[translation]
2300603-1 = "お祭り運営委員会の委員長！"
2300603-2 = "百鬼夜行・市街地"
2300603-3 = "（約束の時間に10分ほど遅れてしまった）"
2300603-4 = "（到着した約束の場所には、何かの人だかりができていた）"
2300603-6 = "シズコちゃん！一緒に写真撮ってください！"
2300603-7 = "私も私も！一枚だけでいいから……！"
2300603-8 = "えへへっ。はい、ぜひぜひ！そういうことであれば、いくらでも！"
2300603-11 = "[s] \"シズコ、百夜堂の外でも人気者なんだね。\""
2300603-12 = "……え？あっ、先生！待ってましたよ～！"
2300603-13 = "では、これで失礼しま～す！"
2300603-15 = "シズコ、ず～っと先生のことを待ってたんですよ～？"
2300603-16 = "[s1] \"看板娘モードのシズコだ……。\"\n[s2] \"何という完璧な変わり身。\""
2300603-22 = "[ns] \"いたたたっ！？そんなにお尻つねらないで！？\""
2300603-23 = "先生……？"
2300603-24 = "何か仰いましたか？気のせいでなければ、余計な一言が聞こえたような？"
2300603-25 = "[s] \"ひどい変わりようを見た。\""
2300603-26 = "こういうのもお仕事の一環なんですから、イメージアップ戦略です！"
2300603-27 = "それより、10分も遅刻ですよ？"
2300603-28 = "[s3] \"それについてはゴメン……。\"\n[s4] \"ところで、お祭りの準備って何をすればいいの？\""
2300603-29 = "ふふふ……。"
2300603-30 = "ふふふ……。"
2300603-31 = "先生、私を一体誰だと思ってるんですか？"
2300603-32 = "[s5] \"百夜堂の看板娘？\"\n[s6] \"プロのおっちょこちょい？\""
2300603-33 = "いやいやいや！百夜堂でのあの姿はあくまでもう一つの自分で……！"
2300603-34 = "いやいやいや！百夜堂でのあの姿はあくまでもう一つの自分で……！"
2300603-35 = "部活動の資金を稼いでいる時の一面に過ぎません！"
2300603-36 = "あれを私の全てだと思ってもらっては困ります！"
2300603-37 = "こう見えて、お祭り運営委員会の委員長なんですから！"
2300603-38 = "[s] \"そういう設定もあったね。\""
2300603-39 = "設定とか言わないでもらえます！？"
2300603-40 = "はあ、もう……調子狂う……。"
2300603-41 = "とにかく、今日こうして先生をお呼びしたのは、お祭り運営委員会に依頼が来たからです。"
2300603-42 = "[s] \"依頼？\""
2300603-43 = "はい。今週末に百鬼夜行の第二十三商店街で、小さなお祭りが開催される予定なんですけど。"
2300603-44 = "「そのお祭りのプロデュースをお祭り運営委員会に頼めないか」という依頼が、その商店街から来まして。"
2300603-45 = "[s] \"そのお祭りの準備ってことなんだね。\""
2300603-46 = "はい。もともと百鬼夜行は、主に観光を生業とする学園自治区。"
2300603-47 = "お祭りは、そんな百鬼夜行の観光業の中でも最大規模のものなんです。"
2300603-48 = "お祭りをより素敵に、完璧に、そして素晴らしい形で開催できるように。"
2300603-49 = "企画・運営・サポートまで行うのが私たち、お祭り運営委員会なんです！"
2300603-50 = "さあさあ、こうしている場合ではありません。"
2300603-52 = "では先生、行きましょうか！"
2300603-55 = "こんにちは～。"
2300603-56 = "はい、こんにちは。どういったご用件でしょうか？"
2300603-57 = "今度、第二十三商店街でお祭りを開催する予定がありまして、"
2300603-58 = "そこで使う機材をお借りしたいな、と。"
2300603-63 = "はい、委細承知いたしました。ではその条件で、その日程に合わせて納品をしますね。"
2300603-64 = "はい、よろしくお願いいたします～♪"
2300603-68 = "[ns] \"ちょっと待って、すごい、流れが速すぎる。\""
2300603-69 = "これぐらいの手腕、委員長として当然ですよ。"
2300603-70 = "それに、これで終わりではありません。"
2300603-71 = "機材を借りたら、次は……"
2300603-72 = "この機材を使ってもらう人たちを探さないとですね。"
2300603-75 = "失礼しま～す。"
2300603-76 = "え、えっと、本日は私たちの会社にどういったご用件で……？"
2300603-77 = "今度、百鬼夜行の第二十三商店街で開かれるお祭りで、公演をしてくれるバンドを探してまして。"
2300603-78 = "こういう条件で、こんな感じの想定です。"
2300603-79 = "うーん、これだけでは少しその、足りないと言いますか……。"
2300603-80 = "では、こういうのは、いかがですか？"
2300603-81 = "お祭りの現場を直接ネットで中継して……"
2300603-82 = "あとは、お祭りバージョンの音源の販売利益を考えるとこういう風に……"
2300603-83 = "ルートが必要でしたらここを紹介しますので、これくらいは最低でも……よろしければそれ以降についてこういった契約ですと……"
2300603-84 = "な、なるほど！こ、この条件でしたら、い、今すぐにでも……！"
2300603-85 = "はい、ありがとうございます～！"
2300603-86 = "[s] \"す、すごい……！\""
2300603-89 = "（その後もシズコはあちこちへと顔を出し、）"
2300603-90 = "（屋台の出店契約、お祭り当日の交通規制に関する相談、周囲のお店と連携したイベント企画等々……）"
2300603-91 = "（シズコはそれらを次々に処理していった）"
2300603-93 = "はい、これでだいたい終わりです！"
2300603-94 = "ようやく一息つけますね～。うん、頑張りました！"
2300603-95 = "あれ、先生大丈夫ですか？顔色が良くないですよ？"
2300603-96 = "[s7] \"その、あんまり何もしてないはずなんだけど……。\"\n[s8] \"シズコについていくだけでだいぶ疲れた……。\""
2300603-97 = "そうでしたか。体力、もっと付けた方が良いですよ？"
2300603-98 = "そうでしたか。体力、もっと付けた方が良いですよ？"
2300603-99 = "[s] \"お祭りの準備ってすごく大変だね……。\""
2300603-100 = "ふふっ、まあ確かに……簡単なことではありませんね。"
2300603-101 = "今回は急遽ということもありましたし、お祭りの規模も比較的小さかったのでこれぐらいで済みましたが。"
2300603-102 = "私たち「お祭り運営委員会」が普段から主催しているお祭りの準備は、もっとも～っと慌ただしいですから。"
2300603-103 = "[s] \"そうなんだ……。\""
2300603-104 = "はい、お祭りの開催にはたくさんの時間や努力。"
2300603-105 = "それにみんなの協力と……それらを動かすための資金も含めて。"
2300603-106 = "本当に、たくさんのものが必要です。"
2300603-107 = "百夜堂で毎日のように働いているのも、基本的にはお祭りの資金を稼ぐための手段の一つで……。"
2300603-108 = "その元々は手段であるはずの百夜堂のお仕事も、結構大変ですから。"
2300603-109 = "まあ……ありていに言ってしまえば色々と面倒で、しんどくはありますね。"
2300603-110 = "[s] \"それでも、続けてるんだよね。\""
2300603-111 = "はい。"
2300603-112 = "だって、好きですから。"
2300603-113 = "面倒で、大変なことだって身にしみて分かっていても。"
2300603-114 = "百夜堂のお仕事は楽しいですし、お客さんたちも喜んでくれますし、部員のことも好きですし。そんな中で頑張ることは、楽しいです。"
2300603-115 = "その過程で色々と大変なことがあっても、最後にお祭りが無事開催された時――"
2300603-116 = "お祭りで楽しそうにしてる人たちの笑顔を見ていると、それまでの苦労とか、どうでもよくなっちゃうんです。"
2300603-117 = "それに……"
2300603-118 = "[s] \"それに？\""
2300603-119 = "特に今日は、先生と一緒でしたので。"
2300603-120 = "先生に私のカッコいいところをお見せできたので、私は満足です。"
2300603-121 = "いかがでしたか？"
2300603-123 = "お祭り運営委員会、委員長の手腕は！"
2300603-124 = "[s9] \"すごかった、シズコはプロだね。\"\n[s10] \"感心したよ、すごいね。\""
2300603-125 = "はい、今はそれだけで充分ですっ！"
2300603-126 = "はい、今はそれだけで充分ですっ！"
2300603-128 = "（帰り道も、シズコとお祭りについて話をしながらゆっくりと歩いていった）"
