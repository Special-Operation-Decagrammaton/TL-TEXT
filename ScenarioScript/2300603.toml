[translation]
2300603-1 = "Presidente do Comitê de Operações do Festival!"
2300603-2 = "Hyakkiyako - Área Urbana"
2300603-3 = "（Atrasei cerca de 10 minutos do horário combinado）"
2300603-4 = "（No local combinado, havia uma pequena multidão reunida）"
2300603-6 = "Shizuko-chan! Por favor, tire uma foto comigo!"
2300603-7 = "Eu também, eu também! Só uma, por favor...!"
2300603-8 = "Ehehe. Sim, claro! Se for isso, quantas vocês quiserem!"
2300603-11 = "[s] \"Shizuko, você é popular até fora da Hyakkiyado, hein.\""
2300603-12 = "……Eh? Ah, Sensei! Estava te esperando~!"
2300603-13 = "Bem, com licença agora~!"
2300603-15 = "Sensei, eu estava te esperando há tanto tempo~!"
2300603-16 = "[s1] \"É a Shizuko modo garota-propaganda...\"\n[s2] \"Que mudança de comportamento perfeita.\""
2300603-22 = "[ns] \"Ai, ai, ai!? Não belisque meu bumbum tão forte!?\""
2300603-23 = "Sensei……?"
2300603-24 = "Disse alguma coisa? Se não me engano, ouvi um comentário desnecessário?"
2300603-25 = "[s] \"Vi uma mudança de atitude terrível.\""
2300603-26 = "Isso também faz parte do trabalho, é uma estratégia para melhorar minha imagem!"
2300603-27 = "Além disso, você se atrasou 10 minutos, sabia?"
2300603-28 = "[s3] \"Sobre isso, me desculpe...\"\n[s4] \"A propósito, o que preciso fazer para preparar o festival?\""
2300603-29 = "Fufufu……."
2300603-30 = "Fufufu……."
2300603-31 = "Sensei, quem você acha que eu sou, afinal?"
2300603-32 = "[s5] \"A garota-propaganda da Hyakkiyado?\"\n[s6] \"Uma atrapalhada profissional?\""
2300603-33 = "Não, não, não! Aquele meu jeito na Hyakkiyado é apenas um outro lado meu……!"
2300603-34 = "Não, não, não! Aquele meu jeito na Hyakkiyado é apenas um outro lado meu……!"
2300603-35 = "É apenas uma faceta que mostro quando estou ganhando fundos para o clube!"
2300603-36 = "Ficaria incomodada se pensasse que aquilo é tudo o que eu sou!"
2300603-37 = "Apesar de parecer assim, eu sou a presidente do Comitê de Operações do Festival!"
2300603-38 = "[s] \"Você também tinha esse papel, né.\""
2300603-39 = "Poderia não chamar de papel!?"
2300603-40 = "Ah, puxa... você me desconcerta..."
2300603-41 = "De qualquer forma, chamei o Sensei hoje porque o Comitê de Operações do Festival recebeu um pedido."
2300603-42 = "[s] \"Um pedido?\""
2300603-43 = "Sim. Um pequeno festival está planejado para acontecer no 23º Distrito Comercial de Hyakkiyako neste fim de semana."
2300603-44 = "Recebemos um pedido daquele distrito comercial perguntando: \"Vocês poderiam produzir esse festival para nós?\""
2300603-45 = "[s] \"Então é sobre a preparação desse festival.\""
2300603-46 = "Sim. Originalmente, Hyakkiyako é um distrito escolar que vive principalmente do turismo."
2300603-47 = "Os festivais são o maior evento dentro da indústria turística de Hyakkiyako."
2300603-48 = "Para que o festival seja realizado de forma maravilhosa, perfeita e incrível."
2300603-49 = "Nós, o Comitê de Operações do Festival, cuidamos de tudo: do planejamento, da operação e do suporte!"
2300603-50 = "Vamos, vamos, não temos tempo a perder."
2300603-52 = "Então, Sensei, vamos lá!"
2300603-55 = "Olá~."
2300603-56 = "Sim, olá. Como posso ajudar?"
2300603-57 = "Estamos planejando realizar um festival no 23º Distrito Comercial em breve,"
2300603-58 = "e gostaríamos de alugar alguns equipamentos para usar lá."
2300603-63 = "Sim, entendi perfeitamente. Então, faremos a entrega de acordo com essas condições e datas."
2300603-64 = "Sim, conto com vocês~♪"
2300603-68 = "[ns] \"Espere um pouco, uau, as coisas estão acontecendo rápido demais.\""
2300603-69 = "Esse nível de habilidade é natural para uma presidente."
2300603-70 = "Além disso, isso não é o fim."
2300603-71 = "Depois de alugar o equipamento, o próximo passo é..."
2300603-72 = "Precisamos encontrar pessoas para usar esse equipamento, não é?"
2300603-75 = "Com licença."
2300603-76 = "Ah, hum, qual seria o motivo da sua visita à nossa empresa hoje...?"
2300603-77 = "Estamos procurando uma banda para se apresentar no festival que será realizado na 23ª Rua Comercial de Hyakkiyako."
2300603-78 = "Temos estas condições e esta expectativa."
2300603-79 = "Hum, só isso é um pouco, como posso dizer, insuficiente..."
2300603-80 = "Então, o que acha disto?"
2300603-81 = "Podemos transmitir o festival ao vivo pela internet..."
2300603-82 = "E se considerarmos os lucros das vendas da trilha sonora da versão do festival, ficaria assim..."
2300603-83 = "Se precisar de contatos, posso indicar alguns, então, no mínimo, isso... e se estiver de acordo, podemos seguir com este contrato..."
2300603-84 = "E-entendo! Com essas condições, p-podemos começar agora mesmo...!"
2300603-85 = "Sim, muito obrigada!"
2300603-86 = "[s] \"I-incrível...!\""
2300603-89 = "(Depois disso, Shizuko continuou aparecendo em vários lugares,)"
2300603-90 = "(Contratos para barracas, consultas sobre o controle de tráfego no dia do festival, planejamento de eventos em parceria com lojas vizinhas, etc...)"
2300603-91 = "(Shizuko resolveu tudo isso, um por um.)"
2300603-93 = "Pronto, é basicamente isso!"
2300603-94 = "Finalmente posso respirar um pouco. Ufa, me esforcei bastante!"
2300603-95 = "Ué, Sensei, você está bem? Sua expressão não parece muito boa."
2300603-96 = "[s7] \"Bem, eu não deveria ter feito quase nada...\"\n[s8] \"Só de acompanhar a Shizuko, já fiquei exausto...\""
2300603-97 = "Entendo. Você deveria melhorar seu condicionamento físico, sabia?"
2300603-98 = "Entendo. Você deveria melhorar seu condicionamento físico, sabia?"
2300603-99 = "[s] \"Preparar um festival é muito trabalhoso, né...\""
2300603-100 = "Fufu, bem, certamente... não é algo simples."
2300603-101 = "Desta vez foi algo de última hora e a escala do festival era relativamente pequena, então foi tranquilo."
2300603-102 = "Mas a preparação para os festivais que nós, do \"Comitê de Operações do Festival\", organizamos normalmente, é muito, muito mais agitada."
2300603-103 = "[s] \"É mesmo...?\""
2300603-104 = "Sim, realizar um festival exige muito tempo e esforço."
2300603-105 = "Além da cooperação de todos... e, claro, fundos para colocar tudo em movimento."
2300603-106 = "Sinceramente, muitas coisas são necessárias."
2300603-107 = "Trabalhar na Hyakkiyadou quase todos os dias é, basicamente, um dos meios de ganhar fundos para o festival..."
2300603-108 = "E o trabalho na Hyakkiyadou, que deveria ser apenas um meio, também é bem puxado."
2300603-109 = "Bem... sendo franca, é bem trabalhoso e cansativo."
2300603-110 = "[s] \"Mesmo assim, você continua fazendo isso.\""
2300603-111 = "Sim."
2300603-112 = "Porque eu gosto."
2300603-113 = "Mesmo sabendo profundamente que é trabalhoso e difícil."
2300603-114 = "O trabalho na Hyakkiyadou é divertido, os clientes ficam felizes e eu gosto das minhas colegas. É prazeroso me esforçar em meio a tudo isso."
2300603-115 = "Mesmo que haja muitas dificuldades no processo, quando o festival é realizado com sucesso no final—"
2300603-116 = "Ao ver o sorriso das pessoas se divertindo no festival, todo o esforço anterior acaba não importando mais."
2300603-117 = "Além disso..."
2300603-118 = "[s] \"Além disso?\""
2300603-119 = "Especialmente hoje, porque estava com o Sensei."
2300603-120 = "Pude mostrar ao Sensei o meu lado incrível, então estou satisfeita."
2300603-121 = "O que achou?"
2300603-123 = "A habilidade da presidente do Comitê de Operações do Festival!"
2300603-124 = "[s9] \"Foi incrível, Shizuko, você é uma profissional.\"\n[s10] \"Fiquei impressionado, você é incrível.\""
2300603-125 = "Sim, por enquanto, isso já basta!"
2300603-126 = "Sim, por enquanto isso já é o suficiente!"
2300603-128 = "(No caminho de volta, caminhamos lentamente enquanto conversávamos sobre o festival com a Shizuko)"
