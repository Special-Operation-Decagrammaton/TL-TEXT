[translation]
13030-1 = "Episódio 3; Academia Ferroviária Highlander"
13030-2 = "Ahahaha, isso aí, muito bom!"
13030-3 = "Que barulheira..."
13030-4 = "Mas deu um alívio, não deu? E aí, como está?"
13030-5 = "A fragmentação das rochas que bloqueavam os trilhos foi concluída!#nComo descrito no plano de projeto, os trilhos continuam adiante."
13030-6 = "O reparo do trem também foi finalizado, então podemos partir imediatamente!"
13030-7 = "Ok, então vamos terminar isso logo. Por favor, façam um teste de condução."
13030-8 = "Sim, pode deixar comigo!"
13030-14 = "Uau, ele se moveu."
13030-15 = "Hehehe, que beleza! Acho que dá para adiantar o prazo em uma semana!"
13030-16 = "Ahm, a propósito...#nIsso é realmente seguro?"
13030-17 = "Hm?"
13030-18 = "O que foi...?"
13030-20 = "E-este lugar não é um distrito autônomo de outra escola...?"
13030-22 = "E daí?"
13030-23 = "E daí?"
13030-25 = "Não me venha com esse \"e daí\"!"
13030-26 = "Se fizermos uma obra dessas sem permissão,#nquem sabe o que podem dizer sobre nós..."
13030-27 = "Desse jeito, existe até o risco de um conflito armado..."
13030-28 = "Ah, não tem problema, né?"
13030-29 = "Ah, é verdade.#nEssa \"Ferrovia Trans-Deserto\" já é nossa, afinal."
13030-30 = "O quê!?"
13030-31 = "Ferrovia Trans-Deserto de Abydos, mais de 51% garantidos."
13030-32 = "Ou seja, essa ferrovia já é propriedade da nossa CCC.#nBem, tecnicamente não é bem assim, mas não vamos nos preocupar com isso."
13030-33 = "M-mas realizar uma obra sem nenhum contrato..."
13030-34 = "Tá tudo bem, tá tudo bem!"
13030-35 = "Se ficarmos pensando nisso, não vamos cumprir o prazo, né? Tempo é dinheiro."
13030-37 = "Obra feita com rapidez, administração feita do nosso jeito, é isso aí."
13030-38 = "Se a CCC decidiu assim, então deve estar tudo bem..."
13030-39 = "T-tem certeza absoluta disso?"
13030-40 = "Talvez."
13030-41 = "Vai dar tudo certo, olha só, vamos continuar!"
13030-42 = "O que vocês estão fazendo!"
13030-50 = "Fomos descobertas."
13030-51 = "Uau, foi mais rápido do que eu pensava."
13030-53 = "Eu sabia que isso ia virar um problema!"
13030-54 = "Pessoal da Academia Ferroviária Highlander! Este é o Distrito Autônomo de Abydos!#nParem imediatamente!"
13030-56 = "Hã?"
13030-58 = "Realizar atividades administrativas no Distrito de Abydos sem a nossa permissão é inaceitável!"
13030-59 = "Assim como o pessoal de Gehenna, por que será que..."
13030-60 = "Existem tantas pessoas que não têm o mínimo de bom senso!?"
13030-61 = "C-calma, Ayane-chan..."
13030-63 = "Está brava?"
13030-64 = "Pois é."
13030-65 = "[s] \"Poderiam me explicar o que estão fazendo?\""
13030-66 = "Quem é você?"
13030-67 = "Um adulto...?"
13030-68 = "A-aquela pessoa é... o Sensei do Schale!"
13030-69 = "Schale?"
13030-70 = "Sensei?"
13030-71 = "É alguém que pratica atos de destruição sob o pretexto de resolver problemas entre academias!"
13030-72 = "[s] \"…………。\""
13030-73 = "E foi o Sensei do Schale quem explodiu nosso trem antes também!"
13030-74 = "Existem outros rumores terríveis, #ncomo, por exemplo, que ele fica pelado..."
13030-75 = "[s1] \"E-eu acho que você se enganou de pessoa...\"\n[s2] \"R-rumores são assustadores, né...\""
13030-78 = "O que você está fazendo pelas costas do tio, Sensei..."
13030-79 = "Hmm, como esperado do Sensei."
13030-80 = "Por que a Shiroko-senpai está se gabando?"
13030-85 = "De qualquer forma, esta é a nossa zona autônoma! #nPare agora!"
13030-86 = "Não importa qual seja o motivo, o correto não seria começar com uma negociação!?"
13030-88 = "Nozomi, o que faremos?"
13030-89 = "O que faremos? O de sempre, claro."
13030-94 = "……Hã? #nO-o que você está...?"
13030-99 = "U-uau!? Isso não é perigoso!?"
13030-101 = "Como sempre, o oficial administrativo vai dar um jeito na limpeza, né? #nPahya, não se preocupe, não se preocupe."
13030-102 = "Bela ideia, bela ideia."
13030-106 = "Isso é... o trem transcontinental do deserto está se movendo...!?"
13030-107 = "A Highlander embarcou no trem! #nSe continuar assim, eles vão escapar!"
13030-108 = "O que vamos fazer!?"
13030-109 = "――Vamos persegui-los."
13030-110 = "……Ah, então você estava consertando o trem. #nVou perguntar o motivo depois... #nPrimeiro, vamos persegui-los."
13030-111 = "Não podemos ignorar esse comportamento egoísta em Abydos! #n……Você vai ter que nos explicar tudo direitinho!"
13030-113 = "Sensei, assuma o comando!"
13030-114 = "[s3] \"Eu já esperava que algo fosse acontecer...\"\n[s4] \"Vamos, pessoal!\""
