[translation]
13030-1 = "第3話;ハイランダー鉄道学園"
13030-2 = "あはははっ、良いね良いねぇ！"
13030-3 = "うるさーい……。"
13030-4 = "でもスカッとしたっしょ？#nで、どんな感じ？"
13030-5 = "線路を塞いでいた岩の破砕、完了です！#n事業書の記載通り、線路も続いています。"
13030-6 = "列車の修理も済んでいるので、すぐに走り出せますよ！"
13030-7 = "オッケー、じゃあちゃっちゃと仕上げちゃおうか。試運転お願い。"
13030-8 = "はい、お任せください！"
13030-14 = "うぉー、動いた～。"
13030-15 = "パヒャヒャッ、良い調子じゃん！納期は一週間くらい前倒しできそう！"
13030-16 = "その、ところで……#nこれ、本当に大丈夫なんですか？"
13030-17 = "ん？"
13030-18 = "何がー……？"
13030-20 = "こ、ここって、他所の自治区ですよね……？"
13030-22 = "それが？"
13030-23 = "だからー？"
13030-25 = "だ、だからー、じゃないですよ！"
13030-26 = "許可も無くこんな工事をしたら、#nいったい何を言われることか……"
13030-27 = "このままじゃ、武力衝突の可能性も……"
13030-28 = "まー良いんじゃなーい？"
13030-29 = "あはっ、そうそう。#nこの「砂漠横断鉄道」は、もう私らのものなんだし。"
13030-30 = "はい！？"
13030-31 = "アビドス砂漠横断鉄道、51％以上かくほー。"
13030-32 = "即ち、この鉄道は、もう私らCCCの所有物。#nまあ正確にはちょっと違うけど気にしなーい。"
13030-33 = "で、ですが契約書も無しに工事を進めるだなんて……"
13030-34 = "良いの良いの！"
13030-35 = "そんなこと言ってたら、工期に間に合わないっしょ？時は金なりってね。"
13030-37 = "工事はシュバっと、行政はそれなりに、だねー。"
13030-38 = "CCCがそのように判断したなら、大丈夫ってことで……"
13030-39 = "ほ、本当にいいんですよね？"
13030-40 = "メイビー。"
13030-41 = "大丈夫だって、ほら進めるよ！"
13030-42 = "何してるの、あんた達！"
13030-50 = "バレたー。"
13030-51 = "わお、思ったより早かったじゃん。"
13030-53 = "やっぱり問題になったじゃないですか！"
13030-54 = "ハイランダー鉄道学園の皆さん！ここはアビドス自治区です！#n今すぐ止まってください！"
13030-56 = "へぇ？"
13030-58 = "私たちの許可無しに、アビドス自治区で行政活動なんて言語道断！"
13030-59 = "ゲヘナの皆さんといい、どうしてこう……"
13030-60 = "常識が通じない方が多すぎませんか！？"
13030-61 = "お、落ち着いて、アヤネちゃん……"
13030-63 = "怒ってるー？"
13030-64 = "だね。"
13030-65 = "[s] \"何をしてるのか、聞かせてもらってもいいかな？\""
13030-66 = "どなたー？"
13030-67 = "大人ぁ……？"
13030-68 = "あ、あの方は……シャーレの先生です！"
13030-69 = "シャーレ？"
13030-70 = "先生？"
13030-71 = "学園間の問題解決、という名目で破壊活動をしている人です！"
13030-72 = "[s] \"…………。\""
13030-73 = "前に私たちの列車を吹き飛ばしたのも、#nシャーレの先生とのこと！"
13030-74 = "他にも恐ろしい噂がありまして、#nなんと、裸で……"
13030-75 = "[s1] \"ひ、人違いじゃないかな……\"\n[s2] \"う、噂って怖いね……\""
13030-78 = "おじさんの知らないとこで何してるのさ、先生……。"
13030-79 = "ん、さすが先生。"
13030-80 = "シロコ先輩がどうして自慢げなのよ。"
13030-85 = "とにかく、ここは私たちの自治区です！#n止まってください！"
13030-86 = "どんな理由があるにせよ、協議から入るのが筋では！？"
13030-88 = "ノゾミ、どうする？"
13030-89 = "どうするも何も、いつも通りでしょ。"
13030-94 = "……え？#nな、何を……？"
13030-99 = "う、うわっ！？危ないじゃないの！？"
13030-101 = "いつも通り、後始末は事務官が何とかするでしょ。#nパヒャッ、気にしない気にしなーい。"
13030-102 = "妙案妙案ー。"
13030-106 = "これは、砂漠横断鉄道が動いて……！？"
13030-107 = "ハイランダーが列車に乗り込みました！#nこのままでは逃げられてしまいます！"
13030-108 = "どうするの！？"
13030-109 = "――追いかける。"
13030-110 = "……ああ、列車を修理してたんだ。#n理由はあとで聞くとして……#nまずは追いかけようか。"
13030-111 = "アビドスでの身勝手な行為、見過ごすわけにはいきません！#n……きちんと説明してもらいます！"
13030-113 = "先生、指揮を！"
13030-114 = "[s3] \"そろそろ何か起こると思ってたよ……\"\n[s4] \"行こう、みんな！\""
