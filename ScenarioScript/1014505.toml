[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 24/06.]
1014505-1 = "Jornada Rumo ao Paraíso Celestial"
1014505-2 = "Ontem à noite, enquanto eu pesquisava algumas coisas――"
1014505-3 = "Descobri que fazer um passeio de barco neste desfiladeiro é praticamente uma 'obrigação'."
1014505-4 = "[s] \"Interessante.\""
1014505-5 = "Umu."
1014505-6 = "Navegar em um barco a remo e apreciar a paisagem passando... Parece ser um passeio extremamente elogiado pelos turistas."
1014505-7 = "Mas acredito que, assim que a tarde cair, haverá uma multidão de visitantes inundando o local."
1014505-8 = "Portanto, a fim de aproveitarmos um tempo tranquilo e sem interrupções, não nos restou outra opção senão vir bem cedo."
1014505-9 = "[s1] \"O cenário daqui já é maravilhoso.\"\n[s2] \"Da água, deve ser ainda mais espetacular.\""
1014505-12 = "Umu. Vamos embarcar?"
1014505-14 = "――E com isso encerramos as instruções do passeio."
1014505-15 = "Mesmo durante o verão, a água do rio é bem gelada, então, por favor, tenham cuidado para não cair."
1014505-16 = "Certo, por aqui, por favor."
1014505-17 = "Fufu, minhas expectativas estão altas."
1014505-18 = "Aquele deve ser o nosso barco. Se bem me lembro, falaram que cabe até quatro pessoas.\nComo somos só dois, teremos bastante espaço para relaxar."
1014505-19 = "Ouvi dizer que a neblina rastejando pelas montanhas cria uma visão formidável, mas... vejamos quão impressionante é, de fato."
1014505-20 = "Infelizmente, há dias em que a neblina não aparece, então isso depende inteiramente da sorte, mas..."
1014505-21 = "Quando ela se espalha pelo rio e as montanhas imponentes se erguem através do nevoeiro,"
1014505-22 = "Você vai sentir como se tivesse se transformado num verdadeiro mestre espiritual das lendas antigas!"
1014505-23 = "Fufu. Isso sim é algo que vale a pena aguardar."
1014505-24 = "Pois bem, vamos lá."
1014505-28 = "(Quando fui embarcar logo atrás da Kisaki...)"
1014505-29 = "Oh, um segundo. Deixe-me explicar mais uma coisinha para o adulto responsável."
1014505-30 = "[s] \"Hã? Ah, claro.\""
1014505-31 = "Tenho apenas um pequeno adendo a fazer."
1014505-32 = "Os nossos barcos estão equipados com um sistema de navegação autônomo de última geração."
1014505-33 = "Todo esse design de madeira e ar tradicional é, na verdade, pura estética e decoração."
1014505-34 = "Então, você não vai precisar gastar sua força tentando remar. \nSe você apenas apoiar e guiar levemente o remo, ele fará tudo sozinho!"
1014505-35 = "[s] \"Quanta tecnologia.\""
1014505-36 = "E também não precisa entrar em pânico se você se perder no caminho por conta da neblina."
1014505-37 = "Basta ativar o modo autônomo, e o barco retornará sozinho até este cais com segurança."
1014505-38 = "Tenham um excelente passeio!"
1014505-39 = "Sensei? Algum contratempo?"
1014505-40 = "[ns] \"Tô indo!\""
1014505-42 = "(Nós dois embarcamos e começamos a jornada)"
1014505-43 = "(Mesmo sem eu fazer força nos remos, o barco deslizava suavemente e abria caminho na água)"
1014505-45 = "......Que quietude."
1014505-46 = "Deixei o trabalho pesado para você, mas... está se sentindo muito cansado?"
1014505-47 = "[s] \"Estou perfeitamente bem.\""
1014505-48 = "Entendo. Seus braços são bem mais resistentes e firmes do que eu havia imaginado."
1014505-49 = "Mil picos majestosos rasgando os céus, e o rio delineando o seu caminho envolvido pelo abraço das montanhas."
1014505-50 = "Olhe ali, Sensei.\nDuas garças-brancas contemplando uma à outra em perfeita harmonia."
1014505-51 = "......"
1014505-52 = "Você poderia parar o barco por um momento?"
1014505-53 = "Dizem que todas as águas correm para o mar aberto, e que o tempo avança impiedoso sem se importar com os homens..."
1014505-54 = "Mas, agora, neste exato instante ao seu lado... sinto como se o mundo inteiro tivesse parado de girar."
1014505-55 = "......"
1014505-57 = "Os pássaros retornam ao repouso na pureza das águas cristalinas."
1014505-58 = "O rio segue o seu curso incessantemente, alheio a tudo."
1014505-59 = "Ao mundo, questiono: que valor tem a busca cega por rios de riqueza ou poder?"
1014505-60 = "Se aqui tenho o seu lado e o meu, prontos para erguer nossas taças aos céus sagrados."
1014505-62 = "......Fufu."
1014505-63 = "[s] \"Aconteceu alguma coisa?\""
1014505-64 = "Observe atentamente."
1014505-65 = "O nevoeiro começou a encobrir o rio."
1014505-66 = "Umu, então era isso..."
1014505-67 = "Os imortais e as fadas celestiais devem passar a eternidade cercados por paisagens como esta."
1014505-70 = "[wa:740]― [log=키사키 수영복]O que acha,[wa:1260] Sensei?[/log] "
1014505-72 = "― [log=키사키 수영복]Esta paisagem que,[wa:1600] até minutos atrás transbordava em cores e luzes――[wa:1470]agora está deste jeito.[/log] "
1014505-75 = "― [log=키사키 수영복]Sim,[wa:1290] tornou-se algo bem mais refinado.[/log] "
1014505-78 = "[wa:1180]― [log=키사키 수영복]O rio,[wa:1090] a água,[wa:1100] a névoa,[wa:1380] as montanhas...[/log] "
1014505-80 = "― [log=키사키 수영복]E o Sensei...[wa:2530]Apenas você[wa:1850] está refletido nos meus olhos.[/log] "
1014505-83 = "[wa:2860]― [log=키사키 수영복]O que exatamente[wa:2070] está refletido nos seus olhos?[/log] "
1014505-85 = "― [log=키사키 수영복]Eu, e esta paisagem majestosa...[/log] "
1014505-88 = "― [log=키사키 수영복]Será que...[wa:1450] estou aprisionada nesses seus dois olhos?[wa:2240][/log] "
1014505-91 = "[wa:200]― [log=키사키 수영복]Fufu...[wa:2280]Você já ouviu contarem esta lenda alguma vez?[wa:1090] [/log]"
1014505-94 = "― [log=키사키 수영복]Que as fadas celestiais cavalgam os ventos――[/log]"
1014505-96 = "― [log=키사키 수영복]E dançam pelos céus[wa:1760] como plumas que flutuam ao léu.[/log] "
1014505-99 = "[wa:870]― [log=키사키 수영복]Feche os seus olhos,[wa:2170] e respire profundamente,[wa:2280] Sensei.[/log] "
1014505-101 = "― [log=키사키 수영복]Se você fizer isso,[wa:1570] ali também――[/log] "
1014505-104 = "― [log=키사키 수영복]Você poderá sentir a minha presença...[wa:1140] talvez?[/log] "
1014505-107 = "......A névoa está se dissipando?"
1014505-109 = "[ns] \"O sol saiu e o tempo abriu de novo.\""
1014505-110 = "Fufu, sim, é verdade."
1014505-111 = "Fingir ser uma fada mística ao seu lado não foi nada mal, mas..."
1014505-112 = "......"
1014505-113 = "Não há o que fazer. Nós, mortais, devemos viver as nossas vidas mortais com os pés na terra."
1014505-114 = "Pois bem, vamos retornar."
1014505-115 = "[s] \"Como desejar, Senhora Monshu.\""
1014505-120 = "(Peguei os remos nas minhas mãos e calmamente iniciei a nossa viagem de volta) "