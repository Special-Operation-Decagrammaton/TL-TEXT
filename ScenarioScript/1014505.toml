[translation]
1014505-1 = "天界への旅"
1014505-2 = "昨晩、調べ物をしたところ――"
1014505-3 = "[ruby=ここ]渓谷[/ruby]ではボートに乗るのが「マスト」らしくてのう。"
1014505-4 = "[s] \"なるほど？\""
1014505-5 = "うむ。"
1014505-6 = "手漕ぎのボートに乗り、流れる景色を堪能する……それが好評のようじゃな。"
1014505-7 = "昼も過ぎれば客が押し寄せることじゃろう。"
1014505-8 = "然らば、ゆっくりした時間を過ごすためには早い時間にせざるを得なかったのじゃ。"
1014505-9 = "[s1] \"ここからでも良い景色なのに。\"\n[s2] \"水上から見たらもっと凄いんだろうね。\""
1014505-12 = "うむ。参ろうか。"
1014505-14 = "――これで説明は以上となります。"
1014505-15 = "夏でも川の水は冷たいので、落ちないように気をつけてくださいね。"
1014505-16 = "では、こちらへどうぞ。"
1014505-17 = "ふふ、楽しみじゃのう。"
1014505-18 = "あれが例のボートじゃな。たしか、4人まで乗れると言っておったか。#n2人ならゆとりがありそうじゃ。"
1014505-19 = "立ち込める霧と山々が壮観だと聞くが……はたして如何ほどかのう。"
1014505-20 = "見れない日もあるので、そればっかりはどうしようもないのですが……。"
1014505-21 = "川面に広がる霧の向こうに、雄大な山がそびえ立っていて。"
1014505-22 = "伝説の神仙になったような気分を味わえますよ！"
1014505-23 = "ふふっ。それは楽しみじゃ。"
1014505-24 = "さあ、参ろうか。"
1014505-28 = "（キサキに続いてボートに乗ろうとすると）"
1014505-29 = "あっ、すみません。保護者のかた向けの説明を。"
1014505-30 = "[s] \"え？ああ、はい。\""
1014505-31 = "少し補足がありまして。"
1014505-32 = "こちらのボートは、最新の自動運転システムを搭載しています。"
1014505-33 = "伝統的な作りに見えるのは装飾でして。"
1014505-34 = "なので頑張ってオールを漕ぐ必要はありません。#n少し触れる程度で大丈夫です！"
1014505-35 = "[s] \"ハイテクですね。\""
1014505-36 = "それと、濃霧などで帰り道が分からなくなった時もご安心ください。"
1014505-37 = "自動運転モードに切り替えれば、自動でここに戻るようになっていますので。"
1014505-38 = "では、良い船旅を！"
1014505-39 = "先生？何か問題かえ？"
1014505-40 = "[ns] \"すぐ行く！\""
1014505-42 = "（キサキと2人でボートに乗った）"
1014505-43 = "（オールに力をいれなくとも、ボートはスムーズに進んだ）"
1014505-45 = "……静かじゃ。"
1014505-46 = "任せきりじゃが……疲れぬか？"
1014505-47 = "[s] \"まだなんともないよ。\""
1014505-48 = "そうか。其方の腕は、予想より丈夫なようじゃのう。"
1014505-49 = "千の峰がそびえ立ち、山々に抱かれた一筋の川が軌跡を描く。"
1014505-50 = "見えるかえ、先生。#n2羽のシラサギが仲睦まじく互いを見つめあっておるぞ。"
1014505-51 = "……。"
1014505-52 = "少し、船を止めてくれぬか。"
1014505-53 = "水は絶えず海に集まり、時は人を省みぬとも……。"
1014505-54 = "其方と共にある今だけは、何もかもが止まってしまったようじゃ。"
1014505-55 = "……。"
1014505-57 = "水清き場に鳥は戻り。"
1014505-58 = "川は止めどなく流るるのみ。"
1014505-59 = "世に問うは富貴の意義。"
1014505-60 = "此処に其方と我ありて、いざ空に捧ぐるは盃なり。"
1014505-62 = "……ふむ。"
1014505-63 = "[s] \"どうかした？\""
1014505-64 = "見よ。"
1014505-65 = "霧が濃くなってきた。"
1014505-66 = "なるほど、これが……。"
1014505-67 = "神仙となれば、斯様な景色の中を過ごすのやも知れぬな。"
1014505-70 = "[wa:740]― [log=키사키 수영복]どうじゃ、[wa:1260]先生。[/log] "
1014505-72 = "― [log=키사키 수영복]あれほど色彩に溢れていた[wa:1600]景観が――[wa:1470]この通り。[/log] "
1014505-75 = "― [log=키사키 수영복]うむ、[wa:1290]洗練されたのう。[/log] "
1014505-78 = "[wa:1180]― [log=키사키 수영복]川、[wa:1090]水、[wa:1100]霧、[wa:1380]山……。[/log] "
1014505-80 = "― [log=키사키 수영복]そして先生……[wa:2530]其方だけが[wa:1850]妾の目に映っておる。[/log] "
1014505-83 = "[wa:2860]― [log=키사키 수영복]其方の目には[wa:2070]何が映っておる？[/log] "
1014505-85 = "― [log=키사키 수영복]妾とこの景色のなか……。[/log] "
1014505-88 = "― [log=키사키 수영복]妾を、[wa:1450]その両の瞳に[wa:2240]閉じ込めておるかえ？[/log] "
1014505-91 = "[wa:200]― [log=키사키 수영복]ふふっ……[wa:2280]このような逸話を[wa:1090]聞いたことはあるかのう？ [/log]"
1014505-94 = "― [log=키사키 수영복]仙女は風に乗り――[/log]"
1014505-96 = "― [log=키사키 수영복]羽のように[wa:1760]空を舞うのだと。[/log] "
1014505-99 = "[wa:870]― [log=키사키 수영복]目を閉じて[wa:2170]息を吸い込んでみるのじゃ、[wa:2280]先生。[/log] "
1014505-101 = "― [log=키사키 수영복]そうすれば、[wa:1570]そこにも――[/log] "
1014505-104 = "― [log=키사키 수영복]妾を[wa:1140]感じられるやもしれぬぞ？[/log] "
1014505-107 = "……霧が？"
1014505-109 = "[ns] \"陽が出て、晴れてきたね。\""
1014505-110 = "ふふ、そうか。"
1014505-111 = "其方と共に、神仙を準えるのも悪くはなかったのじゃが……。"
1014505-112 = "……。"
1014505-113 = "仕方あるまい。下界の者は下界の生を過ごすべきだ。"
1014505-114 = "では、お暇しようかの。"
1014505-115 = "[s] \"はい、門主様。\""
1014505-120 = "（自分の手でゆっくりと舵を取り、帰路に着いた） "
