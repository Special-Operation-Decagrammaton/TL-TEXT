[translation]
83306070100-6 = "Ah, presidente. Bom trabalho."
83306070100-7 = "Tem muitos feridos, o que aconteceu?"
83306070100-8 = "Ah... na verdade, tivemos um pequeno problema com alguns encrenqueiros durante a patrulha regular do Comitê Disciplinar."
83306070100-9 = "Por causa disso, vários membros do Comitê, incluindo a Iori, acabaram se ferindo..."
83306070100-10 = "Até a Iori se feriu... Foi um problema tão grande assim?"
83306070100-11 = "Ah, não foi nada tão grave. A maioria sofreu apenas ferimentos leves, como arranhões."
83306070100-12 = "Só que a Iori acabou tropeçando durante o combate e caiu com força..."
83306070100-14 = "Eu não tinha como saber que tinha um buraco ali!"
83306070100-17 = "...Entendo, que azar o seu."
83306070100-18 = "Dito isso, parece que a chefe Sena, do Departamento de Medicina de Emergência, está ausente, então vai levar um tempo para tratar todo mundo..."
83306070100-19 = "Entendido, nesse caso, eu também vou ajudar."
83306070100-21 = "Ah, muito obrigada, presidente. Então, por favor, contamos com você."
