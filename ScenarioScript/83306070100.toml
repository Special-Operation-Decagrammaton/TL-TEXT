[translation]
83306070100-6 = "あ、委員長。お疲れ様です。"
83306070100-7 = "怪我人が多いけど、何があったの？"
83306070100-8 = "あ……実は、風紀委員会の定期パトロール中に問題児と少しトラブルがありまして。"
83306070100-9 = "そこでイオリを含め、風紀委員が多数負傷してしまい……"
83306070100-10 = "イオリまで怪我を……そんなに大きなトラブルが？"
83306070100-11 = "あ、そこまで大きな問題ではありません。ほとんどが擦り傷などの軽症で済んでいます。"
83306070100-12 = "ただ、イオリだけ戦闘中に足を取られ、勢いよく倒れてしまい……"
83306070100-14 = "私だって、あんな所に穴が空いてるとは思わなかったんだよ！"
83306070100-17 = "……そう、それは災難ね。"
83306070100-18 = "とはいえ、救急医学部のセナ部長が不在らしく、全員を治療するのには時間がかかりそうで……"
83306070100-19 = "分かった、それなら私も手伝う。"
83306070100-21 = "あっ、ありがとうございます、委員長。それではお願いします。"
