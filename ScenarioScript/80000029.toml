[translation]
80000029-1 = "大人のチョコレート"
80000029-2 = "シャーレ・オフィス"
80000029-3 = "あら、先生～。"
80000029-4 = "ふふっ、今日もお疲れ様でした。"
80000029-5 = "おやつでも食べますか？それともお昼寝されますか？"
80000029-6 = "それとも……ふふっ。"
80000029-7 = "[s1] \"……シュン？\"\n[s2] \"何か、今日ちょっと変じゃない……？\""
80000029-8 = "んー？どうかしましたか？"
80000029-9 = "んー？どうかしましたか？"
80000029-10 = "いつも通りの梅花園の教官、シュンですよ～？"
80000029-11 = "何だかいつもより良い気分ですが～。"
80000029-12 = "[s] \"もしかして……。\""
80000029-16 = "えっと、先生？そんなに近づかれてしまいますと……。"
80000029-17 = "私、恥ずかしいです……。"
80000029-18 = "（シュンの口元から、薄っすらとアルコールの香りがした）"
80000029-19 = "[s] \"まさか、お酒とか……。\""
80000029-20 = "お、お酒……！？"
80000029-21 = "梅花園の教官ともあろうものが、そんなことをするわけがありません！"
80000029-22 = "そもそも今日は、チョコレートくらいしか口にしておらず……。"
80000029-23 = "そのチョコレート、ですか？"
80000029-29 = "このラムボンボンを……。"
80000029-30 = "初めて食べたのですが、ラムレーズンアイスのような香りでとっても美味しいですね。"
80000029-31 = "え、ほんの少しアルコールが含まれているんですか……？"
80000029-32 = "わ、私、そうとは知らずに……。"
80000029-33 = "[s] \"これ、あとは私が貰っても良い？\""
80000029-34 = "は、はい……すみません、梅花園の教官としてみっともない姿を……。"
80000029-35 = "とはいえ、これは……図らずとも、私が買ったチョコレートを先生にお渡しする形になりましたね。"
80000029-36 = "自然な形で先生に、大人のチョコレートをプレゼント……"
80000029-37 = "ふふっ、悪いことばかりではありませんでしたね？"
80000029-39 = "（その後シュンにはシャーレで少し寝てもらった後、梅花園に戻ってもらった。）"
