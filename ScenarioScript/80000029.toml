[translation]
80000029-1 = "Chocolate de Adulto"
80000029-2 = "Escritório do Schale"
80000029-3 = "Ora, Sensei~."
80000029-4 = "Fufu, bom trabalho hoje também."
80000029-5 = "Gostaria de comer um lanche? Ou talvez tirar uma soneca?"
80000029-6 = "Ou talvez... fufu."
80000029-7 = "[s1] \"...Shun?\"\n[s2] \"Tem algo um pouco diferente hoje, não tem...?\""
80000029-8 = "Hmm? Aconteceu alguma coisa?"
80000029-9 = "Hmm? Aconteceu alguma coisa?"
80000029-10 = "Sou eu, a instrutora do Plum Blossom Garden de sempre, Shun~."
80000029-11 = "É que estou me sentindo um pouco melhor do que o habitual~."
80000029-12 = "[s] \"Será que...\""
80000029-16 = "Bem, Sensei? Se você chegar tão perto assim..."
80000029-17 = "Eu fico envergonhada..."
80000029-18 = "(Um leve aroma de álcool vinha dos lábios de Shun)"
80000029-19 = "[s] \"Não me diga que você bebeu...\""
80000029-20 = "B-bebida...!?"
80000029-21 = "Como instrutora do Plum Blossom Garden, eu jamais faria algo assim!"
80000029-22 = "Para começar, hoje eu só comi um pouco de chocolate..."
80000029-23 = "Aquele chocolate, você diz?"
80000029-29 = "Este bombom de rum..."
80000029-30 = "Foi a primeira vez que comi, tem um aroma de sorvete de rum com passas e é muito delicioso."
80000029-31 = "Ah, contém um pouco de álcool...?"
80000029-32 = "E-eu não sabia disso..."
80000029-33 = "[s] \"Posso ficar com o resto?\""
80000029-34 = "S-sim... sinto muito, como instrutora do Plum Blossom Garden, mostrei uma figura deplorável..."
80000029-35 = "Dito isso, isso acabou se tornando... uma forma de eu entregar o chocolate que comprei para o Sensei, sem querer."
80000029-36 = "Presentear o Sensei com um chocolate de adulto de uma forma natural..."
80000029-37 = "Fufu, não foi algo tão ruim assim, não é?"
80000029-39 = "(Depois disso, deixei Shun descansar um pouco no Schale antes de ela voltar para o Plum Blossom Garden.)"
