[translation]
52260-1 = "第26話;暗く、深い影の底から"
52260-2 = "百物語とは、百の数の物語を交わすこと。"
52260-3 = "草木も眠る夜半に催され、物語の終幕と共に、一つ、また一つと火を消していく。#n―[ruby=いにしえ]―古よ[/ruby]り伝わる、百鬼夜行の[ruby=あそび]遊戯[/ruby]から始まりし怪談。"
52260-4 = "語れば語るほど[ruby=ともしび]に灯は[/ruby]減り、闇は深まる。"
52260-5 = "闇に覆われるほど露わになるは、己の内面。"
52260-6 = "奇妙な物語のごとく、不可解なその心。"
52260-7 = "世を包む噂、風説……怪談もまた、欲望を映す鏡でしかない。"
52260-9 = "[log][ff4444]さぁ、暗闇の底に告げよ。[-][/log]"
52260-12 = "[log][ff4444]お前は、どんな嘘の仮面を被っている？[-][/log]"
52260-15 = "[log][ff4444]お前は、どんな欲望を抱え――[-][/log]"
52260-18 = "[log][ff4444]なにから目を背けている？[-][/log]"
52260-22 = "アタシは……。"
52260-23 = "百花繚乱の正義を貫こうと稽古を頑張ってきたけど、不安もあった。"
52260-24 = "少女マンガや小説には、いつだってキラキラした青春が広がっているのに、アタシは――"
52260-25 = "青春を無駄にしているかもしれない、って。"
52260-29 = "……とっくに、お前は知ってたんだろ？"
52260-30 = "汗と火薬にまみれた日常なんて、青春とは程遠いって。"
52260-33 = "私は……。"
52260-34 = "百花繚乱の作戦参謀として、全てを正す義務があると思っていた。"
52260-35 = "「百花繚乱を取り戻す」……その大義名分を盾にして、みんなに酷い言葉を投げつけた。"
52260-36 = "いなくなった先輩を責めて、思い通りにならない現実を恨んだ……。"
52260-40 = "そうやって……私が、百花繚乱を壊していたのに。"
52260-43 = "身共は……。"
52260-44 = "皆様に受け入れてもらえました。でも……いつだって身共は[ruby=・]誰[/ruby][ruby=・]か[/ruby]の代わりですの。"
52260-45 = "勘解由小路の巫女も……百花繚乱の一員も……。"
52260-49 = "誰も、本当の身共を求めていないのです。"
52260-50 = "……いっそのこと、操り人形として生まれていれば。"
52260-53 = "[ns] \"……みんなに、何をした？\""
52260-55 = "ほう、やはりシャーレの先生に怪書の力は届かないか。#n厄介やねえ。"
52260-56 = "……我は何もしておらぬよ。"
52260-57 = "自らを見つめ直せるよう、その瞳を覆っただけ。"
52260-58 = "しかし、己を[ruby=せいさつ]省察[/ruby]しただけで、心は脆く崩れるもの。"
52260-59 = "所詮、人に人の心はわからぬものさ。"
52260-60 = "たとえそれが……自分の心だとしても、ね。"
52260-61 = "[s] \"理解できないとして、それの何が問題なの？\""
52260-65 = "[ns1] \"理解できるまで、問い続ければいい。\"\n[ns2] \"だからみんな、寄り添って生きていき……。\"\n[ns3] \"互いから学ぶことをやめないんだよ。\""
52260-69 = "ほう……この子らに希望を吹き込んだのは[ruby=おのし]御主[/ruby]かい？"
52260-70 = "ならばそこで、じっくりと観ているがよいさ。"
52260-74 = "そなたがこれまで説いてきた、空っぽの希望の行き先を――"
52260-76 = "……私は。"
52260-77 = "一人じゃ何もできない泣き虫。"
52260-80 = "大切なものに手を伸ばしても、全てこぼれ落ちて……壊れていくのを眺めることしかできなかった。"
52260-82 = "私は結局、アヤメになれなかった。"
52260-86 = "……だって、私は御稜ナグサだから。"
52260-106 = "すぐ壁にぶつかるし……何かのフリをすることしかできないけど。"
52260-110 = "――だからって、諦めていいわけじゃない。"
52260-116 = "コクリコ。あなたがどれだけ現実を見せようと、私の考えは変わらない。"
52260-123 = "私は御稜ナグサ。"
52260-127 = "――誰が何と言おうとも、アヤメの一番の友達！"
52260-132 = "……そうかい、もう知っていたのかえ。"
52260-133 = "己の脆さを……手を伸ばすことの無意味さを。"
52260-134 = "それでも、この厳しい現実を変えて見せると[ruby=しょ]怪書[/ruby]を閉じたのかえ？"
52260-135 = "……ほんとうに、わからぬねえ。"
52260-136 = "……アヤメにも、これを見せたんでしょう？"
52260-137 = "暗闇に閉じ込めて、囁き続けたんだ。"
52260-138 = "だから、アヤメは絶望して逃げ出した。"
52260-139 = "ご明察。誰もがうらやむ百花繚乱の委員長も、心折れて、我らに同調した。#nそんな彼女を……おまえさんは呼び戻せると？"
52260-140 = "アヤメよりも弱い己が、彼女を助けられる……本当に、そう信じているのかえ？"
52260-141 = "私は、そんなことできないよ。#nだって……アヤメじゃないから。"
52260-142 = "でも……この手を、差しのべることはできる。"
52260-150 = "バカな……その右腕は、黄昏に呑まれたはず。"
52260-151 = "そんな小手先の奇術で、怪書を繰る私たちを貶めるつもりなら――"
52260-158 = "もう一度聞くよ。"
52260-159 = "アヤメはどこ？"
52260-160 = "ありえ……ない……。"
52260-161 = "枯れ木に花が咲かぬよう、黄昏に呑まれたものも取り戻せないはず……。"
52260-162 = "こ、コクリコ様……。"
52260-167 = "必然は物語に骨子を、そして偶然は物語に興味を与える。"
52260-168 = "黄昏の中から、まさか自身の影のみならず、他人に差し伸べた手をも掴むとは。#nおまえさんは、場をかき回す才があるねえ……。"
52260-172 = "[ruby=そんなとこ]百花繚乱[/ruby]にいるよりも、よほど語り手向きやと思うよ。"
52260-176 = "アヤメは今も天守閣の上で、おまえさんたちを見ている。"
52260-177 = "万一、[ruby=・]そ[/ruby][ruby=・]の[/ruby][ruby=・]手[/ruby]が本当にアヤメへ届いたのならば。"
52260-181 = "――少しだけ、我も違う物語に目を向けてみようかね。"
52260-192 = "[ns] \"……待って！\""
52260-196 = "逃げたね……。"
52260-204 = "う、うわっ……！？い、今のはなんだ？"
52260-205 = "すごく悪い夢を見ていた気がしますの……。"
52260-206 = "コクリコ……花鳥風月部は？"
52260-207 = "……消えたよ。止められなかった。"
52260-208 = "でも今は、アヤメを探す方が大事だから。"
52260-214 = "[USERNAME]先生。最後に一つ……お願いしていい？"
52260-215 = "すこし危険かもしれないけど……私とアヤメの戦いを、見届けてほしいんだ。"
52260-216 = "[s] \"何があっても見守るよ。\""
52260-217 = "……ありがとう。"
52260-218 = "じゃあ、行こうか。アヤメを、助けに。"
