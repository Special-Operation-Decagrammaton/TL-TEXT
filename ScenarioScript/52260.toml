[translation]
52260-1 = "Episódio 26; Do Fundo das Sombras Profundas e Escuras"
52260-2 = "Hyakumonogatari significa trocar cem histórias entre si."
52260-3 = "Elas são realizadas no meio da noite, quando até as plantas dormem, e a cada fim de história, uma vela é apagada. #n ――Histórias de fantasmas que começam com o jogo de Hyakkiyako, transmitido desde a antiguidade."
52260-4 = "Quanto mais se narra, menos luzes restam, e mais profunda a escuridão se torna."
52260-5 = "Quanto mais a escuridão cobre tudo, mais o interior de si mesmo se revela."
52260-6 = "Como uma história estranha, esse coração incompreensível."
52260-7 = "Boatos e rumores que envolvem o mundo...... histórias de fantasmas também são apenas um espelho que reflete desejos."
52260-9 = "[log][ff4444]Venha, confesse ao fundo da escuridão.[-][/log]"
52260-12 = "[log][ff4444]Que máscara de mentiras você está usando?[-][/log]"
52260-15 = "[log][ff4444]Que desejos você carrega――[-][/log]"
52260-18 = "[log][ff4444]Do que você está desviando o olhar?[-][/log]"
52260-22 = "Eu......"
52260-23 = "Tentei me esforçar nos treinos para manter a justiça da Hyakkaryouran, mas também tinha medo."
52260-24 = "Em mangás e romances para meninas, uma juventude brilhante sempre se expande, mas eu......"
52260-25 = "Pensei que talvez estivesse desperdiçando minha juventude."
52260-29 = "......Você já sabia disso há muito tempo, não sabia?"
52260-30 = "Que uma rotina coberta de suor e pólvora está muito longe do que é a juventude."
52260-33 = "Eu......"
52260-34 = "Como estrategista da Hyakkaryouran, achei que tinha o dever de corrigir tudo."
52260-35 = "Sob o pretexto de 'recuperar a Hyakkaryouran', joguei palavras terríveis em todos."
52260-36 = "Culpei a senpai que desapareceu e odiei a realidade que não seguia o meu querer......"
52260-40 = "E assim...... embora fosse eu quem estava destruindo a Hyakkaryouran."
52260-43 = "Eu......"
52260-44 = "Fui aceita por todas vocês. Mas...... eu sempre sou a substituta de alguém."
52260-45 = "Tanto como miko da família Kadenokouji...... quanto como membro da Hyakkaryouran......"
52260-49 = "Ninguém busca o meu verdadeiro eu."
52260-50 = "......Seria melhor se eu tivesse nascido como uma marionete."
52260-53 = "[ns] \"......O que você fez com todos?\""
52260-55 = "Ho, então o poder do livro misterioso realmente não alcança o Sensei da Schale? #n Que problemático."
52260-56 = "......Eu não fiz nada."
52260-57 = "Apenas cobri os olhos deles para que pudessem olhar para si mesmos."
52260-58 = "No entanto, apenas refletir sobre si mesmo é o bastante para que o coração desmorone fragilmente."
52260-59 = "No fim, humanos não conseguem entender o coração humano."
52260-60 = "Mesmo que seja...... o seu próprio coração, não é?"
52260-61 = "[s] \"E se não pudermos entender, qual é o problema disso?\""
52260-65 = "[ns1] \"Devemos continuar perguntando até entendermos.\"\n[ns2] \"É por isso que todos vivem apoiando uns aos outros......\"\n[ns3] \"E não param de aprender uns com os outros.\""
52260-69 = "Ho...... foi você quem soprou esperança nessas crianças?"
52260-70 = "Sendo assim, observe atentamente daí."
52260-74 = "Para onde essa esperança vazia que você pregou―― vai levar."
52260-76 = "......Eu."
52260-77 = "Uma chorona que não consegue fazer nada sozinha."
52260-80 = "Mesmo quando tentei alcançar as coisas que eram importantes, tudo escapou pelas minhas mãos...... e eu só conseguia olhar enquanto tudo quebrava."
52260-82 = "No fim, eu não consegui me tornar a Ayame."
52260-86 = "......Porque eu sou Nagusa Goryou."
52260-106 = "Eu sempre bato de cara na parede...... e só sei fingir ser outra pessoa."
52260-110 = "――Mas isso não significa que está tudo bem desistir."
52260-116 = "Kokuriko. Não importa o quanto você mostre a realidade, meu pensamento não vai mudar."
52260-123 = "Eu sou Nagusa Goryou."
52260-127 = "――Não importa o que digam, eu sou a melhor amiga da Ayame!"
52260-132 = "......É mesmo, você já sabia disso."
52260-133 = "Sobre sua própria fragilidade...... sobre a falta de sentido em tentar alcançar algo."
52260-134 = "Mesmo assim, você fechou o livro misterioso com a intenção de mudar essa realidade severa?"
52260-135 = "......Sinceramente, não entendo."
52260-136 = "......Você mostrou isso para a Ayame também, não mostrou?"
52260-137 = "Você a trancou na escuridão e continuou sussurrando."
52260-138 = "Foi por isso que a Ayame entrou em desespero e fugiu."
52260-139 = "Bela percepção. Mesmo a presidente da Hyakkaryouran, invejada por todos, teve o coração partido e concordou conosco. #n Você realmente acha que consegue trazê-la de volta?"
52260-140 = "Você, que é mais fraca que a Ayame, acha que pode salvá-la...... você realmente acredita nisso?"
52260-141 = "Eu não consigo fazer algo assim. #n Porque eu...... não sou a Ayame."
52260-142 = "Mas...... eu posso estender esta mão."
52260-150 = "Isso é impossível...... aquele braço direito deveria ter sido engolido pelo Crepúsculo."
52260-151 = "Se você pretende nos humilhar, nós que manipulamos o livro misterioso, com truques baratos――"
52260-158 = "Vou perguntar mais uma vez."
52260-159 = "Onde está Ayame?"
52260-160 = "Não é...... possível......"
52260-161 = "Assim como flores não desabrocham em madeira morta, algo engolido pelo Crepúsculo não deveria poder ser recuperado......"
52260-162 = "K, Kokuriko-sama......"
52260-167 = "A necessidade dá estrutura a uma história, e o acaso dá interesse a ela."
52260-168 = "Do meio do Crepúsculo, você não só agarrou sua própria sombra, como também a mão estendida para outra pessoa. #n Você tem um talento para agitar as coisas......"
52260-172 = "Acho que você é muito mais adequada para ser uma contadora de histórias do que para ficar na Hyakkaryouran."
52260-176 = "Ayame ainda está no topo da torre do castelo, observando vocês."
52260-177 = "No caso improvável de que essa mão realmente alcance a Ayame."
52260-181 = "――Vou direcionar meu olhar para uma história diferente por um momento."
52260-192 = "[ns] \"......Espere!\""
52260-196 = "Ela fugiu......"
52260-204 = "U, uau......!? O, o que foi isso agora?"
52260-205 = "Sinto que tive um sonho muito ruim......"
52260-206 = "Kokuriko...... e o Clube das Flores, Pássaros, Vento e Lua?"
52260-207 = "......Eles desapareceram. Não consegui pará-los."
52260-208 = "Mas agora, procurar a Ayame é mais importante."
52260-214 = "Sensei [USERNAME]. Por fim, posso pedir um favor?"
52260-215 = "Pode ser um pouco perigoso...... mas quero que você seja testemunha da minha luta contra Ayame."
52260-216 = "[s] \"Estarei observando, não importa o que aconteça.\""
52260-217 = "......Obrigada."
52260-218 = "Então, vamos lá. Para salvar a Ayame."

