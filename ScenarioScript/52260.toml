[translation]
52260-1 = "Episódio 26: Do fundo de uma sombra escura e profunda"
52260-2 = "O Hyakumonogatari consiste em trocar cem histórias."
52260-3 = "Realizado na calada da noite, quando até as plantas dormem, uma vela é apagada a cada final de história. É um conto de terror que começou com um jogo de Hyakki Yagyō transmitido desde a antiguidade."
52260-4 = "Quanto mais se conta, mais as luzes diminuem e mais profunda a escuridão se torna."
52260-5 = "Quanto mais coberto pela escuridão, mais o interior de si mesmo é revelado."
52260-6 = "Como uma história estranha, esse coração incompreensível."
52260-7 = "Rumores e boatos que envolvem o mundo... contos de terror nada mais são do que espelhos que refletem desejos."
52260-9 = "[log][ff4444]Vamos, confesse ao fundo da escuridão.[-][/log]"
52260-12 = "[log][ff4444]Que tipo de máscara de mentiras você está usando?[-][/log]"
52260-15 = "[log][ff4444]Que tipo de desejo você carrega e...[-][/log]"
52260-18 = "[log][ff4444]Do que você está desviando o olhar?[-][/log]"
52260-22 = "Eu..."
52260-23 = "Eu me esforcei nos treinos para manter a justiça da Hyakka Ryoran, mas também sentia insegurança."
52260-24 = "Nos mangás e romances shoujo, sempre há uma juventude brilhante, mas eu..."
52260-25 = "Sinto que talvez esteja desperdiçando minha juventude."
52260-29 = "...Você já sabia disso há muito tempo, não é?"
52260-30 = "Que um cotidiano coberto de suor e pólvora está longe de ser uma juventude."
52260-33 = "Eu..."
52260-34 = "Como estrategista da Hyakka Ryoran, eu achava que tinha o dever de corrigir tudo."
52260-35 = "\"Recuperar a Hyakka Ryoran\"... usando esse pretexto como escudo, disparei palavras cruéis contra todos."
52260-36 = "Culpei a veterana que se foi e odiei a realidade que não saía como eu queria..."
52260-40 = "Mesmo sendo eu quem estava destruindo a Hyakka Ryoran desse jeito."
52260-43 = "Eu..."
52260-44 = "Todos me aceitaram. Mas... eu sempre sou um substituto para alguém."
52260-45 = "Tanto como sacerdotisa de Kageyu-koji... quanto como membro da Hyakka Ryoran..."
52260-49 = "Ninguém deseja a verdadeira eu."
52260-50 = "...Seria melhor se eu tivesse nascido como uma marionete."
52260-53 = "[ns] \"...O que você fez com todos?\""
52260-55 = "Ora, então o poder do livro estranho não alcança o Sensei do Schale? #nQue problemático."
52260-56 = "...Eu não fiz nada."
52260-57 = "Apenas cobri seus olhos para que pudessem olhar para si mesmos."
52260-58 = "No entanto, o coração é algo que desmorona facilmente apenas ao refletir sobre si mesmo."
52260-59 = "No fim das contas, as pessoas não entendem o coração das outras."
52260-60 = "Mesmo que seja... o seu próprio coração, não é?"
52260-61 = "[s] \"Mesmo que não possamos entender, qual é o problema disso?\""
52260-65 = "[ns1] \"Basta continuar perguntando até entender.\"\n[ns2] \"É por isso que todos vivem apoiando uns aos outros...\"\n[ns3] \"E nunca param de aprender uns com os outros.\""
52260-69 = "Ora... foi você quem soprou esperança nessas crianças?"
52260-70 = "Então, observe atentamente a partir daí."
52260-74 = "O destino daquela esperança vazia que você tanto pregou até agora..."
52260-76 = "...Eu sou."
52260-77 = "Uma chorona que não consegue fazer nada sozinha."
52260-80 = "Mesmo quando estendia a mão para algo precioso, tudo escorria pelos meus dedos... e eu só podia observar enquanto tudo se quebrava."
52260-82 = "No fim, eu não consegui me tornar a Ayame."
52260-86 = "...Porque eu sou a Misumi Nagusa."
52260-106 = "Eu sempre bato em uma parede... e só consigo fingir ser algo que não sou."
52260-110 = "— Mas isso não significa que eu deva desistir."
52260-116 = "Kokuriko. Não importa o quanto você tente me mostrar a realidade, meus pensamentos não mudarão."
52260-123 = "Eu sou Misumi Nagusa."
52260-127 = "— Não importa o que digam, a melhor amiga da Ayame!"
52260-132 = "...Entendo, então você já sabia."
52260-133 = "A própria fragilidade... a falta de sentido em estender a mão."
52260-134 = "Mesmo assim, você fechou o livro misterioso, acreditando que pode mudar essa realidade cruel?"
52260-135 = "……Sinceramente, eu não entendo."
52260-136 = "……Você também mostrou isso para a Ayame, não foi?"
52260-137 = "Você a trancou na escuridão e continuou sussurrando para ela."
52260-138 = "Foi por isso que a Ayame se desesperou e fugiu."
52260-139 = "Muito perspicaz. Até a presidente do Hyakkiyako, invejada por todos, teve seu coração quebrado e se juntou a nós. #nVocê realmente acha que pode trazer alguém assim de volta?"
52260-140 = "Você, que é mais fraco que a Ayame, acredita mesmo que pode salvá-la?"
52260-141 = "Eu não consigo fazer algo assim. #nPorque... eu não sou a Ayame."
52260-142 = "Mas... eu posso estender a minha mão."
52260-150 = "Impossível... aquele braço direito deveria ter sido engolido pelo crepúsculo."
52260-151 = "Se você pretende nos humilhar, a nós que manipulamos o livro misterioso, com um truque barato desses――"
52260-158 = "Vou perguntar mais uma vez."
52260-159 = "Onde está a Ayame?"
52260-160 = "Isso não pode... ser..."
52260-161 = "Assim como flores não desabrocham em árvores mortas, o que foi engolido pelo crepúsculo não deveria poder ser recuperado..."
52260-162 = "S-Senhorita Kokuriko..."
52260-167 = "A inevitabilidade dá estrutura à história, e o acaso dá interesse a ela."
52260-168 = "Quem diria que, de dentro do crepúsculo, você não apenas agarraria sua própria sombra, mas também a mão estendida para outra pessoa. #nVocê tem um talento nato para agitar as coisas..."
52260-172 = "Acho que você daria um narrador muito melhor do que alguém do Hyakkiyako."
52260-176 = "A Ayame ainda está lá em cima, na torre do castelo, observando vocês."
52260-177 = "Se, por um acaso, essa mão realmente alcançar a Ayame."
52260-181 = "――Talvez eu também deva dar uma olhada em uma história diferente por um momento."
52260-192 = "[ns] \"……Espere!\""
52260-196 = "Ela fugiu..."
52260-204 = "U-uau...!? O que foi aquilo agora há pouco?"
52260-205 = "Sinto como se tivesse acabado de ter um pesadelo terrível..."
52260-206 = "Kokuriko... e o Clube Kacho Fugetsu?"
52260-207 = "……Eles desapareceram. Não consegui impedi-los."
52260-208 = "Mas agora, encontrar a Ayame é mais importante."
52260-214 = "Professor [USERNAME]. Posso te pedir... um último favor?"
52260-215 = "Pode ser um pouco perigoso, mas... eu quero que você testemunhe a minha luta contra a Ayame."
52260-216 = "[s] \"Não importa o que aconteça, eu estarei observando.\""
52260-217 = "……Obrigada."
52260-218 = "Então, vamos lá. Vamos salvar a Ayame."
