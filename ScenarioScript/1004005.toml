[translation]
1004005-1 = "立派な、くノ一に……！"
1004005-2 = "先生……！！"
1004005-3 = "私、見つけてしまいました！"
1004005-4 = "一人前の、"
1004005-5 = "立派な忍者になる方法を……！"
1004005-6 = "[s] \"えっと、なるほど……？\""
1004005-7 = "それが、ですね……！"
1004005-8 = "すみません、ちょっと深呼吸、します……すーっ……はーっ……すーっ、はーっ。"
1004005-9 = "少し、落ち着きました……。"
1004005-10 = "えっと、先生には普段、一人前の忍者になるための修練に、お付き合いしていただいてますが……。"
1004005-11 = "ですが、先生もお忙しい身、です。"
1004005-12 = "[s] \"うん、毎日は付き合えなくてごめんね。\""
1004005-13 = "あ、いえ……！それを責めたいですとか、そういうことでは、なく……！"
1004005-14 = "あ、でも……少し、ほんの少しですが、先生にお付き合いいただける時間が、もう少し多いと良いな、とは……。"
1004005-15 = "それはその、嘘ではないと言いますが、あるのですが……えっと、すみません、困らせたいわけでは、ないのですけれど……！"
1004005-16 = "[s] \"う、うん……できるだけ、時間やりくりするね。\""
1004005-17 = "ありがとう、ございます……あ、えっと、お話が、逸れてしまいましたが……。"
1004005-18 = "先生と一緒に、修行ができない日も……鍛錬を、怠るわけには、と……。"
1004005-19 = "それで、インターネットで検索、ですとか……本を読んだりも、するのですが……。"
1004005-20 = "風の便りで、「古本屋さんなら、伝説の忍者が書いた最強の忍術書があるかも！」と聞きまして……。"
1004005-21 = "それで、先日立ち寄った古本屋さんで、何と……！"
1004005-22 = "[s] \"なんと……！？\""
1004005-30 = "こんな本を、見つけてしまいました……！"
1004005-31 = "[s1] \"……「くノ一の手引き」？\"\n[s2] \"なんか、見た目が怪しい気がするけど……。\""
1004005-32 = "あ、やっぱり、そう思いますよね……！？"
1004005-33 = "あ、やっぱり、そう思いますよね……！？"
1004005-34 = "この怪しさ……きっとすごい秘密が、書かれているのでは、と……！"
1004005-35 = "これを見てください、「くノ一と呼ばれる、特別な忍者たちに送る」と、書かれてます……！"
1004005-36 = "[s] \"……？\""
1004005-37 = "どうやら「くノ一」というのは、"
1004005-38 = "「特別な忍者」のことのようで……！"
1004005-39 = "[s] \"んん……？\""
1004005-40 = "びっくり、ですよね。私、初めて知りました。"
1004005-41 = "序文には、このようにも、書かれてます。「優れたくノ一は、どんな相手でもたちまち制圧してしまう」……"
1004005-42 = "すごい忍者、なのですね。"
1004005-43 = "忍者……その中の、また別の区分、くノ一……。"
1004005-44 = "忍者のことは、私も、まだ詳しく、ありませんが……「中忍」「上忍」といった言葉は、知っています……！"
1004005-45 = "この「くノ一」、というのは、もしかしたら……それくらい強い、すごい忍者なのかも、しれません……！"
1004005-46 = "[s] \"えっと……くノ一っていうのは、その……\""
1004005-47 = "先生……！「くノ一」になるため、修行を、手伝っていただけませんか……！"
1004005-48 = "私は、この本を通じて……"
1004005-49 = "最高の、くノ一に、なりたいです……！"
1004005-50 = "（そうやって目を輝かせるツクヨに対して、すぐ「違うんだよ」と言うのは憚られてしまった）"
1004005-51 = "[s] \"……よし、とりあえずちょっとやってみようか。\""
1004005-52 = "はいっ……！"
1004005-54 = "（そうしてツクヨと一緒に、「くノ一の手引き」に書かれた忍術を試すことにした）"
1004005-55 = "えっと、最初の忍術は、「いちゃいちゃ捕縛の術」……ちょっと変な名前ですね……？"
1004005-56 = "やり方はまず、縄を用意して……結び目を作り……。"
1004005-57 = "えっと、準備完了、です。では、行きます……！"
1004005-58 = "[s] （どうやってかわそう……）"
1004005-59 = "「いちゃいちゃ捕縛の術」……！"
1004005-66 = "えっと、縄を、こう結んで……！"
1004005-67 = "次に……"
1004005-68 = "「胸を寄せる」？"
1004005-69 = "姿勢の、問題……？こう、でしょうか……？"
1004005-76 = "（ギューッ）"
1004005-77 = "[s] \"ツクヨ！ストップ！\""
1004005-78 = "……？"
1004005-79 = "ひゃあぁっ！？すみません、苦しかったですよね……！？"
1004005-80 = "あわわっ！？"
1004005-85 = "あうぅぅ……。"
1004005-87 = "[ns] \"ツクヨ、大丈夫？怪我は？\""
1004005-88 = "あ、大丈夫です……"
1004005-89 = "ですがこの忍術……。"
1004005-90 = "[s] \"えっと、何て言うかその……。\""
1004005-91 = "こんなにも再現が、難しいとは……やっぱり、とっても強い忍者が、使うものなのですね……！"
1004005-92 = "まだ、修行が、足りないかもです……！"
1004005-93 = "[s] \"そう、だね……？\""
1004005-94 = "張り切って、次に、行きましょう……！"
1004005-95 = "（その後もツクヨと一緒に、順番に忍術を試していった）"
1004005-96 = "次は、「添い寝の術」……"
1004005-97 = "どういうことでしょうか？"
1004005-98 = "あ、分かったかも、しれません……！添い寝をするふりをして、寝首をかく、という……！？"
1004005-99 = "先生、試してみても、良いでしょうか……！"
1004005-101 = "では、次の忍術を……。"
1004005-102 = "次は、"
1004005-103 = "「太もも挟みの術」……えっと、太ももで相手の顔を、締める……？どうして、そんなことを、するんでしょうか？"
1004005-104 = "道具より安全だから、でしょうか……？"
1004005-105 = "では早速……。"
1004005-106 = "先生の顔を、太ももで……？"
1004005-107 = "えっと、無かったことにしましょう……！！"
1004005-108 = "とりあえず、次を……！"
1004005-110 = "（そうして「くノ一の手引き」を見ながら修行（？）は続き……）"
1004005-111 = "これで、修行に、なってるんでしょうか……？"
1004005-112 = "やっぱり、私にはまだ、早かったとか……？"
1004005-113 = "[s] \"ツクヨ、ずっと言えてなくて申し訳ないんだけど、その……。\""
1004005-114 = "えっ？くノ一は「強い忍者」のことではない……？"
1004005-115 = "そうなんですか……？えっと、では、ここにある「優れたくノ一は、どんな相手でもたちまち制圧してしまう」というのは……？"
1004005-116 = "優れている忍者、という、意味なのでは……？"
1004005-117 = "[s] \"えーっと……あ、ここに書いてある。\""
1004005-118 = "あ、何やら小さい字で……えっと……。"
1004005-119 = "「優れたくノ一は、どんな相手でもたちまち制圧してしまう」……"
1004005-120 = "「ここに書かれた術をマスターして、色仕掛けで気になるあの人をリードしよう！」"
1004005-121 = "…………。"
1004005-122 = "…………。"
1004005-123 = "え、えぇっ！？"
1004005-124 = "ということは、えっと、今までのは、全部「色仕掛け」、ということですか……！？"
1004005-125 = "[s] \"ツクヨ、落ち着いて……！\""
1004005-126 = "そんな、色仕掛けだなんて……！"
1004005-127 = "そういうのは、まだ、私には早いですっ……！！！"
1004005-131 = "[ns] \"行っちゃった……。\""
1004005-133 = "（忍者になるのって大変なんだなあと思いつつ、心の中でツクヨに謝った）"
