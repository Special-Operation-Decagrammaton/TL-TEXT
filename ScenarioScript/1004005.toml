[translation]
1004005-1 = "Em uma kunoichi... exemplar!"
1004005-2 = "Sensei...!!"
1004005-3 = "Eu, eu acabei descobrindo!"
1004005-4 = "Como me tornar uma,"
1004005-5 = "uma ninja exemplar...!"
1004005-6 = "[s] \"Err, entendo...?\""
1004005-7 = "É que, veja bem...!"
1004005-8 = "Desculpe, preciso respirar fundo um pouco... Inspira... Expira... Inspira... Expira."
1004005-9 = "Já estou um pouco mais calma..."
1004005-10 = "Bem, eu costumo pedir para o Sensei me acompanhar nos treinos para me tornar uma ninja de verdade, mas..."
1004005-11 = "Mas o Sensei também é uma pessoa muito ocupada."
1004005-12 = "[s] \"Sim, sinto muito por não poder acompanhar todos os dias.\""
1004005-13 = "Ah, não...! Não é que eu queira te culpar por isso, de jeito nenhum...!"
1004005-14 = "Ah, mas... um pouco, só um pouquinho mesmo, eu gostaria que tivéssemos um pouco mais de tempo para treinar juntos..."
1004005-15 = "Isso, bem, não é mentira, mas... err, desculpe, não quero te deixar em uma situação difícil...!"
1004005-16 = "[s] \"E-entendo... Vou tentar arranjar tempo sempre que possível.\""
1004005-17 = "Muito obrigada... Ah, err, acabei me desviando do assunto..."
1004005-18 = "Mesmo nos dias em que não posso treinar com o Sensei... não posso negligenciar meu treinamento..."
1004005-19 = "Por isso, eu pesquiso na internet, ou leio alguns livros..."
1004005-20 = "Ouvi dizer por aí que: \"Se for em um sebo, talvez você encontre o manual ninja mais forte escrito por um ninja lendário!\""
1004005-21 = "E então, no sebo que visitei outro dia, vejam só...!"
1004005-22 = "[s] \"Sério...!?\""
1004005-30 = "Eu acabei encontrando este livro...!"
1004005-31 = "[s1] \"... 'Guia da Kunoichi'?\"\n[s2] \"Parece um pouco suspeito, mas...\""
1004005-32 = "Ah, você também acha isso, não é...!?"
1004005-33 = "Ah, você também acha isso, não é...!?"
1004005-34 = "Essa aura suspeita... com certeza deve conter segredos incríveis...!"
1004005-35 = "Veja isto, está escrito: \"Dedicado às ninjas especiais chamadas Kunoichi\"...!"
1004005-36 = "[s] \"...?\""
1004005-37 = "Pelo visto, \"Kunoichi\""
1004005-38 = "parece ser o nome de uma \"ninja especial\"...!"
1004005-39 = "[s] \"Hmm...?\""
1004005-40 = "Surpreendente, não é? Eu não sabia disso."
1004005-41 = "No prefácio, também está escrito assim: \"Uma Kunoichi excelente é capaz de subjugar qualquer oponente num instante\"..."
1004005-42 = "Elas devem ser ninjas incríveis."
1004005-43 = "Ninja... e dentro disso, uma categoria diferente, a Kunoichi..."
1004005-44 = "Eu ainda não entendo muito sobre ninjas, mas... eu conheço termos como \"Chunin\" e \"Jonin\"...!"
1004005-45 = "Talvez essa \"Kunoichi\" seja... uma ninja tão forte quanto essas...!"
1004005-46 = "[s] \"Err... Kunoichi é, na verdade...\""
1004005-47 = "Sensei...! Você poderia me ajudar a treinar para me tornar uma \"Kunoichi\"...!"
1004005-48 = "Através deste livro..."
1004005-49 = "Eu quero me tornar a melhor Kunoichi de todas...!"
1004005-50 = "(Vendo os olhos de Tsukuyo brilharem daquela forma, hesitei em dizer imediatamente que \"não era bem assim\")"
1004005-51 = "[s] \"...Certo, vamos tentar fazer isso por enquanto.\""
1004005-52 = "Sim...!"
1004005-54 = "(Assim, decidi experimentar as técnicas ninjas escritas no \"Guia da Kunoichi\" junto com Tsukuyo)"
1004005-55 = "Bem, a primeira técnica ninja é: \"Técnica de Captura Amorosa\"... Que nome estranho, não é...?"
1004005-56 = "O método é, primeiro, preparar uma corda... fazer um nó..."
1004005-57 = "Err, preparação concluída. Então, lá vou eu...!"
1004005-58 = "[s] (Como eu deveria desviar disso...)"
1004005-59 = "“Técnica de Captura de Carícias”……!"
1004005-66 = "Bem, a corda, eu amarro assim……!"
1004005-67 = "Em seguida……"
1004005-68 = "“Aproximar o peito”?"
1004005-69 = "É uma questão de postura……? Assim, está bom……?"
1004005-76 = "(Aperto)"
1004005-77 = "[s] \"Tsukuyo! Pare!\""
1004005-78 = "……?"
1004005-79 = "Kyaaa!? Desculpe, deve ter sido sufocante, não é……!?"
1004005-80 = "Awawa!?"
1004005-85 = "Auuu……."
1004005-87 = "[ns] \"Tsukuyo, você está bem? Se machucou?\""
1004005-88 = "Ah, estou bem……"
1004005-89 = "Mas essa técnica ninja……."
1004005-90 = "[s] \"Bem, como posso dizer…….\""
1004005-91 = "Que seria tão difícil de reproduzir…… Afinal, deve ser algo que apenas ninjas muito fortes usam……!"
1004005-92 = "Talvez meu treinamento ainda não seja suficiente……!"
1004005-93 = "[s] \"É, talvez……?\""
1004005-94 = "Vamos nos animar e passar para a próxima……!"
1004005-95 = "(Depois disso, continuei testando as técnicas ninja uma por uma com a Tsukuyo)"
1004005-96 = "A próxima é a “Técnica de Dormir Juntos”……"
1004005-97 = "O que isso significa?"
1004005-98 = "Ah, talvez eu tenha entendido……! Fingir dormir junto para cortar a garganta do alvo……!?"
1004005-99 = "Sensei, posso tentar……!"
1004005-101 = "Então, a próxima técnica……."
1004005-102 = "A próxima é,"
1004005-103 = "“Técnica de Prender com as Coxas”…… Bem, prender o rosto do oponente com as coxas……? Por que alguém faria algo assim?"
1004005-104 = "Será que é porque é mais seguro do que usar ferramentas……?"
1004005-105 = "Então, vamos começar……."
1004005-106 = "O rosto do Sensei, com as minhas coxas……?"
1004005-107 = "Bem, vamos fingir que isso nunca aconteceu……!!"
1004005-108 = "Por enquanto, vamos para a próxima……!"
1004005-110 = "(E assim, enquanto olhávamos o “Manual da Kunoichi”, o treinamento (?) continuou……)"
1004005-111 = "Isso pode ser considerado treinamento……?"
1004005-112 = "Será que ainda é cedo demais para mim……?"
1004005-113 = "[s] \"Tsukuyo, sinto muito por não ter dito antes, mas, bem…….\""
1004005-114 = "Hã? Kunoichi não significa “ninja forte”……?"
1004005-115 = "É mesmo……? Bem, então, o que significa isso aqui: “Uma kunoichi excelente subjuga qualquer oponente num instante”……?"
1004005-116 = "Não significa uma ninja excelente……?"
1004005-117 = "[s] \"Bem…… ah, está escrito aqui.\""
1004005-118 = "Ah, tem umas letras pequenas…… bem……."
1004005-119 = "“Uma kunoichi excelente subjuga qualquer oponente num instante”……"
1004005-120 = "“Domine as técnicas escritas aqui e lidere aquela pessoa especial usando sedução!”"
1004005-121 = "…………."
1004005-122 = "…………."
1004005-123 = "E-Ehhhh!?"
1004005-124 = "Isso significa que, bem, tudo o que fizemos até agora era “sedução”, é isso……!?"
1004005-125 = "[s] \"Tsukuyo, acalme-se……!\""
1004005-126 = "Não pode ser, sedução……!"
1004005-127 = "Esse tipo de coisa ainda é cedo demais para mim……!!!"
1004005-131 = "[ns] \"Ela foi embora...\""
1004005-133 = "（Enquanto pensava que ser uma ninja é algo difícil, pedi desculpas a Tsukuyo em meu coração）"
