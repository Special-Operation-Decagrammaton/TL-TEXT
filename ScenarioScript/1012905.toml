[translation]
1012905-1 = "Falha na bomba Flashbang"

1012905-6 = "Professor, é isso."

1012905-7 = "[s] \"Suzumi! Já está aqui!\""

1012905-12 = "[ns] \"Tão fofo!\""

1012905-13 = "Ou não zombe de mim!"

1012905-14 = "Disseram-me para "vestir-me de acordo com a cena"..."

1012905-15 = "[s1] \"Eu queria saber se uma camiseta seria boa.\"\n[s2] \"Na verdade, esse visual é o melhor.\""

1012905-18 = "Uuuuuuuuu...!"

1012905-23 = "Ah, desculpe por isso... #n "Thermite White" de "Magical Girl Heavy Calibur"... certo?"

1012905-27 = "Ah, sim! Sim, mas..."

1012905-28 = "Eu sou fã de branco! #nPhoto...Posso tirar uma foto com você? ?"

1012905-29 = "Ah, uma foto?"

1012905-30 = "[s] \"Faça isso natural, Suzumi...!\""

1012905-31 = "Bem, assim...?"

1012905-36 = "Com licença, eu também posso...! ?"

1012905-37 = "Por favor, faça isso também!"

1012905-51 = "obrigado! Vou fazer disso uma herança! !"

1012905-56 = "Esse personagem é muito popular..."

1012905-57 = "[s] \"Porque o pardal é fofo.\""

1012905-58 = "...Concentre-se na patrulha."

1012905-59 = "(A professora faz isso de novo... sem qualquer hesitação...)"

1012905-69 = "Ei, não é uma câmera legal? Traga-o aqui."

1012905-70 = "Basta alugá-lo. #nVou enviar para você mais tarde."

1012905-72 = "Você [ruby=mutai]intangível[/ruby]! ! #nEste é um [ruby=camera]tesouro sagrado[/ruby] mais importante que a minha vida...!"

1012905-73 = "Apenas me empreste!"

1012905-78 = "Os delinquentes que estão vandalizando o evento... são essas pessoas."

1012905-79 = "Professor, por favor espere aqui."

1012905-86 = "É isso!"

1012905-91 = "Ah? Você é um cosplayer?"

1012905-92 = "Você quer que eu tire uma foto? #nEstou prestes a tirar a câmera desse cara, então espere!"

1012905-93 = "O que...! agora! Eu disse que iria roubar! ?"

1012905-94 = "Acho que pedir emprestado e roubar são semelhantes!"

1012905-96 = "Duas pessoas?"

1012905-97 = "Seria mais conveniente que duas pessoas se reunissem. #nIsso será feito rapidamente."

1012905-98 = "Ah? ...Nem seja atingido por uma granada flashbang!"

1012905-107 = "Ku-kuu! Ah, minhas mãos...! #nQue aderência esse cara tem!"

1012905-108 = "Ha, deixe-me ir! Uma granada flashbang explode na minha mão...!"

1012905-109 = "Posso te ajudar"

1012905-116 = "I-itatatatatat! ! !"

1012905-117 = "Uau! ! Minhas mãos! !"

1012905-118 = "Droga, lembre-se disso...!"

1012905-126 = "Flashbangs são sagrados. #nNão remova os pinos indiscriminadamente."

1012905-132 = "Agora há pouco... você estava esmagando a granada flashbang com as próprias mãos, certo?"

1012905-133 = "Sim... antes que exploda, splat! Então..."

1012905-134 = "É um adereço...? Na verdade, foi algum tipo de show."

1012905-136 = "O objetivo foi alcançado. Professor, vamos para casa."

1012905-137 = "[s3] \"Ah...\"\n[s4] \"Sim...\""

1012905-143 = "(Saindo do local do evento com Suzumi)"

1012905-144 = "(Por alguma razão todos abriram caminho para mim e eu consegui me mover suavemente...)"

