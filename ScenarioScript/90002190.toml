90002190-104 = "[ns] \"！？！？！？\""
90002190-106 = "Vamos matar um deus! Já estou preparada para isso!"
90002190-107 = "Cof, cof! I, isso mesmo... Não se preocupem com a gente...!"
90002190-108 = "Esqueceu por que viemos até aqui?#nPara impedir que o mundo seja coberto pelo Continente de Aço, não é?"
90002190-110 = "A chance é agora!#nOu você pretende tornar a nossa escolha inútil?"
90002190-114 = "Ma, mas...!"
90002190-115 = "Ain? Soph? Aur?"
90002190-116 = "Por que, afinal...?"
90002190-117 = "E-hehe. É por isso."
90002190-118 = "Isso é o certo... e era o que devíamos fazer. #nFico feliz por ter visto a irmã mais velha uma última vez. Ahaha..."
90002190-119 = "...Há algo que eu sempre quis dizer."
90002190-121 = "Houve alguém que me disse: 'Você se esforçou muito'."
90002190-124 = "Dizendo o que bem entendia, como pedir para sermos amigas ou que deveríamos resistir se tivéssemos desejos."
90002190-127 = "Não fazemos isso porque é o certo. É que não há mais nada que possamos fazer. #n...Essa é a nossa luta."
90002190-130 = "N-nós queremos que a irmã mais velha viva."
90002190-133 = "Não importa o que aconteça, apenas a irmã mais velha deve sobreviver."
90002190-136 = "Por favor, veja mais coisas, conheça mais pessoas e vivencie muito mais."
90002190-139 = "Muito, muito mais do que nós..."
