90002190-145 = "Por favor, sobreviva até o fim."
90002190-147 = "Ah... ah... aaaaaaaa...!"
90002190-148 = "Eu avisei. Para não olhar para trás."
90002190-149 = "Por favor, tenha piedade. É constrangedor, não é?"
90002190-150 = "Ehehe... Obrigada. Por dizer que quer ser nossa amiga..."
90002190-151 = "Continue avançando sem parar. Até o fim."
90002190-152 = "I-isso mesmo...! Seguir os passos dos antecessores e abrir caminho... esse é o jeito de vocês viverem, não é...?"
90002190-153 = "Ah! E cuidado com quem é obcecado por autorrealização! Ahaha!"
