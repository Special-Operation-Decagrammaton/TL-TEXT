[translation]
1010905-1 = "透明"
1010905-2 = "シャーレ・休憩室"
1010905-4 = "（休憩室のベッドで横になっていると……）"
1010905-11 = "お邪魔します、先生。"
1010905-12 = "昨日お伝えした通り、お見舞いに参りました。"
1010905-13 = "お加減はいかがです？"
1010905-14 = "[s1] \"……ノア、来てくれたんだ。\"\n[s2] \"わざわざごめんね。\""
1010905-17 = "ふふっ。お気になさらず。"
1010905-21 = "空いたペットボトルやお弁当の容器は片付けてしまっても良いでしょうか？"
1010905-22 = "ついでに、他のゴミも捨ててきます。"
1010905-26 = "これは……水道光熱費の請求書ですね。"
1010905-27 = "支払期限が近いので、こちらも処理しておきます。"
1010905-28 = "[s] \"せっかくの休日にごめん……ありがとう。\""
1010905-29 = "いえ、これくらい何でもありません。"
1010905-30 = "先生はゆっくり休んでいてください。"
1010905-31 = "それに、いつも当番でやっていることですから。"
1010905-32 = "[s3] \"でも、今日は当番じゃないでしょ……？\"\n[s4] \"もっと楽にしてくれた方が、こっちも気が楽かも？\""
1010905-35 = "そうですね……。"
1010905-40 = "では、少し更衣室をお借りしてもよろしいですか？"
1010905-41 = "[s] \"うん、大丈夫だよ。\""
1010905-42 = "ふふ、では失礼しますね。"
1010905-47 = "（しばらくして……）"
1010905-50 = "ただいま戻りました。"
1010905-51 = "[s] \"その格好は……。\""
1010905-52 = "……変でしたか？"
1010905-53 = "楽にしてくれ、とのことでしたので着替えたのですが……。"
1010905-54 = "[s] \"他の生徒に誤解されちゃいそう……。\""
1010905-55 = "本日、シャーレに訪れる予定の生徒はいないはずです。"
1010905-56 = "……それに、楽にしてと言ったのは先生でしたよね？"
1010905-57 = "もしかして……他に着てほしい服でも？"
1010905-61 = "[ns] \"……その服でお願いします。\""
1010905-62 = "では、片付けが終わるまでゆっくり休んでいてくださいね。"
1010905-67 = "これで良し、っと……。"
1010905-68 = "先生、お昼は召し上がりましたか？"
1010905-69 = "[s] \"あまり食欲がなくて……。\""
1010905-70 = "ダメじゃないですか。#nきちんと食べないと、元気になりませんよ。"
1010905-71 = "……そういえば以前、たまごのおかゆを作っていただきましたよね。"
1010905-72 = "今度は私が何か作っても良いでしょうか？"
1010905-73 = "[s] \"ノアの手料理！？\""
1010905-74 = "大したものは作れませんけれど……。"
1010905-75 = "少し待っていてくださいね。"
1010905-84 = "……お待たせしました。"
1010905-85 = "エビとオクラのスープに、たまご焼きです。"
1010905-86 = "有り合わせになってしまいましたが……。"
1010905-87 = "[s5] \"ノアの手料理なんだから絶対美味しいよ！\"\n[s6] \"いただきます！\""
1010905-90 = "はい。ゆっくりお召し上がりください。"
1010905-95 = "……お口に合いませんでしたか？"
1010905-96 = "[s] \"ううん、すごく美味しいよ！\""
1010905-97 = "何だか一瞬、不思議な顔をされていたので……。"
1010905-98 = "[s7] \"普段は味が濃いものばかりだから……。\"\n[s8] \"ノアの手料理に感動しちゃって……。\""
1010905-101 = "あ……。"
1010905-102 = "そうですよね。味付け、薄く感じましたよね？"
1010905-103 = "先生が召し上がるものなのに、つい癖で。私の好みで作っちゃいました……。"
1010905-104 = "普段はほとんど調味料を使わないので……。"
1010905-105 = "[s] \"ノアは薄めの味付けが好きなんだ？\""
1010905-106 = "そうですね、食材本来の味を楽しみたいですし。"
1010905-107 = "何をするにも自己を主張し過ぎないようにしている、#n私の性分が出てしまったようです。"
1010905-108 = "そのせいで、先生のお口に合わなかったわけですね……。"
1010905-112 = "[ns] ノアの手料理をかき込む。"
1010905-115 = "あ、熱いので気をつけてくださ――"
1010905-116 = "[s] \"美味しかったよ、ノア！\""
1010905-118 = "[ns] \"ひとつお願いがあるんだけど、良いかな！\""
1010905-119 = "お願いですか？"
1010905-120 = "[s] \"うん、これはノアにしか頼めないんだ。\""
1010905-121 = "私にしか……？"
1010905-132 = "[wa:2170]― [log=노아 파자마]『きらきらと[wa:540]輝く星々が、[wa:1950]まるで[wa:1070]羊の群れのように[wa:1560]静かに流れておりました……』[/log]"
1010905-135 = "[wa:860]― [log=노아 파자마]先生は、[wa:1090]変わっていますね。[/log]"
1010905-137 = "[wa:960]― [log=노아 파자마]なんの変哲もない[wa:1000]私の朗読を[wa:1040]聴きながら[wa:370]眠りたいだなんて。[/log]"
1010905-140 = "[ns] \"ノアの声を聞いてると、落ち着くんだ。\""
1010905-142 = "[wa:1000]― [log=노아 파자마]……[wa:830]それは[wa:1280]どうしてですか？[/log]"
1010905-144 = "[wa:1150]― [log=노아 파자마]声が透明で[wa:1220]綺麗だから、[wa:1400]文字の先を[wa:1000]想像できる……？[/log]"
1010905-147 = "[wa:500]― [log=노아 파자마]……[wa:2700]ありがとうございます、[wa:1250]先生。[/log]"
1010905-149 = "[wa:1200]― [log=노아 파자마]私も、[wa:1430]自分を見つめ直すことができました。[/log]"
1010905-152 = "[wa:1000]― [log=노아 파자마]……[wa:920]先生？[wa:1640]もう寝てしまったんですか？[/log]"
1010905-155 = "[wa:2000]― [log=노아 파자마]あの中で[wa:1580]一番美しく[wa:1000]輝いている星が……[/log]"
1010905-157 = "[wa:1300]― [log=노아 파자마]道に迷ったのか、[wa:2300]私の足元で[wa:2080]眠ってしまいました。[/log]"
1010905-160 = "（透明で柔らかいノアの声が、疲れた体にゆっくりと広がった）"
1010905-161 = "（その日は、久しぶりにぐっすり眠れた）"
