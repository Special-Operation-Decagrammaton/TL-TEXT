[translation]
10033010-1 = "Episódio 1; Justo, imparcial e com uma sensação boa"
10033010-4 = "……."
10033010-5 = "……."
10033010-6 = "Senhorita Niya, isso significa que……!?"
10033010-12 = "Isso mesmo. #nProjeto de viagem escolar da Academia Gehenna em Hyakkiyako."
10033010-13 = "Estava pensando em deixar todo o planejamento nas mãos do \"Comitê Organizador do Festival\"."
10033010-14 = "Ah, claro, foi escolhido com base em uma discussão justa, imparcial e interessante――#ncom uma sensação boa, sabe?"
10033010-16 = "Uau! É uma honra! #nMas esse termo \"discussão com uma sensação boa\" me preocupa um pouco, #no que exatamente isso significa……?"
10033010-17 = "Gira-gira, plim."
10033010-18 = "Gira-gira…… espera, não me diga que é uma roleta!?"
10033010-20 = "Resposta correta~♪#nE o melhor de tudo, é uma roleta especial feita à mão pela Chise!"
10033010-21 = "Como a Chefe Niya desejar~."
10033010-30 = "Umika!? Você está bem!?"
10033010-34 = "B-bem, é uma honra, mas o momento não é o melhor……."
10033010-35 = "Nossa líder, a Presidente Shizuko, está em uma viagem de negócios em Trinity……!"
10033010-37 = "Bem, uma viagem escolar é quase como um festival, então vai dar tudo certo, não vai~?"
10033010-38 = "Afinal, foi um comitê escolhido por nós mesmas."
10033010-39 = "Embora tenha sido na roleta, né?"
10033010-40 = "Bom, sendo assim, conto com vocês. #nPessoal do Comitê Organizador do Festival♪"
10033010-41 = "Não posso ajudar pessoalmente, mas estarei torcendo por vocês em pensamento~ #nNyahaha."
10033010-46 = "E-espere! Senhorita Niya, Senhorita Niya!?"
10033010-47 = "A chamada caiu…… #nO que faremos, Umika?"
10033010-48 = "Ugh, logo agora que a presidente não está……."
10033010-49 = "B-bem, primeiro vamos respirar fundo……."
10033010-53 = "……Depois que me acalmei, fiquei ainda mais ansiosa…… #nFina, o que vamos fazer……."
10033010-54 = "D-dizer não também é uma opção, eu acho!? #nSer decidida é a honra de um guerreiro!"
10033010-58 = "……Umika?"
10033010-59 = "……."
10033010-60 = "……Obrigada, Fina."
10033010-61 = "Graças ao que você disse, tomei uma decisão!"
10033010-62 = "Hã!?"
10033010-63 = "Só porque a presidente não está…… #nnão podemos ficar dizendo isso para sempre! #nNós somos o Comitê Organizador do Festival!"
10033010-64 = "Oh, Umika, você é incrível! #nVamos fazer isso, mesmo sem a presidente……!"
10033010-65 = "……."
10033010-66 = "Agora que você disse isso, fiquei ansiosa de novo…… #nUgh, presidente, volte logo por favor~!"
10033010-69 = "Vida nova, a Umika está de volta! #nVamos lá, é hora do festival!"
10033010-70 = "Já que vamos fazer, vamos fazer direito, #ntudo, desde sair de casa até voltar, será uma grande festa!"
10033010-71 = "Eu concordo plenamente! #nMas, e quanto ao orçamento?"
10033010-72 = "Toda vez que a Fina dizia algo, #na presidente sempre se preocupava com o orçamento!"
10033010-73 = "Ugh, é verdade……! #nNesse caso, nada de exageros……."
10033010-74 = "Então, aqui vai uma sugestão da Fina! Falando em viagem escolar, é claro que falamos de amizade! #nMemórias de uma juventude única! Sendo assim……!"
10033010-75 = "Que tal uma imersão em experiências de cavalheirismo na Vila do Cinema, cheia de dever e humanidade!?"
10033010-76 = "I-isso é empolgante, mas não parece um pouco fora do tema de uma viagem escolar……!?"
10033010-77 = "Droga, fiquei sem ideias……! #nO resto deixo com você, Umika!"
10033010-78 = "Q-que rápido…… #nUgh, mas será que não tem outra ideia melhor……."
10033010-79 = "……!"
10033010-80 = "Essa cara……! #nVocê teve uma ideia!?"
10033010-82 = "Como esperado, quando estamos em apuros, precisamos dos nossos aliados! #nO que precisamos é de dever, humanidade e gente para ajudar!"
10033010-88 = "Ei, espere, Fina! #nNão me deixe para trás!"
10033010-95 = "Este lugar é…… o Clube de Treinamento?"
10033010-96 = "Isso! Quem tem amigos tem tudo, companheiros de ontem são companheiros de hoje!#nSe estivermos em apuros, eles com certeza vão ajudar!"
10033010-97 = "I-Isso é verdade, temos contato, mas...!"
10033010-98 = "(S-Será que vai dar certo? Viemos de repente, sem nenhum plano, e aparecemos assim...)"
10033010-99 = "N-Não seria melhor a gente estruturar melhor o que vamos pedir?#nOlha, vai que ela nem está aqui hoje..."
10033010-100 = "De fato, existe a possibilidade de ela não estar..."
10033010-105 = "Ué, o que houve?"
10033010-106 = "Ela está aqui mesmo, né!?!?"
10033010-107 = "Ficou surpresa por eu estar aqui?"
10033010-108 = "Que raro, o que as duas estão fazendo aqui?"
10033010-112 = "Como colegas Mushikween Battlers, temos um pedido!"
10033010-114 = "C-Como acho que só isso não explica tudo,#nvou contar desde o começo..."
10033010-115 = "Ok, entendi, entrem!"
10033010-116 = "Ela entendeu!?"
10033010-122 = "Sim, entendi mais ou menos!#nQuer dizer que o pessoal de Gehenna vem nos visitar, né!"
10033010-123 = "Como esperado da Kaede. Camarada Battler, uma ressonância de almas!#nÉ exatamente isso!"
10033010-124 = "N-Não é um problema tão simples assim, sabe!?"
10033010-125 = "Parece algo bem trabalhoso, mas é nessas horas que a gente tem que relaxar!"
10033010-126 = "A Tsubaki-senpai sempre diz que, em situações de emergência, se não ficarmos calmas,#nnão conseguimos pensar direito!"
10033010-127 = "É-É verdade...#nA propósito, onde estão a Tsubaki-senpai e a Mimori-senpai?"
10033010-129 = "Ah, bem... sobre isso..."
10033010-130 = "Aconteceu algo chocante com as duas!?"
10033010-131 = "A Mimori-senpai saiu para treinar..."
10033010-135 = "Treinar?"
10033010-136 = "O que quer dizer com isso...?"
10033010-137 = "Claro, treinar para se tornar uma Yamato Nadeshiko maravilhosa!"
10033010-138 = "......E-Entendo?"
10033010-139 = "A Mimori-senpai também precisa de um tempo para se encontrar..."
10033010-140 = "Por isso, nessas horas, eu evito perguntar para onde ela vai!"
10033010-142 = "Entendo!#nJustamente por confiar nos companheiros, você não faz muitas perguntas...!#nIsso é digno de um cavaleiro!"
10033010-144 = "S-Será?#nBom, talvez seja isso mesmo!"
10033010-145 = "E a Tsubaki-senpai...?"
10033010-146 = "A Tsubaki-senpai está... tirando uma soneca como sempre!#nQuer dizer, não, ela está treinando!"
10033010-147 = "E-Entendo. Fico aliviada que ela não tenha ido para longe nem nada do tipo."
10033010-148 = "Mas falando em viagem escolar, que legal.#nEu também queria ir!"
10033010-149 = "......Mas o que se faz exatamente em uma viagem escolar?"
10033010-150 = "Fina também não sabe!#nMas com certeza deve ser divertido!"
10033010-151 = "Pois é! Como esperado da Fina, você entende tudo!#nVou te dar um adesivo de nota dez!"
10033010-152 = "Muito obrigada!"
10033010-153 = "Bem...#nVoltando ao assunto, como somos nós que vamos receber a viagem escolar..."
10033010-154 = "Ah, é verdade!#nEntão, no fim das contas, no que eu posso ajudar?"
10033010-155 = "Fina não sabe!"
10033010-159 = "(Estou começando a ficar preocupada...)"
10033010-160 = "Umika, você está bem?#nSua expressão não está boa."
10033010-161 = "......É que eu não sei se vamos dar conta sozinhas."
10033010-162 = "Você está preocupada?"
10033010-163 = "É que eu, especialmente, sempre só ajudei a presidente...#na Shizuko-iinchou."
10033010-164 = "É a primeira vez que nos confiam um evento tão grande...#nEstou um pouco assustada."
10033010-165 = "Umika..."
10033010-167 = "Sinceramente, não tenho confiança... E você, Fina?"
10033010-168 = "Eu..."
10033010-170 = "Certo, PARE!!"
10033010-171 = "Kaede!?"
10033010-172 = "Se está em dúvida, aja primeiro!#nFicar deprimida não vai te levar a lugar nenhum, né!"
10033010-174 = "Porque uma dama realmente incrível não fica apenas esperando por um final feliz!"
10033010-176 = "……É verdade, Kaede!#nSe você quer algo, tem que conquistar com as próprias mãos! Essa é a regra de ouro dos filmes de yakuza!"
10033010-177 = "……É, você tem razão.#nEntão, vamos pensar em uma coisa de cada vez?"
10033010-178 = "Sim!#nEntão, hum, por onde começamos...?"
10033010-179 = "Pensar em uma coisa de cada vez, mas por onde começar...?"
10033010-180 = "……."
10033010-181 = "……."
10033010-182 = "Já eraaa!!!"
10033010-183 = "Ugh, nessas horas... se a presidente estivesse aqui!"
10033010-184 = "Presidente, me desculpe... sozinha eu realmente não consigo..."
10033010-185 = "Eu entrei em contato com o Sensei..."
10033010-187 = "Senpai!?"
10033010-188 = "Chefe Tsubaki!?#nDesde quando você está aí!?"
10033010-190 = "E o que significa \"entrar em contato com o Sensei\"!?"
10033010-191 = "Eu tive esse sonho durante o meu treino..."
10033010-193 = "Como esperado da Tsubaki-senpai!"
10033010-195 = "U-um sonho...?"
10033010-196 = "O Sensei com certeza vai nos ajudar..."
10033010-197 = "Então, boa noite..."
10033010-198 = "E-espere!#nO que você disse para o Sensei...!?"
10033010-200 = "Zzz..."
10033010-202 = "Ela dormiu!"
10033010-203 = "Será que ela não vai acordar até o Sensei chegar...!?"
10033010-204 = "Será que devemos continuar esperando o Sensei aqui...?"
10033010-205 = "……Tive uma ideia!"
10033010-207 = "Oh!?"
10033010-208 = "Que \"ideia\" seria essa...!?"
10033010-213 = "……Não tem jeito, vamos jogar Mushiking enquanto esperamos!"
10033010-214 = "Kaede~!?"
10033010-219 = "[ns1] \"Vim o mais rápido que pude...\"\n[ns2] \"Que grupo inusitado, não é?\""
10033010-222 = "Você veio, Sensei~!"
10033010-223 = "D-desculpe por fazer você vir até aqui...!"
10033010-224 = "[s] \"Não, está tudo bem. Mas, a viagem escolar de Gehenna...\""
10033010-242 = "S-Sensei!?"
10033010-243 = "Você está bem!? Tontura!?"
10033010-244 = "É-é por nossa causa que você está exausto...!?"
10033010-245 = "[s3] \"Não, a culpa não é dos alunos...\"\n[s4] \"Muito bem, já tomei minha decisão...!\""
10033010-248 = "Ele se levantou sozinho!"
10033010-249 = "[ns] \"Primeiro, por que não começamos pelo que é mais fácil?\""
10033010-250 = "O que é mais fácil...?"
10033010-254 = "Meu trabalho diário... a parte da papelada, talvez?"
10033010-255 = "V-verdade.#nNós nem começamos a processar isso ainda..."
10033010-256 = "Sem falar no plano geral, nos meios de transporte, nos arranjos das refeições... a lista de detalhes é interminável, mas..."
10033010-257 = "Não, não precisamos fazer tudo de uma vez. Podemos pedir ajuda ao Departamento Yin-Yang, e só de falar com eles já..."
10033010-258 = "Sinto que vai dar tudo certo...!"
10033010-259 = "Então eu vou... cuidar da divulgação!#nTenho que avisar o pessoal do centro comercial!"
10033010-260 = "Então eu sou a próxima!#nE a Tsubaki-senpai também!"
10033010-261 = "Ah, mas nós temos que fazer nossa patrulha de rotina... Espera. #nMas se for assim, talvez a gente possa servir de guia turístico durante a patrulha!?"
10033010-263 = "Sendo assim, Tsubaki-senpai! #nAcorda! O Clube de Treinamento vai entrar em ação!"
10033010-264 = "Uaa... mas eu ainda estou no meio do meu treino..."
10033010-265 = "Mas, mas, vai ser algo super divertido! #nTalvez se torne uma lembrança ainda melhor que um sonho!"
10033010-267 = "Pessoal..."
10033010-268 = "[ns5] \"Parece que vai dar tudo certo.\"\n[ns6] \"Vamos começar dando um passo de cada vez.\""
10033010-271 = "Só de o Sensei chegar, as coisas começaram a se mover aos poucos... #nComo esperado, você está acostumado com esse tipo de trabalho, não é!"
10033010-272 = "...Se, Sensei? Você está olhando para o nada... #nAh, sim, eu vou dar o meu melhor!"
10033010-273 = "..."
10033010-274 = "...Realmente, não posso usar a ausência da presidente como desculpa. #nNão posso ficar apenas me sentindo para baixo."
10033010-275 = "Não posso simplesmente não fazer nada, não conseguiria encarar a presidente... #nAlém disso, nós somos o Comitê Organizador do Festival!"
10033010-276 = "Oh, recarregou as energias?"
10033010-277 = "Agora estou aliviada, desu!"
10033010-279 = "Pessoal... Sensei..."
10033010-284 = "Eu ainda tenho muitas limitações... #ne desta vez a presidente não está aqui..."
10033010-285 = "...Ainda assim, farei o que estiver ao meu alcance. #nNão posso simplesmente ficar de braços cruzados."
10033010-286 = "Em nome do Comitê Organizador do Festival..."
10033010-287 = "O projeto de viagem escolar da Academia Gehenna... #nEu farei dele o melhor festival de todos!"
10033010-292 = "(Perdi o momento certo...)"
10033010-294 = "(Será que eu deveria ter dito...)"
10033010-296 = "[ns] (Uma viagem escolar não é exatamente um \"festival\", né...?)"
10033010-297 = "Zzz..."
