[translation]
10033010-1 = "第1話;公平で公正で良い感じの"
10033010-4 = "……。"
10033010-5 = "……。"
10033010-6 = "ニヤ様、つまりそれって……！？"
10033010-12 = "うん。#nゲヘナ学園の修学旅行プロジェクト in 百鬼夜行。"
10033010-13 = "その進行、ぜーんぶ「お祭り運営委員会」に任せようかな思て。"
10033010-14 = "あ、もちろん公平で公正でおもしろ――#n良い感じな協議の元に選ばれたんよ？"
10033010-16 = "ワオ！それは光栄デス！#n「良い感じな協議」という言葉が気になりマスが、#nそれはどういう……？"
10033010-17 = "ぐるぐるぽーん。"
10033010-18 = "ぐるぐる……え、もしかしてルーレットですか！？"
10033010-20 = "ご名答～♪#nしかも何と、チセお手製のスペシャルルーレット！"
10033010-21 = "ニヤ部長の御心のままにー。"
10033010-30 = "ウミカ！？大丈夫デスか！？"
10033010-34 = "い、いえ、光栄なのですが、今のタイミングは……。"
10033010-35 = "我らがトップ、シズコ委員長はトリニティへと出張中……！"
10033010-37 = "まぁ修学旅行もお祭りみたいなものですし、何とかなるんじゃない～？"
10033010-38 = "何せ、この私たちが選んだ委員会ですし。"
10033010-39 = "ルーレットだけどねー？"
10033010-40 = "ま、というわけでよろしくお願いしますね。#nお祭り運営委員会の皆さん♪"
10033010-41 = "そばで手助けはできませんけど、心だけは近くにおりますので～#nにゃははは。"
10033010-46 = "ま、待ってください！ニヤ様、ニヤ様！？"
10033010-47 = "通話、切れてしまいマシタ……#nどうしマス、ウミカ？"
10033010-48 = "うぅ、社長がいないこのタイミングで……。"
10033010-49 = "ま、まずは深呼吸を……。"
10033010-53 = "……落ち着いたら、余計不安になってきましたぁ……#nフィーナぁ、どうしましょう……。"
10033010-54 = "こ、断るというのも手だと思いマスよ！？#n潔いことは武士のホマレ！"
10033010-58 = "……ウミカ？"
10033010-59 = "……。"
10033010-60 = "……ありがとうございます、フィーナ。"
10033010-61 = "そう言ってくれたおかげで、逆に決心がつきました！"
10033010-62 = "ハイィ！？"
10033010-63 = "社長が居ないから……#nいつまでもそう言っているわけにはいきません！#n私たちは、お祭り運営委員会なのですから！"
10033010-64 = "おぉ、ウミカ流石デス！#nやってやりマショウ、例え委員長が居なくても……！"
10033010-65 = "……。"
10033010-66 = "そう言われると、また不安になってきましたぁ……#nうぅ、社長、早めに戻ってきてください～！"
10033010-69 = "心機一転、ウミカ復活です！#nさぁお祭りの時間ですよ！"
10033010-70 = "やるからには徹底的に、#n家を出て帰るまでの全てをお祭り騒ぎにしましょう！"
10033010-71 = "それは大いに賛成デス！#nところで、予算はどうしマショウ？"
10033010-72 = "フィーナが何かを言う度、#n委員長はいつも予算のことを気にしていマシタ！"
10033010-73 = "うぅ、確かに……！#nとなると、やり過ぎは禁物……。"
10033010-74 = "ではフィーナから提案デス！修学旅行といえば、やはり友情！#n一度きりの青春の思い出！となれば……！"
10033010-75 = "義理と人情に満ちた、映画村での任侠体験漬けというのは！？"
10033010-76 = "そ、それは熱いですが、修学旅行とは何かがズレているような……！？"
10033010-77 = "くっ、万策尽きマシタ……！#nあとはウミカに託しマス！"
10033010-78 = "は、早いですね……#nうぅ、ですが他に、何か良いアイディアは……。"
10033010-79 = "……！"
10033010-80 = "その顔は……！#n何か閃きましたか！？"
10033010-82 = "やはり困った時には仲間デス！#n必要なのは義理と人情、そして頭数！"
10033010-88 = "ちょっ、待ってくださいフィーナ！#n置いていかないでぇ！"
10033010-95 = "ここは……修行部？"
10033010-96 = "イエス！持つべきものは友、昨日の仲間も今日の仲間！#n困ったら助けてくれるはずデス！"
10033010-97 = "た、確かに交流はありますが……！"
10033010-98 = "（だ、大丈夫なのかな。急に来ちゃって、何のプランも立ってない状態で押しかけて……）"
10033010-99 = "も、もう少し相談内容を練ってからの方が良いんじゃないでしょうか？#nほら、今日は居ないかもしれないし……。"
10033010-100 = "確かに、不在の可能性も――"
10033010-105 = "あれ、どしたの？"
10033010-106 = "全然いますね！？！？"
10033010-107 = "いたら困るんデスか？"
10033010-108 = "珍しいね、二人でどうしたの？"
10033010-112 = "同じムシクイーンバトラーとして、お願いがあるんデス！"
10033010-114 = "こ、これだけでは伝わらないと思うので、#n順を追って話しますと……。"
10033010-115 = "オッケー分かった、中に入って！"
10033010-116 = "伝わった！？"
10033010-122 = "うん、だいたい分かった！#nつまりゲヘナのみんなが遊びに来るんだね！"
10033010-123 = "流石はカエデ。バトラー同志、魂の共鳴デス！#nその通りデス！"
10033010-124 = "そ、そんな簡単な問題じゃないですよ！？"
10033010-125 = "なんだか大変そうだけど、こういう時こそリラックスだよ！"
10033010-126 = "緊急時こそ落ち着かないと、#n頭も回らないってツバキ先輩も言ってたし！"
10033010-127 = "そ、そうですね……#nところで、そのツバキ先輩とミモリ先輩はどちらに？"
10033010-129 = "あ、あぁー……その……。"
10033010-130 = "二人に何か、衝撃の展開が！？"
10033010-131 = "ミモリ先輩はね、修行で出かけちゃってて……。"
10033010-135 = "修行？"
10033010-136 = "と言いますと……？"
10033010-137 = "もちろん、素敵な大和撫子になるため修行！"
10033010-138 = "……な、なるほど？"
10033010-139 = "ミモリ先輩も、時には自分と向き合う時間が必要……。"
10033010-140 = "だからこういう時は、行き先を聞かないようにしてるの！"
10033010-142 = "ナルホド！#n仲間を信頼しているからこそ、多くは聞かない姿勢……！#n任侠デスね！"
10033010-144 = "そ、そうなのかな？#nまぁそうかも！"
10033010-145 = "では、ツバキ先輩は……？"
10033010-146 = "ツバキ先輩は……いつも通りお昼寝中！#nじゃなかった、修行中！"
10033010-147 = "そ、そうでしたか。#n遠くに行ってしまったとかではなくて、良かったです。"
10033010-148 = "それにしても修学旅行か、良いなー。#n私も行ってみたい！"
10033010-149 = "……でも修学旅行って、具体的には何するの？"
10033010-150 = "フィーナも分かりマセン！#nデスがきっと楽しいハズ！"
10033010-151 = "だよねー！さっすがフィーナわかってるぅ！#n花丸シールあげちゃう！"
10033010-152 = "ありがとうございマス！"
10033010-153 = "えぇっと……#n話を戻すのですが、今回は修学旅行を受け入れる側なので……。"
10033010-154 = "あ、そうだった！#nで、結局何を手伝ったら良いのかな？"
10033010-155 = "フィーナは分かりマセン！"
10033010-159 = "（不安になってきたぁ……）"
10033010-160 = "ウミカ、大丈夫デスか？#n顔色が良くないデス。"
10033010-161 = "……私たちだけで、大丈夫かなあって。"
10033010-162 = "心配なのデスか？"
10033010-163 = "特に私は、いつも社長の……#nシズコ委員長の、手伝いしかしてこなかったから。"
10033010-164 = "初めてなのに、こんな大きなイベントを任されちゃって……#nちょっと、怖いなぁって。"
10033010-165 = "ウミカ……。"
10033010-167 = "正直、自信無いんです……フィーナはどうですか？"
10033010-168 = "ワタシは――"
10033010-170 = "はいストーーップ！！"
10033010-171 = "カエデ！？"
10033010-172 = "迷ったらまず行動！#n落ち込んでても進まないでしょ！"
10033010-174 = "だって本当に素敵なレディーは、#nハッピーエンドをただ待ってるだけじゃないから！"
10033010-176 = "……そうデスね、カエデ！#n欲しいものなら、絶対にこの手で！任侠映画の鉄則デス！"
10033010-177 = "……そう、ですね。#nじゃあ、一つひとつ考えていきましょうか？"
10033010-178 = "うん！#nじゃあ、えっと、まずは……？"
10033010-179 = "一つひとつって、何から考え始めれば……？"
10033010-180 = "……。"
10033010-181 = "……。"
10033010-182 = "終わりだああぁぁ！！！"
10033010-183 = "ウゥッ、こういう時……委員長がいれば！"
10033010-184 = "社長、ごめんなさいぃ……私だけではやっぱり……。"
10033010-185 = "先生に、連絡したよー……。"
10033010-187 = "先輩！？"
10033010-188 = "ツバキ部長！？#n一体いつから！？"
10033010-190 = "して、「センセイに連絡」とは！？"
10033010-191 = "修行中に、そういう夢を見て……。"
10033010-193 = "さっすがツバキ先輩！"
10033010-195 = "ゆ、夢……？"
10033010-196 = "先生ならきっと、助けてくれるはず……。"
10033010-197 = "じゃあ、お休み……。"
10033010-198 = "ま、待ってください！#n先生には何と……！？"
10033010-200 = "ぐぅ……。"
10033010-202 = "寝てしまいマシタ！"
10033010-203 = "これはもう、先生が来るまで目覚めないんじゃ……！？"
10033010-204 = "このままここで、先生を待っていて良いのでしょうか……？"
10033010-205 = "……良いこと思いついた！"
10033010-207 = "おお！？"
10033010-208 = "「良いこと」とは……！？"
10033010-213 = "……どうしようもないから、ムシクイーンでもして待ってよう！"
10033010-214 = "カエデ～！？"
10033010-219 = "[ns1] \"急いで来てみたものの……。\"\n[ns2] \"珍しいメンバーだね？\""
10033010-222 = "待ってたよー、先生～！"
10033010-223 = "す、すみません、わざわざお越しいただき……！"
10033010-224 = "[s] \"ううん、大丈夫。にしても、ゲヘナの修学旅行……。\""
10033010-242 = "せ、センセイ！？"
10033010-243 = "大丈夫！？立ち眩み！？"
10033010-244 = "や、やっぱり私たちのせいで疲労が……！？"
10033010-245 = "[s3] \"いや、生徒に罪は無いから……。\"\n[s4] \"よし、覚悟は決まった……！\""
10033010-248 = "一人で立ち上がった！"
10033010-249 = "[ns] \"まずは、やりやすいことから始めない？\""
10033010-250 = "やりやすいこと……？"
10033010-254 = "私の普段の作業……書類周り、でしょうか？"
10033010-255 = "た、確かに。#nそれすらもまだ処理してないので……。"
10033010-256 = "全体の計画書はもちろんのこと、移動手段や食事の手配やら、細かいものを挙げるとキリがありませんが……。"
10033010-257 = "いえ、今回は全部やる必要はありませんね。#n陰陽部の助けも借りられますし、話を通していただくだけでも……。"
10033010-258 = "な、何とかなる気がしてきました……！"
10033010-259 = "ならワタシは……広報をやりマス！#n商店街の皆さんに、知らせてこなくては！"
10033010-260 = "じゃあ次は私！#nあとツバキ先輩も！"
10033010-261 = "あ、でも私たち普段のパトロールしなきゃ……あれ。#nでもそれなら、パトロールついでに観光案内できちゃうかも！？"
10033010-263 = "そうとなればツバキ先輩！#n起きて！修行部出動だよ～！"
10033010-264 = "ふぁ……まだ修行の途中なのに……。"
10033010-265 = "でもでも、すっごい楽しいことになりそうだよ！#n夢よりも夢みたいな思い出になるかも！"
10033010-267 = "皆さん……。"
10033010-268 = "[ns5] \"大丈夫そうだね。\"\n[ns6] \"まずは一歩ずつやっていこう。\""
10033010-271 = "先生が来ただけで、少しずつ動き出して……#n流石です、こういうお仕事も慣れているんですね！"
10033010-272 = "……せ、先生？何か遠くを見つめられていますが……#nえ、あ、はい頑張ります！"
10033010-273 = "……。"
10033010-274 = "……やっぱり、社長がいないからと言い訳はできません。#n落ち込んでばかりでもいられません。"
10033010-275 = "このまま何もしないなんて、社長に顔向けができませんし……#n私たちだって、お祭り運営委員会なんですから！"
10033010-276 = "お、元気チャージできた？"
10033010-277 = "これでひと安心、デス！"
10033010-279 = "皆さん……先生……。"
10033010-284 = "私は、できないことも沢山ですし……#n今回社長はいませんが……。"
10033010-285 = "……それでも、やれることをやります。#n何もしないなんてことはできません。"
10033010-286 = "お祭り運営委員会の名にかけて……。"
10033010-287 = "ゲヘナ学園の修学旅行プロジェクトを……#n絶対に、最高のお祭りにしてみせます！"
10033010-292 = "（タイミング、失っちゃったなぁ……）"
10033010-294 = "（言うべきだったのデショウか……）"
10033010-296 = "[ns] （修学旅行は、「お祭り」じゃないような……？）"
10033010-297 = "Zzz……。"
