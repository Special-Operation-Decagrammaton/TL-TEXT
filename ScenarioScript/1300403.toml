[translation]
1300403-1 = "清掃の時間です"
1300403-2 = "対策委員会・教室"
1300403-11 = "（一生懸命に教室の掃除をしているノノミを発見した）"
1300403-12 = "あれ？先生？"
1300403-13 = "わあ～本当に来てくださったんですね！"
1300403-14 = "うーん……でもちょっと来られたのが早すぎたといいますか……ちょうど今掃除を始めたばかりなんです。"
1300403-15 = "3時間後くらいに来ていただければ、その頃には綺麗になっているかと思いますが……どうしましょう？"
1300403-16 = "[s] \"大掃除なのにどうして一人なの？\""
1300403-17 = "えっと、みんな週末はアルバイトだったり、図書館へ行ったり、忙しいので仕方ないんです。"
1300403-18 = "学校の借金を返す時間も足りないのに、自分の勉強もと思うと、みんな体が二つあっても足りないので…… 。"
1300403-19 = "なので、大掃除はずっと私がやっています。"
1300403-20 = "うんうん！私がやりたくてやっているので、大丈夫です。みんなのための空間ですから！"
1300403-21 = "衛生的で綺麗じゃないと、みんな元気に学校に通えないので！"
1300403-22 = "それでは先生、3時間後くらいにまた来てくださいますか？その時は掃除も終わってそうです。"
1300403-23 = "[s1] \"私も手伝うよ。\"\n[s2] \"一緒に掃除しよう。\""
1300403-24 = "えっと、でも……大人の方に掃除をお願いしてしまっても良いのでしょうか？"
1300403-25 = "えっと、でも……大人の方に掃除をお願いしてしまっても良いのでしょうか？"
1300403-27 = "……うんうん！先生ですもんね。"
1300403-29 = "ありがとうございます。これ、ちり取りです！"
1300403-31 = "（ノノミと一緒に、一生懸命掃除をした）"
1300403-33 = "わあ！本当に綺麗になりましたね！"
1300403-34 = "うんうん！二人でやるとずっと早く終わりますね。"
1300403-35 = "いつもの掃除の時とは違って、なんだかよりやりがいを感じました……。"
1300403-36 = "先生と一緒に、だったからでしょうか？"
1300403-38 = "（綺麗になった教室でノノミとおしゃべりをして、暗くなる頃に戻ってきた）"
