[translation]
1300403-1 = "É hora da limpeza."
1300403-2 = "Comitê de Contramedidas - Sala de Aula"
1300403-11 = "（Encontrei a Nonomi limpando a sala de aula com muito esforço）"
1300403-12 = "Ah? Sensei?"
1300403-13 = "Uau~ Você realmente veio!"
1300403-14 = "Hmm... mas você chegou um pouco cedo demais... eu acabei de começar a limpeza agora mesmo."
1300403-15 = "Se você pudesse voltar daqui a umas 3 horas, acho que já estaria tudo limpo... o que acha?"
1300403-16 = "[s] \"Por que você está fazendo a faxina sozinha?\""
1300403-17 = "Bem, as outras estão ocupadas no fim de semana com trabalhos de meio período ou indo à biblioteca, então não tem jeito."
1300403-18 = "Já não temos tempo suficiente para pagar as dívidas da escola, e com os estudos também, não daria nem se tivéssemos dois corpos..."
1300403-19 = "Por isso, a faxina pesada sempre fica por minha conta."
1300403-20 = "Sim, sim! Eu faço porque quero, então está tudo bem. É um espaço para todas nós!"
1300403-21 = "Se não estiver higiênico e limpo, as outras não conseguirão vir à escola com disposição!"
1300403-22 = "Então, Sensei, você poderia voltar daqui a umas 3 horas? Acho que a limpeza já terá terminado."
1300403-23 = "[s1] \"Eu também vou ajudar.\"\n[s2] \"Vamos limpar juntos.\""
1300403-24 = "Bem, mas... será que está tudo bem pedir para um adulto ajudar com a limpeza?"
1300403-25 = "Bem, mas... será que está tudo bem pedir para um adulto ajudar com a limpeza?"
1300403-27 = "...Sim, sim! Afinal, você é o Sensei."
1300403-29 = "Muito obrigada. Aqui, pegue a pá de lixo!"
1300403-31 = "（Limpei a sala com muito esforço junto com a Nonomi）"
1300403-33 = "Uau! Ficou realmente limpo!"
1300403-34 = "Sim, sim! Quando fazemos em dois, termina muito mais rápido."
1300403-35 = "Diferente das limpezas de sempre, sinto que valeu muito mais a pena..."
1300403-36 = "Será que é porque foi junto com o Sensei?"
1300403-38 = "（Conversei com a Nonomi na sala de aula limpa e voltei quando já estava escurecendo）"
