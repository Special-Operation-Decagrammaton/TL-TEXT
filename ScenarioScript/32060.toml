[translation]
32060-1 = "Episódio 6: Grande Bagunça à Meia-Noite (2)"
32060-2 = "……Sociedade Gourmet？"
32060-3 = "Aliás senpai, onde você tá agora？ Se não der uma ordem logo, a Tsurugi-senpai vai disparar… quer dizer, vai sair voando."
32060-4 = "P-para a Tsurugi por enquanto！ Eu tô… fora resolvendo um assunto particular…"
32060-5 = "Não dá, senpai. Só você consegue segurar ela direito…"
32060-6 = "Ah, Tsurugi-senpai！ Não vai！ E aquilo não é porta, é parede——"
32060-11 = "Ah…… então a gente também vai atrás e entra em ação."
32060-12 = "（Pi）"
32060-13 = "……。"
32060-18 = "Tá perto. Pelo barulho da explosão, deve ser a menos de 1km daqui."
32060-19 = "Eh, ehh……！？"
32060-20 = "……Todo mundo."
32060-21 = "Desculpa o repentino, mas preciso da força de vocês. Posso contar com isso？"
32060-22 = "Agora que o Tratado de Eden tá quase sendo assinado, o clima tá bem sensível. Se isso for visto de fora como «conflito entre o Comitê de Execução da Justiça de Trinity e Gehenna», a situação vai ficar bem ruim."
32060-23 = "Ou seja, o ideal é que o Clube de Reforço e a «Schale» resolvam isso juntos…… Sensei, posso contar com você……？"
32060-24 = "[s] \"Sim. Beleza, Clube de Reforço, todo mundo em ação.\""
32060-26 = "Entendido. Vou seguir as ordens do Sensei."
32060-27 = "Eh！？ D-de repente vamos pra combate……！？ A-auuu……"
32060-28 = "Fufu…… bom, se o Sensei tá dizendo♡"
32060-32 = "Ah, e-eu também……？ Com o Sensei…… e a Hasumi-senpai, juntos……？"
32060-33 = "Eu imaginava que um dia íamos lutar lado a lado, mas… veio mais cedo do que eu esperava, Koharu."
32060-34 = "S-sim！ Vou me esforçar……！"
32060-35 = "Aliás, lutar de verdade sob o comando do Sensei é a primeira vez. Não precisa ter cerimônia. Pode me usar o quanto quiser."
32060-36 = "Ara ara……♡"
32060-37 = "[s] \"Então, segurança em primeiro lugar.\""