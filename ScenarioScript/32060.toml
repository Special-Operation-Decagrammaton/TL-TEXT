[translation]
32060-1 = "Episódio 6;A Grande Confusão da Meia-Noite (2)"
32060-2 = "……Clube de Pesquisa Gastronômica?"
32060-3 = "Aliás, veterana, onde você tá agora? Se você não der a ordem logo, do jeito que tá a veterana Tsurugi vai disparar…… quer dizer, vai sair voando."
32060-4 = "A-a Tsurugi, por ora, segurem, por favor. Eu tô, é, num assunto particular, um pouquinho pra fora……."
32060-5 = "Ié, impossível, viu. Fora a veterana Hasumi, não é qualquer um que consegue seg――"
32060-6 = "Ah, veterana Tsurugi! Não vai, por favor! E aí não é porta, é parede――"
32060-11 = "Ah…… por ora, a gente também vai atrás e sai pra combater, tá."
32060-12 = "(bip)"
32060-13 = "……."
32060-18 = "Tá perto. Pelo som da explosão, é num lugar a menos de 1 km daqui."
32060-19 = "H-hãã……!?"
32060-20 = "……Pessoal."
32060-21 = "Desculpem a coisa repentina, mas eu preciso da força de vocês. Será que dá pra pedir?"
32060-22 = "Agora, às vésperas do Tratado do Éden, é um período delicado em vários sentidos. Se este problema for visto de fora como \"um choque entre o Comitê de Realização da Justiça de Trinity e Gehenna\", não é difícil imaginar que a situação fica desfavorável."
32060-23 = "Ou seja, é desejável que o Clube de Aulas de Reforço e a \"Schale\" resolvam juntos…… uma configuração dessas. Sensei, será que dá pra pedir……?"
32060-24 = "[s] \"Sim. Muito bem, então, pessoal do Clube de Aulas de Reforço, vamos.\""
32060-26 = "Entendido. Sigo as instruções do Sensei."
32060-27 = "Hãã!? C-combate de repente……!? A-auu……."
32060-28 = "Ufu…… bom, se o Sensei diz isso♡"
32060-32 = "Ah, e-eu também……? Junto com o Sensei…… e com a veterana Hasumi……?"
32060-33 = "Eu já imaginava que um dia chegaria a hora de a gente lutar lado a lado assim…… mas foi mais rápido do que eu pensava, Koharu."
32060-34 = "S-sim! Vou me esforçar……!"
32060-35 = "Aliás, é a primeira vez que a gente luta direitinho sob o comando do Sensei, né. Não precisa de cerimônia, Sensei. Pode me usar à vontade."
32060-36 = "Ora, ora……♡"
32060-37 = "[s] \"Então, segurança em primeiro lugar.\""
