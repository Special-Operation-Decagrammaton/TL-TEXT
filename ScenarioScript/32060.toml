[translation]
32060-1 = "Episódio 6: Confusão da Meia-Noite (2)"
32060-2 = "……Clube de Pesquisa Gastronômica?"
32060-3 = "Aliás, senpai, onde você está agora? Se não nos der ordens logo, a Tsurugi-senpai vai acabar disparando... quer dizer, saindo voando daqui a pouco."
32060-4 = "P-por favor, tente parar a Tsurugi. Eu estou, bem, tratando de assuntos pessoais fora daqui..."
32060-5 = "Ah, não dá não. Tirando a Hasumi-senpai, não tem ninguém que consiga parar el..."
32060-6 = "Ah, Tsurugi-senpai! Não vá! E aquilo ali é uma parede, não uma porta—"
32060-11 = "Ah... bom, vamos segui-la e entrar em ação também."
32060-12 = "(Bip)"
32060-13 = "……."
32060-18 = "Está perto. Pelo som da explosão, deve ser a menos de 1km daqui."
32060-19 = "E-eh...!?"
32060-20 = "……Pessoal."
32060-21 = "Desculpem pela repentina solicitação, mas preciso da ajuda de vocês. Poderiam me fazer esse favor?"
32060-22 = "Estamos em um período muito sensível, com o Tratado de Eden prestes a acontecer. Se esse problema for visto de fora como um \"conflito entre o Comitê de Justiça de Trinity e Gehenna\", não é difícil imaginar que a situação se tornará desfavorável para nós."
32060-23 = "Em outras palavras, seria ideal que o Clube de Estudos Corretivos e o \"Schale\" resolvessem isso juntos. Sensei, poderia nos ajudar...?"
32060-24 = "[s] \"Sim. Certo, então o Clube de Estudos Corretivos, vamos partir.\""
32060-26 = "Entendido. Seguirei as instruções do Sensei."
32060-27 = "Eeh!? C-combate logo de cara...!? A-auuu..."
32060-28 = "Fufu... bem, se é o que o Sensei deseja♡"
32060-32 = "Ah, e-eu também...? Com o Sensei... e a Hasumi-senpai, juntos...?"
32060-33 = "Eu sabia que um dia chegaria o momento de lutarmos lado a lado... mas foi mais cedo do que imaginei, Koharu."
32060-34 = "S-sim! Vou dar o meu melhor...!"
32060-35 = "Pensando bem, é a primeira vez que lutaremos sob o comando direto do Sensei. Não precisa se conter, Sensei. Pode me usar como quiser."
32060-36 = "Ora, ora...♡"
32060-37 = "[s] \"Então, segurança em primeiro lugar.\""
