[translation]
1004302-1 = "Apenas por você"
1004302-2 = "（A mudança real de estação chegou, e várias tarefas relacionadas ao verão começaram a surgir no Schale）"
1004302-6 = "[ns] \"Será por causa do verão? Sinto que há muitos trabalhos relacionados a festivais...\""
1004302-10 = "（Pedidos de cooperação dos moradores para o festival de fogos de artifício local, os preparativos para isso... e a verificação de segurança de vários equipamentos usados no festival, etc...）"
1004302-11 = "（Foi quando eu estava processando apressadamente essas tarefas que chegaram ao Schale）"
1004302-15 = "[ns1] \"Já é hora do almoço...?\"\n[ns2] \"Talvez eu deva ir comprar algo para comer.\""
1004302-22 = "[ns] \"...Hm? A entrada está barulhenta, será que aconteceu alguma coisa...?\""
1004302-24 = "Estar de roupa de banho bem no meio da rua..."
1004302-25 = "Será que estão gravando algum drama?"
1004302-26 = "Mas não vejo câmeras nem equipe... pensando bem, aqui é a frente do escritório do Schale... isso significa."
1004302-27 = "Será que... ela foi chamada pelo Sensei do Schale?"
1004302-28 = "Nossa... o Sensei do Schale tem esse tipo de gosto...?"
1004302-29 = "[s3] \"É um mal-entendido!\"\n[s4] \"Por que a Wakamo está aqui...!?\""
1004302-34 = "Ah...! Sensei...!"
1004302-41 = "Ufufu... eu estava esperando por você."
1004302-42 = "[s5] \"Wakamo... por que você está de roupa de banho...!?\"\n[s6] \"Eu fiz algo de errado para a Wakamo...?\""
1004302-43 = "Eh...?"
1004302-44 = "Eh...?"
1004302-45 = "Não, eu apenas..."
1004302-46 = "Um dia maravilhoso de pleno verão como este..."
1004302-47 = "Um dia tão adorável que parece que vai queimar meu corpo e minha alma, e ouvi dizer que você ficaria no escritório o tempo todo... não consegui ficar parada..."
1004302-48 = "[s] \"Não conseguiu ficar parada...?\""
1004302-49 = "Sim. Desde que nos conhecemos, este é o primeiro verão que conseguimos passar juntos. Para mim, este momento é tão especial..."
1004302-50 = "Deixar você sozinho no escritório... eu, Wakamo, não posso permitir isso."
1004302-51 = "O tempo é sempre limitado. Se esta estação passar em vão, terei que esperar um ano inteiro até o próximo verão."
1004302-55 = "...Claro, contar os dias para a estação também tem seu charme... mas."
1004302-56 = "Mesmo assim, se ainda posso alcançar você desta forma..."
1004302-57 = "Não posso simplesmente desperdiçar esta estação sem fazer nada."
1004302-58 = "Quero que o tempo que passamos juntos seja brilhante a cada segundo."
1004302-59 = "Desejando que este dia se torne uma lembrança inesquecível para você..."
1004302-60 = "Sim. Engolindo minha vergonha... desta forma ♡"
1004302-61 = "[s] \"Bem... então, o motivo de você estar de roupa de banho é...\""
1004302-62 = "Ufufu... sim. Pensei em presentear você com uma lembrança inesquecível de verão♪"
1004302-63 = "[s] \"Uma lembrança inesquecível de verão...\""
1004302-64 = "Sim... o que acha desta roupa de banho? Não é digna de uma lembrança de verão?"
1004302-65 = "Pensei muito e escolhi uma peça que fosse do seu agrado ♡ Por favor, adoraria ouvir o que você tem a dizer ♡"
1004302-66 = "[s] \"Ah, sim... está muito bonita. Combina muito com você, Wakamo.\""
1004302-70 = "Ah...!?"
1004302-71 = "[s] \"...Wakamo?\""
1004302-72 = "Ah, ah... as palavras que você diz, essa voz doce."
1004302-73 = "N-não pode ser... se você me disser coisas assim, eu já..."
1004302-77 = "...O Sensei tem um bom gosto, não é?"
1004302-78 = "Nossa, nossa..."
1004302-79 = "[s7] \"Eu disse que é um mal-entendido!\"\n[s8] \"Wakamo, vamos mudar de lugar por enquanto!\""
1004302-80 = "S-sim...!?"
1004302-81 = "S-sim...!?"
1004302-87 = "（Antes que o alvoroço aumentasse, decidi levar a Wakamo para a sala de descanso do Schale）"
1004302-95 = "Você me trouxe para o Schale com um rosto tão desesperado..."
1004302-101 = "O desejo de observar esse seu rosto de perto está crescendo..."
1004302-102 = "Ufufu... será que tudo isso é graças ao fato de você ter compreendido meus sentimentos de coração...?"
1004302-103 = "[s] \"Sim, eu entendo o sentimento de que a Wakamo está pensando em mim... em vários sentidos.\""
1004302-104 = "Ah, estou tão feliz..."
1004302-110 = "Ufufu, então, o que faremos a partir de agora...?"
1004302-111 = "Para que este dia se torne a \"memória de verão perfeita para você\", por favor, me diga o que posso fazer para ajudar."
1004302-112 = "Eu, Wakamo, atenderei a qualquer pedido seu, se for para o seu bem."
1004302-113 = "[s] \"Ah, então é por pedido?\""
1004302-114 = "Sim... pensei em preparar algo por conta própria para não incomodá-lo, mas..."
1004302-115 = "Eu não tinha certeza se conseguiria criar a \"memória de verão perfeita para você\"..."
1004302-116 = "Já que finalmente conseguimos nos encontrar, eu hesitei porque queria que você tivesse a melhor memória possível..."
1004302-117 = "Ah..."
1004302-118 = "Eu sou tão inútil, não tenho como me desculpar..."
1004302-119 = "[s9] \"Não, na verdade, fico muito feliz que você tenha pensado tanto nisso.\"\n[s10] (Se a Wakamo planejar algo, não sei o que pode acontecer...)"
1004302-120 = "Fico feliz em ouvir isso, mas..."
1004302-121 = "Fico feliz em ouvir isso, mas..."
1004302-122 = "Bem, então... qual é o seu desejo? Pode me pedir qualquer coisa♡"
1004302-123 = "[s] \"Memória de um dia de verão... que tal comer raspadinha?\""
1004302-124 = "Raspadinha...?"
1004302-125 = "Entendo... sim, compreendido."
1004302-126 = "Certamente... uma raspadinha saboreada com você será uma iguaria suprema... sim."
1004302-127 = "Ao compartilharmos a raspadinha, o sabor agridoce se espalhando na ponta da língua e... a dor doce que virá lentamente."
1004302-128 = "...Você certamente suavizará o olhar, fará piadas e cuidará de mim enquanto eu estiver confusa com essa dor... ufufu."
1004302-129 = "[s11] \"É, pois é...?\"\n[s12] (Será que ela está delirando?)"
1004302-130 = "Sim... e, no caminho para cá, eu encontrei algo interessante."
1004302-131 = "Sim... e, no caminho para cá, eu encontrei algo interessante."
1004302-132 = "[s] \"Uma barraca de raspadinha famosa ou algo assim?\""
1004302-133 = "Não, não é uma barraca de raspadinha, mas... no caminho, vi este evento."
1004302-137 = "(O que a Wakamo me mostrou no celular eram informações sobre um evento acontecendo nas redondezas.)"
1004302-138 = "(Lá estava...)"
1004302-139 = "[s] \"'Show de Esculturas de Neve Eterna de Red Winter'...?\""
1004302-140 = "Sim, dizem que estão exibindo esculturas feitas com um gelo especial trazido da Academia Red Winter."
1004302-141 = "Dizem que uma escultura em particular, que expressa dignidade através de um bigode, é famosa..."
1004302-142 = "[s] \"Bem, e o que isso tem a ver com a raspadinha...?\""
1004302-143 = "As estátuas em exibição são feitas de gelo natural de uma região ao norte que não derrete nem no auge do verão."
1004302-144 = "Se for assim, se pudermos raspar uma parte dessa escultura de gelo para fazer a raspadinha..."
1004302-145 = "Deveríamos conseguir fazer uma raspadinha especial, digna de colorir o seu melhor dia...!"
1004302-146 = "[s] \"P-pare! Vamos esquecer a raspadinha!\""
1004302-147 = "Não pode...?"
1004302-148 = "Ah, entendo. Higienicamente falando, não é muito limpo, não é mesmo."
1004302-149 = "Eu, Wakamo, estava tão ansiosa para preparar uma raspadinha especial para você que..."
1004302-150 = "Acabei ignorando o óbvio. Peço perdão."
1004302-151 = "[s] \"...Que tal brincar na água?\""
1004302-152 = "Brincar na água... é?"
1004302-153 = "Entendo... é uma atividade maravilhosa e indispensável no verão, e é um convite que combina com trajes de banho, mas..."
1004302-154 = "Será que há piscinas infláveis entre os suprimentos do Schale? Eu, Wakamo, não me lembro..."
1004302-155 = "Nesse caso, onde exatamente brincaríamos na água..."
1004302-159 = "...Eu entendi."
1004302-160 = "Suas palavras sempre me dão novas percepções, não é mesmo?"
1004302-161 = "[s] \"Não tinha um significado profundo... mas, entendeu o quê!?\""
1004302-162 = "Ufufu... você às vezes é maldoso."
1004302-163 = "Você está me testando, não é?"
1004302-164 = "Até esse seu lado é adorável... mas, sim. Eu, Wakamo, consigo ver através de tudo o que diz respeito a você."
1004302-165 = "Havia uma caixa d'água no topo deste prédio, não havia?"
1004302-166 = "[s] \"Tem, mas... por que isso?\""
1004302-167 = "Se eu explodi-la, o prédio inteiro será inundado e..."
1004302-168 = "Poderemos brincar na água sem precisar preparar uma piscina... é isso que você quer dizer, não é?"
1004302-169 = "[s13] \"É difícil recusar quando você me olha com esses olhos tão inocentes...\"\n[s14] \"Não é essa a intenção...! Desculpe, pare com isso também!\""
1004302-172 = "É... assim?"
1004302-173 = "É complicado, não é..."
1004302-175 = "(Depois disso, continuei discutindo com Wakamo o plano para criar a \"memória de verão perfeita\"...)"
1004302-178 = "Observar vaga-lumes... a visão de faíscas brilhantes dançando..."
1004302-179 = "Ufufu, pode deixar comigo."
1004302-183 = "Eu, Wakamo, se for só isso...!"
1004302-184 = "Hã? Você quer que eu pare...?"
1004302-185 = "...Nesse caso,"
1004302-186 = "Eu, Wakamo, vou varrer tudo para longe..."
1004302-187 = "Não pode?"
1004302-190 = "Ah, é difícil... o que eu deveria fazer..."
1004302-191 = "Mas, ao pensar que tudo isso é um esforço que você e eu estamos fazendo pelo mesmo sonho..."
1004302-192 = "A felicidade que vem do fundo do meu coração..."
1004302-193 = "Ah, parece que vai transbordar♡"
1004302-194 = "[s] \"É, é isso mesmo...!\""
1004302-195 = "(Enquanto eu continuava quebrando a cabeça diante de uma Wakamo que, não importa a sugestão, sempre respondia com soluções completamente fora da realidade...)"
1004302-200 = "(Uma ideia surgiu de repente)"
1004302-201 = "[s] \"...Falando nisso, tem uma coisa que eu quero fazer com a Wakamo.\""
1004302-202 = "Hã...?"
1004302-206 = "Este lugar é... onde você costuma trabalhar..."
1004302-207 = "Sozinhos neste lugar... o que exatamente..."
1004302-211 = "...Ah!"
1004302-212 = "Ufufufu... um verão especial, a sós, longe dos olhos de outras pessoas..."
1004302-213 = "Sim, eu, Wakamo, já estou preparada mentalmente há muito tempo."
1004302-214 = "Vamos, pode me pedir o que quiser..."
1004302-220 = "Meu... querido♡"
1004302-221 = "(Uma medida desesperada para fazer a Wakamo, que sai do controle com qualquer sugestão, ficar quieta...)"
1004302-224 = "[ns] \"É... passar o dia de verão atolado de trabalho!\""
1004302-228 = "............Hã?"
1004302-229 = "[s15] \"É reunir amigos próximos no verão para fazer um intensivão de trabalho.\"\n[s16] \"Como tenho muito trabalho acumulado, pensei em fazermos isso juntos.\""
1004302-232 = "Hã? Isso... hã."
1004302-233 = "Sério, fazer algo assim... está tudo bem?"
1004302-234 = "Isso realmente se tornará a \"memória de verão perfeita para você\"...?"
1004302-235 = "[s] \"Claro. O que importa é fazer isso a sós com a Wakamo!\""
1004302-239 = "A sós, a s-s-sós comigo..."
1004302-240 = "Sim... sim! Se é isso que você deseja...!"
1004302-246 = "Ufufu♡"
1004302-248 = "(De alguma forma, consegui criar a \"memória de verão perfeita\" com a Wakamo)"
