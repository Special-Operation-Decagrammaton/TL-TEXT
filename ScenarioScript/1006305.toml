[translation]
1006305-1 = "パンドラの箱（２）"
1006305-8 = "くくくっ……いくら先生でも、この時間なら……。"
1006305-11 = "誰にも私を止めることはできない……！#n先生の隠してる秘密、ちょちょ～っと覗いちゃいましょうか。"
1006305-16 = "ふむふむ……どれどれ……。"
1006305-17 = "にはは。先生ったら、また新しいセキュリティシステムを導入したんですね。"
1006305-18 = "私が来るたびに更新するなんて、その努力は認めますけど……。"
1006305-19 = "時間稼ぎにもなりませんよ！"
1006305-20 = "これを、こうして……と。"
1006305-37 = "これで秘密が……。"
1006305-38 = "明らかに……。"
1006305-42 = "……？"
1006305-43 = "[s1] \"……コユキさん。\"\n[s2] \"ダメって……言ったよね？\""
1006305-46 = "げっ！"
1006305-47 = "なんでここに先生が！？"
1006305-48 = "[s3] \"それはこっちのセリフだよ！\"\n[s4] \"そろそろ諦めて……これで何回目？\""
1006305-51 = "くうっ！セキュリティが通用しないからって、私を張ってたんですね！！#nなんてアナログな手法！"
1006305-52 = "いつから待ってたんですか！？#n大の大人が私みたいな子供を捕まえようとするなんて！！"
1006305-53 = "[s5] \"ダメって言ってるのに聞かないから……。\"\n[s6] \"というか、ここは私の家なんだけどね。\""
1006305-56 = "くうぅ……悔しい！#nでも諦めませんよ！次こそ必ず……。"
1006305-57 = "……え？"
1006305-58 = "次やったらセミナーの先輩たちに報告する、と……！?"
1006305-59 = "……ぐぬぬぬぬ！"
1006305-60 = "卑怯ですよ！先生がそんなことしていいと思ってるんですか！？#nそもそもこれは私と先生だけの戦いです！"
1006305-61 = "戦いを受けた覚えはない、って……？#n……そ、そうでしたっけ～……"
1006305-62 = "[s7] \"コユキ、シャーレの秘密は私だけのものじゃないんだよ。\"\n[s8] \"お願い。これはみんなにとって大切なものなんだ。\""
1006305-65 = "……せ、先生？"
1006305-66 = "……急に……そんな真剣な顔で言われても……。"
1006305-67 = "うぅ……。"
1006305-71 = "……はい。"
1006305-72 = "分かりました。先生にそこまで言われたら仕方ないですね。"
1006305-73 = "何も怒らせたくてやってるわけじゃないですし……。"
1006305-74 = "シャーレの秘密からは手を引こうと思います。"
1006305-75 = "[s9] \"ありがとう、コユキ。\"\n[s10] \"そんなにあっさりと……？\""
1006305-78 = "……先生が本気で嫌がってることをしてまで知りたいわけではないですから。#nただ、ちょーっと気になるな～って思ってただけなので。"
1006305-79 = "……でも。"
1006305-80 = "[s] \"……でも？\""
1006305-81 = "先生は「みんなにとって大切なもの」だから、見られたら困るんですよね……？"
1006305-82 = "……それはつまり！逆を言えば！！"
1006305-83 = "先生の「個人的なもの」だったら、なーんにも問題ないということですね！"
1006305-84 = "[ns11] \"そんなつもりじゃないんだけど！\"\n[ns12] \"……はっ、まさか！？\""
1006305-87 = "ではでは、お先に～！#nにはははは～！！！！！"
1006305-91 = "[ns13] \"ま、待って！コユキ！！\"\n[ns14] \"追いかけないと！\""
1006305-95 = "（コユキを追って、シャーレの居住区まで走ってきた）"
1006305-96 = "（あまりの速さに、最後まで後ろ姿が見えなかった）"
1006305-101 = "[ns15] \"こ、コユキ……！\"\n[ns16] \"ちょっと！……何を見てるの？\""
1006305-105 = "…………。"
1006305-106 = "[s17] \"……コユキ？\"\n[s18] \"……えっと、その手に持ってるのは……。\""
1006305-109 = "…………。"
1006305-110 = "その……先生……。"
1006305-111 = "ここに来たら、暗証番号のかかった引き出しが見えて……。#nとりあえず開けてみたら……。"
1006305-112 = "……「薄い本」がたくさん入ってたんですが……。#nちょっと……こ、この数は流石に……。"
1006305-113 = "まさかの事態に、私も驚いちゃったり……。"
1006305-114 = "ま、まあ……先生も息抜きが必要ですもんね……。#nに、にはははは……。"
1006305-115 = "[s] \"…………。\""
1006305-119 = "[ns] \"………！！！！！！！！！！\""
1006305-120 = "な、なんだかすみませんでした……。#n私も先生の「秘密」がこういったものだとは……にはは……。"
1006305-121 = "[s19] \"ま、待って！まずは私の話を聞いて！！\"\n[s20] \"ぼ、没収したものだから！本当だって！！\""
1006305-124 = "だ、大丈夫ですよ。誰にだって秘密の一つや二つありますから……。"
1006305-125 = "あっ……急に用事を思い出したので……。"
1006305-126 = "お先に……。"
1006305-127 = "失礼しますね……。"
1006305-131 = "そ、それじゃあ……はい。"
1006305-139 = "（その後、走り去るコユキを追いかけたが、早すぎて捕まらなかった）"
1006305-144 = "（……まもなくセミナーから連絡をもらい、謝罪と取り調べを受けた）"
