[translation]
10046140-3 = "はあ、どうしてこんなことに……。"
10046140-4 = "申し訳ありません。まさかこのような事態になるなんて。"
10046140-5 = "はは……大丈夫です。いつものことですから。"
10046140-6 = "いつものこと……？"
10046140-7 = "まさか、トリニティの治安はここまで悪化しているのですか……？#nそんな情報は――"
10046140-8 = "あっ、いえ……あくまで[ruby=・]私[/ruby][ruby=・]に[/ruby][ruby=・]と[/ruby][ruby=・]っ[/ruby][ruby=・]て[/ruby][ruby=・]は[/ruby]という意味です。#n私は自治区の境界とか、外でのパトロールが多いので。"
10046140-9 = "なるほど……それでも、負担が大きすぎるのは望ましくありませんね。#nこの件は、ツルギさんとハスミさんにも話をしてみます。"
10046140-10 = "よろしくお願いします……。"
10046140-11 = "ああ、それと……話は変わりますが……。"
10046140-12 = "立場がある以上、普段の私は安易に動くことができません。"
10046140-13 = "ですが今日は、一人の生徒として休暇を楽しんでいます。"
10046140-14 = "多少のサポートならできると思いますが……いかがでしょうか？"
10046140-15 = "えっ！？#nまさか……ナギサ様ご自身でパトロールするおつもりですか？"
10046140-16 = "ええ。この事態は、私の見込みの甘さが招いたも同然ですので。"
10046140-17 = "であれば、すべて任せきりにするわけにはいきません。"
10046140-18 = "い、いえいえ！本当に大丈夫ですから！"
10046140-19 = "どうかお願いします。#nこのままでは、私の気が収まらないのです。"
10046140-20 = "そ、そこまでおっしゃるのなら……。"
10046140-21 = "……分かりました。"
10046140-22 = "ふふ、至らぬ点もあるかと思いますが、よろしくお願いします。"
10046140-28 = "（どうしよう……）"
10046140-29 = "（いまさらダメとも言えないし……）"
10046140-30 = "（でも万が一、ナギサ様に何かあったら……）"
10046140-31 = "（……）"
10046140-32 = "（…………）"
10046140-33 = "（絶対にお守りしないと）"
