[translation]
10046140-3 = "Ah, por que as coisas terminaram assim..."
10046140-4 = "Sinto muito. Eu jamais imaginei que chegaríamos a tal situação."
10046140-5 = "Haha... está tudo bem. É algo que acontece sempre."
10046140-6 = "Algo que acontece sempre...?"
10046140-7 = "Será que a segurança de Trinity se deteriorou a esse ponto...?#nEu não recebi nenhuma informação sobre isso—"
10046140-8 = "Ah, não... eu quis dizer que é algo que acontece sempre comigo.#nComo eu faço muitas patrulhas nas fronteiras do distrito autônomo e do lado de fora."
10046140-9 = "Entendo... Ainda assim, não é desejável que o fardo seja tão grande.#nVou conversar com a Tsurugi e a Hasumi sobre isso."
10046140-10 = "Eu agradeço..."
10046140-11 = "Ah, e também... mudando de assunto..."
10046140-12 = "Devido à minha posição, não posso agir livremente no meu dia a dia."
10046140-13 = "Mas hoje, estou aproveitando minhas férias como uma simples aluna."
10046140-14 = "Acho que posso oferecer um pouco de suporte... o que acha?"
10046140-15 = "Hã!?#nNão me diga que... a senhorita Nagisa pretende patrulhar pessoalmente?"
10046140-16 = "Sim. Esta situação é praticamente resultado da minha própria falta de previsão."
10046140-17 = "Sendo assim, não posso deixar tudo nas mãos dos outros."
10046140-18 = "N-não, não! Está tudo bem, de verdade!"
10046140-19 = "Por favor, eu insisto.#nSe não for assim, não conseguirei ficar em paz."
10046140-20 = "B-bem, se a senhorita insiste tanto assim..."
10046140-21 = "...Entendido."
10046140-22 = "Fufu, talvez eu não seja muito experiente nisso, mas conto com você."
10046140-28 = "(O que eu faço...)"
10046140-29 = "(Não tem como eu dizer não agora...)"
10046140-30 = "(Mas se, por um acaso, algo acontecer com a senhorita Nagisa...)"
10046140-31 = "(...)"
10046140-32 = "(............)"
10046140-33 = "(Eu preciso protegê-la a todo custo.)"
