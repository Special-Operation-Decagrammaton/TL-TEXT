[translation]
10005050-1 = "第5話;ここからはいつものC&C"
10005050-4 = "ゴールデンフリース号・臨時の牢屋"
10005050-6 = "あーくそ、ちょっと擦りむいたじゃねーか……。"
10005050-7 = "先生、大丈夫か？怪我とかしてねぇか？"
10005050-8 = "[s1] \"うん、大丈夫。\"\n[s2] \"ネルが守ってくれたから。\""
10005050-11 = "はんっ……。"
10005050-12 = "ま、それなら良いんだけどよ。"
10005050-13 = "にしても、あんな狭ぇ場所で「1対100以上」とか流石に多すぎだろ……どんだけ警備のやつら暇なんだよ……。"
10005050-14 = "ちっ、こんな靴じゃなったら何とかなったんだがな……。"
10005050-15 = "ったく、「スマートに」とか慣れねぇことすっからこんな無様を……。"
10005050-16 = "……悪いな、先生。あたしらのせいでこんなことに巻き込んじまって。"
10005050-17 = "[s3] \"私は大丈夫、気にしないで。\"\n[s4] \"何だかネル、すごく落ち着いてるね。\""
10005050-18 = "んー……まぁ。"
10005050-19 = "んー……まぁ。"
10005050-20 = "別に、焦る必要のある状況じゃねぇしな。これくらいよくあることだ。"
10005050-21 = "まだ任務が失敗したわけでもねぇし。"
10005050-22 = "それは別にどうでも良いんだが、この後のことを考えるとちっとイライラしてくんな……。"
10005050-26 = "やっはー！先輩、ひっさしぶりーー！！"
10005050-27 = "……はぁ。"
10005050-28 = "来ると思ったよこいつ、楽しそうにしやがって……。"
10005050-35 = "いやー、びっくりしましたよもー。"
10005050-36 = "急にアスナ先輩の懐かしい顔がドーンって出てきて、まさかと思って振り返ったら、いつもの仏頂面のネル先輩が……！"
10005050-37 = "ま、でも今は全然大丈夫！なんたって私は、この船のお客様として丁重に守られてるからね！"
10005050-38 = "ここにいる大量の警備は、全部私の護衛兵みたいなもの！いくら先輩たちでも、流石に多勢に無勢なんじゃないかな～？"
10005050-39 = "さっきも結構たくさん来たけど、まだまだあんなもんじゃないですよ？それに、いくら半分独自の運営をしてるとはいえ、この学校を敵に回したいわけでもないでしょ？もう正体バレちゃったんだし、作戦失敗じゃないですか？"
10005050-40 = "んー、もし先輩たちに可能性があるとしたら……。"
10005050-41 = "プレイラウンジのゲームで「Sランク」を勝ち取って、VIP扱いになるとか？"
10005050-42 = "そうしたら、超法規的な特権が手に入るらしいし、こんな状況何とでもなるかもしれませんね？にははははは！"
10005050-43 = "ま、でも文字通りそれは夢物語かな～？"
10005050-44 = "別に先輩たち、今たくさんお金を持ってるわけじゃないでしょ？私がこれまでかなりのお金をつぎ込んでも出てないんだから、まあ実質的に無理だと思いますよ～！"
10005050-45 = "私、[ruby=くろさき]黒崎[/ruby]コユキは、今度こそミレニアムの魔の手から逃げ出してみせるんだから！"
10005050-46 = "この船の主になって、先輩たちを追い出して……何のしがらみも無く、好き放題生きてやる！"
10005050-47 = "はんっ。ベラベラベラベラと、楽しそうじゃねーか。"
10005050-48 = "夢中になって目が悪くなったか？それとも礼儀なんて言葉も忘れたか？……ここにいる大人、見えてねーのか？"
10005050-49 = "大人……？"
10005050-51 = "……はっ！？"
10005050-52 = "こ、こんにちは！初めましてですよね！？"
10005050-53 = "私は黒崎コユキです。コードネーム「白兎」と呼ばれて、指名手配で追われてたりします！"
10005050-54 = "[s5] \"初めまして、コユキ。\"\n[s6] \"それ、自分で名乗るんだね……。\""
10005050-55 = "にははははは！まあ慣れっこと言いますか、いつものことで定着したので。"
10005050-56 = "にははははは！まあ慣れっこと言いますか、いつものことで定着したので。"
10005050-57 = "ところであなたは……ネル先輩の保護者さん的な方ですか？"
10005050-58 = "はぁっ……！？"
10005050-59 = "[s7] \"まあ、今はそんな感じでもあるけれど。\"\n[s8] \"そうなりたい気持ちは山々だけど。\""
10005050-60 = "ちがっ、バカか！？そういうんじゃねぇから！？"
10005050-61 = "ちがっ、バカか！？そういうんじゃねぇから！？"
10005050-62 = "先生もあいつのくだらねぇ話に乗るな！！"
10005050-63 = "「せんせい」……？"
10005050-65 = "せ、先生！？"
10005050-66 = "先生なんですか！？うわぁっ……！私、先生って初めて会いました！！"
10005050-67 = "それはそれとして、そんな先生がこんなところでネル先輩と一緒に何を……？"
10005050-68 = "言わなくて良いぞ先生！ってか、そんなのてめぇが知ってどうすんだよ！"
10005050-69 = "[s9] \"コユキの方は、ここで何をしてたの？\"\n[s10] \"先輩たちが心配してたけど、変なこととかしてないよね？\""
10005050-70 = "変なこと、ですか……いえ、特に何も？"
10005050-71 = "変なこと、ですか……いえ、特に何も？"
10005050-72 = "……債券？"
10005050-73 = "ああそれは、あそこでゲームをしていたらお金が無くなったので、ちょっと使いましたが……。"
10005050-74 = "おい、金額は聞いたがちょっととかいう額じゃねーだろ。"
10005050-75 = "てめぇ自分がいくら使ったか把握してんのか？どうせ何も考えずに使ってたんだろ？"
10005050-76 = "まあ、特に計算とかはしてませんね……？"
10005050-77 = "てきとーに使ってましたので、確かに合計いくらくらいになったんでしょうね～？"
10005050-78 = "「でしょうね～」じゃねぇよ！あたしも覚えてねーけど結構な額だよ！"
10005050-79 = "そんなこと言われましても、数えてませんし……お金なんて無くなったらどこかから貰ってくれば良いじゃないですか？"
10005050-80 = "もしミレニアムの金を全部使い切ったらどうすんだよ？"
10005050-81 = "他の学校があるじゃないですか。"
10005050-82 = "……。"
10005050-83 = "……ってか、てめぇはそもそも誰かのお金を勝手に使うってのがおかしいとは思わねーのか？"
10005050-84 = "いえ別に。何かおかしいです？"
10005050-85 = "お金は元々巡り巡るものじゃないですか。ただ寝かせておく方がどうかと思いますよ？"
10005050-89 = "……そろそろ分かったと思うが、先生。こういうやつだ。全っ然話が通じねぇ。"
10005050-90 = "それはこっちの台詞ですよ～、これだから困ったら暴力の先輩は困っちゃいます。"
10005050-91 = "こいつ、この状況だからって調子乗りやがって……。"
10005050-92 = "待ってろよ……。"
10005050-93 = "ここから抜け出したら、すぐにでもてめぇを……！"
10005050-105 = "ああ、やっぱりここにいたのか。"
10005050-106 = "あらあら、大集合ですね。"
10005050-108 = "せ、先輩たち……っ！？"
10005050-109 = "はっ、ほら見たことか！"
10005050-110 = "来ると思ってたぜ、こいつらならな！"
10005050-115 = "何を突っ立っている！早く入れ！"
10005050-117 = "……は？"
10005050-118 = "……ふふっ。"
10005050-119 = "……。"
10005050-120 = "……ごめん、私たちも捕まった。"
10005050-124 = "おいおいおいおい……。"
