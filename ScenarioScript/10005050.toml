[translation]
10005050-1 = "Episódio 5; A partir daqui, é a C&C de sempre"
10005050-4 = "Golden Fleece - Cela improvisada"
10005050-6 = "Ah, droga, acabei ganhando um arranhão..."
10005050-7 = "Sensei, você está bem? Não se machucou, né?"
10005050-8 = "[s1] \"Sim, estou bem.\"\n[s2] \"Porque a Neru me protegeu.\""
10005050-11 = "Hmph..."
10005050-12 = "Bom, se é assim, então tudo bem."
10005050-13 = "Mas mesmo assim, enfrentar \"mais de 100 contra 1\" num lugar tão apertado é demais... quanta gente à toa tem nessa segurança..."
10005050-14 = "Tsc, se eu não estivesse com esses sapatos, teria dado um jeito..."
10005050-15 = "Francamente, tentar ser \"elegante\" só me fez passar por esse vexame..."
10005050-16 = "...Foi mal, Sensei. Acabou se metendo nisso por nossa causa."
10005050-17 = "[s3] \"Eu estou bem, não se preocupe.\"\n[s4] \"Neru, você parece estar muito calma.\""
10005050-18 = "Hum... bem."
10005050-19 = "Hum... bem."
10005050-20 = "Não tem motivo para entrar em pânico. Esse tipo de coisa acontece sempre."
10005050-21 = "E a missão ainda não foi um fracasso total."
10005050-22 = "Isso não importa muito, mas só de pensar no que vem a seguir, já começo a ficar irritada..."
10005050-26 = "Iahuu! Senpai, quanto tempo!!"
10005050-27 = "...Ah."
10005050-28 = "Eu sabia que essa aí ia aparecer, toda animadinha..."
10005050-35 = "Nossa, que surpresa, gente!"
10005050-36 = "De repente, o rosto nostálgico da Asuna-senpai aparece do nada, e quando eu me viro achando que era impossível, lá estava a Neru-senpai com aquela cara emburrada de sempre...!"
10005050-37 = "Mas, agora está tudo bem! Afinal, eu estou sendo protegida como uma cliente ilustre deste navio!"
10005050-38 = "Essa quantidade enorme de seguranças aqui é como se fosse minha guarda pessoal! Mesmo sendo vocês, não acham que estão em desvantagem numérica?"
10005050-39 = "Já vieram vários aqui agora pouco, mas não é nem metade do que tem por vir! Além disso, mesmo que operem de forma independente, vocês não querem transformar esta escola em inimiga, né? Já descobriram quem vocês são, então a missão não foi um fracasso?"
10005050-40 = "Hum, se vocês ainda têm alguma chance..."
10005050-41 = "Talvez ganhar um \"Rank S\" nos jogos do lounge e conseguir um tratamento VIP?"
10005050-42 = "Dizem que assim você ganha privilégios extralegais, talvez assim dê para resolver essa situação? Ni-ha-ha-ha!"
10005050-43 = "Mas, falando sério, isso é um sonho distante, né?"
10005050-44 = "Vocês não estão com tanto dinheiro assim agora, né? Eu já gastei uma fortuna aqui e não consegui, então acho praticamente impossível!"
10005050-45 = "Eu, Kurosaki Koyuki, vou escapar das garras do Millennium desta vez!"
10005050-46 = "Vou me tornar a dona deste navio, expulsar vocês... e viver do meu jeito, sem ninguém para me prender!"
10005050-47 = "Hmph. Falando pelos cotovelos, toda animadinha, né?"
10005050-48 = "Ficou cega de tanto se empolgar? Ou esqueceu o que é educação? ...Não está vendo o adulto aqui?"
10005050-49 = "Adulto...?"
10005050-51 = "...Ah!?"
10005050-52 = "O-olá! É a primeira vez que nos vemos, né!?"
10005050-53 = "Eu sou Kurosaki Koyuki. Meu codinome é \"Coelho Branco\" e estou sendo procurada pela polícia!"
10005050-54 = "[s5] \"Prazer em conhecê-la, Koyuki.\"\n[s6] \"Você mesma se entrega assim...\""
10005050-55 = "Ni-ha-ha-ha! Bom, já estou acostumada, virou minha marca registrada."
10005050-56 = "Ni-ha-ha-ha! Bom, já estou acostumada, virou minha marca registrada."
10005050-57 = "Aliás, quem é você... seria o responsável pela Neru-senpai?"
10005050-58 = "Hã...!?"
10005050-59 = "[s7] \"Bem, de certa forma, agora sou.\"\n[s8] \"Eu adoraria que fosse assim.\""
10005050-60 = "Não, tá maluca!? Não é nada disso!"
10005050-61 = "Não, tá maluca!? Não é nada disso!"
10005050-62 = "Sensei, não dê corda para as besteiras dela!!"
10005050-63 = "\"Sensei\"...?"
10005050-65 = "P-Sensei!?"
10005050-66 = "Você é o Sensei!? Uau...! É a primeira vez que conheço um Sensei pessoalmente!!"
10005050-67 = "Deixando isso de lado, o que o Sensei está fazendo aqui com a Neru-senpai...?"
10005050-68 = "Não precisa dizer nada, Sensei! E aliás, por que você quer saber disso?!"
10005050-69 = "[s9] \"Koyuki, o que você estava fazendo aqui?\"\n[s10] \"As veteranas estavam preocupadas, você não fez nada de estranho, né?\""
10005050-70 = "Algo estranho, você diz...? Não, nada em especial?"
10005050-71 = "Algo estranho, você diz...? Não, nada em especial?"
10005050-72 = "......Títulos de dívida?"
10005050-73 = "Ah, isso... eu estava jogando ali e meu dinheiro acabou, então usei um pouco, mas..."
10005050-74 = "Ei, eu ouvi o valor, e não foi nem um pouco!"
10005050-75 = "Você tem noção de quanto gastou? Aposto que gastou sem pensar em nada, né?"
10005050-76 = "Bem, eu não fiz nenhum cálculo específico...?"
10005050-77 = "Eu fui usando de qualquer jeito, então, realmente, quanto será que deu no total, hein?"
10005050-78 = "Não vem com esse \"será que deu\"! Eu também não lembro, mas foi uma nota preta!"
10005050-79 = "Mesmo que me diga isso, eu não contei... E se o dinheiro acabar, não é só pegar de algum lugar?"
10005050-80 = "E se você gastar todo o dinheiro do Millennium, o que vai fazer?"
10005050-81 = "Existem outras escolas, não existem?"
10005050-82 = "......"
10005050-83 = "...Digo, você não acha estranho usar o dinheiro dos outros sem permissão?"
10005050-84 = "Não, nem um pouco. Tem algo de errado?"
10005050-85 = "O dinheiro foi feito para circular, não foi? Acho que deixar ele parado é que é o problema."
10005050-89 = "...Acho que já deu para entender, Sensei. Ela é desse tipo. É impossível conversar com ela."
10005050-90 = "Essa frase deveria ser minha~ É por isso que é difícil lidar com veteranas que só sabem usar a violência."
10005050-91 = "Essa garota, aproveitando que estamos nessa situação para ficar se achando..."
10005050-92 = "Me aguarde..."
10005050-93 = "Assim que a gente sair daqui, eu vou te...!"
10005050-105 = "Ah, eu sabia que vocês estavam aqui."
10005050-106 = "Ora, ora, que grande reunião."
10005050-108 = "Ve-veteranas...!"
10005050-109 = "Ha, viu só!"
10005050-110 = "Eu sabia que elas viriam, conhecendo elas!"
10005050-115 = "O que estão fazendo parados aí! Entrem logo!"
10005050-117 = "...Hã?"
10005050-118 = "...Fufu."
10005050-119 = "......"
10005050-120 = "...Desculpem, nós também fomos capturadas."
10005050-124 = "Ah, não, não, não, não..."
