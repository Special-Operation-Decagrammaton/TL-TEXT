[translation]
10012055-5 = "E-eu achei que ia morrer, sério mesmo..."
10012055-6 = "Foi por um triz, né? ☆"
10012055-7 = "Conseguimos porque a Ayane inseriu os dados rápido, mas se tivesse atrasado um pouco, talvez não desse mais para parar."
10012055-9 = "Ahaha..."
10012055-11 = "Faz tempo que o tio aqui não enfrenta tantos de uma vez só~"
10012055-12 = "...Obrigada, Sensei. Graças a você, estamos a salvo."
10012055-13 = "[s1] \"Não precisa agradecer.\" \n[s2] \"Foi graças ao esforço de todos vocês.\""
10012055-16 = "O registro de identidade do sistema de segurança foi concluído com sucesso, e..."
10012055-17 = "A partir de agora, poderemos ficar em segurança..."
10012055-18 = "Hã? ...Tem algo aqui no chão."
10012055-19 = "Ugh... Q-que diabos é isso..."
10012055-20 = "Os robôs começaram a atacar de repente... Aaaah!"
10012055-21 = "Eu já vou para casa... Não aguento mais isso, é impossíveeeel..."
10012055-25 = "...Tem pessoal do Grupo do Capacete até aqui."
10012055-32 = "...Uhe."
10012055-34 = "...O sistema de defesa do resort é incrível, né."
