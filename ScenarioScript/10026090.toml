[translation]
10026090-1 = "Episódio 9; O segredo que dorme na ilha"
10026090-3 = "Haa, haa... haa..."
10026090-4 = "Haa... estou sem fôlego... sério... que cansaço..."
10026090-5 = "Se chegamos até aqui... acho que já estamos a salvo."
10026090-6 = "Ui, você também não se machucou, certo?"
10026090-10 = "S-sim... haa... haa... mas por que, afinal..."
10026090-11 = "[s1] \"Estão todos bem?\"\n[s2] \"Que bom que não nos perdemos.\""
10026090-14 = "Haa, haa... haa... por que eu tive que... correr tanto assim..."
10026090-15 = "Por que passar por tanto esforço por causa de \"algo assim\"..."
10026090-16 = "Haa... haa..."
10026090-17 = "Sim...? "
10026090-18 = "...Ah. Você quer saber o que é \"algo assim\"? #nComo devo explicar..."
10026090-19 = "Ui, aquilo que vimos dentro da cachoeira..."
10026090-20 = "Ah, sim. Mas, antes disso..."
10026090-21 = "N-na verdade, o local marcado neste mapa é..."
10026090-23 = "Somando com os novos pontos que surgiram, se analisarmos tudo de forma abrangente..."
10026090-29 = "Q-que barulho foi esse!? Será que, por acaso, os Mimesis estão de novo...?"
10026090-30 = "N-não... é que o chão cedeu e eu tropecei... desculpe."
10026090-31 = "[s3] \"Hinata...!\"\n[s4] \"Você está bem!? Se machucou?\""
10026090-35 = "S-sim... estou bem. Não aconteceu nada. #nÉ que foi de repente, então levei um susto..."
10026090-36 = "Mas, afinal, por que tem um buraco aqui...?"
10026090-37 = "...Ué? Tem algo aqui nos meus pés..."
10026090-41 = "...Isso é... que tipo de caixa será?"
10026090-42 = "Parece bem antiga. Será que..."
10026090-43 = "Será que esse buraco foi cavado para enterrar essa caixa?"
10026090-44 = "...!"
10026090-45 = "Então, dentro dela..."
10026090-46 = "— E-espere um pouco. Hinata!"
10026090-48 = "Pensando no que aconteceu até agora... não toque nisso...!"
10026090-49 = "...Sim? Você disse alguma coisa...?"
10026090-59 = "[ns] \"...Já era de se esperar.\""
10026090-60 = "Ahaha... o padrão tem sido sempre o mesmo, afinal."
10026090-61 = "Mas desta vez está um pouco diferente, não está...?"
10026090-62 = "P-por que tem tantos deles...!?"
10026090-63 = "E aquele ali, é a primeira vez que vejo...! #nVocê tem certeza de que estamos bem!?"
10026090-64 = "Fufu. Parece que esta caixa é bem importante. #nSerá que finalmente chegamos à resposta correta?"
10026090-65 = "É hora de rir disso!?"
10026090-66 = "O conteúdo da caixa será uma surpresa para depois que lutarmos contra elas, Sensei."
10026090-68 = "...Então, conto com você♡"
