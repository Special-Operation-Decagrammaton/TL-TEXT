[translation]
10026090-1 = "第9話;島に眠る秘密"
10026090-3 = "はあ、はあ……はぁ……"
10026090-4 = "はあ……息が、苦し……ほんとに……疲れたぁっ……"
10026090-5 = "ここまで来れば……もう、大丈夫そうですね。"
10026090-6 = "ウイさんも、怪我はありませんか？"
10026090-10 = "は、はい……はあ……はぁ……いったい、どうして……"
10026090-11 = "[s1] \"全員無事だね？\"\n[s2] \"はぐれずに済んで良かったよ。\""
10026090-14 = "はあ、はあ……はぁ……どうして、私が……こんなに走り回らなくては……"
10026090-15 = "「こんなもの」のために、なぜ苦労を……"
10026090-16 = "はあ……はぁ……"
10026090-17 = "はい……？"
10026090-18 = "……ああ。「こんなもの」が何か気になる、と？#nどう説明しましょう……。"
10026090-19 = "ウイさん、私たちが滝の中で見た……"
10026090-20 = "あっ、はい。ですが、その前に……"
10026090-21 = "じ、実はですね。この地図に記された場所は……"
10026090-23 = "新しく浮かび上がってきたポイントも合わせて、総合的に判断すると……"
10026090-29 = "な、何の音ですか！？も、もしかして、またミメシスが……？"
10026090-30 = "い、いえ……ただ地面が抜けて[ruby=つまづ]、躓い[/ruby]ただけです……すみません。"
10026090-31 = "[s3] \"ヒナタ……！\"\n[s4] \"大丈夫！？怪我は？\""
10026090-35 = "は、はい……大丈夫です。なんともありません。#nいきなりでしたので、少し驚きはしましたけど……"
10026090-36 = "それにしても、なぜこんな所に穴が……？"
10026090-37 = "……あれ？何か足元に……。"
10026090-41 = "……これは……何の箱でしょう？"
10026090-42 = "見るからに古そうですね。もしかして……"
10026090-43 = "この穴は、箱を埋めておくために掘られた、なんて。"
10026090-44 = "……！"
10026090-45 = "それでは、この中に――"
10026090-46 = "――ちょ、ちょっと待ってください。ヒナタさん！"
10026090-48 = "今までの流れから考えて……それに触れては……！"
10026090-49 = "……はい？何か言いましたか……？"
10026090-59 = "[ns] \"……こうなるよね。\""
10026090-60 = "あはは……ずっと同じパターンでしたから。"
10026090-61 = "でも、今までとは少し違いますね……？"
10026090-62 = "な、なんでこんなに多いの……！？"
10026090-63 = "それにアレ、初めて見るんだけど……！#n本当に大丈夫！？"
10026090-64 = "ふふっ。どうやら、この箱はかなり重要みたいですね。#nいよいよ正解にたどり着いたのでしょうか？"
10026090-65 = "笑ってる場合なの！？"
10026090-66 = "箱の中身は、彼女たちと戦ってからのお楽しみですね、先生。"
10026090-68 = "……それでは、お願いします♡"
