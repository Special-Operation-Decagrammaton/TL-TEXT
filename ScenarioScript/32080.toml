[translation]
32080-1 = "Episódio 8: Fresta de Esperança"
32080-2 = "Tá atrasado！ Bom dia！"
32080-3 = "Ah, Azusa-chan. Você acordou cedo, hein？"
32080-4 = "Antes do sol nascer eu já tava aqui revisando e adiantando."
32080-5 = "Fufu, você tá cheia de gás hoje, Azusa-chan."
32080-6 = "Óbvio. Hoje tem simulado de novo. Né, Hifumi？"
32080-7 = "Sim, isso mesmo. Pelo jeito você já tá preparada pro simulado, Azusa-chan？"
32080-8 = "Sim. Faltam só dois dias pra 2ª Prova Especial, não posso continuar preocupando todo mundo."
32080-13 = "E dessa vez……！"
32080-14 = "Tá com uma motivação absurda……"
32080-15 = "Já rodei várias vezes as questões previstas do conteúdo. Preparação perfeita."
32080-16 = "E-eu também não vou perder！ Vou mostrar o poder da elite do Comitê de Execução da Justiça！"
32080-17 = "Então eu também vou me esforçar ao máximo♡"
32080-18 = "[s] \"Todo mundo tá bem animado, hein.\""
32080-22 = "Sim……！ Então, já que o clima tá bom, vamos começar o simulado logo？"
32080-24 = "3º Simulado do Clube de Reforço"
32080-26 = "[ns] \"Então…… começar！\""
32080-30 = "……。"
32080-33 = "Fufu……♡"
32080-36 = "E-esse aqui eu sei……！ Eh, uhm, nnn……っ！"
32080-40 = "（Parece que a mão de todo mundo tá mais rápida que antes……！）"
32080-44 = "（O simulado terminou e os resultados saíram.）"
32080-45 = "Sensei…… por favor, anuncie os resultados！"
32080-46 = "[s] Anuncia os resultados da prova."
32080-50 = "3º Simulado do Clube de Reforço, Resultados――"
32080-52 = "Hanako―69 pontos[007eff]（Aprovada）[-]"
32080-54 = "Azusa―73 pontos[007eff]（Aprovada）[-]"
32080-56 = "Koharu―61 pontos[007eff]（Aprovada）[-]"
32080-58 = "Hifumi―75 pontos[007eff]（Aprovada）[-]"
32080-60 = "C-conseguimos……！？"
32080-61 = "Sério！？ Não tá mentindo！？"
32080-62 = "……！"
32080-63 = "Ara ara♡"
32080-68 = "Incrível！ Azusa-chan, não só passou de 60, foi pra 73！ Parabéns, você se esforçou demais……！"
32080-69 = "……Sim！"
32080-70 = "Koharu-chan também！ Foi por pouco, mas é uma aprovação clara！ Incrível, você conseguiu！"
32080-71 = "I-isso não é sonho, né……？ De verdade……！"
32080-72 = "Ahaha…… i-isso é o meu verdadeiro poder！ Viram！！"
32080-73 = "Sim！ Essa é a elite do Comitê de Execução da Justiça, como esperado！"
32080-74 = "E a Hanako-chan também……"
32080-75 = "……Foi sorte, né. Ufufu. Um número bem interessante♡"
32080-76 = "Que bom…… Hanako-chan, uuu……"
32080-77 = "H-Hifumi-chan……？"
32080-78 = "Não sei o que aconteceu com você antes ou o que você carrega, Hanako-chan…… mas que bom……"
32080-79 = "Hifumi-chan…… sim, obrigada."
32080-80 = "Vou te ajudar pra você recuperar o nível antigo o mais rápido possível. Realmente, que bom……"
32080-81 = "Sim…… desculpa. Preocupei vocês……"
32080-83 = "……Então, como prometido, vamos começar a cerimônia de entrega dos brindes dos Momo Friends！"
32080-87 = "……！！！"
32080-88 = "Ahaha……"
32080-89 = "……。"
32080-90 = "Vamos！ Podem escolher o que quiserem, o que mais gostarem！"
32080-91 = "Entendi, então……！ Humm……！"
32080-92 = "Eu vou recusar educadamente."
32080-93 = "E-eu também……"
32080-94 = "A-auuu…… é, é mesmo……"
32080-95 = "C-como faço…… escolher entre esses dois é impossível pra mim……！"
32080-96 = "Aquele preto com chifre é legal, mas o hipopótamo de óculos também……！"
32080-97 = "N-não é hipopótamo, o Peroro-sama é um pássaro, mas……"
32080-98 = "O que eu faço…… escolher um desses é demais pra mim……！"
32080-99 = "Não dá…… por favor, Hifumi. Escolhe por mim……"
32080-100 = "E-eu？"
32080-101 = "Uhm, entre o Sr. Skullman e o Dr. Peroro. Se eu tivesse que escolher……"
32080-106 = "……。"
32080-110 = "Então que tal esse, o Dr. Peroro, o intelectual！"
32080-111 = "……！ Beleza, vou com esse！"
32080-112 = "Na verdade o Dr. Peroro é super inteligente e estuda muito."
32080-113 = "Perfeito pra Azusa-chan, que tá se dedicando tanto nos estudos e crescendo rápido！"
32080-114 = "Entendi, então é isso."
32080-115 = "Tem um setting secreto de que ele ficou um pouco estranho de tanto estudar……"
32080-116 = "[s] \"Que bom, Azusa.\""
32080-117 = "Sim, gostei. É muito fofo, adorei. Ehehe……"
32080-118 = "Obrigada, Hifumi. Vou guardar isso pra vida toda."
32080-119 = "A-ah, fico grata, mas falar assim me deixa um pouco envergonhada……！？ Mas eu também tô feliz. Isso é fruto do seu esforço, Azusa-chan."
32080-120 = "Sim. E ao mesmo tempo, é o primeiro presente que ganhei de uma amiga……"
32080-121 = "De agora em diante vou tratar esse hipopótamo como se fosse a Hifumi e cuidar dele！"
32080-122 = "I-isso é um pouco vergonhoso……！？ E não é hipopótamo, é um pássaro……！"
32080-126 = "Uhum…… o mundo dos hobbies é bem vasto, né."
32080-127 = "……。"
32080-129 = "（O moral de todo mundo tá alto e os estudos continuam num clima ótimo.）"
32080-133 = "（O tempo passou……）"
32080-135 = "……Amanhã é o dia."
32080-136 = "S-sim……"
32080-137 = "2ª Prova Especial."
32080-138 = "Fufu…… passou voando, né."
32080-139 = "Sim…… foi só uma semana, mas nos esforçamos bastante. Acredito que isso não vai ser em vão."
32080-140 = "Os resultados dos simulados foram bons…… com o nosso nível atual, com certeza vamos passar na 2ª Prova Especial！"
32080-141 = "Mas não podemos relaxar！ Vamos dar o nosso melhor até o último dia！"
32080-142 = "Sim, óbvio. Se possível, vou mirar em 100 pontos."
32080-143 = "E-eu também！"
32080-144 = "Ara, então eu também vou nessa…… fufu♡"
32080-148 = "E-eu acho que 100 pontos vai ser difícil, mas…… e-enfim！"
32080-149 = "No último dia, vamos estudar com tudo！"
32080-150 = "[s] \"Beleza, vamos nessa！」"
32080-153 = "……Estava esperando. Faz tempo, Sensei."
32080-154 = "Como você está desde então？ O acampamento tá indo bem？ Algum problema？"
32080-155 = "[s] \"Sim, graças a vocês. Aliás, o que te traz aqui hoje？\""
32080-156 = "Fufu…… esse acampamento foi criado basicamente pra «observar melhor as alunas»."
32080-157 = "Então, como foi？ Descobriu alguma coisa？"
32080-158 = "Vou ser mais direta. Quem você acha que é a «traidora de Trinity»？"
32080-159 = "[s] \"……Vou repetir o que disse antes, vou resolver do meu jeito.\""
32080-160 = "……Entendi. Só queria confirmar isso de novo, agora que a 2ª Prova Especial tá logo aí."
32080-161 = "Por isso vim hoje."
32080-162 = "……Provavelmente a Mika-san também te procurou, né？"
32080-167 = "O que você conversou com a Mika-san…… será que pode me contar？"
32080-169 = "Próximo; Mão Negra"