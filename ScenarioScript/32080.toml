[translation]
32080-1 = "Episódio 8;A Esperança que se Insinua"
32080-2 = "Atrasadas! Bom dia!"
32080-3 = "Ah, Azusa. Que cedo, né?"
32080-4 = "Antes de o sol nascer, eu já tava aqui adiantando e revisando a matéria."
32080-5 = "Ufu, cheia de disposição, hein, Azusa."
32080-6 = "Óbvio; afinal, hoje também tem simulado. Não é, Hifumi?"
32080-7 = "Sim, isso mesmo. Pelo seu estado, Azusa, parece que você já está totalmente pronta pro simulado, né?"
32080-8 = "Sim. Faltam só dois dias pro 2º Exame Especial de Aptidão, e eu não posso ficar preocupando todo mundo pra sempre."
32080-13 = "E, dessa vez, com certeza……!"
32080-14 = "Q-que empolgação enorme……."
32080-15 = "As prováveis questões da matéria da prova, eu já revisei várias e várias vezes. A preparação tá perfeita."
32080-16 = "E-eu também não vou perder! Vou mostrar o poder de uma elite do Comitê de Realização da Justiça!"
32080-17 = "Então, eu também vou me esforçar ao máximo♡"
32080-18 = "[s] \"Todo mundo tá numa empolgação boa, né.\""
32080-22 = "Sim……! Então, já que tem esse embalo, vamos começar logo o simulado?"
32080-24 = "3º Simulado do Clube de Aulas de Reforço"
32080-26 = "[ns] \"Então, começar!\""
32080-30 = "……."
32080-33 = "Ufu……♡"
32080-36 = "I-isto eu devo saber……! É que, deixa ver, nnh……!"
32080-40 = "(Sei lá, todo mundo, o movimento das mãos tá mais rápido do que antes……!)"
32080-44 = "(O simulado terminou, e o resultado da correção de todo mundo saiu.)"
32080-45 = "Sensei…… o anúncio, por favor!"
32080-46 = "[s] Anuncia o resultado da prova."
32080-50 = "3º Simulado do Clube de Aulas de Reforço, resultado――"
32080-52 = "Hanako―69 pts [007eff]（Aprovada）[-]"
32080-54 = "Azusa―73 pts [007eff]（Aprovada）[-]"
32080-56 = "Koharu―61 pts [007eff]（Aprovada）[-]"
32080-58 = "Hifumi―75 pts [007eff]（Aprovada）[-]"
32080-60 = "C-conseguimos……!?"
32080-61 = "É-é sério!? Não tá mentindo!?"
32080-62 = "……!"
32080-63 = "Ora, ora♡"
32080-68 = "Que incrível! Azusa, você passou dos 70, que dirá dos 60! É incrível de verdade! Você se esforçou……!"
32080-69 = "……Sim!"
32080-70 = "A Koharu também! Foi no limite, mas isto é uma aprovação sem sombra de dúvida! Que incrível, você conseguiu!"
32080-71 = "N-não é sonho, né……? É-é de verdade……!"
32080-72 = "Aha…… i-isto é o meu verdadeiro poder! Viram!!"
32080-73 = "Sim! Isto sim é uma elite do Comitê de Realização da Justiça, como esperado!"
32080-74 = "E, além disso, a Hanako também……"
32080-75 = "……Tive sorte, ufufu. É um número bonitinho♡"
32080-76 = "Que bom…… Hanako, uu……."
32080-77 = "H-Hifumi……?"
32080-78 = "O que aconteceu antes com a Hanako, o que ela carrega, eu ainda não sei…… mas, que bom……."
32080-79 = "Hifumi…… sim, muito obrigada."
32080-80 = "Pra você recuperar logo o poder de antes, eu também vou ajudar. Que bom, que bom mesmo……."
32080-81 = "Sim…… me desculpe. Por ter feito você se preocupar……."
32080-83 = "……Sendo assim, como prometido, vou dar início à cerimônia de entrega dos produtos MomoFriends!"
32080-87 = "……!!!"
32080-88 = "Ahaha……."
32080-89 = "……."
32080-90 = "Vamos, à vontade! Pessoal, podem escolher livremente o bichinho preferido, o que quiserem!"
32080-91 = "Sei, sendo assim……! Hmm……!"
32080-92 = "É que, eu, respeitosamente, dispenso."
32080-93 = "E-eu também……."
32080-94 = "A-auu…… ah, é……?"
32080-95 = "E-e agora…… eu, eu……!"
32080-96 = "Não dá, escolher entre estes é uma coisa tão difícil……!"
32080-97 = "Aquele preto de chifres é legal, e o hipopótamo de óculos também……!"
32080-98 = "H-hipopótamo não, o senhor Peroro é um pássaro……."
32080-99 = "O que eu faço…… escolher entre um destes dois, pra mim……!"
32080-100 = "Pra mim, é impossível…… por favor, Hifumi. Hifumi, escolhe no meu lugar……."
32080-101 = "E-eu?"
32080-102 = "É que, é o Sr. Skullman e o Dr. Peroro, né. Se eu for forçada a escolher……"
32080-106 = "……."
32080-110 = "Então, que tal este, o intelectual Dr. Peroro!"
32080-111 = "……! Isso, então é este daqui!"
32080-112 = "Na verdade, este Dr. Peroro tem a caracterização de ser sabido e bom de estudos."
32080-113 = "Achei que combina perfeitamente com você, Azusa, que agora tá se esforçando nos estudos e em plena fase de um crescimento incrível!"
32080-114 = "Sei, então é isso."
32080-115 = "T-tem também a caracterização secreta de que, por ter estudado um pouquinho demais, ele ficou meio pinel……."
32080-116 = "[s] \"Que bom, Azusa.\""
32080-117 = "Sim, gostei. É fofo de verdade, adorei. Ehehe……."
32080-118 = "Obrigada, Hifumi. Isto eu vou guardar com carinho a vida toda."
32080-119 = "A-agradeço, mas, quando você diz uma coisa dessas, eu até me assusto um pouquinho……!? Mas eu também tô feliz. E isso é justamente porque você conseguiu, Azusa."
32080-120 = "Sim. Mas, ao mesmo tempo, é o primeiro presente que eu ganho de uma amiga, então……."
32080-121 = "De agora em diante, vou cuidar deste hipopótamo pensando que é a Hifumi!"
32080-122 = "I-isso é meio vergonhoso……!? E-e não é hipopótamo, é um pássaro……!"
32080-126 = "Hmm…… o mundo dos gostos é vasto, né."
32080-127 = "……."
32080-129 = "(Com a moral de todo mundo alta, o estudo seguiu num clima bom.)"
32080-133 = "(E o tempo foi passando……)"
32080-135 = "……Enfim, é amanhã."
32080-136 = "S-sim……."
32080-137 = "O 2º Exame Especial de Aptidão."
32080-138 = "Ufu…… sei lá, passou num piscar de olhos, né."
32080-139 = "Sim…… foi um tempo curto, uma semana, mas a gente acumulou esforço direitinho. Acredito que isto, com certeza, não vai ser em vão."
32080-140 = "O resultado do simulado também foi bom…… as pessoas que a gente é agora conseguem, de sobra, passar no 2º Exame Especial de Aptidão!"
32080-141 = "Mas, sem nos vangloriarmos, temos que nos esforçar até o fim! Mais um dia, vamos dar o nosso melhor!"
32080-142 = "Sim, óbvio. Aliás, vou mirar nos 100 pontos e me esforçar."
32080-143 = "E-eu também!"
32080-144 = "Ora, então eu também nesse esquema…… ufu♡"
32080-148 = "E-eu 100 pontos parece meio difícil, mas…… e-enfim!"
32080-149 = "No último dia também, vamos estudar com garra!"
32080-150 = "[s] \"Muito bem, vamos nessa!\""
32080-153 = "……Eu estava esperando. Há quanto tempo, Sensei."
32080-154 = "Desde então, está tudo bem? Como vai o acampamento; não houve nenhum problema?"
32080-155 = "[s] \"Sim, graças a você, deu tudo certo, com esforço. Aliás, qual o assunto de hoje?\""
32080-156 = "Ufu…… este acampamento, por assim dizer, foi, de origem, uma providência para \"poder observar bem os alunos\"."
32080-157 = "É isso; e então, como foi? Descobriu alguma coisa?"
32080-158 = "Deixa eu dizer de forma mais direta: quem você acha que é \"o traidor de Trinity\"?"
32080-159 = "[s] \"……Vai ficar igual à outra vez, mas eu vou lidar com isso do meu jeito.\""
32080-160 = "……Pois é. Só que, às vésperas do 2º Exame Especial de Aptidão, eu quis, mais uma vez, confirmar esse ponto."
32080-161 = "E, por isso, hoje também pedi que o senhor viesse."
32080-162 = "……Provavelmente, a Mika também entrou em contato, né?"
32080-167 = "O que você conversou com a Mika…… se puder, será que me conta?"
32080-169 = "Próximo Episódio;A Mão Negra"
