[translation]
32080-1 = "Episódio 8; Esperança que se infiltra"
32080-2 = "Está atrasado! Bom dia!"
32080-3 = "Ah, Azusa-chan. Você chegou cedo, não é?"
32080-4 = "Antes do sol nascer, eu já estava aqui fazendo revisão e estudando a matéria."
32080-5 = "Fufu, você está cheia de motivação, Azusa-chan."
32080-6 = "Claro que estou, afinal, temos um simulado hoje também. Não é, Hifumi?"
32080-7 = "Sim, é verdade. Pelo visto, Azusa-chan, você já está totalmente preparada para o simulado, não é?"
32080-8 = "Sim. Só faltam dois dias para o Segundo Exame Acadêmico Especial, e não posso continuar deixando todos preocupados."
32080-13 = "E desta vez, com certeza...!"
32080-14 = "N-nossa, você está muito determinada..."
32080-15 = "Já revisei as questões previstas para a prova várias vezes. Minha preparação está perfeita."
32080-16 = "E-eu também não vou perder! Vou mostrar o poder de uma elite do Comitê de Justiça!"
32080-17 = "Então, eu também me esforçarei ao máximo, certo? ♡"
32080-18 = "[s] \"Pessoal, vocês estão todas bem animadas.\""
32080-22 = "Sim...! Já que estamos com esse ânimo, que tal começarmos o simulado agora mesmo?"
32080-24 = "3º Simulado do Clube de Reforço Escolar"
32080-26 = "[ns] \"Então, comecem!\""
32080-30 = "……."
32080-33 = "Fufu... ♡"
32080-36 = "I-isso, eu deveria saber...! Hum, vejamos, hummm...!"
32080-40 = "(De alguma forma, parece que a velocidade com que todas estão escrevendo aumentou desde a última vez...!)"
32080-44 = "(O simulado terminou e os resultados de todas foram divulgados.)"
32080-45 = "Sensei... por favor, anuncie os resultados!"
32080-46 = "[s] Anunciar os resultados do teste."
32080-50 = "Resultados do 3º Simulado do Clube de Reforço Escolar —"
32080-52 = "Hanako — 69 pontos [007eff](Aprovada)[-]"
32080-54 = "Azusa — 73 pontos [007eff](Aprovada)[-]"
32080-56 = "Koharu — 61 pontos [007eff](Aprovada)[-]"
32080-58 = "Hifumi — 75 pontos [007eff](Aprovada)[-]"
32080-60 = "N-nós conseguimos...!?"
32080-61 = "S-sério mesmo!? Não está mentindo!?"
32080-62 = "……!"
32080-63 = "Ora, ora ♡"
32080-68 = "Incrível! Azusa-chan, você não só passou dos 60, como superou os 70 pontos! É realmente incrível! Você se esforçou muito...!"
32080-69 = "……Sim!"
32080-70 = "Koharu-chan também! Foi por pouco, mas é uma aprovação inquestionável! Incrível, vocês conseguiram!"
32080-71 = "I-isso não é um sonho, né...? S-sério mesmo...!"
32080-72 = "Ah... e-esse é o meu verdadeiro poder! Viram só!!"
32080-73 = "Sim! Isso é que é uma elite do Comitê de Justiça, como esperado!"
32080-74 = "E a Hanako-chan também..."
32080-75 = "……Tive sorte, ufufu. É um número bem agradável ♡"
32080-76 = "Que bom... Hanako-chan, uuu..."
32080-77 = "H-Hifumi-chan...?"
32080-78 = "Eu ainda não sei o que aconteceu com a Hanako-chan no passado ou o que ela está carregando... mas, ainda assim, fico feliz..."
32080-79 = "Hifumi-chan... sim, obrigada."
32080-80 = "Eu vou te ajudar a recuperar seu desempenho anterior. De verdade, estou muito, muito feliz..."
32080-81 = "Sim... me desculpe. Por ter deixado vocês preocupadas..."
32080-83 = "……Sendo assim, conforme prometido, vamos começar a cerimônia de entrega dos brindes da Momo Friends!"
32080-87 = "……!!!"
32080-88 = "Ahaha..."
32080-89 = "……。"
32080-90 = "Vamos, podem pegar! Podem escolher livremente a criança que quiserem, a que desejarem!"
32080-91 = "Entendo, nesse caso...! Hum...!"
32080-92 = "Bem, eu vou declinar respeitosamente."
32080-93 = "E-eu também..."
32080-94 = "A-ah... é mesmo, é...?"
32080-95 = "O-o que eu faço... eu, eu...!"
32080-96 = "Não dá, escolher um só entre todos esses é difícil demais...!"
32080-97 = "Aquele preto com chifres é bom, e o hipopótamo de óculos também...!"
32080-98 = "N-não é um hipopótamo, o Peroro-sama é um pássaro..."
32080-99 = "O que eu faço... escolher entre um desses dois, para mim é...!"
32080-100 = "Para mim, é impossível... Por favor, Hifumi. Escolha por mim..."
32080-101 = "E-eu?"
32080-102 = "Bem, são o Skullman e o Doutor Peroro, né. Se eu tivesse que escolher um..."
32080-106 = "……。"
32080-110 = "Então, que tal este, o inteligente Doutor Peroro!"
32080-111 = "...! Certo, então vai ser esse!"
32080-112 = "Na verdade, a história desse Doutor Peroro é que ele é muito culto e bom nos estudos."
32080-113 = "Acho que combina perfeitamente com a Azusa-chan, que está se esforçando tanto nos estudos e crescendo muito agora!"
32080-114 = "Entendo, é mesmo."
32080-115 = "Bem, tem um detalhe oculto de que ele ficou um pouco estranho por estudar demais, mas..."
32080-116 = "[s] \"Que bom, Azusa.\""
32080-117 = "Sim, eu gostei. É muito fofo, adorei. Ehehe..."
32080-118 = "Obrigada, Hifumi. Vou cuidar disso para sempre."
32080-119 = "A-agradeço, mas ouvir isso me deixa um pouco surpresa...! Mas fico feliz também. Isso é porque você se esforçou muito, Azusa-chan."
32080-120 = "Sim. Mas, ao mesmo tempo, é o primeiro presente que ganhei de uma amiga..."
32080-121 = "De agora em diante, vou cuidar desse hipopótamo como se fosse a Hifumi!"
32080-122 = "I-isso é um pouco vergonhoso...! E, além disso, não é um hipopótamo, é um pássaro...!"
32080-126 = "Hum... o mundo dos hobbies é vasto, não é."
32080-127 = "……。"
32080-129 = "（O moral de todos estava alto, e os estudos continuaram em um bom clima.）"
32080-133 = "（E o tempo foi passando...）"
32080-135 = "……Finalmente é amanhã."
32080-136 = "S-sim..."
32080-137 = "O 2º Exame Especial de Aproveitamento Escolar."
32080-138 = "Fufu... parece que passou num piscar de olhos, não é?"
32080-139 = "Sim... foi um período curto de uma semana, mas acumulamos esforços de verdade. Acredito que isso não será em vão."
32080-140 = "O resultado do simulado também foi bom... com o nosso nível atual, devemos conseguir passar no 2º Exame Especial de Aproveitamento Escolar!"
32080-141 = "Mas não podemos nos acomodar, temos que nos esforçar até o fim! Vamos dar o nosso melhor por mais um dia!"
32080-142 = "Sim, claro. Vou me esforçar para tirar 100."
32080-143 = "E-eu também!"
32080-144 = "Ora, então eu também vou nessa... fufu♡"
32080-148 = "E-eu acho difícil tirar 100, mas... d-de qualquer forma!"
32080-149 = "Vamos estudar com tudo no último dia também!"
32080-150 = "[s] \"Certo, vamos dar o nosso melhor!\""
32080-153 = "……Estava à sua espera. Quanto tempo, Sensei."
32080-154 = "Como tem passado desde então? Como está o acampamento? Houve algum problema?"
32080-155 = "[s] \"Sim, graças a você, tudo bem. Mas qual o motivo da visita hoje?\""
32080-156 = "Fufu... este acampamento, por assim dizer, foi originalmente planejado para que eu pudesse \"observar melhor os alunos\"."
32080-157 = "É sobre isso, como tem sido? Descobriu algo interessante?"
32080-158 = "Devo ser mais direta? Quem você acha que é o \"traidor da Trinity\"?"
32080-159 = "[s] \"……Vai ser como antes, eu vou lidar com isso do meu jeito.\""
32080-160 = "……É verdade. É que, com o 2º Exame Acadêmico Especial se aproximando, eu queria confirmar isso mais uma vez."
32080-161 = "Por isso pedi para você vir aqui hoje."
32080-162 = "……Provavelmente, a Mika também entrou em contato com você, não foi?"
32080-167 = "O que vocês conversaram…… se não se importar, poderia me contar?"
32080-169 = "Próximo episódio: Mão Negra"
