[translation]
70014020-1 = "The Apothecary's Wanderings (2)"
70014020-2 = "……."
70014020-3 = "Why should I?"
70014020-4 = "What do I stand to gain from that?"
70014020-5 = "This house will be mine soon enough."
70014020-6 = "The outcome won't change whether I cure them or not.#nIn fact, curing them might even be a loss for me."
70014020-7 = "[s1] \"Well, you never know until you try, right?\"\n[s2] \"How about this: if you do it, I'll grant you one favor.\""
70014020-10 = "Oh...?"
70014020-11 = "It’s not my place to say, but—"
70014020-12 = "Are you out of your mind?"
70014020-13 = "[s3] \"But I'm doing this for the sake of my student...\"\n[s4] \"That's so mean!\""
70014020-16 = "...A student, huh."
70014020-17 = "Still..."
70014020-18 = "...Heh. Fine, have it your way."
70014020-19 = "But be careful. The weight of a promise... is heavier than you can imagine."
70014020-25 = "(Kai takes several medicinal ingredients out of their bag—)"
70014020-26 = "(And after a process that defies explanation, they finish making something.)"
70014020-27 = "(And then...)"
70014020-30 = "Oh, oh...!? My joints...!"
70014020-31 = "It’s not fully healed yet, but you should be fine in a week."
70014020-32 = "If it flares up again, take this."
70014020-36 = "However, as an 'apothecary,' I do not recommend taking it if you have no symptoms."
70014020-37 = "Thank you... thank you so much..."
70014020-38 = "To be cured so easily... it makes me wonder why the symptoms lasted so long in the first place..."
70014020-39 = "……."
70014020-41 = "[ns5] \"W-well, that's! It must be the medicine Kai prescribed...!\"\n[ns6] \"The new prescription must have worked perfectly!\"\n[ns7] \"It finally started taking effect, didn't it...?\""
70014020-45 = "I see... is that so? Kai, thank you so much..."
70014020-46 = "Yeah."
70014020-47 = "Ho ho... I don't know how long it's been since my body felt this light. I can even walk down the stairs now."
70014020-48 = "Maybe I'll go out for a stroll for the first time in a while."
70014020-53 = "[ns] \"Impressive...\""
70014020-54 = "It’s only natural. If the symptoms hadn't improved, I would have been furious."
70014020-55 = "[s8] \"You don't mean because it didn't get cured, right?\"\n[s9] \"Is it because that would mean Kai was wrong...?\""
70014020-58 = "You think you have me all figured out, don't you?"
70014020-59 = "I loathe my own mistakes. As a doctor and an apothecary, that is only natural."
70014020-60 = "That is why, now that the old man's illness is cured, I feel nothing. #nWhat was meant to happen, happened. That is all."
70014020-61 = "But, well..."
70014020-62 = "……."
70014020-63 = "This, in itself, isn't so bad."
70014020-64 = "Now. That aside."
70014020-69 = "I believe it's time for you to fulfill your promise."
70014020-70 = "Hm? You want me to wait a moment?"
70014020-71 = "You aren't planning on breaking your promise, are you..."
70014020-75 = "……."
70014020-76 = "Ah, come to think of it. You had some business to attend to, didn't you? #nThis isn't exactly a place suited for a Sensei."
70014020-77 = "So, what is the reason?"
70014020-81 = "[ns] \"I want to see what kind of place the Black Market is.\""