[translation]#[Texto Final. - Filipe 08/07.]
70014020-1 = "A Andança do Farmacêutico (2)"
70014020-2 = "……"
70014020-3 = "Por que eu?"
70014020-4 = "O que eu ganho com isso?"
70014020-5 = "A casa será minha em breve."
70014020-6 = "Curar ou não curar não muda o resultado.#nNa verdade, curar pode até me fazer perder."
70014020-7 = "[s1] \"Bom, você nunca sabe até tentar.\"\n[s2] \"E como agradecimento, eu atendo um pedido seu. Que tal?\""
70014020-10 = "Ora……?"
70014020-11 = "Não é algo que eu devesse dizer, mas――"
70014020-12 = "Você está bem da cabeça?"
70014020-13 = "[s3] \"É pelo bem da aluna……\"\n[s4] \"Que isso!\""
70014020-16 = "……Aluna, é."
70014020-17 = "Ainda……"
70014020-18 = "……Kuku. Está bem."
70014020-19 = "Mas cuidado. O peso de uma promessa é maior do que você imagina."
70014020-25 = "(Kai pegou alguns ingredientes da bolsa――)"
70014020-26 = "(depois de um processo que não entendi, preparou algo)"
70014020-27 = "(E……)"
70014020-30 = "O-oh……! Minhas articulações……!"
70014020-31 = "Não está completamente curada, mas em uma semana deve melhorar."
70014020-32 = "Se voltar a piorar, tome isso."
70014020-36 = "Mas, como farmacêutico, não recomendo tomar sem sintomas."
70014020-37 = "Obrigado…… muito obrigado mesmo……"
70014020-38 = "Foi tão rápido que……#naté me pergunto por que sofri tanto tempo……"
70014020-39 = "……"
70014020-41 = "[ns5] \"B-bem! Foi a combinação do remédio que a Kai vinha dando……!\"\n[ns6] \"com a nova receita que deu certo!\"\n[ns7] \"Finalmente fez efeito…… não é?\""
70014020-45 = "É mesmo…… é isso mesmo. Kai, muito obrigado mesmo……"
70014020-46 = "Sim."
70014020-47 = "Hohoho…… faz tempo que não me sentia tão leve. Até consigo descer escadas."
70014020-48 = "Que tal dar um passeio depois de tanto tempo?"
70014020-53 = "[ns] \"Impressionante……\""
70014020-54 = "É óbvio. Se não tivesse melhorado, eu estaria furioso."
70014020-55 = "[s8] \"Isso não é porque não curou, né?\"\n[s9] \"É porque isso significaria que você errou……?\""
70014020-58 = "Você fala como se entendesse."
70014020-59 = "Eu odeio meus próprios erros. Como médico e farmacêutico, é natural."
70014020-60 = "Por isso, ver a velha curada não me traz nenhuma emoção.#nApenas o que devia acontecer, aconteceu."
70014020-61 = "Mas, bem……"
70014020-62 = "……"
70014020-63 = "Também não é ruim."
70014020-64 = "E agora, mudando de assunto."
70014020-69 = "Hora de cumprir sua promessa."
70014020-70 = "Hmm? Espera um pouco."
70014020-71 = "Não me diga que vai quebrar a promessa……"
70014020-75 = "……"
70014020-76 = "Ah, é mesmo. Você tinha algum assunto por aqui.#nEste lugar não combina com o Sensei."
70014020-77 = "Então, qual o motivo?"
70014020-81 = "[ns] \"Quero saber que tipo de lugar é o Mercado Negro.\""