[translation]
2004305-1 = "幸せの証拠"
2004305-2 = "（イズミが教えてくれた場所に向かうと……）"
2004305-12 = "（屋上に到着した）"
2004305-21 = "（イズミが駆け寄って抱きついてきた！）"
2004305-24 = "先生～、待ってたよ！"
2004305-25 = "[s] \"おまたせ、イズミ。\""
2004305-26 = "えへへ、ここ、ちょっと変わった公園だよね。"
2004305-27 = "先月新しくオープンしたばかりなんだって！"
2004305-28 = "普通の公園は緑が多いんだけど、ここはちょっと違ってて……。"
2004305-29 = "人工の川があったりするの！"
2004305-30 = "本当は川沿いに作りたかったらしいんだけど……。"
2004305-31 = "うまく土地の確保ができなかったから、屋上に作ることにしたいんだって！"
2004305-32 = "見て！#n川、すっごく広いね！"
2004305-36 = "……くしゅんっ！"
2004305-37 = "えへへ、やっぱ屋上はちょっと冷えるね。"
2004305-41 = "あ、でも大丈夫だよ！私は全然平気！"
2004305-42 = "それに、ほら……ここは高いところにあるから空気がきれいなんだ。"
2004305-43 = "[s] \"うん。開放的で気持ちいいね。\""
2004305-44 = "でしょでしょ！見慣れた町並みもこんな風に……。"
2004305-45 = "見る場所や角度が変わるだけで……。"
2004305-46 = "まるで別世界に来たみたい！#n新鮮だよね！"
2004305-47 = "あ、そうだ……忘れちゃってた。#n先生をここに呼んだのはね――"
2004305-51 = "じゃーん！お弁当を作ってみました！"
2004305-52 = "[s] \"あれ？おせちじゃないんだね？\""
2004305-53 = "お正月といえばおせち料理だけど、続くと飽きちゃうでしょ？"
2004305-54 = "なので、この重箱に色んなお正月料理を集めてみたの！"
2004305-55 = "甘いミルク粥、バナナの葉で包んだお餅、そして豚足のオーブン焼き！"
2004305-56 = "デザートには、ドライフルーツやスパイス、ナッツを詰めたミンスパイもあるよ！"
2004305-57 = "ミルク粥は弱火で牛乳を温めた後に、砕いたお米を入れて煮込むんだって。"
2004305-58 = "最後にお砂糖とシナモンをちょっと加えたら、美味しくなるんだ！"
2004305-59 = "バナナの葉で包んだお餅は、厄を払う力があるって言われててね……。"
2004305-60 = "四角いお餅の中に、豚肉と緑豆を詰めて食べるんだ！"
2004305-61 = "豚足のオーブン焼きはいつでも食べられる料理だけど……。"
2004305-62 = "新年は、特に腕によりをかけて作るんだって！"
2004305-63 = "最後にミンスパイはね、クリスマスによく食べるデザートなんだけど……。"
2004305-64 = "クリスマスから1月6日まで毎日一つずつ食べると、幸運が訪れるんだって！"
2004305-65 = "[s] \"イズミは食べないの？\""
2004305-69 = "私は大丈夫。先生に食べてもらいたいな。"
2004305-75 = "これは先生のために用意したお弁当だからね！"
2004305-78 = "[wa:460]― [log=이즈미 새해]あのね、先生。[/log]"
2004305-81 = "― [log=이즈미 새해]お正月の料理って、[/log]"
2004305-83 = "― [log=이즈미 새해]おせちの他にも[wa:1380]いろいろあるんだって！[/log]"
2004305-86 = "― [log=이즈미 새해]だから、[wa:930]い～っ[wa:830]ぱい用意してみたの！[/log]"
2004305-89 = "[wa:600]― [log=이즈미 새해]私？[wa:1320]私は……[/log]"
2004305-92 = "― [log=이즈미 새해]先生が食べてるとこ、[wa:1615]見てるだけで幸せだよ？[/log]"
2004305-95 = "[wa:410]― [log=이즈미 새해]あとは……[wa:900]先生とこうして[/log]"
2004305-98 = "― [log=이즈미 새해]二人でいられたら[wa:715]それで満足！[wa:975]かな！[/log]"
2004305-101 = "[wa:525]― [log=이즈미 새해]あっ！[wa:755]えっと……[/log]"
2004305-104 = "― [log=이즈미 새해]ちょっと、[wa:865]恥ずかしいこと言っちゃった……[/log]"
2004305-107 = "[wa:600]― [log=이즈미 새해]で、[wa:400]でも！[wa:700]幸せだから！[/log]"
2004305-109 = "― [log=이즈미 새해]問題ない！[wa:1050]大丈夫！[/log]"
2004305-112 = "先生、どうだった？"
2004305-113 = "[s1] \"すごく美味しかったし、素敵だったよ。\"\n[s2] \"この景色も、イズミが用意してくれた料理も。\""
2004305-116 = "良かった！#nえへへ、嬉しい。"
2004305-117 = "別に私だっていつも変な料理ばっか食べてるわけじゃないんだからね。"
2004305-121 = "……。"
2004305-122 = "……人生ってさ、新しい出会いの連続だと思うんだ。"
2004305-123 = "だから、もっと挑戦して、#n今まで感じたことのない味を見つけたいの。"
2004305-124 = "ちょっと変わった味覚な自覚はあるんだけどね。"
2004305-125 = "だから、先生にとっては普通かもしれないけど……特別な料理を食べてもらいたかったの。"
2004305-126 = "私は先生が美味しそうに食べてる姿を見られたら、それで幸せだからね！"
2004305-130 = "（イズミの無邪気な笑顔には……）"
2004305-131 = "（見ているこっちまで元気になるような、無限のエネルギーが詰まっている気がした……）"
2004305-132 = "[ns] \"……イズミ。\""
2004305-136 = "ん？#nどうしたの、先生？"
2004305-140 = "[ns] \"ううん……ただ何となく、楽しいなって。\""
2004305-144 = "えっ……？"
2004305-145 = "……うん、私も！"
