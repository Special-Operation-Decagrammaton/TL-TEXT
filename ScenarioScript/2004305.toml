[translation]
2004305-1 = "Prova de felicidade"
2004305-2 = "（Ao chegar no local que a Izumi me indicou...）"
2004305-12 = "（Cheguei ao terraço）"
2004305-21 = "（Izumi correu até mim e me abraçou!）"
2004305-24 = "Sensei~, eu estava te esperando!"
2004305-25 = "[s] \"Desculpe a demora, Izumi.\""
2004305-26 = "Hehe, este parque é um pouco diferente, né?"
2004305-27 = "Dizem que ele acabou de abrir no mês passado!"
2004305-28 = "Parques comuns costumam ter muito verde, mas este aqui é um pouco diferente..."
2004305-29 = "Tem até um rio artificial!"
2004305-30 = "Na verdade, parece que queriam construí-lo ao longo de um rio de verdade, mas..."
2004305-31 = "Como não conseguiram garantir o terreno, decidiram fazer no terraço!"
2004305-32 = "Olha!#nO rio é muito largo, né!"
2004305-36 = "……Atchim!"
2004305-37 = "Hehe, é que o terraço é um pouco frio mesmo."
2004305-41 = "Ah, mas não se preocupe! Eu estou super bem!"
2004305-42 = "Além disso, veja... como estamos em um lugar alto, o ar é puro."
2004305-43 = "[s] \"Sim. É aberto e muito agradável.\""
2004305-44 = "Né, né! Até a paisagem da cidade que estamos acostumados fica assim..."
2004305-45 = "Só de mudar o lugar ou o ângulo de onde olhamos..."
2004305-46 = "Parece que viemos para outro mundo!#nÉ revigorante, né!"
2004305-47 = "Ah, é verdade... eu tinha esquecido.#nEu chamei o sensei aqui porque――"
2004305-51 = "Tcharam! Eu preparei uma marmita!"
2004305-52 = "[s] \"Ué? Não é Osechi?\""
2004305-53 = "Quando se fala em Ano Novo, pensamos em Osechi, mas se comermos sempre a mesma coisa, enjoa, né?"
2004305-54 = "Por isso, juntei vários pratos de Ano Novo nesta caixa de laca!"
2004305-55 = "Mingau de leite doce, bolinho de arroz enrolado em folha de bananeira e pé de porco assado no forno!"
2004305-56 = "E de sobremesa, tem torta de frutas secas com especiarias e nozes!"
2004305-57 = "Dizem que o mingau de leite é feito aquecendo o leite em fogo baixo e depois cozinhando com arroz triturado."
2004305-58 = "No final, se adicionar um pouco de açúcar e canela, fica delicioso!"
2004305-59 = "Dizem que o bolinho de arroz enrolado na folha de bananeira tem o poder de afastar o azar..."
2004305-60 = "A gente come recheado com carne de porco e feijão-mungo dentro do bolinho quadrado!"
2004305-61 = "Pé de porco assado é um prato que dá para comer a qualquer hora, mas..."
2004305-62 = "Dizem que no Ano Novo, a gente capricha ainda mais no preparo!"
2004305-63 = "E por fim, a torta de frutas secas é uma sobremesa que costumam comer no Natal, mas..."
2004305-64 = "Dizem que se você comer uma por dia, do Natal até o dia 6 de janeiro, a sorte te visita!"
2004305-65 = "[s] \"Você não vai comer, Izumi?\""
2004305-69 = "Eu estou bem. Eu quero que o sensei coma."
2004305-75 = "Porque esta marmita foi preparada especialmente para você, sensei!"
2004305-78 = "[wa:460]― [log=이즈미 새해]Sabe, sensei.[/log]"
2004305-81 = "― [log=이즈미 새해]Pratos de Ano Novo,[/log]"
2004305-83 = "― [log=이즈미 새해]além do Osechi, [wa:1380]existem muitos outros![/log]"
2004305-86 = "― [log=이즈미 새해]Por isso, [wa:930]eu preparei [wa:830]um montão![/log]"
2004305-89 = "[wa:600]― [log=이즈미 새해]Eu?[wa:1320] Eu...[/log]"
2004305-92 = "― [log=이즈미 새해]Só de ver o sensei comendo, [wa:1615]eu já me sinto feliz.[/log]"
2004305-95 = "[wa:410]― [log=이즈미 새해]E além disso... [wa:900]poder ficar assim[/log]"
2004305-98 = "― [log=이즈미 새해]com o sensei, [wa:715]já me deixa satisfeita! [wa:975]Eu acho![/log]"
2004305-101 = "[wa:525]― [log=이즈미 새해]Ah![wa:755] Bem...[/log]"
2004305-104 = "― [log=이즈미 새해]Eu acabei de dizer [wa:865]algo meio vergonhoso...[/log]"
2004305-107 = "[wa:600]― [log=이즈미 새해]M-mas! [wa:400]Mesmo assim! [wa:700]Eu estou feliz![/log]"
2004305-109 = "― [log=이즈미 새해]Sem problemas! [wa:1050]Está tudo bem![/log]"
2004305-112 = "Sensei, como foi?"
2004305-113 = "[s1] \"Estava muito gostoso e foi maravilhoso.\"\n[s2] \"Tanto a vista quanto a comida que você preparou, Izumi.\""
2004305-116 = "Que bom!#nhehe, estou tão feliz."
2004305-117 = "Não é como se eu comesse apenas comidas estranhas o tempo todo, sabe."
2004305-121 = "……."
2004305-122 = "……Acho que a vida é uma sucessão de novos encontros."
2004305-123 = "Por isso, quero me desafiar mais e#nencontrar sabores que nunca senti antes."
2004305-124 = "Eu tenho consciência de que meu paladar é um pouco peculiar, claro."
2004305-125 = "Por isso, mesmo que para você, Sensei, possa parecer algo comum... eu queria que você experimentasse uma comida especial."
2004305-126 = "Para mim, ver você comendo com gosto já é o suficiente para me fazer feliz!"
2004305-130 = "(O sorriso inocente da Izumi...)"
2004305-131 = "(Parece transbordar uma energia infinita, daquelas que contagiam quem está olhando...)"
2004305-132 = "[ns] \"……Izumi.\""
2004305-136 = "Hm?#nO que foi, Sensei?"
2004305-140 = "[ns] \"Nada... é só que, de repente, me senti feliz.\""
2004305-144 = "Eh...?"
2004305-145 = "……Sim, eu também!"
