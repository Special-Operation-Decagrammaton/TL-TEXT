[translation]
3101-1 = "価値の証明（１）"
3101-2 = "セミナー・会議室"
3101-8 = "……うん、これで全員みたいね。"
3101-9 = "それでは……"
3101-14 = "これより第28回、ミレニアム予算審議会を開催しま～す！"
3101-19 = "今さらだけど、一応説明しておくと……この会は、各部活や委員会の研究・開発計画を検討して、来期の予算を策定する定例会議よ。"
3101-20 = "四半期ごとに開催されて、有用性や実用性が保証できる企画であれば予算を増やす……そういう形で進行するわ。"
3101-21 = "前回は……いえ、昨年同様、というべきかしら。#n何だか、変なものばっかりだったけど……。"
3101-22 = "今回こそ良いものが出てくることを祈りながら、始めましょうか。"
3101-25 = "では一つ目の審査対象……新素材開発部の「柔らかセメント」！"
3101-26 = "「柔らかセメント」……？"
3101-31 = "はい！私たち新素材開発部で新しく生み出した、特製のセメントです！"
3101-32 = "……セメントなのに柔らかいの？"
3101-33 = "皆さんご存知の通り、セメントは石灰粉と砂を混ぜて作られたもので、#nその丈夫さから主に建築などにおいて広く愛用されてきました。"
3101-35 = "ですがそんなセメントにも短所がありました……そう、固まってしまうのです！"
3101-36 = "建築物の中には、もちろん誰かが住みます。#nそうしてその誰かが壁などに衝突すると、痛い思いをしてしまいますよね？"
3101-37 = "その点この「柔らかセメント」であれば！#n壁に衝突しようと、転んで床にぶつかろうと、全然痛くないのです！"
3101-39 = "なるほど……それは確かに新しいですね。"
3101-41 = "確かに、興味深い発見ではあるけれど……。"
3101-42 = "そんな柔らかいセメントで、鉄筋とかレンガの重さに耐えられるの？"
3101-43 = "……その点は、まだ研究の余地があるかと！"
3101-47 = "そもそも、衝撃に耐えるためのセメントなのに意味無いじゃないの……。"
3101-49 = "却下、次。"
3101-54 = "そ、そんなぁ～！"
3101-55 = "良いから、次！"
3101-57 = "次は[ruby=むろかさ]室笠[/ruby]アカネさんからの提案、「究極のはたき」です。"
3101-64 = "あれ、アカネ？#n今回はC&Cからも研究企画書を……？"
3101-65 = "……C&Cの予算は、作戦に応じて用意してるじゃない。#nどうしてここにいるのよ？"
3101-66 = "これは「C&C」としてのものではなく、私個人としてのものですから。"
3101-67 = "普段はC&Cの一員として、ご奉仕とお掃除に専念する日々ですが……。"
3101-68 = "それ以前に、私も一応ミレニアムサイエンススクールのいち生徒ですので。"
3101-69 = "新しい発想を提供し、学園の技術発展に貢献できたらなと。"
3101-71 = "なるほど。創意と革新を目指すミレニアムの生徒として、模範的な姿勢ですね。"
3101-72 = "……逆にちょっと不安なんだけど。"
3101-73 = "まあ、話を聞かないわけにもいかないし……#nで、これは従来のものとどういうところが違うの？"
3101-75 = "私は今まで掃除をする時、この「はたき」を愛用してきました。"
3101-76 = "しかし時には、こういった道具だけでは取りきれない汚れに遭遇することもあります。"
3101-77 = "そのたびに別の道具を……というのも、結構手間なのです。#nいくつもの掃除用品を持ち歩くのにも限界があります。"
3101-81 = "そこで思いついたのが、この究極のはたき……#n――「圧縮ガス噴射装置付はたき」なのです！"
3101-85 = "圧縮ガス……？"
3101-86 = "はい、このボタンを押すと先端から高温の圧縮ガスが噴射できて、対象を一瞬にして燃やし尽くすことができるのです！"
3101-87 = "これを使えば、どんな汚れでも一瞬でお掃除できてしまいます。"
3101-88 = "汚れを燃やし尽くす掃除道具、ですか……。"
3101-89 = "それ、一般的に「火炎放射器」って呼ばれるものじゃないの？"
3101-90 = "あら、そうなんですか？#n斬新なアイデアだと思ったのに……。"
3101-91 = "既に存在するものだから、開発費用は出せないわ。"
3101-93 = "ということで却下、次。"
3101-95 = "次は……"
3101-99 = "あら、先日のミレニアムプライスで特別賞を受賞した「ゲーム開発部」のモモイさんからですね。"
3101-104 = "ふふっ……ユウカが例えどれだけ冷酷な算術使いだとしても、この完璧な提案書の前には為す術もないはず！"
3101-109 = "却下。"
3101-110 = "ちょっとぉ！？#nどうして話を聞く前から却下なのさ！？"
3101-111 = "だって、毎日基本的にゲームばっかりしてるあなたたちが、まともな提案書を持ってくるとは……"
3101-112 = "へ、偏見だぁ！#n私たちだって、ちゃんとやる時はやるもん！"
3101-113 = "それに今回は、最新技術を活用した#n「完璧な収益モデル」だって持ってきたんだから！"
3101-114 = "……完璧な収益モデル？"
3101-115 = "そう！これはね、ブロックチェー……なんだっけ。#nとにかく、何らかの最新技術を応用する、ゲーム企画なの！"
3101-116 = "普通にゲームをすると、ゲーム内通貨が貯まるでしょ？#nこの技術を使うと、それを現金みたいに使えるんだって。"
3101-117 = "つまり、ふふっ……寝そべってゲームをするだけでお金が稼げる……！"
3101-118 = "発想はそれっぽいわね。#n仮想通貨を使えば、ゲームマネーを安定的に現金化できるでしょうし……"
3101-119 = "それで……そのゲーム内通貨を貰って、現金を払ってくれるのは誰？"
3101-120 = "……え？"
3101-121 = "それは……セミナーで発行するとか……？"
3101-126 = "却下！"
3101-132 = "結局今回も同じね……。"
3101-133 = "そうです？個人的には面白いものも幾つかありましたが。"
3101-137 = "特に新しい高度な技術を利用した発明品は、前年比で37%も増加しました。"
3101-138 = "新しい技術だからといって、それで変なものばっかり生み出してどうするの！"
3101-139 = "はぁ……みんなどうしてこんな、実用性の無いものに本気を出せるのかしら。"
3101-140 = "研究の具体的な方針を考えるのは、私たちではなく当人のみなさんですから。"
3101-141 = "それに、一見して無意味な研究だとしても……#n実はすごい価値があったり、将来的には様々な技術の礎となる可能性もあります。"
3101-142 = "……私たちセミナーが研究している、「千年難題」のように。"
3101-143 = "……。"
3101-145 = "「セミナー」……ミレニアムの前身とも言えるこの生徒会組織。それは元々「今の技術では解けない7つの難題」に立ち向かおうとした研究者の集まり……"
3101-146 = "その難題に立ち向かうために、数多くの検証や実験が行われ……#nそれに伴って研究組織が増えていき、結果として生まれたのが#nこの「ミレニアムサイエンススクール」。"
3101-147 = "もちろん今となっては、そのことを知らない生徒の方が多いかもしれませんが……。"
3101-148 = "未だに理念としては、様々な研究はどれも「7つの難題」に繋がるかもしれない過程であり手段……それは変わっていません。"
3101-149 = "……そうね。その「可能性」に繋がるかもしれないのであれば、ミレニアムにおける全ての思考や実験は肯定されるべき。"
3101-151 = "どれがどの可能性に繋がるのかは予測不可能……とはいえ現実的に、目の前の予算については予測できるわ。"
3101-152 = "みんなの好奇心に全ベットしたら、学園は破産よ……。"
3101-153 = "ふふっ。優秀な研究者というものは、得てして費用や時間といった現実的な問題に目を向けないことも多いですからね。"
3101-154 = "だからこそ、ミレニアムにユウカちゃんみたいな会計がいて良かったなって。"
3101-155 = "……それ、もしかしてからかってる？"
3101-156 = "本当にミレニアムの財政状況を心配してくれるんだったら、もっと手伝ってくれれば良いのに。"
3101-157 = "さっきAI研究部が「起爆タイミングを自己判断する爆弾」の話をしてた時だって、ノアが味方してくれればもっと手早く……。"
3101-158 = "残念ですが、私はセミナーの「書記」なので。"
3101-159 = "優秀な書記とはいかなる状況にあっても私見を混ぜることなく、#n中立的に状況を記録するもの……ということで。"
3101-160 = "気のせいじゃなければ……。"
3101-161 = "私が不利な時にだけ、そういう態度な気がするんだけど？"
3101-162 = "さあ、どうでしょう？#n私、ユウカちゃんのこと大好きですよ。"
3101-163 = "まあ、それは知ってるけど……。"
3101-167 = "……ところで、この文書は何？"
3101-168 = "あれ、さっきの予算審議会には無かったような……？"
3101-169 = "そうね。各部活や委員会から来た要請書は一つ残らず確認したはず……。"
3101-173 = "えっと、作成者は……。"
3101-179 = "……ヴェリタスの、部長？"
