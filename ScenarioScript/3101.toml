[translation]
3101-1 = "Prova de Valor (1)"
3101-2 = "Seminário - Sala de Reuniões"
3101-8 = "……Certo, parece que estão todos aqui."
3101-9 = "Então……"
3101-14 = "Daremos início agora à 28ª Assembleia de Orçamento do Millennium!"
3101-19 = "Embora seja um pouco tarde para explicar, esta reunião serve para analisar os planos de pesquisa e desenvolvimento de cada clube e comitê, a fim de definir o orçamento para o próximo período."
3101-20 = "Ela é realizada trimestralmente, e se o projeto puder garantir utilidade e viabilidade, o orçamento será aumentado…… é assim que prosseguiremos."
3101-21 = "Da última vez…… não, talvez eu devesse dizer, como no ano passado. #nDe alguma forma, só apareceram coisas estranhas……"
3101-22 = "Vamos começar, rezando para que desta vez surja algo bom."
3101-25 = "Então, o primeiro item de avaliação…… o \"Cimento Macio\" do Departamento de Desenvolvimento de Novos Materiais!"
3101-26 = "\"Cimento Macio\"……?"
3101-31 = "Sim! É um cimento especial que nós, do Departamento de Desenvolvimento de Novos Materiais, criamos!"
3101-32 = "……Mas se é cimento, como pode ser macio?"
3101-33 = "Como todos sabem, o cimento é feito misturando pó de calcário e areia, #ne devido à sua resistência, tem sido amplamente utilizado principalmente na construção civil."
3101-35 = "Mas esse cimento também tinha suas desvantagens…… sim, ele endurece!"
3101-36 = "Claro que alguém vai morar dentro de uma construção. #nE se essa pessoa colidir contra uma parede, ela vai se machucar, não é?"
3101-37 = "Nesse ponto, com este \"Cimento Macio\"! #nSeja colidindo contra a parede ou caindo no chão, não dói nada!"
3101-39 = "Entendo…… isso é certamente algo novo."
3101-41 = "De fato, é uma descoberta interessante, mas……"
3101-42 = "Com um cimento tão macio, ele consegue suportar o peso de vergalhões ou tijolos?"
3101-43 = "……Quanto a isso, acho que ainda há espaço para pesquisas!"
3101-47 = "Para começo de conversa, não faz sentido ser um cimento feito para resistir a impactos se ele não aguenta nada……"
3101-49 = "Rejeitado, próximo."
3101-54 = "N-não pode ser……!"
3101-55 = "Já chega, próximo!"
3101-57 = "O próximo é uma proposta da Akane Murokasa, o \" espanador definitivo\"."
3101-64 = "Ué, Akane? #nDesta vez, o C&C também enviou um plano de pesquisa……?"
3101-65 = "……O orçamento do C&C já é preparado de acordo com as operações. #nPor que você está aqui?"
3101-66 = "Isto não é algo do \"C&C\", é uma proposta minha, como indivíduo."
3101-67 = "No dia a dia, como membro do C&C, dedico-me ao serviço e à limpeza……"
3101-68 = "Mas, antes disso, também sou uma aluna da Millennium Science School."
3101-69 = "Gostaria de oferecer uma nova ideia e contribuir para o desenvolvimento tecnológico da academia."
3101-71 = "Entendo. Como uma aluna da Millennium que busca criatividade e inovação, essa é uma postura exemplar."
3101-72 = "……Pelo contrário, isso me deixa um pouco preocupada."
3101-73 = "Bem, não posso deixar de ouvir a proposta…… #ne então, o que isso tem de diferente dos convencionais?"
3101-75 = "Até hoje, quando faço a limpeza, sempre usei este \"espanador\"."
3101-76 = "No entanto, às vezes encontro sujeiras que não podem ser removidas apenas com ferramentas como esta."
3101-77 = "Ter que usar outra ferramenta a cada vez…… é bastante trabalhoso. #nE há um limite para quantos produtos de limpeza posso carregar."
3101-81 = "Foi então que pensei neste espanador definitivo…… #n――O \"Espanador com Dispositivo de Injeção de Gás Comprimido\"!"
3101-85 = "Gás comprimido……?"
3101-86 = "Sim, ao apertar este botão, ele pode ejetar gás comprimido de alta temperatura pela ponta, incinerando o alvo instantaneamente!"
3101-87 = "Com isso, qualquer sujeira pode ser limpa em um instante."
3101-88 = "Uma ferramenta de limpeza que incinera a sujeira, é……"
3101-89 = "Isso não é o que geralmente chamam de \"lança-chamas\"?"
3101-90 = "Ora, é mesmo? #nPensei que fosse uma ideia inovadora……"
3101-91 = "Como isso já existe, não posso liberar verba para o desenvolvimento."
3101-93 = "Sendo assim, rejeitado, próximo."
3101-95 = "O próximo é……"
3101-99 = "Ah, é da Momoi, do \"Departamento de Desenvolvimento de Jogos\", que recebeu um prêmio especial no Millennium Prize outro dia."
3101-104 = "Hehe…… Yuuka, não importa o quão implacável você seja com seus cálculos, diante desta proposta perfeita, você não terá como escapar!"
3101-109 = "Rejeitado."
3101-110 = "O quêêê!?#nPor que você rejeitou antes mesmo de ouvir o que a gente tinha a dizer!?"
3101-111 = "Porque, considerando que vocês passam o dia inteiro basicamente só jogando, é difícil acreditar que trariam uma proposta decente..."
3101-112 = "I-Isso é preconceito!#nA gente também sabe trabalhar quando precisa!"
3101-113 = "Além disso, desta vez trouxemos um \"modelo de lucro perfeito\" que utiliza a tecnologia mais recente!"
3101-114 = "……Um modelo de lucro perfeito?"
3101-115 = "Isso! É tipo, blockchain... ou algo assim.#nEnfim, é um projeto de jogo que aplica alguma tecnologia de ponta!"
3101-116 = "Se você joga normalmente, acumula moeda dentro do jogo, certo?#nDizem que, usando essa tecnologia, dá para usar isso como se fosse dinheiro real."
3101-117 = "Ou seja, hehe... dá para ganhar dinheiro só ficando deitada jogando...!"
3101-118 = "A ideia até que faz sentido. Se usarem criptomoedas, talvez consigam converter o dinheiro do jogo em dinheiro real de forma estável..."
3101-119 = "E então... quem é que vai receber essa moeda do jogo e pagar o dinheiro real?"
3101-120 = "……Hã?"
3101-121 = "Seria... emitido pelo Seminar ou algo do tipo...?"
3101-126 = "Rejeitado!"
3101-132 = "No fim, tudo acaba do mesmo jeito..."
3101-133 = "Você acha? Pessoalmente, achei que algumas coisas eram interessantes."
3101-137 = "Especialmente as invenções que utilizam novas tecnologias avançadas, que aumentaram 37% em relação ao ano passado."
3101-138 = "Só porque é uma tecnologia nova, não significa que vocês devam ficar criando um monte de coisas estranhas!"
3101-139 = "Ai... por que todo mundo se esforça tanto em coisas que não têm utilidade prática?"
3101-140 = "Afinal, quem decide as diretrizes concretas das pesquisas não somos nós, mas os próprios pesquisadores."
3101-141 = "Além disso, mesmo que uma pesquisa pareça sem sentido à primeira vista...#npode ser que ela tenha um valor incrível ou que, no futuro, se torne a base para várias outras tecnologias."
3101-142 = "……Assim como os \"Sete Mistérios\" que nós do Seminar estamos pesquisando."
3101-143 = "……."
3101-145 = "O \"Seminar\"... essa organização do conselho estudantil que pode ser considerada a precursora do Millennium. Originalmente, era um grupo de pesquisadores que tentavam enfrentar os \"7 mistérios que a tecnologia atual não consegue resolver\"..."
3101-146 = "Para enfrentar esses mistérios, inúmeras verificações e experimentos foram realizados...#ne, com isso, as organizações de pesquisa foram crescendo, e o resultado foi a criação desta \"Millennium Science School\"."
3101-147 = "Claro, hoje em dia, talvez a maioria dos alunos não saiba disso..."
3101-148 = "Mas, como filosofia, todas as pesquisas ainda são processos e meios que podem levar aos \"7 mistérios\"... isso não mudou."
3101-149 = "……É verdade. Se existe a possibilidade de levar a essa \"possibilidade\", então todos os pensamentos e experimentos no Millennium devem ser validados."
3101-151 = "É impossível prever qual levará a qual possibilidade... embora, realisticamente, eu consiga prever o orçamento que temos à frente."
3101-152 = "Se eu apostar tudo na curiosidade de todo mundo, a escola vai à falência..."
3101-153 = "Hehe. Pesquisadores brilhantes, muitas vezes, não prestam atenção em problemas realistas como custos e tempo, não é?"
3101-154 = "É por isso que fico feliz por ter uma contadora como a Yuuka-chan no Millennium."
3101-155 = "……Isso foi um deboche?"
3101-156 = "Se você realmente se preocupa com a situação financeira do Millennium, deveria me ajudar mais."
3101-157 = "Até agora pouco, quando o Clube de Pesquisa de IA estava falando sobre a \"bomba que decide o próprio tempo de detonação\", se a Noa tivesse ficado do meu lado, teria sido muito mais rápido..."
3101-158 = "Sinto muito, mas eu sou a \"secretária\" do Seminar."
3101-159 = "Uma secretária excelente é aquela que, em qualquer situação, não mistura opiniões pessoais e registra os fatos de forma neutra... é isso."
3101-160 = "Se não for impressão minha..."
3101-161 = "Parece que você só age assim quando eu estou em desvantagem, não é?"
3101-162 = "Ora, quem sabe?#nEu adoro a Yuuka-chan, sabia?"
3101-163 = "Bom, disso eu já sei, mas..."
3101-167 = "……A propósito, o que é este documento?"
3101-168 = "Ué, não me lembro de ter visto isso na reunião de orçamento de agora pouco...?"
3101-169 = "Pois é. Eu deveria ter conferido cada pedido enviado por todos os clubes e comitês..."
3101-173 = "Hum, o autor é..."
3101-179 = "……A presidente do Veritas?"
