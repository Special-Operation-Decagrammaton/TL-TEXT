[translation]
1014002-1 = "警戒するキツネ"
1014002-2 = "シャーレ・執務室"
1014002-3 = "（当番のためクルミがシャーレを訪れた）"
1014002-4 = "[ns1] \"いらっしゃい、クルミ！\"\n[ns2] \"待ってたよ！\""
1014002-7 = "おはよう、先生。"
1014002-8 = "それで……今日は何をすればいいの？"
1014002-9 = "[s] \"新作のシューティングゲーム！\""
1014002-10 = "……はぁ？"
1014002-11 = "何言ってんの？昨日も残業でヒーヒー言ってたくせに。"
1014002-12 = "ちゃんと仕事して！"
1014002-13 = "報告書くらい私も手伝うから。"
1014002-14 = "[s] \"ひどいなぁ！\""
1014002-15 = "酷いのは先生のやる気のほうでしょ！"
1014002-17 = "（クルミと楽しくシャーレの仕事をこなしていると……）"
1014002-23 = "ごめんください。[USERNAME]先生はいらっしゃいますか？"
1014002-24 = "[s] \"どちら様でしょうか……？\""
1014002-25 = "あ、先日、駅前のコンビニで先生にお世話になった者です。"
1014002-26 = "バイトの子が急に暴れてコンビニを占拠したりパンを食い荒らしたりして……どうしようかと悩んでいたところ、先生が助けてくださったじゃないですか。"
1014002-27 = "あのときのお礼をしたく……。"
1014002-28 = "[s] \"私が、ですか？すみません、記憶になくて……。\""
1014002-29 = "ええ。先生が直々にあの子を説得して、店の整理を手伝ってくださりましたよ。"
1014002-30 = "普段色んな事件を解決しているのですから、覚えていないのも分かりますが……。"
1014002-34 = "……。"
1014002-36 = "つまらないものですが、お礼のお菓子です。どうぞ受け取ってください。"
1014002-37 = "[s3] \"ありがとうございます。いただきますね。\"\n[s4] \"いえ。お気持ちだけで十分です。\""
1014002-39 = "いえいえ、ぜひお礼させてください。"
1014002-40 = "[s5] \"ですが……。\""
1014002-41 = "私に免じてどうか……！"
1014002-42 = "[s6] \"では、ありがたくいただきますね。\""
1014002-43 = "ふふ、先生に少しでも恩返しできてよかったです。"
1014002-44 = "今度は別のお礼品を持ってお伺いしますね。"
1014002-45 = "では！"
1014002-49 = "…………。"
1014002-50 = "知ってる人？"
1014002-51 = "[s7] \"さあ。どうだろう。\"\n[s8] \"覚えてはいないけど、前にお手伝いしたことあったかも。\""
1014002-54 = "はぁ？よく知らない人をシャーレに通したの？"
1014002-55 = "悪い人だったらどうするのよ！"
1014002-56 = "[s] \"まっさか～\""
1014002-60 = "[ns] \"それにクルミがそばについているし。\""
1014002-61 = "もちろん私なら隙を与えることなく制圧できるけど――"
1014002-62 = "いや、いくらなんでもガバガバすぎじゃない？"
1014002-63 = "私がいなかったらどうしたのよ……？"
1014002-64 = "[s9] \"見て、クルミ。さっきは気づいてなかったけど――\"\n[s10] \"パッケージも高級で、なんだかすごく美味しそう。\""
1014002-67 = "たしかに高そうなお菓子には見えるわね。"
1014002-68 = "でも市販品じゃなくて、手作りだったら――"
1014002-69 = "[s] \"いただきま～す。\""
1014002-70 = "待って！"
1014002-71 = "先生！知らない相手からもらったものを、そう簡単に口に入れていいの？"
1014002-72 = "[s] \"……え、ダメだった？\""
1014002-73 = "当然でしょ！先生はキヴォトスのVIPなのよ？"
1014002-74 = "相手が悪意を持って何か仕込んでたらどうするつもり？"
1014002-75 = "裏社会だったら、交渉のために自白剤とか毒を盛ることだってあるのよ。"
1014002-76 = "[USERNAME]先生の身に起きないとも限らないじゃない。"
1014002-77 = "もっと危機感を持って、周りを警戒しなさい。"
1014002-78 = "自分がいかに大事な存在なのか、ちゃんと自覚したほうがいいわよ。"
1014002-79 = "[s11] \"それも一理あるけど……。\"\n[s12] \"でもそれじゃ、生徒の信頼を得られにくくなっちゃうし。\""
1014002-82 = "ダメ。私は連邦生徒会長から、先生の安全を守るよう命令されているの。"
1014002-83 = "例外はないわ。事故の大半は例外から発生するんだから。"
1014002-88 = "[ns] \"……じゃあ、クルミが手伝ってくれる？\""
1014002-89 = "わ、私が？どうやって？"
1014002-90 = "[s13] \"このお菓子を、クルミが先に食べてみて。\"\n[s14] \"クルミが大丈夫なら、私が食べても安全ってことになるんじゃない？\""
1014002-93 = "毒見ね……まあ、いいけど。"
1014002-94 = "でもそれなら、他の隊員でも――"
1014002-95 = "[s15] \"お願い、クルミ！\"\n[s16] \"私の安全は、クルミにしか任せられないんだ！\""
1014002-98 = "ふ、ふんっ。仕方ないわね。そこまで言うのならやってやるわ。"
1014002-99 = "これを先に食べればいいのよね？"
1014002-103 = "[ns] \"……どう？\""
1014002-104 = "……おいしい。"
1014002-105 = "高級バターをふんだんに使ってるのか、口の中でとろけて……絶品だわ。"
1014002-106 = "あ、毒はないわ。このクッキーなら食べて大丈夫よ。"
1014002-107 = "[s] \"よかった……問題なくて。\""
1014002-111 = "[ns17] \"他にもプレゼントがたくさんあるけど――\"\n[ns18] \"よかったら、他のも確認してくれる？\""
1014002-114 = "そ、そんなにあるの……？"
1014002-115 = "もちろん構わないわ！私は先生の護衛だもの！"
1014002-117 = "（その後、クルミと一緒にシャーレにある様々なプレゼントを確認しにいった）"
1014002-119 = "これは、茶葉……？"
1014002-120 = "まあ、お茶に毒を盛るのは定番のやり方ね。"
1014002-121 = "どれどれ……。"
1014002-125 = "うん、問題ないわ。安心して飲んで大丈夫よ。"
1014002-128 = "こ、これはトリニティでも滅多にない「ミラクル5000」ケーキ！？どうやって手に入れたの？"
1014002-129 = "あ、試食するわね。"
1014002-134 = "わぁ……最高においしい。こんなの初めて。"
1014002-138 = "こ、これも問題ないわ！"
1014002-140 = "はぁ？香水に毒がないか嗅いでみてほしい？"
1014002-141 = "ま、まあ、その可能性もなくはないし……分かったわ。"
1014002-145 = "いい匂い……ウッドの香りがして、緊張がほぐれる……。"
1014002-146 = "こっちも問題ないわ。\nでも先生、これ本当に毒見で合っ――"
1014002-147 = "[s] \"今度はこっちだよ！\""
1014002-152 = "シャーレ・宿直室"
1014002-155 = "こ、ここは寝室でしょ？"
1014002-156 = "な、なにをするつもり！？"
1014002-157 = "[s19] \"今度新しく枕を買ってね。\"\n[s20] \"横になって確かめてくれる？\""
1014002-163 = "……騙された。"
1014002-164 = "あれこれ味見してて、全然気づいてなかったけど……。"
1014002-165 = "毒見を言い訳に、仕事をサボってるじゃない！"
1014002-166 = "[s] \"おっと、バレたか。\""
1014002-167 = "早く仕事に戻りなさい！"
1014002-169 = "（その後、やや怒ってしまったクルミと一緒にシャーレの仕事を片付けた）"
