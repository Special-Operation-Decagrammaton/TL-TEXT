[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1014002-1 = "Uma Raposa Alerta" 
1014002-2 = "Schale - Escritório" 
1014002-3 = "（Kurumi veio à Schale\npara o seu turno de ajudante.）" 
1014002-4 = "[ns1] \"Seja bem-vinda, Kurumi!\"\n[ns2] \"Eu estava te esperando!\"" 
1014002-7 = "Bom dia, Sensei." 
1014002-8 = "E então……\nO que eu devo fazer hoje?" 
1014002-9 = "[s] \"Jogar o novo jogo de tiro!\"" 
1014002-10 = "……Hã?" 
1014002-11 = "O que você está falando?\nAté ontem você estava choramingando por causa das horas extras." 
1014002-12 = "Trate de trabalhar direito!" 
1014002-13 = "Eu posso até te ajudar\ncom os relatórios." 
1014002-14 = "[s] \"Que crueldade!\"" 
1014002-15 = "Cruel é essa\nsua falta de vontade de trabalhar!" 
1014002-17 = "（Enquanto eu me divertia terminando as tarefas\nda Schale com a Kurumi……）" 
1014002-23 = "Com licença.\nO Sensei está presente?" 
1014002-24 = "[s] \"Pois não……？\"" 
1014002-25 = "Ah, sou a pessoa que o senhor ajudou\noutro dia na loja de conveniências perto da estação." 
1014002-26 = "Uma das funcionárias de meio-período de repente surtou,\nocupou a loja inteira e começou a devorar todos os pães……\nEu não sabia o que fazer, até o senhor aparecer para nos salvar." 
1014002-27 = "Gostaria de agradecer por aquilo……" 
1014002-28 = "[s] \"Eu?\nDesculpe, não consigo me recordar……\"" 
1014002-29 = "Sim. O senhor mesmo convenceu a garota\ne ainda nos ajudou a limpar a bagunça." 
1014002-30 = "Como o senhor vive resolvendo diversos incidentes,\né natural que não se lembre de todos, mas……" 
1014002-34 = "……。" 
1014002-36 = "É apenas uma lembrancinha boba, mas trouxe uns doces como agradecimento.\nPor favor, aceite." 
1014002-37 = "[s3] \"Muito obrigado. Vou aceitar com gratidão.\"\n[s4] \"Não precisava. A sua intenção já é o suficiente.\"" 
1014002-39 = "Não, faço questão.\nPor favor, permita-me agradecer." 
1014002-40 = "[s5] \"Mas……\"" 
1014002-41 = "Faça essa desfeita por mim,\neu insisto……！" 
1014002-42 = "[s6] \"Sendo assim,\nvou aceitar com gratidão.\"" 
1014002-43 = "Fufu, fico aliviada de poder\nretribuir um pouquinho do favor, Sensei." 
1014002-44 = "Na próxima vez,\nvirei com outro presente." 
1014002-45 = "Até logo!" 
1014002-49 = "…………" 
1014002-50 = "Você conhece?" 
1014002-51 = "[s7] \"Quem sabe. Talvez.\"\n[s8] \"Não me lembro exatamente,\nmas acho que já ajudei sim.\"" 
1014002-54 = "Hã? Você simplesmente deixa\num desconhecido entrar na Schale assim?" 
1014002-55 = "E se fosse alguém perigoso?!" 
1014002-56 = "[s] \"Imagina,\nclaro que não~\"" 
1014002-60 = "[ns] \"Além do mais,\na Kurumi estava bem do meu lado.\"" 
1014002-61 = "É óbvio que eu conseguiria neutralizá-la\nsem dar nenhuma brecha, mas――" 
1014002-62 = "Ainda assim, essa sua segurança é\ncheia de furos, não acha?" 
1014002-63 = "O que você faria se eu não estivesse aqui……？" 
1014002-64 = "[s9] \"Olha, Kurumi. Eu não tinha reparado antes, mas――\"\n[s10] \"Essa embalagem é de primeira,\nos doces parecem deliciosos.\"" 
1014002-67 = "Realmente,\nparecem doces caros." 
1014002-68 = "Mas se não forem comprados e sim feitos à mão――" 
1014002-69 = "[s] \"Itadakima~su.\"" 
1014002-70 = "Espera!" 
1014002-71 = "Sensei! Você vai mesmo colocar algo que ganhou de um desconhecido\nna boca tão fácil assim?!" 
1014002-72 = "[s] \"……Ué,\nnão posso?\"" 
1014002-73 = "Mas é claro que não!\nVocê é o VIP de Kivotos, sabia?!" 
1014002-74 = "O que você faria se a pessoa tivesse más intenções\ne envenenado isso?" 
1014002-75 = "No submundo, não é incomum usarem soro da verdade ou veneno\npara conseguir vantagem em negociações." 
1014002-76 = "Não há garantias de que não tentem fazer isso com você." 
1014002-77 = "Tenha mais noção de perigo\ne fique mais atento aos seus arredores." 
1014002-78 = "É bom você começar a se dar conta\ndo quão importante a sua existência é." 
1014002-79 = "[s11] \"Você tem razão, mas……\"\n[s12] \"Se eu agir assim,\nvai ficar difícil conquistar a confiança das alunas.\"" 
1014002-82 = "Não. Eu recebi ordens diretas da Presidente do Conselho Estudantil Geral\npara garantir a sua segurança." 
1014002-83 = "Não abrirei exceções.\nAfinal, a maioria dos acidentes acontece justamente nas exceções." 
1014002-88 = "[ns] \"……Nesse caso,\nvocê poderia me ajudar, Kurumi?\"" 
1014002-89 = "E-Eu?\nAjudar como?" 
1014002-90 = "[s13] \"Experimente este doce primeiro, Kurumi.\"\n[s14] \"Se você ficar bem, significa que é seguro\npara eu comer também, não é?\"" 
1014002-93 = "Servir de provadora, é……\nBem, tudo bem." 
1014002-94 = "Mas qualquer outro membro\ndo esquadrão poderia――" 
1014002-95 = "[s15] \"Por favor, Kurumi!\"\n[s16] \"Você é a única em quem confio\npara proteger a minha vida!\"" 
1014002-98 = "H-Hmph. Não tem jeito mesmo.\nSe você insiste tanto, eu faço esse sacrifício." 
1014002-99 = "Eu só preciso comer isso aqui\nprimeiro, certo?" 
1014002-103 = "[ns] \"……E então?\"" 
1014002-104 = "……Uma delícia." 
1014002-105 = "Acho que usaram muita manteiga de luxo, ele derrete na boca……\nÉ um manjar dos deuses." 
1014002-106 = "Ah, não tem veneno.\nPode comer esses biscoitos sem medo." 
1014002-107 = "[s] \"Ufa……\nQue bom que é seguro.\"" 
1014002-111 = "[ns17] \"Eu tenho vários outros presentes aqui, mas――\"\n[ns18] \"Se não for incômodo,\npoderia checar os outros também?\"" 
1014002-114 = "T-Tantos assim……？" 
1014002-115 = "Mas é claro que não me importo!\nEu sou a sua guarda-costas, afinal!" 
1014002-117 = "（Depois disso, eu e a Kurumi verificamos\ndiversos presentes espalhados pela Schale.）" 
1014002-119 = "Isso é……\nchá em folha……？" 
1014002-120 = "Bem, envenenar chás\né um método bem clássico." 
1014002-121 = "Deixe-me ver……" 
1014002-125 = "Sim, sem problemas.\nPode beber com tranquilidade." 
1014002-128 = "I-Isso aqui é o famoso bolo 'Miracle 5000'\nque é raro até mesmo em Trinity?!\nComo você conseguiu isso?!" 
1014002-129 = "Ah,\nvou provar agora mesmo." 
1014002-134 = "Uau…… Absolutamente maravilhoso.\nNunca comi nada assim." 
1014002-138 = "E-Esse aqui\ntambém está livre de problemas!" 
1014002-140 = "Hã? Quer que eu cheire este perfume\npara ver se tem veneno?" 
1014002-141 = "B-Bem, acho que a possibilidade não é zero……\nEntendido." 
1014002-145 = "Que cheiro bom…… Um aroma amadeirado\nque alivia as tensões……" 
1014002-146 = "Esse aqui também está liberado.\nEspera, Sensei, isso tem mesmo a ver com teste de envene――" 
1014002-147 = "[s] \"Agora é a vez desse aqui!\"" 
1014002-152 = "Schale - Quarto de Descanso" 
1014002-155 = "E-Esse é o quarto,\nnão é?" 
1014002-156 = "O-O que você tá tentando fazer?!" 
1014002-157 = "[s19] \"Comprei um travesseiro novo outro dia.\"\n[s20] \"Pode deitar e testar para mim?\"" 
1014002-163 = "……Fui enganada." 
1014002-164 = "Fiquei tão distraída provando tudo\nque nem reparei……" 
1014002-165 = "Você usou o teste de veneno como desculpa\npara matar serviço!" 
1014002-166 = "[s] \"Opa,\nfui descoberto.\"" 
1014002-167 = "Volte já ao trabalho!" 
1014002-169 = "（Depois disso, limpei a pilha de afazeres da Schale\njunto de uma Kurumi um pouco irritada.）" 