[translation]
1014002-1 = "The Vigilant Fox"
1014002-2 = "Schale - Office"
1014002-3 = "(Kurumi is visiting Schale for her duty shift)"
1014002-4 = "[ns1] \"Welcome, Kurumi!\"\n[ns2] \"I've been waiting!\""
1014002-7 = "Good morning, Sensei."
1014002-8 = "So... what do I need to do today?"
1014002-9 = "[s] \"A new shooting game!\""
1014002-10 = "…Huh?"
1014002-11 = "What are you talking about? You were complaining about being exhausted from overtime just yesterday."
1014002-12 = "Do your work properly!"
1014002-13 = "I'll even help you with the reports."
1014002-14 = "[s] \"That's mean!\""
1014002-15 = "What's mean is your lack of motivation, Sensei!"
1014002-17 = "(While happily finishing Schale's work with Kurumi...)"
1014002-23 = "Excuse me. Is Sensei [USERNAME] in?"
1014002-24 = "[s] \"May I ask who is calling...?\""
1014002-25 = "Oh, I'm the one you helped at the convenience store in front of the station the other day."
1014002-26 = "The part-timer suddenly went on a rampage, occupied the store, and started eating all the bread... I was at my wit's end, and you were the one who helped me out, remember?"
1014002-27 = "I wanted to thank you for that..."
1014002-28 = "[s] \"I did? I'm sorry, I don't recall...\""
1014002-29 = "Yes. You personally persuaded them and helped me tidy up the store."
1014002-30 = "I know you solve all sorts of incidents, so it's understandable you wouldn't remember, but..."
1014002-34 = "..."
1014002-36 = "It's nothing fancy, but please accept this as a token of my gratitude."
1014002-37 = "[s3] \"Thank you very much. I'll gladly accept it.\"\n[s4] \"No, your kind thoughts are enough.\""
1014002-39 = "No, no, please, let me thank you."
1014002-40 = "[s5] \"But...\""
1014002-41 = "Please, for my sake...!"
1014002-42 = "[s6] \"In that case, I will gratefully accept it.\""
1014002-43 = "Hehe, I'm glad I could repay you, even just a little."
1014002-44 = "I'll come by again with a different gift next time."
1014002-45 = "Goodbye!"
1014002-49 = "............"
1014002-50 = "Do you know them?"
1014002-51 = "[s7] \"Well. Who knows?\"\n[s8] \"I don't remember, but I might have helped them before.\""
1014002-54 = "Huh? You let someone you don't really know into Schale?"
1014002-55 = "What would you have done if they were a bad person!"
1014002-56 = "[s] \"No way~\""
1014002-60 = "[ns] \"Besides, Kurumi is right here with me.\""
1014002-61 = "Of course, I could neutralize them without giving them an opening, but—"
1014002-62 = "No, isn't that a bit too careless?"
1014002-63 = "What would you have done if I wasn't here...?"
1014002-64 = "[s9] \"Look, Kurumi. I didn't notice before, but—\"\n[s10] \"The packaging is high-end, and it looks really delicious.\""
1014002-67 = "It does look like an expensive treat, I'll give you that."
1014002-68 = "But if it's not store-bought, and it's homemade—"
1014002-69 = "[s] \"Digging in.\""
1014002-70 = "Wait!"
1014002-71 = "Sensei! Should you really be eating something you got from a stranger so easily?"
1014002-72 = "[s] \"...Oh, was that bad?\""
1014002-73 = "Obviously! You're a VIP in Kivotos, Sensei!"
1014002-74 = "What if they had malicious intent and laced it with something?"
1014002-75 = "In the underworld, people sometimes use truth serums or poisons for negotiations."
1014002-76 = "Who's to say that couldn't happen to you, Sensei?"
1014002-77 = "You need to be more vigilant and keep an eye on your surroundings."
1014002-78 = "You should really realize how important of a person you are."
1014002-79 = "[s11] \"That's true, but...\"\n[s12] \"But if I do that, it'll be harder to gain the students' trust.\""
1014002-82 = "No. I was ordered by the General Student Council President to protect your safety."
1014002-83 = "There are no exceptions. Most accidents happen because of exceptions."
1014002-88 = "[ns] \"...Then, will you help me, Kurumi?\""
1014002-89 = "M-me? How?"
1014002-90 = "[s13] \"You try this snack first, Kurumi.\"\n[s14] \"If it's fine for you, then it means it's safe for me to eat, right?\""
1014002-93 = "A taste test, huh... well, fine."
1014002-94 = "But in that case, any other agent could—"
1014002-95 = "[s15] \"Please, Kurumi!\"\n[s16] \"I can only trust my safety to you!\""
1014002-98 = "H-hmpf. Fine. If you're going to go that far, I'll do it."
1014002-99 = "I just have to eat this first, right?"
1014002-103 = "[ns] \"...How is it?\""
1014002-104 = "...It's delicious."
1014002-105 = "It must be the high-quality butter; it just melts in my mouth... it's exquisite."
1014002-106 = "Oh, there's no poison. These cookies are safe to eat."
1014002-107 = "[s] \"I'm glad... that there's no problem.\""
1014002-111 = "[ns17] \"There are plenty of other gifts, though—\"\n[ns18] \"Would you mind checking the others too?\""
1014002-114 = "T-there are that many...?"
1014002-115 = "Of course I don't mind! I'm your bodyguard, after all!"
1014002-117 = "(After that, I went with Kurumi to check the various gifts at Schale)"
1014002-119 = "Is this... tea leaves?"
1014002-120 = "Well, poisoning tea is a classic method."
1014002-121 = "Let's see..."
1014002-125 = "Yep, no issues. You can drink it with peace of mind."
1014002-128 = "I-is this the 'Miracle 5000' cake that's rare even in Trinity!? How did you get your hands on this?"
1014002-129 = "Oh, I'll just have a taste."
1014002-134 = "Wow... it's incredibly delicious. I've never had anything like this."
1014002-138 = "T-this is fine too!"
1014002-140 = "Huh? You want me to smell the perfume to see if it's poisoned?"
1014002-141 = "W-well, I suppose that's not impossible... fine."
1014002-145 = "It smells nice... woody notes, it helps me relax..."
1014002-146 = "This is fine too. But Sensei, is this really still a safety check—"
1014002-147 = "[s] \"Next is this one!\""
1014002-152 = "Schale - Duty Room"
1014002-155 = "W-wait, this is the bedroom, right?"
1014002-156 = "W-what are you planning to do!?"
1014002-157 = "[s19] \"I bought a new pillow recently.\"\n[s20] \"Could you lie down and check it for me?\""
1014002-163 = "...I've been tricked."
1014002-164 = "I was so busy tasting everything that I didn't notice at all..."
1014002-165 = "You're using 'safety checks' as an excuse to slack off on work!"
1014002-166 = "[s] \"Oops, you caught me.\""
1014002-167 = "Get back to work, now!"
1014002-169 = "(After that, I finished up Schale's work with a slightly annoyed Kurumi)"