[translation]
1014002-1 = "A Vigilant Fox"
1014002-2 = "Schale - Office"
1014002-3 = "(Kurumi visited Schale for her duty shift.)"
1014002-4 = "[ns1] \"Welcome, Kurumi!\"\n[ns2] \"I've been waiting for you!\""
1014002-7 = "Good morning, Sensei."
1014002-8 = "So... what should I do today?"
1014002-9 = "[s] \"Play a new shooting game!\""
1014002-10 = "...Huh?"
1014002-11 = "What are you talking about? Even though you were whining about working #novertime yesterday."
1014002-12 = "Do your work properly!"
1014002-13 = "I'll at least help you out with the reports."
1014002-14 = "[s] \"How mean!\""
1014002-15 = "The only mean thing here is your lack of motivation, Sensei!"
1014002-17 = "(While happily getting through Schale's work with Kurumi...)"
1014002-23 = "Excuse me. Is Sensei here?"
1014002-24 = "[s] \"Who might you be...?\""
1014002-25 = "Ah, I'm the person you helped out at the convenience store in front of the station #nthe other day."
1014002-26 = "The part-timer suddenly went wild, took over the convenience store, and #ndevouring all the bread... I was at a loss for what to do, but then you show up..."
1014002-27 = "I wanted to thank you for that time..."
1014002-28 = "[s] \"Me? I'm sorry, I don't remember...\""
1014002-29 = "Yes. You persuaded that girl and helped tidy up the store."
1014002-30 = "I understand you might not remember since you resolve various incidents on #na daily basis, but..."
1014002-34 = "..."
1014002-36 = "It's not much, but here are some sweets as a token of my gratitude. Please, accept them."
1014002-37 = "[s3] \"Thank you very much. I'll gladly accept them.\"\n[s4] \"No, your kind thoughts are more than enough.\""
1014002-39 = "No, no, please let me thank you."
1014002-40 = "[s5] \"But...\""
1014002-41 = "Please, for my sake...!"
1014002-42 = "[s6] \"Well then, I'll gladly accept them.\""
1014002-43 = "Hehe, I'm glad I could repay you even just a little, Sensei."
1014002-44 = "I'll come visit again next time with a different gift."
1014002-45 = "Well then!"
1014002-49 = "......"
1014002-50 = "Someone you know?"
1014002-51 = "[s7] \"Hmm. I wonder.\"\n[s8] \"I don't remember, but I might have helped them out before.\""
1014002-54 = "Huh? You let someone you barely know into Schale?"
1014002-55 = "What if they were a bad person!"
1014002-56 = "[s] \"No waaaay~\""
1014002-60 = "[ns] \"Besides, I have you right by my side, Kurumi.\""
1014002-61 = "Of course, I could subdue them without giving them a single chance, but－"
1014002-62 = "No, isn't your security way too lax no matter how you look at it?"
1014002-63 = "What would you have done if I wasn't here...?"
1014002-64 = "[s9] \"Look, Kurumi. I didn't notice earlier, but－\"\n[s10] \"The packaging is high-class, and it looks really delicious.\""
1014002-67 = "It certainly does look like an expensive sweet."
1014002-68 = "But if it isn't store-bought, and is actually handmade－"
1014002-69 = "[s] \"Time to dig in~\""
1014002-70 = "Wait!"
1014002-71 = "Sensei! Is it really okay to so easily eat something you got from a stranger?"
1014002-72 = "[s] \"...Eh, I shouldn't have?\""
1014002-73 = "Obviously! You're a VIP of Kivotos, aren't you?"
1014002-74 = "What are you going to do if they had malicious intent and slipped something #ninto it?"
1014002-75 = "In the underground, they sometimes slip in truth serum or poison for the sake of #nnegotiations, you know."
1014002-76 = "There's no guarantee that won't happen to you, Sensei."
1014002-77 = "Be more vigilant, and be aware of your surroundings."
1014002-78 = "You'd better properly realize just how important of an existence you are."
1014002-79 = "[s11] \"You have a point, but...\"\n[s12] \"But if I do that, it'll be hard to earn the students' trust.\""
1014002-82 = "No. I was ordered by the General Student Council President to protect your safety."
1014002-83 = "There are no exceptions. The vast majority of accidents happen because of #nexceptions."
1014002-88 = "[ns] \"...Then, will you help me out, Kurumi?\""
1014002-89 = "M-Me? How?"
1014002-90 = "[s13] \"Try eating this sweet first, Kurumi.\"\n[s14] \"If you're fine, doesn't that mean it'll be safe for me to eat it too?\""
1014002-93 = "A poison tester, huh... Well, fine."
1014002-94 = "But if that's the case, the other platoon members could--"
1014002-95 = "[s15] \"Please, Kurumi!\"\n[s16] \"I can't entrust my safety to anyone but you, Kurumi!\""
1014002-98 = "H-Hmph. I guess it can't be helped. If you're going to go that far, I'll do it."
1014002-99 = "I just need to eat this first, right?"
1014002-103 = "[ns] \"...So~?\""
1014002-104 = "...It's delicious."
1014002-105 = "Maybe they used plenty of high-quality butter, it melted in my mouth... #nIt's very very delicious."
1014002-106 = "Ah, there's no poison. It's safe to eat these cookies."
1014002-107 = "[s] \"I'm glad... that there's no problem.\""
1014002-111 = "[ns17] \"I have a lot of other presents here too, but--\"\n[ns18] \"If you don't mind, could you check the others as well?\""
1014002-114 = "Th-There are that many...?"
1014002-115 = "Of course I don't mind! I am your bodyguard after all!"
1014002-117 = "(After that, I went with Kurumi to check various presents in Schale.)"
1014002-119 = "These are... tea leaves?"
1014002-120 = "Well, lacing tea with poison is a classic method."
1014002-121 = "Let's see..."
1014002-125 = "Yeah, no problem. You can drink this with peace of mind."
1014002-128 = "Th-This is the 'Miracle 5000' cake that's rare even in Trinity!? #nHow did you get your hands on this?"
1014002-129 = "Ah, I'll taste test it."
1014002-134 = "Wow... It's supremely delicious. I've never had anything like this before."
1014002-138 = "Th-This one is also fine!"
1014002-140 = "Huh? You want me to smell this perfume to see if there's poison in it?"
1014002-141 = "W-Well, it's not like that possibility is zero... Understood."
1014002-145 = "Smells good... It has a woody scent, it relieves my tension..."
1014002-146 = "This one is fine too. But Sensei, are you really sure this is for poison test"
1014002-147 = "[s] \"This one is next!\""
1014002-152 = "Schale - Night Duty Room"
1014002-155 = "Th-This is the bedroom, right?"
1014002-156 = "Wh-What are you planning!?"
1014002-157 = "[s19] \"I bought a new pillow recently.\"\n[s20] \"Could you lie down and check it for me?\""
1014002-163 = "...I've been tricked."
1014002-164 = "I was so busy taste-testing this and that, I completely failed to notice..."
1014002-165 = "You're using poison testing as an excuse to slack off from work!"
1014002-166 = "[s] \"Oops, I've been found out.\""
1014002-167 = "Hurry up and get back to work!"
1014002-169 = "(After that, I finished up Schale's work together with a slightly angry Kurumi.)"