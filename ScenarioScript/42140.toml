[translation]#[Texto revisado, mas pode haver alterações como Censura.] Em aguardo de revisão de formatação de texto. - Filipe 11/06.
42140-1 = "Episódio 14;O Dilema dos Prisioneiros"
42140-2 = "（Após recolher as bagagens abandonadas e voltar do parque, a noite já estava adiantada……）"
42140-7 = "Loja de Conveniência Angel 24"
42140-10 = "（Fui até a prateleira de marmitas para tentar jantar……）"
42140-14 = "[ns] \"Ué? A geladeira tá completamente vazia……?\""
42140-15 = "P-Perdão, Sensei…… esgotou tudo hoje."
42140-16 = "[s1] \"Que pena, eu tava babando de vontade de comer um bentô quentinho de loja……\"\n[s2] \"Será que não sobrou nem uma marmita vencida no fundo do lixo……?\""
42140-19 = "Sinto muito…… nem aquele bentô triste de broto de feijão que a gente sempre joga fora tem mais……"
42140-20 = "E pra piorar o pesadelo…… desde ontem o sistema bloqueou misteriosamente as nossas encomendas de marmita. Só na nossa loja……"
42140-21 = "Quando eu liguei chorando pra matriz perguntando o motivo, eles só disseram que era culpa dos \"Novos Decretos Executivos\" e desligaram na minha cara……#nCancelaram todo o nosso estoque de comida pronta……"
42140-22 = "No momento, a única coisa que eu posso te vender pra mastigar é gelo e água mineral……"
42140-23 = "[s] \"Não me diga que…… o estoque de pão de forma e chá verde em pó também……?\""
42140-24 = "Sim. Pão de forma, biscoito, bebida, tá tudo travado no sistema……"
42140-25 = "Nós praticamente não temos o que vender hoje. A loja virou um deserto. Me desculpe a incompetência……"
42140-26 = "[s3] \"A culpa não é sua, Sora. Você não controla o sistema.\"\n[s4] （Aquele decreto bloqueou o fornecimento do Angel 24 que fica embaixo da Schale……? Será que…… a Kaya mandou fechar o meu cerco alimentar por vingança……?）"
42140-33 = "S-Sensei…… por acaso, o senhor tem alguma ideia do que diabos está acontecendo lá fora no Distrito D.U.?"
42140-34 = "Desde que aquela confusão com a Presidente e os tiros no centro rolaram, a rua tá vazia, os clientes sumiram…… e o clima na Matriz do Angel 24 tá fúnebre……"
42140-35 = "A matriz enviou um manual grosso cheio de \"Novas Diretrizes de Serviços\".#nE agora mesmo…… os brutamontes blindados da Kaiser Security invadiram a loja pra \"inspecionar\" se estávamos cumprindo o decreto……"
42140-36 = "Tá rodando um boato horripilante de que a rede Angel 24 vai ser liquidada e a loja vai virar uma \"Kaiser 26\". O que eu faço da minha vida se isso acontecer……?!"
42140-37 = "Dizem que o regime na \"Kaiser 26\" exige que os balconistas trabalhem 26 horas por dia e apanhem se piscarem…… se eu for forçada a trampar lá eu morro de exaustão……!"
42140-38 = "[ns5] \"……Então o \"26\" do nome da loja era a carga horária imposta…… que bizarro……\"\n[ns6] \"Mas 26 horas por dia não quebra as leis da física……?\""
42140-43 = "[ns] \"Sora, me diz que pelo menos você conseguiu comer alguma coisa no seu turno.\""
42140-44 = "Ah, sim. Eu tô salva porque eu trouxe minha própria marmita de casa."
42140-45 = "A minha mãe fez uma panela gigante de Nikujaga (Ensopado de Carne e Batata) ontem e sobrou bastante--"
42140-50 = "A-Ahm……"
42140-51 = "S-Sensei…… s-se você não se importar de comer a baba de outra pessoa…… cê quer a minha marmita……?"
42140-52 = "[ns] \"N-Não! Jamais!! Pode comer sossegada! Fica de boas!\""
42140-57 = "（Eu não posso descer ao nível de roubar a marmita mordida de uma aluna de loja de conveniência. O meu orgulho de adulto gritou, então eu fugi pro meu escritório de estômago vazio.）"
42140-59 = "Schale - Escritório Principal"
42140-63 = "[ns] \"Que fome do cão……\""
42140-69 = "«DELIVERY FOX EATS NA ÁREA!!»"
42140-70 = "«O Sr. Sensei fez um pedido de janta, certo?!»"
42140-74 = "[ns] \"Pera…… Eu não baixei esse aplicativo e nem tenho sinal pra pedir comida……\""
42140-75 = "«Ué, que loucura…… Mas o sistema registrou um pedido urgente de \"Inarizushi Premium para 1 Pessoa\" pro seu endereço……»"
42140-76 = "«Poderia destrancar a porta rapidinho e colocar o olho no olho mágico pra gente verificar?»"
42140-80 = "[ns7] Destranco a fechadura blindada e abro uma fresta.\n[ns8] Não abro. Mantenho a tranca."
42140-85 = "«……Ah, muito obrigada pela gentileza.»"
42140-91 = "[ns9] \"Pera…… vocês são daquele dia……?\""
42140-92 = "Boa noite, Sensei. Que alegria rever você com vida."
42140-93 = "Fala, bonitão! Tá inteiro?"
42140-94 = "Haaah…… Encarar a fuça desse cara de novo me dá coceira……"
42140-98 = "Diz aí, já engoliu a janta hoje ou o bucho tá chorando?"
42140-99 = "……É. Agora que a gente já bateu na porta, não dá pra recuar na missão……"
42140-104 = "……Carga plástica C4 fixada nas dobradiças. Engatilhando detonador cego."
42140-105 = "[s10] \"……O que diabos vocês tão fazendo na minha porta blindada?\""
42140-110 = "Três…… dois…… um……"
42140-114 = "[ns11] \"Ei, espera! Eu vou abrir na moral--\""
42140-125 = "Ops. Acho que botei pólvora demais na receita."
42140-126 = "OTOGI, SUA DOENTE! Que absurdo de quantidade de C4 foi essa?!#nA blindagem da porta de aço voou inteira e esmagou a parede do corredor!!"
42140-127 = "Foi mal, foi mal! Eu sou sniper tática, arrombamento CQB em corredor apertado não é minha praia."
42140-128 = "A-Ahahaha…… Mil desculpas pela entrada triunfal, Sensei.#nO prejuízo material da porta entra na nossa conta……"
42140-129 = "[s12] \"Espera. Vocês quatro formam o Esquadrão……\""
42140-133 = "Gritar \"Boa noite\" depois de explodir a sua porta é falta de educação, mas……#nFico feliz que os estilhaços não furaram o seu olho, Sensei da Schale."
42140-134 = "O seu estômago tá vazio ou você já forrou a janta hoje?"
42140-137 = "[ns] \"O meu bucho tá roncando. Eu ia sair pra comer antes de vocês explodirem minha rota de fuga.\""
42140-138 = "……Bingo."
42140-139 = "Soubemos pelos relatórios que a \"nova reestruturação executiva\" trancou a logística da loja lá embaixo……"
42140-141 = "Que papo de \"impacto na logística\", Niko. Chama as coisas pelo nome.#nA Kaya fechou a torneira da comida pra sufocar o rato no buraco porque ele recusou lamber as botas dela."
42140-142 = "Tática suja de ditador mesquinho que assalta lancheira de criança de primário…… Chega a dar pena."
42140-143 = "Ah, deixa a hipocrisia de lado. Queimar os suprimentos pra esfomear a base inimiga e forçar a rendição é Doutrina Militar Básica."
42140-144 = "Você pode ter nervos de aço e honra inquebrável, mas se os seus músculos atrofiarem por inanição, você não segura o gatilho. Fim de jogo."
42140-146 = "Acho que fazer greve de fome no escritório da Schale não tava nos planos bélicos do Sensei……"
42140-150 = "Corta o papo. O foco é outro. A \"FOX EATS\"……#nDigo, o Esquadrão FOX trouxe um pacote humanitário pro senhor."
42140-151 = "[ns] \"Nossa…… Isso é Inarizushi de verdade?\""
42140-152 = "Correto. O senhor devorou o sushi que eu preparei pra vocês com tanta vontade no nosso último encontro……"
42140-153 = "A visão de você limpando a bacia foi gratificante…… então eu fiz questão de enrolar tudo do zero usando o caldo secreto original pra você."
42140-154 = "Tem uma montanha de arroz aí dentro. Pode mastigar até o umbigo estourar."
42140-156 = "Embora seja perfeitamente normal que o seu cérebro crie repulsa em mastigar comida entregue pela sua carrasca oficial…… então se quiser jogar no li--"
42140-160 = "[ns] Agarrei dois sushis gordos com a mão e soquei na boca na mesma hora."
42140-167 = "……Que loucura é essa, ele engoliu sem mastigar?!"
42140-168 = "Hã……?! Tá falando sério……?#nO seu instinto de autopreservação é negativo?! Nem fungou pra ver se tinha cianeto?!"
42140-170 = "S-Sensei…… Você tá respirando bem……? O estômago não tá queimando?"
42140-171 = "[s13] \"Relaxa, a carne tá divina! Muito bom!\"\n[s14] \"O tempero tá molhadinho por dentro da massa, a textura do arroz tá perfeitamente firme! Isso é culinária de elite!\""
42140-174 = "N-Não foi da culinária que eu duvidei……"
42140-179 = "Sensei, eu sei que soa bizarro cobrar desconfiança do prato que eu mesma te dei mas……#nVocê não cruzou na cabeça por um milésimo de segundo que essa massa de Inari podia estar empapada de veneno letal militar?!"
42140-180 = "[s] \"……Hã? Tinha cianeto misturado no arroz?\""
42140-181 = "Não!! A receita é 100% pura, mas…… O ponto não é esse!"
42140-185 = "Sensei, abaixa a bola e olha a droga do contexto. Nós não somos as suas colegiais fofas servindo café. Nós somos o Inimigo Declarado e Oficial."
42140-186 = "O seu dossiê já deve ter gritado que o Esquadrão FOX sujou as mãos de sangue e selou um pacto macabro com a golpista da Presidente Interina Kaya em prol da Academia SRT."
42140-187 = "Depois de você encher a cara da Kaya de cuspe e recusar as coleiras dela…… você realmente achou que o batalhão de execução particular dela apareceria na sua porta sorrindo pra trazer jantinha inocente?"
42140-188 = "Tem um limite ridículo pra bondade imbecil de quem não quer enxergar a maldade……"
42140-189 = "O ditado diz que \"A caridade do inimigo envenena a alma\", né?#nAceitar um presente de quem acabou de explodir a sua porta e tentou fuzilar a sua cabeça política não é otimismo, é seleção natural."
42140-190 = "Em doutrina de sobrevivência no front, você adultera e contamina os próprios depósitos de munição antes de bater retirada pra estourar o crânio dos saqueadores que roubarem o pente……"
42140-191 = "No treinamento de sobrevivência extrema da SRT, a lavagem cerebral repete todo dia: \"Num raio de cem quilômetros de território inimigo, se você colocar na boca uma gota de água ou pão que não tenha saído da sua própria mochila inspecionada, você merece a morte\"."
42140-192 = "[ns] \"Mas eu não sou o inimigo jurado de vocês no front de batalha, Otogi.\""
42140-196 = "[ns] \"……Eu sou só o Sensei de vocês. Um homem que ensina e cuida.\""
42140-200 = "Uuuuuuh……"
42140-201 = "……O laudo psicológico da Kaya acertou em cheio na parte \"anomalia\"."
42140-203 = "Mas seja você professor, inimigo ou santo milagreiro…… confiar na bondade alheia dessa forma cega é assinar o atestado de óbito. Alguém vai estripar a sua boa vontade e sugar você vivo no escuro."
42140-204 = "Jogar a sua confiança no colo dos outros sem cobrar juros passa a mensagem de que você é um tolo fraco e facilmente manipulável…… No xadrez das negociações, você já entra morto."
42140-205 = "O mundo real exige cinismo. A sociedade respira malícia.#nSe você não apontar a arma mental primeiro e checar todas as cartas antes de apertar a mão…… a faca entra nas costas de graça……"
42140-206 = "……O senhor tem a idade de um adulto. Você já engoliu esgoto suficiente na vida para saber que essa pureza idealista não enche a barriga. Por que insiste nesse teatro?"
42140-207 = "[s] \"Porque eu calculo que a montanha de coisas gloriosas e profundas que eu ganho confiando em pessoas supera de forma esmagadora os arranhões causados pelas facadas que tomo pelas costas.\""
42140-209 = "……Hmph. Palavras vazias."
42140-210 = "O seu cérebro já esbarrou no Paradoxo da Teoria dos Jogos conhecido como \"Dilema dos Prisioneiros\"?"
42140-211 = "A matemática é nua e crua: Se duas presas na mesma jaula cooperarem, o fardo é leve pra ambas.#nMas se a presa A abraçar a cooperação e a presa B trair apunhalando as costas…… a presa A engole toda a miséria, pena e escória da culpa, enquanto o traidor sai limpo, vivo e dando risada. Sob esse escopo letal, o cálculo de sobrevivência dita……"
42140-212 = "――Que, independente das flores, lágrimas e promessas que o seu colega faça, o ganho de apunhalá-lo primeiro será sempre superior ao risco de confiar. Logo, a traição é o único caminho racional da vitória."
42140-213 = "Ao longo dos anos e de mares de sangue sujo que nós derramamos pela SRT…… nós flanqueamos, sequestramos e manipulamos todo o tipo de \"Prisioneiro\" nesse tabuleiro infernal.#nSabe quantos deles preferiram estender a mão, aceitar o pior e cooperar pra não machucar o outro? Zero. O instinto humano é sujo."
42140-214 = "……O seu papinho motivacional de \"Confiança\" e \"Sentimentos\"…… no microscópio da realidade, é exatamente a mesma ferida."
42140-215 = "[s15] \"Nossa, o papo ficou filosófico e denso de repente……\"\n[s16] \"……Não esperava menos de cadetes da elite implacável!\""
42140-218 = "Hmph. Citar teoria matemática de sobrevivência não me faz ser uma elit――"
42140-222 = "NÃO, PERA AÍ! NÃO MUDA DE ASSUNTO PRA FUGIR DA EXPLICAÇÃO!!"
42140-223 = "Caiu na labiazinha dele, sua pateta de meia tigela……"
42140-224 = "[s] \"O ponto é que a sala de aula da vida real não funciona trancada em equações de prisioneiros num vácuo de laboratório.\""
42140-225 = "Exato. A lousa da vida tem variáveis infinitas."
42140-226 = "Na equação social real de longo prazo, a sombra que a escolha do \"Dilema\" projeta reverbera no seu status pro resto da vid……"
42140-227 = "……Mas adivinha, Sensei? O nosso papo no corredor hoje e as nossas armas engatilhadas…… São exatamente um Jogo de Vida ou Morte em Rodada Única."
42140-228 = "Num cenário isolado e bárbaro, onde eu esmago o seu crânio agora, pego o prêmio, sumo nas trevas e nós nunca mais nos vemos a face no amanhã…… A estratégia de sobrevivência incontestável é e sempre será \"Traição Máxima Imediata para Incutir Terror\"―― A Doutrina do All-Defect."
42140-230 = "……Quando essa carnificina acabar, nós vamos sumir da existência. Não haverá aperto de mãos amigável no futuro."
42140-231 = "Nós escolhemos virar monstros descartáveis. As correntes e sentimentos das escolhas tolas do Sensei jamais criarão raízes na minha mente."
42140-232 = "Eu serei uma fantasma de aço, e as alunas lá fora não ligarão se você nos ensinou empatia ou nos odiou hoje à noite."
42140-233 = "Mesmo com um cenário de Traição Absoluta pintado em sangue na sua cara…… você mantém a loucura suicida de \"acreditar\" em pessoas manchadas como nós?"
42140-234 = "[s] \"Sem sombra de dúvidas. Eu confio no coração de cada uma de vocês.\""
42140-236 = "Com a língua as pessoas mentem que seguram ba--"
42140-237 = "……Segura a emoção, Kurumi."
42140-239 = "Num tabuleiro onde nem eu nem a minha tropa podemos jurar que estaremos respirando ao nascer do sol……#no Sensei apostaria as fichas na possibilidade remota de redenção em um \"Amanhã\" invisível?"
42140-240 = "[ns] \"Sim, eu apostaria minha vida.\""
42140-245 = "[ns17] \"Afinal de contas, eu sou um Mestre de Escola. E vocês são Alunas.\"\n[ns18] \"É meu dever natural proteger as sementes instáveis que crescerão nos jardins do Amanhã, mesmo que as raízes estejam sangrando hoje.\""
42140-253 = "……Sua cabeça é perturbada demais."
42140-254 = "……Os dossiês pintavam você como um mártir masoquista, mas não exageraram."
42140-255 = "[s] \"Além do mais, a maior prova de que a empatia vence a lógica de aço…… é que a \"Doutrina da Traição Constante\" da Kurumi cai por terra dentro do próprio esquadrão de vocês.\""
42140-257 = "[ns19] \"Os sussurros dizem que a devoção de vocês à líder Yukino beira o delírio fanático.\"\n[ns20] \"A eficiência monstruosa da FOX em combate só existe porque vocês confiam cegamente as próprias vidas e as costas umas nas outras. Isso não é \"Traição Racional\", isso é a pura \"Confiança\" que vocês fingem odiar.\""
42140-260 = "Você citou a Yukino-chan……"
42140-261 = "……É. Teoricamente, você botou o dedo na ferida."
42140-262 = "……E outra. Ela tem a patente máxima, nós seguimos a farda."
42140-266 = "[ns] \"……Essa hesitação toda…… aconteceu alguma coisa interna?\""
42140-272 = "Apaga da memória. A nossa mente blindada não te diz respeito."
42140-273 = "Os pilares de aço que conectam o cérebro da Esquadrão FOX jamais enferrujarão, não importa as circunstâncias ou a maré de sangue."
42140-275 = "Mesmo que você pinte aquarelas filosóficas com os discursos do Sensei, a nossa obediência a ela não rachará um milímetro por conta da sua retórica."
42140-276 = "……Sem falar do óbvio. Os nossos laços de amizade foram forjados no sangue muito antes dela costurar as insígnias de capitã."
42140-278 = "Agradeço o interrogatório tático. A sua visão de mundo doente e o seu grau estúpido de pureza foram perfeitamente catalogados para o nosso banco de dados."
42140-283 = "Como a missão primária de forçar marmita goela abaixo foi um sucesso, as tropas da FOX estarão batendo retirada imediata."
42140-284 = "Perdão por estourar sua paz e encher seu juízo de metralhadora filosófica de madrugada……"
42140-285 = "Como um paliativo para os danos auditivos…… O prisioneiro cego Sensei deseja arrancar alguma informação tática ou pessoal de nós antes do adeus?"
42140-286 = "[s21] \"Tô sabendo que o meu querido Esquadrão RABBIT baixou a cabeça e abaixou as armas pra se juntar a vocês……\"\n[s22] \"Sejam sinceras. A alma delas tá inteira? Elas estão comendo e dormindo bem lá?\""
42140-289 = "A situação prisional atual das coelhinhas é……"
42140-290 = "Tsc…… A zona de extração e contenção do esquadrão está trancafiada em Sigilo de Classe 2. Meu lábio tá selado por lei……"
42140-299 = "……Se você embarcar num ônibus caindo aos pedaços da linha 10, debaixo da cobertura em frente ao saguão principal da Schale, seguir rumo a Neo-Kiroo e morrer no ponto final…… siga a pé pelo cânion seco sentindo a brisa leste por exatamente mil metros. A terra vai revelar uma estrutura de metal que nenhuma câmera de satélite pode enxergar."
42140-300 = "As muralhas enferrujadas escondem um centro de inteligência e base de guerra secreta construída fora do papel pela Presidente Desaparecida. Foi a fornalha onde as garras da SRT foram lapidadas antes da aniquilação do conselho."
42140-301 = "……O Destacamento RABBIT está apodrecendo no escuro lá dentro."
42140-302 = "Não acredite no meu teatro verbal. Se quer saber se os olhos das suas garotinhas ainda brilham…… rasteje pela floresta e encare o trauma delas de frente, Sensei da Schale."
42140-304 = "NIKO, CÊ ENDOIDOU DE VEZ?! Tu vomitou o GPS oficial e detalhado da base pro inimigo!!"
42140-305 = "Expor as fundações e os beliches onde as calouras estão abrigadas é vazar dados Classe 2 de Segurança Nacional! Nós podemos ser julgadas em corte marcial!!"
42140-306 = "Paz e amor. Revelar o CEP do parquinho delas não afeta as operações cirúrgicas nem o Dia-D. Não tem estresse."
42140-307 = "A questão chata é que…… se o vento levar essa fofoca pros ouvidos da Yukino-chan, eu levo um tiro nas pernas…… então, fecha a boca sobre quem dedurou o endereço, ok Sensei?"
42140-308 = "Eu juro por deus que você precisa ser internada e lobotomizada……"
42140-309 = "Haaah…… Quando o inferno congelar e a gente perder os distintivos por vazar o GPS, a culpa recai inteiramente nos seus ombros, Niko."
42140-311 = "A ordem emanou da Vice-Capitã Oficial. O manual manda obedecer de bico calado, né?"
42140-312 = "Fufu, vocês são anjos leais. Obrigada pelo passe livre."
42140-313 = "Na pior e mais poética das utopias…… se o Sensei da Schale conseguir invadir o coração doente daquelas meninas e expurgar os demônios delas…… talvez a alma do nosso próprio esquadrão veja o amanhecer também……"
42140-318 = "Fim das transmissões. Até o juízo final."
42140-319 = "Adeus, Sensei. Ou, se for uma promessa melhor, até a carnificina inevitável."
42140-326 = "（Deixado sozinho para engolir o resto do Inarizushi e o rombo na minha porta, mastiguei a resposta do enigma que elas jogaram no meu colo e calculei meu próximo passo rumo ao covil dos lobos.）"
42140-330 = "（……Engraçado…… O tempero do vinagre que a Niko fez pra hoje…… estava mais forte e denso do que eu me lembrava da última vez que comi. Ou a mão dela pesou no sal, ou isso é uma mensagem cifrada.）"
42140-332 = "Próximo Episódio;A Justiça da SRT"