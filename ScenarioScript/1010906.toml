[translation]
1010906-1 = "小さなシミ"
1010906-2 = "シャーレ・執務室"
1010906-4 = "（翌日、ノアとシャーレの仕事を片付けていると……）"
1010906-8 = "[ns] \"食後だからか眠気が……。\""
1010906-10 = "[ns] \"ノアもコーヒー飲む？\""
1010906-11 = "そうですね……。"
1010906-12 = "ご一緒に、いただきたいです。"
1010906-17 = "[ns1] \"はい、お待たせ。\"\n[ns2] \"熱いから気をつけ――\""
1010906-23 = "[ns] \"っ！\""
1010906-24 = "だ、大丈夫ですか！？"
1010906-25 = "[s] \"う、うん。ノアこそ熱くなかった？\""
1010906-26 = "私は平気です。"
1010906-27 = "スカートに少しかかっただけですから。"
1010906-28 = "床は私が拭くので……先生は手をしっかり冷やしてくださいね。"
1010906-29 = "[s3] \"後で冷やしてくるよ。\"\n[s4] \"ごめん、早く洗わないと……！\""
1010906-36 = "制服のことは、お気になさらず。#nそろそろクリーニングに出すつもりでしたから。"
1010906-41 = "……やっぱり、気になって仕事に集中できないかもしれません。"
1010906-42 = "楽な服に着替えてきますね……ふふっ。"
1010906-47 = "（しばらくして……）"
1010906-50 = "戻りましたよ、先生。"
1010906-51 = "[s] \"ノア、その格好は……。\""
1010906-52 = "楽な格好に着替えてきただけですよ？"
1010906-53 = "ふふっ、予備のパジャマを置いていって正解でした。"
1010906-54 = "では気を取り直して、残りのお仕事を進めましょうか。"
1010906-55 = "[s] \"誰か来たら、今度こそ誤解されちゃうよぉ……。\""
1010906-56 = "「コーヒーで服が汚れた」と説明すれば、納得してくださると思いますよ？"
1010906-61 = "それとも、他に気になることが……？"
1010906-62 = "[s5] \"いや、そうじゃないけど……。\"\n[s6] \"パジャマも白いから、気を使うんじゃないかなって。\""
1010906-68 = "大丈夫です、慣れていますから。"
1010906-69 = "白は汚れやすいとよく言われますが、良いところもいっぱいあるんですよ？"
1010906-70 = "どんな色にも合わせられますし、汚れてもすぐ気づけます。"
1010906-71 = "熱を持ちにくいので、白い服は暑さをやわらげてくれますし。"
1010906-72 = "それに、「シミ」がついても……思い出として記録できますから。"
1010906-73 = "[ns] \"……ノア。\""
1010906-74 = "は、はいっ？"
1010906-75 = "[s7] \"コーヒーのシミはなかなか落ちないんだよ！\"\n[s8] \"だから、急いで洗わないと！\""
1010906-78 = "……。"
1010906-79 = "ふぅ……。"
1010906-80 = "……肝心なところで、鈍感なんですから。"
1010906-81 = "[s] \"ど、どういうこと……？\""
1010906-82 = "……もう、知りません。"
1010906-84 = "（そう言ってむくれてしまったノアは、しばらくの間ご機嫌斜めなままだった……）"
