[translation]
10052115-3 = "Acabou muito bem. #nO controle da área e a coleta dos dados principais foram concluídos."

10052115-9 = "...Por que Soph me contatou?"

10052115-10 = "Só um palpite... Acho que um profeta chamado Tiphareth foi importante para Soph."

10052115-11 = "Soph disse que Tiphareth priorizou sua espécie em detrimento de si mesmo."

10052115-12 = "Sinto que meu padrão de comportamento é diferente do de outros profetas."

10052115-13 = "……."

10052115-14 = "[s] \"Alice? O que há de errado?\""

10052115-15 = "Sensei... você ainda se lembra?"

10052115-16 = "Quando Alice rompeu a primeira linha de defesa..."

10052115-17 = "[s] \"Quando chegar a hora, conversaremos novamente.\""

10052115-18 = "sim……. #nAlice sente o mesmo agora que sentia naquela época..."

10052115-19 = "……."

10052115-20 = "Como Alice deveria responder a Soph, que diz que a vida nada mais é do que dor?"

10052115-21 = "Para alguns, o mundo é apenas uma tragédia, e o nascimento nada mais é do que uma maldição..."

10052115-22 = "Se alguém dissesse que teria sido melhor se ele nunca tivesse nascido..."

10052115-23 = "Que tipo de palavras Alice pode dizer para aquela pessoa...?"

10052115-24 = "Alice... bem, eu não entendo. #nSinto que tenho um aperto no peito e é difícil respirar..."

10052115-25 = "[s] \"Na verdade, a história de Soph não está completamente errada.\""

10052115-26 = "sim! ? ! ?"

10052115-27 = "[s1] \"Amanhã é provavelmente o dia em que perderei alguma coisa.\"\n[s2] \"Coisas boas não acontecem com muita frequência.\""

10052115-30 = "[ns] \"Aquelas três pessoas estavam conversando.\""

10052115-31 = "Está tudo bem em admitir isso...?"

10052115-32 = "sim? Se você não reconhece isso, você não pode seguir em frente...?"

10052115-33 = "Parece um Sensei..."

10052115-38 = "Nesse caso, onde Alice deveria encontrar o sentido da vida?"

10052115-39 = "Alice nunca tinha pensado assim antes. #nPorque... é assustador. Por alguma razão... só estou com medo."

10052115-40 = "[s] \"Alice deveria saber a resposta.\""

10052115-41 = "……foto?"

10052115-42 = "...Alice disse isso antes."

10052115-43 = "Não creio que o tempo que vivi seja sem sentido."

10052115-44 = "Eu só... eu só quero estar com todos."

10052115-45 = "Mas... está tudo bem? #nRealmente, isso é tudo..."

10052115-46 = "[s3] \"Na verdade, acho que está tudo bem.\"\n[s4] \"A vida originalmente não tinha um grande significado ou propósito.\""

10052115-49 = "sim! ?"

10052115-50 = "Eh! ?"

10052115-51 = "A vida não tem sentido ou propósito...?"

10052115-52 = "……um."

10052115-53 = "Talvez seja o contrário...? #nSe a vida tivesse sentido e propósito, a vida sem encontrá-lo não teria valor...?"

10052115-54 = "...!"

10052115-55 = "[s5] \"Então...acho que não há problema em ser como você é.\"\n[s6] \"Estou mais do que feliz por ter conhecido todos vocês.\""

10052115-58 = "Ah, Alice também está comigo! Sem a Senseia, Alice iria...!"

10052115-59 = "……."

10052115-60 = "Eu também?"

10052115-61 = "[s] \"Claro.\""

10052115-62 = "Bem, nesse caso... está tudo bem."

10052115-63 = "[s7] \"Faça o que quiser.\"\n[s8] \"A vida é cheia de coisas absurdas.\""

10052115-68 = "[ns] \"De qualquer forma, existem apenas duas escolhas na vida.\""

10052115-69 = "Você aceita o absurdo?"

10052115-70 = "...Acho que vou lutar até o fim."

10052115-71 = "Porém, uma vez que você aceita isso, o futuro já está..."

10052115-72 = "……."

10052115-73 = "Eu vejo. Portanto, só há um caminho a percorrer."

10052115-74 = "[s9] \"Sim. Nós brigamos e-\"\n[s10] \"Devemos todos ficar felizes no final.\""

10052115-77 = "...Você quer dizer que luta é felicidade?"

10052115-78 = "[s11] \"Isso mesmo.\"\n[s12] \"Mesmo se você estiver com raiva, mesmo se levantar a voz para algo irracional.\""

10052115-81 = "[ns] \"Exatamente como Kei estava falando.\""

10052115-82 = "Por que você está falando de mim de repente? ?"

10052115-89 = "Oh, por favor, não me dê tapinhas na cabeça! #nFoi isso que aconteceu...!"

10052115-90 = "...Bem, é só desta vez."

10052115-91 = "……."

10052115-92 = "Você está tentando dizer que a razão pela qual deveríamos ser felizes é porque essa é a maior luta contra a vida."

10052115-93 = "[s13] \"Sim. É por isso que quero que vocês sejam felizes.\"\n[s14] \"Então eu também posso ser feliz.\""

10052115-98 = "Por falar nisso...?"

10052115-99 = "Alice... quero que a Senseia também fique feliz! #nO jeito que a Senseia fala parece meio triste..."

10052115-100 = "sim? Não é disso que se trata?"

10052115-101 = "Quando as pessoas veem alguém feliz, elas mesmas se sentem felizes..."

10052115-102 = "Porque quando você vê alguém com dor, você também pode sentir empatia por essa dor...?"

10052115-103 = "Quando alguém está chorando, basta ter alguém ao lado para chorar com ele..."

10052115-104 = "Porque essa pessoa ganha o poder de superar a tristeza...?"

10052115-105 = "No entanto, não se pode necessariamente dizer que isto seja o caso. #nPode ser apenas um mal-entendido ou uma ilusão."

10052115-106 = "Não, essa ainda é uma expressão melhor. #nDe certa forma, isso não é...hipocrisia?"

10052115-107 = "Essas três pessoas também disseram que... #nA vida, os laços e a sociedade nada mais são do que um palácio na areia, construído sobre uma ilusão."

10052115-108 = "[s15] \"Acho que não importa.\"\n[s16] \"Mesmo que seja hipocrisia.\""

10052115-111 = "sim! ? ! ?"

10052115-112 = "...!"

10052115-113 = "[s17] \"Nascer bom desde o início, ou superar sua verdadeira natureza através do esforço.\"\n[s18] \"O que é mais legal, certo?\""

10052115-116 = "não creio que seja esse o problema..."

10052115-117 = "sim? Isso é importante...? #nO que você quer dizer?"

10052115-118 = "Você só vive uma vez, e não há outra maneira senão viver com calma...?"

10052115-119 = "Parece um Sensei..."

10052115-120 = "Eu realmente não entendo isso ainda..."

10052115-121 = "Mesmo assim, Alice, acho que entendi! #n Alice... está tudo bem como está agora!"

10052115-122 = "[s] \"Sim! Isso mesmo!\""

10052115-123 = "Obrigado, senhor! #nGraças à Senseia, Alice sente que encontrou o que quer fazer!"

10052115-124 = "O que é?"

10052115-128 = "sim! Alice quer ser amiga de todos!"

10052115-132 = "Ain, Soph, Owl, Malchut e outros profetas também!"

10052115-133 = "Nem todos os problemas podem ser resolvidos apenas conversando..."

10052115-134 = "Acho que você pode pelo menos tentar."

10052115-135 = "Mesmo que seja hipocrisia, ainda é melhor do que não fazer nada!"

10052115-136 = "[s] \"Sim. Espero que sim.\""

10052115-137 = "sim!"

