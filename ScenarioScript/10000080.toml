[translation]
10000080-1 = "Episódio 8; Quase chegando ao final!"
10000080-3 = "Ugh, argh!"
10000080-4 = "Para quem falou tão grosso, você não é grande coisa, Izuna!"
10000080-5 = "[s1] \"Izuna, você está bem!?\"\n[s2] \"São muitos inimigos!\""
10000080-6 = "Hahaha, enquanto vocês causavam confusão na cidade, eu avisei a Trupe Chimi espalhada por Hyakkiyako para voltarem para cá!"
10000080-7 = "Hahaha, enquanto vocês causavam confusão na cidade, eu avisei a Trupe Chimi espalhada por Hyakkiyako para voltarem para cá!"
10000080-8 = "E então, mesmo nesta situação, você ainda pretende me trair e ficar do lado do Sensei?"
10000080-9 = "Se for agora, talvez eu possa deixar isso passar! Pense bem, sua tola!"
10000080-10 = "Eu não sou uma tola!"
10000080-11 = "Uma ninja... a Izuna...!"
10000080-12 = "Eu só luto por aqueles que acreditaram no sonho da Izuna, e pelo meu mestre!"
10000080-14 = "Porque esse é o caminho ninja em que a Izuna acredita!"
10000080-15 = "Humpf, você só sabe falar! Acabem com ela, Trupe Chimi!"
10000080-16 = "Tome isso!"
10000080-23 = "[ns] \"Izuna...!\""
10000080-24 = "Humpf, que garota persistente. Está me dando trabalho."
10000080-25 = "Ugh... a Izuna não pode... cair aqui..."
10000080-26 = "A Izuna precisa... proteger o mestre..."
10000080-27 = "Nada mal, garota ninja! Deixe o resto com a gente!"
10000080-28 = "Q-quem está aí!?"
10000080-31 = "Professor! Você está bem!?"
10000080-32 = "Chefe! Desculpe a demora!"
10000080-40 = "O Comitê Organizador do Festival, e até mesmo o pessoal do Clube de Treinamento...!"
10000080-41 = "Então era você mesmo o culpado! Presidente... não, Nyantenmaru!"
10000080-42 = "Não é Nyantenmaru, é Masamunye!"
10000080-43 = "Mas como vocês chegaram aqui...!"
10000080-44 = "Depois que a Trupe Chimi sequestrou você, eu deveria ter cortado todos os meios de comunicação...!?"
10000080-45 = "Graças a isto!"
10000080-47 = "(Desliza)"
10000080-48 = "Um smartphone...? Então os meios de comunicação... não, não pode ser!?"
10000080-49 = "O Professor me enviou uma MomoTalk com antecedência!"
10000080-50 = "Dizendo: 'Estou prestes a ser sequestrado, então venham me salvar antes que seja tarde demais'!"
10000080-52 = "Droga, ele já tinha enviado antes mesmo de chegar aqui...!?"
10000080-54 = "Isso significa que... Professor, você não foi sequestrado, você sabia de tudo desde o início...!"
10000080-55 = "[s] Assobia."
10000080-56 = "Como esperado, você não é alguém para se subestimar...! Mas ainda assim... você disse 'como esperado'. Isso significa que você já suspeitava da minha verdadeira identidade...!"
10000080-57 = "Nada mal. Você deve ter enfrentado muitas dificuldades para descobrir a verdade de que eu lidero a Trupe Chimi..."
10000080-58 = "Eu sou Shizuko Kawa, a presidente do Comitê Organizador do Festival!"
10000080-59 = "Hã? Não, na verdade não."
10000080-60 = "Eu só perguntei para as pessoas que vieram ao Festival Ouka se elas tinham visto alguém suspeito!"
10000080-61 = "Então, um bom número de pessoas disse que viu a Presidente e a Trupe Chimi passando pelo beco desta rua comercial e entrando nas ruínas, então foi bem fácil."
10000080-62 = "Para começar, tanto a Trupe Chimi quanto a Presidente são muito chamativas... bocejo..."
10000080-63 = "Argh, quem diria que o cargo de Presidente acabaria sendo uma desvantagem...!"
10000080-64 = "Droga! Já chega, essa situação também está dentro do meu plano!"
10000080-65 = "Vocês acham mesmo que eu não teria previsto a possibilidade de vocês chegarem aqui desde o início?!"
10000080-66 = "Vou mostrar algo incrível para vocês!"
10000080-73 = "Uau! O que é isso!?"
10000080-74 = "Eles não param de aumentar~."
10000080-75 = "De alguma forma, a atmosfera ficou bem incomum, não é?"
10000080-77 = "......Nossa."
10000080-82 = "Fina, eu já vi uma cena dessas em 'Nyan Nyan Punch Sem Lei'!"
10000080-83 = "Era o momento em que eles reuniam todos os membros da organização para realizar um ataque!"
10000080-84 = "Exatamente. Eu reuni a Trupe Chimi aqui justamente para capturar todos vocês de uma vez só."
10000080-85 = "Ora, como se sente ao perceber que, na verdade, vocês é que caíram na armadilha?"
10000080-86 = "Fuhaha, preparem-se!"
10000080-87 = "Hmm... de qualquer jeito que eu olhe, essa é uma fala de quem vai perder."
10000080-88 = "Como esperado da Presidente do Comitê! Sempre afiada como sempre!"
10000080-89 = "Bocejo, de qualquer forma, se vocês não pretendem parar com essa bagunça~..."
10000080-90 = "Para nos tornarmos damas elegantes, nós do Clube de Treinamento também vamos enfrentar vocês!"
10000080-92 = "Pessoal, vamos lá!"
