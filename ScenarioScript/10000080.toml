[translation]
10000080-1 = "第8話;フィナーレまでもう少し！"
10000080-3 = "う、ぐうっ！"
10000080-4 = "啖呵を切った割には大したことないじゃないか、イズナ！"
10000080-5 = "[s1] \"イズナ、大丈夫！？\"\n[s2] \"数が多すぎる！\""
10000080-6 = "くはは、街で暴れてくれていた間に、百鬼夜行の各地にいた魑魅一座にここへ戻ってくるよう伝えておいたのさ！"
10000080-7 = "くはは、街で暴れてくれていた間に、百鬼夜行の各地にいた魑魅一座にここへ戻ってくるよう伝えておいたのさ！"
10000080-8 = "さあ、この状況でも儂を裏切って、先生の方に付くつもりか？"
10000080-9 = "今ならまだ、水に流してやらんでもないぞ！しっかり考えたらどうだ、この愚か者め！"
10000080-10 = "愚かなどではありません！"
10000080-11 = "忍者は……イズナは……！"
10000080-12 = "イズナの夢を信じてくれた人のために、主殿のために戦うだけです！"
10000080-14 = "それこそが、イズナが信じる忍びの道だから！"
10000080-15 = "ふん、口だけは達者じゃないか！やれ、魑魅一座！"
10000080-16 = "くらえ！"
10000080-23 = "[ns] \"イズナ……っ！\""
10000080-24 = "ふん、本当に頑丈なやつだ。手こずらせてくれる。"
10000080-25 = "うっ……イズナがここで、倒れるわけ、には……。"
10000080-26 = "イズナは、主殿のことを、守らなきゃ……。"
10000080-27 = "やるじゃん、忍者の子！あとは私たちに任せて！"
10000080-28 = "だ、誰だ！？"
10000080-31 = "先生！大丈夫ですか！？"
10000080-32 = "お頭！お待たせしマシタ！"
10000080-40 = "お祭り運営委員会、それに修行部のやつらまで……！"
10000080-41 = "やっぱり、犯人はあなただったんですね！会長……いえ、ニャン天丸！"
10000080-42 = "ニャン天丸じゃない、マサムニェだ！"
10000080-43 = "それにしてもどうしてここに……！"
10000080-44 = "魑魅一座が誘拐してきた後、すぐに連絡手段は絶ったはず……！？"
10000080-45 = "これのおかげです！"
10000080-47 = "（スッ）"
10000080-48 = "スマホ……？だから連絡手段は……いや、まさか！？"
10000080-49 = "先生があらかじめ、私にモモトークを送ってくれていましたから！"
10000080-50 = "「今から誘拐される予定だから、遅くなる前に助けに来てほしい」って！"
10000080-52 = "ぐっ、ここに来る前の段階で、すでに送っていただと……！？"
10000080-54 = "ということは……先生、おぬし攫われたのではなく、全部最初から分かってて……！"
10000080-55 = "[s] 口笛を吹く。"
10000080-56 = "やはり侮れないやつめ……！それにしても……「やっぱり」、と言ったな。つまりは、儂の正体にも薄々気づいていたということか……！"
10000080-57 = "やるではないか。儂が魑魅一座を束ねているという真実にたどり着くまで、さぞかし多くの困難があっただろう……。"
10000080-58 = "お祭り運営委員会の委員長、[ruby=かわわ]河和[/ruby]シズコよ！"
10000080-59 = "え？いや、別に。"
10000080-60 = "桜花祭に来ていた人たちに、怪しい人を見なかったか聞いてみたんデス！"
10000080-61 = "そしたら結構な人数が、会長と魑魅一座がこの商店街の裏路地を通って廃墟に入って行くのを見たと言ってたので、そりゃもうあっさりと。"
10000080-62 = "そもそも魑魅一座も会長も、すごく目立つし……ふあぁ……。"
10000080-63 = "ぐぅっ、会長という役職が、裏目に出るとは……！"
10000080-64 = "ええいっ！もういい、この状況も計画の範疇だ！"
10000080-65 = "最初からおぬしらがここにたどり着く可能性くらい、予測してなかったとでも思うか！"
10000080-66 = "良いものを見せてやろう！"
10000080-73 = "うわわわっ！何これ！？"
10000080-74 = "どんどん増えるね～。"
10000080-75 = "なんだか、尋常ではない雰囲気になってきましたね。"
10000080-77 = "……うわあ。"
10000080-82 = "フィーナ、『仁義なきニャンニャンパンチ』でこういうシーンも見たことありマス！"
10000080-83 = "組織の全員を集めて、襲撃に向かおうとするところデシタ！"
10000080-84 = "正にその通りだ。魑魅一座をここに集めておいたのは、おぬしらを一網打尽にするためでもあったのさ。"
10000080-85 = "さあ、実は自分たちが罠にはめられていたと気づいた時の心地はどうだ！"
10000080-86 = "ふはは、覚悟しろ！"
10000080-87 = "うーん……どう考えても負けフラグな台詞。"
10000080-88 = "サスガ委員長！いつも通り辛辣デス！"
10000080-89 = "ふあぁ、とにかく荒らすのをやめるつもりがないなら～……"
10000080-90 = "素敵なレディーになるためにも！私たち修行部も相手するよ！"
10000080-92 = "皆さん、行きましょう！"
