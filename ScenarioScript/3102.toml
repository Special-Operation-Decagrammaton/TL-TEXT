[translation]
3102-1 = "価値の証明（２）"
3102-4 = "……人は誰しも、未来を恐れます。"
3102-5 = "それは何故か。#n……既に確定された過去とは異なり、未来は無限の可能性に満ちているからです。"
3102-6 = "確定していない未来、その不確定さは時に人へ恐怖を与えます。"
3102-7 = "しかしその恐怖は、未来は突然やって来ることはありません。#nその不確定な変化は、常に十分な予兆と時間を伴うものです。"
3102-8 = "問題は……ただ、その予兆を観測する手段を持っていないというだけ。"
3102-9 = "そこで、キヴォトスのあらゆる情報を観測できるこの天才美少女ハッカーの私はこう考えました。"
3102-10 = "観測可能な全ての予兆と変化を計算可能なものとして電算化して演算すれば、#n高確率で未来を予測できるのではないか……"
3102-11 = "……そうして完成したのがこちら、未来観測機関「[ruby=しん]讖[/ruby]」の設計図です。"
3102-12 = "これは天体の動きから人々の生体情報まで……世の中のあらゆる変数をとりまとめ、最も可能性の高い未来を提示します。"
3102-13 = "もし不確定な未来、その片鱗を覗いてみたいという気持ちが少しでもあるのでしたら……"
3102-17 = "この設計図に従って、未来観測機関「讖」を作成してはいかがでしょうか？"
3102-20 = "これが本当だとしたら……。"
3102-21 = "この設計図の通りに作れば、未来を予知する装置が作れるってこと……？"
3102-22 = "そのようですね。未来を予知、ですか……。"
3102-29 = "考えてみると、ヒマリ部長が実際に作った設計図は初めて見ましたね。"
3102-30 = "ミレニアムのテンプレートを完全に無視していますし、省略されている箇所や一見飛躍した部分も多く見受けられますが……。"
3102-31 = "確かに、既存のパラダイムを変えうる新しい概念の設計図……#nそのように見えますね。"
3102-43 = "あり得ない……世の中の全ての変数を取り込んで未来を演算……？"
3102-44 = "そんなこと、現存する最高のコンピューターでも不可能なはず……。"
3102-48 = "とはいえ、作成者はあのヴェリタスの部長……。"
3102-49 = "或いは、本当にできるという可能性も……？"
3102-50 = "……この提案書、かなり高価な部品がたくさん必要そうですね。"
3102-54 = "天体観測用の屈折レンズ、スーパーコンピューターに使われるようなハイエンドのコアまで……。"
3102-55 = "ざっと見積もっても、色んな部活の四半期の予算を合わせたくらいは、ゆうに必要そうな……。"
3102-56 = "そもそも本当に未来が予知できるという保証も無いですし、提出にあたって正規の手続きも踏んでませんし……。"
3102-57 = "まあ、却下ですかね？"
3102-61 = "ちょ、ちょっと待って！"
3102-62 = "さ、流石に即却下っていうのはその、勿体なくない……？"
3102-63 = "……え？でもさっきユウカちゃんも言ってたじゃないですか。"
3102-64 = "全部を試せるような予算的な余裕はない、って。"
3102-65 = "も、もちろんそれはそうだけど……。"
3102-66 = "それでも技術の発展のためには、時に新しい挑戦も必要だと思うの！"
3102-67 = "未来が予測出来たら、千年難題にも大きく寄与できるだろうし……。"
3102-68 = "これまでの天才的な発明の数々のことを考えると、#nヒマリ部長が作ったからにはきっと……。"
3102-70 = "まあ、ユウカちゃんがそこまで言うなら止めませんが……。"
3102-71 = "この製作に必要な費用は、どこの負担扱いにします？"
3102-72 = "ヴェリタスは正式に認可している部活でない以上、#nヴェリタスの名前は使えませんし……。"
3102-73 = "部活ならともかく、ヒマリ部長個人に対しては支給するなとリオ会長が……。"
3102-74 = "……私の名前で良いわ。"
3102-78 = "……ユウカちゃん持ち、ってことです？"
3102-79 = "でも大丈夫です？確か昨日、運用してたファンドが大暴落してお金が無いって……。"
3102-80 = "だ、大丈夫よ。その装置が完成したら、それくらいどうとでもなるわけだし……。"
3102-85 = "株式市場の流れも、集団心理の狂気も予測できれば……#nお金の稼ぎようは幾らでもあるわ！"
3102-90 = "何だかやる気満々みたいですし、そうしましょうか？"
3102-91 = "……面白そうですし♪"
3102-92 = "確かに設計図を見た感じ複雑ではあるけど、外注するわけにもいかないからどうにかセミナー内部で……。"
3102-93 = "それに、こんな危険な装置がミレニアム全体に知られたら、誰がどんな事故を起こすか分かったものじゃないわ。"
3102-98 = "さあ、お金に困らない完璧なみら――"
3102-99 = "いえ、技術的特異点を迎えた完璧な未来に向かって、進むわよ！"
3102-101 = "ふふっ、楽しみですねえ？"
