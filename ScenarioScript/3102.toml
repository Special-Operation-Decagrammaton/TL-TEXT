[translation]
3102-1 = "Prova de Valor (2)"
3102-4 = "……Todos os seres humanos temem o futuro."
3102-5 = "Por que será? #n……Diferente do passado, que já está definido, o futuro está repleto de possibilidades infinitas."
3102-6 = "O futuro incerto; essa falta de definição, às vezes, causa medo nas pessoas."
3102-7 = "Mas esse medo não significa que o futuro virá de repente. #nEssas mudanças incertas sempre vêm acompanhadas de presságios e tempo suficientes."
3102-8 = "O problema é…… que simplesmente não temos os meios para observar esses presságios."
3102-9 = "Foi então que eu, a genial e bela hacker capaz de observar todas as informações de Kivotos, pensei o seguinte:"
3102-10 = "Se eu puder digitalizar e processar todos os presságios e mudanças observáveis como dados calculáveis, #nserá que não conseguiria prever o futuro com alta probabilidade……?"
3102-11 = "……E assim, o que completei foi isto: o projeto do instituto de observação do futuro, \"Shin\"."
3102-12 = "Isso compila todas as variáveis do mundo, desde o movimento dos corpos celestes até as informações biológicas das pessoas…… e apresenta o futuro com a maior probabilidade."
3102-13 = "Se você tiver, nem que seja um pouco, o desejo de espiar um vislumbre desse futuro incerto……"
3102-17 = "Que tal construir o instituto de observação do futuro \"Shin\" seguindo este projeto?"
3102-20 = "Se isso for verdade……"
3102-21 = "Significa que, se construirmos seguindo este projeto, poderemos criar um dispositivo que prevê o futuro……?"
3102-22 = "Parece que sim. Prever o futuro, é……"
3102-29 = "Pensando bem, é a primeira vez que vejo um projeto feito pela própria Chefe Himari."
3102-30 = "Ela ignora completamente os modelos da Millennium, e há muitas partes omitidas ou que parecem saltos lógicos à primeira vista, mas……"
3102-31 = "De fato, é um projeto com um conceito novo que pode mudar o paradigma existente…… #nÉ o que parece."
3102-43 = "Impossível…… processar o futuro incorporando todas as variáveis do mundo……?"
3102-44 = "Isso deveria ser impossível até para o melhor computador existente……"
3102-48 = "Ainda assim, a criadora é a chefe da Veritas……"
3102-49 = "Ou será que existe a possibilidade de que seja realmente possível……?"
3102-50 = "……Esta proposta parece exigir muitas peças extremamente caras."
3102-54 = "Desde lentes refrativas para observação astronômica até núcleos de alta performance como os usados em supercomputadores……"
3102-55 = "Por uma estimativa rápida, parece que precisaríamos facilmente do orçamento trimestral de vários clubes somados……"
3102-56 = "Além disso, não há garantia de que realmente seja possível prever o futuro, e não seguimos os procedimentos formais para a submissão……"
3102-57 = "Bem, acho que é caso de rejeição, não é?"
3102-61 = "E-espera um pouco!"
3102-62 = "B-bom, rejeitar imediatamente assim não é um desperdício……?"
3102-63 = "……Eh? Mas a Yuuka-chan não disse isso agora pouco?"
3102-64 = "Que não temos orçamento suficiente para testar tudo."
3102-65 = "I-isso é claro que sim, mas……"
3102-66 = "Mesmo assim, para o desenvolvimento da tecnologia, acho que novos desafios são necessários às vezes!"
3102-67 = "Se pudermos prever o futuro, isso contribuirá imensamente até para os Problemas Milenares……"
3102-68 = "Considerando as inúmeras invenções geniais que ela já fez, #njá que foi a Chefe Himari quem criou, com certeza……"
3102-70 = "Bem, se a Yuuka-chan insiste tanto, não vou impedir……"
3102-71 = "Mas por conta de quem ficará o custo necessário para essa produção?"
3102-72 = "Como a Veritas não é um clube oficialmente reconhecido, #nnão podemos usar o nome da Veritas……"
3102-73 = "E a Presidente Rio disse para não fornecer recursos para a Chefe Himari pessoalmente, muito menos para um clube……"
3102-74 = "……Pode ser no meu nome."
3102-78 = "……Quer dizer que vai sair do bolso da Yuuka-chan?"
3102-79 = "Mas você tem certeza? Ontem mesmo você disse que o fundo que estava operando despencou e que não tinha dinheiro……"
3102-80 = "E-está tudo bem. Quando esse dispositivo estiver pronto, esse tipo de coisa será fácil de resolver……"
3102-85 = "Se eu puder prever o fluxo do mercado de ações e a loucura da psicologia coletiva…… #nDinheiro é o que não vai faltar!"
3102-90 = "Você parece bem motivada, então vamos fazer isso?"
3102-91 = "……Parece divertido♪"
3102-92 = "De fato, olhando o projeto, é complexo, mas como não podemos terceirizar, vamos dar um jeito dentro do Seminar……"
3102-93 = "Além disso, se um dispositivo tão perigoso for conhecido por toda a Millennium, não dá para saber que tipo de acidente alguém pode causar."
3102-98 = "Vamos lá, rumo a um futuro perfeito sem problemas financeiros……"
3102-99 = "Não, rumo a um futuro perfeito que atingiu a singularidade tecnológica!"
3102-101 = "Hehe, estou ansiosa, não estou?"
