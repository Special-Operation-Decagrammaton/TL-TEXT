[translation]
10035130-1 = "Epílogo parte 2; O erro do Clube de Engenharia (2)"
10035130-2 = "(……Dia do teste do Mecajacaré)"
10035130-6 = "Certo, o ajuste final do corpo principal está concluído.#nAgora só falta instalar o programa de controle de comportamento."
10035130-7 = "Tanque de combustível, ok!"
10035130-8 = "A água no tanque de teste também está pronta!#nO teste pode começar a qualquer momento!"
10035130-10 = "Muito bem. Então, vamos iniciar a instalação do programa de controle de comportamento."
10035130-11 = "Ué? Então o programa ficou pronto a tempo."
10035130-12 = "Para cumprir o prazo, às vezes é preciso fazer concessões."
10035130-13 = "Ontem, encontrei um exemplo de programa parecido na internet.#nPara um teste, isso é o suficiente."
10035130-14 = "Vamos começar o teste."
10035130-24 = "Ah, ele se moveu."
10035130-34 = "Ele está vigiando os arredores……#nÉ a prova de que o algoritmo que imita um jacaré está funcionando."
10035130-35 = "Para parecer um jacaré de verdade, configurei o algoritmo de instinto como prioridade."
10035130-36 = "Ele está até balançando o rabo!"
10035130-37 = "Isso mesmo, explicando melhor — dizem que o movimento de balançar o rabo de um jacaré significa ataque ou ameaça!"
10035130-41 = "……Ataque?"
10035130-42 = "……Ameaça?"
10035130-43 = "O-o quê!?"
10035130-51 = "Ahhh! Minha máquina de café com propulsor a jato, que levei um mês para desenvolver!"
10035130-57 = "A-a minha plataforma de lançamento de foguete d'água supersônico……!"
10035130-58 = "I-isso é!? Por que ele está agindo de forma tão violenta!?"
10035130-59 = "Pelo projeto, era para ele entrar no tanque de água……."
10035130-64 = "Ah!?"
10035130-72 = "O-o tanque de água foi destruído!"
10035130-73 = "A água está chegando aqui! Fujam!"
10035130-79 = "Ugh!"
10035130-80 = "T-temos que desligar o jacaré……!"
10035130-81 = "Ahhh! Não dá! Não conseguimos nem chegar perto!"
10035130-82 = "Droga! Já que chegou a esse ponto, só nos resta chamar a Utaha……!"
10035130-83 = "Senpai, parece que já é tarde demais."
10035130-89 = "Ele destruiu a parede da sala e fugiu……."
10035130-90 = "Aquele poder e velocidade…… o desempenho superou o projeto."
10035130-91 = "O comportamento também superou o projeto, né……."
10035130-92 = "O que a gente faz agora……?"
10035130-97 = "Ei! Que barulho foi esse agora!? Vocês explodiram alguma coisa de novo!?"
10035130-101 = "Essa voz é……."
10035130-108 = "Vim por causa do barulho da explosão…… Como eu imaginei, são vocês."
10035130-109 = "Essa sala está toda alagada. O que aconteceu? E tem um buraco na parede……."
10035130-110 = "C-Chi-chan……."
10035130-112 = "Eu disse várias vezes para testarem as invenções com cuidado, não disse?#nA sala dos servidores fica logo ao lado."
10035130-113 = "Vou ter que reportar isso ao Seminário.#nAgora, o que vocês fizeram dessa vez?"
10035130-114 = "I-isso é……."
10035130-118 = "N-não fomos nós que fizemos isso."
10035130-121 = "(E-estão fingindo que não sabem!?)"
10035130-123 = "I-isso mesmo! Nós não temos nada a ver com isso!"
10035130-124 = "Não é, Hibiki? Nós acabamos de chegar aqui, não foi?"
10035130-125 = "Ah, sim. C-claro……."
10035130-126 = "É isso. H-haha, vai ser difícil limpar tudo isso, mas……#nVamos unir forças e dar o nosso melhor!"
10035130-131 = "Parem com essa atuação ruim."
10035130-132 = "Já chega, fui uma idiota de perguntar para vocês.#nVou investigar por conta própria."
10035130-137 = "Ah! Os nossos dados de trabalho...!"
10035130-143 = "...O que é esse jacaré?"
10035130-144 = "...Droga!"
10035130-145 = "Não tem jeito... Se chegou a esse ponto, não tenho escolha a não ser confessar..."
10035130-153 = "O jacaré mecânico em fase de testes começou a agir de forma violenta de repente...?"
10035130-154 = "Não houve algum problema na fase de projeto?"
10035130-155 = "Isso é impossível!"
10035130-156 = "Este jacaré mecânico para arranjos florais e lazer não tem defeitos!#nEu garanto pelo meu título de mestre!"
10035130-157 = "Então o problema é o programa que foi instalado."
10035130-161 = "B-bem, talvez o software não estivesse perfeito, mas..."
10035130-165 = "...Então era um problema interno, afinal."
10035130-166 = "Hum? Houve algum erro no algoritmo?"
10035130-167 = "Parece que tentaram instalar um programa de lazer...#nPelo que vi no [log=log]registro[/log], um programa de demolição foi instalado."
10035130-172 = "Por que algo assim estaria lá?"
10035130-174 = "Ao que parece... houve um problema com o programa que foi baixado..."
10035130-176 = "Isso não é um programa que foi testado corretamente.#nNão sabemos quem desenvolveu nem qual era o objetivo."
10035130-177 = "Eu sempre digo para tomarem cuidado com a segurança..."
10035130-178 = "Você não estava com a cabeça funcionando direito por falta de sono, não é?#nHaa... vocês sempre deixam passar os detalhes no final."
10035130-183 = "Já sei! Não devemos usar programas de baixa confiabilidade!"
10035130-184 = "Pessoal! De agora em diante, vamos comprar e usar apenas softwares legítimos!"
10035130-185 = "Sim! O Clube de Engenharia recomenda o uso de softwares saudáveis!"
10035130-186 = "Tan-tan-ta-ran."
10035130-191 = "Por favor, pare com essa atuação ruim."
10035130-192 = "Vamos, rápido, temos que ir recuperar o jacaré."
