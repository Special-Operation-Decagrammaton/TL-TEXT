[translation]
10035130-1 = "後日談その2;エンジニア部の過ち（２）"
10035130-2 = "(……メカワニの試運転、当日)"
10035130-6 = "うん、本体の最終調整は完了。#n後は行動制御プログラムをインストールするだけ。"
10035130-7 = "燃料タンクよーし！"
10035130-8 = "試験水槽に水も溜めました！#nテストは、いつでも開始できます！"
10035130-10 = "よし。それでは、行動制御プログラムのインストールを開始しよう。"
10035130-11 = "あれ？プログラム間に合ったんだ。"
10035130-12 = "納期に間に合わせるためには、妥協も必要だからね。"
10035130-13 = "昨日、インターネットでそれらしいプログラムのサンプルを見つけた。#n試運転なら、これで十分さ。"
10035130-14 = "さあ、テストを開始しよう。"
10035130-24 = "あ、動いた。"
10035130-34 = "あたりを警戒してるね……。#nワニを模倣するアルゴリズムが動いている証拠だよ。"
10035130-35 = "本物のワニに見せかけるために、本能アルゴリズムを上位に設定したからね。"
10035130-36 = "尻尾まで振ってますね！"
10035130-37 = "そうだ、説明しますと――ワニが尻尾を振る動きには攻撃、もしくは威嚇の意味があるそうです！"
10035130-41 = "……攻撃？"
10035130-42 = "……威嚇？"
10035130-43 = "わ、わわっ！？"
10035130-51 = "うわあぁ！一ヶ月かけて開発した、ジェットブースター・コーヒーマシンが！"
10035130-57 = "わ、私の超音速水ロケット発射台が……！"
10035130-58 = "こ、これは！？一体、どうして暴れているんだ！？"
10035130-59 = "設計通りなら、水槽のなかに入るはず……。"
10035130-64 = "はっ！？"
10035130-72 = "す、水槽が破壊された！"
10035130-73 = "水がここまで来ます！逃げてください！"
10035130-79 = "ううっ！"
10035130-80 = "わ、ワニの電源を切らなくては……！"
10035130-81 = "うわああっ！ダメです！近づくことすらできません！"
10035130-82 = "くっ！こうなった以上、雷ちゃんを呼ぶしか……！"
10035130-83 = "先輩、もう手遅れみたい。"
10035130-89 = "へ、部屋の壁を破壊して逃げてしまった……。"
10035130-90 = "あのパワーとスピード……設計以上のパフォーマンスだね。"
10035130-91 = "行動も設計以上でしたけどね……。"
10035130-92 = "これ、どうすればいいんでしょうか……？"
10035130-97 = "ちょっと！今の音は何！？また何か爆発させたの！？"
10035130-101 = "この声は……。"
10035130-108 = "爆発音で来てみれば……。やっぱりあんた達か。"
10035130-109 = "この部屋、水浸しじゃない。何があったの？壁に穴も空いてるし……。"
10035130-110 = "ち、チーちゃん……。"
10035130-112 = "発明品のテストは慎重にって、何度も言ったよね？#nサーバー室はすぐ隣なの。"
10035130-113 = "セミナーに報告してもらうよ。#nさあ、今度は何をやったの？"
10035130-114 = "こ、これは……。"
10035130-118 = "わ、私たちがやったことじゃないんだ。"
10035130-121 = "（し、知らんぷり！？）"
10035130-123 = "そ、そうだ！私たちはこの件に関与していない！"
10035130-124 = "そうだろう？ヒビキ。私たちもここに来たばかりだろう？"
10035130-125 = "あ、うん。も、もちろん……。"
10035130-126 = "と、言うわけさ。は、ははっ、ここを片付けるのは大変だが……。#n力を合わせて頑張ろう！"
10035130-131 = "下手な演技はやめて。"
10035130-132 = "もういい、あんた達に聞いたのがバカだった。#n勝手に調べさせてもらう。"
10035130-137 = "あっ！私たちの作業データを……！"
10035130-143 = "……このワニ、何？"
10035130-144 = "……くっ！"
10035130-145 = "仕方ない……。こうなったら、白状するしか……。"
10035130-153 = "試運転中のメカワニが急に暴れ出した……？"
10035130-154 = "設計の段階で、何か問題があったんじゃないの？"
10035130-155 = "それはない！"
10035130-156 = "この華道兼レジャー用メカワニに欠陥など無い！#nマイスターの肩書にかけて！"
10035130-157 = "じゃあ、インストールしたプログラムの問題だね。"
10035130-161 = "た、確かにソフトウェアは完璧ではなかったかも、しれないが……。"
10035130-165 = "……やっぱり、内部の問題だったんだね。"
10035130-166 = "えっと？アルゴリズムに何かエラーでもありましたか？"
10035130-167 = "レジャー用プログラムをインストールしようとしてたみたいだけど……。#nログを見た感じ、解体工事用のプログラムがインストールされてる。"
10035130-172 = "どうしてそんなものが？"
10035130-174 = "どうやら……ダウンロードしたプログラムに問題があったようだ……。"
10035130-176 = "これ、ちゃんとテストされていないプログラムじゃない。#n開発元も、目的も分からない。"
10035130-177 = "セキュリティには気をつけろって、いつも言ってるでしょ……"
10035130-178 = "どうせ寝不足で頭が働いてなかったんじゃない？#nはぁ……いつも最後の詰めが甘いんだから。"
10035130-183 = "そうか！信頼性の低いプログラムは使ってはいけないんだ！"
10035130-184 = "みんな！これからはちゃんと正規のソフトウェアを購入して使用しよう！"
10035130-185 = "はい！エンジニア部は健全なソフトウェアの使用を推奨しています！"
10035130-186 = "パンパカパーン。"
10035130-191 = "だから、下手な演技はやめて。"
10035130-192 = "ほら、はやくワニを回収しに行くよ。"
