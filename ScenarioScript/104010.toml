[translation]
104010-1 = "第1話;定められた運命"
104010-11 = "「ウトナピシュティムの[ruby=もとぶね]本船[/ruby]」が、「箱舟」にハッキングされた……？"
104010-12 = "……はい。私たちは現在、「アトラ・ハシースの箱舟」に接続された状態です。"
104010-13 = "――この船は、「箱舟」の演算装置となりました。"
104010-15 = "そう――「箱舟」はこの船の演算機能を使って、再び「多次元解釈」を試みているのです。"
104010-16 = "そんな……じゃあ、私たちはどうすればいいのよ……？"
104010-17 = "今は、この接続を絶つことが最優先です。#n敵はこの船のエネルギーを利用して「次元エンジン」を修復しているのですから。"
104010-18 = "それに、「虚妄のサンクトゥム」に流入しているエネルギー量が増加していて――#nいつサンクトゥムが顕現してもおかしくない状態です。"
104010-20 = "ウトナピシュティムの本船、最終処理実行。#n「自爆シーケンス」を再起動。"
104010-21 = "ま、また自爆シーケンスが……！？"
104010-25 = "800秒後、「自爆シーケンス」が起動します。#n搭乗者は急いで避難してください。"
104010-26 = "こ、これ……止められないんですか？"
104010-27 = "繰り返します――搭乗者は急いで避難してください。#n793秒後、「自爆シーケンス」が――"
104010-28 = "ダメ、システムが動かない……！！#nハッキングをどうにかしない限り――"
104010-30 = "現在、対応中です！！#nチーちゃん、箱舟との接続を強制解除しますよ！"
104010-33 = "分かった、サポートする！"
104010-34 = "ちょっと……待って、なにコレ！？"
104010-35 = "これは、流石に……"
104010-36 = "り、リアルタイムでアルゴリズムを変更してる……？"
104010-37 = "うちも、スピードでは負けないよ……！よし、解除してヒマリ！"
104010-38 = "接続、解除！"
104010-45 = "……ぐっ！"
104010-47 = "……拒否されました。"
104010-48 = "繰り返します。搭乗者は急いで避難してください。#n533秒後、「自爆シーケンス」が――"
104010-49 = "……。"
104010-50 = "こ、このままでは……！"
104010-51 = "どどどうしよ！？"
104010-52 = "一体、これは……。"
104010-53 = "ほとんどの演算装置を失った状態で私たちをハッキングし、次元エンジンを修復――さらにサンクトゥムの多次元解釈を加速化……？"
104010-54 = "これほどの演算処理性能を持つ管制システムが「箱舟」にあったなんて……。"
104010-59 = "このシステムの存在に気づけなかった時点で、私たちの敗北は決まっていたのかもしれません……。"
104010-73 = "あれは……私？"
104010-83 = "肯定[ruby=すなおおかみ]。砂狼シ[/ruby]ロコ、別時間軸の同一存在。"
104010-84 = "[s1] \"別時間軸の……\"\n[s2] \"同一存在……？\""
104010-87 = "肯定。そうです、[USERNAME]先生。"
104010-88 = "[s] \"それじゃあ君は……アロナ？\""
104010-92 = "一部肯定。この「シッテムの箱」に常駐しているシステム管理者であり、メインOSの「A.R.O.N.A」です。"
104010-94 = "え、ええっ！？"
104010-95 = "な、何を言っているんですか！「シッテムの箱」に常駐しているシステム管理者は……私、ですよね……？わ、私が二人……？"
104010-96 = "シロコさんも二人……？そ、それじゃあ……！"
104010-100 = "……いいえ！それでもおかしいです！"
104010-101 = "それならどうして、「シッテムの箱」のOSがここに居るのでしょうか！#nなにか……なにかズルでもしない限り……！"
104010-103 = "回答。それは、ここが「状態の共存」を維持している「アトラ・ハシースの箱舟」の内部であるためです。"
104010-104 = "この「ナラム・シンの玉座」は、次元、時間、実在の有無が確定されずに混ざり合う、混沌の領域。"
104010-105 = "私が教室を有しない今、[USERNAME]先生がこの場所を歪曲したからここにいるのです。ズルではありません。"
104010-107 = "いっ、今……"
104010-108 = "私の質問に答えた……？#nわ、私の声は先生にしか聞こえないはずなのに……どうやって……？"
104010-109 = "肯定。聞こえています。"
104010-110 = "わあっ！！？"
104010-111 = "ここにも、接続できるんですか……！？"
104010-112 = "……。"
104010-113 = "……？"
104010-114 = "……肯定。#n……「A.R.O.N.A」ですので。"
104010-115 = "私たちは、同じ「シッテムの箱」のOSであるため、相互干渉ができるものと推測します。"
104010-119 = "……。"
104010-122 = "私はあくまで、「シッテムの箱」の所有者である[USERNAME]先生を助け、サポートするだけの存在。"
104010-123 = "先生、ご命令を。"
104010-124 = "[ns] \"………………それは、つまり。\""
104010-128 = "[ns] \"プレナパテスが……別の時間軸の「私」ということ？\""
104010-130 = "一部肯定。対象が、連邦捜査部「シャーレ」の顧問[USERNAME]先生と同一存在であることを確認。"
104010-131 = "[s] \"………………………………！！！\""
104010-135 = "……しかし、一部差異が存在します。"
104010-137 = "せ、先生……！！"
104010-138 = "[s] \"アロナ……？\""
104010-139 = "そ、そうです……そう、と言うか、違う、と言うか……。"
104010-140 = "今私の方でもプレナパテスの生体情報を確認してみましたが……#nたしかに、一致します……外見こそ変わりましたが……"
104010-141 = "「プレナパテス」は……別の時間軸の、先生です……。#n……で、でも、"
104010-142 = "プレナパテス――いえ、あの時間軸の先生は……"
104010-143 = "すでに……"
104010-146 = "生きて、いません……。"
104010-147 = "[ns3] \"プレナパテスが、生きていない……？\"\n[ns4] \"死んでいる……？\""
104010-152 = "ええ、そう。"
104010-157 = "――先生を殺したのは、私だから。"
104010-158 = "……え？"
104010-163 = "そうしたら、先生は「色彩の[ruby=きょうどうしゃ]嚮導者[/ruby]」になった。"
104010-164 = "これは……おそらく「色彩」の影響だろうね。"
104010-165 = "[ns] \"……………………。\""
104010-167 = "そして私を、ここに連れてきたの。#n世界を終焉に導くという、私の運命を実現させるために。"
104010-171 = "……あなたが、私？"
104010-172 = "うん。"
104010-173 = "……私が……先生を……ころ、した……？"
104010-174 = "ええ。"
104010-176 = "……世界を、滅亡……？"
104010-177 = "そう。"
104010-178 = "ふざけ、ないで――――――！！！"
104010-189 = "そんなの、信じない――！！"
104010-190 = "世界を滅亡させて、先生を殺す……？#nそんなわけない！！"
104010-198 = "先生を殺して、あなたの存在の道具として利用？"
104010-199 = "私が、そんなことするわけ――――！！"
104010-218 = "あなたがいくら否定したところで、これは既に定められたこと。"
104010-220 = "あなたは――[ruby=・]そ[/ruby][ruby=・]う[/ruby][ruby=・]な[/ruby][ruby=・]る[/ruby]。"
104010-221 = "この世界に存在する以上、そう定められているの。"
104010-225 = "ゴホッ……っ……うぅっ……。"
104010-228 = "それ[ruby=すなおおかみ]が砂狼シ[/ruby]ロコという存在の運命。#n世界を死に導く神。それが――私たちの「本質」。"
104010-229 = "[ns] \"シロコ……！！\""
104010-232 = "だ、め……先生……来ない、で……"
104010-237 = "私はあなたより強い。"
104010-238 = "あなたにはない事を経験し、知らないことを知っている。この差は埋まらない。"
104010-239 = "ゴホッ……あなたは……"
104010-240 = "……どうして……そんな……"
104010-244 = "「砂狼シロコ」は――"
104010-245 = "――プレナパテスの計画にとって、どんな変数になるのか想定できなかった。世界を終焉に導く「崇高」は、1つの世界に1つしか存在できない。"
104010-246 = "私がこの世界で安定して活動するためには、同一存在であるあなたを、この世界に[ruby= ・   ・   ・   ・   ・ ]存在しない[/ruby]状態にしなければならなかった。"
104010-247 = "だから先にあなたを誘拐し、実在と非実在が混ざり合ったこの「箱舟」に閉じ込めたの。"
104010-248 = "でも、それ以上に――"
104010-252 = "――私はあなたに同情するよ、シロコ。"
104010-253 = "ここで、誰にも知られずに終焉を迎えられたら良かったのに。"
104010-254 = "そうすれば、あなたは自身の愛する人たちの死を知らずに消えられたのにね。"
104010-256 = "こんな事をするから――あなたはまた、苦しむことになる。"
104010-260 = "それで……どうする？先生。"
104010-261 = "[ns] \"…………………………………………。\""
104010-264 = "次回;抵抗（１）"
