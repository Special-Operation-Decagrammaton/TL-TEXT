[translation]
104010-1 = "Episódio 1; Destino Predestinado"
104010-11 = "A 'Nave Principal de Utnapishtim' foi hackeada pela 'Arca'……?"
104010-12 = "……Sim. Nós atualmente estamos conectados à 'Arca de Atrahasis'."
104010-13 = "――Esta nave se tornou o dispositivo de processamento da 'Arca'."
104010-15 = "Isso mesmo――A 'Arca' está usando a capacidade de processamento desta nave para tentar a 'interpretação multidimensional' mais uma vez."
104010-16 = "Não acredito……então o que a gente faz agora……?"
104010-17 = "No momento, cortar essa conexão é a prioridade.#nPorque o inimigo está usando a energia desta nave para consertar o 'Motor Dimensional'."
104010-18 = "Além do mais, a quantidade de energia fluindo pro 'Sanctum da Falsidade' tá aumentando――#né só questão de tempo até o Sanctum aparecer de novo."
104010-20 = "Nave Principal de Utnapishtim, iniciando processo final.#nReiniciando 'Sequência de Autodestruição'."
104010-21 = "D-De novo essa Sequência de Autodestruição……!?"
104010-25 = "Em 800 segundos, a 'Sequência de Autodestruição' será ativada.#nPassageiros, por favor, evacuem imediatamente."
104010-26 = "I-Isso aqui……não tem como parar não?"
104010-27 = "Repetindo――Passageiros, por favor, evacuem imediatamente.#nEm 793 segundos, a 'Sequência de Autodestruição' será――"
104010-28 = "Não dá, o sistema não responde……!!#nSe a gente não der um jeito nesse hack――"
104010-30 = "Já tô cuidando disso!!#nChi-chan, vou forçar a desconexão com a Arca, hein!"
104010-33 = "Beleza, te dou cobertura!"
104010-34 = "Peraí……espera, o que é isso!?"
104010-35 = "Aí já é demais, né……"
104010-36 = "E-Eles tão mudando o algoritmo em tempo real……?"
104010-37 = "Nós não vamos perder no quesito velocidade……! Pronta, desconecta, Himari!"
104010-38 = "Desconectando!"
104010-45 = "……Ugh!"
104010-47 = "……Deu acesso negado."
104010-48 = "Repetindo. Passageiros, por favor, evacuem imediatamente.#nEm 533 segundos, a 'Sequência de Autodestruição' será――"
104010-49 = "……。"
104010-50 = "D-Desse jeito……!"
104010-51 = "O-O-O que a gente faz!?"
104010-52 = "Mas o que é isso afinal……"
104010-53 = "Mesmo perdendo quase todos os dispositivos de processamento, eles nos hackearam, consertaram o motor dimensional――e ainda aceleraram a interpretação multidimensional do Sanctum……?"
104010-54 = "Quem diria que a 'Arca' tinha um sistema de controle com um poder de processamento tão absurdo……"
104010-59 = "Talvez a gente já tivesse perdido no momento em que não percebeu a existência desse sistema……"
104010-73 = "Aquela sou……eu?"
104010-83 = "Afirmativo. Sunaookami Shiroko, mesma existência, de uma linha temporal diferente."
104010-84 = "[s1] \"De uma linha temporal diferente……\"\n[s2] \"A mesma existência……?\""
104010-87 = "Afirmativo. Isso mesmo, Sensei [USERNAME]."
104010-88 = "[s] \"Então você é a……Arona?\""
104010-92 = "Parcialmente afirmativo. Sou a 'A.R.O.N.A', sistema operacional principal e administradora de sistemas residente nesta 'Arca de Shittim'."
104010-94 = "Hã, ehh!?"
104010-95 = "D-Do que você tá falando! A administradora de sistemas residente na 'Arca de Shittim' sou……eu, né……? E-Eu tô duplicada……?"
104010-96 = "A Shiroko-san também tá duplicada……? E-Então……!"
104010-100 = "……Não! Mesmo assim é estranho!"
104010-101 = "Então por que o sistema operacional da 'Arca de Shittim' tá aqui!#nE-Eles devem ter trapaceado de alguma forma……!"
104010-103 = "Resposta. Isso ocorre porque estamos dentro da 'Arca de Atrahasis', que mantém uma 'coexistência de estados'."
104010-104 = "Este 'Trono de Naram-Sin' é um domínio caótico onde dimensão, tempo e existência se misturam sem se definir."
104010-105 = "Estou aqui porque o Sensei [USERNAME] distorceu este lugar quando eu não possuía uma sala de aula. Não é trapaça."
104010-107 = "A-Agora pouco……"
104010-108 = "Ela respondeu à minha pergunta……?#nM-Mas a minha voz só deveria ser ouvida pelo Sensei……como é que……?"
104010-109 = "Afirmativo. Consigo escutar."
104010-110 = "Waaah!!?"
104010-111 = "Vocês também conseguem se conectar com aqui……!?"
104010-112 = "……。"
104010-113 = "……?"
104010-114 = "……Afirmativo.#n……Afinal, eu sou a 'A.R.O.N.A'."
104010-115 = "Presumo que nós possamos interferir uma na outra, pois ambas somos sistemas operacionais da mesma 'Arca de Shittim'."
104010-119 = "……。"
104010-122 = "Sou apenas uma existência criada para ajudar e apoiar o dono da 'Arca de Shittim', Sensei [USERNAME]."
104010-123 = "Sensei, aguardo suas ordens."
104010-124 = "[ns] \"………………Isso quer dizer que.\""
104010-128 = "[ns] \"O Phrenapates é……o 'eu' de outra linha temporal?\""
104010-130 = "Parcialmente afirmativo. Confirmo que o alvo é a mesma existência que o Sensei [USERNAME], conselheiro do Departamento de Investigação Federal 'Schale'."
104010-131 = "[s] \"………………………………!!!\""
104010-135 = "……No entanto, existem algumas diferenças."
104010-137 = "S-Sensei……!!"
104010-138 = "[s] \"Arona……?\""
104010-139 = "S-Sim……quer dizer, não sei dizer se é ou não……."
104010-140 = "Eu chequei as informações biométricas do Phrenapates aqui também e……#né verdade, elas batem certinho……mesmo a aparência sendo tão diferente……"
104010-141 = "O 'Phrenapates' é……o Sensei de outra linha temporal……. #n……M-Mas,"
104010-142 = "O Phrenapates――quer dizer, o Sensei daquela linha temporal já……"
104010-143 = "já……"
104010-146 = "Não está……vivo."
104010-147 = "[ns3] \"O Phrenapates não está vivo……?\"\n[ns4] \"Ele tá morto……?\""
104010-152 = "Sim, isso mesmo."
104010-157 = "――Porque fui eu quem matou o Sensei."
104010-158 = "……Hein?"
104010-163 = "E assim, o Sensei se tornou o 'Guia do Chroma'."
104010-164 = "Isso provavelmente……é a influência do 'Chroma'."
104010-165 = "[ns] \"……………………。\""
104010-167 = "E ele me trouxe para cá.#nPara realizar o meu destino de trazer o fim do mundo."
104010-171 = "……Você sou eu?"
104010-172 = "Isso mesmo."
104010-173 = "……Eu……matei……o Sensei……?"
104010-174 = "Sim."
104010-176 = "……Destruir o……mundo……?"
104010-177 = "Isso aí."
104010-178 = "Não brinca comigo――――――!!!"
104010-189 = "Eu não acredito nisso――!!"
104010-190 = "Destruir o mundo, matar o Sensei……?#nIsso não é possível!!"
104010-198 = "Matar o Sensei e usar a sua existência como uma ferramenta?"
104010-199 = "Eu nunca faria algo assim――――!!"
104010-218 = "Não importa o quanto você negue, isso já está decidido."
104010-220 = "Você vai――ficar assim."
104010-221 = "Enquanto você existir neste mundo, esse é o seu destino."
104010-225 = "Cof……gh……uuh……."
104010-228 = "Esse é o destino da existência chamada Sunaookami Shiroko.#nO deus que leva o mundo à morte. Essa é a nossa――'verdadeira natureza'."
104010-229 = "[ns] \"Shiroko……!!\""
104010-232 = "N-Não……Sensei……não chega, perto……"
104010-237 = "Eu sou mais forte que você."
104010-238 = "Eu vivi o que você não viveu, e sei o que você não sabe. Essa diferença é insuperável."
104010-239 = "Cof……Você……"
104010-240 = "……Por que……isso……"
104010-244 = "Eu não sabia――"
104010-245 = "――o quanto a 'Sunaookami Shiroko' atrapalharia o plano do Phrenapates. Só pode haver um 'Sublime' para trazer o fim do mundo."
104010-246 = "Para eu poder agir de forma segura nesse mundo, eu precisava garantir que a mesma existência que eu, você, não existisse mais nele."
104010-247 = "Foi por isso que eu te sequestrei primeiro e te tranquei nessa 'Arca', onde existência e não existência se misturam."
104010-248 = "Mas, mais que isso――"
104010-252 = "――Eu sinto pena de você, Shiroko."
104010-253 = "Queria que você tivesse encontrado o seu fim aqui, sem ninguém saber."
104010-254 = "Assim você poderia ter desaparecido sem saber da morte das pessoas que ama."
104010-256 = "Por ter feito tudo isso――você só vai sofrer de novo."
104010-260 = "E aí……o que você vai fazer? Sensei."
104010-261 = "[ns] \"…………………………………………。\""
104010-264 = "Próximo episódio; Resistência (1)"