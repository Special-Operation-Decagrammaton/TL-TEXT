[translation]
2005703-1 = "O primeiro passo"
2005703-2 = "……Por fim, posso confirmar mais uma vez?"
2005703-3 = "Equipada com o rádio ultracompacto da C&C, entro na sala de aula."
2005703-4 = "E então…… tento me aproximar das alunas da turma para conversar."
2005703-5 = "Exatamente como simulamos ontem à noite, nós dois……."
2005703-6 = "O Sensei ouve a situação através do dispositivo e me dá conselhos. #nEsse fluxo está correto?"
2005703-7 = "É o \"Treinamento de Avatar: Vamos nos aproximar\"."
2005703-11 = "……."
2005703-12 = "Será que vai dar certo mesmo……?"
2005703-13 = "[s1] \"Como dizem, é arriscar ou quebrar…….\"\n[s2] \"Já que chegamos até aqui, não tem como voltar atrás!\""
2005703-16 = "É verdade. Sensei, conto com o seu apoio."
2005703-21 = "(Embora eu tenha dito isso…… será que sou capaz?)"
2005703-22 = "(Será que vou conseguir dar bons conselhos sobre conversas entre jovens……?)"
2005703-37 = "Ah, Akane-san."
2005703-38 = "O-oi…… Akane-san."
2005703-45 = "Bom dia para vocês duas! #nNão precisa de Akane-san, podem me chamar só de Akane!"
2005703-47 = "……!?"
2005703-48 = "……!?!?!?!"
2005703-50 = "(……Será que isso vai dar certo mesmo?)"
2005703-51 = "[s] (Vamos acreditar que vai dar certo……!)"
2005703-52 = "(É, verdade……)"
2005703-55 = "H-hoje você está um pouco diferente, não está? #nAkane……-san?"
2005703-56 = "É, é isso mesmo. É a primeira vez que te vejo sem óculos também."
2005703-58 = "Pensei em mudar um pouco o visual. Coloquei lentes de contato, o que acham?"
2005703-59 = "E esse negócio de Akane-san…… é um pouco distante, não acham?"
2005703-64 = "Err…… você pegou alguma coisa no Departamento de Saúde e Vida?"
2005703-65 = "Tipo um novo tratamento hormonal…… sabe, dizem que o equilíbrio hormonal muda a personalidade……."
2005703-66 = "Ouvi dizer que a pessoa fica mais enérgica…… ahaha."
2005703-67 = "……Isso soa quase tão suspeito quanto o Clube de Pseudociência."
2005703-68 = "Não, mas olha…… as meninas do Departamento de Saúde e Vida realmente mudam as pessoas, né."
2005703-69 = "Ah, bom, talvez esse lado seja pior."
2005703-74 = "(E olha que o roteiro foi muito bem planejado com o Sensei……)"
2005703-75 = "(Sinto muito. Percebi novamente que isso não é para mim……)"
2005703-76 = "[s] (Não…… a culpa não é da Akane. É que eu não entendo muito bem as jovens……)"
2005703-77 = "(Mas…… o que devo fazer agora……?)"
2005703-78 = "[s] (Entendo…… que tal sugerir algo assim?)"
2005703-83 = "S-se não for um incômodo! Que tal irmos para Haruhabara depois da aula?"
2005703-84 = "Ouvi dizer que está rolando um evento de colaboração!"
2005703-86 = "Haruhabara……?"
2005703-87 = "Evento de colaboração……?"
2005703-89 = "(……)"
2005703-90 = "(Como eu pensei…… talvez isso também seja forçado demais……)"
2005703-96 = "Uau! A Akane-san também vai para Haruhabara!"
2005703-97 = "Fico feliz que tenha convidado!? Vamos, vamos!"
2005703-99 = "……."
2005703-100 = "Sim!"
2005703-106 = "Ah…… preciso voltar para o meu lugar."
2005703-107 = "Vamos assim que terminar! Faz tempo que não vou a Haruhabara!?"
2005703-108 = "Ué, você não foi lá há duas semanas……?"
2005703-109 = "Duas semanas atrás não é muito tempo?"
2005703-111 = "（Soltei um suspiro de alívio junto com a Akane）"
2005703-112 = "（Percebi dolorosamente que tentar prever as conversas dos jovens sendo um adulto era uma causa perdida desde o início...）"
2005703-122 = "Chegamos em Haruhabara!"
2005703-123 = "Para onde vamos?"
2005703-124 = "Quero ir ao fliperama! Dessa vez eu vou quebrar o recorde do ranking!"
2005703-125 = "Você deveria tentar quebrar o ranking quando estiver sozinha... #nAkane... san? Onde está acontecendo o evento de colaboração?"
2005703-130 = "（S-Sensei? O que devemos fazer em uma situação dessas...?）"
2005703-131 = "[s] （Nessas horas...）"
2005703-135 = "Tem comida temática aqui... será que podemos ir?"
2005703-137 = "Ah, boa ideia! Eu ajudo com as bebidas também!"
2005703-138 = "Eu comi bastante no almoço, mas... ah, que se dane!"
2005703-147 = "Chegamos! O fliperama!"
2005703-148 = "Você vai mesmo fazer isso...?"
2005703-149 = "Claro que sim! Não sei quem é essa tal de UZQueen, mas ela está em primeiro lugar há muito tempo! #nHoje eu vou derrubá-la do topo!"
2005703-150 = "Hã?"
2005703-151 = "Ah..."
2005703-157 = "...Akane-san, você também conhece a UZQueen?"
2005703-161 = "Digamos que aconteceram várias coisas...?"
2005703-162 = "Bem... você é livre para desafiar, mas..."
2005703-163 = "Ai... é impossível vencer... será que eu deveria impedi-la de fazer isso...?"
2005703-164 = "Ahahaha..."
2005703-179 = "Preciso de um pouco de energia... meu cérebro está pedindo açúcar... #nAh! Vamos comer esse pudim! Dizem que é um produto novo!"
2005703-180 = "Sabor caramelo com shiso...? Isso é seguro mesmo? Não parece meio suspeito?"
2005703-182 = "（Isso me lembra de quando recebi um pedido de limpeza por suspeita de terrorismo gastronômico devido a um sabor estranho...）"
2005703-183 = "（O presidente daquela fábrica não tinha más intenções, ele só era alguém que dedicou sua vida ao shiso, então o caso foi encerrado assim...）"
2005703-184 = "（A paixão daquele presidente era realmente admirável...）"
2005703-190 = "..."
2005703-191 = "..."
2005703-196 = "F-foi estranho...?"
2005703-198 = "Akane-chan, você canta muito bem!"
2005703-199 = "Meus ouvidos ficaram felizes..."
2005703-201 = "Ah, pare com isso! Estou ficando com vergonha..."
2005703-205 = "Pela sua coloração pessoal, acho que essa cor ficaria melhor. #nSe você aplicar um pouco aqui para dar um toque... veja só."
2005703-206 = "É verdade... incrível! Deu profundidade ao rosto!"
2005703-207 = "Akane-chan, você é incrível! Entende muito disso, né!"
2005703-208 = "（Que bom que o que aprendi com os disfarces nas missões foi útil...）"
2005703-215 = "Ah, foi muito divertido!"
2005703-216 = "Brincamos bastante. #nMas..."
2005703-217 = "..."
2005703-219 = "...?"
2005703-221 = "Akane-chan, já pode relaxar."
2005703-222 = "Você esteve se esforçando demais o dia todo, não é?"
2005703-227 = "Ah..."
2005703-228 = "...Você percebeu tudo isso?"
2005703-230 = "Claro, é fácil notar."
2005703-231 = "Eu até pensei que você tivesse algum motivo, mas..."
2005703-233 = "..."
2005703-234 = "Espere um pouco, por favor. #nMinha lente de contato saiu um pouco do lugar... vou tirá-la."
2005703-239 = "Você voltou a ser a Akane de sempre. Foi uma novidade ver você sem óculos."
2005703-240 = "Mas essa é a Akane que nós conhecemos."
2005703-241 = "Então... por que a mudança repentina?"
2005703-243 = "！？"
2005703-244 = "Ah, se for difícil de dizer, não tem problema. #nEu me diverti."
2005703-245 = "Bem... na verdade—"
2005703-246 = "……。"
2005703-247 = "Depois de ouvir o que o Sensei disse, eu..."
2005703-248 = "Senti que queria me aproximar de todos... um pouco mais do que o habitual."
2005703-250 = "Ah, é isso... entendi."
2005703-255 = "（Enquanto ouvia a voz alegre da Akane, desliguei silenciosamente o rádio）"
2005703-256 = "（E então...）"
2005703-260 = "（Jurei que não faria mais nada parecido com uma \"simulação de conversa cotidiana para jovens\" por um bom tempo...）"

