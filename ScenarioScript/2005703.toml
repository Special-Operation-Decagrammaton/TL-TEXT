[translation]
2005703-1 = "踏み出す一歩"
2005703-2 = "……最後に、改めて確認させていただいてもよろしいでしょうか。"
2005703-3 = "C&C用の超小型無線機を装着し、私は教室に入ります。"
2005703-4 = "そして……クラスの子たちに歩み寄って会話を試みます。"
2005703-5 = "昨夜、二人でシミュレーションした通りに……。"
2005703-6 = "先生はその様子を装置越しに聞きながら、アドバイスをくださる。#nその流れで大丈夫でしょうか？"
2005703-7 = "「親しくなろう：アバター訓練」です。"
2005703-11 = "……。"
2005703-12 = "本当に、大丈夫でしょうか……？"
2005703-13 = "[s1] \"当たって砕けろともいうし……。\"\n[s2] \"ここまで来たら、やるしかないよ！\""
2005703-16 = "そうですね。先生、何卒よろしくお願いします。"
2005703-21 = "（とは言ったものの……私にできるのだろうか）"
2005703-22 = "（若い子同士の会話、うまくアドバイスできるだろうか……）"
2005703-37 = "あれ、アカネさん。"
2005703-38 = "お、おはよう……アカネ、さん。"
2005703-45 = "二人とも、おはよう！#nアカネ[ruby=・]さ[/ruby][ruby=・]ん[/ruby]じゃなくて呼び捨てでいいよ！"
2005703-47 = "……！？"
2005703-48 = "……！？！？！？"
2005703-50 = "（……本当にこれで大丈夫なのでしょうか）"
2005703-51 = "[s] （大丈夫だと信じよう……！）"
2005703-52 = "（そう、ですね……）"
2005703-55 = "き、今日はなんかいつもと違う感じがするね？#nアカネ……さん？"
2005703-56 = "そ、そそ、そうだね。メガネを外しているのも初めて見るし。"
2005703-58 = "ちょっとイメチェンしてみようかなって思って。コンタクトにしてみたんだけど、どうかな？"
2005703-59 = "それにアカネ[ruby=・]さ[/ruby][ruby=・]ん[/ruby]って……ちょっと寂しいな。"
2005703-64 = "えっと……生活健康部から何かもらったりした？"
2005703-65 = "新しいホルモン剤とか……ほら、ホルモンバランスで性格って変わるっていうし……。"
2005703-66 = "今までよりパワフルになるって聞いたりもしたような……あはは。"
2005703-67 = "……そこまでいくと、ちょっと疑似科学部みたいな胡散臭さがあるような。"
2005703-68 = "いやでもほら……生活健康部の子たちって本当に、人を変えちゃうじゃん。 "
2005703-69 = "あー、まぁそっちのほうがタチ悪いかも。"
2005703-74 = "（先生と二人で練りに練った台本だったのに……）"
2005703-75 = "（すみません。やはり、私には向いていないのだと改めて実感してしまいました……）"
2005703-76 = "[s] （いや……アカネは悪くないよ。私が若い子のことよく分かっていなかったから……）"
2005703-77 = "（ですが……これからどうすれば良いのでしょう……？）"
2005703-78 = "[s] （そうだね……例えば、こういうのを提案してみるとか？）"
2005703-83 = "も、もしよかったら！放課後、春葉原に行かない？"
2005703-84 = "コラボイベントやってるんだって！"
2005703-86 = "春葉原……？"
2005703-87 = "コラボイベント……？"
2005703-89 = "（……）"
2005703-90 = "（やっぱり……これも無理があるのかもしれません……）"
2005703-96 = "えー！アカネさんも春葉原行くんだね！"
2005703-97 = "誘ってくれて嬉しい！？いこいこ！ "
2005703-99 = "……。"
2005703-100 = "はい！"
2005703-106 = "あ……そろそろ席に戻らなきゃ。"
2005703-107 = "終わったらすぐ行こ！春葉原久しぶりだ！？"
2005703-108 = "え、2週間前も行ってたじゃん……。"
2005703-109 = "2週間前は久しぶりじゃない？"
2005703-111 = "（アカネと一緒に安堵のため息を吐いた）"
2005703-112 = "（若者の会話を大人が予測しようなんて土台無理な話だったのだと痛感した……）"
2005703-122 = "春葉原と～ちゃ～く！"
2005703-123 = "どこ行く？"
2005703-124 = "ゲーセン行きたい！今度こそランキングを更新してやる！"
2005703-125 = "ランキングの更新は一人の時にやりなよ……。#nアカネ……さんは？コラボイベントってどこでやってるの？"
2005703-130 = "（せ、先生？こういうときは、どうしたらいいのでしょう……？）"
2005703-131 = "[s] （そういう時は……）"
2005703-135 = "ここでコラボフードが出てて……行ってもいいかな？"
2005703-137 = "あ、いいね！ドリンクも手伝えるよ！"
2005703-138 = "お昼ご飯、結構ガッツリ食べちゃったんだけど……まあいっか！"
2005703-147 = "来たぞ！ゲーセン！"
2005703-148 = "本当にやるの……？"
2005703-149 = "当たり前でしょ！UZQueenだか何だか知らないけど、ずーっと1位を取られ続けてるんだよ！？#n今日こそ引きずり下ろしてやる！"
2005703-150 = "え？"
2005703-151 = "あ……。"
2005703-157 = "……アカネさんもUZQueenのこと知ってるの？"
2005703-161 = "色々ありまして……？"
2005703-162 = "まあ……挑戦は自由だけどさ……。"
2005703-163 = "はあ……絶対無理なのに……こういうのって止めたほうがいいのかなぁ……。"
2005703-164 = "あははは……。"
2005703-179 = "エネルギー補給が必要……脳が糖分を欲してる……。#nあ！このプリン食べよ！新商品だって！"
2005703-180 = "キャラメルしそ味……？これ、本当に大丈夫なの？ヤバそうじゃない？"
2005703-182 = "（これは……「変な味で味覚テロ疑惑」として[ruby=・]お[/ruby][ruby=・]掃[/ruby][ruby=・]除[/ruby]の依頼を受けていた時の……）"
2005703-183 = "（あの工場の社長に悪気はなく、ただしそに身を捧げた方だったということで終結したはず……）"
2005703-184 = " （本当にあの社長の情熱は、お見事でしたね……）"
2005703-190 = "……。"
2005703-191 = "……。"
2005703-196 = "へ、変だった……かな？"
2005703-198 = "アカネちゃん、歌超うまーい！"
2005703-199 = "耳が幸せだった……。"
2005703-201 = "も、もう！照れるよ……。"
2005703-205 = "パーソナルカラー的に、この色がいいんじゃないかな。#nここにニュアンスで入れてみたら……ほら。"
2005703-206 = "ほんとだ……すごい！顔に陰影がついた！"
2005703-207 = "アカネちゃん、すごい！詳しいんだね！"
2005703-208 = "（任務で変装してたのが役立って良かった……）"
2005703-215 = "あー楽しかった！"
2005703-216 = "いっぱい遊んだね。#nでも……。"
2005703-217 = "……。"
2005703-219 = "……？"
2005703-221 = "アカネちゃん、もう大丈夫だよ。"
2005703-222 = "今日一日、無理してたよね？"
2005703-227 = "あ……。"
2005703-228 = "……全部、分かっていたんですか？"
2005703-230 = "そりゃ普通に分かるよ。"
2005703-231 = "何か事情があるのかなって思いもしたけど……。"
2005703-233 = "……。"
2005703-234 = "ちょっと待ってくださいね。#nコンタクトレンズが少しずれて……外しますね。"
2005703-239 = "いつものアカネちゃんに戻ったね。メガネかけてないのも新鮮だったけど。"
2005703-240 = "でもこっちが私たちが知ってるアカネちゃんって感じ。"
2005703-241 = "それで……どうして急に？"
2005703-243 = "！？"
2005703-244 = "あ、言いにくいなら別に大丈夫だよ。#n楽しかったし。"
2005703-245 = "その……実は――"
2005703-246 = "……。"
2005703-247 = "先生のお話を聞いて、皆さんと……。"
2005703-248 = "いつも以上に一歩、歩み寄りたい……と思ったんです。"
2005703-250 = "なーんだ……そうだったんだ。"
2005703-255 = "（アカネの楽しそうな声を聞きながら、静かに無線機の電源を切った）"
2005703-256 = "（そして……）"
2005703-260 = "（「若者日常会話シミュレーション」みたいなことは、当分しないと誓った……）"
