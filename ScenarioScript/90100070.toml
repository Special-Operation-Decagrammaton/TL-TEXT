[translation]#[Texto revisado.] Em aguardo de revisão de formatação de texto. - Filipe 13/06.
90100070-1 = "Episódio 7: Sombras na Rodovia"
90100070-2 = "Distrito Comercial 3 – Setor 2"
90100070-5 = "Aqui FOX3. Investigando o Setor 2, onde a primeira vítima caiu."
90100070-6 = "A vítima era vendedora de uma farmacêutica. Sofria com o sol forte no trabalho."
90100070-7 = "Mas varrendo a região... a não ser pelos reflexos dos vidros, zero chances de confundir algo com um \"espantalho alvo\"."
90100070-11 = "Zona Alpha – Demolições"
90100070-13 = "FOX4 aqui. Peneirando os escombros onde a terceira vítima apareceu."
90100070-14 = "A vítima era operário. Trabalhava em campo aberto sob o sol."
90100070-15 = "Cof, cof... a poeira aqui é densa. Nem se um lençol branco passasse na minha frente eu veria.#nExceto o calor infernal, nenhuma ameaça."
90100070-19 = "Feira de Getten"
90100070-21 = "FOX2 no ar! Investigando a feira onde o sexto corpo foi achado."
90100070-22 = "A vítima era dona de uma barraca... mas com esse calor, o mercado está deserto. Nem poeira encontrei."
90100070-23 = "Será que a polícia viajou? Tipo, um turista de branco teria sido confundido com o espantalho?"
90100070-24 = "Nada de anormal."
90100070-26 = "Rodovia KV 35"
90100070-28 = "FOX1 aqui. Varrendo o asfalto da KV 35."
90100070-29 = "A nona vítima era funcionária do departamento de estradas. Ela desmaiou durante uma inspeção diurna."
90100070-30 = "Revirei cada buraco, mas――"
90100070-34 = "Investigações sem frutos."
90100070-39 = "Faltam pistas? Mais hidratação?"
90100070-40 = "Faltam evidências. Não conseguimos nem um vislumbre do \"Espantalho Branco\"."
90100070-41 = "Por favor, por tudo o que é mais sagrado... não diga que vamos recomeçar do zero..."
90100070-42 = "Entretanto――"
90100070-46 = "[ns1] \"Eai! Motoboy da Schale-Eats na área!\"\n[ns2] \"Trouxe água e energéticos bem gelados para as minhas favoritas!\""
90100070-49 = "Ah, Sensei..."
90100070-50 = "Obrigada pela logística, mas o senhor não precisava carregar tudo isso.#nE andar conosco o tempo todo agride a minha hierarquia..."
90100070-51 = "[s3] \"O papo no rádio estava cansado. Resolvi dar uma força.\"\n[s4] \"Alguma mina terrestre explodiu?\""
90100070-54 = "Nada grave. Só que estamos sem pistas. As abordagens falharam."
90100070-55 = "Vamos ter que aumentar o perímetro e recomeçar do zero."
90100070-59 = "Urgh... o inferno..."
90100070-61 = "[ns5] \"Essas meninas estão derretendo. Não dá para remarcar para o fim da tarde?\"\n[ns6] \"Quando o sol baixar um pouco, por favor...\""
90100070-64 = "……Não podemos."
90100070-65 = "As evidências mudam com o tempo. O calor, a umidade... tudo influencia."
90100070-66 = "Os incidentes acontecem sempre ao meio-dia.#nInvestigar à noite seria inútil."
90100070-67 = "A lógica é impecável, mas...#nE a saúde das suas soldadas? Elas não entram na equação?"
90100070-68 = "Elas estão exaustas. Pedir para continuar sob esse sol é pedir para serem as próximas vítimas."
90100070-72 = "……Fato."
90100070-73 = "Decreto pausa geral. Vocês descansam na sombra. Eu continuo sozinha――"
90100070-74 = "Ah, vá..."
90100070-75 = "Lá vem o complexo de messias."
90100070-76 = "Yukino, se você for se sacrificar sozinha e se ferrar, você acha que a gente vai ficar de boa no ar condicionado? A gente seria um bando de parasitas nojentas."
90100070-77 = "E-Eu só não queria... foi mal."
90100070-78 = "[ns7] \"O apocalipse não vai acontecer hoje.\"\n[ns8] \"Desarma esses ombros de pedra por um instante, alivia... Que tal?\""
90100070-81 = "Mas... enquanto a gente descansa, mais alguém pode cair vítima."
90100070-82 = "Se eu atrasar por conta de ego... se outra pessoa morrer por minha causa... eu juro――"
90100070-83 = "Se eu falhar... se eu não――"
90100070-90 = "ALERTA! Radar detectou movimento no viaduto da KV Highway!"
90100070-91 = "Parece ser uma pessoa!"
90100070-92 = "Uma pessoa andando a pé na via expressa?!#nA manutenção de hoje não estava agendada!"
90100070-93 = "Negativo. Nenhuma manutenção programada."
90100070-94 = "Será que é o tal \"Espantalho Alvo\"?"
90100070-95 = "Vamos atrás. Antes que suma."
90100070-103 = "O radar está apontando... aquela aluna descendo a ladeira é a assombração?"
90100070-104 = "Com licen――"
90100070-108 = "Hã? Uma civil num lugar desses?"
90100070-109 = "Aconteceu alguma coisa com vocês, oficiais?"
90100070-110 = "A situação complicada é a sua, moça."
90100070-111 = "É proibido pedestres aqui. Volte."
90100070-112 = "Por que você está andando na via expressa sozinha, sem proteção? Loucura?!"
90100070-113 = "Ora, é a coisa mais lógica do manual――"
90100070-117 = "Treinamento prático de riquixá!"
90100070-118 = "[s] \"Hã... Orelhas de coelho... e essas pernas... você é da... Academia Hyakkiyako?\""
90100070-119 = "……Senhor Sensei [USERNAME]?!"
90100070-120 = "Sim! Asakusa Natsuki, do Clube de Riquixá da Academia Hyakkiyako! Lembra do festival de verão, patrão!"
90100070-121 = "Se as oficiais estão cansadas... posso levar vocês de graça!"
90100070-122 = "Hoje está em promoção! Levo vocês por toda D.U. desviando do trânsito e mais barato que táxi!"
90100070-123 = "[s9] \"Agradeço, mas por hoje vou recusar.\"\n[s10] \"Mas já que você está aqui, queremos fazer umas perguntas.\""
90100070-127 = "Deixa eu ver se entendi... você treina puxando riquixá na via expressa para simular estresse de trajeto longo?!"
90100070-128 = "Exato! Meu juramento é entregar os passageiros no destino pelo caminho mais rápido e seguro!"
90100070-129 = "Se eu não conhecer bem os atalhos, quando um cliente VIP subir, a minha credibilidade vai pro saco."
90100070-130 = "É, entendo. Passageiro já desconfia quando o motorista pega uma rota estranha."
90100070-131 = "ISSO É CALÚNIA! O nosso suor está a galáxias de distância desses taxistas chantagistas!"
90100070-132 = "Natsuki-chan, né? A lei proibe veículos de tração humana em vias expressas de D.U.#nMelhor procurar outro lugar para treinar."
90100070-133 = "S-Sério?!"
90100070-134 = "Uuugh... o conselho de Hyakkiyako me proibiu na semana passada... e agora D.U. também? Isso é conspiração anticapitalista!"
90100070-135 = "A física explica: um carro te atropelar seria fatal."
90100070-136 = "Deixando a lei de lado, que atitude suicida. Correr com esse calor já derrubaria qualquer um."
90100070-137 = "Até soldados treinados desmaiariam com esse calor. Mas eu aguento!"
90100070-138 = "O asfalto reflete o sol, a nuca cozinha... mas para mim isso é fichinha. Treinei no inferno."
90100070-139 = "Se você treinou muito no verão, um dia como este é até tranquilo."
90100070-140 = "[s11] \"Mesmo assim, não desafie a biologia.\"\n[s12] \"Toma essa água, bem gelada.\""
90100070-143 = "O-O Sensei me dá água mineral no asfalto infernal... que honra."
90100070-144 = "Receber água da Schale no meio do nada... sorte pura."
90100070-149 = "Agora, uma pergunta sobre o seu trabalho na cidade."
90100070-150 = "Você já viu o tal \"Espantalho Alvo\"?"
90100070-151 = "Espantalho Branco? Na névoa do asfalto?"
90100070-152 = "Quem vê ele, desmaia e tem convulsões..."
90100070-153 = "……Espera, essa descrição... Vocês estão falando do \"Kunekune\"?"
90100070-154 = "Kunekune? Aquele que se retorce?"
90100070-155 = "Essa lenda é mais comum em campos abertos no campo.#nEm cidade grande é raro... mas não impossível."
90100070-156 = "Conte mais sobre esse Kunekune."
90100070-157 = "Em Hyakkiyako, é uma lenda urbana recente."
90100070-158 = "Diferente de outras assombrações que preferem lugares escuros, o Kunekune aparece em campos abertos e ensolarados."
90100070-159 = "De longe, parece um espantalho branco se contorcendo. Ninguém sabe o que é, porque――"
90100070-160 = "quem chega perto enlouquece, começa a se retorcer igual ele, e nunca mais volta ao normal."
90100070-161 = "Os olhos revirados, os dentes rangendo, e um riso fúnebre... se retorcendo..."
90100070-162 = "Que horror."
90100070-163 = "Mas é só lenda. Ninguém em Hyakkiyako acredita nisso.#nO cidadão comum não liga para essas bobagens."
90100070-164 = "Hmm? Se ninguém acredita, por que você sabe tanto?"
90100070-165 = "Eu não acredito em crendices. Eu explico pelas ciências mecânicas.#nEntendo a origem social dessas lendas..."
90100070-167 = "Sabe quando o asfalto esquenta e a miragem dança? Aquela \"fumaça\" ondulante."
90100070-168 = "Nesses dias, é fácil ter insolação. Já quase desmaiei puxando riquixá."
90100070-169 = "Então a lenda pode ser um aviso: \"Se você ver um fantasma branco se retorcendo, saia do sol\". É só bom senso."
90100070-172 = "Miragem..."
90100070-173 = "……Isso! Fenômeno óptico. Não é fantasma."
90100070-174 = "Você nos ajudou muito."
90100070-175 = "Eu? De nada...?"
90100070-180 = "Sensei [USERNAME]. Vamos encerrar a operação por hoje e voltar para a base."
90100070-181 = "[s] \"Combinado. De volta para o inferno seguro.\""
90100070-186 = "[ns] \"Natsuki, não se derrete no sol, viu? Falou~\""
90100070-187 = "Vocês também se cuidem!"
90100070-194 = "Aqueles uniformes de marinheiro... me lembro de algo..."
90100070-195 = "Será que tem intercâmbio de Hyakkiyako na Schale agora?"
90100070-197 = "Próximo Episódio: Do Outro Lado da Miragem"