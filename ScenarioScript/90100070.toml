[translation]
90100070-1 = "Episódio 7: A silhueta na rodovia"
90100070-2 = "3º Distrito Comercial, 2ª Zona"
90100070-5 = "Aqui é FOX3. A primeira vítima foi encontrada, estou investigando a 2ª zona do 3º Distrito Comercial."
90100070-6 = "A vítima era um vendedor de uma empresa farmacêutica próxima e, pelo visto, costumava caminhar por aqui durante o dia."
90100070-7 = "Mas, tirando o brilho ofuscante do reflexo nos vidros, não vejo nada que possa ser confundido com um espantalho branco."
90100070-11 = "Dentro da Zona de Exclusão Classe A: Local de Demolição"
90100070-13 = "Aqui é FOX4. Estou revistando o local de demolição na Zona de Exclusão Classe A, onde a terceira vítima foi encontrada."
90100070-14 = "A vítima era um operário da demolição e, aparentemente, trabalhava muito em terrenos baldios sem sombra."
90100070-15 = "Cof, cof... quanta poeira. Nem sinal de espantalho branco, mal consigo ver qualquer coisa branca. #nNada de anormal, além do calor excessivo."
90100070-19 = "Mercado Externo de Yuetian"
90100070-21 = "Aqui é FOX2. Estou fazendo perguntas no mercado externo de Yuetian. #nÉ o local onde a sexta vítima foi encontrada."
90100070-22 = "Ouvi dizer que a vítima era o dono de uma barraca aqui... #nSerá por causa do calor? As lojas estão fechadas e quase não encontrei ninguém."
90100070-23 = "Hum... será que existe a possibilidade de terem confundido um turista vestindo branco com um espantalho?"
90100070-24 = "Não parece haver nada de especial por aqui."
90100070-26 = "Rodovia KV, Estrada 35"
90100070-28 = "Aqui é FOX1. Revistando a Estrada 35 da Rodovia KV."
90100070-29 = "A nona vítima era um mecânico da Administração Rodoviária de D.U., e parece que sofreu um acidente durante uma inspeção."
90100070-30 = "Verifiquei minuciosamente até debaixo da ponte onde foi encontrado, mas..."
90100070-34 = "Ainda não é o suficiente."
90100070-39 = "O quê? Água? Precisa de mais suprimentos?"
90100070-40 = "Provavelmente, faltam pistas que nos permitam identificar o espantalho branco."
90100070-41 = "Você não vai dizer para começarmos tudo do zero, vai...?"
90100070-42 = "No entanto..."
90100070-46 = "[ns1] \"Olá, aqui é o Schale EATS!\"\n[ns2] \"Trouxe água gelada e bebidas energéticas!\""
90100070-49 = "Ah, Sensei..."
90100070-50 = "Tudo isso... muito obrigada. Não estava pesado? #nDeve ser cansativo vir até aqui toda vez..."
90100070-51 = "[s3] \"Parecia estar levando mais tempo do que o esperado.\"\n[s4] \"Houve algum problema...?\""
90100070-54 = "Não houve nenhum problema grave. #nMas faltam informações que corroborem os depoimentos das vítimas..."
90100070-55 = "Parece que será necessário ampliar a área de busca e retomar as entrevistas."
90100070-59 = "Ugh..."
90100070-61 = "[ns5] \"Com esse calor, não dá para deixar para depois?\"\n[ns6] \"Pelo menos até o sol se pôr...\""
90100070-64 = "Isso... é difícil."
90100070-65 = "As evidências no local mudam de aparência dependendo não só do lugar, mas também do horário e do clima."
90100070-66 = "Todas as vítimas foram encontradas ao meio-dia, sob sol forte. #nSendo assim, investigar após o pôr do sol não faria sentido."
90100070-67 = "É eficiente para coletar evidências, mas... #nnão acha que deveria considerar um pouco a condição dos membros do esquadrão?"
90100070-68 = "Estamos sob sol escaldante há dias, acho que todos já estão bem exaustos."
90100070-72 = "...Não tem jeito."
90100070-73 = "Todos, descansem aqui por perto. A próxima investigação eu farei sozinha..."
90100070-74 = "Francamente..."
90100070-75 = "Lá vem ela de novo. Aquele velho hábito ruim."
90100070-76 = "Yukino, você acha mesmo que vamos descansar de verdade depois de ouvir isso? #nOu acha que somos membros tão horríveis a ponto de ignorar o esforço da nossa capitã?"
90100070-77 = "N-não, não foi essa a intenção..."
90100070-78 = "[ns7] \"Não temos um prazo definido, afinal...\"\n[ns8] \"Por que não relaxa um pouco os ombros?\""
90100070-81 = "Mas... enquanto fazemos isso, novas vítimas podem surgir."
90100070-82 = "Se algo acontecer novamente... por causa da minha negligência, e um cidadão se ferir."
90100070-83 = "Se eu não tomar uma decisão rápida antes que isso aconteça e assumir a responsabilidade..."
90100070-90 = "Espere. Uma nova presença está se aproximando vinda do trevo da rodovia."
90100070-91 = "Pelo movimento e pela velocidade... parece uma pessoa?"
90100070-92 = "Tem alguém na rodovia? #nEstava previsto alguma inspeção da Administração Rodoviária?"
90100070-93 = "Não, não consta no cronograma."
90100070-94 = "Não acredito, o tal \"espantalho branco\" dos rumores está..."

90100070-95 = "Temos que persegui-lo rápido antes que desapareça."
90100070-103 = "Não identificado? É aquela aluna correndo ali?"
90100070-104 = "Ei, com licença—"
90100070-108 = "Ué? Tem alguém aqui...?"
90100070-109 = "Precisa de ajuda com alguma coisa?"
90100070-110 = "Não, não. Na verdade, parece que quem está precisando de ajuda é você."
90100070-111 = "É proibido o tráfego de pedestres aqui. Dê meia-volta."
90100070-112 = "E, para começar, não deveria estar entrando em uma rodovia, né? Por que você veio parar aqui?"
90100070-113 = "Bem, obviamente..."
90100070-117 = "É um treinamento de rua!"
90100070-118 = "[s] \"Ué? Esse uniforme... você é da Academia Hyakkiyako, não é?\""
90100070-119 = "......Sensei(a) [USERNAME]?"
90100070-120 = "Sim! Sou a Natsuki, do Clube de Riquixás da Academia Hyakkiyako!#nFaz tempo desde o festival, hein!"
90100070-121 = "Se quiser... gostaria de uma carona?"
90100070-122 = "Posso te levar a qualquer lugar de D.U. agora mesmo, por um preço mais barato que um táxi!"
90100070-123 = "[s9] \"Não, dispenso o riquixá.\"\n[s10] \"Na verdade, tenho algo para te perguntar...\""
90100070-127 = "Então... você estava treinando puxar o riquixá na rodovia porque talvez apareça um cliente que queira ir para fora da zona autônoma?"
90100070-128 = "Sim! Meu lema é levar o cliente ao destino rapidamente pelo caminho mais curto!"
90100070-129 = "Se eu não conhecer bem a geografia e acabar dando uma volta longa, posso acabar perdendo a confiança do cliente."
90100070-130 = "Entendo... faz sentido. Já fiquei preocupado antes quando um motorista entrou em uma rua desconhecida e achei que ele estava fazendo um caminho mais longo de propósito."
90100070-131 = "Não compare táxis com riquixás!"
90100070-132 = "Posso te chamar de Natsuki?#nO tráfego de riquixás é proibido nas rodovias de D.U.#nTalvez seja melhor você seguir por outra rota."
90100070-133 = "Sério, é proibido!?"
90100070-134 = "Ah... e olha que acabaram de decretar a proibição em Hyakkiyako... não imaginava que em D.U. também fosse assim."
90100070-135 = "Além das leis, é uma questão de bom senso que um riquixá não deve entrar em uma rodovia..."
90100070-136 = "E aliás, como você teve coragem de correr nesse calor?#nCom esse sol, até atletas de clubes esportivos passariam mal em meio dia."
90100070-137 = "Está um pouco quente, sim... mas estou bem! Já estou acostumada!"
90100070-138 = "O asfalto reflete muito calor, então já me acostumei a correr em lugares quentes."
90100070-139 = "Comparado ao auge do verão, isso aqui ainda está fresco!"
90100070-140 = "[s11] \"Mesmo assim, tome cuidado com a insolação.\"\n[s12] \"Toma, pegue esta. Está bem gelada.\""
90100070-143 = "Ah... muito obrigada."
90100070-144 = "Nunca imaginei que ganharia uma bebida do Sensei(a) do Schale em um lugar desses...#nHoje é meu dia de sorte."
90100070-149 = "Já que você vive correndo por estradas quentes, tenho uma pergunta."
90100070-150 = "Você já viu um \"espantalho branco\"?"
90100070-151 = "Um espantalho branco...?"
90100070-152 = "Dizem que quem vê esse espantalho perde a consciência e começa a ter convulsões..."
90100070-153 = "......Por acaso você está falando do \"Kunekune\"?"
90100070-154 = "Kunekune...?"
90100070-155 = "Ah, mas geralmente ele é visto em campos rurais, então não ouço falar muito de alguém tê-lo visto em uma cidade cheia de prédios..."
90100070-156 = "Não importa. O que é esse Kunekune?"
90100070-157 = "O Kunekune é uma lenda urbana famosa na zona autônoma de Hyakkiyako. Embora seja uma história de fantasma que começou a se espalhar recentemente."
90100070-158 = "Diferente de outras aparições vistas em lugares escuros e úmidos, dizem que ele aparece em campos abertos e ensolarados."
90100070-159 = "De longe, parece um espantalho branco dançando, mas ninguém nunca soube se é uma pessoa ou um espantalho de verdade. Porque..."
90100070-160 = "Quem chega perto para ver o que é... enlouquece e acaba se tornando um Kunekune também."
90100070-161 = "Com um sorriso sinistro, balançando de um lado para o outro..."
90100070-162 = "Nossa, que medo."
90100070-163 = "Bem, é só uma história de fantasma. Acho que quase ninguém em Hyakkiyako acredita de verdade. Tirando nós, que puxamos riquixás, talvez."
90100070-164 = "Ué? Então você acredita, Natsuki?"
90100070-165 = "Não é que eu acredite na história... é que eu consigo entender o motivo de ela ter se espalhado."
90100070-167 = "Sabe, naqueles dias quentes, quando você caminha pelo asfalto e o calor começa a subir...#n não parece uma fumaça branca tremeluzente?"
90100070-168 = "Em dias assim, se eu me esforçar demais puxando o riquixá, posso acabar sofrendo uma insolação."
90100070-169 = "Então, dizer que se você vir um \"espantalho branco\" tremeluzindo perto do horizonte, é melhor ir embora...#n talvez seja um conselho mais sensato do que parece."
90100070-172 = "Calor tremeluzente..."
90100070-173 = "Entendi. Calor tremeluzente."
90100070-174 = "Obrigado. Isso é uma pista valiosa."
90100070-175 = "E-eh...? Fico feliz que tenha ajudado... eu acho?"
90100070-180 = "Sensei [USERNAME]. A partir deste momento, encerraremos a operação do esquadrão e retornaremos ao QG."
90100070-181 = "[s] \"Entendido. Vamos voltar.\""
90100070-186 = "[ns] \"Natsuki, tome cuidado com o calor no caminho de volta também.\""
90100070-187 = "Sim, tome cuidado também...!"
90100070-194 = "Mas, ainda assim, aquelas alunas de uniforme de marinheiro... sinto que já as vi em algum lugar..."
90100070-195 = "Será que elas vieram aqui em alguma excursão escolar?"
90100070-197 = "Próximo episódio: Do outro lado do calor tremeluzente"
