[translation]
90100070-1 = "Episode 7;A Shadow Running on the Highway"
90100070-2 = "District 3, Area 2"
90100070-5 = "This is FOX 3. I've found the first victim and am currently canvassing Area 2 of District 3."
90100070-6 = "The victim was a salesperson for a nearby pharmaceutical company, and apparently walked around this area quite often during the day."
90100070-7 = "But aside from the glare reflecting off the glass, I don't see anything that could be mistaken for a white scarecrow."
90100070-11 = "Class A Restricted Zone - Demolition Site"
90100070-13 = "This is FOX 4. I'm searching the demolition site in the Class A Restricted Zone where the third victim was found."
90100070-14 = "The victim was a demolition worker who often had to work in this shadeless vacant lot."
90100070-15 = "Cough, cough... the dust is incredible. I can't even see anything white, let alone a white scarecrow. #nNothing unusual here, other than the extreme heat."
90100070-19 = "Getsuten Outer Market"
90100070-21 = "This is FOX 2. I'm canvassing the Getsuten outer market. #nThis is where the sixth victim was found."
90100070-22 = "I heard the victim was the owner of a food stall here... #nMaybe it's because of the heat? The shops are closed, and I haven't been able to find anyone to talk to."
90100070-23 = "Hmm... is it possible they mistook a tourist in white clothes for a scarecrow?"
90100070-24 = "Nothing stands out in particular."
90100070-26 = "KV Highway Route 35"
90100070-28 = "This is FOX 1. I'm searching KV Highway Route 35."
90100070-29 = "The ninth victim was a mechanic for the D.U. Road Bureau, and it seems they had an accident while performing an inspection."
90100070-30 = "I've thoroughly checked under the bridge where they were found, but—"
90100070-34 = "It's still not enough."
90100070-39 = "What isn't? Water? Do you need more supplies?"
90100070-40 = "I think she means there aren't enough clues to identify the white scarecrow."
90100070-41 = "You're not going to say we should start over from the beginning, are you...?"
90100070-42 = "However—"
90100070-46 = "[ns1] \"Hello, Schale EATS here!\"\n[ns2] \"I brought some cold water and energy drinks!\""
90100070-49 = "Oh, Sensei..."
90100070-50 = "Thank you so much for all of this... It must have been heavy. #nIt's already a lot to ask for you to follow us around every time..."
90100070-51 = "[s3] \"It looked like it was taking longer than expected.\"\n[s4] \"Did something go wrong...?\""
90100070-54 = "There are no major issues. #nHowever, we lack information to corroborate the victims' testimonies..."
90100070-55 = "It seems we need to expand our search area and resume canvassing."
90100070-59 = "Ugh..."
90100070-61 = "[ns5] \"It's so hot, can't this wait?\"\n[ns6] \"Maybe we could resume after the sun goes down...\""
90100070-64 = "That... would be difficult."
90100070-65 = "Evidence at a scene changes not just with location, but with time and weather."
90100070-66 = "All the victims were found in the middle of the day under the bright sun. #nIf that's the case, canvassing after sunset would be pointless."
90100070-67 = "It might be efficient for gathering evidence, but... #nDon't you think you should consider the squad members' condition a little?"
90100070-68 = "They've been working under the scorching sun for days; I'm sure they're all exhausted."
90100070-72 = "...It can't be helped."
90100070-73 = "Everyone, take a break nearby. I'll handle the next round of canvassing alone—"
90100070-74 = "Good grief..."
90100070-75 = "There she goes again. Her usual bad habit."
90100070-76 = "Yukino, do you really think we can rest properly after being told that? #nOr do you think we're the kind of terrible squad members who would ignore our leader's struggles?"
90100070-77 = "I-I didn't mean it like that..."
90100070-78 = "[ns7] \"There's no set deadline, after all...\"\n[ns8] \"Why don't you try to relax a little?\""
90100070-81 = "But... new victims might appear while we're doing that."
90100070-82 = "If a citizen were to get hurt because of my negligence... if it happened again."
90100070-83 = "If I can't make better decisions and take responsibility before that happens—"
90100070-90 = "Wait. Something new is approaching from the highway interchange."
90100070-91 = "Based on its movement and speed... does it look like a person?"
90100070-92 = "There's a person on the highway? #nWas there a scheduled inspection by the Road Bureau?"
90100070-93 = "No, it's not on the schedule."
90100070-94 = "Could it be the rumored 'white scarecrow'..."
90100070-95 = "We have to hurry and pursue it before it disappears."
90100070-103 = "Unidentified? Is that a student running over there?"
90100070-104 = "Excuse me—"
90100070-108 = "Huh? Why is there someone here...?"
90100070-109 = "Is something the matter?"
90100070-110 = "No, no, it looks like you're the one in trouble."
90100070-111 = "Pedestrians are prohibited from this point forward. Turn back."
90100070-112 = "Besides, you're not supposed to be on the highway, right? Why did you come in here?"
90100070-113 = "Well, obviously—"
90100070-117 = "It's road training!"
90100070-118 = "[s] \"Wait, that uniform... is that from Hyakkiyako Academy?\""
90100070-119 = "...Sensei [USERNAME]?"
90100070-120 = "Yes! Natsuki Asakusa from the Hyakkiyako Academy Rickshaw Club! #nIt's been a while since the festival!"
90100070-121 = "If you'd like... would you like a ride?"
90100070-122 = "I can take you anywhere in D.U. right now, cheaper than a taxi!"
90100070-123 = "[s9] \"No, I'm fine with the rickshaw.\"\n[s10] \"More importantly, I have a question...\""
90100070-127 = "So... you were practicing pulling your rickshaw on the highway because you might have customers who want to go outside the autonomous district?"
90100070-128 = "Yes! My motto is to take customers to their destination as quickly as possible via the shortest route!"
90100070-129 = "If I lose my way due to a lack of geographical knowledge, I might lose the customer's trust."
90100070-130 = "Yeah... I get that. I've been worried before when a driver suddenly took an unknown road, wondering if they were taking the long way on purpose."
90100070-131 = "Don't compare taxis to rickshaws!?"
90100070-132 = "Natsuki, right? #nRickshaws are prohibited on D.U. highways. #nSo, you should probably take a different route."
90100070-133 = "Eh, is that so!?"
90100070-134 = "Ugh... and they just issued a ban in Hyakkiyako, too... I can't believe it's the same in D.U."
90100070-135 = "Isn't it common sense that it's dangerous for a rickshaw to be on a highway, regardless of the regulations...?"
90100070-136 = "And besides, how could you think of running in this weather? #nIt's so hot that even the sports clubs would be feeling faint after half a day of running."
90100070-137 = "It's a bit hot, but... I'm fine! It happens all the time!"
90100070-138 = "The paved road reflects a lot of heat, and I'm used to running in hot places."
90100070-139 = "Compared to the peak of summer, this is actually quite cool!"
90100070-140 = "[s11] \"Even so, be careful of heatstroke.\"\n[s12] \"Here, have one. It's nice and cold.\""
90100070-143 = "Oh... thank you very much."
90100070-144 = "I never expected to receive a drink from Sensei of Schale in a place like this... #nI'm lucky today."
90100070-149 = "If you're always running on hot roads, I have a question for you."
90100070-150 = "Have you ever seen a 'white scarecrow'?"
90100070-151 = "A white scarecrow...?"
90100070-152 = "Apparently, everyone who sees that scarecrow loses consciousness and starts convulsing..."
90100070-153 = "...Could you be talking about the 'Kunekune'?"
90100070-154 = "Kunekune...?"
90100070-155 = "Ah, but usually those are spotted in rural rice paddies, so I haven't heard of anyone seeing one in a city full of buildings..."
90100070-156 = "It doesn't matter. What is this 'Kunekune'?"
90100070-157 = "The Kunekune is a famous urban legend in the Hyakkiyako autonomous district. #nThough, it's a ghost story that only started becoming popular recently."
90100070-158 = "Unlike other apparitions that are spotted in dark, damp places, #nit's said to be seen in sunny, open grasslands."
90100070-159 = "From a distance, it looks like a dancing white scarecrow, but no one has ever been able to tell if it's a person or a scarecrow. Because—"
90100070-160 = "Anyone who gets close enough to see its true form... loses their mind— #nand becomes just like the Kunekune."
90100070-161 = "With an eerie smile, just wriggling around..."
90100070-162 = "Whoa, that's creepy."
90100070-163 = "Well, it's just a ghost story. #nI don't think many people in Hyakkiyako actually believe it. #nAt least, not people like us rickshaw pullers."
90100070-164 = "Hmm? So, Natsuki, do you believe it?"
90100070-165 = "It's not so much that I believe the ghost story... it's more that I can understand why it spread."
90100070-167 = "You know, when you're walking on asphalt on a hot day, heat haze rises up... #nand sometimes it looks like wriggling white smoke, doesn't it?"
90100070-168 = "On days like that, if you push yourself to pull a rickshaw, you can get heatstroke."
90100070-169 = "So, the advice to 'go home if you see a white scarecrow wriggling near the horizon' might actually be... #nquite practical advice."
90100070-172 = "Heat haze..."
90100070-173 = "...I see. Heat haze."
90100070-174 = "Thank you. That's a major clue."
90100070-175 = "E-eh...? I'm glad to hear that... I think?"
90100070-180 = "Sensei [USERNAME]. As of this moment, we are ending the squad operation and returning to HQ."
90100070-181 = "[s] \"Understood. Let's head back.\""
90100070-186 = "[ns] \"Natsuki, be careful of the heat on your way back too~\""
90100070-187 = "Yes, you take care as well...!"
90100070-194 = "Still, those students in sailor uniforms... they look familiar..."
90100070-195 = "Did they come to our place for a school trip or something?"
90100070-197 = "Next Episode;From Beyond the Heat Haze"