[translation]
90100070-1 = "Episódio 7: Sombras Correndo na Rodovia"
90100070-2 = "3º Distrito Comercial - Setor 2"
90100070-5 = "Copiado, aqui FOX3. O alvo da patrulha é o Setor 2, o chão da primeira poça de sangue e testemunha caída."
90100070-6 = "A vítima batia ponto na calçada como vendedora engravatada em uma indústria farmacêutica próxima. A biologia diz que gastar o solado nessas ladeiras sob o sol escaldante fazia parte da rotina operária da coitada."
90100070-7 = "Porém, varrendo o perímetro de cabo a rabo... a não ser pelos feixes cegantes da luz do sol cortando nos vidros espelhados e castigando as retinas, a probabilidade ótica de algo se disfarçar visualmente de um 'Espantalho Alvo' neste quarteirão beira o zero."
90100070-11 = "Zona de Obras Controlada Alpha - Ruínas em Demolição"
90100070-13 = "Na escuta, aqui FOX4. Peneirando as ruínas de implosão na Zona Alpha, onde a terceira presilha caiu na rede."
90100070-14 = "O defunto civil dessa poça vestia colete de obra, os registros dizem que ele forçava a coluna engolindo poeira nos lotes descampados sob o sol rachando a nuca dia sim, dia não."
90100070-15 = "H-Hk, khe... As nuvens de poeira sufocam o ar e entopem a garganta... o visual tá tão sujo que nem que caísse um lençol branco puro ou um maldito espantalho da minha frente eu conseguiria decifrar a silhueta no meio da fuligem.#nCom exceção das caldeiras infernais de temperatura do clima que fritam a farda... ameaça não detectada."
90100070-19 = "Mercado Aberto de Ruas Getten"
90100070-21 = "Alô alô, FOX2 no radinho! Mergulhando na boca do mercado de Getten.#nAs fitas assinalam que o sexto corpo caiu mudo nessa tenda, positivo?"
90100070-22 = "Os laudos relatam que a garota morta operava nas panelas dessas barracas de rua...#nMas deve ser culpa do calor atômico que espanta a plebe, as tampas das lonas amarraram tudo e as alamedas tão num limbo fantasma, nem poeira orgânica eu trombei."
90100070-23 = "Hmm... E se a tese da polícia puxar um viés imbecil? Tipo, a miragem de um turista aleatório torrado do sol vestindo roupas claras ser equivocadamente engolida pela fofoca de testemunha do 'Espantalho Branco'?"
90100070-24 = "Sem fumaça estranha na área."
90100070-26 = "Rodovia Automobilística de Trânsito Rápido - KV Highway 35"
90100070-28 = "Escuta FOX1. Patrulha balística de varredura ativa nos asfaltos da KV 35."
90100070-29 = "A nona ovelha que afundou no coma bate o cartão como operária de engrenagens do Departamento Rodoviário. O colapso neural apocalíptico ocorreu quando ela soldava e esfregava o asfalto nas inspeções diurnas sob os trilhos abertos."
90100070-30 = "A minha mira escavou até as artérias dos viadutos e espremeu todos os buracos, no entanto――"
90100070-34 = "O diagnóstico é falência investigativa. As peças de chumbo não encaixam."
90100070-39 = "Qual peça tá devendo? Refil de hidratação ou mais suco tático das rações?"
90100070-40 = "A lógica e os manuais ditam que as cinzas cegas nas ruas são inúteis. Nenhuma evidência cruza para decifrarmos a silhueta assassina do 'Espantalho Branco'."
90100070-41 = "Por favor, em nome da misericórdia militar divina... não vomita o decreto sádico de reiniciar as ladeiras do zero... né...?"
90100070-42 = "Todavia――"
90100070-46 = "[ns1] \"Aloha! Motoboy VIP da Schale-Eats na área!\"\n[ns2] \"Encomenda especial com garrafinhas d'água suadas e energéticos trincando de gelados pro meu esquadrão favorito!\""
90100070-49 = "Ah, Comandante..."
90100070-50 = "Isso tudo... Agradeço a logística bondosa do resgate calórico, mas arrastar todo esse equipamento engarrafa o peso nas pernas.#nExigir escoltas e sombras com o senhor a tiracolo sugando lixo urbano da tropa também agride a minha tese de respeito..."
90100070-51 = "[s3] \"As comunicações do rádio cheiravam a pneus carecas rodando no mesmo asfalto. Achei prudente vir esfriar as garotas.\"\n[s4] \"Alguma mina terrestre estourou na cara...?\""
90100070-54 = "Falha estrutural letal omitida. A engrenagem opera.#nNo entanto, o dossiê das calçadas apodrece. A espionagem fracassou em endossar ou corroborar os alicerces teóricos das testemunhas e vítimas orgânicas."
90100070-55 = "A lógica tática não perdoa: é necessário alargar o escopo radial do tabuleiro no mapa tático, dobrar os calcanhares e recomeçar os inquéritos operacionais urbanos desde a raiz primária e inicial."
90100070-59 = "Urgh... o inferno..."
90100070-61 = "[ns5] \"As meninas estão derretendo nessas fardas. Essa cruzada militar sob o sol escaldante não aceita reagendamento flexível de cronograma?\"\n[ns6] \"Um toque de recolher pras tendas até que o cair do crepúsculo engula a radiação solar no asfalto e resfrie as chapas de aço, por favor...\""
90100070-64 = "……Os manuais paramilitares rechaçam a benevolência e fuga."
90100070-65 = "As poças de sangue ou escombros de provas periciais são camaleões cínicos na cena. O relógio, os feixes do clima, a umidade, e os fluidos... todos distorcem as identidades das pistas."
90100070-66 = "O modus operandi balístico engloba vítimas despencando unicamente na fúria apocalíptica da fornalha do meio-dia.#nMarchar e focar radares nas sombras da lua morta cega e falsifica o cenário. É contraproducente."
90100070-67 = "Os cálculos matemáticos da criminologia atestam e engolem tudo. Impecável e genial... mas...#nAs taxas de mortalidade orgânica das fibras das suas cobaias, ou seja, suas amigas... Elas não entram na planilha da calculadora cega?"
90100070-68 = "O sangue delas já esturricou nos pátios das penitenciárias. Exigir do lombo fraco marchar no asfalto infernal é forçar bater ponto na morte limpa de stress térmico e colapso vital."
90100070-72 = "……Estatísticas inegáveis."
90100070-73 = "Decreto paralisação militar geral do destacamento. O esquadrão se aninhará em pontos cegos da área e sugará a refrigeração do ócio. As botas escavarão o trajeto a seguir com contingente singular, sob minha alçada e CPF somen――"
90100070-74 = "É sacanagem... caralho."
90100070-75 = "Lá rasteja a semente patológica atômica do passado martelando a tela de novo. O maldito complexo tóxico crônico messiânico."
90100070-76 = "Yukino, abre as tampas do cérebro. Se o seu decreto forçar o choro heróico e vomitar essa carcaça morta de fome na bala pra segurar fuzil sozinha na rua... cê acha que as fileiras do FOX deitariam numa banheira fria pra dormir na boa? A patente nos condena como traidoras parasitas nojentas se deixarmos a Liderança mastigar chumbo e suor no deserto cego e recuarmos covardemente."
90100070-77 = "O-O pânico e distorção tática desvirtuou minha meta... O perdão é..."
90100070-78 = "[ns7] \"A guilhotina e o apocalipse não estipularam cronograma sangrento e fatal pro fim do dia de hoje.\"\n[ns8] \"Desarma os ombros táticos de pedra só por uns instantes, alivia e deixa a brisa soprar o escudo pesado fora... Que tal?\""
90100070-81 = "O laudo do tempo calmo cega e mente. No vazio do 'alívio' e nas horas inertes na tenda, a calçada pode engolir outra alma civil viva nesse sol desgraçado."
90100070-82 = "Se o atraso nas baionetas por frouxidão do meu ego fúnebre sentenciar outra artéria furada ou coma cívico no chão de Kivotos... repetindo a mancha assassina do golpe mais uma vez... eu juro--"
90100070-83 = "Se a espada e guilhotina falha no abate precoce e antecipado... e se os meus ossos não colherem os estragos vitais na própria espi--"
90100070-90 = "TRAVA O CHORO LOGÍSTICO! O radar apitou mutações cinéticas! Vetor de infiltração rastejando veloz pelos gargalos viários e nós de intersecção automobilística da KV HighWay!"
90100070-91 = "Sintaxe da cadência e passos locomotores batem na tecla de que é silhueta primata humana na mira?!"
90100070-92 = "A asfixia do sol tá fervendo os dados... Uma carcaça humana cruzando a pé as rotas de aço blindadas e asfalto cru da via expressa rápida?!#nA ronda de manutenção não constava pra hoje nas pranchetas do governo!"
90100070-93 = "A bússola nega. Zero ordens oficiais ou manutenção mecânica no roteiro da semana."
90100070-94 = "Os laudos matemáticos engolem as poças. Os demônios das fábulas místicas, o... tal do 'Espantalho Alvo' brotou do vapor...?"
90100070-95 = "Despeje a farda! As baionetas não dormem e a anomalia fantasma vai ser fuzilada da fumaça antes do bote e extinção de rastro.#nMarcha ofensiva agora."
90100070-103 = "O sinal do radar bate e crava... aquela cadete rasgando ladeira lá no meio do nada é a assombração fúnebre?"
90100070-104 = "Alerta cívico no rádio! Trave o pass――"
90100070-108 = "Hã?! Civis brotando nesses lixões desertos...?"
90100070-109 = "Alguma tragédia assola as fileiras de vocês, oficiais?"
90100070-110 = "Inverte as teses logísticas. A tragédia letal e o colapso cívico pairam sobre as suas pernas e sapatos, moça."
90100070-111 = "As faixas listradas proíbem circulação orgânica na carne viva de pedestre! O limite de velocidade fatia corpos! Rotatória e contorno de emergência, pra trás."
90100070-112 = "O currículo básico cívico acusa a proibição atômica! O asfalto corta rápido os pneus e você invade o meio de um farol da morte desses sem escudo e sozinha porque cargas d'água, doida?!"
90100070-113 = "Oh, mas é a coisa mais lógica e vital do manual--"
90100070-117 = "Estágio empírico de tração mecânica de Riquixás em vias difíceis!"
90100070-118 = "[s] \"Hã... As orelhas felpudas e essas pernas torneadas puxam o RG direto da... União Acadêmica de Hyakkiyako?\""
90100070-119 = "……Senhor Comandante [USERNAME]?!"
90100070-120 = "Senhor, sim, senhor! Identidade Orgânica cravada: Clube Profissional de Carruagem Humana (Riquixá) da Academia Unida de Hyakkiyako, Asakusa Natsuki nas solas de tração e serviço!#nAs luas giraram desde aquele esmagamento no festival de verão, patrão!"
90100070-121 = "Se a patrulha cansar o calcanhar e a fadiga doer o couro... a carruagem real aqui cede assento macio, quer arriscar as rodas na aventura comigo?"
90100070-122 = "A quilometragem hoje tá de promoção divina! Eu afundo o pedal e lanço vocês por D.U. inteirinha no talento bruto rasgando os engarrafamentos e pisoteando o taxímetro abusivo dos taxistas com moedinhas suadas de desconto!"
90100070-123 = "[s9] \"Eu pauso a recusa com carinho, o riquixá fica na reserva e minhas solas dão conta do tranco hoje, lindinha.\"\n[s10] \"Mas o papo cruzou as vias e o rádio quer te interrogar sobre uns arquivos sujos do bairro...\""
90100070-127 = "Traduz a loucura pra nós... A premissa tática é que, com a demanda turística querendo vazar e fujir dos muros fechados e passear por Kivotos na cara e coragem...#nAs suas canelas praticam e suam no piche da Via Expressa blindada de D.U. arrastando a carroça por pura simulação de estresse de trajeto longo?!"
90100070-128 = "Bingo, acerto letal na bucha! O juramento comercial de sangue na empresa clama entregar os lombos de nossos passageiros ilesos nos pontos de GPS furando a geografia no trajeto mais sangrento e mortalmente veloz imaginável e sem engasgos!"
90100070-129 = "Se a escuridão analfabeta de não ter engolido as plantas e atalhos na memória ram ferrar com meu roteiro na hora que um VIP afundar na minha poltrona...#nA credibilidade dos selos dourados e a face da frota e do mercado de turismo sangra até falir."
90100070-130 = "É, entendo na pele. Sequestrar caronas de civis em ruas mortas que ninguém gravou no papel da ansiedade fúnebre...#A suspeita de extorsão de pneu ou de desviar de lixeira só pro taxímetro mastigar e rodar mais conta bate fácil na cabeça."
90100070-131 = "CALÚNIA E AFRONTAS CORPORATIVAS! O suor da tração das carruagens tá um milhão de galáxias acima e isolada dos charlatães vagabundos que fedem a gasolina e volante nos taxímetros!!"
90100070-132 = "As credenciais orgânicas dizem 'Natsuki-chan', correto?#nA papelada legal e burocrática baniu, amaldiçoou e bloqueou de forma letal a locomoção, infiltração e tráfego orgânico de veículos de tração a força humana nessas pistas blindadas de D.U.#nRedesenhe as diretrizes viárias, apague as pranchetas pro retorno e suma pros canteiros velhos, a sua pele agradece."
90100070-133 = "B-Bate na madeira e cospe na água! S-Sério?!"
90100070-134 = "Uuugh... O conselho ditatorial de papelada burocrática de Hyakkiyako cravou no meu peito a expulsão com leis semana passada... E de quebra os corvos engravatados e os murais federais daqui de D.U. baniram com os canhões jurídicos na mesma rota, sem aviso... Isso é conspiração anticapitalista!"
90100070-135 = "A física atômica simples repudia e chora e te enxota do cimento... O choque dos capôs em trânsito de carro esmagando e varrendo pernas puras nas engrenagens e lixo na lataria grita e prova isso."
90100070-136 = "Mudando da lei pra patifaria suicida: arrastar carcaças nessa fogueira climática atinge níveis estúpidos e irracionais de falta de senso tático.#nAté os blindados fuzileiros e cadetes treinadas no osso teriam apagões, falência múltipla de órgãos e espasmos de tontura se forçados a meia volta na farda e armadura de aço."
90100070-137 = "O vapor queima, o sol rasga no ferro, admito o inferno na Terra, sim... mas os escudos seguram o baque! A minha carcaça amassa a fornalha!"
90100070-138 = "O verniz e asfalto do piche cozinham a nuca e irradiam o microondas direto nas lentes, o cenário mortal na sola gasta é apenas meu quintal! Os treinos afiaram e anestesiaram a carne nas frigideiras."
90100070-139 = "Se a comparação tática bate na carnificina massiva e os volumes enlouquecedores e insanos da exploração frenética sob as trombetas e feriados dos picos na rota do Verão Cruel Infernal Turístico de Agosto... Essa brisa ensolarada hoje bate de longe como frescor do Alasca, brincadeira fácil!"
90100070-140 = "[s11] \"Mesmo que os números teêm blindagem, não desafie a biologia, senão os pulmões estouram do calor...\"\n[s12] \"Pega essa água aqui. Cota inteira pra ti, estupidamente gelada e no capricho.\""
90100070-143 = "O-O pódio celestial do Comandante desce à ralé e estende água benta no asfalto infernal... A reverência chora perante a glória."
90100070-144 = "Descer o asfalto cego e encontrar a salvação hídrica sagrada da própria Schale no oásis da perdição e fumaça seca e escura.#nO karma rodou e eu suguei toda a loteria cármica premiada diária, ahh..."
90100070-149 = "A pauta bélica convoca o inquérito e clama laudos urbanos da sua rotina escrava diária e desgastante no sol cego do pavimento da cidade."
90100070-150 = "A aberração do 'Espantalho Alvo', cruzou e riscou o seu sensor ou você engoliu pistas visuais no meio da fumaça morta de asfalto por aí?"
90100070-151 = "Espantalho Branco...? Na neblina visual de cimento e faróis?"
90100070-152 = "Os laudos relatam e juram que o infeliz focado pelas íris nesse vulto afunda em letargia de paralisia tática neural fatal e se arrebenta num banho de espasmos sem reanimação..."
90100070-153 = "……Espera. A descrição patológica exata... O nome do folclore e rádio morto aponta diretamente pro mito sombrio e folclore ruidoso nas ruelas velhas... o 'Kunekune'?"
90100070-154 = "Kunekune...? O desgraçado que rebola?"
90100070-155 = "A lenda rural apodrece em campos limpos rurais de mato isolados e charcos nas províncias.#nNa floresta de néon urbana das praças de vidro, a anomalia apitar o radar no cimento é inaudito e irreal... lenda virando metropolitana."
90100070-156 = "Corta a sociologia. Rótulos não atiram bala. A sintaxe de Kunekune desmembra o quê?"
90100070-157 = "Na roda morta dos ritos e contos amordaçados nos esgotos do Distrito Hyakkiyako, o 'Kunekune' reina como Lore assombrada.#nTeses recentes assopraram as fofocas macabras pelas esquinas, mas a fogueira cimentou sua base doentia."
90100070-158 = "Na genealogia natural cega de fadas de dentes de vampiro assombradas, o asfalto frio, pântano asqueroso úmido e sombras cimentam os encontros macabros com cadáveres, necrófagos fúnebres etc...#nEntretanto, ele ri da teoria. Ele assombra os céus escancarados cegos puros e ensolarados das esferas descampadas das matas e o cimento fumegante da cidade sem proteção de neblinas..."
90100070-159 = "Do precipício da cegueira longínqua, as sombras dão espasmos e forjam e desenham braços finos pálidos e longilíneos rebolando fúteis.#nAs engrenagens oculares nunca processam de perto se a aberração é espantalho morto vivo amaldiçoado ou monstro orgânico fantasmagórico bípede torto... Porque as fofocas do folclore relatam o fim de roteiro:"
90100070-160 = "O olhar das vítimas... ao desafiar o asfalto... foca a silhueta da frente nas córneas, a fumaça sobe, a retina engole o vulto.#nA maldição desarticula, infecta, mutila e afunda o osso cerebral mortalmente na patologia. O alvo apodrece e racha a consciência num asilo enjaulado insano irreversível..."
90100070-161 = "Lágrimas rolam, dentes racham. E os espasmos e tremores de risadas tétricas esfarelam e ecoam, as costas balançam para os esgotos mortos... rebolando nas cordas vocais rasgadas da loucura na lama de sanatório da rua... rebolando insano."
90100070-162 = "Aaaaah... Mutações macabras na psique biológica. Assustador e podre."
90100070-163 = "Apaguemos o temor cívico tático! É papiro inofensivo. Fofocas urbanas de assombração da rua de fundo falso.#nA racionalidade do cidadão Hyakkiyako não queima a fé cega com essas historinhas fúteis proscritas da noite. Nós, de farda civil militar paramilitar ou braçais urbanas orgânicas... nós descartamos a poça de esgoto com repúdio racional e lógica inquebrável."
90100070-164 = "Hmm? Se o repúdio aos mitos falsos é a doutrina blindada que você engole e a negação assina na sua placa, a charada tomba na nossa mesa: você devota reverências ocultas à história podre da mentira, cadete Natsuki?"
90100070-165 = "Os dogmas religiosos sobre crendices eu rejeito puramente. Eu desmembro e afundo o mistério nas ciências mecânicas, apenas.#nA origem patológica social dessas lendas eu enxergo... a semente inicial orgânica urbana que engatilhou e explodiu o pânico."
90100070-167 = "Quando a placa do termômetro estoura os tubos térmicos orgânicos sob a marcha de passos nos campos... E os vapores e o efeito atômico de ótica distorcem o ar quente e asfixiante na poeira... As 'Miragens de Calor' fervem... Ilusões sujas nas lentes da estrada imitando 'fumaça que rebola fútil no asfalto' ou fantasmas longos brancos mortos contorcendo."
90100070-168 = "Na loucura, espremer o pulmão nessa tempestade de fogo radiante afoga a tração dos riquixás e atira motoristas da rua cegos nas poças da insolação atômica real da insolação de suor da cabeça."
90100070-169 = "Portanto, o dogma tribal que rastejou para o interior popular enraizado que as fofocas e pânicos da lenda urbana ensinam: 'Se o olhar focalizar e encarar as névoas retorcidas do Espantalho Fantasma distorcidas na quentura, bata as botas e engula a rota de fuga para a cama na sombra', não é praga assassina do oltre-mundo.#nÉ doutrina, estatística viva de medicina civil e lei orgânica prudente e higiênica que as vielas forjaram do próprio medo pro calor real insalubre."
90100070-172 = "As Miragens Cegas de Calor atômico orgânico natural no vapor sujo."
90100070-173 = "……Bússola virada. Fênomenos de Óptica Físicas na Fumaça Térmica, e não lixo espectral na rua."
90100070-174 = "Os radares e arquivos relatam dívida militar contigo e absolvição tática. A prova e a argila caíram no colo fáceis."
90100070-175 = "O-Oi... Hã? O choque cultural agradece... Eu assumo?"
90100070-180 = "Sensei [USERNAME]. Sob a ótica bélica e temporal desse minuto letárgico, a foice corta. Engavetaremos as perseguições urbanas ruidosas agora.#nMarcha de reintegração pro Bunker Tático da matriz Schale e exfiltração imediata sob a base no QG da Schale limpo de olhares."
90100070-181 = "[s] \"Fechado. Rota de volta pro inferno seguro.\""
90100070-186 = "[ns] \"Natsuki, cuida das canelas e refrigera a mente no sol da pista pra não fundir, lindinha! Fui~\""
90100070-187 = "As bênçãos do asfalto acompanham e engarrafam sorte no trajeto de sua volta também...!"
90100070-194 = "As retinas guardam cicatrizes... As paletas de cores daquela blusa de marujo, as saias pesadas e as armas daquela tropa cimentaram ecos na minha ficha analítica cega..."
90100070-195 = "Fazem rodízio e engarrafam intercâmbios escolares clandestinos de farda e turistas perdidos nos pátios sagrados dos santuários da nossa Academia Hyakkiyako agora?"
90100070-197 = "Próximo Episódio: Do Lado de Lá da Miragem"