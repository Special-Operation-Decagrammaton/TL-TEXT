[translation]#[Texto Final. - Filipe 13/07.]
90100070-1 = "Episódio 7; O Vulto que Corre na Rodovia"
90100070-2 = "3º Distrito Comercial - Área 2"
90100070-5 = "Aqui é FOX3. Sondando a Área 2 do 3º Distrito Comercial,#nonde a primeira vítima foi encontrada."
90100070-6 = "A vítima é vendedora de uma farmacêutica aqui perto e caminhava muito por aqui de dia."
90100070-7 = "Mas, fora o reflexo dos vidros ofuscando,#nnão vejo nada que se confunda com um espantalho branco."
90100070-11 = "Zona Fechada Classe A - Local de demolição"
90100070-13 = "Aqui é FOX4. Vasculhando o local de demolição da Zona Fechada Classe A,#nonde acharam a terceira vítima."
90100070-14 = "A vítima é operária da demolição e trabalhava muito num terreno#nsem sombra alguma."
90100070-15 = "Cof, cof…… quanta poeira.#nLonge de ver espantalho, mal dá pra ver qualquer coisa branca.#nFora o calor infernal, sem anormalidades."
90100070-19 = "Mercado Externo de Getten"
90100070-21 = "Aqui é FOX2. Sondando o mercado externo de Getten.#nO lugar onde a sexta vítima foi encontrada."
90100070-22 = "Soube que a vítima tem uma barraca aqui……#nMas, vai ver que é o calor: tá tudo fechado e quase não encontrei ninguém."
90100070-23 = "Hmm…… será que dá pra confundir um turista de roupa branca com um espantalho?"
90100070-24 = "Nada digno de nota por aqui."
90100070-26 = "Rodovia KV 35"
90100070-28 = "Aqui é FOX1. Vasculhando a Rodovia KV 35."
90100070-29 = "A nona vítima é mecânica da Agência Viária do D.U.#ne sofreu o acidente durante uma inspeção."
90100070-30 = "Verifiquei com cuidado até debaixo da ponte onde ela foi encontrada,#nporém――"
90100070-34 = "Falta, como suspeitava."
90100070-39 = "Falta o quê? Água? Precisa de mais suprimento?"
90100070-40 = "Deve ser pista que falta. Pra identificar o espantalho branco."
90100070-41 = "Você não vai dizer \"vamos recomeçar do zero\"…… né?"
90100070-42 = "Contudo――"
90100070-46 = "[ns1] \"Boa tarde, Schale EATS!\"\n[ns2] \"Trouxe água gelada e energético!\""
90100070-49 = "Ah, Sensei……"
90100070-50 = "Tudo isso…… obrigada. Não estava pesado?#nDeve ser cansativo nos acompanhar toda vez……"
90100070-51 = "[s3] \"Parecia estar demorando mais que o previsto.\"\n[s4] \"Aconteceu algum problema……?\""
90100070-54 = "Nada grave.#nMas faltam informações que sustentem os depoimentos das vítimas……"
90100070-55 = "Parece que precisaremos ampliar o perímetro e recomeçar a sondagem."
90100070-59 = "Uhh……"
90100070-61 = "[ns5] \"Nesse calor? Não dá pra deixar pra depois?\"\n[ns6] \"Ou pelo menos retomar depois que o sol se pôr……\""
90100070-64 = "Isso seria…… complicado."
90100070-65 = "As evidências de campo mudam de cara não só com o lugar, mas com a hora e o clima."
90100070-66 = "Todas as vítimas foram encontradas em pleno meio-dia, sob sol forte.#nSondar depois do pôr do sol não teria sentido."
90100070-67 = "Pra coleta de provas é eficiente, mas……#nque tal pensar também na condição das suas soldadas?"
90100070-68 = "São dias seguidos sob sol a pino;#no cansaço de todas já deve estar acumulando."
90100070-72 = "……Não tem jeito."
90100070-73 = "Descansem aqui por perto.#nA próxima sondagem eu faço sozin――"
90100070-74 = "Francamente……"
90100070-75 = "Olha ela de novo. A velha mania."
90100070-76 = "Yukino, você acha mesmo que a gente ia conseguir descansar ouvindo isso?#nOu somos o pior tipo de soldada, que finge não ver o sacrifício da capitã?"
90100070-77 = "N-Não foi o que eu quis……"
90100070-78 = "[ns7] \"Não existe um prazo definido pra isso……\"\n[ns8] \"Que tal relaxar os ombros um pouquinho?\""
90100070-81 = "Mas…… enquanto fazemos isso, novas vítimas podem estar surgindo."
90100070-82 = "Se a minha negligência ferir um cidadão……#nse acontecer de novo."
90100070-83 = "Preciso decidir mais rápido antes disso,#nassumir a responsabilidade――"
90100070-90 = "Espera. Presença nova se aproximando pelo trevo da rodovia."
90100070-91 = "Pelo movimento e velocidade……#nparece gente?"
90100070-92 = "Gente na rodovia?#nTinha inspeção da Agência Viária agendada pra hoje?"
90100070-93 = "Não, não tem nada na agenda."
90100070-94 = "Será que é o famoso \"espantalho branco\"……"
90100070-95 = "Vamos atrás, antes que desapareça."
90100070-103 = "Não identificado…… aquela aluna correndo ali?"
90100070-104 = "Com licençaaa――"
90100070-108 = "Oxe? Gente num lugar desses……?"
90100070-109 = "Precisam de ajuda?"
90100070-110 = "Não, não…… quem parece precisar de ajuda aqui é você."
90100070-111 = "Adiante é proibido pra pedestres. Desvie."
90100070-112 = "Aliás, nem pode entrar na rodovia, né?#nComo foi que você veio parar aqui?"
90100070-113 = "Ué, claro que foi――"
90100070-117 = "Treinamento de rua!"
90100070-118 = "[s] \"Ué? Esse uniforme é da Academia da Aliança Hyakkiyako……\""
90100070-119 = "……Sensei [USERNAME]?"
90100070-120 = "Sim! Asakusa Natsuki, do clube de riquixá da Academia da Aliança Hyakkiyako!#nDesde o festival, né!"
90100070-121 = "Se quiser…… aceita uma corrida?"
90100070-122 = "Hoje eu te levo pra qualquer canto de D.U. mais barato que táxi!"
90100070-123 = "[s9] \"Não, o riquixá eu passo.\"\n[s10] \"Mas tem uma coisa que eu queria perguntar……\""
90100070-127 = "Então……#nvocê treinava puxar riquixá na rodovia porque pode aparecer cliente querendo sair do distrito?"
90100070-128 = "Sim! Nosso lema é levar o cliente ao destino pela rota mais curta, sem demora!"
90100070-129 = "Se eu fizer um desvio por não conhecer a geografia,#nposso perder a confiança do cliente."
90100070-130 = "Hm…… eu entendo. Já fiquei cismada quando o motorista pegou um caminho estranho,#nachando que era volta de propósito."
90100070-131 = "Não compara táxi com riquixá!?"
90100070-132 = "Posso te chamar de Natsuki, né?#nNas rodovias de D.U., riquixá é proibido.#nMelhor escolher outra rota."
90100070-133 = "Quê, sério isso?!"
90100070-134 = "Uhh…… a Hyakkiyako acabou de proibir também…… não acredito que em D.U. é igual."
90100070-135 = "Riquixá em rodovia é perigoso; antes de decreto, isso é bom senso……"
90100070-136 = "Aliás, que coragem correr com esse tempo.#nNesse calor, até atleta de clube esportivo cambaleia depois de meio dia."
90100070-137 = "Tá um pouco quente, mas…… tudo bem! É o de sempre!"
90100070-138 = "O asfalto reflete o calor com força; correr no quente é costume pra mim."
90100070-139 = "Comparado ao pico do verão, na altatemporada, isso aqui tá fresquinho!"
90100070-140 = "[s11] \"Mesmo assim, cuidado com a insolação.\"\n[s12] \"Toma, uma pra você. Tá geladinha.\""
90100070-143 = "Ah…… muito obrigada."
90100070-144 = "Ganhar uma bebida do Sensei da Schale num lugar desses……#nhoje é meu dia de sorte."
90100070-149 = "Se você sempre corre por estradas quentes, tenho uma pergunta."
90100070-150 = "Já viu um \"espantalho branco\"?"
90100070-151 = "Espantalho branco…… é?"
90100070-152 = "Dizem que todo mundo que vê esse espantalho desmaia e começa a convulsionar……"
90100070-153 = "……Vocês estão falando do \"Kunekune\"?"
90100070-154 = "Kunekune……?"
90100070-155 = "Ah, mas ele costuma ser visto em arrozal de interior;#nnão se ouve muito de aparição em cidade cheia de prédio……"
90100070-156 = "Não importa. O que é esse Kunekune?"
90100070-157 = "O Kunekune é uma lenda urbana famosa no distrito de Hyakkiyako.#nApesar de ser uma história que virou moda faz pouco tempo."
90100070-158 = "Diferente das outras assombrações, vistas em lugares escuros e úmidos,#ndizem que ele aparece em campo aberto, num dia limpo de céu azul."
90100070-159 = "De longe, parece um espantalho branco dançando;#nmas ninguém jamais descobriu se é gente ou espantalho. Porque――"
90100070-160 = "quem chega perto e vê o que ele é…… enlouquece――#ne vira igualzinho ao Kunekune."
90100070-161 = "Com um sorriso arrepiante no rosto, se contorcendo…… kune-kune."
90100070-162 = "Quê? Que medo é esse, mano."
90100070-163 = "Bom, é só uma história de terror.#nAcho que quase ninguém de Hyakkiyako acredita de verdade.#nTirando quem puxa riquixá, como eu."
90100070-164 = "Hm? Quer dizer que você acredita, Natsuki?"
90100070-165 = "Mais do que acreditar na lenda…… eu diria que entendo por que ela se espalhou."
90100070-167 = "Sabe quando, num dia quente, você anda no asfalto e a miragem sobe do chão……#nparecendo uma fumaça branca se contorcendo?"
90100070-168 = "Nesses dias, se forçar o riquixá, dá insolação de verdade."
90100070-169 = "Então \"se vir um espantalho branco se contorcendo perto do horizonte, volte pra casa\"……#npode ser um conselho até bem sensato."
90100070-172 = "Miragem……"
90100070-173 = "……Entendi. A miragem."
90100070-174 = "Você nos salvou. É uma pista e tanto."
90100070-175 = "Hã, quê……? Que bom…… será?"
90100070-180 = "Sensei [USERNAME]. Encerrando a operação do esquadrão; retornando ao QG."
90100070-181 = "[s] \"Certo. Vamos voltar.\""
90100070-186 = "[ns] \"Natsuki, cuidado com o calor na volta, tá~\""
90100070-187 = "Sim, vocês também se cuidem……!"
90100070-194 = "Mas, pensando bem…… aquelas alunas de uniforme de marinheiro…… eu já vi em algum lugar……"
90100070-195 = "Será que vieram numa excursão lá pra escola?"
90100070-197 = "Próximo Episódio;Do Outro Lado da Miragem"