[translation]
80000071-1 = "不器用なバレンタイン"
80000071-2 = "梅花園"
80000071-3 = "（シャーレの仕事で、梅花園を訪れた）"
80000071-4 = "あっ。こんにちは、先生。"
80000071-5 = "入り口まで迎えに行けなくてすみません、ちょっと準備に時間がかかってしまいまして。"
80000071-6 = "[s] \"もしかして、これ全部チョコレート？\""
80000071-7 = "そうです、バレンタインデーですから。"
80000071-8 = "甘いものばっかり食べるのは、本当は良くないのですが……。"
80000071-9 = "せっかくのバレンタインデーなので、午後のおやつとして配ろうかと思いまして。"
80000071-10 = "[s] \"流石はココナ教官！\""
80000071-11 = "ココナ教官じゃないです、ココナちゃんです！"
80000071-12 = "って、あぅ……反射的にいつもの逆を言ってしまいました……"
80000071-13 = "わざとそういう言い方をして、引っかけたのですね？"
80000071-14 = "ずるいです、大人は……いえ、先生は意地悪です！"
80000071-15 = "[s] \"ご、ごめん……でも本当に、教官らしいなって。\""
80000071-16 = "そ、そうですか……！#nそういうことなら、仕方ありませんね！"
80000071-17 = "そんな先生には……と、特別に、このチョコレートを差し上げます。"
80000071-18 = "子どもたちの分だけ用意するつもりだったんですが、たまたま先生のことを思い出して……。"
80000071-19 = "本当に、たまたまですからね！"
80000071-24 = "[ns] \"ありがとう！……あれ？\""
80000071-25 = "な、なんですか？え、このチョコレートだけ他とちょっと違う……？"
80000071-26 = "そ、そんなことは……！#nそ、そうです！先生の分は後から思い出して買ったので、ちょっと種類が違うのかも……じゃなくて、違うんです！"
80000071-27 = "[s] \"でも、ラッピングが……。\""
80000071-28 = "お、お店の人がやったようには見えない、ですかね……？"
80000071-29 = "な、何のことでしょう……。#nお、お店のお姉さんも疲れてて、失敗しちゃったんじゃないでしょうか？"
80000071-30 = "[s] \"……確かに、そういうこともあるかも？\""
80000071-31 = "な、何ですか、急にニヤニヤして。"
80000071-32 = "へ、変な笑い方しないでくれませんか……！？"
80000071-33 = "[s] \"これ、今ここで食べてもいい？\""
80000071-34 = "こ、ここここっ、ここでですか？"
80000071-35 = "ダメです！それはやめてください！"
80000071-36 = "そんなに意地悪するなら返してもらいますよ！"
80000071-37 = "はい？せっかくもらったんだから、早く食べて感想を伝えたい……？"
80000071-38 = "あうぅ、そ、それは……でも……。"
80000071-39 = "で、でもやっぱりダメです！シャーレに戻ってから食べてください！"
80000071-40 = "絶対に、一人で食べてくださいね。良いですか？"
80000071-45 = "（そう言い残してココナは、逃げるように走り去ってしまった）"
80000071-53 = "（と思ったらまた急に戻ってきて、一言……）"
80000071-54 = "約束ですよ！"
