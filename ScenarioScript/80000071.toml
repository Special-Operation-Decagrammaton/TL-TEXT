[translation]
80000071-1 = "Um Dia dos Namorados desajeitado"
80000071-2 = "Jardim das Ameixeiras"
80000071-3 = "(Visitando o Jardim das Ameixeiras a trabalho pelo Schale)"
80000071-4 = "Ah. Olá, Sensei."
80000071-5 = "Desculpe não ter ido te receber na entrada, é que a preparação tomou um pouco de tempo."
80000071-6 = "[s] \"Por acaso, isso tudo é chocolate?\""
80000071-7 = "Sim, afinal é o Dia dos Namorados."
80000071-8 = "Comer só doces não é algo muito bom, na verdade..."
80000071-9 = "Mas como é uma data especial, pensei em distribuir como lanche da tarde."
80000071-10 = "[s] \"Como esperado da Instrutora Kokona!\""
80000071-11 = "Não é Instrutora Kokona, é Kokona-chan!"
80000071-12 = "Ah, droga... respondi o contrário de sempre por reflexo..."
80000071-13 = "Você disse isso de propósito para me provocar, não foi?"
80000071-14 = "Isso é injusto, adultos são... não, o Sensei é maldoso!"
80000071-15 = "[s] \"D-desculpe... mas é que você realmente parece uma instrutora.\""
80000071-16 = "É, é mesmo...?#nSe é assim, então não tem jeito!"
80000071-17 = "Para um Sensei como você... e-eu vou te dar este chocolate, especialmente."
80000071-18 = "Eu pretendia preparar apenas para as crianças, mas acabei me lembrando do Sensei por acaso..."
80000071-19 = "Foi realmente por acaso, viu!"
80000071-24 = "[ns] \"Obrigado! ...Ué?\""
80000071-25 = "Q-que foi? Ei, este chocolate é um pouco diferente dos outros...?"
80000071-26 = "N-não é nada disso...!#nI-isso! Como lembrei do seu depois, talvez seja de um tipo diferente... não, não é isso!"
80000071-27 = "[s] \"Mas a embalagem...\""
80000071-28 = "N-não parece algo que alguém da loja faria, é isso...?"
80000071-29 = "D-do que você está falando...?#nA moça da loja deve estar cansada e acabou errando, não acha?"
80000071-30 = "[s] \"...É, talvez isso aconteça mesmo?\""
80000071-31 = "P-por que esse sorriso de repente?"
80000071-32 = "P-pode parar com esse jeito estranho de rir...!?"
80000071-33 = "[s] \"Posso comer aqui agora?\""
80000071-34 = "A-a-a-aqui? Aqui mesmo?"
80000071-35 = "Não pode! Pare com isso!"
80000071-36 = "Se for ser tão maldoso, eu vou pegar de volta!"
80000071-37 = "Como é? Já que ganhei, quero comer logo e te contar o que achei...?"
80000071-38 = "Auu, i-isso é... mas..."
80000071-39 = "M-mas não pode mesmo! Coma só quando voltar para o Schale!"
80000071-40 = "Tem que comer sozinho, entendeu? Está bem?"
80000071-45 = "(Dito isso, Kokona saiu correndo como se estivesse fugindo)"
80000071-53 = "(Quando pensei que ela tinha ido, ela voltou correndo e disse apenas uma coisa...)"
80000071-54 = "É uma promessa!"
