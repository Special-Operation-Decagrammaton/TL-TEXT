[translation]
10039040-1 = "Episódio 4; O Caminho da Idol: Música"
10039040-2 = "O figurino e a dança parecem estar bem."
10039040-3 = "Muito obrigada, Sensei."
10039040-4 = "Graças a você, tudo está correndo bem."
10039040-5 = "Agora, só precisamos resolver o problema da música..."
10039040-6 = "...Se resolvermos isso, já estará tudo pronto."
10039040-10 = "[ns1] \"...Marie?\"\n[ns2] \"Aconteceu alguma coisa?\""
10039040-13 = "...N-não!"
10039040-14 = "Eu só me distraí um pouco."
10039040-15 = "Bem, sobre a música da idol..."
10039040-16 = "Olá, Sensei."
10039040-17 = "...?"
10039040-18 = "Sensei, tem uma visita..."
10039040-19 = "[ns3] \"Essa voz...\"\n[ns4] \"...Utaha?\""
10039040-24 = "...Eu ouvi a conversa de vocês."
10039040-25 = "Que falta de consideração, Sensei. Uma idol, hein? Parece algo interessante—"
10039040-29 = "—E você não me consultou nem uma vez antes de um evento tão importante."
10039040-30 = "[s5] \"...Ela mudou o que disse!?\"\n[s6] \"Ela não disse que parecia interessante!?\""
10039040-33 = "É só impressão sua. De qualquer forma, achei que precisariam de ajuda."
10039040-34 = "Estão com algum problema?"
10039040-35 = "...Entendo, a música."
10039040-36 = "Nesse caso, eu tenho algumas guardadas."
10039040-37 = "...Por que estou tão preparada?"
10039040-38 = "Bem, é claro que..."
10039040-39 = "...Eu também pretendo participar do evento de idols."
10039040-40 = "[s7] \"A Utaha!?\"\n[s8] \"O Clube de Engenharia!?\""
10039040-43 = "Fufu, uma reação como eu esperava."
10039040-44 = "Mas, a única que vai subir no palco sou eu."
10039040-45 = "Tivemos divergências musicais com a Hibiki e as outras."
10039040-46 = "Talvez ainda fosse cedo demais para elas..."
10039040-47 = "Mas, se elas virem a minha apresentação, com certeza vão entender."
10039040-48 = "...O papel de uma idol."
10039040-49 = "O papel de uma idol...?"
10039040-50 = "Ah, sim. O motivo pelo qual alguém quer ser uma idol varia de pessoa para pessoa."
10039040-51 = "Cada uma coloca seus sentimentos nas palavras e transmite suas emoções."
10039040-52 = "...No meu caso, aproveitarei para exibir a \"Raichan Mirrorball Ver\"."
10039040-53 = "O importante é o \"coração\". Surpreendentemente, ser uma idol é parecido com ser uma mestre artesã."
10039040-54 = "Aliás, mudando de assunto, quem é esta pessoa...?"
10039040-55 = "...Entendo."
10039040-56 = "Então a irmã está estudando sobre idols."
10039040-57 = "Eu achei que o Sensei é quem ia debutar como idol."
10039040-58 = "[s9] \"Eu como idol...\"\n[s10] \"É o festival escolar das alunas, afinal...\""
10039040-61 = "Fufu. É brincadeira, brincadeira."
10039040-62 = "Estou torcendo por você, irmã."
10039040-63 = "Com certeza você será uma idol maravilhosa. Esta mestre artesã garante."
10039040-64 = "Ah, sim! Muito obrigada!"
10039040-69 = "...Eh?"
10039040-70 = "E-eu como idol...?"
10039040-71 = "...Hm?"
10039040-72 = "Você não estava estudando para se tornar uma idol?"
10039040-73 = "Ué, então quer dizer que o Sensei vai ser o ídolo...?"
10039040-74 = "[s11] \"Não, não, nada disso!\"\n[s12] \"Eu não tenho a menor intenção de ser um ídolo!?\""
10039040-77 = "Ahaha..."
10039040-78 = "Eu estou apenas dando suporte aos ídolos."
10039040-79 = "...?"
10039040-83 = "...Hum."
10039040-84 = "Então era isso."
10039040-85 = "Eu queria ter visto você no palco, é uma pena."
10039040-86 = "E-eu..."
10039040-87 = "Mas deixando isso de lado, você disse antes que tinha uma música, #npoderia nos deixar ouvir?"
10039040-88 = "Claro, essa era a intenção desde o começo."
10039040-89 = "Sensei, pode deixar comigo?"
10039040-93 = "[ns13] \"Sim, deixo com você.\"\n[ns14] \"Estou contando com você, Utaha.\""
10039040-96 = "Já que você disse isso, como uma meister, não tenho escolha a não ser corresponder."
10039040-97 = "Irmã, você poderia ir na frente para aquele lugar? #nEu tenho um assunto rápido para tratar com o Sensei."
10039040-98 = "Aqui é...?"
10039040-99 = "Um karaokê. Isso também é para escolher a música."
10039040-100 = "Quando terminarmos de conversar, vamos atrás de vocês."
10039040-101 = "Sim!"
10039040-102 = "Muito obrigada, Utaha-san! #nEntão, estou indo na frente!"
10039040-108 = "..."
10039040-109 = "...Hum."
10039040-113 = "[ns15] \"...Utaha.\"\n[ns16] \"O assunto era sobre a Mari?\""
10039040-116 = "Ah, eu só queria confirmar uma coisa."
10039040-117 = "Ela realmente não vai fazer isso?"
10039040-118 = "...Ser um ídolo."
10039040-119 = "O Sensei também percebeu, não é?"
10039040-120 = "Ela tem interesse em ser um ídolo."
10039040-121 = "Embora ela mesma ainda não tenha se dado conta."
10039040-122 = "Eu só queria dizer isso."
10039040-123 = "...Hm?"
10039040-124 = "Você quer observar a situação por mais um tempo?"
10039040-125 = "...Entendo, então você tem um plano."
10039040-126 = "Estou ansiosa para ver o palco daquela garota."
10039040-130 = "Fora isso, o Sensei deve saber qual é o meu gênero musical favorito. #n...Já que vamos ao karaokê, naturalmente você vai cantar comigo, certo?"
10039040-131 = "[s] \"Era esse o seu objetivo!?\""
10039040-133 = "(Depois disso, ouvimos algumas músicas de ídolos no karaokê e acompanhei a Utaha na cantoria)"
10039040-140 = "Música, concluída"
10039040-145 = "(...No dia seguinte)"
10039040-146 = "Isso é..."
10039040-147 = "Não acredito que você pesquisou tanto assim."
10039040-148 = "...Estou surpresa."
10039040-149 = "Deve ter sido muito difícil pesquisar tudo isso..."
10039040-150 = "Por causa da nossa falta de estudo..."
10039040-151 = "...?"
10039040-152 = "Você disse \"nós\"...?"
10039040-157 = "...Não posso negar."
10039040-158 = "Você está com olheiras, deve ter se esforçado muito."
10039040-159 = "...Mari-san, sinto muito."
10039040-161 = "P-por favor, levante a cabeça...!"
10039040-162 = "Para mim também foi um momento agradável. #nSe estou com falta de sono, é apenas porque fiquei absorta pensando em quais músicas seriam as melhores..."
10039040-163 = "Em vez de pedir desculpas, acho que expressar gratidão deixaria a Marie mais aliviada."
10039040-164 = "Muito obrigada, de verdade."
10039040-165 = "Sakurako-sama...!"
10039040-166 = "Portanto..."
10039040-167 = "Agora, por favor, descanse um pouco."
10039040-174 = "……Eh?"
10039040-175 = "Só de organizar todo esse material, deve ter sido um trabalho considerável, não é?"
10039040-176 = "Deixe o resto comigo e com a Comandante Mine."
10039040-177 = "Sim, não deixaremos o esforço da Marie ser em vão."
10039040-179 = "Ah, sim..."
10039040-181 = "……?"
10039040-182 = "Há algo que a esteja incomodando?"
10039040-184 = "……N-não! #nNão é nada!"
10039040-185 = "E-então, boa sorte para as duas!"
10039040-190 = "……Marie?"
10039040-191 = "Será que aconteceu alguma coisa...?"
10039040-192 = "Sakurako-san?"
10039040-193 = "Não temos mais tempo."
10039040-194 = "Temos uma montanha de coisas para fazer!"
10039040-195 = "Vamos começar logo! Para não desperdiçar o sacrifício da Marie."
10039040-197 = "Sa-sacrifício!? A Marie ainda está viva, sabia!?"
10039040-198 = "……Sakurako-san!"
10039040-199 = "Ugh, e-entendido!"
10039040-206 = "…………."
10039040-212 = "Hinata-san, o que houve?"
10039040-213 = "……Ah!"
10039040-214 = "O trabalho na catedral――!"
10039040-215 = "……Eh?"
10039040-216 = "Ah, já está quase tudo terminado, não é?"
10039040-217 = "……Sim."
10039040-218 = "Entendido."
10039040-219 = "Então, entrarei em contato novamente."
10039040-224 = "Acabei ganhando uma folga..."
10039040-225 = "Talvez eu consiga descansar um pouco depois de tanto tempo."
10039040-226 = "……Mas, o que será isso?"
10039040-228 = "Esse sentimento..."
