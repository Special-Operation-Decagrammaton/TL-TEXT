[translation]
10039040-1 = "第4話;アイドルの道：曲"
10039040-2 = "衣装とダンスは大丈夫そうですね。"
10039040-3 = "ありがとうございます、先生。"
10039040-4 = "おかげで順調に進んでます。"
10039040-5 = "あとは曲の問題を解決すれば……。"
10039040-6 = "……すれば、もうおしまいなんですね。"
10039040-10 = "[ns1] \"……マリー？\"\n[ns2] \"どうかしたの？\""
10039040-13 = "……い、いえ！"
10039040-14 = "少しぼーっとしてしまっただけです。"
10039040-15 = "では、アイドルソングについて……。"
10039040-16 = "やあ、先生。"
10039040-17 = "……？"
10039040-18 = "先生、お客さんが……。"
10039040-19 = "[ns3] \"この声は……。\"\n[ns4] \"……ウタハ？\""
10039040-24 = "……話は聞かせてもらったよ。"
10039040-25 = "水臭いじゃないか、先生。#nアイドルだなんて、面白そうな――"
10039040-29 = "――大事なイベントを前に、一言も相談してくれないとは。"
10039040-30 = "[s5] \"……言い直した！？\"\n[s6] \"「面白そう」って言わなかった！？\""
10039040-33 = "気のせいじゃないか？#nとにかく、助けが必要だと思ってね。"
10039040-34 = "何か困っていることはないのかい？"
10039040-35 = "……なるほど、曲か。"
10039040-36 = "それなら、いくつかストックがあるよ。"
10039040-37 = "……どうして準備が良いのかって？"
10039040-38 = "それはもちろん……。"
10039040-39 = "……私も、アイドルイベントに参加するつもりだからさ。"
10039040-40 = "[s7] \"ウタハが！？\"\n[s8] \"エンジニア部が！？\""
10039040-43 = "ふふ、予想通りの反応だね。"
10039040-44 = "だが、ステージに立つのは私だけなんだ。"
10039040-45 = "ヒビキたちとは音楽性の違いがあったのさ。"
10039040-46 = "二人には、まだ早かったのかもしれない……。"
10039040-47 = "けど、私のステージを見てくれれば、きっと気づいてくれるはず。"
10039040-48 = "……アイドルの役割に。"
10039040-49 = "アイドルの、役割……？"
10039040-50 = "ああ、そうさ。アイドルになりたい理由は人それぞれだからね。"
10039040-51 = "皆それぞれ、気持ちを言葉に乗せて、感情を伝えるんだ。"
10039040-52 = "……私の場合、ついでに「雷ちゃんミラーボールVer」を披露したりもする。"
10039040-53 = "大事なのは「心」。#n意外にも、アイドルはマイスターと似ているね。"
10039040-54 = "ところで今さらだが、こちらの方は……？"
10039040-55 = "……なるほど。"
10039040-56 = "シスターさんがアイドルについて勉強しているところなのか。"
10039040-57 = "てっきり、先生がアイドルデビューするのだと思っていた。"
10039040-58 = "[s9] \"私がアイドルって……。\"\n[s10] \"生徒たちの学園祭だからね……。\""
10039040-61 = "ふふ。冗談だよ、冗談。"
10039040-62 = "応援しているよ、シスターさん。"
10039040-63 = "きっと素敵なアイドルになれるはずさ。#nこのマイスターが保証する。"
10039040-64 = "あ、はいっ！#nありがとうございます！"
10039040-69 = "……え？"
10039040-70 = "わ、私がアイドルに……？"
10039040-71 = "……ん？"
10039040-72 = "アイドルになるために勉強しているんじゃなかったのかい？"
10039040-73 = "あれ、じゃあやっぱり先生がアイドルに……？"
10039040-74 = "[s11] \"いやいや、違うよ！\"\n[s12] \"私はアイドルやるつもりないよ！？\""
10039040-77 = "あはは……。"
10039040-78 = "私はアイドルのサポートをしているだけなんです。"
10039040-79 = "……？"
10039040-83 = "……ふむ。"
10039040-84 = "そう、だったのか。"
10039040-85 = "ステージに君が立っている姿を見てみたかったのだが、少し残念だね。"
10039040-86 = "わ、私は……。"
10039040-87 = "それよりも、曲があると先ほど言っていましたが、#n聞かせていただけないでしょうか？"
10039040-88 = "もちろん、最初からそのつもりさ。"
10039040-89 = "先生、ここは私に任せてくれるかい？"
10039040-93 = "[ns13] \"うん、任せるよ。\"\n[ns14] \"期待してるよ、ウタハ。\""
10039040-96 = "そう言われたら、マイスターとして応えるしかないね。"
10039040-97 = "シスターさん、先にこの場所へ向かっていてくれるかい？#n私は先生と少し話があるんだ。"
10039040-98 = "ここは……？"
10039040-99 = "カラオケだよ、これも曲選びのためさ。"
10039040-100 = "話が終わったら、私たちも追いかけよう。"
10039040-101 = "はい！"
10039040-102 = "ありがとうございます、ウタハさん！#nでは、先に向かっています！"
10039040-108 = "……。"
10039040-109 = "……ふむ。"
10039040-113 = "[ns15] \"……ウタハ。\"\n[ns16] \"話って、マリーのこと？\""
10039040-116 = "ああ、ちょっと確認をしたくてね。"
10039040-117 = "本当にやらないのかい？"
10039040-118 = "……アイドル。"
10039040-119 = "先生も気づいてるだろう？"
10039040-120 = "彼女はアイドルに興味を持っている。"
10039040-121 = "まだ自覚はないだろうけど。"
10039040-122 = "言いたかったのは、それだけさ。"
10039040-123 = "……ん？"
10039040-124 = "もう少し状況を見ておきたい、と？"
10039040-125 = "……なるほど、考えがあってのことなんだね。"
10039040-126 = "楽しみにしているよ、あの子のステージ。"
10039040-130 = "それはそうと、先生は私の好きな曲のジャンルを理解しているはずだ。#n……カラオケに行くわけだから、当然一緒に歌ってくれるだろう？"
10039040-131 = "[s] \"それが目的だったの！？\""
10039040-133 = "（その後、カラオケでアイドルソングをいくつか聞いてから、ウタハのカラオケに付き合った）"
10039040-140 = "曲、クリア"
10039040-145 = "（……翌日）"
10039040-146 = "これは……。"
10039040-147 = "まさか、ここまで調べてくれるとは。"
10039040-148 = "……驚きました。"
10039040-149 = "こんなに調べるのはさぞ大変だったでしょう……。"
10039040-150 = "私たちの勉強不足のせいで……。"
10039040-151 = "……？"
10039040-152 = "私「たち」と仰いましたか……？"
10039040-157 = "……否定はできないですね。"
10039040-158 = "クマもできていますし、とても頑張ってくださったのでしょう。"
10039040-159 = "……マリーさん、申し訳ありませんでした。"
10039040-161 = "ど、どうか頭を上げてください……！"
10039040-162 = "私も楽しい時間でしたので。#n寝不足なのは、どの曲が良いのか夢中になって考えていただけですし……。"
10039040-163 = "ここは謝罪ではなく、感謝の気持ちを伝えたほうがマリーの気も楽でしょう。"
10039040-164 = "本当に、ありがとうございました。"
10039040-165 = "サクラコ様……！"
10039040-166 = "ですから……。"
10039040-167 = "あとはゆっくり休んでください。"
10039040-174 = "……えっ？"
10039040-175 = "これだけの資料をまとめるだけでも、相当大変だったでしょう？"
10039040-176 = "あとは、私とミネ団長で何とかします。"
10039040-177 = "ええ、マリーさんの頑張りを無駄にはいたしません。"
10039040-179 = "あっ、はい……。"
10039040-181 = "……？"
10039040-182 = "どこか気になる点でもあるのでしょうか？"
10039040-184 = "……い、いえ！#n何でもありません！"
10039040-185 = "そ、それでは、お二人とも頑張ってください！"
10039040-190 = "……マリー？"
10039040-191 = "何かあったのでしょうか……？"
10039040-192 = "サクラコさん？"
10039040-193 = "もう時間がありません。"
10039040-194 = "やるべきことは山積みです！"
10039040-195 = "さっそく始めましょう！マリーの犠牲を無駄にしないためにも。"
10039040-197 = "ぎ、犠牲！？マリーは生きてますよ！？"
10039040-198 = "……サクラコさんっ！"
10039040-199 = "うっ、わ、分かりました！"
10039040-206 = "…………。"
10039040-212 = "ヒナタさん、どうされましたか？"
10039040-213 = "……はっ！"
10039040-214 = "聖堂の仕事が――！"
10039040-215 = "……え？"
10039040-216 = "あ、もうほとんど終わっているのですね。"
10039040-217 = "……はい。"
10039040-218 = "分かりました。"
10039040-219 = "では、またご連絡しますね。"
10039040-224 = "お休みをもらってしまいました……。"
10039040-225 = "久々にゆっくりできるかもしれませんね。"
10039040-226 = "……ですが、何なのでしょうか。"
10039040-228 = "この気持ちは……。"
