[translation]
80000004-1 = "Este é o chocolate de Dia dos Namorados da Arona!"
80000004-2 = "Sala de aula da Arona"
80000004-3 = "Professor, bom trabalho!"
80000004-4 = "Já se passou mais de um mês desde o início do ano novo, não é..."
80000004-5 = "A propósito, professor, você sabe que dia é hoje?"
80000004-6 = "[s] \"Dia dos Namorados!\""
80000004-7 = "Sim, exatamente!"
80000004-8 = "Hoje é o Dia dos Namorados... um dia romântico para presentear alguém especial, alguém que você ama, com chocolates."
80000004-9 = "Sendo assim... hehe. Hoje, a Arona também fez chocolates artesanais para o professor que ela tanto gosta!"
80000004-13 = "Bem..."
80000004-17 = "Tcharam!"
80000004-18 = "O que achou, professor?"
80000004-19 = "Sabe qual é o formato disso?"
80000004-20 = "[s1] \"Isso, por acaso...\"\n[s2] \"Sou eu?\""
80000004-21 = "Sim, exatamente!"
80000004-22 = "Sim, exatamente!"
80000004-23 = "São biscoitos de gengibre com chocolate, feitos especialmente no formato da Arona e do professor!"
80000004-24 = "Não acha que ficaram fofos?"
80000004-25 = "Primeiro eu fiz os biscoitos de gengibre e depois cobri com chocolate branco."
80000004-26 = "Talvez por isso, sinto que o cheiro de gengibre ainda ficou um pouco nas minhas mãos..."
80000004-27 = "Eu acordei cedo e me esforcei muito para fazer isso para você, professor!"
80000004-28 = "Por favor, coma com carinho esse presente que a Arona fez com tanto esforço!"
