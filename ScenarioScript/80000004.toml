[translation]
80000004-1 = "アロナからのバレンタインチョコです！"
80000004-2 = "アロナの教室"
80000004-3 = "先生、お疲れ様です！"
80000004-4 = "新しい年になってから、もうひと月以上も経ったんですね……。"
80000004-5 = "ところで先生は、今日が何の日かご存知ですか？"
80000004-6 = "[s] \"バレンタインデー！\""
80000004-7 = "はい、大正解です！"
80000004-8 = "今日はバレンタインデー……大切な誰か、そして大好きな相手にチョコをプレゼントするロマンチックな日です。"
80000004-9 = "というわけで……ふふっ。今日はアロナも、大好きな先生のために手作りチョコを作りました！"
80000004-13 = "えっとー……。"
80000004-17 = "じゃーん！"
80000004-18 = "いかがですか、先生？"
80000004-19 = "これ、何の形か分かります？"
80000004-20 = "[s1] \"これ、もしかして……\"\n[s2] \"私？\""
80000004-21 = "はい、そうです！"
80000004-22 = "はい、そうです！"
80000004-23 = "アロナと先生の形で焼いて作った、特製のチョコジンジャークッキーです！"
80000004-24 = "これ、可愛いと思いません？"
80000004-25 = "まずジンジャークッキーを作ってから、その上にホワイトチョコレートをかけたんです。"
80000004-26 = "そのせいか、ちょっと手にジンジャーの香りが残ってしまった感じもありますが……。"
80000004-27 = "先生のために、早起きして頑張って作ったんですよ！"
80000004-28 = "アロナが一生懸命作ったプレゼント、大切に食べてくださいね！"
