[translation]
2300505-1 = "A desastrosa jornada de reparos da Ayane"
2300505-2 = "Colégio Abydos"
2300505-3 = "Ahaha... logo no meu dia de folga, ter que fazer reparos na escola."
2300505-4 = "Por mim tudo bem, mas o Sensei está bem com isso?"
2300505-5 = "[s1] \"Não tem problema.\"\n[s2] \"Eu estou livre mesmo.\""
2300505-6 = "Mas você deveria estar ocupado..."
2300505-7 = "Mas você deveria estar ocupado..."
2300505-8 = "Bem, o prédio da escola de Abydos é bem antigo, e não é só um ou dois lugares que estão quebrados. Tem muita coisa para consertar..."
2300505-9 = "Normalmente, quando algo quebra, acabamos deixando como está..."
2300505-10 = "Mas não podemos deixar assim para sempre... então, decidimos reservar dias para fazer reparos aos poucos e manter o local funcionando."
2300505-11 = "[s] \"Entendi... bom, então vamos lá.\""
2300505-14 = "Pátio - Bebedouro"
2300505-16 = "[ns] \"É o bebedouro, né?\""
2300505-17 = "Sim. Faz alguns dias que a água parou de sair da torneira..."
2300505-18 = "Parece haver um problema em algum lugar na tubulação, mas como as atividades do clube estavam muito corridas, não consegui identificar a causa."
2300505-19 = "[s3] \"Se for problema na tubulação, parece algo sério.\"\n[s4] \"Será que nós damos conta?\""
2300505-20 = "Acho que sim. Eu já consertei algumas vezes antes."
2300505-21 = "Acho que sim. Eu já consertei algumas vezes antes."
2300505-22 = "[s] \"A Ayane consertou?\""
2300505-23 = "Sim. Da primeira vez que chamamos um encanador profissional, eu fiquei observando atentamente como ele fazia o conserto."
2300505-24 = "Parecia algo que eu conseguiria fazer sozinha, então, desde aquela época, sempre que quebra, eu mesma faço o reparo."
2300505-25 = "[s] \"A Ayane é incrível.\""
2300505-26 = "Ahaha... eu também estudei usando manuais de reparo e livros sobre encanamento de água potável..."
2300505-27 = "Não é nada demais."
2300505-28 = "Bem... então, por enquanto, vamos verificar a situação..."
2300505-30 = "(Gira, gira)"
2300505-31 = "..."
2300505-32 = "[s] \"Não importa o quanto gire a torneira, não sai nada mesmo.\""
2300505-33 = "Pois é. Vejamos... bem, nessas horas, o medidor lá embaixo..."
2300505-36 = "(Desliza)"
2300505-37 = "Acho que ficava por aqui..."
2300505-38 = "(Vasculhando...)"
2300505-39 = "...Ué?"
2300505-40 = "[s] \"O que houve?\""
2300505-41 = "Sim, é que..."
2300505-42 = "(Desliza)"
2300505-43 = "(BAM!!!!)"
2300505-44 = "Ai, meu Deus!?"
2300505-45 = "(Ao tentar se levantar, Ayane bate a cabeça com força na quina de concreto do bebedouro, fazendo um barulho estrondoso)"
2300505-46 = "[s5] \"Ayane, você está bem?!\"\n[s6] \"Que barulho foi esse?!\"\n[s7] \"Que grito estranho foi esse?!\""
2300505-47 = "Ah... uaaauuu..."
2300505-48 = "Ah... uaaauuu..."
2300505-49 = "Ah... uaaauuu..."
2300505-50 = "...E-eu estou bem, uuu... j-já descobri a causa também..."
2300505-51 = "..."
2300505-52 = "[s8] \"...\"\n[s9] \"............\""
2300505-53 = "S-se fosse um vazamento, o medidor deveria estar girando. Mas... como o medidor não estava girando nada..."
2300505-54 = "S-se fosse um vazamento, o medidor deveria estar girando. Mas... como o medidor não estava girando nada..."
2300505-55 = "[s10] \"Não, mais importante que isso...\"\n[s11] \"Sua cabeça...\""
2300505-56 = "Foi só uma batidinha, estou bem..."
2300505-57 = "Foi só uma batidinha, então estou bem..."
2300505-58 = "……"
2300505-59 = "Não dói... (olhos marejados)"
2300505-60 = "Já descobrimos a causa, então... vamos lá..."
2300505-64 = "(Eu queria dizer que ela não precisava se forçar a aguentar,)"
2300505-65 = "(mas senti que, se eu dissesse isso, a Ayane ficaria ainda mais envergonhada, então não consegui falar...)"
2300505-67 = "Escola de Abydos - Instalações Subterrâneas"
2300505-68 = "(Grum, grum, grum...)"
2300505-69 = "É aqui que toda a tubulação do prédio escolar se concentra."
2300505-70 = "Eu fechei os canos que não eram necessários... deixei abertos apenas os que usamos no dia a dia, como os do chuveiro, dos banheiros e da copa."
2300505-71 = "Claro, a torneira do pátio também deveria estar aberta, mas..."
2300505-72 = "[s] \"Está fechada, né?\""
2300505-73 = "Sim, talvez alguém tenha fechado a válvula."
2300505-74 = "Provavelmente não foi com a intenção de nos prejudicar. Se fosse, haveria métodos muito mais eficazes. Por exemplo, a tubulação dos banheiros..."
2300505-75 = "……"
2300505-76 = "[s] \"Hm...? Desculpe, não ouvi direito, o que você disse?\""
2300505-77 = "Ah, não, não é nada. Provavelmente, quem fez isso foi alguém do Comitê de Contramedidas. Não sei o motivo, mas..."
2300505-78 = "De qualquer forma, já descobrimos a causa... é só abrir a válvula e o problema estará resolvido."
2300505-79 = "Ah, para isso, vamos precisar de uma chave inglesa de 12 polegadas..."
2300505-80 = "Bem... se não me engano, deve ter uma no terceiro depósito de educação física..."
2300505-81 = "[s] \"Quer que eu vá buscar?\""
2300505-82 = "Não, esse depósito fica um pouco longe... vamos juntos, Sensei."
2300505-84 = "(Giiiii...)"
2300505-86 = "Cof, cof."
2300505-87 = "Ufa... é tudo muito velho e a porta é difícil de abrir."
2300505-88 = "O terceiro depósito é incomum por ter uma entrada de ferro... é sempre um esforço abrir."
2300505-89 = "Talvez... originalmente, ele servisse como um abrigo antiaéreo."
2300505-90 = "Se uma porta tão pesada quanto esta quebrar, será impossível sair de dentro. Preciso consertá-la algum dia antes que isso aconteça..."
2300505-91 = "(CLANG!!)"
2300505-92 = "……"
2300505-93 = "[s] \"Tive a impressão de ter ouvido um som sinistro...\""
2300505-94 = "Ah, o que foi isso...!?"
2300505-96 = "(Clack, clack) A porta!?"
2300505-97 = "N-não pode ser...!!"
2300505-98 = "E-ela não abre! O-o-o que a gente faz...!"
2300505-99 = "[s12] \"Calma, Ayane.\"\n[s13] \"Não é como se fôssemos morrer agora!\""
2300505-100 = "B-bem, é claro que não vamos morrer agora, mas..."
2300505-101 = "B-bem, é claro que não vamos morrer agora, mas..."
2300505-102 = "Se eu entrar em contato com o pessoal do comitê e disser que estou presa no terceiro depósito de educação física sozinha com o Sensei, eles virão nos ajudar imediatamente, mas..."
2300505-103 = "Se me perguntarem: 'Ayane-chan, por que você estava sozinha com o Sensei em um depósito de educação física tão isolado?', o que eu deveria responder...?"
2300505-104 = "[s] \"Acho que é só dizer a verdade!?\""
2300505-105 = "……"
2300505-106 = "V-você tem razão, não é...? Eles vão entender, não vão...?"
2300505-107 = "……"
2300505-108 = "Será que eles vão entender...?"
2300505-109 = "B-bem, é claro que, se for com o Sensei... eu não me importo, mas... na verdade, eu até ficaria feliz... não, espere, mas..."
2300505-110 = "Se eles me olharem com aquele olhar de 'Achávamos que a Ayane-chan era uma menina comportada, mas olha só. Quem diria que ela escondia garras tão afiadas', o que eu deveria fazer...?"
2300505-111 = "Só me resta cavar um buraco e me esconder nele... ahhh..."
2300505-112 = "[s14] \"Ayane, acalme-se.\"\n[s15] \"Eu encontrei um jeito de sair.\""
2300505-113 = "...Sim!?"
2300505-114 = "……Hã!?"
2300505-115 = "[ns] Aponta para a parede do lado oposto."
2300505-118 = "Ah……."
2300505-119 = "Pensando bem, tem uma janela ali."
2300505-120 = "[s] \"Que bom.\""
2300505-123 = "Ali, realmente parece que uma pessoa conseguiria passar, mas... a posição está um pouco alta."
2300505-124 = "[s16] \"Eu te ajudo a subir nos meus ombros,\"\n[s17] \"Ayane, pule e abra a porta para mim.\""
2300505-125 = "Hã!?"
2300505-126 = "Hã!?"
2300505-127 = "O Sensei quer que eu suba nos seus ombros!?"
2300505-128 = "I-isso é...!"
2300505-129 = "[s] \"Se não fizermos isso, não conseguiremos contatar o pessoal do Comitê de Contramedidas...\""
2300505-130 = "……."
2300505-131 = "……T-tudo bem, vamos fazer isso!"
2300505-133 = "E-então, conto com você."
2300505-134 = "(Sobe)"
2300505-135 = "D-desculpe, Sensei, não estou pesada...?"
2300505-136 = "Ai, ai... s-se eu soubesse que chegaria a esse ponto, pelo menos teria usado meias..."
2300505-137 = "(Ranger)"
2300505-138 = "Felizmente a janela não está trancada, então..."
2300505-139 = "E lá... vai!"
2300505-140 = "(Escorrega)"
2300505-141 = "Ah, aah!?"
2300505-142 = "(Ploft! Bate a porta!)"
2300505-143 = "[s] \"Ayane, você está bem!?\""
2300505-144 = "Cof, cof... e-eu só tropecei um pouco. Ai... tem areia na minha boca..."
2300505-145 = "De qualquer forma, consegui sair em segurança..."
2300505-146 = "Vou abrir a porta agora mesmo."
2300505-150 = "(Passos rápidos...)"
2300505-151 = "(Clique)"
2300505-152 = "(Ranger...)"
2300505-154 = "……."
2300505-155 = "[s18] \"Conseguimos!\"\n[s19] \"Você acabou ficando toda suja de areia.\""
2300505-156 = "A-ahahaha..."
2300505-157 = "A-ahahaha..."
2300505-160 = "(Depois disso, conseguiram pegar a chave inglesa e abrir a válvula de água)"
2300505-162 = "……."
2300505-164 = "(Gira, gira)"
2300505-165 = "(Jorraaaaa...)"
2300505-166 = "Ufa... a água voltou a sair normalmente, Sensei."
2300505-167 = "Bom trabalho, fico feliz que o bebedouro tenha sido consertado."
2300505-168 = "[s] \"Bom trabalho para você também, Ayane.\""
2300505-169 = "Ufa... acabei me sujando toda... e estou com tanta sede... estou exausta..."
2300505-173 = "Desculpe, Sensei. Poderia esperar um pouco?"
2300505-176 = "― ……?[wa:1500]……Sensei?[wa:1500]Você[wa:500]ainda está aí,[wa:1000]né?[wa:500] "
2300505-178 = "― Sem os meus óculos...[wa:1500]eu[wa:500]não consigo ver direito.[wa:300] "
2300505-181 = "[ns] \"Acho que é a primeira vez que vejo o rosto da Ayane sem os óculos.\""
2300505-182 = "― Eh?[wa:1000]Ah,[wa:500]sim.[wa:1500]É verdade, eu[wa:1000]praticamente nunca os tiro."
2300505-184 = "― Ah,[wa:500]ahahaha...[wa:1500]Bem,[wa:500]eu os tiro quando vou lavar o rosto."
2300505-187 = "[wa:500]― E-estou[wa:500]sentindo meu rosto[wa:700]quente...[wa:300] "
2300505-189 = "― O Sensei acabou me vendo em uma situação tão vergonhosa..."
2300505-192 = "[ns20] \"A Ayane em pânico,\"\n[ns21] \"foi adorável.\""
2300505-195 = "― Hã?! [wa:1000]A-adorável, você disse... [wa:1500]Não pode ser..."
2300505-197 = "― A- [wa:900]auuu..."
2300505-200 = "― S- [wa:1000]se você ficar me encarando assim..."
2300505-202 = "― É... [wa:800]muito vergonhoso... [wa:200]"
