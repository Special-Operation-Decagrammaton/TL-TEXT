[translation]#[Texto revisado, mas pode haver alterações como Censura.] Em aguardo de revisão de formatação de texto. - Filipe 10/06.
41200-1 = "Episódio 20: Toca da Raposa"
41200-2 = "Academia de Polícia Valkyrie - Sede Principal"
41200-4 = "Estamos ao vivo, reportando diretamente dos portões da Academia de Polícia Valkyrie, o centro do escândalo de corrupção envolvendo a Kaiser Group!"
41200-5 = "De acordo com fontes confidenciais..."
41200-6 = "A elite da Segurança Pública teria recebido propina e armamento pesado da Kaiser Group, abusando de seu poder estatal para reprimir civis inocentes e limpar o terreno para as obras da megacorporação!"
41200-7 = "A revelação de que a Valkyrie, o pilar de proteção da nossa cidade, estava de mãos dadas com a máfia corporativa caiu como uma bomba na população!"
41200-8 = "Como se não bastasse, há relatos de que um grupo não identificado de operações especiais invadiu a fortaleza da Valkyrie nesta madrugada, humilhando o efetivo da Segurança Pública."
41200-9 = "Incidentes consecutivos estão desmoronando a credibilidade e a autoridade da Valkyrie!"
41200-10 = "Afinal, o que é fato e o que é mentira no meio desse fogo cruzado?!"
41200-11 = "A nossa equipe de reportagem veio em busca de respost――!"
41200-17 = "\\"
41200-18 = "……Que palhaçada é essa no meu portão."
41200-19 = "A-Ah! A Chefe de Segurança Pública Kanna acaba de aparecer!"
41200-20 = "Senhora Chefe, o que a senhora tem a declarar sobre o esquema de propina e as negociações sombrias no subsolo?!"
41200-21 = "Parem as câmeras. Quem vazou essa informação pra vocês..."
41200-22 = "Vocês estão pisando em território federal. Quem autorizou a presença da mídia aqui?"
41200-23 = "Opa, as tensões sobem! Seria este o destino da mídia livre, bater de frente com o punho de ferro do estado?! Mas a Escola de Jornalismo Kronos não se calar――"
41200-28 = "DESLIGUEM ESSA CÂMERA E DEEM O FORA DAQUI!!"
41200-30 = "Parque dos Coelhinhos"
41200-31 = "……O plantão de notícias parou a cidade."
41200-32 = "P-Pois é. Eles não tão falando de outra coisa na televisão desde que o sol raiou..."
41200-33 = "S-Será que a Segurança Pública vai invadir o nosso parque buscando vingança...?!"
41200-35 = "Não é problema nosso. A gente só executou a missão e entregou as provas."
41200-36 = "E com esse circo da Kronos na porta deles e a pressão do Conselho Estudantil, eu duvido muito que a Valkyrie tenha tempo e recursos pra perseguir a gente."
41200-37 = "Faz sentido... mas não sei, tem alguma coisa que não tá encaixando..."
41200-38 = "Que tipo de coisa?"
41200-39 = "O timing tá rápido demais. Perfeito demais."
41200-40 = "O Conselho Estudantil montou uma CPI na mesma hora... A Kaiser, que devia ter torrado bilhões nessa área, recuou da noite pro dia, engoliu o choro e cancelou a obra sem dar um pio..."
41200-41 = "……Sensei, você andou ameaçando alguém do alto escalão com fotos comprometedoras ou algo do tipo?"
41200-42 = "[s1] \"Não... meu método não envolve chantagem.\"\n[s2] \"……Digamos apenas que joguei lenha na fogueira diplomática.\""
41200-48 = "……? Eu não entendi, mas... estou aliviada."
41200-49 = "Se a reurbanização da Vila dos Coelhinhos afundou, os civis e os andarilhos não vão ser expulsos de casa..."
41200-50 = "……O que significa que nós também podemos ficar."
41200-52 = "Ah... ahm..."
41200-61 = "Eca, invasores de novo."
41200-62 = "Saki, me passa aquela granada ali."
41200-63 = "Vou dar um 'bom dia' explosivo pra eles como aquecimento matinal."
41200-64 = "PAREM! NÓS VIEMOS EM PAZ! É UMA VISITA DE CORTESIA!"
41200-65 = "……Visita de cortesia?"
41200-66 = "Ah, entendi. No manual de táticas do Mercado Negro 'visita de cortesia' é código pra 'fuzilar todo mundo e deixar o prédio em chamas'..."
41200-67 = "Vocês são psicopatas sedentas por sangue!!"
41200-68 = "Haaah... Enfim, eu tenho que engolir o orgulho e admitir que o nosso couro foi salvo por vocês..."
41200-72 = "……Nós estamos em dívida com o Esquadrão."
41200-74 = "As ruas sussurram que vocês arriscaram a própria pele invadindo a fortaleza da Valkyrie pra desmascarar a corrupção deles."
41200-75 = "Por causa disso, o nosso santuário aqui foi poupado do trator. Os irmãos da 'FeliSem' estão voltando um por um das sombras."
41200-76 = "Pode ser que a intenção de vocês não tenha sido proteger a gente. Mas ignorar uma dívida de sangue dessas não é digno de um Buscador da Iluminação..."
41200-77 = "Por isso, nós viemos oferecer a vocês um banquete sagrado como forma de agradecimento."
41200-83 = "Banquete?! Sério?! Tipo, o que?!"
41200-84 = "……Não me diga que é um prato requintado de broto de feijão na lama."
41200-85 = "Mais respeito! Nós trouxemos a coroa de diamantes da nossa despensa sagrada. Eis aqui..."
41200-86 = "O sublime osso de frango frito,"
41200-88 = "Karague de Osso Mestre!"
41200-95 = "……Karague? Essa pilha de ossos pálidos?"
41200-96 = "Exatamente! Ele se difere do frango frito comum porque, claro, é literalmente o osso pelado frito na gordura. Você não pode morder."
41200-97 = "Mas preste atenção: a essência dele está na aura! Se você fechar os olhos e cheirar profundamente a carcaça frita, o seu cérebro vai acreditar que você está mastigando frango de verdade, e com zero calorias consumidas! É a comida do futuro!"
41200-98 = "Dá pra descer três latas de cerveja fácil só sugando o cheiro de um desses ossos! Fica divino debaixo do cobertor no frio."
41200-99 = "Sirvam-se, não se acanhem. É um presente de coração."
41200-105 = "M-Mas isso não é Karague..."
41200-106 = "……Isso é só lixo orgânico."
41200-107 = "LIXO ORGÂNICO?! Como ousam insultar o sagrado Karague de Osso Mestre?! Ele só tem... peças diferentes do tradicional!"
41200-108 = "Chamar uma iguaria de 'lixo' é de uma ignorância imperdoável!"
41200-110 = "Ele tem razão, não é lixo orgânico."
41200-111 = "Pela tabela municipal de separação de resíduos, osso de frango cai direto na caçamba de 'lixo inflamável'."
41200-117 = "E-EI! CHEGA! Primeiro lixo orgânico, agora lixo inflamável...!"
41200-118 = "Nós trazemos o nosso tesouro material para vocês... e somos apedrejados com blasfêmias...!"
41200-119 = "Eu sabia! Almas iluminadas da FeliSem jamais se misturarão com hereges ingratas como vocês!"
41200-120 = "E A GENTE LÁ QUER ROER OSSO FRITO, SEU MALUCO?!"
41200-124 = "Moe, puxa as granadas de fragmentação!"
41200-126 = "Pode deixar, eu vou transformar eles no 'Lixo Inflamável' em pessoa!"
41200-138 = "……E voltamos à rotina de guerra."
41200-142 = "Escritório de Defesa - Sala da Diretora"
41200-146 = "……Então o nosso castelo de cartas desabou tão rápido."
41200-147 = "O cerco da imprensa e a CPI devem imobilizar a Segurança Pública por alguns meses... um completo revés."
41200-148 = "Por que os deuses me amaldiçoaram com peças tão frágeis no meu tabuleiro...?"
41200-149 = "……Eu avisei que depender delas seria um erro."
41200-150 = "Hehe... Fique calma. O documento que o Esquadrão RABBIT expôs ligava apenas a Kaiser com a Valkyrie."
41200-151 = "O meu nome continua imaculado, e o repasse não deixou rastros no meu lado da mesa. O grande plano não corre perigo."
41200-152 = "Se você parasse de perder tempo com marionetes medíocres e buscasse parceiros de verdade, não estaríamos nessa situação."
41200-153 = "Parceiros... em quem eu possa confiar de olhos fechados... É..."
41200-159 = "Falando nisso, o que as senhoritas acham das suas amadas calouras? O desempenho delas foi esplêndido, não acha?"
41200-160 = "Panela velha é que faz comida boa. O nível de maestria tática delas ainda é risível... Mas têm a fibra da SRT pulsando nas veias. O sangue não nega."
41200-165 = "Para os meus padrões, elas são muito amadoras para ostentar o nome da SRT."
41200-166 = "Ooh, a Yukino é impiedosa~."
41200-167 = "Você que é mole demais, Niko."
41200-168 = "Se eu tivesse comandado a infiltração, a porta de aço seria arrombada sem disparar o alarme e a extração ocorreria em menos de sessenta segundos."
41200-173 = "Não sejam cruéis. Elas ainda são meras cadetes do primeiro ano. Exigir o nível de veteranas de elite de vocês seria desumano."
41200-174 = "Mas parando pra pensar... Seria um desperdício monstruoso deixar lâminas como elas enferrujarem na lama."
41200-175 = "O que acham de convidarmos as queridas coelhinhas para participarem... do nosso plano de 'Golpe de Estado'?"
41200-177 = "O que as veneráveis veteranas do Esquadrão FOX da SRT têm a dizer sobre isso?"
41200-180 = "Por mim, seria bem divertido~."
41200-181 = "Afinal de contas, elas destruíram a nossa operação fantasma. Alguém vai ter que pagar o pato e suar a camisa pra compensar o prejuízo."
41200-182 = "Dói o meu coração ver minhas calouras fofas sujando as mãos de sangue... Mas, que opção nós temos?"
41200-183 = "……No momento em que elas juraram lealdade à SRT, o sangue nas mãos já estava garantido."
41200-185 = "Tudo em nome do renascimento glorioso da SRT. E o mais importante...――"
41200-189 = "Para expurgar a Schale de Kivotos de uma vez por todas."
41200-192 = "Arco O Coelho de Caerbannog: Continua no Capítulo 2"