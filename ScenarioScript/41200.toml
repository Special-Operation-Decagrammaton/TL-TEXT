[translation]
41200-1 = "Episódio 20; Toca da Raposa"
41200-2 = "Escola de Polícia Valkyrie - Em frente ao prédio principal"
41200-4 = "Estou aqui, em frente ao prédio principal da Escola de Polícia Valkyrie, onde circulam rumores sobre um escândalo de conluio com o Grupo Kaiser!"
41200-5 = "De acordo com informações de uma fonte anônima..."
41200-6 = "Parece que as alunas do Departamento de Segurança Pública receberam dinheiro e presentes do Grupo Kaiser e, em troca, abusaram de sua autoridade!"
41200-7 = "É uma informação bastante chocante que a Valkyrie, que deveria proteger os cidadãos e defender a justiça, tenha se aliado a uma empresa privada!"
41200-8 = "Além disso, recebemos informações de que, recentemente, um grupo misterioso invadiu a Escola de Polícia Valkyrie e destruiu parte das instalações."
41200-9 = "Incidentes que abalam a autoridade da Valkyrie estão ocorrendo um atrás do outro!"
41200-10 = "Qual será a verdade por trás de tudo isso!?"
41200-11 = "Para esclarecer esses assuntos, nós vamos...!"
41200-17 = "\\"
41200-18 = "……Que barulheira é essa?"
41200-19 = "Ah, é a Chefe do Departamento de Segurança Pública, Kanna!"
41200-20 = "De repente, poderia nos dar uma palavra sobre o caso dos subornos ilegais!?"
41200-21 = "Espere, de onde você tirou essa informação..."
41200-22 = "Para começar, vocês estão em propriedade privada. Conseguiram permissão?"
41200-23 = "Opa, parece que a mídia e o poder estão destinados a colidir! Mas nós da Chronos nunca..."
41200-28 = "Já chega, caiam fora daqui agora!"
41200-30 = "Parque dos Coelhinhos"
41200-31 = "……Isso virou uma notícia enorme."
41200-32 = "É, pois é. Essa notícia não sai do ar desde cedo..."
41200-33 = "S-se o Departamento de Segurança Pública vier nos atacar por causa disso, o que a gente faz...?"
41200-35 = "Não tem nada a ver com a gente. Nós só fizemos o que precisava ser feito."
41200-36 = "Além disso, de qualquer forma, eles têm muita coisa para lidar agora, incluindo a Chronos. Não devem ter tempo para se preocupar com a gente."
41200-37 = "É, pode ser, mas tem algo que me incomoda..."
41200-38 = "Como assim?"
41200-39 = "Não sei, a resposta deles foi rápida demais."
41200-40 = "O Conselho Estudantil Geral organizou uma equipe de investigação, e a Kaiser desistiu do projeto de reurbanização de uma vez, mesmo tendo gastado tanto dinheiro..."
41200-41 = "……Sensei, você por acaso ameaçou o Conselho Estudantil Geral?"
41200-42 = "[s1] \"Não, nada de ameaças...\"\n[s2] \"……Parece que há muitas circunstâncias complexas envolvidas.\""
41200-48 = "……? De qualquer forma, estou aliviada."
41200-49 = "Se a reurbanização for cancelada, não precisaremos expulsar os nômades..."
41200-50 = "……E nós também poderemos continuar aqui."
41200-52 = "Ah, sobre isso..."
41200-61 = "Uau, invasores."
41200-62 = "Saki, me dá uma granada."
41200-63 = "Para um treino matinal, uma explosão leve."
41200-64 = "Espera, espera, espera! Não é uma invasão, viemos cumprimentar vocês!"
41200-65 = "……Cumprimentar?"
41200-66 = "Ah, li sobre isso em um livro antigo. Aquele tipo de \"cumprimento\" que vem acompanhado de balas de chumbo e explosivos..."
41200-67 = "É por isso que vocês são uns fora da lei!!!"
41200-68 = "Ah, droga. Mas, como vocês nos ajudaram, não posso simplesmente não dizer nada..."
41200-72 = "……Nós fomos salvas por vocês."
41200-74 = "Pelo que parece, vocês se infiltraram na Valkyrie sem medo do perigo e expuseram a conspiração delas."
41200-75 = "Graças a isso, nosso santuário... a Cidade dos Coelhinhos, não corre mais perigo, e os companheiros da \"Felicidade Cotidiana\" estão voltando."
41200-76 = "Talvez vocês não tenham feito isso por nós. Mas, como buscadoras da verdade, não podemos ignorar um favor recebido..."
41200-77 = "Viemos trazer uma comida especial como presente para vocês."
41200-83 = "Comida especial!? O que é isso!?"
41200-84 = "……Não vai ser marmita de broto de feijão, né?"
41200-85 = "Não, claro que não. É a coisa mais valiosa que temos. Aqui está..."
41200-86 = "São ossos de frango fritos,"
41200-88 = "é um frango frito!"
41200-95 = "……Frango frito, é?"
41200-96 = "Sim. Diferente do frango frito comum, como são apenas os \"ossos de frango\" fritos, não dá para comer diretamente."
41200-97 = "Mas o aroma é exatamente o de um frango frito comum. Ao saborear esse cheiro ao máximo, você tem a sensação de estar comendo algo delicioso, mas com zero calorias. É um ingrediente verdadeiramente revolucionário."
41200-98 = "Com isso aqui, dá para beber 3 latas de cerveja! E, claro, combina perfeitamente com arroz."
41200-99 = "Vamos, aproveite à vontade."
41200-105 = "E-em outras palavras, isso não é \"frango frito\" e sim..."
41200-106 = "……Lixo orgânico?"
41200-107 = "L-lixo orgânico!? Está enganado, é um frango frito legítimo! Só as partes que são diferentes!"
41200-108 = "Chamar algo que ainda pode ser muito bem aproveitado de \"lixo orgânico\" é uma falta de educação tremenda!"
41200-110 = "Bom, tecnicamente não é lixo orgânico."
41200-111 = "De acordo com as normas de coleta de lixo daqui, ossos de frango são classificados como \"lixo inflamável\"."
41200-117 = "D-desde agora pouco, só falam em lixo orgânico, lixo inflamável..."
41200-118 = "Diante de uma comida tão preciosa, que tipo de absurdo é esse...!"
41200-119 = "Como eu suspeitava, nós da \"Shokakuko\" somos incompatíveis com vocês!"
41200-120 = "Essa frase é nossa!"
41200-124 = "Moe, traga todas as granadas que tiver!"
41200-126 = "Beleza, vamos fazer uma explosão daquelas!"
41200-138 = "……De novo isso."
41200-142 = "Sala de Defesa - Escritório"
41200-146 = "……Como esperado, acabou assim mesmo."
41200-147 = "A Valkyrie não parece que vai conseguir se mover por um tempo, e a Chronos também parece ser persistente……."
41200-148 = "Como sempre, não tenho sorte com as pessoas……."
41200-149 = "……Eu já ouvi isso antes."
41200-150 = "Fufu…… Dito isso, parece que não descobriram nada sobre a Kaiser e o nosso lado……."
41200-151 = "O plano não parece ter sido prejudicado."
41200-152 = "Se você tem tempo para se preocupar com isso, não deveria usar esse tempo para aumentar o número de aliados em quem pode confiar?"
41200-153 = "Aliados em quem confiar, é……."
41200-159 = "Falando nisso, suas veteranas…… parecem ser bem competentes, não?"
41200-160 = "Como dizem, quem é bom, é bom em qualquer lugar. Falta experiência, mas não é à toa que entraram para a SRT."
41200-165 = "Para mim, ainda são imaturas demais para carregar o nome da SRT."
41200-166 = "A Yukino-chan é muito rigorosa, hein."
41200-167 = "A Niko que é mole demais."
41200-168 = "Se fosse eu, teria escapado em um minuto sem disparar o alarme."
41200-173 = "Bem, elas ainda estão no primeiro ano. É cruel esperar o mesmo desempenho de veteranas como vocês."
41200-174 = "Dito isso, é verdade…… seria um desperdício não usá-las."
41200-175 = "Que tal incluí-las também no nosso plano de \"golpe de estado\"?"
41200-177 = "O que acha, como veterana? Pessoal do \"FOX Squad\", da Academia Especial SRT?"
41200-180 = "Bom, acho que não tem problema."
41200-181 = "Já que chegamos a esse ponto, elas precisam compensar de alguma forma."
41200-182 = "Eu não queria sujar as mãos das nossas queridas veteranas, mas…… não tem jeito, né?"
41200-183 = "……Já que entraram para a SRT, elas deveriam estar preparadas desde o início."
41200-185 = "Tudo pela ressurreição da SRT. E então――"
41200-189 = "Pela erradicação do Schale."
41200-192 = "Capítulo do Coelho de Carbanog; Continua no Capítulo 2"
