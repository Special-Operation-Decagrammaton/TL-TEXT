[translation]
41200-1 = "Episódio 20: Toca da Raposa"
41200-2 = "Em frente à sede da Academia Valkyrie"
41200-4 = "Estou agora em frente à sede da Academia Valkyrie, onde há boatos de conluio com o Grupo Kaiser!"
41200-5 = "De acordo com informações de uma fonte anônima…"
41200-6 = "Aparentemente, alunas do Bureau teriam recebido dinheiro e presentes do Grupo Kaiser em troca de usar seu poder!"
41200-7 = "É uma informação chocante que a Valkyrie, que deveria proteger os cidadãos e a justiça, estivesse de mãos dadas com uma empresa privada!"
41200-8 = "Além disso, há relatos de que um grupo misterioso invadiu a sede da Valkyrie outro dia e destruiu parte das instalações."
41200-9 = "Incidentes que abalam a autoridade da Valkyrie estão acontecendo em sequência!"
41200-10 = "Qual será a verdade?!"
41200-11 = "Para esclarecer esses casos, nós…!"
41200-17 = "\\"
41200-18 = "…Que confusão é essa?"
41200-19 = "Ah, Chefe do Bureau Kanna!"
41200-20 = "De repente, poderia nos dar uma declaração sobre o caso da propina?"
41200-21 = "Esperem, de onde tiraram essa informação…"
41200-22 = "Aliás, isso é propriedade privada. Têm permissão?"
41200-23 = "Opa, então é o destino que a imprensa e o poder colidam! Mas nós, da Kronos, jamais――"
41200-28 = "Cala boca e sai daqui!"
41200-30 = "Parque dos Coelhinhos"
41200-31 = "…Está em todos os noticiários."
41200-32 = "É… desde cedo só fala disso…"
41200-33 = "S-se o Bureau atacar agora, o que faremos…?"
41200-35 = "Não tem nada a ver. Só fizemos o que tínhamos que fazer."
41200-36 = "E de qualquer forma, eles devem estar ocupados com a Kronos e outras coisas. Não devem ter tempo para a gente."
41200-37 = "É verdade, mas ainda assim, me incomoda…"
41200-38 = "Como assim?"
41200-39 = "A reação foi muito rápida."
41200-40 = "O Conselho montou uma equipe de investigação, a Kaiser anunciou o cancelamento da revitalização de uma vez, mesmo com os custos…"
41200-41 = "…Professor, o senhor ameaçou o Conselho?"
41200-42 = "[s1] \"Não, não ameacei…\"\n[s2] \"…Parece que há coisas complicadas.\""
41200-48 = "…? De qualquer forma, que alívio."
41200-49 = "Com o cancelamento da revitalização, não vão mais expulsar os andarilhos…"
41200-50 = "…Nós também podemos ficar."
41200-52 = "Ah, isso…"
41200-61 = "Uau, intruso."
41200-62 = "Saki, me dá uma granada."
41200-63 = "Só um tiro de leve, para aquecer."
41200-64 = "Espera aí! Não é intrusão, viemos fazer uma visita!"
41200-65 = "…Visita?"
41200-66 = "Ah, li num livro antigo: 'É só uma visitinha!' enquanto metiam bala e explosivos…"
41200-67 = "É por isso que bandidos são f*didos!!!"
41200-68 = "Ah, que droga. Mas como nos ajudaram, não posso ficar calada…"
41200-72 = "…Vocês nos ajudaram."
41200-74 = "Aparentemente, arriscaram suas vidas para invadir a Valkyrie e expor a conspiração."
41200-75 = "Graças a isso, nosso local sagrado… a Vila dos Coelhinhos não foi ameaçada, e os membros da 'FeliSem' estão voltando."
41200-76 = "Talvez não tenha sido por nós. Mas recebemos um favor, e como buscadores da verdade, não podemos ignorar…"
41200-77 = "Viemos presentear vocês com uma comida especial."
41200-83 = "Comida especial?! O quê?!"
41200-84 = "…Não me diga que é bentô de broto de feijão?"
41200-85 = "Que nada, nada disso. É o mais valioso que temos. Aqui está…"
41200-86 = "Osso de frango frito,"
41200-88 = "Karaague!"
41200-95 = "…Karaague?"
41200-96 = "Sim. Diferente do karaague comum, é osso de frango frito, então não se pode comer."
41200-97 = "Mas o cheiro é igual ao do karaague. Ao saborear esse aroma, você sente alegria, mas com zero calorias. É um alimento revolucionário."
41200-98 = "Com um desses, dá para beber três latas de cerveja! E combina perfeitamente com arroz."
41200-99 = "Aí, apreciem à vontade."
41200-105 = "Q-quer dizer, isso não é 'karaague'…"
41200-106 = "…É lixo?"
41200-107 = "L-Lixo?! Não é, é karaague legítimo! Só que é outra parte!"
41200-108 = "Chamar algo perfeitamente aproveitável de 'lixo' é um absurdo!"
41200-110 = "Bem, não é lixo, não."
41200-111 = "Pelas regras de descarte daqui, osso de frango é 'lixo combustível'."
41200-117 = "V-vocês ficam falando em lixo e lixo combustível…"
41200-118 = "Diante de uma comida tão valiosa, como podem…!"
41200-119 = "Afinal, nós, da 'FeliSem', não nos damos com vocês!"
41200-120 = "É o que eu ia dizer!"
41200-124 = "Moe, traz todas as granadas!"
41200-126 = "Beleza, vamos detonar tudo!"
41200-138 = "…De novo isso."
41200-142 = "Escritório de Defesa"
41200-146 = "…Então, era isso."
41200-147 = "A Valkyrie não vai se mexer por um tempo. A Kronos também deve ser persistente…"
41200-148 = "Realmente, não tenho sorte com pessoal…"
41200-149 = "…Você já disse isso antes."
41200-150 = "Fufu… mas parece que não descobriram nosso lado com a Kaiser…"
41200-151 = "O plano não deve ser prejudicado."
41200-152 = "Em vez de se preocupar com isso, não seria melhor gastar tempo aumentando seus aliados de confiança?"
41200-153 = "Aliados de confiança, hein…"
41200-159 = "Falando nisso, suas kouhais… parecem boas."
41200-160 = "Como diz o ditado: 'Até peixe podre tem sua utilidade'. Embora lhes falte experiência, não é à toa que passaram na SRT."
41200-165 = "Para mim, ainda são imaturas para se chamarem SRT."
41200-166 = "Yukino-chan é exigente."
41200-167 = "Niko é boazinha demais."
41200-168 = "Se fosse eu, teria escapado em 1 minuto sem disparar o alarme."
41200-173 = "Bem, elas são só calouras. Seria injusto esperar resultados como os de veteranas."
41200-174 = "Dito isso, seria um desperdício não usá-las."
41200-175 = "Que tal incluí-las em nosso plano de 'Golpe'?"
41200-177 = "O que acham, como seniores? Senhoras do Esquadrão FOX da SRT?"
41200-180 = "Bem, não seria ruim."
41200-181 = "Nesse caso, teremos que cobrar delas."
41200-182 = "Não queria sujar as mãos das kouhais fofas… mas fazer o quê?"
41200-183 = "…Quem entra na SRT já tem que estar preparada."
41200-185 = "Tudo pela restauração da SRT. E…"
41200-189 = "Pela extinção da Schale."
41200-192 = "Coelhos de Caerbannog: Continua no Capítulo 2"