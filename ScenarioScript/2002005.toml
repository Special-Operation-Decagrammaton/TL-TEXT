[translation]
2002005-1 = "天才ハッカーの反論"
2002005-9 = "（いつもと様子の違うヒマリから連絡をもらい、急いで隠れ家に向かった）"
2002005-15 = "[ns] \"ヒマリ！大丈夫！？\""
2002005-17 = "あら、先生。いらっしゃいましたか。"
2002005-21 = "[ns1] \"うん。あれ……何かあったんじゃ？\"\n[ns2] \"大変なことになったとか言ってなかった……？\""
2002005-24 = "ええ。"
2002005-25 = "大変なのは本当です、先生。"
2002005-26 = "私が落ち着いているように見えるのは……"
2002005-27 = "ミレニアム最高の天才清楚系病弱美少女ハッカーと呼ばれていますので、ポーカーフェイスが染みついてしまったからではないでしょうか？"
2002005-28 = "ああ、これも私が優秀すぎるせいですね。#n感情さえ心の奥底に隠してしまう悲劇の美少女……。"
2002005-29 = "なんて悲しいお話なのでしょうか……。"
2002005-33 = "[ns3] \"どう見ても大丈夫だよね！\"\n[ns4] \"何か話があるんじゃないの……？\""
2002005-36 = "今日も先生のご想像通り、教養を嗜みながら優雅に休息していたところ……とても衝撃的な発見をしてしまったのです。"
2002005-37 = "こちらをご覧ください。"
2002005-41 = "（そう言ってヒマリが開いて見せたのは、クロノス報道部が発行しているお馴染みのゴシップ誌だった）"
2002005-42 = "[s] \"ゴシップ！？さっき教養がどうとか言ってなかった！？\""
2002005-43 = "細かい事を気にしてはいけません。#n問題はこちらです。これを見て、私がどれだけ傷ついたことか。"
2002005-47 = "（ヒマリが指したのは、ゴシップ誌の特集ページだった。その内容は……）"
2002005-48 = "[ns5] \"「衝撃大特集！ミレニアムのハッカー集団・ヴェリタスを率いる謎の人物は――\"\n[ns6] \"ケチケチ性悪問題児だった！？」……？\""
2002005-51 = "[ns] \"……これがどうしたの？\""
2002005-52 = "ふふふっ……私のどこが「ケチ」で「性悪」な「問題児」なのでしょうか。"
2002005-53 = "どこからどう見ても、清楚で可憐な病弱美少女でしょう？"
2002005-54 = "[s] \"そ、そうだね……。\""
2002005-55 = "あら、少々反応が薄いですね。お疲れですか？"
2002005-56 = "……なるほど、そういうことでしたか。"
2002005-57 = "いつもそばにいる大切な存在に気付かなくては、知らず知らずのうちに失ってしまうものですよ……。"
2002005-58 = "どうか幸せの天才美少女をお忘れなく……。"
2002005-59 = "[s] \"ごめん、何を言ってるのか……。\""
2002005-60 = "良いですか？#n重要なのは、ここに書かれた内容が全て誹謗中傷に当たるということです。"
2002005-61 = "よくこんな記事が書けたものですね。#nそうやすやすと私の正体を掴めるとでも思っているのでしょうか。"
2002005-62 = "[s] \"それが原因じゃないの？\""
2002005-63 = "……正体を隠しているからこそ、ということですね？"
2002005-64 = "ふむ……"
2002005-65 = "つまり、考え方を変えれば良いのでしょう。"
2002005-66 = "はぁ、たしかに流石の天才美少女の私も、これは盲点でした。"
2002005-67 = "[s7] \"ゴシップ誌は、隠そうとすればするほど迫ってくるからね。\"\n[s8] \"正体を隠しているのに、知られたら困るよね。\""
2002005-70 = "あ、いえ……私を探るのは良いのです……。"
2002005-71 = "いざとなったら、隠蔽工作もお手の物ですから。"
2002005-72 = "[s] \"それじゃあ何が問題なの……？\""
2002005-76 = "こちらです。ヴェリタスの部長が犯した悪事について書かれているのです。"
2002005-80 = "（ヒマリが指したところを読むと、様々な憶測や疑惑が並べられていた）"
2002005-81 = "（ヴェリタスの部長は権力を乱用して、活動費の着服や横領をしている……）"
2002005-82 = "部費は公正かつ公平に、部員と使用しております。"
2002005-86 = "（ミレニアムで起きた様々なサイバー犯罪に関与している……）"
2002005-87 = "とんでもないデマです。むしろ私のおかげで、どれだけ多くのサイバー犯罪を抑制できているとお思いで？"
2002005-88 = "……具体的な数、ですか……？"
2002005-89 = "さあ、どうでしょう……。"
2002005-90 = "善行の数は覚えておくものではありませんよ。"
2002005-94 = "（歯磨き粉は出なくなったらはさみで分解して、最後の最後まで使う……）"
2002005-95 = "……あら？それは本当のことですが、それくらい皆さんもしているでしょう？"
2002005-96 = "新しい歯磨き粉を買いにいくのも手間ですからね。"
2002005-97 = "[s] \"うん、ヒマリの良いところだね。\""
2002005-101 = "（「5月失踪計画」に関与し、ミレニアムに大混乱をもたらした……）"
2002005-102 = "失礼ですね。"
2002005-103 = "……確かにあの事件は、少々首を突っ込みすぎてチーちゃんにも怒られてしまいましたが。"
2002005-104 = "[s] \"つまり本当のことなんだね！？\""
2002005-105 = "……とにかく、ここに書かれた内容のほとんどが事実無根ですから、陰湿な嫌がらせであるというのが私の結論です。"
2002005-106 = "私に不名誉な疑いがかかっているというのに、見過ごせるわけがないでしょう。"
2002005-107 = "これらは私一人の問題ではありませんので。"
2002005-108 = "ヴェリタスの信用に直結しますし、真実の冒涜に他なりません。#n私が皆さんに真実をお伝えしましょう。"
2002005-109 = "[s] \"そうだね……記事を取り下げさせる？\""
2002005-110 = "いえ。"
2002005-111 = "かの有名なクロノス報道部のことですから、外野の声など気にも留めないでしょう。"
2002005-118 = "ふふっ。ですから、ここは発想を転換するのです。"
2002005-123 = "（ヴェリタスの真実を伝えるために、紹介動画を撮ることになった）"
2002005-127 = "[ns] \"……本当にいいの？\""
2002005-128 = "ええ、もちろんです。"
2002005-129 = "真実を伝えるためには、他人が行動するのを待つのではなく、自ら動かなければなりません。"
2002005-130 = "ヴェリタスと特異現象捜査部の部長を務める私、[ruby=あけぼし]明星[/ruby]ヒマリがどれほど優秀なのか……。"
2002005-131 = "また、この優れた天才美少女ハッカーの善良な暮らしぶりや厚い人望……。"
2002005-132 = "それら全ての真実を正しく伝えるには、私自身で直接お話するのが最も適しているのではないでしょうか？"
2002005-133 = "[s] \"それって本人の口から語る事かな……。\""
2002005-135 = "[ns] \"でも正体を隠してるのに、動画を撮って大丈夫なの？\""
2002005-136 = "そこが問題になりますね。"
2002005-137 = "ですから、こうして先生に来ていただいたのです。"
2002005-138 = "あくまで正体を隠しながら私の正しい情報を伝えるために、ブレインストーミングを行いたいと思いまして。"
2002005-139 = "[s] \"ブレインストーミング……それじゃあ、ヒマリのアイデアは？\""
2002005-140 = "こちらはどうでしょうか。"
2002005-141 = "まずは可能な限り正体を隠すために、映像にモザイクをかけて、声はピッチとフォルマントを調整しましょう。"
2002005-142 = "[s] \"それだともしかしたら……。\""
2002005-143 = "では、撮影しましょう。"
2002005-146 = "（積極的なヒマリに合わせて、カメラを回した）"
2002005-153 = "（完成した最初の動画は……）"
2002005-156 = "[ns] \"顔はモザイクで判別不能だし、声は加工してガビガビだから……。\""
2002005-160 = "まるで全ての疑惑を認め、犯行を自白しているかのような映像に見えるのは、先生も同じのようですね。"
2002005-161 = "[s] \"つ、次！他の方法を考えてみよう！\""
2002005-164 = "（その後もヒマリといくつものアイデアを試してみることになった）"
2002005-167 = "やはり外見を隠すにしても、正体が特定できない範囲で最小限に抑えたいですね。"
2002005-168 = "まずは見た目でヴェリタスの部長としての威厳を伝えたいですから。"
2002005-169 = "[s] \"その両立は難しいんじゃないかな……？\""
2002005-170 = "あ、これは名案ではありませんか？"
2002005-171 = "このように黒い線で目の部分だけ隠すのはどうでしょう。"
2002005-172 = "え？それでは趣旨が異なるのですか……？"
2002005-173 = "うーん、難しいですね……。"
2002005-174 = "でしたら、別の方法を模索しましょうか。"
2002005-175 = "そうです、眼帯はどうでしょう？"
2002005-176 = "この部屋にはカバのような怪しい眼帯しかありませんが……。"
2002005-177 = "あら？これはカバではないのですか？#nカバ発言を取り消して……？なるほど、ペロロ様と呼ぶのですね。"
2002005-178 = "……ふふっ。思いの外、先生はこだわりが強いのですね。"
2002005-179 = "[s9] \"それをヒマリに言われるんだ……。\"\n[s10] \"目隠しだけじゃ足りないと思うよ。\""
2002005-182 = "ふむ……実際に考えてみると、なかなか難しいものですね。"
2002005-183 = "欲しいものを手に入れるためには、別の何かを諦めなければならないこのジレンマ。"
2002005-184 = "……まるで私たちの人生のようです。"
2002005-185 = "[s] \"そんなに壮大な話してたっけ！？\""
2002005-186 = "正体を隠しながらもヴェリタスの部長としての威厳を示しつつ、正確な情報を伝えるには……。"
2002005-187 = "それと欲を言えば、私自身をビジュアル的に引き立てるような演出を……。"
2002005-188 = "[s] \"……さらに要望が増えてない！？\""
2002005-192 = "あ……"
2002005-193 = "ふふっ。"
2002005-194 = "良いアイデアが浮かびました。"
2002005-196 = "顔を見せることはできませんが、背景で雰囲気を作って威厳を示せるようにしましょう。"
2002005-197 = "かといって、私の姿が映らないのは画面が寂しいので、シルエットを用意して……"
2002005-198 = "そうですね。せっかくですから、コードネームを名乗りましょうか。"
2002005-199 = "ふふふっ、面白くなってきました。ええ、アイデアが次々と浮かんできます。"
2002005-209 = "（試行錯誤の末に、ようやく一本の動画を完成させた）"
2002005-214 = "はい、これで完成です。"
2002005-218 = "[ns] \"これをどうやって送るの？\""
2002005-219 = "すでにメールで抗議の内容を添えて送信しましたが、無視されているようです。#n迷惑メール扱いでしょうか……。"
2002005-220 = "[s] \"もう送ってたんだ……別の方法は？\""
2002005-221 = "今度は無視できないように、確実な方法で攻めようと思います。"
2002005-227 = "クロノススクールのデータベースにアクセスして、直接アップロードするのです。"
2002005-231 = "[ns] \"いやいや、それって犯罪じゃないかな！？\""
2002005-232 = "……アップロードは完了しましたよ。"
2002005-233 = "この時間はクロノスのニュースが放送されているはずですので、反応を見てみましょうか。"
2002005-239 = "緊急速報です！たった今、情報が入ってきました！"
2002005-240 = "今から5分ほど前、クロノススクールのネットワークに謎の侵入者の痕跡があったそうです！"
2002005-241 = "侵入者の足取りは掴めていませんが、クロノススクール側はこれを極めて重大な事件と見なし――"
2002005-245 = "はい？犯人が残していった映像があると？"
2002005-246 = "どうやら追加の情報です！さっそくこちらの映像をご覧ください！"
2002005-252 = "あ、あー、クロノススクールの皆さん、こんにちは。"
2002005-253 = "私はミレニアム最高の天才清楚系病弱美少女ハッカーであり、雲の上に咲く一輪の花と――"
2002005-255 = "はい？そのような話をしてはいけない……？#nいえ、ですが自己紹介はきちんと……。"
2002005-256 = "そうですね。まずは名を名乗りましょうか。"
2002005-257 = "あ……ええと、コードネームですね。"
2002005-262 = "コホン……私はH、コードネームはHです。"
2002005-263 = "私がこのような映像を送る理由は、日頃クロノス報道部の不適切な報道に我慢ならないため、真実をお伝えしたいと思い――"
2002005-266 = "視聴者の皆さん、ご覧になりましたか？#n先ほどクロノス報道部宛てに、「H」というコードネームを自称する者から映像が届きました！"
2002005-267 = "まるで重大な犯行予告を思わせるような内容に、クロノススクール側は本件を極めて重大な事件と判断しました！大至急、映像の分析を試みています！"
2002005-268 = "ですが皆さん、ご安心ください！"
2002005-269 = "クロノス報道部はどんな外圧にも屈しません！"
2002005-270 = "常に正確な報道を皆さんにお伝えすべく――"
2002005-276 = "[ns] \"ひ、ヒマリ……？\""
2002005-278 = "……。"
2002005-279 = "久しぶりに頭を使ったからか、少々疲れたようです。"
2002005-283 = "……ふふっ。先生、ご一緒にコーヒーでもいかがですか？"
2002005-284 = "[ns] \"見て見ぬふりでいいの！？\""
2002005-286 = "（その後、クロノススクールだけでなくキヴォトス全域に小さな波紋を起こしたヒマリに、ため息をつきながらお説教した）"
