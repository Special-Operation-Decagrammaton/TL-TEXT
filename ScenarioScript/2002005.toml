[translation]
2002005-1 = "A réplica da hacker genial"
2002005-9 = "（Recebi um contato da Himari agindo de forma diferente do habitual e fui apressado para o esconderijo）"
2002005-15 = "[ns] \"Himari! Você está bem!?\""
2002005-17 = "Ora, Sensei. Você chegou."
2002005-21 = "[ns1] \"Sim. Espera... aconteceu alguma coisa?\"\n[ns2] \"Você não disse que algo terrível tinha acontecido...?\""
2002005-24 = "Sim."
2002005-25 = "É verdade que algo terrível aconteceu, Sensei."
2002005-26 = "O fato de eu parecer calma é..."
2002005-27 = "Como sou chamada de a melhor, mais genial, pura e frágil bela hacker do Millennium, não seria porque a minha expressão impassível já se tornou um hábito?"
2002005-28 = "Ah, isso também é porque sou talentosa demais. #nUma bela garota trágica que esconde até mesmo suas emoções no fundo do coração..."
2002005-29 = "Que história triste, não é mesmo..."
2002005-33 = "[ns3] \"De qualquer jeito, você parece bem!\"\n[ns4] \"Você não tem algo para me contar...?\""
2002005-36 = "Hoje, como você imaginou, Sensei, eu estava descansando elegantemente enquanto cultivava meu intelecto... quando fiz uma descoberta muito chocante."
2002005-37 = "Dê uma olhada nisto."
2002005-41 = "（Dizendo isso, Himari abriu e mostrou uma revista de fofocas comum publicada pelo Departamento de Imprensa do Chronos）"
2002005-42 = "[s] \"Fofocas!? Você não acabou de dizer que estava cultivando seu intelecto!?\""
2002005-43 = "Não se preocupe com detalhes. #nO problema é este aqui. Veja só o quanto eu me senti ferida com isso."
2002005-47 = "（O que Himari apontou foi a página de destaque da revista de fofocas. O conteúdo era...）"
2002005-48 = "[ns5] \"'Grande reportagem chocante! Quem é a figura misteriosa que lidera o grupo de hackers do Millennium, Veritas?'\"\n[ns6] \"'Uma problemática mesquinha e de má índole!?'\"...?"
2002005-51 = "[ns] \"...O que tem isso?\""
2002005-52 = "Fufufu... Onde é que eu sou 'mesquinha' e uma 'problemática' de 'má índole'?"
2002005-53 = "Olhando de qualquer ângulo, eu sou uma bela garota frágil, pura e adorável, não sou?"
2002005-54 = "[s] \"É, é verdade...\""
2002005-55 = "Ora, sua reação está um pouco fraca. Está cansado?"
2002005-56 = "...Entendo, era isso então."
2002005-57 = "Se você não notar a presença preciosa que está sempre ao seu lado, acabará perdendo-a sem nem perceber..."
2002005-58 = "Por favor, não se esqueça da bela garota genial da felicidade..."
2002005-59 = "[s] \"Desculpe, não entendi o que você quis dizer...\""
2002005-60 = "Entendido? #nO importante é que o conteúdo escrito aqui se enquadra inteiramente em difamação."
2002005-61 = "Como puderam escrever um artigo desses? #nSerá que eles acham que podem descobrir minha verdadeira identidade tão facilmente?"
2002005-62 = "[s] \"Não é justamente por isso que você esconde?\""
2002005-63 = "...Então é justamente porque escondo minha identidade, é isso?"
2002005-64 = "Hum..."
2002005-65 = "Ou seja, basta mudar a forma de pensar."
2002005-66 = "Ah, de fato, até para mim, a genial bela garota, isso foi um ponto cego."
2002005-67 = "[s7] \"Revistas de fofocas se aproximam quanto mais você tenta esconder, né.\"\n[s8] \"Mesmo escondendo sua identidade, é um problema se descobrirem, né.\""
2002005-70 = "Ah, não... não me importo que me investiguem..."
2002005-71 = "Se for preciso, o trabalho de encobrimento é algo que faço com facilidade."
2002005-72 = "[s] \"Então qual é o problema...?\""
2002005-76 = "É isto aqui. Está escrito sobre as maldades cometidas pela presidente do Veritas."
2002005-80 = "（Ao ler o que Himari apontou, vi várias especulações e suspeitas listadas）"
2002005-81 = "（A presidente do Veritas abusa de seu poder para desviar e apropriar-se de fundos de atividades...）"
2002005-82 = "O orçamento do clube é usado de forma justa e imparcial com os membros."
2002005-86 = "（Envolvida em vários crimes cibernéticos ocorridos no Millennium...）"
2002005-87 = "Que calúnia absurda. Na verdade, quantos crimes cibernéticos você acha que consegui impedir graças a mim?"
2002005-88 = "...Um número concreto, você diz...?"
2002005-89 = "Bem, quem sabe..."
2002005-90 = "Não se deve ficar contando o número de boas ações."
2002005-94 = "（Quando a pasta de dente acaba, corta o tubo com uma tesoura para usar até o último restinho...）"
2002005-95 = "...Ora? Isso é verdade, mas todos fazem isso, não fazem?"
2002005-96 = "Ir comprar pasta de dente nova também dá trabalho, afinal."
2002005-97 = "[s] \"Sim, essa é uma das qualidades da Himari.\""
2002005-101 = "（Envolvida no \"Plano de Desaparecimento de Maio\", que causou um grande caos no Millennium...）"
2002005-102 = "Que falta de educação."
2002005-103 = "……É verdade que, naquele incidente, eu me intrometi um pouco demais e acabei levando uma bronca da Chi-chan."
2002005-104 = "[s] \"Então é verdade, não é!?\""
2002005-105 = "……De qualquer forma, a maior parte do que está escrito aqui é infundada, então minha conclusão é que se trata de um assédio insidioso."
2002005-106 = "Não posso simplesmente ignorar o fato de que suspeitas desonrosas estão sendo lançadas sobre mim."
2002005-107 = "Essas coisas não são apenas um problema meu."
2002005-108 = "Isso afeta diretamente a credibilidade da Veritas e não passa de uma profanação da verdade. #nEu mesma contarei a verdade a todos vocês."
2002005-109 = "[s] \"Entendo... quer que eles retirem o artigo?\""
2002005-110 = "Não."
2002005-111 = "Tratando-se do famoso Departamento de Imprensa de Chronos, eles provavelmente nem ligariam para as vozes externas."
2002005-118 = "Fufu. Por isso, vamos mudar a perspectiva."
2002005-123 = "（Para transmitir a verdade sobre a Veritas, decidimos gravar um vídeo de apresentação）"
2002005-127 = "[ns] \"……Tem certeza disso?\""
2002005-128 = "Sim, com certeza."
2002005-129 = "Para transmitir a verdade, não devemos esperar que os outros ajam, devemos agir por conta própria."
2002005-130 = "O quão talentosa eu sou, Himari Akeboshi, a diretora da Veritas e do Departamento de Investigação de Fenômenos Estranhos……"
2002005-131 = "Além disso, o estilo de vida bondoso e o grande prestígio desta genial e bela hacker……"
2002005-132 = "Para transmitir corretamente toda essa verdade, não seria mais adequado que eu mesma falasse diretamente?"
2002005-133 = "[s] \"Será que isso deveria ser dito pela própria pessoa…….\""
2002005-135 = "[ns] \"Mas você não está escondendo sua identidade? Tudo bem gravar um vídeo?\""
2002005-136 = "Esse é o problema, de fato."
2002005-137 = "É por isso que pedi para o Sensei vir aqui."
2002005-138 = "Quero fazer um brainstorming para transmitir as informações corretas sobre mim, mantendo minha identidade oculta."
2002005-139 = "[s] \"Brainstorming…… então, qual é a ideia da Himari?\""
2002005-140 = "Que tal isto?"
2002005-141 = "Primeiro, para esconder minha identidade o máximo possível, vamos colocar um mosaico na imagem e ajustar o tom e o formante da voz."
2002005-142 = "[s] \"Se fizermos isso, talvez…….\""
2002005-143 = "Então, vamos gravar."
2002005-146 = "（Acompanhando a proatividade da Himari, liguei a câmera）"
2002005-153 = "（O primeiro vídeo finalizado foi……）"
2002005-156 = "[ns] \"O rosto está irreconhecível por causa do mosaico e a voz está distorcida por causa da edição…….\""
2002005-160 = "Parece que o Sensei também concorda que o vídeo parece uma confissão de culpa, admitindo todas as suspeitas."
2002005-161 = "[s] \"P-próximo! Vamos pensar em outro método!\""
2002005-164 = "（Depois disso, continuei tentando várias ideias com a Himari）"
2002005-167 = "Mesmo querendo esconder a aparência, quero manter isso no mínimo necessário para que minha identidade não seja revelada."
2002005-168 = "Afinal, quero transmitir a dignidade de ser a diretora da Veritas através da minha aparência."
2002005-169 = "[s] \"Não acha que é difícil conciliar as duas coisas……?\""
2002005-170 = "Ah, isso não é uma ótima ideia?"
2002005-171 = "Que tal esconder apenas a parte dos olhos com uma faixa preta assim?"
2002005-172 = "Eh? Então o propósito é diferente……?"
2002005-173 = "Hmm, é difícil……."
2002005-174 = "Sendo assim, vamos procurar outro método."
2002005-175 = "Isso, que tal um tapa-olho?"
2002005-176 = "Nesta sala só tem esse tapa-olho estranho que parece um hipopótamo……."
2002005-177 = "Oh? Isso não é um hipopótamo? #nRetiro o que disse sobre ser um hipopótamo……? Entendo, chama-se Peroro-sama."
2002005-178 = "……Fufu. O Sensei é mais exigente do que eu pensava."
2002005-179 = "[s9] \"Logo a Himari dizendo isso…….\"\n[s10] \"Acho que só cobrir os olhos não é o suficiente.\""
2002005-182 = "Hum... pensando bem, é algo bastante difícil."
2002005-183 = "Esse dilema de ter que abrir mão de algo para conseguir o que se deseja."
2002005-184 = "…É quase como a nossa vida."
2002005-185 = "[s] \"A gente estava falando de algo tão profundo assim!?\""
2002005-186 = "Para transmitir informações precisas enquanto mantenho minha identidade oculta e demonstro a dignidade de uma presidente da Veritas..."
2002005-187 = "E, se eu puder pedir mais, uma produção que realce o meu visual..."
2002005-188 = "[s] \"...Não aumentou ainda mais as exigências!?\""
2002005-192 = "Ah..."
2002005-193 = "Fufu."
2002005-194 = "Tive uma boa ideia."
2002005-196 = "Não posso mostrar meu rosto, mas vamos criar uma atmosfera no fundo para demonstrar dignidade."
2002005-197 = "Por outro lado, a tela ficaria vazia sem a minha imagem, então vamos preparar uma silhueta..."
2002005-198 = "Isso mesmo. Já que estamos nisso, vamos usar um codinome."
2002005-199 = "Fufufu, está ficando interessante. Sim, as ideias estão surgindo uma atrás da outra."
2002005-209 = "(Após muitas tentativas e erros, finalmente terminei o vídeo)"
2002005-214 = "Sim, está pronto."
2002005-218 = "[ns] \"Como você vai enviar isso?\""
2002005-219 = "Já enviei por e-mail com o conteúdo do protesto, mas parece que fui ignorada. #nSerá que caiu na caixa de spam...?"
2002005-220 = "[s] \"Você já tinha enviado... Algum outro método?\""
2002005-221 = "Desta vez, vou atacar de uma forma infalível para que não possam ignorar."
2002005-227 = "Vou acessar o banco de dados da Escola Kronos e fazer o upload diretamente."
2002005-231 = "[ns] \"Não, não, isso não é crime!?\""
2002005-232 = "...O upload foi concluído."
2002005-233 = "A esta hora, o noticiário da Kronos deve estar passando, vamos ver a reação deles."
2002005-239 = "Plantão urgente! Acabamos de receber uma informação!"
2002005-240 = "Há cerca de 5 minutos, houve vestígios de um invasor misterioso na rede da Escola Kronos!"
2002005-241 = "Ainda não rastreamos o invasor, mas a Escola Kronos considera este um incidente extremamente grave—"
2002005-245 = "Sim? Dizem que há um vídeo deixado pelo criminoso?"
2002005-246 = "Parece que temos informações adicionais! Vamos conferir este vídeo agora mesmo!"
2002005-252 = "Ah, ah... Olá, pessoal da Escola Kronos."
2002005-253 = "Eu sou a hacker mais genial, pura e frágil de Millennium, a flor que desabrocha acima das nuvens e—"
2002005-255 = "Sim? Não devo falar essas coisas...? #nNão, mas a apresentação pessoal deve ser feita corretamente..."
2002005-256 = "Isso mesmo. Primeiro, vamos dizer o nome."
2002005-257 = "Ah... bem, o codinome, no caso."
2002005-262 = "Cof, cof... Eu sou H, meu codinome é H."
2002005-263 = "O motivo de eu enviar este vídeo é que não suporto mais as reportagens inadequadas do Departamento de Notícias da Kronos, e quero transmitir a verdade—"
2002005-266 = "Espectadores, vocês viram isso? #nAcabamos de receber um vídeo enviado para o Departamento de Notícias da Kronos por alguém que se autodenomina \"H\"!"
2002005-267 = "Com um conteúdo que parece um grave aviso de crime, a Escola Kronos julgou este caso como um incidente extremamente sério! Estamos tentando analisar o vídeo com urgência!"
2002005-268 = "Mas, pessoal, não se preocupem!"
2002005-269 = "O Departamento de Notícias da Kronos não se curva a nenhuma pressão externa!"
2002005-270 = "Para sempre levar a notícia precisa a todos vocês—"
2002005-276 = "[ns] \"Hi-Himari...?\""
2002005-278 = "..."
2002005-279 = "Talvez por ter usado o cérebro depois de tanto tempo, estou um pouco cansada."
2002005-283 = "...Fufu. Sensei, gostaria de tomar um café comigo?"
2002005-284 = "[ns] \"Você acha que pode simplesmente fingir que nada aconteceu!?\""
2002005-286 = "(Depois disso, dei uma bronca em Himari, que causou uma pequena onda de choque não só na Escola Kronos, mas em todo o Kivotos, enquanto suspirava)"
