[translation]
1011808-1 = "意外な一面？"
1011808-2 = "（鉄道工事の予定地に同行することになった）"
1011808-4 = "グッモーニン～！"
1011808-5 = "[s] \"おはよう、ノゾミ。\""
1011808-6 = "来てくれて助かったー！パヒャヒャッ。"
1011808-7 = "欠員が出て、一人になっちゃってさ。"
1011808-8 = "でも、ぼっちじゃつまんないじゃん？"
1011808-9 = "[s1] \"ふふっ。\"\n[s2] \"私も暇してたところ。\""
1011808-12 = "パヒャッ！良いね良いねぇ！"
1011808-13 = "じゃ、たくさん遊ぼ……"
1011808-14 = "……じゃなくて！調査にゴー！"
1011808-15 = "[s] \"今本音が出たような……。\""
1011808-17 = "はい、ここが最初の現場。"
1011808-18 = "[s] \"どこを確認すればいいの？\""
1011808-19 = "報告書の内容と、現場が一致してるかどうかだねー。"
1011808-20 = "線路を敷くときは、そこがほんとに工事予算を投じるに値する場所なのか、CCCが現地調査をしなきゃいけないんだよ。"
1011808-21 = "今回のケースは、一次調査で開通可能判定をもらったとこで――"
1011808-22 = "急行が通ってD.U.と繋がれば、従来よりもスムーズな資源輸送が実現するから、メリットが大きい……って感じかな。"
1011808-23 = "[s] \"ノゾミ……。\""
1011808-24 = "ん？なに？"
1011808-25 = "[s] \"しっかり把握しててすごい！\""
1011808-26 = "フッ……ま、このくらいはね？"
1011808-27 = "……。"
1011808-28 = "……ぷっ。"
1011808-29 = "くくっ……パヒャヒャヒャッ！"
1011808-33 = "先生はおバカさんだなー。"
1011808-34 = "私がテキパキ仕事してるって信じてたっしょ。"
1011808-35 = "報告書をてきとーに読み上げただけなのにねー……パヒャヒャッ！"
1011808-36 = "[s] \"し、信じてたのに！\""
1011808-37 = "ふっふっふ……私は運転だけできればいいからね！"
1011808-38 = "……でも、上にはそれっぽく話さなきゃいけないからさ。"
1011808-39 = "こうやって小難しいことを言わなきゃいけない時があるってこと。"
1011808-40 = "今日の現地調査も、張り切んなくていいからね？"
1011808-41 = "[s3] \"い、いいの？\"\n[s4] \"なんか重要そうだけど……！？\""
1011808-44 = "どうせ、こっちの意見は通らないしねー。"
1011808-45 = "うちは派閥が多いから、どっかが反対するんだよ。ああ言えばこう言うって感じ。"
1011808-46 = "だから、いい感じに調査報告を上げれば、私の仕事は終わり。"
1011808-47 = "[s] \"いいのかな……。\""
1011808-48 = "なんだかんだ、それで現場はちゃんと回ってるしね。"
1011808-49 = "みんな真面目に頑張って整備したり運行してくれてるおかげで、今まで大事故もなかったし。"
1011808-50 = "自分の仕事を全力で頑張ればいい……んだけど。"
1011808-51 = "もうさー、いいからキヴォトス中に線路敷いちゃえばいいんじゃない？"
1011808-52 = "鉄道があれば、どこでも一瞬で行けるんだし。"
1011808-53 = "家からラーメン屋までの鉄道とか、みんな使うでしょ！？"
1011808-57 = "「それはちょっと……」って顔してる！パヒャヒャッ。"
1011808-58 = "……にしても、先生も私と似たような立場じゃない？"
1011808-59 = "[s] \"どういうこと？\""
1011808-60 = "シャーレもあっちこっち相談に乗ったり、調査したりするじゃん？"
1011808-61 = "全部の学校に気を遣うとか、超大変そー。"
1011808-62 = "[s5] \"みんなの話を聞いてあげるのが、私の役割だからね。\"\n[s6] \"大変とかは、あまり考えてないかな？\""
1011808-65 = "ふ～ん。"
1011808-66 = "じゃ、どんな生徒にも平等に接してるんだ？"
1011808-67 = "[s] \"うん、そうだね。\""
1011808-71 = "なにそれ。"
1011808-72 = "先生らしいっちゃらしいけどさ！パヒャヒャ！"
1011808-73 = "[s7] \"上手くできているかは分からないけどね。\"\n[s8] \"私は素人の先生だし！\""
1011808-79 = "[ns9] \"でも、今は目の前にいるノゾミを……\"\n[ns10] \"一番気にかけてるよ。\""
1011808-82 = "えー！ほんとに～？"
1011808-83 = "ま、素人さんに嘘はつけなそうだしね！パヒャヒャッ！"
1011808-87 = "それならさ……"
1011808-92 = "今日は私に、全力で付き合わなきゃっしょ！"
1011808-94 = "（ノゾミに連れられて現場を見て回った）"
1011808-102 = "（言葉とは裏腹に、ノゾミは真面目な様子で仕事を頑張っていた）"
