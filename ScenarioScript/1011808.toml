[translation]
1011808-1 = "Um lado inesperado?"

1011808-2 = "(Decidi acompanhá-lo ao local planejado para a construção da ferrovia.)"

1011808-4 = "Bom dia!"

1011808-5 = "[s] \"Bom dia, Nozomi.\""

1011808-6 = "Obrigado por ter vindo! Pahyaahah."

1011808-7 = "Havia uma vaga e fiquei sozinho."

1011808-8 = "Mas não é chato quando você está sozinho?"

1011808-9 = "[s1] \"Hehe.\"\n[s2] \"Eu também estava entediado.\""

1011808-12 = "Pahya! Bom, bom!"

1011808-13 = "Pois então vamos brincar bastante..."

1011808-14 = "...Não! Vá investigar!"

1011808-15 = "[s] \"Sinto que meus verdadeiros sentimentos vieram à tona agora...\""

1011808-17 = "Sim, este é o primeiro site."

1011808-18 = "[s] \"Onde devo verificar?\""

1011808-19 = "A questão é se o conteúdo do relatório corresponde ao que aconteceu no local."

1011808-20 = "Ao instalar trilhos de trem, o CCC tem que realizar uma pesquisa no local para ver se realmente vale a pena gastar o orçamento de construção na área."

1011808-21 = "Neste caso, recebemos uma decisão de que poderia ser aberto na investigação primária, e..."

1011808-22 = "Se o trem expresso passasse e se conectasse com o DU, seria uma grande vantagem porque os recursos seriam transportados de forma mais tranquila do que antes."

1011808-23 = "[s] \"Nozomi...\""

1011808-24 = "sim? o que?"

1011808-25 = "[s] \"É incrível como você entende isso!\""

1011808-26 = "Hmm... bem, sobre isso?"

1011808-27 = "……."

1011808-28 = "...Pfft."

1011808-29 = "Kuku...pahyahyahyah!"

1011808-33 = "O professor é um idiota."

1011808-34 = "Você acreditou que eu estava trabalhando com eficiência."

1011808-35 = "Mesmo que eu tenha lido o relatório em voz alta... Pahyahyah!"

1011808-36 = "[s] \"Eu-eu acreditei em você!\""

1011808-37 = "Hehehehe...só preciso saber dirigir!"

1011808-38 = "...Mas eu tenho que falar sobre isso assim."

1011808-39 = "Há momentos em que você tem que dizer coisas difíceis como essa."

1011808-40 = "Você não precisa ficar muito animado com a pesquisa de campo de hoje, ok?"

1011808-41 = "[s3] \"T-Tem certeza?\"\n[s4] \"Parece importante...!?\""

1011808-44 = "De qualquer forma, não creio que minha opinião vá passar."

1011808-45 = "Temos muitas panelinhas, então alguém vai ser contra alguma coisa. Bem, isso é o que eu diria."

1011808-46 = "Assim, depois de enviar um bom relatório de pesquisa, meu trabalho estará concluído."

1011808-47 = "[s] \"Eu me pergunto se está tudo bem...\""

1011808-48 = "De alguma forma, é assim que as coisas funcionam no set."

1011808-49 = "Graças a todos que trabalharam diligentemente para manter e operar o trem, não houve acidentes graves até agora."

1011808-50 = "Tudo o que você precisa fazer é dar o seu melhor no seu trabalho... mas..."

1011808-51 = "Agora, por que não colocamos alguns trilhos de trem por toda Kivotos?"

1011808-52 = "Com os trens, você pode ir a qualquer lugar em um instante."

1011808-53 = "Todo mundo usa o trem de casa até a loja de ramen, certo? ?"

1011808-57 = "Ele parece “Isso é um pouco…”! Pahyaahah."

1011808-58 = "...Mas você não está em uma posição semelhante à minha?"

1011808-59 = "[s] \"O que você quer dizer?\""

1011808-60 = "Placa de Petri também consulta aqui e ali e pesquisa, né?"

1011808-61 = "Parece extremamente difícil prestar atenção a todas as escolas."

1011808-62 = "[s5] \"Meu papel é ouvir as histórias de todos.\"\n[s6] \"Você realmente não pensa em como isso é difícil, não é?\""

1011808-65 = "Hum."

1011808-66 = "Então, você trata todos os alunos igualmente?"

1011808-67 = "[s] \"Sim, isso mesmo.\""

1011808-71 = "O que é aquilo?"

1011808-72 = "Parece um professor! Pahyahya!"

1011808-73 = "[s7] \"Não sei se estou indo bem.\"\n[s8] \"Sou um professor amador!\""

1011808-79 = "[ns9] \"Mas agora, eu me preocupo com Nozomi que está bem na minha frente...\"\n[ns10] \"Eu me preocupo mais com ela.\""

1011808-82 = "Eh! Realmente?"

1011808-83 = "Bem, acho que você não pode mentir para um amador! Pahiahah!"

1011808-87 = "Bem, então..."

1011808-92 = "Você tem que dar tudo de si para mim hoje!"

1011808-94 = "(Nozomi me levou ao redor da cena)"

1011808-102 = "(Ao contrário de suas palavras, Nozomi parecia séria e trabalhava duro em seu trabalho.)"

