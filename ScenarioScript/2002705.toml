[translation]
2002705-1 = "Expectativa"
2002705-2 = "（Preocupado se ela estava sofrendo sozinha, decidi ir até o quarto da Shiroko, mas...）"
2002705-3 = "（Vi a silhueta da Shiroko parada no saguão）"
2002705-11 = "[ns1] \"……？\"\n[ns2] \"O que ela está fazendo...?\""
2002705-22 = "[ns] Seguir a Shiroko."
2002705-28 = "[ns]（…………？）"
2002705-30 = "[ns3] \"A Shiroko...\"\n[ns4] \"...desapareceu?\""
2002705-33 = "…………。"
2002705-44 = "……Hum."
2002705-46 = "[ns] \"！？\""
2002705-49 = "[ns5] \"Que susto...!\"\n[ns6] \"...Shiroko?\""
2002705-54 = "Ah..."
2002705-55 = "Desculpe, Sensei. Não era minha intenção te assustar."
2002705-56 = "Senti a presença de alguém e tentei me esconder, mas..."
2002705-57 = "Percebi que era você, Sensei."
2002705-58 = "……Hum. Para onde eu vou, você pergunta...?"
2002705-59 = "Bem... não tenho um destino certo. #nSó senti vontade de caminhar um pouco."
2002705-63 = "Bem... desculpe."
2002705-64 = "Na verdade... eu estava um pouco solitária e queria ver aquilo de novo."
2002705-65 = "……O mar."
2002705-66 = "[s7] \"O lugar onde vimos os fogos de artifício?\"\n[s8] \"O lugar onde fizemos o churrasco?\""
2002705-69 = "……Sim."
2002705-70 = "Pensei em chamar as outras... mas já está muito tarde."
2002705-71 = "Fiquei com medo de causar preocupação desnecessária..."
2002705-72 = "Mas... essa vista, não poderemos vê-la quando voltarmos, certo?"
2002705-73 = "Por isso, como eu não estava conseguindo dormir..."
2002705-74 = "[s] \"…………。\""
2002705-75 = "Pensei que, se eu visse mais uma vez, conseguiria dormir tranquila."
2002705-76 = "Então, só um pouquinho..."
2002705-80 = "……Será que não deveria ter saído a essa hora?"
2002705-81 = "[s9] \"Vamos juntos, Shiroko.\"\n[s10] \"Nesse caso, você precisa de uma companhia.\""
2002705-84 = "……! Você também vai vir, Sensei?"
2002705-85 = "……Sim, vamos."
2002705-89 = "……Então, por aqui."
2002705-97 = "……Chegamos."
2002705-101 = "Hum..."
2002705-102 = "[s11] \"O que houve?\"\n[s12] \"Você está com uma cara triste...\""
2002705-105 = "……Sim."
2002705-106 = "O mar... está diferente de como estava à tarde..."
2002705-107 = "……Será por causa da maré?"
2002705-108 = "Então, aquela paisagem de antes..."
2002705-109 = "Eu não poderei vê-la nunca mais, né?"
2002705-110 = "[s13] \"Mesmo no mesmo lugar, as coisas podem parecer diferentes.\"\n[s14] \"Mas paisagens ainda mais divertidas nos aguardam.\""
2002705-113 = "O que você quer dizer...?"
2002705-114 = "Que eu vou entender quando voltarmos...? #nMas não tem mar na escola..."
2002705-115 = "O que importa não é o mar...?"
2002705-116 = "Hum... é complicado, não entendo muito bem."
2002705-117 = "Então... é porque não tem fogos de artifício ou churrasco?"
2002705-118 = "……Isso também não é?"
2002705-119 = "O que será que é importante..."
2002705-120 = "[s15] \"Talvez tirar um tempo para pensar nisso também seja importante.\"\n[s16] \"Quando chegar a hora, com certeza você vai entender.\""
2002705-123 = "……Hmm."
2002705-124 = "Desculpe, Sensei. Acho que ainda é difícil para mim."
2002705-128 = "Mas……"
2002705-129 = "Talvez seja porque são palavras suas, Sensei."
2002705-130 = "Sinto que, algum dia, eu vou entender."
2002705-131 = "Com certeza."
2002705-132 = "……Sim, estou ansiosa por isso."
2002705-133 = "…………."
2002705-134 = "Obrigada. Fico feliz que pudemos conversar a sós hoje."
2002705-141 = "Sensei……"
2002705-143 = "Algum dia, vamos conferir as respostas juntos, está bem?"
