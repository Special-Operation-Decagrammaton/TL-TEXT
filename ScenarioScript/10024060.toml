[translation]
10024060-1 = "Episódio 6; Mente Aberta"
10024060-2 = "Ruas de Shanhaijing"
10024060-4 = "Ah, Sensei. Obrigado por pedir ajuda à Kokona-chan."
10024060-5 = "[s] \"Foi algo que eu mesma propus, afinal.\""
10024060-6 = "……."
10024060-7 = "Sensei, você acha que sacrifícios são inevitáveis em prol de uma causa maior?"
10024060-8 = "Que para alcançar um grande objetivo, sacrifícios são necessários...#nQue contanto que o resultado seja alcançado, tudo bem..."
10024060-9 = "Eu... honestamente, não sei dizer."
10024060-10 = "Mas, se for a Genryumon... eles provavelmente alcançariam o objetivo, mesmo que isso custasse sacrifícios."
10024060-11 = "Quando decidimos preparar a \"armadilha\" por sugestão sua...#nAcho que a Mina foi tão proativa justamente por pensar dessa forma."
10024060-12 = "[s1] \"Como você é presidente da associação comercial...\"\n[s2] \"Eu achava que a Rumi não tinha preocupações.\""
10024060-15 = "Haha. O que está dizendo, Sensei?"
10024060-16 = "Embora eu esteja atuando como presidente, algo que nem combina comigo, originalmente eu sou apenas uma cozinheira."
10024060-17 = "Por isso... sendo sincera, eu só queria cozinhar sem pensar em mais nada."
10024060-18 = "Cozinhar é algo honesto, não é?#nQuanto mais esforço você dedica, mais saboroso fica, e quanto mais você pesquisa, mais possibilidades de sabor se abrem."
10024060-19 = "Além disso, ao ver a reação dos clientes, dá para sentir que eles estão felizes."
10024060-20 = "No fim das contas, ser cozinheira é muito gratificante."
10024060-21 = "[s] \"E quanto ao trabalho como presidente...?\""
10024060-22 = "……."
10024060-23 = "Sensei, você é um adulto, então talvez entenda."
10024060-24 = "À medida que a responsabilidade aumenta, você se vê forçado a fazer \"escolhas\" que estão além do seu controle..."
10024060-25 = "E isso acaba afetando muitas pessoas, não é?"
10024060-26 = "Eu não sou mais talentosa do que as pessoas ao meu redor."
10024060-27 = "Mesmo assim... todos confiam em mim e contam comigo."
10024060-28 = "[s] \"Entendo...\""
10024060-29 = "Quando muitas pessoas se reúnem, acontecimentos inimagináveis acabam ocorrendo."
10024060-30 = "O impacto de cada indivíduo é pequeno, mas, com o tempo, isso se torna uma vontade coletiva maior."
10024060-31 = "O gatilho é algo realmente trivial.#nMas, aos poucos, isso se transforma em uma grande chama."
10024060-32 = "Como presidente, preciso resolver essas situações da melhor forma possível."
10024060-33 = "Mas, mesmo superando o dia de hoje, não sei o que acontecerá amanhã..."
10024060-34 = "É apenas um breve momento de descanso."
10024060-35 = "Chamar isso de gratificante é... difícil.#nSinto apenas um alívio por ter resolvido tudo sem problemas e por ter conseguido ajudar alguém."
10024060-36 = "[s] \"Você sempre se esforça muito por todos, não é?\""
10024060-37 = "Ahaha, não vou te dar nada só porque está me elogiando."
10024060-38 = "Será que você, Sensei, tem o hábito de elogiar as pessoas logo de cara para deixá-las animadas?"
10024060-39 = "Isso é perigoso.#nClaro, não acho que seja algo ruim, mas..."
10024060-40 = "Se você disser isso para qualquer um, vai acabar se metendo em problemas, sabia?"
10024060-41 = "[s] \"Isso é por experiência própria, Rumi?\""
10024060-42 = "Fufu, quem sabe?#nIsso é um segredo."
10024060-43 = "Não adianta me olhar assim, não vou contar.#nTodo mundo tem um ou dois segredos, não é?"
10024060-47 = "……É estranho.#nNunca tinha falado sobre esses sentimentos com ninguém antes."
10024060-48 = "[s] \"Se tiver algum problema, pode contar comigo a qualquer momento.\""
10024060-49 = "……."
10024060-50 = "Ei, Sensei."
10024060-55 = "Se você disser algo assim... eu vou acabar me iludindo, sabia?"
10024060-56 = "……Bem, já está na hora de irmos encontrar a Kokona-chan."
10024060-57 = "[s] \"Conto com você, Rumi.\""
10024060-58 = "Não se preocupe.#nPela honra da associação comercial, protegerei a segurança da Kokona-chan."
10024060-59 = "Bem, se for só para ela carregar uma caixa de papelão e nada acontecer, então termina por aí."
10024060-60 = "[s] \"Mas agora, isso é o que guarda a chave de tudo, não é?\""
10024060-61 = "Sim…… é isso mesmo. #nBem, já vou indo."
10024060-66 = "（Assim que as costas de Lumi desaparecem de vista……）"
10024060-70 = "（Uma aluna da Genryumon com uma aura misteriosa aparece）"
10024060-75 = "[ns3] \"Você é da Genryumon, né?\"\n[ns4] \"Está procurando a Mina?\""
10024060-78 = "E os outros?"
10024060-79 = "[s5] \"Eles têm algo para fazer, talvez não voltem tão cedo.\"\n[s6] \"Se tiver algum recado, eu posso ouvir.\""
10024060-85 = "Não…… se não há ninguém aqui, é até melhor."
10024060-91 = "Ufa, sair escondida dá um trabalho danado."
10024060-96 = "[ns] \"Kisaki!?\""
10024060-97 = "Por que está tão surpreso?"
10024060-98 = "Como líder da escola, vim apenas verificar como as coisas estão indo."
10024060-99 = "……Por que me dei ao trabalho de vir pessoalmente, você pergunta?"
10024060-100 = "Sentada em uma cadeira, há coisas que não se consegue enxergar."
10024060-101 = "Cada pessoa possui um ponto de vista diferente. #nPor isso, se não observarmos as coisas de várias perspectivas, às vezes acabamos cometendo erros de julgamento."
10024060-102 = "E então…… como estão as coisas? #nQuero ouvir o que você viu e sentiu."
10024060-108 = "（Expliquei a situação atual para Kisaki）"
10024060-111 = "Entendo…… compreendo perfeitamente."
10024060-112 = "Parece que meu julgamento estava correto."
10024060-113 = "A Mina é talentosa, mas ela se exalta muito facilmente."
10024060-114 = "[s] \"Então, você enviou a Mina para o Monte Kunlun por causa disso……\""
10024060-115 = "Ah, sim — não há dúvidas de que foi sob minhas ordens."
10024060-116 = "Eu não estava preocupada com a possibilidade de um conflito. #nNa verdade, não há problema algum, não é?"
10024060-117 = "A força da Mina é real, mas ela não seria capaz de enfrentar aquelas duas."
10024060-118 = "E não acho que a Lumi vá agir por conta própria."
10024060-119 = "Por isso, achei que o equilíbrio seria mantido."
10024060-120 = "Além disso…… eu acreditava que, contanto que você estivesse lá, nenhuma briga aconteceria."
10024060-121 = "O que acha da minha análise?"
10024060-125 = "[ns] \"Você pensou em tudo isso……\""
10024060-126 = "Se eu não conseguisse prever algo desse nível, não seria digna de ser a líder."
10024060-127 = "Embora eu não me apegue tanto ao cargo de líder……"
10024060-131 = "Não, isso foi um deslize da minha parte. #nEsqueça o que eu disse."
10024060-132 = "[s] \"O fato de termos acabado cooperando também estava nos seus planos?\""
10024060-133 = "Exatamente."
10024060-134 = "A Mina é honesta, mas sua imprudência é o seu maior defeito."
10024060-135 = "Existem coisas que só se compreendem vivenciando na pele."
10024060-136 = "Se ela expandir um pouco mais seus horizontes, talvez adquira uma visão mais flexível."
10024060-137 = "Você também tinha percebido isso? #nComo esperado, você tem um bom olho para as pessoas."
10024060-138 = "Ah, é verdade — depois que tudo isso terminar, por que não fica em Shanhaijing? #nSe tiver interesse, eu posso providenciar tudo."
10024060-139 = "[s] \"Obrigado, mas vou recusar a oferta.\""
10024060-140 = "Kufufu, entendo. Que pena."
10024060-141 = "A Lumi…… como sempre, as coisas não saem como eu espero com ela."
10024060-142 = "……Não, não me importo com isso. #nFufu, se ela começasse a me obedecer agora, eu ficaria até surpresa."
10024060-143 = "Acho que a Lumi também não espera nada de mim."
10024060-144 = "[s] \"Vocês se conhecem há muito tempo, né?\""
10024060-145 = "É apenas um relacionamento de longa data. #nHouve um tempo em que imaginei um futuro trabalhando ao lado da Lumi, mas……"
10024060-146 = "……Não, não é nada. #nPoderia fingir que não ouviu isso?"
10024060-147 = "[s] \"Então, depois de conversar comigo, você descobriu algo?\""
10024060-148 = "……"
10024060-149 = "É difícil decidir se devo compartilhar meus pensamentos aqui."
10024060-150 = "Bem…… como você disse, talvez seja para o bem da Lumi."
10024060-151 = "……fufu."
10024060-152 = "Isso é um segredo só para você."
10024060-153 = "Desde o início — a Genryumon não tem interesse na verdade por trás desse incidente."
10024060-154 = "Não há motivo para ficar tão surpreso. #nNão é só desta vez; as coisas costumam ser assim."
10024060-159 = "Se a Associação Genbu estivesse envolvida no contrabando de \"Ginseng Milenar\", a solução seria simples. #nEu poderia conter o alcance e a influência deles. Poderia até dissolvê-los."
10024060-163 = "Mas, mesmo que a Associação Genbu não esteja envolvida, isso não me incomoda nem um pouco. #nPois serve como um aviso de que a Genryumon está sempre de olho neles."
10024060-167 = "De qualquer forma... não é um mau negócio para a \"Genryumon\". #nNão concorda?"
10024060-170 = "[ns] \"Mas o que você pensa é diferente, não é, Kisaki?\""
10024060-173 = "— E qual seria a base para isso?"
10024060-174 = "[s] \"Porque você se deu ao trabalho de se disfarçar para vir até aqui.\""
10024060-175 = "Fufu... você realmente tem um bom olhar."
10024060-176 = "A Genryumon é... algo que pertence à \"Genryumon\"."
10024060-177 = "Mesmo sendo a líder, não posso agir contra o que a Genryumon representa."
10024060-178 = "[s] \"Eu vejo o quanto você se esforça, Kisaki.\""
10024060-182 = "…Será que estou me esforçando mesmo?"
10024060-183 = "Você diz isso para todo mundo, por acaso? ...Não, talvez seja justamente por ser assim que você consegue ser o Sensei do Schale."
10024060-184 = "Não estou brava, então não precisa se preocupar. #nVocê realmente acha que a líder da Genryumon se deixaria abalar por algo tão trivial?"
10024060-185 = "Em troca, eu diria que..."
10024060-192 = "[ns] \"Opa!?\""
10024060-193 = "(Kisaki pulou nas suas costas)"
10024060-195 = "Assim como há coisas que só você, Sensei, consegue ver, há coisas que só eu consigo enxergar."
10024060-196 = "Seria esta a perspectiva de um adulto... ou melhor, a perspectiva do Sensei?"
10024060-197 = "……."
10024060-200 = "[ns] \"Você sabe que a Lumi não tem nada a ver com isso, não sabe, Kisaki?\""
10024060-201 = "A Lumi... ela se preocupa com a associação mais do que qualquer um. #nEla jamais se envolveria em negociações perigosas por conta própria."
10024060-202 = "Se alguém da associação estiver envolvido..."
10024060-203 = "Seria, no máximo, obra de algum subordinado cego pela ganância."
10024060-204 = "[s] \"Eu penso o mesmo.\""
10024060-205 = "……."
10024060-212 = "Tenho um pedido, Sensei."
10024060-213 = "Proteja a Lumi. E a garota que está sempre com ela, a Reijo, também. #n...E, se não for pedir muito, cuide da Mina também."
10024060-214 = "Pelo menos... até que a verdade sobre tudo isso venha à tona."
10024060-215 = "Se a Associação Genbu estiver envolvida... #nNesse caso, eu mesma cuidarei disso."
10024060-216 = "Mas, para mim, seria inaceitável que a Lumi e as outras fossem acusadas de um crime que não cometeram."
10024060-217 = "Elas são realmente um bando de problemáticas. #nTer que fazer a própria líder se mover por causa disso..."
10024060-218 = "[s] \"O que você acha da Lumi... e da Associação Genbu, Kisaki?\""
10024060-219 = "…Hum."
10024060-223 = "A Associação Genbu também é parte de Shanhaijing. #nAssim como a Genryumon."
10024060-224 = "É só isso que posso lhe dizer."
