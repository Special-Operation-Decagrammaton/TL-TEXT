[translation]
10024060-1 = "第6話;[ruby=きょしんたんかい]虚心坦懐[/ruby]"
10024060-2 = "山海経の街中"
10024060-4 = "あ、先生。#nココナちゃんにお願いしてきてくれて、ありがとう。"
10024060-5 = "[s] \"私が言い出したことだからね。\""
10024060-6 = "……。"
10024060-7 = "先生はさ、大義の前に犠牲はつき物だと思う？"
10024060-8 = "大きな志を遂げるためには、犠牲があっても仕方ない……#n結果さえ得られればそれで良い、とか……"
10024060-9 = "あたしは……正直、よく分からない。"
10024060-10 = "でも、玄龍門なら……たとえ犠牲を払ってでも、目的を達成するだろうね。"
10024060-11 = "先生の提案で「罠」を仕掛けることになった時……#nミナが積極的だったのも、そういう考えだからだと思うし。"
10024060-12 = "[s1] \"商会の会長を務めるくらいだから……\"\n[s2] \"ルミには悩みなんて無いと思ってたよ。\""
10024060-15 = "ははっ。なに言ってるの、先生。"
10024060-16 = "今は柄にもなく会長なんてやってるけど、元々あたしは料理人だよ。"
10024060-17 = "だから……本心で言えば、何も考えずに料理だけしてたい。"
10024060-18 = "料理は正直でしょ？#n手間をかけた分だけ美味しくなるし、研究した分だけ味の可能性が広がる。"
10024060-19 = "それに、お客さんの反応を見れば、喜んでくれてるのが伝わってくるからさ。"
10024060-20 = "やっぱり、料理人ってやり甲斐があるね。"
10024060-21 = "[s] \"会長としての仕事は……？\""
10024060-22 = "……。"
10024060-23 = "先生は大人だから、分かってくれるかな。"
10024060-24 = "責任が増えるほど、自分の手には負えない「選択」に迫られてさ……"
10024060-25 = "それが、いろんな子に影響するでしょ。"
10024060-26 = "あたしは周りより優秀なわけじゃない。"
10024060-27 = "それでも……みんな、信じて頼ってくれる。"
10024060-28 = "[s] \"うん……。\""
10024060-29 = "たくさんの人が集まると、想像もつかない出来事が起こるよね。"
10024060-30 = "一人ひとりの影響は小さいけど、それがやがて大きな意志になっていく。"
10024060-31 = "きっかけは、本当に些細なこと。#nでも、それが徐々に徐々に、大きな火種となる。"
10024060-32 = "あたしは会長として、それを丸く納めなくちゃいけない。"
10024060-33 = "でも、今日を乗り越えたところで、明日は何が起こるか分からないし……"
10024060-34 = "ホッと束の間の休息を得られるだけ。"
10024060-35 = "それをやり甲斐って呼ぶのは……難しいかな。#n無事に解決できて良かった、誰かを助けることができた、って安堵してる。"
10024060-36 = "[s] \"みんなのために、いつも頑張ってるんだね。\""
10024060-37 = "あはは、褒めても何も出ないよ。"
10024060-38 = "もしかして先生って、すぐ人のこと褒めて、その気にさせちゃってるんじゃない？"
10024060-39 = "こりゃ、油断できないね。#nもちろん、悪いとは思わないけど……"
10024060-40 = "誰にでもそんなこと言ってると、そのうち面倒なことになるよ？"
10024060-41 = "[s] \"それって、ルミの経験談？\""
10024060-42 = "ふふっ、どうかな。#nこれ以上は、秘密ってことで。"
10024060-43 = "そんな目で見ても内緒。#n誰にでも秘密の1つや2つ、あるものでしょ？"
10024060-47 = "……不思議だな。#nこんな気持ち、今まで誰にも話してこなかったのに。"
10024060-48 = "[s] \"悩みがあったら、いつでも相談してね。\""
10024060-49 = "……。"
10024060-50 = "ね、先生。"
10024060-55 = "そんな風に言われると……勘違い、しちゃうよ？"
10024060-56 = "……さてと、そろそろココナちゃんのところに行く時間だね。"
10024060-57 = "[s] \"よろしくね、ルミ。\""
10024060-58 = "心配しないで。#n商会の名誉にかけて、ココナちゃんの安全は守るから。"
10024060-59 = "ま、ダンボールを1つ運んでもらって、何事もなければそれで終わりなんだけどね。"
10024060-60 = "[s] \"でも今は、それが鍵を握ってるんだよね？\""
10024060-61 = "うん……そうだね。#nじゃ、行ってくるよ。"
10024060-66 = "（ルミの後ろ姿が見えなくなると……）"
10024060-70 = "（どこか不思議な雰囲気を持つ玄龍門の生徒が現れた）"
10024060-75 = "[ns3] \"玄龍門の子だよね？\"\n[ns4] \"ミナを探してるの？\""
10024060-78 = "他の者は？"
10024060-79 = "[s5] \"用があって、しばらく戻らないかも。\"\n[s6] \"伝言があるなら、私が聞くよ。\""
10024060-85 = "いや……誰もおらんのなら、むしろ好都合じゃ。"
10024060-91 = "ふぅ、お忍びで抜け出すのも一苦労よのう。"
10024060-96 = "[ns] \"キサキ！？\""
10024060-97 = "何をそう驚く事がある。"
10024060-98 = "門主として、事の次第を見に来ただけじゃ。"
10024060-99 = "……何故、わざわざ足を運んできたのか、じゃと？"
10024060-100 = "椅子に座っていては、見えぬものもあるじゃろうて。"
10024060-101 = "人は皆、それぞれ異なる視点を持っておる。#n故にこそ、様々な視点から事を見据えねば、時に判断[ruby=あやま]を過つ[/ruby]もの。"
10024060-102 = "して……どうなっておる？#n[ruby=そなた]其方が[/ruby]見て、感じたものを聞きたい。"
10024060-108 = "（キサキに今の状況を説明した）"
10024060-111 = "そうじゃったか……あい分かった。"
10024060-112 = "[ruby=わらわ]妾の[/ruby]判断は正しかったようじゃな。"
10024060-113 = "ミナは優秀じゃが、すぐに熱くなってしまうからのう。"
10024060-114 = "[s] \"つまり、ミナを[ruby=こんろんさん]崑崙山[/ruby]に送ったのは……\""
10024060-115 = "ああ、そうじゃ――妾の指示に相違ない。"
10024060-116 = "衝突が起こる心配はしとらんかった。#n現に、問題はなかろう？"
10024060-117 = "ミナの強さは本物じゃが、流石にあの2人を相手どれるほどではない。"
10024060-118 = "ルミが自ら手を出すとも思えん。"
10024060-119 = "じゃから、均衡は保たれると考えた。"
10024060-120 = "それに……其方さえおれば、争いなど起きんと信じておったからのう。"
10024060-121 = "妾の見立て――如何かな？"
10024060-125 = "[ns] \"そこまで考えて……。\""
10024060-126 = "この程度のこと、見通せねば門主足り得ぬよ。"
10024060-127 = "あまり門主の座[ruby=こだわ]に拘り[/ruby]はないがのう……"
10024060-131 = "いや、これは失言じゃったな。#n忘れてくれ。"
10024060-132 = "[s] \"協力することになったのも、キサキの予想通り？\""
10024060-133 = "そうじゃ。"
10024060-134 = "ミナは正直な奴ではあるが、向こう見ずな部分が玉に瑕でな。"
10024060-135 = "己で体感せねば、理解できぬものもある。"
10024060-136 = "もう少し視野が広がれば――柔軟な見方も身につくじゃろうて。"
10024060-137 = "其方も分かってくれておったのか？#nやはり、人を見る目があるのじゃな。"
10024060-138 = "嗚呼、そうだ――事が片付いた後も、山海経に残らぬか？#nその気があるのなら、妾が取り計らおうぞ。"
10024060-139 = "[s] \"ありがとう、気持ちだけ頂くよ。\""
10024060-140 = "くふふ、そうか。残念よのう。"
10024060-141 = "ルミは……相変わらず、妾の思い通りにいかんのう。"
10024060-142 = "……いや、気になりはせんよ。#nふふ、今さら妾の言うことを素直に聞かれても、逆に驚くわい。"
10024060-143 = "ルミの奴も、妾に期待などしておらんじゃろう。"
10024060-144 = "[s] \"昔からの知り合いなんだよね？\""
10024060-145 = "ただの腐れ縁じゃ。#nルミと一緒にやっていく未来もあったはずじゃが……"
10024060-146 = "……いや、何でもない。#n聞かなかったことにしてくれるかの。"
10024060-147 = "[s] \"それで、私と話してみて何か分かった？\""
10024060-148 = "……。"
10024060-149 = "ここで妾の考えを伝えて良いものか、悩ましいところじゃのう。"
10024060-150 = "そうさな……其方の言う通り、ルミのためにはなるかもしれぬ。"
10024060-151 = "……ふふ。"
10024060-152 = "其方にだけ、特別じゃぞ。"
10024060-153 = "初めから――玄龍門は事件の真相になど興味はない。"
10024060-154 = "そう驚く事でもないじゃろうて。#n今回に限らず、往々にしてそういうものじゃ。"
10024060-159 = "もし、玄武商会が「萬年参」の密輸に関わっておったら、単純な話じゃ。#n[ruby=あやつ]彼奴[/ruby]の規模や影響力を抑えられる。解散する事もできるしの。"
10024060-163 = "じゃが、玄武商会が関与しておらぬとしても、それはそれで一向に構わぬ。#n玄龍門は、いつでも見張っておる、という牽制にはなっておるからの。"
10024060-167 = "いずれにせよ……「玄龍門」にとって悪くない話じゃ。#nそうであろう？"
10024060-170 = "[ns] \"でも、キサキの考えは違うんだよね？\""
10024060-173 = "――して、その根拠は？"
10024060-174 = "[s] \"わざわざ変装して、ここまで来てるくらいだから。\""
10024060-175 = "ふふ……其方は本当に、良い目を持っておるの。"
10024060-176 = "玄龍門は……「玄龍門」のものじゃ。"
10024060-177 = "たとえ門主とはいえ、玄龍門としての在り方に反することは出来ぬ。"
10024060-178 = "[s] \"キサキの頑張り、ちゃんと見てるからね。\""
10024060-182 = "……頑張って、おるのかのう。"
10024060-183 = "其方、もしや誰にでも言っておらぬか？……いや、そういう其方じゃからこそ、シャーレの先生が務まっておるのかもしれぬな。"
10024060-184 = "怒ってなどおらぬから、心配せずともよい。#n玄龍門の門主たる者が、これしきのことで心を揺さぶられると本気で思っておるのか？"
10024060-185 = "代わりと言っては、なんじゃが……"
10024060-192 = "[ns] \"おわっ！？\""
10024060-193 = "（キサキが背中に飛び乗ってきた）"
10024060-195 = "先生だからこそ見えるものもあるように、妾だからこそ見えるものがあるのじゃ。"
10024060-196 = "これが大人の……いや、先生の視点か。"
10024060-197 = "……。"
10024060-200 = "[ns] \"キサキは、ルミが無関係だと分かってるんだよね？\""
10024060-201 = "ルミは――誰よりも商会のことを考えてるからの。#n自ら危険な取り引きに手を出すはずがない。"
10024060-202 = "もし商会の者に繋がったとしても……"
10024060-203 = "せいぜい、金に目が眩んだ末端の仕業じゃろうな。"
10024060-204 = "[s] \"私も同じ考えだよ。\""
10024060-205 = "……。"
10024060-212 = "頼みがあるのじゃ、先生。"
10024060-213 = "ルミのことを守ってやってくれ。そばにおる、レイジョという子もじゃ。#n……ついでと言ってはなんじゃが、ミナのことも任せてよいかのう。"
10024060-214 = "少なくとも――事の顛末が明らかになるまでは。"
10024060-215 = "もし玄武商会が関与しておったら……#nその時は、妾が自ら手を下そう。"
10024060-216 = "じゃが、ルミたちが謂れのない罪を問われるのは、妾としても不本意でな。"
10024060-217 = "まこと手のかかる奴らよのう。#nこうして、門主が自ら動かねばならんとは。"
10024060-218 = "[s] \"キサキは、ルミを……玄武商会をどう思ってるの？\""
10024060-219 = "……うむ。"
10024060-223 = "玄武商会もまた、山海経の一部じゃ。#n玄龍門と同じように。"
10024060-224 = "妾の口から言えるのは、それだけじゃ。"
