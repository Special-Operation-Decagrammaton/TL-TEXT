[translation]
1300302-1 = "Comunicação desencontrada"
1300302-2 = "（A cidade à tarde estava muito movimentada, cheia de gente.）"
1300302-3 = "（Posso ver Hasumi esperando ao longe.）"
1300302-4 = "（As asas excepcionalmente grandes de Hasumi se destacam, então não foi difícil encontrá-la mesmo no meio da multidão.）"
1300302-7 = "[ns] \"Bom dia.\""
1300302-8 = "……."
1300302-9 = "（Parece que ela não percebeu que estou por perto.）"
1300302-10 = "Ah……!"
1300302-11 = "Desde quando você está aí? ……Sinto muito, eu estava um pouco distraída."
1300302-12 = "Não costumo sair à cidade nos dias de folga, então não imaginei que estivesse tão cheia."
1300302-13 = "Mas, que incrível, você me encontrou rápido."
1300302-14 = "[s1] \"É que a Hasumi se destaca.\"\n[s2] \"Dá para te ver de longe.\""
1300302-15 = "E-eu me destaco?"
1300302-16 = "E-eu me destaco?"
1300302-17 = "A-acho que não tanto assim……."
1300302-18 = "[s] \"Com asas desse tamanho, você se destaca em qualquer lugar.\""
1300302-19 = "……Eh?"
1300302-20 = "G-grandes, você diz?"
1300302-21 = "[s] \"Sim, não são bem maiores que as das outras alunas?\""
1300302-22 = "……N-não, i-isso é……."
1300302-23 = "P-pode ser verdade, não vou negar…… m-mas…… existem pessoas maiores que eu também……."
1300302-24 = "[s] \"……? Por acaso eu disse algo que não deveria?\""
1300302-25 = "Não, n-não é isso. Pelo contrário, achei que talvez me faltasse o bom senso de um adulto……."
1300302-26 = "É só que você disse isso com tanta naturalidade…… que fiquei um pouco surpresa."
1300302-27 = "[s3] \"Desculpe se te deixei desconfortável.\"\n[s4] \"Ainda não estou acostumado com o senso comum de Kivotos.\""
1300302-28 = "E-está tudo bem, Sensei. Pelo contrário, eu que peço desculpas por ter te deixado desconfortável."
1300302-29 = "E-está tudo bem, Sensei. Pelo contrário, eu que peço desculpas por ter te deixado desconfortável."
1300302-30 = "[s] （Mas, ainda assim, são asas muito grandes）"
1300302-31 = "……."
1300302-32 = "[s] \"Não é inconveniente?\""
1300302-33 = "Sim?"
1300302-34 = "B-bem, às vezes é um pouco inconveniente…… meus ombros ficam tensos se fico muito tempo na mesma posição, ou balançam quando corro, o que é um pouco incômodo……."
1300302-35 = "Mas, como não quero que isso atrapalhe minha vida, tenho feito dieta ultimamente."
1300302-36 = "[s] \"Sério!? Se você perde peso, elas também diminuem!?\""
1300302-37 = "Eh? B-bem, geralmente é assim, não é? Acho que varia de pessoa para pessoa, mas……."
1300302-38 = "[s] \"Incrível, não sabia disso.\""
1300302-39 = "É-é mesmo…… não acho que seja algo tão importante assim, mas……."
1300302-40 = "[s5] \"Queria tocar nelas!\"\n[s6] \"Posso tocar nelas?\""
1300302-41 = "……."
1300302-42 = "……."
1300302-43 = "To……"
1300302-44 = "To-,"
1300302-45 = "T-tocar nelas!?"
1300302-46 = "Aqui mesmo!?"
1300302-47 = "Por mais que você peça, isso não seria um pouco inapropriado…… não, será que não é? Mas, ainda assim, acho que não é bom…… e-eu não sei bem……."
1300302-48 = "……."
1300302-53 = "……Bem."
1300302-54 = "S-se você insiste tanto, e-então tudo bem, pode tocar……!"
1300302-55 = "M-mas, mantenha segredo das outras pessoas! E que seja em um lugar onde não tenha ninguém……!"
1300302-56 = "……."
1300302-57 = "[s] \"Obrigado. Eu sempre tive curiosidade sobre essas suas asas.\""
1300302-58 = "……。"
1300302-59 = "……………………………。"
1300302-60 = "Era sobre... as asas?"
1300302-61 = "[s] \"Hã?…… Sim.\""
1300302-62 = "Então era sobre... as asas."
1300302-63 = "Asas……."
1300302-64 = "Entendo……."
1300302-65 = "[s] \"……Sobre o que você achou que eu estava falando?\""
1300302-66 = "N-não... não é nada."
1300302-67 = "……。"
1300302-68 = "Ah…………."
1300302-69 = "……。"
1300302-70 = "L-lembrei de um compromisso urgente, Sensei! Com licença, já vou indo!"
1300302-71 = "[s] \"Hã? Mas você não disse que queria conversar sobre algo!?\""
1300302-72 = "Fica para uma próxima oportunidade!"
1300302-75 = "（Hasumi desapareceu como o vento）"
