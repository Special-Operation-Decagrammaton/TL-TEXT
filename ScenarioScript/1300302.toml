[translation]
1300302-1 = "すれ違いコミュニケーション"
1300302-2 = "（午後の街は、たくさんの人で賑わっていた）"
1300302-3 = "（遠くにハスミが待っているのが見える）"
1300302-4 = "（ハスミのひときわ大きい翼が目立っていて、人ごみの中でも探すのは難しくなかった）"
1300302-7 = "[ns] \"おはよ。\""
1300302-8 = "……。"
1300302-9 = "（近くにいることに気づいてないみたい）"
1300302-10 = "あっ……！"
1300302-11 = "いつの間にいらしていたのですか？……すみません、少しボーっとしておりました。"
1300302-12 = "休日に街に出ることはあまりないものですから、こんなに人が多いなんて思いませんでした。"
1300302-13 = "でも、よく、すぐに私を見つけられましたね。"
1300302-14 = "[s1] \"ハスミは目立つから。\"\n[s2] \"遠くからでもすぐ分かるよ。\""
1300302-15 = "め、目立ちますか？"
1300302-16 = "め、目立ちますか？"
1300302-17 = "そ、それほどではないと思いますが……。"
1300302-18 = "[s] \"それぐらい大きいと、どこでも目立つよ。\""
1300302-19 = "……え？"
1300302-20 = "お、大きい、ですか？"
1300302-21 = "[s] \"うん、他の生徒たちよりかなり大きいんじゃない？\""
1300302-22 = "……い、いえ、そ、それは……。"
1300302-23 = "た……たしかにそうかもしれません、否定はしませんが……で、でも……私よりもっと大きい人もいますし……。"
1300302-24 = "[s] \"……？もしかして、あまり言っちゃいけないことだった？\""
1300302-25 = "いえ、そ、そんなことはありません。むしろ私の方に大人の常識が足りてないのかと……。"
1300302-26 = "ただあまりにも堂々と仰ったので……少し驚いただけです。"
1300302-27 = "[s3] \"困らせてたらごめんね。\"\n[s4] \"キヴォトスの常識にまだ慣れてなくて。\""
1300302-28 = "だ、大丈夫です、先生。逆に私の方こそ、困らせてしまって申し訳ないです。"
1300302-29 = "だ、大丈夫です、先生。逆に私の方こそ、困らせてしまって申し訳ないです。"
1300302-30 = "[s] （でもやっぱり、すごく大きい翼）"
1300302-31 = "……。"
1300302-32 = "[s] \"不便じゃないの？\""
1300302-33 = "はい？"
1300302-34 = "ふ、不便な時もあったりはしますね……同じ姿勢で長くいると肩が凝るとか、走る時に揺れて気になるとか……。"
1300302-35 = "でもやはり生活に支障が出るのは困るので、最近はダイエットをしています。"
1300302-36 = "[s] ″えっ！？体重が減ったら一緒に減るものなの！？″"
1300302-37 = "え？い、一般的にはそうですよね？人によって差はあると思いますが……。"
1300302-38 = "[s] \"すごい、初めて知った。\""
1300302-39 = "そ、そうですか……そこまで大したことではないと思いますが……。"
1300302-40 = "[s5] \"触ってみたい！\"\n[s6] \"触ってみてもいい？\""
1300302-41 = "……。"
1300302-42 = "……。"
1300302-43 = "さ……"
1300302-44 = "さ、"
1300302-45 = "さっ、触るんですか！？"
1300302-46 = "こんなところで！？"
1300302-47 = "いくらなんでもそれはちょっと、よろしくないのでは……いえ、そうでもないのでしょうか……？でも、やはり良くないことかと……よ、よく分かりませんが……。"
1300302-48 = "……。"
1300302-53 = "……えっと。"
1300302-54 = "そ、そこまでおっしゃるのでしたら、さ、触っていただいても、大丈夫です……！"
1300302-55 = "で、ですが他の人たちには内緒です！それから、誰もいないところで……！"
1300302-56 = "……。"
1300302-57 = "[s] \"ありがとう。ずっとその翼、気になってたんだ。\""
1300302-58 = "……。"
1300302-59 = "……………………………。"
1300302-60 = "翼……の話でしたか。"
1300302-61 = "[s] \"え？……うん。\""
1300302-62 = "翼……だったんですね。"
1300302-63 = "翼……。"
1300302-64 = "そうですか……。"
1300302-65 = "[s] \"……何の話だと思ってたの？\""
1300302-66 = "な……何でもありません。"
1300302-67 = "……。"
1300302-68 = "はぁ…………。"
1300302-69 = "……。"
1300302-70 = "きゅ、急な用事を思い出しました、先生！私はこれで失礼します！"
1300302-71 = "[s] \"え？相談があるって言ってなかった！？\""
1300302-72 = "それはまたの機会に！"
1300302-75 = "（風のように消えたハスミだった）"
