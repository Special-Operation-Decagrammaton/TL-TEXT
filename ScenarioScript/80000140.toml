[translation]
80000140-1 = "Bolo de Mel de Chocolate"
80000140-2 = "Existem três princípios fundamentais para uma negociação."
80000140-3 = "[s] \"Qual é o primeiro?\""
80000140-4 = "Você tem pressa, não é?#nEu até gosto desse seu jeito, mas... mufufu."
80000140-5 = "Primeiro, temos a \"escuta ativa\"."
80000140-6 = "[s] \"Com certeza, isso é importante.\""
80000140-7 = "Sim, é essencial para amea...#npara induzir a outra parte a ouvir o que você tem a dizer."
80000140-8 = "[s] \"...Hã?\""
80000140-9 = "E o segundo é o \"lucro\".#nIsso também é sempre algo importante, não é?"
80000140-10 = "Fazer a outra parte pensar que \"há benefícios mútuos\" é extremamente importante."
80000140-11 = "O terceiro e último é a \"confiança\"."
80000140-12 = "É preciso criar uma atmosfera onde, se não obedecerem, algo terrível acontecerá.#nPara que, mesmo que algo aconteça, eles não consigam fugir."
80000140-13 = "[s] \"Talvez você não esteja errada, mas isso é mesmo 'confiança'!?\""
80000140-14 = "Se não estou errada, então é praticamente a resposta correta, não é?"
80000140-15 = "De qualquer forma, negociações exigem técnica."
80000140-16 = "Devemos sempre manter uma postura de dar e receber."
80000140-17 = "Sendo assim, trouxe isto para você."
80000140-23 = "[ns] \"Um bolo de chocolate...?\""
80000140-24 = "Embora seja de chocolate, é o que chamamos de Medovik."
80000140-25 = "Camadas finas de massa com mel e creme, empilhadas uma sobre a outra..."
80000140-26 = "É um doce famoso em Red Winter, feito repetindo esse processo várias vezes."
80000140-27 = "Este aqui, tanto a massa quanto o creme, são sabor chocolate."
80000140-28 = "Aliás, é feito à mão, viu?#nSe você tem experiência com negócios, já deve ter imaginado..."
80000140-29 = "Chocolate feito à mão no Dia dos Namorados."
80000140-30 = "Você entende o significado disso, Sensei, não entende...?#nMufufufufu."
80000140-31 = "[s] \"Entendo...\""
80000140-32 = "Abrindo um parêntese, eu adoro esse Medovik."
80000140-33 = "As várias camadas empilhadas me lembram pilhas de livros."
80000140-34 = "[s] \"Que motivo romântico.\""
80000140-35 = "...Além disso, também parece um maço de notas, não parece?"
80000140-36 = "[s] \"...Um motivo bem a cara da Yakumo.\""
80000140-37 = "Enfim. Para mim, o Medovik é um bolo que enriquece meu coração só de olhar."
80000140-38 = "E, como eu disse, é \"feito à mão\", viu?"
80000140-39 = "Em um dia como este, me dar ao trabalho de trazer meu bolo favorito...#ne ainda entregá-lo nesta gráfica, que é um campo de batalha para mim."
80000140-40 = "Não me venha dizer que não entende o que isso significa!#nMufufu!"
80000140-41 = "[s] \"Só uma pergunta...\""
80000140-42 = "Sim~♪"
80000140-43 = "[s] \"Esse 'feito à mão'... foi feito por quem?\""
80000140-44 = "Q-que tipo de pergunta é essa...!?"
80000140-45 = "...Ah, por causa do meu histórico?"
80000140-46 = "Francamente, que crueldade.#nNão precisava chegar a esse ponto...!"
80000140-47 = "A esse ponto..."
80000140-48 = "..."
80000140-49 = "Sensei... que tal esquecer o passado e olhar para um futuro brilhante?"
80000140-50 = "[s] \"Yakumo? Acho que não existe futuro naquela direção.\""
80000140-51 = "...Não tem jeito, né."
80000140-52 = "Dito isso, não houve falsidade nos meus sentimentos..."
80000140-53 = "E eu não menti em absolutamente nada!"
80000140-54 = "Eu não disse que a \"confiança\" é importante?"
80000140-55 = "E o bolo do café também não deixa de ser feito à mão."
80000140-56 = "Na verdade, ultimamente...#nUm café que abriu perto da secretaria queria anunciar, então..."
80000140-57 = "Por isso, eu negociei com eles."
80000140-58 = "――Em troca de um desconto na publicidade, perguntei se não poderiam me dar algumas amostras."
80000140-59 = "……Eu agi pensando em você, Sensei, à minha maneira."
80000140-60 = "[s] \"Entendo... Obrigado, Yakumo.\""
80000140-61 = "Sim, afinal, é um Medovik de chocolate para o Dia dos Namorados, não é?#nPensei que conseguiria um nível de afeição considerável."
80000140-62 = "[s] \"Obrigado por ser tão honesta sobre isso...\""
80000140-63 = "Claro, não sei dizer o quanto disso é sincero, mas...?"
80000140-64 = "Bem, aproveite com calma. Já que minhas intenções foram descobertas, esta comerciante incômoda vai se retirar... Mufufu."
80000140-69 = "S-Sensei?#nPor que você não me deixa ir embora...!?"
80000140-70 = "D-Dizer para eu ir junto... mas isso foi preparado especialmente para você, Sensei..."
80000140-71 = "……Bem, é verdade."
80000140-72 = "Este lugar tem um significado especial para mim, mas..."
80000140-73 = "Mesmo assim, hum..."
80000140-74 = "……Olha, é aquilo."
80000140-75 = "Para mim, este lugar não é para tomar chá, mas..."
80000140-76 = "[s] \"Então, que tal mudarmos de lugar?\""
80000140-77 = "……Eh?"
80000140-78 = "Ah, não, isso é..."
80000140-79 = "……."
80000140-80 = "Está bem, está bem, eu perdi."
80000140-81 = "Já que vou acompanhar você, vou garantir que você me pague algo bem gostoso, viu?#nMufufu."
80000140-83 = "(E assim, fui com Yakumo para o novo café)"
80000140-88 = "(Com a Yakumo, sempre alegre e cheia de energia...)"
80000140-89 = "(Com a Yakumo, sempre alegre e cheia de energia...)"
80000140-90 = "(Passei um tempo que não foi nada entediante)"
