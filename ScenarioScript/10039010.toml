[translation]
10039010-1 = "第1話;イメージチェンジ"
10039010-2 = "48時間前"
10039010-7 = "……ふぅ、これで最後です！"
10039010-11 = "思ったよりも早く終わりましたね。#nこれもマリーさんのおかげです。#nありがとうございました！"
10039010-12 = "むしろ、重い荷物を全て運んでくださったヒナタさんのおかげのような……。"
10039010-13 = "こちらこそ、ありがとうございます。"
10039010-14 = "そ、そんな……！"
10039010-19 = "……あっ、すみません。"
10039010-20 = "って、私のじゃ……。"
10039010-21 = "……私のみたいです。"
10039010-25 = "……？"
10039010-26 = "マリーさん？"
10039010-27 = "えっと、サクラコ様から連絡が来まして。"
10039010-28 = "ただ、内容が……。"
10039010-29 = "次の仕事の連絡でしょうか？"
10039010-30 = "そうかもしれません。#n「緊急支援要請」とだけ送られてきました。"
10039010-32 = "……何か問題でも起きたのでしょうか？"
10039010-36 = "失礼します……。"
10039010-37 = "……サクラコ様？"
10039010-38 = "入ってもよろしいでしょうか？"
10039010-45 = "……！？"
10039010-46 = "さ、サクラコ様！？#nそれにミネ様まで……！"
10039010-48 = "……。"
10039010-49 = "多忙な中、急に呼び立ててしまいすみません。"
10039010-50 = "マリーが来てくれなければ、大変なことになっていたので……。"
10039010-51 = "……おそらく、すぐにでも決着をつけていたでしょう。"
10039010-52 = "け、決着とは、いったい何があったのですか！？"
10039010-54 = "……？"
10039010-55 = "……はい？"
10039010-56 = "私たちは戦っていたのでしょうか……？"
10039010-57 = "……？"
10039010-58 = "サクラコさんが、そのつもりだったのでは……？"
10039010-59 = "先ほど「衝突する前に、マリーの声を聞かなくては」と言っておりましたよね？"
10039010-60 = "……？？？"
10039010-61 = "また誤解を……。"
10039010-62 = "私はただ意見を求めたかっただけで……。"
10039010-65 = "つまり……？"
10039010-66 = "あ、あの……！"
10039010-67 = "もしかして、私のせいで問題が……？"
10039010-68 = "……いえ、そうではありません。"
10039010-69 = "どうかご心配なさらないでください。#n私達はマリーさんを咎めに来たわけではありませんので。"
10039010-71 = "また困らせてしまいましたね……申し訳ありません。"
10039010-72 = "順を追って説明しますと……。"
10039010-73 = "……お待ちください。"
10039010-74 = "ここは私が説明しましょう。"
10039010-75 = "サクラコさんでは、誤解を生んでしまうかもしれませんから。"
10039010-76 = "……はい？"
10039010-77 = "え、ええと……？"
10039010-78 = "……何故でしょうか？"
10039010-79 = "……。"
10039010-80 = "今日の話し合いだけですら、いくつも誤解を生んでいたかと。"
10039010-81 = "……うっ。"
10039010-82 = "分かりました……では、お任せします。"
10039010-84 = "サクラコ様……。"
10039010-85 = "……では、まず私たちが置かれている状況をご説明します。"
10039010-87 = "マリーさんもご存知の通り、現在トリニティ[ruby=カーニバル]謝肉祭[/ruby]が開催されていますよね。"
10039010-88 = "そのなかで「アイドルイベント」が行なわれるそうなのです。"
10039010-89 = "これは、トリニティだけでなく、他学園からも参加者を募る大きな催し。"
10039010-90 = "開催期間中は、組織間の関係性を抜きにして、交流を深める決まり。"
10039010-91 = "これを生かして、私たちのイメージチェンジを図ろうと考えました。"
10039010-93 = "……まさに、絶好の機会ですから。"
10039010-94 = "救護騎士団やシスターフッドが抱えるマイナスイメージを払拭するのです！"
10039010-95 = "わ、私たちにそのようなイメージが……？"
10039010-97 = "はい、残念ながら……。"
10039010-98 = "マリーは初耳かもしれませんが、立場上どうしても疑いをかけられやすいのです。"
10039010-99 = "例えば、陰謀を企てているのではないか、生徒を監禁しているのではないか、など……。"
10039010-100 = "救護騎士団も、救護のていで暴力を振るい、街を破壊して回っていると誤解されており……。"
10039010-101 = "みなさんのために職務を全うしているはずなのに、です。"
10039010-102 = "ど、どうしてなのでしょう……？"
10039010-103 = "私にも、よく分かりません……。"
10039010-104 = "この問題を解決するためには、何だってやってみせましょう。"
10039010-105 = "それが、たとえ初めての行ないだとしても。"
10039010-106 = "初めて、ですか……？"
10039010-107 = "……はい、マリー。"
10039010-108 = "私とミネ団長は今日から……。"
10039010-112 = "……アイドルになるのです！"
10039010-113 = "アイドル……！？"
10039010-114 = "似合わないことは承知のうえです。#n私もミネ団長も、アイドルのような可愛いものに興味はありませんから……。"
10039010-115 = "……？"
10039010-116 = "いえ、むしろ私は……。"
10039010-117 = "頑張ったところで滑稽に映るかもしれませんが、その覚悟はできております。"
10039010-118 = "……お待ちください！"
10039010-119 = "アイドルが滑稽と言いましたか！？"
10039010-120 = "はい、それでも皆様から親しみを持っていただけるのなら……。"
10039010-121 = "……！"
10039010-122 = "私は、どのような格好も甘んじて受け入れましょう。"
10039010-124 = "……サクラコ様。"
10039010-128 = "分かりました。それでは……私も全力で皆さんのサポートをいたします。"
10039010-129 = "私にできることがありましたら、なんでも仰ってください。"
10039010-130 = "マリー……！"
10039010-131 = "マリーさん……！"
10039010-132 = "ありがとうございます。#nさっそくですが、まずはこちらを……。"
10039010-137 = "これは……？"
10039010-138 = "私とミネ団長がそれぞれ考えた「アイドルの企画書」です。"
10039010-139 = "「衣装」、「ダンス」、「曲」の三つに別けて案を出したのですが、#nなかなか意見がまとまらず……。"
10039010-140 = "ええ、マリーさんに決めていただければ、と。"
10039010-141 = "サクラコさんも私も、それがいいと考えました。"
10039010-142 = "わ、私が決めるんですか！？"
10039010-143 = "はい、マリーは私たちよりもアイドルに詳しいでしょうから。"
10039010-144 = "普段からお店でポイントを貯めたり、セルフレジを使ったり、トレンドを知っているように。"
10039010-145 = "それくらいでしたら、私は普通に……。"
10039010-146 = "相談を通して、若者の意見を聞く機会も多いでしょう。"
10039010-147 = "年の差はほとんどないと思いますが……。"
10039010-148 = "つまり、私やミネ団長とは違い、今時の学生として適任なのです！"
10039010-149 = "おかしくありませんか！？"
10039010-150 = "どうして私がサクラコさんと同じ立場に！？全てサクラコさんのお話でしょう！"
10039010-151 = "たしかに、そこまでアイドルには詳しくありませんが、#n可愛いものは好きですから、興味はありました！"
10039010-152 = "なのに「騎士団誓約」の内容を歌詞に加えたのですか？#nいくら何でも、あれが不自然なことくらい私でさえ分かります！"
10039010-153 = "ですから、それはオリジナリティを出すためだと説明したではありませんか！"
10039010-154 = "サクラコさんこそ、「聖歌」を推していたでしょう！"
10039010-155 = "皆様から、とても評判ですよ？"
10039010-156 = "その「皆様」とは誰なのですか！"
10039010-158 = "聖堂の皆様です！"
10039010-159 = "それは当然でしょう！"
10039010-160 = "マリーも聖歌は好きですよね！？"
10039010-161 = "えっ？#nも、もちろん聖歌は好きですが……。"
10039010-162 = "言った通りでしょう、ミネ団長！"
10039010-164 = "それとこれとは別ですよね！？"
10039010-169 = "……ふぅ。#nマリーさんのお力を借りようとした理由、分かっていただけましたか？"
10039010-170 = "マリーさんなら、公正に選んでくださると信じております。"
10039010-171 = "サクラコさんの企画になったとしても、異論はございません。"
10039010-176 = "……ええと。"
10039010-177 = "その……。"
10039010-178 = "ええ、マリーにお任せします！"
10039010-179 = "あぅ……。"
10039010-181 = "さあ、お選びください！#n私たちが進むべき道を！"
10039010-182 = "そ、その！"
10039010-186 = "少し……。"
10039010-188 = "……考える時間を、頂けませんか？"
10039010-192 = "――という話になってしまいまして。"
10039010-193 = "[s1] \"大変だったね……。\"\n[s2] \"お疲れ様、マリー。\""
10039010-196 = "あはは……。"
10039010-197 = "ですが、サクラコ様とミネ団長のお気持ちは理解しました。"
10039010-198 = "誰かのためを思う一心で、頑張っているのだと。"
10039010-199 = "お二人は組織を率いる立場で、色々な問題に直面しているのでしょう。"
10039010-200 = "それに対して、私は目の前の仕事をこなすだけ……。"
10039010-201 = "ですから、こんな私でもお役に立てるのならサポートしたいのです。"
10039010-202 = "ただ……。"
10039010-203 = "片方の意見を肯定すると、もうひとつの意見を否定することになってしまい、#nどうすれば良いのか分からず……。"
10039010-207 = "[ns3] \"マリー。\"\n[ns4] \"ほかの部活を見て回るのはどうかな？\""
10039010-210 = "……えっ。"
10039010-211 = "もしかして……。"
10039010-212 = "……手伝って、くださるんですか？"
10039010-213 = "ほかの部活を一緒に見て回る……？"
10039010-214 = "お、お気持ちは嬉しいのですが……。"
10039010-215 = "先生はお仕事で忙しいでしょうし、負担をかけるわけにはいきません。"
10039010-216 = "……はい？"
10039010-217 = "気にする必要はない、と？"
10039010-218 = "[s5] \"マリーの力になりたいんだ。\"\n[s6] \"みんなの力になりたいんだ。\""
10039010-221 = "先生……。"
10039010-225 = "……ふふっ。"
10039010-226 = "ありがとうございます。"
10039010-227 = "そこまで言ってくださったのに……。"
10039010-228 = "遠慮しては、却って失礼ですよね。"
10039010-229 = "ここはご厚意に、甘えさせていただきます。"
10039010-230 = "今は、余計なことを考えず……。"
10039010-231 = "期待に応えられるよう、頑張ります。"
10039010-232 = "……先生。"
10039010-233 = "いつも通り、お手伝いをするだけのはずでしたが……。"
10039010-234 = "……今は、明日からの時間を楽しみにしている自分がいます。"
10039010-239 = "……では先生、よろしくお願いいたしますね。"
