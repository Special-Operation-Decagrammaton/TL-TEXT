[translation]
10039010-1 = "Episódio 1; Mudança de Visual"
10039010-2 = "48 horas atrás"
10039010-7 = "……Ufa, este é o último!"
10039010-11 = "Terminamos mais rápido do que eu pensava.#nIsso também é graças a você, Mari.#nMuito obrigada!"
10039010-12 = "Na verdade, acho que é graças a você, Hinata, que carregou toda a bagagem pesada……."
10039010-13 = "Eu que agradeço."
10039010-14 = "N-não, que isso……!"
10039010-19 = "……Ah, perdão."
10039010-20 = "Espera, não é o meu……."
10039010-21 = "……Parece que é o meu."
10039010-25 = "……?"
10039010-26 = "Mari?"
10039010-27 = "Bem, recebi uma mensagem da Sakurako-sama."
10039010-28 = "Só que o conteúdo é……."
10039010-29 = "Seria sobre o próximo trabalho?"
10039010-30 = "Talvez. #nVeio escrito apenas \"Pedido de apoio urgente\"."
10039010-32 = "……Será que aconteceu algum problema?"
10039010-36 = "Com licença……."
10039010-37 = "……Sakurako-sama?"
10039010-38 = "Posso entrar?"
10039010-45 = "……!?"
10039010-46 = "S-Sakurako-sama!?#nE até a Mine-sama……!"
10039010-48 = "……."
10039010-49 = "Desculpe por chamá-las de repente, mesmo estando tão ocupadas."
10039010-50 = "Se a Mari não tivesse vindo, as coisas teriam ficado muito feias……."
10039010-51 = "……Provavelmente, teríamos resolvido isso na força bruta agora mesmo."
10039010-52 = "R-resolver na força bruta? O que aconteceu, afinal!?"
10039010-54 = "……?"
10039010-55 = "……Sim?"
10039010-56 = "Nós estávamos lutando……?"
10039010-57 = "……?"
10039010-58 = "Não era essa a intenção da Sakurako-san……?"
10039010-59 = "Você não disse há pouco que \"precisava ouvir a voz da Mari antes de colidirmos\"?"
10039010-60 = "……???"
10039010-61 = "Criando mal-entendidos de novo……."
10039010-62 = "Eu só queria pedir uma opinião……."
10039010-65 = "Ou seja……?"
10039010-66 = "A-ah, por favor……!"
10039010-67 = "Será que o problema foi causado por mim……?"
10039010-68 = "……Não, não é isso."
10039010-69 = "Por favor, não se preocupe.#nNão viemos aqui para repreender a Mari."
10039010-71 = "Acabei te deixando preocupada de novo…… sinto muito."
10039010-72 = "Explicando desde o início……."
10039010-73 = "……Espere um pouco."
10039010-74 = "Deixe que eu explique."
10039010-75 = "Pois a Sakurako-san pode acabar gerando mais mal-entendidos."
10039010-76 = "……Sim?"
10039010-77 = "B-bem……?"
10039010-78 = "……Por que será?"
10039010-79 = "……."
10039010-80 = "Acredito que até mesmo na discussão de hoje, surgiram vários mal-entendidos."
10039010-81 = "……Ugh."
10039010-82 = "Entendido…… então, deixarei com vocês."
10039010-84 = "Senhorita Sakurako……."
10039010-85 = "……Bem, primeiro explicarei a situação em que nos encontramos."
10039010-87 = "Como a Mari também sabe, o Carnaval de Trinity está sendo realizado atualmente, não é?"
10039010-88 = "Dizem que um \"evento de idols\" será realizado durante ele."
10039010-89 = "Este é um grande evento que recruta participantes não apenas de Trinity, mas também de outras escolas."
10039010-90 = "Durante o período do evento, é regra deixar de lado as relações entre organizações para aprofundar o intercâmbio."
10039010-91 = "Aproveitando isso, pensei em tentar mudar a nossa imagem."
10039010-93 = "……Pois é, sem dúvida, a oportunidade perfeita."
10039010-94 = "Vamos dissipar a imagem negativa que a Brigada de Socorro e a Sisterhood carregam!"
10039010-95 = "N-nós temos esse tipo de imagem……?"
10039010-97 = "Sim, infelizmente……."
10039010-98 = "Pode ser novidade para a Mari, mas, devido à nossa posição, é inevitável que sejamos alvo de suspeitas."
10039010-99 = "Por exemplo, se estamos tramando conspirações, se estamos mantendo estudantes em cárcere privado, e por aí vai……."
10039010-100 = "A Brigada de Socorro também é mal interpretada, dizendo que usamos o pretexto de socorro para praticar violência e destruir a cidade……."
10039010-101 = "Mesmo que estejamos apenas cumprindo nosso dever em prol de todos."
10039010-102 = "P-por que será……?"
10039010-103 = "Eu também não sei ao certo……."
10039010-104 = "Para resolver esse problema, farei qualquer coisa que for preciso."
10039010-105 = "Mesmo que seja algo que eu nunca fiz antes."
10039010-106 = "Nunca fez, você diz……?"
10039010-107 = "……Sim, Mari."
10039010-108 = "A partir de hoje, eu e a Comandante Mine……."
10039010-112 = "……Vamos nos tornar idols!"
10039010-113 = "Idols……!?"
10039010-114 = "Estou ciente de que não combina conosco. #nNem eu nem a Comandante Mine temos interesse em coisas fofas como idols……."
10039010-115 = "……?"
10039010-116 = "Não, na verdade eu……."
10039010-117 = "Pode parecer ridículo por mais que nos esforcemos, mas estou preparada para isso."
10039010-118 = "……Espere um pouco!"
10039010-119 = "Você disse que idols são ridículas!?"
10039010-120 = "Sim, mas se isso fizer com que todos se sintam mais próximos de nós……."
10039010-121 = "……!"
10039010-122 = "Eu aceitarei qualquer visual de bom grado."
10039010-124 = "……Senhorita Sakurako."
10039010-128 = "Entendido. Então…… eu também darei todo o meu apoio a vocês."
10039010-129 = "Se houver algo que eu possa fazer, por favor, me digam."
10039010-130 = "Mari……!"
10039010-131 = "Mari-san……!"
10039010-132 = "Obrigada. #nJá que estamos nisso, primeiro, dê uma olhada nisto……."
10039010-137 = "Isto é……?"
10039010-138 = "São as \"propostas de idol\" que eu e a Comandante Mine pensamos individualmente."
10039010-139 = "Dividimos em três partes: \"figurino\", \"dança\" e \"música\", mas #nnão conseguimos chegar a um consenso……."
10039010-140 = "Sim, pensamos que seria melhor se a Mari decidisse."
10039010-141 = "Tanto a Sakurako quanto eu achamos que seria o ideal."
10039010-142 = "E-eu que vou decidir!?"
10039010-143 = "Sim, a Mari deve entender mais de idols do que nós."
10039010-144 = "Como alguém que sempre acumula pontos nas lojas, usa caixas eletrônicos e está por dentro das tendências."
10039010-145 = "Se for só isso, eu normalmente..."
10039010-146 = "Através de consultas, imagino que você tenha muitas oportunidades de ouvir as opiniões dos jovens."
10039010-147 = "Acho que não há quase nenhuma diferença de idade, mas..."
10039010-148 = "Ou seja, ao contrário de mim e da Comandante Mine, você é a pessoa certa como uma estudante dos tempos atuais!"
10039010-149 = "Não acha isso estranho!?"
10039010-150 = "Por que eu acabei na mesma posição que a Sakurako-san!? Tudo isso é ideia da Sakurako-san!"
10039010-151 = "É verdade que não entendo muito de ídolos, mas #ncomo gosto de coisas fofas, eu tinha interesse!"
10039010-152 = "Mas por que você adicionou o conteúdo do \"Juramento da Cavalaria\" na letra? #nMesmo eu sei que isso é algo não natural!"
10039010-153 = "Por isso mesmo, eu expliquei que era para dar originalidade!"
10039010-154 = "A própria Sakurako-san estava defendendo os \"Hinos Sagrados\"!"
10039010-155 = "Todos estão elogiando muito, sabe?"
10039010-156 = "Quem são esses \"todos\"!?"
10039010-158 = "Todos na Catedral!"
10039010-159 = "Isso é óbvio!"
10039010-160 = "Marie também gosta de hinos, não gosta!?"
10039010-161 = "Eh? #nE-eu, claro que gosto de hinos, mas..."
10039010-162 = "Viu só, Comandante Mine!"
10039010-164 = "Uma coisa é uma coisa, outra coisa é outra coisa, não é!?"
10039010-169 = "…Ufa. #nVocê entendeu o motivo de termos pedido a ajuda da Marie-san?"
10039010-170 = "Acredito que a Marie-san escolherá de forma justa."
10039010-171 = "Mesmo que o plano da Sakurako-san seja o escolhido, não tenho objeções."
10039010-176 = "…Hum."
10039010-177 = "Isso..."
10039010-178 = "Sim, deixo com a Marie!"
10039010-179 = "Au..."
10039010-181 = "Vamos, escolha! #nO caminho que devemos seguir!"
10039010-182 = "I-isso!"
10039010-186 = "Um pouco..."
10039010-188 = "…Poderia me dar um tempo para pensar?"
10039010-192 = "— e foi assim que a conversa terminou."
10039010-193 = "[s1] \"Deve ter sido difícil...\"\n[s2] \"Bom trabalho, Marie.\""
10039010-196 = "Ahaha..."
10039010-197 = "Mas entendi os sentimentos da Sakurako-sama e da Comandante Mine."
10039010-198 = "Que elas estão se esforçando com o desejo sincero de ajudar alguém."
10039010-199 = "Ambas estão em posições de liderança e devem enfrentar vários problemas."
10039010-200 = "Em contraste, eu apenas cuido do trabalho que tenho à frente..."
10039010-201 = "Por isso, se alguém como eu puder ser útil, quero dar meu apoio."
10039010-202 = "Só que..."
10039010-203 = "Se eu concordar com uma opinião, acabarei negando a outra, #ne não sei o que fazer..."
10039010-207 = "[ns3] \"Marie.\"\n[ns4] \"Que tal visitarmos outros clubes?\""
10039010-210 = "…Eh."
10039010-211 = "Será que..."
10039010-212 = "…Você vai me ajudar?"
10039010-213 = "Visitar outros clubes juntos...?"
10039010-214 = "E-eu fico feliz com a sua intenção, mas..."
10039010-215 = "O Sensei deve estar ocupado com o trabalho, não posso lhe causar esse transtorno."
10039010-216 = "…Sim?"
10039010-217 = "Não preciso me preocupar, é isso?"
10039010-218 = "[s5] \"Quero ser útil para a Marie.\"\n[s6] \"Quero ser útil para todos.\""
10039010-221 = "Sensei..."
10039010-225 = "……Hehe."
10039010-226 = "Muito obrigada."
10039010-227 = "Mesmo depois de você ter dito tudo isso……."
10039010-228 = "Seria falta de educação da minha parte recusar, não seria?"
10039010-229 = "Sendo assim, aceitarei sua gentileza."
10039010-230 = "Por enquanto, sem pensar em coisas desnecessárias……."
10039010-231 = "Farei o meu melhor para corresponder às suas expectativas."
10039010-232 = "……Sensei."
10039010-233 = "Era para ser apenas uma ajuda como de costume, mas……."
10039010-234 = "……Agora, percebo que estou ansiosa pelo tempo que passaremos a partir de amanhã."
10039010-239 = "……Então, Sensei, conto com você."
