[translation]
1300805-1 = "公園で草むしり"
1300805-2 = "今日は公園の雑草を取るわよ！簡単だけど面倒な仕事なのよね。"
1300805-3 = "場所はここと、あっちと、あそこ。"
1300805-4 = "特にあそこはものすごく生い茂ってるから、根元から取らないとすぐに生えてくるの。"
1300805-5 = "むしってもむしってもすぐに生える雑草を見てると……はあ……。#n「賽の河原」って言葉を思い出すわ……。"
1300805-6 = "専用の道具でもあればいいんだけど、装備は手袋と鎌だけだし……。"
1300805-7 = "[s] \"頑張ろう。\""
1300805-8 = "うん！ファイトだね、先生！始めよう！"
1300805-10 = "（一日中セリカと雑草をむしった）"
1300805-11 = "（日が暮れる頃にようやく片づけられた）"
1300805-13 = "終わり～！これぐらい取れたらOKね！"
1300805-14 = "よし、先生もなかなかやるわね？肉体労働に慣れてるみたいじゃない？"
1300805-15 = "あうう……腰が痛い。"
1300805-16 = "こういうゴミ拾いとか、環境美化のバイトは放課後にできるから好きだけど……時給は良くなさそう。"
1300805-18 = "……もうこんなに暗くなってたんだ。帰ろう、先生。"
1300805-21 = "（セリカと並んで、痛む腰を押さえながら家に帰った）"
