[translation]
1300805-1 = "Capinar o parque"
1300805-2 = "Hoje vamos arrancar as ervas daninhas do parque! É um trabalho simples, mas bem chato."
1300805-3 = "Os lugares são aqui, ali e acolá."
1300805-4 = "Especialmente ali, está tudo muito crescido, então se não tirar pela raiz, vai crescer de novo rapidinho."
1300805-5 = "Olhar para essas ervas que crescem sem parar, não importa o quanto eu arranque... haa... Lembro até daquela expressão sobre o 'rio do submundo'."
1300805-6 = "Seria bom se tivéssemos ferramentas adequadas, mas só temos luvas e foices..."
1300805-7 = "[s] \"Vamos nos esforçar.\""
1300805-8 = "Sim! Vamos nessa, Sensei! Vamos começar!"
1300805-10 = "（Passei o dia todo arrancando ervas daninhas com a Serika）"
1300805-11 = "（Quando o sol começou a se pôr, finalmente terminamos）"
1300805-13 = "Acabou! Se conseguimos tirar tudo isso, está ótimo!"
1300805-14 = "Muito bem, Sensei, você até que manda bem, né? Parece que está acostumado com trabalho braçal?"
1300805-15 = "Auuu... minhas costas estão doendo."
1300805-16 = "Eu gosto de bicos como recolher lixo ou cuidar da limpeza do ambiente porque dá para fazer depois da aula, mas... o salário por hora não parece ser muito bom."
1300805-18 = "...Já ficou tão escuro assim. Vamos para casa, Sensei."
1300805-21 = "（Caminhei ao lado da Serika, segurando minhas costas doloridas enquanto voltávamos para casa）"
