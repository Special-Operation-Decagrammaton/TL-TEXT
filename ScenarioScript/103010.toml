[translation]
103010-1 = "Episódio 1; O Papel"
103010-4 = "Hyakkaryouran - Em algum lugar na Grande Planície Nevada"
103010-7 = "O lugar que a Niya falou... acho que já estamos chegando..."
103010-8 = "Err... a Izuna tem a impressão de que não vimos nenhum monstro faz um tempo... Será que é só impressão da Izuna?"
103010-9 = "É, eu também tô com essa impressão...#nou talvez não..."
103010-10 = "É-É verdade...!#nDesde que chegamos aqui, não encontramos mais nenhum inimigo."
103010-15 = "Presidente, o céu...!"
103010-16 = "Ah..."
103010-25 = "O céu..."
103010-27 = "V-Voltou à cor normal..."
103010-28 = "O Meu Senhor conseguiu! "
103010-30 = "Entendi..."
103010-32 = "Senhor Sensei, finalmente...!"
103010-36 = "U-Unyaaaah!?#nO-O quê!? Inimigos!?"
103010-37 = "N-Não... isso foi só um... tiro...!"
103010-44 = "……Então vocês não são inimigas.#nFoi mal."
103010-47 = "！！"
103010-48 = "Nnyah,"
103010-49 = "Você aponta uma arma pra gente e acha que um \"foi mal\" resolve!?"
103010-53 = "……Peraí, ué?"
103010-55 = "Quem é você...!?"
103010-57 = "E quem são vocês...?#nAté parecem alunas da Hyakkaryouran, mas... o que vieram fazer aqui?"
103010-58 = "N-Nós somos..."
103010-59 = "A Izuna e suas amigas precisam falar com a Presidente da Hyakkaryouran, e estamos procurando o \"Templo do Crepúsculo\"! Nin-nin!"
103010-60 = "S-Sim... é isso mesmo.#nFoi um pedido do... \"Sensei da Schale\"."
103010-62 = "……Saquei."
103010-69 = "Aah!! Lembrei!"
103010-71 = "P-Presidente...?"
103010-73 = "Essa roupa... eu já vi antes!!"
103010-78 = "É o uniforme da Hyakkaryouran, né? Não é!?"
103010-85 = "Ehh! Da Hyakkaryouran...!? "
103010-86 = "Então... você é a...?"
103010-88 = "Não, espera aí..."
103010-89 = "Você não é a Ayame, que era a Presidente da Hyakkaryouran, né? Ela não era do tipo fria e distante, tava mais pra uma garota super alegre e extrovertida."
103010-90 = "……Ah, mas, pensando bem, a Vice-Presidente tinha uma vibe de garota mais fechada e introvertida, né?#nAs duas pareciam o yin e o yang quando tavam juntas!"
103010-92 = "A Vice-Presidente?"
103010-93 = "Então... você seria a Vice-Presidente da Hyakkaryouran...?"
103010-95 = "Não, não sou."
103010-97 = "……Ehh, mentira!?"
103010-99 = "Já disse que não. Escuta o que eu tô falando."
103010-100 = "Não, não, peraí! Essa roupa é o uniforme que só a Hyakkaryouran pode usar, não é!?#nEntão, onde diabos você arrumou isso?"
103010-101 = "Isso aqui é――"
103010-102 = "――Cosplay."
103010-104 = "Entendo..."
103010-105 = "Então era isso...!#nMe desculpe, confundi você com――"
103010-107 = "Não, não, não!#nComo se fosse ter uma coincidência tão conveniente assim!?"
103010-108 = "Pior que tem, sim."
103010-109 = "Uma cosplayer viaja pra qualquer lugar pra tirar a foto perfeita, seja a Grande Planície Nevada de Hyakkaryouran, o vasto deserto de Abydos ou o vasto oceano da Odisseia."
103010-111 = "O-Ooh... É o exemplo perfeito de uma cosplayer!"
103010-112 = "I-Incrível...!"
103010-114 = "S-Se for esse o caso..."
103010-115 = "Claro que não!#nVocê não tá nem com uma câmera nas mãos!"
103010-117 = "É que..."
103010-118 = "Não precisa de câmera.#nAs lembranças realmente importantes, a gente tira foto com a câmera do coração."
103010-120 = "Peraí... se é cosplay, a câmera do coração não consegue tirar foto de si mesma, né?"
103010-121 = "Será que... ela tá só inventando desculpas...?"
103010-123 = "……！"
103010-124 = "……Uuu."
103010-126 = "P-Presidente! Ela com certeza deve ter os motivos dela!"
103010-127 = "Ah, não, eu não queria te ofender nem nada...#nÉ que eu só achei estranho você estar sem câmera...#nPensei até em te emprestar a minha, sabe~..."
103010-129 = "Mas, eu............"
103010-134 = "……*Sniff*."
103010-136 = "Com licença... V-Você está bem...?"
103010-137 = "Eu acho que tá tudo bem... Só de vestir uma roupa diferente, o nosso humor já pode mudar..."
103010-138 = "……Me deixem em paz."
103010-140 = "F-Foi mal, desculpa aí..."
103010-142 = "Eu sou Goryou Nagusa."
103010-143 = "Vice-Presidente da Hyakkaryouran――Tô aqui sozinha por uns motivos aí."
103010-144 = "……Sabia que era da Hyakkaryouran!!"
103010-145 = "Já entendi o que vocês querem. Mas é inútil, podem ir embora."
103010-146 = "M-Mas por quê...!?"
103010-147 = "Já faz muito tempo que o \"Templo do Crepúsculo\" foi destruído.#nA essa altura, já deve tá enterrado debaixo da neve."
103010-149 = "……C-Como assim."
103010-151 = "Então, não tem como encontrar a Presidente――"
103010-153 = "Não tem. "
103010-154 = "Então vão embora.#n……E por favor, não contem a ninguém que me viram aqui. "
103010-155 = "M-Mas nós estamos aqui a pedido da \"Schale\"..."
103010-156 = "Schale... já ouvi esse nome antes..."
103010-157 = "Se bem me lembro――#nNão, nesse caso..."
103010-161 = "Quero que entreguem isso ao Sensei."
103010-163 = "……Um pergaminho? Parece bem velho."
103010-164 = "……Também não sei o que tá escrito aí."
103010-165 = "Na verdade, quem devia fazer isso era a Presidente――#nA Ayame... mas eu ouvi dizer que ela deixou uma mensagem pro Sensei da Schale."
103010-166 = "Q-Quem disse isso...?#nE como essa pessoa sabia que viríamos até aqui..."
103010-167 = "……。 "
103010-171 = "Bom, tá entregue."
103010-176 = "Ela foi embora..."
103010-177 = "O que será que tá escrito aqui?"
103010-178 = "S-Será que não tem problema a gente ler? "
103010-179 = "Ah, não deve dar nada.#nEla não disse que a gente não podia olhar..."
103010-183 = "Vejamos――"
103010-195 = "[ns] \"Shiroko...?\""
103010-196 = "……。 "
103010-197 = "……Sensei, você chegou até aqui. Não esperava menos de você."
103010-198 = "Mas, não dá pra mudar o futuro.#nO fim de Kivotos já está decidido."
103010-199 = "[s] \"Espera...! A Shiroko, na verdade...\""
103010-200 = "――Não."
103010-201 = "[s] \"…………！！\""
103010-202 = "Eu não estou sendo controlada pelo Chroma... Não é isso, Sensei."
103010-206 = "Esta é a minha própria \"vontade\". "
103010-207 = "Guiar este mundo até o futuro predestinado――eu só assumi esse papel.#nO Chroma não passa de um meio para isso."
103010-208 = "……Na verdade, sou eu quem está usando o Chroma."
103010-209 = "[s] \"……！！\""
103010-210 = "O meu papel é guiar todas as vidas para o \"Além\"――#n――Esse é o futuro que foi decidido no exato momento em que Sunaookami Shiroko passou a existir neste mundo."
103010-217 = "Não se pode mudar um destino já traçado――essa é a regra deste mundo."
103010-218 = "……Mas, eu não quero te machucar, Sensei.#nPor isso, eu quero que você vá embora de Kivotos."
103010-219 = "Assim, eu não vou precisar apontar minha arma pra você."
103010-220 = "[s] \"Shiroko…………。\""
103010-221 = "……Ter te trazido \"aqui em Kivotos\" logo no começo,#ne me despedir de você no final――acho que esse é o \"papel\" que faz parte da minha essência."
103010-228 = "E quando esse momento chegar... eu não vou hesitar."
103010-229 = "Por isso――"
103010-237 = "Sensei, temos um problema!!"
103010-238 = "Uma nova reação de energia está sendo detectada por toda Kivotos agora mesmo――"
103010-245 = "……Guh!?"
103010-256 = "V-Você é de Abydos...!? "
103010-257 = "Ué! A Rin-senpai acabou de atirar!? Isso é super raro! O que aconteceu!?"
103010-258 = "U-Um intruso!#nE-Eu já pedi reforços...!!"
103010-263 = "Intruso?"
103010-267 = "――H-hã...?"
103010-273 = "……S-Shiroko... senpai...?"
103010-275 = "……。"
103010-280 = "[ns] \"Espera, Shiroko!!\""
103010-281 = "Por favor, espere, Sensei!#nVocê não pode ir atrás dela!!"
103010-282 = "Uwah, o quê!?"
103010-285 = "[ns] Pulo para o espaço onde Shiroko desapareceu."
103010-311 = "……。"
103010-312 = "[ns] （Onde eu estou...?）"
103010-317 = "[ns] \"……！！\""
103010-319 = "[ns] \"Então você é o 'Guia' do Chroma...!?\""
103010-329 = "――Sensei!!"
103010-330 = "Uwah!? Sensei, você tá bem?"
103010-332 = "S-Sensei... A Shiroko-senpai... O que diabos..."
103010-334 = "A-A passagem... desapareceu... "
103010-340 = "Shiroko-senpai――!!"
103010-342 = "Próximo episódio; Anomalia"