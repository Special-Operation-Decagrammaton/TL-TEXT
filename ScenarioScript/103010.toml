[translation]
103010-1 = "Episódio 1; Papel"

103010-4 = "Hyakki Yagyo/Em algum lugar no Grande Campo de Neve"

103010-7 = "O lugar que Niya mencionou... acho que estará chegando em breve..."

103010-8 = "Bem... eu não vejo o monstro há um tempo atrás... é apenas imaginação de Izuna?"

103010-9 = "Eu certamente não me sinto assim... acho que não vou fazer isso... acho que não vou fazer isso..."

103010-10 = "Ah, isso mesmo...! #nDesde que cheguei aqui, não encontrei nenhum inimigo."

103010-15 = "Gerente, o céu está...!"

103010-16 = "um……"

103010-25 = "O céu..."

103010-27 = "Além disso, de volta à cor original..."

103010-28 = "O Senhor fez isso acontecer!"

103010-30 = "Eu vejo..."

103010-32 = "Professor, finalmente...!"

103010-36 = "U-nyaaaaaaaaaaaaa! ? #nO que! ? inimigo! ?"

103010-37 = "Não... isso é apenas um tiro...!"

103010-44 = "...Ele não era um inimigo. #nSinto muito."

103010-47 = "! !"

103010-48 = "Nyaa,"

103010-49 = "Vou apontar uma arma para alguém e apenas dizer “desculpe”! ?"

103010-53 = "...O que?"

103010-55 = "[ruby=Que diabos]Que diabos[/ruby]...! ?"

103010-57 = "Você é assim...? #nVocê parece um estudante de Hyakki Yagyo, mas... qual é o seu propósito aqui?"

103010-58 = "N-nós..."

103010-59 = "Izuna e os outros têm algo a ver com o presidente do Comitê das Cem Flores e estão procurando pelo “Templo do Crepúsculo”! Ninnin!"

103010-60 = "Sim... isso mesmo. #nA pedido do "Professor da Placa de Petri"..."

103010-62 = "……Isso mesmo."

103010-69 = "Ah! ! Eu lembrei!"

103010-71 = "B-chefe...?"

103010-73 = "Esse olhar... parece familiar! !"

103010-78 = "É um uniforme cheio de flores, né? Isso mesmo! ?"

103010-85 = "Sim! Centenas de flores...! ?"

103010-86 = "Então... você...?"

103010-88 = "Não, espere..."

103010-89 = "Você não é Ayame, o presidente do comitê Hyakka Ryouran, é? Aquela garota era mais uma pessoa brilhante e alegre do que legal."

103010-90 = "...Ah, mas por outro lado, talvez o vice-presidente fosse uma pessoa meio obscura? #nO conjunto de duas pessoas é como yin e yang!"

103010-92 = "Vice-presidente, certo?"

103010-93 = "Então... você é o vice-presidente de Hyakka Ryouran...?"

103010-95 = "Não, isso não é verdade."

103010-97 = "...Sim, não! ?"

103010-99 = "Isso é diferente. Ouça as pessoas."

103010-100 = "Não, espere! Essa roupa é um uniforme que só Hyakka Ryoran pode usar! ? #nEntão, onde você conseguiu isso?"

103010-101 = "isso é--"

103010-102 = "--Cosplay."

103010-104 = "Eu vejo,"

103010-105 = "Isso mesmo...! #nDesculpe, é a pessoa errada――"

103010-107 = "Não, não, não! #nNão há como acontecer uma coincidência tão conveniente! ?"

103010-108 = "Sim, existe."

103010-109 = "Os cosplayers vão aos locais de filmagem para tirar uma foto milagrosa, seja nos grandes campos nevados de Hyakki Yagyō, no grande deserto de Abidos ou no grande oceano de Odisséia."

103010-111 = "Oh, oh... esse é um ótimo exemplo de cosplayer!"

103010-112 = "Uau, isso é incrível…!"

103010-114 = "Bem, se for esse o caso..."

103010-115 = "Não! #nVocê nem tem câmera!"

103010-117 = "isso é……"

103010-118 = "Você não precisa de uma câmera. #nMemórias verdadeiramente preciosas são capturadas com a câmera do seu coração."

103010-120 = "Não... é cosplay, então você não pode tirar fotos de si mesmo com sua câmera mental, certo?"

103010-121 = "Talvez... ele esteja dizendo algo inapropriado...?"

103010-123 = "...!"

103010-124 = "...Eca."

103010-126 = "B-boo! Tenho certeza que há algo errado com ela!"

103010-127 = "Ah, não, eu não queria machucar você...#nBem, eu só estava preocupado por não ter uma câmera...#nSe eu não tivesse uma, talvez devesse emprestá-la para você..."

103010-129 = "Mas eu......"

103010-134 = "G... Guss."

103010-136 = "Hum... está tudo bem...?"

103010-137 = "Eu acho que é bom... só usar uma fantasia pode mudar o seu humor..."

103010-138 = "... deixe-me em paz."

103010-140 = "Não, me desculpe..."

103010-142 = "Eu sou [ruby=Goryo]Miryo[/ruby]Nagusa."

103010-143 = "Vice-presidente da Cem Flores – Devido a algumas circunstâncias, estou aqui sozinho."

103010-144 = "...Afinal, estava cheio de centenas de flores! !"

103010-145 = "Eu entendo sua situação. Mas não adianta, então vá para casa."

103010-146 = "P-por que?...! ?"

103010-147 = "Já se passou muito tempo desde que o “Templo do Crepúsculo” foi destruído. #nAcho que já está enterrado na neve."

103010-149 = "...É isso."

103010-151 = "Então, como encontrar o presidente do comitê?"

103010-153 = "Não existe."

103010-154 = "Então vá para casa. #n...Além disso, por favor, não conte a ninguém que você me conheceu aqui."

103010-155 = "No entanto, solicitamos uma "placa de Petri"..."

103010-156 = "Placa de Petri... já ouvi esse nome antes..."

103010-157 = "Tenho certeza ――#nNão, nesse caso..."

103010-161 = "Quero que você entregue isso ao seu professor."

103010-163 = "...Rolar? É bem antigo."

103010-164 = "...Eu nem sei o conteúdo."

103010-165 = "Falando no original, a presidente do comitê---#nAyame fará isso...porque ouvi dizer que ela deixou uma mensagem para o professor da placa de Petri."

103010-166 = "Quem é você...? #nComo diabos viemos aqui..."

103010-167 = "……."

103010-171 = "Pois bem, eu dei para você."

103010-176 = "Eu fui embora..."

103010-177 = "O que isso diz?"

103010-178 = "Uau, podemos ler?"

103010-179 = "Bem, está tudo bem, certo? #nNão me disseram para não assistir..."

103010-183 = "vamos ver--"

103010-195 = "[ns] \"Shiroko...?\""

103010-196 = "……."

103010-197 = "...Sensei, você chegou até aqui. Como esperado."

103010-198 = "Mas você não pode mudar o futuro. #nÉ certo que o Kivotos chegará ao fim."

103010-199 = "[s] \"Espere...! Shiroko é na verdade-\""

103010-200 = "--diferente."

103010-201 = "[s] \"…………!!\""

103010-202 = "Não estou sendo manipulado pelas cores... Não, senhor."

103010-206 = "Esta é a minha própria "[ruby=ishi]essência[/ruby]"."

103010-207 = "Eu estava simplesmente encarregado de conduzir este mundo ao futuro designado. #nColor é apenas um dos meios."

103010-208 = "...Na verdade, posso estar usando mais cores."

103010-209 = "[s] \"...!!\""

103010-210 = "Meu papel é conduzir todas as vidas para "[ruby=aquele]outro lugar[/ruby]"――#n――[ruby=Sunao Okami]Este é o futuro que foi estabelecido quando Shiroko, o Lobo da Areia[/ruby] existia neste mundo."

103010-217 = "Você não pode mudar seu destino predeterminado – essa é a regra deste mundo."

103010-218 = "...Mas não quero machucar o professor. #nÉ por isso que quero que você saia de Kivotos."

103010-219 = "Dessa forma, você não terá que apontar a arma para o professor."

103010-220 = "[s] \"Shiroko………….\""

103010-221 = "...A primeira coisa que fiz foi levar minha professora para ``[ruby=here]kivotos[/ruby]'', e a última coisa que a vi foi a ``[ruby=yakuwari]essência[/ruby]'' que me foi dada, eu acho."

103010-228 = "Não importa quando essa hora chegar... não hesitarei."

103010-229 = "é por isso--"

103010-237 = "Professor, temos um problema! !"

103010-238 = "Atualmente, reações energéticas foram detectadas novamente em Kivotos..."

103010-245 = "...Droga! ?"

103010-256 = "Ah, você é de Abidos...! ?"

103010-257 = "Huh! Lin-senpai acabou de atirar! ? É muito raro! ? O que diabos aconteceu! ?"

103010-258 = "É um intruso! #n, acabei de solicitar suporte...! !"

103010-263 = "Você é um intruso?"

103010-267 = "--Ah...?"

103010-273 = "... Shiroko... Senpai...?"

103010-275 = "……."

103010-280 = "[ns] \"Espere, Shiroko!!\""

103010-281 = "Por favor, espere, senhor! #nNão persiga ela! !"

103010-282 = "Uau, o que! ?"

103010-285 = "[ns] Salte para o espaço onde Shiroko desapareceu."

103010-311 = "……."

103010-312 = "[ns] (Onde é isso...?)"

103010-317 = "[ns] \"...!!\""

103010-319 = "[ns] \"Você é o [ruby=Hoje] líder[/ruby] da "cor"...! ? \""

103010-329 = "---Sensei! !"

103010-330 = "Uau! ? Professor, você está bem?"

103010-332 = "Bem, sensei... Shiroko-senpai... que diabos..."

103010-334 = "E-a passagem... desapareceu..."

103010-340 = "Shiroko-senpai ――! !"

103010-342 = "Próxima vez; estranho"

