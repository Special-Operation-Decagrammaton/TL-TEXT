[translation]
103010-1 = "第1話;役割"
103010-4 = "百鬼夜行・大雪原のどこか"
103010-7 = "ニヤが言ってた場所……もうすぐだと思うんだけど……"
103010-8 = "その……先ほどから、怪物の姿を見ないような……イズナの気のせいでしょうか？"
103010-9 = "たしかにそんな気も……#nするような……しないような……"
103010-10 = "そ、そうですね……！#nここに来てから、敵と会わなくなりました。"
103010-15 = "部長、空が……！"
103010-16 = "あ…… "
103010-25 = "空が……"
103010-27 = "も、元の色に……"
103010-28 = "主殿がやり遂げてくださったのですね！ "
103010-30 = "そっか……"
103010-32 = "先生殿、ついに……！"
103010-36 = "う、うにゃああぁっ！？#nな、何！？敵！？"
103010-37 = "い、いえ……これはただの、銃声……！"
103010-44 = "……敵じゃなかったんだ。#nごめんね。"
103010-47 = "！！"
103010-48 = "んにゃっ、"
103010-49 = "人に銃口を向けておいて「ごめん」で済ませるつもり！？"
103010-53 = "……って、あれ？"
103010-55 = "[ruby=なにやつ]何奴[/ruby]……！？"
103010-57 = "そういうあなた達は……？#n百鬼夜行の生徒に見えるけど……ここに一体何の用？"
103010-58 = "わ、私たちは……"
103010-59 = "イズナ達は、百花繚乱の委員長に用があり、「黄昏の寺院」を探しております！ニンニン！"
103010-60 = "はい……そう、です。#n「シャーレの先生」の、お願いで……。"
103010-62 = "……そうなんだ。"
103010-69 = "ああっ！！思い出した！"
103010-71 = "ぶ、部長……？"
103010-73 = "その格好……見覚えがあるよ！！"
103010-78 = "百花繚乱の制服だよね？そうでしょ！？"
103010-85 = "ええっ！百花繚乱……！？ "
103010-86 = "それでは……あなたが……？"
103010-88 = "いや、待って……"
103010-89 = "あなた、百花繚乱の委員長だったアヤメじゃないよね？あの子、クールっていうより、どっちかっていうとキラキラした陽キャっぽい感じだったし。"
103010-90 = "……あっ、でも逆に副委員長は陰キャっぽかったかも？#n二人セットで陰と陽みたいな！"
103010-92 = "副委員長、ですか？"
103010-93 = "それでは……あなたが百花繚乱の、副委員長なのでしょうか……？"
103010-95 = "ううん、違うよ。"
103010-97 = "……ええっ、うっそ！？"
103010-99 = "違うってば。人の話を聞いてよ。"
103010-100 = "いやいや待ってよ！その格好は百花繚乱だけが袖を通せる制服でしょ！？#nじゃあ、一体どこで手に入れたの？"
103010-101 = "これは――"
103010-102 = "――コスプレ。"
103010-104 = "なるほど、"
103010-105 = "そうだったのですね……！#nすみません、人違いで――"
103010-107 = "いやいやいや！#nそんな都合のいい偶然、あるわけないでしょ！？"
103010-108 = "ううん、あるよ。"
103010-109 = "コスプレイヤーは、奇跡の一枚のためなら百鬼夜行の大雪原だろうと、アビドスの大砂漠だろうと、オデュッセイアの大海洋だろうと、ロケに行くもの。"
103010-111 = "お、おお……コスプレイヤーの鑑ですね！"
103010-112 = "す、すごいです……！"
103010-114 = "そ、そういうことなら……"
103010-115 = "じゃなくて！#nあなた、カメラもなにも持ってないじゃない！"
103010-117 = "それは……"
103010-118 = "カメラはなくてもいいの。#n本当に大切な思い出は、心のカメラで撮影しているから。"
103010-120 = "いや……コスプレなんだから心のカメラじゃ自分の姿撮れなくない？"
103010-121 = "もしかして……適当なこといってたりするんじゃ……？"
103010-123 = "……！"
103010-124 = "……うう。"
103010-126 = "ぶ、部長！きっと、彼女にも何か事情があるのだと思います！"
103010-127 = "あ、いや、別に傷つけるつもりじゃ……#nその、カメラがない事が気になっちゃっただけで……#n持ってないなら貸そうかな～なんて……"
103010-129 = "でも、私は…………"
103010-134 = "っ……ぐすっ。"
103010-136 = "あの……だ、大丈夫でしょうか……？"
103010-137 = "私はいいと思いますよ……衣装を着る、だけでも気持ちが変わったりしますし……"
103010-138 = "……一人にして。"
103010-140 = "な、なんかごめん……。"
103010-142 = "私は[ruby=ごりょう]御稜[/ruby]ナグサ。"
103010-143 = "百花繚乱の副委員長――今は事情があって、一人でここにいるの。"
103010-144 = "……やっぱり百花繚乱だったんじゃん！！"
103010-145 = "あなた達の事情は分かった。でも、無駄だから帰って。"
103010-146 = "ど、どうしてですか……！？"
103010-147 = "「黄昏の寺院」は、破壊されてから随分と経つの。#n今はもう、雪に埋もれてしまってるんじゃないかな。"
103010-149 = "……そ、そんな。"
103010-151 = "じゃあ、委員長を探す方法は――"
103010-153 = "無いよ。 "
103010-154 = "だから帰って。#n……あと、ここで私と会ったことは誰にも言わないでほしい。 "
103010-155 = "で、ですが、私たちは「シャーレ」の要請で……"
103010-156 = "シャーレ……名前を聞いたことはあるけど……"
103010-157 = "たしか――#nいや、それなら……"
103010-161 = "これを先生に渡してほしい。"
103010-163 = "……巻物？ずいぶんと古いね。"
103010-164 = "……内容は私も知らない。"
103010-165 = "元はと言えば委員長――#nアヤメがやることだけど……彼女がシャーレの先生宛の言葉を残したと聞いたから。"
103010-166 = "ど、どなたが、ですか……？#n一体どうやって、私たちがここに来ることを……"
103010-167 = "……。 "
103010-171 = "それじゃ、渡したから。"
103010-176 = "行ってしまいました……"
103010-177 = "なんて書いてあるんだろ？"
103010-178 = "わ、私たちが読んでもいいのでしょうか？ "
103010-179 = "ま、大丈夫でしょ。#n見ちゃダメとは言われてないし……"
103010-183 = "どれどれ――"
103010-195 = "[ns] \"シロコ……？\""
103010-196 = "……。 "
103010-197 = "……先生、ここまで来たんだ。流石だね。"
103010-198 = "でも、未来を変えることはできない。#nキヴォトスが終焉を迎える事は、決まっている。"
103010-199 = "[s] \"待って……！シロコは、本当は――\""
103010-200 = "――違う。"
103010-201 = "[s] \"…………！！\""
103010-202 = "私は、色彩に操られてなんかない……違うよ、先生。"
103010-206 = "これは私自身の「[ruby=いし]本質[/ruby]」。 "
103010-207 = "この世界を、定められた未来へと導く――その役割を私が担当しただけ。#n色彩はその手段の1つに過ぎない。"
103010-208 = "……むしろ、私の方が色彩を利用しているのかも。"
103010-209 = "[s] \"……！！\""
103010-210 = "私の役割は、すべての命を「[ruby=あのよ]別の場所[/ruby]」に導くこと――#n――[ruby=すなおおかみ]これは砂狼シロコ[/ruby]が、この世界に存在した時点で確定した未来。"
103010-217 = "定められた運命を変えることはできない――それが、この世界のルール。"
103010-218 = "……でも、私は先生を傷つけたくない。#nだから、キヴォトスからいなくなってほしい。"
103010-219 = "そうすれば、先生に銃を向けなくて済む。"
103010-220 = "[s] \"シロコ…………。\""
103010-221 = "……最初に先生を「[ruby=ここ]キヴォトス[/ruby]」に導いたのも、#n最期を見送るのも――それが、私に与えられた「[ruby=やくわり]本質[/ruby]」なんだと思う。"
103010-228 = "いつ、その時が来たとしても……私は迷わないよ。"
103010-229 = "だから――"
103010-237 = "先生、問題が発生しました！！"
103010-238 = "現在、キヴォトス全域でエネルギー反応が再び検知され――"
103010-245 = "……くっ！？"
103010-256 = "あ、あなたはアビドスの……！？ "
103010-257 = "えっ！今、リン先輩が撃ったの！？めっちゃレアじゃん！？一体どうしたの！？"
103010-258 = "し、侵入者です！#nい、今、応援を要請しました……！！"
103010-263 = "侵入者、ですか？"
103010-267 = "――あ、れ……？"
103010-273 = "……し、シロコ……先輩……？"
103010-275 = "……。"
103010-280 = "[ns] \"待って、シロコ！！\""
103010-281 = "お待ちください先生！#n彼女を追ってはなりません！！"
103010-282 = "うわっ、何！？"
103010-285 = "[ns] シロコが消えた空間に飛び込む。"
103010-311 = "……。"
103010-312 = "[ns] （ここは……？）"
103010-317 = "[ns] \"……！！\""
103010-319 = "[ns] \"あなたが、「色彩」の[ruby=きょうどうしゃ]嚮導者[/ruby]……！？\""
103010-329 = "――先生っ！！"
103010-330 = "わわっ！？先生、大丈夫？"
103010-332 = "せ、先生……シロコ先輩は……いったい……"
103010-334 = "つ、通路が……消えて、しまいました…… "
103010-340 = "シロコ先輩――！！"
103010-342 = "次回;異変"
