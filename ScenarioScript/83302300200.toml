[translation]
83302300200-6 = "どうしたの、アコ？ちょうど風紀委員会に戻ったところだけど。"
83302300200-7 = "い、委員長……！大変です！"
83302300200-8 = "先ほどゲヘナ公園に、ものすごく巨大な怪物……？が現れたと通報が入りまして……！"
83302300200-9 = "何を言っているのか理解できないと思いますが……！"
83302300200-10 = "……なんとなく分かった。"
83302300200-11 = "そうですよ――"
83302300200-12 = "はい……？"
83302300200-13 = "公園の位置を教えて、すぐに向かう。"
