[translation]
1010602-1 = "努力の成果"
1010602-2 = "シャーレ・休憩室"
1010602-3 = "（休憩室の掃除をしていると……）"
1010602-10 = "……ふふっ。"
1010602-14 = "[ns1] \"……サクラコさん？\"\n[ns2] \"予想はしてたけど……。\""
1010602-17 = "やはり、先生は驚かないのですね。"
1010602-18 = "……これが、私の成果です。"
1010602-19 = "皆様とお近づきになれるよう、積み上げてきた努力が……。"
1010602-20 = "ようやく実を結び――"
1010602-21 = "……何だか見覚えがある、と？"
1010602-22 = "それは、どういった意味で……。"
1010602-30 = "[ns3] （あの話をするのはやめておこう……）\n[ns4] \"な、何でもないよ！\""
1010602-33 = "そ、そうですか……？#nどことなく、気を遣われたような気が……。"
1010602-34 = "とにかく、先生を訪ねたのは努力の成果をお話しようと思ったからです。"
1010602-35 = "今までは助けを求めるばかりでしたが……。"
1010602-36 = "今回は違います。#n……これで、ようやく私は自信を持って皆様を引っ張っていけるでしょう。"
1010602-37 = "……ええ、リーダーとして一歩前進したのです。"
1010602-38 = "このアイドルのれいそ……。"
1010602-39 = "……衣装で！"
1010602-40 = "[s5] \"れいそ……？\"\n[s6] \"今、礼装って言いかけてなかった？\""
1010602-43 = "……気のせいです。"
1010602-44 = "こほん……。"
1010602-45 = "この衣装を着るようになってから、皆様の反応が変わりました。"
1010602-46 = "避けられている感じはなく、#nむしろ声をかけていただく機会が増えたのです。"
1010602-47 = "どんなに頑張っても叶わなかったというのに、#nこんなにもあっさり手に入るとは……。"
1010602-48 = "そこで気がついたのです。#n本質も大事ではありますが……。"
1010602-49 = "……時にはイメージも重要なのだと！"
1010602-50 = "[s7] \"……おお。\"\n[s8] \"たしかに大事だよね。気づいてくれて嬉しいよ！\""
1010602-53 = "ええ、そうなのです。"
1010602-54 = "何日か試しにアイドルのれいそ……いえ、衣装で過ごしてみたところ、#n思った以上に効果がありました。"
1010602-55 = "この衣装は繊細ですし、#nどこかに引っ掛けたりしないか気にしながら過ごさなくてはいけませんが……。"
1010602-56 = "皆様と距離が近づいたのですから、贅沢は言ってられません。"
1010602-57 = "これからも、アイドルの格好で過ごそうと思っております。"
1010602-58 = "[s9] \"うん。\"\n[s10] \"良かったね、サクラコ。\""
1010602-61 = "これからも先生には、色々とご迷惑をおかけするかもしれませんが……。"
1010602-62 = "以前からの悩みが解決して、ホッとしております。"
1010602-63 = "あらためて、お礼を申し上げます。"
1010602-64 = "……ありがとうございました、先生。"
1010602-65 = "[s11] \"またいつでも相談してね。\"\n[s12] \"明るい報告が聞けて、私も嬉しいよ。\""
1010602-68 = "どうやら、しばらく忙しくなりそうです。"
1010602-69 = "これから皆様の分の衣装まで作成するのですから。"
1010602-73 = "[ns13] \"……えっ？\"\n[ns14] \"……全員の衣装を用意するの？\""
1010602-76 = "[ns15] \"まさか……。\"\n[ns16] \"シスターフッドが全員アイドルに！？\""
1010602-79 = "……ええ。"
1010602-80 = "そのつもりですが、なぜそんなに驚いて……？"
1010602-81 = "皆様のお話を聞く立場として、#n少しでも距離感は近いほうが良いでしょうし……。"
1010602-82 = "せっかくですから、全員で取り入れようかと思ったのです。"
1010602-83 = "――！？"
1010602-84 = "どうしていきなり手を……！？"
1010602-85 = "せ、先生……！"
1010602-87 = "（サクラコを連れて全力でシスターフッドへ向かうと……）"
1010602-88 = "（発注書を持って困っているシスターがいた）"
1010602-89 = "（何とかサクラコを説得し、「シスターフッドアイドル化計画」を中止させた）"
