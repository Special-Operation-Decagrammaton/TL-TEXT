[translation]
10041020-1 = "第2話;役割分担"
10041020-9 = "……ふぅ。"
10041020-10 = "なんとか戻れたか。#n遅れてはいないようだ。"
10041020-11 = "そこにトリニティ生もいる。この列に混ざれば自然だろうか。"
10041020-12 = "気づかれぬように調査を進めるのは手間だが……。"
10041020-16 = "致し方ない。自分で決めたことだからね。"
10041020-17 = "さて……。"
10041020-22 = "あっ！ティーパーティーさん見っけ！探したよ～？"
10041020-31 = "今までどこに居たの？"
10041020-32 = "移動や見学は自由だが、護衛がついていることを忘れないで欲しい。#n急に姿を消さないでくれ。"
10041020-33 = "会場付近は比較的安全ではあるが……。"
10041020-34 = "ご自身の立場を、弁えてもらえると助かる。どこかへ行く時にはひと言くれ。"
10041020-36 = "済まない。少し道に迷っていたんだ。"
10041020-40 = "ところで、先生の姿が見えないようだが……？"
10041020-45 = "ご主人様？ご主人様はねー。"
10041020-47 = "（……ご主人様？）"
10041020-50 = "せ、先輩……！今は「先生」……！！"
10041020-52 = "（……？？）"
10041020-53 = "（先生、君は彼女たちと一体何を……？）"
10041020-58 = "あっ、そうだ先生！先生は他校生の面倒を見てて忙しいんだって！"
10041020-59 = "トリニティ総合学園の生徒を引率しているらしい。"
10041020-60 = "あなたなら把握しているものだと思ったが、意外だな。"
10041020-66 = "……引率？"
10041020-70 = "……そうか。なるほど。"
10041020-75 = "（しかし、なぜ先生が……？）"
10041020-76 = "（わざわざ……）"
10041020-81 = "いや、先生のことだ。何か考えがあるのだろう。"
10041020-82 = "どうかしたの？"
10041020-83 = "顔色があんまよくないよ？"
10041020-84 = "いや……むしろ、足取りが軽くなったよ。"
10041020-85 = "自由の身になったからには、楽しい時間を送るべきだろう。"
10041020-89 = "君たちと行動を共にすれば良いのだね。"
10041020-91 = "そっ！よろしくね～！"
10041020-92 = "よろしく頼む。他のメンバーも、ここには居ないがそれぞれの持ち場でサポートする。"
10041020-98 = "お呼びですか？"
10041020-99 = "気にしなくて大丈夫ですよ。#nトキさんは引率に集中していただければと。"
10041020-100 = "なるほど……承知しました。"
10041020-109 = "……そういうことだから、思う存分EXPOを楽しんでくれ。"
10041020-111 = "君たちの噂は私も知るところだ。頼りにしているよ。"
10041020-112 = "では――"
