[translation]
10041020-1 = "Episódio 2: Divisão de Tarefas"
10041020-9 = "……Ufa."
10041020-10 = "Consegui voltar, pelo visto. #nNão parece que estou atrasada."
10041020-11 = "Tem alunas da Trinity ali também. Será que se eu me misturar à fila, passarei despercebida?"
10041020-12 = "É trabalhoso investigar sem ser notada, mas……."
10041020-16 = "Não tem jeito. Foi uma decisão minha, afinal."
10041020-17 = "Bem……."
10041020-22 = "Ah! Achei a Tea Party! Estávamos te procurando, sabia?"
10041020-31 = "Onde você estava até agora?"
10041020-32 = "Você é livre para circular e visitar o local, mas não se esqueça de que tem uma escolta. #nNão desapareça de repente."
10041020-33 = "A área do evento é relativamente segura, mas……."
10041020-34 = "Eu agradeceria se você tivesse consciência da sua posição. Avise-nos antes de ir a qualquer lugar."
10041020-36 = "Peço desculpas. Acabei me perdendo um pouco."
10041020-40 = "Aliás, não estou vendo o Sensei por aqui……?"
10041020-45 = "O Mestre? O Mestre está, bem……."
10041020-47 = "(……Mestre?)"
10041020-50 = "Se-Senpai……! Agora é \"Sensei\"……!!"
10041020-52 = "(……？？)"
10041020-53 = "(Sensei, o que exatamente você está fazendo com elas……?)"
10041020-58 = "Ah, é verdade, Sensei! Disseram que o Sensei está ocupado cuidando de alunas de outras escolas!"
10041020-59 = "Parece que ele está guiando as alunas da Academia Trinity."
10041020-60 = "Pensei que você já soubesse disso, que inesperado."
10041020-66 = "……Guiando?"
10041020-70 = "……Entendo. Faz sentido."
10041020-75 = "(Mas por que o Sensei……?)"
10041020-76 = "(Se deu ao trabalho de……)"
10041020-81 = "Não, sendo o Sensei, ele deve ter algum plano em mente."
10041020-82 = "Aconteceu alguma coisa?"
10041020-83 = "Você não parece muito bem."
10041020-84 = "Não…… na verdade, sinto-me mais leve agora."
10041020-85 = "Já que estou livre, devo aproveitar o tempo da melhor forma."
10041020-89 = "Então, acho que vou acompanhar vocês."
10041020-91 = "Isso! Contamos com você!"
10041020-92 = "Conto com vocês. As outras integrantes não estão aqui, mas darão suporte em suas respectivas posições."
10041020-98 = "Chamou?"
10041020-99 = "Não precisa se preocupar. #nToki-san, por favor, concentre-se apenas em guiar as alunas."
10041020-100 = "Entendido…… compreendido."
10041020-109 = "……É isso, então aproveitem a EXPO ao máximo."
10041020-111 = "Eu também conheço a reputação de vocês. Conto com vocês."
10041020-112 = "Então――"
