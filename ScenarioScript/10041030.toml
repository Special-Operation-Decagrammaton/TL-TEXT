[translation]
10041030-1 = "Episódio 3: A Ansiedade de Rio"
10041030-6 = "――1 hora atrás."
10041030-9 = "Após a partida de Seia, no esconderijo de Rio."
10041030-12 = "……."
10041030-17 = "……?"
10041030-21 = "Por que ficou em silêncio de repente... Está preocupada com algo?"
10041030-26 = "……Não me lembro de ter expressado qualquer preocupação."
10041030-27 = "Está estampado na sua cara."
10041030-28 = "Será que... não é apenas um equívoco seu?"
10041030-29 = "……Não, não é."
10041030-34 = "……Será que estava tão óbvio assim?"
10041030-35 = "Tem duas coisas que eu odeio profundamente. Uma é começar a falar algo e parar no meio. A outra é――"
10041030-36 = "Não tenho a intenção de te irritar."
10041030-37 = "Eu sei, e é justamente por isso que estou irritada."
10041030-38 = "Haa……."
10041030-39 = "Sério, para com essa aura de 'adivinhe o que estou pensando'."
10041030-40 = "Se tem algo a dizer, fale logo! Essa troca de palavras é inútil, não acha?"
10041030-42 = "Isso é... verdade, mas..."
10041030-43 = "Mas... também é um fato que não consigo prever suas reações. #nPor isso, preciso coletar mais informações antes de..."
10041030-45 = "Precisa mesmo coletar informações!? Pode ser apenas uma hipótese, não pode?!"
10041030-49 = "Se não vai falar, então eu não vou saber de nada!"
10041030-50 = "Um momento mais apropriado para――"
10041030-51 = "Só tem nós duas aqui, com o que você está tão preocupada?!"
10041030-52 = "Nós duas, apenas..."
10041030-56 = "Será que está tudo bem... desse jeito?"
10041030-57 = "Ah, chega, que coisa enrolada... Sério, se não fosse você, eu não estaria aqui aguentando isso!"
10041030-58 = "Até quando vai ficar hesitando?"
10041030-63 = "Se eu não tivesse a intenção de ajudar desde o início, não estaria aqui. #nNão importa o que você diga, não vou desistir agora."
10041030-64 = "Se algo for impossível, eu vou te avisar, então fale logo!"
10041030-66 = "……Entendido."
10041030-67 = "Uma variável que não estava no plano original: Seia Yurizono."
10041030-69 = "Imaginei. E então?"
10041030-70 = "Está preocupada que ela faça algo errado? Ou sentiu que ela percebeu nossos movimentos?"
10041030-71 = "Não. Eu confio no pensamento e na personalidade dela. Por causa da nossa posição, não tenho outra escolha."
10041030-72 = "Ela é, sem dúvida, um elemento 'positivo'."
10041030-73 = "Pelo menos, prevejo que, independentemente de suas ações, ela não agirá de forma negativa."
10041030-74 = "Hã? Então qual é o problema?"
10041030-75 = "……O problema é o interior dela."
10041030-81 = "A Seia Yurizono de agora... tinha uma atmosfera diferente da que eu conhecia."
10041030-84 = "Ela agia como se estivesse sendo perseguida por algo... como se sentisse uma certa pressa."
10041030-85 = "O fato de ela ter mencionado 'provar a si mesma'. #nE o fato de evitar esse assunto mesmo estando com o Sensei... é antinatural."
10041030-88 = "É verdade... na maioria das vezes, as coisas fluem melhor quando confiamos no Sensei."
10041030-89 = "Francamente, essa história de provar a si mesma ou qualificações, que bobagem."
10041030-90 = "É o tipo de coisa que gente sem identidade costuma dizer."
10041030-91 = "……De qualquer forma."
10041030-92 = "Mesmo tendo perdido seus poderes, a intuição dela não pode ser ignorada. #nPode acabar sendo uma fonte de informação útil."
10041030-93 = "Ainda assim, devemos considerá-la apenas como um 'plus'. #nNão podemos construir um plano que dependa dela desde o início."
10041030-94 = "Embora a proposta dela seja bem-vinda, seguiremos conforme o planejado originalmente."
10041030-98 = "Poderia ir ao 'Centro de Dados do Millennium' e verificar os dados do período de preparação?"
10041030-99 = "Centro de dados, hein. É o lugar com a segurança mais rigorosa desta academia, não é?"
10041030-100 = "Alguém comum nem conseguiria chegar perto, eu acho."
10041030-101 = "Eu calculei que seria possível para a Neru Mikamo, não é?"
10041030-105 = "……Ha!"
10041030-106 = "Ei, ei, olha só, você até que sabe dizer coisas fofas de vez em quando! Não existe nada impossível para mim."
10041030-107 = "Rio, fique aqui esperando tranquilamente."
10041030-111 = "……Eu já volto."
