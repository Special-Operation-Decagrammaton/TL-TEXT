[translation]
10041030-1 = "第3話;リオの不安"
10041030-6 = "――1時間前。"
10041030-9 = "セイアの出発後、リオの隠れ家にて。"
10041030-12 = "……。"
10041030-17 = "……？"
10041030-21 = "んだよ急に黙り込んで……何か不安なのか？"
10041030-26 = "……不安を口にした覚えなどないのだけれど。"
10041030-27 = "顔に出てんだよ。"
10041030-28 = "まさか――貴女の勘違いではなくて？"
10041030-29 = "……いえ、違うわね。"
10041030-34 = "……顔に出ていたかしら。"
10041030-35 = "あたしが死ぬほど嫌いなことが二つあってな。一つは、何か話そうとして途中でやめること。もう一つは――"
10041030-36 = "怒らせるつもりはないの。"
10041030-37 = "分かってるから逆に腹立ってんだよ。"
10041030-38 = "はぁ……。"
10041030-39 = "マジでその察してオーラやめろよな。"
10041030-40 = "言いてえことがあんなら早くしろ！このやり取り、不毛だろうがよ。"
10041030-42 = "それは……そうだけれど……。"
10041030-43 = "でも……貴女の反応が予測できないのも事実。#nだからより情報を収集してから……"
10041030-45 = "情報収集する必要あるか！？仮定の話でいいだろうがよ！"
10041030-49 = "言わねえなら、あたしは知らねえからな！"
10041030-50 = "より適切なタイミングが――"
10041030-51 = "あたしらしかいないのに何をそんなに心配してんだよ！"
10041030-52 = "私たち、だけ……。"
10041030-56 = "いいのかしら……それで。"
10041030-57 = "あーもう、まどろっこしいな……マジでお前じゃなかったら、ここまで付き合ってないからな！？"
10041030-58 = "いつまでうじうじしてんだよ。"
10041030-63 = "最初から手伝うつもりがなかったらここにいねえよ。#nお前が何言おうと今更引くわけねえだろ。"
10041030-64 = "できねえことは言うからさっさと話せ！"
10041030-66 = "……分かったわ。"
10041030-67 = "当初の計画にはなかった変数――[ruby=ゆりぞの]百合園[/ruby]セイアのことよ。"
10041030-69 = "だろうな。で？"
10041030-70 = "何かやらかしそうで心配なのか？それともあたしらの動きを察知してる気配でも？"
10041030-71 = "いいえ。私は彼女の思考や性格を信頼しているわ。立場的にもそうならざるを得ない。"
10041030-72 = "彼女は間違いなく「プラス」の要素よ。"
10041030-73 = "少なくとも、その行動の如何によって、マイナスに働くことは無いと予測しているの。"
10041030-74 = "あん？じゃあ何が問題なんだよ？"
10041030-75 = "……問題は、彼女の内面。"
10041030-81 = "今の彼女は……私の知る百合園セイアとは、どこか雰囲気が違った。"
10041030-84 = "何かに追われているような……どこか焦りを感じているような言動をしているのよ。"
10041030-85 = "彼女の口から「自分の証明」という言葉を発したことも。#n先生と来ているのにその言及を避けていることも……不自然だわ。"
10041030-88 = "そうだな……大抵のことは先生を頼った方がスムーズに進むからな。"
10041030-89 = "ったく、証明だの資格だの、しょうもねえ。"
10041030-90 = "自分がねえやつらが言いそうな台詞だ。"
10041030-91 = "……とにかく。"
10041030-92 = "力を失ったとはいえ彼女の勘は無視できないわ。#n有用な情報源となるかもしれない。"
10041030-93 = "とはいえあくまで「プラスアルファ」と考えるべきよ。#n最初から彼女に頼った計画を立ててはならない。"
10041030-94 = "彼女の提案はありがたいけれど、私たちは当初の予定通りに進めるわ。"
10041030-98 = "「ミレニアムデータセンター」に向かって、準備期間のデータを確認して来てもらえるかしら。"
10041030-99 = "データセンターねぇ。この学園で一番セキュリティが厳しいとこだろ？"
10041030-100 = "並の奴なら近づくことすらできねえだろうな。"
10041030-101 = "[ruby=みかも]美甘[/ruby]ネルなら可能、という計算だったのだけれど？"
10041030-105 = "……ハッ！"
10041030-106 = "おいおい、たまには可愛いことも言えるじゃねえか！あたしに不可能はねえよ。"
10041030-107 = "リオはここでのんびり待っててくれ。"
10041030-111 = "……すぐ戻るからよ。"
