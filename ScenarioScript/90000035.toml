[translation]
90000035-2 = "Analisando o banco de dados da PMC..."
90000035-7 = "Chefe, encontrou algum dado útil?"
90000035-8 = "...Não, está completamente vazio."
90000035-9 = "Vazio?"
90000035-10 = "Sim, quase literalmente. Todas as informações no banco de dados foram criptografadas, restando apenas o histórico de envio para a sede."
90000035-11 = "Deve ser por segurança. Mas por que fariam isso?"
90000035-12 = "Pois é, é bem suspeito. Uma empresa militar privada se preocupar tanto com a segurança assim..."
90000035-13 = "...Que tal mudarmos o alvo para a sede?"
90000035-14 = "Você não disse que seria difícil invadir lá?"
90000035-15 = "Sim, o nível de dificuldade deve mudar um pouco."
90000035-20 = "...Um pouco de dificuldade não significa nada para esta garota hacker genial."
90000035-21 = "Como esperado da chefe. Embora eu ache que ser uma 'garota' não tenha relação com isso."
90000035-22 = "Tem tudo a ver, 'garotas' combinam muito bem com 'gênios'."
90000035-26 = "Bem, vamos ver o que tem dentro desses dados."
90000035-30 = "...Entendo."
90000035-31 = "Achou?"
90000035-32 = "Sim... registros de combate do Binah, e em grande quantidade."
90000035-33 = "A PMC estava lutando contra o Binah na área de escavação... não, esse padrão é..."
90000035-34 = "Como se a PMC estivesse defendendo a área para impedir que o Binah se aproximasse... talvez?"
90000035-35 = "Pois é, o que será que é isso..."
90000035-41 = "...Os dados sobre a própria 'área de escavação' estão protegidos de forma extremamente rigorosa. É um tipo de firewall que nunca vi antes..."
90000035-42 = "Será uma tecnologia nova? Que atrevimento... isso está ficando divertido."
90000035-43 = "O padrão em si é uma senha de uso único... um algoritmo de números aleatórios? É do tipo que consome tempo fisicamente."
90000035-44 = "Ganhar tempo enquanto altera o padrão, entendo..."
90000035-45 = "Bem, acho que consigo resolver em umas 4 horas."
90000035-46 = "...Chefe, por que não procuramos o Binah por enquanto?"
90000035-47 = "Mas o espírito de garota hacker aqui está..."
90000035-48 = "Esse não é o nosso objetivo agora, né? E 'ser garota' não tem nada a ver com isso."
90000035-49 = "..."
90000035-50 = "[s](Ela ficou desanimada...)"
90000035-53 = "...É verdade. Agora, a prioridade máxima é perseguir o profeta de Decagrammaton. Deixarei isso para depois... hum..."
90000035-54 = "(...Ela é bem insistente, hein)"
90000035-55 = "Já entendi, não precisa me olhar assim. Não tem jeito, né."
90000035-56 = "Isso é o que eu deveria dizer."
90000035-63 = "[ns](Que relação estranha...)"
90000035-66 = "Próximo episódio: 'Coleta de Dados (4) Binah'"
