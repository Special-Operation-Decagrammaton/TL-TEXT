[translation]
90000035-2 = "PMCのデータベースを分析中……"
90000035-7 = "部長、何か使えそうなデータあった？"
90000035-8 = "……いえ、見事に空っぽですね。"
90000035-9 = "空っぽ？"
90000035-10 = "はい、ほとんど文字通りに。データベース内の全ての情報が暗号化されて、本社に送信した履歴だけがあります。"
90000035-11 = "セキュリティのためかな。でも、何でそんなことを？"
90000035-12 = "そうですね、かなり怪しいです。民間軍事会社がここまでセキュリティに気を遣うなんて……。"
90000035-13 = "……目標を、本社の方に変えましょうか。"
90000035-14 = "そっちは侵入しにくい、みたいなこと言ってなかった？"
90000035-15 = "そうですね、多少難易度は変わるでしょう。"
90000035-20 = "……「多少」の難易度ごとき、この美少女ハッカーにとっては無意味ですが。"
90000035-21 = "さすが部長。「美少女」は関係ないと思うけど。"
90000035-22 = "関係ありますとも、「美少女」は「天才」と相性が良いのです。"
90000035-26 = "さて、データの中身を見せていただくとしましょうか。"
90000035-30 = "……なるほど。"
90000035-31 = "あったね。"
90000035-32 = "はい……ビナーの戦闘記録、それもかなりの数の。"
90000035-33 = "PMCは発掘区域で、ビナーと戦っていた……いえ、このパターンは……"
90000035-34 = "ビナーが発掘区域に近づかないよう、PMCが防衛してた……みたいな？"
90000035-35 = "そうですね、一体これは……。"
90000035-41 = "……「発掘区域」そのものに関するデータ、やたらと厳重に守られてますね。初めて見るタイプのファイアウォール……"
90000035-42 = "新しい技術でしょうか、生意気ですね……楽しくなってきてしまいます。"
90000035-43 = "パターンそのものはワンタイムパスワード……乱数アルゴリズムですか。物理的に時間がかかるタイプですね。"
90000035-44 = "時間を稼ぎつつパターンを変える、と……なるほど。"
90000035-45 = "まあ4時間くらいで何とかなりそうです。"
90000035-46 = "……部長、とりあえずビナーを探さない？"
90000035-47 = "ですが、美少女ハッカー魂がですね……"
90000035-48 = "そっちは今の目標じゃないでしょ？「美少女」関係無いし。"
90000035-49 = "……。"
90000035-50 = "[s]（しゅんってなっちゃった……）"
90000035-53 = "……そうですね。今はデカグラマトンの預言者を追いかけることが最優先。これは後日に……ううん……。"
90000035-54 = "（……往生際が悪いなぁ）"
90000035-55 = "分かりましたから、そんな目で見ないでください。仕方ないですねぇ。"
90000035-56 = "それはこっちの台詞。"
90000035-63 = "[ns]（不思議な関係性だ……）"
90000035-66 = "次回;「データ収集（４）ビナー」"
