[translation]
84303100400-6 = "話は終わったのか？"
84303100400-7 = "あれっ、本当に戻ってきた！どっかで「もーいーよ！」って言うと思ったのに！"
84303100400-8 = "……言葉通りの意味だから深く考えないでくれ。"
84303100400-10 = "二人には世話をかけるね。いつか改めて礼をさせてほしい。"
84303100400-11 = "いや……そういうのは別に。"
84303100400-12 = "それより、次は何が見たい？まだ決めてないなら、近くを案内するが。"
84303100400-13 = "それか、他のトリニティ生に合流するのもいいかもしれない。"
84303100400-14 = "そうだな……一つ、気になっているところがあるんだ。"
84303100400-15 = "ゲーム開発部、なのだが。"
84303100400-16 = "ああ、あそこか。分かった。案内しよう。"
84303100400-17 = "オッケー！じゃあ行こっか！"
84303100400-18 = "……じゃないや。ゲーム開発部の部室？展示ブース？どっちがいい？"
84303100400-19 = "複数あるのだね……。"
84303100400-21 = "EXPOに出展したものが見たいなら展示ブースだな。"
84303100400-26 = "（……詳細を聞いておくべきだった）"
84303100400-27 = "（普通は会場を指すのだろうが……）"
84303100400-28 = "……部室から案内を頼めるかい？部員と話をしてみたいんだ。"
84303100400-32 = "……部室に行くのか？"
84303100400-33 = "行ってはならないのだろうか……？"
84303100400-34 = "いや、というよりも、もしそれなら私たちはいないほうが都合がいいだろう。"
84303100400-35 = "幸い、部室はこの近くだ。道順を伝える。"
84303100400-36 = "ありがとう。すぐに戻る。"
84303100400-38 = "私たちも色々見てるから、ごゆっくり～！"
84303100400-39 = "何かあればすぐに連絡をくれ。"
