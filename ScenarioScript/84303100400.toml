[translation]
84303100400-6 = "A conversa acabou?"
84303100400-7 = "Ué, você realmente voltou! Eu achei que em algum momento você ia dizer 'já pode aparecer!'"
84303100400-8 = "……É exatamente o que eu disse, então não pense demais nisso."
84303100400-10 = "Estou dando trabalho para vocês duas. Gostaria de agradecer formalmente algum dia."
84303100400-11 = "Não…… não precisa se preocupar com isso."
84303100400-12 = "Em vez disso, o que quer ver agora? Se ainda não decidiu, posso te guiar pelos arredores."
84303100400-13 = "Ou talvez seja melhor nos juntarmos a outras alunas de Trinity."
84303100400-14 = "Bem…… tem um lugar que me deixou curioso."
84303100400-15 = "O Departamento de Desenvolvimento de Jogos."
84303100400-16 = "Ah, aquele lugar. Entendido. Vou te guiar até lá."
84303100400-17 = "Ok! Então vamos nessa!"
84303100400-18 = "……Quer dizer, não. A sala do clube de Desenvolvimento de Jogos? Ou o estande de exibição? Qual você prefere?"
84303100400-19 = "Então existem vários……."
84303100400-21 = "Se quer ver o que eles expuseram na EXPO, então é o estande de exibição."
84303100400-26 = "（……Eu deveria ter perguntado os detalhes）"
84303100400-27 = "（Normalmente, isso se referiria ao local do evento, mas……）"
84303100400-28 = "……Pode me guiar até a sala do clube? Eu gostaria de conversar com as integrantes."
84303100400-32 = "……Você vai mesmo para a sala do clube?"
84303100400-33 = "Não deveria ir……?"
84303100400-34 = "Não, é que, se for esse o caso, seria melhor se nós não estivéssemos por perto."
84303100400-35 = "Felizmente, a sala do clube é aqui perto. Vou te indicar o caminho."
84303100400-36 = "Obrigado. Volto logo."
84303100400-38 = "Nós também vamos dar uma olhada em outras coisas, então aproveite!"
84303100400-39 = "Se precisar de qualquer coisa, entre em contato imediatamente."
