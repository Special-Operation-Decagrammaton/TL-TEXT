[translation]
2004603-1 = "Grandes árvores criam raízes em solo firme."
2004603-2 = "Departamento Yin-Yang de Hyakkiyako"
2004603-3 = "A senhorita Niya? Não deve haver nada de incomum acontecendo."
2004603-4 = "[ns1] \"NIYA!!!\"\n[ns2] \"Eu sabia que era isso!\""
2004603-7 = "Estou atendendo um visitante agora, então entrarei em contato assim que terminar... Ah!"
2004603-8 = "Já que está aqui, por que não observa nossas atividades?#nAssim, nem a chefe poderá fugir do trabalho. Fufufu..."
2004603-10 = "(Guiado por um membro do Departamento Yin-Yang que deixou escapar seus pensamentos sinceros, você começou a observar as atividades de Niya.)"
2004603-12 = "Nyahaha! Ouvi dizer que o festival desta vez foi um grande sucesso!#nNossa, estou realmente impressionada!"
2004603-13 = "Haha, as redes sociais são incríveis. Parece que o vídeo da apresentação viralizou, e as pessoas invadiram o festival."
2004603-14 = "E então... o que traz uma pessoa tão ocupada da Associação de Comerciantes — e ainda por cima um representante — aqui hoje?"
2004603-15 = "Ah, bem, é um problema bom de se ter... ou melhor, temos uma montanha de problemas com a limpeza pós-evento..."
2004603-16 = "A cidade está cheia de lixo, e muitos objetos foram quebrados..."
2004603-17 = "Entendo, entendo~ Então você quer a ajuda do Departamento Yin-Yang para limpar a bagunça?"
2004603-19 = "Sim, exatamente! Nossa, que bom que você entendeu rápido!"
2004603-20 = "Hmm, adoraríamos ajudar, mas... é um pouco difícil colaborar com isso..."
2004603-21 = "Hã!? O Departamento Yin-Yang não é o lugar que ajuda quem está em apuros?#nAh, por favor! Estamos realmente sem pessoal, só algumas pessoas já ajudariam..."
2004603-22 = "Sinto muito, mas isso está fora da nossa jurisdição~"
2004603-23 = "N-não pode ser..."
2004603-25 = "(E então, o próximo visitante chegou...)"
2004603-27 = "O-olá! Eu vim do Clube de Origami. P-por favor, nos ajude...!"
2004603-28 = "Que gentileza a sua~ Eu sou Amachi Niya, a chefe do Departamento Yin-Yang~"
2004603-29 = "Mas que visitante raro. O Clube de Origami não é aquele grupo de 'artesãos' que se tranca na sala do clube nas profundezas das montanhas para se dedicar ao artesanato em papel?"
2004603-30 = "A-artesãos? Que nada, isso é um exagero!#nNós só gostamos de origami... ehehe..."
2004603-31 = "Então, há algo em que possamos ajudar?#nAh, você trouxe alguma obra de origami para nós?"
2004603-33 = "Na verdade... eu queria saber se poderiam mudar nossa sala de clube..."
2004603-34 = "Como fica nas profundezas das montanhas, não tem luz nenhuma... Quando anoitece, fica tudo um breu. Recentemente, até dizem que tem fantasmas por lá!"
2004603-35 = "Comecei a achar que ouço sons estranhos na sala, e todos os membros estão com medo, não dá nem para realizar atividades...!"
2004603-36 = "Hoho~ Isso é... um problema bem complicado, não é?"
2004603-37 = "Vamos direto ao ponto.#n...Nós não podemos resolver isso."
2004603-38 = "Hã!? P-por que não!?"
2004603-39 = "Bem... tente imaginar um pouco... Como você se sentiria se o Departamento Yin-Yang chegasse de repente e dissesse para você desocupar sua sala porque outro clube vai usá-la?"
2004603-40 = "Hã!? B-bem, isso... seria horrível..."
2004603-41 = "É exatamente por isso~"
2004603-42 = "M-mas, e salas vazias...!"
2004603-43 = "Salas boas têm muita concorrência...#nAlém disso, o Departamento Yin-Yang não pode simplesmente distribuir salas como bem entende."
2004603-44 = "A menos que outro clube queira trocar de sala com vocês, não há nada que possamos fazer~"
2004603-45 = "N-não pode ser..."
2004603-47 = "(O último visitante entrou...)"
2004603-49 = "Ei! Você vai me explicar isso direito, não vai?"
2004603-50 = "Aquele festival outro dia! Como assim não vamos receber nem um centavo de pagamento?!"
2004603-51 = "Mesmo sendo figurante, eu tenho orgulho do meu trabalho!#nVocê está tirando sarro da minha cara?!"
2004603-52 = "Hmm... isso não seria uma questão de contrato com a Associação de Comerciantes?"
2004603-53 = "Hã? Não entendo muito desses detalhes, mas... o Departamento Yin-Yang não resolve tudo?"
2004603-54 = "Parece que um mal-entendido estranho está se espalhando ultimamente...#nNós só podemos intervir no que está sob nossa jurisdição~"
2004603-56 = "(Os visitantes foram embora de cabeça baixa.)"
2004603-58 = "Nyaha~ Desculpe pela espera~"
2004603-59 = "Você não faz ideia do susto que levei quando nossos olhos se cruzaram. #nSensei, é muita maldade sua ficar nos vigiando, sabia?"
2004603-60 = "[s3] \"Hmm...\"\n[s4] \"É sempre assim por aqui?\""
2004603-63 = "Sempre... ah, você quer dizer sobre o trabalho? Bem, mais ou menos. #nNyahaha~ é um papel que dá uma dor de barriga danada~"
2004603-64 = "...Sim, eu entendo perfeitamente o que você quer dizer."
2004603-65 = "Sobre como o trabalho é conduzido, não é?"
2004603-66 = "Imagino que o Sensei já tenha visto várias escolas, mas..."
2004603-67 = "Poderíamos dizer que este é o estilo do Departamento Yin-Yang~"
2004603-68 = "Não é como se eu estivesse fazendo um trabalho desleixado só porque quero ser preguiçosa, sabe?"
2004603-69 = "……Vamos caminhar um pouco?"
2004603-70 = "Daqui em diante, o assunto vai ficar um pouquiiinho entediante."
2004603-71 = "[s5] \"Tudo bem, mas...\"\n[s6] \"O que era aquela coisa tão problemática?\""
2004603-74 = "Ah, é que... uma jovem no auge da vida, sem tempo para aproveitar a juventude, sendo perseguida pelo trabalho..."
2004603-75 = "Essa foi uma história muito problemática, sim♪ Nyahaha~!"
2004603-77 = "(A rua costuma ser limpa, mas hoje há lixo espalhado por toda parte)"
2004603-78 = "Nyaha... é um estado vergonhoso para se mostrar, não é~"
2004603-79 = "O presidente da associação comercial disse que a limpeza não está dando conta."
2004603-80 = "Bem, mas o pessoal de Hyakkiyako é diligente."
2004603-81 = "Acho que, se deixarmos como está, logo voltará ao normal~"
2004603-82 = "Mas, deixando isso de lado, continuando a história..."
2004603-83 = "Vamos usar como base uma antiga lenda de Hyakkiyako..."
2004603-84 = "Era uma vez, em um lugar distante..."
2004603-89 = "……Quando a \"Academia Hyakkiyako\" ainda não era uma união, e sim..."
2004603-91 = "Continuava em uma era de guerra, onde cada um tinha seu distrito autônomo e se odiavam mutuamente."
2004603-92 = "Eventualmente, sob a bandeira de um clube, as disputas cessaram... e assim nasceu a atual \"Academia Hyakkiyako\". E viveram felizes para sempre~"
2004603-93 = "……Bem, teria sido muito mais fácil se tivesse terminado assim."
2004603-95 = "O que você acha de Hyakkiyako, Sensei~?"
2004603-96 = "[s7] \"Acho que é um lugar lindo.\"\n[s8] \"Não acho que seja tão pacífico assim.\""
2004603-99 = "Nyahahaha! É, né~?"
2004603-100 = "Como a flor de cerejeira que não sabe se estará aqui amanhã..."
2004603-101 = "Bela, porém efêmera... nem sequer é certo se estará aqui amanhã... acho que Hyakkiyako é assim."
2004603-102 = "Embora as grandes guerras entre escolas tenham acabado, as pequenas brigas entre alunos e clubes continuam acontecendo por toda parte."
2004603-103 = "Nesse meio, o poder que o Departamento Yin-Yang possui é algo vago e difícil de definir, que cada clube nos confia na forma de \"respeito\"..."
2004603-104 = "Na verdade, é até duvidoso se esse \"poder\" realmente existe~"
2004603-105 = "É extremamente inconveniente de lidar, sabe?"
2004603-106 = "Bem, por isso, eu fico torcendo para que os problemas se resolvam sozinhos..."
2004603-107 = "[s9] \"Não existem problemas que se resolvem sozinhos...\"\n[s10] \"No fim das contas, as coisas não dão certo, né...\""
2004603-110 = "Nyaha! O mundo não é tão fácil assim, né♪"
2004603-111 = "A Niya-sama sumiu de novo!"
2004603-112 = "O quê!? Mas tem uma pilha de coisas para ela fazer!?"
2004603-116 = "Ora, ora~ parece que minhas adoráveis subordinadas notaram."
2004603-117 = "Bem, por hoje é só. Com licença, vou indo na frente~"
2004603-119 = "(Dizendo isso, Niya partiu na direção oposta à sala do Departamento Yin-Yang)"
2004603-120 = "(...Por um tempo, as vozes dos membros do Departamento Yin-Yang procurando por Niya ecoaram por toda a cidade)"
