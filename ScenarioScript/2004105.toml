[translation]
2004105-1 = "デザイン"
2004105-5 = "こちら、ご注文の3DプリンターとABS樹脂ですね。"
2004105-6 = "ああ、そうでした。#nこちらにハンコをお願いします！"
2004105-17 = "こんばんは。"
2004105-18 = "……また助けられたわね。"
2004105-19 = "[s] \"注文、これで合ってる？\""
2004105-20 = "ええ、ありがとう。#n風通しの良いスペースはあるかしら……。"
2004105-21 = "3Dプリンターは、作業の工程で有害物質が発生してしまうのだけれどアジトは換気が難しいの。"
2004105-22 = "シャーレならまだ作業に適した部屋がある気がしているわ。#n提案、ありがとう先生。"
2004105-23 = "[s] \"どこが良いかな……。\""
2004105-32 = "[ns] \"ここはどう？\""
2004105-33 = "……大きな窓もあるし、条件は満たしている。"
2004105-34 = "それじゃあ、借りるわね。"
2004105-42 = "……稼働するわ。"
2004105-47 = "私たちは外にいましょう。#nここにいると、粉塵を吸い込んでしまう危険があるから。"
2004105-52 = "[ns] \"作ったものは、何に使うの？\""
2004105-53 = "具体的に使い道があるわけではないわ。#nただ、前はこうしてよく色々作っていたの。"
2004105-54 = "インダストリアルデザインというのは、機能性を担保しつつ合理的なものを追求していくもの。"
2004105-55 = "そういった「デザイン」を考える作業が、昔から苦ではなかった……それだけよ。"
2004105-56 = "[s] \"リオの趣味みたいなものなんだね。\""
2004105-57 = "趣味？"
2004105-58 = "……そう、かしら？"
2004105-59 = "そんな風に考えたことはなかったわ。"
2004105-60 = "……でも、趣味を持つというのは非合理的ね。"
2004105-61 = "利益を生み出す学問や仕事、そして訓練と違って――#n趣味は自分の好悪に従っているでしょう？"
2004105-62 = "つまるところ、入力にかけた労力に対して、出力が0に収束する行為。"
2004105-63 = "……私がそんなことをしても、大丈夫かしら？"
2004105-64 = "[s] \"いけない理由なんてないよ！\""
2004105-65 = "……そう？"
2004105-66 = "……ありがとう。"
2004105-71 = "そう……でも、懸念が残っているわ。"
2004105-72 = "貴方も薄々気づいてると思うのだけれど――"
2004105-73 = "私のデザインは、あまり肯定的に評価されたことがないの。"
2004105-74 = "機能性と合理性を追求した私のデザインは、#n受け入れられないようで……。"
2004105-75 = "……私は間違っているのかしら。"
2004105-76 = "おそらく……いえ、きっとそうね。"
2004105-77 = "世界は確率と統計で成り立っているわ。#nこの件においてのデータは私の過ちを指している。"
2004105-78 = "[ns] \"……！\""
2004105-80 = "[ns1] \"私はそう思わないよ。\"\n[ns2] \"真剣に作ったなら、誰がなんと言おうとそれは芸術だよ！\""
2004105-83 = "……えっ？"
2004105-87 = "芸、術……？"
2004105-96 = "私が……芸術を！？"
2004105-97 = "……そ、そんな発想はなかったわ。"
2004105-98 = "だって、芸術とは主観的なもので、そこに客観性の入る隙は……。"
2004105-99 = "でも、定義が難しいという意味では、誰からも誤りを指摘されない……つまり。"
2004105-100 = "……！"
2004105-101 = "……そう、だったのね。"
2004105-102 = "芸術……。"
2004105-103 = "私は、芸術活動をしていた……そして私には、芸術の素養があった。"
2004105-104 = "私は……。"
2004105-105 = "間違っていなかったのね……。"
2004105-106 = "[s] \"う、うん……。\""
2004105-107 = "いつだって貴方は、私の考えを簡単に超えてくる。"
2004105-108 = "……だから、「先生」なのね。"
2004105-109 = "先を生きる者。だからこそ人を導き、その人に足りないものを提示できる……そう、だからこそ貴方は……。"
2004105-110 = "[s] \"リ、リオ……大丈夫？\""
2004105-111 = "よく分からない……#nでも、これほど感情が動いたのは、初めてよ。"
2004105-112 = "何かを成し遂げるか、そのために必要な事を計算し、耐えることばかり考えていたのだけれど……。"
2004105-113 = "今なら……。"
2004105-114 = "貴方のそばでなら、私はこのままでも……。"
2004105-118 = "（その時、3Dプリンターから完了を知らせる音が聞こえてきた）"
2004105-120 = "[ns] \"見にいこう。\""
2004105-121 = "ええ……。"
2004105-123 = "……あの、先生。"
2004105-124 = "振り向かずに、そのまま聞いていてちょうだい。"
2004105-125 = "さっきの言葉、とても嬉しかったわ……。"
2004105-126 = "……ありがとう。"
2004105-133 = "（小さくなっていくリオの後ろ姿を見つめながら、芸術について考えた）"
