[translation]
2004105-1 = "Design"
2004105-5 = "Aqui estão a impressora 3D e a resina ABS que você pediu."
2004105-6 = "Ah, é verdade. #nPor favor, assine aqui!"
2004105-17 = "Boa noite."
2004105-18 = "……Você me ajudou de novo, não foi?"
2004105-19 = "[s] \"O pedido está correto?\""
2004105-20 = "Sim, obrigada. #nEstava me perguntando se há um espaço bem ventilado……."
2004105-21 = "Impressoras 3D liberam substâncias tóxicas durante o processo de trabalho, e o esconderijo é difícil de ventilar."
2004105-22 = "Acho que o Schale tem uma sala adequada para esse tipo de trabalho. #nObrigada pela sugestão, Sensei."
2004105-23 = "[s] \"Onde seria um bom lugar……?\""
2004105-32 = "[ns] \"Que tal aqui?\""
2004105-33 = "……Tem uma janela grande, atende aos requisitos."
2004105-34 = "Sendo assim, vou usar este espaço."
2004105-42 = "……Está funcionando."
2004105-47 = "Vamos ficar do lado de fora. #nFicar aqui dentro é perigoso por causa da inalação de poeira."
2004105-52 = "[ns] \"O que você vai fazer com o que criar?\""
2004105-53 = "Não tenho um uso específico em mente. #nÉ só que, antigamente, eu costumava fazer várias coisas assim."
2004105-54 = "O design industrial consiste em buscar algo racional enquanto se garante a funcionalidade."
2004105-55 = "O trabalho de pensar nesse tipo de \"design\" nunca foi um fardo para mim…… é só isso."
2004105-56 = "[s] \"Então é como um hobby para a Rio, né?\""
2004105-57 = "Hobby?"
2004105-58 = "……Será?"
2004105-59 = "Nunca tinha pensado dessa forma."
2004105-60 = "……Mas ter um hobby é algo irracional, não é?"
2004105-61 = "Diferente de estudos, trabalhos ou treinamentos que geram lucro―― #num hobby, você segue seus próprios gostos, certo?"
2004105-62 = "No fim das contas, é um ato onde o esforço investido resulta em uma saída de zero."
2004105-63 = "……Será que não tem problema eu fazer algo assim?"
2004105-64 = "[s] \"Não tem motivo nenhum para não poder!\""
2004105-65 = "……É mesmo?"
2004105-66 = "……Obrigada."
2004105-71 = "Entendo…… mas ainda tenho minhas preocupações."
2004105-72 = "Acho que você também já percebeu――"
2004105-73 = "Meus designs nunca foram avaliados de forma muito positiva."
2004105-74 = "Parece que meu design, que busca funcionalidade e racionalidade, #nnão é bem aceito……."
2004105-75 = "……Será que estou errada?"
2004105-76 = "Provavelmente…… não, com certeza estou."
2004105-77 = "O mundo é feito de probabilidade e estatística. #nOs dados sobre este assunto apontam para o meu erro."
2004105-78 = "[ns] \"……!\""
2004105-80 = "[ns1] \"Eu não penso assim.\" \n[ns2] \"Se você fez com seriedade, não importa o que digam, isso é arte!\""
2004105-83 = "……Hã?"
2004105-87 = "Ar, te……?"
2004105-96 = "Eu…… arte!?"
2004105-97 = "……Eu, eu nunca tinha pensado nisso."
2004105-98 = "Afinal, a arte é algo subjetivo, não há espaço para objetividade……."
2004105-99 = "Mas, no sentido de que a definição é difícil, ninguém pode apontar erros…… ou seja."
2004105-100 = "……!"
2004105-101 = "……Então era isso."
2004105-102 = "Arte……."
2004105-103 = "Eu estava realizando atividades artísticas…… e eu tinha aptidão para a arte."
2004105-104 = "Eu……."
2004105-105 = "Eu não estava errada, afinal..."
2004105-106 = "[s] \"S-sim...\""
2004105-107 = "Você sempre supera minhas expectativas com tanta facilidade."
2004105-108 = "……É por isso que você é o \"Sensei\", não é?"
2004105-109 = "Aquele que vive à frente. É justamente por isso que você consegue guiar as pessoas e mostrar o que lhes falta... Sim, é por isso que você..."
2004105-110 = "[s] \"Ri, Rio... você está bem?\""
2004105-111 = "Eu não sei dizer ao certo...#nMas é a primeira vez que sinto minhas emoções tão agitadas."
2004105-112 = "Eu só pensava em realizar algo, em calcular o que era necessário para isso e em suportar o peso das decisões..."
2004105-113 = "Mas agora..."
2004105-114 = "Se for ao seu lado, talvez eu possa continuar sendo quem sou..."
2004105-118 = "（Nesse momento, um som vindo da impressora 3D anunciou que o processo havia terminado）"
2004105-120 = "[ns] \"Vamos dar uma olhada.\""
2004105-121 = "Sim..."
2004105-123 = "……Ei, Sensei."
2004105-124 = "Não se vire, apenas continue ouvindo."
2004105-125 = "Fiquei muito feliz com o que você disse antes..."
2004105-126 = "……Obrigada."
2004105-133 = "（Enquanto observava as costas de Rio se afastarem, fiquei pensando sobre a arte）"
