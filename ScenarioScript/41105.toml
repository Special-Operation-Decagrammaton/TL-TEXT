[translation]
41105-3 = "Guaaa!?"
41105-4 = "Q-que força absurda é essa... Fujam!"
41105-8 = "P-pessoal! Para onde vocês estão indo? Os inimigos ainda..."
41105-9 = "Eu nem queria fazer nada disso, como espera que eu lute!?"
41105-10 = "Eu vou embora,"
41105-11 = "Já cansei dessa vida!"
41105-12 = "E-espere aí!!"
41105-20 = "Ah, o esconderijo da 'Felicidade Garantida'... Todos os itens de decoração caros que eu levei tanto tempo para colecionar, queimando..."
41105-21 = "[s] \"Não querendo ser chata, mas você não disse que não se apegava à 'posse'...?\""
41105-22 = "Cala a boca!! O luxo é a essência do ser humano, não é!?"
41105-23 = "Se não fossem vocês, se vocês não estivessem aqui...!"
41105-27 = "...Setor A, limpo."
41105-28 = "Os atiradores do segundo andar também foram neutralizados..."
41105-29 = "Setor B, limpo."
41105-30 = "Alguns conseguiram fugir, mas o resto foi todo contido."
41105-32 = "Sim, bom trabalho a todos."
41105-33 = "Não conseguimos nada de valor, mas fico feliz que ninguém tenha se ferido..."
41105-37 = "...Hm? Miyako, isso não é comida enlatada? O prazo de validade já venceu, mas..."
41105-41 = "Salmão defumado e bacon..."
41105-45 = "Tem até vieiras em conserva!"
41105-46 = "Uau... Com isso, até uma marmita comum parece um banquete de luxo...!"
41105-48 = "E-espere, não toque nisso!"
41105-49 = "Essas latas de luxo ali, eu estava guardando com muito carinho para comer como petisco mais tarde...!"
41105-51 = "Miyako-chan, tem muitos sacos de dormir e lonas impermeáveis aqui..."
41105-52 = "A gente sempre passava aperto quando chovia, mas com isso..."
41105-53 = "...Entendo, faz sentido."
41105-57 = "Moe, pode providenciar um veículo agora mesmo?"
41105-58 = "Parece que teremos mais espólios do que o esperado."
41105-60 = "O-o que você está chamando de 'espólios' e desde quando!?"
41105-61 = "Isso tudo é meu! Não encoste nas minhas posses!"
41105-62 = "[s] \"Onde foi parar aquele papo de 'não possuir nada'...\""
41105-64 = "Mas quase tudo isso está perto de vencer, não está?"
41105-65 = "Seus subordinados já foram embora... Você não vai conseguir comer tudo isso, vai?"
41105-66 = "Foram vocês que começaram disparando tiros de aviso."
41105-67 = "Como compensação por isso, não poderíamos ficar com pelo menos uma parte?"
41105-72 = "Ugh, grrr..."
41105-74 = "Parasitas! Escória da sociedade! Se querem tanto, por que não trabalham de verdade!?"
41105-75 = "Se são tão fortes, poderiam viver sem depender de marmitas descartadas! Podiam virar mercenárias ou qualquer outra coisa!"
41105-76 = "Nós não somos mercenárias, somos da SRT."
41105-77 = "Não me interessa! Se vocês têm uma ocupação decente, por que não deixam a marmita para mim!?"
41105-78 = "Enquanto lutamos pela nossa sobrevivência, vocês aparecem com armas de ponta e discursos de justiça..."
41105-79 = "Tudo o que vocês dizem é pura sofisma!"
41105-80 = "Quem está cheio de sofismas aqui é você, não é!?"
41105-81 = "Diz que não possui nada e que é uma 'buscadora', mas suas ações são movidas pela ganância..."
41105-82 = "Se é uma buscadora, aja como uma e coma uma marmita de broto de feijão!"
41105-83 = "Cala a boca! Até buscadores querem comer marmita de churrasco!!"
41105-84 = "[s] \"Calma, calma...\""
41105-86 = "[s1] \"De qualquer forma, eu também tenho culpa nisso, então eu vou comprar as lonas e o que for necessário.\"\n[s2] \"Pessoal, não levem nada do que está aqui.\""
41105-89 = "..."
41105-95 = "Já disse uma vez, não precisamos da ajuda do Sensei."
41105-96 = "Não importa o que o Sensei diga, nós não vamos mudar de ideia, e..."
41105-97 = "……Estou exausta. Já não tenho nem apetite."
41105-98 = "Vou voltar, comer uma marmita de broto de feijão e dormir..."
41105-99 = "E-eu também..."
41105-100 = "……É verdade. Acho que comer algo gorduroso de repente faria mal ao estômago..."
41105-104 = "Aqui é RABBIT 1, chamando Acampamento RABBIT."
41105-105 = "A operação foi concluída, estamos retornando à base."
41105-106 = "Ei, e os espólios? E a marmita de bife de Wagyu!?"
41105-107 = "Infelizmente, eles deixaram de existir."
41105-108 = "Hoje vamos nos contentar com uma marmita de broto de feijão."
41105-109 = "Aaaaah!? E olha que eu me dei ao trabalho de conseguir o veículo!?"
41105-110 = "Cala a boca, considere isso uma dieta."
41105-117 = "He, hehe, esse seu olhar cheio de desejo..."
41105-118 = "Como esperado, a 'posse' cega as pessoas e torna seus corações cruéis..."
41105-119 = "[s] \"Acho que o seu olhar é praticamente o mesmo...\""
41105-120 = "E-eu,"
41105-121 = "Eu não sou assim de jeito nenhum!?"
41105-122 = "Eu consigo discernir todo o valor com estes olhos límpidos! Como resultado, muitos camaradas..."
41105-123 = "A-ah, agora que me lembro, os camaradas desapareceram..."
41105-124 = "……Já que estamos aqui, Sensei, por que não participa da 'Felicidade da Posse'?"
41105-125 = "Vamos, Sensei, abra mão de seus pertences e venha encontrar o lugar do espírito conosco..."
41105-126 = "[s] \"Eu dispenso...\""
41105-129 = "Próximo episódio: Alerta de Chuva Forte"
