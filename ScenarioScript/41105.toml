[translation]#[Texto revisado, mas pode haver alterações como Censura.] Em aguardo de revisão de formatação de texto. - Filipe 10/06.
41105-3 = "Guaaaah?!"
41105-4 = "E-Essas garotas de orelha de coelho são monstros... Corre, galera!!"
41105-8 = "E-Ei, companheiros! Onde vocês estão indo?! Ainda tem inimigos aqui..."
41105-9 = "A gente já não queria trabalhar pra começo de conversa, cê acha mesmo que a gente vai morrer numa troca de tiro?!"
41105-10 = "Tô metendo o pé!"
41105-11 = "Essa vida de desapego é uma furada!"
41105-12 = "E-Espera!! Voltem aqui!!"
41105-20 = "Aaaah, o esconderijo da FeliSem... As peças de luxo que a gente juntou... Tudo virando cinzas..."
41105-21 = "[s] \"Digo e repito... O lance de vocês não era não ligar pras posses materiais...?\""
41105-22 = "CALA A BOCA!! Querer conforto e luxo é a essência do ser humano!!"
41105-23 = "Se vocês não tivessem aparecido, se vocês não tivessem vindo pra cá...!"
41105-27 = "……Área A, limpa."
41105-28 = "Snipers do segundo andar neutralizados."
41105-29 = "Área B limpa também."
41105-30 = "Alguns conseguiram fugir, mas o grosso da força inimiga já tá no chão pedindo arrego."
41105-32 = "Ótimo. Bom trabalho, esquadrão."
41105-33 = "Saímos de mãos abanando sem bife, mas pelo menos ninguém se machucou..."
41105-37 = "……Peraí. Miyako, isso aqui não é comida enlatada? Pelo cheiro, já deve ter passado da validade, mas..."
41105-41 = "Salmão defumado... fatias de bacon..."
41105-45 = "Caramba, tem até vieiras mergulhadas no azeite de oliva!"
41105-46 = "Ooooh... Com isso aqui, aquela nossa marmita sem graça vira prato de restaurante chique num piscar de olhos...!"
41105-48 = "E-EI, NÃO PÕE A PATA AÍ!!"
41105-49 = "Essas latas premium são os meus petiscos pra acompanhar a cervejinha de noite! Eu guardei com tanto carinho...!"
41105-51 = "Miyako-chan, olha o que eu achei aqui no canto... sacos de dormir acolchoados e umas lonas impermeáveis."
41105-52 = "A gente sempre passa sufoco quando chove, mas se a gente levar isso..."
41105-53 = "……Excelente. Tem toda razão."
41105-57 = "Moe, consegue arranjar um carro de fuga agora mesmo?"
41105-58 = "Pelo visto, a nossa cota de espólios de guerra vai ser bem gorda hoje."
41105-60 = "E-Epa, epa, epa! Quem foi que te deu o direito de chamar as minhas coisas de 'espólios de guerra'?!"
41105-61 = "Tudo isso aí é meu! Tira a mão da minha propriedade particular!"
41105-62 = "[s] \"Acho que a filosofia do 'Desapego Absoluto' foi pro ralo...\""
41105-64 = "Fica na tua, cara. Isso aqui tudo tá quase vencendo ou já venceu."
41105-65 = "Fora que seus capachos bateram em retirada... cê não vai dar conta de comer tudo isso sozinho de qualquer jeito."
41105-66 = "E nós só viemos aqui porque vocês abriram fogo primeiro."
41105-67 = "Como indenização pelos danos morais e físicos, nós vamos confiscar uma parte do seu estoque."
41105-72 = "Uuugh... snif..."
41105-74 = "Bando de vândalas! Escória social! Se vocês querem tanto assim as minhas coisas, por que não arrumam um emprego honesto pra comprar?!"
41105-75 = "Vocês têm mira e são brabas na bala! Pra que viver roubando lixo e mendigando marmita?! Podiam virar mercenárias ou qualquer coisa que desse dinheiro!"
41105-76 = "Nós não somos mercenárias, nós somos a justiça da SRT."
41105-77 = "Dane-se a SRT! Se vocês têm um ideal tão nobre, então parem de roubar a minha marmita e minha lona!!"
41105-78 = "A gente aqui tentando não morrer de fome e frio e vocês vêm apontar arma na nossa cara vomitando essa 'justiça' barata de vocês..."
41105-79 = "A filosofia de vocês é pura hipocrisia e balela!"
41105-80 = "Cê tá zoando com a minha cara, né?! O único hipócrita aqui é você!"
41105-81 = "Paga de 'Buscador da Iluminação' e pregador do 'Desapego', mas é mais materialista e ganancioso que um porco!"
41105-82 = "Se você é tão iluminado assim, então senta a bunda no chão e vai comer marmita de broto de feijão, seu picareta!!"
41105-83 = "CALA A BOCA! OS ILUMINADOS TAMBÉM QUEREM COMER BIFE WAGYU!!"
41105-84 = "[s] \"Opa, opa... menos, pessoal...\""
41105-86 = "[s1] \"Olha, a culpa de parte dessa bagunça ter começado foi minha... então eu compro as lonas e o que vocês precisarem pra acampar.\"\n[s2] \"Meninas, faz um favor pra mim e não leva as coisas dele. Deixa o cara em paz.\""
41105-89 = "……"
41105-95 = "Vou repetir pro senhor não esquecer: a gente não quer nem precisa da sua caridade."
41105-96 = "O senhor pode fazer discurso, chorar ou bancar o patrocinador bonzinho, isso não vai mudar o fato de que a gente não confia em você..."
41105-97 = "……Que canseira. A raiva tirou toda a minha fome."
41105-98 = "Bora voltar pra base. Vou empurrar aquele broto de feijão na barriga e capotar..."
41105-99 = "T-Também perdi a fome..."
41105-100 = "……Faz sentido. Comer comida gordurosa com o sangue quente assim, é pedir pra passar mal da barriga..."
41105-104 = "Acampamento RABBIT, aqui é RABBIT 1."
41105-105 = "Operação finalizada. Retornando para a base."
41105-106 = "Ué, peraí. E os espólios? E o bife Wagyu premium?!"
41105-107 = "Tudo alarme falso. Deu ruim."
41105-108 = "O cardápio de hoje é broto de feijão frio, como sempre."
41105-109 = "Tá de sacanagem?! Eu puxei a van pro resgate atoa?!"
41105-110 = "Não enche. Aceita que você tá de dieta."
41105-117 = "He, hehehe... viram aquele olhar de vocês...? Queimando de ganância..."
41105-118 = "Eu sempre soube... O desejo pela 'Posse' cega os olhos e apodrece a alma..."
41105-119 = "[s] \"Irmão, você não consegue nem esconder que o seu olho também brilha por um pedaço de carne...\""
41105-120 = "O-"
41105-121 = "Que calúnia! Eu jamais me rebaixaria a isso!"
41105-122 = "Os meus olhos são janelas límpidas que enxergam o verdadeiro valor do nada! E foi essa visão que atraiu meus leais seguidores..."
41105-123 = "E-Espera aí, os meus seguidores me abandonaram..."
41105-124 = "……Já que tamo nessa, o senhor não tem interesse em entrar pra FeliSem, Sensei?"
41105-125 = "Basta o senhor transferir a posse de tudo da Schale pro meu nome, e juntos abriremos as portas do Nirvana espiritual..."
41105-126 = "[s] \"É, acho que vou passar essa.\""
41105-129 = "Próximo Episódio: Alerta de Tempestade"