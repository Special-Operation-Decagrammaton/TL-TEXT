[translation]
41105-3 = "Gaaah?!"
41105-4 = "Q-que força descomunal… Fujam!"
41105-8 = "S-Senhoras! Para onde vão? Ainda há inimigas…"
41105-9 = "Eu já não queria fazer nada, imagina lutar!?"
41105-10 = "Já chega,"
41105-11 = "Estou de saco cheio dessa vida!"
41105-12 = "E-Esperem!!"
41105-20 = "Ah, o esconderijo da 'FeliSem'… todos os ornamentos caros que juntamos foram queimados…"
41105-21 = "[s] \"Desculpe perguntar de novo, mas vocês não eram desapegados de 'posses'…?\""
41105-22 = "Cala a boca!! A natureza humana é querer luxo!"
41105-23 = "Se não fosse por vocês… se não fosse por vocês…!"
41105-27 = "……Setor Alfa, limpo."
41105-28 = "Atiradora do segundo andar também neutralizada…"
41105-29 = "Setor Bravo, limpo."
41105-30 = "Algumas escaparam, mas o resto foi imobilizado."
41105-32 = "Sim, bom trabalho."
41105-33 = "Não ganhamos nada, mas pelo menos ninguém se machucou…"
41105-37 = "……Hã? Miyako, isso não é uma lata de conserva? Está vencida, mas…"
41105-41 = "Salmão defumado e bacon…"
41105-45 = "Tem até vieiras em conserva!"
41105-46 = "Ooooh… com isso, até um bentô simples fica luxuoso…!"
41105-48 = "E-espera, não toquem!"
41105-49 = "Aquelas latas premium eu estava guardando para petiscar com bebida…!"
41105-51 = "Miyako-chan, tem vários sacos de dormir e lonas impermeáveis aqui…"
41105-52 = "Sempre sofremos com a chuva, mas com isso…"
41105-53 = "……Entendo, realmente."
41105-57 = "Moe, pode providenciar um veículo?"
41105-58 = "Parece que teremos mais 'butim' do que esperávamos."
41105-60 = "O-que é isso de 'butim' de uma hora para outra?!"
41105-61 = "Tudo isso é meu! Não toquem nas minhas posses!"
41105-62 = "[s] \"E o tal do 'não-ter'…?\""
41105-64 = "Mas a maioria dessas coisas está perto do vencimento, né?"
41105-65 = "Seus subordinados já foram embora… não vai sobrar demais para você?"
41105-66 = "A senhora foi quem atirou para nos intimidar primeiro."
41105-67 = "Então, gostaríamos de ficar com isso, nem que seja parcialmente, como compensação."
41105-72 = "Ugh, droga…"
41105-74 = "Vagabundos! Pus da sociedade! Se querem tanto assim, por que não trabalham direito?!"
41105-75 = "Com tanta força, nem precisariam depender de bentôs descartados! Virem mercenárias, façam alguma coisa!"
41105-76 = "Não somos mercenárias. Somos da SRT."
41105-77 = "Quero saber! Se têm uma afiliação legítima, por que não abrem mão desses bentôs logo?!"
41105-78 = "Trazer armas de ponta e discursos de justiça para uma luta pela sobrevivência…"
41105-79 = "Tudo o que vocês dizem é sofisma!"
41105-80 = "Sofisma é o que você diz!"
41105-81 = "Falam de 'não-ter' e 'buscadores', mas agem movidas pelo desejo…"
41105-82 = "Se são buscadores, ajam como tal, comam bentô de broto de feijão!"
41105-83 = "Cala a boca! Buscadores também querem comer bentô de churrasco!"
41105-84 = "[s] \"Acalmem-se, acalmem-se…\""
41105-86 = "[s1] \"De qualquer forma, eu também tive culpa. As lonas e coisas que precisarem, eu compro.\"\n[s2] \"Vocês também deixem o que está aqui.\""
41105-89 = "……"
41105-95 = "Repito, não precisamos da ajuda do Professor."
41105-96 = "Não importa o que o senhor diga, não vamos mudar de ideia…"
41105-97 = "……Estou cansada. Quase sem fome."
41105-98 = "Vamos voltar, comer bentô de broto de feijão e dormir…"
41105-99 = "E-eu também…"
41105-100 = "……Sim. Comer gordura de repente faria mal ao estômago…"
41105-104 = "Acampamento RABBIT, aqui RABBIT1."
41105-105 = "Operação encerrada. Voltando."
41105-106 = "Hã, e o butim? O bentô de bife de wagyu?!"
41105-107 = "Infelizmente, não deu certo."
41105-108 = "Vamos comer bentô de broto de feijão hoje."
41105-109 = "O quê?! Mandei preparar o veículo à toa?!"
41105-110 = "Cala a boca, pense que é dieta."
41105-117 = "F-fufu, aquele olhar cheio de desejo…"
41105-118 = "Como esperado, a 'posse' cega as pessoas e corrompe o coração…"
41105-119 = "[s] \"O seu olhar está igual, hein…\""
41105-120 = "E-eu…"
41105-121 = "Não sou assim!"
41105-122 = "Com estes olhos lúcidos, consigo avaliar todo o valor! Como resultado, muitos companheiros…"
41105-123 = "A-aliás, eles já foram embora…"
41105-124 = "……Já que estamos nessa, que tal o senhor se juntar à 'FeliSem'?"
41105-125 = "Vamos, abra mão de suas posses e busque a paz espiritual…"
41105-126 = "[s] \"Fico devendo…\""
41105-129 = "Próximo Episódio: Alerta de Tempestade"