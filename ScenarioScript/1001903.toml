[translation]
1001903-1 = "Proteção"
1001903-3 = "（O sino tocou exatamente 15 minutos depois que a MomoTalk da Azusa chegou）"
1001903-4 = "（A expressão da Azusa ao chegar estava um tanto nublada）"
1001903-5 = "……Haa."
1001903-6 = "Exatamente como eu previ, sem tirar nem pôr……."
1001903-7 = "[s] \"Azusa? O que houve?\""
1001903-8 = "Desde que cheguei na frente deste prédio até aparecer na sua frente, Sensei, foram 6 minutos e 19 segundos."
1001903-9 = "A única coisa que me barrou no caminho foi a entrada principal do Schale. E mesmo isso, você abriu imediatamente para mim, Sensei."
1001903-10 = "Você não ativou a segurança do elevador e abriu a porta da sala de trabalho normalmente."
1001903-11 = "Se quem tivesse vindo aqui agora não fosse eu, mas alguém se passando por mim…… o que você acha que teria acontecido?"
1001903-12 = "Você é descuidado demais, Sensei. Sua consciência sobre situações de emergência e a construção desse sistema deixam a desejar."
1001903-13 = "……Mas não se preocupe."
1001903-14 = "Eu vim aqui justamente por causa disso."
1001903-15 = "[s1] \"Você vai reforçar o sistema de segurança……?\"\n[s2] \"Não entendi bem, mas acho que vou aceitar.\""
1001903-16 = "Mesmo que eu seja uma especialista, farei o meu melhor pela sua segurança, Sensei."
1001903-17 = "Mesmo que eu seja uma especialista, farei o meu melhor pela sua segurança, Sensei."
1001903-18 = "Vou garantir que nem uma formiga consiga passar, e trouxe uma quantidade suficiente de armadilhas e minas."
1001903-19 = "……?"
1001903-20 = "Você não pode impedir que as alunas venham ao Schale? A sala de trabalho do Schale é um espaço aberto……?"
1001903-21 = "Sensei, você estava me ouvindo? Desse jeito, não consigo garantir a sua segurança――"
1001903-22 = "……Pelo contrário, você ficaria feliz se eu criasse um espaço onde você pudesse se refugiar em caso de emergência?"
1001903-23 = "Hmm……."
1001903-24 = "……Entendi. Não estou muito animada com isso, mas quando em Roma, faça como os romanos. Já que vim aqui, seguirei as regras daqui."
1001903-25 = "Então, onde faremos isso?"
1001903-27 = "Aqui é……?"
1001903-28 = "Entendo, uma sala de descanso?"
1001903-29 = "Sim, os itens essenciais estão em bom número, e a temperatura e a umidade estão bem controladas."
1001903-30 = "Parece uma boa ideia reforçar este lugar como uma instalação de emergência."
1001903-31 = "……Sim, você quer que eu espere ainda?"
1001903-32 = "Fazer isso juntos quando o trabalho terminar? Não, sozinha é o suficiente. Ou você duvida da minha técnica?"
1001903-33 = "Você sente pena de me deixar fazer sozinha e simplesmente quer fazer comigo……?"
1001903-34 = "……Haa. Sério, Sensei……."
1001903-35 = "Entendi. Se você insiste tanto, eu obedeço."
1001903-36 = "Então vou esperar aqui, e assim que você voltar, começaremos imediatamente."
1001903-41 = "（Deixei a Azusa sentada no sofá e voltei para a sala de trabalho）"
1001903-43 = "（Quando terminei toda a papelada, o sol já tinha se posto）"
1001903-44 = "（Vamos voltar para a sala de descanso）"
1001903-46 = "（Azusa estava dormindo tranquilamente na cadeira de massagem）"
1001903-50 = "Nn…… funya……."
1001903-51 = "（……?）"
1001903-52 = "Nnu…… fufu……."
1001903-53 = "（……?）"
1001903-54 = "……Hah!?"
1001903-56 = "Se, Sensei……?"
1001903-57 = "[s3] \"Azusa, conseguiu dormir bem?\"\n[s4] \"Cadeiras de massagem são ótimas, né?\""
1001903-58 = "……."
1001903-59 = "……."
1001903-60 = "……Bem, isso é……."
1001903-61 = "……Nn, como foi, você disse?"
1001903-62 = "Como assim, não aconteceu nada de especial, e acho que é um bom espaço……."
1001903-63 = "……!"
1001903-64 = "……Sensei."
1001903-65 = "Por acaso você me trouxe aqui desde o início com essa intenção?"
1001903-66 = "Para me mostrar que este é o tipo de lugar que é……?"
1001903-67 = "[s5] \"Eu queria que este lugar tivesse essa atmosfera.\"\n[s6] \"Acho que você também deveria relaxar um pouco mais, Azusa.\""
1001903-68 = "……Sensei, você é muito mole."
1001903-69 = "……Sensei, você é muito mole."
1001903-70 = "……Haa."
1001903-71 = "Mas entendi. Eu também seguirei as regras daqui enquanto estiver aqui."
1001903-72 = "Não é que eu não me importe nem um pouco, mas aqui, as palavras do Sensei provavelmente estão certas. Vou tentar me acostumar aos poucos."
1001903-73 = "……Posso vir a qualquer hora?"
1001903-74 = "Você quer que eu venha quando eu quiser e relaxe?"
1001903-76 = "……Fufu."
1001903-77 = "Bem, mas é verdade que, no momento, talvez eu precise de um tempo assim."
1001903-78 = "Então, aceitarei sua gentileza."
1001903-80 = "（Depois disso, até tarde da noite, relaxamos na cadeira de massagem, revezando um com o outro）"
