[translation]
1001903-1 = "防護"
1001903-3 = "（アズサのモモトークが届いてから、ぴったり15分後にチャイムが鳴った）"
1001903-4 = "（到着したアズサの表情は、何だか曇っていた）"
1001903-5 = "……はぁ。"
1001903-6 = "寸分違わず予想通り……。"
1001903-7 = "[s] \"アズサ？どうしたの？\""
1001903-8 = "この建物の前に到着してから、私がこうして先生の前に現れるまで6分19秒。"
1001903-9 = "途中で私を遮ったのはシャーレの正面玄関だけ。それも、先生がすぐに開けてくれた。"
1001903-10 = "エレベーターのセキュリティも作動させず、執務室のドアも普通に開けてくれた。"
1001903-11 = "もし今ここに来たのが私じゃなくて、私を装った誰かだったら……一体どうなってたと思う？"
1001903-12 = "不用心すぎるよ、先生。緊急時に対する意識も、そのシステム構築もなってない。"
1001903-13 = "……でも心配しないで。"
1001903-14 = "私は、そのために来たんだから。"
1001903-15 = "[s1] \"防犯システムを強化してくれるってこと……？\"\n[s2] \"よく分からないけど、お願いしようかな。\""
1001903-16 = "これでも私は専門家、先生の安全のために全力を尽くすよ。"
1001903-17 = "これでも私は専門家、先生の安全のために全力を尽くすよ。"
1001903-18 = "アリ一匹通れないようにしてあげる、罠と地雷も十分な数用意してきた。"
1001903-19 = "……？"
1001903-20 = "シャーレに来る生徒たちを遮るわけにはいかない？シャーレの執務室はオープンな空間にしてある……？"
1001903-21 = "先生、私の話聞いてた？それだと先生の安全を保証できな――"
1001903-22 = "……逆に、緊急時に避難できる空間をどこかに作っておいた方が嬉しい？"
1001903-23 = "うーん……。"
1001903-24 = "……分かった。あまり気は乗らないけど、郷に入っては郷に従え。ここに来たからには、ここのルールに従う。"
1001903-25 = "じゃあ、どこにする？"
1001903-27 = "ここは……？"
1001903-28 = "なるほど、休憩室？"
1001903-29 = "うん、生活必需品も十分だし、温度・湿度もちゃんと保たれてる。"
1001903-30 = "ここを緊急時の施設として強化するのは良さそう。"
1001903-31 = "……うん、まだ待っててほしい？"
1001903-32 = "仕事が終わったら一緒に？いや、一人で充分。それとも、私の技術を疑ってる？"
1001903-33 = "一人でやらせるのは申し訳ないし、単に一緒にやりたい……？"
1001903-34 = "……はぁ。全く、先生は……。"
1001903-35 = "分かった。そこまで言うなら従う。"
1001903-36 = "なら私はここで待機してるから、先生が帰ってきたらすぐに着手しよう。"
1001903-41 = "（ソファに座ったアズサを置いて、執務室に戻った）"
1001903-43 = "（そうして書類作業を全て終えた頃には、すでに日が暮れていた）"
1001903-44 = "（休憩室に戻ろう）"
1001903-46 = "（アズサがマッサージチェアですやすやと眠っていた）"
1001903-50 = "ん……ふにゃ……。"
1001903-51 = "（……？）"
1001903-52 = "んぅ……ふふっ……。"
1001903-53 = "（……？）"
1001903-54 = "……はっ！？"
1001903-56 = "せ、先生……？"
1001903-57 = "[s3] \"アズサ、よく眠れた？\"\n[s4] \"マッサージチェアって良いよね。\""
1001903-58 = "……。"
1001903-59 = "……。"
1001903-60 = "……その、これは……。"
1001903-61 = "……ん、どうだったって？"
1001903-62 = "どうって、特に何も起きなかったし、良い空間だと思うけど……。"
1001903-63 = "……っ！"
1001903-64 = "……先生。"
1001903-65 = "もしかして最初からこのつもりで、私をここに？"
1001903-66 = "こういう場所なんだって、伝えるために……？"
1001903-67 = "[s5] \"こういう雰囲気の場所にしておきたくって。\"\n[s6] \"アズサも、もう少しリラックスしてみても良いと思うよ？\""
1001903-68 = "……先生は、甘すぎる。"
1001903-69 = "……先生は、甘すぎる。"
1001903-70 = "……はぁ。"
1001903-71 = "でも、分かった。私も、ここにいる時はここのルールに従う。"
1001903-72 = "全く気にならないわけじゃないけど、ここではきっと、先生の言葉の方が正しいから。少しずつ慣れていこうと思う。"
1001903-73 = "……いつでも来て良い？"
1001903-74 = "好きな時に来て、ゆっくりしてほしい？"
1001903-76 = "……ふふっ。"
1001903-77 = "まあでも、確かに今の私には、そういう時間が必要なのかもしれない。"
1001903-78 = "それじゃ、お言葉に甘えて。"
1001903-80 = "（その後遅い時間まで、アズサと順番こにマッサージチェアでくつろいだ）"
