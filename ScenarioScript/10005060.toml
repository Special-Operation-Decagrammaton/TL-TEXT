[translation]
10005060-1 = "第6話;兎狩り"
10005060-4 = "ぎやぁぁぁぁぁぁーーー！！何でなんでなんでーーー！？"
10005060-5 = "来たばっかりなんでしょ！？この短時間で「S」ランク！？嘘だぁ！！！"
10005060-6 = "私がどんだけお金使ったと思ってるの！？いや覚えてないけど、でもだいぶ突っ込んだよ！？こんな理不尽ある！？ねぇ！？"
10005060-7 = "[s1] \"そもそも学生にこういうのはあんまり良くない……。\"\n[s2] \"運の世界は非情なものだよ。\""
10005060-8 = "も～～～～～～っ！！"
10005060-9 = "も～～～～～～っ！！"
10005060-10 = "待てやごるぁ！！"
10005060-11 = "ひぃっ！？嫌です、絶対待ちません！！！"
10005060-12 = "良いね良いねぇ、楽しくなってきたじゃねぇか！さあ泣け！叫べ！[ruby=わめ]喚[/ruby]け！！"
10005060-13 = "お前が泣こうとあの会計が泣こうと、"
10005060-15 = "最後に笑うのはあたしだけだ！！くはははははっ！！"
10005060-16 = "さぁもっと足を動かせ！もがけ！！"
10005060-17 = "少しでもあたしの体力を削った方が、後で辛くねぇぞっ！！"
10005060-19 = "嫌ぁぁぁぁぁぁ！！！！！"
10005060-23 = "くはははははっ！楽しいおにごっこじゃねぇかぁ！！"
10005060-29 = "どうしましょうか……？"
10005060-30 = "[s3] \"この後危ないことしなければ、良いんじゃないかな……。\"\n[s4] \"ネルも今まで頑張ったんだし、ストレス発散ってことで。\""
10005060-31 = "うーん……。"
10005060-32 = "うーん……。"
10005060-33 = "ではこの後、頑張って止めないとですね……？"
