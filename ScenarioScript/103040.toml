[translation]
103040-1 = "第4話;アビドスに在るもの（１）"
103040-2 = "天上の遥か彼方に鎮座する、かの要塞の名は「アトラ・ハシースの箱舟」。"
103040-6 = "[ns1] \"アトラ・ハシースの箱舟？\"\n[ns2] \"……聞き覚えのある名だ。\""
103040-9 = "ええ。以前、同じ名の箱舟がミレニアムに顕現した事があるかと。#n既にご存じだとは思いますが――"
103040-10 = "その正体は――この大地に埋葬されし、#n古のキヴォトスの民「名もなき神」の遺産。"
103040-11 = "そうですね……所謂、古代文明によって生み出された物――と捉えていただけたらと。"
103040-12 = "あなた方が発見したAL-1Sや、デカグラマトンにハッキングされる以前の預言者などが、そういった存在の一つでした。"
103040-13 = "我々にとってのそれらは、もはや淘汰された存在ですので脅威にはなり得ませんが――"
103040-14 = "まさか、アレをキヴォトス外から到来した「色彩」が、確保するとは……"
103040-15 = "「色彩の[ruby=きょうどうしゃ]嚮導者[/ruby]」は、キヴォトスに顕現した「神秘」であれば、なんであれ自分のものとするようですね。"
103040-16 = "「アトラ・ハシースの箱舟」も、同じ理由から確保したのでしょう。サンクトゥムを通じて出現した「デカグラマトン」や「[ruby=ミメシス]複製[/ruby]」、「人工天使」のように。"
103040-21 = "箱舟が「名もなき神」の遺産であるならば、#n現時点でアレを相手にできる技術はキヴォトスに存在しません。"
103040-25 = "――箱舟に匹敵する、[ruby=・   ・   ・   ・   ・   ・   ・]古代文明の遺産[/ruby]を除けば、ですが。"
103040-26 = "[ns3] \"それはつまり、\"\n[ns4] \"アビドスに在る、と言うのは……\""
103040-29 = "……ええ、お察しの通り。"
103040-30 = "「アトラ・ハシースの箱舟」に対抗できる古代兵器が眠っております。"
103040-33 = "私がカイザーコーポレーションを介して、#nアビドス砂漠で探していたもの――"
103040-34 = "キヴォトスの地中にある「超古代兵器」。#n――現存する技術では解析することができない、太古の「恐怖」。"
103040-35 = "ですが――アレは当時、私の興味の対象ではありませんでした。"
103040-38 = "当時の目標は、キヴォトスで最も強力な「神秘」と契約を交わし――#n所有すること。"
103040-41 = "私にとって、アビドスの地中にある宝は、ただの不確定な情報でしかなく――"
103040-42 = "カイザーを利用して発掘することができれば御の字程度の――#n見つけられなくても構わないような、その程度の存在でした。"
103040-45 = "ですが、カイザーのプレジデントからすれば、#n私の提案は魅力的だったのでしょう。"
103040-46 = "キヴォトスに現存する、いかなる武力にも勝る「超古代兵器」#n――そんな代物を手に入れる事ができるのであれば、"
103040-47 = "キヴォトスを支配できるのでは――と考えたのですから。"
103040-50 = "そしてついに、彼らは成功したのです――「超古代兵器」の発掘に。"
103040-53 = "その後のプレジデントに迷いは無かった。#n兵器が手に入った以上、#nキヴォトスの全自治区が敵であろうと負ける事はないと考えたのでしょう。"
103040-54 = "そして連邦生徒会を襲撃し、シャーレの先生を拉致――#nクックック、そのまま事が上手く運べば、キヴォトスはプレジデントの手に渡っていたかもしれません。"
103040-56 = "そう――あの時、「虚妄のサンクトゥム」が現れなければ。"
103040-59 = "プレジデントは「サンクトゥムタワー」が破壊された瞬間、#n自身の手に負えない状況が発生したと判断し、即座に身を引きました。"
103040-60 = "事業家として賢明な判断ですね。#n「サンクトゥムタワー」無しでは「超古代兵器」は使えませんので。"
103040-62 = "そう――サンクトゥムタワーが破壊された以上、#n「超古代兵器」を扱える者は存在しません。 "
103040-63 = "サンクトゥムタワーに匹敵するオーパーツ――#n「[ruby=・   ・   ・   ・   ・   ・]シッテムの箱[/ruby]」[ruby=・   ・   ・   ・]の所有者[/ruby]以外には。"
103040-67 = "[ns] \"………………。\""
103040-69 = "[ns] \"「超古代兵器」の正体は？\""
103040-70 = "ククッ……そう急かさないでくださいよ。#n最初は、アビドスに「箱舟」が埋まっているのかもしれない、と考えました。"
103040-71 = "しかしアレは箱舟などではなく……限りなく近い、別の存在。"
103040-77 = "そう、アレは――「船」なのです。 "
103040-78 = "「アトラ・ハシースの箱舟」と同様に、キヴォトスの起源が込められた名――「兵器」の最終形態。"
103040-81 = "――「ウトナピシュティムの[ruby=もとぶね]本船[/ruby]」。"
103040-85 = "そう――[ruby=・   ・   ・   ・]宇宙戦艦[/ruby]です。"
103040-87 = "次回;アビドスに在るもの（２）"
