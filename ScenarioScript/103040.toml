[translation]
103040-1 = "Episódio 4; Aquilo Que Se Encontra Em Abydos (1)"
103040-2 = "O nome daquela fortaleza que repousa bem longe, nos confins do céu, é a \"Arca de Atrahasis\"."
103040-6 = "[ns1] \"A Arca de Atrahasis?\"\n[ns2] \"...Esse nome me soa familiar.\""
103040-9 = "Sim. Acredito que uma arca com o mesmo nome já tenha se manifestado na Millennium antes.#nComo você já deve saber――"
103040-10 = "Sua verdadeira identidade é... a herança dos \"Deuses Sem Nome\", o antigo povo de Kivotos, enterrada nesta terra."
103040-11 = "Bem... você pode pensar nisso como algo criado por uma civilização antiga, por assim dizer."
103040-12 = "AL-1S, que vocês descobriram, e os Profetas antes de serem hackeados pelo Decagrammaton, são alguns exemplos dessas existências."
103040-13 = "Para nós, eles já são seres obsoletos, então não chegam a ser uma ameaça, mas――"
103040-14 = "Quem diria que o \"Chroma\", vindo de fora de Kivotos, tomaria o controle daquilo..."
103040-15 = "Parece que o \"Guia do Chroma\" toma para si qualquer \"Mistério\" que se manifeste em Kivotos, seja lá o que for."
103040-16 = "A \"Arca de Atrahasis\" provavelmente foi dominada pelo mesmo motivo. Assim como o \"Decagrammaton\", as \"réplicas\" e os \"Anjos Artificiais\" que surgiram através do Sanctum."
103040-21 = "Se a Arca é mesmo uma herança dos \"Deuses Sem Nome\", então, atualmente, não existe nenhuma tecnologia em Kivotos capaz de bater de frente com ela."
103040-25 = "――Isso, é claro, com a exceção de uma herança da civilização antiga que se equipare à Arca."
103040-26 = "[ns3] \"Isso quer dizer que...\"\n[ns4] \"Aquilo que se encontra em Abydos é...\""
103040-29 = "……Sim, como o senhor já deve ter imaginado."
103040-30 = "Uma arma antiga capaz de combater a \"Arca de Atrahasis\" está adormecida lá."
103040-33 = "Aquilo que eu estava procurando no deserto de Abydos, usando a Corporação Kaiser――"
103040-34 = "A \"arma superantiga\" escondida no subsolo de Kivotos.#n――Um \"Terror\" primordial que não pode ser analisado com a tecnologia existente."
103040-35 = "Mas――naquela época, aquilo não era do meu interesse."
103040-38 = "Meu objetivo na época era firmar um contrato com o \"Mistério\" mais poderoso de Kivotos――e torná-lo meu."
103040-41 = "Para mim, o tesouro enterrado no subsolo de Abydos era apenas uma informação incerta――"
103040-42 = "Se eu conseguisse usar a Kaiser para escavá-lo, seria um bônus――eu não me importaria nem se não o encontrassem, era apenas algo desse nível."
103040-45 = "Porém, para o Presidente da Kaiser, a minha proposta deve ter soado bem atraente."
103040-46 = "Uma \"arma superantiga\" que supera qualquer força militar existente em Kivotos――Se ele pudesse colocar as mãos numa belezinha dessas,"
103040-47 = "Ele pensou que conseguiria dominar Kivotos――."
103040-50 = "E, finalmente, eles tiveram sucesso――em escavar a \"arma superantiga\"."
103040-53 = "Depois disso, o Presidente não hesitou mais.#nCom essa arma em mãos, ele deve ter pensado que não perderia nem se todos os distritos autônomos de Kivotos fossem seus inimigos."
103040-54 = "Então ele atacou o Conselho Estudantil Geral e sequestrou o Sensei da Schale...#nKukuku, se as coisas tivessem continuado a dar certo, Kivotos poderia mesmo ter caído nas mãos dele."
103040-56 = "Sim――isso, é claro, se os \"Sanctums Falsos\" não tivessem aparecido naquela hora."
103040-59 = "No instante em que a \"Torre Sanctum\" foi destruída, o Presidente percebeu que a situação havia saído de controle e recuou imediatamente."
103040-60 = "Uma decisão muito sensata para um empresário.#nAfinal, a \"arma superantiga\" é inútil sem a \"Torre Sanctum\"."
103040-62 = "Exatamente. Agora que a Torre Sanctum foi destruída, não sobrou ninguém capaz de operar a \"arma superantiga\". "
103040-63 = "Ninguém, exceto o dono do Oopart equivalente à Torre Sanctum――a \"Caixa de Shittim\"."
103040-67 = "[ns] \"............\""
103040-69 = "[ns] \"O que é essa 'arma superantiga' de verdade?\""
103040-70 = "Kuku... Não precisa ter tanta pressa.#nNo início, achei que a \"Arca\" pudesse estar enterrada em Abydos."
103040-71 = "Mas aquilo não era uma arca... era uma outra existência, mas algo extremamente próximo disso."
103040-77 = "Sim, aquilo é――um \"Navio\". "
103040-78 = "Um nome que carrega as origens de Kivotos, assim como a \"Arca de Atrahasis\"――a forma final de uma \"arma\"."
103040-81 = "――\"A Nave Principal de Utnapishtim\"."
103040-85 = "Sim――é uma nave de guerra espacial."
103040-87 = "Próximo episódio; Aquilo Que Se Encontra Em Abydos (2)"