[translation]
1003502-1 = "A dona da biblioteca antiga"
1003502-2 = "Cidade de Trinity"
1003502-3 = "（Fiquei preocupado com a mensagem da Ui e aproveitei um tempo livre para visitar a biblioteca antiga.）"
1003502-4 = "（Como sempre, barricadas foram erguidas ao redor do prédio, e a porta está trancada a sete chaves em todos os sentidos.）"
1003502-7 = "[ns1] Tentar chamar a Ui.\n[ns2] Tentar bater na porta silenciosamente."
1003502-10 = "（……Não há resposta.）"
1003502-11 = "[s3] Tentar chamar um pouco mais alto.\n[s4] Tentar bater um pouco mais forte."
1003502-12 = "N-não tem ninguém aqui! Estou ausente, então por favor, vá embora……!"
1003502-13 = "N-não tem ninguém aqui! Estou ausente, então por favor, vá embora……!"
1003502-14 = "[s5] \"Se não tem ninguém, não deveria ser impossível responder...?\"\n[s6] \"Sou eu, Ui.\""
1003502-15 = "Q-que barulhento……!"
1003502-16 = "Q-que barulhento……!"
1003502-17 = "Eu disse que não tem ninguém—"
1003502-18 = "……Ué?"
1003502-19 = "E-essa voz……."
1003502-25 = "……!?"
1003502-26 = "P-Sensei!?"
1003502-27 = "D-desculpe, eu achei que fossem aquelas pessoas de ontem de novo……."
1003502-28 = "[s7] \"Não, está tudo bem.\"\n[s8] \"Não se preocupe.\""
1003502-29 = "Ah, p-por favor, entre……."
1003502-30 = "Ah, p-por favor, entre……."
1003502-31 = "S-se for o Sensei, não tem problema nenhum……!"
1003502-32 = "……Ah."
1003502-33 = "[s9] \"……Ui?\"\n[s10] \"Aconteceu alguma coisa?\""
1003502-34 = "E-eu, bem……."
1003502-35 = "E-eu, bem……."
1003502-36 = "P-por favor, espere um pouco!"
1003502-46 = "……Ufa."
1003502-47 = "D-desculpe a demora, já pode entrar……."
1003502-48 = "……? N-não é isso!? Não é como se eu tivesse limpado às pressas……!"
1003502-49 = "B-bem, não é exatamente isso, mas também não posso negar completamente……!"
1003502-50 = "D-de qualquer forma, entre……."
1003502-54 = "[ns] Entrar na biblioteca com a Ui."
1003502-57 = "Interior da biblioteca antiga"
1003502-58 = "（O interior da biblioteca antiga continua com a mesma atmosfera misteriosa de antes.）"
1003502-59 = "（Dá para ver roupas e alguns equipamentos que foram escondidos às pressas em alguns lugares.）"
1003502-60 = "S-seja bem-vindo……."
1003502-61 = "Ah, n-não vá por ali……! Está uma bagunça!"
1003502-62 = "D-desculpe, se eu soubesse que isso aconteceria, teria arrumado antes……."
1003502-63 = "É que, normalmente, n-ninguém vem aqui……."
1003502-64 = "Se alguém quer pegar livros emprestados, vai para a biblioteca central…… a menos que seja um livro antigo muito específico……."
1003502-65 = "A-aliás, Sensei, por que você veio até aqui……?"
1003502-66 = "Você está procurando por alguém que não está na biblioteca central?"
1003502-67 = "Ah, não era isso? Então, o que seria……."
1003502-68 = "Você só veio porque quis……?"
1003502-69 = "Ah, por causa daquela mensagem……? V-você não precisava ter se preocupado……."
1003502-70 = "Já passou, e não é como se algo muito grave tivesse acontecido……."
1003502-71 = "É só que……."
1003502-72 = "O estado em que os livros voltaram, sabe……."
1003502-73 = "Talvez por terem sido verificados, as pontas das páginas estão dobradas…… ou as lombadas estão danificadas por terem sido pressionadas com força……."
1003502-74 = "Haa..."
1003502-75 = "É por isso que o pessoal de fora... b-bem, ainda assim, não posso simplesmente recusar tudo..."
1003502-76 = "...É, é só isso, não se preocupe."
1003502-77 = "...?"
1003502-78 = "Uma pausa...? B-bem, mesmo que você diga isso, não posso ficar chamando o Sensei toda vez que..."
1003502-79 = "...Não seria um incômodo?"
1003502-80 = "Porque é o Sensei..."
1003502-81 = "E-entendo... Não entendo muito bem, mas, bem... obrigado, Sensei."
1003502-82 = "Ah, bem..."
1003502-83 = "E-espere um pouco. Não é justo que você só se preocupe comigo, então, pelo menos, para aliviar um pouco o seu fardo..."
1003502-88 = "...Ah."
1003502-93 = "Sensei, pegue isto..."
1003502-94 = "[s11] \"O que é isso?\"\n[s12] \"Uma chave?\""
1003502-95 = "S-sim... é a chave do portão principal daqui."
1003502-96 = "S-sim... é a chave do portão principal daqui."
1003502-97 = "Quando eu estiver dormindo, você não conseguiria entrar... então, para que você possa vir no momento que for melhor para você..."
1003502-98 = "...? Não, não é uma chave do Comitê da Biblioteca nem nada disso..."
1003502-99 = "Não tenho reservas nem nada... sim, é a minha chave."
1003502-100 = "D-de qualquer forma, eu não saio daqui... então, pode-se dizer que não preciso dela, bem..."
1003502-101 = "Dessa forma, eu não correria o risco de ser rude com você sem querer, como aconteceu hoje..."
1003502-102 = "E assim, o único que poderá entrar será você, Sensei..."
1003502-103 = "Isso é..."
1003502-108 = "...?"
1003502-109 = "Bem..."
1003502-110 = "A-acho que você não precisa dela, né... Desculpe, eu acabei sendo um pouco... autoconsciente demais..."
1003502-111 = "Não é isso? Então, por que você quer a chave..."
1003502-112 = "[s13] \"Simplesmente porque acho que o dono deveria tê-la.\"\n[s14] \"Quando eu for vir, eu aviso pelo Momotalk.\""
1003502-113 = "Sensei..."
1003502-114 = "Sensei..."
1003502-115 = "...E-entendido. Da próxima vez, eu vou, bem... guardar comigo..."
1003502-116 = "...Fufu."
1003502-117 = "Isso também não parece ser uma má ideia..."
1003502-118 = "Bem, sobre isso..."
1003502-119 = "Já que você se deu ao trabalho de vir até o arquivo antigo... que tal dar uma olhada em algumas das minhas recomendações?"
1003502-120 = "C-com certeza deve haver algum livro interessante que vá despertar o seu interesse, Sensei."
1003502-122 = "(Depois disso, passei o tempo lendo vários livros antigos junto com Ui)"
