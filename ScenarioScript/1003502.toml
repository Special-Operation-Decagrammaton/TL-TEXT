[translation]
1003502-1 = "古書館の主"
1003502-2 = "トリニティの街"
1003502-3 = "（ウイのメッセージが気になり、時間を見つけて古書館へと訪れた）"
1003502-4 = "（相変わらず建物周辺にはバリケードが築かれており、扉は様々な意味で固く閉ざされている）"
1003502-7 = "[ns1] ウイを呼んでみる。\n[ns2] 静かにノックをしてみる。"
1003502-10 = "（……返事が無い）"
1003502-11 = "[s3] もう少し大きい声で呼んでみる。\n[s4] もう少し強くノックしてみる。"
1003502-12 = "な、中には誰もいません！留守なのでお帰りください……！"
1003502-13 = "な、中には誰もいません！留守なのでお帰りください……！"
1003502-14 = "[s5] \"いなかったら普通、返事は来ないのでは……？\"\n[s6] \"私だよ、ウイ。\""
1003502-15 = "う、うるさいですね……！"
1003502-16 = "う、うるさいですね……！"
1003502-17 = "誰もいないと言って――"
1003502-18 = "……あれ？"
1003502-19 = "そ、その声は……。"
1003502-25 = "……っ！？"
1003502-26 = "せ、先生！？"
1003502-27 = "す、すみません、てっきりまた昨日の方々かと……。"
1003502-28 = "[s7] \"ううん、大丈夫。＂\n[s8] \"気にしないで。\""
1003502-29 = "あ、ど、どうぞこちらへ……。"
1003502-30 = "あ、ど、どうぞこちらへ……。"
1003502-31 = "せ、先生でしたら、全然構いませんので……！"
1003502-32 = "……あ。"
1003502-33 = "[s9] \"……ウイ？\"\n[s10] \"どうかした？\""
1003502-34 = "そ、その、えっと……。"
1003502-35 = "そ、その、えっと……。"
1003502-36 = "しょ、少々お待ちください！"
1003502-46 = "……ふぅ。"
1003502-47 = "お、お待たせしました、もう大丈夫です……。"
1003502-48 = "……？ち、違いますよ！？急いで掃除したとかでは……！"
1003502-49 = "い、いや、当たらずとも遠からずと言いますか、完全に否定するわけではありませんが……！"
1003502-50 = "と、とにかくどうぞ……。"
1003502-54 = "[ns] ウイと一緒に中に入る。"
1003502-57 = "古書館内部"
1003502-58 = "（古書館は以前と変わらず、不思議な雰囲気が漂っている）"
1003502-59 = "（ところどころ慌てて隠したであろう衣類や、何かの機材などが見えた）"
1003502-60 = "い、いらっしゃいませ……。"
1003502-61 = "あ、そ、そっちはダメです……！散らかってますので！"
1003502-62 = "す、すみません、こうなると分かっていたら事前に片づけていたのですが……。"
1003502-63 = "普段はその、だ、誰も来ない場所なので……。"
1003502-64 = "本を借りるなら普通、中央図書館ですし……よっぽどの古書などでなければ……。"
1003502-65 = "そ、そういえば先生は、どうしてわざわざここに……？"
1003502-66 = "中央図書館にいないような子でも、お探しですか？"
1003502-67 = "あ、違いましたか。で、では一体……。"
1003502-68 = "ただ来てみた、だけ……？"
1003502-69 = "あ、あのメッセージで……？き、気になさらなくて良かったのに……。"
1003502-70 = "もう過ぎたことですし、な、何か大きなことがあったわけでもないので……。"
1003502-71 = "その、ただ……。"
1003502-72 = "戻ってきた子たちの、その、状態が……。"
1003502-73 = "チェックのためなのか、端っこが折られていたり……無理やり押さえつけたせいか、つなぎ目が傷ついていたり……。"
1003502-74 = "はあ……。"
1003502-75 = "これだから、外の方は……と、とはいえ、何でもかんでも拒絶するわけにも……。"
1003502-76 = "……そ、それだけのことです、お気になさらず。"
1003502-77 = "……？"
1003502-78 = "息抜き……？そ、そう言われましても、そのたびに先生をお呼びするわけにも……。"
1003502-79 = "……迷惑では、ありませんか？"
1003502-80 = "「先生だから」……。"
1003502-81 = "そ、そうですか……よく分かりませんが、えっと……ありがとうございます、先生。"
1003502-82 = "あぁ、えーと……。"
1003502-83 = "ちょ、ちょっと待っててください。お気遣いいただいてばかりではアレですし、何かその、せめて先生の負担を減らせるように……。"
1003502-88 = "……あ。"
1003502-93 = "先生、こちらを……。"
1003502-94 = "[s11] \"これは……？\"\n[s12] \"鍵？\""
1003502-95 = "は、はい……ここの正門の鍵、です。"
1003502-96 = "は、はい……ここの正門の鍵、です。"
1003502-97 = "私が寝てる時とかは、開けられませんし……せ、先生のご都合が良いタイミングで、来られるように……。"
1003502-98 = "……？いえ、図書委員会の分とかでは……。"
1003502-99 = "予備とかもありませんし……はい、私の鍵です。"
1003502-100 = "ど、どうせ私はここから出ませんし……必要無いと言いますか、えっと……。"
1003502-101 = "こうすれば、きょ、今日みたいに意図せず先生に、無礼な物言いをせずに済みますし……。"
1003502-102 = "は、入って来られるのは先生だけ、ということになりますので……。"
1003502-103 = "その……。"
1003502-108 = "……？"
1003502-109 = "えっと……。"
1003502-110 = "や、やっぱり要らないですよね……すみません、何だかその、じ、自意識過剰なことを……。"
1003502-111 = "違うんですか？では、どうして鍵を……。"
1003502-112 = "[s13] \"ただ単に、主が持ってるべきだと思うから。\"\n[s14] \"私が来る時は、モモトークで連絡するから。\""
1003502-113 = "先生……。"
1003502-114 = "先生……。"
1003502-115 = "……わ、分かりました。次からはその、片付けておきますので……。"
1003502-116 = "……ふふっ。"
1003502-117 = "それはそれで、悪くないかもしれませんね……。"
1003502-118 = "えっと、その……。"
1003502-119 = "せっかく古書館までいらっしゃったことですし……少し、私のおすすめの子などを見ていかれませんか？"
1003502-120 = "き、きっと先生が興味を示してくれるような、面白い子がいるはずですので。"
1003502-122 = "（その後ウイと一緒に、様々な古書を読んで過ごした）"
