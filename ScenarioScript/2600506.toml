[translation]
2600506-1 = "その輝きの、すぐそばに"
2600506-2 = "（ヨシミが言っていた新作スイーツを買って、トリニティ総合学園に到着した）"
2600506-3 = "（まだ授業中だからか、昇降口には誰もいなかった）"
2600506-4 = "[s] （ヨシミの下駄箱にスイーツを入れておく）"
2600506-6 = "……手を上げなさい、そこのヘンタイ！"
2600506-9 = "人の下駄箱の前で、こそこそと何をしてるわけ？別に答えなくてもいいけど、このまま無事に逃げられるとは思わないことね！"
2600506-10 = "とにかく、このまま正義実現委員会に引き渡して……"
2600506-11 = "……？"
2600506-12 = "……え、先生？……先生がなんでここにいるの？"
2600506-13 = "……っていうか、私の下駄箱の前で何してるの？"
2600506-14 = "[s1] \"えっと、ちょっと用事っていうか……。\"\n[s2] \"……この匂い、癖になるよね。\""
2600506-15 = "用事……？"
2600506-16 = "……授業中の女子高生の下駄箱に、どんな用事があるわけ？"
2600506-17 = "うぇ……！？ちょっ、もう！！バカっっ！！！"
2600506-18 = "そうやってふざけてからわないでって、何回言わせれば気が済むわけ！？"
2600506-19 = "いったい私のことをなんだと思って……！"
2600506-20 = "……何これ？何を入れたの……？"
2600506-23 = "え、これって……！！"
2600506-24 = "「カフェ・ミルフィーユ」の新作、「サンシャインムース」じゃん！？"
2600506-25 = "ど、どうやって手に入れたの？いや、っていうか……"
2600506-26 = "このためにわざわざ来たの？これを買って持ってくるためだけに、トリニティまで？"
2600506-27 = "……。"
2600506-28 = "……え？それより授業も終わってないのに、何でここにいるのって？"
2600506-29 = "ちがっ、サボりじゃないから！ちょっと早く終わったから急いで出てきただけ！"
2600506-30 = "授業をしてた講師のロボットが、腹痛だとか何とかで急に保健室に運ばれて……"
2600506-31 = "……？"
2600506-32 = "……何だか、二人で授業をサボって、どこかに出かけるシーンみたい？"
2600506-33 = "バカなの！？ねえバカなんでしょ！？もう何言ってるのほんとに！？"
2600506-34 = "そっ、そんなことするわけないでしょ！？ほんっと訳分かんないっ！！頭大丈夫！？"
2600506-35 = "ふぅっ、ふぅっ……。"
2600506-36 = "……。"
2600506-37 = "……ふふっ。"
2600506-38 = "まあ、今日はこれくらいにしておいてあげる。とにかく早く外に出るわよ。"
2600506-39 = "もうそろそろみんな集まってきて、このままだと見世物にされちゃうし……。"
2600506-40 = "先生だって、それは困るでしょ？"
2600506-41 = "ちょうど良いところがあるの。お返しも兼ねて、そこで私が飲み物奢るから。"
2600506-42 = "[s] （ヨシミと外に出る）"
2600506-49 = "[wa:1300]― ほんと、"
2600506-51 = "― 先生には[wa:600]驚かされっぱなしっ[wa:900]ていうか、"
2600506-54 = "― 振り回されっぱなしっ[wa:1100]ていうか……。"
2600506-57 = "[wa:300]― ……ん？[wa:1000]何をそんな、[wa:700]じっと見てるわけ？"
2600506-59 = "― ねぇ、[wa:800]まさかまた変なこと[wa:1100]考えてないでしょうね？"
2600506-62 = "[wa:500]― 私は先生の[wa:1000]オモチャじゃないんだから、"
2600506-64 = "― いい加減やめないと[wa:900]本当に怒るよ。"
2600506-67 = "[wa:1000]― ……いやまあ、[wa:1100]別に心の底から[wa:1600]嫌、ってわけじゃ[wa:600]ないけど……。"
2600506-69 = "― ……ふふっ。"
2600506-72 = "[wa:1300]― （いつか……）"
2600506-74 = "― （いつか[wa:400]こうやって隣に……[wa:2000]堂々と、[wa:1400]並んで歩ける日が……）"
2600506-77 = "……えへへっ。"
2600506-78 = "よく考えてみるとこうやって、自分が欲しいものを誰かが急いで買ってきてくれたのなんて、初めてかも。"
2600506-79 = "そう思うと、何か食べちゃうのはちょっともったいない気が……。"
2600506-80 = "一つは、部室の冷凍庫で永久保存っていう手も……。"
2600506-81 = "……ん？"
2600506-82 = "今さらだけど、その「サンシャインムース」がどんな味なのか気になる？"
2600506-83 = "……え、まさか一つしか買わなかったの？せっかくなんだから自分用にも買えばよかったのに。"
2600506-84 = "んー……。"
2600506-85 = "……いや、逆に良いかも。"
2600506-86 = "えっと、今向かってるカフェ、スイーツは扱ってなくて飲み物しか売ってないの。"
2600506-87 = "だから人数分の飲み物さえ注文すれば、食べ物の方は持ち込み自由で、そっちは人数分とか気にしなくて良くて……。"
2600506-88 = "……その、言ってること分かるでしょ？"
2600506-89 = "だからっ……！そこで二人で、一緒に食べればいいじゃん……"
2600506-90 = "それとも何、嫌なの？"
2600506-91 = "……え？"
2600506-92 = "一つしかないのに、食べちゃって良いのかって？"
2600506-93 = "そもそも本来、私には手に入らなかったものを先生が買ってきてくれたんだし。"
2600506-94 = "それに……"
2600506-95 = "先生と一緒に、食べられるし……"
2600506-96 = "……。"
2600506-98 = "なっ、何その顔！？ちょっ、バカにしてんの！？何で笑ってるわけ！？"
2600506-99 = "むっかつく……！ああもう終わり終わり！はいこの話もうおしまい！！"
2600506-100 = "ほら、置いてくわよ！？って、だからいつまでそんなニコニコしてんのよ！！やめてって言ってるでしょ！？"
2600506-102 = "（その後、ヨシミに背中を叩かれながらカフェに向かった）"
2600506-103 = "（カフェでヨシミに飲み物を奢ってもらい、スイーツを味わって、二人で帰路に着いた）"
