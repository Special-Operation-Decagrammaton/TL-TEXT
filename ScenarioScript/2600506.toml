[translation]
2600506-1 = "Bem perto daquele brilho"
2600506-2 = "（Comprei o doce novo que a Yoshimi mencionou e cheguei na Academia Trinity）"
2600506-3 = "（Como ainda deve estar no horário de aula, não havia ninguém na entrada）"
2600506-4 = "[s] （Coloco o doce no armário da Yoshimi）"
2600506-6 = "……Mãos ao alto, seu pervertido!"
2600506-9 = "O que você está fazendo aí, todo escondido na frente do armário dos outros? Não que precise responder, mas não pense que vai sair dessa ileso!"
2600506-10 = "De qualquer forma, vou te entregar para o Comitê de Justiça agora mesmo e..."
2600506-11 = "……?"
2600506-12 = "……Ei, Sensei? ……Por que você está aqui?"
2600506-13 = "……Quer dizer, o que você está fazendo na frente do meu armário?"
2600506-14 = "[s1] \"Bem, é que eu tinha um assunto...\"\n[s2] \"……Esse cheiro é viciante, né?\""
2600506-15 = "Assunto...?"
2600506-16 = "……Que tipo de assunto você teria no armário de uma estudante durante o horário de aula?"
2600506-17 = "Ué...!? Ei, chega!! Seu idiota!!!"
2600506-18 = "Quantas vezes vou ter que dizer para parar de brincar comigo desse jeito!?"
2600506-19 = "O que você pensa que eu sou...!?"
2600506-20 = "……O que é isso? O que você colocou aqui...?"
2600506-23 = "Ei, isso é...!!"
2600506-24 = "O novo \"Sunshine Mousse\" do Café Mille-Feuille, não é!?"
2600506-25 = "Co-como você conseguiu isso? Não, quer dizer..."
2600506-26 = "Você veio até aqui só por causa disso? Veio até Trinity só para comprar e me trazer isso?"
2600506-27 = "……."
2600506-28 = "……Ei? E por que você está aqui se a aula nem acabou ainda?"
2600506-29 = "Não, eu não estou matando aula! Eu só saí mais cedo porque a aula terminou antes!"
2600506-30 = "O robô instrutor que estava dando a aula passou mal ou algo assim e foi levado para a enfermaria de repente..."
2600506-31 = "……?"
2600506-32 = "……Parece até uma cena onde nós dois estamos matando aula para sair juntos, não parece?"
2600506-33 = "Você é idiota!? Ei, você é idiota, né!? O que você está dizendo, sério!?"
2600506-34 = "Eu nunca faria uma coisa dessas, tá!? Você não tem noção mesmo!! Bateu a cabeça!?"
2600506-35 = "Ufa, ufa..."
2600506-36 = "……."
2600506-37 = "……Hehe."
2600506-38 = "Bom, vou deixar passar por hoje. De qualquer forma, vamos sair logo daqui."
2600506-39 = "Daqui a pouco todo mundo vai chegar e, se ficarmos aqui, vamos virar atração."
2600506-40 = "Você não quer isso, quer, Sensei?"
2600506-41 = "Tem um lugar ótimo aqui perto. Como forma de agradecimento, eu pago uma bebida para você lá."
2600506-42 = "[s] （Saio com a Yoshimi）"
2600506-49 = "[wa:1300]— Sério,"
2600506-51 = "— Você sempre me deixa [wa:600]surpresa, Sensei[wa:900], ou melhor,"
2600506-54 = "— Você sempre me deixa [wa:1100]tonta, ou melhor..."
2600506-57 = "[wa:300]— ……Hm?[wa:1000] Por que está me olhando [wa:700]desse jeito?"
2600506-59 = "— Ei, [wa:800]você não está pensando em [wa:1100]alguma besteira, né?"
2600506-62 = "[wa:500]— Eu não sou o seu [wa:1000]brinquedo,"
2600506-64 = "— Se não parar agora, [wa:900]eu vou ficar muito brava."
2600506-67 = "[wa:1000]— ……Bem, [wa:1100]não é como se eu [wa:1600]detestasse isso [wa:600]lá no fundo..."
2600506-69 = "— ……Hehe."
2600506-72 = "[wa:1300]— (Algum dia...)"
2600506-74 = "— (Algum dia [wa:400]poder caminhar ao seu lado... [wa:2000]de forma orgulhosa, [wa:1400]lado a lado...)"
2600506-77 = "……Hehehe."
2600506-78 = "Pensando bem, acho que é a primeira vez que alguém compra algo que eu queria com tanta pressa para mim."
2600506-79 = "Pensando bem, sinto que seria um desperdício comer isso agora..."
2600506-80 = "Talvez eu pudesse guardar um permanentemente no freezer da sala do clube..."
2600506-81 = "……Hm?"
2600506-82 = "É um pouco tarde para perguntar, mas você está curioso para saber qual é o gosto desse 'Sunshine Mousse'?"
2600506-83 = "……Ei, não me diga que você só comprou um? Já que estava lá, deveria ter comprado um para você também."
2600506-84 = "Hmm..."
2600506-85 = "……Não, na verdade, talvez seja melhor assim."
2600506-86 = "Bem, o café para onde estamos indo não serve doces, só vende bebidas."
2600506-87 = "Então, contanto que a gente peça uma bebida para cada um, podemos levar nossa própria comida, e não precisamos nos preocupar com a quantidade de doces..."
2600506-88 = "……Sabe, você entende o que eu quero dizer, né?"
2600506-89 = "Então...! A gente pode simplesmente comer juntos lá..."
2600506-90 = "Ou o quê, você não quer?"
2600506-91 = "……Hã?"
2600506-92 = "Você está perguntando se tudo bem comer, já que só tem um?"
2600506-93 = "Para começo de conversa, foi você quem comprou para mim, sendo que eu nem conseguiria um desses originalmente."
2600506-94 = "Além disso..."
2600506-95 = "Eu vou poder comer junto com o Sensei..."
2600506-96 = "……."
2600506-98 = "Q-que cara é essa!? Ei, está zombando de mim!? Por que você está rindo!?"
2600506-99 = "Que irritante...! Ah, chega, acabou! Pronto, assunto encerrado!!"
2600506-100 = "Anda logo, vou te deixar para trás, viu!? E por que você continua sorrindo desse jeito!! Eu já disse para parar, não disse!?"
2600506-102 = "（Depois disso, segui para o café enquanto levava tapinhas nas costas da Yoshimi）"
2600506-103 = "（No café, a Yoshimi pagou minha bebida, saboreamos o doce e voltamos para casa juntos）"
