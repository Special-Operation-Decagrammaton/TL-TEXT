[translation]
1001102-1 = "Hora do lanche"
1001102-2 = "Jardim das Ameixeiras - Entrada"
1001102-3 = "Ora, Sensei. Você tem algum assunto no Jardim das Ameixeiras?"
1001102-4 = "Hora do lanche, você diz? Sim, eu estava justamente prestes a distribuir os lanches para as crianças do Jardim das Ameixeiras, mas..."
1001102-5 = "Ah, parece que acabei enviando o e-mail para você por engano. #nFoi um erro meu."
1001102-6 = "Mas, na verdade, foi uma boa coincidência. #nJá que você veio ao Jardim das Ameixeiras, que tal aproveitar para comer um lanche conosco?"
1001102-7 = "Não precisa se acanhar, temos muitas frutas!"
1001102-8 = "Eu também tinha um favor para pedir ao Sensei... Então, venha, venha. Por aqui, por favor."
1001102-11 = "Jardim das Ameixeiras - Cozinha"
1001102-12 = "Fufu, parecem frescas e deliciosas, não é? #nQuando eu disse que iria distribuir para as crianças do Jardim das Ameixeiras, muitos comerciantes nos enviaram todas essas frutas."
1001102-13 = "Só que a quantidade enviada foi tão grande que seria difícil para mim preparar tudo sozinha... #nPensei se o Sensei poderia me ajudar um pouquinho."
1001102-14 = "Bem... eu cuidarei dos caquis e das peras que estão aqui, então, Sensei, você poderia descascar as maçãs?"
1001102-15 = "[s] \"Entendido.\""
1001102-17 = "Deixe-me ver... Ora, Sensei, você descascou muito bem!"
1001102-18 = "Se você tem tanta destreza manual assim, tenho certeza de que o Sensei se tornará um adulto maravilhoso e habilidoso na cozinha."
1001102-19 = "Ah, veja só eu, o Sensei já é um adulto exemplar. #nComo passo o tempo todo lidando com as crianças do Jardim das Ameixeiras, acabei me esquecendo."
1001102-20 = "Ah, é verdade, agora veja as frutas que eu descasquei. O que achou?"
1001102-21 = "[s] \"Como esperado, descascou muito bem.\""
1001102-22 = "Sério? Fico feliz em receber um elogio seu, Sensei, fufu..."
1001102-24 = "Que tal provarmos um pouco antes? #nVamos, Sensei, diga 'ah'."
1001102-25 = "Fufu, não precisa ficar tão envergonhado. #nVamos, pode comer."
1001102-26 = "......Por acaso você não quer comer as frutas que eu ofereci?"
1001102-27 = "Isso não pode, não, não! Crianças boas não fazem manha com a comida. #nMesmo sendo o Sensei, isso não é permitido."
1001102-28 = "Vamos, coma. Ah..."
1001102-31 = "Fufu, que bom menino. O que achou do sabor?"
1001102-32 = "[s] \"Está muito suculenta e doce.\""
1001102-33 = "É mesmo? Então, agora deixe-me provar um pedacinho também."
1001102-34 = "Ah, isso também te deixa envergonhado? #nNão é justo que só eu coma, não é? Fufu."
1001102-36 = "Vamos, diga 'ah'."
1001102-38 = "[s] Coloca um pedaço pequeno de maçã na boca de Shun."
1001102-40 = "Hum... talvez seja porque foi o Sensei quem me deu, mas está muito doce."
1001102-41 = "Então, mais um pedacinho... #nOra? Já está na hora."
1001102-43 = "Se ficarmos aqui de bobeira por mais tempo, a hora do lanche vai acabar. Vamos nos apressar."
1001102-44 = "Sensei, por favor, pegue aquele prato ali. Eu ficarei com este."
1001102-45 = "Fufu, estou ansiosa pela hora do lanche de hoje também."
