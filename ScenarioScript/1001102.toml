[translation]
1001102-1 = "おやつの時間"
1001102-2 = "梅花園・入口"
1001102-3 = "あらっ、先生。[ruby=ばいかえん]梅花園[/ruby]に何かご用ですか？"
1001102-4 = "おやつの時間、ですか？はい、ちょうど今、梅花園の子たちにおやつを配ろうとしていたところでしたが……。"
1001102-5 = "あら、間違えて先生にもメールを送ってしまっていたみたいですね。#n私のミスです。"
1001102-6 = "でもちょうどよかったです。#n梅花園にいらっしゃったついでに、おやつを召し上がっていかれたらいかがですか？"
1001102-7 = "遠慮なさらないでください、フルーツはたくさんありますので！"
1001102-8 = "ちょうど先生にお願いしたいこともありましたので……さあ、さあ。こちらへどうぞ。"
1001102-11 = "梅花園・厨房"
1001102-12 = "ふふ、新鮮で美味しそうでしょう？#n梅花園の子たちに配ると言ったら、たくさんの商会の方々がこんなにもフルーツを送ってくださったんです。"
1001102-13 = "ただ、送ってくださった量が多すぎて私一人だと準備が大変そうで……。#n少しだけ先生に手伝っていただけないかなと思いまして。"
1001102-14 = "そうですね……こちらにある柿と梨は私が担当しますので、先生はリンゴの皮を剥いていただけますか？"
1001102-15 = "[s] \"了解。\""
1001102-17 = "どれどれ……あら、先生、すごく綺麗に剥けてますね！"
1001102-18 = "こんなに手先が器用でしたら、きっと先生は料理上手の素敵な大人になれますね。"
1001102-19 = "あら、私ったら、先生はもうすでに立派な大人でしたね。#nいつも梅花園の子たちと接してばかりでしたので、つい。"
1001102-20 = "そうだ、今度は私が剥いたフルーツを見てください。いかがですか？"
1001102-21 = "[s] \"さすが、綺麗に剥けてるね。\""
1001102-22 = "本当ですか？先生に褒められると嬉しいです、ふふ……。"
1001102-24 = "先に少しだけ、味見をしてみましょうか？#nさあ先生、あ～んってしてください。"
1001102-25 = "ふふっ、そんなに恥ずかしがらないでください。#nさあ、どうぞ召し上がって。"
1001102-26 = "……もしかして私からのフルーツは食べたくないですか？"
1001102-27 = "そういうのは、めっ、です！良い子は好き嫌いなんて言いません。#nいくら先生とはいえ、いけませんよ。"
1001102-28 = "さ、食べてください。あ～ん……。"
1001102-31 = "ふふ、良い子です。お味はいかがですか？"
1001102-32 = "[s] \"すごく瑞々しくて、甘い。\""
1001102-33 = "そうですか？でしたら今度は私にも一口、食べさせてください。"
1001102-34 = "えっ、それも恥ずかしいのですか。#n私にだけ食べさせるのは、不公平ですよ？ふふっ。"
1001102-36 = "さ、あ～ん。"
1001102-38 = "[s] シュンの口に、小さく切ったリンゴを入れてあげる。"
1001102-40 = "う～ん……先生が直接食べさせてくれたフルーツだからか、すごく甘いですね。"
1001102-41 = "それではもう一口……#nあらっ？もうこんな時間。"
1001102-43 = "これ以上のんびりしていると、おやつの時間が終わってしまいますね。急ぎましょう。"
1001102-44 = "先生はそちらにあるお皿を持ってください。私はこちらのお皿を。"
1001102-45 = "ふふ、今日のおやつの時間も楽しみですね。"
