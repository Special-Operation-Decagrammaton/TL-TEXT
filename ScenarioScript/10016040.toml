[translation]
10016040-1 = "Episódio 4: Almoço Tarde"
10016040-2 = "（Após me separar da Yuuka, caminhei para fora do estádio para almoçar）"
10016040-6 = "（Por algum motivo, há muitas pessoas reunidas no meio da praça de descanso...）"
10016040-7 = "Atenção, atletas! Bom trabalho nas partidas da manhã."
10016040-8 = "Estamos distribuindo bebidas aqui. #nSe estiverem com sede, por favor, fiquem à vontade!"
10016040-9 = "Aceitarei com gratidão, irmã!"
10016040-10 = "D-desculpe... eu não sou uma atleta, mas tudo bem se eu pegar uma bebida?"
10016040-11 = "Claro que sim. #nAqui, por favor."
10016040-12 = "Irmã, esta caixa é a última. Só restam mais algumas..."
10016040-13 = "Ah, sério? Já acabaram?"
10016040-14 = "Por favor, espere um momento... Vou entrar em contato com a sede do comitê executivo agora mesmo para repor—"
10016040-15 = "Buááá, maninha... onde você está?"
10016040-16 = "Ora, uma criança perdida...?"
10016040-17 = "Está tudo bem. #nEu vou procurar sua irmã agora mesmo, então espere aqui um pouco, está bem?"
10016040-18 = "Irmã, onde fica a máquina de venda automática mais próxima daqui?"
10016040-19 = "A máquina mais próxima fica no primeiro andar do prédio leste, mas como está em manutenção agora... #nPor favor, vire ali e use a máquina que fica no lado do prédio oeste."
10016040-20 = "Se quiser, posso te guiar depois—"
10016040-21 = "Irmã, tem algum jeito de conseguir um bom tempo no revezamento da tarde?"
10016040-22 = "U-um jeito de conseguir um bom tempo...?"
10016040-23 = "Não entendo muito de esportes, então não sei se posso dar um bom conselho, mas... #nQue tal descansar o suficiente para preparar o seu condicionamento?"
10016040-24 = "Sim, aqui está uma bebida esportiva. #nE me desculpe, agora estou cuidando de uma criança perdida—"
10016040-25 = "Irmã... o que é a justiça?"
10016040-26 = "...Essa é uma pergunta um pouco difícil."
10016040-27 = "[s] \"Nossa, parece que você está muito ocupada.\""
10016040-28 = "Ah, Professor [USERNAME]! Olá."
10016040-29 = "Peço desculpas pela demora em cumprimentá-lo. #nEstou atarefada com o trabalho do comitê executivo..."
10016040-30 = "Por acaso, o professor também tem alguma dúvida?"
10016040-31 = "[s] \"Não, não se preocupe com isso.\""
10016040-33 = "[ns] \"A propósito... você já almoçou?\""
10016040-34 = "Almoço, você diz...?"
10016040-38 = "Nossa, já é essa hora."
10016040-39 = "Eu estava tão focada no trabalho do comitê executivo que esqueci completamente do tempo..."
10016040-40 = "Ainda restam várias coisas para fazer, então... pretendo comer mais tarde."
10016040-41 = "[s] \"Vou te ajudar com o trabalho.\""
10016040-42 = "Não, não precisa."
10016040-43 = "Eu me sentiria mal se o professor acabasse perdendo o almoço por minha causa..."
10016040-44 = "Ah? A barraca mais bem avaliada por aqui...?"
10016040-45 = "Bem... ouvi dizer que o arroz chinês vendido na barraca da Associação Genbu é delicioso..."
10016040-46 = "A barraca da Associação Genbu fica logo depois daquela curva, então acho que você encontrará facilmente."
10016040-47 = "[s1] \"Como não tenho senso de direção, talvez eu me perca...\"\n[s2] \"Seria uma grande ajuda se a Mari pudesse me guiar...\""
10016040-52 = "Fufu... nesse caso, não tem jeito."
10016040-53 = "Então, vou terminar o trabalho rapidamente. #nEu guiarei o professor até a barraca."
10016040-55 = "（...Depois disso, ajudei a Mari com o trabalho）"
10016040-57 = "Professor, bom trabalho."
10016040-58 = "Graças a você, consegui resolver as várias preocupações de todos."
10016040-59 = "[s3] \"Bom trabalho para você também, Mari.\"\n[s4] \"Será que todos querem pedir conselhos para a Mari?\""
10016040-60 = "Ouvir as preocupações é o dever de uma irmã."
10016040-61 = "Ouvir as preocupações é o dever de uma irmã."
10016040-62 = "É bom que eles possam desabafar sobre as preocupações e sofrimentos que guardam dentro de si."
10016040-63 = "Bem... o horário do almoço acabou ficando um pouco tarde, mas... fufu."
10016040-64 = "[s5] \"Pelo seu esforço, o almoço é por minha conta.\"\n[s6] \"Mestre, dois bowls de arroz chinês, por favor.\""
10016040-65 = "Ah, não precisa disso..."
10016040-66 = "Ah, não precisa disso..."
10016040-67 = "Dois bowls de arroz chinês, né? Pois não! Sempre às ordens!"
10016040-72 = "Aqui estão, dois bowls de arroz chinês! Desculpe a demora!"
10016040-73 = "É, é rápido...!"
10016040-74 = "Uau... esse bowl de papel tem um formato bem peculiar!"
10016040-75 = "Não podemos deixar os clientes que vieram ver a partida esperando na frente da loja. #nNo ramo de alimentação, a velocidade é tudo!"
10016040-76 = "No Grande Festival Esportivo, muitos clientes querem comer enquanto assistem às partidas. #nEste bowl de papel foi feito especialmente para ser levado por aí."
10016040-77 = "Bom, chega de explicações... coma antes que esfrie."
10016040-78 = "Comer um arroz chinês assim, na beira da estrada, sem nem uma mesa..."
10016040-79 = "Fufu, parece que estamos fazendo algo proibido... estou um pouco nervosa."
10016040-80 = "Então... vamos comer."
10016040-84 = "Uau! Este arroz chinês é realmente delicioso."
10016040-85 = "Será que são temperos exclusivos de Shanhaijing...? #nUm leve toque de especiarias se espalha..."
10016040-86 = "Esse sabor estimulante e que não enjoa é viciante."
10016040-87 = "Não é? Não é? #nEste arroz chinês é uma novidade que usa um molho secreto desenvolvido por nós, da Associação Genbu!"
10016040-88 = "...Mesmo sendo tão gostoso, assim que a competição culinária acabou, a presidente Rumi disse que teve ideias de melhorias e foi embora de repente..."
10016040-89 = "Será que ela não está dando importância demais às palavras daquela aluna de Gehenna?"
10016040-90 = "[s] \"Com licença, gostaria de repetir!\""
10016040-91 = "Sempre às ordens! Só um instante, por favor."
10016040-95 = "...Ai, que quente!"
10016040-97 = "V-você está bem!?"
10016040-98 = "Foi só um respingo de óleo, estou bem. Ai, ai..."
10016040-99 = "Não está nada bem! Queimaduras são muito perigosas, sabia? #nVamos logo para o Quartel-General Médico Conjunto..."
10016040-100 = "Mas, com a presidente Rumi ausente, não posso simplesmente abandonar o posto..."
10016040-101 = "Eu fico na loja e peço a compreensão dos clientes. #nFuncionário, por favor, vá com o Sensei para o Quartel-General Médico Conjunto. Rápido!"
10016040-102 = "[s7] \"Pode acabar deixando uma cicatriz, afinal.\"\n[s8] \"Eu guio vocês até o Quartel-General Médico Conjunto.\""
10016040-103 = "Bem... os clientes já foram quase todos embora, então acho que um pouco não tem problema."
10016040-104 = "Bem... os clientes já foram quase todos embora, então acho que um pouco não tem problema."
10016040-105 = "Então, desculpe o incômodo, mas conto com você."
10016040-106 = "Certo, bom trabalho!"
10016040-109 = "Mais uma grande quantidade de feridos na partida anterior..."
10016040-110 = "Sena, por favor, comece desinfetando os casos de arranhões leves! #nAqueles que precisarem de medidas adicionais, eu vou transferir para as camas improvisadas."
10016040-111 = "Entendido. Vou buscar mais gaze desinfetada na caixa de suprimentos médicos."
10016040-112 = "[s] \"Parece que vocês estão bem ocupadas aqui também.\""
10016040-113 = "Ah, Sensei? Precisa de algo no Quartel-General Médico Conjunto?"
10016040-114 = "Por acaso você se machucou...?"
10016040-115 = "[s] \"Não fui eu quem se machucou...\""
10016040-116 = "Eu me queimei com óleo enquanto fritava tempurá... desculpe pelo trabalho."
10016040-117 = "Não peça desculpas! Queimaduras precisam ser tratadas rápido, ou podem deixar cicatrizes!"
10016040-118 = "Especialmente óleo em alta temperatura, que tende a grudar na superfície da pele. #nSe atingir camadas profundas além da epiderme, é muito perigoso."
10016040-119 = "Sena, você poderia preparar mais gaze para queimaduras?"
10016040-120 = "Espere um pouco, por favor. Estou cortando talas para um paciente com fratura..."
10016040-121 = "Assim que eu terminar aqui, cuidarei disso imediatamente."
10016040-122 = "[s9] \"...Quer que eu ajude?\"\n[s10] \"Eu posso pelo menos buscar os suprimentos médicos...\""
10016040-126 = "Não pode!"
10016040-127 = "E-err, você não pode entrar na sala de primeiros socorros!"
10016040-128 = "[s] \"Tem algo na sala de primeiros socorros...?\""
10016040-129 = "Bem, é que..."
10016040-130 = "Agora, na enfermaria, estamos tratando um paciente em estado grave que sofreu ferimentos sérios por um projétil."
10016040-131 = "O estado é bem crítico, então não recomendo que o Sensei, sendo um civil, veja isso."
10016040-132 = "Sim... é um estado tão ruim que você teria pesadelos só de olhar!"
10016040-133 = "[s11] \"Isso é terrível...\"\n[s12] \"Se vocês estão tão ocupadas, talvez eu devesse ajudar...\""
10016040-134 = "M-mesmo sendo ferimentos graves... nós conseguimos tratar apenas com as nossas forças!"
10016040-135 = "M-mesmo sendo ferimentos graves... nós conseguimos tratar apenas com as nossas forças!"
10016040-136 = "As equipes médicas de ambas as academias estão dando o seu melhor, então ele deve estar totalmente recuperado em cerca de uma hora."
10016040-137 = "[s] \"Dá para tratar tão facilmente assim...?\""
10016040-138 = "Sim! Por isso, deixe o tratamento do paciente conosco e #nSensei, por favor, aproveite o Grande Festival Esportivo!"
10016040-139 = "Aquele cadáver ali..."
10016040-140 = "Não, o paciente com queimaduras deve vir por aqui."
10016040-144 = "C-cadáver? Bem... de qualquer forma, conto com vocês."
10016040-146 = "(E assim, como se estivesse sendo empurrado por Sena e Serina, deixei o quartel-general médico conjunto...)"
