[translation]
10003065-1 = "第6話;海辺に夜の帳は下りて"
10003065-2 = "（アコが企画した海辺の散歩は、結局ほぼ中断のような形になってしまった）"
10003065-3 = "[s] \"……。\""
10003065-4 = "（なんだかんだでヒナとも落ち着いて過ごすことができず、何か埋め合わせをと考えて……）"
10003065-5 = "[s] \"よし、ヒナをあらためてお散歩に誘おう。\""
10003065-6 = "（スマホでヒナの番号を探していた時、不意にヒナからモモトークが届いた）"
10003065-8 = "先生。もし良かったら、少し付き合ってくれない？"
10003065-12 = "（逆にヒナに呼ばれてしまい、夜の海辺へと向かった）"
10003065-15 = "あっ、先生。えっと……取り合えず、少し歩く？"
10003065-20 = "……。"
10003065-25 = "……。"
10003065-30 = "（そうやって二人して無言のまま、どれぐらいの時間歩いただろう）"
10003065-33 = "……私なんかと一緒にいても、あんまり楽しくないでしょ？"
10003065-34 = "[s] \"えっ……！？\""
10003065-35 = "今日一日、先生はすごく忙しそうだった。"
10003065-36 = "最後に部屋を飛び出る時なんて、「海辺に絶滅危惧種の珍しいタコが出たから早く保護しないと！」って言ってたけど……。"
10003065-37 = "どう、ちゃんと保護できた？"
10003065-38 = "[s] \"そ、それは、その……。\""
10003065-39 = "……うん、分かってる。"
10003065-40 = "今日は部屋にいる時間が長くって、それでも先生とお話しできる間はすごく楽しくって……でも、それはあくまで私のわがまま。"
10003065-41 = "そもそも、私みたいなつまらない子といたって、先生の方は退屈だろうし……。"
10003065-42 = "[s1] \"いやいやいやいや！！！\"\n[s2] \"そんなこと無いよ！絶対にそんなことはない！！\""
10003065-43 = "……ありがとう、先生。でも、そんなに気を遣ってくれなくても大丈――"
10003065-44 = "……ありがとう、先生。でも、そんなに気を遣ってくれなくても大丈――"
10003065-45 = "[s] \"いや、本当に！！！\""
10003065-46 = "……嘘じゃない？"
10003065-47 = "[s] \"誓います！！\""
10003065-48 = "……そう。"
10003065-49 = "……。"
10003065-50 = "……ふふっ。"
10003065-51 = "もう、そんなに真剣な顔になっちゃって……。"
10003065-52 = "冗談よ。"
10003065-53 = "先生は、こういう時には嘘なんかつかないってこと……私がきっと、誰よりも知ってる。"
10003065-54 = "ただちょっと、意地悪をしたくなったというか……。"
10003065-55 = "[s] \"それはどういう……？\""
10003065-56 = "今日先生が忙しかったのは、風紀委員会の訓練のためなんでしょう？"
10003065-57 = "あんなに一生懸命、私たちの訓練のために走り回って……。"
10003065-58 = "ありがとう、先生。私たちのこと、手伝ってくれて。"
10003065-59 = "[s3] \"ば、バレてた……！？\"\n[s4] \"ヒナからこんな良い笑顔でお礼を……これがひと夏の魔法……。\""
10003065-60 = "何その反応、私のことなんだと思ってるの……そんなに大げさに言わなくても良いでしょう。"
10003065-61 = "何その反応、私のことなんだと思ってるの……そんなに大げさに言わなくても良いでしょう。"
10003065-62 = "まあ、全部が全部、事情を把握してるわけではないのだけれど。"
10003065-63 = "そういえばさっき、みんなやたら土まみれで、相当疲れたみたいだけど……。"
10003065-64 = "もしかして……そんなに激しくしごいてた？"
10003065-65 = "まあアコのことだし、ちゃんとやってくれたとは思うけど……。"
10003065-66 = "でも、それくらいみんな頑張ってたんだなって思うとやっぱり……こうしてずっと私だけ部屋にいるのは、何だか落ち着かないというか……。"
10003065-67 = "[s5] \"やっぱり、ずっと部屋にいるのは嫌だった……？\"\n[s6] \"もしかして、逆に疲れさせちゃった？\""
10003065-68 = "えっと、何て言うか……。"
10003065-69 = "えっと、何て言うか……。"
10003065-70 = "ずっと慌ただしくて、忙しくて、面倒なことがいくらでもあるのが常だったから……。"
10003065-71 = "先生もいなくて、ここにひとりでポツンといるのはその、少し……"
10003065-72 = "[s] \"少し……？\""
10003065-73 = "えっと、別に文句を言いたいわけじゃなくて。もちろん今回の訓練を全部アコに任せたのは、あくまで私の判断だし。でも、普段あまりにもやるべきことが多すぎたせいか……。"
10003065-74 = "その、何て言えば良いのかな……。"
10003065-75 = "……うん。退屈……だった、かも。"
10003065-78 = "[ns7] \"……ごめんね。\"\n[ns8] \"お詫びにってわけじゃないけど……ヒナは何かやりたいこととか、ある？\""
10003065-79 = "やりたいこと……。"
10003065-80 = "やりたいこと……。"
10003065-81 = "一つだけ、あるかもしれない。"
10003065-82 = "……泳ぎ方を教えてほしい。"
10003065-83 = "[s] \"泳ぎ方？\""
10003065-84 = "私、その……ほとんど泳いだことがなくって。"
10003065-85 = "スキルとしてかなり未熟で……だから、今回少しでもそれを鍛えられたらなって。"
10003065-86 = "アコから貰ったスケジュール表だと、明日の午前中も部屋で待機になっちゃってるから……。"
10003065-91 = "だから、先生。"
10003065-92 = "明日の午前中、私に泳ぎを教えてくれない？"
10003065-95 = "[ns] \"うん、もちろん。任せて！\""
10003065-96 = "……ありがとう。じゃあ明日、お願いね。"
10003065-98 = "夏季合宿用オペレーションルーム"
10003065-99 = "[ns] \"……といった感じの経緯なんだけど。\""
10003065-100 = "……。"
10003065-101 = "えっと……アコちゃん？大丈夫？"
10003065-102 = "……感激しました！あの委員長が、あの委員長がご自分の口で「泳ぎたい」だなんて……！"
10003065-103 = "つまり、ようやく委員長も夏休みを過ごす気になってくださったということ！"
10003065-104 = "「スキル」とか言ってるし、ちょっと違う気もするけど……確かに、珍しいこともあるもんだな……。"
10003065-105 = "先生も少しは役に立つのですね、見直しました！"
10003065-106 = "皆さんの努力の甲斐あって、今回の作戦は間違いなく良い形で進んでいます。"
10003065-107 = "さあ、こうしてはいられません。これで明日の目標も決まりました！"
10003065-108 = "明日は委員長が何事も無く泳げるように！全身全霊を注ぎましょう！"
10003065-109 = "……。"
10003065-110 = "……。"
10003065-111 = "絶対にトラブルを近づけてはなりません！たとえ皆さんが水底に沈んだとしても、委員長をお守りするのです！"
10003065-113 = "では明日も引き続き、命をかけてください！解散！！"
10003065-116 = "……。"
10003065-117 = "……。"
