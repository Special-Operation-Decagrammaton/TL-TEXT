[translation]
10003065-1 = "Episódio 6: A noite cai sobre a beira-mar"
10003065-2 = "（O passeio à beira-mar planejado por Ako acabou sendo interrompido quase que completamente）"
10003065-3 = "[s] \"……。\""
10003065-4 = "（Não consegui passar um tempo tranquilo com Hina por causa de tudo o que aconteceu, então pensei em compensá-la de alguma forma...）"
10003065-5 = "[s] \"Certo, vou convidar a Hina para passear de novo.\""
10003065-6 = "（Quando estava procurando o número da Hina no celular, recebi uma MomoTalk dela de repente）"
10003065-8 = "Sensei. Se não se importar, poderia me fazer companhia por um tempo?"
10003065-12 = "（Acabei sendo chamado pela Hina e fui em direção à praia à noite）"
10003065-15 = "Ah, Sensei. Bem... por enquanto, quer caminhar um pouco?"
10003065-20 = "……。"
10003065-25 = "……。"
10003065-30 = "（Quanto tempo será que caminhamos assim, em silêncio, nós dois?）"
10003065-33 = "……Você não se diverte muito ficando comigo, não é?"
10003065-34 = "[s] \"Hã……!?\""
10003065-35 = "O Sensei pareceu muito ocupado o dia todo hoje."
10003065-36 = "Quando saiu correndo da sala no final, você disse: \"Um polvo raro em extinção apareceu na praia, preciso protegê-lo logo!\", mas..."
10003065-37 = "E então, conseguiu proteger ele direitinho?"
10003065-38 = "[s] \"I-Isso é, bem…….\""
10003065-39 = "……Sim, eu entendo."
10003065-40 = "Hoje passei muito tempo na sala, e mesmo assim, o tempo que pude conversar com você foi muito divertido... mas isso é apenas um capricho meu."
10003065-41 = "Afinal, para alguém entediante como eu, deve ser chato para você, Sensei……."
10003065-42 = "[s1] \"Não, não, não, não!!!\"\n[s2] \"Isso não é verdade! De jeito nenhum!!\""
10003065-43 = "……Obrigada, Sensei. Mas não precisa se esforçar tanto para ser gentil, está tudo be――"
10003065-44 = "……Obrigada, Sensei. Mas não precisa se esforçar tanto para ser gentil, está tudo be――"
10003065-45 = "[s] \"Não, é sério!!!\""
10003065-46 = "……Não está mentindo?"
10003065-47 = "[s] \"Eu juro!!\""
10003065-48 = "……Entendo."
10003065-49 = "……。"
10003065-50 = "……Fufu."
10003065-51 = "Poxa, você ficou com uma cara tão séria……."
10003065-52 = "É brincadeira."
10003065-53 = "Que o Sensei não mente em momentos assim... eu certamente sou a pessoa que melhor sabe disso."
10003065-54 = "É só que, eu meio que quis ser um pouco maldosa……."
10003065-55 = "[s] \"O que quer dizer com isso……?\""
10003065-56 = "O Sensei estava ocupado hoje por causa do treinamento do Comitê Disciplinar, não estava?"
10003065-57 = "Você correu tanto, se esforçando tanto pelo nosso treinamento……."
10003065-58 = "Obrigada, Sensei. Por nos ajudar."
10003065-59 = "[s3] \"V-Você sabia……!?\"\n[s4] \"A Hina me agradecendo com um sorriso tão lindo... isso é a magia de um verão…….\""
10003065-60 = "Que reação é essa? O que você pensa de mim... não precisa exagerar tanto assim."
10003065-61 = "Que reação é essa? O que você pensa de mim... não precisa exagerar tanto assim."
10003065-62 = "Bem, não é como se eu soubesse de todos os detalhes."
10003065-63 = "Falando nisso, vi que todos estavam cobertos de terra e pareciam bem cansados……."
10003065-64 = "Por acaso... você pegou pesado assim com eles?"
10003065-65 = "Bem, tratando-se da Ako, imagino que ela tenha feito tudo corretamente, mas……."
10003065-66 = "Mas, ao pensar que todos se esforçaram tanto, eu acabo me sentindo... um pouco inquieta por ter ficado esse tempo todo apenas comigo na sala……."
10003065-67 = "[s5] \"No fim das contas, você não gostou de ficar na sala o tempo todo……?\"\n[s6] \"Por acaso, eu acabei te deixando cansada?\""
10003065-68 = "Bem, como posso dizer……."
10003065-69 = "Bem, como posso dizer……."
10003065-70 = "Como sempre foi comum ter tanta correria, ocupação e problemas para resolver……."
10003065-71 = "Sem você aqui, Sensei, ficar sozinha aqui é, bem, um pouco..."
10003065-72 = "[s] \"Um pouco...?\""
10003065-73 = "Bem, não é que eu esteja reclamando. Claro, deixar todo o treinamento desta vez nas mãos da Ako foi uma decisão minha. Mas, talvez seja porque eu tenho tido coisas demais para fazer ultimamente..."
10003065-74 = "É, como eu deveria dizer isso..."
10003065-75 = "...Sim. Acho que eu estava... entediada."
10003065-78 = "[ns7] \"...Desculpe.\"\n[ns8] \"Não é exatamente um pedido de desculpas, mas... Hina, tem algo que você queira fazer?\""
10003065-79 = "Algo que eu queira fazer..."
10003065-80 = "Algo que eu queira fazer..."
10003065-81 = "Talvez exista uma coisa."
10003065-82 = "...Eu queria que você me ensinasse a nadar."
10003065-83 = "[s] \"A nadar?\""
10003065-84 = "Eu, bem... quase nunca nadei na vida."
10003065-85 = "Minha habilidade nisso é bem rudimentar... então, pensei que poderia aproveitar para treinar um pouco."
10003065-86 = "Pelo cronograma que a Ako me deu, amanhã de manhã eu ficarei apenas esperando no quarto..."
10003065-91 = "Por isso, Sensei."
10003065-92 = "Você poderia me ensinar a nadar amanhã de manhã?"
10003065-95 = "[ns] \"Claro, com certeza. Pode deixar comigo!\""
10003065-96 = "...Obrigada. Então, conto com você amanhã."
10003065-98 = "Sala de Operações do Acampamento de Verão"
10003065-99 = "[ns] \"...E foi assim que aconteceu.\""
10003065-100 = "..."
10003065-101 = "Err... Ako? Você está bem?"
10003065-102 = "...Estou emocionada! A Presidente, a própria Presidente, disse com suas próprias palavras que quer \"nadar\"...!"
10003065-103 = "Isso significa que, finalmente, a Presidente decidiu aproveitar as férias de verão!"
10003065-104 = "Ela disse que é uma \"habilidade\", então não sei se é bem por aí, mas... realmente, coisas raras acontecem..."
10003065-105 = "O Sensei até que serve para alguma coisa, mudei minha opinião sobre você!"
10003065-106 = "Graças ao esforço de todos, esta operação está progredindo muito bem."
10003065-107 = "Muito bem, não podemos perder tempo. O objetivo de amanhã já está definido!"
10003065-108 = "Amanhã, vamos nos dedicar de corpo e alma para garantir que a Presidente consiga nadar sem problemas!"
10003065-109 = "..."
10003065-110 = "..."
10003065-111 = "Não permitam que nenhum problema se aproxime! Mesmo que todos vocês afundem no fundo do mar, protejam a Presidente a todo custo!"
10003065-113 = "Então, continuem dando suas vidas amanhã também! Dispensados!!"
10003065-116 = "..."
10003065-117 = "..."
