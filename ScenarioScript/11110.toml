[translation]
11110-2 = "Episódio 11; Para o mercado negro (1)"
11110-3 = "mercado negro"
11110-4 = "(Gaya Gaya)"
11110-5 = "Este é o mercado negro..."
11110-6 = "Uau☆Está muito lotado, não é?"
11110-7 = "Realmente. Eu estava imaginando um mercado pequeno, mas acabou sendo do tamanho de uma cidade."
11110-8 = "Eu não tinha ideia de que a área fora do alcance do Conselho Estudantil da Federação se tornaria tão grande."
11110-9 = "Hehe~ Normalmente estamos apenas em Abydos. Existem muitos lugares estranhos fora do distrito escolar."
11110-10 = "Hoshino-senpai, você já esteve aqui?"
11110-11 = "Bem, é a minha primeira vez também. Mas outros distritos escolares têm muitas coisas estranhas."
11110-12 = "Há também um aquário bem grande. Chama-se aquário!"
11110-13 = "Eu quero ir na próxima vez. Ei, peixe... sashimi..."
11110-14 = "Eu realmente não entendo, mas não acho que um aquário seja assim..."
11110-15 = "Pessoal, por favor, não baixem a guarda. É um lugar onde são comercializadas armas e armas ilegais. Eu não sei o que vai acontecer."
11110-16 = "Se algo acontecer, serei eu... Kyaah! ?"
11110-17 = "(Tatatatatatatatatata!)"
11110-19 = "É um tiro."
11110-22 = "Espere! !"
11110-23 = "Uau! É ruim! É ruim! ! Por favor, não me siga! !"
11110-24 = "É assim mesmo?"
11110-28 = "Esse...aquele uniforme..."
11110-31 = "Uau, por favor, fique aí! !"
11110-34 = "(Dong)"
11110-35 = "I-itata... E-me desculpe!"
11110-36 = "Você está bem?"
11110-37 = "Não sei por que, parece que estou sendo perseguido."
11110-38 = "Isso... isso é..."
11110-41 = "O que vocês são? Saia do caminho! Temos algo a ver com os alunos da Trinity de lá."
11110-42 = "Ah, uh... eu, eu não tenho nada em particular para fazer..."
11110-43 = "...! !"
11110-44 = "Eu me lembro daquele uniforme... Trinity General Academy, uma das gigantescas escolas de Kivotos!"
11110-46 = "Ah, e também é a escola com mais dinheiro em Kivotos! #nÉ por isso que eles a sequestram e recebem um resgate enorme!"
11110-47 = "Sequestro e negociação! Não é uma ótima técnica financeira? Kukukukuku."
11110-48 = "Bem, se vocês estiverem interessados, concordariam com o plano? A parte do dinheiro do resgate é..."
11110-50 = "sim?"
11110-53 = "(Baixo!)"
11110-54 = "Oh meu Deus!"
11110-55 = "Pessoas más devem ser punidas☆"
11110-56 = "Sim."
11110-57 = "Ah... hein? Huh?"
11110-59 = "Ah, muito obrigado. Se não fosse por todos, eu teria causado problemas na escola..."
11110-60 = "Além disso, desde que escapei, se causei algum problema... ah... só posso imaginar..."
11110-61 = "Hmm, é Hifumi-chan? De qualquer forma, por que a jovem de Trinity veio para um lugar tão perigoso?"
11110-62 = "Ah, haha... isso mesmo... Na verdade, há algo que estou procurando..."
11110-63 = "Não está mais à venda, então você não pode comprá-lo, mas parece que está sendo negociado secretamente no mercado negro..."
11110-64 = "Talvez... um tanque?"
11110-65 = "Ou uma arma de fogo ilegal?"
11110-66 = "É uma arma química?"
11110-67 = "Huh! ? Não, não... humm, são produtos de edição limitada da Peroro-sama."
11110-68 = "Peroro?"
11110-69 = "Bens limitados?"
11110-70 = "sim! Este. Um brinquedo de pelúcia de edição limitada feito em colaboração com Peroro-sama e uma sorveteria!"
11110-71 = "Este é um item de edição limitada com apenas 100 peças fabricadas."
11110-72 = "ei? Não é fofo?"
11110-73 = "……."
11110-74 = "Uau☆ Amigos Momo! Eu também adoro! Peroro-chan é tão fofo! #nEu gosto do Sr. Nikolai."
11110-75 = "Eu entendo! O lado filosófico de Nikolai também é legal."
11110-76 = "Eu também comprei o livro recentemente lançado de Nikolai, “Beyond Good and Evil”! É também a primeira edição!"
11110-77 = "...Bem, não sei do que você está falando, mas não faz muito sentido para o velho."
11110-78 = "Hoshino-senpai não tem interesse nesse tipo de fantasia."
11110-79 = "Hmm, não consigo acompanhar os jovens hoje em dia."
11110-80 = "Quase não há diferença de idade..."
11110-81 = "Então, vim comprar algumas mercadorias, mas me envolvi com as pessoas de antes... #nEu me pergunto o que teria acontecido se não fosse por todos vocês."
11110-82 = "...A propósito, pessoal de Abydos, por que vieram aqui?"
11110-83 = "Somos parecidos também. Há algo que estou procurando."
11110-84 = "sim. Não é mais produzido e é difícil de conseguir, mas ouvi dizer que está aqui."
11110-85 = "Quero dizer, é um sentimento semelhante."
11110-86 = "Pessoal, isso é difícil! Pessoas armadas estão vindo de todas as direções!"
11110-87 = "O que! ?"
11110-89 = "São eles! !"
11110-90 = "Você fez um ótimo trabalho! Eu vou fazer você sofrer!"
11110-93 = "Parece que ele é amigo dos bandidos que lutamos antes! É um modo completamente hostil!"
11110-94 = "Onde você quiser."
11110-95 = "Sério, por que isso sempre surge? Fizemos algo errado?"
11110-96 = "Deixem as reclamações para trás... vamos revidar, pessoal!"
