[translation]
11110-2 = "第11話;ブラックマーケットへ（１）"
11110-3 = "ブラックマーケット"
11110-4 = "（ガヤガヤ）"
11110-5 = "ここがブラックマーケット……。"
11110-6 = "わあ☆すっごい賑わってますね？"
11110-7 = "本当に。小さな市場を想像していたけど、街ひとつぐらいの規模だなんて。"
11110-8 = "連邦生徒会の手が及ばないエリアが、ここまで巨大化してるとは思わなかった。"
11110-9 = "うへ～普段私たちはアビドスにばっかりいるからねー。学区外は結構変な場所が多いんだよー。"
11110-10 = "ホシノ先輩、ここに来たことあるの？"
11110-11 = "いんやー、私も初めてだねー。でも他の学区には、へんちくりんなものがたくさんあるんだってさー。"
11110-12 = "ちょーデカい水族館もあるんだって。アクアリウムっていうの！"
11110-13 = "今度行ってみたいなー。うへ、魚……お刺身……。"
11110-14 = "よくわかんないけど、アクアリウムってそういうのじゃないような……。"
11110-15 = "皆さん、油断しないでください。そこは違法な武器や兵器が取引される場所です。何が起こるかわからないんですよ。"
11110-16 = "何かあったら私が……きゃあっ！？"
11110-17 = "（タタタタタタタタタ！）"
11110-19 = "銃声だ。"
11110-22 = "待て！！"
11110-23 = "う、うわああ！まずっ、まずいですー！！つ、ついてこないでくださいー！！"
11110-24 = "そうはいくか！"
11110-28 = "あれ……あの制服は……。"
11110-31 = "わわわっ、そこどいてくださいー！！"
11110-34 = "（ドンッ）"
11110-35 = "い、いたた……ご、ごめんなさい！"
11110-36 = "大丈夫？"
11110-37 = "なわけないか、追われてるみたいだし。"
11110-38 = "そ……それが……。"
11110-41 = "何だおまえらは。どけ！アタシたちはそこのトリニティの生徒に用がある。"
11110-42 = "あ、あうう……わ、私の方は特に用はないのですけど……。"
11110-43 = "……！！"
11110-44 = "思い出しました、その制服……キヴォトスいちのマンモス校のひとつ、トリニティ総合学園です！"
11110-46 = "そう、そしてキヴォトスで一番金を持っている学校でもある！#nだから拉致って身代金をたんまり頂こうってわけさ！"
11110-47 = "拉致って交渉！なかなかの財テクだろう？くくくくっ。"
11110-48 = "どうだ、おまえらも興味があるなら計画に乗るか？身代金の分け前は……。"
11110-50 = "ん？"
11110-53 = "（バスッバスッ！）"
11110-54 = "うぎゃあっ！"
11110-55 = "悪人は懲らしめないとです☆"
11110-56 = "うん。"
11110-57 = "あ……えっ？えっ？"
11110-59 = "あ、ありがとうございました。みなさんがいなかったら、学園に迷惑をかけちゃうところでした……。"
11110-60 = "それに、こっそり抜け出してきたので、何か問題を起こしたら……あうう……想像しただけでも……。"
11110-61 = "えっとー、ヒフミちゃんだっけ？それにしても、トリニティのお嬢様が何でこんな危ない場所に来たの？"
11110-62 = "あ、あはは……それはですね……実は、探し物がありまして……。"
11110-63 = "もう販売されていないので買うこともできない物なのですが、ブラックマーケットでは密かに取引されているらしくて……。"
11110-64 = "もしかして……戦車？"
11110-65 = "もしくは違法な火器？"
11110-66 = "化学武器とかですか？"
11110-67 = "えっ！？い、いいえ……えっとですね、ペロロ様の限定グッズなんです。"
11110-68 = "ペロロ？"
11110-69 = "限定グッズ？"
11110-70 = "はい！これです。ペロロ様とアイス屋さんがコラボした、限定のぬいぐるみ！"
11110-71 = "限定生産で100体しか作られていないグッズなんですよ。"
11110-72 = "ね？可愛いでしょう？"
11110-73 = "……。"
11110-74 = "わあ☆モモフレンズですね！私も大好きです！ペロロちゃん可愛いですよねえ！#n私はミスター・ニコライが好きなんです。"
11110-75 = "分かります！ニコライさんも哲学的なところがカッコ良くて。"
11110-76 = "最近出たニコライさんの本『善悪の彼方』も買いましたよ！それも初版で！"
11110-77 = "……いやぁー何の話だか、おじさんにはさっぱりだなー。"
11110-78 = "ホシノ先輩はこういうファンシー系にまったく興味ないでしょ。"
11110-79 = "ふむ、最近の若いやつにはついていけん。"
11110-80 = "歳の差、ほぼないじゃん……。"
11110-81 = "というわけで、グッズを買いに来たのですが、先ほどの人たちに絡まれて……#nみなさんがいなかったら今頃どうなっていたことやら。"
11110-82 = "……ところで、アビドスのみなさんは、なぜこちらへ？"
11110-83 = "私たちも似たようなもんだよ。探し物があるんだー。"
11110-84 = "そう。今は生産されていなくて手に入れにくい物なんだけど、ここにあるって話を聞いて。"
11110-85 = "そうなんですか、似たような感じなんですね。"
11110-86 = "皆さん、大変です！四方から武装した人たちが向かってきています！"
11110-87 = "何っ！？"
11110-89 = "あいつらだ！！"
11110-90 = "よくもやってくれたな！痛い目にあわせてやるぜ！"
11110-93 = "先ほど撃退したチンピラの仲間のようです！完全に敵対モードです！"
11110-94 = "望むところ。"
11110-95 = "まったく、なんでこんなのばっかり絡んでくるんだろうね？私たち、何か悪いことした？"
11110-96 = "愚痴は後にして……応戦しましょう、皆さん！"
