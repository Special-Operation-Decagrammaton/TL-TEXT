[translation]
80000030-1 = "Algemas falsas"
80000030-2 = "Valkyrie - Departamento de Segurança Pública"
80000030-3 = "Sensei, Sensei, olhe aqui!"
80000030-4 = "Sabe o que é isto?"
80000030-9 = "[ns] \"Algemas...?\""
80000030-10 = "Sim, metade da resposta está correta!"
80000030-11 = "Na verdade, não são algemas de verdade, mas sim chocolates em formato de algemas."
80000030-12 = "Enquanto eu fazia a patrulha hoje de manhã, vi que estavam vendendo esses chocolates diferentes por causa do Dia dos Namorados."
80000030-13 = "Tive uma ótima ideia, então comprei na hora!"
80000030-14 = "[s] \"Uma ótima ideia?\""
80000030-15 = "Sim. As algemas, é claro, são ferramentas usadas para prender criminosos."
80000030-16 = "E, em alguns casos, depois de capturar o criminoso, a polícia coloca uma algema nele e a outra no próprio pulso para garantir que ele não fuja."
80000030-17 = "Porém, eu cometo muitos erros bobos e, às vezes, acabo prendendo apenas a minha própria mão, deixando o criminoso escapar..."
80000030-18 = "Por isso, sempre pensei em como resolver essas situações ou em como seria bom ter uma superforça..."
80000030-23 = "Com essas algemas de chocolate, esse problema desaparece!"
80000030-24 = "Mesmo que eu as coloque por engano, basta um pouco de força para que elas se despedacem."
80000030-25 = "Além disso, posso comê-las quando estiver com fome durante o serviço... Não é como se diz, matar dois coelhos com uma cajadada só?"
80000030-26 = "O que acha, Sensei? O meu plano perfeito!"
80000030-27 = "[s] \"Mas isso não significa que o criminoso também... pode escapar?\""
80000030-31 = "...É, você tem razão!?"
80000030-32 = "A-afinal, as algemas não servem para nada...?"
80000030-33 = "O-o que eu faço, Sensei... Achei que seriam úteis para o trabalho e acabei registrando como despesa..."
80000030-34 = "Se continuar assim, vou levar uma bronca dos superiores de novo..."
80000030-36 = "(No fim, parece que Kirino teve que escrever um relatório de desculpas por tentar usar o orçamento para fins estranhos...)"
80000030-37 = "(Os chocolates em formato de algema, que não podiam mais ser usados, foram gentilmente dados a mim por Kirino como um presente.)"
