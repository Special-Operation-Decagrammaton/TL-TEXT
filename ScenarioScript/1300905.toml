[translation]
1300905-1 = "ツバキの修行法：実践編"
1300905-2 = "今日は修行部の部長として、修行部の顧問である先生に、真の修行について教えてあげる。"
1300905-3 = "真の修行。そう、つまり、「より気持ちよく、ぐっすりと熟睡できる睡眠法」について。"
1300905-4 = "[s] \"やっぱりそういうのなんだね。\""
1300905-5 = "先生、寝ることを侮ったらダメだよ……。"
1300905-6 = "きちんと寝るのは、想像以上に難しいことだからね。"
1300905-7 = "見て、現代の社会人たちはあらゆる原因の不眠症に悩まされてて、よく眠るコツや、"
1300905-8 = "熟睡できる方法を求めて、こうやってネットに質問を投げてるくらいなんだから。"
1300905-9 = "寝る前に温かいシャワーを浴びる、ココアを飲む、ホワイトノイズを聞きながら瞑想する、等々……。"
1300905-10 = "色んな方法があるけど。その中でも私が実際に試してみて、効果があった方法を教えてあげる。"
1300905-11 = "先生は特に毎日の残業のせいで、眠りが浅くなってそうだし……。"
1300905-12 = "[s] \"そうだね、修行部の部長を全面的に信頼して拝聴します！\""
1300905-13 = "うん。それじゃあ、まずはお手本を見せるね。見てて、先生。"
1300905-14 = "まず見せるのは、丹田呼吸法。"
1300905-17 = "こうやって横になって、しばらく瞑想をするように……。"
1300905-18 = "お腹の下の方に精神を集中して……。"
1300905-19 = "…………。"
1300905-20 = "……。"
1300905-21 = "[s] \"ツバキ？\""
1300905-22 = "ぐぅぅ……。"
1300905-23 = "[s1] \"横になってまだ20秒も経ってないよ！？\"\n[s2] \"ツバキさん待って！伝授の進みが早すぎます！\""
1300905-30 = "んん……？もうご飯の時間……？"
1300905-31 = "[s3] \"眠ってから起きるまでも20秒経ってないよツバキ！\"\n[s4] \"これを真似するのは難易度が高すぎませんか！？\""
1300905-32 = "うーん、そう？じゃあ、丹田呼吸法は無しで……。"
1300905-33 = "うーん、そう？じゃあ、丹田呼吸法は無しで……。"
1300905-34 = "じゃあ今度は……座禅をしてみようか。座禅なら、もっと簡単に真似できると思う。"
1300905-37 = "座禅は横にならずに、こうやって座ったまま、精神を集中するの。"
1300905-38 = "先生もまずこういう風に座って、こう、やっ……て……すやぁ。"
1300905-39 = "[s] \"説明の途中で寝ちゃった！？\""
1300905-40 = "はっ！……あれ？えっと、これもダメ？"
1300905-41 = "[s] \"私みたいなアマチュアにはまだ真似できなさそう……。\""
1300905-42 = "良くないよ、先生。試す前からそうやってダメだ、ダメだって言うの。"
1300905-43 = "うん、よし。私がお手本を見せるより、隣で指導する方が良いかも。"
1300905-44 = "先生、やってみて。"
1300905-45 = "[s] \"今から？\""
1300905-48 = "ほら、こうやって横になってみて。それから、目を閉じて。"
1300905-51 = "さあ、息を吸って……吐いて。胸が上がって……下がるよ。"
1300905-52 = "ゆっくり、ゆっくり。精神を集中してね、先生。"
1300905-53 = "だんだん、楽になっていくよ。精神がまるで、水面の下に潜って行くように……。"
1300905-54 = "あなたはだんだん、眠くなる……。"
1300905-56 = "（ツバキの声の通りに、だんだん世界が遠くなっていくような感じがする）"
1300905-57 = "（ゆっくり、ゆっくり……目を閉じたまま、意識が……）"
1300905-58 = "（……なんてことは起きず、何故かむしろ、だんだんと意識がはっきりしてきた）"
1300905-59 = "[ns] \"……。\""
1300905-61 = "[ns] （私には効かなかった感じかな？）"
1300905-63 = "[ns] （ツバキは……もしかして寝ちゃった？）"
1300905-65 = "（ツバキの声が聞こえなくなったので、微かに目を開けてみることにした）"
1300905-67 = "（先生の寝顔……こんな感じなんだ。ふふっ……）"
1300905-70 = "[ns] \"……ツバキ？\""
1300905-71 = "（不意に、ツバキと目が合ってしまった）"
1300905-72 = "えっ、先生、眠ったんじゃ……。"
1300905-73 = "あっ、うわっ……！"
1300905-76 = "[s] \"だ、大丈夫！？急にひっくり返って……！\""
1300905-77 = "う、うん……。"
1300905-78 = "先生、その……見た？"
1300905-79 = "[s5] \"うん。ツバキの熱い視線、感じたよ。\"\n[s6] \"いや、な、何も見てないけど……？\""
1300905-80 = "……私、もう寝る。"
1300905-81 = "[s7] \"ごめん、今の無し！\""
1300905-82 = "うう……。"
1300905-83 = "……見てない？本当に？"
1300905-84 = "[s8] \"全然見てないってわけではないけど、その、少しだけ……。\""
1300905-86 = "うっ……意地悪。"
1300905-87 = "先生の……意地悪……。"
1300905-89 = "（その後、夕方までツバキを慰めないといけなくて大変だった）"
