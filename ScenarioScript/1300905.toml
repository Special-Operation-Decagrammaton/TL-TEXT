[translation]
1300905-1 = "Método de treinamento da Tsubaki: Edição Prática"
1300905-2 = "Hoje, como presidente do Clube de Treinamento, vou ensinar ao Sensei, o consultor do clube, sobre o verdadeiro treinamento."
1300905-3 = "O verdadeiro treinamento. Sim, ou seja, sobre o \"método de sono para dormir mais confortavelmente e ter um sono profundo\"."
1300905-4 = "[s] \"Eu deveria imaginar que seria algo assim.\""
1300905-5 = "Sensei, você não deve subestimar o ato de dormir..."
1300905-6 = "Dormir corretamente é algo muito mais difícil do que você imagina."
1300905-7 = "Veja, os trabalhadores modernos sofrem com insônia por todos os tipos de motivos, e eles buscam dicas para dormir bem,"
1300905-8 = "e métodos para ter um sono profundo, a ponto de fazerem perguntas na internet assim."
1300905-9 = "Tomar um banho quente antes de dormir, beber chocolate quente, meditar ouvindo ruído branco, e por aí vai..."
1300905-10 = "Existem vários métodos. Dentre eles, vou te ensinar os que eu mesma testei e que funcionaram."
1300905-11 = "O Sensei parece estar com o sono leve, especialmente por causa das horas extras diárias..."
1300905-12 = "[s] \"Entendido, vou confiar plenamente na presidente do Clube de Treinamento e ouvir atentamente!\""
1300905-13 = "Sim. Então, primeiro vou te mostrar um exemplo. Observe, Sensei."
1300905-14 = "O primeiro que vou mostrar é a respiração abdominal."
1300905-17 = "Deite-se assim e medite por um tempo..."
1300905-18 = "Concentre sua mente na parte inferior do abdômen..."
1300905-19 = "............"
1300905-20 = "......"
1300905-21 = "[s] \"Tsubaki?\""
1300905-22 = "Zzz..."
1300905-23 = "[s1] \"Não se passaram nem 20 segundos desde que você deitou!?\"\n[s2] \"Espere, Tsubaki! O ritmo do ensino está rápido demais!\""
1300905-30 = "Hmm...? Já é hora de comer...?"
1300905-31 = "[s3] \"Não se passaram nem 20 segundos desde que você dormiu até acordar, Tsubaki!\"\n[s4] \"Não é difícil demais tentar imitar isso!?\""
1300905-32 = "Hmm, é mesmo? Então, vamos pular a respiração abdominal..."
1300905-33 = "Hmm, é mesmo? Então, vamos pular a respiração abdominal..."
1300905-34 = "Então, desta vez... vamos tentar o Zazen. Acho que o Zazen é mais fácil de imitar."
1300905-37 = "No Zazen, você não se deita, você senta assim e concentra sua mente."
1300905-38 = "Sensei, primeiro sente-se assim, e então, faça... zzz."
1300905-39 = "[s] \"Ela dormiu no meio da explicação!?\""
1300905-40 = "Ah! ...Ué? Hum, isso também não serve?"
1300905-41 = "[s] \"Parece que um amador como eu ainda não consegue imitar...\""
1300905-42 = "Isso não é bom, Sensei. Ficar dizendo que não consegue antes mesmo de tentar."
1300905-43 = "Sim, certo. Talvez seja melhor eu te orientar ao seu lado do que apenas mostrar o exemplo."
1300905-44 = "Sensei, tente fazer."
1300905-45 = "[s] \"Agora?\""
1300905-48 = "Vamos, deite-se assim. E então, feche os olhos."
1300905-51 = "Agora, inspire... e expire. Seu peito sobe... e desce."
1300905-52 = "Devagar, bem devagar. Concentre sua mente, Sensei."
1300905-53 = "Aos poucos, você vai se sentindo relaxado. Como se sua mente estivesse mergulhando abaixo da superfície da água..."
1300905-54 = "Você está ficando com sono, cada vez mais..."
1300905-56 = "(Sinto como se o mundo estivesse ficando distante, exatamente como a voz da Tsubaki descreveu)"
1300905-57 = "(Devagar, bem devagar... com os olhos fechados, minha consciência...)"
1300905-58 = "(...Mas nada disso aconteceu, e por algum motivo, minha consciência ficou cada vez mais clara)"
1300905-59 = "[ns] \"...\""
1300905-61 = "[ns] (Será que não funcionou em mim?)"
1300905-63 = "[ns] (A Tsubaki... será que ela dormiu?)"
1300905-65 = "(Como não ouço mais a voz da Tsubaki, decidi abrir os olhos levemente)"
1300905-67 = "(O rosto da Tsubaki dormindo... é assim que ela fica. Hehe...)"
1300905-70 = "[ns] \"...Tsubaki?\""
1300905-71 = "(De repente, acabei cruzando o olhar com a Tsubaki)"
1300905-72 = "Ei, Sensei, você não estava dormindo...?"
1300905-73 = "Ah, uau...!"
1300905-76 = "[s] \"V-você está bem!? Você caiu de repente...!\""
1300905-77 = "S-sim..."
1300905-78 = "Sensei, aquilo... você viu?"
1300905-79 = "[s5] \"Sim. Eu senti o olhar intenso da Tsubaki.\"\n[s6] \"Não, n-não vi nada...\""
1300905-80 = "...Eu vou dormir agora."
1300905-81 = "[s7] \"Desculpa, esquece o que eu disse!\""
1300905-82 = "Uuu..."
1300905-83 = "...Não viu? Sério mesmo?"
1300905-84 = "[s8] \"Não é que eu não tenha visto nada, é que, bem, só um pouquinho...\""
1300905-86 = "Ugh... que malvado."
1300905-87 = "Sensei... tão malvado..."
1300905-89 = "(Depois disso, foi difícil ter que consolar a Tsubaki até o anoitecer)"
