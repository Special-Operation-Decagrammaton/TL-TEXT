[translation]
10035150-1 = "後日談その4;河駒風ラブのシークレットバカンス（２）"
10035150-4 = "こ、ここはウォーターパーク……？"
10035150-5 = "今日オープンの？まさか水遊びって、ここで……！？"
10035150-7 = "当ったり前じゃない！"
10035150-8 = "本部のやつら！団員を差別するなんて！"
10035150-9 = "もういいわ！そんな場所に行くのはお断りよ！"
10035150-10 = "ここで海辺のパーティなんてかすんじゃうくらい、楽しく遊べばいいの！"
10035150-11 = "うちだけ呼ばれて、部下が夏を満喫できないなんてあり得ないわ！"
10035150-16 = "隊長……！"
10035150-17 = "うちらのために……！"
10035150-19 = "ま、まあ！うちだってウォーターパークってとこ、一度は来てみたかったし！"
10035150-20 = "いいからっ、もう！とにかく入るわよ！"
10035150-23 = "はい！隊長！"
10035150-31 = "いらっしゃいませ！何名様ですか？"
10035150-33 = "3名よ！"
10035150-35 = "かしこまりました！#n3名様の入場チケット、合計18000円になります。"
10035150-39 = "げげっ！？"
10035150-40 = "高すぎじゃない？"
10035150-42 = "こちらは通常料金になりまして……。"
10035150-43 = "割引も可能ですよ。"
10035150-44 = "どれぐらい下がるのよ？"
10035150-45 = "まず、学生割引があります。"
10035150-46 = "どこの学園の生徒さんでも学生証のご提示で半額になります！"
10035150-47 = "え、えっと……。"
10035150-49 = "た、隊長、うちら中退してるから学生証なんて持ってないですよ？"
10035150-51 = "ほ、他の割引はないの！？"
10035150-52 = "そうですね……。#nボランティア活動の証明書があれば、30％割引になります。"
10035150-53 = "そんなもん持ってるわけが……。"
10035150-54 = "えっと……"
10035150-55 = "それでは、午後4時以降のご入場で20％割引になりますが……。"
10035150-57 = "まだ朝でしょ！？"
10035150-58 = "ここで午後4時になるまで待てってこと？"
10035150-64 = "はぁ……。"
10035150-65 = "ご予算は、どれくらいですか？"
10035150-66 = "えっと……今持ってるお金は……"
10035150-70 = "1500円だけ……。"
10035150-71 = "一人500円にしてくれない？"
10035150-73 = "申し訳ありませんが、料金表にない割引はできません。"
10035150-77 = "では、お次にお並びの方、どうぞ！"
10035150-78 = "待って！"
10035150-79 = "ここまで来ておいて、引き返せるわけないでしょ！？"
10035150-81 = "そうだそうだ！"
10035150-82 = "せっかく隊長がここまで連れてきてくれたのに……！"
10035150-84 = "お願いよ、なんとかできないの？"
10035150-85 = "足りないお金は、身体で支払ってもいいわ！"
10035150-86 = "はあ、普段ならお断りするしかないのですが……。"
10035150-90 = "オープン初日で人手が足りていないそうなんです。#n連絡してみるのでお待ちください。"
10035150-92 = "あ、ありがとう！"
10035150-93 = "うちら頑張るから！"
10035150-101 = "まあ、プールの掃除なんて簡単よね！"
10035150-102 = "うちがブラシを持つなんて、そうそうないことだけど……！"
10035150-103 = "ま、生きてれば、こんなこともあるわ！"
10035150-109 = "隊長！こちらは終わりました！"
10035150-110 = "こっちもです！"
10035150-112 = "よし！そろそろね――"
10035150-119 = "ご案内致します。"
10035150-120 = "ただ今よりウォーターパークを開場致します。待機中のお客様はゲートからご入場ください。"
10035150-121 = "つ、ついに！"
10035150-122 = "時間ですよ！隊長！"
10035150-124 = "よっし！"
10035150-125 = "足りない分は労働で支払った！後は思いっきり遊ぶだけね！"
10035150-126 = "あんたら！"
10035150-129 = "はい、隊長！"
10035150-131 = "死ぬ気で遊びつくすわよ！"
10035150-132 = "今日だけは無防備になって！思いっきり夏を楽しもうじゃないの！"
10035150-133 = "ほ、本当に警戒を解いてもいいんですか！？"
10035150-134 = "心配ないわ！だって、人工のウォーターパークには――"
10035150-136 = "ワニなんか現れるはずないんだから！"
