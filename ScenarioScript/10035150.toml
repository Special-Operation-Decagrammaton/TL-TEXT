[translation]
10035150-1 = "Epílogo parte 4; As Férias Secretas de Kawakoma Fuu (2)"
10035150-4 = "E-este lugar é um parque aquático...?"
10035150-5 = "O que abriu hoje? Não me diga que a brincadeira na água é aqui...!?"
10035150-7 = "Claro que é!"
10035150-8 = "Aqueles caras da sede! Como ousam discriminar os membros do grupo!"
10035150-9 = "Já chega! Não vou aceitar ir para um lugar desses!"
10035150-10 = "Vamos nos divertir tanto aqui que aquela festa na praia vai parecer insignificante!"
10035150-11 = "Não faz sentido sermos as únicas chamadas e minhas subordinadas não poderem aproveitar o verão!"
10035150-16 = "Capitã...!"
10035150-17 = "Por nossa causa...!"
10035150-19 = "B-bem! Eu também queria vir a um parque aquático pelo menos uma vez!"
10035150-20 = "Chega de conversa! Vamos entrar logo!"
10035150-23 = "Sim! Capitã!"
10035150-31 = "Bem-vindos! Quantas pessoas?"
10035150-33 = "Três!"
10035150-35 = "Entendido! #nO ingresso para três pessoas fica num total de 18.000 ienes."
10035150-39 = "O quê!?"
10035150-40 = "Não está caro demais?"
10035150-42 = "Este é o valor da tarifa normal..."
10035150-43 = "Também temos descontos disponíveis."
10035150-44 = "Quanto fica com desconto?"
10035150-45 = "Primeiro, temos o desconto de estudante."
10035150-46 = "Qualquer estudante de qualquer escola ganha 50% de desconto apresentando a carteirinha!"
10035150-47 = "E-err..."
10035150-49 = "C-capitã, nós abandonamos a escola, então não temos carteirinha, lembra?"
10035150-51 = "N-não tem outro desconto!?"
10035150-52 = "Bem... #nSe tiverem um certificado de trabalho voluntário, ganham 30% de desconto."
10035150-53 = "Como a gente ia ter uma coisa dessas..."
10035150-54 = "Err..."
10035150-55 = "Bem, temos um desconto de 20% para entradas após as 16h..."
10035150-57 = "Ainda é de manhã!?"
10035150-58 = "Quer que a gente espere aqui até as 4 da tarde?"
10035150-64 = "Ah..."
10035150-65 = "Qual é o orçamento de vocês?"
10035150-66 = "Err... o dinheiro que temos agora é..."
10035150-70 = "Apenas 1500 ienes..."
10035150-71 = "Não dá para fazer por 500 ienes cada?"
10035150-73 = "Sinto muito, mas não posso aplicar descontos que não estão na tabela."
10035150-77 = "Próximo da fila, por favor!"
10035150-78 = "Espere!"
10035150-79 = "Não viemos até aqui para simplesmente dar meia-volta, né!?"
10035150-81 = "É isso aí!"
10035150-82 = "A capitã se deu ao trabalho de nos trazer até aqui...!"
10035150-84 = "Por favor, não tem nada que possa fazer?"
10035150-85 = "Se faltar dinheiro, podemos pagar com o nosso corpo!"
10035150-86 = "Ah, normalmente eu teria que recusar, mas..."
10035150-90 = "Como é o primeiro dia de abertura, estamos com falta de pessoal. #nVou entrar em contato, por favor, aguardem."
10035150-92 = "O-obrigada!"
10035150-93 = "Nós vamos nos esforçar!"
10035150-101 = "Bem, limpar a piscina deve ser fácil, né!"
10035150-102 = "Não é sempre que eu pego numa escova, mas...!"
10035150-103 = "Bem, vivendo e aprendendo, essas coisas acontecem!"
10035150-109 = "Capitão! Terminamos por aqui!"
10035150-110 = "Aqui também!"
10035150-112 = "Muito bem! Está quase na hora de—"
10035150-119 = "Atenção, por favor."
10035150-120 = "Estamos abrindo o parque aquático agora. Clientes aguardando, por favor, entrem pelo portão."
10035150-121 = "Fi-finalmente!"
10035150-122 = "Chegou a hora! Capitão!"
10035150-124 = "Isso aí!"
10035150-125 = "Pagamos o que faltava com trabalho duro! Agora é só aproveitar ao máximo!"
10035150-126 = "Pessoal!"
10035150-129 = "Sim, capitão!"
10035150-131 = "Vamos nos divertir como se não houvesse amanhã!"
10035150-132 = "Só por hoje, vamos baixar a guarda! Vamos aproveitar o verão ao máximo!"
10035150-133 = "Sé-sério mesmo que podemos relaxar a vigilância!?"
10035150-134 = "Não se preocupe! Afinal, em um parque aquático artificial—"
10035150-136 = "Não tem como aparecer nenhum crocodilo!"
