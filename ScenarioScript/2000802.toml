[translation]
2000802-1 = "De qualquer forma, é uma conspiração!"
2000802-2 = "(Após receber um MomoTalk estranhamente rígido e ir ao local combinado, encontro Ako com uma quantidade absurda de documentos empilhados sobre a mesa, franzindo a testa.)"
2000802-6 = "Isso é, bem... fazendo assim... ah, mas isso está conectado com aquilo, então..."
2000802-10 = "...Ah, quando será que isso vai acabar..."
2000802-11 = "[s] Aproximar-se lentamente para não assustá-la."
2000802-12 = "...!? P-Professor!?"
2000802-13 = "D-desde quando você está aí...? Com esse seu jeito de andar, parecendo um suspeito, você me deu um susto..."
2000802-14 = "Ah, francamente..."
2000802-15 = "[s] \"O trabalho parece difícil. Você está bem?\""
2000802-17 = "...Não,"
2000802-18 = "Bem, isso é algo normal para mim."
2000802-19 = "Isso aqui precisa ser processado até a noite, aquilo ali já foi resolvido, e isso aqui eu posso terminar enquanto estiver fora..."
2000802-20 = "...E, bem, a maior parte são coisas simples que terminam rápido. Fufu."
2000802-21 = "[s] (Vendo a expressão que ela tinha até agora, não parece ser o caso...)"
2000802-22 = "Se eu começasse a reclamar por causa disso, não conseguiria trabalhar como oficial administrativa do Comitê Disciplinar de Gehenna."
2000802-23 = "Ah, mas deixando isso de lado... fui eu quem chamei o Professor hoje, não foi?"
2000802-29 = "Poderia dar uma olhada nestes documentos?"
2000802-30 = "[s] \"'Solicitação de relatório de monitoramento sobre insatisfações com o Comitê Disciplinar de Gehenna vindas de dentro do Schale'... ?\""
2000802-31 = "Sim, é algo que só o Professor pode fazer."
2000802-32 = "Quero confirmar se existe algum grupo dentro do Schale que tenha queixas ou insatisfações em relação a nós, do Comitê Disciplinar."
2000802-33 = "[s1] \"Hum... isso é um pouco...\"\n[s2] Recusar de forma indireta."
2000802-34 = "Entendo, então é assim que você reage."
2000802-35 = "Entendo, então é assim que você reage."
2000802-36 = "Mas tem certeza? Acho que esta é uma ótima oportunidade para você retribuir os favores que eu lhe fiz até agora, não acha?"
2000802-37 = "[s] \"Favores...?\""
2000802-38 = "Não me diga que você esqueceu..."
2000802-39 = "O quanto eu cuido de você no dia a dia, e o quanto eu me esforço para apoiar indiretamente o seu trabalho como oficial administrativa do Comitê Disciplinar!"
2000802-40 = "[s3] \"...?\"\n[s4] \"Pensando bem, talvez... não seja mentira...\""
2000802-41 = "E-essa reação..."
2000802-42 = "E-essa reação..."
2000802-43 = "Não pode ser..."
2000802-44 = "O chamado \"jeito adulto\" de fingir que não vê o que é inconveniente...!?"
2000802-45 = "[s] \"Não, isso é um mal-entendido, ou melhor...\""
2000802-49 = "...Bem, mesmo assim, isso está dentro do esperado."
2000802-50 = "Sendo assim, aqui está o próximo."
2000802-56 = "[ns] \"'Descreva em até 20 mil caracteres o que você pensa sobre o Comitê Disciplinar de Gehenna'... ?\""
2000802-57 = "Sim, é como um pequeno teste. Apenas escreva honestamente o que você sempre pensa."
2000802-58 = "Ah, claro, declarações falsas não serão toleradas. Não pense que não vou descobrir, viu?"
2000802-59 = "Como uma oficial administrativa competente, identificar se o autor está mentindo através da caligrafia, escolha de palavras e outros detalhes é moleza."
2000802-60 = "[s] \"Sério...?\""
2000802-61 = "O,"
2000802-62 = "O que é essa cara de insatisfação?! O monitoramento de grupos suspeitos é algo que nunca podemos negligenciar!"
2000802-63 = "E ainda por cima esse tal de \"Schale\"! A verdadeira natureza disso ainda é um mistério! Tentar entender os detalhes, já que até o propósito, a estrutura e as atividades são suspeitos, é algo perfeitamente natural!"
2000802-64 = "[s] \"Estou bem na sua frente e você fala assim de mim...\""
2000802-65 = "Nós, do Comitê Disciplinar de Gehenna, devido à natureza das nossas atividades, somos uma organização que naturalmente tem muitos inimigos."
2000802-66 = "Mesmo assim, conseguimos chegar até aqui porque,"
2000802-67 = "Não é segredo para ninguém..."
2000802-68 = "Fui eu! Eu que venho eliminando elementos suspeitos antecipadamente!"
2000802-69 = "[s5] \"Entendi.\"\n[s6] \"Deve haver vários motivos, mas você realmente se esforça, Ako...\""
2000802-70 = "Bem, deixando de lado o maior fator, que é a Presidente... mas parece que o método que usamos até agora está começando a não ser suficiente."
2000802-71 = "Bem, deixando de lado o fator principal que é a presidente, é... mas parece que o nosso método atual está começando a não ser o suficiente."
2000802-72 = "Afinal, ontem mesmo ocorreu um ataque terrorista visando o nosso Comitê de Disciplina. Precisamos reforçar a vigilância mais do que nunca."
2000802-73 = "[s] \"Terrorismo...? Você está bem?\""
2000802-74 = "Sim. Bem, explicando os detalhes..."
2000802-75 = "Ontem à noite, eu estava trabalhando até tarde no anexo, quando de repente..."
2000802-76 = "Houve um apagão!!!"
2000802-77 = "[s] \"...Entendi.\""
2000802-78 = "Um apagão repentino no meio do trabalho..."
2000802-79 = "Isso sem dúvida foi obra de alguma facção inimiga que percebeu que eu, a oficial administrativa do Comitê de Disciplina, estava trabalhando sozinha à noite."
2000802-80 = "Eles devem ter cortado a energia para atrapalhar nossas atividades."
2000802-81 = "Por causa disso, não consegui terminar o trabalho e, por isso, ainda estou aqui trabalhando..."
2000802-82 = "[s] \"E a possibilidade de ter sido apenas uma coincidência...?\""
2000802-83 = "Isso é impossível! Já não faltam pessoas ao nosso redor planejando nos atacar na primeira oportunidade!"
2000802-84 = "Se mostrarmos qualquer brecha, seremos devoradas imediatamente..."
2000802-85 = "Portanto, este incidente também deve ser um assédio contra o Comitê de Disciplina!"
2000802-86 = "Se você ainda insiste que não foi nada, quer apostar? Se eu conseguir encontrar o culpado, você vai ter que dar 10 voltas no campo andando de mãos, Sensei!"
2000802-87 = "[s] \"C-calma... sem apostas, sem apostas...\""
2000802-88 = "Não sinto que vou perder, afinal, já tenho mais de dez suspeitos em mente!"
2000802-89 = "Vou voltar para a academia agora mesmo e instalar 100 câmeras de segurança em todos os lugares, e logo..."
2000802-93 = "...Ufa."
2000802-94 = "...Peço desculpas. Eu acabei me empolgando um pouco. Hehe."
2000802-95 = "Francamente, perder a compostura desse jeito, logo eu..."
2000802-96 = "Acabei mostrando uma cena um pouco vergonhosa, não é?"
2000802-97 = "[s] \"Não, isso não é problema nenhum, mas, bem...\""
2000802-98 = "Por favor, esqueça o que aconteceu hoje."
2000802-99 = "Bem, por favor, cuide daquele documento de antes. Eu tenho trabalho a fazer, então com licença..."
2000802-104 = "[ns] \"Ako, espere...\""
2000802-106 = "(Ako saiu apressada para algum lugar)"
