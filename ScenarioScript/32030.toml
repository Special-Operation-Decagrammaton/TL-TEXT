[translation]
32030-1 = "Episódio 3: Encontro Secreto à Meia-Noite"
32030-2 = "……Entendi. Você queria conversar com o Sensei sobre o que fazer a partir de agora……"
32030-3 = "A Hanako-chan também tinha algo pra conversar com o Sensei……"
32030-4 = "M-mas por que você veio de biquíni！？ Como assim pijama é biquíni……！？"
32030-5 = "Me acalma, sabe？ Por isso eu até fui de biquíni pra aula no capela. Vamos tentar ser um pouco mais flexíveis com as coisas♪"
32030-6 = "Auuu……"
32030-7 = "[s] \"Hanako, melhor deixar o assunto da Azusa pra depois？\""
32030-8 = "……É sobre a Azusa-chan, né."
32030-9 = "……。"
32030-10 = "……Não, tudo bem. Acho melhor a Hifumi-chan ouvir junto."
32030-11 = "Na verdade a Azusa-chan…… quase toda noite sai pra algum lugar e só volta ao amanhecer."
32030-12 = "Era isso……"
32030-13 = "No começo pensei que era porque o lugar era novo e ela não conseguia dormir, mas não parece ser isso."
32030-14 = "……Eu quase nunca vi a Azusa-chan dormindo direito à noite."
32030-15 = "Realmente eu também…… a Azusa-chan sempre acorda primeiro e nunca dorme antes de mim……"
32030-16 = "……Não sei o que a Azusa-chan fica fazendo. Mas já tá na hora de, mesmo que seja na marra, fazer ela dormir direito."
32030-17 = "A Azusa-chan parece… muito ansiosa com alguma coisa."
32030-18 = "……。"
32030-19 = "Não sei qual é o motivo, mas quero ajudar a aliviar um pouco essa ansiedade dela……"
32030-20 = "Do jeito que tá, ela vai acabar desmaiando."
32030-21 = "……O Sensei e a Hifumi-chan também, tá？ Precisam dormir direito."
32030-22 = "A prova é importante, mas não vale a saúde do corpo, né？"
32030-23 = "[s] \"Isso……\""
32030-27 = "……。"
32030-28 = "……Normalmente seria assim. Mas……"
32030-29 = "Hifumi-chan……？"
32030-30 = "Não é só «reprovar» que tá em jogo……！ Se a gente reprovar nas próximas duas provas……"
32030-31 = "Vamos ser expulsos！ Vamos ter que sair de Trinity……！！"
32030-35 = "……Expulsos？ Hifumi-chan, como assim……？"
32030-36 = "I-isso não pode, pelo regulamento. Expulsão exige um monte de processo e motivo, não é algo tão simples……"
32030-37 = "[s] \"……。\""
32030-38 = "……Sensei？"
32030-39 = "……。"
32030-44 = "[ns] Explica o que sabe sobre a real situação do Clube de Reforço."
32030-47 = "……。"
32030-48 = "……。"
32030-49 = "……Entendi, então era isso. Se todos reprovarem… expulsão coletiva……"
32030-50 = "Esse sistema já é estranho desde o começo, mas… entendi, usando a autoridade especial da Schale……"
32030-51 = "Hanako-chan……"
32030-52 = "Ah, a-agora que lembrei, Hanako-chan na verdade tem notas boas, né？ No 1º ano você tirou 100 em todas as provas difíceis até do 3º ano……！？"
32030-53 = "……。"
32030-54 = "Desculpa…… enquanto procurava provas antigas pro simulado, acabei encontrando……"
32030-55 = "P-por que agora você tá tirando notas tão baixas……？ De propósito, né……？"
32030-56 = "……Desculpa, eu não sabia. Se reprovar, todo mundo é expulso……"
32030-57 = "……。"
32030-58 = "Não tem desculpa só porque eu não sabia……"
32030-59 = "Sensei… Hifumi-chan… Azusa-chan e Koharu-chan… desculpa pelo que fiz."
32030-60 = "Desculpa, Sensei."
32030-61 = "Hifumi-chan, desculpa."
32030-62 = "N-não, isso……"
32030-67 = "……Como a Hifumi-chan disse, minhas notas baixas são de propósito."
32030-68 = "E-era mesmo……！？ Hanako-chan, por que você tá fazendo isso……？"
32030-69 = "……Desculpa, não posso contar."
32030-70 = "……！？"
32030-71 = "É um motivo muito pessoal meu…… mas não quero que vocês sofram por causa disso."
32030-72 = "Então fiquem tranquilas."
32030-73 = "Vou me esforçar nas próximas provas pra garantir que ninguém seja expulso."
32030-74 = "[s] \"……Obrigado, Hanako.\""
32030-75 = "N-não precisa agradecer tanto……！？ Não fiz nada que mereça isso……"
32030-76 = "Na verdade eu que deveria me ajoelhar pelada pedindo desculpa…… será que basta？"
32030-77 = "Não, melhor não fazer isso……！？ Só de saber que você vai se esforçar já fico mais tranquila."
32030-78 = "Obrigada. Aliás…… só eu e o Sensei sabemos disso？"
32030-79 = "Sim, ninguém mais sabe ainda……"
32030-80 = "Entendi…… então a ansiedade da Azusa-chan não é só por causa das provas. Deve ter alguma coisa que eu ainda não sei……"
32030-81 = "……Não. Mais do que isso, o próprio Clube de Reforço me preocupa."
32030-82 = "……。"
32030-83 = "A Mika-san… seria difícil. Então deve ser a Nagisa-san por trás disso."
32030-84 = "[s] \"……！\""
32030-85 = "Mas por que ela faria algo assim justo agora, com o Tratado de Eden prestes a ser assinado……"
32030-86 = "Na verdade… é justamente por causa disso……？"
32030-87 = "……。"
32030-88 = "…………。"
32030-89 = "……Entendi. Então o Clube de Reforço é um ajuntamento de alunas suspeitas de serem «traidoras de Trinity»."
32030-90 = "[s] \"……！？\""
32030-91 = "Eh, ehh！？"
32030-92 = "Bem a cara da Nagisa-san. Uma gatinha bem astuta."
32030-93 = "G-gatinha……？"
32030-94 = "Melhor resolver tudo de uma vez pra ser mais eficiente… é essa a lógica. Estamos sendo tratadas como roupa suja."
32030-95 = "[s] \"（Acho que ouvi algo pior que «roupa suja»……）\""
32030-96 = "……Sensei também foi usado pela Nagisa-san."
32030-97 = "Usando o pretexto de «ajudar alunas com notas ruins», explorando a boa vontade e usando a autoridade especial da Schale……"
32030-98 = "Mas, olhando pelo lado bom, o Sensei realmente se esforçou por nós……"
32030-99 = "……Obrigada, Sensei. Você é realmente uma boa pessoa, fufu♡"
32030-100 = "Hanako-chan, você é incrível…… parece uma detetive."
32030-101 = "A «traidora de Trinity»…… Nagisa-sama me pediu pra encontrar ela."
32030-102 = "……Fufu, entendi. «Traidora de Trinity»… bem a cara da Nagisa-san. Se alguém atrapalhar o plano dela, já vira traidora."
32030-103 = "……A Azusa-chan já era suspeita desde os documentos falsos, então faz sentido."
32030-104 = "A Koharu-chan… se for como refém do Comitê de Execução da Justiça, até que dá pra entender, mesmo sendo forçado……"
32030-105 = "……Ara, pensando assim, por que a Hifumi-chan também é suspeita？ Ela era próxima da Nagisa-san, né？"
32030-106 = "Eh！？ E-eu também sou suspeita……！？"
32030-107 = "B-bom, eu era próxima dela, mas…… p-por que eu……？"
32030-108 = "[s] \"…………。\""
32030-111 = "……De qualquer forma, acho melhor conversar mais com a Azusa-chan depois. Vou investigar outras coisas também."
32030-112 = "Sim. Se descobrir alguma coisa, me conta por favor."
32030-113 = "Entendi. Então eu também posso participar desse encontro secreto à meia-noite？ Ufufu, que felicidade♡"
32030-114 = "Encontro secreto à meia-noite com três pessoas… meu coração tá disparado♡"
32030-115 = "E-esse jeito de falar é um pouco……"
32030-116 = "[s] \"Então, já tá tarde, vamos dormir.\""
32030-117 = "Sim, então até amanhã."
32030-118 = "Realmente, boa noite."
32030-121 = "Nnn…… banheiro……"
32030-125 = "Hm…… quarto do Sensei？ A essa hora……"
32030-129 = "Então Sensei, obrigada por…… hm？"
32030-130 = "……！？"
32030-131 = "H-Hifumi！？ O que você tá fazendo no quarto do Sensei……！？"
32030-132 = "Fufu. Então, vamos aproveitar mais esse encontro noturno……"
32030-133 = "……Ara？"
32030-134 = "……っ！"
32030-139 = "T-três pessoas……！？ Seus pervertidos！ Tarados！！"
32030-141 = "（E assim, mais um dia começou.）"
32030-143 = "Próximo; Pool Party"