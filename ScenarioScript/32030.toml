[translation]
32030-1 = "Episódio 3;Encontro Secreto na Madrugada"
32030-2 = "……Sei. Junto com o Sensei, uma conversa sobre daqui pra frente……."
32030-3 = "A Hanako também tem uma coisa pra consultar com o Sensei……."
32030-4 = "M-mas por que você vem de maiô!? Como assim, o pijama é um maiô……!?"
32030-5 = "É que acalma o coração. Por isso, eu participei até das aulas na capela de maiô, viu? Experimenta pensar nas coisas de um jeito mais flexível♪"
32030-6 = "Auu……."
32030-7 = "[s] \"Hanako, a continuação do que a gente falou é melhor não ser agora?\""
32030-8 = "……É o assunto da Azusa, né."
32030-9 = "……."
32030-10 = "……Não, tá tudo bem. Acho bom a Hifumi ouvir junto também."
32030-11 = "Na verdade, a Azusa…… quase toda noite, sai pra algum lugar e fica sem voltar até o amanhecer, e isso vem se repetindo."
32030-12 = "Ah, então era isso……."
32030-13 = "No começo eu achei que fosse por não conseguir dormir num lugar estranho, mas parece que não é isso."
32030-14 = "……Eu quase nunca vi a Azusa dormindo direito de noite."
32030-15 = "De fato, eu também…… a Azusa sempre acorda antes, e acho que nunca dormiu antes de mim……."
32030-16 = "……O que exatamente a Azusa faz eu não sei. Mas acho que já tá na hora de, nem que seja meio à força, fazer ela dormir."
32030-17 = "Sei lá, a Azusa…… parece, em algum ponto, muito ansiosa."
32030-18 = "……."
32030-19 = "Não sei que tipo de circunstância é, mas eu queria, de algum jeito, aliviar nem que fosse um pouco essa ansiedade dela……."
32030-20 = "Do jeito que vai, uma hora ela vai desmaiar."
32030-21 = "……O Sensei e a Hifumi também, viu? Têm que dormir direito."
32030-22 = "De fato, a prova também é importante, mas é só reprovação. Não é algo que se possa comparar com a saúde do corpo, não acham?"
32030-23 = "[s] \"Isso é…….\""
32030-27 = "……."
32030-28 = "……Normalmente, talvez fosse assim. Mas……"
32030-29 = "Hifumi……?"
32030-30 = "Não, não é um assunto que se resolva só com \"reprovação\"……! Se, nas próximas 2, a gente reprovar nas duas provas……"
32030-31 = "é expulsão! A gente vai ter que deixar Trinity……!!"
32030-35 = "……Expulsão? Hifumi, isso como assim……?"
32030-36 = "U-uma coisa dessas não se sustenta pelas regras da escola. A expulsão precisa de vários trâmites e motivos; não é tão simples assim……"
32030-37 = "[s] \"…….\""
32030-38 = "……Sensei?"
32030-39 = "……."
32030-44 = "[ns] Conta o que sabe sobre os bastidores do Clube de Aulas de Reforço."
32030-47 = "……."
32030-48 = "……."
32030-49 = "……Sei, então era isso. Se todas reprovarem, todas são expulsas……."
32030-50 = "Esse esquema em si já é estranho, mas…… sei, a autoridade extralegal da Schale……."
32030-51 = "Hanako……."
32030-52 = "Ah, a-aliás, Hanako, na verdade você tira nota boa, né? Quando era do 1º ano, você tirou nota máxima até nas provas difíceis do 3º ano……!?"
32030-53 = "……."
32030-54 = "É que, me desculpe…… enquanto eu procurava as provas antigas pro simulado, acabei achando……."
32030-55 = "P-por que agora você tira aquela nota……? De propósito, né……?"
32030-56 = "……Me desculpem, eu não sabia. Que, se a gente falhasse, fosse \"todo mundo expulso\"……."
32030-57 = "……."
32030-58 = "Não, por não saber, não quer dizer que esteja perdoado, né……."
32030-59 = "Ao Sensei, à Hifumi…… e também à Azusa e à Koharu, eu fiz uma coisa imperdoável."
32030-60 = "Me desculpe, Sensei."
32030-61 = "Hifumi também, me desculpe."
32030-62 = "N-não, é que……."
32030-67 = "……Como a Hifumi disse, aquela minha nota é de propósito."
32030-68 = "E-eu não disse……!? Hanako, por que uma coisa dessas……?"
32030-69 = "……Me desculpe, não posso dizer."
32030-70 = "……!?"
32030-71 = "É um motivo muito pessoal meu…… mas que, com isso, vocês sofram prejuízo, não é o que eu quero."
32030-72 = "Então, fiquem tranquilas."
32030-73 = "No mínimo, pra que vocês não sejam expulsas, eu vou me esforçar nas próximas provas."
32030-74 = "[s] \"……Obrigado, Hanako.\""
32030-75 = "N-não……!? Não é uma coisa que mereça tanta gratidão do Sensei……."
32030-76 = "Aliás, sou eu que deveria me desculpar; será que basta pôr as mãos no chão, pelada……?"
32030-77 = "Não, pelo contrário, isso eu peço que você NÃO faça……!? Só de ouvir que você vai se esforçar daqui pra frente, eu já fiquei aliviada."
32030-78 = "Muito obrigada. Aliás…… quem sabe deste fato são só você, Hifumi, e o Sensei?"
32030-79 = "Pois é, além da gente, ninguém ainda……."
32030-80 = "Sei…… sendo assim, a ansiedade da Azusa não parece ter origem na prova. Há algo que eu ainda não sei, então……."
32030-81 = "……Não. Mais do que isso, agora, a própria existência deste Clube de Aulas de Reforço me intriga."
32030-82 = "……."
32030-83 = "A Mika…… seria improvável, e, bom, quem tramaria uma coisa dessas seria a Nagisa, imagino."
32030-84 = "[s] \"……!\""
32030-85 = "Mas, por que, às vésperas do Tratado do Éden, uma coisa dessas……."
32030-86 = "Não, ou melhor, é justamente por ser às vésperas……?"
32030-87 = "……."
32030-88 = "…………."
32030-89 = "……Sei. Este Clube de Aulas de Reforço é uma reunião de suspeitas de estarem tentando atrapalhar o Tratado do Éden, é isso?"
32030-90 = "[s] \"……!?\""
32030-91 = "Hã, hã!?"
32030-92 = "Bem a cara da Nagisa, digamos; continua a mesma gatinha astuta de sempre."
32030-93 = "G-gata……?"
32030-94 = "Se é pra ser, processar tudo de uma vez é mais eficiente; deve ser essa a lógica. Sei lá, a gente tá sendo tratada que nem roupa suja."
32030-95 = "[s] \"（Acho que eu ouvi uma palavra pior que 'roupa suja'……）\""
32030-96 = "……O Sensei também acabou levado pela Nagisa, né."
32030-97 = "Sob o pretexto de \"ajudar os alunos de notas fracas\", a boa vontade do senhor foi usada pra assumir esse papel, quando, na verdade, é a autoridade extralegal da Schale que está sendo usada……."
32030-98 = "Mas, dito ao contrário, o senhor estava se esforçando puramente pela gente, né……."
32030-99 = "……Muito obrigada, Sensei. O senhor é uma boa pessoa mesmo, ufu♡"
32030-100 = "Hanako, você é incrível…… parece uma detetive."
32030-101 = "\"O traidor de Trinity\"…… a Nagisa me disse que queria que eu o procurasse."
32030-102 = "……Ufu, sei. \"O traidor de Trinity\", é…… uma expressão bem a cara da Nagisa. É uma lógica pela qual, se você atrapalhar o plano dela, a host do Tea Party, você se enquadra."
32030-103 = "……A Azusa já era suspeita desde a papelada, então não é de estranhar que desconfiem dela."
32030-104 = "A Koharu, por quê…… se for pra dizer, do ponto de vista de refém do Comitê de Realização da Justiça, é um exagero, mas até dá pra entender……."
32030-105 = "……Ora, pensando assim, por que a Hifumi virou suspeita? Você não era próxima da Nagisa?"
32030-106 = "Hã!? E-eu também sou suspeita mesmo……!?"
32030-107 = "D-de fato, eu tinha uma relação meio próxima com ela…… m-mas por que logo eu……?"
32030-108 = "[s] \"…………\""
32030-111 = "……Enfim, com a Azusa, talvez seja melhor conversar um pouco mais depois. Sobre o resto também, do meu lado eu confiro algumas coisas."
32030-112 = "Sim. Se descobrir alguma coisa, eu ficaria feliz se me contasse."
32030-113 = "Entendido. Isso quer dizer que eu também posso participar deste encontro secreto de madrugada? Ufufu, que alegria♡"
32030-114 = "Num cômodo fechado, de madrugada, três pessoas juntinhas numa brincadeira secreta…… meu coração não para de bater♡"
32030-115 = "E-esse jeito de falar é meio……."
32030-116 = "[s] \"Então, já tá tarde, vamos dormir?\""
32030-117 = "Sim, então até amanhã."
32030-118 = "Pois é, boa noite."
32030-121 = "Nnh…… banheiro……."
32030-125 = "Ué…… o quarto do Sensei? Até esta hora……."
32030-129 = "Então, Sensei, muito obriga…… ué?"
32030-130 = "……!?"
32030-131 = "H-Hifumi!? O-o que você tá fazendo no quarto do Sensei……!?"
32030-132 = "Ufu. Então, aguardo com ansiedade o próximo encontro noturno……"
32030-133 = "……Ora?"
32030-134 = "……Gh!"
32030-139 = "T-três pessoas……!? Bobos, tarados! Seu povo devasso!!"
32030-141 = "(E, assim, chega mais um dia.)"
32030-143 = "Próximo Episódio;Festa de Maiô"
