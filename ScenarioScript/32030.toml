[translation]
32030-1 = "Episódio 3: Encontro Secreto na Madrugada"
32030-2 = "……Entendo. Então, você quer discutir sobre o futuro com o Sensei……."
32030-3 = "A Hanako-chan também tem algo que quer discutir com o Sensei……."
32030-4 = "Ma-mas por que você veio de roupa de banho!? O que significa usar roupa de banho como pijama……!?"
32030-5 = "Isso acalma o meu coração. Por isso, eu também participei da aula na capela usando roupa de banho, sabia? Vamos tentar pensar de forma mais flexível sobre as coisas♪"
32030-6 = "Auu……."
32030-7 = "[s] \"Hanako, não seria melhor continuar esse assunto em outro momento?\""
32030-8 = "……Sobre o caso da Azusa-chan, não é?"
32030-9 = "……."
32030-10 = "……Não, está tudo bem. Gostaria que a Hifumi-chan também ouvisse."
32030-11 = "Na verdade, a Azusa-chan…… tem saído quase todas as noites e não volta até o amanhecer."
32030-12 = "Sério, era isso……."
32030-13 = "No começo, pensei que ela não conseguia dormir por estar em um lugar estranho, mas parece que não é isso."
32030-14 = "……Eu quase nunca vi a Azusa-chan dormindo direito à noite."
32030-15 = "Na verdade, eu também…… A Azusa-chan está sempre acordada antes de mim, e não me lembro de ela ter dormido antes de mim também……."
32030-16 = "……Não sei o que a Azusa-chan está fazendo. Mas acho que já passou da hora de fazê-la dormir, mesmo que seja um pouco à força."
32030-17 = "É que a Azusa-chan…… parece estar muito ansiosa com alguma coisa."
32030-18 = "……."
32030-19 = "Não sei quais são as circunstâncias, mas quero tentar aliviar essa ansiedade dela, nem que seja um pouco……."
32030-20 = "Se continuar assim, ela vai acabar desmaiando uma hora dessas."
32030-21 = "……O mesmo vale para o Sensei e a Hifumi-chan, viu? Vocês precisam dormir bem."
32030-22 = "É verdade que as provas são importantes, mas é apenas uma reprovação. Não acham que a saúde física é muito mais valiosa?"
32030-23 = "[s] \"Isso é…….\""
32030-27 = "……."
32030-28 = "……Em uma situação normal, talvez fosse assim. Mas……"
32030-29 = "Hifumi-chan……?"
32030-30 = "Não é algo que se resolve apenas com uma \"reprovação\"……! Se falharmos em qualquer uma das provas mais duas vezes……"
32030-31 = "Seremos expulsas! Teremos que deixar a Trinity……!!"
32030-35 = "……Expulsas? Hifumi-chan, o que você quer dizer com isso……?"
32030-36 = "Is-isso não faz sentido de acordo com o regulamento escolar. A expulsão exige vários procedimentos e motivos, não é algo tão simples……"
32030-37 = "[s] \"…….\""
32030-38 = "……Sensei?"
32030-39 = "……."
32030-44 = "[ns] Contar o que sabe sobre os bastidores do Clube de Reforço."
32030-47 = "……."
32030-48 = "……."
32030-49 = "……Entendo, era isso então. Se todas falharem, todas serão expulsas……."
32030-50 = "Esse sistema em si já é estranho, mas…… entendo, a autoridade extrajudicial do Schale……."
32030-51 = "Hanako-chan……."
32030-52 = "Ah, fa-falando nisso, Hanako-chan, você é muito boa nas notas, não é? No primeiro ano, você tirou nota máxima até nas provas difíceis do terceiro ano……!?"
32030-53 = "……."
32030-54 = "Desculpe…… enquanto procurava provas antigas para um simulado, acabei encontrando as suas……."
32030-55 = "Po-por que você tira essas notas agora……? Você está fazendo de propósito, não está……?"
32030-56 = "……Me desculpe, eu não sabia. Eu não fazia ideia de que, se falhássemos, \"todas seriam expulsas\"……."
32030-57 = "……."
32030-58 = "Não, dizer que não sabia não é desculpa……."
32030-59 = "Sinto muito pelo que fiz ao Sensei, à Hifumi-chan…… e também à Azusa-chan e à Koharu-chan."
32030-60 = "Me desculpe, Sensei."
32030-61 = "Hifumi-chan, me desculpe também."
32030-62 = "N-não, é que……."
32030-67 = "……Como a Hifumi-chan disse, aquela minha nota foi de propósito."
32030-68 = "N-não pode ser……!? Hanako-chan, por que você faria uma coisa dessas……?"
32030-69 = "……Sinto muito, não posso dizer."
32030-70 = "……!?"
32030-71 = "É por um motivo extremamente pessoal meu…… mas não é minha intenção que vocês sofram as consequências por isso."
32030-72 = "Portanto, fiquem tranquilas."
32030-73 = "Vou me esforçar nas próximas provas para garantir que, no mínimo, vocês não sejam expulsas."
32030-74 = "[s] \"……Obrigado, Hanako.\""
32030-75 = "N-não……!? Professor, não é algo pelo qual precise me agradecer tanto……"
32030-76 = "Na verdade, sou eu quem deveria pedir desculpas. Será que bastaria eu me ajoelhar nua para compensar……?"
32030-77 = "Não, por favor, pare com isso……!? Só de ouvir que você vai se esforçar daqui para frente, já me sinto aliviado."
32030-78 = "Obrigada. A propósito…… além da Hifumi-chan e do Professor, mais alguém sabe disso?"
32030-79 = "Pois é, além de nós, ninguém mais……"
32030-80 = "Entendo…… sendo assim, a ansiedade da Azusa-chan não parece ter relação com as provas. Significa que há algo que eu ainda não sei……"
32030-81 = "……Não. Mais do que isso, agora estou curiosa sobre a própria existência deste Clube de Reforço."
32030-82 = "……."
32030-83 = "A Mika-san…… não seria capaz, então suponho que quem planejou isso foi a Nagisa-san."
32030-84 = "[s] \"……!\""
32030-85 = "Mas, por que fazer algo assim logo antes do Tratado do Éden……"
32030-86 = "Não, talvez seja justamente por ser logo antes……?"
32030-87 = "……."
32030-88 = "…………."
32030-89 = "……Entendo. Então este Clube de Reforço é um grupo de suspeitos que supostamente estão tentando atrapalhar o Tratado do Éden."
32030-90 = "[s] \"……!?\""
32030-91 = "E-eh!?"
32030-92 = "É bem a cara da Nagisa-san, uma gatinha astuta como sempre."
32030-93 = "G-gata……?"
32030-94 = "Será que a lógica dela é que é mais eficiente resolver tudo de uma vez? Parece até que somos tratadas como roupa suja."
32030-95 = "[s] \"(Acho que ouvi algo pior do que 'roupa suja'……)\""
32030-96 = "……Professor, parece que você também foi passado para trás pela Nagisa-san."
32030-97 = "Sob o pretexto de \"ajudar alunas com notas baixas\", ela usou sua boa vontade para que você assumisse esse papel, e na verdade, está usando a autoridade extrajudicial do Schale……"
32030-98 = "Mas, por outro lado, significa que o Professor estava genuinamente se esforçando por nós……"
32030-99 = "……Obrigada, Professor. Você é realmente uma boa pessoa, fufu♡"
32030-100 = "Hanako-chan, incrível…… você parece uma detetive."
32030-101 = "A \"traidora de Trinity\"…… a Nagisa-sama me pediu para encontrá-la."
32030-102 = "……Fufu, entendo. \"A traidora de Trinity\", é…… uma expressão bem típica da Nagisa-san. É uma lógica que considera traidora qualquer uma que atrapalhe os planos dela, a anfitriã do Chá das Cinco."
32030-103 = "……A Azusa-chan já era suspeita desde a análise dos documentos, então não é de se estranhar que ela seja suspeita."
32030-104 = "A Koharu-chan, por que será…… se formos forçar a barra, sob a perspectiva de ser um refém do Comitê de Justiça, até que faz sentido, embora seja um pouco forçado……"
32030-105 = "……Ora, pensando bem, por que a Hifumi-chan é uma suspeita? Você não era próxima da Nagisa-san?"
32030-106 = "Eh!? E-eu também sou uma suspeita……!?"
32030-107 = "É-é verdade, parecia que éramos próximas…… m-mas por que eu……?"
32030-108 = "[s] \"………….\""
32030-111 = "……De qualquer forma, talvez seja melhor conversar um pouco mais com a Azusa-chan depois. Vou verificar algumas outras coisas por conta própria também."
32030-112 = "Sim. Se descobrir algo, ficaria feliz se pudesse nos contar."
32030-113 = "Entendido. Isso significa que também posso participar dessas reuniões secretas na calada da noite? Ufufu, estou feliz♡"
32030-114 = "Três pessoas reunidas em uma sala fechada no meio da noite para brincadeiras secretas…… meu coração não para de bater forte♡"
32030-115 = "E-esse jeito de falar é um pouco……"
32030-116 = "[s] \"Bem, já está tarde, vamos dormir.\""
32030-117 = "Sim, então até amanhã."
32030-118 = "Pois é, boa noite."
32030-121 = "Hmm... banheiro..."
32030-125 = "Ué... o quarto do Sensei? A essa hora da noite..."
32030-129 = "Então, Sensei, muito obrigad... ué?"
32030-130 = "……!?"
32030-131 = "Hi-Hifumi!? O que diabos você está fazendo no quarto do Sensei...!?"
32030-132 = "Fufu. Então, fico ansiosa pelo nosso próximo encontro secreto à noite..."
32030-133 = "……Oh?"
32030-134 = "……!"
32030-139 = "Tr-três pessoas...!? Idiotas, pervertidos! Seus depravados!!"
32030-141 = "(E assim, mais um dia chega ao fim.)"
32030-143 = "Próximo episódio: Festa na Piscina"
