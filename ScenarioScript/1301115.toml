[translation]
1301115-1 = "Lembranças da irmã mais velha"
1301115-5 = "Ok! O carregamento terminou!"
1301115-6 = "[s] \"Certo! Vou derrubá-lo... Agora!\""
1301115-7 = "Nesse ângulo... vai dar certo!"
1301115-8 = "Haaaaa!!"
1301115-13 = "A-ah!?"
1301115-14 = "[ns1] \"V-você está bem...?\"\n[ns2] \"Será que você é do tipo que mexe o corpo todo enquanto joga?\""
1301115-17 = "Isso mesmo! #nSincronizar com o jogo também é uma qualidade de um gamer, sabe――"
1301115-18 = "Quer dizer, uau! #nAh, espere um pouco――!"
1301115-25 = "Guaaaaah!"
1301115-27 = "Não deu tempo..."
1301115-28 = "Ah... sim, estou bem. #nA culpa foi minha por ter empilhado as coisas de qualquer jeito..."
1301115-29 = "[s] \"Cuidado... consegue se levantar?\""
1301115-33 = "Sim, obrigada... mas espere?"
1301115-39 = "Ah! Estava aqui esse tempo todo!"
1301115-40 = "Isso? #nFufufu... isso é..."
1301115-41 = "Foi o primeiro console que eu e a Midori tivemos combinando."
1301115-42 = "[s] \"Então é o primeiro console para vocês duas?\""
1301115-43 = "Não, para mim não. #nNaquela época, eu já era uma gamer de carteirinha!"
1301115-44 = "Mas nós compramos juntas nessa ocasião."
1301115-45 = "Provavelmente, para a Midori, este foi o primeiro console dela."
1301115-46 = "[s3] \"Se é algo tão importante...\"\n[s4] \"Não deveria cuidar melhor dele?\""
1301115-49 = "Não, eu cuido dele direitinho, sério!"
1301115-50 = "Olha! Eu até preparei um suporte e uma capa! #nNão está perfeito!?"
1301115-55 = "Bem, talvez não faça muito sentido se eu esquecer onde coloquei..."
1301115-56 = "Eu tento cuidar bem dele! #nDo meu jeito..."
1301115-57 = "[s] \"É algo tão especial assim?\""
1301115-58 = "Pois é, no fim das contas..."
1301115-59 = "...Sim."
1301115-60 = "É porque isso é uma prova de que sou a irmã mais velha!"
1301115-61 = "Hoje em dia a gente faz jogos juntas, mas... #noriginalmente, a gente não era tão próximas assim."
1301115-62 = "Então, fiquei pensando em como poderíamos nos aproximar... #ne tive a ideia de que jogar juntas seria uma boa."
1301115-63 = "Foi por isso que eu comprei para ela."
1301115-64 = "Se é um presente da irmã mais velha, ela não pode tratar de qualquer jeito, né?"
1301115-65 = "Fufufu... #ne assim, meu \"Plano de Transformar a Midori em Gamer\" foi um sucesso brilhante..."
1301115-66 = "Nossa relação melhorou e tudo mais! Não tenho do que reclamar!"
1301115-67 = "...Ué? Mas será que foi bom mesmo? #nA Midori não tem muita cerimônia ao falar comigo..."
1301115-68 = "[s] \"E a sua taxa de vitórias contra a Midori...\""
1301115-69 = "N-não diga isso!"
1301115-70 = "Sinto que estou saindo no prejuízo!"
1301115-71 = "[s] \"A irmã mais velha deveria... deixar a outra ganhar, talvez?\""
1301115-72 = "É-é verdade, né? #nNa verdade, eu acho que sou melhor nos jogos..."
1301115-77 = "...Ah!!"
1301115-78 = "[s] \"O que houve?\""
1301115-79 = "Olha a tela――!"
1301115-80 = "O monstro está fugindo!"
1301115-81 = "[ns] \"Falha na caçada!?\""
1301115-82 = "Waaaaah! É tão difícil encontrar aquele bicho!"
1301115-84 = "(E assim por diante――)"
1301115-85 = "(Passei um bom tempo jogando com a Momoi depois de muito tempo)"
