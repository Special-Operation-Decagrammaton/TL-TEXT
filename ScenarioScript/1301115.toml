[translation]
1301115-1 = "お姉ちゃんの思い出"
1301115-5 = "おっけー！チャージできたよ！"
1301115-6 = "[s] \"よし！ダウンさせるね……今だ！\""
1301115-7 = "この角度なら――いける！"
1301115-8 = "やあああっ！！"
1301115-13 = "あ、あれっ！？"
1301115-14 = "[ns1] \"だ、大丈夫……？\"\n[ns2] \"もしかして、ゲームしてると体も動いちゃうタイプ？\""
1301115-17 = "そう！#nゲームとシンクロするのも、ゲーマーの資質だからね――"
1301115-18 = "って、わぁっ！#nあっ、ちょっと待って――！"
1301115-25 = "ぐあああっ！"
1301115-27 = "間に合わなかった……。"
1301115-28 = "あ……うん、大丈夫だよ。#n雑に積んでたのが悪いわけだし……。"
1301115-29 = "[s] \"気をつけてね……立てそう？\""
1301115-33 = "うん、ありがと……ってあれ？"
1301115-39 = "あっ！こんなところにあったんだ！"
1301115-40 = "これ？#nふっふっふっ……これはね……。"
1301115-41 = "私とミドリが、初めてお揃いにしたゲーム機なんだ。"
1301115-42 = "[s] \"それじゃあ、二人にとって初めてのゲーム機なの？\""
1301115-43 = "ううん、私はそうじゃないよ。#nもうその時にはバリバリのゲーマーだったからね！"
1301115-44 = "でも、このときはセットで買ったんだよね。"
1301115-45 = "多分、ミドリにとってはこれが初めてのゲーム機じゃないかな。"
1301115-46 = "[s3] \"大切なものなら……。\"\n[s4] \"もっと大事にしたほうがいいんじゃない？\""
1301115-49 = "いや、ちゃんと大切にしてたんだって！"
1301115-50 = "ほら！スタンドとケースも用意したんだよ！#nばっちりでしょ！？"
1301115-55 = "まあ、どこに置いたか分からなくなってたら、あんまり意味ないかもだけど……。"
1301115-56 = "大事にしようとはしてるんだよ！#n私なりに……。"
1301115-57 = "[s] \"そんなに特別なものなの？\""
1301115-58 = "そうだね、やっぱり……。"
1301115-59 = "……うん。"
1301115-60 = "これはお姉ちゃんとしての証、だからかな！"
1301115-61 = "今でこそ、こうやって一緒にゲームを作ってるけど……#nもともと、私たちはそんなに仲良くなかったんだ。"
1301115-62 = "だから、どうやったら距離が縮まるかなって色々考えて……#n一緒にゲームすればいいんじゃないかって思いついたの。"
1301115-63 = "それで、私が買ってあげたんだ。"
1301115-64 = "お姉ちゃんからのプレゼントなら、雑には扱えないでしょ？"
1301115-65 = "ふっふっふっ……#nそして、私の「ミドリゲーマー化計画」は華麗なる成功を収めたのだった……。"
1301115-66 = "ミドリとの仲も良くなったし！文句なしだよね！"
1301115-67 = "……あれ？でも、本当に良かったのかな？#nミドリ、私に対して、言葉に遠慮が無い気がするけど……。"
1301115-68 = "[s] \"ミドリとの対戦の勝率も……。\""
1301115-69 = "い、言わないで！"
1301115-70 = "なんか損してる気がしてきた！"
1301115-71 = "[s] \"お姉ちゃんは、負けてあげるもの……かな。\""
1301115-72 = "そ、そうだよね？#n本当は私の方がゲーム上手い……と思うし！"
1301115-77 = "……あっ！！"
1301115-78 = "[s] \"どうしたの？\""
1301115-79 = "画面見て――！"
1301115-80 = "モンスターが逃げてる！"
1301115-81 = "[ns] \"討伐失敗！？\""
1301115-82 = "うわーん！あいつ探すの大変なのにー！"
1301115-84 = "（そんなこんなで――）"
1301115-85 = "（久しぶりに、モモイとたくさんゲームをして過ごした）"
