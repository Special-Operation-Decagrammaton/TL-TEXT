[translation]
103020-1 = "第2話;異変"
103020-5 = "……！！"
103020-7 = "気がつきましたか？#nマエストロ。"
103020-13 = "……一体、何が起きている？"
103020-14 = "いや……説明はいい。#n肉体が変わったからか、気が動転しているようだ。"
103020-15 = "クックックッ……あまり時間が無かったもので、代替品を嵌めたのですが……#nご気分はいかがでしょう？"
103020-16 = "所詮、肉体は消耗品に過ぎぬもの。どのような形であろうと構わない。 "
103020-17 = "そうか……「色彩」の襲来。"
103020-18 = "ええ。我々の想定より随分と早く……#n――色彩の[ruby=きょうどうしゃ]嚮導者[/ruby]、プレナパテスが攻撃を開始しました。"
103020-19 = "……我々の所在や弱点……#n攻撃のタイミングに至るまで、全てを見透かされているとはな。"
103020-20 = "我々は端から[ruby=きょうどうしゃ]嚮導者[/ruby]の掌の上にいたということだ……#n「ゲマトリア」の名も、地に堕ちたものだな。"
103020-21 = "クックックッ……我々のことは、おそらく眼中にも無いかと。"
103020-22 = "我々を襲ったのも、おそらく「道具」を得るためなのでしょう――#n彼らの目的を達成するための。"
103020-23 = "キヴォトスを滅亡させるための「道具」……か。 "
103020-24 = "ええ。彼らは「恐怖」に反転した[ruby=アヌビス]死の神[/ruby]を操り#n……ゲマトリアが所有していた全ての「秘儀」を奪いました。"
103020-39 = "[ruby=ミメシス]複製[/ruby]、「[ruby=Communio Sanctorum]聖徒の交わり[/ruby]」、デカグラマトン、名もなき神、ライブラリー・オブ・ロア――そして、我々が終ぞ手に入れられなかった「アトラ・ハシースの箱舟」をも。"
103020-40 = "色彩の[ruby=きょうどうしゃ]嚮導者[/ruby]が、[ruby=アヌビス]死の神[/ruby]の「恐怖」を手に入れた以上、#nキヴォトスは我々が活動するには適さなくなりました。"
103020-41 = "「狂気」はあらゆるものを飲み込み、存在を塗り替えてしまいます。#nそれこそが「色彩」の本質なのでしょう。"
103020-42 = "ここで我々が己の「価値」を追及したところで、獲得した全てがプレナパテスの「道具」に成り下がってしまうのです。"
103020-43 = "――では、キヴォトスは終焉を迎えるのか？"
103020-44 = "……いえ。まだ[USERNAME]先生がいます。#nあの者は、自身の生徒たち――シャーレと共に戦っています。"
103020-45 = "そうか……まあ、あの者のことだからな。"
103020-46 = "しかしそれも、まもなく限界を迎えるでしょう。#n不可解な「色彩」――そして、不可解な存在である「先生」……果たしていつまで耐えられるものか……クックックッ。"
103020-50 = "あらゆる事象が崩壊してしまった今もなお、この世界には興味深いものが残っています……面白いと思いませんか？"
103020-54 = "……ここで一度、ゲマトリアは解散とします。"
103020-59 = "様子を見て再集結の招集をいたします。#nそれまであなたは自由の身ですよ、マエストロ。"
103020-60 = "……ゴルコンダはどこに？#nいったい、彼はどうなったのだ？ "
103020-61 = "本体のデカルコマニーは死ぬことができませんので、問題無いかと。#nですが、ゴルコンダはフランシスに入れ替わったようです。 "
103020-62 = "……よりによって、フランシスか。"
103020-63 = "彼はある意味ベアトリーチェよりも危険な存在と言える。#nゴルコンダが恋しくなるだろうな。"
103020-67 = "……黒服、そなたはこれから何をするつもりなのだ？"
103020-68 = "クックックッ――"
103020-71 = "状況はどうなっていますか？"
103020-72 = "えーっと……それが……"
103020-78 = "また、キヴォトス全域で超高濃度エネルギー体が観測されてるんだけど…… "
103020-80 = "そ、そんな……"
103020-81 = "……くっ。"
103020-83 = "対策委員会・教室"
103020-84 = "……。"
103020-85 = "……なるほどねぇ。"
103020-86 = "ということは……"
103020-91 = "――私が識っているのは、此処までだ。"
103020-92 = "……。"
103020-94 = "シロコちゃんは「色彩」と接触して……ああなってしまった、ということですよね……？"
103020-95 = "何よそれ……！#nこんな訳わかんない事に、どうしてシロコ先輩が関わってるの……？ "
103020-101 = "……っ……シロコ先輩……一体、どうして……"
103020-102 = "シロコ先輩に何が起きているのでしょうか……？#n何故、キヴォトスを滅ぼすだなんて……あんな、表情で……"
103020-103 = "アヤネちゃん……。"
103020-104 = "私には……よく分からないです。#n「色彩」の事も聞きましたが……全然、理解が追いつきません……"
103020-105 = "あまりにも荒唐無稽すぎて……どうしてこんな事になってしまっているのかとか、先輩の考えも、何も分からなくて……"
103020-106 = "……。"
103020-107 = "アヤネちゃん……"
103020-109 = "……今、彼女に起きている事が「何」であるのか、解する事はできないが――ひとつ言えるのは、彼女自身の所為では決して無いという事だ。"
103020-110 = "――アレは天災に近い。彼女自身の意志や努力では[ruby=どう]如何[/ruby]ともできない事故に巻き込まれてしまったのだと、捉えた方が良い。"
103020-112 = "そうよ、アヤネちゃん。全ての元凶は「色彩」なんでしょう？#nなら、シロコ先輩のせいじゃないわよ。"
103020-113 = "……。"
103020-114 = "シロコちゃんを、元に戻す方法は……あるのでしょうか？"
103020-119 = "――現時点で判明している事は、無い。"
103020-120 = "……そ、そんな。"
103020-122 = "だが、「色彩」と遭遇した私が今此処にこうして立っている。#nそれに――"
103020-127 = "先生も、色彩に対抗する術を探すべく、百鬼夜行自治区に人を手配している。"
103020-128 = "先生が……！？"
103020-130 = "私もシスターフッドと共に「色彩」について分析[ruby=すなおおかみ]中だ。砂狼シロコ[/ruby]を取り戻す道筋は、まだ残されている。"
103020-132 = "なんと書いてあるのですか、部長？"
103020-133 = "わ、私たちが、読んでもいいのでしょうか……？"
103020-138 = "どれどれ――"
103020-144 = "「……[USERNAME]先生。」"
103020-145 = "「色彩によって反転した者を元に戻す方法など、存在しない。」"
103020-149 = "「其れは――死者が生き返らないのと同様に。#n　この世界の絶対的なルールである。」"
103020-155 = "こ、これって……また、例のタワーが出現する、ということですよね……？"
103020-156 = "今まで私たちがやってきたこと、ぜ～んぶ水の泡じゃん……。"
103020-158 = "……いえ、以前とは少し様相が異なります。"
103020-159 = "あ～うん……エネルギー反応がある位置は違うけどさ。 "
103020-163 = "レッドウィンターの氷海、廃墟化した遊園地の地下、ゲヘナのヒノム火山、トリニティのカタコンベ…… "
103020-164 = "アユム。前回、この現象を観測してから何時間後にサンクトゥムが出現したか覚えていますか？"
103020-165 = "ええと……24時間ほど、です。"
103020-167 = "ってことは、私たちに残された時間もそのくらいかぁ…… "
103020-168 = "いえ、もっと短いかもしれません。"
103020-169 = "……エネルギーの値が、前回より38%ほど高くなっていますので。"
103020-171 = "……あれ？"
103020-177 = "ほんとだ――ってリン先輩、前回の数字全部覚えてたの？#nやっば……"
103020-179 = "あと一日……もしくは、もっと短時間で……"
103020-180 = "戦闘を終えた各自治区は現在整備中だよ。#nサンクトゥムは消えたけど、まだ敵が残ってる場所もあるからね。"
103020-181 = "こんな状況で、新しく出現したサンクトゥムと戦うだなんて……#nみなさんは一息つけてすらいないのに……"
103020-182 = "だねぇ～……#nどうにか、今の段階で2回目のサンクトゥム出現を阻止しないと。"
103020-183 = "……んで、どうやって止めようね？"
103020-189 = "……。"
103020-190 = "今は姿も見えないし、存在すらしていない。エネルギーが観測できているだけ……そんで、いきなり「ドォン！」って現れるんでしょ？"
103020-191 = "どうしたもんかねぇ～#n対抗手段、あるの？"
103020-192 = "[s] \"…………。\""
103020-193 = "先生……"
103020-194 = "[s] \"こうなってしまったのも、全部私のせいだ……みんな、ごめんね。\""
103020-199 = "急に何故、そのような……？"
103020-200 = "せ、先生……！？#nどうして先生が謝るんですか……！"
103020-201 = "[s] \"私は、こうなってしまう事を知っていたから……。\""
103020-204 = "[ns] \"シロコの身に、不吉な出来事が起こるかもしれないという事も、\""
103020-207 = "[ns] \"キヴォトスが終焉を迎えるかもしれないという予言も、\" "
103020-210 = "[ns] \"いずれ相対する、敵の警告も――\""
103020-213 = "[ns] \"全部、私は知っていたのに……。\""
103020-216 = "[ns] \"私が、事態を甘く見てしまっていたから……。\""
103020-218 = "――それは違います。#n先生は、ご自身ができる最善を尽くしてくださりました。"
103020-219 = "リン先輩……？"
103020-220 = "根拠のない予言であったとしても、それを告げるために私を訪ねてくださりました。こちらで打てる方策は、全て尽くしています。"
103020-221 = "だからこそ、「虚妄のサンクトゥム」の攻略も成功したのではありませんか。"
103020-222 = "その他の事は……私たちの問題です。 "
103020-223 = "私が力不足なばかりに……#n私が、連邦生徒会長じゃないから……"
103020-225 = "……。"
103020-227 = "リン先輩……。"
103020-230 = "[ns1] \"ううん、それは言い訳にならないんだ。\"\n[ns2] \"……私はシロコを守らなきゃいけなかった。\"\n[ns3] \"それが――「大人」である私の責任だから。\""
103020-234 = "……。"
103020-236 = "まあまあ、先生落ち着いて。 "
103020-237 = "[s] \"ホシノ……？\""
103020-240 = "難しく考えるから良くないんだよ～"
103020-241 = "つまり、シロコちゃんを連れ戻せばいいんでしょ？"
103020-242 = "ほ、ホシノ先輩……？"
103020-243 = "おじさんも心配でさ～#nシロコちゃん、なんだかこのままだと良くない方向に行っちゃう気がして……"
103020-244 = "それに、いなくなってしまったシロコちゃんと、この状況……関係があるって言われたらおじさんも頭抱えちゃうかも。"
103020-245 = "――そういう不安がないと言ったら嘘になるんだけどさ。"
103020-250 = "でも、それとこれとは話が別でしょ？"
103020-251 = "これは「色彩」が起こしているのであって、シロコちゃんのせいじゃない。#n先生のせいでもなければ、他の誰のせいでもない。"
103020-252 = "私たちが戦わなきゃいけない相手は別にいる――そうでしょ？"
103020-253 = "[s] \"…………。\""
103020-254 = "それに、シロコちゃん以外にも同じような犠牲者が出るかもしれないからね。"
103020-255 = "なら、私たちはそうならないように戦えばいい。"
103020-256 = "それだけだよ。"
103020-257 = "もしも、この現象とシロコちゃんに関係があるのなら――#nきっと、邪魔しに来ると思うんだ。"
103020-258 = "その時にシロコちゃんを捕まえよう。#n元に戻す方法は分からないけど……先生ならなんとかしてくれるって信じてる。"
103020-259 = "ホシノ先輩……"
103020-261 = "いや、シロコ先輩は野生動物じゃないんだけど……"
103020-262 = "おじさん、シロコちゃんを捕まえるのは得意だよ？"
103020-263 = "ね、ノノミちゃん。"
103020-264 = "ホシノ先輩はシロコちゃん捕獲の経験者ですからね☆"
103020-265 = "そういう事。だから、先生はいつもみたいに「なんとかなる」って構えててよ。その方が似合うからさ。"
103020-269 = "[ns4] \"……うん。\" \n[ns5] \"ありがとう、ホシノ。\""
103020-272 = "[ns] \"シロコを連れ戻そう。どんな手を使ってでも、絶対。\""
103020-273 = "うへ～、そうこなくっちゃ。"
103020-275 = "シロコ先輩には言いたいことがたくさんあるんだから！#n早く帰ってきてもらわないと困るわ。"
103020-276 = "皆で協力して、シロコちゃんを連れ戻しましょう☆"
103020-281 = "……そうですね。 "
103020-282 = "私も、手を尽くしてみます。"
103020-287 = "[ns] \"うん。それじゃあ皆で頑張ろうか。\""
103020-289 = "……なるほど。#nそれであれば……"
103020-290 = "モモカ。キヴォトス全域で探知されたエネルギーの流れを確認できますか？"
103020-291 = "へ、エネルギーの流れ？"
103020-292 = "はい。私たちは最後のサンクトゥムを攻略する際、全サンクトゥムのエネルギーが一か所に集中するのを目撃しました。 "
103020-293 = "あ、そうでしたね！#nエネルギー自体が流動的なものだとしたら……"
103020-295 = "……ふーん、そういう事ね。#nちょっとやってみる。"
103020-304 = "うーん……"
103020-305 = "リン先輩の言う通り、各座標に共通しているエネルギーの流れはあるけど……"
103020-306 = "では、その流れを辿っていけば……！"
103020-308 = "そうだねぇ～#nちょっと待ってて。"
103020-317 = "見つけたかも。"
103020-318 = "モモカちゃん！すごいです！"
103020-321 = "全部のエネルギーは一つの場所と繋がってる。#nおそらく、ここがエネルギーの出発点だね。"
103020-322 = "つまり、ここが虚妄のサンクトゥムを生成している中心。"
103020-323 = "それは、どこなのですか……？"
103020-326 = "空の遥か彼方、キヴォトスの上空75,000メートル――"
103020-327 = "えっ！？それって、成層圏――いえ、もはや宇宙じゃないんですか！？"
103020-328 = "……空の遥か彼方、ですか。"
103020-330 = "うん。そこに、今までのサンクトゥムタワーより高濃度のエネルギーを持った構造体があるみたい。 "
103020-331 = "その構造体が……全ての元凶……という事ですか？"
103020-332 = "……まさか、空中に隠れてるなんてね。"
103020-334 = "なるほど……それが全ての元凶であれば、そこにキヴォトスを終焉に導く者がいるのでしょう。 "
103020-341 = "[ns] \"――色彩の[ruby=きょうどうしゃ]嚮導者[/ruby]、プレナパテス。\""
103020-344 = "次回;方法"
