[translation]
103020-1 = "Episódio 2; Anomalia"

103020-5 = "...! !"

103020-7 = "Você percebeu? #nMaestro."

103020-13 = "...O que diabos está acontecendo?"

103020-14 = "Não... a explicação é boa. #nTalvez porque seu corpo tenha mudado, ele parece chateado."

103020-15 = "Kkkkkkkkkkkkkkkkkkkkkkk então não tive muito tempo então instalei um substituto...#nComo você está se sentindo?"

103020-16 = "Afinal, o corpo nada mais é do que um item consumível. Não importa a forma que assuma."

103020-17 = "Isso mesmo... a invasão da “cor”."

103020-18 = "Sim. Muito mais cedo do que esperávamos... Plenapathes de cor começaram seu ataque."

103020-19 = "...Não podemos acreditar que eles possam ver através de tudo, incluindo a nossa localização e fraquezas... até mesmo o momento dos nossos ataques."

103020-20 = "Significa que estávamos na palma da mão...#nO nome \"Gematria\" também caiu por terra."

103020-21 = "Kkkkkkkkkkkkkkkkkkk então... acho que provavelmente eles nem nos veem."

103020-22 = "A razão pela qual nos atacaram foi provavelmente para obter “ferramentas” para atingir os seus objectivos."

103020-23 = "Uma \"ferramenta\" para destruir Kivotos...?"

103020-24 = "Sim. Eles manipularam o \"medo\" invertido #n... e roubaram todos os \"mistérios\" que Gematria possuía."

103020-39 = ", ``'', o Decagrammaton, o Deus Sem Nome, a Biblioteca do Conhecimento - e até mesmo a ``Arca de Atlas Hasith'' que nunca colocamos em nossas mãos."

103020-40 = "Agora que as cores adquiriram o “medo” do #n, o Kivotos não é mais adequado para as nossas atividades."

103020-41 = "A “loucura” engole tudo e reescreve a existência. #nAcho que essa é a essência da \"cor\"."

103020-42 = "Mesmo se perseguirmos o nosso próprio “valor”, tudo o que adquirimos torna-se uma “ferramenta” de Prenapates."

103020-43 = "--Então, o Kivotos vai acabar?"

103020-44 = "……lar. Ainda há um professor [NOME DE USUÁRIO]. #nEssa pessoa está brigando com seus próprios alunos—Petri."

103020-45 = "Entendo... bem, é sobre essa pessoa."

103020-46 = "Mas isso em breve atingirá o seu limite. #nAs \"cores\" inexplicáveis ​​-- e a presença inexplicável do \"professor\"... Me pergunto quanto tempo elas aguentam... Kkkkkkkkkkkkkkkkk então"

103020-50 = "Mesmo agora que tudo desabou, ainda restam coisas interessantes neste mundo... Você não acha que é interessante?"

103020-54 = "...Neste ponto, a Gematoria será dissolvida."

103020-59 = "Monitoraremos a situação e convocaremos uma nova reunião. #nAté lá você está livre, Maestro."

103020-60 = "...Onde está a Golconda? #nO que diabos aconteceu com ele?"

103020-61 = "Os decalques no corpo principal não podem morrer, então não acho que haverá problemas. #nNo entanto, a Golconda parece ter sido substituída por Francisco."

103020-62 = "...Talvez Francisco?"

103020-63 = "Em certo sentido, pode-se dizer que ele é mais perigoso do que Beatrice. #nVou sentir falta da Golconda."

103020-67 = "...Roupas pretas, o que você planeja fazer agora?"

103020-68 = "Kukkukku-"

103020-71 = "Como está a situação?"

103020-72 = "Bem... isso é..."

103020-78 = "Além disso, corpos de energia de concentração ultra-alta foram observados em Kivotos..."

103020-80 = "Ah, é isso..."

103020-81 = "...Droga."

103020-83 = "Força Tarefa/Sala de Aula"

103020-84 = "……."

103020-85 = "...Eu vejo."

103020-86 = "Isso significa..."

103020-91 = "-Isso é tudo que sei até agora."

103020-92 = "……."

103020-94 = "Shiroko-chan entrou em contato com a “cor” e ficou assim, certo?"

103020-95 = "O que é aquilo...! #nPor que Shiroko-senpai está envolvida nessa coisa incompreensível...?"

103020-101 = "...Shiroko-senpai...por que diabos..."

103020-102 = "O que está acontecendo com Shiroko-senpai...? #nPor que você iria querer destruir Kivotos... com tal expressão..."

103020-103 = "Ayane-chan...."

103020-104 = "Eu... eu realmente não entendo. #nTambém ouvi falar de \"cor\"...mas não consigo entender direito..."

103020-105 = "Foi tão absurdo... eu não tinha ideia de por que isso estava acontecendo, ou o que meus superiores estavam pensando..."

103020-106 = "……."

103020-107 = "Ayane-chan..."

103020-109 = "...Não posso explicar o que está acontecendo com ela agora, mas uma coisa que posso dizer é que definitivamente não é culpa dela."

103020-110 = "--Isso foi perto de um desastre natural. Seria melhor pensar nela como tendo se envolvido em um acidente que não poderia ter sido evitado por sua própria vontade ou esforço."

103020-112 = "Isso mesmo, Ayane-chan. O culpado por tudo é a “cor”, certo? Se for #n, então não é culpa da Shiroko-senpai."

103020-113 = "……."

103020-114 = "Existe uma maneira de fazer Shiroko-chan voltar ao normal?"

103020-119 = "--Nada é conhecido neste momento."

103020-120 = "...É isso."

103020-122 = "No entanto, estou aqui agora depois de encontrar a “cor”. #nAnd――"

103020-127 = "Sensei também está arranjando alguém para ir à Região Autônoma de Hyakki Yagyo para encontrar uma maneira de combater as cores."

103020-128 = "A professora...! ?"

103020-130 = "Ainda há uma maneira de eu, junto com a Irmandade, recuperar a análise da “cor”."

103020-132 = "O que diz, chefe?"

103020-133 = "Eu-eu me pergunto se podemos lê-lo...?"

103020-138 = "vamos ver--"

103020-144 = "\"...[NOME DE USUÁRIO] Professor.\""

103020-145 = "“Não há como restaurar alguém que teve a cor invertida.”"

103020-149 = "“É como se os mortos não pudessem voltar à vida. #n É uma regra absoluta deste mundo.”"

103020-155 = "Isso significa que a torre de antes aparecerá novamente, certo?"

103020-156 = "Tudo o que fizemos até agora foi uma perda de tempo..."

103020-158 = "...Não, as coisas estão um pouco diferentes de antes."

103020-159 = "Ah, sim... a localização da reação energética é diferente."

103020-163 = "O mar gelado do Inverno Vermelho, o porão de um parque de diversões abandonado, o vulcão Hinom da Geena, as Catacumbas da Trindade..."

103020-164 = "Ayumu. Você se lembra quantas horas depois da última vez que observou esse fenômeno, o Sanctum apareceu?"

103020-165 = "Bem... cerca de 24 horas."

103020-167 = "Isso significa que é quanto tempo nos resta..."

103020-168 = "Sim, pode ser mais curto."

103020-169 = "...O valor energético é cerca de 38% superior ao da última vez."

103020-171 = "...Huh?"

103020-177 = "É verdade, Rin-senpai, você se lembrou de todos os números da última vez? #nYaba..."

103020-179 = "Mais um dia... ou até menos tempo..."

103020-180 = "Cada região autônoma que terminou os combates está atualmente em construção. #n Sanctum desapareceu, mas ainda restam alguns inimigos."

103020-181 = "Em tal situação, para lutar contra o recém-aparecido Sanctum...#nVocê nem teve a chance de recuperar o fôlego..."

103020-182 = "É isso mesmo~...#nPrecisamos de alguma forma evitar que o Sanctum apareça pela segunda vez nesta fase."

103020-183 = "...Então, como podemos parar isso?"

103020-189 = "……."

103020-190 = "Não consigo ver agora e nem existe. É só que a energia pode ser observada... e de repente, \"Boom!\" aparece, certo?"

103020-191 = "Não sei o que fazer ~#nExiste alguma contramedida?"

103020-192 = "[s] \"………….\""

103020-193 = "professor……"

103020-194 = "[s] \"É tudo culpa minha que isso aconteceu... pessoal, me desculpe.\""

103020-199 = "Por que de repente é assim...?"

103020-200 = "Bem, professora...! ? #nPor que o professor pede desculpas...!"

103020-201 = "[s] \"Porque eu sabia que isso iria acontecer...\""

103020-204 = "[ns] \"Também existe a possibilidade de que algo sinistro aconteça com Shiroko.\""

103020-207 = "[ns] \"Também há profecias de que Kivotos pode chegar ao fim.\""

103020-210 = "[ns] \"Eventualmente, o aviso do inimigo chegará--\""

103020-213 = "[ns] \"Mesmo sabendo de tudo...\""

103020-216 = "[ns] \"Porque eu subestimei a situação...\""

103020-218 = "--Isso não é verdade. O Sr. #n fez o melhor que pôde."

103020-219 = "Rin-senpai...?"

103020-220 = "Mesmo sendo uma profecia infundada, Ele veio até mim para me contar sobre isso. Estamos fazendo todo o possível aqui."

103020-221 = "Não foi por isso que conseguimos conquistar o “Santuário das Ilusões”?"

103020-222 = "Todo o resto... é problema nosso."

103020-223 = "É que não sou forte o suficiente...#nPorque não sou o Presidente do Conselho Estudantil da Federação..."

103020-225 = "……."

103020-227 = "Lin-senpai..."

103020-230 = "[ns1] \"Não, isso não é desculpa.\"\n[ns2] \"...Eu tive que proteger Shiroko.\"\n[ns3] \"Essa é minha responsabilidade como \"adulto\". \""

103020-234 = "……."

103020-236 = "Ok, acalme-se, professor."

103020-237 = "[s] \"Hoshino...?\""

103020-240 = "Não é bom pensar muito."

103020-241 = "Em outras palavras, deveríamos trazer Shiroko-chan de volta, certo?"

103020-242 = "Ei, Hoshino-senpai...?"

103020-243 = "Estou preocupado com você também ~ Shiroko-chan, sinto que as coisas irão em uma direção ruim se continuarem assim..."

103020-244 = "Além disso, Shiroko-chan, que se foi, e esta situação... se me dissessem que havia uma conexão, o velho poderia ficar confuso."

103020-245 = "-Eu estaria mentindo se dissesse que não tenho essas preocupações."

103020-250 = "Mas essa é uma história diferente, certo?"

103020-251 = "Isso é causado pelas “cores” e não é culpa de Shiroko-chan. #nA culpa não é do professor, nem de ninguém."

103020-252 = "Há outro adversário contra o qual temos que lutar, não é?"

103020-253 = "[s] \"………….\""

103020-254 = "Além disso, pode haver outras vítimas como Shiroko-chan também."

103020-255 = "Se assim for, devemos lutar para evitar que isso aconteça."

103020-256 = "É isso."

103020-257 = "Se esse fenômeno tem alguma coisa a ver com Shiroko-chan, então tenho certeza que ela virá incomodar você."

103020-258 = "Vamos pegar Shiroko-chan nessa hora. #nNão sei como recuperá-lo, mas tenho certeza que o professor fará algo a respeito."

103020-259 = "Hoshino-senpai..."

103020-261 = "Não, Shiroko-senpai não é um animal selvagem..."

103020-262 = "Tio, você é bom em capturar Shiroko-chan?"

103020-263 = "Olá, Nonomi-chan."

103020-264 = "Hoshino-senpai tem experiência em capturar Shiroko-chan☆"

103020-265 = "É isso que é. Então, como sempre, o professor estava preparado para dizer: “De alguma forma, vai dar certo”. Porque combina melhor com você."

103020-269 = "[ns4] \"...Sim.\" \n[ns5] \"Obrigado, Hoshino.\""

103020-272 = "[ns] \"Vamos trazer Shiroko de volta. Não importa o que façamos, com certeza.\""

103020-273 = "Uau, eu tenho que ir lá."

