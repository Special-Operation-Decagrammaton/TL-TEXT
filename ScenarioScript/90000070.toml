[translation]
90000070-1 = "Episódio 8; 「Coleta de Dados (7) Distrito de Ruínas Submersas」"
90000070-2 = "……Pessoal."
90000070-3 = "Como foi?"
90000070-4 = "Em uma certa área das ruínas, por um breve instante, captei um sinal que não pode ser ignorado."
90000070-5 = "Um sinal?"
90000070-6 = "……É um \"sinal de chamada\", como se estivesse tentando contatar alguém."
90000070-7 = "……À primeira vista, parece apenas um ruído sem sentido, mas…… eu me lembro desse padrão de sinal."
90000070-8 = "Sim…… aquela existência que encontramos."
90000070-14 = "……Não pode ser."
90000070-15 = "Sim. Coincidia com o sinal do Decagrammaton…… Verifiquei várias vezes por não acreditar, mas não há dúvidas."
90000070-16 = "[s] \"Hum…… ou seja…….\""
90000070-17 = "Significa que o Decagrammaton está no local de onde esse sinal foi emitido?"
90000070-18 = "……Se seguir o padrão de tudo o que aconteceu até agora, quase certamente sim."
90000070-19 = "Então…… nossa missão é revelar a verdadeira identidade do Decagrammaton, certo?"
90000070-20 = "Nesse caso, em vez de perder tempo coletando dados de outros profetas, não seria melhor ir direto atrás dele agora……?"
90000070-22 = "……Você tem razão, mas ainda não é hora de tirar conclusões precipitadas. Nosso objetivo é revelar a identidade do Decagrammaton, mas não queremos apenas entrar em um jogo de perseguição."
90000070-23 = "Vamos até o local verificar. Pode ser que eu tenha me enganado……"
90000070-24 = "Primeiro, vamos nos dirigir ao local de onde o sinal foi emitido. Como foi um sinal muito breve, não conseguimos determinar a localização exata."
90000070-25 = "Talvez passemos dias vagando pelo caminho. Mas vale a pena o esforço."
90000070-26 = "――Então, vamos começar."
