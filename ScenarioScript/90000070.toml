[translation]
90000070-1 = "第8話;「データ収集（７）廃墟水没地区」"
90000070-2 = "……皆さん。"
90000070-3 = "どうだった？"
90000070-4 = "廃墟のとある地域で、ほんの一瞬ですが無視できない信号を捉えました。"
90000070-5 = "信号？"
90000070-6 = "……誰かに呼びかけるような、「呼出信号」です。"
90000070-7 = "……一見、意味のないノイズにも見えますが……私はこの信号パターンを覚えています。"
90000070-8 = "そう……私たちが遭遇したあの存在。"
90000070-14 = "……まさか。"
90000070-15 = "ええ。デカグラマトンの信号と一致していました……まさかと思って何度も確認しましたが、間違いありません。"
90000070-16 = "[s] \"ええと……つまり……。\""
90000070-17 = "その信号が発された場所に、デカグラマトンがいるって事？"
90000070-18 = "……今までの流れ通りでしたら、ほぼ間違いなく。"
90000070-19 = "だったら……私たちの任務はデカグラマトンの正体を明かす事だよね？"
90000070-20 = "それなら、わざわざ他の預言者のデータを収集してないで、今すぐにそっちを攻略すれば良いんじゃ……？"
90000070-22 = "……その通りですが、まだ性急に結論を出す段階ではありません。私たちはデカグラマトンの正体を明かすのが目的ではありますが、追いかけっこをしたいわけではないのです。"
90000070-23 = "一度、現地に行って確認してみましょう。もしかしたら、私が見間違えた可能性もありますし……。"
90000070-24 = "まずは、例の信号が発信された場所に向かいます。ほんの一瞬の信号でしたので、具体的な位置を特定することはできません。"
90000070-25 = "もしかしたら道中、何日も迷うことになるかもしれません。ですが、それだけの価値があります。"
90000070-26 = "――では始めましょう。"
