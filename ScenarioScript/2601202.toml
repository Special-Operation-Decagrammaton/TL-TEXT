[translation]
2601202-1 = "Treinamento de salvamento aquático"
2601202-2 = "（Aceitei o pedido de Kirino e fui até a Academia de Polícia Valkyrie）"
2601202-6 = "Professor [USERNAME], eu estava esperando por você!"
2601202-7 = "Não temos muito tempo até o início da missão, então#n eu estava realmente preocupada sobre o que fazer..."
2601202-8 = "[s1] \"Está tudo bem, pode me chamar sempre que precisar.\"\n[s2] \"Eu também gosto de nadar.\""
2601202-11 = "Sim, muito obrigada!"
2601202-12 = "Eu já terminei o aquecimento antes de você chegar!#n Podemos começar o treinamento a qualquer momento!"
2601202-13 = "[s] \"Então, primeiro, pode me mostrar suas habilidades atuais?\""
2601202-14 = "Com certeza!#n Vou nadar até o outro lado!"
2601202-22 = "[ns3] （Cachorrinho...?）\n[ns4] （Ela está avançando, mas...）"
2601202-26 = "Puf!#n Voltei!"
2601202-27 = "O que achou das minhas habilidades, professor?"
2601202-28 = "[s5] \"Foi perfeito.\"\n[s6] \"Fiquei surpreso com a sua velocidade.\""
2601202-31 = "Fufu, obrigada."
2601202-32 = "Mas ouvi dizer que existem técnicas especiais para o salvamento aquático."
2601202-33 = "Como vimos agora, não dá para salvar alguém apenas nadando normalmente."
2601202-34 = "Então, quando olhei o manual de treinamento... aqui está!"
2601202-35 = "[s] \"...Um peso?\""
2601202-36 = "Sim! O objetivo é simular que este peso é uma pessoa se afogando, e eu preciso conseguir resgatá-la com apenas um braço."
2601202-37 = "...Ué.#n Isso só tem 5kg. Não é leve demais comparado ao peso de uma pessoa?"
2601202-38 = "[s] \"Acho que é por causa da flutuabilidade.\""
2601202-42 = "[ns] \"Ouvi dizer que, na água, o peso corporal parece ser apenas 10% do real.\""
2601202-43 = "Ah, é mesmo!"
2601202-44 = "Então, o meu peso na água seria..."
2601202-48 = "Ah!?"
2601202-49 = "Q-quase caí em uma pergunta capciosa!"
2601202-50 = "Você é esperto, professor...!"
2601202-51 = "[s] \"...Hã?\""
2601202-52 = "N-não é nada!#n Então, vamos começar o treinamento!"
2601202-53 = "Professor, poderia jogar este peso na piscina?#n Eu vou buscá-lo!"
2601202-54 = "[ns7] Jogar o peso levemente.\n[ns8] Jogar o peso com toda a força."
2601202-65 = "Vítima de afogamento localizada!"
2601202-66 = "Você aí, chame uma ambulância e traga um DEA!"
2601202-67 = "[s] （Foi um treinamento sério, simulando uma situação real）"
2601202-68 = "Lá vou eu! Ei!"
2601202-76 = "Ufa!"
2601202-83 = "[ns] \"...\""
2601202-87 = "[ns] \"K-Kirino!?\""
2601202-88 = "Puf!"
2601202-89 = "É-é pesado demais!"
2601202-90 = "Além disso, puf!#n N-não consigo fazer força...!"
2601202-91 = "[s9] \"Calma, segure isto!\"\n[s10] \"Kirino! Vou te ajudar agora mesmo!\""
2601202-100 = "P-peguei a boia salva-vidas!"
2601202-101 = "[s] \"Vou puxar, então segure firme!\""
2601202-105 = "Cof, cof!"
2601202-106 = "[s11] \"Haa, haa...\"\n[s12] \"Kirino, você está bem?\""
2601202-109 = "S-sim... estou bem.#n Obrigada por me salvar, professor."
2601202-110 = "Quem diria que a salva-vidas acabaria se afogando..."
2601202-111 = "Pelo visto, preciso treinar muito mais."
2601202-113 = "（Depois disso, continuamos o treinamento de salvamento aquático juntos）"
