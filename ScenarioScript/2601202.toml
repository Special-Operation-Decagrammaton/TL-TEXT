[translation]
2601202-1 = "人命救助訓練"
2601202-2 = "（キリノの頼みを受け、ヴァルキューレ警察学校に向かった）"
2601202-6 = "[USERNAME]先生、お待ちしておりました！"
2601202-7 = "任務開始まで時間がないもので、#nどうすれば良いのかと本当に困っていました……。"
2601202-8 = "[s1] \"大丈夫だよ、いつでも呼んでね。\"\n[s2] \"私も泳ぐのは好きだから。\""
2601202-11 = "はい、ありがとうございます！"
2601202-12 = "先生がいらっしゃる前に準備運動は済ませておきました！#nいつでも訓練を開始できます！"
2601202-13 = "[s] \"じゃあ、まずは今の実力を見せてもらっても良い？\""
2601202-14 = "もちろんです！#n反対側まで泳いできます！"
2601202-22 = "[ns3] （犬かき……？）\n[ns4] （ちゃんと前には進んでるけど……）"
2601202-26 = "ぷはっ！#nただいま戻りました！"
2601202-27 = "どうでしたか、本官の実力は！"
2601202-28 = "[s5] \"ばっちりだよ。\"\n[s6] \"速くて驚いたよ。\""
2601202-31 = "ふふっ、ありがとうございます。"
2601202-32 = "ですが、人命救助においては特別な泳法があると聞きました。"
2601202-33 = "先ほどのように、ただ泳ぐだけでは救助できませんから。"
2601202-34 = "そこで、訓練マニュアルを見たところ……よい、しょ！"
2601202-35 = "[s] \"……重り？\""
2601202-36 = "はい！この重りを水に溺れた人と想定して、#n片腕で救出できなければならないそうです。"
2601202-37 = "……あれ。#nこれ、5kgしかありませんよ。人の体重と比べたら軽すぎないでしょうか？"
2601202-38 = "[s] \"浮力の関係で、そうなってるんだと思う。\""
2601202-42 = "[ns] \"水中では、体重が10％くらいになるって聞いたよ。\""
2601202-43 = "あ、そうなんですね！"
2601202-44 = "では、本官の体重は水中だと……。"
2601202-48 = "はっ！？"
2601202-49 = "ゆ、誘導尋問にうっかり引っかかるところでした！"
2601202-50 = "やりますね、先生……！"
2601202-51 = "[s] \"……えっ？\""
2601202-52 = "な、何でもありません！#nでは、訓練を開始しましょう！"
2601202-53 = "先生、この重りをプールに投げていただけますか？#n本官が引き上げますので！"
2601202-54 = "[ns7] 重りを軽く投げる。\n[ns8] 重りを思いっきり投げる。"
2601202-65 = "落水者を発見しました！"
2601202-66 = "そこの方、救急車を呼ん[ruby=自動体外式除細動器]で、AEDを持[/ruby]ってきてください！"
2601202-67 = "[s] （実際の現場を想定した本格的な訓練だった）"
2601202-68 = "行きます！えいっ！"
2601202-76 = "ふうっ！"
2601202-83 = "[ns] \"……。\""
2601202-87 = "[ns] \"き、キリノ！？\""
2601202-88 = "ぷへえっ！"
2601202-89 = "お、重すぎます！"
2601202-90 = "それに、ぷはっ！#nち、力が入らなっ……！"
2601202-91 = "[s9] \"落ち着いて、これを掴んで！\"\n[s10] \"キリノ！すぐ助けてあげる！\""
2601202-100 = "きゅ、救命浮き輪、掴みました！"
2601202-101 = "[s] \"引っ張るからしっかり掴んでて！\""
2601202-105 = "げほげほ、けふっ！"
2601202-106 = "[s11] \"はぁ、はぁ……。\"\n[s12] \"キリノ、大丈夫？\""
2601202-109 = "はっ、はい……大丈夫です。#n助けていただきありがとうございます、先生。"
2601202-110 = "まさか、ライフセーバーが溺れるだなんて……。"
2601202-111 = "やはり、もっと訓練をしなければなりませんね。"
2601202-113 = "（その後も一緒に、人命救助訓練を続けた）"
