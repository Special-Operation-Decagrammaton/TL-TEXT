[translation]
1004720-1 = "思い出の宝箱"
1004720-2 = "（チセが心配になって、急いで探しに海へ出た）"
1004720-9 = "[ns] \"たぶんチセなら、きっとこの辺に……\""
1004720-11 = "（そうしてチセを探し、海辺を見回していると……）"
1004720-23 = "[ns] \"もしかして、この音は……？\""
1004720-30 = "やあっ！"
1004720-40 = "（音がする方を見ると、そこには勢いよく海辺の砂をポーチに詰め込んでいるチセの姿があった）"
1004720-41 = "[ns] \"ち、チセ？\""
1004720-47 = "ん～？#n先生だ～こんにちは～"
1004720-48 = "[s1] \"あ、チセ。\"\n[s2] \"こんにちは……って、今何してるの？\""
1004720-51 = "私～？"
1004720-52 = "これはね～"
1004720-53 = "海を持っていこうと思って～"
1004720-54 = "[s] \"海を持っていくって、その、どういう意味かな……？\""
1004720-56 = "こうやって、ここにある砂を詰めるの。"
1004720-57 = "それを陰陽部の部室に飾れば～"
1004720-62 = "海に来れなかった人も、一緒に楽しめるでしょ～？"
1004720-63 = "[s5] \"なるほど……思い出になるものを持っていくんだね。\"\n[s6] \"チセが言ってたのは、そういう意味だったんだ……\""
1004720-66 = "ん～？なにか別の意味もあるの～？"
1004720-67 = "[s7] \"いや、突拍子もないとは思うんだけど……\"\n[s8] \"チセなら、もしかして……と思って。\""
1004720-73 = "……？"
1004720-75 = "[s] \"え、えっと、そうだね。チセはみんなのために海を……\""
1004720-76 = "うん、でも海だけじゃないよ～"
1004720-77 = "みんなに見せたいもの、いっぱいあるから。"
1004720-78 = "……海で見つけた素敵なもの、全部ここに入れたの。"
1004720-85 = "先生も見る～？"
1004720-86 = "（そう言ってチセは、ポーチから何かを取り出し始めた）"
1004720-94 = "この貝殻は～あっちの隅で拾ったものだよ。"
1004720-95 = "こっちの小石は、干潟に落ちてたもので～"
1004720-96 = "この栓抜きは、海の家からのプレゼント～"
1004720-97 = "それでね～……"
1004720-104 = "先生、これは～……"
1004720-111 = "先生～……"
1004720-125 = "（チセのポーチには、海辺で拾ったものだけでなく、たくさんの思い出が詰まっていた）"
1004720-126 = "（貝殻やヤドカリの殻に、一見なんてことのない小石や栓抜き）"
1004720-127 = "（他にも海辺に落ちていた網やビニール袋のようなゴミまで）"
1004720-128 = "（……その「思い出」には、見覚えがあった）"
1004720-130 = "[ns] \"チセ、これってもしかして……\""
1004720-132 = "うん、先生と一緒にきらきらを探してたときに拾ったものだよ～"
1004720-133 = "これには、先生と一緒に過ごした思い出が込められてるから。"
1004720-134 = "だから、みんなにも見せたいと思ったの。"
1004720-135 = "それで、何があったのか一晩中お話をして……"
1004720-136 = "俳句を詠んであげたいんだ～"
1004720-140 = "……そうしたら、みんな喜んでくれるかな？"
1004720-141 = "[ns] \"うん、喜んでくれるよ。\""
1004720-143 = "[ns] \"きっと……ううん、絶対に。\""
1004720-144 = "ほんとう～？"
1004720-145 = "それなら良かった～"
1004720-146 = "じゃあ、もっとたくさん持って帰ろ～"
1004720-157 = "（そうしてチセがポーチに詰め込んでいったものは、何事にも代えがたい宝物のように……）"
1004720-158 = "（……きらきら、きらきらしていた）"
1004720-160 = "[ns] \"そのポーチは、チセにとって宝箱だね。\""
1004720-161 = "宝箱……？"
1004720-162 = "[s9] \"うん。誰かに見せたり……\"\n[s10] \"語りたい思い出が詰まってるから。\""
1004720-165 = "誰かに見せたり……語りたい思い出……"
1004720-166 = "それをいっぱい集めた、宝箱……"
1004720-167 = "……あ。"
1004720-168 = "宝物。"
1004720-172 = "持って帰らないと。"
1004720-179 = "[ns] \"……どうしたの、チセ？\""
1004720-182 = "[ns] \"ち、チセ！？急にどうしたの！？\""
1004720-183 = "先生も宝物だから、陰陽部に持っていく～"
1004720-184 = "[s] \"そ、それは……うぷっ！口に砂が……！？\""
1004720-190 = "[ns] \"お、陰陽部になら一緒に行くから～～～！\""
1004720-192 = "（こうしてチセに手を引かれながら……）"
1004720-193 = "（海辺でゆったりと時間が流れていくのを感じた）"
