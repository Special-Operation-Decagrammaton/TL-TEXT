[translation]
10028070-1 = "Episódio 7; Declaração de Guerra"
10028070-3 = "――Sinto muito mesmo!!"
10028070-4 = "[ns1] \"Eu também estava junto, então me desculpe, Nagisa.\"\n[ns2] Abaixo a cabeça para pedir perdão."
10028070-7 = "Salão do Chá"
10028070-10 = "Hã, o que seria……?"
10028070-11 = "Por que esse pedido de desculpas……?"
10028070-17 = "……."
10028070-18 = "……Eh?"
10028070-19 = "[s3] \"O conjunto de chá, ele quebrou, não foi……?\"\n[s4] \"Você ainda não verificou o conteúdo?\""
10028070-22 = "Ah…… entendo."
10028070-23 = "Era isso…… compreendi o que vocês dois disseram, sim."
10028070-24 = "……Bem."
10028070-28 = "Eu que peço desculpas por tê-los deixado preocupados."
10028070-29 = "Indo direto ao ponto…… não tem problema se aquilo estiver quebrado."
10028070-33 = "[ns5] \"……Eh?\"\n[ns6] \"O que você quer dizer com isso……?\""
10028070-36 = "O que me preocupava era o \"desaparecimento\" da relíquia, não a \"danificação\"."
10028070-37 = "É simples, desde que vocês tragam o objeto, está tudo bem. #nSe estiver quebrado, basta restaurá-lo."
10028070-38 = "……Trinity tem especialistas capazes de restaurar até mesmo livros antigos que foram reduzidos a pó."
10028070-39 = "Como o Sensei também participou da escavação, ninguém duvidará da autenticidade da relíquia."
10028070-40 = "……Deixe-me agradecer novamente. #nAo Sensei e…… bem, à Comissão de Justiça……"
10028070-41 = "É, é a Ichika."
10028070-42 = "……Srta. Ichika, certo. Sim, Srta. Ichika."
10028070-43 = "Fufu."
10028070-44 = "……Então, tenham um bom dia."
10028070-47 = "……Que anticlímax."
10028070-48 = "Dependendo da situação, eu estava até pensando em sair da Comissão de Justiça."
10028070-49 = "No fim das contas, por que toda aquela preocupação……"
10028070-50 = "[s7] \"Mas acho que foi um tempo valioso.\"\n[s8] \"Porque pude conhecer a Ichika.\""
10028070-53 = "Lá vem você de novo…… é melhor pegar leve com esse tipo de comentário."
10028070-54 = "Como é o Sensei, imagino que não tenha feito por mal."
10028070-55 = "Quando estou com você, me sinto uma criança. #n……Bem, comparada ao Sensei, eu sou mesmo uma criança……"
10028070-59 = "Bom…… não importa mais. Já que chegamos a esse ponto, não me importo mais."
10028070-60 = "Não há mais nada a esconder, então vou aproveitar a sua bondade, Sensei."
10028070-61 = "De manhã, eu disse que não queria incomodar o Sensei, mas……"
10028070-62 = "Agora a situação mudou, então vou entrar em contato de vez em quando."
10028070-63 = "Isso é uma declaração de guerra!"
10028070-64 = "Mas foi o Sensei quem permitiu!"
10028070-65 = "……Você que pediu por isso."
10028070-66 = "……É, não é?"
10028070-67 = "[s9] \"Claro, pode entrar em contato quando quiser.\"\n[s10] \"Não importa o assunto, está tudo bem.\""
10028070-70 = "……Fufu, entendido."
10028070-71 = "Se você se cansar no meio do caminho, não diga que não avisei!"
10028070-72 = "……Hehe."
10028070-73 = "De alguma forma, estou ansiosa pelo dia de amanhã. #nAo pensar que também posso tirar o Sensei do sério…… sinto que finalmente me tornei uma aluna de verdade do Sensei."
10028070-74 = "……Bem, por hoje é só."
10028070-75 = "De agora em diante, mesmo fora do trabalho……"
10028070-82 = "……Conto com você."
