[translation]
10028070-1 = "第7話;宣戦布告"
10028070-3 = "――すみませんでした！！"
10028070-4 = "[ns1] \"私も一緒だったのにごめん、ナギサ。\"\n[ns2] 頭を下げて謝る。"
10028070-7 = "ティーパーティー会場"
10028070-10 = "なっ、何でしょうか……？"
10028070-11 = "どうして謝罪を……？"
10028070-17 = "……。"
10028070-18 = "……へ？"
10028070-19 = "[s3] \"ティーセット、割れてたよね……？\"\n[s4] \"まだ中身を確認してないとか？\""
10028070-22 = "ああ……なるほど。"
10028070-23 = "そういうことでしたか……お二人の言葉を理解しました、はい。"
10028070-24 = "……ええと。"
10028070-28 = "こちらこそ、悩ませてしまったようで申し訳ありません。"
10028070-29 = "結論から申し上げますと……あれは割れていても構わないのです。"
10028070-33 = "[ns5] \"……え？\"\n[ns6] \"どういうこと……？\""
10028070-36 = "私が懸念していたのは、遺物の「紛失」であって、「破損」ではありません。"
10028070-37 = "簡単な話、物さえ持ってきていただければ大丈夫です。#n壊れたのであれば、復元すればいいので。"
10028070-38 = "……トリニティには、粉々になった古書でさえ復元できる専門家がいますから。"
10028070-39 = "発掘作業には先生もご一緒してくださったので、遺物の真贋を疑う人もいないでしょう。"
10028070-40 = "……あらためて、お礼を言わせてください。#n先生と……ええっと、正義実現委員会の……"
10028070-41 = "い、イチカです。"
10028070-42 = "……イチカさん、ですね。はい、イチカさん。"
10028070-43 = "ふふっ。"
10028070-44 = "……では、良い一日を。"
10028070-47 = "……拍子抜けっすね。"
10028070-48 = "場合によっては、正義実現委員会を辞めようと考えてたんすが。"
10028070-49 = "いったい、今までの心配は何だったのか……"
10028070-50 = "[s7] \"でも、意味のある時間だったと思う。\"\n[s8] \"イチカのことを知れたからね。\""
10028070-53 = "またまた……ほどほどにした方がいいっすよ、そういう発言は。"
10028070-54 = "先生のことだから、無自覚なんでしょうけど。"
10028070-55 = "一緒にいると、自分が子供に感じるっす。#n……いや、先生に比べればそりゃあ子供っすけど……"
10028070-59 = "まあ……もういいんす。こうなったからには、私も知らないっす。"
10028070-60 = "これ以上隠すこともないし、先生には甘えさせてもらうんで。"
10028070-61 = "朝は、先生の手を煩わせたくない、とか言ったんすけど……"
10028070-62 = "今はもう、あのときと状況が変わったんで、時々連絡させてもらいます。"
10028070-63 = "これは[ruby=・   ・   ・   ・]宣戦布告[/ruby]っすから！"
10028070-64 = "でも、先生がいいって言ったことなんで！"
10028070-65 = "……自業自得っすよ。"
10028070-66 = "……そう、っすよね？"
10028070-67 = "[s9] \"もちろん、いつでも連絡してね。\"\n[s10] \"どんなことでも大丈夫だから。\""
10028070-70 = "……ふふ、了解っす。"
10028070-71 = "途中で面倒になったとしても、知らないっすよ！"
10028070-72 = "……へへっ。"
10028070-73 = "なんだか明日が待ち遠しいっす。#n私も先生を振り回していいんだって思うと……なんだか先生の生徒にちゃんとなれた気がするっす。"
10028070-74 = "……じゃ、今日はそろそろ。"
10028070-75 = "これからは、仕事以外の時にも……"
10028070-82 = "……よろしくお願いします。"
