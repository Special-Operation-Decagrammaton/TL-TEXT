[translation]
2004403-1 = "Pacer"
2004403-2 = "Estava à sua espera, treina... dor...?"
2004403-3 = "Treinador!?"
2004403-4 = "[s] \"Ei, Sumire, o que houve...?\""
2004403-5 = "Será que foi impressão minha..."
2004403-6 = "Você... não está um pouco mais arredondado...?"
2004403-7 = "[s1] \"Sério? ...Ah\"\n[s2] \"Talvez eu tenha comido mais doces ultimamente...\""
2004403-10 = "Doces!"
2004403-11 = "Então a causa é essa..."
2004403-12 = "Entendido. Nesse caso, vamos preparar um menu de treino ideal!"
2004403-13 = "Vamos lá, primeiro, vamos medir o seu peso!"
2004403-20 = "(Fui forçado pela Sumire a subir na balança de bioimpedância...)"
2004403-22 = "...O resultado saiu."
2004403-23 = "[s3] \"E, então, como está, treinadora Sumire...?\"\n[s4] \"Estou muito acima do peso...?\""
2004403-26 = "Fique tranquilo, os números estão normais. Mas..."
2004403-27 = "Olhe aqui! O treinador está com um percentual de gordura corporal um pouco alto!"
2004403-28 = "Achou que era só isso...? Que ingenuidade!"
2004403-29 = "A gordura é o \"combustível\" para os músculos do futuro!"
2004403-30 = "Ou seja, essa gordura é um aglomerado de potencial!"
2004403-31 = "O treinador de agora é... uma semente que um dia irá florescer!"
2004403-32 = "Vamos começar o treino imediatamente!"
2004403-33 = "[s] \"No fim das contas, acabei treinando...!\""
2004403-35 = "O aquecimento terminou, treinador. Fico feliz em ver que sua motivação está alta!"
2004403-36 = "[s] \"Ué, você trocou de roupa...?\""
2004403-37 = "Ah, esta roupa..."
2004403-38 = "É a que eu usava quando trabalhava meio período no estádio."
2004403-39 = "Eu gosto bastante dela, então às vezes a uso para treinar também."
2004403-40 = "Eu mesma trouxe um servidor de bebidas com a mesma capacidade."
2004403-41 = "Bem, vamos começar com uma corrida leve de 10km."
2004403-42 = "Eu também vou correr com você, treinador, usando este equipamento."
2004403-43 = "Normalmente, 20km seria a distância padrão, mas..."
2004403-44 = "Desta vez, ajustei a distância para o treinador, que não costuma se exercitar muito!"
2004403-45 = "[s] \"Agradeço a consideração, mas se pudesse diminuir um pouco mais...\""
2004403-46 = "Não se preocupe, o treinador com certeza vai conseguir!"
2004403-47 = "Então, vamos começar!"
2004403-50 = "(Comecei a correr na pista junto com a Sumire...!)"
2004403-58 = "[ns] \"Haa... haa... não dá... mais...\""
2004403-59 = "Falta só a metade! Vamos lá!"
2004403-74 = "Eu vou te guiar firmemente até o final!"
2004403-75 = "Treinador, no atletismo, existe uma função chamada pacer."
2004403-76 = "É um suporte que considera o ritmo do atleta para extrair o máximo do seu potencial."
2004403-77 = "O pacer que corre à frente recebe o vento, reduzindo a carga do atleta que vem atrás e definindo o ritmo..."
2004403-78 = "Claro, manter o equilíbrio mental do atleta que corre junto também é uma função importante!"
2004403-91 = "Vamos, confie em mim e me siga!"
2004403-92 = "Vamos, confie em mim e me siga!"
2004403-93 = "Eu também acredito que o treinador vai conseguir correr até o fim!"
2004403-94 = "[s] \"Meu... meu coração vai explodir...!\""
2004403-101 = "(Assim, sendo apoiado pela Sumire...)"
2004403-102 = "(Consegui completar o percurso de 10km!)"
2004403-105 = "[wa:1130]― [log=스미레 아르바이트]Bom trabalho![wa:940] Treinador![/log]"
2004403-107 = "― [log=스미레 아르바이트]Realmente, [wa:1190] foi uma corrida magnífica.[/log]"
2004403-110 = "[wa:260]― [log=스미레 아르바이트]Por favor, [wa:1080] preparei uma bebida para você.[/log]"
2004403-113 = "[ns] \"Obrigado, Sumire...!\""
2004403-115 = "[wa:1170]― [log=스미레 아르바이트]Sim, [wa:900] esse esforço merece ser recompensado.[/log]"
2004403-117 = "[wa:650]― [log=스미레 아르바이트]Afinal, é preciso haver uma recompensa adequada, [wa:1960] não é?[/log]"
2004403-120 = "[wa:950]― [log=스미레 아르바이트]Claro, [wa:1300] nem tudo neste mundo――[/log]"
2004403-122 = "― [log=스미레 아르바이트]recebe uma avaliação proporcional ao esforço.[/log]"
2004403-125 = "[wa:1330]― [log=스미레 아르바이트]Ainda assim, eu...[/log]"
2004403-127 = "[wa:200]― [log=스미레 아르바이트]gostaria que aqueles que se esforçam fossem devidamente recompensados, [wa:2720] é o que penso.[/log]"
2004403-130 = "[wa:670]― [log=스미레 아르바이트]Vamos, [wa:950] beba.[/log]"
2004403-132 = "[wa:250]― [log=스미레 아르바이트]Eu também vou tomar [wa:1320] um copo.[/log]"
2004403-135 = "(Comovido com a consideração de Sumire, bebi a bebida e então...)"
2004403-142 = "[ns5] \"Ugh, minha boca está toda pegajosa...!\" \n[ns6] \"Sumire, por acaso isso é...?\""
2004403-145 = "Que perspicaz da sua parte!"
2004403-146 = "Sim, é o meu shake de proteína especial!"
2004403-147 = "[s] \"Sinto que minha garganta ficou ainda mais seca com isso!?\""
2004403-148 = "Treinador, este é o copo supremo."
2004403-149 = "Consumir proteína após o exercício promove a recuperação muscular."
2004403-150 = "Especialmente a proteína animal, que é indispensável para a síntese muscular."
2004403-151 = "Dentre elas, esta proteína que contém whey de rápida absorção é――"
2004403-152 = "Pode-se dizer que é o copo que criará os músculos do futuro!"
2004403-156 = "[ns] \"Não dá... minha garganta está tão seca que não consigo nem ficar de pé...\""
2004403-157 = "T-Treinador...? Se está com sede, também preparei uma bebida esportiva zero açúcar."
2004403-159 = "Aqui está. Beba aos poucos, está bem?"
2004403-163 = "Não, não precisa agradecer..."
2004403-164 = "Na verdade, sou eu quem agradece por você ter mostrado determinação e corrido até o fim!"
2004403-165 = "Então, Treinador!"
2004403-166 = "Amanhã, vamos cultivar novos músculos juntos novamente!"
2004403-167 = "[s] \"Hã, amanhã também?\""
2004403-168 = "Claro. Eu não disse logo no início?"
2004403-169 = "\"Vamos começar com apenas 10km!\""
2004403-174 = "(Embora o treinamento de Sumire tenha sido extremamente eficaz)"
2004403-175 = "(por ter corrido 10km, acabei sofrendo com dores musculares por um bom tempo...)"
