[translation]
2004403-1 = "ペースメーカー"
2004403-2 = "お待ちしておりました、トレー……ナー……？"
2004403-3 = "トレーナー！？"
2004403-4 = "[s] \"えっ、スミレ、どうしたの……？\""
2004403-5 = "気のせいでしょうか……"
2004403-6 = "ちょっと……丸くなりましたか……？"
2004403-7 = "[s1] \"そう？……あっ\"\n[s2] \"最近、お菓子の量が増えたかも……。\""
2004403-10 = "お菓子！"
2004403-11 = "原因はそれですね……。"
2004403-12 = "わかりました。では、最適なトレーニングメニューを用意しましょう！"
2004403-13 = "さ、まずは体重測定からです！"
2004403-20 = "（スミレによって、強引に体組成計へと乗せられた……）"
2004403-22 = "……結果が出ました。"
2004403-23 = "[s3] \"ど、どうですか、スミレコーチ……？\"\n[s4] \"太り過ぎてる……？\""
2004403-26 = "ご安心ください、数値は正常ですよ。ですが――"
2004403-27 = "ここを見てください！わずかながらトレーナーは体脂肪率が高いです！"
2004403-28 = "そのくらい……と思いましたね？甘いですよ！"
2004403-29 = "脂肪は、未来の筋肉のための「燃料」です！"
2004403-30 = "つまり、この脂肪は可能性の塊！"
2004403-31 = "今のトレーナーは……いつか花開く種子なんです！"
2004403-32 = "早速、トレーニングを始めましょうか！"
2004403-33 = "[s] \"結局、トレーニングをすることに……！\""
2004403-35 = "準備運動は終わりましたね、トレーナー。モチベーションも高いようで嬉しいです！"
2004403-36 = "[s] \"あれ、着替えたの……？\""
2004403-37 = "ああ、この服は……。"
2004403-38 = "スタジアムでアルバイトをしていた時のものです。"
2004403-39 = "個人的に気に入って、たまにトレーニングでも着ているんですよ。"
2004403-40 = "ドリンクサーバーは、同じ容量のものを自前で用意しました。"
2004403-41 = "では、軽く10kmのランニングから始めましょう。"
2004403-42 = "私もこの装備で、トレーナーと一緒に走ります。"
2004403-43 = "本来ならば20kmが標準的な距離ですが……"
2004403-44 = "今回は、普段あまり運動をしないトレーナーに合わせた距離にしました！"
2004403-45 = "[s] \"気づかいは嬉しいけど、もう少し距離を短くしてくれると……\""
2004403-46 = "大丈夫、トレーナーなら必ずやり遂げられます！"
2004403-47 = "では始めましょう！"
2004403-50 = "（スミレと一緒にトラックを走り始めた……！）"
2004403-58 = "[ns] \"はぁ……はぁ……もうむ……り……\""
2004403-59 = "あと半分です！頑張りましょう！"
2004403-74 = "最後まで私がしっかりと先導しますから！"
2004403-75 = "トレーナー、陸上競技にはペースメーカーという役割の人がいます。"
2004403-76 = "選手のペースを考慮しつつ、その力をより引き出していくサポーターですね。"
2004403-77 = "前を走るペースメーカーが風を受け、後に続く選手の負担を減らし、ペースを作る――"
2004403-78 = "もちろん、共に走る選手の精神を安定させるのも大切な役目です！"
2004403-91 = "さあ、私を信じてついてきてください！"
2004403-92 = "さあ、私を信じてついてきてください！"
2004403-93 = "私も、トレーナーが最後まで走り抜けると信じています！"
2004403-94 = "[s] \"もう……心臓が爆発しそう……！\""
2004403-101 = "（こうしてスミレにサポートされながら……）"
2004403-102 = "（なんとか10kmコースを完走することができた！）"
2004403-105 = "[wa:1130]― [log=스미레 아르바이트]お疲れ様でした！[wa:940]トレーナー！[/log]"
2004403-107 = "― [log=스미레 아르바이트]本当に、[wa:1190]見事な走りでした。[/log]"
2004403-110 = "[wa:260]― [log=스미레 아르바이트]どうぞ、[wa:1080]お飲み物をご用意しています。[/log]"
2004403-113 = "[ns] \"ありがとう、スミレ……！\""
2004403-115 = "[wa:1170]― [log=스미레 아르바이트]ええ、[wa:900]この努力は報われるべきです。[/log]"
2004403-117 = "[wa:650]― [log=스미레 아르바이트]ちゃんとしたご褒美があってこそ、[wa:1960]ですから。[/log]"
2004403-120 = "[wa:950]― [log=스미레 아르바이트]もちろん、[wa:1300]世の中のすべてが――[/log]"
2004403-122 = "― [log=스미레 아르바이트]努力に比例した評価が与えられるわけではありません。[/log]"
2004403-125 = "[wa:1330]― [log=스미레 아르바이트]それでも私は……[/log]"
2004403-127 = "[wa:200]― [log=스미레 아르바이트]頑張った人がきちんと報われて欲しいと、[wa:2720]思うのです。[/log]"
2004403-130 = "[wa:670]― [log=스미레 아르바이트]さあ、[wa:950]お飲みください。[/log]"
2004403-132 = "[wa:250]― [log=스미레 아르바이트]私も一杯、[wa:1320]いただきます。[/log]"
2004403-135 = "（スミレの気遣いに感動し、ドリンクを飲んだところ……）"
2004403-142 = "[ns5] \"うっ、口の中が粘ついてる……！\" \n[ns6] \"スミレ、これはもしかして……！？\""
2004403-145 = "よくお気づきですね！"
2004403-146 = "そう、私特製のプロテインドリンクです！"
2004403-147 = "[s] \"喉が余計に乾いた気がするんだけど！？\""
2004403-148 = "トレーナー、これこそが至高の一杯なんですよ。"
2004403-149 = "運動後にタンパク質を摂取すると、筋肉の回復を促進してくれます。"
2004403-150 = "特に、動物性タンパク質は筋肉の合成に必要不可欠です。"
2004403-151 = "その中でも、吸収の早い乳清タンパクが含まれたこのプロテインは――"
2004403-152 = "まさに、未来の筋肉を創る一杯と言っていいでしょう！"
2004403-156 = "[ns] \"ダメだ……喉がカラカラで立てない……。\""
2004403-157 = "ト、トレーナー……？喉が渇くようでしたら、糖質ゼロのスポーツドリンクも用意してあります。"
2004403-159 = "どうぞ。少しずつ飲んでくださいね。"
2004403-163 = "いえ、感謝の言葉など……"
2004403-164 = "むしろ、最後まで走り切る姿を見せてくれたことに、私の方こそ感謝しています！"
2004403-165 = "では、トレーナー！"
2004403-166 = "明日も、共に新しい筋肉を育てていきましょう！"
2004403-167 = "[s] \"えっ、明日も？\""
2004403-168 = "もちろんです。最初にお伝えしましたよね？"
2004403-169 = "「軽く10kmから始めましょう」と！"
2004403-174 = "（スミレのトレーニングは、効果抜群だったものの）"
2004403-175 = "（10kmも走ったことで、しばらく筋肉痛に悩まされることになった……）"
