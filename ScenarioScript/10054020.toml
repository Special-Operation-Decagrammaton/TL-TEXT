[translation]
10054020-1 = "第2話;査察"
10054020-2 = "……詳細を。"
10054020-3 = "は、はいっ！えっとですね、その……。"
10054020-4 = "山海経から少し離れたところの渓谷に観光施設がありまして。#nそこに多額の投資をしているんだとか。"
10054020-5 = "こういうことが玄龍門に報告されることもなく――"
10054020-6 = "玄武商会の独断で進んでいたのは、ひじょ～に遺憾です。"
10054020-7 = "身をかがめて心を尽くし、労苦を惜しまず、全力で物事に尽くすべき。と言うように！"
10054020-8 = "……言いますよね？"
10054020-9 = "さあ？あたしはよく……。"
10054020-10 = "……間違えておるな。"
10054020-11 = "げえぇっ！？"
10054020-12 = "……すっ飛ばし過ぎたのは認めるよ。"
10054020-13 = "でも、立地とか交通の便とかはちゃんと調査してるよ。#n空気がよくて、水も綺麗な場所なんだ。"
10054020-14 = "にもかかわらず、施設が持つポテンシャルに対して、かなり低く評価されています。#n投資のリターンが十分に期待できると判断しました。"
10054020-15 = "将来的には玄武商会の支店を出したいと思ってて――！"
10054020-16 = "ちょっと待ってくれ。"
10054020-17 = "そもそもの話だが……玄武商会の資金使途については、#n明細書の提出さえあれば黙認するのが慣例ではなかったか？"
10054020-18 = "はい。ですがそれは[ruby=・]山[/ruby][ruby=・]海[/ruby][ruby=・]経[/ruby][ruby=・]の[/ruby][ruby=・]中[/ruby]の話です。"
10054020-19 = "なるほど……それが外への投資となれば……。"
10054020-20 = "しかも、未だ前例のない初めてのケース。"
10054020-21 = "慣例通りには解釈しづらいかと。"
10054020-22 = "今までになかったケース……。"
10054020-23 = "梅花園だったら、園児たちに相談させてルールを決めていたと思います。"
10054020-24 = "いつも、討論そっちのけで遊びの話に変わっちゃいますけど……。"
10054020-25 = "ココナちゃんは頑張っていますよ。#nそれにこの状況も、基本的には同じようなものです。"
10054020-26 = "そうじゃぞ、ココナ教官。#n妾を含むここの皆は……梅花園の園児と然程変わらぬのやもしれぬ。"
10054020-27 = "課題と協議、そして辿り着いた合意を守っていくことは、#n誰しもにとって容易いことではないからの。"
10054020-31 = "[ns] \"うん……本当に、そうだね……ははっ……。\""
10054020-32 = "大人たる其方だけは毅然としておってほしかったのじゃが……。"
10054020-33 = "それで……どうかな？"
10054020-34 = "前からやってみたかったことだし、慣例や法度を広く解釈すれば……#n全くダメってわけじゃないと思うんだ。"
10054020-35 = "たしかに、明確な違反ではない。其方ならば柔軟性を大切にするじゃろうな。"
10054020-36 = "しかし……玄龍門はそのような方針を取ることはできぬ。"
10054020-37 = "おっしゃる通りです！"
10054020-38 = "玄龍門と山海経が多少変化したとはいえ、伝統と教えがあるんですから！"
10054020-39 = "ああ。変化するといえども、山海経高級中学校の在り方は堅持すべきだ！"
10054020-45 = "（話題が慣例や法度の解釈にシフトしようとしていた）"
10054020-46 = "（ふと、先ほどのルミの言葉が思い浮かんだ……）"
10054020-50 = "空気がよくて、水も綺麗な場所なんだ。"
10054020-52 = "（そこから次々と、点と点が繋がっていった）"
10054020-53 = "食事も大事だけど、根本的な解決のためには心身を癒さないと。"
10054020-54 = "たとえば、自然豊かで空気が澄んだところに行く、とか。"
10054020-59 = "……じゃがな、先生。"
10054020-60 = "休むにしても適切な「口実」が必要。それが、玄龍門の門主というものじゃ。"
10054020-65 = "ふふっ、良いこと思いついちゃった。"
10054020-71 = "[ns] \"じゃあ、みんなで見に行ってみない？\""
10054020-72 = "？"
10054020-73 = "……。"
10054020-74 = "……。"
10054020-75 = "あら？"
10054020-76 = "……。"
10054020-77 = "うふふっ。"
10054020-78 = "先生、何を言い出すんだ！"
10054020-79 = "これは行くとか行かないとか、そういう問題じゃなく……！"
10054020-80 = "[s1] \"だからこそだよ。\"\n[s2] \"「査察」が必要じゃない？\""
10054020-83 = "査察……？"
10054020-87 = "そうか！"
10054020-88 = "うんうん、先生が言うなら仕方ないなぁ。"
10054020-89 = "はぁ……そうなると思いました。"
10054020-90 = "商会が自ら査察を行うわけにはいきませんし……#nここは玄龍門にお任せするほかありませんね。"
10054020-91 = "……玄龍門が玄武商会に査察を行い、沙汰するならば。#n皆も結果に納得するであろう。"
10054020-92 = "先生、見事じゃ。"
10054020-93 = "門主様！？"
10054020-94 = "えっと……これからどうなるんですか……？"
10054020-95 = "それはですね。"
10054020-96 = "みんなで……。"
10054020-97 = "渓谷にバカンスです！"
10054020-98 = "[ns] \"その通り！\""
10054020-99 = "バカンス……？査察だろう？"
10054020-100 = "[ns] \"カモフラージュだよ。\""
10054020-102 = "そうか。査察となれば、現場は不都合な部分を隠そうとする……。"
10054020-103 = "しかし観光客に紛れ、玄龍門だと名乗りさえしなければ、外部の者に区別はつくまい。"
10054020-104 = "ええ。ですから、できる限り[ruby=・]普[/ruby][ruby=・]通[/ruby]を装う必要があります。"
10054020-105 = "渓谷で過ごす夏休み……うふふっ、水着はどれにしましょう。"
10054020-106 = "え？え……？#nシュン姉さんと、先生と……水着？"
10054020-107 = "本当に！？"
10054020-108 = "[s] \"もちろんだよ！ココナちゃん！\""
10054020-109 = "あー、またそうやって！#nですが……えへへっ！今回は遊びなので、特別にその呼び方も許可します！"
10054020-110 = "立派なレディーの姿をお見せしますから、覚悟していてくださいね！"
10054020-111 = "そうか、水着か……。"
10054020-115 = "（……水着？先生に、水着姿を……！？）"
10054020-116 = "商会長として異論はないよ。#nあ、でも先生に1個聞いておかないと。"
10054020-121 = "先生は、あたしがどんな水着を着てたら嬉しい？"
10054020-126 = "ま、待つのじゃ。#nそのようなことを聞くのは……失礼ではなかろうか。"
10054020-127 = "そう？それで喜んでもらえたほうが、あたしは嬉しいけど。"
10054020-128 = "そういった話ではなく……！"
10054020-129 = "少しは法度を守らんか。"
10054020-130 = "あははっ！キサキから法度って聞くの久しぶりかも！"
10054020-138 = "なんにせよ、これで結論は出たね。"
10054020-139 = "玄武商会の外部投資に前例はないものの、#n慣例と法度を広く解釈すれば許容範囲内と考えられる。"
10054020-140 = "そこで、玄武商会と玄龍門、梅花園、先生で構成される査察団によって、#n現地査察を行い判断する……ですね。"
10054020-141 = "観光客という建前なので、水着を忘れないでくださいね？"
10054020-142 = "とはいえ、あまりにも拡大解釈のような……。"
10054020-143 = "まあ、世の中って規則通りには動かないものですし……。"
10054020-144 = "それをお前が言うのか？"
10054020-145 = "どういう意味です？"
10054020-146 = "ルールを拡大解釈して問題を起こしたことがあっただろう？"
10054020-147 = "あれはたしか……。"
10054020-148 = "玄龍門の1年生を「実地研修」として警備に派遣したんだったか。"
10054020-152 = "あー……。"
10054020-153 = "いやいや、まあまあまあ！#nあれもひろ～く解釈すれば糧になりますから。#n経験は人を成長させる、って言うじゃないですか！"
10054020-154 = "警備の派遣先が違法オークション会場でさえなければ、#nその言葉にももう少し同意できていただろうにな。"
10054020-155 = "け、経験は人を成ちょ……って、これ、門主様も推してる言葉なんですよ！？"
10054020-156 = "はあ……本当に口の減らないやつだ。"
10054020-157 = "もしかして……ミナちゃん、私のこと嫌いですか……？#nショック……私は嫌いだなんて思ってないのに……。"
10054020-158 = "むしろ、ミナちゃんがいるから安心して部屋の中にいられるし……。"
10054020-159 = "そういうところだと言っているんだ！"
10054020-160 = "門主様ぁ～ミナちゃんがいじめてきますぅ～"
10054020-161 = "少しは静かにできんのか……。"
10054020-163 = "それでは皆さん！本日はありがとうございました！"
10054020-164 = "こちらこそ、ありがとうございました！#n夏……バカンス……渓谷！待ちきれません！"
10054020-168 = "査察……休暇か、ふふ。"
10054020-169 = "楽しそうですね。"
10054020-170 = "あくまで出張業務じゃよ？"
10054020-171 = "しかし……渓谷か。"
10054020-176 = "期待しててくりゃれ。"
10054020-181 = "ミナ、妾は先に失礼する。"
10054020-182 = "はい、門主様。"
10054020-186 = "[ns] \"さて。\""
10054020-188 = "[ns] \"口実作り、お疲れ様。\""
10054020-189 = "山海経じゃこれが一番大事だからね。"
10054020-190 = "ええ。それが門主様となれば特に……。"
10054020-191 = "な、なに！？つまり……そういうことだったのか！？#nどうやって……いや、待て。カナエ、お前まさか……？"
10054020-192 = "……。"
10054020-193 = "玄武商会とグルだったのか！"
10054020-194 = "そんな人聞きの悪い！私だって被害者なんですよ！#nいきなりルミ会長から電話がかかってきて……！"
10054020-195 = "ごめんごめん。#nでも、玄龍門で話が通じるのってカナエくらいしかいないからさ。"
10054020-196 = "できることなら乗りたくなかったのに……門主様のためって言われて、つい……。"
10054020-197 = "先生も、すぐに気づいてくれてありがとね。"
10054020-198 = "これまで協力してきた経験が活きましたね。"
10054020-199 = "はっ！これこそ、水魚の交わり……！"
10054020-200 = "うぅぅ……玄武商会に先を越されるとは！#nもっと早く先生とお会いすれば良かったです～！"
10054020-201 = "思ってもお前はやらないだろ……。"
10054020-202 = "でも私、察しがいい人は好きですよ？"
10054020-203 = "部屋を出なくて済むからか？"
10054020-204 = "えへへ。"
10054020-209 = "そうだ、[ruby=・]部[/ruby][ruby=・]屋[/ruby][ruby=・]を[/ruby][ruby=・]出[/ruby][ruby=・]な[/ruby][ruby=・]い[/ruby]で思い出した。"
10054020-210 = "出前を持っていく時、ちょっと困ってるんだよね。"
10054020-215 = "[ruby=りくわかく]六和閣[/ruby]の部屋まで届けるのは骨が折れるんですよ……。"
10054020-216 = "入る時に身元を確認されたり、ボディーチェックがあったり、色々と……。"
10054020-217 = "で、でも、私ヘビーユーザーですし！"
10054020-218 = "それに、最近はチェックも緩くなったと聞いてますよ？"
10054020-219 = "構成員からセキュリティに関する疑問が出てることについて、#nどう思うか教えてくれ……。"
10054020-220 = "私の頑張りに免じて、見逃してほしいな？"
10054020-221 = "この……っ。"
10054020-222 = "はぁ……話を戻すが、今回の休暇……いや、査察では私が護衛を担当しよう。#nもちろん、水着など着ないからな。"
10054020-223 = "え？"
10054020-224 = "あら。"
10054020-225 = "[ns] \"ええっ！？\""
10054020-226 = "そんなに驚くことか？"
10054020-227 = "だが、誰かは規則を守るべきだ。ここは私が率先して――"
10054020-228 = "堅いなぁ～勿体な～い。"
10054020-230 = "[ns] \"勿体ないなぁ～\""
10054020-231 = "しかし……。"
10054020-232 = "なんと言われようと、今回は譲歩できん！"
10054020-233 = "一度決めた道は最後まで貫く。それがハードボイルドだからな！"
10054020-234 = "出た出た。ほんと好きですよね、ハードボイルド。"
10054020-235 = "お前にだけは言われたくない！"
10054020-236 = "はいはい、そこまで。"
10054020-237 = "ミナ、色々とお世話になるね。"
10054020-238 = "おかげで、安心して査察を過ごせそうですね。"
10054020-239 = "いや、別に、そういうのでは……。"
10054020-240 = "私は己の責務を全うするだけだからな……！"
10054020-241 = "[s] \"護衛よろしくね！\""
10054020-242 = "任せておけ！"
10054020-243 = "それはそれとして……査察の間、玄龍門は誰が面倒を見るんですか？#n商会は私が代理を務めれば済みますが……。"
10054020-244 = "うん？それは……。"
10054020-248 = "玄龍門は、我らの策士に任せよう！"
10054020-249 = "……はい？"
10054020-250 = "え、私ですか？なんで？どうして！？"
10054020-251 = "他に誰がいる！#n門主様も私も、査察に出てしまうんだぞ！"
10054020-252 = "業務分担からして、適任者はお前しかいないだろう？"
10054020-253 = "い、いやいや！#n私は行政と内部の取り締まりと……えっと……えっと……。"
10054020-257 = "いい機会じゃないか。他の仕事もしてくれ。"
10054020-258 = "なぁっ……！"
10054020-259 = "まっ、まさか……ルミ会長？#n最初からこれを狙って……！？"
10054020-260 = "あ～そういえば、査察には色々と準備が必要なんだよね～#nあたしは先に失礼するよ～"
10054020-261 = "会長がお戻りになるのでしたら、私もこれで。#n今日は楽しかったです。"
10054020-262 = "ああ、そうそう。六和閣のセキュリティについての苦情は今も上がっています。#nそれだけ、頭に入れておいてください。"
10054020-267 = "ミナちゃん、現行犯です！#n玄武商会が玄龍門の広報部長を謀りました！"
10054020-268 = "今こそ執行部長の出番では！？"
10054020-269 = "玄武商会も玄龍門も、同じ山海経だろう？"
10054020-270 = "助け合えるのなら、それ以上のことはない。"
10054020-271 = "せ、先生ぇ……！"
10054020-272 = "[s] \"策士の名言を引用しようか。\""
10054020-277 = "[ns] \"経験は人を成長させるんだよ。\""
10054020-278 = "もう誰も信用しませんっ！！"
10054020-279 = "はははっ！これが、日頃の行いってやつだな！"
10054020-286 = "渓谷、楽しみですか？"
10054020-287 = "[s] \"もちろん。シュンは？\""
10054020-288 = "はい。"
10054020-289 = "私も、楽しみです。"
