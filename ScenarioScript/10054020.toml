[translation]
10054020-1 = "Episode 2;Inspection"
10054020-2 = "……The details, please."
10054020-3 = "Y-yes! Well, you see, um……"
10054020-4 = "There’s a tourist facility in a valley a bit away from Shanhaijing. #nApparently, they’ve been investing a large sum of money into it."
10054020-5 = "To think this was done without reporting it to the Genryumon—"
10054020-6 = "It is extremely regrettable that the Black Tortoise Promenade proceeded with this on their own authority."
10054020-7 = "One should bow their head, devote their heart, spare no effort, and give their all to their duties! As the saying goes!"
10054020-8 = "……That is the saying, isn't it?"
10054020-9 = "Who knows? I’m not really sure……"
10054020-10 = "……You’ve got it wrong."
10054020-11 = "Eek!?"
10054020-12 = "……I admit I might have jumped the gun a bit."
10054020-13 = "But I did properly research the location and accessibility. #nIt’s a place with fresh air and clean water."
10054020-14 = "Despite that, it’s being valued quite low relative to its potential. #nI judged that a sufficient return on investment could be expected."
10054020-15 = "I was hoping to open a branch of the Black Tortoise Promenade there in the future—!"
10054020-16 = "Wait a moment."
10054020-17 = "To begin with…… isn't it customary to turn a blind eye to the Black Tortoise Promenade's use of funds, provided a statement of accounts is submitted?"
10054020-18 = "Yes. But that only applies to matters within Shanhaijing."
10054020-19 = "I see…… so when it comes to investment outside……"
10054020-20 = "And it’s an unprecedented case, the first of its kind."
10054020-21 = "I don't think it can be interpreted according to custom."
10054020-22 = "A case that has never happened before……"
10054020-23 = "If it were the Plum Blossom Garden, I think we would have let the children discuss it and decide on the rules."
10054020-24 = "Though they always end up talking about games instead of the discussion……"
10054020-25 = "Kokona-chan is doing her best. #nBesides, this situation is basically the same thing."
10054020-26 = "That is true, Instructor Kokona. #nEveryone here, including myself…… might not be much different from the children at the Plum Blossom Garden."
10054020-27 = "For it is not easy for anyone to uphold the tasks, deliberations, and the agreements reached."
10054020-31 = "[ns] \"Yeah…… you're really right about that…… haha……\""
10054020-32 = "I had hoped that you, being an adult, would remain resolute……"
10054020-33 = "So…… what do you think?"
10054020-34 = "It’s something I’ve wanted to do for a while, and if we interpret the customs and laws broadly…… #nI don’t think it’s entirely out of the question."
10054020-35 = "Indeed, it is not a clear violation. You would certainly value flexibility."
10054020-36 = "However…… the Genryumon cannot adopt such a policy."
10054020-37 = "Exactly as you say!"
10054020-38 = "Even if the Genryumon and Shanhaijing have changed somewhat, we still have our traditions and teachings!"
10054020-39 = "Yes. Even if things change, the way of Shanhaijing Senior High School must be upheld!"
10054020-45 = "(The conversation was about to shift toward the interpretation of customs and laws.)"
10054020-46 = "(Suddenly, Rumi's words from earlier came to mind……)"
10054020-50 = "It’s a place with fresh air and clean water."
10054020-52 = "(From there, the dots started connecting one after another.)"
10054020-53 = "Meals are important, but to find a fundamental solution, you have to heal your mind and body."
10054020-54 = "For example, by going somewhere with rich nature and clear air."
10054020-59 = "……However, Sensei."
10054020-60 = "Even for a break, one needs a proper 'pretext.' That is what it means to be the head of the Genryumon."
10054020-65 = "Hehe, I just thought of something good."
