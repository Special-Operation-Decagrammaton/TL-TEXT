[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 24/06.]
10054020-1 = "Episódio 2: Inspeção"
10054020-2 = "......Explique-se."
10054020-3 = "S-Sim, senhora! Então, é que..."
10054020-4 = "Existe um local turístico num desfiladeiro\num pouco afastado de Shanhaijing.\nE pelo visto, elas estão despejando\numa quantia enorme de dinheiro naquilo."
10054020-5 = "E tudo isso avançou debaixo dos panos,\nsem nenhum relatório para a Xuanlong Office――"
10054020-6 = "A Genbu Express agiu por conta própria, o\nque é um comportamento muuuuito lamentável!"
10054020-7 = "Como dizem por aí: 'Curve-se e dedique a sua alma,\nnão poupe esforços, e entregue\ntudo de si aos seus deveres'!"
10054020-8 = "......Foi isso que eu quis dizer, não foi?"
10054020-9 = "Não me pergunte. Eu também não conheço muito..."
10054020-10 = "......Você errou."
10054020-11 = "Gueeeh!?"
10054020-12 = "......Admito que acabamos nos empolgando\ne pulando algumas etapas burocráticas."
10054020-13 = "Mas eu mandei investigar a localização e o\nacesso ao transporte direitinho.\nÉ um lugar maravilhoso, com um ar puro\ne uma água limpa como cristal."
10054020-14 = "Apesar de todo o potencial daquele lugar, as\ninstalações de lá são muito subvalorizadas.\nPor isso concluímos que o retorno desse\ninvestimento seria muito promissor."
10054020-15 = "No futuro, nós até queríamos abrir uma\nfilial da Genbu Express por lá e――!"
10054020-16 = "Aguarde um instante."
10054020-17 = "Voltando ao princípio da questão... Não era praxe fecharmos\nos olhos para os gastos da Genbu Express, desde que\nvocês entregassem um relatório das despesas detalhado?"
10054020-18 = "Sim. Mas essa flexibilidade só se aplica\npara negócios feitos dentro de Shanhaijing."
10054020-19 = "Entendo... E como esse\ninvestimento ocorreu no exterior..."
10054020-20 = "Além disso, é a primeira vez que algo\nassim acontece. Não temos nenhum precedente."
10054020-21 = "Acho que vai ser difícil resolver\nisso apenas com base na tradição."
10054020-22 = "Um caso sem precedentes, hein..."
10054020-23 = "Se estivéssemos no Jardim da Flor de Ameixeira,\neu deixaria as crianças conversarem e\ndecidirem as regras sozinhas, eu acho."
10054020-24 = "O problema é que elas sempre deixam a discussão de\nlado e começam a falar sobre brincadeiras no final..."
10054020-25 = "Você tem se esforçado bastante, Kokona-chan.\nE, honestamente, a nossa situação aqui\nnão é muito diferente da delas."
10054020-26 = "Tem toda a razão, Instrutora Kokona.\nTalvez nós... não sejamos tão diferentes\nassim das suas alunas no jardim."
10054020-27 = "No fim das contas, encontrar uma solução num acordo\ncomum entre opiniões conflitantes e depois mantê-la de pé...\nnão é uma tarefa simples para ninguém."
10054020-31 = "[ns] \"Pois é... Você tem toda\na razão... Haha...\""
10054020-32 = "Eu esperava que ao menos você mantivesse\numa postura firme e madura de adulto numa hora dessas..."
10054020-33 = "Mas e aí... o que me dizem?"
10054020-34 = "Era algo que eu sempre quis tentar fazer,\ne se a gente der uma esticadinha nas leis e das tradições...\nAcho que não seria um erro absoluto, não concordam?"
10054020-35 = "De fato, não é uma violação clara da lei.\nE a Rumi sempre foi de valorizar a\nflexibilidade nessas horas."
10054020-36 = "Contudo... a Xuanlong Office não\npode endossar esse tipo de manobra e fechar os olhos."
10054020-37 = "Exatamente!"
10054020-38 = "Embora a Xuanlong Office e Shanhaijing tenham\nse modernizado, nós ainda possuímos\nas nossas tradições e ensinamentos!"
10054020-39 = "Sim. Por mais que as coisas mudem, nós devemos lutar para\npreservar as raízes e a essência da Academia de Shanhaijing!"
10054020-45 = "（A discussão estava prestes a se tornar um intenso\ndebate sobre interpretação de leis e tradições locais）"
10054020-46 = "（Porém, de repente, uma frase que a Rumi\nhavia dito mais cedo brilhou na minha mente...）"
10054020-50 = "É um lugar maravilhoso, com um ar puro\ne uma água limpa como cristal."
10054020-52 = "（E então, os pontos começaram\na se conectar um após o outro na minha cabeça）"
10054020-53 = "Comer bem é fundamental, mas para resolver isso de verdade,\nela precisa curar o corpo e a mente."
10054020-54 = "Por exemplo, ir para um lugar cheio de natureza\ne com um ar bem puro... algo do tipo."
10054020-59 = "......No entanto, Sensei."
10054020-60 = "Até para descansar, eu preciso de um 'pretexto'\nadequado. Esse é o fardo de ser a líder da Xuanlong Office."
10054020-65 = "Fufu, acabei de ter uma ideia brilhante."
10054020-71 = "[ns] \"Então, o que vocês acham da gente ir\ntodo mundo lá para dar uma olhadinha no local?\""
10054020-72 = "？"
10054020-73 = "......"
10054020-74 = "......"
10054020-75 = "Ara?"
10054020-76 = "......"
10054020-77 = "Ufufu."
10054020-78 = "Sensei, o que você está dizendo!?"
10054020-79 = "A questão aqui não é de ir ou não ir, mas sim...!"
10054020-80 = "[s1] \"É exatamente por isso.\"\n[s2] \"Nós precisamos fazer uma 'Inspeção', não é mesmo?\""
10054020-83 = "Uma Inspeção...?"
10054020-87 = "Entendi!"
10054020-88 = "Aham, é verdade, se o Sensei está dizendo\nque é preciso ir lá, então não tem outro jeito, né."
10054020-89 = "Haah... Eu já sabia que as coisas tomariam esse rumo."
10054020-90 = "A Genbu Express não pode inspecionar a si mesma...\nNão vejo outra alternativa a não ser\ndeixarmos isso nas mãos da Xuanlong Office."
10054020-91 = "......Se a própria Xuanlong Office liderar a vistoria nas\ndespesas da Genbu e trouxer um veredito,\nacredito que todos concordarão pacificamente."
10054020-92 = "Sensei, foi uma jogada espetacular."
10054020-93 = "Senhora Monshu!?"
10054020-94 = "Ahn... E o que vai acontecer agora...?"
10054020-95 = "O que vai acontecer é o seguinte:"
10054020-96 = "Nós vamos todos juntos..."
10054020-97 = "Tirar umas férias lá no desfiladeiro!"
10054020-98 = "[ns] \"Isso aí!\""
10054020-99 = "Férias...? Não era uma inspeção oficial?"
10054020-100 = "[ns] \"É só para não levantarmos suspeitas!\""
10054020-102 = "Ah, sim. Se anunciarmos que é uma inspeção,\nas pessoas do local tentarão esconder as falhas e os problemas..."
10054020-103 = "No entanto, se nos camuflarmos como meros turistas e\nescondermos os títulos da Xuanlong Office, ninguém perceberá."
10054020-104 = "Sim. Por isso, precisaremos agir e nos vestir como\npessoas normais o máximo possível."
10054020-105 = "Férias de verão num desfiladeiro refrescante...\nUfufu, com que maiô eu devo ir?"
10054020-106 = "Eh? O quê...?\nEu, a Shun-neesan, o Sensei e... todos de maiô?"
10054020-107 = "É sério isso!?"
10054020-108 = "[s] \"Mas é claro! Né, Kokona-chan!\""
10054020-109 = "Ah, lá vem você me chamar assim de novo!\nMas... ehehe! Como dessa vez o objetivo final é só brincar,\neu libero você pra me chamar assim excepcionalmente!"
10054020-110 = "Vou te mostrar o meu lado mais deslumbrante de\numa verdadeira dama, então se prepare!"
10054020-111 = "Entendi... Roupas de banho..."
10054020-115 = "（......Roupa de banho? Mostrar o meu corpo de maiô\npara... o Sensei!?）"
10054020-116 = "Como presidente da Genbu Express, eu aprovo a ideia!\nAh, mas eu preciso perguntar uma coisinha pro Sensei antes."
10054020-121 = "Sensei, que tipo de maiô você iria\nadorar ver no meu corpinho?"
10054020-126 = "E-Espera aí um minuto.\nFazer uma pergunta obscena dessas em público...\nnão acha que é uma tremenda falta de compostura?"
10054020-127 = "Você acha? Eu só quero deixar ele feliz,\nisso me deixaria muito contente também, sabia?"
10054020-128 = "Não é sobre isso que eu estou falando...!"
10054020-129 = "Pelo menos tente manter a decência e a dignidade."
10054020-130 = "Ahahaha! Fazia um tempão que eu não\nouvia você falar em 'decência', Kisaki!"
10054020-138 = "De qualquer forma, a nossa conclusão está selada."
10054020-139 = "O investimento externo da Genbu Express carece de precedentes...\nContudo, se adotarmos uma interpretação mais elástica dos\nnossos costumes, a transação não se afasta dos limites do aceitável."
10054020-140 = "Sendo assim, uma delegação da Xuanlong Office, Genbu Express\ne do Jardim da Flor de Ameixeira, liderada pelo Sensei...\nConduzirá uma inspeção de campo para emitir o veredito final."
10054020-141 = "A nossa desculpa oficial é turismo disfarçado,\nentão, por favor, não se esqueçam dos maiôs na mala, ouviram?"
10054020-142 = "Ainda acho que essa 'interpretação mais elástica'\nestá forçando muito a barra..."
10054020-143 = "Bom, o mundo lá fora não funciona e nem avança\nsó seguindo o que tá escrito num papel antigo, né..."
10054020-144 = "E é você quem me diz uma coisa dessas?"
10054020-145 = "O que quer dizer com isso?"
10054020-146 = "Você já não causou um baita problemão ignorando as regras\ne dando as suas próprias desculpinhas esfarrapadas no passado?"
10054020-147 = "Se eu me lembro bem, foi na época que..."
10054020-148 = "Você mandou a turma das calouras do primeiro ano da Xuanlong\nbater de frente com a segurança sob a desculpa de que\nera um 'Treinamento de Campo'!"
10054020-152 = "Ah..."
10054020-153 = "N-Não, espera, veja bem!\nSe você interpretar as coisas muuuuito bem,\naquilo serviu como aprendizado pra elas.\nComo diz o ditado: 'A experiência faz o mestre', não é verdade!?"
10054020-154 = "Eu até poderia concordar com você e engolir as suas mentiras...\nSe o lugar que você mandou elas não fosse um\nmaldito Leilão Clandestino de Contrabando!"
10054020-155 = "A-A exp... a experiência enobrece o h...\nEspera aí, esse é um dos lemas favoritos da\nSenhora Monshu, sabia!?"
10054020-156 = "Haaah... Você realmente não sabe a hora\nde fechar essa matraca."
10054020-157 = "Será que... você me odeia, Mina-chan...?\nEu tô arrasada... Eu nunca, nunquinha senti\nqualquer pingo de raiva de você no meu coração..."
10054020-158 = "Pelo contrário, é por você estar sempre lá fora que eu\nposso ficar segura e em paz no meu quarto..."
10054020-159 = "É exatamente de atitudes como essa que eu estou reclamando, caramba!"
10054020-160 = "Senhooraa Monshuuuu~ A Mina-chan tá fazendo bullying comigo de nooovo~"
10054020-161 = "Será que vocês podem fazer um pouco menos de barulho...?"
10054020-163 = "Pois bem, pessoal! Muito obrigada pela reunião de hoje!"
10054020-164 = "Eu que agradeço por tudo!\nVerão... Férias... Um desfiladeiro lindo! Mal posso esperar!"
10054020-168 = "Inspeção disfarçada de férias... Fufu."
10054020-169 = "Você parece estar se divertindo bastante."
10054020-170 = "Só estou mantendo a pose. Oficialmente,\nestarei cumprindo os meus deveres a trabalho, ok?"
10054020-171 = "Mas... ir ao desfiladeiro, hein."
10054020-176 = "Pode criar expectativas que eu não vou te decepcionar."
10054020-181 = "Mina, eu vou me retirar mais cedo hoje."
10054020-182 = "Compreendido, Senhora Monshu."
10054020-186 = "[ns] \"Bem...\""
10054020-188 = "[ns] \"Foi bem difícil inventar\nessa desculpa toda, né?\""
10054020-189 = "Em Shanhaijing, aparências e desculpas\nsão a moeda mais cara do mercado."
10054020-190 = "Sem dúvidas. E quando se trata da nossa líder,\na Senhora Monshu, ainda mais..."
10054020-191 = "O-O que você disse!? Você quer dizer que...\nvocês armaram tudo isso desde o começo!?\nPeraí. Kanae, não me diga que você também...?"
10054020-192 = "......"
10054020-193 = "Você estava mancomunada com a Genbu Express o tempo todo!"
10054020-194 = "Que difamação terrível! Eu também fui\numa vítima nessa história toda, sabia!?\nA Presidente Rumi me ligou do nada dizendo...!"
10054020-195 = "Foi mal, foi mal!\nMas é que você era a única pessoa na Xuanlong Office\ncom quem dava pra conversar e fechar um esquema desse."
10054020-196 = "Se dependesse de mim, eu não teria entrado nessa enrascada\nde jeito nenhum... mas ela apelou e disse que era pro\nbem da Senhora Monshu, e aí eu não resisti..."
10054020-197 = "Obrigada por ter sacado o nosso plano tão rápido, Sensei."
10054020-198 = "Toda a experiência de parceria que tivemos\nno passado deu seus frutos hoje, não foi?"
10054020-199 = "Rá! Como duas gotas d'água juntas...!"
10054020-200 = "Uuuuh... Como eu pude deixar a Genbu Express\npassar a perna em mim e ganhar essa corrida!\nEu deveria ter encontrado o Sensei muuuito antes~!"
10054020-201 = "Até parece que você teria movido um dedo\nse tivesse a chance..."
10054020-202 = "Mas, eu devo admitir... eu tenho uma certa queda\npor pessoas perspicazes, sabia?"
10054020-203 = "E é só porque assim você pode continuar apodrecendo\ndentro do seu quarto sem levantar pra resolver nada, né?"
10054020-204 = "Ehehe."
10054020-209 = "Ah é, a palavra 'não sair do quarto' me fez lembrar de uma coisa."
10054020-210 = "Toda vez que a gente vai entregar os pedidos\nna sua porta, rola a maior dor de cabeça."
10054020-215 = "Passar por todas as barreiras pra entregar comida\nlá nos seus aposentos em Rokuwakaku quebra muito\nas pernas das minhas garotas, viu..."
10054020-216 = "Vocês barram a gente, pedem documento, checam tudo,\nrevistas chatas, é uma frescura sem fim..."
10054020-217 = "M-Mas, mas... eu sou uma cliente muito fiel e peço quase todo dia!"
10054020-218 = "Aliás, as minhas garotas também andam reclamando que\nas revistas ficaram até mais relaxadas e moles ultimamente, viu?"
10054020-219 = "O pessoal já tá até levantando a sobrancelha pra esses protocolos\nde segurança falhos da Xuanlong.\nVocê deveria se explicar pra nós..."
10054020-220 = "Considerando todos os meus esforços de hoje, você não\npoderia fazer vista grossa e perdoar isso?"
10054020-221 = "Sua... Tsc."
10054020-222 = "Haaah... Mudando de assunto. Durante as férias...\ndigo, durante a inspeção oficial, eu serei a encarregada da proteção da Monshu.\nE nem pensem que eu serei arrastada pra essa palhaçada de usar traje de banho!"
10054020-223 = "Hã?"
10054020-224 = "Ara."
10054020-225 = "[ns] \"Sério!?\""
10054020-226 = "Tem algum motivo absurdo para vocês estarem todos tão surpresos?"
10054020-227 = "Alguém do nosso lado tem que manter a ordem e a\ndisciplina do grupo. Eu serei a vanguarda e assumirei o dever moral de――"
10054020-228 = "Larga mão de ser tão careta, menina. Que baita desperdício~"
10054020-230 = "[ns] \"Nossa, que super desperdício~\""
10054020-231 = "Mas...!"
10054020-232 = "Não importa o que digam ou façam,\neu serei irredutível desta vez!"
10054020-233 = "Trilhar o caminho que escolheu com determinação feroz\naté as últimas consequências. Essa é a verdadeira\nessência de ser hardboiled!"
10054020-234 = "Lá vem ela. Você não perde uma chance pra empurrar\nessa palavra 'hardboiled' em tudo, né."
10054020-235 = "Você é a última pessoa que tem\no direito de me criticar por isso!"
10054020-236 = "Tá bom, tá bom, as duas parem com a briguinha."
10054020-237 = "Mina, conto muito com a sua proteção durante a viagem, viu?"
10054020-238 = "Com a sua guarda presente, vamos todos poder relaxar de verdade\ne focar na inspeção com o coração em paz."
10054020-239 = "N-Não foi isso que eu quis... Não há necessidade para tantos elogios... "
10054020-240 = "Eu estou meramente executando as ordens e o meu dever como guarda-costas...!"
10054020-241 = "[s] \"Conto com você, guarda-costas!\""
10054020-242 = "Deixe a segurança nas minhas mãos!"
10054020-243 = "Mas deixando as brigas de lado... Durante os nossos dias fora,\nquem vai assumir o comando da Xuanlong Office e cuidar da papelada?\nA Genbu Express não terá problemas, já que eu deixei\na minha assistente cobrindo as minhas funções, mas..."
10054020-244 = "Hm? Ah, isso é..."
10054020-248 = "As responsabilidades de manter a ordem na Xuanlong Office recairão\ninteiramente sobre os ombros da nossa sagaz Estrategista!"
10054020-249 = "......Hã?"
10054020-250 = "E-Espera, e-eu? O quê!? Mas por que diabos logo eu!?"
10054020-251 = "E quem mais restaria além de você!?\nA Senhora Monshu e eu estaremos muito ocupadas\ne ausentes cumprindo a nossa missão na inspeção!"
10054020-252 = "Tendo em conta as divisões de tarefas que você tanto preza...\nÉ inegável que você é a candidata mais apropriada para isso, não?"
10054020-253 = "N-Não, não, não!\nA minha função oficial se resume às tarefas de administração\npura e treinamento interno focado e... ahn... e..."
10054020-257 = "Encare isso como uma maravilhosa oportunidade de aprendizado.\nPor favor, cubra as tarefas dos outros\ndepartamentos temporariamente na minha ausência."
10054020-258 = "Nããão...!"
10054020-259 = "N-Não acredito nisso... Presidente Rumi!?\nVocê orquestrou toda essa jogada mestre\nperversa desde o princípio para me fazer de capacho...!?"
10054020-260 = "Ahhh~ agora que me lembrei, eu tenho um montão de compras e malas\npara arrumar para a viagem!~\nSe me derem licença, vou indo na frente, tchau~"
10054020-261 = "Já que a nossa chefe vai retornar para o posto, vou indo junto com ela.\nObrigado por nos entreter com esse debate delicioso hoje, foi muito divertido."
10054020-262 = "Ah, quase me esqueci. As queixas constantes que chegam à minha mesa a\nrespeito da frouxidão e da ineficácia dos protocolos de segurança de\nRokuwakaku continuam subindo sem parar.\nApenas grave isso num cantinho da sua mente para resolver na volta, sim?"
10054020-267 = "Mina-chan! Isso é um crime escandaloso ocorrendo bem debaixo do nosso nariz!\nA Genbu Express armou uma teia diabólica e pegou a Diretora de\nRelações Públicas no flagra!"
10054020-268 = "Esse é o palco perfeito e a hora que a Chefe da Segurança deveria\nintervir com a força de ferro, concorda!?"
10054020-269 = "Se a Genbu Express e a Xuanlong Office nasceram debaixo do mesmo teto..."
10054020-270 = "Dar a mão para ajudar um vizinho com problemas é a nossa maior honra.\nNão me oponho a isso de forma alguma."
10054020-271 = "S-Senseiiii...!"
10054020-272 = "[s] \"Acho que é a hora perfeita para usar aquela célebre frase da sábia estrategista...\""
10054020-277 = "[ns] \"A experiência enobrece e faz a pessoa crescer, Kanae.\""
10054020-278 = "Eu nunca mais vou confiar em ninguém nesta vidaaaa!!!"
10054020-279 = "Hahahaha! Isso que dá! É a colheita natural das sementes de preguiça que você plantou!"
10054020-286 = "O passeio no desfiladeiro... você está empolgado com ele?"
10054020-287 = "[s] \"Com toda certeza. E você, Shun?\""
10054020-288 = "Sim."
10054020-289 = "Eu também, estou muito empolgada."