[translation]
2501-1 = "O caminho dos jogos começa pelas boas maneiras (1)"
2501-2 = "Departamento de Desenvolvimento de Jogos do Millennium"
2501-7 = "Ngh, kuh... nghhh...!"
2501-8 = "O que você está fazendo, irmã?"
2501-9 = "Espera um pouco! Estou numa parte importante agora!"
2501-10 = "Só mais um golpe, se eu acertar mais um, eu venço...!"
2501-11 = "Ah, 'Student Fighter 2'? Você tem jogado bastante ultimamente."
2501-12 = "Sim, adicionaram a função online esses dias... e...! Agora dá para jogar partidas online contra usuários dos fliperamas...!"
2501-13 = "Até agora estava sendo relativamente... tranquilo, mas...!"
2501-14 = "Faz tempo que não enfrento alguém tão forte...!"
2501-20 = "Encurralada! Mesmo que ela bloqueie, vou usar um agarrão—"
2501-22 = "O quê, esquivou aqui!? E seguiu com um uppercut!?"
2501-23 = "Ei, um combo contínuo logo em seguida... e ainda mandou um golpe especial ali!?"
2501-29 = "<SYSTEM> O jogador 'Peach_Fighter' perdeu!"
2501-30 = "Aaaah! Fui virada por causa de um erro de julgamento no final!?"
2501-31 = "Foi por pouco, né? Você quase conseguiu..."
2501-32 = "É... bem, não tem jeito, jogo é jogo."
2501-33 = "Foi uma boa partida, vou mandar uma mensagem para o oponente."
2501-35 = "<Peach_Figther: Sukeban312, obrigado pela partida! Foi um bom duelo, vamos jogar de novo se tivermos outra chance!>"
2501-36 = "<Sukeban312: Aprenda a jogar, sua noob>"
2501-37 = "Ei, hã!? O que é isso!?"
2501-39 = "<Peach_Figther: Ei, não precisa falar assim, né!? Você não é uma criança!>"
2501-40 = "<Sukeban312: A criança aqui é você. Aliás, seus comandos e reações foram lentos, em vez de criança, será que você não é uma vovó?>"
2501-41 = "Vo-vovó...!?"
2501-43 = "<Peach_Figther: Falando desse jeito, sendo que você também estava no limite!>"
2501-44 = "<Sukeban312: Ficou vermelha de raiva? Vai, enxuga essas lágrimas. Mas é verdade que quem muito late não morde>"
2501-45 = "Sua... onde você mora!? Me passa seu endereço! Agora a gente vai resolver isso cara a cara—"
2501-46 = "<SYSTEM> O oponente bloqueou você."
2501-47 = "......!"
2501-49 = "Nossa, isso foi horrível..."
2501-50 = "......O quê,"
2501-52 = "Que falta de educação absurda!!!"
2501-54 = "Sendo assim..."
2501-55 = "Vamos partir para o combate real agora!"
2501-57 = "Hã... quer dizer, eu também...?"
2501-58 = "......Eu também, será?"
2501-59 = "Claro! Bem, não é exatamente um combate real, é mais um encontro presencial. Não vamos usar armas nem nada, só vamos jogar cara a cara... mas nessas horas, o mais importante é a atitude!"
2501-60 = "Como o oponente deve ser só um otaku que vive jogando, se formos todas juntas, ele vai ficar com medo e pedir desculpas na hora!"
2501-61 = "Sobre a primeira parte, acho que somos iguais a ele..."
2501-62 = "Ei, irmã, precisa mesmo chegar a esse ponto só porque te provocaram num jogo...?"
2501-63 = "Não é 'só um jogo'! Isso é um incidente grave que afeta o orgulho do Departamento de Desenvolvimento de Jogos!"
2501-64 = "Eu fui super gentil e ele me respondeu daquele jeito, e ainda me chamou de 'vovó'...!"
2501-65 = "Eu definitivamente..."
2501-66 = "Definitivamente não vou perdoar!"
2501-67 = "A segunda parte parece ser o motivo real..."
2501-68 = "Além disso, não podemos deixar um jogador sem educação como esse agir assim."
2501-69 = "Se tiver usuários assim, quem está começando agora vai se sentir desconfortável e o jogo vai acabar morrendo, não acha?"
2501-70 = "Para criar um ambiente melhor, precisamos dar uma lição nesses usuários mal-educados!"
2501-71 = "Concordo plenamente. A Alice também estava jogando um RPG online que começou ontem, e quando um jogador de nível máximo me matou, eu quase parei de jogar..."
2501-72 = "Claro, eu alcancei o nível dele em um dia e me vinguei logo em seguida!"
2501-73 = "Chegar ao nível máximo em um dia... que determinação incrível..."
2501-74 = "Além disso, você também provoca seus oponentes quando ganha no jogo, não é, irmã?"
2501-75 = "Outro dia, quando estava jogando 'Full Jelly' comigo, você disse: 'Dá para ganhar disso até jogando com os pés'..."
2501-76 = "Ugh, isso é... porque, sabe..."
2501-77 = "I-isso é diferente com a família! Não pode sair xingando pessoas que você nem conhece!"
2501-78 = "E-enfim! Pesquisei o histórico de partidas do oponente e encontrei um registro de conexão em um fliperama aqui perto há 10 minutos, então..."
2501-79 = "Se formos ao fliperama agora, devemos encontrar esse usuário. Precisamos fazer com que ele peça desculpas pelo que aconteceu!"
2501-80 = "Hmm, bem, eu também tinha que passar no fliperama mesmo... então não me importo de ir junto."
2501-81 = "Então vamos derrotar o rei demônio maligno, rumo ao ataque de quatro pessoas!"
2501-82 = "Err, eu não tenho nada para fazer no fliperama e não quero me envolver em brigas..."
2501-83 = "Será que... eu posso não ir?"
2501-84 = "Nem pensar! Em estratégias de grupo como essa, a divisão de papéis de cada um é fundamental!"
2501-85 = "É igual a uma batalha de subjugação! Se nós quatro não cercarmos todos os lados, ele vai escapar, não vai?"
2501-86 = "Ma-mas..."
2501-87 = "...Ah, falando nisso, aquele novo console de mesa que a Yuzu estava ansiosa para ver, acho que vai ter um evento de demonstração no fliperama, não é...?"
2501-88 = "Hã, aquele novo console de videogame...!?"
2501-89 = "A Yuzu não iria sozinha, né? Já que é uma oportunidade única, vamos dar uma olhada juntas? Vamos?"
2501-90 = "U-uuh... tudo bem."
2501-91 = "E-eu não vou me envolver, só vou ficar observando de longe..."
2501-92 = "Sim, isso já é o suficiente!"
2501-93 = "Tan-tan-tan! O grupo de quatro pessoas foi formado!"
2501-96 = "Beleza! Então, vamos lá dar uma lição naquele jogador!"
