[translation]
2300605-1 = "A garota-propaganda da Hyakkiyako é uma profissional!"
2300605-2 = "（Depois disso, fiquei preocupado com a mensagem da Shizuko o dia todo enquanto trabalhava, então decidi visitar a Hyakkiyako）"
2300605-5 = "[s] \"Ah, Shizuko. Bem...\""
2300605-6 = "Aqui está o seu conjunto de manju, como solicitado."
2300605-8 = "Ah, Shizuko-tan! O que eu pedi foi..."
2300605-9 = "...Ué, é manju mesmo."
2300605-10 = "...Hoje ela não errou o pedido!?"
2300605-11 = "Por favor, aproveite."
2300605-12 = "???"
2300605-16 = "[ns] \"Shizuko...?\""
2300605-21 = "Ah, Shizuko-chan! Cuidado—"
2300605-24 = "...Não caiu!?"
2300605-25 = "No momento em que ela ia tropeçar, a Shizuko-chan fez um movimento acrobático de repente!?"
2300605-26 = "Ah, peço desculpas. Foi um descuido meu."
2300605-27 = "A simpatia de sempre deu lugar a uma atitude burocrática!?"
2300605-28 = "O pedido era um anmitsu, certo? Por favor, aguarde um momento."
2300605-29 = "Desculpe a demora, aqui está."
2300605-30 = "Ela está servindo de forma totalmente normal e calma!"
2300605-32 = "De alguma forma... a Shizuko-tan de hoje..."
2300605-33 = "Ela está anotando os pedidos com precisão..."
2300605-34 = "Bem, há algum problema?"
2300605-35 = "「「「A Shizuko-tan fria e profissional também é incrível...!」」」"
2300605-36 = "[s] \"O que será que está acontecendo...\""
2300605-38 = "（O horário de fechamento da Hyakkiyako se aproxima）"
2300605-39 = "Sim, então o expediente de hoje termina por aqui."
2300605-40 = "Muito obrigada por virem à Hyakkiyako hoje... opa."
2300605-41 = "..."
2300605-42 = "...Ué, Sensei?"
2300605-43 = "Desde quando você está aqui?"
2300605-44 = "[s1] \"Eu estava me perguntando por que você não veio anotar meu pedido,\"\n[s2] \"então percebi que você realmente não tinha notado.\""
2300605-45 = "D-desculpe, eu..."
2300605-46 = "D-desculpe, eu..."
2300605-47 = "Ah..."
2300605-51 = "[s] \"Shizuko, você está bem!?\""
2300605-52 = "Haa, haa, haa..."
2300605-56 = "U-uh... Ué, onde estou...?"
2300605-57 = "[s] \"Desculpe. Depois que você desmaiou, pedi para te trazerem para o quarto.\""
2300605-58 = "D-desmaiei?"
2300605-59 = "Eu... o que aconteceu...?"
2300605-60 = "[s3] \"Acho que foi excesso de trabalho.\"\n[s4] \"Ultimamente você também estava ajudando no festival de outro distrito comercial...\""
2300605-61 = "Isso é..."
2300605-62 = "Isso é..."
2300605-63 = "É verdade que o número de clientes da Hyakkiyako aumentou recentemente..."
2300605-64 = "E como presidente do comitê organizador do festival, é verdade que minhas tarefas aumentaram, mas..."
2300605-65 = "[s] \"Você não deve se esforçar tanto.\""
2300605-66 = "Mas..."
2300605-67 = "Tudo isso são coisas que só eu posso fazer..."
2300605-68 = "Eu não posso simplesmente ignorar."
2300605-69 = "[s5] \"Mesmo que não ignore, às vezes é importante descansar.\"\n[s6] \"Não tem problema relaxar um pouco.\""
2300605-70 = "Não diga isso..."
2300605-71 = "Não pode ser..."
2300605-72 = "......Sensei, você tem mesmo permissão para dizer algo assim?"
2300605-73 = "[s] \"É justamente porque sou o sensei. O melhor a se fazer é descansar quando estiver cansada e dormir quando estiver com sono.\""
2300605-75 = "[s7] \"Eu estarei aqui ao seu lado.\"\n[s8] \"Eu estarei aqui segurando sua mão.\""
2300605-76 = "......Sensei......"
2300605-77 = "......Sensei......"
2300605-78 = "Então, só um pouquinho......"
2300605-80 = "Vou dormir só um pouquinho......"
2300605-81 = "Sensei, até lá...... até que eu adormeça, fique ao meu lado......"
2300605-82 = "............"
2300605-84 = "（E assim, continuei observando silenciosamente Shizuko enquanto ela caía no sono）"
