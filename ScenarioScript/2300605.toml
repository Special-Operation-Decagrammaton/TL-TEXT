[translation]
2300605-1 = "百夜堂の看板娘はプロフェッショナル！"
2300605-2 = "（その後、仕事中もずっとシズコからのメッセージのことが気になってしまい、百夜堂を訪れた）"
2300605-5 = "[s] \"あっ、シズコ。えっと……。\""
2300605-6 = "こちら、ご注文の饅頭セットです。"
2300605-8 = "あっ、シズコたーん！私が注文したのは……"
2300605-9 = "……あれ、饅頭で合ってる。"
2300605-10 = "……今日は、注文を間違えてない！？"
2300605-11 = "それでは、ごゆっくりどうぞ。"
2300605-12 = "？？？"
2300605-16 = "[ns] \"シズコ……？\""
2300605-21 = "あっ、シズコちゃん！危な――"
2300605-24 = "……くない！？"
2300605-25 = "転びそうになった瞬間、シズコちゃんが急にアクロバティックな動きを！？"
2300605-26 = "ああ、すみません。不注意でした。"
2300605-27 = "いつもの愛想が一転、事務的な態度に！？"
2300605-28 = "ご注文はあんみつでしたよね？少々お待ちください。"
2300605-29 = "お待たせしました、どうぞ。"
2300605-30 = "至って普通に、冷静に運んでる！"
2300605-32 = "なんだか……今日のシズコたん……"
2300605-33 = "正確に注文を受けてて……"
2300605-34 = "えっと、何か問題が？"
2300605-35 = "「「「クールで事務的なシズコたんもカッコいい……！」」」"
2300605-36 = "[s] \"何が起きてるんだろう……。\""
2300605-38 = "（百夜堂の営業終了時刻が近づいてきた）"
2300605-39 = "はい、それでは本日の営業はこれにて終了です。"
2300605-40 = "今日も百夜堂にお越しいただき、ありがとうございましたー……っと。"
2300605-41 = "……。"
2300605-42 = "……あれ、先生？"
2300605-43 = "いつの間にお越しになってたんです？"
2300605-44 = "[s1] \"注文を受けに来ないなって思ったら、\"\n[s2] \"やっぱり気づいてなかったんだね。\""
2300605-45 = "す、すみません、私……。"
2300605-46 = "す、すみません、私……。"
2300605-47 = "あっ……"
2300605-51 = "[s] \"シズコ、大丈夫！？\""
2300605-52 = "はあ、はぁ、はぁ……"
2300605-56 = "う、んぅ……あれ、ここは……？"
2300605-57 = "[s] \"ごめんね。倒れた後、勝手に部屋に運ばせてもらった。\""
2300605-58 = "た、倒れた？"
2300605-59 = "私……一体何が……？"
2300605-60 = "[s3] \"多分、過労だと思う。\"\n[s4] \"この間、また別の商店街のお祭りも手伝ってたし……。\""
2300605-61 = "それは……。"
2300605-62 = "それは……。"
2300605-63 = "確かに、最近は百夜堂のお客さんも増えましたし……。"
2300605-64 = "お祭り運営委員会の委員長として、やることも増えていたのは事実ですが……。"
2300605-65 = "[s] \"あんまり無理しちゃダメだよ。\""
2300605-66 = "でも……。"
2300605-67 = "どれもこれも、全部私がやらなきゃいけないことで……。"
2300605-68 = "蔑ろになんて、できません。"
2300605-69 = "[s5] \"蔑ろにしないにしても、時には休むことも大事だよ。\"\n[s6] \"少しくらいサボっても大丈夫。\""
2300605-70 = "そんな……。"
2300605-71 = "そんな……。"
2300605-72 = "……先生が、そんなことを言ってもいいんですか？"
2300605-73 = "[s] \"先生だからだよ。疲れたら休む、眠いなら寝るのが一番。\""
2300605-75 = "[s7] \"私もこうして、そばにいるから。\"\n[s8] \"私もこうして、手を握ってるから。\""
2300605-76 = "……先生……。"
2300605-77 = "……先生……。"
2300605-78 = "では、少しだけ……。"
2300605-80 = "少しだけ、寝ます……。"
2300605-81 = "先生、それまで……私が眠るまで、そばに……。"
2300605-82 = "…………。"
2300605-84 = "（そうして、眠りに落ちたシズコのことを静かに見守っていた）"
