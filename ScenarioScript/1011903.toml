[translation]
1011903-1 = "気持ちの伝え方"
1011903-2 = "（路地裏商店街のお祭りに参加した）"
1011903-6 = "らっしゃいらっしゃ～い！#n特製ソースの焼きそば！お好み焼きもおいしいですよ～！"
1011903-7 = "溢れんばかりのメロンクリーム！メロンパンならここだよ！"
1011903-8 = "チセ様を惚れさせた特製綿あめ！食べないと後悔しますよ～！"
1011903-12 = "まもなく、広場でフィットネス落語部の公演が始まります。#nぜひ、お越しくださいませ。"
1011903-13 = "一公演あたり、なんと50[ruby=キロカロリー]0kcalを[/ruby]消費できる絶好のチャンス！#nダイエットに効果的ですよ！"
1011903-17 = "（屋台や公演を楽しんでいたら、いつの間にか夕方になっていた）"
1011903-18 = "（祭りも終わりの頃、路地裏で後片付けをしているナグサに出会った）"
1011903-23 = "あ、[USERNAME]先生。来てくれてたんだ。"
1011903-24 = "お祭りは楽しめた？"
1011903-25 = "[s] \"うん、おかげさまで。\""
1011903-29 = "[ns] \"最後にナグサに会えてよかった。\""
1011903-30 = "ずっと屋台の中だったから、仕方ないよ。"
1011903-31 = "焼くたびに売れていって……みんな美味しそうに食べてくれてた……。"
1011903-32 = "裏方のみんなが、すごく頑張ってたんだ。"
1011903-33 = "[s] \"ナグサにもお祭りを楽しんでほしかったな。\""
1011903-37 = "あっ、いたいた！委員長！いやぁ今日は助かったよ！"
1011903-38 = "私は、その……。"
1011903-39 = "あれ？副委員長だっけ？はは！とにかく！#nナグサちゃんが居なかったらどうなってたことか……！"
1011903-40 = "焼き鳥担当が熱出してぶっ倒れたって聞いた時は焦ったけど……。"
1011903-41 = "ナグサちゃんが来てくれてほんっとうに助かった！"
1011903-42 = "それに、初めてだって言うわりに焼くのが上手で驚いたもんさ。"
1011903-44 = "売り物にはなったみたいで、よかった。"
1011903-45 = "でも、お店のいつもの味には遠かったよ。"
1011903-46 = "はは！そう謙遜するなって！"
1011903-50 = "おっと！忘れるとこだった。"
1011903-51 = "この後、店で打ち上げをするんだ。よかったら参加しないか？"
1011903-52 = "お祭りの成功を祝うってんで、みんな大盛り上がりなんだ。"
1011903-53 = "ナグサちゃんが来てくれたら、きっとみんな喜ぶぞ。"
1011903-54 = "でも……私……。"
1011903-58 = "……ごめんなさい。先約があるの。"
1011903-59 = "なんだ、それなら仕方ないわな。"
1011903-60 = "……代わりと言っちゃなんだけど、今度また店に顔出してよ。#n店の焼き鳥、好きなだけタダで食べさせてあげるから！"
1011903-61 = "うん、楽しみにしておく。"
1011903-66 = "[ns] \"約束の時間は大丈夫？\""
1011903-67 = "いや……約束なんて、ないの。"
1011903-68 = "……ただの言い訳。"
1011903-69 = "[s] \"打ち上げは苦手？\""
1011903-70 = "いや、賑やかな雰囲気は嫌いじゃない。"
1011903-71 = "でも……私がいたら、せっかくの雰囲気を壊してしまう。"
1011903-72 = "口下手だし、無表情だし、面白くもないから――"
1011903-73 = "きっと場違いになる。"
1011903-74 = "みんなの楽しい時間に、こんなのが混ざったら迷惑でしょう？"
1011903-75 = "[s1] \"迷惑じゃないよ。\"\n[s2] \"私はナグサといると楽しいよ。\""
1011903-77 = "！？"
1011903-78 = "で、でも……。"
1011903-79 = "[s] \"気持ちを伝えるのに才能なんていらないよ。\""
1011903-83 = "[ns3] \"もし口下手で、無表情だったとしても。\"\n[ns4] \"楽しいって気持ちは、きっとみんな一緒だから。\""
1011903-88 = "……分かった。"
1011903-89 = "先生、ちょっと行ってきていい？"
1011903-90 = "今からでも参加できるか、聞いてみる。"
1011903-91 = "[s] \"楽しんでおいで。\""
1011903-94 = "（ナグサの足取りはいつもより少しだけ軽やかに見えた）"
