[translation]
1011903-1 = "Como transmitir seus sentimentos"
1011903-2 = "(Participou de um festival em um bairro comercial)"
1011903-6 = "Bem-vindo! #n Yakisoba com molho especial! Okonomiyaki também é delicioso!"
1011903-7 = "Creme de melão transbordando! Se você quer pão de melão, é isso!"
1011903-8 = "O algodão doce especial que fez a Chise se apaixonar! Você vai se arrepender se não comer!"
1011903-12 = "A apresentação do Fitness Rakugo Club começará em breve na praça. #nPor favor, venha nos visitar."
1011903-13 = "Uma ótima chance de gastar 50 por apresentação! #nÉ eficaz para fazer dieta!"
1011903-17 = "(Estávamos aproveitando as barracas de comida e as apresentações e, antes que percebêssemos, já era noite.)"
1011903-18 = "(Perto do final do festival, conheci Nagusa que estava limpando um beco.)"
1011903-23 = "Ah, sensei [NOME DE USUÁRIO]. Ele estava vindo."
1011903-24 = "Você gostou do festival?"
1011903-25 = "[s] \"Sim, obrigado.\""
1011903-29 = "[ns] \"Estou feliz por finalmente ter conhecido Nagusa.\""
1011903-30 = "Não tem jeito porque ficou na barraca o tempo todo."
1011903-31 = "Cada vez que eu fazia, vendia melhor... e todo mundo parecia gostar..."
1011903-32 = "Todos nos bastidores trabalharam muito."
1011903-33 = "[s] \"Eu queria que Nagusa aproveitasse o festival também.\"\"\n1011903-37 = \"Ah, foi isso! Presidente! Bem, eu fui salvo hoje!\"\n1011903-38 = \"EU...\"\n1011903-39 = \"Huh? Ele é o vice-presidente? mãe! de qualquer forma! #nEu me pergunto o que teria acontecido se Nagusa-chan não estivesse aqui...!\"\n1011903-40 = \"Quando soube que o responsável pelo yakitori estava com febre e desmaiou, entrei em pânico, mas...\"\n1011903-41 = \"Nagusa-chan veio e realmente me salvou!\"\n1011903-42 = \"Além disso, fiquei surpreso com o quão boa ela era na culinária, embora fosse minha primeira vez.\"\n1011903-44 = \"Parece que está à venda, então estou feliz.\"\n1011903-45 = \"No entanto, estava longe do gosto habitual no restaurante.\"\n1011903-46 = \"mãe! Não seja tão humilde!\"\n1011903-50 = \"Ops! Quase esqueci.\"\n1011903-51 = \"Depois disso teremos lançamento na loja. Você gostaria de participar se quiser?\"\n1011903-52 = \"Todos estão se divertindo muito comemorando o sucesso do festival.\"\n1011903-53 = \"Tenho certeza que todos ficarão felizes se Nagusa-chan vier.\"\n1011903-54 = \"Mas... eu...\"\n1011903-58 = \"……desculpe. Tenho um agendamento prévio.\"\n1011903-59 = \"Bem, acho que não pode ser ajudado então.\"\n1011903-60 = \"...Não vou chamar isso de substituto, mas por favor, mostre seu rosto na loja novamente na próxima vez. Vou deixar você comer quantos Yakitori quiser na loja #n de graça!\"\n1011903-61 = \"Sim, estou ansioso por isso.\"\n1011903-66 = \"[ns] \"Você está bem com o horário marcado?\"\"\n1011903-67 = \"Não... não há promessas.\"\n1011903-68 = \"... Apenas uma desculpa.\"\n1011903-69 = \"[s] \"Você não é bom em lançamentos?\"\"\n1011903-70 = \"Não, não gosto da atmosfera animada.\"\n1011903-71 = \"Mas... se eu estivesse lá, estragaria a atmosfera.\"\n1011903-72 = \"Ele não fala bem, não tem expressões e não é engraçado...\"\n1011903-73 = \"Definitivamente estará fora do lugar.\"\n1011903-74 = \"Não seria um incômodo se algo assim se misturasse com a diversão de todos?\"\n1011903-75 = \"[s1] \"Não é um incômodo.\"\n[s2] \"Eu gosto de estar com Nagusa.\"\"\n1011903-77 = \"! ?\"\n1011903-78 = \"Mas...\"\n1011903-79 = \"[s] \"Você não precisa de talento para transmitir seus sentimentos.\""

1011903-83 = "[ns3] \"Mesmo que você não seja bom em falar e não tenha expressões.\"\n[ns4] \"Tenho certeza de que todos sentem o mesmo em relação à diversão.\""
1011903-88 = "...Eu entendo."
1011903-89 = "Sensei, posso ir um momento?"
1011903-90 = "Vou perguntar se posso participar agora."
1011903-91 = "[s] \"Aproveite.\""
1011903-94 = "(Os passos de Nagusa pareciam um pouco mais leves que o normal.)"
