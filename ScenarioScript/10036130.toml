[translation]
10036130-1 = "スクワッドがゲームを楽しむ方法（１）"
10036130-3 = "お待たせしました！"
10036130-4 = "「全弾発射ゲーム」へようこそ！"
10036130-5 = "これは、どんなゲーム？"
10036130-6 = "はい、ご説明しましょう！"
10036130-7 = "ルールは簡単！#n流れる標的が、景品に近づかないよう阻止するだけです！"
10036130-9 = "さ、サオリ姉さん！#nあ、アレを見てみてください……！"
10036130-10 = "なんと、景品に最新号の「BiBi」がありますよ！？"
10036130-11 = "他にもフードコートのお食事券や、プリント写真の利用券などもあります！"
10036130-12 = "ちなみに今日は、まだ誰も景品を手に入れられていません！"
10036130-13 = "そ、そんな……！"
10036130-15 = "……そこまで難しいゲームなのか？"
10036130-16 = "いや、変な質問をしたな。"
10036130-17 = "簡単なことなど、どこにも存在しない。"
10036130-18 = "だが、それでも諦めるわけには……。"
10036130-19 = "鉄くずの収集、リサイクル品の回収……#n今まで数多くの試練を乗り越えてきた。"
10036130-20 = "それに加え……。"
10036130-21 = "今はみんなが一緒だ！#nもう何も怖くない！"
10036130-22 = "うん！"
10036130-23 = "は、はい！#n今までの[ruby=かんなんしんく]艱難辛苦[/ruby]に比べたら、これくらい……！"
10036130-28 = "……ただゲームに挑戦するだけなのに。"
10036130-29 = "では、初級から開始です！"
10036130-30 = "行くぞ、みんな！"
10036130-32 = "は、はい！"
10036130-33 = "まぁ、やってみようか……。"
10036130-34 = "（ふふ。サッちゃん、楽しそう……）"
