[translation]
10036130-1 = "Como o esquadrão se diverte com jogos (1)"
10036130-3 = "Desculpem a espera!"
10036130-4 = "Bem-vindos ao \"Jogo de Disparo Total\"!"
10036130-5 = "Que tipo de jogo é esse?"
10036130-6 = "Sim, permitam-me explicar!"
10036130-7 = "As regras são simples!#nBasta impedir que os alvos em movimento cheguem perto dos prêmios!"
10036130-9 = "Sa-Saori!#nAh, olhe aquilo...!"
10036130-10 = "Inacreditável, tem a edição mais recente da \"BiBi\" como prêmio!?"
10036130-11 = "Também tem vales-refeição da praça de alimentação, cupons para fotos impressas e muito mais!"
10036130-12 = "Aliás, hoje ninguém conseguiu levar nenhum prêmio ainda!"
10036130-13 = "I-Isso não pode ser...!"
10036130-15 = "……É um jogo tão difícil assim?"
10036130-16 = "Não, esqueça, foi uma pergunta estranha."
10036130-17 = "Não existe nada que seja fácil neste mundo."
10036130-18 = "Mas, mesmo assim, não podemos desistir..."
10036130-19 = "Coleta de sucata, recuperação de materiais recicláveis...#nSuperamos inúmeras provações até agora."
10036130-20 = "Além disso..."
10036130-21 = "Agora estamos todos juntos!#nNão há mais nada a temer!"
10036130-22 = "Sim!"
10036130-23 = "S-Sim!#nComparado a todas as dificuldades e sofrimentos que passamos, isso é..."
10036130-28 = "……É só um desafio de jogo, afinal."
10036130-29 = "Muito bem, começando pelo nível iniciante!"
10036130-30 = "Vamos lá, pessoal!"
10036130-32 = "S-Sim!"
10036130-33 = "Bem, vamos tentar..."
10036130-34 = "(Hehe. A Sa-chan parece estar se divertindo...)"
