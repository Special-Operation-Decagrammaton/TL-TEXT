[translation]
10004040-1 = "第4話;真面目が制服を着て"
10004040-2 = "山海経・「桃源郷」"
10004040-3 = "ここは「[ruby=とうげんきょう]桃源郷[/ruby]」という名前の、[ruby=せんがいきょう]山海経[/ruby]でもかなり有名なお茶屋さんです！"
10004040-4 = "山海経の生徒たちは、食後のカフェみたいな場所として、この「桃源郷」に来てよくお茶を飲んだりするんです。"
10004040-5 = "ここのお茶は、脂っこい食べ物を消化するのに良い成分がたくさん入っているんですよ。"
10004040-6 = "まだ百鬼夜行の「[ruby=ももよどう]百夜堂[/ruby]」ほど有名ではありませんが、お茶の味と香りについては負けていないと思います！きっとキヴォトスでも一番です！"
10004040-7 = "[s] \"ここにシュンがいるかも？\""
10004040-8 = "そ、それは分かりませんが……。"
10004040-9 = "とりあえず、まずはお茶でも飲みながら待ってみましょう。もしかしたらシュンお姉ちゃんがこのお店に来たり、たまたまお店の前を通るかもしれませんし。"
10004040-10 = "あ、この「桃源郷」はお茶だけでなく、お菓子も美味しいんですよ。例えばあの抹茶味の月餅は……"
10004040-11 = "[s] \"うーん、確かに美味しそうだけど……。\""
10004040-16 = "あれ、先生？"
10004040-17 = "こんなところでお会いするなんて、珍しいですね。"
10004040-18 = "（うっ、また誰か来ました……せっかくの先生との時間が……）"
10004040-19 = "[s1] \"久しぶり、キリノ。確かにここで会うのは珍しいね。\"\n[s2] \"ヴァルキューレならともかく、どうして山海経の自治区に？\""
10004040-20 = "あ、本日はちょっと用事と言いますか。"
10004040-21 = "あ、本日はちょっと用事と言いますか。"
10004040-22 = "実は……警備局の方から、気になる噂を聞きまして！"
10004040-23 = "[s] \"噂……？\""
10004040-25 = "山海経の生徒会「玄龍門」と、商人たちの連合「玄武商会」。この二つのグループについては、先生もご存知ですよね？"
10004040-26 = "[s] \"少しくらいなら、だけど。\""
10004040-27 = "この二つは、山海経を代表する大きなグループなのですが、お互いに目の敵にしている部分があります。山海経の発展のためには互いが邪魔であると考え、どこかのタイミングで打って出ようと機会を伺っていたようなのです。"
10004040-28 = "そしてこの間、警備局の同期から聞いた極秘情報によると……"
10004040-29 = "出所不明の銃器が、大量に山海経自治区へと流れ込んだそうで……！"
10004040-30 = "つまり……もしかしたら近いうちに、玄龍門と玄武商会の間で大規模な抗争が起こるかもしれません。"
10004040-31 = "[s3] \"それは穏やかじゃないね……。\"\n[s4] \"そんな大事な情報、言っても大丈夫なの……？\""
10004040-32 = "あ……えっと、"
10004040-33 = "あ……えっと、"
10004040-34 = "これは秘密ということでお願いします！"
10004040-35 = "と、とにかく、たくさんの生徒たちが行き来するこの繁華街のような場所で、大規模な暴力事件が発生する可能性があります……そうとなれば、ヴァルキューレ警察学校の生徒としてジッとはしていられません。"
10004040-36 = "それに、私が玄龍門と商会の抗争を阻止できれば、上層部の方々も私の能力を認めてくれるはずです！"
10004040-37 = "そうすれば、警備局へ転科できる可能性も……！"
10004040-38 = "[s5] \"危なそうだから、本当に無茶はしないでね。\"\n[s6] \"あんまり無茶はしないでね。\""
10004040-39 = "はい！ありがとうございます、先生！しかし危険だとしても、市民の安全のために戦うのは警察としての義務ですから！"
10004040-40 = "はい！ありがとうございます、先生！しかし危険だとしても、市民の安全のために戦うのは警察としての義務ですから！"
10004040-41 = "それにしても、先生の方はどうしてこちらに？お仕事の合間にお茶を飲んでひと休憩、といったところでしょうか？"
10004040-42 = "[s] シュンのことを聞いてみる。"
10004040-43 = "ああ、あの梅花園の。背が高い、教官をされてる生徒さんですよね？うーん、申し訳ないのですが、この辺りでは本官は見ていませんね……。"
10004040-44 = "おっと、こちらへのご挨拶が遅くなりました……えっと、こんにちは。初めまして。先生、こちらの小さな生徒さんは？"
10004040-45 = "[s] 今まであったことを説明する。"
10004040-46 = "なるほど、そういうことでしたらお手伝いしますよ。元々この辺りのパトロールをしようと思っておりましたので。"
10004040-47 = "こちらのシュエリンちゃんも、そのまま梅花園まで送りましょう。"
10004040-48 = "お任せください、迷子の面倒を見るのも、生活安全局の大事な職務の一つですから！"
10004040-49 = "[s] \"じゃあ、お願いしようかな……？\""
10004040-51 = "え、えっ……？"
10004040-54 = "（何なんですか、このヴァルキューレの方は！せっかくの先生との時間を……！）"
10004040-55 = "（それに先ほど一度挨拶してくれたとはいえ、終始先生とふたりでずっと仲良く話して……何だかモヤっとします！）"
10004040-56 = "（恨みがあるわけではありませんが、この場は一旦どいていただきましょう……！）"
10004040-59 = "あっ、あそこに大量の銃火器で武装した玄龍門の幹部さんがー！？"
10004040-60 = "なっ！？本当に抗争が！？"
10004040-61 = "申し訳ありません、先生！こちらの対処を優先させてください！"
10004040-63 = "キリノ、出動します！"
10004040-68 = "頑張ってください、お勤めご苦労様です～。"
10004040-73 = "さて、気を取り直して、ゆっくりお茶でも楽しみましょうか？"
10004040-79 = "もしかして私、騙されました！？"
10004040-80 = "あら、早かったですね警察のお姉ちゃん。いえ、正確には警察学校のお姉ちゃん、ですかね？"
10004040-81 = "シュエリンさん！？色んな生徒さんたちに聞きましたが、特に銃火器を大量に抱えた玄龍門の幹部はいませんでしたよ……！？"
10004040-83 = "まさかと思いますが、嘘を……！？警察に嘘をつくと、公務執行妨害に当たるんですよ！犯罪です！"
10004040-84 = "でも……シュエリンは本当に、玄龍門のお姉ちゃんを見たと思ったんです……。"
10004040-85 = "か、勘違いだったら、ごめんなさい……私、犯罪者なんでしょうか……？"
10004040-87 = "うっ……！？"
10004040-89 = "……失礼しました、誰にでも勘違いはあります。ましてや小さい子がちょっと勘違いをしたからといって怒るのは、良くありません……。"
10004040-91 = "とにかく、何も無かったのなら何よりです。さあ、一緒に梅花園へ――"
10004040-92 = "あっ、今度は刃物を持った玄武商会のお姉ちゃんたちがーーー！？"
10004040-94 = "今度こそ抗争ですか！？"
10004040-96 = "キリノ、出動しますっ！"
10004040-100 = "警察のお姉ちゃんは純粋ですね。"
10004040-101 = "さあ、先生。この豆餅美味しいですよ。とってもお茶に合います！"
10004040-106 = "誰もいませんでした……。"
10004040-107 = "二回も見間違いなんてありますでしょうか！？今度こそもしかして意図的に嘘を……！？"
10004040-109 = "あの、警察のお姉ちゃん。"
10004040-110 = "……今度は何ですか？"
10004040-111 = "あそこの悪いお姉ちゃんたちが、店員さんをいじめてます。"
10004040-112 = "なっ……！い、いや、本官はそう何度も引っ掛かりません！今度こそ……！"
10004040-117 = "何だこの店はっ！！"
10004040-118 = "苦いお茶ばっかりじゃねぇか！タピオカミルクティーはどこだよ！？"
10004040-119 = "その、ここは老舗の茶屋でして、ミルクティーのようなメニューはご用意しておらず……。"
10004040-120 = "あぁん！？そんなんじゃ時代に置いてかれんぞ！？"
10004040-121 = "うちらは今、クレープとタピオカミルクティーが欲しいんだよ！！"
10004040-123 = "確かに今回は本当ですね！？"
10004040-124 = "そこ！市民の安全を脅かす行為は、本官が許しませんよ！"
