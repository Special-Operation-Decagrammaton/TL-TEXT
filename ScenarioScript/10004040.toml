[translation]
10004040-1 = "Episódio 4; Onde a seriedade veste uniforme"
10004040-2 = "Shanhaijing - \"Taoyuanxiang\""
10004040-3 = "Este é um chá chamado \"Taoyuanxiang\", uma casa de chá bastante famosa até mesmo em Shanhaijing!"
10004040-4 = "As alunas de Shanhaijing costumam vir aqui para tomar chá, como se fosse um café após as refeições."
10004040-5 = "O chá daqui contém muitos ingredientes bons para ajudar na digestão de comidas gordurosas."
10004040-6 = "Ainda não é tão famoso quanto a \"Momoyodou\" de Hyakkiyako, mas acho que não perde em nada no sabor e no aroma do chá! Com certeza é o melhor de Kivotos!"
10004040-7 = "[s] \"Será que a Shun está aqui?\""
10004040-8 = "I-isso eu não sei dizer..."
10004040-9 = "Por enquanto, vamos esperar tomando um chá. Talvez a irmã Shun venha a esta loja ou passe por aqui por acaso."
10004040-10 = "Ah, este \"Taoyuanxiang\" não serve apenas chá, os doces também são deliciosos. Por exemplo, aquele bolo lunar de matcha é..."
10004040-11 = "[s] \"Hmm, parece delicioso, mas...\""
10004040-16 = "Ué, Sensei?"
10004040-17 = "Que raro encontrar o senhor em um lugar como este."
10004040-18 = "(Ah, não, alguém veio de novo... meu tempo precioso com o Sensei...)"
10004040-19 = "[s1] \"Quanto tempo, Kirino. Realmente é raro nos encontrarmos aqui.\"\n[s2] \"Tudo bem Valkyrie, mas por que na zona autônoma de Shanhaijing?\""
10004040-20 = "Ah, hoje eu tenho um pequeno assunto para tratar, por assim dizer."
10004040-21 = "Ah, hoje eu tenho um pequeno assunto para tratar, por assim dizer."
10004040-22 = "Na verdade... ouvi um boato preocupante vindo do Departamento de Segurança!"
10004040-23 = "[s] \"Boato...?\""
10004040-25 = "O conselho estudantil de Shanhaijing, \"Genryumon\", e a união de mercadores, \"Genbu Shokai\". O senhor conhece esses dois grupos, não conhece?"
10004040-26 = "[s] \"Conheço um pouco, sim.\""
10004040-27 = "Esses dois são os maiores grupos que representam Shanhaijing, mas eles se veem como inimigos mortais. Eles acreditam que o outro é um obstáculo para o desenvolvimento de Shanhaijing e parecem estar esperando a oportunidade certa para atacar."
10004040-28 = "E, de acordo com uma informação ultrassecreta que ouvi de um colega do Departamento de Segurança..."
10004040-29 = "Uma grande quantidade de armas de fogo de origem desconhecida entrou na zona autônoma de Shanhaijing...!"
10004040-30 = "Ou seja... é possível que um conflito em larga escala ocorra entre a Genryumon e a Genbu Shokai em breve."
10004040-31 = "[s3] \"Isso não é nada bom...\"\n[s4] \"Você pode mesmo falar sobre uma informação tão importante assim...?\""
10004040-32 = "Ah... bem,"
10004040-33 = "Ah... bem,"
10004040-34 = "Por favor, mantenha isso em segredo!"
10004040-35 = "De qualquer forma, existe a possibilidade de um incidente violento em larga escala ocorrer nesta área comercial, onde muitas alunas circulam... Sendo assim, como aluna da Academia de Polícia Valkyrie, não posso ficar parada."
10004040-36 = "Além disso, se eu conseguir impedir o conflito entre a Genryumon e a associação comercial, os superiores certamente reconhecerão minha capacidade!"
10004040-37 = "Se isso acontecer, talvez eu consiga ser transferida para o Departamento de Segurança...!"
10004040-38 = "[s5] \"Parece perigoso, então não faça nada imprudente.\"\n[s6] \"Não faça nada muito imprudente, viu?\""
10004040-39 = "Sim! Obrigada, Sensei! Mas, mesmo que seja perigoso, lutar pela segurança dos cidadãos é o meu dever como policial!"
10004040-40 = "Sim! Obrigada, Sensei! Mas, mesmo que seja perigoso, lutar pela segurança dos cidadãos é o meu dever como policial!"
10004040-41 = "Mas, Sensei, por que o senhor está aqui? Veio tomar um chá para descansar um pouco entre o trabalho?"
10004040-42 = "[s] Perguntar sobre a Shun."
10004040-43 = "Ah, aquela do Plum Blossom Garden. A aluna alta que trabalha como instrutora, certo? Hmm, sinto muito, mas não a vi por aqui..."
10004040-44 = "Ah, peço desculpas pela demora em me apresentar... bem, olá. Prazer em conhecê-lo. Sensei, quem é esta aluna pequena?"
10004040-45 = "[s] Explicar o que aconteceu até agora."
10004040-46 = "Entendo, se é esse o caso, eu ajudarei. Eu já pretendia patrulhar esta área de qualquer forma."
10004040-47 = "Também levaremos a pequena Xuelin de volta ao Plum Blossom Garden."
10004040-48 = "Pode deixar comigo, cuidar de crianças perdidas também é um dos deveres importantes do Departamento de Segurança Pública!"
10004040-49 = "[s] \"Então, posso pedir esse favor...?\""
10004040-51 = "E-eh...?"
10004040-54 = "(O que essa pessoa da Valkyrie pensa que está fazendo! Meu tempo com o Sensei...!)"
10004040-55 = "(E mesmo que ela tenha se apresentado agora, ela ficou conversando alegremente com o Sensei o tempo todo... estou me sentindo incomodada!)"
10004040-56 = "(Não que eu tenha rancor, mas vou fazer com que ela saia daqui agora mesmo...!)"
10004040-59 = "Ah, ali está um dos executivos da Genryumon armado com um monte de armas de fogo!?"
10004040-60 = "O quê!? O conflito começou mesmo!?"
10004040-61 = "Sinto muito, Sensei! Por favor, deixe-me priorizar esta situação!"
10004040-63 = "Kirino, entrando em ação!"
10004040-68 = "Boa sorte, e obrigado pelo seu trabalho árduo~."
10004040-73 = "Bem, vamos nos recompor e aproveitar um chá com calma, que tal?"
10004040-79 = "Será que eu fui enganada!?"
10004040-80 = "Ora, você foi rápida, policial. Ou melhor, devo dizer, aluna da Academia de Polícia?"
10004040-81 = "Xuelin!? Perguntei para vários alunos, mas não havia nenhum executivo da Genryumon carregando uma grande quantidade de armas de fogo...!?"
10004040-83 = "Não me diga que você mentiu...!? Mentir para a polícia é obstrução de justiça! É um crime!"
10004040-84 = "Mas... a Xuelin realmente achou que viu a moça da Genryumon..."
10004040-85 = "S-se foi um mal-entendido, me desculpe... Será que eu sou uma criminosa...?"
10004040-87 = "Ugh...!?"
10004040-89 = "...Peço desculpas, qualquer um pode se enganar. E não é certo ficar brava só porque uma criança se confundiu um pouco..."
10004040-91 = "De qualquer forma, fico feliz que não tenha acontecido nada. Vamos, vamos para o Jardim Meika juntos—"
10004040-92 = "Ah, agora são as moças da Associação Genbu segurando lâminas—!?"
10004040-94 = "Desta vez é um conflito de verdade!?"
10004040-96 = "Kirino, entrando em ação!"
10004040-100 = "A policial é bem ingênua."
10004040-101 = "Vamos, Sensei. Este bolinho de feijão é delicioso. Combina muito bem com o chá!"
10004040-106 = "Não havia ninguém..."
10004040-107 = "Será que é possível se enganar duas vezes!? Desta vez, será que ela mentiu de propósito...!?"
10004040-109 = "Com licença, policial."
10004040-110 = "...O que é agora?"
10004040-111 = "Aquelas moças más ali estão intimidando o atendente."
10004040-112 = "O quê...! N-não, esta oficial não vai cair nessa de novo! Desta vez..."
10004040-117 = "Que tipo de loja é essa!!"
10004040-118 = "Só tem chá amargo aqui! Cadê o chá de bolhas com tapioca!?"
10004040-119 = "Bem, esta é uma casa de chá tradicional, então não servimos itens como chá com leite..."
10004040-120 = "Ah, é!? Desse jeito vocês vão ficar para trás no tempo, sabia!?"
10004040-121 = "A gente quer crepe e chá de bolhas agora mesmo!!"
10004040-123 = "Desta vez é verdade mesmo, não é!?"
10004040-124 = "Ei, vocês! Esta oficial não vai permitir atos que ameacem a segurança dos cidadãos!"
