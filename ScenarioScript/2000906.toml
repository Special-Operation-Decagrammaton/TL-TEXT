[translation]
2000906-1 = "牛乳製の権威"
2000906-2 = "温泉から上がって、旅館の売店前に向かうと……。"
2000906-3 = "なるほど。頭の中がモヤモヤしている時に温泉に入るというのは、思ったより悪くないな。"
2000906-4 = "モヤモヤが消えて、心が青空のように澄み渡る気持ちに……。"
2000906-5 = "これが修行者たちが言う、「無我の境地」というものか。"
2000906-6 = "おいらは元々偉大だったが、まさか大人の階段を越えて聖者の階段まで一気に登ることになるとは……。"
2000906-7 = "ものすごい速度の精神的成長、自分でも恐ろしいくらいだ。"
2000906-8 = "[s] \"そしたらフルーツ牛乳はもう要らない？\""
2000906-9 = "そんなわけあるか！"
2000906-10 = "精神的な成長と、美味しいものが欲しいという気持ちは完全に別物！"
2000906-11 = "早くそのフルーツ牛乳をくれ！"
2000906-17 = "[ns] チェリノにフルーツ牛乳を渡す。"
2000906-18 = "ふむ。フルーツ牛乳とは普通の白い牛乳と違って、甘い香りがするものなんだな。"
2000906-19 = "どれどれ……。"
2000906-26 = "[wa:250]― [log=체리노 온천ND]んくっ、[wa:800]んくっ……[wa:640]ぷはぁ～！[/log]"
2000906-30 = "[wa:500]― [log=체리노 온천ND]お風呂上がりの[wa:780]フルーツ牛乳……[/log]"
2000906-32 = "― [log=체리노 온천ND]これは素晴らしいな！[/log]"
2000906-35 = "[wa:550]― [log=체리노 온천ND]うん？[wa:1000]どうかしたのか、[wa:710]カムラッド？[/log]"
2000906-37 = "― [log=체리노 온천ND]おいらの顔に[wa:1260]何かついてるか？[/log]"
2000906-40 = "[wa:470]― [log=체리노 온천ND]……[wa:340]なに？[wa:1130]口の周りに[wa:1500]髭みたいな痕が……！？[/log]"
2000906-43 = "[wa:160]― [log=체리노 온천ND]うおぉ、[wa:610]本当だ！？[/log]"
2000906-45 = "― [log=체리노 온천ND]牛乳を飲んだだけなのに、[wa:1740]こんなに素晴らしい髭が！[/log]"
2000906-48 = "― [log=체리노 온천ND]こんなに美味しい飲み物なのに、[/log]"
2000906-50 = "― [log=체리노 온천ND]新しい髭まで手に入るとは……[/log]"
2000906-53 = "[wa:180]― [log=체리노 온천ND]素晴らしい！[wa:1160]カムラッド、[wa:730]もっとだ！[/log]"
2000906-55 = "― [log=체리노 온천ND]もっとこのフルーツ牛乳を[wa:1660]たくさん取ってきてくれ！[/log]"
2000906-58 = "ん？あれ、髭が消えた……？"
2000906-59 = "まあ良いか、どうやらフルーツ牛乳を飲むたびに新しくできるみたいだからな！"
2000906-60 = "これならば外れて落ちる心配も、汚す心配も無い……"
2000906-61 = "よし！これからはずっと、休まずフルーツ牛乳を飲み続けることにしよう！"
2000906-63 = "その後チェリノは、10本以上のフルーツ牛乳を飲んでお腹を壊してしまったのだった。"
