[translation]
2000906-1 = "A autoridade do leite"
2000906-2 = "Depois de sair da fonte termal, fui em direção à loja da pousada..."
2000906-3 = "Entendo. Entrar em uma fonte termal quando a cabeça está confusa não é tão ruim quanto eu pensava."
2000906-4 = "A confusão desapareceu e sinto como se meu coração estivesse límpido como um céu azul..."
2000906-5 = "Seria isso o que os praticantes chamam de \"estado de desapego\"?"
2000906-6 = "Eu já era grandiosa por natureza, mas não esperava subir os degraus da maturidade e chegar ao nível de uma santa de uma vez só..."
2000906-7 = "Um crescimento espiritual em uma velocidade incrível, até eu mesma me sinto assustada."
2000906-8 = "[s] \"Então você não quer mais o leite com frutas?\""
2000906-9 = "Claro que quero!"
2000906-10 = "Crescimento espiritual e o desejo por algo delicioso são coisas completamente diferentes!"
2000906-11 = "Me dê logo esse leite com frutas!"
2000906-17 = "[ns] Entrega o leite com frutas para Cherino."
2000906-18 = "Hum. Então o leite com frutas é diferente do leite branco comum, ele tem um aroma doce."
2000906-19 = "Vejamos..."
2000906-26 = "[wa:250]― [log=체리노 온천ND]Gole, [wa:800]gole... [wa:640]ahhh! [/log]"
2000906-30 = "[wa:500]― [log=체리노 온천ND]Leite com frutas [wa:780]depois do banho... [/log]"
2000906-32 = "― [log=체리노 온천ND]Isso é maravilhoso! [/log]"
2000906-35 = "[wa:550]― [log=체리노 온천ND]Hm? [wa:1000]Aconteceu alguma coisa, [wa:710]camarada? [/log]"
2000906-37 = "― [log=체리노 온천ND]Tem algo [wa:1260]no meu rosto? [/log]"
2000906-40 = "[wa:470]― [log=체리노 온천ND]... [wa:340]O quê? [wa:1130]Uma marca parecida com um bigode [wa:1500]ao redor da boca...!? [/log]"
2000906-43 = "[wa:160]― [log=체리노 온천ND]Uau, [wa:610]é verdade!? [/log]"
2000906-45 = "― [log=체리노 온천ND]Eu só bebi leite, [wa:1740]mas ganhei um bigode tão magnífico! [/log]"
2000906-48 = "― [log=체리노 온천ND]É uma bebida tão deliciosa, [/log]"
2000906-50 = "― [log=체리노 온천ND]e ainda por cima ganhei um bigode novo... [/log]"
2000906-53 = "[wa:180]― [log=체리노 온천ND]Incrível! [wa:1160]Camarada, [wa:730]traga mais! [/log]"
2000906-55 = "― [log=체리노 온천ND]Traga [wa:1660]muito mais desse leite com frutas para mim! [/log]"
2000906-58 = "Hm? Ué, o bigode sumiu...?"
2000906-59 = "Bem, não importa, parece que ele aparece toda vez que eu bebo leite com frutas!"
2000906-60 = "Dessa forma, não preciso me preocupar em ele cair ou sujar nada..."
2000906-61 = "Certo! De agora em diante, vou beber leite com frutas sem parar!"
2000906-63 = "Depois disso, Cherino bebeu mais de 10 garrafas de leite com frutas e acabou passando mal do estômago."
