[translation]
80000082-1 = "超天才清楚系病弱美少女ハッカーの分身"
80000082-2 = "息継ぎNG・円周率暗唱部"
80000082-3 = "（いつも通り「隠れ家でお待ちしております」と連絡を受けて、部室を訪ねた）"
80000082-4 = "ふふ、お待ちしておりました、先生。"
80000082-5 = "本日も時間通りのご到着で。#nこの超天才美少女に、そこまで会いたかったのですね？"
80000082-6 = "[s] \"急ぎの用かもしれないなと思って……何か起きたの？\""
80000082-7 = "あらあら。"
80000082-8 = "ふふっ、分かっているのに知らない振りなんて……まあ、それも仕方ありませんね。#n好きな相手にはやはり、意地悪したくなるもの。"
80000082-9 = "今日が何の日なのか……"
80000082-10 = "先生も、ご存じなのではありませんか？"
80000082-11 = "[s1] \"バレンタインデー、だよね？\"\n[s2] \"ヒマリと過ごせる特別な日だね。\""
80000082-12 = "ええ、その通りです。"
80000082-13 = "私が先生をお呼びしたのは、そのため。"
80000082-14 = "ふふ、その通りです。"
80000082-15 = "私と過ごす、特別な――"
80000082-16 = "……はい？"
80000082-17 = "[s3] \"だからこそ、急いで来たんだ。\""
80000082-18 = "そ、そう事もなげに……"
80000082-19 = "まったく……今日は意地悪ですね？"
80000082-20 = "と、とにかく……"
80000082-21 = "本日は、バレンタインデー。"
80000082-22 = "その意味を、今さら説明する必要はありませんよね？"
80000082-23 = "どうぞ。先生のために用意した、「私の」チョコレートです。"
80000082-28 = "[ns] \"これって……ヒマリ？"
80000082-29 = "ふふっ、如何にも。"
80000082-30 = "この私、超天才清楚系病弱美少女ハッカー「[ruby=あけぼし]明星[/ruby]ヒマリ」の隠しきれない魅力で溢れた……"
80000082-31 = "特製の立体SDチョコレートです！"
80000082-32 = "さあ、どうぞ。"
80000082-33 = "受け取っていただけますよね？"
80000082-34 = "[s] \"もちろん。ありがとう、ヒマリ。\""
80000082-35 = "ふふっ、喜んでくださって良かったです。"
80000082-36 = "一年に一度のバレンタインですから、ここは私の力を発揮する時かと思いまして。"
80000082-37 = "この私が自ら3Dプリンターで設計した、手作りのチョコレートです。"
80000082-38 = "[s] \"なるほど、そういう作り方が……。\""
80000082-39 = "えっへん。ちなみに、これは単なるデフォルメではありません。"
80000082-40 = "近くで見ていただければ、お分かりになるかと思いますが……"
80000082-41 = "髪飾りなどの細かい部分まで、質感に拘って表現してみました。"
80000082-42 = "ふふふっ。このヴェリタスの元部長であり、特異現象捜査部の現部長である、#nこの私……"
80000082-43 = "明星ヒマリの威厳が図らずも溢れ出てしまっていますね？"
80000082-44 = "もはや、このチョコレートは私の分身も同然！"
80000082-45 = "この超天才清楚系病弱美少女ハッカーから、超天才清楚系病弱美少女ハッカーのチョコレートが貰えるだなんて……"
80000082-46 = "ふふっ、先生は本当に幸運ですね。"
80000082-47 = "[s] \"た、確かに……？\""
80000082-48 = "このチョコレートの魅力を余すことなくお伝えするには、丸一日あっても足りません。"
80000082-49 = "[s] \"そ、そっか……。\""
80000082-50 = "もちろん見た目だけでなく、味だって完璧なのですよ？"
80000082-51 = "材料に使ったカカオは、ゲヘナで取れた特別な物です。"
80000082-52 = "つまり私のように、見た目だけでなく中身も素晴らしいということです。"
80000082-53 = "[s4] \"それを聞いたら、早く食べたくなったよ。\"\n[s5] \"ヒマリがそこまで言うなら、早速ここで……\""
80000082-54 = "ふふ。はい、どうぞ遠慮なさらず。"
80000082-55 = "ふふ。はい、どうぞ遠慮なさらず。"
80000082-56 = "これでもかというほど、私の魅力が詰まったそのチョコレート……"
80000082-57 = "どうぞ、存分に味わいくださいませ。"
80000082-63 = "（ふふふっ。さあ、先生……しかとご堪能ください）"
80000082-64 = "（あまりの美味しさに驚くはずです。その私そっくりのチョコレートが、口に入った瞬間――）"
80000082-65 = "（……口に？）"
80000082-66 = "………………。"
80000082-67 = "（私の分身同然のチョコレートが……目の前で、先生の口に……！？）"
80000082-68 = "いけません！！"
80000082-69 = "[s] \"ど、どうしたの、ヒマリ？\""
80000082-70 = "少々お待ちを！#nストップです！"
80000082-71 = "[s] \"でも、さっき食べて感想を、って……。\""
80000082-72 = "それは……"
80000082-73 = "やはりキャンセル！クーリングオフです！"
80000082-74 = "[s] \"ど、どうして急に……？\""
80000082-75 = "どうしてもこうしてもありません！"
80000082-76 = "突然のことではありますが、至って論理的な判断……"
80000082-77 = "合理的な結論ですとも、はい！"
80000082-78 = "とにかく、早く箱に戻して……！"
80000082-79 = "せめて、シャーレに戻ってから召し上がってください！"
80000082-80 = "[s] \"りょ、了解……。\""
80000082-81 = "感想は後日！"
80000082-82 = "レポート形式で、よろしくお願いします！"
80000082-83 = "[s] \"ハードルが高い！？\""
80000082-84 = "では、今日のところはこれで！"
80000082-86 = "（慌ただしく部室を後にして、シャーレへと戻った）"
80000082-87 = "（チョコレートはヒマリが言っていた通り、とても美味しかった）"
