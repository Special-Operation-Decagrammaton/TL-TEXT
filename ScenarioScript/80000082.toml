[translation]
80000082-1 = "O alter ego da super gênio, pura, frágil e bela hacker"
80000082-2 = "Clube de Recitação de Pi sem Pausa para Respirar"
80000082-3 = "（Como sempre, recebi uma mensagem dizendo \"Estou esperando no esconderijo\", então visitei a sala do clube）"
80000082-4 = "Fufu, eu estava esperando por você, Sensei."
80000082-5 = "Chegou pontualmente como sempre. #nVocê queria tanto assim ver esta super gênio, não é?"
80000082-6 = "[s] \"Pensei que pudesse ser algo urgente... Aconteceu alguma coisa?\""
80000082-7 = "Ora, ora."
80000082-8 = "Fufu, fingir que não sabe de nada mesmo sabendo... Bem, não posso te culpar. #nAfinal, a gente sempre quer provocar um pouco a pessoa que gosta."
80000082-9 = "Que dia é hoje..."
80000082-10 = "Você não sabe, Sensei?"
80000082-11 = "[s1] \"É o Dia dos Namorados, né?\"\n[s2] \"É um dia especial para passar com a Himari.\""
80000082-12 = "Sim, exatamente."
80000082-13 = "Foi por isso que chamei você, Sensei."
80000082-14 = "Fufu, exatamente."
80000082-15 = "Um momento especial para passar comigo..."
80000082-16 = "…Sim?"
80000082-17 = "[s3] \"É por isso que vim correndo.\""
80000082-18 = "V-você diz isso com tanta naturalidade..."
80000082-19 = "Sério... você está sendo provocador hoje, não está?"
80000082-20 = "B-bem, de qualquer forma..."
80000082-21 = "Hoje é o Dia dos Namorados."
80000082-22 = "Não preciso explicar o significado disso agora, preciso?"
80000082-23 = "Aqui está. Este é o \"meu\" chocolate, preparado especialmente para você, Sensei."
80000082-28 = "[ns] \"Isso é... a Himari?\""
80000082-29 = "Fufu, exatamente."
80000082-30 = "Transbordando com o charme inegável desta super gênio, pura, frágil e bela hacker, \"Akeboshi Himari\"..."
80000082-31 = "É um chocolate especial em SD 3D!"
80000082-32 = "Vamos, pegue."
80000082-33 = "Você vai aceitar, não vai?"
80000082-34 = "[s] \"Claro. Obrigado, Himari.\""
80000082-35 = "Fufu, fico feliz que tenha gostado."
80000082-36 = "Como o Dia dos Namorados só acontece uma vez por ano, pensei que era a hora de mostrar todo o meu potencial."
80000082-37 = "É um chocolate artesanal que eu mesma projetei usando uma impressora 3D."
80000082-38 = "[s] \"Entendo, então foi assim que você fez...\""
80000082-39 = "Ehem. Aliás, isso não é apenas uma versão deformada."
80000082-40 = "Se você olhar de perto, acho que vai entender..."
80000082-41 = "Tentei focar na textura até nos detalhes mais minuciosos, como o acessório de cabelo."
80000082-42 = "Fufufu. Eu, a ex-chefe do Veritas e atual chefe do Departamento de Investigação de Fenômenos Estranhos, #nesta que vos fala..."
80000082-43 = "A dignidade de Akeboshi Himari acabou transbordando sem querer, não é?"
80000082-44 = "Este chocolate é praticamente o meu alter ego!"
80000082-45 = "Receber um chocolate da super gênio, pura, frágil e bela hacker, feito pela própria super gênio, pura, frágil e bela hacker..."
80000082-46 = "Fufu, você é realmente sortudo, Sensei."
80000082-47 = "[s] \"V-verdade...?\""
80000082-48 = "Um dia inteiro não seria suficiente para explicar todo o charme deste chocolate."
80000082-49 = "[s] \"E-entendi...\""
80000082-50 = "Claro, não é só a aparência, o sabor também é perfeito, sabe?"
80000082-51 = "O cacau usado nos ingredientes é especial, vindo de Gehenna."
80000082-52 = "Ou seja, assim como eu, não é apenas bonito por fora, mas também maravilhoso por dentro."
80000082-53 = "[s4] \"Depois de ouvir isso, fiquei com vontade de comer logo.\"\n[s5] \"Já que a Himari diz isso, vou comer agora mesmo aqui...\""
80000082-54 = "Fufu. Sim, por favor, não se acanhe."
80000082-55 = "Fufu. Sim, por favor, não se acanhe."
80000082-56 = "Esse chocolate, que está repleto do meu charme, a ponto de ser inacreditável..."
80000082-57 = "Por favor, sinta-se à vontade para saboreá-lo."
80000082-63 = "(Fufufu. Vamos lá, Sensei... desfrute plenamente.)"
80000082-64 = "(Você certamente ficará surpreso com o sabor. No momento em que esse chocolate, que é a minha cara, entrar na sua boca――)"
80000082-65 = "(...Na boca?)"
80000082-66 = "………………."
80000082-67 = "(O chocolate que é como uma extensão de mim... bem diante dos meus olhos, na boca do Sensei...!?)"
80000082-68 = "Não pode ser!!"
80000082-69 = "[s] \"O-o que houve, Himari?\""
80000082-70 = "Espere um pouco! Pare agora!"
80000082-71 = "[s] \"Mas você disse para eu comer e dar minha opinião...\""
80000082-72 = "Isso é..."
80000082-73 = "Na verdade, cancele! É um arrependimento de compra!"
80000082-74 = "[s] \"P-por que de repente...?\""
80000082-75 = "Não tem porquê nem como!"
80000082-76 = "Embora tenha sido repentino, é uma decisão extremamente lógica..."
80000082-77 = "É uma conclusão racional, sim!"
80000082-78 = "De qualquer forma, coloque de volta na caixa...!"
80000082-79 = "Pelo menos, coma depois que voltar para o Schale!"
80000082-80 = "[s] \"E-entendido...\""
80000082-81 = "A opinião fica para outro dia!"
80000082-82 = "Por favor, envie em formato de relatório!"
80000082-83 = "[s] \"A exigência é alta demais!?\""
80000082-84 = "Então, por hoje é só!"
80000082-86 = "(Deixei a sala do clube apressadamente e voltei para o Schale.)"
80000082-87 = "(O chocolate, como a Himari disse, estava muito gostoso.)"
