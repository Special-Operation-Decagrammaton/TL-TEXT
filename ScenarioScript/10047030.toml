[translation]
10047030-1 = "Episódio 3: O Oculto que Habita na Arte"
10047030-2 = "(Seguindo o pessoal do \"Clube de Pesquisa Oculta...)"
10047030-4 = "Museu de Arte de Wild Hunt"
10047030-6 = "[ns] \"Este lugar é... o Museu de Arte de Wild Hunt?\""
10047030-7 = "Sim. #nAqui estão expostas inúmeras obras-primas amadas através das eras."
10047030-8 = "Não apenas as obras expostas... #nNa verdade, todo este edifício é uma obra de arte por si só."
10047030-12 = "Por favor, observem esta cúpula. #nNão acham que é uma estrutura suave e bela?"
10047030-13 = "Na época em que foi construída, a tendência eram edifícios altos para demonstrar autoridade. #nNo entanto—"
10047030-14 = "Este museu focou na \"beleza\" essencial e construiu esta cúpula!"
10047030-19 = "Vejam só esta proporção áurea! #nNão seria exagero dizer que isso é uma revolução na história da arte de Kivotos!"
10047030-20 = "[s] \"E-entendo...!\""
10047030-21 = "Fufu, vamos apenas observar."
10047030-22 = "Esse tipo de coisa... a Eri-chan é especialista, né..."
10047030-23 = "Ela vai continuar nesse ritmo o tempo todo...!?"
10047030-25 = "A seguir, observem isto! O nome é \"Imagem da Gênese\"! #nÉ a pintura mais representativa de Wild Hunt!"
10047030-26 = "Uma peça que retrata com um poder de expressão avassalador a figura de muitos fantasmas correndo em direção ao pôr do sol! #nNão é de tirar o fôlego?"
10047030-27 = "[s] \"Sim, é um toque muito impressionante.\""
10047030-28 = "No momento em que encontrei esta obra... um choque percorreu meu ser. #nUma obra-prima com uma natureza tão oculta... #ne ainda por cima, o título é \"Imagem da Gênese\"...!"
10047030-29 = "Eu também quero ser capaz de pintar obras assim... #nQue minha originalidade brilhe— e que eu crie obras que representem a academia e permaneçam para a posteridade."
10047030-33 = "...Um dia, eu farei isso acontecer."
10047030-34 = "[s] \"Estarei esperando. Quero ver quando estiver pronta.\""
10047030-35 = "Nyufufu, com certeza!"
10047030-36 = "Além disso... #nA busca pelo oculto deve ser o que leva ao nascimento de obras-primas."
10047030-37 = "[s] \"É mesmo?\""
10047030-38 = "Sim. Não é exagero dizer que a origem da arte esteve sempre junto com o oculto."
10047030-39 = "Como resultado de enfrentar existências sobrenaturais como almas, magia e fantasmas— #nApós essas reflexões, uma grande variedade de artes nasceu."
10047030-40 = "O oculto não é apenas uma fantasia. #nEle já está profundamente enraizado em nossa cultura e no nosso cotidiano!"
10047030-41 = "O que expressa isso é a obra \"Imagem da Gênese\"."
10047030-42 = "A pintura que retrata fantasmas é considerada a obra representativa da academia. #nOu seja! É natural pensar que a origem da academia está ligada ao oculto!"
10047030-43 = "E há mais motivos para eu ter chegado a essa conclusão...!"
10047030-44 = "Ao lado da \"Imagem da Gênese\", há uma estátua, certo? #nPara onde aquela estátua aponta... #nexiste uma antiga torre de sino proibida."
10047030-45 = "Já esquecida pelas memórias de todos, ninguém mais lembra o seu nome. #nSobre aquele \"Sino Sem Nome\", existe uma lenda..."
10047030-46 = "É... \"No dia da destruição, o sino começará a cantar sozinho\"."
10047030-47 = "A procissão de fantasmas e o sino que canta a destruição...! #nNão posso acreditar que isso seja coincidência!"
10047030-48 = "[s] \"Talvez eu esteja começando a achar que sim...?\""
10047030-49 = "E tem mais! É uma história passada de geração em geração, mas... #nSe você conectar as principais instalações de Wild Hunt com linhas... #nDizem que forma um \"círculo mágico\"!"
10047030-50 = "Dizem que, se você completar isso em uma noite de lua cheia, algo incrível acontece!"
10047030-51 = "[s] \"Oh...!\""
10047030-52 = "Além disso, estátuas que choram sangue, retratos que inclinam a cabeça— #num piano que começa a tocar sozinho... existem todos os tipos de #nelementos ocultos por toda a academia, mas—"
10047030-53 = "—Na verdade! Neste museu também existe uma estátua de demônio que se move!"
10047030-54 = "Já entenderam, né? #nQue existe uma conexão estreita entre \"arte\" e \"oculto\"... #né um fato comprovado!"
10047030-55 = "...Essa parte final é quase uma lenda urbana."
10047030-56 = "Fufu, as histórias da Eri são sempre maravilhosas."
10047030-57 = "...Espere, alguém está vindo."
10047030-64 = "Ué? Eri-chan, olá!"
10047030-65 = "Alô!"
10047030-66 = "Ah..."
10047030-67 = "Hm...? Aquele ali é um convidado? É a primeira vez que nos vemos, né?"
10047030-68 = "É-é o Sensei do Schale!"
10047030-73 = "[ns] \"Olá.\""
10047030-75 = "Prazer em conhecê-lo, Sensei!#nEstá fazendo um tour com a Eri-chan e as outras?"
10047030-76 = "Olá para vocês também."
10047030-81 = "Sinto um pouco de solidão.#nA Eri-chan não brinca muito com a gente."
10047030-82 = "Ah, não...! E-eu não tinha essa intenção...!"
10047030-83 = "Ahaha, brincadeira, brincadeira! Eu sei disso."
10047030-84 = "É só que eu queria te ver mais fora da sala de aula.#nVamos brincar de vez em quando."
10047030-85 = "A-auuu... O-o que eu deveria responder numa hora dessas...?"
10047030-90 = "Isso...! É nessas horas que a orientação dos arcanos..."
10047030-94 = "Ahaha... Acho que vou pedir uma leitura de sorte em outra hora."
10047030-95 = "Bem, já vou indo. Até mais!"
10047030-96 = "Da próxima, vamos tomar um chá?"
10047030-97 = "S-sim! E-estarei esperando ansiosamente!!"
10047030-103 = "[ns1] \"Hmm...\"\n[ns2] \"Por acaso aconteceu alguma coisa com aquelas garotas?\""
10047030-106 = "N-não! Nada em especial!"
10047030-107 = "Todas são muito gentis... Se há algum problema, é comigo, ou melhor..."
10047030-111 = "A-ahahah! E-esse assunto fica para outra hora..."
10047030-112 = "[ns] (Parece que há um motivo, é melhor não perguntar mais nada)"
10047030-113 = "Ahaha... Desculpe, é por minha causa."
10047030-117 = "……Certo, vamos fazer \"aquilo\". Ihi."
10047030-118 = "……Ah, \"aquilo\"?"
10047030-122 = "Vamos fazer de novo...!? Eu não quero!"
10047030-123 = "[ns] \"O que exatamente vocês vão...?\""
10047030-124 = "Se você fizer... vai entender..."
10047030-129 = "Vamos começar, pessoal. Sensei também... venha."
10047030-130 = "Sim...!"
10047030-136 = "……Chegamos."
10047030-137 = "[ns] \"Ué? Não é o mesmo lugar de antes?\""
10047030-138 = "Embora pareça o mesmo lugar, ele já se transformou em um espaço dimensional diferente."
10047030-139 = "Agora, nós... realizamos um \"ritual\"."
10047030-140 = "Caminhar pelo museu desenhando um círculo――#neste ato existe um significado mágico."
10047030-141 = "[s] \"Que tipo de significado...?\""
10047030-142 = "……Podemos conversar com este demônio!"
10047030-146 = "Esta estátua de demônio foi presenteada a Trinity há muito tempo.#nEla tem o significado de um \"amuleto\", para afastar outros demônios."
10047030-147 = "Ela ficou exposta na Catedral de Trinity por muito tempo...#nmas agora é administrada aqui como um bem cultural."
10047030-148 = "Se for um demônio com uma linhagem tão nobre...#ncom certeza ele responderá ao nosso chamado!"
10047030-149 = "Ihi... Mugi-chan, vamos começar."
10047030-150 = "Sim. Vamos chamar o demônio――!"
10047030-158 = "EU SOU A TERRORISTA DA ARTE!!!"
10047030-159 = "Ontem foram as pinturas!!!#nHoje me tornarei a governante da literatura!!!"
10047030-163 = "WOEEEEEEEEEEEEEEEEEEEEEEEEEEEE!!!!"
10047030-165 = "Uau...!#nO death voice da Tsumugi é maravilhoso, não importa quantas vezes eu ouça."
10047030-166 = "É hora de se emocionar!?"
10047030-167 = "[ns] \"S-sério que dá para falar com o demônio assim?\""
10047030-168 = "Com certeza! Olhe aquilo!"
10047030-172 = "(A posição da estátua do demônio mudou)"
10047030-173 = "Ihi... Nós não a movemos..."
10047030-174 = "Como esperado, o demônio realmente existe...!"
10047030-175 = "Esquece isso, vamos fugir logo!"
10047030-176 = "Se a gente ficar fazendo barulho aqui, vai dar ruim!"
10047030-177 = "De fato, se continuarmos assim, seremos atacados pelos \"seres abomináveis\" que a estátua do demônio invocará!"
10047030-181 = "[ns] \"O ser abominável...?\""
10047030-183 = "Concordo. É bom se divertir, mas saber a hora de parar também é importante."
10047030-184 = "……Vamos nos apressar."
10047030-195 = "(Foi algo repentino, mas a estátua do demônio realmente se moveu)"
10047030-196 = "(E o que seria esse \"ser abominável\"...)"
10047030-200 = "[ns] \"O que será que está acontecendo nesta academia...?\""
