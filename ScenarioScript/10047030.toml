[translation]
10047030-1 = "第3話;芸術に宿るオカルト"
10047030-2 = "（「オカ研」のみんなについて行くと……）"
10047030-4 = "ワイルドハント美術館"
10047030-6 = "[ns] \"ここは……ワイルドハントの美術館？\""
10047030-7 = "はい。#n時代を超えて愛される、傑作の数々が展示されています。"
10047030-8 = "展示作品だけでなく……#n実は、この建物全体も一つのアートなんです。"
10047030-12 = "こちらのドームをご覧ください。#nなだらかな美しい造形だとは思いませんか？"
10047030-13 = "これが作られた当時は、権威を示すための高層建築が主流でした。#nそんな中――"
10047030-14 = "この美術館は本質的な「美」に着目し、このドームを建てたのです！"
10047030-19 = "見てください、この黄金比を！#nこれぞ、キヴォトス芸術史における革命といっても過言ではないでしょう！"
10047030-20 = "[s] \"な、なるほど……！\""
10047030-21 = "ふふ、私たちは見守るとしましょうか。"
10047030-22 = "こういうの……エリちゃんが得意だからねぇ……。"
10047030-23 = "ずっとこのノリで行くの……！？"
10047030-25 = "次はこちらをご覧ください！その名も「創世の影像」！#nワイルドハントを代表する名画です！"
10047030-26 = "たくさんの亡霊が夕日に向かって疾走する姿を、圧倒的な表現力で描き抜いた一枚！#n目を奪われませんか？"
10047030-27 = "[s] \"うん、すごく印象的なタッチだね。\""
10047030-28 = "この作品に出会った瞬間……私の中に衝撃が走りました。#nこれほどオカルト性の強い傑作で……#nしかも題名が「創世の影像」……！"
10047030-29 = "私も、こんな作品が描けるようになりたいです……#n私のオリジナリティが光り――学院を代表するような、後世に残る作品を。"
10047030-33 = "……いつか、叶えてみせます。"
10047030-34 = "[s] \"楽しみにしてるね。完成したら見せてほしいな。\""
10047030-35 = "にゅふふ、もちろんです！"
10047030-36 = "それに……#nオカルトの追求こそ、傑作の誕生に繋がるはずですから。"
10047030-37 = "[s] \"そうなの？\""
10047030-38 = "ええ。芸術の起源は、オカルトと共にあったと言っても過言ではありません。"
10047030-39 = "魂、魔法、幽霊といった超自然的存在と向き合った結果――#nそれらの考察の末、多種多様な芸術が誕生してきたのです。"
10047030-40 = "オカルトはただの絵空事などではありません。#nすでに私たちの文化や日常に、深く根づいているのです！"
10047030-41 = "それを表しているのが、この「創世の影像」という作品。"
10047030-42 = "亡霊達を描いた絵が学院の代表作とされている。#nすなわち！学院の起源は、オカルトと結びついていると考えるのが自然でしょう！"
10047030-43 = "この考えに至った理由は、まだあります……！"
10047030-44 = "「創世の影像」の隣に、石像がありますよね？#nあちらの石像が指し示す先に……#n立入禁止の古びた[ruby=しょうとう]鐘塔[/ruby]が建っています。"
10047030-45 = "すでにみんなの記憶からは忘れられ、その名を覚えている者は誰もいない。#nあの「名もなき鐘」には、一つの伝説があるんです……。"
10047030-46 = "それは……「滅亡の日、鐘はひとり[ruby=うた]謳[/ruby]いだす」。"
10047030-47 = "亡霊の行進、そして、滅亡を謳う鐘……！#nこれは偶然とは思えません！"
10047030-48 = "[s] \"そんな気がしてきたかも……？\""
10047030-49 = "まだまだあります！古くから語り継がれている話ですが、#nワイルドハントの主要施設を線で結ぶと……#n「魔法陣」ができるそうです！"
10047030-50 = "満月の夜にこれを完成させると、ものすごいことが起きるのだとか！"
10047030-51 = "[s] \"おお……！\""
10047030-52 = "ほかにも、血の涙を流す石像や、首をかしげる人物画――#nひとりでに音を奏でだすピアノなどなど……ありとあらゆる#nオカルト要素が学院中に存在しているのですが――"
10047030-53 = "――実は！この美術館にも、動く悪魔像があるんです！"
10047030-54 = "もうお分かりですね？#n「芸術」と「オカルト」に密接な繋がりがあることは……#nもはや確定的事実だと！"
10047030-55 = "……最後の方、ほぼ都市伝説じゃん。"
10047030-56 = "ふふ、エリの語りはいつも素敵です。"
10047030-57 = "……待って、誰か来る。"
10047030-64 = "あれ？エリちゃん、やっほ～！"
10047030-65 = "ハロー！"
10047030-66 = "あっ……。"
10047030-67 = "ん……？そちらはお客さん？初めましてだよね？"
10047030-68 = "しゃっ、シャーレの先生です！"
10047030-73 = "[ns] \"こんにちは。\""
10047030-75 = "はじめまして、先生！#nエリちゃんたちと見学中ですか？"
10047030-76 = "みなさんも、こんにちは。"
10047030-81 = "なんかちょっと寂しいな。#nエリちゃん、私たちとはあんまり遊んでくれないから。"
10047030-82 = "あっ、いや……！そ、そんなつもりは……！"
10047030-83 = "あはは、冗談冗談！分かってるから。"
10047030-84 = "教室の外でも、もっと会いたいなって思っただけ。#nたまには遊んでね。"
10047030-85 = "あ、あうう……こ、こういう時はなんと答えたら……。"
10047030-90 = "そうだ……！こんなときこそアルカナの導きで……！"
10047030-94 = "あはは……占いはまた今度お願いしよっかな。"
10047030-95 = "じゃ、そろそろ行くから。またね！"
10047030-96 = "次は、お茶会でもしよ？"
10047030-97 = "は、はいっ！た、た、楽しみにしてます！！"
10047030-103 = "[ns1] \"うーん……。\"\n[ns2] \"もしかしてあの子たちと、何かあったとか？\""
10047030-106 = "い、いえ！特には！"
10047030-107 = "みなさんとても優しくて……どちらかというと問題があるのは私、というか……。"
10047030-111 = "あ、あはははっ！こ、このお話はまた今度……。"
10047030-112 = "[ns] （事情があるみたいだし、これ以上は聞かないでおこう）"
10047030-113 = "あはは……ごめんなさい、私のせいで。"
10047030-117 = "……そうだ、「アレ」やろうよ。イヒッ。"
10047030-118 = "……ああ、「アレ」ですか。"
10047030-122 = "またやるの……！？嫌なんだけど！？"
10047030-123 = "[ns] \"一体何を……？\""
10047030-124 = "やれば……わかる……。"
10047030-129 = "さぁ、始めるよ、みんな。先生も……ね。"
10047030-130 = "はいっ……！"
10047030-136 = "……着いた。"
10047030-137 = "[ns] \"あれ？さっきと同じ場所だよね？\""
10047030-138 = "同じ場所に見えて、既にここは異空間と化しています。"
10047030-139 = "いま、私たちは……「儀式」をした。"
10047030-140 = "円を描くように、美術館を周る――#nこの行為には魔術的意味があります。"
10047030-141 = "[s] \"それはどんな……？\""
10047030-142 = "……この悪魔と、言葉を交わせるのです！"
10047030-146 = "この悪魔像は、かつてトリニティへと贈られたもの。#n他の悪魔を追い払う……いわば「魔除け」の意味を持っています。"
10047030-147 = "長い間トリニティの大聖堂に飾られていましたが……#n現在は文化財として、ここで管理されているのです。"
10047030-148 = "これほど由緒正しい悪魔ならば……#nきっと私たちの声に応えるはず！"
10047030-149 = "イヒッ……ムギちゃん、始めるよぉ。"
10047030-150 = "はい。悪魔に、呼びかけます――！"
10047030-158 = "私は芸術のテロリストォオオオオ！！！"
10047030-159 = "昨日は絵画ァァア！！！#n今日は文学の支配者となるゥゥゥウウ！！！"
10047030-163 = "ウォェェェェェェェェェェェェッ！！！！"
10047030-165 = "わあ……！#nツムギのデスボイスは、いつ聞いても素晴らしいです。"
10047030-166 = "感動するとこ！？"
10047030-167 = "[ns] \"ほ、本当にこれで悪魔と話せるの？\""
10047030-168 = "もちろんです！あれを見てください！"
10047030-172 = "（悪魔像の位置が変わっていた）"
10047030-173 = "イヒッ……私たちは動かしてないよぉ……。"
10047030-174 = "やはり、悪魔は実在するんです……！"
10047030-175 = "そんなのいいから、早く逃げようよ！"
10047030-176 = "ここで騒いでたらヤバいって！"
10047030-177 = "たしかに、このままでは悪魔像が召喚する「忌むべき者」たちに襲われてしまいますね！"
10047030-181 = "[ns] \"忌むべき者……？\""
10047030-183 = "そうですね。楽しむのもいいですが、引き際も大事ですから。"
10047030-184 = "……急ぎましょう。"
10047030-195 = "（急な出来事だったけど、たしかに悪魔像は動いていた）"
10047030-196 = "（それに「忌むべき者」とは一体……）"
10047030-200 = "[ns] \"この学院で、何が起きてるんだろう……？\""
