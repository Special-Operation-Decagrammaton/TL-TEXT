[translation]
1001205-1 = "トレーナーも一緒に"
1001205-2 = "ミレニアム・ジム"
1001205-3 = "トレーナー！いらっしゃいましたか。"
1001205-4 = "お待ちしておりました。"
1001205-5 = "今日の身体の調子はいかがですか？"
1001205-6 = "[s] \"ん？良いと思うけど。\""
1001205-10 = "はい、確かに良さそうですね。"
1001205-11 = "「実行」するのには、最適な状態のようです。"
1001205-12 = "はい？何を実行するのか、ですか？"
1001205-15 = "ふふっ。それは、これです！"
1001205-16 = "（スミレが渡してきたスマホの中に、トレーニングのメニューが書いてあった）"
1001205-17 = "[s] \"また別のトレーニングメニューを作ったの？\""
1001205-18 = "私のいつものメニューでは少し難しそうでしたので。"
1001205-19 = "はい？いつも私がやってるトレーニングは、って？"
1001205-20 = "……それは、いつも通りですが？"
1001205-21 = "[s] \"一日にトレーニングメニューを2つもこなすってこと？\""
1001205-22 = "えーっと……。"
1001205-23 = "すみません、トレーナー。仰ってる意味がよく分かりませんでした。"
1001205-24 = "そもそもそのメニューは私のためのものではありません。もう一度読んでみてください。"
1001205-25 = "[s] スミレが言った通り、メニューをもう一度確認する。"
1001205-28 = "（トレーナーのトレーニングメニュー、か……おかしい所は……ん？！待って！？）"
1001205-29 = "[s] \"ここに書いてある「トレーナー」ってもしかして……？\""
1001205-30 = "はい！[USERNAME]トレーナーのためのメニューです！"
1001205-31 = "ふふっ、いかがですか？お気に召しましたか？"
1001205-32 = "私が今まで培ってきたトレーニングの知識を使って、全身全霊で作ったメニューです！"
1001205-33 = "まずは、トレーニングを始める前に軽くストレッチを10分ほど、ですね。"
1001205-34 = "その後は、ランニングマシンでウォームアップを20分ほど行って……。"
1001205-35 = "[s1] \"ちょ、ちょっと待って！！\"\n[s2] \"異議あり！！\""
1001205-36 = "はい？どうされましたか？"
1001205-37 = "はい？どうされましたか？"
1001205-38 = "もしかして……やはりトレーナーにとっては楽すぎるメニューでしたか？"
1001205-39 = "ウォームアップ後、軽いウェイトトレーニングをメインに組んでいたのですが……。"
1001205-40 = "しかし！こんなこともあろうかとプランBのメニューも作っておきました。"
1001205-44 = "見てください、トレーナー！こちらの方にですね……。"
1001205-45 = "[s] \"い、いや、さっきのがちょうどいいと思う！\""
1001205-46 = "え？本当ですか？"
1001205-47 = "何となく、少しだけご不満そうな表情をされている気がしますが。"
1001205-48 = "[s] \"違うよ！さっきのすごく良い！やっぱりスミレは最高！\""
1001205-49 = "あはは、変なトレーナーですね。"
1001205-50 = "さあ、そうしたら今日は特別に！"
1001205-51 = "私がトレーナーの「トレーナー」になってあげましょう。"
1001205-52 = "はい？私のトレーニングはどうするのか、ですか？"
1001205-53 = "さすがトレーナー、いつも私のことを気にかけてくれますね。ありがとうございます。"
1001205-54 = "もちろん、トレーナーがいらっしゃる前に私の今日の分の運動はすでに終わらせておきました。"
1001205-55 = "ん？大丈夫ですか、少し顔色が悪いですが……。"
1001205-56 = "ああ！早くトレーニングをしたいということですね？"
1001205-57 = "分かりました！それでは今すぐ始めましょう！"
1001205-58 = "さあさあ、早く、今すぐに！！"
1001205-60 = "（結局スミレのメニュー通り、ストレッチをした後ランニングマシンで走った）"
1001205-62 = "はあ、はあ……。"
1001205-63 = "軽いランニングならいけそうかと思って、トレーナーと一緒に走ってみましたが……。"
1001205-64 = "トレーニングをした後だからか、すぐに疲れてしまいました……。"
1001205-65 = "トレーナーもお疲れのようですし、少し休みますか？"
1001205-66 = "[s] \"はあ、はあ……そうしよう……。\""
1001205-69 = "― どうですかトレーナー、[wa:3200]運動は、[wa:1300]楽しいでしょう？"
1001205-71 = "― 健康になる感じが、[wa:1500]しませんか？"
1001205-74 = "― あ、[wa:1000]えっと……[wa:1500]あ、[wa:1000]あまり見つめないでください。"
1001205-76 = "― （トレーニング中はひどい見た目だし……）"
1001205-79 = "― ど、[wa:1000]どこを見てるんですか……？"
1001205-82 = "― ……トレーナー、[wa:2500]お願いがあります。"
1001205-84 = "― これからも、[wa:2500]ずっと一緒に運動をしましょう。"
1001205-87 = "― 私は[wa:1000]トレーナーが[wa:1000]健康でいてほしいです。"
1001205-89 = "[wa:300]― り、[wa:700]理由ですか？[wa:2000]そ、[wa:500]それは……[wa:3000]ふふっ。"
1001205-92 = "― 当ててみてください。"
1001205-95 = "（その後スミレに付き合ってもらいながらトレーニングをして、残りのメニューを終わらせた）"
1001205-97 = "ミレニアムサイエンススクール"
1001205-98 = "トレーナー、今日の私と一緒のトレーニングは楽しかったですか？"
1001205-99 = "[s3] \"はあ、はあ……う、うん……。\"\n[s4] \"ふう、まだ足りないかな。\""
1001205-100 = "ふふっ、楽しかったのでしたら良かったです。"
1001205-101 = "一生懸命悩みながら作ったメニューですから。"
1001205-102 = "！？"
1001205-103 = "す、すごいです、トレーナー。"
1001205-104 = "やはり、念のため用意していたプランBの、より高強度のトレーニングメニューに変えなくては……。"
1001205-105 = "[s5] \"あ、あはは、冗談だよ！？冗談！\""
1001205-106 = "ふふっ。私も、冗談です。"
1001205-107 = "一緒にトレーニングをしたら、普段よりずっと楽しかったです。"
1001205-108 = "トレーナーが日々色々とお忙しいのは知っていますので、強要はできませんが。"
1001205-109 = "できればぜひ、これからも一緒に運動をしましょう。"
1001205-110 = "ね、トレーナー。"
