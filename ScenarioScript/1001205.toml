[translation]
1001205-1 = "O Treinador também"
1001205-2 = "Ginásio do Millennium"
1001205-3 = "Treinador! Você chegou."
1001205-4 = "Estava te esperando."
1001205-5 = "Como está o seu corpo hoje?"
1001205-6 = "[s] \"Hm? Acho que está bem.\""
1001205-10 = "Sim, parece estar muito bem, de fato."
1001205-11 = "Parece ser o estado ideal para \"executar\" o plano."
1001205-12 = "Sim? O que vamos executar, você pergunta?"
1001205-15 = "Fufu. É isto aqui!"
1001205-16 = "(No smartphone que Sumire entregou, havia um menu de treinamento escrito)"
1001205-17 = "[s] \"Você criou outro menu de treinamento?\""
1001205-18 = "É que o meu menu de costume parecia um pouco difícil demais."
1001205-19 = "Sim? O que eu faço no meu treinamento de costume, você pergunta?"
1001205-20 = "……Bem, é o de sempre, não é?"
1001205-21 = "[s] \"Você quer dizer que vamos fazer dois menus de treinamento em um dia?\""
1001205-22 = "Hum……."
1001205-23 = "Desculpe, Treinador. Não entendi bem o que você quis dizer."
1001205-24 = "Para começar, esse menu não é para mim. Por favor, leia novamente."
1001205-25 = "[s] Como Sumire disse, leio o menu novamente."
1001205-28 = "(Menu de treinamento do Treinador, é... tem algo estranho... hm?! Espera!?)"
1001205-29 = "[s] \"O 'Treinador' escrito aqui, por acaso é...?\""
1001205-30 = "Sim! É um menu para o Treinador [USERNAME]!"
1001205-31 = "Fufu, o que achou? Gostou?"
1001205-32 = "Usei todo o conhecimento de treinamento que acumulei até hoje para criar este menu com toda a minha alma!"
1001205-33 = "Primeiro, antes de começar o treino, vamos fazer um alongamento leve por uns 10 minutos."
1001205-34 = "Depois disso, vamos fazer um aquecimento na esteira por uns 20 minutos e..."
1001205-35 = "[s1] \"E-espera um pouco!!\"\n[s2] \"Objeção!!\""
1001205-36 = "Sim? O que houve?"
1001205-37 = "Sim? O que houve?"
1001205-38 = "Será que... o menu estava fácil demais para o Treinador?"
1001205-39 = "Depois do aquecimento, eu tinha planejado um treino de musculação leve como foco principal..."
1001205-40 = "Mas! Eu já estava preparada para isso e criei um Plano B também."
1001205-44 = "Veja só, Treinador! Aqui neste..."
1001205-45 = "[s] \"N-não, eu acho que o anterior está perfeito!\""
1001205-46 = "Eh? É verdade?"
1001205-47 = "Tive a impressão de que você estava com uma expressão um pouco insatisfeita."
1001205-48 = "[s] \"Não é isso! O anterior é ótimo! A Sumire é a melhor mesmo!\""
1001205-49 = "Ahaha, você é um Treinador engraçado."
1001205-50 = "Muito bem, então hoje será especial!"
1001205-51 = "Eu serei a \"treinadora\" do Treinador."
1001205-52 = "Sim? E o meu treinamento, você pergunta?"
1001205-53 = "Como esperado do Treinador, você sempre se preocupa comigo. Obrigada."
1001205-54 = "Claro, antes de você chegar, eu já tinha terminado a minha parte do exercício de hoje."
1001205-55 = "Hm? Você está bem? Seu rosto parece um pouco pálido..."
1001205-56 = "Ah! Então você quer começar o treino logo, é isso?"
1001205-57 = "Entendido! Então vamos começar agora mesmo!"
1001205-58 = "Vamos, vamos, rápido, agora mesmo!!"
1001205-60 = "(No fim, segui o menu da Sumire, fiz o alongamento e corri na esteira)"
1001205-62 = "Haa, haa..."
1001205-63 = "Pensei que uma corrida leve seria possível, então tentei correr junto com o treinador, mas..."
1001205-64 = "Talvez seja por causa do treino, mas fiquei cansada rapidamente..."
1001205-65 = "O treinador também parece cansado, que tal descansarmos um pouco?"
1001205-66 = "[s] \"Haa, haa... vamos fazer isso...\""
1001205-69 = "― Como se sente, treinador? [wa:3200] Exercitar-se é [wa:1300] divertido, não é?"
1001205-71 = "― Não sente que está [wa:1500] ficando mais saudável?"
1001205-74 = "― Ah, [wa:1000] bem... [wa:1500] ah, [wa:1000] por favor, não fique me encarando tanto."
1001205-76 = "― (Estou com uma aparência horrível durante o treino...)"
1001205-79 = "― O, [wa:1000] onde você está olhando...?"
1001205-82 = "― ...Treinador, [wa:2500] tenho um pedido."
1001205-84 = "― De agora em diante, [wa:2500] vamos nos exercitar juntos sempre."
1001205-87 = "― Eu [wa:1000] quero que o [wa:1000] treinador continue saudável."
1001205-89 = "[wa:300]― O, [wa:700] o motivo? [wa:2000] I, [wa:500] isso é... [wa:3000] fufu."
1001205-92 = "― Tente adivinhar."
1001205-95 = "(Depois disso, continuei treinando com a companhia da Sumire e finalizei o restante do menu.)"
1001205-97 = "Instituto de Ciências Millennium"
1001205-98 = "Treinador, o treino de hoje comigo foi divertido?"
1001205-99 = "[s3] \"Haa, haa... s-sim...\"\n[s4] \"Ufa, será que ainda não foi o suficiente?\""
1001205-100 = "Fufu, fico feliz que tenha se divertido."
1001205-101 = "Afinal, foi um menu que preparei pensando muito a respeito."
1001205-102 = "!?"
1001205-103 = "I-impressionante, treinador."
1001205-104 = "Como esperado, terei que mudar para o plano B, um menu de treino de maior intensidade que preparei por precaução..."
1001205-105 = "[s5] \"A-ahahaha, é brincadeira, tá!? Brincadeira!\""
1001205-106 = "Fufu. Eu também estava brincando."
1001205-107 = "Treinar junto com você foi muito mais divertido do que o normal."
1001205-108 = "Sei que o treinador é muito ocupado com várias coisas todos os dias, então não posso forçar."
1001205-109 = "Mas, se possível, vamos nos exercitar juntos daqui para frente."
1001205-110 = "Certo, treinador?"
