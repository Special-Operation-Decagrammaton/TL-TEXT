[translation]
1000103-1 = "Pesquisando as últimas tendências (1)"
1000103-2 = "Sala de aula"
1000103-3 = "Você veio, Sensei."
1000103-4 = "Fico feliz que tenha vindo, mesmo sabendo que você deve estar muito ocupado."
1000103-5 = "[s] \"O que era aquela preocupação que você mencionou antes?\""
1000103-6 = "Sim, é que..."
1000103-7 = "O que as alunas gostam ultimamente?"
1000103-8 = "[s] \"...Por que você está me perguntando isso?\""
1000103-9 = "Porque você está sempre cercado por alunas, não está?"
1000103-10 = "Então, achei que você soubesse mais sobre elas do que qualquer outra pessoa..."
1000103-11 = "Isso é um mal-entendido, você diz?"
1000103-12 = "Hmm..."
1000103-13 = "[s] \"Por que você ficou curiosa sobre isso de repente?\""
1000103-14 = "É que... ultimamente, tem sido difícil acompanhar as conversas das minhas amigas."
1000103-15 = "Por exemplo, quando dizem para ir à nova doceria que abriu em frente à escola."
1000103-16 = "Para ingerir calorias, não seria mais eficiente comer bastante fritura gordurosa do que ficar na fila de uma doceria?"
1000103-17 = "Mesmo assim, perder tempo esperando na fila... #nEu não consigo entender."
1000103-18 = "[s] \"Não é porque os doces são deliciosos?\""
1000103-19 = "Hmm... é difícil de entender, mas não é impossível de aceitar."
1000103-20 = "E tem outra coisa, por que as alunas gostam tanto de ocultismo, como tarô ou horóscopo?"
1000103-21 = "Não consigo entender por que as pessoas acreditam cegamente em horóscopos de TV, sendo que não há base nem lógica neles."
1000103-22 = "[s] \"Eu também não entendo muito bem...\""
1000103-23 = "Então até o Sensei tem coisas que não sabe sobre as alunas. Que surpreendente."
1000103-24 = "Talvez eu tenha mais chances do que pensava...?"
1000103-25 = "Se eu disse algo agora? Não, não foi nada."
1000103-26 = "De qualquer forma, para me dar bem com minhas amigas, preciso saber exatamente do que as alunas gostam."
1000103-27 = "Está dizendo que eu não pareço uma aluna? #nFufu, é verdade."
1000103-28 = "Eu mesma não me vejo muito como uma aluna. #nPara mim, Sensei, você é mais como um tipo de... companheiro de batalha. É essa a sensação."
1000103-29 = "Mas se continuar assim, isso vai acabar atrapalhando minha formatura. E isso seria ineficiente."
1000103-30 = "Vamos lá, Sensei. Enquanto lemos as revistas que eu trouxe, vamos pensar juntos sobre o que as alunas gostam."
1000103-32 = "Depois disso, continuei lendo as revistas com a Eimi por um tempo, mas não chegamos a nenhuma conclusão..."
