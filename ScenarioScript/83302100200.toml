[translation]
83302100200-6 = "あ、委員長。待っていました。"
83302100200-7 = "チナツ、どうしたの？"
83302100200-8 = "その……実は、学生食堂で騒ぎが起きているという通報が入ってきまして。"
83302100200-9 = "また食堂で……"
83302100200-10 = "ただでさえフウカは、万魔殿に押し付けられた依頼で手一杯なのに……"
83302100200-11 = "それで、今度は誰が暴れているの？ヘルメット団？それとも他の問題児？"
83302100200-12 = "えっと、私も状況が飲み込めていないんですが……"
83302100200-13 = "ふむ……何があったの？"
83302100200-14 = "今回は、問題児が騒ぎを起こしているわけではなく……"
83302100200-15 = "正体不明の怪物が暴れているようです。"
83302100200-16 = "……正体不明の怪物？もしかして、いたずらなんじゃない？"
83302100200-17 = "通報人がジュリさんだったので、その可能性は低いと思いますが……"
83302100200-23 = "よく分からないけど……分かった、行こう。"
