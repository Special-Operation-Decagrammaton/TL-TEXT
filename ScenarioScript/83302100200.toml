[translation]
83302100200-6 = "Ah, Presidente. Estávamos esperando por você."
83302100200-7 = "Chinatsu, o que houve?"
83302100200-8 = "Bem... na verdade, recebemos um relato de que há uma confusão acontecendo no refeitório dos estudantes."
83302100200-9 = "No refeitório de novo..."
83302100200-10 = "A Fuuka já está sobrecarregada com os pedidos que o Pandemonium empurrou para ela..."
83302100200-11 = "Então, quem está causando problemas desta vez? A Gangue dos Capacetes? Ou outros encrenqueiros?"
83302100200-12 = "Bem, eu também não entendi muito bem a situação, mas..."
83302100200-13 = "Hum... o que aconteceu?"
83302100200-14 = "Desta vez, não são os encrenqueiros que estão causando a confusão..."
83302100200-15 = "Parece que um monstro de origem desconhecida está causando estragos."
83302100200-16 = "...Um monstro de origem desconhecida? Será que não é uma pegadinha?"
83302100200-17 = "Como quem fez o relato foi a Juri, acho pouco provável que seja isso..."
83302100200-23 = "Não entendi direito, mas... entendi, vamos lá."
