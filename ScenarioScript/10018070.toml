[translation]
10018070-1 = "第7話;それなら対決だ！"
10018070-3 = "……そんなことがあったんですね。"
10018070-4 = "なんか段々話が大きくなってきてるけど……本当にいいんだよね？"
10018070-5 = "ですが、諦めるつもりはありません。"
10018070-6 = "一度でもやると決めたら、途中で投げ出したりしませんわ。"
10018070-11 = "そうだね！食べかけだと捨てることになっちゃうからね！"
10018070-12 = "ハルナはそういう意味で言ったわけではないはず……。"
10018070-14 = "まあ良いでしょう。これも試練の一つだと思うことにしますわ。"
10018070-15 = "究極の美食を求める私たちに立ちはだかる壁は、これから先いくつもあることでしょうし。"
10018070-16 = "それに試練を突破した後に味わう食事は、きっと比べ物にならないほどの美食に違いありませんわ。"
10018070-22 = "それでは皆さん、ニャオフードに向かいましょう。"
10018070-31 = "会長、報告がございます。"
10018070-32 = "ムッフフフ。今度は何だね？"
10018070-33 = "美食研究会がニャオフードの本社に向かっています。"
10018070-37 = "だにぃ！？どうして位置が分かったんだ！？"
10018070-38 = "会社のホームページに記載されています。"
10018070-39 = "だにぃ！誰がホームページに住所を書けだなんて言ったんだ！"
10018070-40 = "……会長です。"
10018070-45 = "なぜバカ正直に従ったんだ！"
10018070-46 = "いえ……命令通り正確に遂行しろと仰ったので……。"
10018070-51 = "……。"
10018070-52 = "ムッフフフフ……。"
10018070-53 = "わざわざ会社のホームページを見て訪ねてくる熱烈なお客様なんだ。"
10018070-54 = "ちょっとばかし歓迎してやるのが礼儀というものだろう。ムッフフフフ。"
10018070-55 = "何だか当初とお話が違うような……。"
10018070-56 = "うるさい！予備隊は応戦準備にかかれ！"
10018070-57 = "よろしいんですね？"
10018070-59 = "構わん！ニャオフードは私の会社だからな！"
