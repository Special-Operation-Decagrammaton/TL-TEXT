[translation]
10018070-1 = "Episódio 7; Então, é um duelo!"
10018070-3 = "……Então foi isso que aconteceu."
10018070-4 = "Sinto que isso está saindo do controle, mas…… tem certeza de que está tudo bem?"
10018070-5 = "No entanto, não pretendo desistir."
10018070-6 = "Uma vez que decido fazer algo, não desisto no meio do caminho."
10018070-11 = "É verdade! Se deixarmos comida pela metade, teremos que jogar fora!"
10018070-12 = "Acho que a Haruna não quis dizer nesse sentido……."
10018070-14 = "Bem, tudo bem. Vou considerar isso como mais uma provação."
10018070-15 = "Afinal, haverá muitos obstáculos pela frente para nós, que buscamos a culinária suprema."
10018070-16 = "E a refeição que saborearemos após superar essa provação certamente será uma iguaria incomparável."
10018070-22 = "Então, pessoal, vamos para a Nyaofood."
10018070-31 = "Presidente, tenho um relatório."
10018070-32 = "Mufufufu. O que é desta vez?"
10018070-33 = "O Clube de Pesquisa Gastronômica está a caminho da sede da Nyaofood."
10018070-37 = "O quê!? Como eles descobriram a localização!?"
10018070-38 = "Está listado no site da empresa."
10018070-39 = "O quê!? Quem foi que mandou colocar o endereço no site!"
10018070-40 = "……Foi a senhora, presidente."
10018070-45 = "Por que você seguiu ordens tão cegamente!"
10018070-46 = "Bem…… a senhora disse para executar as ordens com precisão……."
10018070-51 = "……."
10018070-52 = "Mufufufufu……."
10018070-53 = "São clientes fervorosos que se deram ao trabalho de olhar o site da empresa para nos visitar."
10018070-54 = "É uma questão de cortesia dar-lhes uma pequena recepção. Mufufufufu."
10018070-55 = "Sinto que a história está um pouco diferente do que foi planejado originalmente……."
10018070-56 = "Cale a boca! Preparem a equipe de reserva para o combate!"
10018070-57 = "Tem certeza disso?"
10018070-59 = "Não me importo! A Nyaofood é a minha empresa, afinal!"
