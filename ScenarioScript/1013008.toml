[translation]
1013008-1 = "A garota generosa"

1013008-3 = "Olá, Subaru-senpai! Ah, olá professora também!"

1013008-4 = "Olá. Estou feliz que você pareça estar bem hoje."

1013008-8 = "Huh? Senpai, isso poderia ser verdade...!"

1013008-10 = "É o lendário sabor de queijo barbecue Unmeebo? ?"

1013008-11 = "Hein, hein?"

1013008-12 = "Ah, isso mesmo..."

1013008-16 = "……."

1013008-17 = "Você quer comer?"

1013008-22 = "E-está tudo bem...! ?"

1013008-23 = "Hehe, por favor."

1013008-24 = "……obrigado!"

1013008-28 = "……."

1013008-29 = "(Eu estava planejando comê-lo mais tarde, mas...)"

1013008-30 = "[s] \"Você está bem? Subaru.\""

1013008-31 = "Ah, sim! Claro!"

1013008-32 = "Você parecia preocupado?"

1013008-33 = "...Você está pensando demais!"

1013008-36 = "Huh? Suco com sabor de pudim de nata! ?"

1013008-37 = "A versão em suco daquele pudim de creme que dizem existir...! ?"

1013008-38 = "...Isso mesmo."

1013008-39 = "……."

1013008-40 = "Hum... Senpai."

1013008-41 = "S-só uma mordida... tudo bem?"

1013008-42 = "……."

1013008-43 = "Isso é bom. Eu te darei tudo."

1013008-44 = "Está tudo bem? ?"

1013008-45 = "claro. #nNo entanto, ficaria feliz se você pudesse compartilhá-lo com outras crianças, se quiser."

1013008-46 = "obrigado! sênior!"

1013008-51 = "(Foi bastante difícil de obter, no entanto...)"

1013008-52 = "[s] \"...Você está bem?\""

1013008-53 = "Ei! ?"

1013008-54 = "……."

1013008-55 = "Bem, é claro!"

1013008-58 = "Uau, obrigado!"

1013008-59 = "bom."

1013008-61 = "Obrigado, vou cuidar bem de você, Senpai! #nÉ o melhor!"

1013008-62 = "Sim..."

1013008-64 = "(A mesma tendência continua depois disso...)"

1013008-65 = "(Depois de completar sua patrulha, Subaru não tinha quase nada em suas mãos.)"

1013008-67 = "……."

1013008-68 = "[s] \"…….\""

1013008-69 = "……."

1013008-70 = "[s] \"…….\""

1013008-71 = "P-por que você está olhando para mim...?"

1013008-72 = "[s] \"Você não precisa esconder isso na minha frente...\""

1013008-73 = "Ah, esse não é realmente o caso!"

1013008-77 = "...mas ainda assim."

1013008-78 = "É verdade que o que eu disse antes foi um pouco decepcionante..."

1013008-79 = "[s1] \"Isso não está certo, Subaru-san.\" \n[s2] \"Venha aqui...\""

1013008-82 = "...Eh?"

1013008-84 = "O que, professor? Por que aqui..."

1013008-85 = "Coma primeiro...? É isso."

1013008-86 = "……."

1013008-87 = "Eu não gosto disso. Eu sei o que o professor está pensando! #nAbsolutamente eu――"

1013008-89 = "Obrigado por esperar. Por favor, não tenha pressa."

1013008-94 = "[ns] \"...Tem certeza?\""

1013008-95 = "Não, está tudo bem! Porque estou bem!"

1013008-96 = "E-eu acabei de perguntar!"

1013008-97 = "Mas é apenas algo que eu gosto... certo?"

1013008-98 = "[s3] \"Bem, eu acho!\"\n[s4] \"Eu vi isso na festa para comemorar meu primeiro turno outro dia!\""

1013008-101 = "! ! !"

1013008-102 = "Ah, obrigado pela sua ajuda naquele momento... mas! Desta vez vou apenas levar seus sentimentos!"

1013008-104 = "(Enquanto eu olhava em volta, pensando que ele estava sendo teimoso)"

1013008-108 = "(Faltava parte da comida!)"

1013008-110 = "(Depois disso, olhei em volta algumas vezes...)"

1013008-114 = "(Cada vez, a comida desaparecia constantemente!)"

1013008-116 = "[ns] \"Isso é estranho~\""

1013008-117 = "O que é? O que está errado?"

1013008-118 = "[s] \"Sinto que estou ficando sem comida.\""

1013008-119 = "Bem, a professora não comeu...?"

1013008-120 = "Que cara é essa...?"

1013008-121 = "...Já! Ah, eu entendo!"

1013008-122 = "……."

1013008-123 = "Sim, eu comi!"

1013008-124 = "...Professor, você não gosta de aluno que come tanto, né?"

1013008-125 = "[s] \"...!\""

1013008-129 = "[ns5] \"Isso não é verdade! Você tem que comer muito e crescer muito!\"\n[ns6] \"Só de ver você comer me deixa feliz!\""

1013008-132 = "E-É mesmo...?"

1013008-133 = "……."

1013008-134 = "obrigado……."

1013008-135 = "Huh...? Subaru ainda tem alguma falta de jeito...?"

1013008-136 = "Você não é honesto...?"

1013008-137 = "……professor. Você não contou isso às outras crianças, contou?"

1013008-141 = "Hum, por que você está desviando o olhar? Por favor, olhe para mim corretamente."

1013008-143 = "(Consegui escapar da perseguição de Subaru e levá-lo para todos os lugares!)"

1013008-151 = "[ns] \"Como foi?\""

1013008-152 = "Não importa o que você diga...hmm."

1013008-153 = "É mais como se eu realmente não entendesse..."

1013008-154 = "Você sente que não tem experiência e não está acostumado?"

1013008-155 = "Eu tive algumas \"atividades fora do campus\" antes, mas..."

1013008-159 = "Num lugar tão \"ensolarado\"..."

1013008-160 = "Nunca tive um momento de paz..."

1013008-161 = "...! ?"

1013008-162 = "Que som é esse, senhor? ?"

1013008-163 = "A morte humana é ecologicamente boa ――――! !"

1013008-165 = "(Ele entrou na loja de CDs com Subaru, com os olhos brilhando)"

1013008-167 = "Pesado, metálico...? Isso é o que é o heavy metal!"

1013008-168 = "Bem, o que devo dizer..."

1013008-169 = "É intenso!"

1013008-170 = "[ns] \"Ah, certo!\""

1013008-171 = "Essa sensação de velocidade e força... é como uma bala explosiva moldada!"

1013008-172 = "Acima de tudo, gostei da letra: “Vamos destruir este mundo!” !"

1013008-173 = "[ns] \"Não execute!\""

1013008-175 = "Ufa... isso foi incrível, Sensei."

1013008-176 = "Mesmo agora, meus ouvidos e peito parecem estar latejando..."

1013008-177 = "Huh? Você acha que tem potencial para se tornar um metaleiro?"

1013008-178 = "Hmm, eu realmente não entendo... mas acho que fiquei naturalmente muito atraído por isso."

1013008-179 = "...Especialmente as letras."

1013008-180 = "[s] \"...Você realmente quer que o mundo acabe?\""

1013008-181 = "……."

1013008-182 = "O que você acha? Eu também não entendo."

1013008-183 = "Eu sinto que não me sinto assim."

1013008-184 = "Mas a professora também disse isso. As emoções não são simples... então."

1013008-185 = "……."

1013008-186 = "Não seria bom se o professor pudesse me convencer de que “este mundo é uma coisa boa”?"

1013008-187 = "[ns] \"Droga... foi assim que aconteceu...\""

1013008-188 = "Afinal, você não é um professor “adulto”?"

1013008-189 = "[s] \"Essa não é uma palavra invencível...?\""

1013008-190 = "Sim? Mas você mesmo não disse isso?"

1013008-191 = "[s] \"Certamente não posso negar...\""

1013008-193 = "(E então, enquanto conversava com Subaru, voltei para casa.)"

