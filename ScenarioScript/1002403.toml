[translation]
1002403-1 = "Algo especial só para mim"
1002403-2 = "（Cheguei ao ponto intermediário da estrada costeira exatamente no horário que a Shiroko previu）"
1002403-3 = "（De longe, vejo a silhueta da Shiroko pedalando sua bicicleta de estrada em alta velocidade...）"
1002403-4 = "……！？"
1002403-5 = "……Ah, Sensei?"
1002403-6 = "Por que você está aqui……?"
1002403-7 = "[s1] \"Pensei que talvez você precisasse disso agora.\"\n[s2] \"Desculpe se estou sendo intrometido…….\""
1002403-8 = "……？"
1002403-9 = "……？"
1002403-10 = "O que você está segurando aí…… é um energético?"
1002403-11 = "E até uma toalha nova……."
1002403-12 = "Isso é para mim……?"
1002403-13 = "Ah, obrigado. O que eu tinha estava acabando, então isso ajuda muito."
1002403-14 = "Hmm……."
1002403-15 = "Bem, é que……."
1002403-16 = "Será que, no fim das contas, eu estou preocupando o Sensei……?"
1002403-17 = "Hmm…… é preocupação, mas não é num sentido ruim, né……?"
1002403-18 = "Mas você veio até aqui de propósito e me ajudou tanto……."
1002403-19 = "[s] \"É que eu sou como um apoiador da Shiroko.\""
1002403-20 = "……！"
1002403-21 = "Apoiador……."
1002403-22 = "O Sensei é……"
1002403-23 = "Meu apoiador……."
1002403-24 = "[s] \"Shiroko? O que houve?\""
1002403-28 = "[wa:1200]― ……Obrigado, [wa:950] Sensei."
1002403-31 = "[wa:2250]― É que, [wa:1100] como posso dizer……."
1002403-33 = "― É a [wa:1350] primeira vez que alguém me apoia de verdade assim, [wa:2500] sabe……."
1002403-36 = "[wa:1200]― ……Quando estou com o [wa:500] Sensei,"
1002403-38 = "― Coisas novas [wa:1550] acontecem todos os dias."
1002403-41 = "[wa:950]― （……？ [wa:1150] Por que será? [wa:1500] Meu coração [wa:1450] não para de bater……）"
1002403-44 = "[wa:1250]― ……Que estranho. [wa:1900] Isso também é [wa:1250] a primeira vez."
1002403-47 = "……Obrigado, Sensei. Com certeza vou retribuir esse favor."
1002403-48 = "Ah. E a toalha, como faz……?"
1002403-49 = "Ah, posso ficar com a nova……? Para mim, ajuda muito, mas……."
1002403-50 = "Vou acabar te entregando a garrafa vazia e a toalha usada, tudo bem para você……?"
1002403-51 = "[s] \"Claro. Se isso ajudar a Shiroko, nem que seja um pouco.\""
1002403-55 = "……Então, vou aceitar sua gentileza. Obrigado."
1002403-56 = "Sinto que recuperei as energias. Desse jeito, vou conseguir terminar o percurso com folga."
1002403-57 = "……Daqui para frente,"
1002403-58 = "eu não estou mais sozinha."
1002403-60 = "（Depois de conversar um pouco sobre o trajeto com a Shiroko, me despedi dela enquanto a via partir com leveza）"
