[translation]
10009065-9 = "Os \"Sete Prisioneiros\"... era isso, não é?"
10009065-10 = "Desta vez, você apareceu assim sem nem mesmo um aviso de fuga da Agência Correcional. Realmente, não dá para subestimar você."
10009065-14 = "Mas desta vez é o fim. Com a liderança do Sensei, os outros encrenqueiros já foram neutralizados e seus equipamentos, desativados."
10009065-15 = "Está preparada, Raposa da Calamidade?"
10009065-16 = "……！"
10009065-20 = "Assim que percebeu que estava encurralada, decidiu fugir?"
10009065-21 = "……Tudo bem. Não posso deixar que mais cadáveres..."
10009065-22 = "Não, não posso aumentar o número de feridos. Se é assim, será um contra um."
10009065-23 = "Sensei, vou seguir a Raposa da Calamidade daqui."
10009065-24 = "Esta área está limpa, mas não seria estranho se os remanescentes dos encrenqueiros aparecessem de algum lugar. Tente se encontrar com as alunas da Valkyrie o mais rápido possível."
10009065-25 = "[s] \"Ah, Sena...!\""
10009065-30 = "(Sena saiu correndo atrás de Wakamo com uma energia incrível)"
10009065-31 = "(Por um momento, enquanto eu pensava sobre o que fazer a seguir...)"
10009065-37 = "Sensei, você está bem?! Algum ferimento?!"
10009065-38 = "[s] \"Sim, estou bem. E quanto à Chihiro?\""
10009065-39 = "……Espere. Por acaso você está sozinho agora?"
10009065-40 = "Onde está a garota de Gehenna que estava com você?"
10009065-41 = "……Perseguição um contra um? Fomos enganados...!"
10009065-42 = "[s] \"……?\""
10009065-43 = "Desde o início, o objetivo da Wakamo era este. Causar um alvoroço propositalmente para atrair todos os olhares para si mesma..."
10009065-44 = "Não, não é hora de explicar detalhadamente. Sensei, mantenha a calma e siga minhas instruções. Acabei de hackear o sistema da área."
10009065-45 = "[s] \"Hackear!? Tão facilmente assim!?\""
10009065-46 = "Vou usar as câmeras de vigilância e os sinais para guiar o Sensei até uma zona segura..."
10009065-47 = "…………i, ………passe……………………"
10009065-48 = "……ouça…………local…………………………"
10009065-53 = "[ns] \"A comunicação está...\""
10009065-54 = "(A comunicação com Chihiro começou a falhar e, enquanto eu pensava no próximo passo...)"
10009065-56 = "Fufu, finalmente te encontrei...♡"
10009065-57 = "[s] \"……?\""
10009065-60 = "(No mesmo momento, em outro lugar...)"
10009065-65 = "A \"Raposa da Calamidade\" apareceu no distrito comercial de D.U.! Solicito apoio da sede!"
10009065-66 = "Outros encrenqueiros também apareceram em massa, com as forças atuais no local não vamos conseguir...!"
10009065-67 = "Aqui é o distrito oeste de D.U.!"
10009065-68 = "Distrito oeste, conseguimos contato! Que bom, precisamos de apoio aqui...!"
10009065-69 = "No distrito oeste, a \"Raposa da Calamidade\" que escapou da Agência Correcional apareceu! Por favor, enviem apoio antes que seja tarde demais...!"
10009065-70 = "……Hã!?"
10009065-75 = "Repito, aqui é o distrito oeste! Wakamo está bem na minha frente...!"
10009065-79 = "Como assim!? A Raposa da Calamidade está agora na avenida central de D.U...."
10009065-88 = "Fu, Fubuki! O que é isso...!?"
10009065-89 = "Ah, droga, o que é isso! Na verdade, provavelmente tudo isso é..."
10009065-90 = "Sim, tudo deve ser \"falso\". Wakamo planejou isso desde o início ao tentar escapar da Agência Correcional."
10009065-91 = "Para desviar a atenção de todos e confrontar o Sensei sem que ninguém a atrapalhasse...!"
10009065-92 = "……O quêêê!?"
10009065-93 = "Temos que entrar em contato com o Sensei agora mesmo...!"
10009065-94 = "Impossível. Toda a comunicação vinda daqui está sendo bloqueada."
10009065-95 = "Raposa da Calamidade, como ela conseguiu fazer um bloqueio tão complexo..."
10009065-99 = "……Ah."
10009065-100 = "Ei, espera um pouco. Esse \"ah\" de agora, por acaso..."
10009065-101 = "Não, não é hora de falar sobre isso."
10009065-102 = "Já que não conseguimos contato, não há outra alternativa."
10009065-103 = "Você sabe dirigir, não sabe?"
10009065-105 = "……Eu?"
10009065-107 = "Fufu... ♡ Com isso, não precisaremos nos preocupar com barulho vindo de longe por um tempo."
10009065-108 = "Eu peguei isso meio que por acaso, mas os equipamentos da Academia de Polícia Valkyrie são bem úteis, não são?"
10009065-109 = "Não acha, Sensei?"
10009065-110 = "[s] \"Wakamo…….\""
10009065-113 = "Ah, o quanto eu esperei por este momento."
10009065-114 = "Sinceramente, levou bastante tempo... Sempre havia alguém ao seu lado, e tive muita dificuldade por causa disso."
10009065-115 = "Sério, fui interrompida por todos os lados……."
10009065-116 = "Pensei e planejei várias vezes. Como eu poderia chegar até você……."
10009065-117 = "O que eu deveria fazer para ficar diante de você, sem que ninguém me atrapalhasse."
10009065-118 = "[s] \"Foi por isso que você usou a Valkyrie……?\""
10009065-119 = "Fufu. Causar o maior alvoroço possível para que todos os olhares se voltassem para mim. O mais chamativo, esplêndido e intenso possível para atrair a atenção."
10009065-120 = "Depois de tanto esforço, finalmente consegui. Finalmente cheguei até você."
10009065-121 = "Ah, acho que não consigo mais aguentar……."
10009065-126 = "[ns] \"……!\""
10009065-127 = "Finalmente, meu desejo será realizado……!"
10009065-132 = "Sensei, por favor, aceite isto……."
10009065-133 = "[s] \"……Isso é chocolate?\""
10009065-134 = "Sim ♡ É um chocolate preparado especialmente para você, vindo de mim ♡"
10009065-135 = "[s] \"Isso é…….\""
10009065-137 = "Bem, é o Dia dos Namorados, afinal. Um dia para dar e receber chocolates e sentir felicidade."
10009065-139 = "Sim, o Dia dos Namorados é um dia importante. É um dia especial para transformar em realidade os sentimentos que cada um guarda no coração."
10009065-143 = "[ns] \"Quer dizer que é algo assim……?\""
10009065-144 = "Foi amor à primeira vista……."
10009065-145 = "Eu, Wakamo, desde a primeira vez que vi você…… sempre senti tanta saudade, e finalmente consegui conter esse sentimento transbordante."
10009065-146 = "E finalmente, aqui a sós,"
10009065-147 = "chegou o momento de lhe entregar o chocolate……!"
10009065-148 = "[s] \"Tudo isso só para me entregar este chocolate……?\""
10009065-149 = "Sim ♡"
10009065-150 = "[s] \"…….\""
10009065-152 = "[s1] \"……Eu aceito com gratidão, estou muito feliz.\"\n[s2] \"Mas você exagerou em tudo!\""
10009065-153 = "Ah……! Dizer algo assim para mim……."
10009065-154 = "Embora não tenha como evitar, odeio a mim mesma por não ter agido mais cedo. Se tivesse, poderia ter conversado com você assim há mais tempo……!"
10009065-155 = "Fufu, fufufufu……."
10009065-156 = "[s3] \"Mas veja bem, Wakamo.\""
10009065-157 = "……?"
10009065-158 = "[s4] \"Esse tipo de abordagem é problemática, então acho que não é muito bom.\""
10009065-159 = "Eh…… P-problemática, você disse?"
10009065-160 = "[s5] \"Esse método está errado.\""
10009065-161 = "E-errado……?"
10009065-162 = "Eh, ehhh……!?"
10009065-163 = "[ns6] \"Hoje houve vários tumultos por toda parte.\""
10009065-165 = "[ns7] \"E por causa disso, várias pessoas se machucaram.\""
10009065-167 = "[ns8] \"Acho que esse tipo de coisa não é nada bom.\""
10009065-168 = "……!?"
10009065-169 = "M-mas Sensei……!"
10009065-170 = "Ouvi dizer que o Dia dos Namorados é um dia para expressar seus sentimentos de forma honesta e com toda a sua força!"
10009065-171 = "Eu só queria, de alguma forma, lhe transmitir esse sentimento……!"
10009065-172 = "[s] \"Fico muito feliz com isso, mas métodos que prejudicam os outros não são aceitáveis.\""
10009065-173 = "E-Eu……!"
10009065-174 = "[s9] \"Acho que hoje, muitas pessoas pensaram a mesma coisa que você, Wakamo.\"\n[s10] \"E talvez, algumas delas tenham perdido a oportunidade de fazer isso.\""
10009065-175 = "……!"
10009065-176 = "……!"
10009065-177 = "[s] \"Se eu ignorar isso, não poderei aceitar o seu presente de bom grado.\""
10009065-178 = "……!?"
10009065-179 = "I-Isso é……?"
10009065-180 = "Eu só…… eu só sinto tanto por você……"
10009065-181 = "E você não vai mais aceitar de bom grado……?"
10009065-182 = "N-Não, não pode ser."
10009065-183 = "Isso é, porque, se você me odiar, eu, eu……!"
10009065-184 = "[s] \"……Eu acredito que, de agora em diante, você pode pensar em um jeito diferente.\""
10009065-185 = "!!!"
10009065-186 = "Você…… acredita em mim? Mesmo depois de eu ter cometido um erro, você não vai me odiar……?"
10009065-187 = "[s11] \"Não vou dizer que não tem jeito só por causa de uma vez, afinal, você também é uma aluna importante para mim, Wakamo.\"\n[s12] \"Quero que me prometa que vai se esforçar daqui para frente.\""
10009065-192 = "Eu sou…… uma aluna importante…… do Sensei."
10009065-193 = "Ah, ah…… c-claro, é claro! Sim! Com certeza, não, eu prometo!"
10009065-194 = "Eu, Wakamo, juro para você, Sensei!"
10009065-195 = "De agora em diante, eu nunca mais……!"
10009065-196 = "Se você disser para eu não fazer algo, eu jamais farei……!"
10009065-197 = "[s] \"Então, é uma promessa.\""
10009065-198 = "Sim, é uma promessa……!"
10009065-204 = "Ah, Sensei…… meu Sensei……♡"
10009065-208 = "Mais uma vez, tem gente tentando atrapalhar o nosso momento precioso……"
10009065-209 = "Mas…… nós fizemos uma promessa. Uma promessa feita apenas entre você e eu……"
10009065-210 = "Com isso, mesmo que tenhamos que nos separar aqui novamente, eu certamente serei capaz de suportar."
10009065-211 = "Então, virei buscá-lo novamente em breve. Sensei."
10009065-212 = "[s] \"Ah, sim……?\""
10009065-213 = "Fufu. Ficarei ansiosa pelo nosso próximo reencontro."
10009065-214 = "Mesmo que nossos corpos estejam separados…… eu continuarei te amando de todo o meu coração♡"
10009065-219 = "Sensei, você está bem!?"
10009065-220 = "Ah, Fubuki, ali! A raposa do desastre está fugindo……!"
10009065-221 = "Não vai escapar! Espere aí!"
10009065-223 = "(Enquanto tudo voltava a ficar barulhento, fiquei por um tempo encarando o chocolate que a Wakamo me deu)"
