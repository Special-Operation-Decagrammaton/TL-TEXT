[translation]
10009065-9 = "「七囚人」……でしたか。"
10009065-10 = "今度は矯正局から脱出の知らせさえ無いまま、こうして姿を現すとは。やはり侮れませんね。"
10009065-14 = "ですが、今度こそ終わりです。先生の指揮もあって既に他の問題児たちは無力化、装備も無効化してあります。"
10009065-15 = "覚悟は良いですか、災厄の狐。"
10009065-16 = "……！"
10009065-20 = "窮地に追い込まれたと分かるや否や、逃走ですか？"
10009065-21 = "……良いでしょう。これ以上死体……"
10009065-22 = "いえ、負傷者を増やすわけにはいきません。こうなったら、一対一で。"
10009065-23 = "先生、私はこのまま災厄の狐を追います。"
10009065-24 = "この辺りは片付きましたが、どこからか問題児たちの残党が来てもおかしくありません。できるだけ早めにヴァルキューレの生徒たちとの合流を。"
10009065-25 = "[s] \"あ、セナ……！\""
10009065-30 = "（セナはすごい勢いで、ワカモの後を追いかけていった）"
10009065-31 = "（少しの間、この後どう動くべきかについて悩んでいた時）"
10009065-37 = "先生大丈夫！？怪我は！？"
10009065-38 = "[s] \"うん、大丈夫。チヒロの方は？\""
10009065-39 = "……待って。もしかして今、ひとり？"
10009065-40 = "一緒にいたゲヘナの子は？"
10009065-41 = "……一対一で追撃？やられたっ……！"
10009065-42 = "[s] \"……？\""
10009065-43 = "最初っからワカモの狙いはこれだった。わざと騒ぎを大きくして、ありとあらゆる目を自分に向けさせて……。"
10009065-44 = "いや、詳しく説明してる場合じゃない。先生、落ち着いて私の指示に従って。今その辺りのシステムをハッキングしたから。"
10009065-45 = "[s] \"ハッキング！？そんな簡単に！？\""
10009065-46 = "このまま監視カメラとか信号を利用して、先生を安全な区域に誘……"
10009065-47 = "…………い、………通し……………………"
10009065-48 = "……聞…………場…………………………"
10009065-53 = "[ns] \"通信が……。\""
10009065-54 = "（チヒロとの連絡が途絶え途絶えになり、次に取るべき行動を悩んでいたが……）"
10009065-56 = "ふふっ、ようやく見つけました……♡"
10009065-57 = "[s] \"……？\""
10009065-60 = "（同時刻、別の場所では……）"
10009065-65 = "D.U.の商店街地区で「災厄の狐」が出没！本部の支援を要請する！"
10009065-66 = "他の問題児たちまで大量に現れてて、現場の戦力だけじゃとても……！"
10009065-67 = "こちらD.U.西地区！"
10009065-68 = "西地区、繋がった！ちょうど良かった、こちらに支援を……！"
10009065-69 = "西地区にて、矯正局から姿を消した「災厄の狐」が出現！手遅れになる前にどうか支援を……！"
10009065-70 = "……えっ！？"
10009065-75 = "繰り返す、こちら西地区！目の前にワカモが……！"
10009065-79 = "どういうこと！？災厄の狐は今D.U.の中央通りに……！"
10009065-88 = "ふ、フブキ！これは……！？"
10009065-89 = "ああもう、何これ！っていうか多分これは全部……！"
10009065-90 = "うん、全部「偽物」のはず。ワカモは最初からこれを狙って、矯正局の脱獄を試みたんだ。"
10009065-91 = "みんなの視線を逸らして、誰にも邪魔されない形で先生と対峙するために……！"
10009065-92 = "……はいぃっ！？"
10009065-93 = "今すぐ先生に連絡を……！"
10009065-94 = "無理。こっちからの通信は全部妨害されてる。"
10009065-95 = "災厄の狐、一体どうやってあんな複雑なジャミングを……"
10009065-99 = "……あ。"
10009065-100 = "ねぇ、ちょっと。今の「あ」ってもしかして……。"
10009065-101 = "いや、もうそんなこと言ってる場合じゃないね。"
10009065-102 = "連絡がつかない以上、もう手段は他に無い。"
10009065-103 = "運転、できるでしょ？"
10009065-105 = "……私？"
10009065-107 = "ふふっ……♡これでしばらくは、遠距離から騒がしくされる心配もございません。"
10009065-108 = "何となく奪ってきたものだったのですが、ヴァルキューレ警察学校の装備はなかなか便利ですねぇ。"
10009065-109 = "そうは思いませんか、先生？"
10009065-110 = "[s] \"ワカモ……。\""
10009065-113 = "あぁ、この瞬間をどれだけ待ち望んだことか。"
10009065-114 = "本当に、かなりの時間がかかってしまいましたね……あなた様の傍にはいつも誰かがいて、だいぶ苦労してしまいました。"
10009065-115 = "本当に、あちこちから邪魔されてばかりで……。"
10009065-116 = "何度も考え、策を練りました。どうすれば、あなたの元へ近づけるのか……。"
10009065-117 = "誰からの邪魔もされずにこうしてあなた様の目の前に立つために、何をすれば良いのかと。"
10009065-118 = "[s] \"そのために、ヴァルキューレを……？\""
10009065-119 = "ふふっ。最大限派手に暴れまわり、私に視線を集中させる。注目が集まるようできるだけ派手に、華麗に、強烈に。"
10009065-120 = "重ねに重ねて、ようやくです。やっとあなた様の元へ辿り着きました。"
10009065-121 = "あぁ、そろそろ耐えられそうにありません……。"
10009065-126 = "[ns] \"……っ！\""
10009065-127 = "ようやく、私の願いが成就します……！"
10009065-132 = "先生、どうかこれを……。"
10009065-133 = "[s] \"……これ、チョコレート？\""
10009065-134 = "はい♡あなた様のためだけに用意した、私からのチョコレートです♡"
10009065-135 = "[s] \"これって……。\""
10009065-137 = "まぁ、せっかくのバレンタインデーだからね。チョコレートを渡して、渡し合って、幸せを感じられる日。"
10009065-139 = "はい、何せバレンタインデーは大切な日。それぞれが胸に秘めた大事な思いを形にする特別な日ですから。"
10009065-143 = "[ns] \"つまり、そういう……？\""
10009065-144 = "一目惚れなんです……。"
10009065-145 = "このワカモ、あなた様を初めて一目見た時から……ずっとずっとあなた様のことを恋しく思い、その溢れんばかりの想いをやっとの思いで抑えてまいりました。"
10009065-146 = "そしてようやくこうして二人っきりで、"
10009065-147 = "あなた様にチョコレートをお渡しできるタイミングが……！"
10009065-148 = "[s] \"全部、このチョコを渡すために……？\""
10009065-149 = "はい♡"
10009065-150 = "[s] \"……。\""
10009065-152 = "[s1] \"……これはありがたく受け取るね、すごく嬉しい。\"\n[s2] \"でも色々やり過ぎ！\""
10009065-153 = "あぁ……っ！そこまで言ってくださるなんて……。"
10009065-154 = "仕方ないこととはいえ、もっと早く行動に移せなかった自分を恨みます。そうすればもう少し早く、こうしてあなた様とお話が出来ましたのに……！"
10009065-155 = "ふふっ、ふふふふっ……。"
10009065-156 = "[s3] \"でもね、ワカモ。\""
10009065-157 = "……？"
10009065-158 = "[s4] \"こういうやり方は困るから、あんまり良くないと思うよ。\""
10009065-159 = "えっ……こ、困る、ですか？"
10009065-160 = "[s5] \"こういう方法は、間違ってる。\""
10009065-161 = "ま、間違ってる……？"
10009065-162 = "え、えぇっ……！？"
10009065-163 = "[ns6] \"今日あちこちで色んな騒ぎになって。\""
10009065-165 = "[ns7] \"それで、色んな人が怪我したよね。\""
10009065-167 = "[ns8] \"そういうのは、あんまり良くないと思う。\""
10009065-168 = "……！？"
10009065-169 = "で、ですが先生……！"
10009065-170 = "バレンタインデーと云うものは、自分の気持ちを素直に、そして全力でお伝えする日だと伺いました！"
10009065-171 = "私はただ、この想いをどうにかお伝えしたくって……！"
10009065-172 = "[s] \"それは本当に嬉しい、でも他人に被害を与えるやり方はダメだよ。\""
10009065-173 = "わ、私は……！"
10009065-174 = "[s9] \"今日、ワカモと同じことを考えてる人がたくさんいたと思う。\"\n[s10] \"その機会を失っちゃった人だって、もしかしたらいるかもしれない。\""
10009065-175 = "……っ！"
10009065-176 = "……っ！"
10009065-177 = "[s] \"それを無視されると、私もこれを喜んで受け取れない。\""
10009065-178 = "……っ！？"
10009065-179 = "そ、そんな……？"
10009065-180 = "私はただ、あなた様のことが……。"
10009065-181 = "それを、喜んでいただけなくなる……？"
10009065-182 = "だ、ダメ、ダメです。"
10009065-183 = "それは、だって、あなた様に嫌われては、私は、私は……！"
10009065-184 = "[s] \"……これからは、違うやり方を考えられるって信じてるよ。\""
10009065-185 = "！！！"
10009065-186 = "信じて、くださるのですか……？過ちを犯した私を、嫌わずに、いてくださるのですか……？"
10009065-187 = "[s11] \"一回でダメなんてことは言わないよ、ワカモも大切な生徒だから。\"\n[s12] \"これからは頑張るって、約束してほしいな。\""
10009065-192 = "私が、先生の……大切な、生徒……。"
10009065-193 = "あ、あぁ……も、もちろん、もちろんです！はい！きっと、いえ必ずや！"
10009065-194 = "このワカモあなた様に、先生に誓います！"
10009065-195 = "これからは絶対に……！"
10009065-196 = "先生がやるなと言われるのでしたら、そういったことは決して致しません……！"
10009065-197 = "[s] \"じゃあ、約束。\""
10009065-198 = "はい、約束です……！"
10009065-204 = "あぁ、先生……私の先生……♡"
10009065-208 = "また、私と先生の大事な時間を邪魔しようとする輩が……。"
10009065-209 = "ですが……約束、致しましたから。あなた様と私の交わした、二人だけ約束……。"
10009065-210 = "これさえあれば私、たとえ再びここで別れることになろうとも、きっと耐えてみせます。"
10009065-211 = "では、またすぐお迎えに上がりますね。先生。"
10009065-212 = "[s] \"あ、うん……？\""
10009065-213 = "ふふっ。また再会できる時を、心待ちにしておりますね。"
10009065-214 = "たとえ身体は離れても……あなた様のこと、心よりお慕いしておりますので♡"
10009065-219 = "先生、無事！？"
10009065-220 = "あっ、フブキあそこです！災厄の狐さんが逃げて……！"
10009065-221 = "逃がすかぁ！待てーーーーっ！"
10009065-223 = "（そうして再び騒がしくなる中で、しばらくの間ワカモがくれたチョコレートをじっと見つめていた）"
