[translation]
1006615-1 = "Equipamento das heroínas criadas"
1006615-2 = "Hoje, vamos limpar a casa da guilda!"
1006615-3 = "[s]\"gi, Guilda ......? \""
1006615-4 = "As guildas são locais que podem lhe dar informações sobre missões e ajudá-lo a formar um grupo!"
1006615-5 = "Esse tipo de informação pode ser encontrado no quadro de avisos em ......, o que significa que esta é uma casa de guilda!"
1006615-6 = "Mas não há recepcionista para me apresentar ao pedido. ...... O que devo fazer?"
1006615-10 = "Oh, eu tenho uma ideia! Se #nAlice se tornar uma recepcionista, isso é uma solução..."
1006615-11 = "Mas ...... agora Alice acabou de se tornar uma corajosa aprendiz de empregada doméstica, portanto a mudança de emprego é ......"
1006615-12 = "Doutor Wahn! Estou em um aperto! Por favor, ajude #nAlice!"
1006615-13 = "[\"Vamos começar a limpeza por enquanto. \""
1006615-14 = "......"
1006615-15 = "Era! Alice quase se esqueceu de seu propósito."
1006615-16 = "Então, sensei, vamos limpar e subir de nível juntos! #nTalvez você encontre alguns itens escondidos!"
1006615-17 = "O quê? Normalmente não é encontrado no site ......?"
1006615-18 = "...... No salão do clube, você pode encontrar jogos quando fizer a limpeza?"
1006615-19 = "Ocasionalmente, é possível encontrar yuzu!"
1006615-24 = "(...... Na próxima vez, direi a ela que deve se organizar melhor)"
1006615-38 = "Uau! A Guildhouse foi limpa! #A propósito: ......"
1006615-43 = "Isso é lavanderia, não caracol ......? A #nSenior Nell disse que a lavanderia também é importante!"
1006615-44 = "Ainda tenho medo da Nell sênior. ......"
1006615-45 = "Também sei que ele é um homem muito gentil! Vamos #n então lavar, sensei! Onde está a máquina de lavar?"
1006615-46 = "Não? Não em uma placa de Petri? ......?"
1006615-47 = "Você não acha ...... que está usando roupas não lavadas há muito tempo? #nVocê não deve fazer isso!"
1006615-48 = "As armaduras que perderam a durabilidade precisam ser consertadas o mais rápido possível. Se ela #n quebrar e não puder mais ser usada, é um grande problema. ......"
1006615-49 = "[\"Não se preocupe, eu posso lavar a roupa. \""
1006615-50 = "O quê? ......?"
1006615-53 = "Estou vendo! Você pede isso na lavanderia? #n Alice, estou aliviado!"
1006615-54 = "...... n, senhor? #n White Brim ......? O que há de errado com o traje de gala da empregada?"
1006615-55 = "Oh, ...... verdade. Eu me sujei."
1006615-56 = "[\"Vamos lavar isso juntos também. \""
1006615-57 = "......"
1006615-58 = "Entendido. Então, por favor, faça isso."
1006615-59 = "Alice também tem um sobressalente!"
1006615-65 = "[ns] \"Você sempre o carrega com você? \""
1006615-67 = "Sim, porque é uma peça de equipamento muito importante! É o terceiro equipamento mais importante dos heróis das camareiras, então é claro."
1006615-68 = "[s]\"Três equipamentos principais de heróis de empregadas domésticas: ......? \""
1006615-69 = "O senhor não sabe, doutor? Alice vai lhe contar!"
1006615-70 = "O esfregão, o uniforme de empregada e a aba branca - esses são os três principais equipamentos que significam que uma empregada é corajosa."
1006615-71 = "Dessas, a aba branca é a mais importante!"
1006615-72 = "É uma armadura que protege a cabeça, que é o que mais precisa ser protegido!"
1006615-73 = "Se você se machucar, terá sérios problemas e, se ficar atordoado, não conseguirá fazer seu trabalho corretamente."
1006615-74 = "Assim, a Alice é reorientada toda vez que o usa!"
1006615-78 = "[ns] (Para começar, o que é uma empregada doméstica corajosa? ......)"
1006615-79 = "...... A preparação é importante."
1006615-80 = "Ele é invisível aos olhos e não pode ser tocado pela mão ......, mas sem ele Alice não saberia quem ela é."
1006615-81 = "A aba branca, que nos lembra quem somos, é uma peça importante do equipamento da #nAlice."
1006615-82 = "[\"De fato, a preparação é importante. ...... Alice é ótima. \""
1006615-83 = "Obrigada, doutor. Alice está feliz."
1006615-84 = "Mas ...... Alice ainda não chegou lá."
1006615-89 = "...... goonggoun--."
1006615-90 = "(A máquina de lavar roupa é ouvida vindo da lavanderia)."
1006615-92 = "Ainda sou inexperiente como empregada doméstica. Tornei-me mais hábil na limpeza, mas minhas habilidades de lavar roupas e cozinhar não estão à altura."
1006615-93 = "Mesmo agora, estamos perdendo para as lavanderias. ...... ugh!"
1006615-94 = "[s]\"Alice está se saindo bem o suficiente! \""
1006615-95 = "...... e como um homem corajoso, não estou à altura."
1006615-96 = "Alice quer que todos no mundo sejam felizes. #nEu quero um mundo onde ninguém fique triste ou sofra."
1006615-97 = "É ...... uma coisa muito difícil de fazer. #Não é fácil realizar \"grandes feitos\"."

1006615-98 = "Alice ainda é uma aprendiz ......, mas ainda quer proteger os entes queridos ao seu redor."
1006615-99 = "Por esse motivo: ......"
1006615-100 = "Isso requer não apenas uma força forte, mas também uma mente reta."
1006615-101 = "Alice será mais diligente!"
1006615-102 = "Para dominar tanto o papel de empregada quanto o de valente - e um dia se tornar uma verdadeira empregada valente!"
1006615-106 = "[ns] (O que diabos é um maid hero? ......)"
1006615-107 = "...... Alice acredita que a magia existe neste mundo."
1006615-109 = "Magic ...... tem como objetivo fazer as pessoas felizes."
1006615-114 = "E acredito que a coragem é tão importante quanto a magia."
1006615-119 = "O Courage ...... acredita que se trata de ver o mundo sob a mesma perspectiva daqueles que estão sofrendo."
1006615-124 = "O jogo é interessante porque permite que você veja o mundo do mesmo ponto de vista que os personagens, e o mundo é um lugar muito interessante para se estar."
1006615-125 = "O deserto é lindo porque todos nós podemos sonhar com um poço. ...... Isso foi lido em um livro ilustrado!"
1006615-130 = "Sensei. Alice quer saber mais sobre este mundo. #Quero vê-lo da mesma perspectiva que todos os outros."
1006615-135 = "Tenho certeza de que ...... talvez nem tudo seja bom e maravilhoso. #n...... um pouco, até mesmo assustador."
1006615-140 = "...... mas é por isso que queremos continuar. #nÉ isso que Alice acredita ser \"ser corajoso\"."

1006615-142 = "[ns] \"E se você ainda ficar com medo? \""
1006615-143 = "......"
1006615-144 = "Quando isso acontecer, peça ajuda ao seu sensei."
1006615-146 = "O sensei é o mascote da festa dos bravos."
1006615-147 = "Eles não podem lutar, mas sua presença no grupo aumenta o moral de seus companheiros."
1006615-148 = "Doutor..."
1006615-149 = "Você continuará a acompanhar Alice em suas aventuras?"
1006615-150 = "[s1] \"É claro, sou seu mascote! \"\n[s2] \"Eu estarei com você. "
1006615-153 = "Muito obrigado. Você é realmente um sensei! A #nAlice adora Senseies assim!"
1006615-158 = "(Nesse momento, eles ouviram a lavanderia terminar)"
1006615-160 = "Oh, parece que está pronto! A borda branca #n agora também está ...... limpa!"
1006615-165 = "Então, sensei, vamos à #nadventura mais uma vez com Alice, a aprendiz de empregada doméstica corajosa!"
1006615-169 = "[ns] (...... para descobrir do que se tratavam os heróis das empregadas domésticas)."
1006615-173 = "(Não é algo com que se preocupar agora, é?)"
1006615-175 = "(Depois voltamos devagar, de mãos dadas, para o outro lado da estrada)."
