[translation]
1006615-1 = "メイド勇者の装備"
1006615-2 = "今日は、ギルドハウスのお掃除をします！"
1006615-3 = "[s] \"ぎ、ギルド……？\""
1006615-4 = "ギルドはクエストの情報を教えてくれたり、パーティ結成を助けてくれる場所です！"
1006615-5 = "そういった情報は掲示板に載っているので……つまり、ここはギルドハウスなのです！"
1006615-6 = "ですが、依頼を紹介してくれる受付のお姉さんがいません……どうしましょう？"
1006615-10 = "あ、思いつきました！#nアリスが受付になれば解決です♪"
1006615-11 = "でも……今のアリスは見習いメイド勇者になったばかりなので、ジョブチェンジは……"
1006615-12 = "わーん先生！ピンチです！#nアリスを助けてください！"
1006615-13 = "[s] \"とりあえず、お掃除を始めよっか。\""
1006615-14 = "……"
1006615-15 = "そうでした！アリスは目的を忘れるところでした。"
1006615-16 = "それでは先生、一緒にお掃除をして、レベルアップしましょう！#nもしかしたら、隠しアイテムが見つかるかもしれません！"
1006615-17 = "え？普通は見つからない……？"
1006615-18 = "……部室では掃除をするとゲームが見つかりますよ？"
1006615-19 = "たまに、ユズが見つかることもあります！"
1006615-24 = "（……整理整頓はちゃんとしたほうが良いって今度伝えようかな）"
1006615-38 = "わあ！ギルドハウスがきれいになりました！#nところで……"
1006615-43 = "これはスネイル……ではなく、洗濯物ですね？#n洗濯も大切だとネル先輩が言っていました！"
1006615-44 = "ネル先輩のことは相変わらず怖いですが……"
1006615-45 = "とても優しい人だとも知っています！#nでは先生、洗っていきましょう！洗濯機はどこにありますか？"
1006615-46 = "えっ？シャーレにはないんですか……？"
1006615-47 = "まさか……洗ってない服をずっと着ていたんですか？#nそれはいけません！"
1006615-48 = "耐久度の落ちた鎧は早めに修理しないと。#n壊れて使えなくなってしまっては、一大事です……。"
1006615-49 = "[s] \"大丈夫、洗濯ならできるよ。\""
1006615-50 = "え……？"
1006615-53 = "なるほど！コインランドリーで依頼するのですね。#nアリス、安心しました！"
1006615-54 = "……ん、先生？#nホワイトブリム……？メイドのカチューシャがどうかしましたか？"
1006615-55 = "あっ……本当です。汚れてしまいました。"
1006615-56 = "[s] \"それも一緒に洗おう。\""
1006615-57 = "……"
1006615-58 = "分かりました。それではお願いします。"
1006615-59 = "アリスには予備もありますので！"
1006615-65 = "[ns] \"いつも持ち歩いているの？\""
1006615-67 = "はい！メイド勇者の3大装備ですから、当然です。"
1006615-68 = "[s] \"メイド勇者の3大装備……？\""
1006615-69 = "ご存じないのですか、先生？アリスが教えてあげましょう！"
1006615-70 = "モップ、メイド服、そしてホワイトブリム――これらがメイド勇者であることを表す3大装備なのです。"
1006615-71 = "中でも、ホワイトブリムは一番重要です！"
1006615-72 = "一番守らないといけない頭を保護してくれる武具、ですから！"
1006615-73 = "怪我をしたら大変なことになりますし、ぼんやりしてしまったらお仕事がちゃんとできなくなっちゃいます。"
1006615-74 = "なので、アリスは装着するたびに気合を入れ直しているのです！"
1006615-78 = "[ns] （そもそもメイド勇者ってなんだろう……）"
1006615-79 = "……心構えは大切です。"
1006615-80 = "目には見えない、手で触れることもできない……でも、それがないとアリスは自分が何者なのか分からなくなってしまいます。"
1006615-81 = "自身が何者なのかを思い出させてくれるホワイトブリムは、#nアリスにとって大切な装備なのです。"
1006615-82 = "[s] \"たしかに心構えは大切……アリスはえらいね。\""
1006615-83 = "ありがとうございます、先生。アリスは嬉しいです。"
1006615-84 = "でも……アリスはまだまだです。"
1006615-89 = "……ゴウンゴウン――。"
1006615-90 = "（コインランドリーから洗濯機の音が聞こえる）"
1006615-92 = "メイドとしてはまだまだ未熟です。#nお掃除の熟練度は上がりましたが、洗濯や料理のスキルは一人前と言えません。"
1006615-93 = "今だって、コインランドリーに負けています……うぅ！"
1006615-94 = "[s] \"アリスは十分頑張ってるよ！\""
1006615-95 = "……それに勇者としても、至らないところばかりです。"
1006615-96 = "アリスは、世界中の人に幸せでいてほしいです。#n誰も悲しんだり、苦しんだりしない、そんな世界がいいです。"
1006615-97 = "それは……とても難しいことです。#n「偉業」は簡単に成し遂げられるものではありません。"
1006615-98 = "アリスはまだ見習いですが……それでも、周囲にいる大切な人を守りたいと思っています。"
1006615-99 = "そのために……"
1006615-100 = "強い力だけでなく、真っ直ぐな心が必要です。"
1006615-101 = "アリスはもっと精進します！"
1006615-102 = "メイドと勇者の両方を極めて――いつか、本物のメイド勇者になるために！"
1006615-106 = "[ns] （メイド勇者って、一体……）"
1006615-107 = "……この世に魔法は存在すると、アリスは思っています。"
1006615-109 = "魔法……それは人を幸せにすることです。"
1006615-114 = "そして、勇気も魔法と同じくらい大切だと思っています。"
1006615-119 = "勇気……それは苦しんでいる人と同じ視点で世界を見ること、だと思っています。"
1006615-124 = "ゲームが面白い理由は、キャラクターと同じ視点で世界を見ることができるから――"
1006615-125 = "砂漠が美しい理由は、井戸を皆で夢見ることができるから……これは、絵本で読みました！"
1006615-130 = "先生。アリスはこの世界のことを、もっと知りたいんです。#n他のみんなと同じ目線で、見ていきたいんです。"
1006615-135 = "きっと……素敵なもの、素晴らしいものばかりではないのかもしれません。#n……少し、怖くもあります。"
1006615-140 = "……でも、だからこそ進んでいきたいんです。#nそれが「勇気を出すこと」だと、アリスは思っています。"
1006615-142 = "[ns] \"それでも怖くなったら、どうするの？\""
1006615-143 = "……"
1006615-144 = "そのときは、先生に助けを求めます。"
1006615-146 = "先生は勇者パーティーのマスコットですから。"
1006615-147 = "戦闘はできませんが、パーティにいることで仲間の士気を上昇させてくれます。"
1006615-148 = "先生――"
1006615-149 = "これからもアリスの冒険に、付き合ってくれますか？"
1006615-150 = "[s1] \"もちろん、マスコットだからね！\"\n[s2] \"一緒にいるよ。\""
1006615-153 = "ありがとうございます。さすが先生です！#nアリスはそんな先生が大好きです！"
1006615-158 = "（ちょうどそのとき、洗濯の完了音が聞こえた）"
1006615-160 = "あ、終わったみたいです！#nホワイトブリムも……きれいになりました！"
1006615-165 = "それでは先生、見習いメイド勇者のアリスと#nもう一度、冒険に出かけましょう！"
1006615-169 = "[ns]（メイド勇者が一体なんだったのかは……）"
1006615-173 = "[ns]（今は気にすることじゃないね）"
1006615-175 = "（その後、遥か道の向こうを目指して、手をつないでゆっくり帰った）"
