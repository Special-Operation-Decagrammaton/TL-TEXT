[translation]
83300200200-6 = "な、何これ！？"
83300200200-7 = "せめて前もって事情を説明しておくべきでしょ！"
83300200200-8 = "私たちのことはどうだっていいの！？"
83300200200-9 = "そうですよ！フウカ先輩の気持ちを考えないなんて！"
83300200200-10 = "ううっ、どうしよう……"
83300200200-16 = "フウカ、ちょっと聞きたいことがあるんだけど……"
83300200200-17 = "あれ、どうしたの風紀委員長？"
83300200200-18 = "ゲヘナのパーティーについて、何か知らないかなと思って。"
83300200200-19 = "ゲヘナのパーティー……"
83300200200-20 = "そう！今まさに、そのパーティーのせいで頭を抱えてるの！"
83300200200-21 = "本当に、どうしてこうなったのか……"
83300200200-22 = "またトラブルに巻き込まれたのね……"
83300200200-23 = "5日後にパーティーを開くから、そこで出す料理を全部用意しろって言われて！"
83300200200-24 = "まったく、あり得ませんね！"
83300200200-25 = "しかも、それだけじゃないの！"
83300200200-26 = "私たちに何も知らせず大量の食材を勝手に発注して！"
83300200200-28 = "食材……？"
83300200200-29 = "うう……今年のパーティーは給食部に料理を任せたいとかいってくるし。"
83300200200-30 = "本当にやらないといけないの？どうしてこうなったの？せっかくのバレンタインデーなんだから、少しくらい休ませてくれてもいいでしょ！？"
83300200200-31 = "そうです！フウカ先輩にもお休みをくれたっていいじゃないですか！"
83300200200-32 = "でも……もしもの時は私に任せてください、先輩！"
83300200200-33 = "先輩がゆっくり休めるように、私が一人で頑張りますから！"
83300200200-34 = "その、ジュリの気持ちは嬉しいけど……そうすると余計に問題が大きく……"
83300200200-39 = "（……どんな食材を大量に発注したんだろう）"
83300200200-42 = "フウカ、食材を見てもいい？"
83300200200-43 = "それならそこにあるから、好きに見ていいよ。委員長なら信頼できるし……"
83300200200-44 = "そう言ってもらえるのは嬉しいけど、信用できない人も居るってこと？"
83300200200-45 = "それは、まあ……美食研究会とか美食研究会とか美食研究会は、食材を前にしたら何をしでかすか分からないから！"
83300200200-46 = "……大変だったわね。"
