[translation]
83300200200-6 = "M-mas o que é isso!?"
83300200200-7 = "Pelo menos deveriam ter explicado a situação com antecedência!"
83300200200-8 = "Não se importam nem um pouco com a gente!?"
83300200200-9 = "É verdade! Como podem não pensar nos sentimentos da Fuuka-senpai!"
83300200200-10 = "Ugh, o que eu faço..."
83300200200-16 = "Fuuka, eu queria te perguntar uma coisa..."
83300200200-17 = "Ah, o que houve, Presidente do Comitê Disciplinar?"
83300200200-18 = "Eu estava pensando se você sabe algo sobre a festa de Gehenna."
83300200200-19 = "A festa de Gehenna..."
83300200200-20 = "Exatamente! É por causa dessa festa que estou com tanta dor de cabeça agora!"
83300200200-21 = "Sério, como as coisas chegaram a esse ponto..."
83300200200-22 = "Você se meteu em problemas de novo, hein..."
83300200200-23 = "Me disseram para preparar toda a comida para a festa que vai acontecer daqui a 5 dias!"
83300200200-24 = "Francamente, isso é inaceitável!"
83300200200-25 = "E não é só isso!"
83300200200-26 = "Pediram uma quantidade enorme de ingredientes sem nos avisar nada!"
83300200200-28 = "Ingredientes...?"
83300200200-29 = "Ugh... e ainda vieram dizer que querem que o Clube de Merenda cuide da comida da festa deste ano."
83300200200-30 = "Será que eu realmente tenho que fazer isso? Por que as coisas ficaram assim? É o Dia dos Namorados, podiam pelo menos me deixar descansar um pouco, não acham!?"
83300200200-31 = "É isso mesmo! Podiam muito bem dar uma folga para a Fuuka-senpai!"
83300200200-32 = "Mas... se acontecer alguma coisa, pode deixar comigo, senpai!"
83300200200-33 = "Eu me esforçarei sozinha para que você possa descansar tranquilamente!"
83300200200-34 = "Bem, eu fico feliz com a intenção da Juri, mas... se você fizer isso, o problema só vai ficar maior..."
83300200200-39 = "(...Que tipo de ingredientes será que pediram em tanta quantidade?)"
83300200200-42 = "Fuuka, posso dar uma olhada nos ingredientes?"
83300200200-43 = "Se é isso, estão ali, pode olhar à vontade. Eu confio em você, Presidente..."
83300200200-44 = "Fico feliz em ouvir isso, mas quer dizer que tem gente em quem você não confia?"
83300200200-45 = "Bem, é que... o Clube de Pesquisa Gastronômica, o Clube de Pesquisa Gastronômica e o Clube de Pesquisa Gastronômica não sabem o que podem fazer quando veem ingredientes pela frente!"
83300200200-46 = "...Deve ter sido difícil para você."
