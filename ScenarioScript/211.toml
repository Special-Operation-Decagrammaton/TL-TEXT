[translation]
211-1 = "O Fim da História de Fantasma"
211-4 = "Hum... ora, ora, eu me perguntava quem teria se perdido no caminho desta vez... mas tinha que ser você?"
211-5 = "Ah... hum, então é isso."
211-6 = "Comparado à tragédia diante dos seus olhos..."
211-7 = "Um encontro comigo não passa de uma simples história de fantasma... não é nada tão estranho assim, suponho."
211-8 = "…………."
211-9 = "Ho... o que isso significa, você pergunta?"
211-10 = "Você também sabe, não sabe? O que aconteceu ali."
211-11 = "O palco de um festival barulhento e alegre... e a 'ajuda' que foi necessária nas sombras."
211-12 = "Nascida da malícia das pessoas, usada, descartada... e assim, um fragmento de história que foi abandonado."
211-13 = "— Seu nome é, das Cem Histórias de Fantasmas de Hyakkiyako, 'Kurokage, o Gato Fantasma'."
211-14 = "Mesmo neste exato momento, ele queima a terra de onde as pessoas partiram, soltando lamentos..."
211-15 = "Uma história de fantasma que nunca chega ao fim."
211-17 = "Tudo isso nasceu do jogo de tecer cem histórias diante de uma chama acesa na calada da noite."
211-18 = "…Muito bem, Sensei. Nosso encontro aqui deve ser obra do destino."
211-19 = "Será que você seria capaz de conduzir esta triste história de fantasma ao seu devido fim...?"
211-20 = "…Estou ansiosa por isso, fufu."
