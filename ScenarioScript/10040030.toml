[translation]
10040030-1 = "第3話;我慢なんてできません！"
10040030-5 = "え……？"
10040030-6 = "こ、これは……！？"
10040030-7 = "[ns1] \"出たの？\"\n[ns2] \"どんなカード？\""
10040030-10 = "すごい！すごいです！！#n見てください、先生！！"
10040030-11 = "こ、このスキル、強すぎません！？#nめちゃくちゃインフレしちゃってますよ！にははは！！"
10040030-12 = "やっぱ先生を呼んで正解でしたね！#nおかげでこんなにツキが回ってきてくれました！"
10040030-13 = "……え、関係あるのかって？#nもちろんありますよ！！"
10040030-14 = "一人で開封してたら、もっとひどい引きだったはずですからね！"
10040030-15 = "先生を呼んで運気を高め、パックを開封する完璧な作戦……#nふっふっふっ、さすがは私。"
10040030-16 = "使えるものは他人の運でもなんでも使う！そうすれば不可能なんてないんです！"
10040030-17 = "だから私にはどんな解だって、導き出せちゃうんです！にはははは！"
10040030-18 = "[s3] \"コユキにとって、私は幸運の象徴なんだね。\"\n[s4] \"何だか嬉しいよ。\""
10040030-21 = "もちろんですよ！#nだから恩返し、しなきゃなって！"
10040030-22 = "なので、その……。"
10040030-26 = "……これ、あげます！"
10040030-27 = "[s5] \"……私にくれるの？\"\n[s6] \"コユキは使わないの？\""
10040030-30 = "まあ、ちょっと惜しい気持ちはありますけど……。"
10040030-31 = "私には他のもありますし。#nなにより、先生が来てくれたおかげで出たカードですから。"
10040030-32 = "だからこれはあげます！#nそのかわり、次の開封式も来てくださいね！！"
10040030-33 = "そのカードは私たち二人の絆……約束の象徴ってわけです！！"
10040030-34 = "[s7] \"コユキ……！\"\n[s8] \"……ありがとう、大切にするね。\""
10040030-37 = "にはははは……先生にはお世話になってますし、まぁたまには。"
10040030-41 = "……ん？"
10040030-42 = "どうしてこんな時間に……。"
10040030-43 = "[s9] \"うん？\"\n[s10] \"何か異常が？\""
10040030-46 = "この建物に誰か出入りしましたね。#n人感センサーでブザーが鳴る設定になっているんです。"
10040030-47 = "ふっふっふっ。反省部屋で快適な生活を送るのなら、セキュリティシステムは万全にしないといけないでしょう？"
10040030-48 = "でもおかしいですね。こんな時間に一体誰が……。"
10040030-49 = "カメラで見てみますか！"
10040030-50 = "どれどれ……。"
10040030-54 = "……？"
10040030-55 = "え、ええええええ……！？"
10040030-56 = "[ns11] \"……コユキ？\"\n[ns12] \"どうしたの？\""
10040030-59 = "ど……。"
10040030-60 = "どうして先輩たちが！？"
10040030-61 = "[ns13] \"ユウカとノア！？\"\n[ns14] \"帰ったんじゃなかったの！？\""
10040030-64 = "そ、想定外なんですけど！？#nなんで？どうして？なんのために……！？"
10040030-65 = "と、とりあえずカードを隠さなきゃ……！！"
10040030-66 = "せ、先生は……どうしましょう……！？"
10040030-67 = "[s15] \"早く逃げないと！\"\n[s16] \"ここにいるのがバレたら……！\""
10040030-70 = "やっぱりバレたら……マズいですよね……。"
10040030-71 = "言い訳も思いつきませんし……。"
10040030-72 = "となると……。"
10040030-77 = "……先生！"
10040030-78 = "ここです！ここなら大丈夫です！！"
10040030-79 = "早く隠れてください！"
10040030-80 = "それで先輩たちの隙を見計らって、逃げてください！"
10040030-81 = "それしか手はないです！"
10040030-82 = "……不安ですか？"
10040030-83 = "大丈夫ですって！"
10040030-84 = "私がいるんですから、何とでもなります！"
10040030-85 = "だから隠れて！もう時間ないですよ！"
10040030-89 = "はやく！"
10040030-100 = "あ、あれぇ！？#nこれはこれは……！"
10040030-101 = "先輩がたじゃないですか。どうしてここに……？"
10040030-103 = "……何よ、そんなに驚くことないじゃない。"
10040030-104 = "年末に一人ぼっちのコユキちゃんのために、#nユウカちゃんが一肌脱いでくれたんですよ。"
10040030-105 = "ここから出すわけにはいきませんけど……。"
10040030-106 = "一緒にパジャマパーティーならできますよね。"
10040030-107 = "そういうこと。ほんと、世話の焼ける後輩なんだから。"
10040030-108 = "はい、これに着替えて。"
10040030-112 = "何ですか、これ。"
10040030-116 = "……パジャマ？"
10040030-117 = "可愛いですよね。ユウカちゃんが選んだんですよ。"
10040030-118 = "そ、そうは言ってないじゃない……！"
10040030-122 = "……？"
10040030-123 = "あんまり嬉しくなさそうね……。"
10040030-124 = "い、いえ！#nすっごく嬉しいです！！"
10040030-125 = "と、ところで……#nえっと、お二人は今日、ここに泊まってく感じです？"
10040030-126 = "そうだけど、なんか嫌そうね。せっかく来てあげたのに。"
10040030-128 = "喜んでもらえると思っていたのですが……。"
10040030-129 = "……あら。"
10040030-133 = "ふふっ……"
10040030-137 = "……そういうこと、でしたか。"
10040030-138 = "ノア……？"
10040030-139 = "……ここは任せてください、ユウカちゃん。"
10040030-144 = "何か隠してますね、コユキちゃん？"
10040030-145 = "……な、なんのことでしょう？"
10040030-146 = "……そこの段ボール、さっきと位置が違いますよね？"
10040030-147 = "……へ？"
10040030-148 = "ど、どうしてそんなこと覚えてるんですか！"
10040030-153 = "また何か隠してるのね！#n退きなさい、コユキ！"
10040030-154 = "ま、まずいっ！お願いします、先輩！これだけは……！#n来年まででいいので……！"
10040030-155 = "なんで来年の話になるのよ……！"
10040030-162 = "……これは？"
10040030-163 = "カード……？"
10040030-164 = "え、えっと……その、ですね……。"
10040030-166 = "……これを隠してたんですね？"
10040030-167 = "…………。"
10040030-173 = "コ～ユ～キ～！"
10040030-184 = "うあああああぁぁぁっ！"
10040030-188 = "それだけは許してください！そのカード、マジで高いんですよ……！"
10040030-194 = "あ、ああああ！お願いしますお願いしますお願いします！！"
10040030-195 = "あんたねぇ……反省する気全然ないじゃない！？"
10040030-201 = "あ、ああああああああっ！"
10040030-202 = "き、緊急脱出！"
10040030-209 = "ちょっと！待ちなさいってば！"
10040030-213 = "ごめんノア、手伝って！"
10040030-214 = "あの子、パジャマ持って逃げたわ！！"
10040030-218 = "ふふっ。年末だというのに、こうなっちゃいましたか。"
10040030-219 = "思いがけないことが起こると、つい胸が弾んじゃいますね。"
10040030-226 = "[ns] \"コユキ……。\""
10040030-228 = "[ns17] \"……忘れないよ。\"\n[ns18] コユキの幸運を祈る。"
10040030-232 = "[ns] \"今のうちに脱出しないと……。\""
10040030-235 = "[ns19] \"……あれ、ドアに鍵が？\"\n[ns20] \"こっちもだ……。\""
10040030-241 = "……事情はだいたい分かってます。"
10040030-242 = "パジャマパーティーをすると聞いて動向をうかがっていましたが……#nまさか、先生もご一緒だったなんて。"
10040030-246 = "……これは予想外ですが、テンションが上がってきました。"
10040030-247 = "[s21] \"コタマ！？\"\n[s22] \"どうして私の居場所を？\""
10040030-250 = "もちろん盗聴――ではなく、ヴェリタスの技術を活用したまでです。"
10040030-251 = "見たところ、反省部屋のドアが開かなくて困っているようですね。"
10040030-252 = "反省部屋は問題児を閉じ込めるために造られた施設――#nですので内側からは開かないようオートロックが掛かっています。"
10040030-253 = "コユキさんなら簡単に解除できるでしょうけど……#n自力での脱出なんて普通は不可能です。"
10040030-254 = "……ですが、ご心配なく。"
10040030-255 = "ミレニアムの外まで安全に脱出できるルートを、#n私たちがご案内します。"
10040030-256 = "[s] \"……ほかにも誰かいるの？\""
10040030-257 = "はい、隣にハレが。"
10040030-258 = "副部長も認める天才ハッカーが協力するのですから。#nセキュリティシステムをかいくぐって無事脱出できるはずです。"
10040030-259 = "待って、コタマ先輩。#nこれ以上トラブルは起こさないほうが……。"
10040030-261 = "[ns23] \"……また盗聴してたの。\"\n[ns24] \"コタマ、今回ばかりは私も――\""
10040030-264 = "……そういえば、シャーレの年末調整が未提出のようですね。"
10040030-265 = "出すものも出さず、反省部屋で遊んでいただなんて話がユウカさんの耳に入ったら……。"
10040030-266 = "ずいぶん賑やかな年越しになりそうですね。"
10040030-270 = "[ns] \"……何が欲しいの？\""
10040030-271 = "先生の声を録音したモーニングコール、十種類。"
10040030-272 = "台本はこちらで用意します。#n先生は収録にご協力いただくだけで構いません。"
10040030-273 = "これならハレも協力してくれますよね。"
10040030-274 = "先生の声で目を覚ませるのは、たしかに魅力的な提案だけど……。"
10040030-276 = "[ns25] \"他に手はなさそうだし……。\"\n[ns26] \"……ちゃんとお説教もするからね。\""
10040030-279 = "約束は守ってくださいね。"
10040030-280 = "ハレ、反省部屋のロックを解除してください。"
10040030-281 = "本当に良いのかな……。"
10040030-290 = "とりあえず、解除できたよ。"
10040030-291 = "気をつけて移動してね、先生。#nコユキが逃げてるから、追加のセキュリティシステムが稼働してる。"
10040030-292 = "それと、もし誰かに遭遇しちゃったら……#nハッキングじゃ助けられないから。"
10040030-293 = "ひとまず廊下に出て、私たちがいる休憩室まで来てください。#n誰かが近づいたら、すぐに報告します。"
10040030-294 = "先生の周囲で鳴る音は全て把握していますから。ふふっ……。"
10040030-295 = "[s27] \"盗聴器の数、おかしくない！？\"\n[s28] \"あとで本当にお説教だからね！\""
10040030-298 = "先生の生声を聞けるなら、甘んじて受け入れますよ。"
10040030-299 = "……今のも悪くないですね。モーニングコールの台本に、罵倒セリフも入れましょうか。"
10040030-300 = "悠長に話してる場合じゃないみたい。#n誰かがそっちに向かってるよ、先生。"
10040030-301 = "すぐにそこを離れて。"
