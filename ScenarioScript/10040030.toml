[translation]
10040030-1 = "Episódio 3: Eu não consigo me segurar!"
10040030-5 = "Eh...?"
10040030-6 = "I-Isso é...!?"
10040030-7 = "[ns1] \"Saiu?\"\n[ns2] \"Que tipo de carta é?\""
10040030-10 = "Incrível! É incrível!!#nOlhe só, Sensei!!"
10040030-11 = "E-Essa habilidade, não é forte demais!?#nEstá completamente desbalanceada! Ni-haha!"
10040030-12 = "Eu sabia que chamar o Sensei era a escolha certa!#nGraças a isso, a sorte veio toda para o meu lado!"
10040030-13 = "...Eh, se tem relação?#nClaro que tem!!"
10040030-14 = "Se eu tivesse aberto sozinha, com certeza teria tirado algo muito pior!"
10040030-15 = "Chamar o Sensei para aumentar a sorte e abrir os pacotes, o plano perfeito...#nFufufu, como esperado de mim."
10040030-16 = "Se algo pode ser usado, eu uso, seja a sorte dos outros ou o que for! Assim, não existe nada impossível!"
10040030-17 = "Por isso, eu consigo encontrar a solução para qualquer coisa! Ni-hahaha!"
10040030-18 = "[s3] \"Para a Koyuki, eu sou um símbolo de sorte, então.\"\n[s4] \"De certa forma, fico feliz.\""
10040030-21 = "Claro que sim!#nPor isso, eu tenho que retribuir o favor!"
10040030-22 = "Então, sabe..."
10040030-26 = "...Tome, é para você!"
10040030-27 = "[s5] \"...Vai me dar?\"\n[s6] \"A Koyuki não vai usar?\""
10040030-30 = "Bem, eu sinto um pouco de pena, mas..."
10040030-31 = "Eu tenho outras. E, acima de tudo, essa carta só apareceu porque o Sensei veio."
10040030-32 = "Então, fique com ela!#nEm troca, venha para a próxima sessão de abertura também!!"
10040030-33 = "Essa carta é o nosso laço... o símbolo da nossa promessa!!"
10040030-34 = "[s7] \"Koyuki...!\"\n[s8] \"...Obrigado, vou cuidar bem dela.\""
10040030-37 = "Ni-hahaha... O Sensei sempre cuida de mim, então, bem, de vez em quando..."
10040030-41 = "...Hm?"
10040030-42 = "Por que a essa hora..."
10040030-43 = "[s9] \"Hm?\"\n[s10] \"Alguma anormalidade?\""
10040030-46 = "Alguém entrou ou saiu deste prédio.#nEu configurei o sensor de presença para soar um alarme."
10040030-47 = "Fufufu. Se é para viver uma vida confortável na sala de reflexão, o sistema de segurança precisa ser impecável, não é?"
10040030-48 = "Mas é estranho. Quem poderia ser a essa hora..."
10040030-49 = "Vamos ver pela câmera!"
10040030-50 = "Vejamos..."
10040030-54 = "...?"
10040030-55 = "E, eeeeeee...!?"
10040030-56 = "[ns11] \"...Koyuki?\"\n[ns12] \"O que houve?\""
10040030-59 = "Po..."
10040030-60 = "Por que as veteranas estão aqui!?"
10040030-61 = "[ns13] \"Yuuka e Noa!?\"\n[ns14] \"Elas não tinham ido embora!?\""
10040030-64 = "I-Isso é inesperado!?#nPor quê? Como? Para que propósito...!?"
10040030-65 = "P-Primeiro, preciso esconder as cartas...!!"
10040030-66 = "E o Sensei... o que eu faço...!?"
10040030-67 = "[s15] \"Temos que fugir logo!\"\n[s16] \"Se descobrirem que estamos aqui...!\""
10040030-70 = "Se descobrirem, vai dar ruim, né..."
10040030-71 = "E eu nem consigo pensar em uma desculpa..."
10040030-72 = "Sendo assim..."
10040030-77 = "...Sensei!"
10040030-78 = "Aqui! Aqui é seguro!!"
10040030-79 = "Esconda-se rápido!"
10040030-80 = "E então, aproveite uma brecha das veteranas e fuja!"
10040030-81 = "É a única saída!"
10040030-82 = "...Está preocupado?"
10040030-83 = "Eu disse que está tudo bem!"
10040030-84 = "Já que eu estou aqui, tudo vai dar certo!"
10040030-85 = "Então se esconda! Não temos mais tempo!"
10040030-89 = "Rápido!"
10040030-100 = "H-hein!?#nOra, ora...!"
10040030-101 = "Não são os veteranos? Por que vocês estão aqui...?"
10040030-103 = "...O que foi? Não precisa ficar tão surpresa assim."
10040030-104 = "A Yuuka-chan se esforçou bastante para ajudar a Koyuki-chan, que estava sozinha no fim de ano."
10040030-105 = "Embora eu não possa deixar você sair daqui..."
10040030-106 = "Podemos fazer uma festa do pijama juntas, não podemos?"
10040030-107 = "É isso mesmo. Sério, você é uma kouhai que dá trabalho."
10040030-108 = "Aqui, vista isto."
10040030-112 = "O que é isso?"
10040030-116 = "...Um pijama?"
10040030-117 = "É fofo, não é? A Yuuka-chan que escolheu."
10040030-118 = "E-eu não disse nada disso...!"
10040030-122 = "...?"
10040030-123 = "Você não parece muito feliz..."
10040030-124 = "N-não, é que!#nEu estou muito feliz!!"
10040030-125 = "A-a propósito...#nBem, vocês duas pretendem dormir aqui hoje?"
10040030-126 = "Sim, mas você parece meio incomodada. E olha que a gente veio especialmente para te ver."
10040030-128 = "Eu pensei que você ficaria feliz..."
10040030-129 = "...Ora."
10040030-133 = "Fufu..."
10040030-137 = "...Então era isso."
10040030-138 = "Noa...?"
10040030-139 = "...Deixe comigo, Yuuka-chan."
10040030-144 = "Você está escondendo algo, não está, Koyuki-chan?"
10040030-145 = "...D-do que você está falando?"
10040030-146 = "...Aquela caixa de papelão ali, a posição dela está diferente de antes, não está?"
10040030-147 = "...Hã?"
10040030-148 = "P-por que você lembra de uma coisa dessas!"
10040030-153 = "Você está escondendo algo de novo!#nSaia da frente, Koyuki!"
10040030-154 = "D-droga! Por favor, veteranos! Só isso não...!#nPode ser até o ano que vem...!"
10040030-155 = "Por que você está falando do ano que vem...!?"
10040030-162 = "...O que é isso?"
10040030-163 = "Um cartão...?"
10040030-164 = "B-bem... é que..."
10040030-166 = "...Então era isso que você estava escondendo?"
10040030-167 = "............"
10040030-173 = "Ko~yu~ki~!"
10040030-184 = "Uaaaaaaaah!"
10040030-188 = "Só isso, por favor, me perdoem! Esse cartão é muito caro...!"
10040030-194 = "A-aaaaah! Por favor, por favor, por favor!!"
10040030-195 = "Você, hein... você não tem a menor intenção de se arrepender, não é!?"
10040030-201 = "A-aaaaaaaaah!"
10040030-202 = "E-evasão de emergência!"
10040030-209 = "Ei! Eu disse para esperar!"
10040030-213 = "Desculpe, Noa, me ajude!"
10040030-214 = "Aquela garota fugiu levando o pijama!!"
10040030-218 = "Fufu. Mesmo sendo fim de ano, chegamos a esse ponto, hein."
10040030-219 = "Quando coisas inesperadas acontecem, meu coração acaba disparando."
10040030-226 = "[ns] \"Koyuki...\""
10040030-228 = "[ns17] \"...Não vou te esquecer.\"\n[ns18] Rezar pela sorte de Koyuki."
10040030-232 = "[ns] \"Precisamos escapar enquanto é tempo...\""
10040030-235 = "[ns19] \"...Ué, a porta está trancada?\"\n[ns20] \"Aqui também...\""
10040030-241 = "...Eu entendo a situação mais ou menos."
10040030-242 = "Ouvi dizer que vocês fariam uma festa do pijama e estava monitorando os movimentos, mas...#nquem diria que o Sensei também estaria junto."
10040030-246 = "...Isso é inesperado, mas estou ficando empolgada."
10040030-247 = "[s21] \"Kotama!?\"\n[s22] \"Como você sabe onde eu estou?\""
10040030-250 = "Claro que não foi grampo, apenas utilizei a tecnologia da Veritas."
10040030-251 = "Pelo visto, vocês estão com problemas porque a porta da sala de reflexão não abre."
10040030-252 = "A sala de reflexão é uma instalação feita para trancar alunos problemáticos...#npor isso, ela possui um travamento automático que não abre por dentro."
10040030-253 = "A Koyuki provavelmente conseguiria desbloquear facilmente, mas...#nnormalmente, é impossível escapar por conta própria."
10040030-254 = "...Mas não se preocupem."
10040030-255 = "Nós vamos guiar vocês por uma rota segura para escapar de dentro da Millennium."
10040030-256 = "[s] \"...Tem mais alguém aí?\""
10040030-257 = "Sim, a Hare está aqui comigo."
10040030-258 = "Já que uma hacker genial, reconhecida até pela vice-presidente, vai colaborar...#ncom certeza conseguiremos passar pelo sistema de segurança e escapar em segurança."
10040030-259 = "Espera, Kotama-senpai. #nNão seria melhor não causar mais problemas...?"
10040030-261 = "[ns23] \"...Você estava grampeando de novo?\"\n[ns24] \"Kotama, desta vez eu também vou...\""
10040030-264 = "...Falando nisso, parece que o ajuste de fim de ano do Schale ainda não foi entregue."
10040030-265 = "Se a Yuuka-san souber que você estava brincando na sala de reflexão em vez de entregar o que devia..."
10040030-266 = "Parece que vai ser uma virada de ano bem agitada, não é?"
10040030-270 = "[ns] \"...O que você quer?\""
10040030-271 = "Dez tipos de despertadores com a voz do Sensei gravada."
10040030-272 = "Eu prepararei o roteiro. #nO Sensei só precisa colaborar com a gravação."
10040030-273 = "Assim a Hare também vai colaborar, certo?"
10040030-274 = "Acordar com a voz do Sensei é uma proposta tentadora, mas..."
10040030-276 = "[ns25] \"Não parece ter outro jeito...\"\n[ns26] \"...Eu também vou te dar uma bronca de verdade, viu.\""
10040030-279 = "Por favor, cumpra sua promessa."
10040030-280 = "Hare, por favor, desbloqueie a sala de reflexão."
10040030-281 = "Será que isso é realmente uma boa ideia...?"
10040030-290 = "Por enquanto, consegui desbloquear."
10040030-291 = "Cuidado ao se mover, Sensei. #nComo a Koyuki fugiu, sistemas de segurança adicionais foram ativados."
10040030-292 = "E, se vocês encontrarem alguém... #nnão poderei ajudar com hackeamento."
10040030-293 = "Primeiro, saiam para o corredor e venham até a sala de descanso onde estamos. #nSe alguém se aproximar, eu aviso imediatamente."
10040030-294 = "Eu monitoro todos os sons ao redor do Sensei. Fufu..."
10040030-295 = "[s27] \"A quantidade de escutas não está normal!?\"\n[s28] \"Depois eu vou te dar uma bronca de verdade!\""
10040030-298 = "Se for para ouvir a voz ao vivo do Sensei, aceitarei de bom grado."
10040030-299 = "...Essa última parte também não foi ruim. Vamos adicionar falas de bronca ao roteiro do despertador?"
10040030-300 = "Parece que não temos tempo para conversar calmamente. #nTem alguém indo na direção de vocês, Sensei."
10040030-301 = "Saiam daí imediatamente."
