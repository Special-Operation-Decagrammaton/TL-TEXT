[translation]
80000078-1 = "Chocolate da Godiva"
80000078-2 = "Em algum lugar do mercado negro"
80000078-3 = "（Recebi uma mensagem da Saori e fui apressado até o local indicado）"
80000078-4 = "Sensei, você veio."
80000078-5 = "Que bom, consegui te encontrar antes que o \"hoje\" acabasse."
80000078-6 = "[s] \"Saori, você está bem!?\""
80000078-7 = "Ah... não é nada demais."
80000078-8 = "...Embora, com essa aparência, não pareça muito convincente."
80000078-9 = "Mas para alcançar o objetivo, foi algo inevitável."
80000078-10 = "[s] \"Objetivo...!?\""
80000078-11 = "Exatamente como ouviu."
80000078-12 = "...Aqui, aceite isto."
80000078-17 = "[ns] \"...Chocolate? E um muito caro, por sinal...\""
80000078-18 = "Ah, hoje é o Dia dos Namorados, não é?"
80000078-19 = "Ouvi dizer que é um dia para expressar seus sentimentos"
80000078-20 = "através de chocolates para aqueles a quem você deve gratidão."
80000078-21 = "[s1] \"É verdade, mas...\"\n[s2] \"Mas por que você se machucou tanto por causa disso...\""
80000078-22 = "...Foi um trabalho um pouco mais difícil que o habitual, só isso."
80000078-23 = "...Foi um trabalho um pouco mais difícil que o habitual, só isso."
80000078-24 = "Mas quem diria que existem chocolates tão caros no mundo."
80000078-25 = "Ouvi dizer que, para expressar gratidão, o melhor chocolate é o ideal..."
80000078-26 = "Caso contrário, não seria um retorno à altura."
80000078-27 = "Pelo contrário, dizem que algo mediano pode ser interpretado como uma declaração de \"rompimento de laços\"."
80000078-28 = "Dizem até que, às vezes, presentear com um chocolate barato é usado como uma forma de declaração de guerra."
80000078-29 = "O senso comum do \"mundo exterior\" é complicado..."
80000078-30 = "Mas, já que decidi viver aqui, #npreciso seguir esses costumes."
80000078-31 = "É por isso, Sensei."
80000078-32 = "O que acha? Meus sentimentos foram transmiti..."
80000078-33 = "...P-por que está com essa cara?"
80000078-34 = "[s] \"Quem foi que...\""
80000078-35 = "？"
80000078-36 = "[s] \"Quem foi que contou essa piada de mau gosto para a Saori!?\""
80000078-37 = "S-Sensei...!?"
80000078-39 = "E-entendo... Então eu entendi tudo errado novamente."
80000078-40 = "Acabei te causando problemas, peço desculpas."
80000078-41 = "[s3] \"Não, não é a Saori quem deve pedir desculpas...\"\n[s4] \"O culpado é quem enganou você...\""
80000078-42 = "Agradeço por dizer isso. #nAliás, também ouvi dizer que é possível fazer chocolates artesanais."
80000078-43 = "Agradeço por dizer isso. #nAliás, também ouvi dizer que é possível fazer chocolates artesanais."
80000078-44 = "E que, dependendo da pessoa, isso é até mais apreciado..."
80000078-45 = "Então, da próxima vez, tentarei fazer eu mesma."
80000078-46 = "[s5] \"Bem, você não é obrigada a fazer isso, sabe...?\"\n[s6] \"Só o seu sentimento já é o suficiente!\""
80000078-47 = "...É mesmo?"
80000078-48 = "...É mesmo?"
80000078-49 = "É complicado... esse costume do Dia dos Namorados."
80000078-50 = "Hm? Já que estamos aqui, vamos comer juntos...?"
80000078-51 = "M-mas isso foi o que eu te dei..."
80000078-52 = "[s] \"É justamente por isso que quero comer com você.\""
80000078-53 = "..."
80000078-54 = "...Entendido, se você insiste."
80000078-55 = "Sensei. Talvez eu continue causando problemas de várias formas, mas... conto com você daqui para frente."
80000078-57 = "(Enquanto dividia chocolates com a Saori, #npassamos um tempo relaxante juntos)"
