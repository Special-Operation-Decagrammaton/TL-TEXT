[translation]
80000078-1 = "ギディバのチョコレート"
80000078-2 = "ブラックマーケットのどこか"
80000078-3 = "（サオリから連絡を貰い、急いで指定された場所に向かった）"
80000078-4 = "先生、来てくれたんだな。"
80000078-5 = "よかった、「今日」が終わる前に会えて。"
80000078-6 = "[s] \"サオリ、大丈夫！？\""
80000078-7 = "ああ……大したことではない。"
80000078-8 = "……といっても、この見た目では説得力が無いな。"
80000078-9 = "だが目標を達成するにあたっては、仕方のないことだった。"
80000078-10 = "[s] \"目標……！？\""
80000078-11 = "言葉の通りだ。"
80000078-12 = "……さあ、受け取ってくれ。"
80000078-17 = "[ns] \"……チョコレート？それに、すごく高級な……。\""
80000078-18 = "ああ、今日はバレンタインデーだろう？"
80000078-19 = "いつも世話になっている者に、"
80000078-20 = "チョコレートで気持ちを伝える日だと聞いた。"
80000078-21 = "[s1] \"確かにそうだけど……。\"\n[s2] \"でも、それでどうしてそんなに怪我を……。\""
80000078-22 = "……いつもより難しい依頼で、少しな。"
80000078-23 = "……いつもより難しい依頼で、少しな。"
80000078-24 = "しかし、世の中にはこんなに高いチョコレートがあるのか。"
80000078-25 = "感謝を伝えるには、最高級のチョコレートが良い……"
80000078-26 = "そうでないと、お返しにならないと聞いた。"
80000078-27 = "それどころか、中途半端なものでは相手への「縁を切る」と言う宣言になる、とも。"
80000078-28 = "逆にあえて安いチョコレートをプレゼントすることで、相手への宣戦布告の手段として使うこともあるとか。"
80000078-29 = "「表の世界」の常識は、難しいな……。"
80000078-30 = "だが私もここで生きていくと決めた以上、#nそのしきたりに従わなければならない。"
80000078-31 = "というわけなんだが、先生。"
80000078-32 = "どうだろう、私の気持ちは伝わっ……"
80000078-33 = "……ど、どうしてそんな顔を？"
80000078-34 = "[s] \"誰が――\""
80000078-35 = "？"
80000078-36 = "[s] \"誰がサオリにそんな、はた迷惑な冗談を！？\""
80000078-37 = "せ、先生……！？"
80000078-39 = "そ、そうか……私はまた、勘違いをしてしまったのだな。"
80000078-40 = "迷惑をかけてしまった、謝罪しよう。"
80000078-41 = "[s3] \"いや、サオリが謝ることじゃないよ……。\"\n[s4] \"悪いのは、サオリを騙した人だから……。\""
80000078-42 = "そう言ってもらえるのはありがたい。#nそれはそうと、チョコを手作りして渡すこともできるとはな。"
80000078-43 = "そう言ってもらえるのはありがたい。#nそれはそうと、チョコを手作りして渡すこともできるとはな。"
80000078-44 = "しかも、人によってはその方が喜ばれることもある……と。"
80000078-45 = "では、今度は自分で作ってみるとしよう。"
80000078-46 = "[s5] \"えっと、絶対そうしなきゃいけないわけじゃないからね……？\"\n[s6] \"気持ちだけでも十分嬉しいよ！\""
80000078-47 = "……そうなのか？"
80000078-48 = "……そうなのか？"
80000078-49 = "難しいな……このバレンタインデーという風習は。"
80000078-50 = "ん？せっかくだし、一緒に食べよう……？"
80000078-51 = "し、しかしそれは、先生に渡したもので――"
80000078-52 = "[s] \"だからこそ、一緒に食べたいなって。\""
80000078-53 = "……。"
80000078-54 = "……分かった、そこまで言うなら。"
80000078-55 = "先生。これからも私は、色々と迷惑をかけてしまうかもしれないが……今後も、よろしく頼む。"
80000078-57 = "（サオリとチョコレートを分け合いながら、#nゆったりとした時間を過ごした）"
