[translation]
10033095-2 = "Maaaaas, qual é!?"
10033095-6 = "A-ainda bem, com isso conseguimos..."
10033095-7 = "(Agora, só resta esperar pela festa de encerramento à noite...)"
10033095-12 = "L-líder! É uma emergência!"
10033095-13 = "Na batalha de agora há pouco, bem, os fogos de artifício..."
10033095-15 = "O que tem os fogos de artifício agora...?"
10033095-16 = "O feixe de fogos de artifício foi aceso!"
10033095-18 = "O quê!?"
10033095-19 = "[ns] \"Isso é ruim...!?\""
10033095-20 = "T-tá tudo bem!#nOs fogos de artifício usados no Festival Kamiki são gigantescos!"
10033095-21 = "Não vão disparar com qualquer faísca!"
10033095-22 = "M-mas precisamos apagar logo!#nÉ questão de tempo até o fogo se espalhar por tudo...!"
10033095-24 = "Foi mal, atrasei.#nÉ que esse espetinho assado no fogo parecia tão gostoso..."
10033095-28 = "Acabei entrando na fila... pera, ahhh!?"
10033095-32 = "Ai, ai, ai... ah, qual é, o que é isso?#nEspera... fogos de artifício?"
10033095-36 = "[ns1] \"Espera um pouco, em cima dos fogos...\"\n[ns2] \"Aquele projétil, ele está pegando fogo...!?\""
10033095-39 = "Nããão!!!"
