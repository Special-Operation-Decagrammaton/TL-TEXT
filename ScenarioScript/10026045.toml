[translation]
10026045-9 = "……Q-que som foi esse!? Um disparo de repente!"
10026045-10 = "Veio do fundo das ruínas... #nSerá que aconteceu alguma coisa com o Sensei e a Ui...?"
10026045-18 = "Hi-Hinata! Hinata!!"
10026045-19 = "U-Ui!? O que aconteceu?"
10026045-20 = "Até o Sensei...!"
10026045-21 = "Ora... vocês dois, tão suados e ofegantes assim... ♡"
10026045-22 = "Não é hora para isso! Lá de dentro...!!"
10026045-23 = "……Não pode ser?"
10026045-24 = "Aquilo que o Sensei e a Koharu disseram ter visto mais cedo..."
10026045-30 = "Mimesis de novo!? E já estão bem aqui!"
10026045-31 = "Vamos deixar os detalhes para depois da batalha!"
10026045-36 = "……!? O-o quê! Um lança-granadas!? #nAquela bolsa tinha algo assim dentro!?"
10026045-37 = "Hi-Hinata, espere um pouco. Se disparar isso aqui..."
10026045-39 = "Não sei por que apareceram... #nmas não vou perdoar vocês por colocarem os dois em perigo!"
10026045-40 = "Voltem para o lugar de onde vieram, agora mesmo!!"
10026045-49 = "Ora, ora... mas que situação..."
10026045-50 = "Imagino que cara a Sakurako faria se soubesse disso..."
10026045-51 = "……!? O-o que foi isso!? Que barulho foi esse! O que está acontecendo!?"
10026045-52 = "As ruínas... desmoronaram? Ma-mas como...?"
10026045-53 = "…………."
10026045-58 = "U-Ui!?"
10026045-59 = "Ui! Você está me ouvindo!? #nFique firme! Ui!!"
