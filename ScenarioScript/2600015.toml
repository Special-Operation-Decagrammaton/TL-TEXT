[translation]
2600015-1 = "私にできること"
2600015-2 = "（散歩していたところ……）"
2600015-3 = "……先生？"
2600015-4 = "こんなところでお会いするなんて、奇遇ですね。"
2600015-8 = "[ns1] \"この声は……チナツ！\"\n[ns2] \"チナツに会えるなんて、ついてるなあ！\""
2600015-11 = "え、ええ……。"
2600015-12 = "お、お元気そうでなによりです……。"
2600015-13 = "モモトークでお話したばかりなのに、偶然お会いできるとは思っておらず。"
2600015-14 = "……あ。"
2600015-15 = "今朝のメッセージは、探りを入れたわけではなくですね……？"
2600015-16 = "……え？"
2600015-17 = "ええ、私もお休みをいただいていますから。"
2600015-18 = "……カバン、ですか？"
2600015-23 = "これのことでしょうか？"
2600015-24 = "[s3] \"薬品のカバンだよね？\"\n[s4] \"休みの日なのに装備してるんだなって。\""
2600015-27 = "ああ、これは……。"
2600015-28 = "これから救急医学部に顔を出すところなんです。"
2600015-29 = "皆さん、常にお忙しいですから。"
2600015-30 = "[s5] \"風紀委員会のチナツが……\"\n[s6] \"救急医学部に？\""
2600015-33 = "ええ。私はもともと救急医学部所属だったので。"
2600015-34 = "このカバンは、その頃から使っているものなんです。"
2600015-35 = "部長や他の皆さんと――"
2600015-39 = "……忙しくも充実した日々を過ごしたものです。少々、癖のある方も多かったですが。"
2600015-40 = "[s7] \"救急医学部……。\"\n[s8] \"結構大変そうだよね。\""
2600015-43 = "ふふっ、大変というほどでは。"
2600015-44 = "仕事の量は、今の方がずっと多いですよ。"
2600015-45 = "……？"
2600015-46 = "私に聞きたいことがあるのですか？"
2600015-47 = "……どのようなご質問でしょう？なんとなく予想はつきますが。"
2600015-48 = "私がお話できる範囲でしたらお気軽に。"
2600015-49 = "[s9] \"チナツはどうして風紀委員会に入ったの？\"\n[s10] \"転部した理由、聞いてもいい？\""
2600015-52 = "ああ……なるほど。"
2600015-53 = "大丈夫です。答えづらい話ではありませんから。"
2600015-54 = "今までも何度かそういった質問をされてきましたし……。"
2600015-55 = "そうですね……簡単にいえば。"
2600015-56 = "……「誰かがやるべきこと」だったからでしょうか。"
2600015-57 = "「放っておけなかった」という方が近いかもしれません。"
2600015-58 = "[s11] \"誰かがやるべきこと……？\"\n[s12] \"放っておけなかった……？\""
2600015-61 = "……はい。"
2600015-62 = "風紀委員会と救急医学部は、良好な関係にあります。"
2600015-63 = "ですが、常に同じ現場で活動するわけではありません。"
2600015-64 = "風紀委員会は、所属生徒と取り締まり対象の両方に負傷者が発生します。"
2600015-65 = "その都度、救急医学部は現場に急行しますが……即時対応が難しいこともありました。"
2600015-66 = "――そうして現場に向かう中で、私は気付いたんです。"
2600015-67 = "風紀委員会の中に、医療処置を行える者が必要だと。"
2600015-68 = "ですが部長のお二方は常に多忙で、話し合いの場を設けることも難しく……。"
2600015-69 = "組織再編の話が見送られていく中で――"
2600015-70 = "私は、自分にできることを考えました。"
2600015-71 = "そうして、今の私がいます。……これで、答えになっていますか？"
2600015-72 = "……自分で言うのは少々恥ずかしいですが。"
2600015-73 = "……私が来て以来、風紀委員の前線維持能力が向上した、と委員長から聞きました。"
2600015-77 = "[ns13] \"……えらいね。\"\n[ns14] \"だからみんな、チナツが大好きなんだ。\""
2600015-80 = "そんなことは……ない……と思うのですが……。"
2600015-81 = "……なので、時間を見つけては救急医学部を訪ねているんです。"
2600015-82 = "……話が長くなってしまいましたね。"
2600015-83 = "先生もせっかくのお休みの日でしたのに。"
2600015-84 = "……？"
2600015-85 = "……えっ。"
2600015-86 = "救急医学部に用事ができた……？"
2600015-87 = "……急に、ですか？"
2600015-88 = "本当でしょうか……？今ご用事を作ったのでは？"
2600015-89 = "[s] \"どうかな……？\""
2600015-93 = "[ns] \"私も「放っておけない」ことがあってね。\""
2600015-97 = "……先生も、困った方です。"
2600015-98 = "そう言われると、こちらは何も言えなくなってしまうではないですか……。"
2600015-99 = "……分かりました。人手は多いほど助かります。現場の皆さんも、きっと喜ぶでしょう。"
2600015-100 = "先生には、助けてもらってばかりな気がします。"
2600015-101 = "その代わり、といってはなんですが……。"
2600015-102 = "今回は先生にご助力いただいたことですし……。"
2600015-103 = "次のお休みの日には……先生のお手伝いも兼ねて――"
2600015-104 = "――私が、シャーレに伺いますね。"
2600015-106 = "（そうして、チナツと救急医学部の仕事を手伝った）"
2600015-107 = "（彼女たちは、チナツを仲間として暖かく迎えていた……）"
