[translation]
2600015-1 = "O que eu posso fazer"
2600015-2 = "（Enquanto eu estava passeando...）"
2600015-3 = "……Sensei?"
2600015-4 = "Que coincidência encontrar você em um lugar como este."
2600015-8 = "[ns1] \"Essa voz é... Chinatsu!\"\n[ns2] \"Que sorte encontrar a Chinatsu por aqui!\""
2600015-11 = "Ah, sim..."
2600015-12 = "E-estou feliz em ver que você está bem..."
2600015-13 = "Acabamos de conversar pelo MomoTalk, não esperava encontrar você por acaso assim."
2600015-14 = "……Ah."
2600015-15 = "A mensagem desta manhã não foi para tentar investigar nada, viu...?"
2600015-16 = "……Eh?"
2600015-17 = "Sim, eu também estou no meu dia de folga."
2600015-18 = "……A bolsa, você diz?"
2600015-23 = "Está falando disto?"
2600015-24 = "[s3] \"É uma bolsa de suprimentos médicos, né?\"\n[s4] \"Achei curioso você estar equipada mesmo no seu dia de folga.\""
2600015-27 = "Ah, isso é..."
2600015-28 = "Estou a caminho do Departamento de Medicina de Emergência."
2600015-29 = "O pessoal lá está sempre muito ocupado."
2600015-30 = "[s5] \"A Chinatsu do Comitê Disciplinar...\"\n[s6] \"No Departamento de Medicina de Emergência?\""
2600015-33 = "Sim. Originalmente, eu fazia parte do Departamento de Medicina de Emergência."
2600015-34 = "Uso esta bolsa desde aquela época."
2600015-35 = "Com a chefe e todos os outros..."
2600015-39 = "……Passamos dias muito ocupados, mas gratificantes. Embora houvesse muitas pessoas com personalidades peculiares por lá."
2600015-40 = "[s7] \"Departamento de Medicina de Emergência...\"\n[s8] \"Parece ser bem difícil, né?\""
2600015-43 = "Fufu, não diria que é difícil."
2600015-44 = "A carga de trabalho que tenho agora é muito maior."
2600015-45 = "……?"
2600015-46 = "Você tem algo que quer me perguntar?"
2600015-47 = "……Que tipo de pergunta seria? Acho que já imagino o que é."
2600015-48 = "Se for algo que eu possa responder, fique à vontade."
2600015-49 = "[s9] \"Por que a Chinatsu entrou para o Comitê Disciplinar?\"\n[s10] \"Posso perguntar o motivo da sua transferência?\""
2600015-52 = "Ah... entendo."
2600015-53 = "Está tudo bem. Não é um assunto difícil de responder."
2600015-54 = "Já me fizeram essa pergunta várias vezes antes..."
2600015-55 = "Bem... simplificando."
2600015-56 = "……Talvez seja porque era algo que \"alguém precisava fazer\"."
2600015-57 = "Ou talvez seja mais preciso dizer que eu \"não podia ignorar\"."
2600015-58 = "[s11] \"Algo que alguém precisava fazer...?\"\n[s12] \"Não podia ignorar...?\""
2600015-61 = "……Sim."
2600015-62 = "O Comitê Disciplinar e o Departamento de Medicina de Emergência mantêm um bom relacionamento."
2600015-63 = "Mas nem sempre atuamos no mesmo local ao mesmo tempo."
2600015-64 = "No Comitê Disciplinar, feridos surgem tanto entre os nossos membros quanto entre os alvos que estamos contendo."
2600015-65 = "O Departamento de Medicina de Emergência corre para o local sempre que isso acontece, mas... às vezes, o atendimento imediato era difícil."
2600015-66 = "――Foi enquanto eu ia para esses locais que percebi."
2600015-67 = "Que era necessário alguém dentro do Comitê Disciplinar capaz de realizar procedimentos médicos."
2600015-68 = "Mas as duas chefes estão sempre muito ocupadas, e era difícil encontrar um momento para discutir isso..."
2600015-69 = "Enquanto as conversas sobre a reestruturação da organização eram adiadas..."
2600015-70 = "Eu pensei sobre o que eu mesma poderia fazer."
2600015-71 = "E assim, cheguei onde estou hoje. ...Isso responde à sua pergunta?"
2600015-72 = "……É um pouco vergonhoso dizer isso eu mesma."
2600015-73 = "……Ouvi da presidente que, desde que cheguei, a capacidade de manutenção da linha de frente do Comitê Disciplinar melhorou."
2600015-77 = "[ns13] \"……Isso é admirável.\"\n[ns14] \"É por isso que todos adoram a Chinatsu.\""
2600015-80 = "Eu não acho que seja para tanto……."
2600015-81 = "……Por isso, sempre que encontro um tempo livre, visito o Departamento de Medicina de Emergência."
2600015-82 = "……Acabei falando demais."
2600015-83 = "E pensar que hoje era o seu dia de folga, Sensei."
2600015-84 = "……?"
2600015-85 = "……Eh."
2600015-86 = "Você tem um assunto no Departamento de Medicina de Emergência……?"
2600015-87 = "……De repente?"
2600015-88 = "Será verdade……? Você não acabou de inventar esse assunto agora?"
2600015-89 = "[s] \"Quem sabe……?\""
2600015-93 = "[ns] \"Eu também tenho algo que 'não posso deixar passar'.\""
2600015-97 = "……Você é uma pessoa difícil, Sensei."
2600015-98 = "Quando você diz isso, eu não tenho como responder……."
2600015-99 = "……Entendido. Quanto mais ajuda, melhor. Tenho certeza de que o pessoal no local ficará feliz."
2600015-100 = "Sinto que só tenho recebido ajuda sua, Sensei."
2600015-101 = "Como forma de retribuição, por assim dizer……."
2600015-102 = "Já que você me ajudou desta vez……."
2600015-103 = "No seu próximo dia de folga…… para retribuir a ajuda, eu——"
2600015-104 = "——irei até o Schale."
2600015-106 = "(Assim, ajudei Chinatsu com o trabalho no Departamento de Medicina de Emergência)"
2600015-107 = "(Elas receberam Chinatsu calorosamente como uma companheira……)"
