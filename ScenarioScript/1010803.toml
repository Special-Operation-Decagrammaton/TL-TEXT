[translation]
1010803-1 = "Aventuras com ovelhas elétricas"
1010803-2 = "(Curiosa mensagem de erro, dirigiu-se ao dormitório Millennium)."
1010803-3 = "(Como sempre, parecia tranquilo: ......)"
1010803-7 = "Nn ...... Quem é você, a essa hora do dia?"
1010803-8 = "Se estiver aceitando documentos..."
1010803-14 = "[Senhor! #nPor que Millenia ...... não, em meu quarto a esta hora!"
1010803-15 = "Espere aí!"
1010803-16 = "Cinco minutos, apenas cinco minutos!"
1010803-17 = "[s1] \"Você está bem ......? \"\n[s2] \"Não está com nenhum problema? \""
1010803-20 = "O que você quer dizer com isso?"
1010803-21 = "Não me lembro de ter enviado uma mensagem desse tipo para ......."
1010803-22 = "Eu estava prestes a ir para a cama quando as respostas pararam, pensando que #n já tinha ido para a cama."
1010803-23 = "[Mostre a Yuka o conteúdo do Momotalk."
1010803-24 = "Isso pode ser encontrado em ......."
1010803-25 = "Estou vendo, estou entendendo."
1010803-26 = "Parece que alguém usou electric sheep novamente."
1010803-27 = "[s]\"......'electric sheep'? \""
1010803-28 = "Outro nome para o drone de economia de energia usado na Millennium Tower."
1010803-29 = "Como a Millennium tem muitos equipamentos de alta potência, a conta diária de eletricidade pode ser bastante cara. Portanto, para economizar eletricidade à noite, quando os alunos não estão presentes, um drone que controla os equipamentos eletrônicos está patrulhando a escola."
1010803-30 = "Os drones foram então chamados de ovelhas elétricas porque o som que produziam se assemelhava ao \"balido das ovelhas\"."

1010803-31 = "Temos sensores para mantê-los longe dos dormitórios e das salas de servidores, mas alguém deve tê-los arrumado."
1010803-32 = "[s3] \"Estou vendo. \"\n[s4] \"Estou feliz que nada aconteceu com a Yuuka. \"\n[s4]\"\"\n1010803-35 = \"Uau, você não precisa ir até o site ...... para conferir.\"\n1010803-39 = \"...... Hum, senhor. Posso fazer um pedido?\"\n1010803-40 = \"[\"Que tipo de solicitação? \"\"\n1010803-41 = \"Queremos recuperar as ovelhas o mais rápido possível e colocá-las no \"curral\".\"\n1010803-42 = \"Se isso não for feito, até mesmo as instalações de pesquisa poderão sofrer um downgrade e os dados importantes de todos poderão ser danificados.\"\n1010803-43 = \"...... Você pode ajudar?\"\n1010803-44 = \"[\"Claro, eu cuidarei disso. \"\"\n1010803-45 = \"Obrigado. #nVerifiquei e parece que cerca de 20 animais escaparam. Vamos nos apressar.\"\n1010803-47 = \"(Então ele e Yuka procuraram por drones que economizassem energia).\"\n1010803-49 = \"Meh-eh-eh-eh-eh--.\"\n1010803-56 = \"19 peixes. .......\"\n1010803-61 = \"......20 fish!\"\n1010803-66 = \"Isso é tudo o que eu tenho! Obrigado por seu trabalho árduo, doutor!\"\n1010803-67 = \"Felizmente, o único dano parece ter sido na sala do servidor.\"\n1010803-68 = \"Quanto mais danos poderiam ter sido causados se o médico não tivesse vindo. ......\"\n1010803-69 = \"[\"Estou feliz por termos resolvido isso. \"\"\n1010803-73 = \"[ns] \"Talvez seja porque eu estava contando carneirinhos, mas me sinto meio sonolento. ...... \"\"\n1010803-74 = \"Em desenhos animados e filmes, há cenas em que as pessoas contam carneirinhos antes de dormir.\"\n1010803-75 = \"Ainda não me recuperei totalmente da minha insônia, então não me sinto tão mal. ......\"\n1010803-76 = \"É como se já tivéssemos visto soníferos e bebidas descafeinadas inspirados em ovelhas.\"\n1010803-77 = \"[\"A Yuka também conta carneirinhos quando não consegue dormir? \""

1010803-78 = "Sim ...... Na verdade, tentei fazer isso uma vez, mas não funcionou."
1010803-82 = "Certa vez, li em um livro que o ato de contar ovelhas quando não se consegue dormir era uma prática medieval, quando o pastoreio existia próximo à vida cotidiana."
1010803-83 = "A razão para isso é que um grande número de ovelhas espalhadas em um prado era um símbolo de riqueza, e pensar nelas faz com que você se sinta satisfeito e durma bem."
1010803-84 = "...... Bem, até mesmo animais selvagens, quanto mais ovelhas, são raros em áreas urbanas, e é difícil imaginar."
1010803-85 = "[\"De fato, sim. \""
1010803-89 = "[ns] \"O que as pessoas pensam hoje em dia em vez de ovelhas? \""
1010803-90 = "É o saldo da conta ......?"
1010803-91 = "[s5] \"Parece um pouco triste ....... \"\n[s6] \"Eu gostaria de algo um pouco mais sonhador. \""
1010803-94 = "Sonho, ou ......."
1010803-95 = "Todos os dias em uma casa ensolarada, vivendo com alguém que você ama, por exemplo. #nPor exemplo, Senku. ......"
1010803-96 = "[s] \"Sen\"? \"\"\n1010803-101 = \"Não, não é nada!\"\n1010803-102 = \"Só achei que seria bom morar em uma casa grande e bonita!\"\n1010803-103 = \"[Quero saber mais sobre os sonhos de Yuka. \"\"}\""

1010803-104 = "Agora é tarde demais. ......"
1010803-105 = "Obrigado por me ajudar hoje!"
1010803-106 = "Boa noite!"
1010803-108 = "(Ela saiu do dormitório e voltou para sua placa de petri como se tivesse sido expulsa por Yuka)."
