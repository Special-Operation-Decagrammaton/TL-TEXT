[translation]
800-1 = "Aoi aparece"
800-4 = "Eu estava esperando, Sensei."
800-5 = "[s] \"…………。\""
800-6 = "……Algum problema?"
800-7 = "[s1] \"Quem seria você……?\"\n[s2] \"Aoi, da Sala de Finanças do Conselho Estudantil Geral……?\""
800-8 = "Como assim, quem sou eu…… Sou Aoi Oki, chefe da Sala de Finanças do Conselho Estudantil Geral. #nPor acaso você esqueceu?"
800-9 = "[s3] \"Sinto que talvez eu consiga me lembrar……\""
800-10 = "Ah, entendo. #nEmbora eu ache que não há como evitar uma reação dessas……"
800-11 = "……Eu também não pretendia aparecer dessa forma."
800-12 = "Mas devemos separar o pessoal do profissional, certo? Por isso, desta vez, você vai lidar com isso junto comigo."
800-13 = "[s] \"O que quer dizer com……?\""
800-17 = "Resolver incidentes e problemas, além de lidar com tarefas triviais…… Quero que você faça essas pequenas coisas comigo."
800-18 = "Originalmente, esse é o trabalho da Rin…… não, da Administradora Rin, mas como ela está ocupada……"
800-19 = "Se eu pedir, ela com certeza vai tentar carregar tudo sozinha…… Por isso, decidi ajudar."
800-20 = "Se não podemos impedir que ela se sobrecarregue, não há outra forma, certo?"
800-21 = "[s] \"Então seremos eu e você, Aoi?\""
800-22 = "Sim, exatamente. Você e eu, Sensei."
800-23 = "[s] \"Entendido. Farei o meu melhor pela Rin-chan e pela Aoi.\""
800-24 = "……Obrigada, Sensei."
800-25 = "――Ah, e mais uma coisa."
800-31 = "Poderia manter em segredo o fato de que ajudei com o trabalho da Administradora Rin?"
800-32 = "Originalmente…… não é papel da Sala de Finanças intervir. Por isso, para a Rin……"
800-33 = "[s] \"Sim. Pode deixar comigo.\""
800-34 = "……Então, vamos começar logo."
