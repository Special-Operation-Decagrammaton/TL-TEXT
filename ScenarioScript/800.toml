[translation]
800-1 = "アオイ登場"
800-4 = "待ってたわ、先生。 "
800-5 = "[s] \"…………。\""
800-6 = "……何か問題でも？"
800-7 = "[s1] \"どちらさまでしょう……？\"\n[s2] \"連邦生徒会、財務室のアオイ……？\""
800-8 = "どちらさまって……連邦生徒会の財務室長、[ruby=おき]扇喜[/ruby]アオイよ。#nもしかして、忘れたの？ "
800-9 = "[s3] \"思い出せそうな気が、しなくも……\""
800-10 = "はぁ、そう。#nそんな反応をされても、仕方ないとは思うけれど……"
800-11 = "……私もこんな形で顔を出すつもりはなかったわ。"
800-12 = "でも公私は分けるべきでしょ？だから、今回は私と一緒に対応してもらうわ。"
800-13 = "[s] \"と言うと……？\""
800-17 = "事件や問題の解決および雑務の処理……そういった細々としたことを一緒にやってもらいたいの。 "
800-18 = "元々はリン先輩……いや、リン行政官の仕事なのだけど、彼女は忙しいから……"
800-19 = "相談したら、絶対1人で全部抱えてしまうのよね……だから、私が手伝うことにしたの。"
800-20 = "彼女のオーバーワークを止められないのなら、こうするしかないでしょう？"
800-21 = "[s] \"アオイと私の2人でやるんだよね？\""
800-22 = "ええ、そうよ。先生と私で。"
800-23 = "[s] \"分かった。リンちゃんとアオイのために、力の限り頑張るよ。\""
800-24 = "……ありがとう、先生。 "
800-25 = "――あと、もう一つ。"
800-31 = "リン行政官の仕事を手伝ったことは、内密にしてもらえるかしら。 "
800-32 = "本来は……財務室が出る幕じゃないもの。だからリン先輩には……"
800-33 = "[s] \"うん。任せて。\""
800-34 = "……それじゃ、すぐに始めましょうか。"
