[translation]
10046080-1 = "Episódio 8; O contador de histórias também é um ator"
10046080-9 = "…………。"
10046080-10 = "…………。"
10046080-15 = "…………。"
10046080-16 = "Hum……."
10046080-17 = "……Q-que tipo de evento é este……?"
10046080-25 = "Mika-san, o que exatamente está acontecendo aqui?"
10046080-29 = "Na-Nagi-chan……! Não é isso! Isto é……!"
10046080-30 = "Não, explicações são desnecessárias."
10046080-31 = "Bombas foram instaladas na casa de veraneio…… o significado disso é óbvio."
10046080-35 = "――As férias acabaram!"
10046080-36 = "Prendam todos que estão aqui!#nAté que a verdade seja revelada, vocês ficarão sob custódia!"
10046080-37 = "E quanto à mentora do incidente, Mika Misono――"
10046080-39 = "Sua dieta será alterada para rocambole em todas as três refeições diárias!!"
10046080-45 = "……ka!"
10046080-48 = "Mika! Você está bem?"
10046080-49 = "Será que, por causa do choque da explosão……?"
10046080-50 = "Na-Nagi-chan, não é isso……."
10046080-51 = "Isso é…… bem……."
10046080-52 = "Sinto muito, Mika-san."
10046080-56 = "……Eh?"
10046080-57 = "Por que a Nagi-chan está se desculpando?"
10046080-61 = "Como assim por que…… a explosão de agora foi minha culpa, não foi?"
10046080-62 = "Estraguei todo o seu esforço…… sinto muito."
10046080-63 = "N-não, não é isso! Não é nada disso! Nagi-chan, você tem certeza disso?"
10046080-64 = "Sim? Não estou entendendo onde quer chegar……."
10046080-65 = "Mas, explodiu, né? A casa de veraneio!"
10046080-66 = "Sim, e daí?"
10046080-67 = "Foi minha culpa, não foi? Pensando logicamente!?"
10046080-68 = "Você não deveria prender todos os envolvidos e interrogá-los por 24 horas!?"
10046080-72 = "Qual é a imagem que a Mika-san tem de mim, afinal……."
10046080-73 = "Fui eu quem apertou o botão por pura curiosidade, sem pensar em nada."
10046080-74 = "……Por que bombas foram instaladas na casa de veraneio? Por que o detonador estava caído ali?#nIsso já é um problema à parte."
10046080-75 = "Mas…… sim. Uma coisa eu entendi bem."
10046080-76 = "Mika-san."
10046080-81 = "Desde que chegamos à praia, achei que seu comportamento estava estranho."
10046080-82 = "Você estava se esforçando nos bastidores para evitar um acidente, não estava?"
10046080-83 = "……Você acredita em mim?"
10046080-84 = "Sim?"
10046080-85 = "Mas, sou eu, sabe?"
10046080-86 = "Tudo o que eu faço dá errado, e eu fiz tantas coisas ruins para todo mundo……."
10046080-87 = "Mesmo assim, você acredita em mim?"
10046080-88 = "O que você está dizendo…… você é idiota?#nBem, isso eu já sabia há muito tempo."
10046080-94 = "――Claro que acredito."
10046080-98 = "Uuu……."
10046080-100 = "……Waaaaah!"
10046080-101 = "Por que você está chorando……."
10046080-102 = "Porque a Nagi-chan…… uuu, waaaah!"
10046080-107 = "Mika."
10046080-111 = "……Sim."
10046080-114 = "Já se acalmou?"
10046080-115 = "……Sim."
10046080-116 = "Como sempre, você é muito inquieta. #nFica ansiosa sozinha e começa a chorar do nada..."
10046080-117 = "Você é realmente uma criança... que dá muito trabalho."
10046080-118 = "Nagisa, você é igual."
10046080-122 = "O quê!?"
10046080-123 = "Aquela garota levada só começou a chorar por conta própria. #nMesmo que não haja motivo nenhum para você se preocupar tanto."
10046080-124 = "Será que isso é o que chamam de \"amigas de infância\"?"
10046080-130 = "Ei, Nagi-chan."
10046080-131 = "Ah, Mika-san."
10046080-132 = "Ah... pode ir primeiro."
10046080-133 = "Não, a Mika-san primeiro."
10046080-134 = "Não, não."
10046080-135 = "De jeito nenhum."
10046080-140 = "……Vocês estão fazendo uma esquete de comédia?"
10046080-141 = "Não, uma esquete precisa de um \"boke\" e um \"tsukkomi\"... #nTer apenas o \"boke\" é algo novo."
10046080-142 = "A pessoa que mais está agindo como \"boke\" aqui é a Seia-chan, né!?"
10046080-143 = "A Mika fazendo o \"tsukkomi\"... bem, isso não é ruim, mas... #nnão deveríamos encarar os problemas da realidade agora?"
10046080-144 = "Problemas da realidade?"
10046080-145 = "Sim. Ficamos sem lugar para dormir."
10046080-146 = "Ah."
10046080-148 = "Ah."
10046080-149 = "[s] \"Ah.\""
10046080-150 = "Bem, já que estamos aqui, por que não aproveitar para acampar?"
10046080-155 = "Seia-sama... é muito difícil dizer isso, mas."
10046080-156 = "Infelizmente, não preparamos nenhuma barraca..."
10046080-157 = "E... se for para ir até a cidade comprar, seria melhor simplesmente nos hospedarmos em um hotel..."
10046080-158 = "Quanto a isso, não há problema. #nHasumi, Ichika. Venham comigo. Eu deixei algumas guardadas no meu carro."
10046080-162 = "A distribuição será... vejamos. Hasumi e Ichika, usem estas. #nNós três usaremos esta aqui."
10046080-163 = "Sensei... ah, não precisa ficar inquieto. #nEu tenho uma barraca individual. #nEmbora seja pequena, como é para uma pessoa só, pode-se dizer que é um luxo, não?"
10046080-164 = "[s1] \"Bem, eu agradeço, mas...\"\n[s2] \"Por que você tem 3 barracas...?\""
10046080-169 = "Já que vamos passar a noite fora, devemos estar preparados para imprevistos, não é?"
10046080-170 = "Mesmo que fiquemos perdidos aqui, tenho suprimentos para aguentar duas semanas. #nÉ tempo suficiente para a equipe de resgate chegar."
10046080-171 = "……Desde antigamente, a Seia-sama sempre foi assim. #nSempre precavida, ou melhor, sempre enxergando dois passos à frente."
10046080-172 = "Fufu, chame isso de etiqueta de uma dama."
10046080-173 = "Bem. Hasumi, Ichika... Sensei."
10046080-174 = "Poderiam me ajudar a montar as barracas?"
10046080-180 = "Parece que aquelas duas ainda precisam conversar um pouco mais."
10046080-183 = "(Todos ajudaram a montar as barracas e se prepararam para dormir)"
10046080-184 = "(Nagisa parecia estar aproveitando o acampamento inesperado)"
10046080-189 = "(...Algum tempo depois, quando o ambiente lá fora ficou silencioso)"
10046080-194 = "Sensei, já está dormindo?"
10046080-195 = "[ns3] \"Não, pode entrar.\"\n[ns4] \"Munia munia, já estou dormindo.\""
10046080-198 = "Ainda está acordado, vejo. Então, com licença."
10046080-203 = "……É um pouco apertado para duas pessoas."
10046080-204 = "Bem, é perfeito para conversas secretas."
10046080-205 = "\"A carruagem de abóbora que levava a princesa. #nDe onde veio o rato que puxava a carruagem?\""
10046080-206 = "O final feliz. A história por trás dele. #nUma história que ninguém se importa e que, originalmente, nem deveria ser contada."
10046080-207 = "Essa é a história dos bastidores."
10046080-208 = "Como você sabe, eu estava planejada para ser a anfitriã da Tea Party."
10046080-209 = "Não achou surpreendente?#nEmbora, essencialmente, a aptidão para isso fosse muito maior na Nagisa do que em mim."
10046080-210 = "No entanto, na época, fui eu quem foi recomendada como anfitriã.#n……Por que não foi a 'Nagisa daquela época'?"
10046080-213 = "É simples."
10046080-214 = "“O rato se transformou em cavalo para puxar a carruagem.”"
10046080-217 = "Pressionar botões seguindo a curiosidade.#nIsso é o que define a 'Kirifuji Nagisa daquela época'."
10046080-218 = "Sempre transbordando elegância e compostura, superando até mesmo os imprevistos com diversão. Ela é esse tipo de garota…… ou melhor, era."
10046080-221 = "……Não é de se estranhar que esteja surpreso.#nPorque a figura que você, Sensei, tem visto é a 'Nagisa de agora'."
10046080-222 = "Nós não éramos amigas muito boas.#nEu queria ter sido uma boa amiga para ela, mas não consegui."
10046080-223 = "No fim, Nagisa teve que puxar a carruagem.#nAté a princesa chegar ao castelo, até a história ter um final feliz — sozinha, o tempo todo."
10046080-224 = "Felizmente, a carruagem chegou ao castelo.#nMas o 'cavalo', após cumprir seu papel, acabou esquecendo sua forma original."
10046080-225 = "Isso é uma espécie de expiação.#nEu sei, claro. Sei que isso não pode ser a solução definitiva."
10046080-226 = "Mas ela ainda pode voltar a ser um rato.#nEla não esqueceu completamente a forma de rato.#n――Ao pensar no momento em que isso pode acontecer, sinto uma ansiedade incontrolável."
10046080-227 = "……Dessa forma, não posso dizer que apenas a Nagisa é paranoica."
10046080-228 = "No fim das contas, isso nem é um 'spoiler' para você, Sensei.#nÉ algo fora da trama principal…… algo que não há necessidade de saber."
10046080-229 = "Mas, como não há mais nada a esconder, nem motivos para fazê-lo."
10046080-230 = "[s5] \"Você perguntou para a Nagisa?\"\n[s6] \"O que ela acha da vida atual dela.\""
10046080-235 = "……Se for uma piada, não tem graça. Obviamente, não perguntei.#nPara ser exata, o correto seria dizer que não posso perguntar."
10046080-236 = "[s] \"Então, acho que está tudo bem.\""
10046080-237 = "Poderia me dizer a base para isso?"
10046080-238 = "[s7] \"É segredo.\"\n[s8] \"Spoilers não são legais, afinal.\""
10046080-241 = "……!"
10046080-242 = "Fufu, essa foi boa. De fato, é como você disse.#nSe soubermos de tudo com antecedência, perde a graça."
10046080-243 = "Mas, em outras palavras, será uma história interessante o suficiente para criar expectativas……#nPosso interpretar dessa forma?"
10046080-244 = "[s9] \"Hmm, não sei. Mas a mudança da Nagisa……\"\n[s10] \"É algo muito especial e, ao mesmo tempo, muito comum.\""
10046080-247 = "Hum…… parece que entendo, mas não entendo.#nEmbora esse tipo de papel fosse originalmente meu."
10046080-248 = "……Ah, entendi que spoilers são proibidos."
10046080-249 = "Você garantiu que a resposta existe, Sensei. Por enquanto, isso basta.#nFicarei ansiosamente esperando pelo dia em que obterei essa solução."
10046080-255 = "Seia-chan, volte logo! É uma emergência!"
10046080-256 = "A Nagi-chan tirou o curinga três vezes seguidas!?"
10046080-257 = "Fufu, Mika…… você esqueceu que, outrora, eu era chamada de a Mão Direita do Anjo?"
10046080-261 = "……Ora, fui chamada."
10046080-262 = "Seria problemático se descobrissem que estou aqui."
10046080-263 = "Bem, então, com licença."
10046080-267 = "Seia-chan! Demorou!"
10046080-268 = "Vai envolver a Seia-san também?#nMas minha vantagem não será abalada."
10046080-271 = "Como sempre, vocês jogam algo que não tem graça nenhuma."
10046080-275 = "Se vai falar assim, não vamos te deixar participar!"
10046080-276 = "Fufu, vou propor um jogo novo."
10046080-280 = "Algo que provavelmente vocês duas nunca viram — o que chamam de \"console de videogame\"."
10046080-281 = "N-nós também sabemos o que é um videogame, sabia!? Né, Nagi-chan?"
10046080-286 = "C-claro! É um tipo de entretenimento, não é?"
10046080-287 = "Não imaginava que a Seia-san possuísse algo do tipo."
10046080-289 = "Sim. Foi um presente de... amigas do Millennium, na última reunião de intercâmbio."
10046080-290 = "Ué, a Seia-chan tem amigas?"
10046080-294 = "Ora? Acredito que meu círculo social seja muito melhor que o seu, não?"
10046080-295 = "É? Mas você não vive trancada no quarto nos dias de folga?"
10046080-296 = "Existe uma diferença abismal entre não conseguir marcar um compromisso com amigos e simplesmente não querer marcar."
10046080-301 = "Se for sobre círculo social, eu também……"
10046080-306 = "Desculpa…… a Nagi-chan, bem……"
10046080-307 = "Ah, a Nagisa está fora de questão."
10046080-311 = "Hã!?"
10046080-316 = "Por que isso!! Eu também tenho amigos—"
10046080-317 = "Isso não conta aquelas garotas que ficam um passo atrás de você dizendo 'Nagisa-sama', né...?"
10046080-318 = "Normalmente, esse tipo de relação não é chamada de amizade. É chamada de relação de mestre e servo."
10046080-319 = "Nossa, Seia-chan... você foi direta, hein!?"
10046080-320 = "Já está na hora de encarar a realidade."
