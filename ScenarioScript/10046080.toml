[translation]
10046080-1 = "第8話;ストーリーテラーも役者也"
10046080-9 = "…………。"
10046080-10 = "…………。"
10046080-15 = "…………。"
10046080-16 = "ええと……。"
10046080-17 = "……こ、これはどういう催しで……？"
10046080-25 = "ミカさん、これは一体どういうことですか？"
10046080-29 = "な、ナギちゃん……！違うの！これは……！"
10046080-30 = "いいえ、説明は不要です。"
10046080-31 = "別荘に爆弾が仕掛けられていた……これが意味することは明白。"
10046080-35 = "――バカンスは終了です！"
10046080-36 = "ここにいる全員を逮捕しなさい！#n真相が明らかになるまで、身柄を拘束します！"
10046080-37 = "それと、事件の首謀者である[ruby=みその]聖園[/ruby]ミカは――"
10046080-39 = "一日三食ロールケーキに変更です！！"
10046080-45 = "……カ！"
10046080-48 = "ミカ！大丈夫ですか？"
10046080-49 = "爆発のショックで、もしかして……？"
10046080-50 = "な、ナギちゃん、違うの……。"
10046080-51 = "これは……その……。"
10046080-52 = "ごめんなさい、ミカさん。"
10046080-56 = "……え？"
10046080-57 = "どうして、ナギちゃんが謝るの？"
10046080-61 = "どうしてって……今の爆発は私のせいでしょう？"
10046080-62 = "ミカさんの頑張りを台無しにして……ごめんなさい。"
10046080-63 = "い、いやいや！そうじゃなくて！ナギちゃん、本当にそれでいいの？"
10046080-64 = "はい？話が見えないのですが……。"
10046080-65 = "だって、爆発したんだよ？別荘が！"
10046080-66 = "そうですね？"
10046080-67 = "私のせいでしょ？常識的に考えて！？"
10046080-68 = "関係者全員を拘束して、24時間事情聴取するんじゃないの！？"
10046080-72 = "ミカさんの中の私のイメージはいったい……。"
10046080-73 = "何も考えず、好奇心のままにスイッチを押したのは私です。"
10046080-74 = "……なぜ別荘に爆弾が仕掛けられていたのか。なぜ起爆スイッチがこんなところに落ちていたのか。#nそれはそれで別の問題ですが。"
10046080-75 = "ですが……ええ。一つ、よく分かりました。"
10046080-76 = "ミカさん。"
10046080-81 = "ビーチに来てからというもの、ずっと様子が変だと思っていたのです。"
10046080-82 = "事故を防ぐために、裏で頑張ってくれていたのですね？"
10046080-83 = "……信じてくれるの？"
10046080-84 = "はい？"
10046080-85 = "だって、私だよ？"
10046080-86 = "やることなすこと全部ダメで、みんなにもたくさん悪いことして……。"
10046080-87 = "そんな私を、信じてくれるの？"
10046080-88 = "何を言うのかと思ったら……あなたはバカですか？#nいえ、とうの昔から知っていたことですが。"
10046080-94 = "――もちろん、信じますよ。"
10046080-98 = "うぅ……。"
10046080-100 = "……うわああん！"
10046080-101 = "どうして泣くのですか……。"
10046080-102 = "だって、ナギちゃんが……うぅ、うわああん！"
10046080-107 = "ミカ。"
10046080-111 = "……うん。"
10046080-114 = "もう落ち着いたのかい？"
10046080-115 = "……うん。"
10046080-116 = "相変わらず、君は忙しないな。#n一人で気がはやり、急に泣き出すなど……。"
10046080-117 = "本当に手のかかる……子供のようだ。"
10046080-118 = "ナギサ、君も同じだよ。"
10046080-122 = "はい！？"
10046080-123 = "おてんば娘は勝手に泣き出しただけだ。#n君が気に病むことなど一つもないというのに。"
10046080-124 = "これが「幼馴染」なのかな。"
10046080-130 = "ねえ、ナギちゃん。"
10046080-131 = "あの、ミカさん。"
10046080-132 = "あ……お先にどうぞ。"
10046080-133 = "いいえ、ミカさんが。"
10046080-134 = "いやいや。"
10046080-135 = "いえいえ。"
10046080-140 = "……漫才でもしてるのかい？"
10046080-141 = "いや、漫才は「ボケ」と「ツッコミ」で成立するもの……。#n「ボケ」だけとは新しいな。"
10046080-142 = "一番「ボケ」てるのってセイアちゃんだよね！？"
10046080-143 = "ミカが「ツッコミ」か……まぁ、それも悪くないが……#nそろそろ、現実の問題に向き合うべきではないかね？"
10046080-144 = "現実の問題？"
10046080-145 = "ああ。寝所が無くなった。"
10046080-146 = "あ。"
10046080-148 = "あ。"
10046080-149 = "[s] \"あ。\""
10046080-150 = "まあ、この際テント泊を楽しもうじゃないか。"
10046080-155 = "セイア様……非常に申し上げにくいのですが。"
10046080-156 = "あいにく、テントの用意はしておらず……。"
10046080-157 = "その……市街地まで買いに行くのなら、そのままホテルで宿泊したほうがよろしいかと……。"
10046080-158 = "それについては問題ない。#nハスミ、イチカ。ついてきてくれ。私の車に何個か載せてあるんだ。"
10046080-162 = "割り振りは……そうだな。ハスミとイチカはこれを使ってくれ。#n私たち三人はこっちを。"
10046080-163 = "先生は……ああ、そわそわしなくても大丈夫だ。#n私の一人用テントがある。#n小型ではあるが、一人で使うのだから、贅沢とも言えるかな？"
10046080-164 = "[s1] \"その、ありがたいんだけど……。\"\n[s2] \"なんでテントを3つも……？\""
10046080-169 = "外泊するのだから、不測の事態に備えるべきだろう？"
10046080-170 = "このまま遭難したとしても、2週間は粘れる用意がある。#n救助隊が来るには十分な時間さ。"
10046080-171 = "……昔から、セイア様はそういうところがありましたね。#n用意周到といいますか、いつも二歩先を見通しているといいますか。"
10046080-172 = "ふふ、淑女の嗜みと言ってくれ。"
10046080-173 = "さて。ハスミ、イチカ……先生。"
10046080-174 = "テントの設営を手伝ってくれるかい？"
10046080-180 = "あの二人には、もう少し話し合いが必要みたいだからね。"
10046080-183 = "（みんなでテントを設営し、就寝する準備を整えた）"
10046080-184 = "（ナギサは予想外のテント泊を楽しんでいるように見えた）"
10046080-189 = "（……しばらくして、外が静かになる頃）"
10046080-194 = "先生、もう寝てしまったかい？"
10046080-195 = "[ns3] \"ううん、入っていいよ。\"\n[ns4] \"むにゃむにゃ、もう寝てるよ。\""
10046080-198 = "まだ起きているのだね。では、失礼するよ。"
10046080-203 = "……二人で使うには窮屈だな。"
10046080-204 = "まぁ、内緒話にはちょうどいいだろう。"
10046080-205 = "「お姫様を乗せたカボチャの馬車。#nその馬車引きネズミは、どこから来たのか」"
10046080-206 = "ハッピーエンド。その裏側の物語。#n誰も気にしないし、本来は描かれることすらない物語。"
10046080-207 = "それは、[ruby=・]舞[/ruby][ruby=・]台[/ruby][ruby=・]装[/ruby][ruby=・]置[/ruby]の物語。"
10046080-208 = "知っての通り、ティーパーティーのホストは私が務める予定だった。"
10046080-209 = "意外に思ったことはないかい？#n本質的にその適性が高いのは、私よりもナギサだというのに。"
10046080-210 = "けれど、あの当時ホストとして推薦されたのは私だった。#n……どうして、「あの頃のナギサ」ではなかったのか。"
10046080-213 = "単純なことさ。"
10046080-214 = "「ネズミは馬車を引くために、馬に変わった」"
10046080-217 = "好奇心の赴くままにボタンを押す。#nあれこそ「あの頃の[ruby=きりふじ]桐藤[/ruby]ナギサ」だ。"
10046080-218 = "何時如何なる場合でも気品と余裕に満ち溢れ、ハプニングすらも楽しみながら乗り越える。彼女はそういう子だ……そういう子だった。"
10046080-221 = "……驚くのも無理はない。#n先生が見てきた姿は、「今のナギサ」だったからね。"
10046080-222 = "私[ruby=・]た[/ruby][ruby=・]ち[/ruby]は、あまり良い友達ではなかった。#n良い友達になってあげたかったが、できなかった。"
10046080-223 = "結局、ナギサは馬車を引かなければならなくなった。#nお姫様がお城に着くまで、物語がハッピーエンドを迎えるまで――ずっと、独りで。"
10046080-224 = "幸いにして、馬車はお城までたどり着いた。#nけれど、役目を終えた「馬」はしかして本来の姿を忘れてしまった。"
10046080-225 = "これは一種の贖いだ。#n知っているとも。これが、真の解決策足りえないことなど。"
10046080-226 = "だが、彼女はまだネズミに戻ることができる。#nネズミの姿を完全には忘れていない。#n――来るかもしれないその時を思うと、不安で仕方がないんだ。"
10046080-227 = "……これでは、ナギサばかりを偏執的だとは言えないな。"
10046080-228 = "結局のところ、これは先生にとっての「ネタバレ」ですらない。#n本筋から外れた……知る必要性のないことだ。"
10046080-229 = "だが、もう隠すことも、そうする理由も無くなったからね。"
10046080-230 = "[s5] \"ナギサには聞いてみたの？\"\n[s6] \"今の生活をどう思ってるのか。\""
10046080-235 = "……冗談なら笑えないな。当然、聞いていない。#n厳密に言えば、聞けないが正しいか。"
10046080-236 = "[s] \"なら、大丈夫だと思うよ。\""
10046080-237 = "その根拠を聞かせてもらっても？"
10046080-238 = "[s7] \"秘密だよ。\"\n[s8] \"ネタバレはよくないからね。\""
10046080-241 = "……！"
10046080-242 = "ふふ、これは一本取られたね。たしかに、私が言った通りだ。#nなんでも先に知ることになれば、面白味に欠けるものだと。"
10046080-243 = "だが言い換えれば、期待して良いほど面白い物語になる……#nそう解釈していいのかい？"
10046080-244 = "[s9] \"うーん、どうかな。でも、ナギサの変化は……。\"\n[s10] \"とても特別であると同時に、とても普通のことだからね。\""
10046080-247 = "ふむ……分かるようで分からないな。#nこういった役割は本来私が担うものなのに。"
10046080-248 = "……ああ、ネタバレ禁止は理解している。"
10046080-249 = "答えの存在を先生が保証してくれた。今はそれで十分だ。#nいつかその解を得る日を、心待ちにしよう。"
10046080-255 = "セイアちゃん、早く戻ってきて！大変なの！"
10046080-256 = "ナギちゃんが3連続でジョーカーを引いてるんだよ！？"
10046080-257 = "ふふ、ミカ……かつて私が、天使の右手と称されたことをお忘れですか？"
10046080-261 = "……おや、お呼びがかかってしまった。"
10046080-262 = "ここにいることがバレては面倒だ。"
10046080-263 = "では、私はこれで失礼するよ。"
10046080-267 = "セイアちゃん！遅い！"
10046080-268 = "セイアさんを巻き込むのですね？#nですが、私の優位は揺らぎませんよ。"
10046080-271 = "相変わらず、面白味に欠ける遊戯をしているのだね。"
10046080-275 = "そんなこと言うなら混ぜてあげないよ？"
10046080-276 = "ふふ、目新しい遊戯を提案しよう。"
10046080-280 = "おそらく二人は見たことがないであろう――「ゲーム機」というやつだ。"
10046080-281 = "わ、私たちだってビデオゲームくらい知ってるよ！？ね、ナギちゃん？"
10046080-286 = "も、もちろんです！娯楽の一種、ですよね？"
10046080-287 = "まさかセイアさんがそのような物を持っているとは思いませんでしたが。"
10046080-289 = "ああ。先の交流会で、ミレニアムの……友人たちが贈ってくれたものだ。"
10046080-290 = "え、セイアちゃんにお友達がいるの？"
10046080-294 = "おや？交友関係は、君よりも遥かにマシだと思うが？"
10046080-295 = "へえ？でも、お休みの日は部屋にこもってばっかだよね？"
10046080-296 = "友人との予定を[ruby=・]作[/ruby][ruby=・]れ[/ruby][ruby=・]な[/ruby][ruby=・]い[/ruby]のと[ruby=・]作[/ruby][ruby=・]ら[/ruby][ruby=・]な[/ruby][ruby=・]い[/ruby]のには、雲泥の差があるのだよ。"
10046080-301 = "交友関係でしたら、私も――"
10046080-306 = "ごめん……ナギちゃんは、その……。"
10046080-307 = "ああ、ナギサは論外だね。"
10046080-311 = "はい！？"
10046080-316 = "どうしてですか！！私にだってお友達は――"
10046080-317 = "それって、一歩後ろで「ナギサ様」ってついてくる子たちじゃないよね……？"
10046080-318 = "普通、そういう関係は友人と呼ばない。主従関係と言う。"
10046080-319 = "うわっ、セイアちゃん……ストレートにいったね！？"
10046080-320 = "そろそろ、現実と向き合う必要があるからね。"
