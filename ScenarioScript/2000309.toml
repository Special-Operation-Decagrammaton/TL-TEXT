[translation]
2000309-1 = "Fumaça e tolos gostam de lugares altos"
2000309-2 = "Kivotos - Centro da cidade"
2000309-3 = "Enquanto caminhava pela cidade, acabei encontrando Mashiro observando as ruas do topo de um prédio."
2000309-4 = "Mashiro observava as pessoas que passavam com uma expressão séria."
2000309-5 = "[s] \"O que será que ela está fazendo...?\""
2000309-6 = "Curioso, decidi segui-la até o terraço."
2000309-8 = "Terraço do prédio"
2000309-11 = "Ah, Sensei? O que faz em um terraço como este?"
2000309-12 = "Você me viu por acaso enquanto caminhava e decidiu subir?"
2000309-13 = "Entendo, é isso. Eu estava encostada no parapeito e #n talvez tenha ficado um pouco descuidada."
2000309-14 = "Se é uma nova missão? #n Não, isso é puramente um hobby meu."
2000309-15 = "Observar a cidade daqui de cima me permite ver muitas coisas."
2000309-16 = "Os carros que circulam pelas vias, os cidadãos trabalhando duro e até os estudantes indo e voltando da escola..."
2000309-17 = "Ao ver uma cidade tão organizada, fica difícil acreditar que atos malignos ainda acontecem por aqui."
2000309-18 = "Mas, com certeza, o mal deve estar tramando algo em algum lugar de Kivotos agora mesmo, tentando destruir esta paz."
2000309-19 = "Como membro do Comitê de Justiça, preciso me esforçar ainda mais..."
2000309-20 = "[s] \"Você é muito dedicada, Mashiro.\""
2000309-21 = "Sério? Eu sempre me considerei apenas uma pessoa comum..."
2000309-22 = "Justamente por ser comum, preciso me esforçar para conseguir acompanhar minhas veteranas. Por isso, sempre me dediquei seriamente, mas..."
2000309-23 = "Se isso agrada ao Sensei, talvez essa minha simplicidade não seja tão ruim assim. #n Hehe..."
2000309-24 = "[s] \"Pretende ficar aqui por mais tempo?\""
2000309-25 = "Normalmente, eu já estaria descendo agora..."
2000309-26 = "Mas, como o Sensei está aqui comigo, #n gostaria de aproveitar mais este tempo."
2000309-29 = "Hoje, só por mais um pouco... posso me permitir ser mimada por você?"
2000309-31 = "Depois disso, observei a cidade com Mashiro até o anoitecer antes de descermos do prédio."
