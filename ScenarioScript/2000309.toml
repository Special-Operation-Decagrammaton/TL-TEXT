[translation]
2000309-1 = "煙とバカは高い所が好き"
2000309-2 = "キヴォトス・繁華街"
2000309-3 = "市内を歩いていると偶然、建物の屋上から街を見下ろしているマシロを発見した。"
2000309-4 = "マシロは真剣な顔で、通りすがる人たちを観察していた。"
2000309-5 = "[s] \"何をしてるんだろう……。\""
2000309-6 = "気になって、マシロの後をつけて屋上に行ってみることにした。"
2000309-8 = "建物の屋上"
2000309-11 = "あれ、先生？こんな屋上に何かご用ですか？"
2000309-12 = "歩いてて偶然私を見つけて、上がってきたのですか？"
2000309-13 = "なるほど、そうなのですね。手すりに寄りかかって、#n少し無防備になってしまっていたかもしれません。"
2000309-14 = "新しい別の任務なのか、ですか？#nいえ、これは純粋に私の趣味です。"
2000309-15 = "ここから街を見下ろしていると、色々なものが見えてきますから。"
2000309-16 = "車道を通って市内を行き来する車たち、頑張って働く市民たち、そして登下校してる生徒たちまで……。"
2000309-17 = "こんなに秩序正しい街を見ていると、この都市でも悪い行いが起きてしまうということが、信じられなくなります。"
2000309-18 = "しかしきっと悪は、今もこの平和を壊そうと、キヴォトスのどこかで悪だくみをしているのでしょう。"
2000309-19 = "もっと正義実現委員会の一員として、頑張らないと……。"
2000309-20 = "[s] \"マシロは真面目なんだね。\""
2000309-21 = "そうですか？私は自分のことを、ただの平凡な人だと思っていました……。"
2000309-22 = "平凡だからこそ、努力しないと先輩たちの後についていけない。だからこそ、真面目に努力してきましたが……。"
2000309-23 = "先生に気に入っていただけるのでしたら、この平凡さも悪くないかもしれませんね。#nふふっ……。"
2000309-24 = "[s] \"まだここにいるつもり？\""
2000309-25 = "いつもなら、もうそろそろ下りますが……。"
2000309-26 = "今日は先生がそばにいらっしゃるので。#nもっとこの時間を楽しみたいですね。"
2000309-29 = "今日はもう少しだけ……甘えさせていただいても、いいですか？"
2000309-31 = "その後、夕暮れ時までマシロと街を見つめてから、建物を下りた。"
