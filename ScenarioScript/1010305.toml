[translation]
1010305-1 = "快刀乱麻"
1010305-2 = "桃源郷"
1010305-3 = "うむ、良い香りだ。"
1010305-4 = "どんな茶葉を使っているのだろうか？"
1010305-5 = "[s] \"マリナって、お茶に詳しいんだね？\""
1010305-6 = "レッドウィンターで、よく飲んでいるからな。"
1010305-7 = "サモワールと呼ばれる湯沸かし器具も持っているくらいだ。"
1010305-8 = "中央に収納した燃料で、お湯を沸かせるものでな。"
1010305-9 = "電気ポットのようなものをイメージしてくれ。"
1010305-10 = "いつか先生にも、レッドウィンター流の紅茶でおもてなしをしよう！"
1010305-11 = "期待してくれて構わないぞ！"
1010305-12 = "……ふむ。#n山海経のお茶は、透き通った香りがするな。"
1010305-13 = "ただ、少し物足りない気が……。"
1010305-15 = "（どこからか、騒がしく言い争っている声が聞こえてきた）"
1010305-17 = "だから、月餅は私が切るって。#nあんた、いつも8等分にしちゃうじゃん。"
1010305-18 = "8等分で良いんだよ。#nなんで4等分にこだわってるんだ？"
1010305-19 = "はぁ、何回言ったら分かるの？"
1010305-20 = "4等分に切ったほうが、きれいな形のまま食べられるでしょ。"
1010305-21 = "いやいや、月餅は厚みがあるんだし、#n8等分じゃないと食べづらくない？"
1010305-22 = "それに、お茶と交互に味わえる回数は多いほうがお得だし！"
1010305-26 = "……何の討論をしているんだ？"
1010305-27 = "[s1] \"月餅を何等分にするか……。\"\n[s2] \"……で、悩んでいるみたいだね。\""
1010305-30 = "ふむ……？"
1010305-32 = "そもそも8等分にするのが難しいから！#n失敗したら、月餅が崩れちゃうかもしれないし！"
1010305-33 = "それは、あんたが下手くそだからでしょ！"
1010305-34 = "大は小を兼ねるんだって！#nとりあえず4等分して、自分は2回に分けて食べたら良いじゃん！"
1010305-35 = "その分けて考えるのが嫌なの！"
1010305-36 = "うぅ……これでは、いつまで経っても結論が。"
1010305-37 = "あそこ、外部の人たちなのかな？"
1010305-39 = "ちょうど良かった！#n第三者なら、きっと客観的に見えているはず！"
1010305-40 = "あの人たちに、どうすれば公平に月餅を食べられるのか聞いてみよう！"
1010305-42 = "（こうして、公平な月餅の食べ方（？）についての判断を迫られることになった）"
1010305-43 = "（どちらが正解とは、はっきり言いづらいな……。）"
1010305-45 = "よし、何をするべきか分かった気がする。"
1010305-46 = "[s] \"マリナ……？\""
1010305-48 = "（マリナは勢いよく立ち上がり、議論の真っ只中にあるテーブルに向かっていった）"
1010305-51 = "では、少し失礼する。"
1010305-58 = "げ、月餅を一気に手で掴んだ……！"
1010305-59 = "しかも、一口で食べるとは……！"
1010305-61 = "（もぐもぐ、もぐもぐ）"
1010305-62 = "うむ、美味しいな。"
1010305-63 = "結局、どう食べたところで基本的な味は変わらない。"
1010305-64 = "何より、茶菓は本来の味を楽しむためにある。"
1010305-65 = "にもかかわらず、茶菓の切り分け方で争い、#nお茶を放置しては本末転倒だろう。"
1010305-66 = "……えっと、本末転倒の使い方、これで合ってるか？"
1010305-67 = "[s] \"完璧だよ、マリナ。\""
1010305-68 = "よし、なら問題ないな！"
1010305-69 = "とにかく、そういうわけだ。#n……少し、言い過ぎてしまったような気も。"
1010305-71 = "な、なるほど……！"
1010305-72 = "「物事の本質」を考えるべき、と……。"
1010305-73 = "食べ方で争うのは、無意味……！"
1010305-74 = "やっぱり、聞いて良かった！"
1010305-76 = "うむ。#n力になれたのであれば、私も嬉しい限りだ。"
1010305-77 = "しかし、先ほどから何かが足りない……。"
1010305-78 = "そうだ、ジャムはないのか？#n果肉を潰さずに、砂糖漬けしたジャムだ！"
1010305-82 = "じゃ、ジャム……！？"
1010305-83 = "お茶を飲むんじゃ！？"
1010305-84 = "もちろんだ！#nやはり、お茶にはジャムが欠かせない！"
1010305-85 = "一口目をそのまま味わったら、次はジャムを一匙。#nこれぞ、究極の楽しみ方！"
1010305-86 = "ジャムがないのなら、角砂糖でも大丈夫だ。"
1010305-87 = "甘みもほのかに楽しめるだろう！"
1010305-88 = "なっ……。"
1010305-89 = "お茶に対する冒涜だ！"
1010305-90 = "な、何だって！？"
1010305-92 = "お茶は素材の味を楽しむもの！"
1010305-93 = "透き通った色を目で、注ぐ時の清らかな音を耳で楽しまなくちゃ！"
1010305-95 = "ジャムも角砂糖も、すべて邪道！"
1010305-97 = "私はただ、レッドウィンターでのお茶の楽しみ方を話しただけなんだが……。"
1010305-99 = "（山海経の生徒たちとマリナによるお茶の飲み方議論は、その後も続いた）"
1010305-100 = "（当然、お茶は議論が終わる頃には冷えてしまっていた……）"
