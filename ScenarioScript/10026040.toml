[translation]
10026040-1 = "Episódio 4; Ponto de Investigação B: \"Ruínas Subterrâneas\""
10026040-4 = "……Ufa. Finalmente chegamos."
10026040-5 = "Entendo…… Não parece ser apenas um depósito. #nParece que este lugar também tem uma estrutura complexa……"
10026040-6 = "Parece ser uma ruína de verdade. Desta vez, talvez consigamos descobrir algo."
10026040-7 = "Seria mais eficiente se nos separássemos para procurar, mas……"
10026040-8 = "Vamos tentar não nos afastar muito. Já que Mimesis apareceram por aqui……"
10026040-9 = "Desde que estejamos ao alcance da voz…… acho que ficaremos bem, provavelmente."
10026040-10 = "……Ah, pessoal, por favor, tomem cuidado onde pisam. #nPodem acabar tropeçando."
10026040-11 = "Bem, nos vemos mais tarde……."
10026040-15 = "Ah. U-Ui……."
10026040-19 = "……Ela foi embora……."
10026040-20 = "Se é perigoso, achei que seria melhor seguirmos todos juntos……"
10026040-21 = "Será que, para a Ui, isso parece sufocante……?"
10026040-22 = "……."
10026040-23 = "……Sensei."
10026040-24 = "[s1] \"……Sim.\"\n[s2] \"Deixe isso comigo.\""
10026040-29 = "Como esperado, o chão…… dá para sentir a passagem do tempo aqui……."
10026040-30 = "A água da chuva está entrando pelo teto desmoronado, também……."
10026040-34 = "……Hieee!?"
10026040-35 = "S-Sensei, era você? Que susto. #nPor que o Sensei está aqui……?"
10026040-36 = "……Eh?"
10026040-37 = "Você estava preocupado porque Mimesis apareceram……?"
10026040-38 = "Eu não pretendia ir tão longe, então achei que estaria tudo bem, mas……"
10026040-39 = "……Do ponto de vista do Sensei, é natural que se preocupe. #nSinto muito por causar problemas agindo sozinha……"
10026040-40 = "Então, desculpe-me, mas por favor, venha comigo……."
10026040-42 = "Sobre isso……"
10026040-43 = "Não sei se é apropriado dizer isso, mas…… #nSensei…… eu agradeço."
10026040-44 = "Para ser sincera, no começo eu não estava muito animada, mas……"
10026040-45 = "Eu não desgosto de ruínas como esta."
10026040-46 = "……Não, não é que eu não desgoste…… bem, é que elas me trazem paz, eu diria."
10026040-47 = "……Eh?"
10026040-48 = "……Você achou que eu não gostava de lugares assustadores?"
10026040-49 = "Certamente, muitas pessoas não gostam. #nNão entendo bem o que as pessoas de fora pensam, mas……"
10026040-50 = "……C-claro, o Sensei é uma exceção."
10026040-51 = "Mas…… não é que eu goste de lugares escuros. #nSurpreso……?"
10026040-52 = "Eu não gosto de luzes fortes demais ou da luz solar direta, mas preciso de uma certa claridade para ler livros……"
10026040-53 = "Deixando de lado se é claro ou escuro, o que importa é…… a \"história\"."
10026040-54 = "A história oculta, aquela pela qual as pessoas de fora não se interessam muito."
10026040-55 = "E isso não se limita apenas a livros antigos."
10026040-56 = "Por exemplo, algo onde se pode sentir a passagem dos dias……"
10026040-60 = "……Até mesmo uma poça d'água como aquela. #nCada uma delas possui sua própria história."
10026040-61 = "[s3] \"……Entendo.\"\n[s4] \"Cada uma é uma história importante, não é?\""
10026040-64 = "……Sim. Tenho certeza de que há uma história ali que foi valorizada."
10026040-65 = "E ainda assim, sem pensar muito, dizem que é sombrio, desagradável…… ou que aparecem fantasmas……"
10026040-66 = "Não é falta de respeito? #nUm lugar importante que as pessoas do passado protegeram por tanto tempo……"
10026040-67 = "A \"história\" permite que você dialogue através do tempo, mesmo sem usar palavras…… não, mesmo que não possa falar."
10026040-68 = "E mesmo assim, as pessoas de fora…… ah."
10026040-72 = "Desculpe, caí no meu mau hábito de novo……"
10026040-73 = "Eu sei que nem todas as pessoas de fora são assim, eu sei disso agora."
10026040-74 = "A Hinata-san…… e a Hanako-san também, me emprestaram sua força……"
10026040-75 = "Sinceramente, não sei por que... não entendo bem o motivo, mas..."
10026040-76 = "…Talvez minha personalidade não mude da noite para o dia, mas, pelo menos, decidi parar de julgar as coisas por preconceito."
10026040-77 = "Eu tento pensar assim, mas..."
10026040-78 = "…Sério, por que eu sou sempre assim...?"
10026040-79 = "Eu tenho consciência de que minha personalidade não é das melhores... e tenho muita vontade de mudar isso."
10026040-80 = "Por isso, Sensei..."
10026040-81 = "…Por favor, me avise quando eu estiver errada."
10026040-82 = "Pode me dar uma bronca, não me importo. #n...Na verdade, tem muita coisa que eu não percebo se você não me disser."
10026040-86 = "Ah, quer dizer... desculpe, não foi com segundas intenções..."
10026040-87 = "Quero que entenda exatamente como eu disse... #nO Sensei é o Sensei, e os alunos são os alunos, não é?"
10026040-88 = "Por isso... o que eu quis dizer é que consigo aceitar de bom grado as palavras do Sensei."
10026040-89 = "…………"
10026040-90 = "…Acabei me alongando um pouco, não é?"
10026040-91 = "Vamos parar por aqui. #nNão viemos até aqui para conversar."
10026040-93 = "Por enquanto, não há dúvidas de que este é um lugar importante."
10026040-95 = "Apesar de ter uma estrutura tão complexa, o acabamento, os padrões e os ornamentos são extremamente detalhados."
10026040-96 = "Se fosse um lugar sem importância, teria sido feito de forma mais simples. #nParece que foi construído com algum propósito..."
10026040-98 = "Uma sala de operações... ou talvez, uma base subterrânea?"
10026040-99 = "Quem sabe..."
10026040-103 = "Hya!?"
10026040-104 = "…Ah, que susto. O que foi isso agora? #nPareceu que algo grande caiu..."
10026040-109 = "D-de novo... #nQue tipo de barulho é esse nessas ruínas?"
10026040-110 = "Será que a Hinata-san quebrou algo de novo...?"
10026040-111 = "Ela comete erros com frequência, afinal..."
10026040-112 = "[s5] \"Não é bom suspeitar logo de cara, Ui.\"\n[s6] \"Você não deveria dizer coisas assim.\""
10026040-115 = "Ah, é verdade..."
10026040-116 = "…Já levei uma bronca, não é?"
10026040-117 = "Não é que eu queira dizer que a culpa é da Hinata-san. #nÉ só que... algo parecido aconteceu na biblioteca..."
10026040-118 = "…Isso é uma desculpa, me desculpe. Em vez de ficar preocupada aqui, eu deveria ter ido procurar e verificar se ela está bem."
10026040-119 = "Talvez eu possa ajudar em algo... então, vamos, Sensei."
10026040-125 = "…Então você estava aqui. #nOuvi um barulho estranho e fiquei preocupada se algo tinha acontecido..."
10026040-126 = "…?"
10026040-127 = "Ei..."
10026040-128 = "…???"
10026040-129 = "Ei, você poderia me responder pelo menos..."
10026040-130 = "Ei..."
10026040-131 = "O que você está fazendo aí..."
10026040-139 = "…Ah."
10026040-140 = "…………"
10026040-141 = "…………???"
