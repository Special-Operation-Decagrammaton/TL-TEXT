[translation]
10026040-1 = "第4話;調査ポイントB「地下遺跡」"
10026040-4 = "……ふぅ。ようやく、着きましたね。"
10026040-5 = "なるほど……単なる倉庫ではなさそうです。#nここも複雑な作りをしているみたいですし……"
10026040-6 = "本格的な遺跡のようですね。今度こそ、何か掴めるかもしれません。"
10026040-7 = "手分けして探した方が効率的ですが……"
10026040-8 = "あまり離れないようにしましょう。ミメシスも出たことですし……"
10026040-9 = "声が届く範囲であれば……大丈夫ですかね、おそらく。"
10026040-10 = "……あ、皆さん、足元には気をつけてください。#n転ぶかもしれませんので。"
10026040-11 = "では、また後で……。"
10026040-15 = "あっ。う、ウイさん……。"
10026040-19 = "……行っちゃいましたね……。"
10026040-20 = "危険なら、みなさんで一緒に進んだ方が良いと思ったのですが……"
10026040-21 = "ウイさんにとっては、それが息苦しく感じるのでしょうか……？"
10026040-22 = "……。"
10026040-23 = "……先生。"
10026040-24 = "[s1] \"……うん。\"\n[s2] \"ここは私に任せて。\""
10026040-29 = "やはり足場が……時間の流れが伝わってきますね……。"
10026040-30 = "崩れ落ちた天井から、雨水が入り込んでいますし……。"
10026040-34 = "……ひぇっ！？"
10026040-35 = "せ、先生でしたか、びっくりしました。#nなぜ先生がこちらに……？"
10026040-36 = "……え？"
10026040-37 = "ミメシスが出たから、心配で……？"
10026040-38 = "そこまで遠くに行くつもりはなかったので、大丈夫だと思ったのですが……"
10026040-39 = "……先生からしたら、心配して当然ですね。#n私の単独行動で、ご迷惑を……"
10026040-40 = "それでは、すみませんがご一緒に、お願いします……。"
10026040-42 = "その……"
10026040-43 = "こんなことを言うのも、どうかとは思いますが……#n先生には……感謝しています。"
10026040-44 = "正直、最初は気が進みませんでしたが……"
10026040-45 = "こういった遺跡自体、嫌いじゃないですし。"
10026040-46 = "……いえ。嫌いじゃない、と言いますか……まぁ、落ち着くと言いますか。"
10026040-47 = "……え？"
10026040-48 = "……怖いところは苦手かと思った、ですか？"
10026040-49 = "たしかに、苦手な方も多いでしょうね。#n外の方の考えは、よく分かりませんが……"
10026040-50 = "……も、もちろん、先生は別ですけれど。"
10026040-51 = "ですが……暗い場所が好きなわけではありません。#n意外、ですかね……？"
10026040-52 = "明るすぎる照明や直射日光は苦手ですけど、本を読むにはある程度の明かりが必要ですし……"
10026040-53 = "明るい、暗いは抜きにして、大切なのは……「歴史」ですから。"
10026040-54 = "外の方があまり興味を持たないような、隠された歴史。"
10026040-55 = "それは何も、古書に限った話ではありません。"
10026040-56 = "たとえば、月日の経過を感じ取れるような……"
10026040-60 = "……ああいった、水たまりひとつとっても。#nそれぞれの歴史を有していますから。"
10026040-61 = "[s3] \"……なるほど。\"\n[s4] \"それぞれが大切な歴史なんだね。\""
10026040-64 = "……はい。きっと、そこには大切にされてきた物語があります。"
10026040-65 = "なのに、よく考えもせず陰気だとか不快だとか……幽霊が出るとか……"
10026040-66 = "失礼じゃないですか。#n昔の方々が、ずっと守ってきた大切な場所を……"
10026040-67 = "「歴史」とは、言葉を語らずとも……いえ、語れずとも、時間を超えて対話ができるんです。"
10026040-68 = "だというのに、外の人は……はぁ。"
10026040-72 = "すみません、また悪い癖が……"
10026040-73 = "外の人だって、みんながそうとは限らないと、今の私は知っているのに。"
10026040-74 = "ヒナタさんも……それにハナコさんも、力を貸していただいて……"
10026040-75 = "本当に、なぜなのか……理由はよく分かりませんが……"
10026040-76 = "……すぐに性格は直らないかもしれませんが、少なくとも、先入観で否定するのはやめよう、と。"
10026040-77 = "そう思っては、いるのですが……"
10026040-78 = "……本当、どうして私は、いつもこうなんでしょう……。"
10026040-79 = "性格が良くない自覚は……あるんです。直したいという気持ちも、ちゃんとあります。"
10026040-80 = "だから、先生……"
10026040-81 = "……私が間違っていた時は、教えてください。"
10026040-82 = "怒っていただいて、構いません。#n……むしろ言っていただかなければ、気づけないことは多いですから。"
10026040-86 = "えっと、その……すみません、変な意味ではなくて……"
10026040-87 = "言葉通りに、受け取っていただきたいのですが……#n先生は先生で、生徒は生徒じゃないですか。"
10026040-88 = "なので……先生の言葉なら、素直に受け入れられる、というお話です。"
10026040-89 = "…………。"
10026040-90 = "……少し、長くなってしまいましたね。"
10026040-91 = "この話は、ここまでにしましょう。#n私たちは、遊びに来たわけではありませんので。"
10026040-93 = "ひとまず、ここが重要な場所だったのは、間違いなさそうです。"
10026040-95 = "これほど複雑な構造だというのに、仕上げはもちろん、文様や装飾物など細部まで手が込んでいます。"
10026040-96 = "どうでもよい場所であれば、もっと簡易的な作りにしているはずですから。#nなにか、目的があって作られたような……"
10026040-98 = "作戦室……いえ、地下拠点だった可能性も？"
10026040-99 = "もしかしたら……"
10026040-103 = "ひゃっ！？"
10026040-104 = "……はぁ、びっくりしました。今のは何だったんでしょう？#n何か大きな物が落下したような……"
10026040-109 = "ま、またですね……#nこんな遺跡で、いったい何の音でしょうか。"
10026040-110 = "ヒナタさんが、また何か壊してしまったのでしょうか……？"
10026040-111 = "よくミスをしてますし……。"
10026040-112 = "[s5] \"最初から疑うのは良くないよ、ウイ。\"\n[s6] \"そんな風に言っちゃダメだよ。\""
10026040-115 = "あっ、そうでした……。"
10026040-116 = "……さっそく、怒られてしまいましたね。"
10026040-117 = "ヒナタさんのせいだと、言いたいわけではないんです。#nただ……古書館で、似たようなことがあったので……。"
10026040-118 = "……言い訳ですね、すみません。こんなところで悩んでいるくらいなら、探しに行って安否を確認した方が良いというのに。"
10026040-119 = "なにか手伝えるかもしれませんし……では、行きましょう、先生。"
10026040-125 = "……ここにいらっしゃったんですね。#n変な音が聞こえたので、なにかあったのかと……"
10026040-126 = "……？"
10026040-127 = "あの……"
10026040-128 = "……？？？"
10026040-129 = "えっと、なにか返事くらいしてくれませんか……"
10026040-130 = "ちょっと……"
10026040-131 = "一体そこで何を……"
10026040-139 = "……えっ。"
10026040-140 = "…………。"
10026040-141 = "…………？？？"
