[translation]
80000080-1 = "最強のチョコサウルス！"
80000080-2 = "（バレンタインデー当日の朝）"
80000080-8 = "先生先生！大変だよ！"
80000080-9 = "[s] \"おはよう、カエデ。今日も元気そうだね。\""
80000080-10 = "えへへ、そう？"
80000080-11 = "まあ、見ての通りめっちゃ元気だよ！#n朝ご飯だってたくさん食べたし！"
80000080-12 = "[s] \"それはよかった。毎日健康で偉いね。\""
80000080-13 = "ふふーん……"
80000080-14 = "――じゃなくて！"
80000080-15 = "いやもちろん先生が褒めてくれるのはすごく嬉しいんだけど！"
80000080-16 = "今はそれどころじゃないんだってば！先生、大変だよ！"
80000080-17 = "[s] \"何かあったの？\""
80000080-18 = "それがねそれがね！"
80000080-19 = "今朝テレビを見て知ったんだけど……"
80000080-20 = "今日はバレンタインデーなんだって！"
80000080-24 = "[ns] \"う、うん。そう……だね？\""
80000080-25 = "ごくっ……バレンタインデーってあれだよね……？"
80000080-26 = "チョコレートと火薬が、甘くほろ苦いハーモニーを奏でる日……！"
80000080-27 = "[s] \"……えっと、その話はどこから……？\""
80000080-28 = "ん？インターネットだよ？"
80000080-29 = "[s] \"……今度一緒にインターネットの使い方を勉強しようね。\""
80000080-30 = "勉強？んんんー"
80000080-31 = "……まあいいよ！"
80000080-32 = "先生と勉強するの、面白いから！"
80000080-33 = "とにかくそれは置いといて――"
80000080-34 = "バレンタインデーって、チョコレートをプレゼントする日でもあるらしいよ！"
80000080-35 = "特に手作りだと最高なんだって！"
80000080-36 = "だから私もチョコレートを作りたかったんだけど……"
80000080-37 = "ミモリ先輩とツバキ先輩に「一人で火を使うのは危険だから」って#n止められちゃってね？"
80000080-38 = "[s] \"まあ、確かにカエデ一人じゃ危ないかもね……。\""
80000080-39 = "でも、だからって手伝ってもらったら、私の手作りチョコレートじゃ#nなくなっちゃうでしょ？それは嫌だよ！"
80000080-40 = "せっかくだし、自分で作ったチョコレートを先生にプレゼントしたいもん！"
80000080-41 = "[s] \"ありがとう。でもカエデがくれるものなら、何でも嬉しいよ？\""
80000080-42 = "……ほんとに？"
80000080-43 = "自分で作らなくても、先生は喜んでくれる……"
80000080-44 = "むむむむむ～……！"
80000080-45 = "あ！"
80000080-46 = "先生！いいこと思いついたよ！"
80000080-47 = "ちょっと待ってて！"
80000080-56 = "[ns] \"えっ？あの……？\""
80000080-58 = "おっ待たせー！じゃじゃーん！"
80000080-59 = "[s] \"これは……？\""
80000080-60 = "「恐竜発掘チョコレート」だよ！"
80000080-61 = "チョコレートでできた板の中に、恐竜の形をした#nチョコレートが隠されてるんだって！"
80000080-62 = "それを壊さないように掘り出す……っていうのが、#nこれの楽しみ方らしいよ！"
80000080-63 = "というわけで、今から私がズババっと恐竜を#n掘り出して、先生にプレゼントしてあげる！"
80000080-64 = "手作りチョコレートに比べたら物足りないかもしれないけど……"
80000080-65 = "これが私らしい方法だって思うから！"
80000080-66 = "[s] \"カエデ……！\""
80000080-67 = "えへへっ、楽しみにしててね！それじゃあ始めるよ！"
80000080-69 = "（その後、カエデの恐竜発掘チャレンジが始まった）"
80000080-71 = "最初はティラノサウルス！"
80000080-72 = "いくよ！はああっ！"
80000080-77 = "あああっ！？ティラノサウルスの顔が割れちゃった！"
80000080-78 = "つ、次だよ次！"
80000080-80 = "二つ目はトリケラトプス！角がすごく素敵な恐竜だよ！"
80000080-81 = "今度は必ず……！"
80000080-82 = "いざっ！！"
80000080-87 = "うええぇ！？トリケラトプスの胴体がーー！"
80000080-88 = "だ、大丈夫！まだ一つ残ってるから！"
80000080-90 = "最後は……"
80000080-91 = "プテラノドン！#n翼がすごくかっこいい翼竜だよ！"
80000080-92 = "今度こそ……絶対成功させてみせる！"
80000080-93 = "うおおおおおっ！"
80000080-101 = "（恐竜の発掘に、並々ならぬやる気を出してくれたカエデだったが……）"
80000080-102 = "（結局、すべて失敗に終わってしまった）"
80000080-104 = "うわああぁん！一つも成功しなかったよ～！！"
80000080-105 = "楽しみにしててって言ったのに、こんな結果だなんて……#nううっ……ごめんね先生……。"
80000080-106 = "[s] \"気にしないで、大丈夫だから。\""
80000080-107 = "でも……せっかくのバレンタインデーだし……"
80000080-108 = "私の手で発掘した、かっこいい恐竜チョコレートをプレゼントしたかったのに……"
80000080-109 = "私、失敗ばかりで……"
80000080-110 = "……ぐすん。"
80000080-111 = "[s] \"カエデ。\""
80000080-112 = "……？"
80000080-113 = "[s] \"大事なのは結果じゃないよ。\""
80000080-115 = "[ns] \"カエデが私のために頑張ってくれただけでも十分嬉しい。\""
80000080-116 = "……だから……割れたチョコレートでも大丈夫……？"
80000080-117 = "そう言ってもらえるのはすごく嬉しいけど……でも……"
80000080-118 = "……あ！"
80000080-119 = "割れたチョコレート……私らしい方法……。"
80000080-120 = "先生！ちょっと待ってて！"
80000080-121 = "[s] \"えっ？どうしたの？\""
80000080-125 = "この欠片を……こうやって……"
80000080-126 = "……よし！かんせーい！"
80000080-127 = "見て！私が作った、私だけの特別なチョコレート――"
80000080-131 = "その名も――「最強のチョコサウルス」！"
80000080-132 = "[s] \"最強の……チョコサウルス……！\""
80000080-133 = "割れてない部分を使って作ってみたんだ！#nどう？普通の恐竜よりずっと強そうでしょ！？"
80000080-134 = "[s] \"うん、カエデらしいプレゼントをありがとう。\""
80000080-135 = "えへへっ、どういたしまして！それにしても……"
80000080-136 = "チョコレート見てたら食べたくなっちゃった！#nねえ先生！私も一緒に食べていい！？"
80000080-138 = "（そうしてカエデと一緒に、手作りチョコサウルスを味わった）"
