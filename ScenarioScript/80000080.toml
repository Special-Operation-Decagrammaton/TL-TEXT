[translation]
80000080-1 = "O chocossauro supremo!"
80000080-2 = "（Manhã do Dia dos Namorados）"
80000080-8 = "Sensei, Sensei! É uma emergência!"
80000080-9 = "[s] \"Bom dia, Kaede. Parece estar bem hoje também, hein?\""
80000080-10 = "Hehehe, acha?"
80000080-11 = "Bom, como pode ver, estou super bem!#nComi bastante no café da manhã também!"
80000080-12 = "[s] \"Que bom. É admirável que você esteja sempre saudável.\""
80000080-13 = "Fufun..."
80000080-14 = "――Não é isso!"
80000080-15 = "Quer dizer, claro que fico muito feliz que o Sensei me elogie!"
80000080-16 = "Mas não é hora para isso! Sensei, é uma emergência!"
80000080-17 = "[s] \"Aconteceu alguma coisa?\""
80000080-18 = "É que, é que!"
80000080-19 = "Eu vi na TV hoje de manhã e descobri que..."
80000080-20 = "Hoje é o Dia dos Namorados!"
80000080-24 = "[ns] \"Ah, sim. É... verdade, né?\""
80000080-25 = "Gulp... Dia dos Namorados é aquele dia, né...?"
80000080-26 = "O dia em que o chocolate e a pólvora criam uma harmonia doce e amarga...!"
80000080-27 = "[s] \"...Err, de onde você tirou essa história...?\""
80000080-28 = "Hm? Da internet, ué!"
80000080-29 = "[s] \"...Da próxima vez, vamos estudar juntos como usar a internet.\""
80000080-30 = "Estudar? Hmmm..."
80000080-31 = "...Bom, tudo bem!"
80000080-32 = "Estudar com o Sensei é divertido!"
80000080-33 = "De qualquer forma, deixando isso de lado――"
80000080-34 = "Parece que o Dia dos Namorados também é o dia de presentear com chocolates!"
80000080-35 = "Dizem que se for feito à mão, é melhor ainda!"
80000080-36 = "Por isso eu queria fazer chocolates, mas..."
80000080-37 = "A Mimori-senpai e a Tsubaki-senpai me proibiram, dizendo que#n\"é perigoso usar fogo sozinha\"!"
80000080-38 = "[s] \"Bom, é verdade que pode ser perigoso para você sozinha...\""
80000080-39 = "Mas se elas me ajudarem, não vai mais ser um chocolate feito por mim,#nné? Eu não quero isso!"
80000080-40 = "Já que é uma ocasião especial, eu quero presentear o Sensei com um chocolate que eu mesma fiz!"
80000080-41 = "[s] \"Obrigado. Mas qualquer coisa que venha de você, Kaede, eu ficarei feliz.\""
80000080-42 = "...Sério mesmo?"
80000080-43 = "Mesmo que eu não faça, o Sensei vai ficar feliz..."
80000080-44 = "Mmmmmm...!"
80000080-45 = "Ah!"
80000080-46 = "Sensei! Tive uma ideia!"
80000080-47 = "Espere um pouco!"
80000080-56 = "[ns] \"Hã? Ei... espera?\""
80000080-58 = "Esperei! Tcharam!"
80000080-59 = "[s] \"Isso é...?\""
80000080-60 = "É um \"Chocolate de Escavação de Dinossauro\"!"
80000080-61 = "Dizem que dentro dessa placa de chocolate,#nexiste um chocolate em formato de dinossauro escondido!"
80000080-62 = "O jeito de aproveitar é escavar sem quebrar o chocolate,#nsegundo as instruções!"
80000080-63 = "Então, agora eu vou escavar o dinossauro rapidinho#ne te dar de presente, Sensei!"
80000080-64 = "Talvez não seja tão bom quanto um chocolate feito à mão..."
80000080-65 = "Mas acho que esse é o meu jeito de fazer as coisas!"
80000080-66 = "[s] \"Kaede...!\""
80000080-67 = "Hehehe, fique ansioso! Então, vou começar!"
80000080-69 = "（Depois disso, o desafio de escavação de dinossauros da Kaede começou）"
80000080-71 = "Primeiro é o Tiranossauro!"
80000080-72 = "Lá vou eu! Haaah!"
80000080-77 = "Aaaah!? O rosto do Tiranossauro quebrou!"
80000080-78 = "P-próximo, o próximo!"
80000080-80 = "O segundo é o Tricerátops! É um dinossauro com chifres incríveis!"
80000080-81 = "Desta vez, com certeza...!"
80000080-82 = "Lá vou eu!!"
80000080-87 = "Uééé!? O corpo do Tricerátops...!"
80000080-88 = "T-tá tudo bem! Ainda falta um!"
80000080-90 = "Por último..."
80000080-91 = "Pteranodonte!#nÉ um réptil alado com asas muito legais!"
80000080-92 = "Desta vez... eu vou conseguir, com certeza!"
80000080-93 = "Uoooooh!"
80000080-101 = "（A Kaede estava extremamente motivada para escavar os dinossauros, mas...）"
80000080-102 = "（No fim, tudo terminou em fracasso）"
80000080-104 = "Uaaaaah! Não consegui completar nenhum deles~!!"
80000080-105 = "Eu disse para você esperar ansiosamente, mas olha só o resultado...#nUuu... desculpa, Sensei..."
80000080-106 = "[s] \"Não se preocupe, está tudo bem.\""
80000080-107 = "Mas... é o Dia dos Namorados, afinal..."
80000080-108 = "Eu queria te dar de presente um dinossauro de chocolate incrível que eu mesma escavei..."
80000080-109 = "Eu só cometo erros..."
80000080-110 = "...Snif."
80000080-111 = "[s] \"Kaede.\""
80000080-112 = "...?"
80000080-113 = "[s] \"O que importa não é o resultado.\""
80000080-115 = "[ns] \"Só de você ter se esforçado por mim, já fico muito feliz.\""
80000080-116 = "...Então... tudo bem se for um chocolate quebrado...?"
80000080-117 = "Fico muito feliz em ouvir isso, mas... ainda assim..."
80000080-118 = "...Ah!"
80000080-119 = "Chocolate quebrado... um jeito que é a minha cara..."
80000080-120 = "Sensei! Espere um pouco!"
80000080-121 = "[s] \"Hã? O que foi?\""
80000080-125 = "Vou pegar esses pedaços... e fazer assim..."
80000080-126 = "...Pronto! Terminei!"
80000080-127 = "Olha! O meu chocolate especial, feito por mim――"
80000080-131 = "O nome dele é―― \"O Chocossauro Supremo\"!"
80000080-132 = "[s] \"O Chocossauro... Supremo...!\""
80000080-133 = "Eu usei as partes que não quebraram para montar!#nO que achou? Parece muito mais forte que um dinossauro comum, né!?"
80000080-134 = "[s] \"Sim, obrigado pelo presente, é bem a sua cara, Kaede.\""
80000080-135 = "Ehehe, de nada! Mas agora que estou olhando para o chocolate..."
80000080-136 = "Fiquei com vontade de comer!#nEi, Sensei! Posso comer com você!?"
80000080-138 = "（E assim, saboreamos juntos o Chocossauro feito à mão）"
