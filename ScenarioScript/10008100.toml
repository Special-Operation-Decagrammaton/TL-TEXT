[translation]
10008100-1 = "第10話;反撃の狼煙"
10008100-4 = "ふむ、全体的に順調ですね。"
10008100-5 = "賽銭箱も無事取り返したことですし、カイテンジャーが注目を集めてくれていますし……。"
10008100-6 = "となると後は、状況を整理して切り抜ければ……"
10008100-11 = "ぼ、ボス！大変です！"
10008100-12 = "ノックも無しに飛び込むなんて、礼儀がなっていませんねぇ？どうされましたか？"
10008100-13 = "ちゅ、中継が！見てください！"
10008100-21 = "クロノス報道部のシノンです！現在、問題の現場から緊急速報をお伝えしております！"
10008100-23 = "今「大吉殿」は、大騒ぎの真っ只中！あちらをご覧ください！"
10008100-28 = "最初から全部詐欺だった！？"
10008100-29 = "どういうこと？あのSNSの噂は何だったの？"
10008100-30 = "わ、私のお金を返しなさい！"
10008100-35 = "どうしてこのようなことになったのか……"
10008100-36 = "その理由については、先ほどSNSに上がったこの映像をご覧ください！"
10008100-39 = "……そうですね、いつかはバレるでしょう。しかし、その前に逃げてしまえば良いだけの話。そうは思いませんか？"
10008100-40 = "それはそうですよ。あなたたちのように、SNSで広がった「願い事が叶う場所」なんて文言を信じてくれるバカたちが、この世には溢れているのですから。"
10008100-41 = "そんなバカが減らない限り、何も怖くなどありませんねぇ。はっはっはっはっは！"
10008100-44 = "ご覧の通り、この発言が波紋を広げています！果たして真意はどういうことなのでしょうか？"
10008100-45 = "大吉殿の噂は、本当に嘘だったのでしょうか？"
10008100-46 = "私たちクロノス報道部はその真相を確認するため、これより直接会場の管理人の元へ……！"
10008100-53 = "こっ……"
10008100-54 = "これは、どういう事ですか！？"
10008100-57 = "いやぁ、大騒ぎだね～。"
10008100-58 = "みなさん怒り心頭ですねぇ☆"
10008100-59 = "くふふっ、"
10008100-60 = "まさに狂騒って感じだね。楽しくなってきたじゃーん！"
10008100-65 = "ムツキ、いったい何時の間にあんなの撮ってたのよ……。"
10008100-66 = "ああ、あれ？なーんか私たちの前で、偉そうにペラペラしゃべってたでしょ？"
10008100-67 = "あの時に……。"
10008100-68 = "あはっ。私たちの前でアルちゃんと便利屋68のみんなバカにするなんて、ただじゃおけないなーって思ってさ。"
10008100-69 = "ね、面白くなってきたでしょ？"
10008100-70 = "ムツキ……。"
10008100-71 = "[s] \"流石はムツキ……。\""
10008100-77 = "まだまだ集まってきてます……！"
10008100-78 = "ん……これだともし正門から入っても、混雑のせいもあって中で捕まえるのは難しそう。"
10008100-79 = "あっ……それなら私に、良い方法がある。"
10008100-80 = "大吉殿の入り口は正門と裏口、2ヶ所あるの。もし正門さえ堂々と突破できれば……"
10008100-81 = "それを知った黒亀組のやつらは、当然裏口の方に逃走を試みるはず。"
10008100-82 = "それを狙って……！"
10008100-84 = "なるほど、流石は元バイトね！"
10008100-85 = "「元」って言わないで！バイト代だけは絶対に貰ってから辞めてやるんだから！"
10008100-86 = "[s] \"じゃあ役割分担しようか。\""
10008100-88 = "まあここは正門が私たちで、裏門が便利屋68でしょ？"
10008100-89 = "あと今回はセリカちゃんも行ってきたら？"
10008100-90 = "そうですね！"
10008100-91 = "こっちは任せて。"
10008100-92 = "賽銭箱の恨み、絶対に晴らしてみせる。"
10008100-94 = "じゃ、じゃあそっちはお願いするわ！"
10008100-95 = "こっちは先生と一緒に、必ず敵将の首を取ってくるから！"
10008100-96 = "うん、社長がそう言うなら。"
10008100-97 = "は、はいっ！任せてください！"
10008100-98 = "くふふふっ！じゃあそういうことで～……突撃ー！"
