[translation]
10008100-1 = "Episódio 10: O Sinal da Contra-ofensiva"
10008100-4 = "Hum, no geral, tudo está correndo bem."
10008100-5 = "A caixa de ofertas foi recuperada com sucesso, e os Kaitengers estão atraindo toda a atenção..."
10008100-6 = "Sendo assim, só preciso organizar a situação e sair dessa..."
10008100-11 = "Ch-Chefe! É uma emergência!"
10008100-12 = "Entrar sem bater é uma falta de educação, não acha? O que houve?"
10008100-13 = "A-A transmissão! Olhe só!"
10008100-21 = "Aqui é Chinon, do Departamento de Notícias de Chronos! Estamos transmitindo um boletim urgente diretamente do local do incidente!"
10008100-23 = "O 'Daikichi-den' está um caos total agora! Olhem só para aquilo!"
10008100-28 = "Foi tudo um golpe desde o início!?"
10008100-29 = "O que isso significa? E aqueles boatos nas redes sociais?"
10008100-30 = "D-Devolvam meu dinheiro!"
10008100-35 = "Como as coisas chegaram a esse ponto..."
10008100-36 = "Para entender o motivo, vejam este vídeo que acabou de ser postado nas redes sociais!"
10008100-39 = "...Bem, uma hora ou outra a verdade apareceria. Mas basta fugir antes disso. Não concorda?"
10008100-40 = "É claro que sim. O mundo está cheio de idiotas como vocês, que acreditam em qualquer coisa que leem nas redes sociais sobre um 'lugar onde desejos se realizam'."
10008100-41 = "Enquanto houver tantos idiotas, não tenho nada a temer. Hahahaha!"
10008100-44 = "Como podem ver, essa declaração está causando uma grande repercussão! Qual será a verdadeira intenção por trás disso?"
10008100-45 = "Será que os boatos sobre o Daikichi-den eram realmente mentira?"
10008100-46 = "Nós, do Departamento de Notícias de Chronos, vamos agora confrontar o administrador do local para confirmar a verdade...!"
10008100-53 = "Isso..."
10008100-54 = "O que significa isso!?"
10008100-57 = "Nossa, que confusão, hein."
10008100-58 = "Todo mundo está furioso, né?☆"
10008100-59 = "Kufufu,"
10008100-60 = "Parece uma loucura total. Ficou divertido, não ficou?"
10008100-65 = "Mutsuki, quando foi que você gravou isso..."
10008100-66 = "Ah, aquilo? Eles ficaram falando toda aquela arrogância na nossa frente, lembra?"
10008100-67 = "Naquela hora..."
10008100-68 = "Ahaha. Eles ficaram falando mal da Aru-chan e do pessoal da Soluções 68 na nossa frente, então eu não podia deixar barato."
10008100-69 = "Viu? Ficou bem mais interessante, não ficou?"
10008100-70 = "Mutsuki..."
10008100-71 = "[s] \"Como esperado da Mutsuki...\""
10008100-77 = "Eles continuam chegando...!"
10008100-78 = "Hum... desse jeito, mesmo que a gente entre pelo portão principal, vai ser difícil capturá-los lá dentro por causa da multidão."
10008100-79 = "Ah... nesse caso, eu tenho um bom plano."
10008100-80 = "O Daikichi-den tem duas entradas: o portão principal e a saída dos fundos. Se a gente conseguir invadir o portão principal com força total..."
10008100-81 = "O pessoal do Grupo Kurokame, ao saber disso, vai tentar fugir pelos fundos, com certeza."
10008100-82 = "E é aí que a gente pega eles...!"
10008100-84 = "Entendi, como esperado de uma ex-funcionária!"
10008100-85 = "Não me chame de 'ex'! Eu só vou pedir demissão depois que receber meu salário, nem que seja a última coisa que eu faça!"
10008100-86 = "[s] \"Então vamos dividir as tarefas.\""
10008100-88 = "Bem, o portão principal fica com a gente, e os fundos com a Soluções 68, certo?"
10008100-89 = "E desta vez, por que a Serika-chan não vai também?"
10008100-90 = "Com certeza!"
10008100-91 = "Deixem os fundos comigo."
10008100-92 = "Vou me vingar pelo que fizeram com a caixa de ofertas."
10008100-94 = "C-Certo, então contamos com vocês lá!"
10008100-95 = "Nós vamos com o Sensei e vamos capturar o líder deles, custe o que custar!"
10008100-96 = "Certo, se a presidente diz, então está combinado."
10008100-97 = "S-sim! Pode deixar comigo!"
10008100-98 = "Kufufufu! Então está decidido... Ataquem!"
