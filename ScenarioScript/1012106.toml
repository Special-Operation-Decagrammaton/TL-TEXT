[translation]
1012106-1 = "mar de verão, mar tranquilo"

1012106-2 = "(No caminho para casa, depois de parar em uma loja de conveniência, avistei uma figura familiar por trás.)"

1012106-6 = "falta? professor! #nBoa noite!"

1012106-7 = "Não acredito que nos encontramos num lugar como este."

1012106-8 = "O professor...estava voltando das compras para casa."

1012106-9 = "Estávamos apenas olhando para o mar."

1012106-10 = "A agitação do dia tornou-se tão silenciosa como se fosse uma mentira..."

1012106-11 = "Tenho certeza que você se sentirá sozinho neste silêncio..."

1012106-15 = "Acho que é a prova de que todos mudamos..."

1012106-16 = "Até agora, este ``mar tranquilo'' era uma visão comum para todos nós..."

1012106-20 = "Fufu~fufu~♪"

1012106-21 = "Um mar calmo também é bom~♪#nEu conheci o mar agitado~♪"

1012106-22 = "[ns1] (Vamos ficar quietos para não atrapalhar a música)\n[ns2] (Que bom que você pareceu se divertir)"

1012106-25 = "Deve ficar elegante, como uma flor de lótus flutuando na água. #nMolhar as roupas e o cabelo é uma característica famosa de Kakayokoji..."

1012106-26 = "Esta é uma lição que aprendi desde criança."

1012106-27 = "Mas... hehe! #nEm vez de molhar a roupa, pulei no mar!"

1012106-28 = "Se alguém em casa tivesse visto, tenho certeza que desmaiaria de choque!"

1012106-29 = "[ns3] \"Você está feliz por ter participado?\"\n[ns4] \"Você se arrepende?\""

1012106-30 = "sim! Muito!"

1012106-31 = "Sensei sempre repinta nosso mundo lindamente."

1012106-32 = "Você não vai se arrepender de nenhuma escolha! Eu gostaria de dizer #n..."

1012106-33 = "Todos nós realmente gostamos do fundo de nossos corações. Sua professora também falou que isso é o mais importante, né?"

1012106-34 = "E...esse é um segredo que só minha família sabe, nem minha família sabe..."

1012106-39 = "Na verdade, é mentira que nunca molhei a roupa no mar."

1012106-40 = "Cada vez que vou à praia, olho para a água límpida do mar e mergulho suavemente os pés nela..."

1012106-41 = "Foi uma forma secreta de todos nós aproveitarmos o verão. #n Professor? Topushi~kuretto, certo?"

1012106-43 = "(Olhei para o mar noturno com Yukari por um tempo.)"

1012106-48 = "Ah!"

1012106-49 = "[ns] \"O quê!?\""

1012106-50 = "Acabei parando meu professor!"

1012106-51 = "O professor está voltando das compras..."

1012106-52 = "(Sorvete derretido escorre de uma sacola de loja de conveniência)"

1012106-53 = "Ei, professor! Por favor, volte para casa mais cedo! Não se preocupe consigo mesmo!"

1012106-54 = "[s5] \"Não, acho que já é tarde demais...\"\n[s6] \"Grigori-kun... já é...\""

1012106-57 = "Desculpe. #nPor causa do meu próprio corpo..."

1012106-58 = "[s7] \"Não tem jeito se isso acontecer...\"\n[s8] \"Vamos adicionar mais alguns segredos.\""

1012106-61 = "...!"

1012106-66 = "Sim! Vou te acompanhar onde você for!"

1012106-68 = "(Depois, passeamos pelo mercado noturno com Yukari e gostamos de comer.)"

