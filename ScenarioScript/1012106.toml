[translation]
1012106-1 = "夏の海、静かな海"
1012106-2 = "（コンビニに寄って帰る途中で、見覚えのある後ろ姿を見つけた）"
1012106-6 = "あら？先生！#nこんばんは、ですの！"
1012106-7 = "こんなところでお会いするなんて。"
1012106-8 = "先生は……お買い物の帰り道でしたのね。"
1012106-9 = "身共は、ただ……海を眺めておりましたの。"
1012106-10 = "昼間の賑やかさが嘘のように静まり返っていて……。"
1012106-11 = "この静寂に寂しさを覚えるのは、きっと――"
1012106-15 = "身共が変わった……証なのでしょうね。"
1012106-16 = "これまでは、この「静かな海」こそが、#n身共にとって当たり前の光景だったのですから……。"
1012106-20 = "ふふん～ふふっん～♪"
1012106-21 = "静かな海も～いいけれど～♪#n賑やかな海の中を～知りましたの～♪"
1012106-22 = "[ns1] （歌を邪魔しないように黙っていよう）\n[ns2] （楽しかったみたいでよかった）"
1012106-25 = "水上に浮かぶ蓮の花のごとく、気品の上に佇むべし。#n衣や髪を濡らすことなど、勘解由小路の名折れ……。"
1012106-26 = "幼い頃からずっと、言い聞かされてきた教えですの。"
1012106-27 = "ですが……ふふっ！#n衣服を濡らすどころか、海に飛び込んでしまいましたわ！"
1012106-28 = "もし家の者が見ていたら、驚きのあまり卒倒しそうですわね！"
1012106-29 = "[ns3] \"飛び込んでみてよかった？\"\n[ns4] \"後悔してない？\""
1012106-30 = "はい！とっても！"
1012106-31 = "先生はいつも、身共の世界を美しく塗り替えてくださいますわ。"
1012106-32 = "いかなる選択も後悔いたしませぬ！#nと、申し上げたいところですが……。"
1012106-33 = "身共は、心の底から楽しんでおりました。先生も、それが一番大切だとおっしゃっていましたよね？"
1012106-34 = "そして……これは家の者も知らぬ、身共だけの秘密ですが――"
1012106-39 = "海で衣服さえ濡らしたことがないというのは……実は嘘ですの。"
1012106-40 = "海へ来るたび、澄んだ海水を眺めながら、#nそっと足を浸してみたりして……。"
1012106-41 = "それが身共なりの、ひそやかな夏の楽しみ方でしたの。#n先生？とっぷし～くれっと、ですのよ？"
1012106-43 = "（しばらくの間、ユカリと一緒に夜の海を眺めた）"
1012106-48 = "あっ！"
1012106-49 = "[ns] \"なにごと！？\""
1012106-50 = "つい先生を引き止めてしまいましたわ！"
1012106-51 = "先生はお買い物の帰りで――"
1012106-52 = "（溶けたアイスが、コンビニ袋からぽたぽたと垂れている）"
1012106-53 = "せ、先生！早くお帰りくださいまし！身共のことはお気になさらず！"
1012106-54 = "[s5] \"いや、もう手遅れかな……。\"\n[s6] \"ゴリゴリ君は……もう……。\""
1012106-57 = "もっ、申し訳ございません。#n身共のせいで……。"
1012106-58 = "[s7] \"こうなったら仕方ない……。\"\n[s8] \"もうちょっと秘密を増やしちゃおうか。\""
1012106-61 = "……！"
1012106-66 = "ええ！身共はどこまでもお供いたしますわ！"
1012106-68 = "（その後、ユカリと共に夜市を巡り、食べ歩きを楽しんだ）"
