[translation]
2300103-1 = "A mesa de hoje da Fuuka"
2300103-2 = "Você veio, Sensei."
2300103-3 = "[s] \"Eu vim porque recebi sua mensagem, mas, bem...\""
2300103-4 = "É que... ouvi uns boatos recentemente."
2300103-5 = "Disseram que você está extremamente ocupado com o trabalho no Schale, dia e noite."
2300103-6 = "E que, por causa disso, nem está conseguindo comer direito."
2300103-7 = "Isso não pode acontecer!"
2300103-8 = "Você é um adulto, não é?"
2300103-9 = "Se é um adulto, deveria cuidar melhor da sua saúde!"
2300103-10 = "[s] \"É que existem questões de adulto envolvidas...\""
2300103-11 = "Ah, nada de desculpas!"
2300103-12 = "Isso é uma emergência. Uma emergência que exige a presença da chefe do Clube de Merenda...!"
2300103-13 = "Na verdade, as compras que fiz ontem foram justamente para hoje."
2300103-14 = "[s] \"Não era para o estoque da cantina?\""
2300103-15 = "Isso foi só um extra. Claro, a cantina também é importante, mas..."
2300103-16 = "Melhorar a sua alimentação é a prioridade máxima para o Clube de Merenda!"
2300103-17 = "A energia de uma pessoa vem, fundamentalmente, da comida. Só comendo direito é que se evita problemas de saúde!"
2300103-18 = "Por isso, o prato que vou servir hoje é..."
2300103-20 = "O banquete de 18 pratos, estilo Clube de Merenda de Gehenna!"
2300103-21 = "Prepare-se, Sensei!"
2300103-23 = "Primeiro, o antepasto."
2300103-24 = "Preparei com missô branco, feijão azuki e tofu."
2300103-25 = "[s1] \"Nossa, esse tofu está delicioso...!\"\n[s2] \"O sabor do missô branco com o azuki cria uma combinação maravilhosa!\""
2300103-26 = "Hehe, uhehe! ...Bem, o próximo prato é,"
2300103-27 = "Hehe, uhehe! ...Bem, o próximo prato é,"
2300103-30 = "Este é um caldo de wonton feito com o caldo de mariscos."
2300103-31 = "Beba tudo enquanto ainda está quente!"
2300103-32 = "[s3] \"Hum, o caldo também está delicioso...!\"\n[s4] \"O aroma do marisco e do camarão dá um sabor incrível!\""
2300103-33 = "Não se surpreenda ainda. O próximo prato é..."
2300103-34 = "Não se surpreenda ainda. O próximo prato é..."
2300103-37 = "Experimente isto!"
2300103-39 = "Agora, experimente este prato!"
2300103-41 = "Vamos, agora tente comer isto, Sensei!"
2300103-43 = "(Comi todos os 18 pratos que a Fuuka preparou)"
2300103-45 = "Sensei? Você não parece estar com uma cor muito boa..."
2300103-46 = "[s] \"Ugh, m-meu estômago...\""
2300103-47 = "Hã? O estômago?"
2300103-48 = "O que houve com seu estômago?"
2300103-51 = "S-Sensei!?"
2300103-53 = "(Depois disso, recebi uma grande quantidade de remédios para o estômago na enfermaria de Gehenna)"
