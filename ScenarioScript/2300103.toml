[translation]
2300103-1 = "フウカさんの今日の食卓"
2300103-2 = "来てくださったんですね、先生。"
2300103-3 = "[s] \"メールをもらったから来たんだけど、えっと……。\""
2300103-4 = "その……最近、噂を耳にしました。"
2300103-5 = "先生がシャーレのお仕事で昼夜を問わず、すごくお忙しいというお話を。"
2300103-6 = "そのせいで、食事もちゃんと取れてないとか。"
2300103-7 = "それはいけません！"
2300103-8 = "先生は大人ですよね？"
2300103-9 = "大人でしたらもっと、きちんと健康に気を付けないと！"
2300103-10 = "[s] \"それは、大人の事情があって……。\""
2300103-11 = "もうっ、言い訳はダメです！"
2300103-12 = "これは緊急事態ですよ。給食部の部長が出ないといけない緊急事態……！"
2300103-13 = "実は、昨日買い出しに行ったのは今日のためでした。"
2300103-14 = "[s] \"学食の仕入れのためじゃなかったの？\""
2300103-15 = "それはついでに、ということです。もちろん、学食も大事ですが。"
2300103-16 = "先生の食事改善は、給食部にとっては最優先事項ですので！"
2300103-17 = "人のエネルギーというのは基本的に食事から生み出されるものです。まずはきちんと食べてこそ、健康に支障をきたさないようになるものなんです！"
2300103-18 = "ですので、本日お出しする料理は、"
2300103-20 = "ゲヘナ給食部式、会席料理18選！"
2300103-21 = "それでは、覚悟してくださいね。先生！"
2300103-23 = "まずは前菜です。"
2300103-24 = "白みそに、小豆と豆腐を和えて作りました。"
2300103-25 = "[s1] \"うん、このお豆腐、美味しい……！\"\n[s2] \"白みその風味と、小豆のアンサンブルが素晴らしい！\""
2300103-26 = "ふふっ、うふふ！……それでは次の料理は、"
2300103-27 = "ふふっ、うふふ！……それでは次の料理は、"
2300103-30 = "こちらはハマグリで出汁を取ったワンタンスープです。"
2300103-31 = "温かいうちに、ぐいっと飲んでしまってください！"
2300103-32 = "[s3] \"うん、スープも美味しい……！\"\n[s4] \"ハマグリとエビが香って、海鮮の風味がすごい！\""
2300103-33 = "驚くのはまだ早いですよ。次の料理は……。"
2300103-34 = "驚くのはまだ早いですよ。次の料理は……。"
2300103-37 = "こちらを！"
2300103-39 = "次はこの料理を！"
2300103-41 = "さあ、その次はこれを召し上がってみてください、先生！"
2300103-43 = "（そうやってフウカが出してくれた18種の料理を全部食べた）"
2300103-45 = "先生？なんだか顔色が良くないような……。"
2300103-46 = "[s] \"うっ、お、お腹が……。\""
2300103-47 = "え？お腹？"
2300103-48 = "お腹がどうされましたか？"
2300103-51 = "せ、先生！？"
2300103-53 = "（その後、ゲヘナの保健室で大量の胃薬を処方してもらった）"
