[translation]
1005703-1 = "結果は過程の中に"
1005703-3 = "さあ、寄ってらっしゃい、見てらっしゃい！年末セールの大放出ですよ！"
1005703-4 = "ほらそこの方もどうぞどうぞ！今ならおまけ付き！"
1005703-5 = "何をお探しでしょう？ウチは味も良ければ鮮度も抜群です！"
1005703-6 = "[s] \"ここは……。\""
1005703-8 = "うふふ。"
1005703-9 = "商店街の市場です。"
1005703-10 = "年末ですから、いつも以上に活気がありますね。"
1005703-11 = "[s] \"それは分かるけど、どうして市場に？\""
1005703-12 = "それは……"
1005703-13 = "市場こそ、味を巡る戦場！"
1005703-14 = "……というわけです。"
1005703-15 = "素晴らしい材料を、少しでも良い値段で売ろうとする商人たち。"
1005703-16 = "一方で、それをなんとか安く買おうと交渉するシェフや店主……。"
1005703-17 = "市場とは、その両者の間で真剣勝負が繰り広げられる場所なのです！"
1005703-18 = "そこで今日は、直接その場を見ておこうかと。"
1005703-19 = "美食の道を歩む者として……"
1005703-20 = "やはり美食が提供されるまでの過程も知っておかねば。"
1005703-21 = "――そう思いまして。"
1005703-28 = "さあさあ、一つ目から注目だよ！まずはこの大きな鯛から！"
1005703-29 = "どうだい？このきれいでツヤのある赤！"
1005703-30 = "こんな大物、めったに出会えないよ！さ、準備はいいかい？"
1005703-32 = "ふむ。確かに物は良いが……。"
1005703-33 = "あとは金額次第だな……予算も無限というわけではない。"
1005703-34 = "社長からは、とにかく良い鯛を買ってこいと言われてるけど……。"
1005703-36 = "それでは、まず6500円から！"
1005703-37 = "7000！"
1005703-38 = "それなら……7200！"
1005703-39 = "な、7300！"
1005703-40 = "最初から飛ばすな、7500！"
1005703-41 = "少し厳しいけど……7700！"
1005703-42 = "うぅ、大丈夫かな……7750！"
1005703-44 = "ご覧ください先生、熱くなってまいりましたね。"
1005703-45 = "ふふふ、これが美食につながる競争。"
1005703-46 = "その過程でも生まれる熱い戦い。"
1005703-47 = "見ているこちらまで、気持ちが高ぶってきますわ。"
1005703-48 = "[s] \"楽しそうだね、ハルナ。\""
1005703-49 = "はい、とても。日常というものは、別の誰かにとっては珍しく映るものですから。"
1005703-50 = "それにこうして競りを見ていると、なんだか……。"
1005703-51 = "[s] \"なんだか？\""
1005703-52 = "9000！"
1005703-53 = "[s] \"ハルナ！？\""
1005703-55 = "ほお。そこのお嬢さん、いきなり強気じゃないか？"
1005703-56 = "ここはシェフの名誉にかけて、簡単には退けないな。"
1005703-57 = "あぁ……どうしよう。社長に一度連絡したほうがいいかな……。"
1005703-58 = "9500で！"
1005703-59 = "こっちは9800！"
1005703-60 = "それなら10000！"
1005703-65 = "（その後も競売はヒートアップしていった）"
1005703-66 = "（見事に鯛を競り落とした勝者は……なんとハルナだった）"
1005703-67 = "（値段には触れないことにしよう）"
1005703-72 = "ふふ、ふふふっ……。"
1005703-73 = "[s] \"だ、大丈夫……？\""
1005703-74 = "何を仰いますか、先生。"
1005703-75 = "これも究極の美食のためと思えば、むしろ安いもの。"
1005703-76 = "しかし次は、こちらの鯛をどのように味わうのかという問題が出てきましたわね。"
1005703-77 = "これについては、知人の料理人にお願いするとしましょう。"
1005703-78 = "一緒に来てくださいますよね？"
1005703-86 = "お待たせいたしました。まずは鯛のお粥です。"
1005703-87 = "あら、これはまた……。"
1005703-92 = "続いて、握りと刺し身です。"
1005703-93 = "皮は軽く炙りました、すぐお召し上がりいただけると良いかと。"
1005703-94 = "なるほど。"
1005703-96 = "こちらは天ぷらと太巻きです。"
1005703-97 = "ふむふむ……。"
1005703-99 = "骨とほほ肉の旨味を余すことなく使った、すまし汁のうどんです。"
1005703-100 = "なるほど、頂きますわ。"
1005703-102 = "デザートには、ドライフルーツをすりおろして作ったジェラートです。"
1005703-106 = "はい、ありがとうございます。"
1005703-109 = "どうでしたか、先生？"
1005703-110 = "[s1] \"何かこう、複雑な味というか……。\"\n[s2] \"美味しかったと思うけど……？\""
1005703-113 = "なるほど。"
1005703-114 = "私としては、せっかく競りで落としたは良かったものの……。"
1005703-115 = "何と言いますか……特別な美味しさは無かったように思いました。"
1005703-116 = "[s3] \"今度は市場を爆発させるとか……？\"\n[s4] \"まさか、料理屋さんを襲うとか……？\""
1005703-119 = "いえ、一般的には美味しいと言えるお料理でしたから。"
1005703-120 = "それに、競売の楽しさも知れました。"
1005703-121 = "何より、先生をおもてなしできましたので。先生に喜んでいただけたのなら何よりですわ。"
1005703-122 = "[s] \"それなら良かった。\""
1005703-123 = "はい。ですが……"
1005703-125 = "やはり究極の美食を探究する道のりは、一筋縄ではいきませんわね。"
