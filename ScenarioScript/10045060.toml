[translation]
10045060-1 = "Episódio 6; Repescagem: Vôlei de Praia"
10045060-2 = "Olá a todos! Conseguiram descansar bem?"
10045060-3 = "Então, vamos começar a primeira partida da repescagem: Vôlei de Praia!"
10045060-4 = "Entrada dos atletas!"
10045060-14 = "A partida será decidida em um único set de 10 pontos!"
10045060-15 = "Com certeza será um jogo tenso, onde cada ponto pode definir o vencedor!"
10045060-16 = "[ns] \"Vamos decidir quem começa sacando no pedra, papel e tesoura!\""
10045060-17 = "Representantes de ambas as equipes, um passo à frente!"
10045060-24 = "Hehe, eu vou jogar pedra."
10045060-25 = "Hoh, guerra psicológica, é?"
10045060-26 = "Se quiser ganhar, jogue papel. Eu vou jogar pedra, de forma justa e honesta!"
10045060-27 = "Justa e honesta, pedra. Entendi."
10045060-29 = "[ns] \"Pedra, papel e... Janken-pon!\""
10045060-31 = "Pedra! #nJuventude é avançar! Mas o quê!?"
10045060-32 = "Hehe, justa e honesta. Acho bom, sabe? #nBem, eu queria ganhar, então joguei papel!"
10045060-34 = "……Desculpe, Kikyou."
10045060-35 = "Não precisa entrar em pânico só porque elas começaram sacando. Nossa habilidade é superior."
10045060-37 = "Tudo bem começar assim, mas o que faremos depois? Tem algum plano?"
10045060-38 = "Claro que sim."
10045060-39 = "Aquela tal de Kikyou, ela não estava se afogando e desmaiada até agora pouco?"
10045060-40 = "Vamos focar nela sem piedade. Se atacarmos o ponto fraco, a vitória será fácil!"
10045060-41 = "É... eu não estou muito animada com isso..."
10045060-43 = "Então, que comece a partida!"
10045060-44 = "Que vença o melhor!"
10045060-48 = "Toma essa! O saque de espinho da ambição!"
10045060-57 = "Guh...!"
10045060-59 = "Ah! A bola bateu no corpo da Kikyou e saiu da linha!"
10045060-60 = "O primeiro ponto foi marcado!"
10045060-61 = "Heh, como eu pensei, os movimentos dela estão lentos. #nEu não disse? Ela é o ponto fraco!"
10045060-62 = "Eu... sou o ponto fraco?"
10045060-63 = "Exato. Se eu olhar nos olhos de alguém, sei exatamente o que está pensando."
10045060-64 = "Você deve estar pensando o seguinte agora:"
10045060-66 = "Que você está sendo um peso para todos."
10045060-67 = "Que você não está sendo útil para esta equipe."
10045060-68 = "Bem, seus amigos foram eliminados por sua causa, então não é de se estranhar que pense assim."
10045060-69 = "……!"
10045060-70 = "Kikyou! Não dê ouvidos ao que ela diz!"
10045060-71 = "……Eu sei, estou bem."
10045060-72 = "Então, lá vai mais uma!"
10045060-79 = "Guh...!"
10045060-81 = "Eu pego!"
10045060-85 = "Kikyou!"
10045060-86 = "Deixe comigo...!"
10045060-88 = "Tanuki! Bloqueia!"
10045060-89 = "Quem você está chamando de tanuki!?"
10045060-96 = "Gueh...!?"
10045060-101 = "Atleta Arata, um belo bloqueio facial! #nCom isso, a diferença já é de 2 pontos!"
10045060-102 = "Ah..."
10045060-103 = "Muito bem, bom bloqueio."
10045060-104 = "Não foi nada bom! #nUgh... meu nariz está sangrando..."
10045060-105 = "A Hyakkiyako é só isso? Perdi meu tempo ficando em alerta."
10045060-106 = "Se eu continuar focando nela desse jeito...!"
10045060-108 = "......"
10045060-109 = "Se eu deixar eles falarem o que querem...!"
10045060-111 = "E assim a partida continuou..."
10045060-122 = "Fim de jogo!"
10045060-123 = "Uma troca de golpes que não permitiu nem um piscar de olhos! Que partida acalorada!"
10045060-124 = "Haa, haa..."
10045060-125 = "......"
10045060-127 = "Puff... hahah..."
10045060-128 = "Queimei até o fim... virei cinzas..."
10045060-130 = "O placar final foi 10 a 7!"
10045060-131 = "A primeira partida termina com a vitória da equipe de Kikyou e Renge!"
10045060-132 = "Ora, ora, vocês são fortes, hein..."
10045060-133 = "Eu te disse... que não ia dar..."
10045060-139 = "Então, vamos fazer uma entrevista!"
10045060-140 = "[ns] \"A atuação da Renge foi o destaque da partida!\""
10045060-141 = "Eu só fiz o que tinha que ser feito."
10045060-142 = "Houve um momento no meio da partida em que o fluxo mudou drasticamente... o que causou isso?"
10045060-143 = "Talvez o fato de que 'não querer perder' virou 'não posso perder'."
10045060-144 = "Eu não perdoo quem zomba dos meus amigos."
10045060-146 = "......"
10045060-147 = "Senpai Kikyou, parece que você ainda não recuperou o ritmo."
10045060-148 = "A coordenação com a Senpai Renge não estava encaixando bem."
10045060-149 = "Entendo..."
10045060-150 = "Kikyou... você ainda está pensando naquilo, né?"
10045060-151 = "Na verdade, tem uma coisa que eu não tinha contado..."
10045060-152 = "Acho que exagerei um pouco no barco. #nMeu braço direito está um pouco difícil de mover."
10045060-153 = "Is-isso, você precisa ir ao médico imediatamente—"
10045060-154 = "Obrigada. Mas não precisa se preocupar. #nNão é nada grave, e acho que vai sarar logo desse jeito."
10045060-155 = "Entendido! Então, até que o braço direito da Senpai Nagusa se recupere, eu darei todo o meu suporte!"
10045060-157 = "...Entendo."
10045060-158 = "Ué? Aconteceu alguma coisa?"
10045060-159 = "A Nagusa-san não parece estar em perfeitas condições. É um pouco preocupante."
10045060-160 = "Hã, você consegue saber só de olhar?"
10045060-161 = "Fufu, eu tenho um pequeno método para isso."
10045060-163 = "Muito bem! Parece que a segunda partida está pronta! Entrada dos atletas!"
10045060-173 = "Então, que comece o duelo! #n—Preparem-se!"
10045060-175 = "Assim começou a segunda partida."
10045060-185 = "Uma batalha intensa que não permitia desviar o olhar estava se desenrolando."
10045060-190 = "Oh, a atleta Mimori! Que jogada, parece até que ela está lendo a mente do adversário!"
10045060-191 = "Ela não recua nem um passo contra a Hyakkiyako!"
10045060-192 = "Sinto como se estivessem lendo meus pensamentos."
10045060-193 = "Ler a mente..."
10045060-194 = "Se eu pensar demais, acabo falhando..."
10045060-195 = "Então—"
10045060-196 = "Vou esvaziar minha mente!"
10045060-197 = "Como uma sacerdotisa que dança, deixarei meu corpo ser guiado pelo vento. #nComo as pétalas de cerejeira que flutuam na brisa da primavera..."
10045060-198 = "Eu enfrentarei a mim mesma com um coração flexível e digno!"
10045060-199 = "Agora é a vez da equipe da Hyakkiyako sacar! A atleta Yukari se posicionou!"
10045060-200 = "Muito bem, é hora do nosso avanço triunfante!"
10045060-209 = "Oh, o jogo virou."
10045060-210 = "Sim, Yukari e a veterana Nagusa estão se complementando muito bem."
10045060-211 = "Comparada a elas, eu..."
10045060-212 = "Ei, ei, até quando você vai ficar remoendo isso?"
10045060-213 = "Ninguém é perfeito desde o começo."
10045060-214 = "Ficar preocupada, se sentir perdida... isso é o que chamamos de juventude, não é?"
10045060-216 = "..."
10045060-217 = "Entendi. Então vamos fazer o seguinte."
10045060-218 = "Quando essa prova acabar, eu vou te ensinar a nadar, Kikyou!"
10045060-219 = "Eu... nadar?"
10045060-220 = "Kikyou, você é esperta, vai aprender rapidinho. #nNão vou deixar você dizer que tem medo de água nunca mais."
10045060-221 = "Em que base você diz isso..."
10045060-222 = "Eu estive observando você de perto esse tempo todo."
10045060-224 = "Isso não é o suficiente?"
10045060-228 = "...Francamente, você não muda nada mesmo."
10045060-233 = "Partida... encerrada!"
10045060-234 = "Mais uma disputa acirrada!"
10045060-235 = "Com um placar de 10 a 8, quem vence a partida e garante a vaga na final é...!"
10045060-236 = "[ns] \"A equipe de Nagusa e Yukari!\""
10045060-244 = "..."
10045060-247 = "(Renge é minha amiga de infância)"
10045060-248 = "(Uma amiga que me conhece melhor do que qualquer outra pessoa)"
10045060-249 = "(...É por isso que eu preciso me esforçar mais)"
10045060-250 = "(Não posso mais ser um peso para a Renge)"
10045060-251 = "(Eu vou vencer, custe o que custar)"
10045060-252 = "(Não por mim, mas pela Renge...!)"
