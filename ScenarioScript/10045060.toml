[translation]
10045060-1 = "第6話;敗者復活戦：ビーチバレー"
10045060-2 = "皆さ～ん！しっかり休憩できましたか～？"
10045060-3 = "それでは今から、敗者復活戦！ビーチバレーの第1試合を始めます！"
10045060-4 = "選手入場！"
10045060-14 = "試合は10点先取の一本勝負！"
10045060-15 = "1点が勝敗を分ける、緊張感のある試合になること間違いなし！"
10045060-16 = "[ns] \"先攻はジャンケンで決めるよ！\""
10045060-17 = "両チームの代表、一歩前へ！"
10045060-24 = "へっへっへ、私はグーを出す。"
10045060-25 = "へぇ、心理戦か。"
10045060-26 = "勝ちたきゃパーを出すんだな。私は正々堂々グーで勝負する！"
10045060-27 = "正々堂々、グー。なるほどな。"
10045060-29 = "[ns] \"最初はグー！じゃんけん――ポン！\""
10045060-31 = "グー！#n青春は突進だ！ってあれ！？"
10045060-32 = "へっへっへ、正々堂々。いいと思うぜ？#nまっ、私は勝ちたいからパーを出したけどな！"
10045060-34 = "……ごめん、キキョウ。"
10045060-35 = "先攻を取られたぐらいで慌てる必要はないよ。実力はこっちが上なんだから。"
10045060-37 = "最初はいいけど、この後はどうする？何か策はあるのか？"
10045060-38 = "もちろんさ。"
10045060-39 = "あのキキョウってやつ、さっきまで溺れて気を失ってたんだろ？"
10045060-40 = "あいつを徹底的に狙うんだ。弱点を突けば試合なんて楽勝だ！"
10045060-41 = "えぇ……それはあんまり気が進まねえんだけど……。"
10045060-43 = "それでは試合開始です！"
10045060-44 = "いざ尋常に～勝負！"
10045060-48 = "喰らえ！野望のスパイクサーブ！"
10045060-57 = "ぐっ……！"
10045060-59 = "あぁっと！キキョウ選手の身体に当たってボールがラインの外へ！"
10045060-60 = "さっそく先制点が入りました！"
10045060-61 = "へっ、思った通り動きが鈍ってやがる。#n言っただろ？あいつが弱点だってな！"
10045060-62 = "私が……弱点？"
10045060-63 = "そうさ。私は相手の目を見れば、何を考えてんのか一発で分かるんだ。"
10045060-64 = "お前は今、こう考えているはずだ。"
10045060-66 = "自分がみんなの足を引っ張っている、と。"
10045060-67 = "自分はこのチームで役に立っていない、と。"
10045060-68 = "まあ、お友達はお前のせいで脱落したんだし、そう考えても無理はねぇよな。"
10045060-69 = "……！"
10045060-70 = "キキョウ！そんなやつの言うことなんて聞くな！"
10045060-71 = "……分かってる、大丈夫。"
10045060-72 = "じゃあ、もう一発いくぜ！"
10045060-79 = "ぐっ……！"
10045060-81 = "アタシが拾う！"
10045060-85 = "キキョウ！"
10045060-86 = "任せて……！"
10045060-88 = "タヌキ！ブロック！"
10045060-89 = "誰がタヌキだ！"
10045060-96 = "ぐぇっ……！？"
10045060-101 = "アラタ選手、見事な顔面ブロックです！#nこれで早くも2点差となってしまいました！"
10045060-102 = "あ……。"
10045060-103 = "よしよし、ナイスブロックだ。"
10045060-104 = "いいわけないだろ！#nうぅ……鼻血でた……。"
10045060-105 = "百花繚乱もこんなもんか。警戒して損したぜ。"
10045060-106 = "このままあいつを徹底的に狙えば……！"
10045060-108 = "……。"
10045060-109 = "言わせておけば……！"
10045060-111 = "それからも試合は続き……。"
10045060-122 = "試合終了ー！"
10045060-123 = "瞬きを許さぬ攻防！白熱した試合でしたね！"
10045060-124 = "はぁ、はぁ……。"
10045060-125 = "……。"
10045060-127 = "ふっ……ふはは……。"
10045060-128 = "燃え尽きた……真っ白に……。"
10045060-130 = "最終スコアは10対7！"
10045060-131 = "第1試合は、キキョウ・レンゲチームの勝利です～！"
10045060-132 = "なんだ、強いじゃねぇか……。"
10045060-133 = "だから無理だって……言っただろ……。"
10045060-139 = "それではインタビューをしてみましょう！"
10045060-140 = "[ns] \"レンゲの活躍が目立つ試合だったね！\""
10045060-141 = "やるべきことをやっただけだよ。"
10045060-142 = "途中から試合の流れが大きく変わるタイミングがありましたが……何がきっかけだったのでしょうか？"
10045060-143 = "負けたくない、が負けられない。になったことかな。"
10045060-144 = "友達をバカにするやつは許せないからな。"
10045060-146 = "……。"
10045060-147 = "キキョウ先輩、まだ調子が戻ってないみたいですの。"
10045060-148 = "レンゲ先輩との連携が、上手くかみ合っておりませんでした。"
10045060-149 = "そっか……。"
10045060-150 = "キキョウ……まださっきのこと気にしてるんだね。"
10045060-151 = "実は私も言ってなかったことがあるんだけど……。"
10045060-152 = "ボートの時に無茶しすぎたみたい。#nちょっと右腕が動かしにくくなってる。"
10045060-153 = "そっ、それはすぐお医者様に――"
10045060-154 = "ありがとう。でも、心配はしなくて大丈夫。#n大したことじゃないし、この感じならすぐ治ると思うから。"
10045060-155 = "分かりました！では、ナグサ先輩の右腕が回復するまで、身共が全力でさぽ～といたしますの！"
10045060-157 = "……なるほど。"
10045060-158 = "あれ？どうかしたんですか？"
10045060-159 = "ナグサさん、どうも体調が万全ではないようで。少し心配ですね。"
10045060-160 = "えっ、見ただけで分かるんですか？"
10045060-161 = "ふふっ、ちょっとした方法があるんです。"
10045060-163 = "さて！第2試合の準備が整ったようです！選手入場～！"
10045060-173 = "それでは、いざ尋常に～#n――勝負！！"
10045060-175 = "こうして始まった第2試合。"
10045060-185 = "目を離せない激戦が展開されていた。"
10045060-190 = "おおっと、ミモリ選手！まるで相手の心を読んでいるかのようなプレイっ！"
10045060-191 = "あの百花繚乱を相手に一歩も引きません！"
10045060-192 = "手の内を見透かされてる感じがするね。"
10045060-193 = "心を読み取られる……。"
10045060-194 = "考えすぎても、かえって失敗してしまいますし……。"
10045060-195 = "ならば――"
10045060-196 = "頭を空っぽに！"
10045060-197 = "舞う巫女のごとく、風に身を委ねて。#n春風に乗り、ひらひらと舞い散る桜のように……。"
10045060-198 = "身共、しなやかで凛とした心で自分と向き合いますの！"
10045060-199 = "次は百花繚乱チームのサーブ！ユカリ選手が構えました！"
10045060-200 = "いざ、快進撃のお時間ですわ！"
10045060-209 = "おっ、ありゃ流れが変わったな。"
10045060-210 = "うん、ユカリとナグサ先輩、上手にお互いを補い合ってる。"
10045060-211 = "それに比べて私は……。"
10045060-212 = "おいおい、いつまで気にしてんだよ。"
10045060-213 = "誰だって最初っから完璧なわけじゃないんだ。"
10045060-214 = "悩んで、迷って……それが青春ってもんだろ！"
10045060-216 = "……。"
10045060-217 = "分かった。じゃあこうしよう。"
10045060-218 = "この種目が終わったら、アタシがキキョウに泳ぎを教えてやる！"
10045060-219 = "私が……泳ぐ？"
10045060-220 = "キキョウは要領がいいから、すぐに覚えられるって。#n水が怖いなんて、もう言わせないからな。"
10045060-221 = "何を根拠に……。"
10045060-222 = "アタシは、ずっと横でお前を見てきた。"
10045060-224 = "これじゃ不足か？"
10045060-228 = "……まったく、そういうところは変わらないんだから。"
10045060-233 = "試合……終了ー！"
10045060-234 = "またもまたもや大接戦！"
10045060-235 = "10対8のスコアで試合を制し、決勝進出を決めたのは……！"
10045060-236 = "[ns] \"ナグサ・ユカリチームです！\""
10045060-244 = "……。"
10045060-247 = "（レンゲは幼馴染）"
10045060-248 = "（他の誰よりも、お互いを熟知してる友達）"
10045060-249 = "（……だからこそ、私はもっと頑張らなきゃ）"
10045060-250 = "（これ以上、レンゲの足を引っ張るわけにはいかない）"
10045060-251 = "（絶対に勝ってみせる）"
10045060-252 = "（私のためじゃなく、レンゲのために……！）"
