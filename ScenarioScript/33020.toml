[translation]
33020-1 = "Episódio 2; Post Mortem (2)"
33020-2 = "......Seia disse o seguinte."
33020-3 = "Se o Tratado do Éden eliminar o conflito entre Gehenna e Trinity, talvez o problema de Arius possa ser resolvido em breve."
33020-4 = "Pelo menos agora, o Tratado do Éden é a única forma de resolver esses problemas profundos entre as duas escolas... ela disse."
33020-5 = "......Mas ao mesmo tempo, a Arius estava tentando destruir o halo da Tea Party. Se isso fosse executado, Kivotos viraria um campo de batalha de verdade."
33020-6 = "Ela me perguntou se eu queria impedir isso..."
33020-8 = "......Entendi."
33020-9 = "......Vou deixar claro logo de uma vez, Azusa Shirasu. Eu não concordo com o seu pensamento."
33020-10 = "Afinal, eu sei melhor do que ninguém que a 5ª Regra Antiga... ou seja, a 'Prova do Paraíso', é impossível."
33020-11 = "Mas..."
33020-12 = "Se tudo está indo em direção à catástrofe. E se mesmo sabendo disso, você diz que vai lutar..."
33020-13 = "Eu vou te emprestar a minha sabedoria."
33020-14 = "Não posso garantir qual será o resultado, mas..."
33020-16 = "......E então, você explodiu o quarto da Seia-san?"
33020-17 = "...Era necessário para fingir que 'a Seia morreu'. Os meios para enganar até o Esquadrão Arius eram limitados..."
33020-18 = "A Seia nomeou a Capitã dos Cavaleiros Hospitalários como ajudante para encobrir todo o incidente. Ela disse para confiar tudo a ela depois disso."
33020-19 = "...E então explodi o quarto e fugi. Com base nos distúrbios e informações da Trinity depois disso, o Esquadrão acreditou que eu tive sucesso na missão."
33020-20 = "...Esse é o desenrolar dos fatos."
33020-21 = "......"
33020-22 = "Sobre o que aconteceu depois, eu também não sabia. Que ela ainda não tinha recuperado a consciência..."
33020-23 = "Dizem que os ferimentos da Seia-chan já cicatrizaram completamente. Parece que a razão dela não acordar é outra..."
33020-24 = "Então você não sabia que a ordem de ataque veio da Mika-sama?"
33020-25 = "Isso é..."
33020-26 = "A Mika-san escondeu sua verdadeira identidade esse tempo todo. A partir da posição mais baixa na cadeia de comando, como a da Azusa-chan, seria impossível saber."
33020-27 = "A-Azusa-chan não é uma assassina...! Naquela época também, a Azusa-chan estava tentando salvar a Nagisa-sama...!"
33020-28 = "...Desculpe. Meu trabalho é apenas ouvir o que você tem a dizer."
33020-29 = "...Hanako, Hifumi. Eu estou bem."
33020-35 = "Quem realmente me deu a ordem foi a 'Saori', líder do Esquadrão Arius. É ela quem comanda o Esquadrão."
33020-37 = "...Sim."
33020-38 = "De qualquer forma, Azusa Shirasu... é evidente que ela se transferiu para a Trinity e protegeu a Nagisa-san até o fim."
33020-39 = "Apesar de tudo o que aconteceu no processo, ela passou nos exames de proficiência. O Clube de Reposição, incluindo ela, deixou resultados claros."
33020-40 = "Não há o que contestar... Vou deixar a documentação dela em ordem."
33020-41 = "A Irmandade garante. Não deixaremos ninguém contestar."
33020-42 = "...Muito obrigada, Sakurako-san!"
33020-47 = "[ns] \"Muito obrigada mesmo.\""
33020-48 = "...Com isso, Azusa Shirasu tornou-se oficialmente uma aluna da Trinity."
33020-49 = "Ainda temos uma montanha de problemas, e especialmente a questão da Filial Arius não foi resolvida em nada, mas..."
33020-50 = "Podemos dizer que, pelo menos por enquanto, os problemas imediatos se acalmaram."
33020-51 = "Bom trabalho. Hanako-san, e Sensei [USERNAME]."
33020-52 = "Fufu♡"
33020-53 = "Bom, tenho outros assuntos para tratar, então vou indo. Mari, vamos."
33020-54 = "S-Sim."
33020-55 = "Hanako-san, Sensei... quando as coisas se acalmarem, por favor, vamos conversar com calma..."
33020-57 = "Fufu, com certeza. Estou ansiosa por isso, Mari-chan."
33020-60 = "Ufa... conseguimos dar um jeito na papelada da Azusa-chan."
33020-61 = "[s] \"Bom trabalho, Hanako.\""
33020-62 = "Sim, Sensei também deve estar exausto. Mas ainda tem muita coisa pendente..."
33020-63 = "Sobre a Nagisa-san, sobre a Mika-san..."
33020-64 = "Ah, por falar nisso, parece que a Nagisa-san se encontrou com a Hifumi-chan outro dia."
33020-65 = "[s] \"Nagisa...!\""
33020-66 = "Eu também só ouvi isso da Hifumi-chan, mas..."
33020-68 = "...Hifumi-san."
33020-69 = "N-Nagisa-sama, a senhora emagreceu um pouco...? A senhora está bem?"
33020-70 = "...Hifumi-san, por favor, me deixe pedir desculpas como se deve."
33020-74 = "Eu duvidei da Hifumi-san."
33020-75 = "Hã, ah..."
33020-76 = "Considerando as feridas irracionais que a Hifumi-san sofreu, eu não diria nada mesmo se você jogasse chá em mim agora."
33020-77 = "Como eu pude pensar que a Hifumi-san era a líder de um grupo criminoso de biquíni... Como eu pude..."
33020-78 = "Hã, bem..."
33020-79 = "Não vou pedir para você me perdoar... nem acho que mereço perdão. Mas..."
33020-80 = "E-Eu, Nagisa-sama."
33020-81 = "E-Eu estou bem... digo... claro que houve momentos difíceis... mas antes de tudo, deixe-me dizer apenas isto."
33020-82 = "Eu nunca, nem por um segundo, pensei em odiar a Nagisa-sama. Por favor, não peça mais desculpas..."
33020-83 = "......"
33020-84 = "...Eu, no seu lugar, com certeza não conseguiria perdoar. Por que você, Hifumi-san..."
33020-85 = "'Por que', você pergunta... quem sabe...? Ah, ahaha..."
33020-89 = "(Ah, ahaha...)"
33020-91 = "Ahaha... bem, foi divertido, à sua maneira. Nossa brincadeira de amizade, Nagisa-sama."
33020-92 = "Cof! Cof, cof, cof!"
33020-93 = "N-Nagisa-sama...!?"
33020-95 = "Cof, cof... cof. Não, por favor, não se preocupe..."
33020-96 = "V-Você está bem mesmo...!?"
33020-101 = "[ns] \"(...Definitivamente vou visitá-la logo.)\""
33020-102 = "Hum, já desfiz o mal-entendido, mas... parece que peguei um pouco pesado..."
33020-106 = "Além disso, parece que a Nagisa-san também se desculpou com outras pessoas――"
33020-115 = "Ela também me pediu desculpas, dizendo que fez coisas terríveis..."
33020-116 = "......"
33020-117 = "Acho que estamos conseguindo sair da escuridão da paranoia. Mas, talvez como compensação, a Nagisa-san..."
33020-118 = "[s] \"...Preciso fazer algo que eu possa fazer.\""
33020-119 = "......"
33020-120 = "[s] \"E claro, a Mika também...\""
33020-121 = "Mika-san..."
33020-125 = "Sensei... o que você acha sobre os motivos da Mika-san?"
33020-127 = "Humm? Quer saber? Bom, se é o Sensei quem tá perguntando, não tem o que fazer, né."
33020-128 = "É que... eu odeio a Gehenna."
33020-129 = "Eu realmente, do fundo do coração... odeio a Gehenna."
33020-131 = "Nagisa-san e Mika-san. A proximidade não é algo que se possa julgar de fora, mas... as duas são amigas de infância que passaram muito tempo juntas."
33020-132 = "A Nagisa-san, que é séria ao extremo e cautelosa ao máximo, e a Mika-san, que é ativa e energética..."
33020-133 = "Suas personalidades eram praticamente opostas, e mesmo de fora não daria para dizer facilmente que eram 'amigas íntimas'..."
33020-134 = "Mas ainda assim, eu não consigo acreditar que ela teria causado aquele incidente só por 'odiar a Gehenna'..."
33020-135 = "...Outro dia, com a ajuda da Irmandade, fui visitar a Mika-san."
33020-137 = "Lá, já havia uma visitante..."
33020-139 = "Prisão da Trinity"
33020-140 = "Uau, é a Nagi-chan! Bem-vinda!"
33020-141 = "...Mika-san, como você está? Alguma necessidade?"
33020-142 = "Bom, falando nisso, tem muita coisa faltando, né? Mas tem televisão, então é melhor do que a prisão subterrânea."
33020-143 = "Nossa, nunca pensei que fosse parar aqui. Quer dizer, não que eu não tivesse previsto, mas não achei que seria nesse momento."
33020-144 = "...É verdade."
33020-145 = "Bom, acontecimentos inesperados são a graça da vida. Vamos deixar por isso mesmo?"
33020-146 = "......"
33020-147 = "......"
33020-148 = "...De verdade, não achei que a Nagi-chan viria me ver."
33020-149 = "......"
33020-154 = "Próximo Episódio; Post Mortem (3)"