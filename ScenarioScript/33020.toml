[translation]
33020-1 = "Episódio 2;Post-Mortem (2)"
33020-2 = "……A Seia disse assim."
33020-3 = "Se, com o Tratado do Éden, os conflitos entre Gehenna e Trinity desaparecerem, o problema da Arius talvez possa, em breve, ser resolvido."
33020-4 = "O método pra resolver o problema profundo entre as duas academias, ao menos por agora, é só este Tratado do Éden…… foi o que ela disse."
33020-5 = "……Mas, ao mesmo tempo, a Arius tentava destruir a aureola do Tea Party. Se isso fosse executado, Kivotos viraria um campo de batalha de verdade."
33020-6 = "Se eu queria impedir isso ou não…… foi o que ela me perguntou."
33020-8 = "……Sei."
33020-9 = "……Vou avisando de antemão, Azusa Shirasu. Eu não assinto com o seu pensamento."
33020-10 = "Afinal, eu sei melhor que ninguém que a quinta regra antiga…… ou seja, a \"prova do paraíso\", é impossível."
33020-11 = "Mas……"
33020-12 = "supondo que tudo vá rumo à catástrofe. Se, sabendo disso, ainda assim você diz que vai lutar……"
33020-13 = "eu te empresto a minha sabedoria."
33020-14 = "Que resultado isso vai dar, eu não posso garantir nada, mas――"
33020-16 = "……E, então, você explodiu o quarto da Seia?"
33020-17 = "……Era necessário pra forjar que \"a Seia morreu\". Os meios pra enganar por completo até o Squad de Arius eram limitados……."
33020-18 = "A Seia indicou a comandante da Ordem dos Cavaleiros de Socorro como ajudante pra encobrir todo o incidente. \"Depois disto, confie tudo a ela\", disse."
33020-19 = "……E aí eu explodi o quarto e fugi. Somando o alvoroço e as informações de Trinity depois disso, o Squad acreditou que eu tinha cumprido a missão."
33020-20 = "……Este é o desenrolar dos fatos."
33020-21 = "……."
33020-22 = "Sobre o que veio depois, nem eu sabia. Que ela ainda não recobrou a consciência……."
33020-23 = "As lesões externas da Seia, dizem, já estão completamente curadas. A consciência dela não voltar parece ser por outro motivo……."
33020-24 = "Então você não sabia que quem deu a ordem de ataque foi a senhorita Mika?"
33020-25 = "Isso……"
33020-26 = "A Mika escondeu a própria identidade até o fim. Da posição mais baixa na cadeia de comando, como a da Azusa, não havia como saber."
33020-27 = "A-a Azusa não é assassina……! Naquela hora também, a Azusa tentou salvar a senhorita Nagisa……!"
33020-28 = "……Desculpe. É que ouvir as histórias assim é o meu trabalho."
33020-29 = "……Hanako, Hifumi. Eu tô bem."
33020-35 = "Quem de fato me deu a ordem foi a líder do Squad de Arius, a \"Saori\". Quem comanda o Squad é ela."
33020-37 = "……Pois é."
33020-38 = "De todo modo, a Azusa Shirasu…… ela se transferiu pra Trinity e, de fato, protegeu a Nagisa até o fim. Isso é evidente."
33020-39 = "Ainda que tenha acontecido de tudo nesse processo, ela também passou no Exame Especial de Aptidão. O Clube de Aulas de Reforço, incluindo ela, deixou, todo ele, um resultado inequívoco."
33020-40 = "Não há do que reclamar…… a papelada dela, eu deixo oficializada."
33020-41 = "A Sisterhood garante. Não deixaremos ninguém apresentar objeção."
33020-42 = "……Muito obrigada, Sakurako!"
33020-47 = "[ns] \"Muito obrigado mesmo.\""
33020-48 = "……Com isto, a Azusa Shirasu se tornou, oficialmente, aluna de Trinity."
33020-49 = "Ainda há uma montanha de problemas e, principalmente, nada da Filial de Arius foi resolvido, mas……."
33020-50 = "Por ora, dá pra dizer que ao menos o problema diante dos olhos se acalmou."
33020-51 = "Bom trabalho. Hanako, e Sensei [USERNAME]."
33020-52 = "Ufu♡"
33020-53 = "Então. Eu tenho outros compromissos, então me retiro primeiro. Marie, vamos."
33020-54 = "S-sim."
33020-55 = "É que, Hanako. Sensei também…… quando a situação se acalmar, depois, quero muito conversar com calma……."
33020-57 = "Ufu, pois é. Fico no aguardo, Marie."
33020-60 = "Ufa…… a papelada da Azusa, com isto, também se resolveu, né."
33020-61 = "[s] \"Bom trabalho, Hanako.\""
33020-62 = "Sim, o senhor é que teve trabalho. Mas ainda sobra muita coisa, né……"
33020-63 = "Tanto a Nagisa quanto a Mika……."
33020-64 = "Ah, aliás, outro dia, dizem que a Nagisa se encontrou com a Hifumi."
33020-65 = "[s] \"A Nagisa……!\""
33020-66 = "Eu também só ouvi da Hifumi, mas……"
33020-68 = "……Hifumi."
33020-69 = "N-Nagisa, a senhorita emagreceu um pouco……? A-a senhorita está bem?"
33020-70 = "……Hifumi, por favor, deixe-me me desculpar direito."
33020-74 = "Eu desconfiei de você, Hifumi."
33020-75 = "Hã, ah……."
33020-76 = "Pensando nas feridas injustas que você carregou até aqui, eu não teria o que dizer nem se você jogasse chá em mim aqui e agora."
33020-77 = "Você, a líder de um grupo criminoso de maiô…… como é que eu fui pensar uma coisa dessas……."
33020-78 = "É…… que…………."
33020-79 = "Não vou pedir que me perdoe…… nem acho que mereça perdão. Mas……"
33020-80 = "É-é que, Nagisa."
33020-81 = "E-eu tô bem, digamos…… c-claro que teve momentos difíceis…… mas, antes de qualquer coisa, deixe-me dizer só isto."
33020-82 = "Eu nunca nem pensei em odiar a senhorita, Nagisa. Então, por favor, não se desculpe mais……."
33020-83 = "……."
33020-84 = "……Se fosse eu, com certeza, não teria conseguido perdoar. Hifumi, por que você……"
33020-85 = "P-por que, você pergunta, mas sei lá, né……? A-ahaha……"
33020-89 = "(\"Ahaha……\")"
33020-91 = "Ahaha…… é que, até que foi bem divertido. A brincadeira de amiguinha com a senhorita Nagisa."
33020-92 = "Gofh! Cof, cof, cof!"
33020-93 = "N-Nagisa……!?"
33020-95 = "Cof, cof…… ahem. Não, é que, não se preocupe……."
33020-96 = "A senhorita tá bem mesmo……!?"
33020-101 = "[ns] \"（……Melhor eu ir vê-la de novo logo, mesmo）\""
33020-102 = "Hmm, o mal-entendido já foi desfeito, mas…… parece que eu exagerei um pouquinho……."
33020-106 = "E a Nagisa, pelo visto, com as outras também――"
33020-115 = "Eu também recebi um pedido de desculpas: \"eu fiz uma coisa horrível\"…… ela disse."
33020-116 = "……."
33020-117 = "Da escuridão da paranoia, acho que ela está conseguindo sair. Mas, não que seja em troca disso, a Nagisa……"
33020-118 = "[s] \"……Eu preciso fazer algo que esteja ao meu alcance.\""
33020-119 = "……."
33020-120 = "[s] \"E, claro, a Mika também……\""
33020-121 = "A Mika……."
33020-125 = "Sensei…… o que o senhor acha do motivo da Mika?"
33020-127 = "Hmm? Quer saber? Se o Sensei pede assim, não tem jeito."
33020-128 = "É que…… é porque eu odeio Gehenna."
33020-129 = "Eu, de verdade, do fundo…… do fundo do coração, odeio Gehenna."
33020-131 = "A Nagisa e a Mika. Proximidade não é algo que se julgue de fora, mas…… as duas são amigas de infância que passaram um longo tempo juntas."
33020-132 = "A Nagisa, séria a ponto de ser séria demais, do tipo que soma cautela sobre cautela; e a Mika, ativa e cheia de energia……."
33020-133 = "De personalidades quase opostas, eram duas que, mesmo vistas de fora, não dava pra rotular fácil de \"amigas próximas\", mas……"
33020-134 = "Ainda assim, pra mim, que ela tenha causado aquele incidente só pelo motivo de \"odiar Gehenna\", de jeito nenhum……."
33020-135 = "……Outro dia, com a ajuda da Sisterhood, eu fui visitar a Mika."
33020-137 = "E lá já havia outra visita……."
33020-139 = "Trinity - Prisão"
33020-140 = "Uau, é a Nagi! Bem-vinda!"
33020-141 = "……Mika, como você está? Algum incômodo?"
33020-142 = "Bom, se é por aí, é só incômodo, viu? Mas tem TV e tal, então é melhor que a masmorra do subsolo."
33020-143 = "Ié, eu não imaginava entrar aqui. Bom, não que eu não previsse, mas logo neste momento, né."
33020-144 = "……Pois…… é."
33020-145 = "Calma, calma; acontecer o que não se prevê também é um dos temperos da vida. Vamos deixar assim, tá?"
33020-146 = "……."
33020-147 = "……."
33020-148 = "……De verdade, eu não achava que você viria, Nagi."
33020-149 = "……."
33020-154 = "Próximo Episódio;Post-Mortem (3)"
