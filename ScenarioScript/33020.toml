[translation]
33020-1 = "Episódio 2; Pós-morte (2)"
33020-2 = "……Seia disse o seguinte."
33020-3 = "Se o Tratado de Eden eliminar o conflito entre Gehenna e Trinity, talvez o problema de Arius possa ser resolvido em breve."
33020-4 = "Pelo menos por enquanto, o Tratado de Eden é o único método para resolver os problemas profundamente enraizados dessas duas escolas…… foi o que ela disse."
33020-5 = "……Mas, ao mesmo tempo, Arius estava tentando destruir o halo da Tea Party. Se isso fosse executado, Kivotos certamente se tornaria um campo de batalha real."
33020-6 = "Ela me perguntou se eu queria impedir isso……"
33020-8 = "……Entendo."
33020-9 = "……Vou dizer logo de início, Shirasu Azusa. Eu não concordo com a sua forma de pensar."
33020-10 = "Afinal, eu sei melhor do que ninguém que o quinto princípio antigo…… ou seja, a \"Prova do Paraíso\", é algo impossível."
33020-11 = "Mas……"
33020-12 = "Se tudo está caminhando para a catástrofe, e mesmo sabendo disso você ainda diz que vai lutar……"
33020-13 = "Eu lhe emprestarei a minha sabedoria."
33020-14 = "Não posso garantir qual será o resultado disso, no entanto――"
33020-16 = "……E então, você explodiu o quarto da Seia?"
33020-17 = "……Era necessário para forjar a morte da Seia. Os meios para enganar completamente o Esquadrão de Arius eram limitados, e……"
33020-18 = "Seia nomeou a líder da Brigada de Socorro como sua ajudante para encobrir todo o incidente. Ela disse para confiar tudo a ela a partir dali."
33020-19 = "……E então explodi o quarto e fugi. Somando isso aos tumultos e informações que surgiram em Trinity depois, o esquadrão acreditou que eu tinha tido sucesso na missão."
33020-20 = "……Esse é o desenrolar dos fatos."
33020-21 = "……."
33020-22 = "Sobre o que aconteceu depois, eu também não sabia. Nem que ela ainda não tinha recuperado a consciência……"
33020-23 = "Dizem que os ferimentos físicos da Seia já cicatrizaram completamente. Parece que o motivo dela não acordar é outro……"
33020-24 = "Então você não sabia que a ordem de ataque foi dada pela senhorita Mika?"
33020-25 = "Isso é……"
33020-26 = "A senhorita Mika manteve sua verdadeira identidade escondida o tempo todo. Alguém na base da cadeia de comando, como a Azusa, não teria como saber."
33020-27 = "A-A Azusa não é uma assassina……! Naquela época, a Azusa também estava tentando salvar a senhorita Nagisa……!"
33020-28 = "……Sinto muito. Meu trabalho é apenas ouvir os relatos."
33020-29 = "……Hanako, Hifumi. Eu estou bem."
33020-35 = "Quem realmente me deu a ordem foi a líder do Esquadrão de Arius, \"Saori\". É ela quem comanda o esquadrão."
33020-37 = "……Entendo."
33020-38 = "De qualquer forma, Shirasu Azusa…… ela se transferiu para Trinity e, de fato, protegeu a senhorita Nagisa até o fim. Isso é evidente."
33020-39 = "Embora tenham acontecido várias coisas nesse processo, ela também passou no exame acadêmico especial. Todos do Clube de Estudos Suplementares, incluindo ela, deixaram resultados claros."
33020-40 = "Não há do que reclamar…… Eu mesma cuidarei para que a documentação dela esteja em ordem."
33020-41 = "A Sisterhood garante isso. Não deixaremos que ninguém conteste."
33020-42 = "……Muito obrigada, senhorita Sakurako!"
33020-47 = "[ns] \"Muito obrigada mesmo.\""
33020-48 = "……Com isso, Shirasu Azusa tornou-se oficialmente uma aluna de Trinity."
33020-49 = "Ainda há uma montanha de problemas, e nada foi resolvido em relação à filial de Arius, mas……"
33020-50 = "Por ora, podemos dizer que os problemas imediatos se acalmaram."
33020-51 = "Bom trabalho. Hanako, e professor [USERNAME]."
33020-52 = "Fufu♡"
33020-53 = "Bem, tenho outros assuntos para tratar, então com licença. Marie, vamos."
33020-54 = "S-Sim."
33020-55 = "Ah, Hanako. Professor…… quando a situação se acalmar, adoraria conversar com calma depois……"
33020-57 = "Fufu, é verdade. Estou ansiosa por isso, Marie-chan."
33020-60 = "Ufa…… Com isso, a papelada da Azusa-chan também foi resolvida."
33020-61 = "[s] \"Bom trabalho, Hanako.\""
33020-62 = "Sim, bom trabalho para o senhor também, professor. Mas ainda restam muitas coisas……"
33020-63 = "Sobre a senhorita Nagisa, e sobre a senhorita Mika……"
33020-64 = "Ah, falando nisso, parece que a senhorita Nagisa se encontrou com a Hifumi-chan outro dia."
33020-65 = "[s] \"Nagisa……!\""
33020-66 = "Eu também só ouvi falar disso pela Hifumi-chan, mas..."
33020-68 = "……Hifumi-san."
33020-69 = "N-Nagisa-sama, você emagreceu um pouco...? V-você está bem?"
33020-70 = "……Hifumi-san, por favor, deixe-me pedir desculpas adequadamente."
33020-74 = "Eu duvidei de você, Hifumi-san."
33020-75 = "Eh, ah..."
33020-76 = "Considerando as feridas injustas que a Hifumi-san sofreu, eu não teria nada a dizer mesmo que você jogasse chá em mim agora."
33020-77 = "Como eu pude pensar que a Hifumi-san era a líder de um grupo criminoso de biquíni... Como eu pude..."
33020-78 = "Eh, bem..."
33020-79 = "Não vou pedir para você me perdoar... nem acho que mereça ser perdoada. Mas..."
33020-80 = "E-então, Nagisa-sama."
33020-81 = "E-eu estou bem, ou melhor... c-claro que houve momentos difíceis, mas... antes de tudo, por favor, deixe-me dizer apenas isto."
33020-82 = "Eu nunca odiei a Nagisa-sama, nunca nem pensei em algo assim. Por isso, por favor, não peça mais desculpas..."
33020-83 = "……."
33020-84 = "……Se fosse eu, tenho certeza de que não conseguiria perdoar. Hifumi-san, por que..."
33020-85 = "P-por que você pergunta? Por que será, né...? A-ahaha..."
33020-89 = "（\"A-ahaha...\"）"
33020-91 = "A-ahaha... bem, foi divertido à sua maneira. A nossa brincadeira de amiguinhas, Nagisa-sama."
33020-92 = "Gof! Cof, cof, cof!"
33020-93 = "N-Nagisa-sama...!?"
33020-95 = "Cof, cof... cof. Não, bem, não se preocupe com isso..."
33020-96 = "V-você está realmente bem...!?"
33020-101 = "[ns] \"（……Afinal, vou visitá-la de novo logo logo）\""
33020-102 = "Hmm, o mal-entendido já foi resolvido, mas... parece que exagerei um pouco..."
33020-106 = "Além disso, parece que a Nagisa-san também fez isso com outras pessoas—"
33020-115 = "Ela também me pediu desculpas, dizendo que fez coisas terríveis..."
33020-116 = "……."
33020-117 = "Acho que estou conseguindo sair da escuridão da paranoia. Mas, não como uma compensação, a Nagisa-san..."
33020-118 = "[s] \"……Preciso fazer algo que esteja ao meu alcance.\""
33020-119 = "……."
33020-120 = "[s] \"E, claro, a Mika também...\""
33020-121 = "Mika-san..."
33020-125 = "Sensei... o que você acha sobre a motivação da Mika-san?"
33020-127 = "Hmm? Quer saber? Se o Sensei está perguntando, não tenho escolha."
33020-128 = "É porque... eu odeio Gehenna."
33020-129 = "Eu realmente, do fundo do meu coração... do fundo da minha alma, odeio Gehenna."
33020-131 = "Nagisa-san e Mika-san. A proximidade não é algo que se possa julgar de fora, mas... vocês duas são amigas de infância que passaram muito tempo juntas."
33020-132 = "A Nagisa-san, que é séria até demais e do tipo que é extremamente cautelosa, e a Mika-san, que é ativa e enérgica..."
33020-133 = "As personalidades são quase opostas, e mesmo de fora, não era fácil definir as duas como \"amigas íntimas\"..."
33020-134 = "Mas, ainda assim, para mim, é difícil acreditar que ela tenha causado aquele incidente apenas pelo motivo de \"odiar Gehenna\"..."
33020-135 = "……Outro dia, com a ajuda da Sisterhood, fui visitar a Mika-san."
33020-137 = "Lá, já havia outra pessoa..."
33020-139 = "Prisão de Trinity"
33020-140 = "Uau, é a Nagi-chan! Bem-vinda!"
33020-141 = "……Mika-san, como você está? Há algo que esteja lhe faltando?"
33020-142 = "Bem, se for por esse lado, falta muita coisa, né? Mas, pelo menos tem televisão, então é melhor do que a prisão subterrânea."
33020-143 = "Nossa, eu nunca pensei que acabaria aqui. Bem, não é como se eu não tivesse previsto, mas não esperava que fosse exatamente neste momento."
33020-144 = "……É verdade."
33020-145 = "Bem, bem, o inesperado também faz parte da vida. Vamos deixar por isso mesmo?"
33020-146 = "……."
33020-147 = "……。"
33020-148 = "……Sinceramente, eu não achei que a Nagi-chan viria."
33020-149 = "……。"
33020-154 = "Próximo episódio: Post-mortem (3)"
