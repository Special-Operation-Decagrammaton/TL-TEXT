[translation]
80000092-1 = "Suprimentos de primeiros socorros um pouco especiais"
80000092-2 = "（No dia dos namorados, fui chamado de repente para a sala da Mine）"
80000092-6 = "Sensei, eu estava esperando por você."
80000092-13 = "É um pouco apertado, mas por favor, entre."
80000092-17 = "[ns] （Nossa, tem uma quantidade impressionante de chocolates aqui...）"
80000092-18 = "Ah... hum, você está curioso sobre isso?"
80000092-19 = "Na verdade, venho colecionando-os como suprimentos médicos há algum tempo."
80000092-20 = "[s] \"Chocolate como suprimento médico...?\""
80000092-21 = "Sim. Surpreendentemente, eles podem se tornar suprimentos de socorro bastante adequados."
80000092-22 = "Na verdade, o chocolate é utilizado como suprimento de emergência em várias partes de Kivotos."
80000092-23 = "Primeiro de tudo, se você consumi-lo quando o nível de açúcar no sangue estiver baixo, ele pode repor a glicose de forma eficaz."
80000092-24 = "Bebidas doces funcionam mais rápido, mas... bem, elas são difíceis de carregar por aí."
80000092-25 = "Além disso, existem produtos em formato de graxa de sapato que possuem um efeito de despertar temporário devido à alta concentração de cafeína."
80000092-26 = "Existem também produtos com aveia, que dizem ser melhores do que batatas cozidas."
80000092-27 = "É difícil chamar aquilo de iguaria, mas acho que é adequado para a recuperação física através da ingestão de calorias."
80000092-28 = "E, pensando que algo tão excelente poderia ser usado para socorro e medicina..."
80000092-29 = "Comecei a colecionar chocolates há cerca de uma semana."
80000092-30 = "[s1] \"Entendo, dito dessa forma, faz sentido...\"\n[s2] \"São suprimentos de socorro, mas a embalagem é bem fofa.\""
80000092-33 = "Ah!"
80000092-34 = "I-Isso é...!"
80000092-35 = "Bem, é que os doces vendidos comercialmente geralmente vêm nesse formato, então...!"
80000092-36 = "[s3] \"Ah, é um chocolate em formato de ovo.\"\n[s4] \"Esse é aquele que vem com um brinquedo fofo dentro, né?\""
80000092-39 = "!!!"
80000092-40 = "B-bem, pode ser, mas, hum...!"
80000092-41 = "Isso, é apenas uma pesquisa de mercado! Se as crianças recebessem um chocolate tão grande, pensei que poderiam tentar engolir de uma vez e acabar engasgando...!"
80000092-46 = "[ns5] \"Este também é fofo. Chocolate branco com cobertura de limão?\"\n[ns6] \"Mine, por acaso você gosta de coisas fofas?\""
80000092-51 = "……."
80000092-52 = "E-E isso é algum problema!?"
80000092-53 = "Eu também gosto de coisas bonitas e fofas!"
80000092-54 = "Eu sinto vontade de colecionar um monte...! Será que não posso pensar assim!?"
80000092-58 = "Sensei, você também acha que não combina comigo, não é? Agindo de forma tão séria que chega a ser irritante, e então, de repente, isso..."
80000092-59 = "E-Eu sei! Mas, eu...!"
80000092-60 = "[s7] \"Calma, Mine. Não tem nada disso de não combinar.\"\n[s8] \"Coisas fofas são justiça!\""
80000092-65 = "……É verdade?"
80000092-66 = "[s] \"Sim, claro.\""
80000092-67 = "……."
80000092-68 = "Peço desculpas, acabei mostrando um lado vergonhoso..."
80000092-69 = "……Você é a primeira pessoa para quem mostro esse lado, Sensei."
80000092-70 = "Já que chegamos a esse ponto...!"
80000092-82 = "（De repente, algo foi empurrado para dentro da minha boca）"
80000092-86 = "（A doçura, o amargor e o aroma se espalham）"
80000092-88 = "Feliz Dia dos Namorados!"
80000092-94 = "（Mine deixou apenas essas palavras e saiu correndo para algum lugar）"
80000092-95 = "（Não podendo simplesmente ir embora, continuei esperando o retorno da Mine enquanto saboreava o chocolate que recebi...）"
