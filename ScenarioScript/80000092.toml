[translation]
80000092-1 = "ちょっぴり特別な救護用品"
80000092-2 = "（バレンタイン当日、突然ミネの部屋に呼び出された）"
80000092-6 = "先生、お待ちしておりました。"
80000092-13 = "狭いところですが、どうぞ。"
80000092-17 = "[ns] （何だか、すごい数のチョコレートがある……）"
80000092-18 = "あっ……その、気になりますか？"
80000092-19 = "実は以前から、医療用品として集めていまして。"
80000092-20 = "[s] \"チョコレートが、医療用品……？\""
80000092-21 = "はい。存外、きちんとした救護品になり得るのですよ。"
80000092-22 = "実際、チョコレートはキヴォトス各地で救援物資として活用されています。"
80000092-23 = "まず何より、血糖値が下がった時に摂取すれば、それなりに糖分を補えます。"
80000092-24 = "甘い飲料などの方が、効くのは早いのですが……やはり持ち歩きに難がありますので。"
80000092-25 = "それに、高濃度のカフェインによる一時的な覚醒効果がある、靴墨のような形をした製品も存在します。"
80000092-26 = "他にも、茹でたジャガイモよりはマシと言われるオートミール入りの製品なども。"
80000092-27 = "あれは嗜好品とは言い難いですが、カロリー摂取による身体の回復には向いているかと。"
80000092-28 = "そしてこれほど優れたものであれば、救護や医療にも使えるのではないかと思い……"
80000092-29 = "一週間ほど前から、チョコレートを集めるようになったのです。"
80000092-30 = "[s1] \"なるほど、そう言われるとそうかも……。\"\n[s2] \"救護用品だけど、可愛い包装だね。\""
80000092-33 = "っ！"
80000092-34 = "そ、それは……！"
80000092-35 = "その、市販のお菓子はやはりそういう形式になっているため、と言いますか……！"
80000092-36 = "[s3] \"あ、卵型のチョコだ。\"\n[s4] \"これ、中に可愛いおもちゃが入ってるやつだよね？\""
80000092-39 = "！！！"
80000092-40 = "そ、そうかもしれませんが、えっと……！"
80000092-41 = "そう、あくまで市場調査です！子どもたちがこんなに大きいチョコレートを与えられたら、ひと飲みして喉が詰まってしまうのではないかなと……！"
80000092-46 = "[ns5] \"これも可愛い。ホワイトチョコに、レモンのコーティング？\"\n[ns6] \"ミネ、もしかして可愛いの好きだったり？\""
80000092-51 = "……。"
80000092-52 = "そ、それで何か、困ることでも！？"
80000092-53 = "私だって綺麗で可愛いものが好きです！"
80000092-54 = "いっぱい集めたいと思ってしまいます……！そう思っては駄目でしょうか！？"
80000092-58 = "先生もやはり、私には似合わないと思いませんか？普段は面倒なくらい真面目に振舞っておきながら、こんな……"
80000092-59 = "わ、分かっています！ですが、私は……！"
80000092-60 = "[s7] \"落ち着いて、ミネ。似合わないなんて、そんなことは無いよ。\"\n[s8] \"可愛いは正義だから！\""
80000092-65 = "……本当、ですか？"
80000092-66 = "[s] \"うん、もちろん。\""
80000092-67 = "……。"
80000092-68 = "申し訳ありません、何だかお恥ずかしい姿を……。"
80000092-69 = "……こんなところをお見せしてしまったのは、先生が初めてです。"
80000092-70 = "こうなったら……！"
80000092-82 = "（突然、口の中に何かを押し込まれた）"
80000092-86 = "（甘さと苦さ、そして香ばしさが広がる）"
80000092-88 = "ハッピーバレンタイン、です！"
80000092-94 = "（ミネはその言葉だけを残し、逃げるようにどこかへ行ってしまった）"
80000092-95 = "（このまま出ていくわけにも行かず、貰ったチョコレートを味わいながらミネが戻ってくるのを待ち続けた……)"
