[translation]
10034030-1 = "第3話;ワイルドハントの貴人"
10034030-5 = "たしか、この辺りで……。"
10034030-6 = "……あっ、あそこです。"
10034030-7 = "……あれ？"
10034030-11 = "[ns1] \"誰か演奏してるみたいだね。\"\n[ns2] \"こんな遅い時間にも人がいるんだ。\""
10034030-14 = "近くまで行ってみましょうか。#nここからだと、よく見えませんし……。"
10034030-20 = "……違う方、みたいです。"
10034030-21 = "う～ん、どうすれば……。"
10034030-22 = "どうしたんだい、お嬢さん？"
10034030-28 = "こんな時間に歩いてたら危ないよ。"
10034030-29 = "……おっと、大人が一緒なら安心だ。"
10034030-30 = "……何か事情がありそうだね？"
10034030-31 = "私でよければ話を聞こうか？"
10034030-32 = "[s3] \"あ、それがですね……。\"\n[s4] 事情を説明する。"
10034030-36 = "……なるほど。"
10034030-37 = "たぶん、「あの人」かな。"
10034030-38 = "お知り合いですか！？"
10034030-39 = "いや。でも確か、ワイルドハントの生徒さんだね。"
10034030-40 = "ワイルドハント……？"
10034030-41 = "たしかに、あの制服は……。"
10034030-46 = "……そっか、だからあんなに上手だったんだ。"
10034030-48 = "最後に見かけた場所なら教えられるよ。"
10034030-49 = "まあ、今はいないと思うけど……。"
10034030-50 = "向こうでも誰かに声をかけて、手がかりを集めればいつか会えるんじゃないかな。"
10034030-51 = "……まぁ、いずれにせよ確証は無いけどね。"
10034030-52 = "悪いね、あまり力になれなくって。"
10034030-53 = "いえ、とっても助かりました。ありがとうございます。"
10034030-59 = "[ns5] \"良ければ、その場所を教えていただけますか？\"\n[ns6] \"頑張って探してみますので。\""
10034030-62 = "先生……。"
10034030-68 = "その、やっぱりここからは私だけで……。"
10034030-69 = "見つかる保証も、ありませんし……。"
10034030-70 = "[s7] \"夜の散歩は楽しいからね。\"\n[s8] \"デスクワークの気分転換にちょうど良いよ。\""
10034030-80 = "お嬢さん、親切は素直に受け入れるものだよ。"
10034030-81 = "行っておいで。#n意外と、すぐに会えるかもしれないし。"
10034030-82 = "は、はい……！"
10034030-89 = "……ありがとうございます！"
10034030-94 = "（その後、噂のワイルドハントの生徒と会うためにあちこちを歩き回った）"
10034030-105 = "（……気がつけば、空が明るくなり始めていた）"
10034030-108 = "もうこんな時間……。"
10034030-109 = "ごめんなさい、私のせいで……。"
10034030-110 = "先生は、優しい言葉をかけてくださいますが……。"
10034030-111 = "やっぱり、どうしても……。"
10034030-112 = "……って、こういう言い方こそ、先生に気を遣わせてしまいますよね。"
10034030-113 = "頭では、分かっているんですが……。"
10034030-117 = "……本当にこのままで、良いんでしょうか。"
10034030-118 = "私は、いつも迷惑をかけてばかりで……。#nそれに、色んなものが足りなくて……自信も、実力も……。"
10034030-119 = "そのワイルドハントの生徒さんは、私なんかと別世界の人だと思います。"
10034030-120 = "もし会えたとしても、何も取り柄がない私なんかじゃ……。"
10034030-124 = "[ns9] \"アイリ……\"\n[ns10] \"少し、話が――\""
10034030-127 = "……こんな夜遅くに涙を流すなんて、よろしくありませんね。"
10034030-132 = "だ、誰ですか……！？"
10034030-133 = "静かに寝ているつもりが、心配で目が覚めてしまいました。"
10034030-142 = "ふふっ、私は眠れる森の姫……「[ruby=しいな]椎名[/ruby]ツムギ」です。"
10034030-143 = "姫でも魔王でもスパイでも、好きなようにお呼びください。"
10034030-144 = "もっとも、ここは森でもなければ、私は姫でもありませんが――"
10034030-149 = "――「エモーション」。"
10034030-150 = "……は大事ですから。"
10034030-151 = "つまり今この時においては、そこのお嬢さんの涙。"
10034030-152 = "それこそがエモーション、なのですよ。"
10034030-156 = "[ns11] \"こんなところで寝てたの！？\"\n[ns12] \"風邪引いちゃうよ……！？\""
10034030-159 = "……ふむ。"
10034030-160 = "冷静にツッコミを受けてしまいましたか。"
10034030-161 = "……理解しましたよ。#nあなたはヒロインを守る存在なのでしょう。"
10034030-162 = "いや、それにしては……なるほど、マスコットでしたか。"
10034030-168 = "……？"
10034030-172 = "あああああっ！！"
10034030-173 = "はて、いきなり発声練習とは？"
10034030-174 = "せ、せ、先生！！"
10034030-175 = "この人です！#n私が探していた、ワイルドハントの方！"
10034030-176 = "……ふむ。"
10034030-177 = "これはもしや、思ってもみなかった出会いなのでしょうね。"
10034030-178 = "どうやら、二人とも私を探していたようですし。"
10034030-179 = "……それも、こんな時間まで。"
10034030-181 = "なるほど……理解しました。"
10034030-182 = "そうとは知らず、迷惑をかけてしまいましたね。"
10034030-183 = "い、いえ……むしろこうして会えて良かったです。"
10034030-184 = "ですが、旅路の果てに巡り会えたと考えれば、#nそれもまた価値ある時間だったとは思いませんか？"
10034030-185 = "……？"
10034030-186 = "少なくとも、私はこの状況を嬉しく思っていますよ。#nまるで、古代の逸話に登場する重要な役どころのようで……"
10034030-187 = "もしくは、自分自身が宝物のような存在になった気分とでも言えば良いですかね？#nああ、なんて素晴らしい出会いなんでしょう。"
10034030-192 = "[ns13] \"本当にこの人で合ってる……？\"\n[ns14] \"ちょっと変わってる人みたいだけど……。\""
10034030-195 = "わ、私も実際に話すのは初めてで……。"
10034030-197 = "ご安心を。#nこのようにドラマチックな[ruby=かいこう]邂逅[/ruby]を、無下にはしません。"
10034030-198 = "物語においても、時と場合によって先の展開は異なってきますが――"
10034030-203 = "――「ムード」。"
10034030-204 = "……は大事ですから。"
10034030-205 = "良いでしょう。#nこの椎名ツムギが、君たちのために全身全霊でサポートするとします。"
10034030-206 = "ほ、本当ですか！？#n曲選び、手伝ってくれるんですか？"
10034030-207 = "曲を選ぶ程度で助けるなどと言うのも、お恥ずかしい話ですが……"
10034030-208 = "さて……今宵、可憐なヒロインはどのような曲をお求めで？"
10034030-209 = "好きなイメージを聞かせてくれれば結構です。#n微力ながら、力になりましょう。"
10034030-210 = "じ、じゃあ……！"
10034030-211 = "テストやオーディションに、合格できそうな曲を……。"
10034030-212 = "……？"
10034030-213 = "……ふむ？"
10034030-214 = "あ、えっと……審査員に高評価をもらえそうな曲を教えてください！"
10034030-215 = "……はて。今、なんと言いましたか？"
10034030-216 = "テストやオーディションに合格できそうな曲、とは……#nいったいどのような意味でしょう？"
10034030-217 = "二週間後にトリニティ[ruby=カーニバル]謝肉祭[/ruby]で、ライブをするんです！"
10034030-218 = "そこで良い演奏をして、入選しないと……。"
10034030-219 = "……なるほど。"
10034030-220 = "……私、何か変なこと言いましたか？"
10034030-221 = "それとも、もしかして失礼なことを……。"
10034030-222 = "いえ、気にする必要はありません。#n他人が音を奏でる理由に口出しするなど、それこそ失礼と言うものですし。"
10034030-223 = "……ふむ。"
10034030-227 = "……物語のあらすじは理解しました。"
10034030-228 = "差し当たり、何曲か憶えがあります。"
10034030-230 = "本当ですか！？"
10034030-231 = "……ただし。"
10034030-232 = "……ただし？"
10034030-237 = "私の言葉を忘れてはなりません。"
10034030-238 = "この場でお伝えしたところで、どれほどの意味を成すのか懐疑的ですが……。"
10034030-239 = "後になって、その意味に気づく場合も往々にしてあるでしょうから。"
10034030-240 = "今は頭の片隅に残してくれさえすれば、それで構いません。"
10034030-241 = "それは……？"
10034030-242 = "……ヒロイン、[ruby=くりむら]栗村[/ruby]アイリさん。"
10034030-243 = "……は、はいっ！"
10034030-249 = "音楽とは、人の心に寄り添うものなのです。"
10034030-250 = "しかし、焦りや恐れといった感情に支配されてしまえば、#nその先に未来は無いでしょう。"
10034030-251 = "決して怖がらずに、音楽と向き合われることを願っています。"
10034030-256 = "……では、健闘を。"
