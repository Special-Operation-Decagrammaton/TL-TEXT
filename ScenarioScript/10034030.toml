[translation]
10034030-1 = "Episódio 3; A Nobre de Wild Hunt"
10034030-5 = "Se não me engano, é por aqui..."
10034030-6 = "...Ah, é ali."
10034030-7 = "...Ué?"
10034030-11 = "[ns1] \"Parece que tem alguém tocando música.\"\n[ns2] \"Tem gente por aqui a uma hora tão tardia.\""
10034030-14 = "Vamos chegar mais perto?#nDaqui não dá para ver direito..."
10034030-20 = "...Parece que não é a pessoa certa."
10034030-21 = "Hum, o que eu deveria fazer..."
10034030-22 = "O que houve, senhorita?"
10034030-28 = "É perigoso andar por aí a essa hora."
10034030-29 = "...Ah, mas com um adulto por perto, fico mais tranquilo."
10034030-30 = "...Parece que há algum motivo para isso, não é?"
10034030-31 = "Se quiser, posso te ouvir?"
10034030-32 = "[s3] \"Ah, é que...\"\n[s4] Explicar a situação."
10034030-36 = "...Entendo."
10034030-37 = "Talvez seja \"aquela pessoa\"."
10034030-38 = "Você a conhece!?"
10034030-39 = "Não. Mas, se não me engano, ela é uma aluna de Wild Hunt."
10034030-40 = "Wild Hunt...?"
10034030-41 = "Realmente, aquele uniforme é..."
10034030-46 = "...Entendi, é por isso que ela era tão boa."
10034030-48 = "Posso te dizer onde a vi pela última vez."
10034030-49 = "Bem, não acho que ela esteja lá agora, mas..."
10034030-50 = "Se você perguntar para outras pessoas por lá e reunir pistas, talvez consiga encontrá-la algum dia."
10034030-51 = "...Bem, de qualquer forma, não há garantias."
10034030-52 = "Desculpe não poder ajudar muito."
10034030-53 = "Não, você me ajudou muito. Obrigada."
10034030-59 = "[ns5] \"Se não se importar, poderia me dizer o local?\"\n[ns6] \"Vou me esforçar para procurá-la.\""
10034030-62 = "Sensei..."
10034030-68 = "É que, acho melhor eu ir sozinha daqui em diante..."
10034030-69 = "Não há garantia de que a encontrarei, e..."
10034030-70 = "[s7] \"Passeios noturnos são divertidos.\"\n[s8] \"É uma ótima forma de espairecer do trabalho de escritório.\""
10034030-80 = "Senhorita, a gentileza deve ser aceita de bom grado."
10034030-81 = "Pode ir.#nQuem sabe você não a encontra logo?"
10034030-82 = "S-sim...!"
10034030-89 = "...Muito obrigada!"
10034030-94 = "(Depois disso, caminhamos por toda parte tentando encontrar a tal aluna de Wild Hunt)"
10034030-105 = "(...Quando me dei conta, o céu já estava começando a clarear)"
10034030-108 = "Já está tão tarde..."
10034030-109 = "Desculpe, por minha causa..."
10034030-110 = "O Sensei sempre me diz palavras gentis, mas..."
10034030-111 = "Ainda assim, eu não consigo evitar..."
10034030-112 = "...Dizer isso só faz o Sensei se preocupar comigo, não é?"
10034030-113 = "Eu entendo isso racionalmente, mas..."
10034030-117 = "...Será que continuar assim é realmente o certo?"
10034030-118 = "Eu sempre causo problemas...#nAlém disso, me falta tanta coisa... confiança, habilidade..."
10034030-119 = "Acho que aquela aluna de Wild Hunt vive em um mundo completamente diferente do meu."
10034030-120 = "Mesmo que eu a encontrasse, alguém como eu, que não tem nenhum talento..."
10034030-124 = "[ns9] \"Airi...\"\n[ns10] \"Precisamos conversar um pouco...\""
10034030-127 = "...Derramar lágrimas a uma hora tão tardia da noite não é nada bom, não é?"
10034030-132 = "Q-quem está aí……!?"
10034030-133 = "Eu pretendia dormir tranquilamente, mas acordei preocupada."
10034030-142 = "Fufu, eu sou a princesa da floresta adormecida... Shiina Tsumugi."
10034030-143 = "Pode me chamar de princesa, rainha má ou espiã, como preferir."
10034030-144 = "Embora, tecnicamente, isto não seja uma floresta e eu não seja uma princesa—"
10034030-149 = "—A \"emoção\"."
10034030-150 = "……é algo importante, afinal."
10034030-151 = "Ou seja, neste exato momento, as lágrimas daquela senhorita ali."
10034030-152 = "Isso sim é uma emoção, entende?"
10034030-156 = "[ns11] \"Você estava dormindo num lugar desses!?\"\n[ns12] \"Vai acabar pegando um resfriado……!?\""
10034030-159 = "……Hum."
10034030-160 = "Recebi uma resposta afiada, não é?"
10034030-161 = "……Entendi. #nVocê deve ser o guardião da heroína."
10034030-162 = "Não, pensando bem…… entendo, você é o mascote, não é?"
10034030-168 = "……?"
10034030-172 = "AAAAAAH!!"
10034030-173 = "Ora, um exercício vocal repentino?"
10034030-174 = "Se-se-sensei!!"
10034030-175 = "É essa pessoa! #nA pessoa da Wild Hunt que eu estava procurando!"
10034030-176 = "……Hum."
10034030-177 = "Será que este é um encontro inesperado?"
10034030-178 = "Pelo visto, ambos estavam à minha procura."
10034030-179 = "……E a essa hora da noite, ainda por cima."
10034030-181 = "Entendo…… compreendo perfeitamente."
10034030-182 = "Sem saber, acabei causando um incômodo a vocês."
10034030-183 = "N-não…… na verdade, fico feliz por termos nos encontrado."
10034030-184 = "Mas, se pensarmos que nos encontramos ao fim de uma jornada, #nnão acha que isso torna o tempo gasto valioso?"
10034030-185 = "……?"
10034030-186 = "Pelo menos, eu estou feliz com esta situação. #nÉ como se eu fosse um personagem importante em um conto antigo……"
10034030-187 = "Ou talvez, como se eu mesma tivesse me tornado um tesouro? #nAh, que encontro maravilhoso."
10034030-192 = "[ns13] \"Tem certeza de que é essa pessoa mesmo……?\"\n[ns14] \"Ela parece ser um pouco excêntrica……\""
10034030-195 = "E-eu também é a primeira vez que converso com ela……"
10034030-197 = "Fiquem tranquilos. #nNão desperdiçarei um encontro tão dramático como este."
10034030-198 = "Mesmo nas histórias, o desenrolar dos fatos muda dependendo do tempo e da ocasião, mas—"
10034030-203 = "—O \"clima\"."
10034030-204 = "……é algo importante, afinal."
10034030-205 = "Muito bem. #nEu, Shiina Tsumugi, darei todo o meu apoio a vocês de corpo e alma."
10034030-206 = "S-sério!? #nVocê vai me ajudar a escolher a música?"
10034030-207 = "É até vergonhoso dizer que estou ajudando apenas escolhendo uma música, mas……"
10034030-208 = "Bem…… nesta noite, que tipo de música a adorável heroína deseja?"
10034030-209 = "Basta me dizer qual é a imagem que você deseja passar. #nFarei o que estiver ao meu alcance para ajudar."
10034030-210 = "E-então……!"
10034030-211 = "Uma música que me ajude a passar no teste ou na audição……"
10034030-212 = "……?"
10034030-213 = "……Hum?"
10034030-214 = "Ah, quer dizer…… por favor, me indique uma música que impressione os jurados!"
10034030-215 = "……Ora. O que você disse agora?"
10034030-216 = "Uma música para passar em testes ou audições…… #no que exatamente isso significa?"
10034030-217 = "Daqui a duas semanas, faremos um show no Carnaval de Trinity!"
10034030-218 = "Se não tivermos uma boa performance lá e formos selecionadas……"
10034030-219 = "……Entendo."
10034030-220 = "……Eu disse algo estranho?"
10034030-221 = "Ou, por acaso, fui indelicada……."
10034030-222 = "Não, não há necessidade de se preocupar. #nInterferir nos motivos pelos quais alguém toca música seria, de fato, uma indelicadeza."
10034030-223 = "……Hum."
10034030-227 = "……Compreendi a sinopse da história."
10034030-228 = "Por ora, lembro-me de algumas músicas."
10034030-230 = "Sério!?"
10034030-231 = "……No entanto."
10034030-232 = "……No entanto?"
10034030-237 = "Você não deve esquecer as minhas palavras."
10034030-238 = "Sou cética quanto ao significado que isso terá ao lhe dizer aqui e agora, mas……."
10034030-239 = "Muitas vezes, é só mais tarde que se percebe o verdadeiro significado."
10034030-240 = "Por enquanto, basta que você guarde isso em um cantinho da sua mente."
10034030-241 = "Isso é……?"
10034030-242 = "……A heroína, Airi Kurimura."
10034030-243 = "……S-sim!"
10034030-249 = "A música é algo que acompanha o coração das pessoas."
10034030-250 = "No entanto, se você for dominada por sentimentos como a pressa ou o medo, #nnão haverá futuro além disso."
10034030-251 = "Espero que você nunca tenha medo e enfrente a música de frente."
10034030-256 = "……Então, boa sorte."
