[translation]
10034150-1 = "4日前：部のアイデンティティ"
10034150-3 = "……お腹空いた。"
10034150-4 = "まだ練習始まってすらないんだけど。"
10034150-5 = "しょうがないじゃん、お腹が空いたんだから。"
10034150-6 = "はぁ、まったく……。"
10034150-10 = "でも最近は練習ばっかりで、お菓子不足だったねぇ。"
10034150-11 = "車にも燃料が必要なように……私たちにもまた、スイーツが必要。"
10034150-12 = "特訓中とはいえ、部のアイデンティティを失うわけにもいかないし？"
10034150-13 = "アイデンティティって言うほどのもの？"
10034150-14 = "まあでも、いつも食べてるのは確かだし……。"
10034150-15 = "間違ってはないんじゃない？"
10034150-20 = "あはは……。"
10034150-21 = "じゃあみんなで、ちょっとお菓子食べてからにしよっか？"
