[translation]
1012203-1 = "授業の続き"
1012203-4 = "いた！やっほー☆"
1012203-5 = "ほんとにぼーっとしてる～！あはは！"
1012203-6 = "[s1] \"せっかくの海だから――\"\n[s2] \"満喫しないとね。\""
1012203-9 = "たしかに、ひなたぼっこするにはちょうどいい天気だね。"
1012203-10 = "先生は海が好きなの？"
1012203-11 = "[s3] \"好きだよ。どこまでも広がってるところとか。\"\n[s4] \"磯の香りとか。\""
1012203-12 = " あっ！私も！"
1012203-13 = "解放感があっていいよね！"
1012203-14 = "見てるこっちの心までなんだかすーっと広くなるというか。"
1012203-15 = "あっ！私も！"
1012203-16 = "磯の香りっていうのかな？独特の匂いが好きなんだ。"
1012203-17 = "ちょっとベタつくけど、海に来たんだ～って感じするよね！"
1012203-18 = "波打ち際の音も好き。"
1012203-19 = "こういう風に……。"
1012203-24 = "あはは！波打ち際に立ってると不思議な感じがするよね。"
1012203-25 = "海に吸い込まれていっちゃいそうになるの。"
1012203-26 = "あ、ほんとに吸い込まれちゃったりはしないよ？"
1012203-27 = "心配しないで！"
1012203-28 = "水泳の練習も、頑張ったから大丈夫。"
1012203-32 = "[ns] \"そういえば……。\""
1012203-34 = "[ns] \"水泳の授業、途中だったね。\""
1012203-35 = "あ……そうだった。"
1012203-36 = "警備員さんにバレちゃって、一緒に逃げたんだよね……。"
1012203-41 = "先生、逃げ足速くてびっくりしちゃった。"
1012203-42 = "[s] \"そうしないと、やばかったからね！\""
1012203-43 = "えへへ、そうだったね。"
1012203-44 = "あれから私、水泳の授業頑張ってたんだよ？先生が直すの手伝ってくれた水着で。"
1012203-45 = "成績も良かったし、ちょっと自信ついたかも！"
1012203-49 = "本当はあの水着を着てきたかったんだけど……。"
1012203-50 = "[s] \"プライベートビーチに？\""
1012203-51 = "うん。さすがにスクール水着だと浮いちゃうとは思うんだけどね。"
1012203-52 = "でも、先生との……大切な思い出の水着だから。"
1012203-53 = "ただ、繕った跡が結構目立っちゃってて……。"
1012203-54 = "友達に見られたら、色々聞かれちゃうかなって。"
1012203-55 = "[ns] \"あ……。\""
1012203-56 = "みんなに心配かけたくないからね。"
1012203-57 = "もう過ぎたことだしさ……。"
1012203-61 = "いや、過ぎたこと……なのかな……うーん。"
1012203-62 = "まあ、とにかく！"
1012203-63 = "そういうわけで、新しい水着にしたんだ☆"
1012203-64 = "どうどう？似合うでしょ～？☆"
1012203-65 = "……可愛い？"
1012203-66 = "[s] \"うん、可愛い。\""
1012203-71 = "わーお。"
1012203-72 = "直球で返されると思わなかった……。"
1012203-73 = "……うぅっ！！"
1012203-78 = "先生、そんなこといって恥ずかしくないの！？"
1012203-79 = "[s5] \"なんか既視感が……。\"\n[s6] \"ミカ！波には気を付けてね！\""
1012203-82 = "ここなら浅いし平気だよ！ほら、膝までしか浸かってないし！"
1012203-83 = "先生も入ってみる？"
1012203-89 = "[ns] \"……そういえば、まだ授業は終わってなかったね。\""
1012203-92 = "うん……。"
1012203-93 = "そうだね……。"
1012203-98 = "先生……。#n授業の続き……お願いします。"
1012203-100 = "（しばらくミカと浅瀬で水遊びをした）"
