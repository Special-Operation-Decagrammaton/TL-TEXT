[translation]
1012203-1 = "Continuação da lição"

1012203-4 = "houve! Yahoo☆"

1012203-5 = "Estou realmente distraído! Ahaha!"

1012203-6 = "[s1] \"Já que é o mar\"\n[s2] \"Você tem que aproveitar.\""

1012203-9 = "Na verdade, o clima é perfeito para aproveitar o sol."

1012203-10 = "O professor gosta do mar?"

1012203-11 = "[s3] \"Gosto. A forma como se espalha para sempre.\"\n[s4] \"O cheiro do oceano.\""

1012203-12 = "Ah! eu também!"

1012203-13 = "É bom ter uma sensação de liberdade!"

1012203-14 = "É como se meu coração se alargasse enquanto eu observava."

1012203-15 = "Ah! eu também!"

1012203-16 = "É o cheiro do oceano? Gosto do cheiro único."

1012203-17 = "É um pouco pegajoso, mas faz você se sentir como se estivesse na praia!"

1012203-18 = "Também gosto do som das ondas."

1012203-19 = "Assim..."

1012203-24 = "Ahaha! É uma sensação estranha quando você está na praia das ondas."

1012203-25 = "Sinto que vou ser sugado pelo mar."

1012203-26 = "Oh, você realmente não vai ser sugado, vai?"

1012203-27 = "Não se preocupe!"

1012203-28 = "Trabalhei muito no treino de natação, então estou bem."

1012203-32 = "[ns] \"Agora que penso nisso...\""

