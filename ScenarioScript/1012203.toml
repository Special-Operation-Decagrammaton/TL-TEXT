1012203-35 = "Ah... isso mesmo."

1012203-36 = "O segurança descobriu e fugimos juntos..."

1012203-41 = "Sensei, fiquei surpreso com o quão rápido você fugiu."

1012203-42 = "[s] \"Se eu não fizesse isso, estaria em apuros!\""

1012203-43 = "Ehehe, isso mesmo."

1012203-44 = "Desde então, tenho trabalhado muito nas aulas de natação. No maiô que a professora me ajudou a consertar."

1012203-45 = "Minhas notas foram boas e me senti um pouco mais confiante!"

1012203-49 = "Eu realmente queria usar aquele maiô, mas..."

1012203-50 = "[s] \"Em uma praia particular?\""

1012203-51 = "Sim. Mas acho que flutuaria se eu usasse um maiô escolar."

1012203-52 = "Mas, este maiô é uma lembrança preciosa minha e da minha professora."

1012203-53 = "No entanto, as marcas de reparo eram bastante visíveis..."

1012203-54 = "Eu estava preocupado que, se meus amigos me vissem, eles me fariam muitas perguntas."

1012203-55 = "[ns] \"Ah...\""

1012203-56 = "Não quero que todos se preocupem."

1012203-57 = "Já passou...."

1012203-61 = "Não, acho que está tudo no passado...hmm."

1012203-62 = "Bem, de qualquer maneira!"

1012203-63 = "É por isso que comprei um maiô novo☆"

1012203-64 = "O que você acha? Combina com você, certo? ☆"

1012203-65 = "……bonitinho?"

1012203-66 = "[s] \"Sim, fofo.\""

1012203-71 = "Uau."

1012203-72 = "Não esperava que voltasse com bola direta..."

1012203-73 = "...Eca! !"

1012203-78 = "Professor, não tenha vergonha de dizer isso! ?"

1012203-79 = "[s5] \"Parece um déjà vu...\"\n[s6] \"Mika! Cuidado com as ondas!\""

1012203-82 = "É raso aqui, então está tudo bem! Olha, a água só chega até os joelhos!"

1012203-83 = "Professor, você gostaria de entrar também?"

1012203-89 = "[ns] \"...A propósito, a aula ainda não acabou.\""

1012203-92 = "Sim……."

