[translation]
10037010-1 = "Episódio 1; Lave as mãos e arrume-se"
10037010-7 = "A Mestra do Portão está chegando!!!"
10037010-8 = "Chegando!!!"
10037010-15 = "Peço desculpas por chamá-lo tão de repente, Sensei."
10037010-16 = "[s1] \"Recebi uma carta muito educada sua.\"\n[s2] \"Senti que não podia ignorar.\""
10037010-19 = "É mesmo? Acho que as cartas enviadas pelo Genryumon não mudam muito do habitual..."
10037010-20 = "Bem, não importa. Hoje, chamei você aqui porque gostaria de fazer um pedido como Genryumon."
10037010-22 = "……"
10037010-23 = "……"
10037010-25 = "――Este é um pedido oficial da Mestra do Genryumon endereçado ao Schale."
10037010-26 = "Nós, de Shanhaijing, planejamos realizar um evento de intercâmbio com Red Winter em breve."
10037010-28 = "Sério... vai acontecer mesmo, então."
10037010-29 = "Foi a Mestra quem decidiu, então... deve haver alguma intenção por trás disso, mas..."
10037010-31 = "……Estamos na presença da Mestra. Cuidado com o que diz."
10037010-37 = "……"
10037010-38 = "[s] (Que clima difícil de conversar...)"
10037010-39 = "(Eu já esperava por isso, mas não há o que fazer...)"
10037010-43 = "……Vamos mudar de lugar. No meu quarto, você poderá relaxar um pouco mais."
10037010-48 = "M-Mestra!? Pretende levar alguém de fora para o seu aposento privado no Rikuwakaku...!?"
10037010-49 = "Deixar um estranho entrar...! O que pensa sobre as tradições do Genryumon...!?"
10037010-51 = "――É só isso que tem a dizer?"
10037010-52 = "Desde quando vocês podem ser rudes com meus convidados?"
10037010-54 = "……!"
10037010-55 = "I-Isso é..."
10037010-57 = "O Sensei desempenhou um papel fundamental na resolução do incidente do Ginseng Milenar — isso é um fato inegável."
10037010-58 = "Na tradição de Shanhaijing, o espírito de \"gratidão\" é algo precioso. Vocês pretendem contestar a minha decisão?"
10037010-60 = "D-De forma alguma!"
10037010-61 = "P-Peço perdão, Mestra!"
10037010-66 = "Então, vou guiá-lo. Sensei, por aqui."
10037010-67 = "Ah, sobre isso."
10037010-68 = "Desta vez, eu mesma irei guiá-lo. Mina, você pode se retirar."
10037010-69 = "Mestra!?"
10037010-71 = "(Até mesmo a chefe da divisão foi dispensada... será que é uma reunião tão importante assim...!?)"
10037010-72 = "(Que tipo de assunto tão grave estaria envolvido no intercâmbio com Red Winter...!)"
10037010-73 = "E-Então, com licença, nós já vamos."
10037010-74 = "Não deixaremos nem uma formiga passar por aqui!"
10037010-76 = "M-Mestraaaaa...!"
10037010-83 = "……Bem, vamos indo."
10037010-89 = "Só posso lhe oferecer chá, mas sinta-se à vontade como se estivesse em seu próprio quarto."
10037010-90 = "[s] \"Obrigado... não tem um cheiro estranho aqui?\""
10037010-91 = "Fufu, você percebeu? O Clube de Pesquisa de Alquimia insistiu para que eu sempre o mantivesse aceso."
10037010-92 = "Este é um incenso medicinal para curar o cansaço do corpo e da mente. Você não está acostumado com ele?"
10037010-93 = "Se o cheiro o incomoda, posso apagá-lo, se quiser..."
10037010-94 = "[s] \"Está tudo bem. É um aroma agradável.\""
10037010-95 = "……Hum. Então está bem."
10037010-96 = "Gostaria de ir direto ao assunto, se não se importar?"
10037010-97 = "――Ah, parece que nem precisava perguntar. Afinal, não há como o Sensei se opor."
10037010-98 = "Bem, sobre o evento de intercâmbio com a Academia Federal Red Winter... quero ouvir sua opinião sobre como podemos realizá-lo para que termine em paz."
10037010-99 = "[s] \"Hum... não seria só realizar normalmente?\""
10037010-100 = "Hum... então essa é a percepção geral, não é?"
10037010-101 = "No entanto, aqui em Shanhaijing, isso não é permitido."
10037010-102 = "Pois é..."
10037010-106 = "――Shanhaijing nunca realizou um evento de intercâmbio convidando outras escolas até hoje."
10037010-107 = "[s] \"É mesmo?\""
10037010-108 = "Sim. Mas nunca questionei isso. Afinal, a Associação Comercial Xuanwu sempre esteve aberta ao exterior."
10037010-109 = "Contudo, isso era apenas porque não recusávamos quem vinha até nós."
10037010-110 = "Convidar uma escola externa para a nossa zona autônoma, como estamos fazendo agora, é algo inédito na longa história de Shanhaijing."
10037010-111 = "[s] \"Por que evitaram o intercâmbio com o exterior por tanto tempo?\""
10037010-112 = "Não há um motivo específico que se possa chamar de razão. As gerações anteriores provavelmente só queriam proteger a história e a tradição de Shanhaijing."
10037010-114 = "Pelo que Shanhaijing é famosa?"
10037010-115 = "Bem... embora seja uma escola cheia de mistérios..."
10037010-116 = "Dizem que a comida da \"Associação Comercial Xuanwu\" é muito deliciosa."
10037010-117 = "Hum! Essa é uma informação valiosa!"
10037010-118 = "Mais alguma coisa?"
10037010-119 = "Não é uma informação tão garantida quanto a comida da Associação Comercial Xuanwu, mas..."
10037010-120 = "Ouvi dizer que a presidente do conselho estudantil de Shanhaijing é alguém que poderia se dar bem com a Cherino-chan."
10037010-121 = "É mesmo? Estou ansioso para conhecê-la agora!"
10037010-124 = "――Acredito que tradição seja o \"bom costume que deve ser preservado\"."
10037010-125 = "Nesse ponto de vista, pode-se dizer que compartilho da mesma opinião que a Lumi."
10037010-126 = "Não significa que não aceitamos mudanças ou que devemos continuar vivendo como no passado."
10037010-127 = "[s] \"...Você não pode dizer isso abertamente, não é, Kisaki?\""
10037010-128 = "Sua rapidez de raciocínio é uma virtude, de fato."
10037010-129 = "Ah, não me entenda mal... A Mina e o pessoal do Xuanlongmen estão cumprindo seus deveres corretamente."
10037010-130 = "Mas..."
10037010-131 = "[s3] \"Sim, eu entendo.\"\n[s4] \"Todos estão vivendo enquanto dão o seu melhor, não é?\""
10037010-134 = "Puff... Como esperado, sua rapidez de raciocínio é uma virtude."
10037010-135 = "――Voltando ao assunto. Eu quero que... Shanhaijing entenda."
10037010-136 = "Que o mundo é vasto — e cheio de maravilhas."
10037010-137 = "Que quanto mais tentamos proteger tudo... mais acabamos perdendo."
10037010-138 = "[s5] \"Então, foi o Xuanlongmen que...\"\n[s6] \"propôs o evento de intercâmbio para Red Winter, não foi?\""
10037010-141 = "Fufu... Se fosse algo tão simples, tudo já estaria resolvido."
10037010-142 = "――É melhor ler o documento com atenção."
10037010-146 = "Não está escrito \"Xuanlongmen\", mas sim \"Líder do Xuanlongmen\"."
10037010-147 = "Você entende a diferença?"
10037010-148 = "[ns7] \"Sim... eu entendo.\"\n[ns8] \"...Desculpe, não entendo bem.\""
10037010-149 = "...Agradeço, Sensei."
10037010-150 = "Apenas o fato de você estar aqui... já é uma grande ajuda para mim."
10037010-151 = "Guarde isso — eu gostaria que você se lembrasse disso."
10037010-152 = "Fufu, é mesmo? Hum, isso também é interessante."
10037010-153 = "Está bem. Já que pude ver essa expressão no seu rosto, Sensei, não tenho do que reclamar."
10037010-154 = "Não se preocupe tanto. Você tem sido uma grande ajuda."
10037010-157 = "Como \"Xuanlongmen\", eles estão preocupados com este evento de intercâmbio."
10037010-158 = "Todos não têm experiência, afinal. E, para começar, há quem evite o próprio evento de intercâmbio."
10037010-161 = "...No que diz respeito à falta de experiência, não sou diferente de todos eles."
10037010-162 = "O Xuanlongmen pertence ao Xuanlongmen, afinal. E a líder não é exceção."
10037010-165 = "Tomoe! Shanhaijing é mais fria que Red Winter?"
10037010-167 = "Fufufu, não existem muitas escolas mais frias que Red Winter, Cherino-chan... Digo, Secretária-Geral Cherino."
10037010-168 = "Exatamente, Presidente Cherino. O frio da nossa Red Winter não perde para nenhuma outra escola!"
10037010-169 = "Não importa se são estudantes de Shanhaijing, eles certamente se ajoelharão diante deste frio extremo!"
10037010-171 = "Como eu pensava! Fufun, é natural, já que esta é a escola da Presidente Cherino!"
10037010-175 = "……Mas e se um golpe de estado acontecer enquanto eu não estiver aqui?"
10037010-176 = "Não precisa se preocupar! Um golpe de estado não pode acontecer se não houver um alvo para derrubar!"
10037010-177 = "Se não houver ninguém contra quem se rebelar, não há como realizar um golpe!"
10037010-181 = "É verdade! A Presidente Marina está muito articulada hoje!"
10037010-182 = "Se continuar se esforçando assim, a condecoração da \"Ordem do Trabalho de Primeira Classe do Bigode\" não estará muito longe!"
10037010-186 = "Muito obrigada, Presidente! Eu, Marina, dedicarei todos os meus esforços pela Presidente Cherino!"
10037010-188 = "(Mesmo que um golpe aconteça, será fácil restaurar a Cherino ao poder. Já fiz isso várias vezes antes, afinal.)"
10037010-191 = "[ns] \"Entendi a situação.\""
10037010-193 = "[ns] \"Então quer que eu ajude para que este encontro seja um sucesso, certo?\""
10037010-194 = "……Hum. Desde o incidente do Ginseng Milenar, tenho contado com a sua ajuda constantemente, Sensei."
10037010-195 = "Hehe, é mesmo... Você fica feliz em ser útil, não é?"
10037010-196 = "Vou levar isso em consideração para o futuro."
10037010-197 = "Ou seja, não há problema em te explorar ao máximo, certo?"
10037010-198 = "[s] \"E-Ei, calma lá... pega leve comigo...?\""
10037010-199 = "Hehe, estou brincando. Não farei pedidos irracionais."
10037010-204 = "Bem... de acordo com os padrões de Shanhaijing, é claro."
10037010-209 = "[ns] \"Por favor, pegue leve comigo!\""
