[translation]
10037010-1 = "第1話;手指を洗い、身なりを整える"
10037010-7 = "門主様の、おなーりー！！！"
10037010-8 = "おなーりー！！！"
10037010-15 = "急に呼び立ててすまなかったの、先生。"
10037010-16 = "[s1] \"丁寧な手紙を貰ったからね。\"\n[s2] \"これは見過ごせないと思って。\""
10037010-19 = "そうかえ？玄龍門が送る文は常と変わらぬと思うが……。"
10037010-20 = "まあよい。#n今日、[ruby=そなた]其方[/ruby]を招いたのは玄龍門として依頼をしようと思っての。"
10037010-22 = "……。"
10037010-23 = "……。"
10037010-25 = "――これは、玄龍門の門主からシャーレに宛てた正式的な依頼じゃ。"
10037010-26 = "我ら山海経は、近日中にレッドウィンターと交流会を行う予定での。"
10037010-28 = "本当に……決行されるのですね。"
10037010-29 = "門主様が決めたことだし……何か意図があるはず、なんだけど……。"
10037010-31 = "……門主様の[ruby=ごぜん]御前[/ruby]だ。発言には気をつけろ。"
10037010-37 = "……。"
10037010-38 = "[s] （なんとも話しづらい空気だなぁ……）"
10037010-39 = "（予想はしておったが、致し方ない……）"
10037010-43 = "……場所を移すとしようかの。#n[ruby=わらわ]妾の[/ruby]部屋であれば其方も肩の力が抜けるというもの。"
10037010-48 = "も、門主様！？[ruby=りくわかく]六和閣[/ruby]の私室に……外部の人間を通すおつもりですか……！？"
10037010-49 = "余所者を通すだなんて……！#n玄龍門の伝統をいかがお考えなのですか……！？"
10037010-51 = "――言いたいことはそれだけかえ？"
10037010-52 = "いつから其方らは妾の客人に無礼を働けるようになったのじゃ？"
10037010-54 = "……！"
10037010-55 = "そ、それは……！"
10037010-57 = "先生は、萬年参事件の解決に一役買っておる――これは紛れもない事実。"
10037010-58 = "山海経の伝統において、「[ruby=ほうおん]報恩[/ruby]」の心は大切なもの。#n其方らは、妾の決定に異議を申し立てるとでも？"
10037010-60 = "め、滅相もない！"
10037010-61 = "も、申し訳ございません、門主様！"
10037010-66 = "それでは案内しよう。先生、こっちだ。"
10037010-67 = "ああ、そのことなんじゃが。"
10037010-68 = "此度は、妾が案内するとしよう。#nミナ、其方は下がってよいぞ。"
10037010-69 = "門主様！？"
10037010-71 = "（執行部長さえも下がらせるほどの、大事な会談が……！？）"
10037010-72 = "（レッドウィンターとの交流会に、一体どれほどの重大な案件が……！）"
10037010-73 = "で、では私どもは先に失礼いたします。"
10037010-74 = "ここは蟻一匹たりとも通しませんので！"
10037010-76 = "も、門主様ぁぁぁ……！"
10037010-83 = "……さて、行こうかの。"
10037010-89 = "お茶しか出せぬが、自分の部屋と思って寛ぐが良い。"
10037010-90 = "[s] \"ありがとう……なんか妙な匂いがしない？\""
10037010-91 = "ふふ、気付いておったのか。#n必ず焚いておくよう、錬丹術研究会から念を押されていてのう。"
10037010-92 = "これは、心身の疲れを癒やす[ruby=こうやく]香薬[/ruby]じゃ。#n其方には馴染みがないかの？"
10037010-93 = "匂いが気になるのなら、消しても良いのじゃが……"
10037010-94 = "[s] \"大丈夫だよ。いい香りだね。\""
10037010-95 = "……ふむ。ならば良い。"
10037010-96 = "早速本題に移りたいのじゃが、構わぬか？"
10037010-97 = "――嗚呼、どうやら訊くまでも無かったのう。#n先生が反対などするわけないというのに。"
10037010-98 = "さて、レッドウィンター連邦学園との交流会じゃが……#nどう執り行えば平和に終えられるか、先生の意見を聞かせてほしいのじゃ。"
10037010-99 = "[s] \"うーん……普通に開けばいいんじゃないかな？\""
10037010-100 = "ふむ――これが世間の認識なのじゃな。"
10037010-101 = "じゃが、ここ山海経ではそれはまかり通らぬ。"
10037010-102 = "そうさな……"
10037010-106 = "――山海経は、今まで他学園を招いた交流会を開いたことはない。"
10037010-107 = "[s] \"そうなの？\""
10037010-108 = "うむ。じゃが、それを疑問に思ったことはない。#nなにせ、玄武商会は外に向けて開かれておるからのう。"
10037010-109 = "しかし、それはあくまで来るものを拒んでいなかっただけに過ぎぬ。"
10037010-110 = "今回のように、外部の学園を自治区に招待したのは、長い山海経の歴史において初めてのこと。"
10037010-111 = "[s] \"どうして外部との交流を避けてきたの？\""
10037010-112 = "理由、と呼べるほどのものはない。#n歴代はただ、山海経の[ruby=・   ・   ・   ・   ・]歴史と伝統[/ruby]を守りたかっただけじゃろう。"
10037010-114 = "山海経は何が有名なんだ？"
10037010-115 = "そうですね……謎の多い学園ではありますが……"
10037010-116 = "「玄武商会」の料理は、とても美味しいそうですよ。"
10037010-117 = "うむ！それは耳寄り情報だな！"
10037010-118 = "他には？"
10037010-119 = "玄武商会の料理ほど、確かな情報ではありませんが……"
10037010-120 = "山海経の生徒会長は、チェリノちゃんと仲良くなれそうな方だと伺っています。"
10037010-121 = "そうなのか？今から会うのが楽しみだな！"
10037010-124 = "――伝統とは、「守るべき良き慣習」の事だと思っておる。"
10037010-125 = "この見解においては、ルミと共通しているとも言えよう。"
10037010-126 = "変化を受け入れず、昔の在り方のまま続けるという意味ではない。"
10037010-127 = "[s] \"……それを、キサキの口からは言えないんだよね？\""
10037010-128 = "話が早いのは其方の美徳じゃの。"
10037010-129 = "ああ、誤解しないで欲しいのじゃが……#nミナや玄龍門の者たちは、それぞれきちんと務めを果たしておる。"
10037010-130 = "じゃが……"
10037010-131 = "[s3] \"うん、分かってるよ。\"\n[s4] \"みんな、最善を尽くしながら生きているんだよね。\""
10037010-134 = "ふっ……やはり話が早いのは其方の美徳じゃのう。"
10037010-135 = "――話を戻そう。妾は……[ruby=みな]山海経[/ruby]に分かってほしいのじゃ。"
10037010-136 = "世界は広く――そして、驚異に満ちていることを。"
10037010-137 = "すべてを守ろうとすればするほど……失ってしまう一方となることを。"
10037010-138 = "[s5] \"だから、玄龍門のほうから、\"\n[s6] \"レッドウィンターに交流会を申し入れたんだね。\""
10037010-141 = "ふふ……そう簡単な話であれば、すべて事もなしだったのじゃが。"
10037010-142 = "――文書をよく読むと良い。"
10037010-146 = "「玄龍門」でなく、「玄龍門の門主」となっておる。"
10037010-147 = "この違い、分かるかの？"
10037010-148 = "[ns7] \"うん……分かるよ。\"\n[ns8] \"……ごめん、よく分からない。\""
10037010-149 = "……礼を言う、先生。"
10037010-150 = "其方がこの場に居てくれるだけで……妾にとって、大きな助力となっておる。"
10037010-151 = "それを――覚えておいてほしい。"
10037010-152 = "ふふ、そうかえ。#nうむ、それもまた一興。"
10037010-153 = "よい。先生のそのような顔が見られたのじゃ。妾とて不満は無い。"
10037010-154 = "そう気にするでない。其方は大きな助力となっておるよ。"
10037010-157 = "「玄龍門」としては、この交流会を案じておるのじゃ。"
10037010-158 = "皆、経験が無いからの。#nそもそも、交流会そのものを敬遠している者もおる。"
10037010-161 = "……経験が無いという点においては、妾も皆と変わらぬ。"
10037010-162 = "玄龍門は玄龍門のものじゃからの。#n門主とて例外では無い。"
10037010-165 = "トモエ！山海経はレッドウィンターより寒いのか？"
10037010-167 = "ふふっ、レッドウィンターより寒い学園はそうそうありませんよ、チェリノちゃん……#nいえ、チェリノ書記長。"
10037010-168 = "その通りです、チェリノ会長。#n我がレッドウィンターの寒さはどの学園にも劣りません！"
10037010-169 = "いかな山海経の生徒だろうと、この極寒を前に跪くことでしょう！"
10037010-171 = "やはりそうなのだな！#nふふん、このチェリノ様の学園なのだから当然だろう！"
10037010-175 = "……しかし、おいらがいない間にクーデターが起きたらどうするのだ？"
10037010-176 = "ご心配には及びません！クーデターとは、倒すべき対象がいなければ成立しませんから！"
10037010-177 = "反旗を翻す相手がいないのであれば、クーデターのしようがありません！"
10037010-181 = "それもそうだな！今日のマリナ委員長は実によく口が回る！"
10037010-182 = "このまま精進していけば、#n「第一級髭労働章」の授与だって、そう遠い未来じゃないぞ！"
10037010-186 = "ありがとうございます、会長！#nこの不肖マリナ、チェリノ会長のために尽力いたしますっ！"
10037010-188 = "（万が一クーデターが起きたとしても、チェリノちゃんを復権させることは容易いです。今まで何度も、そうしていますし）"
10037010-191 = "[ns] \"事情は分かったよ。\""
10037010-193 = "[ns] \"今回の交流会が成功するよう、手伝えばいいんだね？\""
10037010-194 = "……うむ。[ruby=まんねんじん]萬年参[/ruby]事件の時といい、先生には力を貸してもらってばかりじゃな。"
10037010-195 = "ふふ、そうか……頼られる方が嬉しいか。"
10037010-196 = "それは今後の参考とさせてもらおうかの。"
10037010-197 = "つまり――先生を存分にこき使っても構わない、ということじゃな？"
10037010-198 = "[s] \"え、えっと……お手柔らかに……？\""
10037010-199 = "ふふ、冗談じゃよ。無理なお願いなどせぬさ。"
10037010-204 = "まぁ……山海経の基準で、じゃが。"
10037010-209 = "[ns] \"やっぱり手心をお願いします！\""
