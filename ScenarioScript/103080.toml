[translation]
103080-1 = "Episódio 8; Resumo"

103080-14 = "Sim, isso. Plano estratégico."

103080-15 = "Foi criado com a ajuda de todos."

103080-16 = "O nome da operação é “Batalha de Ocupação da Arca de Atla Hasith”."

103080-17 = "...Esta será provavelmente a última estratégia."

103080-19 = "Bem, a última coisa..."

103080-21 = "Se tiver sucesso, o Sanctum não será criado, e se falhar, o Kivotos acabará..."

103080-22 = "Bem, em qualquer caso, esta será a última estratégia."

103080-24 = "É só uma questão de torná-lo um sucesso! ? #nPor favor, não diga coisas que causem ansiedade, Kayoko-san!"

103080-29 = "Além disso, especialistas se reuniram para verificar, certo?"

103080-30 = "Deve ser a estratégia perfeita."

103080-32 = "...Agora, vamos explicar a estratégia."

103080-35 = "Nosso objetivo é “destruir a Arca de Atla Hasith” acima de Kivotos."

103080-36 = "Se você conseguir destruí-lo com sucesso, poderá evitar o aparecimento do "Sanctum of Illusion"."

103080-39 = "No entanto, a Arca está protegida por uma barreira de “coexistência de estados” que nega a intervenção física."

103080-40 = "Enquanto esta barreira existiu, era considerado impossível aproximar-se fisicamente da Arca."

103080-42 = "Se a "nave principal Utnapishtim" for colocada em estado semelhante, é teoricamente possível passar pela barreira."

103080-44 = "A questão é que, se você se tornar igual à outra pessoa, você poderá interferir."

103080-46 = "Pretendo realizar os cálculos usando o dispositivo de computação desta nave."

103080-48 = "...E se o cálculo falhar?"

103080-54 = "Bem... no caso improvável de o cálculo falhar e você entrar em um espaço onde uma barreira está implantada..."

103080-55 = "Se não tiver sorte, você será quebrado em pedaços por átomos e, se tiver sorte, será ejetado da nave e cairá 75.000 metros acima do solo."

103080-57 = "Bem, uma queda livre daquela altura... o Halo provavelmente quebraria..."

103080-58 = "Não, não acho que meu corpo possa aguentar antes que isso aconteça."

103080-62 = "A uma altitude de 75.000 m, as temperaturas podem facilmente ultrapassar os -60 graus. #nSe você respirar, seus pulmões congelarão."

103080-63 = "Os fluidos corporais evaporariam em um instante...#nDe qualquer forma, o Halo seria destruído em menos de dois minutos naquele ambiente."

103080-64 = "Ah, obrigado, Kayoko-san. Mesmo que seja #n, será útil..."

103080-69 = "--Continuar. Mesmo se você assumir o fracasso, será infrutífero."

103080-70 = "Após passar pela barreira, impacta fisicamente a arca e invade seu interior."

103080-71 = "Assim que nos infiltrarmos com sucesso, invadiremos as instalações principais e as destruiremos completamente para evitar que continuem a operar."

103080-72 = "Claro, você encontrará resistência de seus inimigos dentro da Arca."

103080-73 = "O objetivo final desta operação é [ruby=hacking]ocupar[/ruby] cada área da Arca aos poucos, evitando ataques e, por fim, assumir o controle da Arca."

103080-75 = "...Depois de ganhar o controle, você será capaz de autodestruir a Arca ou fazer com que ela caia no chão."

103080-76 = "Sim... hackear e roubar a Arca - essa é a nossa condição de vitória."

103080-78 = "Obrigado pela sua explicação. O objetivo é extremamente simples."

103080-79 = "por falar nisso--"

103080-85 = "...Bem, eu sou um tipo de suporte AMAS――"

103080-90 = "Presidente Rio! ?"

103080-95 = "...Eu descobri em um instante."

103080-96 = "De repente, percebi para onde ele estava indo e me perguntei para onde ele tinha ido...#nAqui é onde ele estava! ? Ou melhor, onde está e o que está fazendo agora? ?"

103080-97 = "Isso é..."

103080-98 = "...Alice-chan e o departamento de desenvolvimento de jogos estão aqui. #nO que diabos você está planejando fazer?"

103080-99 = "...O Rio está apenas me ajudando."

103080-103 = "Não se preocupe, estarei observando. #nSe houver o menor movimento suspeito, iremos destruí-lo imediatamente."

103080-104 = "Suspirar..."

103080-105 = "Não sei o que eles estão planejando, mas por favor, definitivamente fique longe do departamento de desenvolvimento de jogos!"

103080-106 = "Há tantas coisas que quero dizer ao presidente... #nBem... pedirei que você me conte em detalhes sobre o incidente de peculato mais tarde!"

103080-111 = "...Eu entendo."

103080-112 = "Tentarei encontrar uma maneira de voltar à superfície, só para garantir. #n...Claro, se você permitir."

103080-113 = "Sim, por favor. #nSe o navio quebrar, ficaremos presos na arca."

103080-114 = "--Então vamos começar imediatamente."

103080-117 = "Ayumu, quanto tempo nos resta?"

103080-122 = "Bem, espera-se que demore cerca de 12 horas até que Sanctum reapareça."

103080-124 = "Ugh... temos que capturar a Arca até lá, certo?"

103080-125 = "Detesto dizer isso, mas...esta é realmente uma estratégia viável?"

103080-127 = "sim. Como resultado de muitas simulações, a probabilidade de sucesso é..."

103080-128 = "Chega a 3%."

103080-129 = "Sr. Porcentagem...?"

103080-130 = "...Não temos escolha senão confiar em probabilidades milagrosas."

103080-131 = "[s] \"Mesmo assim, acho que vale a pena.\""

103080-133 = "...Sim, é exatamente como a professora disse."

103080-134 = "Uma situação sem precedentes chegou a Kivotos... Enfrentámos um problema incompreensível - e foi assim que chegámos aqui."

103080-136 = "O primeiro sinal foi a ``profecia'' de [ruby=Yurizono]Yurien[/ruby] Seia."

103080-137 = "Foram detectadas seis concentrações ultra-elevadas de energia, mas no início era apenas um fenômeno invisível e misterioso."

103080-139 = "Em seguida, apareceu o “Sanctum of Delusion”, reunindo todos os “mistérios” que ocorreram em Kivotos para atacar."

103080-140 = "IA incontrolável "Dekagramaton", "[ruby=mimesis]duplicação[/ruby]" que reproduz memórias, tecnologia super antiga chamada "Deus Sem Nome"..."

103080-141 = "--E as “cores” que distorcem a existência dos alunos."

103080-143 = "Embora tenhamos conseguido capturar os Guardiões e destruir todos os Santuários em uma operação combinada..."

103080-144 = "Agora, Sanctum está prestes a ocorrer novamente, assim como da primeira vez... mas desta vez, não estamos apenas observando com os dedos na boca. Chegamos à solução."

103080-145 = "--Nada do que aconteceu até agora foi explicado."

103080-146 = "Profecia, Decagrammaton, [ruby=mimesis]duplicado[/ruby], cor, deus sem nome, Divi:Sion, Sanctum of Delusion, guardião - e Plenapates, o guia da cor..."

103080-147 = "Não importa se a taxa de sucesso é de 3%. #nNão temos escolha a não ser executar nossa estratégia normalmente."

103080-148 = "[s] \"Isso mesmo. Vamos todos trabalhar juntos e tentar.""

103080-150 = "……Concordo. #nComo não há outro caminho, não há opções desde o início."

103080-151 = "Sim, isso mesmo..."

103080-152 = "……sim. Também para trazer Shiroko-senpai de volta."

103080-154 = "Suspiro... não tenho escolha a não ser fazer isso."

103080-155 = "Bem... cheguei até aqui e não tem outro jeito."

103080-157 = "Por favor, faça os preparativos para que o navio Utnapishtim possa ser lançado dentro de 8 horas."

103080-158 = "Ei, espere um minuto! #nPartindo em 8 horas! ?"

103080-159 = "Existe um manual. Por favor, lembre-se disso."

103080-160 = "Não, não, não, não é razoável memorizar um manual tão grosso em apenas algumas horas! ?"

103080-161 = "Não é uma questão do que você pode ou não fazer, mas do que você tem que fazer[/ruby]. #nGostaria que alguém que entendesse o manual fosse o operador."

103080-162 = "Suspiro... quero dizer, precisamos de pelo menos 10 operadores..."

103080-163 = "[s] \"Então eu estarei no comando.\""

103080-164 = "O que, o professor?"

103080-165 = "[s] \"Eu tenho a caixa do Shittim, então tenho certeza que tudo vai dar certo.\""

103080-166 = "...Eu também vou apoiar o professor."

103080-168 = "R-Rin-senpai?"

103080-170 = "Já que chegamos até aqui, estarei com você até o fim. #nNão suporto deixar a parte mais perigosa apenas para o professor."

103080-171 = "[s] \"Obrigado, Rin. Conto muito com você.\""

103080-177 = "Bem, se tudo que você precisa fazer é memorizar o manual, então até eu posso fazer isso..."

103080-179 = "Até Ayumu-senpai! ?"

103080-181 = "Bem, se o professor disser, não vou escapar de jeito nenhum. #nEu também farei isso."

103080-182 = "Estarei com você também. #nSim, sou bom em memorizar coisas. Várias coisas...♡"

103080-184 = "Suspiro... Como oficial administrativo do Comitê Disciplinar da Gehenna, não posso abandonar minhas responsabilidades."

103080-185 = "Eu farei isso também."

103080-186 = "Por favor, deixe-me acompanhá-lo também!"

103080-187 = "Eu estaria mentindo se dissesse que não estou com medo..."

103080-188 = "Eu quero ajudar Shiroko-senpai."

103080-190 = "Não foi para isso que vim aqui, mas... #nAcho que não vou conseguir voltar para casa assim. Eu farei isso também."

103080-192 = "Uau... todo mundo parece tão motivado."

103080-193 = "Ah, a propósito, eu não posso fazer isso, certo?"

103080-194 = "Momoka-chan...mesmo que você tenha chegado até aqui, você está agindo separadamente de nós...?"

103080-201 = "Uma vez você me disse: "Eu te seguirei até o fim do universo"..."

103080-203 = "Uau! Não faça essa cara, Ayumu-senpai! ?"

103080-204 = "... Entendi, entendi!"

103080-205 = "Eu farei isso! #nBem...vai dar certo de alguma forma...?"

103080-207 = "Hehe, ser membro da tripulação de um navio de guerra espacial parece ótimo♡"

103080-208 = "A propósito, você tem fantasias?"

103080-210 = "Traje H...?"

103080-211 = "falta. Afinal, você é membro da tripulação de um navio de guerra espacial, certo? Não existe uma fantasia específica para #n?"

103080-213 = "Ah, espere. Traje especial...?"

103080-214 = "Sim, acho que posso me preparar para isso."

103080-215 = "Olá, Hibiki! ? #nVocê tem tempo para prepará-lo?"

103080-216 = "Afinal, ele é membro da tripulação de um navio de guerra espacial."

103080-217 = "Isso não pode ser feito..."

103080-219 = "Não tenho escolha a não ser fazer isso."

103080-223 = "Sim! Não posso trair o romance do Departamento de Engenharia! Mesmo que ele diga frases como “Decole!”, “Suba altitude!” e “Carregue sua energia!”, ele não parece legal em seu uniforme normal, não é?"

103080-224 = "...Isso também é verdade."

103080-225 = "Ok, vamos trabalhar."

103080-226 = "sim! Também vou procurar os materiais! #nAparece muito em mangás e animes!"

103080-228 = "Sim. Então vou começar a produzi-lo imediatamente. Primeiro de tudo, vamos medir o tamanho de todos――"

103080-229 = "Oh meu Deus, bem ♡...Estou realmente ansioso por isso. #nA propósito, em relação ao design, se não se importa, gostaria de ter uma discussão acalorada comigo?"

103080-231 = "Bem, digamos que eu adicione algumas funções a esse traje e o modifique para parecer um traje de piloto♪"

103080-232 = "Você tem algum comentário do seu professor?"

103080-233 = "[s] \"Sim, sim, existe!! Falando em navios de guerra espaciais, afinal...\""

103080-235 = "De repente estou começando a me sentir ansioso..."

103080-237 = "[ns1] \"É um chapéu obrigatório!!\"\n[ns2] \"É um clássico, mas não dá para tirar o lenço!!\"\n[ns3] \"Afinal, o capitão usa um casaco longo!!\""

103080-243 = "Ah, isso é mais específico do que eu pensava..."

103080-244 = "Eu vejo. Vou usá-lo como referência."

103080-246 = "(Eu me pergunto por que isso aconteceu...)"

103080-250 = "Ufa, está tudo resolvido."

103080-251 = "それじゃ、今から発進準備を始めて、#n8時間後には「箱舟」に向かって出発って事で。"

103080-252 = "オペレーター、航空管制担当、ハッキング担当……#n調理担当に治療担当……"

103080-253 = "Sim. Também precisamos de recrutar estudantes que irão realmente lutar na guerra de ocupação. #nSuspiro, há muito o que fazer~"

103080-259 = "...Rin-senpai,"

103080-260 = "Nossos idosos, professores e todos os alunos da Petri trabalharam incansavelmente para chegar a este ponto."

103080-261 = "No entanto, agora há tempo até o início da operação. #nPor que não aproveitar esta oportunidade para descansar um pouco? Principalmente Rin-senpai..."

103080-262 = "……Concordo."

103080-263 = "A falta de sono pode prejudicar seu julgamento...#nAcreditarei em sua palavra para que isso não afete minhas operações futuras."

103080-264 = "Pois bem, pessoal. #nPartiremos de madrugada, daqui a 8 horas."

103080-265 = "Até então, tente descansar o máximo possível."

103080-266 = "Agora, vamos terminar."

103080-268 = "Da próxima vez: Ontem à noite na terra"

