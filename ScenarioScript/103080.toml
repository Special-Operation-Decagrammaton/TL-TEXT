[translation]
103080-1 = "第8話;ブリーフィング"
103080-14 = "はい、これ。作戦計画書。 "
103080-15 = "皆さんに協力していただいて、作成したものです。"
103080-16 = "作戦名は――「アトラ・ハシースの箱舟占領戦」。"
103080-17 = "……おそらく、これが最後の作戦となるでしょう。"
103080-19 = "さ、最後……"
103080-21 = "成功したらサンクトゥムは作られないわけだし、#n失敗したらキヴォトスは終わる……。"
103080-22 = "そうですね、いずれにしても最後の作戦になります。"
103080-24 = "成功させればいいだけの話ですよね！？#n不安を煽るような事を言わないでください、カヨコさん！"
103080-29 = "それに、専門家が集まって検証したんでしょ？"
103080-30 = "これ以上ない、完璧な作戦のはずよ。"
103080-32 = "……では、作戦の説明に移ります。 "
103080-35 = "私たちの目標は、キヴォトス上空にある「アトラ・ハシースの箱舟を破壊する」こと。"
103080-36 = "無事破壊できたら、「虚妄のサンクトゥム」の出現を阻止できるよ～"
103080-39 = "しかし、箱舟は物理的な介入を無効化する「状態の共存」によるバリアで保護されています。"
103080-40 = "このバリアが存在する以上、箱舟に対しての物理的なアプローチは不可能とされていました――ですが、"
103080-42 = "「ウトナピシュティムの本船」を同様の状態にすれば、理論上はバリアを通過する事が可能です。"
103080-44 = "要は、相手と同じ存在になったら、干渉できるって事～"
103080-46 = "そのための計算は、私がこの船の演算装置を用いて進行する予定です。"
103080-48 = "……計算に失敗したら？"
103080-54 = "そうですね……万が一、計算に失敗した状態でバリアが展開されている空間に進入した場合――"
103080-55 = "運が悪ければ原子単位でバラバラに、運が良い場合でも、船から弾き出されて地上75,000mの高さから墜落することになります。"
103080-57 = "そ、その高さからの自由落下……流石にヘイローが壊れてしまうのでは……"
103080-58 = "いや、その前に肉体が耐えきれないと思うよ。"
103080-62 = "高度75,000mもあればマイナス60度は優に超える。#n呼吸をしたら肺が凍るだろうから。"
103080-63 = "体液も一瞬で気化するだろうし……#nどのみち、その環境下じゃ2分足らずでヘイローは壊れる。"
103080-64 = "あ、ありがとうございます、カヨコさん。#nと～っても、参考に……なります。"
103080-69 = "――続けます。失敗の想定をしたところで、不毛ですので。 "
103080-70 = "バリア通過後、箱舟に物理的な衝撃を与え――内部に侵入します。"
103080-71 = "無事に侵入できたら、主要施設のハッキングを行い、 これ以上作動しないよう徹底的に破壊します。"
103080-72 = "もちろん、箱舟内にいる敵から抵抗を受けるでしょう。"
103080-73 = "攻撃を防ぎつつ、箱舟の各エリアを少しずつ[ruby=ハッキング]占領[/ruby]、最終的に箱舟の制御権を奪う――それがこの作戦の最終目標です。"
103080-75 = "……制御権を掌握したら、箱舟自体を自爆もしくは、地上に墜落させることが可能になるでしょう。"
103080-76 = "ええ……箱舟をハッキングし、奪う――それが私たちの勝利条件。"
103080-78 = "ご説明くださりありがとうございます。目標は至極シンプルですね。"
103080-79 = "ところで――"
103080-85 = "……えっと、私はサポート型AMASで――"
103080-90 = "リオ会長～～！？"
103080-95 = "……一瞬でバレましたね。"
103080-96 = "急に行方を眩ませて、一体どこに行ったのかと思ったら……#nこんな所に！？というか、今本体はどこで何してるんですか！？"
103080-97 = "そ、それは…… "
103080-98 = "……ここには、アリスちゃんとゲーム開発部がいるんですよ。#n一体何のつもりですか？"
103080-99 = "……リオは私を手伝ってくれているだけですよ。 "
103080-103 = "私が監視しておりますからご心配なく。#n少しでも不審な動きがあれば、すぐに破壊しますので。"
103080-104 = "はぁ……"
103080-105 = "何を企んでるのかは知らないですけど、絶対ゲーム開発部には近づかないでくださいね！"
103080-106 = "会長に言いたいことは山ほどあるけど……#nそうね……後であの横領の件から、事細かくお話を聞かせてもらいますからね！"
103080-111 = "……分かったわ。"
103080-112 = "万が一の場合に備えて、地上に戻る方法を探してみるわ。#n……もちろん、許可してくれるのなら、だけど。"
103080-113 = "そうですね、お願いします。#n船が壊れてしまった場合、私たちは箱舟に閉じ込められますので。"
103080-114 = "――では、すぐに取りかかるわ。"
103080-117 = "アユム、私たちに残された時間は？"
103080-122 = "えっと、サンクトゥムの再出現まで……約12時間と予想されています。"
103080-124 = "うう～っ……それまでに箱舟を占領しなきゃいけないんだよね？"
103080-125 = "言いたかないけど……これって本当に実現できる作戦なんだよね？"
103080-127 = "はい。何度もシミュレートした結果、成功確率は――"
103080-128 = "なんと、3%もあります。"
103080-129 = "さん、パーセント……？ "
103080-130 = "……奇跡みたいな確率を味方にするしかありませんね。"
103080-131 = "[s] \"それでも、やる価値は十分あると思うよ。\""
103080-133 = "……はい、先生のおっしゃる通りです。 "
103080-134 = "キヴォトスに到来した未曾有の事態……私たちは、不可解な問題に立ち向かい――そうして、ここまで至ったのです。"
103080-136 = "最初の兆候だった、[ruby=ゆりぞの]百合園[/ruby]セイアの「予言」。"
103080-137 = "そして、6つの超高濃度エネルギーが探知されましたが、当初は目に見えない不可解な現象でしかありませんでした。"
103080-139 = "続いて出現した「虚妄のサンクトゥム」は、今までのキヴォトスで発生した全ての「神秘」を集結させて、攻撃してきました。"
103080-140 = "制御不能のAI「デカグラマトン」、記憶を再現するという「[ruby=ミメシス]複製[/ruby]」、「名もなき神」という名の超古代技術―― "
103080-141 = "――そして、生徒の存在を歪曲させる「色彩」。"
103080-143 = "連合作戦で守護者を攻略し、全サンクトゥムの破壊に成功したものの……"
103080-144 = "今、再び最初と同様にサンクトゥムが発生しようとしている……けれど、今度は指を咥えて見ているだけではありません。私たちは、その解決法に至ったのです。"
103080-145 = "――今までに起きた現象に、何ひとつ解明できているものなどありません。"
103080-146 = "予言、デカグラマトン、[ruby=ミメシス]複製[/ruby]、色彩、名もなき神、Divi:Sion、虚妄のサンクトゥム、守護者――そして、色彩の嚮導者であるプレナパテス……"
103080-147 = "成功率が3%だろうと構いません。#n私たちは、今まで通り作戦を遂行するしかないのです。"
103080-148 = "[s] \"そうだね。みんなで力を合わせて、やってみよう。\" "
103080-150 = "……そうですね。#nこれ以外に方法がないのですから、最初から選択肢は存在していません。"
103080-151 = "ええ、そうね……"
103080-152 = "……はい。シロコ先輩を連れ戻すためにも。"
103080-154 = "はぁ……やるしかないよね。"
103080-155 = "そうですね……ここまで来て、他の道はありません。"
103080-157 = "それでは「ウトナピシュティムの本船」を8時間以内に発進できるよう、準備をお願いします。"
103080-158 = "えっ、ちょっと待って！#n出発って8時間後！？ "
103080-159 = "マニュアルはありますので。これを覚えていただきます。"
103080-160 = "いやいやいや、こんな分厚いマニュアルを数時間で覚えろだなんて無茶だよ！？"
103080-161 = "できるできないの問題ではなく、[ruby=・   ・   ・   ・   ・   ・   ・   ・   ・   ・]やらなければならない[/ruby]のです。#nマニュアルを把握し終えた方にオペレーターをお願いします。"
103080-162 = "はぁ……っていうか、オペレーターって最低10人は必要だよね……"
103080-163 = "[s] \"じゃあ、私が総責任者になるよ。\""
103080-164 = "えっ、先生が？"
103080-165 = "[s] \"シッテムの箱があるから、きっとなんとかなるよ。\""
103080-166 = "……私も先生をサポートします。"
103080-168 = "り、リン先輩？"
103080-170 = "ここまで来たのですから、私も最後までご一緒します。#n一番危険な部分を先生だけに負担させるのは、忍びないので。"
103080-171 = "[s] \"リン、ありがとう。すごく頼りにしてる。\""
103080-177 = "ま、マニュアルを覚えるだけで良いのでしたら、#n私でもなんとかなりそうです……"
103080-179 = "アユム先輩まで！？"
103080-181 = "まあ、先生がそう言うのなら、私が降りるわけにはいかないわね。#n私もやるわ。"
103080-182 = "私もご一緒します。#nええ、覚えるのは得意なんです。色々と……♡"
103080-184 = "はぁ……ゲヘナ風紀委員会の行政官である私が、責務を放棄するわけにはいきません。"
103080-185 = "私もやりますよ。"
103080-186 = "私も、ご一緒させてください！ "
103080-187 = "怖くないと言ったら嘘になりますが……"
103080-188 = "シロコ先輩を、助けに行きたいので。"
103080-190 = "そういうつもりでここに来たんじゃないんだけど、はぁ……#nこの流れで帰るなんて、できなさそうだし。私もやるよ。"
103080-192 = "うわぁ……みんなやる気満々だね。"
103080-193 = "あ、ちなみに私は無理だからね？"
103080-194 = "モモカちゃん……ここまで来たのに、私たちと別行動を……？"
103080-201 = "以前、「宇宙の果てまでついていくよ」と言ってくれたのに……"
103080-203 = "わ、わわわっ！そんな顔しないでよアユム先輩！？ "
103080-204 = "……分かった、分かったってば！"
103080-205 = "やるから！#nまぁ……なんとか、なるよね……？"
103080-207 = "ふふっ、宇宙戦艦の乗務員だなんて、良い響きですね♡"
103080-208 = "ところで、コスチュームはあるんですか？"
103080-210 = "こ、コスチューム……？"
103080-211 = "あら。だって宇宙戦艦の乗務員ですよね？#n専用の衣装があるのでは？ "
103080-213 = "ま、待って。専用衣装……？"
103080-214 = "うん、それは用意できると思う。"
103080-215 = "なっ、ヒビキ！？#nそれを用意する時間があるのかい？"
103080-216 = "だって宇宙戦艦の乗務員だよね。"
103080-217 = "できるできないじゃない……"
103080-219 = "やるしかないよ。 "
103080-223 = "ええ！エンジニア部のロマンを裏切るわけにはいきませんからね！「発進！」とか、「高度上昇！」とか、「エネルギーチャージ！」とか、そういった台詞を言うのに、普段の制服ではカッコ悪いじゃありませんか！"
103080-224 = "……それもそうだね。"
103080-225 = "よし、ひと仕事しようじゃあないか。"
103080-226 = "はい！私も資料を探してみます！#nマンガやアニメにたくさん出てきますからね！"
103080-228 = "うん。じゃあ私は早速制作に入るね。まずはみんなのサイズ測定から――"
103080-229 = "あらあら、まぁまぁ♡……とっても楽しみです。#nところで、デザインについてなんですが、よろしければ私と熱い議論を交わしませんか？"
103080-231 = "では、私はその衣装に機能を追加してパイロットスーツ風に改造するとしましょうか♪"
103080-232 = "先生からも何か、ご意見ありますか？"
103080-233 = "[s] \"はいはーい、あります！！やっぱり宇宙戦艦といえば――\""
103080-235 = "一気に不安になってきますね……"
103080-237 = "[ns1] \"やっぱり制帽だよね！！\"\n[ns2] \"定番だけどスカーフは外せない！！\"\n[ns3] \"やっぱ艦長はロングコートだよね！！\""
103080-243 = "お、思ったより具体的ですね……"
103080-244 = "なるほどね。一応参考にはしておく。"
103080-246 = "（何でこんなことになったんだか……）"
103080-250 = "ふぅ、大体まとまったね。 "
103080-251 = "それじゃ、今から発進準備を始めて、#n8時間後には「箱舟」に向かって出発って事で。"
103080-252 = "オペレーター、航空管制担当、ハッキング担当……#n調理担当に治療担当……"
103080-253 = "うん。他にも、占領戦で実際に戦ってくれる生徒も集めないと。#nはぁ、やることが山積みだよ～"
103080-259 = "……リン先輩、"
103080-260 = "先輩はもちろん、先生、そしてシャーレの生徒の皆さんがここまで休まずに駆け抜けて来ました。"
103080-261 = "ですが、今は作戦開始まで時間があります。#nこの機会に、少しでも休息をとってはいかがでしょうか？リン先輩は、特に……"
103080-262 = "……そうですね。"
103080-263 = "寝不足では判断が鈍る事もあるでしょう……#n今後の作戦に影響が出ないよう、お言葉に甘えさせていただきます。"
103080-264 = "それでは皆さん。#nこれより8時間後、夜明けと共に出発といたします。 "
103080-265 = "それまでに……できる限り各自、休息を取るようにしてください。"
103080-266 = "では、解散します。"
103080-268 = "次回;地上最後の夜"
