[translation]
103080-1 = "Episódio 8; A Reunião Geral"
103080-14 = "Aqui está. O plano da operação. "
103080-15 = "Nós o criamos com a colaboração de todas vocês."
103080-16 = "O nome da operação é――\"Batalha pela Ocupação da Arca de Atrahasis\"."
103080-17 = "……Esta provavelmente será a nossa última operação."
103080-19 = "Ú-Última..."
103080-21 = "Se a gente conseguir, não vai ter mais Sanctum,#ne se a gente falhar, é o fim de Kivotos..."
103080-22 = "Tem razão, de um jeito ou de outro, será a nossa última operação."
103080-24 = "É só a gente não falhar, né!?#nNão fale coisas que nos deixam ansiosas, Kayoko-san!"
103080-29 = "Além disso, as especialistas se juntaram e analisaram tudo, não foi?"
103080-30 = "Deve ser um plano mais do que perfeito."
103080-32 = "……Sendo assim, vou começar a explicação do plano. "
103080-35 = "O nosso objetivo é \"destruir a Arca de Atrahasis\" que está no céu de Kivotos."
103080-36 = "Se a gente conseguir destruir ela, vamos conseguir impedir que os \"Sanctums Falsos\" apareçam~"
103080-39 = "Porém, a Arca está protegida por uma barreira de \"coexistência de estados\" que anula qualquer intervenção física."
103080-40 = "Enquanto essa barreira existir, qualquer abordagem física à Arca é considerada impossível――mas,"
103080-42 = "Se deixarmos a \"Nave Principal de Utnapishtim\" no mesmo estado, teoricamente seria possível atravessar a barreira."
103080-44 = "Basicamente, se a gente se tornar a mesma existência que eles, a gente consegue intervir~"
103080-46 = "Para isso, eu vou usar a unidade de processamento desta nave para fazer os cálculos necessários."
103080-48 = "……E se você errar os cálculos?"
103080-54 = "Bem... Na remota possibilidade de entrarmos no espaço onde a barreira está ativa com os cálculos errados――"
103080-55 = "Se tivermos azar, seremos despedaçados a nível atômico. Se tivermos sorte, seremos ejetados da nave e cairemos de uma altitude de 75.000m."
103080-57 = "Q-Queda livre dessa altura... Com certeza as nossas auréolas seriam destruídas..."
103080-58 = "Não, acho que nossos corpos nem aguentariam antes de chegar nisso."
103080-62 = "Numa altitude de 75.000m, as temperaturas com certeza passam dos 60 graus negativos.#nSe você respirar, seus pulmões vão congelar."
103080-63 = "Os fluidos corporais iam evaporar num instante também...#nDe qualquer jeito, nesse ambiente, as nossas auréolas iam ser destruídas em menos de 2 minutos."
103080-64 = "A-Ah, muito obrigada, Kayoko-san.#nIsso serviu... m-muito de referência..."
103080-69 = "――Dando continuidade. Imaginar fracassos não nos levará a lugar algum. "
103080-70 = "Após passarmos pela barreira, aplicaremos um impacto físico na Arca――e invadiremos seu interior."
103080-71 = "Uma vez lá dentro, vamos hackear as instalações principais e destruí-las completamente para que não voltem a funcionar."
103080-72 = "É claro, com certeza enfrentaremos resistência dos inimigos a bordo da Arca."
103080-73 = "Enquanto nos defendemos dos ataques, vamos \"ocupar\" e hackear as áreas da Arca aos poucos, até finalmente tomarmos o controle total dela――esse é o objetivo final desta operação."
103080-75 = "……Depois que assumirmos o controle, poderemos iniciar a sequência de autodestruição da Arca ou fazê-la cair na terra."
103080-76 = "Sim... Hackear a Arca e roubá-la――essa é a nossa condição de vitória."
103080-78 = "Agradeço pela explicação. Nosso objetivo é extremamente simples."
103080-79 = "A propósito――"
103080-85 = "……Err, eu sou a AMAS de suporte――"
103080-90 = "Presidente Rio~~!?"
103080-95 = "……Me descobriram num instante."
103080-96 = "Eu fiquei me perguntando pra onde você tinha sumido...#nE você estava num lugar desses!? Digo, onde o seu corpo original tá e o que você tá fazendo!?"
103080-97 = "B-Bom, isso é... "
103080-98 = "……A Aris-chan e o Departamento de Desenvolvimento de Jogos estão aqui, sabia.#nO que diabos você tá planejando?"
103080-99 = "……A Rio está apenas me ajudando. "
103080-103 = "E eu estou vigiando ela de perto, não se preocupe.#nSe ela fizer qualquer movimento suspeito, eu a destruo na mesma hora."
103080-104 = "Haa..."
103080-105 = "Não faço ideia do que você tá aprontando, mas fique bem longe do Departamento de Desenvolvimento de Jogos, ouviu bem!"
103080-106 = "Eu tenho um monte de coisas pra te falar, Presidente, mas...#nPois é... Depois você vai ter que me dar todos os detalhes sobre aquele seu caso de desvio de fundos!"
103080-111 = "……Entendido."
103080-112 = "Para caso de emergência, eu vou procurar um jeito de voltar pro chão.#n……Claro, se vocês me derem permissão."
103080-113 = "Sim, por favor, faça isso.#nSe a nave quebrar, vamos acabar presas na Arca."
103080-114 = "――Certo, vou começar agora mesmo."
103080-117 = "Ayumu, quanto tempo nos resta?"
103080-122 = "Err, o tempo estimado até o reaparecimento dos Sanctums... é de cerca de 12 horas."
103080-124 = "Uuuu~... Nós temos que tomar a Arca até lá, né?"
103080-125 = "Não queria dizer isso, mas... Esse plano aí é mesmo possível de realizar?"
103080-127 = "Sim. Após simularmos isso inúmeras vezes, a probabilidade de sucesso é de――"
103080-128 = "Impressionantes 3%."
103080-129 = "Três... porcento...? "
103080-130 = "……Parece que nossa única opção é torcer por um milagre."
103080-131 = "[s] \"Mesmo assim, eu acho que vale a pena tentar.\""
103080-133 = "……Sim, o senhor tem razão, Sensei. "
103080-134 = "Diante de um desastre sem precedentes que atingiu Kivotos... nós enfrentamos esses problemas incompreensíveis――e conseguimos chegar até aqui."
103080-136 = "O primeiro sinal foi a \"profecia\" da Yurizono Seia."
103080-137 = "Depois, 6 massas de energia de altíssima concentração foram detectadas, mas no começo não passavam de um fenômeno incompreensível e invisível a olho nu."
103080-139 = "Em seguida, os \"Sanctums Falsos\" que apareceram juntaram todos os \"Mistérios\" que já ocorreram em Kivotos e nos atacaram."
103080-140 = "A IA incontrolável \"Decagrammaton\", as \"Réplicas\" que reproduzem memórias e a tecnologia superantiga que carrega o nome de \"Deuses Sem Nome\"―― "
103080-141 = "――E o \"Chroma\", capaz de distorcer a existência das alunas."
103080-143 = "Embora tenhamos conseguido destruir todos os Sanctums numa operação conjunta para derrotar os guardiões..."
103080-144 = "Agora, os Sanctums estão prestes a surgir novamente... mas dessa vez, não ficaremos apenas de braços cruzados. Nós descobrimos a solução para isso."
103080-145 = "――Não conseguimos desvendar nenhum dos fenômenos que ocorreram até agora."
103080-146 = "A profecia, o Decagrammaton, as réplicas, o Chroma, os Deuses Sem Nome, a Divi:Sion, os Sanctums Falsos, os guardiões――e Phrenapates, o Guia do Chroma..."
103080-147 = "Não me importo se a probabilidade de sucesso for de 3%.#nA nossa única opção é prosseguir com a operação, como sempre fizemos."
103080-148 = "[s] \"É isso aí. Vamos tentar isso juntas, com a força de todas nós.\" "
103080-150 = "……Tem razão.#nJá que não há outro jeito, nós não tivemos opções desde o começo."
103080-151 = "Sim, tem razão..."
103080-152 = "……É. E pra trazer a Shiroko-senpai de volta também."
103080-154 = "Haa... É a nossa única chance."
103080-155 = "É... Agora que chegamos até aqui, não tem outra opção."
103080-157 = "Sendo assim, peço que se preparem para que a \"Nave Principal de Utnapishtim\" possa decolar em até 8 horas."
103080-158 = "Pera, como assim!?#nA decolagem é daqui a 8 horas!? "
103080-159 = "Nós temos o manual. Memorizem-no."
103080-160 = "Não, não, não, peraí! Memorizar um manual dessa grossura em poucas horas é pedir demais, né!?"
103080-161 = "Não é questão de conseguir ou não, nós precisamos fazer isso.#nQuem terminar de memorizar o manual, por favor, me ajude a operar a nave."
103080-162 = "Haa... mas pera, a gente não vai precisar de pelo menos 10 operadoras pra isso..."
103080-163 = "[s] \"Então, eu assumo como o responsável geral.\""
103080-164 = "Hã, você, Sensei?"
103080-165 = "[s] \"Com a Caixa de Shittim, a gente com certeza vai dar um jeito.\""
103080-166 = "……Eu também vou dar suporte ao Sensei."
103080-168 = "R-Rin-senpai?"
103080-170 = "Já que chegamos até aqui, eu vou acompanhar até o fim.#nNão seria justo deixar as partes mais perigosas só nas costas do Sensei."
103080-171 = "[s] \"Obrigado, Rin. Tô contando muito com você.\""
103080-177 = "B-Bom, se é só pra decorar o manual,#nacho que eu consigo dar um jeito..."
103080-179 = "Até a Ayumu-senpai!?"
103080-181 = "Bom, se o Sensei tá dizendo, eu não posso pular do barco agora, né.#nEu também vou."
103080-182 = "Eu também vou acompanhar vocês.#nIsso mesmo, eu sou muito boa em memorizar coisas. Várias delas...♡"
103080-184 = "Haa... como uma Oficial do Comitê Disciplinar da Gehenna, eu não posso fugir das minhas responsabilidades."
103080-185 = "Eu também vou ajudar."
103080-186 = "Por favor, me deixem ir junto também! "
103080-187 = "Seria mentira se eu dissesse que não estou com medo, mas..."
103080-188 = "Eu quero ir salvar a Shiroko-senpai."
103080-190 = "Eu não vim aqui pensando nisso, mas, haa...#nCom esse clima todo, eu não vou conseguir ir embora mesmo. Eu também tô dentro."
103080-192 = "Uau... Todo mundo tá super animado."
103080-193 = "Ah, só avisando que eu tô fora, tá?"
103080-194 = "Momoka-chan... depois de chegarmos até aqui, você vai mesmo ficar pra trás...?"
103080-201 = "Você disse que iria \"nos seguir até os confins do universo\" e agora..."
103080-203 = "W-Wawawa! Não faz essa cara pra mim, Ayumu-senpai!? "
103080-204 = "……Tá bom, tá bom, eu já entendi!"
103080-205 = "Eu faço!#nBom... a gente vai conseguir dar um jeito, né...?"
103080-207 = "Hehe... \"Tripulação da Nave de Guerra Espacial\", o som disso é tão bom♡"
103080-208 = "Aliás, nós teremos trajes especiais?"
103080-210 = "T-Trajes especiais...?"
103080-211 = "Ora. Nós seremos a tripulação da nave de guerra espacial, não seremos?#nEles não deveriam ter trajes só para isso? "
103080-213 = "E-Espera aí. Trajes especiais...?"
103080-214 = "Uhum, acho que dá pra preparar isso."
103080-215 = "Q-Quê, Hibiki!?#nVocê acha mesmo que temos tempo pra preparar isso?"
103080-216 = "É que a gente vai ser a tripulação de uma nave de guerra espacial, sabe."
103080-217 = "Não é questão de conseguir ou não..."
103080-219 = "A gente tem que fazer isso. "
103080-223 = "É verdade! Nós não podemos trair os ideais do Departamento de Engenharia! Falar frases como \"Decolar!\", \"Aumentar a altitude!\" ou \"Carregar energia!\" usando o uniforme escolar do dia a dia não seria nada legal!"
103080-224 = "……Faz sentido."
103080-225 = "Certo, mãos à obra."
103080-226 = "Sim! Eu também vou procurar umas referências!#nTem um monte delas em mangás e animes, sabia!"
103080-228 = "Uhum. Então eu já vou começar a confeccionar as roupas. O primeiro passo é tirar as medidas de todo mundo――"
103080-229 = "Poxa vida, meu deus♡... Estou super animada.#nA propósito, sobre o design, você não gostaria de debater de forma bem calorosa comigo?"
103080-231 = "Então, eu vou adicionar umas funçõezinhas nesses trajes para transformá-los em algo parecido com um traje de piloto♪"
103080-232 = "Você também tem alguma sugestão, Sensei?"
103080-233 = "[s] \"Opa, eu tenho, sim!! Uma nave de guerra espacial que se preze tem que ter――\""
103080-235 = "Tô começando a ficar ansiosa com isso..."
103080-237 = "[ns1] \"Aquele clássico chapéu de capitão!!\"\n[ns2] \"E não pode faltar um lenço no pescoço, é lei!!\"\n[ns3] \"O capitão não é ninguém sem um casaco longo!!\""
103080-243 = "N-Nossa, esses detalhes são bem específicos..."
103080-244 = "Entendi. Vou usar isso como referência."
103080-246 = "（Como é que fomos parar nisso...）"
103080-250 = "Ufa, acho que já organizamos quase tudo. "
103080-251 = "Sendo assim, vamos começar os preparativos para o lançamento agora mesmo,#ne em 8 horas a gente parte em direção à \"Arca\"."
103080-252 = "Operadoras, controle de tráfego aéreo, hackers...#nCozinheiras e médicas..."
103080-253 = "Uhum. E também precisamos reunir as alunas que vão lutar de verdade na Batalha pela Ocupação.#nHaa, tem tanta coisa pra fazer~"
103080-259 = "……Rin-senpai,"
103080-260 = "Você, o Sensei e todas as alunas da Schale lutaram até aqui sem descansar um só momento."
103080-261 = "Mas ainda temos tempo até o início da operação.#nQue tal aproveitar essa oportunidade para descansar um pouco? Especialmente você, Rin-senpai..."
103080-262 = "……Tem razão."
103080-263 = "A falta de sono pode atrapalhar o meu julgamento...#nPara que isso não afete as operações futuras, aceitarei o seu conselho."
103080-264 = "Muito bem, pessoal.#nPartiremos em 8 horas, logo ao amanhecer. "
103080-265 = "Até lá... peço que todos tentem descansar o máximo possível."
103080-266 = "Sendo assim, estão dispensados."
103080-268 = "Próximo episódio; A Última Noite na Terra"