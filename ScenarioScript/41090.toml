[translation]
41090-1 = "Episódio 9;A Sombra Rastejante"
41090-2 = "Arredores do Parque dos Coelhinhos - Mercado"
41090-4 = "（Vim até o mercado local para fazer umas compras.）"
41090-5 = "Ah, Sensei……?!"
41090-10 = "Que coincidência encontrar o senhor por aqui!"
41090-11 = "[s1] \"Ah, Kirino. Bom trabalho.\"\n[s2] \"Fazendo patrulha por aqui também?\""
41090-12 = "Sim, exatamente! Trabalhando duro hoje também para garantir a segurança dos cidadãos!"
41090-13 = "Sim, exatamente! Trabalhando duro hoje também para garantir a segurança dos cidadãos!"
41090-14 = "E também…… tem um monte de barracas de comida deliciosa por aqui……"
41090-15 = "O sanduíche de carne de porco daquele açougue ali é uma obra-prima! E sempre que eu compro alguma coisa, eles me dão um croquete frito na hora de brinde……!"
41090-19 = "C-Claro que esse não é o meu único objetivo aqui! É que sempre tem uns delinquentes rondando essa área, então, sabe como é……!"
41090-20 = "[s] \"Eu sei que você dá o seu melhor, Kirino. Bom trabalho.\""
41090-21 = "A-Ahaha……"
41090-22 = "Mudando de assunto…… Sobre aquelas alunas da SRT que causaram confusão no parque dias atrás…… Eu ouvi dizer que \"deixaram tudo nas mãos da Schale\", mas……"
41090-23 = "Deu tudo certo de lá pra cá? Espero que o senhor não tenha se metido em apuros com elas."
41090-24 = "Tipo, elas ameaçarem o senhor com armas ou armadilhas de campo pra roubar sua comida……"
41090-25 = "Ou fazerem exigências absurdas, quebrarem tudo e armarem barraco…… esse tipo de coisa!"
41090-26 = "[s3] \"T-Tá tudo tranquilo…… aham.\"\n[s4] \"Elas são boas garotas no fundo.\""
41090-27 = "Ah, que alívio. Se o senhor diz, então tá tudo bem."
41090-28 = "Ah, que alívio. Se o senhor diz, então tá tudo bem."
41090-29 = "É que como elas armaram aquele protesto enorme e bateram de frente com a Valkyrie, eu achei que o senhor pudesse estar correndo perigo……"
41090-30 = "Mas, como esperado do Sensei, o senhor tem tudo sob controle!"
41090-31 = "Eu também vou continuar dando o meu melhor hoje pra me tornar uma adulta admirável como o senhor!"
41090-32 = "[s] \"Bom, nem tudo sai perfeitamente do jeito que eu planejo, mas……\""
41090-33 = "Ah, entendi. Bom, se acontecer qualquer coisa, não hesite em chamar esta oficial aqui ou ligar pra Academia Polícial Valkyrie."
41090-34 = "Nós operamos 24 horas por dia, 7 dias por semana pra garantir a segurança dos cidadãos!"
41090-35 = "Ah, a propósito, tá rolando um boato bem estranho por aqui ultimamente. Esse é um dos motivos de eu ter vindo bater ronda……"
41090-36 = "[s] \"Um boato……?\""
41090-37 = "Sim. Parece que tem um grupo de andarilhos fortemente armados vagando por essa área."
41090-38 = "Me disseram que é um grupo de sem-teto com roupas bem esfarrapadas e aparência intimidadora……"
41090-39 = "E o pior é que eles tão carregando armas de fogo pesadas, sabe-se lá de onde tiraram. A população local tá morrendo de medo."
41090-40 = "Pra completar, teve relatos de que eles invadiram a área do porto outro dia de madrugada pra roubar materiais e sucata."
41090-41 = "O que será que eles tão planejando com tudo isso……?"
41090-42 = "[s] \"Hmmm……?\""
41090-43 = "Sensei? O senhor tem alguma ideia do que possa ser?"
41090-44 = "[s] \"N-Não, considerando essas informações, eu…… eu acho que é só uma coincidência……\""
41090-45 = "Entendido. Se o senhor souber de qualquer coisa, por favor, entre em contato!"
41090-46 = "Mas parando pra pensar, deixando aquele caso da SRT de lado…… lidar com um \"grupo de andarilhos fortemente armados\" é tenso……"
41090-47 = "Se a coisa continuar assim, o arsenal da Academia Valkyrie vai acabar parecendo de brinquedo perto do deles."
41090-48 = "Será que a gente não podia aproveitar a desculpa pra pedir armamento de última geração pra Valkyrie……?"
41090-49 = "[s] \"Ah, é assim que funciona?\""
41090-50 = "Quem dera…… No fim das contas é quase impossível. O trabalho de supressão de criminosos perigosos nem faz parte das obrigações da Segurança Comunitária……"
41090-51 = "E pelo que falam por aí, a Valkyrie inteira tá no vermelho no banco…… A gente pena até pra conseguir recarga de munição básica."
41090-52 = "Mas pode ficar tranquilo! Se o bicho pegar, eu protejo os cidadãos nem que seja na base do soco!"
41090-53 = "E com os méritos daquele último incidente, eu talvez consiga ser transferida pro Escritório de Guarda……"
41090-54 = "Vou continuar ralando muito e dando o meu melhor!"
41090-55 = "[s] \"Isso aí, tô torcendo por você.\""
41090-56 = "Muito obrigada! Tudo graças ao senhor, Sensei!"
41090-57 = "Bom, esta oficial agora vai voltar a fazer seu tour gastronômi--"
41090-58 = "Digo, voltar para a patrulha!"
41090-62 = "[ns] (Termino as compras e começo a caminhar de volta para a Schale.)"
41090-66 = "……"
41090-70 = "……Você aí."
41090-71 = "Você é o Sensei [USERNAME], correto?"
41090-72 = "[s] \"Sou eu sim, mas……\""
41090-74 = "Nós temos assuntos a tratar com você."
41090-75 = "Acompanhe-nos, por favor."
41090-82 = "[ns] \"(Espera, isso é gás do s-sono……!?)\""
41090-91 = "（Acabo inalando a fumaça que soltaram. Minha visão começa a embaçar rapidamente……）"
41090-95 = "（E a minha consciência afunda na escuridão.）"
41090-97 = "Próximo Episódio;Desapego Material e Marmita de Churrasco"