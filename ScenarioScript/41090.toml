[translation]
41090-1 = "Episódio 9: Sombra que se Aproxima"
41090-2 = "Perto do Parque dos Coelhinhos - Mercado"
41090-4 = "(Eu tinha vindo ao mercado próximo para fazer compras)"
41090-5 = "Ah, Sensei...!?"
41090-10 = "Que coincidência encontrar você em um lugar como este!"
41090-11 = "[s1] \"Ah, Kirino. Bom trabalho.\"\n[s2] \"Está patrulhando aqui também?\""
41090-12 = "Sim, exatamente! Hoje também, pela segurança dos cidadãos!"
41090-13 = "Sim, exatamente! Hoje também, pela segurança dos cidadãos!"
41090-14 = "Além disso, esta área tem muitas barracas de comida deliciosas..."
41090-15 = "Especialmente o sanduíche de costeleta daquela loja de carnes ali, é divino! E sempre que compro algo, eles me dão um croquete frito na hora de brinde...!"
41090-19 = "M-mas, claro, esse não é o único objetivo! É que, como há muitos delinquentes rondando por aqui..."
41090-20 = "[s] \"Eu sei do seu esforço, Kirino. Bom trabalho.\""
41090-21 = "Ah, ahahaha..."
41090-22 = "Aliás, sobre as alunas da SRT que causaram aquele tumulto no parque outro dia, ouvi dizer que \"deixou tudo nas mãos do Schale\"..."
41090-23 = "Ficou tudo bem depois daquilo? Espero que não tenha ocorrido nenhum problema."
41090-24 = "Como, por exemplo, elas te ameaçarem com armas ou armadilhas para roubar sua comida..."
41090-25 = "Ou fazerem exigências absurdas, ou causarem baderna...!"
41090-26 = "[s3] \"E-está tudo bem... sim.\"\n[s4] \"Elas são boas garotas, no fundo.\""
41090-27 = "Entendo, fico feliz em saber disso."
41090-28 = "Entendo, fico feliz em saber disso."
41090-29 = "Como elas organizaram protestos e chegaram a enfrentar a Valkyrie, eu achei que talvez fosse perigoso..."
41090-30 = "Como esperado do Sensei, suponho!"
41090-31 = "Eu também vou me esforçar hoje para me tornar uma adulta exemplar como você!"
41090-32 = "[s] \"Bem, nem tudo sai sempre como planejado para mim também...\""
41090-33 = "Ah, entendo. Se algo acontecer, por favor, entre em contato comigo ou com a Academia de Polícia Valkyrie a qualquer momento."
41090-34 = "Nós trabalhamos 24 horas por dia, 7 dias por semana, pela segurança dos cidadãos!"
41090-35 = "Ah, aliás, tem um boato estranho circulando por aqui ultimamente. Foi também por isso que vim patrulhar..."
41090-36 = "[s] \"Boato...?\""
41090-37 = "Sim. Parece que há um grupo de nômades armados vagando por aqui."
41090-38 = "Dizem que é um grupo sem residência fixa, com roupas desleixadas..."
41090-39 = "Eles carregam armas de fogo poderosas que não se sabe onde conseguiram, e os cidadãos estão começando a ficar preocupados."
41090-40 = "Além disso, outro dia, houve relatos de que eles invadiram a zona portuária para roubar sucata."
41090-41 = "Qual será o objetivo deles...?"
41090-42 = "[s] \"Hmm...?\""
41090-43 = "Sensei? Você tem alguma ideia do que possa ser?"
41090-44 = "[s] \"Não, com base nessas informações, provavelmente não é o que estou pensando...\""
41090-45 = "Entendo. Se descobrir algo, por favor, me avise!"
41090-46 = "De qualquer forma, deixando o caso da SRT de lado, um \"grupo de nômades com armas poderosas\"..."
41090-47 = "Do jeito que as coisas vão, parece que o armamento da Academia de Polícia Valkyrie vai acabar parecendo fraco."
41090-48 = "Será que não poderíamos aproveitar a oportunidade para trocar as armas da Valkyrie por modelos mais modernos...?"
41090-49 = "[s] \"Entendo?\""
41090-50 = "Embora, bem, deva ser difícil... Afinal, as tarefas básicas do Departamento de Segurança Pública não incluem a supressão de criminosos..."
41090-51 = "E, aparentemente, a situação financeira da Valkyrie como um todo não está boa... Até repor munição é um sufoco."
41090-52 = "Mas não se preocupe, se necessário, protegerei a segurança dos cidadãos até com as próprias mãos!"
41090-53 = "Além disso, com o mérito da última missão, talvez eu consiga ser transferida para o Departamento de Guarda..."
41090-54 = "Vou continuar me esforçando daqui para frente!"
41090-55 = "[s] \"Sim, estou torcendo por você.\""
41090-56 = "Muito obrigada! Isso também é graças ao Sensei!"
41090-57 = "Bem, vou continuar com a patrulha..."
41090-58 = "Digo, voltarei para a patrulha!"
41090-62 = "[ns] Termino as compras e volto para o Schale."
41090-66 = "……。"
41090-70 = "……Ei, você aí."
41090-71 = "Você é o Sensei [USERNAME], não é?"
41090-72 = "[s] \"Sou eu, mas…….\""
41090-74 = "Tenho um assunto para tratar com você."
41090-75 = "Você vai vir comigo, não vai?"
41090-82 = "[ns] \"(Isso é... anestésico!?)\""
41090-91 = "(Aspirei a fumaça liberada e minha visão começou a embaçar……)"
41090-95 = "(Minha consciência mergulhou na escuridão)"
41090-97 = "Próximo episódio: Sem Posse e Marmita de Yakiniku"
