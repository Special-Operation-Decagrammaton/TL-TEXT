[translation]
41090-1 = "Episódio 9: A Sombra Rastejante"
41090-2 = "Parque dos Coelhinhos – Mercado Próximo"
41090-4 = "(Tinha ido até o mercado próximo para fazer compras.)"
41090-5 = "Ah, Professor…?!"
41090-10 = "Que coincidência encontrar o senhor por aqui!"
41090-11 = "[s1] \"Ah, Kirino. Bom trabalho.\"\n[s2] \"Patrulhando por aqui também?\""
41090-12 = "Sim, exato! Hoje também, pela segurança dos cidadãos!"
41090-13 = "Sim, exato! Hoje também, pela segurança dos cidadãos!"
41090-14 = "Além disso, por aqui há muitas barracas de comida deliciosa…"
41090-15 = "Especialmente o sanduíche de costeleta daquela loja de carne é divino, e sempre que compro alguma coisa, ainda ganho um croquete fresquinho de brinde…!"
41090-19 = "M-mas não é só por isso, claro! É que também há muitos delinquentes rondando a área…!"
41090-20 = "[s] \"Eu sei do seu esforço, Kirino. Bom trabalho.\""
41090-21 = "A-ahaha…"
41090-22 = "Aliás, sobre as alunas da SRT que causaram aquele tumulto no parque outro dia… ouvi dizer que 'tudo o que vier depois ficou a cargo da Schale'…"
41090-23 = "Como tem sido depois disso? Espero que nenhum problema tenha surgido."
41090-24 = "Tipo, elas usarem armas ou armadilhas para intimidar o senhor e roubar comida…"
41090-25 = "Ou fazer exigências absurdas, ou se rebelar…!"
41090-26 = "[s3] \"F-Fica tranquilo… é, está tudo bem.\"\n[s4] \"Elas são boas garotas, no fundo.\""
41090-27 = "Que bom. Ainda bem."
41090-28 = "Que bom. Ainda bem."
41090-29 = "Como foram capazes de protestar e enfrentar a Valkyrie, fiquei com receio de que fosse perigoso…"
41090-30 = "Mas é por isso que o senhor é o Professor, não é?!"
41090-31 = "Para me tornar uma adulta tão admirável quanto o senhor, continuarei me esforçando dia após dia!"
41090-32 = "[s] \"Bem… nem tudo tem dado certo para mim também…\""
41090-33 = "Ah, é mesmo? Se precisar de alguma coisa, pode me contactar a qualquer hora, ou então a Academia Valkyrie."
41090-34 = "Estamos à disposição 24 horas por dia, 7 dias por semana, pela segurança dos cidadãos!"
41090-35 = "Ah, a propósito, andou circulando um boato estranho por aqui. Foi por isso que vim patrulhar, na verdade…"
41090-36 = "[s] \"Boato…?\""
41090-37 = "Sim. Parece que grupos de andarilhos armados têm andado por estas bandas."
41090-38 = "São grupos sem residência fixa, vestidos de forma grosseira…"
41090-39 = "E andam com armas de fogo poderosas, de origem desconhecida, o que tem deixado os cidadãos apreensivos."
41090-40 = "Outro dia, houve até um relato de que invadiram a orla para roubar sucata."
41090-41 = "Qual será o objetivo deles…?"
41090-42 = "[s] \"Hmm…?\""
41090-43 = "Professor? O senhor pensou em alguma coisa?"
41090-44 = "[s] \"Não, com essa descrição… provavelmente não são elas.\""
41090-45 = "Entendo. Se descobrir alguma coisa, por favor, avise-nos!"
41090-46 = "De qualquer forma, deixando de lado o caso da SRT… 'andarilhos armados com armas poderosas'…"
41090-47 = "Desse jeito, vai parecer que o armamento da Academia Valkyrie é uma piada."
41090-48 = "Que tal aproveitarmos a oportunidade para trocar as armas da Valkyrie por modelos mais modernos…?"
41090-49 = "[s] \"É uma ideia…?\""
41090-50 = "Dito isso, acho difícil… afinal, o trabalho básico do Departamento de Segurança da Vida não inclui a neutralização de criminosos…"
41090-51 = "Ouvi dizer que a situação financeira da Valkyrie como um todo não vai bem… estamos com dificuldades até para repor munição."
41090-52 = "Mas pode ficar tranquilo! Se necessário, protegerei os cidadãos com as próprias mãos!"
41090-53 = "Além disso, com o sucesso da última operação, talvez eu consiga ser transferida para o Esquadrão de Segurança…"
41090-54 = "Continuarei me esforçando daqui para frente!"
41090-55 = "[s] \"Sim, estou torcendo por você.\""
41090-56 = "Muito obrigada! Devo isso ao senhor também!"
41090-57 = "Então, vou continuar meu… hum…"
41090-58 = "Quer dizer, vou retomar a patrulha!"
41090-62 = "[ns] Termino as compras e volto para a Schale."
41090-66 = "……"
41090-70 = "……Ei, você aí."
41090-71 = "É o Professor [USERNAME], não é?"
41090-72 = "[s] \"Sou, sim…\""
41090-74 = "Preciso falar com você."
41090-75 = "Venha comigo, não se importa, não é?"
41090-82 = "[ns] \"(Isto é… anestésico…?!)\""
41090-91 = "(Inalo a fumaça liberada. Minha visão fica turva…)"
41090-95 = "(A consciência afunda na escuridão…)"
41090-97 = "Próximo Episódio: O Não-Ter e o Bento de Churrasco"