[translation]
2600206-1 = "未熟な私にできること"
2600206-2 = "ゲヘナ学園・第8学生食堂"
2600206-3 = "（そして、週末）"
2600206-4 = "（ジュリとの約束通りに、ゲヘナの学生食堂を訪れた）"
2600206-10 = "あっ、先生！お待ちしておりました！"
2600206-11 = "[s1] \"お待たせ、遅くなってごめんね。\"\n[s2] \"それ、何を持ってるの……？\""
2600206-14 = "あ、これはですね……"
2600206-19 = "シャベルと、鎌と、それからハンマーです！"
2600206-20 = "[s] \"……今から何をする気？\""
2600206-21 = "パッと掘ってサッと切ってドスンとやるんです！"
2600206-22 = "あ、もちろんこれだけでは無いですよ。"
2600206-23 = "きちんとこれ以外にも必要なものは揃えておりますので。"
2600206-28 = "ご心配なく、今日は全て私にお任せください！"
2600206-29 = "大船に乗った気持ちで良いんですよ！"
2600206-30 = "[s] \"一応、何をする予定なのか聞いても……？\""
2600206-31 = "それはもちろん、"
2600206-32 = "農作業、です！"
2600206-34 = "（ジュリの後について、食堂の裏側の方へと向かうと……）"
2600206-35 = "（そこには、大きな畑が広がっていた）"
2600206-36 = "ふふっ、いかがですか？"
2600206-37 = "私たち給食部の、自慢の畑なんです！"
2600206-38 = "[s3] \"すごいね……！\"\n[s4] \"どうしてこんなところに畑が……？\""
2600206-41 = "私たちの部活はいつも予算不足な上に、色んな事情が相まって食材不足になりがちなので……。"
2600206-42 = "少しでも足しになればと思い、こうして食材を自分たちで育てているんです。"
2600206-43 = "それに、ゲヘナ学園のすぐそばに火山があることもあって、"
2600206-49 = "すっごく肥えていて、良い土なんですよ！"
2600206-50 = "私たちもプロではないのですが、種を撒いて、適度に管理するだけで……"
2600206-56 = "こんな風に、美味しい野菜がたくさん実ってくれるんです！"
2600206-57 = "ふふっ、すごいと思いませんか？"
2600206-58 = "[s5] \"それはすごいね。あと、何だか……\"\n[s6] \"畑の話をしてる時のジュリ、すごく表情が輝いてる。\""
2600206-61 = "え、あ……そ、そうでしょうか？"
2600206-62 = "実は私、料理も好きなのですが……こうして食材を育てるのも好きでして。"
2600206-63 = "私はまだ料理の腕が未熟なので、みんなが喜んでくれるようなものは作れませんが……。"
2600206-64 = "であれば、料理の腕の研鑽はもちろんですが、食材にも拘ってみたらどうだろう、と思いまして。"
2600206-65 = "ほら、素敵な食材って、何も調理しなくてもすごく美味しかったりするじゃないですか？"
2600206-66 = "もちろん料理の方を諦めたわけではありませんが、美味しい食材も作ることができれば、最終的にはもっともっと皆さんに喜んでもらえるんじゃないかなと思いまして。"
2600206-67 = "[s] \"……ジュリはすごいね。\""
2600206-68 = "す、すごい……でしょうか？私はむしろ、何かとダメダメな感じだと思うのですが……。"
2600206-69 = "ただ私はダメだからこそ、より良い料理のためにできることが増えれば良いなと思っただけで……。"
2600206-70 = "そんな、先生に褒めていただくほどのものでは……。"
2600206-71 = "えっと、その……。"
2600206-72 = "あ、こ、こうしている場合ではありませんね！"
2600206-73 = "私、日差し対策のためにこれを……はい、どうぞ！麦わら帽子とアームカバー、それに日焼け止めです！"
2600206-78 = "では先生。作業のお手伝い、お願いできますか？"
2600206-81 = "[wa:600]― あっ、[wa:1100]見てください[wa:600]先生！"
2600206-84 = "[wa:100]― この真っ赤に[wa:600]実った[wa:500]トマト、"
2600206-85 = "[wa:800]― すっごく[wa:500]美味しそう[wa:300]だと思いませんか？"
2600206-88 = "[wa:200]― えへん、[wa:1200]これも[wa:400]給食部としての[wa:1000]成果です。"
2600206-89 = "[wa:1700]― 丹精込めて[wa:700]作った[wa:300]甲斐が[wa:400]ありました！"
2600206-92 = "[wa:400]― あ、[wa:1000]あっちのトマトも[wa:1100]すごく良い感じに……"
2600206-95 = "[ns] \"どれどれ？\""
2600206-96 = "― えっと、[wa:1800]あ、[wa:1200]あれ、[wa:1200]なのですが、"
2600206-97 = "[wa:2000]― その……[wa:2000]何だか[wa:1200]ちょっと[wa:800]距離が……？"
2600206-100 = "[wa:400]― この[wa:400]近さですと、[wa:2200]あの、[wa:1800]私……。"
2600206-103 = "[wa:800]― （あ、[wa:1600]先生の[wa:1000]香りが……）"
2600206-104 = "[wa:2500]― （な、[wa:900]何だか[wa:600]急に、[wa:1100]胸が[wa:500]ドキドキしてきました……！？）"
2600206-107 = "[ns] \"ジュリ、顔が真っ赤だけど大丈夫？\""
2600206-108 = "[wa:300]― だっ、[wa:700]大丈夫です、[wa:1100]はい！[wa:1000]ご心配なく……！"
2600206-111 = "[wa:1300]― ただ[wa:300]その[wa:1200]何と言いますか、[wa:2600]えっと……。"
2600206-112 = "[wa:2500]― 何だか[wa:500]顔が[wa:400]熱くなってきて、[wa:2300]その……！[wa:2400]うぅ……！"
2600206-115 = "（それからしばらく、ジュリの農作業を手伝っていたのだけど……）"
2600206-116 = "（いつも何かをするときは真剣なジュリの視線が、珍しくあちこちへと泳いでいた）"
2600206-117 = "[ns] \"ジュリ、本当に大丈夫……？\""
2600206-118 = "（どうしてでしょう、これは……胸の鼓動が……）"
2600206-119 = "えっと、体調は大丈夫なはず、なのですが……。"
2600206-120 = "うぅ……！"
2600206-121 = "す、すみません！ちょっと、水を取りに行ってきます……！"
2600206-126 = "（確かに具合が悪いわけでは無さそうだったので、もくもくと畑いじりをしながら待つことにしたのだけれど、結局ジュリは戻ってこなかった）"
