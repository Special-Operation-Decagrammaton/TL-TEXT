[translation]
2600206-1 = "O que posso fazer sendo inexperiente"
2600206-2 = "Gehenna Academy - 8º Refeitório Estudantil"
2600206-3 = "（E então, fim de semana）"
2600206-4 = "（Conforme prometido com Juri, visitei o refeitório de Gehenna）"
2600206-10 = "Ah, Sensei! Eu estava esperando por você!"
2600206-11 = "[s1] \"Desculpe a demora, sinto muito pelo atraso.\"\n[s2] \"O que é isso que você está segurando...?\""
2600206-14 = "Ah, isso é..."
2600206-19 = "Uma pá, uma foice e também um martelo!"
2600206-20 = "[s] \"...O que você pretende fazer com isso?\""
2600206-21 = "Vamos cavar rápido, cortar rápido e bater com força!"
2600206-22 = "Ah, claro que não é só isso."
2600206-23 = "Já preparei tudo o que é necessário além disso."
2600206-28 = "Não se preocupe, hoje deixe tudo comigo!"
2600206-29 = "Pode ficar tranquilo, como se estivesse em um navio seguro!"
2600206-30 = "[s] \"Posso perguntar, pelo menos, o que vamos fazer...?\""
2600206-31 = "Isso é, claro,"
2600206-32 = "trabalho agrícola!"
2600206-34 = "（Seguindo Juri para a parte de trás do refeitório...）"
2600206-35 = "（Lá, havia uma grande horta estendida）"
2600206-36 = "Fufu, o que achou?"
2600206-37 = "É a horta de que nosso Clube de Merenda tanto se orgulha!"
2600206-38 = "[s3] \"Incrível...!\"\n[s4] \"Por que tem uma horta em um lugar desses...?\""
2600206-41 = "Nosso clube sempre sofre com falta de orçamento e, por vários motivos, acabamos ficando sem ingredientes..."
2600206-42 = "Então, pensando em ajudar um pouco, cultivamos nossos próprios ingredientes assim."
2600206-43 = "Além disso, como há um vulcão bem perto da Academia Gehenna,"
2600206-49 = "o solo é extremamente fértil e muito bom!"
2600206-50 = "Nós não somos profissionais, mas apenas semeando e cuidando adequadamente..."
2600206-56 = "Dessa forma, muitos vegetais deliciosos crescem!"
2600206-57 = "Fufu, não acha incrível?"
2600206-58 = "[s5] \"Isso é incrível. Além disso, de alguma forma...\"\n[s6] \"Juri, sua expressão brilha muito quando fala da horta.\""
2600206-61 = "Eh, ah... S-sério?"
2600206-62 = "Na verdade, eu gosto de cozinhar, mas... também gosto de cultivar os ingredientes assim."
2600206-63 = "Minhas habilidades culinárias ainda são inexperientes, então não consigo fazer coisas que deixem todos felizes..."
2600206-64 = "Então, pensei: além de aprimorar minhas habilidades na cozinha, por que não me dedicar também aos ingredientes?"
2600206-65 = "Veja, ingredientes maravilhosos são deliciosos mesmo sem precisar cozinhar muito, não é?"
2600206-66 = "Claro que não desisti da culinária, mas se eu conseguir produzir ingredientes deliciosos, acho que, no final, poderei deixar todos ainda mais felizes."
2600206-67 = "[s] \"...Juri, você é incrível.\""
2600206-68 = "I-incrível...? Eu acho que sou, na verdade, um tanto desastrada em tudo..."
2600206-69 = "É só que, por ser desastrada, pensei que seria bom aumentar as coisas que posso fazer para ter uma culinária melhor..."
2600206-70 = "Não é para tanto, não mereço elogios do Sensei..."
2600206-71 = "Bem, isso..."
2600206-72 = "Ah, n-não é hora para isso!"
2600206-73 = "Para me proteger do sol, eu trouxe isto... sim, aqui está! Um chapéu de palha, mangas de proteção e protetor solar!"
2600206-78 = "Então, Sensei. Pode me ajudar com o trabalho?"
2600206-81 = "[wa:600]— Ah, [wa:1100] olhe [wa:600] Sensei!"
2600206-84 = "[wa:100]— Este tomate [wa:600] maduro [wa:500] e bem vermelho,"
2600206-85 = "[wa:800]— não [wa:500] parece [wa:300] delicioso?"
2600206-88 = "[wa:200]— Ehem, [wa:1200] este [wa:400] também é um resultado [wa:1000] do Clube de Merenda."
2600206-89 = "[wa:1700]— Valeu a pena [wa:700] ter me dedicado [wa:300] tanto [wa:400]!"
2600206-92 = "[wa:400]— Ah, [wa:1000] aquele tomate ali também [wa:1100] está com uma cara ótima..."
2600206-95 = "[ns] \"Vejamos...\""
2600206-96 = "― Bem, [wa:1800] ah, [wa:1200] aquilo, [wa:1200] é que..."
2600206-97 = "[wa:2000] ― Esse... [wa:2000] por que [wa:1200] a distância [wa:800] está tão...?"
2600206-100 = "[wa:400] ― Com [wa:400] essa proximidade, [wa:2200] sabe, [wa:1800] eu..."
2600206-103 = "[wa:800] ― (Ah, [wa:1600] o perfume [wa:1000] do Sensei...)"
2600206-104 = "[wa:2500] ― (Q- [wa:900] por que [wa:600] de repente, [wa:1100] meu coração [wa:500] começou a bater tão forte...!?)"
2600206-107 = "[ns] \"Juri, seu rosto está bem vermelho, você está bem?\""
2600206-108 = "[wa:300] ― E- [wa:700] estou bem, [wa:1100] sim! [wa:1000] Não se preocupe...!"
2600206-111 = "[wa:1300] ― Só que [wa:300] esse [wa:1200] como posso dizer, [wa:2600] bem..."
2600206-112 = "[wa:2500] ― Sinto que [wa:500] meu rosto [wa:400] está ficando quente, [wa:2300] e...! [wa:2400] Ugh...!"
2600206-115 = "(Depois disso, continuei ajudando Juri com o trabalho agrícola por um tempo...)"
2600206-116 = "(O olhar de Juri, que geralmente é sério ao fazer qualquer coisa, estava vagando de um lado para o outro de forma incomum)"
2600206-117 = "[ns] \"Juri, você tem certeza que está bem...?\""
2600206-118 = "(Por que será, isso é... o batimento do meu coração...)"
2600206-119 = "Bem, eu deveria estar me sentindo bem, mas..."
2600206-120 = "Ugh...!"
2600206-121 = "D-desculpe! Vou ali buscar um pouco de água...!"
2600206-126 = "(Como ela realmente não parecia estar doente, decidi esperar enquanto trabalhava silenciosamente no campo, mas, no fim, Juri não voltou)"
