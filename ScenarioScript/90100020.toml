[translation]
90100020-1 = "Episódio 2: Entre o Super-humano e a Raposa"
90100020-6 = "Que calor..."
90100020-7 = "Por que está tão quente? O verão ainda nem chegou, né?"
90100020-8 = "Digo... esse pátio é horrível. #nNão tem sombra nenhuma, e como tem muros, o vento nem circula..."
90100020-9 = "Será que acham que prisioneiros não precisam de proteção contra o sol?"
90100020-14 = "Não é para evitar que fiquem pontos cegos para os guardas?"
90100020-15 = "Se tiver lugares para se esconder, fica mais fácil fugir, não é?"
90100020-16 = "Na verdade, dizem que a Wakamo recebia ferramentas de fuga na sombra das árvores."
90100020-17 = "Aquela lá... eu nunca fui com a cara dela desde o começo."
90100020-18 = "Eu devia ter apertado o cerco tanto a ponto de ela nem ter vontade de fugir!"
90100020-23 = "Calma, Kurumi-chan. O uso excessivo de força é proibido, sabe disso."
90100020-24 = "Eu sei, mas... agora que estou na Correcional, #nlembrar do passado me deixa irritada."
90100020-25 = "Digo... Niko, você não está com calor? #nEstamos correndo juntas e você nem está suando."
90100020-26 = "Eu não me importo com o calor. Com a temperatura de hoje, até sinto um frescor."
90100020-27 = "Que estranho... deveríamos estar seguindo o mesmo treino de aclimatação ao calor... #nPor que tem tanta diferença assim?"
90100020-28 = "Será que é diferença de constituição física?"
90100020-29 = "Talvez seja porque a Kurumi é menor que a Niko?"
90100020-30 = "Menor o quê, exatamente!?"
90100020-31 = "As orelhas, as orelhas. #n...Ah, o que você pensou?"
90100020-32 = "Sabe, dizem que as extremidades do corpo são sensíveis às mudanças de temperatura, né?"
90100020-33 = "Como as orelhas da Niko são grandes, pensei que o calor pudesse escapar mais facilmente por elas."
90100020-34 = "É verdade... no verão, minhas orelhas são as primeiras a esquentar."
90100020-35 = "Em compensação, no inverno elas esfriam rápido e chegam a doer."
90100020-36 = "É mesmo...? Bom, deve haver essas diferenças, suponho."
90100020-37 = "Ah... mas acho que prefiro o inverno. #nO verão é terrível porque abafa embaixo do peito..."
90100020-42 = "………………Tsc."
90100020-43 = "Você acabou de estalar a língua, não foi!"
90100020-44 = "...Não fiz não?"
90100020-45 = "Mentira! Eu ouvi um 'tsc'!"
90100020-50 = "...A Yukino ainda está correndo."
90100020-51 = "Yukino, até quando você pretende continuar? O tempo de exercício já vai acabar."
90100020-58 = "...Vou dar mais uma volta e volto."
90100020-63 = "Yukino, desde que entrou na Correcional, você só treina. #nE nem conversa muito com a gente."
90100020-64 = "Será que tem algo que ela quer pensar sozinha?"
90100020-72 = "Bom... imagino que ela tenha muitas coisas na cabeça."
90100020-73 = "É, deve ser isso mesmo..."
90100020-74 = "Ainda assim, não queria que ela se esforçasse tanto..."
90100020-79 = "(Viver de forma ociosa não vai apagar meus pecados)"
90100020-80 = "(Para me tornar uma adulta que assume responsabilidades, preciso aprender mais, me esforçar mais — e confiar nas pessoas)"
90100020-81 = "(Mas...)"
90100020-83 = "A culpa é toda de vocês, não é!?"
90100020-84 = "Operação em prol dos cidadãos? Não me faça rir! #nEu fui uma das vítimas dessa operação!"
90100020-87 = "Por que estou passando por isso!? Eu também sou uma cidadã! Me ajudem!"
90100020-88 = "...Era melhor terem me deixado em paz."
90100020-91 = "Não tenho nada para falar com vocês! #nChamem alguém superior — alguém que possa assumir a responsabilidade!"
90100020-93 = "(Naquela época... o que eu deveria ter escolhido e como deveria ter agido? Até hoje não sei a resposta.)"
90100020-94 = "(Será que, como o Sensei disse, era um problema que o tempo resolveria?)"
90100020-95 = "(Ou será que era algo que apenas eu poderia resolver...)"
90100020-96 = "...5, 5020..."
90100020-97 = "Prisioneira número 5020...!"
90100020-99 = "Ué? É a diretora do Departamento Correcional. Parece que ela está procurando alguém."
90100020-100 = "Não é o número da Yukino?"
90100020-101 = "Yukino, estão te chamando!"
90100020-105 = "……Sinto muito, Yukino-san. #nSei que você não está acostumada a ser chamada por número, mas peço que releve……."
90100020-106 = "……Não, tudo bem. Eu estava concentrada no treinamento e demorei a reagir."
90100020-107 = "Qual seria o motivo do chamado?"
90100020-108 = "Recebemos um pedido de visita. #nPoderia se preparar para sair, por favor……?"
90100020-109 = "Mas o horário de visitas de hoje já deveria ter encerrado."
90100020-110 = "Sim…… mas é uma pessoa especial."
90100020-114 = "――A Presidente do Conselho Estudantil Federal está chamando."
90100020-115 = "A Presidente do Conselho Estudantil Federal……?"
90100020-120 = "……Peço desculpas por perguntar a mesma coisa várias vezes."
90100020-121 = "É verdade que a Presidente do Conselho Estudantil Federal, que estava desaparecida, realmente retornou?"
90100020-122 = "Sim…… como foi algo repentino, a Valkyrie ficou uma bagunça por um tempo."
90100020-123 = "Mas, finalmente, as coisas se acalmaram. #nAlém disso, graças à Presidente, o trabalho que estava acumulado foi quase todo resolvido."
90100020-124 = "Nesse ritmo, acho que o Departamento Correcional também poderá melhorar aos poucos."
90100020-128 = "(Será que nós deveríamos ter acreditado e esperado pelo retorno da Presidente do Conselho Estudantil Federal……?)"
90100020-129 = "Claro, não dá para dizer que a Valkyrie se normalizou só com isso. #nAinda tem o caso da Chefe do Gabinete de Defesa――"
90100020-133 = "Ah, me desculpe…… fui insensível."
90100020-134 = "Não, não se preocupe."
90100020-143 = "Presidente. Yukino―― não, trouxe a prisioneira número 5020."
90100020-144 = "Por favor, entre."
90100020-145 = "(……Uma voz que não me é familiar.)"
90100020-146 = "(Sinto algo estranho…… não parece muito com a Presidente, de alguma forma……?)"
90100020-147 = "(Como era a voz da Presidente do Conselho Estudantil Federal……?)"
90100020-148 = "(Não consigo…… me lembrar da aparência dela.)"
90100020-154 = "Gabinete da Presidente do Conselho Estudantil Federal"
90100020-157 = "Quanto tempo, Capitã Yukino."
90100020-161 = "Você é……"
90100020-169 = "――A Presidente do Conselho Estudantil Federal."
90100020-170 = "Faz tempo que não nos vemos. Sinto que sua impressão mudou um pouco."
90100020-171 = "Ultimamente têm me dito muito isso. Embora eu mesma não tenha muita consciência disso."
90100020-172 = "Deve ser porque fiquei longe do cargo por muito tempo."
90100020-177 = "Não vamos ficar de pé, por favor, sente-se."
90100020-179 = "……Já recebi relatórios sobre a série de eventos durante a minha ausência."
90100020-180 = "Soube que a Chefe do Gabinete de Defesa, Kaya, usou vocês para planejar um golpe de estado."
90100020-181 = "………Sim."
90100020-182 = "Não se preocupe. Não pretendo culpá-la."
90100020-183 = "Na verdade, sou eu quem…… deveria pedir desculpas a vocês."
90100020-184 = "Vários incidentes ocorreram e o caos se espalhou. #nTudo isso porque eu desapareci."
90100020-185 = "Sendo assim, como posso cobrar responsabilidade de alguém por ter feito uma escolha errada?"
90100020-187 = "……Foi uma falha minha."
90100020-189 = "Não…… peço perdão."
90100020-190 = "Especialmente…… sinto muito pelas alunas da Academia Especial SRT."
90100020-191 = "Houve uma disputa pela autoridade administrativa da SRT…… e isso levou até ao fechamento da academia."
90100020-192 = "Começando pelo Esquadrão RABBIT――"
90100020-193 = "As alunas do primeiro ano, que mal tinham entrado, passaram por experiências terríveis."
90100020-194 = "Assim que os deveres oficiais se acalmarem, pretendo restaurar a Academia Especial SRT. #nFarei o possível para que as alunas recebam a melhor educação."
90100020-198 = "Se a senhora fará tudo isso, não tenho mais nada a pedir."
90100020-199 = "……No entanto."
90100020-200 = "Ainda assim, isso não significa que o passado de vocês deixará de existir."
90100020-201 = "Vocês paralisaram a infraestrutura para um golpe, atacaram o Conselho Estudantil Federal e... tentaram realizar um atentado terrorista no centro da cidade. O crime de vocês é grave."
90100020-202 = "Claro, eu poderia conceder um perdão. Mas isso só acumularia a insatisfação dos cidadãos, e seria impossível recuperar a confiança deles."
90100020-203 = "Este é um assunto que deve ser tratado com cautela. #n...Para que a SRT possa recuperar seu papel original. Por favor, compreendam."
90100020-204 = "No momento em que cometi o crime, eu já estava preparada para aceitar qualquer punição que me fosse imposta."
90100020-205 = "No entanto... as outras integrantes do esquadrão apenas seguiram as minhas ordens."
90100020-206 = "Não me importo com o que aconteça comigo... mas, por favor, não poderia conceder alguma clemência às outras integrantes?"
90100020-207 = "Tentar carregar toda a responsabilidade sozinha. #nEsse é um péssimo hábito seu."
90100020-208 = "Todos os eventos do mundo estão interligados de forma complexa. #nNão é possível deixar que apenas uma pessoa carregue toda a responsabilidade."
90100020-209 = "Esta situação atual é... bem. #nPode-se dizer que é o resultado de todos terem assumido um pouco da responsabilidade e cumprido seus papéis."
90100020-210 = "...Claro, eu não sou exceção."
90100020-211 = "Por isso, o preço desta situação também deve ser pago por todos nós."
90100020-216 = "...Anteriormente, durante uma operação, falhei na resposta inicial a um suspeito e acabei envolvendo civis."
90100020-217 = "Embora o cidadão devesse culpar a mim, que era a comandante no local..."
90100020-218 = "Graças à Presidente, que assumiu toda a responsabilidade, nós não fomos questionadas em nada."
90100020-219 = "Se todos os problemas do mundo não podem ser carregados por uma única pessoa... #npor que a Presidente carregou o poder e a responsabilidade da SRT sozinha até agora?"
90100020-220 = "Naquela época... eu tinha margem para isso."
90100020-221 = "Naquela época, eu tinha a margem, o status e a responsabilidade necessários para compensar os erros de vocês."
90100020-222 = "Aqueles que entraram em missão a meu pedido acabaram em uma situação difícil. #nTer a margem para ajudar e, ainda assim, apenas empurrar a responsabilidade para eles... #nIsso não pode ser chamado de uma postura de uma líder correta."
90100020-223 = "Sendo assim, eu também..."
90100020-224 = "Não acho que você seja capaz disso agora. #nO cansaço está transparecendo. Parece que você já está no seu limite apenas carregando a sua própria culpa."
90100020-225 = "Não será tarde demais quando você recuperar a margem necessária para carregar a culpa dos outros."
90100020-226 = "Até lá, por favor, atenda a este meu pedido egoísta, Yukino."
90100020-230 = "...Compreendi os sentimentos da Presidente."
90100020-231 = "Mas apenas ficar trancada na Agência Correcional refletindo não recuperará a honra da SRT."
90100020-232 = "Se puderem me dar uma oportunidade de redimir meus pecados, aceitarei qualquer missão. #nDê-me suas ordens."
90100020-237 = "...Mesmo que um perdão seja difícil, talvez seja permitido preparar uma oportunidade para servir aos cidadãos."
90100020-241 = "...Você já ouviu a palavra 'Lore'?"
90100020-242 = "Histórias vagas que se espalham como boatos entre as pessoas, sem base ou origem conhecida. #nTradições... lendas urbanas ou histórias de fantasmas."
90100020-243 = "Histórias difíceis de acreditar, mas que, por serem convincentes, são passadas adiante... #ne continuam vivas."
90100020-245 = "Um trem que segue para uma estação de outro mundo que não existe na realidade..."
90100020-247 = "Um rádio que, no meio da noite, transmite uma voz que amaldiçoa quem a ouve..."
90100020-249 = "Um elevador que, se você entrar e sair seguindo um procedimento específico, nunca mais voltará..."
90100020-251 = "...Você não parece surpresa. #nNa verdade, você gosta de histórias de fantasmas?"
90100020-252 = "É ineficiente se envolver emocionalmente com histórias cuja veracidade é incerta."
90100020-253 = "Entendo. O 'Lore' originalmente não deveria ser levado a sério... #nprovavelmente não passava de um produto da imaginação sem importância."
90100020-254 = "Mas, ultimamente, os relatos de que isso está acontecendo de verdade têm aumentado."
90100020-255 = "Isso não se limita a relatos de testemunhas... danos reais começaram a ocorrer."
90100020-256 = "Danos reais... isso seria causado pelo 'Lore'?"
90100020-257 = "Na maioria dos casos, os estudantes que afirmam ter encontrado o 'Lore' perdem a voz ou desaparecem antes mesmo de podermos verificar a verdade."
90100020-258 = "Se fossem casos de terrorismo ou desaparecimento, seria a vez da Escola de Polícia Valkyrie, mas, neste caso, nem sequer conseguimos entender a situação real."
90100020-259 = "Para evitar a propagação do 'Lore', o Comitê Administrativo decidiu que a investigação deve ser transferida para uma organização de nível superior."
90100020-260 = "Se, em uma situação que as organizações de segurança comuns não conseguem lidar, for necessária uma investigação rápida e quase extralegal..."
90100020-265 = "A SRT foi a escolhida, é isso?"
90100020-266 = "Exatamente."
90100020-267 = "No entanto, isto é apenas um pedido da Presidente do Conselho Estudantil Federal. #nNão é uma ordem, nem uma instrução."
90100020-268 = "Você não sabe a identidade do oponente e, na pior das hipóteses, pode acabar tendo o mesmo destino das vítimas."
90100020-275 = "Se o 'Lore' encontrar você antes que você o encontre... #nexiste até a possibilidade de você mesma se tornar o 'Lore'."
90100020-276 = "Mesmo assim, você aceitará esta operação?"
90100020-278 = "Sim."
90100020-279 = "Porque nós temos pecados pelos quais precisamos nos redimir."
90100020-284 = "Muito bem. Compartilharei as informações que reunimos aqui."
90100020-285 = "Investiguem a verdadeira natureza de Roa e eliminem a ameaça que se espalha por Kivotos."
90100020-286 = "……E mais uma coisa. #nIsso não é um pedido da Presidente do Conselho Estudantil, mas sim um pedido meu, pessoalmente."
90100020-290 = "Por favor — voltem em segurança."
90100020-291 = "Não se preocupe."
90100020-292 = "Recuar imediatamente de batalhas sem chances de vitória também faz parte do trabalho de uma unidade especial."
90100020-294 = "Tenho uma pergunta antes de iniciarmos a operação, se me permite."
90100020-295 = "Sim, pode falar."
90100020-296 = "Embora seja uma operação não oficial, precisaremos entrar em contato com o exterior para garantir bases e suprimentos de munição. E também de uma organização para nos dar suporte."
90100020-297 = "Antes, a Presidente do Conselho Estudantil cuidava disso. #nMas, agora, a situação não permite que ela o faça."
90100020-298 = "De fato. Se eu assumisse diretamente o suporte ao Esquadrão FOX, #npoderia passar a impressão de que a Presidente do Conselho Estudantil reconheceu publicamente o retorno da Academia Especial SRT."
90100020-299 = "Mas, felizmente, existe uma organização capaz de assumir esse papel."
90100020-300 = "Uma agência investigativa que possui autoridade e orçamento comparáveis aos do Conselho Estudantil, e que é reconhecida por todos lá."
90100020-301 = "— É o Schale."
90100020-306 = "……Ouvi direito?"
90100020-308 = "Próximo episódio: O esquadrão marcha após encher a barriga"
