[translation]#[Texto Final. - Filipe 05/07.]
90100020-1 = "Episódio 2: Entre a Super-Humana e a Raposa"
90100020-6 = "Que calooor……"
90100020-7 = "Por que tá esse forno? O verão nem chegou!"
90100020-8 = "E que pátio horrível, aliás.#nNão tem sombra nenhuma, e o muro não deixa o vento passar……"
90100020-9 = "Prisioneira não tem direito a sombra, é?"
90100020-14 = "Deve ser pra não criar ponto cego pros guardas, né~?"
90100020-15 = "Se tivesse onde se esconder, ficava fácil fugir, né~?"
90100020-16 = "A Wakamo mesmo, dizem que recebeu as ferramentas da fuga#nembaixo de uma árvore."
90100020-17 = "Aquela ali…… eu nunca fui com a cara dela."
90100020-18 = "A gente devia ter……#napertado a coleira dela até ela perder a vontade de fugir!"
90100020-23 = "Calma, Kurumi. Repressão excessiva é proibido, viu?"
90100020-24 = "Eu sei, tá…… mas quando lembro que agora sou EU que tô na Agência Correcional,#nme vêm as lembranças de antigamente e me dá um nervoso."
90100020-25 = "……Aliás, Niko, você não tá com calor?#nA gente correu junto e você nem suou!"
90100020-26 = "Calor não me incomoda. Com a temperatura de hoje, até sinto um friozinho."
90100020-27 = "Inacreditável…… a gente fez o mesmo treinamento de aclimatação ao calor……#nDe onde vem essa diferença……"
90100020-28 = "Será que é o corpo de cada uma?"
90100020-29 = "……Não é porque o AQUILO da Kurumi é menor que o da Niko~?"
90100020-30 = "O que que é pequeno aqui?!"
90100020-31 = "As orelhas, ué.#n……Ahá! O que foi que você imaginou?"
90100020-32 = "Dizem que as extremidades do corpo são sensíveis à mudança de temperatura#nné?"
90100020-33 = "Como a Niko tem orelhas grandes, deve ser mais fácil dissipar o calor."
90100020-34 = "Verdade…… no verão, minhas orelhas são as primeiras a esquentar."
90100020-35 = "Em compensação, no inverno elas gelam rapidinho e até doem."
90100020-36 = "É mesmo……? Bom, deve ter dessas diferenças, vai saber."
90100020-37 = "Haa…… mas eu acho que prefiro o inverno.#nNo verão, embaixo do peito fica tudo abafado, é um sofrimento……"
90100020-42 = "………………Tsc."
90100020-43 = "Você estalou a língua agora!"
90100020-44 = "……Eu? Imagina."
90100020-45 = "Mentirosa! Deu pra ouvir o \"tsc\"!"
90100020-50 = "……A Yukino ainda tá correndo."
90100020-51 = "Yukinooo, vai correr até quando?#nA hora do exercício já vai acabar!"
90100020-58 = "……Mais uma volta e eu volto."
90100020-63 = "Desde que entrou na Agência Correcional,\na Yukino só treina, né.#nQuase não conversa com a gente."
90100020-64 = "Será que ela quer pensar\nnumas coisas sozinha?"
90100020-72 = "Bom…… coisa pra pensar é o que não falta."
90100020-73 = "Isso é verdade, mas……"
90100020-74 = "Mesmo assim, queria que ela não\nse forçasse tanto……"
90100020-79 = "(Passar os dias sossegada aqui na Agência\nCorrecional não vai apagar o meu crime)"
90100020-80 = "(Para me tornar uma adulta que assume\nresponsabilidades, devo aprender mais,\nme esforçar mais―― e confiar nas pessoas)"
90100020-81 = "(Mas……)"
90100020-83 = "A culpa é toda de vocês!!"
90100020-84 = "Operação pelos cidadãos? Vai me desculpar!#nEu fui prejudicado por essa operação!"
90100020-87 = "Por que isso foi acontecer comigo?!\nEu também sou cidadão! Me ajudem!"
90100020-88 = "……Antes tivessem me deixado em paz."
90100020-91 = "Eu não tenho nada pra falar com vocês!#nChamem alguém de cima―― alguém que\npossa se responsabilizar!"
90100020-93 = "(O que eu deveria ter escolhido, como agir\nnaquela hora…… até hoje não sei a resposta)"
90100020-94 = "(Seria um problema que o tempo resolveria,\ncomo diz o Sensei?)"
90100020-95 = "(Ou algo que só a Presidente do Conselho\nEstudantil Geral poderia resolver……?)"
90100020-96 = "……5…… 5020……"
90100020-97 = "P-Prisioneira número 5020……!"
90100020-99 = "Ué? É a diretora da Agência Correcional.\nParece que ela procura alguém."
90100020-100 = "Não é o número da Yukino?"
90100020-101 = "Yukinooo, tão te chamando!"
90100020-105 = "……Me desculpe, Yukino.#nSei que é difícil se acostumar a ser\nchamada por número, sinto muito……"
90100020-106 = "……Não. Eu que estava focada no treino\ne demorei a responder."
90100020-107 = "Do que precisa?"
90100020-108 = "Chegou uma solicitação de visita.#nSe puder se preparar para sair……"
90100020-109 = "O horário de visitas de hoje\njá se encerrou, não?"
90100020-110 = "Sim…… mas é uma pessoa especial."
90100020-114 = "――A Presidente do Conselho Estudantil\nGeral está chamando."
90100020-115 = "A Presidente do Conselho……?"
90100020-120 = "……Perdão por perguntar a mesma coisa\nvárias vezes."
90100020-121 = "A Presidente do Conselho, que estava\ndesaparecida, voltou mesmo?"
90100020-122 = "Sim…… foi tudo tão repentino que até a\nValkyrie ficou uns tempos de pernas pro ar."
90100020-123 = "Mas enfim as coisas se assentaram.#nE, graças à Presidente, muito trabalho\nacumulado foi resolvido."
90100020-124 = "Nesse ritmo, até a Agência Correcional\ndeve melhorar aos poucos."
90100020-128 = "(Nós devíamos ter esperado, confiando\nna volta da Presidente…… será?)"
90100020-129 = "Claro que isso não basta pra dizer que a\nValkyrie se normalizou.#nAinda tem o caso da Chefe de Defesa e――"
90100020-133 = "Ah, me desculpe…… falei sem pensar."
90100020-134 = "Não, tudo bem."
90100020-143 = "Presidente. Trouxe a Yukino――\ndigo, a prisioneira número 5020."
90100020-144 = "Pode entrar, por favor."
90100020-145 = "(……Uma voz que não me é familiar)"
90100020-146 = "(Algo está errado…… não parece\ncoisa da Presidente……?)"
90100020-147 = "(Que voz tinha a Presidente\ndo Conselho……?)"
90100020-148 = "(Não consigo…… lembrar da aparência dela)"
90100020-154 = "Gabinete da Presidente do Conselho Estudantil Geral"
90100020-157 = "Há quanto tempo, capitã Yukino."
90100020-161 = "Você é――"
90100020-169 = "――Presidente do Conselho Estudantil Geral."
90100020-170 = "Quanto tempo. A sua imagem…… mudou, não?"
90100020-171 = "Tenho ouvido muito isso ultimamente.\nEu mesma nem noto."
90100020-172 = "Deve ser um sinal de quanto tempo\ndeixei meu posto vazio."
90100020-177 = "Não vamos conversar em pé. Sente-se."
90100020-179 = "……Já recebi os relatórios sobre tudo\no que houve na minha ausência."
90100020-180 = "A Chefe de Defesa, Kaya, usou vocês\nnuma tentativa de golpe, não foi?"
90100020-181 = "………Sim."
90100020-182 = "Não se preocupe. Não pretendo culpar você."
90100020-183 = "Pelo contrário, eu é que…… devo\ndesculpas a todos."
90100020-184 = "Tantos incidentes, tanta confusão\nespalhada.#nE tudo porque eu desapareci."
90100020-185 = "Se, em meio a isso, alguém fez a escolha\nerrada―― como eu poderia cobrar\nresponsabilidade?"
90100020-187 = "……Foi falha minha."
90100020-189 = "Não…… me perdoe."
90100020-190 = "Especialmente…… com os alunos da Academia\nEspecial SRT, sinto que a dívida\né ainda maior."
90100020-191 = "Houve disputa pelo controle da SRT……\ne ela terminou dissolvida."
90100020-192 = "A começar pelo Esquadrão RABBIT――"
90100020-193 = "fiz as calouras do primeiro ano passarem\npor experiências duras demais."
90100020-194 = "Assim que os assuntos públicos se\nacalmarem, pretendo restaurar a Academia\nEspecial SRT.#nFarei o possível para que as operadoras\nrecebam a melhor educação."
90100020-198 = "Se fizer isso por nós, não tenho\nmais nada a desejar."
90100020-199 = "……Contudo."
90100020-200 = "Isso não significa que o passado\nde vocês será apagado."
90100020-201 = "Derrubaram a infraestrutura pelo golpe,\natacaram o Conselho Estudantil Geral――#ne tentaram um atentado a bomba no centro.\nSão crimes graves."
90100020-202 = "Claro, eu posso conceder o indulto. Mas isso\nsó acumularia a insatisfação dos cidadãos,\ne recuperar a confiança seria impossível."
90100020-203 = "É um caso que precisa avançar com cautela.#n……Até para que a SRT retome o seu\nverdadeiro papel. Peço que compreenda."
90100020-204 = "Desde o momento do crime, eu já estava\npronta para aceitar qualquer punição."
90100020-205 = "Porém…… as outras integrantes apenas\nseguiram as minhas ordens."
90100020-206 = "Não me importa o que aconteça comigo……\nmas, por favor, poderia dar alguma\nconsideração às outras?"
90100020-207 = "Tentando carregar toda a responsabilidade\nsozinha.#nEsse é o seu pior hábito."
90100020-208 = "Todos os fenômenos do mundo estão\nentrelaçados de forma complexa.#nNão se pode pôr toda a responsabilidade\nsobre uma única pessoa."
90100020-209 = "A situação atual é…… digamos.#nO resultado de cada um ter carregado um\npouco da responsabilidade e cumprido\nseu papel."
90100020-210 = "……E, claro, eu não sou exceção."
90100020-211 = "Por isso, o preço deste desastre também\ndeve ser pago por todos."
90100020-216 = "……Uma vez, numa operação, falhei na\nabordagem inicial de um suspeito#ne acabei envolvendo civis."
90100020-217 = "Quem aquele cidadão devia culpar era eu,\nque comandava a operação em campo……"
90100020-218 = "Mas a Presidente se pôs na linha de frente\nde todas as críticas, e nós nunca fomos\nresponsabilizadas."
90100020-219 = "Se nenhum problema deste mundo pode ser\ncarregado por uma pessoa só……#npor que a Presidente carregou sozinha, todo\nesse tempo, o poder e a responsabilidade\nda SRT?"
90100020-220 = "Naquela época…… porque eu tinha\nrecursos de sobra."
90100020-221 = "Eu tinha folga, posição e responsabilidade\nsuficientes para cobrir as falhas de vocês."
90100020-222 = "Alguém que assumiu uma missão a meu pedido\ncai em apuros.#nTendo plenas condições de ajudar, eu só\nlhe empurro a responsabilidade?#nIsso não seria atitude de uma\nlíder correta."
90100020-223 = "Então eu também――"
90100020-224 = "Não creio que você consiga isso agora.#nO cansaço é visível. Carregar os próprios\ncrimes já parece tomar todas as suas forças."
90100020-225 = "Quando você recuperar o fôlego para\ncarregar também os crimes dos outros,\nnão será tarde."
90100020-226 = "Até lá, atenda a esse meu capricho,\nYukino. Por favor."
90100020-230 = "……Compreendo os seus sentimentos."
90100020-231 = "Mas ficar trancada na Agência Correcional\nrefletindo não vai restaurar a honra da SRT."
90100020-232 = "Se puder nos dar a chance de pagar nossos\ncrimes, aceito qualquer missão.#nSuas ordens."
90100020-237 = "……O indulto pode ser difícil, mas oferecer\numa chance de servir aos cidadãos\ndeve ser aceitável."
90100020-241 = "……Você já ouviu a palavra \"Lore\"?"
90100020-242 = "Histórias duvidosas, sem fundamento nem\norigem, passadas de boca em boca.#nFolclore…… lendas urbanas,\nhistórias de terror."
90100020-243 = "Difíceis de acreditar e, no entanto,\nconvincentes o bastante para serem\nrecontadas――#ne assim seguirem vivas."
90100020-245 = "Um trem que parte rumo a uma estação de\noutro mundo, que não existe na realidade――"
90100020-247 = "Uma rádio que, à meia-noite, transmite uma\nvoz que amaldiçoa quem a escuta――"
90100020-249 = "Um elevador que, usado numa sequência certa\nde andares, não te deixa voltar\nnunca mais――"
90100020-251 = "……Você não se espanta.#nGosta de histórias de terror, por acaso?"
90100020-252 = "Envolver-me emocionalmente com relatos\nnão confirmados é ineficiente."
90100020-253 = "Pois é. O Lore, em essência, nunca mereceu\nser levado a sério――#nnão passava de fruto de imaginação,\nsem importância alguma."
90100020-254 = "Mas, ultimamente, os relatos de quem\nrealmente os encontrou vêm aumentando."
90100020-255 = "E não param nos relatos――\njá começam a surgir danos reais."
90100020-256 = "Danos reais…… causados pelo Lore?"
90100020-257 = "Na maioria dos casos, os alunos que alegam\nter visto um Lore perdem a voz#nou desaparecem antes de qualquer apuração."
90100020-258 = "Atentados e desaparecimentos seriam caso\npara a Escola de Polícia Valkyrie,#nmas, desta vez, nem a real situação\nconseguimos apurar."
90100020-259 = "Para conter a propagação do Lore, o comitê\nadministrativo decidiu transferir a\ninvestigação a uma organização superior."
90100020-260 = "Se a situação foge das forças de segurança\ncomuns e exige uma investigação rápida\ne semiextralegal――"
90100020-265 = "a escolhida foi a SRT. É isso?"
90100020-266 = "Exatamente."
90100020-267 = "Mas isto é apenas uma proposta da\nPresidente do Conselho.#nNão é ordem, nem instrução."
90100020-268 = "Não sabemos nem quem é o inimigo. No pior\ndos casos, vocês podem ter o mesmo fim\ndas vítimas."
90100020-275 = "Se o Lore encontrar você antes que você\nencontre o Lore──#nvocê mesma pode acabar se tornando um."
90100020-276 = "Ainda assim, aceita esta operação?"
90100020-278 = "Sim."
90100020-279 = "Nós temos crimes a expiar."
90100020-284 = "Muito bem. Compartilharei as informações\nque reunimos."
90100020-285 = "Descubra a verdadeira natureza do Lore e\nvarra essa ameaça de Kivotos."
90100020-286 = "……E mais uma coisa.#nEste é um pedido meu, pessoal――\nnão da Presidente do Conselho."
90100020-290 = "Por favor―― voltem em segurança."
90100020-291 = "Não se preocupe."
90100020-292 = "Bater em retirada de uma luta sem chance\nde vitória também é trabalho\nde forças especiais."
90100020-294 = "Uma pergunta antes da operação, se me permite."
90100020-295 = "Sim, pois não."
90100020-296 = "Mesmo sendo uma operação extraoficial,\nprecisaremos de contato externo para\ngarantir base e munição. E de uma\norganização de apoio."
90100020-297 = "Antes, a própria Presidente cuidava disso.#nMas a situação atual não deve permitir."
90100020-298 = "Correto. Se eu apoiar o Esquadrão FOX\ndiretamente,#npode parecer que a Presidente reconheceu\npublicamente a volta da Academia SRT."
90100020-299 = "Mas, por sorte, existe uma organização\nà altura desse papel."
90100020-300 = "Autoridade e orçamento comparáveis aos do\nConselho, e uma capacidade investigativa\nque todos no Conselho reconhecem."
90100020-301 = "――A Schale."
90100020-306 = "……Será que ouvi errado?"
90100020-308 = "Próximo Episódio: O Esquadrão Só Marcha de Barriga Cheia"