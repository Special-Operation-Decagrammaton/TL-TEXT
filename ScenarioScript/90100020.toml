[translation]
90100020-1 = "Episódio 2: Entre o Übermensch e as Raposas"
90100020-6 = "Tá tão quente..."
90100020-7 = "Por que esse calor infernal do nada? O verão ainda tá longe no calendário..."
90100020-8 = "Sério... esse pátio da prisão é o pior.#nSem sombra nenhuma, e esses muros de concreto bloqueiam a brisa toda..."
90100020-9 = "Os guardas acham que prisioneira não precisa de proteção solar, é?"
90100020-14 = "Talvez a arquitetura seja nua assim pra não gerar nenhum ponto cego pros guardas espiarem a gente~?"
90100020-15 = "Afinal, se tivesse cantinhos pra se esconder, fugir seria muito fácil, né?"
90100020-16 = "Pior que é verdade. Os relatórios dizem que a Wakamo recebia contrabando de alicates e serras debaixo da sombra das árvores."
90100020-17 = "Aquela terrorista maluca... nunca fui com a cara dela desde o começo."
90100020-18 = "Eu devia ter amarrado ela e estrangulado a coleira tão apertado, que ela nem ia ter tesão de tentar fugir!"
90100020-23 = "Calma aí e destrava o gatilho, Kurumi-chan. O manual militar pune uso desproporcional da força, lembra?"
90100020-24 = "O meu cérebro sabe disso... mas lembrar daquele passado nojento, e processar que agora estamos presas aqui na Correccional... me deixa cheia de raiva."
90100020-25 = "……Mudando de assunto, você não tá com calor, Niko?#nA gente tá correndo juntas na mesma rota e você não suou uma gota."
90100020-26 = "O meu corpo lida bem com o calor. O clima de hoje tá até fresquinho pra mim."
90100020-27 = "Que bizarro... A gente passou pelo mesmo treinamento de aclimatação térmica no deserto da base...#nComo as glândulas dela têm essa resistência tão absurda...?"
90100020-28 = "Será que é alguma genética diferente do corpo dela?"
90100020-29 = "……Não será porque *aquilo* que você tem é menor que o meu, Kurumi~?"
90100020-30 = "M-Menor?! Tá apontando o dedo pra onde, sua pervertida?!"
90100020-31 = "Das orelhas, boba. Das orelhas de raposa.#n……Aha~, pra onde a sua mente safada foi parar?"
90100020-32 = "Sabe como a biologia diz que as extremidades do corpo são hiper sensíveis ao calor, né?"
90100020-33 = "Como as minhas orelhas são grandonas, acho que elas exalam e dissipam o calor do sangue bem mais rápido."
90100020-34 = "Faz sentido... no verão, a ponta das minhas orelhas são as primeiras a pegar fogo de febre."
90100020-35 = "Em compensação, quando a neve cai no inverno, elas congelam e doem rapidinho."
90100020-36 = "É mesmo...? Bom, deve ter essa diferença aerodinâmica na anatomia, né."
90100020-37 = "Haaah... Mesmo assim, eu prefiro o inverno.#nNo verão, o suor escorre e fica todo abafado debaixo dos meus peitos e da farda... é uma tortura asfixiante..."
90100020-42 = "………………Tsc."
90100020-43 = "V-VOCÊ ACABOU DE ESTALAR A LÍNGUA PRA MIM DE INVEJA?!"
90100020-44 = "……Fiz nada não?"
90100020-45 = "Mentirosa! O meu radar tático captou um 'tsc' de puro recalque muito bem!"
90100020-50 = "……A Yukino não vai parar de correr tão cedo."
90100020-51 = "Oe, Yukinoooo! Vai torrar o joelho até que horas? A sirene do recreio já vai apitar!"
90100020-58 = "……Mais uma volta no perímetro e eu encerro a marcha."
90100020-63 = "Desde que os nossos crachás caíram na Correccional, a Yukino só treina e se castiga sem parar.#nEla mal abre a boca pra soltar um rádio pra gente."
90100020-64 = "Deve ter muitos fantasmas que ela quer afogar na própria cabeça no silêncio, né?"
90100020-72 = "Ora... os demônios pesados na cama dela devem ser uma montanha."
90100020-73 = "A dor é inegável, sim... mas..."
90100020-74 = "Mesmo assim, ela não devia punir os próprios ossos em silêncio desse jeito..."
90100020-79 = "（Acomodar o meu corpo e gozar de descanso nos beliches do Departamento Correcional não vai estancar o sangramento do meu Pecado.）"
90100020-80 = "（Para forjar a casca de um adulto responsável que carrega as correntes... eu preciso engolir livros, perfurar os ossos... e aprender a delegar fé nas pessoas.）"
90100020-81 = "（Entretanto...）"
90100020-83 = "«A CULPA DO SANGUE É NAS COSTAS DE VOCÊS!!»"
90100020-84 = "«Missões em prol da paz pública?! Balela militar nojenta!#nA granada e a fumaça de vocês engoliram meu lucro e meus bens!»"
90100020-87 = "«Por que essa desgraça me engoliu?! Eu pago imposto civil, cacete! ME SALVA!»"
90100020-88 = "«……O descaso cego teria sido menos cruel que a maldita intervenção heroica de vocês.»"
90100020-91 = "«A sua patente é de soldado inútil!#nChama os engravatados do andar de cima!! Traga quem pode pagar essa conta!»"
90100020-93 = "（No olho daquele furacão... Para onde a minha bússola deveria ter apontado? Qual era o trajeto da salvação? A charada continua sem cura e ecoa no meu peito até hoje.）"
90100020-94 = "（O cronômetro do tempo, como dita a doutrina do Sensei, iria suturar os rasgos que fiz no asfalto naturalmente?）"
90100020-95 = "（Ou será que esse abismo cívico era uma trava sagrada e exclusiva que só a máquina do Übermensch, a Presidente Geral, tinha permissão divina para esmagar e curar...?）"
90100020-96 = "……Cinco, cinco zero vinte..."
90100020-97 = "C-Corrigindo... Detenta número 5020...!"
90100020-99 = "Opa? É a carcerária-chefe da Correção. O crachá de quem ela tá caçando no pátio?"
90100020-100 = "Pelo RG, é o código penal da Yukino."
90100020-101 = "Yukinooo, o interfone oficial tá chamando você!"
90100020-105 = "……Minhas reverências por atrapalhar sua marcha, Yukino-san.#nPeço perdão por me dirigir ao seu posto atirando rótulos carcerários frios em você..."
90100020-106 = "……A escusa não se faz necessária. A hiperfocalização nos treinos sabotou a minha telemetria auditiva e atrasei o retorno."
90100020-107 = "Qual ofício o seu crachá traz a mim?"
90100020-108 = "O interfone acionou um protocolo de Visita Oficial Externa.#nSolicito e encareço que a sua farda se prepare para trânsito logístico..."
90100020-109 = "A sirene de visitação da grade diurna já apitou e trancou os horários, não?"
90100020-110 = "Sim... contudo, a credencial do visitante exige e exala uma autoridade blindada."
90100020-114 = "――A Presidente Geral do Conselho exige interrogatório com a sua pessoa."
90100020-115 = "A Presidente Geral...?!"
90100020-120 = "……Peço clemência por forçar o replay dessa fita burocrática pela milésima vez, sargento."
90100020-121 = "Os relatórios cravam com precisão matemática que a Presidente Geral, desaparecida nos escombros, realmente reassumiu o poder da torre central?"
90100020-122 = "Positivo... A bomba surpresa pegou as vias federais de calças curtas. A logística policial na Valkyrie tem operado num apocalipse febril pra dar conta de tudo."
90100020-123 = "Contudo, a febre cedeu. A doutrina e a caneta suprema da Presidente desataram e trituraram o engarrafamento burocrático num piscar de olhos."
90100020-124 = "Se a marcha dos dados continuar limpa, a asfixia das celas na Correcional também vai amolecer rápido."
90100020-128 = "（Então, o mandamento que nós deveríamos ter cravado no osso e jurado na bandeira... era abaixar a cabeça, manter a SRT quieta... e orar com fé cega pelo retorno do seu reinado...?）"
90100020-129 = "Embora a injeção monárquica dela não ressuscite a moral morta da Valkyrie no asfalto milagrosamente num dia só. Com o esgoto bélico que a Chefe de Defesa varreu pra debaixo do tapete――"
90100020-133 = "A-Ah, me puna! A metralhadora de fofoca atropelou a empatia tática e tocou em feridas abertas de novo."
90100020-134 = "Negativo. Sem danos colaterais ao escudo."
90100020-143 = "Vossa Excelência. Escoltamos o alvo Yukino―― digo, a Detenta Número 5020."
90100020-144 = "Cruze a barricada, por favor."
90100020-145 = "（……As cordas vocais soam alienígenas aos meus arquivos auditivos.）"
90100020-146 = "（Há uma discrepância de aura... O eco vocal sequer flerta com o magnetismo frio que eu conhecia da Presidente...）"
90100020-147 = "（Como a garganta da Antiga Liderança moldava o ar, mesmo...?）"
90100020-148 = "（A minha memória HD... falha miseravelmente em esboçar o rosto da mulher.）"
90100020-154 = "Escritório Presidencial do Conselho Estudantil Geral"
90100020-157 = "A marcha do tempo foi longa até os nossos caminhos se cruzarem de novo, Capitã Yukino."
90100020-161 = "Qual é o seu RG e――"
90100020-169 = "――Vossa Graça, Presidente."
90100020-170 = "Presto meus juramentos póstumos perante o seu retorno. Sob a minha lente de análise, a estética de Vossa Graça sofreu mutações drásticas."
90100020-171 = "O boato de que eu troquei de carcaça tem rolado solto em reuniões. Confesso que os espelhos não exalam a mesma tese pros meus olhos."
90100020-172 = "Talvez a letargia extrema e o vácuo de poder que deixei no meu assento alimentem essa amnésia visual coletiva."
90100020-177 = "Marchar discursos burocráticos sobre as botas agride a espinha.#nApoie o fardo militar e ocupe a poltrona, por favor."
90100020-179 = "……As matrizes analíticas de espionagem já sugaram e preencheram minha mesa com todos os papéis sobre o inferno letal que cruzou Kivotos enquanto eu sangrava nas sombras."
90100020-180 = "Os inquéritos clamam que a Chefe Kaya empunhou você e as suas cadetes paramilitares como infantaria suja para estourar um Golpe de Estado, confere?"
90100020-181 = "………Afirmativo e cravado no osso."
90100020-182 = "Abaixe os punhos e desarme o tático. O machado das leis não decepará a sua cabeça militar aqui e hoje."
90100020-183 = "Pelo contrário... A minha patente é que deve rastejar no tapete e implorar escusas pelo chumbo que a farda de vocês teve que mastigar."
90100020-184 = "Avenidas sangraram. Gangues explodiram. E a raiz causadora e epicentro de todo esse holocausto cívico se apoia no meu desaparecimento."
90100020-185 = "No vácuo de ordem apocalíptica, se soldados e civis afundaram os dedos em gatilhos e ideologias erradas caçando a salvação―― em qual tribunal covarde eu teria moral pra fuzilar as suas asas com o rótulo da culpa?"
90100020-187 = "……Eu manchei e joguei na lama o lençol sagrado de Kivotos."
90100020-189 = "Negativo... A minha patente não aceita expurgo das suas costas."
90100020-190 = "A minha falha foi imperdoável. E destilo a dor mais aguda, em especial, às matrizes do Exército SRT."
90100020-191 = "As carnificinas políticas pela escritura do seu quartel explodiram... e as engrenagens burocráticas massacraram e dissolveram a Academia e o lar sagrado de vocês na poeira."
90100020-192 = "A começar pelos filhotes do Pelotão RABBIT――"
90100020-193 = "Eu obriguei calouras de artilharia cruas, recém-desmamadas das carteiras, a mergulharem num teatro fúnebre impiedoso nas sarjetas."
90100020-194 = "As aduanas legislativas ainda têm freios pesados, mas... assim que a nuvem de chumbo cívico baixar, o resgate monumental e o erguimento dos muros da Academia Especial SRT se iniciará sob o meu selo cego.#nDrenarei os estoques de orçamentos para que o seu pelotão e cadetes possam sugar e abraçar a suprema instrução tática outra vez."
90100020-198 = "Se o seu sangue nobre forja e assina tal restituição sagrada... a minha alma silencia as queixas."
90100020-199 = "……Porém, não baixe a mira ainda."
90100020-200 = "Essa alforria verbal milagrosa não apaga as cápsulas fúnebres gastas ou os terrores que o FOX lançou no centro urbano."
90100020-201 = "O esquadrão assassinou usinas da malha elétrica, cravou asfalto nas barreiras do Conselho――#ne atou explosivos termobáricos nas artérias do centro civil cego. O pecado cármico disso estilhaça as balanças."
90100020-202 = "Pressionar as engrenagens e decretar uma Anistia Limpa Presidencial é fácil e irrestrito para os meus dedos. Mas apagar cinzas atômicas só com canetada enfia gasolina nos olhos do cidadão, e as confianças do Estado iriam decompor pra valer."
90100020-203 = "O resgate e purificação militar dessa treva necessita pisar nos cacos da política de vidro e chumbo.#n……Para que as raposas da SRT limpem a lama do focinho e não recrudesçam nas pautas do povo como uma milícia de mercenários sujos. Cure suas correntes internas e abaixe a cabeça, engula as cartilhas."
90100020-204 = "Abafo qualquer teses contrárias. Ao abraçar o dedo podre da rebelião anti-estado, as armaduras da minha alma já rezavam para o pelotão de fuzilamento ser a guilhotina final do meu roteiro carcerário."
90100020-205 = "O único ressalvo da balança... dorme sobre as omoplatas das minhas subordinadas do esquadrão. Elas operaram e rastejaram a guerra estritamente sob as margens da minha coleira de mando intocável."
90100020-206 = "Bote minha carcaça civil de chumbo no corredor da morte para valer... Mas atiro minha honra no lixo pra suplicar acordos lenientes e imunidade plena, ou o purgatório mínimo de prisão de baixa pena para as outras garotas."
90100020-207 = "Arrancar os fardos atômicos e suicidar-se puxando sozinhas as correntes cívicas alheias pro caixão.#nO velho e putrefato complexo mártir anômalo das suas patentes ferve na alma de novo."
90100020-208 = "O teatro cinético da sociedade global é um tecido espinhoso costurado com bilhões de engrenagens fúteis orgânicas.#nCarimbar e estrangular o holocausto cívico absoluto da nação em uma escápula solitária é matemática ridícula e impraticável."
90100020-209 = "A guerra cívica dos últimos tempos...#nAbalemos a tese. É o coquetel profano concebido pela cumplicidade minuciosa e cega de todo civil injetando lixo na poça das desgraças."
90100020-210 = "……Obviamente, os braços desta Presidente englobam isso e acatam o crime passivo também."
90100020-211 = "Isso forja a regra: as navalhadas sanguinárias desse apocalipse e os fundos monetários e penais deverão ser dilacerados e drenados pelas feridas coletivas e esforços de toda a máquina civil."
90100020-216 = "……A memória desenterra as valas de uma caçada em meu currículo. Nas vielas do extermínio... as garras atiraram no escuro, tática falhou e as cápsulas do meu pelotão defletiram contra plebeus inocentes e civis caíram em fogo cruzado."
90100020-217 = "O crachá que deveria sofrer o esquartejamento em praça pública pela escória cega clamando justiça... era eu mesma, que empunhava o rádio da operação."
90100020-218 = "Mas, sob intervenção celestial da Presidente... O escudo tático dela ergueu a burocracia e afogou as pedradas mortais e acusações. A caneta dela soterrou a guilhotina e nós fomos purificadas de toda retribuição letal nas escusas da lei."
90100020-219 = "Se a filosofia e o mundo orgânico ditam a regra fria que a espinha humana miserável sequer devia suportar carregar engrenagens do holocausto global sozinha...#nCom que alicerce, física ou milagres as escápulas da Presidente sustentaram as pontes apocalípticas em combustão do batalhão letal SRT nas próprias costas cegas sozinhas, como se cospisse nas lógicas dos deuses todo esse tempo?"
90100020-220 = "O espelho cronológico dita a brecha irrefutável.#nNaquela estação estelar morta... Eu vestia reservas táticas nas minhas mangas para segurar o chumbo."
90100020-221 = "No império passado, os meus arquivos federais exalavam poder monárquico onipotente, escudo parlamentar gordo e uma estufa bélica blindada para estancar as suas hemorragias letais."
90100020-222 = "Uma lâmina enviada sob ofício direto do meu crachá para os asfaltos escuros... mergulha no inferno da guerra encurralada...#nE a mesa burocrática, ostentando as chaves pro regresso dela da zona do inferno, foge engasgada de covardia abandonando a farda na lama do algoz?#nO papel julga de imediato que essa é a liturgia cívica medíocre dos fracassados, e não conduta ditatorial e real do Estado."
90100020-223 = "Se o compasso aponta o fuzil para esse dever cármico marcial de líderes com as raposas que matam, eu assino a--"
90100020-224 = "Os laboratórios e as suas artérias atestam a letargia deprimente atual. A fogueira dos seus músculos tá frita pra pagar fiança alheia.#nA decomposição pela fadiga escoa nas lentes e bochechas... Sobreviver respirando as penas e os seus crimes penitenciários pessoais suga todo o fluxo da sua matriz militar diária."
90100020-225 = "Nas órbitas de amanhã cósmico distante, quando as cartilagens endurecerem e o escudo mental curar o lixo o suficiente para absorver o sangue das correntes dos outros soldados, você retoma o discurso e nós carimbaremos os boletos na bala."
90100020-226 = "Até o carimbo do tempo bater imunidade bélica na sua casca... Cale-se, devore seus espasmos altruístas e dobre-se frente à minha prepotência e capricho solitário cego, Yukino."
90100020-230 = "……As diretrizes invadiram a trincheira e perfuraram a carne, Presidente."
90100020-231 = "Contudo... a podridão solitária nas selas de concreto sem lutar só cimenta melancolias cegas. O choro impotente não escava sepulturas para desenterrar ou lavar os emblemas táticos sujos da Força SRT."
90100020-232 = "Se as portas da morte se atrirem no mundo lá fora para podermos vomitar punição sangrenta no asfalto paramilitar, atirando no cego para abater dívidas de sangue criminoso... Eu assino tudo, eu não me recuso a chafurdar e matar. Puxe e atire os alvos."
90100020-237 = "……Se anular os pecados por decreto arde no rosto civil, enfiar o pescoço da sua matilha nos serviços podres e inomináveis da metrópole em caridade invisível ganha margem de legalidade tática federal."
90100020-241 = "……O léxico rural e profano de 'Lores' já manchou e tocou os tímpanos das orelhas da sua leitura?"
90100020-242 = "O rádio fúnebre podre, sussurros nas Vielas, fofoca atômica desprovida de atestados lógicos e arquivos factuais nas delegacias cegas... Lendas Urbanas enraizadas, fábulas assombradas obscenas."
90100020-243 = "A lâmina do raciocínio empurra pra lixeira como delírio, mas a roupagem macabra fascina, contamina a biologia da plebe civil inculta que reproduz na saliva... E o parasita invisível deforma a realidade e ganha teto cívico contagiando a roda."
90100020-245 = "Trilhos fantasmas fúnebres de trens macabros sem matriz na arquitetura física... rodando para a Zona do Purgatório Morto de Não-Retorno――"
90100020-247 = "Canais de rádio letal sem base no dial da madrugada que cortam e evaporam os cérebros inocentes cegos em maldição irreversível ao apertarem o play do alto-falante――"
90100020-249 = "Cabines atômicas assombradas de Elevadores que operam rotinas cabalísticas de botões da subida morta para atirar alvos direto na vala da não-existência do inferno lá embaixo, engolindo civis de sangue e carne da cidade――"
90100020-251 = "……O gráfico do coração continuou morno. A sua bússola exala indiferença e nenhum pânico perante o folclore macabro.#nAfinidade cega particular com a pauta... O seu HD cerebral colecionava Creepypastas nojentas do gênero de biblioteca pra dormir...?"
90100020-252 = "Teses rasas mortas desprovidas de laudos do ML ou relatórios de legistas peritos da Valkyrie repudiam espasmos viscerais empáticos na emoção."
90100020-253 = "Inquestionável. A anatomia nativa das tais 'Lores' fedia a churrasco fútil ou ficção amadora irracional... a escória que o coturno bélico não perdem tempo sujando de tiro."
90100020-254 = "Contudo... os radares cívicos atestam o rompimento do teto de histeria morta neste último mês.#nArquivos maciços despencam relatando [ruby=・]a[/ruby][ruby=・]b[/ruby][ruby=・]o[/ruby][ruby=・]r[/ruby][ruby=・]d[/ruby][ruby=・]a[/ruby][ruby=・]g[/ruby][ruby=・]e[/ruby][ruby=・]n[/ruby][ruby=・]s[/ruby] literais, corporais, palpáveis e reais no asfalto letal com o lixo e escória mística."
90100020-255 = "E os laudos vão além da fumaça do pânico em roda de fofoca―― Eles já sangram e esfolam as baixas corporais e físicas dos civis em leitos hospitalares de coma."
90100020-256 = "Escória macabra forjando feridas reais bélicas no orgânico...? A matriz da espionagem e a cadeira presidencial jogam as assinaturas desse morticínio no colo cego desse... folclore?"
90100020-257 = "Testemunhas que colidem as córneas nas trincheiras e encontram os monstros despencam na poça muda antes de narrar a cena aos peritos... As cordas vocais entram em metástase da paralisia letal instantânea... ou sequestros e sumiços atômicos nas brumas devoram os corpos da Terra sem resquício no GPS."
90100020-258 = "Se o escopo fosse metralhadoras termobáricas, pólvora, drogas ou gangues milicianas cegas operando cartéis comuns orgânicos... As tropas brutais ordinárias da Valkyrie bateriam tática de rua e varreriam o chumbo cego...#nMas contra a neblina invisível da matriz paranormal do mistério cego hoje... nós marchamos sem radar e sem bússola cívica pro front."
90100020-259 = "Para cimentar a limpeza letal contra a propagação desse vírus folclórico macabro assassino, as cúpulas federais cancelaram mandados burocráticos. A espionagem sobe de patente para extermínio cego letal via sindicato cívico obscuro alienígena."
90100020-260 = "E se a burocracia dos policiais murcha de covardia pra matar no escuro com eficiência extra-leis absurda, flexível e mortal nos becos com tática cega contra demônios――"
90100020-265 = "Os canhões bélicos giram a mira na nossa direção: o esgoto paramilitar sujo de ossos da SRT foragida assume a placa."
90100020-266 = "O prêmio da dedução genial."
90100020-267 = "Todavia, trave a paranoia das algemas monárquicas cegas. Essa folha não traz corrente presidencial de Ordem Suprema.#nAs entrelinhas assinam 'Proposta' contratual fantasma cega."
90100020-268 = "O RG e rosto carnal da farsa assassina é vácuo místico.#nAs margens de falência letal clamam que os soldados do FOXSquad fatiados vão despencar no asfalto com cordas vocais mutiladas, nos caixões idênticos enfileirados que as vítimas presas abraçaram ontem mortas."
90100020-275 = "E se o demônio macabro cruzar faro e predação cega primeiro contra a sua jugular no beco da morte──#nA biologia reza a patifaria. Você vai sucumbir na fumaça da abominação mística... e o corpo e alma cadavéricos de Yukino será distorcido, forjando na praça, ela mesma e com as próprias mãos cegas... a próxima Lenda 'Lore' mística cega amaldiçoando civis nos anos da eternidade no inferno."
90100020-276 = "Diante do tabuleiro encharcado de purgatório apocalíptico... A sua digital suja cimenta o acordo da fuzilaria?"
90100020-278 = "Afirmativo."
