[translation]
90100020-1 = "Episode 2;Between Superhuman and Fox"
90100020-6 = "It's so hot..."
90100020-7 = "Why is it this hot? Summer is still a long way off, right?"
90100020-8 = "I mean... this yard is the worst. There's no shade at all, and the walls block all the breeze..."
90100020-9 = "Do they think prisoners don't need shade?"
90100020-14 = "Maybe they're just making sure there are no blind spots for the guards?"
90100020-15 = "If there were places to hide, it'd be easier to break out, right?"
90100020-16 = "Actually, I heard Wakamo used to receive jailbreak tools in the shade of a tree."
90100020-17 = "That girl... I never liked her from the start."
90100020-18 = "I should've cracked down on her so hard she wouldn't even think about escaping!"
90100020-23 = "Calm down, Kurumi. Excessive force is prohibited."
90100020-24 = "I know that, but... thinking about how I'm in the Correctional Bureau now just makes me think of the past and gets me all irritated."
90100020-25 = "...Anyway, aren't you hot, Niko? We're running together, but you're not sweating at all."
90100020-26 = "I'm fine with the heat. At today's temperature, it actually feels kind of cool."
90100020-27 = "That's weird... We went through the same heat acclimatization training... Why is there such a difference?"
90100020-28 = "Is it just a difference in our constitutions?"
90100020-29 = "...Maybe it's because Kurumi's are smaller than Niko's?"
90100020-30 = "Smaller? What's smaller!?"
90100020-31 = "Your ears, your ears. ...Haha, what were you imagining?"
90100020-32 = "You know, they say the extremities of the body are sensitive to temperature changes, right?"
90100020-33 = "Niko's ears are big, so I thought maybe that's why she can dissipate heat more easily."
90100020-34 = "That's true... In the summer, my ears are the first things to get hot."
90100020-35 = "On the flip side, they get cold and hurt immediately in the winter, though."
90100020-36 = "Is that so...? Well, I guess there are differences like that."
90100020-37 = "Sigh... But I think I prefer winter. Summer is tough because it gets all stuffy under my chest..."
90100020-42 = "………………Tch."
90100020-43 = "You just clicked your tongue, didn't you!"
90100020-44 = "...No, I didn't."
90100020-45 = "You're lying! I heard a 'tch'!"
90100020-50 = "...Yukino is still running."
90100020-51 = "Yukino, how long are you planning on going? Exercise time is almost over."
90100020-58 = "...I'll head back after one more lap."
90100020-63 = "Yukino, you've been doing nothing but training since we got to the Correctional Bureau. You don't really talk to us much, either."
90100020-64 = "Is there something you're thinking about on your own?"
90100020-72 = "Well... I'm sure there's plenty."
90100020-73 = "I suppose that's true, but..."
90100020-74 = "Still, I wish you wouldn't push yourself so hard..."
90100020-79 = "(Just because I've been living idly in the Correctional Bureau doesn't mean my sins are washed away.)"
90100020-80 = "(To become an adult who can take responsibility, I must learn more, strive more—and trust people.)"
90100020-81 = "(But...)"
90100020-83 = "This is all your fault, isn't it!?"
90100020-84 = "An operation for the citizens? Don't make me laugh! I was a victim of that operation!"
90100020-87 = "Why am I suffering like this!? I'm a citizen too! Help me!"
90100020-88 = "...I wish you had just left me alone."
90100020-91 = "I have nothing to say to you people! Call someone higher up—someone who can actually take responsibility!"
90100020-93 = "(Back then... what should I have chosen, and how should I have acted? I still don't know the answer.)"
90100020-94 = "(As Sensei said, was it a problem that time would solve?)"
90100020-95 = "(Or was it something only the General Student Council President could solve...?)"
90100020-96 = "...5, 5020..."
90100020-97 = "Pr-Prisoner number 5020...!"
90100020-99 = "Huh? It's the Director of the Correctional Bureau. Looks like she's looking for someone."
90100020-100 = "Isn't that Yukino's number?"
90100020-101 = "Yukino, they're calling you!"
90100020-105 = "...I apologize, Yukino-san. I know you're not used to being called by your number, but please forgive me..."
90100020-106 = "...No, it was my fault for being so focused on training that my reaction was slow."
90100020-107 = "What is the nature of your business?"
90100020-108 = "There is a request for a visit. If you could please prepare to go out..."
90100020-109 = "Visiting hours for today should have already ended."
90100020-110 = "Yes... but it is a special visitor."
90100020-114 = "—The General Student Council President is calling for you."
90100020-115 = "The General Student Council President...?"
90100020-120 = "...I apologize for asking the same thing over and over."
90100020-121 = "Has the General Student Council President, who was missing, truly returned?"
90100020-122 = "Yes... It was so sudden that Valkyrie was in a state of chaos for a while."
90100020-123 = "But things have finally settled down. Besides, thanks to the President, the backlog of work has been cleared up quite a bit."
90100020-124 = "At this rate, I think we can gradually improve the Correctional Bureau as well."
90100020-128 = "(Should we have just believed and waited for the President to return...)"
90100020-129 = "Of course, I can't say that Valkyrie has fully normalized just from this. There is also the matter of the Defense Office Chief—"
90100020-133 = "Oh, I'm sorry... That was insensitive of me."
90100020-134 = "No, it's fine."
90100020-143 = "President. I have brought Yukino—or rather, prisoner number 5020."
90100020-144 = "Please, come in."
90100020-145 = "(...That's a voice I don't recognize.)"
90100020-146 = "(Something feels off... It doesn't sound like the President, somehow...?)"
90100020-147 = "(What did the General Student Council President's voice sound like...?)"
90100020-148 = "(I can't... remember her face.)"
90100020-154 = "General Student Council President's Office"
90100020-157 = "It has been a while, Squad Leader Yukino."
90100020-161 = "You are—"
90100020-169 = "—The General Student Council President."
90100020-170 = "It has been a long time. You seem to have changed your impression."
90100020-171 = "I've been told that often lately. I'm not really aware of it myself."
90100020-172 = "I suppose that just goes to show how long I've been away from this seat."
90100020-177 = "We shouldn't talk standing up, please have a seat."
90100020-179 = "...I have already received reports regarding the series of events during my absence."
90100020-180 = "I heard that Defense Office Chief Kaya used you all to plot a coup d'état."
90100020-181 = ".........Yes."
90100020-182 = "Don't worry about it. I have no intention of blaming you."
90100020-183 = "If anything, I am the one who... must apologize to you all."
90100020-184 = "Various incidents occurred, and chaos must have spread. That is all because I disappeared."
90100020-185 = "If someone made the wrong choice in the midst of that—how could I possibly hold them responsible?"
90100020-187 = "...It was my failure."
90100020-189 = "No... I am sorry."
90100020-190 = "Especially... I feel truly sorry for everyone at SRT Special Academy."
90100020-191 = "Because the dispute over SRT's administrative authority led to the academy's dissolution."
90100020-192 = "Starting with RABBIT Platoon—"
90100020-193 = "I put the first-years who had just enrolled through a painful experience."
90100020-194 = "Once official duties settle down, I am planning to revive SRT Special Academy. I intend to do my utmost to ensure the students receive the best education."
90100020-198 = "If you are willing to go that far, I have nothing else to ask for."
90100020-199 = "...However."
90100020-200 = "That doesn't mean your pasts will be erased."
90100020-201 = "You shut down infrastructure for a coup, attacked the General Student Council—and attempted a bombing in the city center. Those are heavy crimes."
90100020-202 = "Of course, I could grant amnesty. But that would only cause citizen dissatisfaction to build up, and restoring trust would be impossible."
90100020-203 = "This is a matter that must be handled with caution. ...For SRT to regain its original role. Please, understand."
90100020-204 = "I was prepared to accept any punishment when I committed the crime."
90100020-205 = "However... the other squad members were merely following my orders."
90100020-206 = "I don't care what happens to me... could you please show leniency to the others?"
90100020-207 = "Trying to shoulder all the responsibility alone. That is a bad habit of yours."
90100020-208 = "All events in the world are intricately intertwined. You cannot force one person to bear all the responsibility."
90100020-209 = "This current situation is... well. It can be said to be the result of everyone taking a little responsibility and fulfilling their roles."
90100020-210 = "...Of course, I am no exception."
90100020-211 = "Therefore, we must all pay the price for this situation together."
90100020-216 = "...Previously, during an operation, I failed to respond to a suspect's initial actions and ended up involving citizens."
90100020-217 = "Even though the one that citizen should have blamed was me, the commander on the scene..."
90100020-218 = "Thanks to the President taking all the heat, our responsibility was never questioned."
90100020-219 = "If all the problems in the world cannot be shouldered by one person... why have you been shouldering the power and responsibility of SRT alone until now?"
90100020-220 = "At the time... I had the capacity to do so."
90100020-221 = "Back then, I had the capacity, the status, and the responsibility to compensate for your mistakes."
90100020-222 = "Those who went on missions at my request fell into a predicament. To have the capacity to help them but only push the responsibility onto them—that is not the image of a correct leader."
90100020-223 = "Then I, too—"
90100020-224 = "I don't think you can do that right now. Fatigue is seeping through. You look like you're barely managing just by shouldering your own sins."
90100020-225 = "It won't be too late once you have regained the capacity to shoulder the sins of others."
90100020-226 = "Until then, please, indulge this selfishness of mine, Yukino-san."
90100020-230 = "...I understand your feelings, President."
90100020-231 = "But just hiding in the Correctional Bureau and reflecting won't restore SRT's honor."
90100020-232 = "If you can give me an opportunity to atone for my sins, I will accept any mission. Give me your orders."
90100020-237 = "...Even if amnesty is difficult, I suppose it would be permissible to provide an opportunity to serve the citizens."
90100020-241 = "...Have you ever heard the word 'Lore'?"
90100020-242 = "Vague stories passed around as rumors among people, with no basis or source. Traditions... urban legends, or ghost stories."
90100020-243 = "Stories that are hard to believe, but because they are persuasive, they are passed down—and continue to live on."
90100020-245 = "A train heading to a supernatural station that doesn't exist in reality—"
90100020-247 = "A radio that plays a voice in the middle of the night that curses you just by listening to it—"
90100020-249 = "An elevator that, if you get on and off in a specific sequence, you will never return from—"
90100020-251 = "...You're not surprised. Do you actually like ghost stories?"
90100020-252 = "It is inefficient to empathize with stories whose truth is uncertain."
90100020-253 = "I see. Lore was originally something that shouldn't be taken seriously—it was nothing more than a trivial product of fantasy."
90100020-254 = "But lately, reports of people actually encountering them have been increasing."
90100020-255 = "It's not just limited to eyewitness accounts—actual harm is beginning to occur."
90100020-256 = "Actual harm... is that caused by the Lore?"
90100020-257 = "In most cases, students who claim to have encountered Lore lose their voices or go missing before they can even verify the truth."
90100020-258 = "If it were terrorism or a disappearance case, it would be Valkyrie Police School's turn, but in this instance, we haven't even been able to grasp the actual situation."
90100020-259 = "To prevent the spread of Lore, the Administrative Committee has decided that the investigation should be transferred to a higher-level organization."
90100020-260 = "If a situation arises that cannot be handled by normal security organizations, and a swift and semi-extra-legal investigation is required—"
90100020-265 = "The choice fell on SRT, is that it?"
90100020-266 = "That is correct."
90100020-267 = "However, this is merely a proposal from the General Student Council President. It is not an order, nor an instruction."
90100020-268 = "You don't even know the identity of the opponent, and in the worst case, you might follow the same path as the victims."
90100020-275 = "If the Lore finds you before you find it—there is even a possibility that you yourself will become the Lore."
90100020-276 = "Even so, will you take on this operation?"
90100020-278 = "Yes."
90100020-279 = "Because we have sins that we must atone for."
90100020-284 = "Very well. I will share the information we have gathered."
90100020-285 = "Investigate the reality of the Lore and wipe out the threat spreading through Kivotos."
90100020-286 = "...And one more thing. This is not as the General Student Council President, but a personal request from me."
90100020-290 = "Please—come back safely."
90100020-291 = "Don't worry."
90100020-292 = "Immediate withdrawal from unwinnable battles. That is also the job of a special forces unit."
90100020-294 = "One point, may I ask a question before the operation?"
90100020-295 = "Yes, go ahead."
90100020-296 = "Even though it is an unofficial operation, we need to contact the outside world to secure a base and resupply ammunition. And an organization to handle support."
90100020-297 = "Until now, the General Student Council President did that for us. However, the situation won't allow that now."
90100020-298 = "That is true. If I were to directly take on the support for FOX Platoon, it might give the impression that the General Student Council has publicly recognized the revival of SRT Special Academy."
90100020-299 = "But fortunately, there is an organization that can take on that role."
90100020-300 = "An investigative agency that possesses authority and a budget comparable to the General Student Council, and is recognized by everyone in the General Student Council."
90100020-301 = "—It is SCHALE."
90100020-306 = "...Did I hear that correctly?"
90100020-308 = "Next Episode;The Platoon Marches After Filling Their Stomachs"