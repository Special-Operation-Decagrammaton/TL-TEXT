[translation]#[Texto revisado.] Em aguardo de revisão de formatação de texto. - Filipe 13/06.
90100020-1 = "Episódio 2: Entre a Raposa e o Sobrenatural"
90100020-6 = "Caramba, tá tão quente..."
90100020-7 = "Por que esse calor infernal do nada? O verão ainda está longe no calendário..."
90100020-8 = "Fala sério... esse pátio da prisão é o pior lugar.#nSem sombra nenhuma, e esses muros de concreto bloqueiam toda a brisa..."
90100020-9 = "Os guardas acham que prisioneira não precisa de proteção solar, é?"
90100020-14 = "Talvez a arquitetura seja assim mesmo pra não criar pontos cegos pros guardas ficarem de olho na gente~?"
90100020-15 = "Porque se tivesse cantinho pra se esconder, fugir seria moleza, né?"
90100020-16 = "Pior que é verdade. Os relatórios dizem que a Wakamo recebia alicates e serras contrabandeados debaixo da sombra das árvores."
90100020-17 = "Aquela terrorista maluca... nunca fui com a cara dela desde o começo."
90100020-18 = "Eu devia ter apertado a coleira dela tão forte que ela nem teria vontade de tentar fugir!"
90100020-23 = "Acalma aí, Kurumi-chan. O manual militar proíbe uso excessivo da força, lembra?"
90100020-24 = "Eu sei disso... mas lembrar daquele passado horrível, e processar que agora estamos presas aqui na Correcional... me deixa cheia de raiva."
90100020-25 = "……Mudando de assunto, você não está com calor, Niko?#nA gente está correndo juntas na mesma rota e você não suou uma gota."
90100020-26 = "Meu corpo lida bem com o calor. O clima de hoje está até fresquinho pra mim."
90100020-27 = "Que estranho... A gente passou pelo mesmo treinamento de aclimatação térmica no deserto da base...#nComo as glândulas dela têm tanta resistência assim...?"
90100020-28 = "Será que é alguma diferença genética?"
90100020-29 = "……Não será porque \"aquilo\" que você tem é menor que o meu, Kurumi~?"
90100020-30 = "M-Menor?! Você está apontando pra onde, sua pervertida?!"
90100020-31 = "Para as orelhas, boba. Para as orelhas de raposa.#n……Ahá~, pra onde foi que a sua mente suja foi parar?"
90100020-32 = "Você sabe que as extremidades do corpo são super sensíveis ao calor, né?"
90100020-33 = "Como as minhas orelhas são bem grandes, acho que elas dissipam o calor do sangue bem mais rápido."
90100020-34 = "Faz sentido... no verão, a ponta das minhas orelhas é a primeira a esquentar."
90100020-35 = "Mas no inverno elas congelam e doem rapidinho."
90100020-36 = "É mesmo...? Bom, deve ser essa diferença de anatomia mesmo."
90100020-37 = "Haaah... mesmo assim, eu prefiro o inverno.#nNo verão, o suor escorre e fica tudo abafado debaixo do peito e do uniforme... é uma tortura sufocante..."
90100020-42 = "………………Tsc."
90100020-43 = "V-VOCÊ ACABOU DE FAZER \"TSC\" PRA MIM, DE INVEJA?!"
90100020-44 = "……Não fiz nada não."
90100020-45 = "Mentirosa! Meu radar tático captou um \"tsc\" de puro recalque!"
90100020-50 = "……A Yukino não vai parar de correr tão cedo."
90100020-51 = "Ei, Yukinooo! Vai correr até quando? A sirene do recreio já vai tocar!"
90100020-58 = "……Mais uma volta no perímetro e eu encerro."
90100020-63 = "Desde que nossos crachás foram parar na Correcional, a Yukino só treina e se castiga sem parar.#nEla mal abre a boca pra conversar com a gente."
90100020-64 = "Deve ter muitos fantasmas que ela quer afogar na própria cabeça, né?"
90100020-72 = "Ora... os demônios na cama dela devem ser uma montanha."
90100020-73 = "A dor é inevitável, sim... mas..."
90100020-74 = "Mesmo assim, ela não devia se punir tanto em silêncio desse jeito..."
90100020-79 = "（Ficar aqui descansando na Correcional não vai apagar o meu Pecado.）"
90100020-80 = "（Para me tornar uma adulta responsável que carrega o peso das coisas... eu preciso estudar, me esforçar... e aprender a confiar nas pessoas.）"
90100020-81 = "（Entretanto...）"
90100020-83 = "«TUDO É CULPA DE VOCÊS!!»"
90100020-84 = "«Missão para proteger os cidadãos?! Isso é brincadeira, né?!#nFui vítima dessa operação de vocês!»"
90100020-87 = "«Por que isso caiu em cima de mim?! Eu também pago imposto, cacete! ME AJUDA!»"
90100020-88 = "«……Teria sido melhor se vocês tivessem simplesmente me deixado em paz.»"
90100020-91 = "«Vocês não servem pra nada!#nChamem os de cima!! Alguém que possa pagar essa conta!»"
90100020-93 = "（Naquele furacão todo... para onde minha bússola deveria ter apontado? Qual era o caminho da salvação? Até hoje não sei a resposta.）"
90100020-94 = "（Será que com o tempo, como o Sensei diz, as feridas que causei iriam cicatrizar naturalmente?）"
90100020-95 = "（Ou será que esse abismo era algo que só a Presidente – aquela [ruby=Übermensch]Superior[/ruby] – tinha o poder de resolver...?）"
90100020-96 = "……Cinco, cinco zero vinte..."
90100020-97 = "C-Corrigindo... Detenta número 5020...!"
90100020-99 = "Opa? É a chefe da Correcional. Será que ela está procurando alguém?"
90100020-100 = "Pelo número, é o da Yukino."
90100020-101 = "Yukinooo, estão te chamando no interfone!"
90100020-105 = "……Desculpe atrapalhar seu treino, Yukino-san.#nPerdão por te chamar pelo número de presa..."
90100020-106 = "……Não precisa se desculpar. Eu estava tão concentrada que nem ouvi o chamado."
90100020-107 = "Qual é o assunto?"
90100020-108 = "Recebemos um pedido de visita oficial.#nPor favor, se prepare para sair..."
90100020-109 = "Mas o horário de visita já terminou, não?"
90100020-110 = "Sim... mas o visitante tem uma autorização especial."
90100020-114 = "――A Presidente do Conselho Estudantil quer falar com você."
90100020-115 = "A Presidente...?!"
90100020-120 = "……Desculpe perguntar a mesma coisa mil vezes, sargento."
90100020-121 = "É realmente verdade que a Presidente, que estava desaparecida, reassumiu o poder?"
90100020-122 = "Sim... A notícia pegou todo mundo de surpresa. A Valkyrie está correndo contra o tempo."
90100020-123 = "Mas a situação já está se normalizando. A Presidente resolveu vários problemas burocráticos em um piscar de olhos."
90100020-124 = "Se continuar assim, a situação da Correcional também deve melhorar logo."
90100020-128 = "（Então o que deveríamos ter feito... era abaixar a cabeça, manter a SRT quieta... e esperar ela voltar com fé...?）"
90100020-129 = "Claro que a volta dela não vai resolver tudo de uma vez. Ainda tem a questão da Chefe de Defesa..."
90100020-133 = "A-Ah, me desculpe! Falei besteira de novo."
90100020-134 = "Não, tudo bem."
90100020-143 = "Excelência. Trouxemos a Yukino – digo, a Detenta número 5020."
90100020-144 = "Por favor, entre."
90100020-145 = "（……A voz soa diferente do que eu me lembro.）"
90100020-146 = "（Tem algo estranho... a vibração não é a mesma que eu conhecia da Presidente...）"
90100020-147 = "（Como era a voz dela mesmo...?）"
90100020-148 = "（Meu HD de memória... não consegue lembrar o rosto dela.）"
90100020-154 = "Gabinete da Presidente do Conselho Estudantil"
90100020-157 = "Quanto tempo, Capitã Yukino."
90100020-161 = "Você é――"
90100020-169 = "――Presidente."
90100020-170 = "Meus respeitos pelo seu retorno. Pela minha análise, a sua aparência mudou bastante."
90100020-171 = "Tenho ouvido isso com frequência. Eu mesma não percebo diferença."
90100020-172 = "Talvez seja por eu ter ficado tanto tempo ausente."
90100020-177 = "Conversar em pé é cansativo. Sente-se, por favor."
90100020-179 = "……Já recebi todos os relatórios sobre o que aconteceu enquanto estive fora."
90100020-180 = "Dizem que a Chefe Kaya usou vocês para tentar dar um golpe. É verdade?"
90100020-181 = "………Sim, é verdade."
90100020-182 = "Fique tranquila. Não vou puni-la por isso hoje."
90100020-183 = "Na verdade... sou eu quem deveria me desculpar pelo que vocês passaram."
90100020-184 = "Muita coisa aconteceu, o caos se espalhou.#nE tudo por minha causa."
90100020-185 = "Se alguém tomou decisões erradas durante a minha ausência... como eu poderia culpá-los?"
90100020-187 = "……Tudo foi culpa minha."
90100020-189 = "Não... eu é que devo me desculpar."
90100020-190 = "Especialmente com a SRT... meu erro foi imperdoável."
90100020-191 = "Houve uma disputa pelo controle da SRT, e no fim... a escola foi dissolvida."
90100020-192 = "O Esquadrão RABBIT, as calouras..."
90100020-193 = "Elas passaram por situações muito difíceis por minha causa."
90100020-194 = "Assim que as coisas se acalmarem, pretendo reconstruir a SRT.#nVou fazer de tudo para que todos recebam a melhor educação novamente."
90100020-198 = "Se a Presidente fizer isso por nós, não tenho mais nada a pedir."
90100020-199 = "……Porém, não baixe a guarda ainda."
90100020-200 = "Isso não apaga os erros do passado."
90100020-201 = "Vocês pararam a infraestrutura da cidade, atacaram o Conselho――#e ainda planejaram explodir o centro da cidade. A culpa é grave."
90100020-202 = "Claro que posso dar anistia. Mas se fizer isso, a confiança dos cidadãos vai cair ainda mais."
90100020-203 = "Precisamos avançar com cuidado.#n……Para que a SRT volte ao seu papel original, vocês precisam entender isso."
90100020-204 = "Já estava disposta a aceitar qualquer punição."
90100020-205 = "Mas... as outras integrantes só seguiram minhas ordens."
90100020-206 = "Por mim, pode me condenar... mas peço que dê um tratamento mais leve para elas."
90100020-207 = "Quer carregar todo o fardo sozinha de novo.#nEsse é o seu velho e terrível hábito."
90100020-208 = "Os problemas do mundo são complicados demais para uma só pessoa resolver."
90100020-209 = "O que aconteceu... foi o resultado de muita gente fazendo a sua parte, por menor que seja."
90100020-210 = "……Inclusive eu."
90100020-211 = "Por isso, todos devem dividir a responsabilidade pelas consequências."
90100020-216 = "……Houve uma operação, no passado, em que falhamos em conter o suspeito a tempo...#nE alguns civis foram atingidos."
90100020-217 = "A pessoa que deveria ser apontada como culpada era eu, que estava no comando."
90100020-218 = "Mas a Presidente assumiu toda a responsabilidade, e nós fomos perdoados."
90100020-219 = "Se o mundo é feito de problemas que ninguém consegue carregar sozinho...#nPor que a Presidente sempre carregou o peso da SRT nas costas?"
90100020-220 = "Naquela época, eu tinha condições para isso."
90100020-221 = "Eu tinha poder, influência e responsabilidade para compensar os erros de vocês."
90100020-222 = "Se peço para alguém realizar uma missão, e essa pessoa se coloca em perigo... não posso simplesmente jogar a culpa nela. Isso não é liderança."
90100020-223 = "Então eu também――"
90100020-224 = "Você não está em condições de fazer o mesmo agora.#nEstá claramente exausta. Mal consegue lidar com os próprios problemas."
90100020-225 = "Quando você se recuperar e tiver energia para ajudar os outros, aí sim poderá falar sobre isso."
90100020-226 = "Até lá, aceite meu pedido egoísta, Yukino."
90100020-230 = "……Entendi, Presidente."
90100020-231 = "Mas ficar aqui na Correcional só pensando não vai restaurar a honra da SRT."
90100020-232 = "Se houver uma chance de pagar pelo que fizemos, aceito qualquer missão.#nEstou pronta."
90100020-237 = "……Se não posso perdoá-las facilmente, pos pelo menos oferecer uma chance de servir à sociedade."
90100020-241 = "……Você já ouviu falar em \"Lore\"?"
90100020-242 = "Aqueles rumores sem fundamento que se espalham de boca em boca...#nLendas urbanas, histórias de terror."
90100020-243 = "Difíceis de acreditar, mas ao mesmo tempo fascinantes, e que vão se perpetuando――"
90100020-245 = "Trens fantasmas que levam para estações que não existem――"
90100020-247 = "Rádios que, se você ouvir à meia-noite, amaldiçoam a sua voz――"
90100020-249 = "Elevadores que, se você seguir o ritual certo, te levam para o além――"
90100020-251 = "……Você não se surpreende. Por acaso gosta de histórias de terror?"
90100020-252 = "Não faz sentido se emocionar com algo que não podemos confirmar."
90100020-253 = "Verdade. No fundo, as Lores não passam de... bobagens."
90100020-254 = "Mas ultimamente, os relatos de quem teria \"enfrentado\" essas coisas estão aumentando."
90100020-255 = "E não são só relatos – há vítimas reais."
90100020-256 = "Vítimas... causadas pelas Lores?"
90100020-257 = "A maioria das vítimas perde a voz ou desaparece antes que possamos investigar direito."
90100020-258 = "Se fossem ataques comuns, a Valkyrie poderia agir, mas com essas Lores... mal sabemos o que está acontecendo."
90100020-259 = "Para evitar que o medo se espalhe, o Conselho decidiu transferir a investigação para uma organização superior."
90100020-260 = "E se a polícia comum não consegue resolver, e é necessário algo mais rápido... até mesmo extraoficial..."
90100020-265 = "Então a SRT foi escolhida."
90100020-266 = "Exatamente."
90100020-267 = "Mas isso é apenas uma \"proposta\" da Presidente.#nNão é uma ordem."
90100020-268 = "O inimigo é uma incógnita. Na pior das hipóteses, vocês podem acabar como as vítimas."
90100020-275 = "E se o demônio encontrar vocês primeiro──#na próxima Lore pode ser uma de vocês."
90100020-276 = "Mesmo assim, aceitam essa missão?"
90100020-278 = "Sim."
90100020-279 = "Temos dívidas a pagar."
90100020-284 = "Muito bem. Vou compartilhar as informações que reunimos."
90100020-285 = "Investiguem a verdade e eliminem essa ameaça de Kivotos."
90100020-286 = "……E mais uma coisa.#nIsso não é um pedido da Presidente, é um pedido pessoal."
90100020-290 = "Por favor―― voltem com segurança."
90100020-291 = "Não se preocupe."
90100020-292 = "Fazer um recuo estratégico quando a chance é mínima também faz parte do trabalho."
90100020-294 = "Um ponto, antes de começarmos. Posso fazer uma pergunta?"
90100020-295 = "Claro."
90100020-296 = "Mesmo sendo uma operação não oficial, precisaremos de suprimentos, munição, uma base... quem vai nos dar esse suporte?"
90100020-297 = "Antes, a própria Presidente fazia isso.#nMas agora, com a situação do Conselho..."
90100020-298 = "É verdade. Se eu mesma desse suporte, pareceria que estou oficialmente reativando a SRT."
90100020-299 = "Mas felizmente, existe uma organização que pode fazer esse papel."
90100020-300 = "Com poder e orçamento quase tão grandes quanto o Conselho, e que ninguém questiona."
90100020-301 = "――A Schale."
90100020-306 = "……Acho que ouvi errado..."
90100020-308 = "Próximo Episódio: Um Esquadrão Só Marcha de Barriga Cheia"