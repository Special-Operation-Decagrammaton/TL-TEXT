[translation]
1600202-1 = "Por favor, ouçam a minha explicação!"
1600202-2 = "（……Dá para ouvir vozes barulhentas vindo de algum lugar）"
1600202-3 = "Ugh... não aguento mais... me deixem ir embora...!"
1600202-4 = "Meus ouvidos... não, meu cérebro chegou no limite...! Socorro...! Socorro!!"
1600202-5 = "[s] \"……?\""
1600202-6 = "Ah, p-professor!"
1600202-7 = "Que bom que chegou, por favor, faça alguma coisa, professor!"
1600202-8 = "……Espere, para onde você está indo!? Nós mal começamos!"
1600202-9 = "Aaaaaaaah!!"
1600202-10 = "Nós estávamos erradas, não sabemos exatamente no que, mas por favor, nos perdoe!"
1600202-11 = "Perdoar? Não há nada para perdoar, a ignorância não é um crime! Embora, claro, possa ser algo perigoso que leve a cometer erros……."
1600202-12 = "É por isso que é importante estar sempre ciente e vigilante quanto à própria ignorância, e ter a postura de tentar aprender algo novo todos os dias!"
1600202-13 = "Dito isso, continuando a história! Originalmente, as conservas não começaram em latas, mas em potes de vidro como um método militar de armazenamento de alimentos, e só muito tempo depois, na competição de mercado……"
1600202-14 = "E assim, a história mudou dos potes de vidro para as latas de ferro. Agora, quanto ao motivo de apenas a lata de carne enlatada ter um formato trapezoidal, diferente das outras latas achatadas……"
1600202-15 = "Aaaaaaaah!!"
1600202-16 = "[s] \"Lata de carne enlatada……?\""
1600202-17 = "Ah, professor! Olá!"
1600202-18 = "Sim? O que está acontecendo... você pergunta? ……Não está acontecendo nada de especial, por quê?"
1600202-19 = "É que estas pessoas me perguntaram \"por que a lata de carne enlatada é trapezoidal\", então eu estava dando uma explicação simples……"
1600202-20 = "Simples!? Isso é uma explicação simples!? Já se passaram duas horas!"
1600202-21 = "Você voltou até a história da mineração de alumínio e a técnica dos mineiros, que são a matéria-prima da lata!!"
1600202-22 = "É claro! Entender apenas a parte superficial de qualquer coisa não pode ser chamado de compreensão real!"
1600202-23 = "Se você não entender as causas essenciais e a causalidade, não conseguirá compreender de verdade, mesmo ouvindo apenas o básico!"
1600202-24 = "Não precisa saber até a origem da matéria-prima, né!?"
1600202-25 = "É isso mesmo! Não queríamos saber sobre matéria-prima, só queríamos saber se havia algum motivo científico para aquele formato……!"
1600202-26 = "……!!"
1600202-27 = "……Ah!"
1600202-28 = "E-eu sinto que acabei de dizer algo que não deveria……."
1600202-29 = "Entendo! Então vocês queriam saber o motivo científico em vez do aspecto histórico? Se for esse o caso, esse é exatamente o meu campo de especialização!"
1600202-30 = "Sendo assim, é melhor começarmos falando sobre por que o alumínio é usado como matéria-prima para as latas. Como vocês sabem, o alumínio é o elemento de número atômico 13 na tabela periódica……"
1600202-31 = "Comparado ao ferro usado originalmente, a superfície se torna passiva, o que aumenta a resistência a estímulos externos, e essa reação……"
1600202-32 = "Aaaah!! Já chega, pare por favor!! Aaaaaaaah!!"
1600202-33 = "Vou ficar traumatizada……! Não quero nem ver carne enlatada por um bom tempo!!"
1600202-35 = "E-espere! Para onde vocês estão indo! Esperem, a explicação ainda não terminou……!"
1600202-36 = "……."
1600202-37 = "……Eles foram embora, e eu estava apenas começando……."
1600202-38 = "Por que as pessoas têm essa reação de rejeição ao adquirir conhecimento? Acho que aprender o que não se sabe é algo maravilhoso……."
1600202-39 = "O professor entende, não é? Afinal, você é o professor."
1600202-40 = "[s1] \"Claro, a ignorância é um crime, afinal.\"\n[s2] \"Acho importante adaptar o nível da explicação ao ouvinte.\""
1600202-41 = "Como esperado do professor! Alguém que eleva o nível de conhecimento do mundo!"
1600202-42 = "Eu sempre admiro o professor! Especialmente aquele……"
1600202-43 = "……E-entendo. Hmm, certamente isso é verdade, mas……."
1600202-44 = "Na verdade, foi justamente por isso que tentei explicar desde a parte mais básica……"
1600202-45 = "……."
1600202-46 = "[s] \"……Kotori?\""
1600202-47 = "Pensando bem, o professor sempre recebe perguntas de outros alunos……."
1600202-48 = "Mesmo sem o professor ir até eles, todos vêm espontaneamente perguntar……."
1600202-49 = "O que eu preciso fazer para ser como você!?"
1600202-50 = "É incrível! Eu te admiro! Eu quero ser uma pessoa como o professor!"
1600202-51 = "Poder lotar um grande auditório e dar uma palestra com confiança……!"
1600202-53 = "……Ah."
1600202-54 = "D-desculpe, acabei fazendo barulho demais. Ahaha……"
1600202-55 = "……\"Você realmente gosta de explicar as coisas, não é?\", você diz?"
1600202-56 = "Hmm, bem…… eu diria que é exatamente isso, mas ao mesmo tempo, talvez não seja……"
1600202-57 = "Eu gosto de explicar as coisas em si, mas……"
1600202-58 = "Para ser mais precisa, é que eu gosto de ver a expressão de alegria da pessoa quando ela finalmente entende o que eu expliquei……"
1600202-59 = "Gosto de conversar sobre o assunto com a pessoa que entendeu minha explicação, enquanto ela ainda sente o prazer de ter compreendido……"
1600202-60 = "……Ahaha, mesmo dizendo que gosto de explicar, quando chega a hora de explicar isso, acaba sendo um pouco difícil."
1600202-61 = "……Professor, você acha que ser falante desse jeito não é algo bom?"
1600202-62 = "[s3] \"Acho que falar bastante é algo bom.\"\n[s4] \"Acho fofo, parece um pintinho.\""
1600202-63 = "V-verdade, não é? Eu sabia que você pensava assim!"
1600202-64 = "（……Que alívio）"
1600202-65 = "P-pintinho…… é……?"
1600202-66 = "（D-de repente ser chamada de fofa foi inesperado……！）"
1600202-67 = "Fiquei aliviada, estava preocupada que o Professor não estivesse gostando muito de mim……"
1600202-68 = "Como esperado, o Professor é a pessoa que melhor me compreende!"
1600202-69 = "Ehehe."
1600202-70 = "……"
1600202-71 = "[s] \"……Kotori?\""
1600202-72 = "Ah, não, é que agora que a palavra \"compreensão\" surgiu, lembrei de algo:"
1600202-73 = "Parece que, para um ser humano \"compreender\" algo externo, é necessário, como premissa, ter uma \"compreensão\" de si mesmo primeiro."
1600202-74 = "A compreensão de si mesmo significa distinguir suas próprias ações, emoções, julgamentos e escolhas das coisas \"externas\", certo?"
1600202-75 = "Ou seja, de certa forma, é fascinante que esse ato de separar a si mesmo do mundo exterior seja, na verdade, o pré-requisito para \"aceitar as coisas do mundo exterior\"……"
1600202-78 = "……Professor?"
1600202-79 = "Ué, Professor? Para onde você vai?"
1600202-83 = "……Ao banheiro?"
