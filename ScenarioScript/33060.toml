[translation]
33060-1 = "Episódio 6; Cerimônia de Assinatura do Tratado do Éden (2)"
33060-2 = "Interior da Antiga Basílica - Salão Central"
33060-4 = "[ns] (Parece que vou ficar livre por um tempo, acho que vou dar uma volta por aí.)"
33060-6 = "Com licença, você é da equipe de serviço? Esta área é restrita, por favor, retire-se."
33060-7 = "Ei, aqui é só para o pessoal autorizado. Visitantes devem ir para o outro lado."
33060-8 = "[s1] \"Bem...\"\n[s2] \"Eu sou, tecnicamente, uma pessoa autorizada...\""
33060-9 = "……Ei, você aí do Comitê de Disciplina, você não acabou de cruzar essa linha?"
33060-10 = "……Ei, você aí do Comitê de Disciplina, você não acabou de cruzar essa linha?"
33060-11 = "Hã? Vocês que estavam pisando na linha, eu só estava tentando afastar vocês!"
33060-12 = "Será que vocês da Trinity estão querendo briga? Se é assim, vamos resolver isso agora mesmo, vou prender vocês!"
33060-13 = "O quê, reforços de repente...!? Solicito apoio, tragam reforços!"
33060-17 = "Kihihi..."
33060-19 = "Aaaah!? A Presidente apareceu do nada!?"
33060-20 = "R-reforços? E ainda por cima a veterana Tsurugi...!?"
33060-21 = "Kuhihihihihi..."
33060-23 = "Hyaaaaaaaah!!"
33060-24 = "A-aaaaah?!"
33060-25 = "A-ah, por favor...! Pessoal, nada de brigas aqui..."
33060-29 = "Nós nos reunimos aqui em prol da paz, afinal... N-não é verdade? Tsurugi-san?"
33060-30 = "……."
33060-31 = "……A pessoa que está aqui é o Sensei do Schale."
33060-32 = "Lembrem-se disso."
33060-35 = "S-sim!"
33060-37 = "E-entendido!"
33060-43 = "[ns] \"Bem, desculpe... E Tsurugi, obrigado.\""
33060-44 = "……."
33060-45 = "N-não, de forma alguma... Não precisa agradecer, Sensei."
33060-46 = "Bem, eu tenho outras tarefas para cuidar, então..."
33060-53 = "Ufa..."
33060-54 = "[s] \"A Tsurugi é mesmo gentil...\""
33060-55 = "Sim... Ah!?"
33060-56 = "[s] \"Obrigado por me ajudar. Você é a Hinata, certo?\""
33060-57 = "……Ah, sim! Desde aquela época, não é, Sensei?"
33060-58 = "[s] \"Naquela época, a Sisterhood ter aparecido nos salvou.\""
33060-59 = "N-não. Naquela ocasião, eu não fui de muita ajuda..."
33060-60 = "Eu só tenho muita força bruta... Sinto muito por não ser muito útil..."
33060-61 = "[s] \"Não diga isso. As outras irmãs também estão aqui hoje?\""
33060-62 = "Ah, sim. É por ordem da Sakurako-sama."
33060-63 = "Depois do incidente anterior, nossa política mudou um pouco."
33060-64 = "Talvez tenham concluído que nossa política de não intervenção acabou levando àquela situação. De agora em diante, seremos mais proativas em nossas atividades externas."
33060-65 = "A Sister Sakurako também deve chegar em breve."
33060-66 = "Basicamente, estamos aqui para ajudar com a cerimônia de assinatura, guiando as pessoas e auxiliando na segurança..."
33060-67 = "Ah, se quiser, Sensei, gostaria que eu lhe mostrasse a Antiga Basílica?"
33060-68 = "[s] \"Se não for incômodo, eu adoraria.\""
33060-69 = "Sim, ainda temos tempo. Então, por favor, venha por aqui..."
33060-72 = "Interior da Antiga Basílica - Corredor"
33060-74 = "[ns] \"Que lugar incrível.\""
33060-75 = "Sim. Esta \"Antiga Basílica da Comunhão\" ficou abandonada como ruína por muito tempo... Mas, com a decisão de realizar a cerimônia de assinatura aqui, ela passou por uma grande restauração."
33060-76 = "Ouvi dizer que essa decisão foi um acordo entre a Nagisa-san da Trinity e o Makoto da Gehenna..."
33060-77 = "Ainda assim, não é como se tudo tivesse sido restaurado; parece que apenas o local da assinatura foi reformado. As partes inferiores ainda estão em ruínas..."
33060-78 = "É apenas um boato, mas dizem que existe uma catacumba em larga escala sob esta Antiga Basílica."
33060-79 = "Um cemitério subterrâneo que se estende por dezenas de quilômetros... Dizem que, nos registros do 'Primeiro Concílio', ele era tão vasto que não se via o fim..."
33060-80 = "...Ah, este caminho aqui está bloqueado. Será que é porque ainda está em reparos e é perigoso?"
33060-81 = "[s] \"É um lugar com muita história, não é?\""
33060-82 = "Sim. Afinal, foi aqui que o Primeiro Concílio foi realizado."
33060-83 = "Os preceitos estabelecidos em um concílio são sagrados... Sinto como se algo daquela santidade, ou talvez os vestígios dos guardiões desses preceitos, ainda permanecesse aqui."
33060-84 = "[s] \"Guardiões?\""
33060-85 = "Sim, como posso explicar... Quando se faz uma 'promessa', geralmente se estabelecem regras para o caso de ela ser quebrada, não é? Caso contrário, ninguém cumpriria a promessa..."
33060-86 = "As pessoas que tinham o papel de aplicar essas regras, essas 'restrições', eram chamadas de Guardiões dos Preceitos. O grupo armado da Trinity que lidava com aqueles que quebravam as promessas..."
33060-87 = "Essa é a 'Sociedade das Santas de Justina'."
33060-88 = "[s] \"Como o Comitê de Justiça de hoje...?\""
33060-89 = "Sim. Historicamente, elas são as predecessoras de nós, a 'Sisterhood'..."
33060-93 = "Ah, parece que a Srta. Sakurako chegou. Dizem que a Srta. Nagisa também não deve demorar."
33060-94 = "Desculpe por interromper, mas acho que já está na hora de irmos."
33060-96 = "Está pronta?"
33060-97 = "...Sim, estou bem. Ah, falando nisso, conseguimos um carro emprestado do Pandemonium para ir até a Antiga Basílica."
33060-98 = "...Um carro? Por quê?"
33060-99 = "Parece que eles compraram um dirigível de última geração desta vez... A Makoto disse: 'Para que possam nos comparar claramente enquanto voamos, vocês devem vir rastejando pelo chão'."
33060-100 = "..."
33060-101 = "Gastando o orçamento com essas coisas de novo... Bem, não é novidade. É estranho que, depois de terem tentado nos impedir de comparecer à cerimônia de assinatura o tempo todo, eles acabem providenciando isso no final."
33060-102 = "Iori e Chinatsu também estão esperando, vamos nos apressar."
33060-103 = "..."
33060-104 = "Haa, eu entendo que você não goste disso, mas... eu já disse, Ako."
33060-105 = "O Comitê Disciplinar não vai ser dissolvido. Isso é apenas uma forma de colocar uma coleira no Pandemonium."
33060-106 = "...Sim, eu entendo. O Comitê Disciplinar quase não mudará, e Makoto terá restrições. Mas, naquele momento, a presidente..."
33060-107 = "..."
33060-108 = "Por enquanto, o importante é ir para a cerimônia."
33060-109 = "...Conversaremos sobre isso com calma depois que a cerimônia de assinatura terminar."
33060-111 = "...Sim."
33060-114 = "Opa, falando no diabo! O Pandemonium de Gehenna chegou em seu novo dirigível!"
33060-120 = "É a presidente do conselho estudantil de Gehenna, Makoto! Que carisma incrível, devo dizer! Provavelmente! Aquela é a dignidade de uma presidente de Gehenna!"
33060-121 = "Kiki..."
33060-123 = "E Nagisa, a anfitriã do Tea Party da Trinity General School, também chegou à Antiga Basílica!"
33060-124 = "As figuras principais de ambas as escolas estão se reunindo, uma após a outra!"
33060-125 = "Dizem que a presidente do Comitê Disciplinar de Gehenna também está chegando, e a atmosfera ao redor está ficando cada vez mais quente! Continuem acompanhando conosco!"
33060-130 = "Preparada?"
33060-131 = "...Sem problemas."
33060-132 = "S-sim! Terminei, fiz as verificações e confirmei várias coisas..."
33060-133 = "E o contato com aquela boneca?"
33060-134 = "(Su, su...)"
33060-135 = "...Então parece que não há problemas. Tudo está pronto."
33060-136 = "V-vai começar algo terrível agora, todos vão sofrer... mas não há outra escolha."
33060-137 = "...Sim, essa é a verdade deste mundo."
33060-138 = "..."
33060-140 = "Arius Squad, início da operação."
33060-145 = "E os mísseis de cruzeiro?"
33060-146 = "Já foram disparados. Atingirão o alvo em 5 minutos."
33060-147 = "E as equipes II e III?"
33060-148 = "E-estão aguardando em frente à passagem... Planejam invadir a área da operação conforme o horário."
33060-149 = "Invadam assim que a Antiga Basílica colapsar. Misaki e a Equipe II cuidem da Trinity, Hiyori, você e a Equipe III cuidem do lado de Gehenna."
33060-150 = "Entendido."
33060-151 = "Equipe II, fiquem atentos à Tsurugi. Equipe III, tomem cuidado com a Hina ao se moverem."
33060-152 = "S-sim! Entendido! A, a Hina-san, certo...!"
33060-153 = "Equipes I e V..."
33060-154 = "(Sussurro, sussurro...)"
33060-155 = "Ah, sigam pelo corredor até o subsolo. Como sabem, é a missão mais importante."
33060-156 = "..."
33060-157 = "(Sussurro...)"
33060-158 = "Princesa... eu sei. Sei que não se sente bem, mas peço que aguente só mais um pouco."
33060-159 = "(...Assente com a cabeça)"
33060-160 = "Hum, e a Saori-san...?"
33060-161 = "Tenho outros assuntos para tratar. Assim que terminar, me juntarei à Equipe V."
33060-162 = "Dispersar."
33060-178 = "...!?"
33060-186 = "Ué, Azusa-chan...? Aonde você vai?"
33060-187 = "Não precisa perguntar, vou ao banheiro!"
33060-188 = "Hum, mas o banheiro não é naquela direção..."
33060-191 = "...Hã?"
33060-193 = "..."
33060-194 = "Fiuuuuuuuuuuuu!!"
33060-195 = "Ouvi um barulho estranho agora há pouco..."
33060-196 = "O, o que foi!?"
33060-199 = "Algo passou voando...!?"
33060-200 = "Aaaaaah!?"
33060-201 = "(...Ainda não acabou?)"
33060-202 = "(Não, está apenas começando...? Saori, não me diga que...!?)"
33060-211 = "CABUUUUUUUM!!!"
33060-213 = "Próximo episódio: O Dia Tingido de Fogo e Cinzas (1)"
