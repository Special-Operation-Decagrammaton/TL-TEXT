[translation]
33060-1 = "Episódio 6;A Cerimônia de Assinatura do Tratado do Éden (2)"
33060-2 = "Interior da Catedral Antiga - Hall central"
33060-4 = "[ns] （Parece que ainda vou ficar à toa um tempo; vou dar uma volta por aí）"
33060-6 = "Com licença, o senhor é fornecedor? Aqui não se pode entrar; por favor, se retire."
33060-7 = "Você aí, este lado é exclusivo pro pessoal autorizado. Curiosos, pra lá."
33060-8 = "[s1] \"É que……\"\n[s2] \"Eu sou, em tese, autorizado……\""
33060-9 = "……Você aí, do Comitê Disciplinar, não acabou de cruzar esta linha?"
33060-10 = "……Você aí, do Comitê Disciplinar, não acabou de cruzar esta linha?"
33060-11 = "Hã? Foi você que pisou na linha, e eu só tentei tirar do caminho?"
33060-12 = "Não me diga que o povo de Trinity tá comprando briga? Se é assim, a conversa é rápida: vou autuar!"
33060-13 = "Q-quê, reforço do nada……!? Solicito apoio, reforços!"
33060-17 = "Kihihi……"
33060-19 = "Hii!? A presidente, do nada!?"
33060-20 = "R-reforço que nada, é a veterana Tsurugi……!?"
33060-21 = "Kuhihihihihi……."
33060-23 = "Hiáháááá!!"
33060-24 = "H-hiiih?!"
33060-25 = "É-é que……! Pessoal, briga aqui não pode……."
33060-29 = "A gente se reuniu assim justamente pela paz…… n-né? Tsurugi?"
33060-30 = "……."
33060-31 = "……Quem está aqui é o Sensei da Schale."
33060-32 = "Gravem isso."
33060-35 = "S-sim!"
33060-37 = "V-vou gravar na alma!"
33060-43 = "[ns] \"É que, desculpa…… e obrigado, Tsurugi.\""
33060-44 = "……."
33060-45 = "N-não, imagina…… de jeito nenhum, Sensei."
33060-46 = "Então, é que, eu tenho outras missões……."
33060-53 = "Ufa……."
33060-54 = "[s] \"No fim, a Tsurugi é gentil mesmo……\""
33060-55 = "Sim…… hã!?"
33060-56 = "[s] \"Obrigado por me salvar. Você é a Hinata, né?\""
33060-57 = "……Ah, sim! Desde aquela vez, né, Sensei."
33060-58 = "[s] \"Naquela hora, a Sisterhood ter vindo foi uma salvação.\""
33060-59 = "N-não. Naquela hora, eu nem fui lá muito útil……."
33060-60 = "Eu só tenho força de sobra…… desculpa por ser tão pouco útil……."
33060-61 = "[s] \"Nada disso. Hoje as outras irmãs também vieram?\""
33060-62 = "Ah, sim. É ordem da senhorita Sakurako."
33060-63 = "Com o incidente anterior como marco, a nossa diretriz também mudou um pouco."
33060-64 = "O princípio da não intervenção de até agora convidou a situação da outra vez…… talvez ela tenha pensado assim. Daqui pra frente, vamos atuar externamente de forma mais ativa."
33060-65 = "A irmã Sakurako também deve chegar em breve."
33060-66 = "A gente, no geral, tá ajudando na cerimônia, digamos; guiando as pessoas, ajudando na segurança……."
33060-67 = "Ah, se quiser, posso guiar o Sensei pela catedral antiga?"
33060-68 = "[s] \"Se não for incômodo, posso pedir?\""
33060-69 = "Sim, ainda temos tempo. Então, por aqui……"
33060-72 = "Interior da Catedral Antiga - Claustro"
33060-74 = "[ns] \"Que lugar impressionante.\""
33060-75 = "Sim. Esta \"Antiga Catedral da Comunhão\" ficou muito tempo largada como ruína…… mas, com a decisão de firmar a cerimônia aqui, dizem que houve uma grande reforma."
33060-76 = "Sobre essa decisão, ouvi que foi um acordo entre a Nagisa, de Trinity, e a Makoto, de Gehenna……."
33060-77 = "Ainda assim, não foi o conjunto todo que foi reformado; parece que foi só o local onde ocorre a assinatura. A parte de baixo ainda está em estado de ruína……."
33060-78 = "É só um boato, mas dizem que no subsolo desta catedral existe uma catacumba de grande escala."
33060-79 = "Um cemitério subterrâneo de dezenas de quilômetros…… nos registros da época do \"Primeiro Concílio\", dizem que era a ponto de não se enxergar o fim……."
33060-80 = "……Ah, este lado aqui está bloqueado, né. Deve ser porque ainda está em reforma e é perigoso."
33060-81 = "[s] \"É um lugar com muitas histórias, né.\""
33060-82 = "Sim. Afinal, foi aqui que se realizou o Primeiro Concílio."
33060-83 = "Os preceitos firmados num concílio são algo sagrado…… essa sacralidade, digamos; é como se algum \"quê\", um resquício dos guardiões dos preceitos, ainda permanecesse aqui."
33060-84 = "[s] \"Guardiões?\""
33060-85 = "Sim; como explicar…… uma \"promessa\", muitas vezes, vem acompanhada de regras pra quando for quebrada, né? Senão, há quem simplesmente não a cumpra……."
33060-86 = "As pessoas com o papel dessa regra, dessa \"restrição\", eram chamadas de guardiãs dos preceitos. O grupo militar de Trinity que lidava com os que quebravam as promessas……"
33060-87 = "esse era o \"Conselho dos Santos de Justina\"."
33060-88 = "[s] \"Tipo o Comitê de Realização da Justiça de hoje……?\""
33060-89 = "Sim. Historicamente, é o antecessor da nossa \"Sisterhood\"……"
33060-93 = "Ah, parece que a senhorita Sakurako chegou. A chegada da Nagisa também deve ser logo."
33060-94 = "Desculpa deixar pela metade, mas vamos indo?"
33060-96 = "Os preparativos estão prontos?"
33060-97 = "……Sim, tudo certo. Ah, aliás, o Pandemonium nos emprestou um carro pra ir até a catedral antiga."
33060-98 = "……Carro? Por quê?"
33060-99 = "Parece que elas compraram um dirigível novíssimo desta vez…… e a Makoto disse: \"pra dar um belo contraste com a gente voando pelo céu, voces venham rastejando pelo chão\"."
33060-100 = "……."
33060-101 = "De novo torrando o orçamento nisso…… bom, a esta altura, né. Passaram esse tempo todo atrapalhando pra gente não comparecer à assinatura, e, no fim, preparam isto; que história mais estranha."
33060-102 = "A Iori, a Chinatsu e as outras estão esperando; vamos nos apressar."
33060-103 = "……."
33060-104 = "Haa, eu sei que incomoda, mas…… eu já disse, Ako."
33060-105 = "Não é que o Comitê Disciplinar vá se dissolver; isto é só pra prender no Pandemonium o grilhão chamado Organização do Tratado do Éden."
33060-106 = "……Sim, eu sei disso. O Comitê Disciplinar quase não vai mudar, e a Makoto ganha restrições. Mas, nessa hora, a presidente……"
33060-107 = "……."
33060-108 = "Por ora, ir à cerimônia vem primeiro."
33060-109 = "……Essa conversa fica pra depois da assinatura, com calma, tá."
33060-111 = "……Sim."
33060-114 = "Opa, falando no diabo! O Pandemonium de Gehenna parece ter chegado a bordo do novo dirigível!"
33060-120 = "É a presidente do plenário da Academia Gehenna, ou seja, a presidente do conselho estudantil, Makoto Hanuma! Como esperado, digamos, que carisma tremendo! Provavelmente! Aquilo é a dignidade de presidente de Gehenna!"
33060-121 = "Kiki……"
33060-123 = "E a host do Tea Party da Academia Geral de Trinity, Nagisa Kirifuji, também parece ter chegado à catedral antiga!"
33060-124 = "As principais figuras das duas academias vão se reunindo, uma atrás da outra!"
33060-125 = "A presidente do Comitê Disciplinar de Gehenna também deve chegar em breve, e o clima ao redor só esquenta! Pessoal, continuem acompanhando!"
33060-130 = "E os preparativos?"
33060-131 = "……Sem problemas."
33060-132 = "S-sim! Terminei; a checagem também tá feita, e as confirmações todas……."
33060-133 = "E o contato com aquela boneca?"
33060-134 = "(Suave, suave……)"
33060-135 = "……Então parece que está tudo em ordem. Tudo está pronto."
33060-136 = "A-a partir de agora vem a parte dolorosa, né; todo mundo vai sofrer, né…… mas não tem jeito."
33060-137 = "……Isso; essa é a verdade deste mundo."
33060-138 = "……."
33060-140 = "Squad de Arius, início da operação"
33060-145 = "E o míssil de cruzeiro?"
33060-146 = "Já foi lançado. Daqui a 5 minutos, atinge o ponto-alvo."
33060-147 = "E a Equipe II e a Equipe III?"
33060-148 = "E-em espera diante do corredor…… no horário certo, está previsto invadirem a zona da operação."
33060-149 = "Invasão simultânea ao desabamento da catedral. Misaki e a Equipe II cuidam de Trinity; Hiyori, você e a Equipe III, do lado de Gehenna."
33060-150 = "Entendido."
33060-151 = "A Equipe II fique alerta com a Tsurugi. A Equipe III se mova com cuidado com a Hina."
33060-152 = "S-sim! Entendido! A-a Hina, né……!"
33060-153 = "A Equipe I e a Equipe V……"
33060-154 = "(Suave, ssuave……)"
33060-155 = "Sim, pelo corredor rumo ao subsolo. Como sabem, é a missão mais importante."
33060-156 = "……."
33060-157 = "(Ssuave……)"
33060-158 = "Hime…… eu sei. Deve ser desagradável, mas aguenta só mais um pouco."
33060-159 = "(……assente)"
33060-160 = "É que, e a Saori……?"
33060-161 = "Eu tenho outro assunto; assim que terminar, está previsto eu me juntar à Equipe V."
33060-162 = "Então, dispersar."
33060-178 = "……!?"
33060-186 = "Ué, Azusa……? Aonde você vai?"
33060-187 = "Nem precisa perguntar: banheiro!"
33060-188 = "É que, mas o banheiro não é pra lá……."
33060-191 = "……Hã?"
33060-193 = "……."
33060-194 = "HYUOOOOOON!!"
33060-195 = "Agora, um som estranho……."
33060-196 = "Q-quê!?"
33060-199 = "Tem alguma coisa voando……!?"
33060-200 = "Kyaaah!?"
33060-201 = "(……Ainda não tinha acabado?)"
33060-202 = "(Não; vai começar agora……? Saori, não pode ser……!?)"
33060-211 = "KABUUUUUM!!!"
33060-213 = "Próximo Episódio;O Dia Tingido de Fogo e Cinzas (1)"
