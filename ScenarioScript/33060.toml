[translation]
33060-1 = "Episódio 6; Batalha Feroz"
33060-2 = "Interior do Antigo Tabernáculo - Salão Central"
33060-4 = "[ns] (Ainda parece que vai demorar, acho que vou dar uma volta por aí.)"
33060-6 = "Desculpe, você é da equipe de apoio? Esta área é restrita, por favor, retire-se."
33060-7 = "Ei, ali é só para o pessoal autorizado. Os curiosos ficam para lá."
33060-8 = "[s1] \"Err......\"\n[s2] \"Eu sou autorizado, na verdade......\""
33060-9 = "......Ei, você aí do Comitê Disciplinar, acabou de cruzar a linha, não foi?"
33060-10 = "......Ei, você aí do Comitê Disciplinar, acabou de cruzar a linha, não foi?"
33060-11 = "Hã? Vocês que tavam pisando na linha, eu só tentei afastar!"
33060-12 = "Tá querendo confusão com o pessoal da Trinity? Já que é assim, vou acabar com isso agora mesmo e aplicar uma multa!"
33060-13 = "O quê, reforços de repente...!? Peço reforços, tragam mais gente!"
33060-17 = "Kihihi..."
33060-19 = "Hiii!? A Presidente apareceu do nada!?"
33060-20 = "R-Reforços? E a Tsurugi-senpai também...!?"
33060-21 = "Kuhihihihihihi..."
33060-23 = "Hyaaaah!!!"
33060-24 = "Hiiiieee?!"
33060-25 = "Ah, ei......! Pessoal, nada de briga aqui..."
33060-29 = "A gente se reuniu aqui em nome da paz, não foi...? N-Não é mesmo, Tsurugi-san?"
33060-30 = "......"
33060-31 = "......Esse aí é o Sensei da Schale."
33060-32 = "Guardem bem isso."
33060-35 = "S-Sim!"
33060-37 = "V-Vou guardar na memória!"
33060-43 = "[ns] \"Err, desculpa... e Tsurugi, obrigado.\""
33060-44 = "......"
33060-45 = "N-Não, que isso... não precisa agradecer, Sensei."
33060-46 = "Bom, eu tenho outra missão, então vou indo..."
33060-53 = "Ufa..."
33060-54 = "[s] \"A Tsurugi é tão gentil mesmo...\""
33060-55 = "Sim... hã!?"
33060-56 = "[s] \"Obrigado por ter ajudado. Você é a Hinata, certo?\""
33060-57 = "......Ah, sim! Faz tempo desde aquela época, Sensei."
33060-58 = "[s] \"Fiquei aliviado quando a Irmandade apareceu para ajudar naquela hora.\""
33060-59 = "N-Não, imagina. Eu não fui de muita ajuda naquela hora..."
33060-60 = "Eu só tenho muita força bruta, desculpe por não ser tão útil..."
33060-61 = "[s] \"Não diga isso. As outras irmãs também vieram hoje?\""
33060-62 = "Ah, sim. Estamos sob ordens da Sakurako-sama."
33060-63 = "Depois do incidente anterior, nossa política mudou um pouco."
33060-64 = "Talvez tenhamos percebido que o nosso 'princípio de não interferência' acabou causando aquela situação... De agora em diante, vamos agir de forma mais ativa no exterior."
33060-65 = "Acho que a Irmã Sakurako deve chegar em breve."
33060-66 = "Basicamente, estamos ajudando nos preparativos da cerimônia, recepcionando os convidados e dando uma mão na segurança..."
33060-67 = "Ah, se quiser, posso te mostrar o Tabernáculo, Sensei?"
33060-68 = "[s] \"Se não for incomodar, eu aceito.\""
33060-69 = "Sim, ainda temos tempo. Então, por aqui..."
33060-72 = "Interior do Antigo Tabernáculo - Corredor"
33060-74 = "[ns] \"Que lugar incrível.\""
33060-75 = "Sim. Este 'Antigo Tabernáculo da Comunhão' ficou abandonado como ruína por muito tempo... mas como decidiram fazer a cerimônia aqui, fizeram uma grande reforma."
33060-76 = "Ouvi dizer que a decisão de fazer aqui foi um acordo entre a Nagisa-san, da Trinity, e a Makoto-san, de Gehenna..."
33070-77 = "Mas não reformaram tudo, parece que só reformaram onde a assinatura vai acontecer. A parte de baixo ainda continua em ruínas..."
33060-78 = "É só um rumor, mas dizem que existe um catacumba enorme embaixo deste Tabernáculo."
33060-79 = "Dezenas de quilômetros de cemitério subterrâneo... Até nos relatos do 'Primeiro Concílio', diziam que não dava nem para ver o fim..."
33060-80 = "...Ah, aquela parte ali está bloqueada. Acho que é porque ainda estão reformando e é perigoso."
33060-81 = "[s] \"É um lugar com muita história, né?\""
33060-82 = "Sim. Afinal, foi aqui que o Primeiro Concílio aconteceu."
33060-83 = "Os mandamentos estabelecidos no Concílio são sagrados... E tenho a sensação de que 'algo' daquela santidade, ou melhor, dos vestígios dos guardiões dos mandamentos, ainda vive aqui."
33060-84 = "[s] \"Guardiões?\""
33060-85 = "Sim, como posso explicar... 'Promessas' geralmente vêm com regras caso sejam quebradas, não é? Se não, ninguém cumpriria nada..."
33060-86 = "As pessoas que tinham o papel de fazer cumprir essas 'restrições' eram chamadas de guardiões dos mandamentos. O grupo armado da Trinity que lidava com quem quebrava as promessas..."
33060-87 = "Esses eram a 'Sociedade dos Santos Justina'."
33060-88 = "[s] \"Parecido com o atual Comitê Disciplinar...?\""
33060-89 = "Sim. Historicamente, elas são as predecessoras da nossa 'Irmandade'..."
33060-93 = "Ah, parece que a Sakurako-sama chegou. Dizem que a Nagisa-san também está chegando."
33060-94 = "Desculpe interromper, mas acho melhor irmos."
33060-96 = "Tudo pronto?"
33060-97 = "...Sim, sem problemas. Ah, por falar nisso, conseguimos emprestado um carro do Pandemonium para vir até o Tabernáculo."
33060-98 = "...Um carro? Por quê?"
33060-99 = "Parece que eles compraram uma aeronave nova... A Makoto-san disse: 'Vocês rastejam pelo chão para que possam nos ver voando lá no alto com elegância'."
33060-100 = "......"
33060-101 = "Gastando o orçamento com essas coisas de novo... Bom, não é novidade. Achei estranho terem tentado nos impedir de vir e no final terem cedido o transporte."
33060-102 = "A Iori e a Chinatsu estão esperando, vamos rápido."
33060-103 = "......"
33060-104 = "Haa, eu sei que você não gosta, mas... já te disse, Akko."
33060-105 = "O Comitê Disciplinar não vai ser dissolvido, isso é apenas para colocar uma coleira chamada 'Organização do Tratado do Éden' no Pandemonium."
33060-106 = "...Sim, eu sei disso. O Comitê Disciplinar praticamente não vai mudar, e a Makoto vai ter restrições. Mas, naquela hora, a Presidente..."
33060-107 = "......"
33060-108 = "Por enquanto, a prioridade é ir para a cerimônia."
33060-109 = "...Conversamos sobre isso com calma depois que a cerimônia acabar."
33060-111 = "......Sim."
33060-114 = "Opa, falando nelas! O Pandemonium de Gehenna acabou de chegar em sua nova aeronave!"
33060-120 = "É a Makoto Hanuma, Presidente de Gehenna! Que carisma impressionante, como esperado! Essa é a dignidade de uma presidente de Gehenna!"
33060-121 = "Kiki..."
33060-123 = "E a anfitriã da Tea Party da Trinity, Nagisa Kirifuji, também chegou ao Tabernáculo!"
33060-124 = "As figuras principais de ambas as escolas estão chegando uma após a outra!"
33060-125 = "Dizem que a Presidente do Comitê Disciplinar de Gehenna também está chegando, o clima aqui está cada vez mais quente! Continuem acompanhando!"
33060-130 = "Pronta?"
33060-131 = "...Tudo certo."
33060-132 = "S-Sim! Terminei, verifiquei tudo e checamos várias coisas..."
33060-133 = "E o contato com a boneca?"
33060-134 = "(Sssss, Sssss...)"
33060-135 = "...Parece que não tem problema. Tudo está pronto."
33060-136 = "V-Vai começar uma época difícil agora, todo mundo vai sofrer... mas não tem jeito."
33060-137 = "...Sim, essa é a verdade deste mundo."
33060-138 = "......"
33060-140 = "Esquadrão Arius, operação iniciada."
33060-145 = "E os mísseis de cruzeiro?"
33060-146 = "Já foram lançados. Eles vão atingir o alvo em 5 minutos."
33060-147 = "E os times II e III?"
33060-148 = "E-Estão aguardando na frente da passagem... vamos entrar na área de operação conforme o horário."
33060-149 = "Entraremos junto com o colapso do Tabernáculo. Misaki e Time II cuidam da Trinity, Hiyori e Time III cuidam de Gehenna."
33060-150 = "Entendido."
33060-151 = "Time II, cuidado com a Tsurugi. Time III, fiquem atentos à Hina."
33060-152 = "S-Sim! Entendido! H-Hina-san, né...!"
33060-153 = "Times I e V..."
33060-154 = "(Sssss, Sssss...)"
33060-155 = "Ah, sigam o corredor para o subsolo. Como vocês sabem, é a missão mais importante."
33060-156 = "......"
33060-157 = "(Sssss...)"
33060-158 = "Princesa... eu sei. Deve ser horrível, mas aguente só mais um pouco."
33060-159 = "(...Assentimento)"
33060-160 = "Err, e a Saori-san...?"
33060-161 = "Eu tenho outros assuntos, vou me juntar ao Time V assim que terminar."
33060-162 = "Dispersar."
33060-178 = "...!?"
33060-186 = "Ué, Azusa-chan...? Aonde você vai?"
33060-187 = "Não precisa perguntar, vou ao banheiro!"
33060-188 = "Err, mas o banheiro não é para aquele lado..."
33060-191 = "...Hã?"
33060-193 = "......"
33060-194 = "Hyuoooooooooooooooon!!"
33060-195 = "Que som estranho foi esse..."
33060-196 = "O-O que foi isso!?"
33060-199 = "Algo voou..."
33060-200 = "Kyaaaa!?"
33060-201 = "(...Não tinha acabado ainda?)"
33060-202 = "(Não, está começando agora...? Saori, não me diga...!)"
33060-211 = "DOKAAAAAAN!!!"
33060-213 = "Próximo Episódio; O Dia Tingido de Fogo e Cinzas (1)"