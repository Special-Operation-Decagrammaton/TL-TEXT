[translation]
52130-1 = "第13話;蛇の口中"
52130-2 = "やられた……！"
52130-3 = "ユカリはどこ？"
52130-7 = "書斎の方だろ。"
52130-8 = "……どうしたんだ？"
52130-9 = "罠だよ。早くユカリの――"
52130-13 = "いや……[USERNAME]先生のところに行かないと！"
52130-14 = "師匠の？どうしたんだよ……。"
52130-24 = "こいつら、前に見た化け物か！"
52130-25 = "どこに隠れてたんだよ……！"
52130-26 = "レンゲ、対処法は覚えてるね？"
52130-27 = "普通の銃弾は効かないけど、物理法則には逆らえない。床を狙って。"
52130-28 = "まかせろ！"
