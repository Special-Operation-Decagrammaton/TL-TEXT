[translation]
1600103-1 = "尾行デートは偶然に"
1600103-2 = "あ、ご主人様ー！こっちこっち！待ってたよー！"
1600103-3 = "忙しいのに来てくれてありがとう！やっぱり持つべきものはご主人様！"
1600103-4 = "[s1] \"何かあったの？\"\n[s2] \"それはもちろん、アスナのお呼びとあらば。\""
1600103-5 = "ご主人様の助けが必要なの！！"
1600103-6 = "ほんと！？わーっ！ご主人様最高！！"
1600103-7 = "それで何を助けてほしいかって？えっと、それは……。"
1600103-8 = "……何だろうね？"
1600103-9 = "あはは、ごめーん、まだ具体的には考えてなかったんだよね！"
1600103-10 = "[s] \"……？？？\""
1600103-11 = "……ん？そんな顔してどうしたの、ご主人様？"
1600103-12 = "本当に助けが必要だったのか……って？もちろん！ただ具体的に考えてなかっただけ！"
1600103-13 = "今日はせっかく、何の任務も授業もない日だからさー。"
1600103-14 = "こういう日には、一緒にいてくれる誰かが必要でしょ？となるともちろん私にとってのそんな存在はご主人様しかいないし？"
1600103-15 = "デートのお誘い……？"
1600103-16 = "うーん、どうだろ、たしかにご主人様にそばにいてほしいとは思ったけど……。"
1600103-17 = "……うん！考えてみたらそうかも！じゃあ決まり、ご主人様さえよければアスナとデートしよっ！"
1600103-18 = "ほらほら！時間がもったいないから早く行こ！ご主人様！"
1600103-21 = "よーし、しゅっぱーつ！！"
1600103-23 = "（何かを言う前に、アスナに腕を掴まれて引きずられていった）"
1600103-25 = "だからこの辺で待ち伏せをして、通りかかった学生を……。"
1600103-26 = "なるほど、悪くない。それは完璧な……。"
1600103-27 = "……ま、待て！あそこにいるの、C&Cのメイドじゃないか？"
1600103-29 = "～♪～♬"
1600103-32 = "本当だ……！くっ、やつらにバレたらマズい、一旦場所を変えよう。"
1600103-38 = "……んー？誰か今、私たちのこと呼んだ？何か聞こえたような……。"
1600103-39 = "……気のせいかな？"
1600103-40 = "……まあ、今はどーでもいいや！気にしない気にしない！"
1600103-41 = "早く行こ、ご主人様！今日は一緒にできるだけ色んな所に行かなきゃ！"
1600103-43 = "（アスナが腕を組んできて、そのまままた歩き始めた）"
1600103-45 = "ここなら何とか……。"
1600103-48 = "……なっ！？あいつ、さっきのメイドだ！同じ方向に来てしまったか、くっ、退くぞ！"
1600103-51 = "ご主人様、あれ！前からずっと一緒にやりたかったやつ！"
1600103-52 = "え、ご主人様はこのゲームやったことあるの？ちょうど良かった、じゃあ私ともやろっ！"
1600103-53 = "ん？やり方？んーん、全然知らないけど？"
1600103-54 = "まあ、こういうのは勘で良いんだよ！それに、どっちが勝つかとかは今回そんなに大事じゃないし！"
1600103-55 = "……私とご主人様が、こうやって二人でするってことが大事なんだもん、ね？"
1600103-56 = "よ～し！じゃあスタート！！"
1600103-57 = "（結構やりこんでいたゲームだったので自信はあったものの）"
1600103-59 = "（……完膚なきまでに負かされてしまった）"
1600103-63 = "おかしい、なぜ行く先々にあいつが……もしかして私たちが尾行されているのか……！？"
1600103-64 = "ま、またか！くそ……逃げろ！"
1600103-67 = "遊園地だー！私、遊園地にこうやって普通に遊びに来たの初めて！"
1600103-68 = "え、ううん、任務で来た時も全然乗り物に乗ったりして遊んでたよ？"
1600103-69 = "こうやって普通にっていうのは、こうして二人っきりでってこと。"
1600103-70 = "だからさっきも言った通り、何をするかとかはどうでもいいの！"
1600103-71 = "ご主人様と一緒だから、嬉しくて楽しいの。ゲームセンターも、遊園地も！"
1600103-72 = "ご主人様と一緒なら、ただ歩いてるだけでも楽しいから。"
1600103-73 = "……証明ってわけじゃないけど、しばらくこの辺歩いてみよっか？ご主人様、足は痛くない？"
1600103-74 = "[s] \"ううん、大丈夫。\""
1600103-75 = "よ～し！じゃあ日が暮れるまで二人でどこまでも歩いていこう！！遅れないでね！"
1600103-76 = "あ、でも足が痛かったらちゃんと言ってね。私がおんぶしてあげるから！"
1600103-78 = "（アスナはそう言って、また楽しそうに歩き出した）"
1600103-80 = "（……結局途中で体力が尽きてしまい、アスナにおんぶしてもらうことになった）"
1600103-82 = "あーっ！ほんっと～～～～に楽しかった！ありがとね！"
1600103-83 = "ん？ご主人様、今何か言った？"
1600103-84 = "……もう下ろしてって？周りの視線が気になる？"
1600103-85 = "そう？せっかくだし見せつけてあげようよ！"
1600103-86 = "うーん、そこまで言うなら……よいしょっ。"
1600103-89 = "どう？足は大丈夫？"
1600103-90 = "[s] （頷きながら持っていた飲み物を渡す）"
1600103-91 = "あ、エナジードリンク！くれるの？ありがとーご主人様！"
1600103-92 = "（コクッ、コクッ……）"
1600103-93 = "っぷぁ～！冷た～い！！"
1600103-94 = "これ好きなんだー、美味しいよね。"
1600103-95 = "……本当に好き。不思議だなぁ……。"
1600103-96 = "見たことのある景色でも、ご主人様と一緒だと全然違う。"
1600103-97 = "ご主人様は、私にとってやっぱり普通じゃないなあ。"
1600103-98 = "あはっ……なんか、そんな感じ。"
1600103-99 = "……それじゃ、もう遅いし、ご主人様もそろそろ戻らなきゃだよね？"
1600103-100 = "せっかくだし、帰りもおんぶしてあげよっか？ん？それは嫌？"
1600103-101 = "あはははは！冗談だよー、冗談！"
1600103-102 = "さーて、じゃあ飲み終わった空き缶をゴミ箱にシューーート！"
1600103-104 = "ヒューン"
1600103-105 = "ありゃ、だいぶ遠くに……。"
1600103-106 = "カーンッ！！"
1600103-107 = "……ん？変な音がしたけど、何かぶつかった？"
1600103-109 = "……？"
1600103-110 = "いった……！？くそ！やっぱり全部把握されてるってことか！"
1600103-111 = "ダメだ、今回は諦めよう……！"
1600103-112 = "くっ！覚えておけC&C……！！"
1600103-115 = "……。"
1600103-116 = "……？"
1600103-118 = "……あの人たち、誰？"
