[translation]
80000105-1 = "認識の差"
80000105-3 = "……やっと見つけた。"
80000105-7 = "ここに居たのね、先生。探したじゃない。"
80000105-8 = "……ん？"
80000105-9 = "すぐに終わるわ……私にとって大事な用ではあるけれど。"
80000105-10 = "……それじゃあ、さっそくだけど本題に。"
80000105-19 = "[ns1] \"……もしかして、チョコレート？\"\n[ns2] \"バレンタインの……？\""
80000105-22 = "……意外そうね？まぁ、予想はしていたけど。"
80000105-23 = "私に対する印象なんて、そんなものだろうと思っていたわ。#nでも、だからこそ……"
80000105-24 = "せっかくの機会を逃す手は無いと思って。"
80000105-25 = "もっと前から感謝を伝えておきたかったところではあるけれど……"
80000105-26 = "それに……"
80000105-27 = "私は別に、先生を嫌ったり警戒してるわけではないもの。"
80000105-31 = "……余計なことを言ったわね。今のは忘れてちょうだい。"
80000105-32 = "私なりに、あなたとの関係をどう築いていこうか、これでも気にしてたのよ。"
80000105-33 = "だから、気に入ってもらえたのなら嬉しいわ。"
80000105-34 = "[s3] \"もちろん、とっても嬉しいよ！\"\n[s4] \"アオイのバレンタインチョコ！！\""
80000105-40 = "そんなに喜ぶことかしら……"
80000105-41 = "……ん？お礼にコーヒーを奢ってくれるの？"
80000105-42 = "ありがたく頂くけど……何というか、拍子抜けね。"
80000105-43 = "ただのチョコレートよ？それに、まだ中を見てすらいないのに。"
80000105-44 = "私たちって、そんなに親しかったかしら……"
80000105-45 = "[s5] \"……ん？\"\n[s6] \"そんなに親しくなかった？\""
80000105-48 = "…………？"
80000105-49 = "……そう。"
80000105-50 = "……なるほど。"
80000105-51 = "…………ふぅ。"
80000105-52 = "そうだったのね……先生。"
80000105-53 = "あなたって人は……"
80000105-54 = "[s7] \"……アオイ、大丈夫？\"\n[s8] \"何か悩みでもあるの……？\""
80000105-57 = "…………。"
80000105-58 = "いえ……私だけ気にしすぎて、損しているみたいね。"
80000105-59 = "……ん？"
80000105-60 = "悩みがあったら、いつでも聞くから……？"
80000105-65 = "……分かったわ。"
80000105-66 = "悪いのは、私じゃなくて先生の方だったのだと。"
80000105-67 = "[s] \"……え？\""
80000105-72 = "……いえ、独り言よ。気にしないで。#nそれじゃあ、私は用事があるから……ま、また……"
80000105-79 = "（なぜか急にアオイは居なくなってしまったが……）"
80000105-84 = "（……もらったチョコレートは、とても美味しかった）"
