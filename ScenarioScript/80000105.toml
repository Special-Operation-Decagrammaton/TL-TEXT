[translation]
80000105-1 = "Diferença de percepção"
80000105-3 = "……Finalmente te encontrei."
80000105-7 = "Você estava aqui, Sensei. Eu te procurei por toda parte."
80000105-8 = "……Hm?"
80000105-9 = "Será rápido... embora seja um assunto importante para mim."
80000105-10 = "……Bem, indo direto ao ponto."
80000105-19 = "[ns1] \"……Por acaso, isso é chocolate?\"\n[ns2] \"De Dia dos Namorados...?\""
80000105-22 = "……Parece surpreso? Bem, eu já imaginava."
80000105-23 = "Eu sabia que essa era a impressão que você tinha de mim. #nMas, justamente por isso..."
80000105-24 = "Eu não podia deixar passar essa oportunidade."
80000105-25 = "Eu queria ter expressado minha gratidão há mais tempo, mas..."
80000105-26 = "Além disso..."
80000105-27 = "Eu não odeio você, nem estou te vigiando, Sensei."
80000105-31 = "……Falei demais. Esqueça o que eu disse."
80000105-32 = "À minha maneira, eu andei pensando em como construir nosso relacionamento, acredite se quiser."
80000105-33 = "Por isso, ficarei feliz se você gostar."
80000105-34 = "[s3] \"Claro, estou muito feliz!\"\n[s4] \"O chocolate de Dia dos Namorados da Aoi!!\""
80000105-40 = "É motivo para tanta alegria assim...?"
80000105-41 = "……Hm? Vai me pagar um café como agradecimento?"
80000105-42 = "Aceito com prazer, mas... não sei, isso é um pouco anticlimático."
80000105-43 = "É só um chocolate, afinal. E você nem abriu para ver ainda."
80000105-44 = "Será que nós éramos tão próximos assim...?"
80000105-45 = "[s5] \"……Hm?\"\n[s6] \"Não éramos tão próximos?\""
80000105-48 = "…………?"
80000105-49 = "……Entendo."
80000105-50 = "……Faz sentido."
80000105-51 = "…………Ufa."
80000105-52 = "Então era isso... Sensei."
80000105-53 = "Você é uma pessoa tão..."
80000105-54 = "[s7] \"……Aoi, você está bem?\"\n[s8] \"Está preocupada com alguma coisa...?\""
80000105-57 = "…………."
80000105-58 = "Não... parece que só eu estava pensando demais e saindo perdendo."
80000105-59 = "……Hm?"
80000105-60 = "Se tiver algum problema, pode me contar a qualquer hora...?"
80000105-65 = "……Entendi."
80000105-66 = "A culpa não era minha, era sua, Sensei."
80000105-67 = "[s] \"……Eh?\""
80000105-72 = "……Não, nada, só falando sozinha. Não ligue. #nBem, eu tenho compromissos, então... a-até mais..."
80000105-79 = "(Por algum motivo, Aoi foi embora apressada...)"
80000105-84 = "(……O chocolate que ganhei estava muito gostoso.)"
