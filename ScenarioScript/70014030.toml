[translation]
70014030-1 = "The Apothecary's Wanderings (3)"
70014030-3 = "The Black Market... and you're going there yourself, Sensei?"
70014030-4 = "Why!? Don't tell me you're being threatened by someone...!?"
70014030-8 = "Excuse me? For field research?"
70014030-9 = "If that's the case, you should just request it from students or hire a contractor...!"
70014030-10 = "[s1] \"I appreciate your concern, but I want to see it with my own eyes.\"\n[s2] \"I want you to trust me.\""
70014030-13 = "……."
70014030-14 = "……."
70014030-16 = "Hah."
70014030-17 = "[s] \"You just laughed, didn't you!?\""
70014030-18 = "Are you a cat, Sensei?"
70014030-19 = "[s] \"...What's that supposed to mean?\""
70014030-20 = "They say cats have nine lives, don't they? #nAt the same time... curiosity killed the cat, as well."
70014030-21 = "[s] \"I'm not a cat!\""
70014030-22 = "Well, I can understand your actions. I don't agree with them, though."
70014030-23 = "Still, I can't help but feel sympathy for those folks at the General Student Council."
70014030-24 = "Hmm? You're capable of feeling sympathy for others?"
70014030-25 = "Of course, it's not to that extent."
70014030-26 = "But I do understand what kind of emotion it is, and in what situations it arises."
70014030-27 = "I understand it."
70014030-28 = "In other words..."
70014030-29 = "Sensei, you are doing something so reckless that even I can see it."
70014030-30 = "[s] \"You're absolutely right...\""
70014030-31 = "For starters, it's not desirable for the head of an organization to be out in the field all the time."
70014030-32 = "But considering how sluggish the General Student Council is... I suppose it can't be helped."
70014030-33 = "Oh well. I've become interested myself."
70014030-34 = "Shall we go?"
70014030-35 = "[s] \"You're coming with me?\""
70014030-36 = "...Sensei, you've piqued my interest."
70014030-37 = "This world is truly boring. At least, that's what I think."
70014030-38 = "Therefore, I am willing to pay a fair price for something that can serve as a 'pastime'."
70014030-39 = "Regardless, a promise once made is important."
70014030-46 = "Don't back down!!!"
70014030-53 = "Once we take control of this spot, this whole area is ours!!"
70014030-57 = "I let you get away with too much, and now you're getting cocky!"
70014030-58 = "The people living here are a problem too! #nDo you have any idea what happens if you betray us?"
70014030-59 = "Once this commotion is over, I'm doubling the protection fees!"
70014030-64 = "...How noisy."
70014030-65 = "It's shaking, and dust is flying everywhere."
70014030-66 = "It's all incredibly unpleasant."
70014030-67 = "...It's getting in the way of my compounding."
70014030-73 = "Guh!?"
70014030-74 = "W-what is this? A sweet scent...?"
70014030-78 = "What."
70014030-79 = "They're still alive."
70014030-80 = "Only just, though."
70014030-83 = "Hah, hah, you're so persistent...!"
70014030-90 = "Huh? Just 'cause you're a newcomer doesn't mean I'll go easy on you!"
70014030-91 = "You pay back the money you borrowed! That's only natural, right? #nOh, and don't forget the interest!"
70014030-92 = "No, you guys were the ones who forced it on us!?"
70014030-93 = "Then that money should still be sitting there in full, right?"
70014030-94 = "I used it, but..."
70014030-95 = "That doesn't change the fact that it's usury! There's no way I can pay that back!"
70014030-96 = "We helped you out when you were in trouble, didn't we? #nIf you don't have the money, you'll pay with your body!!"
70014030-98 = "Crying and apologizing won't get you anywhere in the Black Market!"
70014030-100 = "How trivial."
70014030-101 = "The carefree ones aren't worth mentioning, but..."
70014030-102 = "The arrogant and fearless ones are even more infuriating."
70014030-105 = "Hey, you."
70014030-106 = "Huh? You want money too?"
70014030-107 = "If you don't have business here, get lost!"
70014030-113 = "Hm?"
70014030-114 = "Huh?"
70014030-116 = "M-my body—???"
70014030-121 = "You'll sleep soundly for two days."
70014030-122 = "Whatever happens in the meantime... is none of my concern."
70014030-123 = "Also..."
70014030-127 = "W-what is this...!?"
70014030-128 = "Hah..."
70014030-129 = "Remember this."
70014030-130 = "If you can't protect yourself, you'll eventually be devoured."
70014030-131 = "That is the law of the world."
70014030-133 = "You guys! Get it together!!"
70014030-134 = "There's no such thing as a truce! Only one side gets to live!!"
70014030-144 = "W-what the!? Guh!"
70014030-150 = "Stop making a scene. What if you get my clothes dirty?"
70014030-151 = "For... such a trivial reason—"
70014030-152 = "—*thud*."
70014030-156 = "[ns] \"Hey... everyone's okay, right?\""
70014030-157 = "So that's what you were worried about."
70014030-158 = "Don't worry. #nIt's more convenient for observing symptoms if they stay alive."
70014030-166 = "So?"
70014030-167 = "What are your thoughts after walking around the Black Market?"
70014030-168 = "[s] \"I'm still not sure...\""
70014030-169 = "I imagine so. That's just how this place is."
70014030-170 = "If I had to put it into words—it's the space between an incurable disease and a rare one."
70014030-171 = "Some give up, while others cling to a faint hope."
70014030-172 = "To me, neither matters."
70014030-173 = "...It's no different from a broken body that medicine cannot heal."
70014030-174 = "[s] \"But I want to know more.\""
70014030-175 = "...So you choose the path of a pure fool who believes in the possibilities of all things."
70014030-176 = "……."
70014030-177 = "Well, that's fine. That, too, is interesting in its own way."
70014030-184 = "Hey, old hag! This is a problem... #nIf you're cured, you need to pay the protection fee."
70014030-185 = "We've done you plenty of favors, haven't we? Did you forget?"
70014030-186 = "Let's settle this peacefully, shall we? Huh?"
70014030-187 = "Y-you...!"
70014030-191 = "[ns] \"Huh...?\""