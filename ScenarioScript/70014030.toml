[translation]#[Texto Final. - Filipe 08/07.]
70014030-1 = "A Andança do Farmacêutico (3)"
70014030-3 = "No Mercado Negro…… o Sensei vai pessoalmente?"
70014030-4 = "Por quê!? Não me diga que alguém está te ameaçando……!?"
70014030-8 = "Hã? Pesquisa de campo?"
70014030-9 = "Se for isso, é só pedir pra um aluno ou contratar um prestador de serviço……!"
70014030-10 = "[s1] \"Fico lisonjeado, mas quero ver com meus próprios olhos.\"\n[s2] \"Confia em mim.\""
70014030-13 = "……"
70014030-14 = "……"
70014030-16 = "Ha."
70014030-17 = "[s] \"Você riu agora, né!?\""
70014030-18 = "Por acaso o Sensei é um gato?"
70014030-19 = "[s] \"……Como assim?\""
70014030-20 = "Dizem que gato tem sete vidas.#nMas também dizem que a curiosidade matou o gato."
70014030-21 = "[s] \"Não sou gato!\""
70014030-22 = "Bom, até entendo sua atitude. Não concordo, mas entendo."
70014030-23 = "Só tenho pena do pessoal do Conselho Estudantil Geral."
70014030-24 = "Hmm? Você consegue sentir pena dos outros?"
70014030-25 = "Claro, não a esse ponto."
70014030-26 = "Mas eu sei que tipo de sentimento é esse e em que situações ele aparece……"
70014030-27 = "entendo o conceito."
70014030-28 = "……Em outras palavras."
70014030-29 = "O que o Sensei está fazendo agora é tão imprudente que até eu consigo enxergar o perigo."
70014030-30 = "[s] \"Justíssimo……\""
70014030-31 = "Além disso, o chefe ir ao campo toda hora não é bom pra organização."
70014030-32 = "Mas, considerando o pessoal do Conselho que vive enrolando…… não tem jeito."
70014030-33 = "Mas tudo bem. Fiquei curioso também."
70014030-34 = "Vamos."
70014030-35 = "[s] \"Você vem comigo?\""
70014030-36 = "……O Sensei despertou meu interesse."
70014030-37 = "Esse mundo é muito entediante. Pelo menos, é o que eu acho."
70014030-38 = "Por isso, pra algo que sirva como 'passatempo', estou disposto a pagar o preço."
70014030-39 = "Afinal, promessa é promessa."
70014030-46 = "Não fujam!!!"
70014030-53 = "Se dominarmos isso aqui, a área é nossa!!"
70014030-57 = "Dá moleza e os caras se aproveitam!"
70014030-58 = "O pessoal que mora aqui também é problema!#nTrair a gente, vocês sabem o que acontece?"
70014030-59 = "Quando a bagunça passar, a taxa de proteção vai dobrar!"
70014030-64 = "……Que barulheira."
70014030-65 = "Balança, poeira voando."
70014030-66 = "Tudo muito desagradável."
70014030-67 = "……Atrapalha minha manipulação."
70014030-73 = "Gah!?"
70014030-74 = "Q-que é isso? Um cheiro doce……?"
70014030-78 = "O quê."
70014030-79 = "A vida está intacta."
70014030-80 = "Só a vida, isso sim."
70014030-83 = "Haa, haa…… que saco……!"
70014030-90 = "Hã? Só porque é novato não vou pegar leve!"
70014030-91 = "O dinheiro emprestado tem que pagar! É o mínimo, né?#nAh, e não esquece os juros?"
70014030-92 = "Não, foram vocês que impuseram isso!"
70014030-93 = "Então o dinheiro ainda tá todo aí?"
70014030-94 = "Gastei……"
70014030-95 = "Mesmo assim, isso é agiotagem! Não tem como pagar!"
70014030-96 = "A gente ajudou você quando tava sem grana!#nSe não tem dinheiro, paga com o corpo!!"
70014030-98 = "No Mercado Negro, chorar não adianta nada!"
70014030-100 = "Que coisa fútil."
70014030-101 = "Gente despreocupada é irrelevante……"
70014030-102 = "Mas gente arrogante e sem medo é ainda mais irritante."
70014030-105 = "Ei, você aí."
70014030-106 = "Hã? Quer grana também?"
70014030-107 = "Se não tiver nada, some!"
70014030-113 = "Hã?"
70014030-114 = "Quê?"
70014030-116 = "O-corpo――??? "
70014030-121 = "Vai dormir por uns 2 dias."
70014030-122 = "O que acontecer nesse meio-tempo―― não é da minha conta."
70014030-123 = "E também……"
70014030-127 = "Q-que foi……!?"
70014030-128 = "Haa……"
70014030-129 = "Lembra disso."
70014030-130 = "Se não consegue se proteger, uma hora você é devorado."
70014030-131 = "Essa é a lei do mundo."
70014030-133 = "Seus merdas! Vamo com tudo!!"
70014030-134 = "Não tem acordo! Só um lado sobrevive!!"
70014030-144 = "Q-quê!? Gah!"
70014030-150 = "Não façam barulho. Vão sujar minha roupa."
70014030-151 = "Só…… por causa disso――"
70014030-152 = "――qui."
70014030-156 = "[ns] \"Ei…… todo mundo tá bem, né?\""
70014030-157 = "Você se importa com isso?"
70014030-158 = "Pode ficar tranquilo.#nPra observar os sintomas, é melhor que estejam vivos."
70014030-166 = "E então?"
70014030-167 = "O que achou do Mercado Negro?"
70014030-168 = "[s] \"Ainda não sei direito……\""
70014030-169 = "Pois é. Aqui é assim."
70014030-170 = "Digamos que é…… um terreno entre doenças incuráveis e doenças raras."
70014030-171 = "Alguns desistem, outros se apegam a uma esperança frágil."
70014030-172 = "Pra mim, tanto faz."
70014030-173 = "……Não é diferente de um corpo quebrado que não responde a remédios."
70014030-174 = "[s] \"Mas quero saber mais.\""
70014030-175 = "……Você escolhe o caminho do tolo ingênuo que acredita em todas as possibilidades?"
70014030-176 = "……"
70014030-177 = "Bom, que seja. Também tem seu valor."
70014030-184 = "Ei, véia! Tá complicado……#nSe você já tá curada, tem que pagar a taxa de proteção."
70014030-185 = "A gente fez um monte de favores pra você, esqueceu?"
70014030-186 = "Vamos resolver isso na boa, ok?"
70014030-187 = "Seu……!"
70014030-191 = "[ns] \"Ué……?\""