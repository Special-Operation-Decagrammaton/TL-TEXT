[translation]
1011403-1 = "Aventura da Garçonete"
1011403-2 = "Grande local de rua comercial"

1011403-3 = "Obrigado por esperar!#nA partir de agora realizaremos o concurso de seleção de garçonetes deste mês!"

1011403-4 = "Muito obrigado por se juntar a nós hoje.#nEste torneio é-"

1011403-7 = "O que devemos fazer, Sensei!"

1011403-8 = "[s]\"Acalme-se e respire fundo primeiro...\""

1011403-9 = "mas……!#nÉ a primeira vez que estou diante de uma multidão tão grande..."

1011403-10 = "Além disso, ainda nem conheço o evento..."

1011403-11 = "Se fosse um concurso de culinária eu não conseguiria...!"

1011403-12 = "Bem, então todos!#nO que você acha que é a coisa mais importante no atendimento ao cliente em um café? ?"

1011403-13 = "É a base de todas as coisas..."

1011403-14 = "--Em outras palavras, força muscular!"

1011403-15 = "Força muscular...?"

1011403-16 = "[ns1]\"...Hein?\"\n[ns2]\"...Um desenvolvimento inesperado.\""

1011403-19 = "Sim, os cafés são um excelente exemplo de trabalho manual."

1011403-20 = "Carregando jarras e copos cheios de água e vários pratos!"

1011403-21 = "Também é necessário suprimir à força os reclamantes como os monstros que vêm ocasionalmente!"
1011403-22 = "Não importa como você faça isso, não adianta usar violência contra os clientes! ?"

1011403-23 = "[s]\"Isso mesmo!?\""

1011403-24 = "De qualquer forma, o mais importante na hora de administrar um café é a força muscular!"

1011403-25 = "Portanto, o concurso de seleção de garçonetes deste mês começará com um “teste de força”!"

1011403-26 = "O conteúdo da partida é simples!#nEste grande copo de café..."

1011403-27 = "Segure 12 xícaras, 6 em cada mão..."

1011403-28 = "Por favor, leve-o para a mesa designada!"

1011403-29 = "[ns]\"Talvez eu tenha entrado no torneio errado!?\""

1011403-30 = "Ah, 12 copos tão grandes...! ?"

1011403-31 = "Absolutamente não é possível.#nMesmo 6 peças são questionáveis... quero dizer, por que um teste muscular?"

1011403-32 = "Ouvi dizer que é um torneio famoso, mas o que está acontecendo..."

1011403-36 = "……。"
1011403-37 = "Se for esse o caso, sinto que posso fazer isso."

1011403-38 = "[s]\"Oh sério?\""

1011403-39 = "Sim, parece pesado, mas..."

1011403-40 = "Devem ser mais leves do que as batatas que você compra nas caixas da merenda escolar!"

1011403-41 = "Bem, vamos lá, Sensei!"

1011403-43 = "Parece que todos os participantes estão passando por momentos difíceis!#nExiste alguém que seria adequado para ser a garçonete deste mês?"

1011403-44 = "Ops! Juri Ushimaki!#nLevantei o copo com facilidade!"

1011403-48 = "Coloque isso naquela mesa..."
1011403-55 = "Seja criativo na forma como você o posiciona...!"

1011403-61 = "assim……!"

1011403-62 = "Que maravilha!#nNão carregue apenas copos, tenha consciência de como servir comida que parece boa!"

1011403-63 = "Estas são exatamente as habilidades necessárias para administrar um café!#nEspírito de serviço com muita atenção aos detalhes!"

1011403-65 = "Agora vamos para o próximo evento!"

1011403-66 = "Se você trabalha na indústria de alimentos e bebidas, certamente encontrará “horários de pico”."

1011403-67 = "Você provavelmente já passou pela experiência de ser apressado para entregar algo a um cliente em meio a uma enxurrada de pedidos..."

1011403-68 = "O que é necessário nesses momentos é a capacidade de tomar decisões rápidas e precisas!"

1011403-69 = "Portanto, para o segundo evento, testaremos sua memória e agilidade com o ``jogo de hastear bandeira''!"

1011403-70 = "[ns3]\"Não posso dizer que não haja relacionamento algum...\"\n[ns4]\"Tem certeza de que está tudo bem...?\""

1011403-73 = "Jogo de hastear bandeira...."

1011403-74 = "Sensei, vou tentar o meu melhor nisso também."

1011403-75 = "Mas não estou tão confiante..."

1011403-76 = "Estamos preparando 4.000 porções de merenda escolar por dia na cafeteria da Gehenna, então acho que podemos fazer algo a respeito!"

1011403-79 = "Levanta (ou ergue) vermelho."
1011403-80 = "sim!"

1011403-81 = "Eu não vou te dar branco."

1011403-82 = "Sim!"

1011403-83 = "Não deixe vermelho, dê branco."

1011403-84 = "Eu vou te dar os dois!"

1011403-85 = "Não baixe o vermelho, baixe o branco, não aumente o branco, baixe o vermelho, aumente o branco, baixe o branco, aumente o vermelho sem aumentar o branco."

1011403-86 = "Bem... vou aumentar o vermelho e diminuir o branco!"

1011403-87 = "Uau, isso é incrível... não acredito que não cometi um único erro..."

1011403-88 = "Eu me pergunto que tipo de inferno eles costumam ver..."

1011403-89 = "maravilhoso! Juri Ushimaki, nota máxima! !"

1011403-97 = "Por fim, o último evento é a “limpeza”!#nNum restaurante, um ambiente higiénico é vital!"

1011403-98 = "Para esta ocasião preparámos um robô de limpeza Millennium especial!"

1011403-99 = "É um robô de limpeza Millennium? Como funciona?"

1011403-100 = "Um pouco, estou começando a me interessar."
1011403-101 = "[ns](Espero que nada aconteça...)"

1011403-102 = "Todos os participantes, por favor, dirijam-se ao armazém!"

1011403-104 = "--Comece a limpar."

1011403-105 = "Varrer, inalar, incinerar e destruir.#nRemova, mate e finalmente desinfete."

1011403-106 = "Nem uma única mancha será tolerada."

1011403-107 = "Parecia que ouvi algum tipo de frase aterrorizante..."

1011403-108 = "Porém, esse nível de limpeza é feito todos os dias na merenda escolar."

1011403-109 = "--Vamos começar!"

1011403-112 = "Incompreensível."

1011403-113 = "Não entendo por que ele pode se mover mais rápido que esta máquina."

1011403-114 = "Perdeu o sentido da existência. A partir daqui, passaremos para a sequência de autodestruição.#n10、9、8……。"

1011403-115 = "Não!"

1011403-116 = "Por que parar?#nÉ isso que é a bondade humana?"

1011403-117 = "Se se autodestruir, o armazém ficará sujo novamente!"

1011403-118 = "……。"
1011403-119 = "entendido.#nPare a sequência de autodestruição."

1011403-121 = "Obrigado por esperar!#nFinalmente estamos anunciando os vencedores do concurso de seleção de garçonetes deste mês!"

1011403-122 = "A melhor garçonete deste mês é...!"

1011403-123 = "――é a jogadora Ushimaki Juri！！！"
1011403-130 = "[ns]\"Parabéns, Julie! Você conseguiu!\""

1011403-131 = "Eu consegui, senhor! Eu realmente não acredito que posso vencer...!#nTudo graças ao Sensei!"

1011403-135 = "Porém, é só agora..."

1011403-136 = "Sinto que houve alguns eventos que não tiveram nada a ver com o trabalho de garçonete..."

1011403-137 = "...Isso foi realmente uma coisa boa?"

1011403-139 = "(Depois recebemos o troféu e os prêmios vencedores e voltamos juntos para casa.)"

1011403-140 = "(Parece ser um torneio famoso...)"

1011403-141 = "(...eu realmente não entendi até o final)"

