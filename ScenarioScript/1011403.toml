[translation]
1011403-1 = "ウェイトレスの冒険"
1011403-2 = "商店街大会場"
1011403-3 = "お待たせしました！#nこれより、今月のウェイトレス選抜大会を開催いたします！"
1011403-4 = "本日は、お集まりいただき誠にありがとうございます。#nこの大会は――"
1011403-7 = "ど、どどどど、どうしましょう、先生！"
1011403-8 = "[s] \"落ち着いて、まず深呼吸を……。\""
1011403-9 = "でも……！#nこんな大勢の前で立つのは初めてで……。"
1011403-10 = "それに、まだ種目すら分かっていませんし……。"
1011403-11 = "もし料理コンテストだったら、私の腕では……！"
1011403-12 = "では皆さん！#nカフェの接客において、一番大事なものは何だと思いますか！？"
1011403-13 = "それは、すべての物事において根本となるもの……。"
1011403-14 = "――即ち、筋力です！"
1011403-15 = "き、筋力……？"
1011403-16 = "[ns1] \"……あれ？\"\n[ns2] \"……予想外の展開に。\""
1011403-19 = "ええ、カフェは力仕事の代表例です。"
1011403-20 = "水がいっぱい入ったピッチャーやグラスに、いくつものお皿を運んだり――！"
1011403-21 = "たまにいらっしゃるモンスターのようなクレーマーを武力で制圧する必要もあります！"
1011403-22 = "いくら何でも、お客様に暴力を振るうのはダメですよ！？"
1011403-23 = "[s] \"そうだよね！？\""
1011403-24 = "とにかく、カフェの運営で最も大事なのは筋力！"
1011403-25 = "よって、今月のウェイトレス選抜大会は、「筋力テスト」から始めます！"
1011403-26 = "試合の内容は簡単！#nこちらのコーヒー入り大型グラスを……。"
1011403-27 = "片手で6杯ずつ、計12杯を持ち上げて……。"
1011403-28 = "指定したテーブルまで運んでください！"
1011403-29 = "[ns] \"参加する大会、間違えちゃったかな！？\""
1011403-30 = "あ、あんな大きいグラスを12個も……！？"
1011403-31 = "絶対に無理よ。#n6個ですら怪しいし……ていうか、なんで筋力テスト？"
1011403-32 = "有名な大会って聞いたのに、どうなってるの……。"
1011403-36 = "……。"
1011403-37 = "あれでしたら、いけるような気がします。"
1011403-38 = "[s] \"え、本当？\""
1011403-39 = "はい、たしかに重そうではありますが……。"
1011403-40 = "給食部で箱買いしているジャガイモより、軽いはずですから！"
1011403-41 = "では、行ってきますね、先生！"
1011403-43 = "参加者の皆さん、中々苦労してるようですね！#n今月のウェイトレスに相応しい人物はいないのでしょうか！"
1011403-44 = "おーっと！[ruby=うしまき]牛牧[/ruby]ジュリ選手！#nグラスを軽々と持ち上げました！"
1011403-48 = "これを、あちらのテーブルに……。"
1011403-55 = "置き方にも工夫して……！"
1011403-61 = "こう……！"
1011403-62 = "なんと素晴らしい！#n単にグラスを運ぶだけでなく、見映えの良い配膳を意識！"
1011403-63 = "これぞ、まさにカフェの運営に求められる能力！#n細かな部分まで丁寧に行き届いたサービス精神！"
1011403-65 = "では、次の種目に移りましょう！"
1011403-66 = "飲食業に従事する者なら、必ず遭遇するであろう「ピークタイム」。"
1011403-67 = "注文が殺到するなか、お客様に提供を急かされる経験、一度はあるでしょう……。"
1011403-68 = "そんな時に求められるのは、迅速で正確な判断能力！"
1011403-69 = "よって、第二種目は「旗揚げゲーム」で記憶力と敏捷性をテストしてもらいます！"
1011403-70 = "[ns3] \"まったく関係がないとは言い切れないけど……。\"\n[ns4] \"本当にこれで大丈夫なの……？\""
1011403-73 = "旗揚げゲーム……。"
1011403-74 = "先生、これも頑張ってみます。"
1011403-75 = "そこまで自信があるわけではありませんが……。"
1011403-76 = "ゲヘナの食堂で1日4000人前の給食を作ってますし、何とかなると思います！"
1011403-79 = "赤あげて。"
1011403-80 = "はい！"
1011403-81 = "白あげない。"
1011403-82 = "はいっ！"
1011403-83 = "赤さげないで、白あげて。"
1011403-84 = "両方あげます！"
1011403-85 = "赤さげないで白さげて、白あげないで赤さげて、白あげて、白さげて、白あげないで赤あげて。"
1011403-86 = "えっと……赤をあげて白さげます！"
1011403-87 = "す、すごい……1個もミスがないだなんて……。"
1011403-88 = "いったい、普段どんな地獄を見ているのかしら……。"
1011403-89 = "素晴らしい！牛牧ジュリ選手、満点です！！"
1011403-97 = "いよいよ最後の種目は「お掃除」です！#n飲食店において、衛生環境は命ですからね！"
1011403-98 = "今回のために、特別なミレニアム製の掃除ロボットをご用意しました！"
1011403-99 = "ミレニアム製の掃除ロボットですか、性能はどうなっているのでしょう。"
1011403-100 = "ちょっと、気になってきました。"
1011403-101 = "[ns] （何も起きないと良いけど……）"
1011403-102 = "それでは参加者の皆さん、倉庫まで移動してください！"
1011403-104 = "――掃除を開始します。"
1011403-105 = "掃いて吸い込んだら、焼却して破壊します。#n除去し抹殺し、最後に消毒します。"
1011403-106 = "汚れは一つたりとも許しません。"
1011403-107 = "な、何だか恐ろしいセリフが聞こえたような……。"
1011403-108 = "で、でもこの程度の掃除でしたら、給食部でも毎日やってますから。"
1011403-109 = "――始めます！"
1011403-112 = "理解不能。"
1011403-113 = "どうして本機より素早く動けるのか、分かりません。"
1011403-114 = "存在意義を喪失。これより、自爆シーケンスへ移行します。#n10、9、8……。"
1011403-115 = "ダメです！"
1011403-116 = "どうして止めるのですか？#nこれが人間の優しさ、というものですか？"
1011403-117 = "自爆したら倉庫がまた汚れてしまいます！"
1011403-118 = "……。"
1011403-119 = "理解しました。#n自爆シーケンスを停止します。"
1011403-121 = "大変お待たせしました！#nいよいよ、今月のウェイトレス選抜大会の優勝者を発表いたします！"
1011403-122 = "今月の最優秀ウェイトレスは……！"
1011403-123 = "――牛牧ジュリ選手です！！！"
1011403-130 = "[ns] \"おめでとう、ジュリ！やったね！\""
1011403-131 = "やりました、先生！本当に優勝できるなんて……！#nすべて先生のおかげです！"
1011403-135 = "ただ、今さらですが……。"
1011403-136 = "ウェイトレスの仕事とは関係ない種目もあった気がしますが……。"
1011403-137 = "……本当に、これで良かったのでしょうか？"
1011403-139 = "（その後、優勝トロフィーと賞品を受け取り、一緒に帰った）"
1011403-140 = "（有名な大会らしいが……）"
1011403-141 = "（……最後まで、よく分からなかった）"
