[translation]
13170-1 = "第17話;追跡"
13170-5 = "……良いでしょう。 "
13170-6 = "次は[USERNAME]先生……あなたのターンです。"
13170-7 = "ゲームとは、攻守が入れ替わるもの。 "
13170-8 = "もちろん、防戦一方でいるつもりはありませんがね。#nヒッ、ヒヒヒッ……。"
13170-9 = "このキャンペーンは、あくまでも小生の求道。#n実験でも研究でも、儀式でもないですから。#nルールに縛られる必要性もないのです。"
13170-10 = "攻略法3つ目――「心は予測も制御もできない」。"
13170-11 = "欲望や罪悪、恐怖、執念、悲嘆……。"
13170-12 = "……それらが衝突し生み出された混沌が、#nあなたの前にのしかかってくることでしょう。"
13170-16 = "さて、プレイヤーとなったあなたが、どう攻略していくのか見ものです。"
13170-19 = "本作で登場する法解釈は実際のものとは#n一切関係のないフィクションです。"
13170-24 = "[ns] \"ノノミの位置が分かったよ。\""
13170-25 = "どこですか！？"
13170-26 = "[ns] \"アビドス中央駅旧庁舎。\" "
13170-27 = "そこは……。"
13170-28 = "債権者団体の総会が開催される場所。 "
13170-29 = "二手に分かれることも想定していましたが……#n助かりましたね。"
13170-30 = "ありがとう、先生。"
13170-31 = "これでホシノ先輩の捕獲、契約の継続、ノノミの救出……#n全部まとめて解決できる。"
13170-33 = "やっぱり、先生はすごいわね。"
13170-34 = "うん。セリカがヘルメット団に連れて行かれた時も、#nこうやって先生が助けてくれた。"
13170-35 = "い、いつの話よ！#nもう忘れてってば！"
13170-36 = "……だって、心配だったから。"
13170-37 = "そう言われると、ちょっと恥ずかしいわね……。"
13170-39 = "あはは……#nでも、本当に驚いたんだよ？"
13170-40 = "ん、ホシノ先輩が内心一番焦ってた。"
13170-41 = "先生にお願いするって言って、一人で出ていっちゃうくらい。"
13170-42 = "それ、本当……？"
13170-43 = "[ns1] \"それだけセリカのことが大事なんだよ。\"\n[ns2] \"普段は言葉にしてないみたいだけど。\""
13170-48 = "電話はしてみました？"
13170-49 = "……はい。でも数時間前から、電源が入ってないみたいで……。"
13170-50 = "バイト先では定時に店を出たみたい。その後、家に帰ってないってことかな。"
13170-51 = "こんな遅くまで帰らないなんてこと、これまでなかったですよね……？"
13170-52 = "まさか……ヘルメット団の連中？"
13170-53 = "えっ！？ヘルメット団がセリカちゃんを……！？"
13170-54 = "とりあえず待とう。ホシノ先輩と先生が調べてるから。"
13170-55 = "……。"
13170-57 = "（ガチャッ）"
13170-58 = "みんな、お待たせー。"
13170-59 = "ホシノ先輩！先生！"
13170-60 = "[s] \"ただいま。\""
13170-61 = "どうだった、先輩？"
13170-62 = "先生が持ってる権限を使って、連邦生徒会が管理するセントラルネットワークにアクセスできた。"
13170-63 = "セントラルネットワークに……#n先生、そんな権限までお持ちなのですね……。"
13170-64 = "うへ～もちろんこっそりだけどね。バレたら始末書だよー？"
13170-67 = "そうだったんだ……。"
13170-68 = "先輩は、わざわざ言わなかったけど。"
13170-69 = "……何だか、すごく昔のように感じますね。"
13170-70 = "ん。"
13170-71 = "……ありがとう、みんな。"
13170-73 = "[ns] \"先生として当然だよ。\""
13170-78 = "AM 08:5X"
13170-80 = "では、会議を始めます！"
13170-84 = "私たちは、アビドス中央駅旧庁舎で開催される#n「債権者団体の総会」に出席しなければなりません。#nタイムリミットは、本日正午。"
13170-85 = "目標は、捕らわれているノノミ先輩の救出。"
13170-86 = "そして、ホシノ先輩がアビドス生徒会の存在を否定する前に、#n対策委員会の正当性を主張します。"
13170-87 = "了解、生徒会長。"
13170-88 = "……。"
13170-89 = "どうしたのよ、アヤネちゃん。#n生徒会長なんだから、早く慣れないと。"
13170-90 = "わ、私が生徒会長になったのは、あくまでも契約のためで……。"
13170-91 = "[s3] \"アヤネ会長の力を見せてやろう！\"\n[s4] \"任せたよ、アヤネ会長。\""
13170-94 = "……総会で発言する必要があるため、今回は私も現場へ向かいます。"
13170-96 = "あっ、誤魔化した。"
13170-97 = "逃げた。"
13170-99 = "次の作戦会議に移ります！"
13170-100 = "現在、アビドス中央駅に続くルートは、#n私募ファンドの兵力によって封鎖されています。"
13170-102 = "中央駅旧庁舎・東地区"
13170-103 = "東地区は、ふわふわヘルメット団が守っています。"
13170-104 = "単体の戦力はさておき、数が圧倒的です。"
13170-105 = "時間が限られている以上、このルートは避けましょう。"
13170-107 = "中央駅旧庁舎・西地区"
13170-111 = "西地区は、マーケットガードが集中しています。"
13170-112 = "戦闘ヘリやタンク、強力な重火器を使用している可能性が高いです。"
13170-113 = "戦術的な優位に立てない限り、ここも避けたいですね。"
13170-115 = "中央駅旧庁舎・南地区"
13170-117 = "南地区は、黒亀組です。"
13170-118 = "無人砲塔を大量に保有しているため、容易には近づけないかと……。"
13170-120 = "中央駅旧庁舎・北地区"
13170-123 = "北地区は雇われ傭兵の集まりと思われますが、#n特殊なバリケードが設置されているようです。"
13170-124 = "戦闘能力はそれほど高くありませんが、#n通常の装備で突破するのは困難でしょう。"
13170-127 = "……どのルートにしよう。"
13170-128 = "ホシノ先輩が通る場所にすれば良いんじゃないの？"
13170-129 = "となると、先輩の立場で考える必要が……。"
13170-130 = "シロコ先輩なら分かるでしょ！"
13170-132 = "んー……。"
13170-133 = "そうですね……#nシロコ先輩から見て、どのルートだと思いますか？"
13170-134 = "……ホシノ先輩の強さは、白兵戦。"
13170-135 = "昔は、もっと自分の身を顧みない戦闘スタイルだったって聞いた。"
13170-136 = "たぶん、大量の重火器を持った相手との戦いにも慣れているはず。"
13170-137 = "だから……。"
13170-142 = "中央駅旧庁舎・西地区"
13170-146 = "誰だ！"
13170-154 = "あ、あいつは……！"
13170-155 = "来たぞ、[ruby=たかなし]小鳥遊[/ruby]ホシノだ！"
13170-164 = "ど、どこへ行った！？"
13170-188 = "……西地区だと思う。"
13170-189 = "それじゃ、行くわよ！"
13170-196 = "全兵力を小鳥遊ホシノに集中させろ！"
13170-197 = "総会が始まるまで、絶対に通すな！"
13170-199 = "はっ、はい！"
13170-204 = "……またヘリ？"
13170-207 = "ターゲットの位置を確認！"
13170-208 = "6時の方向です！！"
13170-213 = "ターゲット確認、ロックオン。"
13170-219 = "AGM-114空対地ミサイル、発射！"
13170-226 = "ターゲットに命中！"
13170-231 = "なっ……！？"
13170-239 = "こちらに向かってきます……！"
13170-240 = "なに言ってんだよ。#nこっちは空中に――"
13170-248 = "ど、どこに消えた！？"
13170-249 = "し、下です！#nヘリの足にぶら下がっています！"
13170-255 = "う、うああっ！？"
13170-264 = "何が起きてるんだ……。"
13170-269 = "くっ……。"
13170-274 = "失敗したようですね。"
13170-276 = "黙れ、ネフティス！"
13170-288 = "何の真似でしょうか？"
13170-289 = "お前たちの企みなど、とっくに知っている。"
13170-290 = "企み、ですか……。"
13170-291 = "[ruby=われわれ]私募ファンド[/ruby]を裏切ろうとしているのだろう？"
13170-304 = "か、カイザーPMC！？"
13170-310 = "言葉には気をつけてください。"
13170-311 = "列車砲は、最初から私たちの物です。"
13170-317 = "や、やれっ！"
13170-331 = "こ、この音は……？"
13170-333 = "……。"
13170-338 = "中央駅旧庁舎・西地区"
13170-348 = "と、捕らえろ！"
13170-357 = "AM 09:4X"
13170-360 = "どうなってるのよ、これ！"
13170-361 = "ホシノ先輩は……。"
13170-366 = "……見つけました、600m先です！"
13170-367 = "700m、750m……どんどん遠ざかっています！"
13170-369 = "は、速すぎない……！？"
13170-370 = "追いかける。"
