33245-5 = "Sinto-me extremamente envergonhada por ter lhe mostrado algo tão incompleto, mas irei completá-lo em breve."
33245-6 = "O Black Suit estava certo... Normalmente não consigo concordar com ele, mas neste caso, não tenho escolha a não ser agradecer."
33245-7 = "......Então, Sensei [USERNAME]. Estarei ansiosa pelo momento em que nos encontraremos novamente."
33245-8 = "Novamente, em um sonho."
33245-13 = "Depois disso, procurei por todos do Esquadrão Arius, mas no fim não consegui encontrá-los."
33245-14 = "Devem ter fugido por algum dos túneis subterrâneos do Antigo Tabernáculo, mas não consegui determinar qual..."
33245-16 = "*Cof, cof...!*"
33245-17 = "L-Líder, você está bem...?"
33245-18 = "......E então, para onde vamos?"
33245-19 = "......Não podemos voltar para o distrito autônomo. Ela vai nos matar..."
33245-20 = "......Bem, acho que esse tipo de fim também não é tão ruim."
33245-21 = "I-Isso parece doloroso... mesmo que não fosse, daqui para frente, para sempre..."
33245-22 = "Sim, porque a vida é assim."
