[translation]
33245-3 = "……."
33245-4 = "Agradeço do fundo do coração, Sensei."
33245-5 = "Tê-la mostrado em forma incompleta me ruboriza, mas hei de completá-la em breve."
33245-6 = "Era como o homem de preto dizia…… normalmente não simpatizo muito com ele, mas, quanto a isto, não há como não agradecer."
33245-7 = "……Pois bem, Sensei [USERNAME]. Aguardo, ansioso, a hora de revê-lo."
33245-8 = "Até lá, nos sonhos."
33245-13 = "Depois disso, procurou-se o pessoal do Squad de Arius, mas, no fim, não foram encontradas."
33245-14 = "Devem ter fugido por algum dos corredores subterrâneos da catedral antiga, mas nem isso se pôde determinar……."
33245-16 = "Cof, cof……!"
33245-17 = "V-você tá bem, Líder……."
33245-18 = "……E aí, pra onde a gente vai?"
33245-19 = "……Pro distrito autônomo não dá pra voltar. Ela vai…… nos matar……."
33245-20 = "……Bom, até que não seria um fim ruim."
33245-21 = "I-isso parece sofrido…… e, mesmo sem isso, daqui pra frente, pra sempre……."
33245-22 = "Sim; porque a vida é isso."
33245-30 = "……."
33245-32 = "Próximo Episódio;Epílogo"
