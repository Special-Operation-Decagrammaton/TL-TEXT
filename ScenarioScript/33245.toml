[translation]
33245-3 = "……。"
33245-4 = "Deixe-me agradecer do fundo do coração, Sensei."
33245-5 = "É extremamente vergonhoso ter me mostrado a você em um estado tão incompleto, mas eu irei completá-lo em breve."
33245-6 = "O Kurokawa estava certo... Embora eu raramente concorde com ele, neste caso, não tenho escolha a não ser agradecer."
33245-7 = "……Então, Sensei [USERNAME]. Ficarei ansiosamente esperando pelo momento em que poderemos nos encontrar novamente."
33245-8 = "Até lá, em seus sonhos."
33245-13 = "Depois disso, procurei pelo pessoal do Esquadrão Arius, mas não consegui encontrá-los de jeito nenhum."
33245-14 = "Eles devem ter escapado por alguma das passagens subterrâneas da Antiga Catedral, mas não consegui identificar qual..."
33245-16 = "Cof, cof...!"
33245-17 = "V-você está bem, Líder...?"
33245-18 = "……E então, para onde vamos?"
33245-19 = "……Não podemos voltar para a Zona Autônoma. Ela vai nos matar..."
33245-20 = "……Bem, esse tipo de final não é tão ruim assim."
33245-21 = "I-isso parece doloroso... Mesmo que não fosse, daqui para frente, para sempre..."
33245-22 = "Sim, porque é assim que a vida é."
33245-30 = "……。"
33245-32 = "Próximo episódio: Epílogo"
