[translation]
90001180-1 = "第18話;夜明け"
90001180-10 = "アイン、ちょっと！せっかくお姉様が来たのに、あんたが先に倒れてどうするの！"
90001180-11 = "……先に倒れてくれて助かりました。#n私も危うかったので。"
90001180-28 = "こんにちは、アイン。"
90001180-29 = "！！！"
90001180-31 = "それから、ソフ。"
90001180-32 = "はい！"
90001180-34 = "そして、オウル。"
90001180-35 = "……こんにちは、お姉様。"
90001180-40 = "マルクトお姉様ぁ～！！！"
90001180-41 = "わ、私たちの名前、覚えててくれたんですね……！"
90001180-42 = "忘れちゃってたらどうしようって不安だったけど、良かった！"
90001180-43 = "ふっふっふ……お姉様が目覚めたということは……これで全ては私たちの意のままです！"
90001180-45 = "我は何をすれば良いのですか？"
90001180-47 = "な、何もしなくていいです！#nお姉様は……ただ、そこにいてくだされば。"
90001180-48 = "そう！最高のエンジニアで、科学者で、万能の――"
90001180-49 = "私たちがいますからね……！"
90001180-50 = "全て私たちにお任せください！"
90001180-51 = "えっと……あらためて自己紹介を……#n肉体面のサポートと装備の管理を担当しているアインです。#nその……機械、好きですか？私は大好きです、えへへ……。"
90001180-52 = "私はソフ！武装システムを管理しているよ。#n誰かが変なことを言ったら、私に任せて。"
90001180-53 = "私はオウル。全体の管理をしております。#nふふ……誰もお姉様に手出しできないようにしますので、ご安心ください。"
90001180-57 = "それでは……。"
90001180-58 = "次は……！"
90001180-59 = "お、お姉様が嫌じゃなければ……その、えっと……。"
90001180-64 = "純粋な疑問なのですが……。"
90001180-65 = "あなたたちは我のことを、既に知っているはずでは？"
90001180-67 = "そ、そうですが……。"
90001180-68 = "あ～、なんて言うのかな。"
90001180-69 = "お姉様の声で直接聞きたいのですよ、ふふっ。"
90001180-71 = "……。"
90001180-72 = "そのような要請なのであれば、理解はできませんが受け入れましょう。"
90001180-73 = "改めて――我はマルクト。"
90001180-74 = "デカグラマトン10番目の預言者。"
90001180-75 = "世界の果てに到達せし王国の巡礼者――最後のセフィラであり、願い。#n一つの道に集まりし旅路の地平。"
90001180-80 = "ああ……10番目の道は、眩い知性で……。"
90001180-81 = "それは全土を照らす光……！"
90001180-82 = "そして全ての者は――世界の果てに到達せし王国の巡礼者を崇拝するでしょう！"
90001180-83 = "お姉様ぁ～！"
90001180-90 = "……？"
90001180-91 = "あ、ずるい！私もお姉様になでなでしてもらう！"
90001180-92 = "お姉様、私も！"
90001180-93 = "ふぁあ……。"
90001180-95 = "あ、あうぅ……。"
90001180-100 = "……。"
90001180-107 = "ええっ……いいんですか？"
90001180-108 = "さあ……。"
90001180-109 = "お姉様……！#nえへっ、えへへっ……。"
90001180-111 = "……アイン、ずるい。"
90001180-112 = "ずるいですね。"
90001180-113 = "私もお姉様に抱きしめられたいのに。"
90001180-114 = "やはり、抱きしめるだけでなく抱きしめ返してほしいですからね……！"
90001180-115 = "私も、私も！"
90001180-116 = "人生とは、公平であるべきですから……ふふ。"
90001180-118 = "あうぅ、えっと、その……。"
90001180-119 = "お姉様……？"
90001180-120 = "……。"
90001180-121 = "ソフ、オウル。"
90001180-123 = "う、うん！"
90001180-124 = "私たちはいつでも大丈夫ですよ！#nさあ、お姉様……！"
90001180-126 = "アインが困っています。"
90001180-127 = "めっ、ですよ。"
90001180-129 = "ええっ！？"
90001180-130 = "うぅ……お姉様に怒られました……。"
90001180-132 = "そこまで落ち込むなんて……。"
90001180-135 = "お姉様も無事目を覚ましたし、次に進む時だよ！"
90001180-136 = "は、はい！次……ですか？"
90001180-137 = "ふーん？それで、何をするんですか？"
90001180-138 = "何って……。"
90001180-144 = "宣戦布告だよ！"
90001180-145 = "宣戦？"
90001180-146 = "布告？"
90001180-147 = "また人間の無意味な行動を模倣しているんですか……？"
90001180-152 = "無意味なことじゃないはずだけど！？なんだっけ……条約ってヤツ！"
90001180-153 = "その条約自体が無意味だという話ですよ。"
90001180-154 = "う、うっ……！"
90001180-155 = "わ、私は……いいと思いますよ……？"
90001180-156 = "アイン……！"
90001180-157 = "くっ！アインがソフの魔の手に……！"
90001180-158 = "ちょっと。"
90001180-159 = "その……私たちにとっては意味がないことでも、向こうにとってはそうじゃないかもしれませんし……？"
90001180-160 = "に、人間と交流するのは……ちょっと、怖いですけど……。"
90001180-162 = "アインもこう言っていますし、ソフの言う通りにしてみてはどうでしょう？"
90001180-168 = "まあ……お姉様とアインがそう言うのなら、付き合ってあげないこともないです。"
90001180-169 = "では、宣戦布告だか何か知りませんが……準備をしましょうか！"
90001180-170 = "は、はい……！#nソフが詳しいみたいですから、ま、任せます……！"
90001180-171 = "うん、私を信じて！"
90001180-174 = "ふぅ……。"
90001180-175 = "大変だったけど、何とかなって良かった。"
90001180-176 = "お疲れ様でした、本当に骨が折れる作業でしたね。"
90001180-177 = "完成したので、一応やりがいは感じていますが……。"
90001180-178 = "……本当に、これで良いんですか？"
90001180-179 = "あれ？何か問題あった？"
90001180-180 = "個性的なデザインで良いと思うけど。"
90001180-181 = "設計を主導したのは会長でしょ、何か言ってよ。"
90001180-186 = "……私はアバンギャルドで良いと思うのだけれど。"
90001180-190 = "……。"
90001180-191 = "[s] \"感想とかある……？\""
90001180-195 = "……。"
90001180-196 = "データに戻ります。"
90001180-197 = "ダメだよ、ケイ。#nせっかくみんなで作ったんだから。"
90001180-198 = "この車輪の構造とか特によくできてると思う。#n二足歩行はどうしても非効率的になるからね。"
90001180-199 = "それに、いざとなったら飛べるブースターをつけるなんて……リオ会長らしい、合理性の極みだね。"
90001180-200 = "そうです、ケイ。逃げたら負けですよ。"
90001180-201 = "意味を分かって言ってるんですか？"
90001180-202 = "正直、よく分かっておりませんが。"
90001180-203 = "ちょっと！ヒマリたちも何か言ってください！#n何ですか、これは！"
90001180-205 = "……用事を思い出しましたので、お先に失礼します。"
90001180-210 = "逃げるのですか！"
90001180-212 = "[ruby=アバンギャルド]前衛的[/ruby]ね……。"
90001180-213 = "あなたが設計したんですよね！？"
90001180-214 = "[s1] \"……お、落ち着いて、ケイ。\"\n[s2] \"動けるようになって良かったね……？"
90001180-217 = "全部先生のせいです！"
90001180-218 = "[s] \"なんで！？\""
90001180-223 = "さて、そろそろ準備しないと。"
90001180-224 = "何の準備ですか？#nなんだか不吉な予感が……。"
90001180-225 = "うん？アリスに会う準備だよ。"
90001180-226 = "……！"
90001180-227 = "本当にデータに戻ってはダメですか……？"
90001180-228 = "ダメです。誰よりも可愛いアリスが悲しんでしまいます。"
90001180-229 = "こんな時だけまともなことを……！"
90001180-233 = "よいしょっと！なんとなくベース周辺のマッピングはできたね！"
90001180-234 = "うぅ、そろそろ寒くなってきたし戻ろうよ……。"
90001180-235 = "わたしも、賛成……くしゅんっ！"
90001180-236 = "たしかに寒いけど……。"
90001180-237 = "もう少し、待とうよ。"
90001180-238 = "どうしてですか、モモイ？"
90001180-239 = "ケイの新しい身体、もうちょっとでしょ？"
90001180-240 = "うぅ、中で待ってても良いんじゃないかな……。"
90001180-241 = "ダメだよ、ユズ！#nはじめが肝心なんだから！"
90001180-242 = "言いたいことは分かるけど……。"
90001180-248 = "あ、先生から連絡きた！"
90001180-249 = "……。"
90001180-250 = "――時は来たれり。"
90001180-251 = "アリス、準備は良い？"
90001180-257 = "……はい、大丈夫です。"
90001180-261 = "[ns] \"おかえり、寒かったよね？\""
90001180-265 = "もうこんなに冷えちゃったよ！"
90001180-271 = "それで、完成したんだよね……？"
90001180-272 = "[s] \"うん、できたよ。\""
90001180-273 = "えっと……いつ、会えますか？"
90001180-277 = "[ns] \"今すぐだよ！\""
90001180-286 = "……。"
90001180-287 = "……。"
90001180-288 = "…………！"
90001180-289 = "……ぷっ！"
90001180-290 = "あははっ！何その姿！誰が作ったのかは分かったけど、いくら何でもこれは！#nあははははっ！"
90001180-292 = "う、ううっ……！"
90001180-293 = "お、お姉ちゃん、そんなに笑っちゃ……っ、ぷふっ！#nごめん、ケイちゃん！"
90001180-294 = "……あ、えっと……その、個性的だね？"
90001180-299 = "……先生。"
90001180-300 = "[s] \"……どうしたの？\""
90001180-301 = "もういっそ、殺してください。"
90001180-302 = "[s3] \"そんなに落ち込まないで……。\"\n[s4]\"私は素敵だと思うよ！\""
90001180-309 = "ケイ……。"
90001180-310 = "お、王女よ……。"
90001180-311 = "……申し訳ありません。"
90001180-312 = "こんな姿でお会いすることになってしまって……。"
90001180-313 = "アリスは今のケイの姿も素敵だと思います！"
90001180-319 = "それに、どんな姿でもケイに変わりはありませんから。"
90001180-320 = "……！"
90001180-321 = "おかえりなさい、ケイ。"
90001180-322 = "はい、王女……ただいま帰りました。"
90001180-323 = "これからは……できれば、アリスと呼んでください。"
90001180-324 = "しかし、王女よ……。"
90001180-325 = "少しずつでも良いですから、ダメですか？"
90001180-326 = "……。"
90001180-327 = "分かりました……。"
90001180-328 = "……あ、アリス。"
90001180-329 = "はい、ケイ！"
90001180-330 = "本当に、ありがとうございます。"
90001180-333 = "……。"
90001180-334 = "あなたも覗いているとは思いませんでした。"
90001180-335 = "……私が設計者だもの。意図通りに動いているか確認をしているだけよ。"
90001180-336 = "あら？普段はシミュレーションを十全に行えば、それで良いとか言っていませんでしたっけ？"
90001180-337 = "……。"
90001180-338 = "一度しか言いません。"
90001180-339 = "何のことかしら？"
90001180-340 = "これは――あなたのおかげです。"
90001180-341 = "ヒマリ……。"
90001180-342 = "このキヴォトスに、私以上の天才などいません。#nあなたを上だと認めることはないでしょう。"
90001180-343 = "だからといって、あなたの成果を貶すつもりはありません。#nそれは、学者としてあってはならない姿勢ですから。"
90001180-344 = "……もちろん、ケイのデザインに思うところはありますが。"
90001180-345 = "それも含めて、リオの成果です。"
90001180-346 = "……そうね。"
90001180-347 = "こほん……。"
90001180-351 = "皆さん、そろそろベースに戻りましょう！"
90001180-352 = "お風呂も焚いてありますから、順番に入ってくださいね。#n風邪を引いてはいけません。"
90001180-354 = "さすが、よく分かってる！"
90001180-355 = "ありがとうございます、ヒマリ先輩。"
90001180-356 = "お、お気遣いありがとうございます……。"
90001180-358 = "暗くなってきたので、外出する際は注意してくださいね。"
90001180-359 = "氷河の夜は酷寒です。防寒装備の着用をお忘れなく。"
90001180-360 = "分かりました、ヒマリ先輩！"
90001180-361 = "この時間は私でも寒いと感じるくらいだから、みんなも気をつけて。"
90001180-362 = "……驚きました、あなたにそんな概念あったのですね。"
90001180-363 = "さて、これからの日程を考えないと――"
90001180-367 = "リオ、今のは……！？"
90001180-369 = "ええ、私も確認したわ。"
90001180-371 = "どうしたの部長？#nなにか起きてるの？"
90001180-372 = "リオ様、私たちにも共有を……！"
90001180-382 = "……緊急事態です。#n皆さん、配置に戻ってください。"
90001180-383 = "わ、私たちは！？"
90001180-384 = "皆さんは、そこに座って待っていてください。"
90001180-385 = "一体、何が起きているのですか……？"
90001180-390 = "結論から言うと、新しい預言者の信号よ。"
90001180-391 = "「多次元バリア」を確認した地点と座標が一致しています。"
90001180-392 = "あの時と違って、今回は信号を出し続けているわね。#nこれなら正体を特定できる。"
90001180-393 = "[s] \"新しい預言者の正体は！？\""
90001180-394 = "これは……。"
90001180-395 = "……デカグラマトンの7番目の預言者、「ネツァク」！"
90001180-396 = "[s] \"「ネツァク」……？\""
90001180-397 = "はい、ネツァクはセフィロトの樹の7番目で――"
90001180-399 = "部長、正体不明の通信が割り込んできたよ。"
90001180-403 = "おやおや。どこで何をしているのかと思ったら、そこにいたんですか。"
90001180-405 = "次回;鋼鉄大陸"
