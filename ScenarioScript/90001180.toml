[translation]
90001180-1 = "Episódio 18; Amanhecer"
90001180-10 = "Ein, qual é! A Irmã Mais Velha finalmente chegou, e você vai desmaiar logo agora?!"
90001180-11 = "……Foi uma sorte você ter desmaiado primeiro. #nEu também estava no meu limite."
90001180-28 = "Olá, Ein."
90001180-29 = "!!!"
90001180-31 = "E então, Soph."
90001180-32 = "Sim!"
90001180-34 = "E por fim, Owl."
90001180-35 = "……Olá, Irmã Mais Velha."
90001180-40 = "Irmã Malkuth!!!"
90001180-41 = "V-você se lembrou dos nossos nomes……!"
90001180-42 = "Eu estava tão preocupada que você tivesse esquecido, que bom!"
90001180-43 = "Fufufu…… O fato de a Irmã ter despertado significa que…… agora tudo está sob nosso controle!"
90001180-45 = "O que devo fazer?"
90001180-47 = "N-não precisa fazer nada! #nA Irmã só precisa…… apenas estar aqui."
90001180-48 = "Isso mesmo! A melhor engenheira, cientista e onipotente――"
90001180-49 = "Nós estamos aqui, afinal……!"
90001180-50 = "Deixe tudo conosco!"
90001180-51 = "Bem…… deixando as apresentações formais de lado…… #nEu sou Ein, responsável pelo suporte físico e gerenciamento de equipamentos. #nE então…… você gosta de máquinas? Eu adoro, hehe……."
90001180-52 = "Eu sou Soph! Gerencio os sistemas de armamento. #nSe alguém disser algo estranho, deixe comigo."
90001180-53 = "Eu sou Owl. Faço a gestão geral. #nFufu…… farei com que ninguém ouse tocar na Irmã, então pode ficar tranquila."
90001180-57 = "Então……."
90001180-58 = "O próximo passo……!"
90001180-59 = "S-se não for um incômodo para a Irmã…… bem, é que……."
90001180-64 = "É uma dúvida genuína, mas……."
90001180-65 = "Vocês já não deveriam saber quem eu sou?"
90001180-67 = "B-bem, sim, mas……."
90001180-68 = "Ah~, como posso dizer."
90001180-69 = "Queremos ouvir diretamente da voz da Irmã, fufu."
90001180-71 = "……."
90001180-72 = "Se esse é o pedido, embora eu não compreenda, irei aceitá-lo."
90001180-73 = "Mais uma vez―― eu sou Malkuth."
90001180-74 = "A décima profeta de Decagrammaton."
90001180-75 = "A peregrina do reino que alcançou o fim do mundo―― a última Sephirah, e o desejo. #nO horizonte da jornada reunido em um único caminho."
90001180-80 = "Ah…… o décimo caminho, com uma inteligência deslumbrante……."
90001180-81 = "É a luz que ilumina toda a terra……!"
90001180-82 = "E todos―― adorarão a peregrina do reino que alcançou o fim do mundo!"
90001180-83 = "Irmã~!"
90001180-90 = "……?"
90001180-91 = "Ah, que injusto! Eu também quero um carinho da Irmã!"
90001180-92 = "Irmã, eu também!"
90001180-93 = "Faa……."
90001180-95 = "A, auuu……."
90001180-100 = "……."
90001180-107 = "Sério…… podemos mesmo?"
90001180-108 = "Venha……."
90001180-109 = "Irmã……! #nEhe, ehehe……."
90001180-111 = "……Ein, que injusto."
90001180-112 = "É injusto mesmo."
90001180-113 = "Eu também queria ser abraçada pela Irmã."
90001180-114 = "Afinal, não quero apenas abraçar, quero ser abraçada de volta também...!"
90001180-115 = "Eu também, eu também!"
90001180-116 = "A vida deve ser justa, afinal... fufu."
90001180-118 = "Auu, bem, é que..."
90001180-119 = "Irmã mais velha...?"
90001180-120 = "..."
90001180-121 = "Soph, Owl."
90001180-123 = "S-sim!"
90001180-124 = "Nós estamos prontas a qualquer momento!#nVamos lá, irmã mais velha...!"
90001180-126 = "Ein está em apuros."
90001180-127 = "Isso não se faz."
90001180-129 = "Eeeh!?"
90001180-130 = "Uuu... a irmã mais velha me deu uma bronca..."
90001180-132 = "Ficar tão deprimida por causa disso..."
90001180-135 = "A irmã mais velha acordou em segurança, então é hora de seguir em frente!"
90001180-136 = "S-sim! Seguir em frente... quer dizer?"
90001180-137 = "Hmm? E então, o que vamos fazer?"
90001180-138 = "Como assim, o que..."
90001180-144 = "Uma declaração de guerra!"
90001180-145 = "Declaração?"
90001180-146 = "De guerra?"
90001180-147 = "Vocês estão imitando as ações sem sentido dos humanos de novo...?"
90001180-152 = "Não deveria ser algo sem sentido!? Como é que se chama... aquele tal de tratado!"
90001180-153 = "O ponto é que o tratado em si não tem sentido."
90001180-154 = "U, ugh...!"
90001180-155 = "E-eu... acho que está tudo bem...?"
90001180-156 = "Ein...!"
90001180-157 = "Droga! Ein caiu nas garras da Soph...!"
90001180-158 = "Ei."
90001180-159 = "Bem... mesmo que não tenha sentido para nós, talvez para eles não seja assim...?"
90001180-160 = "I-interagir com humanos é... um pouco assustador, mas..."
90001180-162 = "A Ein disse isso, então por que não fazemos como a Soph sugeriu?"
90001180-168 = "Bem... se a irmã mais velha e a Ein dizem isso, acho que posso acompanhar vocês."
90001180-169 = "Então, não sei se é uma declaração de guerra ou o que for... mas vamos nos preparar!"
90001180-170 = "S-sim...!#nComo a Soph parece entender do assunto, e-eu deixo com você...!"
90001180-171 = "Sim, confie em mim!"
90001180-174 = "Ufa..."
90001180-175 = "Foi difícil, mas fico feliz que tenha dado certo."
90001180-176 = "Bom trabalho, foi um trabalho realmente exaustivo."
90001180-177 = "Como está concluído, sinto que valeu a pena, mas..."
90001180-178 = "...Tem certeza de que isso está bom?"
90001180-179 = "Ué? Teve algum problema?"
90001180-180 = "Acho que o design único ficou bom."
90001180-181 = "Quem liderou o projeto foi a presidente, diga alguma coisa."
90001180-186 = "...Eu acho que está vanguardista o suficiente."
90001180-190 = "..."
90001180-191 = "[s] \"Tem alguma opinião...?\""
90001180-195 = "..."
90001180-196 = "Vou voltar para os dados."
90001180-197 = "Não pode, Kei.#nNós fizemos isso juntas, afinal."
90001180-198 = "A estrutura dessas rodas é muito bem feita, eu acho. #nAfinal, a locomoção bípede acaba sendo ineficiente."
90001180-199 = "E ainda por cima, colocar propulsores para voar em caso de emergência... é a cara da presidente Rio, o auge da racionalidade."
90001180-200 = "É isso mesmo, Kei. Se fugir, você perde."
90001180-201 = "Você sabe o que isso significa quando diz?"
90001180-202 = "Sinceramente, não faço a menor ideia."
90001180-203 = "Ei! Himari e os outros, digam alguma coisa! #nO que é isso?!"
90001180-205 = "...Lembrei-me de um compromisso, então com licença."
90001180-210 = "Você vai fugir?!"
90001180-212 = "Que vanguardista..."
90001180-213 = "Foi você quem projetou isso, não foi?!"
90001180-214 = "[s1] \"...C-calma, Kei.\"\n[s2] \"Que bom que você consegue se mover agora...?"
90001180-217 = "A culpa é toda do Sensei!"
90001180-218 = "[s] \"Por que?!\""
90001180-223 = "Bem, está na hora de me preparar."
90001180-224 = "Preparar para quê? #nSinto um pressentimento ruim..."
90001180-225 = "Hm? Para encontrar a Alice, é claro."
90001180-226 = "...!"
90001180-227 = "Não tem como eu voltar a ser apenas dados...?"
90001180-228 = "Não tem. A Alice, que é mais fofa do que qualquer outra pessoa, ficaria triste."
90001180-229 = "Logo agora você diz algo sensato...!"
90001180-233 = "Prontinho! De alguma forma, consegui mapear os arredores da base!"
90001180-234 = "Ugh, já está ficando frio, vamos voltar..."
90001180-235 = "Eu também concordo... Atchim!"
90001180-236 = "Realmente está frio, mas..."
90001180-237 = "Vamos esperar só mais um pouco."
90001180-238 = "Por que, Momoi?"
90001180-239 = "O novo corpo da Kei, já está quase pronto, né?"
90001180-240 = "Ugh, não poderíamos esperar lá dentro...?"
90001180-241 = "Não pode, Yuzu! #nA primeira impressão é a que fica!"
90001180-242 = "Eu entendo o que você quer dizer, mas..."
90001180-248 = "Ah, recebi uma mensagem do Sensei!"
90001180-249 = "..."
90001180-250 = "――O momento chegou."
90001180-251 = "Alice, está pronta?"
90001180-257 = "...Sim, estou."
90001180-261 = "[ns] \"Bem-vinda de volta, estava frio, não estava?\""
90001180-265 = "Você já está tão gelada!"
90001180-271 = "Então, ficou pronto, né...?"
90001180-272 = "[s] \"Sim, ficou pronto.\""
90001180-273 = "Bem... quando podemos nos encontrar?"
90001180-277 = "[ns] \"Agora mesmo!\""
90001180-286 = "..."
90001180-287 = "..."
90001180-288 = "…………!"
90001180-289 = "...Pfft!"
90001180-290 = "Ahahaha! Que visual é esse! Eu sei quem fez, mas, por mais que seja, isso é demais! #nAhahahaha!"
90001180-292 = "U-ugh...!"
90001180-293 = "I-irmã, não ria tanto... pfft! #nDesculpa, Kei-chan!"
90001180-294 = "...Ah, bem... é, digamos que é bem original, né?"
90001180-299 = "...Sensei."
90001180-300 = "[s] \"……O que houve?\""
90001180-301 = "Pode me matar de uma vez."
90001180-302 = "[s3] \"Não fique tão deprimida assim……。\"\n[s4]\"Eu acho que você está maravilhosa!\""
90001180-309 = "Kei……."
90001180-310 = "Ó, Princesa……."
90001180-311 = "……Peço perdão."
90001180-312 = "Ter que encontrá-la nesta forma……."
90001180-313 = "A Alice acha que a forma atual da Kei também é maravilhosa!"
90001180-319 = "Além disso, não importa a forma, você continua sendo a Kei."
90001180-320 = "……！"
90001180-321 = "Bem-vinda de volta, Kei."
90001180-322 = "Sim, Princesa…… estou de volta."
90001180-323 = "De agora em diante…… se possível, por favor, me chame de Alice."
90001180-324 = "Mas, Princesa……."
90001180-325 = "Pode ser aos poucos, não pode?"
90001180-326 = "……。"
90001180-327 = "Entendido……."
90001180-328 = "……A-Alice."
90001180-329 = "Sim, Kei!"
90001180-330 = "Muito, muito obrigada."
90001180-333 = "……。"
90001180-334 = "Não esperava que você também estivesse espiando."
90001180-335 = "……Eu sou a projetista, afinal. Só estou verificando se tudo está funcionando como planejado."
90001180-336 = "Ora? Você não costumava dizer que, se as simulações fossem feitas corretamente, isso bastava?"
90001180-337 = "……。"
90001180-338 = "Só vou dizer isso uma vez."
90001180-339 = "Do que você está falando?"
90001180-340 = "Isto é―― graças a você."
90001180-341 = "Himari……."
90001180-342 = "Não existe gênio maior que eu neste Kivotos. #nJamais admitirei que você é superior a mim."
90001180-343 = "Mas isso não significa que eu pretenda menosprezar suas conquistas. #nComo acadêmica, essa é uma postura inaceitável."
90001180-344 = "……Claro, tenho minhas ressalvas sobre o design da Kei."
90001180-345 = "Mas isso também faz parte das conquistas da Rio."
90001180-346 = "……É verdade."
90001180-347 = "Ehem……."
90001180-351 = "Pessoal, vamos voltar para a base!"
90001180-352 = "Preparei o banho, então entrem um por um. #nNão queremos que ninguém pegue um resfriado."
90001180-354 = "Como esperado, você entende tudo!"
90001180-355 = "Obrigada, Himari-senpai."
90001180-356 = "O-obrigada pela preocupação……."
90001180-358 = "Já está escurecendo, então tomem cuidado ao sair."
90001180-359 = "A noite na geleira é congelante. Não se esqueçam de usar roupas térmicas."
90001180-360 = "Entendido, Himari-senpai!"
90001180-361 = "Neste horário, até eu sinto frio, então todos, tomem cuidado."
90001180-362 = "……Surpreendente, eu não sabia que você tinha esse tipo de conceito."
90001180-363 = "Bem, preciso pensar na agenda daqui para frente――"
90001180-367 = "Rio, isso foi……!?"
90001180-369 = "Sim, eu também confirmei."
90001180-371 = "O que houve, Chefe? #nEstá acontecendo alguma coisa?"
90001180-372 = "Senhorita Rio, compartilhe conosco também……!"
90001180-382 = "……É uma emergência. #nTodos, voltem para seus postos."
90001180-383 = "E, e nós!?"
90001180-384 = "Vocês, por favor, sentem-se ali e aguardem."
90001180-385 = "O que exatamente está acontecendo……?"
90001180-390 = "Indo direto ao ponto, é um sinal de um novo profeta."
90001180-391 = "As coordenadas coincidem com o ponto onde confirmamos a \"barreira multidimensional\"."
90001180-392 = "Diferente daquela vez, desta vez ele continua emitindo um sinal. #nCom isso, podemos identificar sua verdadeira forma."
90001180-393 = "[s] \"Qual é a verdadeira forma do novo profeta!?\""
90001180-394 = "Isso é……."
90001180-395 = "……O sétimo profeta de Decagrammaton, \"Netzach\"!"
90001180-396 = "[s] \"\"Netzach\"……?\""
90001180-397 = "Sim, Netzach é a sétima sefirá da Árvore da Vida, e——"
90001180-399 = "Chefe, uma comunicação desconhecida interrompeu o sinal."
90001180-403 = "Ora, ora. Eu me perguntava onde vocês estavam e o que estavam fazendo, então era aí que vocês estavam."
90001180-405 = "Próximo episódio: Continente de Aço"
