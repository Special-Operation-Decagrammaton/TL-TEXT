[translation]
2000315-1 = "A verdade aprendida com o passado"
2000315-3 = "（Enquanto caminhava pela Trinity Square, encontrei Mashiro sentada em um banco）"
2000315-4 = "[ns1] \"Lendo alguma coisa...?\"\n[ns2]（Decidi cumprimentá-la por enquanto）"
2000315-10 = "[ns] \"Olá, Mashiro.\""
2000315-12 = "Ah, Sensei."
2000315-13 = "Você veio até Trinity? #nSe tivesse me avisado, eu teria ido cumprimentá-lo."
2000315-14 = "Bem, já que nos encontramos, não tem problema."
2000315-15 = "[s3] \"Fico feliz em te ver.\"\n[s4] \"A propósito, que tipo de livro você está lendo?\""
2000315-18 = "Ah, este aqui?"
2000315-19 = "Bem, é um pouco embaraçoso, mas..."
2000315-25 = "É um livro assim..."
2000315-26 = "Como o título sugere, ele apresenta a origem de vários provérbios e expressões idiomáticas de quatro caracteres através de histórias."
2000315-27 = "……Parece interessante?"
2000315-28 = "……."
2000315-34 = "Fufu, sim. É muito interessante!"
2000315-35 = "É tão interessante que até recomendei para a veterana Hasumi."
2000315-36 = "……Embora não pareça que ela vá ler."
2000315-37 = "[s] \"Então a Mashiro gosta desse tipo de coisa.\""
2000315-38 = "Sim. Eu gosto dos provérbios e das expressões em si, mas, acima de tudo, tenho interesse nas histórias que os originaram."
2000315-39 = "Pois essas histórias contêm lições que foram transmitidas por muito tempo."
2000315-40 = "Como diz o ditado \"olhar para o passado para vislumbrar o futuro\", #nse aprendermos com as histórias antigas, podemos encontrar o caminho para o futuro."
2000315-41 = "[s] \"Oh...!\""
2000315-42 = "E, acima de tudo, as histórias antigas contidas aqui..."
2000315-43 = "Contêm mensagens de correção do mal e retorno ao bem, e de recompensar o bem e punir o mal!!"
2000315-44 = "[s] \"De fato, existem muitas histórias assim, não é?\""
2000315-45 = "Sim, é a própria verdade de que \"a justiça vence\"."
2000315-46 = "Por isso, desde cedo, me interesso por provérbios e expressões idiomáticas."
2000315-47 = "[s5] \"Entendo.\"\n[s6] \"Agora entendo o motivo de a Mashiro gostar tanto disso.\""
2000315-55 = "Eu costumo usar provérbios até nas conversas do dia a dia, mas..."
2000315-56 = "Toda vez que faço isso, ninguém entende ou me tratam como alguém antiquada."
2000315-57 = "Mas... o Sensei me entende."
2000315-61 = "……Quer que eu te empreste? Este livro?"
2000315-62 = "Claro! Por favor, leia!"
2000315-63 = "Fufu..."
2000315-64 = "O fato de o Sensei se interessar por algo que eu gosto... é um pouco..."
2000315-65 = "……Bem……"
2000315-66 = "Como posso dizer... é um sentimento estranho..."
2000315-67 = "……E-enfim, é algo assim!"
2000315-69 = "（Depois disso, continuei conversando animadamente com Mashiro sobre provérbios e histórias antigas, e só voltei para o Schale depois de muito tempo）"
