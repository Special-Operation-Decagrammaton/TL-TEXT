[translation]
83303300200-6 = "あ、おかえりなさい。お疲れ様でした、委員長。"
83303300200-7 = "全地域のマコト像を回収、撤去しました。"
83303300200-8 = "……うん、アコもお疲れ様。対応ありがとう。"
83303300200-9 = "いえ、これくらい何ともありません。ただ……"
83303300200-10 = "あのタヌキ、いつか絶対に分からせてやります！"
83303300200-11 = "まあ、アコの気持ちも分かるけれど……"
83303300200-15 = "……今はそれどころじゃないから。"
83303300200-16 = "アコ、急いで残りの仕事を終わらせたいんだけど、手伝ってくれる？"
83303300200-18 = "はい、もちろんです！"
