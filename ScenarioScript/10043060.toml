[translation]
10043060-1 = "Episódio 6; Campo em Chamas"
10043060-3 = "Já que decidimos seguir o rastro do ruído, não há nada que possamos fazer agora, mas..."
10043060-4 = "[s] \"Que tal descansarmos um pouco?\""
10043060-5 = "Sim..."
10043060-6 = "Ficar apenas esperando assim também é cansativo..."
10043060-12 = "Beisebol é..."
10043060-13 = "...um esporte curioso, não é?"
10043060-14 = "[s] \"De que maneira?\""
10043060-15 = "O principal é que o lado que está com a bola fica na defesa."
10043060-16 = "No futebol, basquete, vôlei e outros, quando você está com a bola, você está no ataque."
10043060-19 = "No beisebol... o arremessador do lado defensivo joga a bola para o batedor do lado ofensivo —"
10043060-20 = "E o rumo da partida é decidido pela forma como o batedor rebate a bola."
10043060-23 = "Mesmo que você consiga uma rebatida, se tiver o azar de um defensor pegá-la, você está fora, e o lado defensivo pode ser pego de surpresa por uma bola rasteira e acabar cedendo uma rebatida dupla..."
10043060-24 = "Por isso, é preciso ter tanto sorte quanto habilidade..."
10043060-25 = "Eu sempre torço para que o esforço do time que apoio seja recompensado. #nMas —"
10043060-26 = "Quando acontece um erro, às vezes, quem está torcendo acaba ficando emocional."
10043060-30 = "...Acho esse aspecto curioso também."
10043060-31 = "Se gostamos tanto, por que acabamos ficando emocionais?"
10043060-32 = "[s1] \"Para que o esforço diário seja recompensado...\"\n[s2] \"Não é porque você tem esperança?\""
10043060-35 = "Com certeza... pode ser isso."
10043060-36 = "Pensando bem, Sensei, você é uma pessoa incomum."
10043060-37 = "[s] \"Eu?\""
10043060-38 = "Sobre este caso... honestamente, não acho que o Sensei tenha motivos para nos ajudar tanto assim."
10043060-39 = "É um assunto que não tem nada a ver com ninguém além dos fãs de beisebol e alguns entusiastas de chiclete —"
10043060-40 = "E ainda assim, o Sensei está sendo tão atencioso."
10043060-41 = "Por que você faz tanto por nós?"
10043060-42 = "Eu não consigo entender isso..."
10043060-43 = "Ah, e nada de dizer \"é só porque eu gosto de vocês\", hein!"
10043060-47 = "[ns] \"Entendo...\""
10043060-49 = "[ns] \"Talvez seja porque eu gosto de cuidar de todos vocês.\""
10043060-53 = "Sério? N-nós?"
10043060-54 = "[s3] \"Sim. Todos vocês são um poço de potencial.\"\n[s4] \"Eu acho que quero ver isso florescer.\""
10043060-58 = "[ns5] \"Ajudar a dar um passo em direção ao 'objetivo'.\"\n[ns6] \"Se eu puder fazer isso...\""
10043060-61 = "[ns7] \"Só isso já me deixa feliz... eu acho.\"\n[ns8] \"Digo isso de coração.\""
10043060-67 = "...Sumire-senpai."
10043060-68 = "[s] \"Hã?\""
10043060-69 = "Ah, não, é que eu achei que parece com a senpai."
10043060-70 = "...Hehe."
10043060-76 = "Obrigada..."
10043060-77 = "...É a primeira vez... que converso sobre isso..."
10043060-87 = "A defesa da parte alta da 7ª entrada terminou. Ei, troca de lados."
10043060-88 = "...! S-sim!"
10043060-90 = "Na parte baixa da 7ª entrada, nós atacamos. O placar está 18 a 21."
10043060-91 = "...Que jogo bagunçado de rebatidas, hein."
10043060-92 = "Ambos os times só têm mais um arremessador reserva. Treinador, que tipo de estratégia você usaria?"
10043060-95 = "A-ah! É melhor esgotar a energia do arremessador reserva primeiro..."
10043060-96 = "Que tal tentar ganhar tempo com uma sequência de faltas?"
10043060-97 = "Faltas!?"
10043060-98 = "Isso. Tente rebater o máximo de bolas para fora para cansar o arremessador adversário."
10043060-99 = "Se esgotar a energia dele, a força dos arremessos também diminuirá —"
10043060-101 = "……É um esforço inútil!"
10043060-105 = "Hã!?"
10043060-106 = "Por que diz isso! Se a força do arremessador adversário diminuir nas próximas 3 entradas—"
10043060-107 = "Ainda podemos aproveitar uma chance na parte baixa da 9ª entrada..."
10043060-112 = "Vocês não são rebatedores tão habilidosos assim!"
10043060-113 = "Tentar rebater um foul? Se bobear, é strikeout na certa!"
10043060-114 = "Tenham um pouco de noção, táticas comuns não funcionam com os Braves!"
10043060-115 = "U-uuh...!"
10043060-116 = "I-isso já é demais, mesmo para você!"
10043060-117 = "Já que chegamos a esse ponto, é tudo ou nada!"
10043060-118 = "Não temos escolha a não ser balançar com força total e tentar conseguir qualquer rebatida!"
10043060-119 = "E-então! Que tal tentarmos segurar com um bunt por 2 fouls...#ne depois mudar para um swing completo!?"
10043060-120 = "Um bunt que vira foul com dois strikes já é um out, então..."
10043060-121 = "Dessa forma, cada um forçaria pelo menos 3 arremessos, #ne poderíamos desgastar o arremessador adversário, pelo menos um pouco...!"
10043060-125 = "……"
10043060-126 = "Que raro, você teve uma boa ideia."
10043060-127 = "Como assim, 'que raro'..."
10043060-129 = "Tudo bem. Tentem segurar com o bunt até os dois strikes e depois busquem a rebatida!"
10043060-130 = "Desgastar o arremessador adversário enquanto buscamos pontuar..."
10043060-131 = "Isso serve! Dizem que viradas costumam acontecer na reta final, a partir da 7ª entrada!"
10043060-132 = "Sim!"
10043060-135 = "Parte baixa da 7ª entrada, ataque dos Braves, o 'Lucky Seven'. O placar está 18 a 21. Ainda há uma chance."
10043060-136 = "Pode ser surpreendente, mas os Braves sempre foram um time com uma reação feroz."
10043060-137 = "……Embora, quase sempre, falte um passo para alcançarem o objetivo."
10043060-138 = "Bem, vamos ver que tipo de jogo eles vão mostrar agora! O rebatedor dos Braves vai para o bastão!"
10043060-144 = "Essa postura é... será que eles estão tentando um bunt?"
10043060-145 = "Devem estar tentando aumentar o número de arremessos do pitcher."
10043060-150 = "Lá vem o arremesso do pitcher dos Raiders!"
10043060-151 = "Por favor...! Passe da linha de foul...!"
10043060-152 = "Ugh... estou ficando nervoso...!"
10043060-166 = "Ah! A bola foi rebatida direto para o pitcher...!#nEle pegou a bola, um eliminado! Foi um pop fly no primeiro arremesso!"
10043060-167 = "……Não tenho palavras."
10043060-168 = "Parece que teria sido melhor tentar uma rebatida de qualquer jeito..."
10043060-171 = "……"
10043060-172 = "……"
10043060-173 = "Que... situação..."
10043060-178 = "Não vou mais seguir as táticas de vocês! Façam exatamente como eu disse!"
10043060-182 = "P-Professor? Se continuar assim, vai ser um problema!"
10043060-183 = "[s] \"O que foi?\""
10043060-184 = "Desse jeito, no próximo e no outro, eles vão ser eliminados no primeiro arremesso de novo...#nOu seja, existe a chance de o turno acabar em apenas mais dois arremessos...!"
10043060-185 = "A ligação com o criminoso pode cair, e podemos perder a chance de rastrear a localização por causa do ruído...!"
10043060-186 = "[s] \"Isso é... um problema mesmo...!\""
10043060-191 = "[ns] \"Espere! É verdade que o bunt falhou, mas...!\""
10043060-195 = "Hã? Querem uma tática mais segura?"
10043060-196 = "Fazer o rebatedor pedir tempo várias vezes para quebrar o ritmo do arremessador... é?"
10043060-197 = "Talvez não seja ruim."
10043060-198 = "……"
10043060-199 = "Tudo bem. Assim, não seremos eliminados."
10043060-200 = "Certo, decidido!"
10043060-204 = "Conseguimos! Com isso, parece que vamos conseguir ganhar tempo na ligação com o criminoso!"
10043060-209 = "Braves, sinto que o número de pedidos de tempo está ficando excessivo por aqui..."
10043060-214 = "Ah, como eu suspeitava! O árbitro acaba de expulsar o batedor da partida!"
10043060-215 = "Quando os pedidos de tempo excedem o limite, podem ser considerados como obstrução da partida, afinal."
10043060-216 = "Droga...!"
10043060-221 = "Não vou mais ouvir o que vocês têm a dizer...!"
10043060-222 = "Se continuarem com essa conversa fiada, farei exatamente como avisei—"
10043060-227 = "...Sensei! Parece que conseguimos localizar o culpado...!"
10043060-233 = "Treinador, Rei-san. Sobre o paradeiro do culpado..."
10043060-234 = "[s] \"Onde!?\""
10043060-235 = "É em um assento atrás da rede de proteção...!"
10043060-236 = "[s] \"Eu sabia...!\""
10043060-237 = "Sim."
10043060-238 = "É aquele lugar que a Hanae mencionou."
10043060-239 = "Dizem que há um camarote privativo de onde se pode ver todo o estádio."
10043060-241 = "De fato, lá ninguém irá interferir."
10043060-242 = "...Vou avisar o técnico e os jogadores dos Braves também!"
10043060-244 = "(Enquanto isso, o batedor dos Braves...)"
10043060-245 = "(Como esperado, foi eliminado no primeiro arremesso pela segunda vez consecutiva, resultando na troca de lados...)"
