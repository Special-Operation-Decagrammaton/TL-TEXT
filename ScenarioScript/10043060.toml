[translation]
10043060-1 = "第6話;グラウンド炎上"
10043060-3 = "ノイズを辿ると決めた以上、今やれることはないんですが……。"
10043060-4 = "[s] \"ちょっと休もうか？\""
10043060-5 = "ええ……。"
10043060-6 = "こうして待っているだけというのも疲れますね……。"
10043060-12 = "野球って……。"
10043060-13 = "……不思議なスポーツですよね。"
10043060-14 = "[s] \"どんな風に？\""
10043060-15 = "一番は、ボールを持つ側が守備になるところですね。"
10043060-16 = "サッカー、バスケ、バレーなどは、ボールを持ったら攻撃側になるものです。"
10043060-19 = "野球は……守備側のピッチャーが、攻撃側のバッターにボールを投げ――"
10043060-20 = "バッターがどのようにボールを打つかで、試合の流れが決まるのですから。"
10043060-23 = "ヒットを打っても運悪く野手に取られればアウトですし、守備側がゴロに翻弄され、二塁打になることも……。"
10043060-24 = "だから、運も実力も必要なんですよね……。"
10043060-25 = "応援するチームには努力が報われてほしいといつも思っているんです。#nでも――"
10043060-26 = "エラーが出たら、ときには応援している側が感情的になってしまうこともある。"
10043060-30 = "……そういうところも、不思議だなって思います。"
10043060-31 = "好きなのに、どうして感情的になってしまうのでしょうか。"
10043060-32 = "[s1] \"普段の努力が報われるように……\"\n[s2] \"願っているからじゃない？\""
10043060-35 = "たしかに……そうかもしれません。"
10043060-36 = "そう思うと、先生は変わった方ですよね。"
10043060-37 = "[s] \"私？\""
10043060-38 = "今回の件……正直、ここまで手伝ってくださる理由は先生にないと思っています。"
10043060-39 = "野球ファンと、一部のガム愛好家以外には、全く関係ない話なのに――"
10043060-40 = "先生はこうして親身になってくれています。"
10043060-41 = "どうして、ここまでしてくれるんでしょう？"
10043060-42 = "それがよくわからなくて……。"
10043060-43 = "あ、「私が好きだからこうしているだけだよ」みたいなのはナシですからね！"
10043060-47 = "[ns] \"そうだね……。\""
10043060-49 = "[ns] \"みんなを見守るのが好きだから、かな。\""
10043060-53 = "ええっ？わ、私たちを？"
10043060-54 = "[s3] \"うん。みんなは可能性の塊だから。\"\n[s4] \"それが開花していくのを……見守りたいんだと思う。\""
10043060-58 = "[ns5] \"「目標」へ一歩近づくための手伝いを。\"\n[ns6] \"私ができるのなら……。\""
10043060-61 = "[ns7] \"それだけで嬉しい……かな。\"\n[ns8] \"心からそう思ってるよ。\""
10043060-67 = "……スミレ先輩。"
10043060-68 = "[s] \"えっ？\""
10043060-69 = "あっ、いや、先輩みたいだなって思いました。"
10043060-70 = "……へへっ。"
10043060-76 = "ありがとう、ございます……。"
10043060-77 = "……初めてです……こんな話をするの……。"
10043060-87 = "7回表の守備が終わったな。おい、攻守交代だぞ。"
10043060-88 = "……！え、ええ！"
10043060-90 = "7回裏で、こちらが攻撃。得点は18対21。"
10043060-91 = "……乱打戦の泥仕合じゃねぇか。"
10043060-92 = "お互い、交代できるピッチャーは残り一人。監督、お前ならどんな作戦にするんだ？"
10043060-95 = "あ、ああ！交代ピッチャーの体力を先に消耗させたほうがいい……。"
10043060-96 = "ファウル連発で粘ってみるのはどうだ？"
10043060-97 = "ファウルを！？"
10043060-98 = "そう。なるべくファウルボールを打って、相手のピッチャーを疲れさせるんだ。"
10043060-99 = "体力を消耗させれば、球威を下げることも――"
10043060-101 = "……無駄な足掻きだ！"
10043060-105 = "ええっ！？"
10043060-106 = "どうしてですか！残り3回、相手側のピッチャーの球威が下がれば――"
10043060-107 = "9回裏でチャンスを掴むことだって……。"
10043060-112 = "そんな器用なバッターじゃないだろ！"
10043060-113 = "ファウルを狙ってみろ、下手すりゃ三振だ！"
10043060-114 = "ブレーブスに普通の戦術は無理だって、少しは自覚しろよ！"
10043060-115 = "う、うぅ……！"
10043060-116 = "い、いくらなんでも言い過ぎです！"
10043060-117 = "こうなりゃもうイチかバチかだ！"
10043060-118 = "全力でスイングして、少しでもヒットさせるしかない！"
10043060-119 = "じゃ、じゃあ！ファウル2回ぶん……#nバントで粘ってからフルスイングに切り替えるのはどうでしょう！？"
10043060-120 = "スリーバントのファウルはいずれにせよアウトなので……"
10043060-121 = "これなら1人あたり最低3球は投げることになり、#n多少なりとも相手ピッチャーを消耗させられます……！"
10043060-125 = "……。"
10043060-126 = "珍しく良い案を出すじゃないか。"
10043060-127 = "珍しくって……。"
10043060-129 = "いいだろう。バントでツーファウルまで粘ってから、ヒットを狙え！"
10043060-130 = "相手のピッチャーを消耗させつつ、得点も狙う……"
10043060-131 = "それでいい！7回以降の終盤には、どんでん返しが良く起きると言うからな！"
10043060-132 = "ええ！"
10043060-135 = "7回裏、ブレーブス、ラッキーセブンの攻撃です。スコアは18対21。まだチャンスはあります。"
10043060-136 = "意外かもしれませんが、ブレーブスは昔から追い上げが激しいチームです。"
10043060-137 = "……いつも、そこからあと一歩及ばないのですが。"
10043060-138 = "さあ、今回はどのような試合を見せてくれるのか！ブレーブスのバッターが打席に立ちます！"
10043060-144 = "この構えは……バントを狙っているのでしょうか？"
10043060-145 = "ピッチャーの投球数を増やす作戦ですかね。"
10043060-150 = "さあ、レイダースのピッチャーが投げました！"
10043060-151 = "頼む……！ファウルラインを越えてくれ……！"
10043060-152 = "うっ……緊張してきた……！"
10043060-166 = "おおっと！ボールは打ちあがってピッチャー正面……！#n捕球してワンアウト！初球はピッチャーフライでした！"
10043060-167 = "……言葉が出ませんね。"
10043060-168 = "無理矢理にでも安打を狙ったほうがよかったような……。"
10043060-171 = "……。"
10043060-172 = "……。"
10043060-173 = "なんて……ことでしょう……。"
10043060-178 = "もうお前らの作戦には従わん！言った通りにしろーっ！"
10043060-182 = "せ、先生？このままではまずいです！"
10043060-183 = "[s] \"な、何が？\""
10043060-184 = "この様子だと次も、その次も同じく初球アウトになってしまいます……#nつまり、あと2球でチェンジしちゃう可能性が……！"
10043060-185 = "犯人との通話が切れて、ノイズで場所を特定できなくなってしまうかも……！"
10043060-186 = "[s] \"それは……まずいね……！\""
10043060-191 = "[ns] \"待ってください！たしかにバントは失敗しましたが……！\""
10043060-195 = "はぁ？もっと安全な作戦にしようだと？"
10043060-196 = "バッターに何度もタイムをさせて、ピッチャーの呼吸を乱す……か。"
10043060-197 = "悪くないかもな。"
10043060-198 = "……。"
10043060-199 = "いいだろう。それならアウトにはならない。"
10043060-200 = "よし、決まりだ！"
10043060-204 = "やりましたね！これで犯人との通話時間も稼げそうです！"
10043060-209 = "ブレーブス、ここに来て、タイム回数が増えすぎなような気も……。"
10043060-214 = "ああーやはり！ただいま、審判よりバッターに退場処分が下されました！"
10043060-215 = "タイムも限度を超えると、試合の妨害行為と判断される場合もありますからね。"
10043060-216 = "くっ……！"
10043060-221 = "もうお前らの言うことなど聞かん……！"
10043060-222 = "これ以上無駄口を叩くなら、予告通り――"
10043060-227 = "……先生！犯人の居場所が特定できたみたいです……！"
10043060-233 = "トレーナー、レイさん。犯人の居場所ですが……"
10043060-234 = "[s] \"どこ！？\""
10043060-235 = "バックネット裏の席です……！"
10043060-236 = "[s] \"やっぱり……！\""
10043060-237 = "ええ。"
10043060-238 = "ハナエさんの言っていたあそこですね。"
10043060-239 = "スタジアム全体が見渡せる、個室観覧席があるそうです。"
10043060-241 = "たしかに、あそこなら邪魔は入りませんね。"
10043060-242 = "……監督とブレーブスの選手たちにも知らせておきます！"
10043060-244 = "（一方、ブレーブスのバッターは……）"
10043060-245 = "（案の定、二者連続で初球アウトに倒れ、攻守交代となった……）"
