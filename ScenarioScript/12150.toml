[translation]
12150-1 = "Episódio 15; Batalha Defensiva de Abydos (2)"
12150-3 = "Guaaaaah!?"
12150-4 = "Seus cães de guarda insolentes, como ousam...!"
12150-6 = "Cala a boca, não me importa nem um pouco! O Sensei era muito mais fácil de trabalhar do que você! É só isso!"
12150-7 = "Ahaha. Trair o empregador é o básico para qualquer vilão, não é? Você nem sequer previu isso?"
12150-9 = "Pessoal da Problem Solver..."
12150-10 = "É verdade, como vilões, vocês estão tecnicamente certos."
12150-11 = "...Graças a vocês, eu recuperei o juízo. Não temos tempo para hesitar agora."
12150-12 = "É isso aí! Antes de tudo, precisamos trazer a Hoshino-senpai de volta!!"
12150-13 = "Não me importa se vocês são não oficiais ou o que quer que seja, nem se são uma organização ilegal! Isso não tem nada a ver com o agora!"
12150-15 = "Salvar a Hoshino-senpai, isso é tudo o que importa agora."
12150-16 = "Droga, resistindo inutilmente até o fim...! Como ousam...!!"
12150-17 = "[s] \"...Como ousam tocar na minha preciosa aluna.\""
12150-18 = "!!"
12150-19 = "[s] \"Vou levar a Hoshino de volta.\""
12150-20 = "N-não brinque comigo! Sensei, você não tem esse direito—"
