[translation]
12150-1 = "第15話;アビドス攻防戦（２）"
12150-3 = "ぐあああぁぁっ！？"
12150-4 = "貴様ら、飼い犬の分際でよくも……っ！"
12150-6 = "うるさいわね、そんなの知ったこっちゃないわよ！あなたなんかより先生の方が、一緒に仕事がしやすかった！それだけの話！"
12150-7 = "あはっ。雇い主を裏切ることくらい、悪党としては当然でしょ！そんなことも予想できなかったの？"
12150-9 = "便利屋の皆さん……。"
12150-10 = "そうだね、確かに悪党としては正解。"
12150-11 = "……お陰様で目が覚めました。私たちに今、こうして迷っている時間はありません。"
12150-12 = "そうだよ！何よりもまず、ホシノ先輩を取り戻さないと！！"
12150-13 = "非公認だか何だか知らないし、不法組織だって構わない！そんなことは今、何の関係もない！"
12150-15 = "ホシノ先輩を助ける、今大事なのはそれだけ。"
12150-16 = "くっ、この期に及んで無意味な抵抗を……！よくも……！！"
12150-17 = "[s] \"……よくも、私の大事な生徒を。\""
12150-18 = "！！"
12150-19 = "[s] \"ホシノのこと、返してもらうよ。\""
12150-20 = "ふ、ふざけるな！先生、貴様にそんな権利が――"
