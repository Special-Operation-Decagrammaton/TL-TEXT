[translation]
10011085-4 = "なるほど、これが「先生」の……そして……。"
10011085-5 = "……今さらですが、どうしてそこまでするのですか？"
10011085-6 = "正式な部活になる方法は、幾らでもあるでしょう？"
10011085-7 = "それは、簡単です。"
10011085-11 = "私は、部長が決めた事に、ついていきたいだけ……ですから。"
10011085-15 = "たとえ部長が、何を、考えていたとしても。"
10011085-16 = "はい！イズナも同じです！"
10011085-17 = "私たちは、それを信頼しますし、蔑ろにはしたくありません。なぜならーー"
10011085-21 = "私たちは、「忍術研究部」なので……！"
10011085-22 = "……！"
10011085-23 = "何となくは、分かってるんです……"
10011085-24 = "でも、それは良いんです……。"
10011085-27 = "軽薄で、欲張りで、見栄っ張りで……"
10011085-28 = "どうしようもないほど、"
10011085-29 = "いつも行き当たりばったりで……！"
10011085-31 = "でも、忍者が大好きで、"
10011085-32 = "私たちのためにって、いつも頑張ってくれる部長だから……"
10011085-36 = "だから……！"
10011085-41 = "あなたがツクヨ？"
10011085-42 = "おお、背が高くてカッコ良いね！"
10011085-43 = "！！"
10011085-44 = "え、あ、その、私は……。"
10011085-45 = "ちょー強い忍者になれそう！"
10011085-46 = "もし良かったら……"
10011085-50 = "私が作った最強の部活、「忍術研究部」に入らない？"
10011085-56 = "大好きで、尊敬しているんです！"
10011085-57 = "だから、部長が信じる道を、行きます！公演を成功させて、正式な部活に、なりたいんです……！"
10011085-58 = "イブキ殿との約束も！イズナたちの願いも！必ずや叶えてみせます！"
10011085-59 = "はい！それが、忍者ですから！"
10011085-60 = "……ですよね、部長？"
10011085-62 = "ツクヨ、私は……っ。"
10011085-63 = "そうですか……。"
10011085-71 = "[ns] \"あれ、この音は……？\""
10011085-78 = "無事でしたか。"
10011085-79 = "[s] \"イロハ！？\""
10011085-80 = "トリックハウスで迷子になってたから連れて来た！"
10011085-81 = "何か知らない間に戦車が準備されててさ、ビックリしたよー。"
10011085-82 = "……あのトリックハウスとやらを彷徨う中で、気づきました。"
10011085-83 = "どうして馬鹿正直に、自分の足で走っていたのか……と。"
10011085-84 = "初めからこうするべきでしたね……あらためて、イブキを助けに行きます。"
10011085-85 = "みなさんまさか、諦めてないですよね？"
10011085-86 = "ま、待ってください……！"
10011085-90 = "部長！"
10011085-91 = "部長！！"
10011085-95 = "[s] \"ミチル。\""
10011085-102 = "あああぁぁぁもうっ！！よし吹っ切れた！行こう、忍術研究部！"
