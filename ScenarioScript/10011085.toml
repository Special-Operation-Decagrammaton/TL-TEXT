[translation]
10011085-4 = "Entendo, isso é do "Sensei"... e também..."
10011085-5 = "...É um pouco tarde para perguntar, mas por que você vai tão longe?"
10011085-6 = "Existem várias maneiras de se tornar um clube oficial, não existem?"
10011085-7 = "Isso é simples."
10011085-11 = "Eu só quero seguir o que a nossa presidente decidiu... é por isso."
10011085-15 = "Não importa o que a presidente estivesse pensando."
10011085-16 = "Sim! A Izuna também pensa o mesmo!"
10011085-17 = "Nós confiamos nela e não queremos ignorar isso. Porque..."
10011085-21 = "Nós somos o "Clube de Pesquisa de Ninjutsu", afinal...!"
10011085-22 = "...!"
10011085-23 = "Eu entendo mais ou menos..."
10011085-24 = "Mas tudo bem..."
10011085-27 = "Frívola, gananciosa, vaidosa..."
10011085-28 = "A ponto de não ter jeito,"
10011085-29 = "Sempre agindo por impulso...!"
10011085-31 = "Mas ela ama ninjas,"
10011085-32 = "E como é uma presidente que sempre se esforça por nós..."
10011085-36 = "Por isso...!"
10011085-41 = "Você é a Tsukuyo?"
10011085-42 = "Oh, você é alta e legal!"
10011085-43 = "!!"
10011085-44 = "Eh, ah, bem, eu..."
10011085-45 = "Você daria uma ninja super forte!"
10011085-46 = "Se você quiser..."
10011085-50 = "Por que não entra no melhor clube que eu criei, o "Clube de Pesquisa de Ninjutsu"?"
10011085-56 = "Eu a amo e a respeito muito!"
10011085-57 = "Por isso, seguirei o caminho em que a presidente acredita! Quero que a apresentação seja um sucesso e nos tornarmos um clube oficial...!"
10011085-58 = "A promessa com a Ibuki-dono também! E o desejo da Izuna e das outras! Com certeza vamos realizar!"
10011085-59 = "Sim! Porque é isso que um ninja faz!"
10011085-60 = "...Não é, presidente?"
10011085-62 = "Tsukuyo, eu..."
10011085-63 = "Entendo..."
10011085-71 = "[ns] \"Ué, que som é esse...?\""
10011085-78 = "Vocês estão bem?"
10011085-79 = "[s] \"Iroha!?\""
10011085-80 = "Eu me perdi na casa de truques, então acabei vindo parar aqui!"
10011085-81 = "De repente, sem eu saber, um tanque foi preparado, fiquei surpresa."
10011085-82 = "...Enquanto vagava por aquela tal casa de truques, eu percebi."
10011085-83 = "Por que eu estava sendo tão tola de correr com minhas próprias pernas..."
10011085-84 = "Eu deveria ter feito isso desde o início... Agora, vou salvar a Ibuki."
10011085-85 = "Vocês não desistiram, certo?"
10011085-86 = "Es-espere...!"
10011085-90 = "Presidente!"
10011085-91 = "Presidente!!"
10011085-95 = "[s] \"Michiru.\""
10011085-102 = "Aaaah, chega!! Certo, superei isso! Vamos lá, Clube de Pesquisa de Ninjutsu!"
