[translation]
1013806-1 = "小さなリボン"
1013806-2 = "（その日の午後）"
1013806-3 = "（お願いされた物とチョコバナナクレープを持ってオカルト研究会の部屋へ向かった）"
1013806-6 = "あ、いらっしゃい。先生。"
1013806-7 = "先輩たちはちょっと遅れるって。"
1013806-8 = "どうせまた「隠されしオカルトを探せ」とか言ってなんかやってるんでしょ。"
1013806-9 = "[s] \"レナは一緒に行かなかったんだ？\""
1013806-10 = "先輩たちが居ない間に自分の作業をしとこうと思って。"
1013806-11 = "にしても、お店が臨時休業だなんて……はぁ。"
1013806-12 = "ホントこの学院にはまともな人間が居ないんだから……ここでちゃんと3年やってけるのかしら？"
1013806-13 = "[s] \"ほら、このチョコバナナクレープでも食べて元気出して！\""
1013806-14 = "いいって言ったのに……。"
1013806-15 = "まあ……ありがと。"
1013806-20 = "これ、美味しい……！どこで買ったの？"
1013806-21 = "[s] \"実は私が作ったんだ。\""
1013806-22 = "えっ！？そ、そうなの！？"
1013806-23 = "[s] \"どう？美味しい？\""
1013806-24 = "ま、まあ……。"
1013806-25 = "……。"
1013806-26 = "たしかに……美味しい……かも。"
1013806-27 = "シャーッ！もう、言わせないでバカ！"
1013806-33 = "（そう言ってレナは怒りながらも、食べきってくれた）"
1013806-35 = "ふぅ……糖分補給も済んだし、続けようかな。"
1013806-36 = "[s1] \"アクセサリーを作るんだよね？\"\n[s2] \"何を作るの？\""
1013806-39 = "リボンのヘアピンよ。"
1013806-40 = "[s3] \"そういやレナはたくさんリボンをつけてるよね。\"\n[s4] \"リボンが好きなんだ？\""
1013806-43 = "んー……好き、というか……。"
1013806-44 = "最初はなんとなくつけてたけど、気がついたら増えてた感じ。"
1013806-45 = "今はもうなんか、いっぱい付けていないとソワソワするっていうか……。"
1013806-46 = "[s5] \"レナにとってのお守りみたいなものってこと？\"\n[s6] \"やっぱり根はオカルト研究会なんだね。\""
1013806-49 = "シャーッ！！違うわよ！"
1013806-50 = "そういうんじゃないの！！ただのファッション！！"
1013806-51 = "[s] \"そんなにあるのに、まだ作るの？\""
1013806-52 = "よく落としちゃうんだよね。だから予備を作っておこうかなって。"
1013806-53 = "とにかく、これから作業に入るわ。先生も仕事に戻ったら？"
1013806-54 = "今日ここに来たのも仕事だったんでしょ？"
1013806-55 = "[s7] \"まだ時間はあるから大丈夫だよ。\"\n[s8] \"レナがリボン作るの見ててもいい？\""
1013806-58 = "……そう？"
1013806-59 = "で、でもこれ見ててもあんまり面白くないと思うよ？"
1013806-60 = "それでもいいなら……。"
1013806-64 = "べ、別にいいけど。"
1013806-65 = "でも、邪魔はしないでね？"
1013806-68 = "[wa:1650]― [log=레나]私ね、[wa:1430]小さい頃から[wa:980]手先が器用だったの。[/log]"
1013806-70 = "― [log=레나]リボンとかを作って、[wa:1870]友達にあげたりしてた。[/log]"
1013806-73 = "[wa:1150]― [log=레나]みんなが喜んでくれると[wa:1380]嬉しくって。[/log]"
1013806-75 = "― [log=레나]……それで気づいたんだ。[/log]"
1013806-78 = "― [log=레나]こんな小さなものでも、[/log]"
1013806-80 = "― [log=레나]誰かを喜ばせることができるんだ、[wa:2230]って。[/log]"
1013806-83 = "[wa:1140]― [log=레나]だから[wa:1120]ファッションデザイナーを目指すようになったんだ。[/log]"
1013806-86 = "― [log=레나]自分でデザインした服とか[wa:1670]アクセサリーとか、[/log]"
1013806-88 = "― [log=레나]みんなが楽しんでくれると[wa:1840]私も嬉しいから。[/log]"
1013806-91 = "[wa:710]― [log=레나]そういうの、[wa:1160]先生もなんとなく分かるでしょ？[/log]"
1013806-93 = "― [log=레나]それもあって、[wa:820]こうやって気を使ってくれたんだと[wa:1410]思ってるし。[/log]"
1013806-96 = "[wa:520]― [log=레나]え……？[/log]"
1013806-98 = "― [log=레나]今日[wa:700]どうだったか[wa:1010]って……？[/log]"
1013806-101 = "[wa:680]― [log=레나]シャーッ！[wa:940]い、[wa:280]言わせないでよ！[wa:980]バカ先生！[/log]"
1013806-104 = "（リボンを作るレナといろんな話に花を咲かせた）"
1013806-110 = "あ……もうこんな時間。"
1013806-111 = "先生。そろそろ行った方がいいんじゃない？"
1013806-112 = "[s] \"そうだね、そろそろ行こうかな。\""
1013806-113 = "うん。仕事頑張ってね。"
1013806-114 = "そうだ、その前に――"
1013806-118 = "ちょっとこっち来て。"
1013806-123 = "ふふ、似合うじゃん！"
1013806-124 = "それあげる。"
1013806-125 = "[s9] \"いいの？ありがとう！\"\n[s10] \"仕事中もずっとつけてるね！\""
1013806-128 = "へ……？別にそこまでする必要は……。"
1013806-129 = "[s] \"レナがくれた初めてのリボンだからね。\""
1013806-130 = "……！"
1013806-131 = "す、好きにしたら！"
1013806-133 = "（嬉しそうにしていたレナを思い浮かべながら……）"
1013806-134 = "（リボンをつけて仕事に励んだ）"
