[translation]
1013806-1 = "fita pequena"

1013806-2 = "(naquela tarde)"

1013806-3 = "(Ele pegou os itens solicitados e um crepe de chocolate e banana e foi para a sala do grupo de pesquisa ocultista.)"

1013806-6 = "Bem-vindo. Sensei."

1013806-7 = "Os idosos vão chegar um pouco atrasados."

1013806-8 = "De qualquer forma, eles estão fazendo algo como “Encontre o ocultismo oculto” novamente."

1013806-9 = "[s] \"Lena não foi com você?\""

1013806-10 = "Eu queria fazer meu próprio trabalho enquanto meus idosos estivessem fora."

1013806-11 = "No entanto, a loja está temporariamente fechada...suspiro."

1013806-12 = "Realmente não há pessoas decentes nesta academia... Será que poderei fazer isso aqui por três anos corretamente?"

1013806-13 = "[s] \"Aqui, coma esse crepe de chocolate e banana e anime-se!\""

1013806-14 = "eu disse ok..."

1013806-15 = "Bem... obrigado."

1013806-20 = "Isto é delicioso...! onde você comprou?"

1013806-21 = "[s] \"Na verdade, eu consegui.\""

1013806-22 = "Huh! ? Ah, isso mesmo! ?"

1013806-23 = "[s] \"Você gostou? Está delicioso?\""

1013806-24 = "Bem, bem..."

1013806-25 = "……."

1013806-26 = "Na verdade... pode ser delicioso..."

1013806-27 = "Shhh! Não me faça dizer mais isso, idiota!"

1013806-33 = "(Lena disse que, mesmo estando com raiva, ela terminou de comer.)"

1013806-35 = "Ufa... terminei de repor minha ingestão de açúcar, então acho que vou continuar."

1013806-36 = "[s1] \"Você faz acessórios, certo?\"\n[s2] \"O que você faz?\""

1013806-39 = "É um grampo de fita."

1013806-40 = "[s3] \"A propósito, Lena usa muitas fitas.\"\n[s4] \"Você gosta de fitas?\""

1013806-43 = "Hmm... eu gosto, ou melhor..."

1013806-44 = "No começo eu estava colocando de alguma forma, mas quando percebi começou a aumentar."

1013806-45 = "Hoje em dia fico nervoso se não uso o tempo todo..."

1013806-46 = "[s5] \"Então é como um talismã para Lena?\"\n[s6] \"Afinal, é um grupo de pesquisa ocultista.\""

1013806-49 = "Shhh! ! Não!"

1013806-50 = "Não é mesmo! ! Só moda! !"

1013806-51 = "[s] \"São tantos, você ainda os faz?\""

1013806-52 = "Muitas vezes eu os deixo cair. Então pensei em fazer um backup."

1013806-53 = "De qualquer forma, vou começar a trabalhar nisso agora. E se os Senseies voltarem ao trabalho?"

1013806-54 = "Você veio aqui hoje para trabalhar, certo?"

1013806-55 = "[s7] \"Está tudo bem, ainda temos tempo.\"\n[s8] \"Posso ver Lena fazer a fita?\""

1013806-58 = "……sim?"

1013806-59 = "Mas não acho muito interessante assistir, e você?"

1013806-60 = "Se estiver tudo bem..."

1013806-64 = "Bem, eu realmente não me importo."

1013806-65 = "Mas não me perturbe, ok?"

1013806-68 = "[wa:1650]― [log=레나]私ね、[wa:1430]小さい頃から[wa:980]手先が器用だったの。[/log]"
1013806-70 = "- [log=레나]Eu costumava fazer fitas e dar para [wa:1870]amigos. [/registro]"

1013806-73 = "[wa:1150]― [log=레나]みんなが喜んでくれると[wa:1380]嬉しくって。[/log]"
1013806-75 = "― [log=레나]...Foi quando eu percebi isso. [/registro]"

1013806-78 = "― [log=레나]Mesmo algo tão pequeno quanto isso[/log]"

1013806-80 = "― [log=레나]Você pode fazer alguém feliz, [wa:2230]. [/registro]"

1013806-83 = "[wa:1140]― [log=레나]だから[wa:1120]ファッションデザイナーを目指すようになったんだ。[/log]"
1013806-86 = "― [log=레나]Roupas que eu mesmo desenhei, [wa:1670]Acessórios, etc.[/log]"

1013806-88 = "― [log=레나]Se todos gostarem, [wa:1840]Fico feliz também. [/registro]"

1013806-91 = "[wa:710]― [log=레나]そういうの、[wa:1160]先生もなんとなく分かるでしょ？[/log]"
1013806-93 = "― [log=레나]Por causa disso, [wa:820]Eu acho que [wa:1410] que ele cuidou de mim assim. [/registro]"

1013806-96 = "[wa:520]― [log=레나]え……？[/log]"
1013806-98 = "― [log=레나]Como foi [wa:700] hoje [wa:1010]...? [/registro]"

1013806-101 = "[wa:680]― [log=레나]シャーッ！[wa:940]い、[wa:280]言わせないでよ！[wa:980]バカ先生！[/log]"
1013806-104 = "(Tivemos muitas conversas com Lena que fazia fitas)"

1013806-110 = "Ah... já faz tanto tempo."

1013806-111 = "Sensei. Não seria melhor ir agora?"

1013806-112 = "[s] \"Sim, acho que é hora de ir.\""

1013806-113 = "Sim. Boa sorte com seu trabalho."

1013806-114 = "Sim, antes disso..."

1013806-118 = "Venha aqui por um momento."

1013806-123 = "Hehe, combina com você!"

1013806-124 = "Eu vou te dar isso."

1013806-125 = "[s9] \"Você está bem? Obrigado!\"\n[s10] \"Continue assim enquanto trabalha!\""

1013806-128 = "peido......? Não há necessidade de ir tão longe..."

1013806-129 = "[s] \"É a primeira fita que Lena me deu.\""

1013806-130 = "...!"

1013806-131 = "Se você gosta!"

