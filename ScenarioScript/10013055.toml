[translation]
10013055-2 = "（Assim, uma batalha feroz se desenrolou――）"
10013055-3 = "（Com conselhos precisos de especialistas em Mushiqueen e……）"
10013055-4 = "Presidente! A posição mais importante no Mushiqueen são as \"Cartas Mágicas\"!"
10013055-6 = "Errado, Feena! O que realmente importa é o parceiro que confia em você até o fim! É o seu monstro principal!"
10013055-8 = "（Mesmo diante do perigo, nunca desistir e enviar torcidas calorosas acreditando nos amigos……！）"
10013055-16 = "Ahhh! Meus pontos de vida estão quase em zero……! Desse jeito, não vai dar!"
10013055-17 = "Está tudo bem, Shizuko-chan! Ainda há uma chance!#nVamos buscar a virada no próximo turno!"
10013055-18 = "A expressão da presidente quando está em apuros……! Com certeza vai agradar a um certo público!#nNão vou perder a chance de tirar uma foto, então dê o seu melhor!"
10013055-19 = "Tudo bem a Mimori, mas aquilo da Umika não é torcida, né!?"
10013055-28 = "（E após uma disputa acirrada―― finalmente conseguimos chegar à final）"
10013055-32 = "Fufufu…… chegar até aqui sendo a primeira vez que participam. Vejo que vocês têm talento!"
10013055-33 = "Porém! Diante do meu deck perfeito, as cartas de vocês não terão efeito!"
10013055-34 = "Observem, este é o meu ás! Invocação: \"Formiga Arco-Íris de Diamante\"!"
10013055-39 = "A-aquela é……!"
10013055-40 = "Dizem que é uma das cartas mais fortes do Mushiqueen…… aquela……!"
10013055-42 = "Hahahaha! Agora, receba isso! \"Cortador de Mandíbula de Diamante\"!!"
10013055-55 = "Kyaaaaa!!…… T-tão forte!#nComo esperado, desta vez…… talvez não dê……."
10013055-62 = "Ainda é cedo para desistir, Shizuko-chan!#nAcredite nas cartas…… em si mesma…… e nos seus amigos!"
10013055-63 = "Mi-Mimori……!"
10013055-65 = "Ah! Essa cena é……! Kaede!"
10013055-67 = "Sim, não tem erro! Essa é a cena famosa do episódio 378 de Mushiqueen!#nAquela cena em que todos unem forças para apoiar o amigo que está prestes a cair!"
10013055-74 = "……Compro!"
10013055-76 = "E aqui, o milagre acontece……!"
10013055-84 = "Ah, isso…… não deu certo."
10013055-85 = "Uéééé!? Era para ser o momento da virada, não era!?"
10013055-86 = "Waaaa! O espírito das cartas não me respondeu~!"
10013055-88 = "Hahahaha! Milagres são chamados de milagres justamente porque não acontecem facilmente!"
10013055-89 = "Vamos, desafiantes! Acabou para vocês!"
10013055-97 = "O quê…… quem é!?"
10013055-100 = "Agora é a minha vez."
10013055-101 = "[s] \"Chi-Chise!? É permitido entrar no meio do jogo assim?\""
10013055-103 = "Não é bem assim, Sensei! Isso não é uma invasão comum.#nÉ uma regra especial exclusiva do Mushiqueen!"
10013055-104 = "O nome dela é―― Regra de entrada do \"Outro Eu\" no momento de crise!"
10013055-106 = "Então, está liberado!"
10013055-107 = "[s] \"Eu ainda não entendo nada das regras! Mushiqueen!\""
10013055-113 = "Aqui, usando esta carta……"
10013055-117 = "Hmm…… vou invocar este monstro~."
10013055-126 = "O-o quê!? Inverter a situação com apenas 3 cartas……!"
10013055-127 = "Ah, é verdade! A Chise era boa em jogos de cartas, né!#nEla era muito boa em Karuta também!"
10013055-128 = "[s] \"Isso não é um gênero diferente……\""
10013055-129 = "Com esse golpe, acabou."
10013055-141 = "N-não pode ser, aaaaaah!!!!"
10013055-146 = "O vencedor do torneio de Mushiqueen desta vez é……!"
10013055-151 = "A desafiante! Shizuko Kawa!"
10013055-155 = "――e sua substituta de emergência!"
10013055-159 = "Chise Waraku!"
10013055-160 = "Incrível! Quebrando o recorde de 100 vitórias consecutivas do campeão, uma nova lenda nasceu!"
10013055-166 = "[ns] \"A-acabou, né…….\""
10013055-167 = "Shizuko-chan! Chise-chan! Foi magnífico!"
10013055-168 = "Quando a senhorita Chise entrou para ajudar…… Izuna ficou emocionada!"
10013055-170 = "S-sim... Pensando bem agora, eu mesma me pergunto o que eu estava fazendo..."
10013055-171 = "Isso é o que nós somos! Esse é o poder de Hyakkiyako!"
10013055-172 = "Que legal~! Estou com tanta inveja do prêmio do torneio Mushqueen!"
10013055-174 = "Vamos, aplaudam o novo campeão!"
10013055-175 = "O \"ex\"-campeão que saia logo da frente! Está atrapalhando!"
10013055-176 = "Vocês! Descartam a gente assim que perdemos!? Bem, essas são as regras, mas...!"
10013055-177 = "Digo, eu nem nos meus sonhos imaginei que perderia!"
10013055-179 = "Muito bem! Vamos entregar ao novo campeão o prêmio preparado pelo navio \"Golden Fleece\"!"
10013055-181 = "Espere. Antes disso, tenho uma pergunta para você..."
10013055-182 = "...Hm? O que foi?"
10013055-183 = "Vocês são os organizadores deste torneio, certo?"
10013055-184 = "Então, por que abriram um torneio desses, a ponto de apostar o \"Direito de Uso do Resort\"?"
10013055-185 = "O motivo...? Não é óbvio?"
10013055-186 = "É porque nós adoramos jogos e apostas!"
10013055-187 = "Para isso, cruzamos este mar! Encontramos oponentes! E jogamos! É só isso!"
10013055-189 = "Bem, na verdade, o \"Direito de Uso do Resort\" de uma ilha próxima estava barato na internet... então abrimos o torneio como um brinde por termos comprado."
10013055-190 = "[s] \"Vocês também compraram isso pela internet!?\""
10013055-191 = "Ah... pensamos que se ancorássemos o navio nesta ilha e abríssemos um torneio Mushqueen para atrair pessoas, seria divertido."
10013055-192 = "Para falar a verdade, mesmo que levassem o \"Direito de Uso do Resort\", bastaria a gente levantar âncora e ir para outro lugar!"
10013055-193 = "Hã!? Ex-campeão, isso não é trapaça!?"
10013055-194 = "Ainda temos muitos torneios planejados! Sou contra vocês irem embora!"
10013055-195 = "Não adianta nada vocês dizerem isso agora, não é!?"
10013055-196 = "[s] \"Que mentalidade... embora não pareça que todos sejam tão cooperativos assim.\""
10013055-197 = "Ou seja, vocês planejaram este torneio — este \"serviço\" — apenas porque era divertido."
10013055-198 = "...Entendo. Nesse caso, tenho uma proposta."
10013055-199 = "Vocês,"
10013055-200 = "por que não continuam realizando o torneio aqui?"
10013055-201 = "...Hã?"
10013055-202 = "[s] \"Shizuko?\""
10013055-203 = "No fim das contas, parece que este torneio atraiu muitos clientes..."
10013055-204 = "Além disso, eu já tinha ouvido falar sobre esse tipo de jogo de cartas pela Pina. #nEu até que estava um pouco interessada..."
10013055-205 = "Por isso, sabe... depois de participar do torneio agora há pouco, minha visão mudou um pouco..."
10013055-206 = "Presidente! Isso significa que!"
10013055-207 = "Sabe, Mushqueen é incrível! Depois eu te explico os detalhes!"
10013055-209 = "Fufufu. Todos parecem tão felizes."
10013055-210 = "Bem, não seria nada mal tratar isso como um serviço da Hyakkiyado. #nÉ só por isso, de verdade."
10013055-211 = "Pelo que entendi da conversa, vocês querem fazer um contrato conosco... é isso?"
10013055-212 = "Se estiver tudo bem para vocês, é claro."
10013055-213 = "Ah, claro! De agora em diante, é proibido roubar as cartas de quem perde! #nEu vou ajustar as regras para que seja estritamente um entretenimento!"
10013055-215 = "Hum... se podemos continuar jogando..."
10013055-216 = "Não é uma má ideia, né?"
10013055-217 = "Certo, vamos fechar o contrato!"
10013055-218 = "Mas, nesse caso, o novo campeão não deixaria de ser o novo campeão..."
10013055-219 = "O-olha só quem voltou! O \"ex\"-campeão!"
10013055-220 = "No fim, para nós, só existe o \"ex\"-campeão mesmo!"
10013055-221 = "Vocês...!!"
10013055-226 = "[ns] \"Que bom que deu tudo certo desta vez, Shizuko.\""
10013055-227 = "Q-que é isso. Por que esse olhar condescendente..."
10013055-228 = "Eu só achei que isso seria mais eficiente, nada mais!"
10013055-229 = "[ns] \"Graças a isso, ganhamos mais uma franquia.\""
10013055-231 = "Sim. Por isso, vou aproveitar o embalo e continuar!"
10013055-232 = "Acho que vou seguir para cá agora!"
