[translation]
10013055-2 = "（こうして、[ruby=しれつ]熾烈[/ruby]な戦いが繰り広げられた――）"
10013055-3 = "（ムシクイーンバトラーの専門家たちによる適確なアドバイスと……）"
10013055-4 = "委員長！ムシクイーンで最も重要なポジションになるのは「魔法カード」デース！"
10013055-6 = "違うよ、フィーナ！本当に大事なのは自分をどこまでも信頼してくれるパートナー！エースモンスターだよ！"
10013055-8 = "（危機が迫っても決して屈せず、仲間を信じて送る熱い声援……！）"
10013055-16 = "ああっ！私のライフが、あと少しでゼロに……！このままじゃ、まずいわ！"
10013055-17 = "大丈夫です、シズコちゃん！まだチャンスはあります！#n次のターンで逆転を狙いましょう！"
10013055-18 = "ピンチに瀕した時の社長の表情……！きっと一定層にウケること間違いなしです！#nシャッターチャンスは逃さず撮ってますから頑張ってください！"
10013055-19 = "ミモリはいいとして、ウミカのそれは応援じゃないよね！？"
10013055-28 = "（そして接戦の末――私たちはついに決勝戦まで進むことができた）"
10013055-32 = "ふふふ……初参加のくせにここまで上がってくるとは。なかなか腕が立つと見た！"
10013055-33 = "しかし！私の完璧なデッキを前に、君たちのカードは通じないぞ！"
10013055-34 = "見ろ、これが私のエースカード！「ダイヤモンドレインボーアリ」召喚！"
10013055-39 = "あ、あれは……！"
10013055-40 = "ムシクイーン最強カードの一つと言われている……あの……！"
10013055-42 = "ハッハッハ！さあ、食らえ！「ダイヤモンド下顎カッター」！！"
10013055-55 = "きゃあああっ！！……つ、強い！#nさすがに今回は……ダメ、かも……。"
10013055-62 = "まだ諦めるには早いですよ、シズコちゃん！#nカードを……自分を……そして仲間を信じてください！"
10013055-63 = "み、ミモリ……！"
10013055-65 = "ハッ！このシーンは……！カエデ！"
10013055-67 = "うん、間違いない！これはムシクイーン378話の名シーン！#n倒れそうな仲間を支えて、みんなで力を合わせるあのシーンだよ！"
10013055-74 = "……ドロー！"
10013055-76 = "そして、ここで奇跡が……！"
10013055-84 = "あ、これは……ダメですね。"
10013055-85 = "うえええっ！？ふつう逆転勝ちするところでしょ、ここは！"
10013055-86 = "うわ～ん！カードの精霊が応えてくれなかった～！"
10013055-88 = "ハッハッハ！奇跡とは、簡単に起きないから奇跡と言うんだよ！"
10013055-89 = "さあ、挑戦者たちよ！ここまでだ！"
10013055-97 = "なっ……誰だ！？"
10013055-100 = "次は私の番だよ。"
10013055-101 = "[s] \"ち、チセ！？ゲームに乱入するのってありなの？\""
10013055-103 = "違うよ、先生！これは単なる乱入じゃない。#nムシクイーンだけのスペシャルルールだよ！"
10013055-104 = "その名も――危機の瞬間「もう一人の私」参戦ルールデス！"
10013055-106 = "だから、セーフ！だね！"
10013055-107 = "[s] \"やっぱりルールがよく分からないよ！ムシクイーン！\""
10013055-113 = "ここで、このカードを使って……"
10013055-117 = "うーん……このモンスターを召喚するね～。"
10013055-126 = "な、なにぃ！？たった3枚のカードだけで形勢を逆転させた、だと……！"
10013055-127 = "あっ、そうだった！チセはカードゲームが得意だったよね！#nカルタとかすごく上手だったし！"
10013055-128 = "[s] \"それ、ジャンルが違うんじゃ……\""
10013055-129 = "この技で、おしまい。"
10013055-141 = "そ、そんなああああああ！！！！"
10013055-146 = "今回のムシクイーン大会の優勝者は……！"
10013055-151 = "挑戦者！[ruby=かわわ]河和[/ruby]シズコ！"
10013055-155 = "――のピンチヒッター！"
10013055-159 = "[ruby=わらく]和楽[/ruby]チセ！"
10013055-160 = "なんと！チャンピオンの100連覇記録を破り、新たな伝説を生み出しました！"
10013055-166 = "[ns] \"お、終わったね……。\""
10013055-167 = "シズコちゃん！チセちゃん！お見事でした！"
10013055-168 = "チセ殿が助太刀に入った時……イズナ、思わず感動しちゃいました！"
10013055-170 = "う、うん……今にして思えば、我ながら何してるんだろって気分なんだけど……。"
10013055-171 = "これが私たち！百鬼夜行の力デース！"
10013055-172 = "いいなぁ～！ムシクイーン大会の優勝賞品うらやまし～！"
10013055-174 = "さあ、新たなチャンピオンに喝采を！"
10013055-175 = "「元」チャンピオンはさっさとどけ！邪魔だ！"
10013055-176 = "貴様ら！負けたらすぐポイッか！？まあ、そういうルールではあるが……！"
10013055-177 = "っていうか、私が負けるとは夢にも思わなかったぞ！"
10013055-179 = "それでは！新たなチャンピオンに「ゴールデンフリース」号が用意した賞品を授与させていただきます！"
10013055-181 = "待って。その前に、あなたに聞きたいことがあるんだけど……"
10013055-182 = "……ん？なんだ？"
10013055-183 = "あなたたちがこの大会の主催者なんでしょ？"
10013055-184 = "なら、どうして「リゾート使用権」を賭けてまで、こんな大会を開いたの？"
10013055-185 = "理由……？そんなの決まってるじゃないか。"
10013055-186 = "我々はゲームや賭け事をするのが好きだからだ！"
10013055-187 = "そのためなら、この海を渡り！相手に会い！ゲームをする！それだけだ！"
10013055-189 = "まあ、本当はネットで近くの島の「リゾート使用権」というのが安く売られていたから……それを買ったオマケとして開いただけなんだがな。"
10013055-190 = "[s] \"そっちもネットで買ったの！？\""
10013055-191 = "ああ……この島に船を停泊して、人が来やすいようにムシクイーン大会でも開けば面白そうだなと。"
10013055-192 = "ぶっちゃけ「リゾート使用権」を取られても、こっちが船を引いて他に移ればそれで済む話だし！"
10013055-193 = "えっ！？元チャンピオンそれズルくない！？"
10013055-194 = "まだ予定している大会はいっぱいあるのに！どっか行くのは反対だよ！"
10013055-195 = "お前たちがそれを言ったところでどうにもならんだろ！？"
10013055-196 = "[s] \"そんな考えが……とはいえ、みんな協力的というわけじゃなさそうだけど。\""
10013055-197 = "つまり、面白いからこの大会――「サービス」を企画した、と。"
10013055-198 = "……なるほど。それなら、一つ提案があるわ。"
10013055-199 = "あなたたち、"
10013055-200 = "ここでずっと大会を開いてくれない？"
10013055-201 = "……えっ？"
10013055-202 = "[s] \"シズコ？\""
10013055-203 = "何だかんだで、この大会にはかなりのお客さんが集まってるみたいだし……"
10013055-204 = "それにこういったカードゲームについては、フィーナから話は聞いてたし。#nちょっとだけ興味もあったから……。"
10013055-205 = "だから、その……さっき大会に参加して、見方が変わった部分もあるというか……"
10013055-206 = "委員長！それは、つまり！"
10013055-207 = "あのね、ムシクイーンはすごいんだよ！あとでその辺り詳しく教えてあげるね！"
10013055-209 = "ふふふっ。みんな、嬉しそうですね。"
10013055-210 = "まあ、こういうのを百夜堂のサービスとして扱ってみるのも悪くなさそうだし。#nほんと、それだけだから。"
10013055-211 = "話の流れから察するに、私たちと契約したい……そういうことか？"
10013055-212 = "そちらさえよければ、だけどね。"
10013055-213 = "あっ、もちろん！これからは負けた人のカードを奪うのは禁止だから！#nあくまでエンターテインメント形式にルールは直させてもらうわ！"
10013055-215 = "ふむ……まだゲームを続けてもいいのなら……"
10013055-216 = "そう悪くはない、よね？"
10013055-217 = "よし、契約しよう！"
10013055-218 = "でも、それだと新しいチャンピオンは新しいチャンピオンではなくなるんじゃ……"
10013055-219 = "お、おかえり！「元」チャンピオン！"
10013055-220 = "やっぱり私たちには「元」チャンピオンだけだ～！"
10013055-221 = "おまえたち～～！！"
10013055-226 = "[ns] \"今回も上手くいって良かったね、シズコ。\""
10013055-227 = "な、何ですか。その生ぬるい視線は……"
10013055-228 = "私は別に、こっちの方が効率的だと思っただけですし！"
10013055-229 = "[ns] \"そのおかげでフランチャイズが増えたわけだけど。\""
10013055-231 = "はい。ですので、このまま勢いに乗って続けていきます！"
10013055-232 = "次はここに向かおうと思います！"
