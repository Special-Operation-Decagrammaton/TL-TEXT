[translation]
1008603-1 = "Hina e vestido (2)"

1008603-2 = "(E então cheguei ao local onde Hina deveria estar esperando...)"

1008603-7 = "Desculpe, Sensei!"

1008603-8 = "Houve um problema repentino que causou um atraso de cerca de uma hora."

1008603-9 = "De qualquer forma... sinto muito."

1008603-10 = "[s] \"Não tem jeito se for trabalho, e não há necessidade de Hina se desculpar.\""

1008603-11 = "...Sim, obrigado."

1008603-12 = "Mas é uma perda de tempo apenas ter que esperar..."

1008603-13 = "Se quiser, gostaria que a Senseia escolhesse meu vestido."

1008603-14 = "Tenho os dados de tamanho de quando estava no ensino fundamental, então enviarei para você."

1008603-15 = "[s1] \"Dados de quando Hina estava no ensino fundamental...!?\"\n[s2] \"Posso ver informações pessoais tão valiosas!?\""

1008603-18 = "Hein, hein? O que aconteceu...?"

1008603-19 = "[s3] \"Bem, não me importo se a Hina perguntar...\"\n[s4] \"Eu me pergunto se está tudo bem se eu escolher o vestido da Hina.\""

1008603-22 = "Sim. Porque não sei qual é o melhor."

1008603-23 = "Seria melhor se o Sensei escolhesse..."

1008603-24 = "Não, prefiro que o Sensei escolha..."

1008603-25 = "[s] \"...Hmm?\""

1008603-26 = "Não, não! Não é nada...!"

1008603-31 = "Ei, presidente! O Salão dos Dez Mil Demônios novamente...!"

1008603-35 = "Por favor, senhor!"

1008603-39 = "[ns] \"Hina parece estar ocupada como sempre...Ok, farei o meu melhor também.\""

1008603-41 = "(Uma hora depois...)"

1008603-46 = "[ns] \"Ah, Hina! Bem vinda de volta...!\""

1008603-48 = "[ns] \"H-Hina...?\""

1008603-49 = "...Sensei, me desculpe pelo atraso."

1008603-50 = "Tenma-dono de repente ocupou a merenda escolar, causando outro problema..."

1008603-51 = "Eles fazem barulhos como “Pudim é necessário para a paz da Gehenna!”..."

1008603-52 = "...Realmente não faz nenhum sentido."

1008603-53 = "O que diabos Tenma-dono queria fazer?"

1008603-54 = "Por que perdi um tempo precioso com meu Sensei por causa do pudim..."

1008603-55 = "Mesmo que eu tenha demorado para fazer isso..."

1008603-56 = "[s] \"Estou muito bem, então acalme-se, Hina.\""

1008603-58 = "[ns] \"Selecionei um vestido especial para você.\""

1008603-59 = "Ah... isso mesmo."

1008603-60 = "A propósito, e quanto a...?"

1008603-61 = "Isso combina comigo...?"

1008603-62 = "Se você tem muitas expectativas..."

1008603-63 = "[s] \"Por que você não experimenta mesmo assim? Com ​​certeza vai combinar com você.\""

1008603-64 = "Ah, sim. Se o Sensei fala isso..."

1008603-65 = "Além disso...experimentar roupas é importante..."

1008603-66 = "Como disse a Senseia..."

1008603-67 = "Por enquanto, vou experimentar."

1008603-77 = "C-como... sensei?"

1008603-78 = "Combina comigo, eu acho...?"

1008603-79 = "[s] \"Sim! Como esperado de Hina! Ela parece melhor do que eu imaginava!\""

1008603-80 = "Oh sério...?"

1008603-81 = "Mas... você não parece jovem?"

1008603-82 = "[s5] \"Uau! É tão lindo!\"\n[s6] \"Na verdade, é disso que eu gosto! Hina-chan!\""

1008603-83 = "K-kirei... eu?"

1008603-84 = "Bem, se o Sensei disser... Sim."

1008603-85 = "Fufu, lindo..."

1008603-86 = "O que?"

1008603-87 = "Diga algo estranho assim de novo...!"

1008603-88 = "...Esse vestido foi escolhido pela minha Senseia..."

1008603-89 = "O tamanho é perfeito e é fácil de movimentar."

1008603-90 = "Sim, acho que posso participar da próxima festa."

1008603-91 = "Achei que talvez tivesse feito um pedido irracional..."

1008603-92 = "Afinal, estou feliz por ter perguntado a você. #nObrigado, Sensei."

1008603-93 = "[s] \"De nada!\""

1008603-94 = "Pois bem, vamos nos trocar de novo..."

1008603-95 = "[s7] \"Não, não! Ela está usando uma roupa tão fofa!\"\n[s8] \"É um desperdício, então vamos para casa! Hina-chan!\""

1008603-98 = "Assim...?"

1008603-99 = "Hum..."

1008603-100 = "Isso foi rejeitado."

1008603-101 = "Seria perigoso se você estivesse vestido de maneira tão visível."

1008603-102 = "[s] \"Isso é verdade, mas... é uma pena.\""

1008603-103 = "Bem, mesmo que você pareça tão triste..."

1008603-104 = "Quando ando pela cidade de vestido, as pessoas me olham de maneira estranha."

1008603-105 = "Você queria me ver mais de vestido...?"

1008603-106 = "...Fico feliz em ouvir você dizer isso, mas não adianta se não for bom."

1008603-107 = "Mas... se formos só nós dois de novo..."

1008603-108 = "[s] \"...Hmm?\""

1008603-109 = "Não, não é nada."

1008603-110 = "Vamos para casa mais cedo, Sensei."

1008603-112 = "(Embora tenha ficado um pouco decepcionado, gostei de fazer compras com Hina pelo resto do dia.)"

