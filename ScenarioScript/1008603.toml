[translation]
1008603-1 = "ヒナとドレス（２）"
1008603-2 = "（そうして、ヒナが待っているはずの場所に着いたが……）"
1008603-7 = "ごめん、先生！"
1008603-8 = "急に問題が起きて、1時間くらい遅れそう。"
1008603-9 = "よりによって、ま[ruby=パンデモニウム・ソサエティー]た万魔殿が[/ruby]……本当にごめん。"
1008603-10 = "[s] \"仕事なら仕方ないし、ヒナが謝る必要は無いよ。\""
1008603-11 = "……うん、ありがとう。"
1008603-12 = "でも、ただ待ってもらうのは時間がもったいないし……"
1008603-13 = "良かったら、先生には私のドレスを選んでおいてほしい。"
1008603-14 = "サイズは小学生の頃のデータなら残ってるから、それを送っておく。"
1008603-15 = "[s1] \"ヒナが小学生の頃のデータ……！？\"\n[s2] \"そんな貴重な個人情報を見てもいいの！？\""
1008603-18 = "え、えっ？ど、どうしたの……？"
1008603-19 = "[s3] \"まあ、ヒナの頼みなら構わないんだけど……\"\n[s4] \"本当に私がヒナのドレスを選んでもいいのかなって。\""
1008603-22 = "うん。どれがいいのかなんて、私には分からないから。"
1008603-23 = "いっそ、先生に選んでもらった方が……"
1008603-24 = "ううん、むしろ先生に選んでもらい……"
1008603-25 = "[s] \"……ん？\""
1008603-26 = "い、いや！何でもない……！"
1008603-31 = "い、委員長！また万魔殿が……！"
1008603-35 = "それじゃあお願いね、先生！"
1008603-39 = "[ns] \"ヒナは相変わらず忙しそうだね……よし、私も頑張ろう。\""
1008603-41 = "（あれから1時間後……）"
1008603-46 = "[ns] \"あ、ヒナ！おかえり……！\""
1008603-48 = "[ns] \"ひ、ヒナ……？\""
1008603-49 = "……先生、遅れてごめん。"
1008603-50 = "急に万魔殿が給食部を占領して、また問題を……"
1008603-51 = "「ゲヘナの平和にはプリンが必要だ！」とか騒いで……"
1008603-52 = "……本当に、まったく意味が分からない。"
1008603-53 = "一体、万魔殿は何をしたかったんだろう？"
1008603-54 = "どうして私はプリンのせいで、先生と過ごせる貴重な時間を……"
1008603-55 = "せっかく、時間を作ってもらったのに……"
1008603-56 = "[s] \"私は本当に大丈夫だから落ち着いて、ヒナ。\""
1008603-58 = "[ns] \"とっておきのドレスを選んでおいたよ。\""
1008603-59 = "あ……そうだ。"
1008603-60 = "ところで、とっておきって……？"
1008603-61 = "私に、似合うかな……？"
1008603-62 = "あんまり期待されると、その……"
1008603-63 = "[s] \"とりあえず着てみない？絶対に似合うから。\""
1008603-64 = "う、うん。先生が、そこまで言うのなら……"
1008603-65 = "それに……試着は大事だし……"
1008603-66 = "先生の言う通り……"
1008603-67 = "とりあえず、着てみる。"
1008603-77 = "ど、どう……先生？"
1008603-78 = "似合ってる、かな……？"
1008603-79 = "[s] \"うん！さすがヒナだよ！想像以上に似合ってる！\""
1008603-80 = "そ、そう……？"
1008603-81 = "でも……幼く見えない？"
1008603-82 = "[s5] \"ううん！とってもきれいだよ！\"\n[s6] \"むしろ、それがいいんだよ！ヒナちゃん！\""
1008603-83 = "き、きれい……私が？"
1008603-84 = "せ、先生がそう言ってくれるなら……うん。"
1008603-85 = "ふふっ、きれい……"
1008603-86 = "な、なに？"
1008603-87 = "またそんな変なことを言って……！"
1008603-88 = "……先生が選んでくれた、このドレス……"
1008603-89 = "サイズもちょうどいいし、動きやすいわね。"
1008603-90 = "うん、これなら今度のパーティーに参加できそう。"
1008603-91 = "無理なお願いをしたんじゃないかなと思ってたけど……"
1008603-92 = "やっぱり、あなたに頼んで良かった。#nありがとう、先生。"
1008603-93 = "[s] \"どういたしまして！\""
1008603-94 = "それじゃあ、とりあえずまた着替えて……"
1008603-95 = "[s7] \"いやいや！せっかくこんな可愛い格好なんだし！\"\n[s8] \"もったいないから、このまま帰ろう！ヒナちゃん！\""
1008603-98 = "このまま……？"
1008603-99 = "うーん……"
1008603-100 = "それは却下。"
1008603-101 = "こんな目立つ格好をしていたら、危ないでしょう。"
1008603-102 = "[s] \"それは、そうなんだけど……残念。\""
1008603-103 = "そ、そんなに悲しそうな顔をされても……"
1008603-104 = "ドレスで街を歩いてたら、周りから変な目で見られるし。"
1008603-105 = "もっとドレス姿の私を見ていたかった、って……？"
1008603-106 = "……そう言ってくれるのは嬉しいけど、ダメなものはダメ。"
1008603-107 = "でも……また、二人きりの時なら……"
1008603-108 = "[s] \"……ん？\""
1008603-109 = "な、何でもない。"
1008603-110 = "早く帰ろう、先生。"
1008603-112 = "（少し残念ではあったけれど、残りの時間はヒナと一緒に買い物を楽しんだ）"
