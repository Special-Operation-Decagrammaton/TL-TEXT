[translation]
13040-1 = "第4話;流れ行くものたち"
13040-2 = "ひぃん、どうしてこうなっちゃったんだろ……"
13040-3 = "どうしてもこうしても、人を簡単に信じるのが悪い。"
13040-4 = "だってぇ……#n週90時間の労働で沢山お給料がもらえるって……"
13040-5 = "こんな廃れた自治区で、まともな仕事があると思ってるほうがどうかしてるぜ。"
13040-6 = "ハハッ、そんな頭でよく生きてられたな。#nちったぁ考えろよ！"
13040-7 = "お、お金はぁ……？"
13040-8 = "んなもん最初からあるわけねーだろ！#nバカじゃねーの！"
13040-10 = "こ、困ります、それじゃあ学校の借金が……！#nそれに早く帰らないと、後輩の子に心配されちゃう……"
13040-12 = "学校の前に、まずは自分の心配をしたらどうだ？"
13040-13 = "この建物は、我々が占拠してるんだからな！"
13040-14 = "後輩だか何だか知らねぇが、#nお仲間が助けにきてくれると思ってんなら諦め――"
13040-18 = "……ん？"
13040-19 = "チッ……#nなんだ、この揺れ……地震か？"
13040-23 = "どけっ！！"
13040-24 = "なっ……！"
13040-25 = "なんだコイツ！？"
13040-27 = "ほ、ホシノちゃん……！？"
13040-28 = "探しましたよ、先輩！#nこんな忙しい時にいなくならないでください！"
13040-29 = "早く帰りましょう！"
13040-31 = "な、何しやがんだテメェ！"
13040-32 = "おい、さっさと奴らに連絡しろ！#nったく、あいつら寝てんじゃねえよなあ！？"
13040-34 = "応援なら誰も来ない。#n下にいた奴らなら、全員倒したから。"
13040-36 = "何だと！？"
13040-37 = "あ、あれだけの人数を、たった一人で……！？"
13040-46 = "うああああぁっ！"
13040-47 = "ぐあああぁぁぁっ！？"
13040-51 = "ひ、ひぃぃいん……怖かったよぉ、ホシノちゃん……"
13040-52 = "また変な大人に騙されて、いい加減学習してくださいよ……"
13040-53 = "でもぉ……"
13040-54 = "どんどん人が減って、不良ばっかりのスラムになって……。"
13040-55 = "今のアビドスは無法地帯なんですよ。"
13040-56 = "知らない人は、全員悪い奴だと思ってください。"
13040-57 = "……でも、もし本当に困ってる人だったらどうするの？"
13040-58 = "そんな人はいません！#n誰もかれも、みんな悪党です！"
13040-59 = "そう、なのかな……。"
13040-60 = "手を差し伸べたって、すぐ裏切られるんです！#nそんなんじゃ学校を守れません！"
13040-64 = "先輩、今からでも……"
13040-65 = "ホシノちゃん。"
13040-66 = "……？"
13040-67 = "違うよ、ホシノちゃん。#nそれは違う。"
13040-72 = "ゆ、ユメ先輩……？"
13040-76 = "大事な話だから、よく聞いて。"
13040-77 = "あの……ちょっと、近いんじゃ……"
13040-82 = "疑念、不信、暴力、嘘……#nそういうものを当たり前だと思うようになったら、"
13040-83 = "私たちもいつか、自分を見失っちゃうよ。"
13040-85 = "……。"
13040-86 = "そうやってアビドスを取り戻しても、#nそれは私たちが思い描いたアビドスにはならない。"
13040-87 = "もし、アビドスに人が帰ってきてくれたとして……#nそんな街になっちゃってたら……私は悲しいよ。"
13040-88 = "だからね、ホシノちゃん。#n困ってる人がいたら、手を差し伸べるの。#nお腹を空かせてたり、寒さに凍えてる人がいたら助けてあげるの。"
13040-89 = "……。"
13040-90 = "うまく伝えられてる自信は無いけど……"
13040-91 = "ホシノちゃんなら私が何を言いたいのか、分かってくれるよね？"
13040-95 = "……それで裏切られたら、どうするんですか？#n今日みたいに、また危険な目に遭ったら？"
13040-96 = "……その時は、ホシノちゃんが助けてくれるでしょ？"
13040-97 = "…………まあ、行きますけど。"
13040-98 = "ふふっ。"
13040-99 = "な、なにを笑ってるんですか！"
13040-100 = "んー？#nホシノちゃんの言葉を忘れないように、メモしておこうかなって思って！"
13040-101 = "はぁ！？"
13040-107 = "ちょっ、書かないでください！#nっていうか何ですかその変な手帳！"
13040-108 = "いい加減、新しいのに替えないんですか？#nもう小学生じゃないんですから……"
13040-109 = "そうだ、ユメ先輩。#n一つ良い作戦を思いつきまして……"
13040-110 = "これなら、アビドスの治安も良くなると思うんです！"
13040-111 = "……ユメ先輩？"
13040-115 = "……ユメ先輩？"
13040-121 = "……。"
13040-122 = "ユメ先輩……"
13040-123 = "……。"
13040-124 = "…………。"
13040-125 = "こ、ここは……"
13040-126 = "…………。"
13040-127 = "ああ、そっか……"
13040-135 = "……そうだ。"
13040-136 = "生徒会室を、閉めに来たんだった……"
13040-137 = "どれくらい寝てたんだろう……"
13040-138 = "……。"
13040-139 = "閉めないと、いけないのに……"
13040-140 = "……。"
13040-148 = "……明日にしよう。"
13040-149 = "明日こそ、閉めますから…………先輩。"
13040-154 = "あれ、君は……"
13040-155 = "お待ちしてました！#n副生徒会長さん！"
13040-156 = "えっ……私？"
13040-157 = "はい！お話があるんです！"
13040-158 = "……話って？"
13040-159 = "わ、私は……私は確かに、ネフティスグループの者です。"
13040-160 = "その事実を変えることはできませんが……#nこんな私でも、できることがあります！"
13040-161 = "できること……？"
13040-166 = "このゴールドカードで、学校の借金を全て返済するんです！"
13040-172 = "え、えっと……何？#nゴールドカード……？"
13040-173 = "あっ、その……これは私専用のクレジットカードで……#nこれを使えば、ネフティスの資金を引き出せるんです。"
13040-174 = "……あのさ、ちゃんと考えて話してる？"
13040-175 = "……！！"
13040-176 = "そのカードで借金を返済するって意味、ちゃんと分かってるの？"
13040-177 = "い、意味、というのは……"
13040-178 = "善意から言ってるのは分かる。#nでも、他の人はそれをどう受け取ると思う？"
13040-179 = "そのカードはネフティスの物でしょ。#nつまり、学校の借金を返したのはネフティスってことになる、君じゃなくて。"
13040-180 = "わ、私は……"
13040-181 = "自由に使えるからといって、そのお金は君の物じゃないんだよ、お嬢さん。"
13040-182 = "これまで、自分でお金を稼いだことは？#n家のお手伝いでも良いけどさ。"
13040-183 = "それは……"
13040-184 = "そのお金は誰が用意したものなのか、よく考えた方が良い。"
13040-185 = "そのカードで借金を返済した瞬間、#nこの学校の所有権はネフティスのものになる。少なくとも連中はそう思うだろうね。"
13040-186 = "で、では……"
13040-187 = "どうすれば、アビドスの借金を返せるのでしょうか？"
13040-189 = "……。"
13040-190 = "アビドスの生徒として稼いだお金で、返せばいいんじゃない？"
13040-191 = "……。"
13040-192 = "……あなたのように、ですか？"
13040-193 = "……うん？"
13040-194 = "……分かりました。#n出直してきます。"
13040-195 = "それと、私は「お嬢さん」じゃありません。"
13040-197 = "ノノミです、ホシノ先輩。"
13040-198 = "……え？"
13040-200 = "では、また来ますね。"
13040-204 = "えぇ……？"
13040-207 = "せ、先輩！？どこですか！？"
13040-215 = "ユメ先輩！#nここです！先輩！！"
13040-216 = "ユメ先輩！！！"
13040-220 = "……！！"
13040-221 = "……。"
13040-222 = "ほ、ホシノ先輩……"
13040-226 = "………………………………。"
13040-227 = "……なんだ、また君か。"
13040-228 = "あ、あの……だ、大丈夫ですか……？"
13040-229 = "……。"
13040-230 = "入って良いって、誰が言ったの？#n中学生はお呼びじゃないよ。"
13040-231 = "悲鳴が、聞こえたので……"
13040-232 = "……あと。もう卒業したので、中学生じゃありません。"
13040-233 = "ネフティスと協力関係にある学園に、進学することが決まりました。#nハイランダー鉄道学園……#nそろそろ、家に入学書類が届いているはずです。"
13040-234 = "じゃあ、君は早くそっちに行くといい。#nこんなところで油売ってないでさ。"
13040-235 = "……はい。#nなので最後に、ここを見ておきたくて。"
13040-239 = "それで、校庭にいたら悲鳴が聞こえて……"
13040-240 = "け、決してストーカーとかではありませんから！"
13040-241 = "……そう。"
13040-242 = "じゃあ、適当に見たら帰るんだよ。"
13040-243 = "……聞きました。"
13040-247 = "生徒会長の失踪事件……#nたしか、ユメさん……ですよね。"
13040-251 = "問題が多かったから逃げた、と言う方もいますが……"
13040-252 = "極秘とのお達しでしたが、私の耳にも入ってきました。#n生徒会長は、失踪したのではなく……"
13040-256 = "それに、第一発見者は……"
13040-257 = "す、すみません！#nこんな話を、先輩の前で……"
13040-258 = "いいよ、そんなに気を遣わなくても。"
13040-259 = "あの……"
13040-260 = "もう砂漠に行くのは、やめたんですか……？"
13040-261 = "生徒会長が発見されてからもずっと砂漠にいたのは、何かを……"
13040-262 = "何かを、探していたからなんじゃ……？"
13040-267 = "そ、そういえば、ここはアビドスの生徒会室ですよね？#n前は閉まっていたはずですが……"
13040-268 = "もしかして、何か探し物ですか？"
13040-269 = "……もう行くよ。"
13040-274 = "あっ！ま、待ってください、先輩！"
13040-280 = "ごほっ、ごほっ……埃が、こんなに……"
13040-281 = "……もう随分と、掃除をしてないからね。#n一人でやる気も起きないし。#nそこ……気をつけて、床が傷んでるから。"
13040-282 = "もともと別館は、そこまできちんと管理されてなかったけど。"
13040-283 = "……はい、私も聞きました。#nキヴォトスで最も長い歴史を誇った本館は、もう砂漠の中に埋もれてしまったと……"
13040-284 = "そうだね。#n私が入学したときの建物も、今は砂に埋もれてる。"
13040-285 = "ホシノ先輩が入学してから、すぐこちらに移ったんですよね？"
13040-286 = "……よく知ってるね？"
13040-287 = "……まあ、それなりに。#nそれにしても別館なのに、だいぶ設備は整ってますね。"
13040-288 = "あれ、学園祭の事務局……こんな部屋もあったんですね。"
13040-290 = "「学園祭」というのは……もしかして、オアシス砂祭りのことでしょうか？"
13040-294 = "ちょっ、勝手に……"
13040-296 = "お祭りなら、私にも良いアイデアがあります！#nたとえば、新しいイベントを作ってみるとか！"
13040-297 = "あとは……#nアイドルのライブなんてどうでしょう？"
13040-298 = "……あれ。"
13040-299 = "……何も、ありませんね。"
13040-300 = "当然でしょ。#n砂祭りなんて、とっくの昔に無くなってる。"
13040-301 = "……そうですね。#n確かに、そうでした……"
13040-302 = "はあ……"
13040-306 = "……それで、何のために来たの？"
13040-307 = "え、先輩とアイドルを……"
13040-308 = "そうじゃない。どうして私について来るのかってこと。"
13040-309 = "学校の違う君に、先輩だなんて呼ばれる筋合いもないし。"
13040-310 = "ハイランダー鉄道学園、だっけ？#nそこに入学するんじゃなかった？"
13040-311 = "そ、それは……"
13040-312 = "……このまま進学したら、ずっと後悔すると思うんです。"
13040-313 = "なんで？#nネフティスとコネがある学園なんでしょ？"
13040-314 = "はい。きっと、素晴らしい待遇で迎えてくれるでしょう。#n生徒会長にもなれると思いますし……"
13040-315 = "へぇ、生徒会長に？#nいいんじゃない？"
13040-316 = "……。"
13040-317 = "……まあ、お嬢さんにも事情があるのは分かったよ。"
13040-318 = "でも、ここに来たところで後悔するのは一緒。#nこんな何もない学校に来てどうするの？"
13040-319 = "お嬢さ――いや、ノノミちゃんはまだ若いんだから。#nおじさんの言うことを素直に聞いておきなよ。"
13040-320 = "（おじさん……？）"
13040-321 = "おじさん、って……#n私と年の差はほとんど無いと思うんですが……"
13040-322 = "中学生でしょ？"
13040-323 = "もう卒業しましたけど……"
13040-324 = "まあ、どっちでもいいよ。"
13040-333 = "時間が無いので、ハイランダー鉄道学園について簡潔に説明します！"
13040-335 = "鉄道の管理とそれに関する教育に特化した学園、ハイランダー。#nキヴォトス内の路線を一部管理していたり、#nそれ以外にも様々な事業を行なっています。"
13040-336 = "ハイランダー鉄道学園に、自治区は存在しません。#nその代わり、彼女たちが管理している路線そのものが自治区としての役割を果たしています。"
13040-337 = "たしかに珍しい形だねぇ。"
13040-338 = "はい……#nあの監督官が話されていたように、#n組織間で何らかの軋轢があるのも本当のようです。"
13040-339 = "鉄道を維持管理する事務組織と治安組織が、それぞれ独立しています。#n学園の行政を管理する集団は、[ruby=Central Control Center]中央管制センター[/ruby]……通称「CCC」と呼ばれているそうです。"
13040-340 = "ハイランダーの生徒会って感じ？"
13040-342 = "うん、あの双子は生徒会の役員みたい。"
13040-347 = "最後に現れた[ruby=あさぎり]朝霧[/ruby]スオウさんは、#nそのCCCを牽制するために理事会から派遣された監督官のようで……"
13040-348 = "お互いに牽制しているように見えたけど、#n確かなことはまだ何も……"
13040-350 = "以上が、今わかっているハイランダー鉄道学園の情報です。"
13040-354 = "あれ……？"
13040-359 = "えっ……？"
13040-360 = "い、一体誰が……？#nチャイムなんて、長いことずっと……"
13040-362 = "推参ー。"
13040-363 = "ハイランダーから来たCCCだけど、早く入れてくんない？#n……あれ、返事すら無いし。#nヒカリ、あれやっちゃって。"
13040-364 = "ヒカリ選手の必殺ピンポンダッシュ秒間16連打ー。"
13040-373 = "ええぇっ！？"
13040-374 = "な、何よこいつら？"
13040-375 = "うへ～、噂をすれば何とやらってやつかな？#nこんなにすぐ来るとは思わなかったけどね。"
13040-378 = "……話をややこしくするな[ruby=ダッシュする]、退く[/ruby]んだったら[ruby=ど]退[/ruby]け。"
13040-382 = "おぉー？"
13040-383 = "押すなって！"
13040-384 = "……失礼する。#n管理監督官の朝霧スオウだ。"
13040-385 = "……争うつもりで来たわけではないから安心してくれ。#nだが、こちらの時間も限られている。#n早いところ開けてもらえないだろうか。"
13040-387 = "ど、どうしましょう……？"
13040-388 = "……入ってもらおっか。#nチャイムを壊されるのも困るし。"
13040-390 = "次回;砂漠横断鉄道"
