[translation]
13040-1 = "Episódio 4; Aqueles que seguem o fluxo"
13040-2 = "Hiiin, por que as coisas terminaram assim..."
13040-3 = "Não importa o porquê, a culpa é sua por confiar nas pessoas tão facilmente."
13040-4 = "Mas é que... disseram que eu ganharia um ótimo salário trabalhando 90 horas por semana..."
13040-5 = "É muita ingenuidade achar que existe um trabalho decente em um distrito autônomo tão decadente quanto este."
13040-6 = "Haha, como você conseguiu sobreviver até hoje com esse cérebro? #nUse a cabeça um pouco!"
13040-7 = "E, e o dinheiro...?"
13040-8 = "Não tem dinheiro nenhum, desde o começo! #nVocê é idiota ou o quê?!"
13040-10 = "I-isso é um problema, se for assim, a dívida da escola...! #nAlém disso, se eu não voltar logo, minha veterana vai ficar preocupada..."
13040-12 = "Antes da escola, por que não se preocupa com você mesma?"
13040-13 = "Este prédio agora está sob nosso controle!"
13040-14 = "Não sei quem é essa veterana, mas se você acha que seus amigos virão te salvar, pode desistir—"
13040-18 = "...Hm?"
13040-19 = "Tsc... #nO que é esse tremor... um terremoto?"
13040-23 = "Saiam da frente!!"
13040-24 = "O quê...!"
13040-25 = "Quem é essa garota!?"
13040-27 = "Ho, Hoshino-chan...!?"
13040-28 = "Eu te encontrei, veterana! #nNão suma assim em momentos tão ocupados!"
13040-29 = "Vamos voltar logo!"
13040-31 = "O-o que você pensa que está fazendo, sua pirralha!"
13040-32 = "Ei, entrem em contato com eles logo! #nDroga, será que eles estão dormindo?!"
13040-34 = "Ninguém virá como reforço. #nQuanto aos que estavam lá embaixo, eu já derrotei todos."
13040-36 = "O que você disse!?"
13040-37 = "A-aquela quantidade de pessoas, sozinha...!"
13040-46 = "Uaaaaaaah!"
13040-47 = "Guaaaaaah!?"
13040-51 = "Hi, hiiin... Eu estava com tanto medo, Hoshino-chan..."
13040-52 = "Você foi enganada por adultos estranhos de novo, aprenda a lição de uma vez..."
13040-53 = "Mas..."
13040-54 = "As pessoas continuam indo embora, e o lugar virou uma favela cheia de delinquentes..."
13040-55 = "Abydos agora é uma terra sem lei."
13040-56 = "Considere que qualquer pessoa que você não conhece é uma pessoa má."
13040-57 = "...Mas, e se for alguém que realmente está em apuros?"
13040-58 = "Não existe ninguém assim! #nTodos, sem exceção, são vilões!"
13040-59 = "É, será mesmo...?"
13040-60 = "Mesmo que você estenda a mão, será traída imediatamente! #nDesse jeito, não conseguiremos proteger a escola!"
13040-64 = "Veterana, mesmo agora..."
13040-65 = "Hoshino-chan."
13040-66 = "...?"
13040-67 = "Não é assim, Hoshino-chan. #nIsso está errado."
13040-72 = "Yu, Yume-senpai...?"
13040-76 = "É um assunto importante, então escute com atenção."
13040-77 = "Aquele... um pouco perto demais, não acha..."
13040-82 = "Dúvida, desconfiança, violência, mentiras... #nSe começarmos a achar que essas coisas são normais,"
13040-83 = "nós também acabaremos nos perdendo um dia."
13040-85 = "..."
13040-86 = "Mesmo que recuperemos Abydos desse jeito, #nela não será a Abydos que imaginamos."
13040-87 = "Se as pessoas voltarem para Abydos... e a cidade tiver se tornado um lugar assim... eu ficaria triste."
13040-88 = "Por isso, Hoshino-chan. #nSe houver alguém em apuros, estenda a mão. #nSe alguém estiver com fome ou morrendo de frio, ajude-os."
13040-89 = "……。"
13040-90 = "Não tenho certeza se consegui me expressar bem, mas..."
13040-91 = "A Hoshino-chan vai entender o que eu quero dizer, não vai?"
13040-95 = "……E se você for traída por causa disso, o que vai fazer?#nE se acabar em perigo de novo, como hoje?"
13040-96 = "……Nesse caso, a Hoshino-chan vai me salvar, não vai?"
13040-97 = "…………Bem, eu irei, sim."
13040-98 = "Fufu."
13040-99 = "P-por que você está rindo!"
13040-100 = "Hmm?#nÉ que eu pensei em anotar as palavras da Hoshino-chan para não esquecer!"
13040-101 = "Hã!?"
13040-107 = "Ei, não escreva isso!#nE o que é esse caderno estranho, afinal?"
13040-108 = "Você não vai trocar por um novo logo?#nVocê já não é mais uma aluna do primário..."
13040-109 = "Ah, é verdade, Senpai Yume.#nTive uma ótima ideia de estratégia..."
13040-110 = "Acho que com isso, a segurança de Abydos vai melhorar!"
13040-111 = "……Senpai Yume?"
13040-115 = "……Senpai Yume?"
13040-121 = "……。"
13040-122 = "Senpai Yume……"
13040-123 = "……。"
13040-124 = "…………。"
13040-125 = "O-onde estou……"
13040-126 = "…………。"
13040-127 = "Ah, entendi……"
13040-135 = "……É verdade."
13040-136 = "Eu vim aqui para fechar a sala do conselho estudantil……"
13040-137 = "Por quanto tempo eu dormi……"
13040-138 = "……。"
13040-139 = "Eu preciso fechar, mas……"
13040-140 = "……。"
13040-148 = "……Vou deixar para amanhã."
13040-149 = "Amanhã eu fecho, com certeza………… Senpai."
13040-154 = "Ué, você é……"
13040-155 = "Eu estava esperando por você!#nVice-presidente do conselho estudantil!"
13040-156 = "Eh…… eu?"
13040-157 = "Sim! Eu preciso falar com você!"
13040-158 = "……Falar sobre o quê?"
13040-159 = "E-eu…… eu realmente sou do Grupo Nephthys."
13040-160 = "Não posso mudar esse fato, mas……#nmesmo alguém como eu pode fazer algo!"
13040-161 = "Algo……?"
13040-166 = "Com este cartão dourado, vou quitar todas as dívidas da escola!"
13040-172 = "E-ei…… o quê?#nCartão dourado……?"
13040-173 = "Ah, é que…… este é meu cartão de crédito pessoal……#ne se eu usá-lo, posso sacar os fundos da Nephthys."
13040-174 = "……Ei, você está pensando direito antes de falar?"
13040-175 = "……!!"
13040-176 = "Você entende o que significa quitar as dívidas com esse cartão?"
13040-177 = "O-o significado, quer dizer……"
13040-178 = "Eu sei que você está dizendo isso com boas intenções.#nMas como você acha que as outras pessoas vão interpretar isso?"
13040-179 = "Esse cartão pertence à Nephthys, certo?#nOu seja, quem pagou as dívidas da escola foi a Nephthys, não você."
13040-180 = "E-eu……"
13040-181 = "Só porque você pode usá-lo livremente, não significa que esse dinheiro seja seu, mocinha."
13040-182 = "Até hoje, você já ganhou dinheiro por conta própria?#nMesmo que seja ajudando em casa, serve."
13040-183 = "Isso é..."
13040-184 = "É melhor pensar bem sobre quem forneceu esse dinheiro."
13040-185 = "No momento em que você pagar a dívida com esse cartão,#na propriedade desta escola passará a ser da Nefthys. Pelo menos, é o que eles devem pensar."
13040-186 = "E, então..."
13040-187 = "Como podemos pagar a dívida de Abydos?"
13040-189 = "……."
13040-190 = "Não seria melhor pagar com o dinheiro que vocês ganharam como alunas de Abydos?"
13040-191 = "……."
13040-192 = "……Como você faz, quer dizer?"
13040-193 = "……Hum?"
13040-194 = "……Entendi.#nVou me retirar e pensar melhor."
13040-195 = "E outra coisa, eu não sou uma 'mocinha'."
13040-197 = "Sou a Nonomi, Hoshino-senpai."
13040-198 = "……Eh?"
13040-200 = "Então, voltarei em breve."
13040-204 = "Eh...?"
13040-207 = "Se, senpai!? Onde você está!?"
13040-215 = "Yume-senpai!#nEstou aqui! Senpai!!"
13040-216 = "Yume-senpai!!!"
13040-220 = "……!!"
13040-221 = "……."
13040-222 = "Ho, Hoshino-senpai..."
13040-226 = "………………………………."
13040-227 = "……O que foi, você de novo?"
13040-228 = "A-ah... v-você está bem...?"
13040-229 = "……."
13040-230 = "Quem disse que você podia entrar?#nNão chamei nenhuma estudante do fundamental."
13040-231 = "É que eu ouvi um grito..."
13040-232 = "……Além disso, eu já me formei, então não sou mais uma estudante do fundamental."
13040-233 = "Já está decidido que vou ingressar em uma escola que tem uma relação de cooperação com a Nefthys.#nAcademia Ferroviária Highlander...#nOs documentos de matrícula já devem ter chegado em casa."
13040-234 = "Então é melhor você ir logo para lá.#nEm vez de ficar perdendo tempo aqui."
13040-235 = "……Sim.#nPor isso, queria dar uma última olhada neste lugar."
13040-239 = "E aí, quando eu estava no pátio, ouvi um grito..."
13040-240 = "E-eu não sou uma perseguidora, de jeito nenhum!"
13040-241 = "……Entendo."
13040-242 = "Então, dê uma olhada rápida e vá embora."
13040-243 = "……Eu ouvi falar."
13040-247 = "Sobre o caso do desaparecimento da presidente do conselho estudantil...#nSe não me engano, era a Yume-san, certo?"
13040-251 = "Alguns dizem que ela fugiu porque havia muitos problemas, mas..."
13040-252 = "Disseram que era ultrassecreto, mas chegou aos meus ouvidos.#nA presidente do conselho estudantil não desapareceu, ela..."
13040-256 = "Além disso, a primeira pessoa a encontrá-la foi..."
13040-257 = "D-desculpe!#nFalar sobre isso na frente da senpai..."
13040-258 = "Tudo bem, não precisa se preocupar tanto."
13040-259 = "Aquele..."
13040-260 = "Você parou de ir ao deserto...?"
13040-261 = "Você continuou indo ao deserto mesmo depois que a presidente foi encontrada, será que você estava..."
13040-262 = "Será que você estava procurando por algo...?"
13040-267 = "A-aliás, esta é a sala do conselho estudantil de Abydos, certo?#nAntes ela estava trancada, mas..."
13040-268 = "Por acaso, você está procurando algo?"
13040-269 = "……Já vou indo."
13040-274 = "Ah! E-espere, senpai!"
13040-280 = "Cof, cof... quanta poeira..."
13040-281 = "……É que faz um bom tempo que não limpo aqui. #nNão tenho ânimo para fazer isso sozinha. #nCuidado ali... o piso está danificado."
13040-282 = "O anexo nunca foi muito bem cuidado, para falar a verdade."
13040-283 = "……Sim, eu ouvi dizer. #nQue o prédio principal, que ostentava a história mais longa de Kivotos, já foi engolido pelo deserto..."
13040-284 = "É verdade. #nO prédio de quando eu entrei na escola também já está enterrado na areia."
13040-285 = "Você se mudou para cá logo depois que entrou, não foi, Hoshino-senpai?"
13040-286 = "……Você sabe bastante, hein?"
13040-287 = "……Bem, o básico. #nMas, mesmo sendo um anexo, as instalações estão bem conservadas."
13040-288 = "Ué, o comitê do festival escolar... não sabia que existia uma sala dessas aqui."
13040-290 = "Esse \"festival escolar\"... será que você está falando do Festival da Areia do Oásis?"

13040-294 = "Ei, não saia mexendo nas coisas..."
13040-296 = "Se for um festival, eu tenho ótimas ideias! #nPor exemplo, criar um evento novo!"
13040-297 = "E também... #nque tal um show de idols?"
13040-298 = "……Ué."
13040-299 = "……Não tem nada aqui."
13040-300 = "Claro que não. #nO Festival da Areia já deixou de existir faz muito tempo."
13040-301 = "……É verdade. #nCom certeza, era isso mesmo..."
13040-302 = "Haa..."
13040-306 = "……Então, por que você veio?"
13040-307 = "Ah, sobre a senpai e as idols..."
13040-308 = "Não é isso. Estou perguntando por que você está me seguindo."
13040-309 = "Você é de outra escola, não tem motivo nenhum para me chamar de senpai."
13040-310 = "Academia Ferroviária Highlander, não é? #nVocê não ia se matricular lá?"
13040-311 = "I-isso é..."
13040-312 = "……Acho que se eu entrar lá agora, vou me arrepender para sempre."
13040-313 = "Por quê? #nNão é uma escola que tem conexões com a Nephthys?"
13040-314 = "Sim. Com certeza me receberiam com um tratamento excelente. #nAcho que até conseguiria me tornar presidente do conselho estudantil..."
13040-315 = "Ora, presidente do conselho estudantil? #nNão é bom isso?"
13040-316 = "……."
13040-317 = "……Bem, entendi que você tem seus motivos, senhorita."
13040-318 = "Mas você vai se arrepender do mesmo jeito se ficar aqui. #nO que você pretende fazer vindo para uma escola que não tem nada?"
13040-319 = "Senhorita... não, Nonomi-chan, você ainda é jovem. #nEscute o que a titia aqui está dizendo."
13040-320 = "(Titia...?)"
13040-321 = "Titia... #nEu acho que não temos quase nenhuma diferença de idade..."
13040-322 = "Você não está no ensino fundamental?"
13040-323 = "Eu já me formei..."
13040-324 = "Bem, tanto faz."
13040-333 = "Como não temos tempo, vou explicar brevemente sobre a Academia Ferroviária Highlander!"
13040-335 = "A Highlander é uma academia especializada na gestão ferroviária e na educação relacionada a isso. #nEles gerenciam parte das linhas dentro de Kivotos e também realizam vários outros negócios."
13040-336 = "Não existem distritos autônomos na Academia Ferroviária Highlander. #nEm vez disso, as próprias linhas que elas gerenciam funcionam como distritos autônomos."
13040-337 = "Realmente, é um formato bem incomum."
13040-338 = "Sim... #nComo aquela supervisora disse, #nparece ser verdade que existe algum tipo de atrito entre as organizações."
13040-339 = "A organização administrativa que mantém e gerencia as ferrovias e a organização de segurança são independentes. #nO grupo que gerencia a administração da academia é chamado de Centro de Controle Central... conhecido como 'CCC'."
13040-340 = "Tipo o conselho estudantil da Highlander?"
13040-342 = "Sim, aquelas gêmeas parecem ser membros do conselho estudantil."
13040-347 = "A Asagiri Suou, que apareceu por último, #nparece ser uma supervisora enviada pelo conselho administrativo para conter o CCC..."
13040-348 = "Parecia que elas estavam tentando conter uma à outra, #nmas ainda não temos certeza de nada..."
13040-350 = "Essas são todas as informações que temos sobre a Academia Ferroviária Highlander por enquanto."
13040-354 = "Hã...?"
13040-359 = "Eh...?"
13040-360 = "Q-quem poderia ser...?#nA campainha não toca há tanto tempo..."
13040-362 = "Chegamos."
13040-363 = "Somos da CCC de Highlander, pode abrir logo?#n...Ué, nem resposta?#nHikari, faz aquilo."
13040-364 = "A técnica especial da jogadora Hikari: 16 toques na campainha por segundo."
13040-373 = "Eeeeh!?"
13040-374 = "Q-quem são essas?"
13040-375 = "Uhe~, falando no diabo, né?#nNão achei que viriam tão rápido."
13040-378 = "……Não complique as coisas, se for recuar, saia da frente."
13040-382 = "Oh~?"
13040-383 = "Não empurra!"
13040-384 = "……Com licença.#nSou a supervisora administrativa, Asagiri Suou."
13040-385 = "……Não viemos aqui para lutar, então fiquem tranquilas.#nMas nosso tempo é limitado.#nPoderiam abrir logo?"
13040-387 = "O-o que faremos...?"
13040-388 = "……Vamos deixar elas entrarem.#nNão quero que quebrem a campainha."
13040-390 = "Próximo episódio: Ferrovia Trans-Deserto"
