[translation]
11010-1 = "Episódio 1; Bem-vindo à força-tarefa!"
11010-2 = "Placa de Petri/escritório"
11010-3 = "Bom dia, sensei!"
11010-4 = "Parece que houve muitos rumores sobre a Placa de Petri nos últimos dias, e também recebi cartas de outros estudantes pedindo ajuda."
11010-5 = "Isso é um bom sinal! Isso significa que nosso sucesso está prestes a começar!"
11010-6 = "Porém, entre eles... havia uma carta um pouco perturbadora como esta."
11010-7 = "Acho que você deveria pedir ao seu sensei para ler isso uma vez."
11010-8 = "[s] Leia a carta."
11010-11 = "Ao sensei do Departamento de Investigações Federais"
11010-13 = "Olá. Meu nome é OkusoraAyane da Abydos High School."
11010-15 = "Desta vez, eu realmente queria te perguntar uma coisa, então escrevi esta carta."
11010-17 = "Para ser franco, nossas escolas estão atualmente em um canto."
11010-19 = "Isto também é feito por organizações violentas locais."
11010-21 = "(Leia a segunda página)"
11010-23 = "As circunstâncias que levaram a esta situação são bastante complicadas..."
11010-25 = "Aparentemente, o prédio da nossa escola está sendo alvo."
11010-27 = "Estou conseguindo parar agora, mas"
11010-29 = "Estamos prestes a ficar sem munição e outros suprimentos..."
11010-31 = "Se as coisas continuarem assim, a escola provavelmente será tomada por organizações violentas."
11010-33 = "(Leia a terceira página)"
11010-35 = "Então, pensei que seria legal se eu pudesse perguntar ao sensei dessa vez."
11010-37 = "Sensei, você poderia nos ajudar?"
11010-40 = "Hmm... Escola Secundária de Abydos...?"
11010-41 = "Costumava ser uma região autónoma muito grande, mas ouvi dizer que a cidade está numa situação difícil devido às alterações climáticas."
11010-42 = "Aparentemente é tão grande que algumas pessoas se perdem no meio da cidade!"
11010-43 = "Haha, isso pode realmente acontecer...? Por mais difícil que seja se perder no meio da cidade..."
11010-44 = "Acho que isso é um pouco exagerado, mas..."
11010-45 = "Além disso, o fato de uma escola estar sendo atacada por uma organização violenta... não parece algo fora do comum..."
11010-46 = "O que aconteceu?"
11010-47 = "[s] Faça uma viagem de negócios para Abydos."
11010-48 = "Você vai embora logo? ? Como esperado, a ação de um adulto!"
11010-49 = "Eu entendi! Vamos embora agora!"
11010-51 = "(Embora tenhamos chegado à região autônoma de Abydos.)"
11010-52 = "(Não consegui encontrar minha escola, me perdi por dias, me perdi no meio da cidade e me perdi.)"
11010-54 = "Próxima vez; Primeiro dia em Abydos"
