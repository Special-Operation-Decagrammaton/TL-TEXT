[translation]
11010-1 = "Episódio 1;Bem-vindo à Força-Tarefa Hipotecária!"
11010-2 = "Escritório de Schale"
11010-3 = "Bom dia, Sensei!	"
11010-4 = "Parece que houve muitos rumores sobre a Schale nos últimos dias, e também recebi cartas de outros estudantes pedindo ajuda."
11010-5 = "Isso é um bom sinal! Isso significa que temos muito trabalho pela frente!"
11010-6 = "Porém, entre eles... havia uma carta um pouco preocupante."
11010-7 = "Acho que você deveria ler isso."
11010-8 = "[s] Leia a carta."
11010-11 = "Ao Sensei do Clube de Investigação Federal"
11010-13 = "Olá. Meu nome é Okusora Ayane do Ensino Médio Abydos."
11010-15 = "Eu estou escrevendo esta carta, porque eu preciso da sua ajuda."
11010-17 = "Para ser franca, nossa escola está atualmente sendo assediada."
11010-19 = "Uma das gangues violentas locais esteve nos atormentando."
11010-21 = "(Leia a segunda página)"
11010-23 = "As circunstâncias que levaram a esta situação são bastante complicadas..."
11010-25 = "Aparentemente, o alvo delas é o próprio prédio escolar."
11010-27 = "Estamos dando o nosso melhor para pará-las"
11010-29 = "Mas estamos prestes a ficar sem munição e suprimentos..."
11010-31 = "Se as coisas continuarem assim, a escola provavelmente será tomada."
11010-33 = "(Leia a terceira página)"
11010-35 = "É por isso que estou pedindo por ajuda."
11010-37 = "Sensei, você poderia nos ajudar?"
11010-40 = "Hmm... Ensino Médio Abydos...?"
11010-41 = "Costumava ser uma região muito grande e próspera, mas ouvi dizer que está numa situação difícil devido às alterações climáticas."
11010-42 = "Aparentemente é tão grande que algumas pessoas se perdem no meio da cidade!"
11010-43 = "Haha, isso pode realmente acontecer...? Se perder no meio de uma cidade?"
11010-44 = "Acho que isso é um pouco exagerado, mas..."
11010-45 = "Além disso, o fato de uma escola estar sendo atacada uma gangue... parece sério..."
11010-46 = "O que será que aconteceu?"
11010-47 = "[s] \"Eu preciso ir para Abydos.\""
11010-48 = "Você vai embora agora?? Como esperado, a ação de um adulto!"
11010-49 = "Eu entendi! Boa sorte!"
11010-51 = "(Embora tenha chegado à região autônoma de Abydos.)"
11010-52 = "(Não consegui encontrar a escola, e estou perdido por dias.)"
11010-54 = "Próximo Episódio;Primeiro dia em Abydos"