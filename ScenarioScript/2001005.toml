[translation]
2001005-1 = "Capítulo de Treinamento e Etiqueta"
2001005-2 = "Estrada de montanha perto do prédio antigo da escola"
2001005-5 = "Ao administrar uma estância termal, você tem que lutar contra pilhas de roupa suja todos os dias."
2001005-6 = "Yukatas alugados para os clientes, toalhas, e por aí vai..."
2001005-7 = "A quantidade de roupa suja que a estância gera em um único dia é inimaginável."
2001005-8 = "Mas, mesmo em meio a tanta correria, como uma proprietária exemplar de uma estância termal, nunca devo esquecer de manter uma postura elegante."
2001005-9 = "Por isso, hoje, enquanto aplico uma carga... vou tentar caminhar por esta estrada congelada carregando várias almofadas pesadas!"
2001005-10 = "[s] \"Isso conta como treinamento...?\""
2001005-11 = "Com certeza. Ouvi dizer que a elegância começa com a aparência, especialmente com a forma de caminhar."
2001005-12 = "E caminhar graciosamente enquanto carrega roupas pesadas não é nada fácil."
2001005-13 = "Além disso, o chão da estância costuma estar molhado e escorregadio, então, se eu me descuidar, posso acabar levando um tombo feio."
2001005-14 = "...E é por isso que escolhi este lugar: esta montanha nevada!"
2001005-15 = "Com muitos obstáculos, partes do chão congeladas e a neve que torna tudo escorregadio. Se eu conseguir caminhar com elegância aqui enquanto carrego uma carga pesada, serei capaz de manter uma postura refinada em qualquer lugar!"
2001005-16 = "Vamos, Sensei, empilhe as almofadas nas minhas mãos!"
2001005-21 = "[ns] \"Está bom assim?\""
2001005-22 = "Não, não, ainda consigo carregar mais 10. Por favor, coloque mais."
2001005-26 = "[ns] \"E agora?\""
2001005-27 = "Não... ainda, ainda consigo aguentar...!"
2001005-31 = "A-acho que por aqui já está bom..."
2001005-32 = "[s] \"Sinto que já vi algo assim em programas de comédia...?\""
2001005-33 = "Fufu... pode até parecer engraçado, mas a sensação é ótima!"
2001005-34 = "Quem sabe, se os clientes virem essa minha figura equilibrando tudo perfeitamente na estância... talvez eles fiquem tão impressionados que me deem gorjetas!?"
2001005-35 = "[s] \"Se isso acontecer, vai ser mais um circo do que uma estância termal.\""
2001005-36 = "O-o que você quer dizer com isso...!?"
2001005-37 = "Opa, se eu me descuidar, com essa altura, o equilíbrio..."
2001005-38 = "Opa, a-ah, o que...?"
2001005-39 = "[s] \"Nodoka, cuidado!\""
2001005-44 = "Ai, ai, ai..."
2001005-46 = "[ns1] \"Você está bem?\"\n[ns2] \"Se machucou...?\""
2001005-49 = "E-estou bem. Só acabei tropeçando um pouco..."
2001005-50 = "Pelo visto, 50 almofadas era demais mesmo..."
2001005-51 = "Auh...!"
2001005-52 = "Hum, será que eu torci o tornozelo...?"
2001005-53 = "Ugh, que pena, mas o treinamento de hoje termina aqui..."
2001005-61 = "...? Sensei, que posição é essa...?"
2001005-62 = "[s3] \"Não posso deixar você andar nesse estado.\"\n[s4] \"Vamos, suba nas minhas costas.\""
2001005-63 = "I-isso significa que você vai me carregar nas costas...!?"
2001005-64 = "I-isso significa que você vai me carregar nas costas...!?"
2001005-65 = "M-mesmo que eu tenha torcido o tornozelo, será que um luxo desses é permitido!?"
2001005-66 = "A distância onde posso sentir a temperatura do corpo do Sensei, a distância zero com as costas do Sensei..."
2001005-67 = "[s] \"...Nodoka?\""
2001005-68 = "N-não é nada!"
2001005-72 = "Fufu... embora eu tenha me machucado, isso é uma vantagem inesperada..."
2001005-74 = "(Carregando Nodoka nas costas, voltamos para o Schale)"
