[translation]
2001005-1 = "修行・礼節編"
2001005-2 = "旧校舎付近の山道"
2001005-5 = "温泉郷を運営すると、毎日たくさんの洗濯物と戦わなくてはいけません。"
2001005-6 = "お客様にレンタルした浴衣や、タオルなど……"
2001005-7 = "温泉郷全体で一日に発生する洗濯物の量は、想像を絶するほどなんですよ。"
2001005-8 = "ですがそうやって忙しい中でも、立派な温泉郷の女将としては常に気品のある佇まいを忘れてはいけません。"
2001005-9 = "そこで今日は負荷をかけながら……試しに重い座布団を何枚も持ちつつ、この凍った道を歩いてみようかと！"
2001005-10 = "[s] \"それは修行になるのかな……？\""
2001005-11 = "もちろんです。品格は身だしなみ、特に歩き方から始まるという話を聞いたことがあります。"
2001005-12 = "そして重い洗濯物を持ったまま綺麗に歩くということは、なかなか簡単ではありません。"
2001005-13 = "それに温泉郷の床は時々濡れていることも多くて滑りやすく、油断したら派手に転んでしまいかねないんです。"
2001005-14 = "……それで選んだ場所が、この雪山！"
2001005-15 = "障害物も多く、一部の地面は凍っていたりと、雪で滑りやすいこの場所。ここで重い荷物を抱えながら優雅に歩くことができれば、いつどこでも気品のある歩き方ができるはず！"
2001005-16 = "さあ先生、私の手の上に座布団を積んでください！"
2001005-21 = "[ns] \"これぐらいで良い？\""
2001005-22 = "いえいえ、まだあと10枚は持てますよ。もっともっとお願いします。"
2001005-26 = "[ns] \"これくらい？\""
2001005-27 = "いえ……まだ、まだやれます……！"
2001005-31 = "こ、これくらいで良いかと……。"
2001005-32 = "[s] \"なんかお笑いとかで、こういうの見たような……？\""
2001005-33 = "ふふっ……見た目は面白くなっているかもしれませんが、良い感じです！"
2001005-34 = "もしかして温泉郷でもこうして、完璧にバランスを取りながら洗濯物を運ぶ姿を見られたら……感激したお客様が、チップをくれたりするのではないでしょうか！？"
2001005-35 = "[s] \"そうなると、温泉郷っていうよりサーカスだね。\""
2001005-36 = "そ、それはどういう意味ですか……！？"
2001005-37 = "おっと、油断するとやはりこの高さではバランスが……。"
2001005-38 = "っとと、あ、あれ……？"
2001005-39 = "[s] \"ノドカ、危ない！\""
2001005-44 = "いたたた……"
2001005-46 = "[ns1] \"大丈夫！？\"\n[ns2] \"怪我は……！？\""
2001005-49 = "だ、大丈夫です。ただちょっと転んでしまっただけで……。"
2001005-50 = "やっぱり、座布団50枚は難しかったですね……。"
2001005-51 = "あぅっ……！"
2001005-52 = "えっと、これはもしかして、足首を捻ってしまったような……？"
2001005-53 = "うぅ、残念ですが今日の修業はここまでですね……。"
2001005-61 = "……？先生、その体勢は……？"
2001005-62 = "[s3] \"その状態で歩かせるわけにはいかないよ。\"\n[s4] \"はい、乗って。\""
2001005-63 = "そ、それはつまり、おんぶしてくれるということですか……！？"
2001005-64 = "そ、それはつまり、おんぶしてくれるということですか……！？"
2001005-65 = "い、いくら足を捻ったと言っても、こんな贅沢が許されても良いのでしょうか！？"
2001005-66 = "先生の体温が感じられる距離、先生の背中とゼロ距離……"
2001005-67 = "[s] \"……ノドカ？\""
2001005-68 = "な、何でもありません！"
2001005-72 = "ふふっ……怪我をしてしまったとはいえ、これは役得ですね……。"
2001005-74 = "（そのままノドカをおんぶして、シャーレへと戻った）"
