[translation]
10021021-2 = "プレナパテスが、倒れました！！"
10021021-6 = "きゃああっ！？"
10021021-7 = "箱舟は崩壊しました！！#nアヤネさん、避難を！！"
10021021-8 = "このまま爆発に巻き込まれてしまえば、宇宙に弾き飛ばされるか、地上に叩きつけられます！！"
10021021-9 = "……分かりました。先輩、先生……！みなさん、地上でお会いしましょう！"
10021021-10 = "……先生を、よろしくお願いします。リンさん！"
10021021-11 = "はい、お任せください。"
10021021-16 = "「脱出シーケンス」：残り14回"
10021021-18 = "私もすぐに避難できるよう、準備しなければ。"
10021021-22 = "「脱出シーケンス」：残り13回"
10021021-24 = "先生！そちら側の皆さんを避難させてください！"
10021021-25 = "時間がありません！「箱舟」が完全に崩壊する前に――"
10021021-27 = "はい、「脱出シーケンス」の起動は私が担当します！#n先生は指示をお願いします！！"
