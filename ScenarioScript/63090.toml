[translation]
63090-1 = "Episódio 9; Estudando para o Exame"
63090-4 = "Opa. Como está sendo a vida por aqui?"
63090-9 = "Ah, estou levando como dá. Você é... a subdiretora Konoka, não é?"
63090-10 = "Que formalidade. Pode me chamar de Konoka."
63090-11 = "A Saori-san é um ano mais velha que eu, né? Mesmo que estejamos no mesmo ano letivo."
63090-12 = "Entendo... Compreendido. Mas, Konoka."
63090-13 = "Por que me chamar na sala de interrogatório agora...? Aconteceu algo? Minha sentença já não foi definida?"
63090-14 = "Como eu disse, só queria saber como você está passando o tempo. Você é uma celebridade aqui na Valkyrie, afinal."
63090-15 = "...Não acho que isso seja algo bom."
63090-16 = "Acho que é melhor do que ser famosa em todo o Kivotos, não acha?"
63090-17 = "Bem, nesse caso, parece que eu teria ainda mais problemas do que agora."
63090-18 = "Bom, chega de conversa fiada. Vamos ao que interessa."
63090-19 = "As informações sobre o Esquadrão Arius foram atualizadas."
63090-20 = "Descobriram mais crimes? Se for esse o caso, deve ter relação com a nossa pena."
63090-21 = "Hmm, algo parecido com isso."
63090-22 = "Entendo. Seja o que for, estou preparada para aceitar."
63090-23 = "Normalmente as pessoas reagem ao contrário, sabe?"
63090-24 = "...Muitos dos alunos da filial de Arius são um pouco diferentes do que vocês chamam de \"normal\"."
63090-25 = "Ah, falando na filial de Arius. O Conselho Estudantil Geral parecia feliz por estarem decidindo como lidar com vocês daqui para frente. Embora não tenha muito a ver com o assunto."
63090-26 = "Não, fico feliz que tenha me contado. Se for sobre minha antiga escola, não me importo com o assunto."
63090-27 = "Mesmo que sejamos tratadas como uma escola que formou os piores terroristas, não pretendo negar esse fato."
63090-28 = "Se não aceitarmos o passado, não conseguiremos seguir em frente."
63090-29 = "Uau, que palavras bonitas."
63090-35 = "Mas... você se arrepende?"
63090-36 = "Está falando daquele terrorismo?"
63090-37 = "O que mais seria?"
63090-43 = "Hmph..."
63090-47 = "Aconteceu alguma coisa?"
63090-48 = "Ah, não, me desculpe."
63090-49 = "Lembrei-me de que já tive essa mesma conversa com outra pessoa antes."
63090-50 = "Perguntou se eu me arrependo? A resposta é óbvia."
63090-54 = "Não houve um único dia em que eu não tenha me arrependido."
63090-57 = "Então você sente que era imatura naquela época?"
63090-58 = "Sim. Se fosse eu agora, jamais faria aquilo."
63090-59 = "Mas a minha versão do passado ainda sou eu, não há como mudar isso."
63090-60 = "..."
63090-61 = "Certo, exatamente como eu pensei."
63090-65 = "O que foi?"
63090-66 = "Calma, não precisa se apressar."
63090-67 = "É uma formalidade, mas..."
63090-71 = "Parabéns, Saori-san. E parabéns às outras integrantes do esquadrão também."
63090-72 = "Vocês receberam liberdade condicional. Podem começar a arrumar suas coisas."
63090-77 = "...?"
63090-78 = "O que isso significa? É algum tipo de piada nova?"
63090-79 = "Bem, eu imaginei que reagiria assim..."
63090-80 = "Então, vou explicar rapidinho."
63090-81 = "A liberdade condicional foi concedida a todas vocês do Esquadrão Arius."
63090-82 = "Mas nós cometemos um ato de terrorismo..."
63090-83 = "As acusações e a sentença continuam as mesmas."
63090-84 = "Mas, sabe, explosões e prédios sendo destruídos são coisas que acontecem o tempo todo por aqui, não é?"
63090-85 = "Por isso a construção civil é o setor de destaque em Kivotos..."
63090-86 = "A-ah..."
63090-87 = "Você sabe o que é mais levado em conta nos crimes de Kivotos?#nÉ a \"intenção assassina\" ou a \"malícia\"."
63090-88 = "É a primeira vez que ouço isso. Mas, se for esse o caso, então nós..."
63090-89 = "Pois é. Aquele ataque terrorista certamente teve intenção assassina e malícia."
63090-90 = "Mas, ouvindo vocês agora, parece que todas estão arrependidas."
63090-91 = "……？"
63090-92 = "E além disso, vocês até se entregaram, não é?#nÉ a primeira vez que vejo alunas problemáticas se entregarem desde que virei subdiretora!"
63090-93 = "Alunas que admitem seus crimes e pedem pelo castigo... O futuro de Kivotos não está perdido!"
63090-94 = "O-obrigada...?"
63090-95 = "（Será que isso está realmente certo...）"
63090-96 = "Acima de tudo, recebemos petições.#nE vindas justamente das pessoas contra quem vocês direcionaram a \"intenção assassina\" e a \"malícia\"."
63090-97 = "Do Sensei, da Trinity, e também..."
63090-102 = "—De Gehenna também."
63090-103 = "Como devem estar curiosas, vou apresentar algumas partes."
63090-105 = "Uma petição... Sim. Fui eu quem escreveu. Sem dúvidas."
63090-106 = "Não me importava com o fato de eu ter me ferido.#nMas fiquei furiosa por o Sensei ter sido envolvido."
63090-107 = "Mesmo assim, o motivo de eu ter escrito a petição?#nBem..."
63090-108 = "Eu queria que as perdoassem. O Sensei veio pessoalmente pedir por isso.#nSe ele fez algo assim, eu não tinha outra escolha a não ser fazer o mesmo."
63090-109 = "Só me resta... o custo do salão de beleza da Makoto..."
63090-110 = "……。"
63090-111 = "Não se preocupe com isso. Esse assunto é algo que realmente não importa."
63090-114 = "......Isso está certo?"
63090-115 = "Parece que sim."
63090-116 = "Com tantas vozes a favor, nós também não podemos ficar de braços cruzados."
63090-117 = "Além disso, a Valkyrie é uma escola com o objetivo de reabilitação e correção."
63090-118 = "......E os custos de manutenção da Divisão de Correção não são nada baratos."
63090-119 = "Bem, parece que o fator decisivo foi o Sensei ter dito que assumiria a responsabilidade.#nNão decepcione o Sensei, entendeu?"
63090-120 = "Ah, vou gravar isso na memória."
63090-121 = "E outra, costumam entender errado, mas liberdade condicional não significa inocência, viu?#nSe fizerem algo durante esse período, não haverá uma próxima vez."
63090-122 = "Eu juro. Se algo acontecer, podem destruir meu halo se quiserem."
63090-123 = "Ei, pare com esse tipo de fala! Sério, o estilo Arius é assustador!"
63090-124 = "D-desculpe..."
63090-125 = "......Nós estamos realmente... em liberdade condicional...?"
63090-126 = "Sim."
63090-127 = "Bem... já que as coisas ficaram assim, por que não se preparam para o exame?#nJá está quase na hora, não é?"
63090-131 = "O exame...! É verdade!"
63090-146 = "B-bem-vindas!"
63090-147 = "……。"
63090-148 = "Bem, pessoal!"
63090-149 = "Talvez as instalações não sejam lá essas coisas..."
63090-150 = "Mas vamos estudar juntas e superar o simulado!"
63090-155 = "Uau... que sala de aula incrível..."
63090-156 = "Em um lugar assim, talvez eu até sinta vontade de estudar..."
63090-161 = "A-ah..."
63090-162 = "Consigo entender essa reação."
63090-163 = "Comparado com a sala de aula de Arius, qualquer lugar parece assim."
63090-164 = "É, é mesmo. Ahaha..."
63090-165 = "Obrigada, Hifumi. E obrigada a todas vocês também."
63090-166 = "Por ajudarem de bom grado com o \"reforço escolar\" dessas crianças."
63090-172 = "Não seja tão distante. Somos amigos, afinal."
63090-174 = "Mas... não dizer o nome da escola e do clube é mais difícil do que eu pensava... #nSe eu me descuidar, vou acabar falando sem querer..."
63090-175 = "[s] \"Eu sinto o mesmo...\""
63090-179 = "……"
63090-180 = "……"
63090-181 = "O-olá, faz tempo... Azusa."
63090-182 = "Ah. Faz tempo, Maia."
63090-183 = "Não sei se deveria dizer isso, mas..."
63090-184 = "Estou feliz por te ver de novo."
63090-185 = "E-esse seu jeito de falar continua o mesmo..."
63090-186 = "Fico feliz... que você esteja bem..."
63090-187 = "……"
63090-188 = "Sim."
63090-189 = "Vocês também, com certeza, ficarão bem."
63090-190 = "Basta fazer o necessário para que fiquem."
63090-196 = "Se houver algo que eu possa fazer, é só pedir."
63090-200 = "Então, pode fazer a prova no meu lugar!?"
63090-201 = "Isso é impossível."
63090-202 = "Waaaaah..."
63090-206 = "Você é a Koharu... certo? #nSe não me engano, uma elite..."
63090-210 = "H-hum! Você tem bom olho para as pessoas! Isso mesmo! Eu sou a justiça—"
63090-214 = "Enfim! Como sou uma elite, pode contar comigo para qualquer coisa!"
63090-215 = "Então... pode me ensinar... este problema?"
63090-216 = "E-eh, bem...?"
63090-220 = "(Ué? Eu deveria saber isso...)"
63090-221 = "(Por que não consigo lembrar!? E olha que eu até anotei!)"
63090-222 = "B-bem, é isso! Isso é, tipo...!"
63090-223 = "Sim, sim!"
63090-224 = "U-uuh..."
63090-225 = "Não está na matéria da prova, então não precisa decorar ainda!"
63090-227 = "Sério!? É mesmo!?"
63090-228 = "Isso não é verdade, Koharu-chan. #nSó porque não está na matéria da prova, não significa que você não deva estudar. Esse pensamento é muito ingênuo."
63090-229 = "A própria Koharu-chan... está estudando \"conhecimentos adultos\" antes da hora, mesmo não estando na matéria, não é?"
63090-231 = "Kyaa!?"
63090-232 = "O-o que você está dizendo! Isso é crime! É um mal-entendido total!"
63090-234 = "Fufu. É mesmo?"
63090-235 = "De qualquer forma, esse problema realmente não está na prova, mas é um conteúdo que ajuda a entender a matéria."
63090-236 = "Então, vamos resolvê-lo desta forma."
63090-242 = "Urawa Hanako... ela realmente não é uma pessoa comum."
63090-243 = "...Aquela pessoa é imprevisível em vários sentidos."
63090-244 = "Será que existe algo que a Hanako-san não saiba...?"
63090-250 = "Claro que não. Eu não sei de tudo."
63090-251 = "Waaaaah!? V-você ouviu!? Me desculpeeeee!"
63090-252 = "Está tudo bem. Tsuchinaga Hiyori-san... era esse o seu nome? Posso te chamar de Hiyori-chan?"
63090-253 = "Eh? S-s-sim! É uma... honra..."
63090-254 = "E você, se não me engano... Atsuko-san. #n...Oh?"
63090-258 = "O que houve?"
63090-259 = "……?"
63090-260 = "……"
63090-261 = "……"
63090-265 = "Fufu."
63090-266 = "Fufu."
63090-267 = "Sinto que conheci alguém interessante. #nDe agora em diante, conto com você, Atsuko-chan?"
63090-268 = "Digo o mesmo. Conto com você, Hanako-chan."
63090-269 = "Ora, ora."
63090-270 = "Fufufu."
63090-272 = "……Vocês já se conheciam?"
63090-273 = "Não, não é isso. Só que…… de alguma forma, senti que conseguiríamos nos entender."
63090-274 = "Talvez a Hanako-chan tenha sentido o mesmo, não acha?"
63090-275 = "……Não entendi absolutamente nada."
63090-276 = "Sim. Acho que por enquanto está tudo bem assim."
63090-277 = "Ainda não entendi muito bem, mas, tudo bem……."
63090-278 = "Bem, então vamos retomar os estudos. Pode conduzir a aula, Sensei?"
63090-279 = "[s] \"Deixe comigo!\""
63090-294 = "A propósito…… o que é esse monte de algodão estranho?"
63090-298 = "Boa pergunta! Isso é――"
63090-303 = "Um brinde dos Momo Friends para quem tirar boas notas!"
63090-305 = "De novo isso……?"
63090-307 = "Momo…… Friends……?"
63090-308 = "Sim! São os Momo Friends que estão na moda ultimamente! #nNão é que todo mundo goste, mas eles têm uma popularidade peculiar entre um certo grupo!"
63090-310 = "Pelo menos você não disse que é \"popular com todo mundo\", já é um grande progresso……."
63090-311 = "Momo Friends é o máximo. Eu recomendo o Skullman. #nCom essa recompensa, todos certamente darão o seu melhor."
63090-312 = "Qual é a lógica disso……?"
63090-313 = "Mas, nas aulas de reforço anteriores, teve um efeito considerável, sabia?"
63090-314 = "……Sério? #nSerá que…… algum fenômeno misterioso está envolvido nisso……?"
63090-316 = "Eh? Não, não é nada disso…… é só porque são fofos, então todos se esforçam para ganhá-los……."
63090-317 = "Concordo. Isso vale o esforço."
63090-322 = "……."
63090-323 = "（Azusa-san, será que por ter tido contato com o mundo exterior, #nseus gostos mudaram um pouco……）"
63090-326 = "Ou seja, pessoal! Nós também não éramos boas em estudar desde o início!"
63090-327 = "Mas, estudar é um tipo de \"sistema\", então se você praticar e aprender repetidamente――"
63090-328 = "Você certamente conseguirá atingir um certo nível!"
63090-329 = "E acima de tudo, se até eu, que sou tão comum e sem personalidade, consegui superar o reforço!"
63090-333 = "……."
63090-334 = "……."
63090-335 = "Ei, Azusa-san……?"
63090-336 = "O que foi, Maia?"
63090-337 = "A Hifumi-san é realmente comum……?"
63090-338 = "……."
63090-339 = "De acordo com minhas observações, existem dois tipos de \"comum\"."
63090-340 = "Um é o comum autoproclamado. O outro é o comum visto pelos outros."
63090-341 = "A Hifumi-san…… é qual dos dois?"
63090-342 = "……."
63090-343 = "Isso é…… sem comentários."
63090-344 = "Só por isso, você já respondeu tudo……."
63090-348 = "Eu estou tentando me esforçar para decorar, mas não consigo decorar nada!!"
63090-349 = "Acho que cheguei à verdade sobre o período de provas……."
63090-350 = "Qual é?"
63090-351 = "É o período em que tudo, menos estudar, parece interessante……."
63090-356 = "Oooooh! Sinto que minha vontade de estudar está pegando fogo!"
63090-357 = "Sério?"
63090-358 = "Sim. Queimou tanto que virou cinzas."
63090-362 = "Sensei... sinto que fiquei doente, posso descansar?"
63090-363 = "[s] \"Quais são os sintomas?\""
63090-364 = "Eu quebro se eu estudar."
63090-365 = "[s] \"Nesse caso, que tal... estudarmos até você melhorar?\""
63090-369 = "Você não é nada gentil..."
63090-370 = "[s] \"Isso também é para que todos consigam boas notas.\""
63090-373 = "Uau! Esse problema é tão lindo!"
63090-374 = "Ah, é mesmo?"
63090-375 = "Sim! É de um nível que eu nem quero resolver, porque não quero estragar esse problema!"
63090-376 = "Será que ela estudou tanto que acabou ficando maluca..."
63090-379 = "(Dessa forma, misturando todo o esforço, as lutas e os gritos de todos...)"
63090-380 = "(As alunas de Arius, em direção ao seu primeiro exame, avançaram um passo de cada vez todos os dias...)"
63090-383 = "Próximo episódio: Ecclesia para o futuro deixado para trás"
