[translation]
1001106-1 = "たかいたかーい"
1001106-2 = "山海経・梅花園"
1001106-3 = "先生、先生！"
1001106-4 = "私のこと、たかいたかいして！"
1001106-5 = "[s] \"たかいたかい……？\""
1001106-6 = "たかいたかい、知らないの？"
1001106-7 = "こうやって身体を掴んで高く上げて、飛んでるみたいにしてくれる遊びだよ。"
1001106-8 = "シュンお姉ちゃんはたまにやってくれたのに……先生はできないの？"
1001106-9 = "[s] \"ううん、やってあげる。\""
1001106-10 = "わあ、やった！"
1001106-11 = "[s] \"たかいたかーい。\""
1001106-12 = "わーっ、本当にお空を飛んでるみたい！"
1001106-13 = "ありがとう、先生！"
1001106-14 = "ああっ、ずるい！先生、私も私も！"
1001106-15 = "あたしもたかいたかいやって、先生！"
1001106-16 = "[s] \"みんなやってあげるから、順番ね。\""
1001106-17 = "あははっ、やったー！たかいよ、本当にたかーい！"
1001106-18 = "次は私の番！"
1001106-21 = "……。"
1001106-23 = "山海経・教室"
1001106-28 = "先ほど先生がみんなに、たかいたかいをしてくださっているのを見ました。"
1001106-29 = "何か問題があったか、ですか？いえ、先生がわざわざ時間を作って[ruby=ばいかえん]梅花園[/ruby]の園児たちと遊んでくださったのですから、むしろ私から感謝しなきゃいけないぐらいです。"
1001106-30 = "ただ問題があるとしたら……どうして私にはたかいたかいをしてくださらないのか、ということぐらいです。"
1001106-31 = "私もたかいたかい好きですのに……両腕を広げて思いっきり飛ぶのを感じてみたいのに……！"
1001106-32 = "[s] \"でも、シュンは他の子たちとは重さが違……\""
1001106-33 = "今、体重のことを口にされましたか、先生？"
1001106-34 = "[s] \"分かった。シュンにもたかいたかいしてあげる。\""
1001106-35 = "本当ですか？わ～、嬉しいです！"
1001106-36 = "さあ、両腕を上げてますので、抱きしめるように私を持ち上げてくださいね。"
1001106-37 = "[s] \"えっと、じゃあたかいたか――\""
1001106-39 = "ひゃぅっ！？"
1001106-40 = "な、な、何でもありません……。もう一度、最初から……。"
1001106-44 = "はうっ……。"
1001106-45 = "せ、先生の腕がわきに触れると、くすぐったくて、我慢できなくて……。"
1001106-46 = "やはり小さい子たちがやる遊びを、成長してからやらなくなるのには、理由がありましたね。"
1001106-47 = "たかいたかいがこんなに、恥ずかしくて照れてしまう遊びだったとは……。"
1001106-48 = "仕方ないですね、代わりに私は先生のハグをいただいたので良しとします。"
1001106-51 = "ふふ、これもたかいたかいとは違いますが、すごく楽しかったです。"
1001106-52 = "満足しました。#nありがとうございます、先生。"
