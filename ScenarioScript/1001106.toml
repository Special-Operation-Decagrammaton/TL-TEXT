[translation]
1001106-1 = "Cadê o aviãozinho?"
1001106-2 = "Shanhaijing - Jardim das Ameixeiras"
1001106-3 = "Sensei, sensei!"
1001106-4 = "Faz o aviãozinho comigo!"
1001106-5 = "[s] \"Aviãozinho...?\""
1001106-6 = "Você não sabe o que é aviãozinho?"
1001106-7 = "É aquela brincadeira de segurar a pessoa e levantar bem alto, como se ela estivesse voando."
1001106-8 = "A irmã Shun fazia isso às vezes para mim... O sensei não consegue?"
1001106-9 = "[s] \"Não, eu faço sim.\""
1001106-10 = "Uau, que legal!"
1001106-11 = "[s] \"Cadê o aviãozinho...\""
1001106-12 = "Uau, parece mesmo que estou voando no céu!"
1001106-13 = "Obrigada, sensei!"
1001106-14 = "Ah, que injusto! Sensei, eu também, eu também!"
1001106-15 = "Eu também quero aviãozinho, sensei!"
1001106-16 = "[s] \"Vou fazer em todas vocês, mas tem que ser uma de cada vez.\""
1001106-17 = "Ahaha, que legal! É alto, é muito alto!"
1001106-18 = "Agora é a minha vez!"
1001106-21 = "……."
1001106-23 = "Shanhaijing - Sala de Aula"
1001106-28 = "Eu vi o sensei fazendo aviãozinho com todas as crianças agora pouco."
1001106-29 = "Se houve algum problema? Não, pelo contrário, já que o sensei se deu ao trabalho de tirar um tempo para brincar com as crianças do Jardim das Ameixeiras, eu deveria é agradecer."
1001106-30 = "O único problema, se é que posso chamar assim... é por que o senhor não faz aviãozinho comigo?"
1001106-31 = "Eu também gosto de aviãozinho... Queria sentir como é abrir os braços e voar bem alto...!"
1001106-32 = "[s] \"Mas, Shun, o seu peso é diferente das outras crianças...\""
1001106-33 = "O senhor acabou de mencionar o meu peso, sensei?"
1001106-34 = "[s] \"Entendi. Vou fazer aviãozinho com você também, Shun.\""
1001106-35 = "Sério? Uau, estou tão feliz!"
1001106-36 = "Pronto, já estou com os braços levantados, pode me levantar como se fosse me abraçar."
1001106-37 = "[s] \"Bem, então lá vai o aviãozi--\""
1001106-39 = "Hyaaa!?"
1001106-40 = "N-n-não foi nada... Vamos tentar de novo, desde o começo..."
1001106-44 = "Hau..."
1001106-45 = "É que, quando os braços do sensei tocam nas minhas axilas, faz cócegas e eu não consigo aguentar..."
1001106-46 = "Realmente, havia um motivo para pararmos de brincar disso depois que crescemos."
1001106-47 = "Eu não sabia que aviãozinho era uma brincadeira tão embaraçosa e que deixava a gente tão corada..."
1001106-48 = "Não tem jeito, vou considerar que ganhei um abraço do sensei em troca, então está tudo bem."
1001106-51 = "Fufu, isso é diferente de um aviãozinho, mas foi muito divertido."
1001106-52 = "Estou satisfeita. #nObrigada, sensei."
