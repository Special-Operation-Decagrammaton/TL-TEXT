[translation]
80000106-1 = "Junto com todos"
80000106-2 = "Professor, você veio."
80000106-3 = "Sim, a Arona-senpai está dormindo. Está em sono profundo."
80000106-4 = "Entendido. Preparei tudo para que, quando o professor chegasse, estivesse tudo pronto."
80000106-5 = "[s] \"Preparou o quê?\""
80000106-6 = "Sim. O professor sabe que dia é hoje?"
80000106-10 = "[ns1] \"Hoje é Dia dos Namorados, então...\"\n[ns2] \"Quer dizer que o que você preparou é chocolate...!?\""
80000106-13 = "Confirmação. Sim, está correto."
80000106-14 = "Como recompensa, vou deixar você fazer carinho na minha cabeça. Vamos, não se acanhe e venha aqui."
80000106-20 = "Sim? Está com vergonha?"
80000106-21 = "Compreendido. Você está preocupado com o que aconteceria se a Arona-senpai acordasse bem no momento em que estivesse fazendo carinho na minha cabeça enquanto estou encostada no seu peito, não é?"
80000106-22 = "Eu sei muito bem que o professor é tímido."
80000106-23 = "Talvez você não se lembre, mas eu conheço o professor tanto quanto a Arona-senpai."
80000106-24 = "Por isso, por hoje, vou apenas lhe entregar o chocolate."
80000106-31 = "[ns] \"O chocolate da Plana!\""
80000106-32 = "Sim, é um chocolate feito à mão com 100% de Plana. #nFiz escondido da Arona-senpai."
80000106-33 = "[s] \"S-sim...\""
80000106-34 = "Entregar enquanto a Arona-senpai está dormindo, a sós com você, também era um ponto importante. Fufufu. O que achou?"
80000106-35 = "[s] \"Na verdade, a Plana também tem vergonha de ser vista pela Arona, né?\""
80000106-39 = "……."
80000106-40 = "……Silêncio. Não responderei a essa pergunta."
80000106-41 = "……."
80000106-42 = "…………Afirmação."
80000106-43 = "[s] \"Obrigado, Plana. Vou aceitar.\""
80000106-45 = "……Sim, aqui está."
