[translation]
80000106-1 = "みんなと一緒に"
80000106-2 = "先生、来てくださったんですね。"
80000106-3 = "はい、アロナ先輩なら寝ています。熟睡中です。"
80000106-4 = "把握。いつ先生が来てもいいよう、用意をしてあります。"
80000106-5 = "[s] \"用意って？\""
80000106-6 = "はい。先生は今日が何の日か知っていますか？"
80000106-10 = "[ns1] \"今日はバレンタインデーだから……。\"\n[ns2] \"つまり、用意ってチョコレート……！？\""
80000106-13 = "確認。はい、正解です。"
80000106-14 = "ご褒美に頭を撫でましょう。さあ、遠慮せずこちらへ。"
80000106-20 = "はい？恥ずかしいんですか？"
80000106-21 = "理解。私の胸にうずくまりながら頭を撫でられているタイミングでアロナ先輩が目を覚ましてしまったら、どうしようかと心配しているのですね？"
80000106-22 = "先生が恥ずかしがり屋なのは、よく知っています。"
80000106-23 = "覚えていないかもしれませんが、私はアロナ先輩と同じくらい先生を知っていますから。"
80000106-24 = "なので今日のところは、チョコレートをお渡しするだけにします。"
80000106-31 = "[ns] \"プラナちゃんのチョコレート！\""
80000106-32 = "はい、100%プラナ配合の手作りチョコレートです。#nアロナ先輩には内緒で作りました。"
80000106-33 = "[s] \"う、うん……\""
80000106-34 = "アロナ先輩が寝ている二人きりのタイミングで渡すというのも、重要なポイントでした。ふふふ。いかがでしょう？"
80000106-35 = "[s] \"アロナに見られるの、実はプラナちゃんも恥ずかしいんだよね？\""
80000106-39 = "……。"
80000106-40 = "……沈黙。その質問には答えません。"
80000106-41 = "……。"
80000106-42 = "…………肯定。"
80000106-43 = "[s] \"ありがとう、プラナちゃん。頂きます。\""
80000106-45 = "……はい、どうぞ。"
