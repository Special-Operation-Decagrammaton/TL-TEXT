[translation]
102170-1 = "Episódio 17; 5º Santuário “Perto da cidade-fortaleza de Eridu”"
102170-2 = "Ok, você está pronto?"
102170-3 = "Sim."
102170-4 = "Esperei um pouco! !"
102170-5 = "O que é isso, Koyuki?"
102170-6 = "Não é “sim”!"
102170-7 = "Por que estou aqui? #nPor que você está me perguntando se estou pronto ou não de maneira fluida?"
102170-8 = "O que foi, Koyuki-chan? #nPorque vou derrotar o “guardião”, certo?"
102170-9 = "Não, é por isso! #nO problema com o sistema de segurança do Presidente Rio foi resolvido!"
102170-10 = "Sim, está certo. Obrigado pelo seu trabalho duro, Koyuki-chan."
102170-11 = "Realmente, não importa como você olhe, é um talento sobre-humano..."
102170-12 = "Em outras palavras, meu papel acabou! ? #nEstá tudo bem voltar para a sala de reflexão em silêncio? Estou sentado de frente para a parede!"
102170-13 = "Não. Para conquistar o 5º Santuário, você tem que guiar Hod até o chão."
102170-14 = "Dacara! ! Por que fazemos isso? #nHaverá muitas outras pessoas! ?"
102170-15 = "Bem... esta cidade-fortaleza tem uma barreira construída pelo Presidente Rio. #nTenho que desmontar a barreira enquanto guio o Hodo..."
102170-16 = "Isso é algo que só Koyuki-chan pode fazer."
102170-17 = "Pare de reclamar disso. #nSomos os únicos que podemos resolver isso."
102170-18 = "Partida ~"
102170-19 = "うあぁああああ――なんで――！"

102170-29 = "Faça uma aposta aqui!"
102170-30 = "entendido! !"
102170-35 = "Moagem concluída! Gahahaha! ! #nCom isso podemos demolir completamente esta via expressa! !"
102170-36 = "Uau! Me sentindo bem! #nEstá começando a ficar legal~"
102170-37 = "Diretor Kasumi, estamos quase terminando! #nVamos para o próximo lugar!"
102170-38 = "Hahahaha, que bom! Remova todos os edifícios!"
102170-39 = "OK, deixe comigo!"
102170-41 = "Desenvolvimento! Desenvolvimento! !"
102170-47 = "Hahaha! Bom, bom! #n Exploda o quanto quiser e empunhe sua picareta até encontrar as fontes termais abaixo do Millennium!"
102170-50 = "Ah, a cidade... os edifícios..."
102170-52 = "Só para ter certeza, estou perguntando... Não é como se você quisesse destruir a #Região Autônoma do Millennium fingindo remover o Pilar da Invasão, certo?"
102170-55 = "Hahahaha, do que você está falando? É tudo sobre as fontes termais! Também consegui remover “Sanctum” e matar dois coelhos com uma cajadada só! Desenvolvimento é fazer isso de forma eficiente!"
102170-58 = "……."
