[translation]
102170-1 = "第17話;第5サンクトゥム「要塞都市エリドゥ近郊」"
102170-2 = "よし、準備はいいかしら？"
102170-3 = "はーい。"
102170-4 = "ちょーっと待った！！"
102170-5 = "何よコユキ。"
102170-6 = "「はーい」じゃないですよ！"
102170-7 = "何で私がここにいるんですか！#nなんで流れるように準備の有無を聞くんですか！"
102170-8 = "何でって、コユキちゃん。#n「守護者」を倒しに行くからですよ？"
102170-9 = "いや、だから！#nリオ会長のセキュリティシステムの件、解決したじゃないですか！"
102170-10 = "ええ、そうですね。お疲れ様でしたコユキちゃん。"
102170-11 = "ほんと、いつ見ても超人的な才能なのよね……"
102170-12 = "つまり、私の役目は終わりましたよね！？#n大人しく反省部屋に帰っちゃダメですか？壁に向かって正座してますから！"
102170-13 = "ダメよ。第5サンクトゥムを攻略するには、ホドを地上に誘導しなきゃいけないの。"
102170-14 = "だーかーら！！それを何で私たちがやるんですか！#n他にも人はいっぱいいるでしょう！？"
102170-15 = "それはですね……この要塞都市には、リオ会長が作った防壁があるんです。#nホドを誘導しつつ、防壁を解体しなければならないのですが――"
102170-16 = "それは、コユキちゃんにしかできないことですから。"
102170-17 = "駄々をこねるのはその辺にしなさい。#nこれを解決できるのは私たちしかいないの。"
102170-18 = "出発～"
102170-19 = "うあぁああああ――なんで――！"
102170-29 = "ここに杭を打て！"
102170-30 = "了解！！"
102170-35 = "粉砕完了！ガハハハッ！！#nこれでこの高速道路も綺麗に取り壊せるな！！"
102170-36 = "おおーっ！良い感じー！#nいい外観になってきたねぇ～"
102170-37 = "カスミ部長、こっちはだいたい終わったよー！#n次の場所に移るね！"
102170-38 = "ハーハッハッハ、良いぞ！建物は全部撤去してしまえ！"
102170-39 = "OK、任せてー！ "
102170-41 = "開発だ！開発だー！！"
102170-47 = "ハッハッハ！いいぞいいぞ！#nミレニアムの地下で温泉が見つかるまで、好きなだけ爆破してツルハシを振るうんだ！"
102170-50 = "ああ、都市が……建物が……"
102170-52 = "一応、念のために聞くんだけど……インベイドピラーを撤去するフリして、#nミレニアム自治区を破壊したいわけじゃ、ないんだよね？"
102170-55 = "ハーハッハッハ、何をおっしゃる！全ては温泉のためだ！ついでに「サンクトゥム」も撤去できて一石二鳥じゃないか！開発とは効率的にやるものだからな！"
102170-58 = "……。"
102170-63 = "温泉……？この自治区の地下に温泉なんてないですが……#n少し地層を分析すれば分かることでは……"
102170-65 = "バカ者が！温泉というのはな、皆の心の中にあるものなのだよ！"
102170-66 = "信じろ！信ずればそこに温泉は存在する！#nハーハッハッハッハッハ！"
102170-69 = "……。"
102170-71 = "……。"
