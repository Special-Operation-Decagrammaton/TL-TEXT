[translation]
102170-1 = "Episódio 17;5º Sanctum \"Arredores da Cidade-Fortaleza Eridu\""
102170-2 = "Certo, todo mundo pronta?"
102170-3 = "Siiim~"
102170-4 = "Eeei, espera um pouco aí!!"
102170-5 = "O que foi agora, Koyuki?"
102170-6 = "\"Siiim~\" nada!"
102170-7 = "Por que EU tô aqui!?#nE por que vocês perguntaram tão naturalmente se eu tava pronta!?"
102170-8 = "Ora, Koyuki-chan.#nPorque nós vamos derrotar o \"Guardião\", claro."
102170-9 = "Não, mas é exatamente isso!#nO problema do sistema de segurança da presidente Rio já foi resolvido, não foi!?"
102170-10 = "Sim, foi sim. Bom trabalho, Koyuki-chan."
102170-11 = "Sério… toda vez que vejo isso, continuo achando esse talento absurdo…"
102170-12 = "Ou seja, meu trabalho acabou, né!?#nNão posso simplesmente voltar quietinha pra sala de reflexão? Eu fico sentada olhando pra parede, prometo!"
102170-13 = "Não pode. Pra capturar o 5º Sanctum, precisamos atrair o HOD pra superfície."
102170-14 = "É ISSO QUE EU TÔ FALANDO!!#nPor que justo a gente tem que fazer isso!? Tem um monte de gente disponível por aí!"
102170-15 = "É que… esta cidade-fortaleza possui barreiras criadas pela presidente Rio.#nPrecisamos guiar o HOD enquanto desmontamos essas barreiras, mas――"
102170-16 = "Isso é algo que só você consegue fazer, Koyuki-chan."
102170-17 = "Chega de birra.#nAs únicas capazes de resolver isso somos nós."
102170-18 = "Bora partir~"
102170-19 = "Uwaaaaaaah―― por quêêêê――!"
102170-29 = "Fixem as estacas aqui!"
102170-30 = "Entendido!!"
102170-35 = "Demolição concluída! Gahahaha!!#nAgora essa rodovia pode ser destruída direitinho também!!"
102170-36 = "Oooh! Tá ficando ótimo~!#nO visual tá ficando cada vez melhor~"
102170-37 = "Chefe Kasumi, já terminamos por aqui!#nVamos pro próximo ponto!"
102170-38 = "Ha-ha-ha-ha! Muito bem! Derrubem TODOS os prédios!"
102170-39 = "OK, deixa com a gente~!"
102170-41 = "Desenvolvimentooo! Desenvolvimentooo!!"
102170-47 = "Ha-ha-ha! Isso, muito bom!#nContinuem explodindo tudo e cavando à vontade até encontrarmos uma fonte termal debaixo de Millennium!"
102170-50 = "Ahh… a cidade… os prédios…"
102170-52 = "Só pra garantir… vocês não estão fingindo remover os Invade Pillars#nsó pra destruir o Distrito de Millennium, né?"
102170-55 = "Ha-ha-ha-ha! Mas o que está dizendo!? Tudo isso é pelo bem das fontes termais! E ainda removemos os \"Sanctums\" no processo, dois coelhos com uma cajadada só! Desenvolvimento eficiente é assim mesmo!"
102170-58 = "……"
102170-63 = "Fonte termal…? Não existe nenhuma fonte termal no subsolo deste distrito…#nIsso dá pra descobrir só analisando as camadas geológicas…"
102170-65 = "Sua tola! Fontes termais existem no coração de cada um!"
102170-66 = "Acredite! Se acreditar de verdade, então haverá uma fonte termal ali!#nHa-ha-ha-ha-ha-ha!"
102170-69 = "……"
102170-71 = "……"