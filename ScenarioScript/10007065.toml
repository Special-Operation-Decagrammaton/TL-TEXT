[translation]
10007065-1 = "Episódio 6: Mors para o Departamento de Obras!"
10007065-2 = "Haa, haa... vocês são muito persistentes..."
10007065-3 = "V-vocês que o digam..."
10007065-4 = "Por que não admitem a derrota logo?"
10007065-5 = "Jamais admitiremos! Este resort de águas termais é a nossa esperança!"
10007065-6 = "Se for para voltar àquela vida terrível no prédio antigo da escola..."
10007065-7 = "Prefiro morrer junto com este resort!"
10007065-8 = "...Admiro essa determinação."
10007065-9 = "Mas o orgulho do Departamento de Obras também está em jogo. Nós também não podemos recuar!"
10007065-13 = "Droga. O vento está especialmente frio hoje..."
10007065-15 = "Hehe... v-vocês subestimaram a onda de frio perto do prédio antigo, não foi...!"
10007065-16 = "S-se está com frio, n-não seria melhor desistir e v-voltar para casa?"
10007065-18 = "...Não, acho que vocês é que estão passando mais frio. Estão vestindo tão pouco."
10007065-19 = "Nessa roupa, no meio de uma montanha nevada no inverno..."
10007065-20 = "Vocês estão loucas?"
10007065-22 = "Ugh, ela tem razão...!"
10007065-28 = "Nodoka, trouxe um pouco de Mors quente."
10007065-29 = "Ah, obrigada, Shigure-chan. Glup, glup... ufa, que quentinho..."
10007065-31 = "O quê!? É trapaça se reabastecerem no meio da batalha!"
10007065-32 = "Esta é uma batalha de orgulho entre o \"Departamento de Obras\" e a \"Classe Especial 227\"...! Lutem de forma justa e honesta, sem depender de suprimentos!"
10007065-37 = "Sim, o pessoal do Departamento de Obras também quer um pouco?"
10007065-38 = "...Hã? Vocês vão dar para a gente também...?"
10007065-39 = "Sim. Temos um monte de Mors que guardamos desde a primavera passada."
10007065-40 = "Vamos, bebam antes que esfrie, para não pegarem um resfriado."
10007065-41 = "Agradeço a intenção, mas..."
10007065-42 = "N-não somos tão fracas a ponto de sermos abaladas por uma bebida! Não subestimem o orgulho dos trabalhadores que já superaram inúmeros canteiros de obras difíceis!"
10007065-49 = "Está delicioso!"
10007065-50 = "Incrível, esse Mors tem um sabor doce e suave."
10007065-51 = "Tem um leve amargor também, e o calor se espalha pelo corpo todo... É perfeito para beber em um lugar frio!"
10007065-52 = "Fico feliz que tenham gostado. Acho que este lote ficou especialmente bom. Bem, talvez tenha fermentado um pouco."
10007065-53 = "Querem mais um pouco?"
10007065-54 = "Sim, aceito!"
10007065-57 = "Hehe, hehehe..."
10007065-58 = "É realmente delicioso. Desse jeito, eu poderia beber o quanto..."
10007065-59 = "[s] \"Ei... Minori, você está bem?\""
10007065-60 = "Hã? O que houve, Sensei? Eu estou ótima! Com esse Mors quentinho, sinto que posso fazer qualquer coisa!"
10007065-61 = "Na verdade, meu corpo está até fervendo, estou sentindo calor!"
10007065-62 = "Hum, está realmente quente... ou melhor, estou sentindo calafrios por causa do suor... hnn?"
10007065-63 = "[s] \"Eu sabia, será que isso é...\""
10007065-64 = "Depois de sentir frio, agora sinto que estou ficando cada vez mais gelada..."
10007065-65 = "Ugh... minha cabeça está girando... droga!"
10007065-66 = "Isso não é bom. Você precisa entrar nas águas termais para aquecer o corpo antes que o suor esfrie."
10007065-67 = "...Águas termais?"
10007065-68 = "Isso significa que... você quer que nós, do Departamento de Obras, entremos nas águas termais construídas por aqueles idiotas de Gehenna?"
10007065-69 = "Não é isso, Chefe Minori."
10007065-70 = "Embora tenhamos sido forçadas a cuidar deste resort, ainda não sabemos se as instalações construídas pelos alunos de Gehenna são \"realmente seguras\"."
10007065-71 = "Por isso, queremos que os membros do Departamento de Obras, os \"melhores construtores de Kivotos\", entrem nas águas termais e inspecionem diretamente as condições deste resort."
10007065-72 = "Os melhores construtores de Kivotos..."
10007065-73 = "Hehe, entendo... Com certeza não existe nenhum construtor em Kivotos que nos supere!"
10007065-74 = "Além disso, beber algo enquanto se está em uma fonte termal quentinha é algo especial, não é?"
10007065-75 = "……Entendo?"
10007065-79 = "Isso é apenas uma investigação preliminar, mas será que além de mors, existem outras bebidas deliciosas por aqui...?"
10007065-80 = "Com certeza. Aqui no Resort de Fontes Termais 227, temos várias bebidas para satisfazer qualquer cliente."
10007065-81 = "E se o Departamento de Obras vier como cliente, servirei quanto quiserem, seja compota ou mors. Embora talvez esteja um pouco fermentado."
10007065-82 = "E-entendo... se você diz assim, não tenho escolha! Preciso entrar na fonte termal e investigar com calma o quão desleixada foi a construção feita por aqueles idiotas da Gehenna!"
10007065-83 = "……Não é porque eu queira beber mais mors, de jeito nenhum!"
10007065-84 = "Sim, sim, claro que eu entendo."
10007065-85 = "Então, que tal começarmos pela fonte termal ao ar livre no norte? É espaçosa, então todo o Departamento de Obras conseguirá entrar."
10007065-86 = "Certo. Vamos lá, pessoal,"
10007065-87 = "Já que decidimos, pela segurança deste Resort de Fontes Termais 227 e por muito mors..."
10007065-88 = "Não, pelo descan... quer dizer, isso, pelo nosso \"descanso revolucionário\"...!"
10007065-89 = "Vamos invadir as fontes termais!"
10007065-92 = "Pelo descanso revolucionário!!!"
10007065-97 = "Aqueles membros teimosos do Departamento de Obras ficaram dóceis como um rebanho de ovelhas de repente..."
10007065-98 = "Bem, não foi nada tão difícil assim."
10007065-99 = "Uma bebida deliciosa e palavras ditas com sinceridade. Com isso, a maioria dos pedidos chega ao coração das pessoas sem problemas."
10007065-100 = "A Shigure às vezes dá medo... ainda bem que somos amigas..."
10007065-101 = "[s] \"A propósito, Shigure, queria te perguntar uma coisa.\""
10007065-102 = "Hm? O que foi, Sensei?"
10007065-103 = "[s] \"Aquela bebida de agora, não tem nada de estranho nela, tem?\""
10007065-104 = "Claro que não. Este mors é feito de oxicoco e açúcar, é um mors tradicional. E enzimas também."
10007065-105 = "Bem, as condições de armazenamento não foram das melhores, então talvez esteja um pouco fermentado..."
10007065-111 = "Quer provar um pouco para conferir, Sensei?"
10007065-113 = "(Consegui recusar o mors que a Shigure ofereceu e fugi de volta para dentro do resort...)"
