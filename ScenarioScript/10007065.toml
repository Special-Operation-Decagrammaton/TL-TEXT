[translation]
10007065-1 = "第6話;工務部にモルスを！"
10007065-2 = "はあ、はぁ……しつこいですね……。"
10007065-3 = "そ、そっちこそ……。"
10007065-4 = "そろそろ敗北を認めたらどうだ？"
10007065-5 = "認めてなるものですか！この温泉郷は私たちの希望なんです！"
10007065-6 = "あの酷かった旧校舎の生活に戻るぐらいなら……"
10007065-7 = "いっそのこと、この温泉郷と一緒に心中した方がましです！"
10007065-8 = "……その勢いは買おう。"
10007065-9 = "でも、こっちも工務部のプライドが懸かってる。あたしたちだって、引き下がれないのは同じ！"
10007065-13 = "くっ。今日は特に風が冷たいな……。"
10007065-15 = "ふふっ……きゅ、旧校舎付近の寒波をな、舐めてましたね……！"
10007065-16 = "さ、寒いなら、も、もう諦めて、お、お帰りになった方が、い、良いんじゃないですか？"
10007065-18 = "……いや、そっちの方が寒そうだけど。だいぶ薄着だし。"
10007065-19 = "真冬の雪山でその格好……"
10007065-20 = "正気？"
10007065-22 = "ううっ、正論……！"
10007065-28 = "ノドカ、温めたモルス持ってきたよ。"
10007065-29 = "あ、シグレちゃんありがと。こく、こく……ふぅ、温かい……。"
10007065-31 = "なぁっ！？戦闘中に自分たちだけ補給なんてズルい！？"
10007065-32 = "この戦いは「工務部」と「227号特別クラス」の、プライドを賭けた戦いだというのに……！補給品に頼らず、正々堂々とフェアに勝負しろ！"
10007065-37 = "はい、工務部のみんなも一杯どう？"
10007065-38 = "……え？あたしたちにも、くれるの……？"
10007065-39 = "うん。去年の春に漬けておいたモルスは山ほどあることだし。"
10007065-40 = "ほら、風邪とか引かないうちに、冷める前に飲んだら？"
10007065-41 = "その気持ちはありがたいけど……。"
10007065-42 = "こ、こんな飲み物一杯で揺らぐほど、あたしたち工務部の意志は弱くない！これまで数多の辛い現場を乗り越えてきた、労働者のプライドを舐めるなよ！"
10007065-49 = "美味しい！"
10007065-50 = "すごいなこのモルス、甘くて優しい味がする。"
10007065-51 = "そこに微かな苦みもあって、温もりが身体中に染み渡る……寒いところで飲むには最高だ！"
10007065-52 = "喜んでくれて良かった。今回のは特に良い感じにできたと思うんだよね。まあ、ちょっと発酵してるかもだけど。"
10007065-53 = "もう一杯どう？"
10007065-54 = "うん、頂こう！"
10007065-57 = "ふふっ、うふふふ……"
10007065-58 = "本当に美味しい。これならいくらでも……"
10007065-59 = "[s] \"えっと……ミノリ、大丈夫？\""
10007065-60 = "うん？どうしたんだ先生、私は問題無い！この温かいモルスさえあれば、なんでもできるに違いにゃい！"
10007065-61 = "むしりょ身体が火照って、熱いくらいだ！"
10007065-62 = "ん、本当に熱い……というか汗で寒気が……んんっ？"
10007065-63 = "[s] \"やっぱり、っていうかもしかしてこれ……。\""
10007065-64 = "一度寒いと思ったら、どんどん寒くなっていく感じがすりゅ……。"
10007065-65 = "うっ……何だか頭もくらくらして……くっ！"
10007065-66 = "それは良くないね。汗が冷える前に、温泉に入って身体を温めないと。"
10007065-67 = "……温泉？"
10007065-68 = "それはつまり……あたしたち工務部に、ゲヘナのバカ共が建設した温泉に入れと？"
10007065-69 = "そうじゃないよ、ミノリ部長。"
10007065-70 = "半強制的にこの温泉郷を任されてはいるけど、私たちとしてはまだ、ゲヘナの生徒たちが建設したこの施設が「本当に安全なのか」は分からない。"
10007065-71 = "だから「キヴォトス最高の建築業者」である工務部の部員たちに温泉に入ってもらって、ちゃんと直接この温泉郷の状態を点検してほしいんだ。"
10007065-72 = "キヴォトス最高の、建築業者……"
10007065-73 = "ふふっ、なるほど……確かにあたしたちを超える建築業者など、きっとキヴォトスには存在しない！"
10007065-74 = "それに、温かい温泉に入りながらの飲み物っていうのもまた、結構格別なんだよ？"
10007065-75 = "……なるほど？"
10007065-79 = "これはあくまで事前調査なんだけど、もしかしてモルス以外にも美味しい飲み物があるとか……？"
10007065-80 = "もちろん。この227号温泉郷にはどんなお客様にも満足頂けるように、色んな飲み物を置いてるからね。"
10007065-81 = "ましてや工務部がお客様として来てくれるなら、カンポットでもモルスでも、幾らでも振舞うつもりだよ。発酵してるかもだけど。"
10007065-82 = "な、なるほど……そこまで言われては仕方ない！ゲヘナのバカ共が一体どれだけ雑な工事をしたのか、実際に温泉に入ってゆっくり調べないと！"
10007065-83 = "……決して、モルスがもっと飲みたくて言ってるわけじゃない！"
10007065-84 = "うんうん、もちろん分かってるよ。"
10007065-85 = "じゃあまずは、北の露天風呂からお願いしようかな。広いから、工務部のみんなで入れるはずだよ。"
10007065-86 = "よし。さあみんな、"
10007065-87 = "そうと決まればこの227号温泉郷の安全と、たくさんのモルス……"
10007065-88 = "いや、休そ……えっと、そうだ、「革命的な休息」のために……！"
10007065-89 = "温泉に、突撃だぁ！"
10007065-92 = "革命的な休息のためにっ！！！"
10007065-97 = "あの頑固な工務部員たちが、一気におとなしい羊の群れみたいに……。"
10007065-98 = "まあ、そんなに難しいことをしたわけじゃないよ。"
10007065-99 = "美味しい飲み物、そして気持ちを込めた言葉。それさえあれば、大抵のお願い事はスムーズに相手まで届くものだから。"
10007065-100 = "シグレちゃんってたまに怖いよね……友達で良かった……。"
10007065-101 = "[s] \"ところでシグレ、ちょっと聞きたいんだけど。\""
10007065-102 = "ん？どうしたの、先生？"
10007065-103 = "[s] \"さっきの飲み物、本当に変な物じゃないんだよね？\""
10007065-104 = "もちろん。このモルスはコケモモと砂糖で作った、伝統的なモルスだよ。あと酵素。"
10007065-105 = "まあ保存環境が良くなかったし、ちょっと発酵してるかもだけど……。"
10007065-111 = "確認も兼ねて、先生も飲んでみる？"
10007065-113 = "（シグレが薦めるモルスを何とか断りながら、逃げるように温泉郷の中へと戻っていった……）"
