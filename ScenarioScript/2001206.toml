[translation]
2001206-1 = "Em espera"
2001206-2 = "（Após terminar o trabalho, visitei Sena. Sobre a ponte, é possível ver o local que parece ser a cena do incidente）"
2001206-3 = "（Talvez por ser um horário bem avançado, quase não havia estudantes por perto）"
2001206-7 = "……Sensei?"
2001206-8 = "[s] \"Ah, Sena.\""
2001206-9 = "Por que a uma hora dessas……"
2001206-10 = "……Não, por favor, entre rapidamente. Não tenho nada de especial para oferecer, mas……"
2001206-14 = "[wa:1500]― ……Se não se importar, [wa:500] gostaria de [wa:1000] acompanhar-me?"
2001206-16 = "― É algo da loja de conveniência, mas……"
2001206-19 = "[wa:1450]― Como eu [wa:350] precisava ficar [wa:600] de prontidão,"
2001206-21 = "[wa:50]― Pensei em [wa:550] fazer uma refeição [wa:300] rápida."
2001206-24 = "[wa:1500]― A propósito, [wa:1000] Sensei, [wa:500] o que faz aqui?"
2001206-26 = "― Em um lugar como este……"
2001206-29 = "― ……Sim? [wa:1500] Pensou que eu parecia sobrecarregada, [wa:1500] então quis [wa:700] me consolar……?"
2001206-32 = "[wa:1100]― ……Entendo, [wa:1500] era isso."
2001206-35 = "― ……Ter vindo até [wa:500] um lugar como este,"
2001206-37 = "[wa:200]― Muito obrigada, [wa:1000] Sensei."
2001206-40 = "[wa:1500]― Foi um [wa:450] desdobramento inesperado, [wa:600] mas……"
2001206-42 = "― Poder estar aqui [wa:600] com o Sensei, [wa:1500] é algo que me deixa [wa:300] genuinamente feliz."
2001206-46 = "（……Depois de fazermos uma refeição leve juntos, saímos do carro）"
2001206-50 = "[ns1] \"Até uma hora dessas……\"\n[ns2] \"Esse tipo de papel é realmente difícil, não é?\""
2001206-51 = "Difícil, você diz…… Bem, eu não me importo muito com isso……"
2001206-52 = "Difícil, você diz…… Bem, eu não me importo muito com isso……"
2001206-53 = "Na verdade, ouvir isso é algo bem novo para mim."
2001206-54 = "Agradeço a preocupação, mas estou bem. Já estou acostumada com esse tipo de coisa."
2001206-55 = "Ficar de prontidão assim, organizando documentos e verificando registros……"
2001206-56 = "Estar ao lado da cena, mas passar o tempo em um lugar vazio como este…… Eu gosto bastante desses momentos."
2001206-57 = "Em um horário em que as outras membras já estão descansando, a morte no local……"
2001206-58 = "Os feridos já foram transportados, e a maioria não teve ferimentos graves. Parece que quase todos se recuperaram rapidamente e já saíram correndo."
2001206-59 = "De qualquer forma, agora as coisas se acalmaram e estou apenas eu……"
2001206-60 = "……Não, corrijo. Estamos apenas eu e o Sensei, nós dois."
2001206-61 = "[s3] \"Não se esforce demais.\"\n[s4] \"Se não conseguir carregar tudo sozinha, me avise.\""
2001206-62 = "Eu também ajusto minha carga de trabalho para manter atividades sustentáveis."
2001206-63 = "Eu também ajusto minha carga de trabalho para manter atividades sustentáveis."
2001206-64 = "É esse tipo de trabalho, então, basicamente, até o meu nível de cansaço já está medido."
2001206-68 = "……De qualquer forma, fico feliz que se preocupe comigo. Obrigada."
2001206-69 = "Portanto, não há problemas com o trabalho, mas esta situação atual é um pequeno problema."
2001206-70 = "O Sensei se deu ao trabalho de vir me visitar, e eu não tenho nada para lhe oferecer……"
2001206-78 = "O que acha disto? Sinto muito, mas já está um pouco comido……"
2001206-79 = "[s5] \"Aceitarei com gratidão.\"\n[s6] \"Então, que seja como um agradecimento pelo agradecimento.\""
2001206-80 = "……Sim."
2001206-81 = "……"
2001206-82 = "……Não. De fato, há um problema de higiene, eu mesma comerei."
2001206-84 = "Pode não parecer, mas agora meu coração está batendo bem forte."
2001206-85 = "……Ao mesmo tempo, se o Sensei não se importar, eu gostaria que pudéssemos conversar assim, nós dois, quase todas as noites."
2001206-86 = "Conversar sobre o trabalho do dia……"
2001206-87 = "E se sobrar tempo, conversar sobre o futuro ainda abstrato……"
2001206-88 = "……Sim? Parar?"
2001206-92 = "……Interrompi. Será que eu disse algo indelicado?"
2001206-93 = "Foi direto demais……?"
2001206-94 = "Eu apenas relatei os fatos da maneira mais direta possível... se isso acabou sendo uma pressão para você, peço desculpas."
2001206-95 = "……Não é esse o caso? Fico aliviada, eu estava preocupada."
2001206-96 = "Então, continuando..."
2001206-97 = "……Não, esqueça."
2001206-98 = "Acho que já transmiti o suficiente por hoje. Vamos encerrar por aqui."
2001206-99 = "Como você sabe, não gosto muito de expressões ambíguas."
2001206-100 = "Precisão e certeza. Como essas expressões podem afetar o estado de pacientes em estado grave, acho que isso se tornou um hábito para mim."
2001206-101 = "Mas, tratando-se de você, Sensei... acabo ficando preocupada de um jeito estranho. Embora eu saiba que, sendo você, certamente entenderá bem."
2001206-102 = "Por isso, eu..."
2001206-107 = "Talvez eu acabe esperando algo a mais do que isso."
2001206-109 = "(Depois disso, passei o tempo conversando com Sena até que o membro da equipe de substituição chegasse.)"
2001206-110 = "(Felizmente, não houve mais nada naquela noite e tudo terminou em paz.)"
