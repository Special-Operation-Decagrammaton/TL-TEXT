[translation]
2001206-1 = "待機中"
2001206-2 = "（仕事を終えた後、セナの元を訪れた。橋の上に、事件の現場と思われる場所が見える）"
2001206-3 = "（かなり遅い時間だからか、生徒たちの姿はほとんど無かった）"
2001206-7 = "……先生？"
2001206-8 = "[s] \"あ、セナ。\""
2001206-9 = "こんな時間にどうして……。"
2001206-10 = "……いえ、取り急ぎ中にお入りください。大したものはありませんが……。"
2001206-14 = "[wa:1500]― ……よろしければ[wa:500]こちら、[wa:1000]ご一緒にいかがですか？"
2001206-16 = "― コンビニのものですが……。"
2001206-19 = "[wa:1450]― こうして[wa:350]待機していなければ[wa:600]ならなかったので、"
2001206-21 = "[wa:50]― 簡単なもので[wa:550]済ませて[wa:300]しまおうかと。"
2001206-24 = "[wa:1500]― ところで、[wa:1000]先生は[wa:500]どうされたのですか。"
2001206-26 = "― こんなところで……。"
2001206-29 = "― ……はい？[wa:1500]大変そうだから、[wa:1500]労おうと[wa:700]思って……？"
2001206-32 = "[wa:1100]― ……なるほど、[wa:1500]そうでしたか。"
2001206-35 = "― ……わざわざ[wa:500]こんなところまで、"
2001206-37 = "[wa:200]― ありがとうございます。[wa:1000]先生。"
2001206-40 = "[wa:1500]― 予期せぬ[wa:450]展開では[wa:600]ありましたが……。"
2001206-42 = "― 先生と[wa:600]こうしていられるのは、[wa:1500]素直に[wa:300]嬉しいです。"
2001206-46 = "（……一緒に軽く食事を済ませてから、車の外へと出た）"
2001206-50 = "[ns1] \"こんな時間まで……。\"\n[ns2] \"こういう役割は、やっぱり大変だね。\""
2001206-51 = "大変、ですか……特に、私は気にしていないのですが……。"
2001206-52 = "大変、ですか……特に、私は気にしていないのですが……。"
2001206-53 = "むしろ、そう言われるのは中々新鮮です。"
2001206-54 = "心配してくださるのはありがたいですが、大丈夫です。こういうのには慣れておりますので。"
2001206-55 = "こうして待機しながら書類整理や、記録の確認などを行って……。"
2001206-56 = "現場を傍らにしながらも、こうして誰もいない場所で過ごす……こういった時間が、私は結構好きなこともありまして。"
2001206-57 = "他の部員たちも既に休んでいる時間、現場の死……"
2001206-58 = "負傷者たちも輸送済みで、大半はそれほどの怪我ではありませんでしたし。どうやらほとんどはすぐ回復して、飛び出していったとか。"
2001206-59 = "何にせよ今はこうして色々落ち着いて、私ひとりだけ……"
2001206-60 = "……いえ、訂正します。私と先生、二人だけですし。"
2001206-61 = "[s3] \"無茶はしないでね。\"\n[s4] \"一人で抱えきれなくなったら言ってね。\""
2001206-62 = "私も持続的な活動のために、仕事量は調整していますから。"
2001206-63 = "私も持続的な活動のために、仕事量は調整していますから。"
2001206-64 = "こういう仕事ですからね、疲れの範囲などまで基本的には測定済みです。"
2001206-68 = "……それはそれとして、心配してくださるのは嬉しいです。ありがとうございます。"
2001206-69 = "なのでお仕事に問題は無いのですが、今この状況は少し問題ですね。"
2001206-70 = "先生がわざわざ私のためにこうして訪ねてくださったのに、何も差し上げられるものが……"
2001206-78 = "こちら、いかがですか？少々食べかけで、申し訳ないのですが……。"
2001206-79 = "[s5] \"ありがたく頂くね。\"\n[s6] \"じゃあ、お礼のお礼ってことで。\""
2001206-80 = "……はい。"
2001206-81 = "……。"
2001206-82 = "……いえ。やはり衛生上問題がありますね、私が食べます。"
2001206-84 = "そうは見えないかもしれませんが、今私は結構ドキドキしています。"
2001206-85 = "……同時に、先生さえよろしければ毎晩のように、こうして二人でお話がしたいとも思っています。"
2001206-86 = "一緒にその日の仕事について語り合い……"
2001206-87 = "時間が余れば、まだ抽象的な未来のことを語り合ったり……。"
2001206-88 = "……はい？ストップ？"
2001206-92 = "……中断しました。もしかして私、何か失礼なことを？"
2001206-93 = "あまりにもストレートで……？"
2001206-94 = "事実をできる限りそのまま申し上げたのですが……プレッシャーになってしまったのであれば、謝罪します。"
2001206-95 = "……そういうわけではない、ですか？であれば良かったです、心配しました。"
2001206-96 = "では引き続き……"
2001206-97 = "……いえ。"
2001206-98 = "これくらいお伝えすれば、少しは伝わったでしょう。本日はこれくらいで。"
2001206-99 = "御存知の通り、私は曖昧な表現はあまり好みません。"
2001206-100 = "正確性と確実性。その表現が重傷者の容態を左右することもあり、習慣として身についているのだと思います。"
2001206-101 = "ですが、先生相手では……何だか変に心配になったりします。先生ですから、きっとうまく理解してくださるのだとも思うのですが。"
2001206-102 = "なのでその……。"
2001206-107 = "それ以上を、期待してしまうのかもしれません。"
2001206-109 = "（その後交代の部員が来るまで、セナとおしゃべりをしながら過ごした）"
2001206-110 = "（幸いその夜は何もなく、平和に終わった）"
