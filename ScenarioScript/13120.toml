[translation]
13120-1 = "Episódio 12; O Início do Comitê de Contramedidas"
13120-4 = "Escola Secundária Abydos - Bicicletário"
13120-7 = "Nossa, acho que fui um pouco bruta..."
13120-8 = "Qual é o seu nome?"
13120-12 = "……Shiroko. Sunaookami Shiroko."
13120-14 = "Humm... Shiroko-chan, é? #nEntão, o que você estava fazendo aqui, Shiroko-chan?"
13120-15 = "……"
13120-16 = "Isso aqui parece uma ruína, mas... tecnicamente é a filial de Abydos――#nNão, é a escola principal de Abydos."
13120-17 = "Esse uniforme... é a primeira vez que vejo."
13120-18 = "Pois é. E você vai ficar com frio vestida assim."
13120-21 = "Bem, de qual escola você é, Shiroko-chan?"
13120-22 = "……Eu não sei."
13120-23 = "……?"
13120-24 = "Quando me dei conta, eu já estava aqui. #nAlém do meu nome... eu não sei de mais nada……"
13120-25 = "I-isso é... será que é amnésia!? #nAquele tipo de coisa que está na moda ultimamente? O tio aqui não entende muito dessas coisas~"
13120-26 = "(Tio……?)"
13120-27 = "Então... Shiroko-chan, você não sabe nada além do seu nome...? #nNem a escola que frequenta, nem número de telefone, nem endereço de e-mail……?"
13120-31 = "(Acena com a cabeça)"
13120-33 = "Ho-Hoshino-senpai, o que devemos fazer?"
13120-34 = "Hmm~ que situação complicada."
13120-38 = "Por enquanto... vamos entrar, Shiroko-chan."
13120-39 = "Hã!? V-vamos juntas?"
13120-45 = "Toma, enrola isso aqui."
13120-46 = "Um cachecol……?"
