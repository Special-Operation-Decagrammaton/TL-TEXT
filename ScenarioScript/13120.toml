13120-228 = "Achei vocês! #nRoubaram o meu caminhão!"
13120-234 = "Hã!?"
13120-236 = "Shiroko-chan, você até roubou um caminhão!?"
13120-237 = "Hmm, foi de brinde."
13120-238 = "Sinto muito. #nEssa menina ainda não entende muito bem as coisas……."
13120-239 = "Eu vou pagar o prejuízo……!"
13120-240 = "Nonomi-chan, primeiro vamos pedir desculpas!"
13120-241 = "S-sim! Sinto muito..."
13120-242 = "Shiroko-chan também!"
13120-244 = "...Hum, desculpa."
13120-245 = "Pedir desculpas não vai resolver nada!"
13120-248 = "...Ai, ai, só desta vez, viu."
13120-250 = "Sim..."
13120-251 = "Que bom que deu tudo certo,"
13120-252 = "Shiroko-chan."
13120-253 = "Hum, da próxima vez vou garantir que não descubram."
13120-254 = "Shiroko-chan!?"
13120-259 = "Você está realmente arrependida!?"
13120-260 = "Bem, como vocês são alunas de Abydos, vou deixar passar desta vez.#nMas quem diria que ainda restava gente por aqui."
13120-262 = "..."
13120-263 = "Se tiverem ferro sobrando, entrem em contato a qualquer momento."
13120-269 = "Então, até mais."
13120-275 = "..."
13120-281 = "...Ué?"
13120-285 = "Olhem só, Hoshino-senpai, Shiroko-chan!#nOs botões das cerejeiras estão abrindo!"
13120-290 = "...É verdade."
