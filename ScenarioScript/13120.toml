[translation]
13120-1 = "第12話;対策委員会の始まり"
13120-4 = "アビドス高等学校・駐輪場"
13120-7 = "いやぁ、ちょっと乱暴だったかなぁ……。 "
13120-8 = "お名前は？"
13120-12 = "……シロコ[ruby=すなおおかみ]。砂狼シ[/ruby]ロコ。"
13120-14 = "へぇ……シロコちゃんっていうんだ。#nそれで、シロコちゃんはここで何をしてたんだい？ "
13120-15 = "……。"
13120-16 = "ここさ、廃墟に見えるけど……一応アビドス分校――#nいや、アビドス本校なんだよ。"
13120-17 = "その制服……初めて見ました。"
13120-18 = "ね。それに、そんな薄着じゃ寒いよ。 "
13120-21 = "えっと、シロコちゃんはどこの学園？"
13120-22 = "……分からない。"
13120-23 = "……？"
13120-24 = "気づいたら、ここにいた。#n名前以外……分からない……"
13120-25 = "そ、それって……もしかして記憶喪失！？#n最近流行ってるっていうアレ？おじさん、そういうのちょっと疎いんだよな～"
13120-26 = "（おじさん……？）"
13120-27 = "では……シロコちゃんは、名前以外何も分からない、と……？#n通っている学園も、電話番号も、メールアドレスも……？"
13120-31 = "（こくり）"
13120-33 = "ほ、ホシノ先輩、どうしましょう？"
13120-34 = "ん～困ったねぇ。 "
13120-38 = "とりあえず……なか入ろっか、シロコちゃん。 "
13120-39 = "えっ！？い、一緒に行くんですか？"
13120-45 = "これ、巻いておきな～"
13120-46 = "マフラー……？"
13120-47 = "うん。無いよりはいいかなって。 "
13120-48 = "……。"
13120-49 = "どう？ちょっとはマシになったでしょ？"
13120-50 = "……うん。 "
13120-54 = "あったかい。"
13120-57 = "うへ～。よく似合ってるよ、シロコちゃん。#nそのマフラー、おじさんがセールで買ったものなんだけどさ、大事に使ってよね？"
13120-58 = "ん、分かった。"
13120-64 = "……。 "
13120-65 = "どうしたの、ノノミちゃん。 "
13120-66 = "ホシノ先輩、今おじさんって……？"
13120-67 = "……ん？"
13120-68 = "それに、うへ～って……。"
13120-69 = "……なに言ってるの、いつも通りのおじさんだよ。"
13120-70 = "また……。"
13120-71 = "あ～……。"
13120-76 = "っくしゅん。"
13120-80 = "と、とにかく早く入ろっか。#nシロコちゃん鼻水垂らしてるし。"
13120-81 = "あ、はい！#nシロコちゃん、行きましょう。"
13120-92 = "うへ～、ピッタリだね。#n予備の制服が残ってて良かったよ。"
13120-93 = "ん。"
13120-94 = "ひとまず、これで我慢してください。#nあとで新しいお洋服を用意しますから。"
13120-95 = "大丈夫。 "
13120-96 = "でも、これはアビドスの旧制服なので……。"
13120-97 = "（ふるふる）"
13120-99 = "それ、気に入ったの？"
13120-100 = "うーん、シロコちゃんが良いのであれば、構いませんが……。"
13120-108 = "やっぱり、強行突破しかない。"
13120-109 = "いやいや、いくら何でも無茶よ。"
13120-110 = "私が偵察に行って、#n兵士の数や配置、補給路、監視カメラの場所を調べれば……。"
13120-111 = "銀行とは規模が違うでしょ。"
13120-112 = "……ホシノ先輩がいれば、勝てる。"
13120-119 = "……先輩？ "
13120-120 = "うへ～、ごめんごめん。#nちょっと昔のことを思い出して、ぼーっとしちゃってたよ。"
13120-121 = "鼻水を垂らしてたシロコちゃんも可愛かったな～って。#nいつの間にか、こんな恐ろしいセリフを言うようになっちゃったけど。"
13120-123 = "そんな時もありましたね☆"
13120-125 = "恥ずかしいから、その話は……。"
13120-126 = "あの頃のシロコちゃんはどこに行ったんだろ……。"
13120-127 = "先輩たちの出会いって、そんな昔じゃないでしょ！"
13120-132 = "大丈夫ですよ、シロコちゃんは今も可愛いですから。"
13120-133 = "……ん。"
13120-135 = "あれから一瞬だったけど、#n対策委員会ができてから、まだ一年しか経ってないんだよね。"
13120-140 = "……。"
13120-141 = "……うん。 "
13120-151 = "あれ、シロコちゃん？ "
13120-155 = "ホシノ、勝負しよ。"
13120-160 = "しょ、勝負って！？"
13120-162 = "私は自分より強い人の言葉しか聞かない。"
13120-163 = "だから、勝負。"
13120-164 = "……元気良いねぇ。"
13120-165 = "ま、付き合ってあげるよ。"
13120-170 = "良いんですか、ホシノ先輩！？ "
13120-172 = "前にも言ったけど、1対1の戦いでおじさんは負けたことないんだよね。#nなのに、またやりたいんだ？"
13120-173 = "ん、今度こそ負けない。"
13120-174 = "へぇ、じゃあ負けたらどうする？#nシロコちゃんは何をしてくれるの？"
13120-175 = "何でも言うこと聞く。"
13120-176 = "じゃあ、負けたらアビドスに入学して、おじさんのことを先輩って呼んでもらおうかな。"
13120-177 = "ん、分かった。"
13120-179 = "ほ、ホシノ先輩！"
13120-200 = "シロコちゃん、これ何！？"
13120-201 = "ネジにボルト、薬莢まで……どこから持ってきたんですか？"
13120-203 = "ん、奪った。"
13120-206 = "はい！？"
13120-207 = "う、奪ったってどこから！？"
13120-209 = "街の古鉄屋。#n今度は奪ってきたところに売って、学校の借金を返す。"
13120-210 = "売って、奪って、"
13120-211 = "また売るってこと……？"
13120-216 = "……えっ！？"
13120-218 = "シロコちゃん、それはダメだよ。"
13120-222 = "なんで？"
13120-223 = "なんでって、えっと……。"
13120-228 = "ここにいたのか！#nウチのトラックを奪いやがって！"
13120-234 = "えっ！？ "
13120-236 = "シロコちゃん、トラックまで奪ってきたの！？"
13120-237 = "ん、ついでに。"
13120-238 = "すみません。#nこの子、まだ色々よく分かってなくって……。"
13120-239 = "私が弁償しますので……！"
13120-240 = "ノノミちゃん、まずは謝ろう！"
13120-241 = "は、はい！申し訳ありませんでした……"
13120-242 = "シロコちゃんも！"
13120-244 = "……ん、ごめんなさい。"
13120-245 = "謝って済むわけねぇだろ！"
13120-248 = "……ったく、今回だけだからな。"
13120-250 = "はい……。"
13120-251 = "何とかなって良かったね、"
13120-252 = "シロコちゃん。"
13120-253 = "ん、次はバレないようにする。"
13120-254 = "シロコちゃん！？"
13120-259 = "本当に反省してるんだろうな！？"
13120-260 = "まあ、今回はアビドスの生徒だったから許してやるよ。#nにしても、まだ残ってる人がいたとはな。"
13120-262 = "……。"
13120-263 = "不要な鉄があったら、いつでも連絡してくれ。"
13120-269 = "そんじゃ、またな。"
13120-275 = "……。"
13120-281 = "……あれ？ "
13120-285 = "見てください、ホシノ先輩、シロコちゃん！#n桜の蕾が開いてます！"
13120-290 = "……本当だ。"
13120-291 = "あっという間に、冬が終わってしまいますね。"
13120-292 = "……うん。"
13120-293 = "楽しい時間、でしたのに……。"
13120-297 = "……そしたら、ノノミちゃんとはお別れだね。"
13120-301 = "……。"
13120-302 = "ハイランダーに入学するんだから、色々準備が必要なんじゃない？"
13120-318 = "ほらほら、シロコちゃんノノミちゃん！笑って～！"
13120-319 = "ん。"
13120-320 = "わ、わざわざ撮る必要、ありますか……？"
13120-321 = "なに言ってるのさ、当たり前でしょ！#nお祝いの時は、記念に写真を撮るものだから！"
13120-337 = "シロコちゃん、そのマフラー暑くない？#nそろそろ外したら？"
13120-338 = "ううん、大丈夫。"
13120-348 = "今日から、ここがアビドス廃校対策委員会の教室だよ。"
13120-351 = "はい！"
13120-352 = "任せて、計画ならたくさんある。"
13120-353 = "もしかして……。"
13120-355 = "銀行強盗は却下だよ。"
13120-360 = "私にも良い案があります！"
13120-361 = "このゴールドカードで――"
13120-363 = "それもダメ。"
13120-368 = "……ですよね。"
13120-371 = "……。"
13120-372 = "……。 "
13120-374 = "急に黙ってどうしたの、先輩たち！"
13120-375 = "アヤネちゃんも何か言ってよ！"
13120-376 = "あはは……先輩たちには、それだけ思い出があるでしょうから。"
13120-378 = "うへへ、ごめんね。#nアヤネちゃんとセリカちゃんが来た時のことも、#nおじさんにとって大切な思い出だよ。"
13120-379 = "うんうん。二人とも、すっごく可愛かったです。"
13120-380 = "ん。"
13120-384 = "あ、あの失礼します！#n皆さんがアビドス高校の生徒で合っていますか？"
13120-385 = "私たちも、ここに入学したいの。"
13120-386 = "アビドスのために、何かしたいんです……！"
13120-387 = "たしか、復旧委員会よね？"
13120-388 = "対策委員会だよ、セリカちゃん。"
13120-389 = "そう、それ！#nとにかく、これからよろしくね、先輩！"
13120-390 = "よろしくお願いします！"
13120-392 = "わ、私たちのことは良いから……！"
13120-393 = "あはは……まあ、色々ありましたね。"
13120-395 = "アヤネちゃんとセリカちゃんのおかげで、#nアビドス高校アイドル計画も夢じゃ……！"
13120-396 = "おじさんには無理かな～。#nそういうのは、若い子に任せるよ。"
13120-400 = "では、アヤネちゃんとセリカちゃんの二人ユニットなら……？"
13120-406 = "うん、良いと思う。"
13120-407 = "それは楽しみだなぁ～。"
13120-409 = "なに勝手に進めてるのよ！"
13120-410 = "そ、そうです。#nやるのならみんな一緒に……。"
13120-423 = "……「対策委員会」がなくなるのは、嫌です。"
13120-428 = "ノノミ先輩？"
13120-430 = "名前が消えても、私たちの思い出までなかったことにはなりませんが……。"
13120-431 = "それでも、私は嫌なんです。"
13120-432 = "シロコちゃんのおかげで、私はアビドスに残る決心がつきました。"
13120-433 = "シロコちゃんのおかげで、ホシノ先輩にまた笑顔が戻ってきました。"
13120-434 = "なのに、こんな形で解散なんて……。"
13120-435 = "……ノノミ先輩。"
13120-437 = "……。"
13120-438 = "シロコちゃんはどう思いますか？"
13120-439 = "……私は。"
13120-440 = "私にとって、対策委員会は……。"
13120-441 = "言わなくても分かるよ。#nシロコちゃんにとっても、ここは始まりの場所。"
13120-442 = "……ん。"
13120-444 = "それは、ホシノ先輩にとっても、ですよね？"
13120-445 = "もちろん、そうだけど……？"
13120-446 = "「アビドス生徒会」には、生徒会長とホシノ先輩の思い出があるはずです……。"
13120-447 = "ホシノ先輩にだけ、悲しい思いをさせるわけにはいきません。"
13120-448 = "……うへへ、おじさんなら大丈夫だよ。"
13120-449 = "ホシノ先輩は、今もアビドス生徒会の名前を残してる。"
13120-450 = "生徒会長とのつながりを失わないため、だよね？"
13120-451 = "本当に諦めて良いの？"
13120-452 = "気にしてないって言ったら、嘘になるかもしれないけど……。"
13120-453 = "先輩が生徒会長になりたがらなかったのは、#n前の会長がいるからじゃない？"
13120-457 = "私が生徒会長になると、#nユメ先輩の死を認めることになるから、って言いたいんだよね。"
13120-458 = "……まあ、それも否定はしないよ。"
13120-459 = "でも……。"
13120-460 = "今のおじさんにとっては……列車砲の行方のほうが、ずっと大事。"
13120-462 = "……。"
13120-463 = "……。"
13120-468 = "ユメ先輩が鉄道を取り戻そうとした理由は分からないけど……。"
13120-470 = "疑念、不信、暴力、嘘……#nそういうものを当たり前だと思うようになったら、"
13120-471 = "私たちもいつか、自分を見失っちゃうよ。"
13120-472 = "そうやってアビドスを取り戻しても、#nそれは私たちが思い描いたアビドスにはならない。"
13120-473 = "もし、アビドスに人が帰ってきてくれたとして……#nそんな街になっちゃってたら……"
13120-474 = "……私は悲しいよ。"
13120-477 = "列車砲は、アビドスに存在しちゃいけない。"
13120-478 = "絶対に見つけ出して、破壊する。"
13120-479 = "だから、もう良いんだ。#n名前になんて拘らなくても。"
13120-484 = "……。"
13120-485 = "……。"
13120-486 = "……。"
13120-487 = "……。"
13120-489 = "それに、対策委員会も大事な思い出だしね。"
13120-490 = "ノノミちゃん、シロコちゃん、アヤネちゃん、セリカちゃん……#nみんなと過ごす今が、おじさんは楽しいんだよ。"
13120-491 = "ですが……。"
13120-492 = "おじさんが良いって言ってるんだから、これで良いの。"
13120-493 = "というか、まずは会場にたどり着かないと始まらないし。"
13120-494 = "どうやって警備を突破するか考えないとね。"
13120-495 = "……はい、先輩。"
13120-497 = "ん、分かった。"
13120-498 = "それじゃ、方向性は決まったわね？"
13120-500 = "はい、明日の12時までにアビドス中央駅旧庁舎に行き、警備を突破。"
13120-504 = "その後、契約続行の意思表示をします。"
13120-505 = "けど、私たち五人だけで、どうやって……。"
13120-506 = "それを今から考えましょう。"
13120-507 = "ただ、先ほどから一向に先生と連絡がつかないんです。"
13120-508 = "昨日は来てくれるって言ってたのに……。"
13120-509 = "いつも忙しいから、こういうこともあるだろうけど……。"
13120-511 = "うーん……。"
13120-512 = "まさか、何かトラブルに巻き込まれていたり……。"
13120-521 = "えっ！？"
13120-525 = "ど、どうしたのアヤネちゃん？"
13120-526 = "な、何があったの！？ "
13120-527 = "……ニュースですか？"
13120-532 = "……今朝、D.U.内のシャーレで原因不明の爆発が発生しました。"
13120-536 = "えぇ！？"
13120-537 = "！！"
13120-539 = "負傷した[USERNAME]先生は、病院に緊急搬送されたようです。#n爆発の原因は、現在も究明中と……。"
13120-541 = "次回;人質"
