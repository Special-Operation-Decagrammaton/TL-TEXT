13120-470 = "Dúvida, desconfiança, violência, mentiras...#nSe começarmos a achar que essas coisas são normais,"
13120-471 = "nós também acabaremos nos perdendo um dia."
13120-472 = "Mesmo que recuperemos Abydos desse jeito,#nela não será a Abydos que imaginamos."
13120-473 = "Se as pessoas voltarem para Abydos...#ne a cidade tiver se tornado algo assim..."
13120-474 = "……Eu estou triste."
13120-477 = "O canhão ferroviário não deveria existir em Abydos."
13120-478 = "Nós vamos encontrá-lo e destruí-lo, custe o que custar."
13120-479 = "Por isso, já chega. #nNão precisamos nos prender a nomes."
13120-484 = "……."
13120-485 = "……."
13120-486 = "……."
13120-487 = "……."
13120-489 = "Além disso, o Comitê de Contramedidas também é uma lembrança preciosa."
13120-490 = "Nonomi-chan, Shiroko-chan, Ayane-chan, Serika-chan... #nO tio aqui está feliz com o tempo que passa com todas vocês."
13120-491 = "Mas……."
