13120-440 = "Para mim, o Comitê de Contramedidas é..."
13120-441 = "Não precisa nem dizer, eu já sei.#nPara a Shiroko-chan também, este é o lugar onde tudo começou."
13120-442 = "...Hum."
13120-444 = "Isso também vale para a Hoshino-senpai, não é?"
13120-445 = "Claro que sim, mas...?"
13120-446 = "O 'Grêmio Estudantil de Abydos' deve guardar as memórias da presidente e da Hoshino-senpai..."
13120-447 = "Não podemos deixar que apenas a Hoshino-senpai carregue essa tristeza."
