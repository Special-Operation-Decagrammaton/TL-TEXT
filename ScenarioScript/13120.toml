13120-292 = "...Hum."
13120-293 = "E olha que o tempo passou tão rápido..."
13120-297 = "...Então, está na hora de nos despedirmos da Nonomi-chan."
13120-301 = "..."
13120-302 = "Já que você vai entrar na Highlander, não precisa preparar um monte de coisas?"
13120-318 = "Vamos lá, Shiroko-chan, Nonomi-chan! Sorriam!"
13120-319 = "Hum."
13120-320 = "P-precisa mesmo tirar uma foto...?"
13120-321 = "O que você está dizendo? É claro que sim!#nEm celebrações, a gente sempre tira fotos para registrar o momento!"
13120-337 = "Shiroko-chan, esse cachecol não está te deixando com calor?#nNão quer tirar logo?"
13120-338 = "Não, estou bem."
13120-348 = "A partir de hoje, esta é a sala do Comitê de Contramedidas de Fechamento de Abydos."
13120-351 = "Sim!"
13120-352 = "Pode deixar, tenho vários planos."
13120-353 = "Será que..."
13120-355 = "Assalto a banco está fora de cogitação."
13120-360 = "Eu também tenho uma ótima ideia!"
13120-361 = "Com este cartão de crédito..."
13120-363 = "Isso também não."
13120-368 = "...Entendi."
13120-371 = "..."
13120-372 = "..."
13120-374 = "Por que ficaram em silêncio de repente, senpais!"
13120-375 = "Ayane-chan, diga alguma coisa também!"
13120-376 = "Ahaha... é que as senpais devem ter muitas lembranças daqui."
13120-378 = "Uhehe, desculpem. Para o tio aqui, o momento em que a Ayane-chan e a Serika-chan chegaram também é uma lembrança muito preciosa."
13120-379 = "Sim, sim. As duas eram muito fofas."
13120-380 = "Hum."
13120-384 = "A-ah, com licença!#nVocês são as alunas da escola Abydos, correto?"
13120-385 = "Nós também queremos nos matricular aqui."
13120-386 = "Queremos fazer algo por Abydos...!"
13120-387 = "Se não me engano, é o Comitê de Restauração, certo?"
13120-388 = "É Comitê de Contramedidas, Serika-chan."
13120-389 = "Isso, isso!#nDe qualquer forma, conto com vocês daqui para frente, veteranas!"
13120-390 = "Contamos com vocês!"
13120-392 = "N-não precisam se preocupar com a gente...!"
13120-393 = "Ahaha... bem, aconteceram muitas coisas, não é?"
13120-395 = "Graças à Ayane-chan e à Serika-chan,#no plano de transformar Abydos em um colégio de idols não é mais um sonho...!"
13120-396 = "Acho que para a titia aqui não dá.~#nVou deixar essas coisas para as mais jovens."
13120-400 = "Então, que tal uma dupla com a Ayane-chan e a Serika-chan...?"
13120-406 = "Sim, acho uma boa ideia."
13120-407 = "Isso vai ser divertido.~"
13120-409 = "Por que vocês estão decidindo isso sozinhas?!"
13120-410 = "I-isso mesmo.#nSe for para fazer, que seja com todas juntas..."
13120-423 = "...Eu não quero que o 'Comitê de Contramedidas' deixe de existir."
13120-428 = "Nonomi-senpai?"
13120-430 = "Mesmo que o nome desapareça, nossas memórias não deixarão de existir, mas..."
13120-431 = "Ainda assim, eu não quero isso."
13120-432 = "Graças à Shiroko-chan, tomei a decisão de ficar em Abydos."
