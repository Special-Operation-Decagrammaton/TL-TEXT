13120-48 = "……"
13120-49 = "E então? Ficou um pouco melhor, não ficou?"
13120-50 = "……Sim."
13120-54 = "Está quentinho."
13120-57 = "Uhe~. Ficou muito bom em você, Shiroko-chan. #nEsse cachecol eu comprei numa promoção, então cuide bem dele, tá?"
13120-58 = "Hum, entendi."
13120-64 = "……"
13120-65 = "O que foi, Nonomi-chan?"
13120-66 = "Hoshino-senpai, você acabou de se chamar de 'tio'……?"
13120-67 = "……Hum?"
13120-68 = "E esse 'uhe~' também……"
13120-69 = "……Do que você está falando? É o tio de sempre."
13120-70 = "De novo……"
13120-71 = "Ah……"
13120-76 = "Atchim."
13120-80 = "B-bem, vamos entrar logo. #nA Shiroko-chan está até fungando."
13120-81 = "Ah, sim! #nShiroko-chan, vamos lá."
13120-92 = "Uhe~, serviu perfeitamente. #nQue bom que ainda tínhamos um uniforme reserva."
13120-93 = "Hum."
13120-94 = "Por enquanto, por favor, aguente com isso. #nDepois vamos providenciar roupas novas para você."
13120-95 = "Está tudo bem."
13120-96 = "Mas, como este é o uniforme antigo de Abydos……"
13120-97 = "(Balança a cabeça negativamente)"
13120-99 = "Você gostou dele?"
13120-100 = "Hum, se a Shiroko-chan está satisfeita, por mim tudo bem……"
13120-108 = "Como eu pensei, só nos resta forçar a entrada."
13120-109 = "Não, não, isso é loucura demais."
13120-110 = "Se eu for fazer o reconhecimento, #nanalisar o número de soldados, a disposição, as rotas de suprimento e a localização das câmeras de segurança..."
13120-111 = "A escala é bem diferente da de um banco, não acha?"
13120-112 = "……Se a Hoshino-senpai estiver lá, nós venceremos."
13120-119 = "……Senpai?"
13120-120 = "Uhe~, desculpe, desculpe. #nEu acabei me perdendo em pensamentos lembrando de antigamente."
13120-121 = "A Shiroko-chan com o nariz escorrendo também era uma gracinha~. #nQuem diria que, num piscar de olhos, você começaria a dizer coisas tão assustadoras."
13120-123 = "Houve uma época assim mesmo, né☆"
13120-125 = "É vergonhoso, então pare com essa história……."
13120-126 = "Para onde foi aquela Shiroko-chan daquela época……."
13120-127 = "O encontro de vocês não foi há tanto tempo assim!"
13120-132 = "Não se preocupe, a Shiroko-chan continua fofa até hoje."
13120-133 = "……Hmm."
13120-135 = "Parece que foi ontem, mas #ndesde que o Comitê de Contramedidas foi criado, só se passou um ano, né."
13120-140 = "……."
13120-141 = "……Sim."
13120-151 = "Ué, Shiroko-chan?"
13120-155 = "Hoshino, vamos lutar."
13120-160 = "Lu-lutar, como assim!?"
13120-162 = "Eu só escuto quem é mais forte do que eu."
13120-163 = "Por isso, vamos lutar."
13120-164 = "……Que energia, hein."
13120-165 = "Bem, eu aceito o desafio."
13120-170 = "Tem certeza disso, Hoshino-senpai!?"
13120-172 = "Como eu já disse antes, a titia aqui nunca perdeu um duelo 1 contra 1. #nMesmo assim, você quer tentar de novo?"
13120-173 = "Hmm, desta vez eu não vou perder."
13120-174 = "Heh, então o que acontece se você perder? #nO que a Shiroko-chan vai fazer por mim?"
13120-175 = "Vou fazer qualquer coisa que você pedir."
13120-176 = "Então, se perder, você vai se matricular em Abydos e me chamar de senpai, que tal?"
13120-177 = "Hmm, combinado."
13120-179 = "Ho-Hoshino-senpai!"
13120-200 = "Shiroko-chan, o que é isso!?"
13120-201 = "Parafusos, porcas, até cartuchos de munição…… de onde você tirou isso?"
13120-203 = "Hmm, eu roubei."
13120-206 = "O quê!?"
13120-207 = "Ro-roubou? De onde!?"
13120-209 = "Do ferro-velho da cidade. #nDesta vez, vou vender para o lugar de onde roubei e pagar as dívidas da escola."
