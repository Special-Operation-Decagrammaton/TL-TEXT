[translation]
2000106-1 = "A relação entre mim e o Sensei?"
2000106-2 = "Millennium - Terraço"
2000106-4 = "Ufa..."
2000106-6 = "Ah, Sensei, você veio."
2000106-7 = "Quer saber o que houve? Hum... não sei bem como explicar..."
2000106-8 = "Na verdade, eu briguei com uma amiga."
2000106-9 = "[s1] \"Em qual hospital essa amiga está agora?\"\n[s2] \"...O que aconteceu?\""
2000106-10 = "...Ela está bem na sala de aula."
2000106-11 = "Foi uma discussão boba, por assim dizer."
2000106-12 = "Não entenda errado. Nós não chegamos a trocar socos nem nada do tipo."
2000106-13 = "Geralmente, nós compramos o almoço fora e comemos juntas na sala de aula."
2000106-14 = "Mas eu... é um pouco vergonhoso admitir, mas tenho feito dieta ultimamente."
2000106-15 = "Da última vez, quando tirei a roupa de empregada e vesti o uniforme depois de muito tempo, ele estava apertado em vários lugares..."
2000106-16 = "Só que essa minha amiga não tem muito interesse em dietas."
2000106-17 = "De repente, ela sugeriu que comêssemos pizza."
2000106-18 = "E ainda disse que deveríamos comprar um bolo de chocolate de sobremesa."
2000106-19 = "Eu não tenho frescura com comida, então, na maioria das vezes, eu costumava fazer o que ela queria,"
2000106-20 = "mas hoje eu não estava me sentindo muito bem e queria comer uma salada..."
2000106-21 = "[s] \"Não poderiam ter comido coisas diferentes?\""
2000106-22 = "Não diga uma coisa dessas, Sensei."
2000106-23 = "Para estudantes do ensino médio, comer separadamente é o mesmo que declarar: \"Você não está do meu lado\"."
2000106-24 = "[s3] \"Bem... mas por causa disso, chegar a esse ponto...\"\n[s4] \"Isso é motivo para brigar?\""
2000106-25 = "Sim, eu sei."
2000106-26 = "Sim, eu sei."
2000106-27 = "Acho que esse tipo de divergência de opinião pode ser resolvido apenas com respeito mútuo."
2000106-28 = "Mas, até agora, eu quase sempre cedi aos pedidos e sentimentos da minha amiga."
2000106-29 = "Então, não acha que de vez em quando ela poderia me ouvir também?"
2000106-30 = "Isso não seria o justo?"
2000106-31 = "[s5] \"Não acho que o que é necessário entre amigos seja justiça.\"\n[s6] \"Karin está certa, a amiga dela é quem está errada.\"\n[s7] \"Isso está errado, Karin, você é quem está errada.\""
2000106-32 = "..."
2000106-33 = "Haa."
2000106-34 = "Haha."
2000106-35 = "É verdade."
2000106-36 = "Parece um pouco antiquado, mas é verdade. Entendi."
2000106-37 = "Isso, o que é necessário entre amigos é amizade, né."
2000106-38 = "..."
2000106-39 = "Ufa."
2000106-40 = "Sensei, obrigado por tentar me consolar e dizer coisas que nem você acredita."
2000106-41 = "Depois de ouvir isso, comecei a pensar que eu também estava errada."
2000106-42 = "O importante é comerem juntas, o que elas comem não é um problema tão grande, né."
2000106-43 = "..."
2000106-44 = "Talvez seja isso mesmo."
2000106-45 = "Obrigado por ser honesto comigo, Sensei."
2000106-46 = "Sim, às vezes, mais do que um consolo em que não se acredita..."
2000106-47 = "Palavras assim, típicas do Sensei, talvez sejam o que me ajudem a crescer mais um pouco."
2000106-48 = "No fim das contas... é muito bom ter alguém com quem eu possa desabafar."
2000106-49 = "Vou pedir desculpas."
2000106-50 = "Obrigado, Sensei. Graças a você, minha mente e meu coração ficaram mais leves."
2000106-51 = "Vou comprar uma pizza para levar. Ah, e o bolo de chocolate também."
2000106-52 = "Ah, e mais uma coisa..."
2000106-53 = "Pensei um pouco sobre isso, mas acho que não consigo ser apenas amiga do Sensei..."
2000106-54 = "N-não é nada estranho, não me entenda mal!"
2000106-55 = "Bem, é que, não é como amiga, mas sim..."
2000106-56 = "Mestre, por isso..."
2000106-57 = "……Hehe, é brincadeira."
2000106-58 = "Obrigada, Sensei. Então, vou indo na frente."
2000106-61 = "……Até mais tarde."
