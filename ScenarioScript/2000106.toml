[translation]
2000106-1 = "私と先生の関係？"
2000106-2 = "ミレニアム・屋上"
2000106-4 = "ふう……。"
2000106-6 = "あ、先生、来てくれたね。"
2000106-7 = "どうしたのかって？うーん。なんて話せばいいのか……。"
2000106-8 = "実は友人と、喧嘩してしまって。"
2000106-9 = "[s1] \"その友人は今、どこの病院にいるの？\"\n[s2] \"……何があったの？\""
2000106-10 = "……教室で元気にしてるよ。"
2000106-11 = "些細な口喧嘩、というか。"
2000106-12 = "誤解しないで。お互い殴り合ったりはしてない。"
2000106-13 = "普段私たちはお昼を外で買ってきて、教室で一緒に食べることが多い。"
2000106-14 = "でも私は……ちょっと言うのは恥ずかしいのだけど、最近ダイエットをしてたんだ。"
2000106-15 = "この前、メイド服を脱いで久しぶりに制服を着たら、あちこち窮屈で……。"
2000106-16 = "ただその友人は、ダイエットとかはあまり興味がなくて。"
2000106-17 = "急にピザを食べようと言ってきたんだ。"
2000106-18 = "そこに、デザートとしてチョコケーキまで買ってこようって言うものだから。"
2000106-19 = "別に好き嫌いはないから、いつもなら友人の言う通りにすることが多かったけれど、"
2000106-20 = "今日の私は調子も悪かったこともあって、サラダが食べたくて……。"
2000106-21 = "[s] \"別々に食べればいいんじゃ？\""
2000106-22 = "とんでもないことを言わないで、先生。"
2000106-23 = "女子高生同士でわざわざご飯を別々に食べるというのは、「あなたは味方じゃない」っていう意思表示も同然。"
2000106-24 = "[s3] \"まあ……でもそれぐらいのことで、そこまで……。\"\n[s4] \"それは、喧嘩するほどのこと？\""
2000106-25 = "うん、私も分かってる。"
2000106-26 = "うん、私も分かってる。"
2000106-27 = "こういうお互いの意見の違いは、互いに対する尊重だけでも、解決はできると思う。"
2000106-28 = "でも私は今まで、ほとんど友人の要求や気持ちに合わせていた。"
2000106-29 = "だったらたまには私の言うことを聞いてくれてもいいと思わないか？"
2000106-30 = "それが公平さというものではないのか？"
2000106-31 = "[s5] \"友達同士に必要なのは公平さじゃないと思うよ。\"\n[s6] \"カリンの言うことが正しい、友達が悪い。\"\n[s7] \"それは間違ってる、カリンが悪いよ。\""
2000106-32 = "……。"
2000106-33 = "はあ。"
2000106-34 = "ははっ。"
2000106-35 = "そうだね。"
2000106-36 = "ちょっと古い気もするけど、そうだね。理解した。"
2000106-37 = "そう、友人同士で必要なのは友情、だね。"
2000106-38 = "……。"
2000106-39 = "ふう。"
2000106-40 = "先生、慰めようとして、心にもないことを言ってくれてありがとう。"
2000106-41 = "そう言ってくれると、私も悪かったと思えてきた。"
2000106-42 = "一緒に食べるってことが大事であって、何を食べるかは大した問題ではないね。"
2000106-43 = "……。"
2000106-44 = "そうかもね。"
2000106-45 = "先生、正直に言ってくれてありがとう。"
2000106-46 = "うん、たまには心にも思ってない慰めよりも……。"
2000106-47 = "そういう先生らしい言葉の方が、私をもう一歩、成長させてくれるのかもしれない。"
2000106-48 = "やっぱり……こうやって悩みを話せる人がいるってことは、嬉しいことだ。"
2000106-49 = "謝ってくる。"
2000106-50 = "ありがとう先生。おかげで頭も心も、軽くなった。"
2000106-51 = "ピザでも買って帰ろう。あ、そうだ、チョコケーキも。"
2000106-52 = "あ、それと……。"
2000106-53 = "少し考えてみたけど、やっぱり先生と友人にはなれなさそうだ……。"
2000106-54 = "へ、変な話じゃない、誤解しないでくれ！"
2000106-55 = "えっと、だから友人じゃなくて……。"
2000106-56 = "ご主人様、だから……。"
2000106-57 = "……ふふっ、冗談だ。"
2000106-58 = "ありがとう先生、じゃあお先に失礼する。"
2000106-61 = "……また後で。"
