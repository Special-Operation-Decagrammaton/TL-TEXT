[translation]
10044075-2 = "Eles... são fortes!"
10044075-3 = "Droga! Eu deveria ter conseguido controlar o mercado negro..."
10044075-8 = "A-as fofocas estão ficando cada vez maiores..."
10044075-9 = "Será que eles são realmente incríveis?"
10044075-10 = "Todo mundo está cego por causa do tesouro, né? Pahyá!"
10044075-12 = "Ufa..."
10044075-13 = "Já terminamos por aqui."
10044075-14 = "[ns1] \"Obrigada, Iori.\"\n[ns2] \"Graças ao Comitê de Disciplina, nós conseguimos.\""
10044075-17 = "É uma confusão que aconteceu dentro do nosso distrito, então é natural que a gente cuide disso, mas..."
10044075-18 = "Se eu vou deixar passar ou não..."
10044075-19 = "..."
10044075-20 = "Bem, você é o Sensei, afinal."
10044075-21 = "[s] \"Você confia em mim...!\""
10044075-22 = "Venha me dar uma explicação depois! Sensei, não se esqueça, entendeu?"
10044075-23 = "Bom, eu vou indo nessa—"
10044075-24 = "Você foi muito bem!"
10044075-25 = "Não foi nada demais..."
10044075-26 = "Foi uma atuação de nível de elite, né?"
10044075-28 = "M-muito obrigado... graças a vocês, eu escapei da morte..."
10044075-29 = "E-essa dívida, um dia eu vou..."
10044075-30 = "Esquece isso, não precisa."
10044075-31 = "...Tome cuidado no caminho, Highlander."
10044075-32 = "Ah, você também, Sensei."
10044075-33 = "[s] \"Sim, obrigado, Iori.\""
10044075-37 = "O Sensei realmente conhece todo mundo!"
10044075-38 = "A-afinal, este mundo é movido a contatos... Como alguém como eu deveria viver..."
10044075-39 = "Aoba, você não tem amigos?"
10044075-40 = "V-você sabe o que é violência verbal?"
10044075-41 = "Parece que não tem."
10044075-42 = "E-eu acho que é uma disputa acirrada..."
10044075-43 = "Hikari tem muitos amigos, o Sensei também é amigo!"
10044075-44 = "O-o Sensei não é o Sensei...?"
10044075-45 = "Eh...?"
10044075-46 = "Aoba quer ser amiga também?"
10044075-47 = "Não, não é isso... esta caixa..."
10044075-49 = "Os cantos estão um pouco amassados. Será que foi por causa daquela bomba de agora pouco?"
10044075-51 = "O-o conteúdo parece estar intacto, mas..."
10044075-55 = "Mas, quem diria... que algo assim estaria sendo transportado..."
10044075-56 = "[ns] \"Isso é...\""
10044075-59 = "Cof, cof... todos estão bem...?"
10044075-60 = "C-chefe... o que a gente vai fazer agora?"
10044075-61 = "O Comitê de Disciplina apareceu e perdemos o trem..."
10044075-62 = "Está tudo um caos..."
10044075-63 = "..."
10044075-64 = "Desse jeito, o plano..."
10044075-65 = "Não... ainda temos uma chance."
10044075-66 = "A resposta sempre esteve... na estrada."
10044075-67 = "É só que ainda não a encontramos...!"
10044075-72 = "Isso! É assim que temos que fazer!"
10044075-73 = "Chefe?"
10044075-74 = "Nós sabemos qual é o destino do trem. Afinal, originalmente esse era o nosso trabalho."
10044075-75 = "Ou seja... vamos nos antecipar ao destino e..."
10044075-77 = "Roubar a carga logo antes deles chegarem lá!!"
10044075-79 = "E então nós entregamos para o cliente!!"
10044075-81 = "Isso é permitido!?"
10044075-83 = "E-eu não sou muito inteligente, então não sei dizer... mas será que isso pode ser chamado de entrega...?"
10044075-84 = "Claro que sim!"
10044075-85 = "O meio não importa! Quem entrega por último é o entregador!"
10044075-86 = "S-será mesmo...?"
10044075-87 = "Sim! O dia em que dominaremos o setor de transporte de Kivotos está próximo!"
10044075-88 = "O-oh...!"
10044075-89 = "Certo, vamos nessa! Não deixem que nos ganhem na velocidade!!"
