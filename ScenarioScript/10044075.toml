[translation]
10044075-2 = "こいつら……強い！"
10044075-3 = "くそっ！ブラックマーケットを掌握できたはずなのに……。"
10044075-8 = "う、噂の尾ひれがどんどん大きく……。"
10044075-9 = "もしかしてほんとにすごいのかもー？"
10044075-10 = "みんなお宝に目がくらんでるんだね。パヒャッ！"
10044075-12 = "ふう……。"
10044075-13 = "だいたい片付いたな。"
10044075-14 = "[ns1] \"ありがとう、イオリ。\"\n[ns2] \"風紀委員会のおかげで助かったよ。\""
10044075-17 = "うちの自治区内で起きてる騒ぎだし、鎮圧までは当然なんだけど……。"
10044075-18 = "見逃してやるかどうかは……。"
10044075-19 = "……。"
10044075-20 = "まあでも、先生だからな。"
10044075-21 = "[s] \"信じてくれるんだ……！\""
10044075-22 = "後で必ず説明に来ること！先生、忘れるなよ？"
10044075-23 = "じゃあ、私はこれで――"
10044075-24 = "いい活躍だったよ！"
10044075-25 = "別にこれくらい……。"
10044075-26 = "エース級の活躍だったよー？"
10044075-28 = "ほ、本当にありがとうございました……おかげで命拾いしました……。"
10044075-29 = "こ、このご恩はいつか必ず……。"
10044075-30 = "いいって、そんなの。"
10044075-31 = "……気をつけて行きなよ、ハイランダー。"
10044075-32 = "あ、先生もな。"
10044075-33 = "[s] \"うん、ありがとう、イオリ。\""
10044075-37 = "やっぱ先生は顔広いね！"
10044075-38 = "ど、どうせこの世は人脈がすべて……私みたいな人間はどう生きていけば……。"
10044075-39 = "アオバ、友達いないー？"
10044075-40 = "こ、言葉の暴力って、知ってます？"
10044075-41 = "いなさそー。"
10044075-42 = "い、いい勝負だと思うんですけど……。"
10044075-43 = "ヒカリは友達多いよー、先生も友達ー。"
10044075-44 = "せ、先生は先生なんじゃ……。"
10044075-45 = "え……？"
10044075-46 = "アオバも友達なるー？"
10044075-47 = "いえ、そうではなく……この箱……。"
10044075-49 = "少し角が潰れちゃってるね。さっきの爆弾のせいかな？"
10044075-51 = "な、中身は無事みたいですが……。"
10044075-55 = "でも、まさか……こんなモノが、積まれていたなんて……。"
10044075-56 = "[ns] \"これは……。\""
10044075-59 = "げほっげほっ……全員無事か……？"
10044075-60 = "そ、総長……うちら、これからどうすりゃいいんだ？"
10044075-61 = "風紀委員会まで出てきて、列車は逃しちまったし……。"
10044075-62 = "もう滅茶苦茶だよ……。"
10044075-63 = "……。"
10044075-64 = "このままじゃ計画は……。"
10044075-65 = "いや……まだ手はある。"
10044075-66 = "いつだって答えは――道路の上にあった。"
10044075-67 = "今はまだ見つかってないだけ……！"
10044075-72 = "そうか！こうすりゃいいんだ！"
10044075-73 = "総長？"
10044075-74 = "うちらは列車の目的地を知ってる。#nもともとはうちらの仕事だったんだからな。"
10044075-75 = "つまり……目的地に先回りして――"
10044075-77 = "やつらが到着する直前で、積荷を奪う！！"
10044075-79 = "それをうちらが依頼人に渡す！！"
10044075-81 = "そんなのあり！？"
10044075-83 = "う、うちは頭悪いから分かんないけど……それって配達って言えるのかな……？"
10044075-84 = "当たり前だ！"
10044075-85 = "途中なんて関係ない！最後に届けたやつが配達人だ！"
10044075-86 = "そ、そうかな……？"
10044075-87 = "ああ！うちらがキヴォトスの運送業界を牛耳る日も近い！"
10044075-88 = "お、おーっ……！"
10044075-89 = "よし、行くぞ！スピードで負けるんじゃねぇぞ！！"
