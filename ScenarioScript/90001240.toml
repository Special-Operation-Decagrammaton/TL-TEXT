[translation]
90001240-1 = "Episódio 24; Esperança"
90001240-3 = "[ns] \"Parece que este corredor continua igual para sempre...\""
90001240-4 = "Não é de se estranhar que sinta isso. É inevitável devido à estrutura."
90001240-5 = "Mas devemos chegar à sala de controle em breve."
90001240-6 = "Presidente, como sabe disso?"
90001240-7 = "Este edifício... por algum motivo, é muito parecido com os depósitos do Millennium."
90001240-8 = "É verdade. Poderíamos dizer que é o típico \"estilo Millennium\"."
90001240-9 = "Mas, até onde eu sei, este lugar não consta na lista de instalações do Millennium."
90001240-10 = "Hum... e a possibilidade de ter sido um pedido externo, onde o Millennium apenas cuidou da construção?"
90001240-11 = "Sim, também considero essa possibilidade muito alta."
90001240-12 = "Esta instalação..."
90001240-13 = "Dizem que foi construída para deixar um caminho de sobrevivência para a humanidade caso o mundo estivesse à beira da extinção."
90001240-14 = "Ou seja, é um depósito preparado para o fim dos tempos."
90001240-15 = "Até ver com meus próprios olhos, eu achava que era apenas um boato."
90001240-16 = "Preparar-se para o fim do mundo... que excêntrico."
90001240-17 = "Eu consigo entender..."
90001240-18 = "..."
90001240-19 = "Eu também consigo entender a filosofia por trás da criação desta instalação."
90001240-20 = "Mas não divulgar sua localização e deixar a gestão por conta de uma IA..."
90001240-21 = "Dessa forma, ninguém conseguiria chegar aqui em um momento de necessidade, não é?"
90001240-22 = "Bem, existe a possibilidade de não terem pensado nisso..."
90001240-23 = "Ou talvez tenham construído apenas por um capricho."
90001240-24 = "Ou talvez... estivessem apenas esperando pelo dia em que alguém os encontrasse. #nEsperando pelo momento de germinar."
90001240-25 = "Como se fosse uma semente."
90001240-27 = "Como se..."
90001240-28 = "Uma semente..."
90001240-29 = "Talvez...?"
90001240-30 = "...!!!!"
90001240-31 = "Finalmente a Kei começou a entender o que é a vida!"
90001240-32 = "N-não... não é bem assim. #nApenas achei que era parecido."
90001240-33 = "As sementes escondem possibilidades, não é...?"
90001240-34 = "Sim. #nExatamente!"
90001240-36 = "[ns] \"Fufu.\""
90001240-37 = "Deixando a Alice de lado, por que você está rindo também..."
90001240-39 = "...Para complementar, dizer que \"ninguém conseguiria chegar\" é um exagero."
90001240-40 = "Pelo menos eu sabia."
90001240-41 = "A pessoa excêntrica que construiu isso talvez seja parecida com a Rio."
90001240-42 = "Se pudéssemos nos encontrar, acho que teríamos uma discussão construtiva."
90001240-43 = "Não foi nesse sentido que eu disse... #nAlém disso, um excêntrico já é o suficiente."
90001240-44 = "O que quer dizer com isso...?"
90001240-45 = "...Não se preocupe."
90001240-46 = "É apenas que, se houvesse mais pessoas como você, minha pressão arterial subiria a níveis perigosos."
90001240-55 = "O que está acontecendo!?"
90001240-56 = "Uma queda de energia... mas parece algo planejado..."
90001240-61 = "...! #nFiquem em alerta."
90001240-62 = "Tem algo aqui..."
90001240-68 = "Apareceram muitos!"
90001240-69 = "A-ahhh...!"
90001240-70 = "[ns] \"Pessoal, mantenham a calma!\""
90001240-71 = "...!"
90001240-72 = "Prioridade máxima à proteção do Sensei!"
90001240-74 = "A-A Tifa-chan... ela iniciou um reconhecimento de força...!"
90001240-75 = "Acho que foi uma boa decisão. #nBem, vamos ver que tipo de carta na manga ela vai revelar..."
90001240-76 = "Se tudo der certo, talvez possamos entender como ela rompeu o campo de força daquela energia proibida naquela época."
90001240-77 = "M-m-mas, e se as instalações desmoronarem, o que faremos...?"
90001240-78 = "Não está preocupada demais? #nTifareth provavelmente não vai fazer nada tão exagerado ainda."
90001240-79 = "Sim. Ela deve recuar após o reconhecimento básico."
90001240-80 = "Bem, não seria ruim se ela reduzisse as forças inimigas também, né~"
