[translation]
90001240-1 = "第24話;希望"
90001240-3 = "[ns] \"ずっと同じ通路が続いてるような……。\""
90001240-4 = "そう感じるのも無理はないわ。構造上、致し方ないの。"
90001240-5 = "でも、あと少しでコントロールルームに着くはずよ。"
90001240-6 = "会長、なんで分かるの？"
90001240-7 = "この建物……何故かミレニアムの貯蔵庫によく似ているのよ。"
90001240-8 = "そうですね。典型的な「ミレニアム式」とでも言いましょうか。"
90001240-9 = "でも、私が知る限り、ミレニアム保有の施設リストにここは存在しないわ。"
90001240-10 = "ふむ……学外からの依頼で、建設だけミレニアムが請負った可能性は？"
90001240-11 = "ええ、私もその可能性が高いと考えているわ。"
90001240-12 = "この施設は――"
90001240-13 = "世界滅亡の危機に瀕したとき、生き残った人類に生存の道を残すべく建てられたとされているわ。"
90001240-14 = "つまり、終末に備えるための貯蔵庫よ。"
90001240-15 = "こうして実際に目にするまで、ただの噂話だと思っていました。"
90001240-16 = "終末を想定して備えるだなんて、とんだ変わり者がいたものですね。"
90001240-17 = "私には、理解できるわ……。"
90001240-18 = "……。"
90001240-19 = "施設を作った理念は、私も理解できます。"
90001240-20 = "ですが、その位置を公にせず、管理はAI任せ。"
90001240-21 = "これでは、いざという時に誰もたどり着けないのでは？"
90001240-22 = "まぁ、そこまで考えていなかった可能性はありますし……。"
90001240-23 = "ただの気まぐれで建てたのかもしれませんが。"
90001240-24 = "もしくは……誰かに見つけてもらう日。#n芽吹きの時を、ただ待っていたのかもしれません。"
90001240-25 = "まるで、種のように。"
90001240-27 = "まるで――"
90001240-28 = "種の――"
90001240-29 = "ように……？"
90001240-30 = "……！！！！"
90001240-31 = "ついにケイも[ruby=いのち]生命[/ruby]を理解してくれるようになったのですね！"
90001240-32 = "い、いえ……そこまでは。#nただ、似ていると思っただけです。"
90001240-33 = "種には、可能性が秘められているのでしょう……？"
90001240-34 = "そうです。#nそうなんです！"
90001240-36 = "[ns] \"ふふっ。\""
90001240-37 = "アリスはともかく、なぜあなたまで笑うんですか……。"
90001240-39 = "……補足するなら「誰もたどり着けない」には語弊があるわ。"
90001240-40 = "少なくとも、私は知っていたもの。"
90001240-41 = "この施設を建てた変わり者は、リオと似ているのかもしれないですね。"
90001240-42 = "もし会えたとしたら、建設的な議論ができそうね。"
90001240-43 = "そういう意味で言ったのではないのですが……。#nそれに変わり者は一人で十分ですから。"
90001240-44 = "それは、どういう……？"
90001240-45 = "……お気になさらず。"
90001240-46 = "これ以上あなたのような人が増えたら、私の血圧が大変なことになってしまうというだけです。"
90001240-55 = "何事ですか！？"
90001240-56 = "停電……にしては狙っていたかのような――"
90001240-61 = "……っ！#n周囲に警戒を。"
90001240-62 = "何か、います……。"
90001240-68 = "たくさん出てきました！"
90001240-69 = "う、うあああ……！"
90001240-70 = "[ns] \"みんな、落ち着いて！\""
90001240-71 = "……！"
90001240-72 = "先生の保護を最優先に！"
90001240-74 = "ティ、ティファちゃんが……威力偵察を決行しました……！"
90001240-75 = "いい判断だと思うよ。#nさて、どんな隠し玉が出てくるやら……。"
90001240-76 = "うまくいけば、あの時どうやって[ruby=エネルギー]禁じられた力[/ruby]の力場を突破したのか分かるかもしれません。"
90001240-77 = "で、でででで、でも、施設が崩れてしまったら、どうします……？"
90001240-78 = "心配しすぎじゃない？#nティファレトだって、まだそこまで派手なことはしないだろうし。"
90001240-79 = "ええ。最低限の偵察だけで引き下がるでしょう。"
90001240-80 = "まあ、相手の戦力を削ってくれても良いんですけどね～"
