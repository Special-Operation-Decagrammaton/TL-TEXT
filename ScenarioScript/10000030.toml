[translation]
10000030-1 = "第3話;陰陽部の電波系少女"
10000030-2 = "さあ善は急げです！行きましょう、先生！"
10000030-3 = "百鬼夜行で何かトラブルが起こった時に相談する相手といえば……"
10000030-4 = "すぐに思い当たるところが、二つあります。"
10000030-5 = "一つは、実質的に百鬼夜行連合学院の生徒会とも言える、「陰陽部」。"
10000030-6 = "そしてもう一つは、「百花繚乱紛争調停委員会」というところ、なのですが……"
10000030-7 = "聞いた話によると今、百花繚乱は全員不在だそうデス！"
10000030-8 = "はい、フィーナの言う通り、そちらは今頼れない状況です。"
10000030-9 = "今の私たちが頼れるとすると陰陽部の方、なのですが……"
10000030-10 = "[s] \"なのですが……？\""
10000030-11 = "うーん、その、何と言いますか……"
10000030-12 = "えぇぃっ！実際会った方が早い！"
10000030-13 = "さあ、行きましょう！先生！"
10000030-14 = "あ、フィーナ。私がいない間、百夜堂の留守番はお願いね？"
10000030-15 = "モチロン！任侠の精神で、守り通してみせマス！"
10000030-16 = "……じゃあ問題。"
10000030-17 = "ハイ！"
10000030-18 = "先生と私がいない間に、魑魅一座が来たとするわ。"
10000030-19 = "やつらが「喉が渇いちゃったんだけど、お水を一杯もらっていい？」って言いながら百夜堂に入ってこようとしたら……どうする？"
10000030-20 = "困った人がいたら助ける！それが任侠デス！"
10000030-21 = "だーかーらっ、それじゃダメなの！追い出しなさい！"
10000030-22 = "はぁ……本当にもう……。"
10000030-23 = "……任せても大丈夫なのよね？"
10000030-24 = "ハイ、委員長！フィーナにお任せクダサイ！"
10000030-26 = "（着いたのは、風流な建物だった）"
10000030-27 = "ここは百鬼夜行連合学院の中でも、かなり重要な場所の一つ……。"
10000030-28 = "この奥に、陰陽部の部室があります。"
10000030-29 = "うぅ……何度来ても胃が痛くなる……。"
10000030-30 = "[s] \"それはどうして？\""
10000030-31 = "陰陽部はかなり腰が重いことで有名で、何かをお願いしてもなかなか動いてくれないんです。"
10000030-32 = "そもそも、そういう実際の対処をするのはほとんど百花繚乱の方で……。"
10000030-33 = "陰陽部はその名の通りにと言いますか、自分たちは百鬼夜行のバランスを保つために存在してると言っているんですが、"
10000030-34 = "その実、何が起きても大抵ニコニコしながら「私たちには権限が無いので～」とか曖昧な態度を取ってばっかりで……。"
10000030-35 = "特にあの部長！"
10000030-36 = "こっちが何かクレームを入れに行っても、いっつも「重要な案件は書面でお願いします」ばっかりだし……"
10000030-37 = "書面じゃ遅いんだってばっ！！！"
10000030-38 = "官僚制！？官僚制なの！？なんでそんなに動きが遅いの！！！それが通る頃には良くも悪くも解決してるってば！！"
10000030-40 = "……ふふっ、でもそれもこれも今日までの話。"
10000030-41 = "そういう態度なら、こっちだって方法を考えるまで。なんせ今こっちには、シャーレの先生がいるんだから。"
10000030-42 = "先生さえいれば、きっとあの陰陽部の部長だって重い腰を上げてすぐに協力せざるを得ないはず。"
10000030-43 = "あのいっつも余裕そうな態度をこちらの思うがままに顎で使って……ふふふっ……"
10000030-44 = "……はっ！？……あーっと……シズコ、お話聞いてくれるか心配～。"
10000030-45 = "[s] \"……そろそろ取り繕わなくてもいいよ？\""
10000030-46 = "と、とにかく！早く中に入りましょう！"
10000030-49 = "ようこそ、先生。待ってた。"
10000030-50 = "チセ……って、あれ？今、「待ってた」って言った？"
10000030-51 = "私たちが来ることを知ってたの？"
10000030-52 = "うん、部長が言ってた。"
10000030-53 = "二人来る"
10000030-54 = "可愛い大人と"
10000030-55 = "タヌキさん"
10000030-56 = "だっ、誰がタヌキよ！？"
10000030-58 = "こほん……それで、相変わらずその「全部知ってます」みたいな態度の部長はどこ？"
10000030-59 = "部長は……。"
10000030-60 = "えっと……。"
10000030-61 = "うーん……。"
10000030-62 = "確か、飼うなら黒猫が良い、って。"
10000030-63 = "ペットの好みは聞いてない！"
10000030-64 = "……もしかして、さっきの「タヌキ」っていうのもペットの話じゃないわよね！？私、先生のペットとかじゃないから！！"
10000030-66 = "はあ、とにかく……今日はあなたと遊ぶためじゃなくて、部長に会いに来たの。"
10000030-67 = "もう一度聞くけど、部長はどこ？"
10000030-68 = "部長……"
10000030-69 = "今日はもう"
10000030-70 = "下校しました"
10000030-71 = "また明日"
10000030-72 = "……え、下校？まだ昼でしょ？どういうこと？"
10000030-73 = "……。"
10000030-74 = "……どうしてだと思う？"
10000030-75 = "さあ……じゃなくて、何であなたが聞くのよ！何もかも意味が分からないんだけど！？"
10000030-76 = "ううっ、よりによってこんな大事な時にいないなんて……。"
10000030-77 = "[s] チセに訪ねてきた理由を説明しようとする。"
10000030-78 = "うん、分かってる。桜花祭を邪魔しようとする騒ぎの件、でしょ？"
10000030-79 = "知ってたの！？"
10000030-80 = "部長は言ってた、助けてあげることはできないけど代わりに、"
10000030-81 = "修行部に行けば何とかなるはず、って。"
10000030-82 = "……修行部？"
10000030-83 = "修行部からも来たの、クレーム。街がうるさいって。それで部長が、"
10000030-84 = "一つでダメなら、二つを合わせればいいんじゃない？……って。"
10000030-85 = "[s] \"同じ悩みを抱えてる部活があるってこと？\""
10000030-86 = "うぅっ、修行部か……。"
10000030-87 = "仕方ない、今度は修行部の方に……。"
10000030-88 = "チセ、もし後で部長が帰ってきたらまた連絡してくれる？"
10000030-89 = "さあ先生、行きましょう！"
10000030-92 = "いってらっしゃ～い。"
10000030-94 = "にしても修行部、修行部かぁ……。"
10000030-95 = "修行部の生徒たちって、結構変わり者でして……。"
10000030-96 = "[s1] \"そうなの？\"\n[s2] \"シズコと同じくらい？\""
10000030-97 = "それはもう……。"
10000030-98 = "え、はぁ！？じゃなくて……嫌ですね先生、何を言ってるんですか～？"
10000030-99 = "変わり者なんかじゃなくてシズコ、百夜堂の可愛い可愛い看板娘ですよっ☆"
10000030-100 = "……とにかく！"
10000030-101 = "修行部は、毎回修行のためと言いながら、色々と良く分からない活動をしてる部活です。"
10000030-102 = "例えば、修行の一環として寝ながらジグソーパズルをやる人とか。"
10000030-103 = "[s] \"……え？\""
10000030-104 = "素敵なレディーになるためと言いながら、何故か街のチンピラたちを退治してる人とか。"
10000030-105 = "[s] \"えぇ……？\""
10000030-106 = "大和撫子としての嗜みとか言って、読心術を使える部員もいるとか。"
10000030-107 = "[s] \"……？？？\""
10000030-108 = "まあ私も噂でしか聞いたことないので、実際のところは直接確認してみないと分からないんですけど。"
10000030-109 = "そんな変わり者たちに、そもそも協力してもらえるのかどうか……。"
10000030-110 = "うーん……いや、悲観的に考えるのはもうやめ！"
10000030-111 = "こういうのは、実際にぶつかってみないと分からないものです！"
10000030-112 = "さあ！早く修行部のところに行きましょう！"
10000030-115 = "けほっ、けほっ……こ、今度は何！？"
10000030-117 = "ふははっ！今度こそ桜花祭を台無しにするため、魑魅一座の参上だ！"
10000030-118 = "今度こそぶっ潰してやるっす！"
10000030-120 = "まーた[ruby=すだまいちざ]魑魅一座[/ruby]！懲りないわね！"
10000030-121 = "もうこうなったら、とことんまで相手してやるんだから！"
