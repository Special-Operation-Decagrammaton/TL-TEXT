[translation]
10000030-1 = "Episódio 3: A garota excêntrica do Departamento de Yin e Yang"
10000030-2 = "Vamos lá, não podemos perder tempo! Vamos, Sensei!"
10000030-3 = "Quando algo dá errado em Hyakkiyako, as pessoas a quem recorremos são..."
10000030-4 = "Existem dois lugares que me vêm à mente imediatamente."
10000030-5 = "Um deles é o 'Departamento de Yin e Yang', que funciona essencialmente como o conselho estudantil da Academia Hyakkiyako."
10000030-6 = "E o outro é um lugar chamado 'Comitê de Mediação de Conflitos Hyakkaryoran', mas..."
10000030-7 = "Pelo que ouvi, todos do Hyakkaryoran estão ausentes agora!"
10000030-8 = "Sim, como Fina disse, não podemos contar com eles no momento."
10000030-9 = "Se formos depender de alguém agora, seria o Departamento de Yin e Yang, mas..."
10000030-10 = "[s] \"Mas...?\""
10000030-11 = "Bem, hum, como posso dizer..."
10000030-12 = "Ah, quer saber! É mais rápido se encontrarmos eles pessoalmente!"
10000030-13 = "Vamos, Sensei!"
10000030-14 = "Ah, Fina. Enquanto eu estiver fora, pode cuidar da Hyakkiyado para mim?"
10000030-15 = "Com certeza! Com o espírito de um cavaleiro, eu protegerei este lugar!"
10000030-16 = "……Então, uma pergunta."
10000030-17 = "Sim!"
10000030-18 = "Suponha que o grupo Chimi apareça enquanto eu e o Sensei estivermos fora."
10000030-19 = "Se eles entrarem na Hyakkiyado dizendo: 'Estamos com sede, pode nos dar um copo d'água?', o que você faria?"
10000030-20 = "Se alguém estiver em apuros, eu ajudo! Esse é o espírito de um cavaleiro!"
10000030-21 = "Eu já disse, isso não vai funcionar! Expulse-os!"
10000030-22 = "Haa... Sério, não dá mais..."
10000030-23 = "...Você tem certeza de que posso deixar isso com você?"
10000030-24 = "Sim, Presidente! Pode deixar com a Phina!"
10000030-26 = "(O lugar onde chegamos era um edifício elegante)"
10000030-27 = "Este é um dos lugares mais importantes dentro da Academia Hyakkiyako..."
10000030-28 = "A sala do Departamento Yin-Yang fica lá no fundo."
10000030-29 = "Ugh... Meu estômago dói toda vez que venho aqui..."
10000030-30 = "[s] \"Por que isso?\""
10000030-31 = "O Departamento Yin-Yang é famoso por ser muito lento para agir; mesmo que peçamos algo, eles dificilmente se movem."
10000030-32 = "Para começar, quem lida com as situações práticas na maior parte do tempo é o Hyakkaryouran..."
10000030-33 = "O Departamento Yin-Yang, como o nome sugere, diz que eles existem para manter o equilíbrio de Hyakkiyako, mas..."
10000030-34 = "Na verdade, não importa o que aconteça, eles sempre ficam sorrindo e dando desculpas vagas como \"nós não temos autoridade para isso...\""
10000030-35 = "Especialmente aquela chefe de departamento!"
10000030-36 = "Mesmo quando vamos lá fazer uma reclamação, ela sempre diz: \"Por favor, envie os assuntos importantes por escrito\"..."
10000030-37 = "Por escrito é tarde demais, droga!!!"
10000030-38 = "Burocracia!? É burocracia!? Por que vocês são tão lentos para agir!!! Quando isso for aprovado, o problema já terá sido resolvido, para o bem ou para o mal!!"
10000030-40 = "...Hehe, mas isso acaba hoje."
10000030-41 = "Se eles vão agir assim, então nós também pensaremos em um jeito. Afinal, agora temos o Sensei do Schale conosco."
10000030-42 = "Com o Sensei aqui, tenho certeza de que até aquela chefe do Departamento Yin-Yang terá que levantar da cadeira e cooperar imediatamente."
10000030-43 = "Aquela atitude sempre tão relaxada... vou fazer com que ela dance conforme a minha música... hehehe..."
10000030-44 = "……Hã!?……Ah, droga... Shizuko, estou preocupada se você vai me ouvir."
10000030-45 = "[s] \"……Não precisa mais fingir, sabia?\""
10000030-46 = "De, de qualquer forma! Vamos entrar logo!"
10000030-49 = "Bem-vindo, Sensei. Eu estava esperando."
10000030-50 = "Chise... espera, o quê? Você disse \"estava esperando\" agora pouco?"
10000030-51 = "Você sabia que nós viríamos?"
10000030-52 = "Sim, a presidente me contou."
10000030-53 = "Que duas pessoas viriam."
10000030-54 = "Um adulto fofo"
10000030-55 = "E um tanuki."
10000030-56 = "Que, quem você está chamando de tanuki!?"
10000030-58 = "Ehem... então, onde está a presidente com aquela atitude de quem \"sabe de tudo\" como sempre?"
10000030-59 = "A presidente está..."
10000030-60 = "Bem..."
10000030-61 = "Hmm..."
10000030-62 = "Se for para ter um animal de estimação, ela disse que prefere um gato preto."
10000030-63 = "Eu não perguntei sobre as preferências de pets dela!"
10000030-64 = "……Não me diga que aquele \"tanuki\" de agora pouco também não era sobre pets!? Eu não sou o pet do Sensei, entendeu!!"
10000030-66 = "Haa, enfim... hoje não viemos aqui para brincar com você, viemos para ver a presidente."
10000030-67 = "Vou perguntar de novo, onde está a presidente?"
10000030-68 = "A presidente..."
10000030-69 = "Ela já"
10000030-70 = "foi embora."
10000030-71 = "Até amanhã."
10000030-72 = "...Hã, foi embora? Ainda é meio-dia, não é? O que isso significa?"
10000030-73 = "..."
10000030-74 = "...Por que você acha?"
10000030-75 = "Não me venha com essa... E por que você está me perguntando?! Não estou entendendo nada do que está acontecendo!"
10000030-76 = "Ugh, logo agora, em um momento tão importante, ela não está aqui..."
10000030-77 = "[s] Tenta explicar para Chise o motivo da visita."
10000030-78 = "Sim, eu sei. Sobre a confusão de quem está tentando atrapalhar o Festival Ouka, certo?"
10000030-79 = "Você já sabia?!"
10000030-80 = "A presidente disse que, embora não possa ajudar diretamente, em vez disso,"
10000030-81 = "se você for ao Clube de Treinamento, deve conseguir resolver."
10000030-82 = "...Clube de Treinamento?"
10000030-83 = "O Clube de Treinamento também veio reclamar. Disseram que a cidade está barulhenta. Então a presidente disse,"
10000030-84 = "Se um não resolve, por que não juntar os dois? ...Foi o que ela disse."
10000030-85 = "[s] \"Quer dizer que existe outro clube com o mesmo problema?\""
10000030-86 = "Ugh, o Clube de Treinamento, é..."
10000030-87 = "Não tem jeito, agora vamos para o Clube de Treinamento..."
10000030-88 = "Chise, se a presidente voltar mais tarde, pode me avisar?"
10000030-89 = "Vamos lá, Sensei, vamos nessa!"
10000030-92 = "Até mais~."
10000030-94 = "Ainda assim, o Clube de Treinamento, hein..."
10000030-95 = "As alunas do Clube de Treinamento são bem excêntricas..."
10000030-96 = "[s1] \"É mesmo?\"\n[s2] \"Tanto quanto a Shizuko?\""
10000030-97 = "Com certeza..."
10000030-98 = "Eh, hã!? Não é isso... Que isso, Sensei, o que você está dizendo~?"
10000030-99 = "Eu não sou excêntrica, Shizuko é a linda e adorável garota-propaganda da Hyakkiyako, sabia!☆"
10000030-100 = "……Enfim!"
10000030-101 = "O Clube de Treinamento é um clube que, sob o pretexto de treinar, faz várias atividades que ninguém entende muito bem."
10000030-102 = "Por exemplo, tem gente que monta quebra-cabeças enquanto dorme como parte do treinamento."
10000030-103 = "[s] \"……Eh?\""
10000030-104 = "Tem gente que, dizendo que é para se tornar uma dama elegante, acaba derrotando valentões da cidade por algum motivo."
10000030-105 = "[s] \"Eh……?\""
10000030-106 = "Dizem até que tem uma integrante que consegue usar leitura mental como parte da etiqueta de uma dama japonesa."
10000030-107 = "[s] \"……？？？\""
10000030-108 = "Bem, eu só ouvi por boatos, então não saberei a verdade até conferirmos pessoalmente."
10000030-109 = "Se é que essas pessoas excêntricas vão mesmo querer nos ajudar..."
10000030-110 = "Hmm... não, chega de pensar de forma pessimista!"
10000030-111 = "Esse tipo de coisa, a gente só descobre se tentar de verdade!"
10000030-112 = "Vamos! Vamos logo até o Clube de Treinamento!"
10000030-115 = "Cof, cof... o-o que é dessa vez!?"
10000030-117 = "Muahaha! A Trupe Chimimoryo chegou para arruinar o Festival Ouka de uma vez por todas!"
10000030-118 = "Desta vez nós vamos acabar com vocês!"
10000030-120 = "De novo a Trupe Chimimoryo!? Vocês não aprendem mesmo!"
10000030-121 = "Já que é assim, eu vou lutar contra vocês até o fim!"
