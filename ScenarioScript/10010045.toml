[translation]
10010045-1 = "Episódio 4: Rumo à Fortaleza da Favela (2)"
10010045-3 = "M-mas o que é isso, droga!"
10010045-5 = "Esquece isso, recuar! Vamos fugir logo!"
10010045-11 = "（Surpresos com o ocorrido, os membros do Grupo do Capacete começaram a fugir um após o outro）"
10010045-13 = "Ahaha, bem feito para vocês!"
10010045-14 = "Yoshimi-chan, essa sua fala soa muito como uma delinquente..."
10010045-15 = "Não tem problema, combina com você."
10010045-16 = "Ahahahaha!! Vão embora e não voltem nunca mais!"
10010045-20 = "Nossa, ela entrou no personagem... Bem, de qualquer forma, conseguimos recuperar o dono da loja e o caminhão. Acho que está tudo resolvido."
10010045-21 = "Sensei, muito obrigada!"
10010045-22 = "[s1] \"De nada, bom trabalho a todos.\"\n[s2] \"Fico feliz que ninguém tenha se ferido gravemente.\""
10010045-23 = "Ah."
10010045-24 = "Ah."
10010045-25 = "Falando nisso..."
10010045-33 = "……？"
10010045-34 = "Err, aconteceu alguma coisa? Ficar me encarando assim..."
10010045-35 = "É a primeira vez que vejo a irmã lutando de verdade. Foi incrível."
10010045-36 = "I-incrível, você disse...!?"
10010045-37 = "Desculpe, não tive a intenção de ofender."
10010045-38 = "Acho que ela quis dizer que você foi 'muito legal'."
10010045-39 = "Ah, é verdade! Aquela parte em que você destruiu o portão principal com a metralhadora foi muito satisfatória!"
10010045-40 = "Na verdade, você foi responsável por uma grande parte do nosso poder de fogo. Parecia até um tanque de guerra sozinha."
10010045-42 = "U-um tanque!? Não, que isso, eu só..."
10010045-43 = "……Ah. Pensando bem, devo aceitar isso como um elogio sincero!?"
10010045-44 = "……Natsu."
10010045-45 = "Sim, desculpe. Foi um elogio, eu garanto."
10010045-46 = "Bem, de qualquer forma... acho que a recompensa deveria ficar com a irmã."
10010045-54 = "Err, isso é..."
10010045-55 = "O \"Miracle 5000\", o último que restou."
10010045-56 = "Claro que nós também queríamos comer, mas parece que a irmã tem lá seus motivos."
10010045-57 = "Depois de ver sua bravura agora há pouco,"
10010045-58 = "acho que todos concordam... o que acham?"
10010045-60 = "Eu apoio!"
10010045-61 = "Conseguimos libertar o dono da loja, então ele poderá fazer mais depois. Não temos pressa."
10010045-62 = "Já aguentamos cinco dias, mais um dia não faz diferença!"
10010045-64 = "P-pessoal..."
10010045-65 = "……Não, não há necessidade disso."
10010045-66 = "……？"
10010045-71 = "Err, quem é você...?"
10010045-72 = "……Afinal, vocês me libertaram!"
10010045-73 = "Nessa situação, eu, como dono da loja, não posso ficar de braços cruzados. Eu estava agoniado por não conseguir fazer nada ultimamente..."
10010045-77 = "Muito bem, vou começar a fazer os bolos agora mesmo!"
10010045-78 = "Não vou limitar a quantidade, vou fazer quantos os ingredientes permitirem! É a festa do \"Miracle 5000\"!"
10010045-87 = "……."
10010045-88 = "……Hehe."
10010045-89 = "Isso sim que é um \"milagre\"..."
