[translation]
1008402-1 = "山の距離感"
1008402-6 = "（週末、気分転換がてら山に来てみると……）"
1008402-12 = "（……登山口にいるコタマを見つけた）"
1008402-13 = "[s] \"……コタマ？\""
1008402-17 = "あ。"
1008402-18 = "せ、先生……？どうしてここに……"
1008402-19 = "ええと、その……"
1008402-25 = " ……良い天気ですね？"
1008402-26 = "[s] \"うん。良い天気だね？\""
1008402-28 = "[ns1] \"まさかこんなところでコタマに会えるとは。\"\n[ns2] \"何かあったの？\""
1008402-31 = "えっと、その……"
1008402-32 = "新年を迎えたことですし、健康的な生活習慣を身につけようと思いまして――"
1008402-33 = "久しぶりに山でも登ろうかなと！"
1008402-34 = "[s] \"えっと……運動するのはいいことだけど……その録音機は？\""
1008402-35 = "ろ、録音機ではありません！"
1008402-36 = "これは、ただ周囲の音を録音する機械です。"
1008402-37 = "[s] \"それを録音機と呼ぶんじゃないかな……\""
1008402-42 = "……やはり先生の目は誤魔化せませんね。"
1008402-43 = "その……カップルの会話を録音しようと思いまして。"
1008402-44 = "[s] \"……カップルの？\""
1008402-48 = "はい。山はデートスポットとして人気なので。#n雑誌にも書いてありましたし。"
1008402-49 = "2人きりの時間が長く、普段は話さないようなことも伝えられるでしょう。"
1008402-50 = "それに、肉体的にも精神的にも疲れるでしょうし……#nそういう時は、いつもより相手に甘えてしまうもの。"
1008402-51 = "なので、ここなら色々な会話を録音できると思ったのですが……"
1008402-52 = "[s] \"他人の会話を盗み聞きするのは良くないよ。\""
1008402-53 = "……先生なら、そう言うだろうと思いました。"
1008402-54 = "ですが、ここまで来て何の成果も得られないというのも……"
1008402-55 = "こうなった以上、先生の声を録音し――"
1008402-56 = "[s] （……宣言しちゃったら、盗み聞きじゃないのでは？）"
1008402-58 = "[ns] \"せっかく山に来たんだし、一緒に登ってみない？\""
1008402-59 = "うーん……あまり気は進まないですが……"
1008402-60 = "たしかに、この辺りではあまり良い会話を録音できなさそうですね。"
1008402-61 = "カップルの会話が盛り上がるのは、もう少し登ったところでしょうか。"
1008402-62 = "それに、運が良ければ先生の乱れた呼吸音や声を録音できる可能性も……"
1008402-63 = "[s] \"そんな声を録音してどうするの！？\""
1008402-64 = "ふふ、それは内緒です。"
1008402-68 = "では、一緒に登りましょうか？"
1008402-74 = "（30分ほど山道を登り……）"
1008402-79 = "はぁ、はぁ……おかしい、ですね……"
1008402-80 = "この山は、初心者にも登りやすいと聞いていたのですが……"
1008402-81 = "まさか山小屋へたどり着く前に、体力が尽きてしまうなんて……"
1008402-82 = "……ガイドを訂正する必要があります。"
1008402-83 = "[s] \"そ、それはコタマの体力が無いだけでは……？\""
1008402-84 = "そんなことは……"
1008402-85 = "これでも体力は人並みだと自負しているのですが……"
1008402-86 = "[s] \"このまま登るのはつらそうだね。\""
1008402-90 = "[ns] \"ゆっくり歩こう、手を借りるよ？\""
1008402-94 = "はぁ、はぁ……では、お願いします……"
1008402-101 = "……先生の手、思っていたよりも温かいですね。"
1008402-102 = "なんだか……良い香りもします。"
1008402-103 = "[s] \"そうなの？自分ではあまり分からないけど……\""
1008402-104 = "はい。それに先生をこんな近くで見るのは初めてなので、ちょっと不思議な感覚です。"
1008402-105 = "いつもは遠くから先生の声に集中していたので、それ以外の要素を気にしたことなんてありませんでした。"
1008402-106 = "ですが、このような気持ちになれるだなん――"
1008402-112 = "2人きりの時間が長く、普段は話さないようなことも伝えられるでしょう。"
1008402-113 = "それに、肉体的にも精神的にも疲れるでしょうし……#nそういう時は、いつもより相手に甘えてしまうもの。"
1008402-118 = "………！"
1008402-119 = "[s] \"どうしたの？\""
1008402-120 = "まさか、自分が同じ轍を踏むだなんて……"
1008402-121 = "恥ずかしい言葉を口にしてしまいました……"
1008402-125 = "い、今の話は聞かなかったことにしてください！"
1008402-132 = "（そう言い残したコタマは、登るときの2倍の速さで視界から消えていった……）"
