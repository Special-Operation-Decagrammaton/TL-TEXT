[translation]
3002-1 = "缶詰の残影（２）"
3002-5 = "今の音なに！？"
3002-6 = "間違いありません、ミユの声です。"
3002-10 = "もしかして、襲撃されたんじゃ……？"
3002-15 = "ミユ、大丈夫か！何があった！"
3002-16 = "あ、あそこ…… 食糧倉庫に……"
3002-17 = "食糧倉庫？襲撃されたのか？"
3002-18 = "そ、そうじゃなくて…… あの缶詰……"
3002-19 = "……缶詰？あの海鮮混ぜソースがどうかしたのか？"
3002-20 = "あの缶詰が……自分で動いたの……"
3002-26 = "……寝ぼけてるのか？"
3002-27 = "事件かと思ったら、缶詰が自分で動いた、ねぇ……"
3002-28 = "最近、疲れているのではありませんか？"
3002-30 = "ほ、本当なの……！"
3002-31 = "あの缶詰が自分でガタンガタンって動いたの……本当に……"
3002-32 = "どれ……"
3002-38 = "……動かないぞ？"
3002-39 = "……やはり、疲れが溜まっているのですね。"
3002-41 = "あれ……？さっきまであんなに激しく動いていたのに……。"
3002-42 = "幻覚でも見たのか？よっぽど疲れてるんだな……。"
3002-44 = "残りの警戒勤務は私に任せて、ミユはもう休め。"
3002-45 = "でも……"
3002-47 = "気にしない、気にしない。"
3002-48 = "サキは毎日早朝に目が覚めるみたいだし、大丈夫だよ。"
3002-49 = "うるさい。"
3002-50 = "……それでは、残りの警戒勤務をお願いしますね、サキ。"
3002-54 = "他の隊員はテントに戻って身体を休めましょう。"
3002-56 = "……ありがとう、サキちゃん。じゃあ、よろしくね。"
3002-68 = "……ガタン。"
3002-75 = "（……翌朝）"
3002-76 = "ふふ、やはり[ruby=ふしんばん]不寝番[/ruby]の後の朝ごはんは格別だな。"
3002-77 = "特に今朝は、昨日手に入れた戦闘食糧を選べる楽しみがあって良いな。"
3002-82 = "早朝の警戒勤務お疲れ様でした、サキ。"
3002-83 = "よろしければ、先にどうぞ。"
3002-84 = "それじゃあ私は…… このチキンヌードルスープ缶にしようかな。"
3002-85 = "私は赤飯とサバの味噌漬け！"
3002-86 = "それでは私は、ヨークシャープディングと野菜オムレツにします。"
3002-87 = "わ、私はオートミールとチョコレートクッキー……"
3002-88 = "みんな被らなかったな。これで残るメニューは……"
3002-96 = "この海鮮混ぜソース缶、誰も食べないのか？"
3002-97 = "ひっ、ひいぃ……"
3002-98 = "ミユは、昨夜のことをまだ気にしているみたいだし……"
3002-99 = "モエ、食べるか？臭いはするけど、白米と一緒に飲み込めば味はまぁ悪くない。"
3002-100 = "んー、缶詰めの海鮮はちょっとなぁ……"
3002-101 = "サバの味噌漬けだって海鮮じゃないか。"
3002-102 = "……ミヤコはどうだ？"
3002-103 = "私も、今日は少し……"
3002-104 = "そうか……まぁ、これはまた今度食べるとして。"
3002-109 = "では、朝食にしよう。"
3002-112 = "いただきます！"
3002-119 = "（その後、海鮮混ぜソースの缶詰は忘れられたまま放置され……）"
3002-126 = "（……やがて、賞味期限が訪れてしまった）"
