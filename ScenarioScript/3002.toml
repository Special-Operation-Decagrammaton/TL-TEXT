[translation]
3002-1 = "Resquícios de Latas (2)"
3002-5 = "Que barulho foi esse!?"
3002-6 = "Sem dúvida, é a voz da Miyu."
3002-10 = "Será que... fomos atacados?"
3002-15 = "Miyu, você está bem?! O que aconteceu?"
3002-16 = "A-ali... no depósito de mantimentos..."
3002-17 = "Depósito de mantimentos? Fomos atacados?"
3002-18 = "N-não é isso... aquela lata..."
3002-19 = "...Uma lata? O que tem aquele molho de frutos do mar misturado?"
3002-20 = "Aquela lata... ela se moveu sozinha..."
3002-26 = "...Você está sonhando acordada?"
3002-27 = "Pensei que fosse um incidente, mas era uma lata se movendo sozinha, é..."
3002-28 = "Você não está cansada demais ultimamente?"
3002-30 = "É-é verdade...!"
3002-31 = "Aquela lata se moveu sozinha, fazendo barulho de metal... de verdade..."
3002-32 = "Deixa eu ver..."
3002-38 = "...Não está se movendo."
3002-39 = "...Como eu pensei, você está acumulando muito cansaço."
3002-41 = "Ué...? Até agora há pouco ela estava se movendo tão violentamente..."
3002-42 = "Será que você teve uma alucinação? Você deve estar muito cansada mesmo..."
3002-44 = "Deixe o resto da patrulha comigo, Miyu, vá descansar."
3002-45 = "Mas..."
3002-47 = "Não se preocupe, não se preocupe."
3002-48 = "A Saki parece acordar de madrugada todos os dias, então está tudo bem."
3002-49 = "Cala a boca."
3002-50 = "...Então, por favor, cuide do resto da patrulha, Saki."
3002-54 = "As outras integrantes devem voltar para a barraca e descansar."
3002-56 = "...Obrigada, Saki-chan. Então, conto com você."
3002-68 = "...Clang."
3002-75 = "(...Na manhã seguinte)"
3002-76 = "Hehe, o café da manhã depois de uma vigília é realmente especial."
3002-77 = "Especialmente esta manhã, é bom ter o prazer de escolher entre as rações que conseguimos ontem."
3002-82 = "Obrigada pelo turno de patrulha de madrugada, Saki."
3002-83 = "Se não se importar, pode escolher primeiro."
3002-84 = "Então eu vou... escolher esta lata de sopa de macarrão com frango."
3002-85 = "Eu vou de arroz vermelho e cavala em conserva de missô!"
3002-86 = "Então eu vou escolher o pudim de Yorkshire e o omelete de vegetais."
3002-87 = "E-eu vou de aveia e biscoitos de chocolate..."
3002-88 = "Ninguém escolheu o mesmo. Então, o que sobrou no menu é..."
3002-96 = "Ninguém vai comer essa lata de molho de frutos do mar misturado?"
3002-97 = "Hii, socorro..."
3002-98 = "A Miyu ainda parece estar preocupada com o que aconteceu ontem à noite..."
3002-99 = "Moe, você vai comer? Tem um cheiro forte, mas se engolir com arroz branco, o gosto não é tão ruim."
3002-100 = "Hmm, frutos do mar em lata é meio complicado..."
3002-101 = "Mas a cavala no missô também é fruto do mar, não é?"
3002-102 = "...Miyako, e você?"
3002-103 = "Eu também, hoje estou um pouco..."
3002-104 = "Entendi... bem, vou deixar para comer isso em outra ocasião."
3002-109 = "Então, vamos tomar o café da manhã."
3002-112 = "Itadakimasu!"
3002-119 = "（Depois disso, a lata de molho de frutos do mar misturados foi esquecida e deixada de lado...）"
3002-126 = "（...e, com o tempo, o prazo de validade acabou chegando ao fim）"
