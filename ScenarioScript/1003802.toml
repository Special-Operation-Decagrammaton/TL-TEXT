[translation]
1003802-1 = "SRT、突入します！"
1003802-2 = "シャーレオフィス"
1003802-3 = "（平和なシャーレの、とある午後のひと時）"
1003802-7 = "爆薬の設置完了、起爆準備。"
1003802-8 = "３……"
1003802-9 = "２……"
1003802-10 = "１……"
1003802-11 = "(ドカーーーンッ！)"
1003802-14 = "SRTです！下がってください！"
1003802-18 = "……クリア、制圧完了ですね。"
1003802-19 = "[s] \"……ミヤコ？\""
1003802-20 = "……先生？どうしてここに……？"
1003802-21 = "[s1]  \"それを聞きたいのは私の方かな……。\"\n[s2] \"ここはシャーレのオフィスだからです……。\""
1003802-22 = "悪の犯罪者が巣食う場所ではなく、シャーレのオフィス……？"
1003802-23 = "悪の犯罪者が巣食う場所ではなく、シャーレのオフィス……？"
1003802-26 = "ああ、なるほど……"
1003802-27 = "だからあんな噂が……。"
1003802-28 = "[s] \"「あんな噂」……？\""
1003802-29 = "怪しげな大人が女子生徒たちを連れて、とある建物に出入りしているという噂です。気にかかって、RABBIT小隊で調査をしていたのですが……。"
1003802-30 = "なるほど。怪しげな大人とは、先生のことでしたか。"
1003802-31 = "マルチ商法や誘拐犯罪などではなかったようで、安心しました。"
1003802-32 = "[s] \"誤解が解けたら、もう片付けをしても良いかな……？\""
1003802-33 = "いいえ、まだ任務は終わってません。"
1003802-34 = "なにせ私たちはSRT。始めたからには徹底的に、何か怪しい物品などが無いかについても確認しておかなければなりません。"
1003802-35 = "誰かの言葉を信じて撤退し、それによって作戦が破綻したという過去のケースは数えきれませんから。"
1003802-36 = "ではまず、ベッドの下と本棚の中を重点的に捜索するとしましょう。"
1003802-37 = "[s] \"そ、それはダメ……！\""
1003802-38 = "……何か問題でもあるのですか？"
1003802-39 = "先生は他の生徒の模範であると以前お聞きしました。であれば、怪しい物なんてお持ちではないですよね？"
1003802-40 = "もちろん、お部屋を捜索しても問題ありませんよね？"
1003802-41 = "[s] \"それは、えっと……\""
1003802-49 = "あ、ベッドの下に何か怪しげな本が……"
1003802-50 = "『みんなと簡単に仲良くなれる101のモモトーク必勝法』……？"
1003802-51 = "……先生、これは教育指導に必要なものですか？"
1003802-52 = "[s3] \"も、もちろん……！\"\n[s4] \"生徒と仲良くなることは大事だから……！\""
1003802-53 = "……。"
1003802-54 = "……。"
1003802-55 = "先生がそう仰るなら、とりあえず目をつぶりますが……"
1003802-60 = "あれ？本棚の奥の変な空間に、また本が……？"
1003802-61 = "『モテるためのファッションコーディネートブック』……"
1003802-62 = "[s] \"……。\""
1003802-67 = "……一旦、捜索完了です。"
1003802-68 = "幸いにも、違法な物や犯罪の証拠は無いようですが……"
1003802-69 = "「怪しい大人がいる」という話が本当だったことは分かりました。"
1003802-71 = "（その後、しばらくミヤコから冷たい目線を浴びるようになってしまった……)"
