[translation]
2001503-1 = "Eu quero me tornar uma dama elegante!"
2001503-2 = "（Chamado por Kaede, você visita a sala do Clube de Treinamento）"
2001503-3 = "Ah, Sensei!"
2001503-4 = "[s] \"Vim ouvir sobre a 'grande descoberta do século'.\""
2001503-5 = "Bem, primeiro de tudo, pode não parecer, mas eu tenho treinado todos os dias para me tornar uma \"dama elegante\", sabe?"
2001503-6 = "Outro dia, eu até comi todo o curry que tinha pimentão picado sem deixar nada!"
2001503-7 = "[s] \"Isso é louvável!\""
2001503-8 = "Hehehe! Então, eu fiquei pensando se não havia mais alguma coisa que eu pudesse fazer."
2001503-9 = "De repente, eu pesquisei na internet."
2001503-10 = "[s1] \"Entendo.\"\n[s2] \"Uma garota moderna, hein.\""
2001503-11 = "Não precisa elogiar tanto~! Mas enfim, eu pesquisei! Rapidinho!"
2001503-12 = "Não precisa elogiar tanto~! Mas enfim, eu pesquisei! Rapidinho!"
2001503-13 = "Aí dizia que \"uma dama elegante é aquela que mantém a calma e a compostura em qualquer situação\"!"
2001503-14 = "[s] \"Entendo...?\""
2001503-15 = "Mas, sobre isso, eu já tenho confiança!"
2001503-16 = "Eu não entro em pânico em nenhuma situação, afinal, eu sou o mascote do Clube de Treinamento!"
2001503-17 = "Foi aí que eu percebi, será que eu... sem perceber...!?"
2001503-18 = "[s] \"Entendo, essa é a grande descoberta do século...\""
2001503-19 = "Isso mesmo, talvez eu já seja uma \"dama elegante\"!!"
2001503-20 = "[s] \"Sinto que o raciocínio não está totalmente errado.\""
2001503-21 = "Mas, no fim das contas, eu não consigo provar isso sozinha, né?"
2001503-22 = "É por isso que eu chamei o Sensei hoje!"
2001503-23 = "Sendo assim, Sensei, tente me deixar em pânico! Vou provar que não entro em pânico em nenhuma situação!"
2001503-24 = "Vamos lá, é um duelo entre você e eu!"
2001503-25 = "[s3] \"Um duelo...?\"\n[s4] \"Bem, de qualquer forma, entendido.\""
2001503-26 = "Beleza, então vamos começar!"
2001503-27 = "Beleza, então vamos começar!"
2001503-29 = "（Assim, começou o duelo (?) para tentar deixar Kaede em pânico）"
2001503-31 = "Certo, pode vir de onde quiser!"
2001503-32 = "[s] \"Na verdade, eu trouxe um bolo de morango de presente hoje.\""
2001503-33 = "Sé-sério mesmo!?"
2001503-34 = "[s] \"Posso ficar com o morango que está em cima do bolo?\""
2001503-35 = "Guh, o-o morango...! O morango, que não é exagero dizer que é a parte mais importante do bolo de morango...!"
2001503-36 = "[s5] \"É brincadeira, vou deixar o bolo aqui.\"\n[s6] \"Será que você acabou de entrar em pânico...?\""
2001503-37 = "……Hã!? N-não, não é isso! Isso não conta, ou melhor, é que..."
2001503-38 = "……Hã!? N-não, não é isso! Isso não conta, ou melhor, é que..."
2001503-39 = "I-isso! Eu só estava preocupada se o Sensei não passaria mal por comer só o morango!"
2001503-40 = "Eu n-não estou nem um pouco em pânico!"
2001503-41 = "Vamos, próximo!"
2001503-43 = "（Depois disso, a intensa batalha psicológica (?) com Kaede continuou）"
2001503-45 = "[ns] \"Kaede, sobre o pudim que sobrou na geladeira.\""
2001503-46 = "Hã, você está falando do \"Pudim de Caramelo Doce\"!?"
2001503-47 = "N-não me diga que você vai...!?"
2001503-48 = "Mas, se o Sensei insiste tanto em comer, guuuuh...!!"
2001503-49 = "[s] \"Não, é que...\""
2001503-51 = "[ns] \"Kaede, essa caixa cheia de tesouros é sua?\""
2001503-52 = "Ahhh!! Sensei, tome cuidado com isso! Tem coisas muito importantes aí dentro!"
2001503-53 = "Tem até aquela pedra lisa e bonita que encontrei perto do Rio Lesser outro dia!"
2001503-54 = "Ah, já que estamos aqui, quer ver? É incrível, é algo que você nunca viu antes—"
2001503-64 = "[ns] \"……E assim, depois de várias tentativas.\""
2001503-65 = "Fu, fufu... Sensei, você é incrível, em tantos sentidos..."
2001503-66 = "Por pouco eu não entrei em pânico também! Bem, por um triz, mas não entrei em pânico!"
2001503-67 = "[s] \"E-entendi...\""
2001503-68 = "De qualquer forma, com isso, \"uma dama elegante nunca entra em pânico\"..."
2001503-69 = "Não seria exagero dizer que finalmente ficou provado que isso também se aplica a mim...!"
2001503-70 = "Espera, ahhh!?"
2001503-71 = "[s] \"O que houve?\""
2001503-72 = "Eu esqueci que hoje tem a transmissão ao vivo especial da série \"Kamen Driver\"!!"
2001503-73 = "Onde está o controle remoto... Achei!"
2001503-74 = "Atenção a todos que estão na frente da tela!"
2001503-75 = "\"Enquanto houver estradas no mundo, o Kamen Driver continuará dirigindo!\""
2001503-76 = "Comemorando seu 15º aniversário este ano, \"Kamen Driver\" finalmente começa uma nova série! Ao mesmo tempo, um show de heróis também está planejado! Não percam a chance de conhecer o \"Kamen Driver\" pessoalmente!"
2001503-80 = "!!"
2001503-81 = "Ugh..."
2001503-82 = "[s] \"...Kaede?\""
2001503-83 = "Uwaaaaaah!!??"
2001503-84 = "Se-Sensei! É um show de heróis do \"Kamen Driver\"! Dizem que dá para conhecer o Kamen Driver pessoalmente!!"
2001503-85 = "T-temos que reservar logo!?"
2001503-86 = "Espera, ahhh!?"
2001503-87 = "Sensei, o site de reservas não carrega de jeito nenhum! O que eu faço!?"
2001503-88 = "[s] \"Bem, pode me emprestar um segundo?\""
2001503-89 = "Obrigada, Sensei! Por favor! Eu te amo!!"
2001503-96 = "[ns] \"O caminho pode ser longo...\""
2001503-97 = "...?"
