[translation]
2001503-1 = "素敵なレディーになりたい！"
2001503-2 = "（カエデに呼ばれて、修行部の部室を訪れた）"
2001503-3 = "あっ、先生！"
2001503-4 = "[s] \"「世紀の大発見」を聞きに来たよ。\""
2001503-5 = "えっと、まずはね、私こう見えても「素敵なレディー」になるために、毎日鍛錬を重ねてるでしょ？"
2001503-6 = "この前なんか、刻んだピーマンが入ったカレーを残さず食べたんだから！"
2001503-7 = "[s] \"それは偉い！\""
2001503-8 = "えへへっ！それでね、他にも何かできることはないかなって思って。"
2001503-9 = "ふとインターネットで検索してみたの。"
2001503-10 = "[s1] \"なるほど。\"\n[s2] \"現代っ子だ。\""
2001503-11 = "そんなに褒めなくても～。まあとにかく、検索をしたの！ズババっと！"
2001503-12 = "そんなに褒めなくても～。まあとにかく、検索をしたの！ズババっと！"
2001503-13 = "そしたら「素敵なレディーとは、どんな状況でも慌てずに余裕を持っているもの」なんだって！"
2001503-14 = "[s] \"なるほど……？\""
2001503-15 = "でも私その辺については、もう既に自信があるんだ！"
2001503-16 = "どんな状況になっても慌てないよ、なんたって修行部のマスコットだからね！"
2001503-17 = "それで気づいたの、もしかして私……いつの間に……！？"
2001503-18 = "[s] \"なるほど、それが世紀の大発見……。\""
2001503-19 = "そう、私はもう「素敵なレディー」だったのかもしれない！！"
2001503-20 = "[s] \"筋は通ってなくもない、気がする。\""
2001503-21 = "でもやっぱり、それを私だけじゃ証明できないでしょ？"
2001503-22 = "だからこそ、今日は先生を呼んだの！"
2001503-23 = "というわけで先生、私を慌てさせてみて！どんな状況でも慌てないってこと、証明してみせるんだから！"
2001503-24 = "さあ、先生と私の一対一の勝負だよ！"
2001503-25 = "[s3] \"勝負……？\"\n[s4] \"まあとにかく、了解。\""
2001503-26 = "よし、じゃあスタート！"
2001503-27 = "よし、じゃあスタート！"
2001503-29 = "（そうして、カエデを慌てさせる勝負（？）が始まった）"
2001503-31 = "よし、どっからでもかかってきて良いよ！"
2001503-32 = "[s] \"今日実は、ショートケーキのお土産を持ってきたんだけど。\""
2001503-33 = "ほ、ほんとに！？"
2001503-34 = "[s] \"ケーキの上のイチゴ、私が貰っても良い？\""
2001503-35 = "ぐっ、い、イチゴを……！ショートケーキで一番大事な部分と言っても過言じゃないイチゴを……！？"
2001503-36 = "[s5] \"冗談だよ、ケーキはここに置いておくね。\"\n[s6] \"もしかして今、慌ててたような……？\""
2001503-37 = "……はっ！？ち、違う違う！今のはノーカンっていうか、その……"
2001503-38 = "……はっ！？ち、違う違う！今のはノーカンっていうか、その……"
2001503-39 = "そ、そう！先生がイチゴばっかり食べたら体調を崩すんじゃないかなって、心配しただけ！"
2001503-40 = "ぜ、全然あわ、慌ててたりはしないから！"
2001503-41 = "さあ、次々！"
2001503-43 = "（その後もカエデとの、火花を散らす熾烈な心理戦（？）は続いた）"
2001503-45 = "[ns] \"カエデ、冷蔵庫に残ってるプリンなんだけど。\""
2001503-46 = "え、「スイートキャラメルプリン」の話！？"
2001503-47 = "ま、まさかそれを……！？"
2001503-48 = "でも、先生がどうしても食べたいって言うなら、ぐうぅっ……！！"
2001503-49 = "[s] \"いや、えっと……。\""
2001503-51 = "[ns] \"カエデ、この宝物がたくさん入ってる箱ってカエデの物？\""
2001503-52 = "ああっ！！先生、それは気を付けて扱ってね！すっごく大事なものが入ってるから！"
2001503-53 = "この間レッサー川沿いで見つけた、つるつるした綺麗な石も入ってるから！"
2001503-54 = "あ、せっかくだし見てみる？すっごいよー、もう今まで見たことないような――"
2001503-64 = "[ns] \"……というわけで、色々やってきたけれど。\""
2001503-65 = "ふ、ふふっ……先生はすごいね、色々と……。"
2001503-66 = "危うくこの私も、慌てるところだったよ！まあ、ギリギリのところで慌ててないけどね！"
2001503-67 = "[s] \"そ、そっか……。\""
2001503-68 = "とにかくこれで、「素敵なレディーはいつも慌てないもの」……"
2001503-69 = "それが私にも適用されてることが、ついに実証されたと言っても過言じゃないかも……！"
2001503-70 = "ってあぁっ！？"
2001503-71 = "[s] \"どうしたの？\""
2001503-72 = "今日「仮面ドライバー」シリーズの特別生放送があるの、忘れてた！！"
2001503-73 = "あれ、リモコンは……あった！"
2001503-74 = "画面の前にいるみんなへ、お知らせだ！"
2001503-75 = "「世の中に道路がある限り、仮面ドライバーは運転し続ける！」"
2001503-76 = "今年で15周年を迎える「仮面ドライバー」、遂に新シリーズ開始！同時に、ヒーローショーも開催予定だ！実際に「仮面ドライバー」と会えるチャンス、お見逃しなく！"
2001503-80 = "っ！！"
2001503-81 = "う……"
2001503-82 = "[s] \"……カエデ？\""
2001503-83 = "うわああああっ！！？！？"
2001503-84 = "せ、先生！「仮面ドライバー」のヒーローショーだって！仮面ドライバーに直接会えるんだって！！"
2001503-85 = "は、早く予約しないと！？"
2001503-86 = "ってああぁっ！？"
2001503-87 = "先生、予約サイトが全然繋がらない！どうしよう！？"
2001503-88 = "[s] \"えっと、ちょっと貸してくれる？\""
2001503-89 = "ありがとう先生！お願い！好き！！"
2001503-96 = "[ns] \"道は遠いかもしれないな……。\""
2001503-97 = "……？"
