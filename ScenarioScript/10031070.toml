[translation]
10031070-1 = "Episódio 7: O Dia da Festa"
10031070-2 = "（Superando vários problemas, o dia da festa finalmente chegou）"
10031070-4 = "Academia Gehenna - Local da Festa"
10031070-7 = "[ns] \"Faltam 3 horas para a festa começar, hein...\""
10031070-22 = "Falando nisso, você ouviu aquele boato?"
10031070-23 = "Ah, você quer dizer aquele que estava em um anúncio enorme?"
10031070-24 = "Eu também ouvi! É a maior atração da festa desta vez, né!"
10031070-25 = "“A apresentação de piano de abertura da Presidente do Comitê Disciplinar!”"
10031070-26 = "Poder ouvir a Hina tocar é algo que estou ansiosa para ver~"
10031070-27 = "Mas o Pandemonium e o Comitê Disciplinar não se davam mal? É estranho que a Presidente do Comitê Disciplinar vá tocar em uma festa organizada pelo Pandemonium."
10031070-28 = "Eu só ouvi dizer, mas parece que a Presidente do Pandemonium, com seu coração vasto como o oceano, a convidou para melhorar a relação entre eles."
10031070-30 = "[ns] \"Makoto, espalhando boatos assim casualmente...\""
10031070-31 = "......Haa, isso é realmente deprimente."
10031070-36 = "Enquanto estávamos ocupadas com o treinamento e lidando com a tirania do Pandemonium, eles espalharam notícias tendenciosas..."
10031070-37 = "Aquela guaxinim não ouve o que temos a dizer quando coloca algo na cabeça..."
10031070-38 = "......Haa. É tarde demais para dizer isso, mas se a Presidente tivesse recusado categoricamente..."
10031070-39 = "[s] \"Ako, você está bem?\""
10031070-40 = "Ah, Sensei... bom trabalho. Você chegou cedo."
10031070-41 = "Honestamente, eu gostaria de reclamar uma ou duas vezes sobre o fato de você estar colaborando com o Pandemonium, mas..."
10031070-42 = "[s1] \"Bem, é um pedido de uma aluna, afinal.\"\n[s2] \"E não parecia que eles estavam planejando algo na festa.\""
10031070-45 = "Então, como somos todos alunos, colaborar é natural... é isso?"
10031070-46 = "......Bem, considerando a sua posição, Sensei, eu consigo entender."
10031070-47 = "Por causa disso, o Comitê Disciplinar acabou saindo no prejuízo, mas..."
10031070-48 = "[s] \"É porque eu confio na força do Comitê Disciplinar.\""
10031070-49 = "......Haa. Fico feliz com a confiança, mas é um problema ter que lidar com essas encrencas."
10031070-50 = "E então, o que achou? Qual a sua impressão de lidar diretamente com o Pandemonium?"
10031070-51 = "Lidar com aquele grupo absurdo... você conseguiu entender um pouco como nos sentimos?"
10031070-52 = "[s] \"B-bem... são todas alunas bem únicas, não é?\""
10031070-53 = "Únicas, é... essa é uma forma gentil de colocar as coisas."
10031070-54 = "[s] \"A-aliás, Ako, esse traje...\""
10031070-55 = "Ah, isso?"
10031070-56 = "Não que eu estivesse animada com isso, mas..."
10031070-57 = "Para dar suporte à Presidente, preciso estar vestida de acordo com a ocasião."
10031070-58 = "É isso mesmo... como uma espiã infiltrada na festa, eu diria."
10031070-59 = "Sim, esse é o conceito."
10031070-60 = "[s] \"Hum, combina muito com você.\""
10031070-61 = "......O quê."
10031070-62 = "N-não entenda mal. Isso é realmente parte do meu trabalho..."
10031070-63 = "......Por que estou entrando em pânico?"
10031070-64 = "É-é porque o Sensei diz coisas estranhas."
10031070-65 = "[s] \"Eh!? A culpa é minha!?\""
10031070-66 = "......Fufu. Mas, já que você se deu ao trabalho de elogiar, vou aceitar de bom grado."
10031070-67 = "De qualquer forma... não podemos baixar a guarda nesta festa."
10031070-68 = "Por precaução, posicionei as unidades do Comitê Disciplinar para que possamos responder rapidamente a qualquer situação."
10031070-83 = "Por que ainda sinto essa inquietação, mesmo com tanta vigilância?"
10031070-84 = "......Uma festa organizada pelo Pandemonium e com a participação do Comitê Disciplinar. A menos que alguém seja muito imprudente, não deveria haver problemas... eu acho."
10031070-85 = "Será que o fato de ser organizado pelo Pandemonium é o que me incomoda?"
10031070-86 = "Realmente, não dá para baixar a guarda até o fim."
10031070-87 = "[s3] \"Mas não vai ficar tudo bem? Já que chegamos até aqui...\"\n[s4] \"Não importa o que aconteça, o Comitê Disciplinar vai dar um jeito, não vai?\""
10031070-90 = "Hum, talvez, mas..."
10031070-91 = "[s] \"Falando nisso, Ako, onde está a Hina?\""
10031070-92 = "Ah, sobre isso... parece que a Presidente tem alguns assuntos para tratar..."
10031070-93 = "Ela disse que vai se atrasar um pouco."
10031070-94 = "Kukuku. Que bom que veio, Sensei [USERNAME].#nE você também, Administradora."
10031070-105 = "Olá~! Sensei! Ako-senpai~!"
10031070-107 = "Hum... são vocês."
10031070-111 = "[ns] \"Olá, as duas estão muito bem vestidas.\""
10031070-113 = "Kiki! Ah, que bom que notou!#nPara o dia de hoje, encomendei este vestido que faz jus à minha dignidade!"
10031070-114 = "O vestido da Ibuki foi a Makoto-senpai que escolheu~#nEi, Sensei, estou bonita?"
10031070-115 = "[s] \"A Ibuki e o vestido, tudo está lindo!\""
10031070-116 = "Sério? Obrigada, Sensei!"
10031070-117 = "Kukuku... é isso mesmo.#nO charme da Ibuki, combinado com o vestido, está 150 vezes maior que o normal."
10031070-118 = "Tome cuidado, Ako Amau.#nNão me responsabilizo se você desmaiar de tanta fofura."
10031070-120 = "...Ah, sim.#nDeixando você de lado, é verdade que a Ibuki-chan está uma gracinha."
10031070-121 = "Uau! Obrigada, Ako-senpai!"
10031070-122 = "Eu apenas disse o que penso... fufu."
10031070-123 = "Kikiki! Bem, a fofura da Ibuki é óbvia, mas..."
10031070-124 = "Hina Sorasaki... não vejo a Presidente do Comitê Disciplinar por aqui."
10031070-125 = "I-Isso é..."
10031070-126 = "Faltam apenas duas horas para a apresentação de abertura."
10031070-127 = "É estranho que ela não tenha aparecido até agora..."
10031070-128 = "Kiki.#nA Presidente do Comitê Disciplinar não teria fugido por medo, teria?"
10031070-129 = "...O que você disse?"
10031070-130 = "Se não for isso, não é estranho ela não ter aparecido até agora?"
10031070-131 = "Normalmente, ela já deveria ter terminado o ensaio e estar no camarim, não é?"
10031070-132 = "I-Isso pode até ser verdade, mas..."
10031070-133 = "A Presidente jamais fugiria!#nEla é a Presidente do Comitê Disciplinar, afinal!"
10031070-134 = "Kiki. Você continua com a língua afiada, Administradora Ako."
10031070-135 = "Por mais que alguém tenha senso de responsabilidade, sempre há dias em que se quer fugir."
10031070-136 = "Se ela descobriu que, por mais que se esforce, há coisas que ela não consegue fazer...#nTalvez até aquela Presidente do Comitê Disciplinar acabe fugindo, não é?"
10031070-140 = "[ns] \"Coisas que ela não consegue fazer...?\""
10031070-141 = "Kikiki! Que bom que perguntou!"
10031070-142 = "Os espiões do Pandemonium são extremamente competentes!#nA ponto de o Comitê Disciplinar não ser páreo para nós!"
10031070-143 = "Através desses espiões, obtive informações ultrassecretas sobre o Comitê Disciplinar."
10031070-144 = "...Desde quando você enviou espiões assim!?"
10031070-145 = "Hum, por que se surpreender agora?#nIsso é algo comum em Gehenna, não é?"
10031070-146 = "Segundo as informações, embora a Presidente do Comitê Disciplinar pareça perfeita à primeira vista..."
10031070-147 = "Na verdade, descobrimos que ela também tem suas fraquezas."
10031070-148 = "Uma delas é... natação!"
10031070-149 = "!?"
10031070-150 = "E não é só isso! Parece que ela é péssima em instrumentos musicais, incluindo piano!"
10031070-151 = "N-Não me diga que, sabendo disso, você..."
10031070-152 = "Exatamente!#nNa verdade, foi justamente por saber dessa fraqueza que eu a forcei a tocar!"
10031070-153 = "...Por quê?"
10031070-154 = "Você quer dizer que, se a apresentação falhar, a festa que preparamos com tanto esforço pode ir por água abaixo?"
10031070-155 = "Kukuku. O que você está dizendo, Administradora..."
10031070-156 = "Ver ela passar vergonha é muito mais divertido do que o sucesso da festa!"
10031070-157 = "[s] \"...Nossa.\""
10031070-158 = "...Aquela pessoa é idiota?"
10031070-159 = "Ei! É claro que esse não é o único objetivo!"
10031070-160 = "Se ela não aparecer, isso só servirá para mostrar a diferença de nível entre o Pandemônio e o Comitê Disciplinar!"
10031070-161 = "Já que ela fugiu, não há desculpas que a salvem!"
10031070-162 = "Como ela pôde usar um truque tão sujo..."
10031070-163 = "Mas, a presidente não fugiu..."
10031070-164 = "Humpf, não adianta dizer nada agora."
10031070-165 = "Iroha! Chiaki! Onde vocês estão!#nA festa está prestes a começar e a presidente do Comitê Disciplinar não dá as caras!"
10031070-166 = "Transmita esse fato para toda Gehenna e declare a vitória do nosso Pandemônio!"
10031070-167 = "E-espere um pouco. Você está falando sério!?#nSe fizermos uma declaração dessas...!"
10031070-168 = "Kikiki! Quem se importa com as palavras de um perdedor!#nAlém disso, Iroha e Chiaki estão..."
10031070-169 = "Essas duas? Elas saíram para preparar a festa."
10031070-170 = "É uma pena que elas não possam estar presentes em um momento tão prazeroso."
10031070-171 = "Kukuku... Bem, não importa, eu, Makoto, agirei pessoalmente."
10031070-172 = "Kukuku... Finalmente, a partir de hoje...!"
10031070-173 = "A era do nosso Pandemônio vai começar...!"
10031070-174 = "[ns] \"...Tenho um pressentimento muito ruim.\""
10031070-178 = "Vamos! Alunos de Gehenna, escutem bem!"
10031070-179 = "Originalmente, Hina Sorasaki deveria ser a responsável pela apresentação de abertura da festa especial de Gehenna hoje, mas ela não apareceu!"
10031070-180 = "Ela deve ter ficado com medo de sua função importante e fugiu!"
10031070-181 = "Isso é um insulto ao nosso Pandemônio e, ao mesmo tempo, o equivalente a declarar sua própria derrota!"
10031070-182 = "Portanto, a partir de agora, o topo de Gehenna pertence inegavelmente a mim, Makoto!"
10031070-188 = "Kukuku... Com isso, a disputa está encerrada."
10031070-189 = "............"
10031070-190 = "[s] \"Ako... está tudo bem, fique tranquila.\""
10031070-191 = "Nós estamos bem."
10031070-192 = "Porém, o problema é..."
10031070-193 = "[s] \"Problema...?\""
10031070-197 = "P-presidente! É uma emergência!"
10031070-198 = "Hm? O que houve?"
10031070-199 = "D-depois da transmissão de agora, em várias partes de Gehenna...!"
10031070-200 = ".........?"
10031070-203 = "Chefe! Ouviu a transmissão agora pouco!? A presidente do Comitê Disciplinar desapareceu!#nParece que o Pandemônio venceu!"
10031070-204 = "A presidente do Comitê Disciplinar... desapareceu?"
10031070-205 = "........."
10031070-206 = "......sorvo."
10031070-210 = "Isso significa que... a era do Departamento de Desenvolvimento de Fontes Termais chegou?"
10031070-211 = "Sim! Talvez!"
10031070-212 = "HA-HA-HA-HA-HA!!"
10031070-213 = "Todos, atacar! É hora do desenvolvimento de fontes termais!#nDesta vez, vamos terminar a fonte termal do Pandemônio!"
10031070-214 = "Eba! Pessoal! Hora da fuga!"
10031070-215 = "Vamos cavar o chão!"
10031070-225 = "Entendo, então a presidente do Comitê Disciplinar, que sempre nos atrapalha, está ausente..."
10031070-226 = "Fufu★ O que faremos, Haruna?"
10031070-227 = "Nem precisa perguntar, né?"
10031070-228 = "É isso aí! Ainda não comemos nada delicioso!!"
10031070-229 = "Sim. Fomos capturadas pela presidente do Comitê Disciplinar mais cedo, mas vamos agir novamente."
10031070-249 = "Pan-chan... Pan-chan começou a enlouquecer de novo~!"
10031070-252 = "Se a presidente do Comitê Disciplinar desapareceu... não podemos ficar parados!"
10031070-253 = "Isso! Somos encrenqueiras que cumprem com o dever uma vez que aceitamos um pedido."
10031070-254 = "A instalação da estátua pedida pelo líder do Pandemônio... desta vez vamos conseguir!!"
10031070-256 = "......Problemas como os citados acima estão ocorrendo em toda Gehenna!"
10031070-257 = "Presidente! Por favor, nos dê instruções rapidamente...!"
10031070-262 = "O-o-o que é isso...!?#nPor que o caos começou em todos os lugares ao mesmo tempo...!?"
10031070-263 = "Não é óbvio?#nVocê anunciou que a maior força de dissuasão de Gehenna estava ausente..."
10031070-264 = "Você não pensou que os encrenqueiros começariam a causar confusão?"
10031070-265 = "[s] \"Quem diria que aquela transmissão causaria uma deterioração tão grande na situação...\""
10031070-266 = "Não subestime Gehenna, Sensei."
10031070-267 = "[s] \"Não, eu nunca subestimei!\""
10031070-268 = "Provavelmente... se não conseguirmos conter esse caos, não só a festa será cancelada, como toda Gehenna..."
10031070-269 = "I-i-isso é... por que...!?#nA festa que preparamos com tanto esforço...!"
10031070-270 = "Eu só queria mostrar a diferença de classe entre o Pandemonium e o Comitê Disciplinar...!"
10031070-276 = "O que foi aquela transmissão agora há pouco...!?"
10031070-277 = "...Quer dizer, não está tudo completamente um caos agora!?"
10031070-278 = "Ah... Makoto-senpai, o que você fez dessa vez..."
10031070-279 = "Ahaha! É bem a cara da Makoto-senpai! Como sempre, uma bagunça total!"
10031070-285 = "Então, Ibuki... não vai poder participar da festa...?"
10031070-286 = "Ibuki! N-não é isso...!#nEstá tudo bem, eu vou dar um jeito nisso...!"
10031070-287 = "Hmm, aqui eu vou usar meu plano NK Ultra...!"
10031070-289 = "Acho que a Makoto-senpai vai ficar estranha de novo, Satsuki-senpai~"
10031070-325 = "[ns] (Ako disse que Hina só estava atrasada por causa de um compromisso...)"
10031070-327 = "[ns] \"Eu vou dar um jeito nisso.\""
10031070-329 = "Sensei?"
10031070-330 = "[s] \"A Hina só saiu por um momento por causa de um compromisso, certo?\""
10031070-331 = "............Sim."
10031070-332 = "[s] \"Então, deixe comigo até a Hina voltar.\""
10031070-333 = "Mas..."
10031070-334 = "Não há necessidade de você, Sensei, assumir a responsabilidade pela confusão causada por aquela presidente idiota..."
10031070-335 = "[ns] \"Responsabilidade... ou melhor, eu só estou ansioso para ver a apresentação da Hina.\""
10031070-337 = "[ns] \"Afinal, eu sei o quanto a Hina se esforçou.\""
