[translation]
1300809-1 = "Um breve descanso"
1300809-5 = "……。"
1300809-6 = "Ah, Sensei. Você chegou cedo."
1300809-7 = "[s1] \"Serika, você está bem?\"\n[s2] \"Suas pernas parecem estar bambas.\""
1300809-8 = "Estou bem... isso não é nada..."
1300809-9 = "Estou bem... isso não é nada..."
1300809-10 = "Ah, opa!?"
1300809-14 = "Ah, obrigado, Sensei. Eu quase caí..."
1300809-15 = "E-estou bem. Já pode me soltar."
1300809-16 = "H-hein? Meu rosto está pálido?"
1300809-17 = "É-é só um pouco de cansaço!"
1300809-18 = "Eu só não dormi nada desde ontem... isso não é nada! Estou bem...!!"
1300809-19 = "[s] \"Desde ontem?\""
1300809-20 = "Ah..."
1300809-21 = "É que... eu fiz um bico de patrulha a noite toda..."
1300809-22 = "[s] \"A noite toda?\""
1300809-23 = "E-e depois, de manhã, eu fiz entregas de leite..."
1300809-24 = "[s] \"Até de manhã?\""
1300809-25 = "I-isso não importa, preciso terminar de limpar aqui logo... s-senão não vou conseguir..."
1300809-26 = "(Cambaleia)"
1300809-29 = "(Desaba)"
1300809-30 = "[s] \"Serika!?\""
1300809-32 = "……。"
1300809-33 = "A-ahhh!?"
1300809-35 = "(Acorda num pulo)"
1300809-36 = "E-eu... eu dormi!?"
1300809-37 = "Um banco de praça...?"
1300809-38 = "S-Sensei!? Por que você não me acordou!? E o meu bico? Que horas são agora!?"
1300809-39 = "O-quanto tempo eu dormi!? Já é tarde da tarde!"
1300809-40 = "[s3] \"Calma.\"\n[s4] \"Eu já pedi desculpas no seu trabalho por você.\""
1300809-41 = "H-hein?"
1300809-42 = "H-hein?"
1300809-43 = "M-mas... mas..."
1300809-44 = "[s] \"Não se esforce tanto, isso pode acabar muito mal.\""
1300809-45 = "……。"
1300809-46 = "...Quer dizer, v-vergonha, ser vista dormindo pelo Sensei..."
1300809-47 = "P-pervertido!! Idiota!! Você tem noção de quanta vergonha faz uma estudante passar!?"
1300809-49 = "……。"
1300809-52 = "(Suspiro... mas o Sensei tem razão)"
1300809-53 = "(Se eu acabar com a minha saúde, não vai adiantar nada...)"
1300809-54 = "(E eu só vou acabar dando trabalho para todo mundo)"
1300809-57 = "……。"
1300809-59 = "...O balanço, eu costumava brincar muito nele antigamente."
1300809-60 = "Faz quanto tempo que eu não sento aqui..."
1300809-61 = "Muito bem."
1300809-64 = "(Serika sentou no balanço)"
1300809-66 = "……。"
1300809-67 = "— (Eu só tenho que me esforçar mais.)"
1300809-69 = "— (Porque eu não posso simplesmente deixar essa cidade desaparecer...)"
1300809-72 = "— Agora... [wa:1400] eu tenho um adulto em quem posso confiar... [wa:400]"
1300809-75 = "― Sensei, [wa:1500] venha aqui. [wa:1800] Quer subir comigo?"
1300809-77 = "― ...Ahaha, [wa:1300] é brincadeira. [wa:1500] Não tem como isso ser possível, né?"
1300809-80 = "― Ei, [wa:1300] está me ouvindo? [wa:1200] O clima está super sério agora."
1300809-82 = "― ......Francamente."
1300809-85 = "― ...Hm? [wa:1300] Como assim, bom trabalho?"
1300809-87 = "― Dizer que sabe muito bem sobre os meus esforços... [wa:3500] O que é isso..."
1300809-91 = "― Q- [wa:500] Do que você está falando?! [wa:1500] Pare de tentar me consolar do nada!!"
1300809-94 = "― I- [wa:500] Isso não é o que você está pensando, [wa:2000] só entrou um cisco no meu olho...!"
1300809-97 = "― (Mas [wa:1000] se não fosse pelo Sensei... [wa:2500] eu [wa:1000] talvez tivesse desistido muito antes)"
1300809-99 = "― Q- [wa:500] O quê?! [wa:1400] Por que você está parado aí me encarando assim... [wa:300]"
1300809-102 = "― Você vai me empurrar?"
1300809-104 = "― N- [wa:400] Não está tudo bem, não! [wa:1600] E se alguém vir a gente, o que você pretende fazer?!"
1300809-107 = "― ...N- [wa:500] Não é nada!!"
1300809-109 = "― S- [wa:500] Se descobrirem que eu estou [wa:1500] em um encontro a sós com o Sensei..."
1300809-112 = "......"
1300809-113 = "O-obrigada por hoje."
1300809-114 = "Fiquei feliz que você tenha me dito para não me esforçar demais, Sensei."
1300809-115 = "E-em troca... por isso... e-eu vou depender um pouco de você, viu..."
1300809-116 = "......"
1300809-117 = "Não ria!! O clima estava sério agora pouco, sabia!"
1300809-118 = "......Haa. Esse adulto realmente não tem jeito."
1300809-119 = "......Bem, acho que isso é a cara do Sensei."
1300809-120 = "Haa... hmm. Acho que me sinto bem melhor depois de descansar um pouco."
1300809-121 = "É. Preciso me animar e dar o meu melhor a partir de amanhã."
1300809-124 = "Então, vamos voltar, Sensei?"
