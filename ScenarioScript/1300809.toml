[translation]
1300809-1 = "つかの間の休息"
1300809-5 = "……。"
1300809-6 = "あ、先生。早いわね。"
1300809-7 = "[s1] \"セリカ、大丈夫？\"\n[s2] \"足がふらふらしてるみたいだけど？\""
1300809-8 = "大丈夫……これぐらいは何とも……。"
1300809-9 = "大丈夫……これぐらいは何とも……。"
1300809-10 = "あっ、うわっ！？"
1300809-14 = "あ、ありがとう、先生。倒れこんじゃうところだった……。"
1300809-15 = "だ、大丈夫だから。もう離していいから。"
1300809-16 = "う、うん？顔色が悪い？"
1300809-17 = "ちょ、ちょっと疲れただけだから！"
1300809-18 = "昨日から一睡もしてないだけだから……これぐらい何ともない！大丈夫だから……！！"
1300809-19 = "[s] \"昨日から？\""
1300809-20 = "あ……。"
1300809-21 = "て、徹夜でパトロールのバイトを……。"
1300809-22 = "[s] \"徹夜？\""
1300809-23 = "そ、その後、朝方には牛乳の配達をして……。"
1300809-24 = "[s] \"朝方まで？\""
1300809-25 = "そ、それより早くこの辺を片付けないと……ま、間に合わな……"
1300809-26 = "（ふらっ）"
1300809-29 = "（ばたっ）"
1300809-30 = "[s] \"セリカ！？\""
1300809-32 = "……。"
1300809-33 = "う、うわああっ！？"
1300809-35 = "（ガバッ）"
1300809-36 = "わ、私……寝ちゃってた！？"
1300809-37 = "公園のベンチ……？"
1300809-38 = "せ、先生！？何で起こしてくれなかったの！？バイトは？今何時！？"
1300809-39 = "ど、どれぐらい寝ちゃってた！？ってもう午後じゃん！"
1300809-40 = "[s3] \"落ち着いて。\"\n[s4] \"バイト先には私の方から謝っておいたから。\""
1300809-41 = "え、ええ？"
1300809-42 = "え、ええ？"
1300809-43 = "で、でも……でも……。"
1300809-44 = "[s] \"無理し過ぎはダメだよ、本当に大変なことになるから。\""
1300809-45 = "……。"
1300809-46 = "……というか、ね、寝てる姿を先生に見られるなんて……。"
1300809-47 = "へ、ヘンタイ！！バカ！！どれだけ女子高生を恥ずかしい気持ちにさせるつもりよ、あんたは！"
1300809-49 = "……。"
1300809-52 = "（はあ……でも、先生の言うことも一理ある）"
1300809-53 = "（健康を損ねたら、元も子もないじゃない……）"
1300809-54 = "（みんなに迷惑をかけることになるし）"
1300809-57 = "……。"
1300809-59 = "……ブランコ、昔はよく乗ってたのに。"
1300809-60 = "最後にここに座ったの、いつだったっけ……。"
1300809-61 = "よしっ。"
1300809-64 = "（セリカはブランコに座った）"
1300809-66 = "……。"
1300809-67 = "― （もっと頑張るしかない。）"
1300809-69 = "― （この町が無くなりそうなのを[wa:1800]放っておくわけにはいかないから……）"
1300809-72 = "― 今は……[wa:1400]頼れる大人もいるから……。[wa:400] "
1300809-75 = "― 先生、[wa:1500]こっちに来て。[wa:1800]私と一緒に乗る？"
1300809-77 = "― …あはは、[wa:1300]冗談だよ。[wa:1500]いくらなんでもそれは無理だよね。"
1300809-80 = "― あの～、[wa:1300]聞いてる？[wa:1200]今めっちゃ真面目な雰囲気なんだから。"
1300809-82 = "― ……まったく。"
1300809-85 = "― ……うん？[wa:1300]ご苦労様って？"
1300809-87 = "― 私の努力をよく知ってるって、[wa:3500]何それ…… 。"
1300809-91 = "― な、[wa:500]何の話？！[wa:1500]いきなり慰めてくるのはやめて！！"
1300809-94 = "― こ、[wa:500]これは違うの、[wa:2000]目にゴミが入っただけよ……！"
1300809-97 = "― (でも[wa:1000]先生じゃなかったら……[wa:2500]私は[wa:1000]もっと前に諦めてたかもしれない)"
1300809-99 = "― な、[wa:500]なに？！[wa:1400]何でそんなにじっとしているの……。[wa:300] "
1300809-102 = "― 押してくれる？"
1300809-104 = "― だ、[wa:400]大丈夫じゃないわ！[wa:1600]誰かが見てたらどうするつもり！"
1300809-107 = "― ……な、[wa:500]なんでもないわよ！！"
1300809-109 = "― こ、[wa:500]こうやって[wa:1500]先生と二人っきりでデートしてることがバレてしまったら……"
1300809-112 = "……。"
1300809-113 = "きょ、今日はありがとね。"
1300809-114 = "無理はしないでって言ってくれて、嬉しかったよ。先生。"
1300809-115 = "そ、その代わりに……だから……す、少しは頼るからね……。"
1300809-116 = "……。"
1300809-117 = "笑わないでっ！！今真面目な雰囲気だったじゃん！"
1300809-118 = "……はあ。やっぱりダメかも、この大人。"
1300809-119 = "……まあでも、これが先生らしさか。"
1300809-120 = "はあー……んっ。少し休んだからか、結構マシになったかも。"
1300809-121 = "うん。元気出してまた明日から頑張らないと。"
1300809-124 = "じゃあ、帰ろっか、先生？"
