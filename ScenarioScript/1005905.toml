[translation]
1005905-1 = "屋根裏部屋のお姫様"
1005905-2 = "（思った以上に仕事が片付かず、約束していた時間より遅くなってしまった）"
1005905-5 = "あ、先生だ☆"
1005905-6 = "[s] \"遅くなってごめん。待ったよね？\""
1005905-7 = "ううん、先生が忙しいのは知ってるから。#n私は今すっごいヒマしてるし、大丈夫大丈夫。"
1005905-8 = "[s] \"ところで、一体どうしたの？\""
1005905-11 = "んーえっとねー……"
1005905-12 = "……ほんと、大したことじゃないんだけど。"
1005905-13 = "よかったらお茶とかどうかなーって！"
1005905-14 = "でも今日は休日だから……お店が早く閉まっちゃうんだよね。"
1005905-15 = "もうだいぶ遅い時間だし、開いてる店もないと思うし……"
1005905-16 = "せっかく来てくれたのに、どうしようね……。"
1005905-17 = "先生の時間を奪うのも申し訳ないし、やっぱりシャーレに帰る？#n先生、忙しいもんね。"
1005905-18 = "それに、私みたいなのと一緒にいたら、#n色々と噂されちゃいそうだし……"
1005905-19 = "[s] \"ううん、そんな事は気にしないで。\""
1005905-20 = "うぅっ……うん。"
1005905-21 = "[s1] \"遅れたのは私のせいだから。\"\n[s2] \"ちょっと休憩できるところ探す？\""
1005905-24 = "休憩できるところ……"
1005905-29 = "あっ、私の部屋とかどうかな？"
1005905-30 = "[s] \"ミカの部屋？\""
1005905-31 = "ん？"
1005905-32 = "あっ！変な意味じゃないよ！#n部屋って言っても、寮の一部の空間というか……"
1005905-33 = "今日はお休みの日だから、門限も遅いんだ。"
1005905-34 = "貰い物のロールケーキと紅茶があるんだけど……#nロールケーキはちょっと飽きちゃって……#nこのままだとダメになっちゃうかもしれなくて……！"
1005905-35 = "あ！先生が持って帰って食べてもいいよ！#n捨てるよりはマシだからさ！"
1005905-36 = "[s3]（あまり断り続けるのも申し訳ないし……送るついでなら……）\n[s4] \"じゃあ、ちょっと部屋に寄ってケーキだけ頂くね。\""
1005905-39 = "うん！あんまり長居はできないけど……。"
1005905-43 = "じゃ、行こっか！こっちこっち！"
1005905-52 = "[ns]（かなり古び……歴史がありそうな建物だ……）"
1005905-53 = "ごめんね、ちょっと寂れた場所だよね。#n古い建物だからあんまり人気なくて、住んでる子も少ないの。"
1005905-54 = "この間なんかネズミが出たんだよ……。#nうぅ……前いた檻が恋しくなるレベル……。"
1005905-55 = "[s] \"それは……大変だね……。\""
1005905-56 = "あはは！#nでも、こう見えてもセキュリティはちゃんとしてるから大丈夫☆"
1005905-57 = "私の部屋は一番上にあってね。#n非常階段登らないといけないんだけど……"
1005905-58 = "[s5] \"非常階段……？\"\n[s6] \"ミカの部屋ってそんなところにあるの？\""
1005905-61 = "私は特例みたいだからね☆#n特別扱いってやつ？"
1005905-65 = "あっ！階段、結構急だから気をつけてね。"
1005905-73 = "着いたー！"
1005905-74 = "[s] \"ここってもしかして、屋根裏部屋……！？\""
1005905-75 = "そうだね、"
1005905-76 = "屋根裏……"
1005905-81 = "……うーん、"
1005905-82 = "そろそろ……"
1005905-86 = "[ns] \"そろそろ？\""
1005905-90 = "それでは点呼を行います！"
1005905-91 = "[ns] \"！？！？\""
1005905-92 = "現時刻をもって正門を閉鎖！#nおよび、各生徒は自室の前で待機するように！"
1005905-93 = "点呼は上の階から行います！"
1005905-94 = "先生、たいへーん！寮長がこっちに向かってきてる！"
1005905-95 = "[s] \"ミ、ミカ！？\""
1005905-96 = "とりあえず、部屋に入って毛布被ってて！#n女子寮に入ったのがバレたらマズいでしょ？"
1005905-97 = "[s7] \"っ……えっ、うん！？\"\n[s8] とりあえず言われた通りにする。"
1005905-105 = "（言われるがままにミカの部屋に入り、毛布を被った）"
1005905-110 = "ミカ様、なんだか騒がしいようですが……いかがされましたか？"
1005905-111 = "え？どうかしたの？"
1005905-112 = "その……声が聞こえたような……。"
1005905-113 = "あははっ☆何言ってるの？#n気のせいじゃない？"
1005905-119 = "少しよろしいでしょうか。#n部屋の中を確認しても？"
1005905-120 = "ホント信用されてないなぁ私……"
1005905-121 = "別にいいよ、好きにすれば。"
1005905-123 = "では失礼。"
1005905-128 = "[ns] （……！！）"
1005905-133 = "……。"
1005905-134 = "ふむ……気のせいか……？"
1005905-140 = "あまり騒がしくしないようお願いします、ミカ様。#nこの建物は古いため、声がよく通りますので。"
1005905-141 = "では、ごゆっくり。"
1005905-142 = "はーい、お疲れ様☆"
1005905-146 = "……うわぁ、うまくいっちゃったね？"
1005905-152 = "先生、もう大丈夫。出てきていいよ。"
1005905-153 = "[ns] \"ミカ……これは一体……！？\""
1005905-156 = "― しーっ。"
1005905-160 = "[wa:700]― ……先生は、[wa:1600]騙されたんだよ。"
1005905-163 = "― どうしようね？"
1005905-165 = "― もう、[wa:930]朝までここにいるしかないよ？"
1005905-168 = "[wa:400]― こーんな簡単に[wa:1100]私を信じちゃうなんて、"
1005905-170 = "[wa:430]― 先生って[wa:600]ホント……"
1005905-173 = "[wa:100]― あれほど[wa:300]「私を信じないで」って[wa:2830]言ったのに……"
1005905-176 = "[ns] \"ミカ……！！\""
1005905-177 = "[wa:400]― ん？[wa:1650]ここで騒いだら……"
1005905-179 = "[wa:200]― みんなに[wa:450]バレちゃうよ？[wa:2050]いいの？"
1005905-182 = "― ……私は、[wa:1850]別に[wa:850]いいけど。 "
1005905-185 = "[ns] \"…………。\""
1005905-186 = "[wa:2000]― ……あれ。 "
1005905-188 = "― もしかして……[wa:2000]怒った？"
1005905-191 = "― 私が問題児だってことくらい、 "
1005905-193 = "― 先生だって[wa:380]知ってたでしょ……？"
1005905-196 = "[ns9] 無言を貫く。\n[ns10] \"流石にこれはやりすぎだよ……どうしてこんな事を？\""
1005905-197 = "[wa:600]― その……"
1005905-198 = "[wa:600]― その……"
1005905-200 = "― 困らせたかったんじゃないの。"
1005905-203 = "― 先生に、[wa:1650]嫌われるのは……[wa:3100]やだ……"
1005905-205 = "― でも……[wa:2050]ちょっとだけ……"
1005905-208 = "― ほんの[wa:550]ちょっとでいいから……"
1005905-210 = "― 先生と、[wa:2650]一緒にいたかったの……。"
1005905-213 = "（困惑するミカを宥め、朝まで静かに部屋で時を過ごした）"
1005905-214 = "（正門が開いた頃、誰にも気づかれないよう寮を出てシャーレに戻った）"
