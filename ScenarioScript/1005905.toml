[translation]
1005905-1 = "princesa no sótão"

1005905-2 = "(Não terminei meu trabalho tanto quanto esperava e acabei chegando mais tarde do que havia prometido.)"

1005905-5 = "Ah, é o Sensei☆"

1005905-6 = "[s] \"Desculpe pelo atraso. Esperei, certo?\""

1005905-7 = "Não, eu sei que o Sensei está ocupado. #nTenho muito tempo livre agora, então está tudo bem."

1005905-8 = "[s] \"A propósito, o que aconteceu?\""

1005905-11 = "Hum..."

1005905-12 = "...Realmente não é grande coisa."

1005905-13 = "Eu gostaria de um pouco de chá, se você quiser!"

1005905-14 = "Mas hoje é feriado, então as lojas fecharão mais cedo."

1005905-15 = "Já é bastante tarde e creio que nenhuma loja esteja aberta..."

1005905-16 = "Agora que você veio, não sei o que fazer..."

1005905-17 = "Sinto muito por tomar o tempo do Sensei, então acho que vou voltar para minha placa de Petri. #nSensei, você está ocupado."

1005905-18 = "Além disso, se eu estivesse com alguém como eu, tenho certeza que haveria muitos boatos..."

1005905-19 = "[s] \"Não, não se preocupe com isso.\""

1005905-20 = "Ugh... sim."

1005905-21 = "[s1] \"A culpa é minha pelo atraso.\"\n[s2] \"Gostaria de encontrar um lugar para fazer uma pausa?\""

1005905-24 = "Um lugar onde você pode fazer uma pausa..."

1005905-29 = "Ah, talvez meu quarto?"

1005905-30 = "[s] \"Quarto da Mika?\""

1005905-31 = "sim?"

1005905-32 = "Ah! Não quero dizer isso de uma forma estranha! #nQuando digo quarto, quero dizer que faz parte do dormitório..."

1005905-33 = "Hoje é meu dia de folga, então meu toque de recolher está atrasado."

1005905-34 = "Peguei um bolo de rolo e um pouco de chá, mas...#nEstou ficando um pouco cansado do bolo de rolo...#nSe eu ficar assim, pode estragar...!"

1005905-35 = "um! Os Senseies podem levar para casa e comer também! #nÉ melhor do que jogar fora!"

1005905-36 = "[s3] (Me desculpe por recusar tanto...se vou mandar...)\n[s4] \"Então, vamos para o meu quarto comer um bolo.\""

1005905-39 = "Sim! Mas não posso ficar muito tempo..."

1005905-43 = "Bem, vamos lá! Aqui, aqui!"

1005905-52 = "[ns] (É um prédio bem antigo... parece que tem um pouco de história...)"

1005905-53 = "Desculpe, é um lugar um pouco solitário. #nÉ um prédio antigo, então não é muito frequentado e não tem muita gente morando lá."

1005905-54 = "Outro dia apareceu um rato... #nUgh... estou começando a sentir falta da gaiola em que estava antes..."

1005905-55 = "[s] \"Isso... isso é difícil...\""

1005905-56 = "Ahaha! #nMas mesmo que pareça assim, a segurança está em vigor, então está tudo bem☆"

1005905-57 = "Meu quarto fica no topo. #nTenho que subir as escadas de emergência..."

1005905-58 = "[s5] \"Escada de fuga...?\"\n[s6] \"O quarto de Mika fica em algum lugar assim?\""

1005905-61 = "Parece que sou um caso especial☆#nQual é o tratamento especial?"

1005905-65 = "Ah! As escadas são bastante íngremes, por isso tome cuidado."

1005905-73 = "Chegamos!"

1005905-74 = "[s] \"Talvez este seja o sótão...!?\""

1005905-75 = "Concordo,"

1005905-76 = "sótão……"

1005905-81 = "...Hum..."

1005905-82 = "Já era hora..."

1005905-86 = "[ns] \"Já estava na hora?\""

1005905-90 = "Agora vamos fazer uma chamada!"

1005905-91 = "[ns] \"!?!?\""

1005905-92 = "O portão principal está fechado neste momento! #nE cada aluno deverá aguardar na frente da sua sala!"

1005905-93 = "A chamada será realizada lá de cima!"

1005905-94 = "Sensei, isso é ótimo! O gerente do dormitório está vindo em nossa direção!"

1005905-95 = "[s] \"M-Mika!?\""

1005905-96 = "Por enquanto, vá para o seu quarto e cubra-se com um cobertor! #nNão seria ruim se descobríssemos que você entrou no dormitório feminino?"

1005905-97 = "[s7] \"Uh...huh? Sim!?\"\n[s8] Por enquanto, farei o que me foi dito."

1005905-105 = "(Ele entrou no quarto de Mika conforme lhe foi dito e o cobriu com um cobertor.)"

1005905-110 = "Mika-sama, você parece estar fazendo muito barulho... como você está?"

1005905-111 = "foto? O que está errado?"

1005905-112 = "Eu senti como se tivesse ouvido aquela voz..."

1005905-113 = "Ahaha☆ O que você está dizendo? #nNão é só sua imaginação?"

1005905-119 = "Tudo bem? #nVocê pode verificar dentro da sala?"

1005905-120 = "Eu realmente não confio em mim..."

1005905-121 = "Não importa, contanto que você goste."

1005905-123 = "Agora, com licença."

1005905-128 = "[ns] (...!!)"

1005905-133 = "……."

1005905-134 = "Hmm... talvez seja apenas minha imaginação...?"

1005905-140 = "Por favor, não faça muito barulho, Mika-sama. #nEste prédio é antigo, então as vozes podem ser ouvidas facilmente."

1005905-141 = "Pois bem, não tenha pressa."

1005905-142 = "Sim, obrigado pelo seu trabalho árduo ☆"

1005905-146 = "...Nossa, correu tudo bem, não foi?"

1005905-152 = "Sensei, está tudo bem agora. Você pode sair."

1005905-153 = "[ns] \"Mika... o que diabos é isso...!?\""

1005905-156 = "- Shhh."

1005905-160 = "[wa:700]― ...O Sensei foi [wa:1600] enganado."

1005905-163 = "-O que devemos fazer?"

1005905-165 = "- Não temos escolha a não ser ficar aqui até [wa:930] de manhã, certo?"

1005905-168 = "[wa:400]― Não acredito que você acreditou em mim tão facilmente [wa:1100]"

1005905-170 = "[wa:430] - O Sensei [wa:600] é realmente..."

1005905-173 = "[wa:100]- Mesmo que eu tenha dito [wa:300] \"Não acredite em mim\" [wa:2830]..."

1005905-176 = "[ns] \"Mika...!!\""

1005905-177 = "[wa:400]- Hein? [wa:1650]Se você fizer barulho aqui..."

1005905-179 = "[wa:200]― Todo mundo vai descobrir [wa:450], certo? [wa:2050]Está tudo bem?"

1005905-182 = "― ...Eu não me importo [wa:1850] [wa:850] embora."

1005905-185 = "[ns] \"………….\""

1005905-186 = "[wa:2000]― ...Isso."

1005905-188 = "- Será que... [wa:2000] você está com raiva?"

1005905-191 = "- Só que sou uma criança problemática."

1005905-193 = "- Até a Senseia [wa:380] sabia...?"

1005905-196 = "[ns9] Fique em silêncio. \n[ns10] \"Isso é demais... Por que você está fazendo isso?\""

1005905-197 = "[wa:600]― Isso..."

1005905-198 = "[wa:600]― Isso..."

1005905-200 = "- Acho que você queria me envergonhar."

1005905-203 = "- Não quero que meu Sensei me odeie [wa:1650]... [wa:3100]..."

1005905-205 = "― Mas... [wa:2050] Só um pouquinho..."

1005905-208 = "- Só [wa:550] só um pouquinho..."

1005905-210 = "- Eu queria ficar com [wa:2650] a Senseia..."

1005905-213 = "(Eu acalmei a confusa Mika e passei um tempo em silêncio no meu quarto até de manhã.)"

1005905-214 = "(Quando o portão principal se abriu, saí do dormitório e voltei para a placa de Petri sem ninguém perceber.)"

