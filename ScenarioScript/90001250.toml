[translation]
90001250-1 = "Episódio 25; Sobre a vida"
90001250-2 = "Por que aquelas duas estão aqui!?"
90001250-3 = "Ca-calma. #nPrimeiro, vamos confirmar se são reais."
90001250-4 = "Eu não conheço bem uma delas... #nMas a outra, não há dúvidas!"
90001250-10 = "Mentira..."
90001250-11 = "Parece que agora a chamam de \"Alice\", mas... #naquela é a \"Princesa dos Deuses Sem Nome\", AL-1S..."
90001250-12 = "E-esse nome, é melhor não dizer muito..."
90001250-13 = "Tem razão... vou tomar cuidado."
90001250-15 = "Afinal, não importa como olhe... é ela, né?"
90001250-16 = "Po-po-po-por que não conseguimos... perceber isso até agora...?"
90001250-17 = "Saiba Momoi, Saiba Midori, Hanaoka Yuzu... eu deveria ter mapeado todas elas..."
90001250-19 = "É uma suposição, mas provavelmente este é o motivo."
90001250-26 = "Isso é, se não me engano..."
90001250-27 = "...Sim."
90001250-28 = "Não quero dizer muito, mas... é a \"Chave dos Deuses Sem Nome\"..."
90001250-29 = "É, mas... será que não dava para ter feito algo com aquela aparência..."
90001250-30 = "Aquilo é... o senso estético dos humanos...?"
90001250-32 = "Is-isso, isso, isso, eu não posso perdoar...!"
90001250-33 = "É uma pena para o metal que foi forçado a virar tal estrutura!!!"
90001250-34 = "Calma, Ein, acalme-se... respire fundo..."
90001250-36 = "Se aquelas duas estavam lá —"
90001250-44 = "Então faz sentido terem conseguido romper o campo de força."
90001250-45 = "Mas por que não conseguimos detectá-las até agora?"
90001250-46 = "Is-isso pode ser por causa daquela \"Chave\"..."
90001250-47 = "Afinal, a Princesa deveria ter descartado seu próprio propósito de existência..."
90001250-61 = "Para começo de conversa, aquela Princesa não deveria ser incapaz de usar o \"Poder Proibido\"?"
90001250-62 = "Mas se a \"Chave\" que sabe como usá-lo estiver presente, a história muda."
90001250-63 = "Provavelmente, a \"Chave\" deve ter ensinado a ela."
90001250-65 = "Se não fosse assim, ela teria sido detectada pelos nossos sensores..."
90001250-66 = "...Vamos reformular o plano?"
90001250-67 = "É, vamos..."
90001250-68 = "O-o que faremos... o que devemos fazer..."
90001250-74 = "Recebemos um pedido de suporte de Tiphereth. #nParece que ela está pedindo nossa opinião, mas..."
90001250-75 = "Da Tipher-chan...?"
90001250-76 = "Eu queria que elas decidissem as coisas no local..."
90001250-77 = "Não, parece que a própria Tiphereth já chegou a uma conclusão."
90001250-78 = "O que isso significa...?"
90001250-79 = "Ah... não me diga..."
90001250-80 = "Sim, provavelmente —"
90001250-81 = "O que a Tiphereth precisa agora é de permissão... \"julgamento\" e \"incentivo\"."
90001250-83 = "[ns] \"Finalmente passamos pelo corredor.\""
90001250-84 = "Esta sala... tem musgo crescendo em alguns lugares."
90001250-85 = "Tem um cheiro de floresta... é relaxante..."
90001250-89 = "Parece que foi difícil isolar completamente do exterior."
90001250-90 = "Embora eu ache que não seja o ambiente mais desejável para preservar sementes..."
90001250-91 = "Ou talvez... já estivesse previsto desde o início."
90001250-93 = "Tem uma porta ali também. #nTalvez seja onde guardam as sementes."
90001250-94 = "...Antes disso, que tal descansarmos um pouco?"
90001250-95 = "Concordo! Estou exausta de tanto andar!"
90001250-97 = "Alice sabe! #nÉ o ponto de salvamento antes da luta contra o chefe!"
90001250-102 = "(Limpei o musgo e criei um espaço para descansar)"
90001250-105 = "(O pessoal do Departamento de Desenvolvimento de Jogos estava cochilando, encostados uns nos outros)"
90001250-109 = "……"
90001250-110 = "[ns] \"Kei, você está olhando para o musgo?\""
90001250-111 = "Sim."
90001250-112 = "……"
90001250-113 = "……O que é a vida, afinal?"
90001250-114 = "Ora, por que essa dúvida de repente?"
90001250-115 = "Este musgo invadiu o local e está expandindo seu próprio território."
90001250-116 = "Dentro deste prédio, que deveria ser rigorosamente controlado em um ambiente hostil."
90001250-117 = "O musgo é uma planta com uma capacidade de reprodução extremamente alta."
90001250-118 = "……Ele existe há cerca de 400 milhões de anos, não é?"
90001250-119 = "É por isso que estou surpresa. A vida é... algo tão incerto."
90001250-120 = "Egocêntrica, frágil e imprevisível — isso é a vida."
90001250-122 = "……Ou seja, você quer dizer que é uma existência egoísta?"
90001250-123 = "Talvez... seja isso."
90001250-124 = "Belo ponto de vista, Kei. #nSim. A vida é algo egoísta."
90001250-125 = "Vou dar um exemplo. Vejamos... números aleatórios baseados na intuição — #nnão é possível criar isso com circuitos lógicos, certo?"
90001250-126 = "……"
90001250-128 = "[ns] \"O que isso significa?\""
90001250-129 = "Números aleatórios são um conceito muito mais difícil do que as pessoas pensam."
90001250-130 = "O que um computador chama de \"aleatório\" não é, na verdade, um número aleatório completo."
90001250-131 = "Sim. Existem vários métodos, mas, no fim das contas, é apenas uma simulação."
90001250-132 = "Chamamos isso de — números pseudoaleatórios."
90001250-133 = "Para gerar números aleatórios no sentido correto, é indispensável uma entrada externa."
90001250-134 = "Por isso, normalmente, geramos números aleatórios inserindo a aleatoriedade existente em fenômenos naturais como dados."
90001250-135 = "[s] \"E-entendi...?\""
90001250-136 = "Eu penso que essa probabilidade, o acaso e a não linearidade são o que compõem o potencial da vida."
90001250-137 = "— Em suma, significa que é algo egoísta."
90001250-138 = "Eu detesto isso. #nPor causa disso, é fundamentalmente difícil de controlar e impossível de prever."
90001250-139 = "Mas, se fôssemos seres controláveis, Kei, você não teria renascido desta forma, teria?"
90001250-140 = "O que isso tem a ver com o assunto?"
90001250-141 = "Se houvesse algo ameaçando você... você deixaria passar só porque \"quer fazer assim\"?"
90001250-142 = "Algo assim, eu imediatamente..."
90001250-146 = "Ah."
90001250-147 = "Sim, é exatamente isso. #nA vida é incerta e egoísta, mas..."
90001250-148 = "É justamente por isso que ela possui inúmeras possibilidades."
90001250-149 = "E assim, inconscientemente, ela aumenta a diversidade genética."
90001250-150 = "A diversidade traz mais oportunidades."
90001250-151 = "Você quer dizer que, se tentarmos controlar tudo com previsões baseadas em cálculos, a taxa de sobrevivência será relativamente menor?"
90001250-152 = "É apenas uma forma de pensar, claro."
90001250-153 = "Para começar, sou cética quanto à ideia de que podemos calcular todos os fenômenos. #nO efeito túnel da mecânica quântica não é o maior exemplo disso?"
90001250-155 = "……"
90001250-156 = "Isso é uma questão microscópica..."
90001250-157 = "Mas, certamente, existe."
90001250-158 = "Além disso, deixando as discussões sérias de lado, não acha que o musgo que cresce aqui é fofo e admirável?"
90001250-159 = "……"
90001250-160 = "\"As sementes escondem possibilidades\", essas foram as suas palavras, não foram?"
90001250-161 = "……Eu não deveria ter dito isso."
90001250-162 = "[ns1] \"Ou seja...\"\n[ns2] \"A Kei-chan é tímida!\""
90001250-165 = "Você estava ouvindo o que eu disse!?"
90001250-167 = "Vamos organizar as coisas primeiro."
90001250-168 = "O alvo é um ser vivo, diferente de nós ou de Tiferet."
90001250-169 = "E todo ser vivo tem um limite."
90001250-170 = "Então... é só encurralá-los até o limite!"
90001250-171 = "D-de que maneira?"
90001250-172 = "Por exemplo...!"
90001250-174 = "...Entendo."
90001250-175 = "I-i-i-isso é um pouco...!"
90001250-176 = "Ué? Não é um bom plano?"
90001250-177 = "B-bem, é sim, mas...!"
90001250-178 = "Esse método não seria ineficaz contra a Chave...?"
90001250-179 = "Bem, acho que a Chave sozinha não consegue fazer nada."
90001250-180 = "E provavelmente, contra aquela princesa também..."
90001250-182 = "Não, acho que ela não sairia ilesa. #nA situação da princesa atual é diferente."
90001250-183 = "Usando nossos termos... a saída dela está mais fraca do que o normal."
90001250-184 = "Bem, sinto que vai dar certo. Eu sou a favor."
90001250-186 = "I-irmã... o que você acha...?"
90001250-190 = "Eu..."
90001250-191 = "Acredito que os seres vivos são formados entre a otimização parcial e a otimização global."
90001250-192 = "Dizem que, entre os seres vivos, existe um sistema chamado ecossistema."
90001250-193 = "A presa pode parecer estar sendo caçada unilateralmente, mas..."
90001250-194 = "Dizem que, sem o conceito de predador natural, o sistema de toda a vida não conseguiria se manter."
90001250-196 = "Acho que já ouvi falar disso! #nSe os lobos desaparecerem e só restarem cervos, a terra acaba morrendo."
90001250-197 = "Sof, você entende muito sobre essas coisas, hein."
90001250-198 = "Ué, o quê? Tem algum problema?"
90001250-199 = "Não, não é isso. #nÉ só que esse sistema é uma das razões pelas quais eu detesto seres vivos."
90001250-200 = "Não gosto de quem carrega contradições na própria existência."
90001250-201 = "Entendi..."
90001250-203 = "Vamos voltar ao assunto. Ain, Sof, Owl. #nQuando decidirem o próximo passo, por favor, informem a Tiferet."
90001250-204 = "Tiferet também deve ter terminado seu próprio julgamento e deve estar querendo considerar outras opiniões agora."
90001250-205 = "Ela quer que seja algo decidido por todos... será? #nTalvez Tiferet seja mais esperta do que parece."
90001250-206 = "Essa interpretação não é um pouco distorcida...?"
90001250-207 = "E-eu acho bom... significa que poderemos ajudar a Tiferet, certo...?"
90001250-209 = "Sim. Pelo menos, sob o nome dela..."
90001250-213 = "Porque nós já somos um só."
90001250-215 = "Próximo episódio: A luz que ilumina a escuridão"
