[translation]
90001250-1 = "第25話;生命について"
90001250-2 = "なぜあの二人がここにいるのですか！？"
90001250-3 = "お、落ち着いて。#nまずは、本物かどうか確かめよう。"
90001250-4 = "か、片方はよく分かりませんが……。#nもう片方は、間違いありません！"
90001250-10 = "嘘……。"
90001250-11 = "今は「アリス」と呼ばれているみたいですが……。#nあれは「名もなき神々の王女」、AL-1S……。"
90001250-12 = "そ、その名前は、あまり言わない方が……。"
90001250-13 = "それもそうですね……気をつけます。"
90001250-15 = "やっぱりどう見ても……そうだよね？"
90001250-16 = "ど、どどどど、どうして今まで……気づけなかったの、でしょうか……？"
90001250-17 = "[ruby=さいば]才羽[/ruby]モモイに、[ruby=さいば]才羽[/ruby]ミドリ、[ruby=はなおか]花岡[/ruby]ユズ……全部把握していたはずなのに……。"
90001250-19 = "推測ですが、おそらくこれが原因かと。"
90001250-26 = "これって、たしか……。"
90001250-27 = "……ええ。"
90001250-28 = "あまり言いたくない、ですが……「名もなき神々の鍵」……。"
90001250-29 = "え、でも……あの見た目はどうにかならなかったのかな……。"
90001250-30 = "あれが……人間のセンスなのですか……？"
90001250-32 = "こ、ここここ、こんなの、許せません……！"
90001250-33 = "あんな構造体にさせられた金属が可哀想です！！！"
90001250-34 = "どうどう、アイン落ち着いて……深呼吸しようね……。"
90001250-36 = "あの二人が、あそこにいたのであれば――"
90001250-44 = "力場を突破できたのも理解できます。"
90001250-45 = "でも、どうして今まで観測できなかったんだろ？"
90001250-46 = "そ、それは、あの「鍵」のせい、かもしれません……。"
90001250-47 = "王女は――存在意義を自分で捨てたはずですから……。"
90001250-61 = "そもそも、あの王女は「禁じられた力」を行使できないはずでは？"
90001250-62 = "けど、その使い方を知ってる「鍵」がいれば、話は別。"
90001250-63 = "たぶん、「鍵」が教えたんだろうね。"
90001250-65 = "そ、そうでもなければ、私たちの探知に引っかかったはずです……。"
90001250-66 = "……作戦、練り直しますか？"
90001250-67 = "そうだね……。"
90001250-68 = "ど、どうしましょう……何をすれば……。"
90001250-74 = "ティファレトから支援要請が届いています。#n意見を求めているみたいですが……。"
90001250-75 = "ティファちゃんから、ですか……？"
90001250-76 = "現場のことは現場で判断して欲しいんだけどな……。"
90001250-77 = "いえ、ティファレト自身はもう答えを出しているようです。"
90001250-78 = "それは、どういう意味ですか……？"
90001250-79 = "え……まさか……。"
90001250-80 = "ええ、おそらく――"
90001250-81 = "今のティファレトが必要としているのは、許可……「判断」と「激励」かと。"
90001250-83 = "[ns] \"やっと通路を抜けたね。\""
90001250-84 = "この部屋……所々に苔が生えてますね。"
90001250-85 = "も、森の中みたいな香りがして……落ち着きます……。"
90001250-89 = "完全に外と隔離するのは難しかったようですね。"
90001250-90 = "種子を保存する環境としては、あまり望ましくないとは思いますが……。"
90001250-91 = "あるいは……最初から想定していたのかもしれないわね。"
90001250-93 = "あっちにもドアがある。#n種を保管してるところかも。"
90001250-94 = "……その前に、少し休憩していきませんか？"
90001250-95 = "賛成！歩き疲れちゃったよー！"
90001250-97 = "アリス、知ってます！#nボス戦前のセーブポイントですね！"
90001250-102 = "（苔を掃除して、休めるスペースを作った）"
90001250-105 = "（ゲーム開発部のみんなは、肩を寄せ合ってうとうとしていた）"
90001250-109 = "……。"
90001250-110 = "[ns] \"ケイ、苔を見てるの？\""
90001250-111 = "はい。"
90001250-112 = "……。"
90001250-113 = "……生命とは、何なのでしょうか。"
90001250-114 = "あら、どうしてそのような疑問を？"
90001250-115 = "この苔は外から侵入し、自分たちのテリトリーを増やしています。"
90001250-116 = "過酷な環境で厳格に管理されていたはずの、この建物の中で。"
90001250-117 = "苔は繫殖力が極めて高い植物よ。"
90001250-118 = "……およそ4億年前から存在しているんですよね。"
90001250-119 = "だからこそ、驚いているのです。生命とは……こんなにも不確かなものなのですね。"
90001250-120 = "自己中心的で、壊れやすく、予測できない――それが、生命。"
90001250-122 = "……つまり、自分勝手な存在だと言いたいのですね？"
90001250-123 = "そう……かもしれません。"
90001250-124 = "良い着眼点ですね、ケイ。#nええ。生命とは、自分勝手なものです。"
90001250-125 = "一つ、例を挙げましょう。そうですね……直感による無作為乱数――#nこれを論理回路で作ることはできませんよね？"
90001250-126 = "……。"
90001250-128 = "[ns] \"それはどういう意味？\""
90001250-129 = "乱数とは、人が思う以上に難しい概念なのです。"
90001250-130 = "コンピューターが用意する「ランダム」とは、実のところ完全な乱数ではありません。"
90001250-131 = "ええ。手法はいろいろあるけれど、結局はそのように見せかけているだけに過ぎないわ。"
90001250-132 = "これを――疑似乱数と言うの。"
90001250-133 = "正しい意味での乱数を生成するには、外部からの入力が不可欠なの。"
90001250-134 = "そこで通常は、自然現象の中に存在する無作為性をデータとして入力することによって、乱数を生成させているんです。"
90001250-135 = "[s] \"な、なるほど……？\""
90001250-136 = "私は、その確率と偶然、非線形こそが生命の可能性ではないかと思っているのです。"
90001250-137 = "――要は、自分勝手なところ、という意味です。"
90001250-138 = "私は、それが嫌なんです。#nそのせいで根本的に管理が難しく、予測もできないんですから。"
90001250-139 = "ですが、私たちが管理できる存在だったなら、こうしてケイが蘇ることもなかったのですよ？"
90001250-140 = "その話と何の関係が？"
90001250-141 = "もし、自身を脅かす存在があったとして……あなたは、「ただそうしたいから」と放置しますか？"
90001250-142 = "そんなものは、ただちに――"
90001250-146 = "あっ。"
90001250-147 = "ええ、そういうことです。#n生命とは不確実で自分勝手ですが……。"
90001250-148 = "だからこそ、いくつもの可能性を持つのです。"
90001250-149 = "そうして無自覚のうちに、遺伝的多様性を増やしていきます。"
90001250-150 = "多様性は、より多くの機会をもたらすわ。"
90001250-151 = "計算に基づく予測で管理しようとすれば、相対的に生存率が低くなる――#nそう言いたいのですか？"
90001250-152 = "あくまで考え方の一つではありますけどね。"
90001250-153 = "そもそも、あらゆる事象を計算できると考えること自体、私は懐疑的です。#n量子力学のトンネル効果とかその最たる例ではありませんか？"
90001250-155 = "……。"
90001250-156 = "それは微視的な話で……。"
90001250-157 = "ですが、たしかに存在します。"
90001250-158 = "それにほら、堅苦しい議論はさておき、ここに生えている苔は可愛いし、偉いと思いませんか？"
90001250-159 = "……。"
90001250-160 = "「種には、可能性が秘められている」とはあなたの言葉でしたね。"
90001250-161 = "……言わなければ良かったです。"
90001250-162 = "[ns1] \"つまり……\"\n[ns2] \"ケイちゃんは、照れ屋さんってことだね！\""
90001250-165 = "話聞いてましたか！？"
90001250-167 = "いったん整理しよっか。"
90001250-168 = "相手は生命体で、私たちやティファレトとは違う。"
90001250-169 = "そして、すべての生命体には限界がある。"
90001250-170 = "だったら――限界まで追い詰めればいいんだよ！"
90001250-171 = "ど、どんな風にですか？"
90001250-172 = "例えば……！"
90001250-174 = "……なるほど。"
90001250-175 = "そ、そそそそ、それはちょっと……！"
90001250-176 = "あれ？いい案じゃない？"
90001250-177 = "そ、そうなんですけど……！"
90001250-178 = "その方法は鍵には効かないのでは……？"
90001250-179 = "まあ、鍵一人じゃ何もできないと思いますよ。"
90001250-180 = "それにたぶん、あの王女にも……。"
90001250-182 = "いや、そっちは無傷じゃすまないと思うな。#n今の王女は、状況が違うし。"
90001250-183 = "私たちの表現で言えば……普段よりも出力が弱まっています。"
90001250-184 = "まあ、何とかなる気がしますね。私は賛成ですよ。"
90001250-186 = "お、お姉様は……どう思いますか……？"
90001250-190 = "我は……。"
90001250-191 = "部分最適と全体最適の狭間に、生命体は成り立っていると思っています。"
90001250-192 = "生命体の間には、生態系というシステムがあるそうです。"
90001250-193 = "被食者は一方的に捕食されているように見えて――"
90001250-194 = "天敵という概念が無いと、生命全体のシステムが維持できなくなってしまうのだとか。"
90001250-196 = "それ、聞いたことあるかも！#n狼がいなくなって鹿ばっかり増えていったら、その土地は死んじゃうって。"
90001250-197 = "ソフはそんなことまで詳しいんですね。"
90001250-198 = "え、なに、ダメなの？"
90001250-199 = "いえ、そういうわけでは。#nただ、あのシステムは私が生命体を嫌う理由の一つというだけです。"
90001250-200 = "存在に矛盾を抱えているのは、好みではありませんね。"
90001250-201 = "そうなんだ……。"
90001250-203 = "話を戻しましょうか。アイン、ソフ、オウル。#n次の手が決まったら、ティファレトに伝えてあげてください。"
90001250-204 = "ティファレトも自分なりの判断を終え、他の意見を参考にしたいと考えている頃でしょうから。"
90001250-205 = "[ruby=・   ・   ・   ・   ・   ・   ・   ・   ・]みんなで決めたこと[/ruby]にしたい……んですかね？#nティファレトは案外、賢いのかもしれません。"
90001250-206 = "その解釈はひねくれすぎじゃない……？"
90001250-207 = "わ、私は、良いと思います……ティファちゃんの助けになれるって、ことですよね……？"
90001250-209 = "ええ。少なくとも、あの方の名の下で――"
90001250-213 = "私たちは、既にひとつなのですから。"
90001250-215 = "次回;闇を照らす灯"
