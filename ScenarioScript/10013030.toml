[translation]
10013030-1 = "第3話;硫黄の鉱夫たち（１）"
10013030-5 = "まずは一番近いグループの拠点に向かいましょう。"
10013030-6 = "あまり口にしたくないんだけど、たしか名前は――"
10013030-11 = "[ns1] \"「幻の泉脈を探す硫黄の鉱夫たち」――\"\n[ns2] \"――がいるのは、この辺りだったよね。\""
10013030-14 = "その名前、すごく言いづらいです……それに、どんな集団なのかもサッパリ分かりませんし……"
10013030-15 = "えっと、この近くにリゾートがあるって話だったけど……"
10013030-16 = "それらしいものは、全く見当たりませんね。"
10013030-17 = "イズナの目にもただの砂浜にしか見えません！"
10013030-19 = "う～ん、ひょっとして私たち、入口を見つけられていないとかなのでしょうか？"
10013030-21 = "……？"
10013030-26 = "先生ー。"
10013030-27 = "[s] \"どうしたの、チセ？\""
10013030-28 = "……トントンって、音が聞こえる。"
10013030-29 = "[s] \"音……？\""
10013030-39 = "あっ、本当ですね！あれ、この音……"
10013030-40 = "向こうから聞こえるわね。行ってみましょう！"
10013030-51 = "ここが、この群島で最も強い勢力が運営するリゾート……でしょうか？"
10013030-52 = "それにしては、なんと言いますか……"
10013030-53 = "[s] \"ただの密林だね。\""
10013030-54 = "思っても言わなかったのに！？"
10013030-55 = "たしかに入った瞬間から思ってはいましたけど！"
10013030-62 = "ここは……どうも普通のリゾートではない気がします。"
10013030-63 = "あちこちで土を掘ったり、色々壊したりしてるみたいですけど……あれって一体何をしてるんでしょう、主殿？"
10013030-64 = "[s] \"あれは多分……\""
10013030-66 = "おい！お前たちは誰だ！なんで正門から入ってこなかった！？"
10013030-72 = "よくわからないが、とにかく怪しいやつらを見つけた！全員集合ぉー！！"
10013030-73 = "えっ？ちょ、ちょっと！？"
10013030-80 = "[ns] \"あれ、君たちは確か……。\""
10013030-81 = "なんだ、水着を着ているということは……客か？"
10013030-82 = "だが客と言うには……ん？おい、あの真ん中に立っている大人。怪しくないか？"
10013030-83 = "あの顔、どこかで見た気が……どこだったっけなぁ……"
10013030-85 = "……あれ、シャーレの先生じゃん！"
10013030-86 = "[s] \"メグ！\""
10013030-87 = "やほやほ～先生！"
10013030-89 = "また先生のお知り合いですか……？"
10013030-90 = "[s3] \"すごく怪しい視線が……！\"\n[s4] \"温泉開発部と面識があるだけだから！\""
10013030-93 = "あっ、なるほど！#n「硫黄の鉱夫たち」ってゲヘナの温泉開発部のことだったのですね。"
10013030-94 = "そうそう！私たちが、この「ロスト・パラダイス・リゾート」で「幻の泉脈を探す硫黄の鉱夫たち」という――"
10013030-95 = "とーっても素敵な名前で呼ばれてる温泉開発部だよ！#nまぁ、私が名乗りだしたんだけどね！ネーミングセンス良いでしょ？"
10013030-96 = "[s] \"自称だったの！？\""
10013030-97 = "そだよ♪ところで、先生。ここで会うなんて、珍しいね～？"
10013030-98 = "どうしてここに？もしかして迷子になっちゃった？"
10013030-100 = "それはむしろこっちの台詞よ。こんな密林のど真ん中で、一体何をしてるの？"
10013030-101 = "違法リゾート事業、とは何か違うみたいだし……"
10013030-103 = "その質問は実に愚かだな！"
10013030-108 = "あっ、カスミ部長！"
10013030-112 = "そこに温泉があるから我々がいる！いや、たとえ温泉がなくても我々がいる！"
10013030-113 = "とにかく何でも掘り出して温泉にしてしまえば良い！だから、我々がいるのだ！"
10013030-114 = "わぁ～！素敵ですね！まるでお祭りみたいです！"
10013030-115 = "そこ、感心するところ！？そんなの、ただの無鉄砲じゃん！"
10013030-117 = "それで、あなたがシャーレの先生か？これは意外な出会いだな。"
10013030-118 = "[s] \"こんにちは。\""
10013030-119 = "まさかこんなところでお会いできるとは。うちの子たちから話はよく聞いてるよ。"
10013030-120 = "我が温泉開発部が誇る深海温泉リゾートへようこそ！"
10013030-121 = "[s] \"深海……なに？\""
10013030-122 = "もう一度聞くけど……温泉開発部は一体ここで何をしてるの？"
10013030-123 = "フッ、もちろん――温泉開発に決まっているだろう！"
10013030-124 = "こんな密林の中で……ですか？"
10013030-125 = "たしかに密林ではあるが、同時に海辺に隣接した場所でもある。"
10013030-126 = "そしてこの地底には――そう！海底火山を刺激し、この沖合の海洋深層水を温泉と化す秘蔵の地脈がある！私の嗅覚がそう告げているのだ！"
10013030-127 = "故に我々はそれを掘り、温泉にする！"
10013030-128 = "[s] \"あっ！それ、この間も聞いた話だね！\""
10013030-129 = "せ、先生！？"
10013030-130 = "フッフッフ。いいか、海洋深層水の温泉はすごいんだぞ？#n私の推測によると、その効能だけでも約365種類は超える！"
10013030-131 = "その中でも特に主な効能を挙げると、体力推進、成績向上、家内安全、さらには超常的な忍術の会得さえもある！"
10013030-132 = "す、すごいです！#n海洋深層水にそのような効果があるとは……イズナ、初めて知りました！"
10013030-133 = "[s] \"イズナ！？\""
10013030-134 = "いやいやいや、そんなわけないでしょ！"
10013030-135 = "っていうか、こんなめちゃくちゃな子たちが本当に群島で一番の勢力なの？"
10013030-136 = "ああ、それなら事実だ。"
10013030-137 = "私たちが温泉開発頑張ってる間に、いろんな人が契約書とリゾート地と契約書を狙ってやってきたんだよ〜"
10013030-138 = "無論、その度に我が温泉開発部の名のもとに撃退してやったがな。#nアレは実に波瀾万丈だったよ。"
10013030-139 = "今こき使っている者たちは、その際に得た戦利品といったところさ。"
10013030-140 = "人手は増えるし、"
10013030-141 = "新しく温泉開発に参加できた子も幸せ！"
10013030-142 = "つまり、一石二鳥ってこと！"
10013030-143 = "ほんと、カスミ部長は天才だよー！"
10013030-144 = "ハーハッハッハッハ！何人たりとも、我々の海洋深層水に向けた情熱を止められはしない！"
10013030-145 = "[s] \"海洋深層水への執念……恐るべし、温泉開発部！\""
10013030-146 = "ところで、君たちは一体何用だ？我が温泉リゾートの客には見えんが。"
10013030-147 = "まさか「リゾート狩り」か？"
10013030-152 = "……あなたたちも「リゾート使用権」って書かれた契約書を持っているのよね？"
10013030-153 = "あっ、うん！#nネットで安く売ってたから、これなら温泉開発できると思って買っちゃった！"
10013030-154 = "[s] \"ネットで売ってたの！？\""
10013030-155 = "そうだよ。それがどうかしたの？"
10013030-157 = "実は、その契約書はオクトパスバンクがばら撒いた違法な契約書なんです。"
10013030-158 = "私たちはそれを回収しに来たの！"
10013030-159 = "だからお願いします！契約書をイズナたちに返してください！"
10013030-161 = "ほぉ……ふーん……へぇ……なるほど。"
10013030-162 = "要するに、我々に協力してほしい、ということか。"
10013030-163 = "ええ、そういうことなんだけど……"
10013030-167 = "断る。"
10013030-169 = "えっ！？"
10013030-170 = "どんな事情があるにせよ、我々がここを買った事実に変わりはない。#nそれに、この温泉リゾートには既にかなりの額を投資しているのでな。"
10013030-171 = "うん！駐車場とか休憩施設とか宿泊施設とか、そういうのもう作っちゃってるし！"
10013030-172 = "まあ、肝心の温泉だけはまだなんだけどね！"
10013030-173 = "[s] \"その時点で温泉リゾートと呼んでいいの……？\""
10013030-174 = "故に、「はい、わかりました」と渡すわけにはいかんのだ！"
10013030-175 = "ということは……"
10013030-176 = "この契約書がほしいのなら、文字通り――"
10013030-177 = "決闘を！争奪戦を！声高らかに！#n「狩り」を始めるしかない！"
10013030-178 = "[s] \"み、みんな落ち着いて。まだ話し合いの余地は……\""
10013030-180 = "ううん……不本意だけど……"
10013030-181 = "いいわ！そっちがその気ならやってやろうじゃない！"
10013030-182 = "もともと、こっちだって、その手を考えてなかったわけじゃないし！"
10013030-183 = "一歩も退かないその豪快さ！気に入った！そう来なければ！"
10013030-184 = "それじゃ！準備はいい？"
10013030-185 = "れでぃ――ご～！"
