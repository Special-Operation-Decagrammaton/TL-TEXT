[translation]
10013030-1 = "Episódio 3; Os Mineradores de Enxofre (1)"
10013030-5 = "Primeiro, vamos em direção à base do grupo mais próximo."
10013030-6 = "Não gosto muito de dizer isso, mas acho que o nome era..."
10013030-11 = "[ns1] \"Os Mineradores de Enxofre que buscam a fonte termal lendária\" --\n[ns2] \"-- é por aqui que eles ficam, não é?\""
10013030-14 = "Esse nome é muito difícil de dizer... Além disso, não faço ideia de que tipo de grupo eles são..."
10013030-15 = "Bem, diziam que havia um resort por aqui, mas..."
10013030-16 = "Não consigo encontrar nada que se pareça com um."
10013030-17 = "Aos olhos da Izuna, isso parece apenas uma praia de areia comum!"
10013030-19 = "Hmm, será que não estamos conseguindo encontrar a entrada?"
10013030-21 = "……？"
10013030-26 = "Professor."
10013030-27 = "[s] \"O que foi, Chise?\""
10013030-28 = "……Estou ouvindo um som de batidas."
10013030-29 = "[s] \"Um som...?\""
10013030-39 = "Ah, é verdade! Ei, esse som..."
10013030-40 = "Vem dali. Vamos dar uma olhada!"
10013030-51 = "Será que este é o resort operado pela facção mais forte deste arquipélago?"
10013030-52 = "Para ser sincera, como posso dizer..."
10013030-53 = "[s] \"É só uma floresta densa.\""
10013030-54 = "Você disse isso mesmo pensando?!"
10013030-55 = "Eu realmente pensei nisso desde o momento em que entramos!"
10013030-62 = "Este lugar... não sinto que seja um resort comum."
10013030-63 = "Eles estão cavando a terra e destruindo várias coisas por toda parte... O que será que eles estão fazendo, mestre?"
10013030-64 = "[s] \"Aquilo provavelmente é...\""
10013030-66 = "Ei! Quem são vocês?! Por que não entraram pelo portão principal?!"
10013030-72 = "Não sei bem quem são, mas encontramos intrusos suspeitos! Todos, reunir-se!!"
10013030-73 = "Hã? Ei, espere um pouco!?"
10013030-80 = "[ns] \"Ué, vocês não são...\""
10013030-81 = "O quê, estão de roupa de banho, então são... clientes?"
10013030-82 = "Mas para serem clientes... hã? Ei, aquele adulto parado no meio. Não é suspeito?"
10013030-83 = "Esse rosto, acho que já vi em algum lugar... onde será que foi..."
10013030-85 = "……Ei, é o professor do Schale!"
10013030-86 = "[s] \"Meg!\""
10013030-87 = "Opa, opa~ Professor!"
10013030-89 = "Mais uma conhecida do professor...?"
10013030-90 = "[s3] \"Estou recebendo olhares muito suspeitos...!\"\n[s4] \"Eu só conheço o Departamento de Desenvolvimento de Fontes Termais!\""
10013030-93 = "Ah, entendi! Então \"Os Mineradores de Enxofre\" era o Departamento de Desenvolvimento de Fontes Termais de Gehenna."
10013030-94 = "Isso mesmo! Nós somos o Departamento de Desenvolvimento de Fontes Termais, chamados de \"Os Mineradores de Enxofre que buscam a fonte termal lendária\" neste \"Lost Paradise Resort\" --"
10013030-95 = "Um nome super incrível, não é? #nBom, fui eu mesma que inventei! Tenho bom gosto para nomes, né?"
10013030-96 = "[s] \"Então você mesma se autodenominou!?\""
10013030-97 = "Pois é♪ Mas, professor, que raro encontrar você aqui~?"
10013030-98 = "Por que você está aqui? Será que se perdeu?"
10013030-100 = "Essa pergunta deveria ser nossa. O que vocês estão fazendo no meio dessa floresta densa?"
10013030-101 = "Parece ser algo diferente de um negócio de resort ilegal..."
10013030-103 = "Essa pergunta é realmente tola!"
10013030-108 = "Ah, Chefe Kasumi!"
10013030-112 = "Nós estamos aqui porque há fontes termais! Não, mesmo que não houvesse, nós estaríamos aqui!"
10013030-113 = "De qualquer forma, basta cavar tudo e transformar em uma fonte termal! É por isso que estamos aqui!"
10013030-114 = "Uau~! Que incrível! Parece até um festival!"
10013030-115 = "Você está impressionada com isso?! Isso é pura imprudência!"
10013030-117 = "Então, você é o Sensei do Schale? Que encontro inesperado."
10013030-118 = "[s] \"Olá.\""
10013030-119 = "Quem diria que nos encontraríamos em um lugar como este. Já ouvi muito sobre você das minhas subordinadas."
10013030-120 = "Bem-vindo ao resort de águas termais de águas profundas, o orgulho do nosso Departamento de Desenvolvimento de Fontes Termais!"
10013030-121 = "[s] \"Águas profundas... o quê?\""
10013030-122 = "Vou perguntar de novo... o que exatamente o Departamento de Desenvolvimento de Fontes Termais está fazendo aqui?"
10013030-123 = "Hmph, é claro que é — desenvolvimento de fontes termais, obviamente!"
10013030-124 = "No meio desta floresta densa...?"
10013030-125 = "De fato, é uma floresta densa, mas ao mesmo tempo, é um local adjacente à costa."
10013030-126 = "E aqui no subsolo — sim! Existe uma veia terrestre secreta que estimula vulcões submarinos e transforma a água profunda do oceano desta costa em águas termais! Meu faro me disse isso!"
10013030-127 = "Portanto, vamos escavá-la e transformá-la em uma fonte termal!"
10013030-128 = "[s] \"Ah! Essa história eu já ouvi outro dia!\""
10013030-129 = "Se, Sensei!?"
10013030-130 = "Hahaha. Escute, as águas termais de águas profundas são incríveis, sabe? #nDe acordo com minhas estimativas, seus benefícios superam 365 tipos!"
10013030-131 = "Dentre eles, os principais benefícios incluem aumento de vigor, melhora nas notas, segurança familiar e até mesmo a aquisição de ninjutsu sobrenatural!"
10013030-132 = "I-incrível! #nEu, Izuna, não sabia que a água profunda do oceano tinha tais efeitos!"
10013030-133 = "[s] \"Izuna!?\""
10013030-134 = "Não, não, não, isso não faz o menor sentido!"
10013030-135 = "Digo, essas garotas tão malucas são realmente a maior força do arquipélago?"
10013030-136 = "Ah, isso é um fato."
10013030-137 = "Enquanto nos esforçávamos no desenvolvimento das fontes termais, várias pessoas vieram atrás de contratos e do resort~"
10013030-138 = "Claro, todas as vezes nós as repelimos em nome do nosso Departamento de Desenvolvimento de Fontes Termais. #nFoi uma jornada e tanto."
10013030-139 = "As pessoas que estamos usando como mão de obra agora são basicamente os espólios de guerra que obtivemos naquelas ocasiões."
10013030-140 = "Aumentamos nossa mão de obra,"
10013030-141 = "e as garotas que puderam participar do novo desenvolvimento de fontes termais ficaram felizes!"
10013030-142 = "Ou seja, matamos dois coelhos com uma cajadada só!"
10013030-143 = "Sério, a Chefe Kasumi é um gênio!"
10013030-144 = "Hahahaha! Ninguém pode deter nossa paixão pelas águas profundas!"
10013030-145 = "[s] \"A obsessão pelas águas profundas... o Departamento de Desenvolvimento de Fontes Termais é assustador!\""
10013030-146 = "Aliás, o que vocês vieram fazer aqui? Não parecem clientes do nosso resort."
10013030-147 = "Será que são "caçadores de resorts"?"
10013030-152 = "……Vocês também têm um contrato escrito "Direito de Uso do Resort", não é?"
10013030-153 = "Ah, sim! #nEstava à venda por um preço baixo na internet, então comprei achando que poderíamos desenvolver fontes termais!"
10013030-154 = "[s] \"Estava à venda na internet!?\""
10013030-155 = "Sim. Algum problema com isso?"
10013030-157 = "Na verdade, esse contrato é um documento ilegal espalhado pelo Octopus Bank."
10013030-158 = "Nós viemos aqui para recuperá-lo!"
10013030-159 = "Por favor, devolvam o contrato para a Izuna e os outros!"
10013030-161 = "Oh... entendo... hum... interessante."
10013030-162 = "Em suma, vocês querem que colaboremos, é isso?"
10013030-163 = "Sim, é basicamente isso, mas..."
10013030-167 = "Recusado."
10013030-169 = "Hã!?"
10013030-170 = "Não importa a circunstância, o fato de termos comprado este lugar não muda. #nAlém disso, já investimos uma quantia considerável neste resort."
10013030-171 = "Sim! Já construímos estacionamento, áreas de descanso, instalações de hospedagem e tudo mais!"
10013030-172 = "Bem, a parte principal, que é a fonte termal, ainda não está pronta!"
10013030-173 = "[s] \"Dá para chamar de resort de águas termais nesse estágio...?\""
10013030-174 = "Portanto, não posso simplesmente dizer "sim, entendi" e entregar!"
10013030-175 = "Isso significa que..."
10013030-176 = "Se vocês querem este contrato, então, literalmente —"
10013030-177 = "Um duelo! Uma disputa! Em alto e bom som!#nNão temos escolha a não ser começar a \"caçada\"!"
10013030-178 = "[s] \"P-pessoal, acalmem-se. Ainda há espaço para conversarmos...\""
10013030-180 = "Não... embora eu não queira..."
10013030-181 = "Tudo bem! Se é assim que vocês querem, então vamos nessa!"
10013030-182 = "Para começo de conversa, nós também já tínhamos considerado essa possibilidade!"
10013030-183 = "Essa audácia de não recuar nem um passo! Gostei! É assim que se fala!"
10013030-184 = "Então! Estão prontas?"
10013030-185 = "Preparar... já!"
