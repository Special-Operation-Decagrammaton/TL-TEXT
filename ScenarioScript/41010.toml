[translation]
41010-1 = "Episódio 1: Forças Especiais Incontroláveis"
41010-5 = "Há quanto tempo, Professor."
41010-6 = "[s] \"Ah, Rin-chan.\""
41010-7 = "……Quem diabos é 'Rin-chan' para você?"
41010-8 = "Esse tipo de intimidade deveria ser――"
41010-9 = "Não, deixe pra lá."
41010-10 = "O motivo pelo qual o contatei é que gostaria de discutir alguns assuntos."
41010-11 = "Já faz um bom tempo que você está na Schale."
41010-12 = "Recebo seus relatórios, então estou ciente de tudo o que tem acontecido."
41010-13 = "Parece que você tem se destacado em várias frentes. Agradecemos imensamente. Tem nos ajudado bastante."
41010-14 = "Dito isso, há algumas coisas que gostaria de pedir… ou melhor."
41010-15 = "Mais especificamente, sobre os relatórios da Schale e os novos rumos do Conselho Estudantil…"
41010-19 = "…Não, é melhor discutirmos isso pessoalmente."
41010-20 = "Você tem algum compromisso esta tarde?"
41010-21 = "Posso pelo menos preparar um chá. Apareça se estiver livre."
41010-22 = "Estarei aguardando."
41010-28 = "Ahm… Professor, bom trabalho."
41010-29 = "O clima parece meio estranho… o senhor está bem?"
41010-30 = "[s1] \"É… acho que vou levar uma bronca.\"\n[s2] \"Levar bronca da Rin é um prêmio.\""
41010-31 = "Mas acho que não vai ser só bronca, não."
41010-32 = "S-Sério? Ainda bem…"
41010-33 = "Mas acho que não vai ser só bronca, não."
41010-34 = "Como a Rin-senpai disse, o senhor tem se destacado por toda parte!"
41010-35 = "Ela disse que ia preparar um chá. Quem sabe não vai ser um baita de um banquete?"
41010-36 = "[s] \"Tomara.\""
41010-37 = "Com certeza! Agora vamos, Professor, é melhor nos apressarmos!"
41010-44 = "Ah, Professor. Estava à sua espera."
41010-45 = "[s3] \"Quanto tempo.\"\n[s4] \"Vim para o banquete!\""
41010-46 = "Não temos muito tempo, então vamos direto ao assunto."
41010-47 = "……Hã? Do que você está falando?"
41010-48 = "Por que essa cara de decepção? Eu disse que prepararia 'um chá', nada mais."
41010-49 = "Sente-se ali e aguarde."
41010-50 = "Não temos muito tempo, então vamos direto ao assunto."
41010-51 = "Como eu disse, é sobre os relatórios da Schale."
41010-52 = "[s] \"……?\""
41010-53 = "Não vou questionar o conteúdo das suas atividades. Sei que as alunas têm falado bem de você…"
41010-54 = "O problema é o que vem depois."
41010-55 = "Os relatórios que você envia ao Conselho Estudantil…"
41010-62 = "Por exemplo, esta planilha de despesas."
41010-63 = "Todos os valores foram escritos com algarismos arábicos."
41010-64 = "[s] \"……Não pode?\""
41010-65 = "Sim, não pode."
41010-66 = "Em documentos oficiais manuscritos, os valores devem ser escritos por extenso, em kanji. É para evitar falsificações e erros de leitura."
41010-67 = "Outro exemplo: este carimbo. Está três centímetros desalinhado com o campo."
41010-68 = "Inconsistências como essa geram retrabalho no processo final. Preciso que sejam corrigidas."
41010-69 = "Bem, já que está aqui, pode fazer as correções agora."
41010-70 = "[s5] \"Desculpa…\"\n[s6] \"…Rin, você não podia me ajudar?\""
41010-71 = "Haaah… Isso é trabalho do Professor [USERNAME] na Schale, não é mesmo?"
41010-72 = "Haaah… Isso é trabalho do Professor [USERNAME] na Schale, não é mesmo?"
41010-73 = "Se o senhor tivesse entregado os documentos corretos desde o início, nada disso teria acontecido."
41010-77 = "……Não é só isso. Por que esse relatório está escrito em linguagem tão informal?"
41010-78 = "Mesmo sendo um documento confidencial, use a norma culta."
41010-79 = "Se tiver dúvidas, consulte o 'Artigo 15º' do regulamento de documentos oficiais do Conselho que lhe entreguei…"
41010-82 = "(Depois disso, a Rin apontou várias outras falhas…)"
41010-89 = "Ahm, Rin-senp――"
41010-90 = "N-Não, Oficial Administrativa. Tenho um assunto a tratar…"
41010-92 = "O que foi?"
41010-93 = "Bem, é um caso de emergência…"
41010-98 = "Ahm, sobre o despejo da Academia SRT… parece que alguns alunos estão resistindo, ocuparam um parque e iniciaram um protesto."
41010-99 = "As unidades que preparamos com antecedência estão com dificuldades para contê-los…"
41010-102 = "……"
41010-103 = "……Haaah."
41010-104 = "Então contate o Bureau de Segurança Pública da Valkyrie."
41010-105 = "A-Entendido…!"
41010-109 = "[ns7] \"Desculpa, eu acabei ouvindo…\"\n[ns8] \"Aconteceu alguma coisa?\""
41010-110 = "……Não se preocupe. É algo corriqueiro."
41010-111 = "……Não se preocupe. É algo corriqueiro."
41010-112 = "Desde o desaparecimento da Presidente do Conselho Estudantil, isso tem sido rotina."
41010-113 = "[s] \"O que é essa Academia SRT…?\""
41010-114 = "……SRT, ou 'Special Response Team'."
41010-115 = "Uma academia de elite criada para lidar com missões especiais… que *existia*."
41010-116 = "Até um tempo atrás… quando a Presidente ainda estava aqui."
41010-120 = "Agora, isso não é mais da sua conta."
41010-121 = "Continuemos. Sobre este documento, o Artigo 21º, Parágrafo 3º do regulamento de documentos oficiais diz que…"
41010-124 = "(Depois de mais um tempo…)"
41010-130 = "Ahm, Oficial Administrativa…"
41010-131 = "……Sim, mais algum problema?"
41010-132 = "Bem… é que…"
41010-133 = "As alunas do Bureau de Segurança que foram enviadas para conter o protesto… foram derrotadas."
41010-134 = "……Os manifestantes são apenas 'alguns alunos'?"
41010-135 = "S-Sim. Cerca de um esquadrão, pelo que me disseram…"
41010-136 = "Mas, como era de se esperar da SRT, o armamento delas é poderoso… o Bureau sozinho não está dando conta…"
41010-140 = "Está complicado. Eu não queria que isso se tornasse um grande problema…"
41010-141 = "……Não há escolha. Contate o 'Bureau de Segurança Pública' da Academia Valkyrie."
41010-142 = "Elas são especializadas em 'contraterrorismo'. Mesmo sendo a elite da SRT, devem dar conta. Informarei o Escritório de Defesa."
41010-143 = "S-Sim senhora…!"
41010-147 = "[ns] \"Posso ajudar em alguma coisa?\""
41010-148 = "Não, fique tranquilo. Isso é um problema do Conselho Estudantil."
41010-149 = "O que o senhor precisa resolver agora são os documentos à sua frente."
41010-150 = "Não me diga que…"
41010-151 = "…está pensando em 'fugir do trabalho burocrático'?"
41010-152 = "[s9] \"Q-Qualquer coisa…\"\n[s10] \"Bom! Vamos trabalhar nesses documentos! Que divertido!\""
41010-153 = "……Então vamos continuar."
41010-154 = "……Então vamos continuar."
41010-155 = "Aqui, ao corrigir o carimbo, em vez de fazer assim……"
41010-157 = "(Depois disso…)"
41010-164 = "Oficial Administrativa…"
41010-168 = "Não me diga…"
41010-169 = "Sim, os alunos do Bureau também…"
41010-170 = "O relatório diz: 'Foram incapazes de sequer se aproximar do parque, dizimados por tiroteio maciço e armadilhas'…"
41010-171 = "Os repórteres da Escola Kronos chegaram ao local, e a cobertura ao vivo está inflamando ainda mais a situação."
41010-172 = "Se isso continuar, o problema vai ficar cada vez maior…"
41010-173 = "……"
41010-174 = "Ora ora, por que essas coisas acontecem uma atrás da outra…"
41010-178 = "Ahm, Rin-senpai… numa hora dessas, que tal pedir ajuda ao Professor da Schale?"
41010-179 = "Além da capacidade de comando do professor, ele pode mobilizar as melhores de cada escola instantaneamente…"
41010-180 = "Se nem a Valkyrie está dando conta, não vejo outra opção…"
41010-181 = "……"
41010-182 = "……Haaah."
41010-186 = "……Professor, temos um pequeno problema."
41010-187 = "Gostaria de resolver isso só com as nossas forças, mas…"
41010-188 = "Posso contar com o senhor?"
41010-189 = "[s11] \"Sim, pode deixar.\"\n[s12] \"Isso aí, finalmente!\""
41010-190 = "Sim. Pode esquecer esses documentos por ora. Eu dou um jeito."
41010-191 = "Sim. Pode esquecer esses documentos por ora. Eu dou um jeito."
41010-192 = "Acredito que o senhor já tenha uma noção da situação: alguns alunos da SRT estão protestando. Vá até lá e faça com que parem."
41010-193 = "É apenas um esquadrão, então não deve ser um grande efetivo… mas o armamento da SRT é extremamente poderoso. Tome cuidado."
41010-194 = "Haverá alunas da Valkyrie no local para dar apoio."
41010-195 = "Então, boa sorte."
41010-197 = "Próximo Episódio: Visitantes Indesejados"