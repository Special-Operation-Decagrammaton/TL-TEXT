[translation]
41010-1 = "Episódio 1;Forças Especiais Fora de Controle"
41010-5 = "Há quanto tempo, Sensei."
41010-6 = "[s] \"Ah, Rin-chan!\""
41010-7 = "……Quem é \"Rin-chan\" aqui?"
41010-8 = "Guarde esse nível de intimidade para outras ocasiões……"
41010-9 = "Enfim, deixando as brincadeiras de lado."
41010-10 = "Entrei em contato porque tenho alguns assuntos para discutir com#nvocê."
41010-11 = "Já faz um bom tempo desde que você assumiu a Schale,#nnão é?"
41010-12 = "Tenho lido os seus relatórios,#nentão estou ciente de que muita coisa aconteceu."
41010-13 = "Pelo visto, você tem feito um ótimo trabalho por aí.#nGraças a você, nós do Conselho Estudantil Geral#ntambém fomos poupadas de muita dor de cabeça."
41010-14 = "Mas enfim, eu tenho alguns pedidos a fazer……#nou melhor."
41010-15 = "Especificamente sobre a papelada de relatórios da Schale#ne as novas diretrizes do Conselho Estudantil Geral……"
41010-19 = "……Sabe de uma coisa?#nAcho melhor conversarmos sobre isso pessoalmente."
41010-20 = "Você está com a agenda livre para hoje à tarde?"
41010-21 = "Vou preparar um chá para nós,#nentão, por favor, apareça se puder."
41010-22 = "Fico no aguardo."
41010-28 = "Ahn……#nBom trabalho, Sensei."
41010-29 = "O clima pesou de repente na sala da Rin……#nTá tudo bem?"
41010-30 = "[s1] \"Xi, acho que vou tomar uma bronca daquelas……\"\n[s2] \"Levar bronca da Rin-chan é quase um privilégio!!\""
41010-31 = "Ai, credo! Mas ó, tenho certeza que não vai ser só bronca!"
41010-32 = "É, v-você acha mesmo……?"
41010-33 = "Mas ó, tenho certeza que não vai ser só bronca!"
41010-34 = "Como a própria Rin disse,#nvocê tá arrasando por aí e ajudando todo mundo, Sensei!"
41010-35 = "Ela até comentou que ia preparar um chá,#nentão quem sabe ela não te recebe com um banquete super chique!"
41010-36 = "[s] \"Nossa, ia ser bom demais se fosse verdade……\""
41010-37 = "E com certeza vai ser!#nBom, Sensei, acho melhor você ir indo nessa pra não atrasar!"
41010-44 = "Ah, Sensei. Estava te esperando."
41010-45 = "[s3] \"Quanto tempo!\"\n[s4] \"Cheguei pro meu banquete!\""
41010-46 = "Como não temos tempo a perder, vamos direto ao assunto."
41010-47 = "……Hã?#nDo que o você está falando?"
41010-48 = "E por que essa cara de decepção……?#nEu deixei bem claro que ia#n\"preparar um chá\", e apenas isso."
41010-49 = "Sente-se ali, por favor."
41010-50 = "Como não temos tempo a perder,#nvamos direto ao assunto."
41010-51 = "Como eu te disse pelo telefone,#nprecisamos falar sobre os relatórios e a papelada da Schale."
41010-52 = "[s] \"……?\""
41010-53 = "Não estou aqui para criticar suas ações em campo.#nSei muito bem da sua ótima reputação ajudando as alunas……"
41010-54 = "O problema, no entanto, é o que vem depois das missões.#nA burocracia."
41010-55 = "Nós exigimos que você envie relatórios das atividades para o Conselho,#nporém……"
41010-62 = "Veja este relatório de despesas, por exemplo."
41010-63 = "Todos os valores nas notas fiscais,#nforam preenchidos usando algarismos árábicos normais."
41010-64 = "[s] \"……Ué, Mas não pode?\""
41010-65 = "Não, não pode."
41010-66 = "Em documentos oficiais preenchidos à mão,#nos valores devem ser escritos por extenso em caracteres formais#npara evitar falsificações e erros de leitura."
41010-67 = "E não é só isso.#nOlhe esse carimbo: você bateu ele exatos 3 centímetros fora da margem da caixinha."
41010-68 = "Esse nível de desleixo só nos dá mais dores de cabeça na hora de processar os documentos no sistema.#nGostaria que você refizesse tudo……"
41010-69 = "Na verdade,#nvocê pode aproveitar que está aqui e corrigir isso agora mesmo."
41010-70 = "[s5] \"Foi mal aí……\"\n[s6] \"……Você não quer me dar uma mãozinha com isso não, Rin-chan?\""
41010-71 = "Suspiro……#nEste é o seu trabalho como responsável da Schale, Sensei."
41010-72 = "Suspiro……#nEste é o seu trabalho como responsável da Schale, Sensei."
41010-73 = "Pra começo de conversa,#nse você tivesse entregado a papelada preenchida corretamente desde o íncio,#nnão estaríamos tendo essa conversa."
41010-77 = "……E as pérolas não acabam aí.#nPor que você usa gírias e vocabulário informal em um relatório#nde operação oficial?"
41010-78 = "Eu sei que são arquivos confidenciais que ninguém de fora vai ler,#nmas peço que tenha o mínimo de decência e escreva como um profissional."
41010-79 = "Se estiver com dúvidas,#nconsulte o Artigo 15 do manual de diretrizes em documentos públicos#nque eu lhe entreguei há……"
41010-82 = "(E a Rin-chan continuou listando e me dando uma bronca atrás da outra#npor um bom tempo……)"
41010-89 = "Com licençazinha, Rin-senp……"
41010-90 = "D-digo, Chefe de Administração.#nTemos um probleminha aqui……"
41010-92 = "O que houve?"
41010-93 = "É que acabou de surgir uma situação de emergência……"
41010-98 = "Então, é sobre o fechamento da Academia Especial SRT……#nParece que algumas alunas se revoltaram,#ne ocuparam um parque e estão fazendo um motim……"
41010-99 = "A unidade de resposta que tínhamos de prontidão não está conseguindo#nconter a situação……"
41010-102 = "……"
41010-103 = "……Suspiro."
41010-104 = "Sendo assim, acione os Departamentos de Segurança da Valkyrie."
41010-105 = "A-a-afirmativo……!"
41010-109 = "[ns7] \"Foi mal, mas eu acabei#nescutando a fofoca……\"\n[ns8] \"Deu alguma zica feia aí?\""
41010-110 = "……Não se preocupe com isso.#nÉ só mais um dia normal por aqui."
41010-111 = "……Não se preocupe com isso.#nÉ só mais um dia normal por aqui."
41010-112 = "Desde o sumiço da Presidente do Conselho Estudantil Geral,#nproblemas estourando assim viraram rotina."
41010-113 = "[s] \"E essa tal de Academia Especial SRT……?\""
41010-114 = "……SRT é a sigla para \"[ruby=Equipe de Resposta Especial]Special Response Team[/ruby]\"."
41010-115 = "Como o nome sugere, uma academia especial composta puramente pela elite,#nfocada exclusivamente em missões táticas de alto risco."
41010-116 = "Pelo menos…… até um tempo atrás,#nna época em que a Presidente do Conselho Geral ainda estava conosco."
41010-120 = "De qualquer forma, isso já é passado e não é da nossa conta no momento."
41010-121 = "Podemos continuar?#nSobre este documento aqui, o Parágrafo 3º do Artigo 21 dita claramente que……"
41010-124 = "(Pouco tempo depois……)"
41010-130 = "Com licença, Chefe……"
41010-131 = "……E agora?#nQual é o problema da vez?"
41010-132 = "E-então, o negócio é que……"
41010-133 = "O pessoal dos Departamentos de Segurança que foram enviados#npra conter as manifestantes acabaram sendo……#ncontidos."
41010-134 = "……Você não me disse há pouco que o motim estava sendo causado por#n\"algumas alunas\"?"
41010-135 = "I-isso mesmo!#nPelo relatório, parece ser só o equivalente a um único esquadrão, mas……"
41010-136 = "Mas a gente está falando da SRT, né?#nO poder de fogo delas é um absurdo……#nO pessoal da Segurança comum não deu conta……"
41010-140 = "Mas que inferno……#nEu estava tentando não fazer muito alarde em cima disso……"
41010-141 = "……Fazer o quê. Acione o#n\"Departamento de Segurança Especial\" da Academia Polícial Valkyrie."
41010-142 = "Sendo elas a força-tarefa de elite focada em antiterrorismo,#naposto que dão conta do recado, mesmo o alvo sendo da SRT.#nEu mesma ligo e notifico o Escritório de Defesa."
41010-143 = "E-entendido……!"
41010-147 = "[ns] \"Hm…… Tem alguma coisa que eu possa fazer pra ajudar?\""
41010-148 = "Não, não precisa se incomodar.#nIsso ainda é estritamente um problema interno do Conselho Estudantil Geral."
41010-149 = "O único problema que eu quero que você resolva no momento#né essa montanha de arquivos aqui na sua frente."
41010-150 = "E eu espero de verdade……"
41010-151 = "……Que você não esteja pensando#n\"Ah, finalmente arrumei uma desculpa perfeita pra fugir da papelada\",#nnão é, Sensei?"
41010-152 = "[s9] \"Q-que absurdo, imagina……\"\n[s10] \"Bora lá então! Papelada! Uhuu! Que diversão!\""
41010-153 = "……Sendo assim, vamos voltar ao trabalho."
41010-154 = "……Sendo assim, vamos voltar ao trabalho."
41010-155 = "Olhando aqui neste formulário, por exemplo.#nNa hora de reaplicar o carimbo, você não bate ele assim, e sim……"
41010-157 = "(E mais um tempo se passou……)"
41010-164 = "Chefe……"
41010-168 = "Ah, não me diga que……"
41010-169 = "Sim.#nTodas as alunas da Departamento de Segurança Especial também foram……"
41010-170 = "O relatório de campo diz que:#n\"a unidade foi inteiramente aniquilada por atiradoras e armadilhas táticas#nantes sequer de conseguirem se aproximar do perímetro do parque\"#n……"
41010-171 = "E os repórteres da Academia de Jornalismo Kronos também apareceram no local do nada!#nEles tão transmitindo tudo ao vivo e a tensão lá só piora……"
41010-172 = "Se a gente não fizer nada drástico,#nisso vai virar uma bola de neve gigante……"
41010-173 = "……"
41010-174 = "Sinceramente……#nPor que é sempre uma bomba pior do que a outra em sequência……?"
41010-178 = "Ahn, Rin-senpai……#nSabe, em uma hora dessas,#nnão acha que seria uma ótima ideia envolver o Sensei da Schale……?"
41010-179 = "Deixando as ótimas habilidades táticas de lado,#nele tem autoridade pra convocar de imediato as melhores alunas de qualquer academia de Kivotos#nque seja……"
41010-180 = "Já que nem mesmo a Valkyrie deu conta do recado,#nacho que o Sensei é a nossa única esperança#nsobrado……"
41010-181 = "……"
41010-182 = "……Suspiro."
41010-186 = "……Sensei, no fim das contas,#nrealmente temos um problema."
41010-187 = "A princípio nós iríamos abafar isso e resolver por conta própria,#nmas……"
41010-188 = "Acho que vou ter que pedir a sua ajuda.#nVocê pode cuidar disso?"
41010-189 = "[s11] \"Claro, pode deixar comigo.\"\n[s12] \"Aí sim!! Minha hora de brilhar! Tchau, burocracia!\""
41010-190 = "Tudo bem. Por hora, esqueça esta pilha de papéis……#nEu assumo daqui e arrumo os relatórios que faltam."
41010-191 = "Tudo bem. Por hora, esqueça esta pilha de papéis……#nEu assumo daqui e arrumo os relatórios que faltam."
41010-192 = "Acredito que o senhor já entendeu a situação no ar escutando a conversa,#nmas o fato é: um pequeno esquadrão da SRT está fazendo um motim em um parque.#nPreciso que vá lá e faça elas pararem."
41010-193 = "É só um pequeno esquadrão, então não espere muitas adversárias……#nmas como é da SRT que estamos falando,#no armamento delas é pesado.#nTome bastante cuidado."
41010-194 = "Ainda deve haver alunas da Valkyrie nos arredores do local,#nentão elas podem te dar uma cobertura."
41010-195 = "Boa sorte, Sensei.#nTraga resultados para mim……"
41010-197 = "Próximo Episódio;Visitas Indesejadas"