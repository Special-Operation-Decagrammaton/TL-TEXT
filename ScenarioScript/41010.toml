[translation]
41010-1 = "Episódio 1; Unidade Especial Fora de Controle"
41010-5 = "Faz tempo que não nos falamos, Sensei."
41010-6 = "[s] \"Ah, Rin-chan.\""
41010-7 = "……Quem é \"Rin-chan\"?"
41010-8 = "Esse tipo de intimidade é um pouco..."
41010-9 = "Bem, deixando isso de lado."
41010-10 = "Entrei em contato porque gostaria de conversar sobre algumas coisas."
41010-11 = "Já faz um bom tempo desde que você chegou ao Schale, não é?"
41010-12 = "Recebi seus relatórios, então estou ciente de que muitas coisas aconteceram."
41010-13 = "Parece que você tem sido muito ativo por toda parte. Graças a isso, fomos muito ajudados por aqui também."
41010-14 = "Mas, deixando isso de lado, há algumas coisas que gostaria de pedir... ou melhor, tratar."
41010-15 = "Especificamente sobre os relatórios do Schale e sobre as novas medidas do Conselho Estudantil Federal..."
41010-19 = "……Não, acho melhor conversarmos pessoalmente."
41010-20 = "Você está livre hoje à tarde?"
41010-21 = "Vou preparar um chá, então, se puder, venha até aqui."
41010-22 = "Estarei te esperando."
41010-28 = "Hum... Sensei, bom trabalho."
41010-29 = "Senti um clima um pouco estranho... está tudo bem?"
41010-30 = "[s1] \"Hum, talvez eu leve uma bronca...\"\n[s2] \"Levar uma bronca da Rin é uma recompensa.\""
41010-31 = "Mas tenho certeza de que não será apenas para levar uma bronca."
41010-32 = "É, é mesmo...?"
41010-33 = "Mas tenho certeza de que não será apenas para levar uma bronca."
41010-34 = "Como a Rin disse, o Sensei tem feito um ótimo trabalho por toda parte!"
41010-35 = "Ela disse que vai preparar um chá, talvez ela até prepare uma recepção incrível!"
41010-36 = "[s] \"Ficaria feliz se fosse assim.\""
41010-37 = "Com certeza será! Vamos, Sensei, parece que já está na hora de partir!"
41010-44 = "Ah, Sensei. Estava te esperando."
41010-45 = "[s3] \"Quanto tempo.\"\n[s4] \"Vim aqui para ser bem recebido!\""
41010-46 = "Não temos muito tempo, então vamos direto ao assunto."
41010-47 = "……Sim? Do que você está falando?"
41010-48 = "Por que essa expressão de decepção...? Eu apenas disse que prepararia um chá."
41010-49 = "Sente-se ali e aguarde."
41010-50 = "Não temos muito tempo, então vamos direto ao assunto."
41010-51 = "Como mencionei antes, é sobre os relatórios do Schale."
41010-52 = "[s] \"……?\""
41010-53 = "Não estou aqui para interferir nas suas atividades. Sei que você tem uma ótima reputação entre muitos alunos..."
41010-54 = "O problema é o processamento posterior."
41010-55 = "Você tem enviado os relatórios para o Conselho Estudantil Federal, mas..."
41010-62 = "Por exemplo, este documento de despesas."
41010-63 = "Todos os valores na fatura estão em algarismos arábicos."
41010-64 = "[s] \"……Isso não pode?\""
41010-65 = "Sim, não pode."
41010-66 = "Ao preencher valores à mão em documentos oficiais, pedimos que use numerais chineses. Isso é para evitar falsificações e erros de leitura."
41010-67 = "Além disso, veja este carimbo. Está 3 cm fora do campo indicado."
41010-68 = "Com falhas como essa, o trabalho de processamento aumenta, então gostaria que você corrigisse..."
41010-69 = "Bem, seria bom se pudesse fazer isso agora mesmo."
41010-70 = "[s5] \"Desculpe...\"\n[s6] \"……A Rin não poderia me ajudar?\""
41010-71 = "Ah... isso é trabalho do Schale, do Sensei [USERNAME], não é?"
41010-72 = "Ah... isso é trabalho do Schale, do Sensei [USERNAME], não é?"
41010-73 = "Para começo de conversa, isso só aconteceu porque você não enviou o documento sem erros desde o início."
41010-77 = "……Não é só isso. Por que você escreveu este relatório com uma linguagem tão informal?"
41010-78 = "Mesmo que seja um documento confidencial e pessoas de fora não o vejam, escreva de forma adequada."
41010-79 = "Se não souber como, consulte o \"Artigo 15\" das normas de documentos oficiais do Conselho Estudantil Federal que lhe entreguei anteriormente……"
41010-82 = "（Depois disso, continuei recebendo várias observações da Rin por um tempo……）"
41010-89 = "Ei, Rin-senpa……"
41010-90 = "N-não, Administradora. Eu gostaria de pedir um conselho……"
41010-92 = "O que houve?"
41010-93 = "Bem, é um assunto urgente……"
41010-98 = "Hum, é sobre o fechamento da Academia SRT…… Parece que algumas alunas se rebelaram, ocuparam o parque e começaram um protesto……"
41010-99 = "As unidades que preparamos com antecedência parecem estar com dificuldades para contê-las……"
41010-102 = "……"
41010-103 = "……Haa."
41010-104 = "Nesse caso, entre em contato com o Departamento de Segurança da Valkyrie."
41010-105 = "Ah, c-certo, entendido……!"
41010-109 = "[ns7] \"Desculpe, acabei ouvindo sem querer……\"\n[ns8] \"Algum problema aconteceu?\""
41010-110 = "……Não, não se preocupe. É algo comum."
41010-111 = "……Não, não se preocupe. É algo comum."
41010-112 = "Desde o desaparecimento da Presidente do Conselho Estudantil Federal, coisas assim são o pão de cada dia."
41010-113 = "[s] \"O que é a Academia SRT……?\""
41010-114 = "……SRT, ou seja, \"Special Response Team\"."
41010-115 = "Como o nome sugere, era uma academia para elites especializadas em missões especiais."
41010-116 = "Até pouco tempo atrás…… quando a Presidente do Conselho Estudantil Federal ainda estava aqui."
41010-120 = "Agora, não é algo com que precise se preocupar."
41010-121 = "Vamos continuar. Sobre este documento, o \"Artigo 21, Parágrafo 3\" das normas de documentos oficiais diz……"
41010-124 = "（Algum tempo depois……）"
41010-130 = "Ei, Administradora……"
41010-131 = "……Sim, algum problema de novo?"
41010-132 = "Bem, é que……"
41010-133 = "As alunas do Departamento de Segurança que foram conter o protesto acabaram sendo contidas por elas……"
41010-134 = "……As que começaram o protesto são apenas \"algumas alunas\", certo?"
41010-135 = "S-sim. Em número, parece ser apenas um pelotão……"
41010-136 = "Mas, como esperado da SRT, o armamento delas é consideravelmente poderoso, então o Departamento de Segurança sozinho……"
41010-140 = "Que situação complicada, eu não queria que isso se tornasse um grande problema……"
41010-141 = "……Não tem jeito, entre em contato com o \"Departamento de Segurança Pública\" da Escola de Polícia Valkyrie."
41010-142 = "Como elas são especializadas em \"operações antiterrorismo\", devem conseguir lidar com a situação, mesmo que as oponentes sejam as elites da SRT. Vou avisar o Gabinete de Defesa."
41010-143 = "S-sim……!"
41010-147 = "[ns] \"Tem algo em que eu possa ajudar?\""
41010-148 = "Não, não se incomode. Isso é um problema exclusivo do Conselho Estudantil Federal."
41010-149 = "A primeira coisa que quero que o Sensei resolva são os documentos à sua frente."
41010-150 = "Não quero nem pensar, mas……"
41010-151 = "Você não está pensando em \"usar isso como desculpa para fugir do trabalho burocrático\", está?"
41010-152 = "[s9] \"C-claro que não……\"\n[s10] \"Bem! Vamos focar no trabalho! Que divertido!\""
41010-153 = "……Então, vamos continuar."
41010-154 = "……Então, vamos continuar."
41010-155 = "Como aqui, ao corrigir um carimbo, não se faz assim……"
41010-157 = "（Depois disso）"
41010-164 = "Administradora……"
41010-168 = "Não quero nem pensar, mas……"
41010-169 = "Sim, as alunas do Departamento de Segurança Pública também……"
41010-170 = "Segundo o relatório, \"a unidade foi dizimada por uma chuva de tiros de precisão e armadilhas antes mesmo de conseguir se aproximar do parque\"……"
41010-171 = "Os repórteres da Escola Chronos também chegaram ao local, e parece que a transmissão está fazendo a situação sair do controle..."
41010-172 = "Se continuar assim, o problema só vai aumentar..."
41010-173 = "..."
41010-174 = "Francamente, por que tudo tem que acontecer uma coisa atrás da outra..."
41010-178 = "Hum, Rin-senpai... já que estamos nessa situação, por que não pedimos ajuda ao Sensei do Schale...?"
41010-179 = "Além da capacidade de comando do Sensei, também seria possível mobilizar rapidamente a elite de cada escola..."
41010-180 = "Já que a Valkyrie não consegue dar conta, essa é praticamente a única opção que nos resta..."
41010-181 = "..."
41010-182 = "...Haa."
41010-186 = "...Sensei, temos um pequeno problema."
41010-187 = "Idealmente, gostaríamos de resolver isso apenas entre nós, mas..."
41010-188 = "Poderia nos ajudar?"
41010-189 = "[s11] \"Sim, pode deixar comigo.\"\n[s12] \"Pode deixar, eu cuido disso!!\""
41010-190 = "Sim, por favor, não se preocupe com esses documentos por enquanto. Eu darei um jeito neles."
41010-191 = "Sim, por favor, não se preocupe com esses documentos por enquanto. Eu darei um jeito neles."
41010-192 = "Acredito que você já tenha uma noção da situação, mas algumas alunas da SRT estão fazendo uma manifestação. Por favor, vá pará-las."
41010-193 = "É apenas um esquadrão, então não creio que sejam muitas, mas... o armamento da SRT é extremamente poderoso. Por favor, tome cuidado."
41010-194 = "As alunas da Valkyrie também estão no local, então elas devem oferecer suporte."
41010-195 = "Desejo-lhe boa sorte."
41010-197 = "Próximo episódio: Convidados Indesejados"
