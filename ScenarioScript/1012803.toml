[translation]
1012803-1 = "甘い対価"
1012803-2 = "（翌日、商店街に足を運んだ）"
1012803-3 = "（どうしても買いたいものがあったのだが――）"
1012803-6 = "（しばらく見て回ったものの……）"
1012803-9 = "（……目当てのものは見つからなかった）"
1012803-10 = "（そのとき……）"
1012803-11 = "おや、先生？"
1012803-15 = "奇遇ですね！"
1012803-16 = "お変わりありませんか？"
1012803-17 = "[s] \"もちろん！フユもお買い物？\""
1012803-18 = "ええ、実は……。"
1012803-19 = "交易用の投石機が壊れたので、部品を買いに来ていたんです。"
1012803-20 = "もうすぐ開かれる展覧会用の資材も必要ですし。"
1012803-21 = "[s] \"交易品以外も色々買うんだね。\""
1012803-22 = "……ええ。"
1012803-23 = "ところで、先生はどのようなご用件で？"
1012803-24 = "日用品を買いに来ているようには見えませんが。"
1012803-25 = "おっと、日用品で正解でしたか。"
1012803-26 = "7段合体のスーパー合金変形ロボット……？"
1012803-27 = "いいですね。"
1012803-28 = "日常的に愛でるものという意味では……たしかに日用品かもしれません。"
1012803-29 = "[s] \"ただ、どこにもなくてね。\""
1012803-30 = "なるほど……では、そんな時こそ！"
1012803-31 = "私どもの出番ですよ、お客様！"
1012803-32 = "[s] \"お客様……？\""
1012803-33 = "生産終了のものや、売り切れの商品……。"
1012803-34 = "なんでも手に入れてきますよ♪"
1012803-35 = "[s] \"さすがは特殊交易部の営業室長……！\""
1012803-36 = "もちろん、多少の「対価」はいただきますが……ふふ。"
1012803-37 = "[s] \"対価……？\""
1012803-38 = "えっと……。"
1012803-42 = "その……。"
1012803-43 = "うーん……。"
1012803-44 = "[s] \"……？\""
1012803-45 = "ほら、あれですよ、あれ。"
1012803-46 = "ご飯を奢ってもらうとか、一緒に映画を観にいくとか……。"
1012803-47 = "ご飯じゃなくて、スイーツカフェでも、いい、ですけど……。"
1012803-48 = "[s1] \"じゃあ、ご飯のあとに映画を観て……。\"\n[s2] \"最後はスイーツカフェでゆっくりしようか。\""
1012803-54 = "え、えぇっ！？"
1012803-55 = "ほ、本当ですか！？"
1012803-56 = "じゃなくて！ぜ、ぜひっ――"
1012803-57 = "よ、よろしく、お願いします……。"
1012803-59 = "（フユにご飯をご馳走し、映画を観て、スイーツカフェでゆっくり過ごした）"
1012803-60 = "（……その後、例の変形ロボットが本当にシャーレに届いた）"
