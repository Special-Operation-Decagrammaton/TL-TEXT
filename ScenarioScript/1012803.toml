[translation]
1012803-1 = "preço doce"

1012803-2 = "(No dia seguinte, fui ao bairro comercial)"

1012803-3 = "(Havia algo que eu realmente queria comprar...)"

1012803-6 = "(Embora eu tenha olhado em volta por um tempo...)"

1012803-9 = "(...não consegui encontrar o que procurava)"

1012803-10 = "(Naquela hora...)"

1012803-11 = "Ei, professor?"

1012803-15 = "Que coincidência!"

1012803-16 = "Existe uma mudança?"

1012803-17 = "[s] \"Claro! Fuyu também vai fazer compras?""

1012803-18 = "Sim, na verdade..."

1012803-19 = "O trabuco comercial havia quebrado, então eu estava lá para comprar peças."

1012803-20 = "Também preciso de materiais para uma exposição que será realizada em breve."

1012803-21 = "[s] \"Você compra muitas coisas além de bens comerciais.\""

1012803-22 = "……Sim."

1012803-23 = "Aliás, que tipo de negócio você tem comigo, professor?"

1012803-24 = "Não parece que eles estão aqui para comprar necessidades diárias."

1012803-25 = "Ops, você estava certo sobre as necessidades diárias?"

1012803-26 = "Um robô transformador combinado de super liga de 7 estágios...?"

1012803-27 = "Muito legal."

1012803-28 = "No sentido de que é algo que você admira no dia a dia... certamente pode ser uma necessidade diária."

1012803-29 = "[s] \"É que não consigo encontrar em lugar nenhum.""

1012803-30 = "Entendo... então, essa é a hora!"

1012803-31 = "Chegou a nossa vez, clientes!"

1012803-32 = "[s] \"Cliente...?\""

1012803-33 = "Itens que não estão mais em produção ou esgotados..."

1012803-34 = "Eu vou pegar qualquer coisa para você ♪"

1012803-35 = "[s] \"Como esperado do gerente do escritório de vendas do departamento de comércio especial...!\""

1012803-36 = "Claro, haverá alguma “compensação”...hehe."

1012803-37 = "[s] \"Consideração...?\""

1012803-38 = "Bem..."

1012803-42 = "o……."

1012803-43 = "Hum..."

1012803-44 = "[s] \"...?\""

1012803-45 = "Olha, é isso, é isso."

1012803-46 = "Como me pagar uma refeição ou ir ver um filme juntos..."

1012803-47 = "Seria bom ter um café de doces em vez de arroz, mas..."

1012803-48 = "[s1] \"Ok, vamos assistir a um filme depois do jantar...\"\n[s2] \"Vamos terminar relaxando em uma cafeteria de doces.""

1012803-54 = "Ei, ei! ?"

1012803-55 = "Ah, é verdade! ?"

1012803-56 = "Não! Certamente..."

1012803-57 = "Muito obrigado..."

1012803-59 = "(Eu ofereci comida a Fuyu, assisti a um filme e passei momentos relaxantes em uma cafeteria de doces.)"

1012803-60 = "(...Então, o robô transformado chegou na placa de Petri.)"

