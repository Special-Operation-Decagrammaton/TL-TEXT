[translation]#[Texto Final , mas eventualmente pode haver alterações na formatação de texto. - Filipe 29/06.]
21100-1 = "Episódio 10: De Novo, Rumo às Ruínas."
21100-2 = "Ruínas"
21100-3 = "……Sensei!"
21100-4 = "Abaixa!!"
21100-5 = "(KABÃÃÃÃM!)"
21100-6 = "Uugh…… pessoal, tão todas bem?"
21100-7 = "Eu tô de boa, mas o poder de fogo é maior\ndo que eu esperava…… Sensei, você tá bem!?"
21100-9 = "[ns] \"Sim, tô bem.\""
21100-10 = "Chegaram, os robôs……!"
21100-11 = "Calma, ainda dá pra atrair eles……!"
21100-12 = "……Agora,"
21100-13 = "Aris!"
21100-14 = "Manda ver!"
21100-16 = "(Acena que sim)"
21100-17 = "Meu papel hoje é o de\natacante de área de atributo Luz……"
21100-18 = "Vou exterminar\nos monstros à frente."
21100-19 = "……Surja, ó luz!"
21100-20 = "(KABÃÃÃM!)"
21100-21 = "Boa, deu certo!"
21100-22 = "Aris, você é incrível!"
21100-23 = "A-ainda não! A segunda leva de inimigos\ntá se aproximando!"
21100-24 = "Encarar tudo de uma vez assim é meio……\ndesvantajoso demais; vamos recuar! O Sensei\ntá com a gente, é melhor refazer o plano\ncolocando a segurança em primeiro lugar……!"
21100-25 = "……Não."
21100-26 = "……Recuar agora está fora de questão.\nVamos romper a linha."
21100-27 = "Heein!?"
21100-28 = "Provavelmente, mesmo que a gente recue agora,\na situação só vai piorar. Os robôs ouviram o som\ndo combate e, daqui pra frente, só vão se juntar\ncada vez mais."
21100-29 = "Não sei ao certo quantos são no total, mas é\nprovável que agora seja o momento de menor\nguarda…… pra entrar naquela \"fábrica\" que a\ncoordenada da G.Bible aponta, é a maior chance."
21100-31 = "M-mas……"
21100-32 = "Vai dar tudo certo."
21100-33 = "Aris……?"
21100-34 = "Até hoje, nós, juntas, levamos a cabo 27\nexplorações de masmorra e 139 batalhas de raid."
21100-35 = "Desta vez também, com certeza……\ncom esta party, nós podemos vencer."
21100-36 = "M-mas isso é coisa de jogo, né!?"
21100-37 = "Aconteça o que acontecer, vai ter perigo……\neu também vou me esforçar."
21100-38 = "M-mas, e o Sensei? Diferente da gente,\nse ele levar um ataque……!"
21100-39 = "Pode ficar tranquila."
21100-40 = "Hã?"
21100-41 = "Por mais perigosa que seja a situação,\na Aris vai proteger o Sensei."
21100-43 = "Sensei…… você confia na Aris\ne vem com a gente?"
21100-44 = "[s1] \"Claro.\"\n[s2] \"Sim. Eu também, como parte do grupo, vou fazer o que estiver ao meu alcance.\""
21100-45 = "……!"
21100-46 = "……!"
21100-47 = "Tcharaaam! O Sensei, oficialmente,\nentrou para o grupo!"
21100-48 = "Ufa…… tá bom, eu também vou me decidir\ne encarar!"
21100-49 = "Clube de Desenvolvimento de Jogos,\nbora romper a linha inimiga!"
21100-50 = "Sensei, assuma o comando, por favor!"