[translation]
21100-1 = "Episódio 10; Novamente às Ruínas"
21100-2 = "Ruínas"
21100-3 = "......Sensei!"
21100-4 = "Abaixa!!"
21100-5 = "(BOOOOOOMMMM!)"
21100-6 = "Uugh... Pessoal, estão todos bem?"
21100-7 = "Eu tô de boa, mas o poder de fogo foi maior do que eu imaginava... Sensei, o senhor está bem!?"
21100-9 = "[ns] \"Sim, estou bem.\""
21100-10 = "Lá vêm eles, os robôs...!"
21100-11 = "Tudo bem, a gente ainda consegue atrair a atenção deles...!"
21100-12 = "......Beleza,"
21100-13 = "Aris-chan!"
21100-14 = "Acaba com eles!"
21100-16 = "(Acena)"
21100-17 = "A minha função hoje, é Atacante em Área do elemento Luz..."
21100-18 = "Irei aniquilar os monstros à frente."
21100-19 = "......Luz!"
21100-20 = "(BOOOOOOMMMM!)"
21100-21 = "Beleza, funcionou!"
21100-22 = "Você é incrível, Aris-chan!"
21100-23 = "A-Ainda não acabou! A segunda onda inimiga está se aproximando!"
21100-24 = "Lutar de novo agora é meio... Vai ser muita desvantagem, vamos recuar! O Sensei está com a gente, o melhor seria reagrupar priorizando a segurança, com certeza...!"
21100-25 = "......Não."
21100-26 = "......Nós não podemos recuar agora, vamos abrir caminho à força."
21100-27 = "Eeeh!?"
21100-28 = "Mesmo que a gente recue agora, a situação só vai piorar. Os robôs ouviram o barulho da nossa batalha, então eles vão continuar se juntando cada vez mais depois disso."
21100-29 = "Eu não sei quantos tem ao todo, mas acho que agora é quando eles estão em menor número... Acredito que esta seja a nossa maior chance de entrar naquela 'fábrica' para onde as coordenadas da G.Bible apontam."
21100-31 = "M-Mas..."
21100-32 = "Está tudo bem."
21100-33 = "Aris-chan...?"
21100-34 = "Até o momento, nós tivemos sucesso juntas explorando masmorras 27 vezes e concluindo batalhas de Raid 139 vezes."
21100-35 = "Desta vez também... Com esse grupo, com certeza sairemos vitoriosas."
21100-36 = "M-Mas isso só aconteceu nos jogos, não é!?"
21100-37 = "Independente do que aconteça, perigos sempre existem... Eu também, vou dar o meu melhor."
21100-38 = "M-Mas e o Sensei? Diferente de nós, se ele sofrer um ataque...!"
21100-39 = "Por favor, fiquem tranquilas."
21100-40 = "Eh?"
21100-41 = "Não importa o quão perigosa seja a situação, a Aris irá proteger o Sensei."
21100-43 = "Sensei... Você acredita na Aris e virá junto com a gente?"
21100-44 = "[s1] \"Mas é claro.\"\n[s2] \"Sim. Como membro do grupo, também farei tudo o que eu puder.\""
21100-45 = "......!"
21100-46 = "......!"
21100-47 = "Ta-da-da-daaan! O Sensei se juntou ao grupo mais uma vez!"
21100-48 = "Ufa... Tudo bem, eu também tô pronta!"
21100-49 = "Departamento de Desenvolvimento de Jogos, abrindo caminho através dos inimigos!"
21100-50 = "Sensei, assuma o comando da batalha!"