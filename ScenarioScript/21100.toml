[translation]
21100-1 = "Episódio 10; De volta às ruínas"
21100-2 = "Ruínas"
21100-3 = "……Sensei!"
21100-4 = "Abaixe-se!!"
21100-5 = "（BOOOOM!）"
21100-6 = "Ugh…… pessoal, estão bem?"
21100-7 = "Eu estou bem, mas o poder de fogo deles é maior do que eu pensava…… Sensei, você está bem!?"
21100-9 = "[ns] \"Sim, estou bem.\""
21100-10 = "Eles vieram, os robôs……!"
21100-11 = "Tudo bem, ainda consigo atraí-los……!"
21100-12 = "……Muito bem,"
21100-13 = "Alice-chan!"
21100-14 = "Pode atacar!"
21100-16 = "（Assente）"
21100-17 = "O meu papel hoje é ser uma atacante de área de atributo de luz……"
21100-18 = "Vou aniquilar os monstros à frente."
21100-19 = "……Luz!"
21100-20 = "（BOOOOM!）"
21100-21 = "Ótimo, sucesso!"
21100-22 = "Alice-chan, incrível!"
21100-23 = "A-ainda não! A segunda leva de inimigos está se aproximando!"
21100-24 = "Continuar assim agora é um pouco…… é uma desvantagem, vamos recuar! O Sensei está aqui também, então segurança em primeiro lugar, é melhor replanejarmos a estratégia, com certeza……!"
21100-25 = "……Não."
21100-26 = "……Não podemos recuar agora, vamos avançar."
21100-27 = "Hã!?"
21100-28 = "Provavelmente, se recuarmos agora, a situação só vai piorar. Os robôs ouviram o som da batalha e continuarão se reunindo aqui depois disso."
21100-29 = "Não sei quantos são no total, mas provavelmente agora é o momento em que estão mais dispersos…… Acho que esta é a maior chance de entrarmos naquela \"fábrica\" indicada pelas coordenadas da G.Bible."
21100-31 = "M-mas……"
21100-32 = "Está tudo bem."
21100-33 = "Alice-chan……?"
21100-34 = "Até agora, completamos juntas 27 explorações de masmorras e 139 batalhas de raide."
21100-35 = "Desta vez também, com certeza…… com este grupo, seremos capazes de vencer."
21100-36 = "M-mas isso é coisa de jogo, não é!?"
21100-37 = "Não importa o que aconteça, há perigos…… eu também vou me esforçar."
21100-38 = "M-mas e o Sensei? Diferente de nós, se ele for atingido……!"
21100-39 = "Por favor, fique tranquila."
21100-40 = "Hã?"
21100-41 = "Não importa o quão perigosa seja a situação, a Alice protegerá o Sensei."
21100-43 = "Sensei…… você confia na Alice e virá conosco?"
21100-44 = "[s1] \"Claro.\"\n[s2] \"Sim. Como um membro do grupo, farei o que estiver ao meu alcance.\""
21100-45 = "……!"
21100-46 = "……!"
21100-47 = "Tan-tan-ta-ran! O Sensei se juntou ao grupo novamente!"
21100-48 = "Ufa…… entendi, eu também tomei minha decisão!"
21100-49 = "Departamento de Desenvolvimento de Jogos, vamos romper as linhas inimigas!"
21100-50 = "Sensei, por favor, assuma o comando!"
