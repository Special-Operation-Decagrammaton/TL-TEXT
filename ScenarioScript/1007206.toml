[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1007206-1 = "Mar Profundo, Respiração Ofegante" 
1007206-5 = "（Enquanto eu andava perto do cais da vila de pescadores, esbarrei na Saki durante o seu mergulho.）" 
1007206-6 = "[ns] \"Opa, olá Saki.\"" 
1007206-10 = "Ah, se não é o Sensei." 
1007206-11 = "O que faz por aqui?" 
1007206-12 = "[s] \"Dando uma caminhada.\"" 
1007206-14 = "[ns] \"O que você estava fazendo, Saki?\"" 
1007206-15 = "Eu tava no meio da coleta do lixo jogado no fundo do mar." 
1007206-16 = "Alguns equipamentos de pesca velhos e lixo marinho, como sacolas plásticas, ficam presos nas pedras e no coral lá embaixo." 
1007206-17 = "Como os moradores da vila ajudaram a gente pra caramba, eu resolvi retribuir o favor coletando o lixo enquanto praticava o meu mergulho." 
1007206-18 = "[s1] \"Tão nobre... !\"\n[s2] \"Isso é muito admirável da sua parte, Saki.\"" 
1007206-21 = "Bem, não é grande coisa." 
1007206-22 = "O mar fica bem mais agradável depois que a gente se livra de todo o lixo." 
1007206-23 = "Quando você mergulha num oceano límpido, parece até que você vira um peixe e faz parte daquilo." 
1007206-24 = "[s3] \"Mergulhar no oceano, huh... Parece ser maravilhoso.\"\n[s4] \"Eu gostaria muito de tentar algum dia se a chance surgisse.\"" 
1007206-27 = "Por acaso você não tem experiência em mergulho, Sensei?" 
1007206-28 = "Bem, faz sentido... Como você vai estar fundo na água dependendo totalmente de um cilindro de ar para respirar,\nÉ compreensível que você se sinta receoso com a ideia de tentar mergulhar..." 
1007206-29 = "Mas se você tiver um instrutor nadando do seu lado, na real, acaba sendo um passatempo bem mais relaxante do que ir nadar e bater braço por aí." 
1007206-34 = "Quer saber, Sensei. Já que estamos aqui, não quer experimentar?\nNós temos alguns equipamentos extras, afinal..." 
1007206-35 = "Ainda que surja algum problema lá embaixo, você estará com uma Master Diver, então não precisa ter o mínimo medo." 
1007206-36 = "[s] \"Tem certeza de que tudo bem?\"" 
1007206-37 = "Com certeza. Só vem comigo." 
1007206-38 = "Mudou um pouquinho dos meus planos iniciais, mas... se isso servir como meu agradecimento por tudo..." 
1007206-42 = "De qualquer forma, vai logo trocar para o seu traje de banho." 
1007206-43 = "Eu vou dar uma checada nos equipamentos enquanto isso." 
1007206-46 = "（Sendo guiado pelas mãos atentas da Saki, aos poucos meu corpo foi se acostumando à água e mergulhamos...）" 
1007206-53 = "[wa:200]― [log=사키 수영복]（Muito bem, Sensei. [wa:1650]Mantenha a calma [wa:770]e olhe para cá.）[/log]" 
1007206-56 = "― [log=사키 수영복]（Isso, [wa:900]bem devagar. [wa:1400]Solte a respiração aos poucos.）[/log]" 
1007206-59 = "[wa:200]― [log=사키 수영복]（Fufu, [wa:600]como esperado de você, Sensei. [wa:1350]Aprende rápido.）[/log]" 
1007206-62 = "[wa:370]― [log=사키 수영복]（......Tem algo [wa:1030]estranho.）[/log]" 
1007206-65 = "[wa:200]― [log=사키 수영복]（Ficar a sós com o Sensei [wa:550]no mar, [wa:1800]sem dizer uma única palavra.）[/log]" 
1007206-67 = "― [log=사키 수영복]（Apenas conversando [wa:400]por meio de olhares e gestos...）[/log]" 
1007206-70 = "― [log=사키 수영복]（Parece até que...）[/log]" 
1007206-73 = "[wa:50]― [log=사키 수영복]（......Eh? [wa:650]A minha respiração [wa:600]parece ofegante?）[/log]" 
1007206-76 = "― [log=사키 수영복]（N-Não, [wa:470]não há problema nenhum. [wa:1130]Eu estou bem!）[/log]" 
1007206-79 = "[wa:120]― [log=사키 수영복]（Por algum motivo, [wa:850]diferente do habitual...）[/log]" 
1007206-81 = "― [log=사키 수영복]（A minha respiração [wa:670]está instável.）[/log]" 
1007206-84 = "[wa:200]― [log=사키 수영복]（......Acho que talvez,）[/log]" 
1007206-86 = "[wa:200]― [log=사키 수영복]（Mergulhar a sós com o Sensei [wa:1000]ainda seja um pouco cedo [wa:1150]demais para mim.）[/log]" 
1007206-89 = "（Depois disso, eu curti um tempão mergulhando junto com a Saki.）" 
1007206-92 = "E aí Sensei, como foi a sua primeira vez mergulhando?" 
1007206-93 = "[s] \"Foi a melhor experiência de todas!\"" 
1007206-94 = "Fufu, não há nada que me deixe mais feliz do que saber que você curtiu." 
1007206-98 = "......Pra ser sincera, eu tava um pouco ansiosa." 
1007206-99 = "Como os adultos têm uma infinidade de experiências na vida, coisas que parecem super revigorantes para mim quase sempre não vão dar o mesmo arrepio para você, Sensei..." 
1007206-100 = "Então fiquei achando que eu, sendo a operadora de vanguarda, não seria capaz de assumir as rédeas e te guiar com algo interessante dessa vez..." 
1007206-101 = "[s] \"Você não precisa se forçar a ser a líder sempre, não acha?\"" 
1007206-102 = "Mas... você está sempre me ajudando, e eu nunca consigo retribuir――" 
1007206-103 = "Isso não é meio injusto?" 
1007206-104 = "[s] \"Sabe Saki, o mundo costuma ser muito injusto.\"" 
1007206-108 = "......Hmph." 
1007206-109 = "Bem, você parece ter gostado de mergulhar, então..." 
1007206-114 = "Me chama de novo se bater a vontade de nadar pelo mar!" 
1007206-115 = "Sempre que quiser, eu serei a sua dupla de mergulho (Buddy)." 