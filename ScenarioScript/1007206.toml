[translation]
1007206-1 = "深い海、浅い呼吸"
1007206-5 = "（漁村の波止場近くを散歩していたら、ダイビング中のサキと遭遇した)"
1007206-6 = "[ns] \"やあ、サキ。\""
1007206-10 = "あれ、先生じゃないか。"
1007206-11 = "何してるんだ？"
1007206-12 = "[s] \"散歩中だよ。\""
1007206-14 = "[ns] \"サキは何してるの？\""
1007206-15 = "海底に沈んでいるゴミを回収していたところだ。"
1007206-16 = "捨てられた漁具やビニール袋みたいな海洋ゴミが、岩なんかに引っかかっていてな。"
1007206-17 = "村の住民たちには色々と助けられたし、ダイビングの練習も兼ねてゴミを拾ってたんだよ。"
1007206-18 = "[s1] \"えらい……！\"\n[s2] \"サキは立派だね。\""
1007206-21 = "まぁ、大したことじゃない。"
1007206-22 = "ゴミがなくなった海中は、気持ちがいいからな。"
1007206-23 = "綺麗になった海を泳いでいると、自分も魚になったような気分になれるから。"
1007206-24 = "[s3] \"ダイビングかぁ……いいね。\"\n[s4] \"機会があれば、いつかやってみたいな。\""
1007206-27 = "先生はダイビングの経験がないのか？"
1007206-28 = "まぁたしかに……海中深くに潜るわけだし、呼吸もシュノーケル頼りではあるから、#n不安を抱くのも分からなくはないが……"
1007206-29 = "でも、インストラクターが一緒なら、むしろ水泳より手軽に楽しむことができる。"
1007206-34 = "そうだ、先生。せっかくだし、挑戦してみないか？#n装備なら予備があるし……"
1007206-35 = "万が一トラブルが発生しても、マスターダイバーの私がいれば、何も問題ない。"
1007206-36 = "[s] \"本当にいいの？\""
1007206-37 = "もちろん。任せてくれ。"
1007206-38 = "当初の予定とは違うけど……これが、日頃のお礼になるなら……"
1007206-42 = "とりあえず、水着に着替えてきてくれ。"
1007206-43 = "私は装備の点検をしておくから。"
1007206-46 = "（サキに手を引かれながら、まずは水に身体を慣らした……）"
1007206-53 = "[wa:200]― [log=사키 수영복]（さあ、先生。[wa:1650]落ち着いて、[wa:770]こっちを見るんだ）[/log]"
1007206-56 = "― [log=사키 수영복]（そうそう、[wa:900]ゆっくり。[wa:1400]息をゆっくり吐いて）[/log]"
1007206-59 = "[wa:200]― [log=사키 수영복]（ふふっ、[wa:600]さすが先生。[wa:1350]習得が早いな）[/log]"
1007206-62 = "[wa:370]― [log=사키 수영복]（……なんか[wa:1030]変な感じだ）[/log]"
1007206-65 = "[wa:200]― [log=사키 수영복]（海の中で[wa:550]先生と二人きり、[wa:1800]言葉もなく）[/log]"
1007206-67 = "― [log=사키 수영복]（視線と[wa:400]ジェスチャーだけで[wa:850]会話していると……）[/log]"
1007206-70 = "― [log=사키 수영복]（まるで……）[/log]"
1007206-73 = "[wa:50]― [log=사키 수영복]（……えっ？[wa:650]呼吸が[wa:600]苦しそうに見える？）[/log]"
1007206-76 = "― [log=사키 수영복]（いや、[wa:470]何も問題ない。[wa:1130]大丈夫だ！）[/log]"
1007206-79 = "[wa:120]― [log=사키 수영복]（なんだか、[wa:850]いつもと違って……）[/log]"
1007206-81 = "― [log=사키 수영복]（呼吸が[wa:670]不安定だ）[/log]"
1007206-84 = "[wa:200]― [log=사키 수영복]（……先生とのダイブ、）[/log]"
1007206-86 = "[wa:200]― [log=사키 수영복]（私には[wa:1000]まだ早かったのかも[wa:1150]しれないな）[/log]"
1007206-89 = "（その後、サキと一緒にダイビングを楽しんだ）"
1007206-92 = "先生、どうだった？初めてのダイビング体験は。"
1007206-93 = "[s] \"最高だったよ！\""
1007206-94 = "ふふ、楽しんでもらえたなら、何よりだ。"
1007206-98 = "……実は、ちょっと不安だった。"
1007206-99 = "大人は経験してきたことが多いから、私にとっては新鮮でも、先生にとってはそうじゃないことも多いだろう……"
1007206-100 = "だから、私はポイントマンなのに、先生を先導することは出来ないんじゃないかって……"
1007206-101 = "[s] \"無理に先導しようとしなくて大丈夫だよ。\""
1007206-102 = "でも……助けられてばかりで、何も返せないなんて――"
1007206-103 = "そんなの、不公平じゃないか。"
1007206-104 = "[s] \"世の中は、不公平なものだからね。\""
1007206-108 = "……ふん。"
1007206-109 = "まぁ、ダイビングは気に入ってもらえたみたいだし……"
1007206-114 = "また海を泳ぎたくなったら、呼んでくれ！"
1007206-115 = "いつだって、私が先生の[ruby=パートナー]バディ[/ruby]になってやるから。"
