[translation]
1007206-1 = "Águas profundas, respiração superficial"
1007206-5 = "(Eu estava fazendo uma caminhada perto do cais na vila de pescadores e me deparei com Saki em um mergulho)."
1007206-6 = "[ns] \"Hey, Saki. \""
1007206-10 = "Oh, não é um sensei?"
1007206-11 = "O que está fazendo?"
1007206-12 = "[\"Estou fazendo uma caminhada. \""
1007206-14 = "[ns] \"O que a Saki está fazendo? \""
1007206-15 = "Eles estão apenas coletando lixo do fundo do mar."
1007206-16 = "Os detritos marinhos, como equipamentos de pesca descartados e sacolas plásticas, ficam presos em rochas e outros objetos."
1007206-17 = "Os habitantes da aldeia me ajudaram muito e eu também estava recolhendo lixo para praticar mergulho."
1007206-18 = "[s1] \"\"\"\"......! \"\n[s2] \"A Saki é magnífica. \"\"\n[s2]]"
1007206-21 = "Bem, não é nada demais."
1007206-22 = "Porque é muito bom estar embaixo d'água quando o lixo acaba."
1007206-23 = "Porque nadar em um mar limpo faz você se sentir como um peixe também."
1007206-24 = "[s3] \"\"\"\"\"......Nice. \"\n[s4]\"Se eu tiver a chance, gostaria de experimentar um dia. \""
1007206-27 = "O sensei não tem experiência em mergulho?"
1007206-28 = "Bem, é verdade que você estará ...... debaixo d'água e dependerá de um snorkel para respirar, então é compreensível que você tenha um pouco de #n-ansiedade. ......"
1007206-29 = "Mas, com um instrutor, é mais fácil e mais agradável do que nadar."
1007206-34 = "Sim, senhor. Agora que você está aqui, por que não faz uma tentativa? Tenho alguns equipamentos #n sobressalentes. ......"
1007206-35 = "Se surgir algum problema, comigo como mergulhador mestre, nada é demais."
1007206-36 = "[\"Tem certeza? \""
1007206-37 = "É claro que sim. Eu cuidarei disso."
1007206-38 = "Não é o que planejamos fazer originalmente, mas se ...... é assim que podemos agradecê-lo por seu apoio diário: ......"
1007206-42 = "Enquanto isso, vá vestir seu traje de banho."
1007206-43 = "Vou verificar meu equipamento."
1007206-46 = "(Com a Saki me pegando pela mão, acostumei meu corpo à água pela primeira vez. ......)"
1007206-53 = "[wa:200]- [log=사키 수영복] (Vamos, senhor. [wa:1650]Acalme-se e [wa:770]olhe para mim.)[/log]"
1007206-56 = "- [log=사키 수영복] (Sim, [wa:900]lentamente. [wa:1400]Expire lentamente)[/log]."
1007206-59 = "[wa:200]- [log=사키 수영복] (Ufa, [wa:600]isso é que é um sensei. [wa:1350]Você aprende rápido.)[/log]"
1007206-62 = "[wa:370]- [log=사키 수영복](...... algo [wa:1030]estranho)[/log]"
1007206-65 = "[wa:200]- [log=사키 수영복] (sozinho com o [wa:550]Sensei no mar, [wa:1800]sem palavras)[/log]."
1007206-67 = "- [log=사키 수영복] (quando [wa:850]conversando[/log] apenas com [wa:850] contato visual e [wa:400]gestos)[/log]."
1007206-70 = "- [log=사키 수영복](como se fosse ......)[/log]"
1007206-73 = "[wa:50]- [log=사키 수영복] (...... eh? [wa:650]Sua respiração parece [wa:600]difícil?) [/log]"
1007206-76 = "- [log=사키 수영복] (Não, [wa:470] nada está errado. [wa:1130]Está tudo bem!) [/log]"
1007206-79 = "[wa:120]- [log=사키 수영복](De alguma forma, [wa:850]ao contrário do que é habitual em ......)[/log]"
1007206-81 = "- [log=사키 수영복] (a respiração está [wa:670]instável)[/log]."
1007206-84 = "[wa:200]- [log=사키 수영복](mergulho com o sensei ......,)[/log]"
1007206-86 = "[wa:200]- [log=사키 수영복] (Talvez eu não esteja [wa:1000]preparado[/log] para isso)."
1007206-89 = "(Em seguida, ele e Saki deram um mergulho juntos)"
1007206-92 = "Como foi, doutor? Qual foi sua primeira experiência de mergulho?"
1007206-93 = "[\"Foi ótimo! \""
1007206-94 = "Fico feliz que você tenha gostado."
1007206-98 = "...... Na verdade, eu estava um pouco preocupado."
1007206-99 = "Os adultos têm muita experiência, portanto, o que é novo para mim geralmente não é para o sensei. ......"
1007206-100 = "Portanto, sou o responsável e não devo liderar os Senseies. ......"
1007206-101 = "[\"Você não precisa tentar liderar. \""
1007206-102 = "Mas ...... como você pode continuar sendo ajudado e não dar nada em troca?"
1007206-103 = "Isso não é justo, não é?"
1007206-104 = "[\"O mundo é um lugar injusto. \""
1007206-108 = "...... fn."
1007206-109 = "Bem, eles gostaram do mergulho. ......"
1007206-114 = "Se você quiser nadar no mar novamente, ligue para mim!"
1007206-115 = "Sempre serei seu amigo, sensei."
