[translation]
80000133-1 = "Até que eu me lembre"
80000133-2 = "（Enquanto trabalho no Schale...）"
80000133-7 = "Ei, Sensei..."
80000133-8 = "[s] \"Kanoe, o que houve?\""
80000133-9 = "Ihihi..."
80000133-10 = "O motivo de eu ter entrado em contato... você sabe, não sabe, Sensei?"
80000133-11 = "Afinal, eu e você... estamos ligados pelo fio vermelho do destino..."
80000133-12 = "[s] \"Será que é... chocolate?\""
80000133-13 = "...Acertou."
80000133-14 = "E não é um chocolate comum, é um muffin de chocolate super fofo..."
80000133-15 = "Com ingredientes especiais e muito do meu amor... eu cozinhei no caldeirão."
80000133-16 = "E então, vai experimentar...?"
80000133-17 = "[s] \"Claro! A comida da Kanoe é sempre deliciosa.\""
80000133-18 = "...Eu sabia que você diria isso."
80000133-19 = "Ihi, ihihihi...!"
80000133-20 = "[s1] \"Ah... mas eu tenho um trabalho externo logo mais.\"\n[s2] \"Podemos nos encontrar quando eu voltar e comer com calma?\""
80000133-23 = "...Eu quero agora."
80000133-24 = "[s] \"Eu tenho uns 30 minutos, mas se eu for te encontrar agora――\""
80000133-25 = "Não se preocupe."
80000133-26 = "Eu imaginei que diria isso..."
80000133-27 = "Gaa! Gaaaa...!"
80000133-28 = "[ns] \"Q-que barulho é esse...!?\""
80000133-34 = "...Eu imaginei que isso aconteceria."
80000133-35 = "Ihi... mesmo assim, eu sou uma mulher eficiente."
80000133-36 = "[s] \"D-desde quando você estava aqui!?\""
80000133-37 = "Esqueça isso, o que importa agora é..."
80000133-38 = "...que eu e você estamos aqui."
80000133-39 = "Vamos, feche os olhos...?"
80000133-40 = "（Diante daquela expressão, não consegui resistir ao que a Kanoe pediu...）"
80000133-41 = "（Fecho os olhos silenciosamente）"
80000133-46 = "Ihi, espere um pouquinho..."
80000133-50 = "Gaa! Gaaaa!"
80000133-53 = "Miau! Nyamiau!"
80000133-54 = "[ns] \"...Parece que o número de miados aumentou.\""
80000133-55 = "Eles se reuniram por causa do cheiro...?"
80000133-56 = "Este é um muffin especial para o Sensei, então..."
80000133-57 = "Saiam daqui agora... a parte de vocês fica para outra hora."
80000133-63 = "Aqui está, Sensei. Pode abrir os olhos?"
80000133-68 = "Sensei..."
80000133-69 = "[ns3] \"A-a atmosfera mudou de repente...\"\n[ns4] \"Modo Kanoe-chan fofinha!?\""
80000133-72 = "Sim... isso é o que eu sinto."
80000133-77 = "Kanoe... eu queria muito dar chocolate para o Sensei."
80000133-78 = "Se fizermos isso, tenho certeza de que você vai se lembrar das memórias da vida passada."
80000133-79 = "Daquela lembrança de quando dividimos o chocolate..."
80000133-80 = "Por isso, coma logo."
80000133-81 = "Meu muffin especial...!"
80000133-82 = "[s] \"...!!\""
80000133-83 = "（Como se estivesse possuído por algo, devorei o muffin de chocolate da Kanoe）"
80000133-88 = "E então, está gostoso...?"
80000133-89 = "[s] \"E-está delicioso demais...!\""
80000133-90 = "Ihi...!"
80000133-91 = "Como esperado do Sensei... eu sabia que você ficaria feliz."
80000133-96 = "..."
80000133-97 = "...Ihi, ihihihi."
80000133-98 = "Você absorveu o que era meu... com isso, o ritual está completo."
80000133-99 = "Agora o Sensei será meu para sempre... ihihihi!"
80000133-100 = "Vamos, diga... quem sou eu?"
80000133-101 = "Para o Sensei... quem eu era na minha vida passada?"
80000133-102 = "[ns5] \"U-uma gatinha fofa...!\"\n[ns6] \"U-um corvo obediente...!\""
80000133-106 = "...Será que não foi o suficiente?"
80000133-107 = "Bem, nesse caso, é só você continuar comendo até se lembrar..."
80000133-108 = "Eu já esperava por isso, então preparei um monte."
80000133-110 = "(E assim, passamos um tempo divertido comendo muffins de chocolate com a Canoe, mas...)"
80000133-111 = "(...Eu não consegui me lembrar das memórias da minha vida passada.)"
80000133-117 = "Está tudo bem..."
80000133-118 = "Só mais um pouco, só mais um pouco..."
80000133-119 = "Ihi... ihihihi!"
