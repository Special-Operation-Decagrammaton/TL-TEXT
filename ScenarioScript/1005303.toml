[translation]
1005303-1 = "科学的な料理の秘訣"
1005303-2 = "ミレニアムサイエンススクール・家庭科室"
1005303-4 = "えっ……せ、先生？"
1005303-5 = "ど、どうしてここに……。"
1005303-6 = "[s1] \"ここでユウカが料理の練習をするって聞いたから……。\"\n[s2] \"ユウカの手伝いがしたくて。\""
1005303-7 = "うぅ……先生が来てくれるなんて思わなかった……。"
1005303-8 = "うぅ……先生が来てくれるなんて思わなかった……。"
1005303-9 = "……分かっていたら、もっときちんとした格好をしたのに。"
1005303-10 = "[s] \"……もしかして邪魔だった？\""
1005303-11 = "そんなことはありません！"
1005303-12 = "ただ、その……先生に恥ずかしい姿を見せたくなくて。"
1005303-13 = "先生に食べてもらうのは、うまくなってからにしようと思ってたのに……。"
1005303-14 = "[s] \"ユウカの手料理か……。\""
1005303-15 = "……何ですか、その顔は？"
1005303-16 = "もしかして、私の料理は食べられないんですか？"
1005303-17 = "料理の経験こそありませんが、理論はバッチリですし、それなりに自信はあります。"
1005303-18 = "料理とは食材を加熱したり、混ぜ合わせることで、食べやすい状態に加工することですよね。"
1005303-19 = "この過程で、食材には物理的にも科学的にも無数の変化が生じます。"
1005303-20 = "科学への理解が料理の上達には必須だと専門家たちは述べています。"
1005303-21 = "つまり……科学を完璧に理解している私が料理に失敗することはありません！#nそうでしょう、先生？"
1005303-22 = "[s3] \"たしかに似ている部分もあると思うけど……。\"\n[s4] \"それで、ユウカは何を作るの？\""
1005303-23 = "この「初心者でも大丈夫！毎日続ける簡単お弁当」という人気のレシピ本でオススメされている……。"
1005303-24 = "この「初心者でも大丈夫！毎日続ける簡単お弁当」という人気のレシピ本でオススメされている……。"
1005303-25 = "きんぴらごぼうと卵焼き……あとは定番のタコさんウィンナーにします。#nこれくらいなら私でも……。"
1005303-26 = "よし、まずはごぼうの下ごしらえからですね。"
1005303-27 = "どれどれ……あくを抜くためには、水2Lに対して酢を大さじ1……。"
1005303-31 = "えっと……。"
1005303-32 = "[s] \"どうかしたの？\""
1005303-33 = "……先生。"
1005303-34 = "このレシピには水の温度が書かれていません。#n何度の水を想定しているのでしょうか？"
1005303-35 = "[s] \"何度でもいいんじゃない？\""
1005303-36 = "よくありません！#n水は温度によって体積が変化します！"
1005303-37 = "レシピ通りに作るなら、温度まで合わせないと！#n水温の違いで密度の誤差が生じるかもしれません！"
1005303-38 = "水温で密度差が0.040g/mlまで発生すると仮定して、誤差の範囲は最大でも80g……。"
1005303-39 = "レシピが想定した温度以上の水で調理したことによって、ごぼうの酸味が強くなってしまったら……。"
1005303-40 = "[s5] \"そこまで気にしなくても大丈夫だよ。\"\n[s6] \"落ち着いて、ユウカ。続けてみようか。\""
1005303-41 = "うう、不安です……。"
1005303-42 = "うう、不安です……。"
1005303-44 = "（しかし、その後もユウカの心配は続いた)"
1005303-46 = "せ、先生、どうすれば！#nレシピでは三温糖が使われてますが、実習室には白砂糖しかありません！"
1005303-47 = "白砂糖を入れたせいで、想定外の化学反応が起きてしまったら……。"
1005303-49 = "「60度くらいで2分ほど煮詰める」とあるのに……今測ったら50度なのですが……！"
1005303-50 = "この場合は一体何秒加熱すればいいんですか！？#n2分ほどの「ほど」って具体的にどのくらい！？"
1005303-52 = "せ、先生……！#nこの卵焼き、ちゃんと焼けてますよね！？"
1005303-53 = "わ、笑ってないで、何とか言ってくださいよ！"
1005303-57 = "ようやく……。"
1005303-58 = "完成しました！初めてのお弁当です！"
1005303-59 = "[s] \"お疲れ様。3時間、よく頑張ったね。\""
1005303-60 = "し、仕方ないじゃないですか！"
1005303-61 = "初めてでしたし、火加減の調整が難しかったんです。#nそれに何より……。"
1005303-62 = "……[USERNAME]先生の前で失敗する姿を見せたくなくて。"
1005303-63 = "[s] \"全然、上手だったよ。\""
1005303-64 = "ですが3時間もかかるようでは、晄輪大祭の朝に用意するのは難しそうですね。"
1005303-65 = "事前にお弁当を注文するか、誰か友達に頼もうと思います。"
1005303-71 = "このお弁当は……先生が食べてください。"
1005303-72 = "[s] \"初めて作ったのに、私がもらっていいの？\""
1005303-73 = "はい。先生だったら……いえ、先生がいいんです。"
1005303-77 = "も、もちろん、味を評価してほしいという意味です。#n本当に、それだけですから！"
1005303-83 = "……でも、食べ終わったら……#n感想、聞かせてくださいね。"
1005303-85 = "（その後、ユウカの作ったお弁当は、シャーレに持ち帰って夜食として食べた）"
1005303-86 = "（……冷たいはずのお弁当が、どこか温かくておいしかった）"
