[translation]
10018075-10 = "社長、出てくるのよ！いや、会長なんかな？とにかく早くしなさい！"
10018075-11 = "出てこないなら、もっと暴れちゃいますよ～★"
10018075-12 = "わぁ！あれおいしそう！ちょっと食べてきてもいい？ちょっとだけ！"
10018075-19 = "……会長、早めに出向いたほうが良いかもしれません。"
10018075-20 = "一人、食材倉庫を空にする勢いで食べ続ける者がいます。"
10018075-21 = "ムフウウウウム！すでに大きな損害を被ったが、これ以上は止めねば……！"
10018075-23 = "よし、経営者としてここは決断力を見せるところだ！私が直接出向こうじゃないか！"
10018075-27 = "お話の前に、まずは手厚い歓迎にお礼を申し上げなくては。"
10018075-28 = "ムッフフフ。とんでもない、お嬢さん。"
10018075-29 = "このような扱いを受けた理由を聞いてもよろしいでしょうか？"
10018075-30 = "私はニャオフードの会長。いわば総責任者ということだ。"
10018075-31 = "そんな私のような立場の者に、アポイントメントもなく会談の席を設けようだなんてな。"
10018075-32 = "それに突然の侵入者とあれば、警備システムが反応してもおかしくないだろう？"
10018075-33 = "それなら適切な手続きを踏めば、こうしてお会いできたと？"
10018075-34 = "ムッフフフ。それはまた別の話だ。"
10018075-35 = "ただ、少しばかり時間はかかったろうな。一ヶ月、いや二ヶ月だろうか。"
10018075-36 = "うふふ、"
10018075-37 = "それなら私の選択は間違っていなかったということですね。"
10018075-38 = "お遊びはこの辺にして、さっそくですが本題に移りましょう。"
10018075-39 = "望んでいたところだ。革新を唱え、効率良く進めるのは経営の基本だからな。"
10018075-40 = "それでは食材の味や品質を誤魔化して、粗悪品を流すような行為をやめていただけませんか？"
10018075-41 = "言っている意味が分からんな。"
10018075-42 = "あら。もしやそれが当たり前だと思っているのでしょうか。"
10018075-43 = "利益を重視するあまり、まともな判断力を失っているのでは？"
10018075-44 = "大衆は味の些細な違いなど気にせん。"
10018075-45 = "安い値段で量を食べられれば、それで満足するのだ。"
10018075-50 = "君の言うことが正しいとするなら、一定の水準を満たしていない食材は全て廃棄処分しろ、ということかね？"
10018075-51 = "なぜそんな非効率的な行いをせねばならん？"
10018075-58 = "極めて常識的な考えですが、"
10018075-59 = "それは人を欺く行為だからですわ。"
10018075-62 = "「水清ければ魚棲まず」。"
10018075-63 = "最低限、水をきれいに保つ努力はするべきではないでしょうか？"
10018075-64 = "そんな些細なことを気にする君たちが変だとは思わんのか？"
10018075-65 = "いえ、むしろおかしいのはニャオフードの対応ですわ。"
10018075-66 = "その発言は見逃せんな。"
10018075-67 = "私も予想外の浅い考えが返ってきたことに、失望感を隠せませんね。"
10018075-74 = "……！"
10018075-75 = "……！"
10018075-76 = "良いだろう。それなら対決を提案しよう。"
10018075-78 = "対決、ですか。"
10018075-80 = "簡単だ。料理で揉めているのだから、料理対決といこうじゃないか。"
10018075-81 = "君たちは品質に対して文句があるんだろう。だったら互いの料理の品質を比べるとしよう。"
10018075-82 = "後になって文句を言われても困るから、公正に……ね。"
10018075-88 = "ちょっと待ってよ。何か怪しくない？もしかして罠なんじゃ……。"
10018075-89 = "ん？どういうこと？"
10018075-90 = "本当に大丈夫でしょうか、ハルナ？"
10018075-92 = "たとえ罠だとしても、正面から戦ってこそ私たち美食研究会ですわ。"
10018075-96 = "その提案、受け入れましょう。"
10018075-97 = "ちょうど新年を迎えるわけだ。"
10018075-98 = "新年ですわね。当然、この季節にしか食べられない料理がいくつもあります。"
10018075-99 = "そうだな……対決種目はおせちにしよう。"
10018075-100 = "おせちですか。"
10018075-101 = "手料理では品数が多く手間がかかり、一つひとつ丁寧な味付けにしなくては、おせちの良さが損なわれてしまいますわね。"
10018075-102 = "そうだ。お互いの料理の実力を競うには、季節的にも適切だと思うのだが？"
10018075-103 = "具体的には、どのように競うつもりで？"
10018075-104 = "同じ量、同じ品質の食材でおせちを作り、商人会の会員たちに試食させるのだ。"
10018075-105 = "そこでよりおいしいという評価を集めたほうが勝ちということですね。"
10018075-106 = "その通りだ。ニャオフードが勝ったら、おとなしくスズメ亭の件から手を引くことだな。ムッフフフ。"
10018075-107 = "しかし私たちが勝てば、これ以上スズメ亭に手を出さないということでよろしいですね？"
10018075-108 = "その条件で良いだろう。"
10018075-109 = "でしたら受けて立ちますわ。"
10018075-110 = "念押しですが、ニャオフードの会長ともあろうお方に二言はないですよね？"
10018075-111 = "ムッフフフ。ニャオフードの威信にかけて、そのようなことはないと断言しよう。"
10018075-116 = "私が言うのも差し出がましいですが、面倒なことになってはいませんか？"
10018075-117 = "愚か者め！これはニャオフードの名をさらに広げるチャンスなのだ。"
10018075-118 = "宣伝……ということですか？"
10018075-119 = "そうだ。どうやら美食研究会の悪名は、生徒たちのあいだで有名だそうじゃないか？"
10018075-120 = "（むしろ今まで知らなかったというのが不思議なんだけど……）"
10018075-121 = "そんな名の知れた美食研究会のこだわった料理に、ニャオフードが勝ったという事実が広がったとしたら？"
10018075-123 = "キヴォトスの生徒たちのあいだで、ニャオフードの地位は絶対的なものになるだろう！"
10018075-124 = "いいか！生徒相手の商売は絶対に失敗しない！"
10018075-125 = "会長のご慧眼がそう仰るのでしたら、私は何も。"
10018075-126 = "それより超過分の時間外手当のほうは……。"
10018075-127 = "まずは成果を見せてからだ！話は後にしろ！"
10018075-128 = "……きっとそうだと思いました。"
