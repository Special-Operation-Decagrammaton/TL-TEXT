[translation]
10018075-10 = "Presidente, apareça! Ou seria presidente do conselho? De qualquer forma, saia logo daí!"
10018075-11 = "Se não sair, vou começar a causar ainda mais confusão por aqui~★"
10018075-12 = "Uau! Aquilo parece delicioso! Posso comer um pouco? Só um pouquinho!"
10018075-19 = "……Presidente, talvez seja melhor sairmos logo."
10018075-20 = "Tem alguém ali que está comendo como se quisesse esvaziar o depósito de ingredientes."
10018075-21 = "Mufuuuu! Já sofremos um grande prejuízo, preciso impedir isso agora mesmo……!"
10018075-23 = "Muito bem, como gestor, este é o momento de mostrar minha capacidade de decisão! Eu mesmo irei lá!"
10018075-27 = "Antes de conversarmos, preciso agradecer pela calorosa recepção."
10018075-28 = "Mufufufu. Não seja por isso, senhorita."
10018075-29 = "Poderia me dizer o motivo de termos sido recebidos desta forma?"
10018075-30 = "Eu sou o presidente da Nyaofood. Ou seja, o responsável geral por tudo isso."
10018075-31 = "Alguém na minha posição não deveria ser abordado para uma reunião sem qualquer agendamento prévio."
10018075-32 = "Além disso, tratando-se de invasores repentinos, não é de se estranhar que o sistema de segurança tenha reagido, não é?"
10018075-33 = "Então, se tivéssemos seguido os procedimentos adequados, teríamos conseguido nos encontrar assim?"
10018075-34 = "Mufufufu. Isso já é outra história."
10018075-35 = "Mas, com certeza, levaria um bom tempo. Um mês, talvez dois."
10018075-36 = "Ufufu,"
10018075-37 = "Então, minha escolha não foi um erro."
10018075-38 = "Vamos deixar as brincadeiras de lado e ir direto ao ponto."
10018075-39 = "Era o que eu esperava. Defender a inovação e agir com eficiência é o básico da gestão."
10018075-40 = "Sendo assim, poderia parar de mascarar o sabor e a qualidade dos ingredientes para vender produtos de baixa qualidade?"
10018075-41 = "Não entendo o que quer dizer."
10018075-42 = "Ora. Será que você acha que isso é algo normal?"
10018075-43 = "Será que você perdeu o bom senso por focar demais nos lucros?"
10018075-44 = "As massas não se importam com pequenas diferenças no sabor."
10018075-45 = "Se puderem comer em grande quantidade por um preço baixo, ficarão satisfeitas."
10018075-50 = "Se o que você diz é verdade, está sugerindo que eu descarte todos os ingredientes que não atingem um certo padrão?"
10018075-51 = "Por que eu deveria fazer algo tão ineficiente?"
10018075-58 = "É um pensamento extremamente comum, mas,"
10018075-59 = "isso é um ato de enganar as pessoas."
10018075-62 = "“Águas muito límpidas não abrigam peixes”."
10018075-63 = "Não deveriam, pelo menos, se esforçar para manter a água limpa?"
10018075-64 = "Não acha estranho que vocês se preocupem com coisas tão triviais?"
10018075-65 = "Não, na verdade, o estranho é a postura da Nyaofood."
10018075-66 = "Não posso deixar passar esse comentário."
10018075-67 = "Eu também não consigo esconder minha decepção ao ouvir um pensamento tão superficial."
10018075-74 = "……!"
10018075-75 = "……!"
10018075-76 = "Muito bem. Então, proponho um confronto."
10018075-78 = "Um confronto, é?"
10018075-80 = "É simples. Já que estamos discutindo sobre culinária, que tal um duelo culinário?"
10018075-81 = "Vocês têm reclamações sobre a qualidade, certo? Então vamos comparar a qualidade da culinária de ambos."
10018075-82 = "Para que não haja reclamações depois, faremos de forma justa…… certo?"
10018075-88 = "Espere um pouco. Não tem algo estranho nisso? Será que não é uma armadilha……"
10018075-89 = "Hm? O que quer dizer?"
10018075-90 = "Será que é realmente seguro, Haruna?"
10018075-92 = "Mesmo que seja uma armadilha, lutar de frente é o que define o nosso Clube de Pesquisa Gastronômica."
10018075-96 = "Aceitaremos a sua proposta."
10018075-97 = "Afinal, o Ano Novo está chegando."
10018075-98 = "É verdade, o Ano Novo. Naturalmente, existem vários pratos que só podem ser saboreados nesta época."
10018075-99 = "Pois bem... a modalidade do confronto será Osechi."
10018075-100 = "Osechi, você diz?"
10018075-101 = "Como é um prato caseiro que exige muitos itens e muito trabalho, se não temperarmos cada um com cuidado, a essência do Osechi será perdida."
10018075-102 = "Exato. Acho que é apropriado para a estação, não acha? Uma ótima forma de competir nossas habilidades culinárias."
10018075-103 = "Especificamente, como pretende que essa competição ocorra?"
10018075-104 = "Faremos Osechi usando a mesma quantidade e qualidade de ingredientes, e deixaremos que os membros da Associação de Comerciantes provem."
10018075-105 = "Então, quem receber a melhor avaliação de sabor vence, é isso?"
10018075-106 = "Exatamente. Se a Nyao Food vencer, vocês vão se retirar do caso do Suzume-tei sem reclamar. Mufufufu."
10018075-107 = "Mas se nós vencermos, você concorda em não interferir mais no Suzume-tei, correto?"
10018075-108 = "Aceito essas condições."
10018075-109 = "Nesse caso, eu aceito o desafio."
10018075-110 = "Só para confirmar, como alguém no seu cargo de presidente da Nyao Food, você não vai voltar atrás na sua palavra, certo?"
10018075-111 = "Mufufufu. Pela honra da Nyao Food, garanto que isso não acontecerá."
10018075-116 = "Não querendo ser intrometida, mas isso não está se tornando um problema desnecessário?"
10018075-117 = "Tola! Esta é a chance de espalhar ainda mais o nome da Nyao Food."
10018075-118 = "Publicidade... é isso?"
10018075-119 = "Exato. Pelo que parece, a má fama do Clube de Pesquisa Gastronômica é bem conhecida entre os alunos, não é?"
10018075-120 = "(Na verdade, é estranho que você não soubesse disso até agora...)"
10018075-121 = "Se o fato de a Nyao Food ter vencido a culinária exigente do famoso Clube de Pesquisa Gastronômica se espalhar, o que aconteceria?"
10018075-123 = "A posição da Nyao Food entre os alunos de Kivotos se tornará absoluta!"
10018075-124 = "Entenda! Negócios com alunos nunca falham!"
10018075-125 = "Se a sua sabedoria diz isso, presidente, então não tenho nada a acrescentar."
10018075-126 = "Mas, sobre o pagamento das horas extras excedentes..."
10018075-127 = "Primeiro mostre resultados! Falaremos disso depois!"
10018075-128 = "......Eu imaginei que diria isso."
