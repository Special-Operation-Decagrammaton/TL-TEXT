[translation]
51040-1 = "Episódio 4: No Departamento Yin-Yang"
51040-2 = "Departamento Yin-Yang - Sala do Clube"
51040-4 = "Sensei, sinto muito por lhe causar tanto trabalho..."
51040-5 = "Estou feliz por podermos nos encontrar novamente, nyaha."
51040-6 = "Seja bem-vindo ao Departamento Yin-Yang."
51040-7 = "Iahô, Sensei."
51040-8 = "[s] \"Pessoal, quanto tempo.\""
51040-9 = "Pois é... Desde aquele dia, muito tempo se passou."
51040-10 = "Hum~"
51040-15 = "Desvanecendo"
51040-16 = "O rosto do sensei"
51040-17 = "Lembranças"
51040-18 = "Até agora, eu tinha esquecido~"
51040-22 = "A-a poesia da Chise-chan...!"
51040-23 = "Preciso registrar isso...!"
51040-24 = "[s] \"Ahaha... Quando a Chise diz isso, não soa como uma piada...\""
51040-26 = "...?"
51040-27 = "[s] \"É, é uma piada, né!?\""
51040-28 = "Nyahaha. Deixando as palavras da Chise de lado..."
51040-29 = "Hyakkiyako também tem tido dias bem agitados desde então."
51040-30 = "Não é verdade, Kaho?"
51040-32 = "Sim. A restauração da infraestrutura, a formulação de orçamentos emergenciais para a reconstrução dos dormitórios estudantis...#nNenhum desses trabalhos foi concluído ainda."
51040-33 = "[s] \"Vocês parecem estar ocupadas como sempre...\""
51040-34 = "Nyaha, Kaho, relaxa~#nJá que o Sensei está aqui, vamos ficar mais relaxados, bem relaxados."
51040-35 = "Ultimamente, deve haver outros assuntos além do trabalho de restauração, não é?"
51040-36 = "Por exemplo... sobre o festival que será realizado em breve?"
51040-37 = "[s1] \"Sobre isso, eu vi quando estava vindo para cá.\"\n[s2] \"Se não me engano, a Shizuko está cuidando dos preparativos...\""
51040-40 = "Então o assunto será rápido."
51040-41 = "Como você disse, a Shizuko-san está realmente se esforçando muito~"
51040-45 = "A Shizuko-san corre sem pensar nas consequências quando se trata do festival, então é realmente divertido de assistir—"
51040-46 = "—Não, o que eu quis dizer é que acho isso maravilhoso."
51040-47 = "[s] \"Ah, sim... é, verdade.\""
51040-48 = "Nyahaha. Parece que a Shizuko-san queria reviver o \"Festival das Lanternas de Hyakkiyako\" há muito tempo."
51040-49 = "Bem, para nós, isso é conveniente, por assim dizer~"
51040-50 = "Niya-sama, esse tipo de comentário..."
51040-51 = "Ora, Kaho... não é a verdade?"
51040-55 = "[ns] \"Hum... o que você quer dizer com isso?\""
51040-56 = "O festival das lanternas que a Shizuko-san está tentando reviver é perfeito para a situação atual."
51040-57 = "Poderíamos dizer que é a oportunidade perfeita para Hyakkiyako, que estava exausta com o trabalho de restauração, recuperar sua vitalidade, não é?"
51040-59 = "As palavras da Niya-sama são um pouco diretas, mas..."
51040-60 = "É um fato que toda Hyakkiyako perdeu sua energia...#ne todos sentem que precisamos de algum tipo de gatilho."
51040-62 = "Pensei que, se este festival servisse como um gatilho para animar as coisas, ou para trazer de volta o sorriso de todos..."
51040-63 = "A Shizuko-san realmente criou uma ótima oportunidade."
51040-64 = "Ultimamente, a Chise também tem praticado noite após noite para sua nova apresentação, né?#nHum~ maravilhoso!"
51040-66 = "Hum~, eu também vou me esforçar~"
51040-67 = "Ch-Chise-chan...!"
51040-69 = "Nyahaha~, muito bem, muito bem!"
51040-70 = "Sim, e como a carga de trabalho aumentou de acordo com isso... espero que a Niya-sama se esforce mais do que nunca. Entendido?"
51040-71 = "Ah, lá se foi o clima agradável de agora há pouco."
51040-72 = "Dizer uma coisa tão assustadora... Kaho, você é tão cruel, *sniff*."
51040-78 = "Niya-sama, desta vez, por favor, não tente fugir...?\nIsso seria realmente, realmente um problema."
51040-83 = "Nya-ha... Do que você está falando?"
51040-84 = "Bem, de qualquer forma. Já que estamos aqui, adoraria que o Sensei também aproveitasse o festival."
51040-85 = "Ah, é verdade. Se você falar com a Shizuko-san, ela não ficaria feliz?"
51040-86 = "[ns] \"...Hm?\""
51040-87 = "Nya-ha, aconteceu alguma coisa?"
51040-88 = "Ah, sim, sim. Sobre aquele assunto que mencionei...\nVocê gostaria de fazer carinho na Chise-nyan antes de ir?"
51040-89 = "Nya-?"
51040-90 = "[s] \"Se fosse só isso, tudo bem, mas...\""
51040-91 = "Ora, ora. Lançar um olhar tão desconfiado para uma aluna tão fofa, fofinha..."
51040-92 = "Isso é muito triste, *sniff, sniff*."
51040-93 = "Estou me esforçando tanto para ganhar a confiança do Sensei...\nSerá que minha impressão é tão ruim assim?"
51040-94 = "[s] \"Ah, d-desculpa...\""
51040-95 = "...Bem, eu tenho um assunto que gostaria de colocar nos seus ouvidos."
51040-96 = "[s] \"Eu sabia que você diria isso...\""
51040-105 = "Niya-sama, isso é..."
51040-110 = "Pois é, a Kaho disse que provavelmente é só uma brincadeira, mas..."
51040-111 = "Achei que, pelo menos, deveria informar o Sensei."
51040-112 = "[s] \"...Isso é uma carta?\""
51040-113 = "Sim. Chegou ao Departamento Yin-Yang alguns dias atrás."
51040-118 = "O remetente é... o \"Departamento de Flores, Pássaros, Vento e Lua\"."
51040-119 = "Acredite ou não, é um departamento que existe nas \"histórias de fantasmas\" lendárias... Ou seja, é uma carta enviada através dos tempos♪"
51040-120 = "[s] \"Histórias de fantasmas...?\""
51040-122 = "O Departamento de Flores, Pássaros, Vento e Lua é um clube que até mesmo em Hyakkiyako alguns comentam como um boato."
51040-123 = "É uma espécie de lenda urbana e um assunto de fofoca... Não, se eu fosse usar um termo mais apropriado..."
51040-129 = "Seria... \"Cem Histórias\", talvez?"
51040-130 = "Dizem, ou não dizem, que eles são um \"departamento cruel e perverso que não reconhece a forma atual da união de Hyakkiyako\", ou que são \"monstros que manipulam livros estranhos e confundem as pessoas\"..."
51040-131 = "Foi de um departamento como esse que recebemos uma \"carta de ameaça\" endereçada ao nosso Departamento Yin-Yang."
51040-132 = "[s] \"Só pela explicação já parece assustador... mas qual é o conteúdo da carta?\""
51040-133 = "O conteúdo é este."
51040-135 = "＜Aviso a vocês＞"
51040-136 = "＜Nosso estilo refinado não chegou ao fim; a elegância deve ser apreciada por muitos＞"
51040-137 = "＜Quando a diversão começar e vocês olharem para as grandes flores que desabrocharão no céu――＞"
51040-141 = "[log=니야]＜Mais uma vez―― visitaremos vocês＞[/log]"
51040-145 = "――O conteúdo da carta é esse."
51040-146 = "Niya-sama, isso é..."
51040-147 = "Sim, é um aviso típico."
51040-148 = "Embora eu ache que não precise de medidas exageradas.\nÉ algo comum durante grandes eventos."
51040-149 = "Não é, Kaho?"
51040-154 = "...Sim, como a Niya-sama disse."
51040-155 = "Coisas como \"cancelar o festival em nome do Conselho Estudantil Federal\", ou mudar isso para o Schale. Ou pedir para distribuir mais cupons para a Trupe Chimi durante o festival."
51040-156 = "...Principalmente trotes telefônicos, ou melhor, cartas da Trupe Chimi, que já provaram o gosto da autoridade..."
51040-157 = "[s] \"...Não é de se admirar que vocês estejam ocupadas.\""
51040-159 = "Claro, esses são apenas assuntos internos de Hyakkiyako. Não é algo para levar reclamações ao Sensei do Schale~"
51040-160 = "Nya-ha-ha, não podemos incomodá-lo tanto assim... né, Kaho?"
51040-161 = "Isso é..."
51040-162 = "Sim, como você disse."
51040-163 = "[s] \"Eu não me importo, estou bem.\""
51040-164 = "Agradeço a oferta, mas... nesses casos, o padrão é que o Hyakka Ryoran cuide disso――"
51040-165 = "No entanto, como você sabe, o Hyakka Ryoran está com suas atividades praticamente paradas desde que a presidente e a vice-presidente desapareceram."
51040-166 = "E, finalmente, ontem..."
51040-170 = "A ordem de dissolução foi emitida oficialmente para o Hyakkiyako Ryoran..."
51040-176 = "Não, isso não pode ser verdade. #nOuvi dizer que eles estão suspensos por causa dessa tal 'ordem de dissolução'."
51040-181 = "Não!"
51040-183 = "[ns] \"É verdade que o Hyakkiyako Ryoran vai se dissolver?\""
51040-184 = "Sim. Uma vez que a presidente e sua substituta desapareceram, manter o comitê tornou-se difícil..."
51040-185 = "Talvez tenham concluído que 'não há necessidade de mantê-lo'."
51040-186 = "Com a ordem de dissolução emitida, o Yin-Yang Club terá que prosseguir com os trâmites."
51040-187 = "...Francamente, não sei o que vocês estão pensando."
51040-188 = "...Bem, só estou desabafando um pouco. #nNya-haha, será que é só uma questão de tempo até o Chimi Ichiza perceber? Digo, talvez."
51040-189 = "Por conta disso, temos muitos problemas. #nEspero que o Sensei possa preencher a vaga deixada pelo Hyakkiyako Ryoran."
51040-190 = "Claro, também é um desejo sincero meu que você aproveite o festival."
51040-191 = "[s] \"Niya, você é uma pessoa honesta, não é?\""
51040-192 = "Nfufu, sim."
51040-193 = "No entanto, sei que pedir algo tão egoísta pode fazer com que pensem que sou uma pessoa interesseira."
51040-194 = "É só que, dadas as circunstâncias, quero usar todos os recursos que puder."
51040-195 = "Para ser sincera, não é um incômodo... quero dizer, quero me esforçar para cumprir meu dever como chefe do departamento~"
51040-196 = "Se for para isso, não me importo de revelar meus verdadeiros sentimentos ao Sensei."
51040-197 = "[s] \"Sim, acho que isso é bem a sua cara, Niya.\""
51040-198 = "...Sensei."
51040-199 = "Nya-haha! #nIsso significa que você se decepcionou comigo por estar sempre tramando conspirações?"
51040-200 = "[s3] \"Você diz isso, mas o fato de pensar em todos...\"\n[s4] \"É por isso que acho que é bem a sua cara.\""
51040-203 = "Ora, ora~? Então você acha que eu tenho duas faces...?"
51040-204 = "[s] \"Não, não foi isso que eu quis dizer!\""
51040-205 = "...Bem, talvez não seja algo que eu deva dizer."
51040-206 = "Se você continuar ouvindo os pedidos egoístas das pessoas assim, vai acabar se metendo em apuros em algum momento."
51040-207 = "Afinal, não podemos descartar a possibilidade de ainda haver segredos ocultos~"
51040-208 = "Até eu, que sou assim, fico um pouco preocupada."
51040-209 = "[s] \"Vou manter isso em mente, mas quero ser útil para você, Niya.\""
51040-210 = "Ora, você diz que vai me ajudar! #nIsso é de grande ajuda."
51040-211 = "Não é, Chise, Kaho?"
51040-213 = "Sim. Isso ajuda muito~"
51040-214 = "Claro, fico feliz, mas..."
51040-215 = "Sensei, você ainda vai ficar aqui, né~?"
51040-216 = "Vou te mostrar o treino de hoje~"
51040-220 = "O treino da Chise-chan...!"
51040-221 = "Poder ver de tão perto... ah!"
51040-223 = "Nya-ha~, já que recebi uma resposta do Sensei hoje..."
51040-224 = "O que resta é—"
51040-229 = "—Espere um momento!!!!!"
51040-237 = "Eu ouvi a conversa de vocês!"
51040-241 = "Meu nome é Yukari!"
51040-246 = "Sou uma aluna do primeiro ano do orgulhoso Comitê de Mediação de Conflitos Hyakkiyako Ryoran, e a elite das elites!"
51040-247 = "Tenho um assunto urgente para tratar com a chefe do Yin-Yang Club, e é por isso que vim aqui!"
51040-253 = "...Hã?"
51040-255 = "Próximo episódio: A garota que se autodenomina elite, aparece!"
