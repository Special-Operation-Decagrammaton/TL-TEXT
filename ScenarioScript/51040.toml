[translation]
51040-1 = "第4話;陰陽部にて"
51040-2 = "陰陽部・部室"
51040-4 = "先生、大変ご足労をおかけしまして～"
51040-5 = "こうしてまたお会いできて嬉しいです、にゃは。"
51040-6 = "ようこそ、陰陽部へ。"
51040-7 = "やっほー先生。"
51040-8 = "[s] \"みんな、久しぶりだね。\""
51040-9 = "そうですねぇ……[ruby=・   ・   ・]あの日[/ruby]から、随分と時が流れましたから。"
51040-10 = "うん～"
51040-15 = "かすみゆく"
51040-16 = "せんせいのかお"
51040-17 = "おもいだす"
51040-18 = "さっきまで、忘れてたの～"
51040-22 = "ち、チセちゃんの俳句……！"
51040-23 = "記録しなくては……！"
51040-24 = "[s] \"あはは……チセが言うと冗談に聞こえないな……\""
51040-26 = "……？"
51040-27 = "[s] \"じょ、冗談だよね！？\""
51040-28 = "にゃはは。チセの言葉はともかく……"
51040-29 = "百鬼夜行も、あれから慌ただしい毎日でしてねぇ。"
51040-30 = "そうでしょう、カホ？"
51040-32 = "はい。インフラの復旧や、学生寮再建のための緊急予算策定など……#nいずれもまだ作業が終わっておりません。"
51040-33 = "[s] \"みんな、相変わらず忙しそうだね……\""
51040-34 = "にゃは、カホったら～#nせっかく先生がいらしてるんだから、もっと楽にね、らく～に。 "
51040-35 = "最近は、復旧作業以外の話題だってあるでしょう？ "
51040-36 = "例えば……今度開催されるお祭りのこと、とか？"
51040-37 = "[s1] \"それなら、来るときに見てきたよ。\"\n[s2] \"たしかシズコが準備してるとか……\""
51040-40 = "それなら話は早いですねぇ。"
51040-41 = "仰る通り、シズコさん本当に頑張ってくれてるんですよ～"
51040-45 = "シズコさんは、お祭りのためなら後先考えず突っ走るので、本当に見ていて飽きな――"
51040-46 = "――ではなく、とっても素晴らしいと思っています。"
51040-47 = "[s] \"あっ、うん……そ、そうだね。\""
51040-48 = "にゃはは。シズコさんは以前からずっと「百鬼夜行燈籠祭」を復活させたかったようでしてねぇ。"
51040-49 = "まあ、私たちとしてもそれは都合がいいと言いますか～"
51040-50 = "ニヤ様、そのようなお言葉は……"
51040-51 = "だってカホ……実際そうじゃないの。"
51040-55 = "[ns] \"えっと……それはどういう意味？\""
51040-56 = "シズコさんが復活させようとしている燈籠祭は、今この状況にピッタリなんですよぉ。"
51040-57 = "復旧作業に明け暮れていた百鬼夜行が、再び活気を取り戻すには絶好の機会、と言い換えましょうか～？"
51040-59 = "ニヤ様の言葉は少々直接的ではありますが……"
51040-60 = "百鬼夜行全体が活気を失ってしまっているのは事実で……#n何かきっかけが必要というのは、誰しもが感じております。"
51040-62 = "今回のお祭りがきっかけで、もっと盛り上がったら～とか、みなさんの笑顔を取り戻したいな～とか思いましてね。"
51040-63 = "シズコさんは、本当に良いきっかけを作ってくれたなぁ、と。"
51040-64 = "最近はチセも、新しい公演のために夜な夜な練習してるもんね～？#nん～素晴らしい！"
51040-66 = "うん～、私も頑張るね～"
51040-67 = "ち、チセちゃん……！"
51040-69 = "にゃははは～、えらいえらい！"
51040-70 = "はい、それに合わせて業務量も増えているので……ニヤ様にもこれまで以上に尽力していただきたいと思っております。いいですね？"
51040-71 = "えぇ～、さっきまでの和やかな雰囲気が台無しじゃないの。"
51040-72 = "そんな恐ろしい事を言うだなんて……カホったらひどいなぁ、しくしく。"
51040-78 = "ニヤ様、今回だけは逃げないでくださいね……？#n本当に、本当に困りますから。"
51040-83 = "にゃは～……何のことやら？"
51040-84 = "ま、ともかく。せっかくなので先生にもお祭りを楽しんでいただけたらなと。"
51040-85 = "そうだ。シズコさんにも声をかけてあげたら、喜ぶんじゃないですかね～？"
51040-86 = "[ns] \"……ん？\" "
51040-87 = "にゃは、どうかされました？"
51040-88 = "ああ、そうそう。お伝えした例の件……#nチセにゃんを撫でていかれますか？"
51040-89 = "にゃー？"
51040-90 = "[s] \"それだけで済むならいいんだけど……\""
51040-91 = "あらあら。可愛いかわい～い生徒に、そんな疑いの眼差しを向けるなんて…… "
51040-92 = "とても悲しいですねぇ、しくしく。"
51040-93 = "先生からの信頼を得ようとこんなに努力しているのに……#nもしかして私、印象が悪いのでしょうか？"
51040-94 = "[s] \"あっ、ご、ごめん……\""
51040-95 = "……まあ、ちょーっとお耳に入れておきたいお話はあるんですが。"
51040-96 = "[s] \"そうくると思ってたよ……。\""
51040-105 = "ニヤ様、それは……"
51040-110 = "そうそう、カホはただのイタズラだろうとは言ってたんですが……"
51040-111 = "先生には……一応伝えておくべきだと思いましてねぇ。"
51040-112 = "[s] \"……これは、手紙？\""
51040-113 = "ええ。何日か前、陰陽部に届いた物です。"
51040-118 = "差出人は……「[ruby=かちょうふうげつぶ]花鳥風月部[/ruby]」。"
51040-119 = "なんとこれ、かの伝説の「怪談」に存在する部活……#nつまり、時代を越えて送られてきた手紙、というわけです♪"
51040-120 = "[s] \"怪談……？\""
51040-122 = "花鳥風月部とは、百鬼夜行でも一部の者が噂として存在を口にする部活。"
51040-123 = "いわば都市伝説の一種でありゴシップ的な存在……いえ、もう少しそれっぽい言い方をすれば……"
51040-129 = "「[ruby=かいだん]百物語[/ruby]」――でしょうか。"
51040-130 = "彼らは｢百鬼夜行の連合の今の形態を認めない、極悪非道の部活｣だとか、｢怪書を操り、人々を惑わす[ruby=ちみもうりょう]魑魅魍魎[/ruby]」と呼ばれたり､呼ばれなかったり……"
51040-131 = "そのような部活から、私たち陰陽部宛てに「脅迫状」なるものが届いたのです。"
51040-132 = "[s] \"説明からしてなんか怖そうな感じだけど……手紙の内容は？\""
51040-133 = "内容はこうです。"
51040-135 = "＜そなたらに告げる＞"
51040-136 = "＜我々の風流は終わってなどいない、風情は大勢で味わうべきもの＞"
51040-137 = "＜お楽しみが始まり、空に咲いた大輪の花を見上げたその時に――＞"
51040-141 = "[log=니야]＜もう一度――そなたらの元を訪ねよう＞[/log]"
51040-145 = "――手紙の内容はこの通り。"
51040-146 = "ニヤ様、これは……"
51040-147 = "そう――典型的な警告文やね。 "
51040-148 = "特に大げさに対策する必要もないとは思うけどねぇ。#n大きなイベントごとの時には、よくあることだから。"
51040-149 = "ねぇ？カホ。"
51040-154 = "……はい、ニヤ様のおっしゃる通りです。"
51040-155 = "連邦生徒会の名においてお祭りを中止する、だったり。これがシャーレに変わったり。お祭りの時に[ruby=すだまいちざ]魑魅一座[/ruby]にクーポンをもっと配れ、など。 "
51040-156 = "……主に権威の味を知ってしまった魑魅一座からのいたずら電話……いえ、手紙みたいなものが多いですね。"
51040-157 = "[s] \"……これじゃあ忙しいのも当然だよね。\""
51040-159 = "もちろん、これらはあくまで百鬼夜行の内部事情ですから。#nシャーレの先生に泣き言を漏らすほどではないのですがね～"
51040-160 = "にゃはは、さすがにそこまでの迷惑はかけられませんから……ね？カホ。"
51040-161 = "それは……"
51040-162 = "ええ、おっしゃる通りです。"
51040-163 = "[s] \"私は別に大丈夫だよ。\""
51040-164 = "お言葉はありがたいのですが……こういう場合は、百花繚乱が対処すると相場が決まっておりまして――"
51040-165 = "ただ、ご存じのように百花繚乱は、委員長と副委員長が行方をくらましてから、活動がほぼ停止している状態。"
51040-166 = "そして、ついに昨日……"
51040-170 = "百花繚乱から正式に「解散令」が出されたのです――"
51040-176 = "いや、そんなわけないか。#n「解散令」とやらで、謹慎中だと聞いとるからな。"
51040-181 = "いえ！"
51040-183 = "[ns] \"百花繚乱が解散するって本当なの？\""
51040-184 = "ええ。委員長も、その代理も姿を消した以上、委員会の維持は難しい、と……"
51040-185 = "きっともう、「維持する必要は無い」と判断したのやもしれません。 "
51040-186 = "解散令が出された以上、陰陽部としても手続きを進めることになるでしょう。"
51040-187 = "……まったく、みなさんは一体何を考えているんだか。 "
51040-188 = "……なんて、たまには愚痴ってみたり。#nにゃはは、魑魅一座が気付くのも時間の問題かな～？なんて。"
51040-189 = "そんなわけで、た～っくさん問題がありまして。#nどうか先生に、百花繚乱の空席を埋めていただけたらと思いましてねぇ。"
51040-190 = "もちろん、お祭りを楽しんでほしいのも本心ではありますが。"
51040-191 = "[s] \"ニヤは正直者だね。\""
51040-192 = "んふふ、ええ。"
51040-193 = "しかし、こんなわがままを言ってばかりでは、自分勝手だと思われても仕方ないとは思っておりますよ？"
51040-194 = "ただ、状況が状況なだけに、打てる手は打っておきたいといいますか。"
51040-195 = "正直、手間……ではなく、部長としての責務を果たすべく尽力したいといいますか～"
51040-196 = "そのためでしたら、先生に本心を打ち明けるのも[ruby=いと]厭[/ruby]いませんよ？"
51040-197 = "[s] \"うん、ニヤらしくていいと思う。\""
51040-198 = "……先生。"
51040-199 = "にゃははっ！#nそれは、陰謀を企んでばかりの私にがっかりした、という意味ですかぁ～？"
51040-200 = "[s3] \"口ではそう言うけど、みんなの事を考えてる辺りが……\"\n[s4] \"ニヤらしいなと思って。\""
51040-203 = "おやおや～？私には2つの顔がある、と……？"
51040-204 = "[s] \"えっ、そういう意味じゃないよ！？\""
51040-205 = "……まあ、私が申し上げることではないかもしれませんが。"
51040-206 = "こうやって人のわがままを聞いてばかりでは、どこかで大変な目に遭ってしまいますよ？"
51040-207 = "まだ、隠し事がある可能性も否定できないわけですから～"
51040-208 = "流石の私も、少しばかり心配といいますか。"
51040-209 = "[s] \"心に留めておくけど、ニヤの力にはなりたいかな。\""
51040-210 = "あら、力になってくださるだなんて！#nこれはこれは助かりました。"
51040-211 = "ねぇ？チセ、カホ？"
51040-213 = "うん。たすかる～"
51040-214 = "もちろん、喜ばしくはありますが……"
51040-215 = "せんせー、まだここにいるんだよね～？"
51040-216 = "今日のお稽古、見せてあげる～"
51040-220 = "チセちゃんのお稽古……！"
51040-221 = "こんなに近くから見られるなんて……あぁ！"
51040-223 = "にゃは～、本日は先生から返事も頂けたことだし……"
51040-224 = "あとは――"
51040-229 = "――お待ちくださいまし！！！！！ "
51040-237 = "お話、聞かせてもらいましたの！"
51040-241 = "[ruby=みども]身共[/ruby]の名は、ユカリ！"
51040-246 = "誇り高き百花繚乱紛争調停委員会の1年生であり、最強のえりーとですの！"
51040-247 = "陰陽部の部長に折り入ってご相談があり、ここに参った次第ですわ！"
51040-253 = "……はて？"
51040-255 = "次回;自称えり～と少女、登場！"
