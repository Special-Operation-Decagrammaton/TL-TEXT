[translation]
51040-1 = "Episódio 4; No Clube Yin-Yang"
51040-2 = "Clube Yin-Yang - Sala do Clube"
51040-4 = "Sensei, sinto muito por fazê-lo vir até aqui~"
51040-5 = "Estou feliz em vê-lo novamente assim, nyaha."
51040-6 = "Bem-vindo ao Clube Yin-Yang."
51040-7 = "Ooooi, Sensei."
51040-8 = "[s] \"Pessoal, quanto tempo.\""
51040-9 = "Pois é... já se passou um bom tempo desde [ruby=·   ·   ·]aquele dia[/ruby]."
51040-10 = "Uhum~"
51040-15 = "Desaparecendo,"
51040-16 = "o rosto do sensei,"
51040-17 = "relembrando."
51040-18 = "Eu tinha me esquecido até agora pouco~"
51040-22 = "O, o haiku da Chise-chan...!"
51040-23 = "Preciso registrar...!"
51040-24 = "[s] \"Ahaha... Quando a Chise fala, não parece brincadeira...\""
51040-26 = "......?"
51040-27 = "[s] \"É, é brincadeira, né!?\""
51040-28 = "Nyahaha. Deixando as palavras da Chise de lado..."
51040-29 = "A Hyakkiyako também tem tido dias agitados desde então."
51040-30 = "Não é mesmo, Kaho?"
51040-32 = "Sim. Restauração da infraestrutura, elaboração do orçamento de emergência para a reconstrução dos dormitórios estudantis... #n Nenhum desses trabalhos foi concluído ainda."
51040-33 = "[s] \"Parece que vocês estão ocupadas como sempre...\""
51040-34 = "Nyaha, Kaho~ #n Já que o Sensei veio nos visitar, seja mais relaxada, rela~xada. "
51040-35 = "Recentemente, há assuntos além dos trabalhos de restauração, não há? "
51040-36 = "Por exemplo... sobre o festival que vai acontecer em breve?"
51040-37 = "[s1] \"Sobre isso, eu vi no caminho pra cá.\"\n[s2] \"Acho que a Shizuko estava organizando...\""
51040-40 = "Então isso facilita a conversa."
51040-41 = "Como você disse, a Shizuko-san está realmente se esforçando muito~"
51040-45 = "A Shizuko-san corre sem pensar nas consequências quando se trata do festival, então é realmente intere――"
51040-46 = "――Digo, acho isso esplêndido."
51040-47 = "[s] \"Ah, sim... c, com certeza.\""
51040-48 = "Nyahaha. Parece que a Shizuko-san queria reviver o 'Festival das Lanternas da Hyakkiyako' há muito tempo."
51040-49 = "Bem, para nós, digamos que isso é conveniente~"
51040-50 = "Senhorita Niya, esse tipo de comentário..."
51040-51 = "Mas Kaho... não é a verdade?"
51040-55 = "[ns] \"Ehm... O que você quer dizer com isso?\""
51040-56 = "O Festival das Lanternas que a Shizuko-san está tentando reviver é perfeito para a situação atual."
51040-57 = "Será que podemos dizer que é a oportunidade perfeita para a Hyakkiyako, que passou os dias focada na restauração, recuperar sua vitalidade novamente~?"
51040-59 = "As palavras da Senhorita Niya são um tanto diretas, mas..."
51040-60 = "É um fato que toda a Hyakkiyako perdeu sua vitalidade... #n E todos sentem que precisamos de algo para dar o pontapé inicial."
51040-62 = "Espero que este festival sirva de pretexto para animar as coisas~ e para trazer de volta o sorriso de todos~."
51040-63 = "Acho que a Shizuko-san realmente criou uma ótima oportunidade."
51040-64 = "Recentemente, a Chise também tem treinado todas as noites para a nova apresentação, não é~? #n Hmm~ esplêndido!"
51040-66 = "Uhum~ Eu também vou dar o meu melhor~"
51040-67 = "C, Chise-chan...!"
51040-69 = "Nyahahaha~, muito bem, muito bem!"
51040-70 = "Sim, a carga de trabalho também está aumentando proporcionalmente... então espero que a Senhorita Niya se dedique mais do que nunca. Entendido?"
51040-71 = "Eeeh~, você arruinou a atmosfera amigável que tínhamos agora pouco."
51040-72 = "Dizer algo tão assustador... que cruel, Kaho, *sniff, sniff*."
51040-78 = "Senhorita Niya, não fuja desta vez, ouviu...? #n Isso causaria sérios, sérios problemas."
51040-83 = "Nyaha~... Do que será que você está falando?"
51040-84 = "Bem, de qualquer forma. Já que está aqui, gostaria que o Sensei também aproveitasse o festival."
51040-85 = "Ah, sim. A Shizuko-san também não ficaria feliz se você fosse falar com ela~?"
51040-86 = "[ns] \"......Hm?\" "
51040-87 = "Nyaha, aconteceu alguma coisa?"
51040-88 = "Ah, sim, sim. Sobre aquele assunto que eu mencionei... #n Gostaria de fazer um carinho na Chise-nyan antes de ir?"
51040-89 = "Nya?"
51040-90 = "[s] \"Se for só isso, tudo bem, mas...\""
51040-91 = "Ora, ora. Olhar com tanta desconfiança para uma aluna tão, tão fofa..."
51040-92 = "É muito triste, sabia? *sniff, sniff*."
51040-93 = "Eu me esforço tanto para ganhar a confiança do Sensei... #n Será que tenho uma impressão tão ruim assim?"
51040-94 = "[s] \"A, a-ah, desculpe...\""
51040-95 = "......Bem, na verdade, tenho algo que gostaria que o Sensei ouvisse."
51040-96 = "[s] \"Eu sabia...\""
51040-105 = "Senhorita Niya, isso..."
51040-110 = "Pois é, a Kaho disse que provavelmente era só uma brincadeira, mas..."
51040-111 = "Achei melhor o Sensei... ficar sabendo."
51040-112 = "[s] \"......Isso é, uma carta?\""
51040-113 = "Sim. Foi entregue ao Clube Yin-Yang há alguns dias."
51040-118 = "O remetente é... o 'Clube das Flores, Pássaros, Vento e Lua'."
51040-119 = "Incrível, não? Um clube que existe nas lendárias 'histórias de fantasmas'... #n Ou seja, é uma carta que viajou no tempo♪"
51040-120 = "[s] \"Histórias de fantasmas...?\""
51040-122 = "O Clube das Flores, Pássaros, Vento e Lua é um clube do qual alguns, mesmo na Hyakkiyako, falam apenas como um boato."
51040-123 = "É uma espécie de lenda urbana, uma fofoca... não, se eu for usar um termo mais adequado..."
51040-129 = "Uma 'História de Fantasmas'―― talvez."
51040-130 = "Eles são conhecidos como 'O clube diabólico que não reconhece a forma atual da aliança da Hyakkiyako', ou 'O espírito maligno que manipula livros misteriosos e ilude as pessoas', ou algo do tipo..."
51040-131 = "Uma 'carta de ameaça' chegou ao nosso Clube Yin-Yang de um clube como esse."
51040-132 = "[s] \"Pela sua descrição, parece algo assustador... mas qual é o conteúdo da carta?\""
51040-133 = "O conteúdo é este:"
51040-135 = "<Avisamos a vocês>"
51040-136 = "<Nossa elegância não terminou, a essência deve ser apreciada por muitos>"
51040-137 = "<Quando a diversão começar e vocês olharem para a grande flor que desabrochará no céu――>"
51040-141 = "[log=Niya]<Mais uma vez―― nós visitaremos vocês>[/log]"
51040-145 = "――O conteúdo da carta é exatamente esse."
51040-146 = "Senhorita Niya, isso é..."
51040-147 = "Sim―― uma carta de aviso típica. "
51040-148 = "Não acho que seja necessário tomar medidas drásticas. #n Esse tipo de coisa é comum durante grandes eventos."
51040-149 = "Não é? Kaho."
51040-154 = "......Sim, como a Senhorita Niya disse."
51040-155 = "Como 'Cancelar o festival em nome do Conselho Estudantil Geral', ou 'em nome da Schale'. 'Distribuam mais cupons para a Trupe Sudama durante o festival', etc. "
51040-156 = "......A maioria parece ser trotes telefônicos da Trupe Sudama, que descobriu o sabor da autoridade... ou melhor, cartas."
51040-157 = "[s] \"......Com isso, é normal estarem tão ocupadas.\""
51040-159 = "Claro, esses são apenas assuntos internos da Hyakkiyako. #n Não é algo que faríamos o Sensei da Schale choramingar~"
51040-160 = "Nyahaha, não ousaríamos causar tanto incômodo assim... né? Kaho."
51040-161 = "Isso é..."
51040-162 = "Sim, você está certa."
51040-163 = "[s] \"Por mim não tem problema algum.\""
51040-164 = "Agradeço as palavras... mas nessas situações, a regra é que a Hyakkaryouran lide com isso――"
51040-165 = "Porém, como você sabe, as atividades da Hyakkaryouran estão praticamente paralisadas desde que a presidente e a vice-presidente desapareceram."
51040-166 = "E, finalmente, ontem..."
51040-170 = "O 'Decreto de Dissolução' foi oficialmente emitido pela Hyakkaryouran――"
51040-176 = "Não, isso não pode ser. #n Ouvi dizer que elas estão suspensas por causa de um tal de 'Decreto de Dissolução'."
51040-181 = "Não!"
51040-183 = "[ns] \"É verdade que a Hyakkaryouran vai se dissolver?\""
51040-184 = "Sim. Como a presidente e sua vice desapareceram, é difícil manter o comitê..."
51040-185 = "Provavelmente concluíram que 'não há mais necessidade de mantê-lo'. "
51040-186 = "Como o decreto de dissolução foi emitido, o Clube Yin-Yang também começará os procedimentos."
51040-187 = "......Sinceramente, o que diabos elas estão pensando. "
51040-188 = "......Ufa, às vezes é bom reclamar um pouco. #n Nyahaha, acho que é só uma questão de tempo até a Trupe Sudama perceber, né~?"
51040-189 = "E por isso, temos vááários problemas. #n Eu gostaria de pedir ao Sensei para preencher a vaga deixada pela Hyakkaryouran."
51040-190 = "Claro, eu também quero genuinamente que você aproveite o festival."
51040-191 = "[s] \"Você é bem honesta, Niya.\""
51040-192 = "Nfufu, sim."
51040-193 = "Mas, de ficar só fazendo esses pedidos egoístas, não me surpreenderia se me achassem mimada, sabe?"
51040-194 = "Mas, dada a situação, quero tomar todas as medidas possíveis, por assim dizer."
51040-195 = "Honestamente, dar trabalho... não, eu quero me esforçar para cumprir meu dever como presidente~"
51040-196 = "Se for para isso, não me importo de revelar minhas verdadeiras intenções ao Sensei."
51040-197 = "[s] \"Sim, acho que isso tem a cara da Niya.\""
51040-198 = "......Sensei."
51040-199 = "Nyahaha! #n Isso significa que você ficou desapontado comigo por só planejar conspirações~?"
51040-200 = "[s3] \"Você diz isso, mas o fato de estar pensando em todo mundo...\"\n[s4] \"Acho que isso tem muito a sua cara, Niya.\""
51040-203 = "Ora, ora~? Você quer dizer que eu tenho duas faces...?"
51040-204 = "[s] \"E, eu não quis dizer isso!?\""
51040-205 = "......Bem, talvez não seja o meu lugar dizer isso."
51040-206 = "Mas se você continuar ouvindo os pedidos egoístas dos outros assim, vai acabar se metendo em grandes apuros, sabia?"
51040-207 = "Afinal, não se pode descartar a possibilidade de eu ainda estar escondendo algo~"
51040-208 = "Até eu estou um pouco preocupada, digamos."
51040-209 = "[s] \"Vou ter isso em mente, mas quero poder te ajudar, Niya.\""
51040-210 = "Ora, dizer que vai me ajudar! #n Isso me salva."
51040-211 = "Não é? Chise, Kaho?"
51040-213 = "Uhum. Que alívio~"
51040-214 = "É claro, isso é motivo de alegria..."
51040-215 = "Sense~i, você ainda está aqui~?"
51040-216 = "Vou te mostrar o meu treino de hoje~"
51040-220 = "O treino da Chise-chan...!"
51040-221 = "Poder ver de tão perto... aah!"
51040-223 = "Nyaha~, já que o Sensei nos deu uma resposta hoje..."
51040-224 = "Agora é só――"
51040-229 = "――Espeeere aí!!!!!"
51040-237 = "Eu ouvi toda a conversa!"
51040-241 = "Meu nome é Yukari!"
51040-246 = "A aluna do primeiro ano do orgulhoso Comitê de Conciliação de Conflitos Hyakkaryouran, e a elite mais forte!"
51040-247 = "Tenho um assunto urgente a tratar com a presidente do Clube Yin-Yang, e é por isso que vim até aqui!"
51040-253 = "......Eh?"
51040-255 = "Próximo Episódio; Apresentando a Autoproclamada Garota de Elite!"
