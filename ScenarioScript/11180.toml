[translation]
11180-2 = "第18話;友だちなんかじゃないわよ！"
11180-3 = "柴関ラーメン"
11180-4 = "来たあ！！いただきまーす！"
11180-5 = "ひ、ひとりにつき1杯……こんなに贅沢してもいいんですか？"
11180-8 = "アビドスさんとこのお友だちだろう。替え玉が欲しけりゃ言いな。"
11180-11 = "……！？"
11180-12 = "こんなに美味しいのにお客さんがいないなんて。"
11180-13 = "場所が悪いんじゃない？廃校寸前の学校の近くだし。"
11180-14 = "まあ、美味しいからいいけど。それじゃ、いただ……。"
11180-15 = "……じゃない。"
11180-16 = "ん？"
11180-17 = "友だちなんかじゃないわよぉーーーー！！"
11180-18 = "（ダンッ！）"
11180-19 = "わわっ！？"
11180-20 = "わかった！！何が引っかかってたのかわかったわ！問題はこの店、この店よっ！！"
11180-21 = "！？"
11180-22 = "どゆこと！？"
11180-23 = "私たちは仕事しにこの辺りに来てるの！ハードボイルドに！！アウトローっぽく！！"
11180-24 = "なのに何なのよ、この店は！お腹いっぱい食べられるし！！#nあったかくて親切で！話しかけてくれて、和気あいあいで、ほんわかしたこの雰囲気！"
11180-25 = "ここにいると、みんな仲良しになっちゃう気がするのよ！！"
11180-26 = "それに何か問題ある？"
11180-27 = "ダメでしょ！！メチャクチャでグダグダよ！#n私が一人前の悪党になるには、こんな店は要らないのよっ！！"
11180-28 = "私に必要なのは冷酷さと無慈悲さと非情さなの！こんなほっこり感じゃない！！"
11180-29 = "いや、それは考えすぎなんじゃ……。"
11180-30 = "……。"
11180-31 = "それって……こんなお店はぶっ壊してしまおうってことですよね、アル様？"
11180-32 = "……へ？"
11180-33 = "（スッ）"
11180-34 = "良かった、ついにアル様のお力になれます。"
11180-35 = "起爆装置？なんでそれを……。"
11180-36 = "ハルカ、ちょ、ちょっと待っ……"
11180-38 = "（グッ）"
11180-39 = "……。"
11180-40 = "……へ！？"
11180-42 = "（ドゴゴゴゴゴゴゴーーーーン！）"
11180-44 = "前方、半径10km内にて爆発を検知！近いです！"
11180-45 = "10kmってことは……市街地？まさか襲撃！？"
11180-46 = "衝撃波の形状からするとC4爆弾の連鎖反応と思われます。#n砲撃や爆撃ではないですね……もう少し確認してみます！"
11180-47 = "……爆発地点確認。市街地です！#n正確な位置は……。"
11180-48 = "柴関ラーメン……！？"
11180-49 = "柴関ラーメンが跡形もなく消えてしまいました！"
11180-50 = "はあ！？どういうこと！？何であの店が狙われるのよ！"
11180-51 = "戦略拠点でもなく、重要な交通網でもないのに。一体誰が……。"
11180-52 = "ま、まさか私を狙って……？"
11180-53 = "憶測は後でも遅くない。まずは何か手を打たないと！"
11180-54 = "そうですね！今はそれどころじゃありません！！向かいましょう！"
11180-55 = "ホシノ先輩には私から連絡します、出動を！！"
11180-57 = "ど、どうなっちゃったのよ！！大将……無事でいて……！"
11180-59 = "（モクモク……）"
11180-61 = "ゴホッ、ゴホッ……うわあ、建物がなくなっちゃったよ？"
11180-62 = "ケホッ……これは一体……。"
11180-63 = "（グルグル）"
11180-65 = "次回;あんたたち、許さない！"
