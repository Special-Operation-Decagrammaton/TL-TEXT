[translation]
11180-2 = "Episódio 18; Não somos amigos!"

11180-3 = "Ramen Shibaseki"

11180-4 = "Está aqui! ! Eu aceito!"

11180-5 = "H-Uma bebida por pessoa... está tudo bem em ser tão extravagante?"

11180-8 = "Se você quiser uma substituição, é só me avisar."

11180-11 = "...! ?"

11180-12 = "Não acredito que não haja clientes, embora seja tão delicioso."

11180-13 = "A localização não é ruim? Fica perto de uma escola que está prestes a fechar."

11180-14 = "Bem, é bom porque é delicioso. Bem, é só..."

11180-15 = "...Não é."

11180-16 = "sim?"

11180-17 = "Não somos amigos! !"

11180-18 = "(Droga!)"

11180-19 = "Uau! ?"

11180-20 = "Entendido! ! Eu descobri o que havia de errado comigo! O problema é essa loja, essa loja! !"

11180-21 = "! ?"

11180-22 = "Doyuko! ?"

11180-23 = "Estamos aqui para trabalhar! Seja duro! ! Parece um fora-da-lei! !"

11180-24 = "Mas o que é essa loja? Você pode comer até se fartar! ! #nQuente e gentil! Eles conversaram comigo, foram amigáveis ​​e o ambiente era caloroso!"

11180-25 = "Sinto que todos se tornam amigos aqui! !"

11180-26 = "Existe algum problema com isso?"

11180-27 = "Isso não é bom! ! Está tudo bagunçado e bagunçado! #nSe eu quiser me tornar um vilão de verdade, não preciso de uma loja como essa! !"

11180-28 = "O que eu preciso é de crueldade, crueldade e crueldade! Não parece tão quente! !"

11180-29 = "Não, acho que estou pensando demais nisso..."

11180-30 = "……."

11180-31 = "Isso significa... que devemos destruir esta loja, certo? Al-sama?"

11180-32 = "...... peido?"

11180-33 = "(sss)"

11180-34 = "Bom, finalmente posso ajudar Al-sama."

11180-35 = "Um detonador? Por que isso..."

11180-36 = "Haruka, espere um minuto..."

11180-38 = "(Gole)"

11180-39 = "……."

11180-40 = "...... peido! ?"

11180-42 = "(Dogogogogogogo!)"

11180-44 = "Explosão detectada num raio de 10 km à frente! Está perto!"

11180-45 = "10km significa… área da cidade? Um ataque! ?"

11180-46 = "A julgar pela forma da onda de choque, parece ser uma reação em cadeia de uma bomba C4. #nNão é bombardeio nem bombardeio...Vou verificar um pouco mais!"

11180-47 = "...Confirmação do local da explosão. É uma área da cidade! #nA localização exata é..."

11180-48 = "Ramen de Shibaseki...! ?"

11180-49 = "Shibaseki Ramen desapareceu sem deixar vestígios!"

11180-50 = "Ha! ? O que você quer dizer! ? Por que essa loja está sendo alvo?"

11180-51 = "Não é uma base estratégica nem uma importante rede de transportes. Quem diabos é esse...?"

11180-52 = "Bem, você está mirando em mim...?"

11180-53 = "Não é tarde para especular. Eu tenho que fazer algo primeiro!"

11180-54 = "Concordo! Esse não é o caso agora! ! Vamos lá!"

11180-55 = "Entrarei em contato com Hoshino-senpai para despachar! !"

11180-57 = "O que aconteceu! ! Geral...fique seguro...!"

11180-59 = "(Mokumoku...)"

11180-61 = "Goho, goho… Nossa, o prédio sumiu?"

11180-62 = "Uau... o que diabos é isso...?"

11180-63 = "(Guru Guru)"

11180-65 = "Próxima vez; Eu não vou perdoar vocês!"

