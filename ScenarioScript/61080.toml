[translation]
61080-1 = "Episódio 8; O Estilo Arius"
61080-7 = "São elas mesmo..."
61080-8 = "O Esquadrão... elas realmente vieram..."
61080-9 = "O que vieram fazer aqui? Depois de terem abandonado este lugar..."
61080-11 = "Desde sempre, elas eram tratadas de forma especial..."
61080-12 = "Pensando bem agora, esse 'tratamento especial' nem era grande coisa..."
61080-13 = "Aquele adulto é o Sensei da Schale...?#nAcho que é a primeira vez que o vejo pessoalmente..."
61080-14 = "Eu já vi. Mas na época nem dei bola..."
61080-16 = "...Esses olhares doem.#nSinto minha pele arder."
61080-17 = "V-Você tá bem!? Eu ainda tenho um pouquinho de creme hidratante aqui...!"
61080-18 = "Está tudo bem, Hiyori. Não foi isso que a Misaki quis dizer."
61080-19 = "É sobre essa... 'hostilidade'."
61080-27 = "Esquadrão――[ruby=Joumae]Joumae[/ruby] Saori."
61080-28 = "...Subaru."
61080-29 = "Vou ser direta.#n...Qual o propósito da sua visita?"
61080-30 = "Trabalho."
61080-31 = "Ouvi dizer que vocês estavam fugindo por aí como procuradas."
61080-32 = "Continuamos na mesma."
61080-33 = "Vai me dizer que... se cansaram dessa vida?"
61080-34 = "...Bem, estamos um pouco cansadas sim."
61080-38 = "Satchan...?"
61080-39 = "Desculpe. Mas neste lugar... eu não quero mentir."
61080-40 = "Neste lugar chamado Escola Filial de Arius."
61080-44 = "...Sim. Eu acho que entendo."
61080-46 = "...Entendo.#nEntão quer dizer que voltaram para [ruby=f u g i r]fugir[/ruby] da vida de fugitivas?"
61080-47 = "Infelizmente, sinto em dizer que não há mais lugar para vocês aqui."
61080-48 = "Isso não é necessariamente verdade."
61080-49 = "É só que... vejamos."
61080-50 = "...Hehe."
61080-51 = "Qual é a graça?"
61080-52 = "Não, me desculpe."
61080-53 = "É que lembrei do que vou dizer agora... e não consegui segurar a risada."
61080-54 = "...Pelo visto você melhorou a sua habilidade de irritar os outros enquanto esteve fora."
61080-55 = "Você sempre teve esse lado, é claro."
61080-56 = "Sério? Deixe-me pedir desculpas por isso.#nNão posso apagar o passado, mas――"
61080-61 = "É exatamente disso que estou falando!!!"
61080-65 = "Suu... Haa..."
61080-66 = "...Voltando ao assunto.#nVocê disse que era trabalho... O que vieram fazer em Arius?"
61080-67 = "Sobre isso――"
61080-68 = "Viemos para todas fazerem um 'exame'!"
61080-72 = "...Como é?"
61080-74 = "M-Mas o que ela tá falando...?#nE-xa-me... exame...? Eu não ouvi errado, né?"
61080-75 = "Foi o que eu ouvi também. Acho que você ouviu certo."
61080-76 = "Não faz sentido. Será que ela respirou tanto ar lá de fora que ficou biruta...?"
61080-78 = "E-Espera um pouco! Não tô conseguindo acompanhar a conversa...#nHã... o quê? Exame? Isso quer dizer..."
61080-82 = "..."
61080-83 = "...Continuo sem entender!!"
61080-85 = "Pfft, hehe..."
61080-86 = "Misaki?"
61080-87 = "Desculpe, Princesa. É que dá pra entender um pouco como a Líder se sentiu."
61080-88 = "Sério... hehe, não tem como não rir de uma coisa dessas."
61080-89 = "Até a Subaru-senpai não tá conseguindo processar a situação."
61080-91 = "Hmm... Acho que me expressei mal..."
61080-92 = "Dizem que falar a conclusão primeiro melhora o ritmo da conversa... ou algo do tipo."
61080-93 = "Não, espera. Você não pode fazer isso sem ler a situação e o contexto."
61080-94 = "Se você já percebeu, pode, por favor, explicar direito!?"
61080-95 = "Certo..."
61080-96 = "Basicamente."
61080-97 = "..."
61080-99 = "O negócio é que queremos que todas façam um 'exame'."
61080-100 = "Você é idiota!?"
61080-101 = "Mas não há outra forma de explicar isso."
61080-102 = "Olhe, até trouxemos as provas."
61080-108 = "Mas é isso! Por que nós temos que fazer esse tipo de exame!?"
61080-109 = "Hmmm..."
61080-110 = "Porque somos alunas?"
61080-111 = "...Até que ponto você vai zombar de mim, [ruby=Joumae]Joumae[/ruby] Saori!?"
61080-115 = "Faz tempo que eu não vejo a Senpai ficar desse jeito..."
61080-116 = "Elas sempre foram assim. Têm a pior química possível."
61080-119 = "S-Será que vai ficar tudo bem...?"
61080-120 = "Tudo bem, não é? Não é como se ela estivesse falando alguma besteira."
61080-121 = "Pelo contrário, dá até vontade de dizer para ela ir além."
61080-122 = "Sim, concordo. Força, Satchan."
61080-123 = "H-Hiiiiii..."
61080-125 = "[ns]\"Vou dar uma ajudinha aqui.\""
61080-126 = "S-Sensei...?"
61080-127 = "...Então você é o 'Sensei' da Schale."
61080-128 = "Muito prazer. E..."
61080-129 = "Bem-vindo a Arius, Sensei [USERNAME]."
61080-130 = "Pelo menos por enquanto, claro."
61080-131 = "[s]\"A Saori me falou bastante sobre você, Subaru.\""
61080-132 = "...Hã? E por que ela fez isso?"
61080-133 = "[s]\"C-Claro, as outras garotas do Esquadrão falaram também!\""
61080-134 = "...Tinha que ser logo ela."
61080-135 = "...Tudo bem. Mudando de assunto."
61080-136 = "Vocês aparecem do nada e nos mandam fazer um exame.#nIsso é algo muito difícil de engolir."
61080-137 = "[s]\"Eu queria discutir a premissa disso. O dever das alunas é estudar, sabe.\""
61080-138 = "Você realmente acha que isso se aplica a Arius?"
61080-139 = "[s1]\"Arius também é uma escola.\"\n[s2]\"Afinal, todas vocês são 'alunas' da Escola Filial de Arius.\""
61080-142 = "...!"
61080-143 = "N-Nós somos... [ruby=a l u n a s]alunas[/ruby]?"
61080-144 = "T-Tecnicamente... sim, né?"
61080-145 = "Kivotos é uma cidade acadêmica, e Arius faz parte dela..."
61080-148 = "M-Mas..."
61080-149 = "Eu sei. Pessoas como nós..."
61080-150 = "Será que podemos ser 'alunas' como as outras garotas...?"
61080-154 = "...Para começar, não são todas as alunas que precisam estudar."
61080-155 = "Essa é a única resposta que podemos lhe dar."
61080-156 = "[s]\"...Entendo. Como resposta, isso também está correto.\""
61080-157 = "Como é...?"
61080-158 = "[s3]\"Mas, que tal tentar pensar sobre isso só mais uma vez?\"\n[s4]\"Tente fazer isso uma vez. Se ainda assim você achar que é inútil.\"\n[s5]\"Nesse caso, você pode simplesmente desistir de tudo.\""
61080-162 = "...O resultado não vai mudar de qualquer maneira.#nEntão por que deveríamos passar por todo esse processo incômodo?"
61080-163 = "Vai dizer que desafiar a si mesma com coisas que nunca experienciou também é parte da juventude...?"
61080-164 = "...Bela teoria idealista que você tem aí."
61080-165 = "[s6]\"Mas sabe, para um 'Sensei'.\"\n[s7]\"Ser um pouco sonhador é a medida certa.\""
61080-168 = "O que foi isso..."
61080-169 = "Haa... eu entendi."
61080-170 = "[s]\"Então...!\""
61080-171 = "Sim."
61080-175 = "Ficou bem claro que nossa discussão não vai a lugar nenhum."
61080-179 = "...Não faça uma cara de decepção tão óbvia. Você é um adulto."
61080-180 = "De qualquer forma, é isso.#nSendo assim, seremos nós que as submeteremos a um 'exame'."
61080-181 = "Para ver se vocês――são dignas de entrar em Arius ou não."
61080-185 = "[ns]\"Eh...!?"
61080-186 = "Esquadrão... traidoras de Arius――!"
61080-187 = "Nossa visão sobre vocês... não mudou desde aquele dia.#nSe querem pôr os pés em Arius novamente... provem o seu valor!"
61080-188 = "――Trava de segurança, desativar!"
61080-197 = "...Sabia que ia acabar assim."
61080-206 = "[ns]\"Pessoal... o que estão fazendo!?\""
61080-207 = "Não se preocupe. Isso é muito comum aqui em Arius."
61080-208 = "Esse é o estilo Arius. Nós vivemos assim durante a vida toda."
61080-209 = "Dizem que as crianças crescem brigando, não é mesmo?"
61080-210 = "Hã? Vindo de mim, isso soa diferente?#nHehe, vou tomar isso como um elogio."
61080-211 = "De certa forma, é meio nostálgico... acho que finalmente me dei conta de que voltei."
61080-212 = "Atsuko, tem certeza que não precisa da máscara?"
61080-213 = "Sim. Fica difícil de falar com aquilo."
61080-214 = "E além disso... eu não sou mais aquela que precisa sempre ser protegida."
61080-215 = "...Entendi."
61080-216 = "Sensei, vá para um lugar mais seguro."
61080-217 = "E depois... eu deixo o comando com você."
61080-219 = "[ns]\"Então só nos resta lutar...\""
61080-221 = "Aqui é Arius!"
61080-222 = "Aqui é Arius!"
61080-223 = "Imponha as suas opiniões com a sua própria força!"
61080-224 = "Imponha com sua própria força!"
61080-225 = "Justiça sem poder não passa de um grito vazio!"
61080-226 = "Não há mais ninguém que possa se responsabilizar pela própria vida além de si mesmo!!"
61080-227 = "UOOOOOO!!"
61080-232 = "..."
61080-233 = "Esquadrão Arius."
61080-245 = "Preparem-se para revidar!"