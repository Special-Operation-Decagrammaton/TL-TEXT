[translation]
61080-1 = "第8話;アリウス流"
61080-7 = "本物だ……。"
61080-8 = "スクワッド……本当に来たんだ……。"
61080-9 = "何のつもりで戻ってきたの？ここを捨てていったくせに……。"
61080-11 = "昔から、特別扱いばっかりされてたのに……。"
61080-12 = "今思えば、その「特別扱い」も別に大したもんじゃなかったけどさ……。"
61080-13 = "あの大人がシャーレの先生……？#n直接見るのは初めてかも……。"
61080-14 = "私は見たことある。あの時は気にも留めなかったけど……。"
61080-16 = "……視線が痛いね。#n肌がピリピリする。"
61080-17 = "だ、大丈夫ですか！？保湿クリームならまだちょっとだけ残ってますけど……！"
61080-18 = "大丈夫だよ、ヒヨリ。ミサキが言ってるのは、そういう意味じゃないから。"
61080-19 = "この……「敵意」のことだよ。"
61080-27 = "スクワッド――[ruby=じょうまえ]錠前[/ruby]サオリ。"
61080-28 = "……スバル。"
61080-29 = "単刀直入に聞きます。#n……ここには、何の目的で？"
61080-30 = "仕事だ。"
61080-31 = "指名手配のまま、逃げ回っていると聞いてましたけど。"
61080-32 = "今も似たようなものだ。"
61080-33 = "その生活に嫌気が差した……とでも言うつもりですか？"
61080-34 = "……まあ、少し疲れてはいるな。"
61080-38 = "サッちゃん……？"
61080-39 = "すまない。この場では……嘘をつきたくないんだ。"
61080-40 = "この、アリウス分校という場ではな。"
61080-44 = "……うん。分かる気がする。"
61080-46 = "……そうですか。#nでは、[ruby=・   ・   ・   ・   ・   ・   ・   ・   ・]逃亡生活から逃げる[/ruby]ために戻って来たと？"
61080-47 = "あいにくですが、あなたたちの居場所はもう、残ってないような気がしますが。"
61080-48 = "そうとも限らない。"
61080-49 = "ただ……そうだな。"
61080-50 = "……ふふっ。"
61080-51 = "何がおかしいのですか？"
61080-52 = "いや、すまない。"
61080-53 = "今から話す内容を思うと……笑いが込み上げてきてな。"
61080-54 = "……見ないうちに、他人の神経を逆なでする腕を上げましたね。"
61080-55 = "前から、そういうところはありましたけど。"
61080-56 = "そうか？それは謝罪させてくれ。#n過去をなかったことにはできないが――"
61080-61 = "そういうところだって言ってるんです！！！"
61080-65 = "すぅ……はぁ……。"
61080-66 = "……話を戻しましょう。#n仕事と言っていましたが……アリウスに、何の用ですか。"
61080-67 = "それは――"
61080-68 = "みんなで「試験」を受けるためだ！"
61080-72 = "……はい？"
61080-74 = "な、なに言ってんの、あれ……。#nし、け、ん……試験……？今の、聞き間違いじゃないよね？"
61080-75 = "私もそう聞こえたよ。たぶん合ってると思う。"
61080-76 = "意味わかんない。外の空気を吸いすぎて変になったんじゃないの……？"
61080-78 = "ちょ、ちょっと待ってください！話についていけないんですけど……。#nえっと……え？しけん？それは、つまり……。"
61080-82 = "……。"
61080-83 = "……やっぱり、理解できません！！"
61080-85 = "ふっ、ふふっ……。"
61080-86 = "ミサキ？"
61080-87 = "ごめん、姫。でも、リーダーの気持ちもちょっと分かるというか。"
61080-88 = "だって……ふふっ、こんなの笑うしかないでしょ。"
61080-89 = "あのスバル先輩が状況を飲み込めてないし。"
61080-91 = "ふむ……伝え方が悪かったか……。"
61080-92 = "「結論ファースト」と言ってな、結論から先に述べると会話のテンポが良くなる……らしいのだが。"
61080-93 = "いや、違うな。状況と文脈を読まずにやるものではないな。"
61080-94 = "気づいたなら、改めて、ちゃんと、説明してもらえますか！？"
61080-95 = "うむ……。"
61080-96 = "つまり、だ。"
61080-97 = "……。"
61080-99 = "みんなで「試験」を受けようという話だ。"
61080-100 = "あなたバカですか！？"
61080-101 = "だが、これ以外に説明することが無いんだ。"
61080-102 = "ほら、試験は持ってきている。"
61080-108 = "だから！どうして！私たちがそんな試験を受けなきゃいけないんですか！？"
61080-109 = "うーん……。"
61080-110 = "生徒だから？"
61080-111 = "……どこまでコケにするんですか、[ruby=じょうまえ]錠前[/ruby]サオリ！"
61080-115 = "先輩があんな風になるの、久しぶりに見た……。"
61080-116 = "昔からだよ、あの2人。相性最悪ってやつ。"
61080-119 = "だ、大丈夫なんでしょうかぁ……。"
61080-120 = "別にいいんじゃない。間違ったこと言ってるわけでもないし。"
61080-121 = "むしろ、もっとやれって言いたいくらいだけど。"
61080-122 = "うん、私も賛成。がんばれ、サッちゃん。"
61080-123 = "ひ、ひいいいぃぃ……。"
61080-125 = "[ns]\"少しだけ、助け舟を出そうかな。\""
61080-126 = "せ、先生……？"
61080-127 = "……あなたが、シャーレの「先生」ですか。"
61080-128 = "初めまして。そして……。"
61080-129 = "ようこそ、アリウスへ。[USERNAME]先生。"
61080-130 = "まあ、今のところは、ですが。"
61080-131 = "[s]\"サオリから、スバルの話は聞いてるよ。\""
61080-132 = "……は？どうして彼女から？"
61080-133 = "[s]\"も、もちろん、他のスクワッドの子たちからもね！\""
61080-134 = "……なぜよりによって。"
61080-135 = "……まあいいでしょう。そんなことより。"
61080-136 = "突然来て、試験を受けろと言われているものですから。#nこちらとしては納得いたしかねます。"
61080-137 = "[s]\"前提の話をしたいんだ。生徒の本分は勉強だからね。\""
61080-138 = "それが、アリウスにも通用するとでも？"
61080-139 = "[s1]\"アリウスも学園だよ。\"\n[s2]\"みんなは、アリウス分校の「生徒」なんだから。\""
61080-142 = "……！"
61080-143 = "わ、私たちが……[ruby=・   ・]生徒[/ruby]？"
61080-144 = "い、一応はそうなる……よね？"
61080-145 = "キヴォトスは学園都市で、アリウスもその一部だし……。"
61080-148 = "で、でも……。"
61080-149 = "わかってる。私たちみたいなのが……。"
61080-150 = "他の子みたいに、「生徒」でいられるのかって……。"
61080-154 = "……そもそも、すべての生徒に勉強が必要とは限りません。"
61080-155 = "私たちが出せる答えは、以上です。"
61080-156 = "[s]\"……そうだね。それも、答えとしては正しいよ。\""
61080-157 = "はい……？"
61080-158 = "[s3]\"でも、一旦考えてみるのはどうかな？\"\n[s4]\"まずは一回、やってみる。それでも無意味だと思ったなら。\"\n[s5]\"そのときは、全部やめればいい。\""
61080-162 = "……どうせ結果は変わりませんよ。#nなのに、どうして面倒な過程を踏まなきゃいけないんですか？"
61080-163 = "経験してないことに挑戦するのも青春……？"
61080-164 = "……とてもきれいな理想論ですね。"
61080-165 = "[s6]\"でも、「先生」はね。\"\n[s7]\"夢見がちなくらいが、ちょうどいいんだよ。\""
61080-168 = "なんですか、それ……。"
61080-169 = "はぁ……分かりました。"
61080-170 = "[s]\"じゃあ……！\""
61080-171 = "はい。"
61080-175 = "私たちの議論は平行線だと、よく分かりました。"
61080-179 = "……露骨にガッカリした顔をしないでくださいよ。大人なんですから。"
61080-180 = "とにかく、そういうことですので。#nこちらから、「試験」をさせていただきます。"
61080-181 = "あなた方が――アリウスに入る資格があるかどうかを。"
61080-185 = "[ns]\"え……！？\""
61080-186 = "スクワッド……アリウスの裏切り者――！"
61080-187 = "私たちの認識は……あの時からずっと変わっていない。#n再びアリウスに足を踏み入れたいと言うのなら……存在価値を証明してもらいます！"
61080-188 = "――セーフティ、解除！"
61080-197 = "……やはり、こうなるか。"
61080-206 = "[ns]\"みんな……何してるの！？\""
61080-207 = "心配無用だ。アリウスではよくあることだからな。"
61080-208 = "これがアリウスのやり方で、私たちはずっとこうして生きてきたんだ。"
61080-209 = "子どもはケンカしながら育つって言うでしょ？"
61080-210 = "え？私が言うと、他の意味に聞こえるって？#nふふっ、褒め言葉として受け取っておくね。"
61080-211 = "なんだか懐かしいですね……戻ってきた実感が、ちょっと湧いてきました。"
61080-212 = "アツコ、マスクをしなくて大丈夫なのか？"
61080-213 = "うん。あれつけてると話しづらいし。"
61080-214 = "それに……私はもう、守られてばかりじゃないよ。"
61080-215 = "……分かった。"
61080-216 = "先生は少しでも安全な場所に下がって。"
61080-217 = "それから……指揮をお願い。"
61080-219 = "[ns]\"もう、戦うしかないんだね……。\""
61080-221 = "ここはアリウス！"
61080-222 = "ここはアリウス！"
61080-223 = "己の意見は、己の力で押し通せ！"
61080-224 = "己の力で押し通せ！"
61080-225 = "力なき正義は、空虚な叫びに過ぎず！"
61080-226 = "己が人生に責任を持てるのは、己を置いて他にいない！！"
61080-227 = "ウオオオオオオ！！"
61080-232 = "……。"
61080-233 = "アリウススクワッド。"
61080-245 = "応戦準備！"
