[translation]
61080-1 = "Episódio 8; Estilo Arius"
61080-7 = "É real..."
61080-8 = "O esquadrão... elas realmente vieram..."
61080-9 = "Com que intenção vocês voltaram? Depois de terem nos abandonado aqui..."
61080-11 = "Desde antigamente, vocês sempre foram tratadas como especiais..."
61080-12 = "Pensando bem agora, aquele \"tratamento especial\" nem era grande coisa..."
61080-13 = "Aquele adulto é o sensei do Schale...? Talvez seja a primeira vez que o vejo pessoalmente..."
61080-14 = "Eu já vi. Naquela época, eu nem prestei atenção..."
61080-16 = "...O olhar delas dói. Minha pele está formigando."
61080-17 = "V-você está bem!? Eu ainda tenho um pouco de creme hidratante, se quiser...!"
61080-18 = "Está tudo bem, Hiyori. Não é esse tipo de coisa que a Misaki quer dizer."
61080-19 = "Ela está falando dessa... \"hostilidade\"."
61080-27 = "Esquadrão — Saori, a Fechadura."
61080-28 = "...Subaru."
61080-29 = "Vou perguntar diretamente. ...Qual é o seu objetivo aqui?"
61080-30 = "Trabalho."
61080-31 = "Ouvi dizer que vocês ainda estão foragidas e sendo procuradas."
61080-32 = "A situação ainda é parecida."
61080-33 = "Você pretende dizer que... se cansou dessa vida?"
61080-34 = "...Bem, estou um pouco cansada, sim."
61080-38 = "Sa-chan...?"
61080-39 = "Desculpe. Neste lugar... eu não quero mentir."
61080-40 = "Neste lugar chamado Escola Filial Arius."
61080-44 = "...Sim. Acho que entendo."
61080-46 = "...Entendo. Então, você voltou para fugir da vida de fugitiva?"
61080-47 = "Infelizmente, tenho a impressão de que não sobrou nenhum lugar para vocês aqui."
61080-48 = "Não necessariamente."
61080-49 = "Mas... é verdade."
61080-50 = "...Fufu."
61080-51 = "O que há de tão engraçado?"
61080-52 = "Não, me desculpe."
61080-53 = "Ao pensar no que vou dizer agora... a risada simplesmente escapou."
61080-54 = "...Faz tempo que não nos vemos, e você ficou ainda melhor em irritar os outros."
61080-55 = "Embora você sempre tenha tido esse lado."
61080-56 = "É mesmo? Peço desculpas por isso. Não posso apagar o passado, mas —"
61080-61 = "É exatamente desse seu jeito que eu estou falando!!!"
61080-65 = "Suspiro... haa..."
61080-66 = "...Vamos voltar ao assunto. Você disse que é trabalho... o que você quer com Arius?"
61080-67 = "É que..."
61080-68 = "Nós viemos para fazer o \"exame\" juntas!"
61080-72 = "...Oi?"
61080-74 = "O-o que ela está dizendo...? E-e-exame... exame...? Eu não ouvi errado, ouvi?"
61080-75 = "Eu ouvi a mesma coisa. Acho que está correto."
61080-76 = "Não faz sentido. Será que ela ficou maluca por respirar ar puro demais lá fora...?"
61080-78 = "E-espere um pouco! Eu não estou conseguindo acompanhar a conversa... Hum... o quê? Exame? Isso significa, tipo..."
61080-82 = "..."
61080-83 = "...Eu realmente não consigo entender!!"
61080-85 = "Pff, fufu..."
61080-86 = "Misaki?"
61080-87 = "Desculpe, Princesa. Mas, de certa forma, eu até entendo o sentimento da líder."
61080-88 = "Porque... hehe, não tem como não rir disso."
61080-89 = "A própria veterana Subaru não está conseguindo entender a situação."
61080-91 = "Hum... será que eu me expliquei mal?..."
61080-92 = "Dizem que usar a 'conclusão primeiro', ou seja, começar pelo resultado, torna o ritmo da conversa melhor... pelo que dizem."
61080-93 = "Não, esquece. Não é algo para se fazer sem ler o contexto e a situação."
61080-94 = "Já que percebeu, pode explicar de novo, e direito, por favor!?"
61080-95 = "Hum..."
61080-96 = "Em resumo, é o seguinte."
61080-97 = "..."
61080-99 = "O assunto é que todos nós vamos fazer um 'exame'."
61080-100 = "Você é idiota!?"
61080-101 = "Mas não há mais nada para explicar além disso."
61080-102 = "Veja, eu trouxe o exame."
61080-108 = "Por isso! Por que! Por que nós temos que fazer um exame desses!?"
61080-109 = "Hmm..."
61080-110 = "Porque são estudantes?"
61080-111 = "Até onde você vai nos humilhar, Saori Joumae!"
61080-115 = "Faz tempo que não vejo a veterana daquele jeito..."
61080-116 = "É assim desde antigamente, aquelas duas. Têm a pior química possível."
61080-119 = "E-está tudo bem, será?..."
61080-120 = "Acho que não tem problema. Ela não disse nada de errado."
61080-121 = "Na verdade, eu até diria para ela continuar."
61080-122 = "Sim, eu concordo. Boa sorte, Sa-chan."
61080-123 = "I-iiiii..."
61080-125 = "[ns]\"Acho que vou dar uma mãozinha.\""
61080-126 = "P-professor...?"
61080-127 = "...Então você é o 'Professor' do Schale."
61080-128 = "Muito prazer. E..."
61080-129 = "Bem-vindo a Arius, Professor [USERNAME]."
61080-130 = "Bem, pelo menos por enquanto."
61080-131 = "[s]\"Ouvi falar da Subaru através da Saori.\""
61080-132 = "...Hã? Por que através dela?"
61080-133 = "[s]\"E, claro, das outras garotas do esquadrão também!\""
61080-134 = "...Por que logo elas."
61080-135 = "...Bem, tanto faz. Mais importante que isso."
61080-136 = "Você apareceu de repente e nos mandou fazer um exame. #nDa nossa parte, não podemos aceitar isso."
61080-137 = "[s]\"Quero falar sobre a premissa. O dever de um estudante é estudar, afinal.\""
61080-138 = "Acha mesmo que isso se aplica a Arius?"
61080-139 = "[s1]\"Arius também é uma escola.\"\n[s2]\"Vocês são 'estudantes' da filial de Arius, afinal.\""
61080-142 = "...!"
61080-143 = "N-nós somos... estudantes?"
61080-144 = "B-bem, tecnicamente é isso, né?"
61080-145 = "Kivotos é uma cidade acadêmica, e Arius faz parte dela..."
61080-148 = "M-mas..."
61080-149 = "Eu sei. Pessoas como nós..."
61080-150 = "Será que podemos ser 'estudantes' como as outras garotas?..."
61080-154 = "...Para começar, não é todo estudante que precisa estudar."
61080-155 = "Essa é a única resposta que podemos dar."
61080-156 = "[s]\"...Entendo. Essa também é uma resposta válida.\""
61080-157 = "Sim...??"
61080-158 = "[s3]\"Mas, que tal tentar pensar sobre isso por um momento?\"\n[s4]\"Primeiro, tente fazer uma vez. Se ainda assim achar que não tem sentido...\"\n[s5]\"Nesse momento, você pode desistir de tudo.\""
61080-162 = "……De qualquer forma, o resultado não vai mudar. #nEntão, por que eu teria que passar por um processo tão trabalhoso?"
61080-163 = "Desafiar algo que você nunca experimentou também é juventude...?"
61080-164 = "……É um ideal muito bonito, devo admitir."
61080-165 = "[s6]\"Mas, sabe, 'Sensei'.\"\n[s7]\"Ser um pouco sonhador é o ideal.\""
61080-168 = "O que é isso...?"
61080-169 = "Haa... Entendido."
61080-170 = "[s]\"Então...!\""
61080-171 = "Sim."
61080-175 = "Ficou claro que nossa discussão não vai chegar a lugar nenhum."
61080-179 = "……Por favor, não faça essa cara de decepção tão óbvia. Você é um adulto, afinal."
61080-180 = "De qualquer forma, é isso. #nEu mesma farei o 'teste' com vocês."
61080-181 = "Para ver se vocês têm o que é preciso para entrar em Arius."
61080-185 = "[ns]\"Eh...!?\""
61080-186 = "Esquadrão... Traidores de Arius...!"
61080-187 = "Nossa percepção... não mudou nada desde aquela época. #nSe vocês querem pisar em Arius novamente... provem o seu valor!"
61080-188 = "――Segurança, desativada!"
61080-197 = "……Como esperado, acabou assim."
61080-206 = "[ns]\"Pessoal... o que vocês estão fazendo!?\""
61080-207 = "Não se preocupe. Isso é comum em Arius."
61080-208 = "Esse é o jeito de Arius, e é assim que vivemos desde sempre."
61080-209 = "Dizem que crianças crescem brigando, não é?"
61080-210 = "Hã? Quando eu digo isso, soa como outra coisa? #nFufu, vou aceitar como um elogio."
61080-211 = "De alguma forma, é nostálgico... Sinto que finalmente voltei para casa."
61080-212 = "Atsuko, tem certeza de que não precisa da máscara?"
61080-213 = "Sim. É difícil falar usando aquilo."
61080-214 = "Além disso... eu não sou mais alguém que só precisa ser protegida."
61080-215 = "……Entendido."
61080-216 = "Sensei, fique em um lugar seguro."
61080-217 = "E então... por favor, assuma o comando."
61080-219 = "[ns]\"Então, não temos escolha a não ser lutar...\""
61080-221 = "Aqui é Arius!"
61080-222 = "Aqui é Arius!"
61080-223 = "Imponha suas opiniões com sua própria força!"
61080-224 = "Imponha com sua própria força!"
61080-225 = "Justiça sem força não passa de um grito vazio!"
61080-226 = "Não há ninguém além de você mesmo para ser responsável pela sua própria vida!!"
61080-227 = "UOOOOOOO!!"
61080-232 = "……"
61080-233 = "Esquadrão Arius."
61080-245 = "Preparar para o combate!"
