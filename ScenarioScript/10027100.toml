[translation]
10027100-1 = "第10話;工務部の提案"
10027100-9 = "レッドウィンター連邦学園・雪山"
10027100-10 = "はあ、はあ……。"
10027100-11 = "勝った……の？"
10027100-12 = "事務局は撃退しましたけど、これが理由で恨まれないか心配です……"
10027100-13 = "大丈夫。「知識解放戦線」は元々事務局に恨まれてるから。"
10027100-14 = "それはそうですけど……。"
10027100-18 = "[ns] \"同人の行く手を阻む者には、破滅が待っているだろう……！\""
10027100-19 = "せ、先生？"
10027100-20 = "とりあえず行くよ！時間がない！"
10027100-23 = "――労働と革命について、話したいことがある。"
10027100-25 = "今度は誰！？"
10027100-34 = "えっと……？工務部員の方々と、ミノリ部長……？"
10027100-36 = "ここにいたんだな、会いに行く手間が省けた。"
10027100-37 = "『ルナ』という作品の関連書籍の制作を、「知識解放戦線」で大々的に進めていると聞いて訪ねてきた。"
10027100-39 = "えっと……。大々的というほどではないけど、まあ、進めてはいるよ……？"
10027100-40 = "その……私たちの同人誌と工務部に、何の関係があるのでしょうか？"
10027100-42 = "まず、あたしたちは過去の遺産を振り返り、それを現代に蘇らせようという「知識解放戦線」の発想と精神を尊重してる。"
10027100-43 = "労働の歴史を振り返っていくほど、革命への闘志に溢れ、既得権益に対する闘争意欲は、より一層高められるものだからな。"
10027100-45 = "（『ルナ』ってそんな内容だったっけ……？）"
10027100-46 = "（絶対に違いますよね……？）"
10027100-48 = "よって！あたしたち工務部は「知識解放戦線」に提案がある！"
10027100-49 = "「知識解放戦線」が現在作っている書籍の内容を、より革命的な内容に変えることを提案する!"
10027100-51 = "提案する！提案する！"
10027100-53 = "さらに、労働階級の啓蒙と解放のために、資本家に苦しむ労働者と彼女たちの闘争を主題として取り上げるよう申し入れる次第だ！"
10027100-55 = "申し入れる！申し入れる！"
10027100-61 = "[ns] \"一体どこでその話を聞いたの……。\""
10027100-63 = "一体何を言い出すのかと思ったら……"
10027100-64 = "工務部員の方々にはお世話になっていますし、#n図書館を訪ねてくださる方もいらっしゃるので感謝の気持ちはありますが……。"
10027100-66 = "今回はダメです！"
10027100-67 = "時間がないから無理！"
10027100-73 = "……失望したよ「知識解放戦線」。#n普段、厳選してくれた文学作品に多くの助けてもらっているから……"
10027100-74 = "今度こそ一緒に手を組み「ヨーグルトのふたを舐めずに捨てる憎らしいひげチビ」に痛い目を見せられると期待していたのに！"
10027100-75 = "[s] \"やっぱりそれ、工務部だったんだ！？\""
10027100-76 = "仕方がない。この方法だけは使いたくなかったが……。"
10027100-77 = "同志たちよ！これからあたし達は、ぼやけてしまった「知識解放戦線」の視野を、再び明瞭にすべく、熱き闘争へと移行する！"
10027100-79 = "わああああ！"
