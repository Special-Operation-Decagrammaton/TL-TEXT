[translation]
10027100-1 = "Episódio 10: A Proposta do Departamento de Obras"
10027100-9 = "Academia Red Winter - Montanhas Nevadas"
10027100-10 = "Haa, haa..."
10027100-11 = "Nós... vencemos?"
10027100-12 = "Repelimos o Secretariado, mas estou preocupada se isso não vai nos trazer problemas no futuro..."
10027100-13 = "Está tudo bem. A 'Frente de Libertação do Conhecimento' já é odiada pelo Secretariado de qualquer forma."
10027100-14 = "Isso é verdade, mas..."
10027100-18 = "[ns] \"Aqueles que bloqueiam o caminho dos doujinshi encontrarão a ruína...!\""
10027100-19 = "Se-Sensei?"
10027100-20 = "Vamos logo! Não temos tempo!"
10027100-23 = "――Tenho algo a dizer sobre trabalho e revolução."
10027100-25 = "Quem é agora!?"
10027100-34 = "Hum...? O pessoal do Departamento de Obras e a Chefe Minori...?"
10027100-36 = "Então vocês estavam aqui. Isso me poupa o trabalho de ter que ir atrás de vocês."
10027100-37 = "Soubemos que a 'Frente de Libertação do Conhecimento' está produzindo livros relacionados à obra chamada 'Luna', por isso viemos visitá-los."
10027100-39 = "Bem... Não diria que é algo em grande escala, mas sim, estamos trabalhando nisso...?"
10027100-40 = "E... o que nossos doujinshis têm a ver com o Departamento de Obras?"
10027100-42 = "Primeiro, nós respeitamos o conceito e o espírito da 'Frente de Libertação do Conhecimento' de olhar para o legado do passado e trazê-lo de volta à modernidade."
10027100-43 = "Quanto mais refletimos sobre a história do trabalho, mais transbordamos espírito revolucionário, e a vontade de lutar contra os interesses estabelecidos se torna ainda maior."
10027100-45 = "(O conteúdo de 'Luna' era mesmo esse...?)"
10027100-46 = "(Com certeza não é, né...?)"
10027100-48 = "Portanto! Nós, do Departamento de Obras, temos uma proposta para a 'Frente de Libertação do Conhecimento'!"
10027100-49 = "Propomos que o conteúdo dos livros que a 'Frente de Libertação do Conhecimento' está produzindo seja alterado para algo mais revolucionário!"
10027100-51 = "Propomos! Propomos!"
10027100-53 = "Além disso, para a iluminação e libertação da classe trabalhadora, exigimos que o tema central seja a luta das trabalhadoras que sofrem nas mãos dos capitalistas!"
10027100-55 = "Exigimos! Exigimos!"
10027100-61 = "[ns] \"De onde vocês tiraram essa ideia...\""
10027100-63 = "Pensei que fossem dizer qualquer coisa, mas..."
10027100-64 = "Somos muito gratas ao pessoal do Departamento de Obras, e agradecemos por aqueles que visitam a biblioteca, mas..."
10027100-66 = "Desta vez, não!"
10027100-67 = "Não temos tempo, é impossível!"
10027100-73 = "...Estou decepcionada, 'Frente de Libertação do Conhecimento'. Já que muitas vezes fomos ajudadas pelas obras literárias que vocês selecionaram com tanto cuidado..."
10027100-74 = "Eu esperava que desta vez pudéssemos unir forças para dar uma lição naquele 'baixinho bigodudo detestável que joga o iogurte fora sem lamber a tampa'!"
10027100-75 = "[s] \"Então era o Departamento de Obras mesmo!?\""
10027100-76 = "Não tem jeito. Eu não queria usar este método, mas..."
10027100-77 = "Camaradas! A partir de agora, entraremos em uma luta fervorosa para clarear a visão da 'Frente de Libertação do Conhecimento', que se tornou turva!"
10027100-79 = "Waaaaaaaah!"
