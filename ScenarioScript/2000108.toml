[translation]
2000108-1 = "メイドカフェ！（１）"
2000108-2 = "野外広場"
2000108-3 = "道を歩いていたら、新しくオープンしたメイドカフェを発見した。"
2000108-4 = "[s1] （もちろん入ってみたいよね？）\n[s2] （やめておこう、今はまだ早い）"
2000108-5 = "（心の声に従うことにした）"
2000108-6 = "（しかし頭とは違って体は正直だった）"
2000108-7 = "（ガチャッ）"
2000108-9 = "カフェ・メイドラマティック！"
2000108-12 = "ルン～ルン～ルルンッ！"
2000108-13 = "ご主人様の可愛いメイド、キャサリンでっす！"
2000108-14 = "お帰りなさいませ～、ご主人様～！"
2000108-16 = "ご主人様のことをずっとお待ちしておりました！メイドラマティック！へ、よう、こ……！"
2000108-17 = "うわあああっ！？"
2000108-18 = "せ、先生、どうしてここに……！？"
2000108-19 = "[s3] \"……誰ですか？\"\n[s4] \"キャサリン……? \""
2000108-20 = "はあ……騙されたんだ。"
2000108-21 = "はあ……騙されたんだ。"
2000108-22 = "友人が……可愛いウェイトレスの制服が着られる……#n可愛らしいデザートを提供するカフェのアルバイトだからって言うから……。"
2000108-23 = "断れない理由もあったとはいえ、まさか。"
2000108-24 = "まさかメイドカフェだったなんて……！"
2000108-25 = "そ、それより！先生はなんでここに来たんだ！"
2000108-26 = "いや！先生がこんなところに来ていいのか！？"
2000108-27 = "[s5] \"もう退勤したから、ご主人様って呼んで。\"\n[s6] \"たとえ法律や道徳が許さなくても、私はメイドが好き。\""
2000108-28 = "何を言ってるんだ……。"
2000108-29 = "と、とにかく早く出てくれ！いくら何でも先生になんて……恥ずかしい！"
2000108-30 = "別に……いやらしいお店ではないけど……。"
2000108-31 = "で、でも！ダメ！#nお願いだから早く外へ……。"
2000108-32 = "ほら、ダメだよ、キャサリン。"
2000108-33 = "きちんと接客しないと。"
2000108-34 = "くっ、店長……。"
2000108-35 = "わ、分かりました。はあ、仕方ない。#n今はお客さん……いや……。"
2000108-36 = "……。"
2000108-38 = "ご、ごしゅじん……さま、だから……。"
2000108-39 = "……すー、はーっ。"
2000108-40 = "いらっしゃいませ、お席にご案内いたします。"
2000108-42 = "ご存じの通り、店内での写真の撮影や、メイドへのタッチは禁止です。"
2000108-43 = "特に写真については……命の保証ができないということを覚えておいてくださいね。"
2000108-44 = "それではメニューをご覧いただき、ご注文を……。"
2000108-45 = "[s7] \"萌え萌えキュ～ン、ってやって？\"\n[s8] \"美味しくな～れっ、シャララララーン！の呪文唱えて。\""
2000108-46 = "なんでそんなに詳しいの……！#n先生、いや、ご主人様、もしかしてメイドカフェのマニア……？"
2000108-47 = "なんでそんなに詳しいの……！#n先生、いや、ご主人様、もしかしてメイドカフェのマニア……？"
2000108-48 = "と、とにかく、そんなの恥ずかしいから無理だ。"
2000108-49 = "[s] \"それなら、「ご褒美」がいいな。\""
2000108-50 = "え？ご褒美？それってどういう……「我々の業界ではご褒美」？"
2000108-51 = "私もメイドカフェのアルバイトは初めてだから、あまり良く分からないのだけど……。"
2000108-52 = "えっと、ちょっと待って……検索してみる。#nえっと、我々の業界……では……ご褒……美……？"
2000108-54 = "えっ……！？"
2000108-55 = "な、なんだこれは！？本当にメイドはこういうこともやるのか？"
2000108-56 = "あ、足で？き、気持ち悪い！やらない！絶対やらない！"
2000108-57 = "ど……どうしてそんなこと……！"
2000108-58 = "あ、「足でグリグリ踏んでほしい」だなんて！"
2000108-59 = "ああ、信じられない……！"
2000108-60 = "え？マッサージになる？いや、あり得な……"
2000108-61 = "……。"
2000108-62 = "ううっ。店長が睨んでる……。"
2000108-63 = "わ、分かった。#n「ご褒美」は難しいけど……代わりに……"
2000108-66 = "……こっちなら、やってあげる。"
2000108-67 = "も……萌え……萌え……"
2000108-68 = "きゅ……"
2000108-69 = "きゅっ……！"
2000108-70 = "きゅぅぅ……"
2000108-71 = "うわぁあぁやっぱり無理っ！！"
2000108-74 = "（その後、店長に二人して怒られた）"
