[translation]
2000108-1 = "Café Maid! (1)"
2000108-2 = "Praça ao ar livre"
2000108-3 = "Enquanto caminhava pela rua, descobri um café de empregadas recém-inaugurado."
2000108-4 = "[s1] (Claro que você quer entrar, né?)\n[s2] (Melhor não, ainda é muito cedo)"
2000108-5 = "(Decidi seguir a voz do meu coração)"
2000108-6 = "(No entanto, ao contrário da minha cabeça, meu corpo foi honesto)"
2000108-7 = "(Clack)"
2000108-9 = "Café Maidramatic!"
2000108-12 = "Run~ run~ rurun!"
2000108-13 = "Eu sou a Catherine, a empregada fofa do mestre!"
2000108-14 = "Bem-vindo de volta, mestre~!"
2000108-16 = "Estávamos esperando ansiosamente pelo mestre! Bem-vindo ao... Maidramatic!"
2000108-17 = "Aaaaaah!?"
2000108-18 = "Se-Sensei, por que você está aqui...!?"
2000108-19 = "[s3] \"...Quem é você?\"\n[s4] \"Catherine...?\""
2000108-20 = "Ah... fui enganada."
2000108-21 = "Ah... fui enganada."
2000108-22 = "Um amigo me disse que... eu poderia usar um uniforme de garçonete fofo...#nque era um trabalho de meio período em um café que servia sobremesas adoráveis..."
2000108-23 = "Embora eu tivesse motivos para não recusar, eu não esperava por isso."
2000108-24 = "Eu não esperava que fosse um café de empregadas...!"
2000108-25 = "E-e além disso! Por que o Sensei veio aqui!"
2000108-26 = "Não! O Sensei deveria estar em um lugar como este!?"
2000108-27 = "[s5] \"Já saí do trabalho, então me chame de mestre.\"\n[s6] \"Mesmo que a lei ou a moral não permitam, eu amo empregadas.\""
2000108-28 = "O que você está dizendo..."
2000108-29 = "De-de qualquer forma, saia logo! Não importa o que aconteça, para o Sensei... é vergonhoso!"
2000108-30 = "Não é que... seja um lugar indecente, mas..."
2000108-31 = "Ma-mas! Não!#nPor favor, vá embora logo..."
2000108-32 = "Ora, não pode fazer isso, Catherine."
2000108-33 = "Você precisa atender os clientes corretamente."
2000108-34 = "Droga, gerente..."
2000108-35 = "Tu-tudo bem. Ah, não tem jeito.#nAgora você é um cliente... não..."
2000108-36 = "..."
2000108-38 = "Me-mestre... então..."
2000108-39 = "...Suspiro."
2000108-40 = "Bem-vindo, vou levá-lo à sua mesa."
2000108-42 = "Como você sabe, é proibido tirar fotos dentro da loja ou tocar nas empregadas."
2000108-43 = "Especialmente sobre as fotos... lembre-se de que não posso garantir a sua vida."
2000108-44 = "Por favor, dê uma olhada no menu e faça seu pedido..."
2000108-45 = "[s7] \"Pode fazer o 'Moe Moe Kyun'?\"\n[s8] \"Cante o feitiço 'Fique delicioso, shalalalala!'"
2000108-46 = "Por que você sabe tanto sobre isso...!#nSensei, não, mestre, será que você é um maníaco por cafés de empregadas...?"
2000108-47 = "Por que você sabe tanto sobre isso...!#nSensei, não, mestre, será que você é um maníaco por cafés de empregadas...?"
2000108-48 = "De-de qualquer forma, isso é vergonhoso, então não posso fazer."
2000108-49 = "[s] \"Nesse caso, eu gostaria de uma 'recompensa'."
2000108-50 = "Hã? Recompensa? O que isso significa... 'Recompensa na nossa indústria'?"
2000108-51 = "É meu primeiro trabalho de meio período em um café de empregadas, então não entendo muito bem..."
2000108-52 = "Bem, espere um pouco... vou pesquisar.#nBem, na nossa indústria... então... recom... pensa...?"
2000108-54 = "Hã...!?"
2000108-55 = "O-o que é isso!? As empregadas realmente fazem esse tipo de coisa?"
2000108-56 = "Co-com os pés? Que nojo! Não vou fazer! De jeito nenhum!"
2000108-57 = "Po-por que você faria algo assim...!"
2000108-58 = "Ah, dizer algo como 'eu quero que você me pise com o pé'!"
2000108-59 = "Ah, inacreditável...!"
2000108-60 = "Hã? Que serve como massagem? Não, isso é impossível..."
2000108-61 = "..."
2000108-62 = "Ugh. O gerente está me encarando..."
2000108-63 = "T-tá bom. #nUma 'recompensa' é difícil, mas... em troca..."
2000108-66 = "...Se for isso, eu faço para você."
2000108-67 = "Mo... moe... moe..."
2000108-68 = "Kyu..."
2000108-69 = "Kyu...!"
2000108-70 = "Kyuuu..."
2000108-71 = "Aaaah, eu sabia que não ia conseguir!!"
2000108-74 = "(Depois disso, nós dois levamos uma bronca do gerente)"
