[translation]
1300303-1 = "気がつかなかった事実"
1300303-2 = "（カランカラン）"
1300303-4 = "（約束の場所にハスミがやってきた）"
1300303-5 = "あ、お待たせいたしました、先生。"
1300303-6 = "[s] \"おはよう。\""
1300303-7 = "では、まず注文をしましょうか？ここのミルクティー、とても美味しいんですよ。"
1300303-8 = "ご注文はいかがなさいますか？"
1300303-9 = "私はミルクティーで、えっと……先生は何になさいますか？"
1300303-10 = "[s1] ″ブラックコーヒーで。″\n[s2] ″オレンジジュースで。″\n[s3] ″フルーツパフェで。″"
1300303-11 = "はい、では……。"
1300303-12 = "ハニーミルクティーひとつと、ブラックコーヒーひとつ。"
1300303-13 = "はい、では……。"
1300303-14 = "ハニーミルクティーひとつと、オレンジジュースひとつ。"
1300303-15 = "はい、では……。"
1300303-16 = "ハニーミルクティーひとつと、フルーツパフェひとつ。"
1300303-17 = "それからバタープリンをひとつ、ショコラバウムクーヘンとチーズタルトをひとつずつ。"
1300303-18 = "あとはこの季節のフルーツを添えたティラミス、それにオレンジマドレーヌと……あと……。"
1300303-19 = "クロッカンショコラをふたつに……それから抹茶クレープと……。"
1300303-20 = "[s] \"…………。\""
1300303-21 = "えっと、これぐらいで良さそうですね。"
1300303-23 = "どうぞ召し上がってください、先生。"
1300303-24 = "[s] \"楽しそうだね。\""
1300303-25 = "（モグモグ）"
1300303-26 = "そ、そうですか？"
1300303-27 = "失礼しました。ちょっとお行儀が良くなかったかもしれないですね……。"
1300303-28 = "私、スイーツがすごく好きでして。もし正義実現委員会に入らなかったら、放課後スイーツ部に入っていたかもしれません。"
1300303-29 = "ですが一人でも、毎日こうやって美味しい物を食べる時間はとても大切にしていまして……。"
1300303-30 = "（モグモグ）"
1300303-31 = "[s] \"それで、相談ってどうしたの？\""
1300303-32 = "はい、実は……。"
1300303-33 = "………。"
1300303-34 = "ダイエット……についてのことなのですが……。"
1300303-35 = "[s] \"ダイエット？\""
1300303-36 = "……。"
1300303-37 = "はい。私、特に何もしなくても太ってしまう体質でして……。"
1300303-38 = "とりあえずダイエットはしているんですが……やってもやっても成果が出ず……。"
1300303-39 = "いったい何が原因か分からなくて……。"
1300303-40 = "先生は生徒たちを管理する立場の方ですから、何かアドバイスを頂けないかなと思いまして……。"
1300303-41 = "[s4] \"……原因かぁ。\"\n[s5] \"……思い当たること、何かない？\""
1300303-42 = "……先生は、原因が分かるのですか？"
1300303-43 = "……先生は、原因が分かるのですか？"
1300303-44 = "体質でしょうか？それとも生活習慣……？運動量をもう少し増やした方がいいのでしょうか？"
1300303-46 = "[s] デザートを食べているハスミを見つめる。"
1300303-48 = "……？"
1300303-49 = "……。"
1300303-50 = "…………。"
1300303-51 = "……あ、そ、その、つまり……。"
1300303-52 = "……。"
1300303-53 = "原因……えっと……こ、これでしょうか？"
1300303-54 = "……。"
1300303-55 = "そ、そう……ですよね、やっぱり、これですよね。"
1300303-56 = "……こんな単純なことに気付かずに……わ、私は……。"
1300303-57 = "……原因を聞くため先生に会いに来て……その場でこんなに食べてしまって……恥ずかしい……。"
1300303-58 = "[s] \"大丈夫？\""
1300303-60 = "きゅ、急な用事を思い出しました、先生！私はこれで失礼します！"
1300303-62 = "（ヒューン）"
1300303-64 = "[s] \"またこの展開！？\""
1300303-65 = "それでは……！"
1300303-67 = "（再び風のように消えていったハスミだった）"
