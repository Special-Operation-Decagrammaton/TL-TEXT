[translation]
1300303-1 = "Um fato que eu não tinha notado"
1300303-2 = "（Clim-clim）"
1300303-4 = "（Hasumi chega ao local combinado）"
1300303-5 = "Ah, desculpe a demora, Sensei."
1300303-6 = "[s] \"Bom dia.\""
1300303-7 = "Bem, vamos fazer o pedido primeiro? O chá com leite daqui é muito bom."
1300303-8 = "O que você gostaria de pedir?"
1300303-9 = "Eu vou querer um chá com leite, e... o que você vai querer, Sensei?"
1300303-10 = "[s1] \"Um café preto.\"\n[s2] \"Um suco de laranja.\"\n[s3] \"Um parfait de frutas.\""
1300303-11 = "Certo, então..."
1300303-12 = "Um chá com leite com mel e um café preto."
1300303-13 = "Certo, então..."
1300303-14 = "Um chá com leite com mel e um suco de laranja."
1300303-15 = "Certo, então..."
1300303-16 = "Um chá com leite com mel e um parfait de frutas."
1300303-17 = "E também um pudim de manteiga, um Baumkuchen de chocolate e uma torta de queijo, um de cada."
1300303-18 = "Além disso, o tiramisu com frutas da estação, uma madeleine de laranja e... mais..."
1300303-19 = "Dois chocolates croquant... e um crepe de matcha e..."
1300303-20 = "[s] \"............\""
1300303-21 = "Bem, acho que isso é o suficiente."
1300303-23 = "Por favor, sirva-se, Sensei."
1300303-24 = "[s] \"Parece que você está se divertindo.\""
1300303-25 = "（Mastiga）"
1300303-26 = "V-você acha?"
1300303-27 = "Peço desculpas. Talvez eu não tenha sido muito educada..."
1300303-28 = "Eu gosto muito de doces. Se eu não tivesse entrado para o Comitê de Justiça, talvez tivesse entrado para o Clube de Doces depois da aula."
1300303-29 = "Mas, mesmo sozinha, eu valorizo muito esse tempo que tiro todos os dias para comer coisas gostosas..."
1300303-30 = "（Mastiga）"
1300303-31 = "[s] \"Então, sobre o que você queria conversar?\""
1300303-32 = "Sim, na verdade..."
1300303-33 = "..."
1300303-34 = "É sobre... dieta..."
1300303-35 = "[s] \"Dieta?\""
1300303-36 = "..."
1300303-37 = "Sim. Eu tenho um tipo físico que ganha peso mesmo sem fazer nada em especial..."
1300303-38 = "Eu estou tentando fazer dieta, mas... não importa o quanto eu tente, não vejo resultados..."
1300303-39 = "Eu não consigo entender qual é a causa..."
1300303-40 = "Como o Sensei é responsável por cuidar dos alunos, pensei que talvez pudesse me dar algum conselho..."
1300303-41 = "[s4] \"...A causa, é?\"\n[s5] \"...Não consegue pensar em nada?\""
1300303-42 = "...Sensei, você sabe qual é a causa?"
1300303-43 = "...Sensei, você sabe qual é a causa?"
1300303-44 = "Será que é o meu metabolismo? Ou talvez meus hábitos diários...? Devo aumentar um pouco a quantidade de exercícios?"
1300303-46 = "[s] Observa Hasumi comendo a sobremesa."
1300303-48 = "...?"
1300303-49 = "..."
1300303-50 = "............"
1300303-51 = "...Ah, e-então, quer dizer..."
1300303-52 = "..."
1300303-53 = "A causa... bem... s-seria isso?"
1300303-54 = "..."
1300303-55 = "É, é verdade... você tem razão, é isso mesmo."
1300303-56 = "......Como eu não percebi algo tão simples... E-eu..."
1300303-57 = "......Vim ver o Sensei para perguntar a causa... e acabei comendo tudo isso na sua frente... que vergonha..."
1300303-58 = "[s] \"Você está bem?\""
1300303-60 = "L-lembrei de um compromisso urgente, Sensei! Com licença, já vou indo!"
1300303-62 = "（Vupt）"
1300303-64 = "[s] \"De novo essa situação!?\""
1300303-65 = "Até mais...!"
1300303-67 = "（Hasumi desapareceu novamente como o vento）"
