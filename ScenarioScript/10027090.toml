[translation]
10027090-1 = "第9話;事務局の提案"
10027090-4 = "レッドウィンター連邦学園・雪山"
10027090-6 = "はあはあ……！"
10027090-7 = "レッドウィンターは広すぎます……分かってましたけど！"
10027090-8 = "話すと体力削られるよ！足を動かして！"
10027090-9 = "あれ……？事務局の方が……立ってるような……？"
10027090-10 = "なんで！？"
10027090-16 = "「知識解放戦線」の皆さん、こんにちは。#nこちらは、レッドウィンター事務局です。"
10027090-18 = "え、えっと？急に、どうして……？"
10027090-20 = "まず、「知識解放戦線」の努力と成果に祝いの言葉を送るとしよう。喜ぶがいい。"
10027090-22 = "……わけがわからないんだけど、早く終わらせて。#n私たちは今忙しいの！"
10027090-24 = "簡潔に申し上げますと、私たちの事務局は、シャーレの先生が「知識解放戦線」と協力して何かを作っているという報告を受けました。#nそれ、同人誌と言うのですね？"
10027090-26 = "えっ、どこからの報告ですか！？"
10027090-28 = "[ruby=あらまき]荒槇[/ruby]ヤクモからだ。"
10027090-30 = "あいつが！？！？"
10027090-32 = "そして、私たちはその「同人誌」というものと、それに関する一連の事件を調査しました。"
10027090-33 = "その結果……チェリノ会長の命により、ひげ努力勲章を授与する運びとなりました。"
10027090-34 = "光栄に思うがいい「知識解放戦線」。いや、そう思うように。"
10027090-36 = "えっと……とりあえずありがたいけど……？"
10027090-37 = "（勲章はいいから早く行かせてほしいのですが……！）"
10027090-39 = "お祝いの電報はここまでとしましょう。勲章授与には条件がありますので。"
10027090-40 = "うむ！「知識解放戦線」がこの勲章を手に入れるためには……！"
10027090-42 = "チェリノちゃん……いえ、チェリノ会長の可愛さと魅力を広めるために、ゲストキャラクターとしてチェリノ会長をその作品に登場させなければなりません！"
10027090-43 = "考えてみてください。かわいいチェリノちゃんが「同人誌」に登場し、本来の可愛さと魅力をアピールする姿を……そして、それがレッドウィンター生の間で広がっていく様を……！"
10027090-44 = "想像しただけでうっとりする素晴らしい光景ではありませんか！？"
10027090-45 = "[s] \"想像しただけで……なんか大変なことになりそうだけど……。\""
10027090-47 = "ふっ。せっかくなら、ゲストキャラクターなどではなく、主役として登場させてもいいだろう。その場合は、ひげ努力勲章と共にひげ功労勲章も授与することにしよう。"
10027090-49 = "……。"
10027090-51 = "ふざけないで！私たちには時間がないの！"
10027090-52 = "チェリノ会長の同人誌がほしいなら事務局で作って！#nそれか少なくとも正当な代価を払って外注して！私は断るけど！"
10027090-54 = "さすがメル先輩です！よくぞ言ってくれました！"
10027090-55 = "そうじゃなくても忙しくて死にそうなのに、こんなことで妨害しないでほしいんだけど！勲章とかどうでもいいから、私たちは通らせてもらうよ！"
10027090-56 = "よく忘れられるし、私たちもたまに忘れることがあるけど、「知識解放戦線」は知識そのものの解放のために戦ってるところなんだからね！"
10027090-57 = "知識は力ですから！守っていきますよ！"
10027090-58 = "[s] \"ごめん、今回だけは譲れないものがあるんだ。\""
10027090-60 = "……。"
10027090-61 = "そうか。簡単な道ではないと思っていたが。"
10027090-62 = "それでしたら、私たちなりの[ruby=・  ・]説得[/ruby]で、事務局の意思を貫くしかありませんね。"
10027090-64 = "な、何をするつもり？"
10027090-65 = "なんだか嫌な予感が……"
10027090-77 = "少し強引な手段ではありますが……事務局はチェリノ会長の「同人誌」を作ってみせます！"
