[translation]
10027090-1 = "Episódio 9: A Proposta da Secretaria"
10027090-4 = "Academia Federal Red Winter - Montanhas Nevadas"
10027090-6 = "Haa, haa...!"
10027090-7 = "Red Winter é grande demais... eu sabia, mas ainda assim!"
10027090-8 = "Falar gasta energia! Continue andando!"
10027090-9 = "Espere... o pessoal da Secretaria está... parado ali...?"
10027090-10 = "Por que!?"
10027090-16 = "Saudações, pessoal da \"Frente de Libertação do Conhecimento\".#nAqui é a Secretaria de Red Winter."
10027090-18 = "Eh, hã? De repente, por que...?"
10027090-20 = "Primeiro, vamos enviar palavras de congratulações pelos esforços e resultados da \"Frente de Libertação do Conhecimento\". Sintam-se honrados."
10027090-22 = "...Não estou entendendo nada, mas termine logo.#nEstamos ocupadas agora!"
10027090-24 = "Para sermos breves, nossa Secretaria recebeu um relatório de que o Sensei do Schale está colaborando com a \"Frente de Libertação do Conhecimento\" para criar algo.#nIsso se chama doujinshi, correto?"
10027090-26 = "Eh, de onde veio esse relatório!?"
10027090-28 = "Veio de Yakumo Aramaki."
10027090-30 = "Aquele cara!?!?"
10027090-32 = "E então, investigamos esse tal de \"doujinshi\" e a série de eventos relacionados a ele."
10027090-33 = "Como resultado... por ordem da Presidente Cherino, decidimos conceder a Medalha de Esforço do Bigode."
10027090-34 = "Sintam-se honradas, \"Frente de Libertação do Conhecimento\". Ou melhor, tratem de se sentir assim."
10027090-36 = "Bem... agradeço, eu acho...?"
10027090-37 = "(A medalha não importa, eu só queria que nos deixassem passar logo...!)"
10027090-39 = "Vamos encerrar o telegrama de felicitações por aqui. Pois a concessão da medalha tem condições."
10027090-40 = "Isso mesmo! Para que a \"Frente de Libertação do Conhecimento\" receba esta medalha...!"
10027090-42 = "Cherino-chan... não, para espalhar a fofura e o charme da Presidente Cherino, vocês devem incluir a Presidente Cherino como uma personagem convidada na obra!"
10027090-43 = "Pensem bem. A adorável Cherino-chan aparecendo no \"doujinshi\", exibindo toda a sua fofura e charme originais... e então, isso se espalhando entre os alunos de Red Winter...!"
10027090-44 = "Não é uma visão maravilhosa que faz o coração disparar só de imaginar!?"
10027090-45 = "[s] \"Só de imaginar... parece que vai dar uma confusão enorme...\""
10027090-47 = "Hum. Já que estamos nisso, não precisam ser apenas uma convidada, podem colocá-la como protagonista. Nesse caso, além da Medalha de Esforço do Bigode, concederemos também a Medalha de Mérito do Bigode."
10027090-49 = "..."
10027090-51 = "Não brinquem comigo! Não temos tempo!"
10027090-52 = "Se querem um doujinshi da Presidente Cherino, façam na Secretaria!#nOu pelo menos paguem o preço justo e terceirizem! Eu me recuso!"
10027090-54 = "Essa é a senpai Meru! Muito bem dito!"
10027090-55 = "Já estamos ocupadas a ponto de morrer, não nos atrapalhem com essas coisas! Não ligo para medalhas, vamos passar!"
10027090-56 = "Às vezes esquecem da gente, e nós mesmas esquecemos às vezes, mas a \"Frente de Libertação do Conhecimento\" luta pela libertação do conhecimento em si, sabia!"
10027090-57 = "Conhecimento é poder! Vamos protegê-lo!"
10027090-58 = "[s] \"Desculpe, mas desta vez não posso ceder.\""
10027090-60 = "..."
10027090-61 = "Entendo. Eu não esperava que fosse um caminho fácil."
10027090-62 = "Sendo assim, não nos resta escolha a não ser usar nossa própria persuasão para impor a vontade da Secretaria."
10027090-64 = "O-o que vocês pretendem fazer?"
10027090-65 = "Estou com um pressentimento ruim..."
10027090-77 = "Pode ser um método um pouco forçado, mas... a Secretaria vai fazer o \"doujinshi\" da Presidente Cherino!"
