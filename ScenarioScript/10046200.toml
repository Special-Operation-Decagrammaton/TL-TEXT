[translation]
10046200-3 = "……あ。"
10046200-4 = "……あ。"
10046200-5 = "……。"
10046200-6 = "……。"
10046200-7 = "その……元気っすか？"
10046200-8 = "元気そうに見えるか？"
10046200-9 = "はは……変わりないみたいっすね。"
10046200-10 = "それで、どうしてここに……？"
10046200-11 = "あ、もしかして遊びに――"
10046200-12 = "違うから！"
10046200-13 = "あ、そっすか……。"
10046200-14 = "……。"
10046200-15 = "ああもう！やりにくい！#nなんでそんなに歯切れが悪いのさ！"
10046200-16 = "いや、その……私たち、あんま良い印象なかったじゃないっすか。"
10046200-17 = "だいたい私のせいっすけど、はは……。"
10046200-18 = "自覚があるなら、一言謝って、それでおしまい。#n……いつまでそうしてるつもりなの。"
10046200-19 = "これから一緒に仕事するんだから、しっかりしてくれ。"
10046200-20 = "まあ、そうっすね……一緒に仕事……。"
10046200-24 = "え？今なんて？"
10046200-25 = "あっ、いや、その……。"
10046200-26 = "いろいろ、うちのバカ共が迷惑かけてるだろ？#n温泉開発部とか、美食研究会とか……。"
10046200-27 = "まぁ、はい……そうっすね。"
10046200-28 = "だから、協力しに来たんだ。"
10046200-29 = "はい！？"
10046200-30 = "もちろん、無理にとは言わないけど。"
10046200-31 = "元々はうちで対処しないといけない案件だし……。"
10046200-32 = "……だから、お前たちには悪いと思ってる。"
10046200-36 = "はは……。"
10046200-37 = "ゲヘナって素直な方が多いっすよね。"
10046200-38 = "あ、他意はないっすよ！"
10046200-39 = "そうか？逆に私はトリニティが羨ましいけど。#n問題児も少ないし、制服もかわい――い、今の無し！"
10046200-40 = "……あははっ！"
10046200-41 = "な、なんだよ？"
10046200-42 = "いや、案外どこも似てるなぁって。"
10046200-43 = "それのどこがおかしいんだよ……。"
10046200-44 = "とにかく、これで文句ないよな？"
10046200-45 = "それじゃ、気合入れていくぞ！"
