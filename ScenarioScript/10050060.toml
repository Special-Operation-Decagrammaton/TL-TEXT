[translation]
10050060-1 = "Episódio 6; Um lugar onde não há ninguém"
10050060-4 = "Estão todas presentes?"
10050060-5 = "S-sim!"
10050060-6 = "Como todas devem saber, estamos conduzindo a missão de rastreamento dos livros não autorizados que estão se espalhando gradualmente por Trinity."
10050060-7 = "No entanto, mesmo após vários dias, não tivemos nenhum progresso significativo."
10050060-8 = "Sim..."
10050060-9 = "E, recentemente, recebi palavras de preocupação da Nagisa-sama."
10050060-10 = "A, a Nagisa-sama pessoalmente...!?"
10050060-11 = "Sim... Se este fosse um problema apenas meu, eu teria aceitado de bom grado."
10050060-12 = "Mas se este for um problema da nossa \"vontade de realizar a justiça\"..."
10050060-13 = "Se for um problema fundamental da própria \"Justiça de Trinity\"!"
10050060-15 = "Naturalmente, não acham que deveríamos provar nosso valor de existência!?"
10050060-16 = "S-sim!!"
10050060-17 = "Hum... a propósito, o que devemos fazer para..."
10050060-18 = "Tenho uma ideia."
10050060-19 = "Outras podem ter pensado nisso também, mas, vendo a situação atual, não deve haver outro jeito."
10050060-20 = "Dizem que, ao encontrar um problema difícil, deve-se adotar uma estratégia superior em vez de um truque... portanto."
10050060-21 = "Vamos espalhar todos os recursos humanos do Comitê de Justiça por toda Trinity!"
10050060-22 = "D-desde quando?"
10050060-23 = "Agora! A partir deste momento! Sei que é um pedido difícil, pessoal. Mas vocês poderiam se esforçar só mais um pouco, só mais um pouquinho?"
10050060-24 = "Eu também irei para o campo de batalha na linha de frente!"
10050060-28 = "E-espere, Mashiro-san~~!"
10050060-44 = "...Hoje não vendemos nem um único exemplar."
10050060-45 = "Na verdade, nem conseguimos garantir um local de venda..."
10050060-46 = "Comitê de Justiça, era esse o nome? Aquelas pessoas com uniformes pretos. Estamos vendo muitas delas hoje, não é?"
10050060-47 = "Hum... o sensor de perigo da chefe do departamento editorial, uma habilidade desenvolvida após sobreviver a Red Winter, está reagindo fortemente."
10050060-48 = "S-será que elas realmente descobriram!?"
10050060-53 = "Princesa Takane! E a serva também! Então vocês estavam aqui!"
10050060-54 = "...! S-sim...! Saudações."
10050060-55 = "...Desde quando eu virei uma serva?"
10050060-56 = "Olá. Por favor, me perdoem por explicar rapidamente devido à situação."
10050060-57 = "C-claro. O que houve?"
10050060-58 = "Sim... resumindo, o Comitê de Justiça está procurando por vocês duas."
10050060-59 = "...Eu sabia. Achei que havia patrulhas demais por aí hoje."
10050060-60 = "Sim. É isso mesmo... #nTalvez por causa disso, há uma atmosfera inquieta em toda Trinity..."
10050060-61 = "Não pode ser... é nossa culpa... jamais imaginei que chegaria a esse ponto, sinto muito mesmo."
10050060-62 = "N-não! Pensando bem, talvez não seja bem assim... quer dizer, a culpa não é da Princesa Takane!"
10050060-63 = "...Só que parece que elas estão tentando recolher todos os livros que não sejam didáticos."
10050060-64 = "Sinto muito, Princesa Takane... parece difícil continuarmos ajudando daqui em diante."
10050060-65 = "Não, vocês já nos ajudaram tanto que nem sei como agradecer..."
10050060-66 = "Pobre Princesa Takane... ter que sofrer tantas dificuldades aqui também... *sniff*..."
10050060-68 = "Alguém poderia me consolar também?"
10050060-69 = "De qualquer forma, seria melhor se refugiarem em um lugar onde o Comitê de Justiça não esteja."
10050060-70 = "Existe um lugar assim?"
10050060-71 = "Desculpe, nós também não sabemos..."
10050060-72 = "Mas talvez exista um lugar que só alguém de fora conseguiria encontrar."
10050060-73 = "Por favor, cuidem-se. Espero que da próxima vez vocês possam criar memórias maravilhosas em Trinity."
10050060-74 = "Obrigada. Já criamos muitas memórias maravilhosas."
10050060-75 = "Não há de quê, então, até algum dia!"
10050060-80 = "...Onde foi que erramos o caminho?"
10050060-81 = "……Não era desde o início? Tem certeza de que isso está certo, Chefe!?"
10050060-82 = "Para ser sincera, eu também não sei muito bem... mas não é importante ir até o fim?"
10050060-83 = "Dependendo da hora e da situação, pode ser mais importante não ir até o fim."
10050060-84 = "De qualquer forma, como a aluna disse antes, vamos procurar um lugar onde o Comitê de Justiça não esteja."
10050060-94 = "……Primeiro, vamos nos esconder."
10050060-95 = "Ugh... nessas horas, se o Sensei estivesse aqui..."
10050060-99 = "Chefe, aquele lugar ali não é seguro?"
10050060-100 = "Sim, de fato, há poucas patrulhas."
10050060-101 = "Ou melhor, não tem quase ninguém por lá..."
10050060-102 = "Isso seria ainda mais conveniente."
10050060-112 = "Isto é... uma biblioteca? Parece ser."
10050060-117 = "Mesmo sendo uma biblioteca, sinto que a atmosfera é um pouco diferente..."
10050060-118 = "Há muitos livros antigos, mas... todos estão em ótimo estado."
10050060-119 = "Isso significa que, provavelmente, deve haver um administrador especializado..."
10050060-123 = "Oh...?"
10050060-131 = "Takane? Aconteceu alguma coisa?"
10050060-138 = "Aaaaaah!?"
10050060-139 = "Silêncio na biblioteca."
10050060-145 = "Haa... mais pessoas de fora..."
10050060-146 = "……Mas essas pessoas não parecem ser de Trinity...?"
10050060-147 = "Além disso, elas estão carregando muitas coisas que parecem livros..."
10050060-149 = "Bem... não entendo muito bem a situação, e nem quero entender, mas..."
10050060-150 = "De qualquer forma... vocês são do ramo editorial, certo?"
10050060-151 = "S-sim... pedimos desculpas por causar esse alvoroço, Ui Kozeki-san."
10050060-152 = "Não, tudo bem se vocês entenderam... além disso, parece que vocês são do nosso lado."
10050060-153 = "Acima de tudo... parece que vocês cuidam bem de todos..."
10050060-154 = "“Todos”...?"
10050060-155 = "Ah... perdão. Estou falando dos livros."
10050060-156 = "Falando nisso, Ui-san, você disse que é a presidente do Comitê de Bibliotecas, que administra o Arquivo Antigo, certo?"
10050060-157 = "Ouvi dizer que a Biblioteca Central de Trinity é a maior de Kivotos e que possui todos os livros deste mundo..."
10050060-158 = "É uma honra poder ver um lugar desses de perto."
10050060-159 = "Que bom que conseguiram vir ao lugar que tanto desejavam."
10050060-160 = "Esse boato... acho um pouco exagerado... mas é verdade que quero proteger o maior número possível de crianças..."
10050060-161 = "Entendo, compreendo. Então, a história de que um prédio inteiro foi pelos ares ao tentar punir pessoas que atrasaram a devolução de livros também é mentira?"
10050060-162 = "Isso é verdade."
10050060-163 = "!?"
10050060-164 = "Porque são pessoas que não sabem cuidar bem delas. Acho que fui até gentil."
10050060-165 = "……De qualquer forma, li a história das duas crianças."
10050060-166 = "……Achei boa. Pessoalmente, eu gostei."
10050060-167 = "Err, a propósito, aquilo é um mangá..."
10050060-168 = "……E o que tem isso? Mangás continuam sendo livros."
10050060-170 = "E-e também, algumas pessoas disseram que certas cenas ou expressões eram um pouco preocupantes, e..."
10050060-171 = "Entendo. Bem, vindo de pessoas de fora, talvez seja esse o caso."
10050060-172 = "……Acho apenas que quem não lê livros normalmente não tem resistência a isso."
10050060-173 = "Você disse antes que o Comitê de Justiça está perseguindo vocês duas, certo?"
10050060-174 = "S-sim... é vergonhoso admitir."
10050060-175 = "O Comitê de Justiça agindo por conta própria... Não deveria haver motivo para mobilizar tanta gente por algo tão trivial..."
10050060-176 = "……"
10050060-177 = "……É o Tea Party, não é?"
10050060-178 = "!? Isso é algo que eu ainda não deveria ter mencionado..."
10050060-179 = "Bem... acho que isso é o mínimo."
10050060-180 = "É por isso que os figurões... provavelmente nem entendem o valor dessas crianças."
10050060-181 = "De qualquer forma. É melhor vocês ficarem por aqui um pouco."
10050060-182 = "M-mas, não seria um incômodo para você...?"
10050060-183 = "Parece que vocês são do outro lado. Mas, por favor, não pensem muito nisso. É que eu não gostaria que vocês ficassem por muito tempo..."
10050060-184 = "Ah, você nos salvou, Ui! Então, ficaremos sob seus cuidados por um tempo."
10050060-185 = "Ah, e mais uma coisa."
10050060-186 = "Hm...?"
10050060-187 = "Mantenham uma distância de 3 metros."
10050060-189 = "Hã...?"
10050060-190 = "Se for difícil, podem ir embora..."
10050060-191 = "Hm... entendi. Se essa é a regra daqui, não há o que fazer."
10050060-192 = "Não é bem uma regra, é mais um problema meu, na verdade..."
10050060-193 = "Hm? Você disse algo, Ui?"
10050060-194 = "3 metros."
10050060-195 = "S-sim..."
10050060-199 = "Chefe, será que isso está certo...?"
10050060-200 = "Pensando friamente, provavelmente não está..."
10050060-201 = "Mas, não estamos em uma situação onde possamos nos dar ao luxo de tentar outras coisas."
10050060-202 = "Você não tem nenhuma ideia melhor?"
10050060-203 = "Já que nos disseram que podemos ficar aqui por enquanto, vamos nos esconder. E quando a poeira baixar, voltaremos para Red Winter."
10050060-207 = "Não me olhem desse jeito... Eu sei que essa não é a melhor opção."
10050060-208 = "Mas, às vezes na vida, temos que aceitar a única escolha que nos resta, não é?"
10050060-209 = "Vou descansar um pouco lá no fundo, então me avisem se precisarem de algo."
10050060-213 = "Foi o que a chefe disse, mas..."
10050060-214 = "Ugh... eu não queria falar sobre esse tipo de coisa, eu queria contar algo que nos rendesse elogios..."
10050060-220 = "[ns] \"Ué, esse número é...\""
10050060-222 = "O-olá, Sensei."
10050060-223 = "E-eu entrei em contato de repente porque, bem..."
10050060-224 = "Ugh... por onde eu deveria começar..."
10050060-225 = "[s] \"Tudo bem. Tente falar o que vier à mente primeiro.\""
10050060-226 = "Sim... primeiro, acabamos vindo para Trinity por conta de uma série de eventos..."
10050060-227 = "[s] \"Hm? Que coincidência, eu também estou em Trinity.\""
10050060-228 = "Hã, o Sensei também!!?"
