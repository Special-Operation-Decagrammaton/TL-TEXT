[translation]
2002703-1 = "Ritmo de caminhada"
2002703-3 = "（A Shiroko parecia estar muito animada desde cedo hoje）"
2002703-9 = "Hum."
2002703-13 = "Professor, ali também."
2002703-24 = "（Enquanto caminhávamos no ritmo da Shiroko por horas, explorando o mar, as colinas e a floresta da ilha...）"
2002703-30 = "（...Minhas energias acabaram e eu desabei）"
2002703-31 = "Professor...!?"
2002703-32 = "O que houve? Está tudo bem?"
2002703-33 = "Foi uma picada?#nDe inseto... ou talvez, quem sabe, no mar――"
2002703-34 = "――Hum, não é isso?"
2002703-35 = "Bem, então..."
2002703-36 = "[s1] \"Vou ficar bem se descansar um pouco.\"\n[s2] \"É que andamos demais e minhas energias...\""
2002703-42 = "...Ah."
2002703-43 = "Desculpe, Professor..."
2002703-44 = "Nós não fizemos nenhuma pausa desde cedo, né."
2002703-45 = "Eu não tinha a intenção de..."
2002703-46 = "Eu acabei me empolgando sozinha..."
2002703-47 = "E nem percebi que o Professor estava cansado..."
2002703-48 = "...Desculpe."
2002703-49 = "............"
2002703-50 = "[s3] \"Vou me recuperar logo... está tudo bem.\"\n[s4] \"Eu também estava me divertindo muito, não se preocupe.\""
2002703-53 = "...Entendo."
2002703-54 = "Talvez seja melhor você se deitar um pouco.#nAqui é fresco e venta bastante, é perfeito para descansar."
2002703-55 = "Vou ficar vigiando enquanto você dorme. Descanse bastante."
2002703-56 = "[s5] \"Você não está cansada, Shiroko?\"\n[s6] \"Nós andamos o tempo todo, não foi?\""
2002703-59 = "Estou bem, aguentaria dar mais uma volta."
2002703-60 = "Além disso..."
2002703-67 = "Ficaríamos vulneráveis se os dois dormissem, então... vou ficar acordada por precaução."
2002703-68 = "Não se preocupe comigo, Professor, durma tranquilo."
2002703-69 = "Se o Professor ficar bem... eu também ficarei mais tranquila."
2002703-70 = "Por isso..."
2002703-71 = "Hum."
2002703-78 = "Boa noite, Professor."
2002703-87 = "（Sentindo o olhar da Shiroko, caí em um sono tranquilo）"
2002703-88 = "（Graças a isso, o cansaço do meu corpo desapareceu completamente）"
2002703-91 = "（...Ao acordar, o mar iluminado pelo pôr do sol se estendia diante de mim）"
2002703-97 = "[ns7] \"...Ué, o mar?\"\n[ns8] \"Eu estava dormindo em um lugar assim...?\""
2002703-100 = "...Ah."
2002703-101 = "Bom dia, Professor."
2002703-105 = "Como você estava dormindo profundamente, eu te trouxe nas costas."
2002703-106 = "Tinha muitos insetos na floresta."
2002703-107 = "Como está o seu corpo...?#nPode continuar dormindo se quiser."
2002703-108 = "...Hum, eu?"
2002703-109 = "Algum outro lugar que eu queira ir...?"
2002703-110 = "...Não, está tudo bem."
2002703-111 = "Eu só queria fazer coisas que só são possíveis em um resort."
2002703-112 = "Mas, passar esse tempo com o Professor também..."
2002703-113 = "............"
2002703-114 = "...Hum."
2002703-115 = "...É divertido."
2002703-116 = "Mas eu não quero que o Sensei se esforce demais. #nAcho que não seria certo... eu me divertir sozinha."
2002703-117 = "……Eu acho que não."
2002703-118 = "De agora em diante... eu quero passar um tempo tranquila com você."
2002703-119 = "……Por isso, vamos seguir o seu ritmo, Sensei."
2002703-120 = "Sim. Com certeza, é melhor assim."
2002703-121 = "……Já está tarde, acho que por hoje é só."
2002703-122 = "Vamos para casa, Sensei."
2002703-123 = "……Hm, segure-se firme."
2002703-130 = "[ns9] Levanta-se rapidamente.\n[ns10] \"Já estou bem, graças à Shiroko, recuperei minhas energias.\""
2002703-134 = "…………。"
2002703-135 = "……Sim."
