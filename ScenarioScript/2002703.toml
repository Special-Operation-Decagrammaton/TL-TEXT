[translation]
2002703-1 = "ペース配分"
2002703-3 = "（今日のシロコは、朝からとてもテンションが高いように見えた）"
2002703-9 = "ん。"
2002703-13 = "先生、あっちも。"
2002703-24 = "（シロコのペースで、海や丘、森など島中を何時間も散策していると……）"
2002703-30 = "（……体力が尽きて倒れてしまった）"
2002703-31 = "先生……！？"
2002703-32 = "どうしたの、大丈夫？"
2002703-33 = "かぶれちゃった？#n虫に……いや、もしかしたら海で――"
2002703-34 = "――ん、違う？"
2002703-35 = "えっと、それなら……"
2002703-36 = "[s1] \"少し休めば大丈夫。\"\n[s2] \"歩き回ったから、体力が……。\""
2002703-42 = "……あ。"
2002703-43 = "ごめん、先生……。"
2002703-44 = "朝から休憩してなかったよね。"
2002703-45 = "そんなつもりじゃ、なかったんだけど……"
2002703-46 = "1人で……舞い上がっちゃった。"
2002703-47 = "先生が疲れてるのにも、気付けなくて……"
2002703-48 = "……ごめん。"
2002703-49 = "…………。"
2002703-50 = "[s3] \"すぐに復活するから……大丈夫。\"\n[s4] \"私も夢中で楽しんでたから、気にしないで。\""
2002703-53 = "……うん。"
2002703-54 = "少し横になった方がいいかも。#nここなら涼しいし風もあるから、休むのにピッタリ。"
2002703-55 = "寝てる間は、見てるから。ゆっくり休んで。"
2002703-56 = "[s5] \"シロコは疲れてないの？\"\n[s6] \"ずっと歩いてたよね？\""
2002703-59 = "大丈夫、もう一周しても余裕。"
2002703-60 = "それに……"
2002703-67 = "2人とも寝てると無防備になるから……一応、起きておく。"
2002703-68 = "私のことは気にしないで、先生はゆっくり寝て。"
2002703-69 = "先生が元気になってくれたら……私も、気が楽になる。"
2002703-70 = "だから……"
2002703-71 = "ん。"
2002703-78 = "おやすみ、先生。"
2002703-87 = "（シロコの視線を感じながら、優しい眠りに落ちていった）"
2002703-88 = "（おかげで、身体の疲れはどこかに吹き飛んだ）"
2002703-91 = "（……眠りから覚めると、目の前には夕焼けに照らされた海が広がっていた）"
2002703-97 = "[ns7] \"……あれ、海？\"\n[ns8] \"こんなところで寝てたっけ……？\""
2002703-100 = "……あ。"
2002703-101 = "おはよう、先生。"
2002703-105 = "ぐっすり寝てたから、私が背負ってきた。"
2002703-106 = "森の中は虫が多かったから。"
2002703-107 = "身体はどう……？#nまだ寝てても大丈夫だよ。"
2002703-108 = "……ん、私？"
2002703-109 = "他に行ってみたい場所……？"
2002703-110 = "……ううん、大丈夫。"
2002703-111 = "リゾートじゃないと出来ないことをしたかっただけだから。"
2002703-112 = "でも、こうして先生と過ごす時間も……"
2002703-113 = "…………。"
2002703-114 = "……ん。"
2002703-115 = "……楽しいよ。"
2002703-116 = "でも、先生に無理はしてほしくない。#n私だけ楽しむのは……"
2002703-117 = "……違うと思う。"
2002703-118 = "これからは……2人でゆっくり過ごしたい。"
2002703-119 = "……だから、先生のペースで行こう。"
2002703-120 = "うん。きっと、その方がいい。"
2002703-121 = "……もうこんな時間だし、今日はここまでかな。"
2002703-122 = "帰ろ、先生。"
2002703-123 = "……ん、しっかり掴まってて。"
2002703-130 = "[ns9] スッと立ち上がる。\n[ns10] \"もう大丈夫、シロコのおかげで元気になったよ。\""
2002703-134 = "…………。"
2002703-135 = "……うん。"
