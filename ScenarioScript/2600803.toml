[translation]
2600803-1 = "Afinal, para que era mesmo?"
2600803-6 = "（Ao caminhar até o local de encontro, avistei Shizuko.）"
2600803-7 = "……Ah, Sensei?"
2600803-8 = "Você chegou bem cedo."
2600803-9 = "Entendo…… Então você queria tanto assim me ver?"
2600803-10 = "[s] \"A Shizuko também chegou antes do horário, será que você queria me ver?\""
2600803-11 = "N-não é nada disso!?"
2600803-12 = "[s] \"Isso é doloroso de ouvir……\""
2600803-13 = "Não venha me provocar e depois ficar deprimido!?"
2600803-14 = "Francamente……! E olha que o Sensei é um adulto……"
2600803-15 = "Sério, como posso dizer……"
2600803-16 = "[s] \"……Aconteceu alguma coisa?\""
2600803-17 = "Já que era para ser uma conversa casual, você não deveria ter vindo com mais rodeios!?"
2600803-18 = "Nossa, o Sensei realmente supera todas as expectativas……"
2600803-19 = "Bem, talvez seja por isso que……"
2600803-21 = "……Era exatamente como o Sensei disse antes."
2600803-22 = "Eu visitei as franquias em vários locais, mas……"
2600803-23 = "A reação dos clientes não está nada boa……"
2600803-24 = "[s] \"Entendo…… O que exatamente te incomodou?\""
2600803-26 = "Isso é, bem, apenas uma impressão minha, mas……"
2600803-27 = "Provavelmente, não parece ser um problema com o sabor."
2600803-28 = "E também não sinto que seja um problema de conforto."
2600803-29 = "Pelo menos, observando o comportamento dos clientes, é o que parece……"
2600803-31 = "Ugh, o que será que é, afinal……!"
2600803-32 = "Como posso dizer……"
2600803-33 = "É como se não desse para sentir a essência da Hyakkiyako……!"
2600803-34 = "Estou tão frustrada com isso!"
2600803-35 = "[s] \"Ei, vamos nos acalmar um pouco.\""
2600803-36 = "Não dá para ficar calma!"
2600803-37 = "Isso é uma crise, uma crise enorme!"
2600803-39 = "Se continuar assim, nas lojas de cada região, aos poucos……"
2600803-40 = "Aos poucos, a confiança dos clientes vai desaparecer!"
2600803-41 = "Quando chega nesse ponto, o resto acontece rápido."
2600803-42 = "Os boatos se espalham e não há como remediar!"
2600803-43 = "No final, é isso……"
2600803-44 = "A Hyakkiyako está em perigo de desaparecer!"
2600803-45 = "S-se algo assim acontecer……!"
2600803-46 = "[s] \"Vai ficar tudo bem!\""
2600803-48 = "O-o que vai ficar bem!?"
2600803-49 = "[s] \"Eu tenho o desejo de que tudo fique bem……!\""
2600803-50 = "Isso não serve de consolo nenhum! Waaaaah!"
2600803-51 = "[s] \"Aliás, Shizuko.\""
2600803-53 = "[s] \"Tem algo que você esqueceu, ou talvez esteja tentando ignorar no fundo da mente?\""
2600803-54 = "……? O que você quer dizer?"
2600803-55 = "Minha afiliação……? Bem, é o Comitê de Operações do Festival, mas……?"
2600803-56 = "Para começo de conversa, o trabalho na Hyakkiyako era originalmente para preparar e financiar o festival……"
2600803-57 = "……Sim. Bem, é claro que é exaustivo, e não é como se eu não achasse trabalhoso."
2600803-58 = "Além disso, a franquia……"
2600803-59 = "Bem, é uma situação difícil, de fato."
2600803-60 = "O motivo……? Bem, no fim das contas, é porque……"
2600803-61 = "Será que é... porque eu gosto de festivais?"
2600803-62 = "[s] \"Isso também deve ser verdade, mas talvez...\""
2600803-64 = "[s] \"A Shizuko não gosta de ver o sorriso das pessoas?\""
2600803-68 = "É, talvez seja isso..."
2600803-70 = "Depois de tudo o que aconteceu, quando finalmente conseguimos realizar o festival em segurança..."
2600803-77 = "Quando os clientes que vieram à Hyakkiyako sorriram e disseram \"obrigada\"..."
2600803-84 = "Quando estou me esforçando junto com todo mundo..."
2600803-86 = "Comparado a isso, o meu esforço é algo tão pequeno."
2600803-87 = "[s] \"Acho que o lucro desta vez também foi assim, não foi?\""
2600803-88 = "......Sim."
2600803-89 = "Pelo menos, talvez eu tenha errado nas minhas prioridades."
2600803-90 = "Sobre o que é realmente importante para mim..."
2600803-91 = "Fiquei embriagada com a atmosfera do verão..."
2600803-92 = "Tive um momento de fraqueza, ou algo assim..."
2600803-93 = "Pensei que, já que é verão e estou de roupa de banho, queria mostrar um lado legal para o Sensei..."
2600803-94 = "......Ah!?"
2600803-95 = "[s] \"Shizuko...?\""
2600803-96 = "N-não!"
2600803-97 = "N-não é nada disso! Isso foi coisa do espírito do verão!"
2600803-98 = "Eu não queria que o Sensei visse isso, quer dizer, aquilo...!"
2600803-99 = "E-esqueça o que eu acabei de dizer! Agora mesmo!"
2600803-107 = "Ei, ei, parem de ficar de namorico aí."
2600803-108 = "Vocês não sabem quem a gente é?"
2600803-109 = "Desde o outro dia, nós somos as governantes desta ilha! Ou seja, somos suas mestras, então é melhor nos servirem bem!"
2600803-111 = "......Haa."
2600803-113 = "Hã? Por que você está suspirando aí..."
2600803-114 = "Se vocês pretendem nos menosprezar,"
2600803-115 = "não teremos piedade—"
2600803-116 = "(Ei, briga com elas no meu lugar? Eu não consigo)"
2600803-117 = "(Não, eu também nunca ganhei delas! É só ir com tudo na base da pressão!)"
2600803-119 = "Bem, veio a calhar."
2600803-123 = "Convidados indesejados serão expulsos à força!"
2600803-124 = "Vou dar tudo de mim para que vocês esqueçam até o que aconteceu agora há pouco!"
2600803-132 = "Ai, ai, ai, ai! Ei, o que essa garota está dizendo!? Isso não é descontar a raiva em cima da gente!?"
2600803-133 = "E-eu me rendo! Eu me rendo! Já chega, para com isso!"
2600803-134 = "Cala a boca! Aqui não aceitamos gente querendo causar confusão!"
2600803-140 = "(Consegui acalmar a Shizuko, que começou a agir de forma violenta, e voltamos para o resort)"
