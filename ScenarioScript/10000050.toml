[translation]
10000050-1 = "Episódio 5; O festival começou"
10000050-2 = "……De novo? E onde está a senhorita Izuna?"
10000050-3 = "Aquela lá não serve para nada! Que tipo de ninja é ela……!"
10000050-4 = "Hoje, no caminho para cá, ela disse que tinha algo para fazer e……"
10000050-5 = "Hum, eu achei que ela seria minimamente útil……"
10000050-6 = "（No fim das contas, é só isso que ela vale……）"
10000050-7 = "Do jeito que as coisas estão, mesmo tentando atrapalhar o Festival Ouka, estamos sendo derrotados por aquele adulto chamado Sensei do Schale."
10000050-8 = "O Sensei do Schale, é? É difícil acreditar que ele tenha tanto poder assim, mas…… tanto faz."
10000050-9 = "Quantos membros da Trupe Hyakkaryouran estão na rua comercial agora?"
10000050-10 = "Bem, mais ou menos uns 120……?"
10000050-11 = "……Está na hora de agir."
10000050-12 = "Escutem bem o que vou dizer agora."
10000050-15 = "（Sussurros, sussurros……）"
10000050-16 = "Hã, sério que vamos fazer isso……?"
10000050-17 = "Sério mesmo? Podemos fazer isso de verdade?"
10000050-18 = "O melhor é eliminar as grandes variáveis."
10000050-19 = "Se essa parte do plano der certo, o sucesso é garantido. Assim, poderei pagar a recompensa de vocês conforme o contrato. Não é um mau negócio, certo?"
10000050-20 = "Bem, nós também queremos que isso dê certo. Entendido."
10000050-21 = "Sim! Entendido!"
10000050-22 = "……E lembrem-se, mantenham isso em segredo da senhorita Izuna."
10000050-23 = "Bem, já está na hora de finalizar isso."
10000050-25 = "Hyakkiyako"
10000050-26 = "（Quando o sol se pôs, todos se reuniram na Hyakkiyako para uma reunião de estratégia）"
10000050-27 = "A propósito, sobre a causa de tudo isso, o que faremos exatamente?"
10000050-28 = "Existe um método infalível."
10000050-29 = "Primeiro, vamos sair pela cidade e, assim que encontrarmos o Grupo Chimi fazendo alguma maldade, vamos cercá-los de uma vez."
10000050-30 = "É uma operação em grande escala que o Comitê Organizador do Festival não conseguiria realizar sozinho, mas agora que o Clube de Treinamento está aqui, deve ser possível!"
10000050-31 = "Cercar... e depois o que faremos...?"
10000050-32 = "Claro, vamos todos atacar de uma vez! E prendê-los!"
10000050-33 = "Depois disso, é só fazer com que eles confessem a causa de tudo e pronto!"
10000050-34 = "Se necessário, métodos um pouco mais radicais são inevitáveis!"
10000050-35 = "Como esperado da presidente!"
10000050-37 = "Para os vilões, a punição será ter o dedo mindinho cortado, né!"
10000050-38 = "Uau..."
10000050-39 = "Ora..."
10000050-40 = "Ah..."
10000050-41 = "[s] Boquiabertos"
10000050-43 = "Bem... pensando bem, acho que isso é um pouco exagerado, presidente..."
10000050-44 = "Por que você está falando como se a ideia tivesse sido minha!?"
10000050-45 = "De qualquer forma, vamos capturar o Grupo Chimi e fazê-los confessar a causa de tudo!"
10000050-46 = "Já não temos mais tempo."
10000050-47 = "O clímax do Festival das Flores de Cerejeira de Hyakkiyako é amanhã..."
10000050-48 = "Ah, eu já ouvi falar disso! São os fogos de artifício, aqueles de holograma, né? Aqueles que fazem 'pum, pum, pum'!"
10000050-49 = "Sim, a empolgação estará no auge. Preparei novos fogos de artifício dignos de encerrar o Festival das Flores de Cerejeira."
10000050-50 = "Se a Trupe Chimimoryo causar confusão naquela hora, não vai ser apenas um 'alvoroço'..."
10000050-51 = "Se isso acontecer, a responsabilidade cairá sobre nós, do Comitê Organizador do Festival..."
10000050-52 = "Shizuko-chan..."
10000050-53 = "...Não, se algo acontecer, pensaremos nisso na hora."
10000050-54 = "Primeiro, precisamos encontrar o culpado o quanto antes! E depois, vou descontar todo o estresse que passei nele, senão não vou conseguir me acalmar! Eu vou acabar com eles, com certeza!!"
10000050-55 = "[s] \"Parece que você nem tenta mais esconder o seu lado agressivo.\""
10000050-56 = "D-detalhes não importam agora!"
10000050-58 = "(Foi assim que acabamos indo patrulhar a cidade junto com o Comitê Organizador do Festival e o Clube de Treinamento...)"
10000050-59 = "Eles sempre aparecem sem serem chamados, então por que não aparecem quando a gente quer encontrar eles?!"
10000050-60 = "Fina, acho que entendi! É igual ao controle remoto!"
10000050-61 = "Quando você quer encontrar, ele nunca aparece! Fina, uma vez eu estava procurando o controle remoto e ele acabou aparecendo dentro da geladeira!"
10000050-62 = "Entendo, entendo! Acho que era a Lei do Muffin, ou algo assim!"
10000050-63 = "Essa lei parece deliciosa, embora eu ache que não seja bem assim..."
10000050-64 = "Mas, graças à falta de confusão, todos estão conseguindo aproveitar o festival normalmente."
10000050-68 = "Ugh, por que a Trupe Chimimoryo não aparece...!"
10000050-69 = "Não, eles certamente estão prestes a causar algum problema em algum lugar agora mesmo...!"
10000050-71 = "Uaaaaan~! Papai~, mamãe~! Onde vocês estão~?!"
10000050-73 = "Ora, uma criança perdida...?"
10000050-74 = "Surgiu um caso que não podemos ignorar!! Tsubaki-senpai!"
10000050-75 = "Sim, vamos nessa."
10000050-78 = "Ei, espera aí...!?"
10000050-79 = "Ah, Shizuko-san! Finalmente te encontrei!"
10000050-80 = "Eu queria conversar com você sobre os preparativos para os fogos de artifício de amanhã..."
10000050-81 = "Ugh!? Tinha que ser logo agora...!"
10000050-82 = "Mas, como presidente do Comitê Organizador do Festival, não posso simplesmente ignorar isso... Fina! O resto é com você!"
10000050-83 = "Encontre a Trupe Chimi junto com o Sensei e fique de olho neles!"
10000050-84 = "Entendido! Pode deixar com a Fina!"
10000050-86 = "Todo mundo ficou ocupado de repente, não é!"
10000050-87 = "[s] \"Se a Trupe Chimi não estivesse aqui, essa seria uma cena comum, não é?\""
10000050-88 = "Sim, acho que você tem razão, Chefe!"
10000050-89 = "Se a Trupe Chimi não estivesse aqui, acho que nós do Comitê Organizador do Festival e todos os outros estaríamos correndo de um lado para o outro com os preparativos!"
10000050-90 = "Deveríamos estar ocupados de um jeito bom, mas acabar ficando ocupados por um motivo desses..."
10000050-91 = "Ah, não é hora de ficar desanimada! Agora, a única pessoa com o Chefe sou eu, a Fina!"
10000050-92 = "Como capitã da unidade de ataque, não posso baixar a guarda! Vi isso em 'Soco Nyan-Nyan Sem Lei'!"
10000050-93 = "[s] \"Conto com você, Fina.\""
10000050-94 = "Sim! A proteção pessoal do Chefe e a segurança do Festival Ouka..."
10000050-95 = "Deixe tudo com a capitã da vanguarda, Phina, aqui!"
10000050-96 = "(Clang!)"
10000050-97 = "[s1] \"Problemas logo agora que você disse isso!?\"\n[s2] \"A Trupe Chimi!?\""
10000050-101 = "Hã? Isso é uma falha!?"
10000050-102 = "Você está falando sério!?"
10000050-103 = "M-mas aqui, a ponta quebrou..."
10000050-104 = "Não dá para ver direito! Nós conseguimos, então entregue logo o vale-compras!"
10000050-105 = "Assim que eu pegar o vale de 3 mil ienes do festival, vou usá-lo para tentar de novo e continuar num loop infinito até que todo o estoque de katanuki desta loja acabe!"
10000050-106 = "I-iiih!! Por que ser tão cruel!? Como é que a gente vai lidar com isso!?"
10000050-107 = "Hehehe! Esse é o jeito que nós, mestres do katanuki, aproveitamos o Festival Ouka!"
10000050-108 = "Arrependa-se de ter chamado a nossa atenção!"
10000050-110 = "Aqueles são...! Os \"delinquentes do katanuki\" que dizem aparecer em todo Festival Ouka!"
10000050-111 = "[s] \"Que tipo de tradição é essa...\""
10000050-112 = "Eles são o terror de todos os donos de barracas de katanuki, Chefe!"
10000050-113 = "Acho que chegou a hora da Chefe e da Phina entrarem em ação!"
10000050-114 = "A Phina e o resto não vão perdoar esses encrenqueiros que perturbam a paz do Festival Ouka!"
