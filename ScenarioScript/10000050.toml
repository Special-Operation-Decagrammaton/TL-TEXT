[translation]
10000050-1 = "第5話;お祭りは開かれて"
10000050-2 = "……またやられたのか？それに、イズナ殿はどうした？"
10000050-3 = "あいつは役に立たない！何が忍者だ……！"
10000050-4 = "今日もここに来る途中に、やるべきことがあるからって……。"
10000050-5 = "ふむ、それなりに使えると思っていたのだが……。"
10000050-6 = "（所詮この程度か……）"
10000050-7 = "このままだと桜花祭を邪魔しようにも、あのシャーレの先生とかいう大人にやられっぱなしっす。"
10000050-8 = "シャーレの先生か……それほどの力を持っているとは、にわかには信じがたいが……まあ良い。"
10000050-9 = "今、商店街にはどれぐらいの魑魅一座が来ている？"
10000050-10 = "えっと、だいたい120人ぐらい……？"
10000050-11 = "……そろそろ仕掛け時か。"
10000050-12 = "今から言うことをよく聞け。"
10000050-15 = "（ひそひそひそひそ……）"
10000050-16 = "えっ、本当にそんなことを……？"
10000050-17 = "マジっすか？本当にやっちゃっていいんすか？"
10000050-18 = "大きな変数は取り除いておくに限る。"
10000050-19 = "この処理さえ上手くいけば計画は成功するはず。そうすればお前たちにも契約通り、成果報酬を渡せる。悪い話では無いだろう。"
10000050-20 = "まあ、あたしらにだって成功させるつもりはあるからね。分かったよ。"
10000050-21 = "はいっ！かしこまっす！"
10000050-22 = "……くれぐれも、イズナ殿には内密にな。"
10000050-23 = "さて、いい加減仕上げの時間だ。"
10000050-25 = "百夜堂"
10000050-26 = "（日が暮れた頃、作戦会議のために百夜堂に全員が集まった）"
10000050-27 = "ところで元凶のお話、具体的にはどうします？"
10000050-28 = "一番確実な方法があるわ。"
10000050-29 = "まず街に出て、どこかで悪さをしてる魑魅一座を見つけたら、一気に包囲するの。"
10000050-30 = "お祭り運営委員会だけでは成しえなかった大掛かりな作戦だけど、修行部もいる今なら可能なはず！"
10000050-31 = "包囲して～、その後はどうする……？"
10000050-32 = "もちろん全員で一気に撃退！拘束！"
10000050-33 = "それで、そいつらから元凶を吐かせれば終わり！"
10000050-34 = "必要なら多少過激な方法もやむなし！"
10000050-35 = "サスガ委員長！"
10000050-37 = "悪党たちには小指ザクリの刑デスね！"
10000050-38 = "うわっ……"
10000050-39 = "あら……"
10000050-40 = "ふあぁ……"
10000050-41 = "[s] あんぐり"
10000050-43 = "えっと……よく考えると、フィーナもそれはちょっとやり過ぎだと思いマスよ、委員長……。"
10000050-44 = "なんで私の発案みたいな言い方してんの！？"
10000050-45 = "とにかく、魑魅一座を捕まえて元凶について吐かせる！"
10000050-46 = "もう時間が無いの。"
10000050-47 = "百夜ノ春ノ桜花祭のクライマックスは明日……"
10000050-48 = "あっ、聞いたことある！花火でしょ、ホログラムの！パンパンパーンって！"
10000050-49 = "ええ、盛り上がりも最高潮。桜花祭のラストを飾るのに相応しい新たな花火を用意したわ。"
10000050-50 = "もしその時に魑魅一座が暴れたら、「騒ぎ」じゃ済まなそうだね～……。"
10000050-51 = "もしそんなことになったら、責任を問われて私たちお祭り運営委員会は……。"
10000050-52 = "シズコちゃん……。"
10000050-53 = "……ううん、もしものことはその時また考える。"
10000050-54 = "まずは早いところ元凶を探す！それで私がこれまで受けてきたストレスをそっくりそのまま叩き込んでやらないと、腹の虫がおさまんない！絶対ボコボコにしてやるんだからっ！！"
10000050-55 = "[s] \"もう取り繕う気も無さそうだね。\""
10000050-56 = "こ、細かいことはいいんです！"
10000050-58 = "（こうしてお祭り運営委員会、そして修行部と一緒に街へパトロールに行くことになったのだけれど……）"
10000050-59 = "あいつらいっつも呼ばれなくても来るくせに、なんでいざ探そうとすると出てこないわけ！？"
10000050-60 = "フィーナ、分かった気がしマス！リモコンと同じデス！"
10000050-61 = "いざ探そうと思うと見つからないものデス！フィーナ、リモコンを探してて最終的には冷蔵庫から出てきたことがありマス！"
10000050-62 = "分かる分かる！たしかマフィンの法則だったっけ、そんな感じの！"
10000050-63 = "美味しそうな法則だね、なんか違う気がするけど～。"
10000050-64 = "ですが、騒ぎがないおかげで、皆さん普通にお祭りを楽しめていますね。"
10000050-68 = "うぅっ、何で出てこないの魑魅一座……っ！"
10000050-69 = "ううん、きっと今にもどこかで暴れようとしてるはず……！"
10000050-71 = "うあああん～！パパ～、ママ～！どこ～！？"
10000050-73 = "あらっ、迷子の子が……？"
10000050-74 = "放っておけない事案発生！！ツバキ先輩！"
10000050-75 = "うん、出動～。"
10000050-78 = "え、えっ？ま、待って……！？"
10000050-79 = "あっ、シズコさん！ようやく見つけました！"
10000050-80 = "明日の花火の準備で、ご相談なのですが……。"
10000050-81 = "うっ！？よりによってこのタイミングで……！"
10000050-82 = "でもお祭り運営委員会の委員長として知らんぷりなんてできないし……フィーナ！後はお願い！"
10000050-83 = "先生と二人で魑魅一座を見つけて、監視しておいて！"
10000050-84 = "了解デス！フィーナにお任せあれ！"
10000050-86 = "急にみんな忙しくなってきマシタね！"
10000050-87 = "[s] \"魑魅一座がいなければ、これが普通の光景なんだよね。\""
10000050-88 = "ハイ、お頭の言う通りかと！"
10000050-89 = "魑魅一座がいなかったら、ワタシたちお祭り運営委員会も他のみんなも、準備や何やらで走り回ってたと思いマス！"
10000050-90 = "そうやって良い意味で忙しくしてたはずなのに、こうして違う意味で忙しくなってしまうダナンテ……。"
10000050-91 = "はっ、がっかりしてる場合ではアリマセン！今お頭と一緒にいるのは、フィーナだけ！"
10000050-92 = "特攻隊長として、隙を見せたらマズいシーンですね！『仁義なきニャンニャンパンチ』で見ました！"
10000050-93 = "[s] \"よろしくね、フィーナ。\""
10000050-94 = "ハイっ！お頭の身辺警護、そして桜花祭の治安……。"
10000050-95 = "どちらもこの特攻隊長フィーナにお任せあれ、デス！"
10000050-96 = "（ガチャン！）"
10000050-97 = "[s1] \"言ってるそばからトラブル！？\"\n[s2] \"魑魅一座！？\""
10000050-101 = "はぁ？これが失敗！？"
10000050-102 = "本気で言ってんのか！？"
10000050-103 = "で、でもここ、端っこが割れて……。"
10000050-104 = "よく見えねえなあ！成功したんだから、大人しく商品券を出しな！"
10000050-105 = "3千円のお祭り商品券を貰ったら、それを使ってまた挑戦して、この店のかたぬきが無くなるまで無限ループし続けてやる！"
10000050-106 = "ひ、ひいいっ！！どうしてそんな残酷なことを！そんなのうちはどう対処したらいいんだ！？"
10000050-107 = "くくくっ！これがあたいらかたぬきの達人の、桜花祭の楽しみ方さ！"
10000050-108 = "あたしたちの目に留まったことを後悔しな！"
10000050-110 = "あれは……！桜花祭で毎回現れるという「かたぬきチンピラ」！"
10000050-111 = "[s] \"何その風物詩……。\""
10000050-112 = "かたぬき屋サンたちなら誰もが恐れる相手デス！お頭！"
10000050-113 = "ここはお頭と、フィーナの出番かと！"
10000050-114 = "桜花祭の平和を乱す問題児は、フィーナたちが許しマセン！"
