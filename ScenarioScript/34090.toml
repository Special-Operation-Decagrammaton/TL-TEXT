[translation]
34090-1 = "Episódio 9; Rumo ao Distrito de Arius (1)"
34090-3 = "[ns] \"O que você quis dizer com aqueles '90 minutos' de agora pouco?\""
34090-4 = "Para chegar ao Distrito de Arius, precisamos passar pelas catacumbas sob Trinity."
34090-5 = "Existem cerca de 300 entradas conhecidas para as catacumbas. Apenas algumas são as 'entradas verdadeiras', o resto é tudo falso."
34090-6 = "Se escolher a entrada errada, você acabará perdido nas catacumbas para sempre."
34090-7 = "Por isso, nós transmitimos a entrada correta e a rota interna que leva ao Distrito de Arius através de códigos."
34090-8 = "……É que o interior das catacumbas muda em ciclos regulares."
34090-9 = "[s] \"O interior muda...?\""
34090-10 = "Isso. Um caminho que você passou antes pode se tornar um beco sem saída... ou você pode perder a noção da direção... é algo assim."
34090-11 = "Não sei como funciona, mas... as catacumbas são um labirinto cuja extensão total ainda é desconhecida. Toda vez que você entra, a rota e a entrada mudam."
34090-16 = "Nós não sabemos qual é a entrada correta agora... porque não nos contaram mais os códigos."
34090-17 = "Não há necessidade de ensinar o caminho de volta para cães de caça que fugiram."
34090-18 = "Ma-mas... ainda resta uma única entrada que podemos usar."
34090-19 = "E ela só pode ser usada até a virada do dia de hoje. Em uma hora, ela também será fechada... e se isso acontecer..."
34090-20 = "Não será mais possível voltar ao Distrito de Arius."
34090-21 = "Mesmo que conseguíssemos voltar, não seríamos capazes de salvar a Atsuko."
34090-22 = "Por isso, precisamos nos apressar..."
34090-26 = "！?"
34090-27 = "É o 'Squad'!"
34090-28 = "Como esperado, eles vieram aqui! Todos, preparem-se para o combate!"
34090-29 = "……Parece que eles pensaram a mesma coisa."
34090-30 = "Preparar para o combate."
34090-31 = "Si-sim!"
34090-32 = "……Bem, era de se esperar que terminasse assim."
34090-34 = "Muito bem…… vamos mostrar a determinação de um cão de caça ferido."
