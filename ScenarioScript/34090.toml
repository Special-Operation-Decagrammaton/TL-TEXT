[translation]
34090-1 = "Episódio 9; Para o Distrito Autônomo de Arius (1)"
34090-3 = "[ns] \"O que você quis dizer antes com 'cerca de 90 minutos'?\""
34090-4 = "Para chegar ao distrito autônomo de Arius, precisamos passar pelas catacumbas no subsolo da Trinity."
34090-5 = "Existem cerca de 300 entradas conhecidas para as catacumbas. Dentre elas, as 'entradas verdadeiras' são limitadas, o resto é tudo falso."
34090-6 = "Se escolhermos a entrada errada, acabaremos perdidos nas catacumbas para sempre."
34090-7 = "É por isso que nós usamos códigos para transmitir a entrada correta e a rota interna das catacumbas que leva ao distrito autônomo de Arius."
34090-8 = "......Porque o interior das catacumbas muda em intervalos regulares."
34090-9 = "[s] \"O interior muda...?\""
34090-10 = "Sim. Um caminho que usamos da última vez pode se tornar um beco sem saída... ou perdemos completamente o senso de direção... coisas desse tipo."
34090-11 = "Eu não sei como funciona... mas as catacumbas são um labirinto cuja totalidade ainda não foi descoberta. Toda vez que pisamos lá, a rota e a entrada mudam."
34090-16 = "Na nossa situação atual, nós não sabemos qual é a entrada correta... porque eles não nos passam mais os códigos."
34090-17 = "Afinal, não há necessidade de ensinar o caminho de volta para cães de caça que fugiram."
34090-18 = "M-Mas... ainda resta uma única entrada que podemos usar."
34090-19 = "E ela só pode ser usada até a virada do dia de hoje. Daqui a uma hora, ela também será fechada... se isso acontecer, nós..."
34090-20 = "Provavelmente não conseguiremos mais voltar para o distrito autônomo de Arius."
34090-21 = "E mesmo se conseguíssemos voltar de alguma forma, não conseguiríamos salvar a Atsuko."
34090-22 = "Por isso precisamos nos apressar..."
34090-26 = "！？"
34090-27 = "É o 'Esquadrão'!"
34090-28 = "Sabíamos que viriam para cá! Todas as unidades, preparem-se para o combate!"
34090-29 = "......Parece que elas tiveram a mesma ideia que a gente."
34090-30 = "Preparar para o combate."
34090-31 = "S-Sim!"
34090-32 = "......Bom, já era de se esperar."
34090-34 = "Muito bem... vamos mostrar a elas do que cães de caça feridos são capazes."