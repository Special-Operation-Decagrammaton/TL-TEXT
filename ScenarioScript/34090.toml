[translation]
34090-1 = "Episódio 9;Rumo ao Distrito de Arius (1)"
34090-3 = "[ns] \"Aquele 'restam 90 minutos' de agora há pouco; como assim?\""
34090-4 = "Pra ir ao distrito autônomo de Arius, é preciso atravessar as catacumbas sob Trinity."
34090-5 = "As entradas das catacumbas, só as conhecidas, são cerca de 300. Dentre elas, as \"entradas verdadeiras\" são limitadas; o resto é tudo falso."
34090-6 = "Quem errar a entrada acaba condenado a vagar pelas catacumbas."
34090-7 = "Por isso, a entrada correta e a rota interna das catacumbas que leva ao distrito autônomo de Arius são transmitidas pra gente por código."
34090-8 = "……Porque o interior das catacumbas muda em ciclos."
34090-9 = "[s] \"O interior muda……?\""
34090-10 = "Sim. O caminho por onde você passou outro dia vira um beco sem saída…… ou você perde a direção…… é mais ou menos assim."
34090-11 = "Não sei como funciona, mas…… as catacumbas são um labirinto de que não se conhece o todo. A cada vez que se entra, a rota e a entrada mudam."
34090-16 = "A gente de agora não sabe qual é a entrada certa…… porque já não recebemos mais o código."
34090-17 = "Afinal, não há por que ensinar o caminho de casa a um cão de caça fugido."
34090-18 = "M-mas…… resta uma única entrada que ainda dá pra usar."
34090-19 = "E ela só serve até a virada do dia de hoje. Daqui a 1 hora, ela também se fecha…… e aí……."
34090-20 = "não haverá mais como voltar ao distrito autônomo de Arius."
34090-21 = "E, mesmo que a gente conseguisse voltar, não daria pra salvar a Atsuko."
34090-22 = "Por isso, temos que nos apressar……."
34090-26 = "!?"
34090-27 = "É o \"Squad\"!"
34090-28 = "Vocês vieram mesmo! Todas, preparar pra combate!"
34090-29 = "……O lado de lá parece ter pensado a mesma coisa, né."
34090-30 = "Preparar pra combate."
34090-31 = "S-sim!"
34090-32 = "……Bom, ia dar nisso mesmo."
34090-34 = "Que seja…… vou lhes mostrar o orgulho de um cão de caça ferido."
