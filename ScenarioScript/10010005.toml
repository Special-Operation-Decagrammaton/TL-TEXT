[translation]
10010005-1 = "プロローグ;経典復活大作戦！"
10010005-12 = "あ、先生！突然のお願いになってしまい、すみません……。"
10010005-13 = "お越しいただいてありがとうございます、安心しました……！"
10010005-14 = "[s1] \"ううん、気にしないで。\"\n[s2] \"ところで、何があったの？\""
10010005-15 = "実はですね……。"
10010005-16 = "実はですね……。"
10010005-17 = "まずは、こちらを見ていただければと。"
10010005-23 = "[ns3] \"木の箱……？\"\n[ns4] \"と、その中に古い本？何だか古代の遺物みたいな……？\""
10010005-24 = "はい。仰る通りこれは、先日トリニティの発掘区域にて発見された「経典」です。"
10010005-25 = "はい。仰る通りこれは、先日トリニティの発掘区域にて発見された「経典」です。"
10010005-26 = "歴史的にもかなり重要な経典のようでして、これによって「新クィニセクストゥム公会議」で宣布された内容の、新たな解釈ができそうなんですとか。"
10010005-27 = "これから先、シスターたちの経典に関する学びの内容が変わるのではないか……というくらいの、大きな発見なのです。"
10010005-28 = "[s] \"えっと……とりあえず、喜ばしいことなんだよね？\""
10010005-29 = "は、はい！すみません、私の説明が下手で……。"
10010005-30 = "シスターフッドだけでなく、トリニティ総合学園にとってもすごく良いお知らせ……と言っても過言ではありません。"
10010005-31 = "この経典が発見されて以来、学園のあちこちがまるでお祭りのような雰囲気になってるくらいでして。"
10010005-32 = "この発見を祝う式典も予定されているんです。そこではサクラコ様が、その経典の前半部分を朗読されることになってまして……。"
10010005-40 = "サクラコ様の古代語、聞かれたことはありますか？発音がとっても綺麗で、すっごく美しいんですよ……！"
10010005-46 = "トリニティの他の生徒さんたちも招待されますので、シスターフッドとしても万全の準備をしなくてはいけません。"
10010005-48 = "こういったせっかくの機会ですので、ぜひ先生にもご出席いただけたらなと思いまして。こうしてお呼びさせていただいた次第です。"
10010005-49 = "お忙しい中ありがとうございます、先生。"
10010005-50 = "[s] \"ううん、そういうことなら喜んで。\""
10010005-51 = "ふふっ。あ、実はその式典の会場、トリニティの離れにある古い聖堂で行うことになったんです。数百名ほど参加できるような、大きめの場所でして。"
10010005-52 = "せっかくの古い経典だから、古い聖堂の遺跡で……という感じなのでしょうか？ちょっと理由は分からないのですが……。"
10010005-57 = "ともかくこの式典で様々な準備が行われているのですが、私はこの経典を保管しておきつつ、その聖堂まで持っていく役割を頂きまして。"
10010005-61 = "……あっ。"
10010005-62 = "ずっと開けられていなかったせいでしょうか、ほこりがたくさん……。"
10010005-63 = "さっさっ、と……。"
10010005-70 = "……？"
10010005-71 = "あ、あれ……？"
10010005-72 = "[s5] \"ものの見事に、バラバラに……。\"\n[s6] \"経典が、崩れた……。\""
10010005-78 = "きゃああぁぁぁっ！？"
10010005-79 = "えっ、ええっ！？こ、これは、どうして！？わ、私は、私は……！！？！？"
10010005-80 = "[s7] \"ヒナタ、とりあえず落ち着こう！\"\n[s8] \"とにかく直さないと……！\""
10010005-81 = "そ、そうですね！？まだバラバラになっただけですし、どうにか直して……！"
10010005-82 = "そ、そうですね！？まだバラバラになっただけですし、どうにか直して……！"
10010005-83 = "よいしょ、よいしょっ……！"
10010005-91 = "これをこう、もう一度束ねて……っ！"
10010005-97 = "か、紙が崩れちゃいました！？ど、どうしてですか！？"
10010005-98 = "ちょっと優しく触っただけなのに、どうしてこんなボロボロと……！？"
10010005-99 = "え、あ、古い材質だから……？た、確かに……？で、ですがこれは……！"
10010005-100 = "あああっ、汗でインクが滲んで……！？"
10010005-101 = "と、とりあえずページを、バラバラにならないように……！"
10010005-108 = "ああ、何だか拾えば拾うほど崩れて……！ああ、ああっ……！？"
10010005-112 = "うえぇぇぇぇぇっ……！？"
10010005-118 = "……。"
10010005-119 = "[ns] \"……。\""
10010005-120 = "……。"
10010005-121 = "えっ、と……。"
10010005-122 = "その、先生……。"
10010005-127 = "私、いったいどうすれば……？"
10010005-130 = "#video;10010"
