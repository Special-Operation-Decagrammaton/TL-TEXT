[translation]
10010005-1 = "Prólogo; Grande Operação de Restauração das Escrituras!"
10010005-12 = "Ah, Sensei! Sinto muito por pedir algo tão de repente..."
10010005-13 = "Obrigada por vir, estou mais aliviada agora...!"
10010005-14 = "[s1] \"Não se preocupe, está tudo bem.\"\n[s2] \"A propósito, o que aconteceu?\""
10010005-15 = "Na verdade..."
10010005-16 = "Na verdade..."
10010005-17 = "Primeiro, gostaria que você desse uma olhada nisto."
10010005-23 = "[ns3] \"Uma caixa de madeira...?\"\n[ns4] \"E, dentro dela, um livro antigo? Parece algum tipo de relíquia ancestral...?\""
10010005-24 = "Sim. Como você disse, esta é uma \"Escritura\" que foi descoberta recentemente na área de escavação de Trinity."
10010005-25 = "Sim. Como você disse, esta é uma \"Escritura\" que foi descoberta recentemente na área de escavação de Trinity."
10010005-26 = "Parece ser uma escritura historicamente muito importante, e dizem que, graças a ela, poderemos ter uma nova interpretação do que foi proclamado no \"Novo Concílio de Quinisextum\"."
10010005-27 = "É uma descoberta tão grande que pode até mudar o conteúdo do aprendizado das irmãs sobre as escrituras daqui para frente..."
10010005-28 = "[s] \"Bem... por enquanto, isso é algo para se comemorar, certo?\""
10010005-29 = "S-sim! Desculpe, eu não expliquei muito bem..."
10010005-30 = "Não é exagero dizer que esta é uma notícia maravilhosa não apenas para a Sisterhood, mas para toda a Academia Trinity."
10010005-31 = "Desde que esta escritura foi descoberta, o clima em toda a academia parece estar em festa."
10010005-32 = "Uma cerimônia para celebrar esta descoberta também está planejada. Nela, a Srta. Sakurako fará a leitura da primeira parte da escritura..."
10010005-40 = "Você já ouviu a Srta. Sakurako falando em língua antiga? A pronúncia dela é tão clara, é simplesmente maravilhosa...!"
10010005-46 = "Outras alunas de Trinity também serão convidadas, então a Sisterhood precisa estar com os preparativos impecáveis."
10010005-48 = "Como é uma oportunidade tão especial, pensei que seria ótimo se o Sensei pudesse comparecer. Foi por isso que chamei você."
10010005-49 = "Obrigada por vir mesmo com sua agenda cheia, Sensei."
10010005-50 = "[s] \"Não se preocupe, se é assim, ficarei feliz em ir.\""
10010005-51 = "Fufu. Ah, na verdade, decidimos realizar a cerimônia em uma antiga catedral que fica em um anexo de Trinity. É um lugar bem grande, que comporta centenas de pessoas."
10010005-52 = "Será que é porque, como é uma escritura antiga, faz sentido realizá-la nas ruínas de uma catedral antiga...? Não sei bem o motivo..."
10010005-57 = "De qualquer forma, muitos preparativos estão sendo feitos para esta cerimônia, e eu recebi a tarefa de guardar esta escritura e levá-la até a catedral."
10010005-61 = "……Ah."
10010005-62 = "Será que é porque ela não era aberta há muito tempo? Tem tanta poeira..."
10010005-63 = "Vou dar uma limpadinha..."
10010005-70 = "……?"
10010005-71 = "A-ah, espere..."
10010005-72 = "[s5] \"Ela se desfez completamente...\"\n[s6] \"A escritura, ela desmoronou...\""
10010005-78 = "Aaaaaaaah!?"
10010005-79 = "O quê, o quê!? I-isso, por que!? E-eu, eu...!!??"
10010005-80 = "[s7] \"Hinata, tente se acalmar!\"\n[s8] \"De qualquer forma, precisamos consertar isso...!\""
10010005-81 = "V-você tem razão!? Ela só se espalhou, então talvez eu consiga consertar...!"
10010005-82 = "V-você tem razão!? Ela só se espalhou, então talvez eu consiga consertar...!"
10010005-83 = "Força, força..."
10010005-91 = "Vou juntar tudo assim, mais uma vez...!"
10010005-97 = "O-o papel se desfez!? P-por que isso aconteceu!?"
10010005-98 = "Eu só toquei com cuidado, por que está se esfarelando assim...!?"
10010005-99 = "É, ah, é por causa do material antigo...? C-claro...? M-mas isso é...!"
10010005-100 = "Aaaah, a tinta está borrando com o suor...!?"
10010005-101 = "P-pelo menos, preciso impedir que as páginas se espalhem mais...!"
10010005-108 = "Ah, quanto mais eu tento pegar, mais ela se desfaz...! Ah, aaaaah...!?"
10010005-112 = "Uééééééé...!?"
10010005-118 = "……."
10010005-119 = "[ns] \"…….\""
10010005-120 = "……."
10010005-121 = "E-então..."
10010005-122 = "É que, Sensei..."
10010005-127 = "O que eu deveria fazer...?"
10010005-130 = "#video;10010"
