[translation]
61100-1 = "Episódio 10; Feridas e Vestígios"
61100-2 = "Há algo que eu gostaria de discutir com você, incluindo o que aconteceu hoje... Se importa?"
61100-3 = "[s1]\"Claro. Quer beber alguma coisa enquanto conversamos?\"\n[s2]\"Só tenho chá com leite de garrafa ou chá de cevada, no entanto.\""
61100-6 = "...Sim."
61100-8 = "(Nós dois nos sentamos lado a lado e bebemos nossas bebidas de garrafa)"
61100-9 = "(Saori parecia um pouco tensa)"
61100-11 = "[ns]\"Falando nisso, a sua aula de hoje foi ótima.\""
61100-12 = "S-Sério...?"
61100-13 = "Fico feliz que tenha conseguido dar um jeito, pelo menos..."
61100-14 = "Eh? Não... ser tão elogiada assim me deixa... sem jeito."
61100-15 = "Como assim, 'seu julgamento estava certo'...?"
61100-16 = "U-Uhum..."
61100-17 = "Eu era instrutora no passado. Talvez essa experiência tenha sido útil."
61100-18 = "Dito isso, eu mesma preciso estudar muito mais."
61100-19 = "Ah... percebi que também se aprende muito ao 'ensinar'."
61100-20 = "Talvez porque, no processo de ensinar, nós organizamos o nosso próprio conhecimento...?"
61100-21 = "Com certeza... foi essa a sensação."
61100-22 = "...Não é só isso?"
61100-23 = "[s]\"Eu também aprendo muito com todas vocês.\""
61100-24 = "Isso... o que quer dizer?"
61100-25 = "Guiar os inexperientes é o papel de um Sensei, não é?"
61100-26 = "[s]\"No fim das contas, eu também sou apenas um inexperiente.\""
61100-30 = "[ns3]\"As coisas que eu deixei passar ao longo dos anos...\"\n[ns4]\"Eu acabo aprendendo com vocês, que ainda as possuem.\""
61100-33 = "Entendo..."
61100-34 = "Então, acho que isso é algo que eu não conseguiria entender agora."
61100-35 = "Mas chegará o dia em que eu entenderei... É isso?"
61100-36 = "Hehe... O Sensei agora, como posso dizer..."
61100-37 = "Parece um velho falando."
61100-38 = "[s]\"Guh! Cof! Cof...!\""
61100-39 = "S-Sensei!? O que foi!?"
61100-40 = "Eh, não precisa se preocupar...? Não é o que parece..."
61100-41 = "Me desculpe... Eu não achei que essas palavras causariam tanto dano..."
61100-42 = "Acho que não devo usar palavras sem entendê-las direito."
61100-43 = "[s5]\"Não, você não está errada...\"\n[s6]\"Senseies são... criaturas meio velhas mesmo...\""
61100-46 = "M-Mil desculpas! Mesmo que você não se importe, eu...!"
61100-47 = "Eu..."
61100-48 = "..."
61100-50 = "(Por um tempo, ficamos em silêncio)"
61100-51 = "(Apenas o som de nós bebendo ecoou silenciosamente algumas vezes)"
61100-52 = "Sensei."
61100-53 = "Eu... por muito tempo..."
61100-54 = "...Sempre quis me desculpar."
61100-55 = "Ah, não, espere. Dito assim, não dá para saber pelo que estou me desculpando..."
61100-56 = "Ufa..."
61100-57 = "Sensei.#nEu acho que vou lhe fazer... um pedido muito indelicado agora."
61100-58 = "Mas não consigo pensar em outra forma."
61100-59 = "...Finalmente criei coragem para enfrentar o que eu fiz."
61100-60 = "Só depois de vir para cá, finalmente..."
61100-61 = "Eu percebi de novo que... ainda não 'pedi desculpas' a você apropriadamente."
61100-62 = "[s7]\"Não precisa se preocupar com isso.\"\n[s8]\"Naquela época, eu já sabia dos seus sentimentos...\""
61100-65 = "Naquela época...?"
61100-67 = "Sempre que venho a este lugar, acabo lembrando de várias coisas."
61100-68 = "Muitas coisas aconteceram..."
61100-69 = "..."
61100-70 = "Ahm, Sensei?"
61100-71 = "..."
61100-72 = "Eu realmente preciso me desculpar direito com você――"
61100-73 = "[log]Ah, é mesmo! Sobre as meninas que se transferiram para a Trinity![/log]"
61100-77 = "Pensando bem... aquela sua mudança de assunto foi bem forçada."
61100-78 = "Mas..."
61100-79 = "Sinto muito, mas só desta vez... eu ficaria feliz se você pudesse ceder ao meu egoísmo."
61100-80 = "Eu sinto que este é um 'passado'... que eu preciso superar."
61100-81 = "Se eu não enfrentar aquele acontecimento, nem mesmo aqui nas terras de Arius..."
61100-82 = "Não terei cara para olhar para todos de Arius.#nE sinto que... perderei toda a minha coragem para seguir em frente."
61100-83 = "[s]\"...Entendi.\""
61100-84 = "...Obrigada."
61100-85 = "Então..."
61100-89 = "Sensei... você poderia me mostrar o seu abdômen?"
61100-90 = "[s9]\"...!?\"\n[s10]\"Saori...!?\""
61100-93 = "N-Não é nada disso! Eu já esperava essa reação, mas..."
61100-94 = "Foi por isso que eu tentei... te preparar antes.#nDesculpe..."
61100-95 = "..."
61100-96 = "O meu――pecado."
61100-97 = "Quero ver com meus próprios olhos... as [ruby=vestígios]cicatrizes indeléveis[/ruby] que eu deixei em você."
61100-98 = "[ns]\"...!\""
61100-100 = "(Finalmente, entendi a intenção de Saori)"
61100-101 = "(Atendendo ao pedido de Saori, mostrei a cicatriz na minha barriga...)"
61100-103 = "Ah..."
61100-104 = "Isto é..."
61100-105 = "..."
61100-108 = "(A ponta dos dedos de Saori traçou suavemente a cicatriz)"
61100-109 = "(A mão dela... estava tremendo muito)"
61100-111 = "Me des... culpe..."
61100-112 = "Me desculpe..."
61100-113 = "Perdão..."
61100-114 = "Me perdoe..."
61100-115 = "Me perdoe. Me perdoe... me perdoe."
61100-116 = "Eu realmente... o que eu... o que eu devo fazer...?"
61100-117 = "Sensei..."
61100-118 = "...Sensei."
61100-119 = "Alguém como eu..."
61100-120 = "Fazer algo assim..."
61100-121 = "Guh..."
61100-122 = "Hic... ugh..."
61100-123 = "Uu, uwaaa, aaaaaa...!"
61100-125 = "(No ombro de Saori, que estava desmoronando e se encolhendo no chão――)"
61100-126 = "(Coloquei a mão suavemente)"
61100-128 = "[ns]\"Está tudo bem.\""
61100-129 = "S-Sensei...?"
61100-130 = "[s11]\"Tudo bem. Já sarou.\"\n[s12]\"Não dói nem um pouco.\""
61100-133 = "Mas...!"
61100-134 = "A cicatriz ainda está aí...!"
61100-135 = "Eu já percebi. Eu sei muito bem!"
61100-136 = "Toda ação deixa consequências. O passado não pode ser desfeito!"
61100-137 = "Deixará vestígios de alguma forma... e continuará afetando o futuro para sempre...!"
61100-138 = "Preferia..."
61100-139 = "Seria melhor..."
61100-140 = "[s13]\"Por favor, não diga que seria melhor não ter feito nada.\"\n[s14]\"Eu não quero que uma aluna minha diga palavras tão tristes.\""
61100-143 = "Sensei...?"
61100-144 = "[s15]\"Você tem razão, Saori.\"\n[s16]\"Acho que definitivamente existem feridas que deixam marcas.\""
61100-147 = "...!"
61100-148 = "[s17]\"Mas sabe, mesmo que a cicatriz fique...\"\n[s18]\"Nós somos criaturas fortes o suficiente... para continuar vivendo com elas.\""
61100-151 = "Vivendo... com elas...?"
61100-152 = "..."
61100-153 = "Esse é o... seu modo de viver, Sensei...?"
61100-154 = "Mas..."
61100-155 = "Eu não consigo entender muito bem..."
61100-156 = "Eu realmente não entendo nada..."
61100-157 = "Se eu confirmasse isso com os meus próprios olhos――"
61100-158 = "Se eu enfrentasse os pecados que cometi... pensei que conseguiria seguir um pouco em frente..."
61100-159 = "Mas, isso..."
61100-160 = "Talvez tenha sido apenas... um egoísmo meu..."
61100-161 = "[s]\"Ei, Saori.\""
61100-162 = "...?"
61100-163 = "[s19]\"Se você pudesse voltar àquela época――\"\n[s20]\"E ficar cara a cara com o seu 'eu' do passado, o que você diria?\""
61100-173 = "..."
61100-174 = "...Hehe."
61100-175 = "É uma pergunta curiosa."
61100-176 = "Eu também penso muito nisso. Várias... e várias vezes."
61100-177 = "..."
61100-178 = "Não teve um único dia em que eu não tenha me arrependido."
61100-179 = "Uma criança imatura e idiota... cometeu um pecado irreparável."
61100-180 = "Eu não entendia... quantos 'dias normais' eu destruiria como resultado das minhas ações."
61100-181 = "Se eu pudesse, falaria muito sério com o meu 'eu' daquela época."
61100-182 = "Na verdade, antes de falar, eu queria dar um soco nela."
61100-183 = "Diria: 'Você sabe mesmo o que está prestes a fazer?'"
61100-184 = "'Se continuar assim... não vai ter mais volta.'"
61100-185 = "..."
61100-186 = "Mas eu não posso fazer isso."
61100-187 = "O que está aqui agora... é apenas a 'eu' que veio depois daquela escolha e daquela ação."
61100-188 = "Então, o mínimo que posso fazer é carregar esse fardo e continuar vivendo."
61100-189 = "É só isso."
61100-190 = "..."
61100-191 = "É, é só isso mesmo."
61100-192 = "[s]\"E isso basta.\""
61100-193 = "Sensei...?"
61100-194 = "[ns]\"Sim, isso basta.\""
61100-196 = "[ns]\"Mesmo que o mundo inteiro te julgue como uma pecadora.\""
61100-197 = "No fim, eu sou mesmo uma pecadora..."
61100-198 = "[s21]\"Não, não é isso...\"\n[s22]\"Você pode repetir o que eu vou te dizer agora?\""
61100-201 = "Quando eu estiver na mesma situação no futuro... eu conseguirei fazer uma escolha melhor..."
61100-202 = "Antes de agir... vou parar e pensar a respeito..."
61100-203 = "Quero que me prometa isso..."
61100-204 = "Se fizer isso, não importa quando... nem quantas vezes... o Sensei vai..."
61100-205 = "U-Uu..."
61100-209 = "(Saori começou a chorar feito uma criança pequena)"
61100-210 = "(Acariciei suas costas gentilmente até ela se acalmar...)"
61100-212 = "Falando nisso, parece que... o ambiente em Arius mudou um pouco."
61100-213 = "[s]\"Mudou?\""
61100-214 = "Sim."
61100-215 = "Graças às aulas, parece que elas se abriram um pouco mais."
61100-216 = "Houve mais oportunidades para conversarmos durante os intervalos."
61100-217 = "Elas disseram que a vida delas melhorou bastante em comparação a antes."
61100-218 = "Pelo menos parece que não lhes falta mais comida.#nO 'Horário da Água' parece que virou o 'Horário do Chá' agora."
61100-219 = "Apesar de os prédios e as instalações... bem, estarem do jeito que você vê."
61100-220 = "Pelo visto, dinheiro e suprimentos começaram a vir de fora..."
61100-221 = "A origem ou o fluxo desses fundos... eu ainda não sei."
61100-222 = "Ainda assim, é certeza que alguma mudança está ocorrendo em Arius."
61100-223 = "...Pensando bem, é óbvio, não é?"
61100-224 = "Pois não existe nada que não mude."
61100-225 = "[s]\"Está preocupada?\""
61100-226 = "Não sei. Mas..."
61100-227 = "É bom ver que as vidas delas estão melhorando.#nFico um pouco mais aliviada."
61100-228 = "..."
61100-229 = "Sensei."
61100-230 = "Será que nós... também conseguiremos mudar?"
61100-231 = "[s23]\"Tenho certeza que sim.\"\n[s24]\"Mesmo que os seus passos sejam pequenos.\"\n[s25]\"Um dia você olhará para trás e verá o quão longe chegou.\""
61100-235 = "...Entendi."
61100-236 = "Fico muito feliz por ter te conhecido."
61100-237 = "Nós tivemos muita sorte... de ter você conosco."
61100-238 = "Se você não estivesse aqui, eu..."
61100-239 = "Nós, com certeza..."
61100-243 = "Por isso... Sensei."
61100-244 = "Isso, ahm... você pode recusar se for algo muito ruim, mas――"
61100-245 = "Você deixaria... eu dormir junto com você essa noite?"
61100-246 = "[s]\"!?\""
61100-247 = "Hehe, é brincadeira. Não precisa se assustar tanto."
61100-248 = "[s]\"Quando alguém que não costuma brincar faz uma piada dessas, o poder destrutivo dobra...\""
61100-249 = "Entendi. Vou usar isso como referência."
61100-250 = "[s]\"Espera... acabei de dar um tiro no próprio pé?\""
61100-251 = "Hehe, quem sabe."
61100-252 = "...Bom, este lugar pode não ser dos mais confortáveis, mas..."
61100-253 = "Eu já vou voltar."
61100-254 = "[s]\"Boa noite, Saori.\""
61100-258 = "Após fechar a porta, Saori encostou-se sozinha em uma parede."
61100-259 = "Brincadeira... é."
61100-260 = "Apesar de ter sido metade verdade."
61100-261 = "...Hehe."
61100-262 = "Descanse bem, Sensei."
61100-267 = "Ahm... Senpai?#nVocê já está dormindo...?"
61100-271 = "Ainda estou acordada.#n...O que foi, a esta hora?"
61100-272 = "Ah, nada!#nEu só... vim ver se você estava bem..."
61100-273 = "Ah, entendi.#nVocê ficou preocupada achando que eu estaria emburrada aqui sozinha... por termos sido derrotadas pelo Esquadrão e pelo Sensei hoje?"
61100-274 = "A-Aaah, b-bem! N-Não é isso! Eu não pensei isso!"
61100-275 = "Tudo bem. Eu não te culpo por pensar dessa forma."
61100-276 = "T-Tô dizendo que não é isso!"
61100-277 = "Ahaha. Desculpe. Eu não pude evitar dizer isso.#nMas é claro... que eu estou bem."
61100-278 = "S-Sério...?"
61100-279 = "Sim, é sério.#nAlgo assim não muda as coisas."
61100-281 = "――Pois o ódio de Arius não é algo que desaparece tão facilmente."
61100-282 = "...!!"
61100-283 = "Mudando de assunto... como foram as aulas?"
61100-284 = "Eh? As aulas...? Hmm..."
61100-285 = "E v-você, senpai... o que achou...?"
61100-286 = "A conversa não vai pra frente se você responder uma pergunta com outra.#n...Já te falei isso antes, não falei?"
61100-287 = "D-Desculpe, Senpai!"
61100-288 = "M-Mas, como posso dizer..."
61100-289 = "Como foi a minha primeira vez, não entendi direito... e a minha cabeça ficou rodando..."
61100-290 = "Mas..."
61100-291 = "Foi um sentimento meio diferente."
61100-299 = "Ouvir histórias sobre um mundo lá fora que eu não conhecia..."
61100-302 = "Eu percebi... o quanto nós estávamos num mundo totalmente diferente."
61100-308 = "Ah, quero dizer..."
61100-309 = "Mesmo agora, não mudamos, mas."
61100-310 = "...Tem razão."
61100-311 = "Mas, um pouco mais que antes..."
61100-312 = "Eu acho que também estamos conseguindo seguir em frente, não acha?#nPelo menos não passamos mais fome."
61100-313 = "Sim! Essa é a parte que me deixa mais feliz!"
61100-314 = "M-Mas... tem uma coisa que eu ando me perguntando..."
61100-315 = "Para a nossa comida, os lanches... com certeza precisamos de dinheiro, não é?"
61100-316 = "Como você consegue..."
61100-317 = "..."
61100-319 = "Você quer mesmo saber...?"
61100-320 = "Eh...? S-Sim..."
61100-321 = "Se você descobrir... pode ser que nunca mais consiga olhar as coisas de forma inocente... Mesmo assim, você quer ouvir?"
61100-322 = "É-É uma história tão assustadora assim!?"
61100-323 = "Hehe, é brincadeira, desculpe."
61100-324 = "Poxa, Senpai~"
61100-325 = "Saber o que não sabia significa que sua visão se amplia, mas em troca――"
61100-326 = "Também começamos a ver coisas que não precisávamos ver."
61100-327 = "É... como o tal do 'estudo' de que o Sensei falou."
61100-328 = "Senpai...?"
61100-329 = "A mudança sempre exige dinheiro."
61100-330 = "Qualquer um quer uma vida melhor.#nMas é triste, sabe... os recursos são limitados para satisfazer os desejos de todos."
61100-336 = "Por isso, nasce a competição, as pessoas começam a brigar..."
61100-342 = "E aí... sempre há um perdedor, cuja existência será esquecida com o tempo..."
61100-343 = "...Assim como nós."
61100-344 = "Sabia? Existe um trabalho em Kivotos que apenas Arius pode fazer――"
61100-345 = "Algo que só Arius é capaz."
61100-346 = "Ter um mercado monopolizado é maravilhoso. Porque podemos ditar o preço das recompensas."
61100-347 = "Eh? Trabalho...? Mercado monopolizado...? Algo que só Arius pode fazer...?"
61100-351 = "S-Senpai, isso quer dizer!?"
61100-354 = "Voltou? Você se 'livrou' dele direito, não é?"
61100-358 = "Hm? O que é... isso?"
61100-359 = "P-Por favor, me poupe! Pela minha vida... eu faço qualquer coisa...!"
61100-360 = "Hm...?"
61100-361 = "..."
61100-362 = "O que significa isso? Eu disse muito claramente para 'se livrar dele e garantir o serviço', não disse?"
61100-363 = "Eu pensei que você ficaria mais feliz com isso.#nParece que ele mudou de ideia e diz que fará o que você mandar de agora em diante."
61100-364 = "Claro, eu poderia descarregar o equivalente a dois pentes de munição na cabeça dele e terminar a missão conforme pediu, se quiser."
61100-365 = "H-Hiiiii! Por favor... por favor, isso não...!"
61100-366 = "...De fato, ele parece bem submisso.#nMas o que eu ganho não 'lidando' com ele?"
61100-367 = "Tudo o que for dele passará a ser seu para fazer o que quiser."
61100-368 = "I-Isso mesmo! Eu faço e entrego o que quiser!#nEntão, por favor, minha vida...!"
61100-369 = "Humm... Mas não tem garantia de que ele não me traia, não é?"
61100-370 = "Nesse caso, bastaria dizer 'Vou chamar Arius', e isso seria o suficiente."
61100-371 = "Hiiiiiiii!!"
61100-372 = "Entendo...#nE quanto a você? Mercenários seguem o dinheiro, não é?#nSe você for tentada por uma recompensa e me trair, eu estarei enrascado."
61100-373 = "Isso é coisa de gente que ganha a vida por dia.#nSe quiser sobreviver muito tempo neste mundo... precisa manter a sua credibilidade."
61100-374 = "...Para começar, estamos fora das regras.#nMercenários precisam garantir que são um 'recurso previsível'."
61100-375 = "..."
61100-376 = "Muito bem. Vou acreditar na sua palavra. Bom trabalho."
61100-377 = "Hehehe... Com isso, os direitos deste distrito são totalmente nossos..."
61100-378 = "(A existência de Arius é praticamente desconhecida pelo mundo. Aqueles que nos conhecem zombam de nós como um 'lugar imundo', mas――)"
61100-379 = "(Será que eles sabem que o 'mundo exterior' é, na verdade, muito mais imundo?)"
61100-381 = "V-Você quer dizer que..."
61100-382 = "Você o... apagou...?"
61100-383 = "Não, não ainda."
61100-384 = "A-Ah, bom... que alívio...!"
61100-385 = "Mas, então... essa história de 'ditar o preço das recompensas'..."
61100-386 = "As coisas dão muito mais certo justamente porque ousamos parar a um passo do limite."
61100-387 = "As pessoas costumam dizer muito que 'as pessoas não mudam'."
61100-388 = "Mas, será mesmo verdade?#nAs pessoas mudam, sim."
61100-389 = "Quando a morte se torna algo real... elas mudam.#n...Para onde essa mudança as leva... nem eu mesma sei."
61100-390 = "...Nesse sentido, nós também... já devemos ter mudado.#nNós somos aquelas que respiram no lugar mais próximo da morte――"
61100-392 = "――Pois nós somos Arius."
61100-394 = "Esta é só a minha opinião pessoal, mas... dinheiro é dinheiro."
61100-395 = "Não existe isso de dinheiro nobre ou plebeu.#nSe existe alguém que faz essa distinção... essa pessoa ainda deve ter privilégios sobrando."
61100-396 = "Fazer o máximo uso das suas habilidades para ganhar dinheiro.#nNão é algo tão ruim assim."
61100-397 = "Apesar disso, até eu sinto a minha alma se desgastar ao fazer esse tipo de trabalho."
61100-398 = "Hã? O que eu faço quando me sinto assim, você pergunta?"
61100-399 = "..."
61100-401 = "Eu me lembro de vocês."
61100-402 = "É por terem vocês aqui que eu continuo a viver."
61100-404 = "...Sinto muito. Por não conseguir cuidar muito bem de vocês."
61100-405 = "N-Não! Não é verdade...!#nNós é que devemos a você, Senpai..."
61100-406 = "Ver vocês comendo felizes e rindo me faz ter vontade de me esforçar mais."
61100-407 = "Dizer que todos podem ser igualmente felizes... é um conto de fadas."
61100-408 = "Nós sabemos dessa verdade mais do que qualquer outro."
61100-409 = "Mesmo assim, eu acredito que essas crianças devessem ter um lugar para pertencerem em algum lugar."
61100-410 = "Aqui... é o lugar para elas.#nEu quero construir um lugar onde todas possam pertencer."
61100-411 = "Crianças abandonadas. Esquecidas. Que não conseguem achar um lugar em nenhum canto..."
61100-412 = "Essas crianças... deveriam vir para cá.#nBem, acho que se todas elas realmente viessem, seria um probleminha. Aqui é bem apertado."
61100-413 = "...É como o ninho de um pequeno pássaro."
61100-414 = "Mas, mesmo assim, por enquanto... eu quero proteger este ninho."
61100-415 = "Quero fazer com que os pequenos filhotes que aqui vivem, nem que seja um pouquinho..."
61100-416 = "Sintam que este é um lugar que faz a vida valer a pena."
61100-417 = "Senpai..."
61100-418 = "Você se lembra de quando a 'Madame' estava aqui?"
61100-419 = "...Ugh!"
61100-420 = "Ahaha! Sim, é verdade... só de lembrar já me dá calafrios."
61100-421 = "...Houve coisas que a Madame não conseguiu fazer."
61100-422 = "Coisas que aquela pessoa nem sequer tentou fazer."
61100-423 = "Se eu conseguir realizar ao menos isso...#nNão acho que seja algo tão ruim."
61100-424 = "Por enquanto... isso é o bastante."
61100-425 = "..."
61100-426 = "...Senpai."
61100-427 = "Sim?"
61100-428 = "Toque gaita, por favor!"
61100-429 = "D-De novo...? A esta hora!?#nE eu acabei de tocar outro dia mesmo..."
61100-430 = "Eu quero ouvir de novo! Tenho certeza de que todas vão gostar!"
61100-431 = "Poxa vida... Por que todas vocês são assim..."
61100-432 = "...Ahem, não tem jeito.#nLá vou eu..."
61100-433 = "Ehehe."
61100-451 = "Uma gaita... É a Subaru."
61100-452 = "..."
61100-453 = "Ela também não muda nada."
61100-454 = "Hm...?"
61100-458 = "O que é...? Quem é você!"
61100-463 = "Guh!?"
61100-467 = "(Esta sensação... É escuro e sufocante, como se eu tivesse sido jogada no meio de uma neblina...)"
61100-468 = "(E acima de tudo...)"
61100-470 = "(Esse som... é uma trombeta?)"
61100-472 = "Próximo episódio; Excursão Escolar (1)"