[translation]
61100-1 = "Episódio 10; Feridas e Vestígios"
61100-2 = "Tenho algo para discutir com você, incluindo o que aconteceu hoje... você se importa?"
61100-3 = "[s1]\"Claro. Quer conversar enquanto bebemos algo?\"\n[s2]\"Só tenho chá de leite ou chá de cevada em garrafa, mas serve?\""
61100-6 = "……Ah, sim."
61100-8 = "（Sentamos lado a lado e bebemos o que estava na garrafa）"
61100-9 = "（Saori parecia um pouco tensa）"
61100-11 = "[ns]\"Falando nisso, a aula de hoje foi muito boa.\""
61100-12 = "V-você acha...?"
61100-13 = "Fico feliz que tenha dado certo de alguma forma..."
61100-14 = "Hã? Não... não precisa me elogiar tanto... fico sem jeito."
61100-15 = "Diz que meu julgamento não falhou... é isso?"
61100-16 = "E-entendo..."
61100-17 = "Eu costumava ser instrutora antigamente. Talvez essa experiência tenha sido útil."
61100-18 = "Ainda assim, eu mesma preciso estudar mais."
61100-19 = "Ah... então também se aprende muito ao \"ensinar\"."
61100-20 = "Porque, no processo de ensinar, você organiza seu próprio conhecimento... é isso?"
61100-21 = "Com certeza... era exatamente assim."
61100-22 = "……Não é só isso?"
61100-23 = "[s]\"Eu também aprendo muito com todos vocês.\""
61100-24 = "Isso... o que você quer dizer com isso?"
61100-25 = "O papel do Sensei não é guiar os inexperientes?"
61100-26 = "[s]\"No fim das contas, eu também sou apenas alguém inexperiente.\""
61100-30 = "[ns3]\"Com o passar dos anos, as coisas que deixei passar despercebidas...\"\n[ns4]\"Estou aprendendo com todos vocês que ainda as possuem.\""
61100-33 = "Entendo..."
61100-34 = "Nesse caso, é algo que eu, no momento, não consigo compreender."
61100-35 = "Mas, um dia, chegará o momento em que entenderei... é isso?"
61100-36 = "Fufu... o Sensei de agora, como posso dizer..."
61100-37 = "Parece um velho."
61100-38 = "[s]\"Guf! Cof! Gehof...!\""
61100-39 = "O-o que houve, Sensei!?"
61100-40 = "Hã, não é nada...? Não parece ser o caso..."
61100-41 = "Sinto muito... não imaginei que essas palavras fossem causar tanto dano..."
61100-42 = "Não deveria usar palavras sem entender bem o significado."
61100-43 = "[s5]\"Não, você não está errada...\"\n[s6]\"O Sensei é... uma criatura com jeito de velho, afinal...\""
61100-46 = "D-desculpe mesmo! Mesmo que o Sensei não se importe, eu..."
61100-47 = "Eu..."
61100-48 = "……"
61100-50 = "（Por um tempo, um silêncio se instalou）"
61100-51 = "（Apenas o som de beber algo ecoou silenciosamente algumas vezes）"
61100-52 = "Sensei."
61100-53 = "Eu... por muito tempo..."
61100-54 = "……Por muito tempo, quis pedir desculpas."
61100-55 = "Ah, não, espere. Assim não dá para entender bem pelo que estou pedindo perdão..."
61100-56 = "Huu..."
61100-57 = "Sensei. #nDe agora em diante... acho que farei um pedido muito indelicado."
61100-58 = "Mas não consigo pensar em outra forma."
61100-59 = "……Finalmente, tomei a decisão de encarar o que fiz."
61100-60 = "Ao vir aqui, finalmente..."
61100-61 = "Percebi novamente que ainda não... pedi \"perdão\" ao Sensei."
61100-62 = "[s7]\"Não precisa se preocupar com isso.\"\n[s8]\"Naquela época, eu já entendia seus sentimentos...\""
61100-65 = "Naquela época...?"
61100-67 = "Sempre que venho a este lugar, acabo me lembrando de várias coisas."
61100-68 = "Afinal, muitas coisas aconteceram aqui..."
61100-69 = "……"
61100-70 = "Digo, Sensei?"
61100-71 = "……"
61100-72 = "Eu realmente preciso pedir desculpas a você, Sensei—"
61100-73 = "[log]Ah, é verdade! Sobre as garotas que se transferiram para Trinity![/log]"
61100-77 = "Pensando bem... aquela mudança de assunto foi bem forçada."
61100-78 = "Mas..."
61100-79 = "Sinto muito, mas ficaria grata se pudesse me acompanhar no meu egoísmo apenas por agora."
61100-80 = "Sinto que este é um \"passado\" que eu preciso superar."
61100-81 = "Se eu não encarar aquele acontecimento, mesmo aqui nestas terras de Arius..."
61100-82 = "Não terei coragem de olhar para o pessoal de Arius. #nSinto que perderia toda a coragem de seguir em frente."
61100-83 = "[s]\"...Entendido.\""
61100-84 = "……Obrigada."
61100-85 = "Então..."
61100-89 = "Você poderia... me mostrar o seu abdômen, Sensei?"
61100-90 = "[s9]\"……！？\"\n[s10]\"Saori……！？\""
61100-93 = "N-não é isso! Eu esperava essa reação, mas..."
61100-94 = "Por isso eu tentei... preparar o terreno antes. #nMe desculpe..."
61100-95 = "……"
61100-96 = "O meu... pecado."
61100-97 = "A cicatriz permanente que deixei em você, Sensei... eu preciso vê-la com meus próprios olhos."
61100-98 = "[ns]\"……！\""
61100-100 = "(Finalmente, entendi a intenção da Saori.)"
61100-101 = "(Atendendo ao pedido da Saori, mostrei a marca no meu abdômen...)"
61100-103 = "Ah..."
61100-104 = "Isso é..."
61100-105 = "……"
61100-108 = "(A ponta dos dedos de Saori acaricia suavemente a cicatriz.)"
61100-109 = "(Aquela mão... estava tremendo violentamente.)"
61100-111 = "Descul...pe..."
61100-112 = "Desculpe..."
61100-113 = "Sinto muito..."
61100-114 = "Sinto muito mesmo..."
61100-115 = "Sinto muito. Sinto muito... sinto muito."
61100-116 = "Eu realmente... Eu... o que eu deveria fazer..."
61100-117 = "Sensei..."
61100-118 = "……Sensei."
61100-119 = "Alguém como eu..."
61100-120 = "Eu, que fiz algo assim..."
61100-121 = "Ugh..."
61100-122 = "Soluço... ah..."
61100-123 = "Uuu, uaaaaa, aaaaaaaa...!"
61100-125 = "(Coloquei a mão suavemente sobre o ombro de Saori, que desabou em prantos—)"
61100-126 = "(—e a confortei.)"
61100-128 = "[ns]\"Está tudo bem.\""
61100-129 = "Se... Sensei...?"
61100-130 = "[s11]\"Está tudo bem. Já cicatrizou.\"\n[s12]\"Não dói nada.\""
61100-133 = "Mas, mesmo assim...!"
61100-134 = "As cicatrizes ainda estão aqui, não estão...!"
61100-135 = "Eu já entendi. Eu sei!"
61100-136 = "Qualquer ação deixa um resultado. O passado nunca pode ser desfeito!"
61100-137 = "De uma forma ou de outra, ele deixa rastros... e continua influenciando o futuro para sempre...!"
61100-138 = "É melhor..."
61100-139 = "Seria melhor se..."
61100-140 = "[s13]\"Não diga que teria sido melhor não fazer nada.\"\n[s14]\"Eu não quero que minha aluna diga palavras tão tristes.\""
61100-143 = "Sensei...?"
61100-144 = "[s15]\"Você tem razão, Saori.\"\n[s16]\"Eu também acho que, certamente, existem cicatrizes que permanecem.\""
61100-147 = "……!"
61100-148 = "[s17]\"Mas, sabe... mesmo que as marcas permaneçam...\"\n[s18]\"Nós somos criaturas fortes o suficiente para viver com elas.\""
61100-151 = "Viver... com elas?"
61100-152 = "……."
61100-153 = "Essa é a... forma como o Sensei vive...?"
61100-154 = "Mas..."
61100-155 = "Eu não entendo muito bem..."
61100-156 = "Eu realmente não entendo nada..."
61100-157 = "Eu pensei que, se eu visse com meus próprios olhos—"
61100-158 = "Se eu encarasse os pecados que cometi... eu conseguiria seguir em frente, nem que fosse um pouco..."
61100-159 = "Mas isso..."
61100-160 = "Talvez tenha sido apenas... um equívoco egoísta da minha parte..."
61100-161 = "[s]\"Ei, Saori.\""
61100-162 = "……?"
61100-163 = "[s19]\"Se você pudesse voltar àquela época—\"\n[s20]\"E pudesse encarar a si mesma daquele momento, o que você diria?\""
61100-173 = "……."
61100-174 = "...Heh."
61100-175 = "Que conversa estranha."
61100-176 = "Eu também penso muito sobre coisas parecidas. Várias e várias vezes."
61100-177 = "……."
61100-178 = "Não houve um único dia em que eu não me arrependi."
61100-179 = "Uma criança imatura e tola... cometeu um pecado irreparável."
61100-180 = "Eu não entendia nada... sobre quantos \"cotidianos\" eu acabaria destruindo como resultado das minhas ações."
61100-181 = "Se eu pudesse, eu diria isso de verdade para o meu eu daquela época."
61100-182 = "Não, antes de falar, eu daria um soco nela."
61100-183 = "\"Você tem noção do que está tentando fazer?\""
61100-184 = "\"Se continuar assim... não haverá volta.\""
61100-185 = "……."
61100-186 = "Mas não posso fazer isso."
61100-187 = "Quem está aqui agora... sou apenas eu, depois de ter escolhido e agido."
61100-188 = "Por isso, pelo menos, só me resta carregar esse fato e continuar vivendo."
61100-189 = "É só isso."
61100-190 = "……."
61100-191 = "Ah, é só isso mesmo."
61100-192 = "[s]\"Isso é o suficiente.\""
61100-193 = "Sensei...?"
61100-194 = "[ns]\"Sim, isso é o suficiente.\""
61100-196 = "[ns]\"Mesmo que o mundo inteiro culpe a Saori como uma criminosa.\""
61100-197 = "Então eu sou mesmo uma criminosa..."
61100-198 = "[s21]\"Não, não é isso...\"\n[s22]\"Pode repetir o que vou dizer agora?\""
61100-201 = "Daqui para frente, quando estiver na mesma situação... espero que consiga fazer escolhas melhores..."
61100-202 = "Antes de agir... tente parar e pensar um pouco..."
61100-203 = "Quero que me prometa isso..."
61100-204 = "Se fizer isso, o Sensei estará aqui, sempre... não importa quantas vezes seja..."
61100-205 = "U-uuh..."
61100-209 = "（Saori começou a chorar como uma criança pequena）"
61100-210 = "（Fiquei acariciando suas costas gentilmente até que ela se acalmasse...）"
61100-212 = "Falando nisso, houve... uma pequena mudança no ambiente de Arius."
61100-213 = "[s]\"Mudança?\""
61100-214 = "Sim."
61100-215 = "Graças às aulas, parece que elas se abriram um pouco mais."
61100-216 = "Aumentaram as oportunidades de conversarem durante o intervalo."
61100-217 = "Disseram que a vida delas melhorou em comparação a antes."
61100-218 = "Pelo menos, não parecem mais passar fome. O \"horário da água\", agora, parece ter virado um \"horário do chá\"."
61100-219 = "O prédio e as instalações... bem, você viu como estão."
61100-220 = "Ao que parece, começaram a receber dinheiro e suprimentos de fora..."
61100-221 = "A origem desses fundos e como eles chegam... ainda não sei dizer."
61100-222 = "Mas, ainda assim, é certo que algo mudou em Arius."
61100-223 = "Pensando bem, é natural, não é?"
61100-224 = "Pois não existe nada que não mude."
61100-225 = "[s]\"Está preocupado?\""
61100-226 = "Não sei. Mas..."
61100-227 = "O fato de a vida delas estar melhorando é algo bom. Fiquei um pouco aliviado."
61100-228 = "..."
61100-229 = "Sensei."
61100-230 = "Será que nós também... podemos mudar?"
61100-231 = "[s23]\"Com certeza, vai dar tudo certo.\"\n[s24]\"Mesmo que cada passo seja pequeno.\"\n[s25]\"Um dia, você vai olhar para trás e ver o quanto caminhou.\""
61100-235 = "...Entendo."
61100-236 = "Eu fico feliz por ter conhecido o Sensei."
61100-237 = "Ter o Sensei por perto... foi uma sorte imensa."
61100-238 = "Se o Sensei não estivesse aqui, eu..."
61100-239 = "Nós, com certeza..."
61100-243 = "Por isso... Sensei."
61100-244 = "Isso é, bem... pode recusar se não quiser, mas—"
61100-245 = "Hoje à noite... poderia dormir comigo?"
61100-246 = "[s]\"!?\""
61100-247 = "Fufu, é brincadeira. Não precisa ficar tão surpreso."
61100-248 = "[s]\"Quando alguém que não costuma brincar diz isso, o impacto é dobrado...\""
61100-249 = "Entendo. Vou levar isso em consideração para o futuro."
61100-250 = "[s]\"Por acaso... isso foi um autogolpe meu?\""
61100-251 = "Fufu, quem sabe?"
61100-252 = "...Bem, não é um lugar muito confortável, mas..."
61100-253 = "Já está na hora de eu voltar."
61100-254 = "[s]\"Boa noite, Saori.\""
61100-258 = "Depois de fechar a porta, Saori ficou sozinha, encostada na parede."
61100-259 = "Brincadeira... é."
61100-260 = "Embora fosse metade verdade."
61100-261 = "...Fufu."
61100-262 = "Descanse bem, Sensei."
61100-267 = "A-ah, desculpe... Senpai? Você já está dormindo...?"
61100-271 = "Ainda estou acordada.#n……O que houve a esta hora?"
61100-272 = "Ah, não, nada!#nÉ que... eu estava pensando se... você estava bem..."
61100-273 = "Ah, entendo.#nVocê ficou preocupada achando que eu estaria me remoendo sozinha por ter sido derrotada pelo esquadrão e pelo Sensei hoje, não foi?"
61100-274 = "A-a-a-ah, não! N-não é isso! Eu não estava pensando nada do tipo!"
61100-275 = "Está tudo bem. É compreensível que tenha pensado assim."
61100-276 = "Eu disse que não é isso!"
61100-277 = "Ahaha. Desculpe. Eu só quis brincar um pouco.#nClaro que... eu estou bem."
61100-278 = "V-verdade...?"
61100-279 = "Sim, é verdade.#nNada muda por causa de algo assim."
61100-281 = "――Porque o ódio de Arius não é algo que desaparece facilmente."
61100-282 = "……!!"
61100-283 = "Mas enfim... como foi a aula?"
61100-284 = "Eh? A aula... você diz? Bem..."
61100-285 = "E a senpai... como foi...?"
61100-286 = "Responder a uma pergunta com outra pergunta faz com que a conversa não flua.#n……Eu já te disse isso antes, não disse?"
61100-287 = "D-desculpe, senpai!"
61100-288 = "M-mas, sabe..."
61100-289 = "Como foi a primeira vez, eu não entendi muito bem... minha cabeça ficou girando..."
61100-290 = "Mas..."
61100-291 = "Foi uma sensação estranha."
61100-299 = "Ouvir sobre o mundo lá fora que eu desconhecia..."
61100-302 = "Percebi que nós... vivíamos em mundos completamente diferentes."
61100-308 = "Ah, não..."
61100-309 = "Na verdade, isso ainda não mudou."
61100-310 = "……É verdade."
61100-311 = "Mas, aos poucos, mais do que antes..."
61100-312 = "Acho que nós também estamos conseguindo seguir em frente.#nPelo menos, não passamos mais necessidade com comida."
61100-313 = "Sim! Isso é o que mais me deixa feliz!"
61100-314 = "M-mas... eu estava curiosa sobre uma coisa..."
61100-315 = "Comida, lanches... tudo isso custa dinheiro, né?"
61100-316 = "Como vocês conseguem..."
61100-317 = "……"
61100-319 = "Você realmente quer saber...?"
61100-320 = "Eh...? S-sim..."
61100-321 = "Se você souber... talvez não consiga mais olhar para as coisas com inocência... mesmo assim, quer ouvir?"
61100-322 = "E-era uma história tão assustadora assim!?"
61100-323 = "Fufu, é brincadeira, desculpe."
61100-324 = "Ah, senpai~"
61100-325 = "Saber o que você não sabia, ao mesmo tempo que expande seus horizontes――"
61100-326 = "Significa também que você começa a ver coisas que preferiria não ter visto."
61100-327 = "Exatamente... como o \"estudo\" que o Sensei mencionou."
61100-328 = "Senpai...?"
61100-329 = "Para mudar, você sempre precisa de dinheiro."
61100-330 = "Todo mundo deseja uma vida melhor.#nMas é triste... mesmo querendo satisfazer os desejos de todos, os recursos são limitados."
61100-336 = "É por isso que a competição nasce e as pessoas se odeiam..."
61100-342 = "E então... perdedores são criados inevitavelmente, e com o tempo, até sua existência é esquecida..."
61100-343 = "……Quase como nós."
61100-344 = "Você sabia? Em Kivotos, existe algo que só Arius pode fazer――"
61100-345 = "Um trabalho que é exclusivo de Arius."
61100-346 = "Um mercado monopolizado é maravilhoso. Afinal, a recompensa é o preço que nós definimos."
61100-347 = "Hã? Trabalho...? Mercado monopolizado...? Algo que só o Arius pode fazer...?"
61100-351 = "Se-senpai, isso é...!?"
61100-354 = "Voltou. Você cuidou do \"serviço\" como deveria, não foi?"

61100-358 = "Hm? O que é... isso?"
61100-359 = "Po-por favor, me ajude! Só poupe minha vida... eu farei qualquer coisa...!"
61100-360 = "Hum...? "
61100-361 = "..."
61100-362 = "O que significa isso? Eu disse claramente para \"dar um fim\" nele, não disse?"

61100-363 = "Pensei que você ficaria mais satisfeito assim. #nParece que ele mudou de ideia e, de agora em diante, fará tudo o que você ordenar."
61100-364 = "Claro, se você quiser que eu descarregue mais dois pentes de munição na cabeça dele, posso completar o serviço como pediu."
61100-365 = "I-iiihhh! Por favor... por favor, só isso não...!"
61100-366 = "...De fato, ele parece obediente. #nMas, que vantagem eu ganho ao não \"dar um fim\" nele?"

61100-367 = "Tudo o que ele tem estará à sua disposição."
61100-368 = "I-isso mesmo! Farei qualquer coisa e entregarei tudo o que tenho! #nPor isso, só poupe minha vida...!"
61100-369 = "Hum... Mas não há garantia de que ele não vá nos trair, certo?"
61100-370 = "Nesse caso, bastará dizer que \"chamaremos o Arius\"."

61100-371 = "Iiiiiiiihhhhhhh!!!"
61100-372 = "Entendo... #nE quanto a você? Mercenários não seguem o dinheiro? #nSeria um problema se você me traísse por causa de uma recompensa maior."
61100-373 = "Isso é coisa de quem vive de bicos. #nSe quiser sobreviver por muito tempo neste mundo... precisa manter sua palavra."
61100-374 = "...Desde o início, vivo fora das regras. #nUm mercenário precisa ser um \"recurso previsível\"."

61100-375 = "..."
61100-376 = "Muito bem. Vou acreditar na sua palavra. Fez um bom trabalho."
61100-377 = "Fufufu... Com isso, os interesses desta região são totalmente nossos..."
61100-378 = "(A existência do Arius é quase desconhecida pelo mundo. Aqueles que sabem, zombam chamando-o de \"lugar imundo\" —)"

61100-379 = "(Será que eles sabem que o \"mundo exterior\" é, na verdade, muito mais imundo?)"

61100-381 = "Po-por acaso..."
61100-382 = "Vo-você o eliminou...?"
61100-383 = "Não, ainda não."
61100-384 = "Sé-sério...? Que bom...!"
61100-385 = "Mas então... o que significa \"trabalho pelo preço que pedir\"..."

61100-386 = "Muitas vezes, as coisas funcionam melhor justamente por parar um passo antes do fim."
61100-387 = "Costumam dizer que \"as pessoas não mudam\"."

61100-388 = "Mas será mesmo? #nAs pessoas mudam, sim."
61100-389 = "Quando sentem a morte de perto... as pessoas mudam. #n...Para onde essa mudança as levará... nem eu sei dizer."
61100-390 = "...Nesse sentido, talvez nós também já tenhamos... mudado. #nNós somos aqueles que respiram no lugar mais próximo da morte —"
61100-392 = "— porque somos do Arius."
61100-394 = "Isso é apenas uma opinião pessoal, mas... dinheiro é dinheiro."
61100-395 = "Não existe distinção de nobreza nisso. #nSe há alguém que consegue distinguir, é porque essa pessoa ainda tem luxo de sobra."
61100-396 = "Usar suas habilidades ao máximo para ganhar dinheiro. #nNão é algo bom?"
61100-397 = "Ainda assim, mesmo eu, ao fazer esse tipo de trabalho, sinto minha alma se desgastar."
61100-398 = "Sim? O que eu faço nessas horas, você pergunta?"
61100-399 = "..."
61100-401 = "Penso em todos vocês."
61100-402 = "É porque vocês existem que eu também consigo viver."
61100-404 = "...Desculpe. Por não conseguir cuidar melhor de vocês."
61100-405 = "N-não! Que isso...! #nSomos nós que devemos ao senpai..."
61100-406 = "Quando vejo vocês comendo e rindo alegremente, sinto que também posso me esforçar."
61100-407 = "Que todos possam ser felizes igualmente... isso é um conto de fadas."
61100-408 = "Mais do que ninguém, nós somos quem melhor conhece essa verdade."
61100-409 = "Ainda assim, penso que talvez não haja problema em existir um lugar para essas crianças em algum lugar."
61100-410 = "Este é... o lugar para isso. #nEu quero criar um lugar onde todos possam pertencer."
61100-411 = "Crianças abandonadas. Crianças esquecidas. Crianças que não conseguem encontrar um lugar para ficar em nenhum outro lugar..."
61100-412 = "Essas crianças... deveriam vir para cá. #nBem, eu ficaria um pouco preocupada se todas viessem de uma vez, já que este lugar é pequeno."
61100-413 = "……É como um pequeno ninho de pássaro."
61100-414 = "Ainda assim, agora... eu quero proteger este ninho."
61100-415 = "Para que os pequenos filhotes que estão aqui, nem que seja um pouquinho."
61100-416 = "Eu quero tornar este um lugar onde eles possam pensar: 'que bom que estou vivo'."
61100-417 = "Senpai..."
61100-418 = "Você se lembra de quando a 'Madame' estava aqui?"
61100-419 = "……Ugh!"
61100-420 = "Ahaha! Sim, realmente... só de lembrar já me dá arrepios."
61100-421 = "……Havia coisas que a Madame não conseguia fazer."
61100-422 = "Coisas que ela nem tentava fazer."
61100-423 = "Se pelo menos eu pudesse realizar isso... #nEu acho que não seria algo ruim."
61100-424 = "Por enquanto... isso é o suficiente."
61100-425 = "……."
61100-426 = "……Senpai."
61100-427 = "Sim?"
61100-428 = "Toque a gaita, por favor!"
61100-429 = "D-de novo...? A esta hora!? #nMesmo tendo tocado há pouco tempo..."
61100-430 = "Eu quero ouvir de novo! Tenho certeza de que todos vão adorar!"
61100-431 = "Francamente... por que vocês são assim..."
61100-432 = "……Ehem, não tem jeito, não é? #nEntão..."
61100-433 = "Hehehe."
61100-451 = "Gaita... Subaru, é?"
61100-452 = "……."
61100-453 = "Ela também não muda nada."
61100-454 = "Hm...?"
61100-458 = "O que é isso...? Quem é você!"
61100-463 = "Ugh!?"
61100-467 = "(Essa sensação... é como ser jogado em uma névoa escura e sufocante...)"
61100-468 = "(E, acima de tudo...)"
61100-470 = "(Esse som é... uma trombeta?)"
61100-472 = "Próximo episódio: Estudo de Campo (1)"
