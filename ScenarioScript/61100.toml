[translation]
61100-1 = "第10話;傷と痕跡"
61100-2 = "今日のことも含めて、相談したいことがあるんだが……いいだろうか。"
61100-3 = "[s1]\"もちろん。何か飲みながら話す？\"\n[s2]\"ペットボトルのミルクティーか麦茶くらいしかないけど。\""
61100-6 = "……ああ。"
61100-8 = "（2人で並んで座って、ペットボトルの飲み物を飲んだ）"
61100-9 = "（サオリはどこか緊張しているようだった）"
61100-11 = "[ns]\"そういえば、今日の授業すごくよかったよ。\""
61100-12 = "そ、そうか……？"
61100-13 = "なんとか形になっていたならよかったが……。"
61100-14 = "え？いや……あんまり褒められても……困る。"
61100-15 = "目に狂いはなかった……って？"
61100-16 = "う、うむ……。"
61100-17 = "昔、教官をやっていたからな。その経験が活きたのかもしれない。"
61100-18 = "とはいえ私自身、もっと勉強が必要だ。"
61100-19 = "ああ……「教えること」から学ぶことも多いのだな。"
61100-20 = "教える過程で、自分の知識が整理されるから……か。"
61100-21 = "たしかに……そんな感じだった。"
61100-22 = "……それだけじゃないのか？"
61100-23 = "[s]\"私も、みんなから学ぶことが多いんだ。\""
61100-24 = "それは……どういう意味だ？"
61100-25 = "未熟な者を導くのが、先生の役割だろう？"
61100-26 = "[s]\"私も結局は、ただの未熟者だよ。\""
61100-30 = "[ns3]\"年を重ねるなかで、私が見落としてきたものを……。\"\n[ns4]\"まだ持ってるみんなから、学ばせてもらってるんだ。\""
61100-33 = "そう……か。"
61100-34 = "なら、それは今の私には分からないのだろうな。"
61100-35 = "でも、いつか分かるときが来る……そういうことか？"
61100-36 = "ふふ……今の先生は、なんと言うか……。"
61100-37 = "年寄り臭く感じるな。"
61100-38 = "[s]\"ぐふっ！ごほっ！げほっ……！\""
61100-39 = "ど、どうしたんだ、先生！？"
61100-40 = "え、心配ない……？そうは見えないが……。"
61100-41 = "すまない……まさかここまでダメージのある言葉だったとは……。"
61100-42 = "よく理解もせずに言葉を使うものでは無いな。"
61100-43 = "[s5]\"いや、間違ってないよ……。\"\n[s6]\"先生は……年寄り臭い生き物だからね……。\""
61100-46 = "ほ、本当にすまない！先生が良くても、私は……！"
61100-47 = "私、は……。"
61100-48 = "……。"
61100-50 = "（しばらくの間、無言の時間が流れた）"
61100-51 = "（飲み物を飲む音だけが、数回、静かに響いた）"
61100-52 = "先生。"
61100-53 = "私は……ずっと……。"
61100-54 = "……ずっと、謝りたいと思っていた。"
61100-55 = "あっ、いや、違う。これでは何を謝罪しているのかがよく分からないな……。"
61100-56 = "ふぅ……。"
61100-57 = "先生。#nこれから私は……とても失礼なお願いをすると思う。"
61100-58 = "でも、これしか方法が思いつかないんだ。"
61100-59 = "……ようやく、自分の犯したことと向き合う決心がついた。"
61100-60 = "ここに来て、やっと……。"
61100-61 = "私はまだ……先生に「謝罪」をできていないことに改めて気づいたんだ。"
61100-62 = "[s7]\"気にしなくていいのに。\"\n[s8]\"あの時も、その気持ちは分かってたから……。\""
61100-65 = "あの時……？"
61100-67 = "この場所に来ると、いろいろと思い出してしまうんだ。"
61100-68 = "いろいろなことがあったからな……。"
61100-69 = "……。"
61100-70 = "その、先生？"
61100-71 = "……。"
61100-72 = "私はやはり、先生にちゃんと謝ってな――"
61100-73 = "[log]あっ、そうだ！トリニティに編入した子たちの話だけどさ！[/log]"
61100-77 = "思えば……あの話題の変え方には無理があったな。"
61100-78 = "でも……。"
61100-79 = "申し訳ないが、今だけは……私のわがままに付き合ってくれると嬉しい。"
61100-80 = "これは、私が乗り越えなきゃいけない「過去」なんだと……そう思うんだ。"
61100-81 = "このアリウスの地でも、あの出来事と向き合わなかったら……。"
61100-82 = "アリウスのみんなに合わせる顔がない。#nこの先に進む勇気も……全部なくなってしまいそうで。"
61100-83 = "[s]\"……分かった。\""
61100-84 = "……ありがとう。"
61100-85 = "それじゃあ……。"
61100-89 = "先生の……お腹を、見せてもらえるだろうか？"
61100-90 = "[s9]\"……！？\"\n[s10]\"サオリ……！？\""
61100-93 = "ち、違うんだ！そういう反応は予想していたが……。"
61100-94 = "だから前置きをちゃんと……話した、つもりだった。#nすまない……。"
61100-95 = "……。"
61100-96 = "私の――罪を。"
61100-97 = "先生に刻んでしまった、[ruby=痕跡]消えない傷[/ruby]を……この目で確かめさせてほしいんだ。"
61100-98 = "[ns]\"……！\""
61100-100 = "（ようやく、サオリの意図を理解した）"
61100-101 = "（サオリの頼みに応えて、お腹の痕を見せた……）"
61100-103 = "あ……。"
61100-104 = "これが……。"
61100-105 = "……。"
61100-108 = "（サオリの指先が、傷跡をそっとなぞる）"
61100-109 = "（その手は……ひどく震えていた）"
61100-111 = "すま……ない……。"
61100-112 = "すまない……。"
61100-113 = "ごめん……。"
61100-114 = "ごめん、なさい……。"
61100-115 = "ごめんなさい。ごめんなさい……ごめんなさい。"
61100-116 = "本当に、私は……。私は……どうすれば……。"
61100-117 = "先生……。"
61100-118 = "……先生。"
61100-119 = "私なんか……。"
61100-120 = "私が、そんな……。"
61100-121 = "くっ……。"
61100-122 = "ひぐっ……っ……。"
61100-123 = "うぅ、うあああ、ああああああ……！"
61100-125 = "（崩れ落ちるようにうずくまるサオリの肩に――）"
61100-126 = "（そっと、手を置いた）"
61100-128 = "[ns]\"大丈夫だよ。\""
61100-129 = "せ、先生……？"
61100-130 = "[s11]\"大丈夫。もう治ってるよ。\"\n[s12]\"痛くも、なんともないんだ。\""
61100-133 = "だが、でも……！"
61100-134 = "傷跡は、残っているじゃないか……！"
61100-135 = "もう分かってるんだ。知っている！"
61100-136 = "どんな行為も結果を残す。過去は決して覆らない！"
61100-137 = "どんな形であれ痕跡を残して……未来までずっと影響を及ぼし続ける……！"
61100-138 = "いっそ……。"
61100-139 = "いっそのこと……。"
61100-140 = "[s13]\"何もしない方がよかった、とは言わないでほしい。\"\n[s14]\"私の生徒に、そんな悲しい言葉は言わせたくない。\""
61100-143 = "先生……？"
61100-144 = "[s15]\"サオリの言う通りだよ。\"\n[s16]\"残ってしまう傷も、たしかにあると思う。\""
61100-147 = "……！"
61100-148 = "[s17]\"でもね、痕が残っても……。\"\n[s18]\"それと共に生きていけるくらいには……強い生き物なんだよ。\""
61100-151 = "それと、一緒に……？"
61100-152 = "……。"
61100-153 = "それが、先生の……生き方ってことなのか……？"
61100-154 = "でも……。"
61100-155 = "私には、よく分からない……。"
61100-156 = "本当に、何も分からないんだ……。"
61100-157 = "自分の目でそれを確かめれば――"
61100-158 = "自分の犯した罪と向き合えば……少しは前に進めると思った……。"
61100-159 = "でも、それは……。"
61100-160 = "私の勝手な……思い違いだったのかもしれない……。"
61100-161 = "[s]\"ねえ、サオリ。\""
61100-162 = "……？"
61100-163 = "[s19]\"もしもサオリがあの時に戻れて――\"\n[s20]\"あの時の自分と向き合えるなら、どう声をかける？\""
61100-173 = "……。"
61100-174 = "……ふふっ。"
61100-175 = "不思議な話だ。"
61100-176 = "私も、似たようなことをよく考える。何度も……何度も。"
61100-177 = "……。"
61100-178 = "後悔しなかった日は、一日だってなかった。"
61100-179 = "未熟で、馬鹿な子どもが……取り返しのつかない罪を犯した。"
61100-180 = "自分の行動の結果、どれほど多くの「日常」を壊すことになるのかも……何も分かってなかった。"
61100-181 = "できることなら、あの頃の自分に本気で言ってやりたい。"
61100-182 = "いや、話しかける前に、一発ぶん殴ってやりたい。"
61100-183 = "「自分が何をしようとしているか、ちゃんと分かっているのか」と。"
61100-184 = "「そのままじゃ……取り返しがつかなくなるぞ」と。"
61100-185 = "……。"
61100-186 = "でも、そんなことはできない。"
61100-187 = "今、ここにいるのは……選択し、行動した後の私だけだ。"
61100-188 = "だからせめて、その事実を背負って生きていくしかない。"
61100-189 = "それだけのことだ。"
61100-190 = "……。"
61100-191 = "ああ、それだけのことだな。"
61100-192 = "[s]\"それでいいんだよ。\""
61100-193 = "先生……？"
61100-194 = "[ns]\"うん、それでいい。\""
61100-196 = "[ns]\"もし世界中が、サオリを罪人だと責めたとしても。\""
61100-197 = "やはり私は罪人なんだな……。"
61100-198 = "[s21]\"いや、そうじゃなくて……。\"\n[s22]\"今から言うことを、復唱してくれる？\""
61100-201 = "今後、同じ状況に置かれた時……より良い選択ができるようになって……。"
61100-202 = "行動する前に……立ち止まって考えるようにする……。"
61100-203 = "それを約束してほしい……。"
61100-204 = "そうしたら、先生は、いつだって……何度だって……。"
61100-205 = "う、うぅ……。"
61100-209 = "（サオリは、小さな子どものように泣き始めた）"
61100-210 = "（落ち着くまで、優しく背中を撫でてあげた……）"
61100-212 = "そういえば、アリウスの環境に……少し変化があったんだ。"
61100-213 = "[s]\"変化？\""
61100-214 = "ああ。"
61100-215 = "授業のお陰で、少し打ち解けられたみたいでな。"
61100-216 = "休み時間にいろんな話をする機会が増えて。"
61100-217 = "以前に比べて、生活が良くなったと言っていた。"
61100-218 = "少なくとも、食うに困ってはいないようだ。#n「ウォータータイム」も、今じゃ「ティータイム」になったらしい。"
61100-219 = "建物や設備は……見ての通りだけどな。"
61100-220 = "どうやら、外部から金銭や物資が入るようになったみたいで……。"
61100-221 = "その資金の出どころや流れまでは……まだ分からないが。"
61100-222 = "それでも、アリウスに何かしらの変化が起きているのは確かだ。"
61100-223 = "……考えてみれば、当然か。"
61100-224 = "変わらないものなど無いのだから。"
61100-225 = "[s]\"不安？\""
61100-226 = "分からない。だが……。"
61100-227 = "生活が良くなっているのは、良いことだ。#n少し、安心した。"
61100-228 = "……。"
61100-229 = "先生。"
61100-230 = "私たちも……変われるのだろうか。"
61100-231 = "[s23]\"きっと、大丈夫だよ。\"\n[s24]\"一歩一歩が小さかったとしても。\"\n[s25]\"遠くまで来た、っていつか振り返るときが来るよ。\""
61100-235 = "……そうか。"
61100-236 = "私は、先生に出会えてよかったと思っている。"
61100-237 = "先生がいてくれて……本当に幸運だった。"
61100-238 = "もし、先生がいなかったら私は……。"
61100-239 = "私たちはきっと……。"
61100-243 = "だから……先生。"
61100-244 = "これは、その……ダメだったら断ってくれて構わないのだが――"
61100-245 = "今夜……一緒に寝てもいいだろうか？"
61100-246 = "[s]\"！？\""
61100-247 = "ふふっ、冗談だ。そんなに驚かないでくれ。"
61100-248 = "[s]\"冗談を言わない人が言うと、破壊力は倍になるんだよ……。\""
61100-249 = "そうか。今後の参考にしよう。"
61100-250 = "[s]\"もしかして……今の、私が自爆したやつ？\""
61100-251 = "ふふっ、どうかな。"
61100-252 = "……それじゃ、あまり快適な場所とは言えないけど……。"
61100-253 = "そろそろ私は、戻るとしよう。"
61100-254 = "[s]\"おやすみ、サオリ。\""
61100-258 = "ドアを閉めてから、サオリは一人、壁にもたれかかった。"
61100-259 = "冗談……か。"
61100-260 = "半分、本当だったんだが。"
61100-261 = "……ふふっ。"
61100-262 = "ゆっくり休んでくれ、先生。"
61100-267 = "あ、あの……先輩？#nもう寝ちゃってますか……？"
61100-271 = "まだ起きています。#n……こんな時間にどうしました？"
61100-272 = "あっ、いえっ！#nその……大丈夫かな……って、思って……。"
61100-273 = "ああ、なるほど。#n今日、スクワッドと先生に負かされたから……一人でいじけているんじゃないかと心配してくれたんですね？"
61100-274 = "あ、ああああ、あのっ！ち、違います！そんなこと思ってないです！"
61100-275 = "大丈夫です。そう思われても仕方ないですから。"
61100-276 = "ち、違いますって！"
61100-277 = "あはは。ごめんなさい。つい、言ってみたくなっただけで。#nもちろん……私は大丈夫ですよ。"
61100-278 = "ほ、本当ですか……？"
61100-279 = "ええ、本当です。#nこんなことでは何も変わりません。"
61100-281 = "――アリウスの憎しみは、簡単に消え去るものではありませんから。"
61100-282 = "……！！"
61100-283 = "ところで……授業はどうでした？"
61100-284 = "え？授業……ですか？えっと……。"
61100-285 = "せ、先輩は……どうだったんですか……？"
61100-286 = "質問に質問で返すと、会話が成り立たなくなりますよ。#n……前にも言いましたよね？"
61100-287 = "す、すみません、先輩！"
61100-288 = "でっ、でも、なんというか……。"
61100-289 = "初めてのことで、よく分からなくて……頭の中がぐるぐるしてて……。"
61100-290 = "でも……。"
61100-291 = "不思議な気分でした。"
61100-299 = "私の知らない外の世界の話を聞いて……。"
61100-302 = "私たち……まったく別の世界にいたんだなって。"
61100-308 = "あ、いや……。"
61100-309 = "今も、変わっていないんですが。"
61100-310 = "……そうですね。"
61100-311 = "でも、前よりは少しずつ……。"
61100-312 = "私たちも前に進めているのではないでしょうか。#n少なくとも、食べ物には困らなくなりましたから。"
61100-313 = "はいっ！私も、そこが一番嬉しいです！"
61100-314 = "で、でも……ちょっと気になってたんですけど……。"
61100-315 = "ごはんとか、おやつとか……やっぱりお金がいりますよね？"
61100-316 = "それを、どうやって……。"
61100-317 = "……。"
61100-319 = "本当に知りたいのですか……？"
61100-320 = "えっ……？は、はい……。"
61100-321 = "知ってしまったら……もう無邪気な目では、物事を見られなくなるかもしれません……それでも、聞きたいですか？"
61100-322 = "そ、そんなに怖い話だったんですか！？"
61100-323 = "ふふっ、冗談ですよ、ごめんなさい。"
61100-324 = "もう先輩～"
61100-325 = "知らなかったことを知るというのは、視野が広がる代わりに――"
61100-326 = "見なくてもよかったものまで、見えてくるということでもあります。"
61100-327 = "そう……先生が言っていた、「勉強」のように。"
61100-328 = "先輩……？"
61100-329 = "変化には、どうしたってお金が必要です。"
61100-330 = "誰だって、より良い生活を望むもの。#nだけど、悲しいですね……全員の欲望を満たそうにも、財貨には限りがあります。"
61100-336 = "だから競争が生まれ、互いにいがみあう……。"
61100-342 = "そして……必ず敗者が生まれ、いずれは存在すら忘れ去られていく……。"
61100-343 = "……まるで、私たちのように。"
61100-344 = "知っていますか？キヴォトスには、アリウスにしかできない――"
61100-345 = "アリウスならではの仕事があるんですよ。"
61100-346 = "独占市場って素敵です。だって、報酬は言い値ですから。"
61100-347 = "え？仕事……？独占市場……？アリウスだけにできること……？"
61100-351 = "せ、先輩、それって！？"
61100-354 = "戻ったか。ちゃんと「処理」してきたんだろうな？"
61100-358 = "ん？これは……なんだ？"
61100-359 = "た、助けてください！命だけは……何でもしますから……！"
61100-360 = "うん……？"
61100-361 = "……。"
61100-362 = "これはどういうことだね。私は確かに「確実に処理しろ」と言ったはずだが？"
61100-363 = "このほうが喜んでもらえるかと思いまして。#nどうやら心を入れ替えて、今後はあなたの命令をなんでも聞くそうですよ？"
61100-364 = "もちろん、弾倉もう二つ分ほどの弾を頭に撃ち込めば、お望み通り依頼は完了しますが。"
61100-365 = "ひ、ひぃぃぃっ！どうか……どうかそれだけは……！"
61100-366 = "……たしかに、見たところは従順そうだ。#nだが、この者を「処理」しないことで、私にどんな得がある？"
61100-367 = "この者のすべてが、あなたの意のままに。"
61100-368 = "そ、その通りです！何でもしますし、何でも差しあげます！#nですから命だけは……！"
61100-369 = "ふむ……。だが、こいつが裏切らないとも限らないだろう？"
61100-370 = "その時は「アリウスを呼ぶ」とでも言えば充分でしょう。"
61100-371 = "ひぃぃぃぃっっっ！！"
61100-372 = "なるほど……。#nで、お前はどうなんだ？傭兵は金に従うものだろう？#n報酬につられて裏切られたら、たまったものじゃない。"
61100-373 = "それは日銭稼ぎの連中がやることです。#nこの世界で長く生き残りたいのなら……信用を守らないと。"
61100-374 = "……元より、規則の外にいる身です。#n「予測可能な資源」に徹する必要があるんですよ、傭兵というのは。"
61100-375 = "……。"
61100-376 = "よかろう。お前の言葉を信じよう。ご苦労だったな。"
61100-377 = "ふふふ……これでこの地区の利権は、完全に我々のものだな……。"
61100-378 = "（アリウスという存在は、世間にはほとんど知られていない。知っている者たちは、そこを「穢れた場所」だと嘲るが――）"
61100-379 = "（「外の世界」のほうが、よほど穢れているという事実を知っているのだろうか）"
61100-381 = "も、もしかして……。"
61100-382 = "け……消したんですか……？"
61100-383 = "いえ、まだです。"
61100-384 = "そっ、そうですか……よかった……！"
61100-385 = "でも、じゃあ……「言い値の仕事」って……。"
61100-386 = "あえて一歩手前で止めるからこそ、うまくいくことも多いんです。"
61100-387 = "よく言いますよね、「人は変わらない」って。"
61100-388 = "ですが、本当にそうでしょうか。#n変わるものですよ、人は。"
61100-389 = "死を実感すると……人は変わります。#n……その変化がどこへ向かうかは……私にも分かりませんが。"
61100-390 = "……そういう意味では、私たちももう……変わっているのかもしれません。#n私たちは、死に最も近い場所で息づく者――"
61100-392 = "――アリウスですから。"
61100-394 = "これは、あくまで私個人の考えですが……お金はお金です。"
61100-395 = "そこに、貴賤の区別はありません。#nもしそれを区別できる人がいるのなら……その人には、まだ余裕があるということなのでしょう。"
61100-396 = "自分の技能を最大限に生かして、お金を稼ぐ。#n結構なことじゃないですか。"
