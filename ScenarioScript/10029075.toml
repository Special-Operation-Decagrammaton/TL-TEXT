[translation]
10029075-1 = "第7話;最強の精神系能力者"
10029075-6 = "なっ、何が起こってるの？#nいったい何なのよ！？"
10029075-7 = "コイツ等、どこから……ん？#nよく分からないけど、仲間同士ってわけじゃないのよね……？"
10029075-8 = "な、なんだここは！"
10029075-9 = "いいから、早く制圧しろ！！"
10029075-10 = "抵抗する奴らは1人残らず捕えるんだ！#n何が起きたのかは、その後で調べれば良い！"
10029075-12 = "ここは……ミレニアムの廃墟か！？#nあれ、さっきまで……"
10029075-13 = "……！お、お前たちは！！"
10029075-14 = "……？#nカイザーPMCじゃないか。"
10029075-15 = "よく分からないが、マーケットガードがいるということは……#n何か怪しい気配がするな。"
10029075-16 = "総員、戦闘準備！"
10029075-18 = "わ、私たちを無視するなんて……！おい、ボサッとするな！！#n1人残らずぶっ倒せ！！"
10029075-24 = "ま、まさか……"
10029075-25 = "また別の世界から人が！？#nこれが[ruby=あけぼし]明星[/ruby]さんの言ってた、時空の歪みなんですね！？"
10029075-26 = "[s1] \"たしかに、そう見えても仕方がないけど……\"\n[s2] \"みんな、こっちの世界の人というか、顔見知りというか。\""
10029075-29 = "……えっ。この人たち、全員ですか？"
10029075-33 = "……ほ、本当に！？"
10029075-37 = "……随分と個性豊かな人たちねぇ。"
10029075-38 = "それで、どうするのかしら、[ruby=みさか]御坂[/ruby]さん？#nこのままじゃ、施設の修理どころか、跡形も残らないんじゃない？"
10029075-39 = "帰れなくなるのはアンタも一緒でしょうがよ！？"
10029075-40 = "先生、知り合いなんでしょう！？#n早く事情を説明して……"
10029075-41 = "……え？"
10029075-42 = "顔見知りって……前に戦った相手って意味……？"
10029075-43 = "……アレが全員、敵ってこと！？"
10029075-44 = "ああっもう！よりにもよって、どうしてこうなるのよ……！"
10029075-50 = "……？#n先生、どうしたんだい？"
10029075-51 = "この状況で、「施設」の修理を……？#n無論、やってはみるが……"
10029075-52 = "少し時間がかかるかも。#nそれに、また起動中に衝撃が加わったら、今度こそどうなるか分からないよ。"
10029075-53 = "おそらく、すでに想定外の事態でしょうからね！#n修理が終わったら、次は私たちが巻き込まれる可能性も……"
10029075-55 = "それは大丈夫だよ、このチップがあれば。"
10029075-56 = "「施設」のアルゴリズムを改変するために必要だって、部長から渡された。"
10029075-57 = "だけど、問題は……"
10029075-58 = "[s3] \"この混乱を抑えないとね。\"\n[s4] \"私たちは「施設」を守ろう。\""
10029075-64 = "……はぁ。"
10029075-65 = "不本意だけど、結局こうするしかないのねぇ。"
10029075-66 = "あまり印象力を残したくはなかったのだけど……"
10029075-67 = "…………。"
10029075-68 = "……どれくらいで修理は終わるのかしらぁ？#n3分……いや、5分あれば何とかなる？"
10029075-69 = "[s7] \"…[ruby=しょくほう]…食蜂？[/ruby]\"\n[s8] \"どれくらいって……？\""
10029075-72 = "何分稼げばいいのか聞いてるの。"
10029075-73 = "……食蜂！！！"
10029075-74 = "別に、あなたのためじゃないけどぉ？#nこっちは好きで能力を使うわけじゃないし……"
10029075-75 = "でも、[ruby=みさか]御坂[/ruby]さんの言う通り、帰れなくなったら困るもの。"
10029075-76 = "だから、[ruby=・   ・ ]少し[/ruby]くらいなら力を見せても。"
10029075-77 = "構わないんじゃないかと思ってねぇ。"
10029075-87 = "……？？#nな、何を……？"
10029075-88 = "みんな、急に固まって……"
10029075-89 = "時間を……い、いえ、これは！#n相手の動きだけを止めて！？"
10029075-90 = "……そっか、分かった。"
10029075-91 = "[ruby=みこと]美琴[/ruby]が言ってた超能力って、これだったんだ。"
10029075-96 = "……あのぅ。"
10029075-97 = "お話は後にして、早く修理を進めてくれないかしらぁ……？"
10029075-98 = "思っていた以上に、集中力を維持するのが大変なのよねぇ。#nなんか、頭も痛いしぃ。"
10029075-99 = "……どこかの誰かさんとは、繊細力が違うのよ。"
10029075-101 = "……何よ、それって私のこと？"
10029075-102 = "[ruby=みさき]操祈[/ruby]の言う通り、急がないと。"
10029075-103 = "動いてる機械は、私たちで対応しよう。"
10029075-104 = "数は半分以上減ったし……美琴、準備はいい？"
10029075-105 = "もちろんよ！#n修理は任せるわね？"
10029075-107 = "ふふっ、期待されてるみたいだ。"
10029075-108 = "うん、マイスターとして応えないと。"
10029075-109 = "必ずやり遂げてみせます！#n5分と言わず、3分で！"
10029075-111 = "皆さん……！#nよーっし、もうひと踏ん張りといきますか！"
10029075-112 = "[s9] \"みんな、いくよ！\"\n[s10] \"最後まで頑張ろう！\""
10029075-116 = "……お――！！"
