[translation]
10029075-1 = "Episódio 7; A usuária de habilidades mentais mais forte"
10029075-6 = "O-o que está acontecendo?#nO que diabos é isso!?"
10029075-7 = "De onde eles vieram...? Hm?#nNão sei bem, mas não parece que são aliados, né...?"
10029075-8 = "Q-que lugar é este!"
10029075-9 = "Esquece isso, dominem o local agora mesmo!!"
10029075-10 = "Capturem todos que resistirem!#nPodemos investigar o que aconteceu depois!"
10029075-12 = "Isto é... as ruínas do Millennium!?#nUé, até agora há pouco..."
10029075-13 = "......! V-vocês!!"
10029075-14 = "......?#nNão são o Kaiser PMC?"
10029075-15 = "Não entendo bem, mas se os Market Guards estão aqui...#nSinto uma presença suspeita."
10029075-16 = "Todos, preparem-se para o combate!"
10029075-18 = "I-ignorar a gente assim...! Ei, não fiquem parados!!#nDerrotem todos eles!!"
10029075-24 = "N-não pode ser..."
10029075-25 = "Pessoas de outro mundo de novo!?#nEntão é isso que a Akeboshi-san quis dizer com distorção espaço-temporal!?"
10029075-26 = "[s1] \"É verdade, não dá para culpar você por pensar assim...\"\n[s2] \"Pessoal, eles são deste mundo, ou melhor, são conhecidos nossos.\""
10029075-29 = "......Eh. Essas pessoas, todas elas?"
10029075-33 = "......S-sério mesmo!?"
10029075-37 = "......Que grupo cheio de personalidades, hein."
10029075-38 = "E então, o que vamos fazer, Misaka-san?#nDesse jeito, não só não vamos consertar a instalação, como não vai sobrar nem vestígio dela, não é?"
10029075-39 = "Você também não vai conseguir voltar para casa se isso acontecer, sabia!?"
10029075-40 = "Sensei, você os conhece, não conhece!?#nExplique a situação logo..."
10029075-41 = "......Eh?"
10029075-42 = "Conhecidos... quer dizer que são pessoas contra quem lutamos antes...?"
10029075-43 = "......Isso significa que todos eles são inimigos!?"
10029075-44 = "Ah, droga! Por que tinha que acontecer logo agora...!"
10029075-50 = "......?#nSensei, o que houve?"
10029075-51 = "Nesta situação, você quer consertar a \"instalação\"...?#nClaro, eu vou tentar, mas..."
10029075-52 = "Pode levar um tempo.#nAlém disso, se sofrer algum impacto durante a inicialização, não sei o que pode acontecer desta vez."
10029075-53 = "Provavelmente, já estamos diante de uma situação inesperada!#nSe terminarmos o conserto, existe a chance de sermos envolvidos também..."
10029075-55 = "Isso não será um problema, com este chip."
10029075-56 = "A diretora me entregou, dizendo que é necessário para alterar o algoritmo da \"instalação\"."
10029075-57 = "Mas o problema é..."
10029075-58 = "[s3] \"Precisamos conter essa confusão.\"\n[s4] \"Vamos proteger a \"instalação\"!\""
10029075-64 = "......Haa."
10029075-65 = "É contra a minha vontade, mas no fim, não temos outra escolha."
10029075-66 = "Eu não queria deixar uma impressão tão forte, mas..."
10029075-67 = "............"
10029075-68 = "......Quanto tempo vai levar para consertar?#nTrês minutos... não, cinco minutos são suficientes?"
10029075-69 = "[s7] \"…Shokuhou?\"\n[s8] \"Quanto tempo, você diz...?\""
10029075-72 = "Estou perguntando quantos minutos preciso ganhar."
10029075-73 = "......Shokuhou!!!"
10029075-74 = "Não é como se eu estivesse fazendo isso por você, sabe?#nEu não gosto de usar minhas habilidades assim..."
10029075-75 = "Mas, como a Misaka-san disse, seria um problema se não conseguíssemos voltar."
10029075-76 = "Por isso, mostrar um pouco do meu poder..."
10029075-77 = "Acho que não tem problema, não é?"
10029075-87 = "......??#nO-o que você está..."
10029075-88 = "Todo mundo, de repente, parou..."
10029075-89 = "O tempo... não, isso é!#nVocê parou apenas os movimentos dos oponentes!?"
10029075-90 = "......Entendi, saquei."
10029075-91 = "Então era disso que a Mikoto estava falando sobre superpoderes."
10029075-96 = "……Com licença."
10029075-97 = "Poderiam deixar a conversa para depois e continuar com o conserto logo…?"
10029075-98 = "É muito mais difícil manter a concentração do que eu pensava. #nSinto até uma dor de cabeça."
10029075-99 = "……A minha delicadeza é diferente da de certa pessoa por aí."
10029075-101 = "……O que foi, está falando de mim?"
10029075-102 = "Como a Misaki disse, precisamos nos apressar."
10029075-103 = "Vamos lidar com as máquinas que ainda estão funcionando."
10029075-104 = "Já reduzimos mais da metade… Mikoto, está pronta?"
10029075-105 = "Claro! #nVou deixar o conserto com você, certo?"
10029075-107 = "Hehe, parece que estão contando comigo."
10029075-108 = "Sim, como um mestre, preciso retribuir essa confiança."
10029075-109 = "Vou terminar isso com certeza! #nNão só em 5 minutos, mas em 3!"
10029075-111 = "Pessoal…! #nMuito bem, vamos dar o último gás!"
10029075-112 = "[s9] \"Pessoal, vamos lá!\"\n[s10] \"Vamos nos esforçar até o fim!\""
10029075-116 = "……Ooooh——!!"
