[translation]
1001515-1 = "O adesivo de nota dez da Alice"
1001515-2 = "（Fui até a sala do Clube de Desenvolvimento de Jogos para encontrar a Alice）"
1001515-3 = "（Assim que cheguei...）"
1001515-8 = "Sensei——!!!"
1001515-9 = "[s] \"Alice~~~!!!\""
1001515-10 = "É o Sensei de verdade!"
1001515-15 = "（Alice pulou em cima de mim com toda a energia!）"
1001515-16 = "（O Sensei quase caiu!）"
1001515-19 = "Eu estava te esperando!"
1001515-20 = "[s] \"Eu também queria te ver. Então, o que é isso que você quer me mostrar...?\""
1001515-21 = "Hehe, é o seguinte..."
1001515-22 = "Aqui está!"
1001515-24 = "（Alice estendeu algo que parecia um distintivo!）"
1001515-26 = "[ns1] \"...Um distintivo?\"\n[ns2] \"Está escrito 'Good job'...\""
1001515-29 = "Não é um distintivo, é um \"adesivo de nota dez\"!"
1001515-30 = "Por onde devo começar a explicar..."
1001515-31 = "Antigamente, nós criamos um jogo roguelike juntas."
1001515-32 = "Dentro dele, havia um item raríssimo que aumentava muito a sorte."
1001515-33 = "É este o \"Adesivo de nota dez do Sensei\"!"
1001515-34 = "Só de tê-lo, você fica mais forte e o status de sorte também aumenta..."
1001515-35 = "É um item incrível!"
1001515-36 = "[s3] \"Entendi...\"\n[s4] \"Então você fez um de verdade, é isso?\""
1001515-39 = "Exatamente!"
1001515-40 = "Sendo assim, Sensei, vamos sair em uma aventura com a Alice!"
1001515-41 = "Precisamos distribuir muitos desses adesivos!"
1001515-43 = "（Puxado pela mão pela animada Alice, fomos para fora）"
1001515-45 = "Olá!"
1001515-46 = "Ah, Alice. E Sensei também, olá."
1001515-47 = "O que houve hoje?"
1001515-48 = "É um \"adesivo de muito bem\"!"
1001515-49 = "\"Good job\"... Humm, que legal, fico feliz."
1001515-50 = "Em resumo, você está me elogiando?"
1001515-51 = "Sensei, obrigado também."
1001515-52 = "[s] \"Sim, não tem um motivo específico, mas...\""
1001515-53 = "Fufu. Mesmo assim, obrigada."
1001515-54 = "Vou guardar com carinho, Alice."
1001515-55 = "Sim, com certeza coisas boas vão acontecer! Porque no jogo ele aumenta a sorte!"
1001515-56 = "Entendo... bem, às vezes a gente precisa contar com a sorte mesmo."
1001515-57 = "O desenvolvimento de novos materiais, por exemplo, depende muito da sorte."
1001515-58 = "Colocar o material no almofariz, moer cuidadosamente um por um, queimar..."
1001515-59 = "Depois triturar, misturar, girar, sacudir..."
1001515-60 = "Não importa o quanto eu pense ou quantas vezes eu repita... no final, só resta rezar."
1001515-61 = "Sendo assim... conto com você desta vez, ó \"Adesivo de muito bem\"!!!"
1001515-62 = "[s] \"V-você passa por muita coisa, hein...\""
1001515-63 = "A Alice não sabe os detalhes, mas..."
1001515-64 = "Vai dar tudo certo!"
1001515-65 = "Vamos, vamos continuar!"
1001515-69 = "Pessoal, venham aqui! Agora mesmo, um novo valor apareceu!"
1001515-70 = "Mentira!?"
1001515-71 = "Eu estou falando a verdade!"
1001515-76 = "Não pode ser..."
1001515-77 = "...Será que é o efeito daquele adesivo?"
1001515-80 = "Bem, a Alice já vai indo!#nEspero que dê tudo certo!"
1001515-81 = "Obrigada, Alice.#nLidar com servidores me faz ter que rezar bastante..."
1001515-85 = "Ué...?"
1001515-86 = "O erro do servidor foi corrigido...!?"
1001515-89 = "Oh, é esse o tal \"Adesivo de Muito Bem\"?"
1001515-90 = "É um presente da Alice e do Sensei!#nFicaria muito feliz se você cuidasse bem dele!"
1001515-91 = "Com certeza, obrigado."
1001515-96 = "Ah... ganhei o sorteio do refeitório! Terceiro lugar!"
1001515-97 = "..."
1001515-98 = "Isso aí, hoje vou pedir frango frito extra!"
1001515-101 = "Ao usar isto, os raios infravermelhos distantes e os íons negativos melhoram a circulação sanguínea!"
1001515-102 = "Tem até o efeito de reduzir a sujeira da arma e evitar que as balas emperrem!"
1001515-103 = "O nome dele é: Pulseira de Germânio Geru-Geru!!!"
1001515-107 = "..."
1001515-108 = "Ah, não estou vendendo nada..."
1001515-109 = "Olá! Você está com algum problema?"
1001515-111 = "Hã?"
1001515-112 = "Na verdade, não... ou talvez sim."
1001515-113 = "Então, tome isto!"
1001515-114 = "É um \"Adesivo de Muito Bem\"! Ele aumenta o status de sorte!"
1001515-115 = "Ei, isso é venda forçada!?"
1001515-116 = "Não, é um presente!"
1001515-117 = "Porque eu quero que todos sejam felizes!"
1001515-121 = "Ma-mas o que é isso...?"
1001515-125 = "...Hm?"
1001515-126 = "...O-o cartucho que estava emperrado há tanto tempo, foi ejetado sozinho!?"
1001515-130 = "Que estranho.#nA Pulseira de Germânio Geru-Geru não deveria ter efeito nenhum..."
1001515-135 = "(Depois de terminar de distribuir os Adesivos de Muito Bem com a Alice...)"
1001515-136 = "(Voltamos para a sala do clube para jogar videogame juntos)"
1001515-143 = "Obrigada, Sensei."
1001515-144 = "[s] \"Hm?\""
1001515-145 = "Por ter ficado com a Alice hoje."
1001515-146 = "E também por estarmos jogando juntos agora!"
1001515-147 = "Nós costumamos jogar juntas no Clube de Desenvolvimento de Jogos, mas..."
1001515-148 = "É raro ter um tempo para jogar só com o Sensei."
1001515-149 = "Para a Alice, essa é uma chance importante de ganhar pontos de experiência!"
1001515-150 = "[s] \"Entendi...?\""
1001515-151 = "Por isso, a Alice está muito feliz por poder passar esse tempo com o Sensei!"
1001515-152 = "O quanto estou feliz? Bem..."
1001515-153 = "Se formarmos uma dupla e equiparmos este \"Adesivo de Nota Dez\"..."
1001515-154 = "Sinto que conseguiria jogar videogame por três dias seguidos sem dormir!"
1001515-155 = "[s5] \"I-isso não parece muito bom...\"\n[s6] \"Três dias sem dormir já é demais para mim...\""
1001515-158 = "A-ah, entendo..."
1001515-159 = "Mas o efeito deste \"Adesivo de Nota Dez\" é realmente incrível!#nA Alice sentiu isso!"
1001515-160 = "Quando eu estava com apenas 1 ponto de vida em um jogo de luta,#ne fiz um bloqueio perfeito no golpe especial do oponente—"
1001515-161 = "Consegui virar o jogo a partir do estado de fúria e acertei um super golpe decisivo!"
1001515-162 = "[s] \"Isso é incrível!?\""
1001515-163 = "Sim!#nFoi só uma vez, na partida contra a Momoi!"
1001515-164 = "A sala do clube naquele dia estava..."
1001515-165 = "Foi, foi simplesmente...!"
1001515-166 = "Uma agitação prestes a explodir!"
1001515-167 = "[s]\"Eu também queria ter visto...\""
1001515-168 = "……Ah."
1001515-169 = "Pensando bem, esqueci de entregar o adesivo ao Sensei!"
1001515-170 = "[s] \"Ah, falando nisso?\""
1001515-176 = "[ns7] \"Mas tudo bem eu receber?\"\n[ns8] \"Isso não é o 'Adesivo de Muito Bem do Sensei'... ?\""
1001515-179 = "Pode até ser, mas..."
1001515-180 = "……Está tudo bem!"
1001515-181 = "Na verdade, Alice preparou um \"Adesivo de Muito Bem da Alice\" exclusivo para o Sensei! Apenas dois!"
1001515-182 = "[s] \"'Adesivo de Muito Bem da Alice'?\""
1001515-190 = "Sim!#nIsto é..."
1001515-191 = "É um \"Adesivo de Muito Bem\" para a Alice elogiar o Sensei!"
1001515-192 = "Talvez não seja tão versátil quanto o adesivo do Sensei, e talvez não aumente a sorte..."
1001515-193 = "Mesmo assim, ficaria feliz se você aceitasse!"
1001515-194 = "Com isso, sinto que estamos sempre conectados."
1001515-200 = "[ns] \"Obrigado, Alice.\""
1001515-201 = "Sim, Sensei."
1001515-202 = "A Alice realmente adora o Sensei."
1001515-203 = "[s] \"Eu também te adoro.\""
1001515-204 = "Muito obrigada!"
1001515-205 = "E aproveitando a brecha! Dois Leques de Mariposa seguidos, e então um chute forte vindo de um pulo seguido de um soco forte para atordoar...!"
1001515-206 = "E agora, o Especial, nível 3!!!"
1001515-210 = "[ns9] \"Ai, ai, fui derrotada!!!\"\n[ns10] \"Enquanto eu me emocionava, veio um ultra combo!?\""
1001515-213 = "Hehehe, o caminho do guerreiro onde não há sangue, lágrimas ou laços entre mestre e aprendiz..."
1001515-214 = "――Este é o mundo dos jogos de luta!"
1001515-216 = "(Depois disso, os dois continuaram jogando alegremente)"
1001515-217 = "(Nos intervalos das partidas, Alice olhava para o \"Adesivo de Muito Bem da Alice\" como se fosse um tesouro)"
