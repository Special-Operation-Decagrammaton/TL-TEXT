[translation]
2001702-1 = "A garota ainda quer continuar lendo"
2001702-2 = "（Perguntei a localização atual da Hiyori e fui até lá o mais rápido possível）"
2001702-4 = "Algum lugar na zona sem lei"
2001702-5 = "（Hiyori está pendurada em um poste de luz por algum motivo）"
2001702-6 = "[s] \"Hiyori?\""
2001702-7 = "U-uau...!?"
2001702-10 = "Ai, ai, ai..."
2001702-11 = "Po-por que o Sensei está aqui!?"
2001702-12 = "A-ah, é verdade... Você me perguntou onde eu estava, não foi."
2001702-13 = "Eu realmente te disse o local, mas... e-esta é uma zona sem lei que nem o Conselho Estudantil Geral provavelmente conhece, como você conseguiu me encontrar...?"
2001702-14 = "[s] \"Eu me perdi um pouco, mas consegui chegar.\""
2001702-15 = "E-entendo... Adultos são incríveis..."
2001702-16 = "[s] \"O que a Hiyori estava fazendo?\""
2001702-17 = "Eu estava subindo no poste de luz..."
2001702-18 = "É que... eu estava tentando carregar meu celular... ehehe."
2001702-19 = "[s] \"Carregar...?\""
2001702-20 = "Sim... Como não tenho casa nem escola, vivo vagando por aí..."
2001702-21 = "A casa abandonada onde estamos ficando não tem água nem eletricidade..."
2001702-22 = "Não tenho escolha a não ser carregar meu celular escondida em algum lugar... mas, surpreendentemente, isso é muito difícil..."
2001702-23 = "Se eu tento carregar em uma lanchonete 24 horas, eles descobrem e me dão uma bronca, e se eu tento carregar vários de uma vez usando baterias portáteis, eles descobrem e me expulsam..."
2001702-24 = "Não é como se fosse algo que merecesse um tiro... as pessoas da cidade são tão insensíveis, ehehe..."
2001702-25 = "[s] \"...\""
2001702-26 = "E então, li em uma revista ontem que \"existem tomadas dentro das caixas de energia dos postes!\", então eu estava verificando se era verdade..."
2001702-27 = "[s1] \"Isso causa problemas para muitas pessoas, então é melhor não fazer isso.\"\n[s2] \"E acima de tudo, é perigoso...\""
2001702-28 = "Ehehe... mas, de qualquer forma, a eletricidade desta região já é roubada da grande cidade vizinha... então, se eu pegar um pouquinho emprestado..."
2001702-29 = "Ehehe... mas, de qualquer forma, a eletricidade desta região já é roubada da grande cidade vizinha... então, se eu pegar um pouquinho emprestado..."
2001702-30 = "[s] \"Mesmo assim, não pode.\""
2001702-31 = "Eh, po-por que não?"
2001702-32 = "Não é só pegar um pouco do que já está sendo roubado? Não faz diferença somar preto com preto!"
2001702-33 = "Já que nasci para sofrer, nem carregar meu celular você vai me permitir?"
2001702-34 = "É muito doloroso... Será que existe algum sentido na minha vida se eu não puder ler livremente nem uma novel online...?"
2001702-35 = "Olha, veja o celular que não liga mais. Está escuro como breu... parece a minha vida..."
2001702-36 = "Sensei, você já passou pela experiência de a bateria acabar bem no meio da leitura de uma novel...?"
2001702-37 = "Eu já passei por isso várias vezes. Ontem e hoje também..."
2001702-38 = "Até quando vou enviar MomoTalk para o Sensei, eu fico andando por aí procurando Wi-Fi gratuito!"
2001702-39 = "[s] \"E-eu não sabia...\""
2001702-40 = "Minha vida... por que tem que ser assim? Já acabou... buaaaaaa!"
2001702-41 = "Eu também quero ler novels online! Quero aumentar o brilho ao máximo para ler melhor!"
2001702-42 = "[s] （Hmm, nesse caso...）"
2001702-44 = "Três baterias portáteis descartáveis. Obrigado pela compra."
2001702-46 = "..."
2001702-47 = "[s] \"Se quiser, use em emergências.\""
2001702-48 = "Bem... i-isso..."
2001702-49 = "Posso mesmo aceitar...? Bem... a líder disse para não depender da ajuda dos outros..."
2001702-50 = "Mesmo que você diga que está tudo bem... dizem que toda bondade humana tem um lado oculto..."
2001702-51 = "Quem é você, Sensei...?"
2001702-52 = "[s] \"Então, em troca, que tal você prometer não subir mais em postes de luz?\""
2001702-53 = "Entendido..."
2001702-54 = "Vou guardar isso na memória..."
