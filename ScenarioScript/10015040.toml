[translation]
10015040-1 = "Episódio 4; Equipe de torcida do Millennium?"
10015040-3 = "[ns] \"Estou cansado...\""
10015040-4 = "Fufu, bom trabalho."
10015040-5 = "Mas você se adaptou e deu conta muito rápido."
10015040-6 = "A Sumire também disse... Se o Sensei fosse um aluno do Millennium, eu adoraria que participasse como atleta."
10015040-7 = "[s1] \"Você está me elogiando demais...\"\n[s2] \"Para mim, só observar de longe já basta.\""
10015040-10 = "Fufu, dizem que é mais divertido mover o corpo de verdade do que apenas assistir às partidas, não é?"
10015040-11 = "Por isso, nós do Seminário estamos organizando a lista de nomes para que o maior número possível de alunos possa participar de forma igualitária, mas..."
10015040-12 = "Muitos alunos não querem participar das competições, então o ajuste das inscrições está sendo difícil."
10015040-13 = "[s] \"Os alunos do Millennium não gostam de se exercitar?\""
10015040-14 = "Existem exceções, como o Clube de Treinamento, mas a maioria é assim mesmo."
10015040-15 = "Devido à cultura escolar do Millennium, que incentiva a reflexão e a pesquisa, muitos alunos têm pouca resistência física e preferem não interagir com os outros."
10015040-16 = "Até mesmo no Clube de Beisebol do Millennium, que é relativamente conhecido, eles se interessam mais pela parábola que a bola desenha no ar do que pela pontuação."
10015040-17 = "Por isso, eu esperava que, através desta oportunidade, todos os alunos do Millennium percebessem o charme dos esportes e obtivessem novas inspirações ao competir de forma saudável..."
10015040-18 = "Talvez... para os alunos que não gostam de se exercitar, este Grande Festival Esportivo seja apenas um evento incômodo."
10015040-19 = "[s] \"Seria bom se os sentimentos da Noa chegassem a todos.\""
10015040-23 = "Fufu... Só de ouvir isso, já fico muito feliz."
10015040-30 = "Ah, finalmente voltamos. Esta é a sala de prática industrial onde o Clube de Engenharia está."
10015040-31 = "[s3] \"...Não está um pouco cedo?\"\n[s4] \"Só se passaram 3 horas desde que pedimos...\""
10015040-34 = "Não se preocupe. Até hoje, o pessoal do Clube de Engenharia, mesmo que adicionem funções estranhas, nunca perdeu um prazo."
10015040-35 = "Eles disseram que conseguiriam terminar em 3 horas, então deve estar tudo bem."
10015040-36 = "Com certeza, desta vez também, eles terão terminado um robô de torcida maravilhoso."
10015040-37 = "[s] \"Sinto que isso vai dar ruim...\""
10015040-38 = "Então, com licença."
10015040-46 = "Ué...?"
10015040-48 = "[ns] \".........?\""
10015040-49 = "Pessoal... estão prontas?"
10015040-50 = "Sim, capitã!"
10015040-51 = "Sim..."
10015040-53 = "Rah!"
10015040-54 = "Rah!"
10015040-55 = "Força!"
10015040-56 = "F-força..."
10015040-57 = "Hibiki, sua voz está muito baixa!"
10015040-58 = "F-FORÇA!"
10015040-60 = "Vai! Vai! Ganha! Ganha! — Millennium!"
10015040-61 = "Uau!"
10015040-62 = "Uau..."
10015040-69 = "Que torcida maravilhosa. A energia e a paixão são contagiantes."
10015040-70 = "O Sensei não acha o mesmo?"
10015040-71 = "[s5] \"Com certeza foi uma torcida incrível, mas...\"\n[s6] \"...Por que estão vestidas de líderes de torcida?\""
10015040-74 = "É para torcer pelos atletas no Grande Festival Esportivo de amanhã."
10015040-75 = "É um fato cientificamente comprovado que a torcida melhora a capacidade física dos atletas!"
10015040-76 = "Sons altos e repetitivos afetam o córtex cerebral e estimulam a secreção de adrenalina!"
10015040-77 = "Além disso, ver cores primárias como as dessas roupas de torcida pode maximizar a excitação dos atletas!"
10015040-78 = "Ah, aliás, essas roupas de torcida que estamos usando foram feitas pela Hibiki."
10015040-80 = "Eu queria que as três usassem uniformes escolares japoneses... mas não tive tempo e só consegui fazer o da Utaha-senpai."
10015040-81 = "As roupas que a Kotori e eu estamos usando são de líderes de torcida que fiz antigamente, mas como fiz quando comecei a fazer cosplay... o tecido é fino, a costura e o acabamento estão malfeitos..."
10015040-82 = "Sair em público com roupas de qualidade tão baixa... morro de vergonha, queria fugir..."
10015040-84 = "Não diga isso, Hibiki. A qualidade é muito superior à das roupas vendidas em lojas, não é?"
10015040-85 = "Sim. Eu também gosto muito desse gakuran. Se pudesse, eu o usaria no lugar do uniforme."
10015040-86 = "[s] \"Eu também acho que é um visual incrível, mas...\""
10015040-88 = "Bem... desculpem interromper a empolgação de vocês, mas..."
10015040-94 = "O que aconteceu com o robô de torcida que pedi anteriormente?"
10015040-100 = "Bem... é que..."
10015040-101 = "A fabricação estava perfeita, mas... aconteceu um acidente..."
10015040-102 = "Ah... resumindo..."
10015040-103 = "Nós falhamos...!"
10015040-104 = "[s] \"O Clube de Engenharia falhou em construir o robô...?\""
10015040-106 = "Não houve problemas até o momento de testar as funções do robô, mas..."
10015040-107 = "No momento em que liguei o módulo de comunicação de curto alcance para atualizar o programa de segurança, ele perdeu o controle de repente e começou a enlouquecer."
10015040-108 = "Ugh... tentamos pará-lo de qualquer jeito, mas ele não obedeceu ao comando de parada de emergência... e depois de causar um alvoroço, fugiu em disparada..."
10015040-109 = "Como resultado, não sobrou nada aqui."
10015040-110 = "...Sinto muito por não ter cumprido a promessa."
10015040-111 = "Mas, como prometemos em nome da honra do Clube de Engenharia, cumpriremos o pedido até o fim."
10015040-112 = "Então... durante o Grande Festival Esportivo, nós mesmas guiaremos os espectadores e torceremos pelos atletas no lugar do robô!"
10015040-113 = "Afinal, o lema do nosso Clube de Engenharia é dar o nosso melhor para resolver qualquer problema, não importa a situação!"
10015040-114 = "Não temos experiência com líderes de torcida, mas... faremos o nosso melhor."
10015040-116 = "É estranho... apresentar um comportamento anormal exatamente no momento em que o módulo de comunicação de curto alcance foi ativado."
10015040-117 = "Posso ver o projeto do robô?"
10015040-118 = "Ah, aqui está."
10015040-125 = "...Não parece haver nada de errado com o circuito do robô. O botão de parada de emergência também foi projetado corretamente."
10015040-126 = "Se foi fabricado de acordo com este projeto, não há motivo para ele ter saído do controle."
10015040-127 = "[s] \"Você consegue saber só olhando o desenho?\""
10015040-128 = "Eu também cuido de assuntos relacionados a patentes. Estou acostumada a analisar desenhos técnicos."
10015040-135 = "...Realmente, não parece haver nada de errado em lugar nenhum... A menos que algo grave tenha acontecido durante a fabricação, então, na verdade..."
10015040-137 = "...Só nos resta suspeitar de um hackeamento."
10015040-139 = "...Hackeamento?"
10015040-140 = "Mas deveria ser impossível hackear via comunicação sem fio de curto alcance de fora da escola!"
10015040-142 = "É que... quando passei na sala do Veritas mais cedo, ouvi algo sobre isso..."
10015040-147 = "...Alguém dentro da Millennium tentando atrapalhar o Grande Festival Esportivo?"
10015040-148 = "Nossa! Então, realmente não havia nada de errado com o nosso projeto."
10015040-149 = "...Se foi hackeamento, não há o que fazer. O módulo de segurança do Clube de Engenharia usa um plugin comum, então..."
10015040-151 = "...Eu pretendia identificar o culpado apenas depois do evento, mas, já que as coisas chegaram a esse ponto, não podemos deixar passar."
10015040-152 = "Como se trata de hackeamento, parece melhor pedir ajuda ao Veritas."
10015040-153 = "Não temos muito tempo, vamos logo para a sala do Veritas!"
