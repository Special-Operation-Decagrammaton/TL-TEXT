[translation]
10015040-1 = "第4話;ミレニアムの応援団？"
10015040-3 = "[ns] \"疲れた……。\""
10015040-4 = "ふふ、お疲れ様でした。"
10015040-5 = "ですが、すぐ適応してこなしていましたね。"
10015040-6 = "スミレさんも言ってましたが……#n先生がミレニアム生だったら、選手として出場させたいくらいです。"
10015040-7 = "[s1] \"褒めすぎだよ……。\"\n[s2] \"私は遠くから眺めてるだけで十分だよ。\""
10015040-10 = "ふふ、試合は見るより実際に身体を動かしたほうが楽しいと言うじゃないですか。"
10015040-11 = "なので、私たちセミナーもできるだけ多くの生徒が平等に出場できるよう、#n名簿を整理していますが……"
10015040-12 = "競技への参加を嫌がる生徒が多く、エントリーの調整が難航しています。"
10015040-13 = "[s] \"ミレニアム生って運動嫌いが多いの？\""
10015040-14 = "トレーニング部のような例外もありますが、ほとんどはそうですね。"
10015040-15 = "思索と研究を奨励するミレニアムの校風上、#n体力が低く、他人と交わることを嫌うスタイルの生徒が多いんです。"
10015040-16 = "比較的名が知られているミレニアムの野球部でさえも、#n点数よりボールが描く放物線の方に興味があるというくらいですから。"
10015040-17 = "ですので、今回の機会を通じてミレニアム生の皆さんがスポーツの魅力に気づき、#n互いに切磋琢磨する事で新しいインスピレーションを得てほしいと願っていましたが……"
10015040-18 = "もしかしたら……運動が好きではない生徒にとっては、今回の大運動会はただ面倒なだけのお祭りかもしれませんね。"
10015040-19 = "[s] \"ノアの気持ちがみんなに伝わったらいいね。\""
10015040-23 = "ふふ……そのお言葉だけで、とても嬉しいです。"
10015040-30 = "あ、やっと戻って来られましたね。#nエンジニア部の皆さんがいる工業実習室です。"
10015040-31 = "[s3] \"……ちょっと早くないかな？\"\n[s4] \"お願いしてから3時間しか経ってないけど……。\""
10015040-34 = "大丈夫ですよ。これまでエンジニア部の皆さんは、#n変な機能を追加する事はあっても、締め切りを破ったことは一度もありませんから。"
10015040-35 = "先程も3時間以内に完成できると言っていましたし、大丈夫でしょう。"
10015040-36 = "きっと今回も、素敵な応援ロボットを完成させてくれているはずです。"
10015040-37 = "[s] \"なんか嫌な予感がする……。\""
10015040-38 = "それでは、失礼しま～す。"
10015040-46 = "あれ……？"
10015040-48 = "[ns] \"………？\""
10015040-49 = "みんな……準備は良いかい？"
10015040-50 = "はい、団長！"
10015040-51 = "うん……"
10015040-53 = "フレー！"
10015040-54 = "フレー！"
10015040-55 = "頑張れ！"
10015040-56 = "が、がんばれ……"
10015040-57 = "ヒビキ、声が小さいぞ！"
10015040-58 = "が、ガンバレ！"
10015040-60 = "いけ！いけ！勝て！勝て！――ミレニアム！"
10015040-61 = "わーー！"
10015040-62 = "わー……"
10015040-69 = "素晴らしい応援ですね。気合と情熱が伝わってきます。"
10015040-70 = "先生もそう思いませんか？"
10015040-71 = "[s5] \"たしかに素敵な応援だったけど……。\"\n[s6] \"……どうして応援団の格好を？\""
10015040-74 = "明日の大運動会で選手の応援をするためだよ。"
10015040-75 = "応援が選手の身体能力を向上させてくれるのは、#n科学的にも証明されている事実ですからね！"
10015040-76 = "繰り返される大きな音は大脳皮質に影響を及ぼし、#nアドレナリンの分泌を促進させてくれます。"
10015040-77 = "さらに、この応援服のような原色を目にすると、#n選手たちの興奮を極大化させることができるんです！"
10015040-78 = "あ、ちなみに私たちが着ているこの応援団の服は、ヒビキが作ってくれました。"
10015040-80 = "3人とも学ランにしたかったんだけど……#n時間が足りなくて、ウタハ先輩の分しか作れなかった。"
10015040-81 = "コトリと私が着てる服は、昔作ったチアリーダーのなんだけど、コスプレを始めたばっかの時に作ったヤツだから……生地も薄いし、縫製や造形も甘くて……"
10015040-82 = "こんな完成度の低い服を着て人前に出るなんて……#n恥ずかしさで逃げだしたい……。"
10015040-84 = "そんなこと言わないでくださいよヒビキ。#nお店で売っている服よりはるかに高いクオリティですよ？"
10015040-85 = "うん。私もこの学ラン、すごく気に入ってるよ。#nできるなら制服の代わりに着たいくらいだ。"
10015040-86 = "[s] \"私も素敵な格好だと思うけど……。\""
10015040-88 = "ええと……盛り上がっているところすみませんが……"
10015040-94 = "先ほどお願いしていた応援ロボットの方は、どうなりましたか？"
10015040-100 = "えっと……それが……"
10015040-101 = "製作は完璧だったんだけど……事故が起きちゃって……"
10015040-102 = "ああ……結論から言うと……"
10015040-103 = "失敗してしまったんだ……！"
10015040-104 = "[s] \"エンジニア部がロボット作りに失敗した……？\""
10015040-106 = "ロボットの機能を試演する時までは問題なかったんだけど……"
10015040-107 = "セキュリティプログラムをアップデートするために、#n近距離通信モジュールをオンにした瞬間、突然制御から外れて暴走し始めたの。"
10015040-108 = "うぅ……なんとか止めようとしたものの、緊急停止命令も聞かず……#nひとしきり暴れまわった後、全速力で逃げてしまって……"
10015040-109 = "結果、ここには何も残ってないんだ。"
10015040-110 = "……約束を守れず面目ない。"
10015040-111 = "だが、エンジニア部の名誉をかけて約束した以上、依頼は最後まで遂行するよ。"
10015040-112 = "そう……大運動会の期間中、私たちが応援ロボットの代わりに観客を案内し、選手を応援するとしよう！"
10015040-113 = "どんな状況でも最善を尽くして課題を解決するのが私たちエンジニア部のモットーですからね！"
10015040-114 = "チアリーディングは未熟だけど……最善を尽くすよ。"
10015040-116 = "妙ですね……近距離通信モジュールを実行した瞬間に、異常行動を見せるなんて。"
10015040-117 = "ロボットの設計図を見てもいいですか？"
10015040-118 = "ああ、これだよ。"
10015040-125 = "……ロボットの回路に異常はなさそうですね。#n緊急停止ボタンもきちんと設計されています。"
10015040-126 = "この設計図どおり製作されたなら、暴走する原因がありません。"
10015040-127 = "[s] \"図面だけで分かるの？\""
10015040-128 = "一応、特許関連の業務も受け持っていますから。#n図面を見るのは慣れているんです。"
10015040-135 = "やはり、どこにも異常がないように見受けられます……#n製作中に重大な何かが生じたのでなければ、やはり……"
10015040-137 = "……ハッキングを疑うしかないですね。"
10015040-139 = "……ハッキング？"
10015040-140 = "ですが、学園外から近距離無線通信でハッキングするのは不可能なはずですよ！"
10015040-142 = "それが……先程ヴェリタスの部室に寄った際、こんなお話を聞いたのです……"
10015040-147 = "……ミレニアムの内部に、大運動会を邪魔しようとする人が？"
10015040-148 = "何と！やはり、私たちの設計に問題があったわけではなかったんですね。"
10015040-149 = "……ハッキングなら仕方ないね。#nエンジニア部のセキュリティモジュールは、通常のプラグインを使ってるから……"
10015040-151 = "……犯人を特定するのは大会の後にしようと思っていましたが、#nこうなった以上、野放しにしておくわけにはいかないですね。"
10015040-152 = "ハッキングに関することですから、ヴェリタスに助けを求めた方がよさそうです。"
10015040-153 = "あまり時間も残ってないですし、急いでヴェリタスの部室に行きましょう！"
