[translation]
62060-1 = "Episódio 6; A Criança Perdida"
62060-3 = "Bom trabalho, pessoal."
62060-8 = "F-Foi um dia inacreditável, não foi...?"
62060-9 = "Sim, com certeza."
62060-10 = "Mas... todas as três agiram muito bem sob aquela situação."
62060-11 = "Estamos acostumadas com a vida de fugitivas. #nAté porque já fomos atacadas de surpresa antes."
62060-12 = "[s] \"Vocês ficaram fortes, não é...?\""
62060-13 = "Não é como se tivéssemos nos tornado fortes porque queríamos."
62060-14 = "……O quê? Que as pessoas ficam fortes sendo empurradas pelo ambiente...?"
62060-15 = "Ah... #nSério, dá para parar de dar respostas moralistas?"
62060-16 = "M-Mas... nós..."
62060-17 = "……."
62060-18 = "Será que vamos... continuar vivendo assim, fugindo para sempre...?"
62060-19 = "Hiyori...?"
62060-23 = "N-Não! Eu também gosto da nossa vida atual! Ehehe..."
62060-24 = "Mas, ainda assim..."
62060-25 = "É que..."
62060-26 = "Talvez por termos voltado depois de tanto tempo, fico pensando em bobagens..."
62060-27 = "[s1] \"……Me desculpe. Por fazer você passar por isso.\"\n[s2] \"Tudo o que aconteceu na Escola Filial de Arius...\"\n[s3] \"É por causa da minha negligência de dever...\""
62060-33 = "Hã? O-O que quer dizer com...?"
62060-34 = "Sensei...?"
62060-35 = "……."
62060-40 = "Ei, Sensei. Não tente carregar tudo sozinho nas suas costas."
62060-41 = "Este é o caminho que nós mesmas escolhemos."
62060-42 = "Então, if você acha... que pode haver outras opções..."
62060-43 = "Nesse momento, vamos pensar juntas."
62060-44 = "Por que não conversamos sobre o pedido da senhorita Mine agora?"
62060-45 = "[s] \"É sobre o 'cotidiano', não é?\""
62060-46 = "Sim. O cotidiano de Arius."
62060-47 = "Embora, provavelmente... seja algo totalmente diferente do que ela imagina."
62060-48 = "P-Para as crianças de Arius hoje... acho que quase tudo é uma experiência nova..."
62060-49 = "As aulas... os estudos... as atividades extracurriculares... #nAté ferramentas para filtrar água ou novos medicamentos..."
62060-51 = "Também tinha aqueles cobertores térmicos. Antes, usávamos tendas rasgadas."
62060-52 = "E também... rações de emergência para melhoria nutricional, eu nunca tinha visto isso por aqui."
62060-53 = "……Isso me faz perceber novamente. #nQue o 'cotidiano' de alguém pode ser um 'milagre' para outra pessoa."
62060-55 = "Mas a senhorita Mine disse que queria que protegêssemos isso, certo?"
62060-56 = "Ela disse para proteger o que é 'normal'..."
62060-57 = "Isso não é tão fácil quanto parece."
62060-58 = "[s4] \"É verdade.\"\n[s5] \"É exatamente por isso que eu preciso me esforçar.\""
62060-61 = "Mas... eu ainda odeio estudar..."
62060-62 = "[s] \"Não pode esquecer o dever principal de um estudante, sabe?\""
62060-66 = "O-O que você disse agora soou muito como um 'Sensei'...!"
62060-67 = "Ah, é mesmo... o Sensei já era um professor desde o começo..."
62060-68 = "[s6] \"Fufu. Deixe-me lembrá-las.\"\n[s7] \"De que eu sou o 'Sensei'.\""
62060-73 = "O que você pretende fazer...?"
62060-74 = "[s8] \"Amanhã teremos aula de novo.\"\n[s9] \"Preciso avisar todo mundo pelo MomoTalk.\""
62060-77 = "Você tem uma personalidade e tanto, hein, Sensei."
62060-78 = "……O quê? Que superando coisas desagradáveis repetidamente, as pessoas se tornam fortes?"
62060-79 = "Ah... esse tipo de frase era muito dita em Arius também. #nEmbora falassem de um jeito bem diferente."
62060-80 = "Realmente, era assim mesmo..."
62060-81 = "Mas, comparado ao treinamento do estilo de Arius, acho que as aulas do Sensei são bem melhores."
62060-82 = "Eu penso assim... você não?"
62060-83 = "……Não me lembro de ter dito nada disso."
62060-88 = "Fufu."
62060-89 = "Ehehe..."
62060-94 = "……Ei, por que sempre eu?"
62060-109 = "Uma mensagem no MomoTalk... do Sensei?"
62060-113 = "「Muito obrigado pelo esforço de hoje.」"
62060-114 = "「Apesar de tudo o que aconteceu, as aulas de amanhã continuarão como de costume.」"
62060-115 = "「Espero a participação de todas vocês.」"
62060-116 = "……O que é isso? Ele está brincando?"
62060-117 = "Será que ele não entende a situação em que estamos agora...?"
62060-118 = "Tenho que contar para a veterana quando ela voltar..."
62060-126 = "Ah, veterana! O Sensei mandou uma mensagem no MomoTalk agora há pouco...!"
62060-127 = "E o conteúdo dela é o seguinte――"
62060-129 = "Eu já sei."
62060-131 = "Hã, sim?"
62060-132 = "A-Ah, entendi... que bom então..."
62060-134 = "Mas já deletei a mensagem, então não dá mais para leer."
62060-136 = "Como...?"
62060-137 = "V-Você deletou...?"
62060-142 = "Algum problema com isso?"
62060-147 = "N-Não! Não é nada!"
62060-149 = "Sendo assim."
62060-150 = "Já está tarde, então é hora de descansarmos."
62060-152 = "……Nós vamos... dormir?"
62060-153 = "Quer dizer, realmente está na hora de dormir, mas..."
62060-154 = "O Sensei mandando mensagem no MomoTalk fingindo que nada aconteceu..."
62060-155 = "E o Squad que está com ele... #nNão deveríamos protestar pelo menos um pouco...?"
62060-156 = "……Nós até expulsamos a Maia, mas... #nMesmo assim, não deveríamos ao menos levar um cobertor para ela...?"
62060-161 = "……."
62060-162 = "Não me faça repetir."
62060-164 = "Veterana...?"
62060-165 = "Hã...?"
62060-172 = "Vá logo――"
62060-173 = "dormir."
62060-174 = "Entendido?"
62060-180 = "……!"
62060-181 = "S-Sim!"
62060-182 = "Boa noite para você também, veterana!"
62060-190 = "Fuu..."
62060-191 = "……."
62060-192 = "Acho que vou dormir [ruby=aqui]na Basílica[/ruby] hoje."
62060-193 = "……."
62060-194 = "Ah... essa sensação..."
62060-199 = "É aquela mesma sensação... de não conseguir dormir, mesmo estando morta..."
62060-209 = "……."
62060-210 = "O que eu faço... de agora em diante...?"
62060-211 = "……."
62060-212 = "Seria melhor se, assim mesmo..."
62060-213 = "……assim mesmo."
62060-215 = "Eu só queria desaparecer..."
62060-221 = "MomoTalk...? De quem...?"
62060-222 = "……."
62060-226 = "Aula... amanhã também... numa hora dessas?"
62060-227 = "O Sensei realmente..."
62060-228 = "……."
62060-229 = "Uhh..."
62060-232 = "Temos as carteiras, e se levantarmos as cadeiras, não haverá problema."
62060-233 = "Temos a mesa do professor e a lousa também! Não é uma sala de aula perfeita?"
62060-236 = "A primeira vez vai ser curta, então não se preocupe."
62060-237 = "Vou fazer a chamada, dar uma orientação rápida e terminamos."
62060-248 = "Ugh..."
62060-249 = "……Vou lá."
62060-250 = "Até onde o... Sensei está..."
62060-251 = "Uhh... *snif*..."
62060-256 = "Uwaaaaaaaan...!"
62060-260 = "(Não conseguindo dormir, fiquei olhando para o teto)"
62060-261 = "(Apocalipse... o som das trombetas... anjos... as palavras continuavam correndo pela minha mente...)"
62060-269 = "[ns] \"Sim, só um minutinho.\""
62060-279 = "[ns] \"Maia?! O que aconteceu?\""
62060-280 = "M-Me desculpe por vir a esta hora..."
62060-281 = "Eu sinto muito... sinto muito mesmo, mas――"
62060-282 = "Você poderia me deixar passar... apenas uma noite aqui...?"
62060-283 = "Amanhã eu vou sumir... de verdade."
62060-284 = "Não vou incomodar você nunca mais... por isso, só por hoje... por favor..."
62060-288 = "[ns] \"Tudo bem. Por favor, entre.\""
62060-289 = "Wawa?!"
62060-297 = "[ns] \"Primeiro, vamos lavar as mãos e o rosto.\""
62060-298 = "D-Deixa pra lá! Estou... bem..."
62060-303 = "(Como o rosto dela estava muito inchado, limpei com água.)"
62060-304 = "(Como ela tentou beber aquela água, preparei rapidamente várias bebidas.)"
62060-305 = "(Pensei em perguntar o que havia acontecido, mas...)"
62060-308 = "……."
62060-309 = "[s10] \"Pronto, descanse bastante hoje.\"\n[s11] \"Pode usar o saco de dormir à vontade.\""
62060-312 = "Hã...?"
62060-313 = "M-Mas este é o do Sensei... não é?"
62060-314 = "V-Você não precisa se preocupar tanto comigo..."
62060-315 = "Espera, Sensei! Isso é um cobertor térmico de emergência, não é...?"
62060-316 = "N-Não pode! Isso está errado! Eu é que vou usar esse cobertor!"
62060-317 = "Hã? Se for assim, você vai dormir lá fora...? Isso é ainda pior?!"
62060-321 = "Haa... haa... t-tudo bem... entendi..."
62060-322 = "Vou usar o saco de dormir então... muito obrigada..."
62060-323 = "Fome...? Não, está tudo bem! Não estou com fome nenhuma!"
62060-328 = "[ns] \"Fufu, seu estômago é bem honesto.\""
62060-329 = "Uhh... me desculpe..."
62060-338 = "*Mastiga, mastiga*... *engole*."
62060-339 = "[s] \"Não precisa ter pressa.\""
62060-342 = "M-Mas... mas..."
62060-343 = "Isso está muito gostoso."
62060-344 = "……Está realmente... muito bom……"
62060-345 = "……."
62060-346 = "Ugh..."
62060-347 = "[s] \"…….\""
62060-349 = "[ns] \"……Ficou satisfeita?\""
62060-350 = "Sim... muito obrigada..."
62060-351 = "Hã... Sensei, você vai dormir logo depois de comer...?"
62060-352 = "……."
62060-353 = "Com licença..."
62060-354 = "Você... não vai perguntar o que aconteceu...?"
62060-355 = "[s12] \"Já está muito tarde hoje.\"\n[s13] \"*Bocejo*... estou ficando com sono...\""
62060-361 = "Me desculpe..."
62060-362 = "Por eu ter vindo a uma hora dessas..."
62060-363 = "M-Me desculpe..."
62060-364 = "Hã? Mesmo que me diga para não me preocupar... é que..."
62060-365 = "Sabe, eu... amanhã, antes do Sensei acordar... eu vou sumir..."
62060-366 = "……Por que você faz isso? #nEstá tudo bem... eu realmente ficar aqui...?"
62060-367 = "Mas, eu..."
62060-368 = "[s14] \"Você não precisa se preocupar com nada.\"\n[s15] \"E sobre o que aconteceu, eu escuto quando você estiver com vontade de falar.\""
62060-371 = "……."
62060-372 = "……."
62060-373 = "Muito obrigada, Sensei."
62060-374 = "Muito... obrigada..."
62060-375 = "Uhh... uhh..."
62060-377 = "(Ela devia estar exausta. Logo foi possível ouvir o som leve de sua respiração dormindo.)"
62060-381 = "(Ela parecia ter pesadelos, pois gemia de vez em quando, mas...)"
62060-382 = "(Pensei que esse é justamente o papel de um Sensei.)"
62060-390 = "Todas já estão reunidas?"
62060-392 = "Sim!"
62060-393 = "Então――"
62060-394 = "Vamos em direção a Porta Pacis."
62060-396 = "Sim!"
62060-400 = "……Será que vai dar tudo certo mesmo?"
62060-401 = "Ainda nem amanheceu... #nFoi por isso que ela mandou a gente ir dormir cedo ontem?"
62060-402 = "Por que tão cedo de manhã...? Eu também não entendo direito sobre Porta Pacis... #nEstou meio ansiosa..."
62060-403 = "Se continuarmos seguindo ela, não vamos conseguir ir à aula do Sensei, né...?"
62060-404 = "Quero dizer, o que faremos se formos até Porta Pacis e não descobrirmos nada...?"
62060-405 = "Shiu! Ela vai ouvir!"
62060-410 = "Algum problema?"
62060-416 = "Não! Não é nada!"
62060-424 = "――Portanto, vigiai."
62060-428 = "Porque não sabeis o dia nem a hora."
62060-437 = "……."
62060-438 = "……."
62060-439 = "P-Pelo visto... ninguém veio, né?"
62060-444 = "……."
62060-445 = "Isso é... o que chamam de 'falta sem justificativa'?"
62060-446 = "[s16] \"……Pois é.\"\n[s17] \"Mas, todo mundo de uma vez só...\""
62060-449 = "O que vai fazer, Sensei? Mas, pensando bem, não tenho ideia de para onde elas possam ter ido."
62060-453 = "Hã? Tentar ligar...? Para quem?"
62060-454 = "Subaru...?"
62060-455 = "……Entendido, por favor."
62060-462 = "……."
62060-463 = "Ela não... atende...?"
62060-464 = "[s18] \"Talvez elas só tenham ficado com preguiça da aula, mas...\"\n[s19] \"Sumir sem dizer nada deixa a gente preocupado...\""
62060-471 = "Com licença, Sensei... #nEu acho que sei para onde todas foram."
62060-475 = "Você sabe?"
62060-476 = "Sim... provavelmente todas elas――"
62060-480 = "foram em direção a 'Porta Pacis'……"
62060-484 = "！！！"
62060-486 = "Próximo Episódio; Porta Pacis (1)"