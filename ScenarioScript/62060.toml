[translation]
62060-1 = "Episódio 6; Criança perdida"
62060-3 = "Bom trabalho a todos."
62060-8 = "Q-que dia inacreditável tivemos, não é...?"
62060-9 = "Ah, com certeza."
62060-10 = "Mas... vocês três se saíram muito bem naquela situação."
62060-11 = "Estamos acostumadas a viver fugindo. #nJá fomos atacadas de repente várias vezes."
62060-12 = "[s] \"Vocês ficaram fortes, não ficaram...?\""
62060-13 = "Não é como se tivéssemos escolhido ficar assim."
62060-14 = "...O quê? Que a gente fica forte quando o ambiente nos força a isso...?"
62060-15 = "Haa... #nSério, pode parar de falar essas coisas certinhas como se fosse um adulto?"
62060-16 = "M-mas... nós..."
62060-17 = "..."
62060-18 = "Será que vamos continuar... vivendo fugindo para sempre...?"
62060-19 = "Hiyori...?"
62060-23 = "N-não! Eu gosto da nossa vida atual também! Ehehe..."
62060-24 = "Mas, ainda assim..."
62060-25 = "De alguma forma..."
62060-26 = "Talvez seja porque voltei aqui depois de tanto tempo, acabei pensando em coisas estranhas..."
62060-27 = "[s1] \"...Desculpe. Por fazer vocês passarem por isso.\"\n[s2] \"Tudo sobre a Escola Filial de Arius...\"\n[s3] \"É por causa da minha negligência no dever...\""
62060-33 = "Hã? O-o que você quer dizer com isso...?"
62060-34 = "Sensei...?"
62060-35 = "..."
62060-40 = "Ei, Sensei. Não tente carregar tudo nas costas sozinho."
62060-41 = "Este é um caminho que nós mesmas escolhemos."
62060-42 = "Então, se você acha que... talvez existam outras opções..."
62060-43 = "Nesse caso, vamos pensar juntos."
62060-44 = "Agora, por que não falamos sobre o pedido da Mine?"
62060-45 = "[s] \"Sobre o 'cotidiano', certo?\""
62060-46 = "Sim. O cotidiano de Arius."
62060-47 = "Embora, provavelmente... seja algo bem diferente do que ela imagina."
62060-48 = "P-para as alunas de Arius de agora... acho que tudo é uma experiência inédita..."
62060-49 = "Aulas... estudos... excursões escolares... #nAté ferramentas para filtrar água e novos medicamentos..."
62060-51 = "Também tinha aquele cobertor com efeito térmico. Antes, a gente usava uma barraca rasgada."
62060-52 = "Além disso... rações de emergência para melhorar a nutrição, nunca tínhamos visto nada disso aqui."
62060-53 = "...Percebo isso novamente. #nQue o \"cotidiano\" de alguém é um \"milagre\" para outra pessoa."
62060-55 = "Mas a Mine disse que queria que vocês protegessem isso, não disse?"
62060-56 = "Que queria que vocês protegessem o \"normal\"..."
62060-57 = "Não é tão fácil quanto parece, né?"
62060-58 = "[s4] \"É verdade.\"\n[s5] \"É por isso que eu preciso me esforçar.\""
62060-61 = "Mas... eu ainda odeio estudar..."
62060-62 = "[s] \"Não pode esquecer o dever de uma estudante, sabia?\""
62060-66 = "I-isso foi muito parecido com um \"Sensei\" agora...!"
62060-67 = "Ah, é verdade... o Sensei já era um Sensei desde o começo..."
62060-68 = "[s6] \"Fufu. Vou deixar você relembrar.\"\n[s7] \"Que eu sou o 'Sensei'.\""
62060-73 = "O que você pretende fazer...?"
62060-74 = "[s8] \"Amanhã também teremos aula.\"\n[s9] \"Preciso avisar todo mundo pelo MomoTalk.\""
62060-77 = "Você tem uma personalidade e tanto, Sensei."
62060-78 = "...O quê? Que as pessoas ficam fortes ao superar coisas desagradáveis repetidamente?"
62060-79 = "Haa... eu ouvia muito isso em Arius também. #nEmbora falassem de um jeito bem diferente."
62060-80 = "Com certeza, era assim mesmo..."
62060-81 = "Mas, comparado ao treinamento do estilo Arius, acho que as aulas do Sensei são muito melhores."
62060-82 = "Eu penso assim, mas... você não?"
62060-83 = "……Eu não me lembro de ter dito algo assim."
62060-88 = "Fufu."
62060-89 = "Ehehe..."
62060-94 = "……Ei, por que só eu?"
62060-109 = "MomoTalk... do Sensei?"
62060-113 = "“Muito obrigado pelo trabalho duro hoje.”"
62060-114 = "“Apesar de tudo o que aconteceu, as aulas continuarão normalmente amanhã.”"
62060-115 = "“Por favor, todos, sintam-se à vontade para participar.”"
62060-116 = "……O que é isso, ele está brincando?"
62060-117 = "Será que ele não entende a situação em que estamos...?"
62060-118 = "Preciso contar para a veterana quando ela voltar..."
62060-126 = "Ah, veterana! O Sensei mandou uma mensagem no MomoTalk agora pouco...!"
62060-127 = "E o conteúdo era..."
62060-129 = "Eu já sei."
62060-131 = "Ah, é mesmo?"
62060-132 = "E-entendo... nesse caso, fico aliviada..."
62060-134 = "Dito isso, eu apaguei a mensagem, então não consigo mais ler."
62060-136 = "Sim...?"
62060-137 = "V-você apagou...?"
62060-142 = "Algum problema com isso?"
62060-147 = "N-não! Nada não!"
62060-149 = "Então tá."
62060-150 = "Já está tarde, então vamos descansar."
62060-152 = "……Nós vamos, dormir?"
62060-153 = "É verdade que está na hora de dormir, mas..."
62060-154 = "O Sensei agindo como se não soubesse de nada e mandando mensagens no MomoTalk..."
62060-155 = "E quanto ao esquadrão que está com a gente...#nNão deveríamos protestar pelo menos um pouco...?"
62060-156 = "……Nós expulsamos a Mya, mas...#nMesmo assim, pelo menos um cobertor deveríamos ter levado para ela..."
62060-161 = "……."
62060-162 = "Não me faça repetir a mesma coisa."
62060-164 = "Veterana...?"
62060-165 = "Eh...?"
62060-172 = "Vá logo..."
62060-173 = "Dormir."
62060-174 = "Entendido?"
62060-180 = "……!"
62060-181 = "S-sim!"
62060-182 = "Boa noite, veterana!"
62060-190 = "Ufa..."
62060-191 = "……."
62060-192 = "Vamos dormir na Basílica hoje."
62060-193 = "……."
62060-194 = "Ah... essa sensação..."
62060-199 = "Mesmo depois de morta, é como se eu não conseguisse dormir... essa sensação..."
62060-209 = "……."
62060-210 = "O que eu vou fazer... daqui para frente..."
62060-211 = "……."
62060-212 = "Quem dera, se eu pudesse apenas..."
62060-213 = "……desse jeito."
62060-215 = "Eu queria desaparecer……."
62060-221 = "MomoTalk……? De quem será……?"
62060-222 = "……."
62060-226 = "Aula…… amanhã também…… em um momento como este?"
62060-227 = "O Sensei é realmente……."
62060-228 = "……."
62060-229 = "Ugh……."
62060-232 = "Tem uma mesa, e se eu levantar a cadeira, não tem problema."
62060-233 = "Tem até uma mesa de sensei e um quadro! Não é uma sala de aula perfeita?"
62060-236 = "A primeira aula será curta, então não se preocupe."
62060-237 = "Vou fazer a chamada, dar uma orientação rápida e terminar."
62060-248 = "Ugh……."
62060-249 = "……Vamos."
62060-250 = "Para onde o…… Sensei está……."
62060-251 = "Ugh…… soluço……."
62060-256 = "Waaaaaaah……!"
62060-260 = "(Sem conseguir dormir, fiquei encarando o teto)"
62060-261 = "(Apocalipse…… som de trombetas…… anjos…… as palavras continuavam girando na minha cabeça……)"
62060-269 = "[ns] \"Oi, espere um pouco.\""
62060-279 = "[ns] \"Maia!? O que houve?\""
62060-280 = "De-desculpe incomodar a esta hora……."
62060-281 = "Eu realmente…… realmente sinto muito, mas――"
62060-282 = "Poderia me deixar ficar…… só por uma noite……?"
62060-283 = "Amanhã, eu vou…… desaparecer de verdade."
62060-284 = "Não vou mais causar problemas…… só hoje…… por favor……."
62060-288 = "[ns] \"Tudo bem. Pode entrar.\""
62060-289 = "Wawa!?"
62060-297 = "[ns] \"Primeiro, vamos lavar as mãos e o rosto.\""
62060-298 = "E-está tudo bem! Está…… tudo bem……."
62060-303 = "(Como o rosto dela estava muito inchado, lavei com água)"
62060-304 = "(Como ela tentou beber a água, preparei rapidamente muitas bebidas)"
62060-305 = "(Pensei em perguntar o que aconteceu, mas……)"
62060-308 = "……."
62060-309 = "[s10] \"Bem, vamos descansar um pouco hoje.\"\n[s11] \"Pode usar o saco de dormir à vontade.\""
62060-312 = "Eh……?"
62060-313 = "Ma-mas isso é do Sensei…… não é?"
62060-314 = "N-não precisa se preocupar tanto comigo……."
62060-315 = "Espera, Sensei! Isso é um cobertor térmico, não é……?"
62060-316 = "N-não pode! Isso é um absurdo! Eu que vou usar esse cobertor!"
62060-317 = "Eh? Então você vai dormir lá fora……? Isso é ainda pior, não acha!?"
62060-321 = "Ha…… ha…… e-entendi……."
62060-322 = "Vou usar o saco de dormir…… obrigada……."
62060-323 = "Fome……? Não, está tudo bem! Não estou com fome de jeito nenhum!"
62060-328 = "[ns] \"Fufu, sua barriga é honesta, não é?\""
62060-329 = "Ugh…… desculpe……."
62060-338 = "Mastiga, mastiga…… engole."
62060-339 = "[s] \"Não precisa ter pressa.\""
62060-342 = "Ma-mas…… mas……."
62060-343 = "Isso está delicioso."
62060-344 = "……Sério, está… delicioso……."
62060-345 = "……."
62060-346 = "Ugh……."
62060-347 = "[s] \"…….\""
62060-349 = "[ns] \"……Ficou satisfeita?\""
62060-350 = "Sim…… muito obrigada……."
62060-351 = "Hã…… Sensei, você vai dormir logo depois de comer……?"
62060-352 = "……."
62060-353 = "Ei……."
62060-354 = "Você não vai…… perguntar o que aconteceu……?"
62060-355 = "[s12] \"Já está tarde, afinal.\"\n[s13] \"Bocejo…… estou começando a ficar com sono…….\""
62060-361 = "Sinto muito……."
62060-362 = "Por minha causa, vindo a esta hora……."
62060-363 = "Desculp……e……."
62060-364 = "Hã? Mesmo que você diga para não me preocupar…… mas……."
62060-365 = "Ei, eu…… amanhã, antes que o Sensei acorde…… eu vou desaparecer……."
62060-366 = "……Por que, você diz isso? #nSério…… eu posso…… ficar aqui……?"
62060-367 = "Mas, eu, tipo……."
62060-368 = "[s14] \"Não precisa se preocupar com nada.\"\n[s15] \"E se quiser conversar, eu estarei aqui para ouvir, Maia.\""
62060-371 = "……."
62060-372 = "…………."
62060-373 = "Muito obrigada, Sensei."
62060-374 = "Muito obrig……ada……."
62060-375 = "Uuu, uuu……."
62060-377 = "(Ela devia estar muito cansada. Logo, pude ouvir sua respiração leve enquanto dormia.)"
62060-381 = "(Talvez estivesse tendo um pesadelo, ela se remexia de vez em quando……)"
62060-382 = "(Pensei que é exatamente para momentos assim que o Sensei serve.)"
62060-390 = "Todos estão reunidos, certo?"
62060-392 = "Sim!"
62060-393 = "Então――"
62060-394 = "Vamos em direção a Porta Pacis."
62060-396 = "Sim!"
62060-400 = "……Será que isso é realmente seguro?"
62060-401 = "Ainda nem amanheceu……? #nFoi por isso que você disse ontem para dormir cedo?"
62060-402 = "Por que tão cedo assim…… e eu nem sei direito o que é a Porta Pacis…… #nEstou um pouco preocupada……."
62060-403 = "Se eu continuar seguindo assim, não vou conseguir ir para a aula do Sensei……."
62060-404 = "Digo, o que vamos fazer se chegarmos na Porta Pacis e não descobrirmos nada……?"
62060-405 = "Psiu, ela vai ouvir!"
62060-410 = "Algum problema?"
62060-416 = "Não! Problema nenhum!"
62060-424 = "――Por isso, mantenham-se despertos."
62060-428 = "Pois vocês não sabem o dia nem a hora."
62060-437 = "……."
62060-438 = "……."
62060-439 = "N-ninguém…… parece ter vindo…… né?"
62060-444 = "……."
62060-445 = "Isso é…… o que chamam de \"falta injustificada\"?"
62060-446 = "[s16] \"……Pois é.\"\n[s17] \"Mas, todos de uma vez…….\""
62060-449 = "Sensei, o que vamos fazer? Digo, não tenho a menor ideia de onde eles poderiam ter ido."
62060-453 = "Hã? Ligar para eles…… para quem?"
62060-454 = "Subaru...?"
62060-455 = "...Entendido, eu aceito."
62060-462 = "..."
62060-463 = "Eles não... aparecem...?"
62060-464 = "[s18] \"Talvez eles tenham ficado cansados da aula, mas...\"\n[s19] \"É preocupante quando somem sem dizer nada...\""
62060-471 = "Ei, Sensei... #nEu tenho uma ideia de onde todos foram."
62060-475 = "Você sabe?"
62060-476 = "Sim... provavelmente, todos eles—"
62060-480 = "Acho que eles foram para a \"Porta Pacis\"..."
62060-484 = "!!!"
62060-486 = "Próximo episódio: Porta Pacis (1)"
