[translation]
1002502-1 = "小さいのも良いですね！"
1002502-2 = "カフェ・ミルフィーユ"
1002502-3 = "期間限定の「ラムレーズンパフェ」を一つ、お願いします！"
1002502-4 = "[s1] \"……パフェ？\"\n[s2] \"別に子どもの時じゃなくても良いんじゃ……？\""
1002502-5 = "ふふっ、まずこれはただのパフェではなく、期間限定のパフェなんです！"
1002502-6 = "ふふっ、まずこれはただのパフェではなく、期間限定のパフェなんです！"
1002502-7 = "ここ「カフェ・ミルフィーユ」では、いつも色々なパフェが売られていますが、この「ラムレーズンパフェ」は冬の間限定のメニューでして。"
1002502-8 = "きっと、ラムレーズンは夏に保管するのには向かないからだと思います。"
1002502-9 = "そしてここのラムレーズンは、上質なレーズンをダークラムで熟成させるという、ものすごく贅沢な作り方をしているんです！"
1002502-10 = "このパフェの唯一残念なところは、一人ひとつしか食べられない上に、ひとつの量が結構少ない上品なサイズをしている、ということだったのですが……。"
1002502-11 = "この身体でしたら、同じ量でもお腹いっぱい食べたように感じられるはずです！えへへ……！"
1002502-12 = "[s] \"なるほど……！\""
1002502-13 = "ふふっ、以前梅花園の子たちに読んであげた童話にも、このようなシーンがありました。"
1002502-14 = "巨人の国へ向かった童話の主人公が、自分の体よりも大きなケーキを食べるという展開があったのですが……。"
1002502-15 = "まさに今の私と一緒です。この身体になった私からすると、今のキヴォトスはまるで巨人の王国のようです！"
1002502-16 = "それよりも、先生はどのパフェにしますか？"
1002502-17 = "ラムレーズンパフェ、すっごく美味しいですよ？"
1002502-18 = "[s] \"うーん……じゃあ無難に、イチゴヨーグルトパフェで。\""
1002502-19 = "イチゴヨーグルト……ですか？"
1002502-20 = "あ、いえ、美味しいですし、決して何も悪くはないのですが……てっきり、抹茶やラムレーズンなど、大人っぽい味を選ぶものかと。"
1002502-21 = "ふふっ。先生にもこういった、可愛らしいところがあるのですね♪"
1002502-22 = "[s3] \"甘いものはいくつになっても美味しいからね！\"\n[s4] \"こ、子どもっぽいかな……？\""
1002502-23 = "ふふっ、決して悪い意味ではありませんよ。私も甘いもの、大好きですし。"
1002502-24 = "ふふっ、決して悪い意味ではありませんよ。私も甘いもの、大好きですし。"
1002502-25 = "ですが私はせっかくなので、やはり今日はラムレーズンの気分です！"
1002502-26 = "ふふっ、待ちきれませんね～♪"
1002502-29 = "お待たせいたしました。ご注文のイチゴヨーグルトパフェと、期間限定のラムレーズンパフェです。"
1002502-30 = "あ、えっと。"
1002502-31 = "すみません、そちらのラムレーズンパフェが私で……。"
1002502-32 = "あ、そうでしたか。こちらは結構大人の味なのですが、大丈夫ですか……？"
1002502-33 = "……。"
1002502-34 = "し、失礼いたしました……！"
1002502-35 = "ごゆっくりどうぞ！"
1002502-39 = "外見だけで判断してはいけないんですよと、子どもたちにも伝えないとですね……。"
1002502-40 = "とにかく……では、いただきま～す！"
1002502-46 = "……？"
1002502-47 = "[s] \"シュン？どうかした？\""
1002502-48 = "あ、いえ。久しぶりに食べたからでしょうか……ちょっと変な感じが……。"
1002502-49 = "もう一口……。"
1002502-52 = "はむ……んん……？"
1002502-53 = "[s] \"何か変なものとか入ってた？\""
1002502-54 = "いえ、そういうわけではないのですが……。"
1002502-55 = "このレーズンの程よい甘さと、ダークラムの濃厚な味わい……流石の素敵な味わいなのですが、ただ……。"
1002502-56 = "舌まで幼くなったせいか、ちょっとこの味が、その……。"
1002502-57 = "[s] \"ああー……私のイチゴヨーグルトパフェと交換する？\""
1002502-58 = "うぅ……確かに気持ち的には、今「イチゴヨーグルト」と聞くとすごく魅力的なのですが……。"
1002502-59 = "せっかくこのパフェをお腹いっぱい食べられるチャンスなのに、諦めるわけには……！"
1002502-60 = "もう一口……！"
1002502-62 = "ごめんなさい、やっぱり最後までは食べられなさそうです……。"
1002502-68 = "[ns] イチゴヨーグルトパフェをすっと差し出す。"
1002502-70 = "ありがとうございます、先生……。"
1002502-72 = "はむっ、もぐもぐ……。"
1002502-74 = "うん、やっぱり甘いのは美味しいです！"
1002502-76 = "シュンから貰ったラムレーズンパフェは、確かに濃厚な大人の味で、これはこれで美味しかった。"
1002502-77 = "シュンはその後子どもっぽく、美味しそうにイチゴヨーグルトパフェを頬張っていた。"
