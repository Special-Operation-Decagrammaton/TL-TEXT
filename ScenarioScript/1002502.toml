[translation]
1002502-1 = "Ser pequena também é bom, não é?"
1002502-2 = "Café Mille-Feuille"
1002502-3 = "Por favor, um \"Parfait de Rum com Passas\" de edição limitada!"
1002502-4 = "[s1] \"...Um parfait?\"\n[s2] \"Não precisa ser necessariamente quando se é criança, precisa...?\""
1002502-5 = "Fufu, primeiro de tudo, este não é um parfait comum, é um parfait de edição limitada!"
1002502-6 = "Fufu, primeiro de tudo, este não é um parfait comum, é um parfait de edição limitada!"
1002502-7 = "Aqui no \"Café Mille-Feuille\", vários parfaits são vendidos sempre, mas este \"Parfait de Rum com Passas\" é um item exclusivo do inverno."
1002502-8 = "Acho que é porque as passas ao rum não são adequadas para serem armazenadas durante o verão."
1002502-9 = "E as passas ao rum daqui são feitas de uma maneira extremamente luxuosa, amadurecendo passas de alta qualidade em rum escuro!"
1002502-10 = "A única parte lamentável deste parfait é que só se pode comer um por pessoa e, além disso, ele tem um tamanho elegante, sendo bem pequeno... mas..."
1002502-11 = "Com este corpo, mesmo a mesma quantidade deve ser o suficiente para eu me sentir satisfeita! Ehehe...!"
1002502-12 = "[s] \"Entendo...!\""
1002502-13 = "Fufu, em um conto de fadas que li para as crianças do Jardim Ame-hana, havia uma cena como esta."
1002502-14 = "Havia uma parte em que o protagonista do conto de fadas, que foi para a terra dos gigantes, comia um bolo maior que seu próprio corpo..."
1002502-15 = "É exatamente como eu agora. Para mim, que estou neste corpo, Kivotos parece um reino de gigantes!"
1002502-16 = "Mas, deixando isso de lado, qual parfait o Sensei vai querer?"
1002502-17 = "O parfait de rum com passas é muito gostoso, sabe?"
1002502-18 = "[s] \"Hmm... então, para não arriscar, vou querer o de iogurte com morango.\""
1002502-19 = "Iogurte com morango... é?"
1002502-20 = "Ah, não, é delicioso e não tem nada de errado com isso, mas... eu achei que você escolheria um sabor mais adulto, como matcha ou rum com passas."
1002502-21 = "Fufu. Então o Sensei também tem esse lado adorável♪"
1002502-22 = "[s3] \"Doces são gostosos não importa a idade!\"\n[s4] \"I-isso é infantil...?\""
1002502-23 = "Fufu, não é em um sentido ruim, de forma alguma. Eu também adoro doces."
1002502-24 = "Fufu, não é em um sentido ruim, de forma alguma. Eu também adoro doces."
1002502-25 = "Mas, já que estamos aqui, hoje eu estou com vontade de rum com passas!"
1002502-26 = "Fufu, mal posso esperar~♪"
1002502-29 = "Desculpe a demora. Aqui estão o parfait de iogurte com morango e o parfait de rum com passas de edição limitada."
1002502-30 = "Ah, bem."
1002502-31 = "Desculpe, aquele parfait de rum com passas é para mim..."
1002502-32 = "Ah, era você? Este é um sabor bem adulto, tem certeza de que está tudo bem...?"
1002502-33 = "..."
1002502-34 = "P-peço perdão...!"
1002502-35 = "Aproveite!"
1002502-39 = "Preciso ensinar às crianças que não se deve julgar apenas pela aparência..."
1002502-40 = "De qualquer forma... então, vamos comer!"
1002502-46 = "...?"
1002502-47 = "[s] \"Shun? Aconteceu alguma coisa?\""
1002502-48 = "Ah, não. Será que é porque faz tempo que não como...? Sinto algo um pouco estranho..."
1002502-49 = "Mais uma colherada..."
1002502-52 = "Ham... hmm...?"
1002502-53 = "[s] \"Tinha algo estranho nele?\""
1002502-54 = "Não, não é isso, mas..."
1002502-55 = "A doçura equilibrada destas passas e o sabor intenso do rum escuro... é um sabor maravilhoso, como esperado, mas apenas..."
1002502-56 = "Talvez porque até minha língua tenha ficado infantil, este sabor está um pouco, sabe..."
1002502-57 = "[s] \"Ah... quer trocar pelo meu parfait de iogurte com morango?\""
1002502-58 = "Uu... certamente, emocionalmente, ouvir \"iogurte com morango\" agora parece muito atraente, mas..."
1002502-59 = "É uma chance de comer este parfait até ficar satisfeita, não posso desistir agora...!"
1002502-60 = "Mais uma colherada...!"
1002502-62 = "Desculpe, parece que não vou conseguir terminar..."
1002502-68 = "[ns] Estende o parfait de iogurte com morango suavemente."
1002502-70 = "Muito obrigada, Sensei..."
1002502-72 = "Ham, nham nham..."
1002502-74 = "Sim, doces são realmente deliciosos!"
1002502-76 = "O parfait de rum com passas que ganhei da Shun tinha um sabor adulto intenso, e era delicioso à sua própria maneira."
1002502-77 = "Depois disso, a Shun comeu o parfait de iogurte com morango de um jeito infantil, parecendo estar muito saboroso."
