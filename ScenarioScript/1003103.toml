[translation]
1003103-1 = "As costas que quero mostrar"
1003103-3 = "（Chegando ao local do encontro na hora marcada）"
1003103-4 = "（Ao olhar em volta, encontrei Aru imediatamente）"
1003103-6 = "……Esse visual, não está estranho, né?"
1003103-7 = "Bem, não tem como o meu senso impecável estar errado, mas……"
1003103-8 = "……Será que não tem um espelho em algum lugar?"
1003103-9 = "[s] \"Aru, desculpe a demora.\""
1003103-10 = "Hyaaa!?"
1003103-11 = "Se-Sensei! Desde quando você está aí!? Que susto……"
1003103-12 = "Mas, chegar na hora marcada é digno de nota!"
1003103-13 = "Hoje não posso me dar ao luxo de me atrasar, afinal――"
1003103-14 = "[s] \"…….\""
1003103-15 = "……Sensei?"
1003103-16 = "O-O que foi, ficar me encarando assim……"
1003103-19 = "（……Fufu, exatamente como planejado! Sensei, você está encantado por mim, não está!? Valeu a pena pagar um preço alto por essa elegância que emana deste tecido luxuoso!）"
1003103-20 = "（Com isso, você não terá escolha a não ser admitir……）"
1003103-21 = "（Meu senso de negócios incrível. E que, naquela hora, eu definitivamente não fui enganada pelo vendedor……!）"
1003103-22 = "[s] \"Aru, esse quimono――\""
1003103-23 = "Ta-ta-ta-ta-tempo! Ainda não! Ainda não estou preparada mentalmente para isso……!"
1003103-24 = "（Como eu imaginava, ouvir a opinião diretamente é impossível!）"
1003103-25 = "（Você deve estar encantado, disso não há dúvidas. Não há dúvidas, mas…… se por um acaso, mesmo achando que é impossível……）"
1003103-26 = "（Se o Sensei dissesse que está estranho ou que não combina comigo, no dia em que……）"
1003103-29 = "……Ufa, tudo bem!"
1003103-30 = "Ehem. Escute, Sensei, como eu disse no Momotalk, hoje vamos a um evento elegante e importante. De qualquer forma, vamos focar nisso primeiro."
1003103-31 = "Desta vez, consegui um convite através de certos contatos."
1003103-32 = "……Eh? Já está achando suspeito? Que falta de educação!"
1003103-33 = "É um convite para um jantar especial organizado por um dos empresários mais influentes de Kivotos no Ano Novo, sabia!?"
1003103-34 = "[s1] \"Entendo, por isso você veio de quimono.\"\n[s2] \"Então era isso que significava um evento elegante.\""
1003103-35 = "Sim, exatamente! Ainda bem que aluguei o quimono naquela época."
1003103-36 = "Sim, exatamente! Ainda bem que aluguei o quimono naquela época."
1003103-37 = "Esse tipo de coincidência também é, de certa forma, uma visão de futuro, um senso indispensável para os negócios……!"
1003103-41 = "Ah, não temos tempo para isso. Vamos, Sensei, vamos logo! Não podemos nos atrasar para a festa♪"
1003103-44 = "E então, não é incrível?"
1003103-45 = "É uma festa onde os empresários mais famosos de Kivotos se reúnem."
1003103-46 = "É também um lugar onde pessoas renomadas em várias áreas trocam opiniões sobre ideias de negócios para o futuro."
1003103-47 = "Ou seja, se estivermos aqui, podemos encontrar dicas para novos negócios ou até mesmo novos clientes através das conversas que rolam por aqui, entende?"
1003103-48 = "[s] \"Um convite para uma festa tão incrível nas mãos da Aru…….\""
1003103-49 = "Fufu. Afinal, eu sou a presidente e líder da \"Problem Solver 68\", Rikuhachima Aru, sabe? Bem, parece que finalmente alguém começou a me reconhecer."
1003103-50 = "[s] \"Aru, você é incrível.\""
1003103-51 = "Se-Sério? Você realmente acha isso!? Se é assim que o Sensei me vê, então talvez eu esteja, aos poucos……!"
1003103-54 = "（Ah, já que estamos aqui, se eu aproveitar para mostrar ao Sensei o meu lado legal……!）"
1003103-55 = "（Ainda não ouvi a opinião sobre o quimono, mas de qualquer forma, você vai mudar sua visão sobre mim e me elogiar!）"
1003103-58 = "Fufun, pode me elogiar mais, sabia? Afinal, nesta festa grandiosa, também estão presentes os clientes da nossa Problem Solver 68."
1003103-59 = "Hoje é para cuidar deles, ou melhor, conversar……"
1003103-60 = "I-Isso, falar de negócios! Preciso discutir as perspectivas futuras!"
1003103-61 = "A \"Problem Solver 68\" está preparando um negócio muito importante agora. Por isso, preciso encontrá-los!"
1003103-62 = "Ah, que correria…… vendo-me trabalhar arduamente desde o Ano Novo, você pode ficar ainda mais impressionado, sabia?"
1003103-63 = "[s] \"Trabalhando desde o início do ano, hein. Já que estamos aqui, adoraria conhecer seus clientes, Aru.\""
1003103-64 = "Fufu, bem, pode ficar na expectativa."
1003103-65 = "Pode ser que falemos de assuntos complexos, mas observe bem a minha capacidade como empresária!"
1003103-66 = "Fufufu!"
1003103-67 = "Fu, fufu..."
1003103-68 = "..."
1003103-71 = "(Não é que eu fiz besteira mesmo!?)"
1003103-72 = "(Pra começo de conversa, o convite caiu nas minhas mãos por acaso, então não tem como ter nenhum cliente que eu precise encontrar aqui!)"
1003103-73 = "(Eu me empolguei demais... preciso dar um jeito de consertar isso agora...)"
1003103-74 = "(Ma-mas se eu mudar a história agora, vai parecer muito feio, não vai!?)"
1003103-75 = "[ns] \"Esse seu cliente, ele já está por aqui em algum lugar?\""
1003103-76 = "Ah, bem, sobre isso..."
1003103-77 = "(O-o que eu faço...!?)"
1003103-78 = "(...Tive uma ideia! Vou dizer que ele deveria vir, mas que infelizmente não pôde comparecer...)"
1003103-79 = "(Isso, com essa desculpa eu consigo escapar!)"
1003103-80 = "É-é que, Sensei. Estava dando uma olhada na lista de convidados agora pouco, e parece que ele não vai poder vir à festa..."
1003103-81 = "...Eh? O nome? Do cliente...?"
1003103-82 = "I-isso é, bem... em vez do nome, no nosso ramo, por questões de privacidade, a gente costuma usar apelidos..."
1003103-83 = "Aquele... "Conde Mochi de Espelho", acho que era esse?"
1003103-88 = "Oh, então você veio desta vez, Conde Mochi de Espelho."
1003103-89 = "Ora, ora! Quanto tempo, Presidente Osechimaru!"
1003103-90 = "O "Conde Mochi de Espelho" existe meeeesmo!? Ele existe de verdade!? Não pode ser, né!?"
1003103-91 = "...Ah! Não, é que, como posso dizer..."
1003103-92 = "B-bem, é verdade que como ele é um cliente, eu deveria cumprimentá-lo, mas... bem..."
1003103-93 = "E-espere um pouco, Sensei. Vou só falar com ele rapidinho..."
1003103-94 = "(O-o que eu faço!? Eu inventei esse nome do nada e ele realmente existe! Como eu vou sair dessa situação...!?)"
1003103-105 = "...Oh?"
1003103-106 = "Moça, precisa de alguma coisa?"
1003103-107 = "A-ah, bem, é que..."
1003103-111 = "(...N-não dá, é impossível!)"
1003103-112 = "P-perdão pela intromissão!!!"
1003103-114 = "Ah—"
1003103-118 = "Ai, ai, ai... Sensei!?"
1003103-119 = "E-eu caí em cima de você...!? D-desculpa, é que eu ainda não me acostumei com esse calçado...!"
1003103-123 = "Ai...!?"
1003103-124 = "Logo eu, acabei torcendo o pé..."
1003103-133 = "Eh, Sensei? O-o que você está fazendo...!?"
1003103-134 = "(I-isso é um estilo noiva!? Que ousadia fazer isso na frente de todo mundo!?)"
1003103-135 = "[s3] \"Desculpe pela pressa, mas não podia te deixar aí.\"\n[s4] \"Ah, desculpe, você não gostou?\""
1003103-136 = "N-não é que eu não tenha gostado...!"
1003103-137 = "N-não é que eu não tenha gostado...!"
1003103-138 = "Não é nada demais, é só que, bem..."
1003103-139 = "S-Sensei, não precisava chegar a esse ponto...!"
1003103-140 = "[s] \"Você está machucada, então fique quieta.\""
1003103-141 = "..."
1003103-142 = "S-sim..."
1003103-143 = "Bem, então, por favor..."
1003103-145 = "(Carreguei Aru no colo para fora do salão de festas e decidimos descansar um pouco em frente ao prédio)"
1003103-148 = "J-já chega de me carregar assim! Tem gente olhando e é vergonhoso!"
1003103-149 = "Meu pé já não dói tanto assim...!"
1003103-150 = "Haa..."
1003103-154 = "Sensei, sobre isso..."
1003103-155 = "[s5] \"Desculpe, acho que tentei parecer legal demais.\"\n[s6] \"É que a sua reação foi tão inesperada que eu acabei fazendo sem pensar.\""
1003103-158 = "Ei, espera aí!?"
1003103-159 = "Haa, estou exausta de repente... Bem, acho que a culpa foi minha por tentar me exibir, para começo de conversa..."
1003103-160 = "No fim das contas, não consegui mostrar uma imagem legal para o Sensei..."
1003103-161 = "[s] \"Eu acho que você é sempre legal, Aru.\""
1003103-162 = "！？"
1003103-163 = "V-você diz essas coisas com tanta naturalidade de novo...!?"
1003103-164 = "De qualquer forma, as coisas ficaram bem bagunçadas desta vez, mas..."
1003103-165 = "Bem, vou considerar que isso compensa o que aconteceu antes."
1003103-166 = "Além disso, não adianta se arrepender do que já passou. Da próxima vez, vou mostrar o quão legal eu sou!"
1003103-167 = "[s] \"Sim, estou ansioso por isso.\""
1003103-168 = "O quê, por que você diz desse jeito de novo... Ah, chega! Você disse, hein? Eu definitivamente vou te mostrar!"
1003103-169 = "Bem, se você é do meu ramo, eu ficaria preocupada se não tivesse esse nível de técnica de conversa...!"
1003103-170 = "Então, combinado..."
1003103-171 = "Da próxima vez,"
1003103-172 = "você vai me escoltar. Sensei♪"
