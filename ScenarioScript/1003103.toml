[translation]
1003103-1 = "見せたい背中"
1003103-3 = "（時間通りに、約束への場所へと到着）"
1003103-4 = "（見渡してみると、すぐにアルが見つかった）"
1003103-6 = "……この格好、変じゃないわよね？"
1003103-7 = "まあ、私の素晴らしいセンスに間違いなんて無いでしょうけど……"
1003103-8 = "……どこかに鏡とか無いかしら。"
1003103-9 = "[s] \"アル、お待たせ。\""
1003103-10 = "ひょわぁっ！？"
1003103-11 = "せ、先生！いつの間に！？びっくりしたじゃない……"
1003103-12 = "でも、時間通りというのは流石ね！"
1003103-13 = "今日は遅刻なんてするわけにいかないもの、なんたって――"
1003103-14 = "[s] \"……。\""
1003103-15 = "……先生？"
1003103-16 = "な、なによ、そんなまじまじと見て……"
1003103-19 = "（……ふふっ、計画通り！先生、私に見惚れてるわね！？高い金額を払った甲斐があったわ、この豪華な生地から生み出される気品！）"
1003103-20 = "（これなら、認めざるを得ないでしょう……）"
1003103-21 = "（私の素晴らしいビジネスセンス。そしてあの時、私は決して店員に騙されたわけではないということを……！）"
1003103-22 = "[s] \"アル、その着物――\""
1003103-23 = "た、たたたたたタイム！まだ！まだそれは、心の準備が……！"
1003103-24 = "（やっぱり感想を直接聞くのは無理！）"
1003103-25 = "（見惚れてるはず、それは間違いない。間違いないのだけど……万が一、絶対そんなことは無いと思っていても……）"
1003103-26 = "（先生からもし、変だとか似合ってないとか、そんなことを言われた日には……）"
1003103-29 = "……ふぅ、よし！"
1003103-30 = "こほん。あのね先生、モモトークでも言ったけれど、今日は上品で大事な席に向かうの。とにかくまずはそのことを考えましょう。"
1003103-31 = "今回とあるコネで、招待状を貰ったの。"
1003103-32 = "……え？もうその時点で怪しい？し、失礼ね！"
1003103-33 = "キヴォトスでも有数の実業家がお正月に開く、特別なディナーパーティーの招待状なのよ！？"
1003103-34 = "[s1] \"なるほど、だから着物で向かうってことだね。\"\n[s2] \"上品な席って、そういう意味だったんだ。\""
1003103-35 = "ええ、そうよ！やはりあの時、着物をレンタルしておいて良かったわ。"
1003103-36 = "ええ、そうよ！やはりあの時、着物をレンタルしておいて良かったわ。"
1003103-37 = "こういう偶然もまた、ある意味では未来を見通す先見の明、ビジネスには欠かせないセンス……！"
1003103-41 = "あっ、こうしてる場合じゃないわね。さあ先生、早く行きましょう！パーティーに遅れるわけにはいかないわ♪"
1003103-44 = "どう、すごいでしょう？"
1003103-45 = "キヴォトスの中でもかなり有名な実業家たちが、一堂に会するパーティーよ。"
1003103-46 = "これから先の事業のアイデアについて、各分野で名の知れた人たちが意見を交わす場所でもあるわ。"
1003103-47 = "つまりここにいれば、そうやって飛び交う会話の中から新しい事業のヒントが見つかったり、新規の顧客を見つけることだってできるのよ？"
1003103-48 = "[s] \"そんなすごいパーティーの招待状が、アルのところに……。\""
1003103-49 = "ふふっ。なんたって私は「便利屋68」の社長にしてリーダー、[ruby=りくはちま]陸八魔[/ruby]アルよ？まあ、ようやく私を認める人が出てきたってところね。"
1003103-50 = "[s] \"アルはすごいね。\""
1003103-51 = "そ、そうかしら？本当にすごいって思う！？先生からそう見えるなら、やっぱり私も徐々に……！"
1003103-54 = "（あっ、せっかくならここで先生に、私のかっこいい姿をアピールすれば……！）"
1003103-55 = "（まだ着物の感想は聞けてないけれど、どちらにせよ私のことを見直して、誉め言葉をかけてくれるはず！）"
1003103-58 = "ふふんっ、もっと褒めてくれても良いのよ？何せこの盛大なパーティーには、我々便利屋68の顧客たちもいるんだから。"
1003103-59 = "今日はそのケアというか、お話というか……"
1003103-60 = "そ、そう、事業の話！この先の展望とか話しておかないとね！"
1003103-61 = "「便利屋68」は今、ものすごく大事なビジネスの準備をしてるのよ。そのためにも会っておかないと！"
1003103-62 = "ああ忙しい……お正月からあくせく働く私を見て、もっと感心してくれても良いわよ？"
1003103-63 = "[s] \"年始から大変だね。せっかくだし、アルの顧客にも会ってみたいな。\""
1003103-64 = "ふふっ、まあ楽しみにしていると良いわ。"
1003103-65 = "難しい話をするかもしれないけれど、私の実業家としての力量、とくとご覧なさい！"
1003103-66 = "ふふふっ！"
1003103-67 = "ふ、ふふっ……"
1003103-68 = "……"
1003103-71 = "（もしかしなくても、やっちゃったわね！？）"
1003103-72 = "（そもそも招待状だって偶然手に入ったんだから、会わなきゃいけない顧客なんているわけないじゃない！）"
1003103-73 = "（調子に乗り過ぎたわ……何とか今から訂正を……）"
1003103-74 = "（で、でも今さら話を変えたら、あまりにも格好悪いような……！？）"
1003103-75 = "[ns] \"その顧客の方、もうどこかにいたりする？\""
1003103-76 = "え、えっと、それは……"
1003103-77 = "（ど、どうしましょう……！？）"
1003103-78 = "（……良いこと思いついたわ！もともと会うはずだったけれど、残念ながら来られなかったってことにして……）"
1003103-79 = "（そうね、その設定なら切り抜けられるわ！）"
1003103-80 = "そ、それがね先生。さっき名簿を調べてたら、どうやらパーティーに出られなくなったみたいで……"
1003103-81 = "……え？名前？その顧客の……？"
1003103-82 = "そ、それはね、えーっと……名前というかその、私たちの業界では個人情報の観点からニックネームで呼んだりしてて……"
1003103-83 = "その……「鏡もち伯爵」、だったかしら？"
1003103-88 = "おおっ、今回は来ていただけたのですな。鏡もち伯爵。"
1003103-89 = "おやおや！いや久しぶりですな、お節丸社長！"
1003103-90 = "「鏡もち伯爵」いたーーーーー！？本当にいるの！？嘘でしょう！？"
1003103-91 = "……はっ！いや、その、何と言うか……"
1003103-92 = "ま、まあ確かに、顧客だから挨拶はしないといけないのだけど……えっと……"
1003103-93 = "ま、待ってて先生。ちょっとだけ、お話を……"
1003103-94 = "（ど、どうすれば！？でたらめに考えた名前だったのに本当にいるなんて！この状況、いったいどうやって切り抜けたら……！？）"
1003103-105 = "……おや？"
1003103-106 = "お嬢さん、私たちに何がご用でも？"
1003103-107 = "え、えっと、ですね……"
1003103-111 = "（……や、やっぱり無理ぃっ！）"
1003103-112 = "しっ、失礼しましたーーー！！"
1003103-114 = "あっ――"
1003103-118 = "痛たたた……って先生！？"
1003103-119 = "わ、私、先生の上に倒れこんで……！？ご、ごめんなさい、この履物にまだ慣れてなくって……！"
1003103-123 = "痛っ……！？"
1003103-124 = "私としたことが、足をくじいたみたいね……。"
1003103-133 = "え、先生？な、何を……！？"
1003103-134 = "（こ、これ、お姫様抱っこ！？み、みんなが見てる前で何て大胆なことを！？）"
1003103-135 = "[s3] \"急にごめん、でも放っておくわけにはいかないよ。\"\n[s4] \"あ、ごめん、嫌だった？\""
1003103-136 = "べ、別に嫌がってるわけじゃないわよ……！？"
1003103-137 = "べ、別に嫌がってるわけじゃないわよ……！？"
1003103-138 = "これくらい何でもないって言うか、その……"
1003103-139 = "せ、先生がここまでする必要は……！"
1003103-140 = "[s] \"怪我してるんだから、安静にしてて。\""
1003103-141 = "……"
1003103-142 = "は、はい……。"
1003103-143 = "えっと、じゃあ、お願い……。"
1003103-145 = "（そのままアルを抱えてパーティー会場を出て、ビルの前で少し休むことにした）"
1003103-148 = "も、もうそろそろお姫様抱っこは良いから！人目もあるし恥ずかしいわよ！"
1003103-149 = "もう足もあんまり痛くないし……！"
1003103-150 = "はぁ……。"
1003103-154 = "先生、その……。"
1003103-155 = "[s5] \"ごめん、ちょっとカッコつけすぎたかも。\"\n[s6] \"アルの反応が新鮮だったこともあって、つい。\""
1003103-158 = "ちょっとぉ！？"
1003103-159 = "はあ、何だかどっと疲れたわ……まあ、私が見栄を張ったのがそもそもってかんじはするけれど……。"
1003103-160 = "結局、先生にかっこいい姿を見せられなかったし……。"
1003103-161 = "[s] \"アルはいつもカッコ良いと思うよ？\""
1003103-162 = "！？"
1003103-163 = "ま、また平気でそういうことを……！？"
1003103-164 = "とにかく、今回は何だか色々ごちゃごちゃしたけれど……。"
1003103-165 = "まあ、さっきのと合わせてチャラってことにさせてもらうわ。"
1003103-166 = "それに、過ぎたことを悔やんでも仕方ないわね。また今度ちゃんと、私のカッコよさを見せつけてやるんだから！"
1003103-167 = "[s] \"うん、楽しみにしてる。\""
1003103-168 = "なっ、んでそういう風にまた……ああもう、言ったわね。絶対に見せてやるわよ！？"
1003103-169 = "まあ私の同業者なら、それくらいの会話テクニックを持っててくれないと困るのだけれど……！"
1003103-170 = "じゃあ、そういうことで……"
1003103-171 = "また今度、"
1003103-172 = "エスコートしてもらうわよ。先生♪"
