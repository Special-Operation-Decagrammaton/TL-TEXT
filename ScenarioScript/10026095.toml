[translation]
10026095-2 = "……Ufa. Conseguimos resolver isso."
10026095-3 = "Tantos assim... foi uma batalha muito intensa……."
10026095-4 = "Ugh…… é a última vez, né……? Não tem mais ninguém, né……?"
10026095-5 = "A caixa está intacta! Olhem só……!"
10026095-6 = "Acredito que não aparecerão mais nenhum……."
10026095-7 = "Ah, Hinata-san, essa caixa……"
10026095-8 = "Ah, sim! Aqui está……!"
10026095-12 = "……Então, vou abrir. Vamos conferir juntos, pessoal."
10026095-14 = "……Sim."
10026095-15 = "Fufu."
10026095-16 = "…………."
10026095-25 = "……?"
10026095-26 = "……Ué?"
10026095-27 = "Bem……"
10026095-28 = "……Não tem nada dentro, né?"
10026095-29 = "[s] \"……É verdade.\""
10026095-30 = "Por que enterrariam uma caixa vazia……?#nE ainda nos fazendo dar toda essa volta……."
10026095-35 = "……Na época em que enterraram isso, essa caixa provavelmente tinha um propósito."
10026095-37 = "……Um propósito, você diz?"
10026095-38 = "Sim…… acho que a Hanako-san está certa."
10026095-39 = "Observem bem. Há um pedaço de papel no canto da caixa. #nIsso é a prova."
10026095-40 = "Provavelmente, havia algum papel com algum significado aqui dentro……"
10026095-41 = "Mas parece que não foi feito nenhum tratamento de preservação. #nCom o passar do tempo, ele foi se desgastando gradualmente e perdeu a forma."
10026095-42 = "Também não estava hermeticamente fechado, então existe a possibilidade de ter sido comido por insetos."
10026095-43 = "Entendo…… então é possível deduzir tudo isso."
10026095-44 = "Mas, será que não tem como saber o que era esse papel……?"
10026095-45 = "……Não necessariamente."
10026095-46 = "O passado nos deixa mensagens de várias maneiras."
10026095-47 = "Claro, se algo concreto tivesse restado, seria melhor, mas……"
10026095-48 = "É verdade. Juntando as pistas que conseguimos na investigação de hoje……"
10026095-49 = "……Sim."
10026095-50 = "A caverna atrás da cachoeira era um depósito para esconder pertences pessoais sem que a Catedral descobrisse."
10026095-51 = "E o outro lugar que ainda não visitamos é, provavelmente, uma base secreta feita escondida da Catedral."
10026095-53 = "……?"
10026095-54 = "……Sim?"
10026095-56 = "Finalmente, os pontos se conectaram."
10026095-58 = "O que é decisivo é esta caixa."
10026095-59 = "Isso foi enterrado pelas pessoas do Conselho Estudantil que treinavam aqui na época……"
10026095-60 = "……Uma \"cápsula do tempo\", não é?"
10026095-61 = "[s] \"……Cápsula do tempo?\""
10026095-62 = "Sobre isso……"
10026095-63 = "……Pessoal."
10026095-64 = "Se não se importarem, eu……"
10026095-65 = "Tenho um pedido a fazer…… poderiam me ouvir……?"
