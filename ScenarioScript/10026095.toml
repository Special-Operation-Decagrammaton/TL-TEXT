[translation]
10026095-2 = "……ふう。なんとか片付きましたね。"
10026095-3 = "ここまで多いとは……とても激しい戦いでした……。"
10026095-4 = "うぅ……今度こそ最後だよね……？もう居ないよね……？"
10026095-5 = "箱は無事です！この通り……！"
10026095-6 = "さすがに、これ以上は出てこないかと……。"
10026095-7 = "あ、ヒナタさん、その箱を……"
10026095-8 = "あ、はい！どうぞ……！"
10026095-12 = "……では、開けます。皆さん、一緒に確認しましょう。"
10026095-14 = "……はい。"
10026095-15 = "ふふっ。"
10026095-16 = "…………。"
10026095-25 = "……？"
10026095-26 = "……あら？"
10026095-27 = "えっと……"
10026095-28 = "……何も入ってないですね？"
10026095-29 = "[s] \"……本当だ。\""
10026095-30 = "なぜ空の箱を埋めたのでしょうか……？#nそれも、こんなに遠回りをさせて……。"
10026095-35 = "……これを埋めた当時は、この箱にも役目があったのでしょう。"
10026095-37 = "……役目、ですか？"
10026095-38 = "はい……ハナコさんの言う通りかと。"
10026095-39 = "よく見てください。箱の隅に紙片が残っていますよね。#nこれが、その証拠です。"
10026095-40 = "おそらく、何らかの意味を持った紙が、この中に……"
10026095-41 = "ですが、防腐処理などは施されていなかったようですね。#n歳月に伴い、徐々に風化が進み、形を失っていったのでしょう。"
10026095-42 = "厳密に密閉されていたわけでもないですし、虫が食べてしまった可能性もありますね。"
10026095-43 = "なるほど……そこまで読み解けるものなのですね。"
10026095-44 = "でも、その紙がどんな物だったのかは、分からないのでしょうか……？"
10026095-45 = "……必ずしも、そうとは限りません。"
10026095-46 = "過去は私たちに、様々な方法でメッセージを残してくれています。"
10026095-47 = "もちろん、たしかな物が残っているのなら、それに越したことはありませんが……"
10026095-48 = "そうですね。今日の調査で掴んだ手がかりを、総合してみると……"
10026095-49 = "……はい。"
10026095-50 = "滝裏の洞窟は、大聖堂に見つからないよう、私物を隠しておいた保管庫。"
10026095-51 = "そして、まだ足を運んでいないもう一か所は、おそらく大聖堂の目を盗んで作った秘密基地でしょう。"
10026095-53 = "……？"
10026095-54 = "……はい？"
10026095-56 = "ようやく、点と点が繋がりました。"
10026095-58 = "決定的なのは、この箱。"
10026095-59 = "これは当時、ここで訓練をしていた聖徒会の方たちが埋めた……"
10026095-60 = "……「タイムカプセル」ですね。"
10026095-61 = "[s] \"……タイムカプセル？\""
10026095-62 = "その……"
10026095-63 = "……皆さん。"
10026095-64 = "よろしければ、その……"
10026095-65 = "ひとつ、お願いがあるのですが……聞いていただけませんか……？"
