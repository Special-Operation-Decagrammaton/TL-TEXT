[translation]
10039030-1 = "第3話;アイドルの道：ダンス"
10039030-3 = "……アイドルについて学びたい？"
10039030-4 = "別に良いけど、教えられるようなことあるかな。"
10039030-5 = "曲も衣装も、気づいたら用意されてたし……。"
10039030-6 = "そうだ、習ってる途中のダンスの振り付けなら教えられるよ～。"
10039030-7 = "気づいたら……？"
10039030-8 = "あ、それは本官がご説明します！#n実は私たちがアイドルイベントに参加する理由は、#n民間企業から支援要請が入ったからなんです。"
10039030-9 = "本官とフブキがよく利用するドーナッツ屋さんから、#n宣伝のためにアイドルをやってほしいと言われまして……。"
10039030-10 = "[s1] \"……支援要請？\"\n[s2] \"……それでアイドルに！？\""
10039030-13 = "はい、そうなのです！"
10039030-14 = "おかしな話でしょ？なんでドーナッツ屋さんの宣伝しなきゃいけないのさ……しかもアイドルの格好で……。"
10039030-15 = "上からの命令だし、仕方ないけどさ……。"
10039030-16 = "フブキ、これも市民対応の一環ですよ！"
10039030-17 = "市民の皆さんから、生活安全局が頼りにされている証拠ですし。"
10039030-18 = "仕事には変わりないじゃん……。"
10039030-19 = "それで、シスターさんはアイドルについて知りたいのですね？"
10039030-20 = "お役に立てるか分かりませんが、#nフブキが言うようにダンスの振り付けなら教えられると思います！"
10039030-21 = "たしか、こうでしたっけ……？"
10039030-27 = "……あれ。#nフブキ、やってみてくれませんか？"
10039030-28 = "えぇ？#n人目もあるし、私は遠慮しておくよ。"
10039030-29 = "おかしいですね、これで合っているはずですが……。"
10039030-31 = "……？"
10039030-32 = "[ns3] （練習中なのかな……？）\n[ns4] （何の動きなんだろう……？）"
10039030-35 = "……だ、大体こんな感じだった気がします。"
10039030-36 = "まぁ、私たちも何回かレッスンを受けただけだからね。"
10039030-37 = "おかげで、いつもの仕事は減らしてもらえたけど……。"
10039030-39 = "[ns5] （ダンスの練習も仕事のような……）\n[ns6] （慣れないダンスのほうが大変な気も……）"
10039030-42 = "先生もお察しの通り……。"
10039030-43 = "むしろ、サボれる時間が減って困ってるんだよね。"
10039030-45 = "フ～ブ～キ～！"
10039030-46 = "わ、分かったって。"
10039030-47 = "意外なところでダンスも役立つみたいだし、頑張ってみようかな。"
10039030-48 = "例えば、どんなところで……？"
10039030-49 = "何かあった時、人目を惹いて時間を稼げます！"
10039030-50 = "家族とはぐれてしまった子を保護した時などにも役立つはずです！"
10039030-51 = "……なるほど！"
10039030-52 = "時間を稼いでも、どうにもならない場合もあるけどねぇ。"
10039030-53 = "それより、シスターさんは――"
10039030-58 = "[ns7] \"この音は……。\"\n[ns8] \"警報！？\""
10039030-61 = "……事件です！#nフブキ、出動しますよ！"
10039030-63 = "えぇ、私たちは動かなくても良いんじゃない？"
10039030-64 = "だって、アイドル期間は――"
10039030-69 = "目の前で事件が起きてるんですから、見過ごすわけにはいきません！"
10039030-73 = "まずは現場の状況を……。"
10039030-74 = "もしかして、ドーナッツ屋さんが……。"
10039030-75 = "……？"
10039030-76 = "……どうしたのさ。"
10039030-77 = "宣伝を頼まれたお店ですか……？"
10039030-78 = "こうしてる場合ではありません！#nフブキ、早く行きましょう！"
10039030-79 = "いや、だから……って、うわっ！"
10039030-93 = "動くな、大人しくしてろ！"
10039030-94 = "痛い目に遭いたくなかったら、さっさとドーナッツを寄越せ！"
10039030-95 = "ひぃっ、どうか命だけは……！"
10039030-96 = "ドーナッツさえ渡せば、危害を加える気はねぇよ。#nだからさっさとしろってんだ！"
10039030-97 = "で、ではまずお会計を……！"
10039030-98 = "ナメてんのかタコ！"
10039030-99 = "ててて、店長は今日不在でして……！"
10039030-100 = "コイツ、話通じねぇな。"
10039030-101 = "チッ、このままじゃ……。"
10039030-102 = "おい、来たぞ！"
10039030-103 = "クソ、今日はやけに早くないか？"
10039030-104 = "こうなった以上、こいつを人質にして立てこもるか……#nなんなら逃亡用の車両もゲットできるかもしれないし。"
10039030-106 = "うぅ、どうして……。"
10039030-107 = "おめーのせいだろ！"
10039030-108 = "えっ……？#n強盗に来たあなたたちのせいですよね！"
10039030-110 = "……たしかに。"
10039030-111 = "納得してる場合か！"
10039030-113 = "フブキ、立てこもり事件のようです！"
10039030-114 = "その割には怪我人いなさそうだけど？"
10039030-119 = "ちょうど良いところに！"
10039030-120 = "事件が発生してから、20分以上経過しています！"
10039030-121 = "逃走用の車を要求されてまして……。"
10039030-123 = "公安局か警備局は動いてるの？"
10039030-124 = "来るはずですが、時間がかかるようで……。"
10039030-125 = "ここは私たちだけで何とかするしかありません。"
10039030-126 = "はぁ、結局こうなるなんてね。"
10039030-127 = "あれ、生活安全局のフブキちゃんじゃない？"
10039030-128 = "もしかして、いつもお世話になってるドーナッツ屋さんを助けるために！"
10039030-129 = "あのお店に依頼されて、今はアイドル活動もしてるんだっけ？"
10039030-130 = "いや、私は……。"
10039030-131 = "……あっ、フブキちゃん！"
10039030-132 = "こっちだよ、こっち！"
10039030-133 = "おい、静かにしてろ！"
10039030-134 = "ああもう、クソッ！"
10039030-135 = "た、助けにきたよ……？"
10039030-136 = "フブキもやる気になったのですね！"
10039030-137 = "では、急いで犯人を制圧して、人質を救出しなくては！"
10039030-138 = "何か良い方法はないでしょうか……！"
10039030-144 = "[ns9] \"ま、マリー……！\"\n[ns10] \"危ないよ！？\""
10039030-153 = "だ、誰だ！"
10039030-155 = "……トリニティのシスターか！？"
10039030-156 = "シスターフッドの奴が、どうしてこんなところに……。"
10039030-163 = "……？"
10039030-165 = "……？？？？？"
10039030-166 = "……何してんだ？"
10039030-171 = "これは……！"
10039030-173 = "お前は黙ってろ！#nおいシスター、何してんのかって聞いてんだよ！"
10039030-180 = "おい、黙ってないで答えろ！"
10039030-181 = "急に踊りだして、頭イカれちまったか？"
10039030-188 = "じ……。"
10039030-189 = "……じ？"
10039030-190 = "じっ！"
10039030-191 = "……じっ？"
10039030-192 = "時間を！"
10039030-193 = "時間を稼いでいます！"
10039030-199 = "……しまった！"
10039030-200 = "よしっ！"
10039030-205 = "バカ、逃がすな！"
10039030-206 = "皆さん、確保してください！"
10039030-221 = "本当に役立つとか……。"
10039030-222 = "……普通、思わないでしょ。"
