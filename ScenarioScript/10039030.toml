[translation]
10039030-1 = "Episódio 3; O Caminho da Idol: Dança"
10039030-3 = "……Você quer aprender sobre ser uma idol?"
10039030-4 = "Por mim tudo bem, mas não sei se tenho algo a ensinar."
10039030-5 = "As músicas e os trajes, tudo apareceu pronto do nada……."
10039030-6 = "Ah, já sei! Posso te ensinar a coreografia da dança que estou aprendendo~."
10039030-7 = "Do nada……?"
10039030-8 = "Ah, eu mesma explicarei isso! #nNa verdade, o motivo de estarmos participando deste evento de idols é porque recebemos um pedido de apoio de uma empresa privada."
10039030-9 = "A loja de donuts que eu e a Fubuki frequentamos nos pediu para sermos idols para fazer propaganda……."
10039030-10 = "[s1] \"……Pedido de apoio?\"\n[s2] \"……E por isso viraram idols!?\""
10039030-13 = "Sim, exatamente!"
10039030-14 = "É uma história estranha, né? Por que temos que fazer propaganda de uma loja de donuts…… e ainda por cima vestidas de idol……."
10039030-15 = "É uma ordem superior, então não tem jeito……."
10039030-16 = "Fubuki, isso também faz parte do atendimento aos cidadãos!"
10039030-17 = "É a prova de que a Divisão de Segurança Pública é confiável para todos os cidadãos."
10039030-18 = "No fim das contas, continua sendo trabalho……."
10039030-19 = "Então, a irmã quer saber sobre ser uma idol, não é?"
10039030-20 = "Não sei se serei de grande ajuda, mas #ncomo a Fubuki disse, acho que posso ensinar a coreografia!"
10039030-21 = "Se não me engano, era assim……?"
10039030-27 = "……Ué. #nFubuki, você poderia tentar?"
10039030-28 = "Hã? #nTem gente olhando, vou deixar passar dessa vez."
10039030-29 = "Que estranho, deveria estar certo……."
10039030-31 = "……?"
10039030-32 = "[ns3] （Será que estão treinando……？）\n[ns4] （Que tipo de movimento é esse……？）"
10039030-35 = "……É, acho que era mais ou menos assim."
10039030-36 = "Bem, nós só tivemos algumas aulas, afinal."
10039030-37 = "Graças a isso, conseguimos reduzir nosso trabalho habitual, mas……."
10039030-39 = "[ns5] （Treinar dança também parece trabalho……）\n[ns6] （Sinto que uma dança à qual não estou acostumada é mais difícil……）"
10039030-42 = "Como o Sensei percebeu……."
10039030-43 = "Na verdade, estou preocupada porque o tempo que tenho para vadiar diminuiu."
10039030-45 = "Fu~bu~ki~!"
10039030-46 = "Tá, tá, eu entendi."
10039030-47 = "Parece que a dança pode ser útil em situações inesperadas, então acho que vou me esforçar."
10039030-48 = "Por exemplo, em que tipo de situação……?"
10039030-49 = "Quando algo acontecer, podemos chamar a atenção das pessoas e ganhar tempo!"
10039030-50 = "Também deve ser útil ao proteger uma criança que se perdeu da família!"
10039030-51 = "……Entendo!"
10039030-52 = "Embora, às vezes, ganhar tempo não resolva nada."
10039030-53 = "Mas antes disso, a irmã……"
10039030-58 = "[ns7] \"Esse som é…….\"\n[ns8] \"Um alarme!?\""
10039030-61 = "……É uma ocorrência! #nFubuki, vamos entrar em ação!"
10039030-63 = "Hã? #nNão precisamos nos mover, precisamos?"
10039030-64 = "Porque, durante o período de idol……"
10039030-69 = "Um incidente está acontecendo bem na nossa frente, não podemos ignorar!"
10039030-73 = "Primeiro, vamos verificar a situação no local……."
10039030-74 = "Será que a loja de donuts……."
10039030-75 = "……?"
10039030-76 = "……O que foi?"
10039030-77 = "É a loja que pediu a propaganda……?"
10039030-78 = "Não temos tempo para isso! #nFubuki, vamos logo!"
10039030-79 = "Não, espera…… ei, uau!"
10039030-93 = "Não se mova, fique quieto!"
10039030-94 = "Se não quiser se machucar, passe os donuts logo!"
10039030-95 = "Iiiih, por favor, poupe minha vida...!"
10039030-96 = "Se entregar os donuts, não vou te machucar.#nEntão anda logo com isso!"
10039030-97 = "E-então, primeiro o pagamento...!"
10039030-98 = "Tá tirando com a minha cara, seu idiota?!"
10039030-99 = "A-ai ai, o gerente não está hoje...!"
10039030-100 = "Esse cara não entende nada."
10039030-101 = "Droga, desse jeito..."
10039030-102 = "Ei, eles chegaram!"
10039030-103 = "Droga, não estão chegando cedo demais hoje?"
10039030-104 = "Já que chegamos a esse ponto, vamos fazer essa pessoa de refém e nos barricar...#nTalvez até consigamos um veículo para fugir."
10039030-106 = "Ué, por que..."
10039030-107 = "A culpa é sua, não é?!"
10039030-108 = "Hã...?#nA culpa é de vocês que vieram assaltar!"
10039030-110 = "……Verdade."
10039030-111 = "É hora de concordar com isso?!"
10039030-113 = "Fubuki, parece ser um caso de sequestro!"
10039030-114 = "Mas não parece ter ninguém ferido, não é?"
10039030-119 = "Que bom que chegaram!"
10039030-120 = "Já se passaram mais de 20 minutos desde que o incidente começou!"
10039030-121 = "Eles estão exigindo um carro para fugir..."
10039030-123 = "O Departamento de Segurança Pública ou a Delegacia estão agindo?"
10039030-124 = "Deveriam estar vindo, mas parece que vai demorar..."
10039030-125 = "Teremos que resolver isso nós mesmas."
10039030-126 = "Ah, no fim das contas, sempre acaba assim."
10039030-127 = "Ué, não é a Fubuki, do Departamento de Segurança?"
10039030-128 = "Será que ela veio para salvar a loja de donuts que sempre nos atende!"
10039030-129 = "Você não foi contratada por essa loja e agora está até fazendo atividades de idol?"
10039030-130 = "Não, eu..."
10039030-131 = "……Ah, Fubuki!"
10039030-132 = "É por aqui, por aqui!"
10039030-133 = "Ei, fiquem quietos!"
10039030-134 = "Ah, droga, que saco!"
10039030-135 = "E-eu vim ajudar...?"
10039030-136 = "A Fubuki também se animou, não é!"
10039030-137 = "Então, precisamos subjugar os criminosos rapidamente e resgatar os reféns!"
10039030-138 = "Não existe algum método melhor...!"
10039030-144 = "[ns9] \"M-Marie...!\"\n[ns10] \"É perigoso!\""
10039030-153 = "Q-quem é você!"
10039030-155 = "……Uma irmã de Trinity!?"
10039030-156 = "O que alguém da Sisterhood está fazendo aqui..."
10039030-163 = "……?"
10039030-165 = "……?????"
10039030-166 = "……O que você está fazendo?"
10039030-171 = "Isso é...!"
10039030-173 = "Fique quieta!#nEi, irmã, eu perguntei o que você está fazendo!"
10039030-180 = "Ei, não fique calada, responda!"
10039030-181 = "Começou a dançar do nada, ficou maluca?"
10039030-188 = "J..."
10039030-189 = "……te?"
10039030-190 = "te!"
10039030-191 = "……te?"
10039030-192 = "Tempo!"
10039030-193 = "Estou ganhando tempo!"
10039030-199 = "……Droga!"
10039030-200 = "Isso!"
10039030-205 = "Idiota, não deixe escapar!"
10039030-206 = "Pessoal, capturem eles!"
10039030-221 = "Que isso realmente seria útil……"
10039030-222 = "……Normalmente, ninguém pensaria nisso, né."
