[translation]
1006702-1 = "理由は後から"
1006702-4 = "[ns] \"なるほど……大体の事情は分かったよ。\""
1006702-5 = "ご理解いただきありがとうございます、先生。"
1006702-6 = "この[ruby=あすま]飛鳥馬[/ruby]トキが、全力で先生をお守りいたしますので。"
1006702-7 = "[ns] \"ありがとう。トキのことは信じてるんだけど……\""
1006702-8 = "はい、これは重要な任務です。#nそれも2人1組のペアでなければ参加できない、秘密のパーティー。"
1006702-9 = "ですから、会場の豪華クルーズ船に潜入するためには、先生の存在が必要不可欠です。"
1006702-10 = "何か質問がございましたら、今の内になんなりとお申し付けください。"
1006702-11 = "[ns] \"トキの役に立てるのは嬉しいんだけど……\""
1006702-14 = "[ns] \"その、どうしてそんな格好を……？\""
1006702-17 = "愚問ですね、先生。"
1006702-18 = "C&Cの潜入任務における正式衣装はバニーと相場が決まっておりますので。"
1006702-19 = "誰に聞いたのか、ですか……？#n私たちC&Cにとっては常識なのですが。"
1006702-20 = "たしかに、いくら先生といえどC&Cに所属していなければ、知らなくとも無理はありませんね。配慮が足りず、大変失礼いたしました。"
1006702-21 = "[s] \"そ、そうなんだね……教えてくれてありがとう……。\""
1006702-22 = "先生の疑問を解消できてなによりです。"
1006702-23 = "それでは、クルーズ船に乗り込みましょう。#n一秒も無駄には出来ません。"
1006702-24 = "[s3] \"その……もう少し、周囲の目とか……\"\n[s4] \"世間体とかを、考慮してもらえると……\""
1006702-27 = "それは任務遂行に必要なものですか？"
1006702-28 = "余計なことを考えていては、支障をきたしますよ？"
1006702-32 = "急ぎましょう、時間がありません。"
1006702-34 = "（いつもより軽やかな足取りのトキと並んで、クルーズ船に向かった……）"
1006702-40 = "豪華クルーズ船"
1006702-48 = "無事、パーティー会場に到着しましたね。"
1006702-49 = "私の腕に手を添えてください。#n完璧にエスコートいたします。"
1006702-50 = "周囲の視線が私たちに集まっておりますね……まさか、気づかれてしまったのでしょうか？"
1006702-51 = "……これは由々しき事態ですね。#n計画を変更しなくてはなりません。"
1006702-54 = "あの人、パートナーにあんな格好をさせるなんて……"
1006702-55 = "個人の「趣味」に他人がアレコレ言うもんじゃないが、流石に……"
1006702-56 = "人前であんな格好をするなんて……"
1006702-57 = "キヴォトスの行く末が心配ですな……"
1006702-60 = "[ns] \"……たぶん、気づかれたとかではないと思うよ。\""
1006702-61 = "本当でしょうか……？"
1006702-62 = "[s] \"ただ、代わりに私の社会的な地位が……\""
1006702-63 = "であれば、問題ありません。#n社会的地位とは、相手の見方によって異なるものです。"
1006702-64 = "いずれにせよ、今考える案件ではありません。"
1006702-65 = "え？物理的だけでなく、精神的にも守ってほしい……？"
1006702-66 = "つまり、24時間そばに……先生は難しいことを仰りますね。"
1006702-75 = "（堂々と歩くトキにエスコートされながら、パーティー会場を回った）"
1006702-76 = "（好奇の眼差しを向けられても、トキは表情ひとつ変えなかったが……私の世間体は地の底に……）"
1006702-78 = "！？#n先生、ご注意ください。"
1006702-79 = "あちらです……ターゲットが姿を現しました。"
1006702-87 = "当初は、手下の動きを見張るだけの予定でしたが……"
1006702-88 = "ターゲット自ら姿を現すとは……私としても想定外です。"
1006702-89 = "ここは計画通り、偵察に専念すべきか……#nそれとも、この好機を逃さず、事に当たるべきか……"
1006702-90 = "……"
1006702-91 = "先生。"
1006702-97 = "私がお迎えに上がるまで、隠れていてください。"
1006702-98 = "ここから動かないでくださいね。#n約束ですよ。"
1006702-100 = "（そう告げるや否や、トキはパーティー客の波の中に一瞬で姿を消した）"
1006702-101 = "（そして……）"
1006702-103 = "ドカァァン！！"
1006702-106 = "な、なんだ！？SPは何をしている！"
1006702-122 = "多少の騒ぎは起きてしまいましたが、無事、任務を達成しました。"
1006702-123 = "C&Cであると事情を明かしたからもあるのでしょうか。"
1006702-127 = "ところで、勘違いかもしれませんが……"
1006702-128 = "私たちに向けられる視線の量が、いささか増えたような……"
1006702-129 = "何故でしょうか、先生？"
1006702-130 = "[s] \"まあ、そんな格好してたらね……\""
1006702-131 = "そう……ですか。"
1006702-132 = "……"
1006702-133 = "私のバニー姿は、そんなに似合っていないのでしょうか……"
1006702-134 = "（トキは怯えたウサギのような瞳を向けてくる）"
1006702-135 = "（……正直な気持ちを話すことにした）"
1006702-136 = "[ns] \"むしろ、これ以上ないくらい似合ってたよ。\""
1006702-137 = "似合っていたのなら……何故？"
1006702-138 = "……"
1006702-139 = "ふむ……理解しました。#nそういうことでしたか。"
1006702-140 = "[s] \"何をどう理解したの！？\""
1006702-141 = "私があまりにも似合っていたから、#n注目の的になってしまったという事ですよね？"
1006702-146 = "なぜ沈黙するのですか……？#nああ、疑問を挟む余地がないのですね。"
1006702-147 = "当然です。#n私は完璧かつ最高のメイドであり、エージェントですから……ぴょん。"
1006702-152 = "それでは先生、行きましょうか。"
1006702-153 = "[s] \"どこに……？\""
1006702-154 = "任務を終えましたので、早く戻らなくては。"
1006702-155 = "もしかして、別の事を想像されましたか？"
1006702-156 = "違うなら良いのですが。"
1006702-165 = "参りましょう。私がエスコートいたします。"
1006702-167 = "（得意気な表情のトキと腕を組みながら、シャーレに戻った）"
