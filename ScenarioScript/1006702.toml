[translation]
1006702-1 = "A razão virá mais tarde"

1006702-4 = "[ns] \"Entendo... entendo a situação geral.\""

1006702-5 = "Obrigado pela sua compreensão, senhor."

1006702-6 = "Este Toki irá protegê-lo com todas as suas forças."

1006702-7 = "[ns] \"Obrigado. Eu acredito em Toki...\""

1006702-8 = "Sim, esta é uma missão importante. #nÉ uma festa secreta da qual apenas duas pessoas podem participar."

1006702-9 = "Portanto, a presença de um professor é fundamental para se infiltrar no cruzeiro de luxo no local."

1006702-10 = "Se você tiver alguma dúvida, informe-nos imediatamente."

1006702-11 = "[ns] \"Estou feliz em poder ajudar o Toki...\""

1006702-14 = "[ns] \"Hum, por que você está vestido assim...?\""

1006702-17 = "Essa é uma pergunta estúpida, senhor."

1006702-18 = "O traje oficial das missões de infiltração C&C geralmente é um coelho."

1006702-19 = "Para quem você perguntou...? #nÉ bom senso para nós da C&C."

1006702-20 = "Certamente, por melhor que seja o professor, se ele não pertence ao C&C, não é absurdo que ele não saiba disso. Peço desculpas por não ser atencioso o suficiente."

1006702-21 = "[s] \"Ah, isso mesmo...Obrigado por me avisar...\""

1006702-22 = "Fico feliz por ter conseguido tirar as dúvidas do professor."

1006702-23 = "Agora vamos embarcar no navio de cruzeiro. #nNão podemos perder nem um segundo."

1006702-24 = "[s3] \"Bem... acho que você deveria levar em consideração as opiniões das pessoas ao seu redor...\"\n[s4] \"Eu gostaria que você considerasse coisas como respeitabilidade...\""

1006702-27 = "É necessário cumprir a missão?"

1006702-28 = "Se você pensar em coisas desnecessárias, terá problemas, certo?"

1006702-32 = "Vamos nos apressar, não temos tempo."

1006702-34 = "(Fui para o navio de cruzeiro ao lado de Toki, que estava dando passos mais leves que o normal...)"

1006702-40 = "navio de cruzeiro de luxo"

1006702-48 = "Você chegou com segurança ao local da festa."

1006702-49 = "Por favor, coloque sua mão no meu braço. #nVamos acompanhá-lo perfeitamente."

1006702-50 = "Os olhos daqueles que nos rodeiam estão focados em nós...talvez eles tenham nos notado?"

1006702-51 = "...Esta é uma situação grave. #nTemos que mudar nossos planos."

1006702-54 = "Como ele pôde fazer seu parceiro se vestir assim..."

1006702-55 = "Não espero que outros critiquem meus \"hobbies\" pessoais, mas..."

1006702-56 = "Como você pode se vestir assim em público..."

1006702-57 = "Estou preocupado com o destino de Kivotos..."

1006702-60 = "[ns] \"...Acho que eles não perceberam.\""

1006702-61 = "É verdade...?"

1006702-62 = "[s] \"No entanto, meu status social...\""

1006702-63 = "Se sim, não há problema. #nO status social difere dependendo de como os outros veem você."

1006702-64 = "De qualquer forma, esta não é uma questão a considerar neste momento."

1006702-65 = "foto? Você quer estar protegido não só fisicamente, mas também mentalmente?"

1006702-66 = "Ou seja, você estará ao meu lado 24 horas por dia...Você diz algo difícil."

1006702-75 = "(Eu andei pelo local da festa enquanto era escoltado por Toki, que caminhava com confiança.)"

1006702-76 = "(Mesmo sendo olhado com curiosidade, Toki não mudou em nada sua expressão... mas minha respeitabilidade estava no fundo...)"

1006702-78 = "! ? #nProfessor, por favor tenha cuidado."

1006702-79 = "Pronto... o alvo apareceu."

1006702-87 = "A princípio, o plano era apenas ficar de olho nos movimentos de seus subordinados, mas..."

1006702-88 = "Para o alvo aparecer... isso estava além das minhas expectativas."

1006702-89 = "Devo me concentrar no reconhecimento conforme planejado...#nOu devo aproveitar esta oportunidade e me envolver..."

1006702-90 = "……"
1006702-91 = "professor."

1006702-97 = "Por favor, fique escondido até que eu vá buscá-lo."

1006702-98 = "Por favor, não saia daqui. #nÉ uma promessa."

1006702-100 = "(Assim que Toki disse isso, ele desapareceu instantaneamente na onda de convidados da festa.)"

1006702-101 = "(e……)"

1006702-103 = "Bum! !"

1006702-106 = "O-o que! ? O que SP está fazendo?"

1006702-122 = "Embora tenha havido alguma comoção, cumprimos com sucesso a nossa missão."

1006702-123 = "Eu me pergunto se é porque eles revelaram que era C&C."

1006702-127 = "A propósito, posso estar errado, mas..."

1006702-128 = "Parece que a quantidade de olhares direcionados para nós aumentou um pouco..."

1006702-129 = "Por que, senhor?"

1006702-130 = "[s] \"Bem, se você estivesse vestido assim...\""

1006702-131 = "é assim mesmo."

1006702-132 = "……"
1006702-133 = "Talvez meu visual de coelho não combine comigo..."

1006702-134 = "(Toki me olha como um coelho assustado)"

1006702-135 = "(...eu decidi te contar meus sentimentos honestos)"

1006702-136 = "[ns] \"Na verdade, não poderia ter sido um ajuste melhor.\""

1006702-137 = "Se ficou bem em você... por quê?"

1006702-138 = "……"
1006702-139 = "Hmm... eu entendo. #nFoi isso que você quis dizer?"

1006702-140 = "[s] \"O que você entendeu!?\""

1006702-141 = "Porque eu estava tão bem, #nEu me tornei o centro das atenções, certo?"

1006702-146 = "Por que você está em silêncio...? #nAh, não há margem para dúvidas."

1006702-147 = "Claro. #nSou a melhor e perfeita empregada e agente... Pyon."

1006702-152 = "Sensei, vamos."

1006702-153 = "[s] \"Onde...?\""

1006702-154 = "Concluí minha missão, então devo retornar em breve."

1006702-155 = "Talvez você estivesse imaginando outra coisa?"

1006702-156 = "Eu gostaria que fosse diferente."

1006702-165 = "Vamos. Eu vou acompanhá-lo."

1006702-167 = "(Ele voltou para a placa de Petri, de braços dados com Toki que parecia orgulhoso.)"

