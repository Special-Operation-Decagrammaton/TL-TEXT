[translation]
11140-2 = "第14話;出動！覆面水着団（２）"
11140-3 = "銀行"
11140-7 = "お待たせいたしました、お客様。"
11140-8 = "なにが「お待たせしました」よ！本当に待ったわよ！6時間も！ここで！！"
11140-9 = "融資の審査に、なんで半日もかかるの！？別にうちより先に人もいなさそうだったのに！"
11140-10 = "私の連れは待ちくたびれて、そこのソファーで寝ちゃってるし！"
11140-11 = "私どもの内々の事情でして、ご了承ください。"
11140-12 = "……ところで、アル様。あなたはそのような態度を取れる状況ではないと思うのですが？"
11140-13 = "あ、うう……。"
11140-14 = "当行の助けが必要なら、辛抱強くお待ちいただくことも大事かと。#n……あ、それとお連れの方ですが、そちらでお休みになられては困ります。"
11140-15 = "（パチンッ）セキュリティ。あの浮浪者……いえ、お客様を起こして差し上げなさい。"
11140-17 = "ほら、起きた起きた！"
11140-18 = "むにゃ……。"
11140-19 = "うはっ！？なになに！？"
11140-20 = "（パチッ）……！！"
11140-21 = "ああっ……す、すみませんっ、居眠りしてすみません！！"
11140-23 = "……。"
11140-24 = "さて、では一緒にご確認を。お名前は……[ruby=りくはちま]陸八魔[/ruby]アル様。#nゲヘナ学園の2年生ですね。"
11140-25 = "現在、便利屋68の社長、ですか……#nこの便利屋は、ペーパーカンパニーではありませんか？書類上では、財政が破綻していますが？"
11140-26 = "ちゃ、ちゃんと稼いでるわよ！まだ依頼料を回収できてないだけで……。"
11140-27 = "それと、従業員は社長を含めて4名のみですが、室長に課長、そして平社員……#n肩書きの無駄遣いでは？会社ごっこでもしているのですか？"
11140-28 = "そ、それは……か、肩書きがあったほうが仕事の依頼を……。"
11140-29 = "あとですね、必要以上に事務所の賃貸料が高いです。#n財政状況に合った物件を見つけていただかないと。"
11140-30 = "ちゃ、ちゃんとしたオフィスのほうが……仕事の依頼を……。"
11140-31 = "……。"
11140-32 = "アル様。これでは、融資は難しいですね。"
11140-33 = "えっ、えーっ！？"
11140-34 = "まずは、より堅実な職に就いてみてはいかがでしょうか。日雇いや期間工など、手っ取り早く始められるものもありますが。"
11140-35 = "は？はああ！？"
11140-38 = "（プルプル）"
11140-39 = "（ムカつく……もう大暴れして、銀行のお金を持ち出しちゃおうかしら？）"
11140-40 = "（……いや、それはダメね。ここからお金を持ち出せたとしても、ブラックマーケットから抜け出すのは至難の業。あちこちにマーケットガードがいるし……）"
11140-41 = "（……でも、もしかすると、実は大したことない連中かもしれない。#n私たち4人なら、全員叩きのめして逃げ切れそうな気も……）"
11140-42 = "（……はぁ、やっぱ無理。ブラックマーケットを敵に回すなんて、#nそんな勇気ないわ……）"
11140-43 = "（くそっ、何よこれ、情けない……キヴォトスいちのアウトローになるって心に決めたのに。私は……）"
11140-44 = "（融資だのなんだの……こんなつまらないことばかりに悩まされて……）"
11140-45 = "（私が望んでいるのはこれじゃない……何事にも恐れず、何事にも縛られない、ハードボイルドなアウトロー……）"
11140-47 = "（そうなりたかったのに……）"
11140-48 = "……様、アル様！"
11140-49 = "わ、わわっ！？は、はいっ！？……えっと、何か言った？"
11140-50 = "融資の承認は下りませんでした。お力になれず申し訳ありません。"
11140-51 = "え、ええっ！？ちょ、ちょっと待ってよ！！"
11140-52 = "（パッ！）"
11140-53 = "な、何事ですか？停電！？"
11140-54 = "い、一体誰が！？パソコンの電源も落ちてるじゃないか！"
11140-55 = "（ダダダダダダダッ！ダダダダダダダッ！！）"
11140-56 = "銃声っ！？"
11140-59 = "うわっ！ああああっ！"
11140-60 = "うわああっ！"
11140-63 = "なっ、何が起きて……うああっ！！"
11140-65 = "（パッ！）"
11140-67 = "（ドドン！）"
11140-70 = "全員その場に伏せなさい！持っている武器は捨てて！"
11140-71 = "言うこと聞かないと、痛い目にあいますよ☆"
11140-72 = "あ、あはは……みなさん、ケガしちゃいけないので……伏せてくださいね……。"
11140-74 = "ぎ、銀行強盗！？"
11140-75 = "非常事態発生！非常事態発生！"
11140-76 = "うへ～無駄無駄ー。#n外部に通報される警備システムの電源は落としちゃったからねー。"
11140-77 = "ひ、ひいっ！"
11140-78 = "ほら、そこ！！伏せてってば！下手に動くとあの世行きだよ！？"
11140-79 = "みなさん、お願いだからジッとしててください……あうう……。"
11140-80 = "うへ～ここまでは計画通り！次のステップに進もうー！#nリーダーのファウストさん！指示を願う！"
11140-81 = "えっ！？えっ！？ファウストって、わ、私ですか？リーダーですか？私が！？"
11140-82 = "リーダーです！ボスです！ちなみに私は……。"
11140-83 = "覆面水着団のクリスティーナだお♧"
11140-84 = "うわ、何それ！いつから覆面水着団なんて名前になったの！？それにダサすぎだし！"
11140-85 = "……。"
11140-86 = "うへ、ファウストさんは怒ると怖いんだよー？言うこと聞かないと怒られるぞー？"
11140-87 = "あう……リーダーになっちゃいました……これじゃあ、ティーパーティーの名に泥を塗る羽目に……。"
11140-89 = "あれ……あいつら……。"
11140-90 = "あ……アビドス……？"
11140-91 = "だよね、アビドスの子たちじゃん。知らない顔もいるけど。#n……ここで何やってるんだろ？それも覆面なんかしちゃって。"
11140-92 = "ねっ、狙いは私たちでしょうかっ！？それなら返り討ちにしちゃいましょうか！？"
11140-93 = "いや、ターゲットは私たちじゃないみたい……あの子たち、どういうつもり？#nまさか、ここを……？"
11140-94 = "もー、アルちゃんは何してるのさ。"
11140-96 = "監視カメラの死角、警備員の動線、銀行内の構造、すべて頭に入ってる。無駄な抵抗はしないこと。"
11140-97 = "さあ、そこのあなた、このバッグに入れて。少し前に到着した現金輸送車の……。"
11140-98 = "わっ、わかりました！何でも差し上げます！現金でも、債券でも、金塊でも、いくらでも持ってってくださいっ！！"
11140-99 = "そ、そうじゃなくて……集金記録を……。"
11140-102 = "どっ、どうぞ！これでもかと詰めました！どうか命だけは！！"
11140-103 = "あ……う、うーん……。"
11140-106 = "……。"
11140-107 = "（や、ヤバーい！！この人たち何なの！？ブラックマーケットの銀行を襲うなんて！）"
11140-108 = "（どう逃げるつもりかしら？いや、それ以前に、こんな大胆な計画を立てちゃうアウトローが、未だに存在するなんて！！）"
11140-109 = "（めちゃくちゃ手際いいし、超プロフェッショナル。まるでこのためだけに生まれてきたみたい。ものの5分でやってのけたわ！）"
11140-110 = "（かっ、カッコイイ……！シビれるっ！これぞまさに真のアウトロー！うわあ……涙出そう！）"
11140-112 = "全然気づいてないみたいだけど……。"
11140-113 = "むしろ目なんか輝かせちゃって。"
11140-114 = "はあ……。"
11140-115 = "わ、私たちはここで待機でしょうか？"
11140-116 = "……あの子たちを手助けする理由も、銀行に助太刀する理由もない。#nそれに社長が今あんな状態だから……とりあえず隠れていよう。"
11140-117 = "は、はい……。"
11140-120 = "あの、シロ……い、いや、ブルー先輩！ブツは手に入った？"
11140-121 = "あ、う、うん。確保した。"
11140-122 = "それじゃ逃げるよー！全員撤収！"
11140-123 = "アディオ～ス☆"
11140-124 = "け、ケガ人はいないようですし……すみませんでした、さよならっ！！"
11140-125 = "（ヒューン！）"
11140-127 = "や、やつらを捕らえろ！！道路を封鎖！マーケットガードに通報だ！"
11140-129 = "一人も逃すな！！"
