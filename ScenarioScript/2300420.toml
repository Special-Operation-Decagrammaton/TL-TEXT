[translation]
2300420-1 = "全てが入れ替わっても"
2300420-3 = "（ウタハとの待ち合わせ場所にしていた、ショッピングモールに到着した）"
2300420-4 = "ああ、先生。"
2300420-5 = "急だったのに来てくれてありがとう。#n気を使わせてしまっていたら、申し訳ない。"
2300420-6 = "そんなことない？"
2300420-7 = "ふふっ、それなら良かった。きっと先生も気に入ってくれると思うよ。"
2300420-8 = "これから行く工具屋さんは、ミレニアムでも知っている生徒はそう多くない。"
2300420-9 = "マイスターにとっては、隠れた宝物庫みたいなものでね。"
2300420-10 = "それじゃあ、行こうか？"
2300420-22 = "マスター、久しぶり。"
2300420-23 = "ああ。久しぶりだな、ミレニアムのマイスター。危うく顔を忘れるところだったよ。"
2300420-24 = "仕方ないじゃないか。#nマスターの工具が優秀だからこそだよ。"
2300420-25 = "なかなか摩耗したり故障することもないから、ここに来る理由がなくてね。"
2300420-26 = "そうか。少しは耐久性を落としておくべきだったかな？"
2300420-27 = "プライド的に、そんなことはできないだろう？#nそれに、そんな事をしたらお客さんの足が途絶えちゃうんじゃないかな。"
2300420-28 = "はっはっは！それはそうだ……仕事に忠実すぎるのも問題だな。それで、今日は何が必要なんだ？"
2300420-29 = "ヘックスヘッドのセットと150mmのバーニヤノギスを。#n後は……せっかくだし、いろいろ見て回ろうかな。"
2300420-30 = "ああ、ゆっくりしていってくれ。ところで……こちらの方は？"
2300420-31 = "シャーレの先生だよ。"
2300420-35 = "おぉ、あなたが噂の。先生も何か工具が必要になったら、ぜひうちのお店に来ると良い。"
2300420-36 = "[s] \"ありがとうございます。\""
2300420-42 = "ふぅ、これで一通り交換できたかな。"
2300420-43 = "[s] \"すごい工具セットだね……。\""
2300420-44 = "そうかい？"
2300420-49 = "すごい……かは自分ではよく分からないが、まぁ私だけの工具セットだからね。"
2300420-50 = "自分では「マイスター工具セット」と呼んでいる。"
2300420-51 = "かなり私好みのカスタマイズになっているが……。"
2300420-52 = "まぁ、基本的に私しか使わないからね。"
2300420-53 = "私がマイスターになって以来、ずっと使ってきたセットなんだ。"
2300420-57 = "でもこの中のどれ一つとして、最初の時から残ってる物は無い。"
2300420-58 = "どの工具も基本的には使えば摩耗してしまう。寿命を迎えたら交換しないといけないからね。"
2300420-59 = "[s] \"それは……\""
2300420-60 = "ああ、そうやって交換していったのであれば、「ずっと使ってきたセット」という言い方には引っ掛かりを覚える……といったところかい？"
2300420-61 = "それは良い疑問だ、先生。"
2300420-67 = "例え話だ、まず一隻の船があるとしよう。その船は様々な部品が古くなったり壊れたりするたびに、当然ながら交換を施す。"
2300420-68 = "ある日、最初に使われていたパーツは一つも無くなった、全て交換されたんだ。さあこの船は、最初の船と同じものだろうか？"
2300420-72 = "[ns] \"難しい問題だね……。\""
2300420-73 = "ああ、しかし私はこう思う。"
2300420-74 = "たとえ船の部品が全て交換されていたとしても、船員が残っているなら元の船と同じだ……とね。"
2300420-75 = "船は勿論、各々が作ったパーツから構成される。しかし、それは誰かが使ってこそ初めて意味を持つ。それまでは、あくまでも金属や木の塊だ。"
2300420-76 = "どうだい？"
2300420-77 = "私はこれが、工具においても同じだと思っている。"
2300420-78 = "工具も使う人がいなければ、まだ何の意味も持たないのだから。"
2300420-79 = "[s1] \"もしかしたら、少し変に聞こえるかもしれないけど……。\"\n[s2] \"ウタハに使われる工具は幸せだね。\""
2300420-84 = "……それは何と言うか、面映ゆい言葉だね。"
2300420-85 = "でも確かに、工具にもそう思ってもらえるようになれたとしたら……。"
2300420-86 = "それは素晴らしいマイスターだろうね。"
2300420-88 = "（その後も楽しそうなウタハと一緒に、色々な工具を見て回った）"
