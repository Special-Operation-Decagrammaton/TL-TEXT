[translation]
2300420-1 = "Mesmo que tudo seja substituído"
2300420-3 = "（Cheguei ao shopping center onde combinei de encontrar a Utaha）"
2300420-4 = "Ah, Sensei."
2300420-5 = "Obrigada por vir, mesmo sendo de última hora.#nSinto muito se acabei te incomodando."
2300420-6 = "Não foi incômodo nenhum?"
2300420-7 = "Fufu, fico feliz em ouvir isso. Tenho certeza de que você também vai gostar."
2300420-8 = "A loja de ferramentas para onde vamos não é muito conhecida nem mesmo pelos alunos de Millennium."
2300420-9 = "Para um mestre artesão, é como um tesouro escondido."
2300420-10 = "Então, vamos indo?"
2300420-22 = "Mestre, quanto tempo."
2300420-23 = "Ah. Quanto tempo, mestre de Millennium. Por pouco eu não esquecia o seu rosto."
2300420-24 = "Não tem como evitar, né?#nÉ justamente porque as ferramentas do mestre são excelentes."
2300420-25 = "Elas quase nunca se desgastam ou quebram, então não tenho motivo para vir aqui."
2300420-26 = "Entendo. Será que eu deveria ter diminuído um pouco a durabilidade?"
2300420-27 = "Por orgulho, você não faria isso, faria?#nAlém disso, se fizesse algo assim, os clientes parariam de vir."
2300420-28 = "Hahaha! É verdade... Ser fiel demais ao trabalho também é um problema. Então, o que você precisa hoje?"
2300420-29 = "Um conjunto de chaves hexagonais e um paquímetro de 150mm.#nE depois... já que estou aqui, vou dar uma olhada em outras coisas."
2300420-30 = "Ah, fique à vontade. A propósito... quem é esta pessoa?"
2300420-31 = "É o Sensei do Schale."
2300420-35 = "Oh, então você é o famoso Sensei. Se precisar de alguma ferramenta, sinta-se convidado a visitar minha loja."
2300420-36 = "[s] \"Muito obrigado.\""
2300420-42 = "Ufa, acho que consegui substituir tudo."
2300420-43 = "[s] \"Que conjunto de ferramentas incrível...\""
2300420-44 = "Você acha?"
2300420-49 = "Não sei se é 'incrível', mas é o meu conjunto pessoal de ferramentas."
2300420-50 = "Eu mesma chamo de 'Conjunto de Ferramentas do Mestre'."
2300420-51 = "Está bem customizado ao meu gosto, mas..."
2300420-52 = "Bem, basicamente só eu uso mesmo."
2300420-53 = "É um conjunto que venho usando desde que me tornei uma mestre artesã."
2300420-57 = "Mas não sobrou nenhuma peça original de quando comecei."
2300420-58 = "Basicamente, qualquer ferramenta se desgasta com o uso. Quando chega ao fim da vida útil, preciso substituir."
2300420-59 = "[s] \"Isso é...\""
2300420-60 = "Ah, então você acha estranho eu dizer que é o 'conjunto que venho usando desde sempre' se fui substituindo as peças, é isso?"
2300420-61 = "Essa é uma ótima pergunta, Sensei."
2300420-67 = "Vamos usar uma analogia: imagine um navio. Sempre que as peças ficam velhas ou quebram, elas são naturalmente substituídas."
2300420-68 = "Um dia, não resta nenhuma das peças originais, tudo foi trocado. Agora, será que este navio ainda é o mesmo navio do início?"
2300420-72 = "[ns] \"É uma questão difícil...\""
2300420-73 = "Sim, mas eu penso o seguinte."
2300420-74 = "Mesmo que todas as peças do navio tenham sido substituídas, se a tripulação permanecer a mesma, então é o mesmo navio original."
2300420-75 = "O navio é composto pelas peças que cada um criou, é claro. Mas ele só ganha significado quando alguém o utiliza. Até lá, não passa de um monte de metal e madeira."
2300420-76 = "O que acha?"
2300420-77 = "Eu acredito que o mesmo se aplica às ferramentas."
2300420-78 = "Porque, se não houver ninguém para usá-las, as ferramentas não têm significado algum."
2300420-79 = "[s1] \"Talvez soe um pouco estranho, mas...\"\n[s2] \"As ferramentas usadas pela Utaha são sortudas.\""
2300420-84 = "...Isso é, como posso dizer, um elogio que me deixa sem jeito."
2300420-85 = "Mas, se eu realmente puder fazer com que as ferramentas pensem assim..."
2300420-86 = "Então esse seria o verdadeiro significado de ser uma grande mestre artesã."
2300420-88 = "（Depois disso, continuei olhando várias ferramentas junto com a Utaha, que parecia estar se divertindo）"
