[translation]
101020-1 = "第2話;破局"
101020-3 = "白昼夢の中"
101020-5 = "……。"
101020-6 = "……。"
101020-7 = "貴女は……いや、此処は……？"
101020-8 = "待ちやれ、[ruby=そち]其方[/ruby]の身体……。"
101020-12 = "――「色彩」と遭遇したか。"
101020-16 = "しかし妙じゃのう……色彩と遭遇した者が、これほど意識を保てているとは。"
101020-17 = "色彩……？"
101020-18 = "キヴォトス外から到来する、[ruby=こうこ]曠古[/ruby]の災禍を引き起こす存在じゃ。"
101020-19 = "其れそのものが人格や意志を持っているのかは分からぬ。"
101020-20 = "肝要なのは、このキヴォトスの民にとって、アレは致死の毒足り得るという点じゃな。"
101020-21 = "色彩に露出された者の肉体は捻じれ――精神をも蝕ばまれていく。"
101020-22 = "キヴォトスの民であれば、その程度で死に至る事はない……じゃが、個が捻じ曲げられ、異物と成り果てるじゃろう――果たして、それが同一存在と呼べるのかは、別の話じゃな。"
101020-23 = "じゃが、色彩がキヴォトスを見つけることは不可能に等しい。 "
101020-24 = "砂漠で一粒の砂を見つける事と同義……触れてしまったのであれば、まこと数奇な巡り合わせとも言える。"
101020-25 = "しかし……其方の身体、色彩と直に接触したわけではなさそうじゃが……#nして、何があった？申してみよ。"
101020-26 = "それは……。"
101020-27 = "ふむ……妾が診ようか。"
101020-36 = "失礼。"
101020-37 = "……。"
101020-42 = "あなたは「儀式」に巻き込まれましたからね。#nキヴォトスの外部に通じる窓に顔を出したも同然です。"
101020-43 = "ええ……あなたの存在はまるで暗闇に浮かぶ灯火のように目立った事でしょう。"
101020-46 = "……「アレ」によって、ね。"
101020-47 = "「アレ」に露出されたあなたの[ruby=mystery]神秘[/ruby]は[ruby=terror]恐怖[/ruby]に反転され――裏面の原理があなたを支配し始めたのです。"
101020-49 = "成程……色彩を利用し、身体を変化させようとした者が居たのか。#n愚かな……。"
101020-50 = "色彩を呼び寄せる儀式を行ったものの……#n幸いにして、儀式そのものが途絶した、と。"
101020-51 = "……そうか。其方は色彩と直接遭遇したのではないのじゃな。"
101020-52 = "「白昼夢」を通し、「儀式」という窓からアレを垣間見た――"
101020-53 = "だから、こうして無事でいられたのじゃな。"
101020-54 = "……。"
101020-55 = "しかし、それも長くは保たぬじゃろう。#n其方の精神は此処に在るが、肉体は崩壊の一途を辿っておる。"
101020-56 = "そんな……私は、今倒れるわけには……"
101020-57 = "……どうにか留める方法は無いのか？"
101020-58 = "無い。"
101020-62 = "……本来ならば、な。 "
101020-63 = "しかし、其方は一つの幸運と巡り会えた。#nこの妾――百鬼夜行の預言者、クズノハと[ruby=まみ]見[/ruby]える事ができたのじゃ。"
101020-64 = "……クズノハ。"
101020-65 = "妾が其方を導いてやろう。しかし、其れには代償が伴う。"
101020-66 = "代償……？"
101020-67 = "其方を構成する本質を1つ手放さねばならぬ。#n――此の場合、「未来視」じゃろうな。"
101020-68 = "色彩は、我らの本質を歪曲する。より正確に言うのであれば――根源を反転させると言うべきかのう。いずれにせよ、今の自分でなくなることに変わりはない。"
101020-69 = "じゃが、代償さえ支払えば、其方は色彩の侵食から抜け出す事ができよう。"
101020-70 = "さあ、如何する？#n――トリニティの預言者よ。"
101020-76 = "他に選択肢は無いのだろう？"
101020-77 = "ふむ、迷いなく断じるとは……友のためかのう……？#n――お見事。"
101020-79 = "……では、此れにてさらばじゃ、セイア。#n現世に戻っても妾を探そうとするなよ？妾はもう、其処には居らぬからの。"
101020-83 = "……！？"
101020-84 = "嗚呼、そうじゃ。最後に、本質を喪う過程で最後の予知が発動するかもしれぬ。#n其れは必要な痛みじゃ――我慢せい。"
101020-87 = "っああああああ……！！"
101020-97 = "ゲマトリア・会議室"
101020-100 = "失礼、少々遅れました。 "
101020-104 = "……。"
101020-105 = "……。"
101020-106 = "……。"
101020-107 = "……皆さん、お集まりのようで。"
101020-109 = "それでは、会議を始めましょうか。"
101020-110 = "少々前の事ですが、「無名の司祭」の遺産が観測されました。"
101020-111 = "……。"
101020-112 = "不勉強で申し訳ないのですが、「無名の司祭」とは具体的に何を意味するのでしょうか？"
101020-113 = "ベアトリーチェが保有する、ロイヤルブラッドを保護する技術。そして、古聖堂を破壊した巡航ミサイル――これらが無名の司祭による技術だとわたくしは解釈しております。"
101020-114 = "既存技術を凌駕する超科学――その類のものという認識で合っていますか？"
101020-115 = "そうだな……彼らは端的に言うなら、キヴォトス以前に存在していた[ruby= ・    ・    ・    ・    ・    ・ ]この世界の主[/ruby]のことだ。"
101020-116 = "ふむ……？"
101020-118 = "「名もなき神」とそれを崇拝する「無名の司祭」――#n彼らはキヴォトスの神秘の下に堆積し、痕跡だけが残るはずだった存在……"
101020-119 = "「名もなき神」――それは大地、海原、天災といった……所謂、太古の昔より存在する「神秘」や「恐怖」――とでも申しましょうか。#n彼らは自然を[ruby=かたど]模[/ruby]った形で顕現するとされております。"
101020-120 = "そして、それらを崇拝する「無名の司祭」。彼らが何のために巡航ミサイルなどのオーパーツを生み出したのかは定かではありませんが――淘汰されし旧き人は、現代のキヴォトスに対して友好的ではなかったのでしょう。"
101020-121 = "彼らは何処かへと姿を消しましたが、その技術はまだこの地に残されておりまして。#nそう……そして私は――彼らの遺産に大変興味があるのです。"
101020-122 = "なにせ、高い値段で取引されているのでね。クックックッ……。"
101020-123 = "……。"
101020-124 = "ですが、観測されたのはそんな凡庸なものではありません。 "
101020-125 = "「箱舟」が観測されたのです。一瞬ではありましたが。 "
101020-126 = "……「観測」？それは知覚される概念なのか？#n物体ではなく、現象であると？"
101020-127 = "それは……"
101020-128 = "興味深い質問ですね。私も「箱舟」は実在する物質であると考えておりましたが……#nどうやら、そうではないようで。 "
101020-129 = "カイザーグループにアビドス砂漠を調査させておりましたが……全て無駄骨でした#n……私は、勘違いをしていたのです。"
101020-130 = "「箱舟」が、全ての神秘を併せ持つ抽象的な概念であるのならば―― "
101020-131 = "――いえ、これでは論点がずれてしまいますね。#n本題へ戻りましょう。"
101020-132 = "消え行くはずの「無名の司祭」の兵、そして遺産が再び観測された事……#nこれらはたしかに、我々の想定を上回りました。 "
101020-133 = "シャーレの出現、キヴォトス最高の神秘の確保失敗。#n唯一残されたアリウス領の剥奪、デカグラマトンの死――"
101020-134 = "そして、「無名の司祭」の遺産である「箱舟」の観測。"
101020-135 = "計画通りであれば、起こり得る事がなかった事態。#n遠い未来でさえ到達することが――いえ、訪れることすらない現象だったかもしれません。"
101020-136 = "制御不能の変数によって、私たちが迎えた現在は……元の計画からあまりにも逸脱してしまいました。"
101020-137 = "それだけではありません――"
101020-139 = "「色彩」がここを発見してしまった。#nベアトリーチェ、貴下が行なった儀式のせいでな。"
101020-140 = "……。"
101020-142 = "儀式は、「色彩」と接触するためのものだった。#nアレが招く狂乱は分かっていたはずだろう？ "
101020-143 = "正確に言えば接触ではなく、力を利用するためのものだったかと。#nマダムはアレを呼び寄せるつもりではありませんでした。"
101020-144 = "ああ、そうだとも！「色彩」の力を利用し、自分を偉大なる者に仕立て上げようとした……#nそんな低俗な目的の為に、アレを――！"
101020-146 = "口の利き方に気をつけなさい、木偶。"
101020-147 = "……。 "
101020-148 = "芸術家というのは、己の作品は偉大である事を願うというのに、他者の願望は見下すのですね。嗚呼――そのような傲慢さこそが、本質なのでしょうか？"
101020-149 = "マダム、落ち着いてください。"
101020-150 = "デカルコマニー、あなたも同じですよ。"
101020-151 = "……。"
101020-152 = "あなたのその虚像と非在の隠喩……絵画なんぞに喋らせることで表現しているとでも？私から見れば、サーカスにいる道化師と何ら変わりないように思うのですが。"
101020-153 = "そういうこったぁ！！"
101020-154 = "……デカルコマニーも、そうカリカリせずに。#nわたくし達は彼女が受けた侮辱を理解しなくてはなりません。"
101020-156 = "皆さん、大人になりましょう。ベアトリーチェは色彩を利用しようとしていただけであって、キヴォトスに呼び寄せる予定ではなかったはずです。"
101020-157 = "まだ色彩がこちらを発見したとは断定できません。#n私の知る限り、夢の中で起きた出来事ですから。"
101020-158 = "ええ。全てはシャーレの[USERNAME]先生が現れてから起こった事。#nあの存在が全ての元凶であるというのは、皆さんもよく存じているでしょう？"
101020-159 = "……。"
101020-160 = "……。"
101020-161 = "……マダム。"
101020-162 = "何度も申し上げた通り、あの者は一刻も早く始末すべきでした。 "
101020-163 = "……ここが学園都市という概念で存在する限り、[USERNAME]先生の存在はわたくし達の存在を凌駕して当然です。"
101020-164 = "それこそが、この物語のジャンル……つまり、この世界の[ruby=法]ルール[/ruby]です。#nわたくし達がこの世界に留まる限り、ルールに逆らう事など――"
101020-165 = "物語の作法など、どうでも良いでしょうに！！"
101020-166 = "……。"
101020-168 = "分かりました。私が、皆さんに解を示して差し上げます。#n「無名の司祭」も、「シャーレ」も、「箱舟」も――全て一度に解決する事ができる、究極の解を。"
101020-169 = "ふむ……？"
101020-170 = "「色彩」は既に此処を発見しております。"
101020-171 = "……！？"
101020-172 = "！？"
101020-173 = "！！"
101020-177 = "ええ、より正確に申し上げるのであれば、私が伝えました。#n「色彩」は今、キヴォトスに向かっております。"
101020-178 = "……。"
101020-194 = "もう、先生を守る方法は無い。"
101020-196 = "[USERNAME]先生。"
101020-197 = "これで…… "
101020-198 = "これで、全部……終わるはずだから。"
101020-199 = "[ns] \"シロコ……？\""
101020-203 = "――先生？"
101020-205 = "アロナの教室"
101020-206 = "先生？大丈夫ですか？"
101020-207 = "どうされました？もしかして――またあの夢を見たんですか？"
101020-208 = "[ns1] アロナを観察する。\n[ns2] アロナが怪我をしていないか、確認する。"
101020-211 = "あ、あれ……？ "
101020-212 = "なっ、何ですか？身体検査ですか？#nあわ、あわわわ……？"
101020-213 = "えっ？銃で撃たれ……？私がですか？"
101020-214 = "あ、アロナは平気です！何も起きていませんよ！#n大丈夫ですよ、先生！"
101020-215 = "私は元気ですからね！#nすっごく、すっごく！元気ですから！ "
101020-216 = "[ns] \"……うん、そうだね。\""
101020-218 = "[ns] \"アロナが怪我をしてなくて、良かった。\""
101020-219 = "……。"
101020-220 = "先生、心配しないでください。私は元気です。"
101020-221 = "……ただの悪い夢です。#nだから、大丈夫です。"
101020-224 = "全ての色が抜け落ちた世界。"
101020-225 = "そんな、モノクロの世界で……歪なヘイローの少女が、先生に銃を向けていた。"
101020-226 = "私の視界は不明瞭だったけれど……ただ一つ確かなのは、#n[ruby= ・     ・     ・     ・     ・     ・     ・     ・     ・     ・     ・         ]先生はそこで生を終える。[/ruby]"
101020-227 = "[s3] \"…………。\"\n[s4] \"恐ろしい話だね。\""
101020-230 = "……。"
101020-231 = "何故、先生が私と同じ予知夢を視たのかは判然としないが――"
101020-232 = "先生は、私と夢の中で何度も邂逅を果たしている……#nもしかしたら、その影響が及んでいるのかもしれない。"
101020-233 = "[s] \"あの未来がいつ起こるのか、分かる？\""
101020-234 = "いや。私の未来視は既に喪われている。#n今は断片的な幻が見えるだけで……。"
101020-235 = "だが、以前告げた「キヴォトスの終焉」と関係しているのは確かだ。"
101020-236 = "[s] \"終焉……\""
101020-240 = "天から巨大な塔が飛来し、虚空が緋色に染められ――"
101020-241 = "不吉な塔は、まるで悲鳴を上げるように鳴動し……この世界を少しずつ削りとって……そうして、黒い光が天から舞い降り……世界が終焉に傾いていく……。"
101020-243 = "[ns] \"………。\""
101020-244 = "心配しないでください先生。#n何があっても、アロナが先生を守りますから！"
101020-245 = "[s5] \"そうだね……。\"\n[s6] \"いつもありがとう、アロナ。\""
101020-248 = "ふふん……もっと、もーっと感謝してくださってもいいんですよ！"
101020-249 = "あっ、先生。今日はどんなお仕事をされる予定ですか？"
101020-250 = "[s] 今日の予定を伝える。"
101020-251 = "……連邦生徒会のリンさんに、ですか？ "
101020-252 = "で、でも……リンさんがこのお話を信じてくださるのでしょうか？"
101020-253 = "[s7] \"うん、リンなら信じてくれるよ。\"\n[s8] \"リンちゃんは真面目だから。\""
101020-256 = "……分かりました。先生がそう仰るのなら。"
101020-257 = "リンさんはちょっと怖いですが……私、応援してますね、先生！"
101020-262 = "ふぅ……。"
101020-268 = "……。"
101020-269 = "ふふっ……。"
101020-274 = "連邦生徒会・レセプションルーム"
101020-277 = "……。"
101020-278 = "「終焉」……ですか？ "
101020-279 = "[s] \"全然信じてないよね！？\""
101020-280 = "ですから……予知夢、ということですよね？"
101020-281 = "[s] \"そ、そうです……。\""
101020-282 = "先生が見た、夢のお話なのですね。#nなるほど……キヴォトスが終焉を迎える……。"
101020-283 = "特にこれといった証拠も無く、いつになるのかも定かではない……？"
101020-284 = "……「終焉」……ふむ。"
101020-285 = "[s] \"リンちゃんには知らせておいた方がいいかなと思って……。\""
101020-286 = "……誰が「リンちゃん」ですか。"
101020-287 = "[s] \"ご、ごめんなさい。\""
101020-290 = "……。 "
101020-291 = "分かりました、先生。"
101020-292 = "連邦生徒会の記録やデータを確認してみます。#n同様のケースが無いかも調べてみましょう。"
101020-293 = "[s] \"……えっ？\" "
101020-294 = "百鬼夜行自治区の名簿にも目を通してみます。あちらのデータベースはあまり精度が高くありませんが、少しでも手掛かりを掴めれば御の字でしょう。"
101020-295 = "[s] \"この話を、信じてくれるの？\""
101020-296 = "……信じる信じないというよりは、先生ご自身もよく分かっていないと思いますので。"
101020-297 = "ですが、この内容を伝えるためだけにわざわざ私を訪ねて来たのですから……#n先生ご自身が、この予知夢を信じているというのは間違いないのでしょう？"
101020-298 = "……あなたは連邦生徒会長が指名した方です。#nであれば、私は準備し、対応するのみ。"
101020-299 = "それが連邦生徒会長に対する義理立てでもあります。"
101020-300 = "[s] \"ありがとう、リンちゃん！\""
101020-301 = "……ですが、他の生徒会を説得するには証拠が必要です。#nそちらの確保ができれば、事をスムーズに進められるかと。"
101020-302 = "この件に関してあまり時間を割くことはできませんが……#nできる限りのことはやってみましょう。"
101020-303 = "また近いうちにご連絡いたします。 "
101020-304 = "では、私は用事があるのでこれにて。"
101020-306 = "次回;日常の亀裂（１）"
