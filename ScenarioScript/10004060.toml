[translation]
10004060-1 = "Episódio 6: Grande Operação de Captura Confusa"
10004060-2 = "Primeiro, a primeira operação..."
10004060-3 = "O nome dela é \"Operação Queijo\"!"
10004060-4 = "[s] \"Operação Queijo...?\""
10004060-5 = "Exatamente. Assim como um rato não consegue ignorar um queijo, uma criança não consegue ignorar um doce ou uma guloseima, não é?"
10004060-6 = "Por isso, preparei um doce especial com o antídoto!"
10004060-11 = "Para a Shun, que ficou pequena, ela não vai conseguir ignorar isso!"
10004060-12 = "[s] \"Essa operação não serviria só para pescar a Saya...?\""
10004060-13 = "C-cala a boca! Eu não saio comendo qualquer queijo que vejo pela frente!"
10004060-14 = "Ah, para executar essa operação, não podemos usar as roupas de sempre, então preparei máscaras também. Vamos, coloque a sua!"
10004060-20 = "Sim, perfeito! Ninguém vai achar que é o Sensei!"
10004060-21 = "[s] \"Essa máscara, de alguma forma... é muito difícil de respirar...\""
10004060-22 = "É pelo bem da operação, não se preocupe com detalhes!"
10004060-23 = "Vamos, operação iniciada!"
10004060-28 = "Ugh... Desse jeito, o Sensei certamente vai descobrir quem eu sou..."
10004060-29 = "Se ele souber que tudo o que aconteceu até agora foi culpa minha, talvez fique desapontado..."
10004060-30 = "[s] \"Haa, haa... bem, ali, mocinha...\""
10004060-32 = "...Eh?"
10004060-33 = "Q-quem é você? Por que está usando essa máscara e respirando com tanta dificuldade...?"
10004060-34 = "[s] \"Haa, haa... se quiser, aceita um doce...?\""
10004060-40 = "...Não, obrigada."
10004060-41 = "O Sensei me disse para nunca aceitar comida de estranhos."
10004060-42 = "[s1] \"Não se preocupe, não vou fazer nada de estranho... haa, haa...\"\n[s2] \"Por favor, só um pouquinho, dá uma lambidinha, vai...?\""
10004060-43 = "...Não quero."
10004060-44 = "...Não quero."
10004060-45 = "Se chegar mais perto, vou chamar a policial!"
10004060-50 = "...Não deu certo."
10004060-51 = "[s] \"...Não deu, né.\""
10004060-52 = "B-bem, não tem problema! Nenhum gênio acerta de primeira!"
10004060-53 = "Vamos nos recompor e passar para a próxima operação!"
10004060-55 = "A segunda operação é..."
10004060-56 = "O nome dela é \"Operação Armadilha\"!"
10004060-57 = "[s] \"Operação Armadilha?\""
10004060-58 = "Sim. Pode ser clássico, mas para capturar ratos, uma ratoeira ainda é a melhor opção."
10004060-59 = "Baseado nessa mesma ideia, eu criei esta armadilha especial!"
10004060-64 = "Se pisar nela, ela libera um gás com um efeito paralisante potente, deixando o alvo imóvel por um tempo."
10004060-65 = "[s] \"Isso não é meio perigoso...?\""
10004060-66 = "Está tudo bem. Esse gás é potente, mas o efeito passa rápido, então ela volta ao normal logo."
10004060-67 = "...Provavelmente."
10004060-68 = "[s] \"Provavelmente!?\""
10004060-69 = "N-não se preocupe com detalhes! O importante é capturar a Shun primeiro!"
10004060-70 = "Então, vamos começar instalando?"
10004060-76 = "Instalação concluída, agora é só esperar a Shun aparecer!"
10004060-77 = "[s] \"Se a paralisia não passar, a Saya consegue curar, né...?\""
10004060-78 = "Sim, claro. Afinal, eu sou um gênio. Além disso, tudo isso é pelo bem da Shun!"
10004060-79 = "Ah, a Shun chegou! Sensei, esconda-se!"
10004060-86 = "Eu não acho que fiz nada de tão ruim assim..."
10004060-87 = "Eu só queria passar o tempo livremente, como as crianças do Jardim de Infância Plum..."
10004060-92 = "...?"
10004060-93 = "(Pisou...!)"
10004060-97 = "Opa, quase pisei em algo... Tem uma máquina que parece cara caída aqui no chão."
10004060-99 = "Ora, tem outra aqui também...?"
10004060-102 = "E aqui também."
10004060-104 = "Tem muitas coisas caídas por aqui, será que quem as deixou cair estava com muita pressa?"
10004060-109 = "Gu, talvez seja porque meu corpo está pequeno, mas estou me sentindo bem ágil...!"
10004060-110 = "Eeei, já que é assim, vou arremessar diretamente!"
10004060-111 = "Toma essa!"
10004060-121 = "...Isso é perigoso, quem foi que jogou isso? E se acertasse alguém e causasse um ferimento!?"
10004060-122 = "...Não aparece ninguém, será que já foram embora? Francamente, preciso ensinar às crianças da Academia Plum que \"não se deve fazer esse tipo de coisa\"..."
10004060-128 = "Sniperizar uma granada no ar... você não é nada mal."
10004060-129 = "[s] \"Como esperado...\""
10004060-130 = "De qualquer forma, vamos logo para a próxima estratégia!"
10004060-131 = "[s3] \"A propósito, Saya, acho que nossos corpos...\"\n[s4] \"Sinto meus braços e pernas dormentes...\""
10004060-134 = "Fu-fu-fu-fu..."
10004060-135 = "Mesmo tendo explodido no ar, sentir o corpo tão dormente assim... como esperado da minha invenção, um efeito paralisante maravilhoso!"
10004060-136 = "...É realmente incrível, meu corpo está tremendo e não consigo me mexer."
10004060-137 = "Por enquanto, vou esperar o efeito passar..."
10004060-139 = "Como esperado, mesmo pequena, ela continua sendo uma instrutora da Academia Plum."
10004060-140 = "Minhas ideias sendo neutralizadas uma após a outra..."
10004060-141 = "Não tem jeito, eu não queria usar este método, mas... para crianças que não ouvem, no final, só resta isso."
10004060-142 = "[s5] \"I-isso é...?\"\n[s6] \"...Gulp.\""
10004060-145 = "Crianças que não ouvem..."
10004060-146 = "Devem ser contidas com a força de um adulto!"
10004060-147 = "Mesmo sendo a Shun, se pegarmos ela de surpresa, com essa diferença de tamanho, não conseguiríamos imobilizá-la, pelo menos temporariamente?"
10004060-148 = "Eu darei o sinal, então Sensei, você imobiliza a Shun nem que seja um pouco, e nesse intervalo, eu forço ela a tomar o remédio...!"
10004060-149 = "[s] \"P-precisa mesmo chegar a esse ponto...?\""
10004060-150 = "É inevitável! Tudo isso é pela minha pesqui..."
10004060-151 = "Não, é pela Shun!"
10004060-152 = "Antes que seja tarde demais, preciso tentar todos os meios possíveis...!"
10004060-153 = "[s] \"Hmm, será que consigo imobilizá-la com a minha força...\""
10004060-154 = "Certo, vou ficar vigiando ali, então Sensei, esconda-se aqui e, ao sinal, ataque a Shun!"
10004060-156 = "...Hoje sinto que estou encontrando muitas pessoas estranhas. Será que quando se é pequena, acaba-se encontrando pessoas estranhas com mais frequência...? Preciso tomar cuidado."
10004060-157 = "E aquela pessoa mascarada de agora pouco parecia bem perigosa..."
10004060-158 = "Agora, Sensei! Pegue a Shun!"
10004060-164 = "[ns] \"Olá, Shun.\""
10004060-165 = "Se-Sensei!? Que susto, de onde você surgiu de repente...?"
10004060-166 = "Ah, bem, falando nisso, este corpo é, hum..."
10004060-168 = "Eh, Sensei? Por que você está segurando meu braço de repente...?"
10004060-169 = "[s7] \"...Vamos voltar ao corpo original?\"\n[s8] \"Se continuar assim, talvez por causa dos efeitos colaterais... mas que força é essa!?\""
10004060-170 = "Espera, eh!? Não, isso, o que significa isso...!?"
10004060-171 = "Espera, eh!? Não, isso, o que significa isso...!?"
10004060-173 = "Ha-ha-ha! Muito bem, Sensei! Não vou deixar essa chance escapar!"
10004060-174 = "Agora é a hora de fazê-la tomar o remédio! Prepare-se!"
10004060-175 = "O quê, Sensei, não pode ser...! Eu confiava em você!"
10004060-176 = "N-não quero! Eu não quero voltar ao meu corpo original!"
10004060-177 = "Ei, pare de se debater! Abra a boca e fique quieta!"
10004060-178 = "Ugh... A-alguém...!"
10004060-180 = "Alguém, me ajude!!!"
10004060-182 = "...Sensei?"
10004060-185 = "Por que você está segurando o braço de uma garotinha no meio da rua e tentando forçá-la a abrir a boca...?"
10004060-186 = "[s9] \"É, é um mal-entendido, Kirino!\"\n[s10] \"Não, a segunda parte não fui eu, foi a Saya...\""
10004060-195 = "Moça policial! Por favor, me ajude!!"
10004060-199 = "……Entendi a situação mais ou menos."
10004060-201 = "Vou ouvir os detalhes na delegacia!"
10004060-202 = "[s] \"Não, espera!?\""
10004060-208 = "Depois disso, acabei sendo levado pela Kirino e, junto com a Saya, fui forçado a ouvir um longo sermão enquanto estava sentado de joelhos."
