[translation]
80000052-1 = "スカルマン、変身！"
80000052-5 = "……来たね、先生。尾行はちゃんと撒いた？"
80000052-10 = "どうしてこんなところに呼んだのか、って？"
80000052-11 = "理由は簡単。無防備な状態になると分かっていて、敵に狙われやすい場所を選ぶことは無い。"
80000052-12 = "もちろんその、先生がそういうのをあまり気にしなくて良いって言ってくれたのは覚えてるけれど……。"
80000052-13 = "でも今日は違う。今は、気にしないなんてわけにはいかない。"
80000052-14 = "……何か、変なことを言ってる気がしてきた。"
80000052-15 = "[s1] \"ううん、そんなことないよ。\"\n[s2] \"何も変なことじゃないと思うよ。\""
80000052-16 = "そうか……。"
80000052-17 = "そうか……。"
80000052-18 = "……まあ、それはどうでも良い。要はただ、静かで落ち着ける環境を構築したかっただけ。"
80000052-19 = "その目標は達成した、あとは……。"
80000052-23 = "……先生、これを貰ってほしい。"
80000052-25 = "[s3] \"これは……！\"\n[s4] \"もしかして……。\""
80000052-26 = "……ふふっ。"
80000052-27 = "……ふふっ。"
80000052-28 = "やっぱり、先生なら分かってくれると思ってた。"
80000052-29 = "この死神……スカルマンの可愛さを！"
80000052-30 = "限定品で且つこれが最後の一品だったから、もう手に入らないらしいけど。今日は特別。"
80000052-31 = "先生には今まで、たくさんのものを貰ったから。"
80000052-32 = "すごく貴重なものだけど、先生には渡したいと思ったんだ。食べ物だから、いつかは無くなるけど。それでも……"
80000052-33 = "……って、先生？"
80000052-37 = "先生！？"
80000052-38 = "な、何でそんな勢いで食べて……！？"
80000052-39 = "それ、限定品だからその、もう少しゆっくり見るとか……！"
80000052-40 = "[s5] \"ふふっ……これで、私がスカルマンになったと言っても過言ではない！\"\n[s6] \"ふふっ、スカルマンは消えない。いつまでも私は、君と共に！\""
80000052-41 = "……！？"
80000052-42 = "……！？"
80000052-43 = "せ、先生……？"
80000052-44 = "……。"
80000052-45 = "……ふふっ。"
80000052-46 = "な、なるほど……。"
80000052-47 = "……理解した。じゃあ、ずっと一緒だね。流石は先生。"
80000052-48 = "じゃあこうなったら、先生には私にとってのスカルマンとしても、一緒にいてもらおうかな。"
80000052-49 = "……じゃあ帰ろう、スカルマン。"
80000052-50 = "もう、隠れる必要も無いね。"
80000052-56 = "（その後アズサと一緒に堂々と、ゆっくりと時間を過ごした）"
