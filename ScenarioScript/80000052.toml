[translation]
80000052-1 = "Skullman, transformar!"
80000052-5 = "……Você chegou, Sensei. Conseguiu despistar quem estava te seguindo?"
80000052-10 = "Quer saber por que te chamei aqui?"
80000052-11 = "O motivo é simples. Não há razão para escolher um lugar onde seremos alvos fáceis, sabendo que ficaremos vulneráveis."
80000052-12 = "Claro, eu lembro que você disse que não precisava se preocupar tanto com esse tipo de coisa, mas……"
80000052-13 = "Mas hoje é diferente. Agora, não dá para simplesmente não se preocupar."
80000052-14 = "……Sinto que acabei de dizer algo estranho."
80000052-15 = "[s1] \"Não, não é nada disso.\"\n[s2] \"Acho que não tem nada de estranho nisso.\""
80000052-16 = "Entendo……."
80000052-17 = "Entendo……."
80000052-18 = "……Bem, isso não importa. O ponto é que eu só queria criar um ambiente calmo e tranquilo."
80000052-19 = "Esse objetivo foi alcançado, agora……."
80000052-23 = "……Sensei, quero que fique com isto."
80000052-25 = "[s3] \"Isto é……!\"\n[s4] \"Será que é……?\""
80000052-26 = "……Fufu."
80000052-27 = "……Fufu."
80000052-28 = "Eu sabia que você entenderia, Sensei."
80000052-29 = "A fofura deste ceifador…… o Skullman!"
80000052-30 = "É uma edição limitada e a última unidade, então parece que não dá mais para conseguir. Mas hoje é um dia especial."
80000052-31 = "Porque você já me deu tantas coisas até hoje, Sensei."
80000052-32 = "É algo muito valioso, mas eu queria te entregar. Como é comida, uma hora vai acabar, mas ainda assim……"
80000052-33 = "……Ei, Sensei?"
80000052-37 = "Sensei!?"
80000052-38 = "P-por que você comeu com tanta pressa……!?"
80000052-39 = "Aquilo era uma edição limitada, então, sabe, você poderia ter apreciado um pouco mais……!"
80000052-40 = "[s5] \"Fufu…… agora não é exagero dizer que eu me tornei o Skullman!\"\n[s6] \"Fufu, o Skullman não desaparece. Para sempre, estarei com você!\""
80000052-41 = "……!?"
80000052-42 = "……!?"
80000052-43 = "Se-Sensei……?"
80000052-44 = "……."
80000052-45 = "……Fufu."
80000052-46 = "E-entendo……."
80000052-47 = "……Compreendi. Então, estaremos sempre juntos. Como esperado do Sensei."
80000052-48 = "Já que é assim, vou pedir para você ficar comigo como o meu próprio Skullman."
80000052-49 = "……Então vamos embora, Skullman."
80000052-50 = "Não precisamos mais nos esconder, não é?"
80000052-56 = "(Depois disso, passei o tempo calmamente e sem pressa junto com Azusa)"
