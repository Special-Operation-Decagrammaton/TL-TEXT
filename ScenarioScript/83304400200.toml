[translation]
83304400200-6 = "Ibuki...? Por que você está aqui?"
83304400200-7 = "Ah! Hina-senpai!"
83304400200-8 = "Ibuki veio para desinfetar os ferimentos!"
83304400200-9 = "Ferimentos...?"
83304400200-10 = "Parece que ela se machucou por causa da confusão que aconteceu no Pandemonium."
83304400200-11 = "Confusão? O que aconteceu?"
83304400200-12 = "Dizem que a Presidente Makoto foi hipnotizada e sua personalidade mudou completamente."
83304400200-13 = "...Hipnose?"
83304400200-14 = "Sim! A Satsuki-senpai fez uma hipnose? na Makoto-senpai, mas..."
83304400200-15 = "Aí, a Makoto-senpai virou uma nova Makoto-senpai!"
83304400200-16 = "...Desculpe, não estou conseguindo acompanhar."
83304400200-17 = "Pronto. O tratamento terminou, Ibuki-chan."
83304400200-18 = "Obrigada! Chinatsu-senpai!"
83304400200-19 = "De nada, mas tome cuidado para não se machucar de novo, viu?"
83304400200-20 = "Por enquanto, talvez seja mais rápido perguntar os detalhes para a Iroha ali."
83304400200-21 = "Hmm. Hipnose, é..."
