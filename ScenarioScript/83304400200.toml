[translation]
83304400200-6 = "イブキ……？どうしてここに？"
83304400200-7 = "あ！ヒナ先輩！"
83304400200-8 = "イブキ、傷の消毒に来たの！"
83304400200-9 = "傷って……？"
83304400200-10 = "万魔殿で起こった騒動のせいで、怪我をしたようです。"
83304400200-11 = "騒動って、何があったの？"
83304400200-12 = "何やらマコト議長が催眠にかかって、人格が変わったような状態になったのだとか。"
83304400200-13 = "……催眠？"
83304400200-14 = "うん！サツキ先輩がね～マコト先輩に催眠？をかけたんだけど……"
83304400200-15 = "そしたら、マコト先輩が新しいマコト先輩になったの！"
83304400200-16 = "……ごめん、話についていけなくて。"
83304400200-17 = "はい。これで治療は終わりましたよ、イブキちゃん。"
83304400200-18 = "ありがとうございます！チナツ先輩！"
83304400200-19 = "いえ、今度は怪我しないように気をつけてくださいね。"
83304400200-20 = "ひとまず、詳細はあちらのイロハさんに聞いた方が早いかもしれません。"
83304400200-21 = "うーん。催眠、か。"
