[translation]
22160-1 = "Episódio 16; Xeque-Mate"
22160-17 = "............"
22160-21 = "Deixei a C&C por conta da Toki――"
22160-23 = "Uma vez que a maior força de combate, a C&C, estiver neutralizada, só restará o Sensei......"
22160-25 = "Não importa o quão incrível seja o Sensei da Schale, #n no final, ele não terá outra escolha a não ser aceitar."
22160-26 = "O que é correto, e――"
22160-30 = "O que é uma 'decisão racional'."
22160-31 = "――Xeque-mate."
22160-35 = "Entendo...... Rio, entendi o seu raciocínio."
22160-36 = "O plano meticulosamente elaborado, e os métodos também......"
22160-37 = "Em certo sentido, isso pode ser 'racional'."
22160-38 = "Himari......"
22160-39 = "Mas, ainda assim, eu não posso concordar com tal autossuficiência."
22160-40 = "..............Entendo."
22160-41 = "――Deixarei um único conselho."
22160-42 = "Você é certamente brilhante."
22160-43 = "Fico até impressionada por você ter conseguido construir tal cidade sem ser descoberta......"
22160-44 = "De certa forma, chego a admirar."
22160-45 = "......O que quer dizer com isso?"
22160-46 = "Você... quando acredita que está certa, segue em frente sem olhar para trás, não é?"
22160-47 = "Essa é a sua maior virtude... e..."
22160-48 = "Ao mesmo tempo, seu ponto fraco."
22160-49 = "Ponto fraco? Não pode ser..."
22160-50 = "Rio...... você já confidenciou suas preocupações a algum subordinado?"
22160-51 = "......"
22160-52 = "Um ponto fraco não é algo tão exagerado assim."
22160-53 = "Por ser brilhante demais―― você não tem intenção de caminhar no mesmo passo dos outros ou de esperar por eles. #n Esse seu jeito."
22160-54 = "É o seu maior ponto fraco."
22160-60 = "Som de explosão!? #n De onde veio isso......"
22160-61 = "O show principal começa agora."
22160-62 = "Himari, espere......!"
22160-67 = "......Um ataque externo?"
22160-68 = "Impossível."
22160-69 = "Todas as facções que poderiam representar uma 'ameaça' já foram marcadas."
22160-70 = "Mesmo assim, quem poderia ter......"
22160-73 = "Por aqui, Presidente Himari."
22160-74 = "Fufu, quem diria, Eimi...... você veio me salvar......"
22160-75 = "Acho que isso conta como uma traição à Rio, mas tudo bem?"
22160-76 = "Hum...... quem sabe?"
22160-77 = "'Se você não voltar em 24 horas depois que eu for encontrar a Rio, pode comer o pudim que está na geladeira', #n não foi isso que a Presidente disse?"
22160-78 = "Mas, já que estamos aqui, achei que seria melhor comermos juntas."
22160-79 = "Entendo......"
22160-80 = "Fufu...... esperar imaginando como a minha subordinada viria me salvar é surpreendentemente divertido."
22160-81 = "Graças a isso, pude ver uma expressão interessante da Rio. #n Estou satisfeita."
22160-82 = "......Quem de vocês duas é a mais excêntrica?"
22160-83 = "Ara, 'excêntrica' é uma falta de educação. #n Não poderia corrigir para 'hobby refinado de uma hacker genial, pura e frágil de saúde'?"
22160-84 = "Sim, sim. Mas Presidente, a situação não continua ruim?"
22160-85 = "Desse jeito, é uma batalha perdida, não é? #n Mesmo com o seu reforço, não sei se ficaremos de igual para igual......"
22160-86 = "Ara, quanto a isso, está tudo bem."
22160-87 = "Hm? Você tem algum trunfo?"
22160-88 = "Sim, com certeza."
22160-89 = "Do mesmo jeito que a Eimi veio me salvar."
22160-90 = "Eu tenho várias subordinadas em quem posso confiar, sabe?"
22160-92 = "......?"
22160-94 = "Sala da Veritas"
22160-95 = "Uaaah! O que eu faço!? A conexão caiu!!"
22160-100 = "......Não dá. A rede silenciou completamente."
22160-101 = "Desse jeito, não tem o que fazer..."
22160-102 = "O que eu faço... preciso pensar... o que fazer..."
22160-103 = "Desse jeito, não só a C&C, mas o Sensei também vai ser derrotado."
22160-104 = "......Tsc, subestimei a resposta do oponente."
22160-105 = "Não importa qual rota escolhêssemos, deveríamos ter reforçado as contramedidas contra bloqueio de sinal......"
22160-106 = "......Acho que chegamos ao nosso limite......?"
22160-107 = "Eu não aceito isso! Desistir da Aris-chan é absolutamente impossível...!"
22160-109 = "Alguma forma..."
22160-112 = "......"
22160-114 = "Esperem um pouco. #n Maki, Kotama-senpai."
22160-115 = "Eh? O que foi? Hare-senpai."
22160-116 = "No monitor... tem letras... aparecendo..."
22160-117 = "..............."
22160-119 = "..............................."
22160-121 = "Isso é..."
22160-122 = "..............................................'Optimus Mirror System'"
22160-125 = "Iniciando 'Espelho'."
22160-129 = "......Eh?"
22160-140 = "É, é muito forte......"
22160-141 = "......Acho que estamos em perigo real."
22160-142 = "Parece uma situação de vida ou morte."
22160-143 = "[ns] \"Por que vocês estão tão calmas......?\""
22160-147 = "Uwaaah! Agora ele tá mirando na gente!?"
22160-148 = "[s] \"Cuidado! Atenção...!\""
22160-155 = "Os movimentos do Avant-Garde-kun......"
22160-156 = "Ficaram... repentinamente... lentos?"
22160-164 = "Ufa...... acho que chegamos a tempo."
22160-165 = "Estão todas bem?"
22160-166 = "[s] \"......Chihiro!\""
22160-168 = "Próximo Episódio; O Trampolim da Virada"