[translation]
22160-1 = "Episódio 16; Xeque-mate"
22160-17 = "…………"
22160-21 = "A divisão da C&C que deixei a cargo da Toki――"
22160-23 = "Se neutralizarmos a maior força de combate, a C&C, só restará o Sensei……."
22160-25 = "Por mais que ele seja o Sensei do Schale, #nno final, ele não terá escolha a não ser aceitar."
22160-26 = "O que é o correto, e também――"
22160-30 = "O que é uma \"decisão racional\"."
22160-31 = "――Xeque-mate."
22160-35 = "Entendo…… Rio, eu compreendi o seu raciocínio."
22160-36 = "O plano meticulosamente elaborado, e o método utilizado também……"
22160-37 = "Isso pode ser, de certa forma, \"racional\"."
22160-38 = "Himari……."
22160-39 = "Mas, ainda assim, não posso concordar com tal autossuficiência."
22160-40 = "………………Entendo."
22160-41 = "――Vou te dar apenas um conselho."
22160-42 = "Você é, de fato, talentosa."
22160-43 = "Fico até impressionada que tenha conseguido construir uma cidade como esta sem que ninguém percebesse……"
22160-44 = "De certa forma, chego a admirar."
22160-45 = "……O que quer dizer com isso?"
22160-46 = "Você…… quando acredita que algo está certo, segue em frente sem olhar para trás, não é?"
22160-47 = "Isso é uma virtude sua, mas……"
22160-48 = "Ao mesmo tempo, é também o seu ponto fraco."
22160-49 = "Ponto fraco? Não pode ser……"
22160-50 = "Rio…… você já confiou suas preocupações a algum subordinado?"
22160-51 = "……."
22160-52 = "O ponto fraco não é algo tão exagerado assim."
22160-53 = "Por ser talentosa demais―― você não tem intenção de caminhar no mesmo passo que os outros, nem de esperar por ninguém. #nEsse seu jeito."
22160-54 = "É o seu maior ponto fraco."
22160-60 = "Uma explosão!? #nOnde exatamente……."
22160-61 = "O show está apenas começando."
22160-62 = "Himari, espere……!"
22160-67 = "……Um ataque externo?"
22160-68 = "Impossível."
22160-69 = "Todas as forças que poderiam ser uma \"ameaça\" já foram monitoradas."
22160-70 = "Mesmo assim, quem poderia……."
22160-73 = "Por aqui, Diretora Himari."
22160-74 = "Fufu, quem diria que você, Eimi…… viria me resgatar……."
22160-75 = "Acho que isso conta como uma traição à Rio, mas tudo bem?"
22160-76 = "Hmm…… quem sabe?"
22160-77 = "Você disse: \"Se eu não voltar 24 horas depois de ir encontrar a Rio, pode comer o pudim que está na geladeira\", lembra?"
22160-78 = "Mas eu só pensei que seria melhor comermos juntos."
22160-79 = "Entendo……."
22160-80 = "Fufu…… imaginar como minha subordinada viria me salvar foi mais divertido do que eu pensava."
22160-81 = "Graças a isso, pude ver a expressão engraçada da Rio. #nEstou satisfeita."
22160-82 = "……Quem de vocês duas tem o gosto mais duvidoso?"
22160-83 = "Ora, \"gosto duvidoso\" é uma falta de educação. #nPoderia corrigir para \"o gosto refinado de uma hacker supergênia e doente\", por favor?"
22160-84 = "Tá, tá. E aliás, Diretora, a situação continua ruim, não é?"
22160-85 = "Desse jeito, é uma batalha perdida. #nMesmo com a nossa ajuda, não sei se ficaremos em pé de igualdade……."
22160-86 = "Ora, quanto a isso, não se preocupe."
22160-87 = "Hm? Você tem algum trunfo na manga?"
22160-88 = "Sim, claro."
22160-89 = "Assim como a Eimi veio me ajudar desta forma."
22160-90 = "Eu tenho muitas kouhais em quem posso confiar, sabe?"
22160-92 = "……?"
22160-94 = "Sala do clube da Veritas"
22160-95 = "Ahhh! O que eu faço com isso!? A conexão caiu completamente!?"
22160-100 = "……Não dá. A rede silenciou completamente."
22160-101 = "Desse jeito, não tem nada que possamos fazer……"
22160-102 = "O que eu faço…… preciso pensar…… o que eu faço……."
22160-103 = "Se continuar assim, não só a C&C, mas o Sensei também vai perder."
22160-104 = "……Tsc, subestimei a resposta do oponente."
22160-105 = "Eu deveria ter preparado medidas contra interferência desde o início, não importa a rota que escolhêssemos……."
22160-106 = "……Será que é o nosso limite…… só com a gente?"
22160-107 = "Eu não quero isso! Desistir da Alice-chan, eu não aceito de jeito nenhum……!"
22160-109 = "Algum método, qualquer um……"
22160-112 = "……"
22160-114 = "Esperem um pouco. #n Maki, Kotama-senpai."
22160-115 = "Eh, o que foi de repente? Hare-senpai."
22160-116 = "No monitor…… tem letras……."
22160-117 = "………………"
22160-119 = "……………………………………"
22160-121 = "Isso é……."
22160-122 = "…………………………………………………………\"Optimus Mirror System\""
22160-125 = "\"Espelho\" ativado."
22160-129 = "……Eh?"
22160-140 = "E-está forte demais……."
22160-141 = "……Se continuar assim, vai ficar realmente perigoso."
22160-142 = "Parece que estamos por um triz."
22160-143 = "[ns] \"Por que você está tão calma……?\""
22160-147 = "Waaah! E-estão mirando na gente agora!?"
22160-148 = "[s] \"Cuidado! Prestem atenção……!\""
22160-155 = "Os movimentos do Avant-Garde-kun……"
22160-156 = "De repente…… ficaram lentos?"
22160-164 = "Ufa…… acho que consegui chegar a tempo."
22160-165 = "Pessoal, estão bem?"
22160-166 = "[s] \"…………Chihiro!\""
22160-168 = "Próximo episódio: O trampolim da virada"
