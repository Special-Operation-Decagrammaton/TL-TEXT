[translation]#[Texto Final , mas eventualmente pode haver alterações na formatação de texto. - Filipe 29/06.]
22160-1 = "Episódio 16: Xeque-Mate."
22160-17 = "…………"
22160-21 = "A divisão do C&C, que deixei a cargo da Toki——"
22160-23 = "Uma vez neutralizada a maior força de combate, o C&C, o que resta é só o Sensei……"
22160-25 = "Por mais que seja o Sensei da Schale,#nno fim, não vai ter outra escolha senão aceitar."
22160-26 = "O que é o certo, e——"
22160-30 = "qual é o \"julgamento racional\"."
22160-31 = "——Xeque-mate."
22160-35 = "Entendi…… Rio, eu compreendi o seu pensamento."
22160-36 = "O plano meticulosamente arquitetado, e também o método……"
22160-37 = "Em certo sentido, talvez seja \"racional\"."
22160-38 = "Himari……"
22160-39 = "Mas, ainda assim, eu não posso concordar com essa presunção."
22160-40 = "………………Entendo."
22160-41 = "——Vou te dar apenas um conselho."
22160-42 = "Você é, de fato, brilhante."
22160-43 = "Conseguir construir uma cidade dessas sem ser descoberta……"
22160-44 = "de certa forma, chega até a me impressionar."
22160-45 = "……Como assim?"
22160-46 = "Você…… quando acredita estar certa, avança sem olhar pra trás, não é?"
22160-47 = "Esse é o seu ponto forte……"
22160-48 = "e, ao mesmo tempo, o seu ponto fraco."
22160-49 = "Ponto fraco? Não há como……"
22160-50 = "Rio…… você já confiou as suas aflições a alguma júnior?"
22160-51 = "……"
22160-52 = "Ponto fraco não é nada tão grandioso assim."
22160-53 = "Por ser brilhante demais—— você não ajusta o passo aos outros, nem tem a intenção de esperar pelo próximo.#nEsse seu jeito."
22160-54 = "É esse o seu maior ponto fraco."
22160-60 = "Um estrondo de explosão!?#nDe onde, afinal……"
22160-61 = "O show de verdade começa agora."
22160-62 = "Himari, pera……!"
22160-67 = "……Um ataque externo?"
22160-68 = "Impossível."
22160-69 = "Todas as forças capazes de se tornar uma \"ameaça\" já estão marcadas de antemão."
22160-70 = "E, mesmo assim, quem é que……"
22160-73 = "É por aqui, presidente Himari."
22160-74 = "Fufu, quem diria, Eimi…… que você viria me salvar……"
22160-75 = "Acho que isto vai ser uma traição à Rio. Tudo bem?"
22160-76 = "Hmm…… sei lá?"
22160-77 = "\"Se, depois que eu for me encontrar com a Rio, eu não voltar em 24 horas, você pode comer o pudim que tem na geladeira\",#nfoi o que a presidente disse, né?"
22160-78 = "Mas eu só pensei que, já que é assim, eu queria comer junto."
22160-79 = "Então é isso……"
22160-80 = "Fufu…… esperar imaginando como é que a júnior vai vir me salvar é mais divertido do que eu esperava."
22160-81 = "Graças a isso, deu pra ver uma expressão engraçada na Rio.#nEstou satisfeita."
22160-82 = "……Afinal, qual de nós é a de mau gosto."
22160-83 = "Ora, me chamar de mau gosto, que falta de educação.#nVocê poderia corrigir para \"o passatempo refinado de uma super-gênia, fragilzinha, linda e hacker\", por favor?"
22160-84 = "Sim, sim. Aliás, presidente, a situação continua ruim do mesmo jeito, não?"
22160-85 = "Do jeito que tá, é batalha perdida, viu?#nMesmo a gente entrando, mal dá pra empatar……"
22160-86 = "Ora, quanto a isso, fica tranquila."
22160-87 = "Hm? Tem alguma carta na manga?"
22160-88 = "Sim, é claro."
22160-89 = "Assim como você, Eimi, veio me salvar……"
22160-90 = "eu tenho muuuitas juniores em quem confiar, viu?"
22160-92 = "……?"
22160-94 = "Sala da Veritas"
22160-95 = "Uaah! Isto, o que a gente faz!? A conexão tá toda perdida!?"
22160-100 = "……Não dá. A rede silenciou por completo."
22160-101 = "Assim não tem como agir……"
22160-102 = "Afinal, o que a gente faz…… tem que pensar…… o que fazer……"
22160-103 = "Do jeito que tá, não só o C&C, mas até o Sensei vai perder."
22160-104 = "……Tch, subestimei a resposta do adversário."
22160-105 = "Desde o início, fosse qual fosse a rota, era preciso ter cuidado com a contramedida de jamming……"
22160-106 = "……Só com a gente…… será que é até aqui?"
22160-107 = "Isso eu não aceito! Desistir da Aris, isso eu não aceito de jeito nenhum……!"
22160-109 = "Algum jeito, tem que ter……"
22160-112 = "……"
22160-114 = "Peraí.#nMaki, Kotama."
22160-115 = "Hã, que foi de repente? Hare."
22160-116 = "No monitor…… tem umas letras……"
22160-117 = "…………………"
22160-119 = "………………………………………"
22160-121 = "Isto é……"
22160-122 = "…………………………………………………………\"Optimus Mirror System\""
22160-125 = "\"Espelho\" ativado."
22160-129 = "……Hã?"
22160-140 = "F-forte demais……"
22160-141 = "……Do jeito que tá, pode ficar perigoso de verdade."
22160-142 = "É por um triz, né."
22160-143 = "[ns] \"Por que você tá tão calma……?"
22160-147 = "Uaaah! A-agora ele tá mirando na gente!?"
22160-148 = "[s] \"Cuidado! Atenção……!\""
22160-155 = "Os movimentos do Avant-Garde……"
22160-156 = "de repente…… ficaram lentos?"
22160-164 = "Ufa…… deu pra chegar a tempo, no fim."
22160-165 = "Pessoal, tão todas bem?"
22160-166 = "[s] \"…………Chihiro!\""
22160-168 = "Próximo episódio: O Trampolim da Reviravolta."