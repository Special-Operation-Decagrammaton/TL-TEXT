[translation]
22160-1 = "第16話;チェックメイト"
22160-17 = "…………"
22160-21 = "トキに任せた、C&Cの分断――"
22160-23 = "C&Cという最大の戦力を無力化してしまえば、残っているのは先生だけ……。"
22160-25 = "いくらシャーレの先生といえど、#n最終的には受け入れるしかないわ。"
22160-26 = "何が正しいのか、そして――"
22160-30 = "どれが「合理的な判断」なのか。"
22160-31 = "――チェックメイトよ。"
22160-35 = "なるほど……リオ、あなたの考えは分かりました。"
22160-36 = "綿密に練られた計画、そしてその手法も……"
22160-37 = "それは、ある意味では「合理的」なのかもしれません。"
22160-38 = "ヒマリ……。"
22160-39 = "ですが、やはり私はそのような独善には賛同できません。"
22160-40 = "………………そう。"
22160-41 = "――ひとつだけ、忠告しておきます。"
22160-42 = "あなたは確かに優秀です。"
22160-43 = "よくもまぁ、バレずにこのような都市を建設できたものだと……"
22160-44 = "ある種、感心すらしてしまいます。"
22160-45 = "……どういう意味かしら？"
22160-46 = "あなたは……自身が正しいと信じたら、振り返らずに突き進むでしょう？"
22160-47 = "それはあなたの長所であり……"
22160-48 = "同時に弱点でもあります。"
22160-49 = "弱点？そんなわけ……"
22160-50 = "リオ……あなたは、悩みを後輩に打ち明けた事がありますか？"
22160-51 = "……。"
22160-52 = "弱点というのは、そこまで大袈裟なものではありません。"
22160-53 = "優秀すぎるが故に――人と歩幅を合わせる事も、相手を待つ気もない。#nあなたのそういうところが。"
22160-54 = "最大の弱点なのですよ。"
22160-60 = "爆発音！？#n一体どこが……。"
22160-61 = "本番はこれからですよ。"
22160-62 = "ヒマリ、ちょっ……！"
22160-67 = "……外部からの襲撃？"
22160-68 = "あり得ないわ。"
22160-69 = "事前に「脅威」になり得る勢力はすべてマーク済。"
22160-70 = "それなのに、一体誰が……。"
22160-73 = "こっちだよ、ヒマリ部長。"
22160-74 = "ふふ、まさかエイミ……あなたが私を助けに来てくださるとは……。"
22160-75 = "これはリオへの裏切りになると思いますが、大丈夫なんですか？"
22160-76 = "うーん……さあ？"
22160-77 = "「私がリオに会いに行った後、24時間経っても戻って来なかったら、冷蔵庫にあるプリンを食べてもいい」#nって部長が言ったでしょ？"
22160-78 = "でも、どうせなら一緒に食べたいなって思っただけ。"
22160-79 = "そうなのですね……。"
22160-80 = "ふふっ……後輩がどうやって助けに来てくれるのか、想像しながら待つというのは思いの外楽しいものですね。"
22160-81 = "おかげさまで、リオの面白い表情が見れました。#n満足です。"
22160-82 = "……一体、どっちが悪趣味なんだか。"
22160-83 = "あら、悪趣味だなんて失礼な。#n超天才病弱美少女ハッカーの高尚な趣味と訂正していただけませんか？"
22160-84 = "はいはい。というか部長、状況が悪いのは変わらなくない？"
22160-85 = "このままじゃ、負け戦だよ？#n私たちが加勢しても互角になるかどうか……。"
22160-86 = "あら、それなら大丈夫ですよ。"
22160-87 = "うん？何か切り札でもあるの？"
22160-88 = "ええ、もちろんです。"
22160-89 = "エイミがこうやって私を助けに来てくださったように。"
22160-90 = "私には頼れる後輩が、たーくさんいるんですよ？"
22160-92 = "……？"
22160-94 = "ヴェリタスの部室"
22160-95 = "うわあっ！これ、どうすればいいの！？回線がダメになっちゃってるよ！？"
22160-100 = "……ダメ。ネットワークが完全に沈黙した。"
22160-101 = "これじゃあ手の打ちようが……"
22160-102 = "一体どうすればいいの……考えなきゃ……どうすれば……。"
22160-103 = "このままでは、C&Cどころか、先生まで負けてしまいます。"
22160-104 = "……チッ、相手の対応をナメてた。"
22160-105 = "最初からどんなルートで行くにせよ、ジャミング対策をしっかりする必要があったのに……。"
22160-106 = "……私たちだけでは……ここまでなのでしょうか？"
22160-107 = "そんなの嫌だよ！アリスちゃんの事諦めるなんて、絶対イヤ……！"
22160-109 = "何か、方法は……"
22160-112 = "……"
22160-114 = "ちょっと待って。#nマキ、コタマ先輩。"
22160-115 = "えっ、急にどうしたの？ハレ先輩。"
22160-116 = "モニターに……文字が……。"
22160-117 = "…………………"
22160-119 = "………………………………………"
22160-121 = "これは……。"
22160-122 = "…………………………………………………………「Optimus Mirror System」"
22160-125 = "「[ruby=ミラー]鏡[/ruby]」起動。"
22160-129 = "……え？"
22160-140 = "つ、強すぎます……。"
22160-141 = "……このままじゃ本当に危ないかも。"
22160-142 = "危機一髪って感じだね。"
22160-143 = "[ns] \"何でそんなに落ち着いてるの……？"
22160-147 = "うわぁーん！こ、今度はこっちを狙ってるよ！？"
22160-148 = "[s] \"危ない！気をつけて……！\""
22160-155 = "アバンギャルド君の動きが……"
22160-156 = "急に……遅くなっ、た？"
22160-164 = "ふう……なんとか間に合ったかな。"
22160-165 = "みんな、大丈夫？"
22160-166 = "[s] \"…………チヒロ！\""
22160-168 = "次回;逆転の踏み台"
