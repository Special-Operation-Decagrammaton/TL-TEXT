[translation]
10045040-1 = "Episódio 4; Terceira Rodada: Corrida de Obstáculos Aquáticos"
10045040-2 = "A viagem de barco, repleta de gritos, finalmente chegou ao fim."
10045040-4 = "Muito bem, vamos apresentar os 10 competidores que superaram a segunda rodada!"
10045040-5 = "Pessoal, recebam-nos com uma salva de palmas!"
10045040-15 = "Chegar até aqui significa que... suas habilidades são inquestionáveis! #nNão importa quem vença, não será surpresa! Estou ansiosa pelo desempenho de vocês daqui para frente!"
10045040-16 = "Então, faremos uma breve pausa e nos vemos na terceira rodada!"
10045040-17 = "E agora... tenho uma informação valiosa para vocês... #nNão está na hora de sentir um pouco de fome?"
10045040-18 = "Para todos vocês, a filial da Hyakkiyako, a Casa de Praia, está aberta desde cedo!"
10045040-19 = "Vocês podem aproveitar o menu selecionado a dedo pela Shizuko a preços acessíveis, então não deixem de passar por lá!"
10045040-20 = "Estaremos esperando por vocês, nyan-nyan!"
10045040-21 = "Ufa... fiz um bom trabalho."
10045040-24 = "Pessoal... vão comer algo na casa de praia?"
10045040-25 = "Eu passo... não quero comer nada agora..."
10045040-26 = "Na verdade, eu também..."
10045040-28 = "Foi uma questão de vida ou morte..."
10045040-29 = "Nem quero lembrar disso..."
10045040-31 = "[ns1] \"Parabéns a todos pela classificação!\"\n[ns2] \"Como esperado da Hyakkiyako!\""
10045040-34 = "Ah, muito obrigada... de verdade..."
10045040-35 = "Sensei, qual é a próxima prova?"
10045040-36 = "(Seja o que for, só quero evitar entrar na água...)"
10045040-37 = "[ns] \"A próxima é a favorita de todos――\""
10045040-39 = "[log]Quem chegar primeiro vence! Corrida de Obstáculos Aquáticos![/log]"
10045040-43 = "...Uma dificuldade atrás da outra, hein."
10045040-45 = "O último obstáculo antes da final! A joia do Festival Aquático de Hyakkiyako! #nMuitos de vocês devem estar esperando por isso! É hora da Corrida de Obstáculos Aquáticos!"
10045040-49 = "As regras são simples! 10 pessoas largam ao mesmo tempo, e apenas as 2 que cruzarem a linha de chegada avançam para a final!"
10045040-50 = "Vamos apresentar os obstáculos que aguardam vocês no percurso!"
10045040-51 = "Plataformas giratórias!"
10045040-52 = "Ladeiras com chuva de balões d'água!"
10045040-53 = "Zona de pedras flutuantes com boias!"
10045040-54 = "Um escorregador onde o destino depende da sorte!"
10045040-55 = "Superem esses obstáculos e alcancem a linha de chegada!"
10045040-57 = "...Haa."
10045040-58 = "Se não quer se molhar, é só não cair, não é?"
10045040-59 = "Naturalmente, essa é a intenção."
10045040-60 = "(...Isso mesmo. Sem forçar, vou levar na esportiva e tentar chegar ao objetivo em segurança. #nJá que basta não cair na água.)"
10045040-62 = "Enquanto isso..."
10045040-63 = "Droga, o que está acontecendo!? #nEles não estão todos ainda na competição?!"
10045040-64 = "Desse jeito, não temos chance de ganhar!"
10045040-65 = "Vamos desistir logo... só dois podem avançar para a final."
10045040-66 = "Basta a gente vencer, oras! Por que desistir?!"
10045040-67 = "Talvez você não saiba, mas..."
10045040-68 = "Sinceramente, eles são muito fortes."
10045040-69 = "Além disso, eles já foram gentis com a gente... sinto que é errado ficar tratando-os como inimigos o tempo todo."
10045040-71 = "Não fiquem desanimados! Ainda há uma chance! Se seguirem o meu plano, vamos vencer!"
10045040-72 = "Kuku... kukuku... kukukuku...!"
10045040-73 = "U-uau... essa risada parece de vilão..."
10045040-74 = "Desta vez... desta vez, com certeza...!"
10045040-76 = "E algum tempo depois..."
10045040-77 = "O momento tão esperado, a Corrida de Obstáculos Aquáticos vai começar!"
10045040-82 = "Finalmente chegou a hora..."
10045040-83 = "Quem será que vai me enfrentar na final?"
10045040-84 = "Vamos cruzar a linha de chegada juntas e todas nós avançaremos para a final!"
10045040-85 = "Não tem como fazer uma coisa dessas."
10045040-88 = "(Haa...)"
10045040-89 = "(O melhor seria eu ser eliminada naturalmente.)"
10045040-90 = "(Já até preparei uma desculpa...)"
10045040-91 = "(O problema é como ser eliminada naturalmente... Pense, Kikyou...!)"
10045040-92 = "Kikyou. #n...Kikyou?"
10045040-93 = "Você está pensando profundamente em algo..."
10045040-94 = "Atenção, atletas! Por favor, alinhem-se na linha de partida!"
10045040-101 = "Terceira rodada, corrida de obstáculos aquáticos...!"
10045040-102 = "[ns] \"Começar--!!\""
10045040-105 = "As primeiras a disparar na frente são as quatro da Hyakkiyako!"
10045040-106 = "As plataformas giratórias estão bloqueando o caminho! #nSerá que elas conseguirão atravessar em segurança?"
10045040-107 = "Acho que o melhor é ir de uma vez só."
10045040-108 = "Se corrermos mais rápido que a rotação da plataforma, não tem problema!"
10045040-109 = "Comparado ao nosso treinamento habitual, isso não é nada!"
10045040-110 = "(Não olhe para baixo. Não olhe para baixo. Não olhe para baixo...!)"
10045040-112 = "Incrível! Todas pularam de uma vez só!"
10045040-113 = "Sassassá! Izuna não pode ficar para trás! Nin-nin!"
10045040-114 = "Shun."
10045040-115 = "Lá vai."
10045040-119 = "Elas continuam superando os obstáculos, uma após a outra! Não há diferença nenhuma entre elas!"
10045040-120 = "[ns] \"Como esperado das competidoras que chegaram até aqui!\""
10045040-121 = "Isso, isso mesmo... continue assim... siga em frente!"
10045040-122 = "Ei, você fez exatamente como eu instruí, né?"
10045040-123 = "Bem... eu fiz, mas..."
10045040-125 = "O grupo da frente chegou na ladeira onde balões de água estão caindo!! #nCuidado para não serem atingidas!"
10045040-128 = "Vou passar por aqui de uma vez--"
10045040-133 = "Ugh...!?"
10045040-137 = "O que...? Isso escorrega e está grudento..."
10045040-138 = "Esse cheiro... é óleo de coco!?"
10045040-139 = "N-não dá para subir a ladeira assim...!"
10045040-142 = "[ns] \"Shizuko? Estão todas cobertas de óleo...\""
10045040-143 = "Ah, o quê!? Não era para ser assim...!"
10045040-144 = "Equipe, por favor, verifiquem isso!"
10045040-146 = "Funcionou. Com isso, vamos abrir uma grande vantagem!"
10045040-147 = "Até mais!"
10045040-151 = "O que é isso!? De onde você tirou esse gancho de escalada!?"
10045040-152 = "Eu preparei isso prevendo que algo assim aconteceria!"
10045040-153 = "Fiquem aí se divertindo com essa meleca!"
10045040-157 = "Nossa...! Cortar a corda depois de usar... que covardia!"
10045040-158 = "Pessoal, primeiro vamos lavar esse óleo!"
10045040-159 = "Izuna vai ajudar! #nArte Ninja estilo Izuna! Técnica da Fonte!"
10045040-165 = "No fim das contas, estava destinado a me molhar..."
10045040-166 = "Vamos atrás delas! Ainda dá para recuperar!"
10045040-170 = "Não pode ser!? Já nos alcançaram!"
10045040-171 = "Está tudo bem! Preparei outra armadilha mais à frente!"
10045040-173 = "[log]Próximo percurso![/log]"
10045040-175 = "[log]Zona de pedras flutuantes com boias![/log]"
10045040-178 = "Coloquei bombas nas boias. Se alguém pisar sem saber, vai explodir e cair direto no mar, entendeu?"
10045040-179 = "Eu marquei as que são seguras para que só eu saiba quais são!"
10045040-180 = "E-então vai na frente! Eu não faço ideia de qual é a segura!"
10045040-186 = "Você me paga pelo que fez agora há pouco."
10045040-189 = "Ainda não acabou, isso não é nada—"
10045040-195 = "……Ué?"
10045040-199 = "Idiota! Por que você foi pisar logo nela……!!"
10045040-205 = "Haa……."
10045040-209 = "Ah! As duas que estavam na liderança foram eliminadas!"
10045040-210 = "Mas afinal, quem foi que colocou bombas nas boias?!"
10045040-211 = "[ns] \"Não foi a Shizuko?\""
10045040-212 = "Eu jamais faria uma coisa dessas!"
10045040-215 = "Se existem plataformas que explodem, é só passar sem pisar nelas!"
10045040-216 = "Arte Ninja estilo Izuna! Técnica da Corrida sobre a Água!"
10045040-220 = "In-incrível……! A competidora Izuna está correndo sobre a água……!"
10045040-221 = "[s] \"A Izuna consegue dar uns 5 passos……!\""
10045040-223 = "Não vou ficar para trás! Eu também……!"
10045040-224 = "Ei! Se você correr desse jeito imprudente……!"
10045040-225 = "Não pense que uma bombinha dessas vai me parar!"
10045040-229 = "Oh! A competidora Renge também conseguiu passar em segurança!"
10045040-230 = "Olha só, a Kikyou também!"
10045040-233 = "(Se for a boia que a Renge pisou, não deve ter problema……!)"
10045040-240 = "……Eh?"
10045040-248 = "(Por que……!)"
10045040-249 = "(O-o que aconteceu……? Eu pisei na plataforma errada……?)"
10045040-250 = "(Em um momento tão importante…… eu cometer um erro……)"
10045040-251 = "(Tenho que…… subir…… rápido……)"
10045040-252 = "(Mas…… aos poucos…… minha consciência……)"
10045040-254 = "(Pessoal…… me desculpem……)"
10045040-256 = "……Kikyou?"
10045040-257 = "Kikyou——!!"
