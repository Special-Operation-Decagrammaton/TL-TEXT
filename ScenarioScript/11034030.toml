[translation]
11034030-1 = "Desempenho; competitividade (1)"
11034030-2 = "...Isso dói! !"
11034030-3 = "Ah, já...!"
11034030-4 = "……o que? Você machucou o dedo?"
11034030-5 = "Não, só cortei um pouco."
11034030-6 = "É por isso que eu disse para você ter cuidado."
11034030-7 = "Espere um minuto, curativo..."
11034030-8 = "...Isso não está aí."
11034030-10 = "Bem, se Kazusa pudesse usar tanto."
11034030-11 = "...?"
11034030-12 = "...Você usou tanto assim?"
11034030-13 = "Por que você não se preocupa primeiro com você mesmo? #nAo contrário de você, esta é minha primeira lesão."
11034030-14 = "Bem, vamos fazer uma pausa por enquanto, certo? Não se esforcem demais, vocês dois."
11034030-15 = "Estou totalmente bem com isso."
11034030-17 = "...Ao contrário de outra pessoa, você sabe."
11034030-18 = "...?"
11034030-19 = "O que, você está falando de mim?"
11034030-20 = "É por isso que ele estava me preocupando por despeito."
11034030-22 = "...Oh, quais são as regras para ganhar e perder?"
11034030-23 = "Kazusa-chan Yoshimi-chan! Sem brigas...!"
11034030-24 = "...Não, não é realmente uma briga, está tudo bem."
11034030-25 = "Mas..."
11034030-26 = "Se for esse o caso, farei uma sessão com você. Estou preocupado se você consegue acompanhar meu ritmo."
11034030-28 = "Superior. Não diga apenas uma frase."
11034030-29 = "O que, auto-apresentação?"
11034030-30 = "Você late muito, fica inseguro?"
11034030-34 = "Isso é exatamente..."
11034030-38 = "……pedra! !"
