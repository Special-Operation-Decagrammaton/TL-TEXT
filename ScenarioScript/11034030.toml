[translation]
11034030-1 = "パフォーマンス;競争意識（１）"
11034030-2 = "……痛っ！！"
11034030-3 = "あぁ、もう……！"
11034030-4 = "……なに？指でも怪我した？"
11034030-5 = "ん、ちょっと切っただけよ。"
11034030-6 = "だから気をつけなって言ったのに。"
11034030-7 = "ちょっと待ってて、絆創膏……。"
11034030-8 = "……あれ、無い。"
11034030-10 = "それはまあ、カズサがあれだけ使えばねぇ。"
11034030-11 = "……？"
11034030-12 = "……そんなに使ったっけ。"
11034030-13 = "まずは自分の心配したら？#nあんたと違って、私はこれが初めての怪我だし。"
11034030-14 = "と、とりあえず休憩しよう？二人とも、あんまり無理しないでね。"
11034030-15 = "私はこれくらい全然平気よ。"
11034030-17 = "……誰かさんと違って、ね。"
11034030-18 = "……？"
11034030-19 = "何それ、私のこと言ってんの？"
11034030-20 = "そっちこそ、柄にもなく心配してくれちゃって。"
11034030-22 = "……おぉ、勝敗のルールは何にする？"
11034030-23 = "カズサちゃんヨシミちゃん！喧嘩はダメ……！"
11034030-24 = "……いや、別に喧嘩ってほどじゃないよ、大丈夫。"
11034030-25 = "けど……。"
11034030-26 = "そういうことなら、セッションするわよ。私のリズムに付いてこられるか心配だけど。"
11034030-28 = "上等。ワンフレーズでトチらないでよね。"
11034030-29 = "何それ、自己紹介？"
11034030-30 = "よく吠えるね、自信無いの？"
11034030-34 = "これぞまさに――"
11034030-38 = "……ロック！！"
