[translation]
1000502-1 = "眠る鯨"
1000502-2 = "対策委員会・教室"
1000502-3 = "それで、[ruby=くじら]鯨[/ruby]は寝てる時も呼吸を我慢してるんだって。すごくない？"
1000502-4 = "[s1] \"すごいとは思うけど、鯨の話、唐突だね？\"\n[s2] \"手伝ってほしい用件があるんじゃなかったっけ？\""
1000502-5 = "あ～もう、ロマンがないなあ、先生は。"
1000502-6 = "あ～もう、ロマンがないなあ、先生は。"
1000502-7 = "それはそうとして、うへ～、実は力を使う仕事でね。どうしても一人じゃ動かせない物があって。"
1000502-8 = "先生以外にお願いできる人もいないし、まあこうなったわけ。"
1000502-9 = "それにしても本当に来てくれるなんて、やっぱりさすがは先生だな～。"
1000502-10 = "[s] \"力仕事なら、他のメンバーも呼ぶ？\""
1000502-11 = "そうはいかないんだなー、このことはみんなには秘密にしたくってね。"
1000502-12 = "さあて、じゃあ行こっか。学校に誰もいない今がチャンスだからさ。"
1000502-15 = "使われていない倉庫"
1000502-16 = "（ガラガラガラ）"
1000502-17 = "けほけほ……ここなんだけど、ホコリがすごいな……。"
1000502-18 = "あ、そこ気を付けて、先生。足元ちゃんと見ないと。"
1000502-19 = "[s3] \"ここは……？\"\n[s4] \"……倉庫？\""
1000502-20 = "うん。使われない資材倉庫だよ。うちの学校にはこういうものがいくつもあるから。"
1000502-21 = "うん。使われない資材倉庫だよ。うちの学校にはこういうものがいくつもあるから。"
1000502-22 = "まあ、もう使えそうなものは全部売り出したから、ほとんどガラクタしか残ってないけど。"
1000502-24 = "でもたまに掘り返すと……こうやって……。"
1000502-25 = "けほっけほ……ほら、じゃーん！"
1000502-26 = "こんなすごい物が発掘されたりもするんだから。どう、すごいでしょ？"
1000502-27 = "[s5] \"体育のマット……？\"\n[s6] \"これで何をするの？\""
1000502-28 = "やれやれ、これはただの体育マットじゃないんだよ。これぞ我が校の過去の栄光、お金に恵まれていた時期の象徴とも言える物！"
1000502-29 = "やれやれ、これはただの体育マットじゃないんだよ。これぞ我が校の過去の栄光、お金に恵まれていた時期の象徴とも言える物！"
1000502-30 = "なんと、ダウンマット！"
1000502-31 = "不織布みたいな安い詰め物じゃない、本物のダウンフェザーをギュッと詰め込んだ贅沢な一品！"
1000502-32 = "掛け布団でもない、ただ生徒たちが踏んで歩く体育マットにダウンだなんて、とんでもないよね～。"
1000502-33 = "うへ、まあでも世の中には色んなことがあるってことで、せっかくだしもらっておこう。"
1000502-34 = "深く考えたら負けだからね～？"
1000502-35 = "さあ、これからはこのおじさんが可愛がってやるからね♪"
1000502-36 = "先生、ちょっとそっち持ってくれる？"
1000502-39 = "よいしょ～……じゃあ行こっか。"
1000502-41 = "使われていない教室"
1000502-42 = "（ガラガラ）"
1000502-43 = "さて、この辺でいいか。離していいよ。"
1000502-44 = "（ふわっ）"
1000502-45 = "うーん、ちょっと角度が微妙……もう少しこうやって……。"
1000502-47 = "……よし、完璧！"
1000502-48 = "[s] \"ここにマットを置いて何するの？\""
1000502-49 = "うへ～、先生は当たり前のことを聞くんだね。"
1000502-50 = "（ぴょん）"
1000502-52 = "（ふわっ）"
1000502-53 = "[s7] \"横になっちゃった？！\"\n[s8] \"就寝モード？！\""
1000502-54 = "これでお昼寝するのにちょうどいい秘密基地の完成！"
1000502-55 = "これでお昼寝するのにちょうどいい秘密基地の完成！"
1000502-56 = "誰にも気づかれないおじさんだけの秘密スポットが完成されたってこと。あ、先生、この場所をみんなに密告なんてしないでよ？"
1000502-57 = "[s9] \"ちょっとホコリは払ってから使った方が良さそうだけど。\"\n[s10] \"このまま寝たら風邪ひくよ。\""
1000502-58 = "まあまあ細かいことは置いておいて。でもあらためてサンキューサンキュー。うへ～、おかげさまですごくいい寝床ができたからさ。"
1000502-59 = "まあまあ細かいことは置いておいて。でもあらためてサンキューサンキュー。うへ～、おかげさまですごくいい寝床ができたからさ。"
1000502-60 = "うへ……ふかふか……これがダウンの感触かあ……。"
1000502-61 = "ああ……ものすごい眠気が襲ってくる……先生……。"
1000502-62 = "ふわああ、ん～、じゃあおやすみなさい…… 。"
1000502-63 = "……鯨じゃなくて、よかっ……。"
1000502-64 = "……くぅ。"
1000502-66 = "[s11] \"………………。\"\n[s12] \"……本当に寝ちゃった。\""
1000502-67 = "（眠ったホシノをしばらく見守ってから、次の予定を思い出してそろそろ帰ることにした）"
1000502-68 = "（眠ったホシノをしばらく見守ってから、次の予定を思い出してそろそろ帰ることにした）"
1000502-70 = "（静かに教室を抜け出した）"
