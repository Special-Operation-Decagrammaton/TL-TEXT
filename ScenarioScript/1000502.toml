[translation]
1000502-1 = "Baleia adormecida"
1000502-2 = "Comitê de Contramedidas - Sala de Aula"
1000502-3 = "Então, dizem que as baleias conseguem prender a respiração até enquanto dormem. Não é incrível?"
1000502-4 = "[s1] \"Acho incrível, mas o assunto baleia foi bem repentino, não acha?\"\n[s2] \"Você não tinha um favor para me pedir?\""
1000502-5 = "Ah, qual é, Sensei... Você não tem nenhum pingo de romantismo."
1000502-6 = "Ah, qual é, Sensei... Você não tem nenhum pingo de romantismo."
1000502-7 = "Mas deixando isso de lado, uhe~, na verdade é um trabalho que exige força física. Tem algo que eu não consigo mover sozinha de jeito nenhum."
1000502-8 = "E como não tem mais ninguém a quem eu possa pedir, além de você, Sensei, acabamos assim."
1000502-9 = "Mas, falando sério, você realmente veio... Como esperado do Sensei, hein."
1000502-10 = "[s] \"Se é trabalho braçal, quer que eu chame os outros membros?\""
1000502-11 = "Não dá, não dá. Eu queria manter isso em segredo de todo mundo."
1000502-12 = "Bom, então vamos lá. Agora que não tem ninguém na escola, é a nossa chance."
1000502-15 = "Depósito desativado"
1000502-16 = "(Rastrear)"
1000502-17 = "Cof, cof... É aqui, mas quanta poeira..."
1000502-18 = "Ah, cuidado aí, Sensei. Olhe onde pisa."
1000502-19 = "[s3] \"Isto é...?\"\n[s4] \"...Um depósito?\""
1000502-20 = "Sim. É um depósito de materiais que não usamos mais. Nossa escola tem vários lugares assim."
1000502-21 = "Sim. É um depósito de materiais que não usamos mais. Nossa escola tem vários lugares assim."
1000502-22 = "Bem, como já vendemos tudo o que ainda prestava, só sobrou tralha mesmo."
1000502-24 = "Mas, às vezes, quando a gente remexe... olha só..."
1000502-25 = "Cof, cof... Tcharam!"
1000502-26 = "Às vezes a gente desenterra coisas incríveis assim. E aí, não é demais?"
1000502-27 = "[s5] \"Um colchonete de educação física...?\"\n[s6] \"O que vai fazer com isso?\""
1000502-28 = "Ora, ora, isso não é um simples colchonete de educação física. Isso é a glória do passado da nossa escola, um símbolo da época em que éramos ricas!"
1000502-29 = "Ora, ora, isso não é um simples colchonete de educação física. Isso é a glória do passado da nossa escola, um símbolo da época em que éramos ricas!"
1000502-30 = "É nada menos que um colchonete de plumas!"
1000502-31 = "Não é enchimento barato de tecido sintético, é uma peça luxuosa recheada com penas de ganso de verdade!"
1000502-32 = "Nem edredom é, é um colchonete de ginástica que os alunos pisam em cima, e ainda por cima é de plumas... inacreditável, né?"
1000502-33 = "Uhe, mas como o mundo dá voltas, já que estamos aqui, vamos levar."
1000502-34 = "Se pensar demais, a gente perde, né?"
1000502-35 = "Vamos lá, de agora em diante, esta titia aqui vai cuidar muito bem de você♪"
1000502-36 = "Sensei, pode segurar aí?"
1000502-39 = "Heave-ho... Então vamos nessa."
1000502-41 = "Sala de aula desativada"
1000502-42 = "(Deslizar)"
1000502-43 = "Certo, aqui está bom. Pode soltar."
1000502-44 = "(Fof)"
1000502-45 = "Hmm, o ângulo está meio estranho... Deixa eu ajustar um pouco..."
1000502-47 = "...Pronto, perfeito!"
1000502-48 = "[s] \"O que você vai fazer colocando esse colchonete aqui?\""
1000502-49 = "Uhe~, Sensei, você faz perguntas óbvias, hein."
1000502-50 = "(Pulo)"
1000502-52 = "(Fof)"
1000502-53 = "[s7] \"Você deitou?!\"\n[s8] \"Modo soneca ativado?!\""
1000502-54 = "Com isso, minha base secreta perfeita para tirar uma soneca está completa!"
1000502-55 = "Com isso, minha base secreta perfeita para tirar uma soneca está completa!"
1000502-56 = "Um cantinho secreto só para mim, onde ninguém vai me achar. Ah, Sensei, não vá contar para ninguém sobre este lugar, viu?"
1000502-57 = "[s9] \"Acho que seria melhor tirar a poeira antes de usar.\"\n[s10] \"Você vai acabar pegando um resfriado se dormir assim.\""
1000502-58 = "Ah, não se preocupe com detalhes. Mas, de qualquer forma, obrigada, obrigada. Uhe~, graças a você, consegui um lugar excelente para dormir."
1000502-59 = "Bem, vamos deixar os detalhes de lado. Mas, de novo, muito obrigada mesmo. Uhe~, graças a você, consegui um lugar para dormir muito bom."
1000502-60 = "Uhe... tão fofinho... então é essa a sensação de plumas..."
1000502-61 = "Ah... um sono incrível está me dominando... Sensei..."
1000502-62 = "Uaaah, hum~, então boa noite..."
1000502-63 = "......Ainda bem que não era uma baleia..."
1000502-64 = "......Zzz."
1000502-66 = "[s11] \"………………。\"\n[s12] \"……Ela realmente dormiu.\""
1000502-67 = "（Depois de observar a Hoshino dormindo por um tempo, lembrei-me do meu próximo compromisso e decidi que era hora de ir embora）"
1000502-68 = "（Depois de observar a Hoshino dormindo por um tempo, lembrei-me do meu próximo compromisso e decidi que era hora de ir embora）"
1000502-70 = "（Saí silenciosamente da sala de aula）"
