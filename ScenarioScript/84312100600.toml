[translation]
84312100600-5 = "コントローラー……これだろうか？"
84312100600-10 = "え？もう見つけたの？"
84312100600-12 = "……あっ！これこれ！私のコントローラー！！"
84312100600-14 = "だからお姉ちゃんのじゃないって……。"
84312100600-16 = "どっ、どこにあったんですか？私たちもそこは見てみたんですが……。"
84312100600-17 = "そうなのか？よく見える場所にあったのだが……。"
84312100600-24 = "さてさてこれでゲームを……おっ、動いた動いた！"
84312100600-25 = "って……あれ？なんか……壊れてたところも直ってる！？"
84312100600-26 = "そんなわけないでしょ……。"
84312100600-31 = "……あれ、本当だ。何で？"
84312100600-32 = "なんでか分かんないけど、これでまたマルチプレイができるよ！"
84312100600-33 = "お姉ちゃん、まずはお礼を……。"
84312100600-35 = "いや、それほどのことでは……。"
84312100600-41 = "……アリス？"
84312100600-42 = "なぜそこにコントローラーがあったのか、シーフ王も知らないのですか？"
84312100600-46 = "ならば……きっとこれは賢者の仕業です！"
84312100600-51 = "賢者……？"
84312100600-55 = "（……リオ）"
84312100600-56 = "……ああ。そうかもしれないな。"
84312100600-57 = "さあ、シーフ王！もう一回パーティーに入るのです！"
84312100600-58 = "私も？"
84312100600-59 = "はい！アリスたちとゲームをしましょう！"
84312100600-61 = "シーフ王と……賢者が救出した、このコントローラーと共に！！"
84312100600-66 = "ふふ。いいだろう。そうだな……言うなれば……"
84312100600-67 = "堕落魔法の抵抗を持つこのシーフ王が、共に行こう。"
84312100600-68 = "……はい！！"
