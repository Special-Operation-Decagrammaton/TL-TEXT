[translation]
34160-1 = "Episódio 16; Corredor Subterrâneo"
34160-2 = "Filial de Arius, Antigo Prédio Escolar"
34160-4 = "É por aqui."
34160-5 = "[s] \"Então esse é... o antigo prédio da escola da filial de Arius.\""
34160-6 = "É a primeira vez que entro aqui..."
34160-7 = "Pois é. Na verdade, isso aqui está mais para ruínas abandonadas do que outra coisa."
34160-8 = "Será que as alunas de Arius estudavam aqui antigamente...?#nO-O que será que elas aprendiam...?"
34160-9 = "Quem sabe... É provável que não haja mais ninguém vivo que se lembre disso."
34160-10 = "Vamos nos apressar... o corredor fica no subsolo."
34160-12 = "Antigo Prédio Escolar, Corredor Subterrâneo"
34160-13 = "A-Achei! É por aqui!"
34160-14 = "Ótimo."
34160-15 = "......Espera."
34160-19 = "Se como a Líder disse, este for um corredor que nos leva direto para a Basílica... este terreno é perigoso."
34160-20 = "Eu também já tinha considerado a possibilidade de uma emboscada. Mas se é uma linha reta..."
34160-21 = "Não, estou falando da Mika Misono."
34160-22 = "Eu me perguntei... o que eu faria se estivesse no lugar dela..."
34160-23 = "O maior obstáculo para ela provavelmente é o Sensei.#nPor um lado porque ela não quer machucá-lo, e por outro, porque os comandos dele seriam difíceis de lidar."
34160-25 = "Se for o caso, com certeza ela..."
34160-29 = "Gogogogogogogogogogo"
34160-30 = "O que é isso..."
34160-31 = "C-Cuidado! Sensei, o pilar de trás está...!!"
34160-32 = "[ns1] \"......!!\"\n[ns2] Corre para frente evitando os pilares que caem."
34160-38 = "Doooomm!!!!"
34160-40 = "Ugh... Sensei, tudo bem?"
34160-41 = "[s] \"Aham... Por pouco...\""
34160-42 = "A-Ainda bem... O pilar desabando do nada... O que foi isso..."
34160-46 = "A-Ah!? E a L-Líder?"
34160-47 = "Líder, onde você tá?"
34160-48 = "......Aqui. Estou do outro lado."
34160-49 = "Não consigo ver nada com os destroços. Alguém se feriu?"
34160-50 = "Aham, estou bem."
34160-51 = "E-Espera um pouco, Líder! Vou tentar mover os pilares..."
34160-56 = "A-Ah! Ainda não acabou!? Tem mais caindo!?"
34160-60 = "......*Cof, cof*."
34160-61 = "Não tem jeito... está completamente bloqueado."
34160-62 = "A-Acabou de vez, né!? A Líder está bem!?"
34160-63 = "Líder, tá me ouvindo? Se o caminho não tiver sido bloqueado por aí, vou procurar um ponto de encontro."
34160-66 = "......Não, isso me parece improvável."
34160-70 = "......Ufa, ainda bem! Eu reduzi a força com medo do Sensei acabar se envolvendo.#nMas mesmo assim, ainda estava preocupada."
34160-75 = "......"
34160-80 = "Mas enfim, Saori Joumae――Que bom que você ficou por aqui inteirinha."
34160-82 = "Próximo Episódio; Confronto"