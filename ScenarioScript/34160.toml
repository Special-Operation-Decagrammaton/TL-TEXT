[translation]
34160-1 = "Episódio 16; Corredor Subterrâneo"
34160-2 = "Escola Filial Arius - Antigo Prédio Escolar"
34160-4 = "Por aqui."
34160-5 = "[s] \"Este é o antigo prédio da Escola Filial Arius...\""
34160-6 = "É a primeira vez que entro aqui..."
34160-7 = "Pois é. Este lugar é mais parecido com uma ruína... ou melhor, quase um sítio arqueológico."
34160-8 = "Será que os alunos da Arius estudavam aqui antigamente...? O-o que será que eles aprendiam...?"
34160-9 = "Quem sabe... Provavelmente não sobrou ninguém que se lembre disso."
34160-10 = "Vamos nos apressar... O corredor fica no subsolo."
34160-12 = "Antigo Prédio Escolar - Corredor Subterrâneo"
34160-13 = "A-achei! É por aqui!"
34160-14 = "Entendido."
34160-15 = "……Espere."
34160-19 = "Como a líder disse, se este for o caminho que leva direto à Basílica... este terreno é perigoso."
34160-20 = "Eu também estou considerando a possibilidade de uma emboscada. Mas, se for uma linha reta..."
34160-21 = "Não, estou falando da Mika Misono."
34160-22 = "Eu estava pensando no que eu faria se estivesse no lugar dela..."
34160-23 = "Para ela, o maior obstáculo provavelmente é a presença do Sensei. Ela não quer machucá-lo, e a liderança do Sensei também seria um problema."
34160-25 = "Então, com certeza..."
34160-29 = "GOGOGOGOGOGOGOGOGO"
34160-30 = "Isso é..."
34160-31 = "C-cuidado! Sensei, uma coluna está caindo atrás de você...!!"
34160-32 = "[ns1] \"………！！\"\n[ns2] Corre para frente desviando da coluna que desaba."
34160-38 = "BOOOOM！！！！"
34160-40 = "Droga... Sensei, você está bem?"
34160-41 = "[s] \"Sim, estou bem...\""
34160-42 = "A-ainda bem... Como uma coluna pode desabar de repente... o que está acontecendo..."
34160-46 = "A-ah!? O-onde está a líder?"
34160-47 = "Líder, onde você está?"
34160-48 = "……Estou aqui. Do outro lado."
34160-49 = "Não consigo ver direito por causa dos escombros. Você se machucou?"
34160-50 = "Não, estou bem."
34160-51 = "E-espere um pouco, líder! Vou tentar remover a coluna..."
34160-56 = "A-ah! Ainda não acabou!? Vai desabar mais alguma coisa!?"
34160-60 = "……Tosse, tosse."
34160-61 = "Não dá... Está completamente bloqueado."
34160-62 = "E-então acabou de vez!? Líder, você está bem mesmo!?"
34160-63 = "Líder, consegue me ouvir? Se o caminho de volta para onde você está não estiver bloqueado, vamos procurar um ponto de encontro."
34160-66 = "……Não, parece difícil."
34160-70 = "……Que bom! Eu diminuí a potência porque pensei que o Sensei pudesse ser pego no meio... Mas ainda assim, eu estava preocupada."
34160-75 = "……."
34160-80 = "Mas, de qualquer forma, Saori Joumae... fico feliz que você tenha permanecido intacta."
34160-82 = "Próximo episódio; Confronto"
