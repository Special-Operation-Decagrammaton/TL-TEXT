[translation]
34160-1 = "Episódio 16;O Corredor Subterrâneo"
34160-2 = "Filial de Arius - Prédio velho"
34160-4 = "É por aqui."
34160-5 = "[s] \"Este é o antigo prédio da Filial de Arius…….\""
34160-6 = "É a primeira vez que eu entro……."
34160-7 = "Pois é. Isto aqui é uma ruína…… ou melhor, já tá mais pra sítio arqueológico."
34160-8 = "Será que, antigamente, as alunas de Arius estudavam aqui…….#nO-o que será que aprendiam……."
34160-9 = "Sei lá…… quem se lembre disso já não deve existir mais."
34160-10 = "Vamos correr…… o corredor fica no subsolo."
34160-12 = "Prédio velho - Corredor subterrâneo"
34160-13 = "A-achei! É por aqui!"
34160-14 = "Sei."
34160-15 = "……Espera."
34160-19 = "Se, como a Líder disse, esta é a passagem que liga direto à Basílica…… este terreno é perigoso."
34160-20 = "Na possibilidade de emboscada eu também pensei. Mas, sendo uma linha reta, pelo contrário……."
34160-21 = "Não; eu falo da Mika Misono."
34160-22 = "Eu pensei…… o que EU faria no lugar dela."
34160-23 = "O maior obstáculo pra ela, provavelmente, é a existência do Sensei.#nEla não quer machucá-lo, e o comando dele também incomoda."
34160-25 = "Então, com certeza……."
34160-29 = "GOGOGOGOGOGOGOGO"
34160-30 = "Isto é……."
34160-31 = "C-cuidado! Sensei, atrás, a coluna……!!"
34160-32 = "[ns1] \"………!!\"\n[ns2] Desvia da coluna que desaba e corre pra frente."
34160-38 = "BUUUUM!!!!"
34160-40 = "Gh…… Sensei, você tá bem?"
34160-41 = "[s] \"Sim, com esforço……\""
34160-42 = "Q-que bom…… a coluna quebrar do nada…… mas o que……."
34160-46 = "A-aah!? C-cadê a Líder?"
34160-47 = "Líder, cadê você?"
34160-48 = "……Aqui. Estou do lado oposto."
34160-49 = "Os escombros não deixam ver direito. Ferimentos?"
34160-50 = "Não, estou bem."
34160-51 = "E-espera um pouquinho, Líder! Vou tentar mover a coluna……."
34160-56 = "A-aah! Ainda não acabou!? Tá desabando mais!?"
34160-60 = "……Cof, cof."
34160-61 = "Não adianta…… bloqueou por completo."
34160-62 = "A-acabou de vez, né!? A Líder tá bem!?"
34160-63 = "Líder, tá me ouvindo? Se o caminho de volta do seu lado não bloqueou, a gente procura um ponto de encontro."
34160-66 = "……Não; parece difícil."
34160-70 = "……Que bom! Eu diminuí a potência achando que o Sensei podia ser pego junto.#nMesmo assim, fiquei aflita."
34160-75 = "……."
34160-80 = "Bom, mas, Saori Joumae――que bom que você sobrou inteirinha, assim."
34160-82 = "Próximo Episódio;Confronto"
