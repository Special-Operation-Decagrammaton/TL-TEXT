[translation]
83301400200-6 = "Fu, fu, fu, Presidente do Comitê Disciplinar...! Quem diria que nosso plano seria frustrado...!"
83301400200-7 = "Então ainda não sou páreo para a Presidente do Comitê Disciplinar, é..."
83301400200-8 = "Nossa 'Grande Operação Termas Empolgantes'..."
83301400200-16 = "E afinal, o que é essa 'Grande Operação Termas Empolgantes'?"
83301400200-17 = "Não consigo entender por que vocês tentaram construir fontes termais até no estacionamento do novo prédio do conselho."
83301400200-21 = "Será que... vocês só queriam causar confusão?"
83301400200-22 = "Errado!"
83301400200-23 = "Prepare-se para se surpreender! A 'Grande Operação Termas Empolgantes' é, literalmente, um plano grandioso para criar fontes termais empolgantes em Gehenna!"
83301400200-24 = ".........?"
83301400200-25 = "Enquanto cavávamos fontes termais nos arredores de Gehenna como sempre fazemos... descobrimos um fato por acaso."
83301400200-26 = "...Que vários veios de água estavam conectados a um único ponto."
83301400200-27 = "Será que esse ponto é..."
83301400200-28 = "Isso mesmo! É exatamente o estacionamento do prédio do conselho!"
83301400200-29 = "Se conseguíssemos desenvolver uma fonte termal ali, todos os veios de água se conectariam..."
83301400200-30 = "E teríamos uma fonte termal gigantesca, grande o suficiente para todos os alunos de Gehenna mergulharem!"
83301400200-34 = "E pensar que um plano tão cheio de sonhos estava prestes a se tornar realidade...!"
83301400200-35 = ".........Que plano absurdo, sério."
83301400200-36 = "Desta vez, tivemos que recuar temporariamente, mas..."
83301400200-37 = "Nós nunca vamos desistir! Mesmo que este plano tenha falhado..."
83301400200-38 = "Da próxima vez, usaremos o veio de água que passa sob o Clube de Merenda para executar a 'Grande Operação Ovos Termais Empolgantes'!"
83301400200-39 = "Já entendi, agora fique quieta e vá refletir sobre seus atos por um tempo."
83301400200-46 = "Ugh!?"
