[translation]
83301400200-6 = "ふ、ふ、ふ、風紀委員長……！まさか計画が阻止されるとは……！"
83301400200-7 = "まだ風紀委員長には敵わない、のか……"
83301400200-8 = "私たちの「わくわく温泉大作戦」が……！"
83301400200-16 = "それで「わくわく温泉大作戦」って何なの？"
83301400200-17 = "どうして新議事堂の駐車場にまで温泉を作ろうとしたのか……理解できないのだけど。"
83301400200-21 = "もしかして……ただ暴れたかっただけ、とか？"
83301400200-22 = "違う！"
83301400200-23 = "聞いて驚くんじゃあない！「わくわく温泉大作戦」は、文字通りゲヘナにわくわくする温泉を作るための壮大な計画なのだ！"
83301400200-24 = "………？"
83301400200-25 = "いつものようにゲヘナの郊外で温泉を掘っていると……偶然、ある事実を発見した。"
83301400200-26 = "……いくつもの水脈が、ひとつの点に繋がっているのだと。"
83301400200-27 = "もしかして、その点というのが……"
83301400200-28 = "ああ、その通り！まさに議事堂の駐車場だ！"
83301400200-29 = "あそこに温泉を開発できれば、各地の水脈が繋がって……"
83301400200-30 = "ゲヘナの全生徒が浸かれるくらい超巨大な温泉が！"
83301400200-34 = "そんな夢いっぱいの計画が実現されるところだったというのに……！"
83301400200-35 = "………本当にとんでもない計画ね。"
83301400200-36 = "今回は、一時的に撤退することになってしまったが……"
83301400200-37 = "私たちは絶対に諦めない！仮にこの計画が失敗したとしても……"
83301400200-38 = "次は給食部の地下に流れている水脈を使って、「わくわく温泉卵大作戦」を実行しよう！"
83301400200-39 = "よく分かったから、またしばらく大人しく反省してなさい。"
83301400200-46 = "う゛っ！？"
