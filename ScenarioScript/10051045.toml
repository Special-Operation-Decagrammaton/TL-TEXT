[translation]
10051045-2 = "Droga... que frustrante...!"
10051045-7 = "Conseguimos..."
10051045-8 = "Fufufu... contemplem, todos vocês...!#nAquele que permanece de pé até o fim é... um ninja!!"
10051045-9 = "Bom trabalho! Nin-nin!"
10051045-10 = "[s] \"Vocês não se machucaram?\""
10051045-11 = "Graças ao Sensei, todos nós estamos bem...!"
10051045-12 = "Bem, parece que o pessoal do outro lado não está tão bem assim..."
10051045-13 = "Mas, ainda assim, vir em um grupo tão grande só para roubar trajes... que determinação incrível, não é?"
10051045-14 = "Chefe! Primeiro, vamos recuperar os trajes!"
10051045-15 = "Ah, é verdade! Era por isso que estávamos procurando, afinal."
10051045-17 = "A-as roupas, acho que estão dentro daquela bolsa...#nPorque, até o fim, eles as seguraram com muito cuidado..."
10051045-18 = "Hum... oh! Parece que a bolsa está intacta."
10051045-19 = "Com isso, o objetivo foi concluído—"
10051045-20 = "...Ué?#nEssa pessoa caída no chão... quem é?"
10051045-24 = "..."
10051045-25 = "E-eu não me lembro de ter visto essa pessoa quando a batalha começou...?"
10051045-26 = "Izuna também não faz ideia!"
10051045-27 = "O que será? Será que é um civil que acabou sendo pego no meio da luta?"
10051045-28 = "Por enquanto, vamos prestar os primeiros socorros—"
10051045-33 = "Ei, vocês encontraram a minha obra?"
10051045-34 = "Ah, sim. Nós recuperamos tudo direitinho."
10051045-35 = "Muito bem. Com isso, o caso está encerrado."
10051045-36 = "O conteúdo da bolsa é... hum?#nEspere um pouco... quem é aquela pessoa caída ali..."
10051045-40 = "N-não pode ser...!"
10051045-41 = "Nãããããããoooooo!!!"
