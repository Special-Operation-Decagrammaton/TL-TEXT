[translation]
1301306-1 = "Envolvido por livros"
1301306-2 = "（Convidado por Momiji, fui até a biblioteca de Red Winter）"
1301306-3 = "Interior da biblioteca"
1301306-7 = "Estava te esperando, Sensei!"
1301306-8 = "[s] \"Ué, cadê os outros usuários?\""
1301306-9 = "Ah, sobre isso... hoje é dia de fechamento."
1301306-10 = "O motivo de eu ter chamado o Sensei mesmo sendo dia de fechamento, você pergunta...?"
1301306-11 = "……."
1301306-12 = "De qualquer forma, venha aqui para o fundo!"
1301306-15 = "O que achou? Estava frio lá fora, não estava?"
1301306-16 = "[s1] \"Sim, aqui é quente e aconchegante.\"\n[s2] \"Então, qual o motivo de me chamar em um dia de fechamento...?\""
1301306-19 = "I-Isso é...!"
1301306-20 = "Bem... na verdade, eu decretei um fechamento temporário."
1301306-21 = "I-Isso não respondeu à sua pergunta...? Me desculpe."
1301306-25 = "……Sensei."
1301306-26 = "Que tal... tirarmos uma soneca aqui na biblioteca...?"
1301306-27 = "[s] \"Ué, uma bibliotecária pode dizer uma coisa dessas!?\""
1301306-28 = "P-Por favor, deixe-me explicar!"
1301306-29 = "Às vezes... a Presidente Cherino e outras alunas vêm tirar uma soneca na biblioteca."
1301306-30 = "Sempre que isso acontecia, eu as repreendia ou as expulsava, mas..."
1301306-31 = "……."
1301306-32 = "Fiquei curiosa para saber se a biblioteca era tão confortável assim para dormir, então decidi testar..."
1301306-33 = "[s] \"Então era mais confortável do que você imaginava.\""
1301306-34 = "……Sim."
1301306-35 = "O motivo de eu ter feito questão de fechar a biblioteca...?"
1301306-36 = "I-Isso é...!"
1301306-37 = "[s] \"Como bibliotecária, você costuma ser a pessoa que dá as broncas, né.\""
1301306-38 = "Uuu...!"
1301306-39 = "Você não está errado, mas..."
1301306-40 = "Ainda assim, é estranho, não é...? Não deveria fazer isso."
1301306-41 = "Uma bibliotecária encarregada da gestão da biblioteca decretar um fechamento temporário por motivos pessoais..."
1301306-42 = "B-Bem, pelo menos eu separei o espaço com divisórias, como pode ver."
1301306-43 = "Ouvi dizer que outras escolas possuem salas de descanso nas bibliotecas, então pensei que nós também poderíamos criar uma sala de descanso improvisada fechando a biblioteca...!"
1301306-47 = "……."
1301306-48 = "Me desculpe, Sensei... só estou dando desculpas..."
1301306-49 = "[s3] \"Ah~, passei a noite em claro e estou começando a ficar com sono!\" \n[s4] \"Será que é porque a biblioteca está quentinha? De repente, o sono bateu...\""
1301306-52 = "V-Verdade mesmo!?"
1301306-53 = "……Você não está dizendo isso só para ser gentil comigo, está?"
1301306-57 = "N-Não fique rindo, me responda, Sensei! É constrangedor, sabia...!"
1301306-58 = "……."
1301306-59 = "Ei, Sensei."
1301306-65 = "Então... vamos tirar uma soneca juntos...?"
1301306-66 = "[s] \"Sim, acho que vou cair no sono agora mesmo.\""
1301306-67 = "Ehehe... então, por favor, venha por aqui.#nDescanse bastante."
1301306-72 = "（Como Momiji disse, é muito confortável para dormir...）"
1301306-73 = "（Envolvido pelo aroma suave dos livros, caí lentamente no sono）"
1301306-75 = "O que achou, Sensei?"
1301306-76 = "……Já está respirando fundo... você estava mesmo cansado."
1301306-77 = "……."
1301306-78 = "Ei, Sensei."
1301306-79 = "Obrigada por estar sempre ao meu lado..."
1301306-83 = "……Boa noite."
