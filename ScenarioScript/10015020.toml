[translation]
10015020-1 = "第2話;ミレニアムのハッカー"
10015020-7 = "ヴェリタス・ハッカー休憩室"
10015020-8 = "……コタマ先輩、何か聞こえる？"
10015020-9 = "帯域の周波数をスキャン中……特に変わった現象は確認されてないです。"
10015020-10 = "うーん、おかしいな……ハレ先輩は？#nドローンカメラで何か捉えられた？"
10015020-11 = "うん。こっちの映像も特に変化はない。"
10015020-12 = "どう見ても今……セミナーの執務室には誰もいない。"
10015020-13 = "そんなはずないのに……もう一度プロキシを迂回してみようか……？"
10015020-19 = "……何してるの？"
10015020-20 = "あっ、先輩！ちょうどよかった。#n今、セミナーの閉回路監視カメラをハッキングしてて……"
10015020-21 = "セミナーの執務室を……？#n……どうして？"
10015020-22 = "さっきハレ先輩がエナジードリンクを買いに行ったら、#n[USERNAME]先生がユウカ先輩と一緒に、セミナーの執務室に入るのを見たらしくて。"
10015020-23 = "こんな夜遅くに、生徒と先生がこそこそと密会だなんて……"
10015020-24 = "きっと二人でこっそり面白い事を……#nいえ、怪しい事を企んでいるに違いないです。"
10015020-25 = "真理の守護と知識を探究するヴェリタスの一員として、#n黙って見過ごすわけにはいかないからね。"
10015020-26 = "というわけで、チヒロ先輩もハッキング手伝って！"
10015020-27 = "……はぁ。"
10015020-28 = "この時期にシャーレの先生がセミナーを訪れるとしたら、#n明日の大運動会に関する事じゃないの？"
10015020-29 = "極端な邪推はよくないよ、マキ。"
10015020-30 = "で、でも……。"
10015020-31 = "それとマキ、さっきのハッキングの件なんだけど……#nログを消す時は跡が残らないよう注意しなよ。"
10015020-32 = "サーバーが攻撃されてるって、1時間前からアラームが鳴ってたから。"
10015020-33 = "私だったら、記録を消す前にロジックボムでも仕掛けておく。"
10015020-34 = "あ、そうだ。#nうっかりしてた……。"
10015020-35 = "あれ？#nっていうか、セミナーの監視カメラサーバーも先輩が管理してたの？"
10015020-36 = "あんたたち……私がミレニアム全体のセキュリティアドバイザーも担ってるって忘れたの？"
10015020-40 = "……ところで、大運動会には出ないつもり？"
10015020-42 = "大運動会に？#nなんで私たちが？"
10015020-43 = "盗聴ならともかく、セミナー主管のお祭りに参加する気はありません。"
10015020-44 = "運動は嫌……。"
10015020-46 = "……そうだと思ったけど。"
10015020-47 = "まぁ、生徒会主管の行事に、#n生徒会長と仲が悪い私たちヴェリタスが参加するのは変な事かもしれないけど……"
10015020-48 = "大運動会はセミナー主管の行事でもあるけど、#n学園問わず全てのキヴォトスの生徒が参加する祭典でもあるから。"
10015020-49 = "この時くらい、みんなには所属を忘れてお祭りを楽しんでほしいんだけど……"
10015020-51 = "それは私も同感です。#n[ruby=こうりんたいさい]晄輪大祭[/ruby]は、所属関係なく公平に楽しめることを目的とした、みんなのお祭りですからね。"
10015020-53 = "[USERNAME]先生と、ノア先輩……？#nい、いつの間に！？"
10015020-55 = "こんばんは、皆さん。#nセミナーの書記、[ruby=うしお]生塩[/ruby]ノアです。"
10015020-60 = "[ns] \"やあ、久しぶりだね。\""
10015020-61 = "[USERNAME]先生とノア先輩……かなり妙な組み合わせだね。"
10015020-62 = "こんな夜遅くに、セミナーの役員がヴェリタスの部室に何の用事？"
10015020-63 = "それにシャーレの先生まで……"
10015020-65 = "ふふ、そう警戒しないでください。"
10015020-66 = "ここに来たのは、皆さんにお手伝いをお願いしたいからなんです。"
10015020-67 = "……お手伝い？"
10015020-68 = "既にご存知の通り、#nミレニアムで開催される「晄輪大祭」がもう明日に迫っています。"
10015020-69 = "私たちセミナーは、これを完璧な行事とするために努力をしてきましたが……"
10015020-70 = "不運にも開会を目前に控えた本日、事故が相次いで発生し、#nその事後処理をしていたユウカちゃんも過労がピークを迎え……"
10015020-72 = "まあユウカ先輩、普段から激務だもんね……"
10015020-73 = "ユウカはこの機会に、ちょっと休んだ方がいいと思う。"
10015020-75 = "はい……なので、ユウカちゃんがやっていた#n「晄輪大祭」の電子周りの処理を、他の方にお願いできないかと思い……"
10015020-76 = "このような大型行事の電算処理作業ができるのは、#nヴェリタスの皆さんしか思い当たらず……。"
10015020-79 = "ふふっ、それはそうだね。#nミレニアムで、ヴェリタス以上にコンピューターを使いこなせる部活は存在しないし！"
10015020-80 = "……思ったより簡単なお願いだね。"
10015020-81 = "ミレニアムすべての建物に、RF送信モジュールを設置する必要がなくなりました。"
10015020-82 = "[s] \"君たちは、何しようとしてたの……？\""
10015020-84 = "……この子たちが言った通り、作業を手伝う事自体は難しくないよ。"
10015020-85 = "でも、「セミナーの役員」が「ヴェリタス」に、この手のお願いをしてもいいの？"
10015020-86 = "ミレニアムの威信がかかった「晄輪大祭」の準備を、[ruby=ヴェリタス]うち[/ruby]みたいな非認可の部活に任せた事がリオ会長の耳に入ったら、かなり面倒になると思うけど。"
10015020-87 = "そうかもしれませんね。"
10015020-88 = "リオ会長とヒマリ部長の仲の悪さは、私もよく聞いていますから。"
10015020-89 = "無用な面倒事に巻き込まれるのは、私もごめんです。"
10015020-90 = "……ですが、セミナーの名ではなく、#n私、[ruby=うしお]生塩[/ruby]ノア個人からのお願いなら、いかがでしょう？"
10015020-91 = "セミナーではなく、困っている後輩を助ける程度なら#n大丈夫なのではないでしょうか？"
10015020-96 = "……そう言われたら、仕方ない。"
10015020-97 = "リオ会長の事は知ったことじゃないけど、[ruby=ミレニアム]うち[/ruby]の後輩が困ってるってことなら、まあ手を貸すのもやぶさかじゃないかな。"
10015020-98 = "ふふ、ありがとうございます。"
10015020-99 = "それで、何をすれば良い？"
10015020-100 = "作業リストはユウカちゃんが用意したものがありますので……#nこちらを参照していただければと。"
10015020-105 = "破損していない備品の在庫状況把握と、選手名簿をまとめて関連校に送信……"
10015020-110 = "まあ、これくらいなら難しくないと思う。"
10015020-111 = "備品だけ、現場に行って数量をチェックして……あとはマクロですぐ終わりそうだね。"
10015020-112 = "ふふ、やっぱりヴェリタスにお願いしてよかったです。"
10015020-117 = "あ、そうだ……さっき、気になることがあったんだけど。"
10015020-124 = "私が席を外していた時、ミレニアムのサーバーに悪意のあるタイプの攻撃が仕掛けられてたみたい。"
10015020-126 = "悪意のある……？"
10015020-127 = "うん……まあ、ファイアウォールにすぐ遮られたけど。"
10015020-128 = "……ただ、大運動会に恨みでも持ってるのか、関連の設備と機器だけを集中的に狙って攻撃してたんだよね。"
10015020-129 = "……それは奇遇ですね。"
10015020-130 = "ちょうどエンジニア部の部長も、似たようなお話をされていました。"
10015020-131 = "偶然か故意かは後で明らかになるだろうけど……"
10015020-132 = "確かなのは、運動会を邪魔しているのは部外者ではないって事かな。#nIPを追跡したら、ミレニアム内部から信号がキャッチされたんだ。"
10015020-133 = "あら……。"
10015020-134 = "もしかしたら、今夜はそういった勢力が襲ってくるかもしれないから……#n先生も、気をつけてね。"
10015020-135 = "ふふ、お客様を安全にご案内することも、[ruby=セミナー]生徒会[/ruby]の義務ですから。"
10015020-136 = "ミレニアムにいる間は、私が責任を持って[USERNAME]先生をエスコートします。"
10015020-138 = "……そうだね。まあ、心配はいらないだろうけど。"
10015020-139 = "ふふ、信頼してくださってありがとうございます。"
10015020-140 = "それでは、私たちは他の業務が残っていますので……電算業務はお願いいたしますね。"
10015020-145 = "じゃあ、私たちは頼まれた書類作業を始めようか。"
10015020-146 = "マキ、ここにある選手リストを種目別にまとめてくれる？"
10015020-147 = "あ、選手名簿なら、もう表で整理しておいたよ。"
10015020-148 = "はい、このファイル。"
10015020-149 = "え？さっき渡されたばっかりなのに……いつやったの？"
10015020-150 = "ふっふっふ……こんなこともあろうかと、事前に選手名簿を調べておいたの。"
10015020-152 = "他校の名簿を一気に確保できるチャンスは少ないから……"
10015020-153 = "各学園の生徒たちの個人情報やスリーサイ……パーソナルデータなど……面白いものがたくさん得られました。"
10015020-157 = "……管理者の許可もなく、勝手に個人情報を抜き取って加工したの？"
10015020-158 = "やっぱりあんたたちには、正しいハッカー倫理についてもう一度説明する必要があるね！"
10015020-159 = "で、でも今回は役に立ったでしょ？"
10015020-160 = "今回だけ大目に見てよ、先輩～！"
