[translation]
10015020-1 = "Episódio 2: Os Hackers do Millennium"
10015020-7 = "Sala de Descanso dos Hackers da Veritas"
10015020-8 = "……Kotama-senpai, você está ouvindo alguma coisa?"
10015020-9 = "Escaneando a frequência da banda larga…… Não confirmei nenhum fenômeno incomum até agora."
10015020-10 = "Hmm, que estranho…… E a Hare-senpai?#nConseguiu captar algo com a câmera do drone?"
10015020-11 = "Sim. As imagens daqui também não mostram nada de diferente."
10015020-12 = "Não importa como eu olhe, agora…… não tem ninguém na sala de reuniões do Seminar."
10015020-13 = "Não era para ser assim…… Será que devo tentar contornar o proxy mais uma vez……?"
10015020-19 = "……O que vocês estão fazendo?"
10015020-20 = "Ah, senpai! Que bom que chegou.#nEstamos hackeando o circuito fechado de monitoramento do Seminar agora mesmo……"
10015020-21 = "A sala de reuniões do Seminar……?#n……Por quê?"
10015020-22 = "É que a Hare-senpai foi comprar um energético agora pouco e viu o sensei [USERNAME] entrando na sala de reuniões do Seminar junto com a Yuuka-senpai."
10015020-23 = "Uma aluna e um sensei tendo um encontro secreto a essa hora da noite……"
10015020-24 = "Com certeza os dois estão tramando algo interessante……#nNão, com certeza estão tramando algo suspeito."
10015020-25 = "Como membros da Veritas, que buscam a verdade e o conhecimento, não podemos simplesmente ignorar isso."
10015020-26 = "Por isso, Chihiro-senpai, ajude a gente com o hackeamento!"
10015020-27 = "……Haa."
10015020-28 = "Se o sensei do Schale está visitando o Seminar nesta época, não deve ser por causa do Grande Festival Esportivo de amanhã?"
10015020-29 = "Não é bom tirar conclusões precipitadas, Maki."
10015020-30 = "Ma-mas……"
10015020-31 = "E Maki, sobre esse hackeamento……#nTenha cuidado para não deixar rastros ao apagar os logs."
10015020-32 = "O alarme de que o servidor está sendo atacado está tocando há uma hora."
10015020-33 = "Se fosse eu, teria instalado uma bomba lógica antes de apagar os registros."
10015020-34 = "Ah, é verdade.#nEu esqueci completamente……"
10015020-35 = "Ué?#nEspera, o servidor das câmeras de monitoramento do Seminar também era gerenciado por você, senpai?"
10015020-36 = "Vocês…… esqueceram que eu também sou a consultora de segurança de todo o Millennium?"
10015020-40 = "……Aliás, vocês não pretendem participar do Grande Festival Esportivo?"
10015020-42 = "No Grande Festival Esportivo?#nPor que nós participaríamos?"
10015020-43 = "Deixando de lado a espionagem, não temos intenção de participar de um evento organizado pelo Seminar."
10015020-44 = "Odeio exercícios……"
10015020-46 = "……Imaginei que diriam isso."
10015020-47 = "Bem, pode parecer estranho que nós da Veritas, que não nos damos bem com a presidente do conselho estudantil, participemos de um evento organizado pelo conselho……"
10015020-48 = "Mas o Grande Festival Esportivo, embora organizado pelo Seminar, é um festival onde todos os alunos de Kivotos participam, independentemente da escola."
10015020-49 = "Eu queria que, pelo menos desta vez, todos esquecessem suas afiliações e aproveitassem o festival……"
10015020-51 = "Eu concordo com isso. O Festival Kourin Taisai é um festival para todos, com o objetivo de que todos possam se divertir de forma justa, sem importar a afiliação."
10015020-53 = "Sensei [USERNAME] e Noah-senpai……?#nDe, desde quando vocês estão aí!?"
10015020-55 = "Boa noite, pessoal.#nSou a secretária do Seminar, Ushio Noah."
10015020-60 = "[ns] \"Olá, quanto tempo.\""
10015020-61 = "Sensei [USERNAME] e Noah-senpai…… que combinação inusitada."
10015020-62 = "O que membros do Seminar estão fazendo na sala da Veritas a essa hora da noite?"
10015020-63 = "E ainda por cima com o sensei do Schale……"
10015020-65 = "Fufu, não fiquem tão alertas."
10015020-66 = "Viemos aqui porque queremos pedir a ajuda de vocês."
10015020-67 = "……Ajuda?"
10015020-68 = "Como vocês já sabem, o \"Festival Kourin Taisai\" realizado no Millennium acontece já amanhã."
10015020-69 = "Nós do Seminar temos nos esforçado para tornar este um evento perfeito, mas……"
10015020-70 = "Infelizmente, hoje, pouco antes da abertura, ocorreram vários acidentes, e a Yuuka-chan, que estava cuidando do pós-processamento, chegou ao seu limite de exaustão……"
10015020-72 = "Bem, a Yuuka-senpai sempre tem muito trabalho, né……"
10015020-73 = "Acho que a Yuuka deveria aproveitar essa oportunidade para descansar um pouco."
10015020-75 = "Sim…… por isso, pensei em pedir a outras pessoas para cuidarem do processamento eletrônico do \"Festival Kourin Taisai\" que a Yuuka-chan estava fazendo……"
10015020-76 = "Não consigo pensar em ninguém além de vocês da Veritas para realizar o processamento de dados de um evento tão grande assim..."
10015020-79 = "Hehe, é verdade. Não existe nenhum clube em Millennium que saiba usar computadores melhor que a Veritas!"
10015020-80 = "……É um pedido mais simples do que eu imaginava."
10015020-81 = "Não será mais necessário instalar módulos de transmissão RF em todos os prédios de Millennium."
10015020-82 = "[s] \"O que vocês estavam tentando fazer...?\""
10015020-84 = "……Como elas disseram, ajudar com o trabalho em si não é difícil."
10015020-85 = "Mas, uma \"executiva do Seminar\" pode fazer esse tipo de pedido para a \"Veritas\"?"
10015020-86 = "Se chegar aos ouvidos da presidente Rio que os preparativos do \"Festival Esportivo\", que envolvem o prestígio de Millennium, foram deixados nas mãos de um clube não oficial como o nosso, acho que teremos problemas bem chatos."
10015020-87 = "Talvez seja verdade."
10015020-88 = "Eu também ouvi muito sobre a má relação entre a presidente Rio e a presidente Himari."
10015020-89 = "Eu também não quero me envolver em problemas desnecessários."
10015020-90 = "……Mas, e se não for um pedido em nome do Seminar, e sim um pedido pessoal de mim, Noa Ushio?"
10015020-91 = "Se não for pelo Seminar, mas apenas para ajudar uma colega que está em apuros, não seria aceitável?"
10015020-96 = "……Se você coloca dessa forma, não tenho escolha."
10015020-97 = "Não me importo com a presidente Rio, mas se uma colega nossa está em apuros, acho que não custa nada dar uma mãozinha."
10015020-98 = "Hehe, obrigada."
10015020-99 = "Então, o que devo fazer?"
10015020-100 = "A lista de tarefas foi preparada pela Yuuka... por favor, consulte isto aqui."
10015020-105 = "Verificar o estoque de equipamentos não danificados e compilar a lista de atletas para enviar às escolas relacionadas..."
10015020-110 = "Bem, acho que isso não é difícil."
10015020-111 = "Só preciso ir ao local verificar a quantidade dos equipamentos... o resto deve terminar rápido com uma macro."
10015020-112 = "Hehe, eu sabia que pedir para a Veritas era a escolha certa."
10015020-117 = "Ah, é verdade... eu estava pensando em uma coisa agora pouco."
10015020-124 = "Quando eu estava fora, parece que um ataque malicioso foi feito contra os servidores de Millennium."
10015020-126 = "Malicioso...?"
10015020-127 = "Sim... bem, o firewall bloqueou imediatamente, claro."
10015020-128 = "……Mas, como se tivessem algum rancor do festival, eles atacaram concentradamente apenas os equipamentos e instalações relacionados a ele."
10015020-129 = "……Que coincidência."
10015020-130 = "A presidente do Clube de Engenharia também mencionou algo parecido."
10015020-131 = "Se foi coincidência ou intencional, descobriremos depois, mas..."
10015020-132 = "O que é certo é que quem está atrapalhando o festival não é alguém de fora. Ao rastrear o IP, detectamos um sinal vindo de dentro de Millennium."
10015020-133 = "Ora..."
10015020-134 = "Talvez esse tipo de grupo ataque esta noite, então... Sensei, tome cuidado também."
10015020-135 = "Hehe, guiar nossos convidados com segurança também é um dever do conselho estudantil."
10015020-136 = "Enquanto estiver em Millennium, eu serei responsável por escoltar o Sensei [USERNAME]."
10015020-138 = "……É verdade. Bem, acho que não há com o que se preocupar."
10015020-139 = "Hehe, obrigada pela confiança."
10015020-140 = "Bem, ainda temos outros trabalhos pendentes, então... por favor, cuide do processamento de dados."
10015020-145 = "Então, vamos começar com o trabalho de papelada que nos pediram."
10015020-146 = "Maki, você pode organizar a lista de atletas por modalidade?"
10015020-147 = "Ah, a lista de atletas? Eu já organizei em uma tabela."
10015020-148 = "Aqui, este arquivo."
10015020-149 = "Hã? Mas você acabou de receber isso... quando você fez?"
10015020-150 = "Hehehe... eu já tinha pesquisado a lista de atletas com antecedência, justamente para momentos como este."
10015020-152 = "Não é sempre que temos a chance de conseguir a lista de outras escolas de uma vez só..."
10015020-153 = "Consegui muitas coisas interessantes, como informações pessoais e as medidas... digo, dados pessoais das alunas de cada escola."
10015020-157 = "……Você extraiu e processou informações pessoais sem a permissão dos administradores?"
10015020-158 = "Eu realmente preciso explicar a ética hacker correta para vocês mais uma vez!"
10015020-159 = "M-mas desta vez foi útil, não foi?"
10015020-160 = "Deixa passar só desta vez, senpai~!"
