[translation]
1001602-1 = "O prazo está chegando, Sensei."
1001602-2 = "Millennium, Departamento de Desenvolvimento de Jogos"
1001602-3 = "（Após receber a mensagem de Midori, visitei o Departamento de Desenvolvimento de Jogos）"
1001602-4 = "（No centro da sala, vi Midori concentrada, segurando um caderno de desenho）"
1001602-5 = "（Mas...）"
1001602-6 = "[ns] \"Midori?\""
1001602-8 = "Hmm, não é assim..."
1001602-9 = "[s] \"Com licença...?\""
1001602-11 = "Hmmmm, também não é isso..."
1001602-12 = "[s] \"Midori, você está me ouvindo?\""
1001602-14 = "Hmmmmmm... nada disso está certo..."
1001602-15 = "[s] \"Sem resposta. Parece que ela está em outro mundo.\""
1001602-16 = "Ah! S-Sensei!? Q-quando você chegou!?"
1001602-17 = "[s] \"Cheguei agora pouco. Você disse que queria conversar, o que houve?\""
1001602-18 = "Ah, é verdade. Sim, eu queria pedir um conselho ao Sensei."
1001602-19 = "Queria, pedir..."
1001602-20 = "……Uwaaaaaa!! É isso mesmo, Sensei, é uma emergência!"
1001602-21 = "[s] \"O-o que aconteceu?\""
1001602-22 = "O prazo está em cima e eu não consigo pensar em nada!!!"
1001602-24 = "[ns] \"……Você está bem? Já se acalmou um pouco?\""
1001602-25 = "Sim, sinto muito por ter mostrado esse meu lado, me desculpe..."
1001602-26 = "Estou preocupada com isso há alguns dias..."
1001602-27 = "[s] \"Então, o que você queria me perguntar é...\""
1001602-28 = "Sim... como você sabe, nós somos o Departamento de Desenvolvimento de Jogos."
1001602-29 = "Como não sabemos quando ou como teremos que criar um novo jogo de repente,"
1001602-30 = "costumamos reunir ideias regularmente e discutir sobre elas."
1001602-31 = "O prazo para a próxima reunião de ideias está chegando, e eu queria ter pensado em algo novo até lá, mas..."
1001602-32 = "[s] \"Então, no fim, você não conseguiu pensar em nada...?\""
1001602-33 = "Sim... o prazo está logo ali e eu não tenho nada..."
1001602-34 = "[s] \"E se você pedir para estenderem o prazo?\""
1001602-35 = "Estender... o prazo?"
1001602-37 = "……Um prazo é um tipo de promessa. Se eu pedir para adiar só porque é difícil cumprir, vou acabar criando o hábito de fazer isso sempre."
1001602-38 = "Como ilustradora do Departamento de Desenvolvimento de Jogos e responsável por todo o visual dos nossos jogos, eu não posso fazer isso de jeito nenhum!"
1001602-39 = "[s1] \"M-Midori, você é bem rígida consigo mesma...\"\n[s2] \"Uma Midori com tanto senso de responsabilidade é incrível!\""
1001602-40 = "D-desculpe, acabei falando demais..."
1001602-41 = "D-desculpe, acabei falando demais..."
1001602-42 = "De qualquer forma, é isso. Eu realmente não quero adiar o prazo de jeito nenhum..."
1001602-43 = "Por isso mandei uma mensagem pedindo um conselho ao Sensei."
1001602-44 = "Existe algum método bom?"
1001602-45 = "[s] \"Hmm... Midori, que tipo de jogo você costuma jogar?\""
1001602-46 = "Normalmente... jogos de puzzle ou casuais. Gosto de 'Tetnis' e 'Poyo Poyo'."
1001602-47 = "[s3] \"Então, que tal tentar jogar um gênero que você não costuma jogar,\"\n[s4] \"e esperar que uma ideia surja?\""
1001602-48 = "Entendo, uma mudança de perspectiva... ter contato com algo novo para receber um novo estímulo..."
1001602-49 = "Entendo, uma mudança de perspectiva... ter contato com algo novo para receber um novo estímulo..."
1001602-50 = "Como esperado do Sensei,"
1001602-51 = "é uma ótima ideia!"
1001602-52 = "Ah, bem, nesse caso..."
1001602-53 = "Se não se importar, Sensei, poderia jogar comigo?"
1001602-64 = "（Dito isso, Midori trouxe um jogo competitivo que ela não costuma jogar）"
1001602-66 = "（Naquele momento, eu ainda não sabia...）"
1001602-67 = "(Quem diria que essa escolha levaria àquele desfecho...)"
1001602-70 = "Ahhh! O caminho está bloqueado por bombas, não consigo ir a lugar nenhum!"
1001602-71 = "Ehh...!? D-de novo! Vamos jogar de novo, Sensei!"
1001602-73 = "Hã!? O que foi isso agora!?"
1001602-74 = "A bomba foi eu mesma que instalei, por que eu morri!?"
1001602-75 = "A-ainda não, Sensei! Não podemos terminar ainda!"
1001602-78 = "[ns] \"M-Midori-san, bem, já está quase na hora...\""
1001602-79 = "Do que você está falando? O Sensei só está ganhando!"
1001602-80 = "Não me diga que alguém como o Sensei vai fugir depois de ganhar, né!?"
1001602-81 = "[s] \"Não, bem...\""
1001602-82 = "Ainda não acabou..."
1001602-83 = "Em um jogo, o 'Game Over' só acontece no momento em que você desiste!"
1001602-84 = "Prepare-se, Sensei! Não vou deixar você ir embora até eu ganhar!"
1001602-86 = "(Esquecendo completamente a questão da ideia, passei a noite inteira jogando com a Midori)"
