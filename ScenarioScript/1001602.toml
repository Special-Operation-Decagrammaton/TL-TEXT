[translation]
1001602-1 = "締め切りですよ、先生"
1001602-2 = "ミレニアム・ゲーム開発部"
1001602-3 = "（ミドリの連絡を受けて、ゲーム開発部を訪ねた）"
1001602-4 = "（部室のど真ん中で、ミドリがスケッチブックを持ったまま集中している姿が目に入った）"
1001602-5 = "（けれど……）"
1001602-6 = "[ns] \"ミドリ？\""
1001602-8 = "うーん、こうじゃない……。"
1001602-9 = "[s] \"あのー……？\""
1001602-11 = "うーーーん、これでもない……。"
1001602-12 = "[s] \"ミドリ、聞こえてる？\""
1001602-14 = "うーーーーーーん……あれもこれも全部違う……。"
1001602-15 = "[s] \"反応がない。ただのミドリのようだ。\""
1001602-16 = "うわっ！せ、先生！？い、いつ来たんですか！？"
1001602-17 = "[s] \"ついさっき。相談ごとって言ってたけど、どうしたの？\""
1001602-18 = "あ、そうでした。はい、先生にご相談したいことがありまして。"
1001602-19 = "あり、まして……"
1001602-20 = "……うわあぁぁん！！そうなんです先生、大変なんです！"
1001602-21 = "[s] \"ど、どうしたの？\""
1001602-22 = "締め切りが目の前なのに、何も浮かんでこないんです！！！"
1001602-24 = "[ns] \"……大丈夫？少し落ち着いた？\""
1001602-25 = "はい、お恥ずかしいところをお見せしてしまいました、すみません……。"
1001602-26 = "ここ数日ずっと、このことで悩んでいて……。"
1001602-27 = "[s] \"それじゃあ、ミドリが相談したいことっていうのは……。\""
1001602-28 = "はい……ご存知の通り、私たちはゲーム開発部です。"
1001602-29 = "いつ、どんな形で急に新作を作ることになるか分からないので、"
1001602-30 = "普段から定期的にあれこれアイデアを集めて、それについて話し合ったりしているんです。"
1001602-31 = "ちょうど次のアイデア会議用の締め切り日が近づいてきたので、その時までに新しい何かを思いついておきたかったんですが……。"
1001602-32 = "[s] \"結局何も浮かばなかった……ってこと？\""
1001602-33 = "はい……締め切りはもう目の前なのに、何も……。"
1001602-34 = "[s] \"締め切りを伸ばしてもらう、っていうのは？\""
1001602-35 = "締め切りを、伸ばす……？"
1001602-37 = "……締め切りというのは、一種の約束です。守るのが難しいからといって「だから伸ばして」と言ってしまうと、その後もズルズルと同じことを繰り返してしまいます。"
1001602-38 = "それはゲーム開発部のイラストレーターとして、ゲームビジュアル全般を担当している者として、絶対にできません！"
1001602-39 = "[s1] \"ミ、ミドリは自分に厳しいんだね……。\"\n[s2] \"責任感の強いミドリ、カッコいい！\""
1001602-40 = "す、すみません、何だか思わず語ってしまいました……。"
1001602-41 = "す、すみません、何だか思わず語ってしまいました……。"
1001602-42 = "とにかく、はい、そうなんです。やっぱり、締め切りを伸ばすのは絶対にしたくないですし……。"
1001602-43 = "それで先生にアドバイスをもらいたくて、メッセージを送ったんです。"
1001602-44 = "何か、良い方法はないのでしょうか？"
1001602-45 = "[s] \"うーん……ミドリは、普段どんなゲームをしてるの？\""
1001602-46 = "普段……パズルゲームや、カジュアルゲームでしょうか。『テトニス』や『ポヨポヨ』が好きです。"
1001602-47 = "[s3] \"それなら普段はやらないジャンルのゲームをやってみて、\"\n[s4] \"アイデアが降りてくるのを待ってみるっていうのはどう？\""
1001602-48 = "なるほど、発想の転換ですね……あまり触れないものに触れることで、新たな刺激をもらう……。"
1001602-49 = "なるほど、発想の転換ですね……あまり触れないものに触れることで、新たな刺激をもらう……。"
1001602-50 = "さすが先生です、"
1001602-51 = "良い考えかと！"
1001602-52 = "あっ、えっと、でしたら……。"
1001602-53 = "よろしければ先生も、ゲームに付き合ってくれませんか？"
1001602-64 = "（ということで、ミドリが普段はやらない対戦型のゲームを持ってきた）"
1001602-66 = "（その時は、まだ知らなかった……）"
1001602-67 = "（この選択が、あんな結末を導くことになるなんて）"
1001602-70 = "ああっ！爆弾で道が塞がって、どこにも行けません！"
1001602-71 = "ええっ……！？も、もう一回！もう一回やりましょう先生！"
1001602-73 = "えっ！？何ですか今のは！？"
1001602-74 = "自分で設置した爆弾なのに、どうして私が死ぬんですか！？"
1001602-75 = "まっ、まだです先生！まだ終われません！"
1001602-78 = "[ns] \"み、ミドリさーん、その、そろそろお時間が……。\""
1001602-79 = "何を言ってるんですか、先生が勝ってばっかりじゃないですか！"
1001602-80 = "まさか先生ともあろう方が、勝ち逃げなんてしませんよね！？"
1001602-81 = "[s] \"いや、えっと……。\""
1001602-82 = "まだ終わっていません……。"
1001602-83 = "ゲームというのは、諦めた瞬間がゲームオーバーなんです！"
1001602-84 = "覚悟してください、先生！私が勝つまでは帰らせませんからね！"
1001602-86 = "（アイデアの件はどこかに忘れたまま、一晩中ミドリとゲームを楽しんだ）"
