[translation]
90001300-1 = "Episódio 30; Preparativos para a Partida"
90001300-2 = "O navio de transporte chegará aqui em breve."
90001300-3 = "A investigação das instalações restantes está quase concluída, mas..."
90001300-4 = "Preciso..."
90001300-5 = "Preciso me apressar mais..."
90001300-6 = "Você já está rápida o suficiente, Presidente."
90001300-7 = "Não, desse jeito não chegaremos a tempo."
90001300-8 = "Se fosse possível, eu gostaria de partir agora mesmo."
90001300-9 = "Por favor, acalme-se, Rio. Entendo sua ansiedade, mas ainda nem calculamos a rota, não é?"
90001300-11 = "[ns] \"Por que há tanta necessidade de pressa?\""
90001300-12 = "...Tente se lembrar do motivo pelo qual viemos aqui."
90001300-16 = "O motivo... se não me engano, foi para encontrar a rota de transporte de recursos..."
90001300-17 = "Ah!"
90001300-19 = "Isso mesmo. Apostei na possibilidade de que, por essa rota, poderíamos contornar a barreira multidimensional."
90001300-20 = "Foi durante esse trajeto que encontramos Tiferet."
90001300-21 = "...Posso formular uma hipótese a partir disso."
90001300-22 = "Se Tiferet, que era responsável pelo transporte de recursos, se fundir ao Continente de Aço — a rota preparada para isso não seria fechada?"
90001300-23 = "...Na época de Chokmah, elas disseram que a extração de recursos já havia sido concluída, não foi?"
90001300-25 = "O motivo da pressa da Presidente é..."
90001300-26 = "Sim... mas não acredito que a área da barreira multidimensional possa ser alterada tão facilmente."
90001300-27 = "Aquilo é difícil até de gerar, para começo de conversa. Ainda mais se for para redefinir a área."
90001300-28 = "Teríamos que começar recalculando o sistema de coordenadas homogêneas multidimensionais, incluindo as possibilidades e realizando a transformação de calibre. Além disso..."
90001300-29 = "Transformação de calibre...?"
90001300-30 = "Tipo uma barra de HP?"
90001300-31 = "Não. Transformação de calibre é..."
90001300-33 = "Vamos deixar os assuntos complexos de lado por um momento. A Rio disse que precisa ser imediato."
90001300-34 = "— Ou seja, existe a possibilidade de que a rota seja fechada em breve, não é?"
90001300-35 = "Sim, afinal, não fechamos a porta dos fundos quando terminamos de usá-la?"
90001300-39 = "[ns] \"Quanto tempo falta para calcular a rota...?\""
90001300-40 = "Se for apenas para partir, podemos dar um jeito, mas... você esqueceu de outro problema, não esqueceu?"
90001300-41 = "O que quer dizer com isso...?"
90001300-42 = "Se entrarmos assim, o navio de transporte se tornará parte do Continente de Aço."
90001300-43 = "...E eu também."
90001300-44 = "...!"
90001300-46 = "Descobri algo ao analisar os destroços."
90001300-47 = "Você descobriu o mecanismo pelo qual o Continente de Aço converte matéria, não foi?"
90001300-48 = "Sim. Se aterrissarmos sem um plano, toda a matéria, incluindo o navio de transporte, será absorvida."
90001300-49 = "Ahhh! É impossível! Que jogo injusto!!!"
90001300-50 = "Fufu, não se preocupe. Afinal, vocês têm a mim: a super gênio, garota hacker frágil e bela, analista curiosa e cientista!"
90001300-51 = "E também a Kei."
90001300-53 = "Ah, sim..."
90001300-54 = "Concluindo, podemos contra-atacar se neutralizarmos a onda especial emitida pelo Continente de Aço e pelo Profeta."
90001300-55 = "Eu estava quebrando a cabeça sobre como realizar isso, mas..."
90001300-56 = "Graças à Kei, parece que vai dar certo."
90001300-57 = "Uau, como esperado da Kei! A Alice acreditava em você!"
90001300-58 = "Ah, não... é que, se deixássemos Kivotos assim, a Alice ficaria triste, então..."
90001300-59 = "A Alice sabe! Isso se chama tsundere, não é?"
90001300-60 = "Mas a Alice também sabe que só o atributo tsundere não basta para um personagem! Não se preocupe, Kei! A Alice vai ajudar a encontrar elementos moe também!"
90001300-61 = "Eu já estou bem do jeito que sou!?"
90001300-62 = "...Vamos voltar ao assunto. Descobri que a expansão do Continente de Aço ocorre devido à deformação e acúmulo de informações, além de sua própria expansão independente."
90001300-63 = "O \"dispositivo de interferência de ondas\" para combater a causa, as \"ondas\", já teve seu projeto criado por mim e pela Himari."

90001300-64 = "Se o fabricarmos e equiparmos no navio de transporte, a operação será possível. #nAlém disso, para vocês, os trajes de combate..."
90001300-71 = "……Por que estão me olhando assim? Por que esse sorrisinho?"
90001300-72 = "Fufu, é que..."
90001300-73 = "Alice acha que entende!"
90001300-74 = "Sim, apesar de tudo o que ela diz..."
90001300-75 = "Pois é, pois é!"
90001300-77 = "[ns] \"A Kei-chan é uma garota gentil!\""
90001300-79 = "É pela Alice! É pela Alice! #nNão é por causa de vocês, então não se enganem!"
90001300-81 = "……A Tifa-chan chegará em breve."
90001300-82 = "Pobre Tifa-chan... ela cuidava tanto daquelas sementes..."
90001300-87 = "Espera, o quê!? O quêêêê!?"
90001300-88 = "Ein!?"
90001300-89 = "A Ti-Tifa-chan... não está aqui!!"
90001300-90 = "Não está? Como assim!?"
90001300-91 = "B-bem... o que está carregado no contêiner agora é..."
90001300-92 = "Apenas as sementes da Tifa-chan...!!"
90001300-93 = "!"
90001300-94 = "!!!"
90001300-95 = "Espere. Então, a Tifaret..."
90001300-96 = "Priorizou as sementes em vez de si mesma!?"
90001300-97 = "Por que ela faria isso por sementes que não passam de um amontoado de elementos incertos...!?"
90001300-99 = "Waaaaaah!!!"
90001300-100 = "……."
90001300-101 = "……."
90001300-102 = "Essa também foi uma escolha da Tifaret."
90001300-103 = "……É verdade."
90001300-105 = "Ma-mas...! A Tifa-chan passou por tantas dificuldades até agora... #nE nós não fizemos nada por ela...!"
90001300-106 = "E ainda assim... nós... no fim das contas, acabamos usando a Tifa-chan...? #nWaaaaaah!!!"
90001300-111 = "Não chore, Ein. Já está tudo bem."
90001300-112 = "Não, não está nada bem...!"
90001300-113 = "Sim, você tem razão... me desculpe."
90001300-114 = "Eu deveria ter feito melhor..."
90001300-115 = "Na-na-na-não é isso...! #nSof, Sof...!"
90001300-116 = "Desculpe interromper esse momento emocionante, mas... a Tifaret pode conseguir \"ressuscitar\" no Continente de Aço. #nAquele lugar é propício para isso."

90001300-117 = "Mas não sei se poderemos chamar a Tifaret ressuscitada de \"Tifaret\"..."

90001300-118 = "As memórias do depósito de sementes provavelmente desaparecerão."
90001300-119 = "Para nós, as memórias são a nossa prova de existência..."
90001300-120 = "Uuu... uuu..."
90001300-121 = "Snif..."
90001300-125 = "Já estou bem... Sof. #nObrigada..."
90001300-126 = "Sério mesmo...?"
90001300-127 = "Sim... não podemos ficar assim para sempre... e além disso..."
90001300-128 = "Temos que dar as boas-vindas às sementes que a Tifa-chan protegeu sacrificando a si mesma, não é?"
90001300-129 = "……!"
90001300-131 = "……Foi a Tifaret quem escolheu proteger as sementes."
90001300-132 = "Este é o resultado que a Tifaret escolheu."
90001300-133 = "Faze o que tu queres, há de ser tudo da Lei —"
90001300-134 = "Essa é a nossa \"Lei\"."

90001300-135 = "Temos o dever de respeitar a escolha da Tifaret."
90001300-136 = "E então, teremos que... interceptar os perseguidores indesejados."
90001300-137 = "……Sim."
90001300-138 = "E, então... o que acontecerá com eles...?"
90001300-139 = "Será que teremos que lutar contra a Yesod...?"
90001300-140 = "……Acho que sim."
90001300-141 = "Afinal, ela tem se mantido fora da barreira multidimensional desde o início."
90001300-142 = "E, essa é a vontade da Yesod, afinal..."
90001300-143 = "Literalmente, a guardiã do portão do Continente de Aço. #nA criança que simboliza esse poder."
90001300-144 = "Soph, é uma hipótese, mas..."
90001300-145 = "Eu já sei o que você quer dizer."
90001300-146 = "Não quero mais falar sobre... coisas agourentas por enquanto."
90001300-147 = "……."
90001300-148 = "E-eu... quero ouvir o que a Soph tem a dizer."
90001300-150 = "Hã...?"
90001300-151 = "Ain, você está bem? #nVocê apanhou tanto da Soph que ficou maluca!?"
90001300-152 = "Eu nunca bateria na Ain!"
90001300-153 = "E eu, como é que fico!?"
90001300-154 = "É porque você diz coisas estranhas!"
90001300-155 = "Uuu, não à violência..."
90001300-157 = "A-auuu... d-desculpe! #nA culpa é toda minha, por favor, não briguem!"
90001300-158 = "E-eu também torço para que a Yesod não seja derrotada, mas..."
90001300-159 = "A-ainda assim, eu preciso... ouvir de você."
90001300-160 = "Porque precisamos... considerar o pior cenário."
90001300-161 = "Então, Soph... você poderia nos contar...?"
90001300-165 = "Soph. Eu também peço o mesmo."
90001300-167 = "Até você, irmã mais velha..."
90001300-168 = "Haa... entendi. #nSe a Yesod for derrotada —"
90001300-169 = "Desativarei a barreira multidimensional e redirecionarei toda a energia para os sistemas do Continente de Aço."
90001300-170 = "……É isso que vai acontecer, não é."
90001300-171 = "Manter a barreira multidimensional consome uma quantidade absurda de energia, afinal."
90001300-172 = "……Se a expansão do Continente de Aço e a erosão de Kivotos tivessem ocorrido como planejado, não precisaríamos recorrer a isso."
90001300-173 = "Eles têm grandes chances de chegar ao Continente de Aço, não têm?"
90001300-174 = "E eles já romperam a barreira multidimensional uma vez."
90001300-175 = "E-eu não sei... como eles conseguiram romper..."
90001300-176 = "Mas como já conseguiram uma vez, devemos considerar que podem conseguir de novo."
90001300-177 = "Mas é a primeira vez que eles enfrentam todos os sistemas do Continente de Aço."
90001300-178 = "……Bem, é a primeira vez que nós ativamos todos os sistemas também."
90001300-179 = "De qualquer forma, acho que temos mais chances de vencer liberando as funções do Continente de Aço do que mantendo a barreira multidimensional."
90001300-180 = "Ou seja, no momento em que a Yesod for derrotada —"
90001300-181 = "……Sim."
90001300-183 = "— O Continente de Aço se tornará um campo de batalha."
90001300-187 = "……."
90001300-188 = "Ain, Soph, Owl, que tal sairmos um pouco?"
90001300-189 = "Sair...?"
90001300-190 = "Dizem que, nessas horas, é bom mudar de ares."
90001300-191 = "S-sim... se a irmã mais velha diz."
90001300-194 = "U-uau..."
90001300-195 = "Nós chegamos... até aqui."
90001300-196 = "……Nunca imaginei que veria essa paisagem com esse sentimento."
90001300-197 = "Ehehe. Estão todas aqui. #nA Keter, a Chokmah... e também a Binah."
90001300-198 = "Chesed, Geburah, e Tiphereth também, eventualmente... embora, Geburah realmente goste de gelo, não é?"
90001300-199 = "Netzach é... bem, tudo o que se pode ver é Netzach. #nLá estão Hod e Yesod..."
90001300-200 = "E também, Malkuth."
90001300-201 = "……"
90001300-202 = "A-ah, irmã mais velha..."
90001300-203 = "Por que você está olhando para a paisagem lá fora...?"
90001300-205 = "É para mudar um pouco os ares."
90001300-206 = "Quando estiver em dúvida, às vezes é necessário parar e respirar fundo."
90001300-207 = "Ao retornar aos nossos objetivos, naturalmente passamos a entender o que deve ser feito agora."
90001300-208 = "……！"
90001300-210 = "Ain, Soph, Aur."
90001300-211 = "O tempo que passei com vocês nunca foi em vão."
90001300-212 = "Não, essa não é a forma correta de dizer. Estou muito... grata. #nPor isso—"
90001300-213 = "—Não tenham medo, tenham confiança."
90001300-215 = "Este é o resultado que vocês escolheram e alcançaram."
90001300-216 = "É o lugar que vocês atingiram com suas próprias forças."
90001300-217 = "E também... é o lugar onde, seguindo a vontade d'Ele, todas as promessas serão cumpridas."
90001300-218 = "“Portanto, vigiem, pois vocês não sabem o dia nem a hora.”"
90001300-221 = "Sigam este evangelho, vigiem e aguardem por esse dia."
90001300-222 = "…………"
90001300-223 = "…Irmã mais velha."
90001300-224 = "Não importa o que aconteça..."
90001300-225 = "……"
90001300-226 = "Mesmo que nós cometamos algum erro..."
90001300-227 = "A irmã mais velha continuará ao nosso lado?"
90001300-229 = "Claro que sim."
90001300-230 = "Mesmo que novos céus e terras se abram, e este corpo receba uma nova aliança..."
90001300-231 = "Eu serei, para sempre, uma aliada de Ain, Soph e Aur."
90001300-232 = "Por isso, não quero que tenham medo."
90001300-233 = "Pelo menos neste momento, não acham que deveriam aproveitar um pouco mais?"
90001300-235 = "Produção do dispositivo de interferência de ondas concluída. #nJá foi carregado na nave de transporte."
90001300-236 = "O cálculo da rota também foi finalizado. Podemos partir a qualquer momento."
90001300-238 = "Derrotar o subchefe e ir para o próximo mapa... em um RPG, esse é o momento em que acontece um evento de aumento de poder, né!"
90001300-239 = "Sim! É hora de novos equipamentos e de liberar o limite de nível...!"
90001300-240 = "Bem... sobre o traje de combate que mencionamos antes, podemos criá-lo até mesmo durante o deslocamento..."
90001300-241 = "É um item de defesa exclusivo para o campo! #nAlice está animada!"
90001300-243 = "Traje de combate... entendo, vou começar o design imediatamente."
90001300-244 = "……！"
90001300-245 = "Presidente Rio! Por favor, deixe-me fazer isso...!"
90001300-246 = "Não é sempre que se tem a experiência de projetar um traje de combate real...!"
90001300-247 = "Eh...?"
90001300-248 = "Concordo! #nDesign é a especialidade da Midori, afinal!"
90001300-249 = "É, verdade..."
90001300-251 = "Sim, eu também concordo plenamente."
90001300-252 = "M-mas..."
90001300-254 = "Não precisa se preocupar!"
90001300-255 = "…E-entendido. #nMas, para criar algo racional para a execução da missão—"
90001300-256 = "Acho que não precisa se preocupar com isso, Rio-sama."
90001300-257 = "O design do Abi-Eshuh reflete muito das minhas opiniões, e não houve problemas na execução da missão."
90001300-258 = "Pensando bem, naquela época não tínhamos tempo de sobra. #nMesmo agora, poderíamos redesenhar..."
90001300-259 = "N-não! Eu acho que o design do Abi-Eshuh está perfeito do jeito que está!"
90001300-260 = "……Himari, qual é a sua opinião?"
90001300-262 = "……。"
90001300-263 = "Design é uma área que também depende de bom gosto, afinal……."
90001300-264 = "Nesses casos, não acha que seria mais racional deixar para um especialista?"
90001300-265 = "Está querendo dizer que não pode confiar em mim……?"
90001300-266 = "……。"
90001300-267 = "Hmm……."
90001300-268 = "Acho que é uma questão de colocar a pessoa certa no lugar certo, Presidente."
90001300-269 = "Isso é apenas comparando os dois, claro."
90001300-270 = "Provavelmente, a Midori é a melhor em design entre nós."
90001300-271 = "Então, não acha que seria mais eficiente deixar isso com ela?"
90001300-273 = "……。"
90001300-274 = "Entendo…… muito bem, eu compreendo. #nDe fato, isso é mais racional."
90001300-280 = "Obrigada, Eimi……."
90001300-281 = "Não, não se preocupe com isso."
90001300-282 = "O design da Presidente também me preocupa, afinal……."
90001300-288 = "！？"
90001300-289 = "！？"
90001300-290 = "[ns] \"Ué, esse número é……?\""
90001300-292 = "[ns] \"……Yuuka!?\""
90001300-293 = "Yu-Yuuka!?"
90001300-294 = "!!!"
90001300-296 = "Ehh!? As garras da contadora maligna chegaram até aqui……!?"
90001300-297 = "Não é hora de dizer essas coisas!"
90001300-299 = "O-o que faremos! #nSe a Yuuka vir a Rio-senpai……!"
90001300-300 = "Não só a Presidente Rio, mas todas nós……!"
90001300-306 = "[ns] \"De-de qualquer forma, escondam-se em algum lugar!\""
90001300-309 = "[ns] \"A-alô……?\""
90001300-312 = "Sensei!!!!"
90001300-314 = "Próximo episódio: O caminho que cada uma segue"
