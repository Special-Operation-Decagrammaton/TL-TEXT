[translation]
90001300-1 = "第30話;出発の準備"
90001300-2 = "もうすぐ輸送船がこちらに到着するわ。"
90001300-3 = "残された施設の調査にも目途がつきそうだけれど……。"
90001300-4 = "もっと……。"
90001300-5 = "もっと急がなければ……。"
90001300-6 = "十分早いよ、会長。"
90001300-7 = "いえ、これでは間に合わない。"
90001300-8 = "できることなら、今すぐにでも出発したいのに。"
90001300-9 = "落ち着いてください、リオ。#n焦る気持ちも分かりますが、まだ航路の算出もできていませんよ？"
90001300-11 = "[ns] \"どうしてそこまで急ぐ必要があるの？\""
90001300-12 = "……ここに来た理由を思い出してちょうだい。"
90001300-16 = "理由……たしか、資源の搬入ルートを探しに……。"
90001300-17 = "あっ！"
90001300-19 = "ええ、そのルートなら、多次元バリアを迂回できる可能性に賭けたのよ。"
90001300-20 = "ティファレトと遭遇したのはその途中でした。"
90001300-21 = "……ここから一つ、仮説が立てられるわ。"
90001300-22 = "資源の輸送を担っていたティファレトが鋼鉄大陸と合流してしまえば――#nそのために用意されていたルートは閉ざされてしまうのではないか、と。"
90001300-23 = "……コクマーの時、あの子たちは「資源の採掘は完了した」と話していましたね。"
90001300-25 = "会長が焦ってる理由って――"
90001300-26 = "ええ……でも、多次元バリアの領域は、すぐに変えられるものではないと考えているわ。"
90001300-27 = "あれは、そもそも生成すら難しい。#n領域の再定義ともなれば、なおさら。"
90001300-28 = "多次元の[ruby=どうじざひょうけい]同次座標系[/ruby]を、可能性を含めてゲージ変換し、再演算するところから始めなければならない。それに――"
90001300-29 = "ゲージ変換……？"
90001300-30 = "HPゲージみたいなやつ？"
90001300-31 = "違うわ。ゲージ変換というのは――"
90001300-33 = "難しい話はいったん置いておきましょう。#nリオ様はすぐに、と仰いました。"
90001300-34 = "――つまり、遅からずルートが閉じられてしまう可能性があるのですね。"
90001300-35 = "ええ、勝手口は用が終われば閉めるものでしょう？"
90001300-39 = "[ns] \"航路を算出するまで、あとどれくらい……？\""
90001300-40 = "出発だけなら何とかなりますが……それとは別の問題をお忘れでは？"
90001300-41 = "どういう意味かしら……？"
90001300-42 = "このまま踏み込めば、輸送船は鋼鉄大陸の一部になってしまいます。"
90001300-43 = "……それに、私も。"
90001300-44 = "……っ！"
90001300-46 = "残骸を分析して判明したことがあります。"
90001300-47 = "鋼鉄大陸が物質を変換する仕組みが分かったんだっけ？"
90001300-48 = "ええ。無策で上陸すれば、輸送船を含めすべての物質が取り込まれてしまいます。"
90001300-49 = "うわーん！ムリゲーです！！クソゲーです！！！"
90001300-50 = "ふふっ、ご心配なく。この超天才病弱美少女ハッカーであり、好奇心旺盛な分析家、かつ科学少女の私がいるのですから。"
90001300-51 = "そして、ケイも。"
90001300-53 = "あ、はい……。"
90001300-54 = "結論から言いますと、鋼鉄大陸と預言者が発している特殊な波動を無力化すれば対抗できます。"
90001300-55 = "どのようにそれを実現すればいいのか、頭を悩ませていたのですが……。"
90001300-56 = "ケイのおかげでどうにかなりそうです。"
90001300-57 = "わあ、さすがケイです！#nアリス信じていました！"
90001300-58 = "あ、いえ……その、このままキヴォトスを放っておいたらアリスが悲しむと思い……。"
90001300-59 = "アリス、知ってます！#nこういうのをツンデレと言うんですよね！"
90001300-60 = "でも、ツンデレ属性だけではキャラが弱いことも知っています！#n大丈夫です、ケイ！アリスも一緒に萌え要素を探しますから！"
90001300-61 = "私は今のままで十分ですよ！？"
90001300-62 = "……話を戻しましょう。鋼鉄大陸の拡大は、情報の変形と蓄積、そして独自拡張によるものだと分かりました。"
90001300-63 = "その原因である「波動」に対抗するための「波動干渉装置」は、すでにヒマリと私で設計図を作成してあります。"
90001300-64 = "これを製作して、輸送船に装備させれば活動が可能となります。#nそれと、皆さんには戦闘服を――"
90001300-71 = "……なんです？皆さん、ニヤニヤして。"
90001300-72 = "ふふっ、それはですね……。"
90001300-73 = "アリス、分かる気がします！"
90001300-74 = "はい、なんだかんだ言いつつ……。"
90001300-75 = "うんうん！"
90001300-77 = "[ns] \"ケイちゃんは優しい子なんだなって！\""
90001300-79 = "アリスのため！アリスのためです！#n別に皆さんのためじゃないんですからね！"
90001300-81 = "……もうすぐ、ティファちゃんが到着します。"
90001300-82 = "かわいそうなティファちゃん……あんなに種を大事にしてたのに――"
90001300-87 = "って、えっ！？ええええっ！？"
90001300-88 = "アイン！？"
90001300-89 = "ティ、ティファちゃんが……いません！！"
90001300-90 = "いない？え、どういうこと！？"
90001300-91 = "そ、その……今、コンテナに積まれているのは――"
90001300-92 = "ティファちゃんの種だけです……！！"
90001300-93 = "！"
90001300-94 = "！！！"
90001300-95 = "待って。つまり、ティファレトは――"
90001300-96 = "自分より、種を優先したの！？"
90001300-97 = "不確定要素の塊でしかない種なんかを、どうして……！？"
90001300-99 = "うえぇーん！！！"
90001300-100 = "……。"
90001300-101 = "……。"
90001300-102 = "これも、ティファレトの選択ですか。"
90001300-103 = "……だね。"
90001300-105 = "で、でも……！ティファちゃんは今までずっと苦労してきて……。#n私たちは何もしてあげられてなくて……！"
90001300-106 = "なのに……わ、私たちは……結局、ティファちゃんを利用する形に……？#nうわあぁぁーん！！！"
90001300-111 = "泣かないで、アイン。もう大丈夫だから。"
90001300-112 = "だ、大丈夫、なんかじゃ、ありません……！"
90001300-113 = "うん、そうだね……ごめん。"
90001300-114 = "私が、もっと上手に――"
90001300-115 = "そ、そそそそ、そんなわけありません……！#nソフは、ソフはぁ……！"
90001300-116 = "感動的なシーンに水を差しますが……ティファレトは鋼鉄大陸で「復活」できるかもしれません。#nあそこはそういう場所ですから。"
90001300-117 = "でも復活したティファレトのことを、「ティファレト」と呼んで良いのかは……。"
90001300-118 = "種子貯蔵庫での記憶は消えるだろうね。"
90001300-119 = "私たちにとっては、記憶こそが存在証明なのに……。"
90001300-120 = "うぅ……うぅっ……。"
90001300-121 = "ぐすっ……。"
90001300-125 = "もう、大丈夫です……ソフ。#nありがとう、ございます……。"
90001300-126 = "本当に……？"
90001300-127 = "はい……いつまでも、こうしてはいられませんし……それに……。"
90001300-128 = "ティファちゃんが自分を犠牲にしてまで守った種を、お迎えしてあげないといけないですよね……？"
90001300-129 = "……！"
90001300-131 = "……種を守ろうとしたのはティファレトです。"
90001300-132 = "これは、ティファレトが選んだ結果ですよ。"
90001300-133 = "汝の欲する所を為せ、それが汝の法とならん――"
90001300-134 = "私たちの「掟」だね。"
90001300-135 = "私たちにはティファレトの選択を尊重する義務があります。"
90001300-136 = "そして、無粋な追手を……迎え撃たなくては。"
90001300-137 = "……うん。"
90001300-138 = "で、では……あの人たちは……。"
90001300-139 = "さっそく、イェソドちゃんと戦うことに、なるのでしょうか……？"
90001300-140 = "……そう、だろうね。"
90001300-141 = "あの子は最初から一貫して、多次元バリアの外に陣取っていますからね。"
90001300-142 = "そ、それがイェソドちゃんの、希望ですし……。"
90001300-143 = "文字通り、鋼鉄大陸の門番。#nその力を象徴する子。"
90001300-144 = "ソフ、万が一の話ですが……。"
90001300-145 = "言いたいことは分かってるから。"
90001300-146 = "今はこれ以上……不吉な話はしたくない、かな。"
90001300-147 = "……。"
90001300-148 = "わ、私は……ソフの言葉を聞きたいです。"
90001300-150 = "えっ……？"
90001300-151 = "アイン、大丈夫ですか？#nソフに殴られすぎて、おかしくなりましたか！？"
90001300-152 = "私がアインを殴るわけないじゃん！"
90001300-153 = "私はいいんですか！？"
90001300-154 = "変なこと言うからでしょ！"
90001300-155 = "うぅ、暴力反対……。"
90001300-157 = "あ、あうう……ご、ごめんなさい！#n全部私が悪いので、喧嘩しないでください！"
90001300-158 = "わ、私も、イェソドちゃんが突破されないように、願っていますが……。"
90001300-159 = "そ、それでも、ちゃんと……言葉で聞いておきたいんです……。"
90001300-160 = "最悪の場合を、想定すべき……ですから。"
90001300-161 = "なので、ソフ……お話、してくれませんか……？"
90001300-165 = "ソフ。我からもお願いします。"
90001300-167 = "お姉様まで……。"
90001300-168 = "はあ……分かった。#nもしも、イェソドも突破された場合――"
90001300-169 = "多次元バリアを解除して、その動力を鋼鉄大陸の全システムに振り分けるよ。"
90001300-170 = "……そう、なりますよね。"
90001300-171 = "多次元バリアは維持するだけで、とてつもない動力を消耗するからね。"
90001300-172 = "……鋼鉄大陸の拡張とキヴォトスの侵食が予定通りだったら、この手に頼る必要もなかったけど。"
90001300-173 = "あいつらは、鋼鉄大陸にたどり着く可能性が高いんでしょ？"
90001300-174 = "しかも一度、多次元バリアを突破してる。"
90001300-175 = "ど、どのようにして突破したのかは……わ、分かりませんが……。"
90001300-176 = "一度成功している以上、二度目も想定しておくべきかと。"
90001300-177 = "でも、鋼鉄大陸の全システムと対峙するのは初めてだから。"
90001300-178 = "……まあ、私たちだって全システムを稼働させるのは、初めてだけど。"
90001300-179 = "どっちにしろ、多次元バリアを維持するよりも、鋼鉄大陸の機能を解放して迎え撃ったほうが、勝算はあると思う。"
90001300-180 = "つまり、イェソドが突破された瞬間――"
90001300-181 = "……うん。"
90001300-183 = "――鋼鉄大陸は、戦場と化す。"
90001300-187 = "……。"
90001300-188 = "アイン、ソフ、オウル、少し外に出てみませんか？"
90001300-189 = "外に、ですか……？"
90001300-190 = "こういう時は、気分転換をするものらしいですから。"
90001300-191 = "う、うん……お姉様がそう言うなら。"
90001300-194 = "わ、わぁ……。"
90001300-195 = "ここまで……来たんだね。"
90001300-196 = "……こんな気持ちでこの景色を眺めることになるとは、思いもしませんでした。"
90001300-197 = "えへへ。みんな、ちゃんといますよ。#nケテルちゃんも、コクマーちゃんも……それに、ビナーちゃんも。"
90001300-198 = "ケセドにゲブラ、ティファレトもいずれ……って、ゲブラは本当に氷が好きなんだね。"
90001300-199 = "ネツァクは……まあ、目に見えるすべてがネツァクですから。#nあそこには、ホドとイェソドが……。"
90001300-200 = "それと、[ruby=お姉様]マルクト[/ruby]も。"
90001300-201 = "……。"
90001300-202 = "あ、あの、お姉様……。"
90001300-203 = "どうして、外の景色を……？"
90001300-205 = "気分転換、ですよ。"
90001300-206 = "悩んだ時には、一度立ち止まって深呼吸することも必要です。"
90001300-207 = "自分たちの目的に立ち返ることで、今なにをすべきか自然と分かるようになるものですから。"
90001300-208 = "……！"
90001300-210 = "アイン、ソフ、オウル。"
90001300-211 = "あなた達と過ごしてきた時間は、決して無駄ではありませんでした。"
90001300-212 = "いえ、言い方が違いますね。とても……感謝しています。#nだから――"
90001300-213 = "――怖がらず、自信を持ってください。"
90001300-215 = "これは、あなた達が選び、掴んだ結果。"
90001300-216 = "あなた達の力で到達した場所です。"
90001300-217 = "そして――あの方の意を継ぎ、すべての約束が成就される場所でもあります。"
90001300-218 = "「だから、目を覚ましていなさい。あなた方は、その日、その時を知らないのだから」"
90001300-221 = "この福音に従い、目を覚まし、その日を待つのです。"
90001300-222 = "…………。"
90001300-223 = "……お姉様。"
90001300-224 = "何が起きたとしても……。"
90001300-225 = "……。"
90001300-226 = "私たちが、何かを犯しても……。"
90001300-227 = "お姉様は、私たちのそばにいてくれますか？"
90001300-229 = "もちろんですよ。"
90001300-230 = "新たな天地が開かれ、この身が新しい契約を授かることになったとしても……。"
90001300-231 = "我は、いつまでもアイン、ソフ、オウルの味方です。"
90001300-232 = "ですから、怖がらずにいてほしいのです。"
90001300-233 = "せめてこの瞬間だけは、もっと楽しんでも良いと思いませんか？"
90001300-235 = "波動干渉装置の製作完了。#n輸送船に搭載しました。"
90001300-236 = "航路の計算も終わっています。いつでも出航できますよ。"
90001300-238 = "中ボスを倒して次のマップに行く……RPGだとパワーアップイベントが起きるタイミングだよね！"
90001300-239 = "はい！新しい装備と、レベルキャップ解放の時です……！"
90001300-240 = "まあ……さっき話した戦闘服なら、移動中でも作れますが……。"
90001300-241 = "フィールド専用の防御アイテムですね！#nアリス、楽しみです！"
90001300-243 = "戦闘服……そうね、すぐにデザインを起こすわ。"
90001300-244 = "……！"
90001300-245 = "リオ会長！ぜひ、私にやらせてください……！"
90001300-246 = "実際の戦闘服のデザインなんて、なかなかできない経験、なので……！"
90001300-247 = "えっ……？"
90001300-248 = "賛成！#nデザインはミドリの得意分野だもんね！"
90001300-249 = "た、たしかに……。"
90001300-251 = "はい、私も大賛成です。"
90001300-252 = "で、でも……。"
90001300-254 = "いいですから！"
90001300-255 = "……わ、分かったわ。#nでも、作戦遂行のために合理的なものを作るには――"
90001300-256 = "それは心配ないと思います、リオ様。"
90001300-257 = "アビ・エシュフのデザインには、私の意見が多く反映されていますが、作戦遂行に問題はありませんので。"
90001300-258 = "思い出せば、あの頃は時間に余裕がなかったものね。#n今からでもリデザインを――"
90001300-259 = "い、いえ！アビ・エシュフのデザインはあれで完璧だと思います！"
90001300-260 = "……ヒマリ、貴女の考えは？"
90001300-262 = "……。"
90001300-263 = "デザインはセンスにも依存する分野ですし……。"
90001300-264 = "こういった場合、専門家に任せたほうが合理的だと思いませんか？"
90001300-265 = "私には任せられない、ということかしら……？"
90001300-266 = "……。"
90001300-267 = "うーん……。"
90001300-268 = "適材適所だと思うよ、会長。"
90001300-269 = "あくまで比較した場合の話だけど。"
90001300-270 = "多分、この中で一番デザインが得意なのはミドリだから。"
90001300-271 = "なら、ここは任せたほうが効率的だと思わない？"
90001300-273 = "……。"
90001300-274 = "そうね……ええ、分かったわ。#nたしかに、そのほうがより合理的ね。"
90001300-280 = "ありがとうございます、エイミさん……。"
90001300-281 = "ううん、気にしないで。"
90001300-282 = "会長のデザインは、私も心配だし……。"
90001300-288 = "！？"
90001300-289 = "！？"
90001300-290 = "[ns] \"あれ、この番号は……？\""
90001300-292 = "[ns] \"……ユウカ！？\""
90001300-293 = "ゆ、ユウカ！？"
90001300-294 = "！！！"
90001300-296 = "ええっ！？邪悪な会計の魔の手がこんなところまで……！？"
90001300-297 = "そんなこと言ってる場合じゃないよ！"
90001300-299 = "ど、どうしましょう！#nリオ先輩の姿をユウカが見たら……！"
90001300-300 = "リオ会長だけじゃなくて、わたしたち全員……！"
90001300-306 = "[ns] \"とっ、とにかく、みんなどこかに隠れて！\""
90001300-309 = "[ns] \"も、もしもし……？\""
90001300-312 = "先生っ！！！！"
90001300-314 = "次回;それぞれの進む道"
