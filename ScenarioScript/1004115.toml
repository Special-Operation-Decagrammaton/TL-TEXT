[translation]
1004115-1 = "Memórias gravadas"
1004115-2 = "（Preocupado com a mensagem de agora pouco, saí para procurar a Misaki）"
1004115-7 = "E-eu só esqueci minha carteira de estudante em casa, por isso..."
1004115-8 = "Recebemos reclamações de que há muitas pessoas pernoitando neste parque."
1004115-9 = "Como sua identidade é desconhecida, terei que denunciá-la à Valkyrie."
1004115-10 = "Droga...!"
1004115-11 = "[s] \"Houve algum problema aqui?\""
1004115-15 = "Ah, não é o Sensei do Schale?"
1004115-16 = "Se-Sensei?"
1004115-19 = "……Entendo, você veio buscar esta aluna?"
1004115-20 = "Peço perdão. Eu não sabia que ela era uma aluna sua."
1004115-21 = "[s] \"Então, eu posso levá-la comigo?\""
1004115-22 = "Sim."
1004115-23 = "Obrigado pelo trabalho duro até tarde."
1004115-30 = "……Você me salvou de novo, Sensei."
1004115-31 = "[s1] \"Fico feliz que esteja bem. O que estava fazendo aqui?\"\n[s2] \"Está procurando algo?\""
1004115-34 = "……Eu perdi minha bolsa."
1004115-35 = "Eu dormi por aqui ontem à noite... então, se ela estiver em algum lugar, deve ser por aqui."
1004115-36 = "[s3] \"Entendi, vamos procurar juntos.\"\n[s4] \"Eu costumo passar muito por aqui também.\""
1004115-39 = "Não precisa, a culpa é minha por ter esquecido."
1004115-40 = "Eu consigo procurar sozinha, pode ir embora, Sensei."
1004115-41 = "[s5] \"O guarda pode acabar te abordando de novo, sabe?\"\n[s6] \"Se procurarmos juntos, talvez a gente encontre mais rápido.\""
1004115-44 = "I-isso é verdade, mas..."
1004115-48 = "……Haa, entendi. Vou procurar seguindo o caminho que fiz ontem."
1004115-52 = "Venha comigo."
1004115-60 = "Não parece estar aqui..."
1004115-63 = "Aqui também não..."
1004115-66 = "Aqui também..."
1004115-70 = "Não está..."
1004115-74 = "[ns] \"Espere! Misaki, aquilo ali!\""
1004115-83 = "Estava aqui...!"
1004115-93 = "É verdade. Eu encontrei o guarda aqui e não tive tempo de pegar minhas coisas..."
1004115-94 = "Que bom que não roubaram."
1004115-95 = "……Obrigada. Você me ajudou, Sensei."
1004115-96 = "[s] \"O conteúdo da bolsa está intacto?\""
1004115-100 = "Roupas, carteira, escova de dentes, pasta de dente..."
1004115-104 = "……Ah."
1004115-105 = "[s] \"O que foi? Perdeu alguma coisa?\""
1004115-106 = "……Não, não se preocupe."
1004115-107 = "Eu já imaginava que acabaria perdendo isso uma hora ou outra."
1004115-115 = "Ah. Sensei, o que você está segurando na mão..."
1004115-116 = "[s7] \"Por acaso, não era isso que você estava procurando?\"\n[s8] \"O objeto esquecido era isso, não era?\""
1004115-123 = "S-sim. Me devolve."
1004115-128 = "[ns] \"Sabe, isso foi um pouco inesperado.\""
1004115-132 = "……Haa."
1004115-137 = "Isso é uma boneca que a Saori fez para mim há muito tempo. #nCom um pedaço de madeira que estava jogado por aí e uma faca."
1004115-138 = "Todo mundo tem pelo menos um brinquedo pelo qual tem apego, não é?"
1004115-139 = "Eu brincava com ela quando era pequena, mas agora não sinto nada por ela."
1004115-140 = "Ela só ficou esquecida dentro da bolsa esse tempo todo."
1004115-141 = "……Não fique aí parado, me devolva logo."
1004115-142 = "[s] \"É algo importante para a Misaki, né.\""
1004115-143 = "……Ei. Você estava ouvindo?"
1004115-144 = "Bem, eu não nego que foi algo importante."
1004115-148 = "De qualquer forma, obrigado por hoje."
1004115-152 = "Entrarei em contato novamente."
