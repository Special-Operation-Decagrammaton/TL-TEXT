[translation]
1004115-1 = "刻まれた思い出"
1004115-2 = "（さっきのメッセージが気になって、ミサキを探しに出た）"
1004115-7 = "だ、だから、学生証は家に忘れただけで……"
1004115-8 = "この公園で野宿す[ruby=やから]る輩が[/ruby]多くて困っていると、苦情が入っているんだ。"
1004115-9 = "身元が不明な以上、ヴァルキューレに通報させてもらう。"
1004115-10 = "くっ……！"
1004115-11 = "[s] \"何か問題でもありましたか？\""
1004115-15 = "あっ、シャーレの先生じゃありませんか。"
1004115-16 = "せ、先生？"
1004115-19 = "……なるほど、こちらの生徒さんを迎えに来たのですか？"
1004115-20 = "これは失礼しました。まさか先生の生徒さんだとは知らず。"
1004115-21 = "[s] \"じゃあ、この子は私が送ってもいいかな？\""
1004115-22 = "ええ。"
1004115-23 = "遅くまでお疲れ様です。"
1004115-30 = "……また先生に助けられたね。"
1004115-31 = "[s1] \"無事で良かった。ここで何してたの？\"\n[s2] \"何か探しもの？\""
1004115-34 = "……カバンを失くして。"
1004115-35 = "昨日、この近くで野宿をしてたから……たぶん、あるとしたらここだと思うんだけど。"
1004115-36 = "[s3] \"分かった、一緒に探そう。\"\n[s4] \"ここ周辺は、私もよく通るから。\""
1004115-39 = "いい、忘れた私が悪いし。"
1004115-40 = "一人で探せるから、先生は帰って。"
1004115-41 = "[s5] \"警備員さんに、また声をかけられるかもしれないよ。\"\n[s6] \"一緒に探せば、早く見つけられるかもしれないよ。\""
1004115-44 = "た、たしかにそうだけど……"
1004115-48 = "……はぁ、分かった。昨日、通った道を順番に探すから。"
1004115-52 = "付いてきて。"
1004115-60 = "ここには……無いみたい。"
1004115-63 = "ここにも、無い……"
1004115-66 = "ここも……"
1004115-70 = "無い……"
1004115-74 = "[ns] \"待って！ミサキ、あれ！\""
1004115-83 = "あった……！"
1004115-93 = "そうだった。ここで警備員と鉢合わせて、荷物をまとめる時間が無かったんだ……"
1004115-94 = "盗まれてなくて良かった。"
1004115-95 = "……ありがとう。助かったよ、先生。"
1004115-96 = "[s] \"カバンの中身、無事だった？\""
1004115-100 = "服に財布、歯ブラシ、歯磨き粉……"
1004115-104 = "……あ。"
1004115-105 = "[s] \"どうしたの？何か失くなってた？\""
1004115-106 = "……いや、気にしないで。"
1004115-107 = "そのうち失くすんだろうなとは思ってたから。"
1004115-115 = "えっ。先生、その手に持ってるのって……"
1004115-116 = "[s7] \"もしかして、これを探してたんじゃない？\"\n[s8] \"忘れ物って、これだよね？\""
1004115-123 = "う、うん。貸して。"
1004115-128 = "[ns] \"ちょっと、意外だったかも。\""
1004115-132 = "……はぁ。"
1004115-137 = "これは昔、サオリが作ってくれた人形。#nその辺に転がっていた木とナイフで。"
1004115-138 = "子どもはみんな、愛着のあるオモチャをひとつくらい持ってるものなんでしょ。"
1004115-139 = "小さい頃は遊んでたけど、今はもうなんとも思ってないから。"
1004115-140 = "ずっとカバンに入れっぱなしになってただけ。"
1004115-141 = "……黙ってないで、早く返して。"
1004115-142 = "[s] \"ミサキの大切な物なんだね。\""
1004115-143 = "……ちょっと。話、聞いてた？"
1004115-144 = "まあ、大切な物[ruby=・   ・   ・]だった[/ruby]のは否定しない。"
1004115-148 = "とにかく、今日はありがとう。"
1004115-152 = "また連絡する。"
