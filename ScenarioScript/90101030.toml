[translation]#[Texto revisado.] Em aguardo de revisão de formatação de texto. - Filipe 13/06.
90101030-1 = "Episódio 3: O Caranguejo e o Tambor de Aço"
90101030-2 = "Escritório da Presidente do Conselho Estudantil Geral"
90101030-4 = "……Caranguejos, é?"
90101030-9 = "Isso mesmo, caranguejos."
90101030-10 = "Você já viu um caranguejo vivo alguma vez?"
90101030-11 = "Já vi, sim."
90101030-12 = "No treinamento de verão, eu via um monte deles perto do mangue."
90101030-13 = "No mangue, né? Que legal."
90101030-14 = "Quando foi a última vez que eu fui pra praia no verão...? Já nem consigo mais lembrar."
90101030-15 = "Você deve ser bem ocupada."
90101030-16 = "Mas e aí... o que esses desaparecimentos têm a ver com caranguejos?"
90101030-20 = "Dizem as más línguas que os culpados são... caranguejos. É o que tá rolando por aí."
90101030-21 = "……Como é que é?"
90101030-23 = "Ultimamente, tá rolando uma onda de desaparecimentos de civis perto do Porto Kanezaki."
90101030-24 = "Não sabemos se fugiram por conta própria, se foi acidente, ou se... De qualquer forma, a gente ainda não conseguiu bater o martelo na causa."
90101030-25 = "Porém, tem um relato circulando solto nas redes sociais. De gente que viu os \"Caranguejos do Barril\" perto de onde a galera sumiu."
90101030-27 = "Yukino."
90101030-28 = "Posso contar com você pra investigar esses \"Caranguejos do Barril\"?"
90101030-30 = "[ns] \"……Caranguejos do barril?\""
90101030-31 = "Isso. Dizem que são barris gigantescos entupidos de caranguejos."
90101030-32 = "E os caranguejos lá dentro são super agressivos e tão sempre morrendo de fome... Se você jogar um peixe lá, eles devoram tudo num piscar de olhos."
90101030-33 = "……E tem mais fofoca pesada atrelada a isso."
90101030-34 = "Lá no Porto Kanezaki, se alguém tem treta com você, eles preparam os \"Caranguejos do Barril\"."
90101030-35 = "Chamam o alvo pra um lugar deserto e deixam eles darem um sumiço na pessoa dentro do barril"
90101030-36 = "Desse jeito, resolvem o B.O sem sujar as mãos e ainda passa por desaparecimento."
90101030-37 = "[s1] \"……Que parada bizarra.\"\n[s2] \"Será que existe caranguejo brabo assim mesmo?\""
90101030-40 = "Ah, qual é, isso aí é história pra boi dormir."
90101030-41 = "É só caranguejo, poxa. Duvido muito que consigam machucar alguém de verdade."
90101030-42 = "Até porque, caranguejo é bicho carniceiro. Eles comem peixe morto e algas marinhas."
90101030-43 = "E as cascas deles são fininhas e quebram fácil……"
90101030-44 = "Como eles trocam de casca direto, a espessura tem limite, sabe?"
90101030-45 = "Se rolasse um bafafá dentro de um barril, eles iam ser os primeiros a virar patê."
90101030-46 = "As garras até que dão pro gasto, mas com aquele tamanico todo, falta força."
90101030-47 = "Pra uma garra conseguir estraçalhar ossos"
90101030-48 = "O bicho ia ter que ter pelo menos uns 5 metros de tamanho."
90101030-49 = "……Pensando bem, acho que até mais. No mínimo uns 20 metros."
90101030-50 = "[s] \"Fico um pouco mais aliviado, mas……\""
90101030-54 = "[ns] \"Como vocês sabem tanto de caranguejo?\""
90101030-55 = "Eu ouvi de um calouro meu que trampava em resgate marítimo."
90101030-56 = "É que de vez em quando eu cozinho uns……"
90101030-57 = "Aprendi quando me infiltrei num restaurante de sushi por causa de uma missão."
90101030-58 = "Mesmo sendo só boato, com certeza tem alguém se aproveitando disso."
90101030-59 = "Até porque, na prática, a galera do Porto Kanezaki tá sumindo e o povo tá morrendo de medo."
90101030-60 = "Mas tipo, é só dar uma pesquisada básica pra ver que é caô, né? Quem sai ganhando espalhando essa lorota?"
90101030-61 = "Como disfarce pra crime, é uma volta muito doida……"
90101030-62 = "Mas fala aí, a ideia de um \"caranguejo monstrão que devora tudo\" dá um frio na espinha, né. Se alguém for tirar proveito disso"
90101030-66 = "Será que não querem queimar o filme dos caranguejos pra derrubar o preço de mercado?"
90101030-67 = "Se a gente der uma geral em quem compraria barato na baixa"
90101030-70 = "……Por enquanto, parece que não rolou nenhuma treta com os preços ou com a quantidade de caranguejos no mercado."
90101030-71 = "Vai ver o boato ainda não espalhou direito."
90101030-72 = "Hum…… tá osso de entender."
90101030-73 = "[s] \"……Ainda falta informação.\""
90101030-74 = "Pois é. Ficar só deduzindo no papel não vai levar a gente muito longe."
90101030-75 = "Nessas horas, em vez de ficar no achismo"
90101030-76 = "O negócio é bater perna lá no local e correr atrás da informação, né?"
90101030-80 = "……Exatamente."
90101030-81 = "Nosso destino é o Porto Kanezaki, que fica lá na Rua 4 do Distrito Shiratori no [ruby=Distrito de Utnapishtim]D.U..[/ruby]"
90101030-82 = "Nosso alvo é qualquer um envolvido com pesca de caranguejo."
90101030-83 = "Depois da rodovia, agora bora fazer hora no porto"
90101030-84 = "Como lá tem bastante sombra, pelo menos não precisa esquentar a cabeça com insolação."
90101030-90 = "Esquadrão FOX. A partir de agora, vamos iniciar a investigação."
90101030-92 = "Próximo Episódio: O Pessoal do Porto (1)"