[translation]#[Texto Final. - Filipe 05/07.]
90101030-1 = "Episódio 3: O Caranguejo e o Tambor"
90101030-2 = "Gabinete da Presidente do Conselho Estudantil Geral"
90101030-4 = "……Caranguejo, disse?"
90101030-9 = "Sim, caranguejo."
90101030-10 = "Você já viu um caranguejo vivo?"
90101030-11 = "Já."
90101030-12 = "No treinamento de verão, era comum ver\nalguns perto da planície de maré."
90101030-13 = "Planície de maré. Que bom."
90101030-14 = "Quando foi a última vez que fui ao mar\nno verão……? Já nem me lembro."
90101030-15 = "A senhora vive ocupada, não é?"
90101030-16 = "E…… qual é a relação entre os\ndesaparecimentos e caranguejos?"
90101030-20 = "O culpado dos casos seria um caranguejo.#nExiste um boato assim."
90101030-21 = "……Como é?"
90101030-23 = "Ultimamente, os desaparecimentos de\ncidadãos se acumulam na região\ndo porto de Kanezaki."
90101030-24 = "Fugas voluntárias? Acidentes? Ou……#nSeja como for, a causa ainda\nnão foi identificada."
90101030-25 = "Mas há um certo relato circulando nas\nredes sociais.#nDe que viram o \"Caranguejo do Tambor\"\nperto dos locais dos desaparecimentos."
90101030-27 = "Yukino."
90101030-28 = "Posso lhe pedir que investigue\no \"Caranguejo do Tambor\"?"
90101030-30 = "[ns] \"……Caranguejo do Tambor?\""
90101030-31 = "Sim. Dizem que, dentro de um tambor enorme,\nhá uma montanha de caranguejos\nespremidos."
90101030-32 = "Os caranguejos de dentro seriam ferozes e\neternamente famintos……#nJogue um peixe lá dentro e ele é devorado\nem segundos."
90101030-33 = "……Os boatos derivados acompanham\na mesma linha."
90101030-34 = "No porto de Kanezaki, quem guarda rancor de\nalguém prepara um \"Caranguejo do Tambor\"."
90101030-35 = "Chame o desafeto para um lugar sem\ntestemunhas e deixe que o RESOLVAM\ndentro do tambor――"
90101030-36 = "e pronto: sem sujar as mãos, a pessoa\nvira só mais um desaparecido."
90101030-37 = "[s1] \"……Que história arrepiante.\"\n[s2] \"Será que um caranguejo tão feroz existe mesmo?\""
90101030-40 = "Isso não é história pra levar a sério, gente."
90101030-41 = "É um caranguejo, oras. Duvido até\nque consiga machucar alguém."
90101030-42 = "Caranguejo, pra começar, é necrófago.#nUm bicho que come peixe morto e alga."
90101030-43 = "Além disso, a casca do caranguejo\né fina e frágil……"
90101030-44 = "Como fazem a muda regularmente,\na espessura da casca tem limite."
90101030-45 = "Se se debater dentro de um tambor, quem\nse esmaga primeiro é o caranguejo."
90101030-46 = "A pinça até que é dura, mas naquele\ntamanho falta força."
90101030-47 = "Pra uma pinça quebrar ossos――"
90101030-48 = "precisaria de, no mínimo, uns 5 metros\nde comprimento, né~"
90101030-49 = "……Não, mais. Pelo menos uns 20 metros."
90101030-50 = "[s] \"Até me tranquiliza, mas……\""
90101030-54 = "[ns] \"Por que vocês entendem tanto de caranguejo?\""
90101030-55 = "Eu ouvi de uma caloura que participou\nde um resgate marítimo."
90101030-56 = "Eu às vezes cozinhava uns……"
90101030-57 = "Eu aprendi numa missão, infiltrada\nnum restaurante de sushi."
90101030-58 = "Mesmo que seja só um boato, é certo que\nalguém está se aproveitando dele."
90101030-59 = "Afinal, há desaparecidos de verdade perto\ndo porto, e os cidadãos vivem com medo."
90101030-60 = "Mas basta pesquisar um pouco pra ver que é\nmentira, né?#nQue vantagem tem espalhar um boato desses?"
90101030-61 = "Pra camuflagem de crime,\né enrolado demais……"
90101030-62 = "Mas \"caranguejo monstruoso que come\nqualquer coisa\" soa assustador, né.#nSe alguém usasse isso――"
90101030-66 = "Não seria pra sujar a imagem do caranguejo\ne derrubar o preço de mercado?"
90101030-67 = "Se investigarmos os comerciantes que\ncomprariam barato na baixa――"
90101030-70 = "……Por enquanto, o preço e o volume de\ncaranguejo não tiveram grandes variações."
90101030-71 = "Vai ver o boato ainda não se\nespalhou de vez."
90101030-72 = "Hmm…… não sei, não."
90101030-73 = "[s] \"……Ainda falta informação.\""
90101030-74 = "Sim. Dedução de gabinete tem limites."
90101030-75 = "Em horas assim, mais que empilhar\nsuposições――"
90101030-76 = "é juntar informação no local,\ncom paciência. Né?"
90101030-80 = "……Exatamente."
90101030-81 = "O destino é o porto de Kanezaki, na rua 4\ndo distrito de Shiratori, D.U."
90101030-82 = "Os alvos: todos os envolvidos\nna pesca de caranguejo."
90101030-83 = "Depois da rodovia, agora o porto, é~"
90101030-84 = "Com bastante sombra, pelo menos insolação\nnão vai ser problema~"
90101030-90 = "Esquadrão FOX. Iniciando a coleta de\ninformações neste momento."
90101030-92 = "Próximo Episódio: O Povo do Porto (1)"
