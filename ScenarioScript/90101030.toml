[translation]
90101030-1 = "Episode 3: Crabs and Oil Drums"
90101030-2 = "General Student Council President's Office"
90101030-4 = "……Crabs, you say?"
90101030-9 = "Yes, crabs."
90101030-10 = "Have you ever seen a live crab?"
90101030-11 = "I have."
90101030-12 = "I saw them often near the tidal flats during summer training."
90101030-13 = "Tidal flats, I see. That sounds nice."
90101030-14 = "I can't even remember the last time I went to the summer beach……"
90101030-15 = "You must be very busy."
90101030-16 = "So…… what is the connection between the disappearance cases and crabs?"
90101030-20 = "There is a rumor that the culprit behind these incidents is a crab. #nThat is the rumor going around."
90101030-21 = "……Excuse me?"
90101030-23 = "Recently, there has been a string of citizen disappearances around Kanezaki Port."
90101030-24 = "Whether they are voluntary, accidental, or otherwise…… #nIn any case, we have been unable to identify the cause at this time."
90101030-25 = "However, a certain testimony has been circulating on social media. #nThat someone saw an 'Oil Drum Crab' near the scene of a disappearance."
90101030-27 = "Yukino."
90101030-28 = "Could you investigate the 'Oil Drum Crab'?"
90101030-30 = "[ns] \"……An Oil Drum Crab?\""
90101030-31 = "Yes. It is said that a massive number of crabs are packed inside a very large oil drum."
90101030-32 = "The crabs inside are supposedly extremely ferocious and constantly starving…… #nThey say if you throw a fish in, it is devoured in an instant."
90101030-33 = "……The derivative rumors are just as unsettling."
90101030-34 = "If someone at Kanezaki Port holds a grudge against another, they prepare an 'Oil Drum Crab'."
90101030-35 = "They lure their target to a secluded spot and have them disposed of inside the oil drum—"
90101030-36 = "That way, they can make it look like a disappearance without getting their own hands dirty."
90101030-37 = "[s1] \"……That’s a chilling story.\"\n[s2] \"Do such ferocious crabs actually exist?\""
90101030-40 = "We shouldn't be taking this seriously."
90101030-41 = "I mean, it's a crab, right? I doubt it could even cause an injury."
90101030-42 = "Besides, crabs are scavengers. #nThey're creatures that eat dead fish and seaweed."
90101030-43 = "Also, crab shells are thin and brittle……"
90101030-44 = "They molt periodically, so there's a limit to how thick their shells can get."
90101030-45 = "If they thrashed around inside an oil drum, the crabs would be crushed first."
90101030-46 = "Their claws are somewhat hard, but they don't have the power at that size."
90101030-47 = "To have claws capable of crushing bone—"
90101030-48 = "You'd need them to be at least five meters long, right?"
90101030-49 = "……No, even bigger. At least twenty meters."
90101030-50 = "[s] \"I'm a little relieved, but……\""
90101030-54 = "[ns] \"Why do you know so much about crabs?\""
90101030-55 = "I heard it from a junior who went on a maritime rescue mission."
90101030-56 = "I used to cook them occasionally……"
90101030-57 = "I learned it when I infiltrated a sushi restaurant for a mission."
90101030-58 = "Even if it is just a rumor, it is certain that someone is taking advantage of it."
90101030-59 = "After all, people are actually going missing around Kanezaki Port, and the citizens are living in fear."
90101030-60 = "But you could tell it's a lie with a little research, right? #nWhat's the point of spreading a rumor like this?"
90101030-61 = "It's too convoluted to be a cover-up for a crime……"
90101030-62 = "But the phrase 'monster crab that eats everything' sounds scary. #nIf someone were to exploit that—"
90101030-66 = "Maybe they want to ruin the image of crabs to drive down market prices?"
90101030-67 = "If we investigate the dealers who could buy them up cheap—"
90101030-70 = "……So far, there don't seem to be any major fluctuations in crab prices or distribution."
90101030-71 = "Maybe the rumor hasn't spread far enough yet."
90101030-72 = "Hmm…… I don't know."
90101030-73 = "[s] \"……We still don't have enough information.\""
90101030-74 = "Yes. There is a limit to armchair reasoning."
90101030-75 = "In times like these, rather than piling up speculation—"
90101030-76 = "We should gather information on the ground, right?"
90101030-80 = "……That is correct."
90101030-81 = "Our destination is Kanezaki Port, located in the 4th Avenue of D.U. Shiratori District."
90101030-82 = "The targets are everyone involved in the crab fishing industry."
90101030-83 = "First the highway, now investigating the port~"
90101030-84 = "At least there's plenty of shade, so we don't have to worry about heatstroke."
90101030-90 = "FOX Platoon. Starting interviews from this moment."
90101030-92 = "Next Episode: People of the Port (1)"