[translation]
1010303-1 = "os encantos de uma mulher excepcionalmente bela (lit.: (tão bela que) a Lua fica envergonhada e as flores murcham)"
1010303-2 = "Doutor, o senhor está aqui."
1010303-3 = "[\"Desculpe, eu o fiz esperar. \""
1010303-4 = "Não é nada disso."
1010303-5 = "Tenho um sensei para me mostrar o local."
1010303-7 = "Veja, ela é ...... tão bonita."
1010303-8 = "É verdade. ...... Houve alguma vez uma pessoa tão bonita no Sutra de Shanhai?"
1010303-10 = "Mm. ......."
1010303-11 = "[s]\"......, onde você pode sentir os olhos em você mais do que o normal. \""
1010303-12 = "Eu sabia que estava errado."
1010303-13 = "Eles estavam apenas esperando, mas sentiram que estavam sendo muito olhados."
1010303-15 = "Você nunca viu esses alunos antes, viu?"
1010303-16 = "Sim, eu também nunca vi isso. #nO equilíbrio entre membros esguios e cabelo curto é legal. ......"
1010303-17 = "Dizem também que cabelos longos, brilhantes e escuros são essenciais para a beleza. ......"
1010303-18 = "Ela não é a própria definição de beleza?"
1010303-20 = "E posso estar errado, mas sinto que estou recebendo ainda mais olhares desde a chegada do sensei ......#n."
1010303-21 = "O senhor tem alguma ideia, doutor?"
1010303-22 = "[s]\"Eu sei, eu não sei. ....... \""
1010303-23 = "Certo. ......."
1010303-25 = "As roupas deixam você ainda mais estiloso."
1010303-26 = "Você está usando-o perfeitamente. ......#n Observando-o de perto, acho que você ainda não está acostumado a usá-lo."
1010303-28 = "Pelo contrário, é melhor."
1010303-29 = "Eu também acho."
1010303-31 = "...... Sensei."
1010303-32 = "Enquanto isso, por que não saímos daqui?"
1010303-33 = "Vou ficar muito envergonhado e fora de controle se não fizer algo a respeito."
1010303-34 = "Desculpe-me! Aqueles dois ali poderiam esperar um momento?"
1010303-35 = "[s]\"Uh, ...... quem é você? \""
1010303-39 = "Sou fotógrafo e tenho uma solicitação para um aluno de lá!"
1010303-40 = "Uau, você quer que eu acesse ......?"
1010303-41 = "Sim!"
1010303-42 = "Viajo pela região de Kivotos, fotografando belas pessoas e paisagens."
1010303-43 = "Posso saber seu nome primeiro?"
1010303-44 = "Ikekura Marina."
1010303-45 = "Você é a Marina, muito obrigado! #Gostaria de tirar uma foto sua imediatamente. ......"
1010303-47 = "Mas que diabos?"
1010303-48 = "Estou observando você há muito tempo. #nA lânguida Marina, esperando por alguém!"
1010303-49 = "Foi como se eu tivesse me lembrado de uma história sobre uma bela mulher do Sankai Sutra!"
1010303-50 = "Qual é a história por trás disso?"
1010303-51 = "O Shan Hai Jing contém a frase \"Shameful Flower Closing Moon\" (Lua de fechamento de flores vergonhosas)."

1010303-52 = "A lua, envergonhada pela beleza de uma certa mulher, esconde-se atrás de uma nuvem, descrita como uma \"lua fechada\"."

1010303-53 = "Depois disso, visitei o jardim de flores dessa vez. ......"
1010303-54 = "As flores murcharam rapidamente."
1010303-55 = "...... Não tenho ideia do que está acontecendo."
1010303-56 = "Resumindo, eu gostaria de dizer que a figura de Marina é muito bonita!"
1010303-57 = "Desculpe, posso dizer não? ......"
1010303-58 = "Agora, se você nos ajudar a tirar fotos, nós lhe daremos um álbum de fotos desse panda!"
1010303-59 = "Pa, um álbum de fotos de pandas!"
1010303-61 = "O que você acha?"
1010303-62 = "O que o senhor quer que eu faça, doutor!"
1010303-63 = "[s1] \"Não quero forçá-lo a fazer isso, mas ....... \"\n[s2] \"As fotos da Marina, eu gostaria de vê-las. \""
1010303-66 = "Não, não, do que está falando, doutor?"
1010303-67 = "Não, se o sensei quiser ver. ......"
1010303-68 = "Além disso, uma coleção de fotos de pandas. ...... pandas, pandas?"
1010303-69 = "Uuuu...... ok, vamos lá!"
1010303-70 = "Se você se assusta com a extensão de uma fotografia, não vai ficar bem como chefe do comitê de segurança do #nRedWinter!"
1010303-71 = "Obrigado! Em #n, acesse aqui: ......!"
