1010303-106 = "Obrigado por seu trabalho árduo!"
1010303-107 = "...... Nunca nos esqueceremos dessa."
1010303-108 = "Marina, em que você estava pensando quando estava tirando as fotos? #nCom as fotos, eu estava pensando em adicionar um comentário."
1010303-109 = "...... Se você estiver se perguntando sobre sua própria beleza?"
1010303-110 = "Eu estava pensando no que comer no almoço de hoje. ......"
1010303-114 = "...... Não inclua este comentário."
