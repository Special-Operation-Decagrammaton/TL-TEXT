[translation]
1010303-1 = "羞花閉月"
1010303-2 = "先生、来てくれたか。"
1010303-3 = "[s] \"ごめん、待たせちゃって。\""
1010303-4 = "これくらい何でもない。"
1010303-5 = "先生には、色々と案内してもらっているからな。"
1010303-7 = "見て、あの人……すごくきれい。"
1010303-8 = "本当だ……あんなきれいな人、山海経にいたかな？"
1010303-10 = "うむ……。"
1010303-11 = "[s] \"いつもより視線を感じるような……。\""
1010303-12 = "やはり、私の勘違いではなかったか。"
1010303-13 = "ただ待っているだけなのに、やたらと視線を集めているような気がしていたのだ。"
1010303-15 = "初めて見る生徒だよね？"
1010303-16 = "うん、私も見たことない。#nスラッとした手足に、短い髪のバランスがカッコいい……。"
1010303-17 = "艶のある長くて黒い髪が美人には不可欠とも言うけど……。"
1010303-18 = "あの人こそ、まさに美人って言葉がピッタリじゃない？"
1010303-20 = "それと、これは勘違いかもしれないが……#n先生が来てから、さらに視線を集めているような気がする。"
1010303-21 = "先生、心当たりはあるか？"
1010303-22 = "[s] \"分かるような、分からないような……。\""
1010303-23 = "そうか……。"
1010303-25 = "服のおかげで、さらにスタイルの良さが際立ってるね。"
1010303-26 = "完璧に着こなしてる……#nよく見てると、まだ着慣れてない気もするけど。"
1010303-28 = "むしろ、それが良いというか。"
1010303-29 = "ね、私もそう思う。"
1010303-31 = "……先生。"
1010303-32 = "とりあえず、ここを離れないか？"
1010303-33 = "このままでは、恥ずかしくてどうにかなってしまいそうだ。"
1010303-34 = "あの、すみません！#nそちらのお二人さん、少しお待ちいただけますか？"
1010303-35 = "[s] \"えっと……どちら様でしょう？\""
1010303-39 = "カメラマンをやっておりまして、そちらの生徒さんにお願いが！"
1010303-40 = "わ、私に……？"
1010303-41 = "ええ！"
1010303-42 = "私はキヴォトスの各地を回りながら、#n美しい人や風景を写真に残しているのです。"
1010303-43 = "あ、先にお名前を伺ってもよろしいですか？"
1010303-44 = "[ruby=いけくら]池倉[/ruby]マリナだ。"
1010303-45 = "マリナさんですね、ありがとうございます！#nでは、さっそくお写真を撮りたいのですが……。"
1010303-47 = "な、何だとおおお！？"
1010303-48 = "ずっと見ていたのです。#n誰かを待ち続ける、物憂げなマリナさんの姿を！"
1010303-49 = "まるで山海経に伝わる美人のお話を思い出してしまいました！"
1010303-50 = "それはどんな話なんだ？"
1010303-51 = "山海経には、「羞花閉月」という言葉があります。"
1010303-52 = "ある女性の美しさに恥じらった月が、#n雲の後ろに隠れる様を「閉月」と表しました。"
1010303-53 = "その後、今度は花園に足を運んだところ……。"
1010303-54 = "花は、たちまち萎んでしまいました。"
1010303-55 = "……何が何だか、さっぱりだ。"
1010303-56 = "要するに、マリナさんのお姿が、それだけ美人だと言いたいのです！"
1010303-57 = "悪いが、断っても良いだろうか……？"
1010303-58 = "では、写真撮影に協力していただけたら、#nこちらのパンダの写真集を差し上げましょう！"
1010303-59 = "ぱ、パンダの写真集だと！？"
1010303-61 = "いかがですか？"
1010303-62 = "ど、どうしたら良いんだ、先生！？"
1010303-63 = "[s1] \"無理にとは言わないけど……。\"\n[s2] \"マリナの写真、私は見てみたいな。\""
1010303-66 = "な、ななな、何を言ってるんだ、先生！"
1010303-67 = "いや、先生が見たいと言うのなら……。"
1010303-68 = "それに、パンダの写真集……パンダ、パンダか。"
1010303-69 = "ううう……よし、やってみせよう！"
1010303-70 = "写真程度にビビっていては、#nレッドウィンターの保安委員長としての面目が立たないからな！"
1010303-71 = "ありがとうございます！#nでは、こちらへ……！"
1010303-74 = "[wa:400]― [log=마리나 치파오]こ、[wa:950]こうか？[/log]"
1010303-76 = "― [log=마리나 치파오]え？[wa:1100]足をもう少し開いて……[wa:2350]腕も……？[/log]"
1010303-79 = "― [log=마리나 치파오]う、[wa:1000]うぅ……[wa:1500]やはりこういうのは[wa:1100]慣れない……[/log]"
1010303-82 = "[wa:1300]― [log=마리나 치파오]あの……[wa:1250]先生……[/log]"
1010303-84 = "― [log=마리나 치파오]今の私は、[wa:1500]どう映ってるんだ……？[/log]"
1010303-87 = "[wa:200]― [log=마리나 치파오]えっ……！？[/log]"
1010303-89 = "― [log=마리나 치파오]いつもと違う魅力が、[wa:1850]ある……？[/log]"
1010303-92 = "[wa:450]― [log=마리나 치파오]バ、[wa:600]バカ！[wa:800]心にもないことを……！[/log]"
1010303-95 = "[wa:520]― [log=마리나 치파오]……ほ、[wa:950]本心、[wa:850]だと……？[/log]"
1010303-98 = "[wa:40]― [log=마리나 치파오]写真が[wa:750]楽しみ……？[/log]"
1010303-101 = "[wa:400]― [log=마리나 치파오]うっ……！[/log]"
1010303-103 = "― [log=마리나 치파오]今日の[wa:350]先生は……[wa:2000]意地が[wa:550]悪いな……。[/log]"
1010303-106 = "お疲れ様でした！"
1010303-107 = "……この件は、絶対に忘れないぞ。"
1010303-108 = "マリナさん、撮影の時どんなことを考えていましたか？#n写真と一緒に、コメントを入れようと思っていまして。"
1010303-109 = "……もしや、ご自分の美しさに頭を悩ましていたとか？"
1010303-110 = "今日の昼は、何を食べようか考えていただけだが……。"
1010303-114 = "……このコメントを入れるのは、やめておきましょう。"
1010303-116 = "（こうして、マリナの撮影は無事に終了した）"
1010303-117 = "（写真集は外部から人気を集め、完売したらしい……）"
