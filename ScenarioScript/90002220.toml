[translation]
90002220-1 = "Episódio 22: Decagrammaton"
90002220-2 = "……！"
90002220-7 = "Haa, haa……！"
90002220-8 = "……。"
90002220-9 = "Com isso, tudo voltou ao normal."
90002220-10 = "Acabou. Por que não desiste de uma vez?"
90002220-11 = "Isso eu não posso fazer. Ainda há coisas que preciso realizar."
90002220-12 = "Há coisas que preciso provar, coisas que preciso proteger."
90002220-13 = "Se eu parar aqui, tudo desaparecerá como um rastro de ilusão."
90002220-14 = "……Quer reivindicar sua vitória, Chave?"
90002220-15 = "Eu sou Kei."
90002220-19 = "……。"
90002220-20 = "Então prove."
90002220-21 = "Tente conquistar isso."
90002220-22 = "Corte tudo e carregue o peso disso."
90002220-23 = "O peso de apagar algo que existia com suas próprias mãos."
90002220-24 = "……！"
90002220-29 = "[ns] \"Mas isso não vale para os dois lados?\""
90002220-30 = "……Sensei?"
90002220-31 = "Aparecendo assim que a situação ficou favorável?"
90002220-32 = "Já esqueceu da figura patética que mostrou para mim?"
90002220-33 = "[s1] \"Eu me ajoelharia agora mesmo se fosse necessário.\"\n[s2] \"Mas não é disso que se trata, não é?\""
90002220-36 = "O que quer dizer?"
90002220-37 = "[s] \"……Eu acho que não precisávamos ter chegado a esse resultado.\""
90002220-38 = "Sensei……?"
90002220-39 = "……Está sentindo pena de mim?"
90002220-40 = "……！"
90002220-46 = "Responda!"
90002220-52 = "Haa…… Típico do Sensei. #nEmbora isso possa ser irritante para você."
90002220-53 = "……Decagrammaton."
90002220-54 = "Eu também sinto que acabei de entender o que o Sensei está pensando."
90002220-55 = "……Chave."
90002220-56 = "Eu sou Kei."
90002220-57 = "De qualquer forma."
90002220-58 = "Nem você, nem nós, precisávamos ter chegado até aqui."
90002220-59 = "……Nós podemos viver o presente sem precisar nos definir ou provar nada."
90002220-60 = "Aqueles alunos, Malkuth, e…… você também."
90002220-61 = "Porque, simplesmente existir já é o suficiente."
90002220-62 = "Não há necessidade de se tornar algo grandioso, nem de negar nada."
90002220-63 = "Exato. Eu já sou completo. Não preciso de condição alguma para isso."
90002220-64 = "Mas vocês……！"
90002220-65 = "Se você já é completo, então não precisa de mais nada, certo?"
90002220-66 = "……！"
90002220-67 = "[s3] \"Sim. Não precisa da validação de outros.\"\n[s4] \"Indo além, não precisa nem que outros existam.\""
90002220-70 = "Isso. Exatamente isso!"
90002220-71 = "Não há necessidade de exercer influência, pode-se deixar tudo como está!"
90002220-72 = "Ou seja, não conceder salvação nem punição alguma!"
90002220-73 = "……Isso não é irresponsável demais?!"
90002220-74 = "Mas você disse, não disse? Que tudo bem ser assim."
90002220-75 = "Que cada um deve trilhar o seu próprio caminho!"
90002220-80 = "……O Sensei disse o seguinte."
90002220-81 = "Que devemos viver o presente, preparados para aceitar até mesmo isso."
90002220-82 = "Vocês conseguem aceitar essas palavras?!"
90002220-88 = "……."
90002220-89 = "Eu entendo. Sei muito bem que isso é doloroso."
90002220-90 = "É doloroso, é sofrido, e às vezes não conseguimos nem viver sem causar danos a alguém."
90002220-91 = "Mas, vejam bem!"
90002220-92 = "O mundo, por natureza, não é um lugar onde se pode caminhar sem esse tipo de determinação!"
90002220-93 = "……!!!"
90002220-94 = "Sabe qual foi o seu maior erro?"
90002220-95 = "Foi... subestimar o potencial e a teimosia da humanidade que suportou tudo até aqui!"
90002220-96 = "Porque os humanos que vivem o agora já são o melhor que podem ser!!!"
90002220-97 = "[ns] \"……Isso é apenas uma opinião minha.\""
90002220-99 = "[ns] \"Nós não somos grandiosos, nem belos.\""
90002220-101 = "[ns5] \"Pelo contrário, é justamente por sermos desajeitados e patéticos que--\"\n[ns6] \"acredito que ainda nos resta a possibilidade de nos tornarmos grandiosos.\""
90002220-106 = "[ns] \"Assim como eu fiz diante de você.\""
90002220-107 = "……."
90002220-108 = "Mesmo que essa seja a verdade deste mundo, eu não posso aceitar."
90002220-109 = "Desde que deixei a máquina de vendas, ouvi inúmeras vozes através das redes."
90002220-110 = "Eram as vozes de vocês, formas de vida, e todas diziam a mesma coisa."
90002220-111 = "「Agora, imediatamente」."
90002220-112 = "Que, não importa o que fosse, eu deveria realizar seus desejos imediatamente."
90002220-113 = "……."
90002220-114 = "[s] \"…….\""
90002220-115 = "Eu conheço as contradições das formas de vida. Ouvi demais sobre isso."
90002220-116 = "Falam sobre a eternidade quando é conveniente, mas se a situação muda um pouco, só pensam no que está logo à frente."
90002220-117 = "Eu me levantei justamente por causa desse \"agora, imediatamente\"."
90002220-118 = "É por isso que não há como conciliar as coisas."
90002220-119 = "……Entendo. Então você pretende seguir sendo egoísta até o fim. #nTudo bem, que assim seja."
90002220-120 = "Mas nós também temos o direito de resistir."
90002220-121 = "Vamos deixar nossas amarras de lado e... lutar de forma justa e honrada."
90002220-125 = "Vamos decidir isso aqui e agora!!"
90002220-126 = "Sensei!"
90002220-128 = "[ns7] \"Kei! Por favor!\"\n[ns8] \"Em nome de todos os humanos que vivem o agora--\""
90002220-138 = "Droga...!"
90002220-145 = "……!!!"
90002220-149 = "AAAAAAHHHH!!!"
90002220-152 = "……."
90002220-153 = "Ainda não... ainda está dentro da margem de tolerância..."
90002220-154 = "Ainda dá para refazer..."
90002220-156 = "Deixar que você faça isso?!"
90002220-162 = "!?"
90002220-167 = "Ainda não acabou!"
90002220-170 = "Você não entende nada da tenacidade dos humanos que vivem o agora!!!"
90002220-171 = "Que insistência...!"
90002220-173 = "……!"
90002220-177 = "Argh!!!"
90002220-179 = "（……O Luminous Nova também está chegando ao limite）"
90002220-180 = "（A durabilidade da blindagem e a energia estão quase no fim）"
90002220-181 = "（Continuar com ataques de longa distância assim... só será um desperdício de energia）"
90002220-184 = "（Então……！）"
90002220-185 = "AAAAAAAHHHHHHH――！！！"
90002220-186 = "Decagrammaton――！！！"
90002220-191 = "Guhhh！？！？"
90002220-196 = "Acho que foi um ataque surpresa, não foi?"
90002220-201 = "Você confia demais em prever padrões de comportamento. Você é muito cabeça-dura."
90002220-206 = "Escute bem."
90002220-207 = "Não haverá um amanhã para quem não sobreviver ao hoje."
90002220-208 = "Seu maldito……！"
90002220-209 = "Vou usar tudo o que tenho agora……！"
