[translation]
1601002-1 = "O hobby secreto da Meister"
1601002-2 = "Mercado de Tecidos do Distrito Externo de Shiba"
1601002-4 = "（Encontrei a Hibiki por acaso no mercado perto do Schale）"
1601002-8 = "……Ah, Sensei."
1601002-9 = "Não esperava encontrar você em um lugar tão vazio em pleno feriado."
1601002-10 = "Veio comprar que tipo de tecido?"
1601002-11 = "……As cortinas do escritório do Schale estão desgastadas, então pensei em trocá-las."
1601002-12 = "……Entendi. Não existem muitas lojas com tecidos grandes para cortinas perto de D.U."
1601002-13 = "Se precisar de uma função de camuflagem, eu conheço uma loja de artesanato que recomendo……"
1601002-14 = "[s] \"Tecido comum serve.\" "
1601002-16 = "[ns] \"O que a Hibiki veio comprar?\""
1601002-17 = "……Eu?"
1601002-18 = "Vim ver tecidos porque pretendo fazer uma roupa nova."
1601002-19 = "Posso encontrar informações sobre cores e materiais na internet, mas……"
1601002-20 = "Para algo que toca a pele, a textura é muito importante."
1601002-21 = "[s1] \"A Meister também faz as próprias roupas?\"\n[s2] \"Incrível, Hibiki.\""
1601002-24 = "Não é para o dia a dia……"
1601002-25 = "O que estou fazendo é uma fantasia de cosplay."
1601002-26 = "[s] Cosplay……?"
1601002-27 = "Sim. Sensei, você gosta de cosplay?"
1601002-28 = "[s3] \"Entendo bastante de cosplay!\"\n[s4] \"Não entendo muito bem……\""
1601002-29 = "……Que bom. Isso me poupa o trabalho de explicar."
1601002-30 = "Cosplay é quando você usa a mesma roupa de um personagem e tenta agir como ele."
1601002-31 = "Como são roupas usadas por personagens de animes, mangás…… ou jogos. #nComo muitos designs não existem para venda, os usuários acabam fazendo por conta própria."
1601002-32 = "No começo, eu só queria colocar roupas nos manequins de caminhada e fazia isso enquanto assistia a vídeos de referência, mas……"
1601002-33 = "Depois de tentar várias vezes, acabei me viciando."
1601002-34 = "[s] \"Você gosta de fazer roupas?\""
1601002-35 = "……Hmm, sendo precisa, acho que o que eu gosto é de me tornar outra pessoa."
1601002-36 = "Cosplay não é só vestir a roupa; você precisa pensar em como aquele personagem se moveria na vida real."
1601002-37 = "Na vida cotidiana, não temos muitas oportunidades de pensar e atuar sob a perspectiva de um personagem, né?"
1601002-38 = "Mas o cosplay envolve considerar várias possibilidades e repetir experimentos, o que acaba sendo parecido com o meu trabalho como engenheira."
1601002-39 = "Além disso…… também posso experimentar um pouco de profissões pelas quais tenho interesse……"
1601002-40 = "[s5] \"Como na época do Grande Festival Esportivo?\"\n[s6] \"……Era líder de torcida, né?\""
1601002-45 = "……Sensei, não tire sarro de mim."
1601002-46 = "Naquela época, eu não tinha tempo, então só não consegui entrar no personagem de líder de torcida."
1601002-47 = "E aquela roupa foi uma das primeiras que fiz quando comecei no cosplay…… #nFico um pouco envergonhada de mostrar para alguém……"
1601002-48 = "Da próxima vez que eu fizer cosplay de líder de torcida, acho que conseguirei fazer melhor."
1601002-49 = "[s7] \"Isso significa que……\"\n[s8] \"Você planeja usar a roupa de líder de torcida de novo?\""
1601002-50 = "Não é que eu tenha um plano concreto, mas……"
1601002-51 = "Não é que eu tenha um plano concreto, mas……"
1601002-52 = "Se houver alguém precisando de apoio…… talvez eu use de novo, não acha?"
1601002-53 = "Para o cosplay, o importante não é só a roupa, mas também a situação em que você consegue se tornar o personagem."
1601002-54 = "[s] \"Entendo…… Que tipo de roupa você vai fazer hoje?\""
1601002-55 = "……Boa pergunta, Sensei."
1601002-56 = "Hoje pretendo fazer a roupa da heroína de um anime popular chamado \"Fábrica de Munições em Outro Mundo\"."
1601002-64 = "Como essa personagem trabalhava como cientista no mundo moderno, o diferencial dela é usar um jaleco de experimentos mesmo nesse outro mundo de fantasia medieval."
1601002-65 = "Parece que não existem fibras químicas nesse outro mundo, então não deve ter tecidos de mistura de poliéster."
1601002-66 = "Se for uma fibra feita com a tecnologia da era medieval, é bem provável que seja um tecido de linho feito de linho puro……"
1601002-67 = "Os tecidos que vendem aqui parecem ter uma textura um pouco mais áspera do que a ilustração da arte principal."
1601002-68 = "……O que você acha, Sensei? Que tipo de material chegaria mais perto da atmosfera dessa personagem?"
1601002-72 = "[ns] \"Que tal escolher uma cor que seja mais ou menos parecida...?\""
1601002-73 = "Não pode, Sensei. Pensar no contexto da história também é um elemento importante para aumentar o realismo do cosplay."
1601002-74 = "Além disso, como uma meister do Millennium, é impossível eu aceitar qualquer compromisso."
1601002-75 = "[s] \"Isso é bem a sua cara, Hibiki.\""
1601002-76 = "Hmm... parece que tem uma loja especializada em fibras naturais ali."
1601002-77 = "Tem muitos tecidos com cores que parecem ter um alto índice de bloqueio de luz, então acho que seriam perfeitos para cortinas também."
1601002-81 = "……Então, vamos juntos."
1601002-83 = "（Depois disso, passei um tempo agradável escolhendo tecidos com a Hibiki）"
