[translation]
1001902-1 = "Assunto confidencial"
1001902-2 = "Trinity - Área urbana"
1001902-3 = "（Ao chegar nas coordenadas, descobri que era a área comercial da Academia Trinity）"
1001902-4 = "……."
1001902-5 = "Você veio, Sensei."
1001902-6 = "……O que é essa cara? Está surpreso por nos encontrarmos em um lugar tão movimentado?"
1001902-7 = "Esperava um lugar secreto? Sinto muito, mas não existem lugares secretos dentro da Academia Trinity."
1001902-8 = "É melhor assumir que há escutas, perseguições e vigilância em todo lugar, a qualquer hora. Isso aqui é um covil de cobras."
1001902-9 = "[s1] \"Covil de cobras...?\"\n[s2] \"Que jeito de falar...\""
1001902-10 = "É você que é ingênuo, Sensei."
1001902-11 = "É você que é ingênuo, Sensei."
1001902-12 = "Por isso, lugares amplos, cheios de gente e onde podemos nos misturar à multidão são, na verdade, mais seguros."
1001902-13 = "A melhor forma de esconder uma árvore é na floresta, entende?"
1001902-14 = "Olhe. Na verdade, ninguém está olhando para nós, não é?"
1001902-16 = "Ah, aquela aluna transferida fofa!"
1001902-17 = "Ela está com um adulto...! Quem será aquela pessoa?"
1001902-18 = "Será que é aquele famoso...?"
1001902-19 = "……."
1001902-20 = "……."
1001902-21 = "[s3] \"Azusa, você é fofa e chama atenção...\"\n[s4] \"Será que a culpa é minha...?\""
1001902-22 = "Droga, eu deveria ter buscado uma forma melhor de me misturar à multidão..."
1001902-23 = "Droga, eu deveria ter buscado uma forma melhor de me misturar à multidão..."
1001902-24 = "Mas não, nem eu nem o Sensei estamos usando roupas chamativas...!"
1001902-25 = "……Por que as pessoas desta academia são tão curiosas sobre os outros!?"
1001902-26 = "[s] \"Não adianta me perguntar...\""
1001902-27 = "P-por enquanto, venha por aqui!"
1001902-29 = "……Por aqui deve estar tudo bem."
1001902-30 = "Sniper, escutas, perseguição... o risco é bem menor aqui."
1001902-31 = "Ufa... ah, mas não baixe a guarda, Sensei. Se você se distrair, logo..."
1001902-32 = "[s] \"Ah! Tem alguém de traje camuflado ali!\""
1001902-37 = "（Click!）"
1001902-39 = "（Ratatatatatatatá!!）"
1001902-44 = "……."
1001902-45 = "[s] \"…….\""
1001902-46 = "……Sim."
1001902-47 = "Provavelmente foi só o vento balançando os galhos. Fique tranquilo, Sensei."
1001902-48 = "[s] \"Desculpe, foi só uma brincadeira.\""
1001902-49 = "……."
1001902-51 = "……Bem, eu entendi o que você quis dizer."
1001902-52 = "Não precisa ficar tenso ao extremo, é isso que você quer dizer, certo?"
1001902-53 = "Mas não faça mais brincadeiras assim. Se algo der errado, o Sensei pode acabar se machucando."
1001902-54 = "[s] \"Desculpe...\""
1001902-55 = "……Eu não confio em quase nada ao meu redor."
1001902-56 = "Além disso, um lugar novo, pessoas novas, uma vida nova... tudo isso somado, é impossível não ficar tensa."
1001902-57 = "Na verdade, para mim, as alunas daqui são relaxadas demais."
1001902-58 = "Só temos uma vida, então por que tanta calma? Mesmo sendo o território delas, não estão sendo descuidadas demais? Honestamente, é o que eu sinto."
1001902-59 = "Mas, com certeza, a estranha aqui sou eu... eu sei disso."
1001902-60 = "Por isso, quero que o Sensei me ajude um pouco."
1001902-61 = "Foi por isso que te chamei hoje..."
1001902-62 = "[s] \"Claro, com prazer. No que posso ajudar?\""
1001902-63 = "Primeiro de tudo..."
1001902-64 = "Quero me acostumar com esta região."
1001902-65 = "Como acabei de chegar aqui, ainda não conheço muito bem as coisas comuns desta escola..."
1001902-66 = "[s5] \"Algo como um guia turístico de Trinity seria bom?\"\n[s6] \"Nesse caso, as outras alunas seriam mais...\""
1001902-67 = "Ah, as outras alunas não servem! O que eu preciso agora é do ponto de vista de alguém de fora que \"não está acostumado\"."
1001902-68 = "Ah, as outras alunas não servem! O que eu preciso agora é do ponto de vista de alguém de fora que \"não está acostumado\"."
1001902-69 = "As outras alunas já estão acostumadas demais com este lugar. Existem coisas que não podem ser vistas sob essa perspectiva."
1001902-70 = "O hábito cria pontos cegos. Se ignorarmos esses pontos cegos..."
1001902-71 = "Eles podem ser explorados por alguém de fora, causando um colapso repentino. É um padrão comum que leva à ruína."
1001902-72 = "Além disso, se for o Sensei..."
1001902-73 = "[s7] \"...Certo, então eu aceito com prazer.\"\n[s8] \"Vamos começar o passeio amanhã?\""
1001902-74 = "...Isso ajuda muito."
1001902-75 = "...Isso ajuda muito."
1001902-76 = "Então, entrarei em contato em breve."
1001902-77 = "Ah, e a partir de agora, nosso codinome durante as comunicações será \"Pinguim\"."
1001902-78 = "O Sensei será o \"Pato\"."
1001902-79 = "[s] \"Pinguim...? Pato...?\""
1001902-80 = "Não há um motivo especial. Na verdade, codinomes não devem ter motivos óbvios, isso não é bom para um codinome!"
1001902-81 = "...Então,"
1001902-83 = "Até mais."
