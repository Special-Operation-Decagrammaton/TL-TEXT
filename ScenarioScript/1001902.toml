[translation]
1001902-1 = "秘匿事項"
1001902-2 = "トリニティ・市街地"
1001902-3 = "（座標の場所に行ってみたら、そこはトリニティ総合学園の繁華街だった）"
1001902-4 = "……。"
1001902-5 = "来たか、先生。"
1001902-6 = "……何、その顔は？こんなに人混みのあるところで会うなんて……とか、そういう意味？"
1001902-7 = "秘密の場所でも期待してた？残念だけど、そもそもトリニティ総合学園の敷地内に秘密の場所なんて無い。"
1001902-8 = "いつどこでも盗聴、尾行、監視がついてると思ってた方が良い。ここは魔窟だ。"
1001902-9 = "[s1] \"魔窟って……。\"\n[s2] \"すごい言われようだね……。\""
1001902-10 = "先生が世間知らずなだけ。"
1001902-11 = "先生が世間知らずなだけ。"
1001902-12 = "だから逆に、こうやって広くて人も多くて、人ごみに紛れられるような場所の方がかえって安全。"
1001902-13 = "木を隠すなら森の中、そういうこと。"
1001902-14 = "見て。実際、誰も私たちのことを見てないでしょう？"
1001902-16 = "あっ、例の可愛い転校生ちゃん！"
1001902-17 = "大人と一緒ですね……！あの人、どなたでしょうか？"
1001902-18 = "もしかして、あの噂の……？"
1001902-19 = "……。"
1001902-20 = "……っ。"
1001902-21 = "[s3] \"アズサ、可愛くて目立つもんね……。\"\n[s4] \"私のせいかな……。\""
1001902-22 = "くっ、もう少し人ごみに溶け込める方法を模索するべきだったか……。"
1001902-23 = "くっ、もう少し人ごみに溶け込める方法を模索するべきだったか……。"
1001902-24 = "いやでも、私も先生も別に目立つ格好してないのに……！"
1001902-25 = "……この学園は、どうしてこんな他人に興味津々なんだ！？"
1001902-26 = "[s] \"私に言われても……。\""
1001902-27 = "とっ、とりあえず、こっち！"
1001902-29 = "……この辺なら大丈夫なはず。"
1001902-30 = "狙撃、盗聴、尾行、いずれもここなら危険性はかなり低い。"
1001902-31 = "ふう……あ、でも油断はしないで、先生。気を抜くとすぐに――"
1001902-32 = "[s] \"あっ！あそこにギリースーツを着た人が！\""
1001902-37 = "（ガチャッ！）"
1001902-39 = "（ダダダダダダダダダダッ！！）"
1001902-44 = "……。"
1001902-45 = "[s] \"………。\""
1001902-46 = "……うん。"
1001902-47 = "多分、木の枝が風で揺れただけだ。安心して、先生。"
1001902-48 = "[s] \"すみません、ちょっとした冗談のつもりでした。\""
1001902-49 = "……。"
1001902-51 = "……まあでも、先生の言わんとしてることは伝わった。"
1001902-52 = "極端に緊張する必要は無い、要するにそういうことでしょ。"
1001902-53 = "でもさっきみたいな冗談はやめてほしい。一歩間違えたら、先生が怪我するかもしれないんだ。"
1001902-54 = "[s] \"すみません……。\""
1001902-55 = "……私は、自分を取り巻くもののほとんどを信用してない。"
1001902-56 = "その上、慣れない場所、慣れない人、慣れない生活……それらも相まって、緊張するなという方が無理な相談だ。"
1001902-57 = "むしろ私からすれば、ここの生徒たちはあまりにも緊張感が無さすぎる。"
1001902-58 = "命は一つしかない、なのにどうしてこんなに余裕があるんだ？自分たちの領域とはいえあまりにも、のほほんとしすぎじゃないか？正直、そういう気持ちが強い。"
1001902-59 = "ただきっと、今この場において変なのはきっと私の方……それくらいは分かってる。"
1001902-60 = "だから、先生に少し手伝ってほしいんだ。"
1001902-61 = "今日呼び出したのも、それが理由で……。"
1001902-62 = "[s] \"うん、喜んで。何を手伝えばいい？\""
1001902-63 = "まずは……"
1001902-64 = "この地域に慣れたい。"
1001902-65 = "まだ実際にはここに来たばかりで、この学園の普通のことをあまり知らないから……。"
1001902-66 = "[s5] \"トリニティの観光案内、みたいなことで良いのかな？\"\n[s6] \"それなら、他の生徒たちの方が……。\""
1001902-67 = "あ、他の生徒はダメ！今必要なのは「あまり慣れてない」部外者の視点。"
1001902-68 = "あ、他の生徒はダメ！今必要なのは「あまり慣れてない」部外者の視点。"
1001902-69 = "他の生徒たちはすでに、ここに慣れすぎてしまっている。その観点からは見えないものがある。"
1001902-70 = "慣れは盲点を生む。盲点を看過してしまうと……"
1001902-71 = "外部からその穴を突かれて一気に決壊する。破滅に至る、よくあるパターンだ。"
1001902-72 = "それに、先生だったら……"
1001902-73 = "[s7] \"……うん、じゃあ喜んで。\"\n[s8] \"明日から観光しよっか。\""
1001902-74 = "……助かる。"
1001902-75 = "……助かる。"
1001902-76 = "じゃあ、またすぐ連絡するから。"
1001902-77 = "あっ、あと今度から、通信時のコードネームは「ペンギン」で。"
1001902-78 = "先生は「アヒル」。"
1001902-79 = "[s] \"ペンギン……？アヒル……？\""
1001902-80 = "理由は特に無い。そもそも、そういうものにむやみに理由があるのはコードネームとして良くない！"
1001902-81 = "……じゃあ、"
1001902-83 = "また後で。"
