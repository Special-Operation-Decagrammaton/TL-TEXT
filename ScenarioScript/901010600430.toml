[translation]
901010600430-7 = "Resumindo o que investigamos sobre o pescador desaparecido..."
901010600430-8 = "Como todos sabem, o pescador novato Miyaguchi não tinha boa fama."
901010600430-9 = "Até trabalhava direito, mas vivia reclamando e levava bronca –"
901010600430-10 = "Segundo os colegas, ele também se envolvia com jogatina."
901010600430-11 = "Jogatina? Apostava dinheiro?"
901010600430-12 = "É. Gastava muito, vivia sem dinheiro. Parece que tentava recuperar as perdas no jogo."
901010600430-13 = "Mas nunca teve uma grande vitória..."
901010600430-14 = "No final, acabou recorrendo a agiotas..."
901010600430-15 = "Jogo de azar é feito para a banca sempre ganhar."
901010600430-16 = "Quem confia em sorte de principiante acaba perdendo tudo."
901010600430-17 = "O melhor é ganhar dinheiro honestamente. \"Money for nothing, chicks for free\" não existe."
901010600430-18 = "Mas não custa sonhar, né."
901010600430-19 = "Ah, quem me dera ganhar na loteria..."
901010600430-21 = "Voltando ao assunto. Se Miyaguchi não sofreu nenhum acidente, o motivo é mais óbvio."
901010600430-22 = "Por que Miyaguchi fugiu do porto às pressas?"
901010600430-30 = "Por que Miyaguchi fugiu do porto às pressas?\n[as2] Estava sendo ameaçado por assaltantes.\n[as3] Sofria bullying.\n[as1] Não conseguiu pagar as dívidas de jogo."
901010600430-32 = "Pois é. Dizem que era agiotagem com juros altos. Uma pessoa normal já teria dificuldade em pagar só os juros."
901010600430-33 = "Os colegas pescadores sabiam das dívidas dele..."
901010600430-34 = "Com certeza fugiu quando não tinha ninguém por perto."
901010600430-39 = "Hmm, ele gastava demais, pode ser que alguns pensem assim, mas..."
901010600430-40 = "Ser ameaçado por assaltantes por causa das dívidas? Acho difícil."
901010600430-41 = "Pense de novo, Sensei."
901010600430-50 = "É verdade, parecia que ele tinha desafetos, sim..."
901010600430-51 = "Mas não houve relatos de bullying."
901010600430-52 = "Deve ser outra coisa."
901010600430-60 = "Fugir por causa de dívida é algo bem comum."
901010600430-61 = "Mas se mudar para outro distrito, a dívida some?"
901010600430-62 = "Claro que não. A menos que peça falência, dívida pessoal acompanha a vida inteira."
901010600430-64 = "Dizem que teve uma escola que não conseguiu pagar a dívida acumulada e foi comprada por uma empresa."
901010600430-69 = "Dívida no nível de escola... imagino como pagaram..."