[translation]
901010600430-7 = "Let's organize what we've found out about the missing fisherman..."
901010600430-8 = "As you all know, the new fisherman, Miyaguchi, didn't have a very good reputation among the others."
901010600430-9 = "Even though he worked hard, he was often criticized for being a complainer—"
901010600430-10 = "According to his fellow fishermen, he had also gotten involved in gambling."
901010600430-11 = "Gambling? You mean he was betting money?"
901010600430-12 = "Yeah. He was a big spender and often had money troubles. #nI heard he was always trying to hit it big with gambling."
901010600430-13 = "But he never really had any big wins..."
901010600430-14 = "In the end, it seems he even resorted to taking out loans from consumer finance companies..."
901010600430-15 = "Gambling is designed so that the house always wins, to begin with."
901010600430-16 = "If you fall for beginner's luck, you'll eventually end up losing everything."
901010600430-17 = "It's best to earn money honestly. Easy come, easy go, as they say."
901010600430-18 = "But there's no harm in dreaming a little, right?"
901010600430-19 = "Sigh... I wonder if I'll ever win the lottery."
901010600430-21 = "Let's get back to the point. If Miyaguchi didn't have an accident, the reasons for his disappearance naturally narrow down."
901010600430-22 = "The reason Miyaguchi fled the port in such a hurry is..."
901010600430-30 = "The reason Miyaguchi fled the port in such a hurry is...\n[as2] Because he was being targeted by robbers.\n[as3] Because he was being bullied by those around him.\n[as1] Because he couldn't pay back his gambling debts."
901010600430-32 = "That's right. And they say it was a high-interest loan, too. #nI imagine a normal person would have been struggling just to pay the interest."
901010600430-33 = "Even his fellow fishermen knew about Miyaguchi's debt situation..."
901010600430-34 = "He must have fled when no one was around."
901010600430-39 = "Hmm, he was a big spender, so I can see why people might get the wrong idea, but..."
901010600430-40 = "Still, it's hard to believe he'd be targeted by robbers and run away when he was already losing money on gambling."
901010600430-41 = "Think about it again, Sensei."
901010600430-50 = "It's true that he complained a lot and some people didn't like him..."
901010600430-51 = "But there were no reports of him being bullied."
901010600430-52 = "Could there be another reason?"
901010600430-60 = "Running away in the middle of the night because of debt is actually quite common."
901010600430-61 = "But if you run away to another district, does the debt just disappear?"
901010600430-62 = "No way. Unless you file for bankruptcy, personal debt follows you for life."
901010600430-64 = "I heard there's even a case where a school couldn't pay back its mounting debts and the entire district was bought out by a corporation."
901010600430-69 = "I can't even imagine how you'd pay back a debt on the scale of an entire school..."