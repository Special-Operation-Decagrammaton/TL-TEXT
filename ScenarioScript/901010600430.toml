[translation]#[Texto Final. - Filipe 05/07.]
901010600430-7 = "Organizando o que a gente descobriu sobre o pescador desaparecido……"
901010600430-8 = "Como todo mundo já sabe, o novato Miyaguchi não tinha uma boa reputação entre os colegas."
901010600430-9 = "Trabalhava direito, mas vivia reclamando e recebia bronca――"
901010600430-10 = "Segundo os outros pescadores, ele também se meteu com jogo."
901010600430-11 = "Jogo? Ele apostava dinheiro?"
901010600430-12 = "É. Era gastador e vivia apertado.#nVivia tentando recuperar o prejuízo no jogo."
901010600430-13 = "Mas nunca ganhou nada grande……"
901010600430-14 = "No fim, parece que recorreu a agiota……"
901010600430-15 = "Jogo foi feito pra casa sempre ganhar, isso é básico."
901010600430-16 = "Quem confia em sorte de principiante acaba perdendo tudo."
901010600430-17 = "O melhor é ganhar dinheiro trabalhando, com honestidade. Dinheiro fácil não dura."
901010600430-18 = "Mas sonhar não custa nada."
901010600430-19 = "Ahh, quem me dera ganhar na loteria~"
901010600430-21 = "Voltando ao assunto. Se o Miyaguchi não sofreu um acidente, os motivos ficam mais claros."
901010600430-22 = "O motivo de ele ter fugido do porto às pressas……"
901010600430-30 = "O motivo de ele ter fugido do porto às pressas……\n[as2] Porque estava sendo perseguido por ladrões.\n[as3] Porque sofria bullying.\n[as1] Porque não conseguiu pagar as dívidas do jogo."
901010600430-32 = "É. E ainda por cima um agiota com juros altos.#nUma pessoa normal já mal daria conta dos juros."
901010600430-33 = "Até os colegas pescadores sabiam da situação financeira do Miyaguchi……"
901010600430-34 = "Ele deve ter fugido num horário sem ninguém."
901010600430-39 = "Hmm, com esse jeito gastador, é fácil alguém pensar errado……"
901010600430-40 = "Mas se ele já perdia dinheiro no jogo, é difícil acreditar que fugiu porque ladrões estavam atrás dele."
901010600430-41 = "Pensa de novo, Sensei."
901010600430-50 = "É verdade que tinha gente que não gostava dele por causa das reclamações……"
901010600430-51 = "Mas não houve relato de bullying."
901010600430-52 = "Será que não tem outro motivo?"
901010600430-60 = "Fugir por causa de dívida é bem comum."
901010600430-61 = "Mas se fugir pra outra região, a dívida some?"
901010600430-62 = "Claro que não. A menos que peça falência, dívida pessoal te acompanha pra sempre."
901010600430-64 = "Ouvi falar que uma academia, por não conseguir pagar dívidas acumuladas, foi comprada por uma empresa junto com a região."
901010600430-69 = "Dívida no nível de uma academia…… nem imagino como se paga."