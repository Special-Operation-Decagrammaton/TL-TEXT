[translation]
1008405-1 = "Sons da natureza (2)"

1008405-4 = "Pensei cuidadosamente sobre por que falhei da última vez..."

1008405-5 = "Acho que foi porque eles estavam tentando controlar o ambiente com variáveis ​​artificiais."

1008405-6 = "A razão pela qual as pessoas gostam dos sons da natureza é porque eles são imprevisíveis e irregulares..."

1008405-7 = "Tentei criar os sons da natureza com minhas próprias mãos..."

1008405-8 = "[s] \"Parece que eu simplesmente não tinha força física suficiente...\""

1008405-9 = "E de qualquer maneira...!"

1008405-10 = "Hoje vou aproveitar meus fracassos anteriores e curtir as montanhas como me der vontade."

1008405-11 = "Se você ouvir devagar, poderá ouvir sons que não consegue ouvir na cidade."

1008405-12 = "[s] \"Acho que é uma boa ideia...\""

1008405-14 = "[ns1] \"Nesta época do ano em que as folhas caíram...\"\n[ns2] \"Conseguimos ouvir todos os tipos de sons?\""

1008405-17 = "tudo bem. #nMesmo que as plantas estejam murchas, a vida ainda existe."

1008405-18 = "Na verdade, existem sons que só podem ser apreciados em uma montanha de inverno tão tranquila."

1008405-19 = "São os sons que só podem ser ouvidos agora que valem a pena registrar."

1008405-23 = "Então... vamos prosseguir devagar?"

1008405-25 = "(depois de um tempo......)"

1008405-30 = "……Sensei."

1008405-31 = "Você poderia, por favor, vir aqui por um momento?"

1008405-35 = "Você vê aquela árvore ali?"

1008405-36 = "[s] \"É uma árvore bem grande.\""

1008405-37 = "sim. Provavelmente protegeu este lugar durante décadas."

1008405-38 = "...Agora vamos ouvir a história que aquela árvore nos conta."

1008405-41 = "― [log=코타마 캠핑] Shiichi... [/log]"

1008405-45 = "[ns] \"Kotama, o que é isso...\""

1008405-46 = "[wa:1150]― [log=코타마 캠핑]先生、[wa:2050]声を落として。[/log]"
1008405-49 = "[wa:1750]― [log=코타마 캠핑]静かに……[wa:1750]木に近づいて……[/log]"
1008405-52 = "[wa:200]― [log=코타마 캠핑]中の音に、[/log]"
1008405-54 = "― [log=코타마 캠핑]Por favor, ouça com atenção. [/registro]"

1008405-57 = "[wa:1550]― [log=코타마 캠핑]……聴こえますか？[/log]"
1008405-60 = "― [log=코타마 캠핑]O som da [wa:2150] água passando pelo tronco. [/registro]"

1008405-63 = "[wa:1150]― [log=코타마 캠핑]この木は、[wa:1450]葉をすべて落とし……[/log]"
1008405-65 = "― [log=코타마 캠핑][wa:1200]Parece [wa:1350] que você desistiu da vida...[/log]"

1008405-68 = "[wa:200]― [log=코타마 캠핑]今でもこうして、[/log]"
1008405-70 = "― [log=코타마 캠핑]Ele está sugando [wa:700] água com força. [/registro]"

1008405-73 = "[wa:1150]― [log=코타마 캠핑]一見、[wa:1200]静かに見える[wa:1000]この森も……[/log]"
1008405-75 = "― [log=코타마 캠핑]Na verdade, [wa:1450]Está cheio de tantos sons...[/log]"

1008405-78 = "[wa:200]― [log=코타마 캠핑]……ふふ、[wa:1550]音に飽きることは[/log]"
1008405-80 = "[wa:200]― [log=코타마 캠핑]この先もなさそうです。[/log]"
1008405-83 = "Hehe, isso acalma..."

1008405-84 = "Desta vez, há uma boa fonte de som――"

1008405-89 = "[ns] \"Este é o som de Kotama...?\""

1008405-90 = "...Estou inconsciente."

1008405-91 = "Na verdade, eu senti como se estivesse com fome, mas não esperava que fosse tão alto..."

1008405-92 = "...Nas tranquilas montanhas de inverno, você não pode se enganar com seus próprios sons."

1008405-96 = "[ns3] \"Na verdade, hoje...\"\n[ns4] \"Achei que ficaria com fome depois de caminhar, então trouxe meu almoço.\""

1008405-101 = "[ns] \"...Vamos continuar depois de fazermos uma pausa.\""

1008405-105 = "……sim!"

1008405-107 = "(Depois, ouvi os sons do inverno enquanto almoçava com Kotama.)"

