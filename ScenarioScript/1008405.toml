[translation]
1008405-1 = "自然の音（２）"
1008405-4 = "前回失敗した理由を、じっくり考えてみたのですが……"
1008405-5 = "やはり、人為的な変数で環境をコントロールしようとしていたからだと思います。"
1008405-6 = "人が自然の音を好む理由は、予測できない不規則なところにあるからなので……"
1008405-7 = "私は自分の手で自然の音を作り上げようとしてしまったので……"
1008405-8 = "[s] \"あれは、ただ体力が足りなかっただけのような……\""
1008405-9 = "と、とにかく……！"
1008405-10 = "今日は以前の失敗を活かして、気の向くままに山を楽しんでみようと思います。"
1008405-11 = "ゆったりと耳を傾けたら……都市では聞くことができない音が届いてくるかもしれません。"
1008405-12 = "[s] \"良い考えだとは思うけど……\""
1008405-14 = "[ns1] \"葉が落ちきったこの時期に……\"\n[ns2] \"いろんな音が聴けるのかな？\""
1008405-17 = "大丈夫です。#nたとえ草木が枯れていようと、暮らしは存在するものですから。"
1008405-18 = "むしろ、このように静かな冬の山だからこそ味わえる音があるはず。"
1008405-19 = "そういった今しか聴けない音にこそ、録音する価値がありますので。"
1008405-23 = "では……ゆっくり進みましょうか？"
1008405-25 = "（しばらくして……）"
1008405-30 = "……先生。"
1008405-31 = "ちょっと、こちらに来ていただけますか？"
1008405-35 = "あそこ、あの奥にある木が見えますか？"
1008405-36 = "[s] \"かなり大きい木だね。\""
1008405-37 = "はい。おそらく数十年以上、この場所を守ってきたはずです。"
1008405-38 = "……それでは、あの木が聴かせてくれる物語に耳を傾けてみましょう。"
1008405-41 = "― [log=코타마 캠핑]し一っ……。[/log]"
1008405-45 = "[ns] \"コタマ、これは一体……\""
1008405-46 = "[wa:1150]― [log=코타마 캠핑]先生、[wa:2050]声を落として。[/log]"
1008405-49 = "[wa:1750]― [log=코타마 캠핑]静かに……[wa:1750]木に近づいて……[/log]"
1008405-52 = "[wa:200]― [log=코타마 캠핑]中の音に、[/log]"
1008405-54 = "― [log=코타마 캠핑]耳を澄ませてください。[/log]"
1008405-57 = "[wa:1550]― [log=코타마 캠핑]……聴こえますか？[/log]"
1008405-60 = "― [log=코타마 캠핑]幹の中を通る、[wa:2150]水の音が。[/log]"
1008405-63 = "[wa:1150]― [log=코타마 캠핑]この木は、[wa:1450]葉をすべて落とし……[/log]"
1008405-65 = "― [log=코타마 캠핑]まるで、[wa:1200]生を諦めたように[wa:1350]見えますが……[/log]"
1008405-68 = "[wa:200]― [log=코타마 캠핑]今でもこうして、[/log]"
1008405-70 = "― [log=코타마 캠핑]力強く[wa:700]水を吸い上げています。[/log]"
1008405-73 = "[wa:1150]― [log=코타마 캠핑]一見、[wa:1200]静かに見える[wa:1000]この森も……[/log]"
1008405-75 = "― [log=코타마 캠핑]本当は、[wa:1450]たくさんの音で溢れてる……[/log]"
1008405-78 = "[wa:200]― [log=코타마 캠핑]……ふふ、[wa:1550]音に飽きることは[/log]"
1008405-80 = "[wa:200]― [log=코타마 캠핑]この先もなさそうです。[/log]"
1008405-83 = "ふふ、落ち着きますね……"
1008405-84 = "今度こそ、良い音源が――"
1008405-89 = "[ns] \"今のは、コタマの音……?\""
1008405-90 = "……不覚です。"
1008405-91 = "実は小腹が空いている感覚はあったのですが、これほど大きな音になるとは思わず……"
1008405-92 = "……静かな冬の山では、自分の音を誤魔化せませんね。"
1008405-96 = "[ns3] \"実は今日……\"\n[ns4] \"歩いたらお腹が空くと思って、お弁当を持ってきたんだ。\""
1008405-101 = "[ns] \"……続きは休憩してからにしよっか。\""
1008405-105 = "……はい！"
1008405-107 = "（その後、コタマとお弁当を食べながら、冬の音に耳を傾けた）"
