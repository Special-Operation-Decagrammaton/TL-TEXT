[translation]
102190-1 = "第19話;「D.U.シラトリ区」防衛"
102190-5 = "次は最後の6つ目のサンクトゥムですが――#nここの「守護者」は、まだ確認されておりません。"
102190-6 = "ですが、現在探知したエネルギー量から、ここの「守護者」は他の守護者よりも危険な存在である事が予想されます――おそらく、この「守護者」一人で他の全ての「守護者」を凌駕するほどに。"
102190-7 = "攻撃を急いでも、その先の予測が全くできません……#nひとまずD.U.周辺の防御と偵察を強化するとしましょう。"
102190-8 = "他のサンクトゥム攻略が終わるまでに、第6サンクトゥムの対抗手段を探します。"
102190-9 = "対抗手段なんて存在するの？部長。"
102190-10 = "もちろんですエイミ。この私を誰だと思っているんですか？#n今もデータ収集しておりますので、お任せください。"
102190-11 = "えっと、下水道に流れる――"
102190-12 = "全然違います。最初の単語から間違っていますよ。#nもう……エイミ、あなたわざとですよね？"
102190-13 = "……。"
102190-19 = "よし、見つけた！あれは私たちに任せて！"
102190-20 = "ええ、D.U.シラトリ区の防衛は私たちが引き受けますわ。"
102190-22 = "本当は、水族館までの道中にあって邪魔だったからですけど★"
102190-23 = "はやくやっちゃおー！"
102190-24 = "補習授業部のお二人も、よろしければご一緒にいかがです？"
102190-26 = "へっ！？わ、私たちも、ですか！？"
102190-27 = "ああ、よろしく頼む。"
102190-29 = "あら？あの時以来ですね。"
102190-30 = "さあ！行くわよ！"
102190-39 = "回り続けるレールはやがて……正義の未来へと繋がる！"
102190-43 = "無限回転寿司戦隊・カイテンジャー！参上！"
102190-44 = "はっはっはっ！世界に危機が訪れた今、我々が知らんぷりするわけにはいくまい！"
102190-45 = "ああ！今こそ我々カイテンジャーの出番だ！！"
102190-46 = "でもさ、これ本当の危機っぽくない？大丈夫？"
102190-47 = "レッド、本日の業務は特別手当が出ると認識しております。念のため、リマインドさせていただきます。"
102190-48 = "ふん、そういうことなら仕方ない。尽力してやろう。"
102190-49 = "行くぞ！！無限回転寿司戦隊・カイテンジャー、出撃！！"
102190-55 = "……あ、あれ？今、なんか変わった集団を見たような……"
102190-56 = "うん！！私も見た！！お寿司だったね！"
102190-57 = "え、お寿司？どこどこ？"
102190-58 = "お寿司ってレアな食べ物だよね……この前デリバリー頼んだら、今期の金利が高いからってデリバリー断られちゃったの……"
102190-59 = "いや、寿司と金利に何の関係があるのよ！"
102190-61 = "ふふっ……いいですね。#n場も温まったことですし、ひとっ走りと行きましょうか。"
102190-62 = "参ります！"
