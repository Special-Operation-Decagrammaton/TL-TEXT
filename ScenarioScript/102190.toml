[translation]
102190-1 = "Episódio 19;Defesa do Distrito D.U. Shiratori"
102190-5 = "O próximo alvo é o sexto e último Sanctum, mas...#nainda não conseguimos confirmar a identidade do \"Guardião\" daqui."
102190-6 = "Porém, com base na quantidade de energia detectada, estimamos que esse \"Guardião\" seja muito mais perigoso que os outros...#nProvavelmente forte o bastante para superar todos os outros Guardiões sozinho."
102190-7 = "Mesmo que aceleremos o ataque, não conseguimos prever o que vem depois...#nPor enquanto, vamos reforçar a defesa e o reconhecimento ao redor de D.U."
102190-8 = "Até as operações nos outros Sanctums terminarem, vamos procurar alguma forma de enfrentar o sexto Sanctum."
102190-9 = "Existe mesmo alguma forma de enfrentar aquilo, chefe?"
102190-10 = "Claro que existe, Eimi. Quem você acha que eu sou?#nAinda estamos coletando dados, então deixe comigo."
102190-11 = "Então... o que tá escorrendo pelo esgoto é—"
102190-12 = "Completamente errado. Você errou já na primeira palavra.#nSério... Eimi, você tá fazendo isso de propósito, né?"
102190-13 = "......"
102190-19 = "Beleza, achei eles! Deixa isso com a gente!"
102190-20 = "Sim. Nós cuidaremos da defesa do Distrito D.U. Shiratori."
102190-22 = "Apesar de que, sinceramente, eles só estavam atrapalhando o caminho até o aquário★"
102190-23 = "Vamo acabar logo com isso~!"
102190-24 = "As duas do Clube de Aulas Suplementares também gostariam de vir conosco?"
102190-26 = "Hã!? N-nós também!?"
102190-27 = "Ah, conto com vocês."
102190-29 = "Ora? Faz tempo desde aquela vez."
102190-30 = "Vamos lá!"
102190-39 = "Os trilhos que continuam girando eternamente... um dia levarão ao futuro da justiça!"
102190-43 = "Esquadrão Sushi Giratório Infinito・Kaitenger! Em cena!"
102190-44 = "Hahahaha! Agora que o mundo está em perigo, não podemos simplesmente fingir que não vimos nada!"
102190-45 = "Isso mesmo! Finalmente chegou a hora de nós, Kaitenger!!"
102190-46 = "Mas falando sério... isso parece uma crise de verdade, né? Tá tudo bem mesmo?"
102190-47 = "Red, entendo que o serviço de hoje inclui pagamento extra. Achei prudente lembrá-lo disso."
102190-48 = "Hmph, nesse caso não temos escolha. Vamos dar o nosso melhor."
102190-49 = "Vamos!! Esquadrão Sushi Giratório Infinito・Kaitenger, avançar!!"
102190-55 = "...... H-hã? Agora pouco eu achei que tinha visto um grupo bem estranho..."
102190-56 = "Sim!! Eu também vi!! Era sushi!"
102190-57 = "Hã, sushi? Onde onde?"
102190-58 = "Sushi é uma comida super rara, né...? Esses dias tentei pedir delivery, mas recusaram dizendo que a taxa de juros desse trimestre tava alta demais..."
102190-59 = "Ei, o que sushi tem a ver com taxa de juros!?"
102190-61 = "Hehe... isso foi divertido.#nAgora que o clima esquentou, que tal irmos dar uma corrida?"
102190-62 = "Vamos nessa!"
