1005302-34 = "[s] \"Oh, seja gentil...\""
1005302-35 = "Estou brincando."
1005302-36 = "Vamos nos alongar um pouco e depois correr?"
1005302-38 = "(Depois disso, comecei a correr com Yuka)"
