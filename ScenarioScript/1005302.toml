1005302-12 = "[s1] \"Acho que deveríamos dar uma pequena caminhada.\"\n[s2] \"E quanto a Yuuka?\""
1005302-13 = "Bem, isso mesmo..."
1005302-14 = "Bem, isso mesmo..."
1005302-15 = "Decidi incorporar alguns exercícios leves em minha rotina matinal."
1005302-16 = "Olha, o Festival Akira patrocinado pela Millennium está chegando, não é?"
1005302-17 = "Claro, tenho trabalho a fazer como membro do comitê executivo no dia do evento, então não tenho planos de participar como jogador."
1005302-18 = "Sou executivo da Millennium, que organiza o Grande Festival de Akira, então não conseguiria exibir nada se aparecesse no dia com falta de força física, certo?"
1005302-19 = "Ouvi dizer que o exercício moderado melhora a concentração no trabalho..."
1005302-20 = "Pensei em correr nas manhãs frescas para manter minha saúde sob controle."
