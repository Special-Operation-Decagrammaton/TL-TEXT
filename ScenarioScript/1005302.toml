[translation]
1005302-1 = "朝のジョギング"
1005302-2 = "明け方の公園・散歩道"
1005302-3 = "（散歩に出ると、偶然ユウカを見かけた)"
1005302-9 = "[ns] \"ユウカ、おはよう。\""
1005302-10 = "えっ、先生？"
1005302-11 = "こんなところでお会いするなんて、驚きました。"
1005302-12 = "[s1] \"少し散歩しようかなって。\"\n[s2] \"ユウカは？\""
1005302-13 = "えっと、そのですね……。"
1005302-14 = "えっと、そのですね……。"
1005302-15 = "朝のルーティンに軽い運動を取り入れようと思って。"
1005302-16 = "ほら、ミレニアム主催の晄輪大祭が近いじゃないですか。"
1005302-17 = "もちろん私は当日も実行委員の仕事があるので、選手として参加する予定はありませんけど……。"
1005302-18 = "晄輪大祭を主催するミレニアムの役員ですから、当日に体力不足で不甲斐ない姿を見せては示しがつかないでしょう？"
1005302-19 = "適度な運動は作業の集中力を高めると聞きますし……。"
1005302-20 = "健康管理も兼ねて、涼しい朝にランニングでもしようかと思ったんです。"
1005302-21 = "それに……最近、体重が少し気になって……。"
1005302-22 = "[s] \"ユウカは今のままで大丈夫だよ。\""
1005302-23 = "そ、そんなことは……！"
1005302-24 = "コホン……とにかく、当分は運動をする予定です！"
1005302-25 = "ん……まずは全力疾走で5kmくらい……"
1005302-26 = "[s] \"いきなり5kmも全力で？\""
1005302-27 = "ふふ、心配ご無用です。"
1005302-28 = "スピードはともかく、体力には自信がありますから。"
1005302-29 = "5kmくらい、なんでもありません！"
1005302-30 = "[s] \"私も付いてっていい？\""
1005302-31 = "えっ？#n先生も一緒に？"
1005302-32 = "それは構いませんけど……私のペースに合わせて走れるんですか？"
1005302-33 = "ふふっ、ついてこれなくても待ちませんよ？"
1005302-34 = "[s] \"お、お手柔らかに……。\""
1005302-35 = "冗談です。"
1005302-36 = "軽くストレッチしてから走りましょうか。"
1005302-38 = "（その後、ユウカと一緒にランニングを始めた）"
1005302-43 = "（……10分後）"
1005302-45 = "はぁ、はぁ……はぁっ……。"
1005302-49 = "せ、先生……はぁ、はぁ……待って……。"
1005302-50 = "[s3] \"……大丈夫？\"\n[s4] \"……もしかして、もう限界？\""
1005302-51 = "そんな、はずは……。#nはぁ、はぁ……まだ10分しか……。"
1005302-52 = "そんな、はずは……。#nはぁ、はぁ……まだ10分しか……。"
1005302-53 = "こんな、準備運動程度で……息を切らすなんて……ありえま……"
1005302-57 = "……ありえますね。"
1005302-58 = "[s] \"そこでちょっと休もうか。\""
1005302-61 = "― はぁ、[wa:1500]はぁ……"
1005302-62 = "[wa:1800]― まさか[wa:500]たった[wa:300]数か月の[wa:600]間に[wa:1100]ここまで[wa:500]体力が[wa:500]落ちていた[wa:200]なんて……"
1005302-65 = "[wa:300]― 「晄輪大祭」で[wa:1000]無様な[wa:300]姿を[wa:300]みせない[wa:400]ためにも……"
1005302-66 = "[wa:1200]― もっと[wa:400]体力づくりを[wa:800]頑張らないと。"
1005302-69 = "[wa:300]― あ、[wa:700]先生も[wa:400]お水、[wa:400]要りますか？"
1005302-72 = "[wa:300]― はい、[wa:400]どうぞ……"
1005302-75 = "[wa:800]― ま、[wa:400]待って[wa:300]ください、[wa:400]先生！"
1005302-76 = "[wa:800]― や、[wa:800]やっぱ[wa:600]今は[wa:600]ダメです！"
1005302-79 = "[wa:700]― （今ここで[wa:400]私が[wa:400]口をつ[wa:100]けた[wa:700]ペットボトルから[wa:1000]先生が[wa:500]水を飲んだら……"
1005302-80 = "[wa:2300]― 事実上の[wa:1500]間接[wa:700]キ……）"
1005302-83 = "― （いや[wa:200]いや、[wa:900]いくら[wa:300]そういう[wa:300]状況だからって"
1005302-84 = "[wa:1600]― そんな[wa:300]破廉恥な[wa:400]ことが[wa:500]許される[wa:400]わけ……！）"
1005302-87 = "[wa:800]― （でも……[wa:2200]先生なら……）"
1005302-90 = "[wa:300]― 一口…… [wa:2000]だけですよ……？"
1005302-94 = "ふぅ……走った後のお水は美味しいですね。"
1005302-95 = "自分でも薄々、体力の低下に気付いていましたが、まさか先生についていけないほどだなんて……ショックです。"
1005302-96 = "晄輪大祭までに、何としても体力を取り戻さないと……。"
1005302-97 = "[s5] \"最初はゆっくり、自分のペースで。\"\n[s6] \"まずはジョギングからどうかな？\""
1005302-98 = "……そうですね。ジョギングも基礎体力の向上につながりますし、ここは意地を張らずに……。"
1005302-99 = "……そうですね。ジョギングも基礎体力の向上につながりますし、ここは意地を張らずに……。"
1005302-100 = "晄輪大祭の日まで、毎朝ジョギングを続けてみます。"
1005302-105 = "その、次はゆっくり……もう少しだけ付き合ってくれませんか？"
1005302-107 = "（その後、ユウカと並んでジョギングをしてから、シャーレに戻った）"
