1005302-22 = "[s] \"Yuka está bem do jeito que está.\""
1005302-23 = "Ah, isso não é verdade...!"

1005302-24 = "Cohon...De qualquer forma, estou planejando me exercitar por enquanto!"
1005302-25 = "Hmm... Primeiro de tudo, corri cerca de 5km..."
