1005302-45 = "Ha, ha... ha..."
1005302-49 = "S-sensei... suspiro... suspiro... espere..."
1005302-50 = "[s3] \"...Você está bem?\"\n[s4] \"...Talvez você tenha atingido seu limite?\""
