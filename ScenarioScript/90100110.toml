[translation]
90100110-1 = "Episode 11;Inexplicable"
90100110-2 = "General Student Council President's Office"
90100110-4 = "I have some good news."
90100110-5 = "The victims of the white scarecrow—commonly known as the 'Kunekune'—have begun to wake up."
90100110-6 = "Fortunately, there are no major abnormalities in their health."
90100110-7 = "However, the hospital says they don't know why their condition improved so suddenly."
90100110-8 = "I believe this is all thanks to you all for exterminating the anomaly."
90100110-13 = "Do you trust the contents of the report completely, President?"
90100110-14 = "Yes. Yukino the squad leader wrote it, didn't she? #nBesides, it had the endorsement of Sensei from Schale."
90100110-15 = "There is no reason not to trust it."
90100110-16 = "...As I mentioned in the report, we aren't even certain what we were dealing with in this operation."
90100110-17 = "The Roar is an inexplicable phenomenon with no clear cause or countermeasure."
90100110-18 = "We tried everything we could... and it was only by result that we were able to resolve it."
90100110-19 = "Even so, many were saved as a result."
90100110-23 = "The result... is not what's important."
90100110-27 = "...It's not that I disregard the safety of the citizens."
90100110-28 = "It's just... inexplicable incidents are not uncommon in Kivotos. #nHowever, it is rare for one to cause this much human harm."
90100110-29 = "If people learn that uncontrollable variables are part of daily life... they fall into anxiety. #nThey look for a culprit, look for a motive, shift the blame, and furthermore—"
90100110-33 = "They might point that muzzle at you."
90100110-38 = "Yukino."
90100110-39 = "Would you like to guess what I'm thinking about right now?"
90100110-40 = "...Do you think my worries are unfounded?"
90100110-41 = "Too bad. Incorrect."
90100110-42 = "Just a moment ago, Oki-san left some tea snacks for me. #nBut they were snacks I'd never seen before."
90100110-43 = "They were sweet with a somewhat nostalgic citrus scent that went well with the tea, but... #nthere were no ingredients listed on the packaging at all."
90100110-44 = "Even while talking to you, I couldn't help but wonder what they were."
90100110-45 = "Fufu, I'm sorry."
90100110-46 = "N-no, that's quite alright."
90100110-47 = "I didn't notice at all, and... I have similar moments sometimes, too."
90100110-48 = "Having your thoughts dominated by trivial matters that don't matter. #nSuch 'common occurrences' happen quite frequently."
90100110-49 = "But we rarely speak of them honestly."
90100110-50 = "Perhaps it's rude to the other person, or we don't want to be thought of as strange. The reasons are varied."
90100110-51 = "In the first place, because there isn't much to be gained by exposing one's frank feelings—"
90100110-52 = "People continue relationships while hiding their hearts... and in the end, they can never fully understand each other. #nMost misunderstandings are born from that."
90100110-54 = "...Perhaps the Roar is a phenomenon born from such a 'lack of communication'."
90100110-55 = "A message that couldn't be put into words or writing... #nfeelings that slipped from people's hearts and changed shape."
90100110-58 = "I don't understand."
90100110-59 = "What kind of message could there possibly be in a hallucination that confuses people and steals their very words?"
90100110-60 = "I have already heard the answer to that from Squad Leader Yukino's own mouth."
90100110-62 = "—To refrain from outdoor activities on hot days."
90100110-63 = "Perhaps the 'Kunekune' was a sufficient warning just by existing."
90100110-65 = "...Just for that, of all things."
90100110-66 = "Yes. Just for that."
90100110-70 = "Squad Leader Yukino. Actually, there are still some of those tea snacks left. #nWould you like one?"
90100110-71 = "If you eat this and think about the ingredients—"
90100110-76 = "We might be able to understand each other a little better."
90100110-79 = "It's hot...."
90100110-84 = "Why do we have to wait outside?"
90100110-85 = "Can't we go inside the building?"
90100110-86 = "Ah, that's—"
90100110-87 = "Oh. That's bold."
90100110-88 = "You're fine with running into the executive you punched earlier?"
90100110-89 = "Ugh... that would be a problem, but..."
90100110-90 = "We're on parole, after all. I thought it would be bad to cause a scene."
90100110-91 = "Even if it's hot, we have to endure it a little longer."
90100110-92 = "Then let's at least go to the shade. Is there any need to wait right in the middle of the plaza?"
90100110-93 = "How about a cafe or something? Can't we wait while drinking something cold?"
90100110-94 = "No. Yukino has the wallet with the operation support card in it right now."
90100110-95 = "Why? Niko was managing the wallet until now."
90100110-96 = "Since the operation report includes expense approval... she said she'd take the card with her."
90100110-97 = "Ah, I guess that can't be helped then."
90100110-101 = "It's hot... I want to go back to Schale soon."
90100110-102 = "Hearing that, it sounds like Schale is your home."
90100110-103 = "Nobody's listening anyway. Who would be walking outside in this heat—"
90100110-104 = "Huh? You guys..."
90100110-105 = "Ehh!? N-no, that's not it! #nI just meant I wanted to go to Schale, not that it's my home or anything—"
90100110-106 = "...What are you talking about?"
90100110-112 = "Part-timer, long time no see."
90100110-113 = "That person from back then..."
90100110-114 = "Yeah. Erika from Gehenna Academy. To think we'd meet again."
90100110-115 = "Ah, ahaha... I suppose so. What a coincidence."
90100110-116 = "Were you working part-time today too? #nIt's quite far from Hyakkiyako Academy."
90100110-117 = "Y-yes! I'm with a friend today."
90100110-118 = "Um, about that time..."
90100110-122 = "I'm sorry, I lied to you. #nThe MomoTalk I gave you back then was a fake account..."
90100110-123 = "Oh, come to think of it. That's right. #nI was surprised when I got home and checked it, and it said 'Account does not exist'."
90100110-124 = "And 'Hyper-Aid' seemed to be a drink that didn't exist either. #nWhen I told my friends about it, they made a huge fuss, saying 'Maybe you saw a ghost'."
90100110-125 = "But if it wasn't a ghost... I'm glad."
90100110-129 = "I'm sorry...."
90100110-130 = "It's okay, it's okay. Don't apologize like that."
90100110-131 = "Everyone has things they want to hide. #nIt just happened that back then... you didn't want to be seen, right?"
90100110-132 = "...You're not angry?"
90100110-133 = "Why would I be? I didn't lose anything. If anything, it was a fun experience."
90100110-134 = "I kept wondering who I met back then. #nWhy were they handing out a non-existent drink in that place?"
90100110-135 = "I had a lot of fun over the last few weeks letting my imagination run wild."
90100110-136 = "Besides, you must have had your reasons. I don't want to get angry without knowing anything."
90100110-137 = "You know, there's a saying that if you keep a lie going, it becomes the truth, right?"
90100110-142 = "Thank you for understanding."
90100110-143 = "If you'd like, why don't we go to the cafe up ahead and talk for a bit?"
90100110-144 = "Their special aid there is actually quite good."
90100110-145 = "The thing is... we left our wallets behind..."
90100110-146 = "Then, how about I treat you?"
90100110-150 = "In exchange... there's one thing I want you to answer honestly."
90100110-154 = "W-what do we do? It looks like she's trying to find out who we are."
90100110-155 = "...Should we throw a smoke screen and run before the conversation drags on? I have a smoke grenade."
90100110-156 = "N-no, that's not allowed!"
90100110-161 = "—That 'Hyper-Aid' you drank before. How do you make it?"
90100110-162 = "I wanted to let my friends try it, but I couldn't find any drink with a similar taste at all."
90100110-163 = "Oh, that's easy! Just put one store-bought Beluga vitamin tablet into 500ml of water and—"
90100110-164 = "Wait, Otogi! Don't spill classified information before she treats us! #nIsn't that confidential until we're at the negotiating table!?"
90100110-165 = "Fufu, you guys are much more interesting than I thought. This seems worth talking about."
90100110-166 = "Alright, let's go. The sun is strong today."
90100110-171 = "Yes, that's right."
90100110-173 = "...Because it's dangerous to stay outside for too long on a hot day."