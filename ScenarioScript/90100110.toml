[translation]
90100110-1 = "Episódio 11: Inexplicável"
90100110-2 = "Gabinete da Presidente do Conselho Estudantil"
90100110-4 = "Tenho boas notícias."
90100110-5 = "As vítimas do espantalho branco — conhecido como 'Kunekune' — começaram a despertar."
90100110-6 = "Felizmente, parece que não há grandes anormalidades em seu estado de saúde."
90100110-7 = "No entanto, o hospital diz que não sabe o motivo da melhora repentina."
90100110-8 = "Acredito que tudo isso seja graças a vocês, que derrotaram aquela assombração."
90100110-13 = "A Presidente confia plenamente no conteúdo do relatório?"
90100110-14 = "Sim. Foi a Comandante Yukino quem escreveu, não foi?#nAlém disso, teve o aval do Sensei do Schale."
90100110-15 = "Não há motivos para não confiar."
90100110-16 = "……Como informamos no relatório, nem nós temos certeza do que enfrentamos durante a operação."
90100110-17 = "O Roa é algo inexplicável, sem causa ou contramedidas claras."
90100110-18 = "Tentamos tudo o que estava ao nosso alcance... e, como resultado, conseguimos resolver."
90100110-19 = "Ainda assim, o resultado foi que muitas pessoas foram salvas."
90100110-23 = "O resultado... não é o que importa."
90100110-27 = "……Não é que eu menospreze a segurança dos cidadãos."
90100110-28 = "É só que... incidentes inexplicáveis não são raros em Kivotos.#nNo entanto, raramente ocorrem com tantas vítimas humanas."
90100110-29 = "Se as pessoas souberem que variáveis incontroláveis fazem parte do cotidiano... elas entrarão em pânico.#nProcurarão um culpado, um motivo, atribuirão culpas e, além disso——"
90100110-33 = "Podem acabar apontando suas armas para você."
90100110-38 = "Yukino."
90100110-39 = "Você gostaria de tentar adivinhar o que estou pensando agora?"
90100110-40 = "……Você acha que minha preocupação é infundada?"
90100110-41 = "Que pena. Errado."
90100110-42 = "Há pouco tempo, alguém deixou alguns doces aqui.#nMas é um doce que nunca vi antes."
90100110-43 = "É doce, mas tem um aroma cítrico nostálgico que combina muito bem com o chá...#nmas não há nada escrito sobre os ingredientes na embalagem."
90100110-44 = "Mesmo enquanto falava com você, eu não conseguia parar de pensar no que aquilo poderia ser."
90100110-45 = "Fufu, me desculpe."
90100110-46 = "N-não, não tem problema."
90100110-47 = "Eu nem tinha notado... e coisas parecidas acontecem comigo às vezes também."
90100110-48 = "Ter seus pensamentos dominados por algo trivial e sem importância.#nEssas 'coisas comuns' acontecem com mais frequência do que se imagina."
90100110-49 = "Mas raramente falamos sobre isso honestamente."
90100110-50 = "Talvez por medo de ser indelicado com o outro, ou por não querer parecer estranho. Os motivos são variados."
90100110-51 = "Justamente porque não se ganha muito expondo sentimentos francos——"
90100110-52 = "As pessoas continuam seus relacionamentos escondendo seus corações... e, no fim, nunca conseguem entender o coração do outro completamente.#nA maioria dos mal-entendidos nasce daí."
90100110-54 = "……Talvez o Roa seja um fenômeno nascido dessa 'falta de comunicação'."
90100110-55 = "Algo que não se tornou palavra nem escrita...#numa mensagem que mudou de forma a partir de sentimentos que escaparam dos corações das pessoas."
90100110-58 = "Não consigo entender."
90100110-59 = "Que tipo de mensagem poderia haver em uma alucinação que confunde as pessoas e até rouba suas palavras?"
90100110-60 = "A resposta para isso, eu já ouvi da boca da Comandante Yukino."
90100110-62 = "——Evitar atividades ao ar livre em dias quentes."
90100110-63 = "Talvez o 'Kunekune' fosse, por si só, um aviso suficiente, não acha?"
90100110-65 = "……Apenas por causa disso."
90100110-66 = "Sim. Apenas por causa disso."
90100110-70 = "Comandante Yukino. Aquele doce que mencionei, na verdade ainda sobrou um pouco.#nSe quiser, gostaria de experimentar?"
90100110-71 = "Se você comer e pensar sobre os ingredientes——"
90100110-76 = "Talvez possamos nos entender um pouco melhor."
90100110-79 = "Que calor..."
90100110-84 = "Por que temos que ficar esperando do lado de fora?"
90100110-85 = "Não podemos ficar dentro do prédio?"
90100110-86 = "Ah, isso é..."
90100110-87 = "Oh. Que ousadia."
90100110-88 = "Você não se importa de dar de cara com os executivos que a gente espancou antes?"
90100110-89 = "Ugh... isso seria um problema, mas..."
90100110-90 = "Afinal, estamos em liberdade condicional. Achei que não seria bom causar confusão."
90100110-91 = "Mesmo com esse calor, vamos ter que aguentar só mais um pouco."
90100110-92 = "Então, pelo menos vamos para a sombra. Não precisamos esperar bem no meio da praça, né?"
90100110-93 = "Que tal um café? Não podemos esperar tomando algo gelado?"
90100110-94 = "Não. A carteira com o cartão de suporte operacional está com a Yukino agora."
90100110-95 = "Por quê? Até agora era a Niko quem cuidava da carteira."
90100110-96 = "Como o relatório da operação inclui a aprovação de despesas... ela disse que levaria o cartão junto."
90100110-97 = "Ah, entendi. Nesse caso, não tem jeito."
90100110-101 = "Que calor... quero voltar logo para o Schale."
90100110-102 = "Ouvindo isso, parece até que o Schale é sua casa, hein."
90100110-103 = "Ninguém está ouvindo, relaxa. Com esse calor, não tem ninguém andando por aí—"
90100110-104 = "Ué? Vocês..."
90100110-105 = "Aaaah!? N-não é nada disso!#nEu quis dizer que quero ir para o Schale, não é como se fosse minha casa ou algo do tipo—"
90100110-106 = "...Do que vocês estão falando?"
90100110-112 = "Garota do bico, quanto tempo."
90100110-113 = "Aquela de lá..."
90100110-114 = "Isso. Erika, da Academia Gehenna. Que coincidência nos encontrarmos de novo."
90100110-115 = "Ah, ahaha... é verdade. Que coincidência incrível."
90100110-116 = "Você estava trabalhando hoje também?#nÉ bem longe da Academia Hyakkiyako, não é?"
90100110-117 = "S-sim! É que hoje eu estou com umas amigas."
90100110-118 = "Sobre aquilo, naquela época..."
90100110-122 = "Me desculpe, eu menti para você.#nO MomoTalk que eu te passei naquela época era uma conta falsa..."
90100110-123 = "Ah, agora que você falou. É verdade, né?#nQuando cheguei em casa e fui ver, apareceu 'conta inexistente' e eu levei um susto."
90100110-124 = "E aquele 'Hyper Aid' também parecia não existir.#nQuando contei para os meus amigos, eles ficaram um tempão achando que eu tinha visto um fantasma."
90100110-125 = "Mas, se não era um fantasma... fico aliviada."
90100110-129 = "Me desculpe..."
90100110-130 = "Está tudo bem, não precisa se desculpar tanto."
90100110-131 = "Todo mundo tem algo que quer esconder.#nNaquela hora, você só... não queria que ninguém visse, né?"
90100110-132 = "...Você não está brava?"
90100110-133 = "Por que estaria? Não perdi nada. Na verdade, foi uma experiência divertida."
90100110-134 = "Fiquei pensando: 'Quem era aquela pessoa que eu encontrei?'#n'Por que ela estava distribuindo uma bebida que não existe naquele lugar?'"
90100110-135 = "Deixei minha imaginação correr solta e me diverti bastante nessas últimas semanas."
90100110-136 = "Além disso, você deve ter tido seus motivos. Não quero ficar brava sem saber de nada."
90100110-137 = "Sabe, dizem que se você sustentar uma mentira até o fim, ela acaba se tornando verdade, não é?"
90100110-142 = "Obrigada por entender."
90100110-143 = "Se quiser, podemos conversar um pouco no café ali na frente?"
90100110-144 = "O 'Aid' especial deles é bem gostoso."
90100110-145 = "É que... nós esquecemos nossas carteiras..."
90100110-146 = "Então, quer que eu pague para vocês?"
90100110-150 = "Em troca... quero que me responda uma coisa com sinceridade."
90100110-154 = "E-e agora? Parece que ela está tentando descobrir quem somos."
90100110-155 = "...Quer que eu jogue uma bomba de fumaça e a gente fuja antes que a conversa se prolongue? Tenho uma aqui."
90100110-156 = "N-não, isso não!"
90100110-161 = "— Aquele 'Hyper Aid' que bebi antes. Como você faz aquilo?"
90100110-162 = "Eu queria dar para os meus amigos, mas não consegui achar nada com um gosto parecido."
90100110-163 = "Ah, isso é fácil! É só colocar um comprimido de vitamina Beluga em 500ml de água e—"
90100110-164 = "Ei, Otogi! Não entrega o segredo antes dela pagar a gente!#nIsso é informação confidencial até a gente chegar na mesa de negociação, não é!?"
90100110-165 = "Fufu, vocês são bem mais interessantes do que eu pensava. Parece que vai valer a pena conversar."
90100110-166 = "Bem, vamos nessa. O sol está forte hoje."
90100110-171 = "Sim, é verdade."
90100110-173 = "……Ficar muito tempo lá fora num dia quente é perigoso, afinal."
