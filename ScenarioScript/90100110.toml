[translation]#[Texto Final. - Filipe 05/07.]
90100110-1 = "Episódio 11: Inexplicável"
90100110-2 = "Gabinete da Presidente do Conselho Estudantil Geral"
90100110-4 = "Tenho boas notícias."
90100110-5 = "As vítimas do espantalho branco―― o \"Kunekune\"\ncomeçaram a acordar."
90100110-6 = "Felizmente, sem grandes anormalidades\nna saúde."
90100110-7 = "Só que, segundo o hospital, ninguém sabe\nexplicar a melhora repentina."
90100110-8 = "Eu, particularmente, acredito que foi tudo\ngraças a vocês, que exterminaram\na assombração."
90100110-13 = "A senhora confia em todo o conteúdo\ndo relatório?"
90100110-14 = "Sim. Foi você quem o escreveu,\ncapitã Yukino, não foi?#nE veio com o aval do Sensei da Schale."
90100110-15 = "Não há motivo para desconfiar."
90100110-16 = "……Como consta no relatório, nem nós sabemos\nao certo o que enfrentamos nesta operação."
90100110-17 = "O Lore é um mistério sem causa nem\ncontramedida definidas."
90100110-18 = "Tentamos tudo o que podíamos…… e a solução\nveio apenas como consequência."
90100110-19 = "Ainda assim, o resultado foi muita\ngente salva."
90100110-23 = "O resultado…… não é o que importa."
90100110-27 = "……Não estou menosprezando a segurança\ndos cidadãos."
90100110-28 = "É que…… casos inexplicáveis não são raros\nem Kivotos.#nMas raramente causam tantas\nvítimas assim."
90100110-29 = "Quando as pessoas descobrem que há uma\nvariável incontrolável no cotidiano……\nelas mergulham na ansiedade.#nProcuram um culpado, um motivo, empurram\na responsabilidade e, além disso――"
90100110-33 = "podem apontar essas armas para a senhora."
90100110-38 = "Yukino."
90100110-39 = "Quer tentar adivinhar em que estou\npensando agora?"
90100110-40 = "……Que a minha preocupação é exagero,\ntalvez?"
90100110-41 = "Que pena. Resposta errada."
90100110-42 = "Agorinha mesmo, a Oki deixou uns docinhos\npara o chá.#nMas é um doce que eu nunca tinha visto."
90100110-43 = "É doce, mas com um aroma cítrico nostálgico\nque combina com o chá……#nSó que a embalagem não lista\ningrediente nenhum."
90100110-44 = "Mesmo conversando com você, eu não parava\nde pensar: que doce era aquele?"
90100110-45 = "Fufu, me desculpe."
90100110-46 = "N-Não. Isso não me incomoda."
90100110-47 = "Eu nem tinha percebido…… e coisas assim\ntambém acontecem comigo às vezes."
90100110-48 = "Ter a mente dominada por uma bobagem\nqualquer.#nEssas \"coisas corriqueiras\" acontecem\ncom mais frequência do que parece."
90100110-49 = "Mas quase nunca as confessamos\nem voz alta."
90100110-50 = "Medo de ser indelicado, de parecer\nestranho. Os motivos variam."
90100110-51 = "No fundo, expor o coração como ele é\nrende pouco―― e é justamente por isso"
90100110-52 = "que as pessoas mantêm relações de coração\nescondido…… sem nunca se compreenderem\npor completo.#nA maioria dos mal-entendidos nasce daí."
90100110-54 = "……Talvez o Lore seja um fenômeno nascido\ndessa \"falta de comunicação\"."
90100110-55 = "Aquilo que não virou palavra nem texto……#nsentimentos que transbordaram dos corações\ne mudaram de forma, virando mensagem."
90100110-58 = "Não consigo compreender."
90100110-59 = "Que mensagem haveria numa alucinação que\nconfunde as pessoas e rouba até\na fala delas?"
90100110-60 = "Essa resposta eu já ouvi da sua própria\nboca, capitã."
90100110-62 = "――Evitar atividades ao ar livre\nem dias quentes."
90100110-63 = "Só de existir, o \"Kunekune\" talvez já\nfosse um aviso suficiente."
90100110-65 = "……Tudo isso, por apenas isso."
90100110-66 = "Sim. Por apenas isso."
90100110-70 = "Capitã Yukino. Aqueles docinhos de que\nfalei…… ainda sobraram alguns.#nAceita um?"
90100110-71 = "Se você provar e pensar comigo\nnos ingredientes――"
90100110-76 = "talvez a gente passe a se entender\num pouquinho melhor."
90100110-79 = "Que calor……"
90100110-84 = "Por que a gente tem que esperar\naqui fora?"
90100110-85 = "Não podia ser dentro do prédio?"
90100110-86 = "Ah, é que――"
90100110-87 = "Oh. Corajosa, hein."
90100110-88 = "Quer dizer que dar de cara com as\nfuncionárias que a gente surrou\nnão é problema?"
90100110-89 = "Ugh…… isso seria ruim, mas……"
90100110-90 = "Tecnicamente estamos em condicional. Achei\nmelhor não arriscar nenhum escândalo."
90100110-91 = "Mesmo no calor, é aguentar\nsó mais um pouco."
90100110-92 = "Então vamos pelo menos pra sombra! Precisava\nesperar bem no meio da praça?"
90100110-93 = "Ou melhor: num café. Não pode esperar\ntomando algo gelado?"
90100110-94 = "Não pode. A carteira com o cartão de apoio\nà operação tá com a Yukino agora."
90100110-95 = "Por quê? Até hoje era a Niko que\ncuidava da carteira."
90100110-96 = "O relatório inclui a prestação de contas……\nEla disse que ia levar o cartão junto."
90100110-97 = "Ahh, então não tem jeito."
90100110-101 = "Que calor…… quero voltar logo pra Schale."
90100110-102 = "Falando assim, até parece que a Schale\né a sua casa~"
90100110-103 = "Ninguém tá ouvindo mesmo. Quem mais andaria\nna rua nesse calor――"
90100110-104 = "Ué? Vocês……"
90100110-105 = "Quêê?! N-Não é nada disso!#nEu quis dizer que quero IR pra Schale,\nnão que é minha casa nem――"
90100110-106 = "……Do que você tá falando?"
90100110-112 = "A menina do bico, quanto tempo."
90100110-113 = "Você é daquela vez……"
90100110-114 = "Aham. Erika, da Academia Gehenna.\nOlha a gente se encontrando de novo."
90100110-115 = "A-Ahaha…… pois é. Que coincidência."
90100110-116 = "Tá de bico hoje também?#nDa Academia Hyacinth até aqui\né um bom caminho."
90100110-117 = "S-Sim! Hoje eu vim com as amigas."
90100110-118 = "Er, sobre aquele dia……"
90100110-122 = "Me desculpa, eu menti.#nAté o MomoTalk que te passei\nera uma conta falsa……"
90100110-123 = "Ah, é verdade. Era mesmo.#nQuando cheguei em casa e fui olhar, apareceu\n\"conta inexistente\". Levei um susto."
90100110-124 = "E o tal \"HyperAde\" também não existia.#nContei pras minhas amigas e elas passaram\ndias gritando que eu tinha visto\num fantasma."
90100110-125 = "Mas, se não era fantasma…… que bom."
90100110-129 = "Me desculpa……"
90100110-130 = "Relaxa, relaxa. Não precisa se desculpar\ntanto."
90100110-131 = "Todo mundo tem o que esconder.#nNaquela hora, você só…… não queria\nser vista, né?"
90100110-132 = "……Você não tá brava?"
90100110-133 = "Por quê? Não saí no prejuízo. Foi até\numa experiência divertida."
90100110-134 = "\"Quem será que era aquela menina?\nPor que distribuía uma bebida que\nnão existe logo ali?\""
90100110-135 = "Soltando a imaginação assim, eu me diverti\nhorrores nessas semanas."
90100110-136 = "E você devia ter seus motivos. Não quero\nme irritar sem saber de nada."
90100110-137 = "Além do mais, como dizem: mentira\nsustentada até o fim vira verdade, né?"
90100110-142 = "Obrigada por entender."
90100110-143 = "Se quiserem, bora conversar naquele café\nali na frente?"
90100110-144 = "O ade especial de lá é bem gostoso."
90100110-145 = "É que…… a gente esqueceu\na carteira……"
90100110-146 = "Então hoje eu pago, que tal?"
90100110-150 = "Em troca…… quero que me respondam\numa única coisa, com sinceridade."
90100110-154 = "E-E agora? Ela parece que veio\ndescobrir quem a gente é."
90100110-155 = "……Soltamos fumaça e fugimos antes\nde o papo esticar? Tenho granada."
90100110-156 = "I-Isso não!"
90100110-161 = "――Aquele \"HyperAde\" que eu bebi.\nComo é que se faz?"
90100110-162 = "Eu queria dar pras minhas amigas provarem,\nmas não achei nenhuma bebida\ncom gosto parecido."
90100110-163 = "Ah, essa é fácil! Um comprimido de Vitamina\nBeluga, de farmácia, em 500ml de água e――"
90100110-164 = "Ei, Otogi! Não entrega a informação antes\nde ganhar o lanche!#nAté sentar na mesa de negociação,\nisso é segredo militar!"
90100110-165 = "Fufu, vocês são bem mais divertidas do que\neu imaginava. Vai valer a conversa."
90100110-166 = "Então bora. O sol tá forte hoje."
90100110-171 = "Sim, verdade."
90100110-173 = "……Ficar muito tempo na rua em dia quente\né perigoso."
