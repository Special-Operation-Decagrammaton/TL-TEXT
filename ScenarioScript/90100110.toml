[translation]
90100110-1 = "Episódio 11: Incompreensível"
90100110-2 = "Escritório Presidencial do Conselho Estudantil Geral"
90100110-4 = "Trago ventos amenos nos relatórios."
90100110-5 = "A ala médica informa que o esquadrão de vítimas abduzidas pelo tal 'Espantalho Branco' ―― o Kunekune ―― está despertando do coma."
90100110-6 = "A biologia atestou milagre, os quadros clínicos das civis estão estabilizados e limpos de sequelas anômalas."
90100110-7 = "Porém as cartilhas dos médicos estão cegas. O coma capotou e cedeu inexplicavelmente sem intervenção da seringa deles."
90100110-8 = "E as minhas deduções creditam esse milagre e essa cura repentina puramente à baioneta da SRT rasgando e fuzilando a abominação nas sombras."
90100110-13 = "Presidente, o seu ego e crachá absorvem essa patifaria paranormal e assinam embaixo de todo o inquérito cego que mandei?"
90100110-14 = "Sem ressalvas. A pena do relatório foi guiada pela sua patente, Sargento Yukino.#nAlém de carregar o selo de auditoria e carimbo absoluto do Sensei da Schale atestando a fumaça."
90100110-15 = "Sob esse guarda-chuva de testemunhas... a descrença não entra na minha mesa."
90100110-16 = "……Eu despejei a honestidade nas linhas. Mesmo cravando vitória balística no cimento, as matrizes da SRT não decifraram ou escanearam a identidade dessa praga que a gente fuzilou."
90100110-17 = "As tais Lores são anomalias abstratas mortas. Sem RG, sem origem e impossíveis de rastrear."
90100110-18 = "O nosso destacamento vomitou chumbo tático no escuro de forma cega... e a matemática e a sorte bateram no alvo, limpando o tabuleiro por milagre."
90100110-19 = "E apesar da cortina cega de dúvidas... civis abriram o olho e escaparam do túmulo. Isso encerra a missão."
90100110-23 = "Colher a carne e os resultados finais... não é o pote de ouro no fim do arco-íris."
90100110-27 = "……Eu não vomito descaso sobre o bem-estar e calçada limpa para os cidadãos do Estado."
90100110-28 = "Apenas contemplo a estatística de que o radar de Kivotos apita anomalias alienígenas no asfalto rotineiramente.#nEntretanto... catástrofes místicas com contagens de corpo físico tão massivas e agressivas rompem as margens há muito tempo."
90100110-29 = "Quando a rotina civil acorda e a plebe constata que o chão esconde variáveis letais, aleatórias e imbatíveis nas sombras... O terror domina o termostato deles.#nA fúria civil clama por caça às bruxas... buscam réus, exigem chumbo, exigem cabeças rolando para pagar o sangue, e assim――"
90100110-33 = "A mira e os canhões da histeria pública virarão o tambor e apontarão diretamente pras suas costas."
90100110-38 = "Capitã Yukino."
90100110-39 = "O seu radar cognitivo deduz o que o meu tabuleiro mental articula e engendra nesta exata fração do relógio?"
90100110-40 = "……As teses apontam que Vossa Graça julga minha blindagem paranóica uma histeria infundada e tola?"
90100110-41 = "Tiro nulo. Errou o escopo."
90100110-42 = "Nesta manhã prematura, a conselheira [ruby=Aoi]Ougi[/ruby] abandonou essas guloseimas na minha mesa de chá.#nO rótulo corporativo do doce, porém, era um fantasma cego pros meus olhos."
90100110-43 = "A doçura mimetizava algum cítrico quente da velha infância, e casava o matrimônio divino com a xícara do chá fumegante...#nContudo, o invólucro não registrava RG, código de barras ou pauta de fabricação com ingredientes."
90100110-44 = "E mesmo devorando a sua retórica marcial e tensa agora pouco, o meu núcleo gástrico e memória não parava de gritar pra tentar decifrar a alquimia morta que eu engoli antes."
90100110-45 = "Ufufu. Desculpe-me o ultraje de focar na barriga e dispersar do seu discurso bélico."
90100110-46 = "I-Invalide as escusas. Não há danos no nosso atrito de palavras."
90100110-47 = "As minhas engrenagens sequer apitaram a sua evasão visual... E o meu HD cerebral sofre apagões similares escorregando na fumaça no tédio."
90100110-48 = "Deixar o volante das matrizes analíticas cerebrais ser sequestrado e corrompido por migalhas irrelevantes sem cotação.#nO paradoxo desse erro tolo... é comum na rotina da carne orgânica fraca."
90100110-49 = "A ironia, no entanto, é que vomitar essa confissão de distração fútil e escancarar a falha em campo aberto beira o impossível."
90100110-50 = "Romper o ego acusa desonra e fraqueza para quem escuta, ou escracha um atestado de instabilidade psicótica do próprio cérebro na roda. A parede de escusas fúteis impede a abertura."
90100110-51 = "Além de que sangrar a armadura, confessar pânico e escancarar a nudez do medo orgânico nunca pagou retorno lucrativo de confiança dos deuses――"
90100110-52 = "As cadeias orgânicas trancam o portão e as alianças rastejam numa dança mascarada cega... E o elo atômico de compreensão que une civis fracassa.#nE a semente e raiz de toda epidemia cega e conflito mortal do estado reside aí."
90100110-54 = "……A cartilha antropológica me dita que a anomalia 'Lore' não brotou como demônio cego... Mas sim, como subproduto atômico desse exato 'Abismo e silêncio das Fofocas'."
90100110-55 = "A fumaça cega de recados oprimidos, confissões nunca atiradas na folha...#nA repressão mística vazando das vielas, e as almas mudas se amontoando no teto do além e corrompendo as sombras sob forma de maldição atômica para cobrar comunicação do mundo."
90100110-58 = "Bússola cega. Rejeito as teses psicológicas."
90100110-59 = "Um fantasma doentio que amaldiçoa neurônios, derrete a sanidade e decepa cordas vocais de meninas e rouba o direito cívico delas falarem. Que raio de mensagem e comunicação essa desgraça dita em paz com fofocas?"
90100110-60 = "Você atirou e desvendou essa mesma charada com a sua própria cartilha na minha mesa há pouco, sargento."
90100110-62 = "――Se a radiação fritar no céu, aborte as rondas e se esconda da via no sol escaldante."
90100110-63 = "O fantasma 'Kunekune' em sua forma profana... exalava essa placa cívica e atestado médico fúnebre encarnado no meio do asfalto, não acha?"
90100110-65 = "……E a aberração macabra engoliu sangue alheio e arruinou fardas e civis puramente pra latir um conselho barato de babá térmica?"
90100110-66 = "Afirmativo. Uma carnificina letal inteira apenas para chancelar o conselho civil mais básico da rua."
90100110-70 = "Sargento Yukino. A guarnição atesta que o lote daquelas guloseimas alienígenas sem RG permanece intocado nos potes.#nAvaliza e engole um doce no seu bico pra forrarmos o estômago juntas?"
90100110-71 = "Mergulhe o paladar nisso, foca os olhos na química desse pó comigo, e dessa forma――"
90100110-76 = "A nossa guerra mística e a fogueira de desentendimentos e culpas passadas pode desatar os laços mais fáceis a partir disso."
90100110-79 = "Tá derretendo tudo..."
90100110-84 = "As lógicas federais apitam: qual a desgraça bélica de forçar marchar nos tijolos cozidos da praça se a exfiltração rolou há horas?!"
90100110-85 = "Puxar a sombra de qualquer barracão fedorento ali dentro não corta a pena, não?"
90100110-86 = "Ah, o escopo tático cimentou――"
90100110-87 = "As raposas afiaram os dentes. Heroísmo suicida ou loucura?"
90100110-88 = "As patentes apitaram radar da vala esquecida: a gente arrombou porta de conselheiras em motim civil tempos atrás. Cruzar com a coroa das vítimas das suas coronhadas não esquenta o faro da prisão?"
90100110-89 = "Uuugh... O engarrafamento político e a foice das correntes da vingança assusta..."
90100110-90 = "A papelada do indulto reza Liberdade Condicional provisória. Estourar granada cívica em briga de calçada hoje manda nossa placa e alforria de volta pra penitenciária num estalo."
90100110-91 = "O calor amaldiçoado arde, mas o cimento pede paciência tática até ela descer."
90100110-92 = "As diretrizes falham! Exijo marchar pra alguma Marquise. Bater continência no centro de praça sem escudo ou refúgio solar excede punição carcerária!"
90100110-93 = "Eu topo o apelo de bater retiro militar tático no Cafezinho da esquina e resfriar a cabeça. Beber caloria gelada do ar condicionado e esperar, topam?"
90100110-94 = "Cartilha barrada. O HD bancário corporativo e o cartão dourado da Schale dormem intocáveis nos fundos dos bolsos da farda da capitã Yukino, que tá na torre lá."
90100110-95 = "Falha estrutural? As engrenagens da Tesouraria e finanças ficavam grudadas nos canos da sua saia antigamente, Niko. Desde quando?"
90100110-96 = "O rito ditava que o Relatório Pós-Ação exigia despejo e cruzamento das notas fiscais na mesa pra liberar fundo. O Cartão teve que pegar o elevador pra torre da Schale com ela."
90100110-97 = "Ah, luto logístico... Abortem missões luxuriosas então."
90100110-101 = "O inferno queima... Manda a cavalaria abrir fuga logo e me chuta de volta pro geladinho dos colchões da Schale..."
90100110-102 = "O rádio escutou a paixão, e o laudo dita: os porões do Sensei já engataram morada na sua bússola afetiva, raposinha?"
90100110-103 = "Nenhuma fofoqueira orgânica tem saco pra espiar murmúrio paramilitar derretendo sob 40 graus na viela, calma que ninguém――"
90100110-104 = "Opa? Ei... As golas de marinheiro... são vocês!"
90100110-105 = "Eekh?! N-Negação balística total!#nA fita cravou a declaração puramente no sentido logístico paramilitar!! A Schale é só base avançada fria e eu não moro nem sinto tesão nos porões fofos do Sense――"
90100110-106 = "……A cartilha de que diabos de assunto sujo rola agora?"
90100110-112 = "As miragens sumiram. As operárias das 'bebidas exóticas' de novo na calçada."
90100110-113 = "Oh, o alvo cívico... de antes."
90100110-114 = "No osso. Eu lembro, eu sou a Erika de Gehenna. O universo engarrafa trombadas nas vielas de novo."
90100110-115 = "A-Ahaha... E não é? As engrenagens místicas da ironia e coincidências do destino são afiadas."
90100110-116 = "Vocês ainda rodam na jornada comercial suada do asfalto hoje?#nAs bússolas dizem que os corredores do subúrbio e dos muros lá da Escola Hyacinth comem quilometragem demais daqui."
90100110-117 = "E-Escusa balística aprovada! Na real, as mochilas tão fechadas e hoje minha equipe tá vagando no tédio civil entre amigas, hehe..."
90100110-118 = "Aproveitando a retaguarda... Aqueles laudos fúnebres de ontem..."
90100110-122 = "Imploro escusas na poça. O meu HD militar vomitou farsa suja na sua cara.#nA fofoca do ID efêmero do MomoTalk... era chave criptografada de fantasma cego pra esconder meu IP na pista."
90100110-123 = "Ah, a malha de mentiras explodiu rápido. Eu já tinha lido.#nO radar puxou notificação de erro batendo o martelo de 'ID Extinto' no sistema logo no meu quarto e o susto cimentou tudo."
90100110-124 = "Sem mencionar o golpe cívico na cara: a bula exótica de química divina do 'Hyper-Ade' sumiu e as gôndolas confirmaram falácia capitalista. A droga não existe em registro nenhum!#nMeus esquadrões riram na rua jurando que meu cérebro pirou com fantasmas na calçada e me botaram pra louca."
90100110-125 = "Ainda assim... se não era assombração letal cega do além... ufa, eu fujo limpa do hospital."
90100110-129 = "Ajoelho nas escusas imundas... A farsa e o teatro foram--"
90100110-130 = "Trave as sirenes e cancele o choro. Eu não suguei rancor ou atirei processos na farsa cega."
90100110-131 = "Todos amarram podridões mortais ocultas debaixo dos lençóis em casa, relaxa o lombo.#nA cartilha na viela era que a sua farda precisava de fuga tática ou ocultamento por pura sobrevivência da polícia, ikke?"
90100110-132 = "……As fúrias nojentas da traição e de tomar chumbo de farsa no olho... não corroem o seu estômago e cobram sangue de nós?"
90100110-133 = "Bússola cega. Não rasguei saldo bancário ou carne na viela. E engolir ficção lúdica e ser encurralada nessa trama mágica no sol cimentou o tédio nas costas da diversão pura."
90100110-134 = "Eu queimo tutano à toa... Refletindo e focando... se as silhuetas lá eram falsas na praça, quem diabos vocês são e qual facção paramilitar ou cartel vocês escondiam debaixo daquilo?#E por qual rito atômico insano... vocês engarrafaram drogas elétricas falsas atirando química cega pros corredores no meio do asfalto quente...?"
90100110-135 = "Essa novela insana me alugou alucinações táticas. As semanas mortas de treino derreteram num filme de terror e mistério no asfalto e foi genial, foda demais."
90100110-136 = "Isolando os delírios, engrenagens secretas e correntes ocultas sempre puxam o volante pros acidentes da galera. Atirar pedrada e fúria atoa em farsa alheia é lixo tóxico mental inútil."
90100110-137 = "O jargão da praça atesta e assina que 'Ficção contada com suor blindado vira as pautas e laudos do universo até cimentar a realidade', né? A magia rolou limpa!"
90100110-142 = "A empatia militar e orgânica alheia limpa as cicatrizes. Agradecimentos absolutos."
90100110-143 = "A roda gira limpa! Se as mochilas fecharam... eu intimo vocês pro Cafezinho chique da ladeira. O balcão chama."
90100110-144 = "Eles batem líquidos químicos lá e montam um Suco Especial de fruta cítrica cego com química de xarope grosso genial."
90100110-145 = "A-As travas balísticas da pobreza apitaram de novo... O cartão blindado sumiu na torre e a farda não tem troco de bala."
90100110-146 = "A cornucópia e luxúria brilha aqui! Meu bolso absorve a vala financeira, bebida na minha aba!"
90100110-150 = "A fita cívica dita ressalvas fofoqueiras fúteis de pagamento.#nDesembuchem um HD de resposta blindada atômica que me ferveu pro meu arquivo de mistérios, ok?"
90100110-154 = "Aleta Vermelho, cerco e engarrafamento cívico na linha! A inteligência cega quer devorar o dossiê da farsa tática no rádio, qual o trâmite na emboscada civil?!"
90100110-155 = "……Rompe alicerces balísticos antes da polícia e a roda atestar terror! Tenho Granadas de Fumaça branca cega nas pregas da saia prontas pro recuo tático de fuga das sombras!!"
90100110-156 = "N-Negação bélica assassina! Cancele os mísseis!"
90100110-161 = "――A fita do 'Hyper-Ade'. Aquela droga engarrafada divina alienígena.#nQual a ciência atômica militar que cimentou a síntese e cozinhou a alquimia daquilo nos tubos?"
90100110-162 = "A patrulha de atletismo devorou pautas provando águas em pó das estantes mas o caldeirão fantasma com aquele tesão atômico na goela tá imaculado e intocável, socorre as aliadas sedentas aqui!"
90100110-163 = "O laboratório chuta na simplicidade: A matriz do soro clama Vitamina do mercadinho cívico Beluga pastilhada atômica com 500ml de suor d'águ――"
90100110-164 = "Fogo cruzado, Otogi!! Deleta os dados do pó da bebida e vira a mesa cega!#nOs cartuchos valem bebidas na conta, se você atirar os códigos confidenciais e manuais SRT puros de nutrição secreta naval pros pátios civis atoa, é traição diplomática do nosso lixo na trincheira fútil!!"
90100110-165 = "Ufufu, o circo é farto. Vocês vestem amarras, patifarias de conspirações com correntes e paranóia foda demais pra calouros de escola. Escavar esse esgoto de HD cego me dá ânimo!"
90100110-166 = "Avante, marcha na esteira do balcão! O sol e a radiação hoje derretem ossos na fornalha."
90100110-171 = "……Engrenagem cívica cravada e copiada."
90100110-173 = "……Devorar e respirar o inferno fúnebre dessas praças por excessos longos atesta risco e assombração orgânica da insolação morta afinal de contas, né."