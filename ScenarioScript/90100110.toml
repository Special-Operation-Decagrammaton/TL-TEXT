[translation]#[Texto revisado.] Em aguardo de revisão de formatação de texto. - Filipe 13/06.
90100110-1 = "Episódio 11: O Incompreensível"
90100110-2 = "Gabinete da Presidente do Conselho Estudantil"
90100110-4 = "Boas notícias."
90100110-5 = "As vítimas do \"Espantalho Branco\" – o Kunekune – estão acordando."
90100110-6 = "Os médicos dizem que não há sequelas."
90100110-7 = "As melhoras foram repentinas, quase inexplicáveis."
90100110-8 = "Acredito que foi graças à missão de vocês."
90100110-13 = "Presidente, a senhora confia em todo o nosso relatório?"
90100110-14 = "Claro. Foi escrito pela capitã Yukino, não foi?#nE tem o aval do Sensei da Schale."
90100110-15 = "Não tenho motivos para duvidar."
90100110-16 = "……Fui honesta no relatório. Mesmo com a vitória, não sabemos a real identidade do inimigo."
90100110-17 = "As Lores são abstratas. Sem rosto, sem origem."
90100110-18 = "Atiramos no escuro e acertamos por sorte."
90100110-19 = "Mas o resultado é que civis foram salvos."
90100110-23 = "Os resultados não são o mais importante..."
90100110-27 = "……Não estou desprezando a segurança dos cidadãos."
90100110-28 = "Só estou dizendo que Kivotos já viu anomalias, mas nunca com tantas vítimas.#nE se as pessoas perceberem que há ameaças imprevisíveis..."
90100110-29 = "O medo toma conta. Caçam culpados, exigem cabeças... e――"
90100110-33 = "A fúria popular pode se voltar contra a senhora."
90100110-38 = "Capitã Yukino."
90100110-39 = "Sabe o que eu estava pensando agora?"
90100110-40 = "……A senhora acha que minha preocupação é infundada?"
90100110-41 = "Errou."
90100110-42 = "A conselheira Aoi deixou uns doces na minha mesa. Mas eu não conhecia a marca."
90100110-43 = "Eram doces cítricos com gosto de infância, combinavam bem com o chá... mas não tinham embalagem nem ingredientes."
90100110-44 = "Enquanto conversávamos, fiquei pensando sobre a origem daquele doce."
90100110-45 = "Fufu, desculpe a distração."
90100110-46 = "N-Não tem problema."
90100110-47 = "Nem percebi. Aliás, isso acontece comigo às vezes também. Ficar pensando em bobagens no meio da conversa."
90100110-48 = "É algo comum."
90100110-49 = "Mas poucos admitem isso abertamente."
90100110-50 = "Por medo de ofender ou de parecer estranho."
90100110-51 = "Além disso, expor fraquezas raramente traz vantagens――"
90100110-52 = "Assim, as pessoas escondem seus sentimentos e os mal-entendidos se acumulam.#nE a raiz dos conflitos está aí."
90100110-54 = "……As Lores podem ter nascido dessa falta de comunicação."
90100110-55 = "Sentimentos que não foram ditos, que não viraram palavras...#nE que se materializaram como maldições para cobrar essa comunicação."
90100110-58 = "Não entendo."
90100110-59 = "Que mensagem positiva pode haver numa assombração que enlouquece e silencia as pessoas?"
90100110-60 = "A resposta a senhora já deu há pouco."
90100110-62 = "――Em dias quentes, evite atividades ao ar livre."
90100110-63 = "O Kunekune, por sua simples existência, já era um aviso, não acha?"
90100110-65 = "……Só por causa disso..."
90100110-66 = "Só por causa disso."
90100110-70 = "Capitã Yukino. Ainda restam doces daquele lote.#nQue tal provar um comigo?"
90100110-71 = "Comer e tentar adivinhar os ingredientes..."
90100110-76 = "Talvez possamos nos entender melhor."
90100110-79 = "Estou derretendo..."
90100110-84 = "Por que a gente tem que esperar aqui fora? Que inferno."
90100110-85 = "Não dava para esperar dentro de algum lugar?"
90100110-86 = "Ah, isso é――"
90100110-87 = "Nossa, que ousadia. Enfrentar os desafetos na cara?"
90100110-88 = "Lembra daquela conselheira que a gente agrediu? Vai ser legal encontrá-la?"
90100110-89 = "Ugh... isso seria tenso."
90100110-90 = "Estamos em liberdade condicional. Não podemos arrumar confusão."
90100110-91 = "Vamos aguentar o calor mais um pouco."
90100110-92 = "Então pelo menos fiquemos na sombra. No meio da praça é dose."
90100110-93 = "Que tal um café? Tomar algo gelado enquanto esperamos."
90100110-94 = "Não dá. O cartão da Schale está com a Yukino, lá no escritório."
90100110-95 = "Por que? Antes era a Niko que ficava com o dinheiro."
90100110-96 = "Os relatórios incluem os gastos, então ela levou o cartão junto."
90100110-97 = "Ah, certo."
90100110-101 = "Calor... quero voltar logo para a Schale."
90100110-102 = "Pois é, já está tratando a Schale como lar, hein, raposinha~"
90100110-103 = "Ninguém está ouvindo mesmo. Nessa temperatura――"
90100110-104 = "Opa? Ei, são vocês!"
90100110-105 = "Eek?! N-Não é o que você pensa!#nA Schale é só base de operações, não é casa nem nada――"
90100110-106 = "……Do que estão falando?"
90100110-112 = "As moças das bebidas exóticas de novo."
90100110-113 = "Ah, a vendedora de antes..."
90100110-114 = "Sou eu, a Erika, de Gehenna. O destino nos uniu de novo."
90100110-115 = "A-Ahaha... é mesmo."
90100110-116 = "Ainda estão trabalhando por aqui?#nÉ longe da Academia Hyacinth, não?"
90100110-117 = "Hoje estou de folga, vim com amigas."
90100110-118 = "Sobre aquele dia..."
90100110-122 = "Desculpa, eu menti. A conta do MomoTalk que te passei era falsa."
90100110-123 = "Ah, eu já descobri. Quando fui ver, não existia."
90100110-124 = "E o Hyper-Ade também era fake. Minhas amigas riram de mim, disseram que vi fantasma."
90100110-125 = "Mas se não era fantasma... ufa, ainda bem."
90100110-129 = "Foi mal..."
90100110-130 = "Relaxa. Não esquenta."
90100110-131 = "Todo mundo tem seus segredos.#nVocê não queria ser reconhecida naquele lugar, né?"
90100110-132 = "……Não está com raiva?"
90100110-133 = "De quê? Não perdi nada. Foi até divertido."
90100110-134 = "Fiquei semanas imaginando quem eram vocês. O que estavam fazendo distribuindo uma bebida falsa no meio do asfalto."
90100110-135 = "Foi um bom entretenimento."
90100110-136 = "Além do mais, vocês devem ter seus motivos."
90100110-137 = "Como dizem, \"uma mentira repetida muitas vezes se torna verdade\"."
90100110-142 = "Obrigada por entender."
90100110-143 = "Que tal um café ali na frente? Por minha conta."
90100110-144 = "Eles fazem um suco especial de frutas muito bom."
90100110-145 = "A-As problemas... esquecemos a carteira..."
90100110-146 = "Deixa comigo. Pago para todas."
90100110-150 = "Em troca, quero uma resposta sincera."
90100110-154 = "Eita, ela quer saber quem somos. E agora?"
90100110-155 = "Foguetes de fumaça e vazar?"
90100110-156 = "NEM PENSAR!"
90100110-161 = "――Aquele Hyper-Ade. Como vocês faziam aquilo?"
90100110-162 = "Eu queria dar para as minhas amigas, mas não achei nada parecido no mercado."
90100110-163 = "Ah, isso é fácil! Um comprimido de vitamina Beluga em 500ml de água e――"
90100110-164 = "OTOGI, CALA A BOCA! NÃO DÁ OS SEGREDOS DE GRAÇA!#nNegociação primeiro!"
90100110-165 = "Fufu, vocês são muito divertidas. Vale a pena conversar."
90100110-166 = "Então vamos. O sol está forte."
90100110-171 = "……Combinado."
90100110-173 = "……Ficar muito tempo no sol é perigoso, afinal."