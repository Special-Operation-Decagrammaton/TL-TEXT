[translation]
90000105-2 = "Eles escaparam... A operação foi um fracasso?"
90000105-3 = "Não. Embora tenhamos deixado escapar, eles devem ter sofrido danos."
90000105-4 = "Mesmo que não levem 12 horas, presume-se que levará um tempo considerável para os reparos."
90000105-5 = "Então, vamos para a 'Área de Pesquisa' como planejado?"
90000105-6 = "Sim. Provavelmente temos cerca de 8 horas até que Keter retorne. #nNesse meio tempo, vamos nos infiltrar e encontrar o 'Sinal de Decagrammaton' que deve estar lá dentro."
90000105-7 = "Entendido. Parece que vamos virar a noite hoje."
90000105-8 = "Bem, isso é algo comum."
90000105-9 = "Então, vamos nessa."
90000105-12 = "Área de Pesquisa"
90000105-16 = "……Chefe, chegamos."
90000105-21 = "Não vejo nenhum elemento particularmente perigoso. Pelo que parece, parece uma ruína comum, mas..."
90000105-22 = "……Está mais silencioso do que eu pensava."
90000105-23 = "De acordo com a análise, deveria estar submerso."
90000105-24 = "Não parece ser o caso, mas...?"
90000105-25 = "Pois é, está completamente seco. #n\r\nSerá que alguém realizou uma grande obra e drenou a água...?"
90000105-26 = "……Entendo. A cerca de 10 km daqui, foi construída uma barragem gigantesca."
90000105-27 = "……Foi o Decagrammaton?"
90000105-28 = "Ou talvez um de seus profetas."
90000105-29 = "Mas, olhando bem, existem vestígios. Tem até musgo crescendo..."
90000105-30 = "Eimi, você poderia voltar por um momento? #nEu também gostaria de verificar isso com meus próprios olhos."
90000105-31 = "A chefe também vai vir aqui pessoalmente?"
90000105-32 = "Sim. Vou terminar de me preparar para sair enquanto você volta."
90000105-37 = "……Foi o que ela disse. Vamos voltar por enquanto."
90000105-38 = "Ainda vai levar um tempo até que os reparos de Keter terminem, então provavelmente ficaremos bem."
90000105-40 = "Próximo episódio: Decagrammaton"
