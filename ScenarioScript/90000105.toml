[translation]
90000105-2 = "逃げられた……作戦失敗？"
90000105-3 = "いえ。逃がしてしまったとはいえ、ダメージは負っているはず。"
90000105-4 = "12時間とは言わずとも、修復にはそれなりの時間がかかることが推察されます。"
90000105-5 = "じゃあ、予定通り「研究地区」に？"
90000105-6 = "はい。おそらくケテルが戻ってくるまで約8時間。#nその間に侵入し、中にあるはずの「デカグラマトンの信号」を見つけ出します。"
90000105-7 = "分かった。今日は徹夜になりそうだね。"
90000105-8 = "まあ、よくあることです。"
90000105-9 = "それでは、参りましょうか。"
90000105-12 = "研究地区"
90000105-16 = "……部長、着いたよ。"
90000105-21 = "特に危険な要素は見当たらない。見た感じ、普通の廃墟に見えるけど……。"
90000105-22 = "……思ったより静かですね。"
90000105-23 = "分析によると、水没しているとのことだったのですが。"
90000105-24 = "そんな感じには見えないけど……？"
90000105-25 = "そうですね、乾ききっています。#n\r\n何者かによって大きな工事が為され、水が抜き取られた……？"
90000105-26 = "……なるほど。およそ10kmほど離れたところに、巨大なダムが作られています。"
90000105-27 = "……デカグラマトンが？"
90000105-28 = "或いは、その預言者かもしれませんが。"
90000105-29 = "でもたしかに、よく見ると痕跡はある。苔とか生えてるし……。"
90000105-30 = "エイミ、一度戻ってきていただけますか？#n私もこの目で実際に確認しておきたいので。"
90000105-31 = "部長もここに、実際来るってこと？"
90000105-32 = "はい。エイミが戻ってくるまでに、お出かけの準備は済ませておきますので。"
90000105-37 = "……だってさ。一旦戻ろっか。"
90000105-38 = "ケテルの修復が終わるまではまだ時間がかかるだろうし、多分大丈夫。"
90000105-40 = "次回;デカグラマトン"
