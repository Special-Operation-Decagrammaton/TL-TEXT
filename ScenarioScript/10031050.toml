[translation]
10031050-1 = "第5話;議長の広報戦略"
10031050-2 = "（パーティー準備3日目、万魔殿を訪れた）"
10031050-3 = "[ns] \"廊下までパーティー仕様になってるんだね。\""
10031050-4 = "（本番が近づくにつれて華やかになっていく廊下を歩いていると……）"
10031050-9 = "ん？"
10031050-10 = "わぁっ！先生じゃん～！はろはろ～"
10031050-11 = "[s] \"あ、エリカ、キララ……は、はろはろ～\""
10031050-12 = "学校の廊下で先生と会えるなんてね～ビックリしちゃったよ。"
10031050-13 = "こんな偶然あるんだね。"
10031050-14 = "分かる～サプライズみたいな？"
10031050-15 = "あははっ、今日は運が良さそ！"
10031050-16 = "[s] \"う、運が良さそうって……どうして？\""
10031050-17 = "あ～キララちゃんが言いたいことって……"
10031050-18 = "四つ葉のクローバーをたまたま見つけてラッキーって感じ……みたいな？"
10031050-19 = "あははっ！それそれ～そんな感じ～！"
10031050-20 = "[s] \"よく分からないけど……そう思ってもらえて嬉しいよ。\""
10031050-21 = "それで、どうして先生はゲヘナに来てるの？"
10031050-22 = "……あ～、ゲヘナのパーティー準備で来たんだ。"
10031050-23 = "それじゃ、忙しそうだね。"
10031050-24 = "えっ、マジ～？先生ってパーティーの準備も手伝うもんなんだ～"
10031050-25 = "あっ、じゃあさじゃあさ、もしかしてアレも先生のアイデアなの？"
10031050-26 = "さすがにアレは違うんじゃない？"
10031050-27 = "でも～ありえなくはないじゃん？"
10031050-28 = "[s] \"アレって……？\""
10031050-29 = "それがさ、気づいたらいろんなとこに変な像が置かれてんの。"
10031050-30 = "でさ～しかもめっちゃ面白いの！あんなん見たら笑っちゃうって。#nゲヘナの生徒の間で話題になってるし、ウケるよね。"
10031050-31 = "あははっ！私たちもアレをSNSにアップしたら、「いいね」たくさんもらえると思って探してるとこ！"
10031050-32 = "[s] \"……？？？\""
10031050-33 = "あ～言葉だけじゃ分かりにくいよね。"
10031050-34 = "私が見せたげる！これこれ～！"
10031050-41 = "[ns] \"……これは。\""
10031050-42 = "ね？ウケるでしょ？"
10031050-43 = "先生も手伝ってるみたいだし、なんか今回のパーティーは気合い入ってるっぽいから、面白くなりそうじゃん。"
10031050-44 = "それじゃ、パーティー楽しみにしてるね～せんせ！"
10031050-46 = "[ns] \"う、うん……応援、ありがとう。\""
10031050-48 = "（そうしてエリカとキララと別れてから、万魔殿の執務室に向かった）"
10031050-54 = "クククッ……歓迎する、[USERNAME]先生。"
10031050-55 = "[s] \"ありがとう、マコト。忙しいと思うけど、体調は大丈夫？\""
10031050-56 = "ん？"
10031050-57 = "ああ、それなら大丈夫だ。"
10031050-58 = "昨日は途中から記憶を失くしてしまったが……"
10031050-59 = "生きていればよくあることだからな、気にする必要は無い。"
10031050-60 = "[s] \"よくあることなの！？\""
10031050-61 = "うむ。まあ過去は気にしないとして、大事なのは未来だ。"
10031050-62 = "今日も先生と一緒にパーティーの準備を励むとしよう。"
10031050-63 = "[s3] \"あ、パーティに関して気になることが……\"\n[s4] \"実は、ここに来る途中で変な物を見たというか……\""
10031050-66 = "学園の廊下に変な像があるだと……？"
10031050-67 = "ううむ……我々が準備にかかりきりの間に、誰かが勝手に設置したのかもしれん。"
10031050-68 = "後で撤去するように命じておこう。"
10031050-69 = "それより、今日は先生に見せたい物があってな。"
10031050-70 = "この私が今回のパーティーで最も力を入れていた、あるモノが完成したのだ。"
10031050-71 = "何を隠そう、そのためにわざわざ先生を呼んだのだから、期待していてくれ。"
10031050-72 = "[s] \"今度は何を作ったの……？\""
10031050-73 = "キキキッ……これだ！"
10031050-79 = "[ns] \"さっきキララが見せてくれた変な像だ！\""
10031050-80 = "なにっ！？失礼な！"
10031050-81 = "どこが変なのだ、先生よ！"
10031050-82 = "今回のパーティーのためにオーダーメイドした、この[ruby=はぬま]羽沼[/ruby]マコト様の知的で勇敢な姿を大胆に表現した像だというのに……！"
10031050-83 = "どこからどう見ても、堂々とした素晴らしい仕上がりじゃないか！"
10031050-84 = "[s] \"完全にノリと勢いで作ったよね！？\""
10031050-88 = "[ns] \"たくさん作ったみたいだけど、なにか目的があったり……？\""
10031050-89 = "言うまでもないと思ったが……"
10031050-90 = "もちろん、今回のパーティーの広報用だ！"
10031050-95 = "このパーティーは、マコト様が全力で準備してきたイベントだからな。#nせっかくなら、人を多く集めたい。"
10031050-96 = "そこでゲヘナ全域に、この私の像を配置することで……"
10031050-97 = "この羽沼マコト様の威厳を……いや、それだけでなく万魔殿の偉大さをゲヘナの全生徒に広く知らしめるのだ！キキキッ！！！"
10031050-98 = "すでにSNSでは反響を呼んでいる！これを見ろ！"
10031050-103 = "＜キラキラうるるん☆：あはは！見てこれ！すご～！めっちゃウケるんだけど！＞"
10031050-104 = "＜GehEricha0201：なんか通行の邪魔になるくらい置かれてるんだけど、本当にいいの？＞"
10031050-105 = "＜akusi-girl：さっき不良たちがいっぱい運び出してたわね＞"
10031050-106 = "＜#Nyanko&：マジでダサい＞"
10031050-108 = "[ns5] \"反響なのかな……？\"\n[ns6] \"たくさん作ったなら、費用もそれなりだと思うんだけど……\""
10031050-111 = "いいや、先生。"
10031050-112 = "費用なら全く気にする必要は無い。#nなぜなら……"
10031050-113 = "像の制作費はもちろん、各地に配置するためにかかった費用も、全て風紀委員会名義の契約になっているからだ！"
10031050-114 = "[s] \"……う、うん？\""
10031050-115 = "そして、風紀委員会の予算は我々万魔殿が決定している！"
10031050-116 = "風紀委員会の予算を使ってパーティーを開き、奴らの懐に打撃を与えつつパーティーの宣伝まで行なったのだ！キキキッ！"
10031050-117 = "まさに一石二鳥とはこのこと！"
10031050-118 = "あまりにも素晴らしい天才的な計画に笑いが止まらない！"
10031050-119 = "ククッ……クククッ！キキキキキッ！！！"
10031050-120 = "[s] \"風紀委員会は、この事実を知らないんだよね……？\""
10031050-121 = "ああ、もちろんだ！もし知ったら、どんな顔をするだろうな！"
10031050-122 = "いつもなら風紀委員長が邪魔してくるが、今回はマコト様の策略によって……"
10031050-123 = "ピアノの練習に気を取られているだろうからな！"
10031050-124 = "その隙を狙った完璧な作戦！"
10031050-126 = "ああ！自分の才能が恐ろしい！"
