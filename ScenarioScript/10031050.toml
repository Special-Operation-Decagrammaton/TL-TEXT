[translation]
10031050-1 = "Episódio 5: A estratégia de relações públicas da presidente"
10031050-2 = "（3º dia de preparação para a festa, visitando o Pandemônio）"
10031050-3 = "[ns] \"Até o corredor está com decoração de festa, hein.\""
10031050-4 = "（Enquanto caminho pelo corredor que fica mais chamativo conforme o evento se aproxima...）"
10031050-9 = "Hm?"
10031050-10 = "Uau! É o Sensei! Alo alo~"
10031050-11 = "[s] \"Ah, Erika, Kirara... a-alo alo~\""
10031050-12 = "Quem diria que encontraríamos o Sensei no corredor da escola~ Que surpresa."
10031050-13 = "Que coincidência, né?"
10031050-14 = "Concordo~ Tipo uma surpresa?"
10031050-15 = "Ahaha, hoje parece que estamos com sorte!"
10031050-16 = "[s] \"S-sorte... por que diz isso?\""
10031050-17 = "Ah~ O que a Kirara-chan quer dizer é..."
10031050-18 = "Tipo, encontrar um trevo de quatro folhas por acaso e se sentir sortuda... sabe?"
10031050-19 = "Ahaha! Isso mesmo~ É bem por aí~!"
10031050-20 = "[s] \"Não entendi muito bem, mas... fico feliz que pensem assim.\""
10031050-21 = "Então, por que o Sensei está em Gehenna?"
10031050-22 = "...Ah, vim por causa dos preparativos da festa de Gehenna."
10031050-23 = "Nossa, então você deve estar ocupado."
10031050-24 = "Ué, sério? O Sensei ajuda até com os preparativos da festa~"
10031050-25 = "Ah, então, então, será que aquilo também foi ideia do Sensei?"
10031050-26 = "Será que foi mesmo?"
10031050-27 = "Mas~ não é impossível, né?"
10031050-28 = "[s] \"Aquilo... o quê?\""
10031050-29 = "É que, do nada, começaram a aparecer umas estátuas estranhas por vários lugares."
10031050-30 = "E olha~ são muito engraçadas! Não tem como não rir vendo aquilo. #nVirou assunto entre as alunas de Gehenna, é hilário."
10031050-31 = "Ahaha! Nós estamos procurando por elas para postar nas redes sociais, achamos que vamos ganhar muitas curtidas!"
10031050-32 = "[s] \"...???\""
10031050-33 = "Ah~ é difícil explicar só com palavras."
10031050-34 = "Eu te mostro! Olha só isso~!"
10031050-41 = "[ns] \"...Isso é.\""
10031050-42 = "Viu? É engraçado, né?"
10031050-43 = "Já que o Sensei parece estar ajudando, e a festa parece estar sendo levada a sério, vai ser bem divertido."
10031050-44 = "Bom, então estamos ansiosas pela festa~ Sensei!"
10031050-46 = "[ns] \"S-sim... obrigado pelo apoio.\""
10031050-48 = "（Depois de me despedir de Erika e Kirara, fui em direção à sala do conselho do Pandemônio）"
10031050-54 = "Kukuku... Seja bem-vindo, Sensei [USERNAME]."
10031050-55 = "[s] \"Obrigado, Makoto. Sei que está ocupada, mas está se sentindo bem?\""
10031050-56 = "Hm?"
10031050-57 = "Ah, quanto a isso, estou bem."
10031050-58 = "Ontem eu perdi a memória no meio do caminho, mas..."
10031050-59 = "É algo que acontece com frequência quando se está vivo, não precisa se preocupar."
10031050-60 = "[s] \"Acontece com frequência!?\""
10031050-61 = "Sim. Bem, não vamos nos preocupar com o passado, o que importa é o futuro."
10031050-62 = "Vamos nos dedicar aos preparativos da festa com o Sensei hoje também."
10031050-63 = "[s3] \"Ah, tem uma coisa sobre a festa que me preocupa...\"\n[s4] \"Na verdade, vi algo estranho no caminho para cá...\""
10031050-66 = "Tem estátuas estranhas nos corredores da escola...?"
10031050-67 = "Hum... talvez alguém tenha instalado por conta própria enquanto estávamos ocupados com os preparativos."
10031050-68 = "Vou ordenar que removam mais tarde."
10031050-69 = "Mas antes, hoje eu tenho algo para mostrar ao Sensei."
10031050-70 = "Finalmente, algo em que eu coloquei todo o meu esforço para esta festa está completo."
10031050-71 = "Não há por que esconder, chamei você aqui justamente por causa disso, então pode criar expectativas."
10031050-72 = "[s] \"O que você fez dessa vez...?\""
10031050-73 = "Kikiki... É isto!"
10031050-79 = "[ns] \"É aquela estátua estranha que a Kirara mostrou agora pouco!\""
10031050-80 = "O quê!? Que falta de educação!"
10031050-81 = "O que há de estranho nela, Sensei!"
10031050-82 = "Esta é uma estátua feita sob medida para a festa, que expressa de forma ousada a figura inteligente e corajosa de Makoto Hanuma...!"
10031050-83 = "Olhe de onde olhar, não é um trabalho magnífico e imponente?!"
10031050-84 = "[s] \"Você fez isso totalmente no impulso e na empolgação, né!?\""
10031050-88 = "[ns] \"Parece que você fez várias, tem algum objetivo por trás disso...?\""
10031050-89 = "Achei que não precisasse nem dizer..."
10031050-90 = "Claro, é para a divulgação da festa!"
10031050-95 = "Esta festa é um evento que eu, Makoto, preparei com todo o meu empenho. #n Já que é assim, quero reunir o máximo de pessoas possível."
10031050-96 = "Por isso, ao espalhar minha estátua por toda Gehenna..."
10031050-97 = "Vou fazer com que a dignidade de Makoto Hanuma... não, não só isso, mas a grandeza do Pandemonium seja amplamente conhecida por todos os alunos de Gehenna! Kikiki!!!"
10031050-98 = "Já está causando repercussão nas redes sociais! Veja só!"
10031050-103 = "＜Kirakira Ururun☆: Ahaha! Olha isso! Que demais! É muito engraçado!＞"
10031050-104 = "＜GehEricha0201: Estão colocando isso em lugares que atrapalham a passagem, será que pode mesmo?＞"
10031050-105 = "＜akusi-girl: Vi um monte de delinquentes carregando elas agora pouco＞"
10031050-106 = "＜#Nyanko&: Sério, que brega＞"
10031050-108 = "[ns5] \"Será que isso é uma repercussão positiva...?\"\n[ns6] \"Se você fez tantas, imagino que o custo tenha sido considerável...\""
10031050-111 = "De jeito nenhum, Sensei."
10031050-112 = "Não precisa se preocupar nem um pouco com os custos. #n Porque..."
10031050-113 = "Tanto o custo de produção das estátuas quanto as despesas para espalhá-las por todos os lugares foram feitos em nome do Comitê Disciplinar!"
10031050-114 = "[s] \"...H-hum?\""
10031050-115 = "E o orçamento do Comitê Disciplinar é decidido por nós, do Pandemonium!"
10031050-116 = "Usei o orçamento deles para dar a festa, dei um golpe nas finanças deles e ainda fiz a propaganda do evento! Kikiki!"
10031050-117 = "Isso sim é matar dois coelhos com uma cajadada só!"
10031050-118 = "Não consigo parar de rir desse plano genial e maravilhoso!"
10031050-119 = "Kuku... Kukuku! Kikikikiki!!!"
10031050-120 = "[s] \"O Comitê Disciplinar não sabe disso, né...?\""
10031050-121 = "Ah, claro que não! Imagino que cara eles fariam se soubessem!"
10031050-122 = "Normalmente a presidente do Comitê Disciplinar tentaria atrapalhar, mas desta vez, graças à minha estratégia..."
10031050-123 = "Ela deve estar distraída com as aulas de piano!"
10031050-124 = "Uma operação perfeita, aproveitando essa brecha!"
10031050-126 = "Ah! Meu próprio talento me assusta!"
