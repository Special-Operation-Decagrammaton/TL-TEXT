[translation]
10039050-1 = "第5話;争いの予兆"
10039050-3 = "はぁ、はぁ……。"
10039050-11 = "……ふぅ。"
10039050-17 = "ま、待って、ください……！"
10039050-21 = "……どうしたのですか、サクラコさん。"
10039050-22 = "まだ休憩時間ではありませんが……。"
10039050-23 = "や、休みたいのではなく、おかしいと思いませんか？"
10039050-24 = "今はダンスレッスンですよね？"
10039050-25 = "……？"
10039050-26 = "はい、そうですが。"
10039050-27 = "以前インターネットで調べたところ……。"
10039050-28 = "アイドルは練習中、ジャージで練習していました。"
10039050-29 = "このように、ステージ本番の衣装ではなく！"
10039050-31 = "それがどうしたのですか？"
10039050-32 = "な、何かおかしなことを言いましたか……？"
10039050-33 = "ジャージのほうが動きやすいではありませんか！"
10039050-34 = "――だからです、サクラコさん。"
10039050-35 = "それでは練習になりません。"
10039050-36 = "どういう意味でしょう……？"
10039050-37 = "こんな言葉を聞いたことはありませんか？"
10039050-38 = "……常に本番のつもりで練習するべきである、と。"
10039050-39 = "……！"
10039050-40 = "サクラコさんの考えも分かります。"
10039050-41 = "ですが……素人だからこそ、当日に近い状態で練習しなくては間に合わないのではないですか？"
10039050-42 = "そ、それでも……！"
10039050-44 = "常に本番のつもりで！"
10039050-45 = "うっ……。"
10039050-46 = "しかし、慣れないうちから動きづらい格好で踊っても、練習のペースが……。"
10039050-47 = "このままでは、通しで踊れるようになるまで何日かかるか……。"
10039050-48 = "いっそ、マリーに助言を求めては――"
10039050-49 = "サクラコさん！"
10039050-50 = "……！？"
10039050-51 = "困り事があるたびに、彼女を呼ぶとは……。"
10039050-52 = "マリーさんを何だと思っているのですか！？"
10039050-53 = "えっ……！？"
10039050-54 = "サクラコさんに悪気はないかもしれませんが……。"
10039050-55 = "マリーさんからすれば先輩からの命令ですから、断りづらいでしょう！"
10039050-56 = "……うっ。"
10039050-60 = "で、では、先生にお願いするのは……。"
10039050-61 = "ダメです！"
10039050-62 = "ええ、どうしてですか？"
10039050-63 = "そもそも、他人任せなのが良くないのです！"
10039050-64 = "助けを求めるのが悪いとは言っておりません！#nただ、まずは自分で努力するべきでしょう！"
10039050-65 = "良いですか？#n私たちは、先生にもマリーさんにも充分お世話になっています。"
10039050-66 = "ですから、ここは二人で解決しなければいけません！"
10039050-68 = "う、うっ……！"
10039050-69 = "ミネ団長の意見は理解できますが、このままでは……！"
10039050-70 = "ええ、スケジュールが厳しいのは承知しています。"
10039050-71 = "しかし、それは他人任せにしても良い理由にはなりません。"
10039050-72 = "むしろ、こういった時こそ私たちの力の見せ所ではないでしょうか？"
10039050-73 = "これまで手を貸してくれた皆さんに、#n最高のパフォーマンスでお返しをしましょう。"
10039050-74 = "……はい。"
10039050-75 = "ですから、もし誰かから連絡が来ても強い思いでスルーしてください。"
10039050-76 = "アイドルとしての活動が終わるまでは。"
10039050-77 = "……はい、分かりました。"
10039050-78 = "……。"
10039050-79 = "しかし……。"
10039050-80 = "振り付けすら合わせられないというのに、どうすれば良いのでしょう。"
10039050-81 = "そもそも、アイドルに関する知識が……。"
10039050-82 = "私はサクラコさんほどアイドルについて知らないわけでは……。"
10039050-83 = "アイドルソングも聞きますし。"
10039050-84 = "でしたら、ミネ団長は私たちに足りていないものが分かりますか？"
10039050-85 = "それは……。"
10039050-86 = "……？"
10039050-87 = "……あっ。"
10039050-88 = "……？"
10039050-89 = "何か思い当たりましたか？"
10039050-90 = "……ええ。"
10039050-91 = "まさか、こんなにも大事な役割を忘れていたなんて。"
10039050-92 = "大事な、役割……？"
10039050-93 = "そうです。"
10039050-94 = "ほかのアイドルグループには存在し、私たちのグループには存在しないもの。"
10039050-98 = "……それは、リーダーです。"
10039050-99 = "なるほど……。"
10039050-100 = "つまり、指導者のことでしょうか？"
10039050-101 = "ええ。#nグループの方向性を決め、導く役割です。"
10039050-102 = "もっと早く気づくべきでした……！"
10039050-103 = "たしかに、指導者が不在では立ち行きませんね。"
10039050-104 = "とすれば、リーダーには私よりもアイドルに詳しいミネ団長でしょうか？"
10039050-105 = "いえ、そう簡単に決められるものではありません。"
10039050-106 = "知識が多いだけでリーダーが務まるわけではありませんから。"
10039050-107 = "最初にアイドル活動を提案し、#n手続きを進めてくださったサクラコさんが相応しいとも言えます。"
10039050-108 = "ですので、すぐに決めるのは難しそうです。"
10039050-109 = "それぞれ考える時間が必要でしょう。"
10039050-110 = "少しお疲れのようですし、休憩ついでに頭を整理するのはいかがですか？"
10039050-112 = "……お気づきでしたか。"
10039050-113 = "ここはありがたく、そういたしましょう。"
10039050-114 = "……ひとまず着替えを済ませてきます。"
10039050-123 = "では……。"
10039050-124 = "二時間後、トリニティ・スクエアの噴水前で。"
10039050-125 = "ええ。"
10039050-127 = "……そこで、私たちの指導者を決めるとしましょう。"
10039050-133 = "指導者に違いはありませんが……。"
10039050-134 = "ほかの方々には、内密に進めましょう。"
10039050-135 = "もちろん、シャーレの先生にも。"
10039050-136 = "――これは、私たちのグループの問題ですから！"
10039050-140 = "サクラコさんの表現は、相変わらず……。"
10039050-141 = "……何か間違っておりましたか？"
10039050-142 = "いえ、大丈夫です。"
10039050-143 = "では、また後ほどお会いしましょう。"
10039050-151 = "？"
10039050-158 = "……久しぶりの穏やかな時間ですね。"
10039050-159 = "空も晴れていますし、[ruby=カーニバル]謝肉祭[/ruby]も順調……。"
10039050-160 = "今年は例年よりも皆さん積極的に参加してくださっていますし……。"
10039050-161 = "……紅茶を楽しむ余裕も出てくるというもの。"
10039050-162 = "ふふっ、とっておきの茶葉を使ったからでしょうか。"
10039050-166 = "……はぁ。"
10039050-167 = "まったく、ミカさんはどこにいるのです。"
10039050-168 = "セイアさんは部屋でお休みでしょうが……。"
10039050-169 = "こういう日くらい……。"
10039050-170 = "皆さんと……。"
10039050-171 = "……そうですね。"
10039050-172 = "いつも[ruby=わたくし]は私が[/ruby]呼び出しておりますが……。"
10039050-173 = "たまにはこちらから伺うとしましょう。"
10039050-174 = "特にトラブルは起きていないようですし――"
10039050-181 = "な、ナギサ様！"
10039050-182 = "……何度も申し上げておりますが、大きな音は立てないように。"
10039050-183 = "ティーパーティーの一員として、気品ある行動を心がけてください。"
10039050-184 = "申し訳ありません、ナギサ様……。"
10039050-185 = "ですが、一大事でして！"
10039050-186 = "一大事、とは？"
10039050-187 = "何があったのですか？"
10039050-188 = "学園祭のことでしたら、クラスの皆さんにお任せしたはずです。"
10039050-190 = "えっと、情報局から報告が入りました。"
10039050-191 = "情報局から、ですか……？"
10039050-192 = "はい、ナギサ様。"
10039050-193 = "シスターフッドの[ruby=うたずみ]歌住[/ruby]サクラコと救護騎士団の[ruby=あおもり]蒼森[/ruby]ミネが……。"
10039050-194 = "二時間後、トリニティ・スクエアでグループの「指導者」を決めるとのことです……！"
10039050-198 = "……？"
10039050-199 = "……はい？"
10039050-200 = "シスターフッドと救護騎士団が、指導者を……。"
10039050-201 = "どういった経緯なのでしょうか？"
10039050-202 = "詳しくは私も……。"
10039050-203 = "ですが報告によりますと、お二人の様子はまるで戦いの前のようだったと……。"
10039050-204 = "よりにもよって、この学園祭期間中に……なぜ？"
10039050-208 = "彼女たちの間に、何が……。"
10039050-213 = "（……むしろ、この時期を狙って？）"
10039050-214 = "（学園祭でティーパーティーの力が分散している今だからこそ……）"
10039050-215 = "（このタイミングでシスターフッドと救護騎士団が手を組めば、その規模は私たちを上回るでしょう）"
10039050-216 = "（……）"
10039050-217 = "（…………）"
10039050-218 = "……っ！"
10039050-220 = "……ふぅ、まずは落ち着きましょう。"
10039050-221 = "ここで取り乱してしまえば、また同じ過ちを繰り返すことに。"
10039050-222 = "信じるのです、皆さんを。"
10039050-223 = "……まずは連絡してみましょう。"
10039050-229 = "……サクラコさんは、留守のようですね。"
10039050-230 = "では、ミネ団長に……。"
10039050-236 = "……。"
10039050-237 = "も、モモトークを送ってみましょうか。"
10039050-238 = "「ご無沙汰しております」"
10039050-239 = "「ただ今、妙な噂を耳に挟みまして……」"
10039050-240 = "「ミネ団長とサクラコさんが何か計画している、と。もしよろしければ、事情を聞かせていただけませんか……？」"
10039050-241 = "……これで大丈夫なはずです。"
10039050-247 = "すぐに返信が……。"
10039050-248 = "……なぜ電話には出られなかったのでしょう。"
10039050-249 = "「お久しぶりです」"
10039050-250 = "「こちらの問題ですので、ティーパーティーはどうかお気になさらず」"
10039050-251 = "……？"
10039050-255 = "な、ナギサ様……？"
10039050-256 = "…………。"
10039050-257 = "ナギサ様、ご指示を。"
10039050-258 = "…………。"
10039050-259 = "ミカさんを……。"
10039050-260 = "……はい？"
10039050-264 = "……ミカさんを呼んでください、今すぐに！"
10039050-266 = "（校内の出し物やイベントを見て回っていた）"
10039050-270 = "[ns1] （一日じゃ回りきれそうもない……）\n[ns2] （すごい規模だ……）"
10039050-275 = "[ns3] （……電話だ）\n[ns4] 電話に出る。"
10039050-279 = "……せい！"
10039050-280 = "先生！"
10039050-281 = "良かったです、つながりました。"
10039050-282 = "[s5] \"マリー？\"\n[s6] \"何の音……？\""
10039050-285 = "突然すみません、あまり時間が……！"
10039050-290 = "バイクのエンジン音がうるさくてすみません……！"
10039050-294 = "[ns7] \"……え？\"\n[ns8] \"……バイク？\""
10039050-297 = "場所をお伝えするので、よろしければ……#nいえ、是が非でも来ていただけないでしょうか？"
10039050-298 = "……緊急事態なんです！"
10039050-299 = "詳細は会ってからお話します！"
10039050-300 = "私も状況を把握できていないのですが……。"
10039050-301 = "もしかしたら、トリニティで……。"
10039050-305 = "内戦が起きるかもしれません！"
