[translation]
10039050-1 = "Episódio 5; Presságios de Conflito"
10039050-3 = "Haa, haa..."
10039050-11 = "...Phew."
10039050-17 = "E-espere, por favor...!"
10039050-21 = "...O que houve, Sakurako-san?"
10039050-22 = "Ainda não está na hora do intervalo..."
10039050-23 = "N-não é que eu queira descansar, mas você não acha que tem algo errado?"
10039050-24 = "Agora é a aula de dança, certo?"
10039050-25 = "...?"
10039050-26 = "Sim, é isso mesmo."
10039050-27 = "Eu pesquisei na internet anteriormente e..."
10039050-28 = "Os ídolos praticam usando agasalhos durante os treinos."
10039050-29 = "Desta forma, e não com o traje oficial do palco!"
10039050-31 = "E o que tem isso?"
10039050-32 = "D-disse algo de errado...?"
10039050-33 = "Agasalhos são muito mais fáceis de se mover!"
10039050-34 = "— É exatamente por isso, Sakurako-san."
10039050-35 = "Desse jeito, não é um treino de verdade."
10039050-36 = "O que quer dizer com isso...?"
10039050-37 = "Você nunca ouviu aquela frase?"
10039050-38 = "...Que devemos sempre treinar como se fosse o dia da apresentação."
10039050-39 = "...!"
10039050-40 = "Eu entendo o seu ponto de vista, Sakurako-san."
10039050-41 = "Mas... justamente por sermos amadoras, não deveríamos treinar em condições próximas às do dia real para não ficarmos para trás?"
10039050-42 = "M-mesmo assim...!"
10039050-44 = "Sempre como se fosse o dia da apresentação!"
10039050-45 = "Ugh..."
10039050-46 = "Mas, se dançarmos com roupas difíceis de se mover antes de estarmos acostumadas, o ritmo do treino..."
10039050-47 = "Desse jeito, não sei quantos dias levará até conseguirmos dançar a música toda..."
10039050-48 = "Talvez seja melhor pedir um conselho para a Mari—"
10039050-49 = "Sakurako-san!"
10039050-50 = "...!?"
10039050-51 = "Chamar a Mari toda vez que tiver um problema..."
10039050-52 = "O que você acha que a Mari-san é!?"
10039050-53 = "Eh...!?"
10039050-54 = "Sakurako-san pode não ter más intenções, mas..."
10039050-55 = "Para a Mari-san, é uma ordem de uma superior, então deve ser difícil para ela recusar!"
10039050-56 = "...Ugh."
10039050-60 = "E-então, pedir ao Sensei seria..."
10039050-61 = "De jeito nenhum!"
10039050-62 = "Eh, por que não?"
10039050-63 = "Para começar, não é bom depender dos outros!"
10039050-64 = "Não estou dizendo que pedir ajuda é ruim!#nSó que, primeiro, devemos nos esforçar por conta própria!"
10039050-65 = "Entendido?#nNós já recebemos muita ajuda tanto do Sensei quanto da Mari-san."
10039050-66 = "Portanto, temos que resolver isso nós duas!"
10039050-68 = "U-ugh...!"
10039050-69 = "Eu entendo a opinião da Comandante Mine, mas desse jeito...!"
10039050-70 = "Sim, eu sei que o cronograma está apertado."
10039050-71 = "Mas isso não é motivo para deixar o trabalho para os outros."
10039050-72 = "Na verdade, não é justamente em momentos como este que devemos mostrar nossa força?"
10039050-73 = "Vamos retribuir a todos que nos estenderam a mão até agora com a melhor performance possível."
10039050-74 = "……Sim."
10039050-75 = "Portanto, mesmo que alguém entre em contato, por favor, ignore com determinação."
10039050-76 = "Até que nossas atividades como ídolos terminem."
10039050-77 = "……Sim, entendido."
10039050-78 = "……."
10039050-79 = "No entanto……."
10039050-80 = "Nem sequer conseguimos sincronizar a coreografia, o que deveríamos fazer?"
10039050-81 = "Para começar, meu conhecimento sobre ídolos é……."
10039050-82 = "Não é como se eu soubesse menos sobre ídolos do que a Sakurako-san……."
10039050-83 = "Eu também ouço músicas de ídolos."
10039050-84 = "Sendo assim, a Comandante Mine sabe o que está faltando para nós?"
10039050-85 = "Isso é……."
10039050-86 = "……?"
10039050-87 = "……Ah."
10039050-88 = "……?"
10039050-89 = "Você se lembrou de algo?"
10039050-90 = "……Sim."
10039050-91 = "Não acredito que esqueci de um papel tão importante."
10039050-92 = "Um papel…… importante?"
10039050-93 = "Exatamente."
10039050-94 = "Algo que existe em outros grupos de ídolos, mas que não existe no nosso."
10039050-98 = "……É um líder."
10039050-99 = "Entendo……."
10039050-100 = "Em outras palavras, seria um guia?"
10039050-101 = "Sim. #nÉ o papel de definir a direção do grupo e liderá-lo."
10039050-102 = "Deveríamos ter percebido isso mais cedo……!"
10039050-103 = "De fato, sem um guia, não conseguiremos seguir em frente."
10039050-104 = "Sendo assim, a líder seria a Comandante Mine, que entende mais de ídolos do que eu?"
10039050-105 = "Não, não é algo que possa ser decidido tão facilmente."
10039050-106 = "Afinal, ter muito conhecimento não significa que alguém está apta para ser líder."
10039050-107 = "Pode-se dizer que a Sakurako-san, que propôs as atividades de ídolo primeiro e #nconduziu os trâmites, seria a mais adequada."
10039050-108 = "Por isso, parece difícil decidir imediatamente."
10039050-109 = "Cada uma de nós precisará de um tempo para pensar."
10039050-110 = "Parece que você está um pouco cansada, que tal aproveitar a pausa para organizar os pensamentos?"
10039050-112 = "……Você percebeu."
10039050-113 = "Sendo assim, aceitarei a sugestão com gratidão."
10039050-114 = "……Vou trocar de roupa por enquanto."
10039050-123 = "Então……."
10039050-124 = "Daqui a duas horas, em frente à fonte da Trinity Square."
10039050-125 = "Sim."
10039050-127 = "……Lá, decidiremos quem será nossa guia."
10039050-133 = "Não há dúvidas de que precisamos de uma guia, mas……."
10039050-134 = "Vamos manter isso em segredo das outras pessoas."
10039050-135 = "Claro, inclusive do Sensei do Schale."
10039050-136 = "――Afinal, este é um problema do nosso grupo!"
10039050-140 = "A forma como a Sakurako-san se expressa é, como sempre……."
10039050-141 = "……Eu disse algo errado?"
10039050-142 = "Não, está tudo bem."
10039050-143 = "Então, nos vemos mais tarde."
10039050-151 = "？"
10039050-158 = "……Faz tempo que não tenho um momento de paz como este."
10039050-159 = "O céu está limpo e o Carnaval está correndo bem……."
10039050-160 = "Este ano, todos estão participando de forma mais ativa do que nos anos anteriores……."
10039050-161 = "……É o tipo de situação que me permite aproveitar um chá com calma."
10039050-162 = "Fufu, será que é porque usei um chá especial?"
10039050-166 = "……Haa."
10039050-167 = "Francamente, onde será que a Mika está?"
10039050-168 = "A Seia deve estar descansando no quarto, mas……."
10039050-169 = "Em um dia como este……."
10039050-170 = "Com todos……."
10039050-171 = "……É verdade."
10039050-172 = "Geralmente sou eu quem chamo a todos, mas……."
10039050-173 = "De vez em quando, acho que devo ser eu a ir até eles."
10039050-174 = "Não parece haver nenhum problema acontecendo, então――"
10039050-181 = "N-Nagisa-sama!"
10039050-182 = "……Já disse várias vezes para não fazer tanto barulho."
10039050-183 = "Como membro da Tea Party, tente se comportar com elegância."
10039050-184 = "Peço perdão, Nagisa-sama……."
10039050-185 = "Mas é uma emergência!"
10039050-186 = "Uma emergência, diz você?"
10039050-187 = "O que aconteceu?"
10039050-188 = "Se for sobre o festival escolar, eu deveria ter deixado isso a cargo do pessoal da turma."
10039050-190 = "Bem, recebemos um relatório do Departamento de Informações."
10039050-191 = "Do Departamento de Informações, é……?"
10039050-192 = "Sim, Nagisa-sama."
10039050-193 = "Utazumi Sakurako, da Sisterhood, e Aomori Mine, da Brigada de Socorro……."
10039050-194 = "Dizem que daqui a duas horas, na Trinity Square, elas decidirão quem será a 'líder' do grupo……!"
10039050-198 = "……?"
10039050-199 = "……Sim?"
10039050-200 = "A Sisterhood e a Brigada de Socorro vão decidir uma líder……."
10039050-201 = "Como isso foi acontecer?"
10039050-202 = "Eu também não sei os detalhes……."
10039050-203 = "Mas, de acordo com o relatório, o comportamento das duas parecia o de quem está prestes a entrar em uma batalha……."
10039050-204 = "Logo agora, durante o período do festival escolar…… por quê?"
10039050-208 = "O que será que aconteceu entre elas……."
10039050-213 = "（……Ou melhor, será que elas escolheram este momento de propósito?）"
10039050-214 = "（Justamente agora, que as forças da Tea Party estão dispersas por causa do festival escolar……）"
10039050-215 = "（Se a Sisterhood e a Brigada de Socorro se unirem neste momento, a escala delas superará a nossa.）"
10039050-216 = "（……）"
10039050-217 = "（…………）"
10039050-218 = "……!"
10039050-220 = "……Ufa, vamos nos acalmar primeiro."
10039050-221 = "Se eu perder a compostura aqui, acabarei cometendo o mesmo erro novamente."
10039050-222 = "Acredite nelas."
10039050-223 = "……Primeiro, vamos tentar entrar em contato."
10039050-229 = "……Parece que a Sakurako-san não está."
10039050-230 = "Então, vou falar com a capitã Mine……."
10039050-236 = "……."
10039050-237 = "V-vou tentar enviar um MomoTalk, então."
10039050-238 = "「Há quanto tempo.」"
10039050-239 = "「Acabei de ouvir um boato estranho...」"
10039050-240 = "「Dizem que a Capitã Mine e a Sakurako estão planejando algo. Se não for pedir muito, poderia me contar o que está acontecendo...?」"
10039050-241 = "……Isso deve ser o suficiente."
10039050-247 = "Uma resposta imediata..."
10039050-248 = "……Por que ela não atendeu o telefone?"
10039050-249 = "「Quanto tempo.」"
10039050-250 = "「Este é um problema nosso, então, por favor, não se preocupe com isso, Tea Party.」"
10039050-251 = "……?"
10039050-255 = "Na-Nagisa-sama...?"
10039050-256 = "…………."
10039050-257 = "Nagisa-sama, quais são suas ordens?"
10039050-258 = "…………."
10039050-259 = "A Mika..."
10039050-260 = "……Sim?"
10039050-264 = "……Chame a Mika, agora mesmo!"
10039050-266 = "（Estava dando uma volta para ver as atrações e eventos da escola）"
10039050-270 = "[ns1] （Não parece que vou conseguir ver tudo em um dia...）\n[ns2] （Que escala impressionante...）"
10039050-275 = "[ns3] （……É o telefone）\n[ns4] Atender o telefone."
10039050-279 = "……Sensei!"
10039050-280 = "Sensei!"
10039050-281 = "Que bom, consegui contato."
10039050-282 = "[s5] \"Marie?\"\n[s6] \"Que barulho é esse...?\""
10039050-285 = "Desculpe pela súbita ligação, não temos muito tempo...!"
10039050-290 = "Sinto muito pelo barulho do motor da moto...!"
10039050-294 = "[ns7] \"……Eh?\"\n[ns8] \"……Moto?\""
10039050-297 = "Vou te passar a localização, se puder...#nNão, eu preciso que você venha, por favor!"
10039050-298 = "……É uma emergência!"
10039050-299 = "Explicarei os detalhes quando nos encontrarmos!"
10039050-300 = "Eu mesma ainda não entendi a situação por completo, mas..."
10039050-301 = "Talvez, em Trinity..."
10039050-305 = "Uma guerra civil possa começar!"
