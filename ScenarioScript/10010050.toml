[translation]
10010050-1 = "Episódio 5; A granada de luz que corre por Trinity (1)"
10010050-4 = "Conseguimos pegar o bolo, de alguma forma...!"
10010050-5 = "Muito obrigada, Sensei! Graças a você, parece que começamos com o pé direito!"
10010050-6 = "[s1] \"Não, Hinata, você que se esforçou.\"\n[s2] \"Bom trabalho, você foi tão ativa quanto um tanque de guerra.\""
10010050-7 = "N-não, eu praticamente não fiz nada..."
10010050-8 = "E-essa comparação é um pouco..."
10010050-9 = "D-de qualquer forma, primeiro vamos entregar isso para a Ui..."
10010050-10 = "E depois o \"Medicamento Sagrado\" e a \"Cola de Musgo\"... era isso, certo?"
10010050-11 = "Por qual devemos começar a procurar...?"
10010050-12 = "[s3] Vamos começar pelo Medicamento Sagrado?\n[s4] Não tem motivo, mas vamos começar pela Cola de Musgo?"
10010050-13 = "Entendo, então..."
10010050-14 = "Entendo, então..."
10010050-18 = "...!?"
10010050-19 = "E-esse barulho é...?"
10010050-28 = "H-há um combate acontecendo em algum lugar...!?"
10010050-29 = "Parece perto, vamos lá!"
10010050-30 = "[s] \"Sim. Ah, será que tudo bem continuar segurando o bolo...\""
10010050-31 = "V-verdade...!?"
10010050-32 = "Bem, isso... hum...!"
10010050-37 = "E-está tudo bem! Estou segurando firme!"
10010050-38 = "Não posso simplesmente ignorar se alguém estiver em apuros..."
10010050-39 = "E-eu acho, mas... o que você acha...?"
10010050-40 = "[s5] \"Não, vamos fazer isso.\"\n[s6] \"Vamos com cautela.\""
10010050-41 = "S-sim...!"
10010050-42 = "S-sim...!"
10010050-43 = "Então, vamos lá!"
10010050-49 = "Ufa..."
10010050-50 = "Parece que hoje é um dia de gastar muitas granadas de luz..."
10010050-52 = "Haha, parece que você está exausta, como esperado! E não é para menos. Afinal, nós somos o \"Grupo das Sete Quedas e Oito Levantadas\", que se levanta não importa quantas vezes caia!"
10010050-54 = "Bem, acho que é um bom nome, mas..."
10010050-55 = "Se vocês não estão fazendo nada de errado, eu poderia seguir para outro lugar? Sinto que já nos encontramos várias vezes desde agora..."
10010050-56 = "É claro que sim. Afinal, nós estávamos atrás de você."
10010050-57 = "...?"
10010050-58 = "Atrás de mim...? Por que será..."
10010050-59 = "\"Por que\"?! Por que você não pergunta a si mesma?!"
10010050-60 = "Se você refletir sobre suas ações, o motivo ficará claro por si só!"
10010050-61 = "De qualquer forma, prepare-se hoje! Sua \"Granada de luz que corre por Trinity\"!"
10010050-62 = "Isso é, hum, meu apelido...? Será?"
10010050-63 = "E peço desculpas, mas não consigo me lembrar do motivo... talvez tenhamos nos encontrado em algum lugar."
10010050-64 = "Eu apenas faço \"o que precisa ser feito\"..."
10010050-66 = "N-não é como se tivéssemos criado um apelido para você!"
10010050-67 = "Isso mesmo, não se engane!"
10010050-68 = "Para começo de conversa, a culpa é sua por ter causado tanta confusão a ponto de ganharem um apelido desses!"
10010050-70 = "Desculpe, não estou entendendo nada..."
10010050-71 = "Droga, então você vai fingir que não sabe de nada até o fim...!"
10010050-72 = "Você tem noção da sua influência!?"
10010050-73 = "Por causa dessas suas atividades de \"grupo de vigilância\", tem gente por aí te imitando!"
10010050-74 = "...Imitando? Bem, a mim...?"
10010050-75 = "P-por que alguém como eu..."
10010050-77 = "Ouvi dizer que se espalhou pelas redes sociais... e não são apenas uma ou duas pessoas!"
10010050-78 = "Autointitulada 'Bomba de Fumaça que Corre por Trinity', autointitulada 'Corda de Corrida de Trinity'...! Por causa de gente com esses nomes estranhos, eu estou passando por um inferno!"
10010050-79 = "Eles são muito persistentes! Por isso decidimos que tínhamos que parar você, que é a causa de tudo!"
10010050-81 = "Causa de tudo, você diz...?"
10010050-82 = "Mas... sim, eu entendi mais ou menos. Obrigada. Eu não sou muito boa com redes sociais, então não sabia disso..."
10010050-83 = "Eu não fazia ideia de que algo assim estava acontecendo. De qualquer forma, acho que é bom que mais pessoas estejam dispostas a agir por conta própria."
10010050-84 = "Embora eu não conheça a maioria dessas pessoas..."
10010050-85 = "Mas se eles realmente precisam de uma conclusão, então, sim."
10010050-89 = "...Eu aceito o desafio. Vamos continuar até que vocês se sintam satisfeitos."
10010050-91 = "Ugh...!?"
10010050-92 = "N-não precisa ficar com medo! Desta vez estamos em 30 contra 1, sabia!?"
10010050-93 = "Foi você mesma quem disse que somos o 'Grupo das Sete Quedas e Oito Levantadas', que se levanta não importa quantas vezes caia, não foi!?"
10010050-94 = "M-mas, da última vez perdemos de 18 contra 1... e eu disse que nos levantamos, mas não disse que 'venceríamos'..."
10010050-95 = "E antes disso, sem nem usar balas, você derrotou todas nós..."
10010050-96 = "Ah, chega, não fale de passados vergonhosos! É por isso que viemos em 30 pessoas desta vez, não é!?"
10010050-98 = "...Com licença."
10010050-99 = "Seria melhor se eu esperasse um pouco mais?"
10010050-100 = "Ei, cale a boca! Não tente ser gentil comigo!!"
10010050-101 = "Agora é a hora do acerto de contas, Bomba de Luz que Corre por Trinity!!"
10010050-103 = "P-Sensei...!"
10010050-104 = "[s7] \"Talvez não seja necessário...\"\n[s8] \"Não quero que ninguém se machuque, vou ajudar.\""
10010050-105 = "S-sim...!"
10010050-106 = "S-sim...!"
