[translation]
10010050-1 = "第5話;トリニティの走る閃光弾（１）"
10010050-4 = "何とかケーキ、手に入りましたね……！"
10010050-5 = "ありがとうございます、先生！おかげさまで幸先良さそうです！"
10010050-6 = "[s1] \"ううん、ヒナタこそお疲れ様。\"\n[s2] \"お疲れ様、戦車ばりの活躍だったもんね。\""
10010050-7 = "い、いえ、私はほとんど何もしてませんし……。"
10010050-8 = "そ、その例えはちょっと……。"
10010050-9 = "と、とにかくまずは、これをウイさんに渡して……。"
10010050-10 = "それから「精聖薬」と、「[ruby=みずごけにかわ]水苔膠[/ruby]」……でしたよね？"
10010050-11 = "どちらから探しに行きましょうか……？"
10010050-12 = "[s3] とりあえず精聖薬にする？\n[s4] 理由は無いけど水苔膠からにする？"
10010050-13 = "そうですね、では――"
10010050-14 = "そうですね、では――"
10010050-18 = "……！？"
10010050-19 = "こ、この音は……？"
10010050-28 = "ど、どこかで戦闘が……！？"
10010050-29 = "近そうです、行きましょう！"
10010050-30 = "[s] \"うん。あ、ケーキ持ったままで大丈夫かな……。\""
10010050-31 = "た、確かに……！？"
10010050-32 = "えっと、その。うーん……！"
10010050-37 = "だ、大丈夫です！しっかり持ってますので！"
10010050-38 = "誰かが困っているかもしれないのに、聞かなかったことにするなんてできません……！"
10010050-39 = "と、思うのですが……いかがです……？"
10010050-40 = "[s5] \"ううん、そうしよっか。\"\n[s6] \"慎重に行こう。\""
10010050-41 = "は、はい……！"
10010050-42 = "は、はい……！"
10010050-43 = "では、行きましょう！"
10010050-49 = "ふぅ……。"
10010050-50 = "何だか今日は、閃光弾の消費が多い日ですね……。"
10010050-52 = "ははっ、流石に疲れ果てたようだな！それもそうだろう。何せ私たちは、幾度倒れようとも立ち上がる「七転八倒団」だからな！"
10010050-54 = "えっと、それは良いお名前だと思いますが……。"
10010050-55 = "特に悪いことをされていないのであれば、私は別のところへ向かってもよろしいでしょうか？何だか先ほどから、何度も出会っている気がしますが……。"
10010050-56 = "それはそうだろう。何せ私たちは、お前を狙っていたのだからな。"
10010050-57 = "……？"
10010050-58 = "私を狙って……？それはまた、どうして……。"
10010050-59 = "「どうして」だと！？一度自分の胸に聞いてみたらどうだ！"
10010050-60 = "自分の行いを振り返ってみれば、その理由も自ずと分かるはずだ！"
10010050-61 = "とにかく、今日こそ覚悟しろ！「トリニティの走る閃光弾」め！"
10010050-62 = "それはその、私のあだ名……？でしょうか？"
10010050-63 = "それから申し訳ありません、理由についてもいまいち思い当たることが無く……もしかしたら、どこかで出会っていたかもしれませんが。"
10010050-64 = "私はただ、「誰かがやるべきこと」を――"
10010050-66 = "べ、別に私たちがお前のために、あだ名を作ってあげたわけじゃないっての！"
10010050-67 = "そうだ、勘違いするな！"
10010050-68 = "そもそも、そんなあだ名が自然につくほど暴れまわったお前が悪いんだ！"
10010050-70 = "すみません、話が見えてこないのですが……。"
10010050-71 = "くっ、あくまで知らぬ存ぜぬというわけか……！"
10010050-72 = "お前、ちゃんと自分の影響力が分かってるのか！？"
10010050-73 = "お前のその「自警団」とやらの活動のせいで、真似をしてるやつらが出てきたんだよ！"
10010050-74 = "……真似？えっと、私を……？"
10010050-75 = "ど、どうして私なんかを……。"
10010050-77 = "SNSで広まったとか何とか聞いたが……もう一人二人じゃないんだ！"
10010050-78 = "自称「トリニティの駆け回る煙幕弾」とか、自称「トリニティのダッシュロープ」とか……！そういう変な名前が付いてるやつのせいで、こちとら散々なんだよ！"
10010050-79 = "あいつら本当にしつこいし！だから元凶であるお前を止めようって話になったんだ！"
10010050-81 = "元凶、と言われましても……。"
10010050-82 = "ですが……はい、およそ理解しました。ありがとうございます。SNSは向いてないもので、知らなかったのですが……。"
10010050-83 = "そのようなことがあったとは。何にせよ、自ら動こうとする方が増えたのは良いことかと思います。"
10010050-84 = "その方々の大半とは、面識もありませんが……。"
10010050-85 = "それでも決着が必要というのであれば、はい。"
10010050-89 = "……お相手いたします。スッキリするまでお付き合いしましょう。"
10010050-91 = "うっ……！？"
10010050-92 = "び、ビビる必要無いだろ！今回は30対1だぞ！？"
10010050-93 = "幾度倒れようとも立ち上がる「七転八倒団」、って言ったのお前だろ！？"
10010050-94 = "で、でも、前は18対1で負けたし……立ち上がるとは言ったけど、「勝つ」とは言ってないし……。"
10010050-95 = "その前なんか、銃弾も使わずにうちら全員……。"
10010050-96 = "ああもう、恥ずかしい過去を話すな！だから今回は30人で来たんだろ！？"
10010050-98 = "……あの。"
10010050-99 = "もう少し待っていたほうが、よろしいでしょうか？"
10010050-100 = "ええいっ、うるさい！気を遣うな！！"
10010050-101 = "今こそ決着の時だ、トリニティの走る閃光弾！！"
10010050-103 = "せ、先生……！"
10010050-104 = "[s7] \"要らないかもしれないけど……。\"\n[s8] \"怪我しても困るし、助けよう。\""
10010050-105 = "は、はいっ……！"
10010050-106 = "は、はいっ……！"
