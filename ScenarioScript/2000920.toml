[translation]
2000920-1 = "お風呂の補佐官"
2000920-3 = "（チェリノから連絡をもらって、温泉郷へと向かった）"
2000920-6 = "（すると、入り口に立っていたのは……）"
2000920-7 = "よく来たな、カムラッド！"
2000920-8 = "そして……これをちょっと見てくれ。"
2000920-13 = "[ns] \"アヒルの人形……？\""
2000920-14 = "ふふっ、甘いぞカムラッド！こいつにはもっとふさわしい名前があるのだ！"
2000920-15 = "そう、「ラバーダック」という名が！"
2000920-16 = "[s] \"そ、そっか……あれ、髭が付いてる。\""
2000920-17 = "うむ、まあ説明すると長いのだが……。"
2000920-23 = "というわけだ！！"
2000920-24 = "[s1] \"つまり、未だに手書きの発注書だったから桁数を間違えて……。\"\n[s2] \"事務局が大量のラバーダックの在庫を抱え込んで……。\""
2000920-25 = "電算局の奴らを粛清しようとしたところで、トモエがこのラバーダックを見て「チェリノ様のように可愛らし――"
2000920-26 = "電算局の奴らを粛清しようとしたところで、トモエがこのラバーダックを見て「チェリノ様のように可愛らし――"
2000920-27 = "……いや、「溢れんばかりの威厳がある」と言ってな。#n髭を付けて、お土産にしたらどうかと提案されたのだ。"
2000920-28 = "半信半疑だったが、なかなかの売り上げでな。電算局のミスによる損害は埋められたんだが……。"
2000920-29 = "[s] \"丸く収まったように聞こえるけど……？\""
2000920-30 = "ううむ、それがだな……。"
2000920-31 = "ただ水に浮くだけで役に立たないこのラバーダックに、権威の象徴とも言える髭を付けても良いのだろうか……と。"
2000920-32 = "[s] \"……可愛いから良いんじゃない？\""
2000920-33 = "可愛いだけではダメだ！レッドウィンター連邦学園の髭は、そう簡単に与えられてはならない！"
2000920-34 = "髭とは、素晴らしい歳月を重ねた者にこそもたらされる権威の象徴。つまるところ、経験を積んだ成人にのみ授与される勲章のようなもの。"
2000920-35 = "つまり、髭とは勲章なのだ！"
2000920-36 = "なのに、こんなボーっとしたアヒルに髭を与えるだなんて……いくら財政面で助けてもらったとはいえ、認められん！"
2000920-37 = "[s3] \"ま、まぁまぁ……。\"\n[s4] \"とりあえず、温泉に入って落ち着いたら？\""
2000920-42 = "むぅ……。"
2000920-43 = "確かに一理あるような……？"
2000920-44 = "よし……だが、もし温泉から上がってもまだ、おいらがラバーダックに価値を感じなかったら……。"
2000920-48 = "電算局の生徒たちと共に、ラバーダックたちを粛清してやる！"
2000920-52 = "はあぁ……。"
2000920-53 = "温泉に浸かるのも、最近は悪くないと思えてきたな……。"
2000920-54 = "激務を忘れて、ゆったりと過ごせる時間……。"
2000920-55 = "ただ、このラバーダックじゃ特に……。"
2000920-56 = "……。"
2000920-61 = "ゆらゆら……ゆらゆら……。"
2000920-66 = "……ほう。"
2000920-67 = "……おいラバーダック、そんなに揺れていて大丈夫なのか？"
2000920-68 = "そんな調子だと、目が回ってしまうのではないか？"
2000920-73 = "なるほど……偉大なチェリノ様の権威と栄光の象徴である「髭」を授かったからには、これくらい乗り越えられるということか！"
2000920-74 = "ふふ、ふふふっ……！"
2000920-76 = "その心意気、気に入ったぞ！#nお前には特別に、第三級勇敢勲章を授与する！"
2000920-80 = "[ns] \"気に入ったみたいだね？\""
2000920-84 = "な、何のことだカムラッド！"
2000920-85 = "気配を消して温泉に入ってくるとは、何たる所業！"
2000920-86 = "[s5] \"ごめんね、邪魔するつもりじゃなかったんだけど。\"\n[s6] \"すごく楽しそうな声が聞こえてきたから。\""
2000920-87 = "た、楽しそうだと……？"
2000920-88 = "た、楽しそうだと……？"
2000920-89 = "おっ、おいらはそんな子どもではない！"
2000920-90 = "決してラバーダックとお喋りして、ひとりで遊んでいたわけではないぞ！"
2000920-91 = "[s7] \"……そっか！\"\n[s8] （全部見てたとは言わないでおこう……）"
2000920-92 = "しかし、この髭付きラバーダック……なかなか悪くないな。"
2000920-93 = "しかし、この髭付きラバーダック……なかなか悪くないな。"
2000920-94 = "おいらの入浴に仕えるだけの、勇敢な気持ちを備えている。"
2000920-99 = "よし、決めた！このラバーダックには、「お風呂補佐官」の任を与える！"
2000920-100 = "お風呂補佐官よ。これからおいらがお風呂に入る時には、必ず補佐に入ること！"
2000920-101 = "仕方ないから電算局のミスも、やはり今回だけは目をつぶってやるとしよう。"
2000920-106 = "お風呂補佐官も、そう思うだろう？"
2000920-108 = "（その後もチェリノはお風呂の補佐官とお喋りしながら、長風呂を楽しんだようだった）"
