[translation]
2000920-1 = "O Assistente do Banho"
2000920-3 = "（Recebi um contato da Cherino e fui em direção à estância termal.）"
2000920-6 = "（Então, quem estava parado na entrada era...）"
2000920-7 = "Bem-vindo, camarada!"
2000920-8 = "E então... dê uma olhada nisto."
2000920-13 = "[ns] \"Um patinho de borracha...?\""
2000920-14 = "Fufu, você é ingênuo, camarada! Este sujeito tem um nome muito mais apropriado!"
2000920-15 = "Isso mesmo, o nome dele é \"Pato de Borracha\"!"
2000920-16 = "[s] \"Ah, entendi... Espera, ele tem um bigode?\""
2000920-17 = "Hum, bem, a explicação é longa, mas..."
2000920-23 = "É por isso!!"
2000920-24 = "[s1] \"Em resumo, como o pedido ainda era feito à mão, erraram o número de dígitos...\"\n[s2] \"E o departamento administrativo acabou ficando com um estoque enorme de patos de borracha...\""
2000920-25 = "Quando eu estava prestes a expurgar o pessoal do departamento de computação, a Tomoe viu esses patos e disse: 'Como a Cherino-sama é tão adorável――"
2000920-26 = "Quando eu estava prestes a expurgar o pessoal do departamento de computação, a Tomoe viu esses patos e disse: 'Como a Cherino-sama é tão adorável――"
2000920-27 = "...Não, ela disse que eles tinham uma 'dignidade transbordante'. #nEla sugeriu colocar um bigode e vendê-los como lembrança."
2000920-28 = "Eu estava cética, mas as vendas foram muito boas. O prejuízo causado pelo erro do departamento de computação foi coberto, mas..."
2000920-29 = "[s] \"Parece que tudo terminou bem, não é...?\""
2000920-30 = "Hum, é que..."
2000920-31 = "Será que está certo colocar o bigode, símbolo da autoridade, em um pato de borracha que só serve para boiar na água e não tem utilidade alguma...?"
2000920-32 = "[s] \"...Não é bom porque é fofo?\""
2000920-33 = "Não basta ser fofo! O bigode da Academia Red Winter não deve ser concedido tão facilmente!"
2000920-34 = "O bigode é um símbolo de autoridade concedido apenas àqueles que acumularam anos de excelência. Em suma, é como uma medalha concedida apenas a adultos experientes."
2000920-35 = "Ou seja, o bigode é uma medalha!"
2000920-36 = "E ainda assim, dar um bigode a um pato tão bobo... por mais que tenha ajudado nas finanças, eu não posso aceitar!"
2000920-37 = "[s3] \"Ca-calma...\"\n[s4] \"Por que você não entra na água termal para se acalmar?\""
2000920-42 = "Hum..."
2000920-43 = "Na verdade, faz sentido...?"
2000920-44 = "Muito bem... mas, se depois de sair do banho eu ainda não sentir que o pato de borracha tem valor..."
2000920-48 = "Eu vou expurgar esses patos junto com os alunos do departamento de computação!"
2000920-52 = "Ahhh..."
2000920-53 = "Ultimamente, até que não é ruim ficar de molho na água termal..."
2000920-54 = "Um tempo para esquecer o trabalho árduo e relaxar..."
2000920-55 = "Só que, com esse pato de borracha, não tem muita..."
2000920-56 = "..."
2000920-61 = "Balança... balança..."
2000920-66 = "...Oh."
2000920-67 = "...Ei, pato de borracha, você está bem balançando desse jeito?"
2000920-68 = "Nesse ritmo, você não vai ficar tonto?"
2000920-73 = "Entendo... então, por ter recebido o 'bigode', símbolo da autoridade e glória da grande Cherino-sama, você consegue superar isso!"
2000920-74 = "Fufu, fufufu...!"
2000920-76 = "Gostei dessa sua determinação! #nVou te conceder, especialmente, a Medalha de Bravura de Terceira Classe!"
2000920-80 = "[ns] \"Parece que você gostou, né?\""
2000920-84 = "O-o que é isso, camarada!"
2000920-85 = "Que tipo de comportamento é esse, entrar na água termal sem fazer barulho!"
2000920-86 = "[s5] \"Desculpe, não era minha intenção atrapalhar.\"\n[s6] \"É que ouvi uma voz que parecia muito feliz.\""
2000920-87 = "Fe-feliz, você disse...?"
2000920-88 = "Fe-feliz, você disse...?"
2000920-89 = "Ei, eu não sou uma criança!"
2000920-90 = "Eu não estava conversando com o pato de borracha nem brincando sozinha!"
2000920-91 = "[s7] \"...Entendi!\"\n[s8] （Melhor não dizer que vi tudo...）"
2000920-92 = "Mas este patinho de borracha com bigode... não é nada mau."
2000920-93 = "Mas este patinho de borracha com bigode... não é nada mau."
2000920-94 = "Ele possui a coragem necessária para servir durante o meu banho."
2000920-99 = "Muito bem, decidi! Vou nomear este patinho de borracha como meu 'Assistente de Banho'!"
2000920-100 = "Assistente de Banho. De agora em diante, sempre que eu for tomar banho, você deverá me assistir!"
2000920-101 = "Já que não tenho escolha, vou fechar os olhos para o erro do Departamento de Computação desta vez."
2000920-106 = "Você também acha isso, não é, Assistente de Banho?"
2000920-108 = "(Depois disso, parece que Cherino aproveitou um longo banho enquanto conversava com seu Assistente de Banho)"
