[translation]
2003705-1 = "História Policial ~Capítulo do Paraíso Perdido~"
2003705-2 = "（Decidi visitar o paraíso da Fubuki）"
2003705-7 = "（Fubuki estava deitada na espreguiçadeira, cantarolando）"
2003705-9 = "[ns1] \"Fubuki, cheguei.\"\n[ns2] \"Como eu pensei, você está matando serviço!\""
2003705-15 = "Uau, que susto."
2003705-17 = "Uau, que susto!"
2003705-18 = "……Ah, é você, Sensei. #nPensei que tinha sido descoberta pelos superiores."
2003705-19 = "[s] \"Então este é o paraíso da Fubuki?\""
2003705-20 = "Exatamente♪"
2003705-21 = "É a piscina infantil no cantinho do parque aquático."
2003705-22 = "As crianças ficam na piscina infantil coberta, #ne os adultos nem vêm aqui."
2003705-23 = "Por isso, posso ficar aqui relaxando tranquilamente."
2003705-24 = "Se você for designado como salva-vidas aqui, #npode matar serviço o dia todo!"
2003705-25 = "E o melhor de tudo é……."
2003705-26 = "（Zaza…… Zazat……）"
2003705-27 = "Como é longe da sede, o rádio quase não pega!"
2003705-28 = "[s] \"Por que isso seria bom……?\""
2003705-29 = "Hã!?"
2003705-30 = "O que você está dizendo, Sensei! #nSalva-vidas que parecem estar à toa acabam recebendo novas tarefas, sabia!?"
2003705-31 = "Mas, se eu ficar aqui, posso fingir que não ouvi por causa do problema no rádio, #ne não preciso me preocupar em receber trabalho extra, né?"
2003705-32 = "[s3] \"Tem certeza de que isso é seguro……?\"\n[s4] \"E se houver uma emergência……?\""
2003705-35 = "Tá tudo bem, tá tudo bem. #nSe for o caso, eles ligam no meu celular."
2003705-36 = "Até lá, vamos aproveitar o paraíso com calma."
2003705-37 = "Pronto, aquela espreguiçadeira ali é para você, Sensei."
2003705-38 = "[s5] \"Deitar sob este sol escaldante é um pouco…….\"\n[s6] \"Não tem uma sombra em algum lugar?\""
2003705-41 = "……Infelizmente, o guarda-sol está quebrado."
2003705-42 = "Realmente, esse sol é difícil, mas……."
2003705-43 = "Se for para relaxar, dá para aguentar!"
2003705-44 = "Ah, é verdade. #nSe ficar com sede, pode pegar o que quiser no cooler ali."
2003705-48 = "Uma bebida bem geladinha……."
2003705-49 = "Hã!?"
2003705-50 = "Por que a tampa está aberta!? #nA Coca está ficando quente!"
2003705-54 = "……Bem, ainda dá para relaxar, né?"
2003705-55 = "[s] \"…….\""
2003705-56 = "Po-por que você está com essa cara?"
2003705-57 = "Não tem absolutamente nada para fazer aqui."
2003705-58 = "Olha só!"
2003705-59 = "Você pode tirar uma soneca na espreguiçadeira assim……."
2003705-64 = "Que calor!"
2003705-65 = "Depois de conversar um pouco, o sol deixou tudo tão quente……."
2003705-66 = "[s] \"…….\""
2003705-73 = "……Não, não! #nAqui é o paraíso!"
2003705-74 = "[ns7] （Parece que ela está se forçando a beber Coca quente……）\n[ns8] （Parece que ela está sofrendo……）"
2003705-77 = "Como é bom não ter trabalho……."
2003705-78 = "Vo-você não acha, Sensei?"
2003705-79 = "[s] \"Não seria mais fácil trabalhar direito e ganhar um descanso merecido?\""
2003705-80 = "Na-nada a ver……? #nJá estou relaxando o suficiente!"
2003705-81 = "Você que vai se cansar se ficar parado aí em pé, Sensei."
2003705-82 = "Bom, pode ficar aí olhando se quiser. #nEu vou continuar matando serviço aqui para sempre!"
2003705-84 = "（2 horas depois……）"
2003705-88 = "Ugh..."
2003705-89 = "É... está quente demais, não dá..."
2003705-90 = "Mas, ao contrário dos outros, eu não estou trabalhando..."
2003705-91 = "Isso aqui é o paraíso... isso aqui é o paraíso...!"
2003705-92 = "(Zaza... Zazaz...)"
2003705-93 = "[s] \"Estão tentando entrar em contato, sabia?\""
2003705-94 = "Tudo bem, tudo bem. #nDe qualquer forma, é só para me chamar e me empurrar algum trabalho braçal."
2003705-95 = "Nós só precisamos continuar aproveitando esse paraíso..."
2003705-96 = "(Pi-pi-pi)"
2003705-97 = "Ué?"
2003705-98 = "Tem uma mensagem no celular..."
2003705-103 = "\"Por favor, venha até a sala de descanso da sede\"...?"
2003705-104 = "[s] \"Pode ser uma missão de emergência.\""
2003705-105 = "Hmm. #nBem, já que se deram ao trabalho de mandar uma mensagem..."
2003705-106 = "Não tem jeito, acho que vou ter que ir."
2003705-107 = "N-não que eu quisesse sair daqui, viu!?"
2003705-111 = "Sala de Descanso dos Salva-vidas do Parque Aquático"
2003705-113 = "Com licença~."
2003705-114 = "Nossa, o ar-condicionado está no máximo! #nEstou revivendo..."
2003705-115 = "Ah, finalmente você chegou!"
2003705-116 = "Estávamos tentando contato pelo rádio o tempo todo!"
2003705-117 = "O paraí... digo, o sinal no meu posto de serviço estava ruim."
2003705-118 = "Mas pode ficar tranquila."
2003705-119 = "Eu cumpri meu trabalho como salva-vidas!"
2003705-120 = "...Nossa, é verdade mesmo?"
2003705-121 = "Deveríamos ter mandado uma mensagem para o seu celular mais cedo..."
2003705-122 = "Quem diria que você estava trabalhando até durante o seu horário de descanso!"
2003705-123 = "Não, não, eu só fiz o que deveria..."
2003705-127 = "...Hã?"
2003705-128 = "Na verdade, o descanso começou há uma hora."
2003705-129 = "Nós tínhamos até donuts para oferecer a todos que estavam se esforçando..."
2003705-130 = "Donuts!?"
2003705-131 = "Parece que já acabaram todos."
2003705-132 = "Também tínhamos muitas bebidas geladas..."
2003705-133 = "N-não pode ser..."
2003705-134 = "Para a Fubuki, que abriu mão do seu descanso #npelo bem do parque..."
2003705-135 = "Pessoal, uma salva de palmas!"
2003705-140 = "Você é o exemplo de uma salva-vidas! Fubuki Nemugaki!"
2003705-141 = "Err... e-eu não tinha essa intenção..."
2003705-145 = "Ugh..."
2003705-146 = "Por que, afinal, eu fiz tudo isso..."
