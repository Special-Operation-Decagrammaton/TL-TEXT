[translation]
2003705-1 = "ポリス・ストーリー～ロスト・パラダイス編～"
2003705-2 = "（フブキのパラダイスを訪ねることにした）"
2003705-7 = "（フブキはサマーベッドの上で横になって、鼻歌を歌っていた）"
2003705-9 = "[ns1] \"フブキ、来たよ。\"\n[ns2] \"やっぱりサボってるじゃん！\""
2003705-15 = "わっ、びっくりした。"
2003705-17 = "わっ、びっくりした！"
2003705-18 = "……って、なんだ先生か。#nてっきり上の人に見つかったのかと思ったよ。"
2003705-19 = "[s] \"ここがフブキのパラダイスなの？\""
2003705-20 = "そういうこと♪"
2003705-21 = "ウォーターパークの隅っこにあるキッズプールだよ。"
2003705-22 = "室内のキッズプールに子どもは集まってるし、#n大人はそもそも来ないからね。"
2003705-23 = "だから、こうしてのーんびりしてられるってわけ。"
2003705-24 = "ここのライフセーバー担当になったら、#n一日中サボり放題だよ！"
2003705-25 = "何より、一番良いのは……。"
2003705-26 = "（ザザ……ザザッ……）"
2003705-27 = "本部と離れてるから、無線がつながりにくいところ！"
2003705-28 = "[s] \"それの何が良いの……？\""
2003705-29 = "えっ！？"
2003705-30 = "なに言ってるのさ、先生！#n暇そうなライフセーバーには、新しい仕事が振られるんだよ！？"
2003705-31 = "でも、ここにいれば無線機の問題で聞こえなかったことにできるし、#n余計な仕事を回される心配もないじゃん？"
2003705-32 = "[s3] \"本当に大丈夫なの……？\"\n[s4] \"急用があるかもしれないんじゃ……？\""
2003705-35 = "大丈夫大丈夫。#nその時は、携帯に連絡が来るって。"
2003705-36 = "それまでは、のんびりパラダイスを満喫してようよ。"
2003705-37 = "はい、こっちが先生用のサマーベッドね。"
2003705-38 = "[s5] \"この炎天下で横になるのは、ちょっと……。\"\n[s6] \"どこか日陰はないの？\""
2003705-41 = "……残念ながら、パラソルは故障中なんだよねぇ。"
2003705-42 = "たしかに、この日差しはつらいけど……。"
2003705-43 = "のんびりできるなら、これくらい我慢我慢！"
2003705-44 = "あ、そうだ。#n喉が乾いたら、そこのクーラーボックスから好きに飲んで良いよ。"
2003705-48 = "キンキンに冷えた飲み物が……。"
2003705-49 = "えっ！？"
2003705-50 = "なんで蓋が開きっぱなしに！？#nコーラが温くなってるんだけど！"
2003705-54 = "……ま、のんびりできることには変わりないし？"
2003705-55 = "[s] \"……。\""
2003705-56 = "ど、どうしてそんな顔してるのさ。"
2003705-57 = "なーんにも仕事をする必要がないんだよ。"
2003705-58 = "ほら！"
2003705-59 = "こうやって、サマーベッドでお昼寝しても良いし……。"
2003705-64 = "あっつ！"
2003705-65 = "少しおしゃべりしてたら、日差しでこんなに熱く……。"
2003705-66 = "[s] \"……。\""
2003705-73 = "……いやいや！#nここは天国だから！"
2003705-74 = "[ns7] （無理して温かいコーラを飲んでるような……）\n[ns8] （つらそうだけど……）"
2003705-77 = "仕事のない時間、楽しいな～……。"
2003705-78 = "せ、先生もそう思わない？"
2003705-79 = "[s] \"ちゃんと働いて、休憩をもらったほうが楽じゃない？\""
2003705-80 = "べ、別に……？#n充分楽できてるし！"
2003705-81 = "先生こそ、そんなところに突っ立ってると疲れるでしょ。"
2003705-82 = "ま、そこで見てたら良いんじゃない？#nこのまま私は、ずーっとサボっちゃうけどね！"
2003705-84 = "（2時間後……）"
2003705-88 = "うぅ……。"
2003705-89 = "さ、さすがに暑すぎて……。"
2003705-90 = "でも、ほかの人みたいに仕事はしてないし……。"
2003705-91 = "ここは天国……ここは天国……！"
2003705-92 = "（ザザ……ザザッ……）"
2003705-93 = "[s] \"連絡来てるよ？\""
2003705-94 = "良いの良いの。#nどうせ、適当に呼び出して雑用を押し付けるだけだから。"
2003705-95 = "私たちは、このまま天国を味わってれば……。"
2003705-96 = "（ピピピッ）"
2003705-97 = "あれ？"
2003705-98 = "携帯に連絡が……。"
2003705-103 = "「本部の休憩所に来てください」……？"
2003705-104 = "[s] \"緊急の任務かもしれないね。\""
2003705-105 = "うーん。#nまあ、わざわざ携帯に連絡してくるくらいだし。"
2003705-106 = "仕方ないから、行ってあげるとするかぁ。"
2003705-107 = "べ、別にここを離れたかったわけじゃないけどね！？"
2003705-111 = "ウォーターパークライフセーバー休憩室"
2003705-113 = "失礼するよ～。"
2003705-114 = "うわっ、エアコンガンガンじゃん！#n生き返る……。"
2003705-115 = "あっ、やっと来てくださったんですね！"
2003705-116 = "ずっと無線で連絡してたんですよ！"
2003705-117 = "パラダイ……いや、担当場所の電波が悪かったんだよね。"
2003705-118 = "でも、安心してよ。"
2003705-119 = "ライフセーバーとしての仕事は全うしてたから！"
2003705-120 = "……なんと、それは本当ですか！"
2003705-121 = "もっと早く携帯に連絡を入れれば良かったですね……。"
2003705-122 = "まさか、休憩時間中もお仕事をしていたとは！"
2003705-123 = "いやいや、私はやるべきことを……。"
2003705-127 = "……えっ？"
2003705-128 = "実は、1時間前から休憩を取っていたんです。"
2003705-129 = "頑張っている皆さんに、#nドーナッツの差し入れもあったんですが……。"
2003705-130 = "ドーナッツ！？"
2003705-131 = "もう全て、なくなってしまったようですね。"
2003705-132 = "冷たい飲み物も、たくさんあったんですけど……。"
2003705-133 = "そ、そんな……。"
2003705-134 = "休憩時間を返上してまで、#nパークのために頑張ってくださったフブキさんに……。"
2003705-135 = "皆さん、拍手を！"
2003705-140 = "まさにライフセーバーの鑑です！[ruby=ねむがき]合歓垣[/ruby]フブキさん！"
2003705-141 = "ええと……わ、私は別にそんなつもりじゃ……"
2003705-145 = "ううっ……。"
2003705-146 = "いったい私は、何のために……。"
