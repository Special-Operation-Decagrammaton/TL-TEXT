[translation]
10045025-2 = "[log]70名脱落！[/log]"
10045025-4 = "[log]試合終了！[/log]"
10045025-7 = "みんな、ありがとう。おかげで突破できたよ。"
10045025-8 = "お疲れ様でした！"
10045025-10 = "激しい戦いだったね……。"
10045025-11 = "皆さんがいなければ、どうなっていたことか……。"
10045025-13 = "……。"
10045025-14 = "キキョウ？勝ったのに嬉しくないのか？"
10045025-15 = "……髪が濡れた。"
10045025-16 = "濡れるのは、やっぱり嫌い。"
10045025-21 = "……なに？その目。"
10045025-22 = "言いたいことがあるならはっきり言ったら？"
10045025-23 = "いや、そういえば……キキョウが水に入るのって、お風呂の時くらいしか見たことないよな。"
10045025-24 = "濡れて乱れた姿を、他人に見られたくないだけ。"
10045025-26 = "なんか猫っぽいんだよな……。"
10045025-33 = "（猫っぽいと思わせておければ問題ない）"
10045025-34 = "（大事なのは「キキョウは水が嫌い」と認識させること）"
10045025-35 = "（そうすれば、もし水に落ちたとしても堂々と言い訳ができる）"
10045025-36 = "（今のところは計画通り）"
10045025-38 = "皆さん、本当にお疲れさまでしたっ！"
10045025-39 = "この後、少し休憩時間を挟みます。"
10045025-40 = "次の種目に備えて、しっかり休んでくださいね！"
10045025-41 = "[ns] \"次の種目はこれだ！\""
10045025-43 = "[log]暴走ジェットボート！[/log]"
10045025-46 = "ドリフトとダイブを繰り返すジェットボート！#n振り落とされたら失格です！"
10045025-47 = "[ns] \"残り10人になるまで続けるにゃん！\""
10045025-48 = "ライフセーバーさんたちをしっかり配置してますので、皆さん安心して思いっきり楽しんでくださいね、にゃんにゃん！"
10045025-51 = "……嘘でしょ。"
