[translation]
1008006-1 = "Compromisso com a culinária"

1008006-2 = "(Ele parecia estar com problemas, então fui até ele)"

1008006-8 = "...Huh, professor?"

1008006-9 = "Eu vejo. Então você veio aqui porque estava preocupado?"

1008006-10 = "Sempre penso nele como uma pessoa gentil."

1008006-11 = "Mas não importa o quanto seja professor..."

1008006-12 = "Isso pode ser um pouco difícil, certo?"

1008006-13 = "[s1] \"É realmente tão difícil...?\"\n[s2] \"Você não está procurando um restaurante...?\""

1008006-16 = "deixe-me ver……"

1008006-17 = "Sou muito exigente...#nNão importa o quão faminto eu esteja, não posso me comprometer."

1008006-18 = "Não tenho nenhuma intenção de comer comida desleixada..."

1008006-19 = "No local original, ali estaria a loja habitual."

1008006-20 = "Talvez seja aqui que minhas habilidades entram em jogo?"

1008006-21 = "[s3] \"Isso!?\"\n[s4] \"É um problema sério...!\""

1008006-24 = "Claro, certo? Já que você está colocando na boca, é preciso ter cuidado."

1008006-25 = "Basicamente, só como alimentos orgânicos."

1008006-26 = "Mas só porque afirma ser orgânico... você realmente não sabe, certo?"

1008006-27 = "-Você realmente usa ingredientes cultivados organicamente?"

1008006-28 = "A menos que você consiga ler a mente do chef, você não pode confiar nele, certo?"

1008006-29 = "É por isso que você está em apuros."

1008006-30 = "Não estou disposto a fazer concessões só porque é um momento como este. #nÉ melhor não comer do que comer algo meio cozido."

1008006-31 = "--Absolutamente."

1008006-35 = "[ns5] \"Você pode ver claramente a seriedade dele.\"\n[ns6] \"Entendo, Shokuhou é um gourmet gourmet.\""

1008006-38 = "...Talvez."

1008006-39 = "Essa expressão... há alguma coisa nisso?"

1008006-40 = "sim?"

1008006-41 = "Você quer que eu deixe isso para você...? A professora vai cozinhar para mim?"

1008006-42 = "...Oh não?"

1008006-43 = "Mesmo que você me pedisse para apresentá-lo à loja... será que você estava me ouvindo?"

1008006-44 = "Isso não significa que está tudo bem em qualquer lugar..."

1008006-45 = "...Hum?"

1008006-46 = "Você está confiante depois de ouvir isso?"

1008006-50 = "certamente……"

1008006-51 = "Quando você fala isso você fica preocupado, não é?"

1008006-52 = "Eu gostaria de ir lá pelo menos uma vez. #n...Mas, professor."

1008006-53 = "Mesmo que você não use suas habilidades, você pode perceber quando vê, certo?"

1008006-54 = "Se não fosse grande coisa... eu simplesmente sairia da loja, mas não importa, né?"

1008006-55 = "Pois bem, vamos?"

1008006-58 = "...Hum?"

1008006-59 = "Parece uma loja muito boa até agora."

1008006-60 = "Bem, vou deixar o menu para você também."

1008006-61 = "...Eu vejo."

1008006-62 = "--Sim, é isso. O cardápio para seu acompanhante é..."

1008006-63 = "Vou pegar o mesmo também."

1008006-64 = "Muito obrigado, aguarde um momento!"

1008006-66 = "(depois de alguns minutos)"

1008006-73 = "Desculpe por ter feito você esperar, por favor, não tenha pressa!"

1008006-77 = "...Eu vejo."

1008006-78 = "Ele parece estar muito confiante... talvez ele conheça o chef daqui?"

1008006-79 = "...Ah, isso está errado?"

1008006-80 = "Aliás, você tem uma expressão muito relaxada, não é? ...Pode ter sido do seu gosto, mas não é possível que os ingredientes sejam realmente diferentes do que está no rótulo?"

1008006-81 = "...Absolutamente impossível? Hum."

1008006-82 = "\"Absolutamente\"..."

1008006-83 = "...Não é como se eu estivesse duvidando de você, não é? #nNo entanto, me pergunto o que o torna tão confiante."

1008006-84 = "Veja bem, os professores sempre escolhem suas palavras com cuidado, não é? #nClaro, não estou dizendo que seja ruim."

1008006-85 = "É por isso que achei incomum fazer tal declaração."

1008006-86 = "deixe-me ver……"

1008006-87 = "Sinto que o professor já sabe a resposta..."

1008006-91 = "...Acho que minha leitura está correta, afinal?"

1008006-92 = "[s7] \"Na verdade, tem gourmets lá dentro.\"\n[s8] \"Se eles tentarem falsificar comida, esta loja vai explodir.\""

1008006-95 = "Eu realmente não entendo..."

1008006-96 = "Por enquanto, vamos terminar de conversar e comer."

1008006-104 = "......Hehe."

