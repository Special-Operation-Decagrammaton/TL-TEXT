[translation]
1008006-1 = "料理のこだわり"
1008006-2 = "（困っている様子だったので[ruby=しょくほう]、食蜂の[/ruby]元に向かった）"
1008006-8 = "……あれ、先生？"
1008006-9 = "なるほどねぇ、心配して来てくれたんだ？"
1008006-10 = "いつも思うけど、優しい人よねぇ。"
1008006-11 = "でも、いくら先生とはいえ……"
1008006-12 = "これは、ちょ～っと難しいんじゃないかしらぁ？"
1008006-13 = "[s1] \"そんなに難しい問題なの……？\"\n[s2] \"飲食店を探してるんじゃないの……？\""
1008006-16 = "そうねぇ……"
1008006-17 = "どうしても、こだわりがあって……#nいくら空腹に陥ろうとも、妥協は許されないのよ。"
1008006-18 = "いい加減な食事を摂るつもりは無いというかぁ……"
1008006-19 = "元の場所なら、いつものお店があるんだけどねぇ。"
1008006-20 = "もしかして、これは能力の出番かしらぁ？"
1008006-21 = "[s3] \"そこまで！？\"\n[s4] \"深刻な問題なんだね……！\""
1008006-24 = "当然でしょう？自分の口に入れるのだから、慎重力が必要だわぁ。"
1008006-25 = "私は基本的に、オーガニック料理しか口にしないのよねぇ。"
1008006-26 = "でもぉ、オーガニックを謳ってるからといって……実際は分からないでしょう？"
1008006-27 = "――本当に、有機栽培された食材を使っているのか。"
1008006-28 = "シェフの心を読まない限り、信用できないじゃなぁい？"
1008006-29 = "だから困ってるのよねぇ。"
1008006-30 = "こんな時だからって、妥協する気は無いわぁ。#n中途半端な物を食べるくらいなら、食べない方がマシだもの。"
1008006-31 = "――絶対にね。"
1008006-35 = "[ns5] \"本気力がよく伝わってくるよ。\"\n[ns6] \"なるほど、食蜂は美食家なんだね。\""
1008006-38 = "……ひょっとして。"
1008006-39 = "その表情……何か当てがあるのかしら？"
1008006-40 = "ん？"
1008006-41 = "任せてほしい……？先生が料理してくれるとかぁ？"
1008006-42 = "……あら、違うの？"
1008006-43 = "お店を紹介する、って言われてもぉ……私の話、聞いてたのかしら？"
1008006-44 = "どこでも良いってわけじゃ――"
1008006-45 = "……ふぅん？"
1008006-46 = "聞いたうえで自信がある、と……？"
1008006-50 = "たしかに……"
1008006-51 = "そこまで言われると、気になってくるわねぇ？"
1008006-52 = "一度くらい、行ってみようかしら。#n……でもぉ、先生。"
1008006-53 = "能力なんて使わなくても、見たら分かるものよ？"
1008006-54 = "もし大したことなかったらぁ……そのままお店を出るけど、構わないわよね？"
1008006-55 = "じゃ、行きましょうか？"
1008006-58 = "……ふぅん？ "
1008006-59 = "今のところ、結構良さそうなお店ね。"
1008006-60 = "じゃ、メニューも先生に任せるわ。"
1008006-61 = "……なるほどねぇ。"
1008006-62 = "――はい、こちらですね。お連れ様のメニューは……"
1008006-63 = "私も同じものを頂くわ。"
1008006-64 = "かしこまりました、少々お待ちください！"
1008006-66 = "（数分後）"
1008006-73 = "お待たせしました、ごゆっくりどうぞ！"
1008006-77 = "……なるほどねぇ。"
1008006-78 = "自信力があるみたいだけどぉ……もしかして、ここのシェフと知り合いだとかぁ？"
1008006-79 = "……あら、違った？"
1008006-80 = "それにしては、随分と余裕力のある表情ねぇ？……先生の口には合ったかもしれないけど、実は表示と異なる食材を使用してるかもしれないじゃない？"
1008006-81 = "……絶対にあり得ない？ふぅん。"
1008006-82 = "「絶対」ねぇ……。"
1008006-83 = "……疑ってるわけじゃないわよ？#nただ、そこまで自信力がある理由は何だろうって。"
1008006-84 = "ほら、いつも先生は、言葉を慎重に選んでるじゃない？#nもちろん、それが悪いとは言わないけどぉ。"
1008006-85 = "だからこそ、こうして断言するのは珍しいなと思ったのよ。"
1008006-86 = "そうねぇ……"
1008006-87 = "先生は、すでに答えを知っている……そんな気がするわぁ。"
1008006-91 = "……やっぱり、私の読みは間違ってないのね？"
1008006-92 = "[s7] \"実は、[ruby=ココ]キヴォトス[/ruby]にも美食家がいるんだ。\"\n[s8] \"食品偽装をしようものなら、この店は爆破されてるからね。\""
1008006-95 = "よく分からないわぁ……。"
1008006-96 = "とりあえず、お話はここまでにして食べましょうか？"
1008006-104 = "…………ふふっ。"
