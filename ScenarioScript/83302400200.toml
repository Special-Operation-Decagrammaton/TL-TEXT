[translation]
83302400200-6 = "Ora, Hina-san. Não esperava que viesse mesmo estando tão ocupada."
83302400200-7 = "Fico um pouco nervosa, hehe."
83302400200-15 = "……Haruna. Acho que nem preciso perguntar, mas vou perguntar mesmo assim."
83302400200-16 = "Por que você sequestrou a Fuuka?"
