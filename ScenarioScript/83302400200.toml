[translation]
83302400200-6 = "あら、ヒナさん。お忙しいなか来てくださるなんて。"
83302400200-7 = "少々緊張してしまいますわ、ふふっ。"
83302400200-15 = "……ハルナ。聞くまでもないと思うけど、一応聞いておく。"
83302400200-16 = "どうしてフウカを誘拐したの？"
83302400200-17 = "ふふっ、それはもちろん！"
83302400200-18 = "今回フウカさんが万魔殿の依頼を受けて作っているパーティー料理の数々……"
83302400200-19 = "それを、ただ万魔殿の方々だけで味わうのは、もったいないと思いませんか？"
83302400200-20 = "なので、他でもないこの私が美食研究会の会長として……"
83302400200-21 = "先に味見をするべきだと思っただけですわ！"
83302400200-22 = "そう……聞くまでもなかったわ。"
83302400200-23 = "何度捕まっても、あなた達は変わらないのね。"
83302400200-24 = "美食のためなら、どんなことも厭わないのが私たち美食研究会ですから。"
83302400200-25 = "じゃあ、話はここまで。当分そこで反省してなさい。"
83302400200-32 = "ふふっ……はい。では、またお会いする日を楽しみにしていますわ。"
