[translation]
10037110-1 = "Epílogo; Sentindo saudades do amigo que partiu"
10037110-2 = "Então já é hora de nos despedirmos... passou rápido demais."
10037110-3 = "Fufu, parece que você ficou muito satisfeita com o intercâmbio desta vez, Secretária-Geral Cherino."
10037110-5 = "Isso é bom. E quanto a nós, de Shanhaijing... como foi?"
10037110-9 = "Bem, Shanhaijing foi..."
10037110-14 = "Uma grande aventura!"
10037110-15 = "Cenários misteriosos, comidas que provei pela primeira vez... pandas, a ópera de Pequim... tudo foi muito divertido!"
10037110-17 = "Peço perdão pelos vários problemas causados pelo pessoal da Ópera de Pequim."
10037110-18 = "Líder Kisaki, quantas vezes terei que dizer?"
10037110-19 = "Tanto a humildade quanto o pedido de desculpas, se forem excessivos, acabam tendo o efeito contrário. Entendido?"
10037110-20 = "Eu, a Secretária-Geral de Red Winter, não me importo com essas pequenas coisas!"
10037110-21 = "...Entendo."
10037110-23 = "Sim, Líder. A Presidente Cherino é uma pessoa muito generosa!"
10037110-24 = "Kaguya e o pessoal da Ópera de Pequim provavelmente foram sentenciados a duas ou três semanas limpando banheiros agora mesmo!#nNão é ótimo assim?"
10037110-30 = "(...Penso comigo mesma... parece que há muitas diferenças entre as leis de Shanhaijing e o regulamento escolar de Red Winter.)"
10037110-31 = "A técnica de conquista de corações da Líder Kisaki, feita de forma tão natural, foi impressionante."
10037110-32 = "Parece que servirá de referência para a minha propaganda... perdão, para o meu método de persuadir as pessoas."
10037110-33 = "...Hu, hum. É mesmo?"
10037110-35 = "Mas você parece pálida, Líder Kisaki. Aconteceu alguma coisa?"
10037110-36 = "Eu estou saudável, sabia?"
10037110-37 = "É mesmo...?"
10037110-38 = "Bem... para comemorar esta ocasião, preparei um pequeno presente.#nVocê poderia aceitá-lo?"
10037110-44 = "Isto é... um panda?"
10037110-45 = "É um modelo de panda feito com contas de três cores.#nÉ algo simples, mas queria que você se lembrasse de Shanhaijing."
10037110-46 = "I-Incrível, Líder!#nO padrão preto e branco do panda foi desenhado com tanta perfeição...!#nAté aquele estilo adorável foi reproduzido...!"
10037110-47 = "Sinto como se estivesse olhando para um panda de verdade!"
10037110-48 = "Fufu, fico feliz que tenha gostado."
10037110-50 = "Agradeço! Vou deixar exposto no meu escritório!#nUm dia, quero convidar a Líder Kisaki para a nossa Red Winter!"
10037110-51 = "Ah, estarei esperando por esse dia, Secretária-Geral Cherino."
10037110-60 = "Ufa... finalmente, consegui voltar."
10037110-61 = "Deixei a Chefe do Incenso... a Chefe de Relações Públicas, cuidando da despedida, ela deve saber como lidar com isso."
10037110-65 = "..."
10037110-66 = "...Estou preocupada."
10037110-74 = "Será que, a partir do incidente da Ópera de Pequim desta vez, não surgirão novas \"mudanças\"?"
10037110-75 = "Kaguya não é a raiz. Tudo começou por minha causa."
10037110-78 = "Não... não importa o que aconteça dentro de Shanhaijing—"
10037110-79 = "Se as flores caírem, se houver uma inundação, ou se um raio cair—tudo é minha responsabilidade."
10037110-80 = "—Esse é o dever de uma Líder."
10037110-85 = "Mas, agora..."
10037110-87 = "Quero apenas um pouco de descanso."
10037110-95 = "...Como está sendo a estadia, Chefe Kaguya?"
10037110-96 = "Ah, graças a você, estou muito confortável. Chefe Executiva Mina."
10037110-97 = "Dizendo coisas que não sente..."
10037110-98 = "Não é uma questão de etiqueta fechar os olhos para o blefe alheio?"
10037110-102 = "Tanto faz.#nSerei direta—por que fez isso?"
10037110-103 = "..."
10037110-104 = "Por lealdade—apenas isso."
10037110-105 = "Em um local onde os visitantes de Red Winter e o Xuanlongmen estavam reunidos,#nvocê apresentou aquele tipo de ópera e,#nalém disso, tentou causar dano à Líder! Isso é lealdade!?"
10037110-106 = "O crime que você cometeu é o suficiente para ser expulsa agora mesmo, sabia!?"
10037110-107 = "Você continua sendo uma serva leal e estúpida, Chefe Executiva Mina."
10037110-108 = "Quando o Mestre do Portão toma uma decisão errada, é um dever de lealdade oferecer uma advertência!"
10037110-109 = "……Decisão errada? Você quer dizer ter convidado as alunas de Red Winter?"
10037110-110 = "Mesmo que tenha sido vocês, do Clube de Ópera de Pequim, que causaram o tumulto?"
10037110-111 = "As ações do Mestre do Portão contrariam a ordem celestial. #nSegui-lo cegamente, apesar disso, não é o caminho da verdadeira lealdade."
10037110-112 = "Ah, o Mestre do Portão é certamente uma pessoa sábia. #n— No entanto, ele tem a tendência de tentar resolver as coisas de forma arbitrária."
10037110-114 = "O que disse!?"
10037110-115 = "Você também deve saber. Sobre a punição de Shintani Kai."
10037110-120 = "O que você está..."
10037110-126 = "Ah, é verdade. #nAs circunstâncias entre o Clube de Pesquisa de Alquimia e Shanhaijing são... bem, não faz sentido perguntar a você agora."
10037110-127 = "……Dentro do Clube de Pesquisa de Alquimia, as buscas já começaram."
10037110-128 = "Eu não tenho escolha a não ser me esconder."
10037110-129 = "Se você desaparecer agora, não seria o mesmo que admitir que é o culpado?"
10037110-130 = "Não há o que fazer. De qualquer forma, não espero nada do atual Clube de Pesquisa de Alquimia."
10037110-131 = "Heh... Kaguya, e você também, realmente... #nParece que aqui só tem gente de uma nota só."
10037110-132 = "Sr. Kai. Posso perguntar sobre o que vocês conversaram naquele dia com a presidente do Clube de Ópera de Pequim?"
10037110-133 = "Ah, não foi nada demais."
10037110-135 = "Ela apenas disse que Kaguya me faria retornar ao Clube de Pesquisa de Alquimia."
10037110-139 = "……!?"
10037110-142 = "……Você quer dizer que deveríamos trazer Shintani Kai de volta ao Clube de Pesquisa de Alquimia?"
10037110-143 = "Você tem noção do que está dizendo!?"
10037110-145 = "Isso é o que dita a razão!"
10037110-146 = "Para começar, o caso da expulsão de Shintani Kai foi apressado demais! #nE isso sem seguir nenhum dos procedimentos habituais!"
10037110-150 = "……!"
10037110-151 = "Sem seguir os trâmites adequados, ordenaram a expulsão imediata. #nE ainda por cima, apagaram todos os registros sobre Shintani Kai...!"
10037110-152 = "Aquela foi uma decisão tomada por preocupação com a segurança de Shanhaijing!"
10037110-153 = "Se tivéssemos seguido os trâmites, a expulsão de Shintani Kai teria sido adiada por mais de um ano!"
10037110-154 = "Você tem ideia de quantas vítimas teriam surgido nesse meio tempo!?"
10037110-155 = "Mesmo que seja esse o caso, todas as coisas devem ser conduzidas seguindo os procedimentos!"
10037110-156 = "Por mais que seja o Mestre do Portão, ele não pode violar as regras escolares de Shanhaijing arbitrariamente!"
10037110-157 = "Se as regras escolares perderem o sentido, o próprio Mestre do Portão perderá a justificativa para governar Shanhaijing!"
10037110-160 = "Não foi nada importante, mas tivemos uma conversa interessante."
10037110-161 = "Ela disse que, depois de me trazer de volta ao Clube de Pesquisa de Alquimia, seguiria os procedimentos adequados para me expulsar novamente—"
10037110-162 = "E que deveria publicar os registros e os fatos para todos, como um exemplo a ser seguido."
10037110-163 = "……Como esperado da presidente do Clube de Ópera de Pequim."
10037110-164 = "Você pretende... aceitar essa proposta?"
10037110-165 = "Quem sabe. Bem, a ideia de me trazer de volta ao Clube de Pesquisa de Alquimia me deixou curioso."
10037110-166 = "O suficiente para eu dar à Kaguya um novo tema para a ópera."
10037110-170 = "Por um motivo desses, você quer trazer Shintani Kai de volta para expulsá-lo novamente...?"
10037110-174 = "Você é idiota? Acha mesmo que isso é possível!? #nE, para começo de conversa, acha que Shintani Kai voltaria pacificamente!?"
10037110-175 = "Shintani Kai também é um aluno de Shanhaijing. Não há motivo para recusar! #nNão, ele deve fazer isso!"
10037110-176 = "Já chega de egoísmo!"
10037110-178 = "Mesmo que Shintani Kai se recuse a voltar, eu o farei retornar à força!"
10037110-179 = "Para que serve o poder concedido ao Mestre do Portão de Genryumon!"
10037110-180 = "Por que a autoridade do Mestre do Portão de Genryumon é maior do que a de presidentes de conselho estudantil de outras escolas!"
10037110-181 = "Ah...! Tudo é para governar de acordo com as leis de Shanhaijing!"
10037110-187 = "(Até eu sou chamado de rígido pelos outros...)"
10037110-188 = "(Mas esse cara... ele está em um nível completamente diferente...)"
10037110-192 = "E sobre o que acontece depois de voltar ao Clube de Pesquisa de Alquimia? #nÉ claro que vou ignorar tudo."
10037110-193 = "Acha mesmo que eu cairia nessa história de seguir procedimentos para ser expulso de novo?"
10037110-194 = "Mas isso não seria... uma traição?"
10037110-195 = "Você ainda me pergunta isso agora?"
10037110-196 = "……。"
10037110-197 = "Esperei por muito tempo — embora eu já tenha sido encarcerada na Agência Correcional antes..."
10037110-198 = "— Finalmente, este momento chegou."
10037110-199 = "Eu vou recuperar o que é meu. #nNão deixarei ninguém me atrapalhar."
10037110-204 = "Diga a todos —"
10037110-207 = "Que eu — voltei."
10037110-208 = "Gekka Musou"
