[translation]
10047105-3 = "Corredor do dormitório da Equipe de Vigilância de Wild Hunt"
10047105-6 = "[ns] \"Ué? A Equipe de Vigilância não está por aqui.\""
10047105-7 = "Ihi... despistei todos os perseguidores..."
10047105-8 = "Todos devem ter ido em direção ao sino."
10047105-9 = "Lena-chan... será que ela conseguiu escapar?"
10047105-10 = "O som do sino parou... a Equipe de Vigilância vai voltar logo..."
10047105-12 = "[ns] \"Pessoal, vamos rápido!\""
10047105-20 = "Agora, só preciso colocar a fita nesta entrada...!"
10047105-25 = "Essas garotas, quando foi que elas chegaram até aqui...!"
10047105-27 = "Parem todas vocês! Truques baratos não vão mais funcionar!!"
10047105-31 = "...Nyufufufu, vocês chegaram um passo atrasadas. #nA construção do círculo mágico já foi concluída."
10047105-32 = "Chegou a hora! Agora que a lua está cheia, o portal da verdade se abrirá...!"
10047105-36 = "Círculo mágico e lua cheia? N-não pode ser, ela...!"
10047105-37 = "Ela pretende recriar a lenda da academia!?"
10047105-38 = "Sim! Deixem-me mostrar a vocês!!"
10047105-39 = "Círculo de Alquimia Mágica, ativar...!!"
10047105-47 = "G-gaaaah...! A-as forças estão saindo do meu corpo...!!"
10047105-48 = "I-isso é o fim...!"
10047105-49 = "...Não foi só uma luz que acendeu?"
10047105-50 = "Sim."
10047105-51 = "Eu pensei que seria melhor subir nele..."
10047105-56 = "A-ah? Por que nada está acontecendo...?"
10047105-57 = "Eu desenhei o círculo mágico corretamente...!"
10047105-58 = "Então... não existia magia que realizasse desejos..."
10047105-62 = "Mas é uma visão linda. A academia inteira brilhando intensamente..."
10047105-64 = "...Hum."
10047105-65 = "Às vezes, chamamos aqueles que trabalham com joias de \"Artífices da Luz\", como um sinal de respeito."
10047105-66 = "Joia não é uma palavra que se refere apenas a substâncias materiais. #n...A paixão das garotas que buscam seus sonhos. #nIsso também não seria uma bela joia?"
10047105-67 = "Portanto, como alguém que testemunhou isso, eu penso: #nO que está aqui agora é..."
10047105-68 = "--Um belo trabalho de artífice da luz."
10047105-70 = "Chega de conversa, se rendam!"
10047105-71 = "Por causa de vocês, estou privada de sono! Amanhã tenho inspeção logo cedo!"
10047105-92 = "[ns] \"...É o fim, então.\""
10047105-94 = "Espere um momento."
10047105-102 = "[ns] \"Você é...\""
10047105-103 = "Poderia me dar um minuto?"
10047105-104 = "Tenho um recado da Presidente do Conselho para vocês."
10047105-106 = "U-uma pessoa tão importante assim para nós...?"
10047105-107 = "Sim."
10047105-113 = "Boa noite. Meu nome é Manami Uruwashi, Presidente do Conselho."
10047105-114 = "Obrigada pelo trabalho duro até uma hora dessas."
10047105-115 = "Eu gostaria de ter vindo pessoalmente ao local, mas... #npor favor, entendam que as circunstâncias exigiram que fosse desta forma."
10047105-116 = "Bem, sendo direta..."
10047105-120 = "...Fiquei impressionada."
10047105-121 = "Na verdade, já faz um tempo que tenho interesse em vocês do quarto 404."
10047105-122 = "Pensei que, se fossem vocês, seriam capazes de incorporar uma arte fora do comum..."
10047105-123 = "Esta noite, vocês atenderam a essa expectativa."
10047105-124 = "Conectaram o passado e o presente da academia com luz, elevando-os a uma bela forma geométrica... #nÉ uma arte de vanguarda sem precedentes."
10047105-125 = "Gostaria que esta obra fosse exibida daqui em diante, junto com os nomes de todas vocês do quarto 404."
10047105-126 = "Vamos ver... para que todos na academia possam apreciar, #nvou providenciar a construção de um novo observatório."
10047105-127 = "A foto que capturou essa cena não deixa nada a desejar para a minha 'coleção'."
10047105-128 = "Fufufu... Estou ansiosa pelos seus feitos futuros. #nNa próxima oportunidade, por favor, deixe-me visitá-los formalmente."
10047105-129 = "Sou grata por esta criação e pelo nascimento de uma nova arte. #n...Até logo."
10047105-131 = "Nosso círculo mágico... é uma obra de arte magnífica?"
10047105-132 = "Por isso eu disse, não disse? É um belo trabalho de luz."
10047105-133 = "Vocês também... lá no fundo, acharam bonito, não acharam?"
10047105-137 = "Bem... é."
10047105-138 = "Realmente, talvez seja um desperdício desmontar tudo..."
10047105-142 = "Eu... queria criar obras que fossem reconhecidas por todos."
10047105-143 = "Eu queria ser uma artista amada, não uma fracassada."
10047105-144 = "Sempre sorrir com tanta confiança era apenas para esconder minha ansiedade... #nPor isso—"
10047105-145 = "Muito obrigada. Tudo isso é graças a vocês."
10047105-146 = "Sozinha, eu jamais conseguiria..."
10047105-150 = "[ns1] \"Não, isso só foi possível porque você se esforçou, Eri.\"\n[ns2] \"Então, tenha confiança.\""
10047105-153 = "[ns3] \"Este é um país das maravilhas de sonhos e esperanças.\"\n[ns4] \"Porque é um lugar onde os sonhos de todos se realizam.\""
10047105-156 = "Mestre..."
10047105-161 = "Sim...! Eu continuarei me esforçando daqui em diante!"
10047105-162 = "Se estiver com todos... sinto que posso fazer qualquer coisa!"
10047105-176 = "Como eu pensava... ela realmente existe."
10047105-177 = "A magia que realiza desejos — a que eu tanto buscava!"
10047105-179 = "Eu desejo."
10047105-180 = "Que todos aqui... possam realizar seus sonhos."
10047105-181 = "E que, por muito, muito tempo—"
10047105-182 = "Esses dias mágicos continuem acontecendo!"
