[translation]
10047105-3 = "ワイルドハント寮監隊の寮の廊下"
10047105-6 = "[ns] \"あれ？こっちには寮監隊がいないね。\""
10047105-7 = "イヒッ……追っ手は全部、まいたから……。"
10047105-8 = "みんな、鐘の方に向かったのでしょう。"
10047105-9 = "レナちゃん……うまく逃げられたでしょうか。"
10047105-10 = "鐘の音が止まった……もうじき、寮監隊が戻ってくる……。"
10047105-12 = "[ns] \"みんな、急ごう！\""
10047105-20 = "あとは、この入口にテープを……！"
10047105-25 = "こいつら、いつの間にうちまで……！"
10047105-27 = "全員止まれっ！もう小細工は通用しないぞ！！"
10047105-31 = "……にゅふふふ、一足、遅かったですね。#n既に魔法陣の構築は完了しました。"
10047105-32 = "時が来ました！月が満ちた今、真理の扉が開きます……！"
10047105-36 = "魔法陣と満月？ま、まさかあいつ……！"
10047105-37 = "学院の言い伝えを再現する気か！？"
10047105-38 = "ええ！お見せしましょう！！"
10047105-39 = "魔法錬成陣、発動……！！"
10047105-47 = "ぐ、ぐあああっ……！か、体から力が抜けていく……！！"
10047105-48 = "こ、ここまでか……！"
10047105-49 = "……明かりが点いただけでは？"
10047105-50 = "うん。"
10047105-51 = "乗っかったほうがいいのかなって……。"
10047105-56 = "あ、あれ？どうして何も起こらないのでしょう……？"
10047105-57 = "魔法陣はちゃんと、描いたはず……！"
10047105-58 = "願いが叶う魔法は……なかった、のかぁ……。"
10047105-62 = "でも、美しい光景です。学院中がキラキラと輝いて……。"
10047105-64 = "……ふむ。"
10047105-65 = "私たちは、宝石を扱う方々に敬意を込めて「光の細工師」と呼ぶことがあります。"
10047105-66 = "宝石とは、物質だけを称する言葉ではありません。#n……夢に向かう少女たちの情熱。#nこれもまた、美しい宝石ではないでしょうか。"
10047105-67 = "ゆえに、立ち会う一人として、私は思うのです。#n今、ここにあるのは――"
10047105-68 = "――美しき光の細工である、と。"
10047105-70 = "御託はいいから投降しろ！"
10047105-71 = "あんたらのせいで寝不足なんだよ！明日も朝から検問なんだ！"
10047105-92 = "[ns] \"……ここまで、か。\""
10047105-94 = "お待ちください。"
10047105-102 = "[ns] \"君は……。\""
10047105-103 = "少しよろしいでしょうか？"
10047105-104 = "評議会長からみなさんに、言伝がありまして。"
10047105-106 = "そ、そんな偉い方が私たちに……？"
10047105-107 = "ええ。"
10047105-113 = "こんばんは。評議会長の[ruby=うるわし]雲類鷲[/ruby]マナミと申します。"
10047105-114 = "こんな真夜中までご苦労様です。"
10047105-115 = "現場に駆けつけたいところでしたが……#nこのような形になること、ご了承ください。"
10047105-116 = "さて、率直に申し上げますと……。"
10047105-120 = "……感服いたしました。"
10047105-121 = "実は私、前々から404号室のみなさんに興味を持っておりまして。"
10047105-122 = "きっとこの方々ならば、型破りな芸術を体現できるだろう……と。"
10047105-123 = "今宵、みなさんはその期待に応えてくださいました。"
10047105-124 = "学院の過去と現在を光で結び、美しき図形に昇華させた……#nこれまで類を見ない前衛芸術です。"
10047105-125 = "こちらの作品は、404号室のみなさんの名と共に、#nこの先も展示させていただきたいと考えております。"
10047105-126 = "そうですね……学院の誰もが鑑賞できるよう、#n展望台の新設を働きかけましょう。"
10047105-127 = "その光景を収めた写真は、私の「コレクション」として遜色ないでしょう。"
10047105-128 = "ふふふ……これからのご活躍が楽しみです。#n次の機会には、ぜひ正式にお伺いさせてください。"
10047105-129 = "此度の創作と、新たな芸術の誕生に感謝を。#n……それでは。"
10047105-131 = "私たちの魔法陣が……見事な芸術作品？"
10047105-132 = "ですから、言いましたよね。美しき光の細工だと。"
10047105-133 = "君らも……本当は綺麗だと思ったよねぇ？"
10047105-137 = "まぁ……うん。"
10047105-138 = "たしかに片づけるのは勿体ないかもな……。"
10047105-142 = "私は……みんなに認められる作品を作りたかった。"
10047105-143 = "落ちこぼれじゃなく、愛されるアーティストになりたかった。"
10047105-144 = "いつも自信満々に笑っていたのも、焦りを誤魔化すためで……。#nだから――"
10047105-145 = "ありがとうございます。すべてみんなのおかげです。"
10047105-146 = "私一人では、とても……。"
10047105-150 = "[ns1] \"ううん、エリが頑張ったからできたことだよ。\"\n[ns2] \"だから、自信を持ってね。\""
10047105-153 = "[ns3] \"ここは夢と希望のワンダーランド。\"\n[ns4] \"みんなの夢が叶う場所だから。\""
10047105-156 = "マスター……。"
10047105-161 = "はい……！私、これからも頑張ります！"
10047105-162 = "みんなと一緒なら……何でもできる気がするんです！"
10047105-176 = "やはり……実在しました。"
10047105-177 = "私が追い求めていた――願いを叶える魔法は！"
10047105-179 = "願っています。"
10047105-180 = "ここでみんなが……夢を叶えられるように。"
10047105-181 = "そして、ずっと、ずっと――"
10047105-182 = "こんな魔法みたいな日々が、続きますように！"
