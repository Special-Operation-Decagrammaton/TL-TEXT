[translation]
2005702-1 = "Este é o meu dia a dia"
2005702-4 = "Ah, Sensei!"
2005702-5 = "Olá, Sensei! Você estava me observando ali atrás?"
2005702-6 = "Do seu ponto de vista, como foi?"
2005702-7 = "[s] \"Vocês estavam falando de coisas bem avançadas... talvez seja um pouco difícil.\""
2005702-8 = "Não é tão difícil assim! Que tal pesquisarmos juntos na próxima vez?"
2005702-22 = "Ah, Akane..."
2005702-23 = "...san."
2005702-25 = "Ora, olá."
2005702-26 = "..."
2005702-27 = "Estou muito feliz por encontrar o Sensei assim."
2005702-29 = "Akane... san, você gostaria de conversar com a gente também?"
2005702-31 = "..."
2005702-32 = "Agradeço o convite, mas..."
2005702-33 = "Fufu. Parece que vou atrapalhar vocês, então vou me retirar."
2005702-34 = "Com licença."
2005702-38 = "[ns] \"Akane...?\""
2005702-39 = "Ela foi embora..."
2005702-40 = "Mas ela não ia atrapalhar em nada..."
2005702-41 = "A Akane é... como posso dizer, sinto que existe uma certa distância, como se houvesse uma barreira."
2005702-44 = "É verdade."
2005702-45 = "Bem, ela parece estar ocupada com a C&C, então não tem jeito."
2005702-48 = "Não é um pouco estranho?#nA Akane ser uma agente de uma organização secreta."
2005702-49 = "Acho que esse jeito dela é um ponto forte na C&C."
2005702-50 = "Ela faz tudo o que pedimos, é educada.#nE é forte... parece uma super-humana perfeita, não?"
2005702-51 = "Será que é por isso?"
2005702-52 = "Pode ser, né? Ela é um pouco difícil de se aproximar."
2005702-57 = "[ns] (...)"
2005702-59 = "[ns] (Estou preocupado com o comportamento da Akane)"
2005702-69 = "Você já vai voltar?"
2005702-70 = "[s] \"Akane!\""
2005702-72 = "[ns] \"Por acaso, você estava me esperando?\""
2005702-73 = "Sim. Já que o Sensei veio até aqui.#nComo sua empregada, é natural que eu o receba."
2005702-74 = "Então, por favor, tome cuidado no caminho de volta.#nEu me despeço por aqui."
2005702-75 = "[s] \"E-eh...?\""
2005702-78 = "A Akane é... como posso dizer, sinto que existe uma certa distância, como se houvesse uma barreira."
2005702-79 = "É verdade."
2005702-80 = "Ela faz tudo o que pedimos, é educada.#nE é forte... parece uma super-humana perfeita, não?"
2005702-81 = "Pode ser, né? Ela é um pouco difícil de se aproximar."
2005702-83 = "[ns] \"Espere!\""
2005702-85 = "Aconteceu alguma coisa?"
2005702-86 = "Quer... ir embora comigo?"
2005702-90 = "..."
2005702-91 = "Como desejar, meu mestre."
2005702-92 = "Obrigada por me acompanhar."
2005702-93 = "Ora... é mesmo? Entendido."
2005702-94 = "Bem... já que estou usando o uniforme.#n...Sensei."
2005702-95 = "Então, por um breve momento, conto com você."
2005702-103 = "(Caminhei pelo caminho ao entardecer junto com a Akane)"
2005702-104 = "(Um silêncio indescritível continua...)"
2005702-107 = "[ns] \"Ei...\""
2005702-108 = "Sim, aconteceu alguma coisa?"
2005702-109 = "Você acha que eu estou agindo de um jeito diferente do habitual...?"
2005702-110 = "É que..."
2005702-111 = "...Peço desculpas, Sensei."
2005702-112 = "Eu sempre sou assim enquanto estou na escola, mas..."
2005702-113 = "[s1] \"E-entendo...\"\n[s2] \"Como é o seu relacionamento com elas?\""
2005702-116 = "Com elas?"
2005702-117 = "Acho que conversamos apenas ocasionalmente na sala de aula... Quando temos atividades do clube, dou prioridade a isso, mas..."
2005702-118 = "Costumamos conversar bastante."
2005702-120 = "(Mais uma vez, um silêncio indescritível se prolongou...)"
2005702-123 = "Sensei?"
2005702-124 = "[s] \"Ah, sim?\""
2005702-125 = "Você ainda está curioso, não é?"
2005702-126 = "[s] \"Sim...\""
2005702-127 = "..."
2005702-131 = "Pois é. Eu sempre sou assim."
2005702-132 = "Na C&C... é a mesma coisa."
2005702-133 = "A nossa líder, apesar daquele jeito, se preocupa com quem está ao redor, e é querida pelas pessoas, para o bem ou para o mal."
2005702-134 = "A Asuna-senpai também... na verdade, ela é do tipo que faz amizade com qualquer um rapidamente."
2005702-135 = "A Karin... hehe. Ela parece passar o tempo como se fossem aliadas com as outras garotas que, raramente para o Millennium, também não são boas em matemática."
2005702-136 = "A Toki-chan..."
2005702-137 = "..."
2005702-138 = "Hehe. A Toki-chan não te dá vontade de estender a mão para ajudar?"
2005702-139 = "..."
2005702-140 = "Mas eu sou diferente. Não é que eu não consiga conversar com ninguém."
2005702-141 = "Em outras palavras, eu não deixo ninguém... se aproximar além de uma certa distância."
2005702-145 = "É a primeira vez que vejo essa expressão no seu rosto, Sensei. Hehe."
2005702-146 = "Você também acha que seria melhor se eu me desse bem com as pessoas?"
2005702-147 = "[s] \"Hum... Não acho isso.\""
2005702-148 = "Hã...?"
2005702-149 = "Você realmente acha que eu não preciso mudar...?"
2005702-150 = "[s3] \"Sim. Se a Akane está bem assim, acho que não tem problema.\"\n[s4] \"Existem pessoas assim no mundo, afinal.\""
2005702-153 = "Manter distância das pessoas não seria algo ruim?"
2005702-154 = "Não seria melhor conseguir ter um relacionamento profundo com todos para que as coisas fluam melhor?"
2005702-155 = "[s5] \"Mas, isso...\"\n[s6] \"Não seria algo que algumas pessoas sentiriam como uma imposição?\""
2005702-158 = "..."
2005702-159 = "Que o importante são os meus próprios sentimentos."
2005702-160 = "Como eu me sinto... entendo."
2005702-161 = "[s7] \"Sim. Acho que está tudo bem assim.\"\n[s8] \"Mas isso é apenas o que eu penso, claro.\""
2005702-180 = "Ah...?"
2005702-183 = "[ns] \"Akane?\""
2005702-184 = "Não."
2005702-185 = "Desculpe."
2005702-189 = "..."
2005702-190 = "Eu... na verdade."
2005702-191 = "Talvez, só um pouquinho."
2005702-193 = "Parece que eu estava me sentindo sozinha."
2005702-194 = "Eu achei que estava tudo bem."
2005702-195 = "Desculpe, Sensei."
2005702-196 = "Eu... sinto muito mesmo."
2005702-199 = "[ns] \"Está tudo bem.\""
2005702-201 = "[ns] \"Se a Akane quer se esforçar, eu vou te apoiar.\""
2005702-206 = "……Sim."
