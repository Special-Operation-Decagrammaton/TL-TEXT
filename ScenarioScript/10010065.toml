[translation]
10010065-1 = "Episódio 6; O Flashbang que Corre em Trinity (2)"
10010065-5 = "Cof, cof...!"
10010065-6 = "Ei, a gente perdeu de novo!?"
10010065-7 = "Não, não, não! Não era só um oponente, né!!"
10010065-8 = "Quem é aquele ali que apareceu do nada...!"
10010065-10 = "P-por favor, parem com a briga...! Primeiro, vamos nos acalmar e conversar...!"
10010065-11 = "É estranho você dizer isso depois de atirar, não é!?"
10010065-12 = "Você mesma disparou um monte com essa metralhadora agora pouco..."
10010065-13 = "I-isso é porque eu precisava parar essa situação de qualquer jeito..."
10010065-14 = "...Obrigada pela ajuda. Não sei quem são vocês, mas agradeço."
10010065-15 = "E, ali também..."
10010065-16 = "Ué, Sensei...?"
10010065-17 = "[s1] \"Olá, Suzumi.\"\n[s2] \"Você se machucou?\""
10010065-18 = "O-olá. Faz tempo que não nos vemos."
10010065-19 = "S-sim. Graças a você, estou bem."
10010065-20 = "A propósito, Sensei, por que você está aqui...?"
10010065-21 = "Procurando algo?"
10010065-22 = "Entendo... então você estava no meio de uma missão de ajuda."
10010065-23 = "Como esperado do Sensei. Saber que você está por aí agindo assim me dá coragem também."
10010065-24 = "Já que estamos aqui, eu adoraria ajudar, mas... o que exatamente você está procurando?"
10010065-26 = "Musgocola...?"
10010065-27 = "Entendo... sinto muito, minha ignorância me impediu de conhecer..."
10010065-28 = "Mas, isso é usado em prédios antigos, certo? Eu me lembro de alguns \"entulhos antigos\", quer ir dar uma olhada lá?"
10010065-29 = "Às vezes, materiais antigos são descartados em vãos de prédios."
10010065-30 = "Costumo ver isso durante minhas patrulhas, e tenho certeza que é por ali..."
10010065-35 = "...!"
10010065-36 = "E-ei, espera aí!"
10010065-37 = "...? Hum, você está sentindo alguma dor forte em algum lugar?"
10010065-38 = "Não se preocupe, sua idiota! Mais importante, esse papo de \"entulhos antigos\", você não está falando de...!"
10010065-39 = "Você está falando do nosso esconderijo!?"
10010065-40 = "Hum...? Ah, é por ali? Com certeza, talvez seja bem perto mesmo."
10010065-41 = "Então você quer dizer que... vai nos expulsar e demolir nosso esconderijo!?"
10010065-42 = "Não, não é nesse sentido..."
10010065-43 = "Eu só pensei que, se houvesse algo que não estivessem usando, poderiam me ceder um pouco..."
10010065-44 = "Monstro! Demônio! Desalmada! Flashbang!!"
10010065-45 = "M-monstro, eu...?"
10010065-46 = "A gente também, a gente também, poxa...!!"
10010065-47 = "É, a gente também se esforça, se esfo... buáááááá!!"
10010065-48 = "H-hum..."
10010065-49 = "Não foi essa a minha intenção, sinto muito, parece que fiz vocês chorarem... por enquanto, peguem um lenço..."
10010065-50 = "[s3] \"...Que tal tentarmos conversar primeiro?\"\n[s4] \"Pode nos deixar ouvir a história toda antes?\""
10010065-51 = "É verdade... vocês poderiam me contar?"
10010065-52 = "É verdade... vocês poderiam me contar?"
10010065-54 = "Snif, ué... se nos expulsarem de lá, onde é que a gente vai ficar?!"
10010065-55 = "A gente não faz bicos de extorsão (?) porque quer! Como seria bom se pudéssemos ter um emprego decente!"
10010065-56 = "A gente sempre é reprovada na análise de currículo de empregos normais..."
10010065-57 = "Nossas notas são o que são, então nem no dormitório a gente entra, e pagar um aluguel digno é impossível."
10010065-58 = "Entendeu? \"Viver normalmente\" é um privilégio que a gente não tem..."
10010065-59 = "Provavelmente é inútil falar isso para vocês..."
10010065-61 = "Isso é..."
10010065-62 = "[s5] \"Então, a minha――\"\n[s6] \"Se não se importar, a do Schale――\""
10010065-65 = "Se for do agrado de vocês, é claro."
10010065-68 = "[ns] \"……Hinata?\""
10010065-69 = "……?"
10010065-71 = "Quem é você……?"
10010065-72 = "Vocês não gostariam de vir conosco para ajudar na catedral?"
10010065-73 = "……Na catedral, ajudar?"
10010065-74 = "Isso significa que você…… por acaso, é da Sisterhood?"
10010065-75 = "S-sim. Como pode ver, estou usando o hábito de irmã……?"
10010065-76 = "……Não, não, não."
10010065-77 = "Depois de ver aquele seu estilo de combate, ninguém diria que você é uma irmã, guha!?"
10010065-82 = "É uma irmã, sim. De qualquer ângulo que se olhe, é uma irmã."
10010065-83 = "Bem, no começo eu achei que você fosse uma perseguidora de granadas de luz, fantasiada de irmã da Trinity, mas……"
10010065-84 = "F-fantasia, você diz……"
10010065-85 = "Eu sou, de fato, uma irmã da Sisterhood."
10010065-86 = "Entendi um pouco da situação. Sinto muito por não saber de tudo isso até agora……"
10010065-90 = "Vocês não gostariam de nos deixar ajudar, nem que fosse um pouco?"
10010065-92 = "Se for trabalho voluntário, estamos sempre aceitando."
10010065-94 = "Não é um lugar para ganhar dinheiro, então não podemos oferecer um salário diário, mas…… podemos oferecer abrigo e comida."
10010065-95 = "Talvez não se adaptem, ou talvez tenham outros trabalhos que queiram fazer. Nesse caso, depois de passarmos um tempo juntos, também podemos fornecer uma carta de recomendação."
10010065-97 = "Pode ser difícil enquanto não estiverem acostumados……"
10010065-98 = "Mas nós também faremos o nosso melhor para ajudar."
10010065-105 = "P-por que fazer algo assim……"
10010065-106 = "O que você ganha fazendo isso……"
10010065-107 = "Não se trata de ganhar ou perder. Nós somos a Sisterhood."
10010065-108 = "Não pode ser……"
10010065-110 = "O objetivo da Sisterhood é que todos da Trinity, não, que todos aqui em Kivotos possam viver em paz…… e com felicidade."
10010065-111 = "Se pudermos resolver os problemas de vocês e proporcionar dias mais tranquilos, não há alegria maior do que essa."
10010065-112 = "N-não vou ser enganado……"
10010065-113 = "Com uma conversa tão boa e palavras tão bonitas, nós……"
10010065-114 = "……Uaaaaaaah!!"
10010065-115 = "!?"
10010065-116 = "……!?"
10010065-117 = "[s7] \"…….\"\n[s8] \"……Foi difícil, não foi?\""
10010065-118 = "Se for assim, então poderemos ter um trabalho normal, certo……?"
10010065-119 = "Se for assim, então poderemos ter um trabalho normal, certo……?"
10010065-120 = "Não precisaremos ficar preocupados se o Comitê de Justiça está no cinema, certo? Poderemos ir ao café e ao fliperama, certo?"
10010065-121 = "Eu aceito, por favor, me deixe fazer isso……!"
10010065-122 = "Sim. Vamos suar juntos,"
10010065-126 = "tomar banho,"
10010065-128 = "e comer juntos. Não precisam se preocupar com nada."
10010065-130 = "Ugh, uuuuuuu……!"
10010065-131 = "Obrigada por conversar comigo."
10010065-135 = "……"
10010065-136 = "[ns] \"Podemos considerar que foi resolvido, certo?\""
10010065-137 = "É. Bem……"
10010065-138 = "……Faça o que quiser. Seja o esconderijo ou a cola, isso não é mais problema nosso."
10010065-143 = "No meio do caminho, eu não consegui dizer nada, mas…… obrigada."
10010065-144 = "N-não, não é nada, não é como se eu pudesse fazer muita coisa, mas……"
10010065-145 = "Escolher um novo caminho, tomar uma decisão…… nessas horas, é bom ter alguém para ajudar."
10010065-146 = "Isso é... porque é algo que alguém precisa fazer."
10010065-148 = "……！"
10010065-152 = "……Sim, é verdade."
10010065-154 = "……Muito obrigada, de verdade."
