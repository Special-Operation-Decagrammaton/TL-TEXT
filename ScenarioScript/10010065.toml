[translation]
10010065-1 = "第6話;トリニティの走る閃光弾（２）"
10010065-5 = "げほっ、げほっ……！"
10010065-6 = "ねえまた負けたじゃん！？"
10010065-7 = "いやいやいや！相手一人じゃなかっただろ！！"
10010065-8 = "誰だあいつ、急に出てきやがって……！"
10010065-10 = "け、喧嘩はやめてください……！まずは落ち着いて対話を……！"
10010065-11 = "撃ってからそれ言うのおかしいだろ！？"
10010065-12 = "お前、さっきその機関銃で相当乱射しておいて……。"
10010065-13 = "そ、それは、とにかくこの状況を止めねばと……。"
10010065-14 = "……助かりました。どなたかは存じ上げませんが、ありがとうございます。"
10010065-15 = "あと、そちらにいらっしゃる……"
10010065-16 = "あれ、先生……？"
10010065-17 = "[s1] \"や、スズミ。\"\n[s2] \"怪我は無い？\""
10010065-18 = "こ、こんにちは。ご無沙汰しております。"
10010065-19 = "は、はい。おかげさまで。"
10010065-20 = "ところで先生は、どうしてこちらに……？"
10010065-21 = "探し物、ですか？"
10010065-22 = "なるほど、人助けの最中でしたか。"
10010065-23 = "流石は先生ですね。どこかで先生がこうして動かれていると思うと、私も勇気を貰えます。"
10010065-24 = "せっかくですし、お手伝いしたいところなのですが……探し物は一体、どのような？"
10010065-26 = "[ruby=みずごけにかわ]水苔膠[/ruby]……？"
10010065-27 = "なるほど……すみません、寡聞にして知らず……。"
10010065-28 = "ですが、古い建物に使われているのですよね？「古い廃材」でしたら幾つか思い当たりがあるのですが、一度そちらを見に行きますか？"
10010065-29 = "時々建物の隙間などに、古い資材が捨てられていたりするのです。"
10010065-30 = "巡回をしていて見かけることが多いのですが、確か向こうの方に……。"
10010065-35 = "……！"
10010065-36 = "ちょっ、ちょっと待ったぁ！"
10010065-37 = "……？えっと、どこか大きく痛むところが？"
10010065-38 = "心配すんなバカ！それよりお前、その「古い廃材」ってまさか……！"
10010065-39 = "私たちのアジトの話をしてるのか！？"
10010065-40 = "えっと……？あ、あちらの方なのですか？たしかに、もしかしたらすぐ近くかもしれません。"
10010065-41 = "つまりお前、それは……私達を追い出して、アジトを撤去するってことか！？"
10010065-42 = "いえ、そういった意味ではなく……。"
10010065-43 = "もし不要なものがあれば、少し頂ければと思うのですが……"
10010065-44 = "鬼！悪魔！人でなし！閃光弾！！"
10010065-45 = "お、鬼、ですか……。"
10010065-46 = "私たちだって、私たちだってなぁ……！！"
10010065-47 = "そうだ、わだじだちもがんばっ、がん、うえぇぇぇぇっ！！"
10010065-48 = "え、っと……。"
10010065-49 = "そういう意味ではないのですが、すみません、何だか泣かせてしまったようで……とりあえずハンカチを……"
10010065-50 = "[s3] \"……とりあえず一回、話してみない？\"\n[s4] \"ひとまず最後まで、話を聞かせてもらえる？\""
10010065-51 = "そうですね……お聞かせ願えますか？"
10010065-52 = "そうですね……お聞かせ願えますか？"
10010065-54 = "ぐすっ、うっ……あそこを追い出されたら、私たちはどこで過ごせば良いんだ！"
10010065-55 = "私たちだって、好きでカツアゲのバイト（？）をしてるわけじゃない！真っ当なバイトができたらどんなに助かるか！"
10010065-56 = "普通のバイトはだいたい書類落ち……。"
10010065-57 = "成績がアレだから寮にも入れないし、真っ当な家賃を払うお金なんてもってのほか。"
10010065-58 = "分かるか？「普通に暮らす」なんて特権、私たちには無いんだよ……。"
10010065-59 = "あんたたちに言ったって、無駄かもしれないけど……。"
10010065-61 = "それは……。"
10010065-62 = "[s5] \"じゃあ、私の――\"\n[s6] \"もしよければ、シャーレの――\""
10010065-65 = "みなさんさえよろしければ、ですが。"
10010065-68 = "[ns] \"……ヒナタ？\""
10010065-69 = "……？"
10010065-71 = "お前は……？"
10010065-72 = "私たちと一緒に、聖堂でお手伝いをしていただけませんか？"
10010065-73 = "……聖堂で、手伝い？"
10010065-74 = "っていうことはあんた……もしかして、シスターフッドなのか？"
10010065-75 = "は、はい。一応この通り、シスター服ですし……？"
10010065-76 = "……いやいやいや。"
10010065-77 = "さっきの戦闘姿を見て、誰もシスターとはグハッ！？"
10010065-82 = "シスターさんだな、どこからどう見てもシスターさんだ。"
10010065-83 = "まあ最初は確かにトリニティのシスターみたいなコスプレした、走る閃光弾の追っかけかと思ったけど……。"
10010065-84 = "こ、コスプレですか……。"
10010065-85 = "一応私は本物の、シスターフッドのシスターです。"
10010065-86 = "事情は少しですが理解しました。今までそういった事情を知らないままで、ごめんなさい……。"
10010065-90 = "ぜひ私たちに、ほんの手助けをさせていただけませんか？"
10010065-92 = "ボランティアでしたら、いつでも大募集中なんです。"
10010065-94 = "お金を稼ぐ場所ではないので、日当などはお渡しできないのですが……寝食の提供は可能です。"
10010065-95 = "もしかしたら合わないかもしれません、他にされたいバイトなどもあるでしょう。その場合はしばらくご一緒させていただいた後、推薦書をお渡しすることも可能ですから。"
10010065-97 = "慣れない間は大変かもしれませんが……"
10010065-98 = "私たちも、精一杯お手伝いさせていただきますので。"
10010065-105 = "ど、どうしてそんな……。"
10010065-106 = "そんなことして、あんたにとって何の得になるんだよ……。"
10010065-107 = "損得ではありません。私たちは、シスターフッドですから。"
10010065-108 = "そんな……。"
10010065-110 = "シスターフッドはできるだけトリニティの、いえ、このキヴォトスの全ての方々が安らかに……そして幸せに暮らせることが目標です。"
10010065-111 = "みなさんの問題が解決できて、より安らかな日々を過ごせるのであれば、それに勝る喜びはありません。"
10010065-112 = "だ、騙されないぞ……。"
10010065-113 = "そんな美味い話と良い感じの台詞で、私たちが……"
10010065-114 = "……うああぁぁぁぁぁん！！"
10010065-115 = "！？"
10010065-116 = "……！？"
10010065-117 = "[s7] \"……。\"\n[s8] \"……大変だったね。\""
10010065-118 = "そうなったら、普通にバイトができるんだよな……？"
10010065-119 = "そうなったら、普通にバイトができるんだよな……？"
10010065-120 = "映画館で正義実現委員会がいないか、不安にならなくて良いんだよな？カフェにも、ゲーセンにも行って良いんだよな？"
10010065-121 = "私やる、やらせてください……！"
10010065-122 = "はい。みんなで一緒に汗をかき、"
10010065-126 = "お風呂に入り、"
10010065-128 = "ご飯を食べましょう。何も心配しなくて良いのです。"
10010065-130 = "うっ、うううううっ……！"
10010065-131 = "話してくださって、ありがとうございます。"
10010065-135 = "……。"
10010065-136 = "[ns] \"解決できたと見ていいよね？\""
10010065-137 = "ああ。まあ……。"
10010065-138 = "……好きにしてくれ。アジトでも膠でも、もううちらには関係のない話だから。"
10010065-143 = "途中から、ずっと何も言えませんでしたが……ありがとうございます。"
10010065-144 = "い、いえそんな、私にできることは多くありませんが……。"
10010065-145 = "道を選び直したり、選択をされたり……そういった時に、誰かがお手伝いするということ。"
10010065-146 = "それは……「誰かがやるべきこと」、ですから。"
10010065-148 = "……！"
10010065-152 = "……はい、そうですね。"
10010065-154 = "……本当に、ありがとうございます。"
