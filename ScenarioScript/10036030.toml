[translation]
10036030-1 = "第3話;近寄る影"
10036030-5 = "ああもう、うぜぇな。"
10036030-6 = "たしかにカモメはうるさいが……そこまで気になるか？"
10036030-7 = "ちげーよ！ヘルメット団のことだよ！"
10036030-8 = "総連合会だって？#nふざけんなや！"
10036030-9 = "[ruby=ねえさま]姐様[/ruby]をあんな目に遭わせておいて……#n良いご身分だぜ、まったくよ！"
10036030-10 = "しかも、「アウトロービーチ」を私物化しようとしてるしな。"
10036030-11 = "そうだそうだ！"
10036030-12 = "お前らもそう思わねーか！？"
10036030-14 = "ああ！"
10036030-15 = "いよいよ、ヘルメット団に恨みを晴らす時が来た！"
10036030-16 = "姐様を侮辱した代償は、きっちり支払わせてやる！"
10036030-17 = "あいつらが一番盛り上がったタイミングで騒ぎを起こすぞ。"
10036030-18 = "つーか、あの「教授」って何者なんだ？#n金さえ払えば、絶対に成功する計画を立ててくれるらしいが……。"
10036030-19 = "ま、ブラックマーケットの情報屋みたいなもんだろ。"
10036030-20 = "決して表に顔は出さず、音声だけでやりとりをするなんて、#n所詮は臆病者だ。"
10036030-21 = "うーん、なんか引っかかるような……。"
10036030-22 = "んなもん、今はどうだって良いだろ！#nそれよか集中しろ！集中！"
10036030-23 = "いいか、お前ら！#n祭りをぶち壊すぞ！"
10036030-24 = "おう！"
10036030-25 = "よし、そんじゃ……！"
10036030-29 = "……おっと。ちょっと待ってくれ、教授から電話だ。#n計画が完成したのかもしれねぇ。"
10036030-34 = "お財布、見つかった……？"
10036030-35 = "あっ。こっち来て、先生。"
10036030-39 = "[ns] 岩の影に身を隠す。"
10036030-41 = "ヒヨリ、押さないで。"
10036030-42 = "い、いろんなところが当たって……。"
10036030-43 = "[s] \"ご、ごめん……。\""
10036030-45 = "しっ、サッちゃんに聞こえちゃう。"
10036030-46 = "サオリ姉さん、どこですか？"
10036030-47 = "あそこ、見て。"
10036030-50 = "お越しいただきありがとうございます、DJ B.o.B様！"
10036030-51 = "これで総連合会の盛り上がりは決まったも同然です！"
10036030-56 = "はっ、あんだけ頼まれたんじゃ仕方ねぇ。"
10036030-57 = "それより、金は用意してあんだろうな？"
10036030-58 = "もちろんです！#nステージが終わり次第、すぐ入金しますので！"
10036030-59 = "よしよし。#nま、これもブラックマーケットのよしみだ。"
10036030-60 = "おい、そこのバイト！#n気をつけて運べ！"
10036030-62 = "分かった。"
10036030-63 = "次はスピーカーだ！"
10036030-64 = "もし故障でもしたら、弁償してもらうからな？#n命より大事な物だと思え！"
10036030-65 = "……ああ。"
10036030-66 = "それと、ステージの装飾を左に変えておけ。"
10036030-67 = "さっきは右と言われたが……？"
10036030-68 = "あぁん！？#nなんか文句でもあんのか？"
10036030-69 = "ステージがどうなっても知らねぇぞ？"
10036030-70 = "ど、どうか落ち着いてください！"
10036030-71 = "さっさと言われた通りにしろ！"
10036030-72 = "……分かった。"
10036030-75 = "……ひどい。"
10036030-76 = "雇い主だからって、ひどすぎる……。"
10036030-77 = "まさに悪役みたいだね。#n私なら、とっくに撃ってた。"
10036030-78 = "ブラックですね……完全にパワハラです……。"
10036030-79 = "あのままじゃ、ストレスで胃に穴が開いてしまうかもしれません……#nつらいです……苦しいです……。"
10036030-80 = "[s1] \"うっ、頭が……。\"\n[s2] \"妙に聞き馴染みのある言葉が……。\""
10036030-83 = "何とかしないと。"
10036030-84 = "で、でもサオリ姉さんのことを見守るんじゃなかったんですか？"
10036030-85 = "ここで動いたら、見つかってしまいますよ？"
10036030-86 = "あんな風につらい思いをしてほしいわけじゃない。"
10036030-87 = "裏でこっそり手を打とう。"
10036030-92 = "……優しく、ね。"
10036030-96 = "ふぅ……。"
10036030-97 = "あー、なんか違うな。"
10036030-98 = "元に戻せ！"
10036030-99 = "ああ……。"
10036030-100 = "分かったならさっさと動け！"
10036030-101 = "チッ……護衛だって聞いてたのに、まさかバイトを寄越すとはな。"
10036030-102 = "……。"
10036030-103 = "少し外す。#n戻ってくるまでに終わらせておけよ。"
10036030-104 = "分かった。"
10036030-105 = "ふんふふ～ん。"
10036030-114 = "腹減ったなぁ。"
10036030-115 = "あとでバイトにラーメンでも買いに行かせるか。"
10036030-116 = "……あん？"
10036030-125 = "なんだ、お前ら。"
10036030-126 = "邪魔なんだよ、さっさと[ruby=ど]退[/ruby]け。"
10036030-127 = "少しお話できますか、DJさん。"
10036030-128 = "悪いな、サインなら断ってんだよ。"
10036030-132 = "お、おい。#n誰に銃を向けてると思ってんだ？"
10036030-133 = "[s] \"ミサキ！優しくって言ってなかった！？\""
10036030-134 = "これが私にとっての「優しさ」。"
10036030-135 = "な、何のつもりだ！"
10036030-136 = "私はDJ B.o.Bだぞ！#nこ、こんなマネをして許されるとでも！？"
10036030-137 = "――うっ！"
10036030-143 = "あ、手が滑った。"
10036030-144 = "ミサキ、ダメだよ。#nサッちゃんが頑張ってるステージに必要な人なんだから。"
10036030-145 = "分かってるけど……こいつ、口の利き方が……。"
10036030-146 = "話せば分かってくれると思う。#nそうですよね、DJさん？"
10036030-148 = "ナメやがって、こん畜生！"
10036030-152 = "ぐっ！"
10036030-153 = "[s] \"アツコ！？\""
10036030-158 = "言い方がムカついちゃって。"
10036030-160 = "クソッ……。"
10036030-165 = "集団リンチ中に失礼します……。"
10036030-167 = "……話し合いだよ、ヒヨリ。"
10036030-169 = "その……木の上で見張りをしていたら、こっちに向かっている人の群れが……。"
10036030-170 = "10秒以内には到着するかと……#nとりあえず、設置しておいたブービートラップでも発動しましょうか？"
10036030-175 = "とりあえず待機しよう。#nヒヨリは元の位置に、姫はこいつの身柄を確保しておいて。"
10036030-176 = "先生は……。"
10036030-177 = "[s] \"アツコと一緒にDJを見ておくよ。\""
10036030-178 = "……うん。"
10036030-180 = "て、テメェら、容赦し――んぐっ！？"
10036030-189 = "DJさん、少し静かにしていて。"
10036030-191 = "……来る。"
10036030-198 = "ははっ！#nホントにDJ B.o.Bがいるとはな！"
10036030-199 = "高い金を出して計画を練ってもらったんだから、いなきゃ困るぜ。"
10036030-200 = "ひひっ、これでヘルメット団のお祭りはパーだ！"
10036030-203 = "お祭りを、どうするつもり？"
10036030-205 = "あぁん？#n……なんだ？ヘルメットを被ってないみたいだが……"
10036030-206 = "早くDJを置いてどっか行け！"
10036030-207 = "ウチらは今から、そこのDJを拉致らなくちゃいけないんだよ！"
10036030-209 = "んうっっ！？"
10036030-211 = "……拉致？"
10036030-212 = "[s] \"拉致！？\""
10036030-213 = "お祭りを台無しにする気？"
10036030-215 = "ヘルメット団に復讐すんだよ！"
10036030-216 = "何とか教授の計画によれば、DJを拉致したらヘルメット団の祭りを妨害できるらしいからな！"
10036030-217 = "DJには雑用でもやらせるか？"
10036030-218 = "いや、ウチらのためだけに徹夜でパフォーマンスさせよう！"
10036030-220 = "んうっっっ……！"
10036030-222 = "……よく分からないけど、させない。"
10036030-223 = "このお祭りのために、サッちゃんが頑張ってるから。"
10036030-224 = "邪魔をするなら、見逃せないよ。"
10036030-226 = "話が通じねぇな。"
10036030-227 = "その人数で敵うと思ってるのか？"
10036030-228 = "お前ら、出てこい！"
10036030-238 = "痛い目に遭いたくなかったら、さっさと失せろ！"
10036030-240 = "……分かった。"
10036030-241 = "その代わり、左に3歩移動してもらえる？"
10036030-243 = "あぁん？#nまあ、それくらいなら構わねぇけどよ。"
10036030-247 = "こうか……？"
10036030-249 = "うん。"
10036030-250 = "――ヒヨリ、撃って。"
10036030-256 = "っ！#nそ、狙撃だ！"
10036030-258 = "アツコ、今！"
10036030-259 = "うん！"
