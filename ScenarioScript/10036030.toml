[translation]
10036030-1 = "Episódio 3; Sombras que se aproximam"
10036030-5 = "Ah, chega, que saco."
10036030-6 = "As gaivotas são barulhentas, de fato... mas isso te incomoda tanto assim?"
10036030-7 = "Não é isso! Estou falando do Grupo do Capacete!"
10036030-8 = "O Conselho Geral, é?#nNão me faça rir!"
10036030-9 = "Depois de fazerem aquilo com a nossa Irmã...#nQue vida boa eles estão levando, não é mesmo!"
10036030-10 = "E ainda por cima, estão tentando privatizar a \"Praia Fora da Lei\"."
10036030-11 = "É isso aí!"
10036030-12 = "Vocês não acham o mesmo!?"
10036030-14 = "Sim!"
10036030-15 = "Finalmente chegou a hora de nos vingarmos do Grupo do Capacete!"
10036030-16 = "Vou fazer eles pagarem caro por terem insultado a nossa Irmã!"
10036030-17 = "Vamos causar o caos no momento em que eles estiverem mais animados."
10036030-18 = "Aliás, quem é esse tal de \"Sensei\"?#nDizem que se você pagar, ele cria um plano que nunca falha..."
10036030-19 = "Bem, deve ser tipo um informante do mercado negro."
10036030-20 = "Nunca mostra o rosto e só se comunica por voz, no fim das contas, é só um covarde."
10036030-21 = "Hmm, tem algo que não me cheira bem..."
10036030-22 = "Esquece isso agora!#nEm vez disso, foque! Foque!"
10036030-23 = "Entendido, pessoal!#nVamos destruir esse festival!"
10036030-24 = "Certo!"
10036030-25 = "Muito bem, então...!"
10036030-29 = "...Opa. Esperem um pouco, é uma ligação do Sensei.#nTalvez o plano esteja pronto."
10036030-34 = "A carteira, você encontrou...?"
10036030-35 = "Ah. Venha por aqui, Sensei."
10036030-39 = "[ns] Esconder-se atrás da sombra da rocha."
10036030-41 = "Hiyori, não empurra."
10036030-42 = "E-estamos encostando em várias partes..."
10036030-43 = "[s] \"D-desculpa...\""
10036030-45 = "Shiu, a Sa-chan vai ouvir."
10036030-46 = "Irmã Saori, onde você está?"
10036030-47 = "Olhe ali."
10036030-50 = "Obrigado por vir, DJ B.o.B!"
10036030-51 = "Com isso, a animação do Conselho Geral está garantida!"
10036030-56 = "Hah, depois de tanto insistirem, não tive escolha."
10036030-57 = "Mas antes, você preparou o dinheiro, não foi?"
10036030-58 = "Com certeza!#nAssim que o show terminar, farei o depósito!"
10036030-59 = "Muito bem.#nBem, isso é um favor entre conhecidos do mercado negro."
10036030-60 = "Ei, você aí, o temporário!#nCarregue isso com cuidado!"
10036030-62 = "Entendido."
10036030-63 = "O próximo é o alto-falante!"
10036030-64 = "Se quebrar, você vai ter que pagar!#nConsidere isso mais importante que a sua própria vida!"
10036030-65 = "...Sim."
10036030-66 = "E mude a decoração do palco para a esquerda."
10036030-67 = "Mas antes disseram que era para a direita...?"
10036030-68 = "O quê!?#nEstá reclamando de alguma coisa?"
10036030-69 = "Não me responsabilizo se o palco der errado, viu?"
10036030-70 = "P-por favor, acalme-se!"
10036030-71 = "Faça logo o que eu mandei!"
10036030-72 = "...Entendido."
10036030-75 = "...Que horror."
10036030-76 = "Só porque é o empregador, isso é horrível..."
10036030-77 = "Parece um vilão de verdade. #nSe fosse eu, já teria atirado faz tempo."
10036030-78 = "Isso é muito tóxico... é assédio moral puro..."
10036030-79 = "Do jeito que as coisas estão, ela pode acabar com uma úlcera de tanto estresse... #nÉ doloroso... é angustiante..."
10036030-80 = "[s1] \"Ugh, minha cabeça...\" \n[s2] \"Essas palavras me soam estranhamente familiares...\""
10036030-83 = "Precisamos fazer alguma coisa."
10036030-84 = "M-mas a gente não ia só ficar de olho na Saori?"
10036030-85 = "Se a gente agir agora, vamos acabar sendo descobertos, não vamos?"
10036030-86 = "Eu não quero que ela passe por esse tipo de sofrimento."
10036030-87 = "Vamos dar um jeito nisso pelas sombras."
10036030-92 = "...Com gentileza, está bem?"
10036030-96 = "Ufa..."
10036030-97 = "Ah, tem algo errado aqui."
10036030-98 = "Coloque de volta como estava!"
10036030-99 = "Ah..."
10036030-100 = "Se entendeu, então se mexa logo!"
10036030-101 = "Tsc... Disseram que era para escolta, mas quem diria que mandariam um bico para cá."
10036030-102 = "..."
10036030-103 = "Vou sair um pouco. #nTermine isso antes que eu volte."
10036030-104 = "Entendido."
10036030-105 = "Hmm-hmm-hmm."
10036030-114 = "Estou com fome."
10036030-115 = "Vou pedir para o bico ir comprar um lámen mais tarde."
10036030-116 = "...Hã?"
10036030-125 = "Quem são vocês?"
10036030-126 = "Estão atrapalhando, saiam da frente logo."
10036030-127 = "Poderia nos dar um minuto, DJ?"
10036030-128 = "Foi mal, eu não dou autógrafos."
10036030-132 = "Ei, ei. #nSabe para quem está apontando essa arma?"
10036030-133 = "[s] \"Misaki! Você não disse que seria gentil!?\""
10036030-134 = "Essa é a minha forma de ser \"gentil\"."
10036030-135 = "Q-qual é a de vocês!"
10036030-136 = "Eu sou o DJ B.o.B! #nVocês acham que vão sair impunes fazendo isso!?"
10036030-137 = "——Ugh!"
10036030-143 = "Ah, minha mão escorregou."
10036030-144 = "Misaki, não pode. #nEle é necessário para o palco onde a Sa-chan está se esforçando."
10036030-145 = "Eu sei, mas... o jeito que esse cara fala..."
10036030-146 = "Acho que ele vai entender se conversarmos. #nNão é, DJ?"
10036030-148 = "Seus desgraçados, vão se ferrar!"
10036030-152 = "Ugh!"
10036030-153 = "[s] \"Atsuko!?\""
10036030-158 = "O jeito que ele fala me irrita."
10036030-160 = "Droga..."
10036030-165 = "Desculpe interromper o linchamento coletivo..."
10036030-167 = "...É uma conversa, Hiyori."
10036030-169 = "É que... enquanto eu vigiava lá de cima da árvore, vi um grupo de pessoas vindo para cá..."
10036030-170 = "Acho que chegam em menos de 10 segundos... #nPor enquanto, quer que eu ative as armadilhas que preparei?"
10036030-175 = "Vamos esperar por enquanto. #nHiyori, volte para sua posição, e Princesa, mantenha ele sob custódia."
10036030-176 = "E o Sensei..."
10036030-177 = "[s] \"Vou ficar de olho no DJ junto com a Atsuko.\""
10036030-178 = "……Sim."
10036030-180 = "S-seus desgraçados, não vou ter piedade――ngh!?"
10036030-189 = "DJ, fique quieto por um momento."
10036030-191 = "……Eles estão vindo."
10036030-198 = "Haha!#nEntão o DJ B.o.B está mesmo aqui!"
10036030-199 = "Pagamos caro para ele planejar tudo, seria um problema se ele não estivesse."
10036030-200 = "Hehe, com isso, o festival da Gangue dos Capacetes vai por água abaixo!"
10036030-203 = "O que vocês pretendem fazer com o festival?"
10036030-205 = "Hã?#n……O que é isso? Parece que você não está usando um capacete……"
10036030-206 = "Larga o DJ e cai fora daqui logo!"
10036030-207 = "Nós temos que sequestrar esse DJ agora mesmo!"
10036030-209 = "Nghhh!?"
10036030-211 = "……Sequestrar?"
10036030-212 = "[s] \"Sequestrar!?\""
10036030-213 = "Vocês pretendem arruinar o festival?"
10036030-215 = "Vamos nos vingar da Gangue dos Capacetes!"
10036030-216 = "De acordo com o plano do Sensei, se sequestrarmos o DJ, podemos sabotar o festival da Gangue dos Capacetes!"
10036030-217 = "Será que devemos colocar o DJ para fazer trabalhos braçais?"
10036030-218 = "Não, vamos fazer ele trabalhar a noite toda só para nós!"
10036030-220 = "Nghhhh……!"
10036030-222 = "……Não entendo muito bem, mas não vou deixar."
10036030-223 = "A Sa-chan está se esforçando muito por causa deste festival."
10036030-224 = "Se vocês vão atrapalhar, não posso ignorar."
10036030-226 = "Não dá para conversar com você."
10036030-227 = "Você acha mesmo que esse grupinho vai conseguir vencer a gente?"
10036030-228 = "Pessoal, apareçam!"
10036030-238 = "Se não quiserem se machucar, caiam fora agora!"
10036030-240 = "……Entendido."
10036030-241 = "Em troca, vocês poderiam dar três passos para a esquerda?"
10036030-243 = "Hã?#nBem, não me importo de fazer isso."
10036030-247 = "Assim……?"
10036030-249 = "Sim."
10036030-250 = "――Hiyori, atire."
10036030-256 = "!#nS-sniper!"
10036030-258 = "Atsuko, agora!"
10036030-259 = "Sim!"
