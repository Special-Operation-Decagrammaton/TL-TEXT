[translation]
90001140-1 = "Episódio 14: Reunião"
90001140-4 = "Ué, Sensei, o que houve?"
90001140-5 = "[s] \"Pensei que já estava na hora da Rio chegar.\""
90001140-6 = "Faltam 5 minutos."
90001140-10 = "Provavelmente, a Rio-sama..."
90001140-11 = "Chegará com precisão, sem atrasar nem um segundo."
90001140-12 = "Embora, em casos muito raros, ela chegue um minuto mais cedo."
90001140-13 = "[s] \"Himari, não está com frio?\""
90001140-17 = "Sim. Estou com muito frio. Como uma flor pura que desabrochou no topo de um penhasco, atingida pela geada do amanhecer!"
90001140-18 = "Mas não existe a opção de esperar lá dentro."
90001140-19 = "Afinal, a Rio, que me deixou com todo o trabalho e desapareceu por conta própria, finalmente vai dar as caras."
90001140-20 = "Pensei que, se eu não a recebesse com pelo menos uma reclamação, não seria eu mesma."
90001140-24 = "Se não for assim, não consigo ficar tranquila. Poxa!"
90001140-26 = "……Você poderia simplesmente admitir que está ansiosa para vê-la."
90001140-27 = "Isso é um mal-entendido. Por favor, não interprete errado, está bem?"
90001140-28 = "Passamos tanto tempo juntas e você ainda não me entende!?"
90001140-29 = "(Eu digo isso justamente porque entendo muito bem...)"
90001140-30 = "……Vocês duas passaram por muita coisa, hein."
90001140-31 = "Claro, eu me juntei ao grupo no meio do caminho, mas..."
90001140-32 = "Eu também tenho confiança de que não fico atrás. Hmph."
90001140-33 = "[s] \"Que confiança, hein.\""
90001140-34 = "Aprendi que, nessas horas, basta ter força de vontade para dar um jeito."
90001140-35 = "Com quem?"
90001140-36 = "Com a Momoi."
90001140-40 = "Ah, entendi."
90001140-42 = "Eu não achava que a Rio diria algo assim... #nAh, falando nisso, o Departamento de Investigação de Fenômenos Estranhos foi um clube que começou a pedido dela, não foi?"
90001140-43 = "Rio, Departamento de Investigação de Fenômenos Estranhos... Decagrammaton."
90001140-46 = "\"Se pudermos pesquisar Deus e provar sua existência... poderemos analisar sua estrutura e reproduzi-la. #nOu seja, este é o método para criar um novo Deus...\""
90001140-47 = "Um sistema de análise autônomo contra o Absoluto, criado com base nessa hipótese."
90001140-48 = "Em suma, uma \"Inteligência Artificial que busca a divindade\"."
90001140-51 = "No começo, éramos apenas a chefe e eu."
90001140-52 = "E então, a Eimi trouxe o Sensei."
90001140-53 = "Começamos pelo deserto, depois a fábrica, as ruínas... e agora, geleiras, hein."
90001140-55 = "Ficar parada é entediante... minhas mãos estão quase congelando."
90001140-56 = "[s] \"Venha aqui, Toki. Vou te aquecer.\""
90001140-57 = "……Obrigada."
90001140-63 = "Ah, que injusto. Eu também quero."
90001140-64 = "O que vocês duas estão fazendo..."
90001140-65 = "Haa... afinal, quando a Rio vai chegar?"
90001140-66 = "Ficar imersa em lembranças banais não combina comigo, a super gênio, pura e frágil garota hacker, e é uma perda de tempo."
90001140-67 = "Se temos tempo para isso, eu preferiria avançar com a investigação..."
90001140-73 = "Ah, parece que ela finalmente deu as caras."
90001140-75 = "……?"
90001140-86 = "……"
90001140-87 = "……"
90001140-88 = "……"
90001140-89 = "？"
90001140-93 = "O que é esse veículo...?"
90001140-94 = "Não é nada demais."
90001140-95 = "Ainda há espaço para melhorias, e eu queria ter preparado algo um pouco mais decente."
90001140-96 = "Vou aceitar isso como uma preparação feita à sua própria maneira."
90001140-97 = "[s] \"Obrigado por vir, Rio.\""
90001140-101 = "Sensei……."
90001140-102 = "Bem, eu……."
90001140-104 = "Bem-vinda, Rio-sama. #nEstou lhe esperando há 5 minutos."
90001140-106 = "Toki……."
90001140-111 = "……Você encontrou o que queria fazer?"
90001140-112 = "O que eu quero fazer, você diz?"
90001140-113 = "Eu……."
90001140-114 = "Não precisa responder se for difícil."
90001140-115 = "Só de olhar para você agora, eu meio que já sei."
90001140-119 = "É mesmo?"
90001140-120 = "Sim. E, deixe-me dizer novamente."
90001140-124 = "……Me desculpe, Toki. #nEu sobrecarreguei você demais."
90001140-133 = "Eh……?"
90001140-135 = "Você mudou, presidente."
90001140-136 = "[s] \"……Isso aquece o meu coração.\""
90001140-138 = "Sensei……."
90001140-139 = "Eu preferiria que você não ficasse me provocando tanto."
90001140-140 = "……O que foi?"
90001140-141 = "[s] \"Vou te contar uma coisa importante agora.\""
90001140-142 = "Por acaso o mundo vai acabar amanhã ou algo assim?"
90001140-143 = "[s] \"Não chega a tanto, mas…….\""
90001140-145 = "[ns] \"O pessoal do Departamento de Desenvolvimento de Jogos vai chegar aqui em breve.\""
90001140-149 = "……?"
90001140-153 = "……!"
90001140-154 = "Eu preferiria que o mundo acabasse de uma vez!?"
90001140-160 = "Eimi, Toki!"
90001140-161 = "Sim!"
90001140-166 = "Estou pronta para lidar com isso."
90001140-175 = "Eu vou embora!"
90001140-176 = "Toki, até você vai se voltar contra mim!?"
90001140-177 = "Sinto muito, Rio-sama. Isso é o que eu quero fazer."
90001140-178 = "Então era isso que você queria dizer antes!?"
90001140-179 = "Eu ouvi dizer que a chegada seria apenas amanhã……!"
90001140-184 = "Hoje ou amanhã, não faz muita diferença."
90001140-185 = "Eu preciso de preparação mental. Mudar o cronograma sem aviso prévio é uma decisão irracional demais!"
90001140-186 = "De acordo com os resultados da astrologia, este horário é mais auspicioso."
90001140-187 = "Você ainda acredita em algo tão sem sentido quanto astrologia?"
90001140-188 = "Como sempre digo, a astrologia é uma estatística sobre os corpos celestes e os eventos humanos que perdura desde a antiguidade, e—"
90001140-189 = "É uma disciplina que sintetiza filosofia, matemática e física sobre se o destino é determinado por constantes ou variáveis…… tudo isso em um só lugar, entende?"
90001140-194 = "Não me importa!"
90001140-202 = "Ha, ha, ha……."
90001140-203 = "[s] \"……Você está bem?\""
90001140-204 = "……Eu pareço estar bem?"
90001140-205 = "Claro, eu pretendo compensar isso, mas……."
90001140-206 = "Mas, fazer algo desse tipo comigo……."
90001140-210 = "(Recebeu um olhar de ressentimento da Rio)"
90001140-211 = "(Deveria ter avisado direito……)"
90001140-217 = "Ah, eles chegaram."
90001140-218 = "Ótimo momento."
90001140-220 = "Muito bem, renda-se, Rio."
90001140-221 = "……！"
90001140-227 = "（O helicóptero chegou）"
90001140-231 = "（Quem saiu primeiro foi...！）"
90001140-235 = "Sensei!"
90001140-241 = "[ns] \"Alice!\""
90001140-242 = "（Alice veio correndo e me abraçou com toda a força！）"
90001140-243 = "（O Sensei quase caiu！）"
90001140-246 = "Sensei, eu estava com saudades!"
90001140-247 = "Quanto tempo, minha querida Alice."
90001140-248 = "Toki, quanto tempo!"
90001140-250 = "Quanto tempo, Alice."
90001140-254 = "Eimi, você não está com frio vestida assim?"
90001140-255 = "Nem um pouco, na verdade está refrescante e bem agradável."
90001140-256 = "E-entendo, se é assim, então tudo bem..."
90001140-261 = "Sejam bem-vindas, Alice e pessoal do Departamento de Desenvolvimento de Jogos."
90001140-265 = "Himari-senpai!#nO casaco amarelo combina muito com você!"
90001140-266 = "Ora, muito obrigada.#nComo esperado, a Alice é uma kouhai muito adorável."
90001140-268 = "Iupii, chegamos, Sensei!"
90001140-269 = "Quanto ao resto do pessoal, faz tempo, né..."
90001140-270 = "Olá, Sensei... chegar até aqui foi... muito difícil."
90001140-271 = "Pensei que seria uma viagem de trem divertida, mas tivemos que trocar de condução várias vezes e, no final, um helicóptero..."
90001140-272 = "……Eu não imaginava que levaria três dias."
90001140-274 = "Será que é assim que a gente se sente quando viaja longas distâncias nos jogos?..."
90001140-278 = "Atchim!"
90001140-279 = "[s] \"Você está bem?\""
90001140-280 = "Sim, estou bem... uuu, como você disse, está realmente muito frio aqui."
90001140-281 = "[s] \"Você veio com roupas bem quentes, que bom!\""
90001140-282 = "Sim! A Midori escolheu para mim.#nO design é bem parecido com o equipamento do jogo que estamos fazendo agora!"
90001140-283 = "É um RPG de ação, puzzle, aventura e jogo de tiro por turnos ambientado em uma geleira!"
90001140-284 = "[s] \"……Os elementos do jogo estão bem equilibrados?\""
90001140-288 = "C-c-claro que sim!#nQuem você acha que nós somos!"
90001140-289 = "Haa..."
90001140-291 = "Bem, vamos entrar logo... mas antes disso."
90001140-295 = "A última pessoa..."
90001140-302 = "Olá. Eu sou a I.A. de suporte computacional desta base glacial.#nObrigada por virem até aqui."
90001140-307 = "……"
90001140-308 = "……"
90001140-313 = "Sério mesmo..."
90001140-315 = "I.A.s não costumam ser as vilãs que tentam destruir a humanidade nos jogos?"
90001140-316 = "Irmã, não importa o quanto seja, esse jeito de falar..."
90001140-317 = "Mas não é verdade?"
90001140-318 = "Não é o tipo de história onde o chefão dos monstros gigantes está tramando algo?"
90001140-320 = "É verdade...?"
90001140-321 = "Não... como devo explicar..."
90001140-323 = "Eu fui criada para ajudar vocês, então por favor, não fiquem em alerta—"
90001140-327 = "Rio-senpai! É a Rio-senpai, não é?"
90001140-333 = "Hein!? Será que de novo...!?"
90001140-334 = "Presidente Rio, não me diga que..."
90001140-336 = "Uma pegadinha...?"
90001140-338 = "E-eu não tenho relação com a Tsukatsuki Rio..."
90001140-339 = "Estou feliz em vê-la novamente, Rio-senpai.#nComo você tem passado?"
90001140-340 = "……。"
90001140-341 = "Alice quer ver o rosto da Rio-senpai.#nComo daquela vez, uma chamada de vídeo já seria o suficiente."
90001140-342 = "Isso é..."
90001140-343 = "Está tudo bem, eu entendo que existem várias circunstâncias."
90001140-344 = "……！"
90001140-345 = "Mas, ainda assim, é uma pena.#nEu acabei criando expectativas de que talvez pudesse encontrar a Rio-senpai."
90001140-346 = "Ugh...!"
90001140-351 = "[ns] \"Espere um pouco!\""
90001140-355 = "Eh...?"
90001140-364 = "Se-Sensei..."
90001140-370 = "[ns] \"Vamos, Rio.\""
90001140-371 = "Ma-mas...!"
90001140-372 = "[s1] \"Está tudo bem, eu estarei com você.\"\n[s2] \"Crie coragem, Rio.\""
90001140-375 = "……！"
90001140-379 = "T-tá bom, eu entendi..."
90001140-381 = "(Segura a mão de Rio e a leva para fora)"
90001140-382 = "(Felizmente, ela me seguiu sem resistência)"
90001140-389 = "Ah, é a Presidente Rio!"
90001140-390 = "Por isso, irmã..."
90001140-391 = "……Olá, Presidente Rio. Faz tempo."
90001140-392 = "Auu... hum... olá. Presidente Rio."
90001140-399 = "Rio-senpai!"
90001140-404 = "O que...!?"
90001140-409 = "Que bom, senhorita Rio."
90001140-410 = "É a sua chance de fazer carinho na cabeça da adorável Alice."
90001140-413 = "S-será mesmo...?"
90001140-415 = "Você só chama a Alice de \"adorável Alice\"?"
90001140-416 = "Entendido.#nEntão, chamarei você de \"Momoi barulhenta\"."
90001140-417 = "Pode me chamar pelo nome mesmo..."
90001140-421 = "Ei, Presidente.#nEu queria confirmar uma coisa..."
90001140-426 = "Se tivermos que sacrificar alguém pelo mundo de novo... o que você faria dessa vez?"
90001140-430 = "……。"
90001140-432 = "I-irmã...?"
90001140-433 = "Momoi..."
90001140-435 = "Como eu só ouvi sobre o que aconteceu depois, achei que deveria perguntar pessoalmente."
90001140-442 = "Po-por que você está me olhando assim!?#nMesmo em jogos, é comum trazerem assuntos antigos à tona quando menos se espera, não é!?"
90001140-443 = "Não sei o que a Presidente está planejando, mas..."
90001140-444 = "Achei melhor perguntar o que ela faria se o mesmo problema acontecesse."
90001140-445 = "……。"
90001140-447 = "Irmã, tente falar de um jeito um pouco melhor..."
90001140-448 = "É que eu estava desmaiada, então não sei direito o que aconteceu!"
90001140-452 = "Espera, um minuto... quem me atacou naquela hora foi a Alice...?"
90001140-453 = "Mas aquilo era a Kei... hum? O que está acontecendo?"
90001140-458 = "Uuu, me desculpe! É tudo culpa da Alice!"
90001140-459 = "Tá, tá tudo bem...!#nJá passou, e agora estamos todos reunidos aqui...!"
90001140-465 = "……。"
90001140-467 = "Sabe, nos jogos, é uma história bem comum..."
90001140-468 = "As pessoas que insistem que um deve ser sacrificado pelo bem de todos são justamente as que fogem quando chega a vez delas."
90001140-469 = "Mas a Presidente não era assim."
90001140-473 = "A partir de agora, esta cidade será transformada e distorcida pelo novo conceito chamado Arca.#nSe isso acontecer... este Kivotos..."
90001140-474 = "A culpa é minha..."
90001140-475 = "Se eu não tivesse criado esta cidade, nada disso teria acontecido desde o início..."
90001140-476 = "Por isso, eu preciso parar isso..."
90001140-478 = "O-o que você quer dizer com isso...?"
90001140-479 = "...Eu mesma vou parar o sistema."
90001140-480 = "Se a minha vida for o suficiente para impedir o fim do mundo,#nentão eu farei isso — eu devo fazer isso."
90001140-483 = "Eu sinto que devo fazer isso... mesmo que seja eu mesma."
90001140-484 = "Entendo. Por isso, quero ouvir a intenção da Presidente."
90001140-485 = "— Porque é uma questão importante."
90001140-486 = "Se a minha vida puder impedir o fim do mundo, ainda acho que deveria fazê-lo.#nMas..."
90001140-487 = "Se for necessário sacrificar outra pessoa..."
90001140-488 = "Eu buscarei outras soluções até o limite."
90001140-489 = "..."
90001140-490 = "Sempre acreditei que a primeira conclusão a que chegava era a mais racional."
90001140-491 = "Mas, se ainda houver uma possibilidade, não pretendo desistir."
90001140-492 = "...Depois que não houver mais volta, será tarde demais."
90001140-498 = "Não pode, Rio-senpai."
90001140-503 = "A-Alice...?"
90001140-508 = "Fico feliz que você pense na Alice e nas outras.#nMas o fato de a Rio-senpai não estar incluída nesse pensamento..."
90001140-509 = "É muito triste."
90001140-510 = "Eu..."
90001140-515 = "A Alice quer que a Rio-senpai também tenha uma chance."
90001140-520 = "Não importa o quão difícil seja o jogo, na segunda vez nós sempre melhoramos!"
90001140-525 = "Que boa comparação, Alice."
90001140-527 = "..."
90001140-528 = "Por isso, Rio-senpai, a Alice..."
90001140-533 = "A Alice... ugh!"
90001140-535 = "As palavras não estão saindo... Será que houve um problema com a capacidade linguística da Alice!?"
90001140-537 = "Está tudo bem, Alice-chan.#nÉ difícil expressar sentimentos, não é?"
90001140-538 = "De alguma forma... fico feliz que tenhamos conseguido conversar assim."
90001140-539 = "[s3] \"Faz tempo que não vejo uma cena que toca tanto o coração...\"\n[s4] \"Embora eu ache que já disse isso antes.\""
90001140-544 = "O que houve, Sensei...?"
90001140-549 = "..."
90001140-550 = "Então... parece que vocês já disseram tudo o que tinham para dizer?"
90001140-551 = "Vamos ao ponto principal. A Himari-bucho vai acabar congelando."
90001140-552 = "A Rio-sama não tem más intenções. Ela é apenas assim.#nEu peço desculpas em nome dela."
90001140-557 = "Dito dessa forma, a posição da Rio..."
90001140-561 = "É verdade que não estou acostumada com esse tipo de conversa. Não vou negar."
90001140-562 = "Ah, sim... é verdade, eu tinha esquecido."
90001140-563 = "Haa... isso desestabiliza meu ritmo.#nEu gostaria de me acostumar logo, mas..."
90001140-564 = "[s] \"...Bom trabalho, Himari.\""
90001140-565 = "Fico muito feliz que o Sensei esteja aqui..."
90001140-567 = "Eu cometi muitos erros... isso é um fato."
90001140-568 = "Se eu errar novamente, por favor, me avise."
90001140-569 = "Naquela hora, farei o meu melhor possível."
90001140-571 = "(Sinto que um simples \"farei o meu melhor\" já bastaria...)"
90001140-572 = "(Para a Rio, esse é um crescimento notável.)"
90001140-574 = "Então... por que você chamou a Alice e as outras até aqui?"
90001140-575 = "É verdade. E ainda viemos por um caminho tão longo..."
90001140-580 = "Isso é..."
90001140-581 = "[s] \"...Precisamos conversar sobre isso também.\""
90001140-583 = "Já que nos reunimos, vamos conversar com calma."
90001140-584 = "Se tiverem alguma dúvida, podem perguntar a qualquer momento, está bem?#nComo pode ser uma conversa longa, querem um doce para chupar?"
90001140-589 = "Doce... Himari-senpai, isso é um pouco..."
90001140-590 = "Shiu, irmã! Não desperdice a boa vontade dela!"
90001140-593 = "Próximo episódio; Guerra de Bolas de Neve"
