[translation]
90001140-1 = "第14話;合流"
90001140-4 = "あれ、先生どうしたの？"
90001140-5 = "[s] \"そろそろリオが来る時間だなと思って。\""
90001140-6 = "あと5分後ですね。"
90001140-10 = "おそらくリオ様は――"
90001140-11 = "1秒も遅れることなく、正確に到着するかと。"
90001140-12 = "ごく稀に、1分早く着くこともありますが。"
90001140-13 = "[s] \"ヒマリ、寒くない？\""
90001140-17 = "ええ。寒いです、とても。崖の上に咲いた一輪の清楚な花に、夜明けの霜が当たるかのように！"
90001140-18 = "ですが、中で待つという選択肢はありません。"
90001140-19 = "私に面倒事を押しつけて勝手に姿を消したリオが、ようやく顔を出すのですから。"
90001140-20 = "出迎えて文句の一つでも言わなければ、と思いまして。"
90001140-24 = "そうでないと落ち着かないんですよ。もう！"
90001140-26 = "……早く会いたいって素直に言えば良いのに。"
90001140-27 = "誤解です。本当に勘違いしないでくださいね？"
90001140-28 = "これだけ一緒に過ごしているのに、まだ私のことを理解できていないのですか！？"
90001140-29 = "（よく分かってるから言ってるんだけど……）"
90001140-30 = "……お二人の間には色々あったのですね。"
90001140-31 = "もちろん、私は途中から合流した身ではありますが……。"
90001140-32 = "私だって、負けていない自信があります。むん。"
90001140-33 = "[s] \"すごい自信だね。\""
90001140-34 = "こういう時は、気合いで何とかなると教わってきましたので。"
90001140-35 = "誰に？"
90001140-36 = "モモイに。"
90001140-40 = "ああ、なるほど。"
90001140-42 = "リオがそんなこと言うはずないと思っていましたが……。#nああ、そういえば特異現象捜査部は彼女の頼みで始めた部活でしたね。"
90001140-43 = "リオ、特異現象捜査部……デカグラマトン"
90001140-46 = "『神を研究し、その存在を証明できれば……その構造を分析し、再現できるだろう。#n　すなわちこれは、新たな神を創り出す方法である……』。"
90001140-47 = "その仮説を元に作られた、対・絶対者自律型分析システム。"
90001140-48 = "つまるところ、「神性を探し出す人工知能」。"
90001140-51 = "最初は部長と私の二人だけだったね。"
90001140-52 = "そして、エイミが先生を連れてきてくれました。"
90001140-53 = "砂漠から始まって工場、廃墟……ついには氷河かぁ。"
90001140-55 = "じっとしているのは退屈です……手が凍えてしまいそうです。"
90001140-56 = "[s] \"おいで、トキ。温めてあげる。\""
90001140-57 = "……ありがとうございます。"
90001140-63 = "あ、ズルい。私も。"
90001140-64 = "あなた達、何やってるんですか……。"
90001140-65 = "はぁ……一体リオはいつ来るのでしょうか。"
90001140-66 = "ありきたりな回想に浸るだなんて、超天才清楚系病弱美少女ハッカーの私には似合いませんし、時間の無駄ですから。"
90001140-67 = "そんな暇があるのなら、少しでも調査を進めたいのですが……。"
90001140-73 = "ああ、ようやくお出ましのようですね。"
90001140-75 = "……？"
90001140-86 = "……。"
90001140-87 = "……。"
90001140-88 = "……。"
90001140-89 = "？"
90001140-93 = "なんですか、その乗り物……？"
90001140-94 = "大したものじゃないわ。"
90001140-95 = "まだ改良の余地が残っているし、もう少しまともなものを用意したかったのだけれど。"
90001140-96 = "あなたなりに準備をしてきてくれたのだと受け取りましょう。"
90001140-97 = "[s] \"来てくれてありがとう、リオ。\""
90001140-101 = "先生……。"
90001140-102 = "その、私は……。"
90001140-104 = "ようこそ、リオ様。#n5分前からお待ちしておりました。"
90001140-106 = "トキ……。"
90001140-111 = "……やりたいことは見つかった？"
90001140-112 = "やりたいこと、ですか。"
90001140-113 = "私は……。"
90001140-114 = "答えにくいのであれば結構よ。"
90001140-115 = "今の貴女を見ていれば、何となく分かるもの。"
90001140-119 = "そうですか？"
90001140-120 = "ええ。それと、改めて言わせてちょうだい。"
90001140-124 = "……ごめんなさい、トキ。#n貴女に負担をかけすぎたわ。"
90001140-133 = "え……？"
90001140-135 = "変わったね、会長。"
90001140-136 = "[s] \"……胸がじーんとする。\""
90001140-138 = "先生……。"
90001140-139 = "あまりからかわないでほしいのだけれど。"
90001140-140 = "……何かしら？"
90001140-141 = "[s] \"今から、大切な事を話すね。\""
90001140-142 = "もしかして、明日世界が滅亡でもするのかしら？"
90001140-143 = "[s] \"そこまではいかないけど……。\""
90001140-145 = "[ns] \"ゲーム開発部の子たちが、もうすぐここに来るよ。\""
90001140-149 = "……？"
90001140-153 = "……！"
90001140-154 = "いっそ世界が滅亡する方がマシなのだけれど！？"
90001140-160 = "エイミ、トキ！"
90001140-161 = "うん！"
90001140-166 = "対応します。"
90001140-175 = "帰らせてもらうわ！"
90001140-176 = "トキ、貴女まで私に逆らうの！？"
90001140-177 = "申し訳ありません、リオ様。これが私のやりたいことですので。"
90001140-178 = "さっきのはそういう意味だったのかしら！？"
90001140-179 = "到着は明日だと聞いていたのだけれど……！"
90001140-184 = "今日も明日も、大差ありませんよ。"
90001140-185 = "心の準備が必要なのよ。事前連絡もなく予定を前倒しするなんて、非合理的な決定すぎるわ！"
90001140-186 = "占星術の結果によると、この時間のほうが縁起が良いそうですので。"
90001140-187 = "まだ星占いなんて無意味なものを信じているのかしら？"
90001140-188 = "いつも言っておりますが、占星術は古代から続く天体と人間の出来事にまつわる統計学と――"
90001140-189 = "運命を決めるのは定数なのか変数なのかという哲学と数学と物理学……それらすべてが集約された一つの学問なのですよ？"
90001140-194 = "どうでも良いわよ！"
90001140-202 = "はぁ、はぁ、はぁ……。"
90001140-203 = "[s] \"……大丈夫？\""
90001140-204 = "……大丈夫に見えるのかしら。"
90001140-205 = "もちろん、償うつもりはあるのだけれど……。"
90001140-206 = "でも、こんな仕打ちをするなんて……。"
90001140-210 = "（リオに恨めしい視線を向けられた）"
90001140-211 = "（ちゃんと連絡すればよかったな……）"
90001140-217 = "あ、きましたね。"
90001140-218 = "良いタイミング。"
90001140-220 = "さあ、観念してくださいリオ。"
90001140-221 = "……！"
90001140-227 = "（ヘリが到着した）"
90001140-231 = "（真っ先に飛び出してきたのは……！）"
90001140-235 = "先生！"
90001140-241 = "[ns] \"アリス！\""
90001140-242 = "（アリスは全力で抱きついてきた！）"
90001140-243 = "（先生は転びそうになった！）"
90001140-246 = "先生、会いたかったです！"
90001140-247 = "お久しぶりです、可愛いアリス。"
90001140-248 = "トキ、お久しぶりです！"
90001140-250 = "久しぶり、アリス。"
90001140-254 = "エイミ、その格好は寒くありませんか？"
90001140-255 = "全然、むしろ涼しくてちょうど良いくらい。"
90001140-256 = "そ、それなら良いのですが……。"
90001140-261 = "ようこそ、アリス。そしてゲーム開発部の皆さん。"
90001140-265 = "ヒマリ先輩！#n黄色いジャケットも似合ってます！"
90001140-266 = "あら、ありがとうございます。#nやはりアリスは可愛げのある後輩ですね。"
90001140-268 = "やっほ～来たよ、先生！"
90001140-269 = "他のみんなも、なんか久しぶりだね……。"
90001140-270 = "こんにちは、先生……ここまですごく……大変でした。"
90001140-271 = "楽しい列車旅かと思ってたら、何度も乗り換えて、最後はヘリ……。"
90001140-272 = "……まさか、三日もかかるなんて思ってませんでした。"
90001140-274 = "ゲームで長距離移動してる時ってこんな感じなのかな……。"
90001140-278 = "くしゅん！"
90001140-279 = "[s] \"大丈夫？\""
90001140-280 = "はい、大丈夫です……ううぅ、仰っていた通り、本当に寒いですね。"
90001140-281 = "[s] \"ちゃんと暖かい服装で来てくれたんだね！\""
90001140-282 = "はい！ミドリが選んでくれました。#nいま作ってるゲームの装備に近いデザインなんです！"
90001140-283 = "氷河を舞台にしたアクションRPG・パズルアドベンチャー・ターン制シューティングゲームだよ！"
90001140-284 = "[s] \"……ゲーム要素、ちゃんとまとまってる？\""
90001140-288 = "も、も、もちろんだよ！#n私たちを誰だと思ってるの！"
90001140-289 = "はぁ……。"
90001140-291 = "さあ、そろそろ中に入りましょうか……と、その前に。"
90001140-295 = "最後の一人を……。"
90001140-302 = "こん、にちは。私はこの氷河基地の演算支援A.I.です。#nここまでお越しくださり、ありがとうございます。"
90001140-307 = "……。"
90001140-308 = "……。"
90001140-313 = "本当に……。"
90001140-315 = "A.I.って、ゲームに出てくる人類を滅ぼそうとする悪役によくいるよね？"
90001140-316 = "お姉ちゃん、いくら何でもその言い方は……。"
90001140-317 = "だってそうじゃない？"
90001140-318 = "巨大変身怪獣の親玉が何か企んでそうって話なんだよね？"
90001140-320 = "たしかに……？"
90001140-321 = "いえ……なんと説明すれば良いのでしょう。"
90001140-323 = "私は貴女たちの手助けのために作られましたので、警戒しないでくださ――"
90001140-327 = "リオ先輩！リオ先輩ですね？"
90001140-333 = "ええ！？もしかしてまた……！？"
90001140-334 = "リオ会長、まさか……。"
90001140-336 = "ドッキリ……？"
90001140-338 = "わ、私は[ruby=つかつき]調月[/ruby]リオとは関係なく……。"
90001140-339 = "また会えて嬉しいです、リオ先輩。#nお元気でしたか？"
90001140-340 = "……。"
90001140-341 = "アリスはリオ先輩の顔が見たいです。#nあの時のように、通信でも構いません。"
90001140-342 = "それは……。"
90001140-343 = "大丈夫です、色々な事情があるのは分かっていますから。"
90001140-344 = "……！"
90001140-345 = "でも、やっぱり残念です。#nもしかしたらリオ先輩に会えるかもしれないと期待してしまいました。"
90001140-346 = "うっ……！"
90001140-351 = "[ns] \"ちょっと待って！\""
90001140-355 = "え……？"
90001140-364 = "せ、先生……。"
90001140-370 = "[ns] \"行こう、リオ。\""
90001140-371 = "で、でも……！"
90001140-372 = "[s1] \"大丈夫、私が一緒にいるから。\"\n[s2] \"勇気を出して、リオ。\""
90001140-375 = "……！"
90001140-379 = "わ、分かったから……。"
90001140-381 = "（リオの手を掴んで外に連れ出す）"
90001140-382 = "（幸い、素直についてきてくれた）"
90001140-389 = "あっ、リオ会長だ！"
90001140-390 = "だから、お姉ちゃん……。"
90001140-391 = "……こんにちは、リオ会長。お久しぶりです。"
90001140-392 = "あうぅ……えっと……こん、にちは。リオ会長。"
90001140-399 = "リオ先輩！"
90001140-404 = "っ……！？"
90001140-409 = "良かったですね、リオ様。"
90001140-410 = "可愛いアリスの頭を撫でるチャンスですよ。"
90001140-413 = "そ、そうなのかしら……？"
90001140-415 = "アリスのことだけ「可愛いアリス」って呼ぶんだ？"
90001140-416 = "分かりました。#nでは、「騒がしいモモイ」とお呼びしましょう。"
90001140-417 = "普通でいいです……。"
90001140-421 = "ねえ、会長。#n一つ確認したいんだけど……。"
90001140-426 = "また、世界のために誰かを犠牲にしないといけなくなったら……今度はどうするの？"
90001140-430 = "……。"
90001140-432 = "お、お姉ちゃん……？"
90001140-433 = "モモイ……。"
90001140-435 = "私は後で事情を聞いただけだから、改めて聞いておこうと思って。"
90001140-442 = "な、なんでそんな目で見るの！？#nゲームでも、忘れた頃に前の話題が掘り起こされるものでしょ！？"
90001140-443 = "会長が何をしようとしてるのか知らないけどさ……。"
90001140-444 = "同じ問題が起きた時どうするのか、聞いておいた方がいいと思って。"
90001140-445 = "……。"
90001140-447 = "お姉ちゃん、もうちょっと言い方を……。"
90001140-448 = "だって、私は気を失ってたからよく知らないんだもん！"
90001140-452 = "あれ、ちょっと待って……あの時私を攻撃したのってアリス……？"
90001140-453 = "でも、あれはケイで……うーん？何がどうなってるの？"
90001140-458 = "うぅ、ごめんなさい！全部、アリスのせいです！"
90001140-459 = "だ、大丈夫だよ……！#nもう終わったことだし、こうしてみんな集まってるんだから……！"
90001140-465 = "……。"
90001140-467 = "ゲームでさ、よくある話なんだけど……。"
90001140-468 = "みんなのために一人を犠牲にすべきだって主張する人に限って、いざ自分がその立場になったら逃げちゃうんだよね。"
90001140-469 = "でも、会長はそうじゃなかった。"
90001140-473 = "今からこの都市自体が変貌し、箱舟という新しい概念に歪曲される。#nそうしたら……このキヴォトスは……。"
90001140-474 = "私のせいよ……。"
90001140-475 = "私がこの都市を作らなかったら、最初からこんな事にならなかったのに……。"
90001140-476 = "だから私が、止めないと……。"
90001140-478 = "ど、どういう意味ですか……？"
90001140-479 = "……私一人で、システムを止めてみせるわ。"
90001140-480 = "私の命一つで……世界の終焉を防ぐことができるというのなら#nそうするわ――そうしなければならない。"
90001140-483 = "そうしなければならないと思っているもの……たとえ、それが自分であろうとも。"
90001140-484 = "うん。だから、会長の意思を聞きたいんだ。"
90001140-485 = "――大事な問題だから。"
90001140-486 = "私の命で世界の終焉を防ぐことができるのなら、今でもそうすべきだと思うわ。#nでも……。"
90001140-487 = "他の誰かを犠牲にする必要があるのなら……。"
90001140-488 = "限界まで、別の解決策を模索するわ。"
90001140-489 = "……。"
90001140-490 = "いつも、最初に出た結論が合理的だと信じてきた。"
90001140-491 = "でも、可能性が残されているのなら、諦めるつもりはない。"
90001140-492 = "……取り返しがつかなくなってからでは、遅いもの。"
90001140-498 = "ダメです、リオ先輩。"
90001140-503 = "あ、アリス……？"
90001140-508 = "アリスたちのことを考えてくれるのは嬉しいです。#nでも、その対象にリオ先輩が入っていないのは……。"
90001140-509 = "とても、悲しいです。"
90001140-510 = "私は……。"
90001140-515 = "アリスは、リオ先輩にもチャンスがあってほしいです。"
90001140-520 = "どんなに難しいゲームでも、2回目には上達していますから！"
90001140-525 = "良い例えですね、アリス。"
90001140-527 = "……。"
90001140-528 = "だからリオ先輩、アリスは……。"
90001140-533 = "アリスは……うぅ！"
90001140-535 = "うまく言葉が出てきません……アリスの言語能力に問題が起きたのでしょうか！？"
90001140-537 = "大丈夫だよ、アリスちゃん。#n気持ちを伝えるのって、難しいよね。"
90001140-538 = "なんだか……こうして話せるようになって、よかった。"
90001140-539 = "[s3] \"久しぶりに、胸がジーンとする光景を見ている……。\"\n[s4] \"って、さっきも言った気がする。\""
90001140-544 = "どうしたんですか、先生……？"
90001140-549 = "……。"
90001140-550 = "それで……お互い言いたいことは言い終わった感じかな？"
90001140-551 = "そろそろ本題に入ろう。ヒマリ部長が凍っちゃう。"
90001140-552 = "リオ様に悪気はないのです。そういう方なので。#n代わりに私が謝罪します。"
90001140-557 = "その言い方ではリオの立場が……。"
90001140-561 = "私がこういう会話に慣れていないのは事実よ。それは否定しないわ。"
90001140-562 = "あっ、はい……そうですね、忘れていました。"
90001140-563 = "はぁ……調子が狂います。#n早く慣れたいものですが……。"
90001140-564 = "[s] \"……お疲れ様、ヒマリ。\""
90001140-565 = "先生がいてくださって、本当に良かったです……。"
90001140-567 = "私はたくさんの過ちを犯した……それは事実。"
90001140-568 = "もし、また間違ってしまった時は、教えてちょうだい。"
90001140-569 = "その時は可能な限り、最善を尽くすわ。"
90001140-571 = "（普通に最善を尽くす、だけで良い気がするけど……）"
90001140-572 = "（リオにしては目覚ましい成長ですね）"
90001140-574 = "それで……どうしてアリスたちをここまで呼んだのですか？"
90001140-575 = "そうですよ。しかもすごく迂回してきたし……。"
90001140-580 = "それは……。"
90001140-581 = "[s] \"……その話もしないとね。\""
90001140-583 = "せっかく集まったわけですし、ゆっくり話しましょうか。"
90001140-584 = "気になったことがあれば、いつでも質問してくださって構いませんよ？#n長くなるかもしれませんから、飴ちゃんでも舐めますか？"
90001140-589 = "飴ちゃんって……ヒマリ先輩ちょっとそれは……。"
90001140-590 = "しーっ、お姉ちゃん！善意を無駄にしないの！"
90001140-593 = "次回;雪合戦"
