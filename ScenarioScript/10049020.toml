[translation]
10049020-1 = "Episódio 2; Planos para o fim de semana"
10049020-2 = "――Entendo. Então, vamos organizar as informações."
10049020-3 = "Primeiro, Shimiko, do Comitê da Biblioteca, testemunhou por acaso uma reunião secreta do Grupo dos Capacetes durante seu turno noturno."
10049020-4 = "Sim, exatamente."
10049020-5 = "E então... ouviu conversas sugerindo que o Grupo dos Capacetes Jab-Jab, liderado por Love Komakaze, está planejando algo no parque de diversões."
10049020-6 = "No momento em que Shimiko estava saindo do local, ela encontrou Suzumi, do Esquadrão de Vigilância. #nE relatou esses detalhes a ela... é isso?"
10049020-7 = "Suzumi. Essas duas pessoas foram levadas para o Esquadrão de Socorro?"
10049020-8 = "Estava pensando em interrogá-las no comitê assim que recuperassem a consciência."
10049020-9 = "Não, elas não foram levadas."
10049020-10 = "O que quer dizer com isso...? #nDeixá-las no local é――"
10049020-11 = "Não é isso. Não entramos em combate com os alvos."
10049020-12 = "Como não intervimos... eles não devem ter notado nossa presença."
10049020-13 = "……?"
10049020-14 = "Se não está se sentindo bem, devo chamar o Esquadrão de Socorro?"
10049020-15 = "Sentindo-me mal? Não há problema algum."
10049020-16 = "……Julguei que este fosse um papel do Comitê de Justiça e vim fazer o relato."
10049020-17 = "Sim?"
10049020-22 = "Por que está olhando o calendário?"
10049020-23 = "Ah, não. Não se preocupe com isso."
10049020-24 = "(Não é... primeiro de abril, né...)"
10049020-25 = "Entendi a situação. Porém..."
10049020-26 = "É muito difícil dizer isso, mas o Comitê de Justiça não pode lidar com este caso."
10049020-27 = "Por que... isso...?"
10049020-28 = "……"
10049020-29 = "Agradeço por ter nos relatado. #nMas... o problema é o local."
10049020-30 = "O \"Parque de Diversões Borderland\" tem uma localização um tanto problemática..."
10049020-31 = "Aquele parque fica no distrito autônomo de Trinity, não é?"
10049020-32 = "Sim. O portão principal e metade do terreno pertencem a Trinity. #nMas o portão dos fundos e a outra metade do terreno ficam no distrito autônomo de Gehenna..."
10049020-33 = "Aquele parque de diversões existe exatamente na linha de fronteira entre Trinity e Gehenna."
10049020-34 = "Nós somos o Comitê de Justiça de Trinity. #nUma vez que eles fujam para o lado de Gehenna, não temos o que fazer."
10049020-35 = "Dizem que há pessoas que abusam disso para fazer coisas ruins."
10049020-36 = "……Você está duvidando da nossa informação?"
10049020-37 = "De jeito nenhum. Relatos semelhantes chegaram até nós também."
10049020-38 = "Além disso, o fato de \"Love Komakaze\" estar envolvida também é preocupante. #nPara nós, a existência dela é um fator importante."
10049020-39 = "Estou surpresa. Que o Comitê de Justiça se importe com a líder do Grupo dos Capacetes."
10049020-40 = "Poderíamos dizer que ela é alguém que não podemos ignorar, pois temo como as coisas podem acabar."
10049020-41 = "……"
10049020-43 = "……?"
10049020-44 = "Deixando isso de lado... estou realmente preocupada com o conteúdo do seu relato."
10049020-45 = "Se fosse apenas no lado de Trinity, ainda seria possível lidar com isso, mas..."
10049020-46 = "A realidade é que o Comitê de Justiça está com falta de pessoal... é difícil mobilizar um grande número de pessoas."
10049020-47 = "Por isso, tenho uma proposta."
10049020-48 = "Shimiko, você se lembra das vozes e da aparência daquele Grupo dos Capacetes?"
10049020-49 = "Ah, sim!"
10049020-50 = "Que bom. #nEu também confio na habilidade da Suzumi."
10049020-51 = "……"
10049020-53 = "Portanto, vocês duas poderiam ir verificar a situação no parque de diversões?"
10049020-54 = "Eh?"
10049020-55 = "Peço que evitem ao máximo o combate ou a supressão... e apenas confirmem a situação no local."
10049020-56 = "Dito isso, se confirmarem que os alvos estão realmente lá, #ne for necessária uma resposta, o comitê intervirá."
10049020-57 = "……Ou seja, isso significa que o Comitê de Justiça não pode aparecer publicamente?"
10049020-58 = "Sim. Se o comitê fizer patrulhas, há o risco de o alvo fugir."
10049020-59 = "Além disso, não podemos descartar a possibilidade de conflitos desnecessários com Gehenna durante o processo."
10049020-60 = "Por isso, gostaria de pedir a ajuda de vocês duas."
10049020-61 = "Desde que mantenham a confidencialidade, não me oponho a que peçam ajuda a mais alguém."
10049020-63 = "Dizer isso de repente, assim..."
10049020-64 = "……Entendo."
10049020-65 = "Claro, o comitê também oferecerá todo o suporte possível."
10049020-66 = "O pedido de hoje é apenas para verificar a situação.#nPriorizem a própria segurança e evitem intervenções diretas."
10049020-71 = "Ah! Suzumi-san!"
10049020-76 = "Shimiko-san também!"
10049020-77 = "Ué…… saindo da sala do Comitê de Justiça……!#nSerá que é…… alguma reunião incrível!?"
10049020-79 = "……."
10049020-80 = "……."
10049020-82 = "A-ah, o quê……?"
10049020-88 = "Comitê de Biblioteca - Sala de Descanso"
10049020-89 = "O quê!? Isso é um absurdo!"
10049020-90 = "Não, eu entendo o lado deles."
10049020-91 = "O Comitê de Justiça é uma organização que, por sua posição, não pode agir abertamente."
10049020-92 = "Embora esse tipo de formato seja raro, já recebemos pedidos de cooperação detalhados antes."
10049020-93 = "Isso só mostra o quanto o caso é importante."
10049020-94 = "Mas, se começar uma luta de repente……."
10049020-95 = "Não sabemos quantos eles são, enfrentar tudo isso em duas pessoas é imprudência."
10049020-97 = "Somos 3 pessoas!"
10049020-98 = "Sim?"
10049020-99 = "A superestrela do Grupo de Vigilância, Reisa Uzawa, está aqui!"
10049020-100 = "Superestrela do Grupo de Vigilância……?#nUé? Falando nisso, que tipo de organização é o Grupo de Vigilância?"
10049020-101 = "Não, na verdade, nem é uma organização.#nE, ao contrário do Comitê de Justiça, é apenas autoproclamado."
10049020-102 = "Mas, se a Reisa-san estiver conosco, será uma grande ajuda."
10049020-103 = "Por favor, nos empreste sua força."
10049020-104 = "Com certeza!!"
10049020-105 = "Shimiko-san, obrigado por ajudar mesmo estando ocupada com o trabalho do Comitê de Biblioteca."
10049020-106 = "Não, que isso!"
10049020-107 = "Fui eu quem sugeriu isso primeiro!"
10049020-108 = "Vou dar o meu melhor!"
10049020-109 = "Então, vamos começar a reunião de estratégia!"
10049020-111 = "Primeiro, as informações que temos até o momento……."
10049020-112 = "Segundo o Comitê de Justiça, o Grupo de Capacete Jab-Jab é uma organização de pequeno porte liderada por Love Kawakoma."
10049020-113 = "E, de acordo com as informações da Shimiko-san, outros grupos de capacete também devem ser convocados para o \"Parque de Diversões Borderland\"."
10049020-114 = "É difícil prever qual será a escala disso……."
10049020-115 = "Ou seja, não sabemos quantos deles estão escondidos!"
10049020-116 = "Sim. Incluindo esse ponto, o Comitê de Justiça solicitou apenas a verificação da situação.#nReforçando, para evitar combate direto."
10049020-117 = "Por isso, o ideal seria a infiltração, mas……."
10049020-118 = "Espera-se que o parque de diversões receba muitos visitantes no fim de semana.#nSe nos disfarçarmos de visitantes, será difícil nos identificarmos."
10049020-120 = "Então, que tal nos disfarçarmos de funcionários?"
10049020-121 = "Isso também é difícil.#nExiste o risco de sermos descobertas pelos funcionários reais."
10049020-122 = "Precisamos planejar melhor, mas…… não temos muito tempo.#nPrecisamos decidir uma estratégia logo……."
10049020-123 = "Por enquanto, vou entregar o panfleto do parque.#nTem um mapa no verso, tentem memorizá-lo."
10049020-124 = "Obrigada. Tem um zoológico por perto e…… um lago também.#nO local é cercado por muralhas e parece que as entradas e saídas são fixas."
10049020-125 = "Fufu, parece até um mundo de contos de fadas."
10049020-127 = "Oh... Ohhh...!"
10049020-131 = "Reisa? O mapa está no verso do panfleto, sabia?"
10049020-132 = "É este aqui!!"
10049020-133 = "Isto...?"
10049020-134 = "Sim?"
10049020-138 = "Parque de Diversões Borderland - Área da Trinity"
10049020-140 = "O balão estourou...#nE eu tinha acabado de comprar..."
10049020-141 = "Waaah! A tampa do balde de pipoca... quebrou!"
10049020-142 = "Waaah!"
10049020-143 = "Atendente! Isso aqui! Troque por um novo para mim!"
10049020-146 = "Uau!!"
10049020-147 = "Tem muitos clientes!"
10049020-148 = "Vamos logo!"
10049020-149 = "E-eu ainda... não estou preparada mentalmente..."
10049020-150 = "Vamos, vamos, se não nos apressarmos, eles podem fugir!"
10049020-151 = "Vamos! Partiu!"
10049020-158 = "Suzumi! Combina com você, não precisa ficar com vergonha!"
10049020-159 = "(Ugh...)"
10049020-160 = "(Como foi que eu vim parar nisso...)"
