[translation]
101010-1 = "Episódio 1; Prólogo."

101010-3 = "-Essa história foi anulada."

101010-4 = "Contexto, composição, gênero, intenção, interpretação ...... todos destruídos..."

101010-5 = "Os significados se emaranharam, se misturaram e se agitaram, ficando fora de nosso controle."

101010-8 = "Doutor..."

101010-9 = "Todas as histórias anteriores podem ser esquecidas."

101010-10 = "O que está prestes a acontecer com você não é nem mesmo a mais antiga dessas [ruby=mono]histórias[/ruby]-..."

101010-12 = "Sem heróis, sem vilões, sem incidentes, sem conflitos..."

101010-13 = "Tudo está desconstruído, emaranhado."

101010-15 = "Um ...... mundo criado artificialmente que perdeu seu contexto, estrutura e inevitabilidade."

101010-16 = "E assim, eventualmente, ele perde seu significado e as forças simplesmente se descontrolam em um mundo incompreensível e absurdo."

101010-20 = "Aha, sim - é assim que o mundo existia originalmente."

101010-21 = "Todos nós simplesmente nos esquecemos disso."

101010-24 = "Mas então comece."

101010-26 = "Uma criação [ruby=n snore]distorcida[/ruby] que não pode ser chamada de história."

101010-28 = "Contexto, gênero, inevitabilidade, estrutura - sem tudo,"

101010-32 = "Hostile, Betrayed e Covered ...... histórias de naufrágio."

101010-34 = "Deplorável, imaturo - uma criação [ruby=n snore]distorcida[/ruby] que nem sequer corresponde à narrativa."

101010-36 = "Ele profana o público e insulta os personagens - e o público."

101010-37 = "A história da rebelião."

101010-56 = "Próximo; catástrofe"

