[translation]
101010-1 = "Episódio 1; Prólogo"
101010-3 = "――Esta história foi subvertida."
101010-4 = "O contexto, a estrutura, o gênero, as intenções, a interpretação... tudo foi destruído――"
101010-5 = "Seus significados se emaranharam, se misturaram e se agitaram――ao ponto de se tornarem incontrolavelmente opacos."
101010-8 = "Ó Sensei――"
101010-9 = "Pode esquecer de tudo o que aconteceu na história até agora."
101010-10 = "Porque o que vai acontecer com você daqui em diante, sequer pode ser chamado de história――"
101010-12 = "Sem um protagonista, sem vilões, sem incidentes, sem conflitos――"
101010-13 = "Tudo será desmontado e se entrelaçará――"
101010-15 = "Sem contexto, sem estrutura, sem inevitabilidade... um mundo criado artificialmente."
101010-16 = "E assim――tudo terminará perdendo o sentido, tornando-se um mundo de poderes violentos e indomáveis――um mundo incompressível e absurdo."
101010-20 = "Ah, sim――na verdade, este mundo sempre existiu dessa forma."
101010-21 = "Todos nós apenas nos esquecemos disso."
101010-24 = "Pois bem, que comece."
101010-26 = "A criação distorcida, que nem sequer pode ser chamada de história."
101010-28 = "Sem contexto, sem gênero, sem inevitabilidade, sem estrutura――completamente desprovida de tudo,"
101010-32 = "Uma história de antagonismo, traição e subversão... que caminha para a sua ruína."
101010-34 = "Uma criação patética, imatura――e distorcida a ponto de não se qualificar como uma história."
101010-36 = "Que profana os espectadores e insulta os próprios personagens――"
101010-37 = "Uma história de rebelião."
101010-56 = "Próximo Episódio; Catástrofe"