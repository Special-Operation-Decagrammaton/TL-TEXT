[translation]
101010-1 = "第1話;プロローグ"
101010-3 = "――この物語は、覆された。"
101010-4 = "脈絡、構成、ジャンル、意図、解釈……すべてが破壊され――"
101010-5 = "その意味は絡み合い、混ざり、撹拌され――#n統制できない程に褪せてしまった。"
101010-8 = "先生よ―― "
101010-9 = "これまでの物語は全て忘れるが良い。"
101010-10 = "これからお前の身に起こることは、#n最早そのような[ruby=モノ]物語[/ruby]ですらないのだから――"
101010-12 = "主人公も、悪役も、事件も、葛藤も無く――"
101010-13 = "全てが分解され、縺れあい――"
101010-15 = "脈絡も、構成も、必然性も無くなってしまった……作為的に作られた世界。"
101010-16 = "そうして――果ては意味を失い、力が暴れ回るだけの――#n理解不能で不条理な世界へと。"
101010-20 = "嗚呼、そうだ――元より、この世界はそのように存在していた。"
101010-21 = "我々は皆、それを忘れていただけ。"
101010-24 = "しかして、始めるのだ。"
101010-26 = "物語と呼ぶに満たない、[ruby=いびつ]歪[/ruby]な創作を。"
101010-28 = "脈絡も、ジャンルも、必然性も、構成も――全てを無くした状態で、"
101010-32 = "敵対し、裏切り、覆った……沈みゆく物語を。"
101010-34 = "哀れで、未熟で――物語にすら満たぬ[ruby=いびつ]歪[/ruby]な創作を。"
101010-36 = "観客を冒涜し、登場人物をも侮辱する――"
101010-37 = "叛乱の物語を。"
101010-56 = "次回;破局"
