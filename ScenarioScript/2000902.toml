[translation]
2000902-1 = "とある髭の生徒会長の冬休み"
2000902-4 = "よく来たな、カムラッド！待っていたぞ！"
2000902-5 = "[s] \"あれ、今日はチェリノだけ？\""
2000902-6 = "うーん、それがだな……"
2000902-7 = "せっかくこの豪勢な温泉を丸ごと貸し切ったというのに、みんな仕事が忙しくて来れないとか……。"
2000902-8 = "その誠実な労働態度は悪くないが、本来仕事というのは適度に休んでこそ効率良く働けるものだというのに……全く、要領が悪いことだ。"
2000902-9 = "それに、こんな広い温泉なのに……。"
2000902-10 = "け、決して寂しいとか心細いとか、そういう話じゃないからな！"
2000902-11 = "指導者というのは、元より孤独なもの。"
2000902-12 = "レッドウィンター連邦学園の書記長であり生徒会長であり、さらには環境美化部部長であり清掃部部長であるおいらにとって、今さら孤独など大したことではない。"
2000902-13 = "……だがまあ、今日はせっかくカムラッドが来てくれたからな。特別に少しぐらいは付き合ってやろう！"
2000902-14 = "ふふ……光栄に思うが良い、カムラッド！"
2000902-15 = "ところで、おいらは今から何を楽しめば……？"
2000902-16 = "[s] \"……？私に聞かなくても、チェリノの好きなように……。\""
2000902-18 = "おいらは偉大なる生徒会長とはいえ、今まで温泉で休暇を楽しんだ経験はほとんど無い。"
2000902-19 = "この間旧校舎に温泉ができた時は、バカ共の尻ぬぐいのせいできちんと休めなかったし……。"
2000902-20 = "ということであらためて、今度こそ色々とたくさん楽しんでやろう！"
2000902-21 = "さあカムラッド、おいらに温泉での楽しみ方を提案すると良い！"
2000902-22 = "[s] \"まずはゆっくり温泉に浸かってみたら？\""
2000902-23 = "温泉はもう良い！"
2000902-24 = "ずっと浸かってるとのぼせちゃうし、疲れるし……あんなものに長時間入ってるやつらの気が知れん。"
2000902-25 = "[s] \"読んだことのない漫画を読んでのんびりするとか。\""
2000902-26 = "それはいつも事務局でしてる。"
2000902-27 = "[s] \"美味しい物を食べて、お昼寝をするとか……。\""
2000902-28 = "それも、いつも事務局で……。"
2000902-29 = "ううっ！せっかくの冬休みなのに、これではいつもと同じじゃないか！"
2000902-30 = "うーん、遊園地とかプリン工場の方が良かったか……？"
2000902-31 = "[s1] \"それは普段からくつろぎ過ぎなのでは……？\"\n[s2] \"もういつも休暇みたいな感じだね……。\""
2000902-32 = "うっ、うるさいぞカムラッド！粛清されたいのか！？"
2000902-33 = "うっ、うるさいぞカムラッド！粛清されたいのか！？"
2000902-34 = "せっかくの冬休みなのに、このままでは……何か良い手は無いものか……？"
2000902-35 = "温泉郷でしか楽しめないような娯楽……。"
2000902-40 = "……ん？あの休憩室の端っこにあるテーブルは何だ、カムラッド？"
2000902-41 = "[s] \"卓球台かな？\""
2000902-42 = "卓球……そういえば旧校舎の温泉の時にも、浴衣姿でやっていた生徒たちが結構いたような。"
2000902-43 = "もしかして温泉で卓球というのは定番なのか？"
2000902-44 = "まあ何はともあれ、試してみるとしよう。"
2000902-45 = "よしカムラッド、今からおいらと一緒に卓球をするぞ！"
2000902-46 = "[s3] \"それは全然良いんだけど……。\"\n[s4] \"上手く手加減できるかな……。\""
2000902-47 = "ふふっ、自信満々じゃないか。"
2000902-48 = "ふふっ、自信満々じゃないか。"
2000902-49 = "そこまで自信があるなら、プリンを賭けるのはどうだ？"
2000902-50 = "それも普通のプリンではない、あの「ルワゾー・ブッレ」の最高級抹茶プリンだ！"
2000902-51 = "[s] \"うん、それは全然良いよ。\""
2000902-52 = "ふふっ……[ruby=ただ]無料[/ruby]でプリンが食べられると思うと、ますますやる気が溢れてきたな。"
2000902-53 = "では……"
2000902-57 = "尋常に勝負！"
2000902-59 = "その後、だいぶ長い間チェリノと卓球をやった。"
2000902-60 = "チェリノはあまり上手では無かったのだけれど、なかなか負けを認めないこともあって10セット以上も続いた……。"
