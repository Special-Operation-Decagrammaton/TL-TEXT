[translation]
2000902-1 = "As férias de inverno de uma certa presidente do conselho estudantil bigoduda"
2000902-4 = "Que bom que veio, camarada! Eu estava te esperando!"
2000902-5 = "[s] \"Ué, hoje é só a Cherino?\""
2000902-6 = "Hum, é que..."
2000902-7 = "Apesar de eu ter reservado esta fonte termal luxuosa inteira só para nós, todo mundo está ocupado demais com o trabalho para vir..."
2000902-8 = "Não que essa atitude de trabalho diligente seja ruim, mas, na verdade, o trabalho só rende quando se descansa adequadamente... Francamente, que falta de eficiência."
2000902-9 = "Além disso, mesmo sendo uma fonte termal tão grande..."
2000902-10 = "N-não é como se eu estivesse me sentindo solitária ou desamparada, não é nada disso!"
2000902-11 = "Um líder, por natureza, é alguém solitário."
2000902-12 = "Para mim, que sou a Secretária-Geral, Presidente do Conselho Estudantil, Chefe do Departamento de Embelezamento Ambiental e Chefe do Departamento de Limpeza da Academia Red Winter, a solidão não é nada demais."
2000902-13 = "...Mas bem, já que você veio até aqui, camarada, vou abrir uma exceção e te fazer companhia!"
2000902-14 = "Hehe... Sinta-se honrado, camarada!"
2000902-15 = "Dito isso, o que eu deveria aproveitar agora...?"
2000902-16 = "[s] \"...? Não precisa me perguntar, faça o que você quiser, Cherino....\""
2000902-18 = "Embora eu seja uma grande presidente do conselho estudantil, nunca tive muita experiência aproveitando férias em fontes termais."
2000902-19 = "Da última vez que construíram uma fonte termal no prédio antigo, não consegui descansar direito por ter que limpar a bagunça daqueles idiotas..."
2000902-20 = "Por isso, desta vez, vou aproveitar tudo o que puder!"
2000902-21 = "Vamos lá, camarada, me dê algumas sugestões de como aproveitar uma fonte termal!"
2000902-22 = "[s] \"Que tal começar relaxando na água?\""
2000902-23 = "Fonte termal já deu!"
2000902-24 = "Se eu ficar muito tempo, vou acabar ficando tonta e cansada... Não entendo como tem gente que consegue ficar lá dentro por tanto tempo."
2000902-25 = "[s] \"Talvez ler um mangá que você nunca leu para relaxar?\""
2000902-26 = "Eu já faço isso sempre na secretaria."
2000902-27 = "[s] \"Comer algo gostoso e tirar uma soneca...\""
2000902-28 = "Isso também, eu sempre faço na secretaria..."
2000902-29 = "Argh! Mesmo sendo férias de inverno, isso não é a mesma coisa de sempre?!"
2000902-30 = "Hum, será que um parque de diversões ou uma fábrica de pudim teria sido melhor...?"
2000902-31 = "[s1] \"Você não está relaxando demais no dia a dia...?\"\n[s2] \"Parece que você já vive de férias o tempo todo...\""
2000902-32 = "C-cale a boca, camarada! Quer ser expurgado!?"
2000902-33 = "C-cale a boca, camarada! Quer ser expurgado!?"
2000902-34 = "Mesmo sendo férias de inverno, se continuar assim... Não tem nada de bom para fazer...?"
2000902-35 = "Algum entretenimento que só se pode aproveitar em um resort de águas termais..."
2000902-40 = "...Hm? O que é aquela mesa no canto da sala de descanso, camarada?"
2000902-41 = "[s] \"Será uma mesa de pingue-pongue?\""
2000902-42 = "Pingue-pongue... Agora que você falou, lembro que havia várias alunas jogando de yukata quando fomos à fonte termal do prédio antigo."
2000902-43 = "Será que pingue-pongue em fontes termais é um clássico?"
2000902-44 = "Bem, de qualquer forma, vamos experimentar."
2000902-45 = "Muito bem, camarada, agora você vai jogar pingue-pongue comigo!"
2000902-46 = "[s3] \"Por mim tudo bem, mas...\"\n[s4] \"Será que vou conseguir pegar leve...\""
2000902-47 = "Hehe, quanta confiança, não é?"
2000902-48 = "Hehe, quanta confiança, não é?"
2000902-49 = "Já que está tão confiante, que tal apostarmos um pudim?"
2000902-50 = "E não um pudim qualquer, mas aquele pudim de matcha de altíssima qualidade da \"L'oiseau Bleu\"!"
2000902-51 = "[s] \"Certo, por mim tudo bem.\""
2000902-52 = "Hehe... Só de pensar que vou ganhar um pudim de graça, minha motivação aumentou ainda mais."
2000902-53 = "Então..."
2000902-57 = "Que vença o melhor!"
2000902-59 = "Depois disso, joguei pingue-pongue com a Cherino por um bom tempo."
2000902-60 = "A Cherino não era muito boa, mas como ela se recusava a admitir a derrota, acabamos jogando mais de 10 sets..."
