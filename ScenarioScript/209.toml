[translation]
209-1 = "不滅性について"
209-10 = "……また会えるとはな。"
209-11 = "？――ああ、この姿か。"
209-12 = "もとより好ましい外見ではなかったが、更に醜悪なモノとなってしまった。#n致し方ない事ゆえ、申し訳ないが、今は目を瞑ってくれ。"
209-16 = "……肉体という檻は、いずれ朽ちるのが[ruby=さだめ]運命[/ruby]である。 "
209-17 = "万物は衰退するもの。死と消滅――それは生あるものが受け入れるべき宿命。"
209-18 = "いずれ消え去るものに、意味などない。"
209-22 = "だが芸術は――そこに在り続ける。"
209-23 = "作り手の肉体が朽ち果てようと、芸術はこの世界に存在し――"
209-25 = "「[ruby=かれら]芸術[/ruby]」は、ここで其の価値を――存在を――その境地を証明し続けるのだ。"
209-26 = "肉体の檻から解き放たれ、「不滅」に手を伸ばすことができる唯一の方法――「有限」が「無限」に近づくための軌跡。"
209-28 = "……。 "
209-29 = "先生に、紹介しよう。"
209-30 = "我々が創り出した、教義の人工天使シリーズ[ruby=Communio Sanctorum]「聖徒の交わり」[/ruby]。#n私の新たな芸術作品――"
209-31 = "――グレゴリオ。"
209-32 = "さあ、先生……今一度、喝采の準備を。"
209-34 = "まもなく舞台の幕が上がる――どうか、より強く、激しく、高らかな喝采を！"
