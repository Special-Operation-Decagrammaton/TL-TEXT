[translation]
209-1 = "Sobre a imortalidade"
209-10 = "……Quem diria que nos encontraríamos novamente."
209-11 = "？――Ah, esta forma?"
209-12 = "Nunca foi uma aparência agradável, mas tornou-se algo ainda mais grotesco.#nComo não há como evitar, peço desculpas, mas feche os olhos por enquanto."
209-16 = "……A prisão que é o corpo físico tem como destino apodrecer."
209-17 = "Todas as coisas decaem. Morte e extinção — esse é o destino que todo ser vivo deve aceitar."
209-18 = "Não há significado naquilo que eventualmente desaparecerá."
209-22 = "Mas a arte — ela continua a existir."
209-23 = "Mesmo que o corpo do criador apodreça, a arte permanece neste mundo —"
209-25 = "Essas \"artes\" continuam a provar aqui o seu valor — a sua existência — o seu estado de espírito."
209-26 = "A única maneira de se libertar da prisão do corpo e alcançar a \"imortalidade\" — a trajetória para que o \"finito\" se aproxime do \"infinito\"."
209-28 = "……."
209-29 = "Vou apresentar a você, Sensei."
209-30 = "A série de anjos artificiais da nossa doutrina, a \"Comunhão dos Santos\".#nMinha nova obra de arte —"
209-31 = "――Gregorius."
209-32 = "Vamos, Sensei…… prepare-se para aplaudir mais uma vez."
209-34 = "O palco logo se abrirá — por favor, dê-me aplausos mais fortes, mais intensos e mais altos!"
