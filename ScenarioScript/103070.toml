[translation]
103070-1 = "第7話;ウトナピシュティムの本船（２）"
103070-4 = "その……いかがでしょうか？エンジニア部のみなさん。"
103070-5 = "……大丈夫。おおむね理解した。"
103070-6 = "よ、良かったです……！"
103070-7 = "ああ――この戦艦は、私たちには絶対解明できない、ということが判明したよ。"
103070-8 = "……は、はい！？"
103070-10 = "うん。この戦艦の燃料、推進体、動作原理、エンジン構造、設計に至るまで……何から何まで不可解の塊。"
103070-11 = "これは「オーパーツ」ですからね！私たちが理解できないのも当然と言えます！"
103070-12 = "はぁ……これを解析できたら、"
103070-13 = "私たちの悲願に近づくと思ったのだけど……"
103070-15 = "そ、それほどまでに……？ "
103070-16 = "あっ、ですがご安心を！"
103070-17 = "動作原理は分かっていませんが、操作する程度ならなんとかなりそうですので！"
103070-21 = "車の構造が分からなくても、エンジンを動かして運転する分には支障がないのと同じことです！"
103070-23 = "そして、全ての動作機関は――インプットされたデータをアウトプットデータに変換する装置、と解釈できる。"
103070-24 = "その変換過程さえ理解できていれば、構造が分からずとも結果の予測はできるというもの。"
103070-26 = "車は、アクセルを踏んだら加速、ブレーキを踏んだら減速。ハンドルを回せば方向転換するよね。[ruby=これ]戦艦[/ruby]も同じ。"
103070-27 = "どれを操作したら動くのかをまとめたら、内部構造が分からなくても操作マニュアルを作れる。"
103070-28 = "な、なるほど。"
103070-29 = "では、エンジニア部のみなさん……よろしくお願い致します！"
103070-39 = "ふむ……。"
103070-40 = "今までの結果を総合すると……これを「宇宙戦艦」とは呼べないかもしれません。"
103070-41 = "ええ。搭載している武器もなければ、飛行可能な高度は100,000mが限度……宇宙どころか大気圏を越えた瞬間、バラバラになってしまうでしょう。"
103070-42 = "そして、"
103070-47 = "この戦艦の75%以上が論理演算装置になっている点も気になります。"
103070-48 = "そう、これは戦艦などではなく……飛行可能な量子コンピュータの類です。"
103070-50 = "つまり、"
103070-51 = "これがあればあのバリアを突破することができるのですね？"
103070-52 = "ええ。この量子コンピュータを活用すれば、「多次元解釈」が可能になります。 "
103070-53 = "それだけではありません。このレベルの演算装置であれば……この世の全てをハッキングすることさえできるかもしれません……うふふっ。"
103070-54 = "そう――超天才病弱美少女ハッカーである私が使えば、あの「アトラ・ハシースの箱舟」をも手中に収めることができるやも……"
103070-58 = "では、箱舟を墜落させたり、自爆させる事も……？"
103070-59 = "……そうですね。自爆させるのは難しいですが、推進システムをハッキングできれば墜落させる事は可能です。"
103070-60 = "そのためには、箱舟のシステム自体に接続する必要がありますが――"
103070-66 = "八方塞がりだと思っていましたが……なんだか光明が見えてきましたね。"
103070-67 = "であれば、これは――"
103070-68 = "多次元解釈という[ruby=チート]ルール違反[/ruby]相手に、[ruby=チート]量子コンピュータ[/ruby]で[ruby=ハッキング]対抗[/ruby]する――"
103070-69 = "チート対チート……いえ、ハッカー対ハッカーの戦いとなるでしょう。"
103070-71 = "……ヒマリさんの負担が重くなってしまって申し訳ないです。#n私はこういった事はさっぱりで…… "
103070-72 = "ふふ、お気になさらず♪"
103070-73 = "私は超天才清楚系病弱美少女ハッカーですから。#n――それでは、多次元解釈の理論を構築して参りますので、失礼します。"
103070-74 = "はい。お手伝いが必要な時はいつでも呼んでくださいね。#n私は他の方の様子を見てきます。"
103070-82 = "あら……？"
103070-90 = "AMAS……？#nいつの間に？"
103070-91 = "……その計算は間違っています。"
103070-92 = "機械音……？#nスピーカー装着モデルでしょうか？#nそんな機体、ありましたっけ……？"
103070-93 = "その公式では量子情報のエラーを修正できません。#nイオントラップを利用した方が良いでしょう。"
103070-98 = "……あ、あら？そうですね。"
103070-99 = "天才であるこの私が、こんな初歩的なミスをするなんて……はぁ……"
103070-100 = "……何日も休んでいないからですよ。"
103070-101 = "それはここにいる他の方も同じです。"
103070-102 = "そうですね、仮に違いがあるとすれば……私が病弱美少女である事、でしょうか。"
103070-103 = "ですが、これは――いえ、あなたは……"
103070-106 = "……。"
103070-111 = "私はリオ会長の命令でここに来た、演算サポートAIです。"
103070-113 = "……リオ。"
103070-114 = "リオではありません。演算サポートAIです。 "
103070-118 = "うふふっ、そうですね。#nあの陰気な女に、少しでも良心というものがあるのなら、ここに顔を出すなんてできませんもの。"
103070-119 = "アリスは……"
103070-120 = "アリスは別の場所におりますよ。……そうですね、今から零すのはAI相手の独り言です。超天才病弱美少女の私にも、そういう可愛らしいところがあるのです。"
103070-121 = "私、「トキ」の事に関しては絶対にリオを許せないんです……"
103070-125 = "[ruby=あの女]リオ[/ruby]は、トキに危険な装備を与え、あらゆる任務を課しました。#n「武装」の危険性は、当人が一番分かっていたでしょうに。"
103070-126 = "その上、トキには、友人と呼べるような存在はいませんでした。#nなぜだか分かりますか？"
103070-127 = "……リオが、彼女に一切の交流を禁じたからです。"
103070-128 = "それでもトキは文句ひとつ言わず、どんな任務も進んでこなしました。 "
103070-129 = "挙句の果てには――可愛い後輩の拉致を命じられ、遂行しました。#nこの任務が意味する事を、彼女は理解できているのでしょうか？ "
103070-130 = "そ、れは……"
103070-132 = "リオは、「人を殺める任務」の片棒をトキに担がせたのです。"
103070-134 = "「生命ではない」？いくら、命に対しての観点が異なるとしても、#n絶対に許される事ではないと、何故理解できなかったのでしょうか？ "
103070-135 = "その事を知った時、トキが何を思ったのか――事件の全貌を知るはずの偉大なるビッグシスターは、気付かなかったのでしょうか！"
103070-137 = "……。"
103070-138 = "トキを巻き込むべきではありませんでした。#nトロッコ問題を例に挙げ、彼女は悲劇のヒロインを気取っていましたが――実際にトロッコのレバーを引いたのは、トキです。"
103070-139 = "……。"
103070-140 = "本当に卑劣極まりない女ですよ。#n「シャーレの先生」によって計画が頓挫した途端――"
103070-141 = "今度は「自由に暮らして」などと、無責任な一言を残して姿を消して……。"
103070-142 = "一人残されたトキが何を思ったのか、考えたことはあるのでしょうか？#nあの子がなぜ、C&Cに合流することもなく姿を消したのか……分かるでしょうか。"
103070-143 = "……。"
103070-144 = "ああ、でも……分かるはずもありませんね。#nビッグシスターは、他人の孤独や罪悪感など考えたこともないのでしょうから。"
103070-148 = "トキは私にこう言ったのです。#n「何でもやる」、"
103070-149 = "「皆の役に立ちたい」、と。"
103070-152 = "トキは今なお、サンクトゥムが出現する可能性のある場所で、一人戦っています。#n――自分の負傷など気にも留めずに。"
103070-153 = "彼女が何故あれほど必死になっているのか、あなたには理解できないのでしょうね。 "
103070-154 = "……本当に、あの陰気な女にはもったいないほど、誠実なメイドです。#nC&Cが彼女を受け入れないのなら、私が連れていきます。 "
103070-155 = "……。"
103070-156 = "ふふ……もはや、陰気な女という表現でさえも寛大すぎる気がしてきました。"
103070-157 = "……そうね。"
103070-158 = "……私を良く思っていないのは、理解しているわ。ヒマリ。"
103070-162 = "でも、このオーパーツを動かすためには、私の力が必要不可欠。"
103070-163 = "このキヴォトスにおいて、「名もなき神」の遺産を誰よりも理解している――"
103070-164 = "いいえ、不要です。 "
103070-165 = "あなたが誰よりもコレを理解しているのなら、#nあの時、キヴォトスが終焉を迎えるほどの事態なんて訪れなかったでしょうに。"
103070-166 = "あれを防いだのは、アリスとゲーム開発部のメンバー、そして先生です。"
103070-170 = "ですので、あなたの力は不要です。一刻も早くこの船から降りてください。"
103070-171 = "ここにはアリスとゲーム開発部、そして先生がおりますので。"
103070-172 = "……分かったわ。"
103070-179 = "えっと……ヒマリさん？"
103070-183 = "……ああ、失礼しました。 "
103070-184 = "無人ドローンで、音声チャットのテストをしておりまして―― "
103070-188 = "あの方が、生徒会長の[ruby=つかつき]調月[/ruby]リオさん、ですよね？ "
103070-189 = "姿を消した、と伺っていたのですが……ご無事で何よりです。"
103070-190 = "……。"
103070-191 = "ハナコさん、私は……"
103070-192 = "……あの方を見ていると、とある古代叙事詩を思い出します。"
103070-193 = "叙事詩、ですか？"
103070-194 = "ええ、[ruby=アイロニー]皮肉[/ruby]を語った寓話の……#n予言を避けようとして、悲劇を招いてしまった王のお話です。"
103070-195 = "王国が破滅に至るという神託を授かった王は、その運命から逃れようと、尽力するも――"
103070-197 = "――王の努力が王国を破滅させた……というお話、でしょうか？"
103070-199 = "はい。王はその予言が現実にならないよう、あらゆる手を尽くしました。#n予言者を追放し、神殿を壊し、門を閉ざし……やがて戦争にまで手を出します。 "
103070-200 = "結局、自分が愛した家族や兄弟、家臣はみな命を落とし、国は荒廃した廃墟になってしまったというお話……です。"
103070-202 = "……。"
103070-203 = "考えさせられる物語ですね……「運命」というものは存在するのか、#nはたまた、「決定論」は意味を成すのか。"
103070-204 = "はい。元々はセイアちゃん――予知夢を見る、私の友人と話していた内容ですが……"
103070-205 = "王が運命から逃れるためには、一体どうすべきだったのでしょうか。#n王は、間違っていたのでしょうか。"
103070-206 = "……。"
103070-209 = "……単純な事だよ、ハナコ。"
103070-210 = "王の過ちはただ一つ……#n彼が「王」で在るという事だけだ。"
103070-212 = "王、である事……？"
103070-213 = "予言者を追放し、戦争を起こせるほどの権力を持ち――#nそして、神託を授けられた「王」であった。其れが、王の最大の過ち。"
103070-214 = "ですがセイアちゃん……そのお話だと、王は何も間違っていない、という事になってしまいます。"
103070-215 = "王が自身の能力を諦めていれば――神託を受けなければ。#n予言が現実になる事は無かったのかもしれない。"
103070-216 = "……その理論は、ちょっと強引な気がします。"
103070-217 = "そうだとも。結果論に基づく強引な話。"
103070-218 = "このような物語に解など存在しないからね。"
103070-225 = "ごめんなさい、当人同士の問題に口を挟みたかったわけではなく……"
103070-226 = "第三者の私が差し出がましい真似をしてしまいました。"
103070-227 = "いえ、ハナコさんのお話も理解できます。#n今は、猫の手も借りたい状況ですので……少しでも可能性が広がるのなら、彼女の手を借りる事も必要でしょう。"
103070-228 = "彼女への糾弾は……そうですね、全てが終わってからでも遅くはありませんから。"
103070-229 = "リオ――いえ今は、演算サポートAMASと呼んだ方が良いでしょうか。"
103070-233 = "こちらで、私の計算を手伝っていただけませんか？"
103070-238 = "……。 "
103070-245 = "……まるで、「二つ目の古則」のようですね。"
103070-246 = "[s] \"気にかけてくれてありがとう、ハナコ。\""
103070-250 = "あら……リン行政官、先生……もしかして、聞こえていました？"
103070-251 = "ご心配なさらず。おおかたの事情は把握しております。#nミレニアムの生徒会長がここにいることは、内密にしておきますので。"
103070-252 = "ありがとうございます。#nあの方は、同じ学園の生徒さんからも煙たがられているみたいですし…… "
103070-253 = "あの方や私たちには……まだまだ、問題が山積みですから。"
103070-254 = "……そういえば、リン行政官。#n先ほど「古則」と仰っていた気がしますが……"
103070-255 = "ああ……そうですね。 "
103070-256 = "特に深い意味はありませんが、連邦生徒会長から聞いた――キヴォトスに古くからある、七つの問いのことです。"
103070-260 = "答えがあるのかも、何を問うているのかも不確かな戯言。#n連邦生徒会長は、そういった話がお好きでしたので。"
103070-261 = "[s] \"そうだったんだね。\""
103070-262 = "はい。言葉で説明できないような、ミステリアスな話が好きでした。オーパーツやオカルト……そういった類のものが。"
103070-263 = "先生の「シッテムの箱」もその一つです。#n解析ができないオーパーツですから。"
103070-264 = "[s] \"……なるほど。\""
103070-265 = "「二つ目の古則」は……そういった内容なのです。 "
103070-266 = "「理解できないものを通じて、私たちは理解を得ることができるのか」"
103070-268 = "二つ目の古則のお話は、初めて聞きました。 "
103070-269 = "理解できないものを通じて、理解を得る……？#n不思議な問いですね……。"
103070-270 = "はい……この二つ目の古則には、欠陥があります。"
103070-271 = "……文章が未完成、なのですね。"
103070-272 = "はい。「理解できないもの」を通じて、「何」の理解を得られるのか。目的語が抜けているのです。"
103070-273 = "そう、この文章は最初から「問い」として成立していません。"
103070-274 = "……連邦生徒会長は、これはクイズではないのだから、問題ないと仰っていました。自分の信じる言葉を入れたら良いのだと。"
103070-275 = "それがどのような意味だったのかは、終ぞ分かりませんでしたが…… "
103070-276 = "ハナコさんのお話を聞いて、なんとなく思い出して……。"
103070-277 = "すみません、あまりお気になさらず。"
103070-279 = "うふふ……ですが聞いてしまった以上、答えが気になってしまいますね。"
103070-280 = "そうですね……「理解できないもの」を「運命」とするのなら、その「運命」を通じて「理解を得られるもの」は…… "
103070-281 = "運命を通じて、私たちが理解できることは何なのか……#nこの問いが意味することは、果たして……"
103070-282 = "[s1] \"未完成の問いだからね、\"\n[s2] \"難しく考えないで、好きな言葉を入れていいんだよ。\""
103070-285 = "……ええ。答えを求めるべきではない、ということですよね。この古則は。"
103070-286 = "ハナコさん、一つ、伺っても良いでしょうか？"
103070-287 = "はい、何でしょうか？"
103070-288 = "先ほどの物語の結末は、どうなったのでしょうか。#n王は結局、どのような[ruby=てんまつ]顛末[/ruby]を迎えたのですか？"
103070-289 = "あ……王は、ですね…… "
103070-290 = "自らが国を破滅に向かわせた原因だと気づいて――"
103070-291 = "罪を償う相手も、方法も無く……#n自身の罪を肯定することもできなかった王は――"
103070-292 = "悲嘆に暮れ、そして…… "
103070-296 = "……そうですね。この話は、ここまでにしましょうか。"
103070-297 = "[s] \"…………。\""
103070-305 = "リン先輩、先生。作戦計画書が完成しました。"
103070-306 = "全体ブリーフィングの前に最終確認をしてもらいたいんだよね。#nブリッジに来れる～？"
103070-308 = "あら。もう作戦計画書ができたのですね。"
103070-309 = "……分かりました、行きましょうか。"
103070-315 = "次回;ブリーフィング"
