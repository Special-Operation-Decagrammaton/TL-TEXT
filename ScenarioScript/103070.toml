[translation]
103070-1 = "Episódio 7; A Nave Principal de Utnapishtim (2)"
103070-4 = "Então... o que acham? Pessoal do Departamento de Engenharia."
103070-5 = "……Sem problemas. Eu entendi o básico."
103070-6 = "A-Ainda bem...!"
103070-7 = "Sim――Descobrimos que é absolutamente impossível para nós decifrarmos esta nave de guerra."
103070-8 = "……C-Como é que é!?"
103070-10 = "Uhum. O combustível dessa nave, os propulsores, o princípio de funcionamento, a estrutura do motor, o design... Cada detalhezinho é um amontoado de coisas incompreensíveis."
103070-11 = "Isso é porque ela é um \"Oopart\"! Era óbvio que não conseguiríamos entender!"
103070-12 = "Haa... Eu pensei que se a gente conseguisse analisar isso,"
103070-13 = "chegaríamos mais perto do nosso maior desejo..."
103070-15 = "S-Tudo isso...?"
103070-16 = "Ah, mas não se preocupem!"
103070-17 = "Embora a gente não entenda o princípio de funcionamento, parece que vamos dar conta de operá-la!"
103070-21 = "É a mesma coisa de você não entender como um carro funciona, mas não ter problemas pra ligar o motor e dirigir!"
103070-23 = "Além disso, todos os mecanismos operacionais podem ser interpretados como dispositivos que convertem os dados de entrada em dados de saída."
103070-24 = "Desde que entendamos esse processo de conversão, podemos prever os resultados mesmo sem conhecer a estrutura."
103070-26 = "No caso do carro, se você pisar no acelerador, ele acelera; se pisar no freio, ele desacelera. E se virar o volante, ele muda de direção. Com a nave de guerra é a mesma coisa."
103070-27 = "Se fizermos uma lista com os comandos e o que cada um faz, podemos criar um manual de operação mesmo sem entender a estrutura interna."
103070-28 = "E-Entendo."
103070-29 = "Então, pessoal do Departamento de Engenharia... contamos com vocês!"
103070-39 = "Hmm..."
103070-40 = "Juntando todos os resultados de até agora... Talvez não possamos chamar isso de \"Nave de Guerra Espacial\"."
103070-41 = "Sim. Não há armas a bordo e a altitude máxima de voo é de 100.000 metros... Se tentar passar da atmosfera, muito menos ir pro espaço, ela vai se desfazer em pedaços."
103070-42 = "E tem mais,"
103070-47 = "O fato de mais de 75% desta nave ser composta por dispositivos de cálculo lógico também é intrigante."
103070-48 = "Isso mesmo, isso não é uma nave de guerra... é algo como um computador quântico voador."
103070-50 = "Isso significa que,"
103070-51 = "com isso, seremos capazes de atravessar aquela barreira, não é?"
103070-52 = "Sim. Se utilizarmos este computador quântico, a \"interpretação multidimensional\" será possível. "
103070-53 = "E não é só isso. Com um dispositivo de cálculo desse nível... talvez eu seja capaz de hackear absolutamente tudo neste mundo... Fufufu."
103070-54 = "Isso mesmo――Se for operada por mim, a supergenial hacker, doente e frágil, talvez eu consiga até mesmo tomar o controle daquela \"Arca de Atrahasis\"..."
103070-58 = "Então, até fazer a Arca cair ou se autodestruir seria...?"
103070-59 = "……Hmm. Fazer com que se autodestrua seria difícil, mas se conseguirmos hackear o sistema de propulsão, será possível derrubá-la."
103070-60 = "Para isso, precisamos nos conectar ao próprio sistema da Arca, mas――"
103070-66 = "Eu pensei que estávamos num beco sem saída... mas parece que finalmente vimos uma luz no fim do túnel."
103070-67 = "Sendo assim, nós vamos――"
103070-68 = "Contra um oponente usando a trapaça da interpretação multidimensional, nós revidaremos hackeando usando um computador quântico――"
103070-69 = "Trapaça contra trapaça... Não, será uma batalha de hacker contra hacker."
103070-71 = "……Sinto muito por colocar um fardo tão pesado nas suas costas, Himari-san.#nEu sou péssima com esse tipo de coisa... "
103070-72 = "Hehe, não se preocupe com isso♪"
103070-73 = "Afinal, eu sou a supergenial, pura, frágil e bela hacker.#n――Sendo assim, vou me retirar para construir a teoria da interpretação multidimensional."
103070-74 = "Sim. Me chame a qualquer momento se precisar de ajuda.#nVou dar uma olhada em como as outras pessoas estão."
103070-82 = "Ora...?"
103070-90 = "AMAS...?#nDesde quando?"
103070-91 = "……Esse cálculo está incorreto."
103070-92 = "Voz mecânica...?#nSerá que é um modelo equipado com alto-falante?#nNós tínhamos alguma unidade assim...?"
103070-93 = "Não é possível corrigir o erro de informação quântica com essa fórmula.#nSeria melhor utilizar armadilhas de íons."
103070-98 = "……O-Oh? Tem razão."
103070-99 = "E pensar que eu, uma gênia, cometeria um erro tão básico... Haa..."
103070-100 = "……É porque você não descansa há dias."
103070-101 = "O mesmo vale para as outras pessoas aqui."
103070-102 = "Pois é, se houvesse alguma diferença... Acho que seria o fato de eu ser uma garota linda, frágil e doente."
103070-103 = "Mas, isso é――Não, você é..."
103070-106 = "……。"
103070-111 = "Eu sou a IA de suporte de cálculo que veio até aqui sob as ordens da Presidente Rio."
103070-113 = "……Rio."
103070-114 = "Não sou a Rio. Sou a IA de suporte de cálculo. "
103070-118 = "Fufufu, entendo.#nSe aquela mulher sombria tivesse um pingo de consciência, ela não teria coragem de aparecer aqui."
103070-119 = "A Aris está..."
103070-120 = "A Aris está em outro lugar... Isso aí, o que eu vou falar agora é só eu falando sozinha com uma IA. Até eu, a supergenial, frágil e bela, tenho os meus momentos fofos."
103070-121 = "Eu nunca vou perdoar a Rio pelo que ela fez com a Toki..."
103070-125 = "A Rio deu aquele equipamento perigoso pra ela, e a obrigou a cumprir todo tipo de missão.#nIsso tudo sendo que ela era quem mais conhecia os perigos desse 'Armamento'."
103070-126 = "Além de tudo, a Toki não tinha ninguém que pudesse chamar de amigo.#nSabe o motivo?"
103070-127 = "……Porque a Rio proibiu ela de ter qualquer tipo de interação social."
103070-128 = "Mas a Toki nunca reclamou e completou todas as missões sem hesitar. "
103070-129 = "E no fim de tudo... Ela obedeceu à ordem de sequestrar nossa adorável caloura.#nSerá que ela ao menos entende o que isso significa? "
103070-130 = "I-Isso..."
103070-132 = "A Rio fez a Toki ser sua cúmplice num 'assassinato'."
103070-134 = "'Ela não tem vida'? Por mais que as opiniões sobre o que constitui a vida sejam diferentes, como ela pôde não perceber que isso era algo que jamais seria perdoado? "
103070-135 = "A grandiosa Big Sister, que devia saber de tudo sobre o incidente, não percebeu o que a Toki pensou quando descobriu sobre isso!?"
103070-137 = "……。"
103070-138 = "Ela nunca devia ter envolvido a Toki naquilo.#nUsou o problema do bonde como exemplo e se fez de heroína trágica... mas quem puxou a alavanca de verdade foi a Toki."
103070-139 = "……。"
103070-140 = "Que mulher detestável.#nAssim que o 'Sensei da Schale' arruinou os planos dela――"
103070-141 = "Ainda teve a audácia de sumir deixando um comentário irresponsável, dizendo pra ela 'viver livremente'..."
103070-142 = "Será que ela já parou pra pensar no que a Toki, deixada pra trás, sentiu?#nSabe por que a garota sumiu sem nem se juntar à C&C...?"
103070-143 = "……。"
103070-144 = "É, acho que ela nunca conseguiria entender.#nAfinal, a Big Sister nunca deve ter parado pra pensar na solidão ou na culpa dos outros."
103070-148 = "Sabe o que a Toki me disse?#n'Faço qualquer coisa',"
103070-149 = "'Quero ser útil pra todo mundo'."
103070-152 = "Mesmo agora, a Toki tá lutando sozinha em um lugar onde um Sanctum pode aparecer a qualquer momento.#n――Sem dar a mínima pros próprios ferimentos."
103070-153 = "Aposto que você não entende por que ela tá sendo tão imprudente assim. "
103070-154 = "……Sério, ela é uma criada leal até demais pra uma mulher sombria como aquela.#nSe a C&C não aceitar ela de volta, eu mesma levo ela comigo. "
103070-155 = "……。"
103070-156 = "Hehe... Agora tô achando que até mesmo 'mulher sombria' é um elogio pra ela."
103070-157 = "……Tem razão."
103070-158 = "……Eu entendo que você não goste de mim. Himari."
103070-162 = "Mas o meu poder é essencial pra fazer esse Oopart funcionar."
103070-163 = "Em toda Kivotos, eu sou quem mais entende a herança dos 'Deuses Sem Nome'――"
103070-164 = "Não, não precisamos de você. "
103070-165 = "Se você entende isso melhor que ninguém,#naquela hora, a situação não teria chegado a um ponto em que Kivotos quase foi destruída."
103070-166 = "Quem impediu aquilo foram a Aris, as meninas do Departamento de Desenvolvimento de Jogos e o Sensei."
103070-170 = "Sendo assim, não precisamos do seu poder. Suma desta nave o mais rápido possível."
103070-171 = "Afinal, a Aris, o Departamento de Desenvolvimento de Jogos e o Sensei estão aqui."
103070-172 = "……Tudo bem."
103070-179 = "Err... Himari-san?"
103070-183 = "……Ah, sinto muito. "
103070-184 = "Eu estava fazendo um teste de chat por voz com um drone não tripulado―― "
103070-188 = "Aquela pessoa... era a Presidente Tsukatsuki Rio, não era? "
103070-189 = "Fiquei sabendo que ela estava desaparecida... mas ainda bem que está a salvo."
103070-190 = "……。"
103070-191 = "Hanako-san, eu..."
103070-192 = "……Ao ver aquela pessoa, lembrei de uma antiga epopeia."
103070-193 = "Uma epopeia?"
103070-194 = "Sim, de uma fábula que narra uma ironia...#nA história de um rei que provocou uma tragédia ao tentar fugir de uma profecia."
103070-195 = "Um rei, após receber o oráculo de que seu reino seria destruído, tentou com todas as suas forças escapar daquele destino, mas――"
103070-197 = "――Os esforços do rei acabaram levando o reino à ruína... é isso?"
103070-199 = "Sim. O rei fez de tudo para que a profecia não se concretizasse.#nExilou profetas, destruiu templos, fechou os portões... e acabou até mesmo se envolvendo em guerras. "
103070-200 = "No fim das contas, a sua amada família, seus irmãos e seus servos morreram, e o reino virou ruínas... é essa a história."
103070-202 = "……。"
103070-203 = "É uma história que nos faz refletir... Se o \"Destino\" realmente existe,#nou se o \"Determinismo\" faz algum sentido."
103070-204 = "Sim. Originalmente, essa foi uma conversa que tive com a Seia-chan... a minha amiga que tem sonhos premonitórios..."
103070-205 = "O que o rei deveria ter feito para escapar do seu destino?#nSerá que o rei estava errado?"
103070-206 = "……。"
103070-209 = "……A resposta é simples, Hanako."
103070-210 = "O único erro do rei foi...#nO fato de ele ser o \"Rei\"."
103070-212 = "O fato de... ele ser o Rei?"
103070-213 = "O \"Rei\" era alguém com o poder de exilar profetas e iniciar guerras...#nE que recebeu um oráculo. Esse foi o maior erro do rei."
103070-214 = "Mas, Seia-chan... se for assim, significa que o rei não fez nada de errado."
103070-215 = "Se o rei tivesse aberto mão do seu próprio poder――se não tivesse recebido o oráculo.#nTalvez a profecia nunca tivesse se concretizado."
103070-216 = "……Essa teoria parece um pouco forçada."
103070-217 = "Com certeza. É uma história forçada e baseada no que já aconteceu."
103070-218 = "Porque não existem respostas para histórias como essa."
103070-225 = "Sinto muito, não era minha intenção me intrometer no problema de vocês..."
103070-226 = "Acabei sendo enxerida demais como uma mera espectadora."
103070-227 = "Não, eu entendo o que você quis dizer, Hanako-san.#nNa nossa situação atual, precisamos de toda ajuda possível... Se isso for aumentar nem que seja um pouquinho a nossa chance de sucesso, teremos que aceitar a ajuda dela."
103070-228 = "Condená-la por suas ações... bem, podemos fazer isso depois de resolver tudo isso."
103070-229 = "Rio――não, agora acho melhor te chamar de AMAS de Suporte de Cálculo."
103070-233 = "Você não poderia me ajudar com os meus cálculos aqui?"
103070-238 = "……。 "
103070-245 = "……Isso parece até a \"Segunda Lei Antiga\"."
103070-246 = "[s] \"Obrigado por se importar, Hanako.\""
103070-250 = "Ora... Administradora Rin, Sensei... por acaso vocês escutaram?"
103070-251 = "Não se preocupe. Eu já estava ciente do que aconteceu no geral.#nManterei em segredo o fato de que a Presidente da Millennium está aqui."
103070-252 = "Muito obrigada.#nParece que ela tá sendo deixada de escanteio até pelas alunas da própria academia... "
103070-253 = "Tanto para ela quanto para nós... Ainda temos uma montanha de problemas para resolver."
103070-254 = "……Falando nisso, Administradora Rin.#nAcho que escutei você mencionando uma tal \"Lei Antiga\"..."
103070-255 = "Ah... sim. "
103070-256 = "Não tem um significado profundo, é apenas algo que ouvi da Presidente do Conselho Estudantil Geral――uma das sete perguntas antigas de Kivotos."
103070-260 = "É uma bobagem incerta, não se sabe se tem uma resposta e nem o que a pergunta significa de fato.#nMas a Presidente adorava esse tipo de história."
103070-261 = "[s] \"Entendi.\""
103070-262 = "Sim. Ela adorava histórias misteriosas que não podiam ser explicadas com palavras. Ooparts, o ocultismo... coisas desse tipo."
103070-263 = "A \"Caixa de Shittim\" do senhor também é uma delas.#nAfinal, é um Oopart que não pode ser analisado."
103070-264 = "[s] \"……Faz sentido.\""
103070-265 = "A \"Segunda Lei Antiga\"... é sobre isso. "
103070-266 = "\"Através daquilo que não podemos compreender, seremos nós capazes de alcançar a compreensão de (  )?\""
103070-268 = "É a primeira vez que escuto falar dessa Segunda Lei Antiga. "
103070-269 = "Alcançar a compreensão através daquilo que não podemos compreender...?#nQue pergunta intrigante..."
103070-270 = "Sim... Existe uma falha nessa Segunda Lei Antiga."
103070-271 = "……A frase está incompleta, não é."
103070-272 = "Sim. Através \"daquilo que não podemos compreender\", o que seremos capazes de compreender? O objeto da frase está faltando."
103070-273 = "Exato. Essa frase já é uma \"pergunta\" inválida desde o começo."
103070-274 = "……A Presidente costumava dizer que isso não é um problema, pois não se trata de um teste. E que nós deveríamos apenas preencher com as palavras em que acreditamos."
103070-275 = "Eu nunca cheguei a entender o que ela queria dizer com aquilo, mas... "
103070-276 = "Ao ouvir a sua história, Hanako-san, acabei lembrando disso do nada..."
103070-277 = "Peço desculpas, não ligue para isso."
103070-279 = "Hehe... Mas agora que eu ouvi, eu tô bem curiosa pra saber qual é a resposta."
103070-280 = "Hmm... Se considerarmos \"aquilo que não podemos compreender\" como o \"Destino\", então a \"coisa que seremos capazes de compreender\" através desse \"Destino\" é... "
103070-281 = "O que será que nós somos capazes de compreender através do destino...#nO que será que essa pergunta quer dizer..."
103070-282 = "[s1] \"Já que é uma pergunta incompleta,\"\n[s2] \"Não precisa pensar demais, preencha com a palavra que preferir.\""
103070-285 = "……É verdade. Isso significa que não devemos buscar uma resposta, não é. Para essa Lei Antiga."
103070-286 = "Hanako-san, posso te fazer uma pergunta?"
103070-287 = "Sim, o que foi?"
103070-288 = "Qual foi o desfecho da história que você contou agora há pouco?#nNo final, o que aconteceu com o rei?"
103070-289 = "Ah... o rei... "
103070-290 = "Depois de perceber que ele mesmo foi o culpado por levar seu reino à ruína――"
103070-291 = "Sem ninguém e sem ter como se redimir pelos seus pecados...#nO rei, incapaz de aceitar a própria culpa――"
103070-292 = "Acabou sucumbindo à tristeza, e então... "
103070-296 = "……Sabe. Acho melhor pararmos a história por aqui."
103070-297 = "[s] \"............\""
103070-305 = "Rin-senpai, Sensei. O plano da operação está pronto."
103070-306 = "A gente quer que vocês deem a última conferida antes da reunião geral.#nPodem vir até a ponte de comando~?"
103070-308 = "Nossa. O plano da operação já está pronto?"
103070-309 = "……Entendido. Vamos lá."
103070-315 = "Próximo episódio; A Reunião Geral"