[translation]
103070-1 = "Episódio 7; Navio principal de Utnapishtim (2)"

103070-4 = "O que você acha...? Todos no departamento de engenharia."

103070-5 = "...... Você está bem. Eu entendi principalmente."

103070-6 = "Ei, isso foi bom...!"

103070-7 = "Ah, acontece que nunca seremos capazes de descobrir o que é esse navio de guerra."

103070-8 = "...Sim! ?"

103070-10 = "Sim. O combustível, o propulsor, os princípios operacionais, a estrutura do motor e o design deste navio de guerra... tudo é um mistério."

103070-11 = "Afinal, este é “Oparts”! Não é à toa que não entendemos!"

103070-12 = "Suspiro... se eu pudesse analisar isso..."

103070-13 = "Achei que estávamos nos aproximando do nosso desejo há muito acalentado..."

103070-15 = "Bem, isso...?"

103070-16 = "Ah, mas não se preocupe!"

103070-17 = "Não sei como funciona, mas parece que é muito bom se você apenas operá-lo!"

103070-21 = "É a mesma coisa que mesmo que você não entenda a estrutura de um carro, não há problema em ligar o motor e dirigi-lo!"

103070-23 = "E todos os motores operacionais podem ser interpretados como dispositivos que convertem dados de entrada em dados de saída."

103070-24 = "Contanto que você entenda o processo de conversão, poderá prever o resultado mesmo que não conheça a estrutura."

103070-26 = "Um carro acelera quando você pisa no acelerador e desacelera quando você pisa no freio. Você pode mudar de direção girando a manivela. [ruby=Este]Battleship[/ruby] é o mesmo."

103070-27 = "Depois de resumir quais peças operar, você pode criar um manual de operação mesmo que não conheça a estrutura interna."

103070-28 = "Oh, eu vejo."

103070-29 = "Bom, a todos do departamento de engenharia... muito obrigado!"

103070-39 = "Hum..."

103070-40 = "Se levarmos em conta todos os resultados até agora... talvez não possamos chamar isso de "nave de guerra espacial"."

103070-41 = "Sim. Sem quaisquer armas a bordo, a altitude que poderia voar estava limitada a 100.000 m... desmoronaria no momento em que cruzasse a atmosfera, e muito menos o espaço."

103070-42 = "e,"

103070-47 = "Também é interessante notar que mais de 75% deste navio de guerra é uma unidade de operação lógica."

103070-48 = "Sim, isto não é um navio de guerra nem nada... é algum tipo de computador quântico que pode voar."

103070-50 = "Em outras palavras,"

103070-51 = "Se você tiver isso, poderá romper essa barreira, certo?"

103070-52 = "Sim. Ao utilizar este computador quântico, a “interpretação multidimensional” torna-se possível."

103070-53 = "Isso não é tudo. Com um dispositivo de computação deste nível... pode até ser possível hackear tudo neste mundo... hehehe."

103070-54 = "É isso mesmo - se eu, um hacker supergênio e doentio, puder usá-lo, posso até colocar aquela "Arca de Atlas Hasith" em minhas mãos..."

103070-58 = "Então, e se a arca quebrar ou se autodestruir...?"

103070-59 = "……Concordo. É difícil fazê-lo se autodestruir, mas é possível fazê-lo cair se você hackear o sistema de propulsão."

103070-60 = "Para fazer isso, precisamos nos conectar ao próprio sistema da Arca..."

103070-66 = "Achei que estava preso em todas as direções, mas agora vejo alguma luz."

103070-67 = "Se sim, isso é--"

103070-68 = "Usar um [ruby=cheat]computador quântico[/ruby] para [ruby=hacking]contra-atacar[/ruby] contra um oponente de [ruby=cheat]violação de regra[/ruby] é chamado de interpretação multidimensional."

103070-69 = "Será uma batalha de trapaceiros contra trapaceiros... não, hackers contra hackers."

103070-71 = "...Sinto muito que o fardo tenha ficado mais pesado para Himari-san. #nNão sei nada sobre esse tipo de coisa..."

103070-72 = "Hehe, não se preocupe♪"

103070-73 = "Sou um hacker supergênio, arrumado e doentiamente lindo. #n――Agora, se me dá licença, vou construir uma teoria de interpretação multidimensional."

103070-74 = "sim. Por favor, me ligue sempre que precisar de ajuda. #nVou verificar os outros."

103070-82 = "falta……?"

103070-90 = "AMAS...? #nQuando?"

103070-91 = "...Esse cálculo está errado."

103070-92 = "Som mecânico...? É um modelo com #n alto-falante instalado? #nEssa aeronave existiu...?"

103070-93 = "Essa fórmula não pode corrigir erros na informação quântica. #nSeria melhor usar uma armadilha de íons."

103070-98 = "...Ah, ah? Concordo."

103070-99 = "Eu, um gênio, poderia cometer um erro tão básico... suspiro..."

103070-100 = "...Porque não tenho um dia de folga há dias."

103070-101 = "O mesmo vale para todos os outros aqui."

103070-102 = "Bem, se há uma diferença... seria que eu sou uma garota linda e doentia."

103070-103 = "Mas isso... não, você..."

103070-106 = "……."

103070-111 = "Sou uma IA de suporte de cálculo que veio aqui por ordem do Presidente Rio."

103070-113 = "...Rio."

103070-114 = "Não o Rio. Suporte aritmético AI."

103070-118 = "Ufufu, isso mesmo. #nSe aquela mulher sombria tivesse a menor consciência, ela não poderia aparecer aqui."

103070-119 = "Alice é..."

103070-120 = "Alice está em outro lugar. ...Bem, o que estou prestes a contar é o solilóquio do oponente da IA. Mesmo sendo um supergênio e uma garota linda e doentia, também tenho esse lado fofo."

103070-121 = "Nunca poderei perdoar o Rio quando se trata de "Toki"..."

103070-125 = "[ruby=Aquela mulher]Rio[/ruby] deu a Toki equipamentos perigosos e atribuiu a ele todos os tipos de missões. #nA pessoa em questão seria a mais consciente dos perigos de estar “armado”."

103070-126 = "Além disso, Toki não tinha ninguém que pudesse chamar de amigo. #nVocê sabe por quê?"

103070-127 = "...Porque Rio a proibiu de ter qualquer interação com ele."

103070-128 = "Mesmo assim, Toki não reclamou e estava disposto a assumir qualquer tarefa."

103070-129 = "No final, recebi ordens de sequestrar um júnior fofo e eu o fiz. #nEla entende o que esta missão significa?"

103070-130 = "isso é……"

103070-132 = "O Rio designou Toki para ser seu parceiro na “missão de matar pessoas”."

103070-134 = "“Não é vida”? Não importa quão diferentes sejam os nossos pontos de vista sobre a vida, por que não conseguimos entender que isso é absolutamente inaceitável?"

103070-135 = "O que Toki pensou quando descobriu isso? Será que a grande Irmã Mais Velha, que deveria saber toda a história do incidente, não percebeu?"

103070-137 = "……."

103070-138 = "Eu não deveria ter envolvido Toki. #nUsando o problema do carrinho como exemplo, ela fingiu ser uma heroína trágica, mas na verdade foi Toki quem puxou a alavanca do carrinho."

103070-139 = "……."

103070-140 = "Ela é realmente uma mulher desprezível. #nAssim que o plano foi descarrilado pelo “Professor da Placa de Petri”――"

103070-141 = "Desta vez, ele deixou uma mensagem irresponsável como “viva livremente” e desapareceu..."

103070-142 = "Você já se perguntou o que Toki estava pensando quando foi deixado sozinho? #nVocê sabe por que aquela garota desapareceu sem ingressar no C&C?"

103070-143 = "……."

103070-144 = "Ah, mas... não tem como você entender. #n A Irmã Mais Velha nunca pensou na solidão ou na culpa de outras pessoas."

103070-148 = "Toki disse isso para mim. #n"Eu farei qualquer coisa","

103070-149 = "“Quero ser útil a todos”, disse ele."

103070-152 = "Toki ainda está lutando sozinho em locais onde o Sanctum pode aparecer. #n――Não se importando com seus próprios ferimentos."

103070-153 = "Acho que você não consegue entender por que ela está tão desesperada."

103070-154 = "... Ela é realmente uma empregada sincera, o que é uma pena para aquela mulher sombria. #nSe C&C não levar ela, eu levo ela."

103070-155 = "……."

103070-156 = "Hehe... estou começando a sentir que até mesmo chamá-la de mulher sombria é muito generoso."

103070-157 = "...Isso mesmo."

103070-158 = "...Eu entendo que você não pensa bem de mim. Himari."

103070-162 = "Porém, para movimentar este Oparts, minha força é essencial."

103070-163 = "Neste Kivotos, ele entende o legado do “Deus Sem Nome” melhor do que ninguém..."

103070-164 = "Não, não é necessário."

103070-165 = "Se você entendesse isso melhor do que ninguém, a situação que provocou o fim do Kivotos não teria acontecido naquele momento."

103070-166 = "As pessoas que impediram que isso acontecesse foram Alice, os membros do departamento de desenvolvimento de jogos e o professor."

103070-170 = "Portanto, sua ajuda não é necessária. Por favor, saia deste navio o mais rápido possível."

103070-171 = "Alice, o departamento de desenvolvimento de jogos e o professor estão aqui."

103070-172 = "...Eu entendo."

103070-179 = "Hum... Himari-san?"

103070-183 = "...Ah, com licença."

103070-184 = "Estamos testando o bate-papo por voz usando um drone não tripulado."

103070-188 = "Essa pessoa é Rio-san, a presidente do conselho estudantil [ruby=Tsatsuki]Chogetsu[/ruby], certo?"

103070-189 = "Ouvi dizer que ela havia desaparecido... estou feliz que ela esteja segura."

103070-190 = "……."

103070-191 = "Hanako-san, eu..."

103070-192 = "...Quando olho para aquela pessoa, lembro-me de um certo poema épico antigo."

103070-193 = "Épico?"

103070-194 = "Sim, é uma fábula de [ruby=ironic]sarcasmo[/ruby] sobre um rei que tenta evitar uma #nprophecy e convida à tragédia."

103070-195 = "O rei, que recebeu um oráculo de que seu reino estaria condenado, faz o possível para escapar desse destino..."

103070-197 = "--Esta é uma história em que os esforços do rei levaram à ruína do reino?"

103070-199 = "sim. O rei fez tudo ao seu alcance para evitar que a profecia se cumprisse. #n Banir o profeta, destruir o templo, fechar o portão... e eventualmente iniciar uma guerra."

103070-200 = "No final, a família, os irmãos e os vassalos que ele amava perderam a vida e o país foi reduzido a ruínas..."

103070-202 = "……."

103070-203 = "É uma história instigante... existe algo como "destino" e o "determinismo" faz sentido?"

103070-204 = "sim. Originalmente, eu estava falando sobre Seia-chan, uma amiga minha que tem sonhos proféticos..."

103070-205 = "O que o rei deveria ter feito para escapar do seu destino? #nO rei estava errado?"

103070-206 = "……."

103070-209 = "...É simples, Hanako."

103070-210 = "A única falha do rei é que ele é um “rei”."

103070-212 = "Ser um rei...?"

103070-213 = "Ele tinha poder suficiente para banir profetas e iniciar guerras, e era um “rei” que recebeu um oráculo. Esse foi o maior erro do rei."

103070-214 = "Porém, Seia-chan... nessa história, o rei não fez nada de errado."

103070-215 = "Se o rei tivesse desistido de suas próprias habilidades... a menos que recebesse um oráculo. #nA profecia pode nunca ter se tornado realidade."

103070-216 = "...Essa teoria parece um pouco absurda."

103070-217 = "Isso mesmo. Uma história contundente baseada em resultados."

103070-218 = "Não há solução para uma história como esta."

103070-225 = "Me desculpe, não tive a intenção de interferir nos problemas entre nós dois..."

103070-226 = "Como terceiro, acabei imitando alguém de forma intrusiva."

103070-227 = "Não, consigo entender a história da Hanako-san. #nNo momento, estou em uma situação em que quero pedir a ajuda de um gato... então, se eu puder aumentar um pouco minhas chances, provavelmente precisarei pedir a ajuda dela."

103070-228 = "Quanto a acusá-la... bem, não é tarde para criticá-la mesmo depois de tudo acabar."

103070-229 = "Rio: Bem, por enquanto, acho que seria melhor chamá-lo de Apoio Aritmético AMAS."

103070-233 = "Você poderia me ajudar com meus cálculos?"

103070-238 = "……."

103070-245 = "...É como a "segunda velha regra"."

103070-246 = "[s] \"Obrigado pela sua preocupação, Hanako.\""

103070-250 = "Ah... Administrador Lin, professor... talvez você tenha me ouvido?"

103070-251 = "Não se preocupe. Estou ciente da sua situação. #nVou manter em segredo o fato de que o Presidente do Conselho Estudantil do Milênio está aqui."

103070-252 = "obrigado. #nEssa pessoa parece não ser apreciada pelos alunos da mesma escola..."

103070-253 = "Ainda há muitos problemas para essas pessoas e para nós..."

103070-254 = "...Agora que penso nisso, Administrador Lin. #nAcho que você mencionou "regras antigas" anteriormente..."

103070-255 = "Ah... isso mesmo."

103070-256 = "Não tem nenhum significado profundo, mas ouvi do Presidente do Conselho Estudantil da Federação – é sobre as sete questões que existem desde os tempos antigos em Kivotos."

103070-260 = "É uma piada que não está claro se há uma resposta ou qual é a pergunta. #nO Presidente do Conselho Estudantil da Federação gostou de histórias como essa."

103070-261 = "[s] \"Isso mesmo.""

103070-262 = "sim. Eu gostava de histórias misteriosas que não podiam ser explicadas em palavras. Oparts, o oculto... coisas assim."

103070-263 = "A "Caixa de Shittim" do Sensei é uma delas. #nPorque é uma peça que não pode ser analisada."

103070-264 = "[s] \"...Entendo.\""

103070-265 = "A “segunda regra” é... é isso que diz."

103070-266 = "“Podemos obter compreensão através do incompreensível?”"

103070-268 = "Esta é a primeira vez que ouço falar da segunda regra antiga."

103070-269 = "Ganhar compreensão através do incompreensível...? #nEssa é uma pergunta estranha...."

103070-270 = "Sim...esta segunda regra antiga é falha."

103070-271 = "...A frase está inacabada, não é?"

103070-272 = "sim. Podemos obter compreensão de “o que” através de “aquilo que não podemos compreender”? O objeto está faltando."

103070-273 = "Sim, esta frase não foi estabelecida como uma “pergunta” desde o início."

103070-274 = "...O Presidente do Conselho Estudantil da Federação disse que não havia problema, já que não era um teste. Acho que não há problema em colocar palavras nas quais você acredita."

103070-275 = "Nunca entendi o que isso significava, mas..."

103070-276 = "Quando ouvi a história de Hanako-san, lembrei-me de uma coisa..."

103070-277 = "Desculpe, eu realmente não me importo."

103070-279 = "Hehehe... Mas agora que perguntei, estou curioso para saber a resposta."

103070-280 = "É isso mesmo... Se definirmos "o que não podemos entender" como "destino", então "o que podemos obter compreensão através" desse "destino" é..."

103070-281 = "O que podemos entender através do destino...#nO que essa pergunta realmente significa..."

103070-282 = "[s1] \"É uma questão inacabada\"\n[s2] \"Não pense muito sobre isso, você pode usar as palavras que quiser.\""

103070-285 = "……Sim. Isso significa que você não deve procurar respostas. Esta velha regra é."

103070-286 = "Hanako-san, posso te perguntar uma coisa?"

103070-287 = "Sim, o que é isso?"

103070-288 = "Como terminou a história acima? #nQue tipo de [ruby=tenmatsu]fim[/ruby] o rei teve no final?"

103070-289 = "Ah... o rei é..."

103070-290 = "Percebendo que ele foi a causa da destruição do país..."

103070-291 = "Não havia ninguém para expiar seus pecados, não havia como fazê-lo...#nO rei, que era incapaz de reconhecer seus próprios pecados..."

103070-292 = "De coração partido e..."

103070-296 = "……Concordo. Vamos terminar essa história aqui?"

103070-297 = "[s] \"………….\""

103070-305 = "Lin-senpai, professora. O plano estratégico foi concluído."

103070-306 = "Gostaria de ter uma confirmação final antes do briefing geral. #nVocê pode vir até a ponte?"

103070-308 = "falta. Você já criou um plano estratégico."

103070-309 = "...Ok, vamos."

103070-315 = "Próxima vez; resumo"

