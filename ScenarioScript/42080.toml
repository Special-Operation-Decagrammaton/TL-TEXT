[translation]#[Texto revisado.] Em aguardo de revisão de formatação de texto. - Filipe 11/06.
42080-1 = "Episódio 8;Uma Nova Liderança Interina"
42080-2 = "Portões do Edifício do Conselho Estudantil Geral"
42080-3 = "（Assim que assisti à transmissão bizarra da Kaya, corri para as portas do Conselho Estudantil.）"
42080-10 = "S-Sensei……!!"
42080-11 = "S-Socorro…… A Oficial Rin…… A Rin-senpai foi……!"
42080-12 = "[s1] \"Ayumu, respira. Fala devagar.\"\n[s2] \"O que aconteceu aqui dentro?\""
42080-13 = "É que…… bem……"
42080-14 = "É que…… bem……"
42080-15 = "A Rin-senpai foi arrastada daqui e colocada em prisão domiciliar compulsória."
42080-16 = "Disseram que ela forjou a Carta de Sucessão da Presidente Desaparecida por pura ganância, e que usou o poder do conselho para acobertar atos de terrorismo e afins……"
42080-17 = "[s] \"Carta de Sucessão da Presidente……?\""
42080-18 = "I-Isso tem que ser um mal-entendido grotesco……!!"
42080-19 = "Mal-entendido é eufemismo…… Isso foi uma armação descarada pra puxar o tapete dela."
42080-20 = "Se aquela mulher viciada em trabalho e regras agisse por ganância e ambição egoísta, a burocracia do conselho não estaria tão engessada e travada o tempo todo."
42080-21 = "……Mas foi exatamente por ela ser tão metódica e certinha que ela caiu feito um pato numa armadilha tão escancarada."
42080-22 = "[s] \"E vocês duas? Ayumu, Momoka, ninguém tocou em vocês?\""
42080-23 = "Sim…… nós fomos poupadas de qualquer retaliação direta. Mas……"
42080-24 = "Assim que a prisão da Rin-senpai foi anunciada pelos alto-falantes, o comitê mergulhou num caos,#ne os gritos exigindo que a Diretora Kaya do Escritório de Defesa assumisse a coroa ecoaram por todo o plenário……"
42080-25 = "Os conselheiros que tentaram defender a Rin-senpai foram engolidos pelos gritos,#ne literalmente enxotados da sala de conferências pela segurança……"
42080-26 = "É…… eu confesso que já murmurei várias vezes que queria jogar tudo pro alto e não trabalhar mais……#nMas nunca imaginei que o nosso \"dia de folga\" começaria com um golpe de estado."
42080-33 = "……Sensei da Schale. Fico grata pela sua pontualidade."
42080-34 = "A \"Nova Presidente Interina do Conselho Estudantil\" está aguardando a sua presença."
42080-35 = "Por aqui, se me acompanha."
42080-37 = "――Se eu fosse você, Sensei, eu dava meia-volta agora."
42080-38 = "Isso fede a armadilha letal a quilômetros de distância. Você é doido de entrar sorrindo na jaula do leão?"
42080-39 = "Se você acabar mastigado e cuspido feito um pacote de salgadinho vazio lá dentro, não diga que eu não avisei."
42080-40 = "[s] \"……Não se preocupem. Vai dar tudo certo.\""
42080-42 = "[ns] \"Eu já volto. Fiquem seguras, Momoka, Ayumu.\""
42080-43 = "Haaah…… Esse otimismo cego e suicida é o maior charme dele, não tem jeito……"
42080-44 = "Bem, o que uma preguiçosa mastigadora de batatas como eu pode fazer a não ser torcer……?"
42080-45 = "S-Sensei, por favor, tome o máximo de cuidado possível……!"
42080-49 = "……Por favor, entre."
42080-51 = "Escritório da Presidência Interina do Conselho Estudantil Geral"
42080-52 = "Boa tarde, Sensei da Schale."
42080-53 = "Peço perdão pela convocação abrupta e indelicada no meio da tarde."
42080-54 = "Eu cheguei a enviar escoltas para trazê-lo formalmente, mas, como o seu escritório na Schale estava misteriosamente vazio nesta tarde, fui obrigada a recorrer a…… outros métodos."
42080-55 = "No presente momento, o Conselho Estudantil está lidando com uma transição de poder de extrema urgência. O seu nome e o peso da sua instituição são vitais para o próximo capítulo de Kivotos, por isso exigi a sua presença imediata.#nReitero minhas desculpas se os meus métodos soaram coercitivos."
42080-59 = "……A propósito, o senhor estava resolvendo algum assunto urgente nos becos da cidade?#nQue eu saiba, a sua agenda na Schale estava completamente livre para hoje."
42080-60 = "[s] \"Eu estava num churrasco particular no parque.\""
42080-62 = "[ns] \"……Mas isso não importa agora. O que você fez com a Rin?\""
42080-63 = "A ex-Oficial Administrativa Nanagami Rin foi confinada aos seus aposentos na zona residencial, sob forte supervisão."
42080-64 = "Como anunciei na rede nacional, a cadeira dela não poderia permanecer vazia e apodrecendo durante essa crise.#nPortanto, assumi o fardo de Presidente Interina do Conselho Estudantil."
42080-65 = "――Tudo em estrita observância à vontade da \"Carta Secreta da Presidente Desaparecida\"."
42080-66 = "[s] \"E de que buraco mágico essa carta conveniente saiu?\""
42080-67 = "……Eu a exumei das catacumbas da sua própria instituição. No subsolo da Schale."
42080-68 = "Naquela câmara oculta, encontrei não apenas essa carta, mas também relíquias seladas da Presidente, incluindo os projetos de acesso da Câmara de Criação (Craft Chamber).#nIsso prova inegavelmente a autenticidade e a origem da carta."
42080-69 = "A Presidente deve ter cometido um pequeno \"erro de digitação\" na transferência de autoridade para a Schale…… afinal……"
42080-70 = "Até a \"impecável\" Oficial Rin é um ser humano frágil, suscetível a erros grotescos e falhas de julgamento."
42080-71 = "[s] \"……Kaya, você arrombou o meu cofre no subsolo da Schale sem a minha autorização?\""
42080-75 = "……Sim, Sensei. Eu não tenho o hábito de negar os meus pecados úteis."
42080-76 = "Quando o golpe da Kaiser lançou o Distrito D.U. nas chamas e o caos reinou, eu aproveitei a cegueira geral para invadir o subsolo da Schale.#nO meu objetivo não era roubar você, mas sim resgatar a verdade selada que a Presidente deixou para trás.#n――Eu precisava decifrar a vontade final dela."
42080-77 = "A dúvida me consumia há meses: Por que uma mente brilhante como a Presidente desapareceria entregando as chaves do mundo nas mãos incompetentes da Rin?"
42080-78 = "Achei que existia um plano oculto, uma engrenagem que nós, meros mortais, não estávamos enxergando.#nE foi essa obsessão que me guiou até o cofre――"
42080-79 = "E, no escuro daquela sala, as verdadeiras intenções da Presidente se revelaram para mim."
42080-80 = "Estou ciente de que violei a sua privacidade e jurisdição de forma criminosa, Sensei. No entanto……"
42080-81 = "[s] \"……Você acha que os fins justificam os meios sujos, não é?\""
42080-82 = "Adoro dialogar com mentes brilhantes. Sim.#nVocê, mais do que ninguém, sabe disso. A Verdadeira Justiça não pode ser alcançada se você tiver medo de sujar as mãos quebrando regras."
42080-83 = "As regras são imperfeitas, porque são forjadas por pessoas imperfeitas. A burocracia cria brechas, e parasitas sempre surgem para se alimentar dessas falhas."
42080-84 = "Para expurgar essas pragas e limpar o sistema, é necessária uma \"Força Absoluta\". O Poder Esmagador."
42080-85 = "……Admito que a Kaiser Corporation foi gananciosa e exibida demais no último espetáculo…… Mas o poder econômico e militar bruto que eles possuem é uma realidade inegável……"
42080-86 = "Sendo assim, decidi parar de lutar contra a maré e, em vez disso, \"apropriar-me\" desse poder para o nosso próprio benefício."
42080-87 = "Mas não se assuste. Como Diretora do Escritório de Defesa, colocar monstros na coleira é a minha especialidade."
42080-88 = "[s] \"……E o que você pretende fazer, armada com todo esse poder e o trono nas mãos?\""
42080-89 = "Ahahaha, não precisa franzir a testa dessa forma, Sensei.#nEu lhe dou a minha palavra de que a autonomia e a existência da Schale estão completamente a salvo."
42080-90 = "Enquanto a administração da Rin cambaleava na lama, a Schale operou milagres. Você desatou os nós de Kivotos e conquistou a fé cega de incontáveis alunas em todos os distritos."
42080-91 = "Eu deveria erguer uma estátua em sua homenagem. Jamais ousaria erguer a espada contra você."
42080-92 = "Mas…… eu vejo o quão exausto você está. Eu vejo o peso cósmico e as responsabilidades desumanas que esmagam os seus ombros todos os dias."
42080-93 = "Eu sei que suas alunas se revezam como voluntárias no seu escritório para tentar aliviar a sua dor…… mas enquanto as engrenagens burocráticas da Schale não mudarem, você continuará sangrando até a morte na sua mesa de trabalho."
42080-94 = "Nós, do Novo Governo, pensamos profundamente sobre isso.#nComo poderíamos honrar o sacrifício do Sensei? Como poderíamos libertá-lo do seu fardo?"
42080-95 = "E a resposta…… é esta."
42080-99 = "[ns] \"……O que é esse documento?\""
42080-100 = "Uma \"Proposta de Reestruturação Administrativa\" para a Schale."
42080-101 = "O núcleo desse documento foi redigido com o único objetivo de expurgar o seu estresse e as suas responsabilidades estafantes."
42080-102 = "Ele não subtrai os seus direitos. Pelo contrário, expande a sua autoridade tática em certos parâmetros diplomáticos para lhe dar total liberdade de ação."
42080-103 = "Peço que leia as cláusulas com carinho.#nSe as diretrizes agradarem o seu paladar…… basta assinar com sangue na última folha."
42080-104 = "[s] \"Se eu colocar a minha assinatura aqui…… o que vai mudar de fato?\""
42080-106 = "……Fisicamente? Nada. O seu céu continuará azul."
42080-107 = "Você continuará acordando e fazendo exatamente o que mais ama.#nContinuará salvando gatinhos de árvores e ouvindo os dramas escolares, como sempre."
42080-108 = "Viverá as suas doces aventuras cotidianas com as alunas, bancando o herói gentil……"
42080-109 = "Mas…… e este é o ponto vital: você não será OBRIGADO a fazer mais nada.#nSe o peso ficar denso, se você decidir fechar as portas e não agir, ninguém em Kivotos terá o direito de cuspir no seu nome."
42080-110 = "Se as suas missões ou mimos para as garotas exigirem orçamentos astronômicos, os nossos cofres serão jorrarão rios de dinheiro em suas contas sem perguntas."
42080-111 = "Aquelas pilhas de relatórios e impostos nojentos que você odeia assinar de madrugada? Os meus burocratas engolirão esse papelório por você."
42080-112 = "Exatamente. O seu título será o de um rei intocável.#nUma vida de liberdade dourada."
42080-113 = "Tudo o que eu exijo em troca…… é uma única e minúscula concessão."
42080-114 = "Da assinatura em diante, todas as operações táticas, políticas e sociais da Schale carregarão a bandeira e o selo do \"Conselho Estudantil Geral\"."
42080-115 = "Se você aceitar ceder a sua autoria, a mágica acontece.#nPorque eu absorverei cada gota de responsabilidade, escândalo ou dano colateral que a Schale causar."
42080-116 = "Não importa que atrocidade a Schale cometa, não importa o erro de julgamento grotesco que você faça no futuro……#nO sangue nunca manchará as suas mãos. Você jamais sentará no banco dos réus."
42080-117 = "E então? É a barganha do século. O Jardim do Éden sem o pecado original."
42080-118 = "Não me olhe assim. Todo mundo sabe que o maior pesadelo na vida de um \"adulto\" é ter que arcar com as consequências destrutivas das próprias escolhas, não é?"
42080-120 = "Portanto, jogue os seus pecados no meu colo. Eu serei a sua absolvição."
42080-121 = "Entregue a sua consciência a mim…… e seja livre, Sensei. Abandone a dor."
42080-123 = "[ns] \"O seu discurso de vendedora é impecável, Kaya. Mas eu passo.\""
42080-125 = "[ns] \"A essência de ser um \"Adulto\"…… é exatamente engolir em seco e carregar as cicatrizes das próprias escolhas.\""
42080-127 = "…………Como é?"
42080-128 = "Sensei, eu acho que o seu cérebro não processou os benefícios reais dessa oferta."
42080-129 = "Essa reestruturação é o cálice sagrado. É o bilhete dourado para a sua emancipação do estresse."
42080-130 = "Eu não estou algemando os seus pulsos ou trancando os cofres da Schale, estou tirando o alvo pintado na sua testa……"
42080-131 = "Qual foi o parágrafo que ofendeu a sua moral intocável?!"
42080-132 = "[s] \"Poder infinito sem responsabilidade é o sonho de qualquer tirano covarde.\""
42080-134 = "[ns3] \"Mas se eu aceitar viver uma mentira onde fugir da culpa é o padrão……\"\n[ns4] \"Com que rosto eu olharia nos olhos das minhas alunas? Como eu seria o Sensei delas?\""
42080-139 = "Haaah……"
42080-140 = "É inacreditável. Você é um adulto disfuncional e patético."
42080-141 = "Cega a própria visão para a realidade sangrenta do mundo e se apega a discursos de justiça de anime barato……"
42080-142 = "Ter que debater política real com uma fraude romântica como você é um dreno na minha sanidade e no meu tempo."
42080-143 = "……Sendo assim, o convite diplomático está encerrado e este acordo fica suspenso até segunda ordem."
42080-148 = "……Quando o sol nascer amanhã, a Foice do Novo Conselho Estudantil começará a ceifar as ervas daninhas da burocracia de Kivotos."
42080-149 = "Essa reforma forçada curará a cidade. Ela será cirurgicamente regulada, expurgada do caos, e moldada num perfeito e admirável \"Admirável Mundo Novo\"."
42080-150 = "Quando você abrir os olhos e admirar a perfeição asséptica do meu império nas ruas…… talvez a sua arrogância dê lugar à submissão."
42080-151 = "Nós, o Escritório de Defesa―― não, o Governo Supremo de Kivotos, estaremos no trono, aguardando pacientemente a sua inevitável rendição."
42080-152 = "Passe bem, Sensei. Tente não ser engolido pelo futuro."
42080-153 = "[ns] Me viro e saio sem dizer uma palavra."
42080-159 = "Próximo Episódio;Uma Nova Manhã no D.U."