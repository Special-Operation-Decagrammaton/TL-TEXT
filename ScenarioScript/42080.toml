[translation]
42080-1 = "Episódio 8: Uma Nova Substituta"
42080-2 = "Entrada do prédio do Conselho Estudantil Geral"
42080-3 = "（Após ver a transmissão de Kaya, você chega ao prédio do Conselho Estudantil Geral）"
42080-10 = "P-Sensei...!"
42080-11 = "É-é uma emergência... A Rin-senpai... a Rin-senpai...!"
42080-12 = "[s1] \"Acalme-se, Ayumu.\"\n[s2] \"O que aconteceu?\""
42080-13 = "Bem... é que..."
42080-14 = "Bem... é que..."
42080-15 = "A Rin-senpai foi colocada em confinamento."
42080-16 = "Dizem que ela forjou uma carta da Presidente do Conselho Estudantil Geral para ganho pessoal e que é suspeita de orquestrar atos terroristas contra outros oficiais."
42080-17 = "[s] \"Uma carta... da Presidente do Conselho Estudantil Geral?\""
42080-18 = "I-isso deve ser algum tipo de mal-entendido...!"
42080-19 = "Mal-entendido, é? ...De qualquer forma, ela foi claramente incriminada por alguém."
42080-20 = "Se aquela senpai tão séria fosse alguém que agisse por ganho pessoal, o trabalho do Conselho Estudantil Geral não teria chegado a esse ponto de estagnação."
42080-21 = "……Bem, graças a essa personalidade dela, ela acabou caindo em um truque tão óbvio."
42080-22 = "[s] \"Vocês duas estão bem, Ayumu e Momoka?\""
42080-23 = "Sim... não fomos afetadas diretamente. Mas..."
42080-24 = "Assim que o confinamento da Rin-senpai foi anunciado, as vozes na assembleia pedindo que a Chefe de Defesa Kaya assumisse como substituta da Presidente ficaram mais altas..."
42080-25 = "Aqueles que apoiavam a Rin-senpai foram pressionados e expulsos do local..."
42080-26 = "Eu sei que disse várias vezes que não queria trabalhar, mas... eu nunca imaginei que chegaria o dia em que eu teria que 'folgar' desse jeito."
42080-33 = "……Sensei [USERNAME], obrigado por vir."
42080-34 = "A 'nova substituta da Presidente do Conselho Estudantil Geral' está à sua espera."
42080-35 = "Por favor, venha por aqui."
42080-37 = "――Sensei, se eu fosse você, eu não iria."
42080-38 = "Cair de propósito em uma armadilha tão óbvia? Você está louco?"
42080-39 = "Não venha chorar depois se acabar todo amassado como um pacote de salgadinho."
42080-40 = "[s] \"……Vai ficar tudo bem, eu espero.\""
42080-42 = "[ns] \"Estou indo. Momoka, Ayumu.\""
42080-43 = "Haa... ser otimista e despreocupado é o seu ponto forte, Sensei, mas..."
42080-44 = "Bem, não adianta falar nada. Uma preguiçosa como eu não seria de muita ajuda..."
42080-45 = "P-por favor, tome cuidado, Sensei...!"
42080-49 = "……Por aqui."
42080-51 = "Gabinete da Substituta da Presidente do Conselho Estudantil Geral"
42080-52 = "Olá, Sensei [USERNAME]."
42080-53 = "Peço desculpas por chamá-lo de repente devido às circunstâncias."
42080-54 = "Eu enviei alguém para buscá-lo antes, mas como você não estava no Schale esta tarde, tive que recorrer a este método."
42080-55 = "Atualmente, o Conselho Estudantil Geral enfrenta uma questão urgente. Chamei você aqui para discutir esse assunto. Peço perdão pela falta de modos, mesmo que tenha sido por uma emergência."
42080-59 = "……A propósito, você tinha algum compromisso urgente antes? Pelo que me lembro, não havia nada agendado no seu cronograma."
42080-60 = "[s] \"Só uns assuntos pessoais.\""
42080-62 = "[ns] \"……Mais importante, onde está a Rin?\""
42080-63 = "A oficial administrativa Rin está no dormitório por vários motivos."
42080-64 = "E, como anunciado na transmissão, estou servindo como substituta da Presidente do Conselho Estudantil Geral em seu lugar."
42080-65 = "――Seguindo a 'carta da Presidente do Conselho Estudantil Geral'."
42080-66 = "[s] \"Onde essa carta foi encontrada?\""
42080-67 = "……No subsolo do Schale."
42080-68 = "Lá, não apenas a carta, mas também pertences pessoais da Presidente que não eram conhecidos pelo público, incluindo a Câmara de Criação, estavam guardados, então não há erro."
42080-69 = "Provavelmente, houve um pequeno erro quando a autoridade foi transferida para o Schale."
42080-70 = "Até mesmo alguém como a oficial administrativa Rin comete erros às vezes."
42080-71 = "[s] \"……Kaya, você entrou no subsolo do Schale sem permissão?\""
42080-75 = "……Bem, não vou negar esse ponto."
42080-76 = "De fato, quando o D.U. caiu no caos durante o golpe anterior, eu dei ordens para invadirem o subsolo do Schale e trazerem o que a Presidente do Conselho Estudantil Federal deixou para trás. #n— Tudo para entender as verdadeiras intenções da Presidente."
42080-77 = "Eu sempre tive uma dúvida. Por que a Presidente do Conselho Estudantil Federal confiou as tarefas de substituta à Rin, que não pode ser considerada perfeita, e desapareceu?"
42080-78 = "Pensei que talvez houvesse algo ali, um pensamento que uma pessoa comum não conseguiria compreender. #nCom esse pensamento, realizei a busca e—"
42080-79 = "finalmente, consegui entender os verdadeiros sentimentos dela."
42080-80 = "Claro, estou ciente de que, para isso, invadi o espaço privado do Sensei. No entanto..."
42080-81 = "[s] \"……Você acha que não havia outra escolha, não é?\""
42080-82 = "Como esperado, é uma ajuda que você entenda tão rápido. #nO Sensei também sabe, não sabe? Que existem tipos de justiça que não podem ser protegidos se estivermos presos a regras."
42080-83 = "Regras, a menos que quem as governe seja um super-humano, eventualmente geram distorções. #nSempre aparecerá alguém para tirar proveito disso."
42080-84 = "Portanto, para eliminá-los, é necessário um poder forte."
42080-85 = "……De fato, a Kaiser Corporation parece ter se esforçado um pouco demais no caso anterior, mas o poder que eles possuem é inegavelmente real……."
42080-86 = "Por isso, decidi utilizar esse poder de forma eficaz."
42080-87 = "Claro, não precisa se preocupar. #nComo Chefe da Sala de Defesa, estou acostumada a lidar com poder."
42080-88 = "[s] \"……O que pretende fazer ao obter tal poder?\""
42080-89 = "Ora, ora, não faça essa cara de assustado. #nMesmo que não se preocupe, não tenho intenção de tocar no Schale."
42080-90 = "O Schale resolveu os problemas de Kivotos no lugar do confuso Conselho Estudantil Federal e ganhou uma confiança imensa de muitos alunos."
42080-91 = "Em vez de agradecer, não temos motivos para causar qualquer dano."
42080-92 = "No entanto…… é um fato que o Sensei carrega diariamente tarefas e responsabilidades excessivas."
42080-93 = "Vários alunos realizam atividades de plantão e parecem se esforçar para reduzir o trabalho do Sensei, mas…… a menos que a estrutura fundamental do Schale mude, a carga sobre o Sensei não mudará."
42080-94 = "Sobre este problema, \"nós\" também continuamos pensando. #nO que o Conselho Estudantil Federal pode fazer pelo Sensei?"
42080-95 = "A resposta é—"
42080-99 = "[ns] \"……O que é isso?\""
42080-100 = "É uma proposta de melhoria para os procedimentos administrativos do Schale."
42080-101 = "Com o objetivo principal de reduzir a carga de trabalho do Sensei—"
42080-102 = "em algumas tarefas, o conteúdo visa fortalecer a autoridade do Sensei."
42080-103 = "Por favor, dê uma olhada rápida e, se não houver problemas, #nassine aqui, por favor."
42080-104 = "[s] \"Se eu assinar aqui…… o que vai mudar?\""
42080-106 = "……Nada em especial. Não há nada que vá mudar."
42080-107 = "O Sensei pode continuar fazendo o que quiser. #nComo sempre, sabe."
42080-108 = "Passar o dia a dia com os alunos, ajudar quem está em apuros—"
42080-109 = "No entanto, não é necessário fazer isso obrigatoriamente. #nMesmo que não faça nada, ninguém vai culpar o Sensei."
42080-110 = "Se precisar de dinheiro, apoiaremos com o quanto for necessário."
42080-111 = "Até mesmo os relatórios problemáticos, nós criaremos em seu lugar."
42080-112 = "Sim…… tudo é liberdade do Sensei."
42080-113 = "Apenas…… prometa-me uma coisa."
42080-114 = "Que todas as atividades futuras do Schale sejam realizadas em nome do Conselho Estudantil Federal."
42080-115 = "Se você aceitar, #nnós assumiremos toda a responsabilidade pelo que o Sensei fez."
42080-116 = "Não importa que tipo de crime o Sensei cometa, ou que tipo de problema cause…… #no Sensei nunca será culpado."
42080-117 = "O que acha? Não é uma má proposta, certo?"
42080-118 = "Veja, não dizem que os adultos detestam assumir responsabilidades?"
42080-120 = "Portanto, eu cuidarei do Sensei."
42080-121 = "Deixe tudo comigo e fique livre…… vamos, fique tranquilo?"
42080-123 = "[ns] \"Fico muito feliz com a sua proposta, mas vou recusar.\""
42080-125 = "[ns] \"Porque um adulto só é um adulto quando assume a responsabilidade por suas palavras e ações.\""
42080-127 = "…………Sim?"
42080-128 = "Sensei, vou explicar mais uma vez, mas……."
42080-129 = "Esta proposta de melhoria é uma sugestão para tornar o Sensei livre."
42080-130 = "Não é algo para restringir o Sensei ou limitar a autoridade do Schale, mas……"
42080-131 = "Houve algum item que o incomodou?"
42080-132 = "[s] \"É certamente atraente, mas…….\""
42080-134 = "[ns3] \"Mas, se eu mostrar uma postura de fugir da responsabilidade como adulto……\"\n[ns4] \"Como Sensei, não poderei ser um exemplo para os alunos.\""
42080-139 = "Haa..."
42080-140 = "Francamente, você é um adulto tão difícil de lidar."
42080-141 = "Ignorando a realidade da sociedade e continuando a se apegar a fantasias infantis..."
42080-142 = "Não há nada mais cansativo do que ter que lidar com adultos tão patéticos..."
42080-143 = "…Entendido. Nesse caso, vamos deixar este assunto em espera por enquanto."
42080-148 = "…A partir de amanhã, a reforma administrativa conduzida pelo novo regime do Conselho Estudantil Geral será implementada."
42080-149 = "Com esta reforma, Kivotos será perfeitamente controlada por regulamentos, e renascerá como um #nseguro e 'Admirável Mundo Novo'."
42080-150 = "Talvez, ao ver a nova Kivotos, o Sensei mude de ideia."
42080-151 = "Nós do Departamento de Defesa — não, o Conselho Estudantil Geral, estaremos sempre esperando por você, Sensei."
42080-152 = "Então, conto com sua colaboração contínua."
42080-153 = "[ns] Ir embora."
42080-159 = "Próximo episódio: Uma Nova Manhã em D.U."
