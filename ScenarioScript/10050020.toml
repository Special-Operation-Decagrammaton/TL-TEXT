[translation]
10050020-1 = "Episódio 2: Trate os livros com carinho"
10050020-2 = "！？！？！？"
10050020-9 = "N-Nagisa-sama……?#nNagisa-sama――！？！？"
10050020-13 = "O que é isso!?"
10050020-14 = "O-o que aconteceu!?"
10050020-15 = "……Você ainda não leu, não é?#nVamos começar alinhando nosso entendimento sobre a situação."
10050020-16 = "S-sim……."
10050020-20 = "O-o que……!?"
10050020-21 = "……Acredito que agora você entenda a gravidade da situação."
10050020-22 = "Poderia seguir exatamente o que vou lhe pedir agora?"
10050020-24 = "Eu mesma entrarei em contato com o Sensei."
10050020-25 = "S-sim, entendido!"
10050020-29 = "（Eu até que gostava bastante, na verdade……）"
10050020-30 = "（Especialmente daquela cena e do que acontece depois……）"
10050020-34 = "[ns1] \"Me chamaram dizendo que era um pedido importante, mas…….\"\n[ns2] \"Aconteceu alguma coisa? Você parece bem agitada…….\""
10050020-37 = "Seja bem-vindo, Sensei.#nPeço desculpas por tomar seu tempo em meio a tanta correria."
10050020-38 = "[s] \"Não, isso não é problema…….\""
10050020-39 = "Sobre o assunto principal……."
10050020-40 = "Trinity está enfrentando uma crise sem precedentes!"
10050020-41 = "[s] \"O quê!? Um ataque!?\""
10050020-42 = "Sim, se fosse apenas isso, seria melhor.#nPois poderíamos resolver por conta própria."
10050020-43 = "Exato…… se fosse um ataque armado, ainda seria aceitável. Saberíamos como lidar."
10050020-44 = "Porém, não temos meios de contra-atacar uma investida que corrompe a disciplina de Trinity por dentro."
10050020-45 = "Dê uma olhada nisto."
10050020-50 = "[ns3] \"Parece um livro comum…….\"\n[ns4] \"É um mangá com uma capa simples.\""
10050020-53 = "Sim. Como em qualquer livro, o que importa é o conteúdo."
10050020-54 = "Por favor, dê uma olhada você mesmo."
10050020-59 = "[ns5] （……? Não vejo nada de especial……）\n[ns6] （Será que esse tipo de conteúdo é considerado estimulante em Trinity?）"
10050020-62 = "Este livro foi criado com a intenção de corromper o espírito e a conduta de Trinity e――"
10050020-63 = "incitar comportamentos desviantes; é uma publicação não autorizada!"
10050020-70 = "Olá, Nagisa-sama…… ah! Sensei, você também está aqui!"
10050020-71 = "[s] \"Olá, Shimiko!\""
10050020-72 = "Olá, Shimiko-san……?#nBem, eu deveria ter chamado a Ui……."
10050020-73 = "……."
10050020-74 = "Não, entendo. Shimiko-san, você também está passando por dificuldades."
10050020-75 = "Sim, Nagisa-sama. Obrigada por compreender. É exatamente isso……#nMas, aconteceu algo?"
10050020-76 = "Ah, é verdade.#nVocê conhece este livro?"
10050020-77 = "Isso é…… algo que dizem estar na moda em Trinity ultimamente."
10050020-78 = "Sim. Então será mais fácil conversar.#nVocê também sabe sobre o conteúdo?"
10050020-79 = "……."
10050020-80 = "（Eu sei, mas…… sinto que não deveria responder isso agora）"
10050020-81 = "Não, não conheço o conteúdo."
10050020-82 = "Entendo. Como eu mesma não sabia até pouco tempo atrás, é compreensível……."
10050020-83 = "Este livro…… não tenho dúvidas de que veio de fora de Trinity."
10050020-84 = "Sim. Se tivesse sido feito em Trinity, o Comitê de Biblioteca teria registrado."
10050020-85 = "Exato. Infelizmente, não sabemos a origem deste livro."
10050020-86 = "Ou seja…… ele foi trazido por alguma facção que deseja colapsar Trinity por dentro……!"
10050020-87 = "Estamos sofrendo um tipo de ataque psicológico!"
10050020-91 = "Sinto que a lógica está um pouco forçada…… Sensei, o que você acha?"
10050020-92 = "[s] \"Eu também acho, mas a Nagisa quando fica assim…….\""
10050020-93 = "É verdade..."
10050020-94 = "Precisamos descobrir a origem deste livro. #nA segurança da escola está em jogo."
10050020-95 = "No entanto, há um problema... agora que sabemos que este livro foi trazido de fora da Trinity."
10050020-96 = "Nós, do Chá das Cinco, não podemos nos envolver diretamente."
10050020-97 = "Na pior das hipóteses, isso pode se transformar em um problema diplomático."
10050020-98 = "Em termos de ordem, pensei em deixar a cargo do Comitê de Justiça, mas..."
10050020-99 = "Isso acabaria afetando a atmosfera dentro da escola."
10050020-100 = "Por isso, decidi pedir ao Comitê de Biblioteconomia. Afinal, a gestão dos livros dentro da Trinity é trabalho deles."
10050020-101 = "Eu esperava poder conversar com a Ui sobre isso, mas... bem."
10050020-102 = "Conto com vocês novamente, Shimiko."
10050020-103 = "Entendido. Então... o que exatamente devemos fazer...?"
10050020-104 = "Como mencionei, investiguem a origem deste livro, seu volume de circulação, o impacto que causa na Trinity e..."
10050020-105 = "Poderiam resolver este assunto de forma 'suave e gentil'?"
10050020-106 = "..."
10050020-107 = "Como posso dizer, são palavras bem típicas da Nagisa-sama."
10050020-108 = "...O que quer dizer com isso?"
10050020-109 = "Ah, não. Não tem nenhum significado profundo."
10050020-110 = "...? De qualquer forma, como seria difícil apenas para o Comitê de Biblioteconomia —"
10050020-111 = "Eu autorizo a cooperação com o Comitê de Justiça."
10050020-112 = "Entendo... É difícil mobilizar o Comitê de Justiça oficialmente, mas..."
10050020-113 = "Se cooperarmos com o Comitê de Biblioteconomia, #n'mal-entendidos desnecessários' podem ser evitados, é isso?"
10050020-114 = "Exatamente. Agradeço por compreender."
10050020-115 = "Este é um caso que nós, do Chá das Cinco, pedimos formalmente e em segredo ao Sensei e à Shimiko."
10050020-116 = "Podem usar qualquer método que considerem útil. #nE que o 'segredo' permaneça em segredo."
10050020-117 = "Entendido, Nagisa-sama."
10050020-118 = "A partir deste momento, convido a Shimiko para ser consultora externa temporária do Comitê de Justiça."
10050020-119 = "Ah, muito obrigada..."
10050020-127 = "Ioiô, Nagi-chan, vim tomar um chá! #nUé... espera, Sensei!?"
10050020-128 = "Mika-san?"
10050020-129 = "[s] \"Olá, Mika.\""
10050020-130 = "Ah, oi! O-olá, Sensei! ...Se eu soubesse que você viria, teria arrumado as coisas um pouco melhor."
10050020-131 = "[s] \"Eu gosto de você como está agora.\""
10050020-132 = "!!? O-ouvir isso faz meu coração disparar de tanta felicidade, mas..."
10050020-133 = "(Não é como se ele quisesse dizer isso, se controla, Mika!)"
10050020-134 = "Olá, Sensei. #nHá... não deveria haver nenhum significado profundo nessas palavras, você entende isso, não é? Mika."
10050020-135 = "Ai, Seia-chan, para com isso☆"
10050020-136 = "Mas mudando de assunto, que livro é esse? Nunca vi antes!"
10050020-137 = "Não pode!!!"
10050020-143 = "[ns] \"N-Nagisa!?\""
10050020-145 = "Que susto!? O que foi, Nagi-chan, é só um livro, né!?"
10050020-146 = "P-peço perdão, Mika-san. #nMas este livro é... bem... é complicado!"
10050020-147 = "Por quê?"
10050020-148 = "P-por isso... bem..."
10050020-149 = "Este é um dos 'Apócrifos' que foi solicitado ao Comitê de Biblioteconomia, passando pela Irmandade e pelo Chá das Cinco."
10050020-150 = "Hm? Irmandade...? Então não tem jeito."
10050020-151 = "Quando aquelas garotas se envolvem, tudo fica complicado."
10050020-152 = "...Mas, isso não foi um pouco exagerado agora? Nagisa."
10050020-153 = "Este livro é cedo demais para a Mika-san!"
10050020-154 = "...O excesso de proteção acaba se tornando um veneno."
10050020-155 = "Poxa! Nagi-chan, Seia-chan, por que vocês duas estão cochichando aí?"
10050020-156 = "Dito isso, Nagi-chan... aquilo não foi um pouco deselegante da sua parte?"
10050020-157 = "Ouvir isso da Mika-san... sinto até uma tontura..."
10050020-158 = "Nagi-chan?"
10050020-159 = "[s] \"Bem... admito que talvez eu tenha exagerado um pouco agora, não é?\""
10050020-160 = "Você também acha, né!#nO Sensei é o melhor mesmo☆"
10050020-161 = "Ah... entendi... peço perdão."
10050020-163 = "Ter todos do Chá das Cinco aqui...#nAquela parte final me deixou bem nervosa..."
10050020-164 = "Ah, Sensei, você está bem? Sua expressão está..."
10050020-165 = "[s] \"Como posso dizer, foi uma interação que me deu uma dor no estômago...\""
10050020-166 = "Ah... isso é algo cotidiano em Trinity, você vai se acostumar com o tempo."
10050020-167 = "Claro, não estou dizendo que quero que você se acostume com isso."
10050020-168 = "[s] \"Shimiko, você realmente não sabe nada sobre aquele livro?\""
10050020-169 = "Bem, isso significa que..."
10050020-170 = "……"
10050020-171 = "Como você suspeitou.#nAfinal, sou do Comitê da Biblioteca."
10050020-172 = "O Comitê da Biblioteca conhece todos os livros que circulam em Trinity."
10050020-173 = "Ah, não que sejamos forçados a isso, claro."
10050020-174 = "[s] \"Posso perguntar até onde você leu?\""
10050020-175 = "Até o final."
10050020-176 = "[s] \"Que franqueza!?\""
10050020-177 = "Bem, não acho que precise esconder isso de você, Sensei..."
10050020-178 = "……Ah? O que eu acho daquilo...?#nBem, isso é apenas a minha opinião pessoal..."
10050020-179 = "Acho que é uma obra de \"zona cinzenta\".#nNão é algo que se possa recomendar abertamente para as pessoas."
10050020-180 = "Mas, por outro lado, também não acho que deva ser censurado cegamente..."
10050020-181 = "[s] \"Concordo, eu penso o mesmo.\""
10050020-182 = "Sim... para ser sincera, não estou em uma idade em que não tenho nenhum interesse nesse tipo de conteúdo."
10050020-183 = "Mas, como membro do Comitê da Biblioteca, o que me impressionou foi... bem, aquela censura... não, a capacidade de edição, talvez?"
10050020-184 = "Conseguir \"cortar\" tão bem daquela forma... fiquei realmente impressionada."
10050020-185 = "Hm? Parece que estou muito calma, é isso...?"
10050020-186 = "……"
10050020-187 = "Sensei. A \"Biblioteca Antiga\" de Trinity guarda muitos livros."
10050020-188 = "[s] \"É verdade.\""
10050020-189 = "Quantos deles você acha que são, por assim dizer, \"livros não saudáveis\"?"
10050020-190 = "[s7] \"……?\"\n[s8] \"……Entendo.\""
10050020-193 = "Sim, exatamente como você pensou."
10050020-194 = "Então, todos do Comitê da Biblioteca estão acostumados com isso?"
10050020-195 = "Pela honra de todos, é difícil entrar em detalhes, mas..."
10050020-196 = "Pelo menos eu, estou acostumada até certo ponto."
10050020-197 = "O livro, como meio de comunicação, existe para transmitir informações."
10050020-198 = "Será que nós temos o direito de avaliar o valor ou a qualificação dessa informação e classificá-la?#nDe quem será que recebemos esse direito?"
10050020-199 = "Se as \"pessoas\" têm direitos e qualificações, acredito que os \"livros\" também deveriam ter."
10050020-200 = "É por isso que sinto que os livros são iguais às pessoas."
10050020-201 = "[s] \"Então, quem trata os livros com desleixo...\""
10050020-202 = "Sim. É melhor fazê-los se arrepender, nem que seja com um chicote."
10050020-203 = "Porque aqueles que cometem erros precisam pagar por seus pecados."
10050020-205 = "(...Percebi novamente que nunca devo deixar a Shimiko irritada)"
