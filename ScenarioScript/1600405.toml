[translation]
1600405-1 = "Noite sem fim"
1600405-2 = "Sensei! Por aqui, por aqui!"
1600405-3 = "Hehe, obrigada por vir! Graças a isso, a Phina está se sentindo muito bem!"
1600405-4 = "......Sensei, você não parece estar muito animado, né?"
1600405-5 = "Será que você se forçou a vir mesmo estando ocupado? Eu comprei os ingressos por conta própria, então agora fiquei preocupada......"
1600405-6 = "[s1] \"Não, eu estava de folga. Eu estava muito animado.\"\n[s2] \"Faltar ao trabalho é divertido, né?\""
1600405-7 = "É mesmo? Que bom! Eu fiquei preocupada!"
1600405-8 = "Eh...... v-você está bem!?"
1600405-9 = "Se você estiver bem, então tudo bem... mas enfim!"
1600405-10 = "Já que você se deu ao trabalho de vir, Sensei, você tem que se divertir!"
1600405-11 = "Dizem que filmes dependem do gosto de cada um, mas não se preocupe! O filme que preparei hoje não é apenas um!"
1600405-12 = "Hoje temos 21 filmes! Com certeza deve ter algum que você goste!"
1600405-13 = "Fufu, eu entendo o que você quer dizer, Sensei. Temos apenas dois ingressos, então por que 21 filmes...?"
1600405-14 = "É porque este ingresso não é um ingresso comum, mas sim..."
1600405-16 = "Um ingresso para a \"Maratona de Exibição\"!! Hoooo!!"
1600405-17 = "[s] \"Maratona de exibição?\""
1600405-18 = "Isso significa, literalmente, exibir filmes em sequência, como um revezamento."
1600405-19 = "Para os maníacos que amam cinema, eles exibem vários filmes do mesmo gênero de uma vez!"
1600405-20 = "E claro, o que vamos assistir é a maratona de filmes de Yakuza!!"
1600405-21 = "Vamos, não temos tempo! Primeiro, vamos começar com o primeiro, here we go!!"
1600405-23 = "(Sendo puxado pela mão pela Phina, você é levado para dentro do cinema)"
1600405-24 = "(O conteúdo do filme não era ruim. Embora fosse um filme de Yakuza, as cenas de violência explícita pareciam ter sido cortadas na edição)"
1600405-25 = "(Foi um pouco decepcionante, mas provavelmente fizeram isso para que os estudantes também pudessem assistir)"
1600405-27 = "Maravilhoso......"
1600405-28 = "Foi um filme realmente maravilhoso...... Chefe...... não, Sensei...... não, Chefe......"
1600405-29 = "Desculpe, me confundi, Sensei......"
1600405-30 = "O que achou? Foi divertido?"
1600405-31 = "[s] \"......Pode me chamar de Chefe.\""
1600405-32 = "......!!"
1600405-33 = "P-pode ser......! Chefe......!"
1600405-34 = "Como desejar! Chefe! Vamos logo para o próximo filme!"
1600405-35 = "O próximo filme é \"O Soco Gatinho Sem Lei\"!!"
1600405-37 = "(Os filmes seguintes também foram todos excelentes)"
1600405-38 = "(A frieza estilosa e a atmosfera hard-boiled típicas dos filmes de Yakuza eram retratadas às vezes de forma lírica, às vezes de forma dramática)"
1600405-39 = "(......)"
1600405-40 = "(No entanto......)"
1600405-42 = "Uau......! Este também foi realmente maravilhoso, Sensei... Chefe!!"
1600405-43 = "Então, vamos para o próximo filme......!"
1600405-45 = "(Por mais que os filmes sejam excelentes, assistir a 21 filmes do mesmo gênero)"
1600405-46 = "(E sem conseguir dormir, já que alguém não para de falar ao seu lado, e continuar vendo o mesmo tipo de desenrolar desde o meio do caminho é......)"
1600405-48 = "Fuu......! É isso, é isso......! Então, o próximo......!"
1600405-50 = "(......Para um ser humano comum, isso é......)"
1600405-52 = "Incrível, não tenho outras palavras......"
1600405-54 = "(Quase uma tortura......)"
1600405-56 = "O melhor"
1600405-58 = "de todos.........!"
1600405-60 = "é isso!!!!"
1600405-62 = "(Parece que quando o 21º e último filme estava passando, minha consciência já tinha ido embora completamente)"
1600405-63 = "(......Quando recuperei a consciência, estávamos à beira do rio, fora do cinema)"
1600405-65 = "......nsei?"
1600405-66 = "Sensei...? Você acordou...?"
1600405-67 = "[s3] \"Onde estou... quem sou eu...?\"\n[s4] \"Que bom que conseguiu voltar. Para o nosso lugar...\""
1600405-68 = "Ah, aah...!"
1600405-69 = "Ah, aah...!"
1600405-70 = "P-por favor, mantenha a calma, Sensei! Não pode perder a noção de quem você é! A culpa foi minha!"
1600405-71 = "Sinto muito... eu não imaginava que isso fosse acontecer..."
1600405-72 = "É que eu tenho o hábito de assistir a filmes de yakuza dia e noite, sem parar... e presumi que o Sensei também ficaria bem."
1600405-73 = "A culpa é da Phina... me desculpe de verdade..."
1600405-74 = "De agora em diante, não vou mais te convidar para ver filmes..."
1600405-75 = "Snif... snif..."
1600405-76 = "[s5] \"Está tudo bem, não se preocupe.\"\n[s6] \"...Bom trabalho.\""
1600405-77 = "...?"
1600405-78 = "...?"
1600405-79 = "I-isso significa o quê...?"
1600405-80 = "Mesmo que você diga isso, eu..."
1600405-81 = "Você não perdeu a consciência... só estava tirando uma soneca?"
1600405-82 = "...Não, não pode ser... de qualquer jeito que eu olhasse, você parecia ter desmaiado..."
1600405-83 = "...\"Eu sou o chefe, sabia?\""
1600405-84 = "S-sim! Eu sei disso, ah, não! Eu não pretendia te responder à altura...! De jeito nenhum! Como eu ousaria fazer isso com o chefe!"
1600405-85 = "Peço perdão! O chefe só estava dormindo, não é? Foi um erro meu!"
1600405-86 = "É que eu estava apenas...!"
1600405-87 = "..."
1600405-88 = "...Hehe."
1600405-89 = "Ahahahahahaha!!"
1600405-90 = "Ah, ri tanto que até saíram lágrimas! Ahahahaha!"
1600405-91 = "Ah, ha... ufa, o Sensei é realmente..."
1600405-92 = "..."
1600405-93 = "...Muito obrigada, Sensei. Você sempre protege a Phina e faz tantas coisas por mim."
1600405-94 = "Sobre o que aconteceu hoje, e tudo o mais... como posso retribuir..."
1600405-95 = "Sinto que o Sensei também tem esse espírito de cavalheirismo. Algo diferente do meu, algo mais quente e suave..."
1600405-96 = "Como se estivesse envolvendo a Phina..."
1600405-97 = "Esse é o seu código de honra... sim, eu sinto isso do fundo do coração."
1600405-98 = "...Ehehe."
1600405-100 = "(Depois disso, conversei um pouco com a Phina sobre o filme que vimos naquele dia)"
1600405-101 = "(E combinamos de ir ver um filme em um cinema comum da próxima vez, em vez de uma maratona)"
