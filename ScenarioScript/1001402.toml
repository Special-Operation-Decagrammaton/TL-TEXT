[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 22/06.]
1001402-1 = "E a Izuna, O Segue em Segredo"
1001402-2 = "(Enquanto eu andava pela rua para fazer umas compras...)"
1001402-4 = "Sasa-sat――"
1001402-6 = "[ns] \"...Hm?\""
1001402-9 = "Sasasa-sat――"
1001402-11 = "(Pluft)"
1001402-12 = "Ah!?"
1001402-15 = "Uugh, minhas pernas se enrolaram..."
1001402-16 = "V-Vou tentar mais uma vez!"
1001402-17 = "Sasa-sat――"
1001402-19 = "[ns] \"Er...\""
1001402-21 = "Sasa-sat..."
1001402-22 = "Nya?"
1001402-24 = "Shhh, shhh! Senhor Gato! Shhh!"
1001402-25 = "Se você miar, vão me descobrir...!"
1001402-26 = "Ah, será que, por ser um gato, ele não entende a minha língua?"
1001402-27 = "Nesse caso, usarei a linguagem animal que os ninjas usam desde os tempos antigos...!"
1001402-30 = "Nya, nyao?"
1001402-32 = "...Nya?"
1001402-33 = "Não funcionou!?"
1001402-34 = "Eei! Então não me resta outra escolha,"
1001402-35 = "Jutsu de Evasão de Emergência!"
1001402-41 = "Phew... Com isso eu devo ter conseguido me mover sem ser notada."
1001402-42 = "[s] \".......\""
1001402-44 = "[s1] Peguei meu smartphone e\n[s2] liguei para a Izuna."
1001402-46 = "(Piron♪ Piron♪)"
1001402-48 = "(Piron♪ Piron♪)"
1001402-49 = "Uwaah, ah! O meu smartphone!"
1001402-50 = "C-Como eu desligo isso, aaaaah!?"
1001402-52 = "Puxa isso aqui, aperta isso... Ah!?"
1001402-54 = "(Biip)"
1001402-55 = "Ufa, sobrevivi."
1001402-56 = "[s3] \"Sobreviveu ao quê?\"\n[s4] \"Eu já tinha percebido faz tempo...\""
1001402-57 = "Ah, Meu Mestre!?"
1001402-58 = "Ah, Meu Mestre!?"
1001402-59 = "Por que...! Como você conseguiu me notar!?"
1001402-60 = "[s] \"Como? Você estava fazendo o maior barulho...\""
1001402-61 = "Pensar que as técnicas de perseguição de nível mestre da Izuna não funcionariam,"
1001402-62 = "Será que..."
1001402-63 = "[s] \"...Será que?\""
1001402-64 = "Meu Mestre, você também..."
1001402-66 = "É descendente de um ninja!? (Engole em seco)"
1001402-67 = "[s5] \"Exatamente. Eu sou descendente do lendário ninja, Hattori Hamujirou!\"\n[s6] \"...Claro que não, né.\""
1001402-68 = "E-Então eu me enganei..."
1001402-69 = "E-Então eu me enganei..."
1001402-70 = "Que pena..."
1001402-71 = "[s] \"Você ficou triste...\""
1001402-72 = "Não é para substituir ninguém, mas a Izuna é uma ninja perfeita!"
1001402-73 = "Não tem problema se você não for um ninja. O Meu Mestre deve continuar sendo o Meu Mestre de sempre!"
1001402-74 = "[s] \"Você se recuperou rápido...\""
1001402-76 = "[ns7] \"Pra começo de conversa, se você vai seguir alguém, deve fazer isso em silêncio.\"\n[ns8] \"Cuidado com os passos e preste atenção aos olhares alheios.\"\n[ns9] \"E, mais importante de tudo, coloque o celular no silencioso.\""
1001402-77 = "Ohh, entendi! Isso me ensina muito!"
1001402-78 = "Ohh, entendi! Isso me ensina muito!"
1001402-79 = "Ohh, entendi! Isso me ensina muito!"
1001402-80 = "As palavras do Meu Mestre são como regras de ouro!"
1001402-81 = "Tenho que anotar isso!"
1001402-82 = "Ué, onde eu coloquei o caderninho da Izuna...?"
1001402-83 = "[s] \"A propósito, por que você estava me seguindo?\""
1001402-84 = "Ah, isso é porque,"
1001402-85 = "Como ninja, eu estava protegendo o Meu Mestre!"
1001402-86 = "[s] \"Me protegendo...?\""
1001402-87 = "No outro dia, eu disse que estava com um probleminha, lembra?"
1001402-88 = "Aquele problema era..."
1001402-89 = "Na verdade, era uma preocupação sobre o Meu Mestre!"
1001402-90 = "[s] \"Er...?\""
1001402-91 = "Um dia, a Izuna pensou:"
1001402-92 = "O Meu Mestre é uma pessoa incrível, sendo assim..."
1001402-93 = "Não seria estranho se ele fosse alvo de um ataque a qualquer hora e em qualquer lugar!"
1001402-94 = "[s] \"Não, não, não.\""
1001402-95 = "Não,"
1001402-96 = "A distração é a nossa maior inimiga!"
1001402-97 = "Isso acontece com frequência nos dramas de época!"
1001402-98 = "Quando o lorde do castelo abaixa a guarda e dá um banquete para beber e cantar..."
1001402-99 = "É quando o inimigo ataca!"
1001402-100 = "É um clássico!"
1001402-101 = "[s10] \"É um clássico...?\"\n[s11] \"Bem, eu nunca dei um banquete.\""
1001402-102 = "É uma regra básica dos dramas de época!"
1001402-103 = "É uma regra básica dos dramas de época!"
1001402-104 = "[s] \"Entendi...\""
1001402-105 = "Então, para garantir que o Meu Mestre possa trabalhar em paz,"
1001402-106 = "O que a Izuna pode fazer..."
1001402-107 = "Depois de muito pensar, cheguei a uma conclusão!"
1001402-108 = "Eu deveria observar e proteger cada movimento do Meu Mestre, de manhã até a noite!"
1001402-109 = "[s] \"E foi por isso que você me seguiu...\""
1001402-110 = "Ehehe!"
1001402-111 = "Sim!"
1001402-112 = "Eu estava te protegendo em segredo!"
1001402-113 = "[s] \"Mas isso me deixa um pouco incomodado.\""
1001402-114 = "Incomodado... Eu acabei atrapalhando o Meu Mestre?"
1001402-115 = "[s] \"Você não acha que seguir alguém sem pedir permissão é errado?\""
1001402-116 = "Eh, ah, sim..."
1001402-117 = "M-Mas! A Izuna fez isso nas sombras, para o bem do Meu Mestre...!"
1001402-118 = "[s] \"Mas talvez isso acabe perturbando a pessoa, né?\""
1001402-119 = "U-Uuh, isso é..."
1001402-120 = "[s] \"Todo mundo tem coisas que quer manter em segredo, não acha?\""
1001402-121 = "U-Uuh..."
1001402-122 = "Realmente, você tem razão... Me desculpe, Meu Mestre..."
1001402-123 = "[s] \"Eu não estou bravo, mas me pergunte antes da próxima vez, combinado?\""
1001402-124 = "(Roooonc...)"
1001402-125 = "Sim... Auh..."
1001402-126 = "Como não comi nada desde de manhã, as minhas forças..."
1001402-127 = "[s] \"Quer ir comer alguma coisa comigo?\""
1001402-128 = "C-Comida?"
1001402-129 = "[s12] \"Se você quiser, Izuna.\"\n[s13] \"Claro, não estou te obrigando.\""
1001402-132 = "Não, eu quero! Vamos! Meu Mestre!"
1001402-133 = "E o caminho até o restaurante, pode deixar nas mãos da Izuna!"
1001402-134 = "Em vez de te seguir em segredo,"
1001402-135 = "Como uma verdadeira ninja, protegerei você bem na sua frente! Farei uma escolta perfeita!"
1001402-136 = "[s] \"Conto com você.\""
1001402-137 = "Ehehe, sim!"
1001402-139 = "Nin-nin!"
1001402-141 = "(Com a Izuna fazendo uma escolta muito chamativa, fomos juntos ao restaurante)"