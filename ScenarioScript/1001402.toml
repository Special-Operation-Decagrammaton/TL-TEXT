[translation]
1001402-1 = "E Izuna começa a seguir."
1001402-2 = "（Foi enquanto eu caminhava pela rua para fazer compras）"
1001402-4 = "Vupt—"
1001402-6 = "[ns] \"……Hm?\""
1001402-9 = "Vupt, vupt—"
1001402-11 = "（Tropeço）"
1001402-12 = "Ah!?"
1001402-15 = "Ugh, meus pés se enrolaram……."
1001402-16 = "V-vou tentar de novo!"
1001402-17 = "Vupt, vupt—"
1001402-19 = "[ns] \"Bem…….\""
1001402-21 = "Vupt……."
1001402-22 = "Miau?"
1001402-24 = "Shii, shii! Senhor Gato! Shii, por favor!"
1001402-25 = "Se você miar, serei descoberta……!"
1001402-26 = "Ah, será que é porque você é um gato que não entende o que eu digo?"
1001402-27 = "Se for esse o caso, usarei a língua animal que os ninjas usam desde os tempos antigos para conversar com os bichos……!"
1001402-30 = "Miau, miau-?"
1001402-32 = "……Miau?"
1001402-33 = "Não funcionou!?"
1001402-34 = "Ora essa! Então não tem jeito,"
1001402-35 = "Técnica de evasão de emergência!"
1001402-41 = "Ufa…… assim devo ter conseguido me mover sem ser notada."
1001402-42 = "[s] \"…….\""
1001402-44 = "[s1] Peguei meu celular e\n[s2] liguei para a Izuna."
1001402-46 = "（Trim♪ Trim♪）"
1001402-48 = "（Trim♪ Trim♪）"
1001402-49 = "Uau, ah! O celular!"
1001402-50 = "C-como eu desligo isso, hein!?"
1001402-52 = "Se eu fizer isso, e assim, e então……!?"
1001402-54 = "（Click）"
1001402-55 = "Ufa, consegui lidar com isso."
1001402-56 = "[s3] \"O que você conseguiu lidar?\"\n[s4] \"Eu já tinha te notado faz tempo…….\""
1001402-57 = "Ah, Mestre!?"
1001402-58 = "Ah, Mestre!?"
1001402-59 = "Por que……! Como você conseguiu perceber!?"
1001402-60 = "[s] \"Como assim por que? Você estava fazendo muito barulho…….\""
1001402-61 = "A técnica de perseguição especializada da Izuna não funcionou,"
1001402-62 = "será que……."
1001402-63 = "[s] \"……Será que?\""
1001402-64 = "O Mestre também……"
1001402-66 = "É um descendente de ninjas? (Gulp)"
1001402-67 = "[s5] \"Exato. Eu sou o descendente do lendário ninja, Hattori Hamujiro!\"\n[s6] \"……Brincadeira, não tem como ser isso.\""
1001402-68 = "N-não era isso……."
1001402-69 = "N-não era isso……."
1001402-70 = "Que pena……."
1001402-71 = "[s] \"Você ficou triste mesmo…….\""
1001402-72 = "Não que isso substitua, mas como a Izuna é uma ninja perfeita!"
1001402-73 = "Tudo bem se você não for um ninja, contanto que o Mestre continue sendo o Mestre!"
1001402-74 = "[s] \"Você se recupera rápido, hein…….\""
1001402-76 = "[ns7] \"Antes de tudo, se for seguir alguém, é melhor ser mais silenciosa.\"\n[ns8] \"Preste atenção nos seus passos e esteja ciente do olhar dos outros.\"\n[ns9] \"E, acima de tudo, coloque o celular no modo silencioso.\""
1001402-77 = "Oh, entendi! Isso é um grande aprendizado!"
1001402-78 = "Oh, entendi! Isso é um grande aprendizado!"
1001402-79 = "Oh, entendi! Isso é um grande aprendizado!"
1001402-80 = "As palavras do meu mestre são leis absolutas!"
1001402-81 = "Preciso anotar isso!"
1001402-82 = "Ué, onde foi parar o caderno da Izuna...?"
1001402-83 = "[s] \"A propósito, por que você estava me seguindo?\""
1001402-84 = "Ah, sobre isso..."
1001402-85 = "Como uma ninja, é para proteger o meu mestre!"
1001402-86 = "[s] \"Proteger...?\""
1001402-87 = "Outro dia, eu disse que estava preocupada com algo,"
1001402-88 = "e aquilo era..."
1001402-89 = "Na verdade, era uma preocupação sobre o senhor!"
1001402-90 = "[s] \"Hã...?\""
1001402-91 = "Certo dia, eu pensei comigo mesma."
1001402-92 = "O meu mestre é uma pessoa incrível, então..."
1001402-93 = "Não seria estranho se alguém tentasse algo contra o senhor a qualquer momento!"
1001402-94 = "[s] \"Não, não, não.\""
1001402-95 = "Não,"
1001402-96 = "a cautela nunca é demais!"
1001402-97 = "Isso acontece muito nos dramas de época!"
1001402-98 = "Sempre que o senhor do castelo baixa a guarda e dá uma festa com muita bebida e música..."
1001402-99 = "O inimigo ataca!"
1001402-100 = "É o clichê de sempre!"
1001402-101 = "[s10] \"É um clichê...?\"\n[s11] \"Bem, eu nunca dei festas assim.\""
1001402-102 = "É uma regra dos dramas de época!"
1001402-103 = "É uma regra dos dramas de época!"
1001402-104 = "[s] \"Entendi...\""
1001402-105 = "Por isso, para que o senhor possa trabalhar com tranquilidade,"
1001402-106 = "eu fiquei pensando no que eu poderia fazer..."
1001402-107 = "E depois de muito refletir, cheguei a uma conclusão!"
1001402-108 = "A conclusão foi vigiar e proteger cada movimento seu, do amanhecer ao anoitecer!"
1001402-109 = "[s] \"Então era por isso que você estava me seguindo...\""
1001402-110 = "Hehehe!"
1001402-111 = "Sim!"
1001402-112 = "Eu estava protegendo o senhor secretamente!"
1001402-113 = "[s] \"Mas isso pode ser um pouco problemático.\""
1001402-114 = "Problemático...? Eu causei problemas ao meu mestre?"
1001402-115 = "[s] \"Você não acha que seguir alguém sem permissão é algo ruim?\""
1001402-116 = "Ah, bem, sim..."
1001402-117 = "M-mas! Eu estava fazendo isso nas sombras pelo senhor...!"
1001402-118 = "[s] \"Mas isso pode acabar incomodando a pessoa, não acha?\""
1001402-119 = "U-uu, isso é..."
1001402-120 = "[s] \"Cada pessoa tem coisas que não quer que os outros saibam, não acha?\""
1001402-121 = "U-uu..."
1001402-122 = "É verdade, o senhor tem razão... Me desculpe, mestre..."
1001402-123 = "[s] \"Não estou bravo, mas de agora em diante, pergunte antes, está bem?\""
1001402-124 = "(Ronco...)"
1001402-125 = "Sim... au..."
1001402-126 = "Como não comi nada desde cedo, estou sem forças..."
1001402-127 = "[s] \"Quer ir comer alguma coisa comigo?\""
1001402-128 = "C-comida, você diz?"
1001402-129 = "[s12] \"Se estiver tudo bem para você, Izuna.\"\n[s13] \"Claro, não quero te forçar a nada.\""
1001402-132 = "Não, eu adoraria! Vamos nessa, Mestre!"
1001402-133 = "Claro, pode deixar o caminho até o restaurante comigo, Izuna!"
1001402-134 = "Em vez de seguir você escondida pelas sombras,"
1001402-135 = "como uma ninja, farei uma escolta perfeita bem diante dos seus olhos, Mestre!"
1001402-136 = "[s] \"Conto com você.\""
1001402-137 = "Hehehe, sim!"
1001402-139 = "Nin-nin!"
1001402-141 = "(Enquanto Izuna me escoltava de forma chamativa e exagerada, seguimos juntos para o refeitório.)"
