[translation]
1001402-1 = "そしてイズナは尾行する"
1001402-2 = "（買い物で、道を歩いてる時だった）"
1001402-4 = "ササッ――"
1001402-6 = "[ns] \"……ん？\""
1001402-9 = "サササッ――"
1001402-11 = "（ガッ）"
1001402-12 = "あっ！？"
1001402-15 = "ううっ、足がもつれました……。"
1001402-16 = "も、もう一度行きます！"
1001402-17 = "サササッ――"
1001402-19 = "[ns] \"えっと……。\""
1001402-21 = "ササッ……。"
1001402-22 = "ニャー？"
1001402-24 = "しっ、しーっ！猫殿！しーっですよ！"
1001402-25 = "鳴いたらバレてしまいます……！"
1001402-26 = "あっ、もしかして猫だから言葉が通じないのでしょうか？"
1001402-27 = "であれば、古来より忍者が動物と会話をする時に使う動物語を……！"
1001402-30 = "にゃ、にゃおー？"
1001402-32 = "……ニャ？"
1001402-33 = "通じない！？"
1001402-34 = "ええいっ！では仕方ありません、"
1001402-35 = "緊急回避の術！"
1001402-41 = "ふう……これならバレずに移動できたはずです。"
1001402-42 = "[s] \"……。\""
1001402-44 = "[s1] スマホを取り出して、\n[s2] イズナに電話を掛けた。"
1001402-46 = "（ピロン♪ピロン♪）"
1001402-48 = "（ピロン♪ピロン♪）"
1001402-49 = "うわっ、あっ！スマホが！"
1001402-50 = "ど、どうやって止めるんでしょう、あれっ！？"
1001402-52 = "これを、こうやってっ、これで……！？"
1001402-54 = "（プッ）"
1001402-55 = "ふぅ、無事に乗り切りました。"
1001402-56 = "[s3] \"何を乗り切ったの？\"\n[s4] \"結構前からバレてたよ……。\""
1001402-57 = "あ、主殿！？"
1001402-58 = "あ、主殿！？"
1001402-59 = "なぜ……！どうして気づくことができたのですか！？"
1001402-60 = "[s] \"どうしてって、だいぶバタバタしてたし……。\""
1001402-61 = "イズナの熟練の尾行術が通じないだなんて、"
1001402-62 = "まさか……。"
1001402-63 = "[s] \"……まさか？\""
1001402-64 = "主殿も……"
1001402-66 = "忍者の子孫なのですか？（ゴクリ）"
1001402-67 = "[s5] \"然り。某は伝説の忍者、服部ハム次郎の末裔でごじゃる！\"\n[s6] \"……って、そんなわけないでしょ。\""
1001402-68 = "ち、違いましたか……。"
1001402-69 = "ち、違いましたか……。"
1001402-70 = "残念です……。"
1001402-71 = "[s] \"残念なんだ……。\""
1001402-72 = "代わりというわけではありませんが、イズナは完璧な忍者ですので！"
1001402-73 = "同じ忍者でなくても大丈夫です、主殿は主殿のままでいていただければ！"
1001402-74 = "[s] \"立ち直り早いね……。\""
1001402-76 = "[ns7] \"そもそも尾行なら、もっと静かにしたほうが良いよ。\"\n[ns8] \"足音にも気を付けて、他人の視線を意識して。\"\n[ns9] \"あと何よりも携帯はマナーモードに。\""
1001402-77 = "おおっ、なるほど！勉強になります！"
1001402-78 = "おおっ、なるほど！勉強になります！"
1001402-79 = "おおっ、なるほど！勉強になります！"
1001402-80 = "主殿のお言葉はすべて金科玉条です！"
1001402-81 = "メモしておかないと！"
1001402-82 = "あれ、イズナの手帳はどこに……？"
1001402-83 = "[s] \"ところで、なんで尾行してたの？\""
1001402-84 = "あっ、それはですね、"
1001402-85 = "忍者として、主殿を護衛するためです！"
1001402-86 = "[s] \"護衛……？\""
1001402-87 = "先日、イズナがとあることで悩んでいるとお伝えしましたが、"
1001402-88 = "あれは……"
1001402-89 = "実は主殿についての悩みだったのです！"
1001402-90 = "[s] \"えっと……？\""
1001402-91 = "ある時、イズナはふと思いました。"
1001402-92 = "主殿はすごい方です、であれば……。"
1001402-93 = "いつどこで主殿が狙われてしまってもおかしくはない、と！"
1001402-94 = "[s] \"いやいやいや。\""
1001402-95 = "いいえ、"
1001402-96 = "油断は禁物です！"
1001402-97 = "時代劇でもよくありますよ！"
1001402-98 = "いつも城の主君が油断して、飲めや歌えやと宴を開いた時……"
1001402-99 = "そこに敵襲が！"
1001402-100 = "お決まりの展開です！"
1001402-101 = "[s10] \"お決まりなんだ……？\"\n[s11] \"いや、宴とか開いたことないけど。\""
1001402-102 = "時代劇のお約束ですから！"
1001402-103 = "時代劇のお約束ですから！"
1001402-104 = "[s] \"そっか……。\""
1001402-105 = "ですので、主殿に安心して仕事をしてもらえるように、"
1001402-106 = "そのためにイズナができることは何なのか……"
1001402-107 = "悩みに悩んだ結果、たどり着いた結論！"
1001402-108 = "それは朝から晩まで、主殿の一挙手一投足を監視しつつ護衛する、ということでした！"
1001402-109 = "[s] \"それで尾行してたんだ……。\""
1001402-110 = "えへへっ！"
1001402-111 = "はい！"
1001402-112 = "こっそり護衛してました！"
1001402-113 = "[s] \"でも、それはちょっと困るかも。\""
1001402-114 = "困る……私、主殿を困らせてしまったのですか？"
1001402-115 = "[s] \"同意無しで尾行するのって、良くないことだと思わない？\""
1001402-116 = "え、あ、はい……"
1001402-117 = "で、ですが！イズナは主殿のために影で……！"
1001402-118 = "[s] \"もしかしたらその人の迷惑になるかもしれないよね？\""
1001402-119 = "う、うう、それは……。"
1001402-120 = "[s] \"人それぞれ、知られたくないこともあると思わない？\""
1001402-121 = "う、うう……"
1001402-122 = "確かに、そうですね……ごめんなさい、主殿……。"
1001402-123 = "[s] \"怒ってないよ、でもこれからは先に聞こうね。\""
1001402-124 = "（グゥ……）"
1001402-125 = "はい……あぅ……"
1001402-126 = "朝から何も食べなかったせいで、力が……。"
1001402-127 = "[s] \"じゃあ一緒にご飯食べに行く？\""
1001402-128 = "ご、ごはんですか？"
1001402-129 = "[s12] \"イズナが良ければ。\"\n[s13] \"もちろん、無理にとは言わないけど。\""
1001402-132 = "いえ、ぜひ！行きましょう！主殿！"
1001402-133 = "もちろんごはんを食べに行くまでの道はこの私、イズナに任せてください！"
1001402-134 = "後ろでこっそり尾行をするのではなく、"
1001402-135 = "忍者として、主殿の目の前で！完璧な護衛をして見せますので！"
1001402-136 = "[s] \"よろしくね。\""
1001402-137 = "えへへっ、はい！"
1001402-139 = "ニンニン！"
1001402-141 = "（そうやってイズナにやけに目立つ派手な護衛をしてもらいながら、二人で食堂に向かった）"
