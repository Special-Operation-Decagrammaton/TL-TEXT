[translation]
1600106-1 = "Asuna Quebrada"
1600106-2 = "（Preocupado com o comportamento incomum dela, fui até onde Asuna estava）"
1600106-6 = "（Logo avistei Asuna sentada em um banco distante）"
1600106-10 = "（Vazia...）"
1600106-11 = "[s] \"...Ah, Asuna?\""
1600106-12 = "Sim...?"
1600106-16 = "Ah!"
1600106-17 = "Ué, o que foi? Quer dizer, Mestre!? Desde quando você está aí!?"
1600106-18 = "[s1] \"Você está bem? Aconteceu alguma coisa?\"\n[s2] \"Você parece um pouco estranha...\""
1600106-19 = "E-estou bem, estou bem. É algo que acontece de vez em quando."
1600106-20 = "E-estou bem, estou bem. É algo que acontece de vez em quando."
1600106-21 = "Não, na verdade, talvez não seja nada?"
1600106-22 = "É como se, quando fico muito tempo sem fazer nada, eu acabo ficando assim, aérea..."
1600106-23 = "[s3] \"Como se seu instinto animal estivesse ficando lento...?\"\n[s4] \"Por não ter tido a chance de usar esses sentidos por muito tempo...\"\n[s5] \"Seus sentidos estão todos embotados?\""
1600106-24 = "Hmm, será?"
1600106-25 = "Hmm, será?"
1600106-26 = "Hmm, será?"
1600106-27 = "Talvez seja isso...?"
1600106-28 = "De qualquer forma, às vezes, eu simplesmente não consigo me concentrar..."
1600106-29 = "..."
1600106-33 = "（Vazia...）"
1600106-34 = "...Sobre o que estávamos falando mesmo?"
1600106-35 = "[s] \"O caso é grave...\""
1600106-36 = "B-bem, não se preocupe! Com o tempo passa sozinho!"
1600106-37 = "Mas, em momentos como este, eu ficaria muito feliz se você pudesse me ajudar com algumas coisas."
1600106-38 = "É uma sorte ter o Mestre aqui..."
1600106-42 = "...Ué, Mestre? Desde quando você está aí?"
1600106-44 = "（...Vou levá-la para outro lugar por enquanto）"
1600106-57 = "（Como parecia difícil para ela andar sozinha, eu a apoiei enquanto caminhávamos）"
1600106-58 = "（Mesmo assim, tive que me ajustar ao ritmo dela, já que ela parava de andar de repente）"
1600106-59 = "（Levamos mais de uma hora para percorrer algumas centenas de metros até finalmente chegarmos）"
1600106-63 = "Hmm..."
1600106-64 = "Ué, onde estamos...?"
1600106-65 = "[s6] \"Já estamos quase chegando.\"\n[s7] \"Estamos chegando no seu dormitório, Asuna.\""
1600106-66 = "Ué, por que eu... E por que o Mestre está aqui...?"
1600106-67 = "Ué, por que eu... E por que o Mestre está aqui...?"
1600106-68 = "Será que é melhor eu descansar um pouco...?"
1600106-69 = "Hmm, acho que vou fazer isso...?"
1600106-70 = "Não era para eu estar com sono, mas sinto tanto sono..."
1600106-74 = "Ué..."
1600106-75 = "Como é que se sobe escadas mesmo...?"
1600106-79 = "...?"
1600106-80 = "[s8] \"Asuna!\"\n[s9] （Estendo os braços rapidamente para segurá-la）"
1600106-85 = "（Baque!）"
1600106-88 = "...Hm?"
1600106-89 = "Ué...?"
1600106-93 = "Por que eu estou em cima do Mestre...?"
1600106-97 = "E, por que meu peito está quente...?"
1600106-98 = "..."
1600106-99 = "[s] \"...Asuna?\""
1600106-103 = "Hã!?"
1600106-104 = "O-o que foi!?"
1600106-105 = "Por que eu estou em cima do Mestre?"
1600106-106 = "Ah, agora que me lembro, eu tropecei na escada... e o Mestre me segurou?"
1600106-107 = "Ahaha, que bela pegada! Incrível, incrível, é a primeira vez que algo assim acontece!"
1600106-108 = "Ehehe, mesmo sendo uma empregada, acabei sendo salva por você. Nossa, que surpresa..."
1600106-109 = "...A propósito, eu não estou pesada?"
1600106-110 = "[s10] \"Você é bem leve.\"\n[s11] \"Fico feliz que tenha se recuperado.\""
1600106-111 = "Entendi, obrigada, Mestre!"
1600106-112 = "Entendi, obrigada, Mestre!"
1600106-113 = "Não sei por que, mas meu peito está disparado desde agora!"
1600106-114 = "...Ah."
1600106-115 = "Falando nisso, recuperei a sensibilidade!"
1600106-116 = "[s] \"Fico muito feliz com isso.\""
1600106-117 = "Uau!"
1600106-121 = "Estou me mexendo! Consigo mover minhas mãos e pés como eu quero!"
1600106-128 = "Olha só, Mestre!! Até consigo pular agora!"
1600106-133 = "Pulo!!"
1600106-134 = "(...?)"
1600106-135 = "(...!!)"
1600106-144 = "― ...Fufu, [wa:1400] acabei montando em cima do Mestre!"
1600106-146 = "― Sim, [wa:850] meu corpo está leve, [wa:850] sinto que posso fazer qualquer coisa agora!"
1600106-149 = "[ns12] \"O-o que deu em você de repente!?\"\n[ns13] \"Não me coma...\""
1600106-150 = "[wa:350]― Hmm, [wa:1300] o que será que é isso, [wa:1250] essa sensação..."
1600106-151 = "[wa:350]― Hmm, [wa:1300] o que será que é isso, [wa:1250] essa sensação..."
1600106-154 = "― ...Bem, não importa!"
1600106-156 = "― Tcharam! [wa:600] A Asuna de sempre, [wa:950] está de volta!"
1600106-159 = "[wa:250]― Isso também [wa:250] é graças ao Mestre, [wa:1450] obrigada!"
1600106-162 = "[wa:100]― Fufu. [wa:1000] Realmente, quando estou [wa:550] ao lado do Mestre,"
1600106-164 = "― Meu coração dispara."
1600106-167 = "― ...De alguma forma, [wa:900] acho que vou acabar viciando nisso!"
1600106-170 = "[wa:250]― Então, de vez em quando, [wa:1150] vamos fazer assim... [wa:1750] tá?"
1600106-173 = "― Conto com você, [wa:900] meu Mestre!"
1600106-176 = "(Depois disso, me despedi da Asuna, que estava cheia de energia, e voltei para o Schale)"
