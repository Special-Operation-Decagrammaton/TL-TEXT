[translation]
1600106-1 = "壊れたアスナ"
1600106-2 = "（なんだか尋常ではない様子が心配で、アスナの元へと向かった）"
1600106-6 = "（間もなく遠くのベンチに座っているアスナの姿が見えた）"
1600106-10 = "（ぼーっ……）"
1600106-11 = "[s] \"……あ、アスナ？\""
1600106-12 = "うん……。"
1600106-16 = "はっ！"
1600106-17 = "あれ、何なに？ってご主人様！？いつからいたの！？"
1600106-18 = "[s1] \"大丈夫？何かあった？\"\n[s2] \"なんだか様子が変だけど……？\""
1600106-19 = "だ、大丈夫大丈夫。時々あることだから。"
1600106-20 = "だ、大丈夫大丈夫。時々あることだから。"
1600106-21 = "いや、むしろ何も無いのかな？"
1600106-22 = "何かこう、暇な時間が続くとボーっとしちゃうっていうか……"
1600106-23 = "[s3] \"動物的な直感が鈍る、みたいな……？\"\n[s4] \"長時間そういう感覚を使うタイミングが無いことによって……\"\n[s5] \"感覚全体が鈍ってる、とか？\""
1600106-24 = "うーん、そうかな？"
1600106-25 = "うーん、そうかな？"
1600106-26 = "うーん、そうかな？"
1600106-27 = "多分そうかも……？"
1600106-28 = "とにかく時々、こうやって集中できない時が……"
1600106-29 = "……"
1600106-33 = "（ぼーっ……）"
1600106-34 = "……何の話だっけ？"
1600106-35 = "[s] \"重症だ……。\""
1600106-36 = "ま、まあまあ心配しないで！時間が経てば勝手に治るから！"
1600106-37 = "まあでも今みたいなときは、やっぱり色々助けてくれると嬉しいかな。"
1600106-38 = "ご主人様がいてくれて助かっ……"
1600106-42 = "……あれ、ご主人様？いつからそこにいたの？"
1600106-44 = "（……とりあえず場所を変えよう）"
1600106-57 = "（ひとりで歩くのも大変そうだったので、どうにかアスナを支えながら歩いた）"
1600106-58 = "（それでも唐突に足が動かなくなるアスナのペースにどうにか合わせつつ）"
1600106-59 = "（数百メートルの移動に、一時間以上かけてようやく辿り着いた）"
1600106-63 = "うぅん……"
1600106-64 = "あれ、ここは……？"
1600106-65 = "[s6] \"あと少しで着くよ。\"\n[s7] \"そろそろアスナの寮だよ。\""
1600106-66 = "あれ、どうして私……それに、何でご主人様が………？"
1600106-67 = "あれ、どうして私……それに、何でご主人様が………？"
1600106-68 = "ちゃんと休んだ方が良い……？"
1600106-69 = "うーん、じゃあそうしようかな……？"
1600106-70 = "なんだか、眠くないはずなのに眠い……"
1600106-74 = "あれ……"
1600106-75 = "階段、どうやって上がるんだっけ……？"
1600106-79 = "……？"
1600106-80 = "[s8] \"アスナ！\"\n[s9] （とっさに腕を伸ばして受け止める）"
1600106-85 = "（ガタンッ！）"
1600106-88 = "……ん？"
1600106-89 = "あれ……？"
1600106-93 = "どうして私、ご主人様の上に……？"
1600106-97 = "それに、胸が温かい……？"
1600106-98 = "……。"
1600106-99 = "[s] \"……アスナ？\""
1600106-103 = "はっ！？"
1600106-104 = "わ、何なに！？"
1600106-105 = "どうして私がご主人様の上にいるの？"
1600106-106 = "あ、そういえば私さっき、階段から転んで……それをご主人様が、受け止めてくれた？"
1600106-107 = "あはは、ナイスキャッチだね！すごいすごい、こんなの初めて！"
1600106-108 = "えへへ、メイドのはずなのに、逆に助けてもらっちゃったね。いやービックリだぁ……。"
1600106-109 = "……ところで私、重くない？"
1600106-110 = "[s10] \"全然軽いよ。\"\n[s11] \"調子が戻ったみたいで良かった。\""
1600106-111 = "そっか、ありがとうご主人様！"
1600106-112 = "そっか、ありがとうご主人様！"
1600106-113 = "なんだかさっきから胸のところがワクワクしてさ！"
1600106-114 = "……あ。"
1600106-115 = "そういえば、感覚が戻ってる！"
1600106-116 = "[s] \"それは何より。\""
1600106-117 = "わー！"
1600106-121 = "動く動く！手も足も思い通りだよ！"
1600106-128 = "見て、ご主人様！！ジャンプもできるようになったよ！"
1600106-133 = "ジャーンプ！！"
1600106-134 = "（……？）"
1600106-135 = "（……！！）"
1600106-144 = "― ……ふふっ、[wa:1400]ご主人様に乗っかっちゃった！"
1600106-146 = "― うん、[wa:850]身体も軽いし、[wa:850]今なら何でもできそう！"
1600106-149 = "[ns12] \"きゅ、急にどうしたの！？\"\n[ns13] \"食べないで……。\""
1600106-150 = "[wa:350]― うーん、[wa:1300]何なんだろうなー、[wa:1250]この感じ……"
1600106-151 = "[wa:350]― うーん、[wa:1300]何なんだろうなー、[wa:1250]この感じ……"
1600106-154 = "― ……まあ良いか！"
1600106-156 = "― じゃーん！[wa:600]いつものアスナちゃん、[wa:950]復活！"
1600106-159 = "[wa:250]― これも[wa:250]ご主人様のおかげだよ、[wa:1450]ありがとね！"
1600106-162 = "[wa:100]― ふふっ。 [wa:1000]やっぱりこうして[wa:550]ご主人様のそばにいると、"
1600106-164 = "― 心が躍るなー。"
1600106-167 = "― ……なんだかちょっと、[wa:900]癖になっちゃいそう！"
1600106-170 = "[wa:250]― だからこれから時々[wa:1150]こういう風に……[wa:1750]ね？"
1600106-173 = "― よろしく、[wa:900]私のご主人様！"
1600106-176 = "（その後、元気になったアスナを見送ってからシャーレへと戻った）"
