[translation]
1003820-1 = "SRT、思い出します"
1003820-2 = "シャーレ・休憩室"
1003820-3 = "（シャーレの休憩室でミヤコと一緒に洗濯をしていると……）"
1003820-4 = "……助けてくださってありがとうございます、先生。"
1003820-5 = "おかげで溜まっていた洗濯物を乾かすことができました。"
1003820-6 = "先生に乾燥機を貸していただけなかったら、#n梅雨の間ずっと生乾きの服で生活するところでした……。"
1003820-7 = "私は構わないのですが、小隊員たちの健康に#n悪影響を及ぼしてしまうのは間違いないですから……。"
1003820-8 = "[s1] \"あまり無理はしないで。\"\n[s2] \"必要なら他の施設も自由に使っていいよ。\""
1003820-11 = "……ありがとうございます、先生。"
1003820-12 = "キャンプを始めた頃は、気温の心配ばかりで、#n日常生活に支障が出るとは予想もしていませんでした。"
1003820-13 = "実際にやってみると、教範には載っていない#n予想外の出来事がたくさん発生するのですね。"
1003820-14 = "一人前の小隊長になるには、まだまだ勉強が必要みたいです。"
1003820-18 = "あっ、残りの洗濯物もすべて乾燥が終わったようですね。"
1003820-19 = "私は洗濯物を取り出してきます。#n先生はここでゆっくりしていてください。"
1003820-25 = "[ns3] \"ミヤコ、何か落ちたよ。\"\n[ns4] \"これは……名札？\""
1003820-28 = "あ……。"
1003820-29 = "ありがとうございます、先生。"
1003820-30 = "[s5] \"洗濯中に外れたのかな？\"\n[s6] \"裁縫箱、取ってこようか？\""
1003820-33 = "いいえ、大丈夫です。#nこれは制服についていたものではなく……"
1003820-34 = "ポケットにいれていたものですから。"
1003820-35 = "[s] \"どうして名札をポケットに……？\""
1003820-36 = "この名札は……SRT特殊学園に入学した時にもらった#n訓練生用の名札なのです。"
1003820-37 = "訓練服につける名札ですので、#n正式に小隊配置を受けてから使うことはなかったのですが……。"
1003820-38 = "この名札を見ていると、#nSRT学園に入学した時の気持ちを思い出せますから。"
1003820-39 = "過酷な状況でも変わらない確固たる正義と、輝く先輩たちの姿……。"
1003820-40 = "心が折れそうになった時でも、#nこの気持ちを思い出すことができれば、#nくじけず前に進めると思って。"
1003820-41 = "だからこの名札は、いつもポケットに入れて持ち歩いているんです。"
1003820-42 = "[s] \"素敵な心構えだね。\""
1003820-46 = "[ns7] \"そういえば私、初めの頃はミヤコに嫌われていたよね。\"\n[ns8] \"初心に戻ってまた嫌われちゃったらどうしよう？\""
1003820-50 = "からかわないでください、先生。"
1003820-51 = "あの頃は、先生が私たちのことを邪魔していると思っていましたし……#n何より、先生のことをよく知らなかったので。"
1003820-52 = "……心配なさらなくても大丈夫です。#n先生と過ごした日々を忘れない限り……"
1003820-53 = "今の気持ちは変わらないでしょうから。"
1003820-55 = "（その後、ミヤコと思い出話をしながら楽しい時間を過ごした）"
