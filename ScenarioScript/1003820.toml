[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1003820-1 = "SRT, Relembrando!" 
1003820-2 = "Schale - Quarto de Descanso" 
1003820-3 = "（Enquanto eu ajudava a Miyako com a lavanderia\nna sala de descanso da Schale……）" 
1003820-4 = "……Muito obrigada por nos ajudar com isso, Sensei." 
1003820-5 = "Graças a você, finalmente conseguimos\nsecar toda aquela pilha de roupas sujas." 
1003820-6 = "Se você não tivesse nos emprestado a secadora,\nprovavelmente passaríamos a estação das chuvas inteira vestindo roupas úmidas……" 
1003820-7 = "Por mim tudo bem, mas isso com certeza\ntraria riscos à saúde das meninas do esquadrão……" 
1003820-8 = "[s1] \"Por favor, não se esforcem demais.\"\n[s2] \"Podem usar as outras instalações livremente se precisarem.\"" 
1003820-11 = "……Muito obrigada, Sensei." 
1003820-12 = "Quando começamos a acampar, eu só me preocupava com a temperatura,\nnem imaginava o quanto a chuva afetaria nossa vida diária." 
1003820-13 = "Viver na prática traz à tona diversas situações imprevistas\nque não constam em nenhum manual de treinamento." 
1003820-14 = "Parece que ainda tenho muito a aprender\npara me tornar uma comandante de esquadrão exemplar." 
1003820-18 = "Ah, parece que o resto das roupas\njá terminou de secar." 
1003820-19 = "Eu vou tirá-las da máquina.\nPor favor, descanse aqui, Sensei." 
1003820-25 = "[ns3] \"Miyako, você deixou cair algo.\"\n[ns4] \"Isso é…… um crachá de identificação?\"" 
1003820-28 = "Ah……" 
1003820-29 = "Obrigada, Sensei." 
1003820-30 = "[s5] \"Caiu durante a lavagem?\"\n[s6] \"Quer que eu pegue o kit de costura?\"" 
1003820-33 = "Não, não precisa.\nIsso não estava pregado no uniforme……" 
1003820-34 = "Estava guardado no meu bolso." 
1003820-35 = "[s] \"Por que você guarda\num crachá no bolso……?\"" 
1003820-36 = "Este crachá…… é o crachá de cadete que recebi\nquando ingressei na Academia Especial SRT." 
1003820-37 = "Como ele é feito para ser usado no uniforme de treinamento,\nnão tive mais a chance de usá-lo após ser oficialmente designada a um esquadrão, mas……" 
1003820-38 = "Sempre que olho para ele,\neu me lembro dos sentimentos que tinha quando entrei na SRT." 
1003820-39 = "Uma justiça inabalável que não se curva perante situações extremas,\ne a figura brilhante das nossas veteranas……" 
1003820-40 = "Sinto que, mesmo quando meu coração estiver prestes a se despedaçar,\nse eu conseguir me lembrar desses sentimentos,\nconseguirei seguir em frente sem desistir." 
1003820-41 = "É por isso que eu sempre\ncarrego este crachá no meu bolso." 
1003820-42 = "[s] \"É uma mentalidade maravilhosa.\"" 
1003820-46 = "[ns7] \"Falando nisso, você me detestava bastante no começo, não é?\"\n[ns8] \"O que eu faço se você voltar às suas origens\ne começar a me odiar de novo?\"" 
1003820-50 = "Por favor, não brinque comigo, Sensei." 
1003820-51 = "Naquela época, nós achávamos que você\nestava apenas nos atrapalhando……\nE, acima de tudo, não o conhecíamos direito." 
1003820-52 = "……Não precisa se preocupar.\nEnquanto eu não me esquecer dos dias que passei ao seu lado……" 
1003820-53 = "Tenho certeza de que meus sentimentos atuais não mudarão." 
1003820-55 = "（Depois disso, passei um momento muito agradável\nrelembrando o passado junto da Miyako.）" 