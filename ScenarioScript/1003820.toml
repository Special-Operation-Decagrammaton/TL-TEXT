[translation]
1003820-1 = "SRT、 lembranças"
1003820-2 = "Schale - Sala de descanso"
1003820-3 = "（Enquanto lavo roupas com a Miyako na sala de descanso do Schale...）"
1003820-4 = "……Obrigada por me ajudar, Sensei."
1003820-5 = "Graças a você, consegui secar a pilha de roupas que estava acumulada."
1003820-6 = "Se você não tivesse me emprestado a secadora, #nteríamos que viver com roupas úmidas durante toda a estação chuvosa……."
1003820-7 = "Por mim tudo bem, mas com certeza isso afetaria a saúde #ndas integrantes do esquadrão……."
1003820-8 = "[s1] \"Não se esforce tanto.\"\n[s2] \"Se precisar, pode usar as outras instalações à vontade.\""
1003820-11 = "……Muito obrigada, Sensei."
1003820-12 = "Quando começamos a acampar, eu só me preocupava com a temperatura, #nnunca imaginei que isso atrapalharia o nosso dia a dia."
1003820-13 = "Na prática, acabam surgindo muitos imprevistos #nque não estão escritos nos manuais de instrução."
1003820-14 = "Parece que ainda preciso estudar muito para me tornar uma líder de esquadrão exemplar."
1003820-18 = "Ah, parece que o resto das roupas também já terminou de secar."
1003820-19 = "Vou pegar as roupas. #nSensei, pode ficar aí descansando."
1003820-25 = "[ns3] \"Miyako, algo caiu.\"\n[ns4] \"Isso é... uma etiqueta de identificação?\""
1003820-28 = "Ah……."
1003820-29 = "Obrigada, Sensei."
1003820-30 = "[s5] \"Será que soltou durante a lavagem?\"\n[s6] \"Quer que eu pegue a caixa de costura?\""
1003820-33 = "Não, não precisa. #nIsso não estava preso ao uniforme……"
1003820-34 = "Eu estava guardando no bolso."
1003820-35 = "[s] \"Por que você guarda a etiqueta no bolso……?\""
1003820-36 = "Esta etiqueta é…… a de treinamento que recebi #nquando entrei na Academia SRT."
1003820-37 = "Como é uma etiqueta para o uniforme de treino, #nnunca a usei depois de receber a designação oficial do esquadrão, mas……."
1003820-38 = "Quando olho para esta etiqueta, #nconsigo me lembrar de como me senti ao entrar na Academia SRT."
1003820-39 = "A justiça inabalável que não muda mesmo em situações difíceis, e a imagem brilhante dos veteranos……."
1003820-40 = "Mesmo quando sinto que vou desmoronar, #nse eu conseguir me lembrar desse sentimento, #npenso que posso seguir em frente sem desistir."
1003820-41 = "Por isso, sempre carrego esta etiqueta no meu bolso."
1003820-42 = "[s] \"Essa é uma mentalidade admirável.\""
1003820-46 = "[ns7] \"Falando nisso, no começo você não gostava de mim, né?\"\n[ns8] \"E se eu voltar ao início e você acabar me odiando de novo?\""
1003820-50 = "Não zombe de mim, Sensei."
1003820-51 = "Naquela época, eu achava que você estava atrapalhando a gente…… #ne acima de tudo, eu não conhecia você muito bem."
1003820-52 = "……Não precisa se preocupar. #nEnquanto eu não esquecer os dias que passei com você……"
1003820-53 = "Meus sentimentos atuais não vão mudar."
1003820-55 = "（Depois disso, passei um tempo agradável conversando sobre lembranças com a Miyako）"
