[translation]
10011030-1 = "第3話;忍者と言えばお姫様？"
10011030-2 = "（公演が始まる約30分前……）"
10011030-3 = "[ns] \"舞台の裏側って、こうなってるんだね。\""
10011030-8 = "緊張、してきました……。"
10011030-9 = "イズナもドキドキしています！胸がそれはもうバクバクと！"
10011030-11 = "みんな固いよ～？そんな大変そうなことじゃないし、気楽に気楽に♪"
10011030-12 = "その、先生……あらためてですが、えっと……こういう機会をいただき、ありがとう、ございます……！"
10011030-13 = "そうですね、これも主殿のおかげです！"
10011030-14 = "[s1] \"私の独断で認可を出すわけにもいかないからね。\"\n[s2] \"ミチルは何かの理由で、申請書が出せないみたいだし……。\""
10011030-17 = "うっ……！そ、それは……"
10011030-18 = "た、ただ、その……"
10011030-19 = "と、とにかく！ここで忍者として、かっこいい活躍を見せれば良いだけの話！"
10011030-20 = "とりあえずそれだけ！"
10011030-21 = "私も、頑張ります……！カッコ良い、忍者に、なるために……！"
10011030-22 = "イズナも負けません！はい！"
10011030-23 = "[s] \"みんな、本当に忍者が好きなんだね。\""
10011030-24 = "ふふっ、そりゃあ当然！なんたって忍術研究部だからね！"
10011030-25 = "イズナも大好きです！キヴォトスいちの忍者になりたいですし！"
10011030-26 = "私は、まだ、忍者についてはよく分かってるわけでは、ないのですが……。"
10011030-27 = "それは大丈夫！忍者は最高にクールでイケてる存在だから、時間ときっかけがあればどんどん好きになるって！"
10011030-28 = "私は忍者のことを、キヴォトス中のみんなに知ってもらいたい。動画チャンネルの運営も、そのためのもの！"
10011030-29 = "[s] \"なるほど、そういうチャンネルだったんだ。\""
10011030-30 = "今はまあ、登録者数も少ない小さなチャンネルだけど……忍者の魅力をいっぱい知ってもらえたら、いつかは……！"
10011030-31 = "……うん、私は絶対に諦めない！なぜなら！？"
10011030-32 = "えっと、その、「諦めないことが」……！"
10011030-33 = "「忍者の鉄則だから」、です！ニンニン！"
10011030-34 = "[s] \"ニンニン！……ところでこの「和楽姫」って、どんな公演なの？\""
10011030-35 = "和楽姫は映画村が誇るアトラクション……というか、「体験型イベント」でね。"
10011030-39 = "チセ様がとある名家のお姫様役で、"
10011030-43 = "ある日そのお家の名声を欲しがった悪党たちに誘拐されちゃうの。"
10011030-47 = "それを、公演を見てる観客――"
10011030-55 = "その全員が主人公になってお姫様を助けるために、映画村のあちこちにある試練を乗り越え、お姫様を救出する……。"
10011030-57 = "あらすじ自体は珍しいものじゃないけど、自分たちが参加するという臨場感ある体験が売りでね。"
10011030-58 = "お姫様を救い出すために、観客同士で競争していくのも熱くて楽しいし。"
10011030-59 = "そういう色んな要素がある、映画村で一番人気のイベントってわけ。"
10011030-60 = "私はその、動画などで、見たことあるだけ、でしたので……。"
10011030-61 = "お手伝いできる、というのも、その……光栄、です！"
10011030-62 = "たしかに。お手伝いって立場だけど、やっぱワクワクしちゃう……"
10011030-63 = "って、あれ！？よく考えたら「和楽姫」のお姫様役ってチセ様じゃん！？"
10011030-64 = "これはもしかして、上手く行ったらサインとか貰えちゃったりするんじゃ……！？"
10011030-65 = "なるほど……！陰陽部の関係者としての、立場を利用し、お宝を手に入れると……！"
10011030-66 = "これが忍者、なのですね……！さすが部長、です！"
10011030-67 = "……？"
10011030-68 = "ツクヨ、それ褒めてる……？"
10011030-69 = "ま、まあそうとは限らないけどね！任務第一だし、でも貰えるチャンスがあるなら……"
10011030-75 = "スタッフのみなさん、準備をお願いします。"
10011030-76 = "もうすぐ「和楽姫」様が到着しますので。"
10011030-80 = "[ns] \"ってことは、チセがそろそろ来るってことだよね。\""
10011030-86 = "えっと、予行演習予行演習……！ち、チセ様、その、私ずっと前からファンで……！"
10011030-88 = "イブキ登場！！おっ待たせーー！"
10011030-90 = "……え？"
10011030-91 = "ゲヘナの、生徒さん……？"
10011030-93 = "んふふっ……この度は交流会にご協力いただき、誠に感謝しますよ。マコト議長。"
10011030-95 = "キキキッ、苦しゅう無い！！"
10011030-96 = "むしろこちらが感謝したいくらいだな、陰陽部よ！"
10011030-97 = "この交流会で、証明されるであろう……"
10011030-98 = "元々存在する公演をより良いものとし、一生の思い出になるようなイベントを開催することができる……"
10011030-99 = "その力を……この私、マコト様が持っているということがな！キキキキッ！！！"
10011030-100 = "なるほど～。まあせっかくですしスパイスと言いますか、その証明がも～っと派手になるようなアイディアがあるんですが。"
10011030-101 = "聞いてみません？マコト議長？"
10011030-102 = "ふふっ、そこまで言うなら聞かせてもらおうか？"
10011030-104 = "えーっと……つまり元々チセ様がやる予定の「和楽姫」役が、交代ってこと？"
10011030-105 = "ものすごく大事な公演って言ってたのに、変えちゃって大丈夫なのかな～……？"
10011030-106 = "え？イブキ、お姫様やっちゃダメってこと……？"
10011030-107 = "イブキのせいで、色々台無し……？"
10011030-108 = "[s] \"イブキは何も悪いことしてないよ、大丈夫。\""
10011030-115 = "わ、わっ……？"
10011030-116 = "急に電気が……まさか、敵襲……！？"
10011030-117 = "[s] \"みんな、大丈夫。落ち着いて。\""
10011030-119 = "う……。"
10011030-120 = "う……？"
10011030-121 = "うぃ……どうして急に、電気消すの……？"
10011030-122 = "イブキが悪いことしたから……？怖いよう、何も見えないよぅ……"
10011030-123 = "イロハ先輩……マコト先輩……うぅっ……。"
10011030-125 = "（わわっ……！この場で騒ぎになっちゃったら、）"
10011030-126 = "（せっかくのチャンスが……！）"
10011030-127 = "（と、とりあえず、何とかして慰めないと……）"
10011030-129 = "だ、大丈夫、安心して！これはただのトラブルだから！ね、先生殿！？"
10011030-130 = "[s] \"うん、すぐ戻るんじゃないかな。\""
10011030-131 = "くすん……トラブル？"
10011030-132 = "そうそう！心配しないで、私たちも先生殿もそばにいるから！"
10011030-133 = "先生、は知ってるけど……おねえちゃんたちは、誰？"
10011030-135 = "イズナはイズナで、あちらはツクヨ殿です！そしてこちらが部長！私たちは三人一組！"
10011030-141 = "その名も忍術研究部！です！"
10011030-143 = "ニンジャ……？"
10011030-144 = "あ、えっと、忍者というのはその、例えっていうか……！"
10011030-145 = "……嘘、ってこと？"
10011030-146 = "え、えっと、そうじゃなくて……！"
10011030-147 = "嘘じゃない、です……！"
10011030-151 = "私たちは最強の忍者を目指す、忍術研究部……そもそも忍者は、ものすごく強いんですよ……！"
10011030-152 = "ですので、怖がらなくて大丈夫、です。えっと……イブキちゃん、ですよね？"
10011030-153 = "何があっても、私たち忍術研究部が……"
10011030-154 = "忍者が、お姫様であるイブキちゃんを、守りますから！ですよね、部長？"
10011030-155 = "[s] \"忍者って、お姫様を守る存在だったっけ……？\""
10011030-157 = "先生殿、話をややこしくしないで！それは作品にもよるから！"
10011030-158 = "ぐすっ……。"
10011030-159 = "と、とにかく、そう！私たちが、君のことを守るから！"
10011030-160 = "そう、なの……？"
10011030-161 = "う。まあ、急に言われても安心はできないよね……うーん……"
10011030-165 = "そうだ！"
10011030-169 = "ほら、これを見てみて！"
10011030-170 = "[s] \"見たことない忍者グッズが……。\""
10011030-178 = "……わぁ！"
10011030-180 = "（よし、喜んでくれてる……！）"
10011030-183 = "ねぇねぇ、何これ？イブキ、初めて見た！"
10011030-184 = "どう？かっこいいでしょ？"
10011030-185 = "ふふっ、これはね……「忍者ニンペロさん」の主人公、ニンペロさん！"
10011030-186 = "裏世界の偽忍者や悪党たちを追い払う、忍者の中の忍者なのさ！"
10011030-187 = "あはは、変なの！あ、翼が生えてる。引っ張っても良い？"
10011030-188 = "うわあっ！！そ、それは限定版だから、取り扱いは慎重にね……！"
10011030-196 = "こほん！……とにかく、今日はそのニンペロさんを貸してあげる。"
10011030-203 = "ニンペロさんと私たちが揃えば、たとえどんな危機がそなたに迫ったとしても大丈夫！"
10011030-204 = "何があってもお姫様の危機には駆けつけてみせよう！"
10011030-205 = "……約束、してくれる？"
10011030-206 = "もちろん、何があっても絶対助けに行く！忍者の鉄則、その参！"
10011030-207 = "「忍者とは、一度交わした約束は必ず守るもの」！"
10011030-208 = "[s] \"良かったね、イブキ。\""
10011030-209 = "……うん、ありがとう！"
10011030-210 = "どういたしまして！"
10011030-211 = "えへへ……。"
10011030-216 = "あっ、電気が……。"
10011030-218 = "すぐ戻って、良かったです。"
10011030-219 = "ほらね、大したことじゃなかったでしょ？"
10011030-224 = "お待たせしました、トラブルの対処をしており……それではお姫様役の方、ご準備を！そろそろ開演となります！"
10011030-228 = "イブキ殿、頑張ってください！"
10011030-229 = "いってらっしゃい、ませ……！"
10011030-230 = "ファイト！"
10011030-232 = "うん！忍者のおねえちゃんたち、先生。イブキ、行ってくるね！"
10011030-236 = "えっと、良かったですね。"
10011030-237 = "な、何とかなって良かったぁ……。"
10011030-238 = "遂に公演が始まりそうですね！"
10011030-239 = "うん。このまま何事もなく無事に終われば良いけど……。"
10011030-248 = "ん？あそこにいっぱいいるのって……あれもスタッフかな？"
10011030-253 = "[ns] \"いや、あれは……！\""
10011030-258 = "計画は頭に入れたな？では行動を開始する。迅速に進め、邪魔者は処理せよ……行くぞ、「魑魅一座・気まぐれ流」！"
10011030-260 = "「「ラジャー！！」」"
10011030-263 = "え、っと……！？部長、マズいの、では……！？"
10011030-264 = "部長、主殿、どうしましょう！？"
10011030-265 = "な、何なに！？急にどういうこと！？"
