[translation]
10011030-1 = "Episódio 3; Falou em ninja, falou em princesa?"
10011030-2 = "（Cerca de 30 minutos antes do início da apresentação...）"
10011030-3 = "[ns] \"Então é assim que os bastidores do palco funcionam.\""
10011030-8 = "Estou ficando nervosa..."
10011030-9 = "Izuna também está com o coração a mil! Meu peito está batendo forte, tipo, muito mesmo!"
10011030-11 = "Pessoal, relaxem! Não é nada tão difícil assim, fiquem tranquilas♪"
10011030-12 = "Bem, Sensei... falando de novo, é que... obrigada por nos dar essa oportunidade...!"
10011030-13 = "É verdade, isso também é graças ao Mestre!"
10011030-14 = "[s1] \"Eu não poderia simplesmente dar a autorização por conta própria.\"\n[s2] \"Parece que a Michiru não consegue enviar o formulário de inscrição por algum motivo...\""
10011030-17 = "Ugh...! I-Isso é..."
10011030-18 = "É-é que, sabe..."
10011030-19 = "E-Enfim! Só preciso mostrar uma atuação ninja incrível aqui e pronto!"
10011030-20 = "Por enquanto, é só isso!"
10011030-21 = "Eu também vou me esforçar...! Para me tornar uma ninja... incrível...!"
10011030-22 = "Izuna também não vai perder! Sim!"
10011030-23 = "[s] \"Vocês realmente amam ninjas, não é?\""
10011030-24 = "Fufu, claro que sim! Afinal, somos o Clube de Pesquisa Ninjutsu!"
10011030-25 = "Izuna também ama! Quero me tornar a melhor ninja de Kivotos!"
10011030-26 = "Eu ainda não entendo muito bem sobre ninjas, mas..."
10011030-27 = "Não tem problema! Ninjas são seres super legais e estilosos, com tempo e uma chance, você vai acabar amando também!"
10011030-28 = "Eu quero que todos em Kivotos conheçam os ninjas. Administrar o canal de vídeos também é para isso!"
10011030-29 = "[s] \"Entendi, então era esse o tipo de canal.\""
10011030-30 = "Bem, agora é um canal pequeno com poucos inscritos, mas... se as pessoas conhecerem o charme dos ninjas, um dia...!"
10011030-31 = "...Sim, eu nunca vou desistir! Porque!?"
10011030-32 = "Bem, é que, \"não desistir\" é...!"
10011030-33 = "\"A regra de ouro dos ninjas\", é isso! Nin-nin!"
10011030-34 = "[s] \"Nin-nin!... A propósito, que tipo de apresentação é essa 'Princesa Waraku'?\""
10011030-35 = "A Princesa Waraku é a atração que é o orgulho da Vila do Cinema... ou melhor, um \"evento interativo\"."
10011030-39 = "A senhorita Chise faz o papel de uma princesa de uma família nobre,"
10011030-43 = "e um dia ela acaba sendo sequestrada por vilões que cobiçam a fama daquela família."
10011030-47 = "Então, o público que está assistindo à apresentação—"
10011030-55 = "Todos eles se tornam os protagonistas para salvar a princesa, superando provações por toda a Vila do Cinema para resgatá-la..."
10011030-57 = "A sinopse em si não é nada incomum, mas o ponto forte é a experiência imersiva de participar pessoalmente."
10011030-58 = "É empolgante e divertido ver os espectadores competindo entre si para salvar a princesa."
10011030-59 = "É por causa desses vários elementos que é o evento mais popular da Vila do Cinema."
10011030-60 = "Eu só tinha visto isso em vídeos e coisas do tipo..."
10011030-61 = "Poder ajudar é, tipo... uma honra!"
10011030-62 = "Com certeza. Mesmo sendo apenas uma ajuda, ainda fico empolgada..."
10011030-63 = "Espera, o quê!? Pensando bem, a atriz que faz a Princesa Waraku é a senhorita Chise, né!?"
10011030-64 = "Será que, se tudo der certo, eu consigo um autógrafo dela...!?"
10011030-65 = "Entendo...! Usar nossa posição como membros do Departamento Yin-Yang para conseguir um tesouro...!"
10011030-66 = "Então é isso que significa ser um ninja...! Como esperado da nossa presidente!"
10011030-67 = "...?"
10011030-68 = "Tsukuyo, isso foi um elogio...?"
10011030-69 = "B-Bem, não necessariamente! A missão vem em primeiro lugar, mas se tiver uma chance de ganhar algo..."
10011030-75 = "Pessoal da equipe, por favor, preparem-se."
10011030-76 = "A \"Princesa Waraku\" chegará em breve."
10011030-80 = "[ns] \"Isso significa que a Chise está chegando, né.\""
10011030-86 = "Bem, ensaio, ensaio...! S-Senhorita Chise, é que, eu sou sua fã há muito tempo...!"
10011030-88 = "Ibuki chegou!! Esperaram por mim!?"
10011030-90 = "……Hã?"
10011030-91 = "Alunas de Gehenna…?"
10011030-93 = "Nfufu… Agradeço sinceramente pela cooperação de vocês nesta reunião de intercâmbio, Presidente Makoto."
10011030-95 = "Kikiki, não precisa se incomodar!!"
10011030-96 = "Na verdade, sou eu quem deveria agradecer, Clube de Yin-Yang!"
10011030-97 = "Nesta reunião de intercâmbio, ficará provado…"
10011030-98 = "Que é possível pegar uma apresentação já existente e torná-la ainda melhor, criando um evento que será uma lembrança para toda a vida…"
10011030-99 = "E que esse poder… pertence a mim, a grande Makoto! Kikikiki!!!"
10011030-100 = "Entendo~. Bem, já que estamos aqui, tenho uma ideia para dar um toque especial, ou melhor, para tornar essa prova ainda mais chamativa."
10011030-101 = "Não quer ouvir, Presidente Makoto?"
10011030-102 = "Fufu, se você insiste tanto, acho que posso ouvir."
10011030-104 = "Err… então quer dizer que o papel da 'Princesa do Waraku', que a Chise-sama ia fazer, vai ser substituído?"
10011030-105 = "Você disse que era uma apresentação super importante, será que tudo bem mudar assim…?"
10011030-106 = "Hã? Ibuki, quer dizer que eu não posso ser a princesa…?"
10011030-107 = "Por minha causa, tudo vai dar errado…?"
10011030-108 = "[s] \"Ibuki, você não fez nada de errado, está tudo bem.\""
10011030-115 = "Ah, ah…?"
10011030-116 = "A luz apagou de repente… será que é um ataque inimigo…!?"
10011030-117 = "[s] \"Pessoal, está tudo bem. Mantenham a calma.\""
10011030-119 = "Ugh…"
10011030-120 = "Ugh…?"
10011030-121 = "Ui… por que a luz apagou de repente…?"
10011030-122 = "Foi porque eu fiz algo errado…? Estou com medo, não consigo ver nada…"
10011030-123 = "Iroha-senpai… Makoto-senpai… uuu…"
10011030-125 = "(Ah não…! Se começar uma confusão aqui,)"
10011030-126 = "(a chance que a gente conseguiu vai…!)"
10011030-127 = "(P-pelo menos, preciso dar um jeito de consolá-la…)"
10011030-129 = "E-está tudo bem, fique tranquila! Isso é só um probleminha técnico! Né, Sensei!?"
10011030-130 = "[s] \"Sim, deve voltar logo.\""
10011030-131 = "Snif… um problema?"
10011030-132 = "Isso mesmo! Não se preocupe, nós e o Sensei estamos aqui com você!"
10011030-133 = "Eu conheço o Sensei… mas quem são vocês, moças?"
10011030-135 = "Eu sou a Izuna, e aquela ali é a Tsukuyo! E esta é a nossa presidente! Nós somos um trio!"
10011030-141 = "O nome do nosso grupo é Clube de Pesquisa de Ninjutsu!"
10011030-143 = "Ninja…?"
10011030-144 = "Ah, err, ninja é, tipo, uma forma de dizer…!"
10011030-145 = "…Então é mentira?"
10011030-146 = "E-err, não é isso…!"
10011030-147 = "Não é mentira…!"
10011030-151 = "Nós somos o Clube de Pesquisa de Ninjutsu, buscando nos tornar as ninjas mais fortes… e ninjas são, na verdade, muito fortes…!"
10011030-152 = "Por isso, não precisa ter medo, está bem. Err… Ibuki-chan, certo?"
10011030-153 = "Não importa o que aconteça, nós do Clube de Pesquisa de Ninjutsu…"
10011030-154 = "Nós, ninjas, vamos proteger você, Ibuki-chan, que é a nossa princesa! Né, presidente?"
10011030-155 = "[s] \"Ninjas protegem princesas, é isso mesmo…?\""
10011030-157 = "Sensei, não complique as coisas! Isso depende da história!"
10011030-158 = "Snif…"
10011030-159 = "D-de qualquer forma, é isso! Nós vamos proteger você!"
10011030-160 = "É mesmo…?"
10011030-161 = "Ugh. Bem, mesmo que eu diga isso de repente, não dá para ficar tranquila, né… hum…"
10011030-165 = "Já sei!"
10011030-169 = "Olha só, dá uma olhada nisso!"
10011030-170 = "[s] \"Itens de ninja que eu nunca vi antes...\""
10011030-178 = "……Uau!"
10011030-180 = "(Ótimo, ela gostou...!)"
10011030-183 = "Ei, ei, o que é isso? Ibuki nunca viu antes!"
10011030-184 = "E aí? Não é legal?"
10011030-185 = "Fufu, isso aqui é... o protagonista de \"Ninja Ninpero-san\", o Ninpero-san!"
10011030-186 = "Ele é o ninja dos ninjas, que afasta os falsos ninjas e vilões do submundo!"
10011030-187 = "Ahaha, que estranho! Ah, ele tem asas. Posso puxar?"
10011030-188 = "Uwaaa!! E-essa é uma edição limitada, então manuseie com cuidado...!"
10011030-196 = "Cof, cof! ...De qualquer forma, hoje eu vou te emprestar esse Ninpero-san."
10011030-203 = "Se o Ninpero-san e nós estivermos juntos, não importa que tipo de perigo se aproxime de você, ficará tudo bem!"
10011030-204 = "Não importa o que aconteça, eu correrei para salvar a princesa!"
10011030-205 = "……Você promete?"
10011030-206 = "Claro, não importa o que aconteça, eu irei te salvar! Regra de ouro dos ninjas, número três!"
10011030-207 = "\"Um ninja sempre cumpre a promessa que fez!\""
10011030-208 = "[s] \"Que bom, Ibuki.\""
10011030-209 = "……Sim, obrigada!"
10011030-210 = "De nada!"
10011030-211 = "Ehehe..."
10011030-216 = "Ah, a luz..."
10011030-218 = "Que bom que voltou logo."
10011030-219 = "Viu só? Não foi nada demais, né?"
10011030-224 = "Desculpem a demora, estávamos resolvendo um problema... Bem, quem fará o papel da princesa, prepare-se! A apresentação vai começar em breve!"
10011030-228 = "Ibuki-dono, boa sorte!"
10011030-229 = "Vá lá, divirta-se...!"
10011030-230 = "Força!"
10011030-232 = "Sim! Irmãs ninjas, Sensei. Ibuki já vai!"
10011030-236 = "Bem, que bom que deu certo."
10011030-237 = "N-nossa, ainda bem que conseguimos resolver..."
10011030-238 = "Finalmente a apresentação vai começar!"
10011030-239 = "Sim. Espero que termine tudo bem, sem mais problemas..."
10011030-248 = "Hm? Aquelas pessoas ali... será que também são da equipe?"
10011030-253 = "[ns] \"Não, aquilo é...!\""
10011030-258 = "Decoraram o plano? Então vamos começar a agir. Avancem rápido e eliminem quem estiver no caminho... Vamos, \"Trupe Chimi, Estilo Caprichoso\"!"
10011030-260 = "““Entendido!!””"
10011030-263 = "E-espera...!? Chefe, isso é um problema, não é...!?"
10011030-264 = "Chefe, mestre, o que faremos!?"
10011030-265 = "Q-o que, o que é isso!? Por que de repente!?"
