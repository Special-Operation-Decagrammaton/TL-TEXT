[translation]
1009603-1 = "試運転"
1009603-2 = "（カンナに連絡をもらい、ウォータースライダーに向かった）"
1009603-4 = "……電源確認、水量確認。"
1009603-5 = "[s] （忙しそうだから、少し待とう……）"
1009603-6 = "プール確認、重量計確認、オールクリア。"
1009603-10 = "……先生、上がってきたのなら声をかけてください。"
1009603-11 = "[s1] \"！？\"\n[s2] \"気付いてたの……？\""
1009603-14 = "先ほどから、ずっとこちらを見ていたのにも気づいております。"
1009603-15 = "……視線を感じたので。"
1009603-16 = "ああ、いえ。謝る必要はまったく。#n気分を害したわけではありませんので。"
1009603-17 = "とりあえず、説明に移りましょう。"
1009603-18 = "この「メガスライド」は、#nパーク開場後しばらくしてから利用できるようになります。"
1009603-19 = "スライダー施設は人気なので、利用客を分散させる目的ですね。"
1009603-20 = "先ほど、検査項目の確認まで終えたところです。"
1009603-21 = "[s] \"私は何を手伝えば良いのかな……？\""
1009603-22 = "まだ最後の段階が残っています。"
1009603-23 = "それは、試運転です。"
1009603-24 = "本当にスライダーが正常に動作するのか、#n実際に利用して確かめなければなりません。"
1009603-25 = "そこで、先生に同乗してもらいたく思い、ご連絡しました。"
1009603-26 = "[s3] \"同乗ってことは……。\"\n[s4] \"カンナも一緒に乗るの？\""
1009603-29 = "はい、そうです。"
1009603-30 = "このスライダーは、#n一度に複数人で搭乗する設計になっています。"
1009603-31 = "なので私が一人で乗っても、適正体重に満たないため……。"
1009603-32 = "突然ではありますが、先生をお呼びしました。"
1009603-33 = "[s5] \"それなら喜んで協力するよ。\"\n[s6] \"みんなより先に遊べるおまけ付きだね。\""
1009603-36 = "ご協力、ありがとうございます。#nでは、準備をしますね。"
1009603-41 = "[ns7] \"ひとつ気になるんだけど。\"\n[ns8] \"質問しても良いかな？\""
1009603-44 = "はい、私に答えられるものであれば。"
1009603-45 = "……こういった乗り物にはよく乗るのか、と？"
1009603-46 = "自分から積極的には利用しませんが……。"
1009603-47 = "それがどうかしましたか？"
1009603-48 = "[s] \"この「メガスライド」、怖いって有名らしいから……。\""
1009603-49 = "ふっ、バズーカを持ったテロリストよりは怖くないですよ。"
1009603-50 = "公安局長として、何度も危険な状況に直面してきました。"
1009603-51 = "それらと比べれば、#n安全に設計されたスライダー程度、なんてことありません。"
1009603-52 = "[s9] \"すごいね、カンナは……。\"\n[s10] \"私は緊張してるのに……。\""
1009603-55 = "ふふっ。#nもし先生が悲鳴を上げても、聞かなかったふりをしますよ。"
1009603-56 = "それにスライダーの中ではお互いの顔が見えませんから、#n恥ずかしくもないはずです。"
1009603-57 = "では、準備ができたのでそろそろ行きましょうか。#nこちらに座ってください。"
1009603-59 = "（カンナと一緒に、大きな浮き輪に座った）"
1009603-61 = "持ち手をしっかり掴んでおいてくださいね。"
1009603-62 = "行きますよ、先生。"
1009603-63 = "3、2、1――！"
1009603-67 = "[ns] （噂通り、すごいスリルだ……！）"
1009603-68 = "ひ、ひっ……。"
1009603-69 = "ひやあああああぁぁっ！"
1009603-70 = "[s] \"！？\""
1009603-75 = "……。"
1009603-76 = "[s] \"……。\""
1009603-77 = "……こ、こほん。"
1009603-78 = "[s] \"カンナも怖かったんだね。\""
1009603-79 = "な、何を言っているのか、よく分かりません。"
1009603-80 = "公安局長の私が、この程度のアトラクションを怖がるなんて。"
1009603-81 = "[s] \"じゃあ、さっきの悲鳴は……？\""
1009603-82 = "わ、私には何も聞こえませんでしたが？"
1009603-83 = "水の音と聞き間違えたか、#n先生ご自身の悲鳴だったのではないでしょうか。"
1009603-84 = "大丈夫ですよ。#n内緒にしておきますので。"
1009603-85 = "[s] \"……。\""
1009603-87 = "[ns] \"じゃあ、もう一回乗る？\""
1009603-89 = "い、いえ、遠慮しておきます。#n試運転は済みましたので。"
1009603-90 = "それと、もう二度と乗ることはないでしょう。"
1009603-91 = "……絶対に。"
