[translation]
1009603-1 = "Teste"

1009603-2 = "(Recebi uma ligação de Kanna e fui para o toboágua)"

1009603-4 = "...Verifique a fonte de alimentação e o nível da água."

1009603-5 = "[s] (Parece que ele está ocupado, então vamos esperar um pouco...)"

1009603-6 = "Confirmação da piscina, confirmação da balança, tudo limpo."

1009603-10 = "...Sensei, se você vier, por favor, me avise."

1009603-11 = "[s1] \"！？\"\n[s2] \"気付いてたの……？\""
1009603-14 = "先ほどから、ずっとこちらを見ていたのにも気づいております。"
1009603-15 = "...senti alguém me observando."

1009603-16 = "Oh não. Não há necessidade de se desculpar. #nEu não queria te ofender."

1009603-17 = "Por enquanto, vamos à explicação."

1009603-18 = "Este \"Mega Slide\" estará disponível para uso algum tempo após a abertura do #n Park."

1009603-19 = "Os recursos de controle deslizante são populares, então o objetivo é dispersar o número de usuários."

1009603-20 = "先ほど、検査項目の確認まで終えたところです。"
1009603-21 = "[s] \"Em que posso ajudá-lo...?\""

1009603-22 = "Ainda falta um último passo."

1009603-23 = "É um teste."

1009603-24 = "#nVocê realmente precisa usá-lo para ver se o controle deslizante realmente funciona corretamente."

1009603-25 = "Então, eu queria que o Sensei acompanhasse o passeio, então entrei em contato com ele."

1009603-26 = "[s3] \"Então você vai andar comigo...\"\n[s4] \"Kanna vai andar com você também?\""

1009603-29 = "Sim, está certo."

1009603-30 = "Este controle deslizante foi projetado para acomodar várias pessoas ao mesmo tempo."

1009603-31 = "Então, mesmo que eu ande sozinho, ainda estou com o peso adequado..."

1009603-32 = "Embora tenha sido repentino, chamei a Senseia."

1009603-33 = "[s5] \"Nesse caso, ficarei feliz em ajudar.\"\n[s6] \"Tem o bônus de poder jogar antes de todo mundo.\""

1009603-36 = "Obrigado pela sua cooperação. #nAgora vamos nos preparar."

1009603-41 = "[ns7] \"Tenho uma pergunta.\"\n[ns8] \"Posso te fazer uma pergunta?\""

1009603-44 = "Sim, se você puder me responder."

1009603-45 = "...Você costuma andar nesses tipos de veículos?"

1009603-46 = "Eu não o uso ativamente, mas..."

1009603-47 = "O que há de errado nisso?"

1009603-48 = "[s] \"Esse \"Mega Slide\" é famoso por ser assustador... \""

1009603-49 = "Uau, isso é menos assustador do que um terrorista com uma bazuca."

1009603-50 = "Como Diretor de Segurança Pública, enfrentei muitas situações perigosas."

1009603-51 = "Comparado a eles, nada mais é do que um controle deslizante #nsafely projetado."

1009603-52 = "[s9] \"Isso é incrível, Kanna...\"\n[s10] \"Mesmo que eu esteja nervoso...\""

1009603-55 = "Hehe. #nSe a Senseia gritar, vou fingir que não ouvi."

1009603-56 = "Além disso, vocês não podem ver os rostos uns dos outros no controle deslizante, então não deve ser constrangedor."

1009603-57 = "Agora que estamos prontos, vamos lá. #nPor favor, sente-se aqui."

1009603-59 = "(Sentado em um grande anel flutuante com Kanna)"

1009603-61 = "Certifique-se de segurar a alça com firmeza."

1009603-62 = "Vamos, senhor."

1009603-63 = "3, 2, 1 ---!"

1009603-67 = "[ns] (Como dizem, é uma grande emoção...!)"

1009603-68 = "Ei, ei..."

1009603-69 = "Oláaaaaaaaaaaaa!"

1009603-70 = "[s] \"!?\""

1009603-75 = "……."

1009603-76 = "[s] \"…….\""

1009603-77 = "...Aqui, aqui vamos nós."

1009603-78 = "[s] \"Kanna também estava com medo.\""

1009603-79 = "E-eu realmente não entendo o que você está dizendo."

1009603-80 = "Como chefe do Departamento de Segurança Pública, não posso acreditar que tenha medo de uma atração deste calibre."

1009603-81 = "[s] \"Então, e aquele grito de antes...?\""

1009603-82 = "E-eu não ouvi nada?"

1009603-83 = "Talvez ele tenha ouvido mal como o som da água, ou talvez fossem os gritos do próprio Sr."

1009603-84 = "Tudo bem. #nVou manter isso em segredo."

1009603-85 = "[s] \"…….\""

1009603-87 = "[ns] \"Então, você gostaria de andar de novo?\""

1009603-89 = "Não, vou me abster de perguntar. #nA execução de teste foi concluída."

1009603-90 = "E nunca mais montarei um."

1009603-91 = "……absolutamente."

