[translation]
1008902-1 = "出番のないドレス"
1008902-2 = "（何かあったのかと心配になり、便利屋の事務所を訪れた）"
1008902-8 = "[ns1] \"……あれ、開いてる。\"\n[ns2] \"アル、入ってもいい？\""
1008902-11 = "……あれ、先生？"
1008902-16 = "どうしたの？#n何か約束でもあったかしら？"
1008902-17 = "いや、何もないはず……#nさっきカレンダーを見たばかりだもの。"
1008902-18 = "……あら、用事があって来たわけではないのね。"
1008902-19 = "……本当に？たまたま近くに寄ったから？"
1008902-20 = "い、いえ！ダメとは言ってないわ！#n私もちょうど時間ができたところよ。"
1008902-21 = "パートナーシップを深めるためには、こういうのも悪くないわね。#nそんなところに立ってないで早く入ってちょうだい、先生。"
1008902-30 = "……えっと、先生？"
1008902-31 = "本当にただ寄ってみただけなの？#n先生のことだから、理由があると思ったのだけど……"
1008902-32 = "何かあるのよね……？"
1008902-36 = "大丈夫よ、正直に話してちょうだい。#n私たちの間で、今さら気を遣う必要なんて無いわ。"
1008902-37 = "……え？"
1008902-38 = "モモトークって……？"
1008902-42 = "……あ。"
1008902-46 = "……やっぱり気を遣わせてしまったわね。"
1008902-47 = "ほ、本当に大したことはなくって……#nむしろ、こう改まって言うのは恥ずかしいというか……"
1008902-48 = "……うん？"
1008902-49 = "どうかしたの、先生？"
1008902-50 = "……ああ、アレ？"
1008902-55 = "[ns3] \"……ドレス、飾ってるんだね。\"\n[ns4] \"あれから一度も着てないの？\""
1008902-58 = "う、うーん……"
1008902-59 = "そ、そうね……"
1008902-60 = "どうしても、色々と気になっちゃって……"
1008902-65 = "実はモモトークで相談しようとしていたのは、ドレスに関する話なのよ。"
1008902-66 = "[s5] \"相談……？\"\n[s6] \"ドレスについて？\""
1008902-69 = "ええ。"
1008902-70 = "前回の依頼の時、勢いで手に入れたのは良かったのだけど……"
1008902-71 = "なかなか着るタイミングがね。"
1008902-72 = "たまに気分転換に着てみるくらいしか、使い道が無いのよ。"
1008902-73 = "はあ……"
1008902-74 = "いっそのこと、売り払って便利屋の運転資金に回した方が良いかしら？"
1008902-75 = "……結構な値段したわけだし。"
1008902-76 = "でも、本当に売っても良いものか悩んでしまって……"
1008902-77 = "そこで先生ならどうするか聞いてみたかったの。"
1008902-78 = "朝のモモトークはそれだけよ。それ以上の意味は無いわ。"
1008902-79 = "だから、心配せずとも大丈夫。"
1008902-80 = "……気分転換に着るくらいでちょうどいいって？"
1008902-81 = "たしかに、せっかくお気に入りのドレスを手に入れたわけだし……"
1008902-82 = "手放して後悔するくらいなら、今は手元に置いておいた方が良い気もしてきたわ。"
1008902-83 = "ただ、どうせなら使ってあげたいところね……"
1008902-84 = "うーん、ただ置きっぱなしになるくらいなら、やっぱり便利屋のためにもお金にした方が……"
1008902-85 = "いつまでも悩んでいたところでキリが無いことくらい、分かっているのだけど……"
1008902-86 = "……ん？"
1008902-87 = "ドレスを着て何をしたいのか、具体的なイメージはあるのかって？"
1008902-88 = "えっと、そうね……まだ何も浮かばないかしら……"
1008902-89 = "……え？"
1008902-90 = "それなら尚さら手放さない方がいいって……どうして？"
1008902-91 = "使い道が浮かばないなら、普通は……"
1008902-92 = "[s7] \"いつか必要になると思うよ。\"\n[s8] \"着るべき時は、いずれ訪れるはずだから。\""
1008902-95 = "……？？？"
1008902-96 = "え、えっと……なるほ……ど……？"
1008902-97 = "どういう意味なのか……"
1008902-98 = "分かるような……分からないような……"
1008902-102 = "……ふふっ。"
1008902-103 = "まあ、いいわ！#nとにかく先生の意見は「持っておくべき」なのね。"
1008902-107 = "参考にさせてもらうわ。#nひとまずドレスを売るのは保留にしましょう。"
1008902-108 = "……ふう！"
1008902-109 = "まだ解決されたわけじゃないのに、おかげでスッキリしたわ。"
1008902-110 = "……さすが、先生ね。"
1008902-111 = "でも、きっと先生の言葉だからかしら。"
1008902-112 = "ふふっ……"
1008902-113 = "結局こうなるのなら、モモトークで素直に聞いておくべきだったわね。"
1008902-117 = "……うーん。"
1008902-118 = "[s9] \"……アル？\"\n[s10] \"どうかしたの？\""
1008902-121 = "……いや。"
1008902-122 = "今の言葉は撤回するわ。"
1008902-123 = "やっぱり、話し合いは電話やメールよりも顔を合わせて行なうものよね？"
1008902-124 = "……ふふっ。"
1008902-125 = "だから……"
1008902-126 = "今後も何かあれば、こうやって……"
1008902-132 = "直接、話せると嬉しいわ……先生。"
