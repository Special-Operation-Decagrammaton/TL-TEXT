[translation]
1008902-1 = "Um vestido que não tem volta"

1008902-2 = "(Eu estava preocupado que algo tivesse acontecido, então fui ao escritório do faz-tudo.)"

1008902-8 = "[ns1] \"...Oh, está aberto.\"\n[ns2] \"Al, posso entrar?\""

1008902-11 = "...Huh, Sensei?"

1008902-16 = "o que aconteceu? #nHouve uma promessa?"

1008902-17 = "Não, não deveria haver nada...#nAcabei de olhar o calendário."

1008902-18 = "...Ah, acho que não vim aqui porque tinha algo para fazer."

1008902-19 = "……Realmente? Foi porque eu estava por perto?"

1008902-20 = "não! Eu não estou dizendo não! #nAcabei de encontrar tempo também."

1008902-21 = "Isso não é uma coisa ruim a se fazer para aprofundar sua parceria. #nNão fique aí parado, por favor entre rápido, Sensei."

1008902-30 = "...Hum, Sensei?"

1008902-31 = "Você realmente acabou de passar por aqui? #nAchei que tinha um motivo já que era sobre a Senseia..."

1008902-32 = "Há algo acontecendo...?"

1008902-36 = "Está tudo bem, apenas me diga a verdade. #nNão há necessidade de se preocupar entre nós agora."

1008902-37 = "……foto?"

1008902-38 = "O que é Momotalk...?"

1008902-42 = "……um."

1008902-46 = "...Eu fiz você se preocupar, afinal."

1008902-47 = "Bem, realmente não é grande coisa...#nNa verdade, tenho vergonha de dizer dessa maneira..."

1008902-48 = "……Sim?"

1008902-49 = "O que há de errado, Sensei?"

1008902-50 = "...Ah, é isso?"

1008902-55 = "[ns3] \"...O vestido está em exibição.\"\n[ns4] \"Você nunca mais o usou desde então?\""

1008902-58 = "Uh, hum..."

1008902-59 = "Ah, isso mesmo..."

1008902-60 = "Não pude deixar de ficar curioso sobre muitas coisas..."

1008902-65 = "Na verdade, o que eu estava tentando discutir no Momotalk era sobre vestidos."

1008902-66 = "[s5] \"Consulta...?\"\n[s6] \"Sobre o vestido?\""

1008902-69 = "Sim."

1008902-70 = "Estou feliz por ter conseguido no último pedido, mas..."

1008902-71 = "É uma boa hora para usá-lo."

1008902-72 = "O único uso que tenho para ele é usá-lo ocasionalmente para uma mudança de ritmo."

1008902-73 = "Suspirar..."

1008902-74 = "Não seria melhor vendê-lo e usá-lo como capital de giro para um faz-tudo?"

1008902-75 = "...Custou muito dinheiro."

1008902-76 = "Mas fiquei pensando se realmente valia a pena vender..."

1008902-77 = "Então eu queria perguntar o que um Sensei faria."

1008902-78 = "Isso é tudo que há no Momo Talk pela manhã. Não há significado além disso."

1008902-79 = "Portanto, não há necessidade de se preocupar."

1008902-80 = "...É suficiente usá-lo para uma mudança de ritmo?"

1008902-81 = "É verdade que finalmente consegui meu vestido favorito..."

1008902-82 = "Eu sinto que é melhor mantê-lo do que se arrepender de deixá-lo ir."

1008902-83 = "No entanto, eu gostaria de usá-lo de qualquer maneira ..."

1008902-84 = "Hmm, prefiro gastar dinheiro com um faz-tudo do que simplesmente deixá-lo aí..."

1008902-85 = "Tudo o que sei é que não há fim para se preocupar com isso para sempre..."

1008902-86 = "……sim?"

1008902-87 = "Você tem uma imagem específica do que quer fazer com o vestido?"

1008902-88 = "Bem, eu acho... acho que nada me vem à mente ainda..."

1008902-89 = "……foto?"

1008902-90 = "Se for esse o caso, é melhor não deixar passar...por quê?"

1008902-91 = "Se você não consegue pensar em um uso para isso, geralmente..."

1008902-92 = "[s7] \"Acho que um dia vou precisar dele.\"\n[s8] \"Chegará o momento em que precisarei usá-lo.\""

1008902-95 = "...? ? ?"

1008902-96 = "Ah, hum... entendo... O que...?"

1008902-97 = "O que isso significa..."

1008902-98 = "Sinto que entendo... sinto que não entendo..."

1008902-102 = "...Hehe."

1008902-103 = "Bem, tudo bem! #nDe qualquer forma, a opinião do Sensei é algo que você deveria ter."

1008902-107 = "Vou usá-lo como referência. #nVamos adiar a venda do vestido por enquanto."

1008902-108 = "... Uau!"

1008902-109 = "Ainda não está resolvido, mas me sinto revigorado."

1008902-110 = "...Como esperado de você, Sensei."

1008902-111 = "Mas talvez sejam apenas as palavras do Sensei."

1008902-112 = "Hehe..."

1008902-113 = "Se fosse acabar assim, eu deveria ter ouvido no Momotalk."

1008902-117 = "...Hum."

1008902-118 = "[s9] \"...Al?\"\n[s10] \"O que há de errado?\""

1008902-121 = "……não."

1008902-122 = "Retiro o que acabei de dizer."

1008902-123 = "Afinal, as discussões devem ser realizadas pessoalmente e não por telefone ou e-mail, certo?"

1008902-124 = "...Hehe."

1008902-125 = "é por isso……"

1008902-126 = "Se alguma coisa acontecer no futuro, por favor, faça isso..."

1008902-132 = "Eu ficaria feliz se pudesse falar diretamente com você... Sensei."

