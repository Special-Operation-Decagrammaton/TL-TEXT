[translation]
1600303-1 = "目が眩むほどに輝いて"
1600303-2 = "こんにちは、先生。こちらです。"
1600303-3 = "今日のエスコートの目的地はどこですか？"
1600303-5 = "……なるほど、承知しました。"
1600303-6 = "なかなか距離がありますね、ですがご心配なく。私が責任を持って最後まで安全に……"
1600303-7 = "……！"
1600303-8 = "[s] \"……スズミ？\""
1600303-9 = "先生こちらへ！！車の後ろに！"
1600303-10 = "閃光弾、投擲します！！"
1600303-12 = "バンッッ！！キイイイイィィィィィン――"
1600303-13 = "きゃああぁっ！？な、なに！？目が……！目が見えない！"
1600303-14 = "何だっ……！？ぐぅっ……！"
1600303-15 = "い、いったい何なの！？"
1600303-16 = "距離を取りましょう、こちらへ！！"
1600303-19 = "……ふう、とりあえず危険な位置は脱しました。"
1600303-20 = "まさかこんな日中からあんな形で先生を狙うとは……大胆不敵ですね。"
1600303-21 = "え、普通の生徒に見えた……？いえ、そんなことはありません。"
1600303-22 = "あの生徒たち、スマホを胸の高さまで持ち上げていました。"
1600303-23 = "角度のことも鑑みて、きっと先生の写真を撮って上層部に送ろうとしていたに違いありません。"
1600303-24 = "[s1] \"そうは見えなかったけど……。\"\n[s2] \"本当に……？\""
1600303-25 = "もちろん絶対というわけではありませんが、可能性は十分にあります。"
1600303-26 = "もちろん絶対というわけではありませんが、可能性は十分にあります。"
1600303-27 = "先生は良い人なのですね。ですが任務・戦闘の基本は、まず疑ってかかることです。"
1600303-28 = "今は先生をエスコートしながら目的地を目指すという任務中ですから。"
1600303-30 = "……っ！！あそこにまた怪しい人物が！"
1600303-31 = "閃光弾、投擲！！"
1600303-33 = "バンッッ！！キイイイイィィィィィン――"
1600303-34 = "うわあっ！！なんだ！？"
1600303-35 = "ぐっ！！目が……！！"
1600303-36 = "やはり人が多いところは危険……！もう少し場所を移しましょう！"
1600303-37 = "先生、こちらへ！"
1600303-40 = "はあ、はあ……。"
1600303-41 = "大丈夫ですか、先生？ここなら安全です。"
1600303-42 = "人通りも少ないですし、誰かが来てもすぐに視界に入ります。"
1600303-43 = "襲われても制圧しやすいですし、悪くない場所です。"
1600303-44 = "……？ここまでしなくても大丈夫……ですか？"
1600303-45 = "そんなことはありません。今日は、何があっても先生を無事にエスコートしなくてはいけませんので。"
1600303-46 = "もしも先生に何があったら、それは全面的に私の責任です……そんなことは決して許されません。"
1600303-47 = "ところでどうしてそんなに……。"
1600303-48 = "……えっと、もしかして今日の私、気を張りすぎでしょうか？"
1600303-49 = "[s3] \"ありがたいけど、もうちょっと肩の力抜いて。\"\n[s4] \"一緒にお散歩するぐらいの気持ちでいてもらえれば。\""
1600303-50 = "そ、それはそれで逆に緊張してしまうのですが……。"
1600303-51 = "そ、それはそれで逆に緊張してしまうのですが……。"
1600303-52 = "……でも、ありがとうございます。はい、では少し深呼吸をして……。"
1600303-53 = "この道を真っすぐに行けば着くはずです、行きましょう。"
1600303-55 = "[s] （スズミについて行く）"
1600303-58 = "……到着しましたね。何事も無くて良かったです。"
1600303-59 = "先生の言う通り、序盤は緊張しすぎていたかもしれません。"
1600303-60 = "……もしかして私、先生の邪魔をしてしまいましたか？普通に行くより、ずっと時間がかかってしまったような……。"
1600303-61 = "え、もともと織り込み済みの時間だから大丈夫……？"
1600303-62 = "……ただ一緒に歩きたかっただけだから？"
1600303-63 = "せ、先生！？こ、これは自警団の護衛であって、決してデートというわけではなく、その……！"
1600303-64 = "い、いえ、もちろん呼んでほしくないというわけではないのですが……！"
1600303-65 = "最初からそう言っていただければ私もそのつもりで……！"
1600303-66 = "じゃなくて！とにかくこういうのは良くありません！"
1600303-67 = "……。"
1600303-68 = "……えっと。"
1600303-69 = "ですが、また呼んでいただけると、嬉しいです。"
1600303-70 = "護衛としてのエスコートではなく、ただのご同行であれば、私もそういう風にお付き合いいたしますので……。"
1600303-71 = "その時はきっと……今より、もう少し上手くできると思いますから。"
1600303-72 = "……はい、ありがとうございます。"
1600303-73 = "そ、それでは今日はこれで……！"
1600303-76 = "（そうやって、スズミは素早くどこかへ消えていってしまった）"
1600303-77 = "（その後ろ姿は、前と同じでどこかぎこちなかった）"
