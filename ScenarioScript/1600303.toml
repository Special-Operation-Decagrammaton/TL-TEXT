[translation]
1600303-1 = "Brilhante a ponto de ofuscar a visão"
1600303-2 = "Olá, Sensei. Por aqui."
1600303-3 = "Qual é o destino da escolta de hoje?"
1600303-5 = "……Entendo, compreendido."
1600303-6 = "É uma distância considerável, mas não se preocupe. Eu assumirei a responsabilidade de levá-lo em segurança até o fim……"
1600303-7 = "……！"
1600303-8 = "[s] \"……Suzumi?\""
1600303-9 = "Sensei, por aqui!! Atrás do carro!"
1600303-10 = "Lançando granada de luz!!"
1600303-12 = "BUM!! ZIIIIIIIIIIIIIIIIIIIN――"
1600303-13 = "Aaaahhh!? O, o que foi!? Meus olhos……! Não consigo ver nada!"
1600303-14 = "O que foi isso……!? Argh……!"
1600303-15 = "O, o que diabos é isso!?"
1600303-16 = "Vamos nos afastar, por aqui!!"
1600303-19 = "……Ufa, pelo menos saímos da zona de perigo."
1600303-20 = "Quem diria que tentariam atacar o Sensei em plena luz do dia dessa forma…… Que audácia."
1600303-21 = "Ah, pareciam alunas comuns……? Não, não é o caso."
1600303-22 = "Aquelas alunas estavam segurando seus celulares na altura do peito."
1600303-23 = "Considerando o ângulo, com certeza elas estavam tentando tirar fotos do Sensei para enviar aos superiores."
1600303-24 = "[s1] \"Não me pareceu que fosse isso…….\"\n[s2] \"Sério mesmo……?\""
1600303-25 = "Claro, não é uma certeza absoluta, mas há uma grande possibilidade."
1600303-26 = "Claro, não é uma certeza absoluta, mas há uma grande possibilidade."
1600303-27 = "O Sensei é uma pessoa bondosa. Mas o básico de uma missão ou combate é sempre desconfiar de tudo."
1600303-28 = "Afinal, estou em uma missão para escoltar o Sensei até o destino."
1600303-30 = "……!! Ali, outra pessoa suspeita!"
1600303-31 = "Granada de luz, lançar!!"
1600303-33 = "BUM!! ZIIIIIIIIIIIIIIIIIIIN――"
1600303-34 = "Uaaah!! O que foi isso!?"
1600303-35 = "Argh!! Meus olhos……!!"
1600303-36 = "Como eu pensei, lugares com muita gente são perigosos……! Vamos mudar de lugar!"
1600303-37 = "Sensei, por aqui!"
1600303-40 = "Haa, haa……."
1600303-41 = "Está bem, Sensei? Aqui é seguro."
1600303-42 = "O movimento de pessoas é baixo e, se alguém se aproximar, veremos imediatamente."
1600303-43 = "É fácil de controlar caso sejamos atacados, não é um lugar ruim."
1600303-44 = "……? Não precisava ir tão longe…… ou precisava?"
1600303-45 = "Não é isso. Hoje, não importa o que aconteça, preciso escoltar o Sensei em segurança."
1600303-46 = "Se algo acontecesse com o Sensei, a responsabilidade seria inteiramente minha…… isso é algo que jamais permitirei."
1600303-47 = "A propósito, por que está tão……."
1600303-48 = "……Ah, será que estou tensa demais hoje?"
1600303-49 = "[s3] \"Eu agradeço, mas tente relaxar um pouco.\"\n[s4] \"Tente levar como se estivéssemos apenas dando um passeio.\""
1600303-50 = "I, isso me deixaria ainda mais nervosa, na verdade……."
1600303-51 = "I, isso me deixaria ainda mais nervosa, na verdade……."
1600303-52 = "……Mas, obrigada. Certo, vou respirar fundo……."
1600303-53 = "Se seguirmos reto por este caminho, chegaremos lá. Vamos."
1600303-55 = "[s] (Seguir Suzumi)"
1600303-58 = "……Chegamos. Fico feliz que nada tenha acontecido."
1600303-59 = "Como o Sensei disse, talvez eu estivesse tensa demais no início."
1600303-60 = "……Será que eu atrapalhei o Sensei? Parece que demoramos muito mais do que se tivéssemos ido normalmente……."
1600303-61 = "Ah, esse tempo já estava previsto, então está tudo bem……?"
1600303-62 = "……só queria caminhar com você, só isso?"
1600303-63 = "P-Sensei!? I-isso é uma escolta do Esquadrão de Vigilância, de forma alguma é um encontro, e, bem...!"
1600303-64 = "N-não, é claro que não é que eu não queira que você me chame...!"
1600303-65 = "Se tivesse dito isso desde o início, eu teria me preparado para isso...!"
1600303-66 = "Não, não é isso! De qualquer forma, esse tipo de coisa não é bom!"
1600303-67 = "……."
1600303-68 = "……Bem."
1600303-69 = "Mas, eu ficaria feliz se você me chamasse de novo."
1600303-70 = "Se não for uma escolta de proteção, mas apenas um acompanhamento, eu ficarei feliz em te fazer companhia dessa forma..."
1600303-71 = "Tenho certeza de que, da próxima vez... serei capaz de fazer um trabalho melhor do que hoje."
1600303-72 = "……Sim, obrigada."
1600303-73 = "B-bem, então por hoje é só...!"
1600303-76 = "（Dito isso, Suzumi desapareceu rapidamente para algum lugar）"
1600303-77 = "（Suas costas, enquanto se afastava, pareciam tão desajeitadas quanto antes）"
