[translation]
90001010-1 = "第1話;再び、氷河にて"
90001010-3 = "現地はどうなっていますか？"
90001010-8 = "偵察していますが、大きな変化はありません。"
90001010-9 = "たまーにデカグラマトンの眷属がいるくらいかな。#nこっち見ても攻撃してこない。"
90001010-11 = "5番目の預言者「ゲブラ」の情報を収集するために留まりましたが……。"
90001010-12 = "ここまで収穫がないと、時間を無駄にしているだけな気がしてきますね……。"
90001010-13 = "それに……ここは私のような超天才清楚系病弱クールビューティー美少女には過酷すぎる環境だと思いませんか？"
90001010-14 = "なんか増えてない？#nクールビューティー……？"
90001010-15 = "ええ、クールビューティーです。#nエイミは私の評価を見直したほうが良いと思いますよ？"
90001010-16 = "そうですね。真実がどうであれ、高い自己肯定感を持つのは大事です。"
90001010-17 = "……あなた、一言多いと言われたりしませんか？"
90001010-18 = "さすがヒマリ部長、素晴らしい洞察力です。#nよく言われます。なぜかは分かりませんが。"
90001010-20 = "先生、どうしましょう。病弱天才美少女の手にはエイミでさえも余ってしまうというのに……。"
90001010-21 = "[s] \"トキに悪気はないんじゃないかな……。\""
90001010-22 = "悪気がないのが問題なんです。"
90001010-23 = "はぁ……ゲブラの情報収集を続けましょうか。"
90001010-24 = "その件で一つ、ご報告が……。"
90001010-25 = "報告というよりは、私の感覚なのですが……お伝えしたいことがあります。"
90001010-26 = "あら、トキがそこまで言うのは珍しいですね。"
90001010-27 = "どうしたのですか？"
90001010-28 = "はい。ゲブラの――正確には、その戦闘の感想を。"
90001010-29 = "ゲブラは、本格的な交戦――いわゆる「正面衝突」を避けようとしていました。"
90001010-30 = "それは私も思った。何か別の目的があるような感じ。"
90001010-31 = "なるほど。つまり、ゲブラが――"
90001010-32 = "他のデカグラマトンの預言者とは違う意図で動いているのではないか、と？"
90001010-33 = "はい。"
90001010-34 = "気になりますね……実際に戦ったトキやエイミがそう言うのでしたら、可能性は高そうです。"
90001010-35 = "どちらにせよ、私たちのやることは変わりませんが。"
90001010-36 = "[s] \"ゲブラの痕跡を追跡するんだよね？\""
90001010-37 = "ええ。ゲブラに別の目的があるのなら、それを解明するのが私たち特異現象捜査部の仕事ですから。"
90001010-38 = "それでは、皆さん――"
90001010-46 = "――敵襲です。"
90001010-47 = "これは新しいパターンだね。#n部長、攻撃されてる。"
90001010-49 = "今まで攻撃を仕掛けてこなかったデカグラマトンの眷属が、突然襲ってきた……。"
90001010-50 = "交戦プロセスに変化が……？#n指揮系統が変わったのか、それとも……。"
90001010-51 = "ゲブラの痕跡を追っている私たちを明確に敵と認定した？"
90001010-52 = "でも、ゲブラの信号は途絶えたままだよ。反応なし。"
90001010-53 = "ええ、それはこちらも同じです。#nでは、これは一体……？"
90001010-54 = "分析や考察は後ほど。#nコールサイン04、交戦を開始します。"
