[translation]
90001010-1 = "Episódio 1: Novamente, na geleira"
90001010-3 = "Como estão as coisas por aí?"
90001010-8 = "Estamos fazendo o reconhecimento, mas não houve grandes mudanças."
90001010-9 = "Só tem um ou outro seguidor do Decagrammaton de vez em quando.#nEles não atacam nem quando olham para cá."
90001010-11 = "Ficamos aqui para coletar informações sobre o 5º Profeta, 'Geburah', mas..."
90001010-12 = "Sem nenhum resultado até agora, sinto que estamos apenas desperdiçando tempo..."
90001010-13 = "Além disso... você não acha que este ambiente é cruel demais para uma supergênia, pura, doente e bela garota como eu?"
90001010-14 = "Não tem coisa demais aí?#nBela garota...?"
90001010-15 = "Sim, bela garota. Acho que você deveria rever seus conceitos sobre mim, Eimi."
90001010-16 = "É verdade. Independentemente da verdade, é importante ter uma autoestima elevada."
90001010-17 = "...Você já ouviu dizerem que fala demais?"
90001010-18 = "Como esperado da Chefe Himari, que percepção incrível.#nOuço isso com frequência. Não sei bem o porquê."
90001010-20 = "Sensei, o que faremos? Mesmo com uma gênia doente e bela garota, até a Eimi acaba sendo demais para lidar..."
90001010-21 = "[s] \"Acho que a Toki não faz por mal...\""
90001010-22 = "O problema é justamente não fazer por mal."
90001010-23 = "Haa... vamos continuar coletando informações sobre Geburah."
90001010-24 = "Sobre isso, tenho um relatório..."
90001010-25 = "Mais do que um relatório, é uma sensação minha... algo que gostaria de compartilhar."
90001010-26 = "Ora, é raro a Toki dizer algo assim."
90001010-27 = "O que houve?"
90001010-28 = "Sim. Sobre Geburah... ou melhor, sobre a impressão que tive do combate."
90001010-29 = "Geburah estava tentando evitar um confronto direto — o chamado 'embate frontal'."
90001010-30 = "Eu também pensei nisso. Parece que há algum outro objetivo."
90001010-31 = "Entendo. Ou seja, Geburah está..."
90001010-32 = "Agindo com intenções diferentes dos outros profetas do Decagrammaton?"
90001010-33 = "Sim."
90001010-34 = "Isso é intrigante... Se a Toki e a Eimi, que lutaram contra ele, dizem isso, as chances são altas."
90001010-35 = "De qualquer forma, o que temos que fazer não muda."
90001010-36 = "[s] \"Vamos continuar rastreando os vestígios de Geburah, certo?\""
90001010-37 = "Sim. Se Geburah tem outro objetivo, é nosso trabalho no Departamento de Investigação de Fenômenos Estranhos descobrir qual é."
90001010-38 = "Então, pessoal..."
90001010-46 = "— Ataque inimigo."
90001010-47 = "Esse é um padrão novo.#nChefe, estamos sendo atacadas."
90001010-49 = "Os seguidores do Decagrammaton, que nunca atacavam antes, de repente nos atacaram..."
90001010-50 = "Mudanças no processo de combate...?#nSerá que o sistema de comando mudou, ou então..."
90001010-51 = "Eles nos identificaram claramente como inimigos por estarmos rastreando Geburah?"
90001010-52 = "Mas o sinal de Geburah continua interrompido. Sem resposta."
90001010-53 = "Sim, aqui também. Então, o que é isso...?"
90001010-54 = "Análises e reflexões depois.#nCallsign 04, iniciando combate."
