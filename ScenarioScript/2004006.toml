[translation]
2004006-1 = "Kyogoku Satsuki está resistindo."
2004006-2 = "（Ela foi apressada para o Pandemonium）"
2004006-9 = "Ah, Sensei do Schale... o que o traz aqui?"
2004006-13 = "Sobre a conselheira Satsuki..."
2004006-14 = "Ah, bem..."
2004006-15 = "[s] \"Aconteceu alguma coisa?\""
2004006-16 = "Bem..."
2004006-20 = "[ns] \"Quer dizer...\""
2004006-22 = "[ns] \"Ela está se escondendo no quarto porque não quer tomar a vacina?\""
2004006-23 = "Sim... bem, isso acontece de vez em quando..."
2004006-28 = "Conselheira Satsuki! Conselheira Satsuki~!"
2004006-29 = "Só falta a senhora, conselheira!"
2004006-30 = "Não dói nada, então saia logo, vamos!"
2004006-31 = "Isso é mentira! Não existe vacina que não doa!#nEsqueça que eu existo e vá embora!"
2004006-32 = "Mas essa vacinação é obrigatória para todos os alunos de Gehenna!"
2004006-33 = "Não venha reclamar depois se ficar de cama com o nariz escorrendo!"
2004006-34 = "Isso não vai acontecer!#nEu nunca peguei um resfriado na vida!"
2004006-35 = "Isso é porque você..."
2004006-36 = "Ah, bem, de qualquer forma!#nNão é esse o problema!"
2004006-42 = "Como pode ver..."
2004006-43 = "[s] \"Que situação difícil...\""
2004006-46 = "[ns] \"Ei, será que eu posso tentar falar com ela?\""
2004006-47 = "Ah, Sensei."
2004006-48 = "É verdade. Talvez ela escute se for o Sensei..."
2004006-49 = "Desculpe o incômodo, mas agradeço a ajuda."
2004006-54 = "[ns] \"Satsuki, olá.\""
2004006-56 = "Sensei...? É você mesmo?"
2004006-57 = "Não... o Sensei não deveria estar aqui."
2004006-58 = "Hmph... que imitação barata. #nNão vou cair nesse truque. Eu sou a chefe do Departamento de Informações, especialista em psicologia..."
2004006-59 = "[s] \"Sou eu, o Sensei de verdade. Pode abrir a porta, por favor?\""
2004006-60 = "..."
2004006-61 = "É você mesmo, Sensei?"
2004006-66 = "Sensei!? Por que você está aqui..."
2004006-67 = "Ah, um MomoTalk?"
2004006-68 = "Ufufu, então você percebeu meu pedido de resgate de emergência."
2004006-69 = "É exatamente como eu enviei. Estou enfrentando uma crise sem precedentes que ocorre periodicamente..."
2004006-70 = "Vamos, me tire daqui logo."
2004006-71 = "[s] \"Você não quer tomar a vacina?\""
2004006-72 = "Sim! Eu não quero!! Odeio muito!!"
2004006-73 = "Eu odeio dor! E injeções são o pior de tudo!!"
2004006-74 = "Aquela agulha fina e afiada perfurando minha pele delicada de forma tão bruta, aquela sensação..."
2004006-75 = "E aquele líquido desconhecido sendo injetado na minha corrente sanguínea pelo cilindro...#nAquela dor e pressão são insuportáveis..."
2004006-76 = "[s1] \"Essa descrição realmente faz parecer muito doloroso!!\"\n[s2] \"Vai acabar rápido, aguenta só um pouquinho?\""
2004006-79 = "...Sensei. Não é algo tão simples assim."
2004006-80 = "Será que o Sensei conseguiria suportar essa dor?"
2004006-81 = "Não é só a dor física. #nO terror psicológico de ver aquela agulha se aproximando... você conseguiria aguentar?"
2004006-82 = "Quando passam aquele algodão gelado com álcool na pele, é como se estivessem anunciando o fim da minha vida, você entende a sensação de gelar a alma que isso causa?"
2004006-83 = "[s3] \"As outras já terminaram, não é?\"\n[s4] \"Todas, menos você, já tomaram, certo? Até a Ibuki.\""
2004006-86 = "Tsc... b-bem, é verdade."
2004006-90 = "O que foi? Por que está me olhando assim!"
2004006-91 = "De jeito nenhum, eu não quero! Como aluna, eu exerço meu direito de recusa!"
2004006-92 = "Não existe nada disso aqui, sabia!?"
2004006-93 = "Não basta eu escrever que a vacinação foi concluída no formulário? Assim, ninguém sai ferido."
2004006-94 = "Eu já disse que não dá! Não posso escrever mentiras!"
2004006-95 = "[s] \"A propósito, sobrou alguma dose dessa vacina?\""
2004006-96 = "Ah, sim. Se for só um pouco..."
2004006-97 = "[s] \"Então, Satsuki, por que não tomamos juntos?\""
2004006-98 = "Hã...?"
2004006-99 = "[s] \"Pensei que eu poderia ser útil enquanto você toma a injeção.\""
2004006-100 = "Sensei... você não tem medo de injeção? Dói muito, sabia?"
2004006-101 = "[s5] \"Bem, certamente... deve doer...\"\n[s6] \"Mas se estivermos juntos, talvez não seja tão assustador, não é?\""
2004006-104 = "O Sensei chegou a esse ponto por você, sabia? Se fosse eu, já teria tomado sem reclamar."
2004006-105 = "Cala a boca! Estou pensando agora..."
2004006-106 = "......"
2004006-107 = "...Os dois ao mesmo tempo?"
2004006-108 = "[s] \"Sim, ao mesmo tempo.\""
2004006-110 = "...Ugh."
2004006-112 = "Está bem, eu entendi."
2004006-113 = "Eu vou tomar a vacina..."
2004006-114 = "[s] \"Sim, obrigado.\""
2004006-118 = "(Satsuki ficou tremendo o tempo todo, mas conseguiu aguentar até o fim.)"
