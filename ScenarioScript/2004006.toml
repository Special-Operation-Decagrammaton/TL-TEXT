[translation]
2004006-1 = "京極サツキは耐えている"
2004006-2 = "（急いで万魔殿に向かった）"
2004006-9 = "あ、シャーレの先生……どのようなご用件でしょうか？"
2004006-13 = "サツキ議員でしたら……"
2004006-14 = "あ、えっと……"
2004006-15 = "[s] \"何かあったの？\""
2004006-16 = "えっと……"
2004006-20 = "[ns] \"つまり……\""
2004006-22 = "[ns] \"予防接種の注射が嫌で、部屋に閉じこもってるの？\""
2004006-23 = "はい……まあ、時々あるんですが……"
2004006-28 = "サツキ議員！サツキ議員～！"
2004006-29 = "あとはサツキ議員だけですよ！？"
2004006-30 = "痛くないですから、早く出てきてください、ほら！！"
2004006-31 = "そんなの嘘よ！痛くない注射なんてないわ！#n私のことはいいからもう行ってちょうだい！"
2004006-32 = "だから、この予防接種はゲヘナ生みんな受けなければならないんです！"
2004006-33 = "鼻水だらだらになって寝込んでも知りませんよ！？"
2004006-34 = "そんなものならないわ！#n風邪なんて引いたことないもの！"
2004006-35 = "それはあなたが……"
2004006-36 = "あ、えっと、とにかく！#nそういう問題じゃありません！"
2004006-42 = "ご覧の通りでして……。"
2004006-43 = "[s] \"大変だね……。\""
2004006-46 = "[ns] \"あの、私から話してみてもいいかな？\""
2004006-47 = "あ、先生。"
2004006-48 = "そうですね。先生の言う事なら聞いてくれるかもしれませんし……。"
2004006-49 = "すみませんが、よろしくお願いします。"
2004006-54 = "[ns] \"サツキ、こんにちは。\""
2004006-56 = "先生……？本物？"
2004006-57 = "いいえ……ここに先生がいるはずないわ。"
2004006-58 = "ふふっ……なかなかモノマネが上手じゃないの。#nこんな手口になんか騙されないわ。私は心理に精通している情報部の部長……"
2004006-59 = "[s] \"本物の先生だよ。よかったら開けてくれないかな？\""
2004006-60 = "……。"
2004006-61 = "本当に先生なの？"
2004006-66 = "先生！？どうしてこんなところに……"
2004006-67 = "あ、モモトーク？"
2004006-68 = "うふふっ、私の緊急救助要請に気づいたのね。"
2004006-69 = "送った通りよ。いま私は定期的に訪れる未曾有の危機に瀕しているの……"
2004006-70 = "さあ、早く私をここから連れ出しなさい。"
2004006-71 = "[s] \"注射が嫌なの？\""
2004006-72 = "ええ！嫌だわ！！すっごくイヤ！！"
2004006-73 = "痛いのは嫌いだもの！特に注射なんて最悪！！"
2004006-74 = "細くて鋭い針が、私の可憐な肌を荒々しく突き破ってくる、あの感覚……"
2004006-75 = "シリンダーから得体の知れない薬物が私の血管に流れ込んで……#nあの痛みとプレッシャーときたらもう……。"
2004006-76 = "[s1] \"たしかにその表現はすごく痛そうだけど！！\"\n[s2] \"すぐ終わるから、ちょっとだけ我慢しよう？\""
2004006-79 = "……先生。そんな簡単な話じゃないの。"
2004006-80 = "先生はあの痛みに耐えられるのかしら？"
2004006-81 = "肉体的苦痛だけじゃないのよ。#n心理的に、あの針が近づいてくる時の恐怖……耐えられるの？"
2004006-82 = "アルコールの冷たい綿で肌を拭かれる時、まるで人生の最期を告げられるような、あの身も凍る感覚に耐えられるのかって、聞いてるのよ！"
2004006-83 = "[s3] \"他の子はもう終わったんでしょう？\"\n[s4] \"サツキ以外みんな終わったんだよね？イブキも。\""
2004006-86 = "っ……そ、そうだけど。"
2004006-90 = "何よ、その顔は！"
2004006-91 = "とにかく私はイヤよ！生徒として、拒否権を行使するわ！"
2004006-92 = "そんなものありませんからね！？"
2004006-93 = "その用紙に私も接種完了って書いちゃえばいいだけでしょ？#nそれで誰も傷つかずに済むじゃない。"
2004006-94 = "だから無理ですって！ウソは書けません！"
2004006-95 = "[s] \"ちなみに、その予防注射の余分はあるかな？\""
2004006-96 = "あ、はい。少しなら……。"
2004006-97 = "[s] \"じゃあサツキ、私と一緒に打たない？\""
2004006-98 = "え……？"
2004006-99 = "[s] \"サツキが注射を打たれる間、役に立てるかもって思って。\""
2004006-100 = "先生……注射が怖くないの？#nすっごく痛いのよ？"
2004006-101 = "[s5] \"まあたしかに……痛いだろうね……。\"\n[s6] \"でも二人一緒なら、あまり怖くないかも？\""
2004006-104 = "先生がここまで言ってくれてるんですよ？#n私ならおとなしく打たれますけど。"
2004006-105 = "うるさいわね！今考えてるわよ……。"
2004006-106 = "……。"
2004006-107 = "……二人同時に？"
2004006-108 = "[s] \"うん、同時に。\""
2004006-110 = "……ううっ。"
2004006-112 = "分かったわよ。"
2004006-113 = "予防接種、受けるわ……。"
2004006-114 = "[s] \"うん、ありがとう。\""
2004006-118 = "（サツキはずっと震えていたが、なんとか最後まで耐えることができたのだった）"
