[translation]
1300606-1 = "誰かからの特別な依頼"
1300606-2 = "やっほー、先生！こっちこっち～。"
1300606-3 = "[s] \"変な依頼って、どんなの？\""
1300606-4 = "あははっ、それがさあ、すっごい変っていうか～。"
1300606-5 = "何て言えばいいんだろ、うーん……。"
1300606-6 = "どうしても先生に手伝ってほしい依頼って感じ？"
1300606-7 = "[s1] \"ムツキがすっごい変って言うほどの依頼って一体……。\"\n[s2] \"ムツキが手伝ってって言うほどの依頼って一体……。\""
1300606-8 = "くふふっ。さあ、どうでしょう～？"
1300606-9 = "くふふっ。さあ、どうでしょう～？"
1300606-10 = "ほらほら、こんなに生徒が困ってるんだから、先生としてはもちろん放っておけないよね？付き合ってあげるしかないよね？"
1300606-11 = "[s] \"ところで便利屋の依頼なのに、どうしてムツキ一人で……。\""
1300606-14 = "付　き　合　っ　て　く　れ　る　よ　ね　？"
1300606-15 = "ね　？\n"
1300606-16 = "まあ先生だってわざわざここまで来てくれたんだし、そもそも最初から先生に拒否権はないんだけど～！"
1300606-17 = "[s3] \"……拒否権、ないんだ。\"\n[s4] \"まあ、仕方ないかな……。\""
1300606-18 = "あははっ、うん！でもどう転んでもきっと、先生は助けてくれたでしょ？"
1300606-19 = "あははっ、うん！でもどう転んでもきっと、先生は助けてくれたでしょ？"
1300606-20 = "[s] \"うーん……ところで依頼って、何からすれば良いの？\""
1300606-21 = "この依頼書の中にやることがリストで書かれてるから、その通りにやろっか？"
1300606-22 = "[s] \"そっか、ちょっと見せてくれる？\""
1300606-25 = "あはっ、それはダメかな～！"
1300606-26 = "顧客の個人情報は大事でしょ～？"
1300606-27 = "いくら先生とは言っても、これは簡単には見せられないなぁ。"
1300606-28 = "[s] \"さすが……ムツキもプロなんだね。\""
1300606-29 = "くふふっ。そうそう、こう見えてもプロだも～ん。"
1300606-30 = "それじゃあお待ちかね、1つ目の依頼ね。ふむふむ……。"
1300606-31 = "その内容は～……。"
1300606-33 = "自家製デザートのお店・アマッタルィ"
1300606-34 = "[ns] \"……本当に、そういう依頼なの？\""
1300606-35 = "うん！依頼の内容によると、「このお店で売ってる全てのクレープを食べた後……」"
1300606-36 = "「その中でナンバーワンの、『最高』のクレープを選んでください」だって！"
1300606-37 = "[s5] \"最高のクレープ……！\"\n[s6] \"メニュー、10種類以上あるけど……？\""
1300606-38 = "あはっ。ナンバーワンを決めるのは大事だからね～。問題は予算だけど……。"
1300606-39 = "うーん。まっ、大丈夫かな？"
1300606-40 = "大丈夫大丈夫、全部食べられるよ。それに……。"
1300606-41 = "お金については、先生に経費として処理してもらえばいいもんね～～♪"
1300606-42 = "[s] \"えっ……。\""
1300606-43 = "ん～？生徒のお願いなんだから、もちろん聞いてくれるよね？先生～？"
1300606-44 = "大切な生徒が依頼を解決しようと、こ～んなに頑張ってるんだから。"
1300606-45 = "もしかして……。"
1300606-46 = "ダメ、なの……？"
1300606-48 = "[s] \"くっ……！お、大人の財布を甘く見ないで！\""
1300606-49 = "あはははっ！ありがとっ、先生！"
1300606-51 = "はむっ、ん～♪やっぱりイチゴは美味し～！"
1300606-52 = "もぐもぐ、バナナも優しい甘さでさいこ～！"
1300606-53 = "先生はどう？"
1300606-54 = "[s7] \"イチゴ、バナナ、チョコ……クレープがこんなに……。\"\n[s8] \"口の中が甘さだらけで、甘さのゲシュタルト崩壊が……。\""
1300606-55 = "くふふっ、先生頑張って！もうそんなに残ってないよ！ファイト～！"
1300606-56 = "くふふっ、先生頑張って！もうそんなに残ってないよ！ファイト～！"
1300606-57 = "[s] \"う、うん……！\""
1300606-59 = "（そうして、ムツキと一緒に大量のクレープを食べ尽くした）"
1300606-61 = "あははっ、最高のクレープか～。う～ん、やっぱりそんな簡単に決められないかもね～？"
1300606-62 = "[s] \"うぅ……まだ口の中が甘い……。\""
1300606-63 = "まっ、それは一旦置いといて～。次の依頼に行こっか！"
1300606-64 = "[s] \"次の依頼、この遊園地に関係してるの？\""
1300606-65 = "2つ目の依頼も簡単だよ～。"
1300606-66 = "えっとね……。"
1300606-67 = "「この遊園地にあるメリーゴーランドの中で、どの馬が一番速いのかを調査してほしい」、だって！"
1300606-68 = "[ns9] \"……メリーゴーランド？\"\n[ns10] \"……一番速い馬？\""
1300606-73 = "[ns] \"それ……速さの違い、あるのかな？\""
1300606-74 = "ほらほら、先生。そんなこと言わないで取り合えず試してみよっ、私はあの赤い馬にする！"
1300606-75 = "きっと他の馬より三倍ぐらい早いよ！"
1300606-76 = "あ！動き始めた！"
1300606-77 = "[s] \"う、うーーん……？\""
1300606-79 = "（当たり前ながら、メリーゴーランドの馬たちはみんな同じ速度だった……）"
1300606-81 = "あははっ。速さはみんな同じだったね！まっ、それもそっか～。"
1300606-82 = "くふふっ。じゃあ3つ目の依頼を始めよう、先生！"
1300606-83 = "[s] \"う、うん……。\""
1300606-85 = "ゲヘナ・第13図書館"
1300606-86 = "さて。今度の依頼の場所はここ、図書館だよ。（ひそひそ）"
1300606-87 = "[s] \"次の依頼はどんな内容なの？（ひそひそ）\""
1300606-88 = "それは、えっとね……。"
1300606-89 = "「誰にもバレないように、本棚の本を全部、上下逆さまにしてください」だって。"
1300606-90 = "[s] \"えっと、それはただの迷惑な行為なのでは……。\""
1300606-91 = "依頼だから、ね？全部終わったらまた戻しておけばいいでしょ？ねっ、お願い先生？"
1300606-92 = "[s11] \"まあ依頼でもあるし、後でまた戻しておくなら……\"\n[s12] \"はあ、仕方ないね……。\""
1300606-93 = "あはっ♡ありがと～先生！"
1300606-94 = "あはっ♡ありがと～先生！"
1300606-96 = "（その後も、ムツキに連れ回されるまま、あちこちで色々な依頼を実行した）"
1300606-97 = "（そうして、どれぐらい歩いた頃だろう）"
1300606-99 = "[ns] \"もう結構な数の依頼をやった気がするね。\""
1300606-100 = "くふふっ、そうだね～。"
1300606-101 = "[s] \"あとどれぐらい？\""
1300606-102 = "うーん、えっとね……。"
1300606-104 = "残りの依頼は確か……。"
1300606-106 = "あっ！紙が……！"
1300606-107 = "（ムツキの手から離れた紙が、空へと舞い上がった）"
1300606-111 = "[ns13] \"大丈夫！このくらいの高さなら……！\"\n[ns14] \"……ふぅ、取れてよかった。えっと、残りの依頼が……。\""
1300606-112 = "あっ、先生、中は見ちゃ……！"
1300606-113 = "あっ、先生、中は見ちゃ……！"
1300606-114 = "[ns] \"ん？これ、依頼人の名前……。\""
1300606-116 = "[ns] \"依頼人の名前が、ムツキ……？\""
1300606-119 = "もー、見ちゃダメっ！"
1300606-123 = "[ns] \"あっ、あれっ！？ムツキ！？\""
1300606-128 = "[wa:100]― あ～あ、[wa:1050]ざーんねんっ。"
1300606-130 = "― くふふっ、[wa:1120]バレちゃったかぁ～♪"
1300606-133 = "[wa:100]― 何を隠そう、[wa:1300]今日の[wa:300]可愛い依頼人の正体は[wa:2150]他でもない、"
1300606-135 = "― このムツキちゃんなのでした～。"
1300606-138 = "― 考えても[wa:600]みてよ先生～。"
1300606-140 = "― そもそも便利屋の依頼を、[wa:1250]私一人で[wa:700]解決しに行くわけないじゃん？"
1300606-143 = "[wa:100]― あはっ、[wa:700]どうだった？[wa:600]先生？"
1300606-145 = "― 私のいたずら、[wa:1200]ほぼ完璧だったでしょ？"
1300606-148 = "[wa:50]― きゃはっ、[wa:1050]なぁに先生、[wa:1450]その間抜けな顔。"
1300606-150 = "[wa:200]― うける！[wa:900]あはは～っ♪"
1300606-153 = "[wa:900]― 今日は[wa:400]先生と、[wa:750]いろんなことしたねー。"
1300606-156 = "― クレープ食べて、[wa:1200]遊園地にも行って、"
1300606-158 = "― あ、[wa:600]図書館では[wa:700]共犯にもなっちゃったし……！"
1300606-161 = "[wa:100]― あ～あ、[wa:1150]最後まで[wa:500]完璧に騙せると思ったのに、[wa:2100]残念だな～。"
1300606-164 = "― でも[wa:500]今度は、[wa:700]絶対に最後まで[wa:850]騙し通してみせるから、"
1300606-166 = "― 楽しみにしといてね～！"
1300606-169 = "[wa:100]― あーっ、[wa:1400]今日は[wa:500]ほんっと、[wa:1400]楽しかった！"
1300606-172 = "それじゃ、今日はもういたずらもバレちゃったことだし～、私はこれで！"
1300606-174 = "[ns] \"やられた……。\""
1300606-176 = "（けらけらと楽しそうに笑いながら手を振るムツキが見えなくなるまで、その場で固まったまま動けなかった）"
