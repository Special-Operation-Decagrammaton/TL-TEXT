[translation]
1300606-1 = "Um pedido especial de alguém"
1300606-2 = "Iahô, Sensei! Por aqui, por aqui~."
1300606-3 = "[s] \"Que tipo de pedido estranho é esse?\""
1300606-4 = "Ahaha, é que, tipo, é super estranho mesmo~."
1300606-5 = "Como eu posso dizer... hum..."
1300606-6 = "É um pedido que eu preciso muito que o Sensei me ajude, sabe?"
1300606-7 = "[s1] \"Que tipo de pedido é esse para a Mutsuki achar tão estranho...\"\n[s2] \"Que tipo de pedido é esse para a Mutsuki pedir ajuda...\""
1300606-8 = "Kufufu. E então, quem sabe~?"
1300606-9 = "Kufufu. E então, quem sabe~?"
1300606-10 = "Olha só, tem uma aluna em apuros, então como Sensei, você não pode ignorar, né? Você não tem escolha a não ser me acompanhar, certo?"
1300606-11 = "[s] \"Aliás, sendo um pedido da Loja de Conveniência, por que a Mutsuki está sozinha...\""
1300606-14 = "V-o-c-ê-v-a-i-m-e-a-c-o-m-p-a-n-h-a-r,n-é-?"
1300606-15 = "Né?\n"
1300606-16 = "Bem, o Sensei veio até aqui de propósito, e para começo de conversa, você não tem direito de recusa desde o início~!"
1300606-17 = "[s3] \"...Então eu não tenho direito de recusa.\"\n[s4] \"Bem, acho que não tem jeito...\""
1300606-18 = "Ahaha, sim! Mas de qualquer jeito, o Sensei ia acabar ajudando, não ia?"
1300606-19 = "Ahaha, sim! Mas de qualquer jeito, o Sensei ia acabar ajudando, não ia?"
1300606-20 = "[s] \"Hum... aliás, por onde devemos começar com esse pedido?\""
1300606-21 = "Neste formulário de pedido tem uma lista do que precisamos fazer, então vamos seguir ela, que tal?"
1300606-22 = "[s] \"Entendi, pode me mostrar?\""
1300606-25 = "Ah, isso não pode~!"
1300606-26 = "Informações pessoais do cliente são importantes, né?"
1300606-27 = "Mesmo sendo o Sensei, não posso mostrar isso tão facilmente."
1300606-28 = "[s] \"Como esperado... a Mutsuki também é uma profissional.\""
1300606-29 = "Kufufu. Isso mesmo, pode não parecer, mas sou uma profissional~."
1300606-30 = "Então, o tão esperado primeiro pedido. Hum, hum..."
1300606-31 = "O conteúdo é~..."
1300606-33 = "Loja de sobremesas caseiras, Amattaly"
1300606-34 = "[ns] \"...É realmente esse o pedido?\""
1300606-35 = "Sim! De acordo com o pedido, \"Depois de comer todos os crepes vendidos nesta loja...\""
1300606-36 = "\"Escolha o número um, o crepe 'supremo' entre eles\", diz!"
1300606-37 = "[s5] \"O crepe supremo...!\"\n[s6] \"Mas tem mais de 10 tipos no menu...?\""
1300606-38 = "Ah. Decidir o número um é importante, né~. O problema é o orçamento, mas..."
1300606-39 = "Hum. Bem, acho que vai dar certo?"
1300606-40 = "Vai dar certo, sim, dá para comer tudo. Além disso..."
1300606-41 = "Sobre o dinheiro, é só o Sensei processar como despesa, né~~♪"
1300606-42 = "[s] \"O quê...\""
1300606-43 = "Hum~? É um pedido de uma aluna, então é claro que você vai atender, né? Sensei~?"
1300606-44 = "Uma aluna querida está se esforçando taaaanto para resolver esse pedido."
1300606-45 = "Será que..."
1300606-46 = "Você vai dizer não...?"
1300606-48 = "[s] \"Grr...! N-não subestime a carteira de um adulto!\""
1300606-49 = "Ahahaha! Obrigada, Sensei!"
1300606-51 = "Ham, hum~♪ Como esperado, o de morango é uma delícia!"
1300606-52 = "Nhac, nhac, o de banana com esse doce suave também é o máximo!"
1300606-53 = "E o seu, Sensei?"
1300606-54 = "[s7] \"Morango, banana, chocolate... tantos crepes assim...\"\n[s8] \"Minha boca está cheia de açúcar, estou tendo um colapso de tanta doçura...\""
1300606-55 = "Kufufu, força, Sensei! Não falta muito! Vamos lá~!"
1300606-56 = "Kufufu, força, Sensei! Não falta muito! Vamos lá~!"
1300606-57 = "[s] \"S-sim...!\""
1300606-59 = "（E assim, comi uma montanha de crepes junto com a Mutsuki）"
1300606-61 = "Ahaha, o melhor crepe, hein? Hmm, acho que não dá para decidir tão fácil assim, né?"
1300606-62 = "[s] \"Ugh... ainda sinto o gosto doce na boca...\""
1300606-63 = "Bem, vamos deixar isso de lado por enquanto. Vamos para o próximo pedido!"
1300606-64 = "[s] \"O próximo pedido tem algo a ver com este parque de diversões?\""
1300606-65 = "O segundo pedido também é bem fácil."
1300606-66 = "Deixa eu ver..."
1300606-67 = "\"Gostaria que investigassem qual dos cavalos do carrossel deste parque é o mais rápido\", diz aqui!"
1300606-68 = "[ns9] \"...Carrossel?\"\n[ns10] \"...O cavalo mais rápido?\""
1300606-73 = "[ns] \"Será que... eles têm velocidades diferentes?\""
1300606-74 = "Vamos lá, Sensei. Não diga isso, vamos testar logo. Eu vou escolher aquele cavalo vermelho!"
1300606-75 = "Com certeza ele é umas três vezes mais rápido que os outros!"
1300606-76 = "Ah! Começou a girar!"
1300606-77 = "[s] \"U-uh...\""
1300606-79 = "（Como era de se esperar, todos os cavalos do carrossel giravam na mesma velocidade...）"
1300606-81 = "Ahaha. A velocidade era a mesma para todos! Bem, faz sentido, né?"
1300606-82 = "Kufufu. Então vamos para o terceiro pedido, Sensei!"
1300606-83 = "[s] \"U-uh, tá bom...\""
1300606-85 = "Gehenna - 13ª Biblioteca"
1300606-86 = "Muito bem. O local do próximo pedido é aqui, a biblioteca. (Sussurro)"
1300606-87 = "[s] \"Qual é o conteúdo do próximo pedido? (Sussurro)\""
1300606-88 = "É que, bem..."
1300606-89 = "\"Por favor, coloque todos os livros da estante de cabeça para baixo sem que ninguém perceba\", diz aqui."
1300606-90 = "[s] \"Ei, isso não é só um incômodo para os outros...?\""
1300606-91 = "É um pedido, sabe? Depois que terminarmos, é só colocar tudo de volta no lugar, não é? Vamos, por favor, Sensei?"
1300606-92 = "[s11] \"Bem, já que é um pedido, e se colocarmos de volta depois...\"\n[s12] \"Ah, não tem jeito mesmo...\""
1300606-93 = "Ah! ♡ Obrigada, Sensei!"
1300606-94 = "Ah! ♡ Obrigada, Sensei!"
1300606-96 = "（Depois disso, continuei sendo arrastado pela Mutsuki para realizar vários pedidos por toda parte）"
1300606-97 = "（E assim, não sei dizer quanto tempo já tínhamos caminhado）"
1300606-99 = "[ns] \"Sinto que já fizemos uma boa quantidade de pedidos.\""
1300606-100 = "Kufufu, é verdade."
1300606-101 = "[s] \"Faltam quantos?\""
1300606-102 = "Hmm, deixa eu ver..."
1300606-104 = "Os pedidos restantes são, se não me engano..."
1300606-106 = "Ah! O papel...!"
1300606-107 = "（O papel escapou da mão da Mutsuki e voou para o alto）"
1300606-111 = "[ns13] \"Tudo bem! Nessa altura eu consigo...!\"\n[ns14] \"...Ufa, ainda bem que peguei. Então, os pedidos restantes são...\""
1300606-112 = "Ah, Sensei, não olhe o que tem dentro...!"
1300606-113 = "Ah, Sensei, não olhe o que tem dentro...!"
1300606-114 = "[ns] \"Hm? Isso aqui, o nome do cliente...\""
1300606-116 = "[ns] \"O nome do cliente é... Mutsuki?\""
1300606-119 = "Poxa, não era para olhar!"
1300606-123 = "[ns] \"Ah, ué!? Mutsuki!?\""
1300606-128 = "[wa:100]— Ah, [wa:1050] que pena."
1300606-130 = "— Kufufu, [wa:1120] descobriu, né?♪"
1300606-133 = "[wa:100]— Não é segredo para ninguém, [wa:1300] a identidade da [wa:300] cliente fofinha de hoje [wa:2150] não é ninguém menos que,"
1300606-135 = "— Esta que vos fala, a Mutsuki-chan."
1300606-138 = "— Pensa bem, [wa:600] Sensei."
1300606-140 = "— Por acaso você acha que eu, [wa:1250] sozinha, [wa:700] iria resolver os pedidos da nossa agência?"
1300606-143 = "[wa:100]― Ah, [wa:700]como foi? [wa:600]Sensei?"
1300606-145 = "― Minha pegadinha, [wa:1200]foi quase perfeita, não foi?"
1300606-148 = "[wa:50]― Hehe, [wa:1050]o que foi, Sensei, [wa:1450] com essa cara de bobo."
1300606-150 = "[wa:200]― Demais! [wa:900]Ahahaha~♪"
1300606-153 = "[wa:900]― Hoje nós [wa:400]fizemos, [wa:750]tantas coisas juntos, Sensei."
1300606-156 = "― Comemos crepe, [wa:1200]fomos ao parque de diversões,"
1300606-158 = "― Ah, [wa:600]e na biblioteca [wa:700]até viramos cúmplices...!"
1300606-161 = "[wa:100]― Ah, [wa:1150]eu achei que conseguiria [wa:500]te enganar perfeitamente até o fim, [wa:2100]que pena."
1300606-164 = "― Mas [wa:500]da próxima vez, [wa:700]eu definitivamente vou [wa:850]conseguir te enganar até o fim,"
1300606-166 = "― Pode ficar esperando, viu!"
1300606-169 = "[wa:100]― Ah, [wa:1400]hoje foi, [wa:500]sério, [wa:1400]muito divertido!"
1300606-172 = "Bom, já que a minha pegadinha foi descoberta, eu vou indo nessa!"
1300606-174 = "[ns] \"Fui passado para trás...\""
1300606-176 = "(Fiquei paralisado no lugar, sem conseguir me mover, até que Mutsuki, rindo alegremente enquanto acenava, desapareceu de vista)"
