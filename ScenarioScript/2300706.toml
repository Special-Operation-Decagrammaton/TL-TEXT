[translation]
2300706-1 = "雨の中の女の子"
2300706-2 = "（モモトークのメッセージがどうしても気になったので、ハナコの元へ行くことにした）"
2300706-3 = "（何度メッセージを送っても既読にならないため、周りの人たちに聞きながらハナコを探し……）"
2300706-6 = "（しばらくしてから、公園でハナコを見つけることができた）"
2300706-7 = "（ハナコはベンチに座り、ボーっとした表情で雨を眺めていた）"
2300706-8 = "……。"
2300706-9 = "……ふう。"
2300706-10 = "[s1] \"……ハナコ？\"\n[s2] \"何か考えごと？\""
2300706-11 = "……？"
2300706-12 = "……？"
2300706-13 = "……あら。"
2300706-14 = "先生……？どうしてここに……"
2300706-15 = "……。"
2300706-16 = "……ふふっ。"
2300706-17 = "いえ、先生らしいなと思いまして。"
2300706-18 = "場所もお伝えしなかったのに、よくここまでたどり着かれましたね。"
2300706-19 = "仰っていただければ、私の方から先生のところに行きましたのに……。"
2300706-20 = "[s] 何があったのか聞いてみる。"
2300706-21 = "……？"
2300706-22 = "……ふふっ。"
2300706-23 = "モモトークに書いた通りです、何でもありません。"
2300706-24 = "気を遣わせてしまってすみません、大丈夫です。"
2300706-25 = "[s] もう一度優しく聞いてみる。"
2300706-26 = "……。"
2300706-27 = "……本当に、大したことは何も無いんです。"
2300706-28 = "強いて言うなら、とある方から連絡が来たというだけで。"
2300706-29 = "[s3] \"とある方？\"\n[s4] \"……連絡？\""
2300706-30 = "大した内容ではありません。他のみんなにも送るような、テンプレート的で格式張った、よくある挨拶のようなものです。"
2300706-31 = "大した内容ではありません。他のみんなにも送るような、テンプレート的で格式張った、よくある挨拶のようなものです。"
2300706-32 = "ただ……。"
2300706-33 = "たくさんの美辞麗句と複雑な文脈の中から、微かに本音が垣間見える……まるで、あまり楽しくないクイズのような内容でして。"
2300706-34 = "言いたいことがあるなら、普通に言ってくれればよいのですが……。"
2300706-35 = "欺瞞で自身を覆い隠さずにはいられない事情でもあるのでしょうか……。"
2300706-36 = "……。"
2300706-37 = "あっ、先にお伝えしておきますが、特に何か悪いものだったり、危険な内容ではないのでご安心ください。"
2300706-38 = "ただ……ちょっと歯がゆくて、息苦しいと言いますか。"
2300706-39 = "……ふふっ、本当におかしな話ですよね。"
2300706-40 = "私のことなんて、放っておいてくれれば良いのですが。"
2300706-41 = "成績も性格も悪くて、補習授業部に属していて、毎日トラブルばかり引き起こすようなこんな私に、どうして……。"
2300706-42 = "[s5] \"ハナコにとっては、嫌な連絡なの？\"\n[s6] \"一人でいるのが好き……ってわけじゃないんだよね？\""
2300706-44 = "……。"
2300706-46 = "……。"
2300706-47 = "……そうですよ、と言ったら、先生はどう思いますか？"
2300706-48 = "……決して、一人でいることが好きというわけではありません。むしろ私の会話に付き合ってくれたり、楽しく反応してくださる方がいてくれる方が嬉しいです。"
2300706-49 = "ただ、息苦しいのは嫌だなというだけで……。"
2300706-50 = "……ふふっ。"
2300706-51 = "不思議な感じです。こういうことを、しっかりと口にしたのは初めてで……。"
2300706-52 = "……ですが、すっきりした感じです。悪くありません。"
2300706-53 = "雨のせい、でしょうか……？"
2300706-54 = "……先生。"
2300706-55 = "もし、先生さえよろしければ……"
2300706-56 = "時々で良いので、こういった他愛のないお話に、付き合っていただけませんか？"
2300706-57 = "[s7] \"もちろん。\"\n[s8] \"いたずらはちょっと困るけど、お話だったらいつでも。\""
2300706-58 = "ふふっ、ふふふ……。"
2300706-59 = "ふふっ、ふふふ……。"
2300706-60 = "ありがとうございます。"
2300706-61 = "ただ、先生とお話をしているとつい楽しくなってしまうので……やはりこれからも、いたずらはちょっとやめられないかもしれませんね。\n"
2300706-62 = "あれは私にとって、とびっきりのお楽しみですので。"
2300706-63 = "ただ……"
2300706-64 = "代わりにというわけではありませんが……これからはもっと気楽に、先生に接したいと思っていますので。引き続き、よろしくお願いいたしますね。"
2300706-67 = "ふふっ……。"
2300706-68 = "こういった感覚は……初めてです。"
