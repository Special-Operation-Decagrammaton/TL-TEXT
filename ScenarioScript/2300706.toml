[translation]
2300706-1 = "A garota na chuva"
2300706-2 = "（Como não consegui parar de pensar na mensagem do MomoTalk, decidi ir até onde a Hanako está）"
2300706-3 = "（Como ela não visualizava as mensagens, perguntei por aí até conseguir encontrá-la...）"
2300706-6 = "（Depois de um tempo, consegui encontrá-la no parque）"
2300706-7 = "（Hanako estava sentada em um banco, observando a chuva com um olhar vago）"
2300706-8 = "……。"
2300706-9 = "……Ufa."
2300706-10 = "[s1] \"……Hanako?\"\n[s2] \"Está pensando em algo?\""
2300706-11 = "……？"
2300706-12 = "……？"
2300706-13 = "……Ora."
2300706-14 = "Sensei……? Por que você está aqui……"
2300706-15 = "……。"
2300706-16 = "……Fufu."
2300706-17 = "Não, é que isso é bem a sua cara, Sensei."
2300706-18 = "Eu nem te disse onde estava, mas você conseguiu me encontrar."
2300706-19 = "Se tivesse me pedido, eu mesma teria ido até você……"
2300706-20 = "[s] Perguntar o que aconteceu."
2300706-21 = "……？"
2300706-22 = "……Fufu."
2300706-23 = "Como escrevi no MomoTalk, não é nada."
2300706-24 = "Desculpe por te preocupar, estou bem."
2300706-25 = "[s] Perguntar novamente com gentileza."
2300706-26 = "……。"
2300706-27 = "……Sério, não é nada demais."
2300706-28 = "Se é que preciso dizer, é só que recebi um contato de certa pessoa."
2300706-29 = "[s3] \"Certa pessoa?\"\n[s4] \"……Um contato?\""
2300706-30 = "Não é um conteúdo importante. É algo como uma saudação comum, formal e padronizada, do tipo que se envia para todo mundo."
2300706-31 = "Não é um conteúdo importante. É algo como uma saudação comum, formal e padronizada, do tipo que se envia para todo mundo."
2300706-32 = "Só que……"
2300706-33 = "Entre tantos elogios e contextos complexos, é possível vislumbrar levemente as verdadeiras intenções…… é como um quiz nada divertido."
2300706-34 = "Se têm algo a dizer, poderiam simplesmente falar de forma direta……"
2300706-35 = "Será que existem circunstâncias que os obrigam a se esconderem atrás de enganos……?"
2300706-36 = "……。"
2300706-37 = "Ah, já vou adiantar que não é nada ruim ou perigoso, então pode ficar tranquilo."
2300706-38 = "É só que…… é um pouco frustrante, ou melhor, sufocante."
2300706-39 = "……Fufu, é uma história bem estranha, não é?"
2300706-40 = "Poderiam simplesmente me deixar em paz."
2300706-41 = "Por que alguém se importaria com alguém como eu, que tem notas ruins, personalidade difícil, pertence ao Clube de Reforço e só causa problemas todos os dias……"
2300706-42 = "[s5] \"Para você, Hanako, é um contato desagradável?\"\n[s6] \"Não é que você goste de ficar sozinha, né?\""
2300706-44 = "……。"
2300706-46 = "……。"
2300706-47 = "……Se eu dissesse que sim, o que você pensaria, Sensei?"
2300706-48 = "……Eu nunca disse que gosto de ficar sozinha. Pelo contrário, fico feliz quando alguém conversa comigo ou reage de forma divertida."
2300706-49 = "É só que eu não gosto de me sentir sufocada……"
2300706-50 = "……Fufu."
2300706-51 = "É uma sensação estranha. É a primeira vez que digo isso em voz alta……"
2300706-52 = "……Mas me sinto mais leve. Não é ruim."
2300706-53 = "Será por causa da chuva……?"
2300706-54 = "……Sensei."
2300706-55 = "Se o Sensei não se importar..."
2300706-56 = "Poderia me acompanhar em conversas triviais como esta de vez em quando?"
2300706-57 = "[s7] \"Claro que sim.\"\n[s8] \"Eu não gosto muito de pegadinhas, mas para conversar, estou sempre disponível.\""
2300706-58 = "Fufu, fufufu..."
2300706-59 = "Fufu, fufufu..."
2300706-60 = "Muito obrigada."
2300706-61 = "É que, quando converso com o Sensei, acabo me divertindo tanto que... receio não conseguir parar com as pegadinhas daqui para frente também.\n"
2300706-62 = "Afinal, isso é uma diversão especial para mim."
2300706-63 = "Mas..."
2300706-64 = "Não que seja uma troca, mas... a partir de agora, quero ser mais descontraída com você, Sensei. Conto com a sua companhia daqui em diante."
2300706-67 = "Fufu..."
2300706-68 = "Essa sensação é... a primeira vez que sinto."
