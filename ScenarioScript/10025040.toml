[translation]
10025040-1 = "第4話;闇を[ruby=さまよ]彷徨[/ruby]う者"
10025040-8 = "こちらRABBIT1。現在時刻2030、ランデブーポイントに到着しました。"
10025040-9 = "日没まで約30分……今夜は新月です。#n総員、視覚外にも意識を向けてください。"
10025040-10 = "こちらRABBIT2。今回の作戦には、もってこいの夜だな。  "
10025040-11 = "相手からは見えないだろうが、こっちには暗闇でも見分けられる目がある。"
10025040-12 = "RABBIT4、スコープの交換は終わったか？  "
10025040-13 = "う、うん……思った以上に視界不良だったから、暗視スコープに替えたよ。"
10025040-14 = "一応、赤外線ストロボも用意してきたけど……"
10025040-15 = "ん？どうかしたのか？  "
10025040-16 = "なんか……昼よりも異臭が強くなってる気がする。"
10025040-17 = "なんて言えば良いのか分からないけど……#n村のあちこちから、生モノみたいな独特の臭いが……"
10025040-18 = "……実は、私も感じていました。"
10025040-19 = "鼻をつく悪臭だけではなく、#n微量のガスに触れているときのように肌がヒリヒリします……"
10025040-20 = "[USERNAME]先生、大丈夫ですか？"
10025040-26 = "[ns1] \"たしかに変な臭いはするけど……\"\n[ns2] \"今のところ大丈夫かな。\""
10025040-30 = "この臭いも、何かの前兆だったらどうしよう……？"
10025040-31 = "ちょっと緊張する……"
10025040-32 = "悪臭程度でビビるな。漁村なんだから、生モノの臭いくらいするだろ。"
10025040-33 = "臭いが強くなったのは、海風のせいじゃないか？"
10025040-34 = "まだまだだね、サキ。"
10025040-35 = "海岸地域の夜は、陸から海に向かって風が吹くんだよ。"
10025040-36 = "陸は海に比べて比熱が低いから、気圧の差が生まれる。#n科学の時間に習ったでしょ？"
10025040-37 = "[s] \"ここ、テストに出ます。\""
10025040-38 = "う、うるさいな！それくらい、知ってる……！"
10025040-39 = "ともかく……RABBIT1、今回の目標地点はどこだ。"
10025040-41 = "まずは、運送会社の方が言っていた「鬼の[ruby=がんしょう]岩礁[/ruby]」に向かいます。"
10025040-42 = "日中は住民の視線があるので、動くなら今しかありません。#n無断で神聖な場所を調べたと知られたら、余計な争いを招くでしょうから。"
10025040-43 = "それに、今日は海運会社の方が「近寄ってはいけない」と言っていた大潮の日です。#nもしかしたら、重要な情報を得られるかもしれません。"
10025040-44 = "RABBIT2は私と共に目標地点の探索を。#nRABBIT4は、西の崖上で全方位を見渡して警戒お願いします。"
10025040-46 = "了解。"
10025040-47 = "み、ミヤコちゃ……RABBIT1……絶対に、無線を切らないでね……！"
10025040-49 = "はい、分かりました。#nRABBIT4も、異常が発生したらすぐに報告してください。"
10025040-50 = "RABBIT3はランデブーポイントで待機し、後方支援をお願いします。"
10025040-51 = "私たちの動きに気づいて、後を追ってくる住民がいるかもしれません。"
10025040-52 = "おっけ～、任せてよ。"
10025040-54 = "では、日の出までにランデブーポイントに戻れるよう、急ぎましょう。"
10025040-65 = "……ストップ。"
10025040-66 = "RABBIT2。村を正面にして1時の方向、不審者を2人発見。#n目視で得られる情報を。"
10025040-68 = "ん～、1人は釣り用の長靴を履いて、手には釣り具を持ってる……#n見るからに漁師だな……"
10025040-69 = "その人の前で、立ちはだかるようにしてるのは……#nこの村に駐在してるヴァルキューレの生徒か。"
10025040-78 = "……なんか言い争ってるように見えるぞ？"
10025040-79 = "RABBIT3、会話内容を掴んでください。"
10025040-80 = "指向性マイクを準備するから、ちょっと待ってねぇ。"
10025040-87 = "……は、そろそろ作るのをやめてもらえませんか？"
10025040-88 = "村を覆う……の臭いで、頭痛が止まらないんですよ！"
10025040-89 = "……俺たちだって、好きで作ってるわけじゃない。"
10025040-90 = "だが、エビが…………これを売るしか……"
10025040-91 = "それに……は、この村で伝統的な……年配の方も気に入って……"
10025040-92 = "……は、地元の人だからであって、私たちは……"
10025040-93 = "……もうここに来て、1年は経つんだろう？#nいつまでピーピー言うつもりなんだ。"
10025040-94 = "いい加減、村の一員として……"
10025040-95 = "うぅぅ……"
10025040-96 = "それで、前に言った……はどうなった？"
10025040-97 = "頼んでから1か月は経つが、まだなのか？"
10025040-98 = "昨日も……のせいで、漁に出たヤツが怪我をするとこだった。"
10025040-99 = "すみません。しかし私たちだけでは……の解決は難しく……"
10025040-100 = "これ以上、見て見ぬふりはできん。"
10025040-102 = "放置すれば、いずれ村は闇に飲みこまれるだろう――"
10025040-108 = "……村の異臭は、意図したものってことか？"
10025040-109 = "それに闇に飲み込まれるって、どういうことだ。"
10025040-110 = "ほ、本当に大丈夫なんだよね？"
10025040-111 = "突然、陸が沈んだり……真っ暗な海底から謎の生き物が襲ってきたり……#nし、しないよね……！？"
10025040-112 = "落ち着いてください、ミユ。そんな出来事は現実で起こりません。"
10025040-113 = "で、でも……ずっと暗いところにいるからか、ネガティブなことばかり考えちゃって……"
10025040-114 = "今度は……なんか、変な声まで聞こえて……"
10025040-115 = "どんな声ですか？"
10025040-117 = "お経を唱えてるような声が……"
10025040-118 = "ミヤコちゃ……RABBIT1、本当に、大丈夫なんだよね？"
10025040-125 = "……その場で待っていてください、すぐにそちらへ向かいます。"
10025040-126 = "RABBIT2、RABBIT4のコンディションが安定しないようなので、#nこれより一度撤収します。"
10025040-127 = "了解した。"
10025040-128 = "……まあ、この異様な空気の前じゃ落ち着かない気持ちも分かるな。"
10025040-129 = "住民の部外者を受け入れない言動……#n問題のタネはエビ漁にだけあるとは思えん。"
10025040-130 = "先生はどう思う？"
10025040-131 = "[s3] \"確かに住民たちは怪しいけど……\"\n[s4] \"まずは、ミユの状態を見に行こう。\""
10025040-134 = "そうですね。ひとまず、情報の整理は集合してからにしましょう。"
10025040-135 = "……夏の夜は、意外と短いので。"
10025040-143 = "……RABBIT4、大丈夫ですか？"
10025040-144 = "おいRABBIT4、迎えに来たぞ。"
10025040-146 = "あ……ああぁ……"
10025040-147 = "どうした、襲撃に遭ったのか！？"
10025040-148 = "あ、あっち……海辺に、昼に見た釣り人が……"
10025040-156 = "頼む……これでダメなら、もうどうしようもないぜ……"
10025040-157 = "「深きもの」でも何でもいいから、頼む……お願いだ。"
10025040-158 = "さんどいっち～さんどいっち～……べ～ぐるふぁ～たん！"
10025040-159 = "……本当に、この呪文で合ってるのか？"
10025040-161 = "あ、ああ、悪魔を、召喚しようとしてるんだ……！"
10025040-163 = "だっ、誰だ、こんな夜遅くに……！"
10025040-168 = "それはこっちのセリフだぞ。ここで何をしてるんだ？"
10025040-169 = "あ、えーっと……それは、その……"
10025040-171 = "チッ……捕まるのは勘弁だ！"
10025040-172 = "RABBIT2、逃してはいけません！"
10025040-173 = "逃すか！！"
10025040-174 = "お、置いていかないで……！"
10025040-181 = "[ns] \"みんな、ちょっと待っ――\""
10025040-190 = "ゼエ、ゼエ……あいつ、どこに行った？"
10025040-191 = "クマみたいな見た目のわりに、ウサギ並みの速さじゃないか……"
10025040-192 = "……そういや、夢中で追いかけてたら道に迷ったみたいだな。#nここ、どこなんだ？"
10025040-193 = "うっ、なんだこの悪臭は――ウワァッ！？"
10025040-200 = "だっ、大丈夫……？"
10025040-205 = "RABBIT2、大丈夫ですか？"
10025040-212 = "だ、大丈夫だ。何かヌルっとしたものを踏んだだけ……"
10025040-213 = "って、なんだコレは……魚の、内臓か……？"
10025040-215 = "ひ、ひぃいっ……"
10025040-216 = "……あちこちに、魚の頭の骨が捨てられてますね。"
10025040-217 = "今は使われなくなった調理場なのかもしれません。"
10025040-219 = "いや……最近使われた痕跡がある。"
10025040-220 = "この干物、まだ水気が残ってるぞ。"
10025040-222 = "み……ミヤコちゃん、サキちゃん……ここに……"
10025040-223 = "RABBIT4、作戦中はコールサインで呼ぶようにって言っただろ……#nそれで、何か見つけたのか？"
10025040-224 = "ここに……なみなみの、黒くて生臭い液体が……"
10025040-226 = "どれどれ……"
10025040-231 = "ゔあっ……なんだ、この臭いは！"
10025040-232 = "村に広がる異臭は、これが原因だったのか！？"
10025040-233 = "……この干物からも、同じ臭いがしますね。"
10025040-234 = "もしかして、わざと腐敗させるために放置している可能性も……"
10025040-235 = "どういうことだ？#nただでさえ漁獲量が減ってるみたいなのに、わざと魚を腐らせるなんて……"
10025040-236 = "疑いの目を向けたくはありませんでしたが……これでハッキリしました。"
10025040-237 = "この村では、何らかの儀式のようなものを行っている可能性が――"
10025040-243 = "早朝から何事かと思えば……泥棒猫が入り込んだか。"
10025040-248 = "こんな村に観光だなんて最初からおかしいと思ってたが……やはり村の魚を狙ってたんだな。もう言い逃れはできんぞ。"
10025040-250 = "なっ、誰が泥棒猫だ！"
10025040-251 = "腐った魚なんて、こっちから願い下げだ！"
10025040-256 = "腐った魚だと……？"
10025040-257 = "ハッ……！まったく、相手にならんな！"
10025040-259 = "知りもせず好き勝手言いおって……#nこれまでに来たヤツらと、何ひとつ変わりゃあせんな。"
10025040-260 = "……この村では、いったい何が起きてるんですか？"
10025040-261 = "今さら、そんなことを聞いてどうすると？"
10025040-262 = "……悪いが、その質問には答えられんがな。"
10025040-263 = "ワシは人様の家に土足で上がり込むような奴と仲良くできるほど、#n器が大きくないもんでな。"
10025040-273 = "……若いモンたちに、[ruby=やとうら]夜戸浦[/ruby]村の怖さを教えてやろう。"
10025040-279 = "いつの間にか囲まれたぞ……！"
10025040-280 = "恐怖と戦うのには慣れています。"
10025040-282 = "……総員、戦闘開始。まずは包囲を崩しましょう。"
