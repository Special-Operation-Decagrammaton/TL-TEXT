[translation]
10025040-1 = "Episódio 4: Aquele que vagueia na escuridão"
10025040-8 = "Aqui é RABBIT 1. Horário atual 2030, chegamos ao ponto de encontro."
10025040-9 = "Cerca de 30 minutos para o pôr do sol... esta noite é de lua nova. #nTodos, mantenham a atenção também fora do campo de visão."
10025040-10 = "Aqui é RABBIT 2. É a noite perfeita para esta operação."
10025040-11 = "Eles podem não conseguir nos ver, mas nós temos olhos que conseguem distinguir as coisas mesmo na escuridão."
10025040-12 = "RABBIT 4, terminou a troca da mira?"
10025040-13 = "S-sim... a visibilidade estava pior do que eu pensava, então troquei pela mira noturna."
10025040-14 = "Eu até trouxe um estrobo infravermelho, mas..."
10025040-15 = "Hm? Aconteceu alguma coisa?"
10025040-16 = "É que... sinto que o cheiro estranho está mais forte do que durante o dia."
10025040-17 = "Não sei bem como explicar, mas... #npor toda a vila, há um cheiro peculiar, como de algo orgânico..."
10025040-18 = "...Na verdade, eu também estava sentindo."
10025040-19 = "Não é apenas o mau cheiro que irrita o nariz, #nminha pele está ardendo, como se estivesse em contato com uma pequena quantidade de gás..."
10025040-20 = "Professor [USERNAME], você está bem?"
10025040-26 = "[ns1] \"Realmente tem um cheiro estranho, mas...\"\n[ns2] \"Por enquanto estou bem.\""
10025040-30 = "E se esse cheiro for um presságio de algo...?"
10025040-31 = "Estou um pouco nervosa..."
10025040-32 = "Não fique com medo só por causa de um mau cheiro. É uma vila de pescadores, é normal ter cheiro de peixe."
10025040-33 = "O cheiro não ficou mais forte por causa da brisa do mar?"
10025040-34 = "Você ainda tem muito o que aprender, Saki."
10025040-35 = "À noite, nas regiões costeiras, o vento sopra da terra para o mar."
10025040-36 = "A terra tem um calor específico menor que o mar, então cria-se uma diferença de pressão atmosférica. #nVocê aprendeu isso na aula de ciências, não aprendeu?"
10025040-37 = "[s] \"Isso vai cair na prova.\""
10025040-38 = "C-cala a boca! Eu sei disso...!"
10025040-39 = "De qualquer forma... RABBIT 1, qual é o nosso objetivo?"
10025040-41 = "Primeiro, vamos em direção ao \"Recife do Demônio\" que o pessoal da empresa de transporte mencionou."
10025040-42 = "Durante o dia, há olhares dos moradores, então só podemos agir agora. #nSe souberem que investigamos um lugar sagrado sem permissão, isso causará conflitos desnecessários."
10025040-43 = "Além disso, hoje é dia de maré alta, que o pessoal da empresa de navegação disse para \"não nos aproximarmos\". #nTalvez possamos obter informações importantes."
10025040-44 = "RABBIT 2, venha comigo explorar o local. #nRABBIT 4, por favor, fique no penhasco oeste vigiando todos os ângulos."
10025040-46 = "Entendido."
10025040-47 = "M-Miyako-cha... RABBIT 1... por favor, não desligue o rádio de jeito nenhum...!"
10025040-49 = "Sim, entendido. #nRABBIT 4, informe imediatamente se ocorrer qualquer anormalidade."
10025040-50 = "RABBIT 3, aguarde no ponto de encontro e forneça suporte na retaguarda."
10025040-51 = "Pode haver moradores que notem nossos movimentos e venham atrás de nós."
10025040-52 = "Ok, pode deixar comigo."
10025040-54 = "Então, vamos nos apressar para voltar ao ponto de encontro antes do amanhecer."
10025040-65 = "...Parem."
10025040-66 = "RABBIT 2. De frente para a vila, na direção de 1 hora, encontrei dois suspeitos. #nObtenha informações visuais."
10025040-68 = "Hm... um deles está usando botas de pesca e segurando equipamentos de pesca... #npelo visto, é um pescador..."
10025040-69 = "E quem está bloqueando o caminho dele é... #numa aluna da Valkyrie que está estacionada nesta vila."
10025040-78 = "...Parece que eles estão discutindo, não é?"
10025040-79 = "RABBIT 3, capture o conteúdo da conversa."
10025040-80 = "Vou preparar o microfone direcional, espere um pouco."
10025040-87 = "...P-por favor, parem de fazer isso agora!"
10025040-88 = "O cheiro de... que cobre a vila, está me dando uma dor de cabeça insuportável!"
10025040-89 = "...Nós também não fazemos isso porque queremos."
10025040-90 = "Mas, os camarões... não temos outra escolha a não ser vender isso..."
10025040-91 = "Além disso... é uma tradição desta vila... os mais velhos também gostam..."
10025040-92 = "...é porque vocês são locais, mas nós..."
10025040-93 = "...Já faz um ano que você veio para cá, não é? #nAté quando pretende ficar reclamando?"
10025040-94 = "Já chega, como um membro da vila..."
10025040-95 = "Uuu..."
10025040-96 = "Então, o que aconteceu com aquilo que eu disse antes...?"
10025040-97 = "Já faz um mês desde que pedimos, ainda não está pronto?"
10025040-98 = "Ontem também, por causa daquilo..., um dos pescadores quase se machucou."
10025040-99 = "Sinto muito. Mas, apenas com nós, resolver aquilo é difícil..."
10025040-100 = "Não posso mais fingir que não estou vendo isso."
10025040-102 = "Se deixarmos como está, a vila acabará sendo engolida pela escuridão—"
10025040-108 = "...Então o mau cheiro da vila é algo intencional?"
10025040-109 = "E o que você quer dizer com ser engolido pela escuridão?"
10025040-110 = "V-vocês têm certeza de que está tudo bem, né?"
10025040-111 = "De repente, a terra afundar... ou criaturas misteriosas atacarem vindo do fundo do mar escuro...#nN-não vai acontecer, né...!?"
10025040-112 = "Por favor, acalme-se, Miyu. Esse tipo de evento não acontece na realidade."
10025040-113 = "M-mas... talvez seja porque estou em um lugar escuro há muito tempo, mas só consigo pensar em coisas negativas..."
10025040-114 = "Desta vez... até ouvi uma voz estranha..."
10025040-115 = "Que tipo de voz?"
10025040-117 = "Uma voz que parecia estar recitando um sutra..."
10025040-118 = "Miyako-cha... RABBIT 1, vocês têm certeza de que está tudo bem, né?"
10025040-125 = "...Fique onde está, estamos indo até aí agora mesmo."
10025040-126 = "RABBIT 2, a condição da RABBIT 4 não parece estar estável, então#nvamos recuar por enquanto."
10025040-127 = "Entendido."
10025040-128 = "...Bem, diante dessa atmosfera estranha, entendo que você não se sinta à vontade."
10025040-129 = "O comportamento dos moradores de não aceitar estranhos...#nNão acho que a raiz do problema esteja apenas na pesca de camarão."
10025040-130 = "O que você acha, Sensei?"
10025040-131 = "[s3] \"Os moradores são suspeitos, com certeza...\"\n[s4] \"Primeiro, vamos ver como a Miyu está.\""
10025040-134 = "Concordo. Por enquanto, vamos organizar as informações depois que nos reunirmos."
10025040-135 = "...As noites de verão são surpreendentemente curtas."
10025040-143 = "...RABBIT 4, você está bem?"
10025040-144 = "Ei, RABBIT 4, viemos te buscar."
10025040-146 = "Ah... aaaah..."
10025040-147 = "O que houve? Você foi atacada!?"
10025040-148 = "A-ali... na beira do mar, aquele pescador que vimos de dia..."
10025040-156 = "Por favor... se isso não funcionar, não há mais nada que eu possa fazer..."
10025040-157 = "Não importa se é um \"Ser Profundo\" ou o que for, por favor... eu imploro."
10025040-158 = "Sanduíche~ sanduíche~... béguel-fá-tan!"
10025040-159 = "...Esse encantamento está realmente correto?"
10025040-161 = "A-ah, eu estou tentando invocar um demônio...!"
10025040-163 = "Q-quem está aí, a essa hora da noite...!"
10025040-168 = "Essa é a nossa pergunta. O que você está fazendo aqui?"
10025040-169 = "Ah, éer... isso é, bem..."
10025040-171 = "Droga... não posso ser pego!"
10025040-172 = "RABBIT 2, não a deixe escapar!"
10025040-173 = "Não vou deixar!!"
10025040-174 = "N-não me deixem para trás...!"
10025040-181 = "[ns] \"Pessoal, esperem um pouco--\""
10025040-190 = "Ofegante... para onde ele foi?"
10025040-191 = "Para alguém com aparência de urso, ele é rápido como um coelho..."
10025040-192 = "...Pensando bem, parece que me perdi enquanto o perseguia freneticamente.#nOnde estamos?"
10025040-193 = "Ugh, que mau cheiro é esse— Uaaah!?"
10025040-200 = "V-você está bem...?"
10025040-205 = "RABBIT2, você está bem?"
10025040-212 = "E-estou bem. Só pisei em algo viscoso..."
10025040-213 = "Mas o que é isso... vísceras de peixe...?"
10025040-215 = "I-iiih..."
10025040-216 = "...Tem espinhas de peixe descartadas por toda parte."
10025040-217 = "Talvez seja uma cozinha que não é mais usada."
10025040-219 = "Não... há sinais de uso recente."
10025040-220 = "Este peixe seco ainda está úmido."
10025040-222 = "Mi... Miyako-chan, Saki-chan... aqui..."
10025040-223 = "RABBIT4, eu disse para usar o codinome durante a missão...#nE então, encontrou alguma coisa?"
10025040-224 = "Aqui... tem um líquido preto e fedorento transbordando..."
10025040-226 = "Deixe-me ver..."
10025040-231 = "Ugh... que cheiro é esse!"
10025040-232 = "Será que isso é a causa do mau cheiro que se espalha pela vila!?"
10025040-233 = "...Este peixe seco também tem o mesmo cheiro."
10025040-234 = "Será que existe a possibilidade de terem deixado isso aqui de propósito para apodrecer..."
10025040-235 = "O que isso significa?#nMesmo com a diminuição da pesca, por que deixariam os peixes apodrecerem de propósito..."
10025040-236 = "Eu não queria suspeitar de nada... mas agora está claro."
10025040-237 = "Existe a possibilidade de que estejam realizando algum tipo de ritual nesta vila—"
10025040-243 = "Quem diria que veríamos intrusos logo de manhã cedo..."
10025040-248 = "Achei estranho desde o início que estivessem aqui como turistas... então vocês estavam atrás dos peixes da vila. Não adianta mais negar."
10025040-250 = "Ora, quem você está chamando de intruso!"
10025040-251 = "Ninguém aqui quer esses peixes podres!"
10025040-256 = "Peixes podres, disse...?"
10025040-257 = "Hah...! Realmente, não vale a pena perder tempo com vocês!"
10025040-259 = "Falando o que querem sem saber de nada...#nVocês não são diferentes de todos os outros que vieram aqui."
10025040-260 = "...O que está acontecendo nesta vila, afinal?"
10025040-261 = "Por que pergunta isso agora?"
10025040-262 = "...Sinto muito, mas não posso responder a essa pergunta."
10025040-263 = "Não sou uma pessoa tão paciente a ponto de ser amigável com quem entra na casa dos outros sem permissão."
10025040-273 = "...Vamos ensinar a esses jovens o quão aterrorizante é a vila de Yatoura."
10025040-279 = "Fomos cercados sem perceber...!"
10025040-280 = "Estou acostumada a lutar contra o medo."
10025040-282 = "...Todos, iniciem o combate. Primeiro, vamos romper o cerco."
