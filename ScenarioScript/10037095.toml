[translation]
10037095-3 = "Ugh...!"
10037095-9 = "Não somos páreo para eles... são números demais."
10037095-10 = "[s] （Ajuda Mina e Marina a se levantarem）"
10037095-15 = "[ns] （Fica na frente de Kisaki）"
10037095-21 = "……Sensei?"
10037095-22 = "Sensei……?"
10037095-23 = "O-o que você pretende fazer! Sensei!"
10037095-24 = "[s1] \"Não é bom interferir demais em conflitos entre estudantes.\"\n[s2] \"Mas, por agora, não quero que culpem tanto a Kisaki.\""
10037095-27 = "……Por que, Sensei?"
10037095-28 = "[s] （O verdadeiro motivo é que o estado de saúde da Kisaki não está bom, mas...）"
10037095-30 = "[ns] \"Talvez porque eu ache que a Kisaki está fazendo o seu melhor por Shanhaijing.\""
10037095-31 = "Dizer que é apenas uma diferença de perspectiva é ignorar muitas coisas que aconteceram."
10037095-32 = "Sobre a situação atual, também havia estudantes que sentiam insegurança.#nClaro, e também aqueles que não concordavam."
10037095-33 = "Acima de tudo, nós queríamos que a nossa Monarca seguisse o caminho correto."
10037095-34 = "Portanto, Sensei — por favor, saia da frente."
10037095-35 = "……O Clube de Ópera de Pequim não quer carregar a infâmia de ser um \"clube que se opõe ao Schale\"."
10037095-36 = "[s] \"…….\""
10037095-38 = "Faça como a Kaguya diz, Sensei."
10037095-39 = "[s] \"Mas…….\""
10037095-40 = "Está tudo bem. O que eles querem é a mim.#nO pessoal do Genryumon deve estar confuso também……."
10037095-41 = "Hehe…… O que uma Monarca que perdeu a confiança de todos pode fazer, afinal?"
10037095-42 = "Um governante abandonado pelo povo é o mesmo que um governante abandonado pelos céus."
10037095-43 = "Para mim…… não resta outro caminho a não ser este……."
10037095-49 = "――Por que estão choramingando tanto!"
10037095-53 = "O que foi isso!?"
