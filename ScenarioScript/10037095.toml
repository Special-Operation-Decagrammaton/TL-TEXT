[translation]
10037095-3 = "うっ……！"
10037095-9 = "[ruby=しゅうかてき]衆寡敵[/ruby]せずか……数が多すぎる。"
10037095-10 = "[s] （ミナとマリナを助け起こす）"
10037095-15 = "[ns] （キサキの前に立つ）"
10037095-21 = "……先生？"
10037095-22 = "先生……？"
10037095-23 = "な、何をするつもりだ！先生！"
10037095-24 = "[s1] \"生徒間の衝突に、干渉しすぎるのは良くないけど。\"\n[s2] \"でも、今はキサキのこと、あまり責めないでほしい。\""
10037095-27 = "……何故、ですか？"
10037095-28 = "[s] （本当の理由は、キサキの容態が良くないからなんだけど……）"
10037095-30 = "[ns] \"キサキは、山海経のために最善を尽くしていると思っているからかな。\""
10037095-31 = "視点の違い、で片付けるには、あまりにも多くの事が起きています。"
10037095-32 = "此度の事態についても、不安を抱く生徒はおりました。#n無論、賛成しない者も。"
10037095-33 = "何よ[ruby=わたし]り私た[/ruby]ちは、門主様に正しい道を歩んでほしかったのです。"
10037095-34 = "ですので、先生――そこを退いてください。"
10037095-35 = "……京劇部とて「シャーレと敵対する部活」という汚名を被りたくはありません。"
10037095-36 = "[s] \"……。\""
10037095-38 = "カグヤの言う通りにしてくれ、先生。"
10037095-39 = "[s] \"でも……。\""
10037095-40 = "いいのじゃ。彼奴らが求めているのは妾の身。#n玄龍門の皆も困惑しておるじゃろうて……。"
10037095-41 = "ふふ……皆の[ruby=しんぼう]信望[/ruby]を失った門主に、一体何ができると言うのじゃ。"
10037095-42 = "民から見捨てられた君主など、天に見捨てられたのと同じ。"
10037095-43 = "妾に……この道以外、他はないじゃろうて……。"
10037095-49 = "――何をめそめそしている！"
10037095-53 = "なんだ！？"
