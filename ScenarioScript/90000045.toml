[translation]
90000045-4 = "ビナーのデータ、集めてきたよ。"
90000045-5 = "はい、確認しました。確かにデカグラマトン3番目の預言者『ビナー』のデータですね。"
90000045-6 = "それでは分析に入ります、お疲れ様でした。"
90000045-7 = "[s] \"ありがとう、よろしく。\""
90000045-8 = "部長のアルゴリズムのおかげで、スムーズだった。"
90000045-9 = "当然です。あ、分析完了しました。モニターに出力しますね。"
90000045-16 = "……これで全部？"
90000045-17 = "今回確保したデータからは、これしか分かりませんでした。"
90000045-18 = "全貌には未だ遠いですが、まずは一歩目を踏み出せたというところですね。"
90000045-19 = "千里の道も一歩から、だね。"
90000045-20 = "はい。引き続きできる限りの情報を集めていきましょう。"
90000045-21 = "少し休んだら次ですね。"
90000045-28 = "次の目的地は……ミレニアム近郊の 「廃墟」です。"
90000045-30 = "次回;「データ収集（５）廃墟」"
