[translation]
10037070-1 = "Episódio 7: Na floresta de Yuzhou"
10037070-4 = "Ugh...!"
10037070-16 = "......"
10037070-17 = "(Minhas memórias estão confusas. O que exatamente aconteceu...)"
10037070-18 = "(Ah... eu estava na floresta de bambu com o pessoal de Red Winter... para ver os pandas... e então...)"
10037070-22 = "(E então...?)"
10037070-23 = "[ns] \"Kisaki, você acordou?\""
10037070-27 = "Sensei? Por que você está aqui..."
10037070-28 = "Não, é só que... preciso organizar meus pensamentos..."
10037070-32 = "......"
10037070-33 = "Poderia acender a luz? O quarto está tão escuro..."
10037070-44 = "Ugh...!"
10037070-45 = "[s] \"Desculpe, se estiver claro demais, quer que eu apague...?\""
10037070-46 = "...Não, está bem, por favor."
10037070-48 = "O que aconteceu na floresta de bambu?"
10037070-49 = "Todos viram os pandas e voltaram em segurança...?"
10037070-50 = "A presidente Marina tentou abraçar um panda, e a Mina teve problemas, não foi? Fufu..."
10037070-51 = "Ela realmente parece gostar de ursos. #nApesar daquela aparência, pandas também são um tipo de urso."
10037070-52 = "Quase virou um problema sério. #nMina deve ter tido muito trabalho com isso."
10037070-53 = "...Sentir-me envergonhada por não conseguir nem receber bem os convidados."
10037070-54 = "[s] \"......\""
10037070-55 = "O pessoal de Red Winter é muito interessante."
10037070-58 = "A Secretária Cherino, embora eu ainda não saiba suas verdadeiras intenções, parece ter muita força de vontade."
10037070-59 = "A Chefe de Gabinete Tomoe deixa transparecer uma astúcia que não consegue esconder."
10037070-60 = "A presidente Marina é... fufu, uma pessoa que, apesar do cargo que ocupa, sabe como nos divertir."
10037070-61 = "Todos eles são únicos à sua maneira..."
10037070-62 = "[s] \"......\""
10037070-66 = "......"
10037070-67 = "Ficou surpreso, Sensei?"
10037070-68 = "[s1] \"...Você não precisa se preocupar com os outros em momentos como este.\"\n[s2] \"Agora, cuide de si mesma.\""
10037070-71 = "Fufu, você diz isso para mim?"
10037070-72 = "Sobre o meu estado de saúde... o pessoal de Red Winter também sabe?"
10037070-73 = "[s] \"A Saya cuidou de tudo, então ninguém percebeu.\""
10037070-74 = "Entendo. Então estou aliviada."
10037070-75 = "[s] \"...Pode me contar?\""
10037070-76 = "Não é nada demais."
10037070-77 = "É apenas que... eu só consigo ficar ativa por algumas horas durante o dia."
10037070-78 = "[s] \"Isso não é uma doença grave ou algo do tipo?\""
10037070-79 = "Não se preocupe. Eu ainda consigo me mover. #n...Ainda serei capaz de cumprir meu dever."
10037070-80 = "Alguma outra aluna sabe disso?"
10037070-81 = "Até onde eu sei, apenas a Saya."
10037070-82 = "Ah. Nem mesmo a Rumi sabe. #nEu nunca contei a ninguém."
10037070-83 = "— Claro, Rumi é minha amiga. Nos conhecemos há muito tempo."
10037070-84 = "Mas, quando eu crescia junto com a Rumi, eu não era tão debilitada assim."
10037070-85 = "[s] \"Sua saúde piorou de repente?\""
10037070-89 = "......"
10037070-90 = "Tudo começou quando eu estava no segundo ano — sim, na época em que assumi o cargo de líder da seita."
10037070-93 = "É costume que o líder da seita seja um aluno do terceiro ano. #nNo entanto, o líder daquela época foi forçado a renunciar devido a um escândalo."
10037070-94 = "O sucessor — foi decidido por unanimidade que seria eu."
10037070-95 = "É uma história estranha. Aqueles que valorizam a tradição quebrarem o costume apenas para tornar eu, uma aluna do segundo ano, a líder..."
10037070-96 = "[s3] \"Isso seria, por acaso...\"\n[s4] \"Porque o cargo de Mestre é muito trabalhoso...?\""
10037070-101 = "……Fufu."
10037070-102 = "Você conhece o ditado: \"O silêncio é uma flor\", não conhece?"
10037070-103 = "――E então, quando eu estava no segundo ano. #nA primeira decisão que tomei ao assumir como Mestre foi expulsar uma certa aluna do terceiro ano."
10037070-104 = "Claro, houve muita resistência. #nDisseram que, ao aplicar tal punição, eu deveria seguir a tradição."
10037070-105 = "……É irônico. #nAqueles que me colocaram no cargo de Mestre quando eu estava no segundo ano, agora criticam usando a tradição como desculpa."
10037070-106 = "……Acabei me desviando do assunto."
10037070-107 = "As anormalidades no meu corpo começaram a aparecer... por volta daquela época."
10037070-108 = "Fufu. Talvez este seja o \"peso\" imposto àqueles que assumem o cargo de Mestre."
10037070-109 = "[s] \"…….\""
10037070-110 = "Não fique com essa cara triste. Eu tenho atuado muito bem até agora, não acha?"
10037070-111 = "Nem a Rumi, nem mesmo você, Sensei, tinham percebido. #nMinha atuação não é nada mal, não é mesmo?"
10037070-112 = "Se eu fosse de outra escola, talvez pudesse ter me tornado uma atriz."
10037070-113 = "Fufu. Parece que Kivotos perdeu uma excelente artista. #nNão acha, Sensei?"
10037070-114 = "[s5] \"Se está tão difícil, talvez sair escondida...\"\n[s6] \"Não seria melhor parar com isso...?\""
10037070-117 = "……Ah. Sem dúvida, você tem razão."
10037070-118 = "Se nem o meu próprio corpo obedece, eu deveria apenas descansar em silêncio."
10037070-119 = "Não há necessidade alguma... de me esgueirar para sair."
10037070-120 = "[s] \"…….\""
10037070-121 = "Mas, sabe... mesmo que isso não passe de um capricho meu."
10037070-122 = "Antes que... seja tarde demais..."
10037070-123 = "Quero gravar o máximo de coisas que puder com estes olhos. É só isso..."
10037070-124 = "[s7] \"Por que... manter isso em segredo?\"\n[s8] \"Se pedisse ajuda, talvez pudéssemos encontrar uma solução.\""
10037070-129 = "……."
10037070-130 = "Porque eu sou a \"Mestre do Genryumon\"."
10037070-141 = "Preciso mostrar uma imagem perfeita o tempo todo. #nCaso contrário... serei devorada."
10037070-142 = "Assim como aconteceu com o Mestre anterior."
10037070-145 = "Por que me apegar a este cargo de Mestre? #nFufu, se você pensa assim, é porque eu consegui aliviar um pouco o peso..."
10037070-146 = "Você se lembra, Sensei? De quando os convidados de Red Winter nos visitaram."
10037070-147 = "Eu ordenei que os guiassem ao estilo do \"Genryumon\", mas eles os enviaram para a sala de interrogatório."
10037070-148 = "Investigar conspirações e coisas do tipo... do jeito que as coisas estão, o Genryumon atual poderia cair na desordem se eu não estivesse aqui..."
10037070-149 = "[s9] \"B-bem, as outras escolas também são bem diversas, não são...?\"\n[s10] \"Como o Clube de Pesquisa Gastronômica ou o Departamento de Desenvolvimento de Fontes Termais...?\"\n[s11] \"O Departamento de Engenharia do Millennium também... ah, mas todos eles são boas pessoas...!\""
10037070-153 = "É verdade..."
10037070-154 = "……."
10037070-155 = "Mas, Sensei."
10037070-156 = "Eu... não posso simplesmente abandonar Shanhaijing."
10037070-160 = "(Kisaki, que estava deitada, levanta-se lentamente)"
10037070-167 = "(Kisaki encosta-se suavemente em seu peito)"
10037070-168 = "(A luz da lua que entra pela janela corta o silêncio)"
10037070-171 = "Sensei, por favor, eu lhe peço."
10037070-172 = "Sobre mim, e sobre tudo o que me diz respeito... não conte a ninguém."
10037070-173 = "Saya é alguém que cumpre promessas. #nNão há como... esse assunto vazar..."
10037070-174 = "[s] \"……Entendido.\""
10037070-175 = "Eu te fiz sofrer, não foi, Sensei?"
10037070-176 = "Não se preocupe. Eu ainda estou viva."
10037070-180 = "(Acaricia gentilmente a cabeça de Kisaki)"
10037070-181 = "Ah... que bom. O cansaço do corpo e da mente está desaparecendo..."
10037070-182 = "Não fique tão triste. #nIsso é algo que só posso pedir a você, porque é você, Sensei."
10037070-187 = "(Kisaki levanta o rosto e nossos olhares se cruzam)"
10037070-188 = "(Com um sorriso sereno em seus olhos límpidos — diante de tal imagem dela, acabei desviando o olhar)"
10037070-195 = "……Mestra, como está se sentindo?"
10037070-196 = "Sinto-me bem melhor. Não precisa se preocupar."
10037070-197 = "Mas é estranho... mesmo tendo tomado o remédio direitinho hoje..."
10037070-198 = "Sim... foi por causa disso que vim aqui."
10037070-204 = "……Por favor, ouça com atenção. #nNa verdade, o remédio da Mestra foi trocado."
10037070-205 = "……!?"
10037070-206 = "……Acho que a Mestra entende o que isso significa."
10037070-212 = "Quer que eu puna a Sociedade de Pesquisa de Alquimia?"
10037070-213 = "Estou preparada para isso... #nMas há um problema ainda maior —"
10037070-214 = "Há um informante na Sociedade de Pesquisa de Alquimia."
10037070-215 = "Não consigo pensar em outra explicação..."
10037070-216 = "……Quem diria que chegaríamos a esse ponto..."
10037070-217 = "A partir de amanhã, eu mesma prepararei o remédio. #nTambém parece necessário revisar toda a estrutura da Sociedade de Pesquisa de Alquimia..."
10037070-218 = "É triste... que a presidente da Sociedade de Pesquisa de Alquimia tenha que suspeitar de seus próprios membros..."
10037070-219 = "Não há o que fazer. Embora eu preferisse que isso não tivesse acontecido."
10037070-220 = "Mestra, tome cuidado também. Aceitarei qualquer punição por este caso..."
10037070-221 = "Ah. Você também, por favor, cuide-se."
10037070-222 = "Se ao menos eu conseguisse fazer um remédio um pouco mais perfeito..."
10037070-223 = "Se eu tivesse encontrado ingredientes que pudessem melhorar, nem que fosse um pouco, a condição da Mestra..."
10037070-224 = "Por enquanto, só consigo fazer algo com efeitos colaterais e de curta duração..."
10037070-225 = "O que está dizendo? Graças ao remédio que você preparou, estou aqui hoje."
10037070-229 = "Mestra... eu lhe peço. Por uma semana... ou pelo menos amanhã, cancele toda a sua agenda e descanse."
10037070-230 = "……Fufu, isso é impossível. Tenho visitas chegando."
10037070-231 = "Claro, assim que terminar, irei descansar. #nPor isso... perdoe esta paciente teimosa."
10037070-232 = "……Entendido."
10037070-238 = "Um telefone...?"
10037070-242 = "Para mim, suponho. #nIsto é... Kaguya?"
10037070-249 = "Kaguya, precisa de algo?"
10037070-253 = "Peço desculpas pelo horário tardio. É que há algo que preciso comunicar à Mestra. #n— Bem, a nova ópera de Pequim ficou pronta!"
10037070-254 = "Se não for incômodo, #ngostaria de apresentá-la amanhã para a Mestra e todos de Red Winter... #nVocê poderia me dar permissão?"
10037070-255 = "Uma nova ópera de Pequim... hum, bom trabalho."
10037070-256 = "Permissão concedida. A Secretária-Geral Cherino gosta bastante das suas peças, afinal."
10037070-257 = "Muito obrigada por aceitar prontamente!"
10037070-258 = "Bem, peço desculpas por pedir novamente, mas já que vou apresentar, #ngostaria de convidar todos do Genryumon..."
10037070-259 = "Hum... tudo bem. O parque Byakko é grande. #nMuitos no Genryumon também apreciam a ópera de Pequim."
10037070-260 = "Obrigada, Mestra! Farei o meu melhor nos preparativos!"
10037070-265 = "Uma nova ópera de Pequim...?"
10037070-266 = "Ela deve ter se sentido muito inspirada por Red Winter. #nTalvez os artistas sejam assim por natureza."
10037070-267 = "Que tal mudarmos um pouco de ares?"
10037070-268 = "O que acham, vocês também virão assistir? #nPosso reservar lugares."
10037070-269 = "Hmm... acho que a Sociedade de Pesquisa de Alquimia deveria manter um perfil baixo por enquanto..."
10037070-270 = "Um descanso também é importante. #nSe apenas reprimirmos tudo, a insatisfação acabará transbordando."
10037070-271 = "Além disso, sobre a Sociedade de Pesquisa de Alquimia, você já não aplicou as devidas sanções?"
10037070-272 = "……Quando você percebeu?"
10037070-273 = "Eu sabia que você faria isso. #nFufu, estou ansiosa pelo dia de amanhã..."
