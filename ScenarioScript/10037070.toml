[translation]
10037070-1 = "第7話;渝州の森林にて　"
10037070-4 = "うっ……！"
10037070-16 = "……。"
10037070-17 = "（記憶が、混濁しておる。一体何があったのじゃ……）"
10037070-18 = "（ああ……レッドウィンターの者と竹林で……パンダを見ることになって……それで……）"
10037070-22 = "（それで……？）"
10037070-23 = "[ns] \"キサキ、目が覚めた？\""
10037070-27 = "先生？どうして、ここに……。"
10037070-28 = "いや、少し……頭の整理を……。"
10037070-32 = "……。"
10037070-33 = "灯りを、つけてくれるかの？部屋が、暗くて……。"
10037070-44 = "うっ……！"
10037070-45 = "[s] \"ごめん、明るすぎるようなら消そうか……？\""
10037070-46 = "……すまない、頼む。"
10037070-48 = "竹林で、どうなったのじゃ？"
10037070-49 = "皆パンダを見て無事に帰った……？"
10037070-50 = "マリナ委員長がパンダを抱っこしようとして、ミナが大変じゃった？ふふ……。"
10037070-51 = "彼女は、まこと熊が好きなようじゃ。#nあの外見とは裏腹に、パンダも熊の一種。"
10037070-52 = "大事になるところじゃったのう。#nミナもさぞかし手を焼いたことじゃろうて。"
10037070-53 = "……客人のもてなしすらままならぬとは、[ruby=じくじ]忸怩[/ruby]たる思いじゃ。"
10037070-54 = "[s] \"……。\""
10037070-55 = "レッドウィンターの者は、皆面白いの。"
10037070-58 = "チェリノ書記長は、まだ本音は分からぬが、随分と気骨があるようじゃの。"
10037070-59 = "トモエ秘書室長は、隠しきれぬ知謀が垣間見える。"
10037070-60 = "マリナ委員長は……ふふ、あの座に居る割には、楽しませてくれる人物じゃ。"
10037070-61 = "皆、それぞれに個性的で良いのう……。"
10037070-62 = "[s] \"……。\""
10037070-66 = "……。"
10037070-67 = "驚いたか？先生。"
10037070-68 = "[s1] \"……こういう時まで、他人に気を配る必要はないよ。\"\n[s2] \"今は、自分自身を大切にして。\""
10037070-71 = "ふふ[ruby=わらわ]、妾に[/ruby]そう言ってくれるのかえ。"
10037070-72 = "妾の容態は……レッドウィンターの者にも？"
10037070-73 = "[s] \"サヤが上手くやってくれたから、誰も気づいてないよ。\""
10037070-74 = "そうか。なら安心じゃの。"
10037070-75 = "[s] \"……話してくれる？\""
10037070-76 = "なに、大したことではない。"
10037070-77 = "ただ……妾は一日のうち、数時間しか活動できないだけじゃ。"
10037070-78 = "[s] \"それって、大きな病気とかじゃないの？\""
10037070-79 = "案ずるな。妾はまだ動ける。#n……まだ、務めを果たせるじゃろうて。"
10037070-80 = "この事を知っている生徒？"
10037070-81 = "妾の知る限り、サヤだけじゃ。"
10037070-82 = "ああ。ルミでさえ知らぬよ。#n口外しておらぬからの。"
10037070-83 = "――無論、ルミは妾の友じゃ。付き合いも長い。"
10037070-84 = "じゃが、ルミと共に育っていた頃の妾は、ここまで衰弱しておらなんだ。"
10037070-85 = "[s] \"急に身体が弱くなったの？\""
10037070-89 = "……。"
10037070-90 = "すべては、妾が2年生の時――そう、門主の座に就いた頃の事。"
10037070-93 = "門主は3年生が務めるのが慣例じゃ。#nしかし、当代の門主は不祥事で失脚を余儀なくされたのじゃ。"
10037070-94 = "後任は――妾で満場一致じゃった。"
10037070-95 = "不思議な話じゃ。伝統を重視する者が慣例を破ってまで、2年生だった妾を門主にしようとするなど……。"
10037070-96 = "[s3] \"それって、もしかして……。\"\n[s4] \"門主は、苦労が多いから……？\""
10037070-101 = "……ふふ。"
10037070-102 = "言わぬが花、という言葉は知っておろう？"
10037070-103 = "――して、2年生の時。#n門主に就いて初めて妾が下した決定は、とある3年生を退学させることじゃった。"
10037070-104 = "無論、反発も多かった。#nそのような処罰を下す際は、伝統に則って執り行うべきである、と。"
10037070-105 = "……皮肉な話じゃ。#n2年生を門主の座に就かせた[ruby=あやつ]彼奴[/ruby]らが、伝統を口に批判するなんてな。"
10037070-106 = "……話が逸れてしまったの。"
10037070-107 = "妾の身体に異常が現れたのは……その頃からじゃ。"
10037070-108 = "ふふ。これが門主に就いた者に課せられた「重み」なのかもしれぬの。"
10037070-109 = "[s] \"……。\""
10037070-110 = "そう暗い顔をするでない。妾は、今までよく演じられておったろう？"
10037070-111 = "ルミはもちろん、先生にすら気づかれておらんかったのじゃ。#n妾の演技も、捨てたものではないのう。"
10037070-112 = "もし妾が他学園の人間だったら、女優になれたかもしれぬ。"
10037070-113 = "ふふ。キヴォトスは、一人の優秀な演者を失ったようじゃ。#nそうは思わぬか？先生。"
10037070-114 = "[s5] \"そんなに大変なら、お忍びで抜け出すのも……\"\n[s6] \"やめた方がいいんじゃない……？\""
10037070-117 = "……ああ。間違いなく、[ruby=そなた]其方[/ruby]の言う通りじゃ。"
10037070-118 = "己の身体すらままならぬのなら、大人しく静養していれば良い。"
10037070-119 = "わざわざ抜け出す必要など……どこにもありはせぬ。"
10037070-120 = "[s] \"……。\""
10037070-121 = "じゃがのう……これが、妾のワガママにすぎなくても。"
10037070-122 = "より……手遅れになる前に……。"
10037070-123 = "一つでも多くのものを、この目に刻みたい。ただそれだけなのじゃ……。"
10037070-124 = "[s7] \"どうして……内緒にしているの？\"\n[s8] \"助けを求めたら、方法が見つかるかもしれないのに。\""
10037070-129 = "……。"
10037070-130 = "「玄龍門の門主」、じゃからの。"
10037070-141 = "いつでも完璧な姿を見せねばならぬ。#nさもなければ……喰われてしまうからの。"
10037070-142 = "先代の門主が、そうであったように。"
10037070-145 = "門主という座にこだわる必要？#nふふ、そう思えるのなら、少しは重荷を下ろせたのじゃが……。"
10037070-146 = "覚えておるか、先生。レッドウィンターの客人が訪問した時のことを。"
10037070-147 = "来客を「玄龍門式」に案内するよう申しつけたのに、彼奴らは客人を取調室へ送り込んだ。"
10037070-148 = "陰謀を暴くだのなんだの……あのように、今の玄龍門は、妾がいなければ無秩序な状態になってしまいかねん……。"
10037070-149 = "[s9] \"ほ、他の学園だって、みんな多種多様だからね……？\"\n[s10] \"美食研究会とか、温泉開発部とか……？\"\n[s11] \"ミレニアムのエンジニア部も……あ、でも皆いい子たちなんだよ……！\""
10037070-153 = "そうさな……。"
10037070-154 = "……。"
10037070-155 = "じゃが、先生。"
10037070-156 = "妾は……[ruby=みな]山海経[/ruby]を放っておけぬのじゃよ。"
10037070-160 = "（横になっていたキサキが、ゆっくりと身体を起こす）"
10037070-167 = "（キサキはそっと、胸元に寄りかかってきた）"
10037070-168 = "（窓から差し込んだ月の光が、静寂を切り裂いていく）"
10037070-171 = "先生、どうかお願いじゃ。"
10037070-172 = "妾の事、妾にまつわる事……誰にも口外しないでほしい。"
10037070-173 = "サヤは約束を守るやつじゃ。#nこの話が漏れることは……ありえぬ……。"
10037070-174 = "[s] \"……うん。\""
10037070-175 = "苦しませてしまったな、先生。"
10037070-176 = "案ずるでない。妾はまだ、生きておる。"
10037070-180 = "（キサキの頭を優しく撫でる）"
10037070-181 = "ああ……良いな。心身の疲れが、取れていく……。"
10037070-182 = "そう悲しむでない。#nこれは、先生だからこそ頼める事なのじゃ。"
10037070-187 = "（キサキが顔をあげ、視線が合う）"
10037070-188 = "（澄んだ瞳に穏やかな笑み――そんな彼女の姿に、つい、視線を逸らしてしまった）"
10037070-195 = "……門主、具合はどうなのだ？"
10037070-196 = "だいぶ楽になった。心配せずともよい。"
10037070-197 = "だが、おかしいのう。今日もちゃんと薬を飲んだというのに……。"
10037070-198 = "うん……そのことで来たのだ。"
10037070-204 = "……よく聞いてほしいのだ。#n実は――門主の薬がすり替えられているのだ。"
10037070-205 = "……！？"
10037070-206 = "……これが何を意味するのか、門主なら分かると思うのだ。"
10037070-212 = "薬を管理する錬丹術研究会に処罰をしろと？"
10037070-213 = "その覚悟ならできているのだ……。#nでも、それ以上に大きな問題があって――"
10037070-214 = "錬丹術研究会に、[ruby=・   ・   ・]内通者[/ruby]がいる。"
10037070-215 = "そうとしか思えないのだ……。"
10037070-216 = "……よもや、こんな事になってしまうとは……。"
10037070-217 = "明日からは、ぼく様が手ずから薬を調剤するのだ。#n錬丹術研究会のことも、組織全体を見直す必要がありそうだし……。"
10037070-218 = "悲しいのだ……錬丹術研究会の会長が、会員を疑うことになるだなんて……。"
10037070-219 = "仕方のないことじゃ。できれば、起きないでほしくはあるがの。"
10037070-220 = "門主も気をつけるのだ。この件の処罰なら、ぼく様はいくらでも受けるから……。"
10037070-221 = "ああ。其方もどうか気をつけるのじゃよ。"
10037070-222 = "ぼく様がもう少し、完璧な薬を作れていれば……。"
10037070-223 = "門主の容態を、少しでも改善できる薬材が見つけられたら良かったのに……。"
10037070-224 = "今は副作用つきの、効果も一時的なものしか作れないのだ……。"
10037070-225 = "何を言っておる。其方が調剤してくれた薬のおかげで、今の妾があるのじゃぞ。"
10037070-229 = "門主……お願いなのだ。一週間……せめて明日一日だけでも、スケジュールを全部取り消して安静にしてほしいのだ。"
10037070-230 = "……ふふ、それは無理な話じゃのう。客人が来ておるのじゃ。"
10037070-231 = "無論、事が終われば静養に移るとしよう。#nだから……この我儘な患者を許してほしいのじゃ。"
10037070-232 = "……分かったのだ。"
10037070-238 = "電話……？"
10037070-242 = "妾にかのう。#nこれは……カグヤ？"
10037070-249 = "カグヤ、何ぞ用でもあるかの？"
10037070-253 = "夜分遅くに失礼いたします。どうしても門主様にお伝えしたいことがあります故。#n――その、ちょうど、新しい京劇が仕上がったのです！"
10037070-254 = "もし宜しければ、#n明日、門主様とレッドウィンターの皆様の前で披露したいのですが……#nお許し願えますでしょうか。"
10037070-255 = "新しい京劇か……ふむ、ご苦労じゃった。"
10037070-256 = "開演も許可しよう。チェリノ書記長は、其方の劇を随分と気に入っておるからのう。"
10037070-257 = "ご快諾いただき、誠にありがとうございます！"
10037070-258 = "その、再度のお願いで恐縮なのですが、せっかくお見せするのなら、#n玄龍門の皆様を全員ご招待したいのですが……。"
10037070-259 = "ふむ……良いじゃろう。[ruby=びゃっこ]白虎[/ruby]公園は広い。#n玄龍門の中でも京劇を嗜む者は多いからのう。"
10037070-260 = "ありがとうございます、門主様[ruby=わたくし]！私、[/ruby]最善を尽くして準備いたします！"
10037070-265 = "新しい京劇……？"
10037070-266 = "よほどレッドウィンターに刺激を受けたのじゃろう。#n芸術家とは本来、ああいうものなのかもしれぬ。"
10037070-267 = "少し、気分転換するとしようか。"
10037070-268 = "どうじゃ、其方らも見にくるか？#n席なら用意しよう。"
10037070-269 = "うーん……今の錬丹術研究会は自粛した方が良いとは思うけど……。"
10037070-270 = "息抜きも大事じゃろうて。#n抑圧するばかりでは、いずれ不満が溢れてしまうものじゃ。"
10037070-271 = "それに、錬丹術研究会のことなら、其方がすでに相応の制裁を加えておるのじゃろう？"
10037070-272 = "……いつ気づいたのだ？"
10037070-273 = "其方なら、そうすると思っておったからの。#nふふ、明日が楽しみじゃ……。"
