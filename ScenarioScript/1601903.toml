[translation]
1601903-1 = "Hobby (provisório)"
1601903-3 = "Bem, aqui está o relatório do resultado do reconhecimento."
1601903-4 = "Para resumir, não aconteceu nada de especial."
1601903-5 = "[s] \"Que bom.\""
1601903-6 = "Sim. Destruí e explodi algumas coisas, e de quebra, serviu para aliviar o estresse."
1601903-7 = "[s] \"Aconteceu algo de especial, sim!?\""
1601903-8 = "No entanto, este lugar é realmente misterioso."
1601903-9 = "Toda vez que saio para reconhecimento, algo muda, mesmo nas mesmas coordenadas."
1601903-10 = "O único ponto em comum é que tudo é feito de metal."
1601903-11 = "Se não fosse pelas informações de coordenadas, eu teria me perdido há muito tempo."
1601903-12 = "É como se eu estivesse entrando em um labirinto."
1601903-13 = "[s1] \"Isso parece muito perigoso...\"\n[s2] \"Não precisa se forçar a fazer o reconhecimento...\""
1601903-16 = "Isso seria um problema."
1601903-17 = "Como o Sensei não vai para a linha de frente, talvez não saiba, mas..."
1601903-18 = "Há pouco, três criaturas que pareciam animais feitos de metal vieram correndo em minha direção."
1601903-19 = "[s] \"Não foi perigoso!?\""
1601903-20 = "Sim, foi perigoso, de fato."
1601903-21 = "Foi tão fofo que quase desmaiei!"
1601903-22 = "[s] \"...Hã?\""
1601903-23 = "Quando me aproximei, elas rolaram no chão e mostraram a barriga."
1601903-24 = "Quando fiz carinho, elas ficaram muito felizes."
1601903-25 = "[s3] \"Uau, que inveja...!\"\n[s4] \"Mas, será que elas são realmente animais de metal...?\""
1601903-28 = "Provavelmente."
1601903-29 = "Pelo menos a textura era de metal puro."
1601903-30 = "Eu queria ter trazido uma comigo, mas depois que terminamos de brincar, elas foram embora."
1601903-31 = "...Fim do relatório."
1601903-32 = "[s] \"Se for assim, me inclua também!\""
1601903-33 = "Que pena, mas isso é um privilégio de quem está em campo. V-sign."
1601903-34 = "Dito isso, é uma pena que tudo o que vi e ouvi aqui seja confidencial."
1601903-35 = "Não posso falar sobre isso nas minhas transmissões."
1601903-36 = "[s] \"Transmissões?\""
1601903-37 = "Ora, você não sabia?"
1601903-38 = "Quem diria que o Sensei era tão antiquado."
1601903-39 = "Mas não se preocupe. Eu o auxiliarei pelo resto da vida."
1601903-40 = "[s5] \"Eu também sei o que são transmissões!\"\n[s6] \"É que foi uma surpresa ouvir a Toki falar sobre isso.\""
1601903-43 = "Ora, você não sabia?"
1601903-44 = "Quem diria que o Sensei era tão indiferente aos seus alunos."
1601903-45 = "Olhe só para mim, estou toda desanimada."
1601903-46 = "De tanta solidão e tristeza, perdi todas as forças do meu corpo."
1601903-47 = "Isso é culpa da indiferença do Sensei."
1601903-48 = "Portanto, o Sensei deve me fazer carinho rapidamente."
1601903-52 = "(Fiz carinho na cabeça da Toki...)"
1601903-54 = "Muito bom."
1601903-55 = "Energias recuperadas, estou perfeita."
1601903-56 = "[s] \"Que bom...\""
1601903-57 = "Bem, vamos voltar ao assunto."
1601903-58 = "Como você me aconselhou a procurar um hobby, tentei várias coisas."
1601903-59 = "Nesse meio tempo, comecei a me interessar por transmissões."
1601903-60 = "Dentre elas, a cultura das doações é impressionante."
1601903-61 = "Dependendo do valor doado, a reação do streamer muda."
1601903-62 = "A dinâmica entre o streamer e o espectador é muito interessante, eu diria."
1601903-63 = "[s] \"Toki... você não está fazendo nada estranho, está...?\""
1601903-64 = "Não estou."
1601903-65 = "Eu estou apenas assistindo."
1601903-66 = "Além das lives, há muitos vídeos interessantes também. Por exemplo..."
1601903-72 = "Compilado de gameplays de tudo um pouco"
1601903-73 = "[Notícia triste] O mascote da Highlander, \"Shuppo\", é impopular?"
1601903-77 = "Mais uma derrota, reações dos fãs do Corgi Braves"
1601903-78 = "Sobre a correlação entre germânio e íons negativos"
1601903-83 = "A verdadeira identidade de Peroro, na verdade era um hipopótamo kkkkk"
1601903-84 = "[s] \"...\""
1601903-85 = "..."
1601903-86 = "Este mundo é cheio de diversidade, não é?"
1601903-87 = "[s7] \"O-o que eu deveria fazer...\"\n[s8] \"A Toki foi corrompida por algo estranho...\""
1601903-90 = "Não se preocupe. Não fui corrompida."
1601903-91 = "...Ainda."
1601903-92 = "Mas houve um canal que até eu achei difícil de acompanhar."
1601903-93 = "...O nome do canal?"
1601903-94 = "Se não me engano..."
1601903-95 = "Chamava-se algo como \"Diário Ninja da Michiru-chi\"..."
1601903-96 = "[s] \"...\""
1601903-97 = "É um conteúdo sobre... fazer vários desafios, e eu tentei assistir até o fim, mas..."
1601903-98 = "Foi bem difícil... um oponente formidável."
1601903-99 = "Um dia eu certamente ficarei mais forte, mas pelo menos por enquanto, parece que ainda não é a hora."
1601903-100 = "[s] \"Acho que você não precisa ficar forte nesse tipo de coisa...\""
1601903-101 = "É mesmo?#nNão entendo bem o que quer dizer, mas..."
1601903-102 = "Sim? O que quer dizer com \"se há outros\"?"
1601903-103 = "Ah, sobre hobbies? Eu tenho, sim."
1601903-104 = "Mas Sensei, assistir a lives e outros hobbies são apenas provisórios."
1601903-105 = "É apenas um interesse momentâneo, pode ser que mude de repente a qualquer hora."
1601903-106 = "Afinal, meu verdadeiro hobby é..."
1601903-107 = "..."
1601903-108 = "Vamos encerrar este assunto por aqui."
1601903-109 = "[s] \"Você ficou boa em mudar de assunto, hein!\""
1601903-110 = "Isso também é graças ao Sensei."
1601903-111 = "Pois eu sou Asuma Toki, alguém que continua crescendo a cada dia."
1601903-112 = "[s] \"E-é verdade...\""
1601903-113 = "As pessoas estão sempre sendo influenciadas por quem está ao seu redor."
1601903-114 = "E assim, elas crescem pouco a pouco."
1601903-115 = "Portanto..."
1601903-116 = "..."
1601903-117 = "Os jogos também foram interessantes."
1601903-118 = "E os mangás também."
1601903-119 = "[s] \"Você parece que se daria bem com o pessoal do Clube de Desenvolvimento de Jogos.\""
1601903-120 = "Sim. Na verdade, a Alice se tornou uma boa rival."
1601903-121 = "No momento, estou perdendo por uma partida, mas acho que posso recuperar o prejuízo logo."
1601903-122 = "Comparada a ela, a Yuzu é..."
1601903-123 = "[s] \"Não está em outro nível, talvez...?\""
1601903-124 = "O Sensei também sabe bem, não é..."
1601903-125 = "Percebi que, quando se enfrenta um oponente forte demais, a gente nem sente frustração."
1601903-126 = "Diante de desastres naturais como terremotos ou tufões... as pessoas são simplesmente impotentes."
1601903-127 = "[s] (A Yuzu é nível desastre natural, então...)"
1601903-129 = "(Conversamos sobre coisas triviais enquanto terminávamos o trabalho e assistimos a vários canais com a Toki)"
1601903-130 = "(Senti um peso no meu ombro e, ao olhar para o lado, vi que a Toki tinha adormecido sem que eu percebesse)"
