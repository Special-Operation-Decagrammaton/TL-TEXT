[translation]
10000005-1 = "プロローグ"
10000005-2 = "（いつものようにシャーレで仕事をしていたところに、一本の電話が入った）"
10000005-4 = "プルルルルル！"
10000005-5 = "[s] \"ん？電話？\""
10000005-9 = "[ns] \"もしもし？\""
10000005-10 = "あっ、本当に出ちゃった！ど、どうしよう！？"
10000005-11 = "落ち着いて深呼吸デス委員長！スー！ハー！"
10000005-12 = "わ、分かった。すぅ、はぁ……。"
10000005-13 = "えっと、もしもし！その、こちらは……"
10000005-14 = "シャーレの[USERNAME]先生のお電話番号で、お間違いないでしょうか？"
10000005-15 = "[s1] \"はい、シャーレの先生です。\"\n[s2] \"人違いです。\""
10000005-16 = "あっ、合ってた！良かった……！"
10000005-17 = "……じゃなくて！すみません、その……"
10000005-18 = "え！？ま、間違ってましたか！？"
10000005-19 = "ああもう、頭の片隅では何となくこうなるんじゃないかと思ってたけど！"
10000005-20 = "なんか「渋々教えてあげる」みたいな感じだったし、やっぱり騙された！"
10000005-21 = "[s3] \"冗談だよ、こちらシャーレ。\""
10000005-22 = "！？"
10000005-23 = "な、何だかちょっと意地悪というかお茶目な……じゃなくて！"
10000005-25 = "[s] \"初めまして、どういった用件かな？\""
10000005-27 = "あ、えっと……んんっ、よし……。"
10000005-28 = "あらためて……初めまして、シャーレの[USERNAME]先生！"
10000005-29 = "私、シズコって言います！"
10000005-30 = "シズコ実は、百鬼夜行連合学院に所属してる「お祭り運営委員会」の委員長で、"
10000005-31 = "なんと！同時に、百夜堂の看板娘だったりします☆"
10000005-32 = "そ、それで、今回お電話させていただいたのは……"
10000005-33 = "私たちの百鬼夜行連合学院で開かれる春のお祭り、"
10000005-34 = "「[ruby=ももよのはるのおうかさい]百夜ノ春ノ桜花祭[/ruby]」に、先生をご招待するためです！"
10000005-35 = "[s4] \"百夜ノ春ノ……？\"\n[s5] \"桜花祭……？\""
10000005-36 = "はい！お忙しいかと思うのですが、よろしければお越しいただけませんか？"
10000005-37 = "はい！お忙しいかと思うのですが、よろしければお越しいただけませんか？"
10000005-38 = "今回の「百夜ノ春ノ桜花祭」……通称「桜花祭」では、以前には無かった新しい試みも行う予定なんです！"
10000005-39 = "それからちょーっとだけ、大したことではないのですが、先生にご相談したいこともありまして。来てくれると、シズコとっても嬉しいです！ではでは！"
10000005-40 = "……ふぅ。"
10000005-42 = "よ、よし！できた！フィーナ！ちゃんとできたかも！"
10000005-43 = "サスガ委員長、Good jobデス！"
10000005-46 = "ピロン"
10000005-47 = "（一枚の写真が届いた）"
10000005-48 = "会場までの案内図も兼ねているので、桜花祭のポスターをお送りします。"
10000005-49 = "では、シズコは先生が来てくれるのをすっごく、す～っごく楽しみにしてますね！"
10000005-50 = "では、百夜堂でお待ちしておりますので！にゃんにゃん♪"
10000005-52 = "[ns] \"桜花祭に、百夜堂か……。\""
10000005-55 = "（そして、桜花祭が開かれる百鬼夜行の自治区に到着した）"
10000005-57 = "#video;10000"
10000005-59 = "百鬼夜行・第七商店街"
10000005-60 = "（熱気溢れるこのお祭り独特の雰囲気、そしてそれを楽しむ人たちの歓声に包まれた街の中で、）"
10000005-61 = "（どこからかふと、可愛らしい声が耳に届く）"
10000005-63 = "あっ、あっ！危ないですーーっっっ！？"
10000005-68 = "いたた……"
10000005-70 = "はっ！"
10000005-75 = "ああっ、すみません！えっと、大丈夫ですか？お怪我はありませんか！？"
10000005-76 = "[s6] \"うん、大丈夫。よそ見しててごめんね。\"\n[s7] \"どこかの骨が折れた気が……。\""
10000005-78 = "そ、そうですか。それは良かったです……！"
10000005-80 = "そんな！？い、医者を！救急車を！？"
10000005-81 = "[s8] \"ごめんごめん、冗談。大丈夫だよ。\""
10000005-83 = "え、あ、冗談でしたか……。"
10000005-84 = "待てー！逃がさないんだから！"
10000005-86 = "か、カエデちゃんもちょっと待ってください……はあ、はあ……は、速すぎます……。"
10000005-88 = "はっ、もうこんなところにまで！"
10000005-90 = "えっと、えぇっと！ど、どうすれば！？"
10000005-91 = "[s] \"……手助けした方が良い感じかな？\""
10000005-93 = "へ？そ、それは、その……。"
10000005-94 = "見つけた！ミモリ先輩、あっち！"
10000005-98 = "あっ……！"
10000005-101 = "（しばらく二人で走って、何とか逃げ切ることができた）"
10000005-104 = "ふぅ……ここまで来れば大丈夫そうですね。"
10000005-105 = "えっと、イズナを助けてくれてありがとうございました！"
10000005-106 = "ところで、あなたは……。"
10000005-107 = "百鬼夜行の生徒ではなさそうですし、大人の方……？"
10000005-108 = "[s] \"初めまして、シャーレで先生をしている者です。\""
10000005-109 = "シャーレ、先生……？"
10000005-110 = "あ、もしかして……！"
10000005-111 = "イズナ、聞いたことあります！"
10000005-112 = "シャーレには、キヴォトスの色々な事件をズバッと解決してくれる、すごい大人の人がいるって！"
10000005-113 = "どこにでも現れて即座に解決……まるで忍者みたいです！"
10000005-114 = "[s] \"……忍者？\""
10000005-115 = "まさか噂の先生にお会いできるだなんて……！"
10000005-120 = "すごい、本物なんですね！"
10000005-121 = "ですが、シャーレの先生がどうしてここに？"
10000005-122 = "[s] \"この、百夜ノ春ノ桜花祭を見に。\""
10000005-123 = "なるほど……そうだったんですね！"
10000005-126 = "せっかくの桜花祭ですし……よろしければイズナに、このお祭りを案内させてください！"
10000005-129 = "見てください、あそこ！屋台で百鬼夜行の名物、キツネせんべいを売ってます！"
10000005-131 = "あ、あっちには桜花祭と言えば外せない、タヌキ印のお好み焼きも売っていますし！"
10000005-132 = "あとは、桜の花びらで作ったサクラ大福も、とっても美味しいんですよ！"
10000005-133 = "桜花祭の名物なんです、えへへっ！"
10000005-137 = "そうだ、せっかくですし……"
10000005-138 = "百夜ノ春ノ桜花祭といえば、あれを見に行かなくては！"
10000005-139 = "こっち、こっちです先生！"
10000005-144 = "百鬼夜行・展望台"
10000005-148 = "[ns9] \"……すごいね。\"\n[ns10] \"あんなに大きい木が……。\""
10000005-149 = "えへへっ、ですよね？ちょうどこの時期に一番綺麗に咲く、百鬼夜行の自慢です！"
10000005-150 = "えへへっ、ですよね？ちょうどこの時期に一番綺麗に咲く、百鬼夜行の自慢です！"
10000005-151 = "イズナは、ご神木と百鬼夜行の街並みとが同時に見渡せるこの場所が、大好きなんです！"
10000005-152 = "ここでこうしていると、イズナも夢のためにまだまだ頑張らなきゃって気持ちになります。"
10000005-153 = "[s] \"夢？\""
10000005-154 = "はい！イズナには夢があるんです！"
10000005-155 = "キヴォトスで、一番の忍者になるという夢が……！"
10000005-156 = "今日も今日とて、そのために日々……！"
10000005-157 = "[s] \"……忍者？\""
10000005-158 = "……はっ！？"
10000005-159 = "す、すみません、その、こんな夢を持ってる人なんて今どきいないことは知っているのですが……で、でも……！"
10000005-160 = "[s11] \"ううん、かっこいいと思う。\"\n[s12] \"夢があるのは良いことだね、応援してる。\""
10000005-161 = "あ……"
10000005-162 = "あ……"
10000005-163 = "イズナの夢を、応援……。"
10000005-164 = "それがその、たとえ、忍者になりたいという……"
10000005-165 = "そんな、あまり普通の学生は言わないような夢でも、ですか？"
10000005-166 = "[s] \"どんな夢でも、生徒の夢は応援したいな。\""
10000005-167 = "……っ！"
10000005-168 = "そ、そう言っていただけたのは先生が初めてです！"
10000005-169 = "え、えへへへっ、そ、そうですか……！"
10000005-170 = "イズナの夢を応援してくれるなんて……！"
10000005-171 = "まだ色々と失敗も多い身ではありますが、"
10000005-172 = "あらためて、イズナは立派な忍者になってみせます！"
10000005-173 = "……あっ！雇い主の依頼を終えていないのを思い出しました……！"
10000005-174 = "すみません、イズナはお先に失礼します！"
10000005-175 = "では先生、また！"
10000005-176 = "依頼が終わった後、また一緒に桜花祭を楽しめたら嬉しいです！"
10000005-178 = "（そうしてイズナは現れた時と同じく、風のように消えていった）"
