[translation]
10000005-1 = "Prólogo"
10000005-2 = "（Enquanto eu trabalhava na Schale como de costume, recebi uma ligação.）"
10000005-4 = "Prrrrr!"
10000005-5 = "[s] \"Hmm? O telefone?\""
10000005-9 = "[ns] \"Alô?\""
10000005-10 = "Ah, ele atendeu mesmo! O que eu faço?!"
10000005-11 = "Acalme-se e respire fundo, Presidente! Inspira! Expira!"
10000005-12 = "O-ok. Inspira, expira..."
10000005-13 = "Um, alô! Aqui é..."
10000005-14 = "Estou falando com o número de telefone do Sensei [USERNAME] da Schale, correto?"
10000005-15 = "[s1] \"Sim, aqui é o Sensei da Schale.\"\n[s2] \"Número errado.\""
10000005-16 = "Ah, estava certo! Que alívio...!"
10000005-17 = "...Não, espera! Desculpe, umm..."
10000005-18 = "Hã?! Eu e-errei o número?!"
10000005-19 = "Ah, caramba, no fundo da minha mente eu já suspeitava que isso ia acontecer!"
10000005-20 = "Aquele jeito de 'vou te contar a contragosto' e tudo mais, eu sabia que tinha sido enganada!"
10000005-21 = "[s3] \"Tô brincando, aqui é a Schale.\""
10000005-22 = "!?"
10000005-23 = "V-você é um pouco maldoso, quer dizer, brincalhão... não!"
10000005-25 = "[s] \"Prazer em conhecê-la, em que posso ajudar?\""
10000005-27 = "Ah, umm... hmm, ok..."
10000005-28 = "Mais uma vez... prazer em conhecê-lo, Sensei [USERNAME] da Schale!"
10000005-29 = "Meu nome é Shizuko!"
10000005-30 = "Na verdade, eu sou a presidente do Comitê de Organização de Festivais da Academia Aliada Hyakkiyako, e,"
10000005-31 = "surpresa! Ao mesmo tempo, sou a garota propaganda da Hyakuyadou ☆"
10000005-32 = "E, bem, o motivo da minha ligação hoje..."
10000005-33 = "É para convidá-lo para o festival de primavera que será realizado na nossa Academia Aliada Hyakkiyako,"
10000005-34 = "o Festival das Cerejeiras em Flor de Hyakuya!"
10000005-35 = "[s4] \"Hyakuya de... ?\"\n[s5] \"Festival das Cerejeiras em Flor...?\""
10000005-36 = "Sim! Sei que deve estar ocupado, mas você poderia vir se quiser?"
10000005-37 = "Sim! Sei que deve estar ocupado, mas você poderia vir se quiser?"
10000005-38 = "Neste Festival das Cerejeiras em Flor de Hyakuya... ou Festival das Cerejeiras em Flor, para encurtar, também planejamos experimentar algumas coisas novas que nunca tivemos antes!"
10000005-39 = "E tem mais uma coisinha, nada de mais, que eu gostaria de consultar com você. Eu ficaria muuuito feliz se você viesse! Então, até logo!"
10000005-40 = "...Ufa."
10000005-42 = "O-ok! Consegui! Pina! Eu acho que consegui fazer direitinho!"
10000005-43 = "Como esperado da Presidente, Good job!"
10000005-46 = "*Bip*"
10000005-47 = "（Recebi uma foto.）"
10000005-48 = "Estou enviando o pôster do Festival das Cerejeiras em Flor, que também serve como um mapa para o local."
10000005-49 = "Então, eu estarei muito, muuuito ansiosa pela sua chegada!"
10000005-50 = "Estarei esperando por você na Hyakuyadou! Miau, miau ♪"
10000005-52 = "[ns] \"Festival das Cerejeiras em Flor e Hyakuyadou, huh...\""
10000005-55 = "（E então, cheguei ao distrito autônomo de Hyakkiyako, onde o Festival das Cerejeiras em Flor estava sendo realizado.）"
10000005-57 = "#video;10000"
10000005-59 = "Hyakkiyako - 7º Distrito Comercial"
10000005-60 = "（No meio da rua, envolto pela atmosfera calorosa única deste festival e pelos aplausos das pessoas aproveitando o evento,）"
10000005-61 = "（de repente, uma voz adorável chegou aos meus ouvidos de algum lugar.）"
10000005-63 = "Ah, ah! Cuidadoooooo!?"
10000005-68 = "Ai..."
10000005-70 = "Hah!"
10000005-75 = "Ah, me desculpe! Umm, você está bem? Está machucado?!"
10000005-76 = "[s6] \"Sim, estou bem. Desculpe por não estar prestando atenção.\"\n[s7] \"Acho que quebrei um osso em algum lugar...\""
10000005-78 = "A-ah, entendo. Que bom...!"
10000005-80 = "Como assim?! U-um médico! Uma ambulância?!"
10000005-81 = "[s8] \"Desculpe, desculpe, brincadeira. Estou bem.\""
10000005-83 = "Hã, ah, era brincadeira..."
10000005-84 = "Espere! Não vou deixar você escapar!"
10000005-86 = "K-Kaede-chan, espere um pouco também... *arf, arf*... v-você é rápida demais..."
10000005-88 = "Hah, elas já chegaram até aqui!"
10000005-90 = "Umm, eerr! O q-que eu faço?!"
10000005-91 = "[s] \"...Acha que seria uma boa ideia eu te ajudar?\""
10000005-93 = "Hã? I-isso seria..."
10000005-94 = "Achei! Mimori-senpai, ali!"
10000005-98 = "Ah...!"
10000005-101 = "（Corremos juntos por um tempo e conseguimos fugir de alguma forma.）"
10000005-104 = "Ufa... Acho que estamos bem se chegarmos até aqui."
10000005-105 = "Umm, obrigada por ajudar a Izuna!"
10000005-106 = "Por falar nisso, você é..."
10000005-107 = "Não parece ser um aluno da Hyakkiyako, é um adulto...?"
10000005-108 = "[s] \"Muito prazer, sou um Sensei que trabalha na Schale.\""
10000005-109 = "Schale, Sensei...?"
10000005-110 = "Ah, não me diga que...!"
10000005-111 = "Eu já ouvi falar!"
10000005-112 = "Ouvi dizer que tem um adulto incrível na Schale que resolve vários problemas de Kivotos em um piscar de olhos!"
10000005-113 = "Aparecendo em qualquer lugar e resolvendo as coisas na hora... exatamente como um ninja!"
10000005-114 = "[s] \"...Um ninja?\""
10000005-115 = "Nunca imaginei que encontraria o tão falado Sensei...!"
10000005-120 = "Incrível, é ele mesmo!"
10000005-121 = "Mas por que o Sensei da Schale está aqui?"
10000005-122 = "[s] \"Eu vim ver o Festival das Cerejeiras em Flor de Hyakuya.\""
10000005-123 = "Entendo... então é isso!"
10000005-126 = "Sendo o Festival das Cerejeiras em Flor e tudo mais... Se você quiser, deixe a Izuna ser sua guia por este festival!"
10000005-129 = "Olha lá! Tem uma barraca vendendo a especialidade da Hyakkiyako, os biscoitos de raposa!"
10000005-131 = "Ah, e ali eles estão vendendo o okonomiyaki da marca Tanuki, uma presença garantida no Festival das Cerejeiras em Flor!"
10000005-132 = "Além disso, os sakura daifuku, que são feitos com pétalas de cerejeira, também são deliciosos!"
10000005-133 = "É uma especialidade do Festival das Cerejeiras em Flor, hehehe!"
10000005-137 = "Oh, já que estamos aqui..."
10000005-138 = "Por falar no Festival das Cerejeiras em Flor de Hyakuya, temos que ir ver aquilo!"
10000005-139 = "Por aqui, Sensei, por aqui!"
10000005-144 = "Hyakkiyako - Mirante"
10000005-148 = "[ns9] \"...Incrível.\"\n[ns10] \"Pensar que tem uma árvore tão grande...\""
10000005-149 = "Eheheh, não é? O orgulho de Hyakkiyako, que atinge o pico de floração bem nesta época!"
10000005-150 = "Eheheh, não é? O orgulho de Hyakkiyako, que atinge o pico de floração bem nesta época!"
10000005-151 = "Eu amo este lugar, de onde posso admirar tanto a Árvore Sagrada quanto a paisagem urbana de Hyakkiyako ao mesmo tempo!"
10000005-152 = "Ficar aqui assim me faz sentir que ainda preciso me esforçar mais pelo meu sonho."
10000005-153 = "[s] \"Sonho?\""
10000005-154 = "Sim! A Izuna tem um sonho!"
10000005-155 = "O sonho de se tornar a melhor ninja de Kivotos...!"
10000005-156 = "E é por isso que hoje, assim como todos os outros dias, eu...!"
10000005-157 = "[s] \"...Ninja?\""
10000005-158 = "...Hah!?"
10000005-159 = "D-desculpe, umm, eu sei que quase ninguém tem um sonho assim hoje em dia... m-mas...!"
10000005-160 = "[s11] \"Não, acho legal.\"\n[s12] \"É bom ter um sonho, estou torcendo por você.\""
10000005-161 = "Ah..."
10000005-162 = "Ah..."
10000005-163 = "Torcendo pelo sonho da Izuna..."
10000005-164 = "Mesmo que esse sonho, hum, seja querer se tornar uma ninja..."
10000005-165 = "Um sonho que alunos normais não costumam ter?"
10000005-166 = "[s] \"Eu quero apoiar o sonho de um aluno, não importa qual seja.\""
10000005-167 = "...!"
10000005-168 = "V-você é a primeira pessoa a me dizer isso, Sensei!"
10000005-169 = "E-ehehehe, a-ah, é...?"
10000005-170 = "Torcer pelo sonho da Izuna...!"
10000005-171 = "Ainda sou alguém que comete muitos erros e falhas,"
10000005-172 = "mas eu com certeza me tornarei uma ninja esplêndida!"
10000005-173 = "...Ah! Eu me lembrei que não terminei a tarefa do meu empregador...!"
10000005-174 = "Desculpe, eu preciso ir na frente!"
10000005-175 = "Até mais, Sensei!"
10000005-176 = "Ficarei feliz em aproveitarmos o Festival das Cerejeiras em Flor juntos de novo quando a minha missão terminar!"
10000005-178 = "（E então, assim como quando apareceu, Izuna sumiu como o vento.）"
