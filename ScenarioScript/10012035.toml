[translation]
10012035-8 = "Ei, a gente perdeu de novo!! E olha que eu trouxe até um esquadrão de apoio～!!"
10012035-9 = "Não acha que ela está agindo de um jeito estranho? Por que ela está tão aérea assim!?"
10012035-11 = "P-Sensei...? Por que o Sensei está... aqui...?"
10012035-12 = "O Sensei está... eh...? Ué?"
10012035-14 = "Wakamo, sua boba! O que você está fazendo!?"
10012035-16 = "Wakamo, eu estou falando com você!!"
10012035-17 = "Ela está completamente fora de si."
10012035-18 = "B-bom, primeiro vamos recuar! Vamos levá-la de volta e, quando ela estiver melhor, a gente volta..."
10012035-24 = "Ai, ai, ai, dói!!"
10012035-25 = "Para, eu já entendi!!"
10012035-26 = "Tsc... droga...!"
10012035-27 = "Não pense que isso acaba aqui!!"
10012035-38 = "Quem será que eles eram, afinal..."
10012035-39 = "Talvez sejam aqueles que a Serika e a Hoshino mencionaram... os que estavam tentando roubar o nosso resort."
10012035-40 = "......Né, Sensei?"
10012035-41 = "[s1] \"Você está quase certa, mas...\"\n[s2] \"Tem algumas coisas que não são bem assim...\""
10012035-42 = "Falando nisso, uma daquelas pessoas chamou pelo nome do Sensei..."
10012035-43 = "Falando nisso, uma daquelas pessoas chamou pelo nome do Sensei..."
10012035-44 = "Por acaso, essa tal de Wakamo é sua conhecida...?"
10012035-45 = "[s3] \"Bem... é uma longa história...\"\n[s4] \"Talvez seja melhor você não saber...\""
10012035-48 = "......"
10012035-49 = "Sensei......"
10012035-50 = "......Ah!!"
10012035-51 = "......Ayane, o que houve?"
10012035-52 = "A vara de pescar... o equipamento..."
10012035-53 = "Parece que quebrou durante a luta..."
10012035-57 = "......?"
10012035-61 = "......!!!"
10012035-63 = "(Depois disso, consolamos a Shiroko, que estava desanimada, e voltamos todos para o resort)"
10012035-70 = "(Mesmo depois de voltar ao resort, Shiroko parecia ainda estar abalada por causa da vara de pescar)"
