[translation]
10012035-8 = "ちょっと、また負けちゃったじゃん！！せっかく応援部隊を連れて来たっていうのに～！！"
10012035-9 = "なんかこいつの様子変じゃない？なんでこんなボーっとしてんの！？"
10012035-11 = "せ、先生……？先生がどうして……ここに……？"
10012035-12 = "先生は……えっ……？あれ？"
10012035-14 = "ワカモ、馬鹿！あんた何やってんの！"
10012035-16 = "ワカモってば！！"
10012035-17 = "完全に呆けてますけど。"
10012035-18 = "ま、まずは退却しましょうよ！連れ帰って、コイツがしっかりしたらまた来るとか……。"
10012035-24 = "あっ、イタタ、痛い！！"
10012035-25 = "やめて、もう分かったから！！"
10012035-26 = "ちっ……クソッ……！"
10012035-27 = "これで終わりだと思わないでよね！！"
10012035-38 = "いったい誰だったんでしょうか……。"
10012035-39 = "セリカとホシノ先輩が言っていた……私たちのリゾートを奪おうとしていたやつらなのかも。"
10012035-40 = "……ね、先生？"
10012035-41 = "[s1] \"大体はあってるけど……。\"\n[s2] \"ちょっと違うとこもあるけど……。\""
10012035-42 = "そういえば、お一人、先生の名前を呼んでた方がいらっしゃいましたが……"
10012035-43 = "そういえば、お一人、先生の名前を呼んでた方がいらっしゃいましたが……"
10012035-44 = "もしかしてワカモという方はお知り合いだったり……？"
10012035-45 = "[s3] \"えっと……話せば長くなるけど……。\"\n[s4] \"知らない方がいいかも……。\""
10012035-48 = "……。"
10012035-49 = "先生……。"
10012035-50 = "……あっ！！"
10012035-51 = "……アヤネ、どうしたの？"
10012035-52 = "釣竿が……道具が……"
10012035-53 = "戦ってる間に、壊れてしまったみたいで……"
10012035-57 = "……？"
10012035-61 = "……！！！"
10012035-63 = "（その後、落ち込んだシロコを慰めて、みんなでリゾートに帰った）"
10012035-70 = "（リゾートに帰ってからも、シロコは釣竿のことを引きずっているようだった）"
