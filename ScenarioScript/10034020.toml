[translation]
10034020-1 = "第2話;一番大事なこと"
10034020-4 = "\"第一問：バンドに必要なものと言えば？\""
10034020-7 = "……え、いきなり何？"
10034020-8 = "バンドだったら……まあ、何はともあれ楽器でしょ。"
10034020-9 = "あとは、場所とか……？#n練習するにも、場所を確保しないと……。"
10034020-10 = "……それは当然、[ruby=Rock]ロック[/ruby]に決まってる。"
10034020-11 = "それと……観客？#n聴いてくれる人がいないと、意味ないと思うし。"
10034020-16 = "\"第二問：バンドで「一番重要なもの」は？\""
10034020-19 = "うーん……やっぱりボーカル？"
10034020-20 = "ビジュアルじゃない？#n観客を集めるにも、演奏以前に見た目が大事だと思うし。"
10034020-21 = "……ロック。やはりロックだよ。"
10034020-22 = "曲……ですかね？"
10034020-28 = "[ns1] \"たしかに、どれも重要だね。\"\n[ns2] \"じゃあ今、自分で言った内容を……\""
10034020-31 = "[ns3] \"それぞれが担当することにしよう！\"\n[ns4] \"あ、もちろん私に手伝えることがあったら言ってね。\""
10034020-39 = "……えっ。"
10034020-40 = "えええぇぇぇぇ～～！？！？"
10034020-42 = "は、はぁ！？ちょっと！#nこんな雑に決めちゃっていいの！？"
10034020-43 = "そりゃ最終的に、どれかしら担当することにはなるけど……。"
10034020-44 = "即興で定められた役割……これもまたロック。"
10034020-45 = "何がロックよ！#nさっきからロックロックうるさいわね！"
10034020-51 = "ナツはいつも通りでしょ。#n「ロマン」が「ロック」に変わっただけで。"
10034020-52 = "あはは……それはそうかも。"
10034020-53 = "……あれ。"
10034020-54 = "ま、待ってください。#n担当と言っても、具体的には何を……？"
10034020-56 = "……ビジュアルって言っても、色々あると思うけど。"
10034020-57 = "バンドのロゴ、とか……？"
10034020-58 = "……え、衣装も！？#n別に、やりたくないわけじゃないけど……"
10034020-59 = "まあ、やるからには私の好みで選ぶから！#nみんな、文句は禁止だからね！"
10034020-64 = "はぁ、変な衣装はやめてよ？"
10034020-68 = "……あれ、待って。"
10034020-69 = "さっき私、「ボーカル」って言っちゃったんだけど……。"
10034020-70 = "ボーカル就任、おめでと～！"
10034020-71 = "いやいや、待ってよ！#nほんとに良いの？こんな決め方で！"
10034020-73 = "良いと思う！#nカズサちゃんの歌声、聞いてみたいな！"
10034020-74 = "それに私、カズサちゃんの声すっごく好きだし……！"
10034020-75 = "おぉ、攻めるねアイリ……。"
10034020-76 = "い、いやそれは……！"
10034020-77 = "あ、アイリに言われたからって、その……！"
10034020-81 = "っ……！"
10034020-85 = "あぁっ、もう！！"
10034020-93 = "あははっ！#n最早やるって言ってるようなもんじゃない。"
10034020-94 = "ふふっ、これぞ青春……ああ、美しい春よ。"
10034020-95 = "……さて、ロックとは何を？"
10034020-96 = "「ロックをする」……これまた興味深い問いかけだねぇ。"
10034020-97 = "……えっ？"
10034020-98 = "バンドの運営とか、スケジュールの管理……？"
10034020-99 = "……掃除とか？"
10034020-100 = "そ、それのどこにロックの要素が……？"
10034020-101 = "[s5] \"ほら、ロックと苦労ってほぼ一緒だから。\"\n[s6] \"成功に向けた努力と情熱！それも「ロック」だよ！\""
10034020-106 = "えぇ……。"
10034020-107 = "そういう言葉遊びを求めてるわけじゃ……。"
10034020-108 = "うんうん、まさにロックじゃないの！#nロックはハングリー精神が大事って言うでしょ！"
10034020-115 = "青春は美しい、だっけ？#nじゃ、本番までよろしくね～ロック！"
10034020-116 = "くうっ……。"
10034020-117 = "……まさか今さら、「私はロックじゃない」なんて言わないわよね？"
10034020-118 = "……！！"
10034020-119 = "せっ……！"
10034020-120 = "青春は……！"
10034020-121 = "く、苦労がつきもの……。"
10034020-127 = "あはは……。"
10034020-131 = "となると、私は……あれ、曲の担当ってことですよね？"
10034020-132 = "作曲の経験なんて、無いのに……。"
10034020-133 = "まぁ学園祭のバンドなんて、どこも大抵コピーバンドでしょ。"
10034020-134 = "だから別に、作曲する必要は無いんじゃない？"
10034020-135 = "まぁ期待してるわよ。#nでも、あんま難しい曲はやめてよね。"
10034020-136 = "う、うん！#nそれくらいなら……。"
10034020-137 = "……私でも、やれると思う。"
10034020-141 = "[ns7] （……それくらいなら？）\n[ns8] （……私でも？）"
10034020-146 = "んじゃ、私はさっそく衣装を考えてくるわ！"
10034020-147 = "決まったら文句言わずに着るのよ、分かった？"
10034020-148 = "それとナツ、明日のスケジュールは？"
10034020-149 = "いや……ナツじゃなくてロックだったわね！"
10034020-156 = "……よくぞ聞いてくれた、悩める子羊よ。#n私はロック、未来を司る者。"
10034020-157 = "順応するの早くない？"
10034020-158 = "我々の明日の予定は……"
10034020-159 = "……楽器探し！"
10034020-160 = "……だそうよ！"
10034020-161 = "いつも遅刻してくるナツがスケジュール管理かぁ……。"
10034020-162 = "さすが先生、面白くなってきたね。"
10034020-163 = "[s9] \"学園祭だからね！面白くないと！\"\n[s10] 笑って誤魔化す。"
10034020-166 = "とりあえず時間も遅いし、今日は解散ね！"
10034020-167 = "明日の放課後は楽器屋さんに行くわよ！"
10034020-180 = "[ns] \"……。\""
10034020-186 = "（夜遅くまで仕事をしていると……）"
10034020-193 = "[ns11] \"……アイリ？\"\n[ns12] 玄関のドアを開ける。"
10034020-202 = "し、失礼します……こんな時間にすみません。"
10034020-203 = "……あっ、この衣装ですか？"
10034020-204 = "ヨシミちゃんがさっそく用意してくれたので、着てみました。"
10034020-205 = "……えっ？"
10034020-206 = "私が来ると思って、待ってた……？"
10034020-207 = "ど、どうして……？"
10034020-208 = "[s13] \"悩んでそうな表情だったから。\"\n[s14] \"何か話したそうにしてたからね。\""
10034020-213 = "やっぱり、先生にはお見通しでしたか……。"
10034020-214 = "実は、相談したいことがありまして。"
10034020-215 = "最初は自分で、曲を決めようと思ったんですけど……。"
10034020-216 = "……その、意外と難しくって。"
10034020-217 = "……。"
10034020-218 = "えっと……。"
10034020-219 = "ただ私の好きな曲を選ぶだけじゃ、ダメだと思うんです。"
10034020-220 = "……先生は、どんな曲が正解だと思いますか？"
10034020-221 = "正解さえ分かれば、きっと……。"
10034020-222 = "……絶対に、入選したいんです。"
10034020-223 = "その為の一番良い曲……それに相応しい曲を選ばないといけないんです！"
10034020-227 = "……すみません、今のは気にしないでください。"
10034020-228 = "とにかく、上手くやりたくって。"
10034020-229 = "何と言えば良いのか、分からないんですけど……。"
10034020-230 = "ベストを……尽くしたいんです……。"
10034020-234 = "[ns15] \"じゃあ、最近一番良いなって思った曲は？\"\n[ns16] \"好きになった曲とか、すごいと思った曲でも良いけど。\""
10034020-235 = "一番良いと思った曲……？"
10034020-236 = "すごい、ですか……。"
10034020-237 = "うーん……。"
10034020-238 = "……？"
10034020-239 = "……あっ。"
10034020-245 = "[ns] \"……アイリ？\""
10034020-246 = "一応、あるんですが……。"
10034020-247 = "その……。"
10034020-248 = "路上ライブで聞いた曲が、すごく印象に残ってて。"
10034020-249 = "でも、トリニティの生徒なのかすら分からないんです。"
10034020-250 = "また探したとしても、見つかるかどうか……。"
10034020-251 = "あの日だけ、たまたま演奏していた可能性もありますし……。"
10034020-252 = "……えっ？"
10034020-253 = "先生も一緒に探してくれるんですか……？"
10034020-254 = "で、でも、そんな簡単には見つからないと思いますよ！？"
10034020-255 = "それに私のわがままで、これ以上先生の貴重な時間を奪うわけには……。"
10034020-256 = "[s17] \"大丈夫だよ。\"\n[s18] \"私は「先生」だからね。\""
10034020-259 = "先生……。"
10034020-260 = "……ありがとう、ございます。"
10034020-261 = "では、今度空いてる時間に……。"
10034020-265 = "……？"
10034020-266 = "…………え？"
10034020-268 = "……今から、ですか？"
