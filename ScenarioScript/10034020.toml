[translation]
10034020-1 = "Episódio 2: A Coisa Mais Importante"
10034020-4 = "\"Pergunta 1: O que é necessário para uma banda?\""
10034020-7 = "……Ei, por que isso do nada?"
10034020-8 = "Se for uma banda…… bem, antes de tudo, instrumentos, né?"
10034020-9 = "Além disso, um lugar, talvez……?#nPara praticar, precisamos garantir um lugar……"
10034020-10 = "……Isso é óbvio, tem que ser Rock."
10034020-11 = "E também…… o público?#nAcho que não faz sentido se não tiver ninguém para ouvir."
10034020-16 = "\"Pergunta 2: O que é a \"coisa mais importante\" em uma banda?\""
10034020-19 = "Hum…… seria o vocal?"
10034020-20 = "Não seria o visual?#nPara atrair o público, acho que a aparência é mais importante do que a própria performance."
10034020-21 = "……Rock. Definitivamente, é o Rock."
10034020-22 = "As músicas…… eu acho?"
10034020-28 = "[ns1] \"Com certeza, tudo isso é importante.\"\n[ns2] \"Então, o que vocês acabaram de dizer……\""
10034020-31 = "[ns3] \"Vamos dividir as tarefas entre vocês!\"\n[ns4] \"Ah, claro, se precisarem de ajuda, é só me chamar.\""
10034020-39 = "……Eh."
10034020-40 = "Eeeeeeeehhhhhh!?!?"
10034020-42 = "H-hã!? Espera aí!#nDá para decidir as coisas de um jeito tão relaxado assim!?"
10034020-43 = "Quer dizer, no final das contas, vamos acabar assumindo alguma função, mas……"
10034020-44 = "Papéis definidos por improviso…… isso também é Rock."
10034020-45 = "O que é Rock o quê!#nVocê não para de falar de Rock desde agora!"
10034020-51 = "A Natsu é sempre assim.#nSó trocou o \"Romance\" por \"Rock\"."
10034020-52 = "Ahaha…… talvez seja verdade."
10034020-53 = "……Ei."
10034020-54 = "E-esperem um pouco.#nMesmo falando em tarefas, o que exatamente……?"
10034020-56 = "……Mesmo falando em visual, acho que tem muita coisa envolvida."
10034020-57 = "O logotipo da banda, talvez……?"
10034020-58 = "……Eh, figurinos também!?#nNão é que eu não queira fazer, mas……"
10034020-59 = "Bem, já que vou fazer, vou escolher de acordo com o meu gosto!#nPessoal, nada de reclamações, entenderam!"
10034020-64 = "Ah, vê se não escolhe um figurino estranho, hein?"
10034020-68 = "……Ei, espera."
10034020-69 = "Eu acabei de dizer \"vocal\"……"
10034020-70 = "Parabéns por assumir o vocal~!"
10034020-71 = "Não, não, espera aí!#nÉ sério mesmo? Desse jeito que decidimos!?"
10034020-73 = "Eu acho que é bom!#nQuero muito ouvir a voz da Kazusa-chan!"
10034020-74 = "Além disso, eu gosto muito da voz da Kazusa-chan……!"
10034020-75 = "Oh, você é direta, Airi……"
10034020-76 = "N-não, isso é……!"
10034020-77 = "Ah, só porque a Airi disse isso, não significa que……!"
10034020-81 = "……!"
10034020-85 = "Ah, chega!!"
10034020-93 = "Ahaha!#nIsso já soa como se você tivesse aceitado."
10034020-94 = "Fufu, isso é a juventude…… ah, que bela primavera."
10034020-95 = "……Bem, o que é fazer Rock?"
10034020-96 = "\"Fazer Rock\"…… essa é uma pergunta bem interessante."
10034020-97 = "……Eh?"
10034020-98 = "Gerenciar a banda, cuidar da agenda……?"
10034020-99 = "……Limpeza, talvez?"
10034020-100 = "O-onde que isso tem elementos de Rock……?"
10034020-101 = "[s5] \"Ora, Rock e esforço são quase a mesma coisa.\"\n[s6] \"O esforço e a paixão pelo sucesso! Isso também é \"Rock\"!\""
10034020-106 = "Ah……"
10034020-107 = "Não é esse tipo de jogo de palavras que eu estou procurando..."
10034020-108 = "Sim, sim, isso é exatamente o que é ser rock!#nDizem que o espírito faminto é essencial para o rock, não é?"
10034020-115 = "Juventude é algo belo, não é?#nEntão, conto com você até a apresentação, Rock!"
10034020-116 = "Guuh..."
10034020-117 = "...Você não vai me dizer agora que 'eu não sou rock', vai?"
10034020-118 = "...!!"
10034020-119 = "Ju..."
10034020-120 = "A juventude é..."
10034020-121 = "C-cheia de dificuldades..."
10034020-127 = "Ahaha..."
10034020-131 = "Sendo assim, eu... espere, isso significa que eu sou a responsável pela música?"
10034020-132 = "Eu não tenho experiência nenhuma em composição..."
10034020-133 = "Bem, bandas de festival escolar geralmente são bandas cover, não são?"
10034020-134 = "Então, não tem necessidade de compor nada, tem?"
10034020-135 = "Bem, estou contando com você.#nMas não escolha músicas difíceis demais, viu?"
10034020-136 = "C-certo!#nSe for só isso..."
10034020-137 = "...acho que até eu consigo fazer."
10034020-141 = "[ns7] (...Até eu consigo fazer?)\n[ns8] (...Até eu?)"
10034020-146 = "Então, eu vou começar a pensar nos figurinos agora mesmo!"
10034020-147 = "Quando eu decidir, você vai usar sem reclamar, entendeu?"
10034020-148 = "E Natsu, qual é a agenda de amanhã?"
10034020-149 = "Não... eu quis dizer Rock, não Natsu!"
10034020-156 = "...Que bom que perguntou, ó cordeiro aflito.#nEu sou o Rock, aquele que rege o futuro."
10034020-157 = "Você não se adaptou rápido demais?"
10034020-158 = "Nossa agenda para amanhã é..."
10034020-159 = "...procurar instrumentos!"
10034020-160 = "...É isso que ela disse!"
10034020-161 = "A Natsu, que está sempre atrasada, cuidando da agenda..."
10034020-162 = "Como esperado do Sensei, as coisas estão ficando interessantes."
10034020-163 = "[s9] \"É um festival escolar! Tem que ser interessante!\"\n[s10] Rir para disfarçar."
10034020-166 = "Por enquanto, já está tarde, então vamos encerrar por hoje!"
10034020-167 = "Amanhã, depois da aula, vamos a uma loja de instrumentos!"
10034020-180 = "[ns] \"...\""
10034020-186 = "(Trabalhando até tarde da noite...)"
10034020-193 = "[ns11] \"...Airi?\"\n[ns12] Abrir a porta da entrada."
10034020-202 = "C-com licença... desculpe por vir a essa hora."
10034020-203 = "...Ah, sobre este figurino?"
10034020-204 = "A Yoshimi-chan preparou para mim agora pouco, então resolvi vestir."
10034020-205 = "...Eh?"
10034020-206 = "Você estava me esperando porque sabia que eu viria...?"
10034020-207 = "P-por que...?"
10034020-208 = "[s13] \"Porque você parecia estar preocupada.\"\n[s14] \"Porque parecia que você queria conversar sobre algo.\""
10034020-213 = "Como esperado, o Sensei percebeu tudo..."
10034020-214 = "Na verdade, eu queria pedir um conselho."
10034020-215 = "No começo, eu pensei em escolher a música sozinha, mas..."
10034020-216 = "...bem, acabou sendo surpreendentemente difícil."
10034020-217 = "..."
10034020-218 = "Bem..."
10034020-219 = "Eu sinto que não basta apenas escolher as músicas que eu gosto."
10034020-220 = "...Sensei, que tipo de música você acha que seria a escolha certa?"
10034020-221 = "Se eu ao menos soubesse a resposta certa, com certeza..."
10034020-222 = "...Eu quero muito ser selecionada."
10034020-223 = "Preciso escolher a melhor música para isso... uma música que seja digna!"
10034020-227 = "...Desculpe, não leve em conta o que acabei de dizer."
10034020-228 = "De qualquer forma, eu só quero fazer um bom trabalho."
10034020-229 = "Não sei bem como explicar..."
10034020-230 = "Eu quero... dar o meu melhor..."
10034020-234 = "[ns15] \"Então, qual música você achou melhor ultimamente?\"\n[ns16] \"Pode ser uma música que você começou a gostar ou que achou incrível.\""
10034020-235 = "A música que achei melhor...?"
10034020-236 = "Incrível, você diz..."
10034020-237 = "Hmm..."
10034020-238 = "...?"
10034020-239 = "...Ah."
10034020-245 = "[ns] \"...Airi?\""
10034020-246 = "Bem, eu tenho uma em mente, mas..."
10034020-247 = "É que..."
10034020-248 = "Ouvi uma música em uma apresentação de rua que me marcou muito."
10034020-249 = "Mas nem sei se a pessoa é uma aluna de Trinity."
10034020-250 = "E mesmo que eu procurasse, não sei se a encontraria..."
10034020-251 = "Existe a possibilidade de ela ter tocado lá apenas por acaso naquele dia..."
10034020-252 = "...Hã?"
10034020-253 = "Você também vai me ajudar a procurar, Sensei...?"
10034020-254 = "Ma-mas, acho que não será tão fácil assim de encontrar!?"
10034020-255 = "Além disso, não posso tomar mais do seu tempo precioso por causa de um capricho meu..."
10034020-256 = "[s17] \"Está tudo bem.\"\n[s18] \"Afinal, eu sou o 'Sensei'.\""
10034020-259 = "Sensei..."
10034020-260 = "...Muito obrigada."
10034020-261 = "Então, em um momento em que você estiver livre..."
10034020-265 = "...?"
10034020-266 = "............Hã?"
10034020-268 = "...Agora?"
