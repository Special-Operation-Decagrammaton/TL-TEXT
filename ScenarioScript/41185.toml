[translation]
41185-2 = "Tango 3, neutralizado!"
41185-4 = "Confirmação visual! RABBIT 2, avançar e tomar a próxima cobertura!"
41185-5 = "Entendido! Movendo!"
41185-6 = "Resto do esquadrão, fiquem paradas e deem suporte por cinco segundos!"
41185-7 = "Três…… dois…… um……"
41185-12 = "Saki, o sinal! Lançar granada Fox Trot!"
41185-13 = "Na mão! Engolindo flashbang, otárias!"
41185-19 = "Miyu, sniper inimiga posicionada às 5 horas! Corta a linha de visão dela!"
41185-20 = "E-Entendido……!"
41185-21 = "D-Desculpa, arma vazia! Trocando carregador……!"
41185-22 = "Sem problema. Saki, fogo de supressão no alvo!"
41185-23 = "Deixa comigo! Engole chumbo grosso!"
41185-34 = "Quem diabos são essas minas?!"
41185-35 = "A gente tem cinco vezes mais gente e não conseguimos segurar quatro garotas?! O que tá acontecendo?!"
41185-36 = "Nós estamos na nossa base, em superioridade numérica…… como a gente tá perdendo terreno?!"
41185-37 = "Se recuarmos mais, elas vão invadir o saguão principal!"
41185-38 = "Fiquem calmas! O reforço pesado da Guarda de Segurança já deve estar a caminho!"
41185-39 = "Quando elas chegarem, nós esmagamos elas em um ataque em pinça!"
41185-45 = "……Detecto passos pesados de batalhão se aproximando do corredor Oeste."
41185-49 = "Moe, você consegue acessar o controle termostático desse andar?"
41185-50 = "Isso é brincadeira de criança. O sistema deles é de isopor!"
41185-51 = "Forje a leitura dos sensores de temperatura. Simule um incêndio extremo."
41185-52 = "Quer o ponteiro batendo em quanto?"
41185-53 = "Novecentos graus Celsius."
41185-54 = "Com prazer!"
41185-57 = "A-Água……?!"
41185-58 = "Os sprinklers estouraram?! Mas não tem fogo nenhum!"
41185-59 = "Isso quer dizer que……"
41185-63 = "Droga, as portas corta-fogo tão des cendo……!"
41185-68 = "Nós…… nós ficamos presas na própria base……"
41185-69 = "E a Guarda de Segurança ficou presa do outro lado. Ferrou."
41185-70 = "Peraí, a trava manual! É só girar a alavanca e abrir!"
41185-71 = "Isso, vai logo antes que elas esca——"
41185-75 = "……O que é esse negócio grudado na alavanca? As invasoras esqueceram isso aqui?"
41185-76 = "Parece C4…… mas o que é esse cilindro prateado do lado? Parece uma bateria de lítio."
41185-77 = "……Peraí. Lítio metálico? Mas lítio misturado com água de sprinkler causa……"
41185-81 = "……Ah."
41185-91 = "Haaah, que sono maldito……"
41185-92 = "Quem é que começa um tiroteio essas horas da madrugada? Falta de respeito……"
41185-93 = "Invadir a sede da Academia de Polícia…… Tem que ter muita coragem ou ser muito imbecil……"
41185-94 = "Mas por que diabos sobrou pra Segurança Comunitária fazer ronda……? A Guarda de Segurança não dá conta do recado e a gente paga o pato……"
41185-95 = "Vou só andar pelo corredor fazendo cara de brava e capotar em alguma sala vazia……"
41185-99 = "……Hã? O que é isso?"
41185-106 = "……Isso é sério? Uma caixa de papelão escorada num graveto de madeira? Eles acham que eu sou o quê, um passarinho?"
41185-107 = "Que armadilha mais idiota e rudimentar……"
41185-108 = "Tem que ser um completo animal descerebrado pra cair numa babaquice des——"
41185-110 = "Peraí. Isso embaixo da caixa…… é um donut de edição limitada da Master Donuts? O de recheio duplo de marshmallow?!"
41185-111 = "……Eu não acredito na minha sorte."
41185-115 = "Vem pro meu buchin——"
41185-120 = "E não é que pegou passarinho mesmo?!"
41185-127 = "……Eu tô chocada que o plano da caixa de papelão realmente funcionou."
41185-128 = "Eu também achei que a gente ia passar vergonha, mas foi ordem da Miyako-chan……"
41185-129 = "……E pra variar, deu super certo."
41185-131 = "Foi uma jogada de risco alto…… mas baseada em perfis psicológicos do inimigo."
41185-132 = "Mas o sucesso dessa operação só foi possível pela execução perfeita de vocês."
41185-133 = "Mesmo se outra pessoa estivesse na cadeira de capitã, os nossos números e treinamento teriam nos garantido a vit——"
41185-134 = "Para com essa falsa modéstia irritante."
41185-135 = "E-Eh…… desculpa, eu……"
41185-136 = "Pede desculpa uma ova. O mérito de ter virado esse jogo do avesso no cofre e feito a Valkyrie de palhaça agora foi seu. Assume o seu crédito, capitã!"
41185-137 = "A decisão de ignorar os manuais e criar o caos na base inimiga foi toda sua, não foi?"
41185-139 = "É verdade. Nós só obedecemos e puxamos o gatilho. O cérebro foi você."
41185-140 = "A gente só se jogou na loucura porque a gente confia em você, Miyako-chan."
41185-141 = "Eu sei que eu fui uma megera insuportável contigo esses últimos tempos, então…… foi mal aí."
41185-142 = "Mas depois de hoje, eu assino embaixo. Você é a nossa líder e ninguém tira isso."
41185-147 = "……Entendo."
41185-148 = "Mas o meu pensamento permanece."
41185-149 = "O meu \"sucesso\" não existe sem a retaguarda de vocês."
41185-151 = "Caramba, você é teimosa demais…… a gente elogia e ela rebate."
41185-152 = "Fufu, a nossa líder cabeça-dura de sempre."
41185-154 = "Não há tempo para condecorações. A missão ainda não acabou."
41185-155 = "Esquadrão RABBIT, voltar ao avanço!"
41185-161 = "Parem exatamente onde estão!!"
41185-162 = "Eu desconfiei que vocês pudessem estar no meio disso…… Mas quem diria que as invasoras de alta periculosidade,"
41185-163 = "Eram as garotas que o Sensei tanto protege!"
41185-168 = "Você é……"
41185-169 = "Muito prazer de novo! A Ás da Segurança Comunitária, Nakatsukasa Kirino, pronta pro serviço!"
41185-170 = "Invasão de domicílio governamental na calada da noite! A lei não vai ter piedade de vocês, e eu muito menos!"
41185-175 = "……Lá vem a patrulheira fanática que assiste muito filme."
41185-176 = "……O que a gente faz, Miyako-chan? Atira?"
41185-178 = "（Ela me acertou no ombro aquele dia no parque…… Mas segundo a ficha tática da Valkyrie, a precisão natural dela é abissal……）"
41185-179 = "……Não desperdicem munição. Ignorem e continuem andando para frente."
41185-185 = "E-Eh?! E-Espera aí, como assim \"ignorem\"?! Eu tô de arma apontada!!"
41185-186 = "E-Eu atiro pra matar, hein!! É sério, eu não tô brincando de mocinho e bandido!!"
41185-187 = "A-Aí vou eeeeestaaa!!!"
41185-196 = "Nenhum tiro de raspão sequer…… O carregador inteiro no vazio……"
41185-197 = "Uuuh…… Aquele tiro lindo no parque foi só sorte de iniciante então…… snif……"
41185-198 = "Deixar criminosas passarem ilesas bem debaixo do meu nariz…… eu sou uma vergonha pra farda……"
41185-199 = "……Aliás, Fubuki. O que você tava fazendo deitada no chão com uma caixa de papelão em cima da cabeça e babando debaixo dessa porta corta-fogo?"
41185-200 = "Ah, bateu uma preguiça monstra de andar…… e me deu um branco na memória recente…… Eu perdi na loteria da vida."
41185-206 = "Chega de falar besteira. Aceita meio donut de marshmallow, Kirino?"
41185-208 = "Próximo Episódio;O Peso de ser Adulto"