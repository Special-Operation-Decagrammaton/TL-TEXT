[translation]
41185-2 = "Alvo T3, abatido!"
41185-4 = "Confirmado. RABBIT 2, avancem para a próxima cobertura!"
41185-5 = "Entendido!"
41185-6 = "O restante da equipe, mantenham suas posições por 5 segundos!"
41185-7 = "3... 2... 1..."
41185-12 = "Saki, agora! Lançar Foxtrot!"
41185-13 = "Entendido! Granada de luz, lá vai!"
41185-19 = "Miyu, atirador na posição das 5 horas!"
41185-20 = "Ah, entendido...!"
41185-21 = "Desculpe, vou recarregar antes disso...!"
41185-22 = "Entendido. Saki, fogo de cobertura!"
41185-23 = "Deixa comigo!"
41185-34 = "Quem são eles!?"
41185-35 = "Droga, não conseguimos dominá-los mesmo em maior número... que situação é essa!?"
41185-36 = "Não faz sentido estarmos sendo empurrados no nosso próprio território...!"
41185-37 = "Se continuar assim, seremos empurrados até a entrada!"
41185-38 = "Calma, os reforços da Divisão de Segurança devem chegar logo!"
41185-39 = "Assim que chegarem, vamos avançar com um ataque em ondas!"
41185-45 = "...Ouvi muitos passos vindo do lado oeste."
41185-49 = "Moe, você consegue hackear os sensores de temperatura da Valkyrie?"
41185-50 = "Se fosse o sistema de segurança inteiro seria difícil, mas isso aí é moleza!"
41185-51 = "Altere os valores. Vamos induzir um mau funcionamento."
41185-52 = "Para quanto?"
41185-53 = "900 graus Celsius."
41185-54 = "OK!"
41185-57 = "O quê, água...!?"
41185-58 = "O sprinkler quebrou!?"
41185-59 = "Isso significa que..."
41185-63 = "Droga, a porta corta-fogo..."
41185-68 = "Ficar trancadas na nossa própria escola..."
41185-69 = "Desse jeito, a Divisão de Segurança não vai conseguir se juntar a nós."
41185-70 = "Ah, mas não dá para abrir isso manualmente?"
41185-71 = "Beleza, então vamos logo..."
41185-75 = "...O que é isso? Eles esqueceram algo?"
41185-76 = "Não é um C4? Parece que tem uma bateria de lítio acoplada."
41185-77 = "...Espera, lítio? Isso significa que se tocar na água..."
41185-81 = "...Ah."
41185-91 = "Ai, que sono..."
41185-92 = "Que saco, ter que lidar com confusão no meio da noite..."
41185-93 = "Invadir o prédio principal da Academia de Polícia, tem gente muito ousada por aí..."
41185-94 = "Mas por que nós temos que lidar com isso... A Divisão de Segurança deveria resolver..."
41185-95 = "Vou fazer uma patrulha de fachada e ir embora logo..."
41185-99 = "...O que é aquilo?"
41185-106 = "...Ei, estão tirando sarro da gente?"
41185-107 = "Mas que armadilha maldosa..."
41185-108 = "A menos que a pessoa seja muito idiota, ninguém cairia nisso—"
41185-110 = "Aquilo é um donut de edição limitada da 'Master Donuts'. E ainda por cima com marshmallow."
41185-111 = "...Sério?"
41185-115 = "Itadakimasu—"
41185-120 = "Pois é, né!?"
41185-127 = "……Eu não acredito que a gente realmente conseguiu."
41185-128 = "Eu também tive minhas dúvidas, mas foi uma ordem da Miyako-chan..."
41185-129 = "……Mas, no fim, foi um sucesso."
41185-131 = "Bem, para mim também foi uma aposta..."
41185-132 = "Se as coisas deram certo, foi graças a todas vocês."
41185-133 = "Provavelmente, se outra pessoa estivesse no comando, o resultado teria sido o mesmo..."
41185-134 = "Ah, para de tentar se diminuir."
41185-135 = "Eh, bem... desculpe...?"
41185-136 = "Não é isso, esse resultado foi claramente alcançado pela Miyako. Não foi por causa de outra pessoa, pare de se desmerecer!"
41185-137 = "Foi você quem encontrou a solução ideal, isso é um fato, não é?"
41185-139 = "É verdade, tudo aconteceu porque seguimos as suas ordens."
41185-140 = "Foi justamente porque confiamos na Miyako-chan."
41185-141 = "Bem, sobre tudo o que eu disse até agora... foi mal."
41185-142 = "Mas, pelo menos agora, você é a nossa capitã. Eu garanto isso."
41185-147 = "……Entendo."
41185-148 = "Mas, ainda assim, não foi um mérito apenas meu."
41185-149 = "É porque todas nós agimos juntas."
41185-151 = "Você é mesmo impossível de convencer..."
41185-152 = "Bem, é sempre assim, né?"
41185-154 = "Nós acabamos nos alongando demais na conversa..."
41185-155 = "Vamos nos apressar!"
41185-161 = "Parem aí!"
41185-162 = "Eu achei que fosse impossível, mas..."
41185-163 = "Então eram vocês as invasoras!"
41185-168 = "Você é, se não me engano..."
41185-169 = "Obrigada pela ajuda outro dia. Eu sou Kirino, a ás do Departamento de Segurança Pública!"
41185-170 = "Eu não vou permitir uma invasão ilegal ao prédio da escola no meio da noite!"
41185-175 = "……Lá vem uma do tipo sangue quente."
41185-176 = "……Miyako-chan, o que a gente faz?"
41185-178 = "(Outro dia ela atirou na gente... mas, se me lembro bem das informações, a pontaria dela é...)"
41185-179 = "……Vamos ignorar. Continuem avançando."
41185-185 = "E-ei? Espera, o que significa isso!?"
41185-186 = "E-eu vou atirar de verdade, viu!? Eu tenho que atirar, sabia!?"
41185-187 = "E-ei...!"
41185-196 = "Nenhum tiro acertou, hein..."
41185-197 = "Uuu... da última vez eu consegui acertar de um jeito tão legal..."
41185-198 = "Deixar o alvo que estava bem na minha frente escapar assim..."
41185-199 = "……A propósito, Fubuki, por que você estava caída aí com uma caixa de papelão na cabeça?"
41185-200 = "Bem, é que eu estava com preguiça, ou algo assim... não me lembro muito bem."
41185-206 = "De qualquer forma, Kirino, quer comer isso?"
41185-208 = "Próximo episódio: Hora de Adulto"
