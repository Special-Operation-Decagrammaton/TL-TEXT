[translation]
41185-2 = "Tango3, abatido!"
41185-4 = "Confirmado. RABBIT2, avance para a próxima cobertura!"
41185-5 = "Entendido!"
41185-6 = "As demais, fiquem nas posições por 5 segundos!"
41185-7 = "3…2…1…"
41185-12 = "Saki, agora! Lança Foxtrot!"
41185-13 = "Entendido! Granada de luz, vou!"
41185-19 = "Miyu, atiradora às 5 horas!"
41185-20 = "A, entendido…!"
41185-21 = "Desculpa, antes preciso recarregar…!"
41185-22 = "Entendido. Saki, fogo de supressão!"
41185-23 = "Deixa comigo!"
41185-34 = "Quem são esses?"
41185-35 = "Droga, mesmo com esse número não conseguimos dominar… o que está havendo?"
41185-36 = "Estamos em casa e mesmo assim perdendo… não faz sentido!"
41185-37 = "Assim vamos ser empurrados até a entrada!"
41185-38 = "Calma, os reforços do Esquadrão de Segurança logo chegam!"
41185-39 = "Quando chegarem, faremos um ataque em ondas!"
41185-45 = "…Muitos passos vindo do lado oeste."
41185-49 = "Moe, consegue hackear os sensores de temperatura da Valkyrie?"
41185-50 = "A segurança toda não, mas só isso, tranquilo!"
41185-51 = "Altere os valores para induzir um falso alarme."
41185-52 = "Para quanto?"
41185-53 = "900 graus Celsius."
41185-54 = "OK!"
41185-57 = "O quê, água…?"
41185-58 = "O sprinkler quebrou?!"
41185-59 = "Quer dizer…"
41185-63 = "Droga, a porta corta-fogo…!"
41185-68 = "Ficar trancada na própria escola…"
41185-69 = "Assim, nem o Esquadrão de Segurança vai conseguir se juntar."
41185-70 = "Ah, mas isso não pode ser aberto manualmente?"
41185-71 = "Beleza, então vamos logo…"
41185-75 = "…O que é isso? Esqueceram?"
41185-76 = "C4? Tem uma bateria de lítio estranha."
41185-77 = "…Espera, lítio? Então se molhar…"
41185-81 = "…Ah."
41185-91 = "Fuaaah, que sono…"
41185-92 = "Até parece, confusão a esta hora…"
41185-93 = "Invadir a sede da academia… que gente corajosa…"
41185-94 = "Mas por que temos que vir? O Esquadrão de Segurança que resolvesse…"
41185-95 = "Vamos fazer uma patrulha qualquer e voltar logo…"
41185-99 = "…O que é aquilo?"
41185-106 = "…Hã, estão debochando?"
41185-107 = "Mas que armadilha cruel."
41185-108 = "A menos que seja muito idiota, quem cairia nessa…"
41185-110 = "Aquele é um donut edição limitada do 'Mister Donuts'. Com marshmallow."
41185-111 = "…Sério?"
41185-115 = "Vou comer――"
41185-120 = "Não é?!"
41185-127 = "…Quem diria que ia dar certo."
41185-128 = "Eu também duvidei, mas foi ordem da Miyako-chan…"
41185-129 = "…Mas deu certo."
41185-131 = "Bem, foi uma aposta…"
41185-132 = "O sucesso se deve a todas."
41185-133 = "Se outro tivesse comandado, o resultado seria o mesmo…"
41185-134 = "Não adianta disfarçar."
41185-135 = "Hã, como assim… desculpa?"
41185-136 = "Não é isso. Esse resultado é claramente seu. Não foi outra pessoa. Não tente disfarçar!"
41185-137 = "Foi você quem encontrou a melhor solução, não tem dúvida."
41185-139 = "É isso aí, foi seguindo suas ordens."
41185-140 = "Foi porque confiamos em você."
41185-141 = "Bem, desculpa pelo que falei antes…"
41185-142 = "Mas pelo menos agora, pode ter certeza, você é a comandante."
41185-147 = "…É mesmo."
41185-148 = "Mas não foi mérito só meu."
41185-149 = "Foi por estarmos juntas."
41185-151 = "Você é teimosa, hein."
41185-152 = "Bem, como sempre."
41185-154 = "Falamos demais…"
41185-155 = "Vamos, rápido!"
41185-161 = "Parem aí!"
41185-162 = "Imaginei… os intrusos,"
41185-163 = "eram vocês!"
41185-168 = "Você é…"
41185-169 = "Oi! Sou a Kirino, a melhor do Departamento de Segurança da Vida!"
41185-170 = "Invadir a escola a esta hora da noite, não posso permitir!"
41185-175 = "…Uma espírita de plantão."
41185-176 = "…Miyako-chan, o que fazemos?"
41185-178 = "(Da última vez, fomos alvejadas… mas me lembro que os tiros dela…)"
41185-179 = "…Ignorem. Continuem em frente."
41185-185 = "Hã? O que é isso?"
41185-186 = "E-eu vou atirar, viu? Tenho que atirar!"
41185-187 = "Ah, dane-se!"
41185-196 = "Todos os tiros erraram…"
41185-197 = "Ugh… naquela outra vez consegui acertar de forma tão legal…"
41185-198 = "Deixar escapar um inimigo que veio até você…"
41185-199 = "…Fubuki, por que você estava caída debaixo de uma caixa de papelão?"
41185-200 = "Bem, preguiça, sabe… não me lembro direito."
41185-206 = "Enfim, Kirino, quer comer?"
41185-208 = "Próximo Episódio: A Hora dos Adultos"