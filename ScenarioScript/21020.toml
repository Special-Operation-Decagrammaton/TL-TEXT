21020-33 = "Não é um absurdo!? Pode até ser#n\"de corpo e alma\", mas como#natividade de departamento tá tudo#nerrado! E ainda por cima, depois de#nincomodar meio mundo, vocês têm a#ncara de pau de pedir verba toda#nsanta vez!?"
