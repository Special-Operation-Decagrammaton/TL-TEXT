21020-47 = "Tirando o jogo em si, as#navaliações foram algo realmente#nmemorável."
21020-48 = "\"Disparado o RPG mais#n'desesperador' de toda a minha vida#nde jogador. E não é pela história,#nnão: é pelo nível de acabamento#ncomo jogo.\""
21020-49 = "\"Se eu começar a listar o que falta#nesse jogo não termino nunca…… mas,#nolha, o que mais falta mesmo é#n'sanidade'.\""
21020-50 = "\"Depois de jogar isso, dá até pra#npensar que o 'Dead Cream Zone'#ntalvez entre na categoria de#nobra-prima……\""
