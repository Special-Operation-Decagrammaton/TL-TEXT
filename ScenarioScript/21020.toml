21020-93 = "[s] \"Prêmio Millennium…… o que é#nisso?\""
21020-95 = "É o concurso onde os#ndepartamentos do campus inteiro#ncompetem com suas criações, um dos#nmaiores da Millennium! Se a gente#n ganhar lá, aí ninguém vai ter como#nreclamar de nada!"
