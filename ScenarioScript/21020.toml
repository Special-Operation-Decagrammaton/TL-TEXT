[translation]#[Texto Final , mas eventualmente pode haver alterações na formatação de texto. - Filipe 29/06.]
21020-1 = "Episódio 2: A Tesoureira da Seminar, Yuuka."
21020-2 = "Millennium · Clube de Desenvolvimento de Jogos"
21020-4 = "……"
21020-5 = "Apareceu! Uma das Quatro Reis Celestiais do Conselho!\nA tesoureira do Conselho, Yuuka,\naquela que carrega o codinome de\n\"Implacável Maga dos Cálculos\"!"
21020-6 = "Dá pra parar de me dar codinome esquisito\ne falar de mim como se eu fosse um monstro\nqualquer? Que falta de educação."
21020-7 = "Mas, deixa isso pra lá……"
21020-8 = "……Sensei."
21020-9 = "[s] \"Eai, Yuuka.\""
21020-10 = "……Haah, ter que reencontrar você\nlogo numa situação dessas."
21020-11 = "Tenho muita coisa pra conversar com o Sensei,\nmas isso fica pra depois……\nMomoi."
21020-13 = "Você não sabe mesmo a hora de desistir.\nPra impedir a dissolução, foi capaz até de\narrastar a \"Schale\" pra essa história."
21020-14 = "Mas, mesmo fazendo isso, é tudo em vão."
21020-15 = "Nem que seja a Schale, do Conselho Estudantil Geral……\nnão, nem que a própria Presidente do Conselho Geral voltasse!"
21020-16 = "A gestão dos clubes é, no geral, deixada\na cargo do conselho de cada colégio."
21020-17 = "A dissolução do Clube de Desenvolvimento de Jogos\njá está decidida. Isso ninguém mais reverte."
21020-18 = "I-isso não é verdade!"
21020-19 = "Você mesma disse: se a gente atingisse o número\nmínimo de membros, ou apresentasse um resultado\nà altura de um clube da Millennium……"
21020-20 = "……se conseguissem, tudo bem. Se não, dissolução,\ncom o confisco da verba e, claro, da sala do clube.\nEu disse tudo isso bem certinho, não disse?"
21020-21 = "Vocês não só estão abaixo do número de membros,\ncomo já se passaram meses sem nada\nque prove o resultado do clube……"
21020-24 = "Mesmo que o clube seja dissolvido,\nvocês não teriam do que reclamar, têm?"
21020-26 = "Tenho objeção! Objeção máxima!\nA gente também se dedica de corpo e alma\nàs atividades do clube!"
21020-28 = "Então tipo, como é mesmo……\n\"circunstâncias agravantes\"? Algo assim,\ntem que contar a nosso favor!"
21020-29 = "Você quer dizer \"atenuantes\". E, aliás,\no que foi que você disse agora?\nQue se dedicam de corpo e alma……?"
21020-30 = "Não me faça rir!"
21020-32 = "Quando não estão erguendo prédios esquisitos\nno campus pra decorar feito cassino e abrir torneio\nde jogatina, estão invadindo o Clube de Pesquisa\nde História Antiga atrás de jogos retrô……"
21020-33 = "Não é um absurdo!? Pode até ser \"de corpo e alma\",\nmas como atividade de clube tá tudo errado! E ainda\npor cima, depois de incomodar meio mundo, vocês têm\na cara de pau de pedir verba toda santa vez!?"
21020-34 = "Que tal apresentarem ao menos\numa desculpa decente!"
21020-35 = "Às v-vezes, mais do que o resultado, é preciso\nsaber valorizar também a força de vontade……"
21020-36 = "Não quero ouvir desculpa de perdedor."
21020-37 = "Afinal você quer ouvir ou não quer ouvir!?"
21020-38 = "Quero dizer que não quero ouvir desculpa\nsem sentido. Na Millennium, \"resultado\" é tudo."
21020-39 = "R-resultado a gente também tem! Porque\na gente tá desenvolvendo um jogo, sim!"
21020-40 = "I-isso mesmo! O \"Tales Saga Chronicle\" até\nganhou prêmio \"naquele concurso\", ãh……"
21020-43 = "[ns] \"'Tales Saga Chronicle'?\""
21020-44 = "……É verdade. De fato, ganhou um prêmio."
21020-45 = "Pela sua reação, dá pra ver\nque o Sensei não conhece, não é?"
21020-46 = "\"Tales Saga Chronicle\"…… o único resultado que\neste Clube de Desenvolvimento de Jogos já teve."
21020-47 = "Tirando o jogo em si, as avaliações\nforam algo realmente memorável."
21020-48 = "\"Disparado o RPG mais 'desesperador' de toda a\nminha vida de jogador. E não é pela história, não:\né pelo nível de acabamento como jogo.\""
21020-49 = "\"Se eu começar a listar o que falta nesse jogo\nnão termino nunca…… mas, olha, o que mais\nfalta mesmo é 'sanidade'.\""
21020-50 = "\"Depois de jogar isso, dá até pra pensar\nque o 'Dead Cream Zone' talvez entre\nna categoria de obra-prima……\""
21020-51 = "O-os nossos jogos não vão se curvar\nà maldade da internet, não……"
21020-52 = "Por mais infinitos que fossem os usuários,\nquando tantas avaliações convergem, esse é\no resultado mais próximo da verdade."
21020-53 = "Aliás, o único \"resultado\" que vocês têm é esse\n\"1º lugar no Ranking dos Piores Jogos do Ano\",\nnão é mesmo?"
21020-54 = "I-isso é verdade, mas……!"
21020-55 = "[s] \"1º lugar!? Que incrível,\nfiquei curioso pra jogar esse jogo!!\""
21020-57 = "……"
21020-58 = "……"
21020-61 = "……"
21020-62 = "……Enfim."
21020-63 = "Um clube como o de vocês, continuando ativo\ndo jeito que está, só vai manchar ainda mais\na honra da colégio."
21020-64 = "E se essa verba for redirecionada,\nela acaba beneficiando alunas que de fato\nfazem atividades com algum propósito……"
21020-65 = "Então, se querem mesmo afirmar que as atividades\nde vocês também têm propósito…… provem isso."
21020-66 = "Provar, como assim……?"
21020-67 = "Já disse isso quantas vezes: provem um feito\nou resultado decente, e a dissolução é cancelada."
21020-68 = "Tipo ganhar um prêmio\nem alguma competição?"
21020-69 = "Isso. No esporte, seria ir aos Jogos Colégiores\nNacionais; no Clube de Engenharia, divulgar uma\ninvenção. Algo desse tipo."
21020-70 = "Pro Clube de Desenvolvimento de Jogos,\nimagino que existam vários concursos assim……"
21020-71 = "Ainda assim, não acho que baste se inscrever\npra dar certo. A capacidade de vocês já foi bem\ncomprovada por aquele ranking de jogo porcaria."
21020-72 = "Ugh……"
21020-73 = "Já que é assim, vamos resolver do jeito mais fácil\npras duas partes? Desocupem a sala agora mesmo\ne joguem fora essas tranqueiras todas."
21020-74 = "……"
21020-75 = "N-não chama de tranqueira……!"
21020-76 = "……Então é o quê?"
21020-77 = "I-isso é……"
21020-81 = "……!"
21020-82 = "……Tá bom. Vou provar tudo. Com resultado."
21020-83 = "Ah é……?"
21020-84 = "Porque os preparativos pra isso\na gente já tem prontos!"
21020-86 = "Hã?"
21020-87 = "É sério!?"
21020-88 = "Por que a Midori tá surpresa!?"
21020-89 = "Enfim, a gente tem uma carta na manga."
21020-90 = "Usando essa carta na manga, no \"Prêmio Millennium\"\ndesta vez a gente vai lançar o nosso jogo……"
21020-91 = "\"TSC2\"…… \"Tales Saga Chronicle 2\",\né isso que a gente vai lançar!"
21020-92 = "!?"
21020-93 = "[s] \"Prêmio Millennium…… o que é isso?\""
21020-95 = "É o concurso onde os clubes do campus inteiro\ncompetem com suas criações, um dos maiores da\nMillennium! Se a gente ganhar lá, aí ninguém\nvai ter como reclamar de nada!"
21020-96 = "……Bem, é verdade."
21020-97 = "Isso, se conseguirem ganhar."
21020-98 = "Mas olha, Momoi, o que você tá dizendo agora\nnão é tipo um clube esportivo ir aos\nJogos Colégiores……"
21020-99 = "é tipo um jogador de várzea ser convocado,\ndo nada, pra Seleção. Uma coisa surreal."
21020-100 = "……Mas tudo bem. Sei lá por quê,\naté que eu também fiquei meio curiosa."
21020-102 = "Entendido. Então, até lá, eu espero."
21020-103 = "De hoje até o Prêmio Millennium são duas semanas……\nmal posso esperar pra ver que resultado vocês\nconseguem nesse tempinho tão curto."
21020-105 = "……Ufa. Quem diria que eu ia acabar mostrando\num lado tão nada fofo assim na frente do Sensei……"
21020-106 = "Mas, enfim, isso também\nfaz parte do trabalho do Conselho."
21020-107 = "Da próxima vez a gente se vê numa situação\ndiferente, bem mais tranquila, Sensei.\nAté mais, então."
21020-109 = "(Clác)"
21020-110 = "……"
21020-111 = "Mana……"
21020-112 = "As duas chances são baixas, mas…… não seria\nmelhor recrutar membros do que sair agora\npra criar um jogo do zero?"
21020-113 = "A gente passou esse mês inteiro tentando isso……\nno fim, ninguém quis entrar."
21020-114 = "\"Pfff! Até VR já é coisa velha, e vocês vêm\ncom jogo estilo retrô?\" Eu já tô de saco cheio\nde ser zoada desse jeito."
21020-115 = "……"
21020-116 = "Yuuka covarde! Se aproveitar do fato de que\notaku como a gente tem pouquíssimos amigos!\nIsso é imperdoável!"
21020-117 = "Não…… isso aí não é culpa da Yuuka,\né 100% a gente colhendo o que plantou."
21020-118 = "Enfim, continuar recrutando membro\nnão vai mostrar nenhum futuro brilhante."
21020-119 = "Além do mais, ainda resta outra esperança."
21020-120 = "Ah, é mesmo. Aquela \"carta na manga\"\nque você falou agora há pouco……\no que é, afinal?"
21020-121 = "Essa, é claro, é o Sensei."
21020-122 = "[s] \"……Eu?\""
21020-123 = "Voltando ao assunto, o nosso objetivo\nestá nas \"Ruínas\"."
21020-124 = "As \"Ruínas\" são…… originalmente uma região\nmisteriosa nos arredores da Millennium, cujo\nacesso o Conselho Estudantil Geral restringia."
21020-125 = "Diziam que restringiam o acesso \"por ser uma\nárea perigosa\"…… mas, na real, ninguém sabe\no que exatamente seria perigoso, nem como."
21020-126 = "Se ninguém nunca entrou, ou se simplesmente\nnão se consegue entrar, ou se ninguém que entrou\njamais voltou…… nem isso se sabe direito."
21020-127 = "……É um lugar assim, envolto em mistério."
21020-128 = "[s] \"E por que, afinal, vocês querem ir parar num lugar desses……?\""
21020-129 = "Porque eu quero criar um bom jogo!"
21020-130 = "Eu quero provar."
21020-131 = "Mesmo que o nível da gente hoje não passe de um\n\"1º lugar no Ranking dos Piores Jogos do Ano\"."
21020-132 = "Que esses jogos que eu tanto amo……\nque me fizeram tão feliz……"
21020-134 = "não são tranqueira nenhuma: são tesouros\npreciosos! É isso que eu quero provar!"
21020-135 = "……Mana."
21020-136 = "E pra isso, a gente tem que dar um jeito\nde entrar nas Ruínas e achar \"aquilo\"."
21020-137 = "[s] \"Aquilo?\""
21020-138 = "Ah, acho que inverti a ordem. Agora\né essa parte que eu preciso te contar."
21020-139 = "Sensei,"
21020-142 = "G.Bible…… você conhece?"
21020-144 = "Próximo episódio: Rumo às Ruínas."