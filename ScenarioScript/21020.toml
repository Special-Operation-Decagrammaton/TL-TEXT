[translation]
21020-1 = "Episódio 2; A Tesoureira da Seminar, Yuuka"
21020-2 = "Millennium - Depto. de Desenvolvimento de Jogos"
21020-4 = "......"
21020-5 = "Apareceu, um dos Quatro Reis Celestiais do Conselho Estudantil! A tesoureira do conselho conhecida pela alcunha de 'Calculadora de Coração Frio', Yuuka!"
21020-6 = "Pode parar de me dar apelidos estranhos por conta própria e de me chamar como se eu fosse um monstro ou algo do tipo? Que falta de educação."
21020-7 = "Mais importante que isso..."
21020-8 = "......Sensei."
21020-9 = "[s] \"E aí, Yuuka.\""
21020-10 = "......Haa, pensar que nos encontraríamos numa situação dessas."
21020-11 = "Eu também tenho várias coisas para conversar com o senhor, Sensei, mas vou deixar isso para depois... Momoi."
21020-13 = "Vocês realmente não desistem, não é? A ponto de arrastar a 'Schale' para cá só para impedir o fechamento do clube."
21020-14 = "Mas não adianta fazer isso."
21020-15 = "Mesmo sendo a Schale do Conselho Estudantil Geral... não, mesmo que a própria Presidente do Conselho Estudantil Geral voltasse!"
21020-16 = "A administração dos clubes é, em grande parte, de responsabilidade do conselho estudantil de cada escola."
21020-17 = "O fechamento do Departamento de Desenvolvimento de Jogos já foi decidido, e ninguém pode reverter isso."
21020-18 = "I-Isso não é verdade!"
21020-19 = "Você disse, não disse? Que se atingíssemos o número mínimo de membros ou apresentássemos resultados dignos de um clube da Millennium..."
21020-20 = "...Que se fizessem isso, estaria tudo bem. Mas que se não conseguissem, o clube seria fechado, e o orçamento e a sala do clube seriam confiscados. Eu fui bem clara quanto a isso, não fui?"
21020-21 = "Além de vocês não terem membros suficientes, já se passaram meses sem que vocês apresentassem qualquer coisa que provasse seus resultados como clube..."
21020-24 = "Mesmo que o clube seja fechado, vocês não deveriam ter nenhuma objeção, certo?"
21020-26 = "Temos objeção! Muita objeção! Nós também estamos dando o nosso melhor nas atividades do clube!"
21020-28 = "Então deveríamos ter direito àquilo... como era o nome mesmo... uma tal de 'Avaliação de Conduta'!?"
21020-29 = "Acho que você quis dizer 'Atenuação de Pena'. Mas, o que você acabou de dizer? Que estão dando o melhor nas atividades...?"
21020-30 = "Não me faça rir!"
21020-32 = "Assim que construíram uma estrutura estranha no campus, vocês a decoraram como um cassino e começaram um torneio de jogos de azar. Além disso, invadiram a Sociedade de Pesquisa de História Antiga sob o pretexto de estarem procurando jogos retrô..."
21020-33 = "Isso é um absurdo, não acha!? Vocês podem até estar dando o 'melhor', mas estão agindo de forma errada como clube! E mesmo causando tantos problemas por aí, ainda têm a cara de pau de solicitar orçamento toda vez!?"
21020-34 = "Por que vocês não tentam dar pelo menos uma desculpa decente!"
21020-35 = "À-Às vezes é necessário avaliar a intenção no lugar dos resultados..."
21020-36 = "Não quero ouvir desculpas de perdedores."
21020-37 = "Afinal, você quer ou não quer ouvir!?"
21020-38 = "Eu disse que não quero ouvir desculpas sem sentido. Na Millennium, 'resultados' são tudo."
21020-39 = "M-Mas nós temos resultados! Afinal, nós também desenvolvemos um jogo!"
21020-40 = "I-Isso mesmo! Nosso 'Tales Saga Chronicle' até recebeu um prêmio 'naquele concurso'..."
21020-43 = "[ns] \"'Tales Saga Chronicle'?\""
21020-44 = "......É verdade. De fato, vocês receberam um prêmio."
21020-45 = "Olhando para sua reação, parece que o senhor não sabe do que se trata, Sensei."
21020-46 = "O 'Tales Saga Chronicle'... foi o único resultado que esse Departamento de Desenvolvimento de Jogos produziu."
21020-47 = "Sem mencionar o jogo em si, as análises dele foram muito impressionantes."
21020-48 = "「De todos os jogos que eu já joguei, este é de longe o RPG mais 'desesperador'. Não estou falando do roteiro ou da história, mas da qualidade como jogo.」"
21020-49 = "「Não dá nem para começar a contar o que falta nesse jogo... mas acho que a principal coisa que falta nele é a 'sanidade'.」"
21020-50 = "「Depois de jogar esse jogo, eu começo a pensar que talvez 'Dead Cream Zone' entre para a categoria de obras-primas...」"
21020-51 = "O-O nosso jogo não vai se render à maldade da internet..."
21020-52 = "Mesmo que haja um número infinito de jogadores, quando muitas avaliações convergem para o mesmo ponto, esse resultado é o que mais se aproxima da verdade."
21020-53 = "Além disso, o único 'resultado' que vocês têm foi o prêmio de '1º Lugar no Ranking de Piores Jogos Deste Ano', não é?"
21020-54 = "I-Isso é verdade, mas...!"
21020-55 = "[s] \"1º lugar!? Incrível, fiquei curioso pra jogar!!\""
21020-57 = "......"
21020-58 = "......"
21020-61 = "......"
21020-62 = "......Enfim."
21020-63 = "Se um clube como o de vocês continuar ativo desse jeito, isso só vai manchar a honra da escola."
21020-64 = "Além disso, se direcionarmos esse orçamento para outros clubes, será muito melhor para os alunos que estão de fato realizando atividades significativas..."
21020-65 = "Por isso, se quiserem alegar que as atividades de vocês têm algum significado... provem isso para mim."
21020-66 = "Provar... como...?"
21020-67 = "Eu já falei várias vezes. Se provarem que têm conquistas ou resultados adequados, eu revogarei a ordem de fechamento do clube."
21020-68 = "Por exemplo, ganhar um prêmio em alguma competição?"
21020-69 = "Sim, como participar do torneio intercolegial no caso dos clubes de esporte, ou apresentar uma invenção publicamente no caso do Clube de Engenharia. Coisas desse tipo."
21020-70 = "Sendo o Departamento de Desenvolvimento de Jogos, acredito que existam vários concursos desse tipo..."
21020-71 = "Embora eu não ache que vocês consigam se safar apenas se inscrevendo. A capacidade de vocês já foi provada naquele ranking de piores jogos."
21020-72 = "Ugh..."
21020-73 = "Já que chegamos a esse ponto, por que não resolvemos isso da maneira mais fácil para ambas as partes? Esvaziem a sala do clube agora mesmo e joguem esse lixo fora."
21020-74 = "......"
21020-75 = "N-Não os chame de lixo...!"
21020-76 = "......Então o que são?"
21020-77 = "I-Isso é..."
21020-81 = "......!"
21020-82 = "......Tudo bem. Nós vamos mostrar tudo através de resultados."
21020-83 = "Oh...?"
21020-84 = "Porque nós já estamos prontas para isso!"
21020-86 = "Eh?"
21020-87 = "Estamos!?"
21020-88 = "Por que você tá surpresa, Midori!?"
21020-89 = "De qualquer forma, nós temos um trunfo."
21020-90 = "Usaremos esse trunfo e apresentaremos o nosso jogo no 'Millennium Prize' desta vez..."
21020-91 = "Nós vamos apresentar o 'TSC2'... 'Tales Saga Chronicle 2'!"
21020-92 = "!?"
21020-93 = "[s] \"Millennium Prize... o que é isso?\""
21020-95 = "É o maior concurso da Millennium, onde os clubes de toda a escola competem exibindo os resultados de seus projetos! Se ganharmos um prêmio lá, até ela não vai poder reclamar de nada!"
21020-96 = "......Bem, é verdade."
21020-97 = "Isso, se conseguirem ganhar algum prêmio."
21020-98 = "Mas sabe, Momoi... O que você está dizendo agora não está no mesmo nível de um clube de esportes participar de um torneio intercolegial..."
21020-99 = "É uma ideia absurda, como se jogadores de beisebol do ensino médio fossem jogar na Liga Principal de repente."
21020-100 = "......Mas tudo bem. Por algum motivo, até eu fiquei um pouco ansiosa para ver isso."
21020-102 = "Entendido, eu vou esperar até lá."
21020-103 = "Faltam duas semanas a partir de hoje até o Millennium Prize... Estou ansiosa para ver que tipo de resultado vocês conseguirão apresentar nesse curto período de tempo."
21020-105 = "......Phew. Eu não esperava acabar mostrando um lado tão pouco fofo como esse na frente do Sensei..."
21020-106 = "Mas isso também faz parte do trabalho do Conselho Estudantil."
21020-107 = "Vamos nos encontrar em uma situação diferente e mais calma da próxima vez, Sensei. Até logo."
21020-109 = "(Clique)"
21020-110 = "......"
21020-111 = "Mana..."
21020-112 = "Eu sei que as chances para as duas coisas são baixas, mas... Não seria melhor tentarmos recrutar novos membros em vez de tentarmos criar um jogo agora?"
21020-113 = "Mas nós tentamos muito fazer isso neste último mês, não tentamos...? E no final, ninguém entrou."
21020-114 = "Eu já estou farta de ser ridicularizada e ouvir coisas como 'Pff! Num mundo onde até VR é considerado coisa velha, que história é essa de jogo retrô?'."
21020-115 = "......"
21020-116 = "Aquela Yuuka covarde! Se aproveitar do fato de que otakus como nós têm poucos amigos! Eu não vou perdoá-la!"
21020-117 = "Não... eu acho que a culpa não foi da Yuuka, nós é que colhemos o que plantamos 100%."
21020-118 = "Enfim, não consigo ver um futuro brilhante mesmo que a gente continue tentando recrutar membros."
21020-119 = "Além disso, nós ainda temos outra esperança."
21020-120 = "Ah, é verdade. O que era aquele 'trunfo' que você mencionou agorinha?"
21020-121 = "Claro que é o Sensei."
21020-122 = "[s] \"......Eu?\""
21020-123 = "Voltando ao assunto, o nosso objetivo está nas 'Ruínas'."
21020-124 = "As 'Ruínas'... são uma área misteriosa nos arredores da Millennium, que originalmente teve o seu acesso restrito pelo Conselho Estudantil Geral."
21020-125 = "Disseram que o acesso foi restrito porque 'é uma área perigosa', mas... na verdade, ninguém sabe exatamente o porquê de ser perigoso ou como é perigoso."
21020-126 = "Ninguém nunca entrou, ou sequer é possível entrar, ou as pessoas que entraram nunca mais voltaram... nós não sabemos de nada disso."
21020-127 = "......É esse tipo de lugar envolto em mistérios."
21020-128 = "[s] \"Por que diabos vocês querem ir para um lugar desses...?\""
21020-129 = "Porque nós queremos criar um jogo bom!"
21020-130 = "Eu quero provar a elas."
21020-131 = "Mesmo que o nosso nível atual não passe de um '1º Lugar no Ranking de Piores Jogos Deste Ano'."
21020-132 = "Os jogos que eu tanto amo... que me trouxeram tanta felicidade..."
21020-134 = "Eu quero provar que eles nunca foram lixo, mas sim um tesouro muito precioso!"
21020-135 = "......Mana."
21020-136 = "Para isso, nós precisamos dar um jeito de entrar nas ruínas e encontrar 'aquilo'."
21020-137 = "[s] \"Aquilo?\""
21020-138 = "Ah, a ordem da explicação pode não ter sido a melhor. Agora eu preciso falar sobre isso."
21020-139 = "Sensei,"
21020-142 = "Você sabe o que é a... G.Bible?"
21020-144 = "Próximo Episódio; Em Direção às Ruínas"