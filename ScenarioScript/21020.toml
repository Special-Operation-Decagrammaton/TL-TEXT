[translation]
21020-1 = "Episódio 2; A Tesoureira do Seminar, Yuuka"
21020-2 = "Departamento de Desenvolvimento de Jogos da Millennium"
21020-4 = "……."
21020-5 = "Lá vem ela, uma das quatro divindades do conselho estudantil! A tesoureira do conselho, Yuuka, conhecida pelo apelido de \"Calculista Cruel\"!"
21020-6 = "Pode parar de inventar apelidos estranhos e me chamar como se eu fosse um monstro? Que falta de educação."
21020-7 = "Mas, deixando isso de lado..."
21020-8 = "……Sensei."
21020-9 = "[s] \"Olá, Yuuka.\""
21020-10 = "……Ah, que situação para nos encontrarmos."
21020-11 = "Eu tenho muitas coisas para conversar com o Sensei, mas isso fica para depois... Momoi."
21020-13 = "Vocês realmente não desistem, né? Envolver o \"Schale\" só para evitar o fechamento do clube."
21020-14 = "Mas saiba que isso é inútil."
21020-15 = "Mesmo que seja o Schale do Conselho Estudantil Federal... ou melhor, mesmo que aquela Presidente do Conselho Estudantil tivesse voltado!"
21020-16 = "A administração dos clubes é, em grande parte, delegada aos conselhos estudantis de cada escola."
21020-17 = "O fechamento do Departamento de Desenvolvimento de Jogos já foi decidido, e ninguém pode mudar isso."
21020-18 = "I-Isso não é verdade!"
21020-19 = "Você disse que se tivéssemos o número mínimo de membros ou se apresentássemos resultados dignos de um clube da Millennium..."
21020-20 = "……Se conseguissem, ótimo. Se não, o clube seria fechado, e tanto o orçamento quanto a sala seriam confiscados. Eu fui bem clara sobre isso, não fui?"
21020-21 = "Vocês não só não têm o número de membros necessário, como já se passaram meses sem que apresentassem qualquer prova de resultados como clube..."
21020-24 = "Não deveria haver objeções quanto ao fechamento, certo?"
21020-26 = "Eu tenho uma objeção! Tenho várias! Nós estamos nos esforçando ao máximo nas atividades do clube!"
21020-28 = "Então, tipo, aquele negócio de... ministério de cotação? Deveria valer alguma coisa!"
21020-29 = "Se quer dizer \"clemência\", o termo é esse. E mais, o que você disse agora? Esforçando-se ao máximo...?"
21020-30 = "Não me faça rir!"
21020-32 = "Vocês constroem um prédio estranho na escola, decoram como se fosse um cassino para começar um torneio de apostas, e atacam o Clube de Pesquisa de História Antiga dizendo que estão procurando jogos retrô..."
21020-33 = "Isso é um absurdo, não é!? Pode até ser o seu \"máximo\", mas não é assim que um clube deve funcionar! Além disso, depois de causar tantos problemas em todos os lugares, como você tem a cara de pau de pedir verba todo mês!?"
21020-34 = "Por que não tenta dar uma desculpa decente pelo menos uma vez?"
21020-35 = "À-Às vezes, é preciso valorizar a intenção mais do que o resultado..."
21020-36 = "Não quero ouvir desculpas de perdedores."
21020-37 = "Afinal, você quer ouvir ou não quer!?"
21020-38 = "O que eu quero dizer é que não quero ouvir desculpas inúteis. Na Millennium, \"resultados\" são tudo."
21020-39 = "M-Mas nós temos resultados! Nós também estamos desenvolvendo jogos!"
21020-40 = "É-É verdade! \"Tales Saga Chronicle\" foi premiado naquele concurso, e..."
21020-43 = "[ns] \"'Tales Saga Chronicle'?\""
21020-44 = "……Pois é. De fato, foi premiado."
21020-45 = "Pela sua reação, Sensei, parece que você não conhece."
21020-46 = "\"Tales Saga Chronicle\"... é o único resultado deste Departamento de Desenvolvimento de Jogos."
21020-47 = "Além do jogo em si, as críticas foram muito marcantes."
21020-48 = "\"O RPG mais 'desesperador' da história dos jogos que já joguei. Não pelo enredo, mas pela qualidade técnica do jogo.\""
21020-49 = "\"Não dá nem para contar o que falta nesse jogo... mas, acima de tudo, o que falta é 'sanidade'.\""
21020-50 = "\"Depois de jogar isso, até 'Dead Cream Zone' parece uma obra-prima...\""
21020-51 = "N-Nosso jogo não vai se curvar à maldade da internet..."
21020-52 = "Mesmo que houvesse um número infinito de usuários, quando muitas avaliações convergem, esse é o resultado mais próximo da verdade."
21020-53 = "Além disso, o único \"resultado\" que vocês têm é esse \"1º lugar no ranking de piores jogos do ano\", não é?"
21020-54 = "I-Isso é verdade, mas...!"
21020-55 = "[s] \"1º lugar!? Incrível, fiquei curioso sobre esse jogo!!\""
21020-57 = "……."
21020-58 = "……."
21020-61 = "……."
21020-62 = "……De qualquer forma."
21020-63 = "Se um clube como o de vocês continuar funcionando assim, só vai acabar manchando a reputação da escola."
21020-64 = "Além disso, se o orçamento destinado a vocês fosse redirecionado, poderia ajudar alunos que realmente realizam atividades significativas..."
21020-65 = "Portanto, se querem insistir que suas atividades têm algum valor... então provem."
21020-66 = "Provar, como...?"
21020-67 = "Eu já disse várias vezes. Se vocês provarem que têm méritos e resultados concretos, a decisão de fechar o clube será revogada."
21020-68 = "Por exemplo, ganhar algum tipo de competição?"
21020-69 = "Exatamente. Se fosse um clube de esportes, seria participar de um torneio nacional; se fosse o Clube de Engenharia, seria publicar uma invenção, coisas desse tipo."
21020-70 = "Para o Clube de Desenvolvimento de Jogos, imagino que existam vários concursos desse tipo..."
21020-71 = "Dito isso, não acho que só participar vá resolver as coisas. A capacidade de vocês já foi comprovada por aquele ranking de jogos lixo."
21020-72 = "Grr..."
21020-73 = "Por que não facilitamos as coisas para ambos os lados? Esvaziem a sala do clube agora mesmo e joguem fora essas tralhas."
21020-74 = "..."
21020-75 = "N-não chame de tralha...!"
21020-76 = "...Então o que é?"
21020-77 = "I-isso é..."
21020-81 = "...!"
21020-82 = "...Entendido. Vamos mostrar tudo através de resultados."
21020-83 = "Ah é...?"
21020-84 = "Porque a preparação para isso já está pronta!"
21020-86 = "Hã?"
21020-87 = "É mesmo!?"
21020-88 = "Por que a Midori está surpresa!?"
21020-89 = "De qualquer forma, nós temos um trunfo."
21020-90 = "Usando esse trunfo, vamos inscrever nosso jogo no próximo \"Millennium Prize\"..."
21020-91 = "O \"TSC2\"... \"Tales Saga Chronicle 2\"!"
21020-92 = "!?"
21020-93 = "[s] \"Millennium Prize... o que é isso?\""
21020-95 = "É o maior concurso da Millennium, onde todos os clubes competem com seus próprios projetos! Se ganharmos um prêmio aqui, não terá como você reclamar, certo!"
21020-96 = "...Bem, suponho que sim."
21020-97 = "Isso se vocês conseguirem ganhar, é claro."
21020-98 = "Mas Momoi, o que você está dizendo agora não é o mesmo nível de um clube esportivo participar de um torneio nacional..."
21020-99 = "É como \"um jogador de beisebol do ensino médio tentando entrar na liga principal\", algo completamente fora do alcance."
21020-100 = "...Bem, tudo bem. Não sei por que, mas até que estou começando a ficar um pouco animada."
21020-102 = "Entendido, então esperarei até lá."
21020-103 = "Faltam duas semanas para o Millennium Prize... estou ansiosa para ver que tipo de resultado vocês conseguirão nesse curto período."
21020-105 = "...Ufa. Quem diria que eu acabaria mostrando um lado tão pouco profissional na frente do Sensei..."
21020-106 = "Mas, isso também faz parte do trabalho do Conselho Estudantil."
21020-107 = "Da próxima vez, vamos nos encontrar em uma situação diferente e mais calma, Sensei. Até mais."
21020-109 = "(Click)"
21020-110 = "..."
21020-111 = "Irmã..."
21020-112 = "Ambas as opções parecem ter poucas chances de sucesso... mas não seria melhor tentar recrutar novos membros do que tentar fazer um jogo agora?"
21020-113 = "Nós tentamos isso exaustivamente durante o último mês, não foi...? No fim, ninguém quis entrar."
21020-114 = "Já estou cansada de ser ridicularizada com \"Pff! Até VR já é antigo, que história é essa de jogo retrô?\"."
21020-115 = "..."
21020-116 = "Yuuka, sua covarde! Aproveitar que nerds como nós têm poucos amigos! Não perdoo!"
21020-117 = "Não... acho que isso não é culpa da Yuuka, é 100% nossa própria responsabilidade."
21020-118 = "De qualquer forma, continuar recrutando membros não nos levará a um futuro brilhante."
21020-119 = "Além disso, ainda temos outra esperança."
21020-120 = "Ah, é verdade. O que exatamente é esse \"trunfo\" que você mencionou?"
21020-121 = "É claro que estou falando de você, Sensei."
21020-122 = "[s] \"……Eu?\""
21020-123 = "Voltando ao assunto, nosso objetivo fica nas \"Ruínas\"."
21020-124 = "As \"Ruínas\" são... originalmente uma área misteriosa perto de Millennium, onde o Conselho Estudantil Geral restringia o acesso."
21020-125 = "Diziam que o acesso era restrito porque era uma \"área perigosa\", mas... na verdade, ninguém sabe exatamente o que a torna perigosa."
21020-126 = "Se ninguém nunca entrou, se é impossível entrar, ou se ninguém que entrou voltou... nem isso sabemos ao certo."
21020-127 = "……É um lugar envolto em mistério."
21020-128 = "[s] \"Por que diabos vocês querem ir a um lugar desses……?\""
21020-129 = "Porque eu quero criar um jogo incrível!"
21020-130 = "Eu quero provar algo."
21020-131 = "Mesmo que o nosso nível atual não passe de \"o primeiro lugar no ranking de jogos ruins deste ano\"."
21020-132 = "Que esses jogos que eu tanto amo... que me fizeram tão feliz..."
21020-134 = "Não são lixo, mas sim tesouros preciosos!"
21020-135 = "……Irmã."
21020-136 = "Para isso, precisamos dar um jeito de entrar nas Ruínas e encontrar \"aquilo\"."
21020-137 = "[s] \"Aquilo?\""
21020-138 = "Ah, talvez a ordem não tenha sido a melhor. Agora, preciso falar sobre isso."
21020-139 = "Sensei,"
21020-142 = "Você conhece... a G.Bible?"
21020-144 = "Próximo episódio: Rumo às Ruínas"
