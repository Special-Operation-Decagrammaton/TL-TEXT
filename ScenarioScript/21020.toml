21020-19 = "Você mesma disse: se a gente#nat ingisse o número mínimo de#nmembros, ou apresentasse um#nresultado à altura de um#ndepartamento da Millennium……"
21020-20 = "……se conseguissem, tudo bem. Se#nnão, dissolução, com o confisco da#nverba e, claro, da sala do#ndepartamento. Eu disse tudo isso#nbem certinho, não disse?"
21020-21 = "Vocês não só estão abaixo do#nnúmero de membros, como já se#npassaram meses sem nada que prove#no resultado do departamento……"
