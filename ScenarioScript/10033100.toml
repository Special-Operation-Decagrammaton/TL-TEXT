[translation]
10033100-1 = "第10話;それでもできること"
10033100-2 = "ダメぇぇっ！！！"
10033100-12 = "花火上がっちゃった！？"
10033100-13 = "……とりあえず、火を止めよう。"
10033100-14 = "水……！#nイエ、消火器は……！？"
10033100-15 = "早く止めないと神木祭が……チセ様が……！"
10033100-20 = "真昼に花火……舞台を囲むみたいに……。"
10033100-21 = "……きれい。"
10033100-24 = "[ns1] \"熱っ……！\"\n[ns2] \"花火、いつまで打ち上がり続けるの！？\""
10033100-29 = "これでは近づけません……！"
10033100-31 = "これは、周りの建物も危ないのデハ……！？"
10033100-32 = "ああもーどうしよー！？"
10033100-34 = "こ、これじゃあ……。"
10033100-36 = "リーダーどうします！？"
10033100-37 = "花火、計画通りに打ち上がりましたけど……#nせ、成功ですかね！？"
10033100-42 = "……違う。"
10033100-43 = "こんな……こんなのを望んだわけじゃ……。"
10033100-48 = "リーダー危ない！"
10033100-49 = "熱っ！？"
10033100-60 = "（私のせいで……私が、勝手に花火を運んだから……）"
10033100-61 = "（違う、そもそも……）"
10033100-62 = "（スケジュールが、遅れなければ……昨日、ちゃんとガイドができてたら……）"
10033100-63 = "（遅れを巻き返そうなんて思う事態に、ならなかったら……）"
10033100-64 = "（我ながら名案、なんて……調子に乗って、早い時間から花火を勝手に動かして……）"
10033100-65 = "（……）"
10033100-66 = "（……私は、バカだ）"
10033100-67 = "（社長だったら、こんなことにはならなかった……）"
10033100-68 = "（私じゃなくて、社長だったら……）"
10033100-69 = "（私が全部台無しにした……百鬼夜行のお祭りも、ゲヘナのみんなの思い出も……）"
10033100-71 = "ぐすっ……うっ、うぅっ……。"
10033100-75 = "[ns] （ウミカの元へ近づく）"
10033100-81 = "[ns] （手を差し伸べる）"
10033100-83 = "せん、せい……？"
10033100-84 = "[s] \"顔を上げて、ウミカ。\""
10033100-85 = "私のせいで、全部ダメになってしまいました……。"
10033100-86 = "予定通り、全部上手くやるどころか、"
10033100-87 = "余計なことをして、全部台無しに……。"
10033100-88 = "すみません……そもそも、何もするべきじゃなかったんです。#n私なんかが、思い上がって、勝手に動いて、全部壊して……。"
10033100-89 = "ごめんなさい……#n私の、私のせいで、こんな……。"
10033100-90 = "[s3] \"泣かないで、ウミカ。\"\n[s4] \"それでもウミカの頑張りは消えてない。\""
10033100-93 = "でも、それじゃダメなんです！#n頑張っても、考えても、走り回っても、#nそれでも、ゲヘナの皆さんの思い出を汚してしまった事実は……！"
10033100-94 = "[s] \"見て、みんなの顔を。\""
10033100-95 = "……？"
10033100-98 = "何か雰囲気変わってきたね？"
10033100-99 = "まぁこれもお祭りの一環でしょ、すごい光景だし。"
10033100-100 = "爆発したり燃え盛ったりヤバいね。#n百鬼夜行、あたしらよりカオスじゃん。"
10033100-102 = "確かに……#nてかそう言われると、負けてらんなくない？"
10033100-104 = "ね、グレネードランチャーある？"
10033100-105 = "あるけど、何に使うの？"
10033100-106 = "遅延信管を使えば、綺麗に打ち上がりそうじゃない？"
10033100-107 = "あ、花火の代わり的な？"
10033100-108 = "そうそう！"
10033100-109 = "良いじゃん、やるなら派手にやろっか。"
10033100-115 = "ど、どうしよう、こんな、これじゃ……。"
10033100-116 = "リーダー！しっかりしてください！"
10033100-117 = "そうですよ、リーダーがブレたら魑魅一座は終わりですって！"
10033100-118 = "……っ！"
10033100-123 = "視界が全部、花で燃えて……。"
10033100-127 = "何だか、夢みたい。"
10033100-132 = "……？"
10033100-133 = "どうして、みんな……そんな顔で……。"
10033100-134 = "[ns] \"それはそうだよ、私が言うまでもないけど。\""
10033100-135 = "……？"
10033100-149 = "[ns] \"……ここは百鬼夜行で、彼女たちはゲヘナだもの。\""
10033100-150 = "…………！"
10033100-151 = "ど、どういう反応をすれば良いのか、迷ってしまいますが……。"
10033100-152 = "それでも、私の失敗はやはり……！"
10033100-153 = "[s5] \"まだ終わってないよ。\"\n[s6] \"それにウミカは一人じゃない。\""
10033100-156 = "ウミカ！#n大丈夫デスか！？"
10033100-157 = "フィーナ……。"
10033100-158 = "何かすごいことになってきたけど、こういう時こそ力を合わせないと！"
10033100-159 = "力を……。"
10033100-160 = "うん！#n百鬼夜行のみんなと……それに、ゲヘナのみんなとも！"
10033100-161 = "で、でも、これは全部私のミスで、他の人に背負わせるのは……。"
10033100-169 = "そんなこと、無いんじゃないかな。"
10033100-170 = "ツバキ先輩……？"
10033100-171 = "[ns7] \"助けを求めることと、責任を負わせることは一緒じゃない。\"\n[ns8] \"誰だって、支え合って生きてるから。\""
10033100-174 = "……社長なら、こんな時――"
10033100-175 = "委員長も同じデス！"
10033100-176 = "はい……？"
10033100-188 = "[ns9] \"シズコだって、頑張り屋だけど完璧じゃない。\"\n[ns10] \"むしろ頼るのが上手だから、社長なんじゃないかな。\""
10033100-191 = "……。"
10033100-195 = "先生ー！#nウミカちゃーん！"
10033100-203 = "皆さん……！"
10033100-205 = "悪い予感がして来てみたけど……。"
10033100-206 = "あははっ、どう見てもヤバそうだね！"
10033100-207 = "[s] \"どうにか鎮火したいんだけど、助けてもらえる？\""
10033100-208 = "やっぱりか……#nみんなは「これもお祭りだよ」って盛り上がってたけど。"
10033100-209 = "んー……多分これ、人手が要るよね？"
10033100-210 = "ゲヘナも全員動かないと……#nでも、この状況でどうする？"
10033100-211 = "だーいじょーぶ！#n方法ならあるよ！"
10033100-213 = "ほ、本当ですか！？"
10033100-214 = "だって、ここにいるじゃん！#nこの修学旅行をまとめてきてくれた「ガイドさん」たちがさ！"
10033100-215 = "が、ガイド……。"
10033100-225 = "[ns] \"さあ、最後まで引っ張ってあげて。\""
10033100-226 = "……最後まで、私が。"
10033100-231 = "……先生、皆さん。"
10033100-232 = "最後まで、成し遂げたいと思います。"
10033100-233 = "そのために……#nもう少しだけ、手伝っていただけないでしょうか？"
10033100-234 = "もちろん！"
10033100-240 = "皆さーん！#nこのお祭りを楽しんでいただいている、百鬼夜行とゲヘナ学園の皆さーん！"
10033100-241 = "次の流れを、案内しまーす！！"
10033100-242 = "炎に包まれた広場と巫女！"
10033100-243 = "この窮地を救えるのは、ここにいる皆さんです！"
10033100-244 = "ご神木は既に、幸運を分けてくださっています！"
10033100-245 = "あとは、皆さんの力があれば！！"
10033100-250 = "え、えぇ……？"
10033100-256 = "エリカちゃん、行こっか？"
10033100-257 = "うん、何とかしないとね。"
10033100-258 = "じゃあ行ってくるね！#n先生、ウミカちゃん！"
10033100-264 = "はい、お願いします！"
10033100-270 = "みんなー！#n今の聞いてたー！？"
10033100-271 = "あー、このお祭りでしょ？#n力を貸してって言われても、何をすれば……。"
10033100-272 = "簡単だよ、火を消して巫女さんを助けるだけ。"
10033100-273 = "まあそれもそっか。#n一応確認するんだけど、この流れも全部織り込み済みなんだよね？"
10033100-274 = "そうそう！#nでも火は本物みたいだし、早く動いちゃお！"
10033100-275 = "向こうでも始まったみたいだね。"
10033100-278 = "カエデ、こちらデス！"
10033100-279 = "もっと水ちょーだい！#nバケツでも消火器でも良いから！"
10033100-280 = "慎重に、でも急いでねー……#n順番に、ひとつずつ～。"
10033100-286 = "よーっし、じゃあ行こう！"
10033100-290 = "何なら先に終わらせちゃおうか？"
10033100-295 = "な、なるほど……そうと分かれば話は早い！"
10033100-296 = "私たちも混ぜろーー！！"
10033100-308 = "魑魅一座の皆さん、何で動かないんですか！"
10033100-310 = "え、えぇ、あたし……？"
10033100-311 = "当然です、やるからには全力で！#nお祭りが滅茶苦茶になるのは、そちらも望んでないでしょう！？"
10033100-313 = "……！"
10033100-314 = "……うん、それはそうだ。"
10033100-315 = "あたしたちが始めたことだし……目的は、このお祭りを守ること。"
10033100-316 = "……魑魅一座、集合！"
10033100-321 = "は、はいっ！#nリーダー、一体何をすれば！？"
10033100-322 = "こ、このままじゃ私たちのご神木が……お祭りが……！"
10033100-324 = "そのご神木を、あたしたちが守るんだ！"
10033100-325 = "それがあたしたちのお祭りを、百鬼夜行を守ることにつながる！"
10033100-330 = "了解！"
10033100-331 = "私たちのお祭りなんだから、私たちの手で！"
10033100-374 = "はぁ、はぁ……#n何か、もう大体解決した感じ……？"
10033100-375 = "だいぶ鎮火できているようですね、お疲れ様でした。"
10033100-376 = "[s] \"風紀委員のみんな……！あれ、会合は？\""
10033100-377 = "その会合が、すぐ向こうで開かれてまして。"
10033100-378 = "あの陰陽部のニヤって人が、急に休憩とか言い出して……#nふと外に出たら、火の手が上がってたからさ。"
10033100-379 = "ああもう、何をしたらこうなるんだよ……。"
10033100-380 = "今からでも、できることはありそうですね。#n手伝いましょう。"
10033100-387 = "学園と学園……#n委員会や部活の垣根を超えて、一丸となって危機に対処する……。"
10033100-388 = "なんて美しく、胸がいっぱいになる光景なのでしょう……！#n身共は感激いたしました！"
10033100-389 = "アタシらもじっとしていられないな、キキョウ？"
10033100-390 = "うん。百花繚乱、行こう。"
10033100-397 = "[ns] \"もしかして、ニヤは最初から……。\""
10033100-406 = "それでは改めて、神木祭の巫女のご紹介へ移ります！"
10033100-407 = "皆さんのご参加によって、再び儀式は再開されます。#n舞台に上がった巫女は、この後――"
10033100-409 = "百鬼夜行のお祭り、本当に観客が参加するんだね。"
10033100-410 = "あははっ、ビックリだね！#nでも貴重な体験になったかも！"
10033100-411 = "だね、すんごいリアルだったり。#n巫女の人、燃えちゃうかと思った。"
10033100-416 = "まあ、それはそうだね……。"
10033100-418 = "伊達に「観光で有名な学校」って呼ばれてないね。"
10033100-419 = "うん、もうちょっと長くいたかったなー。"
10033100-421 = "そしたら今度は、どんな事件が起きるやら……。"
10033100-422 = "事件？"
10033100-423 = "ううん、何でもない。#nね、キララちゃん。"
10033100-424 = "どうしたの？"
10033100-428 = "良かったね。"
10033100-429 = "んー……？"
10033100-431 = "今ご覧になっている舞は、祈りと奉納を表現しており――"
10033100-434 = "……うん、良かった。"
10033100-435 = "ね。"
10033100-443 = "……。"
10033100-444 = "花が舞い"
10033100-445 = "喜び満ちて"
10033100-446 = "幕となる"
