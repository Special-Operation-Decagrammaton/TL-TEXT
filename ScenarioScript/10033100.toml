[translation]
10033100-1 = "Episódio 10; O que ainda pode ser feito"
10033100-2 = "Nããão!!!"
10033100-12 = "Os fogos de artifício foram disparados!?"
10033100-13 = "……Primeiro, vamos apagar o fogo."
10033100-14 = "Água……! Não, onde está o extintor de incêndio……!?"
10033100-15 = "Se não pararmos logo, o Festival Kamiki…… a senhorita Chise……!"
10033100-20 = "Fogos de artifício em plena luz do dia…… cercando o palco……."
10033100-21 = "……Que lindo."
10033100-24 = "[ns1] \"Que quente……!\"\n[ns2] \"Até quando esses fogos vão continuar explodindo!?\""
10033100-29 = "Não dá para chegar perto assim……!"
10033100-31 = "Isso não é perigoso para os prédios ao redor……!?"
10033100-32 = "Ah, meu Deus, o que eu faço!?"
10033100-34 = "I-isso não pode estar acontecendo……."
10033100-36 = "Líder, o que a gente faz!?"
10033100-37 = "Os fogos foram disparados como planejado, mas…… será que, tipo, foi um sucesso!?"
10033100-42 = "……Não é isso."
10033100-43 = "Eu não…… eu não queria que as coisas terminassem assim……."
10033100-48 = "Líder, cuidado!"
10033100-49 = "Ai, que quente!?"
10033100-60 = "(É tudo culpa minha…… porque eu decidi mover os fogos por conta própria……)"
10033100-61 = "(Não, na verdade……)"
10033100-62 = "(Se o cronograma não tivesse atrasado…… se eu tivesse guiado eles direito ontem……)"
10033100-63 = "(Se eu não tivesse tentado recuperar o tempo perdido……)"
10033100-64 = "(Achei que era uma ideia brilhante…… me empolguei e comecei a mover os fogos antes da hora……)"
10033100-65 = "(……)"
10033100-66 = "(……Eu sou uma idiota.)"
10033100-67 = "(Se fosse a presidente, isso não teria acontecido……)"
10033100-68 = "(Se não fosse eu, se fosse a presidente……)"
10033100-69 = "(Eu estraguei tudo…… o festival de Hyakkiyako, as memórias do pessoal de Gehenna……)"
10033100-71 = "Snif…… ugh, uuu……."
10033100-75 = "[ns] (Aproxima-se de Umika)"
10033100-81 = "[ns] (Estende a mão)"
10033100-83 = "Sen, sei……?"
10033100-84 = "[s] \"Levante a cabeça, Umika.\""
10033100-85 = "Por minha causa, tudo deu errado……."
10033100-86 = "Em vez de fazer tudo dar certo como planejado,"
10033100-87 = "eu fiz o que não devia e estraguei tudo……."
10033100-88 = "Me desculpe…… eu nem deveria ter tentado fazer nada. Eu, uma qualquer, me achei capaz, agi por conta própria e destruí tudo……."
10033100-89 = "Me desculpe……#nPor minha, por minha culpa, tudo isso……."
10033100-90 = "[s3] \"Não chore, Umika.\"\n[s4] \"Mesmo assim, o seu esforço não foi em vão.\""
10033100-93 = "Mas não adianta!#nMesmo que eu tenha me esforçado, pensado e corrido para lá e para cá,#no fato de que eu manchei as memórias do pessoal de Gehenna continua……!"
10033100-94 = "[s] \"Olhe para o rosto deles.\""
10033100-95 = "……?"
10033100-98 = "O clima mudou, não mudou?"
10033100-99 = "Bem, isso faz parte do festival, né? É um espetáculo incrível."
10033100-100 = "Explosões e fogo por toda parte, que loucura.#nHyakkiyako é mais caótica que a gente."
10033100-102 = "É verdade……#nE agora que você falou, não podemos ficar para trás, né?"
10033100-104 = "Ei, você tem um lança-granadas?"
10033100-105 = "Tenho, mas para que você quer?"
10033100-106 = "Se a gente usar um fusível de retardo, não daria para fazer um show de fogos bem bonito?"
10033100-107 = "Ah, tipo um substituto para os fogos de artifício?"
10033100-108 = "Isso mesmo!"
10033100-109 = "Nada mal, se é para fazer, vamos fazer com estilo."
10033100-115 = "O-o que eu faço? Com isso, desse jeito..."
10033100-116 = "Líder! Por favor, mantenha a calma!"
10033100-117 = "É verdade, se a líder perder o rumo, o Grupo Chimi acaba!"
10033100-118 = "...!"
10033100-123 = "Todo o meu campo de visão está queimando em flores..."
10033100-127 = "Parece até um sonho."
10033100-132 = "...?"
10033100-133 = "Por que todos estão... com essas caras..."
10033100-134 = "[ns] \"É natural que estejam, embora eu nem precise dizer.\""
10033100-135 = "...?"
10033100-149 = "[ns] \"...Afinal, aqui é Hyakkiyako, e elas são de Gehenna.\""
10033100-150 = "............!"
10033100-151 = "Eu, eu não sei como reagir a isso, estou confusa..."
10033100-152 = "Mas, mesmo assim, o meu erro foi..."
10033100-153 = "[s5] \"Ainda não acabou.\"\n[s6] \"Além disso, Umika não está sozinha.\""
10033100-156 = "Umika!#nVocê está bem!?"
10033100-157 = "Feena..."
10033100-158 = "As coisas ficaram bem intensas, mas é justamente nessas horas que precisamos unir forças!"
10033100-159 = "Unir forças..."
10033100-160 = "Sim!#nCom o pessoal de Hyakkiyako... e com o pessoal de Gehenna também!"
10033100-161 = "Ma-mas, tudo isso é culpa minha, não posso deixar que os outros carreguem esse fardo..."
10033100-169 = "Acho que não é bem assim."
10033100-170 = "Tsubaki-senpai...?"
10033100-171 = "[ns7] \"Pedir ajuda não é o mesmo que transferir a responsabilidade.\"\n[ns8] \"Todo mundo vive apoiando uns aos outros.\""
10033100-174 = "...Se fosse a presidente, em um momento como este..."
10033100-175 = "A presidente do comitê também é assim!"
10033100-176 = "Sim...?"
10033100-188 = "[ns9] \"Shizuko também é esforçada, mas não é perfeita.\"\n[ns10] \"Na verdade, ela é presidente justamente porque sabe como depender dos outros.\""
10033100-191 = "..."
10033100-195 = "Sensei!#nUmika-chan!"
10033100-203 = "Pessoal...!"
10033100-205 = "Tive um mau pressentimento e vim ver como estavam..."
10033100-206 = "Ahaha, não importa como se olhe, a situação está feia!"
10033100-207 = "[s] \"Eu quero apagar esse incêndio, podem me ajudar?\""
10033100-208 = "Eu sabia...#nTodo mundo estava empolgado dizendo que \"isso também faz parte do festival\"."
10033100-209 = "Hmm... acho que vamos precisar de muita gente, né?"
10033100-210 = "O pessoal de Gehenna também precisa se mover...#nMas, o que faremos nessa situação?"
10033100-211 = "Tá tudo bem!#nEu tenho um jeito!"
10033100-213 = "Sé-sério mesmo!?"
10033100-214 = "Ora, eles estão bem aqui!#nOs \"guias\" que organizaram essa viagem escolar!"
10033100-215 = "Guias..."
10033100-225 = "[ns] \"Vamos lá, lidere isso até o fim.\""
10033100-226 = "...Até o fim, eu."
10033100-231 = "...Sensei, pessoal."
10033100-232 = "Eu quero levar isso até o fim."
10033100-233 = "Para isso...#npoderiam me ajudar só mais um pouco?"
10033100-234 = "Com certeza!"
10033100-240 = "Pessoal!#nTodos de Hyakkiyako e da Academia Gehenna que estão aproveitando este festival!"
10033100-241 = "Vou anunciar o que vem a seguir!!"
10033100-242 = "A praça está envolta em chamas e a sacerdotisa está em perigo!"
10033100-243 = "Os únicos que podem salvar esta situação são vocês que estão aqui!"
10033100-244 = "A Árvore Sagrada já está compartilhando sua sorte conosco!"
10033100-245 = "Agora, só precisamos da força de vocês!!"
10033100-250 = "Eh, hã...?"
10033100-256 = "Erika-chan, vamos?"
10033100-257 = "Sim, precisamos dar um jeito nisso."
10033100-258 = "Então já vou indo!#nSensei, Umika-chan!"
10033100-264 = "Sim, por favor!"
10033100-270 = "Pessoal!#nVocês ouviram isso agora!?"
10033100-271 = "Ah, sobre este festival?#nMesmo que peçam nossa ajuda, o que devemos fazer...?"
10033100-272 = "É simples, só apagar o fogo e salvar a sacerdotisa."
10033100-273 = "Bem, faz sentido. #nSó confirmando, isso tudo já estava planejado, né?"
10033100-274 = "Isso mesmo!#nMas o fogo parece real, então vamos agir rápido!"
10033100-275 = "Parece que começou ali também."
10033100-278 = "Kaede, é por aqui!"
10033100-279 = "Me dê mais água!#nPode ser um balde ou um extintor!"
10033100-280 = "Com cuidado, mas rápido...#nUm de cada vez, por favor~."
10033100-286 = "Muito bem, então vamos lá!"
10033100-290 = "Que tal terminarmos logo com isso?"
10033100-295 = "E-entendo... se é assim, então vamos logo!"
10033100-296 = "Incluam a gente nisso também!!"
10033100-308 = "Pessoal do Chimi Ichiza, por que não estão se movendo!"
10033100-310 = "Eh, hã, eu...?"
10033100-311 = "É óbvio, se vamos fazer, vamos dar o nosso melhor!#nVocês também não querem que o festival seja arruinado, querem!?"
10033100-313 = "……!"
10033100-314 = "……É, você tem razão."
10033100-315 = "Fomos nós que começamos isso... e nosso objetivo é proteger este festival."
10033100-316 = "……Chimi Ichiza, reunir!"
10033100-321 = "S-sim!#nLíder, o que devemos fazer!?"
10033100-322 = "D-desse jeito, nossa Árvore Sagrada... o festival...!"
10033100-324 = "Nós vamos proteger essa Árvore Sagrada!"
10033100-325 = "Isso significa proteger o nosso festival e Hyakkiyako!"
10033100-330 = "Entendido!"
10033100-331 = "O festival é nosso, então vamos cuidar dele com nossas próprias mãos!"
10033100-374 = "Haa, haa...#nParece que já resolvemos quase tudo...?"
10033100-375 = "Parece que o fogo foi controlado, bom trabalho a todos."
10033100-376 = "[s] \"Pessoal do Comitê Disciplinar...! Ué, e a reunião?\""
10033100-377 = "Aquela reunião está acontecendo logo ali."
10033100-378 = "Aquela pessoa sorrateira do Departamento Yin-Yang de repente disse que era hora de uma pausa...#ne quando saímos, o fogo já tinha começado."
10033100-379 = "Ah, meu Deus, como as coisas chegaram a esse ponto..."
10033100-380 = "Ainda há coisas que podemos fazer agora.#nVamos ajudar."
10033100-387 = "Academia com academia...#nUltrapassando as barreiras entre comitês e clubes, unindo forças para enfrentar uma crise..."
10033100-388 = "Que cena linda e emocionante...!#nEstou profundamente comovido!"
10033100-389 = "Nós também não podemos ficar paradas, Kikyou?"
10033100-390 = "Sim. Hyakkiyaran, vamos."
10033100-397 = "[ns] \"Será que Niya já sabia desde o início...?\""
10033100-406 = "Dando continuidade, vamos prosseguir com a apresentação da sacerdotisa do Festival da Árvore Sagrada!"
10033100-407 = "Graças à participação de todos, o ritual será retomado. #nA sacerdotisa que subiu ao palco, depois disso――"
10033100-409 = "O festival de Hyakkiyako, os espectadores realmente participam, né."
10033100-410 = "Ahaha, que surpresa! #nMas talvez tenha sido uma experiência valiosa!"
10033100-411 = "Verdade, foi super realista. #nAchei que a sacerdotisa ia acabar pegando fogo."
10033100-416 = "Bem, é verdade..."
10033100-418 = "Não é à toa que chamam de 'escola famosa pelo turismo'."
10033100-419 = "Sim, eu queria ter ficado um pouco mais."
10033100-421 = "Se ficássemos, quem sabe que tipo de incidente aconteceria da próxima vez..."
10033100-422 = "Incidente?"
10033100-423 = "Não, nada não. #nEi, Kirara-chan."
10033100-424 = "O que foi?"
10033100-428 = "Que bom, né."
10033100-429 = "Hmm...?"
10033100-431 = "A dança que vocês estão vendo agora expressa oração e devoção, e――"
10033100-434 = "...Sim, foi bom."
10033100-435 = "Né."
10033100-443 = "..."
10033100-444 = "As flores dançam"
10033100-445 = "Transbordando alegria"
10033100-446 = "O cortina se fecha"
