[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1013906-1 = "A Etiqueta da Niko" 
1013906-2 = "Schale - Escritório" 
1013906-3 = "（No dia em que a Niko veio à Schale para cumprir\nseu turno de ajudante……）" 
1013906-4 = "[ns] \"……Ué?\"" 
1013906-7 = "Ocorreu algum problema, Sensei?\r\n" 
1013906-8 = "[s1] \"Minha gaveta estava abarrotada com caixas\nde grampos para grampeador.\"\r\n[s2] \"Eu jurava que tinham acabado e pedi\num novo carregamento ontem……\"" 
1013906-11 = "Nossa…… Parece que teremos\num estoque encalhado enorme." 
1013906-12 = "E de quanto estamos falando?" 
1013906-13 = "[s3] \"Acho que o suficiente para durar um ano……\"\r\n[s4] \"Vou acabar levando bronca da\naluna responsável pelas finanças da Schale……\"" 
1013906-16 = "É novidade descobrir que\nexistem alunas que o Sensei teme." 
1013906-17 = "No entanto, grampos não são perecíveis, não vão estragar.\nAcho que não há problemas em ter alguns de sobra." 
1013906-18 = "Na SRT, incidentes com estoques acumulados e esquecidos\neram bem recorrentes, aliás." 
1013906-19 = "Achávamos que as minas terrestres tinham acabado...\ne depois encontrávamos caixas de minas fechadas\nempilhadas no armazém subterrâneo――\r\n" 
1013906-20 = "[s] \"E está tudo bem com isso?!\"" 
1013906-21 = "Claro que sim. É super normal encontrar uma caixa\ncheia de explosivos sem dono aparente jogada em algum canto." 
1013906-22 = "O único problema é quando descobrem que\na origem das bombas é da Academia SRT, porque aí a culpa cai em nós.\r\n" 
1013906-23 = "Desde então, estabelecemos uma regra na SRT de sempre colocarmos\netiquetas de identificação em pertences e armários pessoais." 
1013906-24 = "[s] \"……Regra?\"" 
1013906-25 = "Sim. Como a maioria dos itens distribuídos pela academia\nsão parecidos, é muito fácil alguém pegar os seus por engano." 
1013906-26 = "Misturar as meias na lavanderia, por exemplo,\nera rotineiro e cotidiano……" 
1013906-27 = "Curiosamente, dizem que isso não acontece muito nos outros esquadrões,\nmas as roupas íntimas do Esquadrão FOX viviam sendo trocadas por engano...\nPor que será que isso acontecia?\r\n" 
1013906-28 = "[s5] （Consigo até imaginar o motivo……）\r\n[s6] \"Isso parece ser realmente muito frustrante.\"" 
1013906-31 = "Portanto, que tal colocarmos etiquetas\nnos materiais aqui da Schale também?\r\n" 
1013906-32 = "Eu calhei de trazer etiquetas novas para usar nos nossos suplementos." 
1013906-33 = "Se registrarmos direitinho a localização e o dono de tudo,\ncasos de excesso de estoque como o de hoje vão acabar diminuindo drasticamente." 
1013906-34 = "Aqui, eu trouxe de sobra,\nentão pode usar a sua parte, Sensei.\r\n" 
1013906-35 = "[s7] \"Isso soa como uma ótima ideia.\"\r\n[s8] \"Vamos aproveitar para arrumar os materiais de escritório\ne colocar as etiquetas neles.\"" 
1013906-38 = "Vamos!" 
1013906-43 = "（Depois disso, passamos o tempo distribuindo as etiquetas nos materiais da Schale.）" 
1013906-44 = "（……Graças à arrumação,\nconsegui até encontrar umas coisas que achava ter perdido.）" 
1013906-47 = "[ns] \"……Isso levou muito mais tempo\ndo que o previsto.\"" 
1013906-48 = "Sim. Bom trabalho organizando\ntudo isso hoje.\r\n" 
1013906-49 = "Mas agora, num simples olhar,\ndá para saber exatamente o dono e o que está dentro.\r\n" 
1013906-50 = "A papelaria fica nesta gaveta, e os toners e o papel de impressão\nficam naquela caixa do lado da impressora……" 
1013906-54 = "Oh? Sobrou uma etiqueta.\r\n" 
1013906-55 = "Será que nos esquecemos\nde colar em alguma coisa……" 
1013906-56 = "[s9] \"Pode usá-la em algum lugar\nque você goste, Niko.\"\r\n[s10] \"Que tal colar nos seus pertences?\"" 
1013906-59 = "……Tem razão." 
1013906-60 = "Nesse caso, vou colar esta etiqueta de nome\nna 'minha propriedade'." 
1013906-66 = "……Ei.\r\n" 
1013906-70 = "[ns] \"P-Por que você bateu nas\nminhas costas do nada?!\"" 
1013906-73 = "Fufu, não foi nada.\r\n" 
1013906-78 = "É muito importante colocar o nome\npara não confundirem o dono, sabia?\r\n" 