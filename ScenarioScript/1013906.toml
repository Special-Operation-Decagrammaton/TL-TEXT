[translation]
1013906-1 = "ニコの名札"
1013906-2 = "シャーレ・執務室"
1013906-3 = "（ニコが当番をしに、シャーレの執務室を訪れた日のこと……）"
1013906-4 = "[ns] \"……あれ？\""
1013906-7 = "どうかしましたか、先生？\r\n"
1013906-8 = "[s1] \"引き出しの中が、ホッチキスの針の箱でいっぱいだったんだ。\"\r\n[s2] \"切らしたと思って昨日新しく注文しちゃって……。\""
1013906-11 = "あら……在庫過多になってしまいますね。"
1013906-12 = "どれくらい注文されたんですか？"
1013906-13 = "[s3] \"一年分くらい……。\"\r\n[s4] \"会計担当の生徒に怒られそうだな……。\""
1013906-16 = "先生が怖がる生徒もいらっしゃるんですね。"
1013906-17 = "ですが、ホッチキスの針は傷むものでもありませんし、多少多くても大丈夫だと思います。"
1013906-18 = "SRT学園でも、うっかり在庫過多になってしまうことが、たまにありました。"
1013906-19 = "対人地雷が切れたと思って追加注文したら……後から地下倉庫に、封も切っていない地雷の箱が山積みだったり――\r\n"
1013906-20 = "[s] \"大丈夫なのそれ！？\""
1013906-21 = "大丈夫ですよ。持ち主不明の爆弾の箱が見つかるのは、よくあることですから。"
1013906-22 = "ただ、その出どころがSRT学園のものだと困るんですけどね。\r\n"
1013906-23 = "それ以来、SRTでは私物やロッカーには必ず名札をつけるという決まりにしているんです。"
1013906-24 = "[s] \"……決まり？\""
1013906-25 = "はい。共用の支給品なんかは形が似ているものが多いので、他の人が間違えて持って行ってしまうこともよくあって。"
1013906-26 = "ランドリーで靴下が入れ替わっているなんてことも、日常茶飯事で……。"
1013906-27 = "不思議と他の小隊ではあまりないらしいんですけど、FOX小隊はやけに下着が入れ替わることが多くて……どうしてなんでしょうね。\r\n"
1013906-28 = "[s5] （大体の理由は想像がつくけど……）\r\n[s6] \"たしかに、それは困るね。\""
1013906-31 = "そういうわけで、シャーレの備品にも名札をつけてみませんか？\r\n"
1013906-32 = "ちょうど支給品用の新しい名札を買ってきたので。"
1013906-33 = "どこに何があって誰の持ち物なのか分かるよう書いておいたら、今日みたいに過剰在庫にしてしまうことも減ると思います。"
1013906-34 = "はい、たくさん買ってきたので先生の分。\r\n"
1013906-35 = "[s7] \"いいアイデアだね。\"\r\n[s8] \"それじゃ事務用品の整理も兼ねて、名札を貼っていこうか？\""
1013906-38 = "はい！"
1013906-43 = "（そのあと、ニコと一緒にシャーレの備品に名札を貼っていった）"
1013906-44 = "（……名札を貼っていくうちに、失くしたと思っていた物を見つけることもできた）"
1013906-47 = "[ns] \"……思ったより時間がかかったね。\""
1013906-48 = "そうですね。本当にお疲れ様でした。\r\n"
1013906-49 = "でも、これでどこに何があって、誰の持ち物なのか、一目で分かるようになりました。\r\n"
1013906-50 = "筆記用具を探すときはこの引き出しで、プリンター用トナーやコピー用紙はプリンターの横の箱に全部まとまっていて……。"
1013906-54 = "あれ？名札が1枚、余ってますね。\r\n"
1013906-55 = "貼り忘れたものがあったんでしょうか……。"
1013906-56 = "[s9] \"ニコの好きな場所に使っていいよ。\"\r\n[s10] \"ニコの持ち物に貼るとか？\""
1013906-59 = "……そうですね。"
1013906-60 = "では、この名札は「私の物」に貼っておきます。"
1013906-66 = "……えいっ。\r\n"
1013906-70 = "[ns] \"な、なんで急に背中を叩いたの！？\""
1013906-73 = "ふふ、なんでもありません。\r\n"
1013906-78 = "持ち主を間違えないように名前を書いておくのは、大事ですから。\r\n"
