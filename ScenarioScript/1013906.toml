[translation]
1013906-1 = "Niko's Name Tag"
1013906-2 = "Schale - Office"
1013906-3 = "(This happened on a day when Niko visited the Schale office for her shift...)"
1013906-4 = "[ns] \"...Huh?\""
1013906-7 = "Is something the matter, Sensei?\r\n"
1013906-8 = "[s1] \"The drawer is completely full of boxes of staples.\" \r\n[s2] \"I thought I'd run out, so I ordered more yesterday...\""
1013906-11 = "Oh my... that's quite an overstock."
1013906-12 = "How many did you order?"
1013906-13 = "[s3] \"About a year's worth...\" \r\n[s4] \"The student in charge of accounting is going to be furious with me...\""
1013906-16 = "I didn't realize there were students who could scare you, Sensei."
1013906-17 = "However, staples don't really go bad, so I think having a little extra is fine."
1013906-18 = "Back at SRT Academy, we would accidentally overstock things from time to time as well."
1013906-19 = "Like when we thought we were out of anti-personnel mines and ordered more... only to find a mountain of unopened boxes of them in the basement warehouse later—\r\n"
1013906-20 = "[s] \"Is that even safe!?\""
1013906-21 = "It's fine. Finding boxes of explosives with no known owner is a common occurrence."
1013906-22 = "Though, it would be a problem if they turned out to be from SRT Academy.\r\n"
1013906-23 = "Ever since then, we've had a rule at SRT that all personal items and lockers must have name tags on them."
1013906-24 = "[s] \"...A rule?\""
1013906-25 = "Yes. Many of the shared supplies look identical, so it was common for people to accidentally take the wrong ones."
1013906-26 = "Having our socks get mixed up in the laundry was an everyday occurrence..."
1013906-27 = "Strangely, it doesn't seem to happen much in other squads, but in FOX Squad, our undergarments get mixed up quite often... I wonder why that is.\r\n"
1013906-28 = "[s5] (I can guess the reason...) \r\n[s6] \"I see, that certainly sounds troublesome.\""
1013906-31 = "So, why don't we put name tags on the supplies here at Schale?\r\n"
1013906-32 = "I actually just bought some new name tags for supplies."
1013906-33 = "If we label where things are and who they belong to, I think we'll have fewer incidents like today's overstocking."
1013906-34 = "Here, I bought plenty, so this is for you, Sensei.\r\n"
1013906-35 = "[s7] \"That's a great idea.\" \r\n[s8] \"In that case, shall we organize the office supplies and put these tags on?\""
1013906-38 = "Yes!"
1013906-43 = "(After that, I spent time with Niko putting name tags on the Schale supplies.)"
1013906-44 = "(...While we were labeling everything, I even managed to find some things I thought I had lost.)"
1013906-47 = "[ns] \"...That took longer than I thought.\""
1013906-48 = "It did. Thank you very much for your hard work.\r\n"
1013906-49 = "But now, we can tell at a glance where everything is and who it belongs to.\r\n"
1013906-50 = "When you need writing utensils, you check this drawer, and all the printer toner and copy paper are kept together in the box next to the printer..."
1013906-54 = "Oh? There's one name tag left over.\r\n"
1013906-55 = "I wonder if we forgot to label something..."
1013906-56 = "[s9] \"You can use it wherever you like, Niko.\" \r\n[s10] \"Maybe put it on something of yours?\""
1013906-59 = "...I see."
1013906-60 = "In that case, I'll put this name tag on \"my property.\"\r\n"
1013906-66 = "...Gotcha.\r\n"
1013906-70 = "[ns] \"W-why did you suddenly pat my back!?\""
1013906-73 = "Hehe, it's nothing.\r\n"
1013906-78 = "It's important to label things so you don't mistake who they belong to, after all.\r\n"