[translation]
1013906-1 = "Niko's Name Tag"
1013906-2 = "SCHALE - Office"
1013906-3 = "(On the day Niko visited the SCHALE for duty...)"
1013906-4 = "[ns] \"...Huh?\""
1013906-7 = "Is something wrong, Sensei?"
1013906-8 = "[s1] \"The drawer is full of boxes of staples.\"\n[s2] \"I thought we ran out, so I ordered new ones yesterday...\""
1013906-11 = "Oh my... we'll end up with excess inventory."
1013906-12 = "How much did you order?"
1013906-13 = "[s3] \"About a year of supply...\"\n[s4] \"Looks like the student in charge of accounting is going to get mad at me...\""
1013906-16 = "So there are students that even you are afraid of, Sensei."
1013906-17 = "However, stapler staples don't go bad, so I think it's fine to have a little extra."
1013906-18 = "At SRT Academy, there were times when we accidentally ended up with excess inventory too."
1013906-19 = "Like thinking we ran out of anti-personnel mines and ordering more... only to later find a mountain of unopened boxes of mines in the underground warehouse—"
1013906-20 = "[s] \"Is that really okay!?\""
1013906-21 = "It's fine. Finding boxes of explosives with unknown owners is a common occurrence, after all."
1013906-22 = "However, it would be problematic if they originated from SRT Academy."
1013906-23 = "Since then, we've made it a rule at SRT to always put name tags on our personal belongings and lockers."
1013906-24 = "[s] \"...A rule?\""
1013906-25 = "Added to common shared supplies looking similar, it was common for someone else to mistakenly take them."
1013906-26 = "Socks getting mixed up in the laundry was an everyday occurrence too..."
1013906-27 = "Strange enough, it didn't seem to happen much in other platoons, but in the FOX Platoon, our underwear got swapped around a lot... I wonder why."
1013906-28 = "[s5] \"(I can pretty much guess why...)\"\n[s6] \"That is certainly problematic.\""
1013906-31 = "So why don't we try putting name tags on SCHALE's supplies too?"
1013906-32 = "I just happened to buy new name tags for our supplies."
1013906-33 = "If we write down where things are and who they belong to, I think it will reduce the chances of ending up with excess inventory like today."
1013906-34 = "Here, I bought a lot, so this is your share, Sensei."
1013906-35 = "[s7] \"That's a good idea.\"\n[s8] \"Then, shall we start putting on the name tags while we organize the office supplies?\""
1013906-38 = "Yes!"
1013906-43 = "(After that, I went around putting name tags on SCHALE's supplies with Niko.)"
1013906-44 = "(...While putting on the name tags, we even managed to find some things I thought were lost.)"
1013906-47 = "[ns] \"...It took more time than I thought.\""
1013906-48 = "Yes. Thank you for your hard work."
1013906-49 = "But with this, we can now tell at a glance where everything is and who it belongs to."
1013906-50 = "When looking for writing utensils, they're in this drawer, and printer toner and copy paper are all gathered in the box next to the printer..."
1013906-54 = "Huh? We have one name tag left over."
1013906-55 = "I wonder if there was something we forgot to put it on..."
1013906-56 = "[s9] \"You can use it wherever you like, Niko.\"\n[s10] \"How about putting it on your own belongings?\""
1013906-59 = "...Right."
1013906-60 = "Then, I will put this name tag on \"my property\"."
1013906-66 = "...There."
1013906-70 = "[ns] \"W-Why did you suddenly pat my back!?\""
1013906-73 = "Hehe, it's nothing."
1013906-78 = "It's important to write your name down so there's no mistaking the owner, after all."