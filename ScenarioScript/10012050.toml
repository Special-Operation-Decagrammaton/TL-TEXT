[translation]
10012050-1 = "第5話;招かれざる客"
10012050-4 = "……ここです。"
10012050-5 = "ここがリゾートの制御室……電気、ガスをはじめとしたすべての動力源が集まっている場所ですね。"
10012050-7 = "やっと色々終わらせたっていうのに、今度は制御室……？"
10012050-8 = "いやぁ～本当に素晴らしいバカンスだよ、セリカちゃん？"
10012050-9 = "何が素晴らしいバカンスよ！！いつまでたっても休めないじゃない！"
10012050-11 = "まぁまぁ……動力源の確保が終わったらのんびり休めますから。"
10012050-12 = "これからの「バカンス」のためにも、安全確認は大事ですよ。"
10012050-13 = "……うん。設備に問題はないみたい。"
10012050-14 = "基盤は古いけど、破損はない。ちょっとホコリ被ってるだけ。"
10012050-15 = "この地図によると……"
10012050-16 = "格納庫兼、倉庫もあるみたい。"
10012050-17 = "……格納庫がある、ということは！"
10012050-19 = "ヘリの部品も見つかるかもしれないね。"
10012050-20 = "良かった！これで修理ができますね☆"
10012050-21 = "でも、格納庫は手動では開かないみたい。制御室で電気を確保するのが先かな。"
10012050-23 = "……建物の掃除から始まって、どんどん無人島開拓みたいになってるわね。"
10012050-24 = "まぁまぁ、細かいことは気にしない気にしない。準備するのもバカンスのうちだよ。"
10012050-25 = "んじゃ、目的の場所もわかったことだし、"
10012050-26 = "行ってみよ～"
10012050-29 = "……誰もいないみたいですね？"
10012050-30 = "誰かいる方が怖いでしょ……"
10012050-31 = "もしかしたらさっきの連中がいるかもしれないし、警戒するに越したことはないよ～"
10012050-33 = "そうですね……。"
10012050-34 = "さっきの連中が先に掌握しているなら、監視システムを利用しない理由はない。"
10012050-35 = "だから、ここは私たちが初めて来たんだと思う。ホコリもかなり積もってるし。"
10012050-36 = "これ、本当に電源入るの？"
10012050-37 = "……やってみますね。"
10012050-44 = "ついた！"
10012050-45 = "なんだ、心配して損した。結構あっさりつくのね。"
10012050-46 = "電源入れるだけなら、普通押したらつくよ～"
10012050-47 = "わ、分かってるわよ！？って、そういう意味じゃなくて！"
10012050-48 = "私も驚きました。だいぶ古い設備だから、作動しないと思ってたのに……。"
10012050-49 = "保管状態が良かったからなんでしょうね……これで……"
10012050-50 = "……あれ、これは一体？"
10012050-54 = "「リゾート防御システム」……？"
10012050-56 = "すご～い！そういうのがあるんですね！警備システムの一種でしょうか？"
10012050-57 = "勝手に守ってくれるってことなのかな？うへ、すごいね。"
10012050-58 = "至れり尽くせりじゃない！これで安全に過ごせるわね。"
10012050-59 = "アヤネちゃん、早く押しちゃいなさいよ。"
10012050-61 = "あ、はい……。"
10012050-66 = "……ついた、んですか？"
10012050-68 = "何か動き出したみたいね。"
10012050-69 = "あ、モニターに監視カメラの映像が出てますよ！リゾートが一望できますね～！"
10012050-70 = "これで一件落着だね～。"
10012050-75 = "<System Message>"
10012050-77 = "「リゾート防御システム」、"
10012050-79 = "「リゾート防御システム」、活性化、"
10012050-81 = "自己監視モード、ニ、入リマス。"
10012050-84 = "<System Message>"
10012050-86 = "スキャニング"
10012050-88 = "スキャニング…"
10012050-90 = "スキャニング……。"
10012050-92 = "リゾート全体をスキャンしているのでしょうか……"
10012050-93 = "すごい……最先端の防衛システムですね。"
10012050-94 = "カイザーにもこういうのあったよね～"
10012050-95 = "……もしかしたら、それ以上にすごいシステムかもしれません。"
10012050-97 = "<System Message>"
10012050-98 = "……スキャニングヲ終了シマス。"
10012050-101 = "<System Message>"
10012050-102 = "リゾート内、許可サレテナイ人員、"
10012050-104 = "ガ"
10012050-106 = "多数、"
10012050-108 = "多数、発見"
10012050-110 = "多数、発見サレマシタ。"
10012050-112 = "おお、なんかすごいね～"
10012050-113 = "……ってあれ？「許可されてない人員」……？"
10012050-114 = "あれ……。"
10012050-116 = "<System Message>"
10012050-117 = "逮捕ノ為、自律防犯機ヲ、"
10012050-119 = "投入シマス。"
10012050-122 = "……ま、待ってください！"
10012050-123 = "眠っていた警備ロボットが動き出しました！……かなりの数います！"
10012050-125 = "なんかあいつら、動きが変じゃない？これじゃあまるで……"
10012050-126 = "こちらに向かってるみたい……ですね？"
10012050-127 = "……あ、そういうやつか～"
10012050-128 = "[s1] \"……やっぱりそういう流れなのね。\"\n[s2] \"まあ、私たちも別に許可されてたわけじゃないもんね。\""
10012050-129 = "ちょ、ちょっと何言ってるの……！？私たちにはチケットが……許可もらってるんじゃないの……？"
10012050-130 = "ちょ、ちょっと何言ってるの……！？私たちにはチケットが……許可もらってるんじゃないの……？"
10012050-131 = "チケットはありますけど、警備プログラムの認証手続きとかしたわけじゃないですしねぇ……。"
10012050-132 = "たとえチケットがあったとしても、ここは制御室だしねぇ……宿泊客が来る場所じゃないじゃん？"
10012050-134 = "……警備ロボットの姿が見え始めた。数十、"
10012050-135 = "いや、数百機以上いる！"
10012050-137 = "ど、どうしよう！？これからどうするの！？"
10012050-138 = "お、落ち着いてセリカちゃん。ここは制御室だよ。身元を登録すれば多分大丈夫だから！"
10012050-139 = "問題はアヤネちゃんが登録してる間、あいつらからここを守り抜けるかってところだよね～"
10012050-140 = "ああもう！ここに来てからこんなんばっか！！やってらんないわよ！"
10012050-142 = "……先生？"
10012050-143 = "[s3] \"うん。一緒に止めようか。\"\n[s4] \"指揮は任せて。\""
10012050-148 = "……来るよ。"
