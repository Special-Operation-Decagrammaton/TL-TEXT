[translation]
10012050-1 = "Episódio 5; Visitantes Indesejados"
10012050-4 = "……É aqui."
10012050-5 = "Esta é a sala de controle do resort... O lugar onde todas as fontes de energia, incluindo eletricidade e gás, estão concentradas."
10012050-7 = "Depois de finalmente terminar um monte de coisas, agora temos que lidar com a sala de controle...?"
10012050-8 = "Ora, ora~ Que férias realmente maravilhosas, Serika-chan?"
10012050-9 = "Que férias maravilhosas o quê!! A gente nunca consegue descansar!"
10012050-11 = "Calma, calma... Depois que garantirmos a fonte de energia, poderemos descansar tranquilamente."
10012050-12 = "Para as nossas futuras \"férias\", a verificação de segurança é importante."
10012050-13 = "……Sim. Parece que não há problemas com o equipamento."
10012050-14 = "A base é antiga, mas não há danos. Só está um pouco empoeirada."
10012050-15 = "De acordo com este mapa……"
10012050-16 = "Parece que também há um hangar que serve como depósito."
10012050-17 = "……Se tem um hangar, isso significa que!"
10012050-19 = "Talvez possamos encontrar peças para o helicóptero também."
10012050-20 = "Que bom! Com isso, poderemos fazer o conserto☆"
10012050-21 = "Mas parece que o hangar não abre manualmente. Acho que primeiro precisamos garantir a eletricidade na sala de controle."
10012050-23 = "……Começou com a limpeza do prédio e agora está parecendo cada vez mais uma exploração de ilha deserta."
10012050-24 = "Ora, ora, não se preocupe com os detalhes. Preparar as coisas também faz parte das férias."
10012050-25 = "Então, já que sabemos onde é o nosso objetivo,"
10012050-26 = "vamos lá~"
10012050-29 = "……Parece que não tem ninguém aqui?"
10012050-30 = "Seria mais assustador se tivesse alguém, não acha……"
10012050-31 = "Pode ser que aquele pessoal de antes esteja por perto, então é melhor ficar alerta~"
10012050-33 = "É verdade……."
10012050-34 = "Se aquele pessoal tivesse tomado o controle antes, não haveria motivo para não usarem o sistema de monitoramento."
10012050-35 = "Por isso, acho que fomos nós que chegamos aqui primeiro. Tem muita poeira acumulada."
10012050-36 = "Isso realmente vai ligar?"
10012050-37 = "……Vou tentar."
10012050-44 = "Ligou!"
10012050-45 = "Nossa, perdi meu tempo me preocupando. Ligou bem fácil, né."
10012050-46 = "Se for só para ligar a energia, normalmente é só apertar o botão~"
10012050-47 = "E-eu sei disso!? Quer dizer, não foi nesse sentido que eu falei!"
10012050-48 = "Eu também me surpreendi. Como o equipamento é bem antigo, achei que não fosse funcionar……"
10012050-49 = "Deve ser porque foi bem conservado…… Com isso……"
10012050-50 = "……Ué, o que é isso?"
10012050-54 = "“Sistema de Defesa do Resort”……?"
10012050-56 = "Incrível! Então existe algo assim! Será que é um tipo de sistema de segurança?"
10012050-57 = "Significa que ele vai nos proteger sozinho? Ué, que incrível."
10012050-58 = "Que maravilha! Agora poderemos passar o tempo com segurança."
10012050-59 = "Ayane-chan, aperte logo isso."
10012050-61 = "Ah, sim……."
10012050-66 = "……Ligou, será?"
10012050-68 = "Parece que algo começou a se mover."
10012050-69 = "Ah, as imagens das câmeras de segurança apareceram no monitor! Dá para ver o resort inteiro~!"
10012050-70 = "Com isso, o caso está encerrado~."
10012050-75 = "<Mensagem do Sistema>"
10012050-77 = "“Sistema de Defesa do Resort”,"
10012050-79 = "“Sistema de Defesa do Resort”, ativado,"
10012050-81 = "Modo de autovigilância, i-iniciando."
10012050-84 = "<Mensagem do Sistema>"
10012050-86 = "Escaneando"
10012050-88 = "Escaneando..."
10012050-90 = "Escaneando......"
10012050-92 = "Será que estão escaneando o resort inteiro......"
10012050-93 = "Incrível...... é um sistema de defesa de ponta."
10012050-94 = "A Kaiser também tinha algo assim, né~"
10012050-95 = "......Talvez seja um sistema ainda mais impressionante que aquele."
10012050-97 = "<Mensagem do Sistema>"
10012050-98 = "......Escaneamento finalizado."
10012050-101 = "<Mensagem do Sistema>"
10012050-102 = "Dentro do resort, pessoal não autorizado,"
10012050-104 = "foi"
10012050-106 = "detectado,"
10012050-108 = "detectado em grande número."
10012050-110 = "Detectado em grande número."
10012050-112 = "Uau, que incrível~"
10012050-113 = "......Espera, o quê? \"Pessoal não autorizado\"......?"
10012050-114 = "Ah......"
10012050-116 = "<Mensagem do Sistema>"
10012050-117 = "Para a detenção, robôs de segurança autônomos"
10012050-119 = "serão mobilizados."
10012050-122 = "......E-esperem um pouco!"
10012050-123 = "Os robôs de segurança que estavam inativos começaram a se mover! E tem muitos deles!"
10012050-125 = "Os movimentos deles não estão estranhos? É como se..."
10012050-126 = "Parece que estão vindo direto para cá...... não é?"
10012050-127 = "......Ah, então é esse tipo de situação~"
10012050-128 = "[s1] \"......Eu sabia que ia acabar assim.\"\n[s2] \"Bem, nós também não tínhamos exatamente uma autorização, né.\""
10012050-129 = "Ei, do que você está falando......!? Nós temos ingressos...... não deveríamos ter permissão para estar aqui......?"
10012050-130 = "Ei, do que você está falando......!? Nós temos ingressos...... não deveríamos ter permissão para estar aqui......?"
10012050-131 = "Nós temos os ingressos, mas não passamos pelo procedimento de autenticação do programa de segurança, né......"
10012050-132 = "Mesmo com o ingresso, esta é a sala de controle, né...... Não é um lugar para hóspedes, certo?"
10012050-134 = "......Dá para ver os robôs de segurança. Dezenas,"
10012050-135 = "não, centenas deles!"
10012050-137 = "O-o que a gente faz!? O que vamos fazer agora!?"
10012050-138 = "C-calma, Serika-chan. Estamos na sala de controle. Se registrarmos nossa identidade, provavelmente ficaremos bem!"
10012050-139 = "O problema é se conseguiremos proteger este lugar deles enquanto a Ayane-chan faz o registro, né~"
10012050-140 = "Ah, chega! Desde que chegamos aqui, é só isso!! Não dá para aguentar!"
10012050-142 = "......Sensei?"
10012050-143 = "[s3] \"Sim. Vamos detê-los juntos.\"\n[s4] \"Deixe o comando comigo.\""
10012050-148 = "......Eles estão vindo."
