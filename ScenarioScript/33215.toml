[translation]
33215-2 = "O choque de ETO contra ETO…… os que acreditam no paraíso, e os que o negam……."
33215-3 = "……Entendo."
33215-4 = "\"É possível provar a verdade daquele que chegou ao paraíso?\""
33215-5 = "Essa exigência de prova, violenta e impossível, que força um \"SIM\" ou um \"NÃO\"……"
33215-6 = "Mas a resposta do Sensei foi: \"não é preciso responder a isso\"……."
33215-7 = "Em vez de tomar um dos lados à força…… um paraíso que se prova pelo acreditar……."
33215-8 = "……Essa ideia eu não tinha tido."
33215-9 = "Não; talvez, aliás, o paraíso sempre tenha existido assim, bem ao nosso lado……"
33215-10 = "quem sabe fosse isso que ele estava dizendo?"
33215-11 = "Que história absurda…… isso não é prova nem coisa nenhuma."
33215-12 = "Mas…… sim. É a minha derrota, Sensei."
33215-13 = "Mesmo que não se possa provar, é…… sim, eu estava errada, admito. Esta não era uma história dessas."
33215-14 = "Aliás, querer competir com um adulto e vencer já era, de saída, um plano insensato, né……."
33215-19 = "Porque os adultos são assim: sempre vencem de um jeito que a gente nem imagina."
33215-21 = "Próximo Episódio;O Nome do Paraíso É (3)"
