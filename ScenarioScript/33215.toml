[translation]
33215-2 = "O choque entre ETO e ETO... Aqueles que acreditam no paraíso e aqueles que o negam..."
33215-3 = "……Entendo."
33215-4 = "“É possível provar a verdade daqueles que alcançaram o paraíso?”"
33215-5 = "Essa exigência de prova violenta e impossível, que força uma escolha entre “SIM” ou “NÃO”..."
33215-6 = "Mas a resposta do Sensei foi... “Não há necessidade de responder a isso”."
33215-7 = "Em vez de forçar uma escolha entre um ou outro... o paraíso é provado através da crença..."
33215-8 = "……Eu nunca tinha pensado nisso."
33215-9 = "Não. Na verdade, talvez o paraíso sempre tenha existido ao nosso lado dessa forma..."
33215-10 = "Talvez fosse isso que você estava tentando dizer, não é?"
33215-11 = "Que história terrível... Isso não é prova de nada."
33215-12 = "Mas... ah. Eu perdi, Sensei."
33215-13 = "Mesmo que não possa ser provado, é... ah, eu estava enganada. Esta não era uma história sobre isso."
33215-14 = "Pensando bem, tentar competir com um adulto e vencer foi uma tolice, não foi..."
33215-19 = "Porque os adultos sempre vencem de maneiras que nunca poderíamos imaginar."
33215-21 = "Próximo episódio: O nome do paraíso é (3)"
