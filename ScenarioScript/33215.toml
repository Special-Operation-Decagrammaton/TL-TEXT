[translation]
33215-2 = "Colisão entre ETO e ETO... aqueles que acreditam no paraíso e aqueles que o negam..."
33215-3 = "......Entendi."
33215-4 = "'É possível provar a verdade daqueles que alcançaram o paraíso?'"
33215-5 = "Essa exigência violenta e impossível de prova, forçando um 'SIM' ou 'NÃO'..."
33215-6 = "Mas a resposta do Sensei foi: 'Não há necessidade de responder a isso'..."
33215-7 = "Em vez de escolher forçadamente um dos dois... um paraíso que é provado através da crença..."
33215-8 = "......Eu não tinha pensado nisso."
33215-9 = "Não. Na verdade, o paraíso existia ao nosso lado o tempo todo, dessa forma..."
33215-10 = "Talvez fosse isso que você estava querendo dizer, não é?"
33215-11 = "Que história terrível... isso não é prova de nada."
33215-12 = "Mas... ah. Eu perdi, Sensei."
33215-13 = "Mesmo que não seja possível provar... entendo. Ah, eu estava errada mesmo. Esta história não era sobre isso."
33215-14 = "Afinal, tentar competir e ganhar de um adulto foi uma imprudência, não foi..."
33215-19 = "Porque os adultos sempre ganham de formas inimagináveis assim."
33215-21 = "Próximo Episódio; O Nome do Paraíso (3)"