[translation]
10030075-18 = "……Ué, que barulho é esse?"
10030075-19 = "Enquanto víamos o nascer do sol, um monte de barracas apareceram, né?"
10030075-20 = "Será que houve um boom de acampamento nessas últimas horas...?"
10030075-21 = "[s] \"Quem sabe...?\""
10030075-26 = "Olá a todos que assistem ao Canal Kronos! Estamos transmitindo uma edição de emergência. Eu sou Kazamaki Mai, a apresentadora do \"Kivotos Dramatic\"!"
10030075-27 = "Hoje, viemos fazer uma reportagem após recebermos relatos de que uma nova ruína foi descoberta aqui!"
10030075-28 = "O boato já se espalhou pelas redes sociais e, apesar de ser dia de Ano Novo, pessoas interessadas nas ruínas estão se aglomerando no sopé da montanha!"
10030075-29 = "Será que as ruínas descobertas desta vez terão algum impacto na arqueologia de Kivotos?! A partir de agora, nós vamos—"
10030075-33 = "Oh? O que é aquilo que estou vendo...!"
10030075-34 = "Espectadores! #nEstamos capturando a imagem da pessoa mais badalada de Kivotos agora mesmo — o \"Professor [USERNAME]\"!"
10030075-35 = "Vamos aproveitar e entrevistar o Professor do Schale imediatamente!"
10030075-39 = "Olá, Professor [USERNAME]! Aqui é o Canal Kronos!"
10030075-40 = "[s1] \"Feliz Ano Novo.\"\n[s2] \"Conto com você este ano também, Mai.\""
10030075-43 = "Feliz Ano Novo! #nLogo no início do ano, conseguir um furo de reportagem desses..."
10030075-44 = "……Não, na verdade, estou muito feliz em vê-lo, Professor!"
10030075-45 = "Eu não esperava que o Professor [USERNAME] também estivesse aqui."
10030075-46 = "Então as ruínas descobertas desta vez realmente têm tanto valor assim!"
10030075-47 = "[s3] \"……Novas ruínas?\"\n[s4] \"Não faço ideia do que você está falando...\""
10030075-50 = "Ué, você não sabia?"
10030075-51 = "A notícia de que pinturas rupestres foram descobertas na caverna daqui virou um assunto enorme nas redes sociais..."
10030075-58 = "Diferente das cenas de coleta e caça descobertas até agora, dizem que há vários desenhos de torres enormes e objetos que parecem máquinas!"
10030075-62 = "E, pasmem, tem até algo que parece um monstro feroz no topo da torre..."
10030075-63 = "As pessoas que descobriram esses desenhos causaram um alvoroço dizendo que era uma \"profecia do fim do mundo\", o que gerou uma confusão e tanto em D.U."
10030075-65 = "Dito isso... o que o Professor do Schale pensa sobre isso?"
10030075-69 = "[ns] \"……Maki.\""
10030075-73 = "A-a-a culpa não é minha, né!?"
10030075-74 = "Quer dizer... fui eu quem desenhou as pinturas, mas..."
10030075-75 = "Eu te disse para limpar tudo antes de voltarmos para o acampamento ontem, não disse..."
10030075-76 = "A-ah, naquela hora eu pensei que precisava encontrar a senpai Kotama, então acabei esquecendo..."
10030075-77 = "Aliás, pensando bem..."
10030075-81 = "Isso só prova que o meu desenho ficou incrível, né!?"
10030075-88 = "Tente se arrepender pelo menos um pouco!!"
10030075-90 = "(Depois disso, foi um trabalho árduo explicar a situação para as pessoas que estavam reunidas...)"
