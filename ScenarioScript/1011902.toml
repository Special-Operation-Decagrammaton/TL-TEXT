[translation]
1011902-1 = "Técnicas de fotografia de cem flores"

1011902-2 = "Comitê/Departamento de Mediação de Conflitos das Cem Flores"

1011902-3 = "(Consegui resolver meus outros assuntos rapidamente e chegar à sala do clube cheia de flores antes da hora marcada.)"

1011902-6 = "(Encontrei Nagusa treinando no pátio)"

1011902-13 = "Ha...ha!"

1011902-17 = "……Sensei?"

1011902-18 = "Já está na hora da consulta...?"

1011902-19 = "Desculpe, eu estava muito focado no treinamento――"

1011902-20 = "[s1] \"Não, ainda não é hora.\"\n[s2] \"Cheguei cedo.\""

1011902-23 = "Eu vejo."

1011902-24 = "Mas poder assistir ao treino... é um pouco constrangedor."

1011902-25 = "Você poderia esperar um pouco? #nVou apenas enxugar o suor."

1011902-26 = "[s3] \"Não se preocupe comigo.\"\n[s4] \"Ainda dá tempo, então continue.\""

1011902-29 = "mas……."

1011902-30 = "[s] \"Eu queria ver os rumores da ``Técnica de Tiro estilo Hyakka-Renran''.\""

1011902-31 = "Você está interessado?"

1011902-32 = "...Não é grande coisa."

1011902-33 = "É treinamento. Atire, troque de alvo, repita. #nPode ser chato de assistir."

1011902-34 = "...Além disso, não sou tão talentoso quanto os presidentes de comitês anteriores."

1011902-35 = "Não sei se consigo corresponder às expectativas do meu Sensei."

1011902-36 = "[s] \"Eu quero ver a ``Técnica de Tiro Hyakka Ryoran'' de Nagusa.\""

1011902-40 = "[ns5] \"Mesmo que você não esteja confiante, você não desiste e se esforça...\n[ns6] \"Porque há uma sensação de que você não pode perder para ninguém.\""

1011902-43 = "Sim... eu acho."

1011902-44 = "Se o Sensei quiser ver eu faço..."

1011902-45 = "É perigoso, então não saia desse lugar."

1011902-46 = "[s] \"Por que...?\""

1011902-47 = "A ``Técnica de Tiro Estilo Hyakka Ryoran'' pode ser usada em todas as direções. #nA premissa é que não existe lugar seguro."

1011902-48 = "Muitas vezes lidamos com várias pessoas ao mesmo tempo. #nNuma batalha como essa, mesmo o menor ponto cego pode ser fatal."

1011902-49 = "O que foi cultivado para compensar isso é a “Técnica de Tiro Estilo Hyakka Ryoran”."

1011902-50 = "Como resultado, tornou-se uma forma de fugir e atingir simultaneamente vários inimigos."

1011902-51 = "...Este é o básico da \"Técnica de Tiro no Estilo Hyakkaryoran\"."

1011902-52 = "É por isso que reajo como se houvesse inimigos atrás de mim."

1011902-53 = "[s7] \"Talvez a forma de pensar seja semelhante ao Kung Fu...?\"\n[s8] \"É meio profundo...\""

1011902-54 = "Acho que há alguém em Shanhai Ching que pode lhe ensinar kung fu. Eu gostaria de aprender se tiver uma chance."

1011902-56 = "Voltemos ao assunto. Primeiro, atire na frente e atrás, nos alvos direito e esquerdo em ordem."

1011902-57 = "Farei isso mais devagar que o normal."

1011902-58 = "Como eu disse anteriormente, não se mova."

1011902-60 = "Ufa..."

1011902-64 = "...Haa!"

1011902-73 = "...... como foi?"

1011902-74 = "[s9] \"...?\"\n[s10] \"O que aconteceu...?\""

1011902-77 = "Acabei de atingir os alvos em ordem."

1011902-78 = "[s11] \"O que é isso...?\"\n[s12] \"Parecia que o alvo foi destruído em um instante...\""

1011902-81 = "Não é tão difícil. #nDeixe-me explicar um por um."

1011902-82 = "Primeiro, vire o corpo para a esquerda e atire no direito. #n Em seguida, segure a arma sob a axila e atire no lado esquerdo em dois tiros."

1011902-83 = "No fluxo, jogo a própria arma no oponente e deixo cair a terceira. #nSe você usar o recuo para levantar a arma no ar e atirar no alvo final, você receberá quatro."

1011902-84 = "Isso permite suprimir simultaneamente inimigos vindos de quatro direções."

1011902-85 = "Claro, isso foi apenas treinamento, então os movimentos foram fáceis em comparação com a prática."

1011902-86 = "[s] \"Fácil...?\""

1011902-87 = "O atual é o formato básico."

1011902-88 = "Claro que posso fazer isso."

1011902-89 = "...Ainda dá tempo, então farei algumas outras coisas."

1011902-91 = "(Depois disso, assisti ao treino de Nagusa, mas...)"

1011902-92 = "(Nada disso parecia \"fácil\")"

