[translation]
33170-1 = "Episódio 17;A Verdadeira Face do Ódio"
33170-3 = "Sai da frente; você não entende a situação de agora!?"
33170-4 = "É uma emergência, entendeu!?"
33170-5 = "M-mas, eu……!"
33170-7 = "Sai!!"
33170-12 = "……N-não!"
33170-13 = "E-eu sou burra, então não entendo nada do que tá acontecendo, mas……"
33170-14 = "isto aqui tá errado! Uma coisa dessas não pode, de jeito nenhum!!"
33170-19 = "Essa aí não escuta; sendo assim……"
33170-20 = "E-espera. Essa menina, de algum lugar……."
33170-21 = "Olhando bem, tenho a impressão de já ter visto……"
33170-25 = "[ns] \"A Koharu é do Clube de Aulas de Reforço; é minha aluna.\""
33170-27 = "S-Sensei!?"
33170-28 = "……."
33170-30 = "O da Schale……!?"
33170-31 = "Não pode ser; ele não estava em estado grave, inconsciente……?"
33170-32 = "S-Sensei, por que o senhor aqui……."
33170-33 = "[s] \"Por favor, primeiro, parem com a violência.\""
33170-34 = "I-isso……."
33170-35 = "……."
33170-36 = "V-vamos embora. Aquela expressão do Sensei; é perigo na certa……."
33170-37 = "……Sim, vamos."
33170-42 = "S-Sensei…… Sensei……."
33170-43 = "[s] \"Koharu, você foi incrível. Como esperado de uma elite do Comitê de Realização da Justiça.\""
33170-44 = "Sensei……!"
33170-49 = "……."
33170-50 = "Sensei……."
33170-51 = "[s] \"Mika, você tá bem?\""
33170-52 = "É que…… sim."
33170-53 = "Como dizer, há quanto tempo…… né?"
33170-54 = "[s] \"Pois é. Mika…… Mika, por que, agora há pouco, você……\""
33170-55 = "Hã, ah, isso……."
33170-56 = "……Por que será. Era a chance perfeita, e eu sei que era só me levantar agora, mas……."
33170-57 = "Eu ainda odeio, sabe…… mas por que será……."
33170-58 = "Nem eu entendo direito……."
33170-59 = "Ué, p-peraí……"
33170-60 = "Eu……."
33170-62 = "Mika……"
33170-63 = "Esse ódio…… esse ódio de que você estava na linha de frente……."
33170-64 = "Você, por que……."
33170-66 = "Mika, será que já dá pra você nos contar? \"Fazer as pazes com a Arius\"…… a intenção por trás disso."
33170-67 = "Hã, intenção?"
33170-68 = "Que tipo de ganho político há aí…… é o que a Nagisa está perguntando."
33170-69 = "Não é bem ganho político…… ora, no fundo, era tudo a mesma Trinity, né."
33170-70 = "Vamos direto ao distrito autônomo e tentar dizer \"vamos ser amigas?\"! Ó, a gente podia abrir um chá com todo mundo!"
33170-71 = "……."
33170-72 = "……."
33170-73 = "……Hã, que clima é esse? Eu falei algo estranho?"
33170-74 = "Não acham uma boa? Aah, se eu fosse a host, já tinha agido na hora."
33170-75 = "Mika, você é mesmo…… bom, deixando isso de lado por ora. Não se sabe se o outro lado aceitaria. E a localização do distrito autônomo também segue desconhecida."
33170-76 = "Além disso, Mika, se isso desse certo, o que você pretenderia fazer? Uma Trinity ainda mais poderosa, tendo absorvido a Arius…… por acaso pensaria em começar alguma grande guerra?"
33170-77 = "Hmm, bom, eu não pensava em fazer nada, mas…… até que podia ser, né? Tem muita voz pedindo isso também."
33170-78 = "E, se isso acontecesse, quem sabe desse até pra dar um jeito em Gehenna?"
33170-79 = "……."
33170-80 = "……Que é, Seia? Que cara é essa?"
33170-82 = "Você é egoísta. Não pensa muito nas coisas, é impulsiva, gananciosa e, às vezes, autodestrutiva……"
33170-83 = "De você, desse seu jeito, talvez eu não gostasse."
33170-86 = "……A Seia está aqui."
33170-87 = "Em silêncio, basta mandarem-na pra um hospital……."
33170-88 = "É isso; conto com vocês, tá."
33170-92 = "Quanto a isto, deixo com o \"Squad\"."
33170-93 = "……Squad?"
33170-94 = "Sim; vocês conhecem, não?"
33170-99 = "(A Seia…… morreu……?)"
33170-100 = "(……Quê? Por quê?)"
33170-101 = "(O que foi que aconteceu; hã, por que uma coisa dessas……?)"
33170-102 = "(Por quê? Vocês são burros? Porque eu……)"
33170-103 = "(Ué, eu……)"
33170-104 = "(Eu…… por que mesmo eu mandei atacarem a Seia……?)"
33170-105 = "(Se a Seia sumir, eu……)"
33170-106 = "(……)"
33170-107 = "(……Ah, é. Eu ia me tornar a host……)"
33170-108 = "(Isso, porque eu odiava Gehenna. Porque o que eu odeio, eu odeio. E a Nagi também, com esse tratado, tentando fazer uma coisa estranha.)"
33170-109 = "(Por que ela vai fazer uma coisa dessas? Continua a mesma bobinha de sempre. Um tratado de paz com Gehenna? Jamais. Jamais vou aceitar.)"
33170-110 = "(……Seia. Você vivia dizendo que enxergava o futuro e tal; por que não conseguiu proteger nem a si mesma? Isso, ao menos, você devia ter visto, né?)"
33170-111 = "(Aliás, com aquele corpo tão fraco, ela foi entrar no Tea Party, e vivia, o tempo todo, me dando sermão com o \"pense direito\"…… e, outro dia mesmo, me olhou com aqueles olhos……)"
33170-112 = "(Por isso, por isso……)"
33170-113 = "(Pra continuar assim, e pra varrer Gehenna, um sacrifício desse tamanho era inevitável.)"
33170-114 = "(Era pra ser assim…… deveria ser……)"
33170-116 = "E-eu……."
33170-117 = "……."
33170-118 = "Desculpa, Seia…………."
33170-119 = "Por que será que deu nisso……."
33170-120 = "Desculpa…… me desculpa……."
33170-121 = "Desculpa por eu ser tão burra assim……."
33170-122 = "[s] \"Mika…….\""
33170-123 = "Sensei…… eu quero ver a Seia……."
33170-124 = "Quero ver a Nagi de novo também……."
33170-125 = "Desse meu jeito, talvez já não dê mais, mas……."
33170-128 = "……."
33170-129 = "Mika, você……."
33170-130 = "Entendo; você buscava um motivo……."
33170-131 = "Como se odiar precisasse de algo sólido; tentando, em algum canto, racionalizar……."
33170-132 = "E, assim, os erros foram se somando…… continua a mesma boba de sempre……."
33170-134 = "……."
33170-135 = "Eu achava que te entendia. Com certeza, não é só isto…… o que você carregava, os seus sentimentos ingênuos, o que você pensava, a sua situação…… o esforço de conhecer tudo isso, eu negligenciei."
33170-136 = "……Entendo."
33170-137 = "Eu ainda sei pouco demais sobre você……."
33170-138 = "……E, quando me dei conta, você também, como eu, estava posta no meio de uma história errada."
33170-139 = "Assassinato, morte, traição, guerra……."
33170-140 = "Era uma história cruel demais pra uma garota como você. Um capricho que, em condições normais, deveria ser perdoado, te……"
33170-141 = "……Mika."
33170-142 = "Você também, esse tempo todo……."
33170-143 = "……De todo modo, eu te perdoo."
33170-144 = "E eu também, talvez, precise implorar o seu perdão."
33170-145 = "Nós duas vamos, mais uma vez, dizer uma à outra; e, aí…… quem sabe, adiante……"
33170-147 = "[ns] \"……Deixa comigo, Mika.\""
33170-153 = "É-é o Sensei……."
33170-154 = "Sensei……."
33170-155 = "Sensei……!?"
33170-156 = "[s] \"Pessoal, desculpem a demora.\""
33170-160 = "Sensei……."
33170-161 = "Sensei……!"
33170-162 = "……Gh."
33170-164 = "[ns] \"Obrigado por estarem aqui, por terem esperado.\""
33170-166 = "[ns] \"Daqui pra frente, deixem comigo.\""
33170-169 = "Próximo Episódio;Sem Hesitar"
