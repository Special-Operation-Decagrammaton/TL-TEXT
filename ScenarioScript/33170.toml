[translation]
33170-1 = "Episódio 17; A Verdadeira Face do Ódio"
33170-3 = "Saiam da frente, vocês não entendem a situação atual!?"
33170-4 = "É uma emergência, entenderam!?"
33170-5 = "Ma-mas, eu...!"
33170-7 = "Saiam da frente!!"
33170-12 = "……N-não, parem!"
33170-13 = "Eu, eu sou uma idiota, então não entendo nada do que está acontecendo, mas..."
33170-14 = "Mas isso está errado! Algo assim é absolutamente inaceitável!!"
33170-19 = "Não quer ouvir, então..."
33170-20 = "Es-espere. Essa garota, eu já vi em algum lugar..."
33170-21 = "Olhando bem, parece familiar..."
33170-25 = "[ns] \"Koharu é uma aluna minha, do Esquadrão de Reforço.\""
33170-27 = "Pro-Sensei!?"
33170-28 = "……."
33170-30 = "Do Schale...!?"
33170-31 = "Não pode ser, você não estava em estado crítico e inconsciente...?"
33170-32 = "Pro-Sensei, por que você está aqui..."
33170-33 = "[s] \"Por favor, parem com a violência primeiro.\""
33170-34 = "Is-isso é..."
33170-35 = "……."
33170-36 = "Va-vamos embora. A expressão daquele sensei, com certeza é um sinal de problemas..."
33170-37 = "……Ah, vamos."
33170-42 = "Pro-Sensei... Sensei..."
33170-43 = "[s] \"Koharu, você foi incrível. Como esperado de uma elite do Comitê de Justiça.\""
33170-44 = "Sensei...!"
33170-49 = "……."
33170-50 = "Sensei..."
33170-51 = "[s] \"Mika, você está bem?\""
33170-52 = "Bem... sim."
33170-53 = "Como posso dizer, faz tempo... né?"
33170-54 = "[s] \"Pois é. Mika... Mika, por que você estava fazendo aquilo agora há pouco...\""
33170-55 = "Ah, bem, isso é..."
33170-56 = "……Por que será? Eu sei que era a chance perfeita, que se eu me levantasse agora..."
33170-57 = "Eu ainda os odeio, mas... por que será..."
33170-58 = "Nem eu mesma sei explicar..."
33170-59 = "Ei, es-espere um pouco..."
33170-60 = "Eu..."
33170-62 = "Mika..."
33170-63 = "Esse ódio... esse rancor que você estava liderando na linha de frente..."
33170-64 = "Por que você..."
33170-66 = "Mika-san, poderia nos contar agora? Sobre a sua intenção de \"fazer as pazes com Arius\"."
33170-67 = "Ah, intenção?"
33170-68 = "Nagisa está perguntando que tipo de benefício político isso traria."
33170-69 = "Não é sobre benefícios políticos nem nada... afinal, originalmente, somos todas da Trinity, não somos?"
33170-70 = "Vamos direto para a zona autônoma e dizer: \"Vamos ser amigos?\"! Olha, podemos até fazer uma festa do chá com todo mundo!"
33170-71 = "……."
33170-72 = "……."
33170-73 = "……Ei, que clima é esse? Eu disse algo estranho?"
33170-74 = "Não acham uma boa ideia? Ah, se eu fosse a anfitriã, já teria agido faz tempo."
33170-75 = "Mika-san, você é realmente... bem, deixando isso de lado por um momento. Não sabemos se eles aceitariam. Além disso, a localização da zona autônoma nem sequer foi descoberta."
33170-76 = "Além disso, Mika, supondo que você consiga realizar isso, o que pretende fazer? Uma Trinity que absorveu Arius e se tornou ainda mais poderosa... Você pretende iniciar algum tipo de grande guerra?"
33170-77 = "Hmm, bem, eu não tinha pensado em nada específico... mas talvez isso fosse bom, não é? Existem muitas vozes que pedem por isso."
33170-78 = "E se isso acontecesse, talvez pudéssemos dar um jeito em Gehenna, não é?"
33170-79 = "……."
33170-80 = "……O que foi, Seia-chan? Por que essa cara?"
33170-82 = "Você é egoísta. Você não pensa em nada, é impulsiva, gananciosa e, às vezes, autodestrutiva..."
33170-83 = "Talvez eu nunca tenha gostado de você por causa disso."
33170-86 = "……Seia-chan está aqui."
33170-87 = "Se você pudesse apenas, silenciosamente, mandá-la para um hospital..."
33170-88 = "É isso, então conto com você."
33170-92 = "Sobre isso, deixarei a cargo do \"Squad\"."
33170-93 = "……Squad?"
33170-94 = "Sim, você sabe quem são, não sabe?"
33170-99 = "(A Seia-chan... morreu?)"
33170-100 = "(……Por quê? Por que isso aconteceu?)"
33170-101 = "(O que aconteceu, o que deu errado, ei, por que as coisas chegaram a esse ponto...?)"
33170-102 = "(Por que? Eu sou uma idiota? Porque, eu...)"
33170-103 = "(Ué, eu...)"
33170-104 = "(Por que eu dei a ordem para atacar a Seia-chan...?)"
33170-105 = "(Se a Seia-chan desaparecer, eu...)"
33170-106 = "(……)"
33170-107 = "(……Ah, é verdade. Eu estava tentando me tornar a anfitriã...)"
33170-108 = "(Isso, porque eu odiava Gehenna. O que eu odeio, eu odeio. E a Nagi-chan também, tentando fazer coisas estranhas como aquele tratado.)"
33170-109 = "(Por que ela faria algo assim? Ela continua sendo uma tola. Um tratado de paz com Gehenna... eu nunca, jamais vou perdoar isso.)"
33170-110 = "(……Seia-chan. Você dizia que conseguia ver o futuro, então por que não conseguiu se proteger? Você não deveria ter visto isso chegando?)"
33170-111 = "(Para começar, mesmo sendo tão frágil, você entrou para o Tea Party e vivia me dando sermões, dizendo para eu \"pensar direito\"... Até outro dia, você me olhou daquele jeito...)"
33170-112 = "(Por isso, por isso...)"
33170-113 = "(Para conseguir o que eu queria, e para varrer Gehenna do mapa, esse tipo de sacrifício era inevitável.)"
33170-114 = "(Era para ser assim, mas...)"
33170-116 = "E-eu..."
33170-117 = "……."
33170-118 = "Desculpe, Seia-chan…………."
33170-119 = "Por que as coisas terminaram assim...?"
33170-120 = "Desculpe... me desculpe..."
33170-121 = "Desculpe por ser tão idiota..."
33170-122 = "[s] \"Mika....\""
33170-123 = "Sensei... eu quero ver a Seia-chan..."
33170-124 = "Eu quero ver a Nagi-chan mais uma vez..."
33170-125 = "Mesmo que alguém como eu não tenha mais jeito..."
33170-128 = "……."
33170-129 = "Mika, você..."
33170-130 = "Entendo, então você estava procurando por uma razão..."
33170-131 = "Tentando racionalizar em algum lugar que precisava de algo concreto para justificar o seu ódio..."
33170-132 = "E assim, erros foram se acumulando... como sempre, fazendo coisas estúpidas..."
33170-134 = "……."
33170-135 = "Eu achava que entendia você. Certamente não é só isso... o que você carregava, seus sentimentos inocentes, o que você pensava, a sua situação... eu negligenciei o esforço de tentar conhecer tudo isso."
33170-136 = "……Entendo."
33170-137 = "Eu ainda conheço tão pouco sobre você..."
33170-138 = "……E, quando me dei conta, você estava na mesma situação que eu. Colocada no centro de uma história equivocada."
33170-139 = "Assassinato, morte, traição, conflitos..."
33170-140 = "Era uma história cruel demais para uma garota como você estar envolvida. Caprichos que deveriam ser perdoados, acabaram te..."
33170-141 = "...Mika."
33170-142 = "Você também, por tanto tempo..."
33170-143 = "...De qualquer forma, eu vou te perdoar."
33170-144 = "E talvez eu também precise pedir o seu perdão."
33170-145 = "Nós vamos nos entender novamente, e então... talvez, depois disso..."
33170-147 = "[ns] \"...Deixe comigo, Mika.\""
33170-153 = "É, é o Sensei..."
33170-154 = "Sensei..."
33170-155 = "Sensei...!?"
33170-156 = "[s] \"Pessoal, desculpem a demora.\""
33170-160 = "Sensei..."
33170-161 = "Sensei...!"
33170-162 = "...Ah."
33170-164 = "[ns] \"Obrigado por estarem aqui e por me esperarem.\""
33170-166 = "[ns] \"Daqui em diante, deixem comigo.\""
33170-169 = "Próximo episódio; Sem hesitar"
