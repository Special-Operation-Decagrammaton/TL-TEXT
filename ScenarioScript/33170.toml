[translation]
33170-1 = "Episódio 17; A Verdadeira Natureza do Ódio"
33170-3 = "Saiam da frente, vocês não tão vendo a situação!?"
33170-4 = "É uma emergência, sabiam!?"
33170-5 = "M-Mas, eu...!"
33170-7 = "Sai da frente!!"
33170-12 = "......N-Não!"
33170-13 = "E-Eu sou burra, não tô entendendo nada do que tá acontecendo... mas..."
33170-14 = "Mas, isso é errado! Isso não pode acontecer de jeito nenhum!!"
33170-19 = "Você não escuta, né? Sendo assim..."
33170-20 = "E-Espera. Essa garota, eu já vi ela em algum lugar..."
33170-21 = "Olhando bem, ela me é familiar..."
33170-25 = "[ns] \"A Koharu é minha aluna, do Clube de Reposição.\""
33170-27 = "S-Sensei!?"
33170-28 = "......"
33170-30 = "Da Schale...!?"
33170-31 = "Não pode ser, você não estava inconsciente em estado grave...?"
33170-32 = "S-Sensei, o que faz aqui..."
33170-33 = "[s] \"Por favor, parem com a violência primeiro.\""
33170-34 = "I-Isso é..."
33170-35 = "......"
33170-36 = "V-Vamos embora. A cara desse Sensei diz que vai dar merda..."
33170-37 = "......É, vamos."
33170-42 = "S-Sensei... Sensei..."
33170-43 = "[s] \"Você foi incrível, Koharu. Como esperado da elite do Comitê de Realização da Justiça.\""
33170-44 = "Sensei...!"
33170-49 = "......"
33170-50 = "Sensei..."
33170-51 = "[s] \"Mika, você está bem?\""
33170-52 = "Hã... sim."
33170-53 = "Como posso dizer, faz tempo... né?"
33170-54 = "[s] \"Sim. Mika... por que você agora a pouco...\""
33170-55 = "Ah, então, é que..."
33170-56 = "......Não sei por quê. Eu sei que é a chance perfeita e que eu deveria me levantar agora..."
33170-57 = "Eu ainda as odeio, mas... por que será..."
33170-58 = "Nem eu entendo direito..."
33170-59 = "Ué, e-espera um pouco..."
33170-60 = "Eu..."
33170-62 = "Mika..."
33170-63 = "Aquele ódio... o ódio que você liderava..."
33170-64 = "Por que você..."
33170-66 = "Mika-san, poderia nos contar de uma vez? A intenção por trás de 'fazer as pazes com Arius'..."
33170-67 = "Hã, intenção?"
33170-68 = "A Nagisa está perguntando... que tipo de benefício político isso traria."
33170-69 = "Não é questão de benefício político... afinal, nós éramos todas da mesma Trinity desde o começo."
33170-70 = "Vamos direto ao distrito autônomo delas e dizer 'vamos ser amigas?'! Imagina, podemos até fazer uma festa do chá todas juntas!"
33170-71 = "......"
33170-72 = "......"
33170-73 = "......Ué, que clima é esse? Falei alguma besteira?"
33170-74 = "Não acham uma boa ideia? Ah, se eu fosse a anfitriã já teria feito isso."
33170-75 = "Mika-san, você realmente... bom, deixando isso de lado por enquanto. Não sabemos se elas aceitariam. Nem sequer sabemos onde fica o distrito autônomo delas."
33170-76 = "E Mika, se você conseguisse fazer isso, o que faria depois? Uma Trinity mais forte com a absorção de Arius... você quer começar uma guerra em grande escala?"
33170-77 = "Huumm, não tinha pensado no que fazer depois, mas... não é uma má ideia, né? Muita gente quer isso."
33170-78 = "E se isso acontecesse, talvez a gente pudesse dar um jeito em Gehenna?"
33170-79 = "......"
33170-80 = "......O que foi, Seia-chan. Que cara é essa?"
33170-82 = "Você é egoísta. Não pensa em quase nada, é impulsiva, gananciosa e, às vezes, autodestrutiva..."
33170-83 = "Talvez eu não gostasse muito desse seu jeito."
33170-86 = "......A Seia-chan está aqui."
33170-87 = "Se puderem só mandar ela para o hospital sem fazer barulho..."
33170-88 = "Então é isso, conto com vocês."
33170-92 = "Quanto a isso, deixarei a cargo do 'Esquadrão'."
33170-93 = "......Esquadrão?"
33170-94 = "Sim, você deve conhecê-los, não é?"
33170-99 = "(A Seia-chan... morreu...?)"
33170-100 = "(...Mas por quê? Por quê?)"
33170-101 = "(O que aconteceu, hã, como assim chegou nesse ponto...?)"
33170-102 = "(Por quê? Eles são burros? Afinal, eu...)"
33170-103 = "(Ué, por que eu...)"
33170-104 = "(Por que eu ordenei que atacassem a Seia-chan mesmo...?)"
33170-105 = "(Se a Seia-chan não estiver mais aqui, eu...)"
33170-106 = "(......)"
33170-107 = "(...Ah, é verdade. Eu queria me tornar a anfitriã...)"
33170-108 = "(Sim, porque eu odiava Gehenna. O que eu odeio, eu odeio. E a Nagi-chan tá querendo fazer alguma coisa esquisita com esse tratado e tals)"
33170-109 = "(Por que ela faria isso? Ela continua sendo uma boba, como sempre. Um tratado de paz com Gehenna, de jeito nenhum. Isso eu nunca vou perdoar)"
33170-110 = "(...Seia-chan. Você vivia dizendo que via o futuro e tal, mas não conseguiu nem se proteger? Isso pelo menos você devia ter visto, né?)"
33170-111 = "(Pra começar, por que você entrou pra Tea Party tendo o corpo tão frágil? Vivia me dando bronca, dizendo 'pense direito'... Até outro dia, me olhou com aquela cara...)"
33170-112 = "(Por isso, por isso...)"
33170-113 = "(Para nós estarmos aqui e para varrermos Gehenna do mapa, esse nível de sacrifício não tinha como evitar)"
33170-114 = "(Deveria... deveria ser assim...)"
33170-116 = "E-Eu..."
33170-117 = "......"
33170-118 = "Desculpa, Seia-chan............"
33170-119 = "Como foi que chegou nesse ponto...?"
33170-120 = "Desculpa... desculpa..."
33170-121 = "Desculpa por ser tão burra..."
33170-122 = "[s] \"Mika...\""
33170-123 = "Sensei... eu quero ver a Seia-chan..."
33170-124 = "Eu quero ver a Nagi-chan de novo, também..."
33170-125 = "Uma pessoa como eu talvez não tenha mais o direito de pedir isso, mas..."
33170-128 = "......"
33170-129 = "Mika, você..."
33170-130 = "Entendo, então você procurava um motivo..."
33170-131 = "Em algum lugar, você tentava racionalizar, achando que precisava de um motivo sólido para odiar..."
33170-132 = "E com isso os erros foram se acumulando... como sempre, fazendo idiotices..."
33170-134 = "......"
33170-135 = "Eu achava que te entendia. Certamente não era só isso... o que você guardava dentro de si, as emoções infantis, o que você pensava, a sua situação... Eu falhei em me esforçar para compreender tudo isso."
33170-136 = "...Entendo."
33170-137 = "Eu ainda sei tão pouco sobre você..."
33170-138 = "...E, quando dei por mim, você já estava no meio de uma história distorcida, assim como eu."
33170-139 = "Assassinatos, morte, traição, conflitos..."
33170-140 = "Era uma história cruel demais para uma garota como você. O egoísmo que normalmente deveria ser perdoado, te colocou..."
33170-141 = "...Mika."
33170-142 = "Você também, esse tempo todo..."
33170-143 = "...De qualquer forma, eu te perdoo."
33170-144 = "E talvez, eu também precise implorar pelo seu perdão."
33170-145 = "Temos que conversar de novo, e então... talvez, depois disso..."
33170-147 = "[ns] \"...Deixa comigo, Mika.\""
33170-153 = "É-É o Sensei..."
33170-154 = "Sensei..."
33170-155 = "Sensei...!?"
33170-156 = "[s] \"Desculpem a demora, pessoal.\""
33170-160 = "Sensei..."
33170-161 = "Sensei...!"
33170-162 = "......"
33170-164 = "[ns] \"Obrigado por estarem aqui e me esperarem.\""
33170-166 = "[ns] \"Daqui pra frente, deixem comigo.\""
33170-169 = "Próximo Episódio; Sem Hesitar"