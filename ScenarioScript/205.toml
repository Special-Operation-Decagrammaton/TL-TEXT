[translation]
205-1 = "Dirija-se ao esconderijo dos Kaitenger!"
205-3 = "Ei, quanto tempo, Sensei."
205-4 = "O que é essa cara? Ficou surpreso por eu ter aparecido de repente?"
205-5 = "Fufu, se você estava esperando por outra pessoa, sinto muito. Agora é a vez da adorável, adorável Momoka. (Croc, croc)"
205-6 = "Sendo assim... é hora de trabalhar, Sensei."
205-7 = "Os 'Kaitenger', famosos criminosos procurados em Kivotos, bem, eu finalmente descobri o esconderijo deles."
205-8 = "Parece que eles estão tramando algo perigoso de novo."
205-9 = "Não sei exatamente o que é, mas só com o dinheiro que eles roubaram até agora, daria para construir várias armas ilegais."
205-10 = "Eles roubaram de tudo: plantas de armas gigantescas, novos materiais metálicos feitos com tecnologia de engenharia de ponta... uma lista enorme."
205-11 = "Com tanto capital e tecnologia assim... bem, o que será que eles estão tentando fazer?"
205-12 = "Bom, de qualquer forma, não deve ser nada bom. Duvido muito que seja algo útil para Kivotos."
205-13 = "Por isso, chegou a hora do conveniente... digo, da gentil Schale entrar em ação."
205-14 = "Pode ir até o esconderijo dos Kaitenger e acabar com os planos deles? Não sei o que vai aparecer por lá, mas sendo a Schale, você vai dar conta, né? (Croc)"
205-19 = "Fufu. Então conto com você, Sensei."
