[translation]
205-1 = "カイテンジャーの本拠地へ向かえ！"
205-3 = "やっ、久しぶり先生。"
205-4 = "なあに、その表情？急に私が出てきてびっくりした？"
205-5 = "ふふっ、どっかの誰かさんを期待してたなら残念。今は可愛い可愛いモモカ様のターンだから。（パリッパリッ）"
205-6 = "そういうわけで……お仕事だよ、先生。"
205-7 = "キヴォトスでも有名な指名手配犯である「カイテンジャー」、最近あいつらの本拠地を突き止めたの。"
205-8 = "まーた何か、危なそうなことを企んでるみたいでさ。"
205-9 = "それが具体的にどういうものかは分からないけど、あいつらが今まで奪ったお金だけでも、違法な兵器を幾つも作れるレベルだし。"
205-10 = "やたらとでかい武器の設計図やら、最新のエンジニアリング技術が使われた新しい金属素材やら……そういうのも色々と盗まれててね。"
205-11 = "そんな莫大な資本と技術を使って……さて、何をしようとしてるんだか？"
205-12 = "まっ、どうせろくでもないことだろうね。殊勝にもキヴォトスのために役立つことを、ってわけでもなさそうだし。"
205-13 = "というわけで都合が良……や、親切なシャーレの出番ってわけ。"
205-14 = "カイテンジャーの本拠地に向かって、あいつらの計画をぶっ壊してきてもらえる？何が出てくるかは分からないけど、まあシャーレなら大丈夫でしょ。（パリッ）"
205-19 = "ふふっ。じゃあ頼んだよ、先生。"
