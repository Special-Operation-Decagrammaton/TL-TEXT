[translation]
1000515-1 = "Ingresso para Qualquer Lugar"
1000515-3 = "（Recebi uma mensagem da Hoshino e fui até a sala do Comitê de Contramedidas）"
1000515-10 = "Hm?#nEsse som é..."
1000515-11 = "Como eu pensei, é o Sensei."
1000515-17 = "Uhehe, eu acertei em cheio."
1000515-18 = "Obrigada, Sensei.#nMesmo sendo de última hora, você veio."
1000515-19 = "......E os outros?"
1000515-20 = "Minhas queridas kouhais disseram que todas têm compromissos.#nPor isso, chamei o Sensei assim..."
1000515-21 = "Se eu tivesse chamado só para passar um tempo com o Sensei,#neu não me importaria, mas..."
1000515-22 = "Não parece que todo mundo só te chama quando precisa de um favor?"
1000515-23 = "......Não é um problema ficar dependendo do Sensei para sempre?"
1000515-24 = "E também sinto muito por te chamar só quando tem trabalho.#nPor mais que você seja um adulto, sabe."
1000515-25 = "[s1] \"Eu não me importo nem um pouco!\"\n[s2] \"Na verdade, eu agradeço muito.\""
1000515-28 = "Uhehe.#nEu sabia que o Sensei diria isso."
1000515-29 = "Mas, ser independente é importante."
1000515-30 = "......Não."
1000515-31 = "Na verdade, sou eu quem vive dependendo do Sensei."
1000515-35 = "Eu já entendi, Sensei."
1000515-36 = "Quando você me olha assim,#neu fico tão sem jeito quanto quando a Ayane-chan me dá uma bronca."
1000515-37 = "Bem, vamos ao que interessa."
1000515-38 = "Eu estava passando um tempo sozinha e me lembrei do Sensei."
1000515-39 = "[s3] \"...De mim?\"\n[s4] \"Aconteceu alguma coisa...?\""
1000515-42 = "Não é que tenha acontecido algo em especial, mas..."
1000515-43 = "Sensei."
1000515-44 = "Pode dar uma olhada nisto?"
1000515-50 = "[ns5] \"O travesseiro da Hoshino?\"\n[ns6] \"Por que você me mostrou isso de repente...?\""
1000515-53 = "O Sensei talvez não saiba, mas#nna verdade, não é um travesseiro comum."
1000515-54 = "Este é um \"Ingresso para Qualquer Lugar\" com poderes místicos~."
1000515-58 = "Fufu, você não entendeu nada do que eu disse, né?"
1000515-59 = "Bem, é mais rápido mostrar do que explicar."
1000515-64 = "Isso, isso, fique em uma posição confortável..."
1000515-65 = "Abrace-o assim..."
1000515-69 = "Sim, está ótimo."
1000515-70 = "Agora, feche os olhos..."
1000515-81 = "Este é um ingresso dos sonhos que permite dormir tranquilamente em qualquer lugar."
1000515-85 = "（Como a Hoshino disse, fui tomado pelo sono imediatamente）"
1000515-86 = "（Enquanto dormia, tive a sensação de ouvir a voz da Hoshino）"
1000515-89 = "......Sensei."
1000515-90 = "Pensei que, de vez em quando, o Sensei deveria esquecer de tudo#ne tirar uma soneca."
1000515-91 = "O Sensei está sempre se esforçando demais..."
1000515-92 = "Pensei em te emprestar isso.#nNa verdade, é o meu tesouro pessoal, sabe."
1000515-96 = "......Sensei."
1000515-97 = "Você já dormiu, né...?"
1000515-99 = "Sem que eu percebesse..."
1000515-103 = "Para mim, o Sensei é..."
1000515-112 = "（Quando acordei,）"
1000515-117 = "（o sol já tinha se posto completamente）"
1000515-118 = "[ns7] \"Quando vi, já era noite...\"\n[ns8] \"Dormi por tanto tempo assim...\""
1000515-121 = "......Ah, acordou?"
1000515-126 = "Você parecia tão confortável que#neu acabei dormindo ao seu lado também."
1000515-127 = "……hmmm?"
1000515-128 = "Claro, esse travesseiro é um item especial para o tio aqui, mas#nconsigo dormir sem ele também."
1000515-129 = "Mas hoje, eu emprestei para o Sensei, que é um \"iniciante em cochilos\"."
1000515-130 = "Já está ficando tarde, né……."
1000515-131 = "Não seria melhor você ir para casa logo?#nVocê tem trabalho amanhã, Sensei."
1000515-132 = "Eu te acompanho até perto. #nJá que fui eu quem te chamei até aqui, pelo menos isso eu posso fazer."
1000515-133 = "Bem, aproveitando a patrulha, claro."
1000515-134 = "Sério, é só de passagem, então não precisa se preocupar."
1000515-135 = "……hã?"
1000515-136 = "……Você gostou desse travesseiro?"
1000515-137 = "Quer saber onde pode conseguir um……?"
1000515-142 = "……Uhe~."
1000515-143 = "Isso é segredo. #nSe eu te contar, você não vai mais vir me ver, né?"
1000515-144 = "Dito isso, eu comprei isso em Abydos faz muito tempo, então#nnão dá mais para encontrar."
1000515-145 = "Ou seja, é um tesouro só do tio aqui."
1000515-150 = "……Por isso, Sensei."
1000515-151 = "Se você quiser tirar um cochilo de novo, é só chamar o tio."
1000515-152 = "……Entendido?"
1000515-154 = "(Depois disso, Hoshino me acompanhou até o Schale)"
1000515-155 = "(Dias depois, tentei tirar um cochilo na sala de descanso, mas não consegui dormir tão bem quanto naquele dia)"
