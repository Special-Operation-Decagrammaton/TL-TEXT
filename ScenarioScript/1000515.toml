[translation]
1000515-1 = "どこでも入場券"
1000515-3 = "（ホシノに連絡をもらい、対策委員会の部室に向かった）"
1000515-10 = "ん？#nこの音は……。"
1000515-11 = "やっぱり、先生だよね。"
1000515-17 = "うへへ、やっぱり当たってた。"
1000515-18 = "ありがとね、先生。#n急だったのに来てもらってさ。"
1000515-19 = "……ほかのみんな？"
1000515-20 = "うちの可愛い後輩たちは、みんな予定があるんだって。#nだから、こうして先生を呼んだわけで……。"
1000515-21 = "単純に先生と遊ぶために呼ぶんだったら、#n私も気にしないんだけど……"
1000515-22 = "みんな、頼み事がある時に限って呼ぶことが多くない？"
1000515-23 = "……いつまでも先生に頼りっぱなしってのも、困るでしょ？"
1000515-24 = "仕事がある時だけ呼び出すのも、それこそ申し訳ないしさ。#nいくら大人とはいえ、ね。"
1000515-25 = "[s1] \"私は全然大丈夫だよ？\"\n[s2] \"むしろ、大歓迎だよ。\""
1000515-28 = "うへへ。#n先生なら、そう言ってくれると思ってたけどさ。"
1000515-29 = "でも、自立は大事だし。"
1000515-30 = "……いや。"
1000515-31 = "むしろ、おじさんこそ先生に頼りっぱなしだよね。"
1000515-35 = "分かってるってば、先生。"
1000515-36 = "そういう目で見られると、#nアヤネちゃんに怒られてる時と同じくらい困っちゃうなぁ。"
1000515-37 = "ま、そろそろ本題に入ろっか。"
1000515-38 = "一人で過ごしてたら、先生のことを思い出してさ。"
1000515-39 = "[s3] \"……私のことを？\"\n[s4] \"何かあったの……？\""
1000515-42 = "特に何かがあったわけじゃないけど……。"
1000515-43 = "先生。"
1000515-44 = "これ、見てくれる？"
1000515-50 = "[ns5] \"ホシノの枕？\"\n[ns6] \"いきなり、どうしてこれを……？\""
1000515-53 = "先生は知らないかもしれないけど、#n実はただの枕じゃないんだよねぇ。"
1000515-54 = "これは神秘的な力を持った「どこでも入場券」だよ～。"
1000515-58 = "ふふっ、何を言ってるのかよく分かってないでしょ？"
1000515-59 = "ま、説明するより、やってみたほうが早いかな。"
1000515-64 = "そうそう、楽な姿勢で……。"
1000515-65 = "抱きかかえるようにして……。"
1000515-69 = "うん、良い感じ。"
1000515-70 = "それじゃ、そのまま目を閉じて……。"
1000515-81 = "これは、どんな場所でも安らかに眠れる夢のチケットなんだ。"
1000515-85 = "（ホシノの言う通り、すぐ眠気に襲われた）"
1000515-86 = "（寝ている間、ホシノの声が聞こえたような気がする）"
1000515-89 = "……先生。"
1000515-90 = "たまには先生も全部忘れて、#nお昼寝でもしてみたらどうかなって思ったんだよね。"
1000515-91 = "先生は、いつも頑張ってばかりだから……。"
1000515-92 = "これを貸してあげようと思ってさ。#n本当は、おじさんだけの宝物なんだけどね。"
1000515-96 = "……先生。"
1000515-97 = "もう、寝てるよね……？"
1000515-99 = "いつの間にかさ……。"
1000515-103 = "私にとって、先生は……。"
1000515-112 = "（目を覚ました頃には、）"
1000515-117 = "（すっかり日が暮れていた）"
1000515-118 = "[ns7] \"気づいたら、夜に……。\"\n[ns8] \"こんなに眠ってたんだ……。\""
1000515-121 = "……あれ、起きたの？"
1000515-126 = "あまりにも気持ち良さそうだったから、#nおじさんも隣で寝ちゃってたよ。"
1000515-127 = "……ん～？"
1000515-128 = "もちろん、その枕はおじさんにとって特別なアイテムだけど、#nなくっても寝られるよ。"
1000515-129 = "今日は「お昼寝初心者」の先生に、貸してあげたけどね。"
1000515-130 = "もう良い時間だし……。"
1000515-131 = "そろそろ帰ったほうが良いんじゃない？#n明日も仕事でしょ、先生。"
1000515-132 = "近くまで送るよ。#nおじさんがここまで呼び出したんだし、せめてそれくらいはね。"
1000515-133 = "ま、パトロールのついでにさ。"
1000515-134 = "本当に、ついでだから気にしなくて大丈夫だよ。"
1000515-135 = "……ん？"
1000515-136 = "……この枕、気に入ってくれたの？"
1000515-137 = "どこで手に入れられるのか、って……？"
1000515-142 = "……うへ～。"
1000515-143 = "それは内緒だよ。#n教えちゃったら、来てくれなくなるでしょ？"
1000515-144 = "と言っても、これはずっと前にアビドスで買った物だから、#nもう手に入らないんだ。"
1000515-145 = "つまり、おじさんだけの宝物ってこと。"
1000515-150 = "……だから先生。"
1000515-151 = "もし、またお昼寝がしたくなったら、おじさんを呼んでね。"
1000515-152 = "……分かった？"
1000515-154 = "（その後、ホシノにシャーレまで送ってもらった）"
1000515-155 = "（後日、休憩室でお昼寝をしてみたが、あの日ほど気持ちよく眠れなかった）"
