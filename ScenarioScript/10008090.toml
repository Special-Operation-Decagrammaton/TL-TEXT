[translation]
10008090-1 = "第9話;対策委員会、集結！"
10008090-3 = "こ、こいつら、めちゃくちゃ強い……！？"
10008090-4 = "うへ～、まあおじさんもこういう時はちょっとくらいね～？"
10008090-5 = "ぐ、これでは足りない……！支援を要請する！"
10008090-13 = "これじゃあキリがないわよ……！？"
10008090-15 = "大勢で寄ってたかってなんて、ズルいですねー。"
10008090-17 = "……！"
10008090-25 = "があっ！？"
10008090-29 = "[ns] \"ガトリング砲ってことは……！\""
10008090-32 = "ノノミ先輩まで！"
10008090-33 = "お待たせしましたセリカちゃん！それに先生、あけましておめでとうございます☆"
10008090-34 = "っていうことはもしかして……。"
10008090-39 = "セリカ、お待たせ。"
10008090-40 = "シロコ先輩！"
10008090-42 = "ど、どうしてここにあなたたちが……！？"
10008090-43 = "それにしても、便利屋のみんながセリカちゃんと一緒だなんてねぇ。"
10008090-44 = "その上先生まで。意外な組み合わせで、おじさんもびっくりだよ。あ、そういえばあけましておめでと～。"
10008090-45 = "[s] \"あけましておめでとう……ってそれより、どうしてここが……？\""
10008090-47 = "セリカから連絡があったから。"
10008090-48 = "連絡、って……"
10008090-49 = "あっ！"
10008090-52 = "こうなったら、協力を要請して……！"
10008090-58 = "ああ、メッセージ送ったって言ってたね。"
10008090-59 = "用件とかは書かれてなかったんですけどね☆ちょうどセリカちゃんのバイト先が生中継で映ってたので、これはもしかして？と思いまして。"
10008090-60 = "うん、巻き込まれてたら困るなぁって思ってさ～。"
10008090-61 = "セリカ、こういうのに巻き込まれがちなイメージだし。"
10008090-63 = "そ、そうなの！？"
10008090-69 = "全てが書かれていなくても、仲間を助けるために飛び出すだなんて……。"
10008090-70 = "アルちゃん、すっごい感激してるじゃーん♪"
10008090-71 = "べ、別にそういうのじゃないわよ！？"
10008090-73 = "それに、賽銭箱の中身は早い者勝ちって聞いて。"
10008090-80 = "何で今それ持ってるの！？"
10008090-81 = "ちゃんと準備してきた。"
10008090-82 = "[s] \"あっ、でもその件についてはその……。\""
10008090-83 = "シロコ先輩、その賽銭箱なんだけど……"
10008090-84 = "全部嘘だったわよ。"
10008090-85 = "……嘘？"
10008090-88 = "なるほどね～。今回の騒ぎの主犯はカイテンジャーじゃなくって、黒亀組だったってことかー。"
10008090-89 = "いやぁ、それは災難だったねぇ。大人の悪意は困ったもんだー。"
10008090-90 = "そういうことだったんですか……みんなを騙してお金を奪おうだなんて、許せません！"
10008090-91 = "ですよね、シロコちゃん！"
10008090-95 = "全部、嘘……。"
10008090-96 = "[s] \"シロコ、大丈夫……？\""
10008090-97 = "シロコちゃん、すっごい期待してたもんね～。"
10008090-98 = "最初から騙してたなんて、許せない。"
10008090-100 = "そうよ、許してはおけないわ。だからその大吉殿の管理人とやらに、今からでも一発食らわせてやらないと。"
10008090-101 = "そういうことで……"
10008090-102 = "手伝ってくれない？"
10008090-103 = "あはっ、ここでもう一回共同戦線？"
10008090-104 = "ええ、相手は雑魚だけれど数が多い。私たちだけでは厳しいわ。"
10008090-106 = "まあ、特に断る理由は無いかな？"
10008090-107 = "はい！セリカちゃんと、落ち込んでしまったシロコちゃんのためにも！"
10008090-113 = "……別に落ち込んでない。"
10008090-114 = "まあまあ、実際にやるのはダメだけど気持ちは分かるよ。"
10008090-115 = "その分もやり返しに行こ、ね？おじさんも手伝うからさ？"
10008090-117 = "よし、そうと決まれば……！"
10008090-125 = "みなさん無事ですか！？"
10008090-126 = "すみません、何だか接続が不安定で……！あ、先生あけましておめでとうございます！"
10008090-127 = "アヤネちゃん……！って、何でアヤネちゃんまで覆面なの！？"
10008090-128 = "こ、これはシロコ先輩が必要だからって……！"
10008090-129 = "もう要らなくなった。"
10008090-130 = "そ、そうなんですか……？"
10008090-132 = "あはははっ、メガネっ娘ちゃんまで！面白くなってきたねー！"
10008090-133 = "さーて、じゃあもう一つ仕込んでおこっかな？"
10008090-134 = "[s] \"ムツキ？\""
10008090-135 = "全員で力を合わせて反撃！っていうのも勿論悪くないけどー。"
10008090-141 = "せっかくだし、もうちょっと面白くしようかな～って♪"
10008090-145 = "送信完了～！"
10008090-146 = "ムツキ、今のってもしかして……。"
10008090-147 = "こんな楽しいドタバタ劇、私たちだけで楽しむのはもったいないでしょ？"
10008090-148 = "だからもっと面白くするためにも、ね？"
10008090-149 = "いたぞ、やつらをここで制圧しろ！"
10008090-158 = "くふふっ♪さーて、じゃあお祭りを始めよっか？"
10008090-159 = "ね、先生♡"
