[translation]
10008090-1 = "Episódio 9; Comitê de Contramedidas, reunido!"
10008090-3 = "E-esses caras, eles são incrivelmente fortes...!?"
10008090-4 = "Uhe~, bem, o tio aqui também precisa se esforçar um pouquinho nessas horas, né?"
10008090-5 = "Droga, isso não é o suficiente...! Solicitando reforços!"
10008090-13 = "Desse jeito não vai ter fim...!?"
10008090-15 = "Vir em bando assim, que covardia, hein."
10008090-17 = "……！"
10008090-25 = "Argh!?"
10008090-29 = "[ns] \"Uma metralhadora giratória, isso significa que...!\""
10008090-32 = "Até a Nonomi-senpai!"
10008090-33 = "Desculpe a demora, Serika-chan! E Sensei, feliz ano novo☆"
10008090-34 = "Isso significa que, por acaso..."
10008090-39 = "Serika, desculpe a demora."
10008090-40 = "Shiroko-senpai!"
10008090-42 = "P-por que vocês estão aqui...!?"
10008090-43 = "Mas, ainda assim, pensar que o pessoal da Problem Solver estaria junto com a Serika-chan."
10008090-44 = "E o Sensei também. Que combinação inesperada, até o tio aqui se surpreendeu. Ah, aliás, feliz ano novo~."
10008090-45 = "[s] \"Feliz ano novo... mas, antes disso, como vocês sabiam daqui...?\""
10008090-47 = "Porque a Serika entrou em contato."
10008090-48 = "Contato, tipo..."
10008090-49 = "Ah!"
10008090-52 = "Se for assim, vou solicitar cooperação...!"
10008090-58 = "Ah, é verdade, você disse que tinha enviado uma mensagem."
10008090-59 = "Não estava escrito o motivo, mas☆ como o local de trabalho da Serika-chan estava passando ao vivo, pensei: 'será que é isso?'."
10008090-60 = "É, fiquei preocupada que você pudesse acabar se metendo em encrenca~."
10008090-61 = "A Serika tem essa imagem de sempre acabar envolvida nessas coisas."
10008090-63 = "É-é mesmo!?"
10008090-69 = "Mesmo sem estar escrito tudo, sair correndo para ajudar uma companheira..."
10008090-70 = "A Aru-chan está super emocionada, hein♪"
10008090-71 = "N-não é nada disso!"
10008090-73 = "Além disso, ouvi dizer que o conteúdo da caixa de oferendas é de quem chegar primeiro."
10008090-80 = "Por que você está com isso agora!?"
10008090-81 = "Eu me preparei direitinho."
10008090-82 = "[s] \"Ah, mas sobre esse assunto, bem...\""
10008090-83 = "Shiroko-senpai, sobre aquela caixa de oferendas..."
10008090-84 = "Era tudo mentira."
10008090-85 = "……Mentira?"
10008090-88 = "Entendi~. Então o mentor dessa confusão não era o Kaitenger, mas sim o Grupo Kurokame."
10008090-89 = "Nossa, que azar o seu. A malícia dos adultos é um problema, viu."
10008090-90 = "Então era isso... enganar todo mundo para roubar dinheiro, eu não posso perdoar!"
10008090-91 = "Concordo, Shiroko-chan!"
10008090-95 = "Tudo... mentira."
10008090-96 = "[s] \"Shiroko, você está bem...?\""
10008090-97 = "A Shiroko-chan estava super empolgada, né~."
10008090-98 = "Enganar a gente desde o começo, não posso perdoar."
10008090-100 = "É isso aí, não podemos deixar passar. Por isso, temos que dar uma lição naquele tal administrador do 'Grande Sorte', mesmo que seja agora."
10008090-101 = "Sendo assim..."
10008090-102 = "Vocês não ajudariam?"
10008090-103 = "Ah, vamos formar uma frente comum de novo aqui?"
10008090-104 = "Sim, os oponentes são fracos, mas são muitos. Sozinhas, vai ser difícil."
10008090-106 = "Bem, não vejo motivo para recusar, né?"
10008090-107 = "Sim! Pela Serika-chan e pela Shiroko-chan, que ficou tão desanimada!"
10008090-113 = "……Eu não estou desanimada."
10008090-114 = "Calma, calma. Eu sei que não podemos fazer isso de verdade, mas entendo o que você sente."
10008090-115 = "Vamos lá retribuir na mesma moeda, certo? O tio aqui vai ajudar vocês, beleza?"
10008090-117 = "Certo, se é assim que vai ser……!"
10008090-125 = "Pessoal, vocês estão bem!?"
10008090-126 = "Desculpem, a conexão estava meio instável……! Ah, Sensei, feliz ano novo!"
10008090-127 = "Ayane-chan……! Espera, por que você também está usando uma máscara!?"
10008090-128 = "I-isso é porque a Shiroko-senpai disse que era necessário……!"
10008090-129 = "Não precisamos mais dela."
10008090-130 = "É, é mesmo……?"
10008090-132 = "Ahahaha, até a garota de óculos! Isso está ficando interessante!"
10008090-133 = "Bom, então acho que vou preparar mais uma coisinha."
10008090-134 = "[s] \"Mutsuki?\""
10008090-135 = "Unir forças para contra-atacar é claro que não é ruim, mas……"
10008090-141 = "Já que estamos aqui, pensei em deixar as coisas um pouco mais divertidas~♪"
10008090-145 = "Envio concluído~!"
10008090-146 = "Mutsuki, o que você acabou de fazer……"
10008090-147 = "Uma confusão tão divertida assim, seria um desperdício aproveitar só entre nós, não acha?"
10008090-148 = "Então, para deixar tudo mais interessante, sabe?"
10008090-149 = "Ali estão eles! Dominem esses caras aqui mesmo!"
10008090-158 = "Kufufu♪ Bom, então vamos começar a festa?"
10008090-159 = "Né, Sensei♡"
