[translation]
32180-1 = "Episódio 18; Mesmo Num Mundo Assim (2)"
32180-2 = "A Irmandade...!?"
32180-3 = "Tch, Urawa Hanako...!"
32180-4 = "...Bom, digamos que a gente fez um pequeno acordo."
32180-5 = "Acordo...?"
32180-6 = "Isso não é da sua conta, Mika-san."
32180-11 = "*Cof*, que a paz e a tranquilidade estejam com todos vocês hoje... *cof*."
32180-12 = "C-Com licença, desculpem a intromissão..."
32180-13 = "Nós, da Irmandade, cientes de que isso vai contra nossos costumes... decidimos intervir neste conflito interno da Tea Party."
32180-14 = "Mika Misono-san, da Tea Party. Você está sendo detida por incitação e tentativa de agressão contra outra membra da Tea Party."
32180-17 = "Sakurako Utazumi, da Irmandade..."
32180-18 = "...Ahah. Confesso que é a minha primeira vez lutando contra a Irmandade. Entendi, então esse é o seu trunfo?"
32180-19 = "...Hanako Urawa, como você convenceu a Irmandade a agir?"
32180-20 = "Eu sei que você era bem próxima das freiras. Mas elas nunca moveriam um dedo sem ganhar nada em troca... Ei, qual foi o preço que você pagou?"
32180-21 = "......"
32180-22 = "...Hum, bem interessante. Bom, parece que o número de pessoas que eu tenho que varrer do mapa aumentou de uma vez só."
32180-23 = "...Finalmente a sua expressão mudou um pouquinho, não é, Mika-san?"
32180-24 = "...Será? Bom, eu já tava pensando em fazer uma faxina na Catedral quando virasse a anfitriã mesmo. É, vou encarar isso como uma ótima chance pra resolver tudo de uma vez."
32180-29 = "...Bom, vamos nessa, então?"
32180-33 = "...Então você pretende lutar de qualquer jeito, Mika-san. Você sabe muito bem quais são as suas chances de vitória nessa situação, não sabe?"
32180-34 = "...É, talvez. Mas depois de chegar até aqui, eu não posso simplesmente dizer 'tá bom, eu me rendo', né?"
32180-36 = "...Agora eu só posso ir até o fim."