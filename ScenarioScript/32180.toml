[translation]
32180-1 = "Episódio 18;Também um Mundo Assim (2)"
32180-2 = "Sisterhood……!?"
32180-3 = "Gh, Hanako Urawa……!"
32180-4 = "……Bom, é que a gente fez um trato."
32180-5 = "Trato……?"
32180-6 = "É uma coisa que você não precisa saber, Mika."
32180-11 = "Cof, que hoje também a paz e a serenidade estejam com todos vocês…… cof."
32180-12 = "D-desculpem, com licença……."
32180-13 = "Sisterhood; ainda que isto vá contra os costumes de até agora…… vamos intervir no conflito interno do Tea Party."
32180-14 = "Mika Misono, do Tea Party. Por incitação à lesão e tentativa de lesão contra outros membros do Tea Party, vamos deter você."
32180-17 = "Sisterhood, Sakurako Utazumi……."
32180-18 = "……Aha. De fato, é a primeira vez que eu luto contra a Sisterhood. Sei, então era esta a cartada da manga?"
32180-19 = "……Hanako Urawa, como você mobilizou a Sisterhood?"
32180-20 = "Que você era próxima das irmãs eu sei. Mas essas meninas jamais se moveriam sem nenhum ganho…… ei, O QUE VOCÊ PAGOU?"
32180-21 = "……."
32180-22 = "……Sim, interessante. Bom, o número de adversárias que eu tenho que despachar aumentou de uma vez, né."
32180-23 = "……Enfim o seu semblante mudou, né, Mika?"
32180-24 = "……Será? Bom, de todo jeito, quando eu virar host, eu já pretendia fazer uma faxina na grande catedral também. Sim, vou pensar que é uma chance de resolver tudo de uma vez."
32180-29 = "……Bom, então, vamos experimentar?"
32180-33 = "……Você pretende mesmo lutar, Mika. Você não é de não saber qual é a chance de vitória nesta situação, é?"
32180-34 = "……Sim, talvez não. Mas, tendo chegado até aqui, não dá pra \"me render quietinha\", né?"
32180-36 = "……Eu já só me resta ir até onde der pra ir."
