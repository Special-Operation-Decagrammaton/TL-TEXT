[translation]
32180-1 = "Episódio 18; Um mundo assim (2)"
32180-2 = "Sisterhood……!?"
32180-3 = "Ah, Urawa Hanako……!"
32180-4 = "……Bem, eu fiz uma pequena promessa."
32180-5 = "Uma promessa……?"
32180-6 = "É algo que você não precisa saber, Mika-san."
32180-11 = "Cof, que a paz e a tranquilidade estejam com todos vocês hoje também…… cof."
32180-12 = "D-desculpe, com licença……"
32180-13 = "Sisterhood, embora vá contra os costumes estabelecidos até agora…… nós iremos intervir no conflito interno do Tea Party."
32180-14 = "Misono Mika do Tea Party. Por incitação a agressão e tentativa de agressão contra outros membros do Tea Party, estamos sob custódia de sua pessoa."
32180-17 = "Sisterhood, Utazumi Sakurako……"
32180-18 = "……Ahaha. É a primeira vez que luto contra a Sisterhood, hein. Entendi, então esse é o seu trunfo?"
32180-19 = "……Urawa Hanako, como você fez a Sisterhood se mover?"
32180-20 = "Eu sabia que você era próxima das irmãs. Mas elas não se moveriam sem ganhar nada em troca…… diga, o que você pagou?"
32180-21 = "……"
32180-22 = "……Sim, interessante. Bem, o número de pessoas que preciso eliminar aumentou de uma vez só."
32180-23 = "……Finalmente a sua expressão mudou, não é, Mika-san?"
32180-24 = "……Será? Bem, de qualquer forma, quando eu me tornasse a anfitriã, eu já pretendia limpar a Catedral também. Sim, acho que vou pensar nisso como uma chance de resolver tudo de uma vez."
32180-29 = "……Bem, então vamos começar?"
32180-33 = "……Você ainda pretende lutar, Mika-san? Você não é alguém que não entende quais são as suas chances de vitória nesta situação, certo?"
32180-34 = "……Sim, talvez. Mas depois de chegar até aqui, não tem como eu simplesmente dizer 'me rendo pacificamente', certo?"
32180-36 = "……Eu já não tenho escolha a não ser ir até o fim."
