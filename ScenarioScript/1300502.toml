[translation]
1300502-1 = "抜き打ち検査"
1300502-2 = "キヴォトス・裏通り"
1300502-6 = "暗い路地裏で、カヨコが警察と何かを話していた。"
1300502-7 = "だから、私は何もやってないって。"
1300502-8 = "嘘つくな！そんな怪しい見た目で……。"
1300502-9 = "こんな場所をうろついて、何か用事でもあるのか？"
1300502-10 = "それは、だから……。"
1300502-11 = "……だから？"
1300502-12 = "……いや、何も。"
1300502-13 = "ほら見たことか、何か企んでいるんじゃないのか！？"
1300502-14 = "とりあえず学生証を出しなさい、身元確認をするから。"
1300502-15 = "（ゲヘナの所属ってバレたら、また風紀委員会から何か言われるし……）"
1300502-16 = "（めんどくさいことに巻き込まれちゃったな……）"
1300502-20 = "[ns] \"うちの生徒に何か問題でもありましたか？\""
1300502-21 = "ん？どなたですか？"
1300502-22 = "[s] \"シャーレの先生です。\""
1300502-23 = "……先生？"
1300502-24 = "先生がどうしてこんなところに……。"
1300502-26 = "その後、警察の人と話してカヨコのことを弁護した。"
1300502-29 = "ふう……シャーレの先生がそこまでおっしゃるのなら仕方ないですね。"
1300502-34 = "……どうして助けてくれたの？"
1300502-35 = "困ってるように見えたから……？そりゃ、困ってたけど……。"
1300502-36 = "不審者に誤解されるのは慣れてるから、あまり気にしなくていい。"
1300502-37 = "ああやって警察に捕まるのはよくあることだから……。"
1300502-38 = "やっぱりめんどうだね、この怖い顔立ち。"
1300502-39 = "それで、実際のところ何をしてたのか、って？"
1300502-40 = "関係ないでしょ、私がここで何をしてても。"
1300502-41 = "…………。"
1300502-42 = "……はぁ。野良猫に、エサをやってたの。#n警察が来て、すぐ逃げちゃったけど。"
1300502-43 = "どうして最初から正直に話さなかったのか、って？"
1300502-44 = "それは……正直に言っても、信じてもらえないから。"
1300502-45 = "似合わないのは、自分でもよく分かってる。"
1300502-46 = "こんな怖い顔で猫の世話をしてるなんて、傍から見たらおかしいよね。"
1300502-48 = "……おかしくない？#nあ、うん……ありがとう……。"
1300502-49 = "とにかく、今日は借りを作っちゃったね。"
1300502-50 = "この借りは今度、絶対返すから。"
1300502-52 = "その後、便利屋の事務所までカヨコを送ってあげた。"
