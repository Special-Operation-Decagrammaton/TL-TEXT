[translation]
1300502-1 = "Inspeção surpresa"
1300502-2 = "Kivotos - Beco"
1300502-6 = "Em um beco escuro, Kayoko estava conversando com a polícia."
1300502-7 = "Eu já disse, eu não fiz nada."
1300502-8 = "Não minta! Com essa aparência suspeita..."
1300502-9 = "O que você está fazendo rondando por aqui?"
1300502-10 = "É que, bem..."
1300502-11 = "...É que?"
1300502-12 = "...Não, nada."
1300502-13 = "Viu só? Você não está tramando alguma coisa?!"
1300502-14 = "Por enquanto, mostre sua identidade. Vamos verificar quem você é."
1300502-15 = "(Se descobrirem que sou de Gehenna, o Comitê Disciplinar vai começar a me encher de novo...)"
1300502-16 = "(Que saco, me meti em uma confusão...)"
1300502-20 = "[ns] \"Houve algum problema com minha aluna?\""
1300502-21 = "Hm? Quem é você?"
1300502-22 = "[s] \"Sou o Sensei do Schale.\""
1300502-23 = "...Sensei?"
1300502-24 = "Por que o Sensei está em um lugar como este..."
1300502-26 = "Depois disso, conversei com o policial e defendi a Kayoko."
1300502-29 = "Ufa... Se o Sensei do Schale diz isso, então não tenho escolha."
1300502-34 = "...Por que você me ajudou?"
1300502-35 = "Porque parecia que você estava em apuros...? Bem, eu estava, mas..."
1300502-36 = "Já estou acostumada a ser confundida com uma pessoa suspeita, então não precisa se preocupar muito."
1300502-37 = "Ser parada pela polícia desse jeito é algo comum para mim..."
1300502-38 = "É um saco ter essa cara intimidadora, afinal."
1300502-39 = "E então, quer saber o que eu estava fazendo de verdade?"
1300502-40 = "Não é da sua conta o que eu estava fazendo aqui."
1300502-41 = "…………."
1300502-42 = "...Ah. Eu estava dando comida para gatos de rua.#nA polícia chegou e eles fugiram na hora."
1300502-43 = "Por que eu não disse a verdade desde o início?"
1300502-44 = "É que... mesmo que eu diga a verdade, ninguém acredita."
1300502-45 = "Eu mesma sei que não combina comigo."
1300502-46 = "Cuidar de gatos com essa cara assustadora... deve parecer estranho para quem vê, né?"
1300502-48 = "...Não é estranho?#nAh, sim... obrigada..."
1300502-49 = "De qualquer forma, hoje eu fiquei te devendo uma."
1300502-50 = "Vou retribuir esse favor, com certeza."
1300502-52 = "Depois disso, levei a Kayoko até o escritório da empresa de faz-tudo."
