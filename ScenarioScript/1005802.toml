[translation]
1005802-1 = "救護の精神"
1005802-4 = "先生、お待ちしておりました。"
1005802-5 = "[s] \"それで、今日は何をしたらいいのかな？\""
1005802-6 = "簡単に説明すると「巡回救護」です。"
1005802-7 = "つまり、救護活動と街の見回りを同時に行う活動ですね。"
1005802-8 = "救護を求める方は、いつどこでどのように現れるか分かりません。"
1005802-9 = "ですから、救護を必要としている場所を自ら探し回る点が普段とは異なる部分になります。"
1005802-10 = "ご安心ください。これは誰かを助けるための活動ですので。"
1005802-11 = "私たちを含め、誰かが危険な目に遭うようなことはありません。"
1005802-12 = "……おそらく。"
1005802-16 = "[ns] \"おそらく！？\""
1005802-20 = "うわあぁ～ん！"
1005802-21 = "これは……先生、泣いている子供がいます！"
1005802-22 = "これは「救護」が必要でしょう！"
1005802-34 = "失礼、どうして泣いているのですか？何かあったのですか？"
1005802-38 = "ワンちゃんが……。"
1005802-39 = "ワンちゃんが？"
1005802-43 = "そこの壁の隙間から向こうに行っちゃって、戻って来られなくなっちゃったの……。"
1005802-44 = "ふむ、私にお任せください。"
1005802-49 = "（しゃがみ込み、ひび割れた壁の内側を覗き込んだ）"
1005802-50 = "本当ですね、かなり奥の方まで……。"
1005802-54 = "手を伸ばしたところで届きませんし、銃を差し出してみても……難しいですね。"
1005802-55 = "どこか怪我をしているようにも見えます。上手く足を動かせていません。"
1005802-56 = "じゃあ、もう助けられないの……？"
1005802-57 = "うぅ……うわぁぁーん！！"
1005802-61 = "……。"
1005802-62 = "いえ、心配なさらないでください。"
1005802-63 = "救護騎士団は、救護が必要な方を決して見放しはしません。"
1005802-68 = "[ns1] \"もしかして……ミネ？\"\n[ns2] \"あの……ミネさん……？\""
1005802-74 = "はぁっ！"
1005802-79 = "ドカァァアアン！ "
1005802-80 = "きゃぁっ！？"
1005802-81 = "[ns] \"うわっ！？\""
1005802-82 = "（ひび割れた壁を完全に壊してしまった！）"
1005802-83 = "（効果はバツグンだ！）"
1005802-87 = "はい、無事にワンちゃんを助けられましたよ。"
1005802-88 = "……やはり足を怪我しているみたいですね。少々お待ちください。"
1005802-94 = "（ミネは慣れた手付きで怪我の手当てをした）"
1005802-97 = "わあっ、やったっ！おかえり！"
1005802-98 = "救護騎士団のお姉さん、ありがとう！"
1005802-107 = "ふふっ。"
1005802-108 = "無事に解決できて良かったです。"
1005802-113 = "あああぁっ！"
1005802-117 = "私の家が！？"
1005802-119 = "先祖代々受け継いだ大切な家があああ！"
1005802-121 = "え、えっ……！？"
1005802-126 = "[ns] \"も、申し訳ありませんでした！！\""
1005802-127 = "（ミネと一緒に家主に謝罪した）"
1005802-132 = "[ns] \"大変だったね……。\""
1005802-133 = "そうですね。確かに大変ではありました。"
1005802-134 = "でも、子犬を助けられたことは良かったと思います。"
1005802-135 = "[s] \"そうだね。ちょっと怒られちゃったけど……\""
1005802-139 = "はい、総じて後悔はございません！"
1005802-140 = "あれは命を助ける「救護」でした。いったい、どこに後悔するところがあるでしょうか！"
1005802-141 = "たとえ何度あの場に戻ってやり直すことになろうと、私はあの壁を壊して犬を助け、家主の方に許しを得るまで謝罪をいたします！"
1005802-142 = "[s] \"うん、そっか。\""
1005802-143 = "先生が私たち救護騎士団の信念を分かってくださって、うれしく思います。"
1005802-147 = "はっ、あちらから猛スピードで迫ってくるトラック……！"
1005802-148 = "[s] \"目の前には、ボールを追いかけて飛び出していく子どもが！？\""
1005802-149 = "……？"
1005802-150 = "参ります！"
1005802-162 = "（ミネはトラックを盾で防ぎ、身を挺して子供の身を守った！）"
1005802-163 = "（しかし、トラックのバンパーが見事に歪んでしまった！）"
1005802-166 = "大丈夫ですか？怪我はありませんか？"
1005802-167 = "う、うん……！"
1005802-168 = "カッコいいお姉さん、ありがとう！"
1005802-169 = "ふふっ、無事で安心しました。"
1005802-170 = "[s] \"これからは車に気をつけてね。\""
1005802-171 = "ごめんなさい……。"
1005802-176 = "あああぁっ！？バンパーが……エンジンまで！？"
1005802-178 = "納車されたばっかりの新車なのに！"
1005802-182 = "（ミネと一緒にトラックの持ち主に謝罪した）"
1005802-186 = "木から下りれなくなっている猫がいます！"
1005802-189 = "スーパーの半額弁当を手に入れられず、悲しんでいる市民が！！"
1005802-193 = "ヘルメット団とチンピラの喧嘩に巻き込まれた暴走族が！！！"
1005802-195 = "（ミネの「救護」は、その後も一日中続いた）"
1005802-196 = "（途中から救護とは何か、自分の中で基準が分からなくなっていった……）"
1005802-200 = "お疲れさまでした、先生。"
1005802-201 = "[s] \"そろそろ終わりかな……？\""
1005802-202 = "はい。今日の巡回救護はここまでにしましょうか。"
1005802-206 = "……え？今日みたいなことを毎日しているのか、ですか？"
1005802-207 = "もちろん可能な限り、毎日「救護」のために見回るべきだと思っておりますが……手が回らない日があるのも事実です。"
1005802-208 = "思い返してみれば、今日はいつも以上に救護の手を求める人が多かったですね。"
1005802-209 = "大変ではありましたが、それだけ救護騎士団の精神をたくさんの人に伝えられたと思えば良いでしょう。"
1005802-210 = "それより、今日一日を先生とご一緒に過ごして感じたのですが……。"
1005802-211 = "私たち、息がピッタリだとは思いませんか？"
1005802-212 = "[s] \"う、うん……？そう、かも……。\""
1005802-213 = "やはり先生もそう思いますか！"
1005802-214 = "私の目に狂いはありません。"
1005802-220 = "先生は素晴らしい「救護」の才能をお持ちです！"
1005802-221 = "いかがでしょう？#n先生も私たち救護騎士団の一員となって、より多くの人々に救護の精神を伝え広めませんか？"
1005802-222 = "[s3] \"い、今は遠慮しておこうかな……！\"\n[s4] \"気持ちだけ受け取っておくよ！\""
1005802-223 = "そうですか……残念です……。"
1005802-224 = "そうですか……残念です……。"
1005802-225 = "ですが考えが変わりましたら、いつでもお声がけください。"
1005802-226 = "救護騎士団の「顧問」の席は、先生のために空けておきますので。"
