[translation]
1005802-1 = "espírito de alívio"

1005802-4 = "Sensei, estávamos esperando por você."

1005802-5 = "[s] \"Então, o que devo fazer hoje?\""

1005802-6 = "Simplificando, é “patrulha de socorro”."

1005802-7 = "Em outras palavras, é uma atividade que envolve ao mesmo tempo trabalho de socorro e patrulhamento da cidade."

1005802-8 = "As pessoas que buscam alívio não sabem quando, onde ou como aparecerão."

1005802-9 = "Portanto, o que difere do habitual é que procuramos por conta própria locais que necessitem de alívio."

1005802-10 = "Por favor, fique tranquilo. Esta é uma atividade para ajudar alguém."

1005802-11 = "Ninguém, incluindo nós, deveria estar em perigo."

1005802-12 = "……provavelmente."

1005802-16 = "[ns] \"Provavelmente!?\""

1005802-20 = "Uau!"

1005802-21 = "Isto é...Sensei, tem uma criança chorando!"

1005802-22 = "Isso exigirá “alívio”!"

1005802-34 = "Com licença, por que você está chorando? Aconteceu alguma coisa?"

1005802-38 = "Um cachorro..."

1005802-39 = "Um cachorro?"

1005802-43 = "Fui para o outro lado pela abertura na parede e não consegui voltar..."

1005802-44 = "Hum, deixe comigo."

1005802-49 = "(Agacha-se e olha dentro da parede rachada)"

1005802-50 = "É verdade, bem profundo..."

1005802-54 = "Não consigo alcançá-lo, mesmo que estenda a mão, e mesmo que tente segurar uma arma... é difícil."

1005802-55 = "Parece que ele está ferido em algum lugar. Não consigo mover minhas pernas direito."

1005802-56 = "Então, não posso mais te ajudar...?"

1005802-57 = "Ufa... Uau! !"

1005802-61 = "……."

1005802-62 = "Não, não se preocupe."

1005802-63 = "救護騎士団は、救護が必要な方を決して見放しはしません。"
1005802-68 = "[ns1] \"Talvez...Meu?\"\n[ns2] \"Hum...Meu...?\""

1005802-74 = "Ha!"

1005802-79 = "Dokaaaaan!"

1005802-80 = "Yay! ?"

1005802-81 = "[ns] \"Uau!?\""

1005802-82 = "(Eu destruí completamente a parede rachada!)"

1005802-83 = "(O efeito é excelente!)"

1005802-87 = "Sim, você conseguiu resgatar o cachorro com segurança."

1005802-88 = "...Parece que sua perna está machucada. por favor espere um momento."

1005802-94 = "(O meu tratou o ferimento com habilidade praticada.)"

1005802-97 = "Uau, eu consegui! Bem vindo de volta!"

1005802-98 = "Obrigado, Irmã dos Cavaleiros Socorros!"

1005802-107 = "Hehe."

1005802-108 = "Que bom que você conseguiu resolver o problema."

1005802-113 = "Ah!"

1005802-117 = "Minha casa! ?"

1005802-119 = "Tenho uma casa preciosa que foi passada de geração em geração!"

1005802-121 = "Ei, ei...! ?"

1005802-126 = "[ns] \"Sinto muito também!!\""

1005802-127 = "(Pedi desculpas ao senhorio com o meu)"

1005802-132 = "[ns] \"Foi difícil...\""

1005802-133 = "Concordo. Certamente foi difícil."

1005802-134 = "Mas estou feliz por ter conseguido salvar o cachorrinho."

1005802-135 = "[s] \"Isso mesmo. Fiquei um pouco bravo, mas...\""

1005802-139 = "Sim, no geral não me arrependo!"

1005802-140 = "Esse foi o “alívio” que salvou vidas. Afinal, o que há para se arrepender?"

1005802-141 = "Não importa quantas vezes eu tenha que voltar atrás e fazer tudo de novo, vou derrubar aquele muro, salvar o cachorro e pedir desculpas ao proprietário até que ele me perdoe!"

1005802-142 = "[s] \"Sim, entendo.\""

1005802-143 = "Fico feliz que você entenda as crenças de nossos Cavaleiros Socorros."

1005802-147 = "Ha, um caminhão está se aproximando de lá em grande velocidade...!"

1005802-148 = "[s] \"Tem uma criança correndo na sua frente correndo atrás da bola?\""

1005802-149 = "...?"

1005802-150 = "Estou chegando!"

1005802-162 = "(A minha bloqueou o caminhão com um escudo e se jogou para proteger a criança!)"

1005802-163 = "(No entanto, o para-choque do caminhão ficou gravemente distorcido!)"

1005802-166 = "OK? Você está ferido?"

1005802-167 = "Ah, sim...!"

1005802-168 = "Obrigado, irmã legal!"

1005802-169 = "Hehe, estou aliviado por você estar seguro."

1005802-170 = "[s] \"Tenha cuidado com os carros de agora em diante.\""

1005802-171 = "desculpe……."

1005802-176 = "Ah! ? O pára-choque... até o motor! ?"

1005802-178 = "Mesmo sendo um carro novo que acabou de ser entregue!"

1005802-182 = "(Eu e meu pedimos desculpas ao dono do caminhão)"

1005802-186 = "Tem um gato que não consegue descer da árvore!"

1005802-189 = "Os cidadãos estão tristes porque não conseguem marmitas pela metade do preço no supermercado! !"

1005802-193 = "Uma gangue de motoqueiros se envolve em uma briga entre o grupo de capacetes e os bandidos! ! !"

1005802-195 = "(O “resgate” do meu continuou ao longo do dia.)"

1005802-196 = "(Em algum lugar ao longo do caminho, comecei a perder a noção do que era alívio e quais eram os padrões...)"

1005802-200 = "Obrigado pelo seu trabalho duro, Sensei."

1005802-201 = "[s] \"Acho que está quase acabando...?\""

1005802-202 = "sim. Vamos acabar com o socorro da patrulha de hoje?"

1005802-206 = "……foto? Você faz algo como hoje todos os dias?"

1005802-207 = "É claro que acredito que devemos patrulhar a área todos os dias em busca de “alívio”, tanto quanto possível, mas também é verdade que há dias em que não conseguimos fazê-lo."

1005802-208 = "Olhando para trás, hoje havia mais pessoas procurando ajuda do que o habitual."

1005802-209 = "Foi difícil, mas acho bom pensar que conseguimos transmitir o espírito dos Cavaleiros Socorros ao maior número de pessoas possível."

1005802-210 = "Mais do que tudo, senti que depois de passar o dia com você..."

1005802-211 = "Você não acha que nossa respiração é perfeita?"

1005802-212 = "[s] \"U-Sim...? Sim, talvez...\""

1005802-213 = "Você também acha?"

1005802-214 = "Não há nada de errado com meus olhos."

1005802-220 = "Sensei tem um talento maravilhoso de “alívio”!"

1005802-221 = "O que você acha? #n Você gostaria de se tornar membro de nossos Cavaleiros Socorros e espalhar o espírito de alívio para mais pessoas?"

1005802-222 = "[s3] \"E-eu acho que vou me segurar por enquanto...!\"\n[s4] \"Vou apenas aceitar seus sentimentos!\""

1005802-223 = "Entendo... isso é lamentável..."

1005802-224 = "Entendo... isso é lamentável..."

1005802-225 = "No entanto, se mudar de ideia, informe-nos a qualquer momento."

1005802-226 = "Vou deixar o assento de “conselheiro” dos Cavaleiros Socorros aberto para você."

