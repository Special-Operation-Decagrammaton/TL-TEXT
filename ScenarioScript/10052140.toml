10052140-154 = "[s] \"Não vou desistir de todos.\""

10052140-155 = "Nossos pensamentos também não mudaram. #nEsse não é o assunto sempre? O seu repertório de histórias é muito pequeno? #nNo entanto, não creio que nenhum de nós tenha algum assunto específico sobre o qual gostaríamos de falar."

