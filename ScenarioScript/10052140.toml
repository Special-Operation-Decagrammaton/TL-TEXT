10052140-181 = "Sim..."

10052140-182 = "[s] \"De qualquer forma, as pessoas deveriam estudar.\""

10052140-183 = "Em primeiro lugar, não sou uma pessoa."

10052140-184 = "[s] \"Eles são apenas pessoas. Contanto que você seja sensato e tenha boas maneiras, não há diferença.\""

10052140-185 = "Parece que você está entendendo algo errado, então vou te explicar, mas todo o nosso conhecimento está programado desde o início, certo?"

10052140-186 = "...Eu não sou humano de qualquer maneira."

10052140-187 = "[s3] \"Se você acha que sabe tudo\"\n[s4] \"É a prova de que ainda há muita coisa que você não sabe!\""

10052140-191 = "É exatamente como o professor disse. Há um ditado que diz que o aprendizado nunca acaba."

