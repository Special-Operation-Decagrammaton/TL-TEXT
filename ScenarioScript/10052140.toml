10052140-165 = "Agora, vamos aprofundar um pouco mais nossa interação."

10052140-166 = "O que mais você quer que eu faça? #nNão são vocês que estariam em apuros se fizessem algo ruim e seus sentimentos mudassem?"

10052140-167 = "Ah, eu já me mudei, não é?"

10052140-168 = "Você está falando sério sobre isso? Para vocês, somos algum vilão desconhecido tentando cobrir o mundo com metal, não é?"

10052140-169 = "É como uma brincadeira de criança. #nVocê deveria ir para a escola e estudar agora."

