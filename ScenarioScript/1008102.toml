[translation]
1008102-1 = "初めてですの！"
1008102-5 = "ふふっ！ユカリ、参りました！"
1008102-6 = "[s] \"待ってたよ、ユカリ。\""
1008102-7 = "ええ！せっかく先生が「一息つこう」と仰ってくださったので……"
1008102-8 = "身共、居ても立ってもいられず……"
1008102-9 = "早速こうしてお邪魔した次第ですの！"
1008102-10 = "[s] \"そっか。いつも全力なユカリらしくていいね。\""
1008102-11 = "うふふ！常に全力で臨むこと！#nこれもまた、身共の誇れる長所の一つですの！"
1008102-12 = "ですから、今日は先生と「一息つく」ために……"
1008102-13 = "身共は全力を尽くします！"
1008102-14 = "[s1] \"本末転倒な気もするけど……。\"\n[s2] \"それなら、一緒に一息つこっか。\""
1008102-19 = "[ns] \"まずはどうしようかな。\""
1008102-20 = "何でも言ってくださいまし！"
1008102-24 = "ふふ。"
1008102-31 = "ふふふ。"
1008102-35 = "…………ふふっ？"
1008102-36 = "[s] \"えっと……ユカリ？\""
1008102-40 = "先生！「一息つく」ために、身共は何をしたら良いのでしょうか！"
1008102-44 = "[ns] \"……うん？\""
1008102-45 = "……？"
1008102-47 = "なんと！身共、勘違いしておりました！"
1008102-48 = "「一息つく」とは、特に何かをするという意味ではなかったのですね！？"
1008102-49 = "[s] \"そうだね……ちょっと休むって意味かな。\""
1008102-50 = "先生のお言葉ですから、なにか特別な意味があるのかと勘違いを……！"
1008102-51 = "これは身共のみすていくですわ！#n勝手な思い違いで、先生を困らせてしまい……"
1008102-52 = "も、申し訳ありませんっ！"
1008102-53 = "[s3] \"謝らなくて大丈夫だよ。\"\n[s4] \"それくらいユカリが頑張ってるって証拠だから。\""
1008102-56 = "一息つく。#nただ、休むためだけに……"
1008102-57 = "何も考えず、穏やかな気持ちで過ごすのですね。"
1008102-58 = "う～ん……もちろん、先生のご提案はとても嬉しいのですが……"
1008102-59 = "いざ改めてそのようにしようとすると、どこか落ち着かず……"
1008102-63 = "何かやってみたかったこと、ですか……？"
1008102-64 = "やってみたかった、こと……"
1008102-65 = "む～～～！"
1008102-66 = "すみません、やはり身共には……"
1008102-67 = "[s] \"そうだ。なら、あそこに行ってみようか。\""
1008102-68 = "……？"
1008102-71 = "（ユカリと一緒に、近くのゲームセンターに足を運んだ）"
1008102-77 = "あの、先生。ここは……？"
1008102-78 = "[s] \"ゲームセンターだよ。\""
1008102-82 = "[ns] \"こういう場所で気分転換してみたらどうかなと思って。\""
1008102-83 = "げえむ、せんたあ……？"
1008102-84 = "何だか騒がしいところですが……どこか華やかで……"
1008102-85 = "あっ！先生！何ですの、あの方は！青白い顔でふらふらしております！"
1008102-86 = "救急車を呼ばなくて良いのですか！？"
1008102-87 = "[s] \"銃を撃ってゾンビを倒すゲームだね。やってみる？\""
1008102-88 = "銃を撃って……ぞんびを倒すげーむ……？"
1008102-89 = "あ、はいっ！ぜひ！"
1008102-98 = "やっ！倒しました！次は……！"
1008102-99 = "またぞんびの方々が！？#nあっ！あの強そうな方が総大将なのでしょうか！？"
1008102-100 = "身共、負けませぬ！"
1008102-112 = "わぁっ！倒せました！"
1008102-113 = "なるほど……これがげーむというものなのですね！"
1008102-114 = "あら？"
1008102-115 = "先生先生！これは何ですの！？"
1008102-116 = "[s] \"あ、それはクレーンゲームと言って……\""
1008102-117 = "くれーんの操縦士になって、人形を誘拐するげーむ……？"
1008102-118 = "みすてりあすなげーむですわね！"
1008102-119 = "先生！身共、くれーんげーむもやってみたいです！"
1008102-125 = "（ユカリと一緒に色々なゲームで遊び、楽しい時間を過ごした）"
1008102-127 = "ふぅ～！先ほどのげーむも、すっごく面白かったですの！"
1008102-128 = "銃を撃つげーむ……左から右に進みながら敵を倒すげーむ……りずむに合わせて矢印を踏むげーむ……それに、ばいくに乗って走るげーむ！"
1008102-129 = "世の中には本当に、いろんなげーむがあるのですね！"
1008102-130 = "[s] \"気に入ってくれたかな？\""
1008102-131 = "ええ！"
1008102-132 = "普段は家に[ruby=こ]籠[/ruby]もっているか、百花繚乱の活動をしているだけですので、どれも初めてだったのですが……"
1008102-133 = "なるほど……他の皆様は「一息つく」ときに、こういったことをして楽しんでいるのですね。"
1008102-134 = "身共、とっても気に入りましたの！"
1008102-135 = "[s] \"一息つけたみたいで良かったよ。\""
1008102-136 = "はい！"
1008102-137 = "で、ですが、身共がこうして楽しむことができたのは……"
1008102-138 = "……身共のために、こうして先生が……"
1008102-139 = "[s] \"……ん？何か言った？\""
1008102-140 = "いっ、いえ！何でもないですの！"
1008102-141 = "さあ！今度はあちらのげーむを……！"
1008102-143 = "（その後もユカリと様々なゲームで遊び、気分転換をした）"
