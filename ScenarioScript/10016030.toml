[translation]
10016030-1 = "Episódio 3: A Corrida de Objetos Caótica"
10016030-2 = "Olá a todos que estão assistindo ao Canal Chronos! Como vocês estão?"
10016030-3 = "As competições começaram e o clima está ficando agitado em todos os lugares. #nEstão se divertindo?"
10016030-4 = "Claro, não tem problema nenhum se você não pôde vir ao local."
10016030-5 = "No Canal Chronos, trazemos imagens cheias de realismo, como se você estivesse assistindo bem na sua frente, então não se esqueça de se inscrever no canal!"
10016030-6 = "Bem, no local, as provas individuais da manhã terminaram e #nas classificações por escola estão sendo atualizadas uma após a outra."
10016030-7 = "O atual primeiro lugar no ranking é..."
10016030-8 = "A Academia Gehenna!"
10016030-9 = "Quem poderia prever que Gehenna superaria não apenas Millennium, mas também Trinity! O Grande Festival Esportivo deste ano está cheio de presságios de caos!"
10016030-10 = "Pelo visto, os atletas da Academia Gehenna tiveram um desempenho excelente na 'Competição de Comilões' realizada pouco antes do intervalo de almoço, o que alterou o ranking."
10016030-11 = "De acordo com os registros, as atletas Akari Wanibuchi e Izumi Shishidou, do Clube de Pesquisa Gastronômica, tiveram um desempenho incrível!"
10016030-12 = "Sim. A atleta Akari Wanibuchi conquistou o 1º lugar com uma grande vantagem na categoria 'Wanko Soba', onde foi utilizada uma máquina automática de Wanko Soba de última geração, devorando tudo com uma velocidade assustadora!"
10016030-13 = "Como a máquina automática não conseguiu acompanhar a velocidade de consumo da Akari e acabou quebrando, o estabelecimento de um novo recorde ainda está pendente, mas..."
10016030-14 = "Além disso, na 'Corrida de Beber Soda de Pepino-do-mar', as outras alunas além da Izumi ficaram nauseadas e desmaiaram, fazendo com que a partida fosse interrompida por um tempo..."
10016030-19 = "Opa... sim, sim... entendi. #nRecebemos uma reclamação sobre as imagens por causa do horário das refeições."
10016030-20 = "Mas as imagens chocantes das alunas de cada escola desmaiando uma após a outra são, #natualmente, o vídeo mais popular do 'Canal Chronos' com mais 'curtidas'—"
10016030-25 = "Tsc... entendi, eu entendi."
10016030-26 = "Bem, vamos para um intervalo comercial. Não saiam do canal!"
10016030-27 = "Ainda temos muitas partidas pela frente! Não percam os momentos milagrosos!"
10016030-29 = "Ah... quem diria que a diferença na pontuação ficaria tão grande..."
10016030-30 = "Eu tentei me concentrar na organização e não me envolver nas partidas, mas... #nnão posso deixar isso passar em branco."
10016030-31 = "Para subir a pontuação, mesmo que um pouco..."
10016030-32 = "Eu também preciso participar das partidas...!"
