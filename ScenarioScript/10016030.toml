[translation]
10016030-1 = "第3話;波乱の借り物競争"
10016030-2 = "クロノスチャンネルをご視聴中の皆さん！いかがお過ごしでしょうか？"
10016030-3 = "競技が始まり、各所で盛り上がりを見せ始めております。#n皆さん楽しめているでしょうか？"
10016030-4 = "もちろん、会場に来れなかったとしても全く問題ありません。"
10016030-5 = "クロノスチャンネルでは、まるで目の前で観戦しているかのような臨場感あふれる映像をお届けしておりますので、チャンネル登録の方もお願いしますね！"
10016030-6 = "さて、会場では現在、午前の個人種目が終了し#n学園別の順位が続々と更新されております。"
10016030-7 = "現在のランキング1位は……"
10016030-8 = "ゲヘナ学園です！"
10016030-9 = "ゲヘナがミレニアムはおろか、トリニティをも圧倒しているなんて誰が予想できたでしょうか！今年の大運動会は波乱の予感に満ちています！"
10016030-10 = "どうやら、昼休み直前に行われた「大食い大会」でゲヘナ学園の選手が優秀な成績を収め、順位が変動したようですね。"
10016030-11 = "記録によると、美食研究会の[ruby=わにぶち]鰐渕[/ruby]アカリ選手と[ruby=ししどう]獅子堂[/ruby]イズミ選手が大活躍したみたいですね！"
10016030-12 = "はい。鰐渕アカリ選手は最新型の自動わんこそば製造機が使用された「わんこそば」部門において、驚異的なスピードでわんこそばをたいらげ、大差をつけて1位を獲得しています！"
10016030-13 = "自動わんこそば製造機がアカリ選手の食べる速度に追いつけず故障してしまったため、新記録樹立はまだ未定ですが……"
10016030-14 = "その他、「なまこソーダ飲み競争」では、イズミ選手以外の生徒が吐き気を催して倒れてしまったため、しばらく試合が中断されることも……"
10016030-19 = "おっと……はい、はい……ええ、分かりました。#nただいま、食事時のため、映像に対してクレームが入りました。"
10016030-20 = "ですが、各学園の生徒が次々と倒れていく衝撃的な映像は、#n現在「クロノスチャンネル」で最も「いいね」を獲得している人気の動画で――"
10016030-25 = "ちっ……分かりました、分かりましたよ。"
10016030-26 = "それでは一旦CM入ります。チャンネルはそのままで！"
10016030-27 = "まだまだ試合はありますからねー！奇跡の瞬間をお見逃しなく！"
10016030-29 = "はぁ……まさかこんなに順位差が広がるなんて……"
10016030-30 = "なるべく運営に集中して、試合には関与しないようにしていたけど……#nこのまま見過ごすわけにはいかないわ。"
10016030-31 = "順位を少しでもあげるには……"
10016030-32 = "私も試合に参加しないと……！"
