[translation]
10021016-3 = "――Já se passaram 75 dias desde que o \"Sensei [USERNAME] do Schale\" entrou em estado crítico."
10021016-4 = "Desde aquele incidente, no prédio destruído do \"Schale\"――inúmeras discussões sobre a possibilidade de reanimação foram realizadas――e cada profissional de saúde――"
10021016-5 = "Por outro lado, em Kivotos, eventos estranhos estão――"
10021016-12 = "Cheguei..."
10021016-16 = "……"
10021016-17 = "……Ainda tem tanta dívida assim……"
10021016-18 = "Não pode ser…… Eu preciso me esforçar……"
10021016-19 = "Mesmo sozinha…… eu preciso me esforçar……"
10021016-24 = "……"
10021016-40 = "……Sensei,"
10021016-41 = "Eu……"
10021016-42 = "O que eu deveria fazer……!"
10021016-46 = "――U-uma notícia urgente!!"
10021016-54 = "Hoje, 100 dias após o \"Sensei\" não recuperar a consciência――houve um anúncio de emergência do hospital――"
10021016-55 = "A opinião pública sobre este assunto――"
10021016-58 = "Os profissionais médicos determinaram que não há esperança de recuperação para o Sensei [USERNAME]――a reanimação é impossível――"
10021016-59 = "Que qualquer tratamento de suporte à vida adicional é inútil――"
10021016-60 = "Ah, recebemos uma notícia urgente agora! Atualmente em Kivotos――"
10021016-64 = "(……É, chega. Já deu.)"
10021016-65 = "(Não preciso mais…… me esforçar.)"
10021016-70 = "(Ah, o cachecol……)"
10021016-71 = "Ah…… entendi."
10021016-72 = "……É isso."
10021016-78 = "(Não consigo ver nada à frente……)"
10021016-79 = "(Será porque perdi muito sangue……? Por não ter tratado os ferimentos e não comer há dias?――Ou será que……)"
10021016-80 = "(Desse jeito, eu……)"
10021016-87 = "(Eu vou…… acabar assim.)"
10021016-88 = "(……Entendi.)"
10021016-89 = "(Não preciso mais sofrer……)"
10021016-90 = "(Que bom……)"
10021016-91 = "(Mas, se é assim…… por que……)"
10021016-92 = "(……Sensei,)"
10021016-93 = "(Eu……)"
10021016-94 = "(Por que eu existi aqui?)"
10021016-95 = "(……)"
10021016-98 = "(……)"
10021016-99 = "(……Entendi.)"
10021016-100 = "(Eu…… e todos os outros,)"
10021016-101 = "……nascemos apenas para sofrer."
10021016-110 = "……?"
10021016-112 = "O \"Cromatismo\" finalmente entrou em contato com o deus da morte――"
10021016-113 = "Não sei se guiar o \"Cromatismo\" trará \"sofrimento\" ou \"morte\"――#nMas, este é o fim."
10021016-114 = "Agora podemos banir os \"Deuses Esquecidos\" deste mundo…… podemos trazer o fim para este mundo."
10021016-116 = "Finalmente, eles seguirão o mesmo destino que nós."
10021016-117 = "Como os \"Deuses Sem Nome\", que não são chamados por não terem nome e não existem por não poderem ser chamados, vocês também caminharão para o mesmo desfecho."
10021016-118 = "Houve muitos perigos, mas foi uma sorte ter conseguido atrair o Cromatismo."
10021016-120 = "O sacerdote possui o \"Sublime\" justamente por adorar o deus."
10021016-121 = "Aqui, recebam um novo \"Sublime\"――e tomem posse dele."
10021016-122 = "O deus da morte que guia todas as vidas para \"outro lugar\"――"
10021016-130 = "\"Anúbis\"."
10021016-132 = "A partir de agora, você irá cobrir este mundo com o seu próprio 'medo', manifestado pelo 'Cromatismo'."
10021016-133 = "Até lá — nem a morte... nem o descanso, lhe serão permitidos."
10021016-134 = "Até que você se torne o 'Guia do Cromatismo' e reduza toda a existência ao nada."
10021016-136 = "Até que todos os 'deuses esquecidos' de todos os tempos e espaços desapareçam —"
10021016-140 = "Aaaaaaaahhhhhhh!!"
10021016-141 = "O-o que é aquilo!!"
10021016-142 = "N-não, aaaaaahhhhh —!!!"
10021016-146 = "Uaaaaaaahhhhhhh!!"
10021016-152 = "[ns] Abre os olhos."
10021016-156 = "[ns] Levanta o corpo."
10021016-159 = "[ns1] (Não consigo mover a boca direito)\n[ns2] (Não consigo ver bem à frente)\n[ns3] (Meu corpo está estranhamente pesado)"
10021016-163 = "[ns] Remove os aparelhos presos ao corpo."
10021016-165 = "......Sensei [USERNAME]!? M-mas como..."
10021016-166 = "Você, além de não conseguir mover um dedo, era desesperador que pudesse recuperar a consciência —"
10021016-167 = "[s] Abre a boca."
10021016-168 = "A-agora, abrir a boca também deve ser difícil... p-por favor, não toque no rosto, a placa é o que mantém tudo no lugar —"
10021016-169 = "Droga...! Mais importante, fuja agora mesmo —"
10021016-173 = "Aaaaaaaahhhhh! F-fujam!!"
10021016-177 = "[ns] Pega a Caixa de Shittim ao lado da cama e os itens importantes."
10021016-179 = "[ns] Liga a Caixa de Shittim."
10021016-181 = "......Autenticação biométrica concluída. Sensei [USERNAME] confirmado."
10021016-182 = "Suas ordens, Sensei."
10021016-183 = "[s] Transmite o que deve ser feito."
10021016-184 = "......Ordem confirmada."
10021016-185 = "Entendido. De agora em diante, eu, A.R.O.N.A, serei seus olhos, seus ouvidos e seus pés."
10021016-186 = "Por aqui, Sensei."
10021016-188 = "Oh, o mestre da 'Caixa' está se aproximando...!!"
10021016-189 = "Aquele ali, não tinha 'acabado'?#nO deus da morte consegue... enfrentar aquele ali — aquela caixa?"
10021016-190 = "Mas as habilidades dele também têm limites. Não há muito o que se possa fazer com um corpo incompleto."
10021016-192 = "Sim. Primeiro a caixa... devemos destruir a caixa."
10021016-193 = "Devemos impedi-lo para que ele não possa realizar milagres."
10021016-195 = "Se não fosse por aquilo, ele não seria mais nada."
10021016-205 = "Não há mais como proteger o Sensei."
10021016-206 = "Sensei [USERNAME]."
10021016-212 = "Com isso..."
10021016-213 = "Com isso, tudo... deveria acabar."
10021016-220 = "......"
10021016-221 = "Não... eu,"
10021016-222 = "Eu não... consigo."
10021016-224 = "[ns4] (O tiro errou, mas...)\n[ns5] (Mais do que isso, meu corpo...)"
10021016-230 = "Sensei, me desculpe... por minha causa,"
10021016-231 = "Por eu ter errado..."
10021016-232 = "......Porque eu... estou viva..."
10021016-235 = "I... isso é..."
10021016-238 = "O Cromatismo... o Sensei...?"
10021016-239 = "N-não............"
10021016-240 = "P-pare... de..."
10021016-241 = "Nã... não não não não não não não..."
10021016-242 = "Profe... ssor..."
10021016-243 = "Por minha... causa... não pode ser..."
10021016-244 = "Ah... ah... aaaaaaaaah..."
10021016-249 = "Nãããããããããããããããão――――！！！！！！"
10021016-253 = "Isso é...!!"
10021016-254 = "O, o Plana-pates está se levantando, Sensei!!"
10021016-261 = "Ainda resta tanto poder assim..."
10021016-262 = "Toda a energia da 'Arca de Atra-Hasis'... está se concentrando no Plana-pates!"
10021016-263 = "Sensei! Precisamos parar o Plana-pates...!!"
10021016-264 = "O 'Shittim Chest' do Plana-pates está inativo no momento!#nSe for para neutralizá-lo, é agora!"
