[translation]
10021016-3 = "――「シャーレの[USERNAME]先生」が重体になってから、75日が経過しました。"
10021016-4 = "あの事件以降、破壊された「シャーレ」の建物では――蘇生の可能性について数々の議論が行なわれ――各医療従事者は――"
10021016-5 = "一方、キヴォトスでは奇妙な事件が――"
10021016-12 = "ただいま……。"
10021016-16 = "……。"
10021016-17 = "……まだこんなに、借金が……"
10021016-18 = "だめ……私が、頑張らないと……"
10021016-19 = "一人でも……がんばらないと……"
10021016-24 = "……。"
10021016-40 = "……先生、"
10021016-41 = "私……"
10021016-42 = "私は、どうしたら……！"
10021016-46 = "――そ、速報です！！"
10021016-54 = "「先生」の意識が戻らなくなってから、100日が経過した本日――病院より緊急発表がありました――"
10021016-55 = "世論はこの事に関して――"
10021016-58 = "医療関係者は[USERNAME]先生の回復は見込めないと判断――蘇生は不可能と――"
10021016-59 = "これ以上の延命治療は無意味であると――"
10021016-60 = "あっ、今速報が入りました！現在キヴォトスの――"
10021016-64 = "（……うん。もう、いいや）"
10021016-65 = "（もう……がんばらなくて、いい）"
10021016-70 = "（あ、マフラー……）"
10021016-71 = "ああ……そっか。"
10021016-72 = "……そう。"
10021016-78 = "（前が、よく見えない……）"
10021016-79 = "（血を流し過ぎて……？傷の手当もせず、何日も、食べてないから？――それとも……）"
10021016-80 = "（このままじゃ、私……）"
10021016-87 = "（私、こうやって……終わるんだ）"
10021016-88 = "（……そっか）"
10021016-89 = "（もう、苦しまなくていいんだ……）"
10021016-90 = "（よかった……）"
10021016-91 = "（でも、それなら……どうして……）"
10021016-92 = "（……先生、）"
10021016-93 = "（私は……）"
10021016-94 = "（どうして、ここに[ruby=うまれ]存在[/ruby]したんだろう）"
10021016-95 = "（……）"
10021016-98 = "（……）"
10021016-99 = "（……そっか）"
10021016-100 = "（私も……みんなも、）"
10021016-101 = "……苦しむために、生まれてきたんだ。"
10021016-110 = "……？"
10021016-112 = "「色彩」が、ついに[ruby=アヌビス]死の神[/ruby]と接触した――"
10021016-113 = "「色彩」を導いたことが、「苦しみ」なのか「死」をもたらすのかは分からぬ――#nだが、これで最後｡"
10021016-114 = "「忘れられた神々」をこの世界から追放できるようになった……この世界に、終焉を呼び寄せられるのだ。"
10021016-116 = "ようやく、彼らは我々と同じ運命を辿る。"
10021016-117 = "名が無いために呼ばれず、呼ぶことができないが故に存在しない「名もなき神」のように、お前たちも同じ結末へと向かうだろう。"
10021016-118 = "数多の危険があったが、色彩を引き寄せられたのは僥倖だった。"
10021016-120 = "司祭は神を崇めるがゆえ、「崇高」を所有できる。"
10021016-121 = "ここに新たな「崇高」を迎え――手に入れるのだ。"
10021016-122 = "すべての命を「[ruby=あのよ]別の場所[/ruby]」に導く死の神――"
10021016-130 = "「アヌビス」を。"
10021016-132 = "これからお前は「色彩」によって顕現した己の「恐怖」で、この世界を塗りつぶしていくだろう。"
10021016-133 = "それまで――死も……安息も、許されぬ。"
10021016-134 = "「色彩の[ruby=きょうどうしゃ]嚮導者[/ruby]」と成り、あらゆる存在を無に帰すまで。"
10021016-136 = "すべての時空の「忘れられた神々」が消滅するまで――"
10021016-140 = "うあぁぁぁあああああ！！"
10021016-141 = "な、何だアレは！！"
10021016-142 = "い、いやぁぁぁあああ――！！！"
10021016-146 = "うわぁぁぁあああああ！！"
10021016-152 = "[ns] 目を開ける。"
10021016-156 = "[ns] 身体を起こす。"
10021016-159 = "[ns1] （うまく口が動かない）\n[ns2] （前がよく見えない）\n[ns3] （身体がなんだか重い）"
10021016-163 = "[ns] 身体についている装置を外す。"
10021016-165 = "……[USERNAME]先生！？い、一体……"
10021016-166 = "あなたは、指一本動かすどころか、意識を取り戻すことだって絶望的な――"
10021016-167 = "[s] 口を開く。"
10021016-168 = "い、今は口を開くことも難しいでしょう……か、顔には触れないでください、プレートでようやく――"
10021016-169 = "ハッ……！それよりも、今すぐ逃げてください――"
10021016-173 = "うわぁぁああああ！に、逃げろ！！"
10021016-177 = "[ns] ベッド横のシッテムの箱と、大事な物を手に取る。"
10021016-179 = "[ns] シッテムの箱の電源を入れる。"
10021016-181 = "……生体認証完了。[USERNAME]先生を確認。"
10021016-182 = "ご命令を、先生。"
10021016-183 = "[s] やるべきことを伝える。"
10021016-184 = "……命令を確認。"
10021016-185 = "分かりました。これより私A.R.O.N.Aが先生の目と耳、そして足になります。"
10021016-186 = "こちらです、先生。"
10021016-188 = "おお、「箱」[ruby=あるじ]の主が[/ruby]近づいている……！！"
10021016-189 = "あの者は、「終わった」のでは？#n死の神はあの者を――あの箱を、相手できるのか？"
10021016-190 = "だが、あの者の能力にも限界がある。不完全な身体でできることはそう多くない。"
10021016-192 = "ああ。まずは箱……箱を壊すべきだ。"
10021016-193 = "あの者が奇跡を起こせぬよう、阻止せねば。"
10021016-195 = "アレさえ無ければ、あの者はもはや何者でもない。"
10021016-205 = "もう、先生を守る方法は無い。"
10021016-206 = "[USERNAME]先生。"
10021016-212 = "これで……"
10021016-213 = "これで、全部……終わるはずだから。"
10021016-220 = "……。"
10021016-221 = "だめ……私、"
10021016-222 = "私には……できない。"
10021016-224 = "[ns4] （銃弾は外れたけど……）\n[ns5] （これ以上は、からだが……）"
10021016-230 = "先生、ごめんなさい……私のせいで、"
10021016-231 = "私が間違ったせいで……"
10021016-232 = "……わたし、が、いきて、いるから……"
10021016-235 = "こ……これは……"
10021016-238 = "色彩が……先生を……？"
10021016-239 = "い、イヤ…………"
10021016-240 = "や、やめ……ろ……"
10021016-241 = "ヤ……ヤダヤダヤダヤダヤダヤダ……"
10021016-242 = "せん、せ…………"
10021016-243 = "わたし、の、せいで……そん、な……"
10021016-244 = "あ……ああ……あああぁあああああああ……"
10021016-249 = "いやぁぁぁああああああああぁっ――――！！！！！！"
10021016-253 = "これは……！！"
10021016-254 = "ぷ、プレナパテスが立ち上がります先生！！"
10021016-261 = "まだ、こんな力が……。"
10021016-262 = "「アトラ・ハシースの箱舟」の全エネルギーが……プレナパテスに、集中しています！"
10021016-263 = "先生！プレナパテスを止めないと……！！"
10021016-264 = "現在プレナパテスの「シッテムの箱」はダウンした状態です！#n無力化するなら、今です！"
