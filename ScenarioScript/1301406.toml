[translation]
1301406-1 = "水着と青春"
1301406-6 = "（海岸に着くと、レンゲが私を待っていた）"
1301406-11 = "あ、こっちこっち。"
1301406-12 = "来てくれてありがとう。"
1301406-13 = "海岸でやってみたい青春活動があってさ。"
1301406-14 = "……なんだと思う？"
1301406-15 = "[s1] \"手を繋いで海岸を散歩？\"\n[s2] \"月明かりが照らす海を眺める？\""
1301406-20 = "も、もちろん、そういうのもいつかはやってみたい……！"
1301406-21 = "でも、今一番やりたいのは……。"
1301406-22 = "なんといっても……。"
1301406-28 = "花火だ！"
1301406-34 = "[wa:1650]― [log=렌게 수영복]青春って、[wa:1220]あっという間なんだよな。[/log]"
1301406-37 = "― [log=렌게 수영복]激しく燃え上がって、[wa:1300]すぐに消えちゃう……[/log]"
1301406-39 = "― [log=렌게 수영복]この炎みたいに。[/log]"
1301406-42 = "[wa:1200]― [log=렌게 수영복]アタシも、[wa:1300]ずっとそう思ってた。[/log]"
1301406-45 = "― [log=렌게 수영복]……鍛錬だけで、[wa:1000]青春が終わっちゃうんだろうなっ[wa:1660]て。[/log]"
1301406-48 = "[wa:560]― [log=렌게 수영복]でも、[wa:1850]今は違う。[/log]"
1301406-50 = "― [log=렌게 수영복]師匠と出会って[wa:900]変わったんだ。[/log]"
1301406-53 = "― [log=렌게 수영복]毎日が楽しくて、[wa:1700]充実してる。[/log]"
1301406-56 = "[wa:800]― [log=렌게 수영복]もちろん、[wa:750]時間は戻らないけど……。[/log]"
1301406-59 = "― [log=렌게 수영복]これからだって、[/log]"
1301406-61 = "― [log=렌게 수영복]まだまだ青春できる。[/log]"
1301406-64 = "[wa:1400]― [log=렌게 수영복]炎が消えそうなら、[/log]"
1301406-66 = "[wa:500]― [log=렌게 수영복]新しい薪を[wa:750]くべてやればいいんだ。[/log]"
1301406-69 = "[wa:2450]― [log=렌게 수영복]だから[wa:900]師匠……[/log]"
1301406-72 = "― [log=렌게 수영복]ずっと一緒に[wa:1200]青春してくれる……[wa:2020]よな？[/log]"
1301406-76 = "ははっ！柄じゃなかったかな。"
1301406-77 = "でも、キャンプファイヤーでやりすぎちゃっただろう？"
1301406-78 = "青春の炎は燃え上がれば燃え上がるほどいいと思ってたけど……そんなこともなかった。"
1301406-79 = "だから今回は、小さい炎で、静かに楽しめたらなって……ほら。"
1301406-80 = "[s] \"お……線香花火、たくさん持ってきたんだ。\""
1301406-81 = "うん、パチパチ光るのを眺めながら、ゆっくり過ごしたくて。"
1301406-82 = "海岸だから、火事になる心配もないよ。"
1301406-83 = "[s3] \"ちょうど、人通りも少ないもんね。\"\n[s4] \"夜の海もたっぷり楽しめそう！\""
1301406-88 = "そ、そうだよね？青春活動だから、師匠も付き合ってくれ。"
1301406-96 = "ほら……一緒に火をつけよう。"
1301406-100 = "（……その後もしばらく、レンゲと二人だけの海岸で花火を楽しんだ）"
1301406-102 = "（まさに充実の青春活動だった）"
