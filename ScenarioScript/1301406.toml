[translation]
1301406-1 = "Roupa de banho e juventude"
1301406-6 = "（Ao chegar na praia, Renge estava me esperando）"
1301406-11 = "Ah, aqui, por aqui."
1301406-12 = "Obrigado por vir."
1301406-13 = "Tem uma atividade de juventude que eu queria muito fazer na praia."
1301406-14 = "……O que você acha que é?"
1301406-15 = "[s1] \"Andar de mãos dadas pela praia?\"\n[s2] \"Observar o mar iluminado pelo luar?\""
1301406-20 = "I-Isso também, claro que eu gostaria de fazer um dia……!"
1301406-21 = "Mas, o que eu mais quero fazer agora é……."
1301406-22 = "Sem dúvida nenhuma……."
1301406-28 = "Fogos de artifício!"
1301406-34 = "[wa:1650]― [log=렌게 수영복]A juventude, [wa:1220] passa num piscar de olhos, né.[/log]"
1301406-37 = "― [log=렌게 수영복]Queima intensamente, [wa:1300] e logo se apaga……[/log]"
1301406-39 = "― [log=렌게 수영복]Como essa chama aqui.[/log]"
1301406-42 = "[wa:1200]― [log=렌게 수영복]Eu também, [wa:1300] sempre pensei assim.[/log]"
1301406-45 = "― [log=렌게 수영복]……Que a minha juventude acabaria, [wa:1000] apenas com o treinamento. [wa:1660][/log]"
1301406-48 = "[wa:560]― [log=렌게 수영복]Mas, [wa:1850] agora é diferente.[/log]"
1301406-50 = "― [log=렌게 수영복]Depois que conheci o mestre, [wa:900] tudo mudou.[/log]"
1301406-53 = "― [log=렌게 수영복]Cada dia é divertido, [wa:1700] e gratificante.[/log]"
1301406-56 = "[wa:800]― [log=렌게 수영복]Claro, [wa:750] o tempo não volta atrás, mas…….[/log]"
1301406-59 = "― [log=렌게 수영복]Daqui para frente também,[/log]"
1301406-61 = "― [log=렌게 수영복]ainda dá para viver a juventude.[/log]"
1301406-64 = "[wa:1400]― [log=렌게 수영복]Se a chama estiver quase apagando,[/log]"
1301406-66 = "[wa:500]― [log=렌게 수영복]é só colocar [wa:750] lenha nova nela.[/log]"
1301406-69 = "[wa:2450]― [log=렌게 수영복]Por isso, [wa:900] mestre……[/log]"
1301406-72 = "― [log=렌게 수영복]Você vai viver essa juventude [wa:1200] comigo para sempre…… [wa:2020] né?[/log]"
1301406-76 = "Haha! Acho que isso não combina muito comigo."
1301406-77 = "Mas, a gente exagerou um pouco na fogueira, não acha?"
1301406-78 = "Eu achava que quanto mais a chama da juventude queimasse, melhor... mas não era bem assim."
1301406-79 = "Por isso, desta vez, queria aproveitar calmamente com uma chama pequena…… olha só."
1301406-80 = "[s] \"Ah…… você trouxe vários fogos de artifício de mão (senko hanabi).\""
1301406-81 = "Sim, queria passar o tempo devagar, observando as faíscas brilharem."
1301406-82 = "Como estamos na praia, não tem perigo de causar um incêndio."
1301406-83 = "[s3] \"E não tem quase ninguém por aqui também.\"\n[s4] \"Dá para aproveitar bastante o mar à noite!\""
1301406-88 = "N-Não é? Como é uma atividade de juventude, mestre, me acompanhe."
1301406-96 = "Vamos…… acender juntos."
1301406-100 = "（……Depois disso, passamos um tempo aproveitando os fogos na praia, só nós dois）"
1301406-102 = "（Foi uma atividade de juventude verdadeiramente gratificante）"
