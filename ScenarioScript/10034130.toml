[translation]
10034130-1 = "5 dias atrás: Guppa-jasu?"
10034130-3 = "Hmm... eu sinto que estou tocando direito."
10034130-4 = "Será que o meu jeito de segurar está estranho...?"
10034130-6 = "Que tal formarmos duplas e checarmos a postura uma da outra?"
10034130-7 = "É difícil tocar enquanto se olha no espelho."
10034130-8 = "Às vezes você diz coisas úteis. Então, vamos de Guppa-jasu, pode ser?"
10034130-14 = "...?"
10034130-15 = "Guppa...?"
10034130-16 = "Jasu...?"
10034130-20 = "...Hã."
10034130-24 = "...Pfft."
10034130-25 = "...Ku, kuku... kufufufufu...!"
10034130-27 = "...Não sabia que isso tinha tanta graça para a Kazusa."
10034130-28 = "Ka, Kazusa-chan..."
10034130-30 = "Gu...! O que foi? Era assim que a gente fazia lá em casa! Algum problema!?"
10034130-31 = "Fufu... fuffufu... ah, ri demais... haa, desculpa, desculpa."
10034130-32 = "Mas normalmente não se diz 'vamos dividir no pedra-papel-tesoura'?"
10034130-33 = "Isso é diferença regional, não sei nada sobre 'normal'!!"
10034130-34 = "E-eu acho fofo! O da Yoshimi também!"
10034130-35 = "Então, vamos começar logo... do 'jeito da Yoshimi'."
10034130-36 = "Aaaah, chega!!"
10034130-38 = "Então, lá vai. Guppa... não, como era mesmo?"
10034130-39 = "Já disse que pode ser assim!!!"
10034130-41 = "Vamos dividir no pedra-papel-tesoura!!"
