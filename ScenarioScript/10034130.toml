[translation]
10034130-1 = "5日前：グッパージャス？"
10034130-3 = "んー……ちゃんと弾けてるつもりなんだけど。"
10034130-4 = "もしかしたら私、持ち方が変だったり……？"
10034130-6 = "なら二人組を作って、お互いの姿勢をチェックしてみるのはどう？"
10034130-7 = "自分で鏡を見ながら演奏するのも難しいし。"
10034130-8 = "偶には良いこと言うじゃない。それじゃ、グッパージャスでいいわね？"
10034130-14 = "……？"
10034130-15 = "グッパー……？"
10034130-16 = "ジャス……？"
10034130-20 = "……え。"
10034130-24 = "……ぷっ。"
10034130-25 = "……くっ、くくっ……くふふふふっ……！"
10034130-27 = "……そこまでカズサのツボに入ったとは。"
10034130-28 = "か、カズサちゃん……。"
10034130-30 = "ぐっ……！何よ、うちではこうだったの！悪い！？"
10034130-31 = "ふふっ……ふっふふっ……あー、めっちゃ笑った……はぁ、ごめんごめん。"
10034130-32 = "でも普通、「ぐっとっぱーで分かれましょ」じゃない？"
10034130-33 = "いや地域差でしょ、普通とか知らないわよ！！"
10034130-34 = "わ、私は可愛いと思うよ！ヨシミちゃんのも！"
10034130-35 = "じゃあ、そろそろ始めよっか……「ヨシミ流」で。"
10034130-36 = "あああもうっ！！"
10034130-38 = "それじゃ、いくよ。ぐっとっぱー……じゃなくて何だっけ？"
10034130-39 = "もうそれで良いってば！！！"
10034130-41 = "ぐっとっぱーで分かれましょ！！"
