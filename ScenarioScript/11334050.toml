[translation]
11334050-1 = "#N-04"
11334050-3 = "...Eu me pergunto quanto tempo poderemos durar assim."
11334050-4 = "Afinal, por favor, tire algumas fotos――"
11334050-8 = "...Eca."
11334050-9 = "Se você se absorver apenas pela fotografia e esquecer o dia a dia, estará colocando a carroça na frente dos bois."
11334050-10 = "Você só precisa de algumas fotos..."
11334050-11 = "...Grave este momento na sua memória."
