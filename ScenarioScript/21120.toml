[translation]#[Texto Final , mas eventualmente pode haver alterações na formatação de texto. - Filipe 29/06.]
21120-1 = "Episódio 12: Em Busca do \"Espelho\"."
21120-2 = "Millennium · Veritas"
21120-3 = "Sobre os \"dados\" que vocês encomendaram,\nsaiu o resultado."
21120-4 = "É-é agora……!"
21120-5 = "Coração disparado……"
21120-6 = "Como vocês sabem, nós da \"Veritas\" nos orgulhamos\nde ser o melhor grupo de hackers de Kivotos."
21120-7 = "Em recuperação de sistemas e dados, já resolvemos\ntanto caso que nem dá pra contar……"
21120-8 = "Dito isso, vou ser direta."
21120-9 = "(Engole em seco……)"
21120-11 = "Momoi, ressuscitar o dado de save\ndo seu jogo é impossível."
21120-13 = "Buááááá! Já era, acabouuu!"
21120-14 = "Não é isso!? E a quebra da senha da G.Bible,\ncomo é que ficou!?"
21120-15 = "Isso a Maki tá resolvendo agora."
21120-16 = "A Maki?"
21120-17 = "Ah, bom dia, Mido!"
21120-18 = "Você veio, valeu mesmo."
21120-19 = "Uuh, o meu dado de save, o cristal\ndas minhas lágrimas e do meu suor……!"
21120-20 = "Por que a Momo tá chorando tanto assim?"
21120-21 = "Não liga, tá tudo bem…… mais importante,\ne a G.Bible, como ficou?"
21120-22 = "Sim, deu pra analisar direitinho. Aquilo é o manual\nde jogo divino feito pelo tal lendário desenvolvedor\nde jogos…… é a G.Bible, sem dúvida nenhuma."
21120-23 = "E-então era isso mesmo!"
21120-24 = "Pela data de criação do arquivo, pela última data\nde transferência e pelo formato, é certeza. Sobre\nquem criou também: bateu com o IP do tal lendário\ndesenvolvedor. E esse dado só tem registro de ter\nsido transferido uma única vez até hoje."
21120-25 = "Quer dizer que……"
21120-26 = "Sim, deve ser a \"G.Bible\" original."
21120-28 = "Q-que demais!!"
21120-29 = "Mas tem um problema…… a senha do arquivo\neu ainda não consegui decifrar."
21120-30 = "Heein, então no fim a gente não vai conseguir\nver!? Que decepção!"
21120-31 = "Uh! É que eu sou cracker, não sou hacker\ndo bem, sabe…… enfim!"
21120-32 = "Mesmo assim, não é que não exista um jeito."
21120-33 = "Ah, é?"
21120-34 = "Decifrar diretamente a senha daquele arquivo é,\nprovavelmente, quase impossível. Mas, remover o\narquivo de segurança e copiar tudo inteiro……\nesse método, esse acho que dá pra fazer……"
21120-35 = "E, pra isso, é preciso uma ferramenta chamada\nOptimus Mirror System…… apelidada de \"Espelho\"."
21120-36 = "N-não tô conseguindo acompanhar nada……"
21120-37 = "Ou seja…… pra ver a G.Bible, precisa desse\nprograma, o \"Espelho\", é isso? E onde ele fica?"
21120-38 = "A gente, da Veritas, tinha…… ele."
21120-39 = "Ué, então é só agora mesmo…… hã, peraí?\nPassado!?"
21120-40 = "……É, agora a gente não tem mais. O Conselho\nconfiscou, aff!"
21120-41 = "Outro dia a Yuuka entrou aqui de supetão e disse:\n\"é proibido possuir equipamento de uso ilícito\"."
21120-43 = "Levaram o \"Espelho\" e um monte de outras\ncoisas também…… até o meu grampo de escuta."
21120-44 = "Esse \"Espelho\"…… é uma coisa\ntão perigosa assim?"
21120-47 = "Que nada. É só uma ferramenta otimizada\npra abrir sistemas criptografados."
21120-48 = "Só que…… é uma ferramenta de hacking única no\nmundo, feita pelas próprias mãos da nossa presidente."
21120-49 = "Presidente, no caso……\né a Himari?"
21120-50 = "Himari……?"
21120-51 = "A Aris ainda não conheceu, né. É a presidente da\nVeritas. Ela tem uma deficiência e anda de cadeira\nde rodas, então, se você a vir, vai reconhecer na hora."
21120-52 = "Ela é incrível. Tem a questão do corpo, mas pessoa\nque por isso sinta pena ou menospreze ela, pelo menos\naqui na Millennium, não existe. Uma gênia…… seria a\npalavra. Ela tem um título que, na história da\nMillennium, só três pessoas receberam: a \"Onisciência\"."
21120-53 = "É, ela é incrível mesmo…… mas, isso à parte: o\nequipamento que essa veterana fez com tanto esforço,\npor que foi confiscado?"
21120-54 = "……Eu só queria verificar as mensagens do celular\ndo Sensei. E, pra isso, eu precisava do \"Espelho\"……"
21120-55 = "Intenção impura, eu não tinha a menor."
21120-56 = "Eu só consigo sentir intenção impura nisso aí……"
21120-59 = "Buááá! Se a gente não achar o \"Espelho\" logo,\na presidente vai brigar comigo!!"
21120-60 = "Enfim…… organizando: nós também\nqueremos o \"Espelho\" de volta."
21120-61 = "E, pra quebrar a senha da G.Bible, o \"Espelho\"\né necessário pra vocês também…… não é?"
21120-62 = "Saquei…… desde a hora em que fomos chamadas,\neu já achava que tinha alguma coisa. Entendi tudo,\nmais ou menos."
21120-63 = "Hã, n-não me diga que……?"
21120-64 = "Hehe, essa é a Momo. Pega rápido."
21120-65 = "Já que o destino é o mesmo,\nviagem boa é com companhia, né."
21120-66 = "Se vamos começar uma raid juntas,\nentão somos membras da mesma party."
21120-67 = "Ãh, mana, não me diga que, por acaso……"
21120-69 = "você tá planejando se juntar à Veritas\npra invadir o Conselho……!?"
21120-71 = "Millennium · Terraço"
21120-72 = "……É exatamente isso."
21120-73 = "Entendo, é uma história difícil de acreditar\nassim de cara."
21120-74 = "Sobre o Clube de Desenvolvimento de Jogos,\nnão é que eu não saiba."
21120-75 = "Apesar de serem tão fofinhas…… querer invadir\no Conselho da Millennium. As aparências enganam, né?"
21120-76 = "São garotas puras. Mas é justamente por isso que,\nàs vezes, aprontam travessuras absurdas."
21120-77 = "E, desta vez, a Veritas também está envolvida."
21120-78 = "Veritas…… aquele grupo de crackers\nespecializado em hacking, né?"
21120-79 = "Sim, isso. Parecem não ter nada em comum, mas, no\nquesito \"não escolher os meios quando se trata de\nalgo importante\", se parecem muito com o Clube de\nDesenvolvimento de Jogos."
21120-80 = "Ah, era isso. Bom, seja como for, sendo um pedido,\nnós pretendemos aceitá-lo, mas……"
21120-81 = "Só tem um probleminha."
21120-83 = "Millennium · Veritas"
21120-84 = "Problema?"
21120-85 = "O \"Espelho\" está guardado no \"depósito de bens\napreendidos\" do Conselho. E quem protege esse lugar,\nna verdade, é……"
21120-86 = "o Clube das Maids."
21120-87 = "……Hã? Clube das Maids, será que é……"
21120-88 = "Ah, você tá falando do C&C, né? Aquele grupo\nde combate da Millennium, famoso por \"limpar\"\nos adversários com toda a elegância, de vestido\nde empregada……"
21120-89 = "Isso, isso! Bom, mas é um probleminha à toa~."
21120-90 = "Ah, tá~! É, né, hmm, saquei~……"
21120-93 = "Bora desistir!!! Clube de Desenvolvimento de Jogos,\nmeia-volta! Avançar!!"
21120-95 = "Peraperaperaí! Não pode desistir, Momo!\nVocê quer a G.Bible, não quer!?"
21120-96 = "Claro que quero! Mas, daí a ter que lutar contra\no Clube das Maids, nem brincando!"
21120-97 = "Antes me mandar entrar num trem em movimento, ou\npular dentro de um vulcão em erupção, do que isso!"
21120-98 = "M-mas, do jeito que tá, a presidente vai brigar com…\nquer dizer! O Clube de Desenvolvimento de Jogos\ntambém já era! Assim ele vai ser dissolvido, né!?"
21120-99 = "Dissolução eu não quero…… mas isto aqui\né de outro nível."
21120-100 = "Grupos radicais e círculos armados aniquilados pelo\n\"atendimento\" do C&C, tem um sem-número……\nvocê sabe disso, né?"
21120-102 = "……No fim, são limpos tão bem que não sobra nem\nvestígio. É uma história famosa."
21120-103 = "Claro que eu quero proteger o clube, mas a Midori,\na Aris e a Yuzu são incomparavelmente mais\nimportantes! É perigoso demais!"
21120-104 = "Peraí, peraí, que o C&C é perigoso eu sei! Mas a\ngente não é o Comitê de Disciplina de Gehenna nem\no Comitê de Realização da Justiça de Trinity, então\nninguém tá querendo brigar de frente, não."
21120-105 = "O nosso objetivo não é \"derrotar o Clube das Maids\",\né pegar o \"Espelho\" no depósito de apreensões~……"
21120-106 = "Não é tããão diferente assim!"
21120-107 = "……Mas não é uma história sem chance."
21120-108 = "Segundo a minha escu…… informação, no momento\no Clube das Maids não está em sua forma completa."
21120-109 = "Hã?"
21120-112 = "Claro, o Clube das Maids é o grupo de combate\nmais forte da Millennium."
21120-113 = "Por que elas são chamadas de \"mais fortes\"……\nisso, claro, é em parte porque reúnem maids\nagentes excepcionais, mas……"
21120-114 = "o que mais pesa é a existência \"dela\"."
21120-117 = "A presidente do Clube das Maids,\ncodinome Double-O…… a veterana Neru."
21120-119 = "Isso."
21120-121 = "Mas, neste momento, ela está……"
21120-123 = "Millennium · Terraço"
21120-124 = "A-a veterana Neru não está aqui!?"
21120-125 = "Sim, parece que ela tem um assunto pessoal\nnos arredores externos da Millennium."
21120-126 = "Mas fiquem tranquilas."
21120-127 = "A rigor, a nossa líder é uma pessoa especializada\nmais em \"destruir\" do que em proteger."
21120-128 = "Claro, o C&C com a líder presente é o mais forte……\nisso é um fato inegável."
21120-129 = "Só que, no quesito \"proteger\"…… quem sabe,\ntalvez só nós sozinhas seja até melhor."
21120-130 = "Então, reforçando: aceitamos o pedido."
21120-132 = "Até a hora combinada, manter o Clube de\nDesenvolvimento de Jogos longe do depósito de\napreensões do Conselho…… isto eu prometo."
21120-134 = "Millennium · Veritas"
21120-135 = "Evitar o confronto direto e fugir levando só\no \"Espelho\"…… hmm……"
21120-136 = "……"
21120-137 = "Vamos tentar, mana."
21120-138 = "Heein!? Mas, só porque a veterana Neru não tá,\na gente vai encarar logo o Clube das Maids!?"
21120-139 = "Eu sei, mas…… não dá pra deixar o Clube de\nDesenvolvimento de Jogos acabar assim."
21120-142 = "É uma sala caindo aos pedaços, apertada, que de\nvez em quando até pinga goteira, mas……"
21120-145 = "agora ela já não é só um lugar onde a gente\nsimplesmente joga."
21120-148 = "……É um lugar precioso, pra gente\nestar todas juntas."
21120-149 = "Por isso, se houver a menor das chances……\neu quero tentar."
21120-150 = "Não, mesmo que a gente acabe encarando o Clube\ndas Maids, por mais perigoso que isso seja……!"
21120-152 = "eu quero proteger."
21120-154 = "Pela Aris, pela Yuzu……\npor todas nós!"
21120-157 = "Midori……"
21120-158 = "Se for a gente, nós conseguimos."
21120-159 = "O herói lendário…… pra impedir a destruição\ndo mundo, derrota o Rei Demônio."
21120-160 = "A Aris jogou 45 RPGs no total…… e descobriu o\npoder mais forte de que os heróis precisam pra\nderrotar o Rei Demônio."
21120-161 = "O poder mais forte…… subir de nível? Ah,\nmelhorar o equipamento?"
21120-162 = "Escuta clandestina?"
21120-163 = "Tipo um choque de EMP!?"
21120-165 = "N-não é isso……"
21120-167 = "São os companheiros que estão ao seu lado."
21120-168 = "Aris……"
21120-169 = "……"
21120-170 = "Sim, boa."
21120-171 = "Bora! Infiltrar no Conselho\ne recuperar o \"Espelho\"!"
21120-173 = "Hare! Você não tem algum plano bom!?"
21120-174 = "Deixa comigo."
21120-175 = "Só que, pra executar esse plano……"
21120-176 = "vamos precisar de alguns preparativos."
21120-178 = "A escuta que eu falei, e o choque de EMP também……\ne, além disso……"
21120-179 = "o que falta mesmo é…… \"companhia\", eu diria."
21120-180 = "Companhia?"
21120-181 = "(Olhos brilhando)"
21120-182 = "Mas a gente não é tão próxima assim deles, então……\nvai ter que pedir pro Sensei."
21120-183 = "[s1] \"Eu?\"\n[s2] \"Se for algo que eu possa fazer, pode deixar comigo.\""
21120-186 = "Sim."
21120-187 = "Sem a força delas, provavelmente,\neste plano não se sustenta."
21120-189 = "Entendo, isso é, de fato, uma decisão acertada."
21120-190 = "Como você disse, esse método seria difícil\nde fazer sem ser a gente."
21120-191 = "Sim, entendido. Vamos colaborar."
21120-192 = "T-tem certeza mesmo?"
21120-193 = "O Clube de Engenharia tem um monte de feitos\nno currículo, não precisa atravessar uma ponte\ntão arriscada assim……"
21120-194 = "É verdade, talvez seja mesmo."
21120-195 = "E, ainda assim, por que vocês toparam um plano\ntão perigoso, de lutar contra o Clube das Maids?"
21120-196 = "Isso é……"
21120-197 = "……É, porque parece mais divertido assim, sei lá."
21120-198 = "Isso mesmo! E, além disso, a gente também\nquer ficar mais amiga do Sensei!"
21120-202 = "É, isso, e também……"
21120-203 = "?"
21120-204 = "……?"
21120-205 = "……Não, por agora tá bom. Conto com vocês."
21120-206 = "Ah, sim."
21120-207 = "Nós é que contamos com vocês……!"
21120-209 = "Millennium · Veritas"
21120-210 = "Com isso, o time tá completo, né?"
21120-211 = "Sim, os preparativos também estão prontos."
21120-212 = "Boa!"
21120-213 = "Ah, aliás, quando é que a operação começa?"
21120-214 = "Quando……?"
21120-217 = "Já começou."
21120-219 = "Millennium · Terraço"
21120-220 = "Ah, só queria fazer uma pergunta."
21120-222 = "O Clube de Desenvolvimento de Jogos e a Veritas\nvão invadir o Conselho…… isso, de onde\nvocês ficaram sabendo?"
21120-223 = "Em guerra de informação, eu achava que não havia,\nna Millennium, grupo que superasse a Veritas, mas……"
21120-224 = "……É exatamente isso."
21120-225 = "Por isso, foi a Veritas que nos contou.\nÉ só isso."
21120-226 = "……Hã?"
21120-227 = "Quem nos avisou que a Veritas e o Clube de\nDesenvolvimento de Jogos viriam……"
21120-230 = "foi a presidente da Veritas, a Himari."
21120-232 = "Próximo episódio: Nerds VS Maids."