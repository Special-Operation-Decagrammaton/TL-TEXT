[translation]
21120-1 = "Episódio 12: Em busca do 'Espelho'"
21120-2 = "Millennium, Veritas"
21120-3 = "Sobre os 'dados' que vocês pediram, já temos um resultado."
21120-4 = "F-finalmente...!"
21120-5 = "Meu coração está disparado..."
21120-6 = "Como vocês sabem, nós da Veritas nos orgulhamos de ser o melhor grupo de hackers de Kivotos."
21120-7 = "Já resolvemos incontáveis problemas relacionados à recuperação de sistemas e dados..."
21120-8 = "Dito isso, serei direta."
21120-9 = "(Gulp...)"
21120-11 = "Momoi, é impossível recuperar os dados salvos do seu jogo."
21120-13 = "Waaaaah! Já era, acabou tudo!"
21120-14 = "Não é disso que estamos falando, né!? E a quebra da senha da G.Bible, como ficou!?"
21120-15 = "Sobre isso, a Maki está trabalhando agora."
21120-16 = "A Maki-chan?"
21120-17 = "Ah, bom dia, Midori!"
21120-18 = "Que bom que você veio, obrigada."
21120-19 = "Uuuuh, meus dados salvos, o cristal de suor e lágrimas..."
21120-20 = "Por que a Momo está chorando tanto?"
21120-21 = "Não liga pra isso, tá tudo bem... Mas e a G.Bible?"
21120-22 = "Sim, consegui analisar direitinho. Não há dúvidas, é o manual do jogo lendário criado pelo lendário desenvolvedor... a G.Bible."
21120-23 = "E-eu sabia!"
21120-24 = "Considerando a data de criação do arquivo, a última data de transferência e o formato, é certeza. O autor também coincide com o IP do lendário desenvolvedor de jogos. Além disso, há registros de que esse dado só foi transferido uma única vez."
21120-25 = "Isso significa que..."
21120-26 = "Sim, deve ser a 'G.Bible' original."
21120-28 = "I-incrível!!"
21120-29 = "Mas tem um problema... ainda não consegui decifrar a senha do arquivo."
21120-30 = "Ehh, então no fim das contas não dá pra ver!? Que decepção!"
21120-31 = "Ugh! É que eu sou uma cracker, não uma hacker ética... Enfim!"
21120-32 = "Dito isso, não significa que não haja um jeito."
21120-33 = "Sério?"
21120-34 = "Analisar a senha do arquivo diretamente é quase impossível. Mas, se conseguirmos remover o arquivo de segurança e copiar tudo, talvez a gente consiga..."
21120-35 = "E, para isso, precisamos de uma ferramenta chamada Optimus Mirror System... ou, como chamamos, o 'Espelho'."
21120-36 = "E-eu não estou entendendo nada..."
21120-37 = "Em resumo... para ver a G.Bible, precisamos desse programa chamado 'Espelho', certo? Onde ele está?"
21120-38 = "Nós, da Veritas, tínhamos..."
21120-39 = "Como assim, 'tínhamos'? Espera, tempo passado!?"
21120-40 = "...Pois é, não temos mais. O conselho estudantil confiscou, droga!"
21120-41 = "A Yuuka invadiu aqui de repente e disse: 'A posse de equipamentos para fins ilegais é proibida'."
21120-43 = "O 'Espelho' também, e levaram várias outras coisas... inclusive meus dispositivos de escuta."
21120-44 = "Esse 'Espelho'... é algo tão perigoso assim?"
21120-47 = "Não é nada disso. É só uma ferramenta otimizada para abrir sistemas criptografados."
21120-48 = "Só que... é uma ferramenta de hacking única no mundo, feita pessoalmente pela nossa presidente."
21120-49 = "Presidente... você quer dizer a Himari-senpai?"
21120-50 = "Himari...?"
21120-51 = "Alice-chan, você ainda não a conheceu, né? Ela é a presidente da Veritas. Ela tem uma deficiência física e usa cadeira de rodas, então você vai reconhecê-la na hora."
21120-52 = "Ela é uma pessoa incrível. Apesar da condição física, não há ninguém em Millennium que tenha pena ou a subestime. Ela é um gênio. Ela possui o título de 'Onisciente', um grau acadêmico que apenas três pessoas na história de Millennium receberam."
21120-53 = "Sim, ela é realmente incrível... mas, deixando isso de lado, por que vocês deixaram ela levar o equipamento que a senpai fez com tanto esforço?"
21120-54 = "...Eu só queria verificar as mensagens no celular do Sensei. Para isso, eu precisava do 'Espelho'..."
21120-55 = "Não havia nenhuma intenção impura, de verdade."
21120-56 = "Eu só consigo sentir intenções impuras nisso..."
21120-59 = "Waaah! Se eu não encontrar o \"Espelho\" logo, a presidente vai ficar uma fera comigo!!"

21120-60 = "Enfim... resumindo, nós também queremos recuperar o \"Espelho\"."

21120-61 = "Além disso, para decifrar a senha da G.Bible, o \"Espelho\" também é necessário para vocês... não é?"

21120-62 = "Entendi... Quando fui chamada, imaginei que tivesse algo acontecendo. Já entendi quase tudo."
21120-63 = "Ei, v-você não está querendo dizer...?"
21120-64 = "Fufu, como esperado da Momoi. Você é rápida."
21120-65 = "Já que o destino é o mesmo, nada melhor do que viajar acompanhada."
21120-66 = "Se vamos começar uma batalha de raide juntas, então somos membros do mesmo grupo."
21120-67 = "Ei, irmã, será que por acaso..."
21120-69 = "Você não está pensando em se juntar à Veritas para atacar o conselho estudantil, está...!?"
21120-71 = "Millennium - Telhado"
21120-72 = "...É exatamente isso."
21120-73 = "Entendo, é uma história difícil de acreditar de primeira."
21120-74 = "Eu também não sou ignorante sobre o Clube de Desenvolvimento de Jogos."
21120-75 = "Elas parecem tão adoráveis... mas querer atacar o conselho estudantil de Millennium? As aparências enganam, não é?"
21120-76 = "São garotas puras. Mas é justamente por isso que, às vezes, elas fazem travessuras inacreditáveis."
21120-77 = "Além disso, a Veritas também está envolvida desta vez."
21120-78 = "Veritas... aquele grupo de crackers especializado em hacking, certo?"
21120-79 = "Sim, isso mesmo. Pode parecer que não temos nada em comum, mas, no ponto de não medir esforços para conseguir algo importante... elas são bem parecidas com o Clube de Desenvolvimento de Jogos."
21120-80 = "Entendo. Bem, de qualquer forma, como é um pedido, pretendemos aceitar, mas..."
21120-81 = "Existe apenas um pequeno problema."
21120-83 = "Millennium - Veritas"
21120-84 = "Problema?"
21120-85 = "O \"Espelho\" está guardado no \"Depósito de Bens Apreendidos\" do conselho estudantil. Mas quem está protegendo o local é, na verdade..."

21120-86 = "O Clube de Maids, sabe."
21120-87 = "...Hã? O Clube de Maids, por acaso..."
21120-88 = "Ah, você quer dizer a C&C? Aquele grupo de combate de Millennium, famoso por \"limpar\" seus oponentes com elegância usando uniformes de maid..."

21120-89 = "Isso mesmo! Bem, é só um probleminha trivial, sabe~."
21120-90 = "Entendi~! É verdade, hum, entendo..."
21120-93 = "Vamos desistir!!! Clube de Desenvolvimento de Jogos, meia-volta! Avante!!"
21120-95 = "Espera, espera, espera! Não pode desistir, Momoi! Você quer a G.Bible, não quer!?"
21120-96 = "É claro que eu quero! Mas isso não significa que eu vá lutar contra o Clube de Maids, nem pensar!"
21120-97 = "Isso é pior do que me pedirem para entrar em um trem em movimento ou pular em um vulcão em erupção!"
21120-98 = "M-mas se continuarmos assim, a presidente vai ficar brava comigo... não, espera! O Clube de Desenvolvimento de Jogos vai acabar! Vamos ser fechadas, não vamos!?"
21120-99 = "Eu não quero que o clube feche, mas... isso é outro nível."
21120-100 = "Não dá para contar quantos grupos radicais e círculos armados foram aniquilados pelo \"serviço\" da C&C... você sabe, né?"

21120-102 = "...No final, não deixam nem vestígios, limpam tudo perfeitamente. É uma história famosa."
21120-103 = "Eu quero proteger o clube, mas a Midori, a Alice e a Yuzu são muito mais importantes! É perigoso demais!"
21120-104 = "Espera, espera, eu sei que a C&C é perigosa! Mas nós não somos o Comitê Disciplinar de Gehenna nem o Comitê de Justiça de Trinity, então não estamos falando de sair na porrada de frente."
21120-105 = "Nosso objetivo não é \"derrotar o Clube de Maids\", mas sim pegar o \"Espelho\" no depósito de bens apreendidos~..."

21120-106 = "Não muda quase nada!"
21120-107 = "...Mas não é uma história sem possibilidades."
21120-108 = "De acordo com minha espionagem... digo, minhas informações, o Clube de Maids não está em sua condição plena no momento."
21120-109 = "Hã?"
21120-112 = "Claro, o Clube de Maids é o grupo de combate mais forte de Millennium."
21120-113 = "Por que elas são chamadas de \"mais fortes\"... claro, é porque elas têm agentes maids maravilhosas..."

21120-114 = "Mas o fator mais importante é a existência de \"ela\"."

21120-117 = "A presidente do Clube de Maids, codinome 00... Neru-senpai."
21120-119 = "Exato."
21120-121 = "Mas, agora ela está..."
21120-123 = "Millennium - Cobertura"
21120-124 = "Ei, a senpai Neru não está aqui!?"
21120-125 = "Sim, parece que ela tem um assunto pessoal para tratar fora de Millennium."
21120-126 = "Mas não se preocupe."
21120-127 = "Para ser sincera, nossa líder é alguém especializada em \"destruir\" mais do que em proteger."
21120-128 = "Claro, é um fato inegável que a C&C é mais forte quando a líder está presente..."
21120-129 = "Mas, no que diz respeito a \"proteger\"... talvez seja melhor apenas conosco."
21120-130 = "Então, formalizando, aceitaremos o pedido."
21120-132 = "Até o horário combinado, garantiremos que o Departamento de Desenvolvimento de Jogos não se aproxime do depósito de itens apreendidos do Conselho Estudantil... é uma promessa."
21120-134 = "Millennium - Veritas"
21120-135 = "Evitar um confronto direto e roubar apenas o \"espelho\" para fugir... hum..."
21120-136 = "..."
21120-137 = "Vamos tentar, irmã."
21120-138 = "Hã!? Mas só porque a senpai Neru não está aqui, não significa que podemos subestimar o Clube de Empregadas!"
21120-139 = "Eu sei, mas... não posso deixar que o Departamento de Desenvolvimento de Jogos acabe assim."
21120-142 = "Nossa sala é caindo aos pedaços, apertada e às vezes até goteja quando chove, mas..."
21120-145 = "Agora, não é apenas um lugar onde jogamos."
21120-148 = "...É um lugar precioso para estarmos todas juntas."
21120-149 = "Por isso, se houver qualquer chance... eu quero tentar."
21120-150 = "Não, mesmo que tenhamos que enfrentar o Clube de Empregadas, não importa o quão perigoso seja...!"
21120-152 = "Eu quero proteger."
21120-154 = "Pela Alice, pela Yuzu... por todas nós!"
21120-157 = "Midori..."
21120-158 = "Nós conseguimos."
21120-159 = "O herói lendário... derrota o Rei Demônio para impedir a destruição do mundo."
21120-160 = "Alice jogou um total de 45 RPGs... e descobriu o poder mais forte que os heróis precisam para derrotar o Rei Demônio."
21120-161 = "O poder mais forte... subir de nível? Ah, fortalecer o equipamento?"
21120-162 = "Escuta clandestina?"
21120-163 = "Choque EMP ou algo assim!?"
21120-165 = "N-não é isso..."
21120-167 = "É estar junto, são os companheiros."
21120-168 = "Alice..."
21120-169 = "..."
21120-170 = "Certo, entendido."
21120-171 = "Vamos fazer isso! Vamos nos infiltrar no Conselho Estudantil e recuperar o \"espelho\"!"
21120-173 = "Hare! Você não tem um bom plano!?"
21120-174 = "Deixe comigo."
21120-175 = "Mas, para executar esse plano..."
21120-176 = "Precisaremos de alguns preparativos."
21120-178 = "A escuta que mencionaram, o choque EMP... e além disso..."
21120-179 = "O que falta é, claro... \"companheiros\"."
21120-180 = "Companheiros?"
21120-181 = "(Brilhando)"
21120-182 = "Mas como não somos tão próximas deles... teremos que pedir ao Sensei."
21120-183 = "[s1] \"Eu?\"\n[s2] \"Se for algo que eu possa fazer, pode deixar.\""
21120-186 = "Sim."
21120-187 = "Provavelmente, sem a ajuda delas, esta operação não funcionará."
21120-189 = "Entendo, essa é certamente uma decisão precisa."
21120-190 = "Como você disse, desse jeito, seria difícil sem nós."
21120-191 = "Certo, entendi. Vamos cooperar."
21120-192 = "S-sério mesmo que está tudo bem?"
21120-193 = "O Clube de Engenharia já tem muitos feitos, não precisamos nos arriscar tanto assim..."
21120-194 = "É, talvez você tenha razão."
21120-195 = "Então por que você aceitou esse plano perigoso de lutar contra o Clube de Maids?"
21120-196 = "Isso é..."
21120-197 = "...Bem, talvez seja porque parece ser mais divertido."
21120-198 = "É isso! Além disso, nós também queremos nos aproximar mais do Sensei!"
21120-202 = "É verdade, e também..."
21120-203 = "?"
21120-204 = "...?"
21120-205 = "...Não, deixa para lá por enquanto. Conto com vocês."
21120-206 = "Ah, sim."
21120-207 = "Nós que contamos com você...!"
21120-209 = "Millennium - Veritas"
21120-210 = "Com isso, os membros estão reunidos, certo?"
21120-211 = "Sim, a preparação também está pronta."
21120-212 = "Beleza!"
21120-213 = "Ah, falando nisso, quando a operação começa?"
21120-214 = "Quando...?"
21120-217 = "Já começou."
21120-219 = "Millennium - Terraço"
21120-220 = "Ah, eu gostaria de fazer apenas uma pergunta."
21120-222 = "O Clube de Desenvolvimento de Jogos e a Veritas atacarem o Grêmio... como vocês ficaram sabendo disso?"
21120-223 = "No que diz respeito à guerra de informações, eu achava que não existia grupo em Millennium que superasse a Veritas..."
21120-224 = "...Exatamente."
21120-225 = "Por isso, a Veritas nos contou. É só isso."
21120-226 = "...Como é?"
21120-227 = "Quem nos contou que a Veritas e o Clube de Desenvolvimento de Jogos viriam foi..."
21120-230 = "A presidente da Veritas, Himari."
21120-232 = "Próximo episódio: Nerd VS Maid"
