[translation]
21120-1 = "Episódio 12; Em busca do 'Espelho'"
21120-2 = "Millennium - Veritas"
21120-3 = "O resultado sobre os 'dados' que vocês solicitaram já saiu."
21120-4 = "F-Finalmente...!"
21120-5 = "*Tum tum...*"
21120-6 = "Como vocês sabem, nós da 'Veritas' nos orgulhamos de ser o melhor grupo de hackers de Kivotos."
21120-7 = "Já resolvemos incontáveis casos de recuperação de sistemas e dados..."
21120-8 = "Dito isso, vou direto ao ponto."
21120-9 = "(Gulp...)"
21120-11 = "Momoi, recuperar os saves do seu jogo é impossível."
21120-13 = "Uwaaaahhh! Acabou tudooooo!"
21120-14 = "Não é dessa recuperação que eu tava falando!? E como ficou a quebra da senha da G.Bible!?"
21120-15 = "Sobre isso, a Maki está cuidando."
21120-16 = "A Maki-chan?"
21120-17 = "Ah, bom dia, Mido!"
21120-18 = "Obrigada por ter vindo."
21120-19 = "Ugh, meus saves, o fruto do meu suor e das minhas lágrimas...!"
21120-20 = "Por que a Momo tá chorando desse jeito?"
21120-21 = "Não precisa se preocupar com isso... Mas enfim, como foi com a G.Bible?"
21120-22 = "Uhum, conseguimos analisar direitinho. Aquele é o manual do jogo divino criado pelo lendário desenvolvedor de jogos... Com certeza é a G.Bible."
21120-23 = "E-Eu sabia!"
21120-24 = "É certeza mesmo considerando a data de criação do arquivo, a última data de transferência e o formato do arquivo. O responsável pelo trabalho também bateu com o IP do tal lendário desenvolvedor. Além disso, aquele dado só tem registros de ter sido transferido uma única vez até hoje."
21120-25 = "Isso quer dizer que..."
21120-26 = "Sim, provavelmente é a 'G.Bible' original."
21120-28 = "I-Incrível!!"
21120-29 = "Mas tem um problema... Nós ainda não conseguimos quebrar a senha do arquivo."
21120-30 = "Eeeh, então no fim das contas a gente não vai conseguir ler!? Que decepção!"
21120-31 = "Ugh! É que eu sou só uma cracker, não sou uma white hacker... Enfim!"
21120-32 = "Mesmo assim, não é como se não houvesse um jeito."
21120-33 = "Mesmo?"
21120-34 = "Quebrar a senha daquele arquivo diretamente é provavelmente quase impossível. Mas se usarmos a abordagem de remover o arquivo de segurança e copiar o resto inteiro, tenho certeza de que seria possível..."
21120-35 = "E para isso, nós precisaríamos de uma ferramenta chamada Optimus Mirror System... O famoso 'Espelho'."
21120-36 = "E-Eu não tô conseguindo acompanhar a conversa..."
21120-37 = "Em outras palavras... A gente precisa desse programa chamado 'Espelho' pra conseguir ler a G.Bible, é isso? E onde ele tá?"
21120-38 = "Nós, a Veritas, tínha... mos."
21120-39 = "O que, se é assim, então agora mesmo... Espera? Tempo verbal no passado!?"
21120-40 = "......Pois é, nós não temos agora. Foi confiscado pelo Conselho Estudantil, que saco!"
21120-41 = "Outro dia a Yuuka invadiu do nada dizendo: 'A posse de equipamentos para fins ilegais é proibida'."
21120-43 = "O 'Espelho' foi uma delas, mas elas levaram um monte de coisas... Minhas escutas e afins também."
21120-44 = "Esse 'Espelho' é algo... tão perigoso assim?"
21120-47 = "Não é nada disso. É só uma ferramenta otimizada para abrir sistemas criptografados."
21120-48 = "Só que... é uma ferramenta de hacking única no mundo, criada pela nossa própria presidente."
21120-49 = "Quando fala em presidente... quer dizer a Himari-senpai?"
21120-50 = "Himari...?"
21120-51 = "Aris-chan, você ainda não a conheceu. Ela é a presidente da Veritas. Como ela tem uma pequena deficiência física e anda de cadeira de rodas, você vai saber quem é assim que a ver."
21120-52 = "Ela é uma pessoa incrível. Por causa da condição física dela, não há sequer uma pessoa na Millennium que sinta pena ou a menospreze por isso. Eu diria que ela é... uma gênio. Ela é uma das únicas três pessoas na história da Millennium que receberam o diploma de 'Onisciência'."
21120-53 = "Sim, ela é realmente incrível... Mas isso é uma coisa, e isso é outra. Por que vocês deixaram elas levarem o equipamento que a senpai de vocês fez com tanto esforço?"
21120-54 = "......Eu só queria checar as mensagens no celular do Sensei. Para isso, eu precisava do 'Espelho'..."
21120-55 = "Eu não tinha nenhuma intenção impura."
21120-56 = "Bem, eu só consigo ver intenções impuras nisso..."
21120-59 = "Uwaaaah! Se não acharmos o 'Espelho' logo, a presidente vai ficar muito brava com a gente!!"
21120-60 = "Enfim... Resumindo, nós também queremos o 'Espelho' de volta."
21120-61 = "E vocês também precisam do 'Espelho' para quebrar a senha da G.Bible... não é?"
21120-62 = "Entendi... Eu já imaginava que tinha algo por trás de nos chamarem aqui. Deu pra sacar a situação."
21120-63 = "E-Eh, v-você não me diga que...?"
21120-64 = "Fufu, como esperado da Momo. Ela pega as coisas rápido."
21120-65 = "Se o destino é o mesmo, a gente pode muito bem ir no mesmo barco."
21120-66 = "Se nós formos iniciar a Raid juntas, então somos membros do mesmo grupo."
21120-67 = "Ehm, mana, eu duvido muito, mas..."
21120-69 = "Por um acaso você tá pensando em se juntar à Veritas pra invadir o Conselho Estudantil...!?"
21120-71 = "Millennium - Terraço"
21120-72 = "......Isso mesmo."
21120-73 = "Entendo, é uma história meio difícil de acreditar logo de cara."
21120-74 = "Até eu conheço um pouco sobre o Departamento de Desenvolvimento de Jogos."
21120-75 = "Mesmo sendo tão fofas... tentar atacar o Conselho Estudantil da Millennium, as pessoas realmente não são o que parecem, não é?"
21120-76 = "Elas são garotas puras. Mas justamente por isso, às vezes fazem travessuras inimagináveis."
21120-77 = "Além disso, a Veritas também está envolvida dessa vez."
21120-78 = "A Veritas... Aquele grupo de crackers especializado em hacking, não é?"
21120-79 = "Sim, exato. Pode parecer que não há pontos em comum, mas na parte de não escolher meios para conseguir algo importante... Elas são muito parecidas com o Departamento de Desenvolvimento de Jogos."
21120-80 = "Entendo. De qualquer maneira, já que é um pedido, nós pretendemos aceitá-lo, mas..."
21120-81 = "Há apenas um pequeno problema."
21120-83 = "Millennium - Veritas"
21120-84 = "Problema?"
21120-85 = "O 'Espelho' está guardado no 'Depósito de Itens Confiscados' do Conselho Estudantil. Mas quem está protegendo aquele lugar na verdade é..."
21120-86 = "O Clube das Maids."
21120-87 = "......Eh? Clube das Maids, por um acaso..."
21120-88 = "Ah, você quer dizer a C&C, certo? Aquele esquadrão de força militar da Millennium, famosas por usar roupas de maid e 'limpar' seus inimigos elegantemente..."
21120-89 = "Isso mesmo! Bem, é só um pequeno probleminha~."
21120-90 = "Entendi~! Isso mesmo, hmmmm, entendo~..."
21120-93 = "Vamos desistir!!! Departamento de Desenvolvimento de Jogos, meia-volta! Marche!!"
21120-95 = "Espera, espera, espera! Não desiste, Momo! Você não quer a G.Bible!?"
21120-96 = "É claro que eu quero! Mas isso não quer dizer que lutar contra o Clube das Maids seja brincadeira!"
21120-97 = "Isso é ainda pior do que se pedissem pra gente pular num trem em movimento ou se jogar num vulcão em erupção!"
21120-98 = "M-Mas se a gente desistir agora, a presidente vai brigar c... Digo! Vai ser o fim do Departamento de Desenvolvimento de Jogos! Se a gente não fizer nada, o clube vai ser fechado, não vai!?"
21120-99 = "Eu não quero que o clube seja fechado... Mas o nível do problema é totalmente diferente aqui."
21120-100 = "As organizações extremistas e grupos armados que já foram aniquilados pelos 'serviços' da C&C são incontáveis... Vocês sabem disso, né?"
21120-102 = "......No fim, até mesmo os vestígios somem sem deixar rastros, totalmente limpos. É uma história famosa."
21120-103 = "É claro que eu quero proteger o clube, mas a Midori, a Aris e a Yuzu são infinitamente mais importantes! É perigoso demais!"
21120-104 = "Espera aí, a gente sabe muito bem que a C&C é perigosa! Mas não é como se a gente fosse a Comissão Disciplinar da Gehenna, ou o Comitê de Justiça da Trinity. Nós não vamos lutar de frente com elas."
21120-105 = "O nosso objetivo não é 'derrotar o Clube das Maids', é só pegar o 'Espelho' no Depósito de Itens Confiscados~..."
21120-106 = "Dá na mesma!"
21120-107 = "......Mas não é uma situação impossível."
21120-108 = "De acordo com a minha escu... digo, informações, o Clube das Maids não está com a sua formação completa no momento."
21120-109 = "Eh?"
21120-112 = "Com certeza, o Clube das Maids é o grupo militar mais forte da Millennium."
21120-113 = "O porquê de serem chamadas de 'as mais fortes'... Parte do motivo é, sem dúvidas, por causa das incríveis agentes maids que eles têm, mas..."
21120-114 = "A principal razão para isso é, acima de tudo, a presença 'dela'."
21120-117 = "A presidente do Clube das Maids, Call Sign Double O... Neru-senpai."
21120-119 = "Exato."
21120-121 = "Só que agora ela está..."
21120-123 = "Millennium - Terraço"
21120-124 = "A-A Neru-senpai não está!?"
21120-125 = "Isso mesmo, ela disse que tinha negócios pessoais na periferia da Millennium."
21120-126 = "Mas, não se preocupe com isso."
21120-127 = "Sendo sincera, a nossa líder é muito melhor em 'destruir' do que em proteger coisas."
21120-128 = "É claro que a C&C é mais forte quando a líder está presente... Isso é um fato indiscutível."
21120-129 = "Contudo, quando se trata de 'proteger' algo... pode ser que, na verdade, seja melhor só com a gente."
21120-130 = "Então novamente, nós aceitamos a missão."
21120-132 = "Prometemos que o Departamento de Desenvolvimento de Jogos não chegará perto do Depósito de Itens Confiscados do Conselho Estudantil até o horário combinado..."
21120-134 = "Millennium - Veritas"
21120-135 = "Evitar confrontos diretos, pegar só o 'Espelho' e fugir... Hmmm..."
21120-136 = "......"
21120-137 = "Vamos tentar, mana."
21120-138 = "Eeeh!? Mesmo que a Neru-senpai não esteja lá, elas ainda são o Clube das Maids!?"
21120-139 = "Eu sei, mas... Não podemos deixar o Departamento de Desenvolvimento de Jogos sumir."
21120-142 = "É uma sala toda acabada, apertada e às vezes até chove dentro, mas..."
21120-145 = "Agora, não é mais um lugar só pra gente jogar."
21120-148 = "......É um lugar importante, pra todas nós ficarmos juntas."
21120-149 = "Por isso, se houver qualquer possibilidade... Eu quero tentar."
21120-150 = "E não me importo se batermos de frente com o Clube das Maids ou com quão perigoso isso seja...!"
21120-152 = "Eu quero protegê-lo."
21120-154 = "Pela Aris-chan, pela Yuzu-chan... Por todas nós!"
21120-157 = "Midori..."
21120-158 = "Nós conseguimos."
21120-159 = "Heróis lendários... derrotam o Rei Demônio para impedir o fim do mundo."
21120-160 = "Aris já jogou 45 RPGs diferentes... E aprendeu qual é o poder mais forte que os Heróis precisam para derrotar o Rei Demônio."
21120-161 = "O poder mais forte... Evoluir de nível? Ah, melhorar os equipamentos?"
21120-162 = "Escutas?"
21120-163 = "Onda de Choque EMP!?"
21120-165 = "N-Não..."
21120-167 = "Os companheiros que lutam ao seu lado."
21120-168 = "Aris..."
21120-169 = "......"
21120-170 = "Sim, muito bem."
21120-171 = "Vamos nessa! Infiltrar-se no Conselho Estudantil e recuperar o 'Espelho'!"
21120-173 = "Hare! Não tem nenhum plano bom pra isso!?"
21120-174 = "Deixa comigo."
21120-175 = "Mas, para colocar esse plano em ação..."
21120-176 = "Vamos precisar de alguns preparativos."
21120-178 = "A escuta que ela acabou de mencionar é um deles, e a Onda de Choque EMP também... E além disso..."
21120-179 = "Acima de tudo... nós precisamos de 'companheiros'."
21120-180 = "Companheiros?"
21120-181 = "(*Brilha brilha*)"
21120-182 = "Mas, como a gente não é tão próxima delas... Acho que vamos ter que pedir um favor para o Sensei."
21120-183 = "[s1] \"Para mim?\"\n[s2] \"Se for algo que eu possa fazer, deixe comigo.\""
21120-186 = "Sim."
21120-187 = "Sem a ajuda delas, é quase impossível que esse plano dê certo."
21120-189 = "Entendo, foi uma escolha bem coerente, de fato."
21120-190 = "Como você disse, se for desse jeito, seria difícil de fazer se não fossemos nós."
21120-191 = "Beleza, entendido. Nós vamos cooperar."
21120-192 = "T-Tudo bem mesmo?"
21120-193 = "O Clube de Engenharia já tem muitas conquistas, vocês não precisam se meter numa situação arriscada dessas..."
21120-194 = "É, talvez seja."
21120-195 = "Então por que concordaram em entrar num plano tão perigoso onde vamos bater de frente com o Clube das Maids?"
21120-196 = "É que..."
21120-197 = "......Sim, eu diria que é porque parece ser mais divertido."
21120-198 = "Isso mesmo! Além do mais, nós também queremos ficar mais próximas do Sensei!"
21120-202 = "Pois é, e além disso..."
21120-203 = "?"
21120-204 = "......?"
21120-205 = "......Não, deixa pra lá. Contamos com vocês."
21120-206 = "Ah, sim."
21120-207 = "Nós também contamos com vocês...!"
21120-209 = "Millennium - Veritas"
21120-210 = "Com isso, todos os membros já estão reunidos, né?"
21120-211 = "Sim, tudo está pronto."
21120-212 = "Beleza!"
21120-213 = "Ah, por falar nisso, quando a missão vai começar?"
21120-214 = "Quando...?"
21120-217 = "Ela já começou."
21120-219 = "Millennium - Terraço"
21120-220 = "Ah, só uma pergunta."
21120-222 = "Como vocês souberam que... o Departamento de Desenvolvimento de Jogos e a Veritas iam invadir o Conselho Estudantil?"
21120-223 = "Eu achava que não existia nenhum grupo que superasse a Veritas na Millennium quando o assunto é guerra de informações, mas..."
21120-224 = "......Exatamente."
21120-225 = "Por isso mesmo a Veritas quem nos contou. É só isso."
21120-226 = "......Como?"
21120-227 = "A pessoa que nos avisou que a Veritas e o Departamento de Desenvolvimento de Jogos iriam atacar foi..."
21120-230 = "A própria Himari, a presidente da Veritas."
21120-232 = "Próximo Episódio; Nerd VS Maid"