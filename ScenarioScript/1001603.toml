[translation]
1001603-1 = "展示会ですよ、先生"
1001603-2 = "ミレニアム・ゲームアート展示会場入り口"
1001603-3 = "朝早く起きて作ったサンドイッチ、OK。"
1001603-4 = "先生と一緒に飲むための烏龍茶と、おやつも入れたし……。"
1001603-5 = "メモ用の手帳とスケッチブックも入れた……忘れ物、無いよね？"
1001603-6 = "ダンジョンの攻略には、事前準備が必須。"
1001603-7 = "すーっ……ふぅー……よしっ。"
1001603-8 = "これはチャンス。この展示会で、先生に私の大人っぽいところを……"
1001603-9 = "[s] \"一人で何を呟いてるの？\""
1001603-10 = "うわああっ！？"
1001603-11 = "び、びっくりしました……！先生、いつからいたんですか！？"
1001603-12 = "[s1] \"ミドリが荷物とにらめっこしてた辺りから。\"\n[s2] \"ダンジョン突入前の勇者みたいに深呼吸してたとこから。\""
1001603-13 = "ほぼ最初からじゃないですか！"
1001603-14 = "ほぼ最初からじゃないですか！"
1001603-15 = "[s] \"今日の展示会、相当楽しみだったんだね。\""
1001603-16 = "そ、それは……年に1度だけの展示会ですから。"
1001603-17 = "この機会にたくさん見て回って、資料集めもたくさんしたいですし。"
1001603-18 = "（も、もちろん、楽しみだったのはそれ以外にも……）"
1001603-19 = "……さあ、こうしてはいられません！早く行きましょう、先生！"
1001603-21 = "ミレニアム・ゲームアート展示会場1F"
1001603-23 = "まず1階は最新のゲームブース、という感じで、フロアごとにジャンルで分かれてるみたいですね。"
1001603-24 = "あ、レトロゲームの展示は3階みたいです。"
1001603-25 = "[s] \"すごい人数だね。\""
1001603-26 = "そうですね、こういうイベントもまた、ゲームの魅力ですから。"
1001603-27 = "みんなが違う場所で、違う時間に、それぞれ違うジャンルのゲームを楽しんで……"
1001603-28 = "その後にこうやってみんなで集まって、思い出を分かち合ったりするんです。"
1001603-29 = "あ、こうしてる場合ではありませんね、行きましょう。きっと先生も圧倒されるような、魅力的なアートがたくさんあるはずですから……！"
1001603-35 = "（先生と二人っきりでここに来るっていうミッションはまず成功、次は……）"
1001603-38 = "結構歩きましたね、先生。喉、乾いていませんか？"
1001603-39 = "ちょうどここに、家から持ってきた烏龍茶が……"
1001603-40 = "（上手いタイミングで気を利かせることで、先生にアプローチを……！）"
1001603-41 = "[s] \"ミドリ、あれ見て。\""
1001603-42 = "えっ、あれって……？"
1001603-46 = "あっ……！あの、まるで生命の存在を許さないような、荒涼とした空気感が伝わってくる砂漠のイラスト……！"
1001603-47 = "もしかして……！"
1001603-48 = "やっぱり！"
1001603-49 = "レトロゲームの中でも名作と呼ばれるラン&ガンシューティングゲーム……！"
1001603-50 = "『メタルバレット2』の砂漠マップのイラストです！すごい！"
1001603-51 = "あっ、あっちのイラストも！"
1001603-54 = "『モラルハザード』シリーズでも有名な、ゾンビが集まる「アライグマシティ」のアートワークまで……！"
1001603-55 = "あれもこれも全て、レトロゲームの中でも、ものすごい名作ばかりです！"
1001603-58 = "[ns3] \"ミドリ、落ち着いて。\"\n[ns4] \"ミドリ、口が開きっぱなしだよ。\""
1001603-59 = "興奮せずにはいられません！"
1001603-60 = "興奮せずにはいられません！"
1001603-61 = "あっ！"
1001603-62 = "あれはかの有名なレトロゲーム、横スクロールアクション『ウルトラマリンシスターズ』の、ステージ1-1のマップイラスト！"
1001603-63 = "先生、ご存知ですか？"
1001603-64 = "『ウルトラマリンシスターズ』に出てくる草むらと雲には、同じドット絵が使われてるんですよ！"
1001603-65 = "ううぅっ……！すごいです！アイデアがどんどん浮かんできそう……！"
1001603-66 = "め、メモ帳……！メモ帳はどこだっけ？！今すぐ描きとめておかないと……！"
1001603-68 = "（その後、しばらくミドリは興奮したまま、すごい勢いで絵を描いていた）"
1001603-69 = "（ゲームアート展示会が終わった後）"
1001603-71 = "ごめんなさい……私、つい興奮してしまって……。"
1001603-72 = "先生、すみません。私一人だけ楽しくなっちゃって、好き勝手に先生を連れ回してしまいました……。"
1001603-73 = "（子供みたいに興奮しちゃった……先生に私の大人っぽいところをアピールしようっていう計画が、全部水の泡に……）"
1001603-74 = "[s5] \"ううん、興味深いものがたくさんあって、面白かった。\"\n[s6] \"ミドリは本当に、レトロゲームが好きなんだね。\""
1001603-75 = "あ、はい、そうですね。実は私、最初の頃はレトロゲームに対して「何でみんな、こんな古いゲームをやるんだろう」って思っていたんですが……"
1001603-76 = "あ、はい、そうですね。実は私、最初の頃はレトロゲームに対して「何でみんな、こんな古いゲームをやるんだろう」って思っていたんですが……"
1001603-77 = "ゲーム開発部に入って、"
1001603-78 = "ひとつひとつ楽しくやっていくうちに興味を惹かれて、だんだん好きになりました。"
1001603-79 = "中には、今でも理解し難いルールのゲームもありますが……"
1001603-80 = "……そもそも、あれは氷を割りながら協力して氷山を登るゲームですよね！？"
1001603-81 = "なんで画面の外に置いていかれたら死んじゃうんですか！どうして待ってくれないんですか！？"
1001603-82 = "[s] \"今日は楽しそうなミドリを何度も見られて、私も楽しい。\""
1001603-83 = "あぅっ……。"
1001603-84 = "せ、先生は、いつもそうやって……。"
1001603-85 = "……ですが、そうですね。はい。今日は楽しかったです。"
1001603-86 = "ぜひまたこうやって、一緒に遊びに来ましょう。先生。"
