[translation]
1001603-1 = "É a exposição, Sensei."
1001603-2 = "Entrada da Exposição de Arte de Jogos do Millennium"
1001603-3 = "Sanduíche feito logo cedo, OK."
1001603-4 = "Coloquei o chá oolong para beber com o Sensei e também uns lanchinhos..."
1001603-5 = "Caderno de anotações e o caderno de desenho também estão aqui... não esqueci de nada, né?"
1001603-6 = "Para conquistar uma dungeon, a preparação prévia é essencial."
1001603-7 = "Inspira... expira... muito bem."
1001603-8 = "Esta é a minha chance. Nesta exposição, vou mostrar ao Sensei o meu lado mais maduro..."
1001603-9 = "[s] \"O que você está murmurando sozinha?\""
1001603-10 = "Aaaah!?"
1001603-11 = "V-você me assustou...! Sensei, desde quando você estava aí!?"
1001603-12 = "[s1] \"Desde que a Midori estava encarando a bagagem.\"\n[s2] \"Desde que você respirou fundo como uma heroína antes de entrar numa dungeon.\""
1001603-13 = "Isso é praticamente desde o começo!"
1001603-14 = "Isso é praticamente desde o começo!"
1001603-15 = "[s] \"Você estava bem animada para a exposição de hoje, hein.\""
1001603-16 = "I-isso é... porque é uma exposição que só acontece uma vez por ano."
1001603-17 = "Quero aproveitar a oportunidade para ver tudo e coletar bastante material."
1001603-18 = "(C-claro, o motivo da minha animação não é só isso...)"
1001603-19 = "…Bem, não podemos ficar parados! Vamos logo, Sensei!"
1001603-21 = "1º Andar da Exposição de Arte de Jogos do Millennium"
1001603-23 = "Primeiro, o 1º andar parece ser focado nos jogos mais recentes, e os andares estão divididos por gênero."
1001603-24 = "Ah, a exposição de jogos retrô parece ser no 3º andar."
1001603-25 = "[s] \"Tem muita gente aqui.\""
1001603-26 = "Pois é, esse tipo de evento também faz parte do charme dos jogos."
1001603-27 = "Todo mundo aproveitando gêneros diferentes de jogos, em lugares e horários diferentes..."
1001603-28 = "E depois, nos reunimos assim para compartilhar nossas memórias."
1001603-29 = "Ah, não podemos ficar parados aqui, vamos lá. Com certeza haverá muitas artes fascinantes que vão deixar o Sensei impressionado...!"
1001603-35 = "(A missão de vir aqui a sós com o Sensei foi um sucesso, agora o próximo passo...)"
1001603-38 = "Nós caminhamos bastante, Sensei. Não está com sede?"
1001603-39 = "Por coincidência, tenho aqui o chá oolong que trouxe de casa..."
1001603-40 = "(Se eu for atenciosa no momento certo, posso me aproximar do Sensei...!)"
1001603-41 = "[s] \"Midori, olhe aquilo.\""
1001603-42 = "Hã, aquilo é...?"
1001603-46 = "Ah...! Aquela ilustração do deserto que transmite uma atmosfera desolada, como se não permitisse a existência de vida...!"
1001603-47 = "Será que...!"
1001603-48 = "Eu sabia!"
1001603-49 = "Um dos jogos de tiro e corrida mais famosos entre os clássicos...!"
1001603-50 = "É a ilustração do mapa do deserto de 'Metal Bullet 2'! Incrível!"
1001603-51 = "Ah, aquela ilustração ali também!"
1001603-54 = "Até a arte de 'Raccoon City', onde os zumbis se reúnem, famosa pela série 'Moral Hazard'...!"
1001603-55 = "Tudo isso aqui são obras-primas lendárias entre os jogos retrô!"
1001603-58 = "[ns3] \"Midori, calma.\"\n[ns4] \"Midori, você está de boca aberta.\""
1001603-59 = "Não tem como não ficar empolgada!"
1001603-60 = "Não tem como não ficar empolgada!"
1001603-61 = "Ah!"
1001603-62 = "Aquela é a ilustração do mapa do estágio 1-1 do famoso jogo retrô de ação de rolagem lateral, 'Ultramarine Sisters'!"
1001603-63 = "Sensei, você sabia?"
1001603-64 = "Na grama e nas nuvens de 'Ultramarine Sisters', eles usaram a mesma pixel art!"
1001603-65 = "Uuuuh...! É incrível! Sinto que várias ideias estão surgindo...!"
1001603-66 = "O, o caderno de anotações...! Onde eu coloquei?! Preciso anotar isso agora mesmo...!"
1001603-68 = "（Depois disso, por um tempo, Midori continuou empolgada, desenhando com uma energia incrível）"
1001603-69 = "（Após o fim da exposição de arte de jogos）"
1001603-71 = "Desculpe... eu acabei me empolgando demais..."
1001603-72 = "Professor, me desculpe. Eu me diverti sozinha e acabei te arrastando para todo lado sem pensar..."
1001603-73 = "（Fiquei empolgada como uma criança... Meu plano de mostrar meu lado mais maduro para o professor foi por água abaixo...）"
1001603-74 = "[s5] \"Não, foi interessante ver tantas coisas fascinantes.\" \n[s6] \"Midori, você realmente gosta de jogos retrô, não é?\""
1001603-75 = "Ah, sim, é verdade. Na verdade, no começo, eu pensava: \"Por que todo mundo joga esses jogos tão antigos?\", mas..."
1001603-76 = "Ah, sim, é verdade. Na verdade, no começo, eu pensava: \"Por que todo mundo joga esses jogos tão antigos?\", mas..."
1001603-77 = "Depois que entrei no Clube de Desenvolvimento de Jogos,"
1001603-78 = "conforme fui jogando cada um deles, acabei me interessando e, aos poucos, passei a gostar."
1001603-79 = "Embora existam alguns jogos com regras difíceis de entender até hoje..."
1001603-80 = "……Afinal, aquele jogo é sobre subir um iceberg cooperando enquanto quebra o gelo, certo!?"
1001603-81 = "Por que a gente morre se ficar para trás fora da tela!? Por que não podem esperar um pouco!?"
1001603-82 = "[s] \"Hoje eu vi a Midori se divertindo várias vezes, e isso também me deixou feliz.\""
1001603-83 = "Auh..."
1001603-84 = "P-professor, você sempre faz isso..."
1001603-85 = "……Mas, é verdade. Sim. Hoje foi divertido."
1001603-86 = "Vamos vir aqui juntos de novo, com certeza. Professor."
