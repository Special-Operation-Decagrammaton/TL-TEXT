[translation]
10027060-1 = "第6話;半分の完成"
10027060-2 = "同人会場"
10027060-5 = "[ns] \"メル、それは一体どういう……？\""
10027060-6 = "先生のおっしゃる通りです。#n何故急にそんな事を……？"
10027060-7 = "そもそも貴女、この前まで『ルナ』という作品がこの世にあった事さえ知らなかったじゃないですか。"
10027060-8 = "痛いところをつくね……。"
10027060-9 = "痛いところをつくとかそういう問題ではなく、これは……"
10027060-10 = "ちょっと待ってください。ということは……#nメルリーさんが『ルナ』の同人誌を描く……？"
10027060-11 = "……急に何よ。"
10027060-12 = "やはり――気に入らないですわね。"
10027060-13 = "ちょっと、どこに行くのよ。"
10027060-14 = "ニワカが神聖な『ルナ』の同人誌を描くだなんて……#n『ルナ』は私が先に好きになった作品なのですよ！"
10027060-15 = "それとコレに何の関係があるっていうのよ！？#n私もニワカは嫌いだけどさ！"
10027060-16 = "[s] \"あー……そう思う時、あるよね。\""
10027060-17 = "先生まで何さ！！#n今回は関係なくない！？"
10027060-18 = "というか、やっぱあんた、私にだけ当たり強くない！？"
10027060-19 = "一人の評論家であり『ルナ』のファンとして当然の不満だと思いますが？"
10027060-23 = "……まあ、そうね。たしかに、あんたから見たらそうかもしれないけど……"
10027060-24 = "私も全く共感できないわけじゃないけどさぁ！"
10027060-25 = "でも……やっぱり、私も描いてみたくなったの。"
10027060-26 = "……続けてください。"
10027060-27 = "まず……聞き手のことも考えずに、好き放題作品について批判したのは間違いだった。それは認めるよ。"
10027060-28 = "そのせいでモミジを怒らせて、こんな事になっちゃって。#nそれは全部……私の責任。"
10027060-29 = "独善的で、妥協なんて絶対にしない……私の知っているメルリーさんとは違う姿ですわね。"
10027060-30 = "……今更ながら伺いたいのですが、考えが変わったのはどうしてなのですか？"
10027060-31 = "ファンや、彼女たちが作った同人誌の数々……。"
10027060-32 = "こんな、レッドウィンターから遠く離れたところで……これほどの規模のオンリーイベントが開かれている事実。"
10027060-33 = "そして……イベントに参加している人はみんな、『ルナ』が好きで同人誌を描いているという事に、心を動かされたんだ。"
10027060-34 = "……。"
10027060-35 = "まだまだ原作の読み込みが甘いから、また一から読み直すし、#n解釈が足りなかったら参考になったであろう文献を漁る。"
10027060-36 = "そうやって、私も『ルナ』の最終巻を描きたいんだ。#nそうしたくなったから。そう、思ったから。"
10027060-37 = "……欲望は創作の原動力だから、ですか？"
10027060-38 = "そういうこと。"
10027060-39 = "……なるほど。"
10027060-40 = "もちろん『ルナ』の古参ファンであるあんたは認めないかもだけど……。"
10027060-41 = "いいでしょう。それではこうしましょうか。#n貴女に4日、時間を差し上げます。"
10027060-42 = "えっ！？短くない！？"
10027060-43 = "貴女がやりたいと仰ったのでしょう？"
10027060-44 = "いや……なんで4日なのさ。"
10027060-45 = "4日後、「ルナ22巻プチオンリー」が開催されるから、です。"
10027060-46 = "[s] \"それはこのイベントとは違うの？\""
10027060-47 = "はい。このイベントは「ルナ22巻プチオンリー」の、いわば前夜祭のようなものでして……"
10027060-48 = "皆さんがご覧になった『ルナ』の同人誌は――すべて[ruby=・  ・]既刊[/ruby]なのです。"
10027060-49 = "新たな解釈の『ルナ最終巻』を追求する私たちは、毎年プチオンリーあわせで新刊を出します。そう――"
10027060-50 = "それが、4日後の「ルナ22巻プチオンリー」。"
10027060-51 = "貴女、ご自身の手で最終巻を描く、と言いましたね？#nであれば、そのイベントにサークル参加なさっては？"
10027060-52 = "じゃあ、あんたの言う4日って、つまり……"
10027060-53 = "ええ、そうですわ――私たちのプチオンリーにサークル参加し、新刊を出してください。"
10027060-54 = "『ルナ』ファンのモミジさんなら、きっとプチオンリーのこともご存じかと。#nそこに貴女の新刊があったら……モミジさんにも、堂々と見せられるのでは？"
10027060-55 = "もちろん、常に締め切りに追われると奇声を上げ、品のない言葉を吐くメルリーさんがどこまでできるかは、少々心配なのですが……。"
10027060-56 = "……いや、直球で悪口言ってくれたほうがまだマシなんだけど。"
10027060-57 = "貴女が本気でイベントに参加し、新刊を出すのなら……"
10027060-58 = "その同人誌が単なるニワカのイベント参加記念本なのか、それとも緻密な解釈を重ねた1冊なのか――"
10027060-59 = "他の誰でもないこの私が！#nレッドウィンターの評論家であり『ルナ』同好会の会長として！"
10027060-61 = "見定めさせていただきますわ！"
10027060-66 = "[ns] \"……。\""
10027060-67 = "……先生？どうかされましたか？"
10027060-68 = "[s1] \"いや、このあと高笑いするのかなあって。\"\n[s2] \"おーほっほっほっほ！とか……。\""
10027060-71 = "……なんの話でしょうか？"
10027060-72 = "あんた、一体何様のつもりなのよ！っていうか上から目線すぎない！？#nそもそも、あんたに認められるかなんて、どうでもいいじゃん！"
10027060-73 = "……って、普段なら言うところだけど……"
10027060-74 = "まぁ……ある意味、ここまで来れたのはあんたのおかげでも、あるし……。"
10027060-75 = "はい？何か仰いました？#n人に話すときは、大きな声でしっかり、はっきり言っていただきたいのですが。"
10027060-76 = "聞こえてないなら別に～"
10027060-77 = "とにかく！今回だけは付き合ってあげる。#n私もそれぐらいの「ハードル」があったほうが、やりやすいし。"
10027060-79 = "その方が私もモミジも、納得できるものが描けそうだからね！"
10027060-80 = "ふん、礼儀上、期待と応援はして差し上げますので……#n精一杯頑張ってくださいね？"
10027060-86 = "レッドウィンター連邦学園・図書館"
10027060-87 = "うおぉ……帰ってきたぁ～～"
10027060-88 = "[s] \"半日くらい……雪の中を歩いた気がする……\""
10027060-89 = "気がするんじゃなくて、本当にそうなんだけどね。#n同人誌を両手いっぱい持って……"
10027060-90 = "[s3] \"本って薄くて軽いと思ってたのに。\"\n[s4] \"思ったより重さがあるんだね……。\""
10027060-93 = "そりゃそうだよ！同人誌を甘く見たら痛い目を見るよ！#n一冊一冊は薄くて軽いけど……"
10027060-94 = "薄い分、たくさん買った自覚がなくて……#n気がついたら厚さ以上の重さになっているなんてザラで……"
10027060-95 = "本当によくあることなんだ……手当たり次第に気に入った本を買っていったら、カバンは重いのに財布はどんどん軽くなっていくの……"
10027060-96 = "幸せの重みとはいうけどさ……周囲の視線は気になるし……"
10027060-97 = "あ、誤解しないで！私がそうだったってわけじゃないから！"
10027060-98 = "[s] \"それにしては妙に具体的なような……\""
10027060-99 = "とにかく！これから研究をはじめるよ！"
10027060-100 = "[s] \"いまから！？\""
10027060-101 = "そりゃそうだよ！私たちには4日しか残ってないんだよ！？#n1分1秒だって無駄にできないんだから。"
10027060-102 = "でもその前に……"
10027060-103 = "先生、これは私のワガママだからさ。#nあくまで、私がやりたいと決めた、[ruby=ひめき]姫木[/ruby]メルのワガママ。"
10027060-104 = "こんな私に付き合う必要は……"
10027060-105 = "[s] \"ううん、大丈夫。最初から私はメルのお願いで来てるんだから。\""
10027060-106 = "うっ、そういってくれるとは思っていたけど！#nそんなお決まりのセリフを言わなくても！"
10027060-107 = "まぁ……そんな先生だから、信じているわけなんだけどさ。"
10027060-108 = "よし。久々に同人誌をいっぱい買ってきたわけだから……#nまずは戦利品を読むところから！"
10027060-110 = "（そうして、メルの4日で原稿完成ミッションが始まった……）"
10027060-114 = "D-4"
10027060-118 = "何でこんなに多いの！？"
10027060-119 = "[s] \"時間と歴史の重みってやつだね……。\""
10027060-120 = "うぅ……ダメだ。#n作戦修正！これを全部読んでたら4日どころか一週間あっても足りないよ！"
10027060-121 = "とりあえず作業を進めていって、詰まったらその都度参考資料として活用していく形で！"
10027060-122 = "先生も手伝って！"
10027060-133 = "D-3"
10027060-146 = "[ns] \"ダメです、メル生徒。もう寝る時間です。\""
10027060-147 = "ダメ……ダメだって……。1分1秒だって惜しいんだから……。"
10027060-148 = "ちょっと、私をどこに連れて行く気なの、先生……？#nえ？何この椅子……？"
10027060-156 = "（メルは椅子に座るや否や、ゆっくりと船を漕ぎだした）"
10027060-157 = "（放っておいたら、そのまま翌日まで目を覚ましそうにはなかった……）"
10027060-162 = "[ns] \"さあ、メル起きて。顔を洗って歯を磨かないと……。\""
10027060-163 = "へ……？さっきは寝てねって……なんで急に話が変わって……。"
10027060-164 = "[s] \"このまま寝たら体調崩すよ。一瞬だけ起きて。\""
10027060-165 = "いやだぁ……寝るぅ……眠い……。"
10027060-166 = "[s] \"はい、いい子だから立って。早く顔を洗って歯を磨こうね。\""
10027060-167 = "私悪い子だから無理ぃ……。"
10027060-178 = "D-2"
10027060-181 = "先生……あの時私たち何時間寝たっけ？"
10027060-182 = "[s] \"たぶん3時間弱……？\""
10027060-183 = "いま……何時間くらい連続作業してる……?"
10027060-187 = "[ns] \"13時間くらい……？\""
10027060-188 = "へ、へへ……。"
10027060-189 = "本当、地獄だな。こりゃ……。"
10027060-200 = "[ns5] \"いらっしゃい。タカネ……。\"\n[ns6] \"急にどうしたの？まだ約束の時間じゃないけど……。\""
10027060-203 = "……コホン。監視の一種だと思ってください。"
10027060-204 = "絶対に……ぜーったいにメルリーさんのことが気になって訪ねてきたわけではありませんからね！？"
10027060-205 = "「知識解放戦線」の図書館に来てみたら、先生もメルリーさんも半分死にそうな顔で倒れていますし……。"
10027060-206 = "これが……進捗なんですね？"
10027060-212 = "[ns] \"そうだよ……タカネ……。\""
10027060-213 = "先生……サムズアップされましても……。"
10027060-214 = "貴女も何とか仰ったらどうなのですか、メルリーさん？"
10027060-219 = "……ぐうー……。"
10027060-221 = "これはダメですね。もう寝ています。"
10027060-222 = "まあ、せっかくここまで来たのですから、確認させていただきましょうか、メルリーさんの本気を。"
10027060-223 = "私は常に中立の立場でなければならない評論家ですが……#n今回だけは『ルナ』のファンクラブ会長として、レビューさせていただきますからね？"
10027060-224 = "[ns] \"お手柔らかにね。\""
10027060-225 = "それでは……"
10027060-234 = "ふむ。ふむ……2人のルナが……え？嘘！どうしてこんな展開に！？"
10027060-235 = "ちょっと待ってください。これはたしかに本編にあった伏線ですが……#nそれをまさかこんな風に？"
10027060-240 = "ほう……興味深いですね。なかなかに興味深いです。#nあっ、そこでそんなセリフを言ってしまうなんて……！"
10027060-241 = "戻ってきて、ルナ！本音はそうじゃないんでしょう！？"
10027060-242 = "貴女も分かってるのでしょう！？いえ、むしろ分かっているからこそ、こんな選択をしたのですか？でもそれは……そんな事をしてしまったら……"
10027060-247 = "……。"
10027060-249 = "ふざけてるんですか！？起きてください、メルリーさん！#nこのまま終わるなら、私は一生貴女を許しません！どんな高次元の存在が貴女を許したとしても、私が許しはしません！"
10027060-255 = "むにゃ……なによぉ……？#nって、なんでタカネがここにいんのさ？"
10027060-256 = "……監視兼監察です。そう思っていただければ。"
10027060-257 = "監視……？監察……？何を言ってるのか分かんない……あーダメだ。#n私、もうちょっと寝るね。"
10027060-259 = "寝る前に続きを描いてください！早く！"
10027060-271 = "ふぁああ……コーヒー飲んだらちょっとだけ目ぇ覚めてきた……"
10027060-272 = "……この私にコーヒーを淹れさせるなんて……覚えておいてくださいね……！"
10027060-273 = "しょうがないじゃん。先生も半分くらい倒れかけだったし。#n私はもうちょっと寝るつもりだったし……手が空いてる人が動かないとさぁ？"
10027060-274 = "言うに事欠いて貴女がそれを言いますか……"
10027060-275 = "それで、どうだった？"
10027060-276 = "な、何がですか？"
10027060-277 = "『ルナ』最終巻の前半。#n評論家でありファンクラブ会長としてレビューするって言ってたじゃん。"
10027060-282 = "……不合格です。"
10027060-283 = "えぇ！？なんでぇ！？"
10027060-285 = "なぜもなにも、まだ前半しか完成してないじゃないですか！#nそれで何の評価ができるというのですか！？"
10027060-286 = "『ルナ』の22巻だって、完結していないから存在しないのです。#n貴女は今、それと同じことをしているのですよ！？"
10027060-287 = "うぐっ……！"
10027060-288 = "貴女は本当に、こんな中途半端なものでモミジさんと仲直りしようと思っていたのですか？それが本当にできるとでも！？"
10027060-289 = "くぅ……！"
10027060-294 = "（悔しい……！でも、口が10個あっても言い返せない……！普段の私のパフォーマンスは……モミジの助けがあったからこそで……！）"
10027060-295 = "（先生も頑張って手伝ってくれたけど、やっぱりモミジがいない以上、今は……）"
10027060-296 = "（原稿を完成させないとモミジに謝れない……だけど、モミジがいないと原稿は完成できない……こんな時、どうすれば……！）"
10027060-301 = "時には、素直さが最高の美徳だと申します。#nそれは私たちを自由に解放してくれますから。"
10027060-302 = "……！それって、素直に認めろってこと？#n 私が原稿を間に合わせられないって……？"
10027060-303 = "こんな中途半端なものは完成とは認められません。描きかけですから。"
10027060-304 = "もしも、これが貴女の本気だとしたら……私は、本気で失望するかもしれません。"
10027060-305 = "……まだ期日は残ってる。"
10027060-306 = "名目上は2日ですが、今日の残り時間と印刷にかかる時間などを考えたら、事実上は1日です。1日で残った原稿の半分を完成させる自信があるということなのでしょうか？"
10027060-307 = "やってみなくちゃ、分かんないでしょ。"
10027060-308 = "モミジさんがいなくても？"
10027060-309 = "評論も、漫画も完成してこそ初めて語れるものだからね。"
10027060-310 = "……なるほど。いいでしょう、それなら私も待つことにいたします。"
10027060-311 = "完成稿、楽しみにしておきますわ。"
10027060-312 = "……どうか、精々頑張ってくださいな。"
