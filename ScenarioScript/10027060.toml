[translation]
10027060-1 = "Episódio 6: Metade da Conclusão"
10027060-2 = "Local do Evento Doujin"
10027060-5 = "[ns] \"Meru, o que exatamente isso significa...?\""
10027060-6 = "O Sensei tem razão. #nPor que você decidiu fazer isso de repente...?"
10027060-7 = "Para começar, até pouco tempo atrás, você nem sabia que a obra 'Luna' existia, sabia?"
10027060-8 = "Você tocou na ferida, hein..."
10027060-9 = "Não é uma questão de tocar na ferida, é que isso é..."
10027060-10 = "Espere um pouco. Isso significa que... #nMeru-san vai desenhar um doujinshi de 'Luna'...?"
10027060-11 = "...Por que a surpresa?"
10027060-12 = "Como eu pensei — isso não me agrada nem um pouco."
10027060-13 = "Ei, onde você vai?"
10027060-14 = "Uma novata querendo desenhar um doujinshi da sagrada obra 'Luna'... #n'Luna' é uma obra que eu amei primeiro!"
10027060-15 = "E o que isso tem a ver com o que estamos falando!? #nEu também não gosto de novatos, mas mesmo assim!"
10027060-16 = "[s] \"Ah... às vezes a gente pensa assim mesmo.\""
10027060-17 = "Até você, Sensei!! #nIsso não tem nada a ver com o que estamos discutindo agora, tem!?"
10027060-18 = "Aliás, por que você é sempre tão dura só comigo!?"
10027060-19 = "Como uma crítica e fã de 'Luna', acho que é uma insatisfação natural, não acha?"
10027060-23 = "...Bem, é verdade. Do seu ponto de vista, talvez seja assim, mas..."
10027060-24 = "Não é como se eu não pudesse entender o seu lado também!"
10027060-25 = "Mas... no fim das contas, eu também senti vontade de desenhar."
10027060-26 = "...Continue, por favor."
10027060-27 = "Primeiro... foi um erro da minha parte criticar a obra sem pensar em quem estava ouvindo. Eu admito isso."
10027060-28 = "Por causa disso, deixei a Momiji irritada e as coisas chegaram a esse ponto. #nIsso é tudo... minha responsabilidade."
10027060-29 = "Egocêntrica e incapaz de fazer qualquer concessão... essa não é a Meru-san que eu conheço."
10027060-30 = "...Embora seja um pouco tarde, gostaria de perguntar: por que você mudou de ideia?"
10027060-31 = "Os fãs e a quantidade de doujinshis que elas criaram..."
10027060-32 = "O fato de que, tão longe de Red Winter... um evento exclusivo desse porte está sendo realizado."
10027060-33 = "E... ver que todos que participam do evento amam 'Luna' e desenham doujinshis por isso, me tocou profundamente."
10027060-34 = "..."
10027060-35 = "Como minha leitura da obra original ainda é superficial, vou reler tudo do zero, #ne se a interpretação não for suficiente, vou pesquisar todas as referências que puder."
10027060-36 = "É assim que eu quero desenhar o volume final de 'Luna'. #nPorque eu senti vontade. Porque foi isso que eu decidi."
10027060-37 = "...Então, o desejo é o motor da criação, é isso?"
10027060-38 = "Exatamente."
10027060-39 = "...Entendo."
10027060-40 = "Claro, você, como fã de longa data de 'Luna', talvez não aceite isso, mas..."
10027060-41 = "Muito bem. Então vamos fazer o seguinte. #nLhe darei 4 dias."
10027060-42 = "Hã!? Não é muito pouco!?"
10027060-43 = "Não foi você quem disse que queria fazer isso?"
10027060-44 = "Não... por que 4 dias?"
10027060-45 = "Porque daqui a 4 dias, o 'Petit Only do Volume 22 de Luna' será realizado."
10027060-46 = "[s] \"Isso é diferente deste evento aqui?\""
10027060-47 = "Sim. Este evento é, por assim dizer, uma véspera do 'Petit Only do Volume 22 de Luna'..."
10027060-48 = "Todos os doujinshis de 'Luna' que vocês viram aqui são — obras já publicadas."
10027060-49 = "Nós, que buscamos uma nova interpretação do 'Volume Final de Luna', lançamos novos trabalhos todos os anos durante o Petit Only. É isso..."
10027060-50 = "Esse é o 'Petit Only do Volume 22 de Luna' que acontecerá em 4 dias."
10027060-51 = "Você disse que desenharia o volume final com suas próprias mãos, não disse? #nSendo assim, por que não participa do evento como um círculo?"
10027060-52 = "Então, esses 4 dias que você mencionou, na verdade..."
10027060-53 = "Sim, é isso mesmo — participe do nosso Petit Only como um círculo e lance um novo trabalho."
10027060-54 = "Como a Momiji-san é fã de 'Luna', imagino que ela também conheça o Petit Only. #nSe o seu novo trabalho estiver lá... você não poderia mostrá-lo a ela com orgulho?"
10027060-55 = "Claro, fico um pouco preocupada com o quanto a Meru-san, que costuma gritar e usar palavras grosseiras quando está sob pressão de prazos, conseguirá fazer..."
10027060-56 = "……Não, eu preferiria que você me insultasse diretamente, seria menos pior."
10027060-57 = "Se você pretende participar do evento a sério e publicar um novo livro..."
10027060-58 = "Se esse doujinshi é apenas uma lembrança de um iniciante no evento, ou se é uma obra com uma interpretação minuciosa e profunda—"
10027060-59 = "Ninguém menos que eu! Como crítica de Red Winter e presidente do clube de fãs de 'Luna'!"
10027060-61 = "Eu farei questão de avaliar!"
10027060-66 = "[ns] \"…….\""
10027060-67 = "……Sensei? Aconteceu alguma coisa?"
10027060-68 = "[s1] \"Não, é que eu achei que você ia dar uma risada maléfica depois disso.\"\n[s2] \"Tipo um 'Ohohohoho!'...\""
10027060-71 = "……Do que você está falando?"
10027060-72 = "Quem você pensa que é, afinal! E não está sendo um pouco arrogante demais!?#nAlém disso, não importa se você me aprova ou não!"
10027060-73 = "……Quer dizer, eu diria isso normalmente, mas..."
10027060-74 = "Bem... de certa forma, eu só cheguei até aqui graças a você também..."
10027060-75 = "Sim? Disse alguma coisa?#nQuando for falar com alguém, gostaria que falasse alto, de forma clara e direta."
10027060-76 = "Se não ouviu, deixa pra lá~"
10027060-77 = "De qualquer forma! Só desta vez eu vou te acompanhar.#nPara mim, é até mais fácil trabalhar quando tenho esse tipo de 'obstáculo'."
10027060-79 = "Porque assim, tanto eu quanto a Momiji conseguiremos desenhar algo que nos convença!"
10027060-80 = "Hum, por educação, vou ficar na torcida e com expectativas...#nPor favor, dê o seu melhor, está bem?"
10027060-86 = "Academia Red Winter - Biblioteca"
10027060-87 = "Uau... finalmente voltamos..."
10027060-88 = "[s] \"Sinto como se tivesse passado meio dia... andando na neve...\""
10027060-89 = "Não é que você sente, é que foi exatamente isso.#nCom as duas mãos cheias de doujinshis..."
10027060-90 = "[s3] \"Eu achava que livros eram finos e leves.\"\n[s4] \"Eles são bem mais pesados do que eu pensava...\""
10027060-93 = "Claro que são! Se subestimar os doujinshis, você vai se dar mal!#nCada um deles é fino e leve, mas..."
10027060-94 = "Como são finos, você não percebe o quanto comprou...#ne quando se dá conta, o peso acumulado é enorme, isso é muito comum..."
10027060-95 = "É algo que acontece muito mesmo... você vai comprando tudo o que gosta, e quando vê, a bolsa está pesada, mas a carteira está cada vez mais leve..."
10027060-96 = "Dizem que é o peso da felicidade, mas... fico preocupada com o olhar dos outros..."
10027060-97 = "Ah, não me entenda mal! Não estou dizendo que isso aconteceu comigo!"
10027060-98 = "[s] \"Isso soou estranhamente específico...\""
10027060-99 = "De qualquer forma! Vamos começar a pesquisa agora!"
10027060-100 = "[s] \"Agora mesmo!?\""
10027060-101 = "Claro! Só nos restam quatro dias!#nNão podemos desperdiçar nem um minuto, nem um segundo."
10027060-102 = "Mas antes disso..."
10027060-103 = "Sensei, isso é um capricho meu.#nÉ um capricho da Mel Himeki, algo que decidi que quero fazer."
10027060-104 = "Você não precisa me acompanhar nisso..."
10027060-105 = "[s] \"Não, está tudo bem. Eu vim desde o início porque a Mel me pediu.\""
10027060-106 = "Ugh, eu sabia que você diria isso, mas!#nNão precisava dizer essa frase clichê!"
10027060-107 = "Bem... é por ser esse tipo de Sensei que eu confio em você."
10027060-108 = "Certo. Já que comprei muitos doujinshis depois de tanto tempo...#nVamos começar lendo os espólios de guerra!"
10027060-110 = "(E assim, a missão de Mel de terminar o manuscrito em 4 dias começou...)"
10027060-114 = "D-4"
10027060-118 = "Por que tem tantos!?"
10027060-119 = "[s] \"É o peso do tempo e da história...\""
10027060-120 = "Ugh... não dá.#nMudança de planos! Se eu for ler tudo isso, não bastariam quatro dias, nem uma semana!#"
10027060-121 = "Vou seguir com o trabalho e, se eu travar, usarei os livros como material de referência conforme necessário!"
10027060-122 = "Sensei, me ajude também!"
10027060-133 = "D-3"
10027060-146 = "[ns] \"Não, aluna Mel. Já está na hora de dormir.\""
10027060-147 = "Não... não pode... Cada minuto e segundo é precioso..."
10027060-148 = "Ei, para onde você está me levando, Sensei...?#nHein? Que cadeira é essa...?"
10027060-156 = "(Assim que sentou na cadeira, Mel começou a cochilar lentamente)"
10027060-157 = "(Se eu a deixasse em paz, ela provavelmente não acordaria até o dia seguinte...)"
10027060-162 = "[ns] \"Vamos lá, Meru, acorde. Você precisa lavar o rosto e escovar os dentes...\""
10027060-163 = "Hã...? Mas você disse para eu dormir agora há pouco... por que mudou de ideia de repente...?"
10027060-164 = "[s] \"Se você dormir assim, vai acabar ficando doente. Acorde só por um instante.\""
10027060-165 = "Não quero... vou dormir... estou com sono..."
10027060-166 = "[s] \"Vamos, seja uma boa menina e levante. Vamos logo lavar o rosto e escovar os dentes.\""
10027060-167 = "Eu sou uma menina má, então não dá..."
10027060-178 = "D-2"
10027060-181 = "Sensei... há quanto tempo nós dormimos naquela hora?"
10027060-182 = "[s] \"Talvez umas 3 horas... por aí?\""
10027060-183 = "Agora... há quantas horas estamos trabalhando sem parar...?"
10027060-187 = "[ns] \"Umas 13 horas...?\""
10027060-188 = "He, hehe..."
10027060-189 = "Sério, isso é um inferno. Que situação..."
10027060-200 = "[ns5] \"Bem-vinda, Takane...\"\n[ns6] \"O que houve de repente? Ainda não é a hora combinada...\""
10027060-203 = "...Cof. Por favor, considere isso como um tipo de vigilância."
10027060-204 = "Eu definitivamente... definitivamente não vim aqui porque estava preocupada com a Meru-san, entendeu!?"
10027060-205 = "Quando cheguei à biblioteca da Frente de Libertação do Conhecimento, encontrei o Sensei e a Meru-san caídos com cara de quem está quase morrendo..."
10027060-206 = "Então é esse... o progresso de vocês?"
10027060-212 = "[ns] \"É isso mesmo... Takane...\""
10027060-213 = "Sensei... não adianta fazer sinal de positivo para mim..."
10027060-214 = "Você não vai dizer nada a respeito, Meru-san?"
10027060-219 = "...Zzz..."
10027060-221 = "Isso não vai dar certo. Ela já dormiu."
10027060-222 = "Bem, já que vim até aqui, deixe-me verificar o esforço da Meru-san."
10027060-223 = "Eu sou uma crítica que deve sempre manter uma postura neutra, mas...#nDesta vez, farei uma análise como presidente do fã-clube de 'Luna', está bem?"
10027060-224 = "[ns] \"Pegue leve comigo.\""
10027060-225 = "Então..."
10027060-234 = "Hum. Hum... duas Lunas...? Hã? Mentira! Como chegamos a esse desenrolar!?"
10027060-235 = "Espere um pouco. Isso certamente é um prenúncio que estava na história principal, mas...#nQuem diria que seria usado dessa forma?"
10027060-240 = "Ho... interessante. É bastante interessante.#nAh, não acredito que ela disse essa fala ali..."
10027060-241 = "Volte, Luna! Esse não é o seu verdadeiro sentimento, não é!?"
10027060-242 = "Você também sabe, não sabe!? Não, na verdade, foi justamente por saber que você fez essa escolha? Mas isso é... se você fizer algo assim..."
10027060-247 = "..."
10027060-249 = "Você está brincando comigo!? Acorde, Meru-san!#nSe terminar desse jeito, eu nunca vou te perdoar! Mesmo que qualquer entidade de dimensão superior te perdoe, eu não perdoarei!"
10027060-255 = "Munya... o que foi...?#nEspera, por que a Takane está aqui?"
10027060-256 = "...Vigilância e inspeção. Pode considerar assim."
10027060-257 = "Vigilância...? Inspeção...? Não entendo o que você está dizendo... Ah, não dá.#nVou dormir mais um pouco."
10027060-259 = "Desenhe a continuação antes de dormir! Rápido!"
10027060-271 = "Fuaaa... depois de tomar café, meus olhos abriram um pouco..."
10027060-272 = "...Fazer eu mesma preparar o café... guarde bem isso na memória...!"
10027060-273 = "Não tinha outro jeito. O Sensei também estava quase desmaiando.#nE eu pretendia dormir mais um pouco... alguém que estivesse livre tinha que fazer algo, né?"
10027060-274 = "É você mesma quem diz isso, depois de tudo o que aconteceu..."
10027060-275 = "E então, o que achou?"
10027060-276 = "O-o que exatamente?"
10027060-277 = "A primeira metade do volume final de 'Luna'.#nVocê disse que faria uma análise como crítica e presidente do fã-clube, lembra?"
10027060-282 = "...Reprovado."
10027060-283 = "Hã!? Por quê!?"
10027060-285 = "Por que? Ora, porque só a primeira metade está pronta!#nComo você espera que eu faça uma avaliação com isso!?"
10027060-286 = "O volume 22 de 'Luna' não existe justamente porque não foi concluído.#nVocê está fazendo exatamente a mesma coisa agora!"
10027060-287 = "Ugh...!"
10027060-288 = "Você realmente achou que conseguiria se reconciliar com a Momiji com algo tão medíocre assim? Como pôde pensar que isso seria possível!?"
10027060-289 = "Argh...!"
10027060-294 = "(Que frustração...! Mas não tenho como rebater, mesmo que tivesse dez bocas para falar...! O meu desempenho de sempre... só era possível graças à ajuda da Momiji...!)"
10027060-295 = "(O Sensei também se esforçou para me ajudar, mas, sem a Momiji, agora eu realmente...)"
10027060-296 = "(Não posso pedir desculpas à Momiji sem terminar o manuscrito... mas não consigo terminar o manuscrito sem a Momiji... O que eu faço numa hora dessas...!)"
10027060-301 = "Dizem que, às vezes, a honestidade é a maior das virtudes.#nPois ela é o que nos liberta."
10027060-302 = "...! Isso quer dizer que devo admitir honestamente?#nQue eu não vou conseguir terminar o manuscrito a tempo...?"
10027060-303 = "Algo tão incompleto não pode ser considerado um trabalho finalizado. Afinal, está apenas pela metade."
10027060-304 = "Se isso for o melhor que você pode fazer... talvez eu fique profundamente decepcionada."
10027060-305 = "...Ainda falta tempo para o prazo."
10027060-306 = "Nominalmente faltam dois dias, mas considerando o tempo que resta hoje e o tempo necessário para a impressão, na prática, resta apenas um dia. Você está dizendo que tem confiança de que conseguirá terminar a metade restante do manuscrito em apenas um dia?"
10027060-307 = "Só vou saber se eu tentar, não é?"
10027060-308 = "Mesmo sem a Momiji?"
10027060-309 = "Críticas e mangás só podem ser discutidos depois de concluídos, afinal."
10027060-310 = "...Entendo. Muito bem, nesse caso, eu também esperarei."
10027060-311 = "Estarei ansiosa pelo manuscrito finalizado."
10027060-312 = "...Por favor, faça o seu melhor."
