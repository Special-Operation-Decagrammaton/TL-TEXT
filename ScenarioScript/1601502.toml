[translation]
1601502-1 = "Sugar High"
1601502-2 = "（Arrumei um tempo e fui até o local combinado）"
1601502-3 = "（Vejo Airi correndo em minha direção）"
1601502-4 = "Sensei~!!!"
1601502-14 = "……Tcharam!!"
1601502-15 = "[s1] \"Tcharam!!!\"\n[s2] \"Você está bem animada hoje, hein!?\""
1601502-18 = "Ehehe…… é verdade, talvez eu esteja mais animada que o normal."
1601502-19 = "Eu estava praticando até agora e consegui fazer uma apresentação muito boa, então……!"
1601502-20 = "Foi aí que, de repente, me lembrei de uma loja que queria recomendar ao Sensei."
1601502-21 = "Eu não consegui me conter e acabei entrando em contato com você!"
1601502-22 = "Eu queria muito que o Sensei provasse os doces daquela loja……!"
1601502-23 = "[s3] （Sinto uma energia incrível……）\n[s4] （Uma loja que a Airi recomenda tanto assim…… estou curioso）"
1601502-26 = "Vamos, temos que nos apressar!#nSe não formos logo, a loja pode fechar!"
1601502-27 = "É por aqui!"
1601502-33 = "……Está bem cheio, né."
1601502-34 = "A fila está longa também…… talvez tenhamos que esperar um pouco."
1601502-35 = "Eu disse que levaria uns 10 minutos, me desculpe……."
1601502-36 = "Se tivéssemos chegado um pouco mais cedo……."
1601502-37 = "[s5] \"Está tudo bem.\"\n[s6] \"Amanhã também é um dia, não precisa ter pressa, né?\""
1601502-40 = "……Eh?"
1601502-41 = "Amanhã, você diz?"
1601502-42 = "Hmm…… mas, isso……."
1601502-43 = "[s] \"……Airi?\""
1601502-44 = "……Não!"
1601502-45 = "……Tem que ser hoje!"
1601502-46 = "De qualquer forma, vamos entrar na fila!!"
1601502-47 = "Se não for assim……!"
1601502-51 = "……."
1601502-52 = "……Fiz de novo."
1601502-53 = "[s7] \"……Airi?\"\n[s8] \"O que você quer dizer com 'de novo'……?\""
1601502-56 = "Bem, é que…… ugh……."
1601502-57 = "Me desculpe.#nO Sensei tem seus compromissos, e eu insistindo para ficarmos na fila……."
1601502-58 = "O Sensei deve ter outras coisas para fazer……"
1601502-59 = "Às vezes, eu fico teimosa desse jeito.#nAté as meninas já tinham me avisado…… ugh……."
1601502-60 = "Desculpe por mostrar esse meu lado tão patético……."
1601502-61 = "Como você disse, vamos deixar para amanhã!#nOu então, podemos marcar outro dia!"
1601502-65 = "……Eh?"
1601502-66 = "Mesmo que você não tenha outros compromissos……."
1601502-67 = "Pode ser que leve horas……."
1601502-68 = "[s9] \"Se for com a Airi, eu espero quantas horas forem.\"\n[s10] \"Não se preocupe, está tudo bem.\""
1601502-71 = "Sensei……."
1601502-72 = "……Ehehe."
1601502-73 = "Mas, ainda assim, quando olho para essa fila……."
1601502-74 = "Ugh, me desculpe…… acabamos ficando nesse impasse……."
1601502-75 = "Por que o Sensei faz tanto por mim……?"
1601502-76 = "[s11] \"Porque, enquanto esperamos, eu também tenho coisas que quero te perguntar.\"\n[s12] \"Pode me contar mais sobre essa história de 'as amigas sempre me avisam'?\""
1601502-79 = "Ah."
1601502-83 = "……Fufu."
1601502-84 = "Ahaha……!"
1601502-85 = "Não é nada demais, mas……."
1601502-86 = "Mas, se o Sensei realmente quer ouvir... então, tudo bem."
1601502-87 = "Costumam dizer que eu sou uma pessoa muito detalhista..."
1601502-88 = "Para ser mais específica, por exemplo..."
1601502-89 = "Hmm... é difícil explicar quando me pedem de repente..."
1601502-90 = "Bem, pensando em algo que me veio à mente agora..."
1601502-95 = "...Isso vai levar cerca de uma ou duas horas, tudo bem para você?"
