[translation]
1601502-1 = "シュガーハイ"
1601502-2 = "（時間を工面し、約束の場所へと向かった）"
1601502-3 = "（向こうからアイリが走ってくるのが見える）"
1601502-4 = "せんせ～！！！"
1601502-14 = "……じゃーん！！"
1601502-15 = "[s1] \"じゃーん！！！\"\n[s2] \"今日はテンション高いね！？\""
1601502-18 = "えへへ……たしかに、いつもよりテンション高めかもしれません。"
1601502-19 = "さっきまで練習してて、良い感じの演奏ができたので……！"
1601502-20 = "その時にふと、先生にオススメしたいお店を思い出しまして。"
1601502-21 = "もう居ても立っても居られなくて、先生に連絡しちゃいました！"
1601502-22 = "早く先生に、あのお店のスイーツを味わってほしくて……！"
1601502-23 = "[s3] （すごい勢いを感じる……）\n[s4] （アイリがそこまで言うお店……気になる）"
1601502-26 = "さあ、急ぎましょう！#n早く行かないと、お店閉まっちゃうかもですし！"
1601502-27 = "こっちです！"
1601502-33 = "……結構混んでますね。"
1601502-34 = "列も長いですし……ちょっと待つかもしれません。"
1601502-35 = "10分くらいとお伝えしていたのに、すみません……。"
1601502-36 = "もう少し早く来られれば……。"
1601502-37 = "[s5] \"大丈夫だよ。\"\n[s6] \"明日もあるし、急がなくても良いんじゃないかな。\""
1601502-40 = "……え？"
1601502-41 = "また明日、ですか？"
1601502-42 = "うーん……でも、それは……。"
1601502-43 = "[s] \"……アイリ？\""
1601502-44 = "……いえ！"
1601502-45 = "……今日じゃないとダメです！"
1601502-46 = "とにかく並びましょう！！"
1601502-47 = "そうでないと……！"
1601502-51 = "……。"
1601502-52 = "……またやってしまいました。"
1601502-53 = "[s7] \"……アイリ？\"\n[s8] \"「また」っていうのは……？\""
1601502-56 = "えっと、その……うぅ……。"
1601502-57 = "ごめんなさい。#n先生のご都合もあるのに、無理に並び続けようだなんて……。"
1601502-58 = "先生には、他のご予定もあるはずなのに……"
1601502-59 = "たまに、こうやってムキになっちゃうんです。#nみんなにも言われてたのに……うう……。"
1601502-60 = "こんな情けない姿を見せてしまって……すみません……。"
1601502-61 = "仰る通り、明日にしましょうか！#nもしくは仕切り直して、別の日でも！"
1601502-65 = "……え？"
1601502-66 = "そんな、他の予定が無いとしても……。"
1601502-67 = "もしかしたら何時間もかかってしまうかも……。"
1601502-68 = "[s9] \"アイリと一緒なら何時間でも。\"\n[s10] \"心配しないで大丈夫だよ。\""
1601502-71 = "先生……。"
1601502-72 = "……えへへ。"
1601502-73 = "で、ですがやっぱり、この列を見ると……。"
1601502-74 = "うぅ、すみません……押し問答みたいになってしまい……。"
1601502-75 = "先生は、どうしてそこまで……？"
1601502-76 = "[s11] \"待っている間に、私も聞きたいことができたから。\"\n[s12] \"その「友達によく言われる」って話、詳しく聞かせてくれる？\""
1601502-79 = "えっ。"
1601502-83 = "……ふふっ。"
1601502-84 = "あははっ……！"
1601502-85 = "そんな、大した話じゃないのに……。"
1601502-86 = "ですが、先生が聞きたいというのなら……はい。"
1601502-87 = "私、こだわりが強いってよく言われがちで……。"
1601502-88 = "具体的には、例えば……。"
1601502-89 = "うーん……いざ話そうとすると難しいですね……。"
1601502-90 = "そうですね、ふと思い出した話で行きますと――"
1601502-95 = "……これ、1、2時間くらいかかりますが良いですか？"
