[translation]
10009010-1 = "Episódio 1; Ataque, Parte 1"
10009010-2 = "D.U. - Ao longo da avenida central"
10009010-4 = "Hum. Que morte... interessante..."
10009010-5 = "Não, não parece que haverá feridos."
10009010-6 = "[s] \"Isso é bom...\""
10009010-7 = "…Sim, é verdade. Mas, Sensei, quero deixar claro que não estou interessada em mortes por curiosidade..."
10009010-8 = "Não é como se eu quisesse ver feridos..."
10009010-9 = "Bem, na verdade, eu gostaria de ver um pouco."
10009010-10 = "[s] \"Você é sincera...\""
10009010-11 = "…No entanto, como é um evento especial, é melhor que nada aconteça. Isso também é um fato."
10009010-12 = "Dada a natureza das atividades do nosso departamento, a ausência de oportunidades para agir significa que há paz."
10009010-13 = "[s] \"Sena, você é muito séria.\""
10009010-14 = "…Bem, ainda assim, é um pouco decepcionante."
10009010-15 = "[s] \"Entendi...\""
10009010-17 = "(Enquanto conversava com Sena sobre várias coisas, chegamos ao fim da avenida principal...)"
10009010-22 = "…Reinicialização do sistema de segurança, OK."
10009010-23 = "Deve funcionar corretamente agora."
10009010-24 = "Muito obrigada! Que rápido, como esperado da Veritas! Estou aliviada...!"
10009010-25 = "Não foi nada demais."
10009010-29 = "Bem, vou indo nessa."
10009010-30 = "[s] \"Ah, Chihiro.\""
10009010-31 = "Ué, Sensei?"
10009010-32 = "E essa garota aí... é de Gehenna?"
10009010-33 = "O que vocês estão fazendo? Sozinhos no Dia dos Namorados..."
10009010-34 = "Ah, isso, como posso dizer. Bem..."
10009010-35 = "Estou fazendo uma patrulha com o Sensei."
10009010-36 = "Para garantir cadáveres."
10009010-37 = "C-cadáveres? Garantir...? Que tipo de coisa ilegal vocês estão fazendo?"
10009010-38 = "[s] \"É uma patrulha normal... E você, Chihiro?\""
10009010-39 = "Parece suspeito, mas..."
10009010-40 = "Bem, imagino que tenha seus motivos."
10009010-41 = "Eu estou... bom, a pedido da Academia de Polícia Valkyrie. Fazendo manutenção de sistemas, verificando a segurança, essas coisas."
10009010-42 = "Verificando se os equipamentos de comunicação instalados por aqui não estão obsoletos, se o controle dos sprinklers e outros sistemas não estão agindo de forma estranha."
10009010-43 = "Com tanta gente circulando, há muitas coisas com as quais precisamos ter cuidado."
10009010-44 = "[s] \"Você também está ocupada, Chihiro. Bom trabalho.\""
10009010-45 = "…Bem, não é para tanto."
10009010-46 = "Foi um pedido oficial feito à Veritas. Como a Himari está fora por um tempo, eu preciso dar conta do recado."
10009010-47 = "Além disso, sabe como é, é Dia dos Namorados."
10009010-48 = "É um dia importante, não é? Para que este dia seja passado com segurança e tranquilidade. Por isso, esse esforço é o mínimo."
10009010-49 = "[s] \"A Chihiro é incrível mesmo.\""
10009010-50 = "Já disse que não é nada disso..."
10009010-51 = "Ufa. Bem, já que estamos aqui... o Sensei também está em patrulha, certo?"
10009010-55 = "Vou para o próximo local, se for na mesma direção, quer ir junto?"
10009010-56 = "Sim. Não sabemos quando ou onde um cadáver,"
10009010-57 = "ou melhor, um ferido, pode aparecer. Vamos começar logo."
10009010-58 = "…Vocês realmente não estão fazendo nada perigoso, né?"
10009010-59 = "[s] \"E-está tudo bem...\""
10009010-62 = "Nossa... escoltas são tão entediantes."
10009010-63 = "Fubuki, se você ficar tão relaxada assim, a chefe da segurança vai ficar brava...!"
10009010-64 = "Calma, calma. Na verdade, é a Kirino que está tensa demais."
10009010-65 = "Ma-mas, considerando quem é o alvo que estamos escoltando...!"
10009010-66 = "Ei, você não está preocupada demais?"
10009010-67 = "É claro que estou preocupada..."
10009010-68 = "Afinal de contas,"
10009010-70 = "estamos falando daquela 'Raposa da Calamidade', dita como a mais perigosa entre os Sete Prisioneiros!?"
10009010-71 = "Ouvi dizer que ela sozinha conseguiu incitar muitos encrenqueiros e até causou um tumulto que deixou o Conselho Estudantil Geral em apuros naquela época...!"
10009010-73 = "Bem, naquela época estávamos todos atordoados com o desaparecimento da Presidente do Conselho Estudantil. Não tinha como evitar."
10009010-74 = "Mesmo levando isso em conta, não podemos baixar a guarda. Além disso, ouvi um boato outro dia."
10009010-75 = "Um boato...?"
10009010-76 = "Dizem que a 'Raposa da Calamidade' é extremamente maligna e, além disso, incrivelmente astuta...!"
10009010-77 = "Dizem que ela possui uma habilidade aterrorizante que faz com que você seja enfeitiçado só de trocar algumas palavras com ela, ou algo assim!?"
10009010-81 = "…De que mangá você tirou isso?"
10009010-82 = "Bem, de qualquer forma, acalme-se, Kirino. Não precisa se preocupar."
10009010-83 = "Po-por que a Fubuki está tão calma assim..."
10009010-84 = "Se fôssemos apenas nós da Divisão de Segurança Pública, tudo bem, mas tem um monte de gente da Divisão de Guarda aqui também, não tem?"
10009010-85 = "Bem, eu hesitei um pouco em tirar aquela máscara e roupas bonitas, mas depois que a prendemos, recolhemos todas as armas e tudo mais. Por mais que ela seja a Raposa da Calamidade, como ela vai escapar desse jeito?"
10009010-86 = "A menos que ela use magia literalmente, não tem como ela escapar nessa situação—"
10009010-90 = "Eeeh...?"
10009010-91 = "Ela escapou, não escapou!?"
10009010-97 = "…Uma explosão?"
10009010-98 = "O que foi de repente? Algum cano explodiu em algum lugar?"
10009010-99 = "[s] \"Isso não parece ser apenas uma explosão...\""
10009010-103 = "Plantão urgente! Há pouco, um veículo da Valkyrie que seguia para o Departamento Correcional foi explodido!"
10009010-104 = "Recebemos a notícia de que um grande grupo de encrenqueiros está cometendo atos de violência no local!"
10009010-110 = "Sensei, onde você está agora!?"
10009010-111 = "[s] \"Fubuki!?\""
10009010-112 = "O veículo de escolta explodiu e a 'Raposa da Calamidade' fugiu! Aproveitando o momento, vários tipos de pessoas atacaram, roubaram os veículos blindados e equipamentos da Valkyrie...!"
10009010-113 = "Sensei, me ajude! Se continuar assim...!"
10009010-114 = "Não vai ser só um relatório de desculpas, minhas férias vão ser cortadas!!"
10009010-115 = "A direção para onde a 'Raposa da Calamidade' foi é...!"
10009010-121 = "[ns] \"...Parece que a direção era por aqui.\""
10009010-123 = "Fufufu... eu sinto o cheiro dela."
10009010-127 = "Eu nunca, nunca vou deixar você escapar...!"
10009010-130 = "#video;10009"
