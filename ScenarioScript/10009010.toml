[translation]
10009010-1 = "第1話;襲撃その一"
10009010-2 = "D.U.・中央通り沿い"
10009010-4 = "ふむ。なかなか死た……"
10009010-5 = "いえ、負傷者が出る気配はありませんね。"
10009010-6 = "[s] \"良いことだね……。\""
10009010-7 = "……ええ、そうですね。言っておきますが先生、私は決して興味本位で死……"
10009010-8 = "負傷者を見たいと思っているわけでは……。"
10009010-9 = "いえ、少しは見てみたいのですが。"
10009010-10 = "[s] \"素直だ……。\""
10009010-11 = "……しかしながら、せっかくのイベントですから何も起きないに越したことは無い。そう思っているのも事実です。"
10009010-12 = "私たちの部はその活動内容からして、活躍の機会が無いことが平和を意味しますので。"
10009010-13 = "[s] \"セナは真面目だね。\""
10009010-14 = "……まあ、やはり多少残念ではありますが。"
10009010-15 = "[s] \"そっかぁ……。\""
10009010-17 = "（そうやってセナと色々会話をしつつ、大通りの終わりに着いた頃……）"
10009010-22 = "……セキュリティシステムの再起動、OK。"
10009010-23 = "これできちんと動くはずです。"
10009010-24 = "ありがとうございます！速いですね、さすがはヴェリタス！安心しました……！"
10009010-25 = "いえ、大したことじゃありませんから。"
10009010-29 = "じゃあ私はこれで。"
10009010-30 = "[s] \"あっ、チヒロ。\""
10009010-31 = "あれ、先生？"
10009010-32 = "そっちの子は……ゲヘナの？"
10009010-33 = "何してるの？バレンタインデーに二人っきりってことは……"
10009010-34 = "あーその、何て言うのかな。えっと……"
10009010-35 = "先生とパトロールを行っております。"
10009010-36 = "死体確保のために。"
10009010-37 = "し、死体？確保……？いったいどんな不法なことをやってるの？"
10009010-38 = "[s] \"普通のパトロールだよ……チヒロの方は？\""
10009010-39 = "何か怪しいけど……"
10009010-40 = "ま、事情があるんだね。"
10009010-41 = "私の方は……まあ、ヴァルキューレ警察学校からの依頼で。色々システムの整備とか、セキュリティの点検とか。"
10009010-42 = "この辺に設置された通信機器が老朽化してないか、スプリンクラーとかのシステム制御部分が変になってないか、そういうチェックをね。"
10009010-43 = "これだけ賑わってる状態だし、色々と気を付けておかないといけないことが多いから。"
10009010-44 = "[s] \"チヒロも大変だね、お疲れ様。\""
10009010-45 = "……ま、それほどでもないよ。"
10009010-46 = "ヴェリタスに正式に入ってきた依頼だし。ヒマリがしばらく席を外してる以上、私がちゃんとしないとね。"
10009010-47 = "それにほら、バレンタインデーだからさ。"
10009010-48 = "大切な日でしょ。今日という日を安全に、大事に過ごせるように。そのためならこれくらいの手間は、ね。"
10009010-49 = "[s] \"やっぱりチヒロはすごいね。\""
10009010-50 = "だから、そんなんじゃないってば……。"
10009010-51 = "ふう。じゃあ、せっかくだし……先生もパトロール中なんだよね？"
10009010-55 = "次のところに向かうんだけど、方向が同じなら一緒に行かない？"
10009010-56 = "はい。いつどこで死体、"
10009010-57 = "ではなく負傷者がいるかも分かりません。迅速に始めましょう。"
10009010-58 = "……本当に、危ないことしてたりしないよね？"
10009010-59 = "[s] \"だ、大丈夫……。\""
10009010-62 = "いやー……護送は退屈だねぇ。"
10009010-63 = "フブキ、そんなにだらけていたら警備局長に怒られますよ……！"
10009010-64 = "まあまあ、むしろキリノの方は固くなり過ぎだよ。"
10009010-65 = "で、ですが護送中の対象が対象だけに……！"
10009010-66 = "えー、心配し過ぎじゃない？"
10009010-67 = "心配もしますよ……。"
10009010-68 = "なにせ、"
10009010-70 = "七囚人の中でも一番凶悪だと言われるあの「災厄の狐」さんですよ！？"
10009010-71 = "実際にたった一人で多くの問題児たちを扇動しつつ、いつぞやは連邦生徒会の面々を翻弄するほどの騒動を起こしていたって聞きましたし……！"
10009010-73 = "まあ、あの時は連邦生徒会長の失踪でバタバタしてたんだし。しょうがないでしょ。"
10009010-74 = "それを加味しても油断はできません。それに、先日とある噂を聞きました。"
10009010-75 = "噂……？"
10009010-76 = "「災厄の狐」さんは非常に邪悪で、その上とんでもなくずる賢くって……！"
10009010-77 = "ちょっと言葉を交わしただけで憑りつかれてしまうような、恐ろしい能力を持っているとか持っていないとか！？"
10009010-81 = "……それ、何の漫画？"
10009010-82 = "まあ、とにかく落ち着きなよキリノ。心配いらないって。"
10009010-83 = "ど、どうしてフブキはそこまで落ち着いてるんですか……。"
10009010-84 = "私たち生活安全局だけならまだしも、ここには警備局のやつらもあんなにいるんだよ？"
10009010-85 = "まああの綺麗な仮面やら服を剥ぐのは流石に躊躇したけど、逮捕した後に武器やらなんやらは全部回収したし。いくら災厄の狐と言ったって、あれでどうやって逃げるのさ？"
10009010-86 = "文字通り魔法でも使わない限り、まさかこの状況で脱走なんて――"
10009010-90 = "えぇー……？"
10009010-91 = "脱走したじゃないですかぁ！？"
10009010-97 = "……爆発？"
10009010-98 = "どうしたの急に、どこかのパイプでも爆発した？"
10009010-99 = "[s] \"これ、ただの爆発じゃなくって……。\""
10009010-103 = "緊急速報です！先ほど、矯正局へと向かっていたヴァルキューレの車両が爆破！"
10009010-104 = "そこで多数の問題児集団が、暴行を働いているというニュースが入りました！"
10009010-110 = "先生、今どこ！？"
10009010-111 = "[s] \"フブキ！？\""
10009010-112 = "護送中の車両が爆発して、「災厄の狐」が脱走した！そのタイミングで何か色んなやつらが襲ってきて、ヴァルキューレの装甲車やら装備やらが奪われて……！"
10009010-113 = "先生、助けて！このままじゃ……！"
10009010-114 = "始末書どころか、私の休暇が削られかねない！！"
10009010-115 = "「災厄の狐」が向かった方向は……！"
10009010-121 = "[ns] \"……方向、こっちだったみたいだね。\""
10009010-123 = "ふふふっ……匂いがしますねぇ。"
10009010-127 = "決して、決して逃しはしません……！"
10009010-130 = "#video;10009"
