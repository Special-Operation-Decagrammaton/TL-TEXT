[translation]
1000105-1 = "Pesquisando as últimas tendências (2)"
1000105-2 = "Kivotos - Centro da cidade"
1000105-3 = "Ah, Sensei. Acabei de descobrir algo novo."
1000105-4 = "Segundo meus amigos da escola, parece que cantar karaokê juntos está na moda ultimamente."
1000105-5 = "Não consigo entender como pode ser divertido se reunir em uma sala apertada para cantar, mas..."
1000105-6 = "Em vez de julgar sem tentar, é mais eficiente experimentar na prática, não é?"
1000105-7 = "Vamos, Sensei. Vamos ao karaokê agora mesmo."
1000105-8 = "[s] \"Não seria mais divertido ir com seus amigos do que comigo?\""
1000105-9 = "Isso não serve. Karaokê é perigoso."
1000105-10 = "[s] \"Karaokê é perigoso?\""
1000105-11 = "O karaokê é um espaço fechado e apertado, e além disso, tem isolamento acústico, então ninguém de fora saberia o que está acontecendo lá dentro."
1000105-12 = "Se eu fosse atacada por alguém perigoso lá dentro... eu certamente seria derrotada."
1000105-13 = "Por isso, a decisão correta é ir com você, Sensei, meu \"camarada de armas\" de confiança."
1000105-15 = "Bem, então vamos cantar... digo, vamos investigar o karaokê."
1000105-17 = "Depois disso, eu e Eimi fomos ao karaokê e nos esforçamos para cantar."
1000105-18 = "Fiquei surpreso ao ver que a Eimi canta muito melhor do que eu imaginava..."
