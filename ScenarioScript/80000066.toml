[translation]
80000066-1 = "美味しくなあれ"
80000066-3 = "（連絡を貰ってカフェに向かうと、そこにはアルバイト中のカリンがいた）"
80000066-4 = "あ、先生……いや、ご主人様。いらっしゃいませ。"
80000066-5 = "ん、ああ、用件？大したことではないんだけど……"
80000066-6 = "今日はその、だから……。"
80000066-7 = "[s1] \"もしかしてバレンタインデーだから、とか？\"\n[s2] 静かに席に座る。"
80000066-8 = "……流石は先生、話が早い。"
80000066-9 = "……流石は先生、話が早い。"
80000066-10 = "日頃から先生には助けてもらってばかりだから。大したものは用意できないけれど、恩返しができないかと思ったんだ。"
80000066-11 = "……今さらだけど、忙しい中で呼んで申し訳ない。"
80000066-12 = "……大丈夫？いつでも時間は作る、って……？"
80000066-13 = "ふふっ……先生はいつもそう言うから。鵜呑みにしてはいけないと思ってても、何だかつい頼ってしまうな。"
80000066-14 = "まあ今日はせっかくだし、甘えさせてもらうとしよう。"
80000066-15 = "というわけでこれは、私からのプレゼント。"
80000066-19 = "……？うん、オムライスだ。"
80000066-20 = "ここは、チョコレートとかのメニューは無いタイプのお店で……。"
80000066-21 = "でも……"
80000066-29 = "[ns3] \"ケチャップの代わりに、チョコレートを……！？\"\n[ns4] \"チョコレートオムライス……！？\""
80000066-30 = "うん。色々悩んだのだけど、先生のためだけのオリジナルのメニュー。喜んでもらえたら嬉しい。"
80000066-31 = "うん。色々悩んだのだけど、先生のためだけのオリジナルのメニュー。喜んでもらえたら嬉しい。"
80000066-32 = "……え？"
80000066-33 = "……足りない？それは量の問題で……？"
80000066-34 = "……え、呪文？"
80000066-35 = "あっ……いや、確かにメイドカフェでは定番だけど……！"
80000066-36 = "その、先生にそれをやるのは、逆に一番恥ずかしいというか……！"
80000066-37 = "……。"
80000066-38 = "……分かった。恥ずかしいけれど、今日は先生のための日だから。先生が望むなら、頑張って……。"
80000066-39 = "えっと、じゃあ……。"
80000066-40 = "[s5] \"おお……。\"\n[s6] \"これは嬉しい……！\""
80000066-41 = "お、美味しくなぁれ……！"
80000066-42 = "お、美味しくなぁれ……！"
80000066-43 = "萌え、萌え……っ！！"
80000066-47 = "やっ、やっぱり無理だああぁぁぁぁっ！！"
