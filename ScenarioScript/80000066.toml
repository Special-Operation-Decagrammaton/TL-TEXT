[translation]
80000066-1 = "Fique delicioso"
80000066-3 = "（Ao receber a mensagem e ir ao café, encontro Karin trabalhando meio período.）"
80000066-4 = "Ah, Sensei... não, mestre. Seja bem-vindo."
80000066-5 = "Hum, ah, sobre o motivo de eu ter te chamado? Não é nada demais, mas..."
80000066-6 = "Hoje é, bem, por causa disso..."
80000066-7 = "[s1] \"Por acaso é por causa do Dia dos Namorados?\"\n[s2] Sento-me silenciosamente."
80000066-8 = "……Como esperado do Sensei, você entende rápido."
80000066-9 = "……Como esperado do Sensei, você entende rápido."
80000066-10 = "Como você sempre me ajuda no dia a dia, pensei em como poderia retribuir, mesmo que não seja nada grandioso."
80000066-11 = "……É um pouco tarde para dizer isso, mas sinto muito por te chamar enquanto você está ocupado."
80000066-12 = "……Está tudo bem? Você diz que sempre arranja tempo...?"
80000066-13 = "Hehe... O Sensei sempre diz isso. Mesmo sabendo que não deveria levar tão a sério, acabo confiando em você."
80000066-14 = "Bem, já que hoje é um dia especial, vou aproveitar essa oportunidade."
80000066-15 = "Sendo assim, este é o meu presente para você."
80000066-19 = "……? Sim, é um omurice."
80000066-20 = "Este é o tipo de loja que não tem opções de chocolate no menu..."
80000066-21 = "Mas..."
80000066-29 = "[ns3] \"Em vez de ketchup, você usou chocolate...!?\"\n[ns4] \"Omurice de chocolate...!?\""
80000066-30 = "Sim. Pensei bastante, e este é um menu original feito apenas para o Sensei. Ficarei feliz se você gostar."
80000066-31 = "Sim. Pensei bastante, e este é um menu original feito apenas para o Sensei. Ficarei feliz se você gostar."
80000066-32 = "……Eh?"
80000066-33 = "……Está faltando algo? É uma questão de quantidade...?"
80000066-34 = "……Eh, o feitiço?"
80000066-35 = "Ah... não, é verdade que é um clássico em maid cafés, mas...!"
80000066-36 = "É que, fazer isso para o Sensei é, na verdade, a coisa mais vergonhosa de todas...!"
80000066-37 = "……."
80000066-38 = "……Entendi. É vergonhoso, mas hoje é um dia para o Sensei. Se é o que você deseja, eu vou me esforçar..."
80000066-39 = "Bem, então..."
80000066-40 = "[s5] \"Oh...\"\n[s6] \"Isso é maravilhoso...!\""
80000066-41 = "O, fique delicioso...!"
80000066-42 = "O, fique delicioso...!"
80000066-43 = "Moe, moe...!!"
80000066-47 = "N-não dá, é impossível aaaaaahhh!!"
