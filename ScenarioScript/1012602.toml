[translation]
1012602-1 = "medicamento especial"

1012602-2 = "(Como não houve resposta de Kanoe, fui para o dormitório do Grupo de Pesquisa Oculta por enquanto.)"

1012602-8 = "Dormitório do Grupo de Pesquisa Oculta"

1012602-10 = "Bem-vindo...professor."

1012602-11 = "Afinal, o vínculo da sua vida anterior é real. #nTalvez ele tenha sentido minha falta e corrido até mim...?"

1012602-12 = "[s1] \"O que, vida passada?\"\n[s2] \"...vínculo?\""

1012602-15 = "sim. #nTemos um forte vínculo de nossas vidas anteriores."

1012602-16 = "...Huh? #nVocê não se lembra...?"

1012602-17 = "Mesmo que você sempre tenha sussurrado palavras tão apaixonadas para mim..."

1012602-23 = "Talvez você tenha esquecido minha temperatura corporal também...?"

1012602-24 = "[s] \"As mãos de Kanoe são tão legais...!?\""

1012602-25 = "eu realmente esqueci..."

1012602-26 = "Uma mulher com mãos frias mas um coração caloroso... essa sou eu."

1012602-27 = "Lembro-me de todo o tempo que passei com você na minha vida anterior... sou uma mulher muito compassiva."

1012602-32 = "E ela também é uma mulher versada em todos os tipos de coisas ocultas... Ihi."

1012602-33 = "Vamos... vou lembrá-lo imediatamente."

1012602-34 = "Por isso liguei para a professora."

1012602-35 = "Por favor, aguarde. #nUsarei a alquimia para criar um remédio que irá reviver suas memórias de sua vida anterior."

1012602-36 = "……mas. #nNenhum medicamento pode ser feito sem os ingredientes..."

1012602-37 = "É por isso que... é necessário. #nUm material especial repleto de lembranças do professor."

1012602-38 = "[s] \"O que você precisa...?\""

1012602-39 = "Isso é... é propriedade do professor..."

1012602-40 = "Vamos, dê-nos o que você tem. #nClaro, as roupas que estou vestindo... cada uma delas."

1012602-41 = "É tudo meu agora. Ihihi..."

1012602-42 = "[s] \"...!?\""

1012602-49 = "Desculpe... talvez eu tenha assustado você?"

1012602-50 = "Brincadeira... Na verdade, não precisa ser todos."

1012602-51 = "Apenas uma coisa...#nPor exemplo, algo pequeno como moedas ou papel para memorando seria adequado."

1012602-52 = "[s] \"Isso é realmente necessário...?\""

1012602-53 = "claro……."

1012602-54 = "Já preparei um caldeirão para alquimia."

1012602-55 = "Uma panela misteriosa onde você pode criar o que quiser adicionando os ingredientes e mexendo bem...#n."

1012602-56 = "Ei... como? #n-sensei também... você não gostaria de ver como ele faz o elixir?"

1012602-60 = "[ns3] Eu aceno com a cabeça, preocupado. \n[ns4] Pode ser uma pegadinha, mas vou tentar entrar no assunto."

1012602-63 = "...Ele finalmente pegou o jeito."

1012602-64 = "Pois bem, por favor, me dê um de seus pertences. #n...Eu farei para você o melhor remédio."

1012602-65 = "[ns5] Tira um lenço do bolso. \n[ns6] Tire uma caneta da sua bolsa."

1012602-68 = "Isso parece ser um bom catalisador para o professor."

1012602-69 = "Se você não guardar com cuidado..."

1012602-70 = "[s] \"Você não deveria colocar isso no caldeirão?\""

1012602-71 = "Você deveria tomar remédio?"

1012602-72 = "Então, se você não pode comer nada... não coloque aí."

1012602-73 = "Eu não brinco com comida...Ihe..."

1012602-74 = "[s] (Eles estão fazendo certo...)"

1012602-75 = "Pois bem, vamos levar a sério a criação de um remédio milagroso..."

1012602-76 = "Primeiro... corte os tomates cozidos e outros vegetais..."

1012602-80 = "[ns] \"Q-Quando você começou a se preparar...?\""

1012602-81 = "Hehe, sou do tipo que se prepara bem..."

1012602-82 = "A seguir... refogue a carne temperada e acrescente o molho #n..."

1012602-88 = "[ns] \"Hum... você está fazendo um elixir, certo?\""

1012602-89 = "Sim... esta é definitivamente uma droga milagrosa."

1012602-90 = "É tão poderoso que me lembra o vínculo da minha vida anterior... ei."

1012602-91 = "Só falta ferver os ingredientes..."

1012602-93 = "(Depois disso, Kanoe continua colocando vários ingredientes no caldeirão e fazendo algo...)"

1012602-97 = "[ns] \"Cheira bem...\""

1012602-98 = "(depois de um tempo......)"

1012602-101 = "Sim...concluído."

1012602-102 = "Este é um elixir que irá lembrá-lo dos laços da sua vida anterior."

1012602-106 = "Este ensopado de carne com tomate está cheio do meu amor."

1012602-107 = "[s] \"Não é um elixir!?\""

1012602-108 = "É uma droga milagrosa."

1012602-109 = "Se você comer isso, vai entender como me sinto. #nVenha... fique à vontade para aproveitar."

1012602-110 = "[ns7] Não sei se é uma droga milagrosa, mas vou tentar mesmo assim. \n[ns8] Atraído pelo cheiro delicioso, experimentei o ensopado."

1012602-117 = "[ns] \"T-esse gosto...!!!\""

1012602-118 = "Ei, o que você acha? As memórias da sua vida anterior voltaram?"

1012602-119 = "Mesmo neste mundo, ter uma boa mulher como eu ao seu lado... você é feliz, não é?"

1012602-120 = "[s] \"Tão delicioso!!\""

1012602-124 = "[ns] \"Tem gosto daquele que eu fazia quando era criança...\""

1012602-125 = "C-quando você era criança? #nEu gostaria de poder voltar um pouco mais atrás..."

1012602-129 = "Entendo...eu também tenho minha cota de fracassos..."

1012602-130 = "Ei, mas não vou desistir..."

1012602-131 = "Se o remédio milagroso não funcionar, trarei seu coração de volta com palavras..."

1012602-132 = "Não importa quando ou onde você esteja... vou te contar uma história tão intensa que você só vai se lembrar de mim."

1012602-133 = "Hee hee… sim, hee hee…."

1012602-134 = "Ihihihihi...!"

1012602-136 = "(...Depois disso, tive uma conversa animada com Kanoe enquanto comia um delicioso ensopado.)"

