[translation]
1012602-1 = "特別な妙薬"
1012602-2 = "（カノエから返事がないため、ひとまずオカルト研究会の寮に向かった）"
1012602-8 = "オカルト研究会の寮"
1012602-10 = "いらっしゃい……先生。"
1012602-11 = "やっぱり、前世からの絆は本物だね。#n私が恋しくて、駆けつけてくれたのかなぁ……？"
1012602-12 = "[s1] \"ぜ、前世？\"\n[s2] \"……絆？\""
1012602-15 = "そう。#n私たちは、前世から強い絆で結ばれてる。"
1012602-16 = "……あれぇ？#n覚えてないの……？"
1012602-17 = "いつもあんなに……情熱的な言葉を囁いてくれてたのに……。"
1012602-23 = "もしかして、私の体温も……忘れちゃった……？"
1012602-24 = "[s] \"カノエの手、ひんやりしてるんだね……！？\""
1012602-25 = "ほんとに、忘れちゃったんだぁ……。"
1012602-26 = "手は冷たくても、心は熱い女……それが私。"
1012602-27 = "あなたと前世で過ごした時間もぜんぶ覚えてる……情の深い女。"
1012602-32 = "そして、あらゆるオカルトに精通した女でもある……イヒ。"
1012602-33 = "さあ……すぐにでも思い出させてあげるよ。"
1012602-34 = "そのために……先生を呼んだんだからねぇ。"
1012602-35 = "待っててね。#n錬金術で――前世の記憶を蘇らせる薬を作ってあげるから。"
1012602-36 = "……でも。#nどんな薬も、材料がなければ作れない……。"
1012602-37 = "だから……必要なんだ。#n先生の思い出が詰まった、特別な材料が。"
1012602-38 = "[s] \"何が必要なの……？\""
1012602-39 = "それは……先生の持ち物だよぉ……。"
1012602-40 = "さぁ、持っているものを出して。#nもちろん、着てる服も……一つ残らず。"
1012602-41 = "もう、ぜーんぶ私の物なんだから。イヒヒッ……。"
1012602-42 = "[s] \"……！？\""
1012602-49 = "ごめん……怖がらせちゃったかなぁ？"
1012602-50 = "冗談だよぉ……ほんとは、全部じゃなくてもいいんだ。"
1012602-51 = "一つだけ……#n例えば、小銭とかメモ紙みたいな小さい物でもいいよぉ。"
1012602-52 = "[s] \"それが本当に必要なの……？\""
1012602-53 = "もちろん……。"
1012602-54 = "もう、錬金術用の大釜も用意してあるんだ。"
1012602-55 = "材料を入れて、上手にかき混ぜると……#nほしいものが出来上がる不思議な釜。"
1012602-56 = "イヒッ……どう？#n先生も……妙薬作り、見てみたいんじゃなぁい？"
1012602-60 = "[ns3] 気になって首を縦に振る。\n[ns4] いたずらかもしれないけど、話に乗ってみる。"
1012602-63 = "……ようやくその気になってくれたねぇ。"
1012602-64 = "じゃあ、先生の持ち物を一つ、ちょうだい。#n……極上の薬を作ってあげるから。"
1012602-65 = "[ns5] ポケットからハンカチを取り出す。\n[ns6] カバンからペンを取り出す。"
1012602-68 = "これが、先生の……うん、いい触媒になりそうだねぇ。"
1012602-69 = "大切に保管しておかないと……。"
1012602-70 = "[s] \"あれ、釜に入れるんじゃないの？\""
1012602-71 = "薬は飲むものでしょう？"
1012602-72 = "だから、食べられないものは……入れちゃダメぇ。"
1012602-73 = "私は食べ物で遊んだりしないからねぇ……イヒ……。"
1012602-74 = "[s] （そこはちゃんとしてるんだ……）"
1012602-75 = "それじゃあ、本格的に妙薬作りをしようか……。"
1012602-76 = "まず……湯むきしたトマトと、他の野菜を切って……。"
1012602-80 = "[ns] \"い、いつの間に下ごしらえを……？\""
1012602-81 = "イヒッ、私はちゃんと準備をするタイプなんだ……。"
1012602-82 = "次は……下味をつけた牛肉を炒めて、#nソースを加え……。"
1012602-88 = "[ns] \"えっと……妙薬を作ってるんだよね？\""
1012602-89 = "うん……これは間違いなく妙薬だよ。"
1012602-90 = "前世の絆を思い出させるくらい、強力な……ねぇ。"
1012602-91 = "あとは……材料を煮込むだけ……。"
1012602-93 = "（その後も、カノエは大釜に色々な食材を入れ、何かを作っていく……）"
1012602-97 = "[ns] \"いい匂い……。\""
1012602-98 = "（しばらくして……）"
1012602-101 = "はい……完成。"
1012602-102 = "これが、前世の絆を思い出させる妙薬――"
1012602-106 = "私の愛がたっぷり入った、トマトビーフシチューだよぉ。"
1012602-107 = "[s] \"妙薬じゃない！？\""
1012602-108 = "妙薬だよ。"
1012602-109 = "これを食べれば私の気持ちが伝わるはず。#nさあ……遠慮なく召し上がれぇ。"
1012602-110 = "[ns7] 妙薬かは分からないが、とりあえず食べてみる。\n[ns8] いい匂いにつられて、シチューを食べてみる。"
1012602-117 = "[ns] \"こ、この味は……！！！\""
1012602-118 = "イヒッ、どう？前世の記憶が蘇ったかなぁ？"
1012602-119 = "現世でも、私みたいな良い女が傍にいて……嬉しいでしょ？"
1012602-120 = "[s] \"すごく美味しい！！\""
1012602-124 = "[ns] \"子どもの頃、よく作ってもらった味だなぁ……。\""
1012602-125 = "こ、子どもの頃？#nもうちょっと前まで遡ってほしいんだけどなぁ……。"
1012602-129 = "そうか……私にも失敗はあるんだねぇ……。"
1012602-130 = "イヒ、でも諦めない……。"
1012602-131 = "妙薬が効かないなら、言葉で心を呼び戻してあげるよぉ……。"
1012602-132 = "いつどこに居ても……私のことしか思い出せないくらい、#n強烈なお話をしようねぇ。"
1012602-133 = "イヒッ……イヒヒッ……。"
1012602-134 = "イヒヒヒッ……！"
1012602-136 = "（……その後、カノエと美味しいシチューを食べながら話に花を咲かせた）"
