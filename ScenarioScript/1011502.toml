[translation]
1011502-1 = "タイミングの特訓"
1011502-2 = "（ミレニアム野球部の練習場に向かった）"
1011502-9 = "あっ！来てくれたんですね。ありがとうございます。"
1011502-10 = "[s1] \"タッチ！\"\n[s2] \"いえ～い！\""
1011502-11 = "いっ、いえ～い！#n……ハイタッチって、ちょっとテンション上がりますよね！"
1011502-12 = "いえ～い！"
1011502-13 = "……よっし。それじゃ、見ててくださいね。"
1011502-15 = "今日の練習、気合い入れていきますから！"
1011502-20 = "（そう言ってレイは意気揚々とバッターボックスに向かったが……）"
1011502-27 = "<スリーストライク……アウト！>"
1011502-28 = "流石はミレニアム製……手強いですね……"
1011502-29 = "でも、次こそは……！"
1011502-35 = "……捉えたっ！"
1011502-39 = "<センターフライ……アウト>"
1011502-40 = "<いい当たりですが、打球の角度が高すぎます>"
1011502-41 = "はぁ……。"
1011502-45 = "<ゴロです>"
1011502-46 = "うっ……！"
1011502-49 = "<内野フライ>"
1011502-50 = "まっ、まだまだ……！"
1011502-54 = "<ストライク……スリーストライク、アウト！>"
1011502-55 = "ううっ……！"
1011502-64 = "お疲れ様でした……。"
1011502-65 = "はあ、今日も全然ダメでしたね……。"
1011502-66 = "当たったと思ってもフライかゴロばっかり……。"
1011502-67 = "でも、一応ノーヒットじゃなかったから、良しとすべきなんでしょうか……。"
1011502-68 = "[ns] \"原因は何だろうね？\""
1011502-69 = "……。"
1011502-70 = "その答えなら、分かってるんです。"
1011502-71 = "[s] \"えっ、本当に？\""
1011502-72 = "結局はタイミングですね。"
1011502-73 = "バッティングはタイミングが命、ピッチャーはそのタイミングを崩すのが仕事……って言いますし。"
1011502-77 = "……あれ？逆だったかも？"
1011502-78 = "とにかく、どんな球だとしても、芯を捉えるタイミングはあります。"
1011502-79 = "そこを見極めてバットを振る必要があって……。"
1011502-80 = "でもそれが難しいんですよ！ストレートか変化球か、どの球種かも見極めなきゃいけないし。"
1011502-81 = "目では追えても、体がついてこないこともあるんです……。"
1011502-82 = "[ns3] \"タイミングか……。\"\n[ns4] \"それなら力になれるかも。\""
1011502-85 = "本当ですか！？ぜひお願いします！"
1011502-86 = "今までは、誰も良い特訓方法を知らなかったので……。"
1011502-87 = "え？発想の転換が大事？信じてついて来い、と？"
1011502-88 = "はい、それはもちろん……って、そ、そんなに押さないでください！"
1011502-89 = "せめてどこに行くのか教えて下さい……！"
1011502-95 = "ここって……ゲームセンターですよね！？"
1011502-96 = "どう考えても、ここで野球の特訓ができるとは思えないんですが……。"
1011502-97 = "[s] \"「タイミング」の特訓ならリズムゲームだよ！\""
1011502-98 = "リズムゲーム……すみません、ゲームはほとんど遊ばないので……。"
1011502-99 = "やれば分かる、ですか……？"
1011502-100 = "物は試しですよね……やってみます！"
1011502-102 = "（物珍しそうにしているレイを連れて、リズムゲームコーナーへと向かった）"
1011502-103 = "（しかし、この時の私はまだ知る由も無かった……新たな伝説に出会うことを……）"
1011502-104 = "なるほど、これがリズムゲーム……。"
1011502-105 = "落ちてくるバーに合わせて、タイミングよくボタンを押す……。"
1011502-106 = "たしかに、良い特訓になりそうですね。"
1011502-107 = "えっ？太鼓を叩いたり、ギターを弾いたり、ドラムを叩くゲームもあるんですか？"
1011502-108 = "一口にリズムゲームと言っても幅広いんですね……。"
1011502-112 = "これだけ多いと迷っちゃいますし……#n素直に、先生おすすめのゲームからやってみます！"
1011502-114 = "（レイが筐体に向き合うと、チュートリアルが流れ始めた）"
1011502-115 = "（そして、束の間の後……）"
1011502-123 = "長押し……ここは抜けやすい……スクラッチ、忘れない……。"
1011502-134 = "おいっ、見ろよ、あの子！"
1011502-135 = "あれ、レベル12の新曲だろ？精度エグイな……。"
1011502-145 = "まだ運指も研究中のはず……まさか反射神経だけで反応してんのか……！？"
1011502-146 = "ここでリズムが崩れるけど……大丈夫！連打パターンも読めました！"
1011502-169 = "……やった！先生！フルコンボです！……あれ？"
1011502-173 = "こ、この状況は……？"
1011502-174 = "[s5] \"えっと……レイ、おめでとう！\"\n[s6] \"歴代ランキング1位だよ！\""
1011502-177 = "1位……？"
1011502-178 = "ただタイミングに合わせて押してただけですよ……？"
1011502-179 = "タイミングに合わせて押した、だけ……！？"
1011502-180 = "リズムゲームにはセンスが必要と言うが……そんなレベルに収まる才覚ではないな……。"
1011502-181 = "これなら伝説の「UZQueen」とも良い勝負になるんじゃないか！？"
1011502-182 = "さっき「レイ」って呼んでたよな？名付けるなら……「レイ・クイーン」の誕生、だな。"
1011502-186 = "え、ええっ……？"
1011502-187 = "あ、あの……もし良かったら、一緒に写真撮らせてもらえませんか……？"
1011502-188 = "えっ！？わ、私、そんなすごくないですし、そもそもゲームじゃなくて野球が本職で……！"
1011502-189 = "えっと、その、ゲーマーの皆さんにすごく申し訳ないというか……。"
1011502-193 = "私はこれで失礼します……っ！！"
1011502-200 = "はぁ、はぁ、はぁ……。"
1011502-207 = "[ns7] \"はぁ、はぁ、はぁ……。\"\n[ns8] \"さすが野球部、足が速い……！\""
1011502-210 = "あっ、先生！？すみません！私、一人で逃げちゃって……！"
1011502-211 = "それに、選手の中ではそんなに速い方でもないんですけど……。"
1011502-212 = "でも、あんなに注目されるなんて……びっくりしました。"
1011502-213 = "振り返ったら急に人が増えてて……完全に不意打ちでしたよ。"
1011502-214 = "[s] \"ごめん、レイ。私のせいだね。\""
1011502-215 = "いえいえ！先生が謝ることでは。"
1011502-216 = "先生は私のためにリズムゲームを教えてくれたんですから。"
1011502-217 = "飛び出してしまったのも、私が慌てすぎただけですし。"
1011502-218 = "それに……。"
1011502-219 = "……あの場を離れたのは、ただ混乱していただけじゃなくて、「戦場」が違うからなんです。"
1011502-220 = "大げさ、でしょうか……でも……"
1011502-221 = "野球は私にとって戦いなんです！"
1011502-222 = "全力で挑む人にとって、その場所こそが「戦場」です。"
1011502-223 = "だから、リズムゲームという「戦場」で戦う人たちに、私が混ざるのはちょっと失礼だったのかなって思って……。"
1011502-224 = "うぅ、私、変なこと言ってますね……。"
1011502-225 = "[s9] \"いや、大丈夫だよ。\"\n[s10] \"レイの「戦場」は野球なんだね。\""
1011502-228 = "そう言ってもらえたら……嬉しいです！"
1011502-229 = "今日は本当にありがとうございました。先生のおかげで、リズム感を掴めた気がします！"
1011502-230 = "これなら「タイミング」もきっと……ピタッとハマった感じで。"
1011502-231 = "次の練習試合では、絶対成功させます！見ててくださいね、先生！"
1011502-233 = "（レイは張り切ってバッターボックスに立った。結果は見事……）"
1011502-234 = "（壮絶な敗北を喫した）"
1011502-235 = "そんなぁあ――！？！？！？！？"
