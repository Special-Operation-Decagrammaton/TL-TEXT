[translation]
1003320-1 = "Coração Oculto"
1003320-2 = "（Sentindo uma aura inquietante vinda do MomoTalk, fui até onde Wakamo estava）"
1003320-8 = "……Ora, Sensei? Vir visitar esta Wakamo… eu me sinto tão feliz."
1003320-9 = "Mas… está tudo bem?#nVocê desperdiçar seu tempo precioso comigo……#nNão, eu estou feliz, mas……"
1003320-10 = "[ns] \"Não precisa se preocupar com isso.\""
1003320-12 = "[ns] \"Eu queria ver a Wakamo.\""
1003320-17 = "Ah, quão misericordioso você é."
1003320-18 = "Certamente não haverá sorte maior nesta vida do que ter encontrado você.#nIsso é o meu destino……"
1003320-19 = "……Então, o que faremos hoje?"
1003320-25 = "A qualquer momento…… para qualquer coisa, esta Wakamo está pronta……"
1003320-26 = "Por favor, peça o que desejar♡"
1003320-27 = "[s] \"Wakamo.\""
1003320-28 = "Fufu. Sim, Sensei."
1003320-29 = "[s1] \"Pode ser uma surpresa eu dizer isso de repente, mas……\"\n[s2] \"Hoje, eu quero que você fique ao meu lado o tempo todo.\""
1003320-32 = "S-sim……!?"
1003320-36 = "Isso é…… um sonho, será……?"
1003320-37 = "A-ah, aaaaa……!"
1003320-38 = "Embora sejam palavras que me deixam imensamente feliz……#nComo algo tão repentino aconteceu, não sei como reagir……!"
1003320-46 = "Espere um pouco, por favor!"
1003320-47 = "[ns] \"W-Wakamo!? Espere!\""
1003320-48 = "（Segui Wakamo, que fugiu em um estado de excitação）"
1003320-62 = "P-por que você está me seguindo!?"
1003320-63 = "[s] \"B-bem, é porque você saiu correndo……\""
1003320-64 = "M-mas agora, isso……!"
1003320-65 = "P-por favor, me dê só mais um pouco de tempo……!"
1003320-66 = "[s] \"Eu só queria que você ficasse comigo hoje!\""
1003320-67 = "Hya!?#nE-então…… bem, eu fico muito feliz com seus sentimentos, mas……"
1003320-71 = "N-não, realmente, agora…… não pode ser……!"
1003320-72 = "[ns] \"Wakamo…… uwaa!?\""
1003320-76 = "A-ah, você!?"
1003320-77 = "（Enquanto perseguia Wakamo, acabei tropeçando）"
1003320-83 = "V-você está bem!? P-peço perdão, peço perdão, peço perdão……! É-é culpa minha……!"
1003320-84 = "[s] \"Eu só tropecei! Fique calma!\""
1003320-85 = "A-ah…… s-sangue……!"
1003320-91 = "[ns] \"Foi só um arranhão, estou bem!\""
1003320-92 = "Não…… algo assim, jamais deveria ter acontecido……"
1003320-93 = "Teria sido melhor se eu tivesse tropeçado……#nMesmo estando ao seu lado, deixar você se ferir……"
1003320-94 = "Este pecado, não tenho outra escolha a não ser compensar pelo resto da minha vida――"
1003320-95 = "[ns] Faço carinho na cabeça de Wakamo."
1003320-101 = "[ns] \"Você se acalmou um pouco?\""
1003320-102 = "Sim……"
1003320-103 = "[s] \"……Hoje, você não vai me mostrar o seu rosto?\""
1003320-104 = "……!"
1003320-110 = "Sinto muito, Sensei……"
1003320-111 = "Hoje, sendo um dia tão importante em que você disse que queria ficar ao meu lado o tempo todo…… não, não apenas hoje, mas que queria ficar ao meu lado para sempre……"
1003320-112 = "Eu acabar exibindo tal comportamento vergonhoso……"
1003320-113 = "[s5] \"E-err…… sobre isso……\"\n[s6]（Eu não cheguei a dizer 'para sempre', mas……）"
1003320-116 = "U…… uuu…… peço perdão, Sensei…… por minha culpa……"
1003320-117 = "[s] \"Não chore…… vamos, Wakamo, levante o rosto, sim?\""
1003320-122 = "……Diante do Sensei, eu sempre quis mostrar quem eu realmente sou……#nDescartar a máscara e mostrar meu rosto verdadeiro…… era o que eu desejava, mas……"
1003320-123 = "Bem, hoje... por algum motivo, meu coração não consegue se acalmar..."
1003320-124 = "[s] \"Quando nos conhecemos pela primeira vez, você também estava usando essa mesma máscara.\""
1003320-125 = "……。"
1003320-130 = "Esta máscara é a minha favorita."
1003320-131 = "Originalmente, era apenas para esconder minha identidade e evitar problemas, mas... h-hoje..."
1003320-132 = "[s] \"Hoje...?\""
1003320-133 = "……！"
1003320-136 = "Não posso dizer com minhas próprias palavras. ...Sensei, você também sabe ser maldoso às vezes. M-mas... eu gosto desse seu lado também... ah..."
1003320-137 = "Mesmo depois de ter passado por tantas coisas dolorosas, você ainda me olha com um olhar tão direto e estende sua mão gentilmente para mim..."
1003320-143 = "E hoje, você ainda me disse que quer ficar comigo para sempre...♡ Já só esse fato é o suficiente para eu...!"
1003320-144 = "[s] \"I-isso é...!\""
1003320-146 = "(Contei honestamente que entrei em contato com Wakamo hoje porque estava preocupado se ela não tinha se envolvido em algum incidente)"
1003320-148 = "...Minhas palavras sobre \"dar o meu melhor\" te deixaram preocupado?"
1003320-149 = "Eu só... queria passar um tempo inesquecível e fatídico com você..."
1003320-150 = "[s7] \"Wakamo, você sempre pensa em mim, não é?\"\n[s8] \"Será que fui intrometido demais... mas estou feliz por termos nos encontrado.\""
1003320-153 = "Fufu, você é muito preocupado, Sensei."
1003320-154 = "Mas, só de você se importar assim comigo, eu... ah...♡"
1003320-155 = "[s] \"Então... tem algum lugar para onde você queira ir?\""
1003320-156 = "……！"
1003320-157 = "Como eu pensei, o fato de hoje ter acontecido foi um milagre...!"
1003320-163 = "Eu irei a qualquer lugar com você. Eu, Wakamo, se for com você... estou disposta a saltar em um mar de chamas, mesmo que eu vire cinzas♡"
1003320-165 = "[ns] \"Obrigado, Wakamo.\""
1003320-166 = "(Depois disso, passei um tempo agradável a sós com Wakamo)"
