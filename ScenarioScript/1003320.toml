[translation]
1003320-1 = "秘めたる心"
1003320-2 = "（モモトークから不穏な気配を感じ取り、ワカモのところへと向かった）"
1003320-8 = "……まぁ、先生？このワカモの元を訪れてくださるだなんて…[ruby=わたくし]…私、[/ruby]幸せでございます。"
1003320-9 = "しかし――大丈夫なのですか？#n貴重な時間を[ruby=わたくし]、私に[/ruby]割いてしまって……#nいえ、私は幸せなのですが……"
1003320-10 = "[ns] \"気にしなくて大丈夫だよ。\""
1003320-12 = "[ns] \"私がワカモに会いたかったんだ。\""
1003320-17 = "ああ、なんて慈悲深いのでしょう。"
1003320-18 = "あなた様と巡り会えた以上の幸運など、きっとこの先訪れる事はないのでしょう。#nこれこそが、私の運命……"
1003320-19 = "……それでは、本日は何をいたしましょう？"
1003320-25 = "いつでも……どんな事でも、このワカモの準備はできておりますので……"
1003320-26 = "なんなりと、お申し付けください♡"
1003320-27 = "[s] \"ワカモ。\""
1003320-28 = "ふふっ。はい、先生。"
1003320-29 = "[s1] \"急にこんなことを言ったら、驚くかもしれないけど……\"\n[s2] \"今日は、ずっと私のそばにいてほしいんだ。\""
1003320-32 = "は、はい……！？"
1003320-36 = "これは……夢、なのでしょうか……？"
1003320-37 = "あ、ああっ、ああああ……！"
1003320-38 = "この上なく嬉しいお言葉ではありますが……#nあまりにも突然の出来事に、どう対応したら良いものか……！"
1003320-46 = "少々お待ちくださいいいいいい！"
1003320-47 = "[ns] \"わ、ワカモ！？待って！\""
1003320-48 = "（興奮気味に逃げ出したワカモの後を追った）"
1003320-62 = "ど、どうして追ってくるのですか！？"
1003320-63 = "[s] \"だ、だってワカモが逃げるから……\""
1003320-64 = "で、ですが今はその……！"
1003320-65 = "も、もう少しだけ、お時間を……！"
1003320-66 = "[s] \"今日は一緒にいてくれたらそれで良くて！\""
1003320-67 = "ひやっ！？#nで、ですから……その、お気持ちは大変嬉しいのですが……"
1003320-71 = "や、やはり、今は……ダメなのです……！"
1003320-72 = "[ns] \"ワカモ……うわあっ！？\""
1003320-76 = "あ、あなた様！？"
1003320-77 = "（ワカモを追いかけていると、足[ruby=つまづ]を躓い[/ruby]てしまった）"
1003320-83 = "だ、大丈夫ですか！？も、申し訳ございません、申し訳ございません、申し訳ございません……！わ、私のせいで……！"
1003320-84 = "[s] \"転んだだけだから！落ち着いて！\""
1003320-85 = "あ、ああっ……ち、血が……！"
1003320-91 = "[ns] \"ちょっと擦りむいただけだから大丈夫！\""
1003320-92 = "いいえ……このようなこと、絶対にあってはなりません……"
1003320-93 = "いっそ、私が転べば良かったのです……#nおそばについていながら、あなた様の身体に傷をつけてしまうだなんて……"
1003320-94 = "この罪は、私が一生責任を持って償うよりほか――"
1003320-95 = "[ns] ワカモの頭を撫でる。"
1003320-101 = "[ns] \"少しは落ち着いた？\""
1003320-102 = "はい……"
1003320-103 = "[s] \"……今日は、顔を見せてくれないの？\""
1003320-104 = "……！"
1003320-110 = "ごめん、なさい、先生……"
1003320-111 = "今日は、ずっとそばにいてほしいと……いえ、今日だけでなく、この先も一生おそばにいたいと……そう言ってくださった大切な日なのに……"
1003320-112 = "こん[ruby=しゅうたい]な醜態を[/ruby]、晒してしまうなんて……"
1003320-113 = "[s5] \"え、えっと……それは……\"\n[s6]（一生、とまでは言ってないんだけど……）"
1003320-116 = "う……ううっ……申し訳ございません、先生……私の、せいで……"
1003320-117 = "[s] \"泣かないで……ほらワカモ、顔を上げてよ、ね？\""
1003320-122 = "……先生の前では、常にありのままの私をお見せしたい……#n仮面を捨て、素顔でありたい……そう思っていたのですが……"
1003320-123 = "その、今日は……なぜかいつもより心が落ち着かず……"
1003320-124 = "[s] \"初めて会ったときも、同じ仮面を被ってたよね。\""
1003320-125 = "……。"
1003320-130 = "この仮面は、私の一番のお気に入りなのです。"
1003320-131 = "元はと言えば、厄介事に巻き込まれないよう正体を隠すためのものだったのですが……#nき、今日は……"
1003320-132 = "[s] \"今日は……？\""
1003320-133 = "……！"
1003320-136 = "私の口から申し上げる事はできません。……先生も時々意地悪を言うのですね。#nで、ですが……そのようなところも私は……ああ……"
1003320-137 = "あれほどお辛いことがあったのにもかかわらず、真っ直ぐな眼差しで、優しく手を差し伸べてくださるだなんて……"
1003320-143 = "さらに本日は、一生一緒にいてほしいだなんてお言葉まで……♡#nもう、その事実だけで私は……！"
1003320-144 = "[s] \"そ、それは……！\""
1003320-146 = "（今日ワカモに連絡したのは、何か事件に巻き込まれていないか心配だったからだと正直に話した）"
1003320-148 = "……「全力を尽くす」という私の言葉が、気がかりだったのですか？"
1003320-149 = "私は、ただ……あなた様と一生忘れられない運命的な時間を過ごしたいと思い……"
1003320-150 = "[s7] \"ワカモは、いつも私のことを考えてくれてるんだね。\"\n[s8] \"お節介だったかな……でも、こうして会えて嬉しいよ。\""
1003320-153 = "ふふっ、あなた様は心配性ですね。"
1003320-154 = "しかし、そのように気にかけてくださるだけで、私は……あぁ……♡"
1003320-155 = "[s] \"それで……どこか行きたいところはある？\""
1003320-156 = "……！"
1003320-157 = "やはり、今日という偶然は、奇跡だったのですね……！"
1003320-163 = "どこまでもお供します。このワカモ、あなた様と一緒なら……たとえ灰になろうとも、火の海に飛び込む所存です♡"
1003320-165 = "[ns] \"ありがとう、ワカモ。\""
1003320-166 = "（その後、ワカモと2人だけの楽しい時間を過ごした）"
