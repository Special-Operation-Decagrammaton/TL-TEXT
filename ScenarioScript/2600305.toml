[translation]
2600305-1 = "いつでもどこでもセリナも"
2600305-2 = "（仕事が山積みで、一日に数十か所を行き来しなきゃいけない日だった）"
2600305-3 = "（まだ3か所残っているので、急いで次の建物に向かわないといけない）"
2600305-4 = "[s1] （エレベーターで下りる）\n[s2] （階段で下りる）"
2600305-5 = "ウィィィィン……パッ"
2600305-8 = "………ガタンッ！！ガコンッ！！"
2600305-9 = "あー、あー。皆様にお知らせいたします。現在、急な停電により……"
2600305-10 = "[s3] （手で扉を開けて外に出る）"
2600305-13 = "ガタッ！！ガクッ……ドサッ！"
2600305-14 = "（早歩きで階段を下りていく）"
2600305-19 = "ガッッ！ガタッ、ゴッ、ドサッ！"
2600305-20 = "あー、あー。皆様にお知らせいたします。現在、急な停電により……"
2600305-23 = "……い、先生！"
2600305-24 = "先生！大丈夫ですか！？"
2600305-25 = "[s] \"……？\""
2600305-28 = "目を覚ましてください、先生！聞こえますか！？"
2600305-29 = "私です、セリナです！分かりますか！？"
2600305-30 = "待っててください、まず身体の状態を確認して……！"
2600305-33 = "……"
2600305-34 = "……ふう。膝と腕に大きな擦り傷がありますが、それ以外は問題なさそうです。"
2600305-35 = "急なことでしたのでめまいがあるかもしれませんが、頭は打ってないみたいなのですぐ良くなるかと思います。安静にしていてください。"
2600305-36 = "とりあえず膝と腕の治療を……"
2600305-37 = "[s4] \"ありがとう。\"\n[s5] \"さすがセリナだね。\""
2600305-38 = "ありがたいお言葉ですが、お願いですからこうやって私に感謝しないといけない状況にならないでください……。"
2600305-39 = "……先生がこんな状況で、喜ぼうにも喜べません。"
2600305-40 = "もう、何かあったら連絡してくださいってあれほど言ったじゃないですか……。"
2600305-41 = "停電はどうしようもない……？そんなことはありません！"
2600305-42 = "先生を苦しませるようなことは、例えそれが疲れでも怪我でも停電でも、すべて私の対処するべき仕事です！"
2600305-43 = "これからは何か起きそうだなという段階でも、私のことを呼んでください。そうすればこんな怪我にはならないようにできるかもしれませんし……。"
2600305-46 = "危ないところでした……この傷を見るに、もう少し遅かったら傷跡が残ってしまうところだったんですよ？"
2600305-47 = "なんとかダッシュで間に合ったから良かったものの……。"
2600305-48 = "……え？"
2600305-49 = "どうしてここが分かったの……ですか？"
2600305-50 = "……"
2600305-51 = "えっと……それは、なんとなくと言いますか、偶然……？通りすがり、みたいな……？"
2600305-52 = "い、今はそんな話は良いんです！またそうやって話を逸らそうとして！ダメですよ！"
2600305-53 = "話を逸らしてるのは私の方……？そ、そそそそんなことはありませんよ？断じて違います！"
2600305-54 = "と、とにかく！！これからは何かが起きそうになったらすぐに私を呼んでください！"
2600305-55 = "分かりましたか？約束ですよ！絶対ですからね！"
2600305-56 = "で、では治療も終わったので私はこれで……！"
2600305-59 = "（セリナはそそくさと暗闇の中に消えてしまった）"
2600305-60 = "（しばらくして電気も元通りに点いて、その後仕事も無事に終えることができた）"
2600305-61 = "（その後、その建物の出入り口の監視カメラの記録を見せてもらったものの、セリナの姿は映っていなかった）"
