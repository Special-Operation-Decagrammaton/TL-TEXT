[translation]
2600305-1 = "Sempre e em qualquer lugar, Serina também"
2600305-2 = "（Era um dia em que o trabalho estava acumulado e eu precisava ir a dezenas de lugares）"
2600305-3 = "（Ainda faltam 3 lugares, então preciso me apressar para o próximo prédio）"
2600305-4 = "[s1] （Descer de elevador）\n[s2] （Descer pelas escadas）"
2600305-5 = "Zzzzz... Plim"
2600305-8 = "………Baque!! Estrondo!!"
2600305-9 = "Ah, ah. Atenção a todos. Devido a uma queda de energia repentina..."
2600305-10 = "[s3] （Abrir a porta com a mão e sair）"
2600305-13 = "Baque!! Tranco... Tum!"
2600305-14 = "（Descer as escadas a passos rápidos）"
2600305-19 = "Baque!! Tranco, estrondo, tum!"
2600305-20 = "Ah, ah. Atenção a todos. Devido a uma queda de energia repentina..."
2600305-23 = "……Se, Sensei!"
2600305-24 = "Sensei! Você está bem!?"
2600305-25 = "[s] \"……？\""
2600305-28 = "Abra os olhos, Sensei! Você consegue me ouvir!?"
2600305-29 = "Sou eu, a Serina! Você me reconhece!?"
2600305-30 = "Espere um pouco, primeiro preciso verificar o seu estado físico...!"
2600305-33 = "……"
2600305-34 = "……Ufa. Você tem arranhões profundos nos joelhos e nos braços, mas fora isso, parece estar tudo bem."
2600305-35 = "Como foi algo repentino, você pode estar sentindo tontura, mas não parece ter batido a cabeça, então deve melhorar logo. Por favor, fique em repouso."
2600305-36 = "Primeiro, vou tratar os joelhos e os braços..."
2600305-37 = "[s4] \"Obrigado.\"\n[s5] \"Como esperado da Serina.\""
2600305-38 = "Agradeço as palavras, mas, por favor, não se coloque em situações onde precise me agradecer desse jeito..."
2600305-39 = "……Ver o Sensei nessa situação, não me deixa feliz de forma alguma."
2600305-40 = "Poxa, eu disse tantas vezes para me avisar se algo acontecesse..."
2600305-41 = "Que não havia nada a fazer sobre a queda de energia...? Isso não é verdade!"
2600305-42 = "Qualquer coisa que faça o Sensei sofrer, seja cansaço, ferimentos ou uma queda de energia, é meu dever cuidar de tudo!"
2600305-43 = "De agora em diante, mesmo que sinta que algo vai acontecer, me chame. Assim, talvez possamos evitar que você se machuque desse jeito..."
2600305-46 = "Foi por pouco... Vendo esses ferimentos, se eu tivesse chegado um pouco mais tarde, teria ficado com cicatrizes, sabia?"
2600305-47 = "Ainda bem que consegui chegar a tempo correndo..."
2600305-48 = "……Eh?"
2600305-49 = "Como você sabia que eu estava aqui...?"
2600305-50 = "……"
2600305-51 = "Bem... isso foi, como posso dizer, por acaso...? Tipo, eu estava passando por aqui...?"
2600305-52 = "A-agora não é hora de falar disso! Você está tentando mudar de assunto de novo! Isso não pode!"
2600305-53 = "Que sou eu quem está mudando de assunto...? E-e-eu não estou fazendo isso! De jeito nenhum!"
2600305-54 = "E-enfim!! De agora em diante, se algo parecer que vai acontecer, me chame imediatamente!"
2600305-55 = "Entendido? É uma promessa! É sério, viu!"
2600305-56 = "B-bem, como o tratamento terminou, eu já vou..."
2600305-59 = "（Serina desapareceu apressadamente na escuridão）"
2600305-60 = "（Pouco tempo depois, a energia voltou e, depois disso, consegui terminar o trabalho em segurança）"
2600305-61 = "（Mais tarde, embora eu tenha pedido para ver as gravações das câmeras de segurança da entrada do prédio, a figura de Serina não apareceu em nenhuma delas）"
