[translation]
10023005-1 = "プロローグ;私は理解のあるメイドですから"
10023005-2 = "トキのオフィス"
10023005-3 = "お待ちしておりました、先生。"
10023005-4 = "飾り気の無い部屋で申し訳ありませんが、どうぞお寛ぎください。"
10023005-5 = "[s] \"あれ、今はトキ一人？\""
10023005-6 = "……はい。まぁそんなところです。"
10023005-7 = "先輩方は任務に行ってしまいましたので。"
10023005-8 = "私自身、今までC&C所属と言っても先輩方と任務に行っていたわけではありませんから……"
10023005-9 = "任務に呼ばれないのも仕方のないことです……"
10023005-10 = "ええ、コールサインゼロフォーの名が泣いていますとも。しくしく。"
10023005-11 = "[s] \"……ちょっと怒ってたり？\""
10023005-12 = "そんな事はありません。私はいつも通りです。"
10023005-13 = "[s1] \"そういう事を口にする人ほど……\"\n[s2] \"感情的になっているような……？\""
10023005-14 = "先生は何か勘違いされているようですが……"
10023005-15 = "先生は何か勘違いされているようですが……"
10023005-16 = "私は極めて冷静です。#n心は穏やかな水面のように凪いでいます。"
10023005-17 = "なお、セミナーは私に対する命令権の引き継ぎを拒否しました。#nよって現在、私に指示を下せるのは――"
10023005-18 = "シャーレ――つまりは先生だけです。#nそのため、先生が私に命令を下さらない限り……"
10023005-19 = "いつまでも待機せざるを得ないわけです。#nまぁ、ただそれだけのことですから、ええ。"
10023005-20 = "[s] \"トキ……？\""
10023005-21 = "事実を述べただけに過ぎません、お気になさらず。"
10023005-22 = "[s] \"……。\""
10023005-23 = "ええ、何も問題はありませんので。"
10023005-24 = "……。"
10023005-25 = "……どうかされましたか？"
10023005-26 = "私に何かご用命でしょうか？#n……C&Cのコールサインゼロフォー、この[ruby=あすま]飛鳥馬[/ruby]トキに。"
10023005-27 = "いえ……申し訳ありません。#n特にそういった意図はないというのも理解しております。"
10023005-28 = "[s] \"えっと、あるにはあるんだけど……\""
10023005-29 = "大丈夫です、先生。お気遣いなく。"
10023005-30 = "[s] \"あるのは本当だよ！？\""
10023005-31 = "私を気遣って、余計な仕事を増やす必要はありません。"
10023005-32 = "先ほども申し上げましたが、私は極めて冷静ですので。"
10023005-33 = "寂しいとか、心細いとか……暇で暇で仕方がないから何か問題でも起こしてしまおうかなー、などと思っていませんとも、ええ。"
10023005-34 = "[s3] \"その……指示でも命令でもないんだけど……\"\n[s4] \"トキにお願いしたいことがあるんだ。\""
10023005-39 = "その表情……どうやら本気のようですね。"
10023005-40 = "では私も、それに全力でお応えいたしましょう。"
10023005-41 = "お話が長くなるようでしたら、お茶をご用意しましょうか、先生？"
10023005-42 = "……大丈夫ですか、承知しました。"
10023005-43 = "これは、C&Cのコールサインゼロフォーとして、先生から頂く初めての依頼。"
10023005-44 = "記念すべき瞬間ですね。#n一体どのような事を要求されるのか……"
10023005-45 = "……心の準備は出来ております。#nそれでは、早速お伺いしても？"
10023005-46 = "[ns] \"……メイド服が欲しいんだ。\""
10023005-47 = "……メイド服、ですか？"
10023005-48 = "……"
10023005-49 = "………………なるほど。"
10023005-50 = "[s] \"ちょっと待って！今の間は何！？\""
10023005-51 = "先生にはそのようなご趣味があるのだなと。#nいえ、私は命令を遂行するだけですので。"
10023005-52 = "ですが――そうですね、ここにあるもので果たしてご満足いただけるかどうか。#nサイズの問題もありますし、一旦予備のものがないか見てきます。"
10023005-53 = "ああ……急いでご入り用でしたら、この場でお脱ぎしましょうか？#nサイズが合うかは分かりませんが。"
10023005-54 = "[s] \"ちょっと待って、誤解だよ！\""
10023005-56 = "[ns] \"メイド服を着るのはゲーム開発部の子たちで！\""
10023005-57 = "はい……？"
10023005-58 = "ゲーム開発部、ですか？"
10023005-61 = "#video;10019"
