[translation]
10023005-1 = "Prólogo; Como sou uma empregada compreensiva"
10023005-2 = "Escritório da Toki"
10023005-3 = "Estava à sua espera, Sensei."
10023005-4 = "Peço desculpas pelo ambiente simples, mas, por favor, sinta-se à vontade."
10023005-5 = "[s] \"Ué, a Toki está sozinha agora?\""
10023005-6 = "……Sim. Bem, é mais ou menos isso."
10023005-7 = "As veteranas saíram para uma missão."
10023005-8 = "Mesmo sendo da C&C, eu não costumava ir às missões com elas……"
10023005-9 = "Então, é natural que eu não seja chamada para as missões……"
10023005-10 = "Sim, o nome do codinome Zero-Four está chorando. Soluço."
10023005-11 = "[s] \"……Você está um pouco brava?\""
10023005-12 = "Não há nada disso. Estou como sempre."
10023005-13 = "[s1] \"Quem diz essas coisas costuma estar...\"\n[s2] \"...meio emotivo, não acha?\""
10023005-14 = "Parece que o Sensei está entendendo algo errado……"
10023005-15 = "Parece que o Sensei está entendendo algo errado……"
10023005-16 = "Estou extremamente calma. #nMeu coração está sereno como a superfície de um lago."
10023005-17 = "Além disso, o Seminar recusou a transferência da autoridade de comando sobre mim. #nPortanto, atualmente, quem pode me dar ordens é――"
10023005-18 = "O Schale―― ou seja, apenas o Sensei. #nPor isso, a menos que o Sensei me dê uma ordem……"
10023005-19 = "Eu não tenho escolha a não ser ficar em espera para sempre. #nBem, é só isso, sim."
10023005-20 = "[s] \"Toki……?\""
10023005-21 = "Apenas relatei os fatos, não se preocupe com isso."
10023005-22 = "[s] \"…….\""
10023005-23 = "Sim, não há problema algum."
10023005-24 = "……."
10023005-25 = "……Aconteceu alguma coisa?"
10023005-26 = "Tem alguma tarefa para mim? #n……Para mim, Asuma Toki, codinome Zero-Four da C&C."
10023005-27 = "Não…… peço desculpas. #nEntendo que não houve nenhuma intenção específica."
10023005-28 = "[s] \"Bem, na verdade, até que tem...\""
10023005-29 = "Está tudo bem, Sensei. Não se preocupe."
10023005-30 = "[s] \"É verdade que tem, sim!?\""
10023005-31 = "Não precisa se preocupar comigo e criar trabalho extra."
10023005-32 = "Como eu disse antes, estou extremamente calma."
10023005-33 = "Não estou pensando em coisas como estar solitária, ou me sentindo desamparada…… ou que estou tão entediada que deveria causar algum problema, não mesmo, de jeito nenhum."
10023005-34 = "[s3] \"Bem…… não é exatamente uma instrução ou ordem……\"\n[s4] \"Mas tem algo que eu queria pedir para a Toki.\""
10023005-39 = "Essa expressão…… parece que você está falando sério."
10023005-40 = "Então, eu também responderei a isso com toda a minha dedicação."
10023005-41 = "Se a conversa for longa, quer que eu prepare um chá, Sensei?"
10023005-42 = "……Está tudo bem? Entendido."
10023005-43 = "Este é o primeiro pedido que recebo do Sensei como codinome Zero-Four da C&C."
10023005-44 = "Um momento memorável. #nO que será que você vai me pedir……"
10023005-45 = "……Estou preparada mentalmente. #nEntão, posso perguntar agora?"
10023005-46 = "[ns] \"……Eu quero um traje de empregada.\""
10023005-47 = "……Um traje de empregada?"
10023005-48 = "……"
10023005-49 = "………………Entendo."
10023005-50 = "[s] \"Espera um pouco! O que foi esse silêncio agora!?\""
10023005-51 = "Apenas pensei que o Sensei tivesse esse tipo de gosto. #nNão, eu apenas cumpro ordens."
10023005-52 = "Mas―― bem, não sei se o que tenho aqui será do seu agrado. #nTem a questão do tamanho também, vou verificar se há algum reserva."
10023005-53 = "Ah…… se estiver com pressa, quer que eu tire o meu agora mesmo? #nNão sei se o tamanho vai servir, mas……"
10023005-54 = "[s] \"Espera, é um mal-entendido!\""
10023005-56 = "[ns] \"Quem vai usar roupas de empregada são as garotas do Departamento de Desenvolvimento de Jogos!\""
10023005-57 = "Sim……?"
10023005-58 = "O Departamento de Desenvolvimento de Jogos, você diz?"
10023005-61 = "#video;10019"
