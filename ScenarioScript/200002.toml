[translation]
200002-1 = "Episode 2;A Letter from the General Student Council President"
200002-5 = "Citizens of Kivotos."
200002-6 = "I am Nanagami Rin, Chief of the General Affairs Department and Acting President of the General Student Council."
200002-7 = "Recently, there has been an increase in injuries caused by accidental discharges."
200002-8 = "Please remember that even a light impact can trigger a shot, and be careful not to point your muzzle at others carelessly."
200002-9 = "Also, after removing the magazine, always check to ensure no rounds remain in the chamber. #nDon't forget to clean your rifling regularly as well."
200002-10 = "Finally, the use of ammunition not approved by the General Student Council is prohibited. #nFor everyone's safety, we ask for your cooperation."
200002-11 = "This has been an announcement from the Kivotos General Student Council."
200002-20 = "<This advertisement is brought to you by the Kivotos General Student Council and the Kronos News Agency.>"
200002-21 = "<For inquiries regarding this advertisement, please contact the Kronos News Agency.>"
200002-23 = "Cut! That's a wrap!"
200002-24 = "...Good work, everyone."
200002-27 = "General Student Council Acting President's Office"
200002-29 = "G-good work!"
200002-30 = "Thank you all for your hard work on the preparations as well."
200002-31 = "Is today's recording finished?"
200002-32 = "Yes. The announcement for the revised Road Traffic Act and the tax promotion commercial are both done."
200002-33 = "Thank you for cooperating with the Finance Department's requests as well."
200002-38 = "Man, to think you nailed that in one take."
200002-39 = "I could never do that. #nRin-senpai, you're amazing."
200002-40 = "Maybe you could even have a career in show business?"
200002-41 = "That's a completely different matter... #nIt's not like I enjoy standing in front of a camera."
200002-42 = "By the way... why am I doing the PR for other departments?"
200002-43 = "I feel it would be more effective if each department head handled their own."
200002-45 = "W-well, that is..."
200002-46 = "Administrator Rin... are you aware that you are the face of the General Student Council?"
200002-47 = "You have a lot of public exposure, don't you? #nPeople are much more likely to accept our policies from you than from us, whom they don't even know by name or face."
200002-48 = "Besides, this used to be a task handled by the General Student Council President. #nI'm sorry, but I'd like you to understand this as part of your duties as Acting President."
200002-50 = "...Yes, I suppose you're right. #nThe work of the General Student Council President..."
200002-51 = "Come to think of it... the President loved taking photos. #nShe always said photos were the best way to preserve memories."
200002-52 = "If I am to continue as Acting President, I suppose I should get used to these tasks as well..."
200002-56 = "Speaking of photos—"
200002-57 = "Ayumu. Where did this letter come from?"
200002-58 = "Y-yes!?"
200002-60 = "Oh... that's the letter I gave you when you returned from the Ark."
200002-61 = "As for that... I'm sorry. #nI just brought it from the mailbox... I don't know who sent it."
200002-62 = "D-does it contain something malicious...?"
200002-64 = "No, it's not that..."
200002-65 = "It's just that the handwriting looks like the General Student Council President's—"
200002-66 = "The General Student Council President?"
200002-67 = "The General Student Council President?"
200002-68 = "A letter from the General Student Council President!?"
200002-73 = "...Please, calm down. #nNothing has been confirmed yet."
200002-74 = "It's just that the handwriting on the envelope, which says 'To Rin-chan,' resembles the President's..."
200002-75 = "There was no letter inside."
200002-76 = "Instead, there were a few photos that appear to have been taken by the President."
200002-80 = "Most of them are familiar, but..."
200002-82 = "Ahaha, Rin-senpai, you had times like this too? #nWhen was this taken?"
200002-83 = "...Momoka."
200002-84 = "This was... two years ago, I believe. #nBack when the President first took office."
200002-85 = "It was a big topic at the time, being the youngest person to ever hold the position."
200002-87 = "And this one... is this the summer training camp? Last year? The year before?"
200002-88 = "...The year before last. #nBut I'm not trying to reminisce right now..."
200002-91 = "Look at this."
200002-92 = "...A black-and-white photo?"
200002-93 = "This is... the first time I've seen this."
200002-94 = "I wonder if she used some kind of special filter?"
200002-95 = "Likely. These days, film cameras—especially black-and-white film—are rarely used unless you're an enthusiast."
200002-97 = "But what's more concerning is the location in the photo."
200002-98 = "The President I knew was someone who spent her days buried in work at the office. #nShe rarely even left D.U. on her days off."
200002-99 = "And yet, this photo... #nAs far as I know, there is no massive lake in D.U. where you can see the horizon like this."
200002-100 = "Does anyone here have any idea where this place might be?"
200002-103 = "Who knows...?"
200002-105 = "Next Episode;A Strange Dream"