[translation]#[Texto Final. mas eventualmente pode haver alterações na formatação de texto. - Filipe 03/07.]
200002-1 = "Episódio 2: A Carta da Presidente do Conselho Estudantil Geral"
200002-5 = "Cidadãos de Kivotos."
200002-6 = "Aqui é Nanagami Rin, Chefe do Departamento\nde Coordenação Geral e Presidente interina\ndo Conselho Estudantil Geral."
200002-7 = "Recentemente, os ferimentos por disparos\nacidentais vêm aumentando."
200002-8 = "Lembrem-se: até um impacto leve pode\ndisparar a arma. Não apontem o cano\npara os outros por descuido."
200002-9 = "Além disso, mesmo após remover o carregador,\nverifiquem se não restou munição na câmara.#nE não se esqueçam da limpeza frequente\ndo raiamento do cano."
200002-10 = "Por fim, é proibido o uso de munições não autorizadas\npelo Conselho Estudantil Geral.#nPela segurança de todos, contamos com a colaboração."
200002-11 = "Este foi um comunicado do Conselho\nEstudantil Geral de Kivotos."
200002-20 = "＜Este anúncio é um oferecimento do\nConselho Estudantil Geral de Kivotos\ne da Agência de Notícias Kronos＞"
200002-21 = "＜Para dúvidas sobre o anúncio\nentre em contato com a Agência de Notícias Kronos――＞"
200002-23 = "Corta! Ficou ótima!"
200002-24 = "……Bom trabalho, pessoal."
200002-27 = "Gabinete da Presidente interina do Conselho Estudantil Geral"
200002-29 = "B-Bom trabalho!"
200002-30 = "Obrigada a todos pela preparação também."
200002-31 = "As gravações de hoje terminam aqui?"
200002-32 = "Sim. Já gravamos o aviso da reforma da lei\nde trânsito e a propaganda de incentivo\nao pagamento de impostos."
200002-33 = "Obrigada por colaborar também com\nas pautas do Departamento de Finanças."
200002-38 = "Caramba~ terminar AQUILO de primeira, hein."
200002-39 = "Eu jamais conseguiria.#nÉ a veterana Rin, né~"
200002-40 = "Vai que você faz sucesso até\nno mundo artístico?"
200002-41 = "Uma coisa é uma coisa, outra coisa\né outra coisa……#nNão é como se eu gostasse de ficar\ndiante das câmeras."
200002-42 = "A propósito…… por que EU faço a publicidade\nde outros setores?"
200002-43 = "Seria mais eficaz que cada chefe de\ndepartamento cuidasse da sua."
200002-45 = "I-Isso é……"
200002-46 = "Administradora Rin…… você tem noção de que\né o rosto do Conselho Estudantil Geral?"
200002-47 = "Você aparece muito na mídia, não é?#nAs políticas são bem mais aceitas com você\ndo que conosco, que ninguém conhece."
200002-48 = "Além do mais, essa era uma função da própria\nPresidente do Conselho.#nSinto muito, mas entenda isso como parte\ndo trabalho de interina."
200002-50 = "……Sim, é verdade.#nUm trabalho da Presidente do Conselho……"
200002-51 = "Aliás…… a Presidente gostava de tirar\nfotos, não é?#nDizia que fotos são o melhor jeito\nde guardar lembranças."
200002-52 = "Se vou continuar como interina, será que\ndevo me acostumar com isso também……?"
200002-56 = "Falando em fotos, eu me lembrei――"
200002-57 = "Ayumu. De onde veio esta carta?"
200002-58 = "S-Sim?!"
200002-60 = "Ah…… a carta que entreguei quando\nvocê voltou da Arca."
200002-61 = "Sobre ela…… me desculpe.#nEu só a peguei na caixa de correio……\nnão sei quem é o remetente."
200002-62 = "T-Tinha algo malicioso escrito nela……?"
200002-64 = "Não, não é isso……"
200002-65 = "É que a caligrafia parece a da Presidente\ndo Conselho――"
200002-66 = "Da Presidente do Conselho?"
200002-67 = "Da Presidente?"
200002-68 = "Uma carta da Presidente do Conselho?!"
200002-73 = "……Acalmem-se.#nAinda não há nada confirmado."
200002-74 = "É só que a caligrafia do \"Para a Rinzinha\"\nno envelope se parece com a dela……"
200002-75 = "Não havia carta alguma dentro."
200002-76 = "No lugar, algumas fotos que a Presidente\nparece ter tirado."
200002-80 = "Reconheço a maioria delas, porém……"
200002-82 = "Hahaha! Então a veterana Rin também\njá foi assim~#nDe quando é essa?"
200002-83 = "……Momoka."
200002-84 = "Essa é de…… uns 2 anos atrás?#nDa época em que a Presidente do Conselho\ntomou posse."
200002-85 = "Foi assunto na época: a pessoa mais jovem\nda história a assumir o cargo."
200002-87 = "E essa…… acampamento de verão?\nDo ano passado? Retrasado?"
200002-88 = "……Do retrasado.#nMas não estamos aqui pra mergulhar\nnas lembranças……"
200002-91 = "Vejam esta aqui."
200002-92 = "……Uma foto em preto e branco?"
200002-93 = "Esta…… é a primeira vez que vejo."
200002-94 = "Será que usaram algum filtro especial?"
200002-95 = "Provavelmente. Hoje em dia, câmera\nanalógica…… ainda mais com filme preto\ne branco, só entusiasta usa."
200002-97 = "Mas o que mais me intriga\né o lugar da foto."
200002-98 = "A Presidente que eu conheço passava o dia\ninteiro soterrada de trabalho no gabinete.#nMesmo nas folgas, ela raramente\nsaía do [ruby=Distrito de Utnapishtim]D.U.[/ruby]."
200002-99 = "E, no entanto, esta foto……#nAté onde sei, não existe no [ruby=Distrito de Utnapishtim]D.U.[/ruby] um lago tão\ngigante que se veja a linha do horizonte."
200002-100 = "Alguém aqui reconhece este lugar?"
200002-103 = "Sei lá……"
200002-105 = "Próximo Episódio: Um Sonho Estranho"