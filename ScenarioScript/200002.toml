[translation]
200002-1 = "Episódio 2; A carta da Presidente do Conselho Estudantil Geral"
200002-5 = "A todos em Kivotos."
200002-6 = "Aqui é Rin Nanagami, chefe da Sala de Supervisão do Conselho Estudantil Geral e representante da Presidente."
200002-7 = "Recentemente, o número de feridos por disparos acidentais tem aumentado."
200002-8 = "Lembrem-se de que armas podem disparar com impactos leves e evitem apontar o cano para outras pessoas descuidadamente."
200002-9 = "Além disso, após remover o carregador, verifiquem sempre se não há munição na câmara.#nNão se esqueçam também de fazer a manutenção frequente do raiamento."
200002-10 = "Por fim, o uso de munição não autorizada pelo Conselho Estudantil Geral é proibido.#nPara a segurança de todos, contamos com sua colaboração."
200002-11 = "Este foi um aviso do Conselho Estudantil Geral de Kivotos."
200002-20 = "＜Este anúncio é um oferecimento do Conselho Estudantil Geral de Kivotos e da Agência de Notícias Chronos＞"
200002-21 = "＜Para dúvidas sobre este anúncio, entre em contato com a Agência de Notícias Chronos――＞"
200002-23 = "Corta! Ficou ótimo!"
200002-24 = "……Bom trabalho a todos."
200002-27 = "Gabinete da Representante da Presidente do Conselho Estudantil Geral"
200002-29 = "B-bom trabalho!"
200002-30 = "Obrigada a todos pelos preparativos também."
200002-31 = "A gravação de hoje termina aqui?"
200002-32 = "Sim. A notificação sobre a implementação da lei de trânsito revisada e a gravação do comercial de incentivo fiscal também terminaram."
200002-33 = "Obrigada por colaborarem com os assuntos da Sala de Finanças."
200002-38 = "Nossa, conseguir terminar aquilo de primeira..."
200002-39 = "Para mim seria impossível.#nSenpai Rin, você é incrível~"
200002-40 = "Será que você não faria sucesso no mundo do entretenimento?"
200002-41 = "Uma coisa não tem nada a ver com a outra……#nEu não gosto de ficar na frente das câmeras."
200002-42 = "Aliás…… por que eu estou fazendo a divulgação de outros departamentos?"
200002-43 = "Acho que seria mais eficaz se cada chefe de sala cuidasse disso."
200002-45 = "I-isso é……"
200002-46 = "Administradora Rin…… você tem consciência de que é o rosto do Conselho Estudantil Geral?"
200002-47 = "Você aparece bastante, não é?#nAs pessoas aceitarão as políticas muito melhor vindo de você do que de nós, que ninguém conhece o rosto ou o nome."
200002-48 = "Além disso, essa era uma tarefa que a Presidente do Conselho Estudantil Geral costumava fazer.#nSinto muito, mas entenda isso como parte das suas funções como representante."
200002-50 = "……Sim, é verdade.#nO trabalho da Presidente do Conselho Estudantil Geral……"
200002-51 = "Falando nisso…… a Presidente gostava muito de tirar fotos.#nEla dizia que fotos eram a melhor forma de guardar lembranças."
200002-52 = "Se vou continuar como representante, será que devo me acostumar com esse tipo de tarefa……?"
200002-56 = "Falando em fotos――"
200002-57 = "Ayumu. Onde você conseguiu esta carta?"
200002-58 = "S-sim!?"
200002-60 = "Ah…… é a carta que lhe entreguei quando você voltou da Arca."
200002-61 = "Sobre isso…… sinto muito.#nEu apenas a peguei na caixa de correio…… não sei quem a enviou."
200002-62 = "A-aconteceu algo ruim ou tem algum conteúdo malicioso……?"
200002-64 = "Não, não é isso……"
200002-65 = "É que a caligrafia parece com a da Presidente do Conselho Estudantil Geral――"
200002-66 = "A Presidente do Conselho Estudantil Geral?"
200002-67 = "A Presidente do Conselho Estudantil Geral?"
200002-68 = "Uma carta da Presidente do Conselho Estudantil Geral!?"
200002-73 = "……Por favor, acalmem-se.#nAinda não temos certeza de nada."
200002-74 = "É apenas que a caligrafia do \"Para Rin-chan\" no envelope se parece com a da Presidente……"
200002-75 = "Não havia nenhuma carta dentro."
200002-76 = "Em vez disso, havia algumas fotos que parecem ter sido tiradas pela Presidente."
200002-80 = "A maioria delas me é familiar, mas……"
200002-82 = "Ahaha, a Senpai Rin também teve momentos assim, hein~#nDe quando é isso?"
200002-83 = "……Momoka."
200002-84 = "Isso…… deve ser de dois anos atrás.#nÉ uma foto da época em que a Presidente assumiu o cargo."
200002-85 = "A posse da pessoa mais jovem da história, foi um assunto muito comentado na época, não foi?"
200002-87 = "E isso aqui é... um acampamento de verão? Do ano passado? Ou do ano retrasado?"
200002-88 = "...Do ano retrasado. #nMas, não estou aqui para relembrar o passado agora..."
200002-91 = "Por favor, olhem isto."
200002-92 = "...Uma foto em preto e branco?"
200002-93 = "Isso é... a primeira vez que vejo."
200002-94 = "Será que aplicaram algum filtro especial?"
200002-95 = "Provavelmente. Hoje em dia, quase ninguém usa câmeras analógicas... muito menos filmes em preto e branco, a menos que seja um entusiasta."
200002-97 = "Mas o que mais me intriga é o local da foto."
200002-98 = "A Presidente do Conselho Estudantil que eu conheço é alguém que passa o dia todo sobrecarregada de trabalho no escritório. #nMesmo nos feriados, ela raramente sai de D.U."
200002-99 = "E ainda assim, nesta foto... #nAté onde eu sei, não existe um lago tão grande em D.U. a ponto de se ver o horizonte."
200002-100 = "Alguém aqui tem alguma ideia de onde seja este lugar?"
200002-103 = "Quem sabe...?"
200002-105 = "Próximo episódio: Sonho Estranho"
