[translation]
200002-1 = "Эпизод 2;Письмо от Президента Генерального Студенческого Совета"
200002-5 = "Жители Кивотоса."
200002-6 = "Я Нанагами Рин, глава Административного департамента и исполняющая обязанности Президента Генерального Студенческого Совета."
200002-7 = "В последнее время участились случаи травм, вызванных случайными выстрелами."
200002-8 = "Пожалуйста, помните, что даже лёгкий удар может спровоцировать выстрел, и будьте осторожны — не направляйте дуло на других без необходимости."
200002-9 = "Также, вынув магазин, всегда проверяйте, не остался ли патрон в патроннике. #nИ не забывайте регулярно чистить нарезы ствола."
200002-10 = "И последнее: использование боеприпасов, не одобренных Генерального Студенческим Советом, строго запрещено. #nРади всеобщей безопасности мы просим вас о содействии."
200002-11 = "Это было объявление от Генерального Студенческого Совета Кивотоса."
200002-20 = "<Данная реклама предоставлена вам от Генерального Студенческого Совета Кивотоса и информационного агентства «Кронос».>"
200002-21 = "<По вопросам, касающимся этой рекламы, пожалуйста, обращайтесь в информационное агентство «Кронос».>"
200002-23 = "Снято! Всем спасибо!"
200002-24 = "...Отличная работа, группа."
200002-27 = "Кабинет исполняющей обязанности Президента Генерального Студенческого Совета"
200002-29 = "С-отличной работой!"
200002-30 = "Спасибо вам всем за усердную подготовку."
200002-31 = "На сегодня с записями покончено?"
200002-32 = "Да. Объявление об изменениях в Законе о дорожном движении и промо-ролик налоговой службы готовы."
200002-33 = "Спасибо, что пошли навстречу запросам Финансового департамента."
200002-38 = "Ух ты, поверить не могу, что ты записала всё с одного дубля."
200002-39 = "Я бы так ни за что не смогла. #nРин-семпай, ты просто потрясающая."
200002-40 = "Может, тебе стоит сделать карьеру в шоу-бизнесе?"
200002-41 = "Это совершенно другое дело... #nНе то чтобы мне нравилось стоять перед камерой."
200002-42 = "Кстати говоря... почему пиаром других департаментов занимаюсь именно я?"
200002-43 = "Мне кажется, было бы куда эффективнее, если бы главы ведомств выступали сами."
200002-45 = "Ну-у, понимаешь, тут такое дело..."
200002-46 = "Управляющая Рин... ты ведь в курсе, что являешься лицом Генерального Студенческого Совета?"
200002-47 = "Ты часто появляешься на публике, верно? #nЛюди куда охотнее примут наши реформы из твоих уст, чем от нас — тех, кого они не знают ни по имени, ни в лицо."
200002-48 = "К тому же раньше этой задачей занималась сама Президент ГСС. #nПрости, но, пожалуйста, отнесись к этому как к части своих обязанностей на посту Президента."
200002-50 = "...Да, пожалуй, ты права. #nРабота Президента Генерального Студенческого Совета..."
200002-51 = "Если подумать... Президент обожала фотографировать. #nОна всегда говорила, что снимки — лучший способ сохранить воспоминания."
200002-52 = "Раз уж я продолжаю заменять её, полагаю, мне стоит привыкнуть и к этим обязанностям..."
200002-56 = "К слову о фотографиях —"
200002-57 = "Аюму. Откуда взялось это письмо?"
200002-58 = "Д-да!?"
200002-60 = "А... это то самое письмо, которое я передала тебе, когда ты вернулась с Ковчега."
200002-61 = "Насчёт него... прошу прощения. #nЯ просто забрала его из почтового ящика... и понятия не имею, кто отправитель."
200002-62 = "Т-там внутри что-то опасное...?"
200002-64 = "Нет, дело не в этом..."
200002-65 = "Просто почерк очень похож на почерк Президента Генерального Студенческого Совета —"
200002-66 = "Президента Генерального Студенческого Совета?"
200002-67 = "Президента Генерального Студенческого Совета?"
200002-68 = "Письмо от Президента Генерального Студенческого Совета?!"
200002-73 = "...Пожалуйста, успокойтесь. #nНичего ещё точно не подтверждено."
200002-74 = "Просто почерк на конверте, где написано «Для Рин-тян», напоминает почерк Президента..."
200002-75 = "Самого письма внутри не было."
200002-76 = "Вместо него лежало несколько фотографий, которые, судя по всему, сделала сама Президент."
200002-80 = "Большинство из них мне знакомы, но..."
200002-82 = "Ахаха, Рин-семпай, у тебя и такие времена были? Когда это снято?"
200002-83 = "...Момока."
200002-84 = "Это было... года два назад, если не ошибаюсь. #n Как раз когда Президент только вступила в должность."
200002-85 = "Тогда это бурно обсуждали, ведь она стала самой молодой главой Совета в истории."
200002-87 = "А вот эта... это летний тренировочный лагерь? В прошлом году? Или позапрошлом?"
200002-88 = "...В позапрошлом. #nНо я сейчас не пытаюсь предаваться ностальгии..."
200002-91 = "Посмотрите на эту."
200002-92 = "...Чёрно-белый снимок?"
200002-93 = "Этот... я вижу впервые."
200002-94 = "Интересно, она использовала какой-то особый фильтр?"
200002-95 = "Скорее всего. В наши дни плёночные камеры — особенно с чёрно-белой плёнкой — редкость, если только ты не заядлый энтузиаст."
200002-97 = "Но куда больше меня беспокоит место на фотографии."
200002-98 = "Президент, которую я знала, целыми днями пропадала за работой в кабинете. #nВ свои выходные она почти никогда не покидала пределы Д.У."
200002-99 = "И всё же этот снимок... #nНасколько мне известно, в Д.У. нет настолько огромного озера, где линия горизонта уходила бы вдаль."
200002-100 = "У кого-нибудь есть идеи, что это может быть за место?"
200002-103 = "Кто знает...?"
200002-105 = "Следующий эпизод;Странный сон"