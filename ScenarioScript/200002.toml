[translation]#[Texto revisado.] Em aguardo de revisão de formatação de texto. - Filipe 12/06.
200002-1 = "Episódio 2: Uma Carta da Presidente do Conselho Estudantil Geral"
200002-5 = "Atenção a todos os cidadãos de Kivotos."
200002-6 = "Aqui é Nanagami Rin, Chefe do Departamento de Administração e Presidente Interina do Conselho Estudantil Geral."
200002-7 = "Recentemente, o número de feridos por disparos acidentais tem aumentado."
200002-8 = "Lembrem-se de que as armas podem disparar com o menor impacto, portanto, tenham cuidado para não apontar os canos para outras pessoas de forma descuidada."
200002-9 = "Além disso, mesmo após remover o carregador, certifiquem-se sempre de que não há nenhuma bala na câmara.#nE não se esqueçam de fazer a manutenção frequente do raiamento do cano."
200002-10 = "Por fim, o uso de munições não autorizadas pelo Conselho Estudantil Geral é estritamente proibido.#nPara a segurança de todos, contamos com a sua colaboração."
200002-11 = "Este foi um comunicado do Conselho Estudantil Geral de Kivotos."
200002-20 = "＜Este anúncio foi trazido a você pelo Conselho Estudantil Geral de Kivotos e pela Academia de Jornalismo Kronos.＞"
200002-21 = "＜Para dúvidas sobre anúncios, por favor, entre em contato com a Academia de Jornalismo Kronos――＞"
200002-23 = "Corta! Ficou perfeito!"
200002-24 = "……Bom trabalho a todos."
200002-27 = "Escritório da Presidência Interina do Conselho Estudantil Geral"
200002-29 = "B-Bom trabalho!"
200002-30 = "Agradeço a todos pelo esforço na preparação também."
200002-31 = "As gravações de hoje encerram por aqui?"
200002-32 = "Sim. Os avisos sobre as mudanças nas leis de trânsito e o comercial de incentivo à arrecadação de impostos também já foram gravados."
200002-33 = "Obrigada por ajudar com os assuntos do Departamento de Finanças também."
200002-38 = "Uau~, gravar tudo aquilo de primeira não é pra qualquer um."
200002-39 = "Eu nunca conseguiria.#nComo esperado da Rin-senpai~"
200002-40 = "Quem sabe você não faria sucesso na indústria do entretenimento?"
200002-41 = "Uma coisa não tem nada a ver com a outra……#nEu não estou exatamente gostando de ficar na frente das câmeras."
200002-42 = "Por falar nisso…… por que eu estou fazendo os anúncios de outros departamentos?"
200002-43 = "Eu acredito que seria muito mais eficaz se cada Chefe fizesse os anúncios de suas respectivas áreas."
200002-45 = "B-Bem, sobre isso……"
200002-46 = "Oficial Rin... você tem noção de que você é o rosto do Conselho Estudantil Geral, não tem?"
200002-47 = "Você é a figura pública com mais exposição, certo?#nAs políticas serão muito mais bem aceitas vindo de você do que de nós, cujos rostos e nomes a população nem conhece."
200002-48 = "Além disso, esse era um dever que a Presidente do Conselho cumpria antes.#nSinto muito, mas por favor, entenda que isso também faz parte das suas responsabilidades como Presidente Interina."
200002-50 = "……Sim, é verdade.#nOs deveres da Presidente……"
200002-51 = "Agora que mencionou…… a Presidente adorava tirar fotos.#nEla dizia que fotografias eram a melhor forma de eternizar memórias."
200002-52 = "Se eu vou continuar como Interina, suponho que deva me acostumar com isso também……."
200002-56 = "Falando em fotos, acabei de me lembrar――"
200002-57 = "Ayumu. Onde você encontrou esta carta?"
200002-58 = "S-Sim?!"
200002-60 = "Ah... É aquela carta que eu lhe entreguei quando voltamos da Arca."
200002-61 = "Bem…… me desculpe.#nEu apenas a peguei na caixa de correio... Não sei quem é o remetente."
200002-62 = "P-Por acaso está escrita com alguma má intenção...?"
200002-64 = "Não, não é nada disso……."
200002-65 = "É apenas que a caligrafia se parece muito com a da Presidente do Conselho――"
200002-66 = "Da Presidente do Conselho?!"
200002-67 = "Presidente do Conselho?"
200002-68 = "Uma carta da Presidente do Conselho Estudantil?!"
200002-73 = "……Acalmem-se.#nAinda não temos certeza de nada."
200002-74 = "É que a caligrafia de \"Para a Rin-chan\" no envelope se assemelha bastante à letra dela……."
200002-75 = "Não havia carta nenhuma dentro do envelope."
200002-76 = "Em vez disso, encontrei algumas fotografias que parecem ter sido tiradas por ela."
200002-80 = "Eu reconheço quase todas elas, mas……."
200002-82 = "Ahaha, então a Rin-senpai também teve a sua fase assim, hein~#nDe quando é isso?"
200002-83 = "……Momoka."
200002-84 = "Isto foi... há dois anos, eu acho.#nFoi na época em que ela assumiu o cargo de Presidente."
200002-85 = "Ela se tornou o assunto de Kivotos por ter sido a Presidente mais jovem da história a assumir o cargo, certo?"
200002-87 = "E essa aqui... do Acampamento de Verão? Do ano passado? Ou do ano retrasado?"
200002-88 = "……Do ano retrasado.#nPorém, não estamos aqui para ficar remoendo o passado……."
200002-91 = "Vejam esta aqui."
200002-92 = "……Uma foto em preto e branco?"
200002-93 = "É a primeira vez... que vejo esta foto."
200002-94 = "Será que ela usou algum filtro especial?"
200002-95 = "Provavelmente. Hoje em dia, ninguém usa câmeras analógicas... muito menos filmes em preto e branco, a não ser que seja um entusiasta."
200002-97 = "Mas o que mais me intriga é o local da fotografia."
200002-98 = "A Presidente que eu conheço é uma pessoa que passava o dia todo atolada em trabalho no escritório.#nEla raramente saía do [ruby=Distrito de Utnapishtim]D.U.[/ruby], mesmo nos dias de folga."
200002-99 = "E ainda assim, nesta foto...#nAté onde eu sei, não existe nenhum lago no D.U. que seja tão grande a ponto de se ver a linha do horizonte."
200002-100 = "Alguma de vocês consegue reconhecer este lugar?"
200002-103 = "Nenhuma ideia..."
200002-105 = "Próximo Episódio: Um Sonho Bizarro"