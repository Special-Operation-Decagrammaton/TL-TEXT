[translation]
10002200-1 = "Epílogo 7: Um desejo ao céu"
10002200-3 = "O-olá. Eu me chamo Bomba Millennium nº 60. Como o nome sugere, fui produzida na Millennium Science School."
10002200-4 = "E-e bem, tecnicamente eu sou uma bomba de napalm! C-comprimento de 23 cm, peso de 44 kg, e além disso..."
10002200-5 = "A-ah, a minha i-idade é segredo...!"
10002200-6 = "Por que uma bomba de napalm estaria em uma casa de praia... é isso que você está pensando?"
10002200-7 = "Originalmente, parece que fui criada para um propósito específico, mas por algum motivo, acabei sendo descartada..."
10002200-8 = "Ainda assim, tive a sorte de não ser 'destruída', passando pelas mãos de várias pessoas gentis... e, de alguma forma, acabei chegando aqui."
10002200-9 = "Desculpe, isso não explica muita coisa... Já faz um bom tempo desde que cheguei aqui."
10002200-10 = "Eu também fico confusa com tudo isso, mas o mar aqui é lindo, o vento é fresco e é um lugar maravilhoso."
10002200-11 = "Só que este não é um lugar que combine comigo, então ninguém nunca me escolheu, e passei todos os dias acumulando poeira na loja."
10002200-12 = "As outras pessoas... especialmente os fogos de artifício ali perto, recebem novos clientes quase todos os dias e são levados por várias pessoas."
10002200-13 = "Ao vê-los cumprindo seu papel e proporcionando memórias divertidas... honestamente, sinto inveja. É algo realmente maravilhoso."
10002200-14 = "Se eu tivesse nascido como um fogo de artifício, será que eu teria conseguido fazer alguém feliz daquele jeito?"
10002200-15 = "Só de pensar nisso, meu peito aperta um pouco."
10002200-16 = "Eu também, um dia..."
10002200-17 = "Tio, me vê esse aqui! E se tiver mais fogos de artifício, traz tudo!"
10002200-18 = "Ora, parece que temos clientes barulhentos hoje, não é...?"
10002200-23 = "Espere um pouco. Isso é algo que nós vimos primeiro. Se pretende roubar, não hesitarei em entrar em um conflito físico."
10002200-24 = "Droga... já não me resta quase energia nenhuma, tsc...!"
10002200-25 = "Ah, tio, e isso aqui? Também está à venda?"
10002200-26 = "Esse foguete gigante!"
10002200-27 = "Foguete gigante...? Por acaso, está falando de mim?"
10002200-28 = "Fufu, não é bem assim, estudante. Não é algo para se dizer em voz alta, mas... isso não é um fogo de artifício, é uma bomba de napalm."
10002200-29 = "Ah, é?"
10002200-30 = "Se for para soltar faíscas chamativas, tanto faz o nome que tenha!"
10002200-31 = "Bem, com certeza seria chamativo. Com apenas uma dessas, o mundo viraria dia em um instante."
10002200-32 = "E-então...?"
10002200-33 = "Então me vê esse! Isso aqui é o suficiente?"
10002200-34 = "Fique com o troco!"
10002200-35 = "......???"
10002200-36 = "E-espere. Você realmente pretende usar isso? Isso não é um fogo de artifício, é uma bomba..."
10002200-37 = "Se explode no céu, não tem muita diferença entre uma bomba e um fogo de artifício!"
10002200-38 = "De qualquer forma, estamos levando! O dinheiro foi o suficiente? Foi, né? Então tá, estamos com pressa!!"
10002200-43 = "Bem, não deixa de ser verdade, de certa forma..."
10002200-45 = "...Para o bem ou para o mal, talvez a hora da despedida tenha chegado. Boa noite, eu sou a Bomba Millennium nº 60."
10002200-46 = "...Não, espere, não é isso."
10002200-47 = "Eu me chamo 'Fogo de Artifício Millennium nº 60'. Parece que fui escolhida. Então, vou para o mundo do brilho... espero que as memórias de vocês sejam, ao menos um pouco, mais coloridas por minha causa—"
