[translation]
10002200-1 = "後日談その7;空に願いを"
10002200-3 = "こ、こんにちは。ミレニアム製爆弾60号と申します。名前の通り、ミレニアムサイエンススクール産です。"
10002200-4 = "え、えっと、これでも一応ナパーム弾です！ぜ、全長23cm、体重44kg、それから……。"
10002200-5 = "あ、ね、年齢は秘密です……っ！"
10002200-6 = "どうして海の家にナパーム弾が……そうお思いですか？"
10002200-7 = "本来はとある用途で作成されたようなのですが、どういうわけかお蔵入りになってしまい……。"
10002200-8 = "それでも私は、幸運にも「破棄」という形ではなく、色々な優しい方の手を渡って……どういうわけか、今はここに辿り着いたのです。"
10002200-9 = "すみません、説明になってませんね……ここに来て、もう結構な時間が経ちました。"
10002200-10 = "私も混乱することばかりですが、ここは海が綺麗ですし、風も涼しくて素敵なところです。"
10002200-11 = "ただ、ここは私には似合わない場所ということもあり、誰の手に取られることも無く、お店に来てからもずっと埃を被る毎日でした。"
10002200-12 = "他の方々……特にすぐそこの花火なんかは、毎日のように新しい方が来ては様々な方々に連れられて行きます。"
10002200-13 = "自身が為すべきことを果たし、楽しい思い出を与えることができるその姿を見ていると……正直、羨ましくなってしまいます。それは、本当に素敵なことです。"
10002200-14 = "もし私も花火に生まれていたら、そんな風に誰かを楽しませることができたのでしょうか？"
10002200-15 = "そう思うと少しだけ、胸が苦しくなります。"
10002200-16 = "私も、いつか――"
10002200-17 = "おじさん、これちょうだい！あと他にも花火あったら全部出して！"
10002200-18 = "おや、今日はどうやら騒がしいお客さんが来ていますね……？"
10002200-23 = "ちょっと待って。それは私たちが先に手を付けてたもの。もし奪うつもりなら、物理的な衝突も辞する気はない。"
10002200-24 = "ぐっ……もうほとんど体力なんざ残ってねえよ、ちっ……！"
10002200-25 = "あっ、おじさんこれは？これも売り物なのか？"
10002200-26 = "このでっかい花火！"
10002200-27 = "でっかい花火……？もしかして、私のことでしょうか？"
10002200-28 = "ふふっ、違うよ学生さん。大きな声でいうものでもないが……それは花火ではなく、ナパーム弾さ。"
10002200-29 = "へぇ。"
10002200-30 = "派手に火花を散らせるんなら、名前なんてどっちだって良いさ！"
10002200-31 = "そりゃあもちろん派手だろうね。それ一発で、一瞬世界が真っ昼間に変わるくらいには。"
10002200-32 = "えっと……？"
10002200-33 = "じゃあこれちょうだい！こんくらいで足りるか？"
10002200-34 = "釣りは取っときな！"
10002200-35 = "……？？？"
10002200-36 = "ま、待ちなさい。本当に使う気かい？それは花火ではなく爆弾で……"
10002200-37 = "空中で爆発するってんなら、爆弾も花火もそうそう変わんねえよ！"
10002200-38 = "取り合えずもらってくからな！金はそれで足りたか？足りたな？そうか、じゃ、あたしら忙しいから！！"
10002200-43 = "まあ、あながち間違ってはないが……。"
10002200-45 = "……幸か不幸か、お別れの時間が近づいてきたかもしれません。こんばんは、ミレニアム製爆弾60号です。"
10002200-46 = "……いえ、違いますね。"
10002200-47 = "「ミレニアム製花火60号」と申します。どうやら私は選ばれたようです。それでは、輝きの世界へ……どうかあなたたちの思い出が、少しでも彩られるように――"
