[translation]
1000408-1 = "どこか神秘的な夜"
1000408-2 = "ゲヘナ学園・風紀委員会専用校舎"
1000408-3 = "（休日の深夜なこともあって、校舎周辺には誰もいない）"
1000408-4 = "（風紀委員会の部屋だけ、電気がついていた）"
1000408-7 = "風紀委員会・執務室前"
1000408-9 = "（コンコン）"
1000408-10 = "（……）"
1000408-11 = "（反応がない）"
1000408-12 = "（コンコンコン）"
1000408-13 = "――――――――――。"
1000408-14 = "[s] 中に入る。"
1000408-19 = "え……？せ、先生？"
1000408-20 = "[s] \"手伝いに来たよ。\""
1000408-21 = "て、手伝い？私の仕事の……？"
1000408-22 = "この時間に？"
1000408-23 = "……来てくれたのはありがたいけど、この仕事は私にしかできないことだから……。先生が手伝える仕事はないと思う……。"
1000408-24 = "[s] \"じゃあ、ただここにいる。\""
1000408-25 = "……。"
1000408-26 = "……それぐらいなら、いいけど。"
1000408-28 = "（横に座って、ヒナが作業してるところを見守ることにした）"
1000408-31 = "（カリカリ――）"
1000408-32 = "……。"
1000408-34 = "（カリカリカリカリ――）"
1000408-35 = "…………。"
1000408-37 = "（カリカリカリカリ――）"
1000408-38 = "……やっぱりちょっと気になる。"
1000408-39 = "先生が横でじっと見てると、あまり集中できない……。"
1000408-40 = "……。"
1000408-41 = "というか、なんでこんなに暑いんだろう……。"
1000408-42 = "[s1] \"顔が赤いよ。\"\n[s2] \"熱でもあるの？\""
1000408-43 = "ま、待って！？何をっ……！？"
1000408-44 = "ま、待って！？何をっ……！？"
1000408-45 = "[s] おでこに手を当てる。"
1000408-46 = "あ、あぅっ……！"
1000408-47 = "……。"
1000408-48 = "………。"
1000408-49 = "[s3] \"おでこが熱々だよ。\"\n[s4] \"ほっぺが熱々だよ。\""
1000408-50 = "し、仕方ないでしょう。ここ何日か寝てないんだし。"
1000408-51 = "し、仕方ないでしょう。ここ何日か寝てないんだし。"
1000408-52 = "[s] \"眠いと体が熱くなるの？\""
1000408-53 = "……生理現象なの！眠いと体温が高くなるの！"
1000408-54 = "[s5] \"なでなで。\"\n[s6] \"子供みたいで可愛い。\" "
1000408-59 = "……。"
1000408-60 = "……その……や、やめて……。"
1000408-63 = "……。"
1000408-64 = "やめて！！"
1000408-67 = "……。"
1000408-68 = "……今は、仕事中、だから。"
1000408-69 = "そういう風に撫でられると、なんだかホッとして……そのまま眠っちゃいそうで……。"
1000408-70 = "[s] \"ごめん。\""
1000408-71 = "……いや。謝るようなことじゃ……。"
1000408-72 = "……。"
1000408-73 = "……ふふっ。"
1000408-74 = "考えてみれば……どこか神秘的な夜ね。"
1000408-75 = "こんな時間に、執務室で先生と二人っきりなんて。"
1000408-76 = "このまま倒れて寝てしまっても……それもいいかもしれない。"
1000408-77 = "ふふ……うん、それで……悪くはなさそう。"
1000408-78 = "眠くて……ホッとする……。"
1000408-79 = "先生……。"
1000408-81 = "（パタン――）"
1000408-82 = "（ヒナがそのまま後ろに崩れてしまったので、窓辺に横たえさせた）"
1000408-85 = "― ……。"
1000408-88 = "[wa:1000]― そんなにじっと見られたら……[wa:2500]いくら私でも恥ずかしい。"
1000408-91 = "[wa:500]― 不思議だね。[wa:2800]先生と一緒にいると[wa:2700]なんだか安心する。"
1000408-94 = "[wa:1000]― 実は……。[wa:2000]先生のそういう顔が好き。"
1000408-97 = "― ……。"
1000408-100 = "― はあ……。[wa:3000]何も考えたくない。"
1000408-103 = "― ……。"
1000408-106 = "（ヒナはそのまま、すっと眠ってしまった）"
1000408-107 = "（ヒナの身体にコートをかけて、そっと部屋を出た）"
