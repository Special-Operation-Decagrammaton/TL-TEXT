[translation]
1000408-1 = "Uma noite misteriosa"
1000408-2 = "Academia Gehenna - Prédio do Comitê Disciplinar"
1000408-3 = "（Como é madrugada de um feriado, não há ninguém ao redor do prédio）"
1000408-4 = "（Apenas a sala do Comitê Disciplinar estava com as luzes acesas）"
1000408-7 = "Em frente à sala do Comitê Disciplinar"
1000408-9 = "（Toc toc）"
1000408-10 = "（……）"
1000408-11 = "（Sem resposta）"
1000408-12 = "（Toc toc toc）"
1000408-13 = "――――――――――。"
1000408-14 = "[s] Entrar."
1000408-19 = "Eh……? P-Professor?"
1000408-20 = "[s] \"Vim ajudar.\""
1000408-21 = "A-ajudar? Com o meu trabalho……?"
1000408-22 = "A esta hora?"
1000408-23 = "……Agradeço por ter vindo, mas este trabalho é algo que só eu posso fazer…… Não acho que haja algo em que o Professor possa ajudar……."
1000408-24 = "[s] \"Então, vou apenas ficar aqui.\""
1000408-25 = "……."
1000408-26 = "……Se for só isso, tudo bem."
1000408-28 = "（Decidi sentar ao lado e observar Hina enquanto ela trabalha）"
1000408-31 = "（Risca, risca――）"
1000408-32 = "……."
1000408-34 = "（Risca, risca, risca, risca――）"
1000408-35 = "…………."
1000408-37 = "（Risca, risca, risca, risca――）"
1000408-38 = "……Sinceramente, isso está me incomodando um pouco."
1000408-39 = "Quando o Professor fica me encarando assim, não consigo me concentrar……."
1000408-40 = "……."
1000408-41 = "E por falar nisso, por que está tão quente aqui……."
1000408-42 = "[s1] \"Seu rosto está vermelho.\"\n[s2] \"Você está com febre?\""
1000408-43 = "E-espere!? O que você está……!?"
1000408-44 = "E-espere!? O que você está……!?"
1000408-45 = "[s] Colocar a mão na testa dela."
1000408-46 = "A-ah……!"
1000408-47 = "……."
1000408-48 = "……."
1000408-49 = "[s3] \"Sua testa está fervendo.\"\n[s4] \"Suas bochechas estão fervendo.\""
1000408-50 = "N-não tem como evitar. Faz alguns dias que não durmo."
1000408-51 = "N-não tem como evitar. Faz alguns dias que não durmo."
1000408-52 = "[s] \"O corpo esquenta quando você está com sono?\""
1000408-53 = "……É um fenômeno fisiológico! A temperatura do corpo sobe quando estou com sono!"
1000408-54 = "[s5] \"Fazer carinho.\"\n[s6] \"É fofo, parece uma criança.\""
1000408-59 = "……."
1000408-60 = "……Isso…… p-pare……."
1000408-63 = "……."
1000408-64 = "Pare!!"
1000408-67 = "……."
1000408-68 = "……Agora, eu estou trabalhando."
1000408-69 = "Quando você faz carinho assim, eu me sinto aliviada…… e parece que vou acabar dormindo……."
1000408-70 = "[s] \"Desculpe.\""
1000408-71 = "……Não. Não é algo pelo qual precise se desculpar……."
1000408-72 = "……."
1000408-73 = "……Fufu."
1000408-74 = "Pensando bem…… é uma noite um tanto mística, não é?"
1000408-75 = "Estar a sós com o Sensei no escritório a esta hora."
1000408-76 = "Se eu simplesmente desmaiasse e dormisse aqui…… talvez não fosse tão ruim."
1000408-77 = "Fufu…… sim, isso…… não parece ser algo ruim."
1000408-78 = "Estou com sono…… e me sinto aliviada……."
1000408-79 = "Sensei……."
1000408-81 = "（Patan――）"
1000408-82 = "（Hina caiu para trás, então a deitei perto da janela）"
1000408-85 = "― ……."
1000408-88 = "[wa:1000]― Se você ficar me olhando assim…… [wa:2500]mesmo eu acabo ficando envergonhada."
1000408-91 = "[wa:500]― É estranho. [wa:2800]Quando estou com o Sensei, [wa:2700]me sinto segura de alguma forma."
1000408-94 = "[wa:1000]― Na verdade…… [wa:2000]eu gosto dessa sua expressão, Sensei."
1000408-97 = "― ……."
1000408-100 = "― Ah…… [wa:3000]não quero pensar em nada."
1000408-103 = "― ……."
1000408-106 = "（Hina adormeceu suavemente ali mesmo）"
1000408-107 = "（Cobri Hina com meu casaco e saí da sala silenciosamente）"
