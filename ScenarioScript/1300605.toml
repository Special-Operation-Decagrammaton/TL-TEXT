[translation]
1300605-1 = "O hobby da pequena diabinha"
1300605-2 = "（Enquanto patrulhava a cidade por conta do trabalho no Schale...）"
1300605-4 = "[ns] \"Ué, Mutsuki?\""
1300605-8 = "（Pensei em falar com ela, mas a Mutsuki andou rápido e sumiu da minha vista）"
1300605-9 = "（A direção para onde a Mutsuki foi é...）"
1300605-10 = "[ns] \"O Mercado Negro...?\""
1300605-12 = "[ns] \"…….\""
1300605-14 = "[ns] \"……Vou segui-la.\""
1300605-18 = "[ns] \"Mutsuki!\""
1300605-19 = "Hm? Ué, é o Sensei."
1300605-20 = "Que raro encontrar o Sensei num lugar desses. Você também tinha algum assunto no Mercado Negro?"
1300605-21 = "[s1] \"Essa é a minha pergunta.\"\n[s2] \"E você, Mutsuki, por que está aqui?\""
1300605-22 = "Ah, é por causa daquele hobby que eu comentei no MomoTalk antes."
1300605-23 = "Ah, é por causa daquele hobby que eu comentei no MomoTalk antes."
1300605-24 = "[s] \"Hobby...?\""
1300605-25 = "Hmm, acho que é mais rápido mostrar do que explicar com palavras. O Sensei concorda, né? Concorda, não concorda?"
1300605-28 = "Então está decidido! Vamos lá, vamos, Sensei!"
1300605-29 = "[s] \"Hã? M-mas...\""
1300605-31 = "[ns] \"'Loja Especializada em Bombas: Todas as bombas que você procura estão aqui'?\""
1300605-33 = "[ns] \"O hobby da Mutsuki, será que é...\""
1300605-34 = "Hm? É colecionar bombas~!"
1300605-35 = "[s] \"B-bombas? Por que você quer algo assim...?\""
1300605-36 = "Kufufu, é claro que é para..."
1300605-37 = "[s] \"Claro que é para...?\""
1300605-38 = "Porque com bombas, dá para fazer várias pegadinhas divertidas!"
1300605-39 = "[s] \"Pegadinhas...?\""
1300605-40 = "Isso mesmo! Por exemplo, Sensei, olha só. Essa aqui é uma bomba de fumaça,"
1300605-41 = "se você tirar o pino e jogar, consegue bloquear a visão por cerca de 1 minuto."
1300605-42 = "Ou seja..."
1300605-43 = "[s] \"...Ou seja?\""
1300605-44 = "Que dá para fazer pegadinhas à vontade por um minuto inteiro sem ninguém perceber!"
1300605-45 = "[s] \"...E-entendi.\""
1300605-46 = "Ah, e tem a bomba de luz também, que funciona de um jeito parecido."
1300605-47 = "Se usar quando o sol se põe e fica escuro, todo mundo leva um susto, é super engraçado!"
1300605-48 = "[s] \"Então o objetivo é assustar os outros...\""
1300605-49 = "Ah, uma bomba adesiva. Essa também é bem interessante, sabia?"
1300605-50 = "Tem outras como essa aqui, ah, e essa aqui também!"
1300605-51 = "[s] \"Eu não sabia que existiam tantos tipos de bombas.\""
1300605-52 = "Ahaha! Pois é! E os tipos de bombas não variam só pelos efeitos, Sensei."
1300605-53 = "Dependendo do objetivo e do mecanismo de ativação, existem milhares de variedades..."
1300605-54 = "E aí? O mundo das bombas é incrível, não é? É bem profundo, né~?"
1300605-55 = "[s3] \"Não entendi muito bem, mas...\"\n[s4] \"Deu para perceber que você está bem empolgada, Mutsuki.\""
1300605-56 = "Kufufu, é mesmo."
1300605-57 = "Kufufu, é mesmo."
1300605-58 = "Fufu. Já que o Sensei veio comigo hoje~, deixa eu ver, será que tem algo especial por aqui?"
1300605-59 = "Ah, Sensei. O que acha dessa? É uma bomba de brilho!"
1300605-60 = "[s] \"O que é uma bomba de brilho...?\""
1300605-61 = "Fufu, é assim..."
1300605-67 = "（Assim, passei o tempo fazendo compras divertidas com a Mutsuki）"
1300605-68 = "（Embora o objeto das compras fossem bombas...）"
