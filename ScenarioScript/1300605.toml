[translation]
1300605-1 = "小悪魔の趣味"
1300605-2 = "（シャーレの仕事の関係で、街をパトロールしていた時……）"
1300605-4 = "[ns] \"あれ、ムツキ？\""
1300605-8 = "（話しかけようと思ったけど、ムツキは早歩きで視界から消えてしまった）"
1300605-9 = "（ムツキがいなくなった方向は……）"
1300605-10 = "[ns] \"ブラックマーケット……?\""
1300605-12 = "[ns] \"……。\""
1300605-14 = "[ns] \"……追いかけてみよう。\""
1300605-18 = "[ns] \"ムツキ！\""
1300605-19 = "ん？あれ、先生じゃん。"
1300605-20 = "こんなところで先生に会えるなんて、珍しいね。先生もブラックマーケットに用事があったの？"
1300605-21 = "[s1] \"それは私の台詞。\"\n[s2] \"ムツキこそ、どうしてここに？\""
1300605-22 = "うん、前にモモトークで言ってた趣味でね。"
1300605-23 = "うん、前にモモトークで言ってた趣味でね。"
1300605-24 = "[s] \"趣味……？\""
1300605-25 = "うーん、言葉であれこれ言うより、見せてあげた方が早いかも。先生もそう思うよね。思うでしょ？"
1300605-28 = "じゃあ決まり！さあさあ、行こう、先生！"
1300605-29 = "[s] \"え？で、でも……。\""
1300605-31 = "[ns] \"「爆弾専門店・あなたが求める全ての爆弾がここに」？\""
1300605-33 = "[ns] \"ムツキの趣味って、もしかして……。\""
1300605-34 = "ん？爆弾集めだよ～？"
1300605-35 = "[s] \"ば、爆弾？なんでそんなものを……？\""
1300605-36 = "くふふ、それはもちろん……。"
1300605-37 = "[s] \"もちろん？\""
1300605-38 = "爆弾があると、色々と楽しいイタズラができるから！"
1300605-39 = "[s] \"イタズラ……？\""
1300605-40 = "そうそう！例えば先生、見てみて。この爆弾、煙幕弾なんだけど、"
1300605-41 = "ここのピンを抜いてから投げると、約1分間、視界を遮ることができるの。"
1300605-42 = "つまり……。"
1300605-43 = "[s] \"……つまり？\""
1300605-44 = "誰にも気づかれずに、1分間も思う存分イタズラができるってこと！"
1300605-45 = "[s] \"……そ、そっか。\""
1300605-46 = "あっ、他にも似たような使い方のだと、閃光弾もあるよ。"
1300605-47 = "日が沈んで暗くなった時にこれを使うと、みんなビックリしてすっごい面白いの！"
1300605-48 = "[s] \"ビックリさせるのが目的なんだね……。\""
1300605-49 = "あっ、ベタベタ爆弾だ。これも結構面白いんだよ？"
1300605-50 = "他にはこんなのとかー、あっ、こんなのとかも！"
1300605-51 = "[s] \"爆弾って、こんなに種類がいっぱいあるんだね。\""
1300605-52 = "あはっ！うん、そうなの！それに爆弾の種類って、効果だけじゃないんだよ、先生。"
1300605-53 = "どんな目的で使うのかによって、あとは作動方式によってもその種類は千差万別で……。"
1300605-54 = "どう？爆弾の世界ってすごいでしょ？深いでしょ～？"
1300605-55 = "[s3] \"よく分からないけど……。\"\n[s4] \"ムツキが夢中になってるってことはよく分かったかな。\""
1300605-56 = "くふふっ、そっか。"
1300605-57 = "くふふっ、そっか。"
1300605-58 = "ふふっ。じゃあ今日はせっかく先生と一緒に来たんだし～。どれどれ、何か特別なものとかないかな～。"
1300605-59 = "あっ、先生。これはどう？キラキラ爆弾だって！"
1300605-60 = "[s] \"キラキラ爆弾って何……？\""
1300605-61 = "ふふっ、これはね～……。"
1300605-67 = "（そうやって、ムツキと楽しく買い物をしながら過ごした）"
1300605-68 = "（買い物の対象は、爆弾だったけど……）"
