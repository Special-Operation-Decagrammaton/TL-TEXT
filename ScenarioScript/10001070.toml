[translation]
10001070-1 = "Episódio 7; Pudim para os trabalhadores!"
10001070-2 = "Academia Federal Red Winter - Rua Central"
10001070-3 = "Ei, ei, você tem algum plano especial para o feriado deste ano?"
10001070-4 = "Hum, não. Acho que vou passar o Festival do Solstício de Verão tranquilamente em casa."
10001070-5 = "Ah, não! É um feriado, afinal. Se quiser, vamos passear pela cidade juntas!"
10001070-6 = "Ouvi dizer que o conselho estudantil vai preparar uma fogueira enorme no cruzamento da 3ª rua!"
10001070-7 = "Quem sabe a gente não encontra alguém especial por lá, né? Hehe...!"
10001070-8 = "Hmm, então acho que vou fazer isso..."
10001070-9 = "............"
10001070-10 = "Grrr... Não gosto disso!#nNão gosto de nada disso!"
10001070-11 = "O que houve, Presidente Cherino?"
10001070-12 = "Olhe! Veja as alunas da nossa Red Winter, embriagadas pela atmosfera do festival e andando por aí tão felizes!"
10001070-13 = "Eu, que possuo a maior dignidade da Academia Federal Red Winter, estou aqui sem poder comer um lanche, sem poder tirar uma soneca, passando por um sofrimento terrível, enquanto as alunas aproveitam o clima do Festival do Solstício de Verão..."
10001070-14 = "Isso é injusto!"
10001070-15 = "Todas serão expurgadas, expurgadas!#nTodas que estiverem aproveitando o clima do Festival do Solstício de Verão agora serão condenadas a arrancar o mato do campo por um mês!"
10001070-16 = "[s] \"Você não é a presidente agora, então não pode aplicar punições, não é...?\""
10001070-17 = "...É verdade."
10001070-18 = "Nesse caso, vou anotar os nomes agora e, quando eu recuperar meu poder, aplicarei a punição..."
10001070-19 = "Chefe da Secretaria Tomoe. Registre o nome de cada uma das alunas que passaram por aqui, sem deixar passar ninguém!"
10001070-20 = "Não pode, Cherino-chan.#nAfinal, não foi você mesma quem disse que todas as alunas deveriam aproveitar o Festival do Solstício de Verão?"
10001070-21 = "Se você retirar a ordem por um simples capricho, todas vão ficar insatisfeitas."
10001070-22 = "Mas é que...! Eu sou a única que não pode brincar e ainda estou na posição de exilada... Isso é tão injusto!"
10001070-23 = "Na nossa Academia Federal Red Winter, que tem a liberdade e a igualdade como lema, não pode haver injustiça!"
10001070-24 = "Já que é assim, por que não aproveitamos este Festival do Solstício de Verão junto com as outras alunas?"
10001070-25 = "Aproveitar junto com as outras alunas...?"
10001070-26 = "Sim. A Presidente Cherino sempre fica em assentos elevados comandando os eventos e nunca teve a oportunidade de aproveitar um festival junto com as alunas."
10001070-27 = "Se aproveitar esta oportunidade na posição de uma aluna comum, talvez seja útil para o planejamento do próximo festival."
10001070-28 = "Ho... Entendo."
10001070-29 = "Essa é uma ótima ideia!"
10001070-30 = "Entender como as alunas vivem também é um dever de um líder!#nJá que estou aqui, vou esquecer o trabalho por um momento e inspecionar a cidade na posição de uma aluna comum."
10001070-31 = "...Não estou dizendo isso porque quero brincar, de jeito nenhum!"
10001070-32 = "Hum."
10001070-33 = "Então, primeiro vamos àquela confeitaria.#nDepressa, camarada!"
10001070-37 = "Nhac, nhac...#nAh, que delícia."
10001070-38 = "O Medovik desta loja é realmente doce e delicioso! Acho que conseguiria comer isso o dia todo!"
10001070-39 = "Cherino-chan, tem creme no seu bigode."
10001070-41 = "Grrr, eu não sou criança! Não toque no meu bigode sem permissão!"
10001070-42 = "...Deixando isso de lado, percebi que já gastei toda a minha mesada do mês.#n\"Ivan Kupala\"... que festival assustador."
10001070-43 = "Acho que entendi por que os mercadores de Kivotos lançam todo tipo de doce na época do festival..."
10001070-44 = "Vamos, camarada. Onde vamos brincar... digo, inspecionar agora?"
10001070-45 = "[s] \"O que será aquela pilha enorme de lenha?\""
10001070-46 = "...Pilha de lenha?"
10001070-47 = "Ah, aquilo não é lenha, é o altar do \"Ivan Kupala\" que o \"Departamento de Obras\" está montando!"
10001070-48 = "No \"Ivan Kupala\", sempre queimamos um boneco, mas desta vez eu dei ordens para montarem um \"altar\" especial para queimar um boneco gigantesco!"
10001070-49 = "[s] \"Entendi. Mas, não parece muito com um altar ainda...\""
10001070-51 = "Isso é... verdade. Será que é porque não tem nenhum enfeite para ser chamado de altar...?"
10001070-52 = "Não falta muito para o festival, por que ainda está nesse estado?"
10001070-53 = "Estão fazendo corpo mole? É sabotagem!?"
10001070-54 = "Por favor, acalme-se, Presidente. Talvez estejamos entendendo algo errado."
10001070-55 = "O que de errado!? Alunas incompetentes que não conseguem terminar o trabalho dentro do prazo não são necessárias na nossa Academia Federal Red Winter! Todas serão expurgadas, expurgadas!"
10001070-56 = "O local onde a Presidente instruiu a instalação do altar não é aqui, mas sim na praça em frente à secretaria. Isso certamente não deve ter relação com o \"Ivan Kupala\"."
10001070-57 = "É, é mesmo? Então, o que é aquela pilha de lenha?"
10001070-58 = "As alunas do Departamento de Obras estão reunidas ali perto, vamos perguntar a elas."
10001070-61 = "Ei, o trabalho está indo bem—"
10001070-67 = "Nós nunca seremos escravas!!"
10001070-70 = "Aaaaaah—!!"
10001070-72 = "Ué, o quê? Que clima é esse...?"
10001070-73 = "A partir de hoje, começam os dias de folga do \"Ivan Kupala\"."
10001070-74 = "Que tipo de festival é o \"Ivan Kupala\"? Não era o festival da primavera, onde descartamos o pão seco e a carne salgada que comemos durante todo o inverno para desfrutar das frutas frescas e abundantes que o sol nos presenteia!?"
10001070-75 = "Isso vale para todas as alunas de Red Winter, sem exceção. Nós também temos o direito de aproveitar esse feriado!"
10001070-76 = "Isso mesmo, concordo!"
10001070-77 = "Queremos nosso feriado também!"
10001070-78 = "Mas, em vez de folga, estamos sendo mobilizadas para trabalhar dia e noite em um ambiente cruel de turnos duplos, tendo nossa força de trabalho explorada!"
10001070-79 = "Isso vai contra o espírito de liberdade e igualdade, que é o princípio da nossa Academia Federal de Red Winter! Eu quero condenar veementemente essa situação!"
10001070-80 = "Ooooooh—!"
10001070-81 = "Isso mesmo! Isso está errado!"
10001070-82 = "Aqueles que pertencem à secretaria da Academia Federal de Red Winter, incluindo a Presidente Cherino, garantam nossos direitos como trabalhadoras do \"Departamento de Obras\"!"
10001070-83 = "Vocês devem nos fornecer tempo de descanso suficiente, bônus adicionais e, hum... dois pudins para cada uma! Vamos continuar com a greve e as manifestações!"
10001070-84 = "Aaaaaah—!"
10001070-86 = "Greve, greve!"
10001070-88 = "Esperem, esperem, esperem! Vocês, com a permissão de quem estão fazendo isso?"
10001070-89 = "Ações coletivas sem a permissão da secretaria não são permitidas! Todas vocês serão expurgadas, expurgadas!"
10001070-90 = "......Presidente Cherino?"
10001070-91 = "Não sei por que você está aqui, mas... veio na hora certa!"
10001070-92 = "Pessoal! Peguem a Presidente Cherino e amarrem-na nessa pilha de lenha!"
10001070-101 = "E-esperem! Me soltem! Vocês sabem com quem estão falando?!"
10001070-103 = "Guh! E-e além disso, o que vocês pretendem fazer com isso..."
10001070-105 = "......Não me digam que pretendem me queimar junto com a lenha como se eu fosse uma boneca!?"
10001070-107 = "Por mais que seja uma revolução, não faríamos algo tão cruel assim."
10001070-109 = "Mas não é exagero dizer que a Presidente Cherino é uma líder inútil que nunca trabalha e só vive brincando! Ela é uma opressora maligna que precisa ser derrubada!"
10001070-111 = "Pessoal! Hoje, vamos expor essa opressora maligna na rua principal da academia e torná-la o novo símbolo para mostrar às trabalhadoras como \"não devemos ser\" daqui para frente!"
10001070-113 = "Aaaaaah!"
10001070-115 = "Amarrem, amarrem!"
10001070-117 = "E-esperem! Se amarrarem com tanta força, meu braço vai quebrar, ai, ai, ai, ai, ai!"
10001070-119 = "Ca-camarada! Tomoe! Me ajude!!"
