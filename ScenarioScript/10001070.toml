[translation]
10001070-1 = "第7話;労働者にプリンを！"
10001070-2 = "レッドウィンター連邦学園・中央通り"
10001070-3 = "ねぇねぇ、今年の連休って、何か特別な予定とかある？"
10001070-4 = "ううん。今年の夏至祭は、家で静かに過ごそうかなって。"
10001070-5 = "え～、せっかくの連休なのに。よかったら市内で一緒に遊ぼうよ！"
10001070-6 = "聞いた話だと、生徒会が3丁目の交差点にすっごい大きな焚火を用意するらしいよ！"
10001070-7 = "もしかしたらそこで、素敵な出会いとかあったりするかもしれないじゃん？ふふっ……！"
10001070-8 = "うーん、じゃあそうしよっかな……。"
10001070-9 = "…………。"
10001070-10 = "ううっ……気に入らない！#nもう何もかもが気に入らない！"
10001070-11 = "どうされたんですか、チェリノ会長？"
10001070-12 = "見ろ！ああしてお祭りの雰囲気に酔いしれて、楽しそうに歩き回る我がレッドウィンターの生徒たちを！"
10001070-13 = "レッドウィンター連邦学園で最高の尊厳を持つおいらが、こうしておやつも食べられず、昼寝もできず、大変な苦労をしているというのに、生徒たちは夏至祭の雰囲気を楽しんで……"
10001070-14 = "こんなの不公平だ！"
10001070-15 = "みんな粛清だ、粛清！#n今夏至祭の雰囲気を楽しんでいるやつらは全員、これから一か月間グラウンドの草むしりの刑に処する！"
10001070-16 = "[s] \"今は会長じゃないから、罰は与えられないんじゃ……？\""
10001070-17 = "……そうだった。"
10001070-18 = "そうしたら今は名前を記録しておいて、あとで復権したらその時に罰を与えるとしよう……。"
10001070-19 = "トモエ秘書室長。さっき通り過ぎていった生徒たちの名前を一人残さず記録しておくように！"
10001070-20 = "ダメですよ、チェリノちゃん。#nそもそも生徒全員で夏至祭を楽しもう、って言ったのはチェリノちゃんでしょう？"
10001070-21 = "ちょっとした気まぐれで命令を撤回なんてしてしまうと、みんな嫌がりますよ。"
10001070-22 = "だって～！おいらだけこうやって遊ぶこともできず、追われたままの立場だなんて……こんなの不公平だあ！"
10001070-23 = "自由と平等をモットーにする我がレッドウィンター連邦学園に、不公平などあってはならない！"
10001070-24 = "でしたらせっかくですし、私たちも他の生徒たちと一緒に、この夏至の祝祭を楽しんでみませんか？"
10001070-25 = "他の生徒たちと一緒に楽しむ……？"
10001070-26 = "はい。チェリノ会長はいつも高い位置の席でイベントの統括指揮をされていて、生徒たちと一緒にお祭りを楽しむような機会はありませんでしたし。"
10001070-27 = "この機会に、普通の生徒としての立場で楽しんでみたら、次のお祭りの準備に役立つかもしれません。"
10001070-28 = "ほう……なるほど。"
10001070-29 = "それは良いアイデアだな！"
10001070-30 = "生徒たちがどのように生活しているのかを把握することもまた、指導者としての責務！#nこの機会に一度仕事のことを忘れて、普通の生徒の立場で街を視察するのもアリだな。"
10001070-31 = "……決して遊びたくて言ってるわけではない！"
10001070-32 = "ふむ。"
10001070-33 = "ではまずあそこのケーキ屋に行くとしよう。#n急ぐぞ、カムラッド！"
10001070-37 = "モグモグ……。#nはぁ、おいしい～。"
10001070-38 = "このお店の[ruby=Medovik]メドヴィク[/ruby]は本当に甘くておいしいな！これならいくらでも食べられそうだ！"
10001070-39 = "チェリノちゃん、お髭にクリームがついてますよ。"
10001070-41 = "ううっ、おいらは子供じゃないんだから！勝手に髭に触らないで！"
10001070-42 = "……それはともかく、気が付けばもう一か月分のお小遣いを使ってしまったな。#n「イワン・クパーラ」……なんという恐ろしいお祭りだ。"
10001070-43 = "キヴォトスの商人たちがお祭りの時期を狙って、ありとあらゆる甘いお菓子を出す理由が分かった気がするな……。"
10001070-44 = "さあ、カムラッド。次はどこに遊びに……いや、視察に行こうか？"
10001070-45 = "[s] \"あの大きな薪の山、何だろう？\""
10001070-46 = "……薪の山？"
10001070-47 = "ああ、あれは薪ではなく、「工務部」が設置中の「イワン・クパーラ」の祭壇だな！"
10001070-48 = "「イワン・クパーラ」では毎回人形を燃やすのだが、今回は特別に巨大な人形を燃やすための「祭壇」を設置するようにと、おいらから指示を出していたのだ！"
10001070-49 = "[s] \"そうなんだ。でも、まだそうは見えないというか……。\""
10001070-51 = "それは……確かにそうだな。祭壇と呼ぶには飾りが一つもついてないせいなのか……。"
10001070-52 = "お祭りまでもう時間も無いのに、どうしてまだあんな状態なんだ？"
10001070-53 = "サボっているのか？サボタージュなのか！？"
10001070-54 = "落ち着いてください、会長。何か私たちが、勘違いをしているのかもしれません。"
10001070-55 = "何が勘違いだ！期間内に仕事を終わらせられない無能な生徒は、我がレッドウィンター連邦学園には必要無い！みんな粛清だ、粛清！"
10001070-56 = "会長が祭壇を設置するように指示をされた場所はここではなく、事務局前の広場です。これはきっと、「イワン・クパーラ」とは関係無いものなのでしょう。"
10001070-57 = "そ、そうだったか？じゃあ、あの薪の山はいったいなんだ？"
10001070-58 = "ちょうどあの辺りに工務部の生徒たちが集まってるから、聞いてみるとしよう。"
10001070-61 = "お～い、作業は順調に――"
10001070-67 = "あたしたちは、決して奴隷にはならない！！"
10001070-70 = "わあああっ――！！"
10001070-72 = "え、あれ？なんだこの雰囲気は……？"
10001070-73 = "これから数日間、「イワン・クパーラ」の連休が始まる。"
10001070-74 = "「イワン・クパーラ」はどんな祝祭だ？冬の間ずっと食べていた乾いたパンや塩漬けの肉を捨て、太陽から贈られる新鮮で豊かな果実を楽しむ、新緑の祝祭ではなかったのか！？"
10001070-75 = "これは、レッドウィンターのどの生徒にも例外は無い。あたしたちにも、この祝祭の連休を楽しむ権利があるはずだ！"
10001070-76 = "そうだ、そうだ！"
10001070-77 = "私たちにも連休を！"
10001070-78 = "しかしあたしたちは連休はおろか、1日2交代制の過酷な環境の中、昼夜を問わず作業に動員され、労働力を搾取されているではないか！"
10001070-79 = "これはあたしたちのレッドウィンター連邦学園の理念である、自由と平等の精神に反する！あたしはこの状況を、強く糾弾したい！"
10001070-80 = "おおおおーーー！"
10001070-81 = "そうだ！こんなの間違ってる！"
10001070-82 = "チェリノ会長を含む、レッドウィンター連邦学園の事務局所属の者たちは、あたしたち「工務部」の労働者としての権利を保障しろ！"
10001070-83 = "あたしたちに十分な休息時間と、追加の手当、そして、えっと……二つずつのプリンを支給しなければ！あたしたちはストライキとデモを続けていくこととする！"
10001070-84 = "わああああっ――！"
10001070-86 = "ストライキだ、ストライキ！"
10001070-88 = "待て待て待て！お前たち、誰の許可を得てこんなことをやっているんだ？"
10001070-89 = "事務局の許可無しに、勝手な集団行動は許されない！お前たちみんな粛清だ、粛清！"
10001070-90 = "……チェリノ会長？"
10001070-91 = "なぜこんなところにいるのかは知らないが……ちょうど良い！"
10001070-92 = "みんな！チェリノ会長を捕まえて、この薪の山に縛っておけ！"
10001070-101 = "ま、待て！離せ！おいらを誰だと思っているのだ！"
10001070-103 = "ぐっ！そ、それよりも、お前らこんなことをして何を……。"
10001070-105 = "……まさか、おいらを人形のように薪ごと燃やしてしまうつもりか！？"
10001070-107 = "いくら革命とはいえ、あたしたちがそんな残酷なことをするわけないだろ。"
10001070-109 = "しかしチェリノ会長はいつも仕事をせず、遊んでばかりの使えない指導者と言っても過言ではない！打倒しなければならない、邪悪な圧政者だ！"
10001070-111 = "みんな！今日あたしたちは、この邪悪な圧政者を学園の中央通りに晒し上げ、あたしたち労働者にとってこの先「こうあってはならない」と示す新たなシンボルとしよう！"
10001070-113 = "わああああっ！"
10001070-115 = "縛れ、縛れ！"
10001070-117 = "ま、待て！そんなに強引に縛ったら腕が折れイダダダダダダダダ！"
10001070-119 = "か、カムラッド！トモエ！助けてくれ！！"
