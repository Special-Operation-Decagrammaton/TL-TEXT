[translation]
102040-1 = "第4話;作戦準備（２）"
102040-4 = "これは…… "
102040-5 = "そ、空が赤く染まって……な、何が起こっているんでしょうか……"
102040-6 = "……先生からメッセージが届いたよ。#n手伝いが必要みたい。"
102040-7 = "で、でも……私たちが行って助けになるのでしょうか？#n追われている身なのに……むしろ、先生に迷惑をかけるんじゃ……"
102040-8 = "そんなことないよ、きっと大丈夫。#nなんとか手伝えないか、方法を探そう。"
102040-9 = "私たちでも、手伝えること……"
102040-14 = "……そこにいるのは誰？"
102040-15 = "ま、まさか追手が！？"
102040-16 = "……。"
102040-23 = "……。 "
102040-25 = "！？"
102040-26 = "……。"
102040-27 = "……。"
102040-30 = "やっと見つけた。#nここにいたのか……"
102040-39 = "み、ミサキさん！？いきなりそんな……"
102040-40 = "誰？あんた。"
102040-41 = "すごく怪しい人……。"
102040-42 = "ま、待て。私は……！"
102040-43 = "ああ、そうか。このヘルメットはアルバイトで――"
102040-47 = "……なんてね。おはよう、サッちゃん。#n自分探しはお休み中？"
102040-52 = "……ああ。"
102040-54 = "自分探しだなんて、よく言うよ。#nただの家出でしょ。"
102040-55 = "リーダー……。"
102040-56 = "すまない……積もる話をしたいところだが、今は時間が無い。#n先生を助けなくては。"
102040-57 = "うん。私たちにも連絡来たよ。"
102040-58 = "は、はい！そうなんです！"
102040-62 = "元気そうでよかった、リーダー。"
102040-64 = "……ああ。"
102040-65 = "じゃ、行こうか。"
102040-69 = "第4サンクトゥムの作戦担当、[ruby=うらわ]浦和[/ruby]ハナコです♡"
102040-70 = "みなさん、準備はできましたか？ "
102040-72 = "……はい。#nシスターフッド部隊、サンクトゥムのカタコンベ前で待機中です。"
102040-73 = "ところで……サクラコ様は一体、どちらに……"
102040-75 = "救護騎士団、作戦地点にて待機しております。"
102040-76 = "よ、よろしくお願いします！"
102040-78 = "第5サンクトゥムはいかがですか？#n報告をお願いします。"
102040-80 = "……こっちは少し問題発生中。"
102040-81 = "あら、どうされました？"
102040-82 = "「ホド」が要塞都市の地下に潜った。#n現在位置を確認してるけど……"
102040-83 = "要塞都市エリドゥの地下は、リオ会長が作った暗号で保護されています。#nハッキングも、振動も、音の感知も不可能でした。"
102040-85 = "……リオ会長の？#nですが、会長はいま……"
102040-87 = "そう。#nだから、今暗号を解読するために演算を進めているところ。"
102040-88 = "幸い、暗号はそこまで難しくないと思う……でも、時間がかなりかかってしまうのが問題。"
102040-89 = "はぁ……このままだと作戦時間に間に合わないかも……"
102040-90 = "えっ、一大事じゃん！#nでも、こっちはサンクトゥムの分析をやってるから手伝えないし――"
102040-91 = "マキさんは今まで通り第1サンクトゥムに集中を。#nエンジニア部の皆さん、余力はありますか？"
102040-93 = "いや、こちらも各エリアのインベイドピラーを破壊しようとしてるけど……こっちも難航してるところでね。"
102040-94 = "はぁ……答えが見つからない……近づくことすらできないよ。"
102040-95 = "サンクトゥムの素材分析も並行しているから、体力的にも限界でね……すまないが、これ以上の仕事は請け負えない。"
102040-96 = "もっと睡眠を～……いえ、カフェイン摂取で……妖怪MAXを……"
102040-97 = "やっぱ、普段からもうちょっと運動して体力つけておけば良かった……"
102040-98 = "いま言っても仕方ないさ。"
102040-100 = "困りましたね……あちらも余力は無さそうです。 "
102040-101 = "流石はビッグシスター……いなくなってなお、問題の種を生むだなんて――"
102040-103 = "ヒマリ！"
102040-104 = "以前、ミレニアムの債券が偽造されたことがありましたよね？"
102040-105 = "債券発行のセキュリティシステムも、リオが構築したものですが――#nあの時はどのように解決したのですか？"
102040-106 = "ん？あれはヒマリの仕業じゃないの？#n私たちは倫理に背くようなことはしないよ。"
102040-107 = "あら、心外ですね。私だってしません。#nあの時は忙しくて、そんなイタズラをする暇もありませんでしたので……"
102040-108 = "……じゃあ、あれは一体誰の仕業なの？"
102040-113 = "……ユウカちゃん、聞いていましたか？ "
102040-114 = "はぁ……聞いてるわよ。"
102040-115 = "ノア、今から反省部屋の前に来て！"
102040-116 = "はい。#n――それでは後ほど。"
102040-122 = "……インベイドピラーの攻略は……これが限界、かも。"
102040-123 = "……ピラー周辺に穴を掘って、地面から分離……そして焼き尽くす――"
102040-124 = "本当にこの方法しか無いのかい？"
102040-125 = "他の方法を模索したかったけど……現状だとこれが精一杯の最善策、かな……"
102040-126 = "だが、この規模の工事は、もはや都市開発レベルの……"
102040-127 = "うーん、何か別の手は無いだろうか……土木工事用のドローンを今から作るのは――"
102040-128 = "雷ちゃんに火炎放射器を付けるのはどうでしょう？#nスコップとハンマーを……"
102040-129 = "それだけだと少し……"
102040-135 = "はぁ～い！"
102040-139 = "あ、あなた達は一体！？"
102040-140 = "今日も今日とて、温泉開発日和だねー！"
102040-142 = "温泉……"
102040-143 = "開発部……！？"
102040-144 = "お、温泉ですか？ここにそんなものは――"
102040-146 = "ハーハッハッハッハ！そこに温泉があるから我々がいる！いや、たとえ温泉がなくても我々がいる！"
102040-148 = "細かいことは気にするな。#nそこは我々が担当しよう。"
102040-150 = "う、うん……？"
102040-154 = "掘って掘りまくって、建物を撤去して、全てを燃やし尽くしちゃえばいいんだよね？#nさあ温泉開発の時間だよ～！！"
102040-155 = "最終的に温泉にたどり着ければ良いのだからな！難しく考える必要など無い！"
102040-156 = "それに、ミレニアムの地下にはどんな温泉があるのかずっと気になっていてね。つまり、絶好の機会というわけだ！"
102040-158 = "「「ハーッハッハッハッハ！！！」」"
102040-163 = "な、なんだかすごい方がいらっしゃいましたね……"
102040-165 = "ミレニアム・反省部屋の前"
102040-166 = "はぁ…… "
102040-177 = "うぇえええっ、せ、先輩方！？"
102040-178 = "コードネーム「白兎」……いえ、[ruby=くろさき]黒崎[/ruby]コユキ……#n出てきてちょうだい、釈放よ。"
102040-179 = "コユキちゃん、元気でしたか？"
102040-180 = "わ、私ですか？釈放？#nい、今？何でですか？"
102040-181 = "時間が無いの。早く出なさい、コユキ。"
102040-182 = "い、嫌です！いきなり先輩がやってきて釈放とか、絶対これアレですよね！"
102040-183 = "ついに矯正局に送るんですよね！？そうなんですよね！？"
102040-184 = "……。"
102040-185 = "……。"
102040-186 = "はぁ、これは無理やり連れていくしかないわね。#nノア、手伝ってちょうだい。"
102040-187 = "ふふ、仕方ないですね。"
102040-193 = "うわああっ！？こ、来ないで！#n先輩怖い！やだ！無理！パワハラ反対！！"
102040-196 = "な、なんなんですか！今まで大人しくしてたじゃないですか！#n問題も起こしてないし、脱出だってしてないのになんで！酷い！暴力反対！冤罪ですよ！！"
102040-197 = "あのねぇ……あんたがここにいるのは、自分で起こした問題のせいでしょうが！#nどこが冤罪だって言うのよ！？"
102040-198 = "まあまあ、ユウカちゃん。#nコユキちゃんも反省しているようですし。"
102040-199 = "反省！？これのどこが反省してるって言うのよ？"
102040-200 = "そうですよ！反省だなんて……まるで私が悪いかのような言い方はやめてください！"
102040-201 = "あれは不可抗力だったというか、ハプニングだったというか……"
102040-202 = "債券の偽造が、ハプニング！？"
102040-203 = "そ、それに……すっごいコワモテのC&Cの先輩を使って私を捕まえにきたじゃないですか！もう、トラウマですよ！"
102040-205 = "……。"
102040-206 = "コユキちゃん……反省、しているんですよね？"
102040-207 = "へ、へっ……？えっと、その‥…最初から[ruby=ずさん]杜撰[/ruby]な暗号システムがいけないんじゃないですか？なので――"
102040-208 = "コ～ユ～キ～ちゃ～ん？"
102040-209 = "ええっと……その……"
102040-210 = "せ、先輩……その顔、マジで怖いんでやめてください……"
102040-211 = "先輩の言う通り、私が間違ってました……"
102040-212 = "反省は？"
102040-213 = "は、はい……反省してます……"
102040-214 = "ふふっ、いい子ですね。"
102040-215 = "ほら、ユウカちゃん。#n見ての通りコユキちゃんも反省しているみたいですよ？"
102040-216 = "なんでノアに対しては大人しいわけ！？"
102040-217 = "でもノア先輩は、たまに本当に怖いってか……夢に出てきそうな感じがして……"
102040-218 = "昔の発言を何時何分だったかまで指定して「コユキちゃん、あの時と言ってることが違いますよ？」って言ってきたりするから、マジでちょっと……"
102040-219 = "それで……お二人が訪ねてくるなんて、一体何があったんですか……？"
102040-220 = "単刀直入に言うと、コユキちゃんの力が必要なんです。 "
102040-221 = "そう。あんたのその摩訶不思議な演算能力が必要なの。#n今すぐセミナーに復帰してちょうだい。"
102040-222 = "い、今すぐセミナーに、ですか？#n私クビになったんじゃ……？"
102040-223 = "そんな事ないわよ。#n詳しいことは行きながら説明するから、急いで。"
102040-224 = "はい。コユキちゃんの制服も持ってきたので、こちらに着替えてください。"
102040-225 = "で、でも……この服、結構気に入って――"
102040-227 = "コ～ユ～キ～ちゃ～ん？"
102040-228 = "ひっ……わ、分かりました……。"
102040-232 = "残るは……D.U.の中心部にある第6サンクトゥムです。"
102040-233 = "おーい、そっちはどう～？"
102040-235 = "D.U.中心部"
102040-236 = "市民の避難は完了した。#nサンクトゥムタワーから30km離れた場所に複数の避難所を設けている。"
102040-237 = "しかし、人員が足りない。あと、食糧もな。#nヴァルキューレと有志の協力者が避難所に常駐して手伝ってくれてはいるが――"
102040-239 = "こちらをどうぞ。フウカ先輩が作ったおかゆです。#n温まりますよ。"
102040-240 = "ありがとうございます……。"
102040-244 = "ジュリ、これも配ってもらえる？"
102040-245 = "はい、先輩！"
102040-246 = "ふぅ……次は……"
102040-247 = "何かお手伝いしましょうか？先輩。"
102040-248 = "大丈夫、炊き出しは慣れてるから。#nジュリは今まで通り配膳をお願い。"
102040-249 = "はい、先輩！たしかにここは給食部の力が必要ですね！"
102040-250 = "力になれているのならいいけど……"
102040-251 = "でも、このままだと食材が足りなくなっちゃうかも……"
102040-256 = "あら？"
102040-257 = "ちょっと、どうしたの！？"
102040-264 = "ふふふっ。フウカさん、助太刀に参りました。"
102040-265 = "到着です★"
102040-266 = "美食研究会が、どうして……！？#nというか、何でそんなに濡れて……！？"
102040-267 = "炊き出ししてるって聞いて、手伝いに来たのよ！ほら！"
102040-268 = "そうそう！食材持ってきたよー！"
102040-273 = "あら……新鮮なお魚がこんなに……！"
102040-274 = "これなら食材は足りそうですね、先輩！ "
102040-275 = "そ、そうだね……これで汁物に揚げ物、焼き物も作れるし……#n栄養バランスも大丈夫そう。"
102040-276 = "でも、何で給食部のトラックにあんた達が乗ってるのか、気になるんだけど……"
102040-277 = "まぁいいや。魚を集めるの、大変だったんじゃない？"
102040-279 = "すっごく大変だったんだよ！近くの水――"
102040-283 = "ンンンッッ！？"
102040-284 = "ま、まあ、細かいことは気にしないでちょうだい！"
102040-286 = "ふふっ。私たちと給食部の仲ではありませんか。#n困っている時は助け合うべきです。"
102040-287 = "いや、そんな仲じゃないけど……"
102040-288 = "……まぁいいや。#n助けてもらったのは事実だし……ありがとね。"
102040-290 = "ふふっ、とんでもありません。"
102040-291 = "ま、私たちもやる時はやるのよ！"
102040-292 = "友情って本当に素晴らしいですよね★"
102040-293 = "それで、この魚はいつになったら食べていいの～？"
102040-295 = "今のD.U.シラトリ区は誰もいない。#n好きに暴れるがいい。"
102040-296 = "ありがとうございます……第6サンクトゥムの守護者はまだ確認できていませんが、6つのサンクトゥムの中では最も強力なエネルギーを持っていますので……"
102040-297 = "守護者が現れたら避難完了したエリアに誘導して、そこで作戦を開始するよ～"
102040-299 = "ヒフミ、私たちはD.U.の外郭を巡回し、守護者を探す――[ruby=いわゆる]所謂[/ruby]、偵察部隊だ。"
102040-300 = "あう……どうして私たちが……"
102040-301 = "それはヒフミの操縦の腕がすごいからだろう。#nヒフミを守るのは私一人で十分だからな。"
102040-302 = "あの時は30人の正義実現委員会を一掃できたが……今ならその2倍来ようと問題ない。"
102040-303 = "そ、そういうつもりではなかったのですが……あうう……"
102040-304 = "……今日はペロロ様の特撮映画を観る予定だったのに……"
102040-306 = "うん、私も楽しみにしていた……"
102040-307 = "だから、この作戦が終わったら一緒に観よう、ヒフミ。"
102040-308 = "……"
102040-309 = "はい、アズサちゃん。この任務……最善を尽くしましょう！"
102040-310 = "ああ。"
102040-312 = "準備完了かな？にゃはは。"
102040-313 = "[s] \"ニヤ！どうだった？\""
102040-314 = "それじゃカホ、後はよろしく～。"
102040-315 = "ふぅ……皆さん、準備はよろしいでしょうか？"
102040-319 = "イズナ、主殿の声を聞きつけて参りました！#n特別任務を遂行すべく参上！"
102040-320 = "と、到着しました……"
102040-321 = "コホン！忍術研究部の部長、[ruby=ちどり]千鳥[/ruby]ミチル見参！#nここに参戦の意志を宣言するよ！"
102040-322 = "け、見参……ここに……宣言を……"
102040-323 = "[s] \"忍術研究部……！？\""
102040-324 = "ツクヨ、忍術研究部の参戦を知らせる場面だよ！#nもっと存在感アピールしてこ！"
102040-325 = "そ、そうなんですか……？#nわ、私は、今でも十分、存在感がある気が……"
102040-326 = "んんー、これじゃあ足りないよ！"
102040-327 = "ツクヨ、イズナ！ "
102040-328 = "はい、部長！"
102040-329 = "は、はいっ！？ "
102040-330 = "「忍者流ハイパー決めポーズ」いくよっ！"
102040-331 = "へっ、こ、ここで、決めポーズ、ですか……！？ "
102040-332 = "さすがです、部長！#n思いっきり突撃するんですね！イズナ、理解しました！"
102040-333 = "……。"
102040-334 = "にゃははは！出ましたねぇ、あの名物決めポーズ～！"
102040-339 = "忍者とは何なのか！そして、忍法とは何なのか！"
102040-340 = "忍者の、真髄……！"
102040-341 = "……え、えっと本当に、大丈夫でしょうか……？"
102040-345 = "大丈夫！！その本質を研究し、探究し、そして究明する……"
102040-346 = "これでいいの！自分を信じてツクヨ！"
102040-347 = "忍者の魅力を広めるために暗躍する、キュートな忍者三人組！"
102040-348 = "三人組です～！！ニンニン！"
102040-352 = "泣く子も笑う、百鬼夜行連合学院、"
102040-353 = "最強の忍者集団！"
102040-355 = "その名も、「忍術研究部」！！"
102040-361 = "……。"
102040-362 = "（パチパチパチパチ！）#nにゃははは！流石皆さん。やっぱり忍者が正解だったねぇ～"
102040-363 = "[s] \"えっと……\""
102040-364 = "イズナ、主殿が頼み事があると伺ったのですが……何をすれば良いでしょう？"
102040-365 = "ね。私たちにしかできないことって、何だろ？"
102040-366 = "おっほん……ふむ、忍術研究部には、#nこれより別働隊として特別任務を遂行していただきたいのです。"
102040-367 = "特別任務……？"
102040-369 = "……はい。#n今から皆さんには、百鬼夜行の最北端にある「大雪原」に向かっていただきます。"
102040-371 = "「大雪原」ですか！？"
102040-372 = "そこって雪しかないところじゃん！？何で……！？"
102040-374 = "現在行方が分からなくなってしまった、#n「百花繚乱」の委員長を探していただきたいのです。"
102040-375 = "百花繚乱の……？#n委員長、ですか？"
102040-376 = "百花繚乱というと……紛争調停委員会の……ですか？#nい、委員会室にはいらっしゃらないのでしょうか……"
102040-377 = "それが……"
102040-378 = "……！#nたしかに最近、百花繚乱を見かけてないね。"
102040-379 = "何か事情があるんだよね、カホ。"
102040-380 = "……はい、おっしゃる通りです。"
102040-381 = "にしても人探しなら、別に私たちがやらなくてもいいんじゃ……？"
102040-383 = "それはですねぇ～……百花繚乱の姿を覚えている3年生、かつ信用できる方が――#n忍術研究部のルンルンさんしか居ないから、といいますか～？"
102040-384 = "誰がルンルンさんだぁっ！？"
102040-385 = "おおっ、なんと！部長は百花繚乱の方を知っているのですね？ "
102040-386 = "うーん、何回かすれ違ったくらい……？#nでも、私もちゃんと覚えてないんだよね……"
102040-387 = "んふふ。それだけで十分です。"
102040-389 = "（あの陰険部長、今度は一体何を企んでるの……？）"
102040-391 = "なるほど。イズナ、理解しました！#n「クズノハ」という方の行方を調べれば良いのですね！"
102040-392 = "その人を知ってるのが「百花繚乱の委員長」ね……#nん～了解、やってみる。"
102040-393 = "部長！百花繚乱は強いのですか？#n忍者みたいにカッコイイのでしょうか！"
