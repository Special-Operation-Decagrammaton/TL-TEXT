[translation]
102040-1 = "Episódio 4;Preparativos da Operação (2)"
102040-4 = "Isso é… "
102040-5 = "O, o céu ficou vermelho… o que está acontecendo…?"
102040-6 = "…Recebi uma mensagem do Sensei.#nParece que precisam de ajuda."
102040-7 = "M-mas… será que a gente consegue ajudar mesmo?#nNós estamos sendo perseguidas… talvez só acabemos atrapalhando o Sensei…"
102040-8 = "Nada disso, vai dar tudo certo.#nVamos procurar algum jeito de ajudar."
102040-9 = "Algo que até nós possamos fazer…"
102040-14 = "…Quem está aí?"
102040-15 = "N-não me diga que são perseguidores!?"
102040-16 = "……"
102040-23 = "…… "
102040-25 = "!?"
102040-26 = "……"
102040-27 = "……"
102040-30 = "Finalmente encontrei vocês.#nEntão era aqui que estavam…"
102040-39 = "M-Misaki-san!? Assim do nada…"
102040-40 = "Quem é você?"
102040-41 = "Tá com uma cara bem suspeita…"
102040-42 = "E-espera! Eu sou…!"
102040-43 = "Ah, é mesmo. Esse capacete é do meu bico de meio período—"
102040-47 = "…Brincadeirinha. Bom dia, Sacchan.#nAinda nessa jornada de “se encontrar”?"
102040-52 = "…É."
102040-54 = "“Se encontrar”, é?#nIsso aí é só fuga de casa mesmo."
102040-55 = "Líder…"
102040-56 = "Desculpa… queria colocar a conversa em dia, mas não temos tempo agora.#nPrecisamos ajudar o Sensei."
102040-57 = "Uhum. A gente também recebeu mensagem."
102040-58 = "S-sim! Foi exatamente isso!"
102040-62 = "Fico feliz que esteja bem, Líder."
102040-64 = "…É."
102040-65 = "Então vamos."
102040-69 = "Responsável pela operação do 4º Sanctum, Hanaко Urawa♡"
102040-70 = "Todo mundo pronto? "
102040-72 = "…Sim.#nAs tropas da Sisterhood estão aguardando em frente às catacumbas do Sanctum."
102040-73 = "Aliás… onde exatamente está a Sakurako-sama…?"
102040-75 = "A Ordem dos Cavaleiros Hospitalares está posicionada no ponto da operação."
102040-76 = "C-contamos com vocês!"
102040-78 = "E o 5º Sanctum?#nAguardando relatório."
102040-80 = "…Aqui surgiu um probleminha."
102040-81 = "Ara, o que aconteceu?"
102040-82 = "O “Hod” se escondeu no subterrâneo da cidade-fortaleza.#nEstamos tentando localizar ele, mas…"
102040-83 = "O subterrâneo da cidade-fortaleza Eridu é protegido por uma criptografia criada pela presidente Rio.#nHackeamento, detecção sonora, vibração… nada funciona."
102040-85 = "…Da presidente Rio?#nMas ela agora está…"
102040-87 = "Isso.#nPor isso estamos tentando descriptografar tudo agora."
102040-88 = "Por sorte, a criptografia não parece tão complicada… mas o problema é o tempo que isso vai levar."
102040-89 = "Aff… desse jeito talvez a gente nem consiga cumprir o horário da operação…"
102040-90 = "Eita, isso é grave demais!#nMas a gente tá ocupado analisando o Sanctum aqui, então não dá pra ajudar—"
102040-91 = "Maki-san, continue focada no 1º Sanctum como antes.#nPessoal do Clube de Engenharia, vocês ainda têm alguma energia sobrando?"
102040-93 = "Nem aqui tá fácil… estamos tentando destruir os Invade Pillars de cada área, mas tá complicado."
102040-94 = "Aff… não acho resposta nenhuma… nem chegar perto deles dá."
102040-95 = "Também estamos fazendo análise dos materiais do Sanctum ao mesmo tempo, então já chegamos no limite físico… desculpa, mas não dá pra assumir mais trabalho."
102040-96 = "Preciso dormir maaaais… não, cafeína… preciso de Yokai MAX…"
102040-97 = "Caramba… eu devia ter feito mais exercício pra ganhar resistência…"
102040-98 = "Agora não adianta se lamentar."
102040-100 = "Complicado… parece que eles também não têm mais margem."
102040-101 = "Como esperado da Big Sister…#nAté depois de desaparecer continua deixando problemas pra trás—"
102040-103 = "Himari!"
102040-104 = "Antes houve aquele caso das falsificações dos títulos de Millennium, lembra?"
102040-105 = "O sistema de segurança desses títulos também foi criado pela Rio, mas…#ncomo aquilo foi resolvido naquela época?"
102040-106 = "Hm? Não foi obra da Himari?#nA gente não faz coisa antiética assim."
102040-107 = "Ara, que absurdo. Eu também não.#nNaquela época eu estava ocupada demais pra fazer esse tipo de travessura…"
102040-108 = "…Então quem foi?"
102040-113 = "…Yuuka-chan, você ouviu isso?"
102040-114 = "Aff… ouvi sim."
102040-115 = "Noa, vem pra frente da sala de reflexão agora!"
102040-116 = "Claro.#n—Até já."
102040-122 = "…Talvez esse seja o limite… da estratégia contra os Invade Pillars."
102040-123 = "…Cavar ao redor deles, separar do solo… e então incinerar tudo—"
102040-124 = "Tem certeza que esse é o único jeito?"
102040-125 = "Eu queria encontrar outra solução… mas no momento, isso é o melhor que conseguimos…"
102040-126 = "Mas uma obra desse tamanho já é praticamente nível construção civil urbana…"
102040-127 = "Hmm… não existe outro jeito…? Construir drones de escavação agora seria—"
102040-128 = "Que tal colocar um lança-chamas na Raichan?#nE talvez uma pá e um martelo…"
102040-129 = "Só isso talvez seja meio…"
102040-135 = "Oiiiii!"
102040-139 = "Q-quem são vocês!?"
102040-140 = "Hoje tá um dia perfeito pra desenvolver fontes termais!"
102040-142 = "Fontes termais…"
102040-143 = "Clube de Desenvolvimento…!?"
102040-144 = "F-fontes termais? Não existe nada disso aqui—"
102040-146 = "HAAHAHAHAHA! Se existe uma fonte termal, nós estaremos lá! Não, mesmo que não exista, ainda estaremos lá!"
102040-148 = "Não esquenta com os detalhes.#nDeixa essa parte com a gente."
102040-150 = "H-hã…?"
102040-154 = "É só cavar sem parar, demolir tudo e botar fogo no resto, né?#nEntão bora pra hora do desenvolvimento termal~!!"
102040-155 = "No final, basta encontrarmos uma fonte termal! Não precisa complicar!"
102040-156 = "Além disso, sempre tive curiosidade sobre as fontes termais escondidas no subterrâneo de Millennium. Em outras palavras… essa é a oportunidade perfeita!"
102040-158 = "「「HAAHAHAHAHAHA!!!」」"
102040-163 = "C-caramba… chegaram umas pessoas bem intensas…"
102040-165 = "Millennium · Em frente à sala de reflexão"
102040-166 = "Aff… "
102040-177 = "Uwaaaah!? S-senpais!?"
102040-178 = "Codinome “Coelho Branco”… ou melhor, Koyuki Kurosaki.#nPode sair. Você está liberada."
102040-179 = "Koyuki-chan, como você está?"
102040-180 = "E-eu!? Liberada?#nA-agora? Por quê?"
102040-181 = "Não temos tempo. Anda logo, Koyuki."
102040-182 = "N-não quero! Do nada minhas senpais aparecem dizendo que vou ser solta!? Isso tá muito suspeito!"
102040-183 = "Vocês vão me mandar pra prisão de segurança máxima, né!? É isso, né!?"
102040-184 = "……"
102040-185 = "……"
102040-186 = "Aff, desse jeito vamos ter que arrastar ela à força.#nNoa, me ajuda."
102040-187 = "Fufu, fazer o quê."
102040-193 = "Uwaaah!? N-não chega perto!#nSenpais assustam! Não! Sem chance! Abaixo o abuso de poder!!"
102040-196 = "Q-qual é o problema!? Eu fiquei quietinha esse tempo todo!#nNem causei problema, nem tentei fugir, então por quê!? Isso é injusto! Violência não! Eu sou inocente!!"
102040-197 = "Escuta aqui… você tá presa justamente pelos problemas que VOCÊ causou!#nQue inocente o quê!?"
102040-198 = "Calma, Yuuka-chan.#nParece que a Koyuki-chan está refletindo sobre os erros dela."
102040-199 = "Refletindo!? Onde exatamente isso parece reflexão!?"
102040-200 = "Exatamente! Não falem como se eu fosse a errada aqui!"
102040-201 = "Aquilo foi mais um acidente inevitável… tipo um imprevisto…"
102040-202 = "Falsificar títulos financeiros foi um “imprevisto”!?"
102040-203 = "A-além disso… vocês mandaram aquelas senpais da C&C super intimidadoras atrás de mim! Isso traumatiza qualquer um!"
102040-205 = "……"
102040-206 = "Koyuki-chan… você realmente está refletindo, né?"
102040-207 = "H-heh…? Bom… talvez o problema fosse aquele sistema de criptografia malfeito pra começo de conversa… então—"
102040-208 = "Ko~yu~ki~cha~n?"
102040-209 = "Ééé… então…"
102040-210 = "S-senpai… essa sua cara tá realmente assustadora, para por favor…"
102040-211 = "A senpai tem razão… eu estava errada…"
102040-212 = "E o arrependimento?"
102040-213 = "S-sim… eu me arrependo…"
102040-214 = "Fufu, boa garota."
102040-215 = "Viu só, Yuuka-chan?#nPelo jeito a Koyuki-chan realmente está refletindo."
102040-216 = "Por que ela fica comportada só com a Noa!?"
102040-217 = "É que a senpai Noa às vezes dá muito medo… parece até que vai aparecer nos meus sonhos…"
102040-218 = "Ela começa a citar exatamente o horário das coisas que eu falei e manda um “Koyuki-chan, isso é diferente do que você disse naquela hora, sabia?”… sinceramente, é assustador demais…"
102040-219 = "Então… o que aconteceu pra vocês duas virem até aqui…?"
102040-220 = "Indo direto ao ponto, precisamos da sua ajuda."
102040-221 = "Isso. Precisamos dessa sua capacidade absurda de cálculo.#nVolte pro Seminar imediatamente."
102040-222 = "V-voltar pro Seminar… agora?#nEu não tinha sido expulsa…?"
102040-223 = "Claro que não.#nExplicamos os detalhes no caminho, então anda logo."
102040-224 = "Trouxemos seu uniforme também, então por favor troque de roupa."
102040-225 = "M-mas… eu até gostei dessas roupas—"
102040-227 = "Ko~yu~ki~cha~n?"
102040-228 = "Hii… t-tá bom…"
102040-232 = "Só resta agora… o 6º Sanctum, localizado no centro de D.U."
102040-233 = "Oiii, como estão as coisas aí~?"
102040-235 = "Centro de D.U."
102040-236 = "A evacuação dos civis foi concluída.#nMontamos vários abrigos a 30km da Sanctum Tower."
102040-237 = "Mas faltam pessoas. E comida também.#nA Valkyrie e voluntários estão ajudando nos abrigos, mas—"
102040-239 = "Aqui, por favor. É mingau feito pela Fuuka-senpai.#nVai aquecer vocês."
102040-240 = "Muito obrigada…"