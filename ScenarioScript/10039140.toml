[translation]
10039140-1 = "後日談その6;うちらも生徒でしょ！"
10039140-4 = "（どこも盛り上がっているなか、人があまりいない場所があった）"
10039140-5 = "[ns] \"……このあたりは、アートギャラリー会場だったような。\""
10039140-12 = "今頃、展覧会を見て回ってるはずが……。"
10039140-13 = "ヘルメット団が道を占拠しているだなんて……。"
10039140-14 = "せっかくの学園祭なのに……。"
10039140-20 = "[ns] \"……。\""
10039140-22 = "[ns] （ヘルメット団を探しに行く）"
10039140-29 = "チッ。"
10039140-34 = "ひっ！な、何でもありません……！"
10039140-39 = "じろじろ見て、何だっての。"
10039140-41 = "隊長、さっきからいろんな人に見られてますよ。"
10039140-42 = "何もしてないのに……。"
10039140-43 = "ははっ、ビビってるに決まってる！#nお嬢様には刺激が強いのかもな！"
10039140-44 = "[s] \"道を塞ぐのは良くないよ。\""
10039140-52 = "あぁ？"
10039140-56 = "……え。"
10039140-58 = "しゃ、シャーレの先生！？"
10039140-61 = "なんで先生がここに！？"
10039140-62 = "ま、まだ何もしてないぞ！"
10039140-63 = "[s] \"落ち着いて。先生として、生徒の指導に来ただけだから。\""
10039140-65 = "指導……！？"
10039140-66 = "ま、まだ何もしてないわよ！？"
10039140-67 = "[s1] \"ここを占拠されると、みんなの迷惑になっちゃうんだ。\"\n[s2] \"周りからの視線は、きっとここを占拠してるからだよ。\""
10039140-70 = "……えっ？"
10039140-72 = "けど、ほかに座るところがないし……。"
10039140-73 = "グラウンドのほうは、人が多くて……。"
10039140-75 = "というか、せっかく来たのに誰も案内してくれないし薄情だわ。"
10039140-76 = "[s] \"みんなも[ruby=カーニバル]謝肉祭[/ruby]を見に来たの？\""
10039140-80 = "……まぁ、そうだけど。"
10039140-82 = "かーにばる……？"
10039140-83 = "そんな名前だったんだ……。"
10039140-85 = "トリニティの行事がどんなもんなのか、偵察に来ただけよ！"
10039140-86 = "実際、すごかったな……。"
10039140-90 = "……ま、まぁ。"
10039140-91 = "といっても、お金がないから見てるだけだけど……。"
10039140-93 = "屋台の料理、どれも美味しそうだったな……。"
10039140-100 = "……。"
10039140-101 = "い、今のはわざとだ！"
10039140-102 = "そうよ！#nうちらヘルメット団の連携だわ！"
10039140-103 = "ほら、怖いでしょ？#nははっ……は、はは……。"
10039140-107 = "[ns3] \"もし良かったら……。\"\n[ns4] \"一緒に謝肉祭を見て回らない？\""
10039140-115 = "はぁ……？"
10039140-116 = "[s5] \"ちょうどたこ焼きを食べたかったんだけど……。\"\n[s6] \"一人で食べ切れる自信がないんだ。\""
10039140-119 = "……。"
10039140-121 = "隊長、ひょっとしてチャンスなのでは……。"
10039140-122 = "シャーレの先生が、ここまで言ってるんですし……。"
10039140-124 = "そ、そう……？"
10039140-125 = "ほかの生徒は、先生と一緒に謝肉祭を回ったって聞きましたし……。"
10039140-126 = "自分たちも、一度くらいは……。"
10039140-131 = "う、うるさいわ！#nそんなに言われなくても分かったから……！"
10039140-136 = "[ns7] \"焼きそばも気になるなぁ……。\"\n[ns8] \"射的もヨーヨー釣りも……！\""
10039140-141 = "く、くっ……！"
10039140-144 = "隊長……！"
10039140-150 = "……ふっ、先生。"
10039140-151 = "そこまで言うなら……つ、付き合ってあげてもいいわ。"
10039140-152 = "[s] \"じゃあ、一緒に行こうか。\""
10039140-157 = "さすがは隊長！"
10039140-158 = "信じてましたよ！"
10039140-159 = "これで、うちらも先生と遊べるんだ……！"
10039140-161 = "ふ、ふふふ……ふふっ！"
10039140-163 = "（こうしてヘルメット団の子たちと一緒に、謝肉祭を見て回った）"
10039140-172 = "あちっ！"
10039140-173 = "出来立てのたこ焼きって、こんなに熱かったのか……！？"
10039140-174 = "たこ焼きって、本当は温かかったんだ……。"
10039140-182 = "あっつ！ほ、ふぁ！んっ！#nお、美味しい！"
10039140-183 = "[s9] \"ゆ、ゆっくり食べてね……？\"\n[s10] \"まだいっぱいあるから……！\""
10039140-195 = "くっ、惜しい～！"
10039140-196 = "あと少しで等身大ぬいぐるみをゲットできるチャンスだったのに……！"
10039140-197 = "でも、もうお金が……。"
10039140-201 = "[ns] \"私が出すから、もう一回やってみる？\""
10039140-203 = "……う、うぅ。"
10039140-204 = "お、お願い……。"
10039140-205 = "し、します……先生。"
10039140-206 = "[s] （お金を支払う）"
10039140-214 = "やった、ぬいぐるみゲットだ！"
10039140-215 = "おめでとうございます、隊長！"
10039140-217 = "はははっ！#nこれがジャブジャブヘルメット団のリーダー、[ruby=こまかぜ]河駒風[/ruby]ラブの力！"
10039140-218 = "先生、ハイタッチよ！"
10039140-226 = "う、うぅ……感動した。"
10039140-227 = "演劇が、こんなに素晴らしいものだったなんて……。"
10039140-228 = "特にクライマックスが……！"
10039140-230 = "ば、バカ！#nこんなんで泣くんじゃないわよ！"
10039140-231 = "こんな演劇、ち、ちっとも面白くないし！"
10039140-233 = "でも隊長、目の周りが赤いですよ……？"
10039140-234 = "もしかして、隊長も……？"
10039140-239 = "う、うるさいわね！#nちょっと目に埃が入っただけよ！"
10039140-243 = "[ns11] \"やっぱり……。\"\n[ns12] \"みんなも本当は謝肉祭が楽しみだったんだね。\""
10039140-250 = "……。"
10039140-251 = "それは……。"
10039140-253 = "でも、うちらは不良だから……。"
10039140-254 = "[s] \"今はただの生徒じゃない？\""
10039140-258 = "[ns] \"私と一緒に、普通に過ごしてるだけだよね。\""
10039140-261 = "……。"
10039140-264 = "……。"
10039140-266 = "ま、まぁ……。"
10039140-267 = "別に最初から、問題を起こしに来たわけじゃないけど……。"
10039140-268 = "こうやって先生と一緒に遊ぶのも……わ、悪くなかったわ。"
10039140-273 = "よし、先生。"
10039140-278 = "今日は最後まで、思いっきり遊び尽くすわよ！"
10039140-280 = "（その後もラブたちと楽しい時間を過ごした）"
10039140-285 = "（予想以上に出費が嵩んでしまったが、彼女たちの笑顔を見られて安心した）"
