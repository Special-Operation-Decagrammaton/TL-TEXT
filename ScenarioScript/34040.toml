[translation]
34040-1 = "Episódio 4; Entre Sonhos e Miragens"
34040-3 = "[ns] \"O fim de... Kivotos?\""
34040-4 = "......"
34040-5 = "Sim, exatamente."
34040-6 = "Devo dizer que ela encontrou seu fim e foi destruída...? Ou será esse o resultado inevitável de tudo...? Isso... não há como saber."
34040-7 = "[s] \"E como foi que isso aconteceu...?\""
34040-9 = "Uma torre colossal desceu dos céus, e o vazio foi tingido de vermelho escarlate――"
34040-12 = "A torre agourenta retumbava como se estivesse gritando... e começou a arrancar pedaços deste mundo, aos poucos... para então, cobrir 'algo' com os destroços de nosso mundo."
34040-13 = "Enquanto os fragmentos arrancados do mundo rugiam como uma tempestade, uma luz negra desceu dos céus... e o mundo começou a declinar rumo ao seu fim..."
34040-15 = "E então... tudo em Kivotos desmoronou――"
34040-16 = "Desaparecendo no nada, sem deixar um único grão de poeira."
34040-18 = "[ns] \"............\""
34040-19 = "O que eu vi foi apenas um pesadelo, ou será que eu realmente observei o futuro, ou talvez algo que aconteceu no passado...?"
34040-20 = "No momento, eu não sei de nada... mas agora que testemunhei aquela cena, eu preciso descobrir a verdade."
34040-21 = "......"
34040-22 = "Para descobrir o que aquela cena significa, tenho vagado por um sonho lúcido sem fim."
34040-23 = "......O sonho lúcido é o ato de adormecer conscientemente, sabendo que está sonhando. Em troca de conseguir lembrar de tudo o que acontece, a linha entre os sonhos e a realidade acaba se tornando tênue."
34040-24 = "Eu já viajei de um lado para o outro entre os sonhos e a realidade tantas vezes que agora nem sequer consigo perceber de qual lado o mundo em que estou se encontra."
34040-25 = "[s] \"Isso soa extremamente perigoso... Você está bem?\""
34040-26 = "......Bem, eu estaria mentindo se dissesse que não. Mas, mesmo assim, é algo necessário."
34040-27 = "Se fosse a antiga eu, teria medo de conhecer o futuro e teria fugido para o mundo intermediário. Mas, desta vez, não posso fazer isso."
34040-28 = "A minha intuição me diz que aquela cena não foi apenas um pesadelo."
34040-29 = "Aquilo não pode existir em Kivotos――é algo que veio de fora de Kivotos. Uma existência que ultrapassa em muito a minha imaginação e a minha compreensão."
34040-30 = "Isso é apenas um palpite meu, mas o responsável por trazer aquilo provavelmente foi a 'Gematria'――"
34040-31 = "Acredito que eles estejam tentando invocar uma existência externa para Kivotos e levá-la à sua aniquilação."
34040-32 = "[s] \"......A Gematria?\""
34040-40 = "Talvez haja uma maneira de evitar essa destruição... por isso, eu..."
34040-41 = "[ns] \"Seia.\""
34040-42 = "......Hum?"
34040-43 = "[s1] \"Se isso tem a ver com a 'Gematria', é melhor você se afastar disso agora mesmo.\"\n[s2] \"O que você está fazendo é perigoso demais, Seia.\""
34040-44 = "......"
34040-45 = "......"
34040-46 = "Ah, sim, de fato... seguir os rastros daquele grupo é o mesmo que jogar no vasco."
34040-47 = "[s3] \"Mesmo que o seu palpite esteja certo, não podemos agir dessa forma.\"\n[s4] \"Precisamos coletar informações de forma adequada e trabalhar juntos.\""
34040-50 = "......"
34040-51 = "[s] \"Deixe essas coisas para os adultos. Em vez disso, olhe para as pessoas à sua frente, Seia.\""
34040-55 = "(Mika...)"
34040-56 = "......Você tem razão."
34040-57 = "Talvez eu estivesse apenas perdendo o foco, oprimida por aquele sonho em uma situação em que ainda não tínhamos nenhuma informação..."
34040-61 = "Além disso, se algo acontecer comigo agora... a Mika... ela cometerá um erro de novo."
34040-62 = "......Sim."
34040-63 = "Neste momento, a Mika está na pior situação imaginável."
34040-64 = "......Ela foi mimada a vida inteira. Todos a admiravam e elogiavam――como se ela fosse uma princesa de contos de fadas."
34040-65 = "Para alguém como ela, passar por uma situação assim――ser o alvo de ódio de todo o mundo deve ser, provavelmente, a primeira vez na vida."
34040-66 = "Esse destino pode ser um pouco cruel demais para ela carregar..."
34040-67 = "......Agora, minha principal prioridade é resgatar a Mika desse lamaçal."
34040-68 = "Como eu não havia percebido isso até agora..."
34040-69 = "Sinto que a névoa na minha cabeça se dissipou... Muito obrigada, Sensei. Precisamos avançar um passo de cada vez――e primeiro, temos de resolver o problema da Mika."
34040-70 = "[s] \"De nada, Seia. Mudando de assunto, a Mika disse que queria lhe pedir desculpas.\""
34040-71 = "Pedir desculpas...? Mas eu já a perdoei..."
34040-72 = "......Ah, acho que isso só aconteceu no meu sonho."
34040-73 = "Entendo... a Mika acha que eu ainda não a perdoei."
34040-74 = "Os crimes que ela cometeu... ela deve estar sentindo que eu sou a sua maior vítima."
34040-77 = "Que tolice..."
34040-78 = "Você é tão egoísta, leviana, impulsiva――e gananciosa, porém, propensa à autodestruição..."
34040-79 = "E apesar de combinar tão bem com o papel de vilã arrogante e insolente que sai direto de um conto de fadas..."
34040-80 = "E mesmo assim..."
34040-82 = "A garota no papel de vilã, que tentou infligir sofrimento à pessoa que ela desprezava, mas no fim..."
34040-83 = "Em vez de um conto de fadas, se tornou a tola protagonista de uma fábula sobre moralidade."
34040-87 = "Mas... se há alguma salvação para ela..."
34040-88 = "É que o fato de eu ter sobrevivido fez com que ela não caísse no poço de se tornar uma assassina."
34040-89 = "O motivo pelo qual a Mika consegue suportar essa situação infernal... é provavelmente por causa desse fato."
34040-90 = "Não seria exagero dizer que o meu bem-estar se tornou o refúgio emocional dela."
34040-91 = "......"
34040-92 = "Apesar de eu não ter sido gentil com ela... ela acabou assim por minha causa..."
34040-93 = "......Sim, é verdade."
34040-94 = "Não somos mais crianças... Nem eu nem a Mika conseguimos dizer uma simples palavra de 'me desculpe'... que vergonhoso."
34040-95 = "――Acho que vou pedir que a chamem agora mesmo."
34040-96 = "Terei uma conversa com ela... e depois disso, também participarei da audiência amanhã."
34040-97 = "A acusação mais séria contra a Mika é ter me causado mal――se eu, a própria vítima, estiver ao lado dela, o peso de seus crimes será diminuído, nem que seja um pouco."
34040-102 = "C-Chamou, Seia-sama?"
34040-103 = "Desculpe incomodar, mas eu gostaria de ver a Mika. Poderia trazê-la aqui agora mesmo?"
34040-104 = "A-A Mika-sama? E-Entendido. Vou confirmar com a Nagisa-sama!"
34040-105 = "Obrigada. Ah... e também diga que eu quero conversar a sós com a Mika, na medida do possível. Sabe como é, fico meio envergonhada com outras pessoas por perto..."
34040-106 = "E-Entendido! Vou confirmar isso também!"
34040-111 = "[ns] \"Então, eu vou voltar pra onde a Nagisa está e avisá-la sobre isso.\""
34040-112 = "Sim... muito obrigada, Sensei."
34040-113 = "Sinto que... passei tempo demais interagindo com as pessoas depois de tanto tempo... vou me deitar um pouco."
34040-114 = "......Desculpe por isso, Sensei. Com licença..."
34040-115 = "[s] \"Tudo bem, a gente se vê na audiência amanhã. Boa noite, Seia.\""
34040-116 = "......Sim, boa noite. Tome cuidado no caminho."
34040-118 = "(Informe Nagisa que Mika e Seia participarão da audiência amanhã.)"
34040-119 = "(Após ouvir as palavras de gratidão da Nagisa, que não se conteve de alegria, decidi voltar para Schale para me preparar para a audiência amanhã.)"
34040-124 = "......Vamos passar para o próximo tópico."
34040-125 = "É isso aí!"
34040-126 = "Não tenho nenhuma objeção... mas, antes disso, há algo que eu gostaria de confirmar."
34040-130 = "(......)"
34040-131 = "(Ah, poxa... Eu só ia descansar um pouco antes da Mika chegar... e acabei dormindo sem perceber)"
34040-132 = "(De volta ao meu sonho lúcido... ultimamente, tem sido cada vez mais difícil acordar dos meus sonhos...)"
34040-133 = "(Mas... onde diabos eu estou...)"
34040-135 = "Algum problema, Maestro?"
34040-136 = "......"
34040-138 = "(......Eles são... Não pode ser...!?)"
34040-139 = "Tenho uma pergunta para você, Beatrice."
34040-144 = "......Sim, qual seria?"
34040-145 = "(A Gematria...!?)"
34040-147 = "Próximo Episódio; O Indecifrável Explorador"