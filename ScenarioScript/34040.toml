[translation]
34040-1 = "Episódio 4;Entre o Sonho e a Miragem"
34040-3 = "[ns] \"Kivotos, chegando ao fim……?\""
34040-4 = "……."
34040-5 = "Sim, isso mesmo."
34040-6 = "Se devo dizer que chegou ao fim e pereceu…… ou que, como resultado, acaba chegando lá…… isso permanece insondável, porém."
34040-7 = "[s] \"Que cena era……?\""
34040-9 = "Dos céus precipita-se uma torre colossal, e o vazio tinge-se de carmesim――"
34040-12 = "A torre agourenta troveja como se soltasse um grito…… e vai, pouco a pouco, corroendo este mundo…… e, assim, recobrindo os fragmentos do mundo com \"algo\"."
34040-13 = "Em meio aos fragmentos do mundo corroído que se revolvem como tempestade, uma luz negra baixa dos céus…… e o mundo tomba rumo ao fim……."
34040-15 = "E, então…… tudo em Kivotos rui――"
34040-16 = "sem deixar sequer um grão de pó, tudo se esvaiu no nada."
34040-18 = "[ns] \"…………\""
34040-19 = "Se o que eu vi foi um mero pesadelo, ou se de fato observei o futuro, ou algo ocorrido no passado……."
34040-20 = "Por ora, nada se sabe…… mas, uma vez que os meus olhos viram aquela cena, eu preciso apurar a verdade."
34040-21 = "……."
34040-22 = "E, assim, pra esclarecer o que era aquela cena, eu vaguei por um sonho lúcido sem fim."
34040-23 = "……O sonho lúcido é o ato de afundar conscientemente na sonolência, sabendo que se trata de um sonho. Em troca de poder memorizar tudo o que acontece, a fronteira entre sonho e realidade fica turva."
34040-24 = "Eu, que fui e voltei entre sonho e realidade vezes demais, agora nem consigo perceber de que lado é o mundo em que estou pisando."
34040-25 = "[s] \"Isso soa como um estado muito perigoso…… você tá bem?\""
34040-26 = "……Bom, negar seria mentira. Mas, ainda assim, é necessário."
34040-27 = "A eu de antes, com medo de conhecer o futuro, teria fugido pro mundo do intervalo. Mas, desta vez, não dá."
34040-28 = "A minha intuição me diz que aquela cena não é um mero pesadelo."
34040-29 = "Aquilo não pode existir em Kivotos――é algo vindo de fora de Kivotos. Uma existência muito além da minha imaginação, fora do alcance da compreensão."
34040-30 = "Isto é uma suposição minha, mas, provavelmente, quem convidou aquilo foi a \"Gematria\"――"
34040-31 = "Penso que eles estão atraindo uma existência externa a Kivotos, tentando conduzi-la ao fim."
34040-32 = "[s] \"……A Gematria?\""
34040-40 = "Talvez exista um método de impedir aquela ruína…… por isso, eu……."
34040-41 = "[ns] \"Seia.\""
34040-42 = "……Sim?"
34040-43 = "[s1] \"Se envolve a 'Gematria', é melhor você se afastar agora mesmo.\"\n[s2] \"Você está fazendo algo perigoso demais, Seia.\""
34040-44 = "……."
34040-45 = "……."
34040-46 = "Sim, de fato…… seguir os rastros daquele grupo talvez seja quase um ato suicida."
34040-47 = "[s3] \"Mesmo que a sua suposição seja verdade, do jeito que você tá fazendo não pode.\"\n[s4] \"É algo pra se fazer juntando informação direito, com a colaboração de todos.\""
34040-50 = "……."
34040-51 = "[s] \"Esse tipo de coisa, deixa com os adultos. Você, Seia, olhe direito pra pessoa que está na sua frente.\""
34040-55 = "(A Mika……)"
34040-56 = "……O que você diz é justo."
34040-57 = "Ainda sem informação nenhuma, dominada por aquele sonho…… talvez eu só tivesse perdido a mim mesma."
34040-61 = "Além disso, se algo me acontecer agora, a Mika…… ela vai errar a escolha de novo."
34040-62 = "……Sim."
34040-63 = "Agora, a Mika está sob a pior situação imaginável."
34040-64 = "……Aquela menina viveu até hoje sendo mimada. Todos a veneravam e exaltavam――como uma princesa saída de um conto de fadas."
34040-65 = "E ela, agora――virar alvo do ódio do mundo deve ser, provavelmente, a primeira experiência da vida dela."
34040-66 = "Pra ela carregar, esse destino talvez seja um pouco cruel demais……."
34040-67 = "……Agora, salvar a Mika daquele lamaçal é a prioridade máxima."
34040-68 = "Como é que eu não percebi isso até agora……."
34040-69 = "É como se a névoa tivesse se dissipado…… obrigada, Sensei. Nós, um passo de cada vez――precisamos começar resolvendo o problema da Mika."
34040-70 = "[s] \"Obrigado, Seia. Aliás, a Mika queria se desculpar.\""
34040-71 = "Desculpar……? Eu já devia tê-la perdoado……."
34040-72 = "……Ah, aquilo foi dentro do sonho, era?"
34040-73 = "Sei…… então a Mika ainda acha que não foi perdoada por mim."
34040-74 = "Porque, do pecado que ela cometeu…… a maior vítima, ela deve sentir que sou eu."
34040-77 = "Que tola……."
34040-78 = "Egoísta, impensada, impulsiva――gananciosa e, ao mesmo tempo, autodestrutiva; você……"
34040-79 = "combinava tão bem com o papel da vilã arrogante e atrevida dos contos de fadas."
34040-80 = "E logo……."
34040-82 = "A vilã que tentou atormentar a existência de que não gostava……"
34040-83 = "acabou reduzida a uma tola, tema não de conto de fadas, e sim de fábula."
34040-87 = "Mas…… se há uma salvação até pra ela……."
34040-88 = "é o ponto de que, por eu ter sobrevivido, ela, por um triz, não caiu em assassina."
34040-89 = "Se a Mika consegue suportar esta situação infernal…… deve ser por esse fato."
34040-90 = "Não é exagero dizer que a minha segurança virou o esteio do coração da Mika."
34040-91 = "……."
34040-92 = "Eu, que nem fui gentil com ela…… e ela, por minha causa, daquele jeito……."
34040-93 = "……Sim, é isso."
34040-94 = "Nem somos crianças…… eu e a Mika, sem conseguir dizer nem sequer um \"me desculpa\"…… é vergonhoso ao extremo."
34040-95 = "――Vamos chamar a Mika aqui, agora mesmo."
34040-96 = "Trocar palavras com ela…… e, amanhã, eu também participo da audiência."
34040-97 = "Das acusações da Mika, a mais grave é ter me causado dano――então, se eu, a parte envolvida, estiver junto, o pecado deve pesar um pouco menos."
34040-102 = "C-chamou, senhorita Seia?"
34040-103 = "Desculpe, mas eu quero ver a Mika. Será que dá pra trazê-la aqui agora?"
34040-104 = "A-a senhorita Mika? E-entendido. Vou confirmar com a senhorita Nagisa!"
34040-105 = "Obrigada. E…… será que dá pra avisar que eu quero conversar com a Mika o mais a sós possível? É que ter outros presentes me dá vergonha……."
34040-106 = "E-entendido! Vou confirmar isso junto!"
34040-111 = "[ns] \"Então eu também vou até a Nagisa contar isto.\""
34040-112 = "Sim…… obrigada, Sensei."
34040-113 = "Eu――parece que convivi com gente demais depois de tanto tempo…… vou me deitar um pouco."
34040-114 = "……Desculpe, Sensei. Com licença……."
34040-115 = "[s] \"Então, até a audiência de amanhã. Boa noite, Seia.\""
34040-116 = "……Sim, boa noite. E cuide-se no caminho."
34040-118 = "(Contou à Nagisa que a Mika e a Seia participariam da audiência de amanhã.)"
34040-119 = "(Recebendo as palavras de gratidão da Nagisa, radiante, decidiu voltar cedo à Schale por causa da audiência do dia seguinte.)"
34040-124 = "……Então, ao próximo tema."
34040-125 = "É isso aí!"
34040-126 = "Sem objeção…… mas, antes, há algo que quero confirmar."
34040-130 = "(……)"
34040-131 = "(Ora, ora…… eu pretendia descansar um pouco antes de a Mika chegar…… e acabei adormecendo sem perceber.)"
34040-132 = "(De novo dentro do sonho lúcido…… sendo que, ultimamente, acordar do sonho vem ficando cada vez mais difícil……)"
34040-133 = "(Mas…… onde é isto, afinal……)"
34040-135 = "Maestro, algo o incomoda?"
34040-136 = "……."
34040-138 = "(……Eles são…… não pode ser……!?)"
34040-139 = "Tenho uma pergunta à Beatrice."
34040-144 = "……Sim, o que seria?"
34040-145 = "(A Gematria……!?)"
34040-147 = "Próximo Episódio;Os Investigadores Incompreensíveis"
