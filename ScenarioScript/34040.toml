[translation]
34040-1 = "Episódio 4: Entre Sonhos e Miragens"
34040-3 = "[ns] \"Kivotos, o fim...?\""
34040-4 = "……."
34040-5 = "Ah, sim."
34040-6 = "Deveria dizer que encontrou o fim e pereceu... ou que, inevitavelmente, chegará a esse ponto... isso é algo incerto e desconhecido, no entanto."
34040-7 = "[s] \"Como era essa visão...?\""
34040-9 = "Uma torre gigantesca desceu dos céus, o vazio foi tingido de escarlate e—"
34040-12 = "A torre sinistra ressoava como se estivesse gritando... consumindo este mundo pouco a pouco... e então, cobriu os fragmentos do mundo com \"algo\"."
34040-13 = "Enquanto os pedaços do mundo consumido sopravam como uma tempestade, uma luz negra desceu dos céus... e o mundo inclinou-se para o fim..."
34040-15 = "E então... tudo em Kivotos entrou em colapso—"
34040-16 = "Sem deixar nem mesmo uma partícula de poeira, tudo desapareceu no vazio."
34040-18 = "[ns] \"………….\""
34040-19 = "Se o que vi foi apenas um pesadelo, ou se realmente observei o futuro, ou talvez algo que aconteceu no passado..."
34040-20 = "Até agora, não sei de nada... mas, tendo visto aquela cena, preciso descobrir a verdade."
34040-21 = "……."
34040-22 = "E para esclarecer o que era aquela visão, vaguei por um sonho lúcido sem fim."
34040-23 = "……O sonho lúcido é o ato de mergulhar conscientemente no sono, ciente de que se está sonhando. O preço por poder lembrar de tudo o que aconteceu é que a fronteira entre o sonho e a realidade se torna ambígua."
34040-24 = "Para mim, que fui e voltei entre o sonho e a realidade tantas vezes, agora nem consigo perceber em que lado do mundo estou."
34040-25 = "[s] \"Isso soa como uma situação muito perigosa... você está bem?\""
34040-26 = "……Bem, seria mentira dizer que não. No entanto, ainda assim é necessário."
34040-27 = "Se fosse a mim de antes, teria fugido para o mundo entre as frestas por medo de conhecer o futuro. Mas, desta vez, não posso fazer isso."
34040-28 = "Minha intuição me diz que aquela visão não é apenas um pesadelo."
34040-29 = "Aquilo não pode existir em Kivotos — é algo que veio de fora de Kivotos. Uma existência que supera em muito minha imaginação e que está além da minha compreensão."
34040-30 = "Esta é apenas uma suposição minha, mas provavelmente quem convidou aquilo foi a \"Gematria\"—"
34040-31 = "Penso que eles trouxeram uma existência externa para Kivotos e estão tentando conduzi-la ao fim."
34040-32 = "[s] \"……A Gematria?\""
34040-40 = "Talvez exista uma maneira de evitar aquela ruína... por isso, eu..."
34040-41 = "[ns] \"Seia.\""
34040-42 = "……Hm?"
34040-43 = "[s1] \"Se tem a ver com a 'Gematria', é melhor você se afastar disso agora mesmo.\"\n[s2] \"Seia, você está fazendo algo perigoso demais agora.\""
34040-44 = "……."
34040-45 = "……."
34040-46 = "Ah, certamente... perseguir os rastros daquele grupo pode ser quase um ato suicida."
34040-47 = "[s3] \"Mesmo que a suposição da Seia seja um fato, o jeito que você está fazendo agora não serve.\"\n[s4] \"Você deve reunir informações corretamente e trabalhar em cooperação com todos.\""
34040-50 = "……."
34040-51 = "[s] \"Deixe essas coisas para os adultos. Seia, olhe bem para as pessoas que estão à sua frente.\""
34040-55 = "(Mika...)"
34040-56 = "……O que você diz faz todo sentido."
34040-57 = "Sem nenhuma informação e sobrecarregada por aquele sonho... talvez eu tenha apenas perdido a mim mesma."
34040-61 = "Além disso, se algo acontecer comigo agora, Mika... ela pode acabar fazendo a escolha errada novamente."
34040-62 = "……Sim."
34040-63 = "Agora, Mika está na pior situação possível que se pode imaginar."
34040-64 = "……Aquela criança viveu sendo mimada até agora. Todos a adoravam e a exaltavam — como se ela fosse uma princesa de contos de fadas."
34040-65 = "Para ela, ser alvo de ódio do mundo — como está sendo agora — é provavelmente a primeira experiência de sua vida."
34040-66 = "Talvez esse destino seja cruel demais para ela carregar..."
34040-67 = "……Agora, a prioridade máxima é salvar Mika daquele lamaçal."
34040-68 = "Como pude não perceber isso até agora..."
34040-69 = "Sinto como se a névoa tivesse se dissipado... obrigado, Sensei. Devemos seguir passo a passo — primeiro, resolver o problema da Mika."
34040-70 = "[s] \"Obrigado, Seia. A propósito, a Mika queria se desculpar.\""
34040-71 = "Desculpar-se...? Eu já a perdoei, não é mesmo...?"
34040-72 = "……Ah, isso foi algo que aconteceu dentro de um sonho."
34040-73 = "Entendo... Então a Mika ainda acha que não foi perdoada por mim."
34040-74 = "Provavelmente porque ela sente que eu sou a maior vítima do crime que ela cometeu."
34040-77 = "Que tola..."
34040-78 = "Você, que é egoísta, imprudente, impulsiva — e, embora seja gananciosa, também é autodestrutiva..."
34040-79 = "Você combinaria perfeitamente com o papel de uma vilã arrogante e insolente, como as que aparecem nos contos de fadas."
34040-80 = "Mas, logo você..."
34040-82 = "A vilã que tentou atormentar aqueles que não lhe agradavam..."
34040-83 = "Acabou se tornando não a protagonista de um conto de fadas, mas a figura tola de uma fábula."
34040-87 = "Mas... se existe alguma salvação para ela..."
34040-88 = "É o fato de que, como eu sobrevivi, ela conseguiu, por pouco, não se tornar uma assassina."
34040-89 = "A Mika consegue suportar essa situação infernal... provavelmente por causa desse fato."
34040-90 = "Não é exagero dizer que o meu bem-estar é o pilar emocional da Mika."
34040-91 = "……"
34040-92 = "Mesmo que eu não tenha sido gentil com ela... ela acabou assim por minha causa..."
34040-93 = "……Ah, é verdade."
34040-94 = "Não somos mais crianças... e ainda assim, nem eu nem a Mika conseguimos dizer um simples \"me desculpe\"... é realmente vergonhoso."
34040-95 = "— Vamos pedir para chamarem a Mika agora mesmo."
34040-96 = "Vou conversar com ela... e também participarei da audiência de amanhã."
34040-97 = "A acusação mais grave contra a Mika é ter me causado dano, então, se eu, a parte envolvida, estiver presente, a pena dela provavelmente será reduzida."
34040-102 = "V-você me chamou, Seia-sama?"
34040-103 = "Desculpe, mas quero ver a Mika. Você poderia trazê-la aqui agora mesmo?"
34040-104 = "A, a Mika-sama? E-entendido. Vou confirmar com a Nagisa-sama!"
34040-105 = "Obrigada. E também... poderia dizer a ela que quero conversar com a Mika a sós, se possível? É que me sinto um pouco envergonhada com a presença de terceiros..."
34040-106 = "C-com certeza! Vou confirmar isso também!"
34040-111 = "[ns] \"Então, eu também vou falar com a Nagisa e contar sobre isso.\""
34040-112 = "Ah... obrigada, Sensei."
34040-113 = "Eu... parece que interagi com pessoas demais depois de tanto tempo... vou me deitar um pouco."
34040-114 = "……Desculpe, Sensei. Com licença..."
34040-115 = "[s] \"Então, nos vemos na audiência de amanhã. Boa noite, Seia.\""
34040-116 = "……Ah, boa noite. Cuide-se."
34040-118 = "(Contei para a Nagisa que a Mika e a Seia participarão da audiência de amanhã.)"
34040-119 = "(Enquanto recebia os agradecimentos da feliz Nagisa, decidi voltar logo para o Schale para a audiência de amanhã.)"
34040-124 = "……Então, vamos para o próximo tópico."
34040-125 = "É isso aí!"
34040-126 = "Não tenho objeções... mas, antes disso, há algo que preciso confirmar."
34040-130 = "(……)"
34040-131 = "(Puxa vida... eu pretendia descansar um pouco antes da Mika chegar... será que acabei dormindo?)"
34040-132 = "(De novo em um sonho lúcido... embora ultimamente esteja ficando cada vez mais difícil acordar dos sonhos...)"
34040-133 = "(Mas... onde é que eu estou...)"
34040-135 = "Maestro, há algo que o incomoda?"
34040-136 = "……"
34040-138 = "(……Eles são... não pode ser...!)"
34040-139 = "Tenho uma pergunta para a Beatrice."
34040-144 = "……Sim, o que seria?"
34040-145 = "(Gematria...!?)"
34040-147 = "Próximo episódio: O Investigador Incompreensível"
