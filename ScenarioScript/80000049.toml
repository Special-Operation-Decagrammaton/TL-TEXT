[translation]
80000049-1 = "Em um sonho doce e suave"
80000049-3 = "[ns] \"Isso aqui fica assim, e aquela parte...\""
80000049-12 = "(Já tinha passado tanto tempo sem eu perceber)"
80000049-17 = "[ns1] \"Já terminei quase tudo por aqui, e o resto...\"\n[ns2] \"...Não vejo o fim disso.\""
80000049-18 = "(Eu vinha processando trabalho há dias, mas ainda encarava uma pilha de tarefas que não diminuía)"
80000049-19 = "(Eu vinha processando trabalho há dias, mas ainda encarava uma pilha de tarefas que não diminuía)"
80000049-27 = "[ns] \"...Acho que meu corpo está chegando no limite.\""
80000049-29 = "(Sentindo a exaustão, bem quando pensei em me deitar...)"
80000049-33 = "Ah, Sensei."
80000049-34 = "[s] \"Tsubaki? Por que está aqui?\""
80000049-35 = "Eu estava passando por perto e senti uma "aura de privação de sono" vindo de você."
80000049-36 = "[s] \"Aura de privação de sono...?\""
80000049-37 = "Olha só essa cara... Sensei, você não dorme há um bom tempo, né? Isso não pode acontecer~!"
80000049-38 = "O trabalho é importante, mas sua saúde também é."
80000049-39 = "Se você ficar doente, eu não vou conseguir treinar com você."
80000049-40 = "[s] \"Mas o trabalho não acaba...\""
80000049-41 = "Não, não."
80000049-42 = "[s] \"Não...?\""
80000049-43 = "O que é errado, é errado."
80000049-44 = "Dormir é essencial, se você negligenciar isso, tudo vai dar errado, sabe?"
80000049-45 = "Já que estamos treinando juntos para alcançar o \"sono perfeito\", você precisa colocar isso em prática."
80000049-46 = "...É, isso não está nada bom."
80000049-47 = "[s3] \"Mas, Tsubaki-sensei...!\"\n[s4] \"O-o que eu faço...?\""
80000049-48 = "Hmm, você está realmente pressionado, hein..."
80000049-49 = "Hmm, você está realmente pressionado, hein..."
80000049-50 = "Está tudo bem, não se preocupe."
80000049-51 = "Não importa o quanto você esteja pressionado, eu estou aqui com você."
80000049-52 = "Ah, eu trouxe isso para você, Sensei."
80000049-56 = "Aqui, pegue."
80000049-58 = "[s] \"Isso é...?\""
80000049-59 = "Sensei, hoje é Dia dos Namorados, sabia?"
80000049-60 = "Por isso, trouxe um chocolate que ajuda a dormir profundamente e um kit de descanso."
80000049-61 = "Esse chocolate é especial aqui em Kivotos; quanto mais você come, mais sono dá."
80000049-62 = "Dizem que se você comer um pedaço, até um elefante dorme. É um chocolate que virou assunto recentemente por ir na contramão da ideia de que \"chocolate tira o sono por causa da cafeína\"."
80000049-63 = "[s] \"Isso não é meio perigoso...?\""
80000049-64 = "Ora, ora, de qualquer forma, acho que você precisa disso, Sensei."
80000049-65 = "Você precisa se manter saudável. Se o Sensei desmaiar, todo mundo vai ficar preocupado..."
80000049-66 = "...Claro, eu também."
80000049-67 = "[s] \"Tsubaki...\""
80000049-68 = "Então, aqui."
80000049-69 = "Sensei, deite-se, por favor?"
80000049-70 = "Acho que aqui é bem macio e confortável, sabia?"
80000049-75 = "[ns] \"Ei, Tsubaki, você está muito perto...!?\""
80000049-76 = "Hmm? Você não gosta de um colo?"
80000049-77 = "Eu queria ter te emprestado meu equipamento de treino, mas ele está lavando agora..."
80000049-78 = "Ah, quer outra opção além do colo? Hmm..."
80000049-79 = "Algo macio que eu tenha comigo..."
80000049-80 = "...Meu bumbum?"
80000049-81 = "[s] \"Vou ficar com o colo mesmo.\""
80000049-82 = "É mesmo? Então..."
80000049-87 = "Vamos dormir um pouco, está bem?"
80000049-88 = "Aqui, pegue o chocolate também. Com isso, você vai dormir rapidinho. Aaaah..."
80000049-98 = "[ns] \"Ah...\""
80000049-99 = "Hehe, descanse bem."
80000049-100 = "Boa noite, Sensei."
80000049-102 = "（E assim, depois de muito tempo, consegui ter um sono profundo e revigorante）"
