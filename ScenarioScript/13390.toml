[translation]
13390-1 = "第39話;制約解除"
13390-2 = "ホシノ先輩！"
13390-3 = "先輩！"
13390-4 = "ホシノ先輩っ！"
13390-5 = "先輩……。"
13390-7 = "まさか、本当に……。"
13390-12 = "シロコちゃん、セリカちゃん、ノノミちゃん、アヤネちゃん……。#nそれと、シロコちゃん？"
13390-16 = "風紀……いや、ヒナちゃんも。"
13390-17 = "再会の挨拶は、あとにしましょう。"
13390-24 = "そうだね……まずは、アレを何とかしよっか。"
13390-28 = "……よくも小汚いマネを！！"
13390-29 = "だが、[USERNAME]先生よ！"
13390-30 = "小生には、五つ目の攻略法が残っています。"
13390-31 = "「チートにはチートで対抗する」。"
13390-32 = "イヒッ、ヒヒッ……ヒヒヒヒヒッ！！"
13390-33 = "あなたの力、解析できましたよ。"
13390-34 = "チートにも限界がある……そうでしょう？"
13390-35 = "一度に指揮を行える対象は、最大で六人。"
13390-36 = "それ以上は、統制が乱れる。"
13390-37 = "これが、今まで得た情報を分析して得た結果！"
13390-38 = "果たして、先生の指揮と小生の「神々の星座」……どちらが強いのか。"
13390-39 = "ヒヒ、ヒヒヒヒヒッ……。#nたとえ何人でかかってこようと、相手になりませんがね。"
13390-40 = "「セトの[ruby=ふんぬ]憤怒[/ruby]」には、どうやっても勝ち得ない！"
13390-41 = "これこそが、真のチートだッッ！"
13390-46 = "[ns1] \"お待たせ。\"\n[ns2] \"これからは、私の番だね。\""
13390-49 = "はい、先生！"
13390-50 = "プラナちゃんが「シッテムの箱」の奥にあった新しいプロセスを発見してくれました！"
13390-51 = "説明。#n「シッテムの箱」に私とアロナ先輩、二人のOSが存在することにより……。"
13390-52 = "今までの制約を解除し、さらなる演算処理が行えるようになりました。"
13390-53 = "先生、ご命令を。"
13390-57 = "[ns] \"いこうか、これが私達の新しい[ruby=技術]コンテンツ[/ruby]だよ。\""
13390-59 = "命令確認。"
13390-60 = "シッテムの箱、制約解除。#nプロセス「ペレツ･ウザ」限定稼働開始。"
13390-65 = "認証完了。"
13390-66 = "先生の接続プロセスを確認。#nよろしくお願いします。"
13390-67 = "シッテムの箱、制約解除。#nプロセス「ペレツ･ウザ」限定稼働中。"
13390-68 = "待機中。#n先生、ご命令を。"
13390-69 = "今の私は無敵です。#n普段の2倍は強いです。"
13390-70 = "アロナ先輩と力を合わせて、先生をサポートします。"
13390-74 = "……！"
13390-75 = "何ィッ……？"
13390-76 = "システムの改変だと……！？"
13390-77 = "これまでの制約を解除……そんな事が！？"
13390-81 = "[ns3] \"今度こそ、終わりだよ。\"\n[ns4] \"これ以上、アビドスで誰も死なせはしない。\""
13390-90 = "[ns] \"……これ以上、アビドスの誰も悲しませはしない。\""
13390-94 = "何を言っている……？"
13390-95 = "それがこの勝敗に一体何の関係があるというのだ……！？"
13390-96 = "[ns] \"「世界で」苦しんでいる「子ども」がいて……。\""
13390-98 = "[ns] 助けてほしい、と手を伸ばしているのなら……。"
13390-100 = "[ns5] \"いつ、いかなる時であっても――。\"\n[ns6] いつ、いかなる時であっても――。"
13390-103 = "[ns7] \"子どもと共に生きていく[ruby=・   ・]大人[/ruby]として責任を負わなければならない。\"\n[ns8] 子どもと共に生きていく[ruby=・   ・]大人[/ruby]として責任を負わなければならない。"
13390-106 = "[ns9] \"[ruby=こども]生徒[/ruby]が責任を負う世界なんて、あってはならないからね。\"\n[ns10] [ruby=こども]生徒[/ruby]が責任を負う世界なんて、あってはならないからね。"
13390-110 = "[ns11] 大人のカードを取り出す。\n[ns12] 大人のカードを取り出す。"
13390-113 = "なんだソレは！？"
13390-114 = "……ンンッ？"
13390-115 = "いったい……。"
13390-116 = "……何なのだ！？"
13390-117 = "お、おお――"
13390-118 = "大人のカードッ……！？"
13390-119 = "そ、そんなものが……どうして……。"
13390-120 = "ルールは？コデックスは？#nそんな力に敵うわけがないだろう！？"
13390-121 = "反則だッッ！"
13390-122 = "あんなもの……あんなもの、許されるものか！"
13390-123 = "そんなのナシだろ……カードなんて……ゲームでこれは、ズルだろう……？はあ……？？"
13390-124 = "こんなの、チートだ……。"
13390-125 = "チートだ、チート！"
13390-126 = "チートだァァァァァッ！"
13390-127 = "小生を、騙すとはッ！"
13390-128 = "ノーゲームだ！"
13390-129 = "分かったかッ！？"
13390-130 = "接続を確認。"
13390-131 = "――なっ！？"
13390-132 = "先生からのメッセージを伝えます。"
13390-137 = "[ns13] \"この世界を勝利と敗北でしか定義できない青二才に――\"\n[ns14] \"先生として、負けるわけにはいかないからね。\""
13390-140 = "何だと……！？"
13390-142 = "つまり、大人になりきれなかったあなたのような者に構っている時間はない、#nという意味です。"
13390-143 = "……！！！！"
13390-147 = "先生は忙しいので。#nちなみに、昨日も徹夜をしました。"
13390-148 = "（プラナちゃんが何だか怖いです……）"
