[translation]
10054010-1 = "第1話;広報部長"
10054010-3 = "久しいのう、先生。#n毎日とは言わぬが、たまには顔を出してほしいのじゃが。"
10054010-4 = "そうさな。具体的には週に3日ほど……どうじゃ？"
10054010-5 = "[s] \"それは、ちょっと……。\""
10054010-6 = "分かっておる。#nやはりシャーレに山海経の出張所を設置すべきかの。"
10054010-7 = "ふふっ、これも冗談じゃ。"
10054010-8 = "……半分くらいは、な。"
10054010-9 = "[s] \"そうやってからかうなら……反撃だっ！\""
10054010-10 = "ほう？何をされてしまうのじゃろうなぁ……？"
10054010-15 = "せ、先生！？急に顔を近づけるのは……。"
10054010-16 = "っ――！"
10054010-17 = "[ns] \"やっぱり、顔色よくないね。\""
10054010-18 = "……なんじゃと？"
10054010-20 = "つまり……妾の容態を確かめに来た、と。"
10054010-21 = "気にかけてくれるのは嬉しいが……はぁ。"
10054010-22 = "いや、なんでもない。妾の勘違いじゃ。忘れてくれ。#nそれより……。"
10054010-23 = "ふむ。"
10054010-24 = "……玄龍門の者がなんぞ騒ぎでも？"
10054010-25 = "[s1] \"！？！？\"\n[s2] \"ち、違うよ！そうじゃなくて……！\""
10054010-28 = "ほう？"
10054010-29 = "……。"
10054010-30 = "寂しいのう。妾と其方の間に、隠し事はないと思っておったのじゃが……。"
10054010-32 = "（キサキにすべてを話した……）"
10054010-34 = "はぁ……。"
10054010-35 = "[s] \"あんまり叱らないであげてね……？\""
10054010-36 = "分かっておる。妾を思っての行動じゃろうて……。"
10054010-37 = "無論、それが良きこととは限らぬがの。"
10054010-38 = "とはいえ、元をただせば心配をかけてしまった妾の落ち度もあろう。"
10054010-39 = "[s] \"具合……そんなに悪いの？\""
10054010-40 = "まさか。世に言う「夏バテ」のようなものじゃ。"
10054010-41 = "この時期になると、どうにもな。"
10054010-42 = "そう案ずるでない。妾の病とは関係のないことじゃ。"
10054010-43 = "もしもそうなら、サヤが黙っておらんよ。"
10054010-44 = "[s] \"それなら安心だけど……。\""
10054010-45 = "じゃが、心身を癒す、か……。"
10054010-46 = "[s] \"たまには必要だと思うよ。\""
10054010-47 = "……ああ。叶うのならばな。"
10054010-48 = "夏休み……。"
10054010-49 = "……じゃがな、先生。"
10054010-50 = "休むにしても適切な「口実」が必要。それが、玄龍門の門主というものじゃ。"
10054010-57 = "おっはようございます！いい朝ですね！#nいかがお過ごしでしょうか？"
10054010-58 = "珍しいのう。其方から直接連絡が来るとは。#nカナエ広報部長、何かあったのかえ？"
10054010-59 = "やだなぁ～門主様ったら。何かなくても連絡くらいしますよ？"
10054010-60 = "朝昼晩、1日3回ちゃんと挨拶をする……！#n「三顧の礼」という言葉もあるくらいですし～？"
10054010-61 = "……あれ？意味あってましたっけ？"
10054010-62 = "正しくは、何度も相手の元を訪れて礼儀を尽くし頼み込む、という意味じゃぞ……。"
10054010-63 = "あっちゃぁー！"
10054010-64 = "どのみち、其方が妾を訪ねてくることはないと思うのじゃが……。"
10054010-65 = "自身は動かずして妾の動向や気配を常に把握し、伝言が必要なら人を遣わせる――"
10054010-66 = "それが、其方の「浪漫」なのじゃろう？"
10054010-67 = "さっすが門主様！よく分かってますねぇ！"
10054010-68 = "……ん？#nそう考えると、今の私の行動は矛盾しているような……。"
10054010-69 = "いやいや、些事でくよくよする私ではありません！#nまさに――力は山を抜き、気は世を[ruby=おお]蓋[/ruby]う！"
10054010-70 = "って、あれ？これも違うんでしたっけ……。"
10054010-71 = "ああ……その京劇の結末は、あまり良くないものだったと記憶しておる。#nカグヤが聞いていたらどうなっていたことか……。"
10054010-72 = "そんなぁ……！"
10054010-73 = "こほん。とにかくですね！#n失礼を承知の上で、ご提案がありまして。"
10054010-74 = "私の応接室にお招きしたいのですが、いかがでしょう！"
10054010-75 = "……。"
10054010-76 = "山海経に、なんぞ妾の知らぬ危機でも迫っているのかえ？"
10054010-77 = "……はい？"
10054010-78 = "あ～そう聞こえちゃいましたか。これはしたり。"
10054010-79 = "ご安心ください。決してそういう話ではありませんので！"
10054010-80 = "ただ、皆さんと食事の場を設けたいと言いますか……。"
10054010-81 = "皆、とは……。"
10054010-82 = "玄武商会……ルミ会長も来るのか？"
10054010-83 = "それは……ある意味、ルミ会長も関係者と言いますか……。"
10054010-84 = "なるほど、あい分かった。であれば……。"
10054010-85 = "むむ？"
10054010-86 = "人を迎える準備は抜かりなく頼むぞ。#n其方の応接室、しばらく使っておらんじゃろ。"
10054010-87 = "え、ええ、そうですね……。#nあはは、掃除しときますぅ……。"
10054010-89 = "[ns] \"今のは？\""
10054010-90 = "ああ、先生はまだ面識がなかったか。"
10054010-91 = "玄龍門とは仲を深めてきたというに。#n妾の不手際じゃな。謝罪をここに。"
10054010-95 = "[ns] \"えっと……？\""
10054010-96 = "あれはカナエという。ああ見えて、よく玄龍門を支えてくれておっての。"
10054010-97 = "ミナが「外」の担当とすれば、カナエは「内」の担当じゃ。"
10054010-98 = "どちらも欠くことのできぬ玄龍門の要じゃ。"
10054010-99 = "……なぜ今まで会うことがなかったのか。という疑問かの？"
10054010-100 = "そうさな……理由については――"
10054010-104 = "カナエに会ってからのお楽しみ、としておこうかの。"
10054010-106 = "玄武商会の出張宴会でーす！"
10054010-107 = "夏を楽しめる料理をご用意しました。どうぞ召し上がってください。"
10054010-116 = "あ、どもども～こんにちは！#nこほん、本日はお忙しい中、お集まりいただきありがとうございます！"
10054010-117 = "ふふ、お久しぶりですね。ご招待ありがとうございます。"
10054010-118 = "カナエお姉さん、ありがとうございます！#nあれ？先生もいらしてたんですね！"
10054010-119 = "[s] \"こんにちは、ココナちゃん！\""
10054010-120 = "ですから、私はココナちゃんじゃなくて……！"
10054010-121 = "[s] \"あ、そうだった！ココナ教官ちゃん！\""
10054010-122 = "うぅ……先生ったら、もう……。"
10054010-127 = "あっ！あなたが先生ですね！お噂はかねがね！#nお初にお目にかかります！[ruby=みやうち]宮内[/ruby]カナエと申します！"
10054010-128 = "私と先生――そして先生と私の邂逅は……まるで水魚の交わり、ですね！"
10054010-129 = "――どうですか、門主様！#n今回は使い方あってましたよね！？"
10054010-130 = "大きく外れてはおらぬが……初対面の相手に言う言葉ではないのう。"
10054010-131 = "そ、そうですかねぇ……？"
10054010-132 = "[s] \"よろしくね。\""
10054010-133 = "カナエ、挨拶が遅すぎるんじゃないか？"
10054010-134 = "それを言われると返す言葉もありませんが……私にも事情があったんです！#nミナちゃんだって知ってますよね？"
10054010-135 = "自分でそれを言うのか……。"
10054010-137 = "[ns] \"挨拶に早いも遅いもないよ。こうして会えたんだし。\""
10054010-138 = "先生は生徒に甘すぎるんだ。まあ、それも大きな長所ではあるが……。"
10054010-139 = "カナエには厳しく接したほうがいいだろうな。"
10054010-140 = "事情だ何だと言ってはいるが。#n執務室から出ようとしない理由は、実にくだらない。"
10054010-141 = "「策士たるもの、部屋の中から一歩も動かず事件を解決すべき」という考えに固執しているだけなんだ！"
10054010-142 = "ひっどーい！ほんっと、ミナちゃんは分かってないですね！いつもですけど！"
10054010-143 = "安楽椅子に座ったまま全ての事件を解決する……#nこれこそ、策士なら誰しもが夢見る「浪漫」なのですよ！"
10054010-144 = "文は名を残せれば十分。剣術はせいぜい1人に勝るもの。"
10054010-145 = "しかし、策略と兵法は、万人を相手取ることのできる対策である！"
10054010-146 = "……みたいな？"
10054010-147 = "それは策士ではなく武将の言葉じゃ……。"
10054010-148 = "がぁーん！"
10054010-149 = "また適当な受け売りを……。"
10054010-153 = "まあまあ、お二人ともその辺で。門主様もいらしているのですよ？"
10054010-154 = "あっ！#n……すみません。"
10054010-155 = "門主様、申し訳ございません。"
10054010-157 = "[ns] \"カナエはいつも部屋の中にいるの？\""
10054010-158 = "いいや、「策士」として振る舞っておる時だけじゃ。"
10054010-159 = "これで趣味が旅行なのじゃから。"
10054010-160 = "どうです、先生。よければ今度一緒に行きません？#n次の三連休にでも是非！"
10054010-161 = "たまに、二重人格なんじゃないかと思う時があるぞ……。"
10054010-162 = "違いますよ。私は仕事とプライベートをはっきりさせているだけです。"
10054010-163 = "公私を分けて、別人物であるべき。#nこれもまた、「策士」としての浪漫ですから！"
10054010-164 = "学びて時に[ruby=これ]之[/ruby]を習う、ま[ruby=よろこ]た説ば[/ruby]しからずや！"
10054010-165 = "それとこれとに何の関係が……？"
10054010-166 = "あれ……ないんですか？"
10054010-167 = "ない！"
10054010-168 = "……いつも言っているが、仕事の時も部屋から出てくれ。#nついでに他部署の仕事も手伝え。"
10054010-169 = "組織とは、[ruby=・]業[/ruby][ruby=・]務[/ruby][ruby=・]分[/ruby][ruby=・]担[/ruby]をはっきりしてこそ回るものなんですよ？"
10054010-170 = "業務、分担……？"
10054010-176 = "他の！仕事も！"
10054010-182 = "やれと！言っている！"
10054010-188 = "それが！私たちの！任務なのだから！！！"
10054010-194 = "分担を言い訳にして、曖昧な仕事は全部私に丸投げじゃないか！"
10054010-195 = "うわぁぁ～ん！痛い！痛いですぅ！"
10054010-196 = "ふふ、元気が良くて何よりですが……今は食事の場ですよ？"
10054010-197 = "そうです。これを園児たちが見たらどう思うでしょうね？"
10054010-198 = "……す、すまない。"
10054010-199 = "しくしく……シュン姉さん聞いてくださいよ！#nミナちゃん、私と会うたびにいじめてきてぇ……。"
10054010-200 = "そもそも対面すること自体が稀ではないかのう……。"
10054010-201 = "……いじめて[ruby=・]き[/ruby][ruby=・]そ[/ruby][ruby=・]う[/ruby]でぇ～"
10054010-202 = "事実無根だ。勘弁してくれ。"
10054010-203 = "[ns] \"まあまあ。\""
10054010-204 = "はぁ……見苦しいところを見せたな。"
10054010-205 = "ともあれ、カナエとて、サボっているわけではないからの。"
10054010-206 = "少なくとも、担当している行政業務や新人教育に関しては申し分ない。"
10054010-207 = "じゃから、仕事には全幅の信頼を置いておる。"
10054010-208 = "それこそ、妾に上がってくる公文書の取りまとめを全てカナエに任せておるくらいじゃ。"
10054010-209 = "故に、玄龍門に危機が迫った場合……#nカナエはすべての文書を持って身を隠さねばならぬ。"
10054010-210 = "その点は私も理解しています。しかし……。"
10054010-211 = "ふふん～"
10054010-212 = "無論、カナエの言う「自分の役割」の範囲が、些か狭いことは認めるがの。"
10054010-213 = "うぅん～"
10054010-218 = "――して、そろそろ本題に入ろうか。"
10054010-219 = "他でもない其方が人を集めるなど、そうあることではない。#n……何用じゃ？"
10054010-220 = "あ、それがですね！えっと……。"
10054010-224 = "そう！私が入手した情報によりますと！"
10054010-225 = "玄武商会が、山海経の外部に投資しているみたいなのです！"
10054010-226 = "玄武商会が……。"
10054010-227 = "外に？"
10054010-228 = "あら？"
10054010-229 = "ほぇ？"
10054010-230 = "……。"
10054010-231 = "……。"
