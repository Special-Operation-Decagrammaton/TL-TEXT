[translation]
10054010-1 = "Episode 1;Public Relations Director"
10054010-3 = "It has been a while, Sensei. I don't expect you every day, but I would like you to show your face once in a while."
10054010-4 = "Let's see. How about three days a week... what do you think?"
10054010-5 = "[s] \"That's a bit...\""
10054010-6 = "I understand. Perhaps I should establish a Shanhaijing branch office at Schale."
10054010-7 = "Fufu, that was a joke."
10054010-8 = "...At least half of it was."
10054010-9 = "[s] \"If you're going to tease me like that... then I'll have to retaliate!\""
10054010-10 = "Oh? And what exactly are you going to do to me...?"
10054010-15 = "S-Sensei!? You shouldn't get so close all of a sudden..."
10054010-16 = "Ah—!"
10054010-17 = "[ns] \"I knew it, you don't look well.\""
10054010-18 = "...What was that?"
10054010-20 = "In other words... you came here to check on my condition."
10054010-21 = "I appreciate your concern, but... *sigh*."
10054010-22 = "No, it's nothing. I must have misunderstood. Forget it. More importantly..."
10054010-23 = "Hmm."
10054010-24 = "...Is there some kind of commotion among the Genryumon members?"
10054010-25 = "[s1] \"!?!?!\"\n[s2] \"N-no, that's not it! It's not like that...!\""
10054010-28 = "Oh?"
10054010-29 = "..."
10054010-30 = "How lonely. I thought there were no secrets between you and me..."
10054010-32 = "(I told Kisaki everything...)"
10054010-34 = "*Sigh*..."
10054010-35 = "[s] \"Please don't scold them too much, okay...?\""
10054010-36 = "I understand. They were acting out of concern for me, after all..."
10054010-37 = "Though, that doesn't necessarily mean it was the right thing to do."
10054010-38 = "Still, if we trace it back to the source, it is my own fault for causing them worry."
10054010-39 = "[s] \"Is your health... really that bad?\""
10054010-40 = "Of course not. It's just what people call 'summer fatigue'."
10054010-41 = "It always happens around this time of year."
10054010-42 = "Don't worry so much. It has nothing to do with my illness."
10054010-43 = "If it were, Saya wouldn't stay silent about it."
10054010-44 = "[s] \"That's a relief, but...\""
10054010-45 = "But, healing the mind and body, huh..."
10054010-46 = "[s] \"I think it's necessary once in a while.\""
10054010-47 = "...Ah. If only that were possible."
10054010-48 = "Summer vacation..."
10054010-49 = "...However, Sensei."
10054010-50 = "Even to take a break, one needs a proper 'excuse'. That is what it means to be the head of the Genryumon."
10054010-57 = "Good morning! What a lovely morning! How are you doing today?"
10054010-58 = "That's rare. To hear from you directly. Director Kanae, has something happened?"
10054010-59 = "Oh, come now, Headmistress. Can't I call you just because?"
10054010-60 = "Greeting you three times a day—morning, noon, and night...! There's even a saying, 'Three Visits to the Thatched Cottage', isn't there?"
10054010-61 = "...Wait? Did I get the meaning right?"
10054010-62 = "Correctly, it means to visit someone repeatedly to show respect and ask for their help..."
10054010-63 = "Oh, shoot!"
10054010-64 = "In any case, I don't think you'd ever visit me yourself..."
10054010-65 = "You stay put, yet you always keep track of my movements and presence, and if you need to send a message, you send someone else—"
10054010-66 = "That is your 'romance', isn't it?"
10054010-67 = "As expected of the Headmistress! You understand me so well!"
10054010-68 = "...Hm? Thinking about it, my current actions seem contradictory..."
10054010-69 = "No, no, I'm not one to fret over trifles! Truly—my strength could uproot mountains, and my spirit could cover the world!"
10054010-70 = "Wait, is that one wrong too...?"
10054010-71 = "Ah... I recall that the ending of that Peking opera wasn't very pleasant. I wonder what would have happened if Kaguya had heard it..."
10054010-72 = "Oh, no...!"
10054010-73 = "Ahem. Anyway! I have a proposal, if you'll forgive my intrusion."
10054010-74 = "I would like to invite you to my reception room, what do you think?"
10054010-75 = "..."
10054010-76 = "Is there some crisis in Shanhaijing that I am unaware of?"
10054010-77 = "...Yes?"
10054010-78 = "Oh, is that how it sounded? My apologies."
10054010-79 = "Please rest assured. It is nothing like that at all!"
10054010-80 = "I just wanted to set up a place for everyone to have a meal together..."
10054010-81 = "Everyone, you say..."
10054010-82 = "Is the Xuanwu Merchant Association... Chairman Lumi coming too?"
10054010-83 = "That is... in a sense, Chairman Lumi is also involved..."
10054010-84 = "I see, understood. In that case..."
10054010-85 = "Hm?"
10054010-86 = "Make sure the preparations to welcome guests are flawless. You haven't used your reception room in a while, have you?"
10054010-87 = "Y-yes, that's right... Ahaha, I'll get to cleaning it..."
10054010-89 = "[ns] \"What was that just now?\""
10054010-90 = "Ah, you haven't met her yet, have you, Sensei?"
10054010-91 = "Even though we've been deepening our ties with the Genryumon. It is my oversight. I apologize."
10054010-95 = "[ns] \"Um...?\""
10054010-96 = "That was Kanae. Despite how she looks, she supports the Genryumon quite well."
10054010-97 = "If Mina is in charge of the 'outside', Kanae is in charge of the 'inside'."
10054010-98 = "Both are indispensable pillars of the Genryumon."
10054010-99 = "...Are you wondering why you haven't met her until now?"
10054010-100 = "Well... as for the reason—"
10054010-104 = "I'll leave that as a surprise for when you meet her."
10054010-106 = "It's a pop-up banquet from the Xuanwu Merchant Association!"
10054010-107 = "We've prepared dishes for you to enjoy the summer. Please, help yourselves."
10054010-116 = "Ah, hello, hello! Ahem, thank you all for gathering here despite your busy schedules!"
10054010-117 = "Fufu, it's been a while. Thank you for the invitation."
10054010-118 = "Big Sister Kanae, thank you! Oh? Sensei is here too!"
10054010-119 = "[s] \"Hello, Kokona-chan!\""
10054010-120 = "I told you, I'm not Kokona-chan...!"
10054010-121 = "[s] \"Oh, that's right! Instructor Kokona-chan!\""
10054010-122 = "Ugh... Sensei, really..."
10054010-127 = "Ah! You must be Sensei! I've heard so much about you! Nice to meet you! My name is Kanae Miyauchi!"
10054010-128 = "My meeting with you, Sensei—and you with me—is like... fish in water, isn't it!"
10054010-129 = "—How was that, Headmistress? I used it correctly this time, right!?"
10054010-130 = "It's not entirely wrong, but... that's not something you say to someone you're meeting for the first time."
10054010-131 = "I-is that so...?"
10054010-132 = "[s] \"Nice to meet you.\""
10054010-133 = "Kanae, isn't your greeting a bit too late?"
10054010-134 = "I have no defense against that, but... I had my reasons! Mina-chan, you know that, right?"
10054010-135 = "You're really going to say that yourself..."
10054010-137 = "[ns] \"Greetings aren't about being early or late. We're here now, aren't we?\""
10054010-138 = "Sensei, you're too soft on the students. Well, that is a great virtue of yours, though..."
10054010-139 = "You should probably be stricter with Kanae."
10054010-140 = "She talks about 'reasons' and such, but the reason she won't leave her office is truly trivial."
10054010-141 = "She's just obsessed with the idea that 'a strategist should solve problems without moving a single step from their room'!"
10054010-142 = "That's mean! Honestly, Mina-chan, you just don't get it! As always!"
10054010-143 = "Solving every incident while sitting in an armchair... This is the 'romance' that every strategist dreams of!"
10054010-144 = "Literature is enough to leave a name behind. Swordsmanship is at best enough to defeat one person."
10054010-145 = "However, strategy and military tactics are countermeasures that can take on ten thousand!"
10054010-146 = "...Or something like that?"
10054010-147 = "That's a quote for a warlord, not a strategist..."
10054010-148 = "Oh no!"
10054010-149 = "Using random quotes again..."
10054010-153 = "Now, now, both of you, leave it at that. The Headmistress is here, you know?"
10054010-154 = "Ah! ...I'm sorry."
10054010-155 = "My apologies, Headmistress."
10054010-157 = "[ns] \"Is Kanae always in her room?\""
10054010-158 = "No, only when she's acting as a 'strategist'."
10054010-159 = "And yet, her hobby is traveling."
10054010-160 = "What do you think, Sensei? If you'd like, why don't we go together sometime? Maybe during the next three-day weekend!"
10054010-161 = "Sometimes I wonder if she has a split personality..."
10054010-162 = "That's not it. I just keep my work and private life separate."
10054010-163 = "Separating public and private, and being a different person... This is also a 'strategist's' romance!"
10054010-164 = "To learn and practice what one has learned, is that not a pleasure!"
10054010-165 = "What does that have to do with this...?"
10054010-166 = "Oh... it doesn't?"
10054010-167 = "It doesn't!"
10054010-168 = "...As I always say, leave your room even when you're working. And help out with other departments' work while you're at it."
10054010-169 = "An organization only functions when the division of labor is clear, you know?"
10054010-170 = "Division... of labor...?"
10054010-176 = "Other! Work! Too!"
10054010-182 = "I am! Telling you! To do it!"
10054010-188 = "Because that is! Our! Duty!!!"
10054010-194 = "You use 'division of labor' as an excuse to dump all your vague tasks onto me!"
10054010-195 = "Waaaaah! It hurts! That hurts!"
10054010-196 = "Fufu, it's good to see you have energy, but... we are at a meal, you know?"
10054010-197 = "That's right. What would the students think if they saw this?"
10054010-198 = "...S-sorry."
10054010-199 = "*Sob*... Shun-nee, please listen! Mina-chan bullies me every time we meet..."
10054010-200 = "Isn't it rare for you to even meet in the first place...?"
10054010-201 = "...It seems like she's bullying me..."
10054010-202 = "That is baseless. Give me a break."
10054010-203 = "[ns] \"Now, now.\""
10054010-204 = "*Sigh*... I'm sorry you had to see such an unsightly scene."
10054010-205 = "Regardless, Kanae isn't slacking off."
10054010-206 = "At the very least, she is impeccable when it comes to the administrative tasks and new recruit training she is responsible for."
10054010-207 = "That is why I place my full trust in her work."
10054010-208 = "I even entrust Kanae with compiling all the official documents that come to me."
10054010-209 = "Therefore, if a crisis were to approach the Genryumon... Kanae must hide with all the documents."
10054010-210 = "I understand that point as well. However..."
10054010-211 = "Fufun~"
10054010-212 = "Of course, I do admit that Kanae's definition of her 'own role' is somewhat narrow."
10054010-213 = "Uuun~"
10054010-218 = "—Now, shall we get to the main point?"
10054010-219 = "It's not like you to gather people together. ...What is it?"
10054010-220 = "Ah, that is! Um..."
10054010-224 = "Right! According to the information I obtained!"
10054010-225 = "It seems the Xuanwu Merchant Association is investing outside of Shanhaijing!"
10054010-226 = "The Xuanwu Merchant Association is..."
10054010-227 = "Outside?"
10054010-228 = "Oh?"
10054010-229 = "Huh?"
10054010-230 = "..."
10054010-231 = "..."