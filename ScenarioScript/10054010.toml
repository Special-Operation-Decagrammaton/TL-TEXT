[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 24/06.]
10054010-1 = "Episódio 1: Diretora de Relações Públicas"
10054010-3 = "Há quanto tempo, Sensei.\nNão peço que venha todos os dias, mas\ngostaria que desse as caras de vez em quando."
10054010-4 = "Vejamos. Mais especificamente,\ncerca de três dias por semana... O que acha?"
10054010-5 = "[s] \"Aí já é pedir demais...\""
10054010-6 = "Eu sei, estou ciente.\nAcho que a única solução seria\nabrir uma filial de Shanhaijing na Schale."
10054010-7 = "Fufu, isso também foi uma piada."
10054010-8 = "......Pelo menos metade dela."
10054010-9 = "[s] \"Se vai ficar zombando de mim assim...\nToma o meu contra-ataque!\""
10054010-10 = "Oh? E o que exatamente\nvocê pretende fazer...?"
10054010-15 = "S-Sensei!? Aproximar o\nrosto de repente desse jeito..."
10054010-16 = "Ngh――!"
10054010-17 = "[ns] \"Como eu suspeitava,\nvocê está bem pálida.\""
10054010-18 = "......O que disse?"
10054010-20 = "Quer dizer que... você veio apenas\npara checar o meu estado de saúde."
10054010-21 = "Fico grata pela sua\npreocupação, mas... haah."
10054010-22 = "Não, não é nada.\nFoi um mal-entendido meu. Esqueça isso.\nMudando de assunto..."
10054010-23 = "Fumu."
10054010-24 = "......Os membros da Xuanlong Office\nestão causando algum alvoroço?"
10054010-25 = "[s1] \"！？！？\"\n[s2] \"N-Não! Não é nada disso...!\""
10054010-28 = "Oh?"
10054010-29 = "......"
10054010-30 = "Que lástima. Eu acreditava que não\nexistiam segredos entre nós..."
10054010-32 = "（Contei tudo para a Kisaki...）"
10054010-34 = "Haah..."
10054010-35 = "[s] \"Por favor, não seja tão\nsevera com elas, ok...?\""
10054010-36 = "Eu sei. Fizeram isso pensando\nno meu bem-estar..."
10054010-37 = "Embora boas intenções\nnem sempre resultem em boas ações."
10054010-38 = "Dito isso, a culpa primordial é\nminha por tê-las deixado preocupadas."
10054010-39 = "[s] \"Você está se sentindo...\ntão mal assim?\""
10054010-40 = "De forma alguma.\nÉ apenas o que chamam de 'fadiga de verão'."
10054010-41 = "Sempre que esta época do\nano chega, eu acabo ficando assim."
10054010-42 = "Não se preocupe tanto. Não tem relação\nalguma com a minha saúde frágil de antes."
10054010-43 = "Se fosse esse o caso,\na Saya não teria ficado calada."
10054010-44 = "[s] \"Fico mais tranquilo em ouvir isso, mas...\""
10054010-45 = "Contudo, curar o corpo e a mente, hein..."
10054010-46 = "[s] \"Acho que de vez em\nquando é necessário.\""
10054010-47 = "......Sim. Se fosse possível."
10054010-48 = "Férias de verão..."
10054010-49 = "......No entanto, Sensei."
10054010-50 = "Até para descansar, eu preciso de um\n'pretexto' adequado. Esse é o fardo\nde ser a líder da Xuanlong Office."
10054010-57 = "Muuuito bom dia!\nQue manhã maravilhosa, não acham!?\nComo estão passando o dia?"
10054010-58 = "Isso sim é raro.\nReceber um contato direto seu.\nAconteceu alguma coisa, Kanae?"
10054010-59 = "Poxa vida~ Senhora Monshu.\nEu ligo para dar um alô mesmo\nquando não há nada a relatar, sabia?"
10054010-60 = "Cumprimentar direitinho de manhã,\nde tarde e de noite, três vezes ao dia...!\nAté existe aquele ditado,\n'As Três Visitas', não é mesmo~?"
10054010-61 = "......Ué? Era esse mesmo o significado?"
10054010-62 = "Para ser exata, significa visitar alguém\nrepetidas vezes, com extrema cortesia,\npara implorar por um favor..."
10054010-63 = "Ih, errei feio!"
10054010-64 = "De qualquer forma, duvido muito que você\nvenha me visitar pessoalmente..."
10054010-65 = "Ficar parada no seu canto enquanto monitora\nconstantemente os meus passos e, se precisar\ndar um recado, enviar um subordinado――"
10054010-66 = "Esse é o seu ideal de 'romance', não é?"
10054010-67 = "Como esperado da Senhora Monshu!\nVocê me entende perfeitamente!"
10054010-68 = "......Hm?\nSe formos pensar por esse lado, a minha\natitude de agora é um tanto contraditória..."
10054010-69 = "Não, não, eu não sou de me\napegar a detalhes triviais!\nComo dizem: 'A força arranca montanhas,\ne o espírito cobre o mundo'!"
10054010-70 = "Espera, ué? Esse também tá errado...?"
10054010-71 = "Sim... Se bem me lembro, o final\ndessa Ópera de Pequim não era nada feliz.\nSe a Kaguya ouvisse isso, não sei o que seria de você..."
10054010-72 = "Ah, não...!"
10054010-73 = "Cof, cof. Enfim!\nCorrendo o risco de soar insolente,\ntenho uma proposta para a senhora."
10054010-74 = "Gostaria de convidá-la para a\nminha sala de recepção, o que acha!?"
10054010-75 = "......"
10054010-76 = "Por um acaso há alguma crise iminente\npairando sobre Shanhaijing que eu desconheço?"
10054010-77 = "......Hã?"
10054010-78 = "Ah~ Foi assim que soou? Falha minha."
10054010-79 = "Pode ficar tranquila. Não é\nabsolutamente nada desse tipo!"
10054010-80 = "É que eu gostaria de organizar\num banquete com todos..."
10054010-81 = "Todos, você diz..."
10054010-82 = "A Genbu Express...\nA Presidente Rumi também estará presente?"
10054010-83 = "Isso... De certa forma, a Presidente\nRumi também é uma parte interessada..."
10054010-84 = "Entendo, compreendido. Sendo assim..."
10054010-85 = "Mumu?"
10054010-86 = "Certifique-se de preparar tudo\nperfeitamente para receber os convidados.\nVocê não usa a sua sala de recepção\nhá um bom tempo, não é?"
10054010-87 = "E-Eh, é verdade...\nAhaha, vou dar uma boa faxina lá..."
10054010-89 = "[ns] \"O que foi isso agora?\""
10054010-90 = "Ah, vocês dois ainda não se\nconheciam pessoalmente."
10054010-91 = "Sendo que o Sensei tem estreitado tanto\nos laços com a Xuanlong Office.\nFoi um descuido meu. Peço desculpas."
10054010-95 = "[ns] \"Er... quem é ela?\""
10054010-96 = "Aquela era a Kanae. Apesar do jeito dela,\nela é um dos grandes pilares que\nsustentam a Xuanlong Office."
10054010-97 = "Se a Mina é a encarregada do 'exterior',\na Kanae é a encarregada do 'interior'."
10054010-98 = "Ambas são peças fundamentais das\nquais a Xuanlong não pode prescindir."
10054010-99 = "......Você deve estar se perguntando\npor que nunca a viu até hoje, certo?"
10054010-100 = "Pois bem... O motivo disso é――"
10054010-104 = "Acho melhor deixar a surpresa para\nquando você conhecê-la pessoalmente."
10054010-106 = "Serviço de banquete da\nGenbu Express chegou!"
10054010-107 = "Preparamos pratos perfeitos para\naproveitar o verão. Sirvam-se à vontade."
10054010-116 = "Ah, olá a todos~! Boa tarde!\nCof cof, muito obrigada por se reunirem aqui\nhoje, mesmo com as agendas tão cheias!"
10054010-117 = "Fufu, há quanto tempo.\nAgradeço pelo convite."
10054010-118 = "Obrigada, Kanae-oneesan!\nUé? O Sensei também está aqui!"
10054010-119 = "[s] \"Olá, Kokona-chan!\""
10054010-120 = "Eu já falei que não é pra\nme chamar de Kokona-chan...!"
10054010-121 = "[s] \"Ah, é verdade! Desculpa,\nInstrutora Kokona-chan!\""
10054010-122 = "Uuuuh... O Sensei não tem jeito mesmo..."
10054010-127 = "Ah! Então você é o Sensei!\nOuvi falar muito de você!\nÉ um prazer finalmente conhecê-lo!\nSou Miyauchi Kanae!"
10054010-128 = "O meu encontro com você, Sensei――e o\nseu encontro comigo... é como a relação\nda água com o peixe, não é mesmo!?"
10054010-129 = "――E então, Senhora Monshu!\nDessa vez eu usei o ditado certinho, não foi!?"
10054010-130 = "Não está de todo errado... mas definitivamente\nnão é algo que se diz a alguém que acabou de conhecer."
10054010-131 = "S-Sério...?"
10054010-132 = "[s] \"É um prazer conhecê-la, Kanae.\""
10054010-133 = "Kanae, não acha que demorou\ntempo demais para se apresentar a ele?"
10054010-134 = "Ouvindo você falar assim não tenho como\nnegar, mas... eu também tive as minhas razões!\nA Mina-chan sabe muito bem disso, não sabe!?"
10054010-135 = "Você tem a cara de pau\nde falar isso para mim..."
10054010-137 = "[ns] \"Não existe hora certa ou errada para se conhecer alguém. O importante é que estamos todos aqui agora.\""
10054010-138 = "Sensei, você é complacente demais com as alunas.\nBem, isso também é uma das\nsuas maiores qualidades, mas..."
10054010-139 = "Acho que deveria ser um pouco\nmais rigoroso com a Kanae."
10054010-140 = "Ela diz ter as razões dela e tudo mais.\nMas o motivo para ela se recusar a sair da\nsala de operações é, francamente, ridículo."
10054010-141 = "Ela é completamente obcecada pela ideia de que:\n'Um verdadeiro estrategista deve ser capaz de\nsolucionar qualquer incidente sem dar\num único passo para fora de sua sala'!"
10054010-142 = "Que maldaaaade! A Mina-chan não entende nada da vida mesmo! Como sempre!"
10054010-143 = "Resolver todos os mistérios e incidentes\nconfortavelmente sentada na sua cadeira...\nEsse é o verdadeiro 'Romance' que\nqualquer estrategista de respeito sonha em viver!"
10054010-144 = "A literatura é suficiente para deixar\num nome na história. A esgrima, no máximo,\nsupera a força de um único homem."
10054010-145 = "No entanto, a estratégia e as táticas militares\nsão a solução capaz de derrubar dez mil\noponentes de uma vez!"
10054010-146 = "......Algo assim, sabe?"
10054010-147 = "Isso não é uma frase de estrategista,\né de um comandante militar..."
10054010-148 = "Gaaaah!"
10054010-149 = "Lá vem ela falar o que não sabe de novo..."
10054010-153 = "Certo, certo, já chega vocês duas.\nA Senhora Monshu está bem\nna nossa frente, esqueceram?"
10054010-154 = "Ah!\n......Mil perdões."
10054010-155 = "Senhora Monshu, sinto muito\npelo meu comportamento."
10054010-157 = "[ns] \"Kanae, você fica no\nseu quarto o tempo todo?\""
10054010-158 = "Não, eu só assumo essa persona reclusa\nquando estou agindo como 'Estrategista'."
10054010-159 = "Acredite se quiser,\no hobby dela é viajar."
10054010-160 = "O que me diz, Sensei? Que tal\nviajarmos juntos algum dia desses?\nQuem sabe no próximo feriado prolongado!"
10054010-161 = "Às vezes, eu me pergunto se ela\nnão sofre de múltiplas personalidades..."
10054010-162 = "Claro que não. Eu apenas sei separar\nmuito bem o meu trabalho da vida pessoal."
10054010-163 = "Separar o lado público do privado, adotando\numa postura completamente diferente em cada um.\nIsso também faz parte do romance\nde ser uma 'Estrategista'!"
10054010-164 = "Aprender e praticar de tempos em tempos,\nnão é uma alegria!?"
10054010-165 = "E o que isso tem a ver com o assunto...?"
10054010-166 = "Ué... Não tem nada a ver?"
10054010-167 = "NADA!"
10054010-168 = "......Como eu sempre te digo, você deveria sair\ndaquele quarto mesmo durante o expediente.\nE poderia ajudar com os outros departamentos também."
10054010-169 = "Mas uma organização só funciona de verdade quando\nexiste uma DIVISÃO DE TAREFAS clara e definida, esqueceu?"
10054010-170 = "Divisão... de tarefas...?"
10054010-176 = "Faça! O trabalho! Dos outros! Também!"
10054010-182 = "É isso! Que eu estou! Dizendo!"
10054010-188 = "Porque essa! É a nossa! Missão!!!"
10054010-194 = "Você usa essa desculpa de 'divisão de tarefas'\nsó pra empurrar todo o trabalho\nvago e chato pra mim!"
10054010-195 = "Uwaaaaah! Ai! Ai, isso machuca!"
10054010-196 = "Fufu, é bom ver que vocês têm tanta\nenergia, mas... nós estamos no\nmeio de uma refeição, lembram?"
10054010-197 = "Isso mesmo. O que as crianças do jardim\nachariam se vissem esse comportamento?"
10054010-198 = "......D-Desculpe."
10054010-199 = "Snif, snif... Shun-neesan, escuta isso!\nToda vez que a Mina-chan me encontra,\nela começa a fazer bullying comigo..."
10054010-200 = "Para começo de conversa, é um milagre\nvocês sequer se encontrarem pessoalmente..."
10054010-201 = "......Eu aposto que ela iria\nfazer bullying coooomiiigooo~"
10054010-202 = "Isso não tem nenhum fundo de verdade.\nPelo amor de Deus, para de inventar coisas."
10054010-203 = "[ns] \"Calma, calma.\""
10054010-204 = "Haaah... Peço perdão por essa cena lamentável."
10054010-205 = "De qualquer forma, a Kanae\nnão está apenas vadiando no quarto."
10054010-206 = "No que diz respeito às tarefas administrativas\ne ao treinamento de novatos,\no trabalho dela é impecável."
10054010-207 = "Por isso, confio plenamente\nno desempenho profissional dela."
10054010-208 = "Eu até mesmo encarreguei a Kanae de organizar e\ncompilar todos os documentos que chegam até mim."
10054010-209 = "Sendo assim, caso uma crise asssole a Xuanlong...\nA Kanae precisará recolher toda a documentação\nvital e procurar um esconderijo imediatamente."
10054010-210 = "Eu compreendo esse ponto perfeitamente.\nNo entanto..."
10054010-211 = "Fufun~"
10054010-212 = "Claro, devo admitir que a visão que a Kanae tem\nsobre as 'suas próprias funções' é um tanto limitada."
10054010-213 = "Uuuhn~"
10054010-218 = "――Muito bem, acho que é hora de entrarmos\nno motivo principal desta reunião."
10054010-219 = "O fato de você ter convocado todos para\numa reunião presencial é um evento raríssimo.\n......O que você tem a dizer?"
10054010-220 = "Ah, sim! Sobre isso...!"
10054010-224 = "Isso mesmo!\nDe acordo com as informações que eu consegui!"
10054010-225 = "Parece que a Genbu Express tem feito investimentos\nvolumosos no exterior, bem longe das\nfronteiras de Shanhaijing!"
10054010-226 = "A Genbu Express está..."
10054010-227 = "Investindo no exterior?"
10054010-228 = "Ara?"
10054010-229 = "Ué?"
10054010-230 = "......"
10054010-231 = "......"