[translation]
34050-1 = "Episódio 5; O Investigador Incompreensível"
34050-3 = "……。"
34050-4 = "……。"
34050-5 = "Lembro-me de ter emprestado meu poder a você por sua solicitação, não é?"
34050-6 = "Refiro-me ao caso em que você replicou aqueles que protegem os mandamentos para acompanhar seus planos."
34050-7 = "Sim, sou muito grata, Maestro. Graças a isso, consegui obter um poder ainda maior em meu território."
34050-8 = "Não me lembro de ter permitido que você o utilizasse para isso. Além disso, não deveria ter permissão para usar minhas obras dessa maneira."
34050-9 = "Aquele fenômeno não deveria ser sua propriedade, Maestro."
34050-10 = "……Que insolência. Não estou reivindicando direitos de propriedade, é que――"
34050-11 = "Insolência? Como ousa... falar comigo desse jeito."
34050-12 = "Ora, ora... acalmem-se, ambos. Por favor, não piorem as coisas."
34050-13 = "É isso aí!"
34050-14 = "……Peço desculpas. O Maestro certamente acredita que interpretar fenômenos universais através de uma perspectiva original é sua própria forma de expressão."
34050-15 = "……。"
34050-16 = "No entanto, talvez essa seja uma parte que não precise ser considerada do ponto de vista da Madame. Todos nós temos formas diferentes de interpretar este mundo."
34050-17 = "――Ou seja, você não gosta que eu tenha tomado as armas do Maestro por conta própria, não é?"
34050-18 = "……O que você faz não é arte. Não há estética nem nada do tipo, é apenas um ato de criar armas."
34050-19 = "Sim, é verdade. Algum problema com isso?"
34050-23 = "Além disso, não é só com você. Também uso a tecnologia fornecida pelo Kuroko e os textos interpretados por Golconda da mesma maneira."
34050-25 = "……。"
34050-26 = "……。"
34050-27 = "Não tenho interesse na arte de vocês. Acho que venho dizendo isso desde que me tornei um membro da 'Gematria'."
34050-28 = "Hehehe... Exatamente. Eu penso que isso é bom do jeito que está."
34050-29 = "Não creio que haja necessidade de conflitos entre aliados."
34050-30 = "Ela garantiu seu próprio território em Kivotos. Ela é a existência mais necessária para nossos planos."
34050-31 = "O Distrito Autônomo de Arius, não é? Colocar todos os estudantes e a escola de lá sob seu controle é, de fato, um feito notável."
34050-32 = "（……！！）"
34050-34 = "Foi uma pena o que aconteceu em Abydos, Kuroko... ah, perdão. Não pretendo ser sarcástico."
34050-35 = "Hehe... Não se preocupe. Foi uma pena, de fato, mas... a existência daquele Sensei não estava nos meus cálculos."
34050-36 = "……'Schale'. Aquele indivíduo, não é? Nosso adversário."
34050-37 = "É isso aí!"
34050-39 = "（……！！）"
34050-40 = "Não. Não devemos nos opor a ele. Pelo contrário, seria melhor trazê-lo para o nosso lado."
34050-41 = "Eu também gosto muito dele. Aquele indivíduo pode acabar se tornando alguém que nos compreenda."
34050-42 = "Ainda estou retendo meu julgamento, mas... se ele puder se tornar um de nós, como Beatrice..."
34050-44 = "Que pensamento tolo e preguiçoso. O Sensei de 'Schale' deve ser eliminado a todo custo."
34050-45 = "……。"
34050-46 = "……。"
34050-47 = "……。"
34050-49 = "Parece que uma explicação é necessária. Sim, já que estamos aqui, vamos seguir passo a passo, certo?"
34050-50 = "Desde que Mika Misono visitou o Distrito Autônomo de Arius, ela me ajudou com muitas coisas."
34050-51 = "（……Mika?）"
34050-52 = "Sim... por assim dizer, Mika Misono me dá inspiração... devo chamá-la de minha musa?"
34050-53 = "A ideia de usar o 'Tratado do Éden' para garantir a dignidade ancestral, e a decisão de que o arcanjo do sonho profético deveria ser o primeiro a ser descartado, só puderam ser realizadas graças a ela."
34050-54 = "Pois existências problemáticas como profetas devem ser eliminadas rapidamente. Agradeço a Decalcomanie... não, a Golconda, por fornecer uma tecnologia tão rara."
34050-55 = "É isso aí!"
34050-56 = "Eu apenas forneci o texto, quem o transformou em forma foi a Madame."
34050-57 = "Além disso, aquela tecnologia não acabou atrapalhando a Madame?"
34050-58 = "Sim... mas fui salva graças ao sistema de defesa que implantei previamente no corpo do sacrifício. Agradeço, Kuroko."
34050-59 = "……Hehehe. Fico feliz que a tecnologia dos sacerdotes sem nome tenha sido útil."
34050-60 = "E a inspiração que Misono Mika me deu por último... foi justamente sobre o professor do "Schale"."
34050-61 = "Como ela convidou o professor para a Trinity, eu pude tomar conhecimento da existência dele e analisá-lo."
34050-63 = "Eu escolhi o Distrito Autônomo de Arius como alvo puramente por ser um local oculto; não havia outro significado além disso."
34050-64 = "A raiva e o ódio direcionados à "Trinity" ou à "Gehenna"... para mim, isso não importa."
34050-66 = "O "ódio" é apenas um meio para controlar as crianças, o "Tratado de Eden" é apenas um método para obter o poder dos guardiões, e o "Squad" não passa de uma ferramenta descartável."
34050-67 = "Se Misono Mika não tivesse trazido o professor para a Trinity, eu nem teria dado atenção a ele. Mas... eu vi aquele desempenho com meus próprios olhos..."
34050-69 = "Quando ele intervém, todo o significado do que eu possuo muda. Aquele indivíduo é perigoso."
34050-70 = "……"
34050-71 = "Foi aí que percebi. Para concretizar meu plano, devo eliminar o "professor" antes de qualquer outra coisa."
34050-72 = "Um verdadeiro antagonista, não é..."
34050-73 = "Hum..."
34050-74 = "Parece que não gostou da minha decisão, mas — de qualquer forma, somos seres que buscam apenas seus próprios objetivos. Vocês não têm o direito de me impedir."
34050-75 = "……Sim, não temos tal direito. Faça como desejar, Beatrice."
34050-76 = "……"
34050-77 = "……"
34050-78 = "No entanto, você nunca nos explicou concretamente o que é o seu plano. Madame, o que você está fazendo no Distrito Autônomo de Arius?"
34050-79 = "Estou preparando um altar."
34050-80 = "Um altar...?"
34050-81 = "Essencialmente, não é diferente do que você estava tentando fazer em Abydos. Embora eu não pretenda fazer um contrato."
34050-82 = "Ho, um ritual em vez de um contrato... Embora, originalmente, possa-se considerar que os dois não são diferentes..."
34050-83 = "E para realizar isso, a existência do professor será um obstáculo?"
34050-84 = "Sim, exatamente... Já tomei as providências."
34050-85 = "O "Squad" cuidará do professor."
34050-87 = "(……！！！)"
34050-88 = "……"
34050-89 = "……Entendo, o Squad, é?"
34050-90 = "São consumíveis que eu pretendia descartar, mas disse a elas que, se matarem o professor, eu lhes darei uma chance de perdão. Para elas, é uma proposta que não podem recusar."
34050-91 = "N-não pode ser...! O professor está... em perigo...!"
34050-92 = "(……Ugh!?)"
34050-93 = "……Parece que há um rato infiltrado aqui."
34050-94 = "……！！"
34050-95 = "Aqui? Não há ninguém além de nós aqui..."
34050-96 = "Falei demais. Vou me retirar agora."
34050-100 = "……"
34050-101 = "……"
34050-110 = "……Hah, hah."
34050-111 = "……Hah, hah, hah... hah..."
34050-112 = "(A cena de agora há pouco foi... o que exatamente...)"
34050-113 = "U, ugh...!"
34050-114 = "Cof, cof, cof...!"
34050-115 = "(O Distrito Autônomo de Arius já estava sob o controle da Gematria...!?) "
34050-116 = "Cof, cof..."
34050-118 = "(...Meu corpo não me obedece. Minha consciência... mas...)"
34050-119 = "(A "educação" das alunas de Arius, o fato de ninguém ter conseguido encontrar a localização do distrito até agora... aquela tecnologia desconhecida... a bomba que destrói halos... tudo...)"
34050-120 = "(Se isso tem relação com a Gematria... tudo faz sentido...)"
34050-121 = "(Se o "Squad" está perseguindo o professor...)"
34050-122 = "(O professor está em perigo... preciso avisar alguém rapidamente...)"
34050-124 = "(Elas já atacaram o professor uma vez... provavelmente, são as mais perigosas neste Kivotos...)"
34050-125 = "(...A bomba que destrói halos)"
34050-126 = "(Minha vida sendo alvo... o Tratado de Eden sendo rompido... todos se ferindo... o professor sendo colocado em perigo... tudo...)"
34050-128 = "(Se tudo isso... tivesse um ponto de partida... então seria...)"
34050-135 = "Bem... hum, olá. Seia-chan..."
34050-137 = "...Mika."
34050-142 = "Próximo episódio: A asa que se quebrou"
