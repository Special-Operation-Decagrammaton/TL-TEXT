[translation]
34050-1 = "Episódio 5; O Indecifrável Explorador"
34050-3 = "......"
34050-4 = "......"
34050-5 = "Você deve se lembrar de que, a seu pedido, eu lhe emprestei o meu poder, não é?"
34050-6 = "Estou falando da criação das réplicas (Mimesis) dos guardiões dos mandamentos para colaborar com os seus planos."
34050-7 = "Sim, sou muito grata por isso, Maestro. Graças a você, consegui obter um poder ainda maior no meu território."
34050-8 = "Não me lembro de ter lhe dado permissão para se aproveitar disso. Para começar, eu não autorizei que usasse a minha obra dessa forma."
34050-9 = "Aquele fenômeno não lhe pertence, Maestro."
34050-10 = "......Que insolência. Não estou reivindicando posse, aquilo é――"
34050-11 = "Insolência? Como ousa... falar assim comigo."
34050-12 = "Calma, calma... Por favor, acalmem-se vocês dois. Não vamos transformar isso em um conflito."
34050-13 = "É isso aí!"
34050-14 = "......Peço perdão. O Maestro certamente acredita que criar uma interpretação original através de um fenômeno universal seja a sua própria forma de expressão."
34050-15 = "......"
34050-16 = "No entanto, do ponto de vista da Madame, talvez esse não seja um detalhe que exija consideração. Afinal, todos nós temos maneiras diferentes de interpretar este mundo."
34050-17 = "――Em outras palavras, o que o incomoda é o fato de eu ter tomado a sua arma sem permissão, não é isso?"
34050-18 = "......O que você faz não é arte. Não há estética ou qualquer outro significado nisso, é apenas o ato vil de produzir armas."
34050-19 = "Sim, isso mesmo. Algum problema?"
34050-23 = "Além do mais, não é só de você. Eu também uso a tecnologia fornecida pelo Black Suit e os textos interpretados pelo Golconda dessa exata mesma maneira."
34050-25 = "......"
34050-26 = "......"
34050-27 = "Não tenho interesse na arte de vocês. Acredito que já venho deixando isso claro desde que me tornei membro da 'Gematria'."
34050-28 = "Kukuku... Exatamente. E eu acho que isso está muito bem do jeito que está."
34050-29 = "Não há necessidade de conflitos entre aliados."
34050-30 = "Ela garantiu o seu próprio território exclusivo em Kivotos. Ela é a existência mais necessária para os nossos planos no momento."
34050-31 = "O distrito autônomo de Arius, não é. Colocar todas as alunas e aquela academia sob o seu controle é, sem dúvida, um feito e tanto."
34050-32 = "(......!!)"
34050-34 = "Foi uma pena o que aconteceu com você em Abydos, Black Suit... Opa, perdoe-me. Não estou tentando ser sarcástica."
34050-35 = "Kuku... Não se preocupe. Realmente foi uma pena――mas a intervenção daquele Sensei não estava nos meus cálculos."
34050-36 = "......A 'Schale'. Aquele indivíduo. O nosso adversário."
34050-37 = "É isso aí!"
34050-39 = "(......!!)"
34050-40 = "Não. Não devemos hostilizá-lo. Pelo contrário, seria melhor trazê-lo para o nosso lado."
34050-41 = "Eu também aprecio muito o estilo dele. Aquele indivíduo pode acabar se tornando alguém que nos compreende."
34050-42 = "Ainda estou reservando meu julgamento sobre ele... mas se ele se juntar a nós como a Beatrice o fez..."
34050-44 = "Que linha de pensamento tola e preguiçosa. O Sensei da 'Schale' deve ser eliminado a todo custo."
34050-45 = "......"
34050-46 = "......"
34050-47 = "......"
34050-49 = "Parece que uma explicação se faz necessária. Pois bem, já que estamos aqui, vamos repassar os pontos um por um."
34050-50 = "Desde que a Mika Misono visitou o distrito autônomo de Arius, ela tem nos ajudado em muitas coisas."
34050-51 = "(......A Mika?)"
34050-52 = "Isso mesmo... pode-se dizer que a Mika Misono me traz inspiração... quase como uma musa."
34050-53 = "A ideia de utilizar o 'Tratado do Éden' para assegurar a autoridade ancestral, assim como a decisão de que a arcanjo dos sonhos premonitórios deveria ser eliminada primeiro... tudo isso se concretizou graças a ela."
34050-54 = "Afinal, a melhor forma de lidar com a existência problemática de uma profeta é eliminá-la rapidamente. Agradeço ao Decalcomanie... digo, Golconda, por ter fornecido uma tecnologia tão rara para isso."
34050-55 = "É isso aí!"
34050-56 = "Eu apenas forneci o texto. Foi a Madame quem deu forma a ele."
34050-57 = "Além disso, aquela tecnologia não acabou se tornando um obstáculo para a Madame no fim das contas?"
34050-58 = "Sim... mas o sistema de defesa que implantei no corpo do sacrifício com antecedência acabou me salvando. Agradeço a você por isso, Black Suit."
34050-59 = "......Kukuku. Fico feliz que a tecnologia dos Sacerdotes Sem Nome tenha sido útil."
34050-60 = "E a última inspiração que a Mika Misono me deu... foi exatamente sobre o Sensei da 'Schale'."
34050-61 = "Como ela convidou o Sensei para a Trinity, pude tomar conhecimento e analisar a existência dele."
34050-63 = "O único motivo pelo qual escolhi o distrito autônomo de Arius como base foi puramente por ser um lugar oculto, e não teve nenhum outro significado além desse."
34050-64 = "A raiva e o ódio direcionados à 'Trinity' e 'Gehenna'... essas coisas não importam para mim."
34050-66 = "O 'ódio' é apenas um meio de controlar aquelas crianças. O 'Tratado do Éden' foi apenas uma forma de obter o poder dos guardiões, e o 'Esquadrão' não passa de ferramentas descartáveis."
34050-67 = "Se a Mika Misono não tivesse trazido o Sensei para a Trinity, eu nem teria prestado atenção na existência dele. Mas... com os meus próprios olhos, eu vi do que ele é capaz..."
34050-69 = "Com a intervenção dele, todo o sentido daquilo que possuo seria alterado. Aquele indivíduo é perigoso."
34050-70 = "......"
34050-71 = "Foi então que percebi. Para realizar os meus planos, o 'Sensei' deve ser o primeiro a ser eliminado."
34050-72 = "Um verdadeiro Antagonista, de fato..."
34050-73 = "Humm..."
34050-74 = "Parece que vocês não estão satisfeitos com a minha decisão――mas, de qualquer forma, nós existimos apenas para buscar nossos próprios objetivos. Nenhum de vocês tem o direito de me impedir."
34050-75 = "......Sim, não temos esse direito. Faça o que achar melhor, Beatrice."
34050-76 = "......"
34050-77 = "......"
34050-78 = "No entanto, você nunca nos explicou concretamente no que consistem os seus planos. Madame, o que você está fazendo exatamente no distrito autônomo de Arius?"
34050-79 = "Estou preparando um altar."
34050-80 = "Um altar...?"
34050-81 = "Essencialmente, não é diferente do que você tentou fazer em Abydos. Mas eu não pretendo firmar nenhum contrato."
34050-82 = "Oh, um ritual em vez de um contrato... pode-se dizer que, na essência, os dois são a mesma coisa, mas..."
34050-83 = "E você acredita que, ao executar isso, a existência do Sensei certamente se tornará um obstáculo?"
34050-84 = "Sim, acredito... Mas eu já tomei as devidas providências."
34050-85 = "O 'Esquadrão' cuidará de eliminar o Sensei."
34050-87 = "(......!!!)"
34050-88 = "......"
34050-89 = "......Entendo, o Esquadrão."
34050-90 = "Elas eram peças de consumo que eu já estava prestes a descartar, mas avisei que lhes daria a chance de perdão caso matassem o Sensei. Para elas, é uma oferta que não podem recusar."
34050-91 = "N-Não posso permitir...! O Sensei... corre perigo...!"
34050-92 = "(......Ugh!?)"
34050-93 = "......Ao que parece, um rato se infiltrou por aqui."
34050-94 = "(......!!)"
34050-95 = "Aqui? Não há ninguém além de nós neste..."
34050-96 = "Acho que falei demais. Com isso, estou me retirando."
34050-100 = "......"
34050-101 = "......"
34050-110 = "......Haa, haa."
34050-111 = "......Haa, haa, haa... haa..."
34050-112 = "(A cena de agora há pouco... O que diabos...)"
34050-113 = "U-Ugh...!"
34050-114 = "*Cof, cof, cof...!*"
34050-115 = "(O distrito autônomo de Arius já estava sob o controle da Gematria...!?)"
34050-116 = "*Cof, cof...*"
34050-118 = "(......Meu corpo não obedece. Minha consciência está sumindo... Mas...)"
34050-119 = "(A 'educação' que as alunas de Arius receberam, o fato de não conseguirmos encontrar a localização do distrito autônomo até agora... aquela tecnologia desconhecida... a bomba que destrói halos... tudo...)"
34050-120 = "(Se tudo isso tiver relação com a Gematria... Então tudo faz sentido...)"
34050-121 = "(E se o 'Esquadrão' está atrás do Sensei...)"
34050-122 = "(O Sensei corre perigo... Preciso avisar alguém rapidamente...)"
34050-124 = "(Elas já atacaram o Sensei uma vez... Possivelmente, a existência mais perigosa de Kivotos...)"
34050-125 = "(......A bomba que destrói halos.)"
34050-126 = "(O fato da minha vida ter se tornado um alvo... do Tratado do Éden ter sido arruinado... de todos terem se machucado... e do Sensei estar em perigo... tudo isso...)"
34050-128 = "(Se há um ponto de partida para tudo isso... esse ponto de partida é...)"
34050-135 = "Err... Hum, olá. Seia-chan..."
34050-137 = "......Mika."
34050-142 = "Próximo Episódio; As Asas Quebradas"