[translation]
34050-1 = "Episódio 5;Os Investigadores Incompreensíveis"
34050-3 = "……."
34050-4 = "……."
34050-5 = "Você se lembra de que, a pedido seu, eu lhe emprestei o meu poder, não?"
34050-6 = "O caso de replicar os que guardam os preceitos e pô-los a serviço do seu plano."
34050-7 = "Sim, e sou muito grata, Maestro. Graças ao senhor, eu pude obter um poder ainda maior no meu domínio."
34050-8 = "Eu não me lembro de ter autorizado você a usá-lo daquela forma. Aliás, usar a minha obra daquele jeito, eu não deveria ter permitido."
34050-9 = "Aquele fenômeno não deveria ser propriedade sua, Maestro."
34050-10 = "……Que insolência. Eu não estou reivindicando posse; isso é――"
34050-11 = "Insolência? Ora, ora…… usar esse tom comigo."
34050-12 = "Calma, calma…… acalmem-se, os dois. Não compliquem as coisas."
34050-13 = "É isso aí!"
34050-14 = "……Perdão. O Maestro, com certeza, considera que dar interpretações originais a fenômenos universais é o seu próprio método de expressão."
34050-15 = "……."
34050-16 = "Mas isso talvez seja um ponto que, da posição da Madame, não precise de consideração especial. Afinal, cada um de nós interpreta este mundo de um jeito."
34050-17 = "――Ou seja: o senhor não gostou de eu ter tomado, por conta própria, a sua arma. É isso, não é?"
34050-18 = "……O que você faz não é arte. Ali não há estética nem nada; é só o ato de gerar armas."
34050-19 = "Sim, exatamente. Algum problema?"
34050-23 = "E não é só o senhor. A capacidade técnica que o homem de preto forneceu e os textos que Golconda interpretou, eu também os uso assim."
34050-25 = "……."
34050-26 = "……."
34050-27 = "Eu não tenho interesse na arte de vocês. Acho que venho afirmando isso desde quando me tornei membro da \"Gematria\"."
34050-28 = "Kukuku…… exatamente. E eu penso que assim está bem."
34050-29 = "Não há necessidade de briga entre companheiros."
34050-30 = "Ela assegurou, em Kivotos, um domínio só dela. É a existência mais necessária ao nosso plano."
34050-31 = "O distrito autônomo de Arius, né. Pôr todos os alunos e a academia de lá sob o próprio domínio; isso, de fato, é um feito."
34050-32 = "(……!!)"
34050-34 = "A Abydos do homem de preto foi uma pena, mas…… opa, perdão. Não era minha intenção ironizar."
34050-35 = "Kuku…… não se preocupe. De fato foi por pouco――mas a existência daquele Sensei não estava nos meus cálculos."
34050-36 = "……A \"Schale\". Aquele tal. O nosso adversário."
34050-37 = "É isso aí!"
34050-39 = "(……!!)"
34050-40 = "Não. Com aquele, não se deve antagonizar. Pelo contrário, melhor seria atraí-lo para o nosso lado."
34050-41 = "Eu também gosto muito dele. Aquele ali pode vir a ser o nosso compreendedor."
34050-42 = "Eu ainda reservo o julgamento, mas…… se ele se tornasse um de nós, como Beatrice……."
34050-44 = "Que pensamento tolo e preguiçoso. O Sensei da \"Schale\" precisa, sem falta, ser eliminado."
34050-45 = "……."
34050-46 = "……."
34050-47 = "……."
34050-49 = "Parece que é preciso explicar. Sim, aproveitando, vamos por partes."
34050-50 = "Desde que a Mika Misono visitou o distrito autônomo de Arius, ela me ajudou em muitas coisas."
34050-51 = "(……A Mika?)"
34050-52 = "Sim…… por assim dizer, a Mika Misono me concede inspiração…… uma musa, digamos."
34050-53 = "A ideia de usar o \"Tratado do Éden\" pra assegurar a dignidade dos tempos antigos, e o julgamento de que a arcanjo dos sonhos premonitórios devia ser a primeira a ser eliminada; foi graças a ela que pude realizá-los."
34050-54 = "Uma existência incômoda como uma profetisa, melhor eliminar logo. Agradeço a Decalcomanie…… não, a Golconda, que forneceu uma tecnologia rara."
34050-55 = "É isso aí!"
34050-56 = "Eu apenas forneci o texto; quem lhe deu forma foi a Madame."
34050-57 = "Aliás, essa tecnologia não estava, pelo contrário, atrapalhando a senhora?"
34050-58 = "Sim…… mas, graças ao sistema de defesa que plantei de antemão no corpo do sacrifício, me salvei. Agradeço, homem de preto."
34050-59 = "……Kukuku. Que bom que a tecnologia dos sacerdotes anônimos foi útil."
34050-60 = "E a última inspiração que a Mika Misono me deu foi…… justamente sobre o Sensei da \"Schale\"."
34050-61 = "Foi porque ela o convidou a Trinity que eu pude reconhecer essa existência e refletir sobre ela."
34050-63 = "Eu escolhi o distrito autônomo de Arius como alvo puramente por ser um lugar oculto; não havia sentido além desse."
34050-64 = "\"Trinity\", \"Gehenna\"…… a raiva e o ódio voltados a elas…… pra mim, não fazem a menor diferença."
34050-66 = "O \"ódio\" não passa de um meio de controlar as crianças; o \"Tratado do Éden\", de um método de obter o poder dos guardiões; e o \"Squad\", de uma ferramenta descartável."
34050-67 = "Se a Mika Misono não tivesse trazido o Sensei a Trinity, eu também nem teria dado atenção àquele ali. Mas…… eu vi aquela atuação com estes olhos……."
34050-69 = "Quando aquilo intervém, todo o sentido do que eu possuo muda. Aquele ali é perigoso."
34050-70 = "……."
34050-71 = "E foi aí que eu percebi. Que, pra cumprir o meu plano, é preciso, antes de tudo, apagar o \"Sensei\"."
34050-72 = "Um verdadeiro antagonista, né……."
34050-73 = "Hum……."
34050-74 = "Parece que a minha decisão não lhes agrada――mas, de todo modo, nós somos existências que apenas perseguem os próprios objetivos. Vocês não têm o direito de me atrapalhar."
34050-75 = "……Sim, tal direito não temos. Faça como quiser, Beatrice."
34050-76 = "……."
34050-77 = "……."
34050-78 = "Mas o que é, afinal, esse seu plano, você nunca nos contou em concreto. Madame, o que você está fazendo no distrito autônomo de Arius?"
34050-79 = "Estou preparando um altar."
34050-80 = "Um altar……?"
34050-81 = "Em essência, não é diferente do que você tentou fazer em Abydos. Só que eu não pretendo firmar contrato."
34050-82 = "Oh, um ritual em vez de um contrato…… embora se possa considerar que, na origem, os dois não sejam diferentes……."
34050-83 = "E, pra executá-lo, a existência do Sensei necessariamente atrapalha?"
34050-84 = "Sim, exatamente…… as providências já foram tomadas."
34050-85 = "O \"Squad\" há de processar o Sensei."
34050-87 = "(……!!!)"
34050-88 = "……."
34050-89 = "……Sei, o Squad."
34050-90 = "Eram artigos descartáveis prestes a ser abandonados, mas eu disse que, se matassem o Sensei, dava a elas a chance do perdão. Pra elas, é uma proposta impossível de recusar."
34050-91 = "N-não pode……! O Sensei…… em perigo……!"
34050-92 = "(……Uh!?)"
34050-93 = "……Pelo visto, um rato se infiltrou."
34050-94 = "……!!"
34050-95 = "Aqui? Aqui, além de nós, ninguém……."
34050-96 = "Parece que falei demais. Eu vou me retirar."
34050-100 = "……."
34050-101 = "……."
34050-110 = "……Haa, haa."
34050-111 = "……Haa, haa, haa…… haa……."
34050-112 = "(A cena de agora…… o que era, afinal……)"
34050-113 = "U-uuh……!"
34050-114 = "Cof, cof, cof……!"
34050-115 = "(O distrito autônomo de Arius já estava dominado pela Gematria……!?)"
34050-116 = "Cof, cof……."
34050-118 = "(……O corpo não obedece. A consciência…… mas……)"
34050-119 = "(A \"educação\" das alunas de Arius, o fato de a localização do distrito autônomo nunca ter sido encontrada…… aquela tecnologia de origem desconhecida…… a bomba que destrói aureolas…… tudo……)"
34050-120 = "(Se tiver relação com a Gematria…… tudo se encaixa……)"
34050-121 = "(Se o \"Squad\" está atrás do Sensei……)"
34050-122 = "(O Sensei corre perigo…… preciso avisar alguém, rápido……)"
34050-124 = "(Elas já atacaram o Sensei uma vez…… provavelmente, o mais perigoso desta Kivotos……)"
34050-125 = "(……A bomba que destrói aureolas.)"
34050-126 = "(A minha vida ter sido visada…… o Tratado do Éden ter naufragado…… todos terem se ferido…… e o Sensei ter sido posto em perigo…… tudo……)"
34050-128 = "(Se tudo isso…… tem um ponto de partida…… ele é……)"
34050-135 = "É que…… é, olá, Seia……."
34050-137 = "……Mika."
34050-142 = "Próximo Episódio;As Asas que se Quebraram"
