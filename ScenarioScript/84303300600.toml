[translation]
84303300600-7 = "何これ？なんかイライラが収まらない……！！"
84303300600-8 = "全部壊してやる！！"
84303300600-14 = "おおおお！全員まとめてかかってこい！"
84303300600-18 = "ひっ……！？"
84303300600-19 = "なっ何で……！？最終テストの時まではみんな普通にクリアしてたじゃん……！！"
84303300600-22 = "これは……？"
84303300600-23 = "（単に怒りが収まらないというわけではなさそうだ）"
84303300600-24 = "（ゲームから何らかの影響を受け、理性を失っている）"
84303300600-25 = "（原理は分からないが……リオの言っていた「不審」とはこれか）"
84303300600-30 = "うおおおおー！！全部！全部壊してやるっ！！！"
84303300600-31 = "危ないっ……！！"
84303300600-32 = "何をするにも、まずは事態の収拾からだな。"
