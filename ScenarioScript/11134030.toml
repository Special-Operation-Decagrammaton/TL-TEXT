[translation]
11134030-1 = "Senso; Estratégias para estudar lâminas tsukeiyaki (1)"

11134030-2 = "Como disse Airi, parece ser eficaz."

11134030-3 = "O efeito é..."

11134030-4 = "O que você estudou no livro didático?"

11134030-5 = "...Certamente, eu também sinto isso."

11134030-6 = "A literatura e as artes marciais não tratam do resultado, mas sim dos meios, ou seja, das duas rodas."

11134030-7 = "Enfim, por que você está falando sobre isso de repente?"

11134030-9 = "Bem, o que devo dizer..."

11134030-10 = "Achei que seria melhor dominá-lo corretamente."

11134030-11 = "Entendo, assim que você terminar de ler o livro."

11134030-12 = "Bem, não é ruim, certo?"

11134030-13 = "Isto é, se você não ficar entediado no meio do caminho."

11134030-14 = "O quê, você tem medo que isso aconteça com você?"

11134030-15 = "É sobre você!"

11134030-16 = "Bem, acho que vai dar certo de alguma forma. Eu posso sentir isso."

11134030-17 = "Uau, isso me faz sentir que estou fazendo algum progresso."

11134030-18 = "Bem, bem…."

11134030-19 = "Nesse caso, trarei apenas a partitura e o livro didático."

11134030-20 = "Pois bem, vamos nos animar e começar. Dê um nome..."

11134030-21 = "..."Estratégia de picles de uma noite"! !"

