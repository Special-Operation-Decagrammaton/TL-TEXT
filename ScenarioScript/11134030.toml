[translation]
11134030-1 = "センス;付け焼刃の勉強作戦（１）"
11134030-2 = "アイリが言ってた通り、効果あるっぽいわね。"
11134030-3 = "効果って……。"
11134030-4 = "教本で勉強したこと？"
11134030-5 = "……たしかに、私も実感してる。"
11134030-6 = "文武両道とは結果ではなく手段、即ち両輪であると。"
11134030-7 = "それはそれとして、どうして急にその話を？"
11134030-9 = "いや、何ていうか……。"
11134030-10 = "せっかくだし、ちゃんとマスターした方が良いのかなって。"
11134030-11 = "なるほど、教本を一周終えてしまうと。"
11134030-12 = "まぁ、悪くないんじゃない？"
11134030-13 = "途中で飽きないなら、の話だけど。"
11134030-14 = "何、自分がそうなるのが怖いの？"
11134030-15 = "あんたの話だっての！"
11134030-16 = "ま、何とかなるでしょ。実感はできてるし。"
11134030-17 = "うわ、何か先に進んでます感が出ててムカつく。"
11134030-18 = "ま、まぁまぁ……。"
11134030-19 = "それならとりあえず、譜面と教本持ってくるね。"
11134030-20 = "さーて、なら気合入れて始めよっか。名付けて……"
11134030-21 = "……「一夜漬け作戦」！！"
