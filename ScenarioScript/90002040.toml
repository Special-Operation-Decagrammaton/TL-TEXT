[translation]
90002040-1 = "Episódio 4; Yesod"
90002040-3 = "Esse tipo de oponente é fácil de lidar."
90002040-4 = "……Aquele braço é grande demais, não é?"
90002040-16 = "Isso faz uma vez……."
90002040-17 = "Ugh!?"
90002040-22 = "Minha perna……!"
90002040-23 = "Está presa nos escombros……!"
90002040-27 = "Huff, ngh, haaah……!"
90002040-28 = "Não parece que vou conseguir tirar……."
90002040-37 = "……!!!"
90002040-38 = "(Yesod levantou o braço novamente)"
90002040-39 = "(Cercando e cortando minha rota de fuga... pretende esmagar tudo, inclusive os aliados?)"
90002040-40 = "(É eficiente, suponho. Afinal, é só criar outros depois.)"
90002040-41 = "(Mas eu……)"
90002040-42 = "Mesmo que eu tenha que me preparar para alguns ferimentos――!"
90002040-54 = "……Eh?"
90002040-59 = "Você está bem!?"
90002040-60 = "Irmã! Vamos mover no três……!"
90002040-61 = "Um, dois――"
90002040-66 = "――três!!!"
90002040-72 = "……Momoi? Midori?"
90002040-74 = "Hehe! Viemos te salvar! O Sensei pediu pra gente!"
90002040-75 = "Você está bem?"
90002040-77 = "Sim. Obrigada, vocês duas."
90002040-78 = "E também……."
90002040-83 = "Hm?"
90002040-84 = "Sim?"
90002040-86 = "Agora, sem olhar para trás, corram para a direita com toda a velocidade."
90002040-88 = "Por que―― eh!?"
90002040-96 = "Kyaaaa!?"
90002040-104 = "P-por um triz……."
90002040-105 = "Muito obrigada, Eimi."
90002040-107 = "De nada. Eu que agradeço."
90002040-108 = "Então, Sensei."
90002040-109 = "Faça valer a pena."
90002040-114 = "Essa é a velocidade máxima!?"
90002040-115 = "Sim. Se eu aumentar mais a rotação, o motor vai explodir."
90002040-116 = "O aumentador não serve?"
90002040-117 = "Vai durar apenas alguns segundos, mas…… tem certeza?"
90002040-118 = "Eu autorizo!"
90002040-119 = "Entendido. Abrindo o portão!"
90002040-126 = "Então, pessoal, nos vemos em cima de Yesod."
90002040-127 = "Alice, iniciando a saída!"
90002040-133 = "Equipe de ataque a Yesod, descida iniciada."
90002040-134 = "Devolvendo o comando ao Sensei. Conto com você."
90002040-135 = "[s] \"Vamos acabar com isso enquanto a Eimi e as outras estão seguras!\""
