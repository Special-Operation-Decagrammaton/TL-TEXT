[translation]
2004103-1 = "Recebimento por procuração"
2004103-7 = "――Pronto, é o último. Foi uma quantidade impressionante, não foi?"
2004103-8 = "(A quantidade de bagagem enviada pela Rio era maior do que eu imaginava...)"
2004103-9 = "Haha, você vai abrir uma oficina ou algo assim?"
2004103-10 = "Ah, é verdade. #nPor favor, assine aqui!"
2004103-12 = "(E, como a Rio me pediu, decidi esperar até a noite...)"
2004103-23 = "Boa noite, Sensei."
2004103-24 = "Vou pedir desculpas de antemão."
2004103-25 = "[s] \"O que houve de repente?\""
2004103-26 = "Pensei em várias coisas enquanto vinha para cá..."
2004103-27 = "No fim, senti que era necessário... pedir desculpas."
2004103-28 = "[s] \"Não sei o que aconteceu, mas parabéns!\""
2004103-29 = "...V-você está exagerando."
2004103-30 = "Na verdade, para evitar ser rastreada..."
2004103-31 = "Eu hackeei as câmeras de segurança e os semáforos pelo caminho para apagar meus rastros."
2004103-32 = "Com isso, meus passos não deveriam ser seguidos, mas..."
2004103-33 = "[s] \"...Fico feliz em ver a Rio crescendo aos poucos.\""
2004103-34 = "...O que é esse olhar condescendente?"
2004103-35 = "De qualquer forma, deixe-me agradecer. Desde a melhoria do Avant-Garde-kun com função de culinária, até a atualização do computador do meu esconderijo..."
2004103-36 = "Eu precisava de ferramentas para analisar reagentes."
2004103-37 = "Desta vez, providenciei às pressas uma câmara de vapor de alto desempenho e um supressor de CI."
2004103-38 = "A solução iônica que é o objeto de análise da pesquisa que comecei recentemente――"
2004103-40 = "(Depois disso, uma explicação complicada continuou por um tempo)"
2004103-41 = "(...Pode ser apenas uma impressão minha, mas a Rio parecia um pouco feliz enquanto falava)"
2004103-43 = "...Então, eu queria fazer uma troca de peças em larga escala, mas #nnão poderia enviar para o meu esconderijo, certo?"
2004103-44 = "Existe o risco de ser identificada."
2004103-45 = "[s] \"Então, por isso o Schale como endereço de entrega...\""
2004103-46 = "...Sim. #nDesculpe pelo incômodo."
2004103-47 = "[s] \"Então você tinha um esconderijo.\""
2004103-48 = "Claro, não é apenas um."
2004103-49 = "No momento, estou no que tem a melhor localização entre os que possuo, mas..."
2004103-50 = "Estou sempre preparada para me mudar caso algo aconteça."
2004103-51 = "――Com as AMAS."
2004103-52 = "[s] \"Isso parece trabalhoso...\""
2004103-53 = "Certamente dá trabalho."
2004103-54 = "Mas é racional."
2004103-55 = "...Não parece eficiente, você diz?"
2004103-56 = "Sim, exatamente."
2004103-57 = "A Eimi me disse isso uma vez."
2004103-58 = "Que eu sou do tipo que descarta a eficiência em prol da racionalidade."
2004103-59 = "E, inversamente, a Eimi é do tipo que descarta a racionalidade em prol da eficiência."
2004103-60 = "Até agora, eu não achava que esses fossem conceitos contraditórios. #nMaximizar a racionalidade levaria a maximizar a eficiência―― era o que eu pensava."
2004103-64 = "...Mas eu estava errada."
2004103-65 = "Nem sempre é possível escolher ações racionais. #nA maioria dos incidentes ocorre entre pessoas."
2004103-66 = "Antigamente, eu pensava que, se não podia confiar nas pessoas, deveria controlá-las..."
2004103-67 = "...Mas percebi que isso estava errado."
2004103-68 = "As pessoas são seres insubstituíveis."
2004103-69 = "[s] \"Insubstituíveis...?\""
2004103-70 = "...Sim."
2004103-71 = "Ultimamente, tenho passado mais tempo pensando sobre esse conceito."
2004103-72 = "Existe uma diferença clara entre humanos e máquinas."
2004103-74 = "Se uma peça quebra, basta substituí-la. #nSe a lógica está errada, basta corrigi-la."
2004103-75 = "É assim que algo substituível volta a funcionar normalmente."
2004103-77 = "Mas os humanos são diferentes. #nEles são insubstituíveis."
2004103-78 = "Mesmo que se curem naturalmente após um ferimento, #nexiste um limite para isso."
2004103-81 = "Mesmo que 330 bilhões de células sejam renovadas todos os dias, #ne tudo seja substituído por algo novo em cerca de um mês a um ano..."
2004103-82 = "Ainda existem partes, como os neurônios do cérebro, que permanecem as mesmas por toda a vida."
2004103-83 = "...Você conhece a história do 'Navio de Teseu'?"
2004103-84 = "[s1] \"Sim, eu conheço.\"\n[s2] \"É a primeira vez que ouço falar.\""
2004103-85 = "A história de um navio que tem suas peças trocadas sempre que envelhecem ou quebram —"
2004103-86 = "No fim, será que o navio com todas as peças substituídas ainda pode ser considerado o mesmo?"
2004103-87 = "A história de um navio que tem suas peças trocadas sempre que envelhecem ou quebram —"
2004103-88 = "No fim, será que o navio com todas as peças substituídas ainda pode ser considerado o mesmo?"
2004103-89 = "Eu... acredito que, no caso das máquinas, o conceito desse navio se aplica."
2004103-90 = "Se a funcionalidade é mantida mesmo após a troca de todas as peças, então é a mesma coisa de antes."
2004103-91 = "...Mas isso não se aplica aos humanos."
2004103-92 = "Mesmo que, em um futuro distante, o cérebro e os nervos sejam completamente analisados e peças biológicas de reposição à base de carbono e proteína se tornem realidade —"
2004103-93 = "Agora, eu nem quero fazer esse tipo de experimento mental. #nPara começar, é impossível."
2004103-94 = "...Um experimento mental consiste em prever fenômenos que ocorreriam teoricamente, após simplificar ao extremo os dispositivos e condições necessários."
2004103-95 = "Eu penso que existem dois padrões de experimentos mentais."
2004103-96 = "Um padrão onde é possível prever resultados quase idênticos aos fatos através de simulações precisas."
2004103-97 = "E um padrão onde não resta alternativa a não ser encerrar a previsão no estágio da imaginação e da suposição."
2004103-98 = "...A 'substituibilidade humana' se encaixa no segundo caso."
2004103-99 = "Por isso, não há necessidade de considerar, e nem quero considerar."
2004103-100 = "Em suma..."
2004103-101 = "Para mim, você é..."
2004103-108 = "...Alguém 'insubstituível'."
2004103-109 = "[s] \"O que isso significa...?\""
2004103-114 = "...Não importa se você não entende."
2004103-115 = "Mas, algum dia..."
2004103-116 = "Eu também gostaria de ser alguém assim para você..."
2004103-120 = "...Eu só pensei nisso."
2004103-122 = "Já terminei de verificar a bagagem, então já vou indo."
2004103-123 = "[s] \"Como você vai voltar?\""
2004103-124 = "Vou hackear o sistema, assim como fiz para vir..."
2004103-125 = "Para que não consigam me rastrear —"
2004103-126 = "[s3] \"Negado.\"\n[s4] \"Eu vou te levar.\""
2004103-129 = "Ah, mas..."
2004103-130 = "[s] \"De vez em quando, você deve ouvir o que o Sensei diz, Presidente.\""
2004103-131 = "...T-tudo bem, entendi."
2004103-133 = "(Depois disso, chamei um táxi e levei Rio embora.)"
2004103-134 = "(Rio esperou o táxi se afastar completamente antes de pedir aos AMAS que transportassem as coisas.)"
2004103-140 = "Já vou indo. #nObrigada por hoje... Sensei."
2004103-141 = "[s] \"Volte em segurança!\""
