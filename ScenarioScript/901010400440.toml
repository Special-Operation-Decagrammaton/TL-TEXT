[translation]#[Texto Final. - Filipe 05/07.]
901010400440-6 = "Perguntei pro pessoal do porto sobre o 'Caranguejo do Tambor'."
901010400440-7 = "A maioria disse que nunca viu um 'tambor com caranguejos' e que não fazia sentido."
901010400440-8 = "Caranguejo vivo morre em lugar sem ventilação, então normalmente transportam em caixas de madeira com serragem."
901010400440-9 = "E tambor é mais caro que caixa de madeira, então não usam pra bicho vivo."
901010400440-10 = "Ou seja, a menos que quisesse desperdiçar dinheiro, não faz sentido colocar caranguejo num tambor."
901010400440-12 = "Mas o boato diz que o tambor tá cheio de caranguejo, né?"
901010400440-13 = "……Tipo bicho espremido num pote."
901010400440-17 = "Não usa exemplo nojento não! Deu até arrepio!"
901010400440-22 = "Talvez…… esse seja exatamente o objetivo."
901010400440-23 = "Toda ênfase numa imagem específica tem uma intenção por trás."
901010400440-24 = "O motivo do caranguejo da lenda estar num tambor provavelmente é――"
901010400440-32 = "O motivo do caranguejo da lenda estar num tambor provavelmente é――\n[as1] Porque é um método de armazenamento realista.\n[as2] Para fazer propaganda de tambores.\n[as3] Para causar medo."
901010400440-36 = "……Ué? Você não disse que caranguejo morre em tambor e que não usam pra transporte?"
901010400440-37 = "Se quisesse ensinar sobre armazenamento de caranguejo, não seria caixa de madeira?"
901010400440-38 = "Tá prestando atenção? Pensa de novo, Sensei."
901010400440-49 = "Mas nesse boato o tambor não aparece de forma muito positiva, né."
901010400440-50 = "E pra que fazer propaganda de tambor pra um monte de gente?"
901010400440-51 = "……Acho que não é bem isso."
901010400440-62 = "……Medo, é."
901010400440-63 = "De fato, a imagem de algo se mexendo dentro de um tambor provoca um medo psicológico facilmente."
901010400440-64 = "A gente tem uma tendência instintiva a evitar imagens de aglomeração de seres num espaço fechado."
901010400440-65 = "Muitos animais venenosos têm padrões parecidos……"
901010400440-66 = "Ah, tipo aquela sensação? Tipo quando tem uma―― escondida no canto da cozinha"
901010400440-67 = "Para aí, não fala mais."
901010400440-68 = "Então a ideia é que alguém está provocando nojo ou medo de propósito?"
901010400440-69 = "Mas não ganha dinheiro com isso…… por que fazer?"
901010400440-70 = "Não subestima o mundo, FOX3."
901010400440-71 = "Dá uma olhada na internet. Acha que quem posta imagem de gore de graça tem motivo?"
901010400440-72 = "Como a FOX4 disse, se fosse só brincadeira até ia…… mas nesse caso tem desaparecidos, né?"
901010400440-73 = "Tem o novato do porto também."
901010400440-74 = "Será que…… igual o 'Kunekune' de antes, é um fenômeno anômalo gerado por um Lore?"
901010400440-75 = "Um Lore feito com base num caranguejo que ataca gente, hein.#nSó de imaginar já dá um calafrio."
901010400440-77 = "É perigoso concluir com base em suposições.#nO caso dos desaparecimentos e a lenda urbana podem ser coisas separadas."