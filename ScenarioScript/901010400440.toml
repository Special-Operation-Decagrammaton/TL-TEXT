[translation]
901010400440-6 = "I asked the people at the port about the 'Drum Can Crab'."
901010400440-7 = "Most of them had never even seen a 'crab in a drum can,' and reacted as if they couldn't even comprehend the idea."
901010400440-8 = "They said that since live crabs die in poorly ventilated areas, they're usually transported in wooden crates filled with sawdust."
901010400440-9 = "Besides, drum cans are more expensive than wooden crates, so they aren't typically used for living creatures."
901010400440-10 = "So, unless you're looking to waste money, there's no reason to go out of your way to put crabs in a drum can."
901010400440-12 = "But the crabs in the rumors are supposedly packed full in a drum can, right?"
901010400440-13 = "……Like bugs stuffed into an insect cage."
901010400440-17 = "Don't use such a gross analogy! You gave me goosebumps!"
901010400440-22 = "Perhaps... that might be the goal."
901010400440-23 = "There must be an intention behind emphasizing a specific image."
901010400440-24 = "The reason the crab in the ghost story is inside a drum can is likely—"
901010400440-32 = "The reason the crab in the ghost story is inside a drum can is likely—\n[as1] Because it's a realistic storage method.\n[as2] To advertise drum cans.\n[as3] To evoke fear."
901010400440-36 = "……Huh? Didn't you just say that crabs die if you put them in drum cans, so they aren't used for transport?"
901010400440-37 = "If you wanted to convey a storage method for crabs, wouldn't it be a wooden crate?"
901010400440-38 = "Were you listening? Think about it again, Sensei."
901010400440-49 = "It doesn't seem like drum cans are being used in a very positive light in this rumor, though."
901010400440-50 = "And besides, what would be the point of advertising drum cans to the general public?"
901010400440-51 = "……I think that's a bit off."
901010400440-62 = "……Fear, you say."
901010400440-63 = "Indeed, the sight of something wriggling inside a drum can is likely to trigger psychological fear."
901010400440-64 = "We have an instinctive aversion to images of specific clusters packed together."
901010400440-65 = "Many venomous creatures share similar patterns, after all..."
901010400440-66 = "Oh, like that? Hiding in the corner of the kitchen—"
901010400440-67 = "Don't say another word."
901010400440-68 = "So, you're saying someone is intentionally inciting disgust and fear?"
901010400440-69 = "It doesn't even make any money, so why would they do that..."
901010400440-70 = "Don't underestimate the world, FOX3."
901010400440-71 = "Just look at the internet. Do you think there's a reason behind the people who mess around with gore images?"
901010400440-72 = "As FOX4 said, it would be fine if it were just a prank... but there are missing persons involved this time, aren't there?"
901010400440-73 = "The new guy at the fishing port, for instance."
901010400440-74 = "Could it be... like the 'Kunekune' from before, that an apparition born from lore is running wild?"
901010400440-75 = "An apparition modeled after a crab that attacks people, huh. #nJust imagining it is unpleasant."
901010400440-77 = "It is dangerous to jump to conclusions based on speculation. #nThere is a possibility that the disappearances and the urban legend are separate matters."