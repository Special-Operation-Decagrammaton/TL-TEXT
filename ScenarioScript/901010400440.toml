[translation]
901010400440-6 = "Perguntei ao pessoal do porto sobre o 'Caranguejo do Tambor'."
901010400440-7 = "A maioria nunca viu 'caranguejo em tambor' e achou sem sentido."
901010400440-8 = "Caranguejo vivo morre em lugar sem ventilação, então normalmente se transporta em caixas de madeira com serragem."
901010400440-9 = "Tambor é mais caro que caixa de madeira, então não se usa para seres vivos."
901010400440-10 = "Ou seja, a menos que quisessem jogar dinheiro fora, não há motivo para colocar caranguejo em tambor."
901010400440-12 = "Mas no boato, o tambor está cheio de caranguejo."
901010400440-13 = "... Igual gafanhoto em pote."
901010400440-17 = "Que comparação horrível! Me deu arrepios!"
901010400440-22 = "Talvez... esse seja o objetivo."
901010400440-23 = "Destacar uma imagem específica tem sempre uma intenção."
901010400440-24 = "O motivo do caranguejo aparecer dentro do tambor na lenda é provavelmente –"
901010400440-32 = "O motivo do caranguejo aparecer dentro do tambor na lenda é provavelmente –\n[as1] Porque é um método real de armazenamento.\n[as2] Para divulgar tambores.\n[as3] Para causar medo."
901010400440-36 = "... Hmm? Você não disse agora há pouco que caranguejo morre em tambor e que não se usa para transporte?"
901010400440-37 = "Se quisessem divulgar um método de armazenamento, não seria caixa de madeira?"
901010400440-38 = "Você estava prestando atenção, professor? Pense de novo."
901010400440-49 = "O boato não usa o tambor de forma positiva."
901010400440-50 = "Aliás, divulgar tambor para um monte de gente? Para quê?"
901010400440-51 = "... Acho que não é isso."
901010400440-62 = "... Medo."
901010400440-63 = "Verdade, a imagem de algo se mexendo dentro de um tambor facilmente causa medo psicológico."
901010400440-64 = "Instintivamente, evitamos aglomerações."
901010400440-65 = "Muitos animais venenosos têm padrões parecidos..."
901010400440-66 = "Ah, tipo as baratas na cozinha?"
901010400440-67 = "Não fale mais."
901010400440-68 = "Então alguém está causando repulsa e medo de propósito?"
901010400440-69 = "Não dá dinheiro, por que fazer isso?"
901010400440-70 = "Não subestime o mundo, FOX3."
901010400440-71 = "Olha a internet. Os caras que postam imagens grotescas por brincadeira, você acha que têm motivo?"
901010400440-72 = "Se fosse só brincadeira, tudo bem, mas nesse caso há desaparecidos."
901010400440-73 = "O novato do porto também."
901010400440-74 = "Será que, igual ao 'torcer, torcer, torcer' de antes, é um fenômeno nascido da lenda?"
901010400440-75 = "Um monstro inspirado em caranguejo que ataca pessoas... só de imaginar, já me dá agonia."
901010400440-77 = "É perigoso tirar conclusões precipitadas. O desaparecimento e a lenda urbana podem ser coisas separadas."