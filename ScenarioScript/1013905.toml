[translation]
1013905-1 = "Niko's Consultation"
1013905-2 = "(That day, it felt like nothing was going right from the very start...)"
1013905-4 = "Schale - Duty Room"
1013905-6 = "[ns] \"Ugh... ugh...\""
1013905-7 = "Hell yeah, keep running, keep running!"
1013905-8 = "Vroom vroom, floor it!"
1013905-9 = "Hehe... that meal was delicious today, too."
1013905-10 = "[ns] \"Why is it so noisy out there...?\""
1013905-11 = "To think you guys could tear through that public road without even touching the brakes... not bad."
1013905-12 = "Your 'Vroom-Vroom Speed Union' wasn't half bad either. Tonight's race is looking like it'll be quite the spectacle."
1013905-13 = "Captain, let's keep racing until morning!\r\n"
1013905-14 = "I told you to call me President!"
1013905-15 = "[ns] \"I can't sleep like this...\""
1013905-18 = "(Because of the biker gang racing around Schale all night, I couldn't get a wink of sleep...)"
1013905-21 = "[ns] \"Oh, excuse me. You dropped your handkerchief.\""
1013905-23 = "[ns1] \"...Did they not hear me?\"\n[ns2] I chase after them to return the handkerchief."
1013905-30 = "Officer, it's this person!"
1013905-31 = "I thought someone had been following me lately—"
1013905-32 = "This person is a stalker!"
1013905-34 = "[ns] \"No, that's not it! I was just trying to return something you dropped—!\""
1013905-35 = "...Something I dropped? Have you ever considered how the 'person receiving the item' feels?"
1013905-39 = "Actually, you look familiar... like someone from a wanted poster or something..."
1013905-40 = "Just come down to the station. You can give me all the excuses you want there."
1013905-41 = "[s] \"W-wait a second! It's a misunderstanding!\""
1013905-43 = "(I ended up being held up for a while...)\r\n"
1013905-45 = "...That girl believed the rumors and decided that I was the one badmouthing her."
1013905-46 = "I thought we were friends... I can't believe she swallowed those rumors whole."
1013905-47 = "Our relationship is over. It's all over!"
1013905-48 = "[s] \"Calm down, let's try to organize the situation.\""
1013905-52 = "[ns3] \"I'm sure she had her own reasons, didn't she?\"\n[ns4] \"Why don't you try talking it out calmly—\""
1013905-55 = "Are you on her side too, Sensei!?"
1013905-56 = "I've explained it to you so many times, haven't I? There's absolutely no room for a misunderstanding!"
1013905-57 = "[s] \"No, that's not what I meant...\""
1013905-58 = "...I knew it. You think I'm just playing the victim, don't you, Sensei?"
1013905-59 = "I noticed you wouldn't even look me in the eye while I was talking to you today."
1013905-60 = "...Excuse me."
1013905-64 = "[ns] \"W-wait...!\""
1013905-67 = "(...Maybe it was the exhaustion, but I ended up saying the wrong things during a student's consultation.)"
1013905-68 = "(Trouble followed me all day long, and my fatigue just kept piling up...)"
1013905-69 = "(Since most of it was due to my own mistakes or reasons beyond my control, I spent the day unable to vent to anyone.)"
1013905-75 = "(...That evening)"
1013905-79 = "Good evening, Sensei. I'm here to help."
1013905-80 = "I got my hands on some good tea leaves during my last operation, so I brought them over to share—"
1013905-81 = "Oh, Sensei. Are you feeling unwell?"
1013905-82 = "It's written all over your face that you're exhausted."
1013905-83 = "[s5] \"It's nothing major.\"\r\n[s6] \"I'm fine, so shall we start the afternoon's work?\""
1013905-86 = "That's not very convincing coming from someone with that look on their face."
1013905-87 = "...Something happened today, didn't it?"
1013905-88 = "[ns] \"I'm fine. Really...\""
1013905-90 = "[ns] \"It's nothing that concerns you, Niko.\""
1013905-92 = "[ns] \"Sorry, I didn't mean it like that—\""
1013905-95 = "No. If it's nothing that concerns me, then tell me even more."
1013905-96 = "Right now, you're more important than work. Follow me!"
1013905-100 = "(Led by Niko's hand, I was brought to the duty room, half-forced.)"
1013905-103 = "Alright, Sensei. Please lie down."
1013905-104 = "[s7] \"Niko, I appreciate your concern, but...\"\r\n[s8] \"It's not that time of day yet, and I don't think I can sleep.\""
1013905-107 = "I'm not asking you to take a nap."
1013905-108 = "Just lie down and close your eyes. #nTell me slowly about what happened today."
1013905-109 = "It doesn't matter how trivial it is. #nEverything that's weighing on your mind."
1013905-110 = "If you don't want to say it, you can be vague about it..."
1013905-111 = "Just relax... and let go of everything you're thinking about."
1013905-112 = "[s] \"But, as a student, you shouldn't have to...\""
1013905-113 = "I'm staying right here until you tell me."
1013905-114 = "...Want to experience an SRT restraint technique?"
1013905-115 = "[s9] \"O-okay...!\"\r\n[s10] \"In that case, just for a little bit...\""
1013905-119 = "(After that, just as Niko suggested, I slowly recalled the events of the day.)"
1013905-120 = "(Niko didn't interrupt me, just listened quietly and occasionally chimed in.)"
1013905-123 = "...So that's what happened."
1013905-124 = "Those kinds of days happen."
1013905-125 = "Days where each event is small, but for some reason, they all pile up."
1013905-126 = "Perhaps because they're so trivial, you end up bottling them up instead of talking to someone."
1013905-127 = "[s11] \"I suppose so... none of it was really a big deal.\"\r\n[s12] \"Sorry for making you worry.\""
1013905-130 = "Please don't say that."
1013905-131 = "Like I said before, the most trivial things are the ones that tend to fester in your heart."
1013905-132 = "That's why talking about it like this is the best thing you can do."
1013905-133 = "How is it? Do you feel a bit of that weight off your chest?"
1013905-134 = "[s13] \"Yeah, I feel a bit clearer than before.\"\r\n[s14] \"Thank you, Niko.\""
1013905-137 = "You're welcome."
1013905-138 = "Besides, you're an adult, Sensei. It's even harder for you to be honest with others."
1013905-139 = "It's okay to rely on your students sometimes. #nPlease, lean on someone once in a while."
1013905-140 = "[s] \"I always try to be sincere with my students, though.\""
1013905-141 = "I'm not saying you're lying."
1013905-142 = "But choosing your words carefully can sometimes be a form of hiding things..."
1013905-143 = "Next time... please tell me everything without holding anything back, okay?"
1013905-144 = "[s] \"...I'll try.\""
1013905-145 = "...You really are a handful of an adult."
1013905-150 = "Well, that's exactly why students like me exist—for people who are a bit troublesome."
1013905-152 = "(After that, I chatted with Niko on the bed about nothing in particular, and returned to the office feeling a bit lighter.)"