[translation]
1013905-1 = "ニコの相談"
1013905-2 = "（その日は、朝からついていないことだらけだった……）"
1013905-4 = "シャーレ・宿直室"
1013905-6 = "[ns] \"うぅん……うう……。\""
1013905-7 = "ヒャッハー、走れ走れー！"
1013905-8 = "ブロロロロ、飛ばせー！"
1013905-9 = "ふふ……今日の飯も美味しかったな。"
1013905-10 = "[ns] \"なんでこんなにうるさいんだ……。\""
1013905-11 = "あの公道をノーブレーキで走り切るなんて……やるじゃないか、お前ら。"
1013905-12 = "そっちの「ブロロロ疾走連合」も中々だったぜ。#n今夜の勝負は、中々見応えがありそうだぜ。"
1013905-13 = "隊長、今夜は朝まで走り抜けましょうよ！\r\n"
1013905-14 = "総長って呼べって言ってんだろ！"
1013905-15 = "[ns] \"これじゃあ眠れない……。\""
1013905-18 = "（一晩中、シャーレの周辺を走り回る暴走族のせいで、まともに眠ることもできず……）"
1013905-21 = "[ns] \"あ、すみません。ハンカチ、落とされましたよ。\""
1013905-23 = "[ns1] \"……聞こえなかったんだろうか？\"\n[ns2] ハンカチを渡そうと、後を追いかける。"
1013905-30 = "おまわりさん、この人です！"
1013905-31 = "最近、誰かにつけられてると思ったら――"
1013905-32 = "この人ストーカーです！"
1013905-34 = "[ns] \"違うんです、私はただ、落とし物を――！\""
1013905-35 = "……落とし物？「物を受け取る側」の気持ちを考えたことはないのか？"
1013905-39 = "というか、お前どこかで見た顔だな……指名手配ポスターとかだったような……。"
1013905-40 = "とりあえず署まで来い。いい訳なら、そこでいくらでも聞いてやる。"
1013905-41 = "[s] \"ちょ、ちょっと待ってください！誤解です！\""
1013905-43 = "（しばらく足止めされる羽目になり……）\r\n"
1013905-45 = "……あの子は噂を信じて、私が悪口を言ったって決めつけてるんです。"
1013905-46 = "友達だと思ってたのに……噂を鵜呑みにするなんて。"
1013905-47 = "私たちの関係は、もう終わりなんです。全部、終わっちゃいました！"
1013905-48 = "[s] \"落ち着いて、状況を整理してみよう。\""
1013905-52 = "[ns3] \"きっと、あの子にも事情があったんじゃないかな？\"\n[ns4] \"一度、落ち着いて話し合ったら――\""
1013905-55 = "先生もあの子の味方なんですか！？"
1013905-56 = "何回も説明しましたよね？勘違いの余地なんて、全然ないって！"
1013905-57 = "[s] \"いや、そういう意味じゃなくて……。\""
1013905-58 = "……やっぱり先生も、私が被害者面しているって思っているんですね。"
1013905-59 = "今日は相談してる間、ずっと目を合わせてくれないとは思ってましたけど。"
1013905-60 = "……失礼します。"
1013905-64 = "[ns] \"ま、待って……！\""
1013905-67 = "（……疲れのせいか、生徒の相談でも余計なことを言ってしまって）"
1013905-68 = "（一日中トラブル続きで、疲労は溜まっていったが……）"
1013905-69 = "（そのほとんどが自分のミスか、自分ではどうしようもない理由で起きたことだったので、誰かに愚痴ることもできないまま、一日が過ぎていった）"
1013905-75 = "（……その日の夕方）"
1013905-79 = "こんばんは、先生。お手伝いに来ました。"
1013905-80 = "この前の作戦中に、いい茶葉を手に入れたので、一緒に飲もうと思って持ってき――"
1013905-81 = "あら、先生。どこか具合でも悪いんですか？"
1013905-82 = "お顔に「疲れてる」って書いてありますよ？"
1013905-83 = "[s5] \"大したことじゃないよ。\"\r\n[s6] \"私は大丈夫だから、午後の作業を始めようか。\""
1013905-86 = "そんな顔で言われても説得力がありませんよ？"
1013905-87 = "……今日、何かありましたね？"
1013905-88 = "[ns] \"平気だよ。大丈夫……。\""
1013905-90 = "[ns] \"ニコには関係のない事だから。\""
1013905-92 = "[ns] \"ごめん、そういうつもりで言ったわけじゃ――\""
1013905-95 = "いえ。関係ないことならなおさら、聞かせてください。"
1013905-96 = "今はお仕事よりも先生です。ついてきてください！"
1013905-100 = "（ニコの手に引かれ、そのまま宿直室へと半ば強引に連れて来られてしまった）"
1013905-103 = "はい、先生。横になってください。"
1013905-104 = "[s7] \"ニコ、心配してくれるのは嬉しいけど……。\"\r\n[s8] \"まだそんな時間じゃないし、眠れそうにないよ\""
1013905-107 = "お昼寝をしてほしいわけじゃありません。"
1013905-108 = "横になって、目を閉じて。#nゆっくり今日のことを話してください。"
1013905-109 = "どんなに些細なことでも構いませんので。#n先生の頭に残っていること、全部。"
1013905-110 = "言いたくなければ濁しても構いませんから……。"
1013905-111 = "力を抜いて……思っていることを、全部私に明け渡してください。"
1013905-112 = "[s] \"でも、生徒にそんなことを……。\""
1013905-113 = "話してくださるまで、ずっとこのままですよ。"
1013905-114 = "……SRTの拘束技、体験してみます？"
1013905-115 = "[s9] \"わ、わかった……！\"\r\n[s10] \"それじゃあ、少しだけ……。\""
1013905-119 = "（その後、ニコの言うとおり、今日一日の出来事をゆっくりと思い返していった）"
1013905-120 = "（ニコは、こちらの話に余計な口を挟まず、時々相づちを打ちながら静かに耳を傾けてくれた）"
1013905-123 = "……そんなことがあったんですね。"
1013905-124 = "そういう日もありますよ。"
1013905-125 = "一つ一つは小さな出来事なのに、何故か重なってしまう日。"
1013905-126 = "些細な事だからこそ、人に話せずに溜め込んでしまうといいますか。"
1013905-127 = "[s11] \"そうだね……どれも大したことじゃない。\"\r\n[s12] \"心配させて、ごめん。\""
1013905-130 = "そんなこと、言わないでください。"
1013905-131 = "さっきも言いましたけれど、些細なことほど、心の中で膿んでしまいやすいんです。"
1013905-132 = "だからこうして、話すのが一番です。"
1013905-133 = "どうですか？少しは、胸のつかえは取れましたか？"
1013905-134 = "[s13] \"うん、さっきよりスッキリした気がする。\"\r\n[s14] \"ありがとう、ニコ。\""
1013905-137 = "どういたしまして。"
1013905-138 = "それに、先生は大人ですから。なおさら他人に対して素直になれないものですし。"
1013905-139 = "たまには、生徒相手でもいいので。#n少しは誰かを頼ってくださいね。"
1013905-140 = "[s] \"生徒にはいつも誠実に向き合っているつもりなんだけど。\""
1013905-141 = "嘘をついてるって話じゃありませんよ？"
1013905-142 = "言葉を選んで話すことも、隠しているに該当したりしますから……。"
1013905-143 = "次からは……包み隠さず、全部お話ししてくださいね？"
1013905-144 = "[s] \"……努力してみるよ。\""
1013905-145 = "……本当、手のかかる大人ですね。"
1013905-150 = "まあ、そういうちょっと厄介な人のために、私のような生徒がいるんですから。"
1013905-152 = "（そのあと、ベッドの上でニコと他愛もない話を交わし、心なしか軽くなった気持ちで執務室へと戻った）"
