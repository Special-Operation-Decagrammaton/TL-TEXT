[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1013905-1 = "A Consulta da Niko" 
1013905-2 = "（Aquele dia foi um desastre do começo ao fim……）" 
1013905-4 = "Schale - Quarto de Descanso" 
1013905-6 = "[ns] \"Ugh…… Uu……\"" 
1013905-7 = "Hyaahaa! Acelera, acelera!!" 
1013905-8 = "Vrooooom, vamos rasgar o vento!!" 
1013905-9 = "Fufu…… A refeição de hoje também estava divina." 
1013905-10 = "[ns] \"Por que esse barulho infernal……\"" 
1013905-11 = "Para conseguir cruzar essa via pública sem pisar no freio uma única vez……\nVocês têm talento, pirralhos." 
1013905-12 = "Vocês da 'Gangue da Corrida Vrum-Vrum' também não ficam atrás.\nA disputa de hoje vai valer a pena." 
1013905-13 = "Capitão, vamos correr até o amanhecer!\r\n" 
1013905-14 = "Eu já falei pra me chamar de Chefe!" 
1013905-15 = "[ns] \"Assim eu nunca vou conseguir dormir……\"" 
1013905-18 = "（Graças a uma gangue de motoqueiros que passou a noite toda correndo\nao redor da Schale, eu não consegui pregar o olho……）" 
1013905-21 = "[ns] \"Ah, com licença.\nVocê deixou seu lenço cair.\"" 
1013905-23 = "[ns1] \"……Será que ela não me ouviu?\"\n[ns2] Corri atrás dela para devolver o lenço." 
1013905-30 = "Policial, é este homem aqui!" 
1013905-31 = "Eu senti que estava sendo seguida ultimamente, e então――" 
1013905-32 = "Este homem é um stalker!" 
1013905-34 = "[ns] \"Não é nada disso! Eu só queria\ndevolver o que ela deixou cair――！\"" 
1013905-35 = "……Devolver algo?\nPor acaso você não pensou nos sentimentos da pessoa que ia 'receber'?!" 
1013905-39 = "Pensando bem, o seu rosto não me é estranho……\nAcho que vi em um cartaz de procurados……" 
1013905-40 = "Por enquanto, venha comigo até a delegacia.\nLá você terá todo o tempo do mundo para as suas desculpas." 
1013905-41 = "[s] \"E-Espere um momento!\nIsso é um enorme mal-entendido!\"" 
1013905-43 = "（Acabei ficando retido por um bom tempo tentando explicar a situação……）\r\n" 
1013905-45 = "……Ela acreditou cegamente nos boatos e cismou que eu\nestava falando mal dela pelas costas." 
1013905-46 = "E eu aqui achando que éramos amigas……\nComo ela pôde engolir essas fofocas assim?" 
1013905-47 = "A nossa amizade acabou de vez. Está tudo arruinado!" 
1013905-48 = "[s] \"Acalme-se um pouco, vamos tentar organizar os fatos.\"" 
1013905-52 = "[ns3] \"Talvez ela também tenha os seus próprios motivos para ter agido assim, não acha?\"\n[ns4] \"Tenho certeza de que se vocês conversarem de cabeça fria――\"" 
1013905-55 = "Sensei, você vai ficar do lado dela também?!" 
1013905-56 = "Eu já expliquei um milhão de vezes!\nNão tem a menor chance de ter sido um mal-entendido!" 
1013905-57 = "[s] \"Não foi isso que eu quis dizer……\"" 
1013905-58 = "……No fim, acho que até você, Sensei,\npensa que eu estou me fazendo de vítima." 
1013905-59 = "Eu já tinha notado que você não olhou\nnos meus olhos a consulta inteira." 
1013905-60 = "……Com licença, estou de saída." 
1013905-64 = "[ns] \"E-Espera um pouco……!\"" 
1013905-67 = "（……Acho que a minha exaustão falou mais alto e eu\nacabei dizendo coisas desnecessárias no aconselhamento da aluna.）" 
1013905-68 = "（O dia foi uma sucessão interminável de problemas,\ne o meu cansaço apenas se acumulava cada vez mais……）" 
1013905-69 = "（A pior parte é que quase tudo foi por culpa de erros meus\nou situações fora do meu controle, então o dia terminou sem\nque eu pudesse sequer desabafar sobre isso com alguém.）" 
1013905-75 = "（……Mais tarde, no fim do dia.）" 
1013905-79 = "Boa noite, Sensei.\nVim ajudar no que for preciso." 
1013905-80 = "Eu consegui umas folhas de chá muito boas na última operação,\nentão as trouxe para tomarmos junt――" 
1013905-81 = "Nossa, Sensei. Você não está se sentindo bem?" 
1013905-82 = "Está praticamente escrito 'Estou Exausto' no seu rosto, sabia?" 
1013905-83 = "[s5] \"Não é nada demais.\"\r\n[s6] \"Eu estou bem, então vamos iniciar as tarefas da tarde.\"" 
1013905-86 = "Dizer isso com uma cara dessas\nnão passa muita credibilidade, Sensei." 
1013905-87 = "……Algo aconteceu hoje, não é?" 
1013905-88 = "[ns] \"Sério, não foi nada.\nEstá tudo bem……\"" 
1013905-90 = "[ns] \"Isso não é algo que a Niko\nprecise se envolver.\"" 
1013905-92 = "[ns] \"Desculpe, eu não disse isso\ncom essa intenção――\"" 
1013905-95 = "Não se desculpe. Se não tem a ver comigo,\ncom mais razão ainda eu quero ouvir." 
1013905-96 = "Neste exato momento, você é a minha prioridade.\nVenha comigo!" 
1013905-100 = "（A Niko me puxou pela mão e acabei sendo levado à força\npara o quarto de descanso.）" 
1013905-103 = "Aqui, Sensei.\nPode se deitar." 
1013905-104 = "[s7] \"Niko, eu fico muito grato pela sua preocupação, mas……\"\r\n[s8] \"Ainda é muito cedo, e não acho que vou conseguir dormir.\"" 
1013905-107 = "Eu não quero que você tire uma soneca." 
1013905-108 = "Quero que você deite e feche os olhos.\nE fale lentamente sobre tudo o que aconteceu hoje." 
1013905-109 = "Não importa o quão pequeno ou bobo seja.\nTire absolutamente tudo o que estiver pesando na sua mente." 
1013905-110 = "Pode esconder ou mudar alguns detalhes se não quiser falar,\nmas não guarde isso para si……" 
1013905-111 = "Relaxe o corpo……\ne entregue todos os seus pensamentos a mim." 
1013905-112 = "[s] \"Mas não acho certo pedir a\numa aluna que carregue esse peso……\"" 
1013905-113 = "Se você não falar, ficaremos os dois trancados aqui\no resto do dia." 
1013905-114 = "……Ou será que você quer experimentar\numa técnica de imobilização da SRT?" 
1013905-115 = "[s9] \"E-Eu entendi……!\"\r\n[s10] \"Sendo assim, me escute só um pouquinho……\"" 
1013905-119 = "（Depois disso, eu fiz o que a Niko pediu e lentamente comecei a desabafar\nsobre tudo o que me ocorreu ao longo do dia.）" 
1013905-120 = "（A Niko não me interrompeu ou julgou em momento algum, apenas me ouvia\nem silêncio, concordando e me confortando nas horas certas.）" 
1013905-123 = "……Então foi tudo isso que aconteceu." 
1013905-124 = "Tem dias que são assim mesmo, Sensei." 
1013905-125 = "As coisas individualmente podem parecer pequenas,\nmas quando elas começam a se acumular uma em cima da outra……" 
1013905-126 = "Exatamente por serem insignificantes, fica mais difícil falar com os outros,\nentão acabamos guardando e sufocando tudo isso dentro do peito." 
1013905-127 = "[s11] \"Tem razão…… No fim, não eram problemas tão graves assim.\"\r\n[s12] \"Me desculpe por ter te preocupado.\"" 
1013905-130 = "Por favor, não diga isso." 
1013905-131 = "Como eu disse, coisas pequenas\nsão as que mais apodrecem e machucam o coração." 
1013905-132 = "É por isso que colocar tudo para fora assim\né a melhor solução." 
1013905-133 = "E então? O aperto no seu peito\ndiminuiu pelo menos um pouco?" 
1013905-134 = "[s13] \"Sim, eu sinto que um peso imenso saiu de mim.\"\r\n[s14] \"Muito obrigado, Niko.\"" 
1013905-137 = "Não precisa agradecer." 
1013905-138 = "Aliás, adultos tendem a ter mais dificuldade em se abrir com os outros,\nnão é mesmo?" 
1013905-139 = "De vez em quando não tem problema algum desabafar com as suas alunas.\nEntão por favor, tente depender mais de nós também." 
1013905-140 = "[s] \"Mas eu já tento ser o mais sincero\npossível com vocês sempre que posso.\"" 
1013905-141 = "Não estou falando de você mentir." 
1013905-142 = "O simples fato de escolher e policiar o que vai dizer\ntambém é uma forma de esconder as coisas……" 
1013905-143 = "Da próxima vez…… Quero que me conte\ntudo sem esconder nadinha, estamos entendidos?" 
1013905-144 = "[s] \"……Vou dar o meu melhor.\"" 
1013905-145 = "……Sinceramente, você é um adulto\nque dá bastante trabalho." 
1013905-150 = "Mas bem, é exatamente para cuidar de pessoas\nmeio teimosas como você que alunas como eu existem." 
1013905-152 = "（Depois disso, eu e a Niko jogamos conversa fora na cama por um tempo,\ne então retornei ao escritório sentindo meu coração notavelmente mais leve.）" 