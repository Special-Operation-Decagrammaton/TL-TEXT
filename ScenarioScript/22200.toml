[translation]#[Texto Final , mas eventualmente pode haver alterações na formatação de texto. - Filipe 29/06.]
22200-1 = "Episódio 20: Como Gamer, Como Amiga."
22200-2 = "Por ora, a gente fugiu pra um prédio aqui perto, mas……"
22200-9 = "[ns] \"Todo mundo tá bem? Algum ferimento!?\""
22200-10 = "……A gente tá bem, mas."
