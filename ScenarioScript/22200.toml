[translation]
22200-1 = "Episódio 20; Como Gamer, como Amiga"
22200-2 = "Conseguimos fugir para um prédio próximo, mas......"
22200-9 = "[ns] \"Estão todas bem? Algum ferimento!?\""
22200-10 = "......Nós estamos bem."
22200-11 = "A Neru-senpai está......"
22200-13 = "A líder ainda não...... recuperou a consciência."
22200-14 = "Os ferimentos parecem mais graves do que pensávamos."
22200-15 = "Parece que ela se machucou feio com o impacto da queda no final...... O que faremos, Mestre......?"
22200-16 = "[s] \"Neru......\""
22200-17 = "......Situação terrível, hein."
22200-18 = "O Clube de Engenharia está fora de combate após a luta contra o Avant-Garde......"
22200-19 = "Nós da Veritas conseguimos nos conectar à rede, mas...... #n no fim das contas, suporte remoto tem limites."
22200-20 = "E o Clube de Desenvolvimento de Jogos...... para ser sincera, não servem como força de combate, né."
22200-21 = "Uuuuh! B-Bem, isso é verdade, mas!"
22200-22 = "Não posso negar......"
22200-24 = "Na verdade, a C&C, que podemos chamar de força de combate......"
22200-25 = "[s] \"......Não é só a Neru, todas já chegaram ao limite.\""
22200-26 = "......Haa, eu não queria dizer isso, mas."
22200-27 = "Talvez seja o fim da linha...... Não tem mais nada que possamos fazer daqui......"
22200-32 = "No fim, nós......"
22200-33 = "......Será que somos fracas demais sozinhas?"
22200-34 = "[s] \"Momoi......\""
22200-35 = "Será que... nós não conseguimos salvar a Aris-chan sozinhas?"
22200-36 = "Nem a Aris-chan, nem nós...... #n fizemos nada de errado......"
22200-37 = "Mesmo assim, por que... por que isso está acontecendo......"
22200-39 = "Midori......"
22200-40 = "Até aqui...... todos nos ajudaram......"
22200-41 = "O esforço de todos somados...... e finalmente conseguimos chegar até aqui......!"
22200-42 = "Não temos outra escolha a não ser desistir agora............?"
22200-43 = "......Um final ruim desse jeito...... #n De jeito nenhum...... de jeito nenhum......!"
22200-47 = "Vocês acham que eu vou aceitar isso!!"
22200-48 = "Uwaaah!?"
22200-49 = "Ah! Líder!"
22200-50 = "Você acordou!?"
22200-51 = "[s] \"Neru, você está bem?\""
22200-53 = "Hã......?"
22200-58 = "Líder! Não force! #n Seus ferimentos são graves!"
22200-59 = "Parem de berrar aí... eu estou bem."
22200-60 = "Não, olhando para você, não está nada bem......"
22200-61 = "Esquece isso... o que aconteceu? #n Por que vocês estão com essa cara de velório?"
22200-62 = "[s] \"É que......\""
22200-64 = "Haa... ou seja, vocês acham que a situação já era?"
22200-65 = "......"
22200-66 = "Hã? Vocês estão brincando?"
22200-67 = "Eh......?"
22200-68 = "Ei, nanicas."
22200-73 = "A determinação de vocês era só isso?"
22200-74 = "D, determinação... você não pode falar assim!"
22200-75 = "Bom, admito que nem consigo mover os braços,"
22200-76 = "E os ligamentos das minhas pernas foram para o saco, isso aqui..."
22200-77 = "Sério, sinto que vou vomitar se der um passo..."
22200-78 = "Isso não é chamado de estar em frangalhos!?"
22200-79 = "Mas olha só... se vocês vão desistir só por causa disso..."
22200-80 = "A decisão de vocês é tão frágil assim?"
22200-81 = "M, mas Neru-senpai, seu corpo já está...!"
22200-82 = "Ha! Não percam tempo se preocupando comigo."
22200-83 = "Vou aguentar isso com pura força de vontade."
22200-84 = "A gente não veio até aqui para salvar a Aris?"
22200-85 = "Então não desistam até o final. Entendido?"
22200-86 = "N, nós não queremos desistir também!"
22200-87 = "M, mas como vamos vencer uma trapaceira daquelas...?"
22200-88 = "É verdade......"
22200-89 = "Talvez...... exista um jeito......"
22200-93 = "Eh!?"
22200-94 = "[s] \"Yuzu, s, sério!?\""
22200-95 = "Sim, foi só por um instante... foi um momento fugaz."
22200-97 = "(Agora...!)"
22200-99 = "Eu vi que o ataque da Neru-senpai funcionou."
22200-100 = "[s] \"Naquele curto período de tempo......?\""
22200-101 = "Como esperado da Yuzu! UZQueen! O prodígio da percepção visual!"
22200-102 = "Mas por que funcionou? #n Pelas palavras da Presidente, nada deveria funcionar contra o 'Armamento' da Toki-chan, não deveria?"
22200-103 = "I, isso eu também não sei muito bem......"
22200-105 = "......É só uma hipótese."
22200-106 = "......É só uma suposição, sem garantias de que seja verdade."
22200-107 = "E se o 'Armamento' da Toki tiver uma brecha?"
22200-108 = "......Brecha?"
22200-109 = "A Presidente disse, não disse? Que o 'Armamento' que recebe suporte da rede de Eridu consegue abater e desviar de qualquer ataque através de cálculos."
22200-110 = "[s] \"Sim. Na prática, parecia ser isso mesmo.\""
22200-111 = "Isso. Pelo que eu vi com meus próprios olhos, não é mentira. #n Só que......"
22200-112 = "Eu nunca a vi fazendo as duas coisas ao mesmo tempo."
22200-113 = "......! #n Entendi, é isso!"
22200-114 = "Eh? Hã? Eh......?"
22200-115 = "Ehm...... o que você quer dizer?"
22200-117 = "O poder do 'Armamento' realmente pode ser chamado de trapaça."
22200-118 = "Mas talvez seja apenas uma impressão, #n pode ser que o 'Armamento' tenha um limite...... que existam coisas que ele não pode fazer."
22200-119 = "Quando ela caiu do prédio, a Presidente disse que até a queda foi calculada."
22200-120 = "Ou seja, naquela hora ela usou a capacidade de processamento para a queda......"
22200-121 = "[s] \"Não conseguiu defender o ataque da Neru...... e surgiu uma brecha......?\""
22200-122 = "Ah! É isso!"
22200-123 = "S, se for assim, se criarmos uma abertura como naquela hora......!"
22200-124 = "Podemos conseguir derrotá-la......?"
22200-125 = "Mas como? Não acho que ela não saiba desse ponto fraco."
22200-126 = "O método de derrubá-la do prédio não vai funcionar duas vezes..."
22200-127 = "N, Neru-senpai, você disse...... que venceria... no combate de curta distância?"
22200-128 = "......Ah, eu venço. #n Antes disso, precisamos dar um jeito nessa habilidade de trapaça, claro."
22200-129 = "E, então eu tenho uma ideia."
22200-130 = "Contra uma trapaceira......"
22200-131 = "Dentro das regras impostas, existe um... 'exploit' que podemos usar."
22200-141 = "Neru-senpai......"
22200-147 = "......Não sei o que estão tramando, mas é inútil."
22200-148 = "Toki."
22200-149 = "......Sim, senhora."
22200-150 = "Ah, agora sim..."
22200-151 = "Desta vez, vamos resolver isso de uma vez por todas!"
22200-153 = "Próximo Episódio; O Que Aquele Nome Indica"