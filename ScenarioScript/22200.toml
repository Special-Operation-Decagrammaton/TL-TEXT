22200-109 = "A presidente disse, né. Que o \"armamento\", recebendo suporte da rede de Eridu,#npor meio do processamento, consegue abater e desviar qualquer ataque."
22200-110 = "[s] \"Sim. E na prática foi mais ou menos isso.\""
22200-111 = "É verdade. Pelo que eu vi com os meus olhos, não é mentira.#nSó que……"
22200-112 = "É que, até agora, eu não vi ela fazer essas duas coisas ao mesmo tempo."
22200-113 = "……!#nEntendi, então é isso."
22200-114 = "Hã? Hm? Hã……?"
22200-115 = "Ãh…… como assim?"
22200-117 = "A capacidade do \"armamento\" é, de fato, de chamar de cheat."
22200-118 = "Mas, pode ser que só pareça assim, e que#no \"armamento\" também tenha um limite…… coisas que ele não consegue fazer."
22200-119 = "Quando ela caiu do prédio, a presidente disse que até aquela queda estava nos cálculos, né."
22200-120 = "Ou seja, naquela hora, ela usou a capacidade de processamento na queda, e por isso……"
22200-121 = "[s] \"Não conseguiu bloquear o ataque da Neru…… e abriu uma brecha……?\""
22200-122 = "Ah! É isso!"
22200-123 = "E-então, se a gente conseguir criar uma brecha como a daquela hora……!"
22200-124 = "talvez dê pra derrotar……?"
22200-125 = "Mas como? Não dá pra acreditar que a adversária não entenda esse ponto fraco."
22200-126 = "Não tem como o método de jogar do terraço funcionar duas vezes……"
22200-127 = "A-a veterana Neru, à curta distância…… ganha…… foi isso que você disse, né?"
22200-128 = "……Ah, ganho.#nMas, antes disso, vai ser preciso dar um jeito naquela habilidade de cheat."
22200-129 = "E-então eu tenho uma ideia."
22200-130 = "Contra um cheat……"
22200-131 = "dentro das regras que foram dadas, uma coisa que a gente pode usar…… um \"golpe-trava\"."
22200-141 = "Veterana Neru……"
22200-147 = "……Não sei o que vocês estão tramando, mas é inútil."
22200-148 = "Toki."
22200-149 = "……Sim, senhora."
22200-150 = "Ah, é assim que tem que ser……"
22200-151 = "Dessa vez, vamos acertar as contas de uma vez, nós duas!"
22200-153 = "Próximo episódio: O Que Aquele Nome Revela."