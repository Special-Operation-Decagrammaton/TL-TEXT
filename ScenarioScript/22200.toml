22200-13 = "A consciência da presidente ainda não…… voltou."
22200-14 = "Pelo visto, os ferimentos são mais graves do que pareciam."
22200-15 = "No fim, com o impacto da queda, ela parece ter se machucado feio…… e agora, mestre……"
22200-16 = "[s] \"Neru……\""
22200-17 = "……É a pior das situações, né."
22200-18 = "Na luta contra o Avant-Garde, o Clube de Engenharia saiu de cena……"
22200-19 = "Até o ponto em que nós, da Veritas, conectamos na rede, foi bom, mas……#nno fim, o suporte à distância tem limite."
22200-20 = "Quanto ao Clube de Desenvolvimento de Jogos…… sinceramente, está fora de combate, né."
22200-21 = "Uuh! I-isso é verdade, mas!"
22200-22 = "Não dá pra negar……"
22200-24 = "Na prática, o único que dá pra chamar de força de combate, o C&C……"
