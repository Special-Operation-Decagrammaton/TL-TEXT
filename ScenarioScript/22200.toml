[translation]
22200-1 = "Episódio 20; Como gamers, como amigas"
22200-2 = "Por enquanto, conseguimos fugir para um prédio próximo, mas..."
22200-9 = "[ns] \"Estão todas bem? Algum ferimento!?\""
22200-10 = "……Nós estamos bem, mas."
22200-11 = "A senpai Neru está..."
22200-13 = "A consciência da chefe ainda não... retornou."
22200-14 = "Parece que os ferimentos são mais graves do que pensávamos."
22200-15 = "No final, parece que ela se machucou feio com o impacto da queda... O que a gente faz, Mestre..."
22200-16 = "[s] \"Neru...\""
22200-17 = "……É a pior situação possível."
22200-18 = "Na luta contra o Avant-Garde, o Clube de Engenharia foi retirado de combate..."
22200-19 = "Até conseguimos conectar o Veritas à rede, mas...#nno fim das contas, o suporte de longa distância tem seus limites."
22200-20 = "Quanto ao Clube de Desenvolvimento de Jogos... sendo sincera, elas não servem para o combate."
22200-21 = "Uuuuh! I-isso é verdade, mas!"
22200-22 = "Não posso negar..."
22200-24 = "Na verdade, a C&C, que poderíamos chamar de força de combate..."
22200-25 = "[s] \"……Não é só a Neru, todas já estão no limite.\""
22200-26 = "……Haa, eu não queria dizer isso, mas."
22200-27 = "Talvez seja o fim da linha... Não temos mais nenhuma carta na manga..."
22200-32 = "Será que, nós..."
22200-33 = "……Será que só nós não somos capazes?"
22200-34 = "[s] \"Momoi...\""
22200-35 = "Será que... nós não conseguiremos salvar a Alice-chan sozinhas?"
22200-36 = "A Alice-chan, e nós também...#nninguém fez nada de errado..."
22200-37 = "Então por que... por que isso está acontecendo..."
22200-39 = "Midori..."
22200-40 = "Até aqui... todo mundo nos ajudou..."
22200-41 = "O esforço de todos se somou... e finalmente conseguimos chegar até aqui...!"
22200-42 = "A única opção é desistir agora...?"
22200-43 = "……Um final desses... um final ruim desses...#nnunca... de jeito nenhum...!"
22200-47 = "Como é que eu vou aceitar uma coisa dessas!!"
22200-48 = "Uwaaa!?"
22200-49 = "Ah! Chefe!"
22200-50 = "Você acordou!?"
22200-51 = "[s] \"Neru, você está bem?\""
22200-53 = "Hã...?"
22200-58 = "Chefe! Não se force!#nSeus ferimentos são muito profundos!"
22200-59 = "Parem de fazer barulho... Estou bem."
22200-60 = "Não, olhando para você, não parece nada bem..."
22200-61 = "Esqueçam isso... O que aconteceu?#nPor que todas estão com essa cara de velório?"
22200-62 = "[s] \"É que...\""
22200-64 = "Haa... Então vocês acham que a situação já era?"
22200-65 = "……"
22200-66 = "Hã? Estão brincando comigo?"
22200-67 = "Eh...?"
22200-68 = "Ei, pirralhas."
22200-73 = "Os sentimentos de vocês eram só isso?"
22200-74 = "S-só isso... você diz... não precisa falar desse jeito!"
22200-75 = "Bom, realmente não parece que consigo mover os braços,"
22200-76 = "e os ligamentos das pernas também foram rompidos, pelo visto..."
22200-77 = "Sério, sinto que vou vomitar se mover um passo sequer, mas..."
22200-78 = "Isso já é o que chamam de estar com o corpo todo destruído!"
22200-79 = "Mas é que... não sou do tipo que desiste por causa de algo tão trivial assim..."
22200-80 = "A determinação de vocês é tão frágil assim?"
22200-81 = "M-mas, senpai Neru, seu corpo já está...!"
22200-82 = "Ha! Não venha se preocupar com os outros, não é do seu feitio."
22200-83 = "Vou aguentar isso aqui na base da força de vontade."
22200-84 = "Afinal, viemos até aqui para salvar a Alice, não foi?"
22200-85 = "Então, não desistam e sigam até o fim. Entendido?"
22200-86 = "N-nós também não queremos desistir!"
22200-87 = "M-mas contra uma personagem tão apelona assim... como a gente vai vencer...?"
22200-88 = "Bem..."
22200-89 = "Talvez... exista um jeito... talvez."
22200-93 = "Sério!?"
22200-94 = "[s] \"Yuzu, v-você tem certeza!?\""
22200-95 = "Sim, foi realmente por um instante... um momento fugaz, mas..."
22200-97 = "（Agora...!）"
22200-99 = "Eu vi o ataque da senpai Neru passar pela defesa dela."
22200-100 = "[s] \"Naquele curto espaço de tempo...?\""
22200-101 = "Como esperado da Yuzu! UZQueen! A prodígio da visão dinâmica!"
22200-102 = "Mas por que funcionou? Se o que a Presidente disse for verdade, nada deveria funcionar contra o \"Armamento\" da Toki-chan, não é?"
22200-103 = "I-isso, eu também não sei ao certo..."
22200-105 = "...Isso é apenas uma hipótese."
22200-106 = "...É só uma suposição, nada além de um cenário hipotético."
22200-107 = "E se o \"Armamento\" da Toki tiver uma brecha?"
22200-108 = "...Uma brecha?"
22200-109 = "A Presidente disse que o \"Armamento\", que recebe suporte da rede de Eridu, consegue abater ou desviar de qualquer ataque através de cálculos."
22200-110 = "[s] \"Sim. Na prática, parecia ser exatamente isso.\""
22200-111 = "É verdade. Pelo que vi com meus próprios olhos, não é mentira. Mas..."
22200-112 = "Acho que nunca a vi fazendo as duas coisas ao mesmo tempo."
22200-113 = "...! Entendi, então é isso."
22200-114 = "Eh? Hã? O quê...?"
22200-115 = "Err... o que isso significa?"
22200-117 = "A habilidade do \"Armamento\" é tão absurda que pode ser chamada de trapaça."
22200-118 = "Mas talvez seja só uma impressão, e o \"Armamento\" também tenha limites... coisas que ele não consegue fazer."
22200-119 = "Quando caímos do prédio, a Presidente disse que até aquela queda estava nos cálculos dela."
22200-120 = "Ou seja, naquela hora ela estava usando sua capacidade de processamento para a queda, então..."
22200-121 = "[s] \"Não conseguiu bloquear o ataque da Neru... e uma brecha surgiu...?\""
22200-122 = "Ah! É isso!"
22200-123 = "S-se for assim, se conseguirmos criar uma brecha como naquela hora...!"
22200-124 = "Talvez a gente consiga derrotá-la...?"
22200-125 = "Mas como? Não acho que ela não saiba desse ponto fraco."
22200-126 = "Não tem como o truque de derrubá-la do telhado funcionar duas vezes..."
22200-127 = "N-Neru-senpai, você disse que... se fosse de perto... conseguiria vencer, não disse?"
22200-128 = "...Ah, eu venço. Embora precise dar um jeito naquela habilidade apelona antes disso."
22200-129 = "E-então eu tenho uma ideia."
22200-130 = "Contra uma trapaceira..."
22200-131 = "Dentro das regras estabelecidas, existe um \"truque\" que podemos usar."
22200-141 = "Neru-senpai..."
22200-147 = "...Não sei o que estão planejando, mas é inútil."
22200-148 = "Toki."
22200-149 = "……Sim, madame."
22200-150 = "Ah, é assim que se fala……."
22200-151 = "Desta vez, vamos resolver isso de uma vez por todas!"
22200-153 = "Próximo episódio: O que aquele nome indica."
