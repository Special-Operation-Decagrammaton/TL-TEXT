[translation]
22200-1 = "第20話;ゲーマーとして、友達として"
22200-2 = "とりあえず近くの建物に逃げたけど……。"
22200-9 = "[ns] \"みんな大丈夫？怪我は！？\""
22200-10 = "……私たちは大丈夫だけど。"
22200-11 = "ネル先輩が……。"
22200-13 = "部長の意識がまだ……戻っておりません。"
22200-14 = "負傷が思ったより深刻なようだ。"
22200-15 = "最後、落下の衝撃で大怪我しちゃったみたい……どうしよう、ご主人様……。"
22200-16 = "[s] \"ネル……。\""
22200-17 = "……最悪の状況だね。"
22200-18 = "アバンギャルド君との戦いで、エンジニア部はリタイア……。"
22200-19 = "私たちヴェリタスがネットワークに接続したところまではよかったけど……#nそもそも、遠距離支援には限界がある。"
22200-20 = "ゲーム開発部に至っては……正直、戦力外だろうね。"
22200-21 = "ううぅ！そ、それはそうだけど！"
22200-22 = "否定できません……。"
22200-24 = "実際、戦力と呼べるC&Cは……"
22200-25 = "[s] \"……ネルだけじゃない、みんなもう限界だ。\""
22200-26 = "……はぁ、あんまりこんなことは言いたくないけど。"
22200-27 = "ここまで、なのかもしれない……もう、ここから打てる手なんて……。"
22200-32 = "やっぱり、私たち……"
22200-33 = "……私たちだけじゃ、力不足なのかな？"
22200-34 = "[s] \"モモイ……。\""
22200-35 = "私たちだけじゃ……アリスちゃんを、助けられないの、でしょうか？"
22200-36 = "アリスちゃんも、私たちも……#n誰も、悪いことなんかしてないのに……。"
22200-37 = "なのに、どうして……どうしてなの……。"
22200-39 = "ミドリ……"
22200-40 = "ここまで……みんなが助けてくれた……"
22200-41 = "みんなの努力が重なって……やっと、ここまで来られたのに……！"
22200-42 = "このまま諦めるしか、ないの…………？"
22200-43 = "……こんな……こんなバッドエンドは……#n絶対……絶対に……！"
22200-47 = "んなもん納得できっかよ！！"
22200-48 = "うわああっ！？"
22200-49 = "あっ！部長！"
22200-50 = "気がついたんだな！？"
22200-51 = "[s] \"ネル、身体は大丈夫？\""
22200-53 = "あぁ……？"
22200-58 = "部長！無理しないでください！#nかなり傷が深いんですから！"
22200-59 = "ぴーぴー騒ぐんじゃねぇ……大丈夫だ。"
22200-60 = "いや、見た目は全然大丈夫じゃないんだけど……。"
22200-61 = "んなことより……何があった？#nなんでみんな葬式みてぇなツラしてんだ？"
22200-62 = "[s] \"それが……。\""
22200-64 = "はぁ……つまり、状況的にもうダメなんじゃないかって？"
22200-65 = "……。"
22200-66 = "は？ふざけてる。"
22200-67 = "え……？"
22200-68 = "おい、チビども。"
22200-73 = "てめぇらの想いは、所詮その程度だったのか？"
22200-74 = "しょ、所詮……って……そんな言い方ないじゃん！"
22200-75 = "まぁ、たしかに腕は動かせそうにもねぇし、"
22200-76 = "足も靭帯が切れてるな、こりゃ……"
22200-77 = "マジで、一歩でも動いたら吐きそうになるけどよ……"
22200-78 = "それもう満身創痍っていうんだよ！？"
22200-79 = "だがなぁ……たかだかその程度で諦めるほど……。"
22200-80 = "てめぇらの決心は脆いのかよ？"
22200-81 = "で、でもネル先輩、もう身体が……！"
22200-82 = "は！らしくもなく他人の心配するんじゃねぇ。"
22200-83 = "こんくらい、根性で耐えてやんよ。"
22200-84 = "せっかく、アリスを救うためにここまで来たんだろ？"
22200-85 = "じゃあ最後まで諦めずに押し通せっての。わかったか？"
22200-86 = "わ、私たちだって諦めたくないよ！"
22200-87 = "で、でもあんなチートキャラ相手に……どうやって勝てばいいの……？"
22200-88 = "そうだな……"
22200-89 = "もしかしたら……方法が、あるかも……しれない。"
22200-93 = "ええっ！？"
22200-94 = "[s] \"ユズ、ほ、本当に！？\""
22200-95 = "はい、あの時本当に一瞬……刹那の瞬間だったんですが。"
22200-97 = "（今……！）"
22200-99 = "ネル先輩の攻撃が通ってるのを見ました。"
22200-100 = "[s] \"あの短い時間の中で……？\""
22200-101 = "さすがユズだよ！UZQueen！動体視力の申し子！"
22200-102 = "でもなぜ効いたのでしょう？#n会長の言葉通りなら、トキちゃんの「武装」には何も通用しないはずなのでは？"
22200-103 = "そ、それはわたしにもよく……。"
22200-105 = "……これは、もしもの話だけど。"
22200-106 = "……あくまでもしも、の本当にただの仮定に過ぎない話なんだけど。"
22200-107 = "トキの「武装」に隙があるとしたら？"
22200-108 = "……隙？"
22200-109 = "会長は言ってたよね。エリドゥのネットワークからサポートを受ける「武装」は、#n演算によってどんな攻撃でも撃墜し、回避することが可能だと。"
22200-110 = "[s] \"うん。実際もそんな感じだったね。\""
22200-111 = "そうだね。この目で見た限りでも、それは嘘じゃない。#nただ……。"
22200-112 = "これまで、その二つを同時にこなしているところを見たことがないと思って。"
22200-113 = "……！#nなるほど、そういうことなのですね。"
22200-114 = "え？ん？えっ……？"
22200-115 = "えっと……どういう意味ですか？"
22200-117 = "「武装」の能力は、たしかにチートと呼んでもいいくらいだけど。"
22200-118 = "でも、もしかしたらそう見えているだけで、#n「武装」にも限界が……できない事があるかもしれないって話。"
22200-119 = "ビルから落ちた時、会長はその墜落さえ計算に入れていたと言ってたよね。"
22200-120 = "つまり、あの時は墜落に演算能力を使っていたから……。"
22200-121 = "[s] \"ネルの攻撃を防ぎきれず……隙ができた……？\""
22200-122 = "あ！そういうこと！"
22200-123 = "そ、それならあの時みたいに隙を作ることができれば……！"
22200-124 = "倒せるかも、しれない……？"
22200-125 = "でもどうやって？相手がこの弱点を理解してないとは思えない。"
22200-126 = "屋上から落とす方法が二度も通じるはずが……"
22200-127 = "ね、ネル先輩は、近距離なら……勝てる……そう、言いましたよね？"
22200-128 = "……ああ、勝てる。#nその前に、あのチート能力をどうにかする必要はあるだろうがな。"
22200-129 = "そ、それならわたしにアイデアがあります。"
22200-130 = "チート相手に……"
22200-131 = "与えられたルールの中で、わたしたちが使える……「ハメ技」が。"
22200-141 = "ネル先輩……"
22200-147 = "……何を企んでいるか知らないけど、無駄よ。"
22200-148 = "トキ。"
22200-149 = "……イエス、マム。"
22200-150 = "ああ、そう来なくっちゃな……。"
22200-151 = "今度こそお互い、決着をつけようじゃねぇの！"
22200-153 = "次回;その名が示すのは。"
