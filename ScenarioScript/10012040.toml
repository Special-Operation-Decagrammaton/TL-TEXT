[translation]
10012040-1 = "第4話;先生を助けに参りました"
10012040-2 = "ねえ、どうなってんの？話が違うじゃん！！"
10012040-4 = "強いって噂は嘘だったの？"
10012040-5 = "ねえ、なんで黙ってんのよ！"
10012040-11 = "聞こえてないみたいですよ……。"
10012040-12 = "これ、うちらが面倒みなきゃいけないの……？"
10012040-16 = "……。"
10012040-17 = "先生……あなた様がどうしてここに……？"
10012040-18 = "ここは……所有権を手に入れるために、あらゆる集団が競い合っている場だと聞いていたのに……。"
10012040-19 = "ちょっと、聞いてんの？ねえ、ワカモってば！！"
10012040-20 = "先生がそのような下劣な派閥争いに加担するなんてありえません……ということは……。"
10012040-21 = "まさか……先生は……誘拐されて……？"
10012040-23 = "ちょっと！なに一人でブツブツ呟いてんのさ……人の話聞いてる！？"
10012040-25 = "……！！！"
10012040-26 = "……ええ、ええ！お優しい先生のことです。悪い狐に騙されてしまったのですね……！"
10012040-27 = "……ワカモ！！"
10012040-28 = "……ければ……。"
10012040-29 = "……ん？何て？"
10012040-30 = "……行かなければ……先生を……"
10012040-31 = "お救いしなければ……！！"
10012040-33 = "……何の話？先生って……。"
10012040-34 = "さっきあそこにいた大人のこと？"
10012040-35 = "ねえ、どういう事……あいつは敵でしょ？なんで助けに行くのよ。"
10012040-37 = "……いま、なんと？"
10012040-38 = "誰が敵……なのですか？"
10012040-39 = "もしかして……先生の事……でしょうか？"
10012040-40 = "当然でしょ？他に誰がいるのよ。"
10012040-46 = "ちょっと待って。何か雰囲気おかしくない……？"
10012040-47 = "な、なんか今までの感じとはだいぶ違うような……。"
10012040-48 = "ねえ、何の話？"
10012040-49 = "……ちょっと。何よその目は……。"
10012040-51 = "ふふ、ふふふ……。"
10012040-52 = "先生のことを……そんな風に……。"
10012040-53 = "どうやら……教育が必要なようですね。"
10012040-55 = "……教育？"
10012040-56 = "教育って、何？"
10012040-58 = "うふふ……。"
10012040-62 = "今から、私が……"
10012040-72 = "その可哀そうな頭に、叩き込んで差し上げます。"
10012040-85 = "ザァーーー！！"
10012040-91 = "……ふぅ。とってきたよ。サザエとアワビ……あと、わかめもあるよ。"
10012040-92 = "ほ、本当にすごい量……。"
10012040-93 = "お疲れ様でした先輩。獲ってきてくださったものは、こちらにどうぞ。"
10012040-94 = "うん……ありがとう。"
10012040-99 = "……私たち、またここに帰ってきちゃいましたね。"
10012040-100 = "さっき、あんなことがあったばかりなのに……。"
10012040-102 = "まさか私たちの他にも人がいたなんて……。"
10012040-103 = "むしろ、そういうことがあったから、今度はみんなで来たんでしょ。また襲われたら危ないし。"
10012040-104 = "あいつらがいなかったら別行動できたんだけど……。"
10012040-105 = "ヘリの墜落に、リゾート復旧に……今度は喧嘩だなんて。"
10012040-106 = "次から次へとよく続くわね……。"
10012040-108 = "…………。"
10012040-109 = "……大丈夫でしょうか？ワカモさん……普通の人には見えませんでしたが。"
10012040-110 = "気にしなくて良いと思う。無理に行動を変える必要はない。"
10012040-111 = "また来たら、その時に相手すればいいだけ。"
10012040-112 = "そ、それでいいんですかね……。"
10012040-113 = "……じゃ、また行ってくる。"
10012040-122 = "……あ、行ってしまいました。"
10012040-123 = "……しょうがないわよ。やる気になったシロコ先輩を止められないの、知ってるでしょ。"
10012040-124 = "[s1] \"……こっちが避ける必要はないって思ってるみたいだね。\"\n[s2] \"シロコらしいといえばシロコらしいけど……。\""
10012040-127 = "まあ、若者らしくていいじゃん。"
10012040-128 = "釣竿がないならダイビングで獲ってくるなんて……どこにそんな体力が……。"
10012040-129 = "そのおかげで、食料には困りませんね！魚にアワビに……。"
10012040-130 = "それに、また襲ってきても、話し合えばどうにかできるんじゃないでしょうか？"
10012040-131 = "リゾートは広いですから！みんなで仲良く分けて使うとか……！"
10012040-132 = "もう二回もやりあってるのに、今さら話し合いでどうこうできるのかしら……。"
10012040-133 = "ま、まぁ、完全に不可能というわけでは……。"
10012040-134 = "仲良く……までは難しくても、お互いのスペースを決めるとか、そんな風に。"
10012040-135 = "ワカモさんの事が気にはなりますが……。"
10012040-136 = "[s3] \"気になる？\"\n[s4] \"心配でもあるの？\""
10012040-137 = "いえ、なんとなく、ただ……私の気のせいかもしれませんが……。"
10012040-138 = "いえ、なんとなく、ただ……私の気のせいかもしれませんが……。"
10012040-139 = "シロコ先輩とあの人を会わせるのは、避けたほうがいい気がして……。"
10012040-140 = "こんなところにいた！！"
10012040-141 = "……あ。"
10012040-142 = "[s5] \"素晴らしいタイミングだね。\"\n[s6] \"噂をすればなんとやら……。\""
10012040-143 = "えっ、何。本当にまた来たの？"
10012040-144 = "えっ、何。本当にまた来たの？"
10012040-145 = "……例のワカモってあの人？"
10012040-146 = "先生、もうご安心を[ruby=わたくし]！私ワ[/ruby]カモが、あなた様を助けに参りました！！"
10012040-147 = "……あ、はい。あの方です！"
10012040-148 = "……って、あれ？"
10012040-149 = "何かさっき……変なこと言ってませんでした……？"
10012040-150 = "……そうだね。先生を「助けに来た」って……？"
10012040-156 = "謎の悪党に捕まって、こんなに遠いところに連れてこられてしまうなんて……。"
10012040-157 = "このワカモがお側についていれば、そもそもこんな事にならなかったのに！"
10012040-158 = "遅くなり申し訳ございません……"
10012040-159 = "このワカモが"
10012040-160 = "先生をお救いいたしますね。"
10012040-168 = "……うん？"
10012040-169 = "……あ～、私らが誘拐したと勘違いされてるのかな？"
10012040-170 = "うへ～、おじさん知らなかったよ。"
10012040-171 = "うんうん！私たち、実は誘拐犯なんです～☆"
10012040-172 = "って何納得してるのよ！誤解を招くでしょう！？"
10012040-174 = "ま、待ってください！みなさん、戦う前にまず、話し合いを……！"
10012040-175 = "リゾートは広いですから、みなさんそれぞれ別の場所で楽しめば……"
10012040-177 = "……話し合い？"
10012040-178 = "うふふっ。話し合い……いい響きですね……"
10012040-179 = "総員、攻撃なさい！先生は私がお救いいたします！！！"
10012040-180 = "……ちょっと！話し合うんじゃないの！？"
10012040-182 = "こ、攻撃！こうげきぃぃー！！"
10012040-183 = "こ、こうげきぃ……！"
10012040-184 = "うちらいつからこうなっちゃったのよ、隊長～～！"
10012040-185 = "う、うちに聞かないでよ！"
10012040-186 = "とりあえず言われた通りにするわよ！攻撃、開始！"
