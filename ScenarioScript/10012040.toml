[translation]
10012040-1 = "Episódio 4; Vim para salvar o Sensei"
10012040-2 = "Ei, o que está acontecendo? Isso não foi o que combinamos!!"
10012040-4 = "Os rumores de que você era forte eram mentira?"
10012040-5 = "Ei, por que você está em silêncio!"
10012040-11 = "Parece que ela não está ouvindo..."
10012040-12 = "Nós realmente temos que cuidar disso...?"
10012040-16 = "..."
10012040-17 = "Sensei... por que você está aqui...?"
10012040-18 = "Eu ouvi dizer que este lugar era um campo de batalha onde vários grupos competiam para obter os direitos de propriedade..."
10012040-19 = "Ei, você está me ouvindo? Ei, Wakamo!!"
10012040-20 = "É impossível que o Sensei se envolva em uma disputa de facções tão desprezível... o que significa que..."
10012040-21 = "Não pode ser... o Sensei foi... sequestrado...?"
10012040-23 = "Ei! Por que você está resmungando sozinha... você está me ouvindo!?"
10012040-25 = "...!!!"
10012040-26 = "...Sim, sim! É típico do gentil Sensei. Você foi enganado por uma raposa malvada, não foi...!"
10012040-27 = "...Wakamo!!"
10012040-28 = "...se eu não..."
10012040-29 = "...Hm? O que disse?"
10012040-30 = "...Eu preciso ir... o Sensei..."
10012040-31 = "Eu preciso salvá-lo...!!"
10012040-33 = "...Do que você está falando? Sensei..."
10012040-34 = "Você está falando daquele adulto que estava ali?"
10012040-35 = "Ei, o que significa isso... ele é um inimigo, não é? Por que você vai salvá-lo?"
10012040-37 = "...O que você disse agora?"
10012040-38 = "Quem... é o inimigo?"
10012040-39 = "Por acaso... você está falando do Sensei...?"
10012040-40 = "Claro, não é? Quem mais seria?"
10012040-46 = "Espere um pouco. A atmosfera não está estranha...?"
10012040-47 = "E-está bem diferente do que era antes..."
10012040-48 = "Ei, do que vocês estão falando?"
10012040-49 = "...Ei. Que olhar é esse..."
10012040-51 = "Fufu, fufufu..."
10012040-52 = "Tratar o Sensei... dessa maneira..."
10012040-53 = "Parece que... vocês precisam de uma educação."
10012040-55 = "...Educação?"
10012040-56 = "O que é educação?"
10012040-58 = "Ufufu..."
10012040-62 = "A partir de agora, eu vou..."
10012040-72 = "Martelar isso nessa sua cabecinha lamentável."
10012040-85 = "Zaaaa---!!"
10012040-91 = "...Ufa. Consegui. Turbantes e abalones... e também tem algas."
10012040-92 = "U-uma quantidade realmente incrível..."
10012040-93 = "Bom trabalho, veterana. Pode deixar o que você coletou aqui."
10012040-94 = "Sim... obrigada."
10012040-99 = "...Nós acabamos voltando para cá de novo, não é?"
10012040-100 = "Mesmo depois de tudo o que aconteceu agora pouco..."
10012040-102 = "Quem diria que havia outras pessoas além de nós..."
10012040-103 = "Na verdade, foi justamente por causa disso que viemos todos juntos. É perigoso se formos atacados de novo."
10012040-104 = "Se eles não estivessem lá, poderíamos ter nos separado..."
10012040-105 = "Queda de helicóptero, restauração do resort... e agora uma briga."
10012040-106 = "Uma atrás da outra, não tem fim..."
10012040-108 = "…………。"
10012040-109 = "……Será que está tudo bem? A Wakamo-san... não parecia ser uma pessoa comum."
10012040-110 = "Acho que não precisa se preocupar. Não há necessidade de mudar nossas ações por causa dela."
10012040-111 = "Se ela aparecer de novo, é só lidar com ela na hora."
10012040-112 = "É, é isso mesmo que devemos fazer...?"
10012040-113 = "……Bem, vou indo de novo."
10012040-122 = "……Ah, ela foi embora."
10012040-123 = "……Não tem jeito. Você sabe que não dá para parar a Shiroko-senpai quando ela coloca algo na cabeça."
10012040-124 = "[s1] \"Parece que ela acha que não precisamos evitar nada.\"\n[s2] \"É bem a cara da Shiroko, mas...\""
10012040-127 = "Bom, é bem coisa de jovem, né?"
10012040-128 = "Se não tem vara de pesca, ela vai lá e mergulha para pegar... de onde vem tanta energia...?"
10012040-129 = "Graças a isso, não nos falta comida! Peixes, abalones..."
10012040-130 = "Além disso, se ela atacar de novo, não daria para resolver conversando?"
10012040-131 = "O resort é enorme! Poderíamos dividir e usar o espaço pacificamente...!"
10012040-132 = "Já brigamos duas vezes, será que ainda dá para resolver na conversa...?"
10012040-133 = "B-bem, não é como se fosse totalmente impossível..."
10012040-134 = "Mesmo que não dê para ser amigos, talvez possamos definir espaços separados, algo assim."
10012040-135 = "Embora a Wakamo-san me deixe um pouco preocupada..."
10012040-136 = "[s3] \"Preocupada?\"\n[s4] \"Está com receio?\""
10012040-137 = "Não, é só um pressentimento, talvez seja apenas coisa da minha cabeça..."
10012040-138 = "Não, é só um pressentimento, talvez seja apenas coisa da minha cabeça..."
10012040-139 = "Sinto que seria melhor evitar que a Shiroko-senpai e aquela pessoa se encontrem..."
10012040-140 = "Achei vocês!!"
10012040-141 = "……Ah."
10012040-142 = "[s5] \"Que timing incrível.\"\n[s6] \"Falando no diabo...\""
10012040-143 = "Ué, o quê? Ela veio mesmo de novo?"
10012040-144 = "Ué, o quê? Ela veio mesmo de novo?"
10012040-145 = "……Aquela é a tal da Wakamo?"
10012040-146 = "Sensei, não se preocupe mais! Eu, Wakamo, vim para salvá-lo!!"
10012040-147 = "……Ah, sim. É ela mesma!"
10012040-148 = "……Mas, espera aí?"
10012040-149 = "Ela não acabou de dizer algo estranho...?"
10012040-150 = "……Pois é. Disse que veio \"salvar o Sensei\"...?"
10012040-156 = "Ser capturado por vilões misteriosos e trazido para um lugar tão longe como este..."
10012040-157 = "Se eu, Wakamo, estivesse ao seu lado, isso nunca teria acontecido!"
10012040-158 = "Peço perdão pela demora..."
10012040-159 = "Eu, Wakamo,"
10012040-160 = "irei salvá-lo, Sensei."
10012040-168 = "……Hum?"
10012040-169 = "……Ah~, será que ela acha que nós sequestramos você?"
10012040-170 = "Uhe~, eu não fazia ideia."
10012040-171 = "Sim, sim! Na verdade, nós somos sequestradores~☆"
10012040-172 = "Por que você está concordando com isso?! Vai acabar causando um mal-entendido!"
10012040-174 = "E-esperem! Pessoal, antes de lutarem, vamos conversar...!"
10012040-175 = "O resort é grande, então cada um pode aproveitar em um lugar diferente..."
10012040-177 = "……Conversar?"
10012040-178 = "Ufufu. Conversar... que palavra interessante..."
10012040-179 = "Todos, ataquem! Eu vou salvar o Sensei!!!"
10012040-180 = "……Ei! Não era para conversar?!"
10012040-182 = "A-ataque! Ataqueee!!"
10012040-183 = "A-ataque...!"
10012040-184 = "Desde quando a gente ficou assim, Capitão~~!"
10012040-185 = "N-não pergunta pra mim!"
10012040-186 = "Por enquanto, vamos fazer o que nos mandaram! Ataque, começar!"
