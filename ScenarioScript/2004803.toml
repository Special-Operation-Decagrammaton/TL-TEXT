[translation]
2004803-1 = "Nagisa-sama à deriva"
2004803-2 = "（Fui até a tenda que a Nagisa mencionou）"
2004803-3 = "（É aqui dentro...?）"
2004803-5 = "Praia particular"
2004803-6 = "[ns] Abro a tenda."
2004803-9 = "[ns] \"...Uma prancha de surfe?\""
2004803-10 = "（Dentro da tenda, havia todo tipo de equipamento de lazer aquático: pranchas de surfe, banana boats, esquis aquáticos, caiaques e muito mais.）"
2004803-11 = "（Mas, ainda assim...）"
2004803-12 = "[ns] \"...Realmente, parece que ninguém está usando.\""
2004803-13 = "（Há uma fina camada de poeira sobre as pranchas）"
2004803-17 = "（Já que estou aqui...）"
2004803-18 = "[ns] \"Acho que vou tentar surfar.\""
2004803-20 = "（Peguei a prancha debaixo do braço e fui em direção ao mar, cheio de entusiasmo）"
2004803-22 = "（No entanto...）"
2004803-24 = "Em algum lugar no mar"
2004803-26 = "[ns] \"Opa, opa... Uau!\""
2004803-27 = "（Longe de surfar nas ondas, mal consigo ficar de pé na prancha...!）"
2004803-31 = "[ns] \"Cof, cof... glup, glup...!\""
2004803-32 = "（...Quando perdi a conta de quantas vezes caí na água）"
2004803-33 = "......Sensei?"
2004803-36 = "[wa:1160]― [log=나기사 수영복]......O que [wa:850]está fazendo em um lugar como este?[/log]"
2004803-38 = "― [log=나기사 수영복]Você parece tão [wa:670]exausto...[/log]"
2004803-41 = "[ns] \"Eu estava... enfrentando as ondas bravias...\""
2004803-42 = "[wa:330]― [log=나기사 수영복]......?[wa:1660] Poderia ser um pouco [wa:980]mais específico?[/log]"
2004803-45 = "― [log=나기사 수영복]O mar é um lugar que, [wa:1350]se você cometer um erro,"
2004803-47 = "[wa:810]pode acabar em um acidente [wa:590]perigoso.[/log]"
2004803-50 = "[ns] \"Não... eu não estava fazendo nada perigoso, na verdade...\""
2004803-51 = "[wa:400]― [log=나기사 수영복]Não estou [wa:760]entendendo nada...[/log]"
2004803-53 = "― [log=나기사 수영복]Dependendo da situação, [wa:1640]a resposta necessária [wa:1060]é diferente――[/log]"
2004803-56 = "[ns] \"Eu não conseguia subir na prancha direito... e caí várias vezes.\""
2004803-57 = "[wa:700]― [log=나기사 수영복]Entendo, [wa:1270]era isso então.[/log]"
2004803-59 = "― [log=나기사 수영복]Fico aliviada [wa:800]em saber que não estava [wa:1130]em perigo.[/log]"
2004803-62 = "― [log=나기사 수영복]Dizem que pegar o jeito do equilíbrio [wa:920]é o primeiro grande desafio"
2004803-64 = "― [log=나기사 수영복]do surfe, [wa:580]por assim [wa:960]dizer.[/log]"
2004803-67 = "― [log=나기사 수영복]É algo que todos passam [wa:1300]no início.[/log]"
2004803-70 = "[wa:250]― [log=나기사 수영복]Dito isso... [wa:1800]mesmo que queira descansar,"
2004803-72 = "― [log=나기사 수영복]você vai acabar [wa:910]ficando com frio.[/log]"
2004803-75 = "― [log=나기사 수영복]Venha por aqui.[/log]"
2004803-77 = "― [log=나기사 수영복]Preparei uma bebida [wa:1080]quente para você.[/log]"
2004803-82 = "Foi uma boa ideia trazer a garrafa térmica."
2004803-83 = "Acho que vai se aquecer logo."
2004803-84 = "[s] \"Chá até mesmo no meio do mar?\""
2004803-85 = "Fufu, isso é apenas água quente."
2004803-86 = "O sabor do chá muda se você o colocar na garrafa térmica."
2004803-87 = "Por que estou aqui, você pergunta...?"
2004803-88 = "......Eu queria tentar surfar um pouco, por capricho."
2004803-89 = "Já estava um pouco cansada de ficar na areia, sentindo a brisa do mar e observando o horizonte..."
2004803-90 = "Mas também não estava com vontade de nadar por aí..."
2004803-91 = "Queria passar o tempo com calma, mas estava um pouco entediada――"
2004803-92 = "Você consegue entender esse estado de espírito...?"
2004803-93 = "[s] \"De alguma forma, acho que consigo entender...!\""
2004803-94 = "Fufu, fico feliz que diga isso."
2004803-95 = "Se eu me deixar levar pelas ondas, talvez consiga encontrar um equilíbrio para esses sentimentos contraditórios..."
2004803-96 = "Pensei que meu coração poderia descansar, então decidi tentar."
2004803-97 = "No fim das contas... foi a escolha certa."
2004803-98 = "Pois, dessa forma... eu pude encontrar você, Sensei."
2004803-100 = "(Enquanto bebia água quente com Nagisa sobre o mar, aquecemos nossos corpos)"
