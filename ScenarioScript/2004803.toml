[translation]
2004803-1 = "[ruby=みなも]水面[/ruby]漂うナギサ様"
2004803-2 = "（ナギサの言っていたテントに向かった）"
2004803-3 = "（この中か……）"
2004803-5 = "プライベートビーチ"
2004803-6 = "[ns] テントを開けてみる。"
2004803-9 = "[ns] \"……サーフボード？\""
2004803-10 = "（テントの中には、サーフボードやバナナボート、水上スキー、カヤックなど、ありとあらゆる水上レジャー用品が揃っていた）"
2004803-11 = "（それにしても……）"
2004803-12 = "[ns] \"……たしかに、誰も使ってないみたい。\""
2004803-13 = "（ボードにうっすら埃が積もっている）"
2004803-17 = "（せっかくだし……）"
2004803-18 = "[ns] \"サーフィンに挑戦してみようかな。\""
2004803-20 = "（サーフボードを脇に抱え、意気揚々と海へ向かった）"
2004803-22 = "（ところが……）"
2004803-24 = "海上のどこか"
2004803-26 = "[ns] \"とっとっと……うわぁっ！\""
2004803-27 = "（波に乗るどころか、ボードの上に立つのすら難しい……！）"
2004803-31 = "[ns] \"ゴホッ、あっぷあっぷ……！\""
2004803-32 = "（……何回水に落ちたか分からなくなった頃）"
2004803-33 = "……先生？"
2004803-36 = "[wa:1160]― [log=나기사 수영복]……こんなところで[wa:850]どうなさったんですか？[/log]"
2004803-38 = "― [log=나기사 수영복]そんなに[wa:670]ぐったりとされて……。[/log]"
2004803-41 = "[ns] \"荒波に立ち向かっていた……とこ……。\""
2004803-42 = "[wa:330]― [log=나기사 수영복]……？[wa:1660]もう少し[wa:980]具体的に伺っても？[/log]"
2004803-45 = "― [log=나기사 수영복]海は、[wa:1350]一歩間違えば[/log]"
2004803-47 = "― [log=나기사 수영복]危険な事故に[wa:810]つながりかねない[wa:590]場所ですから。[/log]"
2004803-50 = "[ns] \"いや……危ないことはしてなかったんだけどね……。\""
2004803-51 = "[wa:400]― [log=나기사 수영복]要領を[wa:760]得ませんね……。[/log]"
2004803-53 = "― [log=나기사 수영복]状況に応じて、[wa:1640]求められる対応は[wa:1060]異なりますので――[/log]"
2004803-56 = "[ns] \"ボードに上手く乗れなくて……何回も落ちちゃってさ。\""
2004803-57 = "[wa:700]― [log=나기사 수영복]なるほど、[wa:1270]そういうことでしたか。[/log]"
2004803-59 = "― [log=나기사 수영복]危険な状態では[wa:800]なかったようで、[wa:1130]一安心です。[/log]"
2004803-62 = "― [log=나기사 수영복]バランス感覚を[wa:920]掴むまでが、[/log]"
2004803-64 = "― [log=나기사 수영복]サーフィンの[wa:580]最初の山場とも[wa:960]申します。[/log]"
2004803-67 = "― [log=나기사 수영복]最初のうちは、[wa:1300]誰もが経験することですよ。[/log]"
2004803-70 = "[wa:250]― [log=나기사 수영복]とはいえ……[wa:1800]休憩されるにしても、[/log]"
2004803-72 = "― [log=나기사 수영복]それではお身体が[wa:910]冷えてしまいますね。[/log]"
2004803-75 = "― [log=나기사 수영복]こちらへどうぞ。[/log]"
2004803-77 = "― [log=나기사 수영복]温かい飲み物も[wa:1080]ご用意しておりますので。[/log]"
2004803-82 = "ポットを持ってきて正解でしたね。"
2004803-83 = "すぐ温まると思いますよ。"
2004803-84 = "[s] \"海の上でも紅茶なの？\""
2004803-85 = "ふふ、こちらは白湯ですよ。 "
2004803-86 = "紅茶はポットに入れると風味が変わってしまいますので。"
2004803-87 = "どうしてここにいるのか、と……？"
2004803-88 = "……気ままに波に乗ってみたかったんです。"
2004803-89 = "砂浜で海風を浴び、じっと水平線を眺めているのにも……少々飽きてしまいまして。"
2004803-90 = "ですが、泳ぎ回る気分でもなく……。"
2004803-91 = "ゆっくり過ごしたいけれど、どこか退屈――"
2004803-92 = "この心境を、ご理解いただけますでしょうか……？"
2004803-93 = "[s] \"なんとなく、分かる気がするよ……！\""
2004803-94 = "ふふ、そう言って頂けて嬉しいです。"
2004803-95 = "波に身を任せ漂えば、この矛盾する感情にも折り合いがついて――"
2004803-96 = "心が休まるのではないかと、こうして試していたのです。"
2004803-97 = "結果として……正しい選択でしたね。"
2004803-98 = "こうして……先生と、巡り会うことができましたから。"
2004803-100 = "（ナギサと海の上で白湯を飲みながら、体を温めた）"
