[translation]
42110-1 = "Episódio 11; Café preto"
42110-2 = "Perto da Estação Coelho"
42110-3 = "（No dia seguinte, enquanto caminhava pela área urbana para encontrar o RABBIT Squad...）"
42110-7 = "……O que é inaceitável, é inaceitável!#nUma aluna da Valkyrie pretende ignorar as regras?"
42110-8 = "Esta pessoa não é suspeita!#nÉ uma cidadã que mora nesta região!"
42110-9 = "Até ontem, ela trocou cumprimentos comigo em frente à estação e..."
42110-10 = "Se houver algum problema, eu assumirei a responsabilidade, então#npoderia abrir uma exceção desta vez...?"
42110-11 = "Não é um problema que possa ser ignorado apenas com a garantia de uma aluna. #nSe tem reclamações sobre as regras, entre em contato com o responsável."
42110-12 = "Se a Valkyrie não pode assumir a responsabilidade pela segurança dos cidadãos, #nentão quem pode dizer que assume?"
42110-17 = "Uu, sinto muito..."
42110-18 = "[s] \"……O que aconteceu aqui?\""
42110-23 = "Ah, Sensei...!"
42110-24 = " ……Tsc, o Sensei do Schale."
42110-25 = "É que... quando esta pessoa tentou pegar o trem para ir ao hospital..."
42110-26 = "A Kaiser Security disse que \"as normas de uso do metrô mudaram\", bloqueou a entrada e começou a fazer inspeções..."
42110-27 = "Algum problema?#nEstamos apenas seguindo as regras e investigando pessoas suspeitas."
42110-28 = "Ultimamente, elementos perturbadores que estão insatisfeitos com a nova Presidente em exercício do Conselho Estudantil Federal têm aparecido em vários lugares. Até ataques terroristas estão ocorrendo."
42110-29 = "Por isso, com base na \"Nova Ordem Administrativa para a Segurança do Transporte Público de D.U.\", todos os cidadãos que entram e saem da estação não podem passar sem mostrar aos seguranças: #n\"Bilhete de ida e volta\", \"Recibo\", \"Permissão de trânsito\", \"Mapa da linha do metrô\" e \"Cópia do registro de empréstimo da Biblioteca Municipal de D.U.\"."
42110-30 = "[s1] \"……Só para pegar o trem?\"\n[s2] \"Cópia do registro de empréstimo da biblioteca\"……?\""
42110-31 = "Todas as normas foram instruídas pela Presidente em exercício do Conselho Estudantil Federal para criar um Kivotos seguro e confortável."
42110-32 = "Se alguém pegar um livro na biblioteca municipal e ficar muito tempo em outro distrito sem devolvê-lo, os funcionários ficariam preocupados, não é?"
42110-33 = "Todas as normas foram instruídas pela Presidente em exercício do Conselho Estudantil Federal para criar um Kivotos seguro e confortável."
42110-35 = "Ma-mas até ontem só precisava do bilhete de passagem...?#nEu não sabia que precisava de tantos documentos só para pegar o trem."
42110-36 = "Quanto ao registro de empréstimo da biblioteca... eu não vou à biblioteca há anos..."
42110-37 = "Se não pode apresentar, terá que desistir de entrar na estação."
42110-38 = "Prepare os documentos e volte depois, ou procure outro meio de transporte."
42110-39 = "Mas os ônibus da Cidade Coelho não estão operando... Mesmo que eu vá andando para o hospital mais próximo, levaria mais de uma hora..."
42110-43 = "Uuu... minha barriga..."
42110-45 = "Is-isso não é uma emergência?!#nSe não a levarmos ao hospital logo――"
42110-47 = "Isso não é problema nosso."
42110-53 = "A nova ordem administrativa já tinha sido divulgada para que todos verificassem, não é?"
42110-54 = "Não me venha transferir a responsabilidade pela sua própria negligência."
42110-56 = "……O que você disse agora?"
42110-57 = "Opa, que cara é essa?"
42110-58 = "Uma aluna da Escola de Polícia Valkyrie, que está sob o comando da Sala de Defesa, pretende se opor à nossa Kaiser Security, que recebeu plenos poderes da Presidente em exercício Kaya?"
42110-59 = "Se souberem que uma aluna da Escola de Polícia Valkyrie fez algo assim, #no que os cidadãos vão pensar da Valkyrie?"
42110-60 = "Eu não pretendia lutar, mas daqui para frente..."
42110-61 = "[s] \"Kirino, espere――\""
42110-66 = "Se os documentos estiverem completos, ela pode passar por aqui, certo?"
42110-74 = "Sendo assim―― deixe comigo."
42110-76 = "……Diretora Kanna!"
42110-77 = "Hmph, pretende levar esta cidadã à repartição pública agora?"
42110-79 = "Não há necessidade. Podemos preparar tudo agora mesmo."
42110-83 = "Como os recibos passaram a ser eletrônicos desde o mês passado, devem ter chegado por e-mail. Verifique a caixa de entrada do seu celular."
42110-87 = "Ah, é verdade... o recibo chegou!"
42110-89 = "Quanto à permissão de trânsito, existe um anexo que diz que, durante o período de carência após a publicação da ordem administrativa, as alunas da Escola de Polícia Valkyrie podem criar permissões temporárias em nome do órgão público――"
42110-93 = "――Este é o modelo da permissão. #nKirino, assine aqui embaixo."
42110-94 = "Si-sim...!"
42110-95 = "O mapa da linha do metrô é distribuído gratuitamente na estação."
42110-97 = "……E a cópia do registro de empréstimo da Biblioteca Municipal?"
42110-99 = "Cópias de registros de empréstimo da Biblioteca Municipal de D.U. não são emitidas para pessoas que não utilizam o serviço há muito tempo."
42110-103 = "Este cidadão não utiliza a biblioteca há mais de 2 anos. #nAcredito que a obrigação de apresentar tal documento deva ser dispensada."
42110-104 = "……Com isso, todos os documentos necessários estão aqui, certo?"
42110-108 = "……Tsc, pode passar."
42110-110 = "M-muito obrigada……!"
42110-117 = "Haa, desde que voltei ao trabalho, só tenho tido problemas……."
42110-119 = "Muito obrigada, Chefe Kanna! #nGraças a você, consegui ajudar o cidadão!"
42110-124 = "…Nakatsukasa Kirino!"
42110-129 = "S-sim!?"
42110-130 = "O que você pretendia fazer naquela situação agora há pouco, colocando a mão na sua arma?"
42110-131 = "Só porque não conseguia conversar com a outra parte, você pretendia abrir fogo dentro da cidade?"
42110-132 = "N-não! De forma alguma eu tive essa intenção!"
42110-133 = "Eu só…… tentei usar uma granada de fumaça para sair da situação e #najudar o cidadão a chegar até a plataforma da estação, mas……."
42110-134 = "Você acha mesmo que os guardas da Kaiser Security, armados com armas pesadas, #ndeixariam alguém passar só por causa de uma simples granada de fumaça?"
42110-135 = "I-isso é…… verdade, né……"
42110-136 = "Haa…… eu já disse para você considerar pedir ajuda a outros departamentos……"
42110-142 = "Ei, que confusão é aquela……?"
42110-143 = "Parece que a Kaiser Security e uma aluna da Valkyrie estavam discutindo……"
42110-144 = "Será que tem a ver com as ordens administrativas publicadas recentemente? #nAs regras são excessivas e chatas, mas chegar ao ponto de brigar……"
42110-145 = "……Vamos mudar de lugar."
42110-146 = "Estou exausta de tudo isso, estou com vontade de tomar um café."
42110-147 = "Ah, nesse caso, deixe comigo!"
42110-148 = "Tem um café aqui perto que faz rosquinhas deliciosas!"
42110-149 = "Rosquinhas não são bem…… bem, tanto faz, vamos nos mover."
42110-158 = "[ns3] \"Com licença, três cafés quentes e, \" \n[ns4] \"por favor, um conjunto de rosquinhas de chocolate.\""
42110-163 = "……Por que o Sensei fez o pedido?"
42110-164 = "Era para eu ter feito……"
42110-165 = "[s5] \"Vocês duas se esforçaram muito hoje.\" \n[s6] \"Deixem que eu pago desta vez.\""
42110-170 = "……O Sensei continua o mesmo de sempre."
42110-177 = "Obrigada pela espera! #nAqui estão os cafés quentes e o conjunto de rosquinhas de chocolate que pediram!"
42110-179 = "Ah, chegou. #nAs rosquinhas de chocolate especiais daqui são uma iguaria!"
42110-180 = "Foi a Fubuki quem me indicou este lugar, e elas realmente combinam muito bem com café……"
42110-181 = "Mesmo sendo um chocolate amargo, quando você come junto com o café, o dulçor sutil se destaca……"
42110-185 = "<……A Kaiser Security não abandona a gestão da segurança pública para ficar comendo rosquinhas por aí como os preguiçosos da Academia de Polícia Valkyrie.>"
42110-189 = "<Nós oferecemos soluções ideais de gestão de segurança baseadas em diversas experiências operacionais, através de nossos agentes veteranos vindos de PMCs.>"
42110-190 = "<Aqui em D.U., sob as instruções da nova Presidente Interina do Conselho Estudantil, Kaya, reforçamos a segurança e, como resultado das fiscalizações em vários locais, alcançamos uma redução de mais de 50% na taxa de criminalidade.>"
42110-191 = "<A Kaiser Security garante a paz e a realização da justiça social em D.U.>"
42110-192 = "……Que paz, hein."
42110-193 = "Ahaha…… é, pois é……"
42110-197 = "……Ouvi rumores de que você recusou a proposta de melhoria para o Schale apresentada pela Interina Kaya."
42110-198 = "Não sei os detalhes, mas ouvi dizer que não era uma proposta ruim para o Sensei……"
42110-199 = "Mesmo assim, você recusou…… isso tem a ver com as suas convicções, Sensei?"
42110-203 = "[ns] \"……É, pode se dizer que sim.\""
42110-204 = "……Entendo. #nManter as próprias convicções também é importante, afinal."
42110-205 = "Mas ela é ambiciosa. Recusar pode acabar gerando problemas. Acho que o Sensei sabe disso melhor do que ninguém."
42110-206 = "[s] \"A Kanna também me ajudou seguindo suas próprias convicções, não foi?\""
42110-207 = "Isso é……"
42110-212 = "……É verdade."
42110-213 = "[s7] \"……Aquele ferimento daquela época já está bom?\" \n[s8] \"Você já voltou ao trabalho?\""
42110-214 = "Sim, graças a você."
42110-218 = "Para começar, a conclusão é esta――"
42110-222 = "Para começar, a conclusão é esta――"
42110-230 = "Eu não sou mais a Chefe do Departamento de Segurança Pública."
42110-231 = "Para ser mais exata―― seria correto dizer que fui suspensa disciplinarmente e destituída do meu cargo."
42110-232 = "[s] \"Por acaso, foi por minha causa――\""
42110-233 = "Não se preocupe. A culpa não é sua, Sensei."
42110-234 = "Afinal, mesmo sendo uma situação de emergência, a Chefe do Departamento de Segurança Pública, que deveria ser mais rigorosa que qualquer um, #ncontestou as ordens de um superior por julgamento pessoal e se tornou hostil."
42110-235 = "Mesmo que esse julgamento estivesse correto, não posso fugir da responsabilidade. Na verdade, quanto mais se permite exceções às regras, mais elas acabam sendo mal utilizadas."
42110-236 = "Este é o preço que pago por manter minhas convicções. É uma punição adequada. #nNa verdade, comparado com o que eu esperava inicialmente, é até leve demais……"
42110-238 = "Mas……"
42110-244 = "Talvez para tentar amenizar minha punição, os alunos do Departamento de Segurança Pública estão resistindo às ordens da alta cúpula…… e, por isso, o Departamento está atualmente incapaz de exercer suas funções originais."
42110-245 = "Acredito que foi por esse motivo que a Agente Kaya decidiu recorrer à ajuda de empresas privadas."
42110-246 = "A Kaiser Security é uma organização mais eficiente e racional do que o Departamento de Segurança Pública, afinal."
42110-247 = "Tenho certeza de que eles cumprirão as regras e protegerão a paz de Kivotos sem hesitar."
42110-251 = "……Se há algo que me preocupa."
42110-262 = "Várias restrições foram reforçadas para prevenir crimes, e os guardas vigiam os becos tão de perto que nem um rato consegue passar."
42110-263 = "As atividades das empresas, exceto a Kaiser Corporation, diminuíram, #ne os cidadãos estão evitando sair por medo do olhar da Kaiser, nesta situação……"
42110-264 = "Mesmo sendo para prevenir crimes…… será que podemos continuar assim?"
42110-267 = "……Eu já não sei de mais nada."
42110-268 = "――Só posso rezar para que meu julgamento não tenha sido um erro."
42110-269 = "[s] \"Sim. Mas a Kanna apenas fez o que deveria ser feito.\""
42110-270 = "O que deveria ser feito…… Não é bem assim. #nNão é algo tão nobre quanto isso――"
42110-271 = "Pois eu não passo de uma vilã de terceira categoria."
42110-272 = "Alguém que deveria ter saído do palco mais cedo, mas que perdeu o momento certo para se retirar――"
42110-273 = "A-A Chefe Kanna não é uma vilã de terceira categoria!"
42110-274 = "……Kirino?"
42110-275 = "A Chefe é ótima na mira, o trabalho de papelada é perfeito, #ne você é sempre gentil com os cidadãos……!"
42110-277 = "Dizer que a Chefe, que é a admiração de todos os alunos da Valkyrie, é de terceira categoria…… #nNão importa quem diga isso, eu nunca vou aceitar!"
42110-278 = "Para me tornar uma policial incrível como a Chefe Kanna, eu me esforço diariamente no treinamento de tiro! Por favor, não fale de si mesma desse jeito!"
42110-284 = "Eu não esperava que você fosse dizer algo assim……"
42110-285 = "Infelizmente, mesmo que você se esforce no treinamento de tiro todos os dias, você não vai se tornar como eu."
42110-287 = "Aaaah, não diga isso~"
42110-288 = "……Mas, o mesmo vale para mim."
42110-292 = "Não importa o quanto eu me esforce, provavelmente não conseguirei ser uma oficial de segurança pública excelente e confiável para os cidadãos como você."
42110-293 = "Você tem suas próprias forças. Nunca se esqueça disso."
42110-294 = "Chefe Kanna……!"
42110-300 = "……A Agente da Presidência do Conselho Estudantil, Kaya, deve admitir seu erro! Admita!"
42110-301 = "O Conselho Estudantil Federal deve garantir 5 dias de folga por semana!"
42110-302 = "Se não aceitarem nossas exigências, vamos comer 3 pudins!"
42110-304 = "De onde esse pessoal apareceu?"
42110-305 = "Não importa quantos a gente prenda, não tem fim! #nDroga, o posto de controle está paralisado por causa deles……!"
42110-306 = "Apoio, solicito apoio!"
42110-307 = "……Parece que ainda precisam da nossa ajuda."
42110-311 = "Kirino, está na hora de ir."
42110-312 = "Mesmo que a gestão da segurança tenha sido transferida para a Kaiser Security, #nenquanto formos alunas da escola de polícia, não podemos ignorar o caos na cidade."
42110-313 = "S-Sim, senhora!"
42110-314 = "……Então, Sensei, nos vemos em algum outro lugar."
42110-315 = "Obrigada pelos donuts, Sensei [USERNAME]!"
42110-323 = "(Terminou de beber o café e foi em direção ao Parque dos Coelhinhos, onde o RABBIT Squad está.)"
42110-325 = "Próximo episódio: Decisão"
