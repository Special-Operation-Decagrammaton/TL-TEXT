[translation]#[Texto revisado, mas pode haver alterações como Censura.] Em aguardo de revisão de formatação de texto. - Filipe 10/06.
42110-1 = "Episódio 11;Café Preto sem Açúcar"
42110-2 = "Arredores da Estação dos Coelhinhos"
42110-3 = "（No dia seguinte, enquanto eu caminhava pela cidade em direção ao parque para encontrar o Esquadrão RABBIT……）"
42110-7 = "……Eu já disse que não e ponto final!#nVocê é uma cadete da Valkyrie e quer que eu rasgue o protocolo?!"
42110-8 = "Mas esse senhor não é um criminoso suspeito!#nEle é um civil morador do distrito!"
42110-9 = "Ontem mesmo eu cruzei com ele na estação e nós trocamos bom-dia……"
42110-10 = "Eu coloco a minha farda e o meu nome como garantia.#nSe der qualquer problema, eu assumo a culpa. Por favor, libere a passagem dele só dessa vez……!"
42110-11 = "A garantia de uma patrulheira insignificante vale zero.#nSe você tem algum problema com o decreto de tolerância zero, ligue pro Serviço de Atendimento ao Consumidor e reclame com os engravatados."
42110-12 = "Vocês da Valkyrie provaram que são uma piada de mau gosto e perderam o direito de cuidar da cidade.#nQuem dita as regras de segurança agora somos nós, a segurança privada."
42110-17 = "Uuuh, me desculpe……"
42110-18 = "[s] \"……Qual é o problema aqui?\""
42110-23 = "Ah, Sensei……!"
42110-24 = "……Tsc. O figurão da Schale em pessoa."
42110-25 = "É que…… O senhor precisa de tratamento médico e tentou entrar na estação pra pegar o trem pro hospital……"
42110-26 = "Mas esses mercenários da Kaiser Security bloquearam as catracas dizendo que as leis de embarque mudaram, e começaram a interrogá-lo……"
42110-27 = "Algum problema?#nNós só estamos seguindo o protocolo e filtrando indivíduos suspeitos."
42110-28 = "A inteligência reportou que células rebeldes insatisfeitas com o glorioso Novo Governo de Kaya estão tentando espalhar o caos pela cidade. Nós já tivemos relatos de pequenos atentados hoje cedo."
42110-29 = "Para blindar a infraestrutura pública de ameaças,#no Novo Decreto exige que todos os civis que desejem utilizar o transporte ferroviário apresentem, obrigatoriamente: \"Bilhete de Ida e Volta\", \"Comprovante Fiscal Eletrônico\", \"Passe Livre Intermunicipal\", \"Mapa Geográfico do Metrô\"…… e, por fim, \"Uma Cópia Autenticada do Histórico de Empréstimos da Biblioteca Municipal de D.U.\"."
42110-30 = "[s1] \"……Tudo isso só pra passar na catraca do trem?\"\n[s2] \"O que diabos uma ficha de biblioteca tem a ver com terrorismo?!\""
42110-31 = "Todos os novos decretos foram minuciosamente projetados pelo genial cérebro da Presidente Interina para forjar uma Kivotos limpa e estéril."
42110-32 = "É óbvio, não? Se um civil mal-intencionado pegar um livro da biblioteca e usar o trem pra fugir para outro distrito sem devolver, o patrimônio público será lesado. Nós prevenimos crimes literários."
42110-33 = "Todo civil honesto que não tem nada a esconder deve saudar essas medidas que garantem a paz."
42110-35 = "M-Mas até ontem à noite bastava encostar o bilhete na catraca e pronto……?!#nNinguém avisou que precisaríamos dessa papelada maluca só pra pegar condução!"
42110-36 = "E sobre a ficha da biblioteca…… eu não ponho os pés numa biblioteca há mais de dois anos…… eu não leio livros faz tempo……"
42110-37 = "Se não tem o documento e não pode provar inocência intelectual, o acesso é negado."
42110-38 = "Ou você volta pra casa pra imprimir tudo, ou vai pro seu hospital andando a pé."
42110-39 = "Mas os ônibus circulares do nosso bairro não estão passando hoje……#nSe eu for caminhando, vou demorar horas pra chegar no médico……"
42110-43 = "Urgh…… meu estômago…… a dor tá piorando……"
42110-45 = "Tá vendo?! O homem tá passando mal, é uma emergência médica!#nDeixem ele pegar o trem logo antes que――"
42110-47 = "Se ele desmaiar na calçada, o problema é dele, não nosso."
42110-53 = "Os Novos Decretos foram transmitidos por todas as telas da cidade de madrugada.#nA ignorância do cidadão preguiçoso não é desculpa para burlar a lei."
42110-54 = "Não tente transferir a culpa da sua própria burrice para o sistema."
42110-56 = "……O que foi que você disse?"
42110-57 = "Opa. Por que essa cara de raiva?"
42110-58 = "A cadete da fracassada Valkyrie vai querer comprar briga com a força soberana da Kaiser, que opera sob o manto direto e absoluto da Presidente Kaya?"
42110-59 = "Imagina só se vazar nos jornais que uma aluna da Valkyrie agrediu a nova segurança da cidade…… o respeito público que já é um lixo de vocês vai descer pro esgoto de vez, né?"
42110-60 = "E-Eu não quero briga física…… mas se vocês não vão arredar o pé……"
42110-61 = "[s] \"Kirino, calma, não puxe o gatilho――\""
42110-66 = "Vocês afirmaram que se as papeladas estiverem em ordem, o acesso é livre. Confere?"
42110-74 = "Nesse caso―― Eu resolvo."
42110-76 = "……Chefe Kanna!!"
42110-77 = "Hmph. O que foi agora? Vai arrastar o doente pro asilo nas costas, ex-Diretora?"
42110-79 = "Isso não será necessário. Nós vamos prover a documentação neste exato segundo."
42110-83 = "Os bilhetes da catraca foram digitalizados no mês passado. Procure no lixo eletrônico do seu e-mail do celular que o comprovante fiscal da compra do bilhete deve estar lá, senhor."
42110-87 = "A-Ah…… vocês têm razão…… achei o e-mail aqui!"
42110-89 = "Quanto ao Passe Livre Intermunicipal…… há um adendo no artigo transitório da lei de hoje que estipula que, durante o período de adaptação de 24 horas, agentes juramentados da Valkyrie têm autonomia legal para emitir passes temporários em papel."
42110-93 = "――Aqui está o bloco de formulário. Kirino, assine no rodapé com o seu número de distintivo e bata o carimbo."
42110-94 = "S-Sim senhora!!"
42110-95 = "O Mapa Geográfico do Metrô pode ser pego de graça naqueles panfletos ali do guichê da entrada."
42110-97 = "……E quanto à maldita Cópia Autenticada da Biblioteca?"
42110-99 = "O banco de dados da Biblioteca Municipal de D.U. expurga e inativa automaticamente o cadastro de qualquer usuário que fique mais de um ano sem alugar nenhum livro."
42110-103 = "Como o cidadão acabou de declarar que não pisa numa biblioteca há dois anos, o sistema dele é nulo.#nDe acordo com a jurisprudência burocrática, ele está isento de apresentar um documento que legalmente não existe."
42110-104 = "……O bingo da burocracia está completo. Ele pode entrar agora?"
42110-108 = "……Tsc. Catraca liberada. Passem."
42110-110 = "M-Muitíssimo obrigado……!"
42110-117 = "Haaah…… Meu primeiro dia de volta ao fardamento normal e as dores de cabeça já estão acumulando."
42110-119 = "Obrigada, Chefe Kanna!#nVocê usou a burocracia pra salvar a vida do cidadão, foi incrível!"
42110-124 = "…Nakatsukasa Kirino!"
42110-129 = "S-Sim senhora?!"
42110-130 = "Quando as coisas apertaram ali atrás…… você levou a mão ao coldre da arma. Qual era o seu plano brilhante?"
42110-131 = "Se os mercenários não liberassem a catraca com conversa, você iria abrir fogo letal no meio de uma avenida lotada?!"
42110-132 = "N-N-Não!! Nunca! Essa não era a minha intenção!"
42110-133 = "Eu…… eu ia tacar uma granada de fumaça na cara deles pra cegar todo mundo……#ne arrastar o cidadão pra dentro do trem na confusão……"
42110-134 = "Você acha mesmo que mercenários da Kaiser, armados com fuzis pesados e viseiras táticas noturnas, iriam engolir poeira e não iam atirar cegamente no meio da fumaça?"
42110-135 = "Ahm…… quando a senhora coloca dessa forma…… faz sentido……"
42110-136 = "Haaah…… Essa sua teimosia insana de tentar resolver tudo na força bruta em vez de pedir suporte pelo rádio é o que vai te matar um d――"
42110-142 = "Opa. Que zona é essa ali na frente……?"
42110-143 = "Aqueles arruaceiros com megafones tão batendo boca e empurrando a linha de escudos da Kaiser Security……"
42110-144 = "Mais protestos contra os decretos matinais da Presidente?#nAs regras até que são chatas de seguir, mas se arriscar a tomar tiro de fuzil por causa disso é loucura……"
42110-145 = "……Vamos sair daqui."
42110-146 = "O meu pavio tá curto demais hoje, e meu sangue tá pedindo uma dose forte de cafeína para não enlouquecer."
42110-147 = "Ah, então deixa comigo! Eu conheço o lugar perfeito!"
42110-148 = "Tem um café bem na esquina que vende as melhores rosquinhas açucaradas do quarteirão!"
42110-149 = "Rosquinhas com açúcar…… não, obrigado. Café puro me serve…… vamos."
42110-158 = "[ns3] \"Com licença, me traga três xícaras de café preto quente, e……\" \n[ns4] \"……Uma porção extra do combo de donuts cobertos com chocolate.\""
42110-163 = "……Sensei, você não precisava pedir."
42110-164 = "Eu mesma ia pagar a conta……"
42110-165 = "[s5] \"Vocês duas ralaram pra salvar aquele homem agora há pouco.\"\n[s6] \"Essa rodada de cafeína e açúcar é por minha conta.\""
42110-170 = "……O senhor continua incorrigível."
42110-177 = "Prontinho, a espera acabou!#nTrês cafés pretos fervendo e o combo especial de Donuts de Chocolate!"
42110-179 = "Aêê! Chegou a recompensa!#nA senhora precisa dar uma mordida nesse donut de chocolate, Chefe!"
42110-180 = "Foi a Fubuki quem me apresentou essa maravilha! Eu juro que a gordura e o chocolate casam perfeitamente com a cafeína amarga……"
42110-181 = "O cacau é meio amargo, mas quando a massa derrete na boca com o café quente, o açúcar explode no cérebro de um j――"
42110-185 = "＜……Ao contrário das patrulheiras amadoras e preguiçosas da Valkyrie, que matam serviço na rua mastigando donuts de açúcar, a Kaiser Security não brinca de polícia.＞"
42110-189 = "＜Nossas guarnições são formadas cem por cento por veteranos de guerra de companhias militares privadas. Nossa tática é letal e nossa gestão de risco é cirúrgica e imbatível.＞"
42110-190 = "＜Graças aos decretos geniais da Nova Presidente Interina Kaya, nós sufocamos as zonas de perigo do Distrito D.U. com mãos de ferro e, como resultado brutal, a taxa de incidentes violentos despencou em assustadores 50% só na manhã de hoje.＞"
42110-191 = "＜A Kaiser Security é a vanguarda e o punho que garantirá a Paz Absoluta e a Justiça de Aço que Kivotos merece.＞"
42110-192 = "……Nossa, quanta \"paz\"."
42110-193 = "A-Ahahaha…… que ironia a tv ligar bem nessa hora, né……"
42110-197 = "……Eu andei ouvindo boatos sombrios, Sensei. Ouvi dizer que você cuspiu na cara da Presidente Kaya e rasgou a proposta de Reestruturação da Schale."
42110-198 = "Eu não vi o contrato com meus próprios olhos, mas os bastidores diziam que era um acordo onde você entregaria os louros e ganharia imunidade total aos seus erros…… o paraíso na terra."
42110-199 = "Você enfiou o dedo na cara do diabo e disse \"não\"…… tudo em nome daquela sua ideologia teimosa de não largar os alunos?"
42110-203 = "[ns] \"……Sim. Foi exatamente isso.\""
42110-204 = "……Entendo.#nTer espinha dorsal e não vender os ideais…… é algo a se admirar."
42110-205 = "Mas a Kaya é uma cobra rancorosa. Cortar as asinhas do plano mestre dela hoje significa que amanhã você terá um exército batendo na sua porta de forma não-oficial. Aposto que você sabe bem os riscos que escolheu."
42110-206 = "[s] \"Acho que a minha teimosia não é nada comparada à sua, Kanna. Você peitou generais armados por seguir o que achava certo.\""
42110-207 = "Isso é……"
42110-212 = "……Você tem um ponto."
42110-213 = "[s7] \"……Os ferimentos e queimaduras daquela batalha já cicatrizaram?\"\n[s8] \"Você já assumiu o seu posto de volta no Bureau?\""
42110-214 = "Fisicamente, a carne se fechou."
42110-218 = "Mas, sendo brutalmente honesta com o senhor――"
42110-222 = "Indo direto ao ponto: a minha carreira morreu ali."
42110-230 = "A Kanna Diretora do Bureau de Segurança Pública não existe mais."
42110-231 = "Pra ser mais precisa: eu tomei uma suspensão disciplinar brutal nas costas, o meu distintivo de comando foi arrancado do meu peito, e eu fui destituída de todos os cargos oficiais."
42110-232 = "[s] \"Você perdeu tudo…… e a culpa foi minha por tê-la arrastado para――\""
42110-233 = "Pare com esse vitimismo. Você não tem culpa do meu livre arbítrio."
42110-234 = "Quando o Conselho ditou a ordem, a Diretora máxima da Segurança não podia falhar. Eu, friamente e de forma premeditada, rasguei o código de ética, cometi alta traição contra meus superiores diretos e apontei a arma contra o sistema."
42110-235 = "Não importa se a minha rebelião salvou vidas ou se o meu coração estava no lugar certo. A corrupção sistêmica nasce quando você abre exceções e burla regras. O meu crime é inegável."
42110-236 = "Esse é o preço do sangue que eu escolhi pagar quando apontei a arma. Ser despida do meu orgulho e reduzida a pó é uma punição branda e merecida.#nSe comparar com a cova que eu imaginei que cavaria no fim daquilo, eu saí no lucro."
42110-238 = "Mas, a pior parte disso……"
42110-244 = "Numa tentativa estúpida e heroica de aliviar a minha punição e provar lealdade…… a equipe do meu Bureau cruzou os braços e declarou motim contra o conselho e contra a Kaiser.#nA força policial virou um caos amador de burocratas que se recusam a obedecer e patrulhar."
42110-245 = "E é justamente por causa dessa minha mancha negra que a Presidente Kaya encontrou a desculpa perfeita para castrar a Valkyrie de vez e jogar a polícia de rua nas mãos dos cachorros assassinos da Kaiser."
42110-246 = "E vou dizer…… no quesito frieza matemática e brutalidade de combate, a Kaiser engole o nosso Bureau sem mastigar."
42110-247 = "Se for para oprimir sem sentimentos e seguir a lei do conselho como robôs inquebráveis, talvez a Kaiser mantenha essa paz de cemitério funcionando em Kivotos de um jeito que eu não conseguiria."
42110-251 = "……O único porém nisso tudo……"
42110-262 = "A repressão e a vigilância são tão sufocantes que você não pode respirar errado na rua. Se uma mosca pousar na bota de um mercenário Kaiser, ela é espancada e multada."
42110-263 = "Pequenas lojas fecharam, a economia desaba. Quem não veste a bandeira da Kaiser é sufocado. O medo trancou todos os civis normais dentro de casa……"
42110-264 = "Tudo em nome da \"Prevenção de Crimes\"…… mas será que esse terror institucional e esse silêncio mórbido são melhores que a anarquia……?"
42110-267 = "……Eu perdi a bússola moral. Eu já não sei julgar o que é certo e errado."
42110-268 = "――O máximo que eu posso fazer como o lixo que me tornei, é cruzar os dedos e rezar para que o gatilho que eu puxei não tenha custado a alma da cidade."
42110-269 = "[s] \"Kanna. Não se menospreze. Você fez o que a sua humanidade gritou pra fazer. Você lutou pelo que era correto, não pelo que era fácil.\""
42110-270 = "Humanidade…… lutar pelo certo…… não venha com essa poesia barata.#nMinhas mãos não são santas nem heróicas."
42110-271 = "Eu sou a escória da escória. Sou o cão que traiu o dono quando o vento mudou."
42110-272 = "Eu deveria ter levado um tiro e morrido no palco naquele dia de crise.#nO meu pecado foi não ter sumido quando a minha utilidade acabou……"
42110-273 = "CHEFE KANNA! NUNCA MAIS DIGA UMA BLASFÊMIA DESSAS SOBRE SI MESMA!!"
42110-274 = "……Kirino?"
42110-275 = "A sua mira de revólver é letal, a sua precisão em planilhas é impecável, e o mais importante de tudo: o seu coração sempre bateu pelos mais fracos da rua……!!"
42110-277 = "Pra nós, a senhora sempre será o farol dourado da Valkyrie! Chamá-la de escória ou de \"cão vira-lata\" é uma ofensa ao que nós lutamos pra ser!#nO mundo inteiro pode cuspir na senhora, mas a Valkyrie sempre a reverenciará como lenda absoluta!!"
42110-278 = "A senhora é o meu Norte! Eu rasgo as palmas das mãos no estande de tiro todo santo dia sonhando em ter metade da sua hombridade e glória!#nNão permita que os dejetos corporativos da Kaiser te façam desonrar a si mesma!"
42110-284 = "Haaah…… que pulmão…… Pra onde essa conversa foi parar……"
42110-285 = "Sinto cortar as suas asas de ilusão infantil, Kirino…… Mas mesmo que você torre mil cartuchos por dia na pista de tiro, a sua mira nunca será letal como a minha."
42110-287 = "Eeeh…… Uuuuu…… q-que soco no estômago……"
42110-288 = "……Mas. O caminho de volta é verdadeiro."
42110-292 = "Por mais que eu tentasse, por mais que eu sorrisse, o meu rosto coberto de cicatrizes e meu passado sujo jamais alcançariam a fé e a empatia inabalável que os civis têm em cadetes otimistas e inocentes como você."
42110-293 = "A sua inocência burra e sua crença cega na bondade alheia…… são o seu verdadeiro arsenal letal. A maior virtude que você tem. Esmague quem tentar tirar isso de você."
42110-294 = "Chefe Kanna……!"
42110-300 = "……FORA PRESIDENTE KAYA! VAI CAIR! A KAYA VAI CAIR!"
42110-301 = "MAIS LEITE, MAIS DESCANSO! CONSELHO ESTUDANTIL, DEVOLVA OS NOSSOS FERIADOS!!"
42110-302 = "SE A NOSSA PAUTA REVOLUCIONÁRIA NÃO FOR ASSINADA, O DERRAMAMENTO DE PUDIM SERÁ SEVERO E IMPLACÁVEL!"
42110-304 = "CARAMBA! De que bueiro do inferno essa laia comunista de Red Winter brotou?!"
42110-305 = "Não dá conta, a gente soca três na viatura e brotam mais vinte do asfalto!#nA linha de choque da blitz rompeu e os manifestantes tão furando a barreira……!"
42110-306 = "Código Vermelho! Exijo reforço tático imediato na praça!"
42110-307 = "……É. Parece que a cidade de vidro da Kaiser e da Kaya começou a rachar."
42110-311 = "Engole o resto desse donut, Kirino. A pausa acabou."
42110-312 = "O Conselho arrancou os nossos distintivos oficiais e terceirizou a nossa honra, é verdade……#nMas eu me recuso a assistir de braços cruzados a minha cidade pegar fogo enquanto a segurança privada perde a linha de frente."
42110-313 = "Entendido, Chefe!!"
42110-314 = "……Eu bato continência aqui, Sensei. Cuide-se e não se meta no fogo cruzado."
42110-315 = "A dose de açúcar estava revigorante. Obrigada pelo presente, Sensei da Schale!"
42110-323 = "（Engoli o resto do amargor escuro na xícara e rumei de volta à fumaça e aos escombros do Parque dos Coelhinhos.）"
42110-325 = "Próximo Episódio;Resolução Inabalável"