[translation]
10011060-1 = "第6話;第三関門：読心術師"
10011060-4 = "さあ、白熱の追撃戦ですが～……？"
10011060-5 = "現在最も頭角を現しているのは、私の予想通り「忍術研究部」！どのチームよりも早く、眠り姫の試練を通過しました！"
10011060-6 = "これが噂の「忍者」の力なのでしょうか～？"
10011060-7 = "もちろんあの「シャーレ」の先生が手助けしているので、その辺は込々で考えた方が良いかもしれませんが♪"
10011060-8 = "まあ、みんなが楽しんでこそのお祭りですからねぇ。これくらいのルール違反は目を瞑るとしましょうか♪"
10011060-9 = "ではでは、引き続き張り切っていきましょ～♪"
10011060-11 = "[ns] \"何から何まで全部見られてるなぁ……。\""
10011060-12 = "まあ、バレてなさそうなのは幸いですが……。"
10011060-16 = "「眠り姫」のところを最速通過したのって、あの人たち？"
10011060-17 = "眠り姫って、あの修行部の部長でしょ？すごいけど、そもそも「忍術研究部」ってあんまり聞いたこと無いような……。"
10011060-18 = "そんな部活あったっけ？"
10011060-19 = "あったのかなぁ……にしても変わった名前だね。"
10011060-21 = "「変わった名前」……！？"
10011060-22 = "[s] \"まあ、聞き慣れないからってだけだと思うけど。\""
10011060-23 = "うーん、そうかもだけど……。"
10011060-24 = "こんなに噂を、されると……プレッシャー、感じますね……。"
10011060-25 = "ですが！ここまで注目されているということは、かえって忍者の魅力を伝えるチャンスです！"
10011060-26 = "ね、部長！"
10011060-31 = "（注目は良いことだけど……結局最終的に結果を出せなくて、また変な見られ方をされちゃったら……）"
10011060-32 = "って、悩んでる場合じゃない！とにかく、一刻も早く魑魅一座を……！"
10011060-39 = "なるほど、皆さんでしたか。"
10011060-40 = "ここは「第三関門」です。「読心術師」ことこの私、「[ruby=みずは]水羽[/ruby]ミモリ」がみなさんのお相手をします！"
10011060-41 = "[s1] \"ツバキの次は、ミモリ……！\"\n[s2] \"ど、読心術師……？\""
10011060-44 = "そういえば、聞いたことがあります！"
10011060-45 = "ただでさえ不思議な人が多い修行部ですが、その中には「相手の心を読むことができる」方がいると！"
10011060-46 = "[s] \"ミモリにそんな能力が……！？\""
10011060-47 = "あ、えっとそれはその……。"
10011060-48 = "そういう役柄として採用されたと言いますか、"
10011060-49 = "何と言いますか……！"
10011060-50 = "と、とにかく！第三関門は、これまでの中でも最難関！"
10011060-51 = "この私、読心術師のミモリがお相手を……！"
10011060-52 = "すみません、この場は乗っていただけると嬉しいです……。"
10011060-53 = "[s] \"ご、ごめん……了解。\""
10011060-54 = "なるほど、流石は観光業の百鬼夜行。そういう演技も観光の一環、と。"
10011060-55 = "あ、えっと、とりあえず覚悟してください！みなさんの考え、読み取って見せます！"
10011060-62 = "まずはイズナちゃん……！"
10011060-63 = "な、何でしょう！？"
10011060-64 = "イズナちゃんはこの先に進むために、私のことを倒したいんですよね？"
10011060-65 = "ど、どうしてそれを……！"
10011060-66 = "ふふっ……そしてツクヨちゃんは、頑張ってお友達の役に立ちたい、と。"
10011060-67 = "すごい、当たりです……！"
10011060-68 = "そしてミチルちゃんは……"
10011060-72 = "たくさん悩んでいるようですね。複雑な心境の中で、進むべきかどうかについても悩んでいる……。"
10011060-73 = "うっ……。"
10011060-74 = "ふふふ、いかがでしょう？みなさんの心が読める私を……果たしてみなさんは倒せるでしょうか！"
10011060-75 = "[s] \"よし、じゃあ次は私！\""
10011060-77 = "せ、先生殿……！？"
10011060-79 = "え、あ……。"
10011060-80 = "か、構いません！それでは先生の心も、読んでみせます！"
10011060-83 = "むむむむっ……！"
10011060-87 = "……！！"
10011060-88 = "せ、先生、"
10011060-89 = "そんなことをお考えに……。"
10011060-90 = "[s] \"……え？\""
10011060-91 = "それはその、えっと……。"
10011060-92 = "……い、今はいけません！"
10011060-93 = "先生、いったい何を考えているんですか。"
10011060-94 = "[s] \"何か色々誤解されてる気配！！\""
10011060-96 = "なるほど、こうして内部分裂を引き起こすというのが狙い……！？"
10011060-97 = "読心術師、強敵ですね……！"
10011060-98 = "イズナちゃん、部長……！私、良い方法を、思いついたかも、です……！"
10011060-99 = "良い方法？"
10011060-100 = "部長から借りた漫画で、読んだことが、あります……！主人公たちが、読心術を使う忍法術師と、戦った時の作戦……！"
10011060-101 = "その名も「ぼーっとする作戦」、です！"
10011060-106 = "ふふっ……なるほど。"
10011060-107 = "何も考えなければ、心を読まれることも、ありません……！"
10011060-108 = "みんなで、ぼーっと、しましょう……！"
10011060-109 = "了解です！"
10011060-110 = "……！"
10011060-111 = "ぼーっ……。"
10011060-112 = "え、あ、うーん……やってみよっか！"
10011060-113 = "ぼーっ……。"
10011060-115 = "……何ですか、これ。"
10011060-116 = "そう来ましたか……！"
10011060-117 = "それでは私も全力で、ぼーっとしているみなさんの心を読んでみます！"
10011060-119 = "ぼーっ……。"
10011060-120 = "ぼーっ……！"
10011060-121 = "ぼーっ……？"
10011060-125 = "むむむむ……っ！？"
10011060-130 = "[ns] \"すごい勝負だ……！\""
10011060-132 = "……それ本気で言ってます？"
10011060-133 = "いや、別に対決とかは良いんですけど……。"
10011060-134 = "これ、いつまで待ってれば良いんでしょうか……ツッコミ不在ですし……。"
10011060-135 = "っていうか、何ですかこの茶番……。"
10011060-136 = "[s] \"まあ元々アトラクションの一環だし。\""
10011060-137 = "あ、ちなみにここで、今回のアトラクションのコツをお伝えしますね。"
10011060-138 = "ここでは、門番を倒せばクリアになります。"
10011060-139 = "……！！"
10011060-140 = "な、なるほど……！"
10011060-141 = "なんだってぇ！？"
10011060-142 = "これ、もしかして私が空気読めてないんですかね……？"
10011060-143 = "[s] \"なるほど、やるしかないってことかな。\""
10011060-144 = "ふふっ、やる気は十分のようですね……！"
10011060-145 = "では私、不肖ミモリがお相手いたします！"
