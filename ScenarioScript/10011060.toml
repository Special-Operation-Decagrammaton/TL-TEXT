[translation]
10011060-1 = "Episódio 6; Terceiro Portão: O Leitor de Mentes"
10011060-4 = "Bem, que perseguição acalorada, não é...?"
10011060-5 = "Quem está se destacando mais no momento é, como eu previ, o \"Clube de Pesquisa Ninjutsu\"! Eles passaram pelo teste da Bela Adormecida mais rápido do que qualquer outra equipe!"
10011060-6 = "Será que esse é o poder dos lendários \"ninjas\"?"
10011060-7 = "Claro, o Sensei do \"Schale\" está ajudando, então talvez seja melhor considerar isso como parte do pacote♪"
10011060-8 = "Bem, o festival só é divertido se todos estiverem se divertindo. Acho que podemos fechar os olhos para esse tipo de violação de regras♪"
10011060-9 = "Então, vamos continuar com toda a energia~♪"
10011060-11 = "[ns] \"Estão vendo tudo, de cabo a rabo...\""
10011060-12 = "Bem, pelo menos parece que não descobriram tudo ainda..."
10011060-16 = "Foram aquelas pessoas que passaram mais rápido pela \"Bela Adormecida\"?"
10011060-17 = "A Bela Adormecida não é a chefe do Clube de Treinamento? É impressionante, mas eu nunca ouvi falar muito desse \"Clube de Pesquisa Ninjutsu\"..."
10011060-18 = "Esse clube existia?"
10011060-19 = "Será que existia...? De qualquer forma, que nome estranho."
10011060-21 = "\"Nome estranho\"...!?"
10011060-22 = "[s] \"Bem, acho que é só porque não estão acostumados a ouvir.\""
10011060-23 = "Hmm, talvez seja isso, mas..."
10011060-24 = "Ser o centro das atenções assim... dá uma pressão, né..."
10011060-25 = "Mas! Se estamos chamando tanta atenção, é a chance perfeita para mostrar o charme dos ninjas!"
10011060-26 = "Né, Chefe!"
10011060-31 = "(Chamar atenção é bom, mas... se no final não conseguirmos resultados e nos olharem de um jeito estranho de novo...)"
10011060-32 = "Não, não é hora de ficar preocupada! De qualquer forma, preciso encontrar a Trupe Chimi o mais rápido possível...!"
10011060-39 = "Entendo, então eram vocês."
10011060-40 = "Este é o \"Terceiro Portão\". Eu, Mizuha Mimori, a \"Leitora de Mentes\", serei sua oponente!"
10011060-41 = "[s1] \"Depois da Tsubaki, a Mimori...!\"\n[s2] \"Le-leitora de mentes...?\""
10011060-44 = "Ah, eu já ouvi falar disso!"
10011060-45 = "O Clube de Treinamento já tem muitas pessoas misteriosas, mas dizem que entre elas existe alguém que consegue \"ler a mente dos outros\"!"
10011060-46 = "[s] \"A Mimori tem esse tipo de habilidade...!?\""
10011060-47 = "Ah, bem, isso é..."
10011060-48 = "Digamos que fui contratada para esse papel,"
10011060-49 = "Como posso dizer...!"
10011060-50 = "De, de qualquer forma! O terceiro portão é o mais difícil de todos até agora!"
10011060-51 = "Eu, a leitora de mentes Mimori, serei sua oponente...!"
10011060-52 = "Desculpe, eu ficaria feliz se vocês entrassem no clima..."
10011060-53 = "[s] \"De, desculpa... Entendido.\""
10011060-54 = "Entendo, como esperado de Hyakkiyako, a cidade turística. Esse tipo de atuação também faz parte do turismo, né."
10011060-55 = "Ah, bem, por enquanto, preparem-se! Vou ler o que vocês estão pensando!"
10011060-62 = "Primeiro, a Izuna-chan...!"
10011060-63 = "O, o que foi!?"
10011060-64 = "Izuna-chan, você quer me derrotar para conseguir seguir em frente, não é?"
10011060-65 = "Co, como você sabe disso...!"
10011060-66 = "Fufu... e a Tsukuyo-chan quer se esforçar para ser útil aos seus amigos."
10011060-67 = "Incrível, acertou em cheio...!"
10011060-68 = "E a Michiru-chan..."
10011060-72 = "Parece que você está muito preocupada. Com o coração dividido, você está em dúvida se deve ou não seguir em frente..."
10011060-73 = "Ugh..."
10011060-74 = "Fufufu, o que acham? Será que vocês conseguem derrotar alguém como eu, que consegue ler a mente de todos!"
10011060-75 = "[s] \"Certo, então agora sou eu!\""
10011060-77 = "Se, Sensei...!?"
10011060-79 = "Ah, bem..."
10011060-80 = "Não, não tem problema! Então, vou ler a mente do Sensei também!"
10011060-83 = "M-m-m-m...!"
10011060-87 = "……！！"
10011060-88 = "P-Sensei,"
10011060-89 = "To think that you would be considering such a thing..."
10011060-90 = "[s] \"...Eh?\""
10011060-91 = "That is, um, well..."
10011060-92 = "...N-no, not right now!"
10011060-93 = "Sensei, what on earth are you thinking about?"
10011060-94 = "[s] \"I feel like there's a huge misunderstanding going on!!\""
10011060-96 = "I see, so the goal is to cause internal division like this...!?"
10011060-97 = "A mind reader, what a formidable opponent...!"
10011060-98 = "Izuna-chan, Club President...! I think I've come up with a good plan...!"
10011060-99 = "A good plan?"
10011060-100 = "I read about it in a manga I borrowed from the Club President...! It's the strategy the protagonists used when they fought a ninja who could read minds...!"
10011060-101 = "It's called the \"Blank Mind Strategy\"!"
10011060-106 = "Fufu... I see."
10011060-107 = "If we don't think about anything, our minds can't be read...!"
10011060-108 = "Everyone, let's just space out...!"
10011060-109 = "Understood!"
10011060-110 = "……！"
10011060-111 = "Spacing out..."
10011060-112 = "Eh, ah, hmm... I guess I'll give it a try!"
10011060-113 = "Spacing out..."
10011060-115 = "...What is this?"
10011060-116 = "So that's how it is...!"
10011060-117 = "Then I shall use all my might to read the minds of everyone who is spacing out!"
10011060-119 = "Spacing out..."
10011060-120 = "Spacing out...!"
10011060-121 = "Spacing out...?"
10011060-125 = "M-m-m-m...!"
10011060-130 = "[ns] \"What an intense battle...!\""
10011060-132 = "...Are you serious about that?"
10011060-133 = "I mean, I don't mind a confrontation or anything, but..."
10011060-134 = "How long are we supposed to wait for this? There's no one here to play the straight man..."
10011060-135 = "And besides, what is this farce anyway?"
10011060-136 = "[s] \"Well, it is part of the attraction, after all.\""
10011060-137 = "Ah, by the way, I'll give you a hint for this attraction."
10011060-138 = "You can clear this stage by defeating the gatekeeper."
10011060-139 = "……！！"
10011060-140 = "I-I see...!"
10011060-141 = "What did you say!?"
10011060-142 = "Could it be that I'm the one who's failing to read the room...?"
10011060-143 = "[s] \"I see, so it means we have no choice but to do it.\""
10011060-144 = "Fufu, it seems you're plenty motivated...!"
10011060-145 = "Then I, the unworthy Mimori, shall be your opponent!"
