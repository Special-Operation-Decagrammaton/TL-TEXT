[translation]
1002305-1 = "Um breve momento"
1002305-2 = "Ei! Por que esse zenzai não tem mochi?!"
1002305-3 = "Além disso, está frio e tem manga aqui dentro! Você tá de brincadeira comigo?!"
1002305-4 = "I-isso não é um zenzai comum, é o nosso novo 'Zenzai de Raspadinha Tropical'..."
1002305-5 = "Eu não quero saber! Eu disse que queria um zenzai comum, bem quente, por causa desse calor!"
1002305-6 = "Traga um zenzai comum com feijão azuki e mochi agora mesmo!"
1002305-7 = "M-mas, nossa loja é originalmente uma casa de 'raspadinhas'..."
1002305-11 = "Já chega!"
1002305-13 = "Tsc, é o Comitê de Disciplina de Gehenna!"
1002305-14 = "Chegaram rápido, hein...!"
1002305-15 = "Não dá pra enfrentar de frente, vamos fugir!"
1002305-19 = "Ei, não fujam!"
1002305-20 = "Esperem, seus...!"
1002305-26 = "E assim começou uma perseguição na praia que, se não fossem as armas, até pareceria uma cena pacífica."
1002305-36 = "Ufa, caso encerrado."
1002305-37 = "[s1] \"Bom trabalho.\"\n[s2] \"Você se machucou? Está bem?\""
1002305-38 = "Sim, só deu trabalho porque eles eram mais rápidos do que eu pensava."
1002305-39 = "Sim, só deu trabalho porque eles eram mais rápidos do que eu pensava."
1002305-40 = "Francamente, será que é por causa do verão que todo mundo fica agitado e só causa problema..."
1002305-41 = "Eu até trouxe protetor solar, mas desse jeito não vou conseguir nem tomar um solzinho..."
1002305-42 = "[s] \"……?\""
1002305-43 = "N-não é nada!"
1002305-44 = "Não, mas mesmo assim, essa perseguição com aqueles idiotas me deixou cansada..."
1002305-46 = "Sensei, é... se não se importar, pode patrulhar por aqui? Eu vou dar uma olhada naquela área ali, onde não tem quase ninguém..."
1002305-47 = "Sabe, é que eles podem achar que baixamos a guarda e aparecer de novo por aqui."
1002305-48 = "E naquela outra área, pode ter outros grupos também... Como membro do Comitê de Disciplina, preciso verificar cada canto..."
1002305-49 = "[s] \"Quer que eu vá junto?\""
1002305-50 = "Não, está tudo bem! V-veja bem, é mais eficiente se nos separarmos...!"
1002305-51 = "Eu dou conta daquela parte sozinha! Sensei, fique por aqui!"
1002305-52 = "[s] \"Entendido.\""
1002305-53 = "Você entendeu mesmo...?"
1002305-54 = "Não ouse me seguir!"
1002305-55 = "Então, conto com você..."
1002305-59 = "[ns] Seguir Iori."
1002305-62 = "(Atrás das rochas, em um lugar deserto, Iori estava deitada tomando sol)"
1002305-63 = "Ufa... é um desperdício vir à praia e só trabalhar."
1002305-64 = "Ah, que sensação boa... relaxar assim de vez em quando é..."
1002305-67 = "— ...Hm? [wa:700] Ué?!"
1002305-71 = "[wa:100] — D- [wa:500] desde quando [wa:500] você está aí?!"
1002305-74 = "[wa:500] — Espera, [wa:600] você estava olhando [wa:500] esse tempo todo...?"
1002305-76 = "[wa:550] — Seu... [wa:850] pervertido! [wa:600] Morra!!"
1002305-79 = "[wa:300] — ...Já vou avisando, [wa:980] eu não estou brincando, entendeu?"
1002305-81 = "— Isso também é uma parte legítima [wa:1100] das minhas atividades de manutenção da disciplina...!"
1002305-84 = "[wa:250] — ...Quer saber, [wa:800] até quando [wa:400] você vai ficar encarando?!"
1002305-86 = "— Vá embora logo!"
1002305-89 = "...Eu não estava brincando."
1002305-90 = "[s] \"Tudo bem, não precisa se explicar.\""
1002305-91 = "Já que estamos na praia, descansar também faz parte da missão, e eu pretendia voltar logo de qualquer jeito..."
1002305-92 = "Além disso, seria um desperdício não usar o protetor solar que eu comprei..."
1002305-93 = "Então, resumindo, isso também é, indiretamente, para manter a disciplina..."
1002305-94 = "……Pensando bem, não é como se eu tivesse feito algo de errado, né?"
1002305-95 = "Para começo de conversa, se o Sensei não tivesse aparecido, eu não teria sido vista daquele jeito……."
1002305-96 = "Chega, eu odeio o Sensei!"
1002305-98 = "A Iori disse que me 'odeia'……."
