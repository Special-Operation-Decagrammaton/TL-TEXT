[translation]
1002305-1 = "ちょっとしたひと時"
1002305-2 = "おい！このぜんざい、なんで餅が入ってねーんだよ！"
1002305-3 = "それに冷てぇし、マンゴーとか入ってんじゃねぇか！ふざけてんのか！？"
1002305-4 = "こ、これは普通のぜんざいではなく、新しい「南国風のかき氷ぜんざい」でして……。"
1002305-5 = "知らねえよ！あたしはこの暑い中であえて熱々の、普通のぜんざいが欲しいって言ってんの！"
1002305-6 = "今すぐあんこと餅が入った、普通のぜんざいを持ってこい！"
1002305-7 = "で、ですが、うちは元々「かき氷」のお店でして……。"
1002305-11 = "そこまでだ！"
1002305-13 = "ちっ、ゲヘナの風紀委員じゃねえか！"
1002305-14 = "早いお着きだなおい……！"
1002305-15 = "正面からやっても無理だ、逃げるぞ！"
1002305-19 = "あっ、逃げるな！"
1002305-20 = "待て、この……っ！"
1002305-26 = "そして銃さえ無ければ平和な光景にも見える、浜辺での追いかけっこが始まった。"
1002305-36 = "ふう、一件落着だな。"
1002305-37 = "[s1] \"お疲れ様。\"\n[s2] \"怪我とかしてない？大丈夫？\""
1002305-38 = "うん、思ったより足が速かったから手こずっただけ。"
1002305-39 = "うん、思ったより足が速かったから手こずっただけ。"
1002305-40 = "全く、夏だからってテンションが上がってるのか、どいつもこいつもトラブルばっかり……。"
1002305-41 = "わざわざ日焼け止めも用意したのに、このままじゃのんびり日光よ……"
1002305-42 = "[s] \"……？\""
1002305-43 = "な、何でもない！"
1002305-44 = "いや、にしても、バカ共との追いかけっこで疲れたな……。"
1002305-46 = "先生、その……良かったら、この辺りのパトロールを頼んでも良い？私はあっちの、あんまりひと気のない方を見てくるから……。"
1002305-47 = "その、終わったと油断させておいて、この辺にまたバカ共が出てくるかもしれないし。"
1002305-48 = "あっちの方はあっちの方で、また別のやつらがいるかもだし……風紀委員として、隅々まで調べてこないと……。"
1002305-49 = "[s] \"どっちも一緒に回る？\""
1002305-50 = "いや、大丈夫！ほ、ほら、手分けした方が効率良いから……！"
1002305-51 = "あっちの方は私だけでも平気！先生はこの辺にいて！"
1002305-52 = "[s] \"うん、分かった。\""
1002305-53 = "本当に分かったか……？"
1002305-54 = "絶対についてくるなよ！"
1002305-55 = "じゃあ、よろしく……。"
1002305-59 = "[ns] イオリについて行く。"
1002305-62 = "（岩場の裏手、ひと気のない場所で、イオリが横になって日光浴をしていた）"
1002305-63 = "ふぅ……せっかく海に来たのに、仕事ばっかりなんて勿体ないしな。"
1002305-64 = "うん、気持ち良い……たまにはこうやってのんびりするのも――"
1002305-67 = "― ……ん？[wa:700]うわっ！？"
1002305-71 = "[wa:100]― い、[wa:500]いつの間に[wa:500]そこに！？"
1002305-74 = "[wa:500]― え、[wa:600]さっきから[wa:500]ずっと見てた……？"
1002305-76 = "[wa:550]― このっ……[wa:850]ヘンタイ！[wa:600]死ねっ！！"
1002305-79 = "[wa:300]― ……言っておくけど、[wa:980]別に遊んでるわけじゃないからな？"
1002305-81 = "― これもれっきとした、[wa:1100]風紀を守る活動の一環で……！"
1002305-84 = "[wa:250]― ……っていうか、[wa:800]いつまで[wa:400]ジッと見てるんだ！"
1002305-86 = "― 早くどっか行って！"
1002305-89 = "……遊んでたわけじゃないから。"
1002305-90 = "[s] \"うん、言い直さなくても大丈夫だよ。\""
1002305-91 = "せっかくの海だし、休憩も任務の内だし、そもそもちょっとしたらすぐ戻るつもりだったのに……。"
1002305-92 = "それに、せっかく日焼け止め買ってもらったのに、使わないのは勿体ないし……。"
1002305-93 = "だから、つまりあれも間接的には風紀を守るためであって――"
1002305-94 = "……よく考えると別に私、何も悪くなくないか？"
1002305-95 = "そもそも先生が来なければ、あんな姿を見られることも無かったわけで……。"
1002305-96 = "もうやだ、先生嫌い！"
1002305-98 = "イオリに「嫌い」と言われてしまった……。"
