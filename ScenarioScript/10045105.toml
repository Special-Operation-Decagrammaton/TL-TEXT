[translation]
10045105-2 = "ぐっ……！こんなところで……！"
10045105-7 = "ふぅ……。"
10045105-8 = "これでもう邪魔は入りません。"
10045105-9 = "仕切り直すといたしましょう。"
10045105-10 = "先生の御前で、誰が真の強者かを決めるのです。"
10045105-11 = "ま、待ってください！乱入は想定してなくて……！"
10045105-12 = "罪人と呼ばれるこの身では、こういった催しに参加することは叶わぬ運命。"
10045105-13 = "ですが……たとえ一瞬でも先生と同じ時を過ごし、喜びを感じたい。#nそれすらも許されないのでしょうか？"
10045105-14 = "そ、それは……。"
10045105-15 = "おおおっ！災厄の狐が参加するのか！？"
10045105-16 = "こりゃ絶対見逃せないな！！"
10045105-17 = "やらせてやれー！"
10045105-18 = "お客さんは大興奮……。"
10045105-19 = "……待てよ？これはもしかしたら、ビッグチャンスかも？"
10045105-20 = "……分かりましたっ！#n皆さんの声にお応えして……エキシビションマッチを行います！！"
10045105-21 = "わあああっ！！！"
10045105-23 = "[ns] \"それじゃあ……押し出しゲームをしよう。\""
10045105-25 = "[ns1] \"これで最強を決めるんだ。\"\n[ns2] \"ワカモもこのルールに従ってもらうよ。\""
10045105-29 = "ええ、もちろんです。"
10045105-30 = "このワカモ、喜んで従いましょう。"
10045105-31 = "それが、あなた様に認めていただける方法であるならば。"
10045105-32 = "[s] \"ワカモが納得してくれてよかった。\""
10045105-33 = "うふふっ、決まりですね。では、どなたが私のお相手を？#n誰であろうと負ける気はいたしませんが……。"
10045105-34 = "その相手なら――"
10045105-39 = "ナグサ先輩が……。"
10045105-40 = "……災厄の狐と？"
