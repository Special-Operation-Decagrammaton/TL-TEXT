[translation]
10045105-2 = "Argh...! Em um lugar como este...!"
10045105-7 = "Ufa..."
10045105-8 = "Agora ninguém mais vai nos atrapalhar."
10045105-9 = "Vamos recomeçar."
10045105-10 = "Diante do Sensei, decidiremos quem é o mais forte de verdade."
10045105-11 = "E-espere um pouco! Eu não esperava uma invasão...!"
10045105-12 = "Sendo chamada de criminosa, é o meu destino não poder participar de eventos como este."
10045105-13 = "Mas... mesmo que seja por um instante, eu quero passar um tempo com o Sensei e sentir essa alegria. #nSerá que nem isso me é permitido?"
10045105-14 = "I-isso é..."
10045105-15 = "Ooooh! A Raposa da Calamidade vai participar!?"
10045105-16 = "Isso é algo que eu não posso perder de jeito nenhum!!"
10045105-17 = "Deixem ela participar!"
10045105-18 = "O público está super empolgado..."
10045105-19 = "...Espere um pouco? Talvez essa seja uma grande oportunidade?"
10045105-20 = "...Entendido! #nAtendendo ao pedido de todos... vamos realizar uma partida de exibição!!"
10045105-21 = "Waaaaah!!!"
10045105-23 = "[ns] \"Sendo assim... vamos fazer um jogo de empurrar.\""
10045105-25 = "[ns1] \"Vamos decidir quem é o mais forte com isso.\"\n[ns2] \"Wakamo, você também terá que seguir essas regras.\""
10045105-29 = "Sim, com certeza."
10045105-30 = "Eu, Wakamo, seguirei com prazer."
10045105-31 = "Se esse for o caminho para ser reconhecida por você."
10045105-32 = "[s] \"Que bom que a Wakamo aceitou.\""
10045105-33 = "Ufufu, está decidido então. Bem, quem será o meu oponente? #nNão pretendo perder para ninguém, não importa quem seja..."
10045105-34 = "Se for esse o oponente—"
10045105-39 = "A veterana Nagusa..."
10045105-40 = "...contra a Raposa da Calamidade?"
