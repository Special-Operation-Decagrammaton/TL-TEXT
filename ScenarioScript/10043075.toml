[translation]
10043075-13 = "やった！"
10043075-17 = "ば、馬鹿な……！"
10043075-22 = "それでは、聞かせてください。"
10043075-23 = "なぜこのようなことを？"
10043075-27 = "……本当にわからないのか？"
10043075-28 = "……。"
10043075-32 = "お前らの！"
10043075-33 = "野球が！！"
10043075-34 = "下手すぎるからだよ！！！"
10043075-39 = "ほ、本当にそんな理由で……！？"
10043075-40 = "他にあるわけないだろ！"
10043075-41 = "ブレーブスは、野球が下手だ……。"
10043075-43 = "キヴォトス最低と言っていい……！"
10043075-44 = "どうして、いつもいつも負けちまうんだよ！"
10043075-48 = "た、たしかに、負けるのは悔しいですが……。"
10043075-49 = "[s] \"やっぱりファンだったのか……。\""
10043075-53 = "そうだ、試合のほうはどうなっていますか？"
10043075-54 = "こうしている間にも、ゲームは続いているはずです。"
10043075-58 = "そ、そうだった！"
10043075-59 = "……9回、最後のピッチャーがマウンドに立った。もう私にできることはない……。"
10043075-60 = "選手を、皆を信じるしか……。"
10043075-66 = "三者三振！スリーアウト、チェンジです！#nさあ、ブレーブス最後の攻撃が始まります！"
10043075-67 = "試合はいよいよ9回裏、泣いても笑ってもこれが最後！"
10043075-71 = "おお……！追加の失点はなかったな！"
10043075-72 = "これで、8番・9番・1番バッターに続き、3番バッターまで耐えられたら……。"
10043075-73 = "4番バッターの出番ですね！そこでサヨナラホームランを決める……！"
10043075-78 = "トレーナー、私は野球に詳しくないのですが、ここでレイさんの言う「サヨナラホームラン」を打てる確率は――"
10043075-79 = "[s] \"スミレ、野球は運も大事な要素なんだよ\""
10043075-80 = "そ、そうですか。"
10043075-85 = "うぅっ……！"
10043075-94 = "ど、どうしました！？"
10043075-95 = "イテテ……さっき、手首に奴らの流れ弾が当たって……！"
10043075-100 = "な、なんとぉーーっ！？"
