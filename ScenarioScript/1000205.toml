[translation]
1000205-1 = "A Gourmet da Ira"
1000205-2 = "Centro da Cidade - Rua de Luxo"
1000205-3 = "（Murmúrios）"
1000205-4 = "Hã? O prédio explodiu!?"
1000205-5 = "Ali não era onde ficava aquele restaurante famoso...?"
1000205-6 = "Será que aconteceu alguma coisa?"
1000205-7 = "（Murmúrios）"
1000205-15 = "……Ufufu. Ora, não é o Sensei? Que surpresa encontrar você em um lugar como este."
1000205-16 = "[s1] \"Haruna? Está saindo fumaça do seu corpo?\"\n[s2] \"Você está toda coberta de fuligem?\""
1000205-17 = "Sim, tive um pequeno contratempo."
1000205-18 = "Sim, tive um pequeno contratempo."
1000205-21 = "（Aperto）"
1000205-22 = "Primeiro, vamos nos afastar daqui."
1000205-24 = "Ufa, acho que aqui estamos seguros."
1000205-25 = "[s] \"O que aconteceu?\""
1000205-26 = "É um pouco complicado de explicar, mas..."
1000205-29 = "Restaurante Pierre Garnish"
1000205-30 = "Seja bem-vindo ao Pierre Garnish. Você tem uma reserva?"
1000205-31 = "Sim, fiz a reserva em nome de Kurodate Haruna."
1000205-32 = "Compreendido, por favor, siga-me."
1000205-33 = "Parece pesado, nós cuidaremos da sua bolsa."
1000205-34 = "Ora, muito obrigada."
1000205-37 = "（Deslize）"
1000205-38 = "Ah, preciso lhe informar uma coisa... Nosso restaurante é especializado em menus de degustação para duas ou mais pessoas, e não podemos atender clientes sozinhos."
1000205-39 = "……Ora, eu não sabia dessa restrição. Tenho certeza de que a reserva permitia uma pessoa só..."
1000205-40 = "Sim, é uma regra que mudou exatamente ontem."
1000205-41 = "……."
1000205-42 = "No entanto, como você disse, é uma regra que não existia na hora da reserva, então abriremos uma exceção especial desta vez."
1000205-43 = "É mesmo? Obrigada. Então, gostaria de fazer o pedido..."
1000205-44 = "Recomendamos o nosso melhor menu, o Menu Pierre."
1000205-45 = "Ah... sim. Nesse caso, ficarei com esse."
1000205-46 = "Por favor, aguarde um momento."
1000205-49 = "……."
1000205-51 = "Aqui está, pão com foie gras de entrada."
1000205-52 = "……Hum."
1000205-54 = "Aqui está, salada de ostras."
1000205-55 = "Hum..."
1000205-57 = "Aqui está o prato principal, bife Chateaubriand."
1000205-58 = "……."
1000205-60 = "Aqui está a sobremesa, sorbet de frutas."
1000205-61 = "……."
1000205-63 = "……Sim, pagamento recebido. Muito obrigado."
1000205-64 = "……."
1000205-65 = "O que achou da comida? Estava ao seu gosto?"
1000205-66 = "A comida..."
1000205-67 = "……Fufufufufufu."
1000205-68 = "……?"
1000205-69 = "Vou buscar sua bagagem, por favor, aguarde um instante."
1000205-70 = "Fufu, não será necessário."
1000205-71 = "……Sim?"
1000205-72 = "(Clique)"
1000205-73 = "U-um interruptor de detonação!?"
1000205-74 = "(CABUUUUUUUMMMMMMMMM!!)"
1000205-76 = "……."
1000205-77 = "[s] \"Quer dizer que você explodiu tudo só porque não gostou da comida!?\""
1000205-78 = "Esse não é o único motivo, Sensei."
1000205-79 = "A culinária, a hospitalidade através da comida, carrega um significado que vai muito além do simples sabor."
1000205-80 = "A atitude arrogante de exigir uma mesa para um, mesmo tendo feito reserva, e ainda por cima com exigências de última hora."
1000205-81 = "A insistência intrusiva de interromper a escolha do menu do outro."
1000205-82 = "A estrutura do menu que pula o aperitivo e o amuse-bouche."
1000205-83 = "A insolência de nem sequer perguntar o ponto da carne."
1000205-84 = "Entende? Chateaubriand, por definição, deve ser servido ao ponto para malpassado."
1000205-85 = "Pratos de alta gastronomia devem ser acompanhados por um serviço e uma culinária que façam jus à sua qualidade."
1000205-86 = "[s3] \"Não entendi muito bem algumas partes, mas...\"\n[s4] \"Deu para perceber que você está muito brava.\""
1000205-87 = "……."
1000205-88 = "……."
1000205-89 = "Acima de tudo, percebi agora que comer sozinha é muito menos saboroso do que eu imaginava."
1000205-90 = "Ufufu."
1000205-91 = "Preciso ir para casa tomar um banho, acabei ficando com um cheiro de queimado..."
1000205-92 = "Pareço até um espetinho de frango passado do ponto."
1000205-93 = "Bem... Sensei, vamos nos encontrar novamente em uma ocasião mais apresentável."
1000205-100 = "(Haruna desapareceu cambaleando, com uma aparência um tanto solitária)"
