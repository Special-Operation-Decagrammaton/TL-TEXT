[translation]
1000205-1 = "怒りの美食家"
1000205-2 = "ダウンタウン・高級通り"
1000205-3 = "（ざわざわ）"
1000205-4 = "えっ？建物が爆発した！？"
1000205-5 = "あっちは、あの有名なレストランがあったところじゃ……。"
1000205-6 = "何かあったのかな？"
1000205-7 = "（ざわざわ）"
1000205-15 = "……うふふっ。あら、先生ではありませんか？こんなところでお会いできるなんて。"
1000205-16 = "[s1] \"ハルナ？体から煙が出てるよ？\"\n[s2] \"体が煤だらけだよ？\""
1000205-17 = "ええ、少々面倒なことがございまして。"
1000205-18 = "ええ、少々面倒なことがございまして。"
1000205-21 = "（ぎゅっ）"
1000205-22 = "まずは、ここから離れましょう。"
1000205-24 = "ふう、ここまで来れば大丈夫でしょう。"
1000205-25 = "[s] \"何があったの？\""
1000205-26 = "お話すると少々複雑なのですが……。"
1000205-29 = "レストラン・ピエールガニッシュ"
1000205-30 = "いらっしゃいませ、ピエールガニッシュへようこそ。予約はされていますでしょうか？"
1000205-31 = "はい、[ruby=くろだて]黒館[/ruby]ハルナで予約しておりますわ。"
1000205-32 = "かしこまりました、こちらへどうぞ。"
1000205-33 = "重そうですね、バックは私たちの方でお預かりいたします。"
1000205-34 = "あら、ありがとうございます。"
1000205-37 = "（スッ）"
1000205-38 = "ああ、一つお伝えすることがございまして……私たちの店はお二人以上のお客様向けのコース料理専門のお店となっており、お一人のみのお客様はご案内できないのです。"
1000205-39 = "……あら、そのような制約があるとは存じ上げませんでしたわ。確か予約は一人で申し込みができましたが……。"
1000205-40 = "はい、ちょうど昨日変わったばかりの規約でございます。"
1000205-41 = "……。"
1000205-42 = "しかしながら仰る通り、予約時にはなかった決まりですので、今回は特別に例外といたします。"
1000205-43 = "そうですか、ありがとうございます。それでは注文を……。"
1000205-44 = "私たちのお店の最高のメニューである、ピエールコースをおすすめいたします。"
1000205-45 = "あ……はい。でしたら、それでお願いいたしますわ。"
1000205-46 = "少々お待ちください。"
1000205-49 = "……。"
1000205-51 = "こちら、前菜のフォアグラを添えたパンでございます。"
1000205-52 = "……ふうん。"
1000205-54 = "こちら、牡蛎のサラダでございます。"
1000205-55 = "うーん……。"
1000205-57 = "こちらメインの、シャトーブリアンのステーキです。"
1000205-58 = "……。"
1000205-60 = "こちらデザートの、フルーツシャーベットです。"
1000205-61 = "……。"
1000205-63 = "……はい、お支払い頂戴いたしました。ありがとうございました。"
1000205-64 = "……。"
1000205-65 = "お料理はいかがでしたか？お口に合いましたでしょうか？"
1000205-66 = "料理……。"
1000205-67 = "……ふふふふふふ。"
1000205-68 = "……？"
1000205-69 = "お荷物をお持ちいたしますので、少々お待ちください。"
1000205-70 = "ふふっ、その必要はありません。"
1000205-71 = "……はい？"
1000205-72 = "（カチッ）"
1000205-73 = "き、起爆スイッチ！？"
1000205-74 = "（ドカアアァァァァンーーーーーー！！）"
1000205-76 = "……。"
1000205-77 = "[s] \"つまり、料理が気に入らないから爆破させたってこと！？\""
1000205-78 = "それだけが理由ではありませんわ、先生。"
1000205-79 = "料理というもの、食べ物のおもてなしというものには、単なる味以上の意味が込められています。"
1000205-80 = "予約済みなのに今は一人での来店は、と不要な後出しをする傲慢な態度。"
1000205-81 = "相手のメニューの選択を遮るその押し付けがましさ。"
1000205-82 = "[ruby=アペリティフ]食前酒[/ruby]もなく、[ruby=アミューズブーシュ]一口料理[/ruby]もスキップするというコースの構成。"
1000205-83 = "ステーキの焼き具合も聞かない不遜さ。"
1000205-84 = "分かりますか？そもそもシャトーブリアンはミディアムレアでなくてはダメなのです。"
1000205-85 = "高級な料理には、その高級さに見合ったサービスと料理とが合わせて提供されねばなりません。"
1000205-86 = "[s3] \"幾つかはよく分からなかったけど……。\"\n[s4] \"すごく怒ってるのは分かった。\""
1000205-87 = "……。"
1000205-88 = "……。"
1000205-89 = "何より、一人で食べる料理は思っていた以上に美味しくないということに、今更気が付きましたわ。"
1000205-90 = "うふふ。"
1000205-91 = "帰ってシャワーを浴びなくてはですね、少々焦げ臭くなってしまいましたし……。"
1000205-92 = "まるで焼き過ぎた焼き鳥のようですわ。"
1000205-93 = "それでは……先生、次はもう少し綺麗な姿でお会いしましょう。"
1000205-100 = "（ハルナはなんだか寂しそうな姿で、ふらつきながら消えていった）"
