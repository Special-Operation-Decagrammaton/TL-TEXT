[translation]
1000708-1 = "Lembranças eternas"
1000708-2 = "Kivotos - Centro da cidade"
1000708-4 = "Ei, você aí, a aluna de cabelo vermelho!"
1000708-5 = "Hm? Eu?"
1000708-6 = "Isso, você é a aluna que estava pintando com spray na parede aqui perto antes, não é?"
1000708-7 = "Ah... bem..."
1000708-8 = "Na verdade, eu sou o dono daquela parede."
1000708-9 = "Me desculpe!"
1000708-11 = "Eu não tive a intenção de fazer mal, é que a parede estava tão suja que eu acabei..."
1000708-12 = "Por favor, não chame a polícia!"
1000708-13 = "Não, não, nada de polícia. Eu não estou aqui para brigar com você."
1000708-14 = "Na verdade, eu estava tendo problemas com aquela parede porque as pessoas que passavam por ali jogavam lixo ou faziam pichações horríveis."
1000708-15 = "Mas, graças ao desenho incrível que você fez, o lixo diminuiu bastante e as pichações também. Muito obrigado mesmo."
1000708-16 = "Ah, eu só fiz porque quis, então... #nAh, ahaha...!"
1000708-17 = "Dito isso, se você não se importar, poderia pintar outras paredes também?"
1000708-18 = "É apenas um pedido, não quero te forçar a nada..."
1000708-19 = "Eu, eu faço! Por favor, deixe-me fazer!"
1000708-21 = "Hehe, e foi assim que consegui permissão para pintar o quanto eu quiser nessa parede super legal!"
1000708-22 = "Poder pintar na parede como bem entender, sem me preocupar com o que os outros pensam... nem grafiteiros famosos têm oportunidades assim com frequência!"
1000708-23 = "[s] \"Estou ansioso para ver o que a Maki vai desenhar.\""
1000708-24 = "O que está dizendo, Sensei? #nVocê prometeu que ia desenhar comigo, lembra?"
1000708-25 = "Vamos desenhar juntos, Sensei. #nAqui, vou te emprestar meu spray."
1000708-26 = "[s] \"Como será que eu devo desenhar...\""
1000708-27 = "Não é difícil. #nÉ só fazer os traços como quiser e aplicar as cores."
1000708-29 = "Mesmo se errar, dá para passar outra camada por cima quantas vezes quiser... #nRelaxe e vamos nessa!"
1000708-32 = "[wa:2000]— E então, [wa:700] não ficou legal?"
1000708-34 = "— O que você achou, Sensei?"
1000708-37 = "[wa:500]— Ué... [wa:1000] por que essa reação tão sem graça?"
1000708-40 = "— Tente colocar um pouco mais de alma artística nisso!"
1000708-42 = "— ..."
1000708-45 = "— O que foi que você desenhou, Sensei?"
1000708-47 = "[wa:500]— Ah, bem..."
1000708-50 = "— Ahaha! [wa:700] O que é isso? [wa:800] É muito engraçado!"
1000708-53 = "[wa:700]— Se eu tenho medo de estar num lugar tão alto? [wa:3800] Não se preocupe, [wa:800] o Sensei está aqui comigo. [wa:200]"
1000708-56 = "[wa:1000]— Se precisar, pode me chamar a qualquer hora."
1000708-58 = "— Vou deixar tanto a parede quanto você, [wa:1200] com cores incríveis!"
1000708-61 = "Espero que esta parede permaneça para sempre como uma lembrança com o Sensei."
1000708-63 = "...Brincadeira. Esqueça o que eu disse!"
