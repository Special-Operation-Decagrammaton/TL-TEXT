[translation]
1000708-1 = "永遠の思い出"
1000708-2 = "キヴォトス・繁華街"
1000708-4 = "そこ、そこの赤い髪の生徒さん！"
1000708-5 = "ん？あたし？"
1000708-6 = "そう、前にこの辺の壁に、スプレーで絵を描いてたあの生徒さんだよね？"
1000708-7 = "あ……えっと……。"
1000708-8 = "実は私は、あの壁の持ち主でね。"
1000708-9 = "ごめんなさい！"
1000708-11 = "悪気はなかったんです、壁が汚くてつい……。"
1000708-12 = "お願いです、警察だけは！"
1000708-13 = "いやいや警察だなんて、怒るつもりじゃないんだよ。"
1000708-14 = "実はあの壁のところは、通りすがりの人達がゴミを捨てたりひどい落書きをするもんだから、困っていたんだよ。"
1000708-15 = "だけど生徒さんがあの壁に素敵な絵を描いてくれたおかげで、ゴミもだいぶ減ったし、落書きもぐんと減ったんだ。本当にありがとう。"
1000708-16 = "あ、あたしはただ、やりたくてやっただけなので、#nあ、あははっ……！"
1000708-17 = "それでなんだけどね、もしよかったら、他の壁にも絵を描いてくれないか？"
1000708-18 = "あくまでお願いだから、無理にとは言わないけど……。"
1000708-19 = "やっ、やります！是非やらせてください！"
1000708-21 = "ふふっ、それでこのカッコいい壁に、思う存分描いてもいいって許可をもらったってわけ！"
1000708-22 = "周りの目を気にせず思うがまま壁に絵が描けるなんて、こんな機会は有名なグラフィティ・ライターたちでも珍しいことなんだから！"
1000708-23 = "[s] \"マキがどんな絵を描くか、楽しみ。\""
1000708-24 = "何言ってるの、先生。#n前に、あたしと一緒に絵を描いてくれるって約束したでしょ？"
1000708-25 = "先生も一緒に描こっ。#nほら、あたしのペイントスプレー貸してあげる。"
1000708-26 = "[s] \"どうやって描けばいいのかな……\""
1000708-27 = "難しくないよ。#n思うがままに線を描いて、色を乗せればいいの。"
1000708-29 = "もし間違えたとしても、上からいくらでも重ねられるから……#n気楽に描いていこ！"
1000708-32 = "[wa:2000]― さて、[wa:700]これでいい感じじゃない？"
1000708-34 = "― 先生から見て、どう？"
1000708-37 = "[wa:500]― えぇっ……[wa:1000]なんでそんなにイマイチな反応なの？"
1000708-40 = "― もっと芸術魂を燃やして見てみてよ！"
1000708-42 = "― ……。"
1000708-45 = "― 先生は何を描いたの？"
1000708-47 = "[wa:500]― えーっと……。"
1000708-50 = "― あはは！[wa:700]なにこれ、[wa:800]めっちゃ面白い！"
1000708-53 = "[wa:700]― こんな高いところで怖くないのかって？[wa:3800]大丈夫、[wa:800]先生がそばにいるから。[wa:200] "
1000708-56 = "[wa:1000]― 必要ならいつでもあたしを呼んで。"
1000708-58 = "― 壁も、先生も、[wa:1200]いい感じに彩ってあげる！"
1000708-61 = "先生との思い出として、この壁が永遠に残るといいな。"
1000708-63 = "……なんてね。今言ったのは忘れて！"
