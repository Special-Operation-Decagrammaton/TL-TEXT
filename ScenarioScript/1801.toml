[translation]
1801-1 = "O Comitê de Realização da Justiça está fechado (1)"
1801-2 = "Fábrica abandonada perto da Trinity Academy"
1801-3 = "Yay!"
1801-5 = "Não faça barulho! Se você não ouvir o que eu digo, você estará em apuros!"
1801-6 = "Ah, quem diabos são vocês? Qual é o propósito de fazer isso...!"
1801-7 = "O que a filha de Trinity fará quando descobrir?"
1801-8 = "Tudo o que você precisa fazer é ficar aqui até a escola pagar o resgate. Não pense muito!"
1801-9 = "Mas, negocie com a escola! ?"
1801-10 = "Isso mesmo! Já entrei em contato com você, perguntando se você gostaria do seu aluno de volta!"
1801-11 = "Não, não, fuja... não, por favor, fuja...! !"
1801-12 = "dentes?"
1801-13 = "O que de repente..."
1801-15 = "Dokaaaaaan! !"
1801-16 = "Ei, ei! ?"
1801-17 = "O-o que! ? O que aconteceu! ?"
1801-19 = "Kuku, Kuku, Kuku…."
1801-21 = "Kuhihihihihihihihi! !"
1801-22 = "Ah, uau! ?"
1801-23 = "Está aqui…!"
1801-25 = "Kieeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeee! ! ! !"
1801-28 = "Cavaleiros Socorros/Ala Central"
1801-29 = "...Como vai?"
1801-30 = "Felizmente, os estudantes aqui não estão em condições tão ruins quanto do outro lado..."
1801-31 = "Acho que seria melhor deixá-lo descansar no hospital por cerca de 3 semanas, já que está incapacitado."
1801-32 = "……é assim mesmo."
1801-33 = "Serina-senpai está de volta!"
1801-34 = "Transportamos os membros da Brigada de Capacetes Decoboko para um hospital fora da cidade!"
1801-35 = "Todos pareciam ter esmagado uma lata de bebida e era difícil de limpar."
1801-36 = "Esse foi Tsurugi do Comitê de Realização da Justiça――"
1801-37 = "Hanae-chan."
1801-39 = "Ah, desculpe..."
1801-42 = "... Obrigado pelo seu apoio contínuo."
1801-43 = "Sim, por favor, deixe comigo."
1801-45 = "Ufa..."
1801-46 = "Obrigado pelo seu trabalho duro, Senpai."
1801-47 = "Em seguida, diga olá à \"Irmandade\" que resgatou os reféns do prédio desabado..."

1801-48 = "...Isso mesmo. Eu tenho que passar por lá também..."
1801-49 = "Depois disso, tenho que ir ao escritório administrativo que tratou do pedido de indenização."
1801-50 = "Concordo……."
1801-51 = "O número de balas usadas foi bastante grande, então relatei isso à sede de atividades do clube, só para garantir..."
1801-52 = "……."
1801-53 = "...Até certo ponto, acho que não há como evitar. Não é possível reduzir o dano a zero..."
1801-54 = "Isso é verdade, mas..."
1801-55 = "Eu sinto que Tsurugi está se sentindo deprimido por algum motivo..."
1801-56 = "...Não é isso que sempre acontece?"
1801-57 = "Isso também é verdade..."
1801-58 = "sim……?"
1801-59 = "o que está errado?"
1801-60 = "Bem, o Tea Party nos enviou um vídeo."
1801-61 = "Festa do chá! ?"
1801-63 = "Olá, membros do Comitê de Realização da Justiça. Ouvi o final da história, obrigado pelo seu trabalho duro."
1801-64 = "O resgate em si foi um sucesso... Porém, todos os estudantes reféns foram hospitalizados."
1801-65 = "Existe a possibilidade de que alguns deles tenham TEPT por testemunharem o quão horrível Tsurugi foi durante a missão..."
1801-66 = "……."
1801-67 = "Diante dessa situação, pensei um pouco."
1801-68 = "O que todos vocês precisam agora?"
1801-69 = "Concluindo, penso que o que é necessário é “interação”."
1801-70 = "Eu diria que é uma troca, ou mais precisamente, uma troca calorosa e amorosa com bom senso."
1801-71 = "Acho que é disso que todos no Comitê de Realização da Justiça precisam hoje."
1801-72 = "Foi quando tive uma ideia. Vamos tirar um dia de folga do Comitê de Realização da Justiça amanhã."
1801-73 = "Em vez disso, participe de outros clubes, clubes ou comitês da escola."
1801-74 = "Através dessa interação, você certamente conseguirá compreender o bom senso e o amor. Não há dúvida sobre isso."
1801-75 = "Hehe, você está ansioso por isso?"
1801-76 = "Tenha um bom dia amanhã."
1801-78 = "Ah, a propósito, esta é uma decisão obrigatória. Não há exceções."
1801-80 = "……."
1801-81 = "...O que isto significa? Para outras atividades do clube...?"
1801-82 = "Ha, é assim de novo..."
