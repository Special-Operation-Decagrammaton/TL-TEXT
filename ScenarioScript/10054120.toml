[translation]
10054120-1 = "第12話;もうひとつだけ"
10054120-5 = "[ns] \"みんな、楽しかった？\""
10054120-6 = "はい！とっても！"
10054120-7 = "忘れられない思い出になったね。"
10054120-8 = "一応、投資先の現地査察であったことを忘れないでほしいが……。"
10054120-9 = "それを含めても、楽しい時間ではあったな。"
10054120-10 = "ありがとうございます、先生。私たちのために時間を作ってくれて。"
10054120-11 = "[s] \"ううん。私もすごく楽しかったし。\""
10054120-12 = "ああ、何よりじゃ。"
10054120-13 = "しかし……山海経は何事もなかったかの？"
10054120-14 = "だと思います。カナエも、やる時はちゃんとやりますから。"
10054120-15 = "街の様子も、査察に出る前と同じように――"
10054120-20 = "う、うん……？"
10054120-27 = "なっ！？"
10054120-28 = "カナエ、何かあったのかえ？"
10054120-29 = "門主様……ミナちゃん……。"
10054120-33 = "私は、最善を尽くしました。"
10054120-34 = "本当に……頑張ったんです……。"
10054120-35 = "それだけは、信じてください……。"
10054120-36 = "ぽっくり。"
10054120-41 = "だ、大丈夫ですか！？"
10054120-45 = "玄龍門め、いつもいつもうちらのことコケにしやがって。"
10054120-46 = "もう限界！目にもの見せてやる！"
10054120-52 = "法と秩序のもと、今日こそあの高慢ちきを懲らしめてやろう！"
10054120-53 = "行くぞ！玄龍門、出動！！"
10054120-55 = "わあ！お姉ちゃんたちがいっぱい！"
10054120-56 = "教官のお姉ちゃんは梅花園から出るなって言ってたけど、やっぱり外って楽しいね！"
10054120-57 = "でも……玄武商会と玄龍門のお姉ちゃんたち、なんか怖いよ……？"
10054120-58 = "紛争とは重力のようなものだからね。#n誰かが少し押すだけで、どんどん下へと落ちていくの。"
10054120-59 = "そして喜ぶのは第三者。マスコミは視聴率を、企業は利益を得るんだよね。"
10054120-60 = "だからこの世には葛藤が絶えないんだ。"
10054120-61 = "なに言ってるか全然分かんない！"
10054120-62 = "[ns1] \"結局……。\"\n[ns2] \"こうなってしまうのか……。\""
10054120-65 = "……ルミ。"
10054120-66 = "うん……分かってるよ。"
10054120-67 = "手間をかけるの。"
10054120-68 = "ううん、こちらこそ。"
10054120-69 = "さっそく一仕事じゃな。"
10054120-70 = "休んだ分、頑張ろっか。"
10054120-75 = "シュン姉さん……？私たちはどうすれば……。"
10054120-76 = "とりあえず……園児たちを連れて帰りましょうか。"
10054120-78 = "[ns3] \"本当に……。\"\n[ns4] \"訓育って難しいなぁ～\""
10054120-82 = "嵐過天晴"
