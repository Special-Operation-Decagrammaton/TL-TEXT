[translation]
10054120-1 = "Episode 12;Just One More Thing"
10054120-5 = "[ns] \"Did everyone have fun?\""
10054120-6 = "Yes! So much!"
10054120-7 = "It’s become an unforgettable memory."
10054120-8 = "Though I’d like to remind you that this was supposed to be an on-site inspection of an investment target..."
10054120-9 = "Even taking that into account, it was a fun time."
10054120-10 = "Thank you, Sensei. For making time for us."
10054120-11 = "[s] \"Not at all. I had a great time too.\""
10054120-12 = "Indeed, it was."
10054120-13 = "However... did everything go smoothly in Shanhaijing?"
10054120-14 = "I believe so. Kanae knows how to get things done when it counts."
10054120-15 = "The city looks just as it did before we left for the inspection—"
10054120-20 = "H-huh...?"
10054120-27 = "What!?"
10054120-28 = "Kanae, is something wrong?"
10054120-29 = "Gatekeeper... Mina..."
10054120-33 = "I did my absolute best."
10054120-34 = "I really... I tried so hard..."
10054120-35 = "Please... just believe that much..."
10054120-36 = "*Thud.*"
10054120-41 = "A-are you okay!?"
10054120-45 = "That Xuanlongmen, always looking down on us."
10054120-46 = "I've had enough! I'm going to show them what for!"
10054120-52 = "In the name of law and order, today we teach those arrogant fools a lesson!"
10054120-53 = "Let's go! Xuanlongmen, mobilize!!"
10054120-55 = "Wow! So many big sisters!"
10054120-56 = "The instructor told us not to leave the Plum Blossom Garden, but the outside is so fun!"
10054120-57 = "But... the big sisters from the Xuanwu Chamber of Commerce and the Xuanlongmen look kind of scary...?"
10054120-58 = "Conflict is like gravity. #nIf someone gives it a little push, it just keeps falling further down."
10054120-59 = "And the ones who benefit are the third parties. The media gets ratings, and the corporations get profits."
10054120-60 = "That’s why there’s never an end to conflict in this world."
10054120-61 = "I have no idea what you're talking about!"
10054120-62 = "[ns1] \"In the end...\"\n[ns2] \"Is this how it has to be...\""
10054120-65 = "......Lumi."
10054120-66 = "Yeah... I know."
10054120-67 = "Sorry for the trouble."
10054120-68 = "No, thank you instead."
10054120-69 = "Looks like we've got work to do right away."
10054120-70 = "Let's work hard to make up for the break."
10054120-75 = "Shun... what should we do...?"
10054120-76 = "For now... let's take the children home."
10054120-78 = "[ns3] \"Honestly...\"\n[ns4] \"Raising children is so difficult~\""
10054120-82 = "After the Storm, Clear Skies"