[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 24/06.]
10054120-1 = "Episódio 12: Só Mais Uma Coisinha"
10054120-5 = "[ns] \"Vocês se divertiram?\""
10054120-6 = "Sim! Demais!"
10054120-7 = "Foram memórias que nunca esqueceremos."
10054120-8 = "Bem, eu gostaria que vocês se lembrassem de que o propósito oficial de tudo isso foi uma inspeção ao local do investimento, mas..."
10054120-9 = "Mesmo assim, não posso negar que foi um tempo muito prazeroso."
10054120-10 = "Muito obrigada por arrumar um espaço na sua agenda para nós, Sensei."
10054120-11 = "[s] \"Imagina. Eu também me diverti pra caramba.\""
10054120-12 = "Umu, isso é o que mais importa."
10054120-13 = "Porém... será que Shanhaijing sobreviveu em paz durante a nossa ausência?"
10054120-14 = "Acredito que sim. A Kanae pode ser daquele jeito, mas sabe fazer o trabalho quando aperta."
10054120-15 = "Tenho certeza que as ruas estarão exatamente do mesmo jeito de antes de partirmos――"
10054120-20 = "E-Eh...?"
10054120-27 = "O quê!?"
10054120-28 = "Kanae, aconteceu alguma tragédia aqui?"
10054120-29 = "Senhora Monshu... Mina-chan..."
10054120-33 = "Eu dei o meu sangue e fiz o melhor que pude."
10054120-34 = "Eu me esforcei... como nunca antes na vida..."
10054120-35 = "Por favor... acreditem em mim..."
10054120-36 = "(Cai no chão desmaiada)"
10054120-41 = "V-Você está bem!?"
10054120-45 = "Maldita Xuanlong Office! Vocês sempre esnobam e nos tratam como lixo."
10054120-46 = "A minha paciência acabou! Vocês vão ver só!"
10054120-52 = "Em nome da lei e da ordem, hoje nós vamos dar uma lição nesses engomadinhos!"
10054120-53 = "Avante! Xuanlong Office, hora de agir!!"
10054120-55 = "Uau! Tem um montão de moças mais velhas aqui!"
10054120-56 = "A instrutora disse pra gente não sair do Jardim, mas brincar lá fora é muito melhor!"
10054120-57 = "Mas... as moças da Genbu Express e da Xuanlong parecem muito assustadoras... né?"
10054120-58 = "Os conflitos são iguais à gravidade.\nBasta um empurrãozinho de alguém para que tudo caia num abismo sem fim."
10054120-59 = "E quem ri no final é o terceiro lado. A mídia ganha a audiência, e as corporações levam o lucro."
10054120-60 = "É por isso que os confrontos nunca desaparecem deste mundo."
10054120-61 = "Eu não entendi nadinha do que você falou!"
10054120-62 = "[ns1] \"No final das contas...\"\n[ns2] \"Acabamos nisso aqui de novo...\""
10054120-65 = "......Rumi."
10054120-66 = "É... eu já sei."
10054120-67 = "Lhe causarei mais dor de cabeça."
10054120-68 = "Não mesmo. Eu que digo isso."
10054120-69 = "Vamos voltar ao trabalho, então."
10054120-70 = "Vamos dar o nosso sangue pra compensar a folga que tivemos."
10054120-75 = "Irmãzona Shun...? O que nós vamos fazer..."
10054120-76 = "Por enquanto... vamos pegar as crianças e fugir de volta em segurança."
10054120-78 = "[ns3] \"É impressionante...\"\n[ns4] \"Como educar dá trabalho...\""
10054120-82 = "Depois da tempestade, sempre vem a calmaria"