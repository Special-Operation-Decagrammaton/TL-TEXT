[translation]#[Texto revisado, mas pode haver alterações como Censura.] Em aguardo de revisão de formatação de texto. - Filipe 11/06.
42030-1 = "Episódio 3;A Isca"
42030-3 = "……Hum, acho que o ponto tá perfeito. Sangrando no meio e tostado por fora."
42030-4 = "Então, sem mais delongas――"
42030-6 = "ITADAKIMASU!!"
42030-11 = "E-Esse sabor…… é tão pecaminoso……!!"
42030-13 = "Na primeira mordida, a gordura derreteu quente na minha língua……#num tsunami de suculência explodindo na minha boca…… ahhh……"
42030-14 = "Que diabos eu andei mastigando a minha vida inteira achando que era carne……?"
42030-15 = "Derreteu antes mesmo de eu mastigar…… e a gordura é tão doce……"
42030-16 = "É uma carne de qualidade suprema……#nÉ um luxo tão absurdo que a minha língua se sente até culpada por estar tocando nisso……"
42030-17 = "[ns] \"Tem bastante lombo aqui, comam até não aguentar mais.\""
42030-18 = "M-Muito obrigada, Sensei. Mas…… você tem certeza de que não tem problema?#nEu sei que é um agradecimento, mas uma carne dessas deve custar uma fortuna……"
42030-19 = "……É. Tá ostentoso demais pra ser só um \"obrigado\"."
42030-20 = "Peraí…… será que essa carne toda é uma isca pra fazer a gente cair numa armadilha?!"
42030-21 = "Seduzir o alvo com guloseimas e doces para fazê-lo baixar a guarda……"
42030-22 = "E-Isso é o que os manuais chamam de Honey Trap……?"
42030-23 = "[s1] \"Acho que o termo Honey Trap não se aplica muito a dar comida pra alguém com fome……\"\n[s2] \"Relaxem, é só um presente de coração. Comam sem medo.\""
42030-24 = "……Quer saber? Que se dane. Se isso for uma armadilha, eu mordo a isca de bom grado e peço bis."
42030-25 = "……Quer saber? Que se dane. Se isso for uma armadilha, eu mordo a isca de bom grado e peço bis."
42030-26 = "Encher a barriga com carne bovina premium assim……#nIsso não aconteceria nem se a Academia SRT voltasse à ativa hoje."
42030-27 = "Apoiado. Mas carne de porco enlatada barata eles davam pra gente até a gente engasgar."
42030-28 = "Urgh…… logo agora que a gente tá comendo o néctar dos deuses, não me faz lembrar daquela ração nojenta……"
42030-29 = "Verdade…… as rações de combate de campo da SRT eram invariavelmente compostas de carne de porco salgada em lata."
42030-30 = "Teve um exercício de acampamento em que sobrevivemos comendo SÓ carne de porco enlatada por quatro dias seguidos……"
42030-31 = "Ter que engolir aquela lata gosmenta de banha fria às seis da manhã……#nTrauma pro resto da vida. Nunca mais chego perto daquilo……"
42030-33 = "Mas…… por que será que a logística da SRT só mandava lata de porco pra gente……?"
42030-34 = "Poxa, no mínimo poderiam variar com uma lata de atum ou um corned beef……"
42030-35 = "A resposta é simples: porque é a opção mais barata do mercado."
42030-36 = "Os engravatados da burocracia adoram brincar com planilhas de custo.#nExiste até um ditado no meio militar: \"Os suprimentos devem sempre vir da licitação mais ridícula possível\"."
42030-37 = "A lata de porco custa centavos e dura uma eternidade na prateleira.#nÉ por isso que é a ração de combate padrão desde a época dos dinossauros."
42030-38 = "Isso é tão infame que……#numa vez, uma escritora de Trinity ficou tão enojada de comer porco enlatado todos os dias,#nque ela protestou substituindo toda a comida das histórias dela por \"Lata de Porco\"."
42030-39 = "Gente, a gente tá mastigando Wagyu suculento agora, dá pra parar de falar da droga da lata de porco?"
42030-40 = "Cala a boca, Kurumi."
42030-42 = "Ah, eu conheço as obras dessa autora. Se não me falha a memória, no livro dela,#numa ordem de Cavaleiros Templários sai em busca do Santo Graal e acaba enfrentando um coelho selvagem, certo?"
42030-43 = "Sim, essa mesma. ――Mas onde você quer chegar?"
42030-44 = "……Logo quando o nosso Esquadrão RABBIT foi formado, uma veterana me contou uma história."
42030-45 = "Ela me disse que \"Coelho\" era um nome fofo demais,#ne que talvez não fosse o codinome ideal para uma unidade de execução tática implacável da SRT."
42030-46 = "Mas aí, essa veterana usou justamente o livro dessa autora como lição."
42030-47 = "Ela disse: \"Coelhos parecem animais dóceis e fofos de longe……#nmas quando enfurecidos, são feras sanguinárias capazes de destroçar cavaleiros armados\"."
42030-48 = "Faz sentido. No livro, os Cavaleiros Templários super treinados#nforam decapitados a dentadas pelo coelho na entrada da caverna e fugiram chorando."
42030-49 = "Eles menosprezaram o alvo pela aparência fofa e pagaram com a vida."
42030-50 = "E como termina o livro?#nOs cavaleiros perdem pro coelho e desistem do Graal?"
42030-51 = "Não. O coelho invencível acabou virando poeira quando os cavaleiros apelaram e jogaram uma Granada de Mão Sagrada nele……"
42030-52 = "Entendi…… no final das contas, por mais feroz que o coelho seja,#nele continua sendo um bicho impotente quando enfrenta o fogo de uma granada de verdade……"
42030-53 = "Acho que o nosso futuro vai ser igual…… explodido em pedaços……"
42030-54 = "Desencana disso, Miyu. É só uma metáfora de um livro bobo."
42030-55 = "No momento, o foco tático é aniquilar esse Wagyu e sugar até a última gota de gordura."
42030-57 = "A propósito, Sensei. Durante a crise com os mercenários da Kaiser PMC, houve algum sumiço de itens confidenciais?"
42030-58 = "A Schale abriga servidores e relíquias do Conselho Estudantil. Se algo sumiu naquele caos, as consequências seriam severas……"
42030-59 = "[s] \"Acho que eles não levaram nada de valor, mas……\""
42030-61 = "[ns3] \"O prédio ainda tá uma bagunça, nem terminei o inventário do que sobrou.\"\n[ns4] \"Eu vou tirar um tempo essa semana pra checar gaveta por gaveta.\""
42030-62 = "Ah, deixa que eu faço o inventário pra você, rapidinho~"
42030-63 = "Ah, deixa que eu faço o inventário pra você, rapidinho~"
42030-64 = "Agora? Comendo? Como cê vai fazer isso, Moe?"
42030-65 = "Moe-chan…… não me diga que você tem um canal de vendas pirata no submundo com a Kaiser PMC……"
42030-66 = "CLARO QUE NÃO, CARAMBA!"
42030-67 = "As câmeras de segurança!#nSe eu hackear o feed do saguão da Schale e rodar as fitas de ontem,#na gente descobre na hora quem entrou e se saiu carregando alguma mala."
42030-68 = "O tempo entre o seu sequestro e o nosso resgate não foi tão longo, e não deve ter tido um exército lá dentro. Se alguém vazou com muamba, eu acho na hora."
42030-69 = "Opa, uma ideia decente vindo da Moe. Milagres acontecem."
42030-70 = "Qual é o milagre? O cérebro dela voltou a funcionar porque a gordura do Wagyu lubrificou os neurônios?"
42030-71 = "Vocês querem morrer mastigando, é?!"
42030-75 = "Afff…… entrando nos servidores em nuvem da segurança da Schale…… bypass no firewall da Kaiser…… pronto."
42030-80 = "……Achei! O log visual de ontem tá na minha mão."
42030-84 = "Ah…… esse é o momento em que a gente invadiu chutando as portas……"
42030-85 = "Aqueles capangas com capacetes com visor……#neram a tal Tropa de Elite SOF da Kaiser, né?#nMuito marrentos e muita arma brilhante pra zero habilidade de combate."
42030-87 = "Eles não eram fracos, Saki. O mérito foi da Miyu, que desestruturou a formação deles com o fogo de supressão.#nSe tivéssemos batido de frente, os escudos balísticos deles teriam nos dado dor de cabeça."
42030-88 = "F-Foi porque você e a Saki-chan agiram como escudo humano lá na frente pra mim……#nGraças à marcação tática de vocês, eu pude focar só nos tiros……"
42030-89 = "Hehehe, eu admito que foi divertido botar eles pra correr……"
42030-90 = "……Ei, a gente não tá aqui pra ver o álbum de formatura das nossas kills!#nFoquem nos mercenários que saíram vivos do prédio com bagagem!"
42030-92 = "Hummm…… desse ponto pra frente nós já tínhamos o controle do andar, então vou retroceder o vídeo……"
42030-96 = "Hein? Quem são esses mascarados de preto saindo pelos fundos?#nO equipamento deles não bate com o fardamento tático padrão da Kaiser PMC."
42030-100 = "Esses ratos…… tão arrastando caixas pesadas pra fora. Caixas que não tavam na mão deles quando entraram."
42030-101 = "[s] \"Consegue dar zoom nas caixas? O que eles levaram?\""
42030-102 = "A compressão de imagem dessa câmera é um lixo, tá tudo pixelado……"
42030-103 = "Mas repara na movimentação tática deles. O recuo coordenado…… são profissionais.#nAs armas que eles carregam nas costas também não parecem tranqueira de rua……"
42030-108 = "……Saki."
42030-109 = "É…… O equipamento deles……"
42030-111 = "Hã? Por que vocês duas ficaram pálidas de repente?"
42030-112 = "Esses mercenários não identificados que saquearam a Schale…… Eles estão portando armamento exclusivo da SRT."
42030-113 = "Q-Quê……? O que você quer dizer com isso……?"
42030-114 = "Olha o fuzil do cara puxando a fila. Aquele módulo acoplado é uma mira óptica termal híbrida IR-Vis.#n"
42030-115 = "Essa mira custa uma fortuna absurda e é inútil para quem não usa o nosso Visor Noturno de Combate.#nOs únicos protótipos em circulação foram fabricados e fornecidos EXCLUSIVAMENTE para a elite da Academia SRT."
42030-116 = "E olha os rádios táticos no colete deles. Aquela carcaça militar com criptografia quádrupla é tecnologia caseira da SRT.#nNão é de longe equipamento comercial da Kaiser."
42030-117 = "E-Espera?! Como mercenários terroristas botaram a mão em equipamento confidencial nosso?!"
42030-118 = "[s] \"Hein? Vocês descobriram alguma coisa no vídeo?\""
42030-119 = "N-NADA! Não vimos nada! A gente só empolgou discutindo marca de arma de brinquedo……!!"
42030-120 = "Shiii, Moe. Abaixa a voz e disfarça."
42030-121 = "F-Foi mal…… é que bateu o desespero……"
42030-123 = "Mas, de verdade…… se aqueles caras estão usando o nosso equipamento militar……"
42030-124 = "……Só existem duas maneiras lógicas de escoria externa conseguir tecnologia da SRT."
42030-125 = "Ou eles atacaram e saquearam uma das nossas bases secretas――"
42030-126 = "――Ou algum membro da SRT vendeu essas armas de mão beijada no mercado negro."
42030-127 = "Aha…… ahahaha, impossível, né? A opção dois é piada.#nCadetes incorruptíveis da elite máxima passando contrabando pra terrorista?! Que absurdo! Quem faria isso?! Ninguém!"
42030-129 = "Bem, o velho e bom escambo de rua. Um clássico da sobrevivência marginal."
42030-130 = "Nós repassamos a nossa tecnologia de ponta que estava pegando poeira em troca de fuzis velhos e caixas de munição pra gente não morrer de fome……"
42030-133 = "Ah."
42030-134 = "Ah."
42030-135 = "Vocês…… não lembram…… que logo depois que nosso acampamento foi alagado no dilúvio……#nA gente empacotou as \"bugigangas e miras táticas que não usávamos\" e vendemos pra um contrabandista no beco pra comprar arroz……?"
42030-136 = "Agora que você tocou no assunto…… aquele cara que comprou a nossa carga…… tava todo coberto, a voz era estranha…… era muito suspeito……"
42030-137 = "Droga. Peraí. Isso significa que AS NOSSAS ARMAS QUE NÓS VENDEMOS PARA COMPRAR COMIDA……#nForam usadas para fuzilar a Schale e roubar o Sensei?!"
42030-138 = "……Putz, Saki. O Sensei tá aqui nos agradecendo e dando churrasco de luxo pra gente, e NÓS FOMOS AS CULPADAS indiretas da invasão."
42030-143 = "[ns5] \"Gente, tudo bem aí? Já encheram a barriga?\"\n[ns6] \"Ainda tem bastante carne crua se quiserem que eu grelhe mais.\""
42030-144 = "É, Sensei, sabe como é……"
42030-145 = "É, Sensei, sabe como é……"
42030-146 = "AHAHAHA! Não, não se preocupe! Nossa barriga já tá mega estufada de carne! Obrigado mesmo!"
42030-147 = "E-Eu também…… acho que se eu mastigar mais um pedaço eu vou…… vomitar a verdade…… digo, vomitar a carne……"
42030-148 = "Além do mais, a gente…… nós acabamos de lembrar de uma missão ultrassecreta inadiável que surgiu agora mesmo!"
42030-149 = "[s] \"Uma missão urgente do nada……?! O que aconteceu? Posso ajudar?\""
42030-150 = "NÃO SE METE NISSO! É SEGURANÇA NACIONAL! Não é da sua conta!"
42030-151 = "[s] \"Tá bom, tá bom. Se sobrar carne, eu guardo tudo na geladeira da Schale pra vocês buscarem amanhã, ok?\""
42030-152 = "Copiado. Agradeço a logística."
42030-156 = "Capitã…… você não acha que…… a gente tem o dever moral de confessar pro Sensei que nós fomos as contrabandistas imbecis que armaram os terroristas……?"
42030-157 = "O Sensei quase foi morto por causa da nossa ignorância…… eu me sinto um lixo……"
42030-158 = "……Nós vamos nos curvar e pedir perdão por isso. Mas não de mãos vazias.#nPrimeiro, nós vamos caçar esses canalhas, amassar os ossos deles e recuperar o que roubaram."
42030-159 = "Exatamente. O perdão vem depois do sangue."
42030-160 = "E outra, o Sensei já tá entupido de burocracia por causa da bagunça na Schale……#nJogar mais esse pepino no colo dele agora seria crueldade."
42030-162 = "Nós vamos varrer os terroristas do mapa, recuperar o saque……#nE aí sim, vamos nos ajoelhar e confessar nosso pecado com honra."
42030-163 = "Moe. Você consegue hackear os códigos de transponder daquelas armas e rastrear o paradeiro delas na cidade?"
42030-164 = "Mamão com açúcar. O hardware deles tem assinatura criptografada que emite sinal constante.#nMe dá alguns minutos pra isolar o ping na rede e eu jogo as coordenadas na tela."
42030-165 = "Trabalhe rápido.#nMiyu, Saki. Checagem total no arsenal. Quero fuzis carregados e equipamento pronto para incursão violenta."
42030-166 = "Aqueles ratos usaram a insígnia da SRT para cometer crimes e cuspiram no Sensei……#nNós vamos mostrar pra eles por que a SRT é temida."
42030-170 = "[ns] \"Ah, parece que aquele pouco de porco enlatado também sobrou…… acho que vou jogar fora……\""
42030-172 = "[ns9] \"Ué…… pra onde todo mundo sumiu do nada……?\"\n[ns10] \"Essas meninas correm rápido quando querem……\""
42030-176 = "Próximo Episódio;Reencontro Inesperado"