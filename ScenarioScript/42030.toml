[translation]
42030-1 = "Episódio 3: Isca"
42030-3 = "……Certo, assar até este ponto deve ser o suficiente."
42030-4 = "Então, vamos lá—"
42030-6 = "Itadakimasu!"
42030-11 = "E-esse sabor... é pecaminoso demais...!!"
42030-13 = "Ao dar uma mordida, a gordura se espalha...#nO sabor concentrado preenche toda a minha boca..."
42030-14 = "O que será que eu estive comendo como carne bovina até hoje...?"
42030-15 = "Derrete no momento em que entra na boca... e a gordura é tão doce..."
42030-16 = "É uma carne de altíssima qualidade...#nÉ um luxo tão grande que até sinto pena da minha própria língua..."
42030-17 = "[ns] \"Tem bastante carne, então comam à vontade.\""
42030-18 = "Muito obrigada. Mas... tem certeza disso?#nMesmo sendo um agradecimento, receber uma carne tão cara assim..."
42030-19 = "……É verdade, é luxuoso demais para ser uma recompensa por aquilo."
42030-20 = "Será que... essa carne é uma isca para nos atrair para uma armadilha!?"
42030-21 = "Enredar alguém com comida doce..."
42030-22 = "E-essa seria a famosa armadilha de mel...?"
42030-23 = "[s1] \"Acho que o sentido disso é um pouco diferente...\"\n[s2] \"É apenas um agradecimento sincero, não se preocupe.\""
42030-24 = "……Bem, tanto faz. Se for uma armadilha dessas, caio nela quantas vezes quiser."
42030-25 = "……Bem, tanto faz. Se for uma armadilha dessas, caio nela quantas vezes quiser."
42030-26 = "A experiência de encher a barriga com carne bovina de luxo...#nprovavelmente não terei nem quando voltar para a Academia SRT."
42030-27 = "É verdade. Embora a gente consiga comer carne de porco enlatada barata o quanto quiser."
42030-28 = "Ugh... estamos comendo uma carne tão boa, não me faça lembrar disso..."
42030-29 = "De fato, a ração distribuída nas operações de campo da SRT era sempre carne de porco em conserva."
42030-30 = "Teve uma vez, durante o treinamento de acampamento, que passamos mais de 4 dias comendo apenas carne de porco enlatada..."
42030-31 = "Aquela época em que éramos obrigadas a comer aquela lata gordurosa logo de manhã...#nJá chega, não quero mais passar por uma experiência tão terrível..."
42030-33 = "Mas... por que será que os suprimentos da SRT são só carne de porco enlatada...?"
42030-34 = "Poderiam pelo menos ter carne seca ou atum enlatado..."
42030-35 = "Bem, é porque é a mais barata, né."
42030-36 = "Os figurões adoram brincar com números.#nExiste até um ditado que diz: \"Os suprimentos devem ser sempre adquiridos pelo menor preço de licitação\"."
42030-37 = "A carne de porco enlatada é barata e tem um longo prazo de validade.#nPor isso, é usada como ração de combate há muito tempo."
42030-38 = "Para você ter uma ideia de quão usada ela era...#num certo romancista de Trinity ficou tão farto de comer carne de porco enlatada nas refeições que,#ncomo forma de protesto, mudou toda a comida de sua obra para carne de porco enlatada."
42030-39 = "A gente não está comendo carne de porco enlatada agora, então não precisa falar disso, né?"
42030-40 = "Cale a boca."
42030-42 = "Eu conheço esse romancista. Se não me engano, na obra dele,#nhavia uma história de uma ordem de cavaleiros em busca do Santo Graal lutando contra coelhos selvagens, não é?"
42030-43 = "Tinha algo assim mesmo — mas o que tem isso?"
42030-44 = "……Ouvi isso de um veterano quando o Esquadrão RABBIT foi fundado."
42030-45 = "\"Coelho\" é um nome adorável, mas talvez não seja adequado para o nome de um esquadrão da SRT que exerce um poder tão forte."
42030-46 = "Então, o veterano me contou baseando-se no conteúdo daquela obra."
42030-47 = "\"O coelho é um animal que parece dócil e fofo, mas quando se irrita, é uma fera terrível que desafia até cavaleiros armados.\""
42030-48 = "De fato, naquela história, a ordem de cavaleiros que buscava o Santo Graal#nacabou fugindo depois que o coelho que guardava a caverna mordeu seus pescoços."
42030-49 = "Se você subestimar alguém apenas pela aparência, vai acabar se arrependendo."
42030-50 = "E como termina essa história?#nA ordem de cavaleiros perdeu para o coelho e desistiu de procurar o Santo Graal?"
42030-51 = "Não, o coelho foi eliminado com uma granada usada pelos cavaleiros, mas..."
42030-52 = "Viu só... não importa o quão forte seja o coelho,#nele é um ser impotente diante de uma granada..."
42030-53 = "O nosso futuro também... certamente..."
42030-54 = "Não se preocupe, no fim das contas é só uma metáfora, não é?"
42030-55 = "Por enquanto, vamos nos concentrar no sabor desta carne de luxo."
42030-57 = "A propósito, Sensei. Com o incidente da Kaiser PMC, houve algo que se perdeu ou sumiu?"
42030-58 = "O Schale deve ter muitas coisas relacionadas ao Conselho Estudantil Federal, então estou um pouco preocupada..."
42030-59 = "[s] \"Acho que não tem nada em especial, mas...\""
42030-61 = "[ns3] \"A limpeza após o incidente ainda não terminou.\"\n[ns4] \"Vou arranjar um tempo para verificar depois.\""
42030-62 = "Sendo assim, vou verificar agora mesmo~"
42030-63 = "Sendo assim, vou verificar agora mesmo~"
42030-64 = "Agora? Como você vai fazer isso?"
42030-65 = "Moe... não me diga que você está negociando informações com a Kaiser PMC pelas costas..."
42030-66 = "Claro que não, que ideia!"
42030-67 = "Estou falando das gravações das câmeras de segurança. #nSe eu hackear as câmeras perto da entrada do Schale, #nposso descobrir quem entrou e saiu do prédio, e o que levaram~"
42030-68 = "Não passou muito tempo desde que o Sensei foi sequestrado até a operação de resgate, e não deve ter entrado muita gente, então acho que consigo identificar rapidamente se alguém estava carregando algo suspeito."
42030-69 = "Oh, até que a Moe é inteligente."
42030-70 = "O que foi, comer carne de luxo fez seu cérebro funcionar melhor?"
42030-71 = "Você quer levar uma surra!?"
42030-75 = "Bem... hackeando a segurança do servidor em nuvem das câmeras de segurança..."
42030-80 = "...Consegui! Aqui estão as imagens do dia do incidente."
42030-84 = "Ah... isso é da operação de resgate..."
42030-85 = "Aqueles caras de capacete com viseira ali, #neram o pessoal da SOF ou SOAP da Kaiser, né? #nPara quem estava com armas tão chamativas, não eram grande coisa."
42030-87 = "Foi graças à Miyu, que desviou a atenção dos inimigos com o tiro de precisão. #nSe tivéssemos avançado pela frente, teríamos sofrido baixas consideráveis."
42030-88 = "Foi graças à Saki e à Miyako que entraram primeiro... #nComo as duas informaram a posição dos inimigos, consegui atirar com facilidade..."
42030-89 = "Fufu, foi divertido..."
42030-90 = "...Não parece que estamos revendo um álbum de formatura? #nPrestem atenção no que os soldados estão carregando!"
42030-92 = "Hum... nós estávamos vigiando a partir daqui, então vou voltar um pouco mais..."
42030-96 = "Hm? Quem é esse soldado mascarado? #nNão parece ser da Kaiser PMC."
42030-100 = "Esses caras... estão carregando uma bagagem que não tinham quando entraram."
42030-101 = "[s] \"Dá para confirmar o que eles estão carregando?\""
42030-102 = "A imagem está muito ruim, então não dá para chegar a tanto..."
42030-103 = "Mas, pelos movimentos, são soldados muito bem treinados. #nAs armas também são de altíssima qualidade..."
42030-108 = "...Saki."
42030-109 = "Ah, aquele equipamento ali..."
42030-111 = "Ué? Por que vocês duas ficaram sérias de repente?"
42030-112 = "O soldado não identificado que roubou itens do Schale... parece estar usando equipamentos da SRT."
42030-113 = "O-o que você quer dizer...? Equipamento da SRT...?"
42030-114 = "A mira laser que o indivíduo que parece ser o líder está usando #né um sistema composto duplo que combina infravermelho e luz visível."
42030-115 = "Como é caro e não funciona direito sem visão noturna, #nnão há registros de produção oficial fora o que foi distribuído para os alunos da SRT."
42030-116 = "Além disso, os rádios que os soldados estão usando provavelmente também foram feitos pela SRT. #nO design é completamente diferente dos produtos da Kaiser Industries."
42030-117 = "Hã? Por que algo assim estaria lá!?"
42030-118 = "[s] \"Hm? Você descobriu alguma coisa?\""
42030-119 = "N-nada não! Só me empolguei falando de tática..."
42030-120 = "Shiu, Moe. Por favor, fique em silêncio."
42030-121 = "D-desculpa... é que eu me assustei..."
42030-123 = "Mas, soldados externos estarem com equipamentos da SRT..."
42030-124 = "...Se alguém de fora conseguiu obter equipamentos da SRT, só existem dois meios."
42030-125 = "Atacar a SRT e roubar o equipamento, ou—"
42030-126 = "—Receber diretamente de um aluno da SRT, né."
42030-127 = "Não, não, não tem como ser a segunda opção~ #nNão somos um grupo de mercenários amadores, não tem como um membro da SRT entregar equipamento para soldados da PMC—"
42030-129 = "Bem, de certa forma, é um método de negociação clássico, quase uma origem."
42030-130 = "Entregar itens valiosos que temos e, em troca, receber armas ou munição."
42030-133 = "Ah."
42030-134 = "Ah."
42030-135 = "Pensando bem, quando o acampamento inundou da última vez, #nnós vendemos parte dos equipamentos de forças especiais que não usávamos muito..."
42030-136 = "Agora que você falou, aquele mercador de armas... ele escondia o rosto e era bem suspeito..."
42030-137 = "Espere. Então as armas que vendemos #nacabaram indo parar nas mãos daqueles que atacaram o Schale?"
42030-138 = "...Droga, em vez de sermos agradecidas pelo Sensei, estamos em uma posição em que deveríamos pedir desculpas."
42030-143 = "[ns5] \"A propósito, pessoal, já estão satisfeitas?\"\n[ns6] \"Ainda tem bastante carne aqui.\""
42030-144 = "Bem, é que..."
42030-145 = "Bem, é que..."
42030-146 = "Ah~, não se preocupe! Eu já comi carne até não aguentar mais!"
42030-147 = "E-eu também... acho que cheguei no meu limite..."
42030-148 = "Além disso, acabei de me lembrar de um compromisso urgente."
42030-149 = "[s] \"Compromisso urgente...? Aconteceu alguma coisa?\""
42030-150 = "Não fique perguntando tudo! Isso não é da conta do Sensei, é!?"
42030-151 = "[s] \"Bem, então vou guardar o resto da carne na geladeira do Schale.\""
42030-152 = "Sim, por favor."
42030-156 = "Sobre isso... não deveríamos contar ao Sensei que as armas que vendemos podem ter sido usadas no ataque ao Schale...?"
42030-157 = "Mesmo que possa ter sido por nossa causa que o Sensei passou por maus bocados..."
42030-158 = "...Claro que pediremos desculpas. Mas, agora, encontrar o culpado é a prioridade."
42030-159 = "Ah, eu também acho."
42030-160 = "Além disso, o Sensei deve estar ocupado resolvendo as consequências do incidente por um tempo... É melhor não dar mais motivos para ele se preocupar."
42030-162 = "Depois de capturarmos o culpado e recuperarmos o que foi roubado... explicaremos a situação ao Sensei e pediremos desculpas."
42030-163 = "Moe, você consegue rastrear para onde as armas que negociamos foram parar?"
42030-164 = "Consigo, é só rastrear o código de identificação único dos equipamentos eletrônicos. Acho que vai levar um tempinho, mas dá."
42030-165 = "Então, por favor, faça isso. As outras, por favor, verifiquem seus equipamentos para estarem prontas para sair a qualquer momento."
42030-166 = "Vamos mostrar para esses ladrões que usaram equipamentos da SRT para cometer crimes... do que somos capazes."
42030-170 = "[ns] \"Ah, acho que ainda sobrou um pouco de carne de porco...\""
42030-172 = "[ns9] \"Ué, pessoal...?\"\n[ns10] \"Para onde será que elas foram...?\""
42030-176 = "Próximo episódio: Reencontro inesperado"
