[translation]
80000057-1 = "慣れた様子で"
80000057-2 = "（夜も更けた頃。仕事の途中だったものの、少し用事があって休憩室へと向かった）"
80000057-8 = "[ns1] \"……？\"\n[ns2] 電気を点けて確認する。"
80000057-15 = "（足元に落ちてる何かが目に入った）"
80000057-25 = "[ns] \"……。\""
80000057-27 = "[ns3] \"セリナ。\"\n[ns4] \"隠れないでも大丈夫だよ。\""
80000057-30 = "え、えっと……こんばんは、先生。"
80000057-31 = "休憩の間に召し上がっていただくために、そっと置いて帰ろうかと思ったのですが……。"
80000057-32 = "と、糖分は仕事にも良いですから！お忙しい先生のために、その……！"
80000057-33 = "それからもちろん、今日はバレンタインデーだからということもありますが……。"
80000057-34 = "……ごめんなさい、後者の方が本音です。はい……。"
80000057-35 = "す、すみません何だか色々と、その……。"
80000057-36 = "……はい？"
80000057-37 = "え、まずは座って……？は、はい。"
80000057-38 = "の、飲み物ですか？えっと、何でも嬉しいですが……。"
80000057-39 = "せ、先生、何だか慣れてきましたね……？もうここにいたことを、何も気にされていないと言いますか……。"
80000057-40 = "[s5] \"まあそろそろね……。\"\n[s6] \"私のためにしてくれてるって、分かってるから。\""
80000057-41 = "そ、そうでしたか……。"
80000057-42 = "そ、そうでしたか……。"
80000057-44 = "あ、そのチョコレート……は、はい。どうぞ。"
80000057-45 = "お仕事中でしたもんね。はい、糖分はもちろんのこと、栄養がたっぷりのチョコレートなんです。"
80000057-46 = "あ、美味しいですか？それは良かったです！"
80000057-50 = "で、では私はこれで……また必要になったら来ますね？"
80000057-51 = "[s] \"セリナ。\""
80000057-52 = "は、はい！"
80000057-53 = "[s7] \"普通にエントランスからでも大丈夫だよ。\"\n[s8] \"いつもありがとね。チョコも、すごく嬉しい。\""
80000057-54 = "……。"
80000057-55 = "……。"
80000057-56 = "……ふふっ。"
80000057-57 = "……はい、では。無理はしないでくださいね？"
80000057-60 = "……では、また今度。"
