[translation]
80000057-1 = "Com um jeito acostumado"
80000057-2 = "（Já era tarde da noite. Embora estivesse no meio do trabalho, precisei resolver algo e fui até a sala de descanso.）"
80000057-8 = "[ns1] \"……？\"\n[ns2] Acendo a luz para verificar."
80000057-15 = "（Algo caído no chão chamou minha atenção）"
80000057-25 = "[ns] \"……。\""
80000057-27 = "[ns3] \"Serina.\"\n[ns4] \"Não precisa se esconder, está tudo bem.\""
80000057-30 = "Ah, bem... boa noite, Sensei."
80000057-31 = "Eu pensei em deixar aqui discretamente para você comer durante o seu descanso e ir embora, mas..."
80000057-32 = "A-açúcar faz bem para o trabalho! Para o Sensei, que está tão ocupado, eu...!"
80000057-33 = "E, claro, também tem o fato de que hoje é Dia dos Namorados..."
80000057-34 = "……Desculpe, a segunda opção é o meu verdadeiro motivo. Sim..."
80000057-35 = "D-desculpe, é que, sabe..."
80000057-36 = "……Sim?"
80000057-37 = "Ah, primeiro sentar...? S-sim."
80000057-38 = "U-uma bebida? Bem, qualquer uma me agrada, mas..."
80000057-39 = "S-Sensei, você parece ter se acostumado, não é...? Digo, você não parece se importar nem um pouco com o fato de eu estar aqui..."
80000057-40 = "[s5] \"Bem, já faz um tempo, né...\"\n[s6] \"Eu sei que você faz isso por mim.\""
80000057-41 = "E-era isso..."
80000057-42 = "E-era isso..."
80000057-44 = "Ah, sobre aquele chocolate... s-sim. Por favor."
80000057-45 = "Você estava trabalhando, não é? Sim, além do açúcar, é um chocolate cheio de nutrientes."
80000057-46 = "Ah, está gostoso? Que bom!"
80000057-50 = "E-então, eu vou indo... Se precisar de algo de novo, eu venho, está bem?"
80000057-51 = "[s] \"Serina.\""
80000057-52 = "S-sim!"
80000057-53 = "[s7] \"Você pode entrar pela porta da frente normalmente, sabe.\"\n[s8] \"Obrigado por tudo sempre. Fiquei muito feliz com o chocolate.\""
80000057-54 = "……。"
80000057-55 = "……。"
80000057-56 = "……Fufu."
80000057-57 = "……Sim, então tá. Não se esforce demais, viu?"
80000057-60 = "……Então, até a próxima."
