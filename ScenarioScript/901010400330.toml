[translation]
901010400330-8 = "Hello, this is FOX EATS!"
901010400330-9 = "Are you looking for a place to eat?"
901010400330-15 = "Uh, yeah... Why? I'm already all set with delivery."
901010400330-17 = "FOX EATS is primarily a delivery service, but... we also provide recommendations for restaurants."
901010400330-18 = "If you'd like, I can tell you about a place at Kanezaki Port that has open tables right now."
901010400330-23 = "Oh, sure. Why not?"
901010400330-24 = "I wonder what kind of place a delivery driver would recommend."
901010400330-26 = "Let's see... Right now, I recommend Akita Fisheries!"
901010400330-27 = "They get fresh crab in every day, and you can enjoy all sorts of crab dishes."
901010400330-32 = "Wait... isn't this the place we were just looking at?"
901010400330-33 = "Sorry, but I'll pass. I'm not really a fan of crab."
901010400330-35 = "Is it a shellfish allergy, perhaps?"
901010400330-36 = "No... it's just that crab is such a hassle to eat, you know?"
901010400330-37 = "Besides, I've heard stories lately about people getting attacked by crabs..."
901010400330-38 = "I just don't really like looking at crab claws."
901010400330-40 = "Exactly. Why is crab so difficult to eat, anyway?"
901010400330-42 = "Maybe it's because they're too delicious? Like a defense mechanism?"
901010400330-43 = "In that case, how about a dish that uses pre-shelled crab meat?"
901010400330-48 = "Pre-shelled crab meat?"
901010400330-49 = "Yes. After all, it does take a long time to crack open the shells yourself."
901010400330-50 = "How about some Tenshindon made with real crab?#nI also recommend the butter-rich crab cream croquettes!"
901010400330-51 = "I could definitely eat that!"
901010400330-52 = "I was actually in the mood for something greasy today anyway."
901010400330-53 = "Let's go eat lunch there!"
901010400330-62 = "W-welcome! How many in your party?"
901010400330-64 = "Just two~"
901010400330-71 = "Do you have a table for four?"
901010400330-72 = "Excuse me, three orders of crab fried rice to go, please!"
901010400330-76 = "Y-yes! Please wait just a moment!"
901010400330-77 = "What is going on? We didn't have any customers until just now, so why all of a sudden...?"
901010400330-78 = "This is Akita Fisheries, the crab specialty shop recommended by FOX EATS, right?"
901010400330-79 = "Everyone's been recommending this place as the spot to go for delicious crab dishes..."
901010400330-80 = "Yes, this is Akita Fisheries, but... FOX EATS?"
901010400330-84 = "...Don't tell me, was it that girl who took the flyers earlier?"