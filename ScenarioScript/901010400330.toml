[translation]#[Texto Final. - Filipe 05/07.]
901010400330-8 = "Olá, 'FOX EATS'!"
901010400330-9 = "Estão procurando um lugar pra comer?"
901010400330-15 = "Hã, o quê? Delivery eu já tô servido."
901010400330-17 = "O foco do 'FOX EATS' é entrega, mas também fazemos divulgação de restaurantes."
901010400330-18 = "Posso indicar um lugar aberto agora no porto de Kanezaki?"
901010400330-23 = "Ah, é? Então vamos ver."
901010400330-24 = "Qual é a recomendação da entregadora?"
901010400330-26 = "Bom, agora eu indicaria a 'Pescados Akita'!"
901010400330-27 = "Eles compram caranguejo fresco todo dia e fazem vários pratos."
901010400330-32 = "Aqui…… não é o lugar que a gente tava olhando?"
901010400330-33 = "Desculpa, mas esse lugar não rola. Não gosto muito de caranguejo."
901010400330-35 = "É alérgico a crustáceos?"
901010400330-36 = "Não…… é que caranguejo é trabalhoso de comer."
901010400330-37 = "E ouvi umas histórias de caranguejo atacando gente……"
901010400330-38 = "Fico meio assim de ver as pinças."
901010400330-40 = "Pois é. Por que caranguejo é tão difícil de comer?"
901010400330-42 = "Porque é gostoso demais, talvez? É a defesa dele."
901010400330-43 = "Que tal um prato com carne de caranguejo desfiada?"
901010400330-48 = "Carne desfiada?"
901010400330-49 = "É. Descascar é demorado, né."
901010400330-50 = "Que tal um omurice com caranguejo de verdade? Ou croquete cremoso de caranguejo?"
901010400330-51 = "Isso eu como de boa!"
901010400330-52 = "E hoje eu tava querendo uma coisa mais gordurosa."
901010400330-53 = "Vamos almoçar lá!"
901010400330-62 = "B-Bem-vindos, quantos são?"
901010400330-64 = "Duas pessoas~"
901010400330-71 = "Tem mesa de quatro?"
901010400330-72 = "Desculpa, três porções de arroz frito com caranguejo pra viagem, por favor!"
901010400330-76 = "C-Certo! Só um momento!"
901010400330-77 = "O que tá acontecendo? Até agora não tinha cliente nenhum, por que de repente……"
901010400330-78 = "Aqui é a 'Pescados Akita', a especialista em caranguejo que o 'FOX EATS' recomendou, né?"
901010400330-79 = "Todo mundo tá recomendando esse lugar pra comer caranguejo gostoso……"
901010400330-80 = "Sim, aqui é a Pescados Akita…… mas 'FOX EATS'?"
901010400330-84 = "……Não me diga que foi aquela garota que entregou os panfletos?"