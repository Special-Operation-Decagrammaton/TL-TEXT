[translation]
10036095-5 = "うっ……！"
10036095-11 = "きゃぁ！痛いですわね！"
10036095-12 = "ここまでだ、伝説のスケバン。"
10036095-13 = "降参する気になったか？"
10036095-14 = "それとも、まだ戦えると？"
10036095-15 = "私の戦いは、ここまでですの……？"
10036095-16 = "あなたたち、いったい何者で？"
10036095-20 = "私たちは……。"
10036095-26 = "そこまでにしなさい、アケミ。"
10036095-27 = "[ns] （……誰だ？）"
10036095-29 = "ここが引き際です。"
10036095-30 = "わ、私は……まだ戦えますわ！"
10036095-32 = "ほむ、強がりは良くないですよ。"
10036095-33 = "長らく矯正局に収監されていたせいで、腕が鈍っているのでしょう？"
10036095-34 = "そんな状態で戦いを続けたら……。"
10036095-35 = "再び、矯正局入りする可能性も。#nそれは望ましくありません。"
10036095-36 = "――なにせ、[ruby=・   ・   ・   ・   ・   ・   ・   ・   ・   ・   ・   ・]せっかく脱獄させた七囚人[/ruby]の一人なんですから。"
10036095-37 = "あなたを今、ここで失うわけにはいかないのです。"
10036095-38 = "さぁ、早く部下を連れて離れなさい。"
10036095-40 = "に、ニヤニヤ教授……。"
10036095-41 = "[s] （ニヤニヤ教授……？）"
10036095-47 = "……では、失礼。"
10036095-53 = "……ふんっ。"
10036095-54 = "ここは、あなたのアドバイスに従っておきますわ！"
10036095-55 = "ヘルメット団の皆さん、これでお別れとしましょう！"
10036095-56 = "それと、そこのムササビさん？#n貴方の顔は覚えておきましたよ。"
10036095-57 = "次に戦う時は、一切手加減いたしませんわ。"
10036095-58 = "いつか、必ず決着をつけるとしましょう！"
10036095-59 = "それでは、撤退しますわよ！"
10036095-60 = "はいっ！"
10036095-64 = "急にどうしたんだ、あいつら……。"
10036095-65 = "逃がすな、追いかけるぞ！"
10036095-72 = "も、ものすごいスピードで逃げていきました……。"
10036095-73 = "[s1] \"ビックリしたね。\"\n[s2] \"追いかけるのはやめておこう。\""
10036095-78 = "[ns] \"それより……。\""
10036095-81 = "……。"
10036095-82 = "……。"
10036095-83 = "リーダー。"
10036095-84 = "サオリ姉さん……。"
10036095-88 = "あの……！"
10036095-93 = "アツコ……お祭りは、どうだった？"
10036095-94 = "……楽しかった。"
10036095-95 = "サッちゃんは？"
10036095-96 = "……私も、楽しかった。"
10036095-98 = "まさか……ずっと互いに様子を伺っていたとはな。"
10036095-99 = "DJ B.o.Bの態度が急に変わった時も、#n水鉄砲大会で優勝した時も。"
10036095-100 = "屋台のご飯が、全部サオリ姉さんの奢りだったなんて……#nしかも、スケバンの襲撃を阻止したのは……。"
10036095-101 = "……先生は全部知ってたんだ。"
10036095-102 = "[s3] \"あはは……さ、サプライズってことで。\"\n[s4] \"それぞれ事情があるみたいだったから……。\""
10036095-105 = "[USERNAME]先生のことは責めない。"
10036095-106 = "先生には、秘密にしてくれと言ったからな。"
10036095-107 = "ただ約束を守ってくれていただけだ。"
10036095-108 = "まぁ、それは分かってるけど……。"
10036095-109 = "……じゃあ、私たちがお祭りを楽しめたのは、#n先生のおかげ、だね。"
10036095-110 = "[s] \"それは、みんなが頑張ったからだよ。\""
10036095-111 = "礼を言う、先生。"
10036095-112 = "ありがとう。"
10036095-114 = "私たちの夏を、守ってくれて。"
