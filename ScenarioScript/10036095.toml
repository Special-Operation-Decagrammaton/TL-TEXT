[translation]
10036095-5 = "Ugh...!"
10036095-11 = "Ai! Isso dói!"
10036095-12 = "Acabou para você, delinquente lendária."
10036095-13 = "Decidiu se render?"
10036095-14 = "Ou ainda acha que pode lutar?"
10036095-15 = "Minha luta termina aqui...?"
10036095-16 = "Quem diabos são vocês?"
10036095-20 = "Nós somos..."
10036095-26 = "Já chega, Akemi."
10036095-27 = "[ns] (...Quem é?)"
10036095-29 = "É hora de recuar."
10036095-30 = "E-eu... ainda posso lutar!"
10036095-32 = "Hum, não é bom ser teimosa."
10036095-33 = "Você ficou muito tempo presa na Agência Correcional, então seus reflexos devem estar enferrujados, não é?"
10036095-34 = "Se continuar lutando nesse estado..."
10036095-35 = "Há uma chance de você acabar voltando para a Agência Correcional. #nIsso não seria nada desejável."
10036095-36 = "Afinal, você é uma das Sete Prisioneiras que tivemos tanto trabalho para tirar de lá."
10036095-37 = "Não podemos nos dar ao luxo de perder você aqui agora."
10036095-38 = "Vamos, leve seus subordinados e vá embora."
10036095-40 = "A-aquela Professora Sorridente..."
10036095-41 = "[s] (Professora Sorridente...?)"
10036095-47 = "...Então, com licença."
10036095-53 = "...Hmph."
10036095-54 = "Vou seguir o seu conselho desta vez!"
10036095-55 = "Pessoal do Grupo Capacete, vamos nos despedir por aqui!"
10036095-56 = "E você, esquilo voador aí? #nEu gravei bem o seu rosto."
10036095-57 = "Na próxima vez que lutarmos, não vou pegar leve."
10036095-58 = "Um dia, com certeza vamos acertar as contas!"
10036095-59 = "Sendo assim, estamos recuando!"
10036095-60 = "Sim!"
10036095-64 = "O que deu neles de repente..."
10036095-65 = "Não os deixem escapar, vamos atrás deles!"
10036095-72 = "E-eles fugiram em uma velocidade incrível..."
10036095-73 = "[s1] \"Que susto.\"\n[s2] \"Melhor não perseguirmos.\""
10036095-78 = "[ns] \"Mais importante que isso...\""
10036095-81 = "..."
10036095-82 = "..."
10036095-83 = "Líder."
10036095-84 = "Irmã Saori..."
10036095-88 = "Ei...!"
10036095-93 = "Atsuko... como foi o festival?"
10036095-94 = "...Foi divertido."
10036095-95 = "E você, Sa-chan?"
10036095-96 = "...Eu também me diverti."
10036095-98 = "Quem diria... que estávamos vigiando um ao outro o tempo todo."
10036095-99 = "Desde quando a atitude do DJ B.o.B mudou de repente, #naté quando vencemos o torneio de pistolas d'água."
10036095-100 = "E pensar que toda a comida das barracas foi paga pela irmã Saori... #ne ainda por cima, quem impediu o ataque das delinquentes foi..."
10036095-101 = "...O Sensei sabia de tudo."
10036095-102 = "[s3] \"Ahaha... vamos considerar isso uma surpresa.\"\n[s4] \"Parecia que cada um tinha seus próprios motivos...\""
10036095-105 = "Não vou culpar o Sensei [USERNAME]."
10036095-106 = "Eu disse ao Sensei para manter isso em segredo, afinal."
10036095-107 = "Ele só estava cumprindo a promessa que fez."
10036095-108 = "Bem, eu sei disso, mas..."
10036095-109 = "……Então, o fato de termos conseguido aproveitar o festival foi graças ao Sensei, não é?"
10036095-110 = "[s] \"Isso foi porque todas vocês se esforçaram muito.\""
10036095-111 = "Meus agradecimentos, Sensei."
10036095-112 = "Obrigada."
10036095-114 = "Por ter protegido o nosso verão."
