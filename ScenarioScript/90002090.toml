[translation]
90002090-1 = "Episódio 9; Dress Up"
90002090-6 = "Desculpe a espera, Sensei!"
90002090-7 = "[s] \"Midori...?\""
90002090-8 = "E-está estranho...?"
90002090-9 = "[s] \"Está muito fofo...!\""
90002090-10 = "Hehehe. Obrigada. Fico feliz..."
90002090-15 = "Pegando emprestadas as palavras da Alice, eu criei novas armaduras e equipamentos para todos."
90002090-16 = "O traje de proteção que a Midori está usando é um deles."
90002090-17 = "[s1] \"Para todos?\"\n[s2] \"Para as 8 pessoas?\""
90002090-20 = "Sim."
90002090-21 = "Isso é fácil para mim."
90002090-22 = "A Midori preparou o design."
90002090-23 = "Eu e a Toki verificamos a parte funcional."
90002090-24 = "Para esta ocasião, a Kei-chan até criou equipamentos para desenvolver os designs. #nGraças a isso, o trabalho ficou muito mais fácil."
90002090-25 = "Espere um pouco, irmãzinha. A irmã aqui tem algo a dizer."
90002090-26 = "Por que o design de nós duas é diferente!?"
90002090-28 = "Não há problemas com a movimentação real. Embora a aparência pareça um pouco lenta."
90002090-30 = "A aparência também é importante!"
90002090-31 = "Como você disse que não queria se machucar, eu fiz um design focado na segurança, sabe?"
90002090-32 = "B-bem, eu disse isso, mas..."
90002090-33 = "Mas veja bem, eu queria algo mais... estilo protagonista! Um design legal!"
90002090-34 = "[s] \"Eu acho que está legal o suficiente, não acha?\""
90002090-35 = "S-sério? Bem, se o Sensei diz..."
90002090-37 = "O da Momoi e da Midori é o que possui a maior defesa entre todos."
90002090-38 = "Mesmo que algo aconteça... #nVocês sobreviverão até o fim e poderão pelo menos limpar a bagunça de todo mundo."
90002090-39 = "K-Kei-chan!? #nVocê não tinha dito nada disso enquanto estava criando..."
90002090-40 = "Eu só comentei."
90002090-41 = "E agora, a próxima é..."
90002090-45 = "Diferente da armadura pesada do passado, esta é a Toki em modo de mobilidade, leve e otimizada. #nBoing, boing."
90002090-46 = "Você não consegue ficar parada nem por um segundo, né..."
90002090-47 = "Você quer que o Sensei seja o primeiro a ver o seu novo traje, não é?"
90002090-48 = "Nem todo mundo pensa assim..."
90002090-49 = "Mas eu penso."
90002090-50 = "Entendo..."
90002090-51 = "[s] \"Ah, é verdade. Como você passou o Abi-Eshuh para a Alice...\""
90002090-52 = "Sim. Aproveitei a oportunidade para renovar o conceito e a atmosfera. #nDe agora em diante, pretendo atuar como uma unidade de investigação móvel, usando a velocidade como arma."
90002090-53 = "Acima de tudo, estou muito satisfeita por ter uma excelente retenção de calor. #nO traje de empregada anterior causava problemas de queda de temperatura corporal."
90002090-57 = "[ns] \"...Por acaso, você estava com frio esse tempo todo?\""
90002090-58 = "Sim."
90002090-59 = "[s] \"E mesmo assim, você usava o traje de empregada?\""
90002090-60 = "Sim."
90002090-61 = "Por que, você pergunta?"
90002090-62 = "..."
90002090-63 = "Sensei. Há momentos em que uma pessoa precisa demonstrar determinação."
90002090-64 = "Por que isso?"
90002090-66 = "...Porque eu não posso perder para a Eimi."
90002090-67 = "[s] \"Às vezes eu não consigo entender a Toki...\""
90002090-68 = "Está tudo bem. Eu entendo perfeitamente."
90002090-73 = "T-Toki-san..."
90002090-74 = "Haa..."
90002090-75 = "Falar sobre proteção contra o frio é bom, mas... minhas armas principais são duas pistolas de energia.#nAs baterias descarregadas são ejetadas pela parte traseira."
90002090-76 = "Eu mesma fiz a pintura!#nAcho que as cores que melhor combinam com a Toki são branco e azul!"
90002090-77 = "E se eu tirar esta jaqueta, meu corpo perfeito e maravilhoso ficará à mostra. Gostaria de ver?"
90002090-78 = "Hã!?"
90002090-79 = "[s] \"Agora não! Vai dar um problema enorme!\""
90002090-80 = "Entendo. Então, deixaremos para mostrar em um momento especial, só nós dois, algum dia."
90002090-81 = "Toki!?"
90002090-82 = "...Se você for reagir a tudo, o dia vai acabar antes de terminarmos."
90002090-83 = "Enfim, a próxima é a Eimi... Eimi? Sim? Já está com calor?"
90002090-84 = "Por favor, tente aguentar um pouco... Como é que funciona o seu metabolismo...?"
90002090-90 = "Ufa..."
90002090-91 = "Cadê o casaco!?"
90002090-92 = "Tirei porque estava com calor."
90002090-93 = "Isso eu vejo, mas..."
90002090-94 = "Desta vez, a Eimi é a responsável pelo suporte na retaguarda, certo?#nSendo assim, não acha que seria mais \"eficiente\" usar o casaco para camuflagem?"
90002090-95 = "Mas se eu ficar com aquilo o tempo todo, vou acabar desmaiando de insolação antes de qualquer coisa, não acha?"
90002090-96 = "Se eu não puder dar suporte por causa do calor, não seria ineficiente?"
90002090-98 = "Sim... pensando nisso, fiz o design do casaco da Eimi para que seja fácil de amarrar na cintura."
90002090-100 = "Obrigada. Isso me salvou."
90002090-101 = "..."
90002090-102 = "Pensando bem, ela sempre foi assim... Foi um erro meu ter esquecido disso..."
90002090-103 = "Deixando isso de lado, a Eimi também mudou seu armamento principal.#nAssim como a Toki, ela usa armas de energia que dependem de baterias."
90002090-104 = "Claro, a potência e a capacidade da bateria são completamente diferentes."
90002090-105 = "O visor da Eimi foi adicionado para que ela possa identificar rapidamente os pontos de suporte."
90002090-106 = "Como o visor também é alimentado pela mesma bateria das armas, a mochila dela é maior que a da Toki."
90002090-108 = "O que você acha, Sensei?"
90002090-109 = "Hã? Parece eficiente?#nEntendi, hum..."
90002090-110 = "..."
90002090-111 = "[s] \"Ué, o que foi?\""
90002090-112 = "Hum, até agora esse seria o maior elogio possível..."
90002090-113 = "É estranho até para mim, mas... queria ouvir algo diferente."
90002090-114 = "Por exemplo..."
90002090-118 = "..."
90002090-119 = "Bonita... talvez?"
90002090-121 = "!?"
90002090-122 = "!?"
90002090-127 = "[ns] \"Combina muito com você, e você está muito bonita.\""
90002090-128 = "Sim."
90002090-129 = "Obrigada, Sensei."
90002090-131 = "Midori. Acho que acabei de presenciar uma cena extremamente assustadora..."
90002090-132 = "N-não pode falar assim!"
90002090-133 = "Eu sei, mas..."
90002090-137 = "..."
90002090-138 = "Argh! Próxima! A próxima!#nA pessoa que está toda animada e mal pode esperar. É a sua vez."
90002090-141 = "Fufufu. O que achou?"
90002090-142 = "[s] \"Bem... talvez seja indelicado perguntar, mas...\""
90002090-143 = "Sim?"
90002090-144 = "[s] \"Você não está com frio...?\""
90002090-145 = "Ora, é isso que você vai me perguntar?"
90002090-146 = "Não há como esta supergênia, combatente, versátil, frágil e bela hacker não ter tomado as devidas precauções."
90002090-147 = "Além da adaptabilidade ambiental, como proteção contra o frio e impermeabilidade...#né um traje versátil de suporte em campo que também combina fragilidade com pureza."
90002090-151 = "[ns3] \"Fragilidade...\"\n[ns4] \"Pureza...\""
90002090-157 = "Bem, eu estava curiosa sobre isso há algum tempo, mas...#nvocê não sente vergonha de dizer essas coisas sobre si mesma...?"
90002090-158 = "Declarar fatos claramente é a base do método científico."
90002090-159 = "Declarar... fatos... claramente... entendo, é verdade..."
90002090-160 = "Embora eu tenha dito isso... ao vestir um traje branco puro como este..."
90002090-161 = "Snif..."
90002090-162 = "[s] \"O que houve? Por que está chorando de repente...\""
90002090-163 = "O que eu faço... estou tão comovida com a minha própria beleza e fofura que as lágrimas de emoção estão—"
90002090-164 = "Desculpe, eu cuido da Chefe, pode deixar comigo."
90002090-169 = "Ei, Eimi!?#nAinda não terminei de falar—!?"
90002090-172 = "[ns] \"Sinto como se uma tempestade tivesse acabado de passar por aqui...\""
90002090-173 = "Exatamente..."
90002090-174 = "（Preciso renovar o ar logo...!）"
90002090-178 = "B-bem! Agora é a vez da Presidente Rio!"
90002090-185 = "[ns] \"Rio...?\""
90002090-186 = "O que foi?"
90002090-187 = "[s] \"Não, é que...\""
90002090-188 = "Não sei o motivo dessa reação, mas ficou assim."
90002090-189 = "É um traje de combate focado em versatilidade, capaz de lidar com qualquer situação: suporte em campo, uso de instalações e análise de cenários."
90002090-190 = "Literalmente, racional."
90002090-191 = "A cor do traje foi escolhida para contrastar com a da Himari-senpai.#nSenti que era o que deveria ser feito..."
90002090-192 = "Aquele design, eu ainda acho que tem problemas!"
90002090-193 = "Chefe, acalme-se. Quer ser trancada no quarto à força de novo?"
90002090-194 = "Uuu..."
90002090-195 = "Isso é uma questão de orgulho do designer...! Eu não poderia ceder de jeito nenhum!"
90002090-197 = "Não me arrependo... dessa escolha!"
90002090-202 = "Vou me abster de comentar..."
90002090-203 = "Portanto, serei direta. #nO traje da Rio, além de aumentar a defesa, possui especificações para guerra eletrônica."
90002090-204 = "Refleti o pedido da Rio de poder oferecer suporte técnico em campo."
90002090-205 = "[s] \"A Rio? Não é perigoso...?\""
90002090-206 = "É mais racional do que a Himari se expor."
90002090-207 = "Acima de tudo, estamos no Continente de Aço. Acho que devemos estar preparados para guerra eletrônica também."
90002090-208 = "[s5] \"Entendi.\"\n[s6] \"Conto com você.\""
90002090-211 = "Sim."
90002090-212 = "Pode deixar comigo."
90002090-213 = "E por último..."
90002090-219 = "Yuzu?"
90002090-220 = "Não fique escondida... pode sair."
90002090-221 = "Yuzu-chan, está tudo bem."
90002090-229 = "Uuu..."
90002090-230 = "[s] \"Ué? É bem diferente do da Momoi e da Midori.\""
90002090-231 = "É-é que..."
90002090-232 = "Fui eu quem pediu."
90002090-233 = "Originalmente, íamos fazer o design igual ao delas, mas..."
90002090-234 = "[s] \"Por que isso?\""
90002090-235 = "..."
90002090-236 = "Prefiro não revelar agora, se não se importa."
90002090-237 = "Embora tenhamos tomado todas as precauções, não posso descartar completamente a possibilidade de que esta conversa esteja sendo grampeada."
90002090-238 = "...De certa forma, este traje é uma arma secreta."
90002090-239 = "[s] \"Então o seu trunfo é um segredo até para os seus aliados?\""
90002090-240 = "……Sinto muito. Eu sei que isso é errado."
90002090-241 = "Eu sei que só podemos superar as coisas se confiarmos uns nos outros... Eu já entendi isso. #nMas……."
90002090-242 = "[s] \"Está tudo bem. Eu confio na Rio.\""
90002090-243 = "Sensei……."
90002090-245 = "Tem certeza disso?"
90002090-246 = "Hein? Você diz que não tem problema porque a Rio nunca fez nada de mal de verdade até hoje?"
90002090-247 = "Bem, isso é verdade, mas……."
90002090-248 = "Sim! A Alice também acha isso!"
90002090-249 = "Alice!?"
90002090-250 = "Alice-chan!?"
90002090-251 = "A-Alice-chan……?"
90002090-256 = "……."
90002090-257 = "Você... confia em mim?"
90002090-258 = "Sim. Porque a Rio-senpai se esforçou muito para ajustar o Abi-Eshuh da Alice e a arma da Kei até o fim!"
90002090-259 = "Se a Rio-senpai estivesse planejando algo ruim, eu tenho certeza de que ela não teria feito tudo isso!"
90002090-260 = "Eu também ajudei, sabia!?"
90002090-261 = "É verdade! A Himari-senpai também estava lá!"
90002090-262 = "Fufu... Pelo bem da Alice, vou deixar passar desta vez."
90002090-263 = "Ah, é mesmo. Também tem uma função oculta, então aguarde ansiosamente."
90002090-268 = "[ns] \"Espera? Você disse 'a arma da Kei' agora pouco?\""
90002090-269 = "Hein?"
90002090-270 = "Ah, sim, bem, tecnicamente……."
90002090-271 = "Dizem que andar por Kivotos sem uma arma é mais estranho do que andar por aí pelado, então……."
90002090-272 = "O nome dela é 'Arendelle: Luminous Nova'. É uma arma de energia."
90002090-273 = "Uuu... Eu ainda não entendo. #nSerá que essa roupa... combina comigo……?"
90002090-274 = "E, além disso, tem certeza de que sou a pessoa certa para isso……?"
90002090-275 = "[s7] \"Não se preocupe, combina muito bem com você.\"\n[s8] \"Nós precisamos... do poder da Yuzu!\""
90002090-278 = "S-sim!?"
90002090-279 = "Isso é, bem……."
90002090-280 = "S-se o Sensei está dizendo……."
90002090-281 = "E-eu vou dar o meu melhor……."
90002090-282 = "[s] \"Muito bem, então vamos começar a verificação final!\""
90002090-294 = "Kei, pode vir aqui um instante?"
90002090-295 = "O que houve?"
90002090-296 = "Tem algo que eu gostaria de falar apenas com você."
90002090-297 = "Apenas comigo? Sem incluir o Sensei?"
90002090-298 = "É que……."
90002090-299 = "Eu já vinha suspeitando disso há algum tempo……."
90002090-300 = "Que tipo de informação você consegue esconder do Continente de Aço e daquelas três?"
90002090-301 = "……."
90002090-302 = "Você percebeu rápido. Como soube?"
90002090-303 = "Porque até chegarmos em Tiphereth, aquelas três não tinham notado a sua presença nem a da Alice."
90002090-304 = "Você decidiu que, se fosse comigo, poderia compartilhar aquele segredo — o tal do trunfo, não foi?"
90002090-305 = "……Tudo bem. #nMas saiba que o firewall só vai aguentar por, no máximo, 30 segundos. Esteja avisada."
90002090-306 = "Sim, sem problemas."
90002090-309 = "……."
90002090-310 = "…………."
90002090-311 = "………………."
90002090-312 = "Kei……?"
90002090-313 = "Você..."
90002090-314 = "Sim?"
90002090-315 = "Você está falando sério?"
90002090-316 = "Eh, sim... Acho que isso é o normal..."
90002090-317 = "Normal? Isso?"
90002090-318 = "...Não, é melhor prevenir do que remediar."
90002090-319 = "Ainda assim, isso é..."
90002090-320 = "É estranho...?"
90002090-321 = "Em outra situação, talvez eu achasse que sim."
90002090-322 = "Mas agora..."
90002090-323 = "..."
90002090-324 = "Estou feliz por você estar aqui."
90002090-325 = "É, é mesmo...?"
90002090-326 = "Isso também explica o traje da Yuzu."
90002090-327 = "Entendo."
90002090-328 = "E sobre a segunda fase que mencionei antes..."
90002090-329 = "Não é impossível. #nComo já temos um precedente... talvez seja até mais fácil do que parece."
90002090-330 = "Como você disse, o ideal é não precisar usar."
90002090-331 = "Sim. Um trunfo é mais poderoso enquanto permanece sendo um trunfo, não é?"
90002090-332 = "[s] \"Hm? Um trunfo?\""
90002090-333 = "Sensei!?"
90002090-334 = "Bem, isso é, hum...!"
90002090-335 = "..."
90002090-336 = "Estávamos discutindo qual seria o melhor cardápio para a nossa comemoração."
90002090-337 = "[s] \"Comemoração?\""
90002090-338 = "Sim."
90002090-339 = "Nós vamos vencer, não vamos?"
90002090-340 = "[s] \"Entendi, é sobre isso então.\""
90002090-341 = "Sim."
90002090-342 = "Não é, Rio?"
90002090-343 = "..."
90002090-344 = "Sim, é isso mesmo."
90002090-345 = "Sensei, o que está fazendo aqui? Ah, Rio-senpai, e Kei também!"
90002090-346 = "Sim? Sobre a comemoração depois que tudo acabar? Que ideia ótima!"
90002090-347 = "A Alice fica feliz com qualquer coisa, desde que esteja com o Sensei!"
90002090-348 = "[s9] \"Sim! Eu também!\"\n[s10] \"Para isso... todos nós precisamos voltar em segurança.\""
90002090-351 = "...Sim."
90002090-352 = "Bem... para vencermos, vou explicar um plano mais concreto."
90002090-353 = "Como assim?"
90002090-354 = "Não há uma ordem específica para repelir os profetas e ocupar as áreas. #nPodemos seguir conforme o comando do Sensei."
90002090-355 = "No entanto, a área do \"Binah\" precisa ser ocupada primeiro."
90002090-356 = "[s] \"Por que isso?\""
90002090-357 = "Acabei de localizar o paradeiro do Binah."
90002090-358 = "[s] \"Como esperado da Kei-chan!\""
90002090-359 = "Quem é Kei-chan?!"
90002090-360 = "Ehem... além disso, há outro motivo."
90002090-361 = "Como mencionei antes, o Continente de Aço é inteiramente coberto por uma rede."
90002090-362 = "Na área do Binah, existe um firewall instalado #npara proteger essa rede."
90002090-363 = "Para avançarmos, precisamos desativar esse firewall, seja física ou eletronicamente."
90002090-364 = "Se conseguirmos romper, será muito mais fácil localizar os profetas restantes."
90002090-365 = "Por outro lado, se deixarmos o firewall como está... usando as palavras da Alice —"
90002090-366 = "Não importa o quanto subamos de nível, não conseguiremos dar ordens ao Continente de Aço."
90002090-367 = "[s] \"Entendi... eu acho?\""
90002090-368 = "Ou seja, para cumprir a missão —"
90002090-369 = "Sim. Precisamos garantir o núcleo de informações de Binah o mais rápido possível."
90002090-370 = "[s] \"Então, está decidido.\""
90002090-371 = "O primeiro alvo é o terceiro profeta de Decagrammaton."
90002090-372 = "Aquele que se autodenomina o \"Compreendedor da Observação que Sente a Dor da Diferença\" —"
90002090-374 = "É o \"Binah\"."
90002090-376 = "Próximo episódio;000, 00, 0"
