[translation]
80000008-1 = "靴墨とチョコレート"
80000008-2 = "ゲヘナ学園・風紀委員会"
80000008-3 = "（シャーレの仕事でゲヘナの風紀委員会の教室を訪れた。）"
80000008-7 = "あっ、先生。いらっしゃい。"
80000008-8 = "学園の前まで迎えに行けなくてごめん、風紀委員会の仕事が溜まってて。"
80000008-9 = "[s] \"ううん。相変わらず忙しそうだね。\""
80000008-10 = "ああ、バカ共が飽きもせずにトラブルを起こすせいで、報告書が延々と舞い込んできて……。"
80000008-11 = "気が付いたら、こんな山になっててね。"
80000008-16 = "ああもう、また崩れた……書類の処理より先に、机の上を整理するか……。"
80000008-17 = "[s] \"何か落ちたけど……これ、靴墨？\""
80000008-23 = "あっ。そ、それは靴墨じゃなくて……。"
80000008-27 = "いや、違った。それは私が使ってる靴墨、間違いない。"
80000008-28 = "いつもブーツの手入れに使ってるから、先生には嗅ぎなれた匂いかもね。"
80000008-29 = "何なら一回舐めてみる？足を舐めるのが好きな先生なら、靴墨もイケるかもしれないよ。"
80000008-35 = "……なんて、冗談。いくら先生がヘンタイでも、本当に靴墨なんて舐めさせるつもりはないから。"
80000008-36 = "それは靴墨じゃなくて、実は……"
80000008-37 = "[s] 舐める。"
80000008-39 = "本気でバカなのっ！？"
80000008-40 = "靴墨だって私言ったじゃん！体に悪いって分かってるのに、どうして我慢できないわけ！？体調崩すよ！？"
80000008-41 = "[s] \"あれ、甘い……？\""
80000008-42 = "そりゃそうだよ！それは靴墨じゃなくて、ダークチョコレートだから！"
80000008-43 = "味が濃いし携帯しやすいってことで、最近風紀委員会でも流行ってるやつなんだけど……。"
80000008-44 = "はぁ……チョコレートだったから良かったものを、本当に靴墨だったらどうするつもりだったわけ？"
80000008-45 = "まさか本当に、靴墨でも興奮するくらいのヘンタイになった？"
80000008-46 = "[s] \"別に靴とか靴墨が好きなわけじゃない。\""
80000008-50 = "[ns] \"あくまでイオリの靴とか脚が好きなのであって……。\""
80000008-51 = "何それ、気っ持ち悪……。"
80000008-52 = "はぁ、もう食べかけだし……。"
80000008-53 = "ほら、それは持っていって。"
80000008-54 = "[s] \"これ、バレンタインデーのプレゼント？\""
80000008-55 = "ち、違うっ！先生が舐めたせいで食べられなくなったから、仕方なくあげるだけ！"
80000008-56 = "……勘違いするなよ！？"
