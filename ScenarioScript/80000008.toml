[translation]
80000008-1 = "Graxa de sapato e chocolate"
80000008-2 = "Academia Gehenna - Comitê Disciplinar"
80000008-3 = "（Visitei a sala do Comitê Disciplinar de Gehenna por causa de um trabalho do Schale.）"
80000008-7 = "Ah, Sensei. Bem-vindo."
80000008-8 = "Desculpe por não ter ido te buscar na entrada da academia, é que o trabalho do Comitê Disciplinar acumulou."
80000008-9 = "[s] \"Não tem problema. Você parece ocupada como sempre.\""
80000008-10 = "É, esses idiotas não se cansam de causar problemas, então relatórios não param de chegar..."
80000008-11 = "Quando me dei conta, já tinham virado essa montanha."
80000008-16 = "Ah, droga, caiu de novo... Acho melhor organizar a mesa antes de continuar com a papelada..."
80000008-17 = "[s] \"Algo caiu... isso é graxa de sapato?\""
80000008-23 = "Ah. I-isso não é graxa de sapato..."
80000008-27 = "Não, espere. É graxa de sapato mesmo, a que eu uso, sem dúvida."
80000008-28 = "Eu sempre uso para cuidar das minhas botas, então talvez o cheiro seja familiar para você, Sensei."
80000008-29 = "Quer provar um pouco? Se você é um Sensei que gosta de lamber pés, talvez até goste de graxa de sapato."
80000008-35 = "……Estou brincando. Por mais pervertido que você seja, Sensei, eu não deixaria você lamber graxa de verdade."
80000008-36 = "Aquilo não é graxa, na verdade é..."
80000008-37 = "[s] Lamber."
80000008-39 = "Você é um idiota de verdade!?"
80000008-40 = "Eu te disse que era graxa de sapato! Você sabe que faz mal, por que não consegue se controlar!? Vai acabar ficando doente!"
80000008-41 = "[s] \"Ué, está doce...?\""
80000008-42 = "Claro que está! Aquilo não é graxa, é chocolate amargo!"
80000008-43 = "Como tem um sabor forte e é fácil de carregar, virou moda no Comitê Disciplinar ultimamente..."
80000008-44 = "Haa... Ainda bem que era chocolate, mas o que você pretendia fazer se fosse graxa de verdade?"
80000008-45 = "Não me diga que você virou um pervertido a ponto de ficar excitado até com graxa de sapato?"
80000008-46 = "[s] \"Não é que eu goste de sapatos ou graxa.\""
80000008-50 = "[ns] \"É só que eu gosto dos sapatos e das pernas da Iori...\""
80000008-51 = "Que nojo..."
80000008-52 = "Haa, e você já mordeu..."
80000008-53 = "Toma, pode ficar com isso."
80000008-54 = "[s] \"Isso é um presente de Dia dos Namorados?\""
80000008-55 = "N-não é! Como você lambeu, eu não posso mais comer, então estou te dando por falta de opção!"
80000008-56 = "……Não se iluda, entendeu!?"
