[translation]
1301305-1 = "O Festival do Livro de um Encontro Único"
1301305-2 = "（Recebi uma mensagem da Momiji, que parecia bem animada, e fui até a praça de Red Winter）"
1301305-7 = "Ah, Sensei! É aqui!"
1301305-8 = "Hehehe... parece um sonho poder vir ao Festival do Livro com o Sensei."
1301305-9 = "[s] \"O que é o Festival do Livro?\""
1301305-10 = "Literalmente, é um festival de livros! Ele acontece apenas uma vez por ano, durante dois dias."
1301305-11 = "É um evento onde as alunas de Red Winter trazem vários livros para exibir, vender ou trocar."
1301305-15 = "...Esse é o motivo oficial, pelo menos."
1301305-16 = "Na verdade, é como um bazar para se livrar de estoques de livros que ninguém mais quer."
1301305-17 = "Como não acontecem muitos eventos grandes na Academia Federal de Red Winter...#nTodo mundo aproveita para curtir o clima de festival assim."
1301305-18 = "Embora a maioria das alunas venha mesmo é pelas barracas de comida..."
1301305-19 = "[s] \"Isso é... um pouco triste, não é?\""
1301305-20 = "Não! Na verdade, isso é ótimo!"
1301305-21 = "[s] \"H-hein!?\""
1301305-22 = "Como ninguém presta atenção nos livros, fica muito mais fácil caçar tesouros!"
1301305-23 = "Posso olhar todos os livros que eu quiser!#nComo muitas alunas não entendem a diferença entre a primeira edição e as posteriores, dá para achar verdadeiras relíquias!"
1301305-24 = "Às vezes, você acaba encontrando uma primeira edição lendária onde menos espera!"
1301305-25 = "[s] \"E-entendo...\""
1301305-26 = "Vamos, Sensei. Temos que nos apressar!#nO Festival do Livro só dura hoje e amanhã!"
1301305-27 = "Nosso objetivo é visitar todas as bancas!"
1301305-28 = "...Talvez isso seja impossível na prática, mas vamos tentar com esse espírito!"
1301305-30 = "（...Assim, acabei percorrendo o Festival do Livro com a Momiji, que estava mais animada do que o normal）"
1301305-31 = "Praça de Red Winter"
1301305-35 = "Olhe só, Sensei! É a coleção completa de \"Miss Imi\"!"
1301305-40 = "Não acredito... encontrar isso em um lugar desses...!"
1301305-41 = "Ué? Achei que estava completa, mas... falta um volume...!"
1301305-42 = "Ugh... é, faz sentido. Um tesouro desses não estaria à venda por um preço tão baixo..."
1301305-43 = "Encontrar o volume que falta vai ser uma jornada muito, muito longa, mas..."
1301305-44 = "Já que finalmente nos encontramos, vou garantir este aqui."
1301305-46 = "Isso é...! O livro comemorativo de \"Jason e a Fábrica de Caramelo\"!?"
1301305-47 = "Ah... o livro que eu via nos meus sonhos... Estou tão feliz por ter entrado na Frente de Libertação do Conhecimento!"
1301305-48 = "Não pode ser... a primeira página foi arrancada...!"
1301305-49 = "Que horror...! Isso não só estraga o valor e o significado do livro, como também é um desrespeito com a obra em si...!"
1301305-50 = "Será que foi porque tinha um autógrafo do Sensei nessa página...? Se for isso, é ainda pior! Significa que venderam o autógrafo em algum lugar!"
1301305-52 = "Uau... é \"Ishmael\", Sensei!"
1301305-53 = "Parece que essa obra não era muito popular na época.#nDizem que só venderam 3200 cópias."
1301305-54 = "É um tema bem específico, e com 135 capítulos, deve ser difícil de ler."
1301305-55 = "Mas, aos poucos, seu charme foi se espalhando... e hoje é considerado um clássico."
1301305-56 = "Não é a primeira edição, mas pelas marcas de uso, dá para sentir que foi muito amado por várias pessoas."
1301305-57 = "Hehehe, isso também é maravilhoso. Vou levar."
1301305-60 = "（Depois disso, continuei percorrendo vários cantos às pressas com a Momiji...）"
1301305-61 = "（Percebi que a Momiji, carregada de livros, parecia muito feliz...）"
1301305-66 = "[wa:500]― [log=모미지]Sensei![wa:1250] Finalmente encontrei![/log]"
1301305-69 = "[wa:240]― [log=모미지]Sem nenhuma página danificada,[/log]"
1301305-70 = "[wa:1970]― [log=모미지]e com a ilustração exclusiva de brinde[wa:1440] incluída,[/log]"
1301305-73 = "― [log=모미지]é a edição limitada![/log]"
1301305-76 = "[wa:980]― [log=모미지]Talvez eu tenha sido...[wa:1900] guiada até aqui,[/log]"
1301305-77 = "[wa:2470]― [log=모미지]só para encontrar[wa:360] este livro.[wa:1030][/log]"
1301305-80 = "― [log=모미지]Hehehe...[wa:1540] isso também,[/log]"
1301305-81 = "[wa:920]― [log=모미지]foi graças ao[wa:460] Sensei que esteve[wa:960] me acompanhando.[/log]"
1301305-84 = "[wa:500]― [log=모미지]Quando estou com o Sensei...[wa:550][/log]"
1301305-85 = "[wa:1350]― [log=모미지]Coisas boas acontecem, [wa:700]é estranho.[/log]"
1301305-88 = "[wa:500]― [log=모미지]Por isso...[wa:1450] bem...[wa:1570] Sensei.[/log]"
1301305-91 = "[wa:200]― [log=모미지]Se não for incômodo...[wa:2090] bem,[/log]"
1301305-93 = "― [log=모미지]Não precisa ser, [wa:1640]todos os dias...[/log]"
1301305-96 = "[wa:980]― [log=모미지]De vez em quando, [wa:1600]já basta...[/log]"
1301305-99 = "― [log=모미지]Por favor, visite [wa:1520]a Frente de Libertação do Conhecimento,[/log]"
1301305-100 = "[wa:2630]― [log=모미지]quando puder...[/log]"
