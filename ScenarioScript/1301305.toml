[translation]
1301305-1 = "一期一会のブックフェスティバル"
1301305-2 = "（興奮気味のモミジから連絡をもらい、レッドウィンターの広場に向かった）"
1301305-7 = "あ、先生！ここです！"
1301305-8 = "えへへ……先生とブックフェスティバルに来られるなんて、夢みたいです。"
1301305-9 = "[s] \"ブックフェスティバルって？\""
1301305-10 = "文字通り、本のお祭りです！年に1度、2日間だけ開催されます。"
1301305-11 = "レッドウィンターの生徒たちがそれぞれ色々な本を持ってきて、展示したり、売ったり買ったりするイベントです。"
1301305-15 = "……というのが、表向きの開催理由で。"
1301305-16 = "本当は不要になった本の在庫を処分するバザーのようなものです。"
1301305-17 = "レッドウィンター連邦学園では大きなイベントがあまり開かれないので……#nこうしてお祭りの雰囲気をみんなで楽しんでるんですよ。"
1301305-18 = "ほとんどの生徒は、屋台の食べ物が目当てですけどね……"
1301305-19 = "[s] \"それは……ちょっと悲しいね。\""
1301305-20 = "いえ！それが逆に良いんです！"
1301305-21 = "[s] \"う、うん！？\""
1301305-22 = "みんなが本に見向きしないからこそ、お宝探しが捗るんです！"
1301305-23 = "全部の本を好きなだけ見て回れますし！#n初版と後版を理解してない生徒も多いので、掘り出し物が見つかります！"
1301305-24 = "思わぬところで、伝説級の初版が見つかることだって！"
1301305-25 = "[s] \"そ、そうなんだ……\""
1301305-26 = "さあ、先生。急ぎましょう！#nブックフェスティバルは今日と明日の2日間だけですから！"
1301305-27 = "目指すは、全ブース制覇！"
1301305-28 = "……は現実的に不可能かもしれませんが、それくらいの気持ちで挑みましょう！"
1301305-30 = "（……こうして、いつも以上に興奮しているモミジとブックフェスティバルを回ることになった）"
1301305-31 = "レッドウィンターの広場"
1301305-35 = "見てください、先生！『ミス一味』全巻セットです！"
1301305-40 = "まさか……こんなところで出会えるなんて……！"
1301305-41 = "あれっ？全巻揃ってると思ったら……一冊だけ抜けてます……！"
1301305-42 = "うぅ……そうですよね。これほどのお宝が、こんな安価に出回るわけないですし……"
1301305-43 = "抜けている一冊を見つけるのは、とても……とても大変な道のりですが……"
1301305-44 = "せっかく巡り会えたので、確保しておこうと思います。"
1301305-46 = "これは……！『ジェーソンとキャラメル工場』の記念本！？"
1301305-47 = "あぁ……夢にまで見た本が……私、知識解放戦線に入って本当に良かったです！"
1301305-48 = "そんな……最初のページが切り取られてる……！"
1301305-49 = "ひどいです……！これでは本の価値と意味が損なわれるだけじゃなくて、本そのものに対しても失礼な……！"
1301305-50 = "もしかして、そのページに先生の直筆サインがあったからでしょうか……？だとしたら、なおさらひどいです！サインだけどこかで売り飛ばしたってことじゃないですか！"
1301305-52 = "わっ……『イシュマエル』ですよ、先生！"
1301305-53 = "この作品、当時はあまり人気がなかったみたいなんですよね。#n3200部しか売れなかったとか。"
1301305-54 = "マニアックな題材ですし、全部で135章もあるし、読むのも大変ですからね。"
1301305-55 = "でも、少しずつ魅力が広まって……今は古典の代表とまで言われるようになりました。"
1301305-56 = "初版ではないですが、所々に見られる傷から、いろんな方に愛されてきたのだなと伝わってきます。"
1301305-57 = "えへへ、こういうのも素敵ですね。買っておきましょう。"
1301305-60 = "（その後も、モミジと様々なコーナーを急ぎ足で見て回り……）"
1301305-61 = "（気づけばたくさんの本を抱えていたモミジは、とても幸せそうに見えた……）"
1301305-66 = "[wa:500]― [log=모미지]先生！[wa:1250]ついに見つけました！[/log]"
1301305-69 = "[wa:240]― [log=모미지]傷んだページもない、[/log]"
1301305-70 = "[wa:1970]― [log=모미지]特典の描きおろしイラストも[wa:1440]ちゃんと入ってる、[/log]"
1301305-73 = "― [log=모미지]限定版です！[/log]"
1301305-76 = "[wa:980]― [log=모미지]もしかしたら私は……[wa:1900]この一冊に出会うために、[/log]"
1301305-77 = "[wa:2470]― [log=모미지]ここに[wa:360]導かれてきたのかも[wa:1030]しれません。[/log]"
1301305-80 = "― [log=모미지]えへへ……[wa:1540]これも、[/log]"
1301305-81 = "[wa:920]― [log=모미지]先生が[wa:460]見守ってくださった[wa:960]おかげですね。[/log]"
1301305-84 = "[wa:500]― [log=모미지]先生と[wa:550]一緒にいると……[/log]"
1301305-85 = "[wa:1350]― [log=모미지]不思議といいことが[wa:700]起こるんです。[/log]"
1301305-88 = "[wa:500]― [log=모미지]だから……[wa:1450]その……[wa:1570]先生。[/log]"
1301305-91 = "[wa:200]― [log=모미지]よろしければ……[wa:2090]その、[/log]"
1301305-93 = "― [log=모미지]毎日とは、[wa:1640]言いませんから……。[/log]"
1301305-96 = "[wa:980]― [log=모미지]たまに、[wa:1600]でいいので……。[/log]"
1301305-99 = "― [log=모미지]私たち[wa:1520]知識解放戦線を、[/log]"
1301305-100 = "[wa:2630]― [log=모미지]訪ねてくださいね……。[/log]"
