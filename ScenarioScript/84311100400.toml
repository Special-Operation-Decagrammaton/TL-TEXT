[translation]
84311100400-5 = "Bom trabalho. Fico feliz que estejam bem."
84311100400-6 = "Me desculpem. O que aconteceu desta vez foi inteiramente culpa minha. Eu deveria ter feito uma investigação prévia mais minuciosa."
84311100400-7 = "Coloquei vocês duas em perigo..."
84311100400-8 = "Na verdade, não foi tudo fácil demais até agora? Infiltrações, por natureza, deveriam envolver grandes riscos. Não há necessidade de Rio se preocupar tanto com isso."
84311100400-9 = "……Você disse exatamente tudo o que eu estava pensando. Como chegou a essa conclusão?"
84311100400-10 = "Embora tenha sido por um curto período, o tempo que passamos juntas foi muito intenso."
84311100400-15 = "……Hã?"
84311100400-16 = "Ei... você, por que não vem para a C&C?"
84311100400-21 = "Neru, pare com isso, mesmo que seja uma brincadeira. Talvez seu senso esteja um pouco entorpecido, mas estamos falando da Tea Party de Trinity."
84311100400-23 = "Um problema só é um problema se houver alguém para torná-lo um."
84311100400-24 = "Uma avaliação honesta... vou aceitar como um elogio. Fico feliz."
84311100400-25 = "Além disso, você não estava falando sério, estava?"
84311100400-26 = "Pois é. A única pessoa cabeça-dura que não entende uma piada é ela."
84311100400-28 = "Cabeça-du...!"
84311100400-29 = "……Parece que o reforço na segurança do local foi uma estratégia do Seminar."
84311100400-30 = "Acredito que eles tenham colaborado com o Veritas ou com o Departamento de Investigação de Fenômenos Estranhos para fortalecer o sistema de monitoramento."
84311100400-34 = "Rio, seu tom de voz parece um pouco rígido..."
84311100400-35 = "Ela só está emburrada, de qualquer forma."
84311100400-37 = "É inútil tentar me provocar com palavras tão infantis."
84311100400-42 = "Está emburrada."
84311100400-43 = "Ela disse que está emburrada."
84311100400-45 = "Não estou."
84311100400-50 = "……Não estou."
84311100400-53 = "(Depois disso, acalmei a Rio e fizemos as pazes)"
