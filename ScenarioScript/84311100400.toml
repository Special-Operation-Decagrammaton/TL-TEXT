[translation]
84311100400-5 = "お疲れ様。無事で良かったわ。"
84311100400-6 = "ごめんなさい。今回の件、完全に私の落ち度よ。もっと綿密な事前調査を行うべきだった。"
84311100400-7 = "二人を危険にさらしてしまったわね……。"
84311100400-8 = "むしろ、今までがトントン拍子に過ぎたのだろう？本来的に潜入には大きな危険が伴うはず。リオ一人が気に病む必要は無いさ。"
84311100400-9 = "……あたしの思ってたこと全部言うじゃねぇか。よくその考えになったな。"
84311100400-10 = "短期間とはいえ、共に過ごした時間の密度が濃いからね。"
84311100400-15 = "……へぇ？"
84311100400-16 = "なあ……お前、[ruby=うち]C&C[/ruby]に来ないか？"
84311100400-21 = "ネル、冗談でも止めておきなさい。感覚が麻痺しているかもしれないけれど、相手はトリニティのティーパーティーなのだから。"
84311100400-23 = "問題は、問題にする者がいなければ、ただの事象だ。"
84311100400-24 = "素直な評価……褒め言葉と受け取ろう。嬉しく思う。"
84311100400-25 = "そも、本気ではなかったのだろう？"
84311100400-26 = "まあな。冗談も通じねぇ堅物はそいつくらいのもんだろ。"
84311100400-28 = "かたっ……。"
84311100400-29 = "……会場の警備が強化されたのは、セミナーの作戦だったみたいね。"
84311100400-30 = "ヴェリタスもしくは特異現象捜査部と連携して、監視システムを強化したものと思われるわ。"
84311100400-34 = "リオ、声音が固いようだが……。"
84311100400-35 = "どうせ拗ねただけだ。"
84311100400-37 = "そのような幼稚な言葉で私を刺激しようとしても無駄よ。"
84311100400-42 = "拗ねたのか。"
84311100400-43 = "拗ねてんだって。"
84311100400-45 = "違う。"
84311100400-50 = "……違うわ。"
84311100400-53 = "（その後リオを宥めて仲直りした）"
