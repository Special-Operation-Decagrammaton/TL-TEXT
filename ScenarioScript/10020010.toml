[translation]
10020010-5 = "そちらが「次元エンジン」です！"
10020010-6 = "気をつけてください、先生。#n「次元エンジン」を守っている防御システムを確認いたしました……。"
10020010-7 = "箱舟の主要設備である分、それ相応の戦力を覚悟していたつもりでしたが……これほどとは。"
10020010-11 = "おっと……ちょ～っと、しんどい戦いになりそうだねぇ。"
10020010-12 = "[s] \"でも、やるしかないよ。\""
10020010-14 = "……そんな事をしても、無駄。"
10020010-19 = "……先生、お気を付けて。#n「[ruby=・   ・]彼女[/ruby]」です。"
10020010-26 = "[ns] \"シロコ……！！\""
10020010-27 = "……。"
10020010-28 = "[s] \"シロコ、一体何をするつもり！？\""
10020010-29 = "ん――単純な事。"
10020010-30 = "先生が、箱舟を壊すのを阻止する。"
10020010-31 = "そうすれば、予定通り――キヴォトスは終焉を迎える。"
10020010-36 = "それが私の――「役割」だから。"
10020010-37 = "[ns] \"………………！！！\""
10020010-39 = "し、シロコ先輩が、再び現れました！"
10020010-52 = "どこ！？"
10020010-53 = "第1エリアの「次元エンジン」前です！#n今、先生と交戦中です！"
10020010-54 = "……っ！！ "
10020010-61 = "ああっ、もう！！こんなことしてる場合じゃないのに……#n早くシロコ先輩のとこに行かなきゃ！！"
10020010-62 = "でも、私たちはここを守らないと…… "
10020010-64 = "……うん、そうだね。#n今は防衛に集中しないと。"
10020010-65 = "ここは、先生に任せよっか。"
10020010-67 = "はい……！！先生、お願いします！"
10020010-68 = "シロコ先輩を……止めてください！！"
10020010-77 = "せ、戦闘態勢に入りました……！先生、お気をつけて！"
