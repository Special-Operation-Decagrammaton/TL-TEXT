[translation]
10020010-5 = "Aquele é o \"Motor Dimensional\"!"
10020010-6 = "Cuidado, Sensei. #nConfirmei a presença de sistemas de defesa protegendo o \"Motor Dimensional\"..."
10020010-7 = "Sendo uma instalação principal da Arca, eu esperava que houvesse uma força de defesa considerável, mas... não imaginei que fosse tanto."
10020010-11 = "Opa... vai ser uma batalha um tanto difícil, hein."
10020010-12 = "[s] \"Mas não temos escolha, temos que fazer isso.\""
10020010-14 = "......Fazer algo assim é inútil."
10020010-19 = "......Sensei, tome cuidado. #nÉ \"ela\"."
10020010-26 = "[ns] \"Shiroko...!!\""
10020010-27 = "......"
10020010-28 = "[s] \"Shiroko, o que exatamente você pretende fazer!?\""
10020010-29 = "Hmm... algo simples."
10020010-30 = "Impedir que o Sensei destrua a Arca."
10020010-31 = "Se eu fizer isso, conforme o planejado... Kivotos encontrará o seu fim."
10020010-36 = "Porque esse é o meu... \"papel\"."
10020010-37 = "[ns] \"………………!!!\""
10020010-39 = "A-a Shiroko-senpai apareceu de novo!"
10020010-52 = "Onde!?"
10020010-53 = "Na frente do \"Motor Dimensional\" na Área 1! #nEla está em combate com o Sensei agora!"
10020010-54 = "......!!"
10020010-61 = "Ah, droga!! Não temos tempo para isso... #nPrecisamos ir até a Shiroko-senpai logo!!"
10020010-62 = "Mas nós precisamos proteger este lugar..."
10020010-64 = "......Sim, você tem razão. #nAgora precisamos nos concentrar na defesa."
10020010-65 = "Vamos deixar isso com o Sensei."
10020010-67 = "Sim...!! Sensei, contamos com você!"
10020010-68 = "Por favor... pare a Shiroko-senpai!!"
10020010-77 = "E-ela entrou em posição de combate...! Sensei, tome cuidado!"
