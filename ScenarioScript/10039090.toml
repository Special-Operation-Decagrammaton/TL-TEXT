[translation]
10039090-1 = "後日談その1;対策委員会の緊張"
10039090-9 = "（アイドルコンテストのリハーサル当日）"
10039090-10 = "（普段とは違う生徒たちの姿を楽しみにしていると……）"
10039090-18 = "[ns1] \"やあ、セリカ。\"\n[ns2] \"どうかしたの？\""
10039090-21 = "先生、大変なのよ！"
10039090-27 = "（セリカに連絡をもらい、急いで対策委員会のもとへ向かった）"
10039090-33 = "せ、先生……。"
10039090-34 = "[s] \"何があったの？\""
10039090-35 = "アヤネちゃんが……。"
10039090-39 = "急にいなくなったの！"
10039090-40 = "[s] \"えっ！？\""
10039090-45 = "もうすぐリハーサルが始まるのに、困ったねぇ。"
10039090-46 = "電話もつながりませんし、何かあったのでしょうか？"
10039090-47 = "まさか、拉致された？"
10039090-52 = "学園の中にいたのに！？"
10039090-53 = "おじさんの勘だと、違う気がするなぁ。"
10039090-54 = "とにかく、いろんな場所を探してみたけど、見つからないのよ。"
10039090-55 = "先生、どうしよう……。"
10039090-56 = "[s] \"もう一度、虱潰しに探してみよう！\""
10039090-57 = "……ありがとう、先生！"
10039090-66 = "（アヤネがいそうな場所を探し続けていると……）"
10039090-76 = "[ns] \"……アヤネ。\""
10039090-77 = "……。"
10039090-84 = "せ、先生！？"
10039090-85 = "どうして、ここに……。"
10039090-86 = "[s3] \"……やっと見つけた。\"\n[s4] \"もうすぐリハーサルだけど、何かあったの？\""
10039090-89 = "……うぅ。"
10039090-96 = "はぁ、はぁ……アヤネちゃん！"
10039090-97 = "大丈夫ですか？"
10039090-98 = "急にいなくなったら、おじさんも心配だよ。"
10039090-99 = "ん、怪我はないみたい。"
10039090-101 = "皆さん……。"
10039090-102 = "どうしたの、みんなビックリしたわよ。"
10039090-106 = "う、うぅ……。"
10039090-110 = "アヤネちゃん？"
10039090-111 = "こ、怖いんです……。"
10039090-112 = "何が……？"
10039090-113 = "……が。"
10039090-115 = "はい？"
10039090-122 = "……ステージが大きすぎます！"
10039090-130 = "さっき、ステージを見てみたら……。"
10039090-131 = "想像以上の広さで、観客席の数も……。"
10039090-132 = "マンモス校の一番大きいホールなんだから、当然でしょう？"
10039090-133 = "けど、あそこまで大きいとは……。"
10039090-135 = "そういえば、アヤネちゃんは目立つのが苦手でしたね……。"
10039090-136 = "うーん、どうする？"
10039090-138 = "私、ダンスの振り付け覚えきれてないんだけど！"
10039090-139 = "アヤネちゃんを見ながら踊ろうと思ってたのに……。"
10039090-140 = "……ごめん、セリカちゃん。"
10039090-141 = "ステージに立つと思ったら、頭が真っ白になって、呼吸も苦しくなるの……。"
10039090-142 = "私のせいで、計画が台無しになったら……。"
10039090-143 = "[s] \"計画……？\""
10039090-145 = "賞金を学校の借金返済に充てようと思ってたのよ。"
10039090-146 = "ん、短時間でお金がいっぱい手に入る。"
10039090-147 = "二人なら、勝てる可能性は大いにあると思うのですが……。"
10039090-149 = "……うぅ。"
10039090-150 = "賞金と言っても、そこまで高額じゃないから、気負う必要はないよ。"
10039090-155 = "そうだったの……！？"
10039090-157 = "で、ですが……。"
10039090-158 = "このステージは、ホシノ先輩と交わした約束を守る場でもあるのに……。"
10039090-160 = "……気にしてたんだね、アヤネちゃん。"
10039090-161 = "とりあえず、起きよっか！座り込んでたらどんどん落ち込んじゃうよ！"
10039090-162 = "……うーん、目隠し状態で踊るとか？"
10039090-164 = "それは危ないかと……。"
10039090-165 = "おそらく、アヤネちゃんのなかで恐怖心が根付いてしまったのでしょう。"
10039090-166 = "おじさんにできることがあるなら言ってほしいな。"
10039090-167 = "今はアヤネちゃんが抱えているプレッシャーを……。"
10039090-168 = "……先生、何か良い方法はないでしょうか？"
10039090-175 = "[ns] \"アヤネ、ちょっと良い？\""
10039090-177 = "先生……？"
10039090-178 = "[s5] \"緊張するよね。\"\n[s6] \"大勢の前に立つんだから。\""
10039090-181 = "はい。実際のステージが大きくて……教室とは全然違って……。"
10039090-182 = "たくさんの観客が私を見ていると思うと……。"
10039090-183 = "心臓が破裂しそうになって、体が動かなくなるんです。"
10039090-184 = "[s] \"じゃあ、こう考えたらどうかな？\""
10039090-189 = "[ns7] \"対策委員会のみんなが観客席にいるから……。\"\n[ns8] \"そこだけを見てパフォーマンスするんだ。\""
10039090-194 = "は、はい！？"
10039090-195 = "[s9] \"集中すると、視野が狭くなるって言うでしょ？\"\n[s10] \"ほかの観客の存在も気にならなくなるよ。\""
10039090-198 = "できるんでしょうか……。"
10039090-199 = "[s] \"私も見守ってるから。\""
10039090-200 = "……先生も。"
10039090-201 = "ん、試す価値はあると思う。"
10039090-202 = "シロコ先輩……？"
10039090-203 = "私も何かに集中してる時は、ほかのものが見えなくなった。"
10039090-204 = "例えば、ドローンを通風孔から潜入させる時とか、#n銀行警備員の巡回ルートを把握する時とか……。"
10039090-205 = "少し特殊な事例のような気もしますが、#n良い方法かもしれませんね……。"
10039090-211 = "やってみよう、アヤネちゃん！"
10039090-215 = "それに、リハーサルなんだからミスしたって大丈夫よ！"
10039090-216 = "セリカちゃん……。"
10039090-217 = "最初は嫌々だったけど、せっかく練習頑張ってきたんだから。"
10039090-218 = "ここで逃げたら、もったいないでしょ。"
10039090-219 = "とりあえず、やってみようよ！"
10039090-225 = "それでダメだったら、その時また考える！まずはできることから！"
10039090-232 = "……。"
10039090-233 = "うん……分かった！"
10039090-235 = "アヤネちゃん！"
10039090-236 = "……ここで諦めるわけにはいきません。"
10039090-237 = "たとえ、ステージが想像以上に広くて、観客席の数が多かったとしても……。"
10039090-241 = "今まで流した血と汗を無駄にはできないですから！"
10039090-242 = "血は流してないけど……。"
10039090-243 = "やってみせましょう、ステージを爆発させる勢いで！"
10039090-247 = "本当に爆発させちゃダメだからね！？"
10039090-252 = "うへ～、元気になったみたいだね。"
10039090-253 = "はい、張り切って行きましょう！"
10039090-255 = "ん、良かった。"
10039090-259 = "このまま観客を捕まえる。"
10039090-261 = "……心を掴むって意味ですよね？"
10039090-262 = "それじゃ、準備に戻ろうか。"
10039090-267 = "はい……もう逃げたりはしません。"
10039090-268 = "皆さん……どうか見守っていてください！"
10039090-269 = "[s11] \"うん、頑張って！\"\n[s12] \"二人なら、きっと大丈夫だよ。\""
10039090-272 = "あ、ありがとうございます……。"
10039090-276 = "セリカちゃん、さっき忘れたって言ってた振り付け、どの部分？"
10039090-281 = "えっと、ここなんだけど……。"
10039090-283 = "そろそろリハーサル、始まりますよ～☆"
10039090-290 = "（最初は緊張していたアヤネだったが、段々と自然なパフォーマンスを見せてくれた）"
10039090-291 = "（距離があって顔はよく見えなかったけれど……）"
10039090-297 = "（とても楽しいライブの時間だった）"
