[translation]
10039090-1 = "Epílogo Parte 1; A Tensão do Comitê de Contramedidas"
10039090-9 = "（Dia do ensaio do concurso de ídolos）"
10039090-10 = "（Estava ansioso para ver as alunas em um visual diferente, quando...）"
10039090-18 = "[ns1] \"Ei, Serika.\"\n[ns2] \"Aconteceu alguma coisa?\""
10039090-21 = "Sensei, é uma emergência!"
10039090-27 = "（Recebi uma mensagem da Serika e fui rapidamente até o Comitê de Contramedidas）"
10039090-33 = "Se-Sensei..."
10039090-34 = "[s] \"O que aconteceu?\""
10039090-35 = "A Ayane-chan..."
10039090-39 = "Ela sumiu de repente!"
10039090-40 = "[s] \"O quê!?\""
10039090-45 = "O ensaio vai começar em breve, que problemão."
10039090-46 = "O telefone dela não atende, será que aconteceu algo?"
10039090-47 = "Será que ela foi sequestrada?"
10039090-52 = "Mas ela estava dentro da escola!?"
10039090-53 = "Pelo meu instinto, acho que não foi isso."
10039090-54 = "De qualquer forma, procuramos em vários lugares, mas não a encontramos."
10039090-55 = "Sensei, o que a gente faz..."
10039090-56 = "[s] \"Vamos procurar de novo, vasculhando cada canto!\""
10039090-57 = "......Obrigada, Sensei!"
10039090-66 = "（Enquanto continuávamos procurando pelos lugares onde a Ayane poderia estar...）"
10039090-76 = "[ns] \"......Ayane.\""
10039090-77 = "......"
10039090-84 = "Se-Sensei!?"
10039090-85 = "Por que você está aqui..."
10039090-86 = "[s3] \"......Finalmente te encontrei.\"\n[s4] \"O ensaio vai começar logo, aconteceu alguma coisa?\""
10039090-89 = "......Ugh."
10039090-96 = "Haa, haa... Ayane-chan!"
10039090-97 = "Você está bem?"
10039090-98 = "Se você sumir assim de repente, eu também fico preocupado."
10039090-99 = "Hmm, parece que ela não se machucou."
10039090-101 = "Pessoal......"
10039090-102 = "O que houve? Vocês deram um susto na gente."
10039090-106 = "U-ugh......"
10039090-110 = "Ayane-chan?"
10039090-111 = "E-eu estou com medo......"
10039090-112 = "Com medo de quê......?"
10039090-113 = "......do palco."
10039090-115 = "Como é?"
10039090-122 = "......O palco é grande demais!"
10039090-130 = "Eu fui dar uma olhada no palco agora pouco......"
10039090-131 = "É muito maior do que eu imaginava, e a quantidade de assentos na plateia também......"
10039090-132 = "É o maior auditório de uma escola enorme, então é natural, não é?"
10039090-133 = "Mas eu não achei que fosse tão grande assim......"
10039090-135 = "Pensando bem, a Ayane-chan não gosta de ser o centro das atenções, né......"
10039090-136 = "Hmm, o que a gente faz?"
10039090-138 = "Eu ainda nem decorei a coreografia da dança!"
10039090-139 = "Eu estava planejando dançar olhando para a Ayane-chan......"
10039090-140 = "......Desculpa, Serika-chan."
10039090-141 = "Só de pensar em subir naquele palco, minha mente fica em branco e eu começo a ter dificuldade para respirar......"
10039090-142 = "Se eu estragar o plano por minha causa..."
10039090-143 = "[s] \"O plano...?\""
10039090-145 = "Eu estava pensando em usar o prêmio para pagar as dívidas da escola."
10039090-146 = "Hum, dá para conseguir muito dinheiro em pouco tempo."
10039090-147 = "Acho que, se formos nós duas, temos grandes chances de vencer..."
10039090-149 = "...Ugh."
10039090-150 = "Mesmo sendo um prêmio, não é uma quantia tão alta assim, então não precisa se pressionar tanto."
10039090-155 = "Era isso...?"
10039090-157 = "Ma-mas..."
10039090-158 = "Este palco também é o lugar onde cumprirei a promessa que fiz à Hoshino-senpai..."
10039090-160 = "...Você estava preocupada com isso, Ayane-chan."
10039090-161 = "Primeiro, vamos levantar! Se ficar sentada aí, vai acabar ficando cada vez mais desanimada!"
10039090-162 = "...Hmm, que tal dançar de olhos vendados?"
10039090-164 = "Acho que isso seria perigoso..."
10039090-165 = "Provavelmente, o medo acabou criando raízes na Ayane-chan."
10039090-166 = "Se houver algo que o tio aqui possa fazer, é só dizer."
10039090-167 = "Agora, a pressão que a Ayane-chan está carregando..."
10039090-168 = "...Sensei, não teria algum método bom?"
10039090-175 = "[ns] \"Ayane, pode falar um minuto?\""
10039090-177 = "Sensei...?"
10039090-178 = "[s5] \"É normal ficar nervosa.\"\n[s6] \"Afinal, você vai ficar diante de muita gente.\""
10039090-181 = "Sim. O palco real é tão grande... é completamente diferente da sala de aula..."
10039090-182 = "Só de pensar em tantos espectadores me olhando..."
10039090-183 = "Sinto como se meu coração fosse explodir e meu corpo trava."
10039090-184 = "[s] \"Então, que tal pensar desta forma?\""
10039090-189 = "[ns7] \"Como o pessoal do Comitê de Contramedidas estará na plateia...\"\n[ns8] \"Foque apenas neles durante a apresentação.\""
10039090-194 = "S-sim!?"
10039090-195 = "[s9] \"Dizem que quando você se concentra, sua visão periférica diminui, não é?\"\n[s10] \"Assim, você nem vai notar a presença dos outros espectadores.\""
10039090-198 = "Será que eu consigo...?"
10039090-199 = "[s] \"Eu também estarei assistindo.\""
10039090-200 = "...O Sensei também."
10039090-201 = "Hum, acho que vale a pena tentar."
10039090-202 = "Shiroko-senpai...?"
10039090-203 = "Quando eu estou concentrada em algo, também não consigo ver mais nada ao redor."
10039090-204 = "Por exemplo, quando infiltro um drone pelo duto de ventilação, ou quando mapeio a rota de patrulha dos guardas do banco..."
10039090-205 = "Sinto que esses são exemplos um pouco peculiares, mas... pode ser um bom método..."
10039090-211 = "Vamos tentar, Ayane-chan!"
10039090-215 = "Além disso, é só um ensaio, então não tem problema se errar!"
10039090-216 = "Serika-chan..."
10039090-217 = "No começo você estava relutante, mas já que se esforçou tanto nos treinos..."
10039090-218 = "Seria um desperdício desistir agora, não seria?"
10039090-219 = "Vamos, tente pelo menos!"
10039090-225 = "Se não der certo, a gente pensa de novo depois! Primeiro, vamos fazer o que está ao nosso alcance!"
10039090-232 = "..."
10039090-233 = "Sim... eu entendi!"
10039090-235 = "Ayane-chan!"
10039090-236 = "...Não posso desistir agora."
10039090-237 = "Mesmo que o palco seja maior do que eu imaginava e que haja muitos espectadores..."
10039090-241 = "Não posso deixar que todo o sangue e suor que derramei até agora sejam em vão!"
10039090-242 = "Bem, sangue eu não derramei, mas..."
10039090-243 = "Eu vou mostrar como se faz, com energia suficiente para explodir o palco!"
10039090-247 = "Você não pode explodir o palco de verdade, entendeu!?"
10039090-252 = "Uhee~, parece que você recuperou o ânimo."
10039090-253 = "Sim, vamos dar o nosso melhor!"
10039090-255 = "Hmm, que bom."
10039090-259 = "Vamos capturar o público agora."
10039090-261 = "......Você quer dizer conquistar o coração deles, né?"
10039090-262 = "Então, vamos voltar aos preparativos."
10039090-267 = "Sim...... Eu não vou mais fugir."
10039090-268 = "Pessoal...... por favor, fiquem de olho na gente!"
10039090-269 = "[s11] \"Sim, boa sorte!\"\n[s12] \"Com vocês duas, com certeza vai dar tudo certo.\""
10039090-272 = "Ah, muito obrigada......"
10039090-276 = "Serika-chan, qual parte da coreografia você disse que tinha esquecido?"
10039090-281 = "Bem, é aqui......"
10039090-283 = "O ensaio vai começar em breve~☆"
10039090-290 = "(Ayane estava nervosa no começo, mas aos poucos foi mostrando uma performance natural)"
10039090-291 = "(Embora estivesse longe e eu não conseguisse ver o rosto dela direito......)"
10039090-297 = "(Foi um momento de show muito divertido)"
