[translation]
1000308-1 = "偶然のおでかけ"
1000308-2 = "トリニティ総合学園前・校門"
1000308-3 = "せっかくのおでかけ、楽しみにしてたのに……。"
1000308-4 = "みんな急に先約を思い出したって話だったし、仕方ないけど……。"
1000308-5 = "ふう。それは良いとして、急に空いてしまったこの放課後の時間、何をして過ごそう……？"
1000308-7 = "あれ、先生？どうしてトリニティに？"
1000308-8 = "[s] \"出張に来て時間が余ったから、散歩。\""
1000308-9 = "な、なるほど。奇遇ですね！"
1000308-10 = "私は放課後に友達と一緒に遊ぶ予定だったんですが……。"
1000308-11 = "みんなギリギリのところで先約を思い出したみたいで、一人ぼっちになってしまいました、えへへ。"
1000308-12 = "それで、今から何をしようかと悩んでいたところでして……。"
1000308-13 = "あ、そうだ！そうです！もし先生もお時間が空いてるなら、付き合ってくれませんか？"
1000308-14 = "二人で軽く散歩をするだけでもいいので……お願いします。"
1000308-15 = "[s] \"いいよ。\""
1000308-16 = "わあ！ありがとうございます、先生！"
1000308-19 = "早く行きましょう！私がこの辺りをご案内します！"
1000308-22 = "― 次はどこに行ってみましょうか？[wa:3200]あっち？"
1000308-24 = "[wa:500]― ん～～、[wa:1300]でしたら[wa:1000]あちらはどうですか？"
1000308-27 = "― はい、[wa:1000]どこでも大丈夫です。[wa:2500]先生と一緒にいられるなら！"
1000308-30 = "― 先生、[wa:1200]あそこを見てください！[wa:2800]あっちも、[wa:1200]あっ！[wa:800]こっちも！"
1000308-33 = "― いつも見てる街なのに、[wa:3500]何でこんなに違って見えるんでしょうか？"
1000308-36 = "― ん？[wa:1000]いつまでここで休憩するつもりですか？"
1000308-38 = "― さぁ！[wa:800]もっと色々見て回りましょうよ！"
1000308-41 = "― はい？[wa:1000]その角度から見える景色がいいんですか？"
1000308-44 = "ふふ、今日は楽しかったです！"
1000308-45 = "急に約束が無くなった時は、何をすればいいのか呆然としてしまいましたが……。"
1000308-46 = "結果的に先生と一緒に楽しい時間が過ごせて、思わず得をしてしまった気分です！"
1000308-47 = "も、もちろん、だからと言って、約束が無くなって良かったという意味ではありませんが……！"
1000308-48 = "あの……先生。次は前もって約束をして、もっと遠くへおでかけしませんか？"
1000308-49 = "あまり知らない場所だと疲れないか……ですか？大丈夫です！"
1000308-50 = "先生と一緒ならきっと、そこがどこであっても、楽しいはずですから。"
