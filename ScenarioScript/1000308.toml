[translation]
1000308-1 = "Um passeio inesperado"
1000308-2 = "Em frente ao Portão da Escola Trinity"
1000308-3 = "Eu estava tão ansiosa por esse passeio..."
1000308-4 = "Todo mundo lembrou de um compromisso de última hora, então não tem jeito..."
1000308-5 = "Ufa. Deixando isso de lado, o que eu deveria fazer com esse tempo livre depois da aula...?"
1000308-7 = "Ué, Sensei? O que faz aqui em Trinity?"
1000308-8 = "[s] \"Vim para uma reunião, sobrou um tempo e resolvi passear.\""
1000308-9 = "Ah, entendo. Que coincidência!"
1000308-10 = "Eu tinha planejado sair com minhas amigas depois da aula, mas..."
1000308-11 = "Parece que todas lembraram de um compromisso de última hora, e acabei ficando sozinha, hehe."
1000308-12 = "Por isso, eu estava pensando no que fazer agora..."
1000308-13 = "Ah, já sei! Isso! Se o Sensei estiver livre, poderia me fazer companhia?"
1000308-14 = "Só uma caminhada rápida já serve... por favor."
1000308-15 = "[s] \"Claro.\""
1000308-16 = "Uau! Muito obrigada, Sensei!"
1000308-19 = "Vamos logo! Eu vou te guiar por aqui!"
1000308-22 = "― Para onde vamos agora? [wa:3200] Ali?"
1000308-24 = "[wa:500] ― Hmmm, [wa:1300] então [wa:1000] que tal ali?"
1000308-27 = "― Sim, [wa:1000] qualquer lugar serve. [wa:2500] Contanto que eu esteja com o Sensei!"
1000308-30 = "― Sensei, [wa:1200] olhe aquilo! [wa:2800] E ali também, [wa:1200] ah! [wa:800] E aqui!"
1000308-33 = "― É uma cidade que vejo sempre, [wa:3500] mas por que parece tão diferente hoje?"
1000308-36 = "― Hm? [wa:1000] Por quanto tempo pretende descansar aqui?"
1000308-38 = "― Vamos! [wa:800] Vamos ver mais coisas!"
1000308-41 = "― Sim? [wa:1000] A vista desse ângulo é melhor?"
1000308-44 = "Hehe, hoje foi muito divertido!"
1000308-45 = "Quando meus planos foram cancelados de repente, fiquei sem saber o que fazer..."
1000308-46 = "Mas, no fim das contas, passar esse tempo divertido com o Sensei me fez sentir como se eu tivesse ganhado o dia!"
1000308-47 = "E-eu não quis dizer que foi bom os planos terem sido cancelados, claro...!"
1000308-48 = "Diga-me... Sensei. Da próxima vez, podemos marcar com antecedência e ir a um lugar mais longe?"
1000308-49 = "Se eu não vou ficar cansada por ser um lugar desconhecido...? Está tudo bem!"
1000308-50 = "Porque, se estiver com o Sensei, tenho certeza de que será divertido, não importa onde seja."
