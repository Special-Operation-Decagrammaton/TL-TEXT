[translation]
10003050-1 = "第5話;招かれざる美食研究会"
10003050-8 = "び、美食研究会！？なんでお前たちがここに……！今度は何をやらかすつもりだ！？"
10003050-9 = "（そういえば、あの時見たSNSのアカウントの中に、確か……）"
10003050-10 = "あら、失礼ですわね。私たちは何も、事件を起こしに来たわけではありませんわ？"
10003050-11 = "そうよ！私たちはただ焼きトウモロコシを売りに来ただけ！"
10003050-12 = "……？"
10003050-13 = "……とうもろこし？"
10003050-17 = "海辺やお祭りなどで食べる焼きトウモロコシは、なぜあんなに美味しいのでしょうか……？"
10003050-18 = "その理由、気になりませんか？同じトウモロコシのはずなのに、海辺だというだけで、お祭りだというだけで、あんなにも味が違うだなんて……。"
10003050-19 = "ただ考えるだけでは仕方ありません、これを解明する方法はただ一つ。"
10003050-21 = "そう、試してみれば良いのです。"
10003050-24 = "つまり、実際に作ってみましょうと。ちょうどここで、私たち以外のサンプルもかなり確保できそうでしたし。"
10003050-25 = "そういうことです★今日ここで全面戦争があるとインターネットで話題でしたし、海でお祭り騒ぎだなんてちょうど良いなと思いまして～。"
10003050-26 = "スケバン集団にヘルメット団！それに結構規模の大きい抗争らしいし、見物人もたくさん来るって言ってたし、ここで焼きトウモロコシなんて売ったら大繁盛間違いなし！"
10003050-27 = "うんうん！まあもし売れ残っても私が食べるよ！"
10003050-28 = "何言ってんの、売り切るわよ！！運ぶの大変だったんだから！"
10003050-32 = "……と思っていたのですが、どうしてここまで閑散としているのでしょうか？"
10003050-33 = "いや、お前たちの事情とか知ったこっちゃないし……とりあえずお祭り騒ぎは中止になったから、ほら帰った帰った！"
10003050-34 = "……ふふっ。"
10003050-35 = "あらあら、つれないですね★"
10003050-36 = "私たちは美食研究会……美食の追及において如何なる障害があろうとも、背を向けるなんてことは致しません。"
10003050-37 = "ハルナも言っている通り、まあそういうことです。それに見たところ……"
10003050-39 = "どうやら今は、風紀委員長がいらっしゃらないようですし……？"
10003050-40 = "（ビクッ！）"
10003050-42 = "（まずいですね……！）"
10003050-47 = "ふふっ……せっかくですし、私たちの美食への執念、あらためてお見せいたしましょうか？"
10003050-48 = "そうだそうだ！トウモロコシを食べさせろー！！"
10003050-52 = "ああもう、ようやく問題が片付いたと思ったらまた面倒な問題児が……！風紀委員会、行くぞ！"
10003050-53 = "はいっ！！"
10003050-54 = "はあ……戦闘、開始します。"
