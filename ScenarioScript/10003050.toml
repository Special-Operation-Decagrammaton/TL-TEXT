[translation]
10003050-1 = "Episódio 5; O Clube de Pesquisa Gastronômica não convidado"
10003050-8 = "O, o Clube de Pesquisa Gastronômica!? Por que vocês estão aqui...!? O que vocês pretendem causar desta vez!?"
10003050-9 = "（Pensando bem, entre as contas de redes sociais que vi naquela época, com certeza...）"
10003050-10 = "Ora, que falta de educação. Nós não viemos aqui para causar nenhum incidente, sabia?"
10003050-11 = "É isso mesmo! Nós só viemos vender milho assado!"
10003050-12 = "……？"
10003050-13 = "……Milho?"
10003050-17 = "Por que será que o milho assado que comemos na praia ou em festivais é tão delicioso...?"
10003050-18 = "Não sentem curiosidade sobre o motivo? Deveria ser o mesmo milho, mas só por estar na praia, só por ser um festival, o sabor muda tanto..."
10003050-19 = "Não adianta apenas pensar nisso, só existe uma maneira de desvendar esse mistério."
10003050-21 = "Isso mesmo, basta experimentar."
10003050-24 = "Em outras palavras, vamos fazer na prática. E aqui parecia ser um ótimo lugar para conseguir várias amostras além de nós mesmas."
10003050-25 = "É exatamente isso★ A internet estava comentando que haveria uma guerra total aqui hoje, e pensei que um clima de festival na praia seria perfeito~."
10003050-26 = "Tem gangues de delinquentes e o Grupo do Capacete! Além disso, parece ser um conflito de grande escala e disseram que muitos espectadores viriam, então vender milho assado aqui com certeza seria um sucesso absoluto!"
10003050-27 = "Sim, sim! Bem, se sobrar, eu mesma como!"
10003050-28 = "Do que você está falando? Vamos vender tudo!! Foi um trabalhão trazer isso até aqui!"
10003050-32 = "……Era o que pensávamos, mas por que está tudo tão deserto por aqui?"
10003050-33 = "Olha, eu não me importo com os problemas de vocês... De qualquer forma, a bagunça do festival foi cancelada, então vamos, tratem de ir embora!"
10003050-34 = "……Fufu."
10003050-35 = "Ora, ora, que frieza★"
10003050-36 = "Nós somos o Clube de Pesquisa Gastronômica... Não importa que tipo de obstáculo surja na busca pela gastronomia, nós nunca viramos as costas."
10003050-37 = "Como Haruna disse, é bem por aí. Além disso, pelo que parece..."
10003050-39 = "Parece que a Presidente do Comitê Disciplinar não está por aqui agora, não é...?"
10003050-40 = "（Argh!）"
10003050-42 = "（Isso é ruim...!）"
10003050-47 = "Fufu... Já que estamos aqui, que tal mostrarmos a vocês, mais uma vez, a nossa obsessão pela gastronomia?"
10003050-48 = "Isso mesmo! Deixem a gente comer o milho!!"
10003050-52 = "Ah, chega! Achei que tínhamos resolvido os problemas, mas aí aparecem essas encrenqueiras...! Comitê Disciplinar, vamos!"
10003050-53 = "Sim!!"
10003050-54 = "Haa... Combate, iniciando."
