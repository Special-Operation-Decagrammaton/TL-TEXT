10020035-73 = "Nossa, mas falando nisso, Shiroko-chan. Você é a refém, por que está vestida assim?"
10020035-74 = "Hmm, isso é…… porque eu sempre carrego na bolsa. #nA oportunidade favorece quem está preparado."
10020035-75 = "Parece que este lugar estava sendo atacado há algum tempo…… #nEntão, quando eu fosse escapar, aproveitaria uma brecha para pegar algo valioso——"
