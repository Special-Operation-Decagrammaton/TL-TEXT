[translation]
10020035-19 = "ぐっ……！！"
10020035-20 = "と、止まって！……君は、一体誰？"
10020035-21 = "また、逃げてしまいました……。"
10020035-26 = "ほ、ホシノ先輩……今のって……。 "
10020035-27 = "私たちの知るシロコちゃんじゃないとは、一体どういう意味ですか……？"
10020035-29 = "……。"
10020035-30 = "シロコちゃんは……あんな目をしない。"
10020035-31 = "アレは……"
10020035-40 = "待たせたわね！ヒマリ先輩のおかげで、第4エリアの通信網をハッキングできたわよ！"
10020035-41 = "第4エリアは、たしか……。"
10020035-42 = "「[ruby=彼女]シロコ[/ruby]」の信号を捉えた位置よ。#n画面を映すから待ってちょうだい。"
10020035-52 = "こ、ここは……。"
10020035-62 = "し、シロコ先輩！？"
10020035-63 = "シロコちゃん……？"
10020035-64 = "ん。やっと見つけてくれた。#n先生、みんな……待ってた。"
10020035-65 = "[ns] \"シロコ、大丈夫！？怪我はない！？\""
10020035-68 = "ん、大丈夫。#n自転車に乗って学校に向かってたら、拉致されただけ。"
10020035-69 = "人質になるのはセリカみたいな子だと思ってたから、油断してた。ごめん。 "
10020035-70 = "な、なっ！？ちょっとシロコ先輩？どういう意味！？"
10020035-71 = "でも、助けに来てくれるって分かってたから……大丈夫。#nちょっと体の節々が痛いだけ。"
10020035-72 = "それに……危害を加えてこないから、身代金目的みたい。"
10020035-73 = "いやぁ、それにしてもシロコちゃん。人質なのにその格好はどうしたのさ？"
10020035-74 = "ん、これは……いつもバッグに入れてるから。#nチャンスは、準備された者に訪れるもの。"
10020035-75 = "少し前から、ここが襲撃を受けてるみたいだったから……#n脱出する時、隙を見て高そうな物を――"
10020035-80 = "こんな状況なのに……そんな計画を……"
10020035-81 = "う……んん……。 "
10020035-82 = "うへ～……シロコちゃんは本当に、ピンチからチャンスを生み出す天才だねぇ。 "
10020035-83 = "……でもさ、シロコちゃん。#nおじさん言ったでしょ。"
10020035-94 = "ん……。 "
10020035-95 = "「こんな方法に慣れちゃうと……ゆくゆくは、きっと平気で同じことをするようになる」……"
10020035-96 = "「そうやって学校を守ったって、何の意味があるのさ」って……言ってた。 "
10020035-98 = "……。"
10020035-99 = "……シロコちゃん。"
10020035-100 = "シロコ先輩……本当に、シロコ先輩だ……"
10020035-101 = "うへ～、よく覚えてるね。 "
10020035-102 = "そこでじっとしてるんだよ？#nすぐ助けに行くから。"
10020035-103 = "ん。"
10020035-104 = "積もる話は後で、ね。#nシロコちゃんが居ない間、本当いろんなことがあったんだよ？ほんっと、涙なしでは聞けないような話がいっぱいあるからさ……"
10020035-105 = "ん、待ってる。 "
10020035-106 = "ホシノ先輩、みんな、先生……#n助けに来てくれるって、知ってた。"
10020035-107 = "[s] \"…………うん、当たり前だよ。\""
10020035-108 = "それじゃ――ここで――――ってるから―― "
10020035-112 = "……。"
10020035-113 = "シロコちゃん……。"
10020035-114 = "……それじゃ、ちゃちゃっと次のエリアに行こっか。"
10020035-115 = "――シロコちゃんがいる、第4エリアに。"
10020035-116 = "はい！まだ、何が何だか分かりませんが…… "
10020035-117 = "ですが、状況を理解するよりも、シロコちゃんを助ける方が先決です！"
10020035-119 = "待ってて、シロコ先輩……すぐに行くから！！"
10020035-121 = "残るはあと1つ――箱舟の最終エリア、中心部の第4エリアです。"
10020035-122 = "あとは、ここを占領すれば……箱舟の管制システムを掌握できます。"
10020035-123 = "これで「アトラ・ハシースの箱舟」もおしまいってわけ！#nとっとと自爆シーケンスを稼働させちゃお！"
10020035-128 = "本物のシロコさんがいる場所は、第4エリアの閉鎖されたセクションです。"
10020035-129 = "ですが、ここへ通じるゲートを開くには、箱舟の上層階に存在する「特別エリア」――その中にある制御室を破壊しなくてはなりません。"
10020035-130 = "「特別エリア」……。"
10020035-131 = "はい。特別エリアは、物理的に箱舟と離れているため、ハッキングの影響を受けないのです。"
10020035-132 = "つまり……誰かが「特別エリア」の制御室を破壊しなければ、シロコちゃんのいる部屋に辿り着けないのですね。"
10020035-133 = "ええ。破壊に成功すれば、シロコさんのいる第4エリアが開放されるでしょう。"
10020035-137 = "……ま、それならやっぱり私たちの出番かな。"
10020035-138 = "先生はその間に「次元エンジン」を破壊して、第4エリアの占領をお願いね。"
10020035-139 = "シロコちゃんがちゃんと脱出できるよう、周りを綺麗にしておかないと。"
10020035-140 = "[s] \"了解。みんな気を付けてね。\""
10020035-142 = "はい、任せてください！"
10020035-143 = "「次元エンジン」は頼んだわよ！"
10020035-144 = "んじゃ、私たちは「特別エリア」に行ってくるね。#nまた後で～"
10020035-148 = "さあ――「アトラ・ハシースの箱舟」占領戦、最後の戦いです。 "
10020035-149 = "これが……本当に最後の戦いになるんですね。"
10020035-150 = "それなんだけどさぁ……敵さんもこれが「最後」だって分かってるみたいだよ？"
10020035-151 = "……？"
10020035-156 = "うわぁ……ものすごい数の敵がこっちに向かってきてる。 "
10020035-157 = "はっ、はい！？ "
10020035-159 = "……もう一度、船の防衛が必要そうですね。"
10020035-163 = "ふふっ。心配はご無用です。"
10020035-165 = "ここの防衛は、私たちが担当いたします。"
10020035-166 = "ここまで来ちゃったんだし、しょうがないわね。"
10020035-167 = "ええ、派手にいきましょうか★"
10020035-168 = "ところで、宇宙食はいつになったら食べれるの～？"
10020035-170 = "こっちは、わたし達がなんとか守ります……！"
10020035-171 = "はい。ここはアリスたちに任せてください、先生。 "
10020035-172 = "アリスちゃん……体は大丈夫？"
10020035-174 = "はい。まだHP全快とまではいきませんが、みんなと一緒なら戦えます！"
10020035-175 = "でも無理はしないでね、アリス！ "
10020035-177 = "はい！"
10020035-179 = "先生……では、最後の占領戦もよろしくお願いします。"
