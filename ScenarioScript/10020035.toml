10020035-117 = "Mas, antes de tentar entender a situação, salvar a Shiroko-chan é a nossa prioridade!"
10020035-119 = "Espere por nós, Shiroko-senpai…… estamos indo agora mesmo!!"
10020035-121 = "Só resta mais uma — a área final da Arca, a 4ª área no centro."
10020035-122 = "Agora, se ocuparmos este lugar... poderemos assumir o controle do sistema da Arca."
10020035-123 = "Com isso, a \"Arca de Atra-Hasis\" já era!#nVamos logo ativar a sequência de autodestruição!"
10020035-128 = "O local onde a Shiroko real está é uma seção isolada na 4ª área."
10020035-129 = "No entanto, para abrir o portão que leva até lá, precisamos destruir a sala de controle que fica na \"Área Especial\", nos andares superiores da Arca."
10020035-130 = "Uma \"Área Especial\"..."
10020035-131 = "Sim. Como a Área Especial está fisicamente separada da Arca, ela não é afetada pelo hackeamento."
10020035-132 = "Ou seja... se alguém não destruir a sala de controle da \"Área Especial\", não conseguiremos chegar ao quarto onde a Shiroko está, não é?"
10020035-133 = "Exato. Se tiverem sucesso na destruição, a 4ª área, onde a Shiroko está, será liberada."
10020035-137 = "...Bem, então acho que é a nossa vez de agir."
