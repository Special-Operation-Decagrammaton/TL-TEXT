[translation]
84305300100-9 = "ネル……？"
84305300100-10 = "チッ、先客だ。"
84305300100-11 = "……先客？"
84305300100-16 = "あっ、みなさんありがとうございます！おかげですっごく助かりましたー！"
84305300100-23 = "ここがあの「ビッグシスタールーム」なんですね？いやーっ、これは見つからないわけです。"
84305300100-24 = "ミレニアムの全エリア……いえ、それ以上を監視し操作するという「見えない手」であり「神の目」とも呼べる場所。"
84305300100-25 = "ここまで来るの、ほんっと大変だったんですよ。自分じゃどーしても見つからなくて。"
84305300100-26 = "でもこうして皆さんのおかげで辿り着けました！もう、どうお礼を言えばいいのか！"
84305300100-27 = "あ？おかげ？何言ってんだ？"
84305300100-28 = "自分じゃ見つけられなかった？ "
84305300100-32 = "まさか……！"
84305300100-33 = "今までの騒ぎは……まさかこの為だったのか。"
84305300100-34 = "おっ、鋭い！大正解！"
84305300100-35 = "はぁ？どういう意味だ？"
84305300100-36 = "……罠だったのだよ。"
84305300100-37 = "今までの事件……ミレニアムEXPOを破綻させるためと思われたもの全てが。"
84305300100-41 = "私たちをここに誘導するためのものだった。"
84305300100-43 = "なっ……！！"
84305300100-45 = "は？つまり……。"
84305300100-46 = "まんまと狙い通り、道案内をしてしまったというわけだ。"
84305300100-47 = "より正確には、ここにある「ビッグシスターアルゴリズム」が目的なのだろう？"
84305300100-48 = "……彼女の正体は分からないが。"
84305300100-53 = "あっ、ごめんなさい！バタバタしてて申し遅れました！"
84305300100-54 = "私は「ミライ」と申します。「疑似科学部」の元部長です。"
84305300100-59 = "疑似科学部……？"
84305300100-60 = "ミライ？"
84305300100-62 = "ええ！そして……。"
84305300100-63 = "現生徒会長、調月リオさんとは腐れ縁でしてねぇ。"
84305300100-68 = "は？"
84305300100-69 = "そうなのかい？"
84305300100-71 = "え……？"
84305300100-72 = "うふふっ……まさか知らないとは言わせませんよ？リオ会長。"
84305300100-73 = "あなたの手で消したんですものねぇ……？疑似科学部を――そして私を。"
84305300100-74 = "私はずっと待っていたんです 。"
84305300100-75 = "疑似科学部の顔に泥を塗り、[ruby=・]事[/ruby][ruby=・]業[/ruby]を妨害したあなたに復讐する日を。"
84305300100-79 = "……。"
84305300100-80 = "……。"
84305300100-81 = "……。"
84305300100-85 = "ごめんなさい、何のことかしら……思い当たる節が全く無いわ。"
84305300100-89 = "……はい？"
84305300100-90 = "貴女が誰か分からないの。私は貴女に悪意を持ったことも、事業を邪魔しようとしたこともないはずよ。何か誤解があるようね。"
84305300100-94 = "わ、分からない……！？部活の存続をかけて戦ったじゃありませんか！！"
84305300100-95 = "疑似科学部の予算を全て停止して！プロジェクトも全部打ち止めにしたのは、他でもないリオ会長ですよ！？"
84305300100-96 = "私が……？プロジェクト名は？"
84305300100-97 = "私に言わせるんですか！？こんなに屈辱的なこと、初めてですよ……！"
84305300100-102 = "「水は知っている」プロジェクトも、「ピラミッドパワー」も、「電磁波防止ステッカー」も全てあなたのせいで立ち消えた！"
84305300100-110 = "辛うじて認められたのは「ゲルマニウム・ブレスレット」だけ……疑似科学部は、あなたのせいで破産したんです。思い出していただけましたか？"
84305300100-112 = "は……？ピラミッド？ステッカー？"
84305300100-113 = "疑似科学。科学の名を標榜してはいるが……その本質は、理論を体よく利用して物品に付加価値を与え、収益を得る事業、か。"
84305300100-114 = "それ、詐欺っていうんじゃねえか？"
84305300100-115 = "そうとも言い換えられるね。"
84305300100-117 = "なっ、人聞きの悪い！「まだ」検証されてないだけですから！！これだから保守派は！"
84305300100-118 = "あなたたちのせいで、私の中の水分子が怒りで歪んできましたよ……！"
84305300100-119 = "何言ってんだあいつ？"
84305300100-120 = "活動を止められたのは妥当なように思えるが。"
84305300100-121 = "……ああ、やっと思い出せた。"
84305300100-122 = "誤解があるなら謝るわ。でもミライ、貴女の発言には間違いがある。 "
84305300100-126 = "間違い？"
84305300100-127 = "「検証されていない」ことは「科学」ではない。研究費や開発費が必要なら、まずそれが実現できるという理論が無ければ。"
84305300100-128 = "そして、外部から利益を得る「事業」のために、活動費を支給するわけにはいかない。"
84305300100-129 = "私たちがいるのは学園……学び舎なのだから。"
84305300100-131 = "至極、真っ当な意見だ。"
84305300100-132 = "異議無し。"
84305300100-134 = "あなたは……まだそんなことを！結局、あの時と何も変わらないのですね。"
84305300100-135 = "いいでしょう！話が通じないのは織り込み済みです。"
84305300100-136 = "私はこの「ビッグシスターアルゴリズム」を売り払えばいいだけ！"
84305300100-137 = "それは許可できないわ。きっと貴女の想像が及ばないほどに危険な代物よ。"
84305300100-138 = "ここに来たのは、これを破棄するため。"
84305300100-139 = "はいはい、その涼しい顔、いつまでもちますかね？"
84305300100-141 = "その言葉、お前にそのまま返してやるよ。"
84305300100-142 = "あたしを誰だと思ってるんだ？"
84305300100-146 = "その程度で相手になると思ってんのかよ！"
84305300100-147 = "美甘ネル……。"
84305300100-151 = "たしかに、私ではあなたに勝てないでしょうね。ですが……馬鹿正直に真っ向勝負なんてしませんよ？"
84305300100-152 = "へぇ？"
84305300100-156 = "……じゃーん！"
84305300100-157 = "これ、なーんだ？"
84305300100-158 = "このボタン一つで、会場中に散らばってる仲間たちに信号を送れるんです。同時多発的に暴動が発生したら、ミレニアムEXPOがどうなるか。後は想像つきますよね？"
84305300100-159 = "なっ……！！"
84305300100-160 = "ほう……手の込んだ事をしている。"
84305300100-161 = "ふふっ、少しは緊張感を持ってもらえましたか？でもご心配なく！皆さんが大人しくしてくれていれば、これの出番はありません。"
84305300100-162 = "じゃっ、じっとしていてくださいね？ハードの持ち出しには時間がかかりますから……。"
84305300100-163 = "……なぜこんな事を？"
84305300100-164 = "いいえ。そもそも、どうやってここの存在を……？私以外が知る術は無いはずなのに。"
84305300100-165 = "餅は餅屋……スポンサーのお陰ですかね。"
84305300100-169 = "スポンサー……？"
84305300100-171 = "リオ、このままでは……。"
84305300100-172 = "……打つ手がないわ。"
84305300100-179 = "はー、ホント……。"
84305300100-180 = "見てらんねぇな。これがあの調月リオの姿か？情けねぇ。"
84305300100-185 = "……ネル？"
84305300100-191 = "え……？"
84305300100-196 = "なっ！？とっ、止まりなさい！いいんですか？押しちゃいますよ？"
84305300100-200 = "本当に……本当にやりますよ！？"
84305300100-204 = "まさか……信じてないんですね？おっ、押しちゃいますよ？"
84305300100-206 = "その覚悟があるならな。いいぜ、やってみろよ。"
84305300100-210 = "……えっ？"
84305300100-216 = "まさか……はったりじゃねぇよな？"
84305300100-217 = "ネル……！！"
84305300100-218 = "ネル、それは……！"
84305300100-220 = "ほっ、本当なんだから！本当にやるから！後悔しても遅いから！"
84305300100-222 = "ほら、やれよ。"
84305300100-228 = "ネル！！"
84305300100-229 = "なぜ……？"
84305300100-232 = "（捨て鉢になったか？）"
84305300100-233 = "（いや……彼女はそんな人物ではない……）"
84305300100-234 = "（まさか……っ！）"
84305300100-237 = "いいでしょう！お望み通りに！！押してあげますとも！"
84305300100-241 = "ポチっとな。"
84305300100-242 = "……あれ？"
84305300100-246 = "あれれ？……こちらミライ！こちらミライ！聞こえますか！？"
84305300100-248 = "何でこんなに電波が……。"
84305300100-253 = "……しゅうだ……！"
84305300100-259 = "……敵襲だ！！全エリアで、敵襲ーっ！！"
84305300100-260 = "はい……？"
84305300100-261 = "そんな、まさか……あっ、ありえない！"
84305300100-265 = "……C&Cが！！"
84305300100-266 = "何が起きている……？"
84305300100-267 = "そ、そんなはず……美甘ネルはここに……！"
84305300100-269 = "ネル以外のC&Cが……！"
84305300100-270 = "全部罠だ！！"
84305300100-273 = "……罠。"
84305300100-274 = "これは一体……。"
84305300100-278 = "……これは。"
84305300100-279 = "……ネル！"
84305300100-280 = "君は最初から……？"
84305300100-285 = "あー、いや、まあ。 "
84305300100-286 = "そういうことだ。 "
84305300100-287 = "……たまにな、くだらねぇ話を先生とするんだわ。"
84305300100-288 = "あたしは一人で抱え込む誰かさんと違って、自分で解決できるなんざハナから思っちゃいねぇからよ……。"
84305300100-289 = "先生には一言くらいあってもいいだろ。"
84305300100-294 = "先生に……？"
84305300100-295 = "では、さっきの作戦も……？"
84305300100-296 = "全て先生の指揮、ということか。"
84305300100-297 = "ネル……。"
84305300100-298 = "貴女、一体いつから……。"
84305300100-300 = "お前が話を持ち掛けてきたタイミングだから……EXPOの準備をしているくらいからだな。"
84305300100-301 = "2週間も前から……！？"
84305300100-302 = "あ、他のヤツには言ってねぇよ。そのあたりは先生がうまくやるだろ。"
84305300100-306 = "なるほど……。"
84305300100-307 = "だから先生は……。"
84305300100-308 = "あの時から、ここまで見越して……。"
84305300100-310 = "一体……何の話ですか！？"
84305300100-311 = "お前が気にすることじゃねえよ。"
84305300100-316 = "それより……自分の身を心配するんだな。"
