[translation]
84305300100-9 = "Neru...?"
84305300100-10 = "Tsc, tem gente aqui."
84305300100-11 = "...Gente aqui?"
84305300100-16 = "Ah, muito obrigada, pessoal! Graças a vocês, isso ajudou demais!"
84305300100-23 = "Então este é o famoso \"Big Sister Room\"? Nossa, não é à toa que ninguém consegue encontrar."
84305300100-24 = "Um lugar que pode ser chamado de \"Mão Invisível\" ou \"Olho de Deus\", capaz de monitorar e controlar todas as áreas de Millennium... ou até mais que isso."
84305300100-25 = "Foi muito difícil chegar até aqui. Eu mesma não conseguia encontrar de jeito nenhum."
84305300100-26 = "Mas, graças a vocês, finalmente consegui! Nem sei como agradecer!"
84305300100-27 = "Hã? Graças a nós? Do que você está falando?"
84305300100-28 = "Você não conseguia encontrar sozinha?"
84305300100-32 = "Não pode ser...!"
84305300100-33 = "Toda aquela confusão de antes... será que foi por causa disso?"
84305300100-34 = "Oh, que perspicaz! Exatamente!"
84305300100-35 = "Hã? O que isso significa?"
84305300100-36 = "...Era uma armadilha."
84305300100-37 = "Todos os incidentes anteriores... tudo o que parecia ser uma tentativa de arruinar a Millennium EXPO."
84305300100-41 = "Foram apenas meios para nos atrair até aqui."
84305300100-43 = "O quê...!!"
84305300100-45 = "Hã? Então quer dizer..."
84305300100-46 = "Caímos direitinho e servimos de guia para ela."
84305300100-47 = "Mais precisamente, o objetivo é o \"Algoritmo Big Sister\" que está aqui, não é?"
84305300100-48 = "...Não sei quem ela é, mas..."
84305300100-53 = "Ah, me desculpem! Com toda essa correria, acabei esquecendo de me apresentar!"
84305300100-54 = "Meu nome é \"Mirai\". Sou a ex-presidente do \"Clube de Pseudociência\"."
84305300100-59 = "Clube de Pseudociência...?"
84305300100-60 = "Mirai?"
84305300100-62 = "Sim! E também..."
84305300100-63 = "Tenho uma relação de longa data com a atual presidente do conselho estudantil, Rio Tsukatsuki."
84305300100-68 = "Hã?"
84305300100-69 = "É verdade isso?"
84305300100-71 = "Eh...?"
84305300100-72 = "Ufufu... não me diga que você não se lembra, presidente Rio?"
84305300100-73 = "Foi você mesma quem acabou com tudo... com o Clube de Pseudociência, e comigo."
84305300100-74 = "Eu esperei por muito tempo."
84305300100-75 = "O dia de me vingar de você, que manchou a reputação do Clube de Pseudociência e sabotou nossos projetos."
84305300100-79 = "..."
84305300100-80 = "..."
84305300100-81 = "..."
84305300100-85 = "Desculpe, do que você está falando...? Não faço a menor ideia do que está dizendo."
84305300100-89 = "...Sim?"
84305300100-90 = "Eu não sei quem você é. Nunca tive má vontade contra você, nem tentei sabotar seus projetos. Parece que há algum mal-entendido."
84305300100-94 = "V-você não sabe...!? Nós lutamos pela sobrevivência do nosso clube!!"
84305300100-95 = "Você cortou todo o orçamento do Clube de Pseudociência! E cancelou todos os nossos projetos, foi você mesma, presidente Rio!"
84305300100-96 = "Eu...? Quais eram os nomes dos projetos?"
84305300100-97 = "Você quer que eu mesma diga!? É a primeira vez que passo por uma humilhação dessas...!"
84305300100-102 = "O projeto \"A Água Sabe\", o \"Poder da Pirâmide\" e os \"Adesivos de Proteção contra Ondas Eletromagnéticas\", tudo foi cancelado por sua causa!"
84305300100-110 = "A única coisa que foi minimamente aceita foi o \"Bracelete de Germânio\"... O Clube de Pseudociência faliu por sua causa. Já se lembrou?"
84305300100-112 = "Hã...? Pirâmide? Adesivos?"
84305300100-113 = "Pseudociência. Embora use o nome da ciência... a essência disso é usar teorias de forma conveniente para dar valor agregado a produtos e obter lucro, não é?"
84305300100-114 = "Isso não seria basicamente um golpe?"
84305300100-115 = "Pode-se dizer que é uma forma de colocar as coisas."
84305300100-117 = "Ei, que calúnia! É só porque ainda não foi \"verificado\"!! É por isso que os conservadores são assim!"
84305300100-118 = "Por causa de vocês, as moléculas de água dentro de mim começaram a se distorcer de raiva...!"
84305300100-119 = "Do que ela está falando?"
84305300100-120 = "Parece razoável terem interrompido as atividades dela."
84305300100-121 = "……Ah, finalmente me lembrei."
84305300100-122 = "Se houve um mal-entendido, peço desculpas. Mas Mirai, há um erro no que você disse."
84305300100-126 = "Um erro?"
84305300100-127 = "O que \"não foi verificado\" não é \"ciência\". Se precisa de verbas de pesquisa ou desenvolvimento, primeiro é preciso ter uma teoria que comprove que isso é realizável."
84305300100-128 = "E não podemos fornecer verbas de atividade para um \"negócio\" que visa obter lucro externo."
84305300100-129 = "Porque estamos em uma academia... um lugar de aprendizado."
84305300100-131 = "Uma opinião extremamente sensata."
84305300100-132 = "Sem objeções."
84305300100-134 = "Você... ainda diz essas coisas! No fim das contas, você não mudou nada desde aquela época."
84305300100-135 = "Tudo bem! Eu já esperava que não fôssemos nos entender."
84305300100-136 = "Eu só preciso vender esse \"Algoritmo Big Sister\"!"
84305300100-137 = "Não posso permitir isso. É algo perigoso, a um nível que você nem consegue imaginar."
84305300100-138 = "Vim aqui para destruir isso."
84305300100-139 = "Sim, sim. Vamos ver por quanto tempo você consegue manter essa cara de frieza."
84305300100-141 = "Vou devolver essas palavras exatamente para você."
84305300100-142 = "Quem você acha que eu sou?"
84305300100-146 = "Você acha mesmo que consegue me enfrentar com isso?!"
84305300100-147 = "Mikamo Neru..."
84305300100-151 = "Certamente, eu não venceria você em um combate direto. Mas... eu não sou tola a ponto de lutar de frente, sabe?"
84305300100-152 = "Ah é?"
84305300100-156 = "……Tcharam!"
84305300100-157 = "O que é isso, hein?"
84305300100-158 = "Com este botão, posso enviar um sinal para meus companheiros espalhados por todo o evento. Se tumultos ocorrerem simultaneamente, você consegue imaginar o que acontecerá com a Millennium EXPO, não consegue?"
84305300100-159 = "O quê...!!"
84305300100-160 = "Ho... Que coisa elaborada."
84305300100-161 = "Fufu, conseguiu sentir um pouco de tensão agora? Mas não se preocupe! Se vocês ficarem quietos, não precisarei usar isso."
84305300100-162 = "Então, fiquem parados, certo? Leva tempo para remover o hardware..."
84305300100-163 = "……Por que fazer algo assim?"
84305300100-164 = "Não, espere. Como você descobriu a existência deste lugar...? Não deveria haver forma de alguém além de mim saber."
84305300100-165 = "Cada um no seu quadrado... acho que devo isso ao meu patrocinador."
84305300100-169 = "Patrocinador...?"
84305300100-171 = "Rio, desse jeito..."
84305300100-172 = "……Não tenho mais cartas na manga."
84305300100-179 = "Ah, sério..."
84305300100-180 = "Não dá nem para assistir. Essa é a Tsukatsuki Rio? Que patético."
84305300100-185 = "……Neru?"
84305300100-191 = "Eh...?"
84305300100-196 = "O quê!? Pa-pare! Você tem certeza? Eu vou apertar, viu?"
84305300100-200 = "Eu vou mesmo... eu vou mesmo apertar, hein!?"
84305300100-204 = "Não pode ser... você não acredita em mim? Eu vou apertar, viu?"
84305300100-206 = "Se você tem coragem para isso, então vá em frente. Pode tentar."
84305300100-210 = "……Eh?"
84305300100-216 = "Não me diga que... isso não é um blefe, é?"
84305300100-217 = "Neru...!!"
84305300100-218 = "Neru, isso é...!"
84305300100-220 = "E-eu estou falando sério! Eu vou fazer mesmo! Não adianta se arrepender depois!"
84305300100-222 = "Então vai, faz logo."
84305300100-228 = "Neru!!"
84305300100-229 = "Por que...?"
84305300100-232 = "(Ela perdeu a cabeça?)"
84305300100-233 = "(Não... ela não é esse tipo de pessoa...)"
84305300100-234 = "(Não pode ser...!)"
84305300100-237 = "Muito bem! Como você deseja!! Eu vou apertar!"
84305300100-241 = "Apertando."
84305300100-242 = "……Ué?"
84305300100-246 = "Ué? ...Aqui é a Mirai! Aqui é a Mirai! Estão me ouvindo!?"
84305300100-248 = "Por que o sinal está tão..."
84305300100-253 = "……Ataque...!"
84305300100-259 = "……Ataque inimigo!! Ataque inimigo em todas as áreas!!"
84305300100-260 = "Sim...?"
84305300100-261 = "Não, isso é impossível... não, não pode ser!"
84305300100-265 = "……A C&C está!!"
84305300100-266 = "O que está acontecendo...?"
84305300100-267 = "I-isso não deveria ser possível... Neru Mikamo está aqui...!"
84305300100-269 = "A C&C, exceto pela Neru...!"
84305300100-270 = "É tudo uma armadilha!!"
84305300100-273 = "……Armadilha."
84305300100-274 = "O que significa isso..."
84305300100-278 = "……Isso é."
84305300100-279 = "……Neru!"
84305300100-280 = "Você estava desde o começo...?"
84305300100-285 = "Ah, não, bem."
84305300100-286 = "É exatamente isso."
84305300100-287 = "……De vez em quando, eu converso sobre umas bobagens com o Sensei."
84305300100-288 = "Diferente de certas pessoas que guardam tudo para si, eu nunca achei que conseguiria resolver tudo sozinha desde o início..."
84305300100-289 = "Acho que não custa nada dar uma palavrinha com o Sensei."
84305300100-294 = "Com o Sensei...?"
84305300100-295 = "Então, a operação de agora também...?"
84305300100-296 = "Tudo sob o comando do Sensei, é isso?"
84305300100-297 = "Neru..."
84305300100-298 = "Desde quando você..."
84305300100-300 = "Desde o momento em que você trouxe o assunto... desde quando estávamos preparando a EXPO."
84305300100-301 = "Desde duas semanas atrás...!?"
84305300100-302 = "Ah, eu não contei para mais ninguém. O Sensei cuida bem dessa parte."
84305300100-306 = "Entendo..."
84305300100-307 = "Então é por isso que o Sensei..."
84305300100-308 = "Desde aquela época, ele já previa tudo isso..."
84305300100-310 = "Do que diabos vocês estão falando!?"
84305300100-311 = "Isso não é da sua conta."
84305300100-316 = "Em vez disso... preocupe-se com a sua própria pele."
