[translation]
10018105-1 = "Epílogo; Feliz Ano Novo!"
10018105-3 = "（E assim, a série de confusões que mergulhou o final e o início do ano no caos chegou ao fim）"
10018105-8 = "Ah, Sensei! Venha logo! Parece que as barracas do festival já estão prontas!"
10018105-11 = "A comida do festival é boa, mas ainda temos o osechi que preparamos. #nMesmo que sobre, ele dura bastante, então você pode continuar comendo nos próximos dias."
10018105-12 = "Afinal, o osechi foi feito justamente para ter comida que durasse bastante antes da virada do ano."
10018105-13 = "Uau, incrível! O Ano Novo é tão divertido!"
10018105-14 = "Não acho que um osechi tão delicioso vá sobrar, mas★"
10018105-15 = "……No caso da Akari, ela realmente parece capaz de comer tudo."
10018105-16 = "Vou me segurar até que todos tenham comido★"
10018105-20 = "Espero que este ano possamos viver em paz……."
10018105-21 = "E que eu consiga aprender a fazer pratos deliciosos……."
10018105-22 = "Sensei! Por favor, experimente isto!"
10018105-23 = "Bem, é um pouco vergonhoso, mas…… eu me esforcei muito, então queria que você comesse……."
10018105-24 = "Fufu. A melhor comida, no melhor lugar. Conseguimos ter um ótimo desfecho."
10018105-25 = "Sinto que pude vislumbrar uma parte do que é a gastronomia suprema."
10018105-26 = "Hoje se tornou um dia importante tanto para mim quanto para o Clube de Pesquisa Gastronômica."
10018105-28 = "[ns] \"Falando nisso, onde está o presidente Nyaomoto?\""
10018105-29 = "Ele foi embora gritando: \"Não pensem que ganharam com isso!\"."
10018105-30 = "Será que ele está bem? Fico um pouco preocupada, mas……."
10018105-31 = "Não há com o que se preocupar. Nunca vi um caso de alguém que deixou esse tipo de frase para trás e fosse uma pessoa normal."
10018105-32 = "Se for preciso, resolveremos tudo de novo★"
10018105-33 = "E o que faremos com o pessoal do Grupo Capacete Gourmet?"
10018105-38 = "Está preocupada, Fuuka-san?"
10018105-39 = "Sensei……."
10018105-40 = "[ns] \"Sobre eles, eu vou dar um jeito.\""
10018105-44 = "[ns] \"Mas só depois que eles refletirem bem sobre o que fizeram.\""
10018105-49 = "Se não tiverem para onde ir, que tal contratá-los como funcionários de meio período no Suzume-tei?"
10018105-50 = "Sério, pode fazer isso?"
10018105-51 = "Não achei que eles fossem pessoas de má índole."
10018105-52 = "Além disso, eu conversei com o Sensei."
10018105-53 = "[ns] \"Porque os erros dos alunos são algo que os adultos devem resolver.\""
10018105-55 = "Ai, ai…… vocês são bons demais, de verdade."
10018105-56 = "Sensei, obrigado por este ano."
10018105-57 = "Eu também sou sempre grata."
10018105-58 = "Se o Sensei não estivesse aqui, com certeza não teríamos conseguido terminar tudo."
10018105-60 = "Sensei, feliz Ano Novo!"
10018105-62 = "Feliz Ano Novo."
10018105-63 = "Feliz Ano Novo, Sensei!"
10018105-64 = "Feliz Ano Novo! Vamos continuar comendo o osechi~!"
10018105-65 = "Então o ano já virou?"
10018105-66 = "Feliz Ano Novo★"
10018105-69 = "（Um novo ano chegou em Kivotos）"
10018105-72 = "[ns] （Desejando que este ano seja um tempo de felicidade para muitas pessoas）"
10018105-74 = "[ns] （Para aqueles que seguem o caminho que escolheram）"
10018105-76 = "[ns] （E também para aqueles que agora seguem caminhos diferentes）"
10018105-83 = "Uwaaa!? O peixe assado começou a se debater!"
10018105-84 = "Uuu, desculpe! É tudo culpa minha de novo……!"
10018105-85 = "O que você fez para um peixe assado reviver e começar a se debater!?"
10018105-90 = "Fufu."
10018105-96 = "Como Clube de Pesquisa Gastronômica, não podemos deixar isso passar."
10018105-101 = "Haruna? Não me diga que é aquilo que estou pensando, né? Ei, não é, né...?"
10018105-102 = "Haruna, estou pronta★"
10018105-103 = "Eu disse para parar, ei! O que você está tentando fazer— o Sensei também está aqui! Hoje é um dia de celebração!"
10018105-105 = "Ei!★"
10018105-117 = "Harunaaaaaa!?"
10018105-119 = "[ns] (...Que este ano também seja um ano feliz para todos)"
10018105-121 = "Um pouco antes do Kuuzumi ~A Grande Disputa~"
