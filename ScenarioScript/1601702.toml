[translation]
1601702-1 = "I hate people "
1601702-2 = "（備品を買いに文房具店に立ち寄ったところ――）"
1601702-10 = "ちょっと失礼。"
1601702-16 = "ひゃっ……！"
1601702-24 = "うぅ……"
1601702-25 = "こ、これだから人混みは……うぅぅ、みんな消えてしまえばいいのに……。"
1601702-26 = "[s] \"こんにちは、アオバ。\""
1601702-30 = "……あっ！"
1601702-34 = "はひいっ！せ、先生……！"
1601702-35 = "こ、こんにちは……。"
1601702-36 = "ほ、本当に先生だ……。"
1601702-37 = "[s] \"アオバは何か買いに来たの？\""
1601702-38 = "あっ……えっと……。"
1601702-39 = "コピー用紙ですね……備品リストを作るので……。"
1601702-40 = "[s] \"一緒に買っちゃおうか？\""
1601702-44 = "あっ！いえっ、こ、これは……自腹で……。"
1601702-45 = "[s] \"えっ、業務に必要なものなのに……？\""
1601702-46 = "そうなんですけど……。"
1601702-47 = "なかなか経費の申請が通らなくて……へへっ……。"
1601702-48 = "い、いいんです……別に今日が初めてじゃない……ですから……。"
1601702-49 = "[s] \"だ、大丈夫なの……？\""
1601702-50 = "ハ、ハイランダーではそれが普通なんです……。"
1601702-51 = "はぁ……考えるだけで腹が立ってきますけど……。"
1601702-52 = "変な規則ばっか生えてきて……。"
1601702-55 = "た、例えば、節約のために報告書は裏紙で書くんですが――"
1601702-56 = "裏紙がないときは、わざわざ何かを印刷して裏紙を作らなきゃいけなかったり……。"
1601702-59 = "ほ、本末転倒、じゃないですか？へへっ……。"
1601702-60 = "決裁には幹部の捺印が必要なのに……幹部がハンコを失くして、何週間も放置されたこともありますけど……。"
1601702-61 = "お、お昼のお弁当も、幹部が選んだメニューを全員食べるんですよ……？"
1601702-62 = "「これやっといて！」と納期前日に言われるのも、日常茶飯事ですし……。"
1601702-63 = "[s] \"そ、そんなことが……。\""
1601702-64 = "は、はい。#nまぁ……いつものことですけど……。"
1601702-65 = "い、今もどこかで、私みたいな人が苦しんでいるはずです……へへっ……。"
1601702-66 = "だ、だから、もう何にも期待しなくなりました……。"
1601702-67 = "裏切られるだけですし……へへ……。"
1601702-68 = "きっと、ずっとこうなんでしょうね……人生って本当に最悪。"
1601702-69 = "[s] \"今日は私が出すよ。\""
1601702-73 = "え、えええっ！？"
1601702-74 = "な、なんでも買ってくれるだなんて……。"
1601702-75 = "い、いえ！そ、それは流石に……。"
1601702-76 = "[s1] \"こういうときのために私がいるんだよ。\"\n[s2] \"遠慮せず、必要なものを選んで。\""
1601702-79 = "う、うう……そんな……。"
1601702-80 = "……えっと、コピー用紙と…… あ、あとはみんな持って行っちゃうボールペン……あっ、テープもないんだった……。"
1601702-87 = "そ、それじゃ……お言葉に甘えさせてもらいますけど……。"
1601702-88 = "ほ、本当にいいんです……よね？ "
1601702-92 = "お、おかげさまで、必要なものが揃いました……！"
1601702-93 = "ありがとうございます……ほ、本当に嬉しいです……。"
1601702-94 = "[s3] \"少しでも、アオバが明日に期待できるようになればいいなって。\"\n[s4] \"困ったときは、いつでも私を頼ってね。\""
1601702-97 = "期待……ですか。"
1601702-98 = "そ、そうですね……。"
1601702-99 = "し、失望するのは嫌ですけど……でも……。"
1601702-104 = "きょ、今日は本当にありがとうございました、先生。"
1601702-105 = "このご恩は、忘れません……。"
1601702-107 = "（アオバは何度も何度もお辞儀をしながら帰っていった）"
