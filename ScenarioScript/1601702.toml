[translation]
1601702-1 = "I hate people "
1601702-2 = "（Parei em uma papelaria para comprar suprimentos――）"
1601702-10 = "Com licença."
1601702-16 = "Hya...!"
1601702-24 = "Uuu..."
1601702-25 = "É, é por isso que eu odeio multidões... Uuu, seria tão bom se todo mundo simplesmente desaparecesse..."
1601702-26 = "[s] \"Olá, Aoba.\""
1601702-30 = "...Ah!"
1601702-34 = "Hii! Se-Sensei...!"
1601702-35 = "O-Olá..."
1601702-36 = "É, é realmente o Sensei..."
1601702-37 = "[s] \"Veio comprar alguma coisa, Aoba?\""
1601702-38 = "Ah... bem..."
1601702-39 = "Papel para cópia... preciso fazer a lista de suprimentos..."
1601702-40 = "[s] \"Quer que eu compre com você?\""
1601702-44 = "Ah! Não, isso... eu vou pagar do meu próprio bolso..."
1601702-45 = "[s] \"Ué, mas não são itens necessários para o trabalho...?\""
1601702-46 = "Sim, mas..."
1601702-47 = "É difícil conseguir a aprovação das despesas... hehe..."
1601702-48 = "T-tá tudo bem... não é a primeira vez que isso acontece... de qualquer forma..."
1601702-49 = "[s] \"V-você tem certeza...?\""
1601702-50 = "N-na Highlander, isso é normal..."
1601702-51 = "Ah... só de pensar nisso já fico irritada..."
1601702-52 = "Sempre inventam regras estranhas..."
1601702-55 = "P-por exemplo, para economizar, temos que escrever relatórios no verso de papéis usados, mas—"
1601702-56 = "Quando não temos papel usado, temos que imprimir algo de propósito só para ter o verso para usar..."
1601702-59 = "I-isso não é contraditório? Hehe..."
1601702-60 = "A aprovação precisa do carimbo dos executivos, mas... às vezes eles perdem o carimbo e deixam tudo parado por semanas..."
1601702-61 = "E o almoço também, todos temos que comer o menu que o executivo escolheu...?"
1601702-62 = "Pedirem para fazer algo um dia antes do prazo também é rotina..."
1601702-63 = "[s] \"C-como pode...\""
1601702-64 = "S-sim. Bem... é sempre assim..."
1601702-65 = "A-agora mesmo, deve ter alguém como eu sofrendo em algum lugar... hehe..."
1601702-66 = "P-por isso, parei de esperar qualquer coisa..."
1601702-67 = "A gente só acaba se decepcionando... hehe..."
1601702-68 = "Com certeza vai ser sempre assim... a vida é realmente um lixo."
1601702-69 = "[s] \"Hoje eu pago para você.\""
1601702-73 = "E-eeeh!?"
1601702-74 = "V-você vai comprar tudo para mim...?"
1601702-75 = "N-não! Isso, isso já é demais..."
1601702-76 = "[s1] \"É para momentos como este que eu estou aqui.\"\n[s2] \"Não se acanhe, escolha o que precisar.\""
1601702-79 = "U-uuu... não pode ser..."
1601702-80 = "...Bem, papel de cópia e... ah, e as canetas que todo mundo sempre leva... ah, também preciso de fita adesiva..."
1601702-87 = "E-então... vou aceitar sua gentileza..."
1601702-88 = "É, é realmente tudo bem, né?"
1601702-92 = "G-graças a você, consegui tudo o que precisava...!"
1601702-93 = "Muito obrigada... e-estou muito feliz..."
1601702-94 = "[s3] \"Espero que, com isso, você possa ter um pouco mais de esperança no amanhã.\"\n[s4] \"Quando estiver em apuros, pode contar comigo sempre.\""
1601702-97 = "Esperança... é?"
1601702-98 = "É, talvez..."
1601702-99 = "E-eu não quero decepcionar, mas... mas..."
1601702-104 = "M-muito obrigada por hoje, Sensei."
1601702-105 = "Eu nunca vou esquecer esse favor..."
1601702-107 = "(Aoba foi embora enquanto fazia reverências repetidas vezes)"
