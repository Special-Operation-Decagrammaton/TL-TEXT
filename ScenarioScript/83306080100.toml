[translation]
83306080100-6 = "フウカ先輩が給食を準備している間……"
83306080100-7 = "私にも何かできないかと思い、炊き出しを用意したんです！"
83306080100-8 = "こんな所まで来るなんて大変ね。"
83306080100-9 = "議事堂が崩れて落ち込んでいる万魔殿の皆さんが、少しでも元気になってくれればいいなと……"
83306080100-10 = "悲しいことがあっても、ご飯は必ず食べなければいけません！それに美味しいご飯を食べれば、気が紛れるはずです！"
83306080100-11 = "（マコトはそんな落ち込んでいるように見えなかったけど……）"
83306080100-12 = "それで、ドラム缶にアルミホイルで包んだ食材を入れて……"
83306080100-18 = "……あれ？"
83306080100-20 = "ん？どうしたの、ジュリ。"
83306080100-31 = "その、先ほどドラム缶にデザートを入れたんですが……"
83306080100-35 = "き、急に動き出したみたいです……！ど、どうして！？"
83306080100-37 = "（万魔殿の議事堂前は、たしか温泉開発部が……）"
83306080100-38 = "（ということは、まさか地下水の影響で……？）"
83306080100-44 = "う、うわあああん！？皆さん！き、気をつけてください！"
