[translation]
83306080100-6 = "Enquanto a Fuuka-senpai prepara a merenda..."
83306080100-7 = "Pensei que poderia fazer algo também, então preparei uma refeição comunitária!"
83306080100-8 = "É um esforço e tanto vir até aqui."
83306080100-9 = "Espero que o pessoal do Pandemonium, que está deprimido por causa do colapso do prédio do conselho, possa se animar um pouco..."
83306080100-10 = "Mesmo quando coisas tristes acontecem, precisamos comer! Além disso, comer uma comida deliciosa deve ajudar a distrair a mente!"
83306080100-11 = "(A Makoto não parecia tão deprimida assim, mas...)"
83306080100-12 = "Então, coloquei os ingredientes embrulhados em papel alumínio dentro do barril..."
83306080100-18 = "……Ué?"
83306080100-20 = "Hm? O que foi, Juri?"
83306080100-31 = "Bem, eu coloquei a sobremesa no barril agora pouco, mas..."
83306080100-35 = "E-ela começou a se mover de repente...! P-por que!?"
83306080100-37 = "(Se bem me lembro, o Departamento de Desenvolvimento de Fontes Termais estava na frente do prédio do conselho do Pandemonium...)"
83306080100-38 = "(Isso significa que, será que é por causa da água subterrânea...?)"
83306080100-44 = "A-aaaaah!? Pessoal! C-cuidado!"
