[translation]
1008605-1 = "ヒナとピアノ"
1008605-3 = "（ヒナに呼ばれてやって来たパーティー会場は、どこか静けさで満ちていた）"
1008605-4 = "[ns] \"あれ、ここで合ってるはずなんだけど……\""
1008605-5 = "あ、先生。時間通り来てくれたのね。"
1008605-6 = "[s] \"あ、ヒナ――\""
1008605-12 = "[ns1] \"ピアノ……？\"\n[ns2] \"もしかして、ここに私を呼んだのは……\""
1008605-13 = "[wa:800]― [log=히나 드레스]これから……[/log]"
1008605-14 = "[wa:800]― [log=히나 드레스]これから……[/log]"
1008605-15 = "[wa:1500]― [log=히나 드레스]先生のために[wa:1200]演奏するね。[/log]"
1008605-18 = "[ns] \"演奏なら、ゲヘナのパーティーでも聞かせてくれなかった？\""
1008605-19 = "[wa:400]― [log=히나 드레스]あ、[wa:600]いや、[wa:1500]あの時は……[/log]"
1008605-20 = "[wa:1650]― [log=히나 드레스]ふ、[wa:800]2人きりじゃ、[wa:1200]なかったから……[/log]"
1008605-23 = "[wa:200]― [log=히나 드레스]その……[wa:2000]ピアノを[wa:1000]ずっと練習してたのは……[/log]"
1008605-24 = "[wa:2600]― [log=히나 드레스]先生に聞かせるためで……[/log]"
1008605-27 = "[wa:100]― [log=히나 드레스]このまま、[wa:1400]披露できなかったら……[/log]"
1008605-28 = "[wa:2700]― [log=히나 드레스]絶対、[wa:800]後悔しそうだったから。[/log]"
1008605-31 = "[ns] \"分かった。それじゃあ、聞かせてもらえるかな。\""
1008605-32 = "[wa:500]― [log=히나 드레스]う、[wa:300]うん？[/log]"
1008605-33 = "[wa:1300]― [log=히나 드레스]いや、[wa:500]そ、[wa:400]そんなにすごいことじゃない、[wa:1400]よ……[/log]"
1008605-36 = "― [log=히나 드레스]そういう風に[wa:1000]期待されると……[/log]"
1008605-37 = "[wa:1900]― [log=히나 드레스]ちょっと[wa:700]困るかも。[/log]"
1008605-40 = "[ns] \"私のために演奏してくれるのが嬉しいんだ。\""
1008605-41 = "[wa:400]― [log=히나 드레스]あ……[wa:1900]う、[wa:1500]うーん……[/log]"
1008605-42 = "[wa:1800]― [log=히나 드레스]そう……[wa:1900]あなたは、[wa:1500]いつもそうだった。[/log]"
1008605-45 = "[wa:300]― [log=히나 드레스]うん……[/log]"
1008605-46 = "[wa:1900]― [log=히나 드레스]じゃあ、[wa:1100]ちゃんと聞いててね。[/log]"
1008605-49 = "― [log=히나 드레스]……あなたに送る、[wa:2300]私の演奏を。[/log]"
1008605-56 = "（ヒナの演奏に耳を傾けながら、広い会場で二人だけの時間を過ごした）"
