[translation]
10034070-1 = "Episódio 7; Uma história de juventude"
10034070-3 = "……Bom trabalho, Sensei."
10034070-4 = "Estas são as pessoas que atacaram o comitê administrativo."
10034070-5 = "O motivo ainda é desconhecido, ou melhor, elas insistem que não vão falar nada até que o Sensei chegue……."
10034070-6 = "Como o objetivo ainda não foi esclarecido, o tratamento futuro delas está em espera."
10034070-7 = "Quando cheguei ao local, a segurança já havia sido rompida."
10034070-8 = "Por pouco não escaparam, mas consegui capturá-las."
10034070-9 = "A Ichika-senpai ficará responsável pelo resto."
10034070-10 = "Bem, com licença."
10034070-16 = "Quem diria que nos reencontraríamos na delegacia……."
10034070-17 = "……Isso é muito rock!"
10034070-18 = "Eu achei que conseguiríamos fazer um pouco mais, mas aquela Cath Palug era realmente difícil……."
10034070-19 = "Eu já disse várias vezes para parar de me chamar assim!?#nAlém disso, acho que nos esforçamos bastante!?"
10034070-20 = "Ufa…… mas, mesmo assim, né?"
10034070-21 = "[ns1] \"Que situação é essa……?\"\n[ns2] \"O que vocês fizeram, afinal……?\""
10034070-24 = "……E o guarda?"
10034070-25 = "Já foi embora?#nNão tem ninguém aqui, né?"
10034070-26 = "[s3] \"Ele saiu agorinha…….\"\n[s4] \"Tem algum motivo para não podermos ser ouvidas?\""
10034070-31 = "……Sensei, e a Airi?"
10034070-32 = "Você foi vê-la, não foi? Onde ela está agora?"
10034070-33 = "……Vocês mudam de assunto rápido, hein."
10034070-34 = "[s5] \"……Airi, venha aqui.\"\n[s6] \"Se é a Airi, ela está ali.\""
10034070-41 = "……Sim."
10034070-42 = "Pessoal……."
10034070-43 = "……Airi, venha aqui."
10034070-44 = "……?"
10034070-45 = "……Mais perto."
10034070-46 = "……？？"
10034070-47 = "……Mais perto ainda."
10034070-48 = "……？？？"
10034070-49 = "……Pronto."
10034070-50 = "……Aqui, pegue."
10034070-56 = "……?"
10034070-57 = "Isto é……?"
10034070-58 = "[ns7] \"……Semla?\"\n[ns8] \"Nós nos infiltramos por causa disso…….\""
10034070-62 = "Isso mesmo, nosso objetivo era o Semla."
10034070-63 = "……Embora, para alguém que queria parecer tão legal, o resultado tenha sido bem decepcionante."
10034070-64 = "Mas este pequeno pedaço é um#nSemla de verdade."
10034070-65 = "Ai, Airi!#nSe você queria tanto comer, era só ter dito desde o começo!"
10034070-66 = "……Decepcionante, é?#nSe vocês duas tivessem sido um pouco mais úteis na luta, isso não teria acontecido……."
10034070-67 = "……Airi, conte para a gente o que achou.#nNós também ainda não comemos."
10034070-68 = "……E desculpe, mas acho que não poderemos usar a sala do clube a partir de amanhã."
10034070-69 = "Bem, podemos discutir os detalhes no grupo de chat depois, né?"
10034070-71 = "O, o que você quer dizer com isso……?"
10034070-72 = "……Sinto muito mesmo, Airi.#nPor termos feito isso sem te avisar……."
10034070-73 = "Pessoal…… não me digam que vocês…… por causa disso……."
10034070-74 = "……Vocês foram presas por causa disso?"
10034070-75 = "……?"
10034070-76 = "Po, por que……?"
10034070-77 = "……Ué?#nA reação não foi a que eu esperava!?"
10034070-78 = "Por que, algo assim..."
10034070-79 = "Não me diga que foi por minha causa...?"
10034070-80 = "M-mas, você não queria muito comer um semla?"
10034070-87 = "Foi por isso que de repente você disse que queria montar uma banda..."
10034070-88 = "Isso é..."
10034070-89 = "...Não me diga que, no fim das contas, tudo não passou de um mal-entendido!?"
10034070-90 = "...Hehe, isso também é rock, não é?"
10034070-91 = "Não é hora de rir!"
10034070-93 = "Por que..."
10034070-94 = "Por que você foi tão longe... por alguém como eu..."
10034070-96 = "...?"
10034070-97 = "...???"
10034070-98 = "...Eh? Ah, Airi? Por que você está chorando...?"
10034070-99 = "Airi! O que aconteceu!?"
10034070-100 = "Sensei!! Faça alguma coisa, por favor!?"
10034070-106 = "[ns9] \"...Airi.\"\n[ns10] \"Conte para eles também.\""
10034070-109 = "Eh...?"
10034070-110 = "O que eu acabei de contar para o Sensei...?"
10034070-111 = "I-isso é..."
10034070-112 = "Isso é impossível...!"
10034070-113 = "...?"
10034070-114 = "O que foi, é um segredo só entre vocês dois?"
10034070-115 = "Uma conversa secreta na calada da noite... isso não é nada rock."
10034070-116 = "...Não, não, o Sensei acabou de dizer para você \"contar para eles\", então você não pretende esconder, certo?"
10034070-117 = "Esquece isso! Airi, explica logo!!"
10034070-118 = "Existe a opção de não contar aqui? Não, não existe!"
10034070-119 = "Se-Sensei...!"
10034070-123 = "[ns11] \"Eu vou explicar a situação para o Comitê de Justiça.\"\n[ns12] \"O que será que eu vou inventar de desculpa dessa vez...\""
10034070-126 = "Sensei...!?"
10034070-127 = "[ns13] \"Está tudo bem, a Airi consegue fazer isso.\"\n[ns14] Fingindo não ouvir, ele sai."
10034070-131 = "Sensei!?!?"
10034070-135 = "Eu entendi a situação mais ou menos. Vou passar uma explicação convincente para o pessoal lá de cima, então pode ficar tranquila."
10034070-136 = "...Bem, acho que vai dar tudo certo."
10034070-137 = "Isso é só um incidente comum, sabe."
10034070-138 = "[s15] \"Muito obrigada mesmo, Ichika.\"\n[s16] \"Vou te retribuir em breve.\""
10034070-141 = "Não, não, não precisa agradecer."
10034070-142 = "Afinal, você prometeu que me chamaria se precisasse de algo, não foi?"
10034070-143 = "Além disso, por uma amiga, não tem problema nenhum."
10034070-144 = "O pessoal do Tea Party também não vai querer transformar isso em um grande problema, eles vão deixar passar."
10034070-145 = "Então, não precisa se preocupar tanto."
10034070-150 = "...Opa."
10034070-151 = "Fui chamada para o trabalho, então vou indo na frente!"
10034070-152 = "Até mais, bom trabalho, Sensei!"
10034070-153 = "[s17] \"Obrigado, tome cuidado.\"\n[s18] Acena em despedida."
10034070-161 = "Foi realmente maravilhoso."
10034070-162 = "A história que, para mim, não passava de imaginação..."
10034070-164 = "...Quem diria que se concretizaria assim."
10034070-165 = "[s19] \"Você veio mesmo, Tsumugi.\"\n[s20] \"Desculpe te chamar de repente.\""
10034070-170 = "Não, eu te passei meu contato justamente para isso."
10034070-171 = "Na verdade, peço desculpas pela demora em verificar."
10034070-172 = "Mas..."
10034070-173 = "Talvez não houvesse um papel para mim aqui, afinal."
10034070-174 = "...Uma heroína que se debate e sofre por sua própria imaturidade."
10034070-175 = "Seguindo o caminho da música, mas com o equilíbrio emocional abalado pela ansiedade."
10034070-176 = "Ansiedade, inferioridade, conflito..."
10034070-177 = "E o que se segue é um encontro dramático com seus companheiros."
10034070-178 = "Após superar todos os problemas, um final maravilhoso sempre aguarda."
10034070-179 = "Sim. É exatamente essa a história que eu imaginei."
10034070-180 = "Ah, não é simplesmente belo?"
10034070-185 = "...Isso é a 'juventude'."
10034070-186 = "...Pode-se dizer que é uma história de juventude."
10034070-187 = "Diga-me, você deveria estar aqui?"
10034070-188 = "Mesmo tendo chegado à cena que poderíamos chamar de um final emocionante."
10034070-189 = "Não seria melhor aparecer lá e deixá-los felizes?"
10034070-190 = "[s21] \"Eu sou o Sensei, afinal.\"\n[s22] \"O papel de um adulto é observar silenciosamente.\""
10034070-193 = "...Entendo."
10034070-194 = "Isso é ser um adulto... Aprendi algo novo hoje."
10034070-198 = "Mas Sensei, você não está esquecendo de um tema importante?"
10034070-199 = "Como você interpreta a ansiedade, a inferioridade e o conflito da heroína?"
10034070-200 = "Não seria apenas um caso de desviar o olhar das inconveniências e #nadiar os problemas até que o momento chegue?"
10034070-201 = "O que você pensa sobre isso, Sensei?"
10034070-202 = "...Hum."
10034070-203 = "Sentimentos naturais que todos possuem, é..."
10034070-204 = "...Foi uma resposta inesperada. #nNão enfrentar o problema, nem desviar o olhar, mas sim aceitá-lo."
10034070-205 = "[s23] \"Mesmo que ela sofra ao se comparar com os outros...\"\n[s24] \"Se essas pessoas forem importantes para ela...\""
10034070-210 = "[ns25] \"Ela mesma também faz parte desse vínculo importante.\"\n[ns26] \"E foi ela mesma quem construiu esse relacionamento.\""
10034070-215 = "...Hum."
10034070-216 = "Em suma, a existência daqueles ao redor..."
10034070-217 = "Você quer dizer que eles também são um espelho que reflete a própria imagem dela."
10034070-218 = "...Isso toca profundamente."
10034070-219 = "Gostei dessa interpretação."
10034070-220 = "Considere isso como um agradecimento por me deixar apreciar a história."
10034070-221 = "Tome isto..."
10034070-225 = "[ns27] \"...O que é isso?\"\n[ns28] \"A Tsumugi compôs isso?\""
10034070-228 = "Eu preparei isso prevendo um desfecho como este. #nEmbora eu não esperasse que fosse realmente entregá-lo."
10034070-229 = "Pode ser mais difícil do que a música que escolhemos antes, mas..."
10034070-230 = "...Hmph. #nCom elas como estão agora, não haverá problema algum."
10034070-231 = "A letra deve ser escrita pela própria heroína, agora que ela renasceu."
10034070-232 = "...Já está tão tarde?"
10034070-233 = "...Bem, então, vou me retirar. #nEspero que um dia você venha assistir às nossas apresentações."
10034070-234 = "Embora..."
10034070-235 = "Minha presença possa acabar ficando escondida. #nAfinal, todos ao meu redor são membros muito peculiares."
10034070-236 = "Hmph. Para mim, na verdade, isso não importa."
10034070-241 = "...Pois a música é algo para se aproveitar juntos."
10034070-244 = "O que você está dizendo de estranho desde agora!"
10034070-245 = "Por isso, aquilo é..."
10034070-246 = "...Ah, Sensei!"
10034070-247 = "A Airi está dizendo coisas estranhas, como se ela fosse inútil!"
10034070-248 = "Mas é que eu não tenho nenhum talento..."
10034070-249 = "Em outras palavras... falta rock, é isso?"
10034070-250 = "Talvez tenha chegado a hora de devolver a coroa ao seu verdadeiro dono."
10034070-251 = "Finalmente, o dono do trono vazio...!"
10034070-255 = "Não, isso não explicaria nada para o Sensei que acabou de chegar..."
10034070-256 = "Estávamos conversando sobre pedir para a Airi ser a presidente."
10034070-257 = "Originalmente, a própria pessoa que fundou o Clube de Doces do Pós-Escola disse que queria estar no mesmo nível que todo mundo, então ficou assim."
10034070-258 = "[s29] \"...Entendi.\"\n[s30] \"Então era a Airi.\""
10034070-261 = "N-não é nada disso...!"
10034070-262 = "Eu não sou esse tipo de pessoa para ser presidente...!"
10034070-263 = "Nada disso! Você precisa levar isso a sério desta vez e refletir sobre si mesma!"
10034070-268 = "Além disso, o motivo de eu estar aqui é..."
10034070-269 = "...?"
10034070-270 = "...Chegou a hora de revelar a verdade."
10034070-271 = "...É, é porque os doces são deliciosos, sabe...?"
10034070-276 = "Pessoal, não tenham vergonha, falem logo de uma vez!"
10034070-277 = "Nós estamos juntas porque a Airi é a Airi!"
10034070-278 = "Entendido!?"
10034070-279 = "...Bem, é mais ou menos isso."
10034070-281 = "Y-Yoshimi-chan..."
10034070-282 = "Mas eu, sobre todas vocês..."
10034070-284 = "Isso não importa!#nÉ algo comum, não é?"
10034070-285 = "Olha só para elas!"
10034070-286 = "Bem, eu fico irritada todo santo dia, afinal."
10034070-287 = "N-nossa..."
10034070-288 = "Não vem com esse \"nossa\" agora, tarde demais..."
10034070-289 = "Kazusa, escute bem..."
10034070-294 = "...Guardar raiva faz mal para a saúde."
10034070-296 = "Mas você é a causa de 70% disso, sabia!?"
10034070-302 = "Droga, eu não vou me curvar à violência!!"
10034070-310 = "Usar um escudo é trapaça!"
10034070-311 = "Os seres humanos são criaturas que estão em constante crescimento."
10034070-312 = "Argh...!"
10034070-316 = "Ufa, mas enfim... desta vez eu concordo com a Yoshimi."
10034070-317 = "Como assim \"desta vez\"?"
10034070-318 = "...Eu entendo esse sentimento de não conseguir gostar de si mesma."
10034070-319 = "Porque eu também já passei por isso..."
10034070-320 = "Mesmo assim, eu presumi. #nPresumi por conta própria que a Airi estava bem..."
10034070-321 = "...Me desculpa de verdade, Airi."
10034070-323 = "...Kazusa-chan."
10034070-328 = "Nós somos seres diferentes, e é justamente por isso que há coisas que não conseguimos ver. #nPor outro lado, também podemos encontrar dentro de nós mesmos coisas que gostaríamos de ignorar."
10034070-329 = "Nessas horas, primeiro observe o ambiente. #nObserve o ambiente, incluindo a si mesma."
10034070-330 = "...Airi."
10034070-337 = "Ou então..."
10034070-365 = "\"...Airi, você ainda não gosta de quem você é agora?\""
10034070-376 = "[log=아이리 밴드]\"Não... eu gosto.\"[/log]"
