[translation]
10034070-1 = "第7話;ひとつの青春物語"
10034070-3 = "……お疲れ様です、先生。"
10034070-4 = "こちらが、運営委員会を襲った犯人の方々です。"
10034070-5 = "理由は未だ不明、と言いますか、先生が来るまで何も話さないとの一点張りで……。"
10034070-6 = "まだ目的も分からないため、今後の扱いは保留となっています。"
10034070-7 = "私が現場に駆けつけた頃には、すでに警備が突破されておりました。"
10034070-8 = "危うく逃すところでしたが、何とか確保できた次第です。"
10034070-9 = "あとはイチカ先輩が引き継ぐことになっていますので。"
10034070-10 = "では、私はこれで失礼します。"
10034070-16 = "留置所で再会するなんて……。"
10034070-17 = "……まさにロック！"
10034070-18 = "もうちょっとやれると思ったんだけど、あのキャスパリーグでも流石に厳しかったかぁ……。"
10034070-19 = "その呼び方やめてって何回も言ってるよね！？#nそれに結構頑張ったと思うんだけど！？"
10034070-20 = "ふぅ……とはいえさすがに、ね？"
10034070-21 = "[ns1] \"これはどういう状況……？\"\n[ns2] \"みんな、いったい何をしたの……？\""
10034070-24 = "……見張りの人は？"
10034070-25 = "もうどっか行った？#nいないわよね？"
10034070-26 = "[s3] \"さっき出ていったけど……。\"\n[s4] \"何か聞かれたらマズイ事情が？\""
10034070-31 = "……先生、アイリは？"
10034070-32 = "会いに行ったんでしょ、今どこにいるのよ？"
10034070-33 = "……切り替え早いね、あんたたち。"
10034070-34 = "[s5] \"……アイリ、おいで。\"\n[s6] \"アイリなら、そこにいるよ。\""
10034070-41 = "……はい。"
10034070-42 = "みんな……。"
10034070-43 = "……アイリ、こっち来て。"
10034070-44 = "……？"
10034070-45 = "……もっと。"
10034070-46 = "……？？"
10034070-47 = "……もっと近くに。"
10034070-48 = "……？？？"
10034070-49 = "……よし。"
10034070-50 = "……はい、これ。"
10034070-56 = "……？"
10034070-57 = "これは……？"
10034070-58 = "[ns7] \"……セムラ？\"\n[ns8] \"そのために忍び込んだんだ……。\""
10034070-62 = "そう、我々の目的はセムラ。"
10034070-63 = "……なーんて格好つけるには、不甲斐ない結果になったけどね。"
10034070-64 = "それでもこの小さな一切れは、#n本物のセムラだよ。"
10034070-65 = "もう、アイリ！#nそんなに食べたかったなら、最初から言ってよ！"
10034070-66 = "……不甲斐ない結果、って。#n二人がもう少し戦力になってたら、こうはならなかったんだけど……。"
10034070-67 = "……アイリ、感想聞かせてね。#n私たちもまだ食べてないんだから。"
10034070-68 = "……あとごめんだけど、明日から部室は使えないと思う。"
10034070-69 = "まあ詳しいことは、あとでグループチャットで話し合えば良いでしょ？"
10034070-71 = "ど、どういうこと……？"
10034070-72 = "……本当にごめん、アイリ。#n勝手にこんなことしたせいで……。"
10034070-73 = "みんな……まさか、これのために……。"
10034070-74 = "……これのために、捕まったの？"
10034070-75 = "……？"
10034070-76 = "な、なんで……？"
10034070-77 = "……あ、あれ？#nなんか思ってた反応と違う！？"
10034070-78 = "どうして、こんなこと……。"
10034070-79 = "まさか、私のために……？"
10034070-80 = "だ、だって、どうしてもセムラを食べたかったんじゃないの？"
10034070-87 = "だから急に、バンドをやろうなんて言い出して……。"
10034070-88 = "これって……。"
10034070-89 = "……もしかしなくても、やっぱり誤解だったんじゃないの！？"
10034070-90 = "……にひ、これもまたロックだね。"
10034070-91 = "笑ってる場合じゃない！"
10034070-93 = "どうして……。"
10034070-94 = "どうして、私[ruby=・   ・   ・]なんか[/ruby]のために、ここまで……。"
10034070-96 = "……？"
10034070-97 = "……？？"
10034070-98 = "……え？#nあ、アイリ？なんで泣いてるの……？"
10034070-99 = "アイリ！#nどうしたの！？"
10034070-100 = "先生！！#nちょっとどうにかしてよ！？"
10034070-106 = "[ns9] \"……アイリ。\"\n[ns10] \"みんなにも話してあげて。\""
10034070-109 = "えっ……？"
10034070-110 = "さっき先生に話したことを……？"
10034070-111 = "そ、それは……。"
10034070-112 = "そんなの、無理です……！"
10034070-113 = "……？"
10034070-114 = "なに、二人だけの秘密ってわけ？"
10034070-115 = "深夜に密談とは……ロックじゃないね。"
10034070-116 = "……いやいや、さっき先生が「話してあげて」って言ってたし、#n隠すつもりじゃないでしょ。"
10034070-117 = "そんなこといいから！アイリ、早く説明して！！"
10034070-118 = "ここで話さない選択肢があるのかね？いや、ない！"
10034070-119 = "せ、先生……！"
10034070-123 = "[ns11] \"私は正義実現委員会に事情を説明してくるよ。\"\n[ns12] \"今回はなんて言い訳しようかな……。\""
10034070-126 = "先生……！？"
10034070-127 = "[ns13] \"大丈夫、アイリならできるよ。\"\n[ns14] 聞こえないふりをして出ていく。"
10034070-131 = "先生！？！？"
10034070-135 = "事情は大体理解したっす。#n上にはそれらしいことを伝えておくんで、安心してください。"
10034070-136 = "……まあ、多分何とかなるんじゃないっすかね。"
10034070-137 = "これくらい、よくあるハプニングっすよ。"
10034070-138 = "[s15] \"本当にありがとね、イチカ。\"\n[s16] \"近いうちにお礼するよ。\""
10034070-141 = "いえいえ、とんでもないっす。"
10034070-142 = "だって何かあったら呼んでくださいって、約束したじゃないっすか！"
10034070-143 = "それに、友達のためなら仕方ないっす。"
10034070-144 = "ティーパーティーの皆さんも大きな揉め事にはしたくないと思いますし、大目に見てくれるっすよ。"
10034070-145 = "なので、そんなに気にしなくても大丈夫っす。"
10034070-150 = "……おっと。"
10034070-151 = "仕事の呼び出しが来たんで、お先に失礼するっすね！"
10034070-152 = "それじゃ、お疲れ様でした先生！"
10034070-153 = "[s17] \"ありがとう、気をつけてね。\"\n[s18] 手を振って見送る。"
10034070-161 = "本当に、素晴らしかったです。"
10034070-162 = "私の想像でしかなかった物語が……。"
10034070-164 = "……まさか、こうして結実するとは。"
10034070-165 = "[s19] \"やっぱり来てくれたんだね、ツムギ。\"\n[s20] \"急に呼び出してごめんね。\""
10034070-170 = "いえ、このために連絡先を教えたのですよ。"
10034070-171 = "むしろ、確認が遅くなり申し訳なく思っています。"
10034070-172 = "ですが……。"
10034070-173 = "この場に、私の出番は無かったのかもしれませんね。"
10034070-174 = "……己の未熟さに、もがき苦しむヒロイン。"
10034070-175 = "音楽と向き合う道を進むも、不安に心の均衡を崩されてしまった、と。"
10034070-176 = "不安、劣等、葛藤……。"
10034070-177 = "そして迎えたのは、仲間との劇的な[ruby=かいこう]邂逅[/ruby]。"
10034070-178 = "全ての問題を乗り越えた先には、素晴らしいフィナーレが待っているものです。"
10034070-179 = "ええ。これこそ、私の思い描いた物語。"
10034070-180 = "ああ、実に美しいじゃありませんか。"
10034070-185 = "……これぞ「青春」。"
10034070-186 = "……青春の物語と、言えるでしょう。"
10034070-187 = "さて、あなたはこんなところにいて良いのですか？"
10034070-188 = "感動のフィナーレとも言うべきシーンまで来たというのに。"
10034070-189 = "あちらに顔を見せた方が、喜ばれるでしょう？"
10034070-190 = "[s21] \"私は先生だからね。\"\n[s22] \"そっと見守るのが大人の役目だからね。\""
10034070-193 = "……なるほど。"
10034070-194 = "これが大人、と……私もひとつの学びを得ました。"
10034070-198 = "けれども先生、大事なテーマを忘れてはいませんか？"
10034070-199 = "ヒロインの不安や劣等、葛藤については、どう解釈を？"
10034070-200 = "いつかその時まで不都合から目を背け、#n問題を先送りにしただけとは考えられませんか？"
10034070-201 = "先生はその辺りについて、どうお考えで？"
10034070-202 = "……ふむ。"
10034070-203 = "誰しもが持っている自然な感情、と……。"
10034070-204 = "……意外な答えでした。#n問題に立ち向かうわけでもなければ、目を背けるわけでもなく、受け入れる、と。"
10034070-205 = "[s23] \"もし、周りと自分を比較して苦しんだとしても……。\"\n[s24] \"その人たちが、自分にとって大切な存在なら……。\""
10034070-210 = "[ns25] \"その大切な結びつきには自分自身も含まれるんだよ。\"\n[ns26] \"その関係性を築いたのも、また自分だからね。\""
10034070-215 = "……ふむ。"
10034070-216 = "つまるところ、周囲の存在とは……。"
10034070-217 = "彼女自身の姿を映す鏡でもある、と言いたいのですね。"
10034070-218 = "……とても、身に沁みます。"
10034070-219 = "その解釈、気に入りました。"
10034070-220 = "物語を楽しませてもらったお礼だと思ってください。"
10034070-221 = "これを……。"
10034070-225 = "[ns27] \"……これは？\"\n[ns28] \"ツムギが作曲してくれたの？\""
10034070-228 = "このような結末も想定して用意していたのです。#nまさか、本当に渡すことになるとは思ってもみませんでしたがね。"
10034070-229 = "前に選定した曲と比べたら、難しいかもしれませんが……。"
10034070-230 = "……ふっ。#n今の彼女たちなら、何も問題ないでしょう。"
10034070-231 = "詞は、生まれ変わったヒロインが手ずから編むべきでしょう。"
10034070-232 = "……もうこんな時間でしたか。"
10034070-233 = "……では、そろそろ私は失礼しましょう。#nいつか、私たちの公演にもぜひお越しを。"
10034070-234 = "もしかすると……。"
10034070-235 = "私の存在など、埋もれているかもしれませんがね。#nなにせ私の周囲は皆、とても個性的なメンバーですから。"
10034070-236 = "ふっ。私としては、むしろそれで構わないと思っていますが。"
10034070-241 = "……音楽とは、共に楽しめさえすれば良いのですから。"
10034070-244 = "さっきから、なに変なこと言ってんの！"
10034070-245 = "だから、それは……。"
10034070-246 = "……あ、先生！"
10034070-247 = "アイリがね、さっきから自分は役立たずだとか変なこと言ってるのよ！"
10034070-248 = "だって、私には何も取り柄が……。"
10034070-249 = "つまり……ロックが足りない、と？"
10034070-250 = "いよいよ、冠を持ち主に返還するときが来たのかもしれない。"
10034070-251 = "ついに空白の座に主が……！"
10034070-255 = "いや、それじゃ来たばっかりの先生に何も伝わらないでしょ……。"
10034070-256 = "部長を、アイリにやってもらおうって話してたの。"
10034070-257 = "もともと放課後スイーツ部を作った本人が、#n「みんなと同じ立場でいたい」って言ったから、こうなってたんだけどね。"
10034070-258 = "[s29] \"……そっか。\"\n[s30] \"アイリだったんだね。\""
10034070-261 = "そ、そういうことじゃなくって……！"
10034070-262 = "私は、部長とかそんな……！"
10034070-263 = "ダメよ！ここは一回ちゃんとして、自分のことを見つめなおしなさい！"
10034070-268 = "それに、私がここにいるのは――"
10034070-269 = "……？"
10034070-270 = "……真実を打ち明ける時が来たか。"
10034070-271 = "……す、スイーツが美味しい、から、だし……？"
10034070-276 = "みんな恥ずかしがってないで、ちゃんと言えばいいのよ！"
10034070-277 = "私たちはみんな、アイリがアイリだから一緒にいるの！"
10034070-278 = "分かった！？"
10034070-279 = "……ま、大体そんなところ。"
10034070-281 = "よ、ヨシミちゃん……。"
10034070-282 = "でも私、みんなのことを……。"
10034070-284 = "そんなの別に良いの！#nよくあることでしょ！"
10034070-285 = "ほら、見なさいよこいつらのことを！"
10034070-286 = "まぁ、日々イラついてばっかりだしね。"
10034070-287 = "な、なんと……。"
10034070-288 = "いや「なんと」じゃないでしょ、今更……。"
10034070-289 = "カズサ、よく聞いて……。"
10034070-294 = "……怒りを溜め込むと、体に悪い。"
10034070-296 = "あんたが原因の七割なんだけど！？"
10034070-302 = "くっ、私は暴力には屈しなーい！！"
10034070-310 = "だから盾を使うのはズルいって！"
10034070-311 = "人間は常に成長する生き物なのだよ。"
10034070-312 = "くぅっ……！"
10034070-316 = "ふぅ、まぁでも……今回は私もヨシミと同意見だよ。"
10034070-317 = "「今回は」ってなに。"
10034070-318 = "……自分のことが好きになれないっていう気持ちは分かる。"
10034070-319 = "私も経験あるからさ……。"
10034070-320 = "なのに私は、思い込んでた。#nアイリは大丈夫って、勝手に……。"
10034070-321 = "……本当にごめん、アイリ。"
10034070-323 = "……カズサちゃん。"
10034070-328 = "私たちはそれぞれ違う存在で、だからこそ見えないものもある。#n逆に、自身の中に、眼をふさいでしまいたいと思うものを見出すこともあるだろう。"
10034070-329 = "その時にはまずは環境を見るのだ。#n自分自身を含めた環境を見るのだ。"
10034070-330 = "……アイリ。"
10034070-337 = "それとも――"
10034070-365 = "\"……アイリはまだ、今の自分が嫌い？\""
10034070-376 = "[log=아이리 밴드]\"ううん……好き。\"[/log]"
