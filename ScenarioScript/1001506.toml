[translation]
1001506-1 = "猫とアリス"
1001506-2 = "ミレニアム・商店街"
1001506-3 = "……。"
1001506-5 = "（アリスが商店街で、上の方にある何かをボーっと眺めている）"
1001506-6 = "[s1] \"アリス、何してるの？\"\n[s2] \"何か気になることでもあった？\""
1001506-9 = "あ、こんにちは、先生。"
1001506-10 = "アリスは今、猫さんを見ていました。"
1001506-11 = "[s] \"猫……？\""
1001506-12 = "（商店街の2階の手すりにいる猫が、毛を逆立ててアリスをものすごく警戒していた）"
1001506-13 = "フシャー！"
1001506-14 = "アリスの方を見て怒っているんです、アリスは何もしてないのに……。"
1001506-15 = "猫さんは、アリスのことが嫌いなんでしょうか？"
1001506-16 = "一昨日も、昨日も怒っていたので、そのまま帰るしかありませんでした。"
1001506-17 = "アリスは猫さんに触ってみたいのに、こちらに来てくれません……。"
1001506-19 = "[s3] （持っていた猫のおやつを取り出す）\n[s4] \"こんなこともあろうかと。\""
1001506-20 = "先生、これはなんですか？"
1001506-21 = "先生、これはなんですか？"
1001506-22 = "……もしかして、猫さんとの親密度を上げられるアイテムですか！？"
1001506-23 = "先生は、猫さんの攻略法を知っているんですか？"
1001506-24 = "[s5] \"ふふっ、見てて。\"\n[s6] 猫の前でおやつを振る。"
1001506-30 = "フシャーーーっ！！！"
1001506-31 = "[s7] \"……！？\"\n[s8] \"おやつが通じない！？\""
1001506-32 = "……さらに怒ってしまいました。アイテムの選択を間違えてしまったのかもしれません。"
1001506-33 = "……さらに怒ってしまいました。アイテムの選択を間違えてしまったのかもしれません。"
1001506-34 = "これ以上構いすぎるのも良くないでしょうし、残念ですがここまでかもしれません……バッドエンドです。"
1001506-35 = "ごめんなさい、猫さん。怖がらせるつもりは無かったのですが……。"
1001506-36 = "行きましょう、先生。"
1001506-37 = "[s9] \"そうだね……。\"\n[s10] \"残念だけど仕方ないね……。\""
1001506-40 = "……ニャー。"
1001506-41 = "！！"
1001506-42 = "猫さんがアリスの元に来てくれました！"
1001506-43 = "ニャー。"
1001506-44 = "まだ少しアリスのことを警戒しているようですが……もう、怒ってはいないみたいです……。"
1001506-45 = "[s] \"触ってもいいんじゃないかな？\""
1001506-46 = "そうでしょうか……？"
1001506-47 = "それでは……。"
1001506-48 = "……。"
1001506-49 = "ニャー。"
1001506-50 = "……。"
1001506-51 = "温かくて……すべすべしています。猫さんって、こんな感じなんですね。"
1001506-52 = "ニャー……"
1001506-53 = "（猫はまた、路地の向こう側に消えていった） "
1001506-54 = "……。"
1001506-55 = "[s] \"行っちゃったね。\""
1001506-56 = "はい。でも、大丈夫です。今日のクエストは「一度でも猫と触れ合うこと」でしたから。"
1001506-57 = "経験値をゲットしました。今日もまた、少しずつ成長しています。"
1001506-58 = "[s11] \"良かったね。\"\n[s12] \"うん。毎日少しずつ、大事なことだね。\""
1001506-59 = "先生が持っていたおやつを食べてくれなかったのは残念でしたが……。"
1001506-60 = "先生が持っていたおやつを食べてくれなかったのは残念でしたが……。"
1001506-61 = "そういえば、もしかして……それは先生が、アリスのために用意してくれたものなのですか？"
1001506-62 = "[s13] \"……さて、どうかな。\"\n[s14] \"諸事情でいつも持ち歩いてるから。\""
1001506-63 = "……口ではそんなことを言っていても、アリスには分かります。"
1001506-64 = "……口ではそんなことを言っていても、アリスには分かります。"
1001506-65 = "先生は優しい方ですから、アリスを放っておけなかったのです。"
1001506-66 = "アリスは全部、知っていますよ。"
1001506-68 = "（なんだか楽しそうなアリスと一緒に、猫の話をしながら学校に戻った）"
