[translation]
1001506-1 = "O gato e Alice"
1001506-2 = "Millennium - Área Comercial"
1001506-3 = "……。"
1001506-5 = "（Alice está parada na área comercial, olhando fixamente para algo no alto）"
1001506-6 = "[s1] \"Alice, o que você está fazendo?\"\n[s2] \"Tem algo te incomodando?\""
1001506-9 = "Ah, olá, Sensei."
1001506-10 = "Alice estava observando o gatinho agora pouco."
1001506-11 = "[s] \"Um gato...?\""
1001506-12 = "（O gato, que estava no corrimão do segundo andar da área comercial, estava com os pelos arrepiados e muito alerta em relação à Alice）"
1001506-13 = "Hiss!"
1001506-14 = "Ele está olhando para a Alice e bufando, mesmo que a Alice não tenha feito nada..."
1001506-15 = "Será que o gatinho não gosta da Alice?"
1001506-16 = "Ele também bufou ontem e anteontem, então não tive escolha a não ser ir embora."
1001506-17 = "Alice queria fazer carinho no gatinho, mas ele não vem até aqui..."
1001506-19 = "[s3] （Tira um petisco de gato que estava guardando）\n[s4] \"Eu estava preparado para isso.\""
1001506-20 = "Sensei, o que é isso?"
1001506-21 = "Sensei, o que é isso?"
1001506-22 = "……Será que é um item para aumentar o nível de afinidade com o gatinho!?"
1001506-23 = "Sensei, você conhece a estratégia para lidar com gatos?"
1001506-24 = "[s5] \"Hehe, observe.\"\n[s6] Balançar o petisco na frente do gato."
1001506-30 = "HISSSSSS!!!"
1001506-31 = "[s7] \"……!?\"\n[s8] \"O petisco não funcionou!?\""
1001506-32 = "……Ele ficou ainda mais bravo. Talvez eu tenha escolhido o item errado."
1001506-33 = "……Ele ficou ainda mais bravo. Talvez eu tenha escolhido o item errado."
1001506-34 = "Acho que não é bom insistir mais, é uma pena, mas talvez este seja o fim... um final ruim."
1001506-35 = "Desculpe, gatinho. Eu não queria te assustar..."
1001506-36 = "Vamos embora, Sensei."
1001506-37 = "[s9] \"É verdade...\"\n[s10] \"É uma pena, mas não tem jeito...\""
1001506-40 = "……Miau."
1001506-41 = "!!"
1001506-42 = "O gatinho veio até a Alice!"
1001506-43 = "Miau."
1001506-44 = "Ele ainda parece um pouco cauteloso com a Alice, mas... parece que não está mais bravo..."
1001506-45 = "[s] \"Acho que você pode fazer carinho nele, não acha?\""
1001506-46 = "Será mesmo...?"
1001506-47 = "Então..."
1001506-48 = "……。"
1001506-49 = "Miau."
1001506-50 = "……。"
1001506-51 = "É quentinho... e macio. Então é assim que um gato é."
1001506-52 = "Miau..."
1001506-53 = "（O gato desapareceu novamente para o outro lado do beco）"
1001506-54 = "……。"
1001506-55 = "[s] \"Ele foi embora.\""
1001506-56 = "Sim. Mas está tudo bem. A missão de hoje era \"ter contato com um gato pelo menos uma vez\"."
1001506-57 = "Ganhei pontos de experiência. Hoje também, estou crescendo um pouco mais."
1001506-58 = "[s11] \"Que bom.\"\n[s12] \"Sim. Um pouco a cada dia, isso é muito importante.\""
1001506-59 = "Foi uma pena que ele não tenha comido o petisco que o Sensei trouxe..."
1001506-60 = "Foi uma pena que ele não tenha comido o petisco que o Sensei trouxe..."
1001506-61 = "Falando nisso, será que... isso era algo que o Sensei preparou para a Alice?"
1001506-62 = "[s13] \"……Bem, quem sabe?\"\n[s14] \"Eu sempre carrego comigo por vários motivos.\""
1001506-63 = "……Mesmo que diga isso da boca para fora, a Alice entende."
1001506-64 = "……Mesmo que diga isso da boca para fora, a Alice entende."
1001506-65 = "O Sensei é uma pessoa gentil, por isso não conseguiu deixar a Alice sozinha."
1001506-66 = "A Alice sabe de tudo."
1001506-68 = "（Voltei para a escola conversando sobre gatos junto com a Alice, que parecia estar se divertindo bastante）"
