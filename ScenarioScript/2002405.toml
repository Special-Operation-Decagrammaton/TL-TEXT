[translation]
2002405-1 = "Chá e corpo"
2002405-2 = "Estava à sua espera, Sensei."
2002405-3 = "Acabaram de chegar as novas folhas de chá que mencionei outro dia."
2002405-4 = "Na verdade, recebi algo chamado \"Kombucha\" anteriormente, e achei bastante saboroso."
2002405-5 = "Por isso, desta vez, encomendei um novo chá preto daquela mesma marca."
2002405-6 = "[s] \"Qual é o sabor?\""
2002405-7 = "É um sabor refrescante e fácil de beber, com um aroma suave de bergamota. Espero que agrade ao seu paladar..."
2002405-8 = "Além disso, preparei alguns doces. Como não costumo servir este chá com frequência, a seleção de acompanhamentos acabou ficando um pouco variada demais..."
2002405-9 = "[s] \"...É uma quantidade e variedade impressionante.\""
2002405-10 = "Bem, o chá da tarde tradicionalmente exige uma variedade de acompanhamentos. A ideia é desfrutar do chá enquanto se come um pouco de cada um."
2002405-11 = "Também serve como um pedido de desculpas pelo que aconteceu da última vez, então, por favor, aproveite."
2002405-12 = "Vou preparar o chá enquanto isso."
2002405-16 = "Ora... o design da lata de chá parece diferente da que vi antes..."
2002405-17 = "...?"
2002405-23 = "(Isso não é chá preto, é alga kombu seca...!?)"
2002405-24 = "(Po-por que tem alga dentro da lata de chá...!?)"
2002405-25 = "(Será que entenderam errado quando pedi \"folhas de Kombucha\" e me enviaram \"kombu para chá de alga\"...?)"
2002405-26 = "(O que, o que eu faço agora...)"
2002405-27 = "(Não tenho outro chá, e já expliquei sobre o aroma... Não posso convidar o Sensei e mandá-lo embora sem servir nem uma xícara...)"
2002405-28 = "(Por enquanto, só me resta servir isso...)"
2002405-29 = "[ns] \"O que houve?\""
2002405-30 = "N-não é nada."
2002405-34 = "Estava apenas tentando me lembrar da temperatura ideal para o preparo."
2002405-37 = "De-desculpe a demora..."
2002405-38 = "Por favor, sirva-se à vontade."
2002405-41 = "[wa:300]― Fufu... [wa:1800]O aroma suave [wa:800]de bergamota,"
2002405-43 = "― é refrescante e agradável, não é?"
2002405-46 = "― (...Isso é, [wa:1400]definitivamente, [wa:700]alga..."
2002405-48 = "― O aroma é inconfundível... [wa:700])"
2002405-51 = "[wa:1500]― Esse retrogosto [wa:1000]refrescante,"
2002405-53 = "― combina muito bem [wa:500]com os doces..."
2002405-56 = "― (O sabor do caldo de alga está forte demais,"
2002405-58 = "― e está brigando com o sabor dos doces [wa:1200]na minha boca...)"
2002405-61 = "[wa:800]― ...? [wa:1600]Para você também,"
2002405-63 = "― foi um sabor inédito?"
2002405-66 = "― Po- [wa:900]pois é..."
2002405-68 = "― É um tipo de folha de chá [wa:1300]difícil de encontrar... [wa:1300]Fu, [wa:500]fufu..."
2002405-71 = "[wa:1200]― (...Ele não percebeu, percebeu?"
2002405-73 = "― O aroma é um pouco estranho, mas [wa:1500]a cor [wa:500]até que lembra...)"
2002405-76 = "[wa:1200]― (Se eu soubesse que seria assim,"
2002405-78 = "― teria pedido um chá preto comum [wa:1000]sem inventar moda...)"
2002405-81 = "(Depois disso, aproveitei vários chás e doces com Nagisa)"
2002405-83 = "Ufa..."
2002405-84 = "Não combinou nada com os doces, mas acho que conseguimos superar..."
2002405-85 = "...Como estava? Agradou ao seu paladar?"
2002405-86 = "[s] \"Foi uma combinação interessante, mas estava gostoso.\""
2002405-88 = "[ns] \"Chá de alga também é bom, o sabor do caldo é marcante.\""
2002405-89 = "Sim. É verdade, o caldo..."
2002405-93 = "Es-espere um momento, Sensei! Desde quando você sabia que isso não era chá preto...!?"
2002405-94 = "[s] \"Desde o começo...?\""
2002405-95 = "……。"
2002405-96 = "Ter passado por mais essa vergonha logo em um chá para pedir desculpas..."
2002405-97 = "Eu queria que a terra me engolisse..."
2002405-98 = "Bom, já que chegamos a esse ponto, só me resta apagar a memória do Sensei...!"
2002405-100 = "（Depois disso, foi muito difícil acalmar a Nagisa, que tentou me atacar）"
