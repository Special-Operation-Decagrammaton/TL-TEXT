[translation]
2002405-1 = "紅茶とコク"
2002405-2 = "お待ちしておりました、先生。"
2002405-3 = "ちょうど先日お話していた新しい茶葉が届いたところでして。"
2002405-4 = "実は以前「コンブチャ」というものを頂いたのですが、それが中々美味しかったのです。"
2002405-5 = "なので今回、その時のブランドの新しい紅茶を注文しました。"
2002405-6 = "[s] \"どんな味なの？\""
2002405-7 = "ベルガモットの爽やかな香りが広がる、すっきりとした飲みやすい味わいです。先生のお口にも合うと良いのですが……。"
2002405-8 = "それと、お菓子もご用意いたしました。普段あまり淹れないお茶なので、お茶請けは雑多になってしまいましたが……"
2002405-9 = "[s] \"……ものすごい量と種類だね。\""
2002405-10 = "元々アフタヌーン・ティーでは、様々な種類のお茶菓子を用意するものですから。これらを少しずつ食べながら、お茶を楽しむものなのです。"
2002405-11 = "この前のお詫びの意味も兼ねておりますので、今日はぜひご堪能ください。"
2002405-12 = "私はその間に、お茶をご用意してまいりますね。"
2002405-16 = "あら……前に見た紅茶缶と、何だかデザインが違うような……？"
2002405-17 = "……？"
2002405-23 = "（紅茶ではなく、乾燥した昆布……！？）"
2002405-24 = "（ど、どうして紅茶缶の中に、昆布が……！？）"
2002405-25 = "（まさか「コンブチャの茶葉をお願いします」を「昆布茶の昆布をお願いします」と勘違いされてしまった……？）"
2002405-26 = "（こ、これは、どうすれば……）"
2002405-27 = "（もう他の茶葉はありませんし、先ほど香りについて説明してしまいましたし……先生をお迎えしておきながら、お茶の一杯も出さずに帰すというのは流石に……）"
2002405-28 = "（とりあえず、こちらをお出しするしか……）"
2002405-29 = "[ns] \"どうしたの？\""
2002405-30 = "な、何でもありません。"
2002405-34 = "前回はどのくらいの温度で煎じていたかと、思い出していたところです。"
2002405-37 = "お、お待たせいたしました……。"
2002405-38 = "どうぞ、ごゆっくりお召し上がりください。"
2002405-41 = "[wa:300]― ふふっ……[wa:1800]ほのかに香る[wa:800]ベルガモットの風味が、"
2002405-43 = "― 爽やかで良いですね。"
2002405-46 = "― （……これは、[wa:1400]やはり[wa:700]昆布……"
2002405-48 = "― 誤魔化しようのない[wa:700]香りがしますね……）"
2002405-51 = "[wa:1500]― このすっきりとした[wa:1000]後味が、"
2002405-53 = "― お茶菓子に[wa:500]とてもよく合いますね……。"
2002405-56 = "― （昆布の出汁が強すぎて、"
2002405-58 = "― 口内でお菓子の味と[wa:1200]喧嘩を……）"
2002405-61 = "[wa:800]― ……？[wa:1600]先生にとっても"
2002405-63 = "― 初めての味わいでしたか？"
2002405-66 = "― そ、[wa:900]そうでしょうね……"
2002405-68 = "― あまり手に入らないタイプの[wa:1300]茶葉ですし……[wa:1300]ふ、[wa:500]ふふ……。"
2002405-71 = "[wa:1200]― （……バレてませんよね？"
2002405-73 = "― 香りはちょっとアレですが、[wa:1500]色は[wa:500]それっぽいですし……）"
2002405-76 = "[wa:1200]― （こうなると分かっていたら、"
2002405-78 = "― 無理をせずに[wa:600]普通の紅茶を[wa:1000]頼んでおけば……）"
2002405-81 = "（その後ナギサと一緒に様々なお茶やお茶菓子を楽しんだ）"
2002405-83 = "ふう……"
2002405-84 = "お茶菓子とは全然合いませんでしたが、何とか乗り切れたかもしれませんね……。"
2002405-85 = "……いかがでしたか？お口に合いましたか？"
2002405-86 = "[s] \"面白い組み合わせだったけど、美味しかったよ。\""
2002405-88 = "[ns] \"昆布茶も美味しいよね、出汁が効いてて。\""
2002405-89 = "ええ。そうですね、出汁が……"
2002405-93 = "お、お待ちください先生！　これが紅茶ではないことに、いつから気づいて……！？"
2002405-94 = "[s] \"最初から……？\""
2002405-95 = "……。"
2002405-96 = "お詫びを兼ねたお茶会で、またしても恥の上塗りをしてしまうとは……。"
2002405-97 = "穴があったら入りたいです……。"
2002405-98 = "もう、こうなったら、先生の記憶を消してしまうしか……！"
2002405-100 = "（その後、襲いかかってくるナギサを落ち着かせるのに、だいぶ苦戦した）"
