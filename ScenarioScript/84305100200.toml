[translation]
84305100200-11 = "……これにしようか。"
84305100200-12 = "うん。これならサイズもちょうどいい。"
84305100200-13 = "それ持ってくのか？データセンターのドローンは熱感知タイプだし、意味ねぇと思うぞ。"
84305100200-15 = "いえ、それならこちらでカバーできるわ。映像に顔が残らないだけで十分効果はある。"
84305100200-16 = "それに内部に入ってからは別行動よ。自分で身を隠せる物はあった方がいい。"
84305100200-17 = "うーん……。"
84305100200-21 = "気になることでも？"
84305100200-22 = "大丈夫か？本当に一人でやらなきゃいけないっぽいぞ。"
84305100200-23 = "……善処する。"
84305100200-24 = "議論には限界があるからな。現場で場当たり的に対応するのも、方法論の一つだろう。"
84305100200-25 = "ははっ、いいね。気に入った。"
84305100200-26 = "んじゃ、行くぞ！"
84305100200-27 = "……ああ。"
