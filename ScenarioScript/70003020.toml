70003020-90 = "V-você quer dizer que nós mesmas vamos lutar...?"
70003020-91 = "Mesmo sendo apenas tripulantes!?"
70003020-92 = "Não temos escolha... #nEsse é o nosso trabalho!"
70003020-97 = "……É verdade."
70003020-98 = "……Vamos tentar."
