70003020-38 = "...E-entendido."
70003020-45 = "P-por enquanto... vamos esperar?"
70003020-46 = "Disseram para não nos esforçarmos demais..."
70003020-47 = "Já que chegou a esse ponto, que tal esperar por reforços na próxima estação?"
70003020-48 = "Se pararmos o trem, os passageiros devem descer."
70003020-52 = "..."
70003020-53 = "Mas..."
70003020-54 = "Não tem nada que nós três possamos fazer..."
70003020-55 = "É um caso de força maior, né..."
70003020-56 = "...O trem vai acabar estragando, mas é só consertar no depósito depois."
70003020-60 = "Será que isso é realmente o certo a se fazer?"
70003020-62 = "O que foi?"
70003020-64 = "Se continuarmos assim, tudo o que nos esforçamos para proteger — a pontualidade, os anúncios, as normas de segurança..."
70003020-65 = "...Tudo isso vai perder o sentido."
70003020-66 = "Como alunas da Academia Ferroviária Highlander, nossa missão não é levar os passageiros ao destino com segurança!?"
70003020-68 = "Mas o que a gente pode fazer...?"
70003020-69 = "São esses mesmos 'passageiros' que estão causando os problemas."
70003020-70 = "...É isso!"
70003020-74 = "Nosso dever é proteger a segurança do trem e dos passageiros!"
70003020-75 = "Mas aquelas pessoas ali..."
70003020-77 = "Será que podemos realmente chamá-las de 'passageiros'!?"
70003020-81 = "...Hã?"
70003020-83 = "Quem causa transtorno, viaja sem pagar, usa violência ou faz vendas ilegais no trem não é passageiro!"
70003020-84 = "Não deveríamos proteger os passageiros de verdade?"
