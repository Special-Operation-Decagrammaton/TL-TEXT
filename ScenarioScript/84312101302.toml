[translation]
84312101302-5 = "ああ、話は聞いたよ。どうお礼を言ったらいいか。"
84312101302-10 = "おかげでアバンギャルド君の件もメカワニの件も、大事にならずに済みました！"
84312101302-11 = "欲しいものがあったら言って。なんでも作ってあげるから……。"
84312101302-13 = "気にしないでくれ。できることをやっただけなのだから。"
84312101302-14 = "とはいえ、これだけのことをしてもらったのに、何も返さないというのも……"
84312101302-15 = "何か、ミレニアム土産になるものはどうだろうか。トリニティではまず見かけないだろうもので言えば…全自動筆箱とか、飛行リモコンとか。"
84312101302-16 = "いや……今から作ると完成までに時間がかかりそうだ。手早く作れるとしたら……雷ちゃんか？でも、椅子だからなぁ……。"
84312101302-17 = "……椅子？"
84312101302-18 = "おや、椅子がご入り用かい？"
84312101302-19 = "いや……そういうわけではない。"
84312101302-20 = "友人を思い出しただけだ。"
