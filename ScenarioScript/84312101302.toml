[translation]
84312101302-5 = "Ah, eu soube do que aconteceu. Nem sei como agradecer."
84312101302-10 = "Graças a você, tanto o caso do Avant-Garde-kun quanto o do Mecha-Wani não se tornaram um problema maior!"
84312101302-11 = "Se quiser alguma coisa, é só pedir. Eu farei qualquer coisa para você..."
84312101302-13 = "Não se preocupe com isso. Eu apenas fiz o que estava ao meu alcance."
84312101302-14 = "Ainda assim, depois de tudo o que você fez, não retribuir de alguma forma seria..."
84312101302-15 = "Que tal algo que sirva como uma lembrança de Millennium? Algo que você dificilmente veria em Trinity... talvez um estojo totalmente automático ou um controle remoto voador?"
84312101302-16 = "Não... se eu começar a fazer agora, vai demorar para ficar pronto. Se for algo rápido... talvez a Rai-chan? Mas, bem, é uma cadeira, afinal..."
84312101302-17 = "...Uma cadeira?"
84312101302-18 = "Ora, você está precisando de uma cadeira?"
84312101302-19 = "Não... não é nada disso."
84312101302-20 = "Eu só me lembrei de um amigo."
