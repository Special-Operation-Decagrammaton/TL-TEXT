[translation]
1010802-1 = "不眠症"
1010802-2 = "（翌日、シャーレの手伝いで朝早くからユウカが訪ねてきた）"
1010802-3 = "（一見、普段と変わらない様子だったが……）"
1010802-7 = "[ns] \"ユウカ、昨日送ってくれた会計報告書なんだけど……。\""
1010802-8 = "……。"
1010802-9 = "[ns] \"ユウカ……？\""
1010802-10 = "ご、ごめんなさい！#nお呼びでしたか……？"
1010802-11 = "[s1] \"あ、うん。\"\n[s2] \"もしかして悩み事？\""
1010802-14 = "……いえ、何でもありません。"
1010802-15 = "それより、報告書ですね？#n少々お待ちください。"
1010802-17 = "（ずっと集中できていない様子のユウカは……）"
1010802-22 = "（……気がつけば、船を漕いでいた）"
1010802-23 = "[ns] \"ユウカ、大丈夫……？\""
1010802-24 = "へっ？#n――きゃっ！？"
1010802-30 = "[ns3] \"ユウカ、体調悪いんじゃない……？\"\n[ns4] \"今日は集中できてないような……。\""
1010802-33 = "そ、そんなことありません！#n食事も運動も計算通りですから！"
1010802-34 = "確かに、今日は少し眠気がありますが……当番の仕事は続けられます！"
1010802-35 = "[s5] \"もし何か困ってたら、遠慮せず頼ってね。\"\n[s6] \"体調を崩したら、後が大変だから。\""
1010802-38 = "うぅ、そこまで心配されると……。"
1010802-39 = "実は、その……。"
1010802-42 = "[ns] \"……不眠症？\""
1010802-43 = "はい。#nセミナーの仕事で先週、徹夜をしまして……。"
1010802-44 = "そこから睡眠リズムが崩れて、寝付きが……。"
1010802-45 = "結局、朝方まで寝られずに日中うとうとしてしまい、#nそうなると当然、夜になっても眠れず……。"
1010802-46 = "……昨日も早く寝ようと思ったのですが、#nうまくいかなくて。"
1010802-50 = "[ns] \"今日の当番はこの辺にして……。\""
1010802-52 = "[ns7] \"リラックスできる服とか持ってきてる？\"\n[ns8] \"夜ぐっすり眠れるように、訓練をしよう。\""
1010802-55 = "えっ、こんな時間に寝るんですか？"
1010802-56 = "不眠症が悪化するんじゃ……。"
1010802-57 = "ただでさえ、睡眠リズムが崩れているのに……。"
1010802-58 = "[s9] \"でも、さっきからつらそうだよ？\"\n[s10] \"まずは私を信じてみて。\""
1010802-61 = "これ以上、迷惑をかけるわけにもいきませんし……。"
1010802-62 = "……分かりました、着替えてきますね。"
1010802-66 = "シャーレでこんな格好をしてるなんて、変な感じがします……。"
1010802-67 = "それで、訓練と言っていましたが、具体的には何をするんですか？"
1010802-68 = "[s11] \"簡単だよ、まずはリラックスして。\"\n[s12] \"ベッドで横になって、ゆっくりするだけだよ。\""
1010802-71 = "えっ、そんな方法で……？"
1010802-72 = "今まで色々な方法を試しても、効果がなかったのに……。"
1010802-73 = "いつもと違う環境ですし、余計眠れなさそうな気が……。"
1010802-74 = "[s13] \"大丈夫、気負う必要はないよ！\"\n[s14] \"深呼吸しながら、目を閉じてみて。\""
1010802-77 = "（先生に寝顔を見られるのは、ちょっと恥ずかしいかも……）"
1010802-82 = "（でも、今はそんなこと言ってられないわね）"
1010802-83 = "（こんな簡単な方法で眠れるとは思わないけど……）"
1010802-84 = "……。"
1010802-85 = "…………。"
1010802-97 = "んん……。"
1010802-98 = "久しぶりに、ぐっすり寝た気が――"
1010802-99 = "[s] \"おはよう、ユウカ。\""
1010802-100 = "せ、先生！？もしかして、私寝ちゃってました！？"
1010802-101 = "そうだ、時間は――"
1010802-102 = "[s] \"一時間しか経ってないよ。\""
1010802-103 = "良かった……当番に来たつもりが、寝て終わるところでした。"
1010802-108 = "それにしても、どうしてお昼は寝られて、夜は寝付きが……。"
1010802-109 = "[s] \"思い込みかもしれないね。\""
1010802-110 = "……思い込み？"
1010802-111 = "早く寝ようと考えてるせいで、逆に眠れなくなっている、と。"
1010802-112 = "その視点は抜けてました。"
1010802-113 = "とはいえ、お昼寝の影響で眠れなくなってしまったら……。"
1010802-114 = "[s] \"常に完璧なコンディションを維持しようとしなくても大丈夫だよ。\""
1010802-118 = "[ns] \"当番の日も、無理せずベッドで休んで良いからね。\""
1010802-119 = "……やっぱり、先生は優しいですね。"
1010802-120 = "ただ、ずっと甘えてばかりはいられませんから、お昼寝は控えようと思います。"
1010802-121 = "でも、あまり気を張りすぎずに「いつ休んでも大丈夫」の気持ちでいるようにしますね。"
1010802-126 = "というか、先生……まさか、他の生徒にも言ってませんよね？"
1010802-127 = "生徒にベッドを薦めるなんて、誤解されたらどうするんですか！"
1010802-131 = "……今、目を逸らしましたね。"
1010802-132 = "ちゃんと答えてください！"
1010802-133 = "せ～ん～せ～い～！？"
