[translation]
1010802-1 = "insônia"
1010802-2 = "(No dia seguinte, Yuka veio visitá-lo de manhã cedo para ajudar com a placa de Petri)."
1010802-3 = "(À primeira vista, ela não parecia diferente do normal. ......)"
1010802-7 = "[ns] \"Yuuka, este é o relatório financeiro que você me enviou ontem: ....... \""
1010802-8 = "......."
1010802-9 = "[ns] \"Yuka......? \""
1010802-10 = "Desculpe-me, desculpe-me! Você ligou para #n ......?"
1010802-11 = "[s1] \"Oh, sim. \"\n[s2] \"Você está tendo problemas? \"\n[s2]\"\"\n1010802-14 = \"...... Não, não é nada.\"\n1010802-15 = \"Mais importante ainda, o relatório? #nPor favor, aguarde um momento.\"\n1010802-17 = \"(Yuka, que parecia ser incapaz de se concentrar o tempo todo, é ......)\"\n1010802-22 = \"(......) Eu me vi remando um barco.\"\n1010802-23 = \"[ns] \"Yuka, você está bem ......? \"\"\n1010802-24 = \"Heh? #n--kyah!\"\n1010802-30 = \"[ns3] \"Yuuka, você não está se sentindo bem ......? \"\n[ns4] \"Parece que você não está se concentrando hoje. ...... \"\"\n1010802-33 = \"Ah, não! #nPorque a dieta e os exercícios são calculados!\"\n1010802-34 = \"De fato, estou com um pouco de sono hoje, mas posso continuar meu trabalho em ...... duty!\"\n1010802-35 = \"[s5] \"Se precisar de ajuda, não hesite em contar comigo. \"\n[s6] \"Se você ficar doente, será difícil mais tarde. \"\n1010802-38 = \"Ugh, se você se preocupa tanto assim. ......\"\n1010802-39 = \"Na verdade, é .......\"\n1010802-42 = \"[ns] \"...... Insônia? \"\"\n1010802-43 = \"Sim. Fiquei acordado a noite toda na semana passada trabalhando em um seminário #n. ......\"\n1010802-44 = \"A partir daí, o ritmo do sono é interrompido, e dormir não é fácil. ......\"\n1010802-45 = \"No final, eu não conseguia dormir até altas horas da madrugada e cochilava durante o dia, e então, é claro, não conseguia dormir à noite. ......\"\n1010802-46 = \"...... Tentei ir para a cama cedo ontem, mas não deu certo.\"\n1010802-50 = \"[ns] \"É aqui que estarei de plantão hoje. ....... \"\"\n1010802-52 = \"[ns7] \"Você trouxe algumas roupas relaxantes ou algo assim? \"\n[ns8] \"Vamos treinar para que você possa dormir bem à noite. \"\"\n1010802-55 = \"O quê, você está indo para a cama a essa hora?\"\n1010802-56 = \"Sua insônia vai piorar. ......\"\n1010802-57 = \"Mesmo que você esteja apenas tendo uma boa noite de sono, seus ritmos de sono são interrompidos. ......\"\n1010802-58 = \"[s9] \"Mas parece que você está passando por um momento difícil antes, certo? \"\n[s10] \"Antes de tudo, tente confiar em mim. \"\"\n[s10]]\"\n1010802-61 = \"Não podemos nos dar ao luxo de ter mais problemas. ......\"\n1010802-62 = \"...... Ok, vou me trocar.\"\n1010802-66 = \"É estranho estar vestido assim em uma placa de Petri. ......\"\n1010802-67 = \"Então, você mencionou o treinamento, o que exatamente você faz?\"\n1010802-68 = \"[s11] \"É fácil, basta relaxar primeiro. \"\n[s12] \"Basta deitar na cama e relaxar. \"\n1010802-71 = \"O que, dessa forma ......?\"\n1010802-72 = \"Embora tenhamos tentado vários métodos diferentes e eles não tenham funcionado. ......\"\n1010802-73 = \"É um ambiente incomum e acho que não vou conseguir dormir mais. ......\"\n1010802-74 = \"[s13] \"Não se preocupe, não há necessidade de se exaltar! \"\n[s14] \"Respire fundo e feche os olhos. \"\"\n[s14] \"Feche os olhos.\""

1010802-77 = "(Pode ser um pouco embaraçoso para o sensei ver você dormindo ......)"
1010802-82 = "(Mas não podemos falar sobre isso agora)."
1010802-83 = "(Acho que não conseguiria dormir tão bem, mas ......)"
1010802-84 = "......."
1010802-85 = "............."
1010802-97 = "Hmmm. ......."
1010802-98 = "Sinto que não tenho uma boa noite de sono há muito tempo."
1010802-99 = "[\"Bom dia, Yuka. \""
1010802-100 = "Se, senhor! Será que eu caí no sono?"
1010802-101 = "Sim, o tempo é..."
1010802-102 = "[\"Só se passou uma hora. \""
1010802-103 = "Graças a Deus ...... pensei que estava de plantão, mas quase acabei dormindo."
1010802-108 = "Mas por que você dorme na hora do almoço e não à noite? ......"
1010802-109 = "[\"Talvez seja uma suposição. \""
1010802-110 = "...... Suposições?"
1010802-111 = "Ele disse que, como está pensando em ir para a cama cedo, não consegue dormir."
1010802-112 = "Essa perspectiva estava faltando."
1010802-113 = "No entanto, se não conseguir dormir devido a cochilos, acesse ......."
1010802-114 = "[\"Você não precisa tentar manter as condições perfeitas o tempo todo. \""
1010802-118 = "[\"Você pode ir com calma e descansar na cama em seus dias de serviço. \""
1010802-119 = "...... Eu sabia que o médico era gentil."
1010802-120 = "Mas não posso ser mimado o tempo todo, então tentarei evitar cochilar."
1010802-121 = "Mas eu tentaria não ser muito rígido e ter a sensação de que não há problema em fazer uma pausa a qualquer momento."
1010802-126 = "Quero dizer, Senseia ......, você não contou aos outros alunos, contou?"
1010802-127 = "E se eles tiverem a ideia errada de recomendar camas aos alunos?"
1010802-131 = "...... Agora você se afastou."
1010802-132 = "Responda à pergunta corretamente!"
1010802-133 = "Se~n~se~y!"
