[translation]
10031040-1 = "第4話;議長の哲学"
10031040-2 = "（パーティー準備2日目も、マコトから連絡が届いた）"
10031040-7 = "ああ、先生。私たちのパーティーも、着々と準備が進んできたな。"
10031040-8 = "風紀委員長は……おそらく今頃ピアノの練習にかかりきりだろう、キキッ。"
10031040-9 = "パーティー当日が今から楽しみだ。"
10031040-10 = "[s] \"ヒナはパーティーのために、きっと頑張ってるよ。\""
10031040-11 = "ほう……？"
10031040-12 = "ふん。まあ、風紀委員長が醜態を晒すのも、それなりの余興になるだろうが……"
10031040-13 = "キキキッ。#n私にはパーティーを成功させるという重大な責任があるのだ！"
10031040-14 = "先生よ。パーティーといえば、何が重要だろうか？"
10031040-15 = "[s1] \"パーティーを開く意味、とか……？\"\n[s2] \"うーん……やっぱり料理は大切じゃないかな？"
10031040-16 = "……なるほど。先生の言うことにも一理がある。"
10031040-17 = "パーティーとは、単に開けば良いわけではない。そこに意味を持たせられるかどうかに、優れたリーダーとしての資質が試されている、と……"
10031040-18 = "そう言いたいのだな？"
10031040-19 = "[s3] \"いや、そこまでは……\""
10031040-20 = "まあ、それなら心配ない。このパーティーは、このマコト様がいかに偉大なのか、これまで我々万魔殿が行なってきた偉業の数々が、いかに素晴らしいものなのか。"
10031040-21 = "それを皆に証明する重要なパーティーだからな！キシシッ！"
10031040-22 = "となれば……この偉大なマコト様に相応しい料理を振る舞わなくては！"
10031040-23 = "キキキキキッ！たしかに、その通りだ！"
10031040-24 = "パーティーに参加する者を満足させるには、料理も欠かせないな。"
10031040-25 = "実は私もそう思って、給食部にケータリングを発注しておいたのだ。"
10031040-26 = "今日は試作品を食べて、このマコト様のパーティーで出すに値するか品評を行なう予定になっている。"
10031040-27 = "先生にもアドバイスをもらいたいのだが、ゲヘナまで来てくれるか？"
10031040-28 = "[s] \"うん、大丈夫だよ。すぐに向かうね。\""
10031040-29 = "クククッ。それでは待っているぞ。"
10031040-41 = "（こうして、マコトに呼ばれてゲヘナのパーティー会場にやって来た）"
10031040-42 = "[ns] \"想像以上に本格的だ……\""
10031040-43 = "（パーティー会場を見渡し、マコトを探していると……）"
10031040-48 = "……はぁ、これは一体どういうことですか。"
10031040-49 = "もしかして……またサツキ先輩が何かしたとか？"
10031040-50 = "ち、違う！濡れ衣よ！こ、今回に関しては何もしてないわ！"
10031040-51 = "え～まあ、いいんじゃないですか？#nこういう情熱的なマコト先輩も！"
10031040-52 = "むしろ普段の姿とギャップがあって、みんなからウケると思う！#n私の書記魂が燃えてきたよ！"
10031040-53 = "あっ！これで次の万魔殿定期新聞のタイトルは決まったも同然ね！#nもしかしたら、すごい反響を呼ぶかも！"
10031040-54 = "ねえ、イロハちゃん？"
10031040-62 = "……あんな姿が……反響を、ですか？"
10031040-63 = "チアキ、忠告しておきます。#n本気でそう思ったのなら、あなたのセンスを見直した方がいいですよ。"
10031040-64 = "うわっ、ひっど～い！"
10031040-65 = "[s] \"えっと……みんな集まってどうしたの？\""
10031040-66 = "あっ！先生だ！"
10031040-67 = "先生！それがね～ええっと……！マコト先輩がね～！"
10031040-68 = "[s] \"マコト……？\""
10031040-71 = "…………。"
10031040-72 = "私たちは……"
10031040-73 = "[s] \"私たち……？\""
10031040-74 = "私たちは、なぜ苦しみながら生きるのか！"
10031040-75 = "理由は簡単だ！そう、幸せになるため！"
10031040-76 = "幸せとは、人生の根源的な目標である！"
10031040-77 = "まさに人の一生は、幸せを叶えるために存在しているのだ！"
10031040-78 = "そして私は考えた！幸せを得るために、人は何をするべきなのか。"
10031040-79 = "絶えず考えた……！"
10031040-80 = "私は考える……！故に私は存在するのだと！"
10031040-81 = "存在するうぅ～！"
10031040-82 = "存在する～っ！"
10031040-93 = "[ns] \"え、えっと……イロハ？\""
10031040-94 = "……急にマコト先輩の様子がおかしくなったんです。"
10031040-95 = "おかしくなった、で済ませていいレベルなの？#nマコトちゃん、完全に別人だけど？"
10031040-96 = "別人になったというか、一夜にして覚醒したというか……"
10031040-97 = "[s] \"……うん？\""
10031040-98 = "いずれにせよ、正常な状態ではありません。"
10031040-99 = "あんなマコト先輩の姿、想像しただけでもゾッとするのに……#nそれが今、私たちの目の前に存在してるだなんて。"
10031040-100 = "……これは悪夢ですか？"
10031040-101 = "ええ、悪夢に違いないわね。"
10031040-102 = "[s] \"二人とも容赦ないね……\""
10031040-103 = "マコト先輩が悟りを開いて、人生の真理に到達しようと思った可能性は無くも……#nいえ、無いですね。"
10031040-104 = "あの、念のため聞きたいんですが……#nマコト先輩は何か拾い食いでもしたんですか？"
10031040-110 = "あ、そういえば実はさっき……"
10031040-111 = "拾い食いではありませんが、給食部に依頼した料理の試作品を召し上がっていました。"
10031040-113 = "……給食部から渡された料理？"
10031040-115 = "はい、どうやら給食部の部長が不在だったそうで……"
10031040-117 = "代わりの方が試作品を作ったとは聞いています。"
10031040-121 = "[ns] \"……あっ。\""
