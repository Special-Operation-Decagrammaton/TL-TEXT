[translation]
10031040-1 = "Episódio 4: A Filosofia da Presidente"
10031040-2 = "（No segundo dia de preparação para a festa, recebi um contato de Makoto）"
10031040-7 = "Ah, Sensei. A preparação para a nossa festa está avançando de forma constante."
10031040-8 = "A presidente do Comitê Disciplinar... provavelmente está ocupada praticando piano agora, hehe."
10031040-9 = "Já estou ansioso pelo dia da festa."
10031040-10 = "[s] \"A Hina deve estar se esforçando muito pela festa.\""
10031040-11 = "Hoh...?"
10031040-12 = "Hum. Bem, se a presidente do Comitê Disciplinar passar vergonha, servirá como um entretenimento à parte..."
10031040-13 = "Hehehe. Eu tenho a grande responsabilidade de fazer a festa ser um sucesso!"
10031040-14 = "Sensei. Falando em festa, o que é mais importante?"
10031040-15 = "[s1] \"O significado de dar uma festa, talvez...?\"\n[s2] \"Hmm... a comida não é o mais importante?\""
10031040-16 = "...Entendo. O que você diz também tem sentido."
10031040-17 = "Uma festa não é algo que se faz apenas por fazer. A capacidade de um grande líder é testada na habilidade de dar um significado a ela..."
10031040-18 = "É isso que você quer dizer, não é?"
10031040-19 = "[s3] \"Não, não cheguei a tanto...\""
10031040-20 = "Bem, então não há com o que se preocupar. Esta festa servirá para provar o quão grandiosa eu, Makoto, sou, e o quão maravilhosos foram os feitos que nós, do Pandemonium, realizamos até hoje."
10031040-21 = "É uma festa importante para provar isso a todos! Kishishi!"
10031040-22 = "Sendo assim... preciso servir pratos que estejam à altura de uma grande líder como eu!"
10031040-23 = "Hehehehe! Com certeza, é isso mesmo!"
10031040-24 = "Para satisfazer quem participa da festa, a comida é indispensável."
10031040-25 = "Na verdade, eu também pensei nisso e encomendei um buffet do Departamento de Merenda Escolar."
10031040-26 = "Hoje, pretendo provar as amostras e avaliar se elas são dignas de serem servidas na festa da Makoto aqui presente."
10031040-27 = "Eu gostaria de ouvir seus conselhos também, você poderia vir até Gehenna?"
10031040-28 = "[s] \"Sim, tudo bem. Estou indo agora mesmo.\""
10031040-29 = "Kukuku. Então estarei esperando."
10031040-41 = "（Assim, fui chamado por Makoto e cheguei ao local da festa em Gehenna）"
10031040-42 = "[ns] \"É mais profissional do que eu imaginava...\""
10031040-43 = "（Enquanto observava o local da festa procurando por Makoto...）"
10031040-48 = "...Haa, o que significa tudo isso?"
10031040-49 = "Será que... a Satsuki-senpai fez alguma coisa de novo?"
10031040-50 = "N-não! É uma calúnia! D-desta vez eu não fiz nada!"
10031040-51 = "Eh~ bem, não é legal? Essa Makoto-senpai tão apaixonada!"
10031040-52 = "Na verdade, acho que o contraste com o jeito habitual dela vai agradar a todos! Meu espírito de secretária está em chamas!"
10031040-53 = "Ah! Com isso, o título do próximo jornal periódico do Pandemonium já está decidido! Talvez cause uma repercussão incrível!"
10031040-54 = "Ei, Iroha-chan?"
10031040-62 = "...Aquele estado... causaria repercussão?"
10031040-63 = "Chiaki, vou te dar um conselho. Se você realmente acha isso, é melhor rever o seu senso comum."
10031040-64 = "Uau, que cruel!"
10031040-65 = "[s] \"Bem... o que está acontecendo com todo mundo reunido aqui?\""
10031040-66 = "Ah! É o Sensei!"
10031040-67 = "Sensei! É que... bem...! A Makoto-senpai está...!"
10031040-68 = "[s] \"Makoto...?\""
10031040-71 = "............"
10031040-72 = "Nós..."
10031040-73 = "[s] \"Nós...?\""
10031040-74 = "Por que nós vivemos sofrendo?!"
10031040-75 = "A resposta é simples! Sim, para sermos felizes!"
10031040-76 = "A felicidade é o objetivo fundamental da vida!"
10031040-77 = "A vida humana existe justamente para alcançar a felicidade!"
10031040-78 = "E eu refleti! O que o ser humano deve fazer para alcançar a felicidade?"
10031040-79 = "Eu pensei sem parar...!"
10031040-80 = "Eu penso...! Logo, eu existo!"
10031040-81 = "Eu existooooo!"
10031040-82 = "Eu existooooo!"
10031040-93 = "[ns] \"E-Ei... Iroha?\""
10031040-94 = "...A Makoto-senpai começou a agir de forma estranha de repente."
10031040-95 = "Dá para resumir como 'estranha'?#nA Makoto-chan está completamente diferente, não está?"
10031040-96 = "Diferente, ou talvez ela tenha despertado da noite para o dia..."
10031040-97 = "[s] \"...Hm?\""
10031040-98 = "De qualquer forma, ela não está em um estado normal."
10031040-99 = "Só de imaginar a Makoto-senpai daquele jeito já me dá arrepios...#nE agora ela está bem aqui na nossa frente."
10031040-100 = "...Isso é um pesadelo?"
10031040-101 = "Sim, com certeza deve ser um pesadelo."
10031040-102 = "[s] \"Vocês duas não têm piedade, hein...\""
10031040-103 = "Não que seja impossível que a Makoto-senpai tenha alcançado a iluminação e tentado chegar à verdade da vida...#nNão, na verdade, é impossível sim."
10031040-104 = "Ei, só por precaução, eu queria perguntar...#nA Makoto-senpai comeu algo que encontrou por aí?"
10031040-110 = "Ah, agora que você mencionou, na verdade, há pouco..."
10031040-111 = "Não foi algo que ela encontrou por aí, mas ela comeu um protótipo de um prato solicitado ao Clube de Merenda."
10031040-113 = "...Um prato entregue pelo Clube de Merenda?"
10031040-115 = "Sim, parece que a presidente do Clube de Merenda estava ausente..."
10031040-117 = "Ouvi dizer que outra pessoa preparou o protótipo."
10031040-121 = "[ns] \"...Ah.\""
