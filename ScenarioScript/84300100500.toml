[translation]
84300100500-7 = "これは……。"
84300100500-8 = "取引部品リスト……？なぜこんなものが。"
84300100500-12 = "ふむ……この部品は一般流通しているものではない。"
84300100500-13 = "闇取引の可能性が高い……念のため、報告しておこうか。"
84300100500-14 = "彼女らはどこへ……？"
84300100500-15 = "向かった方角は覚えているが……。"
84300100500-19 = "……いや、私はあくまで客人。越権行為が過ぎる。"
84300100500-20 = "ミレニアムのことは、ミレニアムの者が成すべきだ。"
84300100500-21 = "……ガイドの二人に伝えるだけで良い。"
84300100500-22 = "要らぬことに首を突っ込んでは、ナギサとまた……。"
84300100500-23 = "ナギサ……。"
84300100500-25 = "寛解はしていますが、完治とは言い切れない。#nこれは私個人の感想ではなく、救護騎士団の見解でもあります。"
84300100500-26 = "ましてやセイアさんは頼みの綱――予知能力を失っています。#n不測の事態に備えることも叶いません。"
84300100500-27 = "私からすれば、セイアさんは保護対象に他ならないのです。"
84300100500-30 = "はぁ……。"
84300100500-31 = "今さら思い出すとはね。"
84300100500-32 = "理性的であるつもりだったが……。"
84300100500-33 = "私も大概、感情的らしい。"
84300100500-34 = "……関与はしない。取引現場を確認するだけ。それだけだ。"
