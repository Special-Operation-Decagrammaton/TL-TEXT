[translation]
84300100500-7 = "Isto é……."
84300100500-8 = "Uma lista de peças de negociação……? Por que algo assim estaria aqui."
84300100500-12 = "Hum…… estas peças não são de circulação comum."
84300100500-13 = "É muito provável que seja um mercado negro…… por precaução, é melhor eu relatar isso."
84300100500-14 = "Para onde elas foram……?"
84300100500-15 = "Eu me lembro da direção que seguiram, mas……."
84300100500-19 = "……Não, eu sou apenas uma convidada. Seria um excesso de autoridade da minha parte."
84300100500-20 = "Os assuntos do Millennium devem ser resolvidos pelo pessoal do Millennium."
84300100500-21 = "……Basta apenas informar as duas guias."
84300100500-22 = "Se eu me meter onde não sou chamada, a Nagisa vai novamente……."
84300100500-23 = "Nagisa……."
84300100500-25 = "Ela está em remissão, mas não posso afirmar que está totalmente curada. #nEsta não é apenas a minha opinião pessoal, mas também a visão do Esquadrão de Socorro."
84300100500-26 = "Além disso, a Seia-san perdeu sua maior aliada — sua capacidade de premonição. #nNão há como se preparar para imprevistos."
84300100500-27 = "Do meu ponto de vista, a Seia-san não passa de alguém que precisa de proteção."
84300100500-30 = "Haa……."
84300100500-31 = "Lembrar disso só agora, hein."
84300100500-32 = "Eu pretendia ser racional, mas……."
84300100500-33 = "Parece que eu também sou bastante emocional."
84300100500-34 = "……Não vou me envolver. Vou apenas confirmar o local da negociação. Só isso."
