[translation]
1000508-1 = "幸運を掴む方法"
1000508-2 = "D.U.外郭・ショッピングモール"
1000508-4 = "（ホシノと一緒にしばらく歩き回った末に、欲しかった本を購入した）"
1000508-5 = "うへ、おかげさまで助かったよ先生。"
1000508-6 = "アビドスは田舎だから、こういう新しいのは手に入れるのが難しいんだよね。"
1000508-8 = "じゃーん、「月刊アクアホビー特別版」！付録に熱帯魚2000種図鑑まで！"
1000508-9 = "これで千円だなんて、すごくない？付録まで半端ないのにね？"
1000508-10 = "はあ……早く開けてみたい。どこでもいいからお店に入ろう！"
1000508-12 = "[s] ついて行く。"
1000508-14 = "へえ～見てこれ、家でウニを飼育する方法だって。"
1000508-15 = "海水の水槽って結構難易度が高いって聞いたけどね、ふーん。"
1000508-16 = "[s] \"ホシノは魚が好きなんだね？\""
1000508-17 = "うへ～まあ、飼いたいくらい好きだけど……こうやって見るだけでも楽しいから大丈夫。"
1000508-19 = "……。"
1000508-20 = "……もしかして、ちょっと子供っぽいかな……？この年でこんな趣味の人、あんまりいないのは知ってるけど……。"
1000508-21 = "[s1] \"良いと思うよ。\"\n[s2] \"趣味は年齢と関係ないよ。\""
1000508-22 = "……うへへ。"
1000508-23 = "……うへへ。"
1000508-24 = "……あれ？これ見て、先生。後ろにスクラッチの宝くじチケットがついてる。"
1000508-25 = "「アクアリウム開場記念無料入場券30名抽選チケット」……え、ええっ！？なに、これ？"
1000508-26 = "アクアリウムって、つまり……。"
1000508-27 = "[s] \"ものすごく大きい水族館みたいなものかな。\""
1000508-28 = "ものすごく大きい水族館……？！"
1000508-29 = "……！！"
1000508-30 = "そ、それって普通に買ったら1万5千円分のチケットを二枚もくれるってこと？"
1000508-31 = "このスクラッチ宝くじで当たればいいんだよね？ま、待ってて！"
1000508-32 = "こ、コインは……。"
1000508-34 = "せ、先生！祈ってて！"
1000508-35 = "[s3] \"ファイト！\"\n[s4] \"頑張って！\""
1000508-36 = "（カサカサ）"
1000508-37 = "（カサカサ）"
1000508-38 = "（カサカサカサカサ）"
1000508-39 = "（カサカサ）……ああ。"
1000508-40 = "[s5] \"当たった？\"\n[s6] \"どうだった？\""
1000508-41 = "……外れ。"
1000508-42 = "……外れ。"
1000508-43 = "……うへ、やっぱり幸運がそうそう自分からやってくるわけないか。"
1000508-44 = "……。"
1000508-45 = "ほら、それじゃあ行こう、先生。"
1000508-46 = "今日は先生と一緒にいっぱい歩き回って、欲しかった本も買ったから、なかなかいい一日だったよ。"
1000508-47 = "[s] ホシノを連れて本屋に行く。"
1000508-48 = "うん？な、なにをしてるの、先生？どこに行くの？"
1000508-51 = "……。"
1000508-52 = "（同じ本を50冊も買ってしまった）"
1000508-53 = "……ねえ、先生……これって、もしかして……。"
1000508-54 = "[s] \"諦めるには早い！当たるまで削るよ！\""
1000508-55 = "……。"
1000508-56 = "うへ～、まあいいや、ツッコむのは私の役割じゃないし、大人の遊びに付き合ってみようかな～。"
1000508-57 = "よし！30回以内に当てようか！！"
1000508-58 = "てやあああっー！！"
1000508-60 = "（幸いにも38回目で当たって、ホシノにチケットをプレゼントすることができた）"
1000508-61 = "（残った50冊の本をどうやって処理するか悩んだ結果、シャーレの図書館に保管することにした）"
