[translation]
1000508-1 = "Como atrair a sorte"
1000508-2 = "D.U. Subúrbio - Shopping Center"
1000508-4 = "(Depois de andar por aí um pouco com Hoshino, você comprou o livro que queria.)"
1000508-5 = "Uhe, valeu pela ajuda, Sensei."
1000508-6 = "Abydos é bem rural, então é difícil conseguir essas novidades por lá."
1000508-8 = "Tcharam! \"Edição Especial da Aqua Hobby Mensal\"! E ainda vem com um guia de 2000 espécies de peixes tropicais de brinde!"
1000508-9 = "Não é incrível que custe só mil ienes? E o brinde é sensacional, né?"
1000508-10 = "Ah... mal posso esperar para abrir. Vamos entrar em qualquer loja por aqui!"
1000508-12 = "[s] Acompanhá-la."
1000508-14 = "Hee~ olha só isso, diz como criar ouriços-do-mar em casa."
1000508-15 = "Ouvi dizer que aquários de água salgada são bem difíceis de manter, hum..."
1000508-16 = "[s] \"Você gosta bastante de peixes, né, Hoshino?\""
1000508-17 = "Uhe~ bem, eu gosto tanto que até queria criar... mas só de olhar assim já me divirto, então está tudo bem."
1000508-19 = "..."
1000508-20 = "...Será que isso é um pouco infantil...? Eu sei que não tem muita gente da minha idade com esse tipo de hobby..."
1000508-21 = "[s1] \"Eu acho legal.\"\n[s2] \"Hobby não tem idade.\""
1000508-22 = "...Uhehe."
1000508-23 = "...Uhehe."
1000508-24 = "...Ué? Olha só, Sensei. Tem uma raspadinha premiada atrás."
1000508-25 = "\"Bilhete de sorteio para 30 pessoas para entrada gratuita na inauguração do Aquário\"... E-espera!? O que é isso?"
1000508-26 = "Um aquário, ou seja..."
1000508-27 = "[s] \"Deve ser algo como um aquário gigantesco.\""
1000508-28 = "Um aquário gigantesco...?!"
1000508-29 = "...!!"
1000508-30 = "I-isso significa que, se ganharmos, recebemos dois ingressos que custariam 15 mil ienes cada?"
1000508-31 = "É só ganhar nessa raspadinha, né? E-espera aí!"
1000508-32 = "A-a moeda..."
1000508-34 = "S-Sensei! Torça por mim!"
1000508-35 = "[s3] \"Boa sorte!\"\n[s4] \"Você consegue!\""
1000508-36 = "(Raspa, raspa)"
1000508-37 = "(Raspa, raspa)"
1000508-38 = "(Raspa, raspa, raspa, raspa)"
1000508-39 = "(Raspa)... Ah."
1000508-40 = "[s5] \"Ganhou?\"\n[s6] \"Como foi?\""
1000508-41 = "...Não ganhei."
1000508-42 = "...Não ganhei."
1000508-43 = "...Uhe, acho que a sorte não vem bater na porta assim tão fácil."
1000508-44 = "..."
1000508-45 = "Bom, vamos indo, Sensei."
1000508-46 = "Hoje foi um dia muito bom, andei bastante com você e ainda comprei o livro que queria."
1000508-47 = "[s] Levar Hoshino de volta à livraria."
1000508-48 = "Hum? O-o que você está fazendo, Sensei? Para onde estamos indo?"
1000508-51 = "..."
1000508-52 = "(Você acabou comprando 50 exemplares do mesmo livro)"
1000508-53 = "...Ei, Sensei... isso é, por acaso..."
1000508-54 = "[s] \"Não é hora de desistir! Vamos raspar até ganhar!\""
1000508-55 = "..."
1000508-56 = "Uhe~, tudo bem então. Não é meu papel questionar, então acho que vou entrar na brincadeira de adulto."
1000508-57 = "Certo! Vamos ganhar dentro dessas 30 tentativas!!"
1000508-58 = "Teyaaaaa!!"
1000508-60 = "(Felizmente, ganhei na 38ª tentativa e consegui presentear a Hoshino com o ingresso)"
1000508-61 = "(Depois de pensar sobre o que fazer com os 50 livros restantes, decidi guardá-los na biblioteca do Schale)"
