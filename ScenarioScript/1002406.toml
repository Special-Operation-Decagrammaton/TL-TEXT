[translation]
1002406-1 = "帰ってくる場所"
1002406-2 = "（もしかしてと思いながらシャーレの下に出ると、シロコの姿が見えた）"
1002406-3 = "や、先生。"
1002406-4 = "ちょうど今着いたところ、タイミングばっちり。"
1002406-5 = "[s1] \"おかえり！\"\n[s2] \"お疲れ様、これで完走？\""
1002406-6 = "ん、あの辺りから一本で戻ってこられる道があったから。"
1002406-7 = "ん、あの辺りから一本で戻ってこられる道があったから。"
1002406-8 = "傾斜もない道だったから、スピードを出して走ってきたの。風も涼しくて気持ちよかった。"
1002406-9 = "……あ、でもまだ正確には完走じゃない。"
1002406-10 = "ここは、内緒にしてた最後のポイント。ゴールはスタート地点と同じ、アビドスだから。"
1002406-11 = "[s3] \"なるほどね。\"\n[s4] \"じゃあこれからアビドスに？\""
1002406-12 = "うん。ゴールする前にこうやって、先生に会いたくって。"
1002406-13 = "うん。ゴールする前にこうやって、先生に会いたくって。"
1002406-14 = "……ん？普通にアビドスまで呼んでくれても良かったのに……？"
1002406-15 = "ん……何て言うかその、最後は私の方から迎えに行きたくって……。"
1002406-16 = "もしかして、迷惑だった……？"
1002406-17 = "ん、大丈夫……？じゃあその、えっと、先生が良ければ………。"
1002406-18 = "[s5] \"一緒にアビドスに行こっか。\"\n[s6] \"アビドスまでの道中で、これまでの話を聞かせてほしいな。\""
1002406-19 = "……ん。"
1002406-20 = "……ん。"
1002406-21 = "あ、でも……先生も知ってる通り、ここからアビドスまでは結構距離があるよ。私はともかく、先生は大変だと思うけど……。"
1002406-22 = "後部座席があれば良かったんだけど、そういうわけにもいかないし……。"
1002406-23 = "えっと……。"
1002406-24 = "……ん、焦る必要も無いね。スピードは先生に合わせるから、ゆっくり行こう。"
1002406-25 = "じゃあ行こっか、先生。"
1002406-26 = "無理しないで良いよ。ゆっくり、二人で。ね？"
1002406-27 = "[s] シロコの横に並んで、ふたりでゆっくりと歩き始めた。"
1002406-30 = "（そして、こちらの歩くスピードに合わせてゆっくり自転車を引いてくれたシロコと、ふたりでアビドスへと向かった）"
1002406-31 = "（道中シロコは、これまでのライディング中に見た色々なものについて話を聞かせてくれた）"
1002406-32 = "（出会った頃には想像もつかないほど、たくさんのことを話してくれた）"
1002406-44 = "（……何となく分かってはいたけれど、シロコの言う通り、シャーレからアビドスまで歩いて行くにはかなりの時間がかかった）"
1002406-45 = "（その後アビドスに到着して、荷解きや何やらを済ませた頃にはもう夜になっていた）"
1002406-48 = "……ん、到着。"
1002406-49 = "キヴォトス縦断のロングライド、成功だよ。先生。"
1002406-50 = "お祝いのクラッカーとか、何か用意しておけばよかったかな……。"
1002406-51 = "[s] \"完走おめでとう、シロコ。\""
1002406-52 = "……ん。"
1002406-53 = "ありがとう、先生。その言葉だけで、今すっごく嬉しい。"
1002406-54 = "先生が助けてくれたから、ここまで来られた。"
1002406-55 = "海を越えて、山を越えて、橋を渡って……。"
1002406-56 = "川を超えて、都会を通り過ぎて……どんな時でもそうだった……。"
1002406-57 = "……いつも、私のそばには先生がいてくれる。"
1002406-61 = "えっと、いつもっていうのはその、気持ちとしてって言うか、それ以外の意味じゃなくて……。"
1002406-62 = "[s] \"……？\""
1002406-63 = "……ん、いや、ごめん。大丈夫、気にしないで。"
1002406-64 = "ただ、えっと、何て言えば良いのかな……。"
1002406-65 = "いつもそばにいてくれる……もう私にとっての先生は今、そういう存在で。"
1002406-66 = "……ありがとう、先生。"
1002406-71 = "今回、こういうことができて良かった。"
1002406-72 = "……うん、本当に。心の底から。"
