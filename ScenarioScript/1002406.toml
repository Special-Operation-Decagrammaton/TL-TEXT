[translation]
1002406-1 = "O lugar para onde voltar"
1002406-2 = "（Pensando que talvez fosse ela, saí do Schale e vi Shiroko）"
1002406-3 = "Ah, Sensei."
1002406-4 = "Acabei de chegar, o timing foi perfeito."
1002406-5 = "[s1] \"Bem-vinda de volta!\"\n[s2] \"Bom trabalho, isso encerra o percurso?\""
1002406-6 = "Sim, porque havia um caminho direto que vinha daquela direção."
1002406-7 = "Sim, porque havia um caminho direto que vinha daquela direção."
1002406-8 = "Como não tinha inclinação, vim pedalando rápido. O vento estava fresco e foi muito agradável."
1002406-9 = "……Ah, mas tecnicamente ainda não terminei o percurso."
1002406-10 = "Este é o último ponto que mantive em segredo. O objetivo é o mesmo lugar de onde comecei: Abydos."
1002406-11 = "[s3] \"Entendi.\"\n[s4] \"Então, vamos para Abydos agora?\""
1002406-12 = "Sim. Eu queria encontrar o Sensei assim, antes de chegar ao objetivo."
1002406-13 = "Sim. Eu queria encontrar o Sensei assim, antes de chegar ao objetivo."
1002406-14 = "……Hm? Você poderia ter me chamado para ir até Abydos normalmente, não poderia……?"
1002406-15 = "Sim…… como posso dizer, é que eu queria ser eu mesma a vir te buscar no final……."
1002406-16 = "Por acaso, foi um incômodo……?"
1002406-17 = "Sim, está tudo bem……? Então, bem, se o Sensei estiver de acordo……."
1002406-18 = "[s5] \"Vamos juntos para Abydos.\"\n[s6] \"No caminho para Abydos, quero que me conte sobre tudo o que aconteceu.\""
1002406-19 = "……Sim."
1002406-20 = "……Sim."
1002406-21 = "Ah, mas…… como o Sensei sabe, ainda há uma distância considerável daqui até Abydos. Deixando-me de lado, acho que será difícil para o Sensei……."
1002406-22 = "Seria bom se houvesse um banco traseiro, mas não é o caso……."
1002406-23 = "Bem……."
1002406-24 = "……Sim, não há necessidade de pressa. Vou ajustar minha velocidade à do Sensei, vamos devagar."
1002406-25 = "Então vamos, Sensei."
1002406-26 = "Não precisa se forçar. Devagar, nós dois. Certo?"
1002406-27 = "[s] Caminhei lentamente ao lado de Shiroko."
1002406-30 = "（E então, fomos em direção a Abydos, com Shiroko empurrando a bicicleta lentamente para acompanhar o meu passo）"
1002406-31 = "（No caminho, Shiroko me contou sobre várias coisas que viu durante sua pedalada）"
1002406-32 = "（Ela me contou tantas coisas que eu nem poderia imaginar quando nos conhecemos）"
1002406-44 = "（……Eu já imaginava, mas como Shiroko disse, levou bastante tempo para ir a pé do Schale até Abydos）"
1002406-45 = "（Depois que chegamos a Abydos e terminamos de descarregar as coisas, já era noite）"
1002406-48 = "……Sim, chegamos."
1002406-49 = "A longa jornada atravessando Kivotos foi um sucesso, Sensei."
1002406-50 = "Será que eu deveria ter preparado algo, como um confete para comemorar……."
1002406-51 = "[s] \"Parabéns por completar o percurso, Shiroko.\""
1002406-52 = "……Sim."
1002406-53 = "Obrigada, Sensei. Só com essas palavras, estou muito feliz agora."
1002406-54 = "Consegui chegar até aqui porque o Sensei me ajudou."
1002406-55 = "Atravessei o mar, subi montanhas, cruzei pontes……."
1002406-56 = "Passei por rios, atravessei cidades…… foi assim em todos os momentos……."
1002406-57 = "……O Sensei sempre esteve ao meu lado."
1002406-61 = "Bem, quando digo 'sempre', é no sentido de sentimento, não em outro sentido……."
1002406-62 = "[s] \"……?\""
1002406-63 = "……Sim, não, desculpe. Está tudo bem, não se preocupe."
1002406-64 = "É só que, bem, como devo dizer……."
1002406-65 = "Você sempre estar ao meu lado…… para mim, o Sensei é esse tipo de existência agora."
1002406-66 = "……Obrigada, Sensei."
1002406-71 = "Fico feliz por termos conseguido fazer isso desta vez."
1002406-72 = "……Sim, de verdade. Do fundo do meu coração."
