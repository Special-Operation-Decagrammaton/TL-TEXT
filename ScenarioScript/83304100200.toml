[translation]
83304100200-6 = "この書類はこっちに……"
83304100200-7 = "これはあそこのファイルに……"
83304100200-8 = "訓練前の書類整理は、これで大体……"
83304100200-9 = "次の予定は……ゲヘナのパーティーに合わせて行なう対テロ訓練の準備ね。"
83304100200-10 = "いつも通りだろうけど、完璧にこなせなかったら……"
83304100200-11 = "また万魔殿にどんな言いがかりをつけられるか分からない。"
83304100200-12 = "訓練に参加する部員たちを集めて、打ち合わせをしよう。"
