[translation]
80000074-1 = "Algo incomum"
80000074-2 = "（Após receber uma mensagem de Kazusa, visitei a sala de aula vazia depois da escola）"
80000074-3 = "Professor, você veio na hora certa."
80000074-4 = "Ah, não... não é como se eu tivesse um favor para pedir ou algo assim..."
80000074-5 = "...V-você realmente quer que eu diga?#nVocê sabe que hoje é Dia dos Namorados, né."
80000074-6 = "Então, eu pensei em te dar isso... aqui, pegue."
80000074-11 = "[ns1] \"Um bolo de chocolate com morango?\"\n[ns2] \"Obrigado, parece delicioso.\""
80000074-12 = "Bem, é que... não te dar nada num dia desses pareceria que eu estou tentando evitar o assunto, né..."
80000074-13 = "Bem, é que... não te dar nada num dia desses pareceria que eu estou tentando evitar o assunto, né..."
80000074-14 = "É-é só isso mesmo. #nMas, sendo você, o professor, aposto que já ganhou um monte de outras garotas. #nEntão, se você não quiser... tudo bem também."
80000074-15 = "...V-você está tão feliz assim?"
80000074-16 = "...Hã? Não, bem, eu também fico feliz, mas... coma logo. Vai acabar estragando."
80000074-20 = "...Ah, lá vem você dizendo essas coisas de novo, tão casualmente..."
80000074-21 = "...Não é nada. #nO seu jeito de conquistar as pessoas não é de hoje."
80000074-22 = "Falando nisso... eu escolhi meio que por acaso, mas se o sabor não for do seu agrado—"
80000074-23 = "...Hm?"
80000074-24 = "O motivo de eu ter escolhido um bolo em vez de chocolate...?"
80000074-25 = "Hmm, não teve nenhum motivo específico, na verdade."
80000074-26 = "Talvez seja porque eu costumo comer bolo de morango... #nE como é Dia dos Namorados, eles estavam vendendo essa versão de chocolate."
80000074-27 = "...Hã?"
80000074-28 = "N-não é nada disso."
80000074-29 = "E-eu pareço tão gulosa assim?"
80000074-30 = "Ah, chega! Se vai falar desse jeito, eu mesma como! #nE olha que eu comprei especialmente para você...!"
80000074-31 = "...A gente não costuma trocar presentes ou comer coisas juntos, né? #nPor isso, eu pensei bastante sobre isso..."
80000074-32 = "...Eu sei que não combina comigo. Mas, mas sabe...!"
80000074-33 = "...Hã, aquela confeitaria que fomos outro dia?"
80000074-34 = "Não, eu lembro, mas...? #nSim, e antes disso, quando eu levei doces para você também..."
80000074-35 = "Então o que—"
80000074-36 = "..."
80000074-37 = "...?"
80000074-38 = "...Ué?"
80000074-39 = "...A gente até que se dá presentes e sai para comer junto, né?"
80000074-40 = "[s3] \"É verdade, até que fazemos isso com frequência.\"\n[s4] \"Coisas do dia a dia, a gente nem nota, né?\""
80000074-46 = "Bem, é que..."
80000074-47 = "...Professor."
80000074-48 = "Por acaso, eu... queria te perguntar uma coisa..."
80000074-49 = "Eu sou, tipo, bem..."
80000074-50 = "Eu sou uma pessoa complicada, né...?"
80000074-51 = "[s5] \"De jeito nenhum.\"\n[s6] \"Por que não comemos esse bolo juntos primeiro?\""
80000074-52 = "............"
80000074-53 = "............"
80000074-54 = "...Ah."
80000074-55 = "Acho que andei me empolgando demais ultimamente..."
80000074-57 = "（Depois disso, como se quisesse espantar o constrangimento, Kazusa espetou o morango em cima do bolo com força usando o garfo）"
80000074-58 = "（Mesmo depois de terminarem o bolo, as bochechas de Kazusa ainda estavam um pouco coradas）"
