[translation]
80000074-1 = "慣れないこと"
80000074-2 = "（カズサから連絡をもらい、放課後に空き教室を訪れた）"
80000074-3 = "先生、時間通り来てくれたんだ。"
80000074-4 = "あ、いや……頼み事があるとか、そういうんじゃないけど……"
80000074-5 = "……わ、わざわざ口にさせたいの？#n今日はバレンタインデーだって、分かってるでしょ。"
80000074-6 = "だから、先生にあげようと思って……はい、これ。"
80000074-11 = "[ns1] \"苺を使ったチョコケーキ？\"\n[ns2] \"ありがと、美味しそうだね。\""
80000074-12 = "まあ、その……こういう日なのにあげないのも、逆に意識してるみたいじゃん……。"
80000074-13 = "まあ、その……こういう日なのにあげないのも、逆に意識してるみたいじゃん……。"
80000074-14 = "ほ、ホントにそれだけだから。#nでもどうせ、先生のことだし他の子からもたくさん貰ってるでしょ。#nだから別に、要らなかったら……良いんだけど。"
80000074-15 = "……そ、そんなに嬉しいの？"
80000074-16 = "……え？いや、まあそれは私も嬉しいけど……ちゃんと食べてよ。腐っちゃうし。"
80000074-20 = "……はぁ、またそんなこと軽く言っちゃってさ……。"
80000074-21 = "……何でもないよ。#n先生の人たらしは今に始まったことじゃないし。"
80000074-22 = "そういえば……てきとうに選んじゃったけど、味が好みじゃなかったら――"
80000074-23 = "……ん？"
80000074-24 = "チョコレートじゃなくてケーキにした理由……？"
80000074-25 = "うーん、特に具体的な何かがあったわけじゃないけど。"
80000074-26 = "普段から、苺のケーキを食べてるからかな……。#nバレンタインデーだから、チョコバージョンが売ってて。"
80000074-27 = "……え？"
80000074-28 = "べ、別にそういうわけじゃないし。"
80000074-29 = "そ、そんなに食い意地張ってるように見える？"
80000074-30 = "もうっ、そこまで言うなら自分で食べるけど！？#nせっかく先生のために買ってきたのに……！"
80000074-31 = "……普段プレゼントとか、一緒に何か食べたりとかしないでしょ？#nだから、けっこう私なり悩んで……"
80000074-32 = "……似合わないことだってくらい、分かってる。でも、でもさぁ……！"
80000074-33 = "……え、この間行ったケーキ屋さん？"
80000074-34 = "いや、覚えてるけど……？#nうん、その前に、スイーツ差し入れに行った時も……"
80000074-35 = "だから何――"
80000074-36 = "……"
80000074-37 = "……？"
80000074-38 = "……あれ？"
80000074-39 = "……意外とプレゼントしてるし、一緒に食べにも行ってる？"
80000074-40 = "[s3] \"そうだね、割とよく。\"\n[s4] \"日常的なことって、特に意識しないよね。\""
80000074-46 = "えっと、その……。"
80000074-47 = "……先生。"
80000074-48 = "もしかして、その……一応聞いてみたいんだけど……。"
80000074-49 = "私って、結構……"
80000074-50 = "私ってめんどくさい、かな……？"
80000074-51 = "[s5] \"そんなことないよ。\"\n[s6] \"とりあえず、一緒にこのケーキ食べない？\""
80000074-52 = "…………。"
80000074-53 = "…………。"
80000074-54 = "……はぁ。"
80000074-55 = "ちょっと最近、浮かれすぎだったかも……。"
80000074-57 = "（その後、カズサは気恥ずかしさを振り払うように、ケーキの上のイチゴをフォークで勢いよく刺した）"
80000074-58 = "（二人でケーキを食べ終えた後も、カズサの頬はまだ少し赤かった）"
