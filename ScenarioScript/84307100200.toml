[translation]
84307100200-5 = "良いタイミングね。次の依頼の話をしてもいいかしら。"
84307100200-9 = "……は？帰ってきたばっかなんだけど？"
84307100200-10 = "いや、人使いが荒いにも程があんだろ……。"
84307100200-11 = "んで、セイアは？あたしだけなんかするわけじゃないよな？"
84307100200-12 = "彼女も役割を果たしてくれているわ。貴女同様にね。"
84307100200-13 = "それでも……この件は彼女には任せられないの。"
84307100200-14 = "あん？荒事か？"
84307100200-15 = "ええ、得意でしょう？"
84307100200-19 = "しょうがねえな。やればいいんだろ？"
84307100200-20 = "話が早くて助かるわ。"
84307100200-21 = "何をすればいいんだ？"
84307100200-22 = "その前に……。"
84307100200-23 = "これを用意したわ。"
84307100200-24 = "……何だこれ？"
84307100200-28 = "ニーパッド？何に使うんだ？"
84307100200-29 = "既存技術を流用して、特殊な機能を持たせているの。"
84307100200-30 = "一度で素早く目標地点までスライディングできるようになっているわ。"
84307100200-34 = "あと、これも。"
84307100200-39 = "打撃音を軽減する特殊なパッドプレートよ。貴女なら有効活用できるでしょう？"
84307100200-40 = "へぇ？悪くねえな。"
84307100200-44 = "早速使っていいんだよな？"
84307100200-45 = "もちろんよ、そのために渡したのだから。"
84307100200-48 = "任務は至ってシンプルよ。会場の展示品を盗もうとしている一団を捕縛して欲しいの。"
84307100200-54 = "最重要目標は、奴らのリーダー。頭を押さえなければいたちごっこになる。必ず捕まえて。"
84307100200-57 = "暴れてもいいんだよな？"
84307100200-58 = "発砲は許可できないわ。"
84307100200-59 = "十分だ。肉弾戦には肉弾戦の楽しさがあるからな。"
84307100200-60 = "あまり心配はしていないけれど……「気をつけて」と言うべきかしら。"
84307100200-61 = "それを言っちゃ意味ねぇんだよ。"
84307100200-62 = "ま、その発想が出てきただけマシか。"
84307100200-66 = "んじゃ、行ってくる。"
84307100200-68 = "……気をつけて。"
