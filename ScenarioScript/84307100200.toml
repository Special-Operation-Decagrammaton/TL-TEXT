[translation]
84307100200-5 = "Ótimo momento. Posso falar sobre a próxima missão?"
84307100200-9 = "……Hã? Eu acabei de voltar, sabia?"
84307100200-10 = "Não, isso já é exploração demais, não acha……?"
84307100200-11 = "E a Seia? Não vai me dizer que sou a única que vai fazer algo, né?"
84307100200-12 = "Ela também está cumprindo o papel dela. Assim como você."
84307100200-13 = "Ainda assim…… não posso deixar este assunto nas mãos dela."
84307100200-14 = "Hm? É algo violento?"
84307100200-15 = "Sim, você é boa nisso, não é?"
84307100200-19 = "Que seja. É só fazer, né?"
84307100200-20 = "Fico feliz que seja direta."
84307100200-21 = "O que eu tenho que fazer?"
84307100200-22 = "Antes disso……"
84307100200-23 = "Preparei isto para você."
84307100200-24 = "……O que é isso?"
84307100200-28 = "Joelheiras? Para que servem?"
84307100200-29 = "Usei tecnologia existente e adicionei algumas funções especiais."
84307100200-30 = "Elas permitem que você deslize rapidamente até o ponto de destino de uma só vez."
84307100200-34 = "E isto também."
84307100200-39 = "É uma placa de proteção especial que reduz o som dos impactos. Você saberá como tirar bom proveito disso, certo?"
84307100200-40 = "Hã? Nada mal."
84307100200-44 = "Posso usar agora mesmo, né?"
84307100200-45 = "Claro, foi para isso que eu te entreguei."
84307100200-48 = "A missão é bem simples. Quero que capture um grupo que está tentando roubar as exposições do local."
84307100200-54 = "O alvo principal é o líder deles. Se não pararmos o cabeça, isso vai virar um jogo de gato e rato. Capture-o a qualquer custo."
84307100200-57 = "Posso causar um estrago, né?"
84307100200-58 = "Não posso autorizar o uso de armas de fogo."
84307100200-59 = "Já é o suficiente. O combate corpo a corpo tem sua própria diversão, afinal."
84307100200-60 = "Não estou muito preocupada, mas…… talvez eu devesse dizer 'tome cuidado'."
84307100200-61 = "Dizer isso não faz sentido nenhum."
84307100200-62 = "Bem, pelo menos o fato de você ter pensado nisso já é um avanço."
84307100200-66 = "Então, estou indo."
84307100200-68 = "……Tome cuidado."
