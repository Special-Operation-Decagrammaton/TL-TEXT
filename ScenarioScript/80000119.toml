[translation]
80000119-1 = "燃える対抗心"
80000119-2 = "（深夜まで業務をしていたところ……）"
80000119-9 = "[ns] \"……？\""
80000119-12 = "[ns1] \"……誰だろう？\"\n[ns2] 周囲を片付ける。"
80000119-15 = "驚かないんだね。"
80000119-16 = "もしかして……慣れてる？"
80000119-19 = "[ns3] \"……シロコ？\"\n[ns4] \"どうしたの？\""
80000119-22 = "ん……サプライズ失敗。"
80000119-23 = "うん？"
80000119-24 = "こんな時間に来た理由？"
80000119-25 = "……ふふっ。"
80000119-26 = "来たことより、理由を気にするんだ。"
80000119-27 = "ああ、でも……先生はそうだった。"
80000119-28 = "こういうところ、本当に鈍感だよね。"
80000119-33 = "[ns5] \"あ、これって……\"\n[ns6] \"……「今回」は増えてるね。\""
80000119-36 = "ん……覚えててくれてると思った。"
80000119-37 = "「今度」は多めに用意したよ。"
80000119-38 = "大丈夫。今は色々できるようになったんだ。"
80000119-39 = "……？"
80000119-40 = "同じものを……こっちのシロコからも……？"
80000119-41 = "へぇ、そうなんだ……？"
80000119-45 = "[ns7] \"もしかして……。\"\n[ns8] \"対抗してる……？\""
80000119-48 = "……対抗？#nまさか。"
80000119-49 = "こっちのシロコのやりそうなことくらい全部分かるだけ。"
80000119-50 = "それに、そもそも立場が違うから対抗しようがない。"
80000119-51 = "――チョコでも、私の方が強い。"
80000119-52 = "[s9] \"……絶対意識してる！\"\n[s10] \"変な争いしないで！\""
80000119-55 = "……ふふっ。"
80000119-56 = "いつもの先生でいてくれて……ありがとう。"
80000119-57 = "……用は済んだから、帰るね。"
80000119-58 = "[s11] \"来たばっかじゃない？\"\n[s12] \"もうちょっとゆっくりしても……。\""
80000119-61 = "ん、何かあったら連絡して。"
80000119-62 = "いつでも歓迎する。"
80000119-63 = "でも――"
80000119-64 = "今日は……私から会いに行った方が、安心するかなって。"
80000119-65 = "……ん。"
80000119-66 = "先生は、そういう人。"
80000119-67 = "私は元気にしてるから、心配しないで。"
80000119-68 = "……良い生徒でしょ？"
80000119-69 = "[s13] \"そこまで考えてくれてたんだ。\"\n[s14] \"シロコは良い子だね。\""
80000119-72 = "……ふふっ。"
80000119-73 = "毎日は難しいけど……。"
80000119-74 = "また、シャーレに来る。"
80000119-75 = "先生……またね。"
80000119-77 = "（シロコは明るい笑顔を浮かべ、挨拶する間も与えずに立ち去っていった）"
80000119-78 = "（……彼女からもらった大量のチョコは、オフィスの復旧作業のお供にした）"
