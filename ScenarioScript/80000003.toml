[translation]
80000003-1 = "O lanche da administradora"
80000003-2 = "Conselho Estudantil Geral - Sala de Operações"
80000003-3 = "Ah, bom trabalho, Sensei."
80000003-4 = "O motivo de eu ter chamado você hoje... você já deve saber, não é?"
80000003-5 = "[s] \"Mais ou menos...\""
80000003-6 = "Sim, imagino que seja exatamente o que você está pensando."
80000003-7 = "O relatório de atividades do Schale que você enviou ontem... estava tão bagunçado que quase não havia partes preenchidas corretamente, sabia?"
80000003-8 = "Além dos erros de digitação e campos preenchidos nos lugares errados, por algum motivo, havia um recibo de uma loja de brinquedos no final do relatório..."
80000003-9 = "...Vou apontar tudo, então corrija agora mesmo."
80000003-10 = "[s] \"Sim...\""
80000003-15 = "（Depois disso, enquanto Rin apontava os erros, nós dois trabalhamos duro para corrigir tudo.）"
80000003-18 = "...Parece que finalmente estamos terminando."
80000003-19 = "Ah, assine aqui e aqui também..."
80000003-20 = "[s] Boceja de repente."
80000003-24 = "...Parece que você está cansado, Sensei."
80000003-25 = "...? Você não dorme há um tempo por causa do trabalho no Schale...?"
80000003-26 = "Entendo. Então foi por isso que as partes escritas à mão estavam tão confusas..."
80000003-27 = "Dormir o suficiente também faz parte do trabalho e afeta muito a eficiência. Não faz sentido sacrificar o sono só porque está ocupado."
80000003-28 = "Se for realmente necessário, consumir cafeína é uma opção, mas..."
80000003-29 = "Espere um pouco. Acho que ainda tenho algo guardado..."
80000003-34 = "...Aqui está."
80000003-35 = "Pegue, Sensei."
80000003-39 = "...Por que essa expressão? Você sabe o que é um chocolate, por que está com essa cara...?"
80000003-40 = "[s] \"É que hoje é...\""
80000003-41 = "Hoje? O que tem hoje?"
80000003-42 = "Hoje...?"
80000003-43 = "…………"
80000003-44 = "……………………"
80000003-45 = "...Não pode ser isso."
80000003-46 = "Eu só quero que você termine logo com esses documentos para que possa ir embora."
80000003-47 = "[s] \"Sim, desculpe...\""
80000003-48 = "...Então, vamos terminar o relatório."
80000003-49 = "[s] \"Sim...\""
80000003-50 = "……"
80000003-51 = "...É sério, não é nada disso."
80000003-52 = "[s] \"...Sim.\""
80000003-55 = "（Depois disso, terminamos o trabalho em um silêncio estranho.）"