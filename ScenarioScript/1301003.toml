[translation]
1301003-1 = "Um valor incalculável"
1301003-2 = "Millennium - Sala do Conselho Estudantil \"Seminar\""
1301003-3 = "Sensei, você veio."
1301003-4 = "Como é um problema relacionado às finanças da Millennium, é difícil perguntar para outros alunos... Eu evitei tomar qualquer atitude precipitada até que você chegasse."
1301003-5 = "Passei o dia inteiro pensando nisso, mas não consegui chegar a uma resposta definitiva..."
1301003-6 = "Por enquanto, você poderia dar uma olhada nesta pintura?"
1301003-8 = "Na sua opinião, o que você acha que é esta pintura?"
1301003-10 = "[ns1] \"Um rabisco feito por uma criança.\"\n[ns2] \"Uma cobra engolindo um elefante!\"\n[ns3] \"Uma mancha de café...?\""
1301003-11 = "Ah... Então você também vê dessa forma, sensei."
1301003-12 = "Essa é uma resposta bem peculiar. Eu não vejo nada disso."
1301003-13 = "Embora seja uma pintura difícil de entender, não acha que isso é um pouco exagerado...?"
1301003-14 = "Resumindo, esta pintura é uma obra abstrata que um certo empresário, que tem dívidas com a Millennium Science School, quer deixar como garantia."
1301003-15 = "Segundo o empresário, esta obra foi pintada por um aluno gênio chamado Matsumoto, da Academia de Artes Wildhunt, e teria um valor de cerca de 100 milhões de ienes."
1301003-16 = "Mas, para mim, não parece nada além de um rabisco infantil comum..."
1301003-17 = "[s] \"A arte é assim mesmo, não é?\""
1301003-18 = "Pode ser, mas quando chega a hora de ter que julgar algo assim..."
1301003-19 = "Tenho certeza de que o custo para fazer esta pintura, mesmo estimando um valor alto para as tintas, não passaria de 10 mil ienes."
1301003-20 = "E ainda assim, só por ter sido feita por um artista famoso, o valor aumenta mais de 10 mil vezes... Eu simplesmente não consigo aceitar esse fato."
1301003-21 = "Mas, como tesoureira do Seminar, não posso desvalorizar injustamente um item de valor, e também estou em dúvida se devo aceitar essa garantia ou não."
1301003-22 = "[s] \"O valor da arte não pode ser calculado como uma fórmula matemática.\""
1301003-23 = "Se não pode ser calculado dessa forma, então com base em que critério se define o valor?"
1301003-24 = "...Então você está dizendo que, ao avaliar uma obra, é preciso considerar a história e a originalidade por trás dela?"
1301003-25 = "...Entendo. De fato, se o peso fosse o único critério, tratar um robô de precisão e um bloco de ferro bruto como tendo o mesmo valor seria algo que nem eu conseguiria aceitar."
1301003-26 = "Mas, no fim das contas, sou uma leiga em arte... Em vez disso, gostaria que você, sensei, julgasse o valor desta pintura."
1301003-27 = "Sensei, quanto você acha que esta pintura vale?"
1301003-29 = "[s] \"0 ienes.\""
1301003-30 = "...Hã? O que você quer dizer com isso?"
1301003-31 = "...Não existe nenhum aluno chamado Matsumoto na Academia de Artes Wildhunt? Então, você está dizendo que esta obra é, sem dúvida, uma falsificação sem valor?"
1301003-32 = "Sensei... Você deveria ter dito isso antes!!"
1301003-34 = "Depois disso, como a pintura não tinha valor algum e não havia onde guardá-la, decidiram deixá-la pendurada na parede da sala do conselho estudantil."
