[translation]
10029040-1 = "第4話;楽しい時間は一瞬で"
10029040-2 = "（……翌日）"
10029040-7 = "……了解。"
10029040-8 = "指定のポイントに到着したよ、部長。#nこの建物で合ってる？"
10029040-9 = "……ええ、無事に到着したようですね。"
10029040-10 = "その建物は地下に繋がっています。"
10029040-11 = "おそらく、この先は通信が安定しないでしょう。#n気をつけてくださいね。"
10029040-12 = "大丈夫、一度行ったことある場所だから。#n「設備」の場所も、大体の見当はついてるし。"
10029040-16 = "それにしても、殺風景ね。#nこんな遠いところから、私たちを運んでくれたなんて……"
10029040-17 = "しかも、意識のない状態で……#n本当にすみませんでした。"
10029040-19 = "気にしないで。#n3人まとめて運んだ方が効率的だと思っただけだから。"
10029040-20 = "ええ。こういう時は、素直に感謝しておけば良いのですよ。"
10029040-21 = "先生からお聞きしましたが、昨日は遅くまで楽しまれたみたいですね。#nこちらの世界を気に入っていただけたようで、何よりです。"
10029040-22 = "…………。"
10029040-23 = "あ、脱出するのは簡単だったけど……"
10029040-24 = "そうでした、エイミ。#n「施設」に関して、追加でお伝えしたい情報が。"
10029040-25 = "……何か分かったの？"
10029040-26 = "あらためて確認したところ、地下からエネルギー反応が見られました。#n侵入者が現れると、セキュリティレベルが引き上げられる仕組みでしょう。"
10029040-27 = "大量の警備ドローンが押し寄せた結果、事前に用意したルートが使えない可能性もあります。"
10029040-28 = "問題ないよ。#nそれくらい、いつもの事。"
10029040-29 = "ええ。[ruby=・   ・   ・   ・]これだけ[/ruby]なら、わざわざ私も口にしません。"
10029040-30 = "……他にも何かあるの？"
10029040-31 = "はい。この先にある「施設」は、私たちの意志とは関係なく空間転移を引き起こす可能性が高いです。つまり、最も警戒すべきは――"
10029040-33 = "――時空の歪みです。"
10029040-34 = "時空の、歪み……？"
10029040-35 = "そうよねぇ。私たちがここに飛ばされた原因は分かってないわけだしぃ？"
10029040-36 = "警備システムが動き出し、「施設」が私たちを敵と見なした場合……"
10029040-37 = "今度こそ、二度と戻ってこられない世界へ飛ばされてしまうかもしれません。#nこれは、あくまで可能性の話ですが。"
10029040-38 = "……そうか。#nドローンで迎え撃つよりも、対象を転移させてしまった方が早い。"
10029040-39 = "[s1] \"……なるほど。\"\n[s2] \"ありがとう、ウタ……\""
10029040-43 = "[ns3] \"……ウタハ！？\"\n[ns4] \"どうしてエンジニア部のみんなが！？\""
10029040-46 = "つれないじゃないか、先生。"
10029040-47 = "まさか、こんな面白……"
10029040-51 = "重要な問題を私たち抜きで進めようとするだなんて。#nそれに、機械を修理する必要があるのだろう？"
10029040-52 = "「面白い」って言いかけてたように聞こえたけどぉ？"
10029040-53 = "き、気のせいだよ。#n私たちは、みんなを助けるために来たの。"
10029040-54 = "修理もだけど、「施設」に着くまでに戦闘があるかもしれないし、仲間は1人でも多い方が良いからね。"
10029040-55 = "そうです！それに、皆さんの銃を作ったのは私たちですから、不具合が生じた時もすぐに修理できます！"
10029040-56 = "もちろん、そう簡単に故障するわけありませんが！"
10029040-58 = "……多少、ビックリする仕掛けがあるかもしれませんけど！"
10029040-59 = "今、なんて……"
10029040-60 = "というか、この銃を作った……！？#n私と同じくらいの歳に見えるのに……"
10029040-61 = "ま、人が多いに越したことはないわね。#n私たちは、この世界をよく知らないわけだし。"
10029040-62 = "それに、ここまで助けてもらっておいて今さらでしょう。"
10029040-63 = "……ふぅん。"
10029040-64 = "何よ、不満でもあるの？"
10029040-65 = "い～え、なんにも？#nただ御坂さんが、いつもよりピリピリしてないなあって思っただけよぉ。"
10029040-66 = "何よ[ruby=しょくほう]、食蜂。[/ruby]ケンカ売ってるの？"
10029040-67 = "……先生？"
10029040-68 = "は、張り切ってなんかないわよ！#n……い、いや、戦いになるかもって聞いて少しはテンション上がったけど！"
10029040-69 = "[ruby=あけぼし]明星[/ruby]さんも[ruby=いずみもと]和泉元[/ruby]さんも、見ず知らずの私たちにこうして手を貸してくれて……"
10029040-70 = "エンジニア部のみんなは、銃を用意してくれただけじゃなくて、こうして駆けつけてくれて……"
10029040-71 = "……そもそも、これは私たちの問題なのに。"
10029040-73 = "御坂さんの言う通りです！#nそれに先生のおかげで、この街の魅力をたくさん知れましたもん！"
10029040-74 = "どれもあたし達にとっては新鮮で、本当に楽しい時間でした！"
10029040-75 = "それに、違う世界の学園都市同士で助け合えたらとっても素敵じゃないですか？"
10029040-76 = "私たちが助けてもらってばかりな気もするけどねぇ……。"
10029040-77 = "[s5] \"楽しんでもらえたなら良かったよ。\"\n[s6] \"私に出来ることなら、何でも協力するから。\""
10029040-80 = "……とにかく、これだけみんなの助けて借りておいて、私たちが手を抜くわけにはいかないからよ。"
10029040-81 = "……ふ～ん。"
10029040-82 = "珍しく御坂さんと気が合うわねぇ。#n借りを作りっぱなしっていうのも[ruby=しゃく]、癪だ[/ruby]しぃ？"
10029040-83 = "ふふっ。それを聞いて、私も安心しました。"
10029040-84 = "最新のデータを送りますので、確認してください。"
10029040-85 = "それと、先生。"
10029040-86 = "おそらく大丈夫かとは思いますが……どうか、お気をつけください。"
10029040-87 = "――「転移」には、多くの変数が介在するものです。#n場合によっては、想定外の事象が発生するかもしれません。"
10029040-88 = "[s7] \"分かった、みんなのことは任せて。\"\n[s8] \"この超天才清楚系先生に！\""
10029040-89 = "ええ、信じております。"
10029040-90 = "…………。"
10029040-91 = "データの送信が完了しました。"
10029040-92 = "……そ、それでは皆さん、健闘を祈ります。"
