[translation]
10029040-1 = "Episódio 4: Momentos divertidos passam num piscar de olhos"
10029040-2 = "（……Dia seguinte）"
10029040-7 = "……Entendido."
10029040-8 = "Cheguei no ponto designado, Chefe.#nÉ este prédio mesmo?"
10029040-9 = "……Sim, parece que você chegou em segurança."
10029040-10 = "Esse prédio tem uma conexão com o subsolo."
10029040-11 = "Provavelmente, a comunicação não será estável daqui para frente.#nPor favor, tome cuidado."
10029040-12 = "Tudo bem, eu já estive neste lugar uma vez.#nTenho uma ideia geral de onde ficam as \"instalações\" também."
10029040-16 = "Ainda assim, que lugar desolado.#nPensar que nos trouxeram de um lugar tão longe..."
10029040-17 = "E ainda por cima, enquanto estávamos inconscientes...#nSinto muito mesmo por isso."
10029040-19 = "Não se preocupe.#nSó achei que seria mais eficiente transportar as três de uma vez."
10029040-20 = "Sim. Nessas horas, é melhor apenas agradecer sinceramente."
10029040-21 = "Ouvi do Sensei que vocês se divertiram até tarde ontem.#nFico feliz que tenham gostado deste mundo."
10029040-22 = "…………."
10029040-23 = "Ah, sair de lá foi fácil, mas..."
10029040-24 = "É verdade, Eimi.#nTenho informações adicionais sobre a \"instalação\" para compartilhar."
10029040-25 = "……Descobriu alguma coisa?"
10029040-26 = "Ao verificar novamente, detectei reações de energia vindas do subsolo.#nProvavelmente é um mecanismo que aumenta o nível de segurança quando invasores aparecem."
10029040-27 = "Como resultado, uma grande quantidade de drones de segurança pode surgir, tornando a rota planejada inutilizável."
10029040-28 = "Sem problemas.#nIsso é rotina para mim."
10029040-29 = "Sim. Se fosse só isso, eu nem me daria ao trabalho de mencionar."
10029040-30 = "……Tem mais alguma coisa?"
10029040-31 = "Sim. A \"instalação\" à frente tem uma alta probabilidade de causar teletransporte espacial, independentemente da nossa vontade. Ou seja, o que devemos temer mais é..."
10029040-33 = "――Distorções espaço-temporais."
10029040-34 = "Distorções... espaço-temporais?"
10029040-35 = "Pois é. Afinal, nem sabemos o motivo de termos sido enviadas para cá, né?"
10029040-36 = "Se o sistema de segurança for ativado e a \"instalação\" nos considerar inimigas..."
10029040-37 = "Desta vez, podemos acabar sendo enviadas para um mundo de onde nunca mais voltaremos.#nIsso é apenas uma possibilidade, claro."
10029040-38 = "……Entendi.#nEm vez de nos atacar com drones, é mais rápido nos teletransportar para longe."
10029040-39 = "[s1] \"……Entendo.\"\n[s2] \"Obrigada, Utaha……\""
10029040-43 = "[ns3] \"……Utaha!?\"\n[ns4] \"Por que o pessoal do Clube de Engenharia está aqui!?\""
10029040-46 = "Que frieza, Sensei."
10029040-47 = "Quem diria que algo tão interessante..."
10029040-51 = "Tentar resolver um problema importante sem a gente. Além disso, vocês precisam consertar as máquinas, não é?"
10029040-52 = "Pareceu que você ia dizer \"interessante\", não foi?"
10029040-53 = "I-impressão sua.#nViemos para ajudar todo mundo."
10029040-54 = "Além dos reparos, pode haver combates até chegarmos à \"instalação\", então é melhor ter o máximo de aliados possível."
10029040-55 = "Isso mesmo! E como fomos nós que fabricamos as armas de vocês, podemos consertá-las rapidamente se houver algum defeito!"
10029040-56 = "Claro, não é como se elas fossem quebrar tão facilmente!"
10029040-58 = "……Embora possa haver alguns truques que surpreendam um pouco!"
10029040-59 = "O que você disse agora..."
10029040-60 = "Quer dizer que vocês fizeram essa arma...!?#nMesmo parecendo ter a minha idade..."
10029040-61 = "Bem, quanto mais gente, melhor.#nNós não conhecemos muito bem este mundo, afinal."
10029040-62 = "E depois de toda a ajuda que recebemos, não faz sentido recusar agora."
10029040-63 = "……Hmm."
10029040-64 = "O que foi? Está insatisfeita?"
10029040-65 = "Nãão, nada.#nSó achei que a Misaka está menos tensa do que o normal, só isso."
10029040-66 = "O que foi, Shokuhou? Está querendo briga?"
10029040-67 = "……Sensei?"
10029040-68 = "E-eu não estou empolgada nem nada!#n……B-bem, eu admito que fiquei um pouco animada ao ouvir que poderia haver uma luta!"
10029040-69 = "Tanto Akeboshi-san quanto Izumimoto-san, nos ajudando assim, mesmo sendo completos estranhos..."
10029040-70 = "O pessoal do Clube de Engenharia não só preparou as armas para nós, como também veio correndo ajudar..."
10029040-71 = "...Para começo de conversa, isso deveria ser um problema nosso."
10029040-73 = "A Misaka-san tem razão!#nAlém disso, graças ao Sensei, pudemos conhecer muitas das maravilhas desta cidade!"
10029040-74 = "Tudo foi tão novo para nós, passamos momentos realmente divertidos!"
10029040-75 = "E não seria maravilhoso se as Cidades Acadêmicas de mundos diferentes pudessem se ajudar?"
10029040-76 = "Embora eu sinta que só estamos recebendo ajuda, né..."
10029040-77 = "[s5] \"Fico feliz que tenham se divertido.\"\n[s6] \"Farei o que estiver ao meu alcance para ajudar.\""
10029040-80 = "...De qualquer forma, depois de receber tanta ajuda de todos, não podemos nos dar ao luxo de pegar leve."
10029040-81 = "...Hum."
10029040-82 = "É raro eu concordar com a Misaka-san.#nE também, ficar devendo favores é algo que me irrita, sabe?"
10029040-83 = "Fufu. Ouvir isso me deixa aliviada."
10029040-84 = "Estou enviando os dados mais recentes, por favor, verifique-os."
10029040-85 = "E, Sensei."
10029040-86 = "Acredito que provavelmente ficará tudo bem, mas... por favor, tome cuidado."
10029040-87 = "――A \"transferência\" envolve muitas variáveis.#nDependendo do caso, eventos inesperados podem ocorrer."
10029040-88 = "[s7] \"Entendido, pode deixar o pessoal comigo.\"\n[s8] \"Pode deixar com este Sensei super genial e puro!\""
10029040-89 = "Sim, eu confio em você."
10029040-90 = "…………."
10029040-91 = "O envio dos dados foi concluído."
10029040-92 = "...B-bem, então, desejo boa sorte a todos vocês."
