[translation]
2300206-1 = "Cirurgia ao estilo da Trinity"
2300206-2 = "Sala de tratamento do Esquadrão de Socorro da Trinity"
2300206-3 = "Obrigada por me ajudar a carregar tudo, Sensei!"
2300206-4 = "Havia muito mais suprimentos médicos faltando nos registros do que eu pensava, e se eu tivesse que organizar o depósito sozinha, levaria o dia todo."
2300206-5 = "[s] \"De nada, não foi nada demais.\""
2300206-6 = "Fico feliz que diga isso, hehe."
2300206-7 = "Ah, Sensei, cuidado onde pisa... acabei de passar um pano úmido ali."
2300206-9 = "Escorrega, TUM!"
2300206-10 = "Se-Sensei! Você está bem!?"
2300206-13 = "[ns] \"Ai... ralei um pouco, mas estou bem...\""
2300206-14 = "Seu joelho está sangrando! Preciso tratar isso imediatamente...!"
2300206-15 = "Vamos amputar sua perna agora mesmo para evitar uma infecção!!"
2300206-16 = "[s] \"Amputar!?\""
2300206-17 = "Hã? Por que está tão surpreso, Sensei?"
2300206-18 = "Se não cortarmos a perna logo, germes perigosos podem entrar e a ferida pode infeccionar."
2300206-19 = "Estava escrito exatamente assim em um livro de medicina antigo que li!"
2300206-20 = "[s] \"Esse livro de medicina, quão antigo ele é...?\""
2300206-21 = "Bem... acho que tem uns 500 anos!"
2300206-22 = "Não se preocupe! Segundo o livro, um médico habilidoso consegue fazer uma amputação em menos de um minuto...!"
2300206-23 = "Vou terminar rápido para não doer!"
2300206-24 = "[s] \"Um curativo é o suficiente! Não precisa cortar, está bem!?\""
2300206-25 = "Tem certeza mesmo?"
2300206-27 = "Hmm... bem, vamos fazer assim desta vez. Então, sente-se aqui!"
2300206-30 = "[wa:400]— Vamos lá, [wa:800] primeiro [wa:800] vou desinfetar o ferimento,"
2300206-32 = "— tire a meia e [wa:800] fique quietinho!"
2300206-35 = "[wa:400]— Se não [wa:400] desinfetar direito,"
2300206-37 = "[wa:100]— a ferida pode inflamar [wa:1600] e virar um [wa:1200] problemão."
2300206-40 = "[wa:600]— Pode doer um pouquinho, mas [wa:1500] aguente firme!"
2300206-42 = "— Hum, [wa:400] pronto...! [wa:900] Limpinho, [wa:400] limpinho... [wa:800] pronto!"
2300206-45 = "[wa:400]— Pronto, [wa:700] você aguentou muito bem!"
2300206-47 = "— Falta só mais um pouquinho."
2300206-50 = "[wa:500]— Como um bônus especial,"
2300206-52 = "— vou lançar um [wa:1100] feitiço mágico para [wa:700] a ferida sarar rápido!"
2300206-55 = "— Então, [wa:1300] dorzinha, [wa:800] dorzinha, [wa:1200] vai embora!"
2300206-57 = "— Como se sente? [wa:900] A dor passou?"
2300206-60 = "Agora é só passar o remédio na ferida e colocar um curativo por cima... e pronto!"
2300206-61 = "Terminei! Bom trabalho, Sensei!"
2300206-62 = "Tome cuidado para não deixar o curativo cair, viu!"
2300206-63 = "[s] Que curativo fofo."
2300206-64 = "Sim, é o meu favorito! A cor é linda e ele tem um cheirinho doce!"
2300206-65 = "Mas como ele é pequeno, não dá para usar em feridas grandes ou partes amputadas."
2300206-66 = "Pensando bem, acho que não daria para amputar sua perna mesmo..."
2300206-67 = "[s] \"Foi por isso que você mudou de ideia agora pouco!?\""
