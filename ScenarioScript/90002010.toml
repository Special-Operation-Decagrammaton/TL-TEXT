[translation]
90002010-1 = "Episódio 1; Mudança de Fase"
90002010-4 = "Soph! Eu já disse várias vezes, não disse?#nA irmã mais velha aqui também está começando a ficar brava, sabe?"
90002010-5 = "Desculpe, irmã Ain!#nEu não farei mais isso, por favor, me perdoe..."
90002010-6 = "B-bem, só desta vez, está bem?#nHehehe, a irmã aqui sabe que a Soph é uma boa menina."
90002010-7 = "E você também, Owl! Não deve implicar tanto com a Soph.#nVocê também está exagerando, Owl!"
90002010-8 = "Mas foi a Soph quem começou..."
90002010-9 = "Owl!"
90002010-10 = "E-entendido...#nDesculpe... Isso serve?"
90002010-11 = "Hmm... B-bem, ainda parece que você não se arrependeu de verdade..."
90002010-12 = "Mas, para o padrão do Owl, você se esforçou! Muito bem, muito bem."
90002010-18 = "Ain? O que você está fazendo?"
90002010-19 = "Hyaaaaah!? Irmã Malkuth!?"
90002010-22 = "Entendo. É uma dessas 'brincadeiras de casinha' que os humanos costumam fazer."
90002010-23 = "E estas bonecas mecânicas são, respectivamente, a Soph e a Owl, correto?"
90002010-24 = "S-sim... Desculpe, irmã Malkuth..."
90002010-25 = "Não peça desculpas. Se a Ain estava se divertindo, eu também fico feliz."
90002010-26 = "E então... o que dizer desta boneca mecânica aqui?"
90002010-27 = "Sim! Essas crianças são... bem..."
90002010-28 = "E-elas são minhas irmãs mais novas!"
90002010-29 = "Entendo...?"
90002010-30 = "P-por isso, elas também são irmãs mais novas da irmã Malkuth!"
90002010-31 = "Hum...?"
90002010-32 = "Bem... essas crianças são minhas irmãs mais novas e... e-eu sou irmã mais nova da irmã Malkuth, então..."
90002010-33 = "Eu sei, Ain. Isso significa que eu sou a 'irmã mais velha', não é?"
90002010-34 = "S-sim! Exatamente!"
90002010-35 = "Então...#nPrazer em conhecê-las. Meu nome é Malkuth."
90002010-36 = "A-a irmã mais velha cumprimentou as irmãs mais novas...!#nO-o que eu faço... estou tão feliz que meus circuitos quase entraram em curto...!"
90002010-37 = "A propósito, Ain?"
90002010-38 = "Sim!"
90002010-39 = "Não existe uma boneca minha?"
90002010-45 = "D-d-d-desculpe, irmã! E-eu não imaginava que isso aconteceria... E-eu farei uma imediatamente!"
90002010-46 = "Está tudo bem."
90002010-47 = "Afinal, estamos apenas esperando pelo 'momento final'."
90002010-48 = "Eu acho que relaxar um pouco a tensão é o ideal."
90002010-49 = "M-mas... precisamos mudar urgentemente a fase do 'Poder dos Deuses Sem Nome' que flui pelo Continente de Aço..."
90002010-50 = "Ugh... S-se ao menos a Princesa e a serva não estivessem aqui..."
90002010-51 = "Eu acredito na Ain. Não estou nem um pouco preocupada."
90002010-52 = "Além disso, a 'boneca mecânica Malkuth' também será feita por você, não é, Ain?"
90002010-53 = "……!"
90002010-54 = "C-claro que sim! Irmã!"
90002010-55 = "Mas, se for assim... a boneca mecânica Malkuth se tornará outra irmã mais nova da Ain, não é?"
90002010-56 = "— Olá, irmã Ain."
90002010-57 = "Kyaaaaaah!?"
90002010-58 = "A irmã Malkuth me chamou de... irmã mais velha..."
90002010-63 = "Será que exagerei um pouco na brincadeira...?"
90002010-65 = "……."
90002010-66 = "Ah... o que eu faço..."
90002010-67 = "……."
90002010-68 = "Tiphereth..."
90002010-75 = "Soph? O que você está fazendo?"
90002010-76 = "Uau!? Irmã Malkuth!?"
90002010-77 = "E-er..."
90002010-78 = "O que você está segurando... é uma caixa para selar algo?"
90002010-79 = "Parece um pouco rachada, mas... o que é isso?"
90002010-80 = "Isto é... bem..."
90002010-81 = "...Uma caixa contendo sementes. Uma das que Tiphereth nos enviou."
90002010-82 = "Você também sabe, não sabe, irmã? Que Tiphereth priorizou as sementes acima de si mesma..."
90002010-83 = "Sim. E nós decidimos respeitar essa escolha."
90002010-84 = "Mas algumas das caixas não estavam em boas condições de armazenamento."
90002010-85 = "...Esta é a pior de todas."
90002010-86 = "O que você quer dizer com condições de armazenamento ruins?"
90002010-87 = "...Elas estão em um estado onde podem germinar a qualquer momento."
90002010-88 = "Mas mesmo assim, não faz sentido brotarem no Continente de Aço..."
90002010-89 = "Ah, eu sei que não é do meu feitio ficar preocupada com essas coisas!"
90002010-90 = "Mas a Tiphereth..."
90002010-91 = "..."
90002010-92 = "Soph. Tiphereth está, neste exato momento, certamente conosco."
90002010-93 = "Sim..."
90002010-94 = "E eu também entendo o seu desejo, Soph, de valorizar a vontade de Tiphereth."
90002010-95 = "Portanto, que tal fazermos isto?"
90002010-101 = "Que tal plantarmos as sementes secretamente... no solo sagrado?"
90002010-102 = "I-irmã!? Mas isso é...!"
90002010-104 = "Sim, eu sei. É um ato que pode ir contra as nossas leis."
90002010-105 = "Mas o solo sagrado é o início do Continente de Aço e o único lugar onde ainda resta 'solo' de verdade."
90002010-106 = "Isso porque não usamos a habilidade de Netzach apenas lá..."
90002010-107 = "No solo sagrado, a vontade d'Ele ainda..."
90002010-108 = "Então, que tal pensarmos desta forma?"
90002010-109 = "Se as sementes superarem todas as dificuldades e criarem raízes... esse será o momento em que o livre-arbítrio deixado por Tiphereth dará frutos."
90002010-110 = "Pois o livre-arbítrio é um elemento importante não apenas para os humanos, mas para nós e, consequentemente, para Ele também."
90002010-111 = "Mesmo que, no fim das contas, tudo isso não passe de uma mentira baseada em uma ilusão."
90002010-112 = "Mas... será que é realmente certo...?"
90002010-113 = "Claro que não é algo certo."
90002010-114 = "Irmã!?"
90002010-115 = "Isso é uma 'coisa errada' que faremos juntas."
90002010-116 = "Uma coisa... errada...!"
90002010-117 = "E, por algum motivo, parece que fazer coisas erradas é 'divertido'."
90002010-118 = "Sim. Dizem que o nome disso é sentimento de culpa..."
90002010-119 = "Portanto, apenas desta vez, vamos fazer algo errado juntas."
90002010-120 = "Tiphereth ainda está conosco."
90002010-121 = "Mas... você está preocupada porque não quer esquecer a Tiphereth, não é?"
90002010-122 = "E, acima de tudo, estamos esperando pelo 'momento final'."
90002010-123 = "Foi você quem disse isso primeiro, irmã...?"
90002010-124 = "Sim. Vamos fazer uma travessura, como boas irmãs."
90002010-125 = "Sim!"
90002010-130 = "Mudando de assunto..."
90002010-131 = "A conversão de fase do 'Poder dos Deuses Sem Nome' está ocorrendo conforme o planejado?"
90002010-132 = "Ah, isso? Não precisa se preocupar, irmã. Mesmo que aqueles dois cheguem ao Continente de Aço, eles não deveriam ser capazes de manipular a energia livremente."
90002010-133 = "...É uma pena que não tenhamos conseguido converter tudo desde a raiz."
90002010-134 = "Mas se fizermos errado, o próprio Continente de Aço, que é construído com esse poder, pode acabar se tornando inutilizável..."
90002010-135 = "Entendo. Então, vamos compensar o que falta por conta própria."
90002010-136 = "Hum..."
90002010-140 = "Owl? O que você está fazendo?"
90002010-141 = "..."
90002010-142 = "...?"
90002010-143 = "Entendo, você está imersa em seu próprio mundo."
90002010-144 = "Sendo assim, com licença."
90002010-152 = "Munya munya..."
90002010-157 = "Ehem. Owl? O que você está fazendo?"
90002010-158 = "Funya...?"
90002010-162 = "Ué!? Irmã Malkuth!? Por que você está aqui...!?"
90002010-163 = "Não há motivo para se surpreender."
90002010-164 = "Como regra, eu posso ir a qualquer lugar deste Continente de Aço."
90002010-165 = "De fato, é verdade, mas..."
90002010-166 = "Hum... este é um mundo extremamente... 'natural'."
90002010-167 = "...Você também acha isso, irmã?"
90002010-168 = "Nós temos partes em nossos circuitos de consciência que poderiam ser chamadas de 'caixas-pretas', não temos?"
90002010-169 = "Sim. Se usarmos a terminologia humana, poderíamos dizer que é a área do inconsciente."
90002010-170 = "Eu fiquei curiosa sobre como isso funcionava, então extraí uma parte dos meus circuitos de consciência como um Big Data."
90002010-171 = "E só isso foi o suficiente para reproduzir este mundo mental?"
90002010-172 = "Pois é. Como Soph vive falando sobre vida e natureza, parece que acabei sendo influenciada por ela."
90002010-173 = "Apesar disso, a paisagem não é lá essas coisas."
90002010-174 = "Mas, bem..."
90002010-175 = "Só que..."
90002010-176 = "Estar aqui faz com que o ruído nos meus circuitos de pensamento pareça diminuir..."
90002010-177 = "Eu sinto o mesmo."
90002010-178 = "A propósito, ouvi de Ain e Soph que você está convertendo a fase do 'Poder dos Deuses Sem Nome'."
90002010-179 = "Eh? Ah, sim... #nAh, pensar que no final de tudo, eu teria que fazer algo assim..."
90002010-180 = "Terei que reajustar o seu corpo também, irmã... #nBem, não vai demorar muito."
90002010-181 = "Isso tudo é culpa daquele humano chamado Sensei [USERNAME]. Francamente!"
90002010-182 = "Calma, calma, não fique tão irritada."
90002010-183 = "Se conversarmos com sinceridade, o Sensei [USERNAME] certamente nos entenderá."
90002010-184 = "Sendo assim, por que não tomamos um banho de sol juntas?"
90002010-185 = "Um banho de sol?"
90002010-186 = "É o ato de se deitar e não fazer nada enquanto se é banhado pela luz solar."
90002010-187 = "Não passa de uma 'sensação de estar sob a luz' fornecida como um sinal elétrico —"
90002010-188 = "E o circuito sensorial que recebe esse sinal apenas retorna um sinal de feedback dizendo que está 'satisfeito'."
90002010-189 = "Ainda assim, só de poder passar um tempo com você, Owl, eu considero uma atividade bastante significativa."
90002010-193 = "Sim! Com certeza, irmã!"
90002010-194 = "Então, vamos fazer isso."
90002010-198 = "Afinal, somos nós que estamos esperando pelo 'momento final'."
90002010-201 = "Próximo episódio: Ventos de tempestade se aproximam"
