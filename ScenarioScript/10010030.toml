[translation]
10010030-1 = "Episódio 3: Rumo à Fortaleza da Favela (1)"
10010030-6 = "(Primeiro, para conseguir o bolo de edição limitada \"Miracle 5000\", segui em direção ao Rio Solut.)"
10010030-13 = "(Ao chegar à margem do rio, notei uma agitação estranha e antinatural...)"
10010030-14 = "Ei, então vamos ficar assim mesmo...?"
10010030-15 = "Sim. Até que o Comitê de Justiça resolva isso, não temos outra escolha a não ser esperar..."
10010030-16 = "Será que eles virão? Este lugar fica quase fora de Trinity..."
10010030-17 = "Pode ser... Ah, droga, e olha que venho aqui todo dia ultimamente!"
10010030-18 = "[s] \"...?\""
10010030-20 = "Hum... O que está acontecendo aqui? Vocês parecem tão desanimadas..."
10010030-21 = "...Ah, Sensei?"
10010030-22 = "Por que o Sensei está aqui?"
10010030-23 = "Ora, você é um conhecido do Sensei...?"
10010030-28 = "Quanto tempo. Quem é essa pessoa ao seu lado...?"
10010030-29 = "Dá para ver, não dá? É uma irmã da igreja."
10010030-30 = "Não, não é nesse sentido... Quer dizer, você está me zoando?"
10010030-31 = "..."
10010030-32 = "...Por que você ficou em silêncio agora?"
10010030-33 = "Pensei melhor e, na verdade, acho que existe essa possibilidade."
10010030-35 = "Você está me zoando mesmo, seu idiota!!"
10010030-37 = "Hum, desculpem interromper a conversa. Olá, meu nome é Hinata, da Sisterhood."
10010030-38 = "Na verdade, vim aqui para comprar um bolo chamado \"Miracle 5000\", mas..."
10010030-40 = "Ah, então a irmã também veio por isso? Na verdade, nós viemos com o mesmo objetivo!"
10010030-41 = "Mas, infelizmente, não conseguimos comprar..."
10010030-42 = "S-sério? Será que esgotou...?"
10010030-43 = "Não, não foi bem isso, é que..."
10010030-44 = "Fomos seduzidas pelas distorções do capitalismo."
10010030-46 = "...O Miracle 5000 também. E nós também."
10010030-47 = "[s1] \"Distorções do capitalismo...?\"\n[s2] Perguntar o que aconteceu."
10010030-48 = "Bem, na verdade, não é uma história tão complicada assim."
10010030-49 = "Bem, na verdade, não é uma história tão complicada assim."
10010030-50 = "Um bolo raro e limitado, com quantidade restrita. Se todos o desejam, seu valor aumenta naturalmente."
10010030-51 = "Quando isso se acumula, em algum momento, o que chama a atenção não é o bolo em si, mas o \"valor do bolo\"..."
10010030-52 = "Às vezes, a linha entre as coisas se perde, e acabamos sofrendo as consequências."
10010030-53 = "Hã, como é...?"
10010030-54 = "Desculpe, ela tem esse jeito de falar."
10010030-55 = "Em resumo: alguém decidiu revender o \"Miracle 5000\" para lucrar e comprou todo o estoque..."
10010030-56 = "E para garantir que não produzissem mais, levaram até o dono da confeitaria junto com o caminhão. Imagino que isso aumente o lucro deles."
10010030-57 = "Agora, se você quiser conseguir um, tem que ir até a favela e pagar um preço absurdo."
10010030-58 = "Por que fariam algo assim...? Comida deveria ser algo para todos compartilharem e saborearem..."
10010030-59 = "Bem, sendo uma edição limitada, seria difícil \"para todos\" de qualquer jeito."
10010030-60 = "Deixando isso de lado, não posso perdoar alguém que faz isso por causa de revenda!"
10010030-61 = "Isso é um insulto aos doces!!"
10010030-63 = "Por isso, nós do \"Clube dos Amantes do Miracle 5000\" estávamos reunidos tentando decidir o que fazer."
10010030-64 = "[s3] \"Realmente, a revenda é inaceitável...\"\n[s4] \"Nossa, tem bastante gente reunida aqui.\""
10010030-69 = "Nos reunimos, mas só isso não resolve o problema, né."
10010030-70 = "A conversa não funcionou, então não sabemos o que fazer..."
10010030-71 = "Levaram o caminhão inteiro, guardaram dentro de um prédio e bloquearam toda a área. Eles não brincam em serviço."
10010030-72 = "Virou uma fortaleza. Acho que só um \"grupo de combate de verdade\", como o Comitê de Justiça, conseguiria resolver."
10010030-73 = "...?"
10010030-74 = "...Entendo?"
10010030-78 = "Talvez a gente consiga resolver."
10010030-79 = "Hã?"
10010030-80 = "O que você quer dizer com isso?"
10010030-81 = "Quem se prepara, não se desespera... Eu já estou pronta."
10010030-83 = "Um \"grupo de combate de verdade\". Pelo menos, podemos chegar perto disso, não é?"
10010030-84 = "……?"
10010030-85 = "Err, Natsu-chan?"
10010030-87 = "Airi, o que você acha que é necessário para ser um \"grupo de combate de verdade\"?"
10010030-88 = "Lá vem o quiz de novo..."
10010030-89 = "Bem... armas de fogo, pessoal de combate, além de cada função e..."
10010030-91 = "……Entendi."
10010030-92 = "O que a Airi disse está correto, mas o que falta é um \"comandante\"."
10010030-93 = "Comandante...?"
10010030-94 = "……Ah."
10010030-95 = "[s5] \"Isso significa que...\"\n[s6] \"……Eu?\""
10010030-96 = "Hehe... como você adivinhou, \"Commander\"."
10010030-97 = "Hehe... como você adivinhou, \"Commander\"."
10010030-98 = "Vamos lá. Guie-nos e liberte o milagre. Para levar doces bênçãos a todas as regiões..."
10010030-99 = "……É isso, né?"
10010030-100 = "[s7] \"Já que vocês parecem estar em apuros, por mim tudo bem...\"\n[s8] \"Hinata, você também está de acordo?\""
10010030-107 = "S-sim, com certeza!"
10010030-108 = "Claro que nós também precisamos daquele bolo... mas, antes disso, não podemos ignorar pessoas em apuros."
10010030-109 = "Por isso, por favor, deixe-nos ajudar!"
10010030-110 = "Isso, entendido! Se é assim, então não precisamos perder tempo!"
10010030-111 = "Vamos lá, é guerra total! Já que chegamos a esse ponto, vamos avançar de frente!"
10010030-112 = "Partida imediata!"
10010030-116 = "Nós não seremos escravas da revenda!! Nós seremos as donas dos doces!"
10010030-117 = "Essa fala me parece familiar..."
10010030-118 = "Vamos avançar, apenas seguir em frente!!"
10010030-124 = "Err, err..."
10010030-125 = "A-aaaaahhh...!?"
10010030-131 = "Nossa, que negócio lucrativo. Devia ter pensado nisso antes."
10010030-132 = "Quem diria que teria gente disposta a pagar aquele preço... hoje o lucro foi muito bom."
10010030-133 = "Haha, que maravilha."
10010030-134 = "Acho que teve muitos alunos de Trinity. É uma sorte que eles paguem bem."
10010030-135 = "Se continuar assim, vamos ficar ricas rapidinho!"
10010030-139 = "Hm? Tem alguém vindo...?"
10010030-144 = "……"
10010030-145 = "O que foi? Você também veio comprar o \"Milagre 5000\"?"
10010030-146 = "Se chegou até aqui, já sabe como as coisas funcionam, né? Então, quanto vai pagar?"
10010030-147 = "Quanto, é..."
10010030-148 = "Ah, é melhor nem tentar negociar, viu? Se irritar a gente, não vai conseguir comprar nem oferecendo o dobro depois――"
10010030-153 = "……?"
10010030-154 = "……Então, o pagamento é este aqui."
10010030-158 = "Guh...!?"
10010030-163 = "O-o que é isso! Tá querendo briga!?"
10010030-164 = "Acha mesmo que vai ganhar sozinha!?"
10010030-165 = "……Eu não estou sozinha."
10010030-171 = "Todos os companheiros que amam doces, agora é a hora de se levantar!"
