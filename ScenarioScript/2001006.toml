[translation]
2001006-1 = "Capítulo de Treinamento e Descanso"
2001006-2 = "Muito obrigado por visitar o escalda-pés \"Gutugutu\" hoje."
2001006-3 = "Como talvez já saiba, este escalda-pés é rico em componentes naturais, sendo especialmente eficaz para entorses e doenças de pele."
2001006-4 = "Além disso, criamos um belo jardim ao redor para que possa apreciar a vista enquanto desfruta do banho, então, por favor, sinta-se à vontade para contemplá-lo com calma."
2001006-10 = "Ah, era um... escalda-pés?"
2001006-11 = "Que susto... achei que acabaríamos entrando em uma fonte termal junto com o Sensei..."
2001006-12 = "[s] \"Você preferia outra fonte termal?\""
2001006-13 = "N-não! Um escalda-pés já está de bom tamanho! Eu não aguentaria!"
2001006-14 = "Só machuquei o tornozelo, não preciso de um tratamento de corpo inteiro..."
2001006-15 = "Para entrarmos em um banho de verdade juntos, eu precisaria de preparação mental..."
2001006-16 = "[s] \"Nodoka?\""
2001006-17 = "N-não é nada!"
2001006-24 = "Vamos lá, Sensei. Vamos colocar os pés na água logo."
2001006-27 = "[wa:550]— Ah... [wa:1550] que água boa."
2001006-29 = "— Só de entrar, [wa:1100] sinto como se a [wa:600] dor tivesse desaparecido."
2001006-32 = "[wa:1100]— A paisagem ao redor também [wa:1550] é muito bonita..."
2001006-35 = "— O jardim também [wa:470] é maravilhoso,"
2001006-37 = "— É um lugar [wa:500] realmente encantador."
2001006-40 = "[wa:500]— Tem um teto, [wa:1400] então não dá para ver o céu estrelado,"
2001006-42 = "[wa:300]— o que é uma pena..."
2001006-45 = "[ns] \"Desculpe, não tinha pensado nisso.\""
2001006-46 = "[wa:600]— ...Não,"
2001006-48 = "— Talvez tenha sido [wa:900] melhor assim."
2001006-51 = "[wa:650]— Poder aproveitar uma fonte termal [wa:1300] a sós com o Sensei,"
2001006-54 = "— Uma felicidade dessas..."
2001006-56 = "— Tenho que manter [wa:1500] em segredo das estrelas."
2001006-59 = "[ns] \"Como está o seu tornozelo?\""
2001006-60 = "É incrível, a dor sumiu tão rápido..."
2001006-61 = "Obrigada por me trazer a um lugar tão bom, Sensei."
2001006-62 = "[s] \"Que bom. Quer ir embora agora?\""
2001006-63 = "...Não. Já que viemos até aqui, seria um desperdício ir embora agora!"
2001006-64 = "Parece que há muitas outras coisas por aqui, e o local é tão vasto que pode ser chamado de um vilarejo termal... Quero ver com meus próprios olhos o que estão vendendo e que tipo de serviços oferecem."
2001006-70 = "Já que estamos aqui, claro que quero aproveitar, mas... isso também é, sim, parte do meu treinamento!"
2001006-72 = "Depois disso, aproveitei ao máximo o vilarejo termal noturno junto com a Nodoka."
