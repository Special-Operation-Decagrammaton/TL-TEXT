[translation]
2001006-1 = "修行・休息編"
2001006-2 = "本日は足湯「ぐつぐつ」へお越しいただき、誠にありがとうございます。"
2001006-3 = "すでにご存じかもしれませんが、こちらの足湯には天然成分が豊富に溶け込んでおりまして、特に捻挫や皮膚の疾患などによく効きます。"
2001006-4 = "また、足浴を楽しんでいただきながら視界も楽しめるよう、周辺に美しい庭園を造っておりますので、そちらもどうぞごゆっくりご鑑賞ください。"
2001006-10 = "あ、足湯、でしたか……。"
2001006-11 = "びっくりしました……まさか先生と一緒に、温泉に入れることになってしまったのかと……。"
2001006-12 = "[s] \"どこか他の温泉の方が良かった？\""
2001006-13 = "い、いえ！今は足湯で十分です！私が持たないので！"
2001006-14 = "怪我したのは足首だけですし、全身を湯治する必要はありませんし……！"
2001006-15 = "ふたりで本当にお風呂に入るには、心の準備が……。"
2001006-16 = "[s] \"ノドカ？\""
2001006-17 = "な、何でもありません！"
2001006-24 = "さあ、先生。早くお湯に浸かりましょう。"
2001006-27 = "[wa:550]― はぁ……[wa:1550]良いお湯ですね。"
2001006-29 = "― もう入っただけで[wa:1100]痛みが[wa:600]無くなったような気分です。"
2001006-32 = "[wa:1100]― 辺りの風景も、[wa:1550]すごくきれいで……。"
2001006-35 = "― 庭園も[wa:470]素晴らしいですし、"
2001006-37 = "― 本当に[wa:500]素敵な場所ですね。"
2001006-40 = "[wa:500]― 屋根があって、[wa:1400]星空が見えないのは"
2001006-42 = "[wa:300]― 少し残念ですが……"
2001006-45 = "[ns] \"ごめんね、盲点だった。\""
2001006-46 = "[wa:600]― ……いえ、"
2001006-48 = "― これで良かったのかも[wa:900]しれません。"
2001006-51 = "[wa:650]― 先生とふたりっきりで[wa:1300]温泉を楽しめるだなんて、"
2001006-54 = "― こんな幸せ……"
2001006-56 = "― お星様には、[wa:1500]秘密にしておかないと。"
2001006-59 = "[ns] \"足首の調子はどう？\""
2001006-60 = "すごいですね、こんなにすぐに痛みが無くなるなんて……。"
2001006-61 = "良いところに連れてきていただいてありがとうございます、先生。"
2001006-62 = "[s] \"それは良かった。そろそろ帰る？\""
2001006-63 = "……いえ。せっかくここまで来たのに、このまま帰るのはもったいないです！"
2001006-64 = "他にも色々あるようですし、全体としては温泉郷と呼べるほどの広さがあるようですし……どんなものを売っていて、どんなサービスを提供しているのか、この目で色々と見ておきたいなと。"
2001006-70 = "せっかくなので、もちろん純粋に楽しみたい気持ちもありますが……これも、はい。修行の一環として！"
2001006-72 = "その後、ノドカと一緒に夜の温泉郷を思う存分楽しんだ。"
