[translation]
1600915-1 = "A garota ninja quer que você se lembre!"
1600915-2 = "Entrada da rua comercial"
1600915-3 = "Hehe... Eu sabia que você viria, Sensei."
1600915-4 = "Como alguém que aspira ser um ninja, não tem como ignorar isso, né!"
1600915-5 = "[s] \"Eu... aspirava ser um ninja!?\""
1600915-6 = "O que é isso, só agora que você percebeu?"
1600915-7 = "Enfim, a mídia de gravação antiga que eu trouxe é..."
1600915-8 = "Isto!"
1600915-12 = "[ns] \"...Uma fita de vídeo!?\""
1600915-13 = "Eu sabia que você conhecia, Sensei~"
1600915-14 = "Sim, algo que quase foi esquecido hoje em dia... uma fita de vídeo!"
1600915-15 = "[s1] \"Que nostálgico...\".\n[s2] \"Que vídeo é esse?\""
1600915-18 = "Fufu, está curioso? Está, né?"
1600915-19 = "Neste vídeo tem..."
1600915-20 = "Inacreditavelmente...!"
1600915-21 = "[s] \"O registro do dia em que a Michiru deu seus primeiros passos, talvez...?\""
1600915-22 = "Nyaa!?"
1600915-23 = "Errado! Como você chegou a essa conclusão!?"
1600915-24 = "[s] \"Não é, então...\""
1600915-25 = "Por que você parece decepcionado!?"
1600915-26 = "De, de qualquer forma, neste vídeo tem...!"
1600915-27 = "Algo que qualquer um que segue o caminho ninja conhece..."
1600915-28 = "Um filme em preto e branco filmado pelo diretor \"Karasu Nyan-nyan\" quando ele ainda estava começando!"
1600915-29 = "Contém \"Os Três Ninjas da Sala de Aula Secreta\"!"
1600915-33 = "[ns] \"...Entendi?\""
1600915-34 = "Que reação fraca!?"
1600915-35 = "Nessas horas, vocês deveriam trocar olhares intensos de quem entende o que o outro está dizendo! #nEssa é a regra de ouro dos ninjas, não é!?"
1600915-36 = "...Espera, é a primeira vez que ouve falar?"
1600915-37 = "B-bem, é verdade que as obras do diretor Karasu Nyan-nyan são um pouco antigas... #ne a maioria são filmes em preto e branco, então é difícil de conseguir hoje em dia..."
1600915-38 = "...Mas você aprendeu isso nos livros didáticos, não aprendeu!?"
1600915-39 = "[s] \"Será que não estava lá!? Pelo menos não no meu livro!\""
1600915-40 = "De qualquer forma! #nNão acredito que você nunca assistiu a \"Os Três Ninjas da Sala de Aula Secreta\"..."
1600915-41 = "Isso significa que ainda resta muita diversão na vida do Sensei."
1600915-42 = "Que inveja, poder assistir a isso pela primeira vez agora...!"
1600915-43 = "[s] \"Tudo isso por causa de um filme!?\""
1600915-44 = "Com certeza!"
1600915-45 = "Porque eu... entrei no mundo ninja depois de assistir a esse filme."
1600915-46 = "[s3] \"Um filme tão memorável assim...\". \n[s4] \"Isso é incrível!\""
1600915-49 = "Viu só!?"
1600915-50 = "[s] \"Então, hoje vamos fazer uma sessão de exibição desse vídeo?\""
1600915-51 = "Hmm... #nSe fosse possível, eu adoraria exibir no meio da rua comercial, mas..."
1600915-52 = "Hoje eu tenho outro objetivo."
1600915-53 = "...Eu quero fazer um backup desta fita de vídeo."
1600915-54 = "[s] \"Backup?\""
1600915-55 = "Parece que um serviço começou a ser oferecido na loja de fotografia da rua comercial há pouco tempo."
1600915-56 = "Eles digitalizam o conteúdo da fita de vídeo #ne permitem que você faça um backup no computador."
1600915-57 = "Se der certo, vai ficar muito mais fácil assistir à obra!"
1600915-58 = "Por isso eu trouxe esta fita de vídeo!"
1600915-59 = "É algo muito importante, então quero garantir que esteja bem guardado..."
1600915-60 = "É tipo aquilo, sabe? Como quando os ninjas transformam doces ou ingredientes em pílulas para conservação a longo prazo!"
1600915-61 = "Formalmente, chamamos de Hyourougan, mas..."
1600915-62 = "[s] \"Então, vamos partir!\""
1600915-63 = "Ei, espera aí!?#nEstava na melhor parte!"
1600915-69 = "……Isso parece difícil."
1600915-70 = "P-por que……!?"
1600915-71 = "É falta de dinheiro ou algo assim!?"
1600915-72 = "Não, o problema é a fita de vídeo."
1600915-73 = "Desse jeito, não vai dar para extrair as imagens……."
1600915-74 = "[s] \"Não existe nenhum outro método?\""
1600915-75 = "Hmm, é que ela é bem antiga, sabe……."
1600915-76 = "Olha só, a fita está cheia de arranhões."
1600915-77 = "Para nós, aqui, é complicado."
1600915-81 = "Ugh…… entendi."
1600915-82 = "Não tem jeito…….#nVamos, Sensei."
1600915-87 = "Hmm, eu já imaginava……."
1600915-88 = "[s] \"Você já sabia desde o começo?\""
1600915-89 = "Sim, ela já estava quebrada há muito tempo."
1600915-90 = "[s] \"Então era isso…….\""
1600915-91 = "Eu assisti centenas de vezes……."
1600915-92 = "E ela simplesmente parou de rodar direito."
1600915-93 = "Pensei que talvez um profissional conseguisse…… mas pelo visto não deu mesmo."
1600915-94 = "[s] \"……Você está bem?\""
1600915-95 = "……Não, estou muito triste!"
1600915-96 = "Significa que não poderei mais recuperar essas memórias……."
1600915-97 = "E além disso, não tem como conseguir esse vídeo de novo."
1600915-98 = "[s] \"Michiru…….\""
1600915-99 = "……Às vezes, eu penso."
1600915-100 = "Se eu tivesse compartilhado essa alegria com mais pessoas desde mais cedo……."
1600915-101 = "Se eu não tivesse guardado só para mim, e tivesse mostrado para outros, para que ficasse na memória de mais gente――"
1600915-102 = "……Foi o que eu pensei."
1600915-103 = "[s] Acaricia a cabeça de Michiru gentilmente."
1600915-104 = "Hehehe…… obrigada, Sensei."
1600915-105 = "……."
1600915-106 = "Falando nisso, deve ter uma loja de ferramentas ninja a dois quarteirões daqui!"
1600915-107 = "[s] \"Sua mudança de humor não foi rápida demais!?\""
1600915-108 = "Mas é que! Dizem que não chegou só a \"Pistola Demoníaca Muramato\", mas também a lendária granada amaldiçoada, a \"Granada Demoníaca Masamune\"!?"
1600915-110 = "Mas tem gente que diz que a Masamune é só uma homenagem, ou pior, que é só uma cópia barata da Muramato. Hoje em dia ela até que é bem conhecida, mas――"
1600915-112 = "(Enquanto caminhávamos pelo centro comercial……)"
1600915-114 = "(Michiru abraçava a fita de vídeo como se fosse seu bem mais precioso)"
