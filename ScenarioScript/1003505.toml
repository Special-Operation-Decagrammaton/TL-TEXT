[translation]
1003505-1 = "突然の提案"
1003505-2 = "古書館内部"
1003505-3 = "（ウイを尋ねて古書館へと訪れた）"
1003505-4 = "（相変わらず古風で不思議な空気感の中に、微かに生活感も感じられる）"
1003505-5 = "あ、せ、先生。お待ちしておりました。"
1003505-6 = "えっと、その……。"
1003505-7 = "こちら、です……！"
1003505-8 = "ま、まだ真っ白ですが……"
1003505-9 = "その、わ、私と先生で、これから先……！"
1003505-10 = "[s1] \"ちょ、ちょっと待って。\"\n[s2] \"まず説明を貰えると嬉しいかな……？\""
1003505-11 = "……あ。"
1003505-12 = "……あ。"
1003505-13 = "す、すみません、また順番を間違えました……。"
1003505-14 = "これは、その……いわゆる「交換ノート」、でして……。"
1003505-15 = "い、言いたいことや、考えたこと……それを、交互に書くんです。"
1003505-16 = "も、もしかして既にこの時点で嫌、ですかね……。"
1003505-17 = "少しでも、その……知れればと、思って……。"
1003505-18 = "……せ、先生の、ことを。"
1003505-19 = "そ、そう言った感じなのですが……！"
1003505-20 = "……？"
1003505-21 = "えっと、な、何か私、また失礼を……？"
1003505-22 = "……あ。"
1003505-23 = "や、やっぱり持ち運ぶには大きい、ですかね……？"
1003505-24 = "考えてみたらそうですね……わ、私ったらバカみたいに、そんなことも気づかず……。"
1003505-25 = "す、すみません。この子くらい厚くて大きい方が、たくさん書けて、長く続くかと……。"
1003505-26 = "そう思って、つい……。"
1003505-27 = "ごめん、なさい……。"
1003505-28 = "[s] \"……。\""
1003505-29 = "あ、す、すみません。でしたらもう少し、小さい子に……手帳サイズくらいの……。"
1003505-30 = "……え、この子のままで？"
1003505-31 = "で、ですがその、少し負担になってしまうのでは……。"
1003505-32 = "あちこち行かれる先生に、それは……。"
1003505-33 = "……わざわざ持ち運ばなくても？"
1003505-34 = "そ、それは、どういう……？"
1003505-35 = "……ここに？"
1003505-36 = "交換ノート自体は、ここに置いたまま……？"
1003505-37 = "……な、なるほど。"
1003505-38 = "ここにお越しになるたびに、書いていくと……。"
1003505-39 = "わ、私はそれでも勿論……せ、先生がよろしければ……。"
1003505-40 = "[s3] \"せっかくだし、この子が良いなって。\"\n[s4] \"ウイが選んだ子だから。\""
1003505-41 = "……！！"
1003505-42 = "……！！"
1003505-43 = "……。"
1003505-44 = "うっ、あっ……！"
1003505-45 = "[s5] \"ウイ！？\"\n[s6] \"ご、ごめん！？\""
1003505-46 = "あ、いえ、その……すみません、ただ、私は……。"
1003505-47 = "あ、いえ、その……すみません、ただ、私は……。"
1003505-48 = "その、嬉しくて……。"
1003505-49 = "こういったことは、ほとんど無かったので……。"
1003505-50 = "ありがとうございます、先生……大事に、しますね。宝物として……。"
1003505-51 = "そこまで気負わなくても、ですか？は、はい……。"
1003505-52 = "ほ、本当に、ありがとうございます……っ……。"
1003505-54 = "（その後泣いてるウイを宥めつつ、今後書いていく交換ノートについてあれこれ話をした）"
1003505-55 = "（……とはいえ普段からモモトークで会話はしていたため、その交換ノートは読んだ本の感想を書き合う場になった）"
