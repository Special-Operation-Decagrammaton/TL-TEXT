[translation]
1003505-1 = "Uma proposta repentina"
1003505-2 = "Interior da biblioteca antiga"
1003505-3 = "（Visitei a biblioteca antiga para procurar a Ui）"
1003505-4 = "（A atmosfera continua antiquada e misteriosa como sempre, mas com um leve toque de vida cotidiana）"
1003505-5 = "Ah, p-professor. Eu estava esperando por você."
1003505-6 = "Bem, é que..."
1003505-7 = "Aqui está...!"
1003505-8 = "A-ainda está totalmente em branco, mas..."
1003505-9 = "É que, eu e você, professor, daqui em diante...!"
1003505-10 = "[s1] \"Ei, espere um pouco.\"\n[s2] \"Poderia me explicar primeiro...?\""
1003505-11 = "……Ah."
1003505-12 = "……Ah."
1003505-13 = "D-desculpe, eu errei a ordem de novo..."
1003505-14 = "Isto é, bem... o que chamam de \"caderno de troca\"..."
1003505-15 = "Coisas que queremos dizer, coisas que pensamos... nós escrevemos alternadamente."
1003505-16 = "V-você já está achando ruim, por acaso...?"
1003505-17 = "Eu só queria... poder conhecer um pouco mais..."
1003505-18 = "……Sobre você, professor."
1003505-19 = "É, é mais ou menos isso...!"
1003505-20 = "……?"
1003505-21 = "Bem, e-eu fui indelicada de novo...?"
1003505-22 = "……Ah."
1003505-23 = "É, é grande demais para carregar por aí, não é...?"
1003505-24 = "Pensando bem, é verdade... eu fui uma tola, nem percebi isso..."
1003505-25 = "D-desculpe. Achei que, sendo grosso e grande assim, daria para escrever bastante e durar mais tempo..."
1003505-26 = "Pensei nisso e acabei..."
1003505-27 = "Me desculpe..."
1003505-28 = "[s] \"…….\""
1003505-29 = "Ah, d-desculpe. Nesse caso, vou procurar um menor... do tamanho de uma agenda..."
1003505-30 = "……Eh, quer continuar com este mesmo?"
1003505-31 = "M-mas, isso não seria um pouco incômodo para você...?"
1003505-32 = "Para você que vive indo de um lado para o outro, isso..."
1003505-33 = "……Não precisa carregar por aí?"
1003505-34 = "O-o que você quer dizer com isso...?"
1003505-35 = "……Aqui?"
1003505-36 = "O caderno de troca ficaria guardado aqui...?"
1003505-37 = "……E-entendo."
1003505-38 = "Toda vez que você vier aqui, nós escreveríamos nele..."
1003505-39 = "E-eu, claro, ficaria feliz... se estiver tudo bem para você, professor..."
1003505-40 = "[s3] \"Já que estamos nisso, prefiro este aqui.\"\n[s4] \"Porque foi você quem escolheu, Ui.\""
1003505-41 = "……！！"
1003505-42 = "……！！"
1003505-43 = "……."
1003505-44 = "Ugh, ah...!"
1003505-45 = "[s5] \"Ui!?\"\n[s6] \"D-desculpe!?\""
1003505-46 = "Ah, não, é que... desculpe, é só que eu..."
1003505-47 = "Ah, não, é que... desculpe, é só que eu..."
1003505-48 = "É que estou tão feliz..."
1003505-49 = "Quase nunca tive experiências assim..."
1003505-50 = "Obrigada, professor... Vou cuidar muito bem dele. Como um tesouro..."
1003505-51 = "Não precisa se esforçar tanto assim, é isso? S-sim..."
1003505-52 = "M-muito obrigada, de verdade...!"
1003505-54 = "（Depois disso, enquanto consolava Ui que estava chorando, conversamos sobre várias coisas a respeito do caderno de intercâmbio que escreveríamos daqui para frente）"
1003505-55 = "（...Dito isso, como já conversávamos normalmente pelo MomoTalk, esse caderno de intercâmbio acabou se tornando um espaço para trocarmos impressões sobre os livros que lemos）"
