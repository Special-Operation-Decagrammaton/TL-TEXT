[translation]
1005203-1 = "セミナー書記ノアの意地悪な観察"
1005203-2 = "シャーレ・オフィス"
1005203-3 = "こんにちは、先生。"
1005203-4 = "今日もシャーレ当番を担当することになりました。"
1005203-5 = "本日もよろしくお願いしますね。"
1005203-6 = "[s] \"うん、よろしくね。\""
1005203-7 = "今日はご機嫌ですね。"
1005203-8 = "何か嬉しいことでもありましたか？"
1005203-9 = "[s1] \"昨夜、いいことを思いついたんだ。\"\n[s2] \"ノアの余裕を突き崩す方法を！\""
1005203-10 = "……私の余裕を、崩す方法……？"
1005203-11 = "……私の余裕を、崩す方法……？"
1005203-12 = "特に意図して余裕があるように振る舞った記憶は、ないのですが……。"
1005203-13 = "先生に試されるというのは、面白そうですね。"
1005203-14 = "それは一体どのような方法ですか？"
1005203-15 = "[s] \"今度は、私がノアの行動を記録しようかな。\""
1005203-16 = "……この間、私が記録したように、#n逆に先生が私の行動を観察し、記録する、ということですか？"
1005203-17 = "なるほど……それは私にとっても馴染みの薄い経験ですね。"
1005203-18 = "私は普段、他人の視線外で書記の業務を行っているので……。"
1005203-19 = "誰かに見られる状況下で仕事をする事はありませんから。"
1005203-20 = "……それでは、今日は先生のご提案通り、#nお互い観察しながら過ごすとましょう。"
1005203-21 = "あ、先にお伝えしておきますと、"
1005203-27 = "……簡単にはいきませんよ？#nふふ。"
1005203-29 = "（30分後……）"
1005203-31 = "……。"
1005203-32 = "[s] \"……。\""
1005203-33 = "……♪"
1005203-34 = "あら、先生？#nお疲れみたいですね。"
1005203-35 = "[s] \"人を観察するって、意外と疲れるね……。\""
1005203-36 = "……そうですよね。"
1005203-37 = "人の意志は言葉だけでなく、行動や表情など様々な記号で表現することができますから。"
1005203-38 = "現場に流れる無限の情報を紙の上に記していくのは、#n決して簡単なことではありません。"
1005203-39 = "[s] \"でも、今のところノアの行動は一つも逃さないでいるから……！\""
1005203-40 = "先生ってば……一生懸命ですね、ふふ。"
1005203-41 = "では私は、筆記用具の補充をしてきますね。"
1005203-50 = "ただいま戻りました。"
1005203-54 = "では、ここで……"
1005203-55 = "問題です！"
1005203-56 = "[s] \"いきなりクイズ！？\""
1005203-57 = "先生が行動を一つも逃していないと仰っていたので、#nそんな先生の記録の精度を確認したいと思います。"
1005203-58 = "今から出す問題に正解できたら、#n先生のお願いをなんでも一つ、聞いてあげます。"
1005203-59 = "その代わり不正解の場合は……#nきちんと集中しなかった罰として、先生のコーヒーを一杯いただきますね♪"
1005203-60 = "[s] \"別にいいけど……。\""
1005203-61 = "それでは問題です。"
1005203-62 = "先ほど、私は執務室の外で服装のとある部分を直してきました。"
1005203-63 = "前と比べて、変わった部分はどこでしょうか？"
1005203-64 = "[s3] \"難しいな……。\"\n[s4] \"パッと見、同じに見えるけど……。\""
1005203-65 = "私のことを注意深く観察していたら、そう難しくはないはずです。"
1005203-66 = "私のことを注意深く観察していたら、そう難しくはないはずです。"
1005203-67 = "ただしチャンスは一度だけです。#n慎重に答えてくださいね。"
1005203-68 = "[s] \"……ヘアピンが変わった？\""
1005203-69 = "ぶぶー！不正解です。"
1005203-70 = "ふふ、では約束通り、#n先生のコーヒーを一杯いただきますね。"
1005203-76 = "[ns] \"それで、正解はなんだったの？\""
1005203-78 = "まだ気づいてませんか？"
1005203-79 = "正解は……『何も変わってません』でした～"
1005203-80 = "[s5] \"なにそれ！？\"\n[s6] \"……だ、騙したの！？\""
1005203-81 = "ふふ、厳密に言うと、騙しではありませんよ。"
1005203-82 = "ふふ、厳密に言うと、騙しではありませんよ。"
1005203-83 = "時には模範解答の外に存在する命題さえも、#n解答になることがあります。"
1005203-84 = "そのため、優秀な書記は常日頃から偏見に囚われぬよう、#n全ての可能性を考慮しなければなりません。"
1005203-85 = "そうすることで現実を客観的に観察でき……#n私のような悪い生徒にも騙されずに済みます。"
1005203-86 = "ですから今は、私だけに集中してくださいね。"
1005203-88 = "（その後も、ノアの変化を記録すべく、彼女を見つめ続けたものの……）"
1005203-89 = "ふふ、このコーヒーはいつもより甘い気がします。"
1005203-93 = "（何も得られなかった……） "
