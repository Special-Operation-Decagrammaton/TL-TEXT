[translation]
10046220-3 = "あ、あはは……こんにちは。"
10046220-4 = "あっ！戦車泥棒！"
10046220-5 = "えっ！？そんな風に覚えられていたんですか！？"
10046220-6 = "まさか、あなたまで騒ぎを起こすつもりっすか？"
10046220-7 = "ち、違います！逆です！"
10046220-8 = "私たちは、お手伝いに来たんです！"
10046220-9 = "手伝い……私[ruby=・]た[/ruby][ruby=・]ち[/ruby]……？"
10046220-10 = "補習授業部のみんなで、#nパトロールのお手伝いをしよう！ということになって……。"
10046220-11 = "それは嬉しいっすけど……またどうして？"
10046220-12 = "みんなで話し合ったんです。"
10046220-13 = "普段トリニティを守ってくれているから、#nこういう時くらいは正義実現委員会の方には休んでもらいたいなって。"
10046220-14 = "あっ、これを思いついたのは私じゃないんですけどね。"
10046220-15 = "……考えてくれたのは、アズサちゃんとコハルちゃん。"
10046220-16 = "コハルが……？"
10046220-17 = "はい！#n委員会の皆さんがお忙しいのに、自分だけ休むのは気が引けるみたいで……。"
10046220-18 = "ははっ、コハルらしいっすね。"
10046220-19 = "でも、アズサさんはなぜ……？"
10046220-20 = "……まあ、考えても仕方ないっすか。"
10046220-21 = "んじゃ、よろしくっす！"
10046220-22 = "あれっ、いいんですか？"
10046220-23 = "ちょうど人手が足りなかったんすよ。#nこっちからお願いしたいくらいで。"
10046220-24 = "それで、他の皆さんは……？"
10046220-25 = "あ、それが……イチカさんがどこにいらっしゃるか分からなくて、#n手分けして探していたところなんです。"
10046220-26 = "それじゃあ、パトロールしながら一人ずつ探していくっすかね。"
10046220-27 = "あはは……なんだか仕事を増やしてしまったような……。"
10046220-28 = "至らない私ですが……。"
10046220-29 = "よろしくお願いします！"
