[translation]
10046220-3 = "Ah, ahaha... Olá."
10046220-4 = "Ah! A ladra de tanques!"
10046220-5 = "Eh!? É assim que vocês lembram de mim!?"
10046220-6 = "Não me diga que você também pretende causar confusão?"
10046220-7 = "N-não! É o contrário!"
10046220-8 = "Nós viemos para ajudar!"
10046220-9 = "Ajudar... nós...?"
10046220-10 = "O pessoal do Clube de Reforço decidiu que... vamos ajudar com a patrulha!"
10046220-11 = "Fico feliz com isso, mas... por que agora?"
10046220-12 = "Nós conversamos sobre isso."
10046220-13 = "Como vocês sempre protegem Trinity, pensamos que, pelo menos desta vez, o Comitê de Justiça deveria descansar."
10046220-14 = "Ah, mas não fui eu quem teve essa ideia."
10046220-15 = "...Quem pensou nisso foram a Azusa-chan e a Koharu-chan."
10046220-16 = "A Koharu...?"
10046220-17 = "Sim! Parece que ela se sente mal por descansar enquanto vocês do comitê estão tão ocupadas..."
10046220-18 = "Haha, a cara da Koharu."
10046220-19 = "Mas, por que a Azusa-san...?"
10046220-20 = "...Bem, não adianta ficar pensando nisso."
10046220-21 = "Então, conto com vocês!"
10046220-22 = "Ué, tudo bem mesmo?"
10046220-23 = "É que estamos precisando de gente. Eu mesma ia acabar pedindo ajuda."
10046220-24 = "E as outras pessoas...?"
10046220-25 = "Ah, sobre isso... não sabemos onde a Ichika-san está, então estamos procurando por ela separadamente."
10046220-26 = "Então vamos procurar uma por uma enquanto patrulhamos, certo?"
10046220-27 = "Ahaha... sinto que acabamos criando mais trabalho..."
10046220-28 = "Embora eu não seja muito capaz..."
10046220-29 = "Conto com vocês!"
