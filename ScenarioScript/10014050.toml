[translation]
10014050-1 = "第5話;忘れたい過去のこと"
10014050-2 = "（………）"
10014050-3 = "……あ、先生！#n先に来てたんですね！"
10014050-4 = "[s1] \"呼んだのは私だからね。\"\n[s2] \"ここ、どうぞ座って。\""
10014050-5 = "こんにちは！！[ruby=うざわ]宇沢[/ruby]レイサ、改めてご挨拶申し上げます！！"
10014050-6 = "こんにちは！！[ruby=うざわ]宇沢[/ruby]レイサ、改めてご挨拶申し上げます！！"
10014050-7 = "まさか連絡先を渡してすぐに呼ばれるとは！"
10014050-8 = "ところで……どのようなご用件で……？"
10014050-9 = "……え？"
10014050-10 = "ああ……今日のことですか？"
10014050-11 = "そ、それはもう心配いりません！はい！#n私もしかとこの耳で聞きましたので！！"
10014050-12 = "[ruby=きょうやま]杏山[/ruby]カズサは、過ちを悔い改め、#n仲間と共に平凡な生活を送っている！"
10014050-13 = "いくら私でも、その新たな生活を邪魔するような野暮はいたしません！#nですから、もう心配しなくても大丈夫です！"
10014050-14 = "もうこれ以上、杏山カズサに迷惑はかけませんので！"
10014050-15 = "[s3] \"そういう話じゃないから、顔を上げて。\"\n[s4] \"……レイサはそれでいいの？\""
10014050-16 = "……え？それはどういう……#nすみません、よく分かりません……。"
10014050-17 = "……え？それはどういう……#nすみません、よく分かりません……。"
10014050-18 = "杏山カズサはスケバンではないのですから。#nもう倒す必要も、挑戦する必要もなくなりました……。"
10014050-19 = "……こ、これ以上、他に何があるのでしょうか？"
10014050-20 = "……え？"
10014050-21 = "杏山カズサに関して、他の自警団や正義実現委員会に連絡したこと……？"
10014050-22 = "いえ、特には……"
10014050-23 = "……あれ？"
10014050-24 = "そ、そうですね？うーん……たしかに通報したり連絡したことはありませんね。#nどうしてでしょう？"
10014050-25 = "スズミさんにも話したことはないですね……おかしいな。"
10014050-26 = "私が倒すべき宿敵！！"
10014050-27 = "……だと思ったからじゃないでしょうか？#nあはは……。"
10014050-31 = "……まあ、そもそも連絡するような相手もいませんが。#nあはは……。"
10014050-32 = "それはともかく。#n……先生はどうしてこんな事を私に聞くんですか？"
10014050-33 = "もしかして……"
10014050-34 = "ここにいた！！自警団のチビ！！"
10014050-35 = "……え？"
10014050-36 = "[ns] \"……！？\""
10014050-42 = "ああ、こいつで間違いない！！"
10014050-43 = "おい！応援全員呼べ！逃がすなよ！#n今が絶好のチャンスだからな！"
10014050-44 = "[s5] \"逃すなよ……？\"\n[s6] \"絶好のチャンス？\""
10014050-45 = "あ？何だよ。#n大人も一緒にいんじゃん……。"
10014050-46 = "あ？何だよ。#n大人も一緒にいんじゃん……。"
10014050-47 = "まぁいっか。おい、怪我したくなかったら今すぐどきな。#nうちらはそいつに用があるだけだからよ！"
10014050-48 = "……私、ですか？"
10014050-49 = "とぼけてんじゃねぇ。全部分かってんだからよ。"
10014050-50 = "お前……「キャスパリーグ」の正体を知ってるよな？"
10014050-51 = "……？？キャスパリーグ？#nそ、そりゃあ知ってますけど……それがどうしたんですか？"
10014050-52 = "どうしたじゃねぇよ！やつが新しい組織を立ち上げたって聞いたんだよ！"
10014050-53 = "「放課後スイーツ団」とかいう名前だったけかなぁ。#nなぁ？合ってんだろ？"
10014050-54 = "[s7] \"……あ、まさか。\"\n[s8] \"話がこじれてきたような。\""
10014050-55 = "ちょ、ちょっと待ってください！#nそれは誤解です！！そんな組織はありません！！"
10014050-56 = "ちょ、ちょっと待ってください！#nそれは誤解です！！そんな組織はありません！！"
10014050-57 = "杏山……いえ、キャスパリーグは……皆さんが思うような人ではありません！"
10014050-58 = "というか、もういないんです！"
10014050-59 = "なに言ってんだ？#nそんな話をうちらに信じろって？バカにすんじゃねぇ！"
10014050-60 = "は、はは……#nそ、そうですよね？私も最初は信じられませんでしたし……"
10014050-61 = "……いや、そ、そうじゃなくて！ですが本当です！#nもうキャスパリーグはいないんです！"
10014050-62 = "最初から簡単に口を割ってくれるとは思っていなかったがよぉ……仕方ねえな。"
10014050-63 = "おい！！いくぞ！！"
10014050-68 = "細けえことは、この銃口に話してくれよな！！"
10014050-73 = "ど、どうしてこんな……"
10014050-74 = "せ、先生……！？"
10014050-75 = "[s9] \"これは……仕方ないね。\"\n[s10] \"とりあえず私に指揮を取らせて、レイサ。\""
10014050-76 = "あ……"
10014050-77 = "あ……"
10014050-78 = "……はい！！"
