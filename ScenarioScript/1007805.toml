[translation]
1007805-1 = "figura intelectual"

1007805-2 = "Sala de descanso da placa de Petri"

1007805-3 = "(Convidei Kasumi para a placa de Petri)"

1007805-4 = "Hum! Eu vejo, eu vejo."

1007805-5 = "É um lugar tranquilo e calmo, perfeito para estudar. Além disso, é difícil para as pessoas verem."

1007805-6 = "Se estiver na sala de descanso da placa de Petri, ninguém tentará capturá-lo à força. #nLugar perfeito, senhor."

1007805-7 = "Mas... foi realmente tão bom?"

1007805-8 = "Mesmo se eu ligar para você."

1007805-9 = "Outro dia, pensei ter dito a você que as placas de Petri também eram candidatas à explosão..."

1007805-10 = "Você não está preocupado? #nTalvez eu devesse ter ficado longe?"

1007805-11 = "[s1] \"Se um aluno estiver com problemas...\"\n[s2] \"É meu trabalho ajudar.\""

1007805-14 = "...! !"

1007805-15 = "Hahahahaha! É assim mesmo? #nTalvez o Sensei seja uma pessoa maior do que você pensa."

1007805-16 = "Bem, vamos aproveitar. #nBasicamente, tenho personalidade para aceitar o que posso."

1007805-17 = "Não posso perder esta grande oportunidade. #nVamos começar a estudar agora mesmo."

1007805-18 = "Bom... isso mesmo!"

1007805-22 = "[ns3] \"Você trouxe bem.\"\n[ns4] \"Isso é...?\""

1007805-25 = "Como você pode ver, é um livro sobre geologia, engenharia civil e engenharia arquitetônica."

1007805-26 = "Coletamos artigos e materiais de pesquisa de pessoas famosas em diversas áreas."

1007805-27 = "...Que cara é essa? #nO Sensei muitas vezes revira os olhos para mim."

1007805-28 = "...Haha."

1007805-29 = "Brincadeirinha, brincadeira. Isso eu entendo."

1007805-30 = "...Isso deve ter sido uma surpresa, certo?"

1007805-31 = "É assim que eu sento e “estudo” seriamente."

1007805-32 = "No entanto, senhor, o departamento de desenvolvimento de fontes termais não se limita a apenas cavar a terra, mas também constrói fontes termais em cima dela."

1007805-33 = "A razão pela qual conseguimos continuar até agora é porque temos uma base sólida."

1007805-34 = "As pessoas ao seu redor o tratam como um louco, mas..."

1007805-35 = "...Não creio que seja necessário explicar. #nEles só têm o ponto de vista deles e nós temos o nosso."

1007805-36 = "Se você se concentrar em coisas triviais, não terá tempo suficiente. #nLife não é longa o suficiente para perder tempo."

1007805-37 = "Bem, vamos começar agora. O escopo do estudo de hoje é amplo."

1007805-38 = "Para a Senseia..."

1007805-39 = "...Estou grato."

1007805-41 = "(...Nas próximas horas, Kasumi ficou olhando para o livro sem dizer uma palavra.)"

1007805-42 = "(Ainda havia muito trabalho na placa de Petri, então sentei ao lado dele e trabalhei nela.)"

1007805-44 = "…………."

1007805-48 = "...Ah, isso mesmo."

1007805-49 = "Hum..."

1007805-50 = "...Bom tiro."

1007805-54 = "[ns5] \"...Kasumi?\"\n[ns6] \"O que há de errado?\""

1007805-57 = "Não, bem... não se preocupe com isso. #nPor favor, continue trabalhando, Sensei."

1007805-61 = "...Hmm, isso é bom."

1007805-66 = "...Aqui você vai. É café."

1007805-67 = "Acabei de fazer alguns para o Sensei enquanto estava respirando. #nPode ser uma boa ideia fazer uma pequena pausa."

1007805-68 = "Não é realmente uma quantidade incrível de concentração? #nEssa é a primeira vez que fico horas ao seu lado sem trocar uma palavra."

1007805-69 = "Sim? Ah, não, não me entenda mal. Não é que eu não goste desse tipo de coisa. #nNa verdade, me sinto confortável."

1007805-70 = "O Sensei pode não saber disso, mas esse tipo de relacionamento em que vocês podem se concentrar nos estudos e no trabalho um do outro não é algo que você encontre facilmente."

1007805-71 = "...Especialmente para alguém como eu."

1007805-72 = "Costumo estudar e pesquisar sozinho, mas no campo tem muita gente reunida..."

1007805-77 = "...Eu vejo! Entendo, porque você é Sensei?"

1007805-78 = "Embora esteja ocupado com a papelada todos os dias, ele interage com muitos alunos e resolve problemas."

1007805-79 = "Se você é Sensei, tenho certeza que entenderá meu pensamento..."

1007805-83 = "...Isso é uma piada. #nSabemos que a nossa posição é."

1007805-87 = "Mas não é mentira que dessa vez é divertido, né?"

1007805-88 = "Pessoalmente, quero continuar assim por horas... não, dias."

1007805-89 = "……sim? Isso é bom?"

1007805-90 = "Você não se importa se vier quando quiser...?"

1007805-91 = "...Hahahahaha! !"

1007805-92 = "O Sensei pode ter falado sério, mas se isso acontecer, vou acabar morando aqui!"

1007805-93 = "Sinto muito, mas não acho que seria possível desenvolver uma fonte termal inovadora dessa forma. #nÉ uma proposta muito atrativa, mas vou me abster de fazê-la por enquanto!"

1007805-94 = "Mas se você começar a errar dessa vez..."

1007805-95 = "Por favor, cuide um pouco de mim."

1007805-96 = "...Às vezes, né?"

