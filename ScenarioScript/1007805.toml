[translation]
1007805-1 = "知的な姿"
1007805-2 = "シャーレ休憩室"
1007805-3 = "（カスミをシャーレに招待した）"
1007805-4 = "むむ！そうか、なるほどなるほど。"
1007805-5 = "勉強にピッタリの静かで落ち着いている場所だ。なおかつ、人の目に触れづらい。"
1007805-6 = "シャーレの休憩室であれば、無理やり捕まえようとしてくる者もいないだろう。#n完璧な場所だな、先生。"
1007805-7 = "だが……本当に良かったのか？"
1007805-8 = "[ruby=・]私[/ruby]を呼んでしまっても。"
1007805-9 = "つい先日、シャーレも爆破候補にあると伝えたはずだが……"
1007805-10 = "心配にならないのか？#nむしろ遠ざけるべきだったのでは？"
1007805-11 = "[s1] \"生徒が困っていたら……\"\n[s2] \"手を差し伸べるのが私の仕事だからね。\""
1007805-14 = "……！！"
1007805-15 = "ハーハッハッハッ！そうかそうか。#n思っている以上に先生は器が大きい人なのかもしれんなあ。"
1007805-16 = "まあ、ありがたく享受しよう。#n基本的に、もらえるものはもらっておく性格だからな。"
1007805-17 = "せっかくのチャンスを逃すわけにはいかない。#nさっそく勉強を始めるとしよう。"
1007805-18 = "よい……っしょ！"
1007805-22 = "[ns3] \"よく持ってきたね。\"\n[ns4] \"これは……？\""
1007805-25 = "見ての通り、地質学や土木工学、そして建築工学に関する本だ。"
1007805-26 = "各分野で有名な人の論文や研究資料を集めた。"
1007805-27 = "……なんだその顔は？#n先生は私に対してよく目を丸くするな。"
1007805-28 = "……ははっ。"
1007805-29 = "冗談だ、冗談。それくらい分かっている。"
1007805-30 = "……意外に思ったんだろう？"
1007805-31 = "私がこうして席に座って真面目に「勉強」する事が。"
1007805-32 = "しかし先生、温泉開発部は土地を掘ることだけ留まらず、その上に温泉を作り上げている。"
1007805-33 = "今まで続けてこられたのは、きちんとした土台があってこそ。"
1007805-34 = "周りからは、ただの狂人のように扱われているが……"
1007805-35 = "……あえて説明する必要は無いと思っている。#n彼らには彼らの視点、私たちには私たちの視点があるだけだからな。"
1007805-36 = "些細なことに気を取られていては、時間が足りなくなる。#n無駄な時間を過ごせるほど、人生は長くない。"
1007805-37 = "さあ、そろそろ始めるとしようか。今日の勉強範囲は広いからな。"
1007805-38 = "先生には……"
1007805-39 = "……感謝しているぞ。"
1007805-41 = "（……それから数時間、カスミは本当に一言も発さず本と向き合っていた）"
1007805-42 = "（ちょうどシャーレの仕事もかなり残っていたため、隣の席で作業を進めた）"
1007805-44 = "…………。"
1007805-48 = "……あぁ、そうだ。"
1007805-49 = "ふむ……"
1007805-50 = "……よいしょっと。"
1007805-54 = "[ns5] \"……カスミ？\"\n[ns6] \"どうかしたの？\""
1007805-57 = "いや、まあ……気にするな。#n先生は作業を続けてくれ。"
1007805-61 = "……んむ、いい感じだな。"
1007805-66 = "……さ、どうぞ。コーヒーだ。"
1007805-67 = "一息ついでに先生の分も淹れただけだ。#n少しくらい休憩しても良いだろう。"
1007805-68 = "それにしても本当にすごい集中力だな？#n何時間も隣にいたというのに、お互い一言も発さないなんて経験は初めてだ。"
1007805-69 = "うん？あぁ、いや、誤解しないでくれ。こういうのが嫌というわけじゃない。#nむしろ、心地良く思っている。"
1007805-70 = "先生は知らないかもしれないが、こうして互いの勉強や作業に集中できる間柄というのは、なかなか手に入れられるものではないからな。"
1007805-71 = "……特に、私のような者には。"
1007805-72 = "普段の勉強や研究は一人で行っているが、現場では大勢が集まって……"
1007805-77 = "……そうか！なるほど、先生だからか？"
1007805-78 = "日々、書類仕事に追われながらも多くの生徒と関わって問題を解決する、その在り方。"
1007805-79 = "先生なら、きっと私の考えを理解して……"
1007805-83 = "……というのは冗談だ。#n分かっている、私たちの立場は[ruby=たいせきてん]対蹠点[/ruby]にあることを。"
1007805-87 = "でも、この時間が楽しいというのは嘘じゃないぞ？"
1007805-88 = "私としては、このまま何時間……いや、何日でも続けたいと思っている。"
1007805-89 = "……ん？良いのか？"
1007805-90 = "好きなときに来てもらって構わない、と……？"
1007805-91 = "……ハッハッハッハッハ！！"
1007805-92 = "先生は言葉通り言ったのかもしれないが、そうなると私はここに住み着いてしまうぞ！"
1007805-93 = "すまないが、それでは画期的な温泉開発ができるとは到底思えない。#nとても魅力的な提案だが、今は遠慮しておこう！"
1007805-94 = "でも、もしこの時間が恋しくなったときは……"
1007805-95 = "少し、世話になろう。"
1007805-96 = "……時々、な。"
