[translation]
10045110-1 = "Episódio 11; Uma batalha que não posso perder"
10045110-2 = "A minha oponente é a Nagusa-san...?"
10045110-3 = "Sim. Ela é uma oponente à altura."
10045110-4 = "Então, vamos começar..."
10045110-5 = "Desculpe, mas eu não sou a sua oponente."
10045110-6 = "Sim? Então, quem seria...?"
10045110-7 = "A sua oponente é..."
10045110-12 = "A Kikyou."
10045110-16 = "Eu nunca lutei em uma ilha flutuante antes, então... não posso garantir que vou vencer."
10045110-17 = "Neste momento, aqui... a Kikyou é a pessoa mais adequada para ser sua oponente."
10045110-18 = "Eu concordo plenamente!"
10045110-19 = "A Kikyou-senpai de agora com certeza nos mostrará uma partida elegante e poderosa!"
10045110-21 = "Isso é algo que não posso ignorar. Você está falando sério?"
10045110-22 = "...Não vou negar."
10045110-23 = "Izuna e Renge lutaram até o último momento, e Chise ainda não se recuperou."
10045110-24 = "Dentre os que restaram nas semifinais, eu sou a que tem mais energia sobrando."
10045110-25 = "...Embora eu tenha sido a primeira a ser eliminada."
10045110-27 = "Como esperado da Kikyou-senpai! Essa sua postura cheia de confiança! É muito inspirador!"
10045110-28 = "Conto com você, Kikyou! #nDeixe a torcida total por minha conta!"
10045110-33 = "Sensei, você também está de acordo?"
10045110-34 = "[s1] \"Com certeza!\"\n[s2] \"Boa sorte, Kikyou!\""
10045110-37 = "Daremos início agora à partida de exibição entre a competidora Kikyou e a competidora Wakamo!"
10045110-39 = "Uau! Isso é algo que não dá para perder!"
10045110-40 = "Ei, quem você acha que vai ganhar?"
10045110-41 = "Hm... bem, não é a Sete Prisioneiras?"
10045110-42 = "Ah, eu acho que a Hyakkiyako vai vencer! Aposto meu lanche de amanhã nisso!"
10045110-44 = "Hã!? A gente vai apostar lanches agora!? #nHumm..."
10045110-45 = "Então eu vou apostar na Sete Prisioneiras!"
10045110-46 = "Por favor...! Vença...! #nMeu lanche está em jogo...!"
10045110-47 = "...Parece que todos estão bem animados."
10045110-48 = "Então, vamos começar antes que o clima esfrie. #nEstou pronta a qualquer momento."
10045110-49 = "Ufufu, parece que você está bem confiante, não é?"
10045110-50 = "Não se trata de ter confiança ou não."
10045110-51 = "É algo que eu preciso fazer."
10045110-52 = "Cada uma carrega seus próprios sentimentos, entendo. Muito bem. #nVamos começar."
10045110-53 = "A batalha para decidir quem será escolhida pelo Sensei...!"
10045110-55 = "Então, que comece a partida!"
10045110-56 = "[ns] \"Que comece o duelo!\""
10045110-64 = "(Como esperado da Raposa da Calamidade... ela é forte!)"
10045110-65 = "Por você... eu certamente alcançarei a vitória."
10045110-66 = "Droga...!"
10045110-72 = "A competidora Kikyou está sendo encurralada na borda! #nSerá que ela vai cair no mar assim!?"
10045110-73 = "...Realmente, a força e a agilidade da Wakamo estão um nível acima."
10045110-74 = "Mas... a Kikyou pode vencer. A Kikyou de agora é diferente."
10045110-76 = "(A força da oponente é avassaladora. É como uma onda gigante vindo em minha direção...)"
10045110-77 = "(Tentar empurrar de volta é inútil. Então...)"
10045110-79 = "Movimente mais os braços e as pernas! Relaxe o corpo!"
10045110-80 = "Dizer para relaxar e se mover ao mesmo tempo... isso é contraditório, não acha!?"
10045110-81 = "Não lute contra a natureza, o importante é deixar o fluxo te levar. #nNadar é exatamente isso!"
10045110-82 = "Assim que pegar o jeito, você consegue!"
10045110-84 = "（É só deixar a corrente me levar）"
10045110-85 = "（Sem resistir à força, vou induzi-la para o meu estilo de luta...!）"
10045110-92 = "A competidora Kikyou está encurralada, mas aqui vem o contra-ataque!#nEla desviou do ataque da competidora Wakamo e fez um movimento como se fosse passar uma rasteira...!"
10045110-93 = "E direto para... um giro!?"
10045110-94 = "Que técnica é essa...!?"
10045110-98 = "[ns] \"Lá vem! A técnica de jogo de corda da Kikyou!\""
10045110-99 = "Droga...!? Não consigo... escapar...!"
10045110-100 = "Isso é o básico do \"jogo de corda\"."
10045110-101 = "Que tipo de jogo de corda é esse?!"
10045110-102 = "No sentido de se entrelaçar de forma complexa, talvez seja parecido?"
10045110-103 = "Competidora Wakamo, para onde foi todo aquele ímpeto de antes!#nParece que ela não está conseguindo lidar bem com isso!"
10045110-105 = "Como esperado da Kikyou. Ela sabe muito bem como selar os movimentos do oponente de forma eficaz."
10045110-106 = "M-mas a veterana Renge conseguiu escapar daquela técnica antes..."
10045110-108 = "Não. Para ser sincera... naquela época também foi por um triz."
10045110-109 = "E ainda assim, a Kikyou de agora está com um espírito diferente...!"
10045110-110 = "U-ugh...!"
10045110-116 = "...Parece que eu a subestimei um pouco."
10045110-118 = "Competidora Wakamo, ela escapou!#nMas será que dá para ver o cansaço nela?"
10045110-120 = "Quando quiser. Vou te prender quantas vezes forem necessárias."
10045110-121 = "Nesse caso, vou acabar com você antes que eu seja capturada...!"
10045110-129 = "...!!"
10045110-130 = "Como a plataforma flutuante é elástica, os movimentos acabam sendo mais amplos."
10045110-131 = "Pular com movimentos tão grandes é o mesmo que pedir: \"por favor, me prenda de novo\"."
10045110-132 = "...!!"
10045110-133 = "Competidora Wakamo, ela foi presa pela competidora Kikyou novamente!"
10045110-134 = "Se fosse um confronto direto, a vitória poderia ter ido para a Wakamo."
10045110-135 = "Mas, com a Kikyou usando táticas de contenção...!"
10045110-136 = "A veterana Kikyou está pressionando muito!"
10045110-138 = "Será que a partida vai ser decidida assim...!?"
10045110-139 = "（Exatamente no momento em que a empolgação do público atingiu o ápice...）"
10045110-146 = "...Hã? O que foi agora!?"
10045110-147 = "[s] \"Parece que a plataforma explodiu...\""
10045110-148 = "O quê!? Lá também!?"
10045110-149 = "Kikyou! Atrás de você! A onda...!!"
10045110-158 = "Um problema inesperado aconteceu aqui!"
10045110-159 = "Por favor, aguardem a análise do vídeo para o resultado da partida...!"
10045110-165 = "A plataforma explodir, logo agora..."
10045110-166 = "De qualquer forma, foi você quem caiu primeiro."
10045110-167 = "De jeito nenhum. Isso não pode ser verdade."
10045110-172 = "O resultado chegou!#nA vencedora é... Kiryu Kikyou!!!"
10045110-177 = "Isso é..."
10045110-178 = "Mesmo sendo engolida pela onda gigante que surgiu de repente...#n\"Quem cair no mar primeiro perde\", essa é a regra, não é?"
10045110-179 = "É uma promessa que fiz ao Sensei. Hoje, vou me retirar graciosamente.#nMas na próxima..."
10045110-181 = "Aceitarei seu desafio quando quiser."
10045110-182 = "Hum...#nMas ainda assim, você..."
10045110-183 = "Você tem um jeito bem peculiar de nadar. É como se..."
10045110-184 = "Pare. Não diga mais nada, por favor."
10045110-186 = "Apesar dos acidentes, só falta a final do Festival Aquático de Hyakkiyako!#nEquipe, preparem-se para o reinício..."
10045110-191 = "O quêêêêê!?"
10045110-192 = "[s] \"Parece que não foi só um lugar que quebrou...\""
10045110-193 = "R-rápido, comecem o combate ao incêndio……!!"
10045110-194 = "[ns3] \"Sinto que já é tarde demais…….\"\n[ns4] \"……No fim, sempre acaba assim, né.\""
