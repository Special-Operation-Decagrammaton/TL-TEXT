[translation]
10045110-1 = "第11話;負けられない戦い"
10045110-2 = "お相手はナグサさんですか……。"
10045110-3 = "ええ。相手にとって不足はございません。"
10045110-4 = "それでは早速――"
10045110-5 = "悪いけど、あなたの相手は私じゃない。"
10045110-6 = "はい？では、どなたが……？"
10045110-7 = "あなたの相手は――"
10045110-12 = "キキョウだよ。"
10045110-16 = "私は浮き島の上で戦ったことがないから……絶対勝てるとは言い切れない。"
10045110-17 = "今、この場において……キキョウこそ、あなたの相手にふさわしい。"
10045110-18 = "身共も同感ですわ！"
10045110-19 = "今のキキョウ先輩は、えれがんとでぱわふるな試合を見せてくださるはずですの！"
10045110-21 = "それは聞き捨てなりませんね。本気で仰っているのですか？"
10045110-22 = "……否定はしない。"
10045110-23 = "イズナとレンゲは直前まで試合をしていたし、チセはまだ回復してない。"
10045110-24 = "準決勝に残った中で、一番体力が残っているのは私。"
10045110-25 = "……最初に脱落しただけではあるけど。"
10045110-27 = "さすがキキョウ先輩！その自信に満ちたお姿！頼もしいですの！"
10045110-28 = "頼んだよ、キキョウ！#n全力の応援は任せとけっ！"
10045110-33 = "先生も、それでいい？"
10045110-34 = "[s1] \"もちろん！\"\n[s2] \"よろしくね、キキョウ！\""
10045110-37 = "それではこれより、キキョウ選手対ワカモ選手のエキシビションマッチを開催しますっ！"
10045110-39 = "おおっ！こりゃ絶対に見逃せないな！"
10045110-40 = "なあ、どっちが勝つと思う？"
10045110-41 = "え……うーん、やっぱり七囚人じゃないですか？"
10045110-42 = "あ、あたしは百花繚乱が勝つと思います！明日のおやつを賭けてもいいです！"
10045110-44 = "えっ！？これっておやつを賭ける流れなのか！？#nう～～ん……。"
10045110-45 = "んじゃ、あたしは七囚人に賭ける！"
10045110-46 = "頼む……！勝ってくれよ……！#nあたしのおやつが賭かってるんだ……！"
10045110-47 = "……みんな、盛り上がってるみたい。"
10045110-48 = "それじゃ、会場が冷めないうちに始めましょう。#nこちらはいつでも。"
10045110-49 = "うふふっ、随分と自信がおありのようで？"
10045110-50 = "自信があるとかないとか、そういう話じゃない。"
10045110-51 = "私がやらなきゃならない。"
10045110-52 = "抱える思いはそれぞれですか。いいでしょう。#nそれでは始めましょうか。"
10045110-53 = "先生に選ばれる者を決する戦いを……！"
10045110-55 = "それでは、試合を始めますっ！"
10045110-56 = "[ns] \"いざ尋常に……勝負っ！\""
10045110-64 = "（さすがは災厄の狐……強い！）"
10045110-65 = "あなた様のため……必ずや勝利を掴んで見せますわ。"
10045110-66 = "くっ……！"
10045110-72 = "キキョウ選手、どんどん端に追い詰められています！#nこのまま海に落ちてしまうのかーっ！？"
10045110-73 = "……やっぱり、力と運動神経はワカモが一枚上手だね。"
10045110-74 = "でも……キキョウなら勝てる。今のキキョウは一味違うから。"
10045110-76 = "（相手の力は圧倒的。まるで押し寄せる大波のよう……）"
10045110-77 = "（押し返そうとしても無駄。だったら……）"
10045110-79 = "もっと腕と脚を大きく動かして！体の力を抜いて！"
10045110-80 = "力を抜いて動けだなんて……矛盾したことできるわけないでしょ！？"
10045110-81 = "自然に逆らわず、流れに身を任せるのが大事なんだ。#n泳ぐっていうのは、そういうこと！"
10045110-82 = "コツさえ掴めばすぐだよ！"
10045110-84 = "（流れに身を任せればいい）"
10045110-85 = "（無理に逆らわず、自分の得意な形に誘導する……！）"
10045110-92 = "追い詰められたキキョウ選手、ここで反撃だぁ！#nワカモ選手の攻撃をいなして、足をかけるような動き……！"
10045110-93 = "そのまま……回転ですの！？"
10045110-94 = "あの技は……！？"
10045110-98 = "[ns] \"出た！キキョウのあやとり技！\""
10045110-99 = "くっ……！？抜け……出せない……！"
10045110-100 = "これは「あやとり」の基礎。"
10045110-101 = "こんなあやとりがどこにありますかっ！"
10045110-102 = "複雑に絡み合うって意味では、似てるかも？"
10045110-103 = "ワカモ選手、さっきまでの勢いはどこにいったのか！#nうまく対処できていないようです！"
10045110-105 = "さすがキキョウ。効果的に相手を封じる方法がよく分かってる。"
10045110-106 = "で、ですがさっきのレンゲ先輩はあの技を抜け出して――"
10045110-108 = "いや。正直に言うと……あの時もギリギリだったんだ。"
10045110-109 = "なのに、今のキキョウは気迫が違う……！"
10045110-110 = "う、うううっ……！"
10045110-116 = "……些か、侮りすぎたようですね。"
10045110-118 = "ワカモ選手、脱出しましたっ！#nだがその様子には疲れが見えるかー？"
10045110-120 = "いつでもいいよ。何度だって絡め取ってあげる。"
10045110-121 = "ならば、捕まるより早く仕留めて差し上げます……！"
10045110-129 = "……！！"
10045110-130 = "浮き島の上では弾力がある分、動きが大きくなる。"
10045110-131 = "そんなに大きな動作で飛び込んでくるのは、「また捕まえてください」ってお願いしてるのと同じ。"
10045110-132 = "……！！"
10045110-133 = "ワカモ選手、再びキキョウ選手に絡めとられてしまいましたっ！"
10045110-134 = "真っ向勝負だったら、ワカモに軍配が上がったかもしれない。"
10045110-135 = "でも、絡め手を使えるキキョウなら……！"
10045110-136 = "キキョウ先輩が押せ押せですわ！"
10045110-138 = "このまま勝負が決まってしまうのか……！？"
10045110-139 = "（まさに、会場の熱気も最高潮に達したその時……）"
10045110-146 = "……えっ？今度は何！？"
10045110-147 = "[s] \"足場が爆発したみたいだけど……。\""
10045110-148 = "えっ！？そっちまで！？"
10045110-149 = "キキョウ！後ろだ！波が……！！"
10045110-158 = "ここで予想外のトラブルが！"
10045110-159 = "試合の行方はビデオ判定をお待ちください……！"
10045110-165 = "足場が爆発するだなんて……。"
10045110-166 = "なんにせよ、先に落ちたのはそっちだよね。"
10045110-167 = "まさか。そんなはずはありません。"
10045110-172 = "結果が届きました！#n勝者は……[ruby=きりゅう]桐生[/ruby]キキョウ～～～！！"
10045110-177 = "これは……。"
10045110-178 = "突然発生した大波に飲まれようと……#n「先に海に落ちたほうが負け」がルールですか。"
10045110-179 = "先生との約束ですから。本日は潔く引き下がりましょう。#nですが次は――"
10045110-181 = "挑戦ならいつでも受けてあげる。"
10045110-182 = "ふむ……#nそれにしても、あなた……。"
10045110-183 = "なかなか独特な泳ぎ方をされますね。まるで――"
10045110-184 = "やめて。それ以上は絶対に言わないで。"
10045110-186 = "アクシデントがありつつも、百夜水上祭も残すは決勝戦だけ！#nスタッフさん、再開の準備を――"
10045110-191 = "えええええ！？"
10045110-192 = "[s] \"壊れたのは一か所だけじゃなかったみたいだね……。\""
10045110-193 = "すっ、すぐに消火作業を……！！"
10045110-194 = "[ns3] \"もう手遅れな気が……。\"\n[ns4] \"……結局こうなるんだね。\""
