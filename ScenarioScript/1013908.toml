[translation]
1013908-1 = "Inarizushi de Nico"

1013908-2 = "(Eu estava curioso sobre a comida em conserva de que Nico estava falando, então dei uma olhada na sala de cozinha durante meu intervalo para o almoço.)"

1013908-7 = "Sala de cozinha na construção de placas de Petri"

1013908-9 = "(No momento em que abri a porta, o som de óleo espirrando e um cheiro perfumado fizeram cócegas em meu nariz.)"

1013908-10 = "[ns] \"Esse cheiro é...\""

1013908-13 = "Ah, professora. Eu acho que você precisava disso. \r\n"

1013908-14 = "Ainda vai demorar um pouco para terminar... então pode ter sido um pouco cedo."

1013908-15 = "[s1] \"Tem um cheiro realmente delicioso.\"\r\n[s2] \"Você não disse que ia fazer rações de combate?\""

1013908-18 = "Sim, são rações de combate."

1013908-19 = "O que estou fazendo atualmente são as tradicionais rações de combate transportadas pelos soldados no passado."

1013908-23 = "Sim, é Inarizushi! \r\n"

1013908-24 = "[s] \"O sushi inari será usado como alimento de combate?\""

1013908-29 = "sim. O sushi Inari atende aos requisitos para alimentação de combate. \r\n\r\n"

1013908-30 = "Por ser frito em óleo, é rico em calorias e tem pouca umidade, por isso não estraga facilmente. #nE o vinagre tem propriedades antibacterianas."

1013908-31 = "Em situações onde o fogo não está disponível, não existe outra fonte confiável de alimento."

1013908-32 = "A desvantagem é que é tão gostoso que você acaba comendo na hora. n / D. \r\n"

1013908-33 = "[ns] \"Se você me perguntar... talvez sim.\""

1013908-35 = "[ns3] \"O que você quer dizer com reservar um tempo para prepará-lo?\"\r\n[ns4] \"É diferente do sushi inari usual?\""

1013908-38 = "sim. Desta vez resolvi fazer tudo à mão, desde a fritura do tofu até o recheio."

1013908-39 = "O que sempre coloco nas lancheiras do pelotão FOX é tofu frito comprado em loja..."

1013908-40 = "Pelo menos uma vez, quis tentar fazer com meu próprio tofu frito. \r\n"

1013908-44 = "Ah... já faz tanto tempo. \r\n"

1013908-45 = "Por favor, desculpe-me por um momento.... \r\n"

1013908-50 = "[wa:390]― [log=니코]ふふ、[wa:1470]よく揚がっていますね。[/log]"
1013908-52 = "― [log=니코]Hehe [wa:310]Estou vivendo... [wa:1890]Estou ansioso pelo produto final. [/registro]"

1013908-55 = "[ns] \"Isso... parece delicioso.\""

1013908-56 = "[wa:860]― [log=니코]あ、[wa:880]まだダメですよ。[/log]"
1013908-59 = "[wa:480]― [log=니코]この後、[wa:530]もう1回揚げるんですから。[/log]"
1013908-62 = "- [log=니코]No início, em temperatura baixa. [/registro]"

1013908-64 = "― [log=니코]Em seguida, se você fritar em alta temperatura, [wa:2080] a umidade sairá e ele se tornará um delicioso tofu frito. [/registro]"

1013908-67 = "[ns] \"Tofu frito leva tanto tempo...\""

1013908-68 = "[wa:1220]― [log=니코]油揚げって実は、[/log]"
1013908-70 = "- [log=니코]É um prato que exige muito tempo e esforço. [/registro]"

1013908-73 = "― [log=니코]Isso foi o que aconteceu no passado[/log]"

1013908-75 = "- [log=니코]Foi dito que era uma oferenda [wa:2620] para orar por uma boa colheita e paz no próximo ano. [/registro]"

1013908-78 = "[wa:2050]― [log=니코]私の願いは、[/log]"
1013908-80 = "― [log=니코]Todos ao meu redor estão felizes e [wa:2420]podem viver em paz. [/registro]"

1013908-83 = "― [log=니코]Se você puder transmitir meus sentimentos em tofu frito...[/log]"

1013908-85 = "― [log=니코]Estou feliz. [/registro]"

1013908-90 = "O tofu frito duas vezes frito está completo!"

1013908-91 = "Tenho que fervê-lo agora, então ainda não será sushi inari..."

1013908-92 = "Professor, poderia provar, por favor?"

1013908-93 = "[s5] \"Se estiver tudo bem para mim...\"\r\n[s6] \"Posso comer seu primeiro tofu frito caseiro?\""

1013908-96 = "Claro. #nEu ficaria muito feliz se a professora pudesse comê-lo."

1013908-97 = "[s] \"Bem, então...eu aceito.\""

1013908-101 = "[ns7] \"É quente e fofo!\"\n[ns8] \"Essa textura fofa é muito legal!\""

1013908-104 = "Eu gostaria que estivesse na sua boca. #nO melhor dos produtos artesanais é que você pode fabricá-los em qualquer espessura."

1013908-105 = "Eu era um pouco ganancioso, então acho que acabou sendo mais uma era do tofu do que tofu frito... \r\n"

1013908-106 = "Mas acho que é um bom resultado pela primeira vez."

1013908-107 = "...A propósito, Sr. #nVocê tem planos para jantar hoje mais tarde?"

1013908-108 = "Se não se importa, farei sushi inari com esse tofu frito...#nQuer para o jantar?"

1013908-109 = "[s] \"Claro, eu ficaria feliz!\""

1013908-110 = "sim. Vou prepará-lo imediatamente, então, por favor, espere pacientemente."

1013908-111 = "[s] \"Mas...\""

1013908-112 = "Tudo bem se você não precisar de ajuda. #nIsso é algo que estou fazendo porque quero fazer. \r\n"

1013908-117 = "...E também é minha “primeira oferta” ao meu professor."

1013908-119 = "(Depois disso, tivemos um jantar tranquilo e satisfatório comendo sushi inari caseiro que Nico havia feito.)"

1013908-120 = "(O tofu frito de Nico era macio e tinha um sabor quente.)"

