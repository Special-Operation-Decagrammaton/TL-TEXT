[translation]
1013908-1 = "ニコのいなり寿司"
1013908-2 = "（ニコの言っていた保存食が気になって、昼休みに少しだけ調理室を覗いてみた）"
1013908-7 = "シャーレ建物内調理室"
1013908-9 = "（扉を開けた瞬間、油がぽつぽつ跳ねる音と香ばしい匂いがふわりと鼻をくすぐった）"
1013908-10 = "[ns] \"この匂いは……。\""
1013908-13 = "あ、先生。いらしてたんですね。\r\n"
1013908-14 = "仕上がるまでは、まだもう少しかかるので……ちょっと早かったかもしれません。"
1013908-15 = "[s1] \"すごく美味しそうな匂いがしてるけど。\"\r\n[s2] \"戦闘糧食を作るって言ってなかった？\""
1013908-18 = "はい、戦闘糧食ですよ。"
1013908-19 = "今作っているのは、昔の兵士が携帯していた伝統的な戦闘糧食――"
1013908-23 = "そう、いなり寿司です！\r\n"
1013908-24 = "[s] \"いなり寿司が、戦闘糧食になるの？\""
1013908-29 = "はい。いなり寿司は戦闘糧食の条件を満たしているんです。\r\n\r\n"
1013908-30 = "油で揚げてあるので高カロリーですし、水分が少なく傷みにくい。#nそれにお酢には抗菌作用がありますから――"
1013908-31 = "火が使えない状況下で、これほど頼れる糧食はありません。"
1013908-32 = "欠点は、美味しすぎてすぐに食べてしまうところでしょうか。ふふ。\r\n"
1013908-33 = "[ns] \"言われてみれば……そうかも。\""
1013908-35 = "[ns3] \"わざわざ時間をとってまで作るってことは――\"\r\n[ns4] \"いつものいなり寿司とは違うの？\""
1013908-38 = "はい。今回はお豆腐を揚げるところから中の具材まで全部手づくりしようと思って。"
1013908-39 = "いつもFOX小隊のお弁当に詰めているのは、市販の油揚げを使っているんですが――"
1013908-40 = "一度くらい、自分で揚げた油揚げで作ってみたくて。\r\n"
1013908-44 = "あ……もうこんな時間。\r\n"
1013908-45 = "少し、失礼しますね……。\r\n"
1013908-50 = "[wa:390]― [log=니코]ふふ、[wa:1470]よく揚がっていますね。[/log]"
1013908-52 = "― [log=니코]ふっ[wa:310]くらしていて……[wa:1890]仕上がりが楽しみです。[/log]"
1013908-55 = "[ns] \"これは……おいしそうだ。\""
1013908-56 = "[wa:860]― [log=니코]あ、[wa:880]まだダメですよ。[/log]"
1013908-59 = "[wa:480]― [log=니코]この後、[wa:530]もう1回揚げるんですから。[/log]"
1013908-62 = "― [log=니코]最初は低い温度で。[/log]"
1013908-64 = "― [log=니코]次に高い温度で揚げると、[wa:2080]水分が抜けて美味しい油揚げになるんです。[/log]"
1013908-67 = "[ns] \"油揚げって、こんなに手間がかかるんだね……。\""
1013908-68 = "[wa:1220]― [log=니코]油揚げって実は、[/log]"
1013908-70 = "― [log=니코]すごく時間と手間のかかる料理なんですよ。[/log]"
1013908-73 = "― [log=니코]それこそ昔は、[/log]"
1013908-75 = "― [log=니코]1年の豊作と安寧を願う[wa:2620]お供え物だったんだとか。[/log]"
1013908-78 = "[wa:2050]― [log=니코]私の願いは、[/log]"
1013908-80 = "― [log=니코]周りのみんなが幸せで、[wa:2420]平穏無事に過ごせること。[/log]"
1013908-83 = "― [log=니코]油揚げに込めた私の気持ちが伝わってくれたら……[/log]"
1013908-85 = "― [log=니코]嬉しいですね。[/log]"
1013908-90 = "二度揚げした油揚げ、完成です！"
1013908-91 = "これから煮たりしないといけないので、まだいなり寿司にはなりませんが……。"
1013908-92 = "先生、一口、味見していただけませんか？"
1013908-93 = "[s5] \"私でよければ……。\"\r\n[s6] \"初めての手作り油揚げを、もらっちゃっていいの？\""
1013908-96 = "もちろんです。#n先生に食べていただけるのなら、とても嬉しいです。"
1013908-97 = "[s] \"それじゃあ……いただきます。\""
1013908-101 = "[ns7] \"あつあつでふかふかだね！\"\n[ns8] \"このふわっとした食感、本当にいいね！\""
1013908-104 = "お口にあったならよかったです。#nどんな厚さでも作れるのが手作りの良さですね。"
1013908-105 = "少し欲張ってしまったから、油揚げというより厚揚げに近くなった気もしますけど……。\r\n"
1013908-106 = "でも、初めてにしては上出来だと思います。"
1013908-107 = "……ところで先生。#n今日、このあとお食事のご予定はありますか？"
1013908-108 = "よければ、この油揚げでいなり寿司を作るので……#nお夕飯に、いかがでしょう？"
1013908-109 = "[s] \"もちろん、喜んで！\""
1013908-110 = "はい。それではすぐ用意しますので、先生はゆっくり待っていてくださいね。\n"
1013908-111 = "[s] \"でも……。\""
1013908-112 = "手伝わなくて大丈夫です。#nこれはあくまで、私が作りたくて作っているものですから。\r\n"
1013908-117 = "……それに、先生へ捧げる私の「初の供物」でもありますし。"
1013908-119 = "（その後、ニコが作ってくれた手作りのいなり寿司を食べながら穏やかで満ち足りた夕食の時間を過ごした）"
1013908-120 = "（ニコの油揚げは、どこか柔らかくて、温かい味がした）"
