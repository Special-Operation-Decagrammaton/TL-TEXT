[translation]
1013908-1 = "Niko's Inari Sushi"
1013908-2 = "(Curious about the emergency rations Niko mentioned, I peeked into the cooking room during lunch break.)"
1013908-7 = "Schale Building Cooking Room"
1013908-9 = "(The moment I opened the door, the sound of oil sizzling and a savory aroma tickled my nose.)"
1013908-10 = "[ns] \"This smell is...\""
1013908-13 = "Oh, Sensei. You're here.\r\n"
1013908-14 = "It'll still take a little while to finish... I think you might be a bit early."
1013908-15 = "[s1] \"It smells really delicious, though.\"\r\n[s2] \"Didn't you say you were making combat rations?\""
1013908-18 = "Yes, they are combat rations."
1013908-19 = "What I'm making right now is a traditional combat ration that soldiers used to carry in the past—"
1013908-23 = "That's right, Inari sushi!\r\n"
1013908-24 = "[s] \"Inari sushi can be a combat ration?\""
1013908-29 = "Yes. Inari sushi meets the criteria for a combat ration.\r\n\r\n"
1013908-30 = "Since it's deep-fried, it's high in calories, and it has low moisture content, so it doesn't spoil easily. #nPlus, vinegar has antibacterial properties—"
1013908-31 = "In situations where you can't use fire, there's no ration more reliable than this."
1013908-32 = "The only drawback is that it's so delicious, you end up eating it all right away. Fufu.\r\n"
1013908-33 = "[ns] \"Now that you mention it... I suppose that's true.\""
1013908-35 = "[ns3] \"Since you're taking the time to make it from scratch—\"\r\n[ns4] \"Is it different from your usual Inari sushi?\""
1013908-38 = "Yes. This time, I wanted to make everything by hand, from frying the tofu to the filling inside."
1013908-39 = "I usually use store-bought fried tofu pouches for the FOX Platoon's bento boxes, but—"
1013908-40 = "I wanted to try making it with tofu I fried myself at least once.\r\n"
1013908-44 = "Oh... look at the time.\r\n"
1013908-45 = "Please excuse me for a moment...\r\n"
1013908-50 = "[wa:390]― [log=니코]Fufu, [wa:1470]it's frying up nicely.[/log]"
1013908-52 = "― [log=니코]It's so [wa:310]fluffy... [wa:1890]I'm looking forward to the result.[/log]"
1013908-55 = "[ns] \"That... looks delicious.\""
1013908-56 = "[wa:860]― [log=니코]Ah, [wa:880]not yet.[/log]"
1013908-59 = "[wa:480]― [log=니코]After this, [wa:530]I have to fry it one more time.[/log]"
1013908-62 = "― [log=니코]First at a low temperature.[/log]"
1013908-64 = "― [log=니코]Then, when you fry it at a high temperature, [wa:2080]the moisture escapes, making for a delicious fried tofu pouch.[/log]"
1013908-67 = "[ns] \"I didn't realize making fried tofu took so much effort...\""
1013908-68 = "[wa:1220]― [log=니코]Fried tofu is actually,[/log]"
1013908-70 = "― [log=니코]a dish that takes a lot of time and effort.[/log]"
1013908-73 = "― [log=니코]In fact, in the past,[/log]"
1013908-75 = "― [log=니코]it was an [wa:2620]offering to pray for a good harvest and peace for the year.[/log]"
1013908-78 = "[wa:2050]― [log=니코]My wish is,[/log]"
1013908-80 = "― [log=니코]for everyone around me to be happy, [wa:2420]and to live in peace and safety.[/log]"
1013908-83 = "― [log=니코]If my feelings poured into this fried tofu can reach them...[/log]"
1013908-85 = "― [log=니코]I'd be happy.[/log]"
1013908-90 = "The double-fried tofu is done!"
1013908-91 = "I still have to simmer it and such, so it's not quite Inari sushi yet, but..."
1013908-92 = "Sensei, would you like to try a bite?"
1013908-93 = "[s5] \"If you don't mind me having some...\"\r\n[s6] \"Are you sure it's okay for me to have your first batch of homemade fried tofu?\""
1013908-96 = "Of course. #nI would be very happy if you would eat it, Sensei."
1013908-97 = "[s] \"Then... thank you for the food.\""
1013908-101 = "[ns7] \"It's hot and fluffy!\"\n[ns8] \"This soft texture is really great!\""
1013908-104 = "I'm glad it was to your liking. #nThe beauty of homemade food is that you can make it any thickness you want."
1013908-105 = "I might have been a bit greedy, so it feels closer to thick fried tofu than a thin pouch...\r\n"
1013908-106 = "But for a first attempt, I think it turned out well."
1013908-107 = "...By the way, Sensei. #nDo you have any plans for dinner later today?"
1013908-108 = "If you'd like, I'm going to make Inari sushi with this fried tofu... #nhow about having it for dinner?"
1013908-109 = "[s] \"Of course, I'd love to!\""
1013908-110 = "Yes. I'll get it ready right away, so please take your time and wait, Sensei."
1013908-111 = "[s] \"But...\""
1013908-112 = "You don't need to help. #nThis is something I'm making because I want to.\r\n"
1013908-117 = "...Besides, it's also my 'first offering' dedicated to you, Sensei."
1013908-119 = "(Afterward, I spent a peaceful and fulfilling dinner time eating the homemade Inari sushi Niko made.)"
1013908-120 = "(Niko's fried tofu had a soft, warm taste to it.)"