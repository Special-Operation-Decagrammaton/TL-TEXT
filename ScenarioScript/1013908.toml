[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1013908-1 = "O Inarizushi da Niko" 
1013908-2 = "（Curioso sobre a ração militar de que a Niko falava,\nfui dar uma espiada na cozinha durante o meu horário de almoço.）" 
1013908-7 = "Cozinha da Schale" 
1013908-9 = "（Assim que abri a porta, o som de óleo borbulhando\ne um aroma irresistivelmente saboroso invadiram o meu nariz.）" 
1013908-10 = "[ns] \"Esse cheirinho delicioso é……\"" 
1013908-13 = "Ah, Sensei. Olá.\r\n" 
1013908-14 = "Ainda vai levar um tempinho até ficar tudo pronto……\nEntão você deve ter chegado um pouco cedo demais." 
1013908-15 = "[s1] \"O cheiro está maravilhoso, mas……\"\r\n[s2] \"Você não disse que estava fazendo ração militar?\"" 
1013908-18 = "Sim, isto é ração de combate." 
1013908-19 = "O que estou preparando agora é a tradicional comida militar\nque os soldados carregavam em batalha nas eras antigas――" 
1013908-23 = "Isso mesmo, Inari Sushi!\r\n" 
1013908-24 = "[s] \"Inari Sushi serve como ração de combate?\"" 
1013908-29 = "Com certeza. O Inari Sushi cumpre primorosamente\ntodos os pré-requisitos.\r\n\r\n" 
1013908-30 = "Como é frito no óleo, possui alto valor calórico, tem pouca umidade\ne é bem difícil de estragar. E o vinagre possui qualidades antibacterianas――" 
1013908-31 = "Em cenários onde fogueiras estão fora de questão,\nnão há ração mais confiável." 
1013908-32 = "Acho que a única desvantagem real\né acabar comendo tudo rápido demais de tão gostoso que é. Fufu.\r\n" 
1013908-33 = "[ns] \"Faz sentido quando a gente\npara e pensa sobre isso……\"" 
1013908-35 = "[ns3] \"Mas você tirar um tempo para vir aqui e fazer tudo isso na mão――\"\r\n[ns4] \"Significa que não é um Inari Sushi qualquer?\"" 
1013908-38 = "Sim. Desta vez, decidi que faria tudo de forma caseira,\ndesde a fritura do tofu até a preparação do recheio." 
1013908-39 = "O tofu frito que costumo usar nas marmitas do Esquadrão FOX\né sempre comprado pronto no mercado, mas――" 
1013908-40 = "Pelo menos uma vez, eu queria preparar o meu\npróprio aburaage (tofu frito) do zero.\r\n" 
1013908-44 = "Ah…… Veja que horas são.\r\n" 
1013908-45 = "Com licença, me dê só\num momentinho……\r\n" 
1013908-50 = "[wa:390]― [log=니코]Fufu, [wa:1470]estão fritando muito bem.[/log]" 
1013908-52 = "― [log=니코]Tão [wa:310]macios e felpudinhos…… [wa:1890]Mal posso esperar para ver como vão ficar.[/log]" 
1013908-55 = "[ns] \"Isso me dá…… tanta água na boca.\"" 
1013908-56 = "[wa:860]― [log=니코]Ah, [wa:880]ainda não está pronto, Sensei.[/log]" 
1013908-59 = "[wa:480]― [log=니코]Isso porque [wa:530]eu ainda preciso fritá-los mais uma vez.[/log]" 
1013908-62 = "― [log=니코]Primeiro, fritamos em temperatura baixa.[/log]" 
1013908-64 = "― [log=니코]E então aumentamos a temperatura para retirar a umidade, [wa:2080]criando o mais perfeito aburaage.[/log]" 
1013908-67 = "[ns] \"Não imaginava que o tofu frito\ndaria tanto trabalho assim……\"" 
1013908-68 = "[wa:1220]― [log=니코]A verdade é que o preparo do aburaage,[/log]" 
1013908-70 = "― [log=니코]Toma muito tempo e dá bastante trabalho, Sensei.[/log]" 
1013908-73 = "― [log=니코]E pensar que isso,[/log]" 
1013908-75 = "― [log=니코]Era usado como uma oferenda [wa:2620]para pedir por colheitas fartas e paz no ano novo nas antigas tradições.[/log]" 
1013908-78 = "[wa:2050]― [log=니코]Meu único desejo é,[/log]" 
1013908-80 = "― [log=니코]Que as pessoas ao meu redor encontrem a felicidade, [wa:2420]e que possam viver vidas tranquilas e em paz.[/log]" 
1013908-83 = "― [log=니코]Se eu puder derramar os meus desejos mais profundos neste aburaage e você puder aceitá-los……[/log]" 
1013908-85 = "― [log=니코]Ficarei imensamente feliz.[/log]" 
1013908-90 = "A dupla fritura do aburaage está finalizada!" 
1013908-91 = "Ainda precisamos cozinhá-los antes deles se tornarem de fato o Inari Sushi, mas……" 
1013908-92 = "Sensei, poderia provar\num pedacinho para mim?" 
1013908-93 = "[s5] \"Se não for pedir demais……\"\r\n[s6] \"Eu realmente posso ser o primeiro a provar o seu tofu caseiro?\"" 
1013908-96 = "Naturalmente.\nNão tem alegria maior que você sendo a primeira pessoa a experimentá-lo, Sensei." 
1013908-97 = "[s] \"Nesse caso…… Itadakimasu.\"" 
1013908-101 = "[ns7] \"Nossa, é tão quente e incrivelmente macio!\"\n[ns8] \"Essa textura aveludada é maravilhosa, Niko!\"" 
1013908-104 = "Que alívio. Fico contente de verdade que seja do seu agrado.\nPoder ajustar a espessura na medida exata é a magia da comida caseira." 
1013908-105 = "Acho que acabei exagerando um pouco,\nentão ficou mais parecido com um Atsuage (tofu grosso) do que um Aburaage...\nMas, para a primeira vez, acho que me saí muito bem." 
1013908-106 = "No entanto, sinto que para a minha primeira tentativa,\né uma proeza e tanto." 
1013908-107 = "……Falando nisso, Sensei.\nVocê tem planos para o jantar de hoje?" 
1013908-108 = "Se desejar, vou preparar os Inari Sushi com o tofu que acabei de fritar……\nEntão por que não comemos juntos no jantar?" 
1013908-109 = "[s] \"É claro!\nVou ficar aguardando ansiosamente!\"" 
1013908-110 = "Perfeito. Vai ficar tudo pronto antes que você perceba,\nentão sinta-se à vontade para relaxar lá fora e aguardar, Sensei.\n" 
1013908-111 = "[s] \"Mas……\"" 
1013908-112 = "Por favor, não há necessidade de se preocupar ou ajudar.\nEu cozinho isso por simples deleite.\r\n" 
1013908-117 = "……Além do mais, esta é a minha 'primeira oferenda'\ndedicada inteiramente ao Sensei." 
1013908-119 = "（Depois disso, passamos um momento sossegado e caloroso\ndeliciando juntos os Inari Sushis feitos à mão pela Niko.）" 
1013908-120 = "（Os Inari Sushis da Niko não me serviram apenas de conforto,\ncomo tinham gosto de calor humano e afeto.）" 