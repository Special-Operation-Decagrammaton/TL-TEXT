[translation]
10026010-1 = "Episódio 1; Pessoa comum A passando"
10026010-2 = "<A história até agora>"
10026010-7 = "Esta é uma “escritura” que foi descoberta recentemente na área de escavação da Trindade."

10026010-8 = "Vou guardar esta escritura..."
10026010-13 = "...Ah."
10026010-18 = "Foi a restauração de um livro... talvez algum livro valioso...?"
10026010-24 = "Naaaaaaaaaaaaaaaaa! ! ? ! ?"
10026010-29 = "Você precisará de “cola de musgo esfagno” e “remédio sagrado”."
10026010-30 = "De qualquer forma, se você puder trazê-lo para mim... vou derreter o material e restaurá-lo de alguma forma."
10026010-36 = "...Ou está concluído. A restauração das escrituras está completa."
10026010-37 = "Isso... vou dar para a Senseia. Por favor me conte mais tarde..."
10026010-43 = "A Senseia... acho que já é hora de chegarmos à placa de Petri..."
10026010-44 = "Pois bem...."
10026010-49 = "Uma cópia perfeita das escrituras... foi uma tarefa tediosa fazer secretamente..."
10026010-50 = "Uma irmandade cheia de segredos... Já faz algum tempo que estou curiosa sobre isso."
10026010-52 = "Bem, deixe-me mostrar-lhe o segredo..."
10026010-58 = "<Atual>"
10026010-61 = "Desta vez, gostaria de “falar” sobre o “exemplo” que Ui-san conhece…"
10026010-65 = "\"História\"...?"

10026010-66 = "\"Sequestrar\" alguém para um lugar como esse... eu poderia ter dito isso..."

10026010-70 = "rapto......? #nParece haver algum mal-entendido..."
10026010-71 = "É um sequestro... Como eu disse antes, só queremos conversar."
10026010-72 = "Ah, quando você está cercado por pessoas assim, não tem como dizer não."
10026010-73 = "Esse também foi um pedido de..."
10026010-77 = "Sim... claro que entendo. #nO que as pessoas pensam de nós?"
10026010-78 = "No entanto, não estou tentando enganar os estudantes ou tramar uma conspiração..."
10026010-79 = "Eu diria que estamos relutantes em reconhecer isso..."
10026010-80 = "Se os rumores ganharem vida própria, isso criará distância entre você e todos."
10026010-81 = "Todo mundo tem um ou dois segredos - #n, então essa é uma suspeita completamente injustificada."
10026010-82 = "---. Ah, só para pessoas suspeitas..."
10026010-83 = "...Eu sempre faço algo parecido..."
10026010-84 = "Então, por que você me colocou aqui?"
10026010-85 = "O que diabos você está planejando fazer...?"
10026010-86 = "Você achou que se o cercasse e o intimidasse, ele sucumbiria facilmente? ?"
10026010-87 = "Então, como já disse muitas vezes..."
10026010-88 = "--Se possível, eu agradeceria se você ouvisse meu pedido."
10026010-89 = "...Outro dia confirmei que o Sr. Ui tinha feito uma cópia da ``Cidade do Conselho''."
10026010-90 = "...! ! ! ! ! !"
10026010-91 = "P-por que agora...!"
10026010-92 = "Há poucos dias, a Irmandade estava vagando pela antiga biblioteca... Eu não esperava..."
10026010-93 = "--A história ainda está em andamento."
10026010-94 = "É claro que as próprias escrituras são materiais históricos, portanto qualquer pessoa tem o direito de ver o seu conteúdo. Porém, copiando sem permissão... eu gostaria de ter pelo menos consultado você..."
10026010-95 = "Uuuu... Agora que a Irmandade sabe disso, não tenho como escapar..."
10026010-99 = "...Ah! ?"
10026010-100 = "Ei, o que Hinata está fazendo? ? #nNesse caso, ela também――"
10026010-101 = "……sim?"
10026010-102 = "Estou pensando em cortar a shira...! #nMesmo ela estando envolvida nesse assunto, ela não está aqui..."
10026010-103 = "E-eu serei apagado... Acho que estão tentando me enterrar no escuro assim como ela! ?"
10026010-104 = "Hinata-san... me desculpe... fiz algo desnecessário... envolvi Hinata-san..."
10026010-106 = "……sim?"
10026010-107 = "Me desculpe, Hinata-san... a culpa é minha..."
10026010-108 = "Por favor, espere um momento. Eu gostaria que você se acalmasse um pouco e me ouvisse...#nBem, por que Hinata-san veio de repente?"
10026010-109 = "Ah... é a minha vez. Torturado e banido para uma ilha onde ninguém sabe..."
10026010-110 = "Hum, Ui-san... minha história..."
10026010-111 = "Mas mesmo se eu desaparecer..."
10026010-112 = "--A verdade permanece a mesma! !"
10026010-113 = "Do que diabos você está falando? ? #nTemos um pedido do Sr. Ui...!"
10026010-114 = "Na verdade não estou planejando nada... então, por favor, pare de me olhar desse jeito...!"
10026010-117 = "Ufufu..."
10026010-118 = "De jeito nenhum... nunca me canso de assistir♡"
10026010-119 = "...Sakurako-san e Ui-san também."
10026010-120 = "...! ?"
10026010-121 = "Quem é você...! ?"
10026010-122 = "Mesmo que este lugar seja um segredo...!"
10026010-129 = "Hehe, é um transeunte A passando ♡"
10026010-131 = "Ei, ei...! ? você……! !"
10026010-132 = "Mulher de maiô tarde da noite... Hanako! ? #nOu melhor, por que você está de maiô...! ?"
10026010-133 = "Como chegamos aqui...? #nDeve ter havido um guarda lá fora..."
10026010-134 = "Hehehe ♡ Ah, tem uma passagem secreta num lugar como esse..."
10026010-138 = "Huh, vocês dois se conheciam? ? #n, afinal, eles estavam conectados nos bastidores! ?"
10026010-139 = "Não acredito que ela tivesse uma ligação com uma pessoa tão horrível...#nA Irmandade era um lugar suspeito, afinal! !"
10026010-140 = "É um mal-entendido, Sr. Ui! Por favor, acredite realmente! #n Hanako-san vindo aqui foi inesperado...!"
10026010-141 = "Você está me dizendo para acreditar nessas palavras nesta situação? ? #nVocê não acha que é irracional? ?"
10026010-142 = "Ah, você está certo! #nSe eu estivesse no lugar do Sr. Ui, com certeza pensaria assim...!"
10026010-143 = "Por favor, deixe-me falar com Hinata-san! #nNão vou ceder a um grupo secreto!"
10026010-144 = "Então, por que Hinata aparece! ? Você não acredita em nada do que eu digo! ?"
10026010-145 = "Hum, isso..."
10026010-147 = "Hinata-san...! ?"
10026010-148 = "E-me desculpe... estou atrasado..."
10026010-149 = "Hinata-san, por que você está aqui...! ?"
10026010-151 = "Hehehe ♡ Gostaria de se acalmar e conversar um pouco?"
10026010-152 = "Como uma pessoa comum de passagem, também tenho algumas preocupações ♡"
10026010-153 = "Pessoa comum A...! ? #nTem gente andando de maiô no meio da noite...! ?"
10026010-154 = "Bem, não se preocupe com os detalhes. -Certamente, se a cópia das escrituras pelo Sr. Ui sem permissão foi considerada um erro, então sim."
10026010-155 = "Eca...! !"
10026010-156 = "Porém, como disse Sakurako, qualquer pessoa tem o direito de ler as escrituras. Ainda assim, com todo este confronto, não é inevitável que o Sr. Ui acredite na teoria da conspiração?"
10026010-157 = "Antes disso, a Irmandade pressiona uma aluna... não é muito gentil."
10026010-158 = "É fácil entender mal as palavras de Sakurako-san...#nSe continuarmos assim, o estigma de sigilo da Irmandade nunca será eliminado, certo?"
10026010-159 = "Na verdade, o Sr. Ui está tão assustado quanto ele... tanto que Hinata-san vem me pedir conselhos."
10026010-160 = "Hanako é a pessoa mais suspeita aqui..."
10026010-161 = "Ah, e não estou tentando assustar o Sr. Ui...!"
10026010-162 = "Bem... era uma história que eu não queria que outras pessoas ouvissem, então apenas evitei a atenção das pessoas..."
10026010-163 = "n / D. Esse tipo de segredo é exatamente o que estou dizendo que é o problema da Irmandade."
10026010-164 = "Então, essa é uma sugestão da pessoa comum A que está passando por aqui♪"
10026010-165 = "Ui-san procurou Hinata-san quando ela estava com problemas. #nE mesmo quando eu ia visitá-la tarde da noite, ela nunca desistia de mim e me ajudava."
10026010-166 = "Também estamos ajudando a evitar um futuro em que Sakurako-san leia palavras ridículas na frente de todos."
10026010-167 = "……sim? Aconteceu algo assim...?"
10026010-168 = "Eu-me desculpe... a culpa é minha..."
10026010-169 = "Em outras palavras, todos nós aqui estamos de alguma forma em dívida com o Sr. Ui."
10026010-170 = "Então, por que não dar uma “chance” ao Sr. Ui desta vez?"
10026010-171 = "...O que é uma chance?"
10026010-172 = "Sr. Ui, por favor, deixe este assunto passar em troca de ajudar a Irmandade em seu trabalho."
10026010-173 = "Gosta disto? Eu não acho que seja tão ruim. Sakurako-san, você não quer entrar em conflito direto com o comitê da biblioteca, certo?"
10026010-174 = "...Pode me ajudar? E-eu… Irmandade?"
10026010-175 = "não. Não foi por isso que liguei para o Sr. Ui..."
10026010-176 = "Hehe♡ Mas Sakurako-san... você tem muitas coisas acumuladas, certo? #nHá tantas questões de irmandade que venho adiando...♡"
10026010-177 = "Por exemplo, as \"ruínas\" no exemplo..."

10026010-178 = "Ruínas...?"
10026010-179 = "Algo assim...?"
10026010-180 = "P-por que você fez isso...?"
10026010-181 = "Hehe ♡ Bom, então o negócio está fechado."
10026010-182 = "Em vez de resolvermos o problema das ruínas, Sakurako-san irá ignorar o caso de Ui-san♪"
10026010-183 = "Daqui..."
10026010-185 = "...Por favor, deixe tudo comigo ♡"
10026010-199 = "Todo mundo está aqui! Sensei, por favor!"
10026010-200 = "[ns] Pressione o botão da câmera."
10026010-206 = "...? ? ? ? ?"
