[translation]
10026010-1 = "第1話;通りすがりの一般人A"
10026010-2 = "＜これまでのお話＞"
10026010-7 = "これは、先日トリニティの発掘区域にて発見された「経典」です。"
10026010-8 = "私はこの経典を保管しておきつつ……"
10026010-13 = "……あっ。"
10026010-18 = "本の復元、でしたっけ……何か貴重な本でも……？"
10026010-24 = "なああああぁぁぁぁぁぁぁぁぁぁっ！！？！？"
10026010-29 = "「水苔膠」、そして「精聖薬」が必要です。"
10026010-30 = "と、とにかくそれを、持ってきていただけたら……その材料を溶かして、何とか復元させます。"
10026010-36 = "……か、完成しました。経典の復元、完了です。"
10026010-37 = "これは……先生にお渡しします。あとで伝えてあげてください……"
10026010-43 = "先生は……そろそろ、シャーレに着いた頃でしょうか……。"
10026010-44 = "では……。"
10026010-49 = "経典の完璧なコピー……こっそり作るには、しんどい作業でしたね……。"
10026010-50 = "秘密にまみれたシスターフッド……前から気になっていました。"
10026010-52 = "さて、その秘密……見せてもらうとしましょうか……。"
10026010-58 = "＜現在＞"
10026010-61 = "この度は、ウイさんもご存知の「例の件」について「お話」をさせていただきたく……"
10026010-65 = "「お話」……？"
10026010-66 = "人をこんなところに「拉致」しておいて……よくもそんな事が言えたものです……"
10026010-70 = "拉致……？#n何か誤解されているようですが……"
10026010-71 = "拉致だなんて……先ほども申し上げましたが、私たちはただ、お話をしたいだけなのです。"
10026010-72 = "あっ、あんな風に囲まれたら、断りようが無いじゃないですか。"
10026010-73 = "それも……「[ruby=シスターフッド]謎に包まれた秘密主義集団[/ruby]」からの要請だなんて。"
10026010-77 = "ええ……もちろん分かっておりますとも。#n私たちが世間からどのように思われているのかなど。"
10026010-78 = "ですが、生徒を騙したり、陰謀を企てたりしているわけではありませんので……"
10026010-79 = "私たちとしても、その認識は不本意と申しますか……"
10026010-80 = "噂が独り歩きすることで、皆様との間に距離ができてしまいますし。"
10026010-81 = "誰だって秘密の1つや2つ抱えているもの――#nですので、全く謂れのない疑いなのです。"
10026010-82 = "――っ。あ、怪しい人たちに限って……"
10026010-83 = "……いつも、似たようなこと、を……"
10026010-84 = "そ、それで、どうして私をこんなところに？"
10026010-85 = "い、一体、何をする気、なのですか……？"
10026010-86 = "と、取り囲んで威圧すれば、簡単に屈すると思ったんですか！？"
10026010-87 = "ですから、先ほどから、何度も申し上げている通り――"
10026010-88 = "――可能であれば、「お願い」を聞いていただければと。"
10026010-89 = "……先日、ウイさんが「公議会の経典」の複写を作った事を確認しました。"
10026010-90 = "……！！！！！！"
10026010-91 = "な、なぜ今になって……！"
10026010-92 = "数日前にシスターフッドの方が古書館の周辺をうろついてたのは……まさか……"
10026010-93 = "――お話は、まだ途中です。"
10026010-94 = "もちろん、経典自体は歴史的資料の一つですので、中身は誰にでも閲覧する権利があります。ですが、無断で複写、というのは……せめてご相談いただきたかったのですが……"
10026010-95 = "ううぅ……シスターフッドに知られた以上、言い逃れは……"
10026010-99 = "……はっ！？"
10026010-100 = "ひ、ヒナタさんはどうしているんですか！？#nこの件、彼女も――"
10026010-101 = "……はい？"
10026010-102 = "シラを切るつもりですね……！#n彼女もこの件の関係者なのにここにいないという事は……"
10026010-103 = "け、消されてしまう……私の事も、彼女みたいに闇に葬ろうとしてるのですよね！？"
10026010-104 = "ヒナタさん……ごめんなさい……私が余計なことをしたから……ヒナタさんを巻き込んでしまった……"
10026010-106 = "……はい？"
10026010-107 = "ごめんなさい、ヒナタさん……私のせいです……"
10026010-108 = "ちょっと待ってください。少し落ち着いて聞いていただきたいのですが……#nその、どうして急にヒナタさんが？"
10026010-109 = "ああ……次は私の番。拷問を受けて、誰も知らない場所に島流しに……"
10026010-110 = "あの、ウイさん……私の話を……"
10026010-111 = "ですが、私が消えたとしても――"
10026010-112 = "――真実は変わりません！！"
10026010-113 = "一体なにを仰っているのですか！？#n私たちは、ウイさんにお願いがあって……！"
10026010-114 = "本当に、何かを企んでいるわけではありませんので……そういう目で見るのはおやめください……！"
10026010-117 = "うふふっ……"
10026010-118 = "まったく……見ていて飽きませんね♡"
10026010-119 = "……サクラコさんも、ウイさんも。"
10026010-120 = "……！？"
10026010-121 = "ど、どなたですか……！？"
10026010-122 = "ここは秘匿された場所だというのに……！"
10026010-129 = "ふふっ、通りすがりの通行人Aです♡"
10026010-131 = "ひ、ひぃっ……！？あなたは……！！"
10026010-132 = "深夜の水着女……[ruby=うらわ]浦和[/ruby]ハナコ！？#nというか、どうして水着を……！？"
10026010-133 = "どうやってここまで……？#n外には見張りがいたはず……"
10026010-134 = "うふふ♡あら、こんなところに秘密の通路が……"
10026010-138 = "ふ、2人とも知り合いだったんですか！？#nや、やっぱり裏で繋がっていたんですね！？"
10026010-139 = "あんな恐ろしい人との繋がりまであったなんて……#nやっぱりシスターフッドは怪しいところだったんですね！！"
10026010-140 = "誤解なんです、ウイさん！本当に信じてください！#nハナコさんがここに来るなんて……想定外で……！"
10026010-141 = "この状況でその言葉を信じろって言うんですか！？#n無理があるとは思わないんですか！？"
10026010-142 = "お、仰る通りなんですが！#n私がウイさんの立場なら、間違いなくそう思ってしまうでしょうし……！"
10026010-143 = "ヒナタさんと話をさせてください！#nわ、私は秘密主義集団になんて屈しません！"
10026010-144 = "ですから、どうしてヒナタが出てくるのですか！？私の言うことは、何ひとつ信じてくださらないのですか！？"
10026010-145 = "えっと、その……"
10026010-147 = "ヒナタさん……！？"
10026010-148 = "ご、ごめんなさい……遅れてしまいまして……。"
10026010-149 = "ヒナタさん、どうしてここに……！？"
10026010-151 = "うふふっ♡ちょっと落ち着いてお話、しませんか？"
10026010-152 = "私も、通りすがりの一般人Aとしてちょっと気になるところがありまして♡"
10026010-153 = "い、一般人A……！？#n夜中に水着で徘徊するような人が……！？"
10026010-154 = "まあまあ、細かいことは気にしないでくださいな。――たしかに、ウイさんが無断で経典を複写した事を過ちというのならばそうでしょう。"
10026010-155 = "うっ……！！"
10026010-156 = "ですが、サクラコさんが仰っていたように、経典は誰にでも閲覧する権利があるもの。それなのにこのように詰め寄っては、陰謀論をウイさんが信じてしまうのも致し方ないのでは？"
10026010-157 = "それ以前に、シスターフッドが一生徒に圧力をかけるだなんて……あんまり穏やかではありませんね。"
10026010-158 = "サクラコさんの言葉遣いは誤解を招きやすいですし……#nこのようなやり方を続けていては、シスターフッドの秘密主義という汚名はいつまでも濯げませんよ？"
10026010-159 = "事実、ウイさんはこの通り怖がっていますし……ヒナタさんが私の元に相談に来るくらいですから。"
10026010-160 = "この場で誰よりも胡散臭いのは、ハナコさんなのでは……"
10026010-161 = "そ、それに、私はウイさんを怖がらせるつもりなど……！"
10026010-162 = "その……あまり他人に聞かれたくないお話だったので、人目を避けただけで……"
10026010-163 = "ふふ。まさに、そういう秘密主義がシスターフッドの問題だと言っているんです。"
10026010-164 = "ということで、通りすがりの一般人Aからの提案です♪"
10026010-165 = "ウイさんは、ヒナタさんが困っていた時に手を差し伸べてくれましたね。#nそして、深夜に訪れた私のことも、決して突き放さずに助けてくれました。"
10026010-166 = "サクラコさんがみなさんの前であられもない言葉を読み上げてしまう未来を回避する事にも貢献しています。"
10026010-167 = "……はい？そ、そのようなことが、あったのですか……？"
10026010-168 = "ご、ごめんなさい……私が悪いんです……。"
10026010-169 = "つまり、この場にいる私たちは全員、何らかの形でウイさんのお世話になっているのです。"
10026010-170 = "ですから今回は、ウイさんに「チャンス」を与えてはいかがでしょう？"
10026010-171 = "……チャンス、とは？"
10026010-172 = "ウイさんにはシスターフッドの仕事を手伝っていただく代わりに、この件を見逃してください。"
10026010-173 = "いかがですか？そう悪い話ではないと思いますよ。サクラコさんだって、何も図書委員会と真っ向から揉めたいわけではありませんよね？"
10026010-174 = "……た、助ける？わ、私が……シスターフッドを？"
10026010-175 = "い、いえ。そんなつもりでウイさんをお呼びしたわけでは……"
10026010-176 = "ふふ♡ですが、サクラコさん……色々と溜まってますよね？#n先送りにしていたシスターフッドの問題が、それはもう……いっぱい♡"
10026010-177 = "たとえば、例の「遺跡」とか……"
10026010-178 = "遺跡……？"
10026010-179 = "そんなものが……？"
10026010-180 = "ど、どうしてそれを……？"
10026010-181 = "ふふっ♡それでは、取引成立ですね。"
10026010-182 = "私たちで遺跡の問題を解決する代わりに、サクラコさんはウイさんの件を見逃す、ということで♪"
10026010-183 = "ここからは……"
10026010-185 = "……私に全てお任せください♡"
10026010-199 = "みなさん揃いましたよ～！先生、お願いします～！"
10026010-200 = "[ns] カメラのスイッチを押す。"
10026010-206 = "……？？？？？"
