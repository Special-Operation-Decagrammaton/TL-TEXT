[translation]
10005025-5 = "Q-que foi isso!? Falha no motor? Ou uma colisão!?"
10005025-6 = "Não, esse som... é uma bomba!"
10005025-7 = "O quê...!? Isso significa que estamos sendo atacados por alguém!?"
10005025-8 = "Avise a todos!! Relatem à alta cúpula, há possibilidade de terroristas!"
10005025-9 = "Digam que solicito a ativação do \"Plano Bunny B\"! Isso não é um treinamento! Repito, isso não é um treinamento!!"
10005025-12 = "...Ufa."
10005025-13 = "Certo, parece que não há problemas. Não devemos estar sendo seguidos."
10005025-14 = "As câmeras de segurança também foram desativadas, então por enquanto podemos ficar assim..."
10005025-18 = "[ns1] \"Akane?\"\n[ns2] \"Você está bem? Se machucou em algum lugar?\""
10005025-19 = "Ah, estou bem, obrigada..."
10005025-20 = "Ah, estou bem, obrigada..."
10005025-21 = "Bem... sinto muito, foi um erro meu..."
10005025-22 = "Mesmo depois de tudo o que foi dito, acabei causando uma explosão chamativa..."
10005025-23 = "Me empolguei e, como sempre, acabei fazendo..."
10005025-24 = "Pelo visto, nossa presença foi descoberta com certeza..."
10005025-25 = "Claramente foi uma falha minha."
10005025-26 = "Akane..."
10005025-28 = "...Tsc."
10005025-29 = "Não precisa pensar tanto nisso. Ainda não falhamos, a questão é o que faremos daqui para frente."
10005025-30 = "E eu já estava cansada de agir como uma estudante comportada de qualquer forma."
10005025-31 = "[s3] \"Isso significa que a Neru não é uma estudante do ensino médio...?\"\n[s4] \"Será que ela era uma estudante do ensino fundamental...!?\""
10005025-32 = "Hã!? O que você está dizendo!?"
10005025-33 = "Hã!? O que você está dizendo!?"
10005025-34 = "..."
10005025-35 = "Por que..."
10005025-36 = "[s5] \"Eu não sou a supervisora nem quem dá as ordens, mas vamos pensar no próximo passo?\"\n[s6] \"Além disso, como a Neru disse, ainda não falhamos. Não é?\""
10005025-37 = "Mas, daqui para frente..."
10005025-38 = "Mas, daqui para frente..."
10005025-39 = "...?"
10005025-40 = "Plano B...?"
10005025-41 = "É a nossa vez agora...?"
