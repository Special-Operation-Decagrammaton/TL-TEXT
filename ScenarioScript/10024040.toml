[translation]
10024040-1 = "Episódio 4; Shakohoro"
10024040-9 = "Monte Kunlun - Entrada"
10024040-11 = "Sensei, você está bem?"
10024040-12 = "[s1] \"Eu não sabia que...\"\n[s2] \"...a subida era tão íngreme!\""
10024040-15 = "Sensei, quando seu nome for limpo, que tal treinar Kung Fu comigo?"
10024040-16 = "Com certeza, essa é uma ótima ideia."
10024040-20 = "[ns] \"Como assim uma ótima ideia!?\""
10024040-21 = "A resistência física é essencial para tudo. Para cozinhar, por exemplo, é preciso aguentar o calor da cozinha enquanto manuseia a panela em pé por longas horas."
10024040-22 = "Isso também se aplica ao seu trabalho, Sensei."
10024040-23 = "[s] \"...Construir resistência física através do treinamento de Kung Fu?\""
10024040-24 = "Sim, exatamente."
10024040-25 = "[s] \"Eu admito que estou fora de forma, mas...\""
10024040-26 = "\"Aja antes de pensar. Quem não age, fracassa...\""
10024040-27 = "Não são palavras perfeitas para o Sensei de agora?"
10024040-28 = "Ahaha, que bom para você, Sensei. #nDeixe a Reijo te treinar!"
10024040-31 = "[ns] \"Você está achando graça, não está!?\""
10024040-40 = "Vocês demoraram, Comércio Genbu."
10024040-41 = "Você é..."
10024040-42 = "É a primeira vez que conversamos de verdade, não é?"
10024040-43 = "Eu sou a Chefe Executiva da Genryumon — Konoe Mina."
10024040-44 = "Se a Chefe Executiva apareceu, posso presumir que foi uma ordem da Kisaki?"
10024040-45 = "Quem sabe... Deixarei que você imagine."
10024040-46 = "Dizem que o criminoso sempre retorna à cena do crime. #nEu apenas esperei aqui para confirmar isso com meus próprios olhos."
10024040-47 = "É difícil aceitar ser tratada como criminosa só por investigar o local, Chefe Executiva Mina."
10024040-48 = "Não — todas as coisas estão conectadas. #nEu tenho certeza disso."
10024040-49 = "Uma convicção descuidada é o que o mundo chama de \"negligência\"."
10024040-50 = "Eu sempre fico alerta contra a negligência e me esforço para melhorar — #nna Genryumon, nunca cometeríamos tal erro."
10024040-52 = "Que confiança admirável. #nO excesso de confiança às vezes cega o julgamento."
10024040-53 = "Chame isso de senso de responsabilidade."
10024040-54 = "Pois pode ser que, desta vez, encontremos uma prova definitiva."
10024040-55 = "O processo até colher os primeiros frutos — isso envolve um esforço imenso. #nMas é justamente por isso que vale a pena."
10024040-60 = "[ns3] \"Por que você tirou esse vale-refeição?\"\n[ns4] \"Não pode, Mina-chan! Se você queimar isso!\""
10024040-63 = "...Fique tranquilo, Sensei. #nAquele é um vale-refeição falso."
10024040-64 = "Ufa, é uma pena que eu não possa fumar aqui."
10024040-67 = "[ns] \"Não, isso é proibido para estudantes!\""
