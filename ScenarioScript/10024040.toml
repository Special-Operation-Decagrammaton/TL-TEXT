[translation]
10024040-1 = "第4話;[ruby=しゃこほうろう]舎虎逢狼[/ruby]"
10024040-9 = "崑崙山・入口"
10024040-11 = "先生、大丈夫？"
10024040-12 = "[s1] \"こんな急勾配だなんて……\"\n[s2] \"聞いてないんだけど……！\""
10024040-15 = "先生、容疑が晴れたら、私と一緒にカンフーの修行をしませんか？"
10024040-16 = "たしかに、それは名案だね。"
10024040-20 = "[ns] \"どこが名案なの！？\""
10024040-21 = "何事にも体力は欠かせませんからね。料理をするのにも、長時間立ちながら鍋を振るい、厨房の暑さに耐える必要があります。"
10024040-22 = "それは、先生の仕事にも通じる事ですから。"
10024040-23 = "[s] \"……カンフーの修行を通じて、体力作りを？\""
10024040-24 = "ええ、その通りです。"
10024040-25 = "[s] \"運動不足なのは認めるけど……\""
10024040-26 = "「考えるより行動せよ。行動しない者は敗北する……」"
10024040-27 = "まさに、今の先生のためにあるような言葉ではありませんか？"
10024040-28 = "あはは、良かったね、先生。#nレイジョに鍛えてもらいなよ！"
10024040-31 = "[ns] \"面白がってるよね！？\""
10024040-40 = "遅かったな、玄武商会。"
10024040-41 = "あなたは……！"
10024040-42 = "改めて言葉を交わすのは初めてだな？"
10024040-43 = "玄龍門の執行部長――[ruby=このえ]近衛[/ruby]ミナだ。"
10024040-44 = "執行部長が顔を出したってことは、キサキの命令だと思っていいのかな？"
10024040-45 = "さてな……ご想像にお任せしよう。"
10024040-46 = "犯人は再び犯行現場に現れるものと相場がきまっている。#n私はそれをこの目で確かめるべく、待っていたまでだ。"
10024040-47 = "現場を検分するだけで犯人扱いをされてはたまりませんよ、ミナ執行部長。"
10024040-48 = "いや――すべての物事は繋がっているというものだ。#n私は確信しているぞ。"
10024040-49 = "うかつな確信を、世間では「不注意」と呼ぶのです。"
10024040-50 = "私は不注意を常に警戒し、改善の努力を重ねてきたんだ――#n玄龍門では絶対にそのようなミスは犯さない。"
10024040-52 = "素晴らしい自信ですね。#n過剰な自信は時にその目を曇らせますよ。"
10024040-53 = "そこは責任感といってくれ。"
10024040-54 = "今度こそ、決定的な証拠が見つかるかもしれないからな。"
10024040-55 = "初の実を結ぶまでの過程――それは途方もない苦労を伴う。#nしかし、だからこそやり甲斐があるというもの。"
10024040-60 = "[ns3] \"食券を取り出して、どうしたの？\"\n[ns4] \"ダメだよ、ミナちゃん！燃やしたら！\""
10024040-63 = "……安心してください、先生。#nあれは偽の食券です。"
10024040-64 = "ふぅ、タバコを吸えないのが残念だな。"
10024040-67 = "[ns] \"いや、生徒がそれはダメだからね！？\""
