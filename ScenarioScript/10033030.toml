[translation]
10033030-1 = "第3話;この出会いはどこまでも"
10033030-2 = "じ、人力車はいかがでしたでしょうか？"
10033030-3 = "次はこちらの、展望台へと登っていきます！"
10033030-8 = "すごい、きれーい！"
10033030-9 = "当たり前だけど、ゲヘナと全然違うね。"
10033030-10 = "ねぇねぇ、写真撮ろ！エリカちゃんも！"
10033030-11 = "うん、そうだね。"
10033030-12 = "あ、せっかくだし……そこのガイドちゃんたちー！"
10033030-14 = "わ、私たちもですかぁ！？"
10033030-16 = "写真はみんなで撮った方が楽しいでしょー？#nあ、今更だけどあたしキララ、[ruby=よざくら]夜桜[/ruby]キララ！"
10033030-17 = "[ruby=はたみ]旗見[/ruby]エリカだよ。"
10033030-19 = "共に肩を並べることで、義理と友情を形にする……#nこれもまた任侠……！"
10033030-20 = "ご挨拶が遅れました、[ruby=あさひな]朝比奈[/ruby]フィーナと申しマス！#nお会いできて嬉しいデス！"
10033030-21 = "お、お祭り運営委員会の、[ruby=さとはま]里浜[/ruby]ウミカです……！#n至らないことばかりですが、よろしくお願いしますっ！"
10033030-22 = "私は[ruby=いさみ]勇美[/ruby]カエデ！#n素敵で完璧なレディーになるために修行中の身なの！"
10033030-24 = "へぇー！#nでもカエデちゃん、もう立派なレディーだと思うけどな？"
10033030-25 = "えっ、そ、そうかな！？#nそれは嬉しいかも……！"
10033030-26 = "で、でもでも！#nまだ成長途中だから、今よりもーっとカッコよくて完璧なレディーになるから！"
10033030-27 = "[ruby=かすが]春日[/ruby]ツバキ……ふぁ。#n今晩眠れなかったら、私に言ってね……布団から耳栓まで、準備できてるから……。"
10033030-28 = "そ、そっか……#nまあ修学旅行だし、「まだ寝たくない」って人の方が多そうだけど……。"
10033030-30 = "ほらほらツバキ先輩、ちゃんと立って！"
10033030-31 = "んぅ……。"
10033030-37 = "じゃあ行っくよー！"
10033030-42 = "ほらウミカ、笑ってクダサイ！"
10033030-43 = "えっ、えぇっ……！？"
10033030-54 = "はい、チーズ！"
10033030-56 = "――！"
10033030-63 = "うん、バッチリ！#n後で写真送るね、あ、今のうちに連絡先交換しよっか？"
10033030-64 = "……ごめんね。#nキララちゃん、いつもこういう距離感だから。困ったら言って。"
10033030-71 = "皆さん、お疲れ様でした……！"
10033030-72 = "この展望台から見えるご神木。#nあれは百鬼夜行連合学院の象徴であり誇りなのです！"
10033030-73 = "ナント！#nその神木を祀るお祭りが、ちょうど明日開かれるのです！"
10033030-74 = "みんなが来るタイミングとぴったり合うなんて、すっごいねー！"
10033030-79 = "神木祭……何とか起きてないと……。"
10033030-80 = "（このために神木祭の日程を調整してくださった皆さん、ありがとうございます……！）"
10033030-82 = "あはっ、その調子だとみんなも楽しみにしてるお祭りなんだね？"
10033030-83 = "さっきの説明だと、#nお祭りを元にして生まれた学園地区、みたいな感じだったしね。"
10033030-84 = "[s] \"確かに、しょっちゅうお祭りだらけだし。\""
10033030-86 = "やはり、お祭りは良いものですから。"
10033030-87 = "日常から離れ、一つの目的のために皆が集う……。"
10033030-88 = "非日常の中で、笑い、喜び、思いもよらない体験を得る日……！"
10033030-89 = "百鬼夜行だけではありません、この感覚はキヴォトス全体にあるもの……#nだからこそ、各地でまだ見たこともないお祭りが無限にあるんです！"
10033030-90 = "皆さんが通うゲヘナ学園にもありますよね！#n11日の11時11分から始まるバラのお祭りや、みんなでトマトを投げ合うお祭りなどなど……！"
10033030-92 = "そ、そんなお祭りあったっけ……？"
10033030-93 = "さぁ……私たちと違って、普通の部活の人なら知ってるんじゃない？"
10033030-94 = "それにしても、ウミカちゃんは本当にお祭りが好きなんだね！#nすっごく楽しそうに喋ってたし！"
10033030-96 = "すっ、すみません！#nつい早口に……！"
10033030-97 = "[s] \"良いんじゃないかな、本当に好きだってことが伝わってきて。\""
10033030-98 = "先生までぇ……！？"
10033030-100 = "それにしても神木祭かぁ、どういうお祭りになるんだろうね？"
10033030-101 = "そこでまた問題が起きなきゃ良いけど……。"
10033030-106 = "うわっ、なにこれ！？#nこの部分だけ地面がツルツルしてる！"
10033030-107 = "急に転んだと思ったら……大丈夫？"
10033030-108 = "も、申し訳ありません……！#nお怪我は……！？"
10033030-110 = "この部分、何か変デスね……#n何かで磨かれているような？"
10033030-111 = "変なの、本当にこの部分だけだね？"
10033030-113 = "……ご神木が、一番よく見える場所……。"
10033030-115 = "えっ、何それ楽しそう！#n私も滑りたい！"
10033030-116 = "ちょっと横入りしないで！#n撃つよ！？"
10033030-121 = "み、皆さん！？#nあの、これからご神木のお話を……。"
10033030-123 = "ゲヘナにルールなんか無用でしょ！"
10033030-124 = "いやここゲヘナじゃないけど！？"
10033030-126 = "え、えぇっと、#nご神木の起原については諸説あるものの、一番有力なものとしては……"
10033030-128 = "……これ、止めた方が良い？"
10033030-129 = "んー、誰かが地雷とか撒き始めたら動こっか？"
10033030-134 = "ああもう、争ってる場合じゃないでしょ？#nこういう時は――"
10033030-136 = "あ、何とかなりそう。"
10033030-143 = "一か所じゃなくて、全面滑り台にしちゃえば良いの！"
10033030-144 = "「「「「それだ！！！」」」」"
10033030-145 = "[ns] \"それかなぁ！？\""
10033030-150 = "うわめっちゃ滑る！"
10033030-151 = "私も私もー！"
10033030-155 = "とにかく床を磨け！何使っても良いから！"
10033030-157 = "み、皆さん！？#nその、えぇっとぉ……！？"
10033030-158 = "爆弾の勢いで滑ったら、もっと楽しくない？"
10033030-159 = "確かに、どこまで進むか競争しよう！"
10033030-160 = "それ、落ちたらどうするの？"
10033030-161 = "まぁ何とかなるでしょ！"
10033030-162 = "ダメですってばぁ！"
10033030-167 = "ウミカちゃん、苦労人だねぇ？"
10033030-168 = "……止めよっか。"
10033030-169 = "あははっ、流石にそうだね！"
10033030-177 = "な、何とか落ち着いたみたい……？"
10033030-178 = "デハ不肖フィーナ、皆さんを次の場所へご案内しマス！"
10033030-182 = "ふぁ……動いたら疲れた……眠い……。"
10033030-186 = "[ns] \"みんな、お疲れ様……。\""
10033030-190 = "はぁ、はぁ……ゲヘナの皆さん、元気ですね……。"
10033030-191 = "お二方も、助けていただいてすみません……。"
10033030-193 = "あははっ、大したことじゃないって！"
10033030-194 = "まあ、私たちにとってはいつものことだし。"
10033030-195 = "[s] \"二人とも、本当にありがとね。\""
10033030-196 = "嬉しいけど、これくらいでお礼してたらキリがないと思うよ？"
10033030-197 = "まあ、下手したらあと100回くらい起きるだろうね。#n今日だけでも。"
10033030-198 = "[s] \"そうだよねぇ……。\""
10033030-199 = "ま、とにかく次のとこに行こっか。#n先生もウミカちゃんも、落ち着いたらゆっくり来てね～！"
10033030-203 = "じゃあ、また後で。#nこういうことが積み重ならないことを祈るね。"
10033030-208 = "うぅ、スケジュールに12分も遅れが……#n何とかしないと……！"
10033030-209 = "[s1] \"まだ何とかなるはず……。\"\n[s2] \"もともと余裕を持ったスケジュールだったし……。\""
10033030-212 = "ですが、始まったばかりなのにこれでは……。"
10033030-213 = "こういう時、一体どうすれば……。"
10033030-214 = "[s] \"ウミカ、大事なことを教えるね。\""
10033030-215 = "は、はいっ……。"
10033030-216 = "[s] \"……無駄かもしれない努力が、必要な時もある。\""
10033030-220 = "先生ぇ！？"
