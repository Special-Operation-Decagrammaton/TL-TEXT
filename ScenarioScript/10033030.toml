[translation]
10033030-1 = "Episódio 3: Este encontro é infinito"
10033030-2 = "E-então, o que acharam do riquixá?"
10033030-3 = "A próxima parada é aqui, vamos subir até o observatório!"
10033030-8 = "Uau, que lindo!"
10033030-9 = "É óbvio, mas é completamente diferente de Gehenna."
10033030-10 = "Ei, ei, vamos tirar uma foto! Erika-chan também!"
10033030-11 = "Sim, vamos."
10033030-12 = "Ah, já que estamos aqui... ei, vocês, nossas guias!"
10033030-14 = "N-nós também!?"
10033030-16 = "É mais divertido tirar fotos com todo mundo, né?#nAh, esqueci de me apresentar, sou Kirara, Yozakura Kirara!"
10033030-17 = "Eu sou Hatami Erika."
10033030-19 = "Caminhar lado a lado, transformando dever e amizade em algo concreto...#nIsso também é Ninkyo...!"
10033030-20 = "Peço desculpas pela demora, meu nome é Asahina Fina!#nEstou muito feliz em conhecê-los!"
10033030-21 = "E-eu sou Satohama Umika, do Comitê Organizador do Festival...!#nNão sou muito experiente, mas conto com vocês!"
10033030-22 = "Eu sou Isami Kaede!#nEstou treinando para me tornar uma dama maravilhosa e perfeita!"
10033030-24 = "Hee!#nMas Kaede-chan, eu acho que você já é uma dama exemplar, não acha?"
10033030-25 = "S-sério!?#nIsso me deixa feliz...!"
10033030-26 = "M-mas, mas!#nEu ainda estou em crescimento, então vou me tornar uma dama ainda mais legal e perfeita do que sou agora!"
10033030-27 = "Kasuga Tsubaki... ah.#nSe não conseguir dormir hoje à noite, me avise... já estou preparada, desde o futon até os protetores auriculares..."
10033030-28 = "E-entendi...#nBem, é uma viagem escolar, mas acho que a maioria das pessoas não vai querer dormir tão cedo..."
10033030-30 = "Vamos, vamos, Tsubaki-senpai, fique de pé direito!"
10033030-31 = "Nnn..."
10033030-37 = "Então lá vamos nós!"
10033030-42 = "Vamos, Umika, sorria, por favor!"
10033030-43 = "E-eh, sério...!?"
10033030-54 = "Digam X!"
10033030-56 = "——!"
10033030-63 = "Sim, perfeito!#nVou te enviar a foto depois, ah, vamos trocar contatos agora?"
10033030-64 = "...Desculpe.#nA Kirara-chan sempre tem esse jeito de se aproximar. Se ficar desconfortável, me avise."
10033030-71 = "Pessoal, muito obrigada pelo esforço...!"
10033030-72 = "A árvore sagrada que vocês veem deste observatório.#nEla é o símbolo e o orgulho da Academia Hyakkiyako!"
10033030-73 = "E vejam só!#nO festival que celebra essa árvore sagrada acontecerá justamente amanhã!"
10033030-74 = "Que incrível que a data da nossa visita coincidiu exatamente com isso!"
10033030-79 = "Festival da Árvore Sagrada... preciso dar um jeito de ficar acordada..."
10033030-80 = "(Muito obrigada a todos que ajustaram a data do Festival da Árvore Sagrada para isso...!)"
10033030-82 = "Ah, pelo visto é um festival que todo mundo está esperando, né?"
10033030-83 = "Pelo que você explicou antes, parece que o distrito escolar nasceu por causa dos festivais, não é?"
10033030-84 = "[s] \"Com certeza, vivemos cercados de festivais o tempo todo.\""
10033030-86 = "Afinal, festivais são algo maravilhoso."
10033030-87 = "Sair da rotina e reunir todos com um único propósito..."
10033030-88 = "Um dia para rir, se alegrar e ter experiências inesperadas em meio ao extraordinário...!"
10033030-89 = "Não é só em Hyakkiyako, esse sentimento existe em todo o Kivotos...#nÉ por isso que existem infinitos festivais que ainda não vimos em todos os lugares!"
10033030-90 = "Na Academia Gehenna, onde vocês estudam, também deve ter, não é?#nComo o festival das rosas que começa às 11h11 do dia 11, ou aquele em que todos jogam tomates uns nos outros...!"
10033030-92 = "E-existia um festival assim...?"
10033030-93 = "Quem sabe... diferente de nós, talvez o pessoal dos clubes comuns saiba, não?"
10033030-94 = "Mas, de qualquer forma, a Umika-chan realmente ama festivais, né!#nVocê falou com tanta empolgação!"
10033030-96 = "D-desculpe!#nAcabei falando rápido demais...!"
10033030-97 = "[s] \"Não tem problema, deu para perceber o quanto você gosta disso.\""
10033030-98 = "Até o Sensei...!"
10033030-100 = "Mas enfim, o Festival da Árvore Sagrada, como será que ele vai ser?"
10033030-101 = "Espero que não surjam mais problemas por aqui..."
10033030-106 = "Uau, o que é isso!?#nO chão está super escorregadio só nesta parte!"
10033030-107 = "Você caiu de repente... está bem?"
10033030-108 = "M-mil perdões...!#nVocê se machucou...!?"
10033030-110 = "Essa parte está estranha...#nParece que foi polida com alguma coisa?"
10033030-111 = "Que estranho, é só nesta parte mesmo?"
10033030-113 = "...O lugar de onde se vê melhor a Árvore Sagrada..."
10033030-115 = "Ei, que divertido!#nEu também quero escorregar!"
10033030-116 = "Ei, não fure a fila!#nQuer levar um tiro!?"
10033030-121 = "P-pessoal!?#nEi, eu ia começar a falar sobre a Árvore Sagrada..."
10033030-123 = "Regras não se aplicam em Gehenna, né!"
10033030-124 = "Ei, mas aqui não é Gehenna!?"
10033030-126 = "B-bem,#nembora existam várias teorias sobre a origem da Árvore Sagrada, a mais aceita é..."
10033030-128 = "...É melhor a gente parar com isso?"
10033030-129 = "Hmm, que tal a gente se mexer se alguém começar a espalhar minas terrestres?"
10033030-134 = "Ah, chega, não é hora de brigar, né?#nNessas horas, a gente deve—"
10033030-136 = "Ah, acho que vai dar certo."
10033030-143 = "Em vez de um lugar só, por que não transformamos tudo em um escorregador!"
10033030-144 = "““““É isso!!!””””"
10033030-145 = "[ns] \"É isso mesmo!?\""
10033030-150 = "Uau, escorrega muito!"
10033030-151 = "Eu também, eu também!"
10033030-155 = "De qualquer forma, polam o chão! Usem o que for preciso!"
10033030-157 = "P-pessoal!?#nIsso, bem...!?"
10033030-158 = "Não seria mais divertido se a gente escorregasse com o impulso de uma bomba?"
10033030-159 = "Verdade, vamos apostar uma corrida para ver quem vai mais longe!"
10033030-160 = "E se a gente cair, como é que faz?"
10033030-161 = "Ah, a gente dá um jeito!"
10033030-162 = "Eu já disse que não pode!"
10033030-167 = "Umika-chan, você sofre, hein?"
10033030-168 = "...Vamos parar com isso."
10033030-169 = "Ahaha, é verdade, né!"
10033030-177 = "P-parece que as coisas se acalmaram...?"
10033030-178 = "Pois bem, eu, Feena, vou guiar vocês até o próximo local!"
10033030-182 = "Ah... cansei de tanto me mexer... estou com sono..."
10033030-186 = "[ns] \"Pessoal, bom trabalho...\""
10033030-190 = "Ah, ah... o pessoal de Gehenna é bem animado, né..."
10033030-191 = "E vocês duas, obrigado por ajudarem também..."
10033030-193 = "Ahaha, não foi nada!"
10033030-194 = "Bem, para nós, isso é normal."
10033030-195 = "[s] \"As duas, muito obrigado mesmo.\""
10033030-196 = "Fico feliz, mas se for agradecer por cada coisinha, não vamos terminar nunca, sabia?"
10033030-197 = "É, se bobear, isso vai acontecer mais umas 100 vezes.#nSó hoje."
10033030-198 = "[s] \"É verdade...\""
10033030-199 = "Bom, de qualquer forma, vamos para o próximo lugar.#nSensei e Umika-chan, venham com calma quando estiverem prontas!"
10033030-203 = "Então, até mais tarde.#nEspero que esse tipo de coisa não se repita."
10033030-208 = "Ai, ai, já estou com 12 minutos de atraso no cronograma...#nPreciso dar um jeito nisso...!"
10033030-209 = "[s1] \"Ainda deve dar para recuperar...\"\n[s2] \"O cronograma já tinha uma margem de folga mesmo...\""
10033030-212 = "Mas, mal começamos e já estamos assim..."
10033030-213 = "O que eu deveria fazer em uma situação dessas..."
10033030-214 = "[s] \"Umika, vou te ensinar uma coisa importante.\""
10033030-215 = "S-sim……."
10033030-216 = "[s] \"……Às vezes, é necessário fazer esforços que podem parecer inúteis.\""
10033030-220 = "Sensei!?"
