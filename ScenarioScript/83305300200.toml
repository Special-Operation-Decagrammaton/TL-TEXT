[translation]
83305300200-7 = "たとえどんな時でも先生は、私を信じて待ってくれるのね。"
83305300200-8 = "[ns] \"――――ヒナ！\""
83305300200-10 = "[ns] \"――――ヒナ！？！？！？\""
83305300200-11 = "そ、そんな大きな声を出して、どうしたの……先生？"
83305300200-12 = "[s] \"ヒナのドレス姿が綺麗で、つい……\""
83305300200-13 = "……！#nそ、そう……それなら良かった。"
83305300200-14 = "そんな目をしなくても、ここにちゃんと居るから。"
83305300200-15 = "おかえりなさい、委員長。待っていました。"
83305300200-16 = "ただいま。アコのおかげで思いっきり練習できたわ。"
83305300200-17 = "良かったです。ただ、見ての通り少々トラブルが起こってまして……"
83305300200-18 = "私が席を外している間に、マコトがまた騒ぎを起こしたのね。"
83305300200-19 = "それじゃ、パーティーの前に――全部まとめて片付ける。"
83305300200-20 = "[ns] \"さすがヒナ！今日も頼りにしてるよ！\""
83305300200-21 = "……だから、大げさだって。"
83305300200-22 = "また色々とあったみたいだけど……"
83305300200-23 = "それじゃ、パーティーの前に――"
83305300200-28 = "全部まとめて片付ける。"
83305300200-29 = "先生……手伝ってもらえるかしら？"
83305300200-30 = "[ns] \"うん、いこうか。\""
83305300200-31 = "アコ、準備はいい？"
83305300200-32 = "はい、委員長！全力でサポートします！"
