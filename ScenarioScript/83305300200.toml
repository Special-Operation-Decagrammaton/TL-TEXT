[translation]
83305300200-7 = "Mesmo em qualquer situação, o Sensei acredita em mim e me espera, não é?"
83305300200-8 = "[ns] \"――――Hina!\""
83305300200-10 = "[ns] \"――――Hina!?!?!?\""
83305300200-11 = "Po-por que você está gritando desse jeito... Sensei?"
83305300200-12 = "[s] \"O vestido da Hina está tão lindo que eu acabei...\""
83305300200-13 = "……!#nÉ-é mesmo... fico feliz em ouvir isso."
83305300200-14 = "Não precisa me olhar desse jeito, eu estou bem aqui."
83305300200-15 = "Bem-vinda de volta, Presidente. Eu estava esperando."
83305300200-16 = "Cheguei. Graças à Ako, consegui praticar bastante."
83305300200-17 = "Fico feliz. Mas, como pode ver, tivemos alguns problemas..."
83305300200-18 = "Enquanto eu estava fora, a Makoto causou confusão de novo, não foi?"
83305300200-19 = "Sendo assim, antes da festa―― vou resolver tudo de uma vez."
83305300200-20 = "[ns] \"Como esperado da Hina! Conto com você hoje também!\""
83305300200-21 = "……Eu já disse, não precisa exagerar."
83305300200-22 = "Parece que aconteceram várias coisas de novo, mas..."
83305300200-23 = "Sendo assim, antes da festa――"
83305300200-28 = "Vou resolver tudo de uma vez."
83305300200-29 = "Sensei... poderia me ajudar?"
83305300200-30 = "[ns] \"Sim, vamos lá.\""
83305300200-31 = "Ako, está pronta?"
83305300200-32 = "Sim, Presidente! Vou te dar todo o suporte necessário!"
