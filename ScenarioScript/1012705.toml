[translation]
1012705-1 = "……ダメ、ですか？"
1012705-2 = "（ミヨと約束した場所へ向かった）"
1012705-4 = "アンティークショップ商店街"
1012705-6 = "[ns] \"お待ちしておりました。\""
1012705-7 = "な、なんですか、それ。"
1012705-8 = "今日の先生はちょっと変では……？"
1012705-9 = "[s] \"ミヨは犯罪小説の女王様だから……。\""
1012705-10 = "か、書きません、そんなの……！"
1012705-11 = "筆が乗りそうでは……ありますが！"
1012705-12 = "[s] \"ところで今日はどうしたの？\""
1012705-13 = "あ、このアンティークショップ街で手に入れないといけないものがありまして。"
1012705-14 = "二人で探したほうが見つけやすいかなと……。"
1012705-15 = "[s1] \"特殊交易部の部長も……。\"\n[s2] \"自分で現場に行くんだね。\""
1012705-18 = "……こ、今回だけです！#nこれで足を洗いますから。"
1012705-19 = "[s] \"さすがだね！\""
1012705-20 = "うぅぅ……！"
1012705-21 = "か、からかわないでください！"
1012705-22 = "[s3] \"そういえば……。\"\n[s4] \"今日も外出許可がとれたんだね？\""
1012705-25 = "あ……。"
1012705-26 = "今回はですね……。"
1012705-27 = "……許可をとっていません。"
1012705-28 = "[s] \"……え？\""
1012705-29 = "じ、実は、ワイルドハントには「自由外出部」という部活がありまして。"
1012705-30 = "今日はそちらの部員さんに手伝ってもらいました。"
1012705-31 = "[s] \"ワイルドハント……奥が深い。\""
1012705-32 = "まあ……芸術で食べていきたい方々が集まる場所ですから……。"
1012705-33 = "その分、クセの強い生徒が多いといいますか……。"
1012705-34 = "[s] \"み、ミヨもそこの生徒じゃ――\""
1012705-35 = "では、行きましょうか。"
1012705-36 = "[s] \"無視された！？\""
1012705-40 = "見てください！このタイプライター！#nミルキースイートのモデル42ですよ！"
1012705-41 = "[s] \"かわいいデザインだね。\""
1012705-42 = "ええ。でも、市場では売れず廃番となったモデルなんです。"
1012705-43 = "[s] \"どうして売れなかったの？\""
1012705-44 = "人間工学に基づいた設計をし、#n自社で考案したキー配列を導入したのですが――"
1012705-45 = "既存の配列とまったく違ったことで、手に取る方がおらず――"
1012705-46 = "初回出荷の100万台のみで、生産終了となってしまいました。"
1012705-47 = "[s5] \"100万台って……。\"\n[s6] \"どれだけ自信あったの……。\""
1012705-50 = "でも、そのおかげで私もこうして一台手に入れることができましたから。"
1012705-51 = "あっ、これは……！#n先生、デミントン社のタイプライターと万年筆ですよ！"
1012705-53 = "（一緒にアンティークショップを巡っていると……）"
1012705-54 = "（ある店の前でミヨが立ち止まった）"
1012705-57 = "少しお待ちください、先生！"
1012705-62 = "（なにかの包みを抱えて、ミヨが店から出てきた）"
1012705-64 = "さあ、行きましょう！"
1012705-65 = "[s] \"ミヨ、その包みは？\""
1012705-66 = "自由外出部に渡すものです。"
1012705-67 = "[s] \"自由外出部？\""
1012705-68 = "ええ。これを確保するという条件で、外出を手伝ってもらったので――"
1012705-69 = "……あ。"
1012705-70 = "[s7] \"つまり、密輸のために外出したんじゃなくて……。\"\n[s8] \"ただお出かけがしたかったんだね。\""
1012705-73 = "え、あ、そ、その……。"
1012705-77 = "……いけなかったでしょうか？"
1012705-78 = "[s9] \"ううん。\"\n[s10] \"なんか外に出たい日ってあるよね。\""
1012705-81 = "先生と会いたかったから……じゃ、ダメですか？"
1012705-85 = "[ns] \"えっ。\""
1012705-87 = "[ns] \"私！？\""
1012705-88 = "せ、先生だって、私に会いたいとおっしゃっていましたよね？"
1012705-89 = "モモトークのこと、忘れてませんから！"
1012705-90 = "[s] \"た、たしかにそう送ったけど……！\""
1012705-91 = "い、いいですか？#nこれは先生が悪いんです！"
1012705-92 = "で、ですから、今日は大人しく私に、つ……付き合ってください！"
1012705-93 = "まだ見てみたいタイプライター……いっぱい……あるんです……。"
1012705-95 = "（その後も、ミヨと一緒に商店街を見て回った）"
