[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1013506-1 = "Fora de Controle"
1013506-2 = "（Conforme chamado pela Kei,\nfui até a sala do Departamento de Desenvolvimento de Jogos.）"
1013506-6 = "Haa...\nVocê aqui de novo...?"
1013506-10 = "Aqui é a configuração do valor de colisão,\ne aqui é――"
1013506-11 = "[s] \"Kei-chan...?\""
1013506-12 = "Ah, Sensei.\nEntão você chegou."
1013506-13 = "O que eu estou fazendo...?\nBem, como você pode ver..."
1013506-14 = "……。"
1013506-15 = "Uma imagem vale mais que mil palavras.\nPor que não tenta jogar um pouco primeiro?"
1013506-16 = "Aqui, pegue!"
1013506-18 = "（Kei me entregou o controle\ncom um sorriso refrescante.）"
1013506-19 = "（E então...）"
1013506-25 = "……Sensei?"
1013506-29 = "[ns] \"Ah... sim?\""
1013506-30 = "Hum...\nVocê está bem?"
1013506-31 = "Parecia que sua consciência estava prestes a\nvoar para longe agora, não é?"
1013506-32 = "Bem, afinal de contas, isso não passa de\num jogo lixo sem salvação..."
1013506-33 = "Ah, você se pergunta\no que é esse jogo?"
1013506-34 = "……。"
1013506-35 = "É a versão alfa...\ndo novo jogo do Departamento de Desenvolvimento de Jogos..."
1013506-36 = "[s] \"Ah...\""
1013506-37 = "Por que você está fazendo essa cara de\nquem acabou de atingir a iluminação?\nFrancamente."
1013506-38 = "……Apesar de eu entender\ncomo se sente."
1013506-39 = "[s1] \"Kei-chan... por que você está\nse submetendo a esse tipo de tortura...?\"\n[s2] \"Por acaso...\nvocê se cansou de viver...?\""
1013506-42 = "Que indelicadeza!\nEu estava apenas fazendo o QA!"
1013506-43 = "[s3] \"QA?\"\n[s4] \"Ah, entendi...\""
1013506-44 = "É a sigla para Quality Assurance (Garantia de Qualidade)...\nBasicamente, atuo como depuradora e testadora."
1013506-45 = "Apesar de ser essencial...\né um trabalho que muitas vezes é deixado para depois."
1013506-46 = "Alguém precisa fazer\no debug e os testes."
1013506-47 = "Mesmo que ainda haja uma montanha de\noutras coisas que precisem de atenção."
1013506-48 = "Mesmo assim, a lista de correções de bugs\nestá deste tamanho... Haa."
1013506-49 = "Onde exatamente foi que tudo deu errado...?\nQuase parece que o problema começou\nlogo na fase da arquitetura do projeto..."
1013506-50 = "Não, com certeza não pode ser isso...\nSe fôssemos mudar aquilo, teríamos que\nrefazer o jogo todo do zero..."
1013506-51 = "Eu preciso encontrar\nalguma outra solução..."
1013506-52 = "[s] \"Parece estar dando\nmuito trabalho.\""
1013506-53 = "Nem tanto.\nEssa tarefa ainda é das mais tranquilas."
1013506-54 = "……Porque se eu começar a voltar\naté a fase de planejamento e recursos,\nminha própria lógica começará a desmoronar."
1013506-55 = "[s] \"Você também faz esse tipo de coisa?\""
1013506-56 = "Bem, sim……"
1013506-57 = "Foi o que acabou acontecendo,\npor assim dizer."
1013506-58 = "Ficar apenas observando\nme deixava agoniada."
1013506-59 = "……Por que será que\nisso aconteceu?"
1013506-60 = "Mudanças no planejamento\nsão bastante comuns, é claro……"
1013506-61 = "Mas por que a solução delas foi\nrecomeçar tudo do zero\nem vez de apenas reduzir o escopo dos recursos?!"
1013506-62 = "Nós devíamos estar criando um jogo\nsobre concluir missões cotidianas...\nEntão como foi que isso――"
1013506-63 = "Se tornou uma história colossal sobre\nconstruir um encouraçado terrestre\nem uma base secreta subterrânea\npara salvar um mundo dominado por alienígenas?!"
1013506-64 = "A responsável pela arte não tem voz\nno roteiro e apenas faz o que mandam!"
1013506-65 = "A engenheira dá a vida para\ntentar fazer tudo funcionar\ne acaba atolada em problemas de otimização!"
1013506-66 = "E a programadora novata\nnão tem escolha a não ser aprender\ncom esse tipo de gente!"
1013506-67 = "Socorro! Hello World!\nEu não consegui salvar o jogo!"
1013506-68 = "……Perdão. A culpa toda é de quem\nfica apenas aceitando as coisas!\nEles aceitam qualquer mudança sem questionar!\nÉ por isso que não aprendem!"
1013506-69 = "[s] \"Realmente parece estar\ndando muito trabalho……\""
1013506-70 = "Você deveria demonstrar um pouco mais\nde preocupação autêntica!"
1013506-71 = "[s] \"Mas eu estou falando super sério!\""
1013506-72 = "……。"
1013506-73 = "Obrigada……。"
1013506-75 = "[ns] \"No fim das contas, você virou\na QA, a produtora e a faz-tudo.\""
1013506-76 = "Se fôssemos nos dar o trabalho\nde atribuir cargos neste clube minúsculo,\nsim."
1013506-77 = "……Apesar de que eu, tecnicamente,\nsou membro do Departamento de Investigação de Fenômenos Sobrenaturais."
1013506-78 = "[s] \"Mas você passa a maior parte\ndo seu tempo aqui, não é?\""
1013506-79 = "……。"
1013506-80 = "Pois é."
1013506-81 = "De qualquer forma,\né isso que está acontecendo."
1013506-82 = "Tem horas que eu nem sei mais\nse estou depurando código\nou enfrentando algum monstro inominável……"
1013506-83 = "Mas bem, no fim das contas,\nalguém precisa fazer isso."
1013506-84 = "No entanto... a forma como\neu transmito esse feedback\né um problema por si só."
1013506-85 = "[s] \"Isso é algo muito complicado...\nEu entendo bem……\""
1013506-86 = "Verdade?"
1013506-87 = "[s5] \"Se você cometer um único deslize,\nem vez de focar no que 'o outro quer fazer',\"\n[s6] \"Você acaba impondo o que\n'você quer que seja feito'.\""
1013506-90 = "……Sim, exatamente."
1013506-91 = "E quando isso acontece...\npode soar um tanto infantil dizer isso, mas――"
1013506-92 = "As nossas relações vão acabar azedando."
1013506-93 = "[s7] \"Eu concordo plenamente com você.\"\n[s8] \"Quando as relações se desgastam,\ntudo o mais começa a dar errado também.\""
1013506-96 = "……。"
1013506-97 = "Fico feliz que você compreenda."
1013506-98 = "Felizmente, a Momoi tem a mente aberta\ne costuma me escutar."
1013506-99 = "……O único problema é que ela começa a disparar\nideias novas assim que eu termino de falar."
1013506-100 = "Eu só queria que ela começasse a entender\no porquê de eu documentar\ncada etapa detalhadamente."
1013506-101 = "E a Midori também.\nEla precisa parar de dizer \"eu consigo\"\npara qualquer exigência absurda!!"
1013506-102 = "Ela pode estar dando conta agora\nse desgastando até o limite,\nmas não há garantias de que será assim amanhã!"
1013506-103 = "Um desenvolvimento que tem como base\n\"apenas um pouquinho de hora extra\"\né inaceitável!\nIsso é puro trabalho escravo!"
1013506-104 = "[s] \"Ainda bem que temos\nvocê aqui conosco, Kei……\""
1013506-105 = "E eu sou a única que sente\nque está saindo no prejuízo!"
1013506-106 = "Mas bem……。"
1013506-107 = "Sabe……。"
1013506-108 = "……。"
1013506-109 = "Quando finalmente terminamos,\ntodas parecem tão felizes."
1013506-116 = "Fufu."
1013506-117 = "[s] \"Ah……。\""
1013506-118 = "O que foi dessa vez?"
1013506-119 = "[s] \"Eu deveria ter tirado uma foto\nda sua cara agora mesmo.\""
1013506-120 = "Se você ousar fazer isso,\nnão pense que vai sair impune."
1013506-122 = "（E assim, eu curti o novo jogo\ndo Departamento de Desenvolvimento de Jogos com a Kei――）"
1013506-123 = "（Ou melhor, trabalhei duro no QA.）"
1013506-124 = "（Acho que perdi a consciência\nalgumas vezes durante o processo...）"