[translation]
90002025-2 = "Conseguimos!"
90002025-3 = "Os inimigos estão recuando!"
90002025-4 = "D-deu tudo certo... ufa..."
90002025-6 = "Muito obrigada, Eimi!"
90002025-7 = "Eu já estou acostumada com esse tipo de coisa."
90002025-8 = "Acima de tudo, foi a decisão do Sensei de me posicionar aqui que fez a diferença."
90002025-12 = "Sensei, consegue me ouvir? O reparo de emergência do motor foi concluído."
90002025-13 = "Eu também estou aqui. Sensei, por favor, elogie-nos prontamente."
90002025-14 = "[s] \"Rio e Toki, vocês foram incríveis! Bom trabalho!\""
90002025-15 = "Muito obrigada. Com isso, ainda podemos continuar lutando."
90002025-17 = "――Reparo do motor confirmado. #nKei, como você avalia a condição da nave de transporte?"
90002025-18 = "Acho que é possível decolar novamente. Porém, se sofrermos mais danos do que isso..."
90002025-25 = "É a Aris! Terminamos por aqui! Estão todos bem!"
90002025-26 = "Excelente trabalho. Pessoal do Departamento de Desenvolvimento de Jogos, e Eimi."
90002025-27 = "Sinto muito por incomodar logo agora que estão cansados, mas poderiam recolher os destroços dos inimigos no caminho de volta?"
90002025-28 = "Dá para levar desta vez. Quantos você precisa? 20?"
90002025-29 = "Se for demais, não teremos espaço para armazenar dentro da nave..."
90002025-31 = "Câmera externa, reiniciando. Vou transmitir para o monitor."
90002025-37 = "Isso é..."
90002025-38 = "..."
90002025-39 = "[s] \"...\""
90002025-41 = "[ns] \"Aquele é o Continente de Aço...\""
90002025-44 = "Próximo episódio: Partida"
