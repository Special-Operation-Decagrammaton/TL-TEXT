[translation]#[Texto revisado.] Em aguardo de revisão de formatação de texto. - Filipe 13/06.
90101110-1 = "Episódio 11: Epílogo"
90101110-2 = "(Quando o b.o. dos caranguejos acabou, dei as caras no Conselho Estudantil Geral)"
90101110-5 = "[ns] \"Rin-Chan!\""
90101110-6 = "Sala de Recepção do Conselho Estudantil Geral"
90101110-8 = "Sensei [USERNAME]."
90101110-9 = "Fico feliz em ver que você tá bem como sempre. O que te traz por aqui hoje?"
90101110-10 = "...E mais importante, quem é essa de \"Rin-chan\"?"
90101110-11 = "[s1] \"Vim torcer por você, Rin!\"\n[s2] \"Tava morrendo de saudades da minha Rin-Chan!!...\""
90101110-13 = "Aiai..."
90101110-14 = "Sendo você o Sensei, é claro que tem algum motivo por trás disso, não é?"
90101110-15 = "Quer que a gente dê uma esticadinha no prazo daquele relatório atrasado, é isso?"
90101110-16 = "Ou talvez você queira que a gente prepare os documentos pro Comitê Administrativo no seu lugar"
90101110-17 = "[s] \"Ugh...\""
90101110-21 = "Ou... Quem sabe você veio conferir o progresso da análise do caco de vidro que pediu pra gente?"
90101110-22 = "[s3] \"Já chega falando de trabalho, que crueldade...\"\n[s4] \"Eu vim porque tava preocupado com a minha Rin-Chan, que tá sempre na correria.\""
90101110-25 = "Você não precisa se preocupar tanto. Eu estou muito bem ultimamente."
90101110-26 = "Aquela falsa"
90101110-27 = "Quero dizer, desde que a Presidente do Conselho Estudantil Geral \"voltou\", as coisas voltaram aos eixos."
90101110-28 = "Apesar da aparência e do jeito de falar serem completamente diferentes, a competência dela na hora de resolver o trampo bate de frente com a da verdadeira."
90101110-29 = "Ou melhor, em algumas áreas, ela é até mais eficiente..."
90101110-30 = "Por conta disso, até que enfim eu tenho um tempinho livre, pelo menos um dia na semana só pra mim."
90101110-31 = "[s5] \"Um dia na semana...\"\n[s6] \"Cê tá bem mesmo?\""
90101110-34 = "Sim. Se eu relaxar mais que isso, perco o ritmo e acabo ficando com o pé atrás."
90101110-38 = "Então... Fizemos um monte de testes naquele caco de vidro que você deixou com a gente."
90101110-39 = "A gente ficou de olho o dia inteiro pra ver se o que passava do outro lado mudava, jogamos luz pra ver a reação."
90101110-40 = "E o que a gente descobriu foi que... Em vez de caco de vidro... é mais provável que seja um \"caco de espelho...\"."
90101110-41 = "[s] \"E qual que é a diferença?\""
90101110-42 = "O vidro é algo feito pra gente conseguir ver o que tem além dele."
90101110-43 = "Não importa de que lado você olhe, ele reflete a vista do outro lado."
90101110-44 = "Já o espelho, por ter um lado fechado, não deixa a luz passar. Ele reflete quem tá olhando."
90101110-46 = "A imagem que aparece nesse caco não brilha no escuro, e a cor não some na luz."
90101110-47 = "É como se a imagem só estivesse espelhando o que acontece desse lado da poça."
90101110-48 = "Se por um acaso a imagem refletida nele não for de um outro mundo, mas sim uma visão do que acontece aqui mesmo em Kivotos"
90101110-49 = "Então não podemos chamar ele de caco de vidro, mas sim de caco de espelho."
90101110-50 = "[s] \"Então aquele pasto e aquele abismo são algum lugar em Kivotos?\""
90101110-51 = "Pelo meu veredito atual, é isso mesmo."
90101110-52 = "No entanto, as paisagens em si não se pareciam com nenhum lugar que eu conheça de Kivotos."
90101110-54 = "...Igualzinho aquele lago que apareceu na foto que a Presidente deixou pra trás."
90101110-56 = "[ns] \"...Uma Kivotos dentro do espelho, é?\""
90101110-57 = "Tem uma história parecida nos clássicos literários de Trinity."
90101110-58 = "É a história de uma garota que sonha que entra dentro de um espelho e encontra um mundo parecido com o dela, mas que, ao mesmo tempo, é completamente diferente."
90101110-59 = "Nessa história, o mundo todo sumia num piscar de olhos assim que a Rainha do Tabuleiro de Xadrez acordava, que nem um sonho que passou rápido..."
90101110-60 = "Até eu mesma, de vez em quando, me pego pensando que essa realidade maluca bem que podia ser só o sonho de alguém."
90101110-61 = "[s] \"Mas, por mim, eu adoraria que passar esse tempo com você, Rin, fosse real.\""
90101110-62 = "...Você fala esse tipo de coisa pra outras alunas também?"
90101110-63 = "Por favor, preste mais atenção na sua posição como Sensei antes de falar as coisas, ou só vai causar confusão de graça."
90101110-64 = "[s] \"Que maldade...\""
90101110-65 = "Seja como for."
90101110-66 = "Até eu não conheço cada canto de Kivotos. Não tem como afirmar de pés juntos que a paisagem desse caco não existe em Kivotos."
90101110-67 = "Portanto, no meu próximo dia de folga, vou sair de D.U. e dar uma volta por lugares mais distantes."
90101110-68 = "[s] \"Posso ir de carona?\""
90101110-69 = "Bem, se for só pra me fazer companhia, por mim tudo bem."
90101110-70 = "[s7] \"Eba! Esse é o meu segundo passeio com a Titia Rin!\"\n[s8] \"Pode deixar as marmitas comigo!\""
90101110-73 = "...Sabe de uma coisa, esquece o que eu disse. Eu vou sozinha."
90101110-74 = "[s] \"Que maldadeee~ Rin-Chan~\""
90101110-75 = "Eu já falei que não era pra me chamar de Rin-Chan?!"
90101110-80 = "QG do Esquadrão FOX"
90101110-81 = "[ns9] \"Galera! Pedi uma entrega de rango!\"\n[ns10] \"Se quiserem, bora colar\""
90101110-86 = "[ns] \"...Caranguejo?\""
90101110-87 = "Ah, pegaram a gente no flagra."
90101110-88 = "Flagra o quê. Não tem ninguém escondendo nada."
90101110-89 = "Bem... A gente decidiu cozinhar os caranguejos pra checar o estado deles"
90101110-90 = "Sensei. Pode nos dar um momentinho pra gente se explicar?"
90101110-91 = "A gente vai contar tudo com os mínimos detalhes."
90101110-92 = "[s11] \"Não esquenta, tá de boa.\"\n[s12] \"Desde que não tenham arranjado de um jeito esquisito, tá valendo.\""
90101110-95 = "Ah, sobre isso..."
90101110-96 = "[s] \"Eita... Arranjaram de um jeito esquisito mesmo...?\""
90101110-97 = "Mas é claro que não!"
90101110-99 = "[ns] \"...São os caranguejos daquela hora.\""
90101110-100 = "Pois é. A gente teve o trampo de ir catar todos os que fugiram, e a Família Carpaccio ainda recusou receber de volta."
90101110-101 = "Disseram que trazia lembranças ruins, que não queriam ver nem a sombra de um caranguejo na frente deles..."
90101110-102 = "Pelo que parece, a galera da gangue que deu de cara com aquele caranguejão tem uma crise de pânico só de ouvir aquele \"clique-claque\" das garras."
90101110-103 = "Tentar tocar o terror nos outros e acabar morrendo de medo da própria invenção... Olha a ironia da situação."
90101110-104 = "Eles colheram o que plantaram."
90101110-105 = "No fim das contas, a gente acabou ficando com os caranguejos que iam pro lixo. Como rolou o papo de que a Família Carpaccio tava usando os bichos pra coisa errada... Ninguém tava querendo pegar."
90101110-106 = "A gente também não guarda boas lembranças deles, né."
90101110-107 = "Mas a culpa não é dos bichos."
90101110-108 = "Cês têm noção que a gente vai poder comer caranguejo à vontade? Parece até que eu tô sonhando!"
90101110-109 = "Já que tamo na chuva, bora se molhar... hehe."
90101110-110 = "Aham."
90101110-111 = "Mas enfim, foi mal o atraso do convite..."
90101110-112 = "Sensei, quer vir bater um rango com a gente?"
90101110-117 = "[ns] \"Tem certeza...?\""
90101110-118 = "Com certeza. A gente tem caranguejo de sobra por aqui."
90101110-122 = "Acho que já cozinhou o suficiente."
90101110-123 = "Deixa eu dar a primeira mordida..."
90101110-127 = "Gente, que que é isso?! É outra parada...!"
90101110-128 = "A carne é tão fofinha, e o suco que sai... humm! Não dá nem pra botar na mesma prateleira das salsichas de peixe da \"Hamidashi Foods\"!"
90101110-129 = "Lógico que não dá. Você não devia nem tá comparando caranguejo de verdade com salsicha e kani baratinho."
90101110-130 = "Depois que experimentou do bom e do melhor, vai ser difícil voltar atrás."
90101110-135 = "Será? Eu ainda acho a salsicha de peixe mais gostosa..."
90101110-136 = "Hã?! Que gosto é esse, muié?!"
90101110-137 = "Ah, sabe como é... se for botar lado a lado com a salsicha de peixe, que é toda docinha e gordurosa, essee aqui é meio aguado, sei lá..."
90101110-138 = "Sem falar que a gente se mata pra tirar a carne e só vem isso de fiapo? A casca é um trambolho e o prêmio é uma miséria."
90101110-139 = "Se for pra ficar choramingando, passa isso pra cá. Eu detono a sua parte também sem dó nem piedade!"
90101110-144 = "Mas parando pra pensar, eu dou um pouco de razão pra Otogi. Acho que esse caranguejo tem mais casca do que carne."
90101110-145 = "Também, o bicho tava entocado num barril, sem os devidos cuidados. Era de se esperar que não estaria nos trinques."
90101110-148 = "Se o caranguejo for grande, a carne também é grossa?"
90101110-149 = "Aquelas pernas gigantes do caranguejo monstro iam render uma baita pratada de carne, não iam?"
90101110-150 = "Que nojo... você queria comer aquele treco?!"
90101110-151 = "O bicho tava todo espetado com uns ferros enferrujados e ainda ficava soltando uma baba esquisita, lembra? Deus me livre."
90101110-152 = "Pensa bem. Imagina dar uma mordidona com gosto numa perna de caranguejo que é tão grande que nem dá pra segurar com as duas mãos"
90101110-153 = "........."
90101110-154 = "Ó lá, já tá babando."
90101110-155 = "Cala a boca, eu não tô babando nada!"
90101110-159 = "A gente andava tão acostumada com enlatados e comida processada ultimamente... Mas até que uma panelada de caranguejo cai muito bem."
90101110-160 = "O caldo tá esbanjando um saborzão de caranguejo..."
90101110-161 = "Aqui, Sensei. Cuidado que a casca tá pegando fogo."
90101110-165 = "[ns13] \"Um gostinho agridoce com um toque forte de umami.\"\n[ns14] \"Dá até vontade de comer com arroz...\""
90101110-168 = "Querem que eu pegue um pouco?"
90101110-169 = "Eu já tava me adiantando e preparei o arroz pro Inarizushi de amanhã."
90101110-170 = "...Gente, tive uma ideia genial."
90101110-171 = "E se a gente pegar o arroz de sushi que preparamos pro Inarizushi e misturar com esse caldo do caranguejo..."
90101110-172 = "Ia ficar divino, né?"
90101110-173 = "Isso..."
90101110-174 = "Isso não é nem pergunta, óbvio que vai ficar uma delícia!"
90101110-175 = "Eu sempre comi tanto Inarizushi... como eu nunca pensei nisso antes?"
90101110-176 = "Pudera, a gente vive de Inarizushi, mas caranguejo que é bom, necas."
90101110-177 = "Mas hoje a gente tem tanto caranguejo que dá pra gente se entupir até amanhã de manhã..."
90101110-178 = "Vou trazer o arroz todo que sobrou, segura as pontas aí."
90101110-179 = "Dá tempo de pegar a bolacha de água e sal do exército também?"
90101110-180 = "Botar uma maionese no caranguejo e comer com a bolacha... Pensa que bagulho louco..."
90101110-181 = "Genial!"
90101110-182 = "Bora! Fazer isso agora!"
90101110-183 = "Ei, vão com calma aí perto do fogo, é perigoso."
90101110-184 = "Hehe. Acho que vou botar mais um pouco de arroz pra cozinhar."
90101110-186 = "(Dividi os caranguejos com o Esquadrão FOX e tivemos momentos muito divertidos)"
90101110-193 = "Entrada da Biblioteca de Livros Antigos, Trinity"
90101110-196 = "...*cof*, *cof*."
90101110-197 = "Ui-senpai, você mexeu nos livros sem abrir a janela de novo, foi?"
90101110-198 = "Argh... Esse lugar tá só o pó.Como é que você consegue ler no meio dessa sujeirada toda?"
90101110-202 = "M-Mas é que... O sol tava rachando lá fora... Se eu abrisse a porta, aquele bafo ia entrar com tudo."
90101110-203 = "E pra piorar, o sol direto acaba com os livros antigos..."
90101110-204 = "Eu já ouvi essa ladainha. Bora deixar um ar puro entrar aqui."
90101110-215 = "H-Hiiii..."
90101110-217 = "Ufa, que alívio."
90101110-218 = "...Espera aí, tem uns livros que eu não conheço aqui."
90101110-219 = "Registros de transações comerciais do Período Sengoku de Hyakkiyako... parece coisa de algum comerciante antigo."
90101110-220 = "E essa é a primeira edição de \"A Marreta\" da autora \"Koiyokoi\"...?Eu tinha certeza que eles tinham recolhido tudo por causa de um defeito na encadernação..."
90101110-221 = "M-Mas isso aqui... é a ata do Conselho dos Santos de Justina no Primeiro Concílio Ecumênico de Trinity?!"
90101110-225 = "Como isso veio parar aqui...?"
90101110-226 = "...Senpai, você andou tirando cópias de novo quando tava restaurando, né?"
90101110-227 = "D-De novo?! O que que cê tá insinuando com de novo?! Eu não saio tirando cópia de tudo que eu mexo, tá..."
90101110-228 = "A-Aham, a Chieru-chan que trouxe eles pra cá."
90101110-229 = "A Chieru-chan... a Vice-Presidente?"
90101110-230 = "Aquela mesma que sumiu do mapa há três meses depois de ir pra Catacumba dizendo que ia caçar uns livros antigos?"
90101110-231 = "Sim, ela mesmo. Voltou hoje de manhã com um monte de livros que ela andou desenterrando."
90101110-232 = "No momento, ela tá no dormitório...Mas como ela soltou que vai se enfiar nos livros um tempo, eu duvido muito que ela dê as caras se você chamar por ela."
90101110-233 = "Bem que ela podia ter avisado, né... Mas que bom que ela voltou sã e salva."
90101110-234 = "Eu fiquei sabendo que quando ela inventou de ir pro Vulcão Hinomu, rolou até b.o diplomático com Gehenna..."
90101110-235 = "Aquela vez foi... um verdadeiro pesadelo. Os caras bateram o pé dizendo que só iam soltar ela se a Presidente do Comitê da Biblioteca fosse lá dar as caras... Aff."
90101110-239 = "Ah, lembrei de uma coisa... A Chieru-chan mandou um recado pra Shimiko."
90101110-240 = "...Ela perguntou: \"Você se lembra do artigo sobre o Perorodzilla?\""
90101110-246 = "...\"Perorodzilla\", foi o que ela disse?"
90101110-248 = "O Arco de Caça às Lores: Continua no Capítulo 3"