[translation]#[Texto Final. - Filipe 05/07.]
90101110-1 = "Episódio 11: Epílogo"
90101110-2 = "(Com o caso do caranguejo resolvido,\nvisitei o Conselho Estudantil Geral)"
90101110-5 = "[ns] \"Rinzinha!\""
90101110-6 = "Sala de recepção do Conselho Estudantil Geral"
90101110-8 = "Sensei [USERNAME]."
90101110-9 = "Fico feliz em vê-lo bem como sempre.#nO que o traz aqui hoje?"
90101110-10 = "……E, antes disso: quem aqui é \"Rinzinha\"?"
90101110-11 = "[s1] \"Vim torcer por você, Rin!\"\n[s2] \"Tava com saudade da Rinzinha……\""
90101110-13 = "Haa……"
90101110-14 = "Conhecendo você, Sensei, a real intenção\né outra, não é?"
90101110-15 = "Quer prazo extra pros relatórios atrasados,\ntalvez."
90101110-16 = "Ou quer que eu redija no seu lugar os\ndocumentos do comitê administrativo――"
90101110-17 = "[s] \"Ugh……\""
90101110-21 = "Ou, quem sabe…… veio saber do andamento da\nanálise do caco de vidro que me confiou."
90101110-22 = "[s3] \"Falar de trabalho logo de cara? Que maldade~\"\n[s4] \"Eu vim porque me preocupo com você, que vive ocupada.\""
90101110-25 = "Não precisa de tanta preocupação.#nEu, ATUALMENTE, estou muito bem\nde verdade."
90101110-26 = "Desde que aquela impostora――"
90101110-27 = "digo, desde que a Presidente do Conselho\nretornou, o trabalho do Conselho\npraticamente se normalizou."
90101110-28 = "A aparência e o jeito de falar são de outra\npessoa, mas a capacidade de trabalho\nrivaliza com a da verdadeira."
90101110-29 = "Aliás…… em algumas áreas, talvez\naté a supere."
90101110-30 = "Graças a isso, ganhei folga o bastante pra\nter um dia da semana só pra mim."
90101110-31 = "[s5] \"UM dia na semana……\"\n[s6] \"Isso tá certo mesmo?\""
90101110-34 = "Sim. Descansar mais que isso é que me\npreocuparia: bagunçaria meu ritmo de vida."
90101110-38 = "Aqui―― testei de várias formas o caco\nde vidro que você me deixou."
90101110-39 = "Observei o mundo do outro lado por um dia\ninteiro em busca de mudanças, apliquei luz\npara estudar as reações."
90101110-40 = "Conclusão: mais do que um caco de vidro,\nisto parece ser…… um FRAGMENTO\nDE ESPELHO."
90101110-41 = "[s] \"Qual é a diferença?\""
90101110-42 = "O vidro é um material para se ver o\nlado de fora."
90101110-43 = "Não importa de onde se observe,\nele mostra a paisagem além."
90101110-44 = "Já o espelho tem uma das faces vedada: não\ndeixa a luz passar; reflete e mostra\no lado do observador."
90101110-46 = "A imagem neste fragmento não brilha no\nescuro, nem desbota na claridade."
90101110-47 = "É como se ela mudasse projetando\na situação DESTE lado."
90101110-48 = "Se o que aparece nele não é um outro mundo,\ne sim uma projeção da realidade\ndesta Kivotos――"
90101110-49 = "então o correto não seria chamá-lo de caco\nde vidro, mas de fragmento de espelho."
90101110-50 = "[s] \"Então aquele campo e aquele abismo ficam em algum lugar de Kivotos?\""
90101110-51 = "Pelo meu julgamento atual, sim."
90101110-52 = "Porém, aquelas paisagens não se parecem com\nnenhum lugar da Kivotos que eu conheço."
90101110-54 = "……Como o lago que aparecia nas fotos\nque a PRESIDENTE deixou."
90101110-56 = "[ns] \"……Uma Kivotos dentro do espelho, é.\""
90101110-57 = "Há uma história parecida nos clássicos\nde Trinity."
90101110-58 = "Uma menina que, em sonho, atravessa um\nespelho e toca um mundo parecido com o que\nconhece―― e, ainda assim, completamente\ndiferente."
90101110-59 = "Esse mundo era retratado como um sonho de\num instante, que se desfaz quando a rainha\ndo tabuleiro de xadrez desperta……"
90101110-60 = "Às vezes eu também me pego desejando que\nesta realidade inacreditável fosse\no sonho de alguém."
90101110-61 = "[s] \"Mas eu queria que este tempo com você, Rin, fosse bem real.\""
90101110-62 = "……Você diz isso para as outras\nalunas também?"
90101110-63 = "Isso só gera mal-entendidos. Pense um pouco\nmais na sua posição antes de falar, Sensei."
90101110-64 = "[s] \"Que maldade……\""
90101110-65 = "Enfim."
90101110-66 = "Nem eu conheço todos os cantos de Kivotos.#nNão posso afirmar que as paisagens deste\nfragmento não existam aqui."
90101110-67 = "Por isso, na próxima folga pretendo sair\nde D.U. e ir um pouco mais longe."
90101110-68 = "[s] \"Posso ir junto?\""
90101110-69 = "Sim, se for apenas para acompanhar,\nnão me oponho."
90101110-70 = "[s7] \"Ebaa! Segundo passeio com a Rinzinha!\"\n[s8] \"Pode esperar pela marmita!\""
90101110-73 = "……Cancelado. Pensando melhor, eu vou\nsozinha."
90101110-74 = "[s] \"Que maldade, Rinzinha~\""
90101110-75 = "Eu já disse: quem aqui é Rinzinha?!"
90101110-80 = "QG do Esquadrão FOX"
90101110-81 = "[ns9] \"Pessoal! Eu tava pensando em pedir um delivery!\"\n[ns10] \"Se quiserem, a gente pode――\""
90101110-86 = "[ns] \"……Caranguejo?\""
90101110-87 = "Ah, fomos pegas."
90101110-88 = "Pegas como? Ninguém tava comendo\nescondido."
90101110-89 = "Er…… precisamos cozinhar para verificar\no estado dos caranguejos e――"
90101110-90 = "Sensei. Poderia nos conceder um tempo\npara esclarecimentos?"
90101110-91 = "Vou explicar tudo na ordem."
90101110-92 = "[s11] \"Tá tudo bem, relaxa.\"\n[s12] \"Contanto que não tenham conseguido por vias estranhas.\""
90101110-95 = "Ah, quanto a isso…… é que……"
90101110-96 = "[s] \"Quê…… foi por vias suspeitas mesmo……?\""
90101110-97 = "Claro que não!"
90101110-99 = "[ns] \"……Eram os caranguejos daquele dia.\""
90101110-100 = "Isso. A gente se esforçou pra recolher os\nfugitivos, e a Família Carpaccio se recusou\na recebê-los de volta."
90101110-101 = "Que traziam lembranças ruins, que chega\nde caranguejo……"
90101110-102 = "Dizem que os membros que viram o caranguejo\ngigante#ntêm ataque de pânico só de ouvir\no clac-clac de uma pinça."
90101110-103 = "Quem tentou dominar os outros pelo medo\nacabou engolido por ele……#nUm final irônico, né~"
90101110-104 = "Bem feito pra eles."
90101110-105 = "No fim, adotamos o que ia ser descartado.#nCom o boato de que eram \"os caranguejos que\nos Carpaccio usavam pra fins escusos\"……#nnão apareceu mais nenhum interessado."
90101110-106 = "Pra nós também são só lembranças ruins, né."
90101110-107 = "Mas o caranguejo não tem culpa de nada."
90101110-108 = "E poder comer caranguejo à vontade assim……\nnão é um sonho?"
90101110-109 = "Quero aproveitar e comer até enjoar……\nmufufu."
90101110-110 = "Ahem."
90101110-111 = "Enfim, o convite veio atrasado, mas……"
90101110-112 = "se quiser, Sensei, não gostaria\nde comer conosco?"
90101110-117 = "[ns] \"Posso mesmo……?\""
90101110-118 = "Claro. Caranguejo é o que não falta."
90101110-122 = "Parece que já cozinhou."
90101110-123 = "Vejamos, uma mordida……"
90101110-127 = "Que é isso?! Completamente diferente……?"
90101110-128 = "É firme, e o caldinho explode na boca……!#nNada a ver com o kani kama\nda \"Hamidashi Foods\"!"
90101110-129 = "Óbvio, né. Comparar com kani kama barato\ne salsicha é que tava errado desde\no começo."
90101110-130 = "Agora que provou o de verdade, pode ser\nque não tenha mais volta, hein?"
90101110-135 = "Será? Eu ainda acho a salsicha de peixe\nmais gostosa……"
90101110-136 = "Hã?! Que paladar é esse?!"
90101110-137 = "Ué, comparado com o docinho gorduroso da\nsalsicha de peixe,#nisso aqui é meio sem graça, sabe……"
90101110-138 = "E você sua pra tirar a carne e sai SÓ isso.\nCom essa casca gigante!"
90101110-139 = "Se é só reclamação, passa pra cá. Eu como\na parte da Otogi inteirinha!"
90101110-144 = "Mas até que eu entendo um pouco a Otogi.#nEsse caranguejo tá meio vazio\npor dentro."
90101110-145 = "Eles foram armazenados de qualquer jeito\nnum tambor. Não é surpresa o estado\nser ruim."
90101110-148 = "Quanto maior o corpo, mais recheada\na carne, né?"
90101110-149 = "Então, as patas daquele caranguejo monstro\nrenderiam uns filés gigantes, não?"
90101110-150 = "Quê…… você comeria AQUILO?!"
90101110-151 = "Tinha ferro enferrujado espetado e ainda\ncuspia uma espuma nojenta, lembra?#nEu não como nem de graça."
90101110-152 = "Não, não, pensa comigo.#nUma pata de caranguejo que não cabe na mão,\ne você cravando os dentes com vontade――"
90101110-153 = "…………"
90101110-154 = "Ah, ela tá considerando."
90101110-155 = "Não tô, não!"
90101110-159 = "Até hoje eu comia quase sempre enlatados\ne processados, mas……\nensopado também é ótimo."
90101110-160 = "O caldo do caranguejo ficou\nbem apurado……"
90101110-161 = "Aqui, Sensei. Cuidado que a casca\ntá quente."
90101110-165 = "[ns13] \"Um umami doce e salgado, bem intenso.\"\n[ns14] \"Isso pede um arroz……\""
90101110-168 = "Quer que eu sirva?"
90101110-169 = "Eu ia fazer inarizushi amanhã, então o\narroz já tá cozido."
90101110-170 = "……Gente, eu tive uma ideia."
90101110-171 = "Se misturar esse kani miso no arroz\ntemperado do inarizushi――"
90101110-172 = "fica bom DEMAIS, né?"
90101110-173 = "Isso――"
90101110-174 = "Fica delicioso, com certeza!"
90101110-175 = "Comi tanto inarizushi na vida…… como nunca\npensei nisso antes?"
90101110-176 = "Inarizushi você comia; caranguejo é que\nnunca apareceu na sua vida, né~"
90101110-177 = "Mas hoje sobra caranguejo pra encher\na barriga e ainda ficar de resto……"
90101110-178 = "Vou trazer todo o arroz que cozinhei."
90101110-179 = "Ei, posso pegar as bolachas militares\ntambém?"
90101110-180 = "Caranguejo com maionese em cima da bolacha……\ndeve ficar uma delícia――"
90101110-181 = "Genial!"
90101110-182 = "Bora! Agora!"
90101110-183 = "Sem bagunça perto do fogo. É perigoso."
90101110-184 = "Fufu. Vou lavar mais um pouco de arroz\ne deixar de molho."
90101110-186 = "(Dividimos os caranguejos com o Esquadrão\nFOX e passamos ótimos momentos)"
90101110-193 = "Trinity - Entrada do Arquivo de Livros Antigos"
90101110-196 = "……Cof, cof."
90101110-197 = "Veterana Ui, trabalhou de janela fechada\nde novo, né?"
90101110-198 = "Uu…… a sala inteira coberta de poeira.#nComo você consegue ler aqui dentro?"
90101110-202 = "É, é que anda quente…… se eu abrir a porta,\nentra aquele bafo de fora."
90101110-203 = "Além disso, luz direta é inimiga\ndos livros antigos――"
90101110-204 = "Tá, tá. Vou ventilar."
90101110-215 = "Hi-Hiiiii……"
90101110-217 = "Ufa, bem melhor."
90101110-218 = "……Ué, esses livros eu não conheço."
90101110-219 = "Registros de comércio da era Sengoku de\nHyakkiyako…… de um mercador, pelo visto."
90101110-220 = "A primeira edição de 'Sledgehammer', do\nmestre \"Koi yo Koi\"……#nNão tinham recolhido tudo por\ndefeito de encadernação……?"
90101110-221 = "I-Isto são as atas do Primeiro Concílio\nde Trinity, redigidas pelo lado\nda Ordem dos Santos Justina?"
90101110-225 = "O que isso tá fazendo aqui……?"
90101110-226 = "……Veterana, você fez cópias durante\na restauração de novo, né?"
90101110-227 = "C-Como assim \"de novo\"?! Eu não faço\ncópia toda vez, tá――"
90101110-228 = "C-Cof! Esses aí foi a Chieru\nque trouxe."
90101110-229 = "A Chieru…… a vice-presidente?"
90101110-230 = "Aquela que avisou que ia procurar livros\nantigos, desceu pras catacumbas#ne está desaparecida há 3 meses?"
90101110-231 = "Ela mesma. Voltou hoje de manhã trazendo\num monte de livros que ESCAVOU."
90101110-232 = "Agora está no dormitório……#nDisse que vai passar um bom tempo lendo;\npode chamar que ela não sai."
90101110-233 = "Podia ao menos dar um alô…… mas que bom\nque ela voltou sã e salva."
90101110-234 = "Na última vez, quando ela foi ao vulcão\nHinom, ouvi que virou até problema\ndiplomático com Gehenna……"
90101110-235 = "Aquilo foi…… um pesadelo. Disseram que só\na soltariam se a presidente do Comitê da\nBiblioteca fosse buscá-la…… haa."
90101110-239 = "Ah, é verdade…… a Chieru deixou um recado\npara você, Shimiko."
90101110-240 = "――\"Você se lembra da matéria\ndo Perorodzilla?\""
90101110-246 = "……\"Perorodzilla\"?"
90101110-248 = "Arco da A Caça às \"Lores\": Para ser continuado no Capítulo 3"
