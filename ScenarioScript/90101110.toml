[translation]
90101110-1 = "Episode 11: Epilogue"
90101110-2 = "(Around the time the crab incident was settled. I visited the General Student Council.)"
90101110-5 = "[ns] \"Rin-chan!\""
90101110-6 = "General Student Council Reception Room"
90101110-8 = "[USERNAME] Sensei."
90101110-9 = "It is good to see you are as energetic as ever. #nWhat brings you here today?"
90101110-10 = "……And more importantly, who is \"Rin-chan\"?"
90101110-11 = "[s1] \"I came to cheer Rin on!\"\n[s2] \"I haven't seen Rin-chan in a while, so I was lonely...\""
90101110-13 = "Sigh……."
90101110-14 = "Knowing you, Sensei, you must have some other motive, don't you?"
90101110-15 = "Like asking for an extension on the overdue reports."
90101110-16 = "Or perhaps asking me to draft the documents for the Administrative Committee in your stead—"
90101110-17 = "[s] \"Ugh…….\""
90101110-21 = "Or maybe…… you came to ask about the progress of the glass shard analysis I was tasked with earlier."
90101110-22 = "[s3] \"How cruel to talk about work the moment we meet!\"\n[s4] \"I just came because I was worried about how busy you are, Rin.\""
90101110-25 = "There is no need to worry about me that much. #nI am truly fine lately."
90101110-26 = "That fake—"
90101110-27 = "No, ever since the General Student Council President returned, the council's operations have largely normalized."
90101110-28 = "Though her appearance and speech are completely different, her administrative processing ability is as excellent as the real one."
90101110-29 = "No, in some areas, she might even be better……."
90101110-30 = "Thanks to that, I've even managed to have enough free time to take one day off a week."
90101110-31 = "[s5] \"One day a week is…….\"\n[s6] \"Are you really okay?\""
90101110-34 = "Yes. If I rest any more than that, I'm actually worried my daily rhythm will fall apart."
90101110-38 = "Regarding this—I have verified the glass shard you entrusted to me using various methods."
90101110-39 = "I spent all day observing if there were any changes in the world on the other side of the fragment, and checked its reaction to light."
90101110-40 = "As a result, I suspect this is not so much a glass shard as it is... a mirror fragment."
90101110-41 = "[s] \"How is that different?\""
90101110-42 = "Glass is a material meant for looking outside."
90101110-43 = "Regardless of the angle of observation, it reflects the scenery on the other side."
90101110-44 = "On the other hand, a mirror does not transmit light because one side is blocked; it reflects and shows the observer's side."
90101110-46 = "The image reflected in this fragment did not glow just because it was in a dark place, nor did its colors fade in a bright place."
90101110-47 = "It was as if it were projecting and changing based on the situation on this side."
90101110-48 = "If what is reflected is not some other world, but a projection of the reality of Kivotos—"
90101110-49 = "Then wouldn't it be more accurate to call it a mirror fragment rather than a glass shard?"
90101110-50 = "[s] \"So, does that mean this grassland and abyss are somewhere in Kivotos?\""
90101110-51 = "Based on my current judgment, that is the case."
90101110-52 = "However, that landscape did not resemble any place in Kivotos that I know of."
90101110-54 = "……Just like that lake in the photo the President left behind."
90101110-56 = "[ns] \"……Kivotos inside the mirror, huh.\""
90101110-57 = "There is a similar story in Trinity's classics."
90101110-58 = "It is a story about a girl who walks into a mirror in her dream and encounters a world that resembles the one she knows, yet is completely different."
90101110-59 = "That world was depicted as a fleeting dream that would vanish once the Queen of the chessboard woke up, but……."
90101110-60 = "I, too, sometimes wish that this unbelievable reality were just someone's dream."
90101110-61 = "[s] \"But I want the time I spend with you, Rin, to be real.\""
90101110-62 = "……Do you say things like that to other students as well?"
90101110-63 = "It only leads to unnecessary misunderstandings, so please consider your position a bit more before you speak, Sensei."
90101110-64 = "[s] \"That's harsh…….\""
90101110-65 = "Regardless."
90101110-66 = "I don't know every single place in Kivotos. #nI cannot definitively say that the scenery reflected in this fragment does not exist in Kivotos."
90101110-67 = "Therefore, on my next day off, I intend to leave D.U. and travel a bit further."
90101110-68 = "[s] \"Can I come with you?\""
90101110-69 = "Yes, I don't mind if you accompany me."
90101110-70 = "[s7] \"Yay! My second outing with Rin-chan!\"\n[s8] \"Look forward to my bento!\""
90101110-73 = "……I take that back. I will go alone."
90101110-74 = "[s] \"That's mean, Rin-chan~\""
90101110-75 = "I told you, who is Rin-chan!"
90101110-80 = "FOX Platoon HQ"
90101110-81 = "[ns9] \"Everyone! I thought I'd order delivery!\"\n[ns10] \"If you'd like, let's eat together—\""
90101110-86 = "[ns] \"……Crab?\""
90101110-87 = "Ah, you found out."
90101110-88 = "What do you mean 'found out'? It's not like we were hiding it."
90101110-89 = "Well…… we ended up cooking it to check the crab's condition—"
90101110-90 = "Sensei. May we have a moment to explain?"
90101110-91 = "I will explain it to you step by step."
90101110-92 = "[s11] \"It's fine, it's fine.\"\n[s12] \"As long as you didn't get it through some shady route.\""
90101110-95 = "Ah, that is, well……."
90101110-96 = "[s] \"Wait…… did you really get it through a shady method……?\""
90101110-97 = "I told you, no!"
90101110-99 = "[ns] \"……So it was that crab from back then.\""
90101110-100 = "Yes. We went through the trouble of recovering it after it escaped, but the Carpaccio Family refused to take it back."
90101110-101 = "They said it brought back bad memories, or that they'd had enough of crabs……."
90101110-102 = "Apparently, the members who witnessed that giant crab get seizures just from hearing the clicking of its claws."
90101110-103 = "Those who tried to rule others through fear being swallowed by it themselves…… #nwhat an ironic ending."
90101110-104 = "They got what they deserved."
90101110-105 = "So, in the end, we took in what was about to be discarded. #nSince rumors spread that it was a crab the Carpaccio Family used for shady purposes, no one else would take it."
90101110-106 = "Though we only have bad memories of it too."
90101110-107 = "But the crab itself is innocent."
90101110-108 = "Isn't it like a dream to be able to eat this much crab?"
90101110-109 = "I want to eat until I'm sick of it while I have the chance…… Hehe."
90101110-110 = "Ahem."
90101110-111 = "Anyway, sorry for the late invitation……."
90101110-112 = "If you'd like, Sensei, would you like to join us?"
90101110-117 = "[ns] \"Are you sure……?\""
90101110-118 = "Of course. We have plenty of crab."
90101110-122 = "Looks like it's cooked through."
90101110-123 = "Let's see, one bite……."
90101110-127 = "What is this!? It's completely different……?"
90101110-128 = "It's springy, and the juices just burst out……! #nIt's nothing like the crab sticks from 'Hamidashi Foods'!"
90101110-129 = "Well, obviously. It's weird to compare it to cheap crab sticks or sausages in the first place."
90101110-130 = "Once you know the real thing, you might not be able to go back, you know?"
90101110-135 = "You think so? I feel like fish sausage is tastier……."
90101110-136 = "Huh!? What's wrong with your taste buds!?"
90101110-137 = "I mean, compared to the sweet and greasy taste of fish sausage, #nthis is just too bland……."
90101110-138 = "And look how little meat you get even after working so hard to get it out? Even though the shell is so huge."
90101110-139 = "If you're just going to complain, give it here. I'll eat Otogi's share too!"
90101110-144 = "But I can kind of understand what Otogi is saying. #nThis crab might not have much meat in it."
90101110-145 = "It was stored roughly in a drum can, after all. It wouldn't be strange if it were in bad condition."
90101110-148 = "Doesn't a bigger body mean thicker meat?"
90101110-149 = "That means if it were the legs of that monster crab from back then, we could have gotten huge chunks of meat, right?"
90101110-150 = "Wait…… you're thinking of eating that!?"
90101110-151 = "It had rusted iron stuck in it and was spewing creepy foam, you know? #nI'd refuse even if it were free."
90101110-152 = "No, no, just think about it. #nImagine biting into a crab leg so big you can't even hold it with your hands—"
90101110-153 = "…………."
90101110-154 = "Oh, she's thinking about it."
90101110-155 = "I am not!"
90101110-159 = "I've mostly eaten canned or processed food until now…… #nbut hot pot is also nice."
90101110-160 = "The crab broth is so flavorful……."
90101110-161 = "Yes, Sensei. Please be careful, the shell is hot."
90101110-165 = "[ns13] \"It's sweet, salty, and has a rich umami flavor.\"\n[ns14] \"This makes me want some rice…….\""
90101110-168 = "Would you like me to get some for you?"
90101110-169 = "I was planning to make inari sushi tomorrow, so I have some already cooked."
90101110-170 = "……I just had an idea."
90101110-171 = "If we mix this crab tomalley into the vinegared rice for the inari sushi—"
90101110-172 = "It would definitely be delicious, right?"
90101110-173 = "That is—"
90101110-174 = "It's bound to be delicious!"
90101110-175 = "I've eaten so much inari sushi, why didn't I think of that before?"
90101110-176 = "Well, even if you eat inari sushi, you never really had a connection to crab."
90101110-177 = "But today, we have so much crab left over that we're full just from that……."
90101110-178 = "I'll go bring all the cooked rice."
90101110-179 = "Hey, can I go get some military crackers too?"
90101110-180 = "It would be delicious to put mayonnaise on the crab and eat it with crackers—"
90101110-181 = "Genius!"
90101110-182 = "Let's do it! Right now!"
90101110-183 = "Don't make a scene around the fire, it's dangerous."
90101110-184 = "Hehe. Maybe I should wash a bit more rice and soak it."
90101110-186 = "(I shared the crab with FOX Platoon and had a fun time.)"
90101110-193 = "Trinity Archive Entrance"
90101110-196 = "……*Cough*, *cough*."
90101110-197 = "Ui-senpai, did you work without opening the window again?"
90101110-198 = "Ugh…… the room is full of dust. #nHow can you even read books in here?"
90101110-202 = "I-it's hot lately…… and if I open the door, the heat will come in, won't it?"
90101110-203 = "Besides, direct sunlight is the enemy of old books—"
90101110-204 = "Yes, yes. I'll ventilate the room."
90101110-215 = "E-eeek……."
90101110-217 = "Phew, that's better."
90101110-218 = "……Huh, these are books I haven't seen before."
90101110-219 = "Transaction records from the Warring States period of Hyakkiyako…… these belong to a merchant."
90101110-220 = "The first edition of 'Sledgehammer' by 'Koi yo Koi' Sensei…… #nweren't these all recalled due to binding defects……?"
90101110-221 = "I-is this the minutes created by the Justina Council during the first Trinity General Council?"
90101110-225 = "How did these get here……?"
90101110-226 = "……Senpai, you made copies while restoring them again, didn't you?"
90101110-227 = "W-what do you mean 'again'!? It's not like I make copies every single time—"
90101110-228 = "A-ahem, these were brought by Cherino-chan."
90101110-229 = "Cherino-chan…… the Vice President?"
90101110-230 = "The one who went to the catacombs saying she was going to look for old books, #nand has been missing for 3 months?"
90101110-231 = "Yes. She returned this morning with a lot of things she excavated."
90101110-232 = "She's in the dorms now…… #nbut she said she'd be reading for a while, so I don't think she'll come out even if you call her."
90101110-233 = "She could have at least said a word…… but I'm glad she returned safely."
90101110-234 = "I heard that when she headed to Mt. Hinomu last time, it turned into a diplomatic issue with Gehenna……."
90101110-235 = "That time was…… a nightmare. They told us they wouldn't release her unless the Library Committee Chair came…… *sigh*."
90101110-239 = "Oh, by the way…… Cherino-chan left a message for Shimiko."
90101110-240 = "—\"Do you remember the Perorodzilla article?\""
90101110-246 = "……\"Perorodzilla,\" you say?"
90101110-248 = "Roa Tracking Arc; To be Continued in Chapter 3"