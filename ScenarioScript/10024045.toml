[translation]
10024045-3 = "くっ……！"
10024045-7 = "はあ……戦う気はなかったんだけど、そうも言ってられないね。"
10024045-8 = "どうかな、少しは落ち着いてくれた？"
10024045-14 = "「……失敗を認めなければ前に進むことはできない。成長のためには必要なこと」"
10024045-18 = "「しかし、受けた屈辱はそのままだ……私たちは破壊されるために創られたというのか！？」"
10024045-25 = "……また訳の分からないことを。"
10024045-26 = "[s] \"ちょっと何言ってるのか分からないかな。\""
10024045-28 = "そんなっ……！"
10024045-33 = "私は玄武商会と錬丹術研究会が接触した報告を受けて、ここで張っていたのさ。"
10024045-34 = "錬丹術研究会と共に現れることを期待して……な。"
10024045-36 = "玄龍門は、錬丹術研究会のことも疑っていたのですか？"
10024045-38 = "フッ、「萬年参」は薬とも関係が深いからな。#n目をつけるのは当然だろう？"
10024045-39 = "錬丹術研究会と玄武商会は、必ず裏で繋がっていると踏んでいたのさ。"
10024045-41 = "――デタラメもいいところです。"
10024045-43 = "……[ruby=・  ・]推理[/ruby]と言ってもらいたいんだが。"
10024045-44 = "[s1] \"気になったんだけど……\"\n[s2] \"ハードボイルドなのが好きだったり？\""
10024045-47 = "もちろんだ、最高だろう？"
10024045-48 = "[s] \"クールなのは？\""
10024045-49 = "フッ、無論だ。#n見ての通り、私のためにあるような言葉じゃないか。"
10024045-51 = "（なにを言ってるんでしょうか？）"
10024045-52 = "（さぁ……）"
10024045-53 = "なぜ錬丹術研究会は放っておいているのですか？"
10024045-55 = "あちらには物証がない。#n今のところ、目立った動きも見られなかったからな。"
10024045-56 = "……。"
10024045-57 = "フッ、こうして現場に戻ってきたということは、#n私の推理が正しいという裏付けでもある。"
10024045-58 = "そして、残るは先生の処遇だが……"
10024045-60 = "それは、あまりにも短絡的なのでは？"
10024045-61 = "そもそも、玄龍門が目を光らせている[ruby=こんろんさん]崑崙山[/ruby]から、どうやって「萬年参」を持ち出すというのですか。"
10024045-62 = "手段なら、いくらでもあるじゃないか。#n大方、汚い手口を使って山に侵入したに決まってる。"
10024045-63 = "賄賂で買収すれば、監視など意味を成さない。"
10024045-65 = "そういったやり口は、玄武商会ならお手の物だろう？"
10024045-66 = "少しは頭を使って考えてください。"
10024045-67 = "犯人は現場に戻ってくる、と。#nであれば、それは玄龍門も例外ではない。"
10024045-69 = "むしろ、この一件は玄武商会を陥れるために玄龍門が裏で一枚噛んでいるのでは？"
10024045-70 = "そんな訳があるか！"
10024045-72 = "誰が得をして、誰が損をするのか考えれば――自ずと辻褄が合うと思うのですが？"
10024045-73 = "そう考えれば――玄龍門が「萬年参」を密輸し、#n玄武商会に濡れ衣を着せた可能性は高い。"
10024045-74 = "フッ、証拠の存在を忘れたのか？#n「萬年参」が見つかったのは、玄武商会のダンボールだった。"
10024045-75 = "ダンボールの1つや2つ、どこでも手に入れられるでしょうに。"
10024045-76 = "玄武商会は、少なくとも山海経の内部で最大の流通ルートを誇っていますから。"
10024045-77 = "そもそも……山海経を牛耳っている玄龍門に、#n手に入れられない物なんてあるのですか？"
10024045-79 = "言いがかりだ！"
10024045-80 = "最初に決めつけたのは、そちらじゃないですか！"
10024045-85 = "う～ん……玄武商会と玄龍門って、互いの行動に目を光らせてるじゃない？"
10024045-86 = "犯人の立場になって考えると……"
10024045-87 = "その目をかい潜って密輸するなんて、ちょっと難しいんじゃないかな。"
10024045-88 = "[s] \"両方の目を欺く必要があるね。\""
10024045-90 = "先生は玄武商会の味方をするのか！？"
10024045-91 = "先生は玄龍門の味方をするのですか！？"
10024045-92 = "[s] \"2人とも、少し落ち着いて……。\""
10024045-94 = "どうどう、先生が困ってるでしょ。"
10024045-95 = "まったく……この2人は気が合うんだか合わないんだか。"
10024045-102 = "[ns] \"どちらの目も届かない組織があるとか……？\""
10024045-103 = "何を言ってるんだ、先生は。#nそんな組織が山海経にあるわけないだろう。"
10024045-104 = "山海経の全ては、玄龍門の下にある。#n……少しばかり、玄武商会に手を焼いているくらいでな。"
10024045-106 = "つまり……疑わしいのは玄武商会、お前たちしかいないというわけだ。"
10024045-107 = "フッ、先生の言葉に感謝しなくてはな。"
10024045-109 = "誇らしげに言う事ですか……？#n逆に、玄龍門が玄武商会を陥れる動機足り得ると思いますが……。"
10024045-110 = "なっ、私を罠にハメたのか！？#nやはり先生は玄龍門の敵だったと……！"
10024045-111 = "[s] \"そんなつもりじゃないよ！？\""
10024045-112 = "いや……構わんさ。#nいずれ理解してもらえる日が来るはずだ。"
10024045-114 = "う～ん、あたし達の目の届かない組織ねぇ……#n目の届かない……目の……見張る、必要がない？"
10024045-121 = "あっ、もしかして、あそこなら……？"
10024045-122 = "会長、何か気づきましたか？"
10024045-123 = "待て、何の話だ？"
10024045-124 = "いや、でも流石に……あの子たちを巻き込んでいるとしたら……"
10024045-126 = "山海経も、いよいよ終わりだね……"
10024045-129 = "[ns] \"心当たりがあるの？\""
10024045-130 = "う～ん、あんまり確信はないんだけど……"
10024045-131 = "[s] \"聞くだけ聞いてみてもいい……？\""
10024045-132 = "先生……"
10024045-134 = "会長、私にもコッソリ教え――"
10024045-135 = "なにを自分たちだけで話してる！#n早く言わなければ、嫌でも口を開かせてやるぞ！"
10024045-136 = "うーん、じゃあ……結論から言うと、存在するよ。#n――どちらの干渉も受けない組織がね。"
10024045-137 = "でも、あそこだけは普通は想像できない。きっと、嘘だと思うはず。#n……あたしも間違いであってほしいよ。"
10024045-138 = "山海経で、最も純粋な場所――"
10024045-140 = "それは！"
10024045-141 = "いったい！"
10024045-145 = "[ns] \"どこなの！？\""
10024045-149 = "山海経訓育支援部、梅花園。"
