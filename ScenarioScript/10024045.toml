[translation]
10024045-3 = "Droga...!"
10024045-7 = "Haa... Eu não queria ter que lutar, mas não tenho escolha."
10024045-8 = "E então, já se acalmaram um pouco?"
10024045-14 = "“...Não se pode seguir em frente sem admitir o fracasso. É algo necessário para o crescimento.”"
10024045-18 = "“Mas a humilhação sofrida permanece... Será que fomos criadas apenas para sermos destruídas!?”"
10024045-25 = "...Lá vem você com essas coisas sem sentido de novo."
10024045-26 = "[s] \"Não entendi nada do que você disse.\""
10024045-28 = "Como é que é...!"
10024045-33 = "Eu recebi um relatório de que a Associação Comercial Genbu e o Clube de Pesquisa de Alquimia entraram em contato, então fiquei esperando aqui."
10024045-34 = "Esperando que vocês aparecessem junto com o Clube de Pesquisa de Alquimia... é claro."
10024045-36 = "O Genryumon também estava suspeitando do Clube de Pesquisa de Alquimia?"
10024045-38 = "Hmph, o \"Ginseng de Dez Mil Anos\" tem uma relação profunda com a medicina, não tem?#nÉ natural ficar de olho nisso, não é?"
10024045-39 = "Eu tinha certeza de que o Clube de Pesquisa de Alquimia e a Associação Comercial Genbu estavam conectados por baixo dos panos."
10024045-41 = "――Isso é um absurdo total."
10024045-43 = "...Eu preferiria que chamasse de dedução."
10024045-44 = "[s1] \"Fiquei curioso...\"\n[s2] \"Você gosta de ser durão?\""
10024045-47 = "Claro, não é fantástico?"
10024045-48 = "[s] \"E ser legal?\""
10024045-49 = "Hmph, sem dúvida.#nComo pode ver, é uma palavra que parece ter sido feita para mim."
10024045-51 = "(O que ela está dizendo?)"
10024045-52 = "(Quem sabe...)"
10024045-53 = "Por que você está deixando o Clube de Pesquisa de Alquimia em paz?"
10024045-55 = "Não há provas materiais contra eles.#nAté agora, não vi nenhum movimento suspeito da parte deles."
10024045-56 = "..."
10024045-57 = "Hmph, o fato de você ter voltado à cena do crime é a prova de que minha dedução está correta."
10024045-58 = "E agora, só resta decidir o que fazer com o Sensei..."
10024045-60 = "Isso não é um pouco precipitado?"
10024045-61 = "Para começar, como alguém conseguiria tirar o \"Ginseng de Dez Mil Anos\" do Monte Kunlun, onde o Genryumon mantém os olhos bem abertos?"
10024045-62 = "Meios não faltam.#nCom certeza você usou algum truque sujo para invadir a montanha."
10024045-63 = "Se subornar os guardas, a vigilância não significa nada."
10024045-65 = "Esse tipo de tática é especialidade da Associação Comercial Genbu, não é?"
10024045-66 = "Por favor, use um pouco a cabeça para pensar."
10024045-67 = "O criminoso sempre volta à cena do crime.#nSe for esse o caso, o Genryumon não é exceção."
10024045-69 = "Na verdade, não seria o Genryumon quem está por trás disso para incriminar a Associação Comercial Genbu?"
10024045-70 = "Que absurdo!"
10024045-72 = "Se pensarmos em quem ganha e quem perde com isso, as peças se encaixam naturalmente, não acha?"
10024045-73 = "Pensando bem, é muito provável que o Genryumon tenha contrabandeado o \"Ginseng de Dez Mil Anos\" e colocado a culpa na Associação Comercial Genbu."
10024045-74 = "Hmph, esqueceu da existência das provas?#nO \"Ginseng de Dez Mil Anos\" foi encontrado em uma caixa de papelão da Associação Comercial Genbu."
10024045-75 = "Caixas de papelão podem ser conseguidas em qualquer lugar."
10024045-76 = "Afinal, a Associação Comercial Genbu possui a maior rede de distribuição dentro de Shanhaijing."
10024045-77 = "E, para começar... existe algo que o Genryumon, que controla Shanhaijing, não consiga obter?"
10024045-79 = "Isso é uma acusação falsa!"
10024045-80 = "Foram vocês que tiraram conclusões precipitadas desde o início!"
10024045-85 = "Hmm... A Associação Comercial Genbu e o Genryumon vivem vigiando as ações um do outro, não é?"
10024045-86 = "Se pensarmos do ponto de vista do criminoso..."
10024045-87 = "Contrabandear algo passando por baixo do nariz de ambos parece um pouco difícil."
10024045-88 = "[s] \"É preciso enganar os dois lados.\""
10024045-90 = "O Sensei está do lado da Associação Comercial Genbu!?"
10024045-91 = "O Sensei está do lado do Genryumon!?"
10024045-92 = "[s] \"Vocês dois, por favor, se acalmem...\""
10024045-94 = "Calma, calma, o Sensei está ficando confuso."
10024045-95 = "Francamente... não sei se essas duas se dão bem ou não."
10024045-102 = "[ns] \"Existe alguma organização que não está sob o alcance de vocês dois...?\""
10024045-103 = "O que você está dizendo, Sensei? #nNão existe tal organização em Shanhaijing."
10024045-104 = "Tudo em Shanhaijing está sob o comando da Xuanlongmen. #n...Embora tenhamos um pouco de trabalho com a Associação Comercial Xuanwu."
10024045-106 = "Ou seja... os únicos suspeitos são vocês, da Associação Comercial Xuanwu."
10024045-107 = "Hmph, devo agradecer pelas palavras do Sensei."
10024045-109 = "Isso é algo para se orgulhar...? #nPor outro lado, acho que a Xuanlongmen teria motivos para incriminar a Associação Comercial Xuanwu..."
10024045-110 = "O quê, você me armou uma cilada!? #nEntão o Sensei era mesmo um inimigo da Xuanlongmen...!"
10024045-111 = "[s] \"Não foi essa a minha intenção!?\""
10024045-112 = "Não... tudo bem. #nTenho certeza de que chegará o dia em que você entenderá."
10024045-114 = "Hmm, uma organização fora do nosso alcance, é... #nFora do alcance... fora de... não precisa ser vigiada?"
10024045-121 = "Ah, será que, se for aquele lugar...?"
10024045-122 = "Presidente, você percebeu algo?"
10024045-123 = "Espere, do que vocês estão falando?"
10024045-124 = "Não, mas, honestamente... se elas estiverem envolvidas nisso..."
10024045-126 = "Shanhaijing está finalmente chegando ao fim..."
10024045-129 = "[ns] \"Você tem alguma ideia de quem seja?\""
10024045-130 = "Hmm, não tenho muita certeza, mas..."
10024045-131 = "[s] \"Posso pelo menos ouvir o que você pensa?\""
10024045-132 = "Sensei..."
10024045-134 = "Presidente, conte para mim também em segredo—"
10024045-135 = "Por que vocês estão conversando sozinhos! #nSe não falarem logo, vou fazer vocês abrirem a boca à força!"
10024045-136 = "Hmm, bem... indo direto ao ponto, ela existe. #n—Uma organização que não recebe interferência de nenhum dos dois lados."
10024045-137 = "Mas é um lugar que ninguém imaginaria. Com certeza vão achar que é mentira. #n...Eu também queria que fosse um erro."
10024045-138 = "O lugar mais puro de Shanhaijing—"
10024045-140 = "É!"
10024045-141 = "Onde é!"
10024045-145 = "[ns] \"Onde fica!?\""
10024045-149 = "Departamento de Apoio Educacional de Shanhaijing, o Jardim das Ameixeiras."
