[translation]
10048090-1 = "Episódio 9; Eu odeio esse tipo de final"
10048090-2 = "Wild Hunt - Terreno Baldio"
10048090-3 = "（Enquanto Miyo explicava a Akira sobre o pedido que o Departamento de Comércio Especial recebeu...）"
10048090-4 = "（Sem que percebessem, o sol já tinha se posto completamente）"
10048090-5 = "Hum... Em suma, vocês acreditavam que a pintura no depósito era uma falsificação."
10048090-6 = "E que a que receberam do cliente... era a obra original."
10048090-7 = "Sim... Na verdade, era o contrário."
10048090-8 = "Sim. Aquilo não emana o brilho de uma obra original. #nÉ uma falsificação completa. Nem chega a ser uma imitação digna."
10048090-9 = "Mas não é estranho?"
10048090-10 = "Se fosse assim, por que teriam feito um pedido desses?"
10048090-11 = "Eu entenderia se quisessem que trouxéssemos a obra original. #nBem, eu recusaria de qualquer forma..."
10048090-12 = "Mas, na verdade, eles fizeram questão de trocar pela falsificação e depois pediram para destruir o original."
10048090-13 = "E pagaram uma fortuna por isso..."
10048090-14 = "Mesmo assim, não terem a intenção de obter o original..."
10048090-15 = "Por que fariam um pedido desses...?"
10048090-16 = "Isso não deveria trazer benefício algum."
10048090-18 = "O lucro financeiro não é necessariamente a única força motriz."
10048090-19 = "Às vezes, as pessoas são movidas apenas pela estética. #nEmbora eu não saiba como era o cliente em questão."
10048090-20 = "É um tipo de coisa que parece impossível de entendermos..."
10048090-21 = "Entendimento... Ah, duvido que tenham buscado isso desde o início. #nSe fosse o caso, já teria chegado aos ouvidos de vocês."
10048090-22 = "Mas, bem... como alguém que também ama a beleza, posso fazer uma suposição."
10048090-23 = "……！？"
10048090-24 = "O cliente queria que a falsificação fosse vista por muitos olhos."
10048090-25 = "E, no fim das contas... ele queria testar algo."
10048090-26 = "Sim, um desejo bastante inocente. #nSerá que ele queria zombar daqueles que não conseguem distinguir o verdadeiro do falso, ou talvez..."
10048090-27 = "— Queria medir o verdadeiro valor da falsificação."
10048090-28 = "Que sujeito de mau gosto..."
10048090-29 = "Ora, devo considerar isso um desafio a mim?"
10048090-30 = "N-não, não é isso..."
10048090-31 = "Fufu, de qualquer forma, entendi o objetivo de vocês."
10048090-32 = "Prepararam um palco só para mim, a fim de trocar o verdadeiro pelo falso... foi isso."
10048090-34 = "Se eu a ofendi, peço desculpas."
10048090-35 = "Ah, não se preocupe. #nÉ justamente por eu ser uma ladra fantasma, não é?"
10048090-36 = "Foi por isso que conseguiram preparar esse roteiro, não foi?"
10048090-37 = "Ah, ugh..."
10048090-38 = "Fufu, não me importo nem um pouco. #nNa verdade, os atores já estavam prontos. Não havia como não aproveitar."
10048090-39 = "Eu entendo muito bem como sou vista pela sociedade."
10048090-40 = "Mesmo assim, você continua roubando?"
10048090-41 = "Não... isso é a minha estética. #nNão passa de um gerenciamento feito por minhas próprias mãos para o bem do mundo e das pessoas."
10048090-42 = "Certamente, aqueles que não compreendem a estética me criticarão por violar as regras."
10048090-43 = "Mas será que esses valores podem ser considerados corretos?"
10048090-44 = "Quem provará que a minha estética está errada?"
10048090-45 = "Os valores frequentemente ficam para trás com o passar do tempo. #nPor exemplo, assim como o valor dos pigmentos não é o mesmo de quando esta pintura foi feita e hoje — eles mudam a cada instante."
10048090-46 = "Vocês também podem dizer, do fundo do coração, que todas as regras desta academia estão corretas?"
10048090-47 = "Na verdade... acho que existem muitas regras escolares que nem sei por que existem."
10048090-48 = "Shiu."
10048090-50 = "Sim, exatamente. #nPor isso, ninguém tem permissão para interferir na minha estética."
10048090-51 = "É apenas porque os valores não acompanham e não compreendem a estética."
10048090-52 = "……"
10048090-53 = "Eu acredito que 'o direito de apreciar o charme que as obras de arte possuem deve ser igual para todos'."
10048090-54 = "Por isso, eu me oponho à posse individual e..."
10048090-55 = "— eu mesma os recuperarei com minhas próprias mãos."
10048090-56 = "Essa é a minha estética. Seria mais fácil de entender se eu chamasse de libertação da arte?"
10048090-57 = "E-então, posso te perguntar uma coisa?"
10048090-58 = "Sim. Pergunte o quanto quiser."
10048090-59 = "……Onde estão as obras de arte que você libertou até agora?"
10048090-60 = "Infelizmente, a maioria das pessoas não consegue compreender o verdadeiro valor das obras de arte. #nNem sequer tentam."
10048090-61 = "Apenas um punhado de pessoas consegue realmente entendê-las."
10048090-62 = "Mas eu acredito."
10048090-63 = "Que um dia, o mundo entenderá o valor da arte e despertará para a verdadeira estética."
10048090-64 = "Até esse dia chegar, as obras de arte que obtive ficarão sob meus cuidados."
10048090-69 = "Você não confia em ninguém, não é?"
10048090-70 = "Sim."
10048090-71 = "Mas isso não é o mesmo para você, senhorita?"
10048090-72 = "Se o Sensei não estivesse aqui, você nem teria ouvido uma palavra do que eu disse."
10048090-73 = "……Isso é……"
10048090-74 = "……Digo, você não está apenas tentando dizer que o que você roubou é seu?"
10048090-75 = "Shiii!"
10048090-76 = "Hum, acho que não faz sentido continuar falando sobre estética."
10048090-77 = "Vamos resumir a conversa — a resposta é simples e clara."
10048090-78 = "……?"
10048090-79 = "Eu quero obter a obra original."
10048090-80 = "E vocês, senhoritas, querem receber a recompensa pelo trabalho."
10048090-81 = "E se houvesse uma maneira de realizar as duas coisas ao mesmo tempo?"
10048090-82 = "Isso é…… como você faria?"
10048090-83 = "Colocarei uma falsificação na minha rota de fuga — como se eu a tivesse deixado cair. #n……Depois, basta que o Comitê Disciplinar recupere esse quadro."
10048090-84 = "Assim, o quadro será exibido novamente e o Comitê Disciplinar, que não quer causar um alvoroço, evitará fazer uma perícia de autenticidade."
10048090-85 = "E quanto ao original?"
10048090-86 = "Claro que eu ficarei com ele."
10048090-87 = "……."
10048090-88 = "Fazer essa cara estraga seu rosto bonito."
10048090-89 = "De qualquer forma, ninguém notará que foi trocado."
10048090-90 = "Até mesmo vocês, senhoritas que estudam artes, não conseguiram distinguir o original da falsificação."
10048090-91 = "……!"
10048090-93 = "……Não tenho como rebater isso."
10048090-94 = "Fufu, a areia do tempo continua a fluir. Já caiu bastante."
10048090-95 = "Bem, então — passem bem."
10048090-96 = "……Espere."
10048090-97 = "Não, o tempo acabou."
10048090-98 = "Sensei, vamos conversar com calma outra hora……"
10048090-99 = "Isso não é um \"pedido\"."
10048090-100 = "Hum."
10048090-101 = "——Sim, é isso."
10048090-102 = "Derrube aquela árvore ali."
10048090-104 = "Árvore……?"
10048090-108 = "Ei!"
10048090-119 = "[ns] \"A árvore caiu!?\""
10048090-120 = "(Com as mãos nuas, aquela árvore enorme?)"
10048090-121 = "(Aquela senhorita……)"
10048090-122 = "(Bloquear a rota de fuga com força bruta……)"
10048090-123 = "Hehe, impressionante."
10048090-124 = "Eu sou Ritsu Usuba!"
10048090-125 = "P-por que você está dizendo seu nome...!!"
10048090-126 = "Muito prazer, ladrão!"
10048090-127 = "Ladrão...?"
10048090-128 = "Hehe... sim. #nMuito prazer, senhorita."
10048090-129 = "Hmm... devo interpretar isso como uma ameaça?"
10048090-131 = "Eu só quero que você me escute."
10048090-132 = "……Essa situação também estava escrita na minha história."
10048090-133 = "É um enredo que eu escrevi, uma estratégia que eu mesma elaborei..."
10048090-134 = "……E é parte da minha obra."
10048090-135 = "Eu odeio este clube."
10048090-136 = "Também odeio planejar contrabando."
10048090-137 = "……Mas, só porque o tema é detestável, não significa que eu vá abandonar a obra e deixá-la inacabada."
10048090-138 = "Ficar com esse sentimento de insatisfação, sem resolver absolutamente nada..."
10048090-139 = "Todos serem enganados e nós recebermos a recompensa sem nos sentirmos bem com isso, um final assim..."
10048090-140 = "Como escritora, eu não posso permitir!"
10048090-145 = "Então..."
10048090-146 = "Você está dizendo que tem uma alternativa?"
10048090-147 = "Sim."
10048090-148 = "Eu não crio ganchos que não posso resolver."
10048090-149 = "Por isso, por favor, ouça a minha proposta final."
10048090-150 = "Algo que todos aqui possam aceitar..."
10048090-152 = "……Eu proponho uma aposta."
