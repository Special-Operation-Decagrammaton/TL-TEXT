[translation]
10048090-1 = "第9話;こんなエンディングはいやだ"
10048090-2 = "ワイルドハント・空き地"
10048090-3 = "（ミヨが特殊交易部の受けた依頼をアキラに説明していると……）"
10048090-4 = "（いつの間にか、すっかり日が落ちていた）"
10048090-5 = "ふむ――つまり、お嬢さん方は、収蔵庫にある絵が贋作であると信じていたのですね。"
10048090-6 = "依頼人から受け取った方を――真作だと信じていた、と。"
10048090-7 = "はい……本当は逆だったんですね。"
10048090-8 = "ええ。それは真作の輝きを放っていません。#n全くの偽物です。イミテーションにさえなり得ない。"
10048090-9 = "でも、おかしくないですか？"
10048090-10 = "それならどうしてこんな依頼をしたんでしょう。"
10048090-11 = "真作を持って来てほしいのならわかります。#nまあ、断りますけど……。"
10048090-12 = "でも、実際はわざわざニセモノに入れ替えた後、本物を破棄しろと言ってきました。"
10048090-13 = "……それも、大金をはたいて。"
10048090-14 = "それなのに、本物を手に入れるつもりがないなんて……。"
10048090-15 = "どうしてそんな依頼を……？"
10048090-16 = "それこそ、何のメリットもないはずです。"
10048090-18 = "金銭的利益のみが原動力であるとは限りません。"
10048090-19 = "時には、美学によってのみ動かされることもあるでしょう。#n依頼主がどうであったのかは私の預かり知るところではありませんが。"
10048090-20 = "……私たちには理解できなさそうな類のものですね。"
10048090-21 = "理解――嗚呼、そのようなものなど端から求めてはいないでしょう。#nそうであれば、既にお嬢さん方の耳に入っている。"
10048090-22 = "ですが、そうですね――同じ美を愛する者として、推測することはできます。"
10048090-23 = "……！？"
10048090-24 = "依頼主は偽物が多くの目に触れることを望んだ。"
10048090-25 = "その果てに――見定めたいものがあったのでしょうね。"
10048090-26 = "ええ、なんとも無邪気な願望。#n真贋の区別がつかぬ者を嘲笑いたかったのか、はたまた――"
10048090-27 = "――贋作の真の価値を測りたかったのか。"
10048090-28 = "……悪趣味なヤツですね。"
10048090-29 = "おや、それは私への挑戦と受け取っても？"
10048090-30 = "い、いや、そういうわけでは……。"
10048090-31 = "ふふっ、ともあれ、お嬢さん方の目的は理解いたしました。"
10048090-32 = "真贋を入れ替えるために、私一人の舞台を用意した――と。"
10048090-34 = "……気を悪くしたなら、申し訳ありません。"
10048090-35 = "嗚呼、お気になさらず。#n私が怪盗であるからこそ、なのでしょう？"
10048090-36 = "だからこそ――筋書きを用意できたのでは？"
10048090-37 = "あっ、うぅ……。"
10048090-38 = "ふふっ、気にしてなどおりませんよ。#n事実、役者は揃っていたのですから。使わない手はありません。"
10048090-39 = "私自身がどう世間に映っているのかは、よく理解しておりますので。"
10048090-40 = "……それでも盗みを続けるのですか？"
10048090-41 = "いえ――これは私の美学です。#n世のため人のために私の手で管理しているだけに過ぎません。"
10048090-42 = "たしかに、美学を解せぬ者からは規則に反していると[ruby=そし]謗[/ruby]られるでしょう。"
10048090-43 = "しかしその[ruby=規則]価値観[/ruby]は――果たして正しいといえるのでしょうか？"
10048090-44 = "私の美学が間違っていると、誰がそれを証明するのでしょう？"
10048090-45 = "[ruby=規則]価値観[/ruby]は往々にして時代においていかれるもの。#n例えばこの絵画が描かれた時と今で、顔料の価値が同じではないように――刻一刻と変化し続けるものです。"
10048090-46 = "お嬢さん方も、この学院のルールが全て正しいと心の底から言えますか？"
10048090-47 = "……たしかに、どうしてあるのか分からない校則もいっぱいあると、思います。"
10048090-48 = "しーっ。"
10048090-50 = "ええ、その通り。#nですから――私の美学だって、誰も口を挟むことなど許されません。"
10048090-51 = "――[ruby=モラル]価値観[/ruby]が追いつかず、美学を解さないだけなのですから。"
10048090-52 = "……。"
10048090-53 = "私は、「美術品が有する魅力に触れられる権利は、全ての者に等しくあるべき」だと考えています。"
10048090-54 = "ですから、個人が所有することに異議を唱え――"
10048090-55 = "――私の手で取り戻すのです。"
10048090-56 = "これは私の美学です。芸術に対する解放と言い換えれば理解しやすいでしょうか？"
10048090-57 = "そ、それでしたら、一つ聞いてもいいですか？"
10048090-58 = "ええ。いくらでも。"
10048090-59 = "……これまで解放してきた美術品は、どこに？"
10048090-60 = "残念ながら――ほとんどの方は、美術品の真価を理解できません。#nしようとすらしていない。"
10048090-61 = "真にそれを理解できるのは、ほんの一握り。"
10048090-62 = "ですが、私は信じているのです。"
10048090-63 = "いつの日か――世界が美術品の価値を理解し、真の美学に目覚める時が来る、と。"
10048090-64 = "その日まで、手に入れた美術品は私の手元で管理するのです。"
10048090-69 = "誰も信じていないのですね。"
10048090-70 = "ええ。"
10048090-71 = "ですがそれは――お嬢さんも同じでは？"
10048090-72 = "先生がいなければ、私の言葉に耳を傾けることなどしなかったのですから。"
10048090-73 = "……それ、は。"
10048090-74 = "……というか盗んだ物は自分の物って言いたいだけじゃないんですか？"
10048090-75 = "しーっ！"
10048090-76 = "ふむ、これ以上美学を語っても無意味でしょうか。"
10048090-77 = "話をまとめましょう――答えは単純明快です。"
10048090-78 = "……？"
10048090-79 = "私は、真作を手に入れたい。"
10048090-80 = "そしてお嬢さん方は、依頼の報酬を受け取りたい。"
10048090-81 = "この二つを同時に叶える方法があるとしたら？"
10048090-82 = "それは……どうするんですか？"
10048090-83 = "私の退路に贋作を置く――あたかも、私が落としてしまったかのように。#n……あとは、その絵を寮監隊が回収するだけで良い。"
10048090-84 = "そうすれば、再び絵は展示され――事を大きくしたくない寮監隊は、真贋の鑑定を避けるでしょう。"
10048090-85 = "では、本物の方は？"
10048090-86 = "もちろん私が頂きます。"
10048090-87 = "……。"
10048090-88 = "そんな顔をしては美しい顔が台無しですよ。"
10048090-89 = "いずれにせよ、すり替わってることに気づく者はいないでしょう。"
10048090-90 = "芸術を専攻している、お嬢さん方でさえ――真贋を見抜くことができなかったのですから。"
10048090-91 = "……！"
10048090-93 = "……それを言われると、何も返せないですね。"
10048090-94 = "ふふっ、時の砂は流れ行くばかり。もう随分と落ちてしまいました。"
10048090-95 = "それでは――ごきげんよう。"
10048090-96 = "……待ってください。"
10048090-97 = "いいえ、時間切れです。"
10048090-98 = "先生、また今度ゆっくり――"
10048090-99 = "これは「お願い」ではありません。"
10048090-100 = "ふむ。"
10048090-101 = "――うん、そう。"
10048090-102 = "そこの木をお願い。"
10048090-104 = "木……？"
10048090-108 = "えいっ！"
10048090-119 = "[ns] \"木が倒れた！？\""
10048090-120 = "（素手であの大樹を？）"
10048090-121 = "（あのお嬢さん……）"
10048090-122 = "（怪力で退路を塞ぐとは……）"
10048090-123 = "ふふっ、お見事。"
10048090-124 = "ボク、[ruby=うすば]薄葉[/ruby]リツ！"
10048090-125 = "な、何で名前を名乗ってるんですか……！！"
10048090-126 = "はじめまして、ドロボーさん！"
10048090-127 = "ドロボー……さん……？"
10048090-128 = "ふふっ……ええ。#n初めまして、お嬢さん。"
10048090-129 = "ふむ――これは脅しと受け取っても？"
10048090-131 = "話を聞いていただきたいだけです。"
10048090-132 = "……この状況も、私の物語には書いてありました。"
10048090-133 = "私が綴ったプロットであり、私が考案した作戦……。"
10048090-134 = "……そして、作品の一部です。"
10048090-135 = "私はこの部活が嫌いです。"
10048090-136 = "密輸プランを立てるのも嫌いです。"
10048090-137 = "……でも、嫌いな題材だからって、作品を投げっぱなしで終わらせるのはもっと嫌です。"
10048090-138 = "モヤモヤだけが残って、何ひとつ解決していない――"
10048090-139 = "みんなが騙されて、私たちは腑に落ちない中で報酬を貰う、そんな結末なんて……！"
10048090-140 = "作家として、許せません！"
10048090-145 = "では――"
10048090-146 = "代案があるとでも？"
10048090-147 = "ええ。"
10048090-148 = "私は回収できない伏線は張りません。"
10048090-149 = "だから、最後に私の提案を聞いてください。"
10048090-150 = "この場の全員が納得できる……。"
10048090-152 = "……賭けを、提案します。"
