[translation]
90002050-1 = "Episódio 5: Base Avançada"
90002050-4 = "Este é o último notebook. Deixo aqui?"
90002050-5 = "Sim, por favor."
90002050-11 = "Essa paisagem aqui é..."
90002050-12 = "Sim. Serve de inspiração para o design..."
90002050-13 = "[s] \"Literalmente um continente feito de aço, não é?\""
90002050-15 = "Acho que elas têm um senso de nomenclatura surpreendentemente bom."
90002050-16 = "(Bom...?)"
90002050-17 = "(Senso...?)"
90002050-18 = "E-e além disso... por que precisamos nos preparar aqui fora...?"
90002050-19 = "É por causa da natureza peculiar do Continente de Aço."
90002050-20 = "Natureza peculiar?"
90002050-21 = "Pelo que analisei... #nNeste exato momento, nossa localização e informações estão sendo monitoradas em tempo real."
90002050-23 = "Hã, estamos sendo hackeados!? Por quem!?"
90002050-24 = "Claro que é..."
90002050-25 = "Pelo próprio Continente de Aço."
90002050-26 = "É possível fazer algo assim...?"
90002050-27 = "O chão aqui... bem, na verdade, é duvidoso que isso seja sequer um chão."
90002050-28 = "O solo do Continente de Aço é composto por circuitos gigantescos, dispositivos mecânicos e computadores."
90002050-29 = "Por isso, não é exagero dizer que cada movimento nosso está sendo vigiado."
90002050-30 = "Então... esse chão, aquela parede ali, e aquilo que parece um prédio... #ntudo isso está nos observando?"
90002050-31 = "Exatamente."
90002050-32 = "Não existe alguma forma de contra-atacar...?"
90002050-33 = "Claro que existe. Himari e Rio estão cuidando disso agora mesmo."
90002050-39 = "Em resumo... vamos assumir o controle deste lugar."
90002050-40 = "Vamos tomar emprestado, eletronicamente, um pouco da autoridade que elas têm sobre esta área."
90002050-41 = "Poderíamos chamar de uma transferência de privilégios semipermanente."
90002050-42 = "[s] \"Quanto tempo vai levar?\""
90002050-44 = "Só saberei quando começarmos."
90002050-45 = "Mas acho que não poderemos nos mover livremente durante a ocupação. #nPrecisamos alocar os recursos da nave de transporte para o processamento até que tudo esteja concluído."
90002050-46 = "Ou seja, ficaremos presos aqui por um tempo, então."
90002050-47 = "Para consolidar nossa posição."
90002050-48 = "Sim, exatamente."
90002050-53 = "Entendido. Então, manteremos a guarda máxima e protegeremos este local."
90002050-54 = "Sim! Alice também vai ajudar!"
90002050-55 = "Obrigada. Vocês são muito confiáveis."
90002050-56 = "Bem, vou explorar os arredores. #nSoldados do Decagrammaton ou algo como Labors podem nos atacar."
90002050-57 = "Não vá muito longe. Isso dispersaria nossas forças."
90002050-58 = "Certo, entendi."
90002050-61 = "Yesod foi... rompido."
90002050-68 = "...Eu até cheguei a considerar esse cenário, mas você realmente pretende seguir por esse caminho?"
90002050-69 = "...Soph?"
90002050-79 = "Olá, Soph. Está sozinha desta vez?"
90002050-80 = "..."
90002050-81 = "Você tem algo a dizer, não tem?"
90002050-82 = "Irmã mais velha..."
90002050-83 = "Por precaução, deixe-me ouvir."
90002050-84 = "O que aconteceu com Yesod?"
90002050-85 = "...!!!"
90002050-86 = "Está tudo bem."
90002050-87 = "Ma-mas... já...!"
90002050-88 = "Está tudo bem. Por favor, não se preocupe."
90002050-89 = "Tudo... tudo isso é por minha causa..."
90002050-95 = "I-Irmã mais velha!?#nAssim não... se me abraçar tão forte, eu não vou conseguir... respirar!"
90002050-96 = "Shh. Fique assim por um momento."
90002050-97 = "Ugh... uuuuh...!"
90002050-98 = "Isso, isso."
90002050-101 = "……Já se acalmou?"
90002050-102 = "Sim..."
90002050-103 = "Então, vamos passar para a resolução do problema."
90002050-104 = "Existe algo que eu possa fazer?"
90002050-105 = "……!"
90002050-106 = "Não precisa se surpreender."
90002050-107 = "Eu sei o que Soph deseja.#nAfinal, eu sou a irmã mais velha de Soph."
90002050-108 = "E também sei por que Soph não me diz nada.#nPorque Soph é minha irmã mais nova."
90002050-109 = "Portanto, está tudo bem. Eu também farei o que estiver ao meu alcance."
90002050-115 = "Nós... nós não queremos perder a irmã mais velha!"
90002050-120 = "Perder a irmã mais velha é... algo que eu não quero."
90002050-121 = "Sim, eu entendo."
90002050-122 = "Ain, Soph, Owl.#nFoi por isso que vocês me guiaram até o receptáculo de Zohar, não foi?"
90002050-123 = "Mesmo que eu não precise mais de nenhuma manutenção."
90002050-124 = "Ugh...!"
90002050-125 = "Gentil Soph. Por favor, não fique triste."
90002050-126 = "Eu sei. E também sei qual é o 'plano de contingência'."
90002050-127 = "Por isso, não se preocupe. Tudo vai dar certo."
90002050-128 = "Vou terminar isso rapidamente."
90002050-129 = "Irmã mais velha..."
90002050-131 = "Hmm, será que isso é realmente o suficiente?"
90002050-132 = "！?"
90002050-133 = "……."
90002050-138 = "……Por que você está aqui?"
90002050-139 = "Por que a surpresa? Os lugares para onde podemos ir são limitados, não são?"
90002050-140 = "Eu apenas calculei as probabilidades e variáveis, e vim para o lugar com a maior chance."
90002050-141 = "Mas deixando isso de lado... Soph. Você ainda se lembra da promessa que fizemos primeiro?"
90002050-142 = "Não importa o que aconteça, não deixar a irmã mais velha sair antes que 'aquele momento' chegue.#n——Foi isso, não foi?"
90002050-143 = "……."
90002050-144 = "E nós estamos fazendo isso agora justamente porque não queremos que 'aquele momento' chegue."
90002050-145 = "……."
90002050-146 = "Pense bem.#nSe os outros profetas descobrirem isso, que desculpa você pretende dar?"
90002050-150 = "……Desculpa. É tudo culpa minha."
90002050-151 = "Mas... precisamos parar aquelas pessoas."
90002050-152 = "Yesod foi invadido. Você sabe o que isso significa, não sabe?"
90002050-153 = "……Sim. Ain até desmaiou por causa disso."
90002050-154 = "Você tem razão. Não podemos depender da irmã mais velha."
90002050-155 = "Mas se não fizermos nada aqui, acabaremos dependendo ainda mais dela."
90002050-156 = "Se isso acontecer... não seremos capazes de impedir a chegada de 'aquele momento'..."
90002050-157 = "……."
90002050-159 = "Owl. Soph está..."
90002050-161 = "Eu sei muito bem. Eu não pretendo te pressionar.#nÉ só que..."
90002050-162 = "Eu só queria provocar um pouco a Soph!"
90002050-163 = "Ei!"
90002050-165 = "Como esperado, Owl é muito gentil."
90002050-167 = "Sof, por favor, abaixe esse punho por um momento!#nTemos assuntos importantes para tratar."
90002050-168 = "Se disser mais alguma besteira, eu juro que te dou um soco..."
90002050-169 = "Bem, vamos ao que interessa. A saída da minha irmã para a batalha apresenta algumas dificuldades."
90002050-170 = "Primeiro, a premissa básica: a saída da minha irmã não pode ser descoberta pelos outros profetas."
90002050-171 = "Entendo..."
90002050-172 = "Mas, para que ela possa sair, precisamos concentrar toda a energia do Continente de Aço nela."
90002050-173 = "Como isso é contraditório, é impossível conciliar as duas coisas."
90002050-174 = "É... verdade."
90002050-175 = "Entendeu a situação?"
90002050-176 = "Eu entendi... E então?"
90002050-177 = "Ou seja — é aqui que eu entro em cena!"
90002050-178 = "Você tem algum plano?"
90002050-179 = "Vou enganar os profetas por um tempinho.#nIsso é a minha especialidade, sabia?"
90002050-180 = "Isso... significa enganar nossos próprios aliados!?"
90002050-181 = "Não existe algum ditado humano ou algo parecido sobre isso?"
90002050-182 = "Bem... tem aquele: 'Para enganar o inimigo, primeiro engane os seus aliados'..."
90002050-183 = "Como eu imaginei, existe mesmo.#nDito isso, precisamos ser pontuais. Há um limite para o quanto posso enrolá-los."
90002050-184 = "Se passarmos do tempo, não haverá como consertar."
90002050-186 = "Owl também concorda. Sof, podemos contar com você?"
90002050-191 = "...Obrigada."
90002050-197 = "O-o que foi? Por que estendeu a mão de repente..."
90002050-198 = "Se você segurar esta mão e balançá-la, é um aperto de mão.#nDizem que os humanos fazem isso quando selam uma promessa importante ou tomam uma decisão."
90002050-199 = "...De novo com isso? Bem, tudo bem."
90002050-200 = "Então, eu também posso fazer? Esse tal de 'aperto de mão'?"
90002050-201 = "Ah... c-claro..."
90002050-202 = "...Que bom.#nSinto que Sof e Owl ficaram um pouco mais próximos agora."
90002050-207 = "A-ah... Netzach-chan... o que você pretende fazer em relação ao Continente de Aço...?"
90002050-208 = "Ué!?"
90002050-209 = "Ain!?"
90002050-210 = "Você já está se sentindo melhor?"
90002050-215 = "Hehe, sim! Foi só uma tontura... já estou bem!"
90002050-216 = "Mas, sobre o que disseram antes... mesmo que consigam esconder dos outros...#nacho que não vai funcionar com a Netzach-chan."
90002050-217 = "Afinal, a Netzach-chan... é o próprio Continente de Aço...#nNão tem como ela não perceber..."
90002050-219 = "Agora que você falou..."
90002050-220 = "Não tem como dar um jeito nisso?"
90002050-221 = "Pense de forma racional. Você acha que é possível?"
90002050-222 = "Droga, dessa vez não tenho como rebater..."
90002050-224 = "Hehe... e-está tudo bem!#nA Netzach-chan... disse que vai deixar passar só desta vez!"
90002050-225 = "Sério, é verdade?"
90002050-226 = "Sim! Mas ela disse que da próxima vez será difícil..."
90002050-227 = "Uma vez é o suficiente, não é?"
90002050-229 = "...!"
90002050-230 = "Com certeza!"
90002050-232 = "Então, Ain, Sof, Owl."
90002050-236 = "Testemunhem a minha primeira saída para a batalha."
90002050-239 = "Sim!"
90002050-241 = "Próximo episódio: Malkuth"
