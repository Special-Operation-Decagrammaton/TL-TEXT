[translation]
84311100402-6 = "Ora? Se não me engano, você é... Entendo. Então você ainda não tinha conseguido escapar."
84311100402-7 = "Hehe... Já estou acostumada com isso. Não é a primeira vez, afinal!"
84311100402-11 = "Ah, aliás, quem seria você...? Parece ser de Trinity, mas..."
84311100402-12 = "De fato. Sou uma aluna de Trinity que veio visitar a EXPO."
84311100402-13 = "Entendo! Acho que não é lá muito interessante, mas... parece que se esforçaram bastante na preparação. Divirta-se!"
84311100402-14 = "A EXPO não é interessante...?"
84311100402-15 = "Para você, onde seria um 'lugar divertido'?"
84311100402-19 = "Arcades, cassinos... ou talvez a sala de descanso do Schale, eu acho."
84311100402-20 = "(Entendo... estou começando a entender o seu gosto.)"
84311100402-21 = "...Aliás, por que está me perguntando isso?"
84311100402-22 = "Não tem um significado profundo, mas... achei que tínhamos algo em comum."
84311100402-23 = "Oooooh!!"
84311100402-25 = "Então você é do mesmo tipo que eu!? Me passa seu contato! Vamos conversar de novo qualquer dia!"
84311100402-26 = "Ah, vamos fazer isso sim."
84311100402-28 = "Este é o meu contato. Embora, tecnicamente, ele não deveria existir..."
84311100402-29 = "Até nisso somos iguais! Gostei ainda mais de você!"
84311100402-30 = "Anotei! Então, até a próxima...!"
