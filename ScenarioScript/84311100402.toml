[translation]
84311100402-6 = "おや？君はたしか……なるほど。まだ逃げ[ruby=おお]果[/ruby]せていたのだね。"
84311100402-7 = "ふっふっふ……もう慣れたものですよ。初めてじゃないですし！"
84311100402-11 = "あれ、というかどちら様……？トリニティの方みたいですが……。"
84311100402-12 = "いかにも。EXPOの見学に来たトリニティ生だ。"
84311100402-13 = "そうなんですね！つまらないとは思いますけど……頑張って準備したみたいだし。楽しんでってくださいね！"
84311100402-14 = "EXPOがつまらない……？"
84311100402-15 = "君にとって「楽しい場所」はどこなんだい？"
84311100402-19 = "ゲーセンとかカジノとか……シャーレの休憩室とかですかね。"
84311100402-20 = "（なるほど……趣向が分かってきた）"
84311100402-21 = "……ところで、どうしてそんなこと聞くんですか？"
84311100402-22 = "深い意味は無いが……通ずるものがあると思ってね。"
84311100402-23 = "おおおーっっ！！"
84311100402-25 = "分かるクチですね！？連絡先教えてください！また今度お話ししましょ！"
84311100402-26 = "ああ、そうしようか。"
84311100402-28 = "これが私の連絡先だ。とはいえ、存在しないことになっているものではあるが……。"
84311100402-29 = "そんなとこまで一緒なんですね！益々気に入りました！"
84311100402-30 = "覚えました！では、また今度……！"
