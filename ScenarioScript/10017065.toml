[translation]
10017065-11 = "Entrada do café 'White&Mason'"
10017065-17 = "（Se a Ichika estivesse aqui agora...！）"
10017065-18 = "（Mas agora, não tenho escolha a não ser fazer isso sozinha...）"
10017065-25 = "Ugh!"
10017065-26 = "Argh...!"
10017065-27 = "……Como esperado, é impressionante, Vice-Presidente Hasumi."
10017065-28 = "São palavras gentis demais... Comandante Mine."
10017065-29 = "É justamente por isso que é triste, que alguém com habilidades tão excelentes..."
10017065-30 = "Roube o frango de uma pessoa de bem!"
10017065-32 = "！？"
10017065-33 = "Frango..."
10017065-34 = "Por acaso foi esse o motivo... pelo qual o Esquadrão de Socorro atacou o Comitê de Justiça?"
10017065-35 = "E haveria outro motivo?!"
10017065-36 = "Eu pensei que houvesse algo mais..."
10017065-37 = "Algo como uma situação grave que justificaria transformar todo o Comitê de Justiça em inimigo..."
10017065-38 = "Algo que, mesmo que pudesse se transformar em um problema político, ainda assim exigiria uma ação imediata..."
10017065-39 = "Foi por isso que achei que vocês tinham vindo até aqui no Natal...!"
10017065-40 = "No fim das contas, era só por causa daquele frango!?"
10017065-41 = "Deixe-me esclarecer, aquele frango é—"
10017065-46 = "Que bela visão, Comitê de Justiça!"
10017065-47 = "É isso que acontece quando vocês intimidam os fracos!"
10017065-48 = "Todo o sofrimento que passamos até agora, vamos devolver em dobro!"
10017065-49 = "Como é a sensação de ser quem está sendo atacado agora?"
10017065-50 = "Muito bem, agora é a nossa vez!"
10017065-52 = "O que isso significa...?"
