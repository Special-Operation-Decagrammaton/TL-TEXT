[translation]
10017065-11 = "カフェ「White&Mason」入口"
10017065-17 = "（こんな時に、イチカがいたら……！）"
10017065-18 = "（ですが今は、自分の力だけでやるしかないですね……）"
10017065-25 = "くっ！"
10017065-26 = "くぅっ……！"
10017065-27 = "……やはり素晴らしいですね、ハスミ副委員長。"
10017065-28 = "身に余る言葉ですね……ミネ団長。"
10017065-29 = "だからこそ悲しいです、こんな優れた実力の持ち主が……"
10017065-30 = "善人のチキンを奪うだなんて！"
10017065-32 = "！？"
10017065-33 = "チキン……。"
10017065-34 = "もしかしてそれが……救護騎士団が正義実現委員会を襲撃した理由、ですか？"
10017065-35 = "他に何がありますか！"
10017065-36 = "他に何か、あると思っていたのですが……。"
10017065-37 = "何かその、正義実現委員会全員を敵に回してもおかしくないような深刻な事態が……"
10017065-38 = "政治的な問題に発展し得るとしても、それでも動かざるを得ないような事態かと……"
10017065-39 = "だからこそ、こんなクリスマスにわざわざ来たと思ってたのですが……！"
10017065-40 = "結局あのチキンですか！？"
10017065-41 = "言っておきますが、あのチキンは――"
10017065-46 = "良い様だな、正義実現委員会！"
10017065-47 = "弱い者いじめをするからそうなるのさ！"
10017065-48 = "今まで私たちが受けた苦しみ、倍にして返してやる！"
10017065-49 = "自分たちがやられる番になった気分はどうだ？"
10017065-50 = "さあ、こっからはあたしたちのターンだ！"
10017065-52 = "それは、どういう……？"
