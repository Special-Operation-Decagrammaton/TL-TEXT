[translation]
10049130-1 = "Epílogo 3: O Blues da Gangue dos Capacetes"
10049130-2 = "[log]5 dias atrás[/log]"
10049130-4 = "Muito bem, vamos recapitular mais uma vez."
10049130-5 = "Neste fim de semana, vamos capturar um vendedor ambulante vigarista no \"Parque de Diversões Borderland\"."
10049130-6 = "Para isso, não importa o método que usaremos. #n... Alguma pergunta?"
10049130-7 = "Sim, capitã!"
10049130-8 = "Sim, pode falar."
10049130-9 = "O que faremos com o ingresso? A história não começa se não entrarmos no parque!"
10049130-10 = "É verdade... com o nosso orçamento, nem o ingresso mais barato dá."
10049130-11 = "E ficar chutando máquinas de venda automática por aí não vai render muito dinheiro..."
10049130-12 = "E a comida do parque também é cara, não vamos conseguir comprar nada..."
10049130-13 = "Espera aí? Como vamos encontrar alguém em um lugar tão grande com o nosso número de pessoas...?"
10049130-14 = "O que a gente faz..."
10049130-15 = "Não vai dar..."
10049130-16 = "Heh."
10049130-20 = "Heh heh heh..."
10049130-21 = "Desta vez... as coisas são diferentes, entenderam?"
10049130-22 = "Acreditem ou não... o cliente providenciou os ingressos para nós!"
10049130-23 = "E ainda por cima, teremos reforços de outras unidades da Gangue dos Capacetes!"
10049130-24 = "C-capitã!!"
10049130-25 = "Isso é verdade!? Onde você conseguiu um trabalho tão bom assim...!"
10049130-26 = "Nós também merecemos fazer um \"bom trabalho\" de vez em quando, não acham?"
10049130-27 = "Além disso, não se surpreendam ainda. Adivinhem só..."
10049130-28 = "Os ingressos são passes livres!"
10049130-29 = "Passe livre!!"
10049130-30 = "Isso significa que podemos ir em todas as atrações? O dia todo!?"
10049130-31 = "E não é qualquer passe livre! É um passe livre de fim de semana!"
10049130-32 = "Capitã! Serei sua seguidora para sempre!!"
10049130-33 = "Com reforços chegando e entrada de graça! Essa vitória já é nossa!"
10049130-34 = "Temos que ser as primeiras a entrar!"
10049130-35 = "E, bem, nunca se sabe quando o alvo vai aparecer, né!"
10049130-36 = "Temos que preparar o almoço! Pode levar tempo para encontrar o alvo!"
10049130-37 = "Também precisamos de pistas... vamos tirar muitas fotos!"
10049130-38 = "Hehe!"
10049130-39 = "Não fiquem pensando só em brincar, tratem de trabalhar direito."
10049130-40 = "Se conseguirmos capturá-lo, a recompensa vai pagar um churrasco!"
10049130-41 = "Oba!"
10049130-42 = "A capitã é demais!"
10049130-45 = "Hum..."
10049130-46 = "Huuuum...?"
10049130-47 = "Capitã, já está na hora de entrar, não está?"
10049130-48 = "A gente não vai entrar?"
10049130-49 = "Se a gente se atrasar, as filas das atrações vão ficar enormes..."
10049130-50 = "O pessoal que deveria vir como reforço ainda não chegou."
10049130-51 = "E eles estão com os nossos ingressos!"
10049130-52 = "Será que fomos traídas!?"
10049130-53 = "Por que!? Nem houve troca de dinheiro ainda... #nSerá que eles pretendem roubar o nosso trabalho!?"
10049130-54 = "Vou entrar em contato agora. Se eles nos traíram, não vou deixar barato!"
10049130-55 = "Certo!"
10049130-61 = "Ei, onde vocês estão!? Vocês vão vir mesmo?"
10049130-62 = "Se vocês nos traíram..."
10049130-63 = "D-desculpa! Nós também estamos indo para aí! Mas...!"
10049130-64 = "Todo mundo foi derrotado!!"
10049130-65 = "Hã? Onde? Foram emboscados pelo alvo?"
10049130-66 = "No trem! Estávamos no trem e, de repente, os funcionários começaram a..."
10049130-67 = "A Highlander enlouqueceu!?"
10049130-68 = "E-ei! Pare com isso!!"
10049130-69 = "――Não farei isso!"
10049130-70 = "Não permitirei passageiros que atrapalhem a pontualidade!"
10049130-71 = "Aaaaaaaah!!"
10049130-78 = "Capitã...?"
10049130-79 = "O que está acontecendo...?"
10049130-80 = "Disseram que os funcionários do trem enlouqueceram..."
10049130-81 = "Hã?"
10049130-82 = "Ué, por quê?"
10049130-83 = "Não sei, mas..."
10049130-84 = "Isso significa que fomos traídos...?"
10049130-86 = "Capitã, para onde estamos indo?"
10049130-87 = "O portão de entrada do parque de diversões não é por aqui, né?"
10049130-89 = "Haa, haa... De acordo com o mapa, parece que este parque de diversões tem um zoológico."
10049130-90 = "Um zoológico é um lugar focado em impedir que os animais de dentro saiam. #nOu seja, é vulnerável a invasões externas."
10049130-91 = "Além disso, muitos lugares desligam os alarmes porque os animais acabam ativando-os."
10049130-92 = "E, pesquisando agora pouco, o zoológico está fechado temporariamente hoje."
10049130-93 = "É o lugar perfeito para nos infiltrarmos!"
10049130-94 = "Incrível... Como você sabe de tudo isso?"
10049130-95 = "Diferente de nós, a capitã não fugiu dos estudos porque odiava estudar!"
10049130-96 = "Capitã, é verdade, né? Ouvi dizer que você tinha notas boas antes."
10049130-97 = "Cala a boca. Eu não frequentava aquela escola porque queria."
10049130-98 = "No começo, tentei aguentar, mas... #nNo fim, era sufocante demais, não deu."
10049130-99 = "Mas talvez eu devesse ter participado do carnaval pelo menos uma vez. #nEu abandonei a escola antes disso."
10049130-100 = "Sério, as histórias do passado da capitã são sempre misteriosas."
10049130-101 = "Tem alguma reclamação?"
10049130-103 = "Bom, chega de conversa fiada. #n――Vai ser aqui."
10049130-104 = "Mesmo que não estejam em mãos agora, nossos ingressos devem estar garantidos. Por isso, isso não é invasão ilegal."
10049130-106 = "Pensando bem! A gente tem os ingressos, então...?"
10049130-107 = "Capitã, você é muito inteligente mesmo!"
10049130-108 = "Chega! Vocês também, venham logo para cá!"
10049130-111 = "Bingo! Parece que não tem alarmes."
10049130-112 = "Parece que foi feito para parecer um ambiente selvagem."
10049130-113 = "Selvagem?"
10049130-114 = "Certo, vamos seguir para o parque de diversões assim!"
10049130-115 = "Não temos reforços nem ingressos, mas não se preocupem! #nPorque em um lugar desses..."
10049130-116 = "Não tem como aparecer um crocodilo!"
10049130-121 = "Ei, o que houve? #nPor que está tremendo de repente..."
10049130-122 = "Capitã...! Não dá para dizer que não precisa se preocupar!"
10049130-123 = "Hã?"
10049130-125 = "Porque aqui... é o recinto dos crocodilos...!"
10049130-129 = "Um crocodilo de verdade...? #nPor causa do zoológico?"
10049130-130 = "Bom, faz sentido."
10049130-134 = "Aaaaaaaahhhhhhh!"
