33075-9 = "Aquilo é realmente uma 'pessoa'... ou será que..."
33075-10 = "Hasumi-san... aquilo, aquela pessoa é..."
33075-11 = "Irmã Hinata...?"
33075-12 = "Aquela aparência, eu já vi em livros... é o uniforme da 'Irmandade'."
33075-13 = "...\"Irmandade\"?"

33075-16 = "A 'Irmandade Justina'... os 'Guardiões dos Mandamentos' que deveriam ter desaparecido há centenas de anos, por que estão aqui agora...!?"
33075-21 = "Próximo episódio: O Dia Tingido de Fogo e Cinzas (2)"
