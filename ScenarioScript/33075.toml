[translation]
33075-2 = "Gh! Que é aquilo, afinal……!?"
33075-3 = "……."
33075-8 = "Aquele poder…… e essa sensação estranha, de lutar e lutar sem sentir resposta……."
33075-9 = "Aquilo é mesmo uma \"pessoa\"……? Ou……"
33075-10 = "Hasumi…… aquilo, aquela pessoa……."
33075-11 = "Irmã Hinata……?"
33075-12 = "Aquela figura, eu já vi num livro…… aquilo é a vestimenta do \"Conselho dos Santos\"."
33075-13 = "……\"Conselho dos Santos\"?"
33075-16 = "O \"Conselho dos Santos de Justina\"…… os \"guardiões dos preceitos\", que deviam ter desaparecido séculos atrás; por que estão aqui, agora……!?"
33075-21 = "Próximo Episódio;O Dia Tingido de Fogo e Cinzas (2)"
