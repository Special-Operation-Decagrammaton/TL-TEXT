[translation]
33075-2 = "Ugh! O que diabos é aquilo...!?"
33075-3 = "......"
33075-8 = "Aquele poder de impacto... e essa sensação estranha, de que por mais que eu lute, não parece ter efeito nenhum..."
33075-9 = "Aquilo... é mesmo uma 'pessoa'...? Ou será que..."
33075-10 = "Hasumi-san... aquilo, aquela pessoa é..."
33075-11 = "Irmã Hinata...?"
33075-12 = "Aquela aparência, eu já vi em livros... são os trajes da 'Sociedade dos Santos'."
33075-13 = "...'Sociedade dos Santos'?"
33075-16 = "'Sociedade dos Santos Justina'... Por que as 'Guardiãs dos Mandamentos', que deveriam ter desaparecido há séculos, estão aqui agora...!?"
33075-21 = "Próximo Episódio; O Dia Tingido de Fogo e Cinzas (2)"