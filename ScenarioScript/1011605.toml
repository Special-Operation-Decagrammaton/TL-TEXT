[translation]
1011605-1 = "Obrigado"
1011605-2 = "(Fui até a área do restaurante para conhecer Saori)"
1011605-3 = "(...No entanto)"
1011605-8 = "……."
1011605-9 = "[ns] \"Ah, uh... Saori-san?\""
1011605-13 = "Ah, senhor. Eu estava esperando."
1011605-14 = "Vamos para a loja imediatamente. Qual seria melhor?"
1011605-15 = "[ns] \"Bem, espere!\""
1011605-17 = "[ns] \"Talvez você sempre tenha sido assim?\""
1011605-18 = "Ouvi dizer que as pessoas usam vestidos em ocasiões importantes..."
1011605-22 = "vestir……? É alguma jovem?"
1011605-23 = "O que você está fazendo aqui?"
1011605-24 = "Pessoa linda... Devo perguntar se posso tirar uma foto?"
1011605-29 = "……sensei. Sinto os olhos de alguém em mim."
1011605-30 = "[ns1] \"Bem, antes de tudo, vamos mudar o local!\"\n[ns2] \"Você será visto aqui...!\""
1011605-36 = "Espere... sensei?"
1011605-43 = "(Foi assim que chegamos...)"
1011605-46 = "(Explicou para Saori o motivo dos olhares daqueles ao seu redor)"
1011605-53 = "...Eu não conseguia acreditar que tinha escolhido roupas fora do lugar."
1011605-54 = "Do jeito que estava, ele teria sido uma boa exposição."
1011605-55 = "Eu não queria fazer o sensei se sentir mal..."
1011605-56 = "Desculpe. Estava pensando em te agradecer."
1011605-57 = "Isso está arruinado."
1011605-58 = "Vamos trocar de roupa imediatamente. Espere um minuto--"
1011605-62 = "...Tudo bem se eu ficar com essas roupas? O que você quer dizer?"
1011605-63 = "[s3] \"Porque senti a seriedade de Saori em seu vestido!\"\n[s4] \"Não posso desperdiçar esse sentimento!\""
1011605-66 = "Oh...!"
1011605-67 = "Mas, eu fui até a loja vestida assim..."
1011605-68 = "...A Senseia cozinha?"
1011605-69 = "[s5] \"Eu senti como se fosse o único a receber isso.\"\n[s6] \"Saori também trabalhou duro, então preciso de uma recompensa!\""
1011605-72 = "Oh, eu vejo..."
1011605-73 = "Entendido. Vamos fazer o que eu digo."
1011605-74 = "Além disso, estou interessado na comida caseira da Senseia."
1011605-75 = "[ns] \"Hoje será um dia especial!\"\"\n1011605-77 = \"[ns] \"É nessas horas que eu quero tirar fotos...\"\"\n1011605-78 = \"fotografia? Eu vejo...\"\n1011605-79 = \"Entendido.\"\n1011605-80 = \"[s] \"Eh, ok?\"\"\n1011605-81 = \"Já me acostumei a ser fotografada como modelo. Isso também é graças ao meu sensei.\"\n1011605-82 = \"...Isso mesmo, tem algo que eu estava pensando em dar para a Senseia.\"\n1011605-83 = \"Por favor, pegue.\"\n1011605-93 = \"É uma revista de moda com minha foto.\"\n1011605-94 = \"Antes que eu percebesse, também fui selecionado como modelo de capa.\"\n1011605-95 = \"Diz-se que mais solicitações serão feitas no futuro.\"\n1011605-96 = \"Não só fui pago pelo meu trabalho de meio período, mas também recebi um vestido.\"\n1011605-97 = \"...É tudo graças ao sensei. Então vou levar isso para o sensei primeiro...\"\n1011605-98 = \"[ns] \"Oh meu Deus...! É isso!\"\"\n1011605-101 = \"Uau, isso é rápido! ? Sensei, você pode ver isso aqui agora? ?\"\n1011605-102 = \"[ns7] \"Saori, você fez um ótimo trabalho...! Sensei, estou tão feliz!\"\n[ns8] \"Meu coração está cheio só de olhar para isso...!\"\"\n1011605-110 = \"Ah, eu entendo! Por favor, pare de compará-lo com fotos...!\"\n1011605-111 = \"Fotos como essa foram retocadas para torná-las mais bonitas do que as reais...!\"\n1011605-112 = \"...Não há diferença? Ah, é verdade...?\"\n1011605-113 = \"[ns] \"Uau, sua expressão agora está ótima!!\"\"\n1011605-115 = \"[ns] \"Da próxima vez, deixe-me tirar muitas fotos da Saori...!\"\"\n1011605-116 = \"Droga...\"\n1011605-117 = \"Não, tudo bem. apenas……\"\n1011605-121 = \"Por favor, não mostre para mais ninguém. Legal?\"\n1011605-122 = \"[ns] \"Oba!\""

1011605-131 = "(Depois de tirar muitas fotos, gostei de cozinhar devagar com a Saori)"
