[translation]
1011605-1 = "お礼"
1011605-2 = "（サオリと会うべく飲食街に向かった）"
1011605-3 = "（……ところが）"
1011605-8 = "……。"
1011605-9 = "[ns] \"あ、あのー……サオリさん？\""
1011605-13 = "ああ、先生。待っていた。"
1011605-14 = "すぐ店に向かおう。どこがいいだろうか。"
1011605-15 = "[ns] \"ま、待って！\""
1011605-17 = "[ns] \"もしかして、ずっとその格好だったの？\""
1011605-18 = "大切な席には、ドレスを纏って行くものだと聞いたが……。"
1011605-22 = "ドレス……？どこかのお嬢さまかな？"
1011605-23 = "こんなところで何してるんだろ？"
1011605-24 = "綺麗な人……写真撮っていいか聞いてみようかな？"
1011605-29 = "……先生。なにやら視線を感じるのだが。"
1011605-30 = "[ns1] \"ま、まずは場所を変えよう！\"\n[ns2] \"ここは人目につくから……！\""
1011605-36 = "ちょっ……先生？"
1011605-43 = "（そうして私たちがたどり着いたのは……）"
1011605-46 = "（サオリに周囲の視線の理由を説明した）"
1011605-53 = "……場違いな服を選んでしまっていたとはな。"
1011605-54 = "あのままでは、いい晒し者になるところだった。"
1011605-55 = "先生に嫌な思いをさせるつもりはなかったんだ……。"
1011605-56 = "すまない。せっかくお礼をしようと思っていたのに。"
1011605-57 = "これでは台無しだ。"
1011605-58 = "すぐに着替えてこよう。少し待って――"
1011605-62 = "……この服のままでいい？どういうことだ？"
1011605-63 = "[s3] \"ドレス姿にサオリの本気を感じたから！\"\n[s4] \"その想いを無駄にできないよ！\""
1011605-66 = "っ……！"
1011605-67 = "で、でもこの格好でお店には……。"
1011605-68 = "……先生が料理を作る？"
1011605-69 = "[s5] \"私ばかり貰っている気がしたからね。\"\n[s6] \"サオリも頑張ったんだから、ご褒美がないと！\""
1011605-72 = "そ、そうか……。"
1011605-73 = "わかった。言う通りにしよう。"
1011605-74 = "それに、先生の手作り料理には興味がある。"
1011605-75 = "[ns] \"今日は特別な日になりそう！\""
1011605-77 = "[ns] \"こういう時こそ、写真に残したいんだけど……。\""
1011605-78 = "写真？そうか……。"
1011605-79 = "わかった。"
1011605-80 = "[s] \"えっ、いいの？\""
1011605-81 = "モデルとして撮られることにもすっかり慣れたからな。これも先生のおかげだ。"
1011605-82 = "……そうだ、先生に渡そうと思っていたものがある。"
1011605-83 = "受け取ってくれ。"
1011605-93 = "私の写真が載ったファッション誌だ。"
1011605-94 = "気がつけば、表紙モデルにも選ばれていてな。"
1011605-95 = "今後も依頼をすると言われている。"
1011605-96 = "バイト代はもちろん、ドレスまで貰ってしまった。"
1011605-97 = "……すべて先生のおかげだ。だからこれはまず先生に受け取――"
1011605-98 = "[ns] \"なんと……！これが！\""
1011605-101 = "は、速い！？ 先生、今ここで見るのか！？"
1011605-102 = "[ns7] \"サオリ、こんな立派に……！先生、すごく嬉しいよ！\"\n[ns8] \"見てるだけでも私、胸がいっぱいで……！\""
1011605-110 = "わ、分かったから！写真と見比べるのはやめてくれ……！"
1011605-111 = "こういう写真は補正されて、実物より美化されているんだ……！"
1011605-112 = "……差がない？ほ、本当か……？"
1011605-113 = "[ns] \"おっ、今の表情すごくよかった！！\""
1011605-115 = "[ns] \"今度こそサオリの写真をいっぱい撮らせて……！\""
1011605-116 = "くっ……"
1011605-117 = "い、いいだろう。ただ……"
1011605-121 = "ほかの人には絶対に見せないでくれ。いいな？"
1011605-122 = "[ns] \"やった！\""
1011605-131 = "（たくさん写真を撮った後、サオリとゆっくり料理を楽しんだ）"
