10012070-1 = "Episódio 7: Boias Voadoras"
10012070-4 = "（……Sem que eu percebesse, o sol nasceu e já era de manhã）"
10012070-5 = "（O chão onde eu estava deitado começou a esquentar, e eu acordei）"
10012070-6 = "……Oh, acordou, Sensei?"
10012070-7 = "Já está quase na hora do almoço~ Você é um dorminhoco, hein. Será que foi porque dormiu tarde ontem?"
10012070-8 = "Ou você é sempre assim nos dias de folga?"
10012070-9 = "[s1] \"……Hoshino?\"\n[s2] \"Onde estão as outras?\""
10012070-10 = "Ainda parece com sono, hein~"
10012070-11 = "Hm? Bem..."
10012070-12 = "As outras foram consertar o helicóptero. É um trabalho que dá bastante trabalho, sabe."
10012070-13 = "……Ah, eu?"
10012070-14 = "Esta velha aqui foi encarregada da missão crucial de proteger o Sensei. O sistema de segurança está ativo, mas é só por precaução, sabe?"
10012070-15 = "……Não é porque eu não quero me mexer, viu?"
10012070-16 = "Bem, já que o Sensei acordou……"
10012070-17 = "……Agora é a minha vez de dormir~"
10012070-18 = "[s3] \"E a missão crucial!?\"\n[s4] \"Eu imaginei que diria isso.\""
10012070-19 = "Ahaha, é uma troca de turnos, entende?"
10012070-20 = "Ahaha, é uma troca de turnos, entende?"
10012070-21 = "Eu fiquei vigiando enquanto o Sensei dormia, então agora é a vez do Sensei."
10012070-22 = "Esta velha aqui vai tirar uma soneca agora."
10012070-23 = "Uhe... que tal a gente ir encontrar as outras daqui a pouco?"
10012070-24 = "Antes disso, se parecer que elas estão vindo, me acorde primeiro…… é uma promessa, Sensei~"
10012070-30 = "……zzz."
10012070-31 = "[s5] \"……Durma bem, Hoshino.\"\n[s6] \"Certo. Vou te acordar na hora certa.\""
10012070-32 = "Sim, sim…… funya……."
10012070-33 = "Sim, sim…… funya……."
10012070-35 = "（Depois disso, fiquei um tempo olhando para o mar, aproveitando as férias……）"
10012070-36 = "（O almoço estava se aproximando）"
10012070-38 = "[ns7] Chamo a Hoshino suavemente.\n[ns8] \"Está na hora de acordar, Hoshino.\""
10012070-39 = "Umm…… Sensei…… só mais 5 minutos…… só 5 minutos……."
10012070-40 = "Umm…… Sensei…… só mais 5 minutos…… só 5 minutos……."
