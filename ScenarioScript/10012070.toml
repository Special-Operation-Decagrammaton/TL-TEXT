10012070-86 = "iniciando."
10012070-91 = "……Eh."
10012070-95 = "……Sensei, você está vendo aquilo? Ali perto……."
10012070-96 = "Aquilo é uma boia…… ou é grande demais para ser uma?"
10012070-97 = "……Não está vindo na nossa direção?"
10012070-98 = "Aquilo…… não, aquela pessoa é……."
10012070-100 = "……Ah."
10012070-102 = "Ah…… finalmente pude te encontrar! Você estava aí, Sensei!!"
10012070-103 = "Eu, Wakamo, vim para te buscar! Aguente firme só mais um pouco!"
10012070-111 = "……Uau."
10012070-115 = "É ali! Naquela praia!!"
10012070-119 = "……Hã!?"
10012070-120 = "O, o que exatamente está acontecendo ali!?"
10012070-121 = "Por que eles estão usando um aerodeslizador……!?"
10012070-123 = "Acho que esse é todo o poder de fogo deles."
10012070-124 = "Eu estava me perguntando por que não os via há um tempo……."
10012070-125 = "O que você está fazendo? Temos que ir logo! Se continuar assim, o sistema de defesa do resort não vai aguentar por muito tempo!"
10012070-136 = "J-já está começando a desmoronar…… além disso, a diferença de poder é grande demais……."
10012070-137 = "É por isso que temos que ir logo! Você pretende ficar só olhando!?"
10012070-138 = "N-não é isso…… estamos enfrentando máquinas gigantescas. Se formos, precisamos nos preparar bem……!"
10012070-147 = "……Máquinas gigantescas?"
10012070-148 = "……Ayane?"
10012070-149 = "Agora que você mencionou…… nós também temos máquinas gigantescas!"
10012070-150 = "Não posso dizer que estão totalmente consertadas, mas……"
10012070-151 = "Acho que pelo menos vale a pena tentar!"
10012070-153 = "……Hum, Ayane-chan? Tentar o quê……."
10012070-154 = "……Entendi~☆"
10012070-155 = "Falando nisso, nós quase terminamos os reparos, não foi?"
10012070-156 = "Hmm, boa decisão."
10012070-157 = "Sim, sim! Graças ao fato de a Ayane-chan ter consertado tudo desde cedo, já está quase pronto."
10012070-158 = "Com isso, será fácil alcançá-los!"
10012070-159 = "E também havia muitas armas utilizáveis no hangar……."
10012070-163 = "Já que estamos consertando…… que tal fazermos algumas pequenas modificações?"
