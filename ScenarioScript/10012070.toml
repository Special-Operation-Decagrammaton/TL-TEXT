10012070-45 = "[ns] \"……?\""
10012070-47 = "Ativando sistema de segurança do resort. Movimentação de embarcações armadas não autorizadas detectada na região."
10012070-48 = "Prezados clientes, por favor, evacuem imediatamente para dentro das instalações. Repetindo. Por favor, evacuem imediatamente para dentro das instalações."
10012070-49 = "Uau, é a primeira vez que ouço esse alarme……."
10012070-50 = "Sistema de defesa do resort ativado. Abrindo comportas de artilharia."
10012070-52 = "……U-uh?"
10012070-53 = "……Q-que…… que barulho é esse……?"
10012070-54 = "……Sensei, que situação é essa……?"
10012070-55 = "Canhões e metralhadoras estão saindo de todos os cantos da ilha……"
10012070-56 = "[s9] \"Eu também não faço ideia.\"\n[s10] \"Parece que algo nos atacou.\""
10012070-57 = "Atacou……? O que, afinal……."
10012070-58 = "Atacou……? O que, afinal……."
