[translation]
10012070-1 = "第7話;飛来する浮き輪"
10012070-4 = "（……いつの間にか日が昇り、朝になっていた）"
10012070-5 = "（横になっていた地面が段々熱をもってきて、目が覚めた）"
10012070-6 = "……おっ、先生起きた～？"
10012070-7 = "もうすぐお昼だよ～お寝坊さんだね。昨日遅く寝たからかな？"
10012070-8 = "それとも休みの日はいつもこう？"
10012070-9 = "[s1] \"……ホシノ？\"\n[s2] \"他のみんなは？\""
10012070-10 = "まだ眠そうだねぇ～"
10012070-11 = "ん？えっとね……"
10012070-12 = "みんなヘリを直しに行ったんだ。結構、手間がかかる作業だからさ。"
10012070-13 = "……ああ、私？"
10012070-14 = "おじさんは先生を守るという重大な任務を任されたのさ。警備システムは稼働してるけど、念のため、ね。"
10012070-15 = "……動きたくないからじゃないよ？"
10012070-16 = "さて、先生も起きたし……。"
10012070-17 = "……次は私が寝る番だね～"
10012070-18 = "[s3] \"重大な任務は！？\"\n[s4] \"そう言うと思ってたよ。\""
10012070-19 = "あはは、役割交代ってことだよ。"
10012070-20 = "あはは、役割交代ってことだよ。"
10012070-21 = "先生が寝てる間私が見張ってたからね、今度は先生の番。"
10012070-22 = "おじさんは今からちょっと一眠りするからさ。"
10012070-23 = "うへ……もう少ししたらみんなのとこに行くってことで、どうかな？"
10012070-24 = "その前にみんなが来そうなときは、先に起こしてね……約束だよ、先生～"
10012070-30 = "……zzz。"
10012070-31 = "[s5] \"……おやすみ、ホシノ。\"\n[s6] \"うん。いいタイミングで起こすね。\""
10012070-32 = "うんうん……ふにゃ……。"
10012070-33 = "うんうん……ふにゃ……。"
10012070-35 = "（それからしばらく、ボーっと海を眺めながらバカンスを満喫し……）"
10012070-36 = "（お昼が近づいてきた）"
10012070-38 = "[ns7] ホシノにそっと声をかける。\n[ns8] \"そろそろ起きる時間だよ、ホシノ。\""
10012070-39 = "う～ん……先生……あと5分……5分だけ……。"
10012070-40 = "う～ん……先生……あと5分……5分だけ……。"
10012070-41 = "[s] \"ホシノ、起き……。\""
10012070-45 = "[ns] \"……？\""
10012070-47 = "リゾート警備システムノ活性化、地域内ニ、許可サレテナイ、武装船舶ノ、動キヲ感知シマシタ。"
10012070-48 = "オ客様、ハ、速ヤカニ、屋内ニ避難シテ、クダサイ。繰リ返シマス。速ヤカニ、屋内ニ避難シテ、クダサイ。"
10012070-49 = "う～ん、初めて聞くアラームだね……。"
10012070-50 = "リゾート防御システム稼動。砲門ヲ開放、シマス。"
10012070-52 = "……う、うん？"
10012070-53 = "……な、なに……何の音……？"
10012070-54 = "……先生これ、どういう状況……？"
10012070-55 = "島のあちこちから大砲とか機関銃が飛び出してるんだけど……"
10012070-56 = "[s9] \"私にもよく分からない。\"\n[s10] \"何かが攻め込んできたみたい。\""
10012070-57 = "攻め込んで……？いったい、何が……。"
10012070-58 = "攻め込んで……？いったい、何が……。"
10012070-64 = "<System Message>"
10012070-66 = "警告。リゾート管轄、"
10012070-69 = "<System Message>"
10012070-70 = "警告。リゾート管轄、地域、"
10012070-73 = "警告。リゾート管轄、地域、ガ、"
10012070-76 = "警告。リゾート管轄、地域、ガ、攻撃サレテ、"
10012070-79 = "警告。リゾート管轄、地域、ガ、攻撃サレテ、イマス。"
10012070-82 = "<System Message>"
10012070-84 = "迎撃、ヲ、"
10012070-86 = "始メマス。"
10012070-91 = "……え。"
10012070-95 = "……先生、あれ見える？あの辺に……。"
10012070-96 = "浮き輪……にしてはちょっと大きい？"
10012070-97 = "……こっちに向かってない？"
10012070-98 = "あれ……いや、あいつは……。"
10012070-100 = "……あ。"
10012070-102 = "嗚呼……やっとお会いできました！そこにいらっしゃったのですね、先生！！"
10012070-103 = "このワカモが、あなた様をお迎えに上がりました！今しばらくの辛抱ですよ！"
10012070-111 = "……わお。"
10012070-115 = "あそこです！あの海辺！！"
10012070-119 = "……はっ！？"
10012070-120 = "あ、あれは一体どういう状況なんですか！？"
10012070-121 = "どうしてホバークラフトを……！？"
10012070-123 = "たぶんあれが、向こうの全兵力みたいだね。"
10012070-124 = "なんだかしばらく見ないなぁって思ったら……。"
10012070-125 = "何してんのよ、早く行かなきゃ！あのままじゃリゾート防御システムも長く持たないわよ！"
10012070-136 = "も、もう崩れ始めてる……それに、あまりにも戦力の差が……。"
10012070-137 = "だから早く行かないと！このまま見てるだけのつもり！？"
10012070-138 = "そ、そんな事は……あんな大型の機械を相手にするんです。行くならしっかり準備しないと……！"
10012070-147 = "……大型の機械？"
10012070-148 = "……アヤネ？"
10012070-149 = "そういえば……大型の機械ならこちらにもあります！"
10012070-150 = "まだ完全に直ったとは言えないですが……"
10012070-151 = "少なくとも試してみる価値はあると思います！"
10012070-153 = "……えっと、アヤネちゃん？試すって、何を……。"
10012070-154 = "……なるほど～☆"
10012070-155 = "そういえば、私たちほとんど修理終わってましたよね？"
10012070-156 = "ん、良い判断。"
10012070-157 = "うんうん！アヤネちゃんが朝早くから修理してくれてたおかげで、もうほとんど終わってますし。"
10012070-158 = "これなら追いつくことも簡単です！"
10012070-159 = "ちょうど格納庫には使える武器も多かったですし……。"
10012070-163 = "修理ついでに……ちょっとだけ、手を加えてみましょうか？"
