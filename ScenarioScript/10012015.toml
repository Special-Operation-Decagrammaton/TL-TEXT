[translation]
10012015-2 = "あいたたた……。"
10012015-3 = "みんな大丈夫？怪我はない？"
10012015-4 = "うん……アヤネも無事。"
10012015-5 = "あ、ありがとうございます、シロコ先輩。"
10012015-6 = "せ、先生……！？先生は大丈夫なの！？"
10012015-12 = "よいしょっと……みなさん無事ですよ～"
10012015-13 = "うへ～……もう着いたの？起こし方が乱暴じゃない～？"
10012015-14 = "ノノミ先輩！ホシノ先輩！"
10012015-15 = "[s1] \"ありがとう。皆のおかげで無事だよ。\"\n[s2] \"心配してくれてありがとう、セリカ\""
10012015-16 = "ふふっ、どういたしまして～"
10012015-17 = "なっ！だ、誰が心配なんか……！ただ聞いただけよ！"
10012015-18 = "みんな無事でよかった。誰か怪我でもしてたら、おじさん泣いてたよ～。"
10012015-20 = "……幸い、水着も無事だった。"
10012015-21 = "この状況で気にするポイントそこ！？"
10012015-22 = "い、いやまぁ。着替え持ってきてないから、破れたら困るけど……。"
10012015-23 = "[s3] \"せっかくの水着が汚れなくてよかった。\"\n[s4] \"怪我がなくてよかった。\""
10012015-24 = "……本当？"
10012015-25 = "……本当？"
10012015-26 = "も、もう！すぐそういう事言う……。"
10012015-32 = "[ns] \"……アヤネ？\""
10012015-33 = "な、何でもありません……！怪我人がいなくてよかったです。"
10012015-34 = "とりあえず、目的の島には着きましたね。"
10012015-35 = "ただ、乗ってきたヘリは……"
10012015-36 = "……ん。これはしばらく乗れそうにないね。"
10012015-37 = "修理すれば動かせるだろうけど……時間が必要。"
10012015-38 = "すみません。私がもう少しうまく運転できていたら……"
10012015-40 = "運転とは関係なく急に壊れたんだから、アヤネちゃんが謝ることじゃないわよ。"
10012015-41 = "出発前の整備の時だって異常がないか何度も点検したし……"
10012015-42 = "それなのに急に壊れちゃったんだから……こんなの、誰の責任でもないわよ！"
10012015-43 = "もし責任があるとしたら売ったやつらよ。だからアヤネちゃんが気にすることじゃないわ。"
10012015-44 = "そ、それは……。"
10012015-45 = "[s5] \"セリカの言う通り、アヤネのせいじゃないよ。\"\n[s6] \"まずはリゾートへ行こう。もしかしたら修理する方法があるかもしれないし。\""
10012015-46 = "先生まで……ありがとうございます。"
10012015-47 = "先生まで……ありがとうございます。"
10012015-48 = "リゾートに行けば……何か、方法が見つかりますよね？"
10012015-50 = "うんうん！急がば回れ！です。"
10012015-51 = "パンフレットによれば、ものすごくリッチで大きなリゾートらしいので、部品や整備できる人もいるかもしれません。"
10012015-52 = "……先生は大丈夫？さっきちょっとふらついてたけど……。"
10012015-53 = "[s] \"大丈夫、心配しないで。\""
10012015-55 = "……みんなたくましく育ったねぇ。おじさんは嬉しいよ。"
10012015-56 = "ところで、せっかくの空気に水を差すようで悪いんだけどさ……。"
10012015-57 = "その……みんなが言ってる「ものすごくリッチで大きなリゾート」って……"
10012015-58 = "あれのこと……？"
10012015-65 = "何よあれーーーー！？！？！？"
10012015-66 = "こ、これ何？本当にここで合ってるの？"
10012015-67 = "ここも……。"
10012015-69 = "ここも……！！"
10012015-71 = "……全部、ただの廃墟じゃない！人っ子一人いないし！！"
10012015-73 = "ねえ、違う島に来たんじゃないの？本当にここなの？"
10012015-74 = "……いや。座標上、確かにここで合ってる。"
10012015-75 = "どうみても「リゾート」と呼ぶには無理がありますが……。"
10012015-76 = "これじゃあまるで……"
10012015-78 = "……あ。"
10012015-79 = "うへー……そっか、そういうことかぁ。"
10012015-85 = "な、なに？どうしたの？何か分かったの？"
10012015-86 = "……えっとね、セリカちゃん。"
10012015-87 = "私たちが当たったリゾート利用券……この「土地」の利用権だったみたい。"
10012015-88 = "ほら、ここに小さく……「チケットを所有する者にリゾート地を利用する権利を与えるものとする。当該地の状態については保証いたしかねます」って……。"
10012015-89 = "ちょっと待って…………これって詐欺よね！？"
10012015-90 = "そんな……信じらんない……"
10012015-91 = "景品がお金じゃなくても前向きに……いい機会だからゆっくりしようって……"
10012015-92 = "そう思ったのに……どうしてこんな……。"
10012015-93 = "……悔しい、私たちが何したっていうのよ……。"
10012015-94 = "セリカちゃん……。"
10012015-96 = "…………。"
10012015-97 = "……くすん。"
10012015-98 = "[s7] \"……まだ諦めるには早いよ。\"\n[s8] \"むしろ今からがスタートかもしれないよ。\""
10012015-99 = "……先生？"
10012015-100 = "……先生？"
10012015-101 = "うんうん！先生の言う通りですよ、セリカちゃん！"
10012015-102 = "想像とはちょっと違うけど、空気も水も綺麗な島に来たのは事実ですし！"
10012015-103 = "遊ぶための道具は揃ってますから、思いっきりバカンスを楽しみましょう～！"
10012015-104 = "ん。持ってきた備品は全部無事だったから、ヘリから取ってくればいいよ。"
10012015-105 = "あと、さっき倉庫とか設備を確認してきたんだけど……状態は良好だったよ。"
10012015-106 = "ちょっと古くて錆びてたり、ホコリを被ってるだけだし。手入れしたら全然使える。"
10012015-108 = "ノノミ先輩……シロコ先輩。"
10012015-109 = "……そうだよセリカちゃん。まだ諦めるには早いよ！"
10012015-110 = "ここがリゾート地なことに変わりはないし……"
10012015-111 = "ヘリもリゾートも、私たちが修理すればいいんだよ。"
10012015-112 = "設備の修理は慣れっこだしね！前向きにいこうよ、セリカちゃん。"
10012015-114 = "ん。設備の補修や整備は、私たちアビドス高等学校の十八番。"
10012015-115 = "うんうん！この広いリゾート地と無人島が、ぜーんぶ私たちの物になったってことですよ！"
10012015-116 = "どう楽しむかは、これからの私たちにかかってるんです！"
10012015-117 = "アヤネちゃんの言う通り、これから最高の休暇を過ごせばいいだけですからね☆"
10012015-118 = "うへ……おじさんも頑張るかぁ。"
10012015-120 = "みんな……。"
10012015-121 = "[s9] \"まだ泣くのは早いよ、セリカ。\"\n[s10] \"泣くのはいろいろ試した後でも遅くないよ。\""
10012015-127 = "……だ、誰が泣いてるって！？"
10012015-128 = "……ああもう、覚悟しなさいよ！！こうなったら思いっきり遊んでやる！！"
10012015-129 = "私は絶対に諦めないわよ！ここで「最高の休暇」を過ごしてやるんだから！！"
10012015-132 = "おーー！！"
