[translation]
10012015-2 = "Ai, ai, ai..."
10012015-3 = "Estão todos bem? Alguém se machucou?"
10012015-4 = "Sim... Ayane também está bem."
10012015-5 = "M-muito obrigada, Shiroko-senpai."
10012015-6 = "P-Professor...!? O Professor está bem!?"
10012015-12 = "Eita... está tudo bem com vocês, pessoal~"
10012015-13 = "Uhe~... Já chegamos? Não podia ter me acordado de um jeito menos bruto?"
10012015-14 = "Nonomi-senpai! Hoshino-senpai!"
10012015-15 = "[s1] \"Obrigado. Graças a vocês, estou bem.\"\n[s2] \"Obrigado por se preocupar, Serika.\""
10012015-16 = "Fufu, de nada~"
10012015-17 = "O quê! Q-quem disse que eu estava preocupada...!? Eu só perguntei!"
10012015-18 = "Que bom que estão todos bem. Se alguém tivesse se machucado, o tio aqui ia chorar~."
10012015-20 = "...Felizmente, o traje de banho também está intacto."
10012015-21 = "É nisso que você está pensando nessa situação!?"
10012015-22 = "B-bem, é que... eu não trouxe roupa reserva, então seria um problema se rasgasse..."
10012015-23 = "[s3] \"Que bom que o traje de banho não sujou.\"\n[s4] \"Que bom que ninguém se machucou.\""
10012015-24 = "...É verdade?"
10012015-25 = "...É verdade?"
10012015-26 = "A-ah, chega! Você sempre diz essas coisas..."
10012015-32 = "[ns] \"...Ayane?\""
10012015-33 = "N-não é nada...! Fico feliz que ninguém tenha se ferido."
10012015-34 = "De qualquer forma, chegamos à ilha de destino."
10012015-35 = "Mas, o helicóptero que viemos..."
10012015-36 = "...Hum. Não vai dar para usar isso por um bom tempo."
10012015-37 = "Daria para consertar se reparássemos, mas... vai levar tempo."
10012015-38 = "Desculpem-me. Se eu tivesse pilotado um pouco melhor..."
10012015-40 = "Não teve nada a ver com a pilotagem, ele quebrou do nada, então não é culpa sua, Ayane-chan."
10012015-41 = "Nós verificamos várias vezes se havia alguma anormalidade durante a manutenção antes de partir..."
10012015-42 = "E mesmo assim ele quebrou de repente... isso não é culpa de ninguém!"
10012015-43 = "Se alguém tem culpa, é de quem nos vendeu isso. Então não se preocupe, Ayane-chan."
10012015-44 = "I-isso é..."
10012015-45 = "[s5] \"Como a Serika disse, não é sua culpa, Ayane.\"\n[s6] \"Vamos primeiro ao resort. Talvez encontremos um jeito de consertar lá.\""
10012015-46 = "Até o Professor... muito obrigada."
10012015-47 = "Até o Professor... muito obrigada."
10012015-48 = "Se formos ao resort... encontraremos um jeito, não é?"
10012015-50 = "Sim, sim! Quem tem pressa, vai devagar!"
10012015-51 = "De acordo com o panfleto, é um resort enorme e muito luxuoso, então talvez tenham peças ou alguém que saiba fazer manutenção."
10012015-52 = "...Professor, você está bem? Você cambaleou um pouco agora há pouco..."
10012015-53 = "[s] \"Estou bem, não se preocupe.\""
10012015-55 = "...Todos cresceram e se tornaram tão fortes. O tio aqui está feliz."
10012015-56 = "Mas, desculpe estragar o clima, mas..."
10012015-57 = "Aquele... "resort enorme e muito luxuoso" que vocês tanto falam..."
10012015-58 = "É aquilo ali...?"
10012015-65 = "O QUE É AQUILOOOOO!?!?"
10012015-66 = "Q-que isso? Será que viemos ao lugar certo mesmo?"
10012015-67 = "Aqui também..."
10012015-69 = "Aqui também...!!"
10012015-71 = "...Está tudo em ruínas! Não tem uma alma viva aqui!!"
10012015-73 = "Ei, será que não viemos para a ilha errada? É aqui mesmo?"
10012015-74 = "...Não. Pelas coordenadas, é aqui mesmo."
10012015-75 = "Não importa como você olhe, é um exagero chamar isso de \"resort\"..."
10012015-76 = "Isso é praticamente..."
10012015-78 = "...Ah."
10012015-79 = "Uhee... Entendi, então é isso."
10012015-85 = "Q-que foi? O que aconteceu? Você descobriu alguma coisa?"
10012015-86 = "...Bem, Serika-chan."
10012015-87 = "O voucher de resort que ganhamos... parece que era o direito de uso desta \"terra\"."
10012015-88 = "Olha, aqui diz em letras miúdas... \"O portador do bilhete tem o direito de utilizar a área do resort. Não nos responsabilizamos pelas condições do local\"..."
10012015-89 = "Espera um pouco... isso é um golpe, não é!?"
10012015-90 = "Não pode ser... inacreditável..."
10012015-91 = "Mesmo que o prêmio não fosse dinheiro, eu tentei ser positiva... pensando que seria uma boa oportunidade para relaxar..."
10012015-92 = "Eu pensei isso, mas... por que algo assim..."
10012015-93 = "...Que frustrante, o que foi que a gente fez de errado..."
10012015-94 = "Serika-chan..."
10012015-96 = "............"
10012015-97 = "...Snif."
10012015-98 = "[s7] \"...Ainda é cedo para desistir.\"\n[s8] \"Na verdade, talvez o começo seja agora.\""
10012015-99 = "...Sensei?"
10012015-100 = "...Sensei?"
10012015-101 = "Isso mesmo! O Sensei tem razão, Serika-chan!"
10012015-102 = "É um pouco diferente do que imaginávamos, mas é um fato que viemos para uma ilha com ar e água limpos!"
10012015-103 = "Temos todos os equipamentos para brincar, então vamos aproveitar as férias ao máximo!"
10012015-104 = "Hum. Os suprimentos que trouxemos estão intactos, é só pegar no helicóptero."
10012015-105 = "Além disso, verifiquei o depósito e as instalações agora há pouco... o estado delas é bom."
10012015-106 = "Estão só um pouco velhas, enferrujadas ou empoeiradas. Se a gente cuidar, dá para usar tranquilamente."
10012015-108 = "Nonomi-senpai... Shiroko-senpai."
10012015-109 = "...É isso mesmo, Serika-chan. Ainda é cedo para desistir!"
10012015-110 = "Não muda o fato de que aqui é um resort..."
10012015-111 = "O helicóptero e o resort, nós mesmas podemos consertar."
10012015-112 = "Já estamos acostumadas a consertar instalações, né! Vamos ser positivas, Serika-chan."
10012015-114 = "Hum. Reparos e manutenção de instalações são a nossa especialidade na Escola Abydos."
10012015-115 = "Isso mesmo! Significa que este resort enorme e a ilha deserta se tornaram todinhos nossos!"
10012015-116 = "Como vamos aproveitar depende só de nós daqui para frente!"
10012015-117 = "Como a Ayane-chan disse, só precisamos passar as melhores férias a partir de agora, né!☆"
10012015-118 = "Uhee... Acho que o tio aqui também vai se esforçar."
10012015-120 = "Pessoal..."
10012015-121 = "[s9] \"Ainda é cedo para chorar, Serika.\"\n[s10] \"Não é tarde demais para chorar depois de tentar várias coisas.\""
10012015-127 = "...Q-quem disse que eu estou chorando!?"
10012015-128 = "...Ah, quer saber, se preparem!! Já que chegamos a esse ponto, vou aproveitar ao máximo!!"
10012015-129 = "Eu não vou desistir de jeito nenhum! Vou passar as \"melhores férias\" aqui, custe o que custar!!"
10012015-132 = "Oooooh!!"
