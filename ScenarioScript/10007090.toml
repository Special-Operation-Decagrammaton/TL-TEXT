[translation]
10007090-1 = "Episódio 9; Demolição, vamos demolir!"
10007090-4 = "Uuu, a escavadeira... o sonho de um grande resort de águas termais...!"
10007090-10 = "Bando de idiotas da Gehenna, como se atrevem a tentar fazer uma bagunça dessas dentro do distrito autônomo da Academia Federal Red Winter..."
10007090-11 = "Saibam que esse crime não seria compensado nem com cem expurgos!"
10007090-12 = "Oh, como esperado, você é realmente digna de ser meu braço direito, Marina! Que eficiência maravilhosa!"
10007090-13 = "Reconhecendo o mérito de ter lidado perfeitamente com esses elementos perturbadores que ameaçavam a paz da Academia Federal Red Winter... vou lhe conceder especialmente a 'Medalha de Bravura de 1º Grau do Bigode'!"
10007090-14 = "Muito obrigada, Presidente. Eu, Marina, continuarei a servir com total lealdade à senhora."
10007090-15 = "Hum, essa é uma boa resposta."
10007090-16 = "Bem, agora só falta demolir este resort de águas termais."
10007090-17 = "É um desperdício demolir um resort tão magnífico, mas... já que a água vai secar de qualquer jeito, é melhor desmontar os materiais e usá-los para fazer uma estátua minha."
10007090-19 = "Muito bem, 'Expurgador nº 1'! Comece a demolição――"
10007090-24 = "……O que vocês vão demolir?"
10007090-25 = "Oh, ex-gerente. Chegou na hora certa."
10007090-30 = "As alunas do Departamento de Desenvolvimento de Águas Termais e muitos membros da guarda da Secretaria..."
10007090-31 = "O que está acontecendo aqui?"
10007090-32 = "Humpf. Esses idiotas da Gehenna estavam tentando explodir toda a área da Academia Federal Red Winter para evitar que as águas termais secassem. Que gente absurda."
10007090-33 = "A água do resort... vai secar...?"
10007090-34 = "Sim, exatamente. Não é uma história terrível, tentar explodir toda a Red Winter, incluindo a Secretaria, por um motivo tão fútil?"
10007090-35 = "Mas não se preocupe. O plano maligno deles já foi eliminado por mim e pelos valentes membros do Comitê de Segurança da Secretaria!"
10007090-36 = "Então... o que vai acontecer com o 'Resort de Águas Termais nº 227'?"
10007090-37 = "Bem... se a água secar, não dá para continuar operando, certo? Não teremos escolha a não ser fechar, não é?"
10007090-38 = "Ah, está preocupada com a limpeza? Não se preocupe, nós vamos demolir esses prédios aqui de forma bem organizada."
10007090-39 = "Quanto às pedras e madeiras de alta qualidade que sobrarem, seria um desperdício jogá-las fora, então vou transformá-las em uma estátua que mostre a minha grandeza e exibi-la em frente à Secretaria! Tenho certeza de que as pedras ficarão orgulhosas, hahaha! Problema resolvido!"
10007090-43 = "……Não."
10007090-45 = "Eu não vou permitir isso de jeito nenhum!!"
10007090-47 = "O-o que foi isso!? Gritando de repente, quase me assustei e caí..."
10007090-48 = "Com que direito a Presidente vai demolir este resort de águas termais!?"
10007090-49 = "Ora, obviamente porque eu sou a Presidente do Conselho Estudantil da Academia Federal Red Winter, Secretária-Geral, Chefe do Departamento de Embelezamento Ambiental... e, acima de tudo, a pessoa mais importante aqui, não é?"
10007090-50 = "Só porque é importante, pode fazer o que quiser!? Quando estávamos tremendo de frio no prédio antigo sem nem um pedaço de lenha, a Presidente não fez nada por nós, não foi!?"
10007090-51 = "I-isso é..."
10007090-52 = "Mesmo que tenha sido construído por um clube da Gehenna, para nós, este é um resort de águas termais muito precioso!"
10007090-53 = "Foi uma felicidade que conquistamos com tanto esforço...! Era a nossa única esperança...!"
10007090-54 = "E agora, até isso querem tirar de nós à força...!"
10007090-55 = "Sua baixinha! Bigode falso! Espero que você pare de crescer nos 128cm para sempre!!"
10007090-56 = "Q-que tipo de insulto é esse contra mim, a autoridade máxima da Academia Federal Red Winter...!"
10007090-58 = "V-você não tem medo do meu poder!?"
10007090-59 = "Mesmo que a Presidente me expurgue aqui, eu só voltarei para a vida no prédio antigo! Não tenho medo de nada!"
10007090-60 = "Eu não vou perdoar... uma Presidente que faz esse tipo de coisa..."
10007090-61 = "Eu nunca, nunca vou perdoar!"
10007090-62 = "Snif..."
10007090-68 = "Hum... Nodoka-chan, aconteceu alguma coisa?"
10007090-69 = "……Se for para dizer algo, talvez a 'fermentação' do morus que entreguei antes tenha avançado mais do que eu pensava."
10007090-70 = "……Mas a Nodoka só bebeu um copo. Então..."
10007090-73 = "Uuu, já que chegou a esse ponto...!"
10007090-75 = "Eu pretendia apenas demolir este lugar e perdoar vocês sem expurgos, em consideração àquele delicioso bolinho de águas termais, mas..."
10007090-77 = "Isso é um crime de insulto à autoridade máxima de Red Winter, vou expurgar vocês! Vocês da classe especial também terão a distribuição mensal de pudim com água cortada!"
10007090-78 = "Você acha que esse tipo de ameaça ainda funciona?"
10007090-79 = "Se a Presidente insiste em continuar assim, nós também temos um plano!"
10007090-84 = "Minori-san!"
10007090-86 = "Hum, nos chamou?"
10007090-87 = "É um pedido. Com os lucros que ganhamos na estância termal, vou contratar vocês diretamente!"
10007090-92 = "Aqui estão 1 milhão de ienes! Pagamento adiantado!"
10007090-93 = "E-espere, Nodoka. Isso é todo o dinheiro que temos..."
10007090-94 = "Se perdermos esta estância termal, nada disso fará sentido de qualquer forma!"
10007090-95 = "Sendo assim, é melhor fazer isso agora...!"
10007090-96 = "Certo, recebido. Aceitaremos o pedido. E então... o que nós do Departamento de Engenharia devemos fazer?"
10007090-97 = "Expulsem essa baixinha ditadora idiota e seus capangas da estância termal!"
10007090-98 = "Bem, se é um pedido, não temos escolha."
10007090-99 = "Entendido, vamos começar imediatamente!"
10007090-100 = "Pessoal, temos um novo trabalho!"
10007090-101 = "A partir de agora, vamos nos juntar à Classe Especial 227 para expulsar aquela presidente Cherino atrevida! Como trabalhadores, somos terminantemente contra o roubo do nosso local de trabalho!"
10007090-104 = "Revolução! É a revolução!"
10007090-106 = "Guh, a Classe Especial 227 e o Departamento de Engenharia se uniram...?"
10007090-107 = "V-vocês acham que eu teria medo só porque o número de vocês aumentou!?"
10007090-108 = "...Marina!"
10007090-109 = "Exploda aquela força rebelde que se opõe a mim, junto com a estância termal!"
10007090-110 = "Muito bem, é hora do desfile de expurgo!"
