[translation]
10007090-1 = "第9話;撤去だ、撤去！"
10007090-4 = "うう、掘削機が……大型温泉郷の夢がぁ……！"
10007090-10 = "ゲヘナのバカ共め、よくもレッドウィンター連邦学園の自治区内で無茶苦茶なことをしようとしたな……。"
10007090-11 = "その罪は、百回粛清されても償えないと思え！"
10007090-12 = "おおっ、やはりおいらの右腕に相応しい素晴らしい手際だな、マリナ！"
10007090-13 = "レッドウィンター連邦学園の安寧を脅かす、この不穏分子を見事に処理した功績を認め……特別に、「1級髭勇猛武勲章」を授与してやろう！"
10007090-14 = "ありがとうございます、会長。不肖マリナ、会長のために今後もさらに忠誠を尽くしてまいります。"
10007090-15 = "うむ、良い返事だ。"
10007090-16 = "さて、あとはこの温泉郷を撤去するだけか。"
10007090-17 = "こんな立派な温泉郷を撤去するのはもったいないが……どうせ温泉が枯れるなら資材を解体して、おいらの彫像を作るのにでも使った方が良いだろう。"
10007090-19 = "よし、「粛清君1号」！撤去を――"
10007090-24 = "……何を、撤去するんですか？"
10007090-25 = "おお、元支配人。ちょうど良いところに来たな。"
10007090-30 = "温泉開発部の生徒たちと、事務局の親衛隊がたくさん……"
10007090-31 = "これはどういう状況？"
10007090-32 = "ふん。このゲヘナのバカどもが温泉を枯れさせないために、レッドウィンター連邦学園一帯を丸ごと爆破しようとしていたのだ。とんでもないやつらめ。"
10007090-33 = "温泉郷のお湯が、枯れる……？"
10007090-34 = "ああ、そうだ。そんなくだらない理由で、事務局を含むこのレッドウィンター全体を吹き飛ばそうとするなんて、酷い話だろう？"
10007090-35 = "だが心配するな。こいつらの邪悪な計画はおいらと、事務局の勇猛な保安委員たちが既に一掃したからな！"
10007090-36 = "それで……「227号温泉郷」は、どうなるんですか？"
10007090-37 = "それは……お湯が枯れたら営業できないだろう？廃業するしかないんじゃないか？"
10007090-38 = "ああ、もしかして後片付けを心配しているのか？それなら大丈夫だ、おいらたちがここらの建物を綺麗に撤去するからな。"
10007090-39 = "残った高級石材と木材については勿体ないことだし、おいらの偉大さを示す像へと生まれ変わらせて、事務局の前に展示することにしよう！きっと石材としても誇らしいだろう、ははは！これで全部解決だな！"
10007090-43 = "……せん。"
10007090-45 = "そんなこと、絶対に認めません！！"
10007090-47 = "な、何だなんだ！？急に叫んで、危うくびっくりして転ぶところだったではないか……。"
10007090-48 = "会長は何の権利があって、この温泉郷を撤去するんですか！？"
10007090-49 = "それは当然、おいらがレッドウィンター連邦学園の生徒会長であり、書記長であり、環境美化部部長であり……とにかく、一番偉いからだが？"
10007090-50 = "偉かったら何をしても良いんですか！？会長は私たちが旧校舎で薪ひとつ無く震えていた時にだって、何もしてくれなかったじゃないですか！？"
10007090-51 = "そ、それはだな……。"
10007090-52 = "いくらゲヘナの部活が建設した温泉だとはいえ、私たちにとっては大切な温泉郷なんですよ！"
10007090-53 = "せっかく、私たちがせっかく手に入れた幸せだったのに……！唯一の希望だったのに……！"
10007090-54 = "それすらも、強引に持って行こうするなんて……！"
10007090-55 = "このチビ！偽の髭！一生背が128cmで止まっちゃえ！！"
10007090-56 = "れ、レッドウィンター連邦学園で最高権力者であるおいらに、何たる暴言を……！"
10007090-58 = "お、おいらの力が怖くないのか！？"
10007090-59 = "たとえ会長にここで粛清されたとしても、元の旧校舎の生活に戻るだけです！何も怖くなんてありません！"
10007090-60 = "許しません……そんなことをする会長なんて……"
10007090-61 = "絶対、絶対に許しませんから！"
10007090-62 = "ぐすっ……。"
10007090-68 = "あの……ノドカちゃん、何かありましたか？"
10007090-69 = "……強いて言えば、さっき渡したモルスの「発酵」が思ったより進んでたのかも。"
10007090-70 = "……でも、ノドカは一杯しか飲んでないよ。だから……。"
10007090-73 = "ううっ、こうなったら……！"
10007090-75 = "あの美味しい温泉まんじゅうに免じてここを撤去をするだけで、粛清は無しのまま許してやろうと思っていたが……。"
10007090-77 = "レッドウィンターの最高権力を侮辱した罪だ、粛清してやる！お前たち特別クラスは、月に一度の水割りプリンの配給も中止だ！"
10007090-78 = "そんな脅しが、今さら通じるとでも？"
10007090-79 = "会長があくまでそう言い続けるなら、私たちにも考えがあります！"
10007090-84 = "ミノリさん！"
10007090-86 = "む、あたしたちを呼んだか？"
10007090-87 = "依頼です。温泉郷で稼いだ収益で、みなさんを直接雇用します！"
10007090-92 = "こちら100万円！全額前払いで！"
10007090-93 = "ま、待ってノドカ。それは私たちが持ってる全財産じゃ……。"
10007090-94 = "どうせこの温泉郷を失ったら、全部意味なんて無い！"
10007090-95 = "それならいっそのこと、今ここで……！"
10007090-96 = "よし、確かに受け取った。依頼は引き受けよう。それで……あたしたち工務部は何をすればいい？"
10007090-97 = "このバカな独裁者のチビとその手下たちを、温泉郷から追い払ってください！"
10007090-98 = "まあ、依頼なら仕方ない。"
10007090-99 = "了解した、すぐに取り掛かろう！"
10007090-100 = "みんな、新しい仕事だ！"
10007090-101 = "あたしたちは今から227号特別クラスと共に、あの生意気なチェリノ会長を追い出す！同じ労働者として、職場を奪うなんてことには断固反対だ！"
10007090-104 = "革命！革命だー！"
10007090-106 = "ぐっ、227号特別クラスと工務部が、手を組んだだと……？"
10007090-107 = "た、たかが数が増えただけで、おいらが怖がるとでも思ったか！？"
10007090-108 = "……マリナ！"
10007090-109 = "おいらに刃向かうあの反抗勢力を、温泉郷ごと吹き飛ばしてしまえ！"
10007090-110 = "さあ、粛清パレードの時間だ！"
