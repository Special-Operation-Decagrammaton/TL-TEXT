[translation]
10018050-1 = "Episódio 5; A conta, por favor"
10018050-2 = "Rua Comercial"
10018050-4 = "Bem-vindos, por favor, sirvam-se!"
10018050-5 = "É o novo menu do Suzume-tei! Estamos oferecendo uma degustação gratuita!"
10018050-6 = "Suzume-tei? Achei que vocês fossem fechar o restaurante em breve..."
10018050-7 = "B-bem, houve conversas sobre isso, mas...!"
10018050-8 = "Decidimos reabrir. Este é o nosso menu recém-criado."
10018050-9 = "Já que é assim, vou experimentar um..."
10018050-13 = "(...mastigando)"
10018050-17 = "Oh, isso está delicioso! Não que o Suzume-tei de antigamente fosse ruim, mas isso está ótimo!"
10018050-18 = "Tem bastante sabor! E a textura também melhorou!"
10018050-19 = "S-senpai! Que bom!"
10018050-20 = "Por favor, continuem apoiando o novo Suzume-tei!"
10018050-24 = "Se está gostoso assim mesmo frio... imagino o quão bom deve ser fresquinho..."
10018050-28 = "Nossa, fiquei tão distraído que quase esqueci da minha reunião de negócios!"
10018050-29 = "Por favor, vá logo! Estaremos esperando por você novamente."
10018050-35 = "Está gostoso."
10018050-36 = "É realmente gostoso, mas..."
10018050-37 = "Houve algum problema...?"
10018050-38 = "Quanto custa este prato?"
10018050-39 = "I-isso é...! Considerando o custo dos ingredientes e do transporte..."
10018050-40 = "Custa cerca de 900 ienes..."
10018050-41 = "Entendo... O dinheiro que posso gastar no almoço é 500, ou talvez 600 ienes no máximo..."
10018050-43 = "É, de fato, um pouco mais caro comparado aos outros restaurantes por aqui,"
10018050-44 = "mas o Suzume-tei sempre teve esses preços..."
10018050-45 = "É verdade. Talvez seja por isso que surgiram boatos de que o Suzume-tei ia fechar."
10018050-46 = "O sabor é bom, mas... com esse preço, não acho que conseguiria vir com frequência..."
10018050-48 = "Hum... por esse preço, talvez eu prefira pagar um pouco mais e comer em outro lugar."
10018050-49 = "Afinal, outros lugares oferecem pratos com sabores parecidos, não é?"
10018050-50 = "Claro, dá para perceber que foi feito com muito cuidado, mas..."
10018050-51 = "Veja bem, se é para gastar dinheiro, prefiro experimentar algo novo."
10018050-52 = "Mas, com os ingredientes que usamos no Suzume-tei, há um limite para a variedade..."
10018050-53 = "Isso é problema nosso?"
10018050-54 = "Você tem toda razão..."
10018050-57 = "...Entendo. Então, além do sabor, o preço também é um fator importante."
10018050-58 = "Que descuido o meu. Focamos tanto no sabor que negligenciamos a questão do preço."
10018050-61 = "Além disso, a porção também não foi suficiente."
10018050-62 = "Isso não é só você, Akari?"
10018050-63 = "Eu também achei pouco. Não é verdade que a porção é pequena?"
10018050-64 = "Uuu, mas o que podemos fazer? Os ingredientes do Piyo Mart são de boa qualidade, mas..."
10018050-66 = "Exatamente. Por causa disso, o aumento no preço é inevitável."
10018050-67 = "No entanto, as pessoas desta região estão acostumadas com os preços baixos da Nyao Food."
10018050-68 = "Para competir em preço, não temos escolha a não ser fazer o mesmo que eles."
10018050-69 = "Sim, isso significa que teremos que comprometer um pouco a qualidade..."
10018050-73 = "Eu não gosto nada disso."
10018050-74 = "[s] \"Não existe uma forma de equilibrar a quantidade e a qualidade?\""
10018050-75 = "Sim? Isso seria possível, Sensei?"
10018050-76 = "Entendo... Então vamos preparar um menu com preços mais acessíveis também."
10018050-77 = "De fato, podemos oferecer pratos do dia com preços razoáveis,"
10018050-78 = "enquanto mantemos um menu especial para os clientes fiéis, é isso."
10018050-79 = "Ao reduzir o menu, também podemos diminuir o trabalho no preparo..."
10018050-81 = "Não é uma má ideia, né? Eu também gosto de pratos feitos. A porção é na medida certa."
10018050-82 = "Eu gosto, parece merenda escolar★"
10018050-83 = "A merenda de Gehenna é ruim, mas o prato feito do Suzume-tei deve ser delicioso~!"
10018050-84 = "[s1] \"Reduzir a carga de trabalho da dona é importante para manter o negócio funcionando, né?\"\n[s2] \"A merenda não ser gostosa deve ter seus motivos, imagino...\""
10018050-88 = "Eu acho uma ótima opinião. Como esperado, valeu a pena termos chamado o Sensei."
10018050-89 = "Então, vamos selecionar os ingredientes para a linha de baixo custo?"
10018050-91 = "Considerando o preço, não temos escolha a não ser comprar nas lojas próximas, certo?"
10018050-92 = "Embora a Haruna talvez não aceite isso."
10018050-93 = "Ah, é verdade. Ela odeia fazer concessões, né!"
10018050-95 = "……Não, pelo menos desta vez."
10018050-96 = "Isso também é necessário para a sobrevivência do Suzume-tei. Estratégia de sobrevivência é outra história."
10018050-101 = "Já ouvi falar sobre isso, mas acho que podemos deixar as compras com a Juri."
10018050-103 = "Eh!?"
10018050-105 = "É tão surpreendente assim? Deixando outras coisas de lado, o olho da Juri para ingredientes é certeiro."
10018050-106 = "S-sim, é verdade! É vergonhoso dizer isso de mim mesma, mas eu estudei muito!"
10018050-107 = "Já que a única coisa em que eu podia ser útil era distinguindo os ingredientes..."
10018050-109 = "Entendo. Se você diz com tanta convicção..."
10018050-111 = "Então, Sensei?"
10018050-112 = "[s] \"Concordo. Pode acontecer alguma coisa, então eu vou acompanhar vocês.\""
10018050-113 = "Sim, contamos com você."
