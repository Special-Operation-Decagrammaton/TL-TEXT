[translation]
10018050-1 = "第5話;お会計をお願いします"
10018050-2 = "商店街"
10018050-4 = "いらっしゃいませ、どうぞ召し上がってください！"
10018050-5 = "スズメ亭の新メニューです！無料の試食会になります！"
10018050-6 = "スズメ亭だって？もうすぐ店を畳むって聞いたんだけどな……。"
10018050-7 = "そ、そういう話もあったんですが……！"
10018050-8 = "また再開することになりました。こちらが新しく考案したメニューです。"
10018050-9 = "そういうことなら、一つ頂こうか……。"
10018050-13 = "（……もぐもぐ）"
10018050-17 = "おぉ、これはおいしいね！いや、昔からのスズメ亭も良かったんだけどさ！"
10018050-18 = "コクがあるよ！それに食感も良くなったね！"
10018050-19 = "せ、先輩！良かったですね！"
10018050-20 = "新しいスズメ亭も応援お願いします！"
10018050-24 = "冷めた状態でこの味なら……出来立てはどれほどおいしいんだろうな……。"
10018050-28 = "いやあ、夢中になりすぎて取引先と商談があるのに忘れるところだった！"
10018050-29 = "それは急いでください！またお待ちしていますね。"
10018050-35 = "おいしい。"
10018050-36 = "確かにおいしいんだが……。"
10018050-37 = "何か問題でもありましたか……？"
10018050-38 = "この料理はいくらするんだい？"
10018050-39 = "そ、それは……！原材料費や運送費などを考慮すると……。"
10018050-40 = "900円くらい……になりますね。"
10018050-41 = "そうか……。お昼に使えるお金は500円、いや、出せて600円くらいかな……。"
10018050-43 = "た、確かに周りのお店と比べたら少し高いですが、"
10018050-44 = "もともとスズメ亭はこれくらいの料金でしたけれど……。"
10018050-45 = "そうだったな。いや、だからこそスズメ亭が廃業するとかいう話が出たのか。"
10018050-46 = "味は良かったんだが……その値段だと、あまり頻繁に通えそうにはないな……。"
10018050-48 = "うーん……その値段だったら、もう少し出して別の料理を食べに行っちゃうかもな。"
10018050-49 = "だって、他のお店でも似たような味の料理が出てくるだろう？"
10018050-50 = "もちろん、こだわって作られたんだってことは伝わってくるんだけど……。"
10018050-51 = "ほら、それにどうせお金を払うなら、新しい料理を食べてみたいじゃないか。"
10018050-52 = "ですが、スズメ亭で取り扱っている食材では、作れる種類に限界が……。"
10018050-53 = "それは私たちに関係あるのかな？"
10018050-54 = "確かに仰る通りです……。"
10018050-57 = "……なるほど。味だけでなく値段も重要という声があったのですね。"
10018050-58 = "不覚でした。味にこだわるあまり、価格の問題がおろそかになっていましたわ。"
10018050-61 = "あとは量も足りませんでしたね。"
10018050-62 = "それはアカリだけじゃないのかな？"
10018050-63 = "私も少し足りなかったよ。量が少ないのは事実じゃない？"
10018050-64 = "ううぅ、でもどうすればいいのかな？ピヨマートの食材は確かに質がいいけど……。"
10018050-66 = "そうですね。その分、価格の上乗せは避けられませんわ。"
10018050-67 = "しかし、この地域の人たちはニャオフードの低価格路線に慣れています。"
10018050-68 = "価格面で競うには、どうしても彼らと同じようにするしかありません。"
10018050-69 = "ええ、ある程度、品質には妥協するしかないということですが……。"
10018050-73 = "どうも私は気に入りませんわ。"
10018050-74 = "[s] \"量と質を両立する方法もあるんじゃないかな？\""
10018050-75 = "はい？そんなことが可能でしょうか、先生？"
10018050-76 = "なるほど……低価格路線のメニューも用意するのですね。"
10018050-77 = "確かにリーズナブルなメニューは定食に絞って提供しつつ、"
10018050-78 = "常連さん向けにこだわったメニューも用意するということですわね。"
10018050-79 = "メニューを減らすことで、調理の手間を減らすこともできますし……。"
10018050-81 = "悪くないんじゃない？私は定食も好きだよ。量もちょうどいいからね。"
10018050-82 = "学校の給食みたいで好きですよ★"
10018050-83 = "ゲヘナの給食はまずいけど、スズメ亭の定食はきっとおいしいんだろうな～！"
10018050-84 = "[s1] \"女将さんの負担を減らせるのは、続けていくうえで大切だよね。\"\n[s2] \"給食がおいしくないのは、それなりの事情があるんじゃないかな……。\""
10018050-88 = "私は良い意見だと思いますわ。流石、先生をお呼びした甲斐がありましたね。"
10018050-89 = "それでは、低価格路線用の食材選定をしましょうか。"
10018050-91 = "やっぱり、値段を考えると近くの商店から手に入れるしかないわよね？"
10018050-92 = "ハルナは受け入れられないかもしれませんけどね。"
10018050-93 = "あ、そうだった。妥協するの嫌いだもんね！"
10018050-95 = "……いいえ、今回に限っては。"
10018050-96 = "これもスズメ亭が生き残るために必要なことですから。生存戦略は別のお話ですわ。"
10018050-101 = "そっちの話なら聞いてたけど、買い物はジュリに任せていいと思う。"
10018050-103 = "え！？"
10018050-105 = "そんなに驚くこと？他のことはさておき、ジュリの食材を見る目は確かなの。"
10018050-106 = "そ、そうです！自分で言うのは恥ずかしいですが、一生懸命勉強したんです！"
10018050-107 = "私が役に立てるのは、材料を見分けるくらいしかなかったから……。"
10018050-109 = "そうなのね。そこまで言うなら……。"
10018050-111 = "それでは、先生？"
10018050-112 = "[s] \"そうだね。何かあるかもしれないし私も付き添うよ。\""
10018050-113 = "ええ、よろしくお願いいたしますわ。"
