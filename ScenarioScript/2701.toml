[translation]
2701-1 = "逮捕します！（１）"
2701-2 = "ヴァルキューレ警察学校・生活安全局"
2701-3 = "日差しが暖かい、のんびりとしたある午後のひと時。"
2701-4 = "はあ……暇だねぇ。ほんっと暇……。"
2701-5 = "今日は事件も起きてないし、特に苦情もないし……#nおかげでこうやって勤務中にもお昼寝ができて、まさに天国～。"
2701-6 = "キヴォトスが毎日、これくらい平和だったらいいのに……。"
2701-7 = "それはいけません！"
2701-8 = "んー？平和がいけないってどういうことー、キリノ？"
2701-9 = "それってつまり、毎日悪党どもが犯罪を起こして、生徒たちの喧嘩が絶えず、キヴォトス全体が混乱に陥っててほしいってこと？"
2701-10 = "キリノったらー、そんな悪党みたいな一面があったんだね。"
2701-11 = "い、いえ、もちろん混乱していてほしいというわけではないのですが……"
2701-12 = "ただ、このまま平和が続いていたら、私たちが活躍するチャンスがありません！"
2701-13 = "それではヴァルキューレ警察学校の上層部の方々に、私たちの実力をお見せすることができないですし……！ここから転科するチャンスも得られないまま、ずっとこの生活安全局にいることになってしまいます！"
2701-14 = "私は好きだけど？生活安全局。"
2701-15 = "生活安全局には危険なこととか、面倒な事件とかぜーんぜん降りてこないじゃん？安心安全なのが一番だよ。"
2701-16 = "それではダメなのです！"
2701-17 = "カッコよく、鮮やかに犯罪者たちを制圧する……そんな警察の姿に憧れてヴァルキューレ警察学校に来たのに、実際にやることと言えば迷子の保護や、道の交通整理がほとんど……。"
2701-18 = "もちろんこれも大事で、やりがいのあることなのですが！"
2701-19 = "迷子になった子供を無事に送り届けて感謝される時なんて、言葉にできないぐらいの満足感もあります！#nですが……これだけでは、物足りません！"
2701-20 = "キリノは元気だねぇ。"
2701-21 = "私なんか午後になったらもう動く気力も無いってのに……。"
2701-22 = "フブキも私と同じ、1年生じゃないですか。もっと意欲的に、ハキハキと動きましょう！"
2701-23 = "まあまあ、そんなに焦らないの。1年生ってことは見方を変えれば、まだまだ活躍できる時間がたっぷり残されてるってことでもあるでしょー？"
2701-24 = "もしかしたら、私たちの助けが必要な大きな事件が、今すぐにでも起きるかもよ―。"
2701-26 = "緊急！緊急！警備局の者は総員今すぐに武装、3丁目2番街のドーナツ屋へ出動せよ！繰り返す！警備局の者は総員、今すぐに――"
2701-27 = "……嘘から出たまこと、って感じだね。"
2701-28 = "2番街のドーナツ屋って、もしかして「マスタードーナツ」？あそこのオールドファッション美味しいのに。"
2701-29 = "警備局に連絡して、何が起きたのか聞いてみます！"
2701-32 = "局長、生活安全局のキリノであります！"
2701-33 = "キリノか。どうした、こちらは今出動準備で忙しいのだが。"
2701-34 = "先ほど緊急出動の命令が出ていましたが、ドーナツ屋で何かあったのですか？"
2701-35 = "緊急ではあるが、大事件というほどでもない。泥棒が一名ドーナツ屋に侵入して、そこの店長を人質に金品を要求してるみたいでね。"
2701-36 = "だが、もちろん君たち生活安全局が出動する必要は無い。そのまま――"
2701-40 = "フブキ、出動です！#n警備局よりも先に現場について悪党を倒し、私たちの実力を見せてやりましょう！"
2701-41 = "ええー？めんどくさぁ……。"
2701-42 = "それに、生活安全局にはちゃんとした装備もないでしょ？一歩間違えたら、武装した犯人たちに逆にやられるかもしれないよー？"
2701-43 = "今回のことは大人しく警備局の生徒たちに任せて、私たちは休むってことでどう？"
2701-44 = "こうしている間にも、人質になった罪の無い市民は恐怖に震えているはずです！生活安全局ですとか警備局ですとか、そんなことを言っている場合ではありません！"
2701-45 = "それに、事件を解決すれば上層部から、何かしら褒美をいただけるかもしれませんよ。#n例えば……特別休暇とか！"
2701-46 = "……特別休暇かぁ。それは確かに、魅力的な提案かもね……。"
2701-47 = "はぁ、仕方ないな。でも、状況があまりにもヤバそうだったら、私はすぐ逃げるからね。"
2701-48 = "心配しないでください、どんな相手が来ようとも、正義は絶対に負けたりしません！"
