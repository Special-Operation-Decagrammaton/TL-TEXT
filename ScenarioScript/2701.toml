[translation]
2701-1 = "Vou te prender! (1)"
2701-2 = "Escola de Polícia Valkyrie - Departamento de Segurança Pública"
2701-3 = "Uma tarde tranquila e ensolarada."
2701-4 = "Ah... que tédio. Sério, que tédio..."
2701-5 = "Hoje não aconteceu nenhum incidente, nem tivemos reclamações...#nGraças a isso, posso tirar uma soneca durante o expediente. É o paraíso."
2701-6 = "Quem dera Kivotos fosse sempre tão pacífica assim..."
2701-7 = "Isso não pode acontecer!"
2701-8 = "Hmm? O que você quer dizer com 'não pode', Kirino?"
2701-9 = "Você está dizendo que quer que bandidos cometam crimes todos os dias, que as alunas briguem sem parar e que Kivotos inteira caia no caos?"
2701-10 = "Kirino, eu não sabia que você tinha esse lado vilanesco."
2701-11 = "N-não, claro que não quero que tudo vire um caos..."
2701-12 = "É só que, se a paz continuar assim, não teremos chance de brilhar!"
2701-13 = "Se for assim, não poderemos mostrar nosso valor aos superiores da Escola de Polícia Valkyrie...! E sem chance de transferência, ficaremos presas neste Departamento de Segurança Pública para sempre!"
2701-14 = "Mas eu gosto daqui, sabe? Do Departamento de Segurança Pública."
2701-15 = "Aqui nunca aparecem coisas perigosas ou casos problemáticos, né? Segurança e tranquilidade são o que há de melhor."
2701-16 = "Isso não é o suficiente!"
2701-17 = "Eu entrei na Escola de Polícia Valkyrie admirando a imagem de policiais que prendem criminosos de forma legal e brilhante... mas, na prática, o que fazemos é quase sempre ajudar crianças perdidas ou organizar o trânsito..."
2701-18 = "Claro, isso também é importante e gratificante!"
2701-19 = "Quando ajudo uma criança perdida a voltar para casa e recebo um agradecimento, sinto uma satisfação indescritível!#nMas... só isso não basta!"
2701-20 = "A Kirino é cheia de energia, hein."
2701-21 = "Eu, por outro lado, já não tenho forças nem para me mexer à tarde..."
2701-22 = "Fubuki, você também é uma aluna do primeiro ano, assim como eu. Vamos ser mais proativas e agir com determinação!"
2701-23 = "Calma, calma, não precisa ter tanta pressa. Ser do primeiro ano significa que ainda temos muito tempo para brilhar, não acha?"
2701-24 = "Quem sabe? Talvez um grande incidente que precise da nossa ajuda aconteça agora mesmo."
2701-26 = "Emergência! Emergência! Todos os membros do Departamento de Segurança, armem-se imediatamente e dirijam-se à loja de donuts na 2ª Avenida, 3ª Rua! Repito! Todos os membros do Departamento de Segurança, imediatamente――"
2701-27 = "Parece que o que a gente falou virou realidade..."
2701-28 = "Loja de donuts na 2ª Avenida... será que é a 'Master Donuts'? O old-fashioned de lá é tão gostoso."
2701-29 = "Vou entrar em contato com o Departamento de Segurança para saber o que aconteceu!"
2701-32 = "Diretor, aqui é a Kirino, do Departamento de Segurança Pública!"
2701-33 = "Kirino? O que houve? Estamos ocupados nos preparando para a saída."
2701-34 = "Ouvi o chamado de emergência agora pouco. Aconteceu algo na loja de donuts?"
2701-35 = "É uma emergência, mas não chega a ser um grande incidente. Um ladrão invadiu a loja e está mantendo o gerente como refém, exigindo dinheiro."
2701-36 = "Mas, é claro, não há necessidade de vocês do Departamento de Segurança Pública intervirem. Continuem――"
2701-40 = "Fubuki, vamos sair!#nVamos chegar ao local antes do Departamento de Segurança, derrotar o bandido e mostrar do que somos capazes!"
2701-41 = "Ah, sério? Que preguiça..."
2701-42 = "Além disso, o Departamento de Segurança Pública nem tem equipamento adequado, né? Se a gente vacilar, pode acabar sendo derrotada pelos criminosos armados, não acha?"
2701-43 = "Que tal deixarmos isso para as alunas do Departamento de Segurança e a gente descansar?"
2701-44 = "Enquanto estamos aqui paradas, cidadãos inocentes estão tremendo de medo como reféns! Não é hora de discutir quem é do Departamento de Segurança Pública ou do Departamento de Segurança!"
2701-45 = "Além disso, se resolvermos o caso, talvez ganhemos alguma recompensa dos superiores.#nPor exemplo... uma folga especial!"
2701-46 = "...Uma folga especial, é? Essa é uma proposta tentadora..."
2701-47 = "Ai, ai, não tem jeito. Mas se a situação ficar feia demais, eu vou fugir na hora, viu?"
2701-48 = "Não se preocupe, não importa quem seja o inimigo, a justiça nunca será derrotada!"
