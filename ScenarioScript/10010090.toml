[translation]
10010090-1 = "第9話;終わらせないために（１）"
10010090-13 = "……はい、問題無いです。"
10010090-17 = "「[ruby=みずごけにかわ]水苔膠[/ruby]」も溶かせましたし、薬の方も十分ありますし……。"
