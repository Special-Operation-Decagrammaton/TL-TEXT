10010090-40 = "[s1] \"じゃあお言葉に甘えて、少しだけ休ませてもらおっか。\"\n[s2] 横になっても良さそうな場所を探す。"
10010090-41 = "そ、そこ……使っても、構いません。"
10010090-42 = "そ、そこ……使っても、構いません。"
