[translation]
10028045-3 = "Haa, haa... haa... haa..."
10028045-5 = "Haa... haa, haa..."
10028045-6 = "Nós vencemos, né..."
10028045-8 = "...Meu Deus, o que está acontecendo logo depois de invadirmos isso!!"
10028045-9 = "Por que tem um canhão dentro do trem!?!?"
10028045-10 = "[s1] \"Obrigada, Iori. Graças a você, estamos salvas.\"\n[s2] \"Como esperado da Iori! Eu confiava em você!!\""
10028045-13 = "Cala a boca! O Sensei também está aqui!!#nVocês vão me contar tudo, sem deixar passar nada, lá no Comitê Disciplinar!!"
10028045-14 = "...Hm?"
10028045-15 = "...Hã?"
10028045-16 = "Como assim, \"estou ocupada agora, depois a gente vê\"...?"
10028045-17 = "Existe algo mais importante do que essa situação, sua idiota!!"
10028045-18 = "E quanto a você, Kasumi!!"
10028045-19 = "...Hm, eu?"
10028045-20 = "...Será que eu estou em apuros agora?"
10028045-21 = "Apuros? Você está encurralada desde o momento em que aparecemos!#nVenha quietinha com o Comitê Disciplinar!"
10028045-22 = "Não só você, mas todos os alunos delinquentes daqui serão levados!!"
10028045-23 = "Aliás, você vai direto para a cela especial!"
10028045-24 = "Hum? Ser levada de repente... eu não me lembro de ter feito nada de errado?"
10028045-25 = "Hum, será que eu fiz algo antes..."
10028045-26 = "...Hã?"
10028045-30 = "Você está falando sério?"
10028045-31 = "Haha! Nem ferrando!"
10028045-32 = "Ei, mas falando nisso, a cela especial...#né aquela que fica no subsolo do Comitê Disciplinar?"
10028045-33 = "Hum, espera um pouco. Hoje é, se não me engano..."
10028045-38 = "...o dia em que a Presidente Hina está de plantão, não é?"
10028045-39 = "Hm...? Ah, era hoje mesmo?"
10028045-40 = "Hum~... hummm~...!!"
10028045-41 = "Ei, tipo, sabe... I-Iori-sama..."
10028045-42 = "Mesmo alguém como eu, que tem um coração grande o suficiente para aceitar todo mundo... ainda existem uma ou duas pessoas que eu prefiro evitar, sabe?"
10028045-43 = "Tipo, a Presidente Hina é um pouco... eu não me dou muito bem com ela..."
10028045-44 = "Não, é... bom, só um pouquinho, sabe?"
10028045-45 = "É, tem coisas que a gente pode resolver conversando, né... não acha?"
10028045-46 = "Não peço mais nada... por exemplo, em vez da Presidente Hina...#nIori, você não poderia trocar para o seu dia de plantão?"
10028045-47 = "...Hã!? O que isso mudaria!?"
10028045-50 = "...É a primeira vez que vejo aquela pessoa em pânico."
10028045-51 = "Como esperado da Presidente do Comitê Disciplinar de Gehenna... ela parece ser exatamente como dizem os rumores."
10028045-52 = "[s3] \"A Hina não é desse tipo, mas...\"\n[s4] \"Dessa vez, a culpa é da Kasumi...\""
10028045-56 = "Hum..."
10028045-57 = "...Espera aí? Vocês duas aí, não acham que deveriam estar preocupadas também?"
10028045-58 = "Eu disse que o alvo da detenção era \"todo mundo\", tem certeza que está tudo bem?"
10028045-59 = "Se for assim, vocês não vão conseguir voltar para Trinity hoje mesmo...?"
10028045-61 = "...Hã?"
10028045-62 = "Não, é que... nós não temos nada a ver com isso—"
10028045-64 = "Claro que tem! Achou mesmo que poderiam ir embora assim!?"
10028045-65 = "Vou investigar vocês também! Fiquem quietas!"
10028045-66 = "Haha! Essa é a nossa Iori-sama, é assim que se fala!!"
10028045-70 = "...Mas, gentil Iori."
10028045-71 = "Aquela declaração de agora há pouco, é verdade...?"
10028045-72 = "Bem, já que você falou, não tem como voltar atrás..."
10028045-73 = "...Hm?"
10028045-74 = "Que tipo de bobagem você vai dizer agora..."
10028045-75 = "Hum... não é bobagem nenhuma."
10028045-76 = "Dê uma olhada ao redor, veja só."
10028045-77 = "Com a batalha contra o canhão, as forças do Comitê Disciplinar se esgotaram."
10028045-78 = "Nessa situação, você soltou aquelas palavras, não foi?"
10028045-79 = "“Vou levar todos os alunos delinquentes daqui sob custódia” — foi o que disse."
10028045-80 = "E daí? O que tem isso?"
10028045-81 = "[s] \"…………。\""
10028045-82 = "…………Ah."
10028045-83 = "[s5] \"Pensando bem, a maioria dos passageiros aqui...\"\n[s6] \"Isso vai acabar provocando todo mundo...\""
10028045-87 = "Hahahaha!!"
10028045-88 = "Sério, essa Iori é tão fofa~~!"
10028045-89 = "...Ei, você sabe, não sabe? Sobre os passageiros deste trem."
10028045-90 = "A maioria dos passageiros..."
10028045-91 = "Se encaixa exatamente na definição de \"alunos delinquentes\" que você deu."
10028045-93 = "Hm...?"
10028045-106 = "Levar a gente sob custódia... você acha que vamos permitir isso!?"
10028045-107 = "Quem vai levar quem...? Você tem noção da situação em que está?"
10028045-108 = "Aquela de cabelo prateado do Comitê Disciplinar... eu nunca fui com a cara dela..."
10028045-110 = "Perfeito. Vou aproveitar a chance para dar uma lição nela!#n...Todos, apontem as armas!!"
10028045-111 = "Uma briga? Não temos escolha a não ser entrar no meio também!!"
10028045-112 = "Não é todo dia que temos uma vantagem dessas para lutar contra o Comitê Disciplinar!#nDepressa, vocês também, vamos lá!!"
10028045-114 = "Ah..."
10028045-115 = "Pelo visto, de novo..."
10028045-117 = "...Muito bem."
10028045-118 = "Parece que a situação se resolveu até certo ponto!"
10028045-119 = "As forças estão meio a meio, talvez...?#nOs alunos delinquentes do trem estão do meu lado... e contra eles, o lado da Iori."
10028045-120 = "Q-que diabos você está dizendo! Não fale besteira!"
10028045-121 = "É verdade que o Sensei é um pervertido que só pensa em coisas estranhas...#nmas não tem como ele ficar do lado de vocês nessa situação!"
10028045-122 = "Nós somos a polícia, por assim dizer, e vocês são os criminosos!#nNão importa como olhe, vocês estão do nosso lado!"
10028045-123 = "É óbvio que eles vão ficar do lado da justiça!!"
10028045-124 = "Ei, Sensei, é isso mesmo, né...?#nVocê vai nos comandar, não vai...!?"
10028045-126 = "Você disse agorinha que ia levar a gente para o Comitê Disciplinar, né."
10028045-127 = "Fufun..."
10028045-128 = "Entendo, entendo. Bem, não é estranho pensar assim..."
10028045-132 = "Mas veja bem, Iori."
10028045-133 = "As coisas nem sempre saem como a gente espera.#nE então..."
10028045-142 = "É isso que torna a vida interessante."
10028045-143 = "[s9] \"Aquela mala é...?\"\n[s10] \"Não pode ser...!!\""
10028045-146 = "...P-por que aquela mala está aí!?"
10028045-147 = "Hahahahaha! Só percebeu agora!?"
10028045-148 = "Eu não disse?#nQue faltavam 3 vagões... e que logo chegaríamos no vagão onde a carga estava."
10028045-149 = "Eu não sou bobo. Eu já esperava que isso fosse acontecer depois daquilo.#nNão dava para ficar só olhando."
10028045-150 = "Enquanto todos brincavam com o canhão, eu dei uma passadinha rápida nos vagões da frente."
10028045-151 = "E adivinha só!#nLá estava uma mala com o brasão da Trinity estampado bem grande!"
10028045-152 = "P-por que..."
10028045-153 = "Você estava falando de \"promessas e confiança\" agorinha, né?#nPor acaso você nos enganou?"
10028045-154 = "Hm? Do que você está falando...?"
10028045-155 = "Existe algum problema com a minha \"promessa e confiança\"?"
10028045-156 = "Eu fui lá, procurei e consegui a mala... agora, só falta entregar."
10028045-157 = "Onde é que isso é diferente do que prometemos?"
10028045-158 = "Promessas devem ser cumpridas... sempre."
10028045-159 = "Como prometido, eu cuidarei pessoalmente desta bolsa!#nVou entregá-la nas mãos da garotinha, então não precisa se preocupar com nada!"
10028045-163 = "……Só que."
10028045-164 = "Antes disso."
10028045-165 = "É claro que, já que vocês também são nossos aliados...#nprecisam cumprir a promessa até o fim, não é?"
10028045-166 = "……Afinal, a \"confiança\" é algo que depende de ambas as partes, não é?"
10028045-167 = "Disse algo errado?"
10028045-168 = "……Ei, garotinha."
10028045-172 = "…………."
10028045-173 = "Hehe."
10028045-174 = "Finalmente ficou quieta... então, vamos ao que interessa."
10028045-175 = "De qualquer forma, a garotinha não tem tempo para pensar.#nAfinal, você quer levar a bolsa para casa hoje, não quer?"
10028045-176 = "……Então."
10028045-177 = "…………."
10028045-183 = "Você já deve saber o que precisa ser feito a partir de agora."
