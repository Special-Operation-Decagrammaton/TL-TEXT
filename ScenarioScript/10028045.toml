[translation]
10028045-3 = "はぁ、はぁ……はぁ……はぁ……"
10028045-5 = "はぁ……はぁ、はぁ……"
10028045-6 = "勝った、っすね……"
10028045-8 = "……まったく、乗り込んで早々どうなってる！！"
10028045-9 = "どうして列車の中にキャノン砲があるんだ！？！？"
10028045-10 = "[s1] \"ありがとう、イオリ。おかげで助かったよ。\"\n[s2] \"さすがイオリ！信じてたよ！！\""
10028045-13 = "うるさい！先生も一緒だからな！！#n風紀委員会でひとつ残らず話してもらう！！"
10028045-14 = "……ん？"
10028045-15 = "……は？"
10028045-16 = "今は忙しいから後で、って……？"
10028045-17 = "この状況より、大事なことがあるかバカ！！"
10028045-18 = "それとカスミ！！"
10028045-19 = "……ん、私か？"
10028045-20 = "……もしかして私は今、ピンチなのか？"
10028045-21 = "ピンチも何も、私たちが現れた時点で袋のネズミだ！#nおとなしく風紀委員まで付いてこい！"
10028045-22 = "お前だけじゃなく、ここの不良生徒は全員連行する！！"
10028045-23 = "ちなみに、お前は特別牢行きだからな！"
10028045-24 = "むぅ？いきなり連行って……何かやらかした覚えはないぞ？"
10028045-25 = "ふむ、前に何かしたっけな……"
10028045-26 = "……は？"
10028045-30 = "お前、本気で言ってるのか？"
10028045-31 = "ハハッ！まさか！"
10028045-32 = "や、それより特別牢って……#n風紀委員会の地下にあるアレか？"
10028045-33 = "えーっと、ちょっと待てよ。今日はたしか……"
10028045-38 = "……ヒナ委員長が担当の日、じゃないか？"
10028045-39 = "ん……？ああ、今日はそうだったっけ。"
10028045-40 = "ん～……んんん～……！！"
10028045-41 = "えーっと、その……い、イオリ様……"
10028045-42 = "私みたいな、こう……万人を受け入れられるような器の大きい者でも、1人や2人くらいは、避けたい人がいるもんでな……？"
10028045-43 = "その、ヒナ委員長はちょーっと……あんまし得意じゃなくって……"
10028045-44 = "いやぁ……うん、ちょっとだけどな？"
10028045-45 = "そうだ、話し合いで解決できることもあるというか……なっ？"
10028045-46 = "他は望まんから……例えば、ヒナ委員長じゃなくて……#nイオリ、お前が担当の日に変えたり？"
10028045-47 = "……は！？何が違うんだよ！？"
10028045-50 = "……あの人が慌ててるとこ、初めて見るっす。"
10028045-51 = "さすがゲヘナの風紀委員長……噂通りの方っぽいっすね。"
10028045-52 = "[s3] \"ヒナはそんな子じゃないけどね……\"\n[s4] \"今回はカスミに非があるよ……\""
10028045-56 = "う～ん……"
10028045-57 = "……待てよ？そっちの2人だって、見守ってる場合じゃないぞ？"
10028045-58 = "連行対象は「全員」と言ってただろう、本当にいいのか？"
10028045-59 = "それだと[ruby=・   ・   ・   ・]今日中に[/ruby]トリニティに帰れないぞ……？"
10028045-61 = "……へ？"
10028045-62 = "いや、だから……私たちは何も関係がな――"
10028045-64 = "当たり前だろ！そのまま帰れると思ったのか！？"
10028045-65 = "調査はさせてもらうからな！大人しくしてろ！"
10028045-66 = "ハーハッハ！やっぱり我らがイオリ様、そう来なくっちゃ！！"
10028045-70 = "……でも、親切なイオリさんよ。"
10028045-71 = "さっきの発言は、本当なのか……？"
10028045-72 = "まあすでに口に出した以上、取り返しはつかんだろうが……"
10028045-73 = "……ん？"
10028045-74 = "今度はどんな戯言を……"
10028045-75 = "ふむ……戯言なんかじゃないが。"
10028045-76 = "周りを見るがいい、ほら。"
10028045-77 = "キャノン砲との戦闘で、風紀委員会の兵力は底を尽きた。"
10028045-78 = "そんな状況で君は、あ～んな言葉を口にしたわけだ。"
10028045-79 = "「ここの不良生徒は全員連行する」――と。"
10028045-80 = "だから、それが何だって言うんだ？"
10028045-81 = "[s] \"…………。\""
10028045-82 = "…………あ。"
10028045-83 = "[s5] \"そういえば、ここの乗客たちの多くは……\"\n[s6] \"全員を刺激する結果に……\""
10028045-87 = "ハーハッハッハ！！"
10028045-88 = "まったくこの、イオリちゃんはかわい～な～～～！"
10028045-89 = "……なあ、知ってるか？……この列車の乗客たちのことを。"
10028045-90 = "ほとんどの乗客が……"
10028045-91 = "君の言った「不良生徒」に当たるぞ？"
10028045-93 = "ん……？"
10028045-106 = "私たちも連行って……そんなこと許すとでも！？"
10028045-107 = "誰が誰を連行……？この状況、分かってんのか？"
10028045-108 = "風紀委員のあの銀髪のやつ、前から気に入らなかったんだよな……"
10028045-110 = "ちょどいい。この機会に目にモノ見せてやるぞ！#n……全員、銃を構えろ！！"
10028045-111 = "ケンカか？私たちも混ざるしかないな！！"
10028045-112 = "これだけ有利な状況で風紀委員と戦える日なんて早々ないな！#n早くお前たちも行くぞ！！"
10028045-114 = "あ……"
10028045-115 = "この様子じゃ、また……"
10028045-117 = "……よーし。"
10028045-118 = "ある程度状況はまとまったようだな！"
10028045-119 = "戦力は五分五分くらいか……？#n列車の不良生徒たちが私側……対するのはイオリ側。"
10028045-120 = "なっ、何言ってんだよ！適当なこと言うな！"
10028045-121 = "たしかに先生は、いつも変なことばっかり考えてるヘンタイだけど……#nこの状況でそっちの味方をするわけないだろ！"
10028045-122 = "こっちはいわゆる警察で、お前らは犯罪者だ！#nどう考えてもこっち側だ！"
10028045-123 = "正義側につくに決まってる！！"
10028045-124 = "なあ先生、そうだよな……？#n私たちの指揮をするよな……！？"
10028045-126 = "さっき、風紀委員会に連行するとか言ってたっすよね。"
10028045-127 = "ふふーん……"
10028045-128 = "そうかそうか。まあ、そう考えてもおかしくはないか……"
10028045-132 = "でもな、イオリ。"
10028045-133 = "物事はそう思うようにいかないものだ。#nそして――"
10028045-142 = "それが人生の面白いとこなのさ。"
10028045-143 = "[s9] \"そのカバンは……？\"\n[s10] \"まさかアレって……！！\""
10028045-146 = "……な、何でそこにカバンが！？"
10028045-147 = "ハーハッハッハッハ！今さら気づいたのか！"
10028045-148 = "言っただろう？#n残りは3両……すぐ、荷物が積まれた車両に着くと。"
10028045-149 = "こちらも馬鹿じゃないんだ。あの後こうなる予想はついていたもんでな。#nただ見ているわけにはいかないからな。"
10028045-150 = "みんながキャノン砲と戯れている間に、ささっと前方車両にお邪魔したのさ。"
10028045-151 = "そしたらなんと！#nトリニティのマークがデカデカと刻まれたカバンがあるじゃないか～！"
10028045-152 = "どっ、どうして……！！"
10028045-153 = "さっき、「約束と信用」の話をしてたっすよね？#nもしかして私たちを騙したんすか。"
10028045-154 = "ん？何を言っている……？"
10028045-155 = "私の「約束と信用」に、何か問題でも？"
10028045-156 = "こうして私はカバンを探して手に入れてきた……あとは、渡すだけだ。"
10028045-157 = "これのどこが[ruby=・   ・]約束[/ruby]と違うのさ？"
10028045-158 = "約束は必ず守る……必ずな。"
10028045-159 = "約束通り、このカバンは私がしっかりと！#nお嬢ちゃんの手に届けるから、なんの心配もいらない！"
10028045-163 = "……ただ。"
10028045-164 = "その前にだ。"
10028045-165 = "もちろんそちらも、私たちの[ruby=・   ・]仲間[/ruby]である以上……#n最後まで約束を守ってもらわないとな。"
10028045-166 = "……「信頼」というものは、双方あってこそのものだろう？"
10028045-167 = "何か間違ったこと、言ってるかな？"
10028045-168 = "……なあ？お嬢ちゃん。"
10028045-172 = "…………。"
10028045-173 = "フフ。"
10028045-174 = "ようやく大人しくなったじゃないか……では、本題に入ろう。"
10028045-175 = "どちらにせよ、お嬢ちゃんに考えている余裕はないんだ。#nだって、今日中にカバンを持って帰りたいんだろう？"
10028045-176 = "……なら。"
10028045-177 = "…………。"
10028045-183 = "これからどうすべきかも、分かっているはずだ。"
