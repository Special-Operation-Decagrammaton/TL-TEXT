[translation]
10046240-3 = "Ichika-senpai."
10046240-4 = "Vim para ajudar."
10046240-5 = "Mashiro? Hoje não é sua folga?"
10046240-6 = "Sim, é verdade, mas senti que o poder da justiça era necessário."
10046240-7 = "Haha... como esperado da Mashiro."
10046240-8 = "Mas você não participou de outra operação ontem?"
10046240-9 = "Descansar também faz parte da missão, sabe."
10046240-10 = "Na verdade... ultimamente, tenho sentido que me falta força..."
10046240-11 = "Digo, não tenho tido nenhum destaque, sinto que minha presença é fraca..."
10046240-12 = "Sendo uma atiradora, não é isso que você quer?"
10046240-13 = "Na verdade, acho que é melhor ter uma presença discreta."
10046240-14 = "Isso está errado!#nA presença é o próprio poder de um atirador!"
10046240-15 = "Dizem que um atirador excelente neutraliza três inimigos com um único disparo.#nHasumi-senpai é o maior exemplo disso, não é?"
10046240-16 = "Hmm... a Hasumi-senpai é mais do tipo que derrota três inimigos diretamente, eu diria..."
10046240-20 = "(Shizuyama Mashiro... ela é excepcionalmente talentosa entre as alunas do primeiro ano... mas)"
10046240-21 = "(Ela é muito séria, ou melhor, apaixonada demais...#nQuem dera ela soubesse dosar um pouco as coisas...)"
10046240-22 = "(Sinceramente, não nos damos muito bem...)"
10046240-28 = "E também... ouvi dizer que a Ichika-senpai estava patrulhando sozinha."
10046240-29 = "Hein? Ah, sim... bem, é só por acaso."
10046240-30 = "Não se sente solitária estando sozinha?"
10046240-31 = "...Não me diga que foi por isso que você veio?"
10046240-32 = "..."
10046240-33 = "Nossa, acabar preocupando uma veterana... ainda tenho muito o que aprender."
10046240-34 = "Haha... parece que ainda estou longe de ser uma boa veterana."
10046240-35 = "Então, vou dar o meu melhor, conto com o seu apoio!"
10046240-39 = "Sim! Pode deixar comigo!"
