[translation]
10046240-3 = "イチカ先輩。"
10046240-4 = "手伝いに来ました。"
10046240-5 = "マシロ？今日は非番っすよね？"
10046240-6 = "それはそうなのですが、正義の力が必要な気がしまして。"
10046240-7 = "はは……さすがマシロっすね。"
10046240-8 = "でも、昨日も別の作戦に参加してたじゃないっすか。"
10046240-9 = "休むことも任務のうちっすよ。"
10046240-10 = "実は……最近、力不足を感じていて……。"
10046240-11 = "目立つ活躍がないと言いますか、存在感が薄いような気がして……。"
10046240-12 = "狙撃手なら、それでいいのでは？"
10046240-13 = "むしろ存在感が薄いほうが、良いと思うっすけど。"
10046240-14 = "それは違います！#n存在感は狙撃手の力そのものなんです！"
10046240-15 = "優れた狙撃手は、一発の銃弾で三人の敵を無力化すると言われています。#nハスミ先輩が、その最たる例ですよね。"
10046240-16 = "うーん……ハスミ先輩はどちらかというと、#n敵三人を直接倒すって感じっすけどね……。"
10046240-20 = "（[ruby=しずやま]静山[/ruby]マシロ……1年生の中でもずば抜けて優秀……ではあるけど）"
10046240-21 = "（ものすごく真面目というか、情熱的というか……#nもう少し加減ができればなぁ……）"
10046240-22 = "（正直、ちょっと相性がよくないんだよな……）"
10046240-28 = "それと……イチカ先輩が一人でパトロールしていると聞きました。"
10046240-29 = "はい？あ、ああ……まあ、なんとなくっす。"
10046240-30 = "一人では寂しくありませんか？"
10046240-31 = "……まさか、それが理由っすか？"
10046240-32 = "……。"
10046240-33 = "いやぁ、後輩に心配かけちゃうなんて……私もまだまだっすね。"
10046240-34 = "はは……いい先輩には、程遠いみたいっす。"
10046240-35 = "んじゃ、気合い入れてくんで、援護頼むっすよ！"
10046240-39 = "はい！お任せください！"
