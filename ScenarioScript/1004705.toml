[translation]
1004705-1 = "Onde o brilho se esconde"
1004705-2 = "（Preocupado com a troca de mensagens no MomoTalk,）"
1004705-3 = "（fui visitar Chise.）"
1004705-10 = "Ah, Sensei...?"
1004705-11 = "[s] \"Ah, Chise. Sobre aquilo...\""
1004705-12 = "N-não."
1004705-13 = "Sensei, não pode chegar perto."
1004705-14 = "[s] \"P-por que...?\""
1004705-15 = "Se você chegar perto de mim..."
1004705-16 = "Você também será amaldiçoado e terá azar..."
1004705-17 = "[s] \"Amaldiçoado...?\""
1004705-21 = "[ns] \"…………。\""
1004705-23 = "[ns] Aproximo-me de Chise."
1004705-31 = "[ns] Aproximo-me ainda mais de Chise."
1004705-37 = "N-não."
1004705-38 = "[s] Aproximo-me de Chise e seguro seu braço gentilmente."
1004705-44 = "S-Sensei...?"
1004705-45 = "[s1] \"Se não se importar, pode me contar... o que aconteceu?\"\n[s2] \"Se estiver com problemas, quero ajudar.\""
1004705-48 = "Mas..."
1004705-49 = "[s] \"...É algo que você realmente não pode me contar?\""
1004705-53 = "Entendi."
1004705-54 = "Sensei, na verdade..."
1004705-56 = "（Ouvi a história completa de Chise.）"
1004705-58 = "Hoje de manhã, enquanto procurava pelo brilho..."
1004705-59 = "Quando eu estava caminhando pela praia..."
1004705-60 = "[s] \"Uma garrafa com uma carta dentro?\""
1004705-61 = "Sim, esta aqui."
1004705-66 = "（Embora um pouco hesitante, Chise me mostrou uma garrafa de vidro e uma carta que parecia estar dentro dela.）"
1004705-67 = "（Ao verificar o conteúdo...）"
1004705-68 = "[ns] \"Parece que começou em Trinity...\""
1004705-69 = "（「Quem receber esta carta deve enviar o mesmo conteúdo para sete pessoas dentro de 3 dias.」）"
1004705-70 = "（「Se não obedecer, você será amaldiçoado imediatamente e sofrerá um infortúnio terrível.」）"
1004705-71 = "（「Se quiser evitar, já sabe, não é? Desejo-lhe boa sorte.」）"
1004705-72 = "（「Boa sorte!」）"
1004705-74 = "（Isso é...）"
1004705-75 = "[s] \"Cartas de azar, que nostálgico...\""
1004705-76 = "Sensei, o que eu faço~?"
1004705-77 = "Se continuar assim, daqui a 3 dias, serei amaldiçoada e terei azar..."
1004705-78 = "[s] \"Bem... Chise, primeiro se acalme. Isso é apenas uma brincadeira.\""
1004705-79 = "Uma brincadeira...?"
1004705-83 = "（Expliquei para Chise, que inclinava a cabeça em dúvida, que essa carta é conhecida como uma \"carta de azar\".）"
1004705-84 = "（Expliquei que é apenas uma brincadeira inofensiva e que não há necessidade de se preocupar.）"
1004705-85 = "Brincadeira... por que alguém faria algo assim?"
1004705-86 = "（Essa dúvida era, de fato, extremamente natural.）"
1004705-87 = "[s] \"Por que, hein...\""
1004705-88 = "Se o fato de \"ter azar\" for mentira..."
1004705-89 = "Por que alguém faria algo assim?"
1004705-90 = "Sensei, por quê?"
1004705-91 = "[s3] \"É que, na verdade, não tem um significado profundo...\"\n[s4] \"Bem, talvez seja apenas espírito de porco...\""
1004705-94 = "...Que estranho."
1004705-95 = "Mas, e se isso não for uma brincadeira...?"
1004705-96 = "E se eu realmente for amaldiçoada, o que eu faço?"
1004705-97 = "Se isso acontecer... o Sensei, que está comigo, também será amaldiçoado..."
1004705-98 = "E se, por causa disso, você sofrer..."
1004705-99 = "...Eu não quero isso."
1004705-100 = "Isso não pode acontecer."
1004705-101 = "Se por causa disso eu acabar desaparecendo..."
1004705-102 = "Você poderia se tornar um tanque no meu lugar?"
1004705-103 = "[s] \"I-isso é um pouco difícil demais...\""
1004705-105 = "(Depois disso, vejo Chise com uma expressão muito séria e lágrimas nos olhos)"
1004705-106 = "(Pensando profundamente...)"
1004705-108 = "[ns] \"Certo, então vamos fazer o seguinte.\""
1004705-109 = "...?"
1004705-110 = "[s] \"Ficaremos juntos o tempo todo pelos próximos 3 dias, até que a desgraça chegue.\""
1004705-111 = "Mas, nesse caso, o Sensei..."
1004705-112 = "[s5] \"Se a Chise estiver em perigo, eu darei um jeito.\"\n[s6] \"Por que não verificamos isso juntos até termos certeza de que não há maldição nenhuma?\""
1004705-115 = "Sensei..."
1004705-119 = "...Sim."
1004705-120 = "Entendido."
1004705-121 = "(Sorri)"
1004705-123 = "(E assim, decidi passar os próximos 3 dias inteiros com a Chise)"
1004705-141 = "(Em um dia, passamos quase o tempo todo caminhando pela areia da praia)"
1004705-159 = "(Em outro, comemos sorvete e raspadinha em uma barraca de praia)"
1004705-181 = "(Em outro momento, fizemos um concurso de granadas (?) com alguns delinquentes que nos abordaram na praia)"
1004705-188 = "(Depois, voltamos para o resort e conversamos sobre o dia...)"
1004705-190 = "(Enquanto passava esse tempo com a Chise,)"
1004705-191 = "(chegamos ao terceiro dia desde que encontramos a carta)"
1004705-196 = "[ns] \"23:53... está quase na hora.\""
1004705-197 = "Sim, hoje é o terceiro dia..."
1004705-198 = "Sensei, eu..."
1004705-199 = "[s] \"Está tudo bem, eu estou aqui com você.\""
1004705-203 = "...Sim."
1004705-204 = "(O relógio avança lenta, mas seguramente...)"
1004705-213 = "(E então...)"
1004705-218 = "Sensei, o horário..."
1004705-226 = "(Passaram-se 5 minutos, mas felizmente nada aconteceu)"
1004705-230 = "Nada aconteceu...?"
1004705-231 = "[s] \"Pois é, era só mais uma daquelas 'correntes de azar' de sempre.\""
1004705-232 = "Então é assim que funciona..."
1004705-233 = "[s] \"Bom, já que sabemos que está tudo bem, então...\""
1004705-234 = "E-espere."
1004705-239 = "[ns] \"Chise?\""
1004705-240 = "Bem, é que..."
1004705-246 = "O-o que foi isso!?"
1004705-247 = "Um apagão repentino!?"
1004705-253 = "[ns] \"Será que isso é por causa da carta...!?\""
1004705-255 = "[ns] \"Chise! É perigoso, segure na minha mão!\""
1004705-256 = "Ué...?"
1004705-265 = "(O rosto do Sensei está tão perto...)"
1004705-266 = "(Ah, isso é...)"
1004705-270 = "……Que brilhante."
1004705-281 = "Ah, que susto……."
1004705-282 = "Nossa, o que foi aquilo……."
1004705-284 = "[ns] \"……Um pequeno problema, talvez?\""
1004705-285 = "Sensei, está pesado."
1004705-286 = "[s] \"De-desculpe, Chise!\""
1004705-290 = "[ns7] \"Mesmo que tenha sido de repente, me desculpe…….\"\n[ns8] \"Você se machucou? Está bem?\""
1004705-293 = "Sim, estou bem."
1004705-294 = "……."
1004705-295 = "Sensei, o brilho estava aqui."
1004705-296 = "[s] \"O brilho…… você quer dizer aquela luz que ficou piscando agora pouco?\""
1004705-297 = "Não."
1004705-298 = "O brilho que eu estava procurando esse tempo todo, estava bem na minha frente……."
1004705-299 = "……."
1004705-300 = "Entendi."
1004705-301 = "O brilho, esse tempo todo……"
1004705-302 = "[s] \"?\""
1004705-303 = "A carta de azar era mentira, né."
1004705-304 = "Na verdade, talvez tenha sido uma carta de sorte♪"
1004705-305 = "[s] \"……O que você quer dizer com isso?\""
1004705-306 = "Fufu."
1004705-307 = "É segredo, Sensei."
1004705-309 = "(Embora eu não tenha entendido o que ela quis dizer no final……)"
1004705-313 = "(Junto com uma Chise de muito bom humor, passamos o resto da noite conversando sobre várias coisas até o amanhecer)"
