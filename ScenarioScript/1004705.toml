[translation]
1004705-1 = "きらきらの在り処"
1004705-2 = "（モモトークのやりとりがやや気になり、）"
1004705-3 = "（チセの元へと訪れた）"
1004705-10 = "あれ、先生……?"
1004705-11 = "[s] \"あ、チセ。その――\""
1004705-12 = "だ、ダメ。"
1004705-13 = "先生は、近づいちゃダメ。"
1004705-14 = "[s] \"ど、どうして……？\""
1004705-15 = "私に近づいたら……"
1004705-16 = "先生も呪われて、不幸になっちゃう……。"
1004705-17 = "[s] \"呪われる……？\""
1004705-21 = "[ns] \"…………。\""
1004705-23 = "[ns] チセに近づく。"
1004705-31 = "[ns] チセにもっと近づく。"
1004705-37 = "だ、ダメ。"
1004705-38 = "[s] チセに近づいて、優しく腕を掴む。"
1004705-44 = "せ、先生……？"
1004705-45 = "[s1] \"良ければ教えてほしいんだけど……何があったの？\"\n[s2] \"困ってるなら、力になりたいよ。\""
1004705-48 = "でも……。"
1004705-49 = "[s] \"……どうしても、言えないこと？\""
1004705-53 = "分かった。"
1004705-54 = "先生、実はね……"
1004705-56 = "（チセから一部始終を聞かせてもらった）"
1004705-58 = "今朝、きらきらを探して……"
1004705-59 = "海辺を歩いてた時にね――"
1004705-60 = "[s] \"手紙の入った、瓶？\""
1004705-61 = "そう、これ。"
1004705-66 = "（やや迷いながらもチセが見せてくれたのは、ガラスの瓶と、中に入っていたらしい一通の手紙）"
1004705-67 = "（中身を確認したところ……）"
1004705-68 = "[ns] \"トリニティから始まったみたいだね……。\""
1004705-69 = "（「この手紙を受け取った人は、3日以内に同じ内容を7人に送らなければなりません」）"
1004705-70 = "（「もし従わなかった場合、あなたはたちまちに呪われてしまい、とんでもない不幸に見舞われるでしょう。」）"
1004705-71 = "（「回避したくば、分かりますね？あなたの幸運を祈ります。」）"
1004705-72 = "（「グッドラック！」）"
1004705-74 = "（これって……）"
1004705-75 = "[s] \"不幸の手紙とか、懐かしいね……。\""
1004705-76 = "先生、どうしよう～？"
1004705-77 = "このままじゃ3日後、呪いにかかって不幸に……"
1004705-78 = "[s] \"えっと……チセ、とりあえず落ち着いて。これはジョークだから。\""
1004705-79 = "ジョーク……？"
1004705-83 = "（首を傾げるチセに、この手紙が「不幸の手紙」と呼ばれるものであること。）"
1004705-84 = "（ちょっとした遊びのような悪戯で気にする必要は無いことを説明した）"
1004705-85 = "悪戯……どうしてそんなことしたんだろ？"
1004705-86 = "（その疑問は確かに至極当然のことだった）"
1004705-87 = "[s] \"どうして、かぁ……。\""
1004705-88 = "もし「不幸になる」っていうのが嘘だったら……。"
1004705-89 = "どうして、そんなことをするんだろうって。"
1004705-90 = "先生、どうして?"
1004705-91 = "[s3] \"それは、実際に深い意味は無いというか……。\"\n[s4] \"まあ、悪戯心って言うのかな……。\""
1004705-94 = "……変なの。"
1004705-95 = "でも、もしこれが悪戯じゃなくって……。"
1004705-96 = "本当に呪われちゃったら、どうしよう？"
1004705-97 = "そしたら……私と一緒にいる先生も呪われて……"
1004705-98 = "それで、不幸になったら……"
1004705-99 = "……そんなの、嫌。"
1004705-100 = "そんなのダメだよ。"
1004705-101 = "そのせいで、もし私がいなくなったら……。"
1004705-102 = "私の代わりに、先生が戦車になってくれる？"
1004705-103 = "[s] \"そ、それはちょっと難易度が高い……。\""
1004705-105 = "（その後、すごく真剣な顔で涙を浮かべるチセの姿を見て）"
1004705-106 = "（悩みつくし……）"
1004705-108 = "[ns] \"よし、じゃあこうしよう。\""
1004705-109 = "……？"
1004705-110 = "[s] \"不幸が訪れるまであと3日、ずっと一緒にいよう。\""
1004705-111 = "でも、それじゃあ先生が……"
1004705-112 = "[s5] \"もしチセが危険な目にあっても、私がどうにかする。\"\n[s6] \"呪われなかったってハッキリ分かるまで、しっかり検証してみない？\""
1004705-115 = "先生……。"
1004705-119 = "……うん。"
1004705-120 = "分かった。"
1004705-121 = "（にっこり）"
1004705-123 = "（ということで、それから3日間ずっとチセと一緒に過ごすことにした）"
1004705-141 = "（ある時はほぼ一日中、夏の砂浜を散歩したり）"
1004705-159 = "（ある時は海の家で、アイスやかき氷を食べたり）"
1004705-181 = "（またある時は、海辺で突如絡まれた不良たちと榴弾コンテスト（？）をしたり）"
1004705-188 = "（それから一緒にリゾートに戻り、その日のことを語り合ったりして……）"
1004705-190 = "（そうしてチセと一緒に過ごしているうちに、）"
1004705-191 = "（手紙を拾った日から3日目を迎えた）"
1004705-196 = "[ns] \"午後11時53分……もうそろそろだね。\""
1004705-197 = "うん、今日で3日目……。"
1004705-198 = "先生、私――"
1004705-199 = "[s] \"大丈夫、私もいるから。\""
1004705-203 = "……うん。"
1004705-204 = "（時計はゆっくりと、それでも確実に進み……）"
1004705-213 = "（そして……）"
1004705-218 = "先生、時間……。"
1004705-226 = "（そのまま5分ほどが経過したものの、無事何も起こらなかった）"
1004705-230 = "何も、起こらない……？"
1004705-231 = "[s] \"うん、やっぱりいつもの「不幸の手紙」だったね。\""
1004705-232 = "こういう、ものなんだ……。"
1004705-233 = "[s] \"じゃあ、無事何ともないことが分かったところで――\""
1004705-234 = "ま、待って。"
1004705-239 = "[ns] \"チセ？\""
1004705-240 = "その、えっと……"
1004705-246 = "な、何だ！？"
1004705-247 = "急に停電！？"
1004705-253 = "[ns] \"もしかしてこれ、手紙の……！？\""
1004705-255 = "[ns] \"チセ！危ないから、私の手を掴んで！\""
1004705-256 = "あれ……？"
1004705-265 = "（先生の顔、近い……）"
1004705-266 = "（あ、これは……）"
1004705-270 = "……きらきらだ。"
1004705-281 = "あー、びっくりした……。"
1004705-282 = "全く、何だ今のは……。"
1004705-284 = "[ns] \"……ちょっとしたトラブル、かな？\""
1004705-285 = "先生、重い。"
1004705-286 = "[s] \"ご、ごめんチセ！\""
1004705-290 = "[ns7] \"突然のこととはいえ、ごめん……。\"\n[ns8] \"怪我とか無い？大丈夫？\""
1004705-293 = "うん、大丈夫。"
1004705-294 = "………。"
1004705-295 = "先生、きらきらはあったよ。"
1004705-296 = "[s] \"きらきら……さっき電気がチカチカしてたやつ？\""
1004705-297 = "ううん。"
1004705-298 = "これまでずっと探してたきらきらが、すぐ目の前に……。"
1004705-299 = "……。"
1004705-300 = "そっか。"
1004705-301 = "きらきらは、ずっと……"
1004705-302 = "[s] \"？\""
1004705-303 = "不幸の手紙、嘘だったんだね。"
1004705-304 = "むしろ、幸福の手紙だったかも♪"
1004705-305 = "[s] \"……どういうこと？\""
1004705-306 = "ふふっ。"
1004705-307 = "先生には秘密、だよ。"
1004705-309 = "（どういうことなのかは結局分からなかったものの……）"
1004705-313 = "（すごく上機嫌なチセと一緒に、朝になるまでそのまま色んなことを話して過ごしたのだった）"
