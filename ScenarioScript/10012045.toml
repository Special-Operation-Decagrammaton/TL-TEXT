[translation]
10012045-5 = "……ふう。"
10012045-6 = "ただいま、今回もたくさん……。"
10012045-7 = "……あれ、みんな？"
10012045-8 = "[s1] \"……お帰り、シロコ。\"\n[s2] \"ナイスタイミング。\""
10012045-9 = "……何があったの？"
10012045-10 = "……何があったの？"
10012045-12 = "……あ、お帰りなさい。シロコ先輩。"
10012045-13 = "あはは……お帰りなさい、シロコちゃん……？"
10012045-14 = "ちょ、ちょっと今話しかけないで……まだ……体力が……。"
10012045-15 = "うう……死にそう……。"
10012045-16 = "……もう……おじさん動けない……。"
10012045-21 = "…………？"
10012045-23 = "（その後、シロコに今まであったことを話した）"
10012045-27 = "（……シロコの表情を見て、なおさらワカモとの対面はやめた方がいいと思った）"
10012045-32 = "はあ、はあ……。"
10012045-33 = "うう、もう本当に限界……これ以上はむ～り～……。"
10012045-34 = "クソッ！全兵力で仕掛けたのに負けるなんて……。"
10012045-35 = "……それは、どういう意味でしょうか？"
10012045-36 = "ひ、ひいっ……！？"
10012045-37 = "ど、どういう意味って……！？そんなの見れば分かることじゃ"
10012045-38 = "……ないですか！？"
10012045-39 = "この戦力差じゃあ勝てない"
10012045-40 = "って……！"
10012045-41 = "もうこれ以上どうしろっていうんですか！？"
10012045-43 = "さっきから何を仰っているんですか？"
10012045-44 = "まだ皆さんには切り札が"
10012045-45 = "残っているように、"
10012045-49 = "見えますが……"
10012045-51 = "どういう意味……？"
10012045-52 = "切り札……？"
10012045-53 = "……！！まさか！"
10012045-54 = "ダメ、ダメだよ！あれはダメ！！あれが無くなったら、うちらは帰れなくなっちゃう！"
10012045-55 = "隊長からも何か言ってやってくださいよ！このままだとあいつ、うちらの船まで……！"
10012045-57 = "あれだけはダメよ！あの船はうちらの家みたいなもんなの！"
10012045-58 = "いくらあんたでも、船に手を出すのは許さないわよ……！"
10012045-64 = "……ひいっ！？"
10012045-65 = "た、隊長を……一撃で……！？"
10012045-67 = "……ふふ。"
10012045-68 = "みなさん何か勘違い、していませんか？"
10012045-69 = "私はみなさんに許可を求めているわけではないのです。"
10012045-70 = "もう一度、申し上げますね。"
10012045-71 = "まだ、切り札が残っていますよね？"
10012045-72 = "みなさんの……。"
10012045-77 = "……「家」を。出して……くださりますよね？"
