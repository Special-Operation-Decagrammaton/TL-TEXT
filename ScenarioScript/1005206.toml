[translation]
1005206-1 = "セミナー書記ノアの退屈な休憩"
1005206-4 = "ミレニアムタワー、セミナー大会議室"
1005206-5 = "（約束がなくなって、時間が空いたのでノアに会いにセミナーの会議室を訪れた）"
1005206-15 = "……あら、先生。"
1005206-16 = "今日の定期面談は見送りになったとお伝えしたのですが……。"
1005206-17 = "もしかして、私からのメッセージをまだ見ていませんか？"
1005206-18 = "[ns] \"ノアのメッセージは確認したよ。\""
1005206-20 = "[ns] \"暇ができたから、ノアのところに顔出しておこうと思って。\""
1005206-21 = "ああ、それならよかったです。"
1005206-22 = "私も、突然暇な時間ができてしまって……何をしようかと迷っておりました。"
1005206-23 = "持ってきた本も全部読んでしまいましたし……#n雨のせいで外を歩く人もほとんどいませんし……。"
1005206-24 = "先生がいらっしゃらなかったら、何の刺激もない退屈な午後になるところでした。"
1005206-25 = "[s] \"むしろ、せっかくできた時間を私が邪魔しちゃったんじゃ……。\""
1005206-26 = "とんでもありません。#nむしろ先生に来ていただけて、良かったです。"
1005206-27 = "お恥ずかしい話ですが……私は常に書記として周囲の状況を観察し、記録せねばならないという強迫観念のようなものが染みついておりまして……。"
1005206-28 = "騒々しくまとまりのない風景より、#n今のように静かで変化のない時間のほうが、耐え難いのです。"
1005206-29 = "今日もこうして先生が来てくださらなかったら……。"
1005206-30 = "退屈のあまり一騒動起こして、#nその風景を他人事みたいに平然と眺めていたのかもしれません……ふふっ。"
1005206-31 = "[s1] \"一騒動起こすノアって……。\"\n[s2] \"全然想像つかないね。\""
1005206-32 = "もちろん、ミレニアムの日常はいつも様々な騒動と事件で満ちていますから。"
1005206-33 = "もちろん、ミレニアムの日常はいつも様々な騒動と事件で満ちていますから。"
1005206-34 = "わざわざ私が出向かなくても、記録対象は既に溢れかえっています。"
1005206-35 = "あら……湿気のせいで窓が結露してますね。"
1005206-36 = "水滴が床を汚す前に、窓を拭かないと……"
1005206-41 = "[ns] 窓ガラスに軽く文字を書いてみる。"
1005206-42 = "先生、それは……？"
1005206-43 = "……窓に文字を書く遊び、ですか？"
1005206-44 = "そんな遊びがあるなんて、聞いたこともありませんが……。"
1005206-45 = "ふふ、水気を拭いて書いた文字が、曇ったガラスと対比して綺麗ですね。"
1005206-46 = "それでは私も、少し書いてみましょうか。"
1005206-49 = "[wa:1000]― ……不思議です。"
1005206-52 = "― 紙に[wa:300]文字を[wa:450]書くときと違って、"
1005206-54 = "[wa:200]― 気分が[wa:400]高揚しています。"
1005206-57 = "[wa:1500]― 記録とは本来、"
1005206-59 = "[wa:100]― 現在の意志を[wa:1000]未来に伝達するための[wa:1000]手段だというのに。"
1005206-62 = "― 雨が止み、[wa:1500]陽が登ったら[wa:1000]消えてしまう"
1005206-64 = "― 刹那の[wa:450]記録だなんて……"
1005206-67 = "[wa:1300]― 理性と真実、[wa:2300]合理を記録するのに、"
1005206-69 = "― このガラスの板は[wa:1700]あまりにも[wa:500]儚いですね。"
1005206-72 = "[wa:900]― ……でも[wa:2000]…だからこそ私は、"
1005206-74 = "― この大きなガラスのページの[wa:1300]方が[wa:400]好きです。[wa:1200]ふふ。"
1005206-77 = "[ns] \"これは、なんて書いてあるの？\""
1005206-78 = "この文章ですか？"
1005206-79 = "これは、私の好きなある古い詩の一部です。"
1005206-80 = "話者が雲を愛したように、私はこの詩がとても好きでしたが……"
1005206-81 = "紙上に記したら、この気持ちが記録として残ってしまい、#n自身の趣向として固まってしまうことが怖くて、いつも心の中でだけ噛みしめていました。"
1005206-82 = "でもこの窓ガラスの上なら、いくらでも記録できそうです。"
1005206-84 = "……だから、先生。"
1005206-85 = "今日の記録は……心の内にだけ、留めてくださいね。"
1005206-87 = "（その後、雨が止むまで窓ガラスに自身の心を書いて、ノアと談笑した）"
