[translation]
1005206-1 = "O secretário do seminário Noah's Boring Break"

1005206-4 = "Millennium Tower, grande sala de conferências para seminários"

1005206-5 = "(Eu tinha algum tempo livre devido a um compromisso, então fui à sala de conferências do seminário para conhecer Noah.)"

1005206-15 = "...Ah, professora."

1005206-16 = "Eu lhe disse que a entrevista normal de hoje foi adiada..."

1005206-17 = "Talvez você ainda não tenha visto minha mensagem?"

1005206-18 = "[ns] \"Confirmei a mensagem de Noah.\""

1005206-20 = "[ns] \"Como tenho algum tempo livre, pensei em aparecer para Noah.\""

1005206-21 = "Ah, isso seria ótimo."

1005206-22 = "De repente, também tive algum tempo livre... estava me perguntando o que fazer."

1005206-23 = "Já li todos os livros que trouxe...#nPor causa da chuva, não tem muita gente andando lá fora..."

1005206-24 = "Sem o professor, teria sido uma tarde chata e sem qualquer estímulo."

1005206-25 = "[s] \"Em vez disso, fui eu quem atrapalhou seu precioso tempo...\""

1005206-26 = "Sem chance. #nNa verdade, estou feliz que o professor tenha vindo."

1005206-27 = "É um pouco embaraçoso, mas... como escriba, desenvolvi uma necessidade obsessiva de observar e registrar constantemente o que me rodeia..."

1005206-28 = "Uma época tranquila e imutável como agora é mais insuportável do que uma paisagem barulhenta e desorganizada."

1005206-29 = "Se a professora não tivesse vindo assim hoje..."

1005206-30 = "Talvez ele tenha causado confusão por causa do tédio, e então olhou calmamente para a paisagem como se não fosse da conta de mais ninguém... hehe."

1005206-31 = "[s1] \"Noah causa comoção...\"\n[s2] \"Não consigo imaginar isso.\""

1005206-32 = "É claro que a vida cotidiana do milênio está sempre repleta de diversas turbulências e incidentes."

1005206-33 = "É claro que a vida cotidiana do milênio está sempre repleta de diversas turbulências e incidentes."

1005206-34 = "Mesmo que eu não me esforce, já há uma infinidade de coisas para registrar."

1005206-35 = "Ah... há condensação nas janelas por causa da umidade."

1005206-36 = "Tenho que limpar as janelas antes que as gotas de água manchem o chão..."

1005206-41 = "[ns] Experimente escrever levemente no vidro da janela."

1005206-42 = "Professor, isso é...?"

1005206-43 = "...É um jogo de escrever cartas na janela?"

1005206-44 = "Nunca ouvi falar de tal jogo, mas..."

1005206-45 = "Hehe, as letras escritas depois de passar a água ficam lindas em contraste com o vidro turvo."

1005206-46 = "Pois bem, deixe-me escrever um pouco."

1005206-49 = "[wa:1000]― ...Isso é estranho."

1005206-52 = "- Ao contrário de escrever [wa:300] caracteres [wa:450] no papel,"

1005206-54 = "[wa:200]― Sinto-me [wa:400] animado."

1005206-57 = "[wa:1500]― Os registros são originalmente"

1005206-59 = "[wa:100]- É um meio [wa:1000] de transmitir a vontade presente para o [wa:1000] futuro."

1005206-62 = "- Quando a chuva parar e o [wa:1500] sol nascer, [wa:1000] desaparecerá."

1005206-64 = "- É um disco momentâneo [wa:450]..."

1005206-67 = "[wa:1300]― razão e verdade, [wa:2300] para registrar a racionalidade,"

1005206-69 = "- Esta placa de vidro é [wa:1700] muito [wa:500] efêmera."

1005206-72 = "[wa:900]― ...Mas [wa:2000]...É por isso que eu..."

1005206-74 = "- Gosto mais desta grande página de vidro [wa:1300] [wa:400]. [wa:1200]Hehe."

1005206-77 = "[ns] \"O que isso diz?\""

1005206-78 = "この文章ですか？"
1005206-79 = "Isso faz parte de um poema antigo que eu gosto."

1005206-80 = "Adorei este poema tanto quanto o orador amou as nuvens, mas..."

1005206-81 = "Eu tinha medo de que, se eu escrevesse no papel, meus sentimentos permaneceriam como um registro e se solidificariam como as próprias preferências de #n, então sempre guardei isso em meu coração."

1005206-82 = "Mas parece que você pode gravar o quanto quiser neste vidro de janela."

1005206-84 = "...É por isso, professor."

1005206-85 = "Por favor, mantenha o registro de hoje apenas em seu coração."

1005206-87 = "(Depois, escrevi meu coração no vidro da janela e conversei com Noah até a chuva parar.)"

