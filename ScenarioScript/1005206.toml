[translation]
1005206-1 = "Seminário Secretário Noah's Bored Break"
1005206-4 = "Tower Millennium, Seminar Conference Room"
1005206-5 = "(After the promise was forgotten and time was left, Noah went to the seminar conference room to meet with him.)"
1005206-15 = "……Ah, teacher."
1005206-16 = "I told you that today's regular consultation would be postponed... ……"
1005206-17 = "Isso é que, talvez você ainda não tenha visto minha mensagem?"
1005206-18 = "[ns] 'O meu pedido foi confirmado. "
1005206-20 = "[ns] 'Aqui eu vou para tentar aparecer lá em casa de Noah. '
1005206-21 = "Ah, então ficou bem assim."
1005206-22 = "Eu também estava pensando: 'Como é que eu vou fazer isso? "
1005206-23 = "Levei todos os livros que tinha e fui para fora... #n devido ao chuva, poucos pessoas saíam do parque. "
1005206-24 = "Se eu não tivesse o professor por perto, teria passado um dia sem nenhum tipo de atividade motivadora. "
1005206-25 = "[s] 'Nem preciso dizer que foi uma experiência muito frustrante...'."
1005206-26 = "Não é verdade! #n eu ficaria feliz por ter podido ver o professor. "
1005206-27 = "Um assunto delicado, mas... Eu sempre fui assim: sou uma pessoa que precisa estar sempre observando as coisas ao meu redor e fazer anotações para não me perder. "
1005206-28 = "De uma cena desorganizada e tumultuada, em comparação com #n a paz tranquila e sem mudanças que hoje representa. Isso é muito difícil de suportar."
1005206-29 = "Se não tivesse sido por vocês, eu nem pensaria em pedir para o professor vir... "
1005206-30 = "Tão desesperado que até meus próprios movimentos foram alterados, #n como se fossem algo incomum. ...ふふっ。"
1005206-31 = "[s1] \"Será que o Noa que causou esse tumulto...\"\n[s2] \"Não imaginei que você poderia imaginar isso. "
1005206-32 = "Claro, a rotina do Millennium é cheia de muitas mudanças e eventos. "
1005206-33 = "obviamente, o cotidiano do Millennium está cheio de diversas tumultos e eventos."
1005206-34 = "não é necessário que eu saia para registrar, já que os registros estão cheios."
1005206-35 = "Oh... as goteiras estão se formando na janela por causa do chuvéi. "
1005206-36 = "Se não limpar o vidro antes das gotas de água caírem no chão, elas poderiam danificar a parede."
1005206-41 = "[ns] Escrevo algumas palavras na superfície da janela para testar. "
1005206-42 = "Professor, isso é...?"
1005206-43 = "...Já escrever na janela para jogar, não?"
1005206-44 = "Mas eu nunca ouvi falar de um jogo desses..."
1005206-45 = "Ah, olha só! As letras escritas com água se contrastam bem contra o vidro sujo."
1005206-46 = "Então, também vou tentar escrever algo. "
1005206-49 = "……不思議です。"

1005206-52 = "― 紙に[wa:300]文字を[wa:450]書くときと違って、"
1005206-54 = "[wa:200]― 気分が[wa:400]高揚しています。"

1005206-57 = "[wa:1500]― 記録とは本来、"
1005206-59 = "[wa:100]― 現在の意志を[wa:1000]未来に伝達するための[wa:1000]手段だというのに。"
1005206-62 = "― 雨が止み、陽が登ったら消えてしまう"
1005206-64 = "― 刻の記録だなんて……"
1005206-67 = "[wa:1300]― 理性と真実、合理を記録するのに、"
1005206-69 = "― このガラスの板はあまりにも儚いですね。"
1005206-72 = "[wa:900]― ……でも……だからこそ私は、"
1005206-74 = "― Esta página grande de vidro com o [wa:1300] que eu gosto muito. [wa:1200] hehe."
1005206-77 = "[ns] \"Isso é escrito assim?\""
1005206-78 = "Esta frase, então?"
1005206-79 = "É uma parte de um antigo poema que eu gosto muito. "
1005206-80 = "Como se fizesse da forma como o falante ama as nuvens, eu também adorava este poema... "
1005206-81 = "Ou seja, se eu escrever em papel, essa sensação ficará registrada como um registro pessoal. Eu me esforcei para guardá-la só no meu coração."
1005206-82 = "Mas se eu puder escrever lá na superfície da janela, eu posso fazer isso com facilidade."
1005206-84 = "…… Então, professor."
1005206-85 = "Aqui está o registro de hoje... apenas para você saber que estou guardando tudo em meu coração."
1005206-87 = "(Depois do tempo até que a chuva parasse, eu escrevi na superfície da janela e conversei com Noah.)"
