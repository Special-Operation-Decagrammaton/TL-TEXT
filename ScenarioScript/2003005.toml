[translation]
2003005-1 = "O caminho da gastronomia está em toda parte."
2003005-2 = "（Não sei o que deu nela para agir assim...）"
2003005-3 = "（Decidi observar a competição da Haruna com uma mistura de expectativa e curiosidade.）"
2003005-6 = "Ora, Sensei. Você veio me ver."
2003005-7 = "[s1] \"Apoiar os alunos é o dever do Sensei, afinal.\"\n[s2] \"A propósito, em qual modalidade você vai participar?\""
2003005-10 = "Em qual modalidade? Não posso responder a isso. #nPorque――"
2003005-11 = "Eu vou participar de \"várias modalidades\"!"
2003005-12 = "[s] \"V-várias!? Não é só uma!?\""
2003005-13 = "Fufu, será que você entendeu?"
2003005-14 = "O quanto eu estou levando isso a sério."
2003005-15 = "[s3] \"O que será que aconteceu...\"\n[s4] \"A Haruna ficou tão séria assim...?\""
2003005-18 = "É que..."
2003005-22 = "Competidora Kurodate Haruna. A \"corrida do pão\" começará em breve. #nPor favor, dirija-se à linha de partida."
2003005-23 = "[s] \"............Entendi.\""
2003005-24 = "......Exatamente. #nMesmo que todos ao redor estejam animados com o Grande Festival Esportivo, #nnós não mudamos."
2003005-25 = "Verificar se a comida preparada para a competição é de qualidade... #nessa é a verdadeira missão do Clube de Pesquisa Gastronômica!"
2003005-26 = "[s] \"E-entendo... É isso mesmo. Boa sorte...\""
2003005-27 = "Fufu. Obrigada pelo apoio, Sensei."
2003005-31 = "Então... vou saborear a corrida do pão com todas as minhas forças."
2003005-34 = "（Haruna caminhou com passos leves.）"
2003005-38 = "（Todos os competidores se alinharam na linha de partida, e então――）"
2003005-47 = "（Haruna acompanhou o grupo da frente e finalmente chegou ao ponto de retorno onde os pães estavam pendurados!）"
2003005-51 = "Fufu... finalmente chegou o momento."
2003005-52 = "[s] \"Haruna! Boa sorte!\""
2003005-56 = "Então, vamos apreciar o ponto alto da corrida do pão, não é?"
2003005-60 = "（Mastigando）"
2003005-65 = "（Mastigando intensamente）"
2003005-69 = "......"
2003005-70 = "[s] \"Ué, a expressão da Haruna está...?\""
2003005-75 = "Isso é absolutamente inaceitável!!"
2003005-76 = "Só porque é um pão para competição, não deveriam ter sido tão negligentes!"
2003005-77 = "A superfície está seca e o interior está esfarelando e com gosto de farinha..."
2003005-78 = "O tempo de fermentação foi respeitado? #nE o pré-aquecimento do forno? Foi configurado na temperatura correta?"
2003005-79 = "......Eu realmente não consigo acreditar. #nMesmo que não possam garantir o sabor supremo, o ponto forte da produção em massa industrial #né justamente elevar o padrão mínimo――"
2003005-80 = "Opa!? A competidora Haruna abandonou a prova de repente e começou a criticar o pão!?"
2003005-85 = "（...Depois disso, o protesto de Haruna sobre o sabor do pão continuou por um tempo...）"
2003005-88 = "（E então, chegou a hora da próxima modalidade.）"
2003005-89 = "[s] \"B-bem. Qual é a próxima prova!?\""
2003005-90 = "Sim, é a corrida de obstáculos."
2003005-91 = "[s] \"（Dessa vez é uma modalidade que não parece ter relação com comida!）\""
2003005-94 = "Participei porque ouvi dizer que poderia beber uma bebida isotônica, mas..."
2003005-95 = "O que é essa doçura!? Com tanto açúcar, #nisso não acaba atrapalhando a absorção de líquidos!?"
2003005-96 = "Claro, é importante repor energia com açúcar após o exercício, mas..."
2003005-97 = "Colocar açúcar a ponto de deixar a boca pegajosa #né um problema, na minha opinião!"
2003005-99 = "Bebida isotônica deve ser isotônica... deveria ter a doçura adequada!"
2003005-100 = "Se querem fazer algo doce, #npor que não pensam em outro tipo de bebida!?"
2003005-101 = "[s] \"Até na corrida de obstáculos ela não poupa nas críticas!?\""
2003005-102 = "Ainda não acabou, sabe?"
2003005-106 = "Ouvi dizer que ganharia um donut de creme como prêmio de participação na prova de arco e flecha, mas..."
2003005-107 = "O creme dentro deste donut #nnão é creme de leite! É creme vegetal!"
2003005-109 = "O creme de leite puro é feito extraindo a gordura do leite cru. #nEm contrapartida, o creme vegetal é um creme feito a partir de óleos vegetais..."
2003005-110 = "Por mais que tentem imitar o creme de leite, a diferença na riqueza e no sabor é inegável!"
2003005-111 = "Se for usar como prêmio, certifique-se de entender bem sobre o alimento antes!"
2003005-114 = "（...Em todas as competições, Haruna faz discursos apaixonados sobre comida...）"
2003005-117 = "...Finalmente, é a última prova."
2003005-118 = "A corrida do doce... uma competição de alta dificuldade onde é preciso encontrar o doce escondido na farinha usando apenas a boca."
2003005-119 = "Sensei. Por favor, continue torcendo por mim até o fim, está bem?"
2003005-120 = "[s] \"S-sim. Pode deixar...\""
2003005-124 = "（Haruna se posiciona na linha de partida pela enésima vez...）"
2003005-135 = "（Ela correu sem demonstrar qualquer sinal de cansaço até a caixa onde o doce estava escondido e enterrou o rosto nela...!）"
2003005-139 = "Na liderança — a competidora Haruna Kurodate, da Academia Gehenna!"
2003005-143 = "Que velocidade incrível! Será que o desempenho dela nas competições anteriores foi apenas uma farsa!?"
2003005-144 = "Correndo, correndo e correndo —"
2003005-150 = "E cruza a linha de chegada!!"
2003005-154 = "...Oh? A competidora Haruna não para mesmo depois de cruzar a linha de chegada! #nPara onde será que ela está indo!?"
2003005-159 = "Haa, haa... Sensei! Você viu?"
2003005-160 = "[s] \"Claro! Parabéns pelo primeiro lugar!\""
2003005-161 = "Fufufu..."
2003005-164 = "[wa:500]— [log=하루나 체육복ND]Foi uma competição[wa:1300] deliciosa[wa:300] e emocionante, não foi?[/log]"
2003005-166 = "— [log=하루나 체육복ND]Embora meu rosto[wa:300] tenha ficado[wa:250] um pouco sujo...[/log]"
2003005-169 = "[wa:500]— [log=하루나 체육복ND]Mas, encontrar o doce[wa:1050] dentro da farinha,[wa:320] que pode ser considerada[wa:780] uma área desconhecida,[/log]"
2003005-171 = "[wa:100]— [log=하루나 체육복ND]usando apenas os meus sentidos,[wa:1650] foi...[/log]"
2003005-174 = "[wa:500]— [log=하루나 체육복ND]Sinto que é um pouco[wa:400] parecido com o processo[/log]"
2003005-176 = "— [log=하루나 체육복ND]de buscar[wa:400] pela gastronomia...[/log]"
2003005-179 = "— [log=하루나 체육복ND]foi muito[wa:400] revigorante.[/log]"
2003005-182 = "[wa:200]— [log=하루나 체육복ND]Ah,[wa:800] é verdade![/log]"
2003005-185 = "[wa:700]— [log=하루나 체육복ND]Sensei,[wa:850] o que acha?[/log]"
2003005-188 = "— [log=하루나 체육복ND]Este doce que peguei[wa:1050] agora há pouco...[/log]"
2003005-190 = "— [log=하루나 체육복ND]Gostaria que eu[wa:1000] dividisse com você?[/log]"
2003005-193 = "（Consegui recusar o doce da Haruna enquanto voltávamos juntos）"
2003005-194 = "（Mesmo tendo passado o tempo todo protestando sobre a comida, Haruna estava estranhamente de bom humor）"
