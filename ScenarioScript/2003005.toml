[translation]
2003005-1 = "美食の道は、どこにでもありますわ"
2003005-2 = "（どういう風の吹き回しかわからなかったけれど……）"
2003005-3 = "（期待半分、興味半分でハルナの競技を見守ることにした）"
2003005-6 = "あら、先生。来てくださったのですね。"
2003005-7 = "[s1] \"生徒の応援は先生の役目だからね。\"\n[s2] \"ところで、どの種目に出るの？\""
2003005-10 = "どの種目？それは答えられませんわね。#n何故なら――"
2003005-11 = "「色んな種目」に出るのですから！"
2003005-12 = "[s] \"い、色んな！？ひとつじゃなくて！？\""
2003005-13 = "ふふっ、わかっていただけたでしょうか？"
2003005-14 = "それだけ私が本気だということを。"
2003005-15 = "[s3] \"一体何がどうなって……。\"\n[s4] \"ハルナがここまで本気になったの……？\""
2003005-18 = "それはですね……。"
2003005-22 = "[ruby=くろだて]黒舘[/ruby]ハルナ選手。間もなく「パン食い競争」が始まります。#nスタートラインまでお越しください。"
2003005-23 = "[s] \"…………なるほど。\""
2003005-24 = "……そうです。#nたとえ大運動会中で周りが浮かれていようとも、#n私たちは変わりません。"
2003005-25 = "競技のために用意された食べ物がちゃんとしたものなのか……#nそれを確かめることこそ、美食研究会の使命と言えるでしょう！"
2003005-26 = "[s] \"う、うん……そうだね。頑張って……。\""
2003005-27 = "ふふっ。応援ありがとうございます、先生。"
2003005-31 = "それでは……パン食い競争、全力で味わってまいりますわ。"
2003005-34 = "（ハルナは軽快な足取りで歩いていった）"
2003005-38 = "（すべての選手がスタートラインに並び、そして――）"
2003005-47 = "（ハルナはトップ集団に食らいつきながら、ついにパンがぶら下がっている折り返し地点に到達した！）"
2003005-51 = "ふふっ……ようやくこの時が来ましたわね。"
2003005-52 = "[s] \"ハルナー！頑張れー！\""
2003005-56 = "では、パン食い競争の醍醐味……いただきましょうか？"
2003005-60 = "（もぐもぐ）"
2003005-65 = "（もぐもぐもぐもぐ）"
2003005-69 = "……。"
2003005-70 = "[s] \"あれ、ハルナの表情が……？\""
2003005-75 = "完っ全にダメですわ！！"
2003005-76 = "競技用のパンだからといって、甘く考え過ぎではありませんか！？"
2003005-77 = "表面は乾ききっているし、中もパサパサで粉っぽい……。"
2003005-78 = "発酵時間はきちんと守られているのですか？#nオーブンの予熱は？決められた温度に設定されていたのですか？"
2003005-79 = "……本当に信じられませんわ。#n最高の味を保証できなくとも、最低水準を引き上げられるのが、#n工場における大量生産の強みなのに――"
2003005-80 = "おおっと！？ハルナ選手、突然競技を放棄しパンのダメ出しを始めましたーっ！？"
2003005-85 = "（……その後も、パンの味に対するハルナの抗議はしばらく続いた……）"
2003005-88 = "（そして、次の競技の時間になった）"
2003005-89 = "[s] \"よ、よし。次の試合は！？\""
2003005-90 = "はい、障害物競走です。"
2003005-91 = "[s] \"（今度は食と関係なさそうな種目だ！）\""
2003005-94 = "イオン飲料が飲めるということで参加しましたが……。"
2003005-95 = "何ですかこの甘さは！こんなに糖分が多いと、#nむしろ水分の吸収を妨げてしまうのでは！？"
2003005-96 = "もちろん運動後の身体に糖分でエネルギー補給を図るのは大切ですが……。"
2003005-97 = "口の中がベタつくほど糖分を入れるのは、#nさすがに問題があると思いますわよ？"
2003005-99 = "イオン飲料はイオン飲料……適切な甘さにするべきです！"
2003005-100 = "甘いものを作りたいなら、#n別の種類の飲み物を考えてはいかがでしょうか！？"
2003005-101 = "[s] \"障害物競走でも容赦ない評価が！？\""
2003005-102 = "まだ終わりませんわよ？"
2003005-106 = "アーチェリー種目の参加賞で、#n生クリームドーナッツが頂けると聞きましたが……。"
2003005-107 = "このドーナツに入っているクリーム、#n生クリームではありません！植物性クリームです！ "
2003005-109 = "純粋な生クリームは生乳から乳脂肪を抽出して作られます。#n対して植物性クリームは植物性油脂から作られたクリーム……。"
2003005-110 = "どれだけ生クリームに似せたとしても、コクや旨味の違いは見逃せませんわ！"
2003005-111 = "賞品にするのでしたら、その食べ物をよく理解してからになさってください！"
2003005-114 = "（……どの競技でも、ハルナは食べ物に対して熱弁を振るい……）"
2003005-117 = "……いよいよ最後の試合ですわね。"
2003005-118 = "飴食い競争……小麦粉の中に隠された飴を口だけで見つける、高難度の競技です。"
2003005-119 = "先生。最後まで応援、よろしくお願いしますね？"
2003005-120 = "[s] \"う、うん。任せて……。\""
2003005-124 = "（ハルナは幾度目かのスタートラインに立ち……）"
2003005-135 = "（疲労感など全く感じさせない走りで飴が隠された箱まで辿り着き、顔を埋めた……！）"
2003005-139 = "先頭は――ゲヘナ学園の黒舘ハルナ選手だーっ！"
2003005-143 = "すごいスピードです！これまでの競技の様子は嘘だったのでしょうか！？"
2003005-144 = "走って走って走って――"
2003005-150 = "そのままゴールインっ！！"
2003005-154 = "……おや？ハルナ選手、ゴールラインを超えても止まりません！#n一体彼女はどこに向かっているのでしょうか！？"
2003005-159 = "はぁ、はぁ……先生！ご覧になりましたか？"
2003005-160 = "[s] \"もちろん！1位おめでとう！\""
2003005-161 = "ふふふ……。"
2003005-164 = "[wa:500]― [log=하루나 체육복ND]心躍る、[wa:1300]美味しい[wa:300]競技でしたわね。[/log]"
2003005-166 = "― [log=하루나 체육복ND]顔は[wa:300]少し[wa:250]汚れてしまいましたけれども……。[/log]"
2003005-169 = "[wa:500]― [log=하루나 체육복ND]ですが、[wa:1050]未知の[wa:320]領域とも言える[wa:780]小麦粉の中から[/log]"
2003005-171 = "[wa:100]― [log=하루나 체육복ND]自分の感覚だけで[wa:1650]飴を見つける行為は……。[/log]"
2003005-174 = "[wa:500]― [log=하루나 체육복ND]美食を[wa:400]探求する過程と、[/log]"
2003005-176 = "― [log=하루나 체육복ND]どこか[wa:400]似ているような気がして……[/log]"
2003005-179 = "― [log=하루나 체육복ND]とても[wa:400]新鮮でした。[/log]"
2003005-182 = "[wa:200]― [log=하루나 체육복ND]あ、[wa:800]そうです！[/log]"
2003005-185 = "[wa:700]― [log=하루나 체육복ND]先生、[wa:850]いかがでしょう？[/log]"
2003005-188 = "― [log=하루나 체육복ND]先程とった[wa:1050]この飴……[/log]"
2003005-190 = "― [log=하루나 체육복ND]分けて[wa:1000]差し上げましょうか？[/log]"
2003005-193 = "（ハルナの飴をなんとか断りながら、一緒に戻った）"
2003005-194 = "（食べ物に抗議ばかりしていたはずなのに、ハルナは妙に機嫌がよかった）"
