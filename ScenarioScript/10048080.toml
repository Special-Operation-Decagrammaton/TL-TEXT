[translation]
10048080-1 = "Episódio 8: O Cruzamento da Verdade e da Mentira"
10048080-2 = "Wild Hunt - Terreno Baldio"
10048080-5 = "Uma ladra benevolente...!"
10048080-6 = "Como você sabia sobre nós...!?"
10048080-7 = "No palco, figurantes desconhecidos se juntaram—"
10048080-8 = "Uma encenação vívida colore o caminho à frente."
10048080-9 = "E todas elas foram coisas lindas que fizeram a equipe de monitoramento do dormitório dançar."
10048080-10 = "...Foi o suficiente para perceber a presença de vocês, senhoritas."
10048080-11 = "Primeiro, talvez eu devesse começar agradecendo?"
10048080-12 = "Graças a vocês, senhoritas, parece que o pano desta noite poderá ser baixado sem problemas."
10048080-13 = "É, é mesmo...?"
10048080-14 = "Fico feliz que pudemos ser úteis..."
10048080-15 = "(Essa sensação, será que o roubo do quadro foi um sucesso...?)"
10048080-16 = "Bem, então, nós vamos indo..."
10048080-17 = "—Não há nada mais atraente e perigoso do que uma gentileza sem custo."
10048080-18 = "Porque não se sabe o que está escondido por trás dela."
10048080-19 = "Vamos, vocês poderiam me contar?"
10048080-20 = "Por que, exatamente, vocês me ajudaram?"
10048080-21 = "Foi apenas uma gentileza."
10048080-22 = "Hum... isso é algo que está muito longe da minha estética."
10048080-23 = "A teoria da bondade humana — e a sabedoria universal que reside no povo."
10048080-24 = "São coisas que não existem na minha estética."
10048080-25 = "...Que falta de sensibilidade."
10048080-26 = "Fufu, esse tipo de fala não é nada elegante."
10048080-27 = "Mesmo que eu desse as mãos para a teoria da bondade humana—"
10048080-28 = "As ações de vocês, senhoritas, como passos de dança — são um tanto quanto desviantes."
10048080-29 = "Ah, armar uma armadilha para uma ladra cujo rosto nem conhecem—"
10048080-30 = "—Que valsa apaixonada. Mas, mesmo que comecem a tocar uma música de repente, eu tenho a minha própria melodia."
10048080-31 = "Vamos... vocês poderiam me contar o objetivo e as intenções de vocês?"
10048080-37 = "(...Nossa intenção não pode ser descoberta de jeito nenhum)"
10048080-38 = "(Se ela souber que pretendemos entregar uma falsificação, não sairemos ilesas)"
10048080-39 = "(...Mas o que eu faço?)"
10048080-40 = "(O que eu devo dizer para sair dessa situação?)"
10048080-42 = "Ah, que triste. Nós não conseguimos dar as mãos."
10048080-46 = "E-ei, espere..."
10048080-47 = "Sim, não se preocupe. A apresentação de vocês, senhoritas, terminou."
10048080-48 = "Sendo assim — agora, vocês só precisam seguir os meus passos."
10048080-49 = "Hã?"
10048080-56 = "...O quadro!"
10048080-61 = "Ah...!? Por que a bolsa está aberta!?"
10048080-62 = "F-foi roubado!"
10048080-63 = "Desde quando...!?"
10048080-64 = "Não pode ser...!"
10048080-65 = "Se você realmente quer proteger algo precioso, deve estar consciente até do seu olhar."
10048080-67 = "Pois as coisas belas — escapam por entre os dedos no momento em que você desvia o olhar."
10048080-68 = "Vamos, deixe-me ver a sua verdadeira forma—"
10048080-69 = "(N-não...!!)"
10048080-70 = "(Acabou...!)"
10048080-73 = "Hum...?"
10048080-74 = "Isso é... não é nada belo. Tudo está sem brilho."
10048080-78 = "……Hã?"
10048080-79 = "Por que as senhoritas estão com uma falsificação de 'Quem admira o roxo e o azul' em mãos?"
10048080-80 = "……Eh?"
10048080-81 = "(Q-q-q-que diabos ela está dizendo?)"
10048080-82 = "(F-falsificação?)"
10048080-83 = "(O quadro que o cliente trouxe é uma falsificação...? Por quê?)"
10048080-84 = "(Não deveria ser possível...?? Hã? Quê? Como assim!?)"
10048080-85 = "(Não pode ser, não acredito nissooo!!)"
10048080-89 = "(O quadro que estamos segurando é uma falsificação...?)"
10048080-90 = "(...Não, a Ladra da Benevolência está enganada.)"
10048080-91 = "(O que trouxemos do depósito é a obra original, com certeza...!)"
10048080-92 = "(A falsificação é a outra...!)"
10048080-93 = "(...Não, se for esse o caso, é simples.)"
10048080-94 = "(Se a ladra levar a falsificação agora, sairá exatamente como planejamos...)"
10048080-100 = "(Mas, e se por um acaso, na verdade, realmente...)"
10048080-101 = "(...Se a ladra estiver dizendo a verdade?)"
10048080-102 = "(E se o quadro que temos for uma cópia?)"
10048080-103 = "(A obra original desaparecerá deste mundo para sempre...)"
10048080-104 = "(Afinal, o que é a verdade...?)"
10048080-108 = "[ns] \"Ei, pessoal.\""
10048080-110 = "Sensei!? Como você chegou aqui...!"
10048080-111 = "[s] \"Eu senti que todos estariam aqui.\""
10048080-115 = "……Sensei?"
10048080-116 = "[s] \"Como você tem passado? Aki...\""
10048080-120 = "[ns] \"……Ladra da Benevolência.\""
10048080-121 = "……Então você se lembra de mim."
10048080-122 = "Fufu..."
10048080-123 = "Fu, fufufu... fufufufufu."
10048080-124 = "Eh...?"
10048080-125 = "I-isso é meio assustador, sabia...!?"
10048080-126 = "S-Sensei. Por acaso você conhece a Ladra da Benevolência...?"
10048080-127 = "[s] \"Essa garota também é minha aluna.\""
10048080-128 = "Minha... aluna..."
10048080-132 = "Sendo assim, gostaria de lhe perguntar uma coisa."
10048080-133 = "……As palavras da Ladra da Benevolência de agora há pouco, são todas verdadeiras?"
10048080-134 = "[s] \"Não é meu papel julgar o que é mentira ou verdade.\""
10048080-138 = "[ns] \"Eu apenas acredito nos meus alunos até o fim.\""
10048080-139 = "Até o fim... apenas acreditar."
10048080-140 = "Então, eu também lhe farei uma pergunta, Sensei."
10048080-141 = "Aquelas senhoritas também são suas alunas?"
10048080-142 = "[s] \"Com certeza.\""
10048080-143 = "……Fufu, eu imaginei que fosse o caso."
10048080-144 = "É uma pena, mas não há o que fazer."
10048080-145 = "É justamente por ser esse tipo de Sensei que eu..."
10048080-146 = "……"
10048080-147 = "Sendo assim, embora seja um pouco cedo, vamos encerrar o espetáculo."
10048080-148 = "A existência do Sensei é o que dá peso de verdade às palavras de ambos os lados."
10048080-149 = "Ou seja... desta vez, poderemos conversar na mesma mesa."
10048080-150 = "Poderia... conversar comigo mais uma vez?"
10048080-151 = "Por que... você me estendeu a mão?"
10048080-152 = "E por que... você possuía uma falsificação de 'Quem admira o roxo e o azul'?"
10048080-157 = "……."
10048080-158 = "……Você disse que o quadro que temos é uma falsificação, não disse?"
10048080-159 = "Sim, sem dúvida."
10048080-160 = "É verdade, então?"
10048080-161 = "No que diz respeito à arte — eu não diria uma mentira. #nSeria contra a minha estética."
10048080-162 = "……."
10048080-163 = "Entendido. Nesse caso, nós também falaremos."
10048080-164 = "Es... espere um pouco, Miyo!"
10048080-165 = "Eu acho que devemos falar a verdade."
10048080-166 = "Se o que o ladrão fantasma disse for verdade, significa que o cliente nos enganou."
10048080-168 = "Nós vamos contar — sobre o nosso objetivo."
