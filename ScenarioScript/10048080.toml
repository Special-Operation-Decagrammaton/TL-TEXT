[translation]
10048080-1 = "第8話;真偽の交差"
10048080-2 = "ワイルドハント・空き地"
10048080-5 = "慈愛の怪盗……！"
10048080-6 = "どうやって私たちのことを……！？"
10048080-7 = "舞台には、見知らぬエキストラが加わり――"
10048080-8 = "鮮やかな演出が行く手を彩ってくれる。"
10048080-9 = "そして、どれも寮監隊を踊らせてくれる美しいものでした。"
10048080-10 = "……お嬢さん方の存在を察するには、十分でしたよ。"
10048080-11 = "まずは、お礼を申し上げるのが先でしょうか？"
10048080-12 = "お嬢さん方のおかげで、今宵の幕は無事に下ろせそうですので。"
10048080-13 = "そ、そうですか……。"
10048080-14 = "お力になれたのなら、よかったです……。"
10048080-15 = "（この感じ、絵の盗みは成功している…？）"
10048080-16 = "それでは、私たちはこれで……。"
10048080-17 = "――代償のない好意ほど、魅力的で危険なものはない。"
10048080-18 = "その裏に何が潜んでいるのか――分かりませんからね。"
10048080-19 = "さあ、語っていただけますか？"
10048080-20 = "いったい何故、[ruby=わたくし]私[/ruby]を助けてくれたのか。"
10048080-21 = "ただの好意です。"
10048080-22 = "ふむ……それは、私の美学からは最も遠いところにあるものですよ。"
10048080-23 = "性善説も――民衆に宿る普遍的な教養も。"
10048080-24 = "私の美学には存在しないものです。"
10048080-25 = "……趣がないですね。"
10048080-26 = "ふふっ、そのような物言いは美しくありませんよ。"
10048080-27 = "仮に私が性善説と手を取り合ったとして――"
10048080-28 = "お嬢さん方の行動は、ダンスのステップとしては――些か、逸脱しているのですから。"
10048080-29 = "嗚呼、顔も知らぬ怪盗のために罠を仕掛けるだなんて――"
10048080-30 = "――なんて情熱的なワルツ。#nですが、急に曲をかけられても私には私の旋律があるのです。"
10048080-31 = "さあ……お嬢さん方の目的と狙いを、お聞かせ願えますか？"
10048080-37 = "（……絶対に、私たちの狙いがバレてはいけない）"
10048080-38 = "（贋作を渡すつもりと知られたら、ただではすまないでしょうから）"
10048080-39 = "（……でもどうすれば？）"
10048080-40 = "（何と言えば、この状況を切り抜けられるんだろう）"
10048080-42 = "嗚呼、悲しいですね。私たちは手を取り合うことなどできなかった。"
10048080-46 = "え、えっと……。"
10048080-47 = "ええ、構いませんよ。お嬢さん方の演奏は終わった。"
10048080-48 = "であれば――今度は私のステップについてきていただくだけですから。"
10048080-49 = "えっ？"
10048080-56 = "……絵が！"
10048080-61 = "はっ……！？どうしてカバンが開いて！？"
10048080-62 = "ぬ、盗まれてる！"
10048080-63 = "一体、いつの間に……！？"
10048080-64 = "そんな……！"
10048080-65 = "本当に大切なものを守りたいのであれば、視線さえも意識しなければなりませんよ。"
10048080-67 = "美しいものは――目を離した隙に、指の間からすり抜けてしまうのですから。"
10048080-68 = "さあ、その姿を見せていただきましょうか――"
10048080-69 = "（だ、ダメ……！！）"
10048080-70 = "（終わった……！）"
10048080-73 = "ふむ……？"
10048080-74 = "これは――美しくありませんね。全てがくすんでいる。"
10048080-78 = "……えっ？"
10048080-79 = "何故お嬢さん方が『誰が紫、青を愛でるのか』の贋作を手にしているのですか？"
10048080-80 = "……へ？"
10048080-81 = "（なななな、何言ってるのあいつ？）"
10048080-82 = "（が、贋作？）"
10048080-83 = "（依頼人が持ってきた絵が、贋作……？どうして？）"
10048080-84 = "（そんなわけないはずなのに……？？えっ？はっ？えっ！？）"
10048080-85 = "（噓だぁぁああーーっ！！）"
10048080-89 = "（私たちが持ってる絵が、贋作……？）"
10048080-90 = "（……いや、慈愛の怪盗は勘違いしてるんです）"
10048080-91 = "（収蔵庫から持ってきたものが真作である、と……！）"
10048080-92 = "（贋作はあっちなのに……！）"
10048080-93 = "（……いや、それなら話は簡単です）"
10048080-94 = "（怪盗がこのまま贋作を持ち去れば、私たちの狙い通りに……）"
10048080-100 = "（でも万が一、本当の本当に――）"
10048080-101 = "（……怪盗が本当のことを言っていたら？）"
10048080-102 = "（私たちが持ってる絵が、ニセモノだったら？）"
10048080-103 = "（真作が、この世から永遠に消えてしまう……）"
10048080-104 = "（いったい、何が正しいの……？）"
10048080-108 = "[ns] \"やっほ、みんな。\""
10048080-110 = "先生！？どうやってここに……！"
10048080-111 = "[s] \"なんだかみんなここに居る気がして。\""
10048080-115 = "……先生？"
10048080-116 = "[s] \"元気だった？アキ……。\""
10048080-120 = "[ns] \"……慈愛の怪盗さん。\""
10048080-121 = "……私のことを覚えていてくださったのですね。"
10048080-122 = "ふふっ……。"
10048080-123 = "ふ、ふふふっ……ふふふふふっ。"
10048080-124 = "えっ……？"
10048080-125 = "な、なんか気味が悪いんですけど……！？"
10048080-126 = "せ、先生。まさか慈愛の怪盗と知り合いなんですか……？"
10048080-127 = "[s] \"この子も私の生徒だよ。\""
10048080-128 = "私の……生徒……。"
10048080-132 = "それでしたら、一つお聞きしたいのですが。"
10048080-133 = "……さっきの慈愛の怪盗の言葉は、全て本当のことなんでしょうか？"
10048080-134 = "[s] \"噓か本当かを判断するのは、私の役割じゃないよ。\""
10048080-138 = "[ns] \"私は、自分の生徒を最後まで信じるだけ。\""
10048080-139 = "最後まで……信じるだけ。"
10048080-140 = "それでは、私からも一つお聞きします、先生。"
10048080-141 = "あのお嬢さん方も、貴方の生徒なのですか？"
10048080-142 = "[s] \"もちろん。\""
10048080-143 = "……ふふ、やはりそうでしたか。"
10048080-144 = "残念ですが、仕方ありませんね。 "
10048080-145 = "そんな先生だからこそ、私は――"
10048080-146 = "……。"
10048080-147 = "であれば――少し早いですが幕引きといたしましょう。"
10048080-148 = "先生の存在、それこそが双方の言の葉に真実の重みを乗せてくれる。"
10048080-149 = "つまり――今度こそ、同じテーブルで語らうことができるということ。"
10048080-150 = "いま一度……語ってはいただけないでしょうか？"
10048080-151 = "何故――私に手を差し伸べたのか、を。"
10048080-152 = "そしてなぜ……『誰が紫、青を愛でるのか』の贋作を所持していたのかを？"
10048080-157 = "……。"
10048080-158 = "……私たちが持っている絵が、贋作だと言いましたよね。"
10048080-159 = "ええ、間違いなく。"
10048080-160 = "本当なんですね？"
10048080-161 = "こと芸術において――私が偽りを口にすることはありません。#n美学に反しますので。"
10048080-162 = "……。"
10048080-163 = "分かりました。でしたら、私たちもお話します。"
10048080-164 = "まっ……み、ミヨ、ちょっと待ってください！"
10048080-165 = "ちゃんと話すべきだと思うんです。"
10048080-166 = "怪盗の話が本当なら、依頼人が私たちを騙したことになるのですから。"
10048080-168 = "お話します――私たちの目的を。"
