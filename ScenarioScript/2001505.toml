[translation]
2001505-1 = "O motivo de querer ser adulta"
2001505-2 = "Sensei, vim aqui para ajudar!"
2001505-3 = "……Ué, não tem ninguém."
2001505-4 = "Será que foi ao banheiro?"
2001505-5 = "Ah, não! A mesa está uma bagunça! Se a Mimori-senpai ou alguém visse isso, eu levaria uma bronca daquelas!"
2001505-9 = "Ah, café. Será que o Sensei deixou pela metade?"
2001505-10 = "……."
2001505-14 = "Gole……."
2001505-18 = "Que amargo!!!"
2001505-19 = "Eca, é isso que os adultos bebem...? Por que não tomam um leite com banana, que é bem melhor……."
2001505-20 = "Ser adulto é difícil mesmo…… quer dizer, o café está frio."
2001505-21 = "……Ah, tive uma ideia!"
2001505-22 = "Se eu preparar um café bem quentinho para o Sensei……"
2001505-23 = "Isso não seria exatamente o que uma \"dama elegante\" faria?"
2001505-24 = "Naquele drama com um toque mais adulto que vi ontem,"
2001505-25 = "tinha uma cena bem parecida com essa!"
2001505-26 = "Certo, sendo assim, vou preparar o \"Blend Especial da Kaede-chan\"!"
2001505-30 = "Hum hum~♪"
2001505-31 = "Fazendo isso aqui e aquilo……"
2001505-33 = "Hum…… será que está bom assim?"
2001505-34 = "Pronto, o Blend Especial da Kaede-chan, versão ultra!"
2001505-35 = "Quando o Sensei voltar e vir isso, com certeza……"
2001505-36 = "Ehehe! Sensei, não precisa disso tudo, mesmo que me pergunte qual brinquedo eu quero de repente……!"
2001505-37 = "……É, de qualquer jeito, OK! Vou deixar isso na mesa do Sensei……."
2001505-41 = "Opa!?"
2001505-43 = "A-aaaah!?"
2001505-49 = "Ó café!?"

2001505-51 = "[ns] \"……Por enquanto, pode me explicar esse desastre?\""
2001505-52 = "Bem, é que…… eu só vim aqui para ajudar o Sensei……."
2001505-53 = "Aí, quando cheguei no Schale, o Sensei não estava e a mesa estava uma bagunça……."
2001505-54 = "E, bem, pensei que o café estava frio, então achei que o Sensei ficaria feliz se eu fizesse um novo……."
2001505-55 = "E então, eu me esforcei, mas……."
2001505-56 = "[s] \"Kaede.\""
2001505-57 = "Ai! Me desculpa!"
2001505-58 = "Eu, eu pensei que talvez você fosse me elogiar, ou que se desse certo, você compraria um brinquedo para mim……!"
2001505-59 = "Pensei que, se eu conseguisse fazer isso, eu me tornaria uma dama elegante……"
2001505-60 = "Mas, sabe, não deu muito certo, quer dizer, é que……."
2001505-61 = "Eu realmente pretendia ajudar……."
2001505-62 = "Eu não vim aqui com a intenção de fazer essa bagunça……."
2001505-63 = "[s] \"Calma, Kaede.\""
2001505-64 = "Uuu……!"
2001505-65 = "Waaaaaah! Me desculpa!"
2001505-66 = "Eu vim sem avisar e fiz essa bagunça toda……!"
2001505-67 = "É verdade que eu deixei tudo uma confusão……."
2001505-68 = "Me desculpa……."
2001505-69 = "O Sensei já é tão ocupado……."
2001505-70 = "E no fim, eu só causei problemas……."
2001505-71 = "Não fui útil em nada……."
2001505-72 = "Uuu……."
2001505-73 = "[s] \"Kaede, acalme-se.\""
2001505-74 = "……？"
2001505-75 = "[s] \"Desculpe, eu não me expressei bem. Por enquanto, espere um pouco.\""
2001505-76 = "???"
2001505-78 = "[ns] \"Aqui, um chocolate quente. Beba isso para se acalmar um pouco.\""
2001505-79 = "M-mas, como uma dama, eu deveria tomar café preto……."
2001505-80 = "[s] \"Você não gosta de chocolate quente?\""
2001505-81 = "…………Gosto."
2001505-82 = "(Gole)"
2001505-83 = "[s] \"Já que estamos aqui, posso te perguntar uma coisa?\""
2001505-84 = "……Sim."
2001505-85 = "[s] \"A Kaede sempre se esforça muito para se tornar uma dama maravilhosa, não é?\""
2001505-86 = "…………Sim."
2001505-87 = "[s] \"Por que você faz isso?\""
2001505-88 = "……."
2001505-89 = "Isso é……."
2001505-90 = "[s] \"Sim.\""
2001505-91 = "……."
2001505-92 = "Antigamente, eu era uma criança muito travessa……."
2001505-93 = "[s] \"Uma criança travessa?\""
2001505-94 = "Eu vivia no interior……."
2001505-95 = "Corria para todo lado, pelas montanhas e pelo mar."
2001505-96 = "Até o ensino fundamental, eu passava o tempo assim, indo a vários lugares e fazendo travessuras."
2001505-97 = "Eu só fazia um monte de coisas que achava divertidas."
2001505-98 = "O lugar onde eu morava era bem isolado, mesmo dentro de Hyakkiyako,"
2001505-99 = "e quando entrei no ensino médio, vim para cá pela primeira vez."
2001505-100 = "Foi a primeira vez que andei de trem também."
2001505-101 = "Mas, quando vi o trem pela primeira vez, quem diria que precisava tirar os sapatos para entrar, né!? Todo mundo ficou me olhando de um jeito estranho!"
2001505-102 = "Ah."
2001505-103 = "Bem, não é sobre isso que eu queria falar……."
2001505-104 = "[s] \"Entendo, e depois?\""
2001505-105 = "Depois, quando cheguei aqui."
2001505-106 = "Eu fiquei impressionada."
2001505-107 = "Especialmente com a Tsubaki-senpai e a Mimori-senpai! As duas são tão legais, elegantes e simplesmente incríveis!"
2001505-108 = "Eu pensei que queria ser como elas."
2001505-109 = "Não ser como sou agora, mas me tornar uma dama digna de ser um membro do Clube de Treinamento."
2001505-110 = "Eu queria me esforçar."
2001505-111 = "Pensei que, se eu me esforçasse muito, muito mesmo, eu também conseguiria me tornar uma dama maravilhosa como elas."
2001505-112 = "……."
2001505-113 = "……Mas não foi bem assim."
2001505-114 = "Mesmo tendo me esforçado bastante, eu acabo fazendo isso várias vezes……."
2001505-115 = "Todo mundo diz que sou estranha e eu só causo problemas……."
2001505-116 = "……Talvez eu não tenha mudado nada."
2001505-117 = "No fim das contas, uma criança como eu, não importa o quanto se esforce……"
2001505-118 = "será que eu nunca vou conseguir ser como as senpais?"
2001505-119 = "[s] \"Isso não é verdade.\""
2001505-120 = "……Sensei?"
2001505-121 = "[s1] \"Eu sei muito bem\"\n[s2] \"o quanto a Kaede se esforça sempre.\""
2001505-122 = "……?"
2001505-123 = "……?"
2001505-124 = "[s3] \"É verdade que, às vezes, você comete erros como hoje.\"\n[s4] \"Mas isso é algo que acontece com qualquer um.\""
2001505-125 = "…………。"
2001505-126 = "…………。"
2001505-127 = "[s5] \"Por isso, está tudo bem.\"\n[s6] \"A Kaede está crescendo no ritmo dela, tenho certeza.\""
2001505-128 = "Crescendo……."
2001505-129 = "Crescendo……."
2001505-130 = "[s] \"Se estiver difícil, pode vir falar comigo ou com os veteranos, está bem?\""
2001505-131 = "……Posso mesmo?"
2001505-132 = "[s] \"Afinal, eu sou o sensei da Kaede.\""
2001505-133 = "……。"
2001505-134 = "……Entendi."
2001505-135 = "Sim, entendi!"
2001505-136 = "É verdade, acho que você tem razão!"
2001505-137 = "Nossa, nem sei mais por que eu estava tão preocupada assim!?"
2001505-138 = "Tcharam! Kaede totalmente recuperada!"
2001505-139 = "Obrigada, Sensei. Eu vou me esforçar, nem que seja um pouquinho de cada vez!"
2001505-140 = "Por isso, continue olhando por mim, tá?"
2001505-141 = "[s7] \"É claro que vou continuar olhando...\"\n[s8] \"...Mas antes disso, pode me ajudar a arrumar a bagunça?\""
2001505-142 = "Ah, eu tinha esquecido!?"
2001505-143 = "Ah, eu tinha esquecido!?"
2001505-144 = "Beleza! Então, para me tornar uma dama incrível, vou começar pela arrumação!"
2001505-146 = "（E assim, conversando mais do que o habitual, fiz uma grande faxina no Schale com a Kaede）"
2001505-148 = "（No dia seguinte……）"
2001505-152 = "[ns9] \"A-acho que vai dar tempo de terminar no limite...\"\n[ns10] \"...Será que a Kaede está bem?\""
2001505-159 = "Sensei! Emergência!!"
2001505-160 = "[s] \"Kaede!? O que aconteceu!?\""
2001505-161 = "É que, na verdade...!"
2001505-162 = "Disseram que apareceu um monte de besouros-hércules na Floresta Musabi, em Hyakkiyako!!"
2001505-163 = "[s] \"……Hã?\""
2001505-164 = "Não temos tempo a perder! Pegue a rede de caçar insetos, a cesta e a câmera...!"
2001505-165 = "Ah, e não podemos esquecer de levar água para nos hidratar."
2001505-166 = "Pronto, tudo preparado! Perfeito!"
2001505-167 = "Vamos, Sensei! Vamos caçar besouros!"
2001505-168 = "[s11] \"……Certo, vamos nessa!\"\n[s12] \"Fico aliviado em ver que você voltou ao seu normal, Kaede.\""
2001505-169 = "？？？"
2001505-170 = "？？？"
2001505-172 = "（Saí para caçar insetos com a Kaede, que continuava tão animada e alegre como sempre）"
