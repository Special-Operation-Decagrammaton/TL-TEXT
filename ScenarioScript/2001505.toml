[translation]
2001505-1 = "大人になりたい理由"
2001505-2 = "先生、手伝いに来たよー！"
2001505-3 = "……あれ、誰もいない。"
2001505-4 = "トイレかな？"
2001505-5 = "って、ああっ！机の上がめちゃくちゃ！こんなのミモリ先輩とかに見られたら怒られちゃうやつだよ！"
2001505-9 = "あっ、コーヒーだ。先生の飲みかけかな。"
2001505-10 = "……。"
2001505-14 = "ゴクッ……。"
2001505-18 = "苦っ！！！"
2001505-19 = "えぇ、大人ってこういうのを飲むものなの……？バナナミルクとか飲めばよいのに……。"
2001505-20 = "大人って大変だなぁ……というか、コーヒー冷めてる。"
2001505-21 = "……あ、良いこと思いついた！"
2001505-22 = "先生のために、熱々のコーヒーを淹れなおしてあげれば……"
2001505-23 = "それってまさしく、「素敵なレディー」って感じがするんじゃない！"
2001505-24 = "昨日見たちょっと大人っぽいドラマでも、"
2001505-25 = "そんな感じのシーンがあったし！"
2001505-26 = "よし、そうとなったら「カエデちゃん特製ブレンド」を作っちゃおーっと！"
2001505-30 = "ふんふん～♪"
2001505-31 = "これをこうしてー……"
2001505-33 = "うーん……これくらいで良いかな？"
2001505-34 = "できた、カエデちゃん特製ブレンドウルトラバージョン！"
2001505-35 = "先生が戻ってきてこれを見たら、きっと……"
2001505-36 = "えへへっ！先生ったらそんな～、いきなり欲しいオモチャはって聞かれても～！"
2001505-37 = "……うん、とにかくOK！これを先生の席に置いて……。"
2001505-41 = "のあっ！？"
2001505-43 = "あ、ああぁぁっ！？"
2001505-49 = "コーヒーがーーー！？"
2001505-51 = "[ns] \"……とりあえず、この惨状を説明してもらって良い？\""
2001505-52 = "えっと、その……あくまで私は、先生のお手伝いに来ただけで……。"
2001505-53 = "それでシャーレに来たら先生はいないし、先生の席はめちゃくちゃだしで……。"
2001505-54 = "と、とりあえずコーヒーが冷めてるなって思って、淹れなおしたら先生が喜ぶかなって……。"
2001505-55 = "それでその、頑張ってはみたんだけど……。"
2001505-56 = "[s] \"カエデ。\""
2001505-57 = "ひゃいっ！ごめんなさい！"
2001505-58 = "ほ、褒めてくれるかなって、上手く行けばおもちゃとか買ってくれるんじゃないかなって思ったけど……！"
2001505-59 = "それが出来たら、素敵なレディーになれるんじゃないかなって……"
2001505-60 = "でもその、上手く行かなかったっていうか、えっと……。"
2001505-61 = "その、手伝うはずではあったんだけど……。"
2001505-62 = "めちゃくちゃにしようと思って、来たわけでは……。"
2001505-63 = "[s] \"えっと、カエデ。\""
2001505-64 = "うぅ……！"
2001505-65 = "うわあぁぁぁぁん！ごめんなさい！"
2001505-66 = "勝手に来て、色々荒らして……！"
2001505-67 = "めちゃくちゃにしちゃったのは本当だし……。"
2001505-68 = "ごめん、なさい……。"
2001505-69 = "先生、ただでさえ忙しいのに……。"
2001505-70 = "結局迷惑かけちゃって……。"
2001505-71 = "何の役にも立ってなくて……。"
2001505-72 = "うぅ……。"
2001505-73 = "[s] \"カエデ、落ち着いて。\""
2001505-74 = "……？"
2001505-75 = "[s] \"ごめん、聞き方が悪かったね。とりあえずちょっと待ってて。\""
2001505-76 = "？？？"
2001505-78 = "[ns] \"はい、ココア。これ飲んで少し落ち着こっか。\""
2001505-79 = "わ、私は、レディーとしてブラックコーヒーを……。"
2001505-80 = "[s] \"ココアは嫌い？\""
2001505-81 = "…………好き。"
2001505-82 = "（ゴクンッ）"
2001505-83 = "[s] \"せっかくだし、一つ聞いてみても良い？\""
2001505-84 = "……うん。"
2001505-85 = "[s] \"カエデはいつも、素敵なレディーになろうと頑張ってるよね。\""
2001505-86 = "…………はい。"
2001505-87 = "[s] \"それはどうして？\""
2001505-88 = "……。"
2001505-89 = "それは……。"
2001505-90 = "[s] \"うん。\""
2001505-91 = "……。"
2001505-92 = "昔は私、ずっといたずらっ子で……。"
2001505-93 = "[s] \"いたずらっ子？\""
2001505-94 = "ずっと、田舎の方で……。"
2001505-95 = "山とか海とか、あちこち走り回ってたの。"
2001505-96 = "中学生の時まではそうやって色んな所に行ったり、いたずらしたりして、過ごしてて。"
2001505-97 = "ただ面白いなって思うことを、たくさんしてた。"
2001505-98 = "そこは百鬼夜行の中でもすっごい田舎の場所だったんだけど、"
2001505-99 = "高校進学で、初めてこの辺りに来て。"
2001505-100 = "電車にも、こっちに来てから初めて乗ったの。"
2001505-101 = "でも初めて見たらあれ、靴を脱いで乗る物だと思わない！？色んな人に変な目で見られたんだけど！"
2001505-102 = "あ。"
2001505-103 = "えっと、この話じゃなくて……。"
2001505-104 = "[s] \"うん、それで？\""
2001505-105 = "それで、この辺に来て。"
2001505-106 = "すごいなって思ったの。"
2001505-107 = "特に、ツバキ先輩とミモリ先輩！二人はかっこよくて、綺麗で、とにかくすごくて！"
2001505-108 = "私もそうなりたいなって思った。"
2001505-109 = "今のままじゃなくて、修行部の一員としてふさわしいレディーになれるように。"
2001505-110 = "頑張りたいなって思ったの。"
2001505-111 = "すごく、すっごく頑張れば、私も先輩たちみたいに素敵なレディーになれるはずだからって。"
2001505-112 = "……。"
2001505-113 = "……でも、違った。"
2001505-114 = "結構頑張ったはずなのに、私は何回もこうやって……。"
2001505-115 = "みんなに変って言われて、問題ばっかり起こして……。"
2001505-116 = "……私、変わってないかも。"
2001505-117 = "やっぱり私みたいな子どもは、いくら頑張ったところで……"
2001505-118 = "先輩たちみたいには、なれないのかなって。"
2001505-119 = "[s] \"そんなことは無いよ。\""
2001505-120 = "……先生？"
2001505-121 = "[s1] \"カエデがいつも努力してるのは、\"\n[s2] \"私だって、よく知ってる。\""
2001505-122 = "……？"
2001505-123 = "……？"
2001505-124 = "[s3] \"今日みたいに時々ミスがあるのは確かだけど。\"\n[s4] \"そういうのは誰にだってあることだよ。\""
2001505-125 = "…………。"
2001505-126 = "…………。"
2001505-127 = "[s5] \"だから大丈夫。\"\n[s6] \"カエデはカエデのペースで、成長してるはずだから。\""
2001505-128 = "成長……。"
2001505-129 = "成長……。"
2001505-130 = "[s] \"辛かったら先輩のところでも、私のところに来ても良いから。\""
2001505-131 = "……良いの？"
2001505-132 = "[s] \"私はカエデの先生だからね。\""
2001505-133 = "……。"
2001505-134 = "……そっか。"
2001505-135 = "うん、分かった！"
2001505-136 = "そうだね、確かにそうかも！"
2001505-137 = "うーん、何であんなに悩んでたのか分かんなくなっちゃったかも！？"
2001505-138 = "ばばん、カエデ完全復活！"
2001505-139 = "ありがとね、先生。私、ちょっとずつでも頑張るよ！"
2001505-140 = "だから、見守っててね。"
2001505-141 = "[s7] \"それはもちろん見守ってるんだけど……。\"\n[s8] \"……その前に、一緒に片づけを手伝ってくれる？\""
2001505-142 = "あっ、忘れてた！？"
2001505-143 = "あっ、忘れてた！？"
2001505-144 = "よーし！じゃあまずは素敵なレディーになるために、片付けから！"
2001505-146 = "（そうしていつもより色んな話をして、カエデとシャーレの大掃除をした）"
2001505-148 = "（次の日……）"
2001505-152 = "[ns9] \"な、何とかギリギリ終わるかも……。\"\n[ns10] \"……カエデ、大丈夫かな。\""
2001505-159 = "先生！非常事態！！"
2001505-160 = "[s] \"カエデ！？どうしたの！？\""
2001505-161 = "実はね、実はね……！"
2001505-162 = "百鬼夜行のムサビの森に、ヘラクレスオオカブトが大量発生したんだって！！"
2001505-163 = "[s] \"……ん？\""
2001505-164 = "こうしてる場合じゃないよ、虫取り網と、かごと、カメラを持って……！"
2001505-165 = "あ、水分補給用に飲み物も持っていかないと。"
2001505-166 = "よし、準備OK！完璧！"
2001505-167 = "行こう、先生！カブトムシを捕まえに！"
2001505-168 = "[s11] \"……よし、行こっか！\"\n[s12] \"いつものカエデで安心した。\""
2001505-169 = "？？？"
2001505-170 = "？？？"
2001505-172 = "（相変わらず元気で明るいカエデと一緒に、虫採取に出かけたのだった）"
