[translation]
10053130-1 = "Posfácio parte 4; Donzela de Ferro"

10053130-3 = "...É isso. \r\n"

10053130-15 = "Por que tanto alarido? \r\n\r\n"

10053130-16 = "Parece que uma criança problemática veio se entregar. \r\n\r\n\r\n\r\n"

10053130-17 = "Entregar-se? Existem pessoas que fazem coisas malucas ――\r\n\r\n"

10053130-18 = "Não, parece que o vice-diretor Konoka enviou para mim. \r\n\r\n\r\n"

10053130-23 = "Decidimos renascer! \r\n\r\n\r\n\r\n"

10053130-24 = "Bem, eu só não quero mais lutar contra aquele monstro... \r\n\r\n\r\n"

10053130-29 = "...Ele não estava de férias? \r\n"

10053130-30 = "Bem, se Konoka fosse transferido, não haveria dúvidas. \r\n\r\n"

10053130-31 = "O estudante que se ofereceu para se render foi detido temporariamente. Por favor, confirme o crime cometido e lide com ele de forma adequada. \r\n"

10053130-32 = "Entendido. \r\n\r\n\r\n\r\n"

10053130-36 = "...Huh? O diretor não vai questionar você? Normalmente ――\r\n"

10053130-37 = "Você está atendendo um cliente importante. \r\n\r\n\r\n"

10053130-38 = "Um cliente importante? ……Quem? \r\n\r\n"

10053130-43 = "……rude. Está um pouco barulhento lá fora. \r\n\r\n"

10053130-45 = "Não, mas fiquei bastante impressionado. #nEhehe... Acho que devo dizer que é o orgulho da Valquíria, o Departamento de Segurança Pública... \n\n\n\n\n"

10053130-46 = "O vice-diretor também parece entusiasmado com seu trabalho, mesmo estando de férias... \r\n\r\n\r\n"

10053130-47 = "Não me provoque muito. \r\n\r\n\r\n"

10053130-48 = "Todos os departamentos da Valkyrie não são diferentes em termos de trabalho árduo. \r\n\r\n\r\n"

10053130-49 = "Além disso, existem dois departamentos que são conhecidos como “corpo de bombeiros quando se trata de incêndio, e departamento penitenciário quando se trata de pessoas”."

10053130-50 = "Se você for muito humilde, será difícil para o ouvinte, senhor."

10053130-56 = "Ehehe...Ficaria feliz se outras pessoas pensassem como o Diretor de Segurança Pública. \r\n"

10053130-57 = "E se todos vocês que vieram de fora viessem todos juntos para o Departamento Correcional..."

10053130-62 = "Talvez... eu possa ficar um pouco ocupado... hehe... \r\n"

