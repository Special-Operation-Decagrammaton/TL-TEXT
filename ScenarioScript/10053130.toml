[translation]
10053130-1 = "後日談その4;アイアン・メイデン"
10053130-3 = "……それで。\r\n"
10053130-15 = "これは何の騒ぎだ？\r\n\r\n"
10053130-16 = "その……問題児が自首しに来たそうです。\r\n\r\n\r\n\r\n"
10053130-17 = "自首？そんな酔狂なことをするやつがいるわけ――\r\n\r\n"
10053130-18 = "いえ、それが、コノカ副局長が送ってきたみたいなんです。\r\n\r\n\r\n"
10053130-23 = "うちらは生まれ変わることに決めたんだ！\r\n\r\n\r\n\r\n"
10053130-24 = "まぁ、あんな怪物みたいなヤツとはもう戦いたくないってだけなんだけど……。\r\n\r\n\r\n"
10053130-29 = "……あいつ、休暇中じゃなかったか？\r\n"
10053130-30 = "まあ、コノカが寄越したなら間違いないだろう。\r\n\r\n"
10053130-31 = "自首を申し出た生徒は一時的に拘留。犯した罪を確認して、適切に処理するように。\r\n"
10053130-32 = "分かりました。\r\n\r\n\r\n\r\n"
10053130-36 = "……あれ？局長が尋問しないんですか？いつもなら――\r\n"
10053130-37 = "今は大事なお客様を応対中だろ。\r\n\r\n\r\n"
10053130-38 = "大事なお客様？……誰？\r\n\r\n"
10053130-43 = "……失礼。外が少々騒がしくて。\r\n\r\n"
10053130-45 = "いえいえ、とはいえ、むしろ感心しましたよ。#nえへへ……さすがはヴァルキューレの誇り、公安局と言うべきでしょうか……。\n\n\n\n\n"
10053130-46 = "副局長さんも、休暇中なのに仕事熱心みたいで……。\r\n\r\n\r\n"
10053130-47 = "あまりからかわないでください。\r\n\r\n\r\n"
10053130-48 = "激務という点では、ヴァルキューレのどの部署も変わりませんよ。\r\n\r\n\r\n"
10053130-49 = "ましてや「火に落ちれば消防局、人に落ちれば矯正局」と呼ばれる2局です。\r\n\r\n"
10053130-50 = "謙遜も過ぎれば、聞く方も困るものですよ――[ruby=・]矯[/ruby][ruby=・]正[/ruby][ruby=・]局[/ruby][ruby=・]長[/ruby]殿。"
10053130-56 = "えへへ……他の方々も、公安局長みたいに考えてくだされば嬉しいんですけどねぇ。\r\n"
10053130-57 = "もしも、外にいらした皆さんが……まとめて矯正局に来ることになったら……。"
10053130-62 = "もしかすると……ちょっとだけ忙しくなるかも……えへへ……。\r\n"
