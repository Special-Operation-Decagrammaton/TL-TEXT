[translation]
1014302-1 = "ウォーターベッド"
1014302-2 = "（シュンと渓谷の水辺に来た……）"
1014302-6 = "わぁっ……水が冷たくて気持ち良いですね。"
1014302-7 = "[s] \"泳ぐの上手だね。\""
1014302-8 = "ふふ、ありがとうございます。"
1014302-9 = "子供たちに教える身として、ある程度泳げないといけませんから。"
1014302-10 = "それに、元々泳ぐのは好きなんです。"
1014302-11 = "[s] \"そうなんだ？\""
1014302-12 = "ええ、このなんとも言えない浮遊感がたまらなくて。"
1014302-13 = "重力から解放されて、リラックスできるんです。"
1014302-14 = "それに水泳は、美容にも色々と効果的ですし……。"
1014302-15 = "有酸素運動の中でも、消費カロリーが高いので。"
1014302-16 = "プールは、塩素系の消毒剤が使われている関係で――"
1014302-17 = "お肌にはあまり良くないと言われていますが……。"
1014302-18 = "それを差し引いても、良い運動だと思いますよ。"
1014302-19 = "……先生は泳ぐのは得意ですか？"
1014302-20 = "[s1] \"まあまあかな。\"\n[s2] \"大したことないよ。\""
1014302-23 = "でしたら……ここまでいらっしゃってください。"
1014302-24 = "この辺りは浅いのでご心配なく。"
1014302-25 = "それに、もしもの時は私がお助けしますから。"
1014302-28 = "（ゆっくり、シュンの方へ歩いて行った）"
1014302-31 = "なんだか、ウォーターベッドで寝ているみたいです。"
1014302-32 = "[ns] \"本当の「ウォーターベッド」だね。\""
1014302-33 = "ふふっ、先生の声が……いつもと違う形で聞こえて面白いです。"
1014302-34 = "よろしければ、先生も一緒にいかがですか？"
1014302-35 = "……たしかに、二人とも流されたら危険かもしれませんね。"
1014302-36 = "ふふ、それでしたら……。"
1014302-37 = "このまま少しの間……見守っていただけますか？"
1014302-38 = "（しばらくの間、静かに浮かぶシュンを見守った）"
1014302-42 = "そうだ。フルーツを水に冷やしておいたのですが、召し上がりませんか？"
1014302-43 = "スイカにメロン、モモ、ブドウ、スモモ……好みが分からなかったので色々用意してきました。"
1014302-44 = "[s] \"お、多いね……。\""
1014302-45 = "ふふ。残ったら持ち帰るので、お好きなものを召し上がってください。"
1014302-47 = "（シュンは慣れた手つきでフルーツの皮を剥いていく）"
1014302-48 = "（その様子を眺めていたら……突然口の中にモモが入ってきた）"
1014302-53 = "お味はいかがですか？"
1014302-54 = "[ns] \"と、とても甘くておいしいよ。\""
1014302-55 = "それと？"
1014302-56 = "[ns] \"みずみずしくて……。\""
1014302-57 = "ふふっ、私が食べる先生のことを考えながら剥いたからだと思います。"
1014302-58 = "[ns] \"う、うん。そうかもね……！\""
1014302-59 = "ふふっ、まだまだあるので、たくさん食べてください。"
1014302-61 = "（シュンと一緒に夏のフルーツを満喫した）"
1014302-63 = "それでは先生も――"
1014302-64 = "「ウォーターベッド」……やってみませんか？"
1014302-65 = "[s] \"えっ、私も？\""
1014302-66 = "大丈夫です。私にお任せください。"
1014302-67 = "リラックスして、仰向けになって――"
1014302-72 = "息を大きく吸い込んで、手足を左右に広げると……。#nほら、ゆっくりと体が浮いてきますよ。"
1014302-73 = "万が一のために……先生の頭は私が支えておきますね。"
1014302-75 = "（シュンの言う通りにしてみると――）"
1014302-79 = "（ゆっくりと体が浮いてきた）"
1014302-82 = "いかがですか？"
1014302-83 = "[ns] \"本当だ。いつもと声が違って聞こえる……。\""
1014302-84 = "ふふっ、でしょう？"
1014302-85 = "それに、とてもリラックスできますよね？"
1014302-86 = "……ゆっくり頭を動かすと、周りの景色が見えますよ。"
1014302-87 = "あまり大きく動かすとバランスを崩すかもしれませんので、気をつけてください。"
1014302-90 = "今日は本当に良いお天気ですね。"
1014302-91 = "輝く太陽の下で――"
1014302-92 = "川のせせらぎが涼しく感じます。"
1014302-93 = "こうしていると……まるで――"
1014302-94 = "この世には私と先生だけしかいないような気分になります。"
1014302-95 = "（体から力が抜けていき……頭もぼーっとしてきた）"
1014302-100 = "本当にそうなってしまったら、大変ですが……。"
1014302-101 = "ほんの少しの間だけ、なら……。"
1014302-102 = "（夏の日差しは焼けるような熱さだったが、水は反比例するように冷たい）"
1014302-103 = "（周りの音が、少しずつ小さくなり始めた……）"
1014302-107 = "誰も見ていないところで、私と二人きりになれたら……。"
1014302-108 = "そう、今のように……。"
1014302-109 = "（頭が、ふわふわする……）"
1014302-110 = "……。"
1014302-111 = "先生は、何をしたいですか？"
1014302-112 = "[ns] \"……。\""
1014302-113 = "せ、先生？先生！？！？"
1014302-118 = "こんなところで寝てはダメです！！！"
1014302-120 = "[ns] \"危なかった……。\""
1014302-121 = "私もビックリしました……。"
1014302-122 = "水中で眠ってしまったら、体温が下がって危険なんですよ。"
1014302-126 = "（そのとき、ちょうどくしゃみが出た）"
1014302-127 = "だ、大丈夫ですか、先生！？"
1014302-128 = "あ……寒気がします？"
1014302-129 = "気をつけないと。夏の水辺では、風邪を引きやすいので。"
1014302-130 = "さあ、こっちに座ってください。タオルで体を温めましょう。"
1014302-131 = "（シュンが大きなタオルで体を包んでくれた）"
1014302-132 = "（そして……）"
1014302-138 = "[ns] \"しゅ、シュン……？\""
1014302-140 = "……ふふっ。"
1014302-141 = "体を温めるには、こうやってくっつくのが一番効果的なんです。"
1014302-142 = "他意はありません。"
1014302-143 = "ええ、本当ですよ。"
1014302-144 = "[ns] \"そ、そう……？\""
1014302-150 = "（次の瞬間、シュンがタオルと一緒に腕を腰に回してきた……！）"
1014302-152 = "どうでしょう、先生。"
1014302-153 = "もっと……あったまりませんか？"
1014302-154 = "[s] \"そ、そうだね……！\""
1014302-155 = "ふふっ、良かったです。"
1014302-156 = "もしも先生の身に何かあってはいけませんので。"
1014302-158 = "（そうやって、私たちは温まるまで体を寄せ合った）"
