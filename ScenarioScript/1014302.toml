[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 24/06.]
1014302-1 = "Cama d'água"
1014302-2 = "(Fui para a beira do rio no desfiladeiro com a Shun...)"
1014302-6 = "Uau... a água está bem fria e refrescante."
1014302-7 = "[s] \"Você nada super bem.\""
1014302-8 = "Fufu, muito obrigada."
1014302-9 = "Como a pessoa que ensina as crianças, preciso saber nadar pelo menos o mínimo."
1014302-10 = "Além disso, eu sempre gostei muito de nadar."
1014302-11 = "[s] \"É mesmo?\""
1014302-12 = "Sim, essa sensação indescritível de flutuar é simplesmente irresistível."
1014302-13 = "Sinto que posso me libertar da gravidade e relaxar."
1014302-14 = "Sem contar que a natação tem vários benefícios estéticos também..."
1014302-15 = "Dentre os exercícios aeróbicos, é um dos que mais consome calorias."
1014302-16 = "É verdade que a água das piscinas tem muito cloro para a desinfecção, e por isso――"
1014302-17 = "Dizem que não é muito amigável para a pele, mas..."
1014302-18 = "Mesmo assim, acredito que os benefícios como exercício compensam isso."
1014302-19 = "......E você, Sensei, sabe nadar bem?"
1014302-20 = "[s1] \"Dá pro gasto.\"\n[s2] \"Não sou grande coisa.\""
1014302-23 = "Se for assim... venha até aqui, por favor."
1014302-24 = "Não se preocupe, é raso por aqui."
1014302-25 = "E, se acontecer alguma coisa, eu te salvarei."
1014302-28 = "(Caminhei lentamente em direção à Shun)"
1014302-31 = "De certa forma, parece que estou deitada em uma cama d'água."
1014302-32 = "[ns] \"Uma 'cama d'água' bem literal, né.\""
1014302-33 = "Fufu, a sua voz... soa um pouco diferente agora, é tão interessante."
1014302-34 = "O que me diz, gostaria de tentar flutuar comigo, Sensei?"
1014302-35 = "......É verdade, se nós dois formos levados pela correnteza ao mesmo tempo, pode ser bem perigoso."
1014302-36 = "Fufu, nesse caso..."
1014302-37 = "Você poderia... ficar me observando um pouquinho assim?"
1014302-38 = "(Fiquei observando silenciosamente a Shun enquanto ela flutuava tranquilamente)"
1014302-42 = "Ah, é mesmo. Eu deixei algumas frutas na água para esfriarem, não quer comer algumas?"
1014302-43 = "Melancia, melão, pêssegos, uvas, ameixas... Eu trouxe várias opções, já que não conheço os seus gostos."
1014302-44 = "[s] \"V-Você trouxe muita coisa...\""
1014302-45 = "Fufu. Pode comer as suas favoritas, nós levamos o que sobrar."
1014302-47 = "(A Shun descasca as frutas com mãos incrivelmente habilidosas)"
1014302-48 = "(E enquanto eu observava aquela cena... de repente, um pedaço de pêssego é colocado na minha boca)"
1014302-53 = "Como está o sabor?"
1014302-54 = "[ns] \"É m-muito doce e delicioso.\""
1014302-55 = "E o que mais?"
1014302-56 = "[ns] \"Tem bastante suco e...\""
1014302-57 = "Fufu, acredito que seja porque eu os descasquei enquanto pensava no Sensei que iria comer eles."
1014302-58 = "[ns] \"E-Eh, é... talvez seja isso mesmo...!\""
1014302-59 = "Fufu, eu tenho muitos outros aqui, por favor, não se acanhe e coma o quanto quiser."
1014302-61 = "(Nós dois nos deliciamos com as doces frutas de verão)"
1014302-63 = "Pois bem, Sensei. Agora é a sua vez――"
1014302-64 = "Gostaria de experimentar a \"cama d'água\"?"
1014302-65 = "[s] \"Eh, eu?\""
1014302-66 = "Está tudo bem. Pode deixar o seu corpo nas minhas mãos."
1014302-67 = "Relaxe o corpo e deite de costas――"
1014302-72 = "Respire fundo, estenda as pernas e os braços...#nViu só? O seu corpo vai começar a flutuar lentamente."
1014302-73 = "Apenas por precaução... Eu vou segurar e apoiar a sua cabeça."
1014302-75 = "(Seguindo as instruções da Shun――)"
1014302-79 = "(O meu corpo começou a flutuar tranquilamente)"
1014302-82 = "E então, como é?"
1014302-83 = "[ns] \"Uau, é verdade. A voz está mesmo soando diferente...\""
1014302-84 = "Fufu, não é?"
1014302-85 = "Além disso, é tão relaxante, você não acha?"
1014302-86 = "......Se você mover a cabeça lentamente, poderá ver toda a paisagem ao redor."
1014302-87 = "Mas tome cuidado. Se fizer um movimento muito brusco, pode perder o equilíbrio."
1014302-90 = "O tempo hoje está incrivelmente lindo."
1014302-91 = "Sob este sol brilhante e radiante――"
1014302-92 = "Até o murmúrio da água passa uma sensação de frescor."
1014302-93 = "Ficar desse jeito... faz parecer que――"
1014302-94 = "Nós somos as únicas duas pessoas no mundo inteiro."
1014302-95 = "(A força foi deixando o meu corpo aos poucos... e a minha mente foi ficando nublada)"
1014302-100 = "Se isso realmente acontecesse, as coisas seriam bem complicadas, mas..."
1014302-101 = "Se for apenas por um brevíssimo momento..."
1014302-102 = "(Os raios de sol de verão estavam escaldantes, mas a água, em total contraste, estava gelada e agradável)"
1014302-103 = "(Os sons ao meu redor começaram a desaparecer aos poucos...)"
1014302-107 = "Se eu pudesse ficar a sós com você... em um lugar onde ninguém pudesse nos ver..."
1014302-108 = "Sim, exatamente como agora..."
1014302-109 = "(A minha cabeça está tão macia e enevoada...)"
1014302-110 = "......"
1014302-111 = "Sensei, o que você quer fazer?"
1014302-112 = "[ns] \"......\""
1014302-113 = "S-Sensei? Sensei!?!?!"
1014302-118 = "Você não pode dormir num lugar como este!!!"
1014302-120 = "[ns] \"Essa foi quase...\""
1014302-121 = "Você me deu um susto enorme..."
1014302-122 = "Dormir dentro d'água diminui a temperatura do corpo, é muito perigoso!"
1014302-126 = "(Logo depois, soltei um espirro bem alto)"
1014302-127 = "V-Você está bem, Sensei!?"
1014302-128 = "Ah... está sentindo calafrios?"
1014302-129 = "Temos que ter cuidado. É extremamente fácil pegar um resfriado perto da água no verão."
1014302-130 = "Vamos, venha sentar aqui. Vou te enrolar nessa toalha para aquecer o seu corpo."
1014302-131 = "(A Shun cobriu o meu corpo com uma toalha enorme e macia)"
1014302-132 = "(E então...)"
1014302-138 = "[ns] \"S-Shun...?\""
1014302-140 = "......Fufu."
1014302-141 = "A melhor maneira de aquecer um corpo gelado é abraçando-o bem forte desse jeito."
1014302-142 = "Eu não tenho nenhuma segundas intenções, claro."
1014302-143 = "É verdade, eu juro."
1014302-144 = "[ns] \"M-Mesmo...?\""
1014302-150 = "(No instante seguinte, ela passou os braços ao redor da minha cintura, nos envolvendo na toalha...!)"
1014302-152 = "E então, o que acha, Sensei?"
1014302-153 = "Ainda... sente frio?"
1014302-154 = "[s] \"N-Não, de forma alguma...!\""
1014302-155 = "Fufu, fico muito aliviada em saber disso."
1014302-156 = "Afinal, eu jamais me perdoaria se algo de ruim acontecesse com o meu amado Sensei."
1014302-158 = "(E assim, ficamos com os corpos colados e bem abraçadinhos até que eu ficasse completamente aquecido)"