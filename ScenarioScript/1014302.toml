[translation]
1014302-1 = "Waterbed"
1014302-2 = "(I've come to the water's edge in the valley with Shun...)"
1014302-6 = "Wow... the water is so cool and refreshing."
1014302-7 = "[s] \"You're a good swimmer.\""
1014302-8 = "Hehe, thank you."
1014302-9 = "As someone who teaches children, I have to be able to swim to a certain extent."
1014302-10 = "Besides, I've always liked swimming."
1014302-11 = "[s] \"Is that so?\""
1014302-12 = "Yes, this indescribable feeling of weightlessness is just irresistible."
1014302-13 = "Being freed from gravity allows me to relax."
1014302-14 = "Plus, swimming is quite effective for beauty, too..."
1014302-15 = "It burns a lot of calories compared to other aerobic exercises."
1014302-16 = "They say pool water isn't great for your skin because of the chlorine disinfectants—"
1014302-17 = "but even taking that into account, I think it's a great workout."
1014302-18 = "Are you good at swimming, Sensei?"
1014302-19 = "[s1] \"I'm alright.\"\n[s2] \"Not really.\""
1014302-23 = "In that case... please come over here."
1014302-24 = "Don't worry, it's shallow around here."
1014302-25 = "And if anything happens, I'll be here to help you."
1014302-28 = "(I walked slowly toward Shun.)"
1014302-31 = "It feels like I'm lying on a waterbed."
1014302-32 = "[ns] \"A real 'waterbed', huh.\""
1014302-33 = "Hehe, it's funny hearing your voice sound so different, Sensei."
1014302-34 = "If you'd like, would you like to join me?"
1014302-35 = "...You're right, it might be dangerous if we both get swept away."
1014302-36 = "Hehe, in that case..."
1014302-37 = "Could you just... watch over me for a little while?"
1014302-38 = "(For a while, I watched Shun floating quietly.)"
1014302-42 = "Oh, that's right. I chilled some fruit in the water; would you like some?"
1014302-43 = "Watermelon, melon, peaches, grapes, plums... I wasn't sure what you liked, so I brought a variety."
1014302-44 = "[s] \"W-wow, that's a lot...\""
1014302-45 = "Hehe. I'll take home whatever is left, so please, have whatever you like."
1014302-47 = "(Shun peels the fruit with practiced hands.)"
1014302-48 = "(As I was watching her... suddenly, a piece of peach was placed into my mouth.)"
1014302-53 = "How does it taste?"
1014302-54 = "[ns] \"I-it's very sweet and delicious.\""
1014302-55 = "And?"
1014302-56 = "[ns] \"It's so juicy...\""
1014302-57 = "Hehe, I think it's because I was thinking of you while I peeled it."
1014302-58 = "[ns] \"O-oh. I see...!\""
1014302-59 = "Hehe, there's plenty more, so please, eat as much as you'd like."
1014302-61 = "(I enjoyed the summer fruit with Shun.)"
1014302-63 = "Now then, Sensei—"
1014302-64 = "Why don't you try the 'waterbed'?"
1014302-65 = "[s] \"Wait, me too?\""
1014302-66 = "It's alright. Just leave it to me."
1014302-67 = "Relax, lie on your back—"
1014302-72 = "Take a deep breath, and spread your arms and legs out...#nSee? Your body will slowly start to float."
1014302-73 = "Just in case, I'll support your head, Sensei."
1014302-75 = "(When I did as Shun said—)"
1014302-79 = "(My body slowly began to float.)"
1014302-82 = "How is it?"
1014302-83 = "[ns] \"You're right. My voice sounds different than usual...\""
1014302-84 = "Hehe, right?"
1014302-85 = "And it's very relaxing, isn't it?"
1014302-86 = "...If you move your head slowly, you can see the scenery around us."
1014302-87 = "Be careful, though; if you move too much, you might lose your balance."
1014302-90 = "It's such a beautiful day today."
1014302-91 = "Under the shining sun—"
1014302-92 = "the sound of the flowing river feels so cool."
1014302-93 = "Being like this... it feels as if—"
1014302-94 = "it feels as if there's no one else in the world but you and me."
1014302-95 = "(The tension left my body... and my head started to feel hazy.)"
1014302-100 = "It would be a disaster if that actually happened, though..."
1014302-101 = "But, just for a little while..."
1014302-102 = "(The summer sun was scorching, but the water was cool in contrast.)"
1014302-103 = "(The sounds around me began to fade away...)"
1014302-107 = "If I could be all alone with you, where no one else is watching..."
1014302-108 = "Yes, just like this..."
1014302-109 = "(My head feels so light...)"
1014302-110 = "..."
1014302-111 = "What would you like to do, Sensei?"
1014302-112 = "[ns] \"...\""
1014302-113 = "S-Sensei? Sensei!?!"
1014302-118 = "You can't fall asleep in a place like this!!!"
1014302-120 = "[ns] \"That was close...\""
1014302-121 = "I was so startled..."
1014302-122 = "If you fall asleep in the water, your body temperature will drop, which is dangerous."
1014302-126 = "(Just then, I let out a sneeze.)"
1014302-127 = "A-are you alright, Sensei!?"
1014302-128 = "Oh... are you feeling a chill?"
1014302-129 = "You have to be careful. It's easy to catch a cold by the water in the summer."
1014302-130 = "Come on, sit over here. Let's warm you up with a towel."
1014302-131 = "(Shun wrapped me in a large towel.)"
1014302-132 = "(And then...)"
1014302-138 = "[ns] \"Sh-Shun...?\""
1014302-140 = "...Hehe."
1014302-141 = "To warm up your body, snuggling like this is the most effective method."
1014302-142 = "I have no ulterior motives."
1014302-143 = "Yes, really."
1014302-144 = "[ns] \"I-is that so...?\""
1014302-150 = "(The next moment, Shun wrapped her arms around my waist along with the towel...!)"
1014302-152 = "How is it, Sensei?"
1014302-153 = "Would you like to... warm up a bit more?"
1014302-154 = "[s] \"Y-yeah...!\""
1014302-155 = "Hehe, I'm glad."
1014302-156 = "I couldn't have anything happen to you, after all."
1014302-158 = "(And so, we stayed huddled together until we were warm.)"