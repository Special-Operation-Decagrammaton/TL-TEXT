[translation]
10033110-1 = "エピローグ;思い出はいつだって輝いて"
10033110-2 = "ゲヘナの皆さんが来る以上、ある程度の混乱は予想済みでしたが……#n箱を開けたらまあ予想以上。"
10033110-3 = "でもさすがはお祭り運営委員会のウミカさん、そして先生。#n感謝ですわあ。"
10033110-4 = "今回も面白……ではなく、素晴らしかったねぇ。"
10033110-5 = "[s] \"ニヤも結構、いろいろ心配だったんじゃない？\""
10033110-6 = "……と言うんは、どういう？"
10033110-7 = "[s1] \"色々と、都合の良い部分があったし？\"\n[s2] \"風紀委員会との会合の場所とか、気を遣ってるなって。\""
10033110-10 = "あは～、それは偶然の一致じゃないです？"
10033110-11 = "私はただ、こうした方が面白いんやないかな～って弄っただけよ。"
10033110-12 = "その結果、誰かにとって意味が生まれたんなら……#nそれはそれで僥倖。"
10033110-13 = "ただそれだけのことじゃないです？"
10033110-14 = "[s] \"……うん、じゃあそういうことで。\""
10033110-15 = "そういう事にしてくださると嬉しいですわぁ♪"
10033110-21 = "うぅ、どうしてこんな目に……。"
10033110-22 = "まぁちょっとだけ、ちょっとだけやり過ぎたけどさぁ！"
10033110-24 = "そうだそうだ！#nちゃんと鎮火作業だって頑張ったのに！"
10033110-25 = "神木祭も無事に終わったのに！"
10033110-33 = "それとこれとは別だと思いませんか、魑魅一座の皆さん？"
10033110-34 = "参ったなぁ。#n不満の声なんて聞いた日には、掃除のエリアを倍にするかもしれませんねぇ～？"
10033110-36 = "！？"
10033110-38 = "いやいやいや！#n見てくださいよ、一生懸命掃除中じゃないですか！"
10033110-39 = "そうですよ！お掃除最高ー！#n百鬼夜行が綺麗になって嬉しいなあ！"
10033110-46 = "それはそれは。"
10033110-47 = "じゃあ後はよしなに。"
10033110-54 = "……もう行った？"
10033110-55 = "……ああもう悔しいっ！#nくそっ、くそぉっ！見てろよ、次こそはあたしたちの手で……！"
10033110-57 = "あ、天狗のお面行列！#nもう始まってる！"
10033110-58 = "山伏もいる！#n私あれ好きー！"
10033110-64 = "お前たち、ちゃんと掃除しろ！#n後で見られたら本当に怒られるぞ！？"
10033110-65 = "ちょっと待っててリーダー！#nこれだけ見てから！"
10033110-66 = "相撲だ相撲だーっ！#nやれーっ！"
10033110-77 = "だ～か～ら～～っ！"
10033110-82 = "……まさか先生が来てるなんて、知らなかった。"
10033110-83 = "[s] \"ちょっとした成り行きでね……。\""
10033110-84 = "何にせよお疲れ様。#nでも先に言ってくれれば、私も……"
10033110-85 = "[s] \"？\""
10033110-90 = "……何でもない。#nただ……。"
10033110-91 = "こうして、最後に少しでも会えて良かった。"
10033110-92 = "[s] \"そうだね、私もヒナに会えて嬉しいよ。\""
10033110-93 = "そ、そう……？"
10033110-97 = "ちょっと待ってください。#n私がここにいることを忘れていませんか！？"
10033110-98 = "ただでさえ百花繚乱との会合の間、#n延々と続く万魔殿の妨害を上手く処理してきたというのに！"
10033110-99 = "あのタヌキたち……#n修学旅行なのですから、おとなしく旅行を楽しめば良いものを……#n直接邪魔するわ嫌味なメッセージを送ってくるわ、一体何なのですか！？"
10033110-100 = "そもそもの話、#nなぜ百鬼夜行側との会合に出るのが私たちになるんですか！"
10033110-102 = "普通に考えたら万魔殿が出るべきでしょう！#nどう考えても仕事を押し付けただけじゃないですか、中身だって結局――"
10033110-104 = "……。"
10033110-105 = "まあ、起きたことはもう仕方がない。#nせっかくだし、あとはお祭りを楽しんだら？"
10033110-106 = "い、委員長……！？"
10033110-107 = "[ns3] \"じゃあ、私が百鬼夜行を案内してあげる。\"\n[ns4] \"この数日間、みっちり教えてもらったから。\""
10033110-110 = "せっ、先生が、直接……！？"
10033110-114 = "……じゃあ、よろしく。"
10033110-115 = "ふ、ふんっ！#n委員長に免じて、今回だけは大目に見てあげても良いですよ？"
10033110-116 = "[s] \"なら、そういうことで。\""
10033110-119 = "それでは皆さん、またのお越しをお待ちしています！"
10033110-120 = "出会いには別れが付き物……。"
10033110-121 = "デスが、悲しむことはありマセン！#nいつかきっと、また会えるはずデスから！"
10033110-122 = "バイバーイ！#n今度はムシクイーンバトル一緒にしようねー！"
10033110-126 = "……あ、もうこんな時間。#nじゃあ、またね……。"
10033110-131 = "おかげで、本当に楽しかった。#nありがとね。"
10033110-132 = "ウミカちゃん、フィーナちゃん、カエデちゃん、ツバキちゃん！#n先生も、元気でね！"
10033110-133 = "まぁ先生は多分、またどこかですぐ会うでしょ。"
10033110-134 = "まっ、そうかもね！"
10033110-135 = "あっ、ゲヘナに来たら連絡してね、すぐ迎えに行くから！#nばいばーい、チュっ！"
10033110-140 = "[ns] \"それじゃあ、また！\""
10033110-142 = "（かくして今回の修学旅行は、無事に終わりを迎えた）"
10033110-143 = "（新しい出会い、新しい絆、新しい思い出……）"
10033110-148 = "キシシ……#nマコト様の威光は、今や百鬼夜行にまで届き……むにゃむにゃ……。"
10033110-152 = "（そして新しい夢（？）を抱えながら……）"
10033110-157 = "というわけで、打ち上げデース！"
10033110-158 = "乾杯！"
10033110-160 = "乾杯……。"
10033110-165 = "ウミカちゃん、話は聞きました。#n大変でしたね。"
10033110-166 = "い、いえ、そんな……！"
10033110-167 = "カエデちゃんもツバキちゃんも、お疲れ様でした。"
10033110-168 = "えへへっ……！"
10033110-169 = "これでまた、素敵なレディーに一歩近づけたかも！"
10033110-170 = "もう聞いたと思うけど、ウミカ本当にすごかったんだよ！"
10033110-172 = "ワタシも胸が熱くなりマシタ！#n燃え盛る炎を背に、カッコよく宣言する姿……！"
10033110-174 = "あ、あれはあくまで、エリカさんやキララさんが……。"
10033110-175 = "それから、先生がいてくださったおかげで……。"
10033110-176 = "でも……#n全部の流れを変えたのは、確かにウミカだったよ……。"
10033110-177 = "そ、そんなことは……！#nそもそも皆さんがいなかったら、私は……！"
10033110-179 = "何言ってるの！#nこういう時は、素直に褒められておきなさいって！"
10033110-180 = "ハッ！"
10033110-181 = "こ、この声は……！？"
10033110-182 = "お祭り運営委員会の委員長殿！"
10033110-188 = "話はぜーんぶ聞かせてもらったわ！"
10033110-189 = "よく頑張ったわね。#nウミカだから、今回の修学旅行が成功したのよ。"
10033110-190 = "……。"
10033110-191 = "私、だから……？"
10033110-192 = "[s] \"素直に受け取ったら？\""
10033110-193 = "そうよ。私も先生も、他のみんなもそう言ってるじゃない！#nもっと自信を持って！"
10033110-194 = "胸を張りなさい、私がやり遂げたんだって。#nこの先どんな依頼が来たって、全部を最高のお祭りにしてやるんだって！"
10033110-195 = "……まだ、実感がありません。#nですが……。"
10033110-196 = "「全部を最高のお祭りに」……その言葉は、すごく響きました！"
10033110-197 = "え゛、そこ！？"
10033110-198 = "今回の修学旅行も、#n最終的には素晴らしいお祭りになりましたし……。"
10033110-199 = "[ns] （……本当に、お祭りだったのかもしれないな）"
10033110-200 = "さて、次は何をしましょうか！"
10033110-201 = "モチロン、次のお祭りの準備デス！#nワタシたちは、お祭り運営委員会デスから！"
10033110-202 = "では次の商店街祭りについてですが、舞踊グループを結成しましょう！#nそれから笛と三味線と太鼓の[ruby=こと]箏[/ruby]のグループも集った上で――"
10033110-203 = "ちょ、ちょっと待って！今から！？#nいくらなんでも早すぎ――"
10033110-204 = "なになに？#n楽しそう、私も混ぜてー！"
10033110-206 = "お昼寝は、後でにしようかな……。"
10033110-228 = "その、先生。"
10033110-229 = "[ns] \"どうしたの？\""
10033110-230 = "こんな言葉だけで足りないことは、承知の上ですが……。"
10033110-231 = "本当にありがとうございました。"
10033110-232 = "[s5] \"私も、これだけじゃ足りないと思うけど。”\n[s6] \"何よりもまず、おめでとう。\""
10033110-235 = "……？"
10033110-239 = "あ、お祭りを無事終えられたから、ということでしょうか……？"
10033110-240 = "えへへ……ありがとうございます。"
10033110-241 = "……。"
10033110-242 = "先生。"
10033110-249 = "百鬼夜行に来たら、いつでも私たちの元を訪ねてください。"
10033110-250 = "その時は必ずや……#n今回よりもっと素敵な、最高のお祭りをお見せしますから！"
10033110-254 = "にぎにぎとゆきゆきて"
