[translation]
10033110-1 = "Epílogo; As memórias sempre brilham"
10033110-2 = "Já esperava uma certa confusão, já que o pessoal de Gehenna viria...#nMas abrir a caixa foi além do esperado."
10033110-3 = "Mas, como esperado da Umika, do Comitê Organizador do Festival, e do Sensei.#nSou muito grata."
10033110-4 = "Desta vez também foi interessante... não, foi maravilhoso."
10033110-5 = "[s] \"Niya, você também não estava preocupada com várias coisas?\""
10033110-6 = "……O que quer dizer com isso?"
10033110-7 = "[s1] \"Houve várias partes que foram convenientes, não foi?\"\n[s2] \"Como o local da reunião com o Comitê Disciplinar, deu para notar que você foi cuidadosa.\""
10033110-10 = "Ahaha~, isso não é apenas uma coincidência?"
10033110-11 = "Eu só dei um jeitinho aqui e ali, pensando que seria mais interessante assim."
10033110-12 = "Se, como resultado, isso criou um significado para alguém...#nentão é uma sorte."
10033110-13 = "Não é só isso?"
10033110-14 = "[s] \"……Entendi, então vamos deixar por isso mesmo.\""
10033110-15 = "Ficaria feliz se deixássemos por isso mesmo♪"
10033110-21 = "Ugh, por que tive que passar por isso..."
10033110-22 = "Bem, eu exagerei um pouquinho, só um pouquinho!"
10033110-24 = "É isso mesmo!#nNós nos esforçamos para apagar o fogo, afinal!"
10033110-25 = "E o Festival Kamiki terminou em segurança!"
10033110-33 = "Vocês não acham que uma coisa é uma coisa e outra é outra, pessoal da Trupe Chimichami?"
10033110-34 = "Que situação.#nSe eu ouvir reclamações, talvez eu dobre a área de limpeza de vocês, hein?"
10033110-36 = "！？"
10033110-38 = "Não, não, não!#nOlhe só, não estamos limpando com todo o esforço?"
10033110-39 = "É isso mesmo! Limpeza é o máximo!#nFico feliz que Hyakkiyako esteja ficando limpa!"
10033110-46 = "Entendo, entendo."
10033110-47 = "Então, deixo o resto com vocês."
10033110-54 = "……Já foram?"
10033110-55 = "……Ah, que frustração!#nDroga, droga! Espere só, na próxima vez seremos nós que..."
10033110-57 = "Ah, o desfile de máscaras Tengu!#nJá começou!"
10033110-58 = "Tem Yamabushi também!#nEu adoro isso!"
10033110-64 = "Vocês, limpem direito!#nSe virem isso depois, vão levar uma bronca de verdade!?"
10033110-65 = "Espere um pouco, líder!#nSó depois de ver isso!"
10033110-66 = "Sumô, sumô!#nVai lá!"
10033110-77 = "Eu já diiiiiisse!"
10033110-82 = "……Eu não sabia que o Sensei viria."
10033110-83 = "[s] \"Foi por uma série de acontecimentos...\""
10033110-84 = "De qualquer forma, bom trabalho.#nMas se tivesse me avisado antes, eu também..."
10033110-85 = "[s] \"？\""
10033110-90 = "……Não é nada.#nSó que..."
10033110-91 = "Fico feliz por termos conseguido nos encontrar, mesmo que no final."
10033110-92 = "[s] \"É verdade, eu também estou feliz por ver você, Hina.\""
10033110-93 = "É, é mesmo...?"
10033110-97 = "Espere um pouco.#nVocê não esqueceu que eu estou aqui, esqueceu!?"
10033110-98 = "Mesmo tendo lidado bem com a interferência interminável do Pandemonium durante a reunião com a Hyakka Ryoran!"
10033110-99 = "Aqueles tanukis...#nJá que é uma viagem escolar, deveriam apenas aproveitar a viagem em silêncio...#nEles atrapalham diretamente e ainda enviam mensagens sarcásticas, o que é isso afinal!?"
10033110-100 = "Para começar,#npor que somos nós que temos que participar da reunião com o lado de Hyakkiyako!"
10033110-102 = "Pensando bem, o Pandemonium deveria ter ido!#nNão importa como você olhe, eles só empurraram o trabalho para nós, e o conteúdo no final――"
10033110-104 = "……."
10033110-105 = "Bem, o que aconteceu, aconteceu.#nJá que estamos aqui, por que não aproveita o festival?"
10033110-106 = "Pre-presidente...!?"
10033110-107 = "[ns3] \"Então, eu vou te guiar por Hyakkiyako.\"\n[ns4] \"Aprendi bastante sobre isso nos últimos dias.\""
10033110-110 = "O, o Sensei, pessoalmente...!?"
10033110-114 = "……Então, conto com você."
10033110-115 = "Hu-humph!#nPor consideração à presidente, vou deixar passar desta vez, viu?"
10033110-116 = "[s] \"Então, combinado.\""
10033110-119 = "Bem, pessoal, esperamos pela visita de vocês novamente!"
10033110-120 = "Todo encontro traz consigo uma despedida……."
10033110-121 = "Mas não há motivo para ficar triste!#nTenho certeza de que nos veremos novamente algum dia!"
10033110-122 = "Tchauzinho!#nDa próxima vez, vamos jogar Batalha Mushiking juntos!"
10033110-126 = "……Ah, já está na hora.#nEntão, até mais……."
10033110-131 = "Graças a isso, foi realmente divertido.#nObrigada."
10033110-132 = "Umika-chan, Feena-chan, Kaede-chan, Tsubaki-chan!#nProfessor, fiquem bem também!"
10033110-133 = "Bem, o professor provavelmente vai encontrar a gente em algum lugar logo, logo."
10033110-134 = "É, talvez sim!"
10033110-135 = "Ah, se vier a Gehenna, me avisa, que eu vou te buscar na hora!#nTchauzinho, muah!"
10033110-140 = "[ns] \"Então, até mais!\""
10033110-142 = "（Assim, a viagem de estudos chegou ao fim em segurança）"
10033110-143 = "（Novos encontros, novos laços, novas memórias……）"
10033110-148 = "Kishishi……#nA glória de Makoto-sama agora alcança até Hyakkiyako…… munya munya……."
10033110-152 = "（E enquanto nutre um novo sonho (?)……）"
10033110-157 = "Sendo assim, hora da festa de encerramento!"
10033110-158 = "Um brinde!"
10033110-160 = "Um brinde……."
10033110-165 = "Umika-chan, ouvi sobre o que aconteceu.#nFoi difícil, não foi?"
10033110-166 = "N-não, que isso……!"
10033110-167 = "Kaede-chan e Tsubaki-chan, bom trabalho também."
10033110-168 = "Ehehe……!"
10033110-169 = "Com isso, talvez eu tenha dado um passo a mais para me tornar uma dama maravilhosa!"
10033110-170 = "Acho que você já ouviu, mas a Umika foi realmente incrível!"
10033110-172 = "Meu coração também ficou aquecido!#nAquele seu jeito de declarar com tanta firmeza, tendo as chamas ardentes como pano de fundo……!"
10033110-174 = "A-aquilo foi, no fim das contas, graças à Erika-san e à Kirara-san……."
10033110-175 = "E também, graças à presença do professor……."
10033110-176 = "Mas……#nquem mudou o rumo de tudo, com certeza, foi você, Umika……."
10033110-177 = "N-não é para tanto……!#nPara começo de conversa, se não fosse por vocês, eu……!"
10033110-179 = "O que você está dizendo!#nNessas horas, aceite os elogios de bom grado!"
10033110-180 = "Hah!"
10033110-181 = "E-essa voz……!?"
10033110-182 = "A presidente do Comitê de Operações do Festival!"
10033110-188 = "Eu ouvi tudo o que vocês disseram!"
10033110-189 = "Você se esforçou muito.#nEsta viagem de estudos só foi um sucesso por causa da Umika."
10033110-190 = "……."
10033110-191 = "Eu, por causa de mim……?"
10033110-192 = "[s] \"Por que não aceita de bom grado?\""
10033110-193 = "Isso mesmo. Eu, o professor e todos os outros estamos dizendo a mesma coisa!#nTenha mais confiança!"
10033110-194 = "Estufe o peito e diga que foi você quem realizou tudo.#nDiga que, não importa o pedido que venha pela frente, você vai transformar tudo no melhor festival de todos!"
10033110-195 = "……Ainda não caiu a ficha.#nMas……."
10033110-196 = "\"Transformar tudo no melhor festival de todos\"…… essas palavras, tocaram fundo em mim!"
10033110-197 = "Hã, foi isso!?"
10033110-198 = "Esta viagem de estudos também,#nno fim das contas, acabou se tornando um festival maravilhoso……."
10033110-199 = "[ns] （……Talvez tenha sido um festival, de verdade）"
10033110-200 = "Muito bem, o que faremos agora!"
10033110-201 = "Claro, preparar o próximo festival!#nAfinal, nós somos o Comitê de Operações do Festival!"
10033110-202 = "Bem, sobre o próximo festival da rua comercial, vamos formar um grupo de dança!#nE depois, com o grupo de flauta, shamisen, tambor e cítara reunido――"
10033110-203 = "Es-espera um pouco! Agora!?#nPor mais que seja, é cedo dema――"
10033110-204 = "O que, o que?#nParece divertido, me deixem participar também!"
10033110-206 = "Acho que vou deixar a soneca para depois..."
10033110-228 = "Sobre isso, Sensei."
10033110-229 = "[ns] \"O que houve?\""
10033110-230 = "Eu sei que apenas palavras não são o suficiente, mas..."
10033110-231 = "Muito obrigada de verdade."
10033110-232 = "[s5] \"Eu também acho que só isso não basta.\"\n[s6] \"Mas acima de tudo, parabéns.\""
10033110-235 = "……？"
10033110-239 = "Ah, é por termos terminado o festival em segurança...?"
10033110-240 = "Hehehe... obrigada."
10033110-241 = "……。"
10033110-242 = "Sensei."
10033110-249 = "Quando vier a Hyakkiyako, por favor, visite-nos sempre que quiser."
10033110-250 = "Da próxima vez, com certeza...#nMostrarei um festival ainda mais maravilhoso e incrível do que este!"
10033110-254 = "Indo e vindo em meio ao agito"
