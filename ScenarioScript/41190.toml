[translation]
41190-1 = "Episódio 19; Hora de Adultos"
41190-2 = "Escola de Polícia Valkyrie - Telhado"
41190-4 = "Aqui é RABBIT 1, horário atual 01:00. Acabamos de chegar ao ORP."
41190-5 = "Acampamento RABBIT, o apoio aéreo ainda não chegou?"
41190-6 = "Desculpe, o ponto mudou e as coisas atrasaram!"
41190-7 = "Esperem mais 5 minutos!"
41190-8 = "Entendido."
41190-9 = "RABBIT 2, por favor, instale as barricadas. Vamos bloquear o acesso ao telhado."
41190-14 = "Já fiz isso. Por precaução, também espalhei minas terrestres perto da escada, mas..."
41190-18 = "……Foi rápido demais."
41190-19 = "J-já estão na porta……!?"
41190-20 = "Será que isso aguenta 5 minutos……?"
41190-25 = "Um telhado encurralado, uma porta trancada, pessoas batendo nela e um helicóptero que não chega nunca……"
41190-26 = "É igualzinho ao filme de zumbi que vi semana passada, hehehe……"
41190-27 = "……Vou perguntar por educação, mas qual foi o final?"
41190-28 = "Um zumbi se pendurou no helicóptero, ele caiu e todo mundo morreu."
41190-29 = "Eu fui uma idiota de perguntar!"
41190-30 = "M-mas não tem zumbis aqui, então……"
41190-32 = "……São vocês de novo."
41190-33 = "Z-zumbi!?"
41190-39 = "Quem você chamou de zumbi? No mínimo, me chame de Chefe do Departamento de Segurança Pública."
41190-40 = "Chefe do Departamento de Segurança Pública……!"
41190-41 = "A porta não abriu, como você chegou aqui?"
41190-42 = "Escalei a parede externa do prédio."
41190-43 = "Sério? Isso aqui tem mais de 10 andares…… que loucura……"
41190-44 = "A Valkyrie não tem esse tipo de treinamento, e sem equipamento de segurança?"
41190-45 = "Para capturar criminosos, o Departamento de Segurança Pública faz qualquer coisa."
41190-46 = "Vocês não acharam mesmo que poderiam se infiltrar na Valkyrie e sair andando tranquilamente, acharam?"
41190-50 = "Vocês já estão cercados. Parem com essa resistência inútil."
41190-52 = "……"
41190-53 = "Depois de tudo o que aconteceu, vocês ainda não aprenderam a lição? Estão loucas?"
41190-54 = "O Kivotos de hoje não precisa de vocês. Parem de resistir inutilmente e de causar problemas."
41190-55 = "Cometendo crimes como este, se desta vez o Conselho Estudantil Federal apagar seus registros escolares――"
41190-56 = "Chefe, o que você tem a dizer sobre os seus próprios crimes?"
41190-62 = "Encontramos os registros de transações do Departamento de Segurança Pública."
41190-63 = "Expulsar os nômades para a reurbanização da 'Cidade dos Coelhinhos'. Em troca, houve recebimento de propinas ilegais do Grupo Kaiser…… não é verdade?"
41190-64 = "Como vocês……"
41190-65 = "Ora, a Valkyrie começou a usar equipamentos novos do nada. É natural pensar que tinha algo por trás."
41190-66 = "A Escola de Polícia Valkyrie, responsável pela segurança de Kivotos, envolver-se em atividades criminosas em transações com empresas privadas…… isso é, sem dúvida, um problema."
41190-67 = "Processos que não seguem as regras oficiais estabelecidas pelo Conselho Estudantil Federal…… Chefe, não há como você não saber disso."
41190-69 = "Isso é um crime grave que vai contra os princípios da Escola de Polícia Valkyrie!"
41190-75 = "……"
41190-76 = "……Vocês falam demais, não é?"
41190-77 = "Regras oficiais…… é mesmo."
41190-78 = "Como vocês disseram, a Valkyrie deveria seguir as regras oficiais e ser justa."
41190-79 = "……Mas o mundo não é tão justo quanto vocês pensam."
41190-80 = "Vocês têm privilégios. Enquanto discutem justiça, sabem o que nós estávamos fazendo? Lidando com a sujeira, nos sujando de compromissos para cumprir o dever!"
41190-81 = "Isso é a sociedade, isso é a realidade!"
41190-82 = "Não dá para manter a justiça sem sujar as mãos!"
41190-83 = "Pirralhas como vocês entendem isso? O sentimento de ter que tomar essas decisões!"
41190-87 = "[ns] \"……Kanna.\""
41190-88 = "Essa voz é……"
41190-89 = "……Sensei, era você."
41190-90 = "[s1] \"Manter suas convicções pode ser difícil. Ainda assim……\"\n[s2] \"No fim das contas, você é quem deve continuar decidindo o seu próprio futuro.\""
41190-91 = "Mesmo assim…… se eu seguir apenas as minhas convicções, perderei tudo……!"
41190-92 = "Mesmo assim…… se eu seguir apenas as minhas convicções, perderei tudo……!"
41190-93 = "Nessa posição tão incerta! Eu não consigo fazer nada!!"
41190-94 = "[s] \"O pessoal do Esquadrão RABBIT começou praticamente do zero.\""
41190-98 = "……."
41190-99 = "[s] \"Está tudo bem. A situação pode ser difícil, pode ser dolorosa.\""
41190-101 = "[ns] \"Mas, ainda assim, você pode decidir para onde ir.\""
41190-107 = "……Humpf, você diz coisas sensatas."
41190-108 = "Mas é verdade, no final, somos nós que decidimos."
41190-109 = "Eu estava sempre ansiosa e com medo, mas……"
41190-110 = "Bem, foi uma decisão nossa, afinal."
41190-111 = "……Obrigada, Sensei."
41190-119 = "Chefe do Departamento de Segurança Pública. A \"justiça\" que você defende provavelmente não está errada. É só que ela é diferente da que eu acredito."

41190-120 = "Porém, se você continuar culpando os outros pela raiz disso, acho que um dia ela perderá o brilho. \"Que tipo de decisões você continuou tomando?\", isso é certamente……"

41190-121 = "a diferença entre nós da SRT e você da Valkyrie."
41190-122 = "……."
41190-126 = "Miyako, espere por nós! Chegamos acima do ponto de extração!"
41190-127 = "……Vocês chegaram."
41190-128 = "Todos, preparem os arreios. Vamos sair um por um."
41190-134 = "Equipamento pronto, subam!"
41190-135 = "Segurem-se firme!"
41190-140 = "……Com licença, Chefe do Departamento de Segurança Pública."
41190-141 = "Da próxima vez, espero que seja em circunstâncias melhores."
41190-147 = "Acho melhor eu já ir preparando o relatório de desculpas."
41190-149 = "Parque dos Coelhinhos"
41190-153 = "Aqui é RABBIT 1, horário atual 01:45. Chegamos ao Acampamento RABBIT."
41190-154 = "Sem feridos, sem baixas, e o \"Trevo\" foi garantido com sucesso."
41190-160 = "……Operação encerrada, bom trabalho a todos."
41190-161 = "[s] \"Que bom que estão bem, bom trabalho.\""
41190-166 = "Sério, estou exausta, vou desmaiar……."
41190-167 = "Eu também,"
41190-168 = "Estou com tanto sono…… já……."
41190-173 = "Miyu, pelo menos tire o equipamento……."
41190-174 = "E ainda tem o relatório da operação, lavar o rosto, escovar os dentes e……."
41190-175 = "E então, hum…… ah, não aguento mais……."
41190-176 = "Ah, que cansaço…… eu também estou ficando com sono."
41190-177 = "Por enquanto, vou apenas desligar o equipamento de comunicação……."
41190-184 = "Todas vocês se esforçaram muito, não é?"
41190-191 = "……Então, como informei, entregarei o \"Trevo\" ao Sensei."
41190-192 = "Não descobrimos quem é o mentor por trás do incidente, mas…… considerando que até a Chefe do Departamento de Segurança Pública foi envolvida, sinto que há alguém muito inteligente por trás disso."
41190-193 = "Ainda não entendo o mundo dos adultos…… mas, como ainda sou uma criança, o que posso fazer termina aqui por enquanto."
41190-194 = "Sensei, o resto fica com você."
41190-195 = "[s] \"Sim, pode deixar comigo.\""
41190-197 = "(Depois disso, levei as alunas adormecidas para dentro da barraca e voltei para o Schale)"
41190-201 = "(……Preciso dar um jeito na evidência que recebi da Miyako)"
41190-203 = "Próximo episódio: Toca da Raposa"
