[translation]
41190-1 = "Episódio 19: A Hora dos Adultos"
41190-2 = "Terraço da Academia Valkyrie"
41190-4 = "Aqui RABBIT1, horário 01:00. Acabamos de chegar ao Ponto de Reagrupamento."
41190-5 = "Acampamento RABBIT, o apoio aéreo ainda não chegou?"
41190-6 = "Desculpa, o ponto mudou e atrasou tudo!"
41190-7 = "Aguentem mais 5 minutos!"
41190-8 = "Entendido."
41190-9 = "RABBIT2, por favor, monte barricadas. Vamos bloquear o acesso ao terraço."
41190-14 = "Já fiz. Só por precaução, espalhei minas na escada…"
41190-18 = "…Rápido."
41190-19 = "J-já chegaram na porta…?!"
41190-20 = "Será que aguenta 5 minutos…?"
41190-25 = "Terraço cercado, porta trancada, pessoas batendo na porta, helicóptero que não chega…"
41190-26 = "Igual àquele filme de zumbi que assisti semana passada, kuhihi…"
41190-27 = "…Só para saber, qual era o final?"
41190-28 = "Um zumbi pendurado no helicóptero fez ele cair. Todos morreram."
41190-29 = "Fui idiota de perguntar!"
41190-30 = "M-mas aqui não tem zumbi…"
41190-32 = "…De novo vocês."
41190-33 = "Z-zumbi?!"
41190-39 = "Quem é zumbi? Me chame de Chefe do Bureau, no mínimo."
41190-40 = "Chefe do Bureau…!"
41190-41 = "Como chegou aqui com a porta trancada?"
41190-42 = "Escalei a parede."
41190-43 = "Fala sério, o prédio tem mais de 10 andares… que loucura…"
41190-44 = "Esse tipo de treinamento não existe na Valkyrie, e sem equipamento?"
41190-45 = "Para prender criminosos, o Bureau faz qualquer coisa."
41190-46 = "Não pense que vão sair tranquilas depois de invadir a Valkyrie."
41190-50 = "Vocês já estão cercadas. Parem de resistir."
41190-52 = "……"
41190-53 = "Depois de tudo que aconteceu, ainda não aprenderam? Estão loucas?"
41190-54 = "Kivotos não precisa mais de vocês. Parem de resistir e só atrapalhar."
41190-55 = "Fazendo essas coisas quase criminosas, vão acabar tendo seus registros cancelados de vez…"
41190-56 = "Chefe do Bureau, o que acha desse crime?"
41190-62 = "Encontramos os registros de transações do Bureau."
41190-63 = "Expulsar os andarilhos para revitalizar a 'Vila dos Coelhinhos'. Em troca, houve propina do Grupo Kaiser… não é mesmo?"
41190-64 = "Como é que…"
41190-65 = "É natural suspeitar quando a Valkyrie troca de equipamento de repente, não?"
41190-66 = "A Academia Valkyrie, responsável pela segurança de Kivotos, se envolver em crimes com uma empresa privada… isso é grave."
41190-67 = "Procedimentos que ignoram as regras oficiais do Conselho Estudantil… Chefe do Bureau, a Sra. não podia ignorar isso."
41190-69 = "Isso é um crime grave contra os princípios da Academia Valkyrie!"
41190-75 = "Ugh…"
41190-76 = "…Falam o que querem, não é?"
41190-77 = "Regras oficiais… é mesmo."
41190-78 = "Como você disse, a Valkyrie deveria seguir as regras e ser justa."
41190-79 = "…Mas o mundo não é tão justo quanto vocês pensam."
41190-80 = "Vocês têm privilégios. Enquanto discursam sobre justiça, sabem o que nós estávamos fazendo? Nos sujando, fazendo concessões, lidando com serviços públicos!"
41190-81 = "Isso é a sociedade, é a realidade!"
41190-82 = "Não se pode defender a justiça sem sujar as mãos!"
41190-83 = "Crianças como vocês entendem isso? Entendem o que nos levou a ter que fazer essas escolhas?"
41190-87 = "[ns] \"…Kanna.\""
41190-88 = "Essa voz…"
41190-89 = "…Professor. Era o senhor."
41190-90 = "[s1] \"Manter a convicção pode ser difícil. Mas, mesmo assim…\"\n[s2] \"No fim, o seu futuro, você mesma decide.\""
41190-91 = "Mesmo assim… se eu seguir só minha convicção, vou perder tudo!"
41190-92 = "Mesmo assim… se eu seguir só minha convidado, vou perder tudo!"
41190-93 = "Nessa posição ambígua, eu não consigo fazer nada!"
41190-94 = "[s] \"O Esquadrão RABBIT começou praticamente do zero.\""
41190-98 = "……"
41190-99 = "[s] \"Fica tranquilo. A situação é difícil, é dolorosa.\""
41190-101 = "[ns] \"Mas o destino, vocês mesmas decidem.\""
41190-107 = "…Hmph, até que fala coisas decentes."
41190-108 = "Mas é mesmo, no fim, cada um decide seu caminho."
41190-109 = "Sempre foi incerto, assustador…"
41190-110 = "Bem, foi nossa escolha."
41190-111 = "…Muito obrigada, Professor."
41190-119 = "Chefe do Bureau. Sua 'justiça' não deve estar errada. Apenas é diferente da minha."
41190-120 = "Mas se continuar culpando os outros por sua raiz, um dia ela vai desbotar. 'Que tipo de escolhas você fez?'… isso, creio eu, é a diferença entre 'nós' e a 'Sra.'."
41190-121 = "A diferença entre 'nós' e a 'Sra.'."
41190-122 = "……"
41190-126 = "Miyako, esperaram! Chegamos acima do ponto!"
41190-127 = "…Finalmente."
41190-128 = "Todas, preparem os cabos. Vamos sair em ordem."
41190-134 = "Preso, pode içar!"
41190-135 = "Segurem firme!"
41190-140 = "…Então, com licença, Chefe do Bureau."
41190-141 = "Na próxima, espero que em melhores circunstâncias."
41190-147 = "Vou preparar um relatório."
41190-149 = "Parque dos Coelhinhos"
41190-153 = "Aqui RABBIT1, horário 01:45. Chegamos ao Acampamento RABBIT."
41190-154 = "Sem feridos, sem perdas, 'Trevo' garantido."
41190-160 = "…Operação encerrada. Bom trabalho."
41190-161 = "[s] \"Ainda bem que estão bem. Bom trabalho.\""
41190-166 = "Nossa, estou exausta, vou cair…"
41190-167 = "Eu também…"
41190-168 = "Com sono… já não…"
41190-173 = "Miyu, pelo menos tire o equipamento…"
41190-174 = "E o relatório, e lavar o rosto, e escovar os dentes…"
41190-175 = "E, ahm… ah, não dá mais…"
41190-176 = "Ah, estou cansada… também estou com sono."
41190-177 = "Vou só desligar os equipamentos de comunicação…"
41190-184 = "Todo mundo se esforçou, né."
41190-191 = "…Então, como combinado, entrego o 'Trevo' ao Professor."
41190-192 = "Não sabemos quem é o mandante, mas pelo fato de terem conseguido corromper a Chefe do Bureau, deve ser alguém bastante astuto."
41190-193 = "Ainda não entendo o mundo dos adultos… mas o que posso fazer, sendo ainda criança, é só isto."
41190-194 = "Professor, o resto é com o senhor."
41190-195 = "[s] \"Sim, pode deixar.\""
41190-197 = "(Depois, levei as alunas que dormiam para dentro das barracas e voltei para a Schale.)"
41190-201 = "(…Vou dar um jeito na prova que a Miyako me entregou.)"
41190-203 = "Próximo Episódio: Toca da Raposa"