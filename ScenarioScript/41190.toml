[translation]#[Texto revisado, mas pode haver alterações como Censura.] Em aguardo de revisão de formatação de texto. - Filipe 10/06.
41190-1 = "Episódio 19: O Peso de ser Adulto"
41190-2 = "Academia Valkyrie - Terraço"
41190-4 = "Aqui é RABBIT 1. Horário atual: 0100. Acabamos de chegar ao Ponto de Extração no terraço."
41190-5 = "Acampamento RABBIT, cadê o nosso apoio aéreo?!"
41190-6 = "Foi mal! Tive que recalcular a rota pra não cruzar com os holofotes de patrulha!"
41190-7 = "Segura a barra por mais 5 minutos!"
41190-8 = "Entendido."
41190-9 = "RABBIT 2, bloqueie o acesso da porta do terraço. Levante as barricadas."
41190-14 = "Já tá feito. E pra garantir, deixei uns 'presentinhos explosivos' colados nos degraus da escada logo abaixo..."
41190-18 = "……Eles chegaram rápido demais."
41190-19 = "E-Eles já tão batendo na porta de aço do terraço...?!"
41190-20 = "Saki, a barricada aguenta cinco minutos sob fogo pesado...?"
41190-25 = "Encurraladas num telhado, uma porta trancada prestes a ceder, uma horda sedenta de sangue batendo nela, e o resgate que não chega..."
41190-26 = "Isso tá igualzinho àquele filme de zumbi que eu assisti semana passada. Kuhihi~..."
41190-27 = "……Eu provavelmente vou me arrepender de perguntar, mas como o filme acabou?"
41190-28 = "Um dos zumbis se pendurou no trem de pouso do helicóptero de resgate, o piloto perdeu o controle, bateu num prédio e todo mundo morreu queimado."
41190-29 = "Eu não devia ter perguntado!!"
41190-30 = "M-Mas meninas, graças a Deus a gente não tá lutando contra zumbis aqui..."
41190-32 = "……Vocês e a mania de causarem problemas na minha base."
41190-33 = "Z-ZUMBIII?!!"
41190-39 = "Que 'zumbi' o quê. Dirijam-se a mim como Chefe da Segurança Pública."
41190-40 = "Kanna...!"
41190-41 = "A porta tá lacrada! Como foi que você subiu até aqui?!"
41190-42 = "Eu escalei a parede externa do prédio."
41190-43 = "Cê tá brincando... Esse prédio tem mais de dez andares... que droga de insanidade é essa..."
41190-44 = "A Valkyrie não ensina isso em lugar nenhum. E você escalou no escuro, debaixo de chuva e sem equipamento de segurança?!"
41190-45 = "A Segurança Pública faz o que for necessário para prender os criminosos."
41190-46 = "Vocês invadem o coração da nossa escola, plantam bombas e acham que vão simplesmente voar de volta pra casa?"
41190-50 = "A base está cercada. Vocês não têm para onde fugir. Baixem as armas e se entreguem."
41190-52 = "……"
41190-53 = "Vocês acabaram de perder tudo numa enchente e já tão aqui brincando de soldado de novo? Vocês não têm juízo?!"
41190-54 = "Entendam de uma vez: a Kivotos de hoje não precisa mais de vocês. Parem com essa resistência inútil e parem de sujar a nossa paz."
41190-55 = "Invadir uma delegacia e roubar dados do governo? Vocês querem ter seus registros acadêmicos apagados de vez e serem presas como terroristas...?!"
41190-56 = "Senhora Chefe da Segurança Pública. E quanto aos seus crimes e o seu apagamento ético?"
41190-62 = "Nós colocamos as mãos nos registros contábeis ocultos do seu escritório."
41190-63 = "O seu trabalho sujo de expulsar mendigos e civis da Vila dos Coelhinhos foi o pagamento pelo armamento de ponta que a Kaiser Industry repassou a vocês em um esquema de propina e lavagem de dinheiro corporativo... Eu estou errada?"
41190-64 = "Como vocês... conseguiram isso..."
41190-65 = "Uma escola falida do nada aparece com fuzis importados que custam milhões? A matemática básica não batia."
41190-66 = "A Academia de Polícia de Valkyrie, símbolo de proteção e paz em Kivotos, virou capanga de uma empreiteira corrupta... Vocês não têm vergonha na cara?"
41190-67 = "Isso é um desvio nojento de conduta e uma quebra direta dos regulamentos da Presidente do Conselho Estudantil... E você, Chefe Kanna, operava tudo sabendo da sujeira."
41190-69 = "A sua existência hoje cospe nos valores da Valkyrie!"
41190-75 = "Urgh...!"
41190-76 = "……Vocês enchem a boca pra falar das virtudes do mundo como se conhecessem alguma coisa."
41190-77 = "Os regulamentos e a ética... Tem razão."
41190-78 = "A Valkyrie deveria ser cega, incorruptível e justa. Deveria servir de pilar."
41190-79 = "……Mas adivinhem: a realidade é podre e o mundo não é justo como nas fábulas que contam para vocês."
41190-80 = "Enquanto a Presidente cobria vocês com privilégios absolutos e orçamentos bilionários para brincarem de 'Super Heroínas', sabem o que nós fazíamos? Engolíamos seco nos esgotos da cidade, lutando nas ruas, fazendo concessões diárias com a sujeira para manter um pingo de ordem, porque nos faltava tudo!"
41190-81 = "Esse é o mundo real! Essa é a lama da sociedade!"
41190-82 = "É impossível sustentar a 'Justiça' se você não estiver disposta a sujar as mãos no sangue e no barro!!"
41190-83 = "Crianças mimadas de elite como vocês, que nasceram no berço de ouro militar, nunca vão entender o peso de ter que tomar essa decisão! O desespero de vender a própria alma pra não ver tudo desmoronar!!"
41190-87 = "[ns] \"……Kanna.\""
41190-88 = "Essa voz... no canal de rádio..."
41190-89 = "……É o senhor de novo, Sensei."
41190-90 = "[s1] \"Manter os próprios ideais vivos em meio ao caos é doloroso e cruel. Eu entendo o peso nas suas costas...\"\n[s2] \"Mas não culpe o sistema pelas concessões que você fez. Porque, no fim do dia, quem escolhe o caminho que trilha é você mesma.\""
41190-91 = "E o que o senhor queria que eu fizesse?! Se eu me recusasse a ceder, se eu gritasse pela justiça limpa... eu seria esmagada e perderia tudo o que eu tentei proteger...!"
41190-92 = "E o que o senhor queria que eu fizesse?! Se eu me recusasse a ceder, se eu gritasse pela justiça limpa... eu seria esmagada e perderia tudo o que eu tentei proteger...!"
41190-93 = "Presa numa posição fraca, sem autonomia, sem poder e de mãos atadas! Eu não tive escolha!!"
41190-94 = "[s] \"Olhe para a RABBIT. Elas perderam a escola, as armas, o abrigo. Elas foram reduzidas a menos que zero. E, mesmo assim, olhe onde elas estão agora.\""
41190-98 = "……"
41190-99 = "[s] \"A tempestade vai doer e as escolhas vão arrancar um pedaço de você.\""
41190-101 = "[ns] \"Mas quem escreve o destino final é sempre você.\""
41190-107 = "……Quem diria que esse velhote preguiçoso sabia fazer um discurso tão brabo."
41190-108 = "Mas ele não tá errado. Quem cava a própria cova somos nós mesmos."
41190-109 = "A gente também morre de medo todo dia, passamos fome, engolimos o choro..."
41190-110 = "Mas dormir na lama foi uma escolha nossa. E nós bancamos ela."
41190-111 = "……Obrigada por cuidar de nós, Sensei."
41190-119 = "Senhora Chefe da Segurança Pública. Eu não acho que a sua 'Justiça Suja' esteja totalmente errada. É apenas incompatível com o que nós acreditamos ser correto."
41190-120 = "Mas se você continuar jogando a culpa das suas escolhas cruéis no 'mundo' e nas 'circunstâncias'... a sua justiça vai virar apenas uma desculpa vazia. 'Assumir o peso das próprias escolhas', seja na luz ou na lama... Eu acho que essa é a diferença fundamental..."
41190-121 = "Entre as garotas da [ruby=SRT]Luz[/ruby]... e você, a 'Cachorra Louca' da [ruby=Valkyrie]Sombra[/ruby]."
41190-122 = "……"
41190-126 = "Miyako! Desculpa a demora! Cheguei no ponto de extração aéreo!"
41190-127 = "……A nossa carona chegou."
41190-128 = "Esquadrão RABBIT, prender os ganchos. Extração tática em andamento."
41190-134 = "Cabos travados! Puxa, Moe!"
41190-135 = "Segurem firme! A subida vai dar um frio na barriga!"
41190-140 = "……Nós estamos nos retirando, Kanna."
41190-141 = "Eu realmente espero que o nosso próximo encontro seja menos... deplorável para o seu lado."
41190-147 = "Eu vou... ter que escrever um relatório de incidente e um pedido de desculpas muito longos por causa de vocês."
41190-149 = "Parque dos Coelhinhos"
41190-153 = "Aqui é RABBIT 1. Horário atual: 0145. Aterrissagem bem sucedida no Acampamento RABBIT."
41190-154 = "Zero baixas. Zero feridas críticas. 'Alvo Trevo' assegurado."
41190-160 = "……Missão concluída. Bom trabalho a todas."
41190-161 = "[s] \"Mandaram super bem. Podem descansar agora, vocês merecem.\""
41190-166 = "Mano, eu tô destruída... minhas pernas tão parecendo gelatina..."
41190-167 = "Eu também..."
41190-168 = "O sono... tá me apagando..."
41190-173 = "Miyu... tira o colete balístico antes de deitar no chão de terra..."
41190-174 = "E eu ainda tenho que escrever o relatório operacional... escovar os dentes..."
41190-175 = "Ah, quer saber... que se dane... zzz..."
41190-176 = "A adrenalina baixou... acho que vou desmaiar..."
41190-177 = "Vou só apagar as luzes e desconectar a antena..."
41190-184 = "Elas deram tudo de si hoje, né?"
41190-191 = "……Conforme combinado, o 'Trevo' está nas suas mãos, Sensei."
41190-192 = "Eu não sei quem move as engrenagens por trás das cortinas corporativas... mas se conseguiram colocar até a 'Cachorra Louca' na coleira, é gente muito poderosa."
41190-193 = "Nós somos armas para o campo de batalha tático... Nós não sabemos lidar com as guerras de escritório e os esquemas políticos do mundo dos adultos. Esse é o nosso limite."
41190-194 = "O campo de batalha agora é seu, Sensei. Contamos com você."
41190-195 = "[s] \"Pode deixar a guerra suja comigo. Durma bem.\""
41190-197 = "（Caminhei entre as barracas cobrindo as alunas adormecidas, e depois me retirei silenciosamente para a Schale.）"
41190-201 = "（……Amanhã de manhã, vou ter que descobrir como usar o presente da Miyako para implodir a Kaiser.）"
41190-203 = "Próximo Episódio: Toca da Raposa"