[translation]
80000039-1 = "Sentimentos especiais em um dia especial"
80000039-2 = "Schale - Sala de Descanso"
80000039-3 = "（Enquanto descansava na sala de descanso do Schale...）"
80000039-4 = "[s] \"Terminei uma parte, o resto fica para outra hora...\""
80000039-5 = "（Embora tivesse terminado várias coisas, não tinha energia para comer, e no momento em que estendi a mão para o chocolate que comprei na loja de conveniência）"
80000039-9 = "[ns] \"Aqui, pegue.\""
80000039-10 = "Ah, sou eu. É a Fuuka, Sensei."
80000039-11 = "[s] \"Fuuka?\""
80000039-15 = "O-olá."
80000039-16 = "[s] \"O que te traz aqui hoje?\""
80000039-17 = "Bem... Sensei, você já comeu?"
80000039-18 = "Ah, ainda não?"
80000039-19 = "...E o que é isso que você está segurando?"
80000039-20 = "[s] \"Chocolate.\""
80000039-21 = "Você comprou isso na loja de conveniência, como se fosse algo normal?"
80000039-22 = "...Isso não pode acontecer!"
80000039-23 = "Eu imaginei que chegaria a esse ponto, então vir aqui foi a decisão certa!!"
80000039-24 = "[s] \"Hã...?\""
80000039-25 = "Com licença!"
80000039-31 = "O recipiente fica aqui,"
80000039-35 = "Isto e aquilo..."
80000039-39 = "Sim, está pronto!"
80000039-40 = "[s] \"Isso é...\""
80000039-41 = "É uma marmita que eu preparei."
80000039-42 = "Você está sempre ocupado com o trabalho, e imaginei que sua alimentação estivesse ficando descuidada de novo."
80000039-43 = "Não acredito que, só porque é Dia dos Namorados, você ia tentar se sustentar apenas com chocolate...!"
80000039-44 = "Ou será que é justamente por ser Dia dos Namorados? Três refeições de chocolate por dia...?"
80000039-45 = "[s] \"Isso seria demais...\""
80000039-46 = "Pois é, fico aliviada. Mesmo sendo um dia especial, comer apenas doces não faz bem para a saúde."
80000039-47 = "Eu não posso deixar passar algo assim!"
80000039-48 = "[s] \"D-desculpe...\""
80000039-49 = "Bem, hoje não é apenas por esse motivo..."
80000039-50 = "Além disso, toda vez que te vejo por aí ultimamente, sinto que você não está com uma aparência saudável..."
80000039-51 = "Veja, eu não te disse antes?"
80000039-52 = "Que se você quisesse comer uma refeição caseira de verdade, era só me chamar."
80000039-53 = "E-então, por isso eu vim pessoalmente hoje!"
80000039-54 = "Primeiro, se você recuperar suas energias com uma comida gostosa, a maioria dos problemas se resolve."
80000039-55 = "Vamos, hora de comer?"
80000039-56 = "[s] \"Obrigado, Fuuka.\""
80000039-57 = "De nada. É meu dever como chefe do Clube de Merenda."
80000039-58 = "[s] \"Já que estamos aqui, por que não come comigo?\""
80000039-59 = "Eh, e-eu também...?"
80000039-60 = "Sentados à mesa, só nós dois...?"
80000039-61 = "S-sim! S-se o Sensei não se importar, eu adoraria..."
80000039-67 = "（Foi assim que me sentei à mesa com a Fuuka）"
80000039-69 = "[ns] \"Estava delicioso, obrigado pela refeição.\""
80000039-70 = "Fufu. Fico feliz que tenha gostado."
80000039-71 = "Ah, e mais uma coisa..."
80000039-76 = "[ns] \"Isso é... cacau?\""
80000039-77 = "Sim... é o meu presente de Dia dos Namorados para você."
80000039-78 = "Eu processei o cacau colhido na horta do Clube de Merenda para fazer chocolate. Usei isso para preparar este chocolate quente..."
80000039-79 = "Bem, como eu disse antes, hoje é Dia dos Namorados, então..."
80000039-80 = "Por favor, beba enquanto ainda está quente. Tenho certeza de que você vai dormir muito bem esta noite."
80000039-81 = "[s] \"Fuuka...!\""
80000039-82 = "P-por que esses olhos marejados...!? V-você está bem, Sensei!?"
80000039-83 = "[s] \"Obrigado... ah, por acaso essas canecas são iguais?\""
80000039-84 = "I-isso é, bem! Não tem nenhuma intenção ou significado especial por trás disso...!"
80000039-85 = "É só que... eu trouxe o que tinha disponível no Clube de Merenda, por assim dizer..."
80000039-86 = "Bem, por hoje é só, com licença!"
80000039-90 = "[ns] \"Fuuka...!?\""
80000039-94 = "Ah, coloque as sobras da comida em um recipiente e guarde na geladeira direitinho! Falaremos sobre o recipiente outro dia!"
80000039-95 = "Até mais...!"
80000039-99 = "[ns] \"S-sim, obrigado...\""
80000039-101 = "(Enquanto me sentia reconfortado pelo calor deixado por Fuuka, que saiu apressada (?), bebi o chocolate quente.)"
80000039-103 = "[ns] \"Doce e reconfortante...\""
