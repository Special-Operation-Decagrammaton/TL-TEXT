[translation]
2300402-1 = "Espírito Artesanal"
2300402-2 = "Departamento de Engenharia - Oficina"
2300402-4 = "Visitei o Departamento de Engenharia para buscar o porta-canetas que pedi para a Utaha."
2300402-6 = "Não, está errado... Assim não vai dar..."
2300402-7 = "[s1] \"Cheguei, Utaha.\"\n[s2] \"Como está o porta-canetas?\""
2300402-8 = "Ah, Sensei. Bem-vindo. #nPode esperar só mais um pouco? Está levando mais tempo do que eu imaginava..."
2300402-9 = "Ah, Sensei. Bem-vindo. #nPode esperar só mais um pouco? Está levando mais tempo do que eu imaginava..."
2300402-10 = "Surgiu um problema inesperado, só isso."
2300402-11 = "[s] \"Tudo bem, pode levar o tempo que precisar.\""
2300402-12 = "Obrigada. ...Isso não costuma acontecer, mas hoje as máquinas parecem estar de mau humor."
2300402-13 = "Eu não esperava falhar duas vezes, mas..."
2300402-15 = "Algum tempo depois..."
2300402-17 = "A impressão foi concluída, por favor, verifique."
2300402-19 = "..."
2300402-20 = "[s] \"Incrível, ficou ainda melhor do que eu imaginava. Então, aceitarei com gratidão...\""
2300402-21 = "Não serve...!"
2300402-22 = "[s] \"O-o que houve...?\""
2300402-23 = "O porta-canetas que eu queria fazer não é assim."
2300402-24 = "Olhe aqui. O corte está malfeito e a parte dupla não reproduziu a curvatura conforme o projeto."
2300402-25 = "Além disso, a durabilidade não é tão boa quanto eu esperava. Desse jeito, ele certamente não conseguiria nem rebater uma bala de calibre .22..."
2300402-26 = "[s3] \"A-acho que não tem problema...\"\n[s4] \"Um porta-canetas não precisa de função à prova de balas, precisa?\""
2300402-27 = "Não, mesmo que você diga isso, Sensei, eu não posso aceitar. #nAlgo tão incompleto quanto isso é um produto defeituoso."
2300402-28 = "Não, mesmo que você diga isso, Sensei, eu não posso aceitar. #nAlgo tão incompleto quanto isso é um produto defeituoso."
2300402-29 = "E se as outras alunas souberem que eu dei um produto defeituoso desses para você, eu ficaria tão envergonhada que não conseguiria nem andar pelo Millennium...!"
2300402-30 = "[s] \"É, acho que entendo como você se sente...\""
2300402-31 = "Mas Sensei, fique tranquilo. Eu certamente farei o porta-canetas perfeito—"
2300402-32 = "Pela honra do Departamento de Engenharia!"
2300402-34 = "No entanto, mesmo após várias falhas (?), Utaha continuou a produção sem ceder."
2300402-36 = "A impressão foi concluída, por favor, verifique."
2300402-37 = "Não serve...!"
2300402-38 = "[s] \"O que está errado dessa vez?\""
2300402-39 = "Aqui. Surgiram pequenos arranhões na superfície."
2300402-40 = "Será que a modelagem por fusão e deposição tem seus limites...?"
2300402-41 = "Vou começar de novo, preciso repensar o método de fabricação."
2300402-42 = "[s] \"Para mim já está bom, eu só queria o porta-canetas logo...\""
2300402-45 = "Depois disso, após mais de dez tentativas, Utaha finalmente conseguiu algo que a deixou satisfeita."
