[translation]
2300402-1 = "職人魂"
2300402-2 = "エンジニア部・作業室"
2300402-4 = "ウタハにお願いしていたペン立てを受け取りに、エンジニア部を訪れた。"
2300402-6 = "違うな……このままではダメだ……。"
2300402-7 = "[s1] \"来たよ、ウタハ。\"\n[s2] \"ペン立てはどう？\""
2300402-8 = "ああ、先生。いらっしゃい。#nもう少し待ってもらえるかな？思っていたより時間がかかりそうで……。"
2300402-9 = "ああ、先生。いらっしゃい。#nもう少し待ってもらえるかな？思っていたより時間がかかりそうで……。"
2300402-10 = "ちょっとばかり予想外のトラブルが発生したんだ。"
2300402-11 = "[s] \"大丈夫、ゆっくりでいいよ。\""
2300402-12 = "ありがとう。……普段はこんなこと起きないのだけど、今日はなんだか機械の機嫌が悪いみたいだ。"
2300402-13 = "まさか2回も失敗はしないと思うが……。"
2300402-15 = "しばらくした後……。"
2300402-17 = "出力が完了しました、確認してください。"
2300402-19 = "……。"
2300402-20 = "[s] \"すごい、想像以上にキレイにできてるね。じゃあありがたく……\""
2300402-21 = "ダメだ……っ！"
2300402-22 = "[s] \"ど、どうしたの……？\""
2300402-23 = "私が作りたかったペン立てはこんなものじゃない。"
2300402-24 = "この辺りを見てほしい。切断処理も甘いし、二重になっている部分が図面通りの曲面をきちんと再現できていない。"
2300402-25 = "それに、耐久性も想像以上に良くない。これでは、22口径の弾丸すら跳ね返せないに違いない……。"
2300402-26 = "[s3] \"だ、大丈夫だと思うけど……。\"\n[s4] \"ペン立てに防弾機能は必要ないんじゃないかな……？\""
2300402-27 = "いや、たとえ先生がそうだとしても、私は納得できない。#nこんな中途半端では不良品と同じだ。"
2300402-28 = "いや、たとえ先生がそうだとしても、私は納得できない。#nこんな中途半端では不良品と同じだ。"
2300402-29 = "それに、こんな不良品を先生にプレゼントしたという事実が他の生徒たちに知られたら、私はもう恥ずかしくてミレニアムの中を歩くことができない……！"
2300402-30 = "[s] \"そ、そういうものなのかな……。\""
2300402-31 = "だが先生、安心してほしい。必ずや完璧なペン立てを作ってみせる――"
2300402-32 = "エンジニア部の名にかけて！"
2300402-34 = "しかしその後も失敗（？）を重ね、それでもウタハは妥協することなく、製作を続けた。"
2300402-36 = "出力が完了しました、確認してください。"
2300402-37 = "ダメだ……！"
2300402-38 = "[s] \"今度はどこがダメなの？\""
2300402-39 = "ここだ。表面に細かな傷のようなものが付いてしまっている。"
2300402-40 = "やはり熱溶解積層法では限界があるのか……。"
2300402-41 = "やり直しだ、もう一度製作方法から考え直してみよう。"
2300402-42 = "[s] \"それくらいでいいからそろそろペン立てが欲しいな……。\""
2300402-45 = "その後、さらに10個以上の試行錯誤の末、ようやくウタハの満足いくものができたのであった。"
