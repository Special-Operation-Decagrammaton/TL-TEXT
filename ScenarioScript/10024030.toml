[translation]
10024030-1 = "Episódio 3: Zokureikatsuu"
10024030-3 = "Sala do Clube de Pesquisa de Alquimia"
10024030-5 = "[ns1] \"Pensei que estávamos indo para algum lugar específico, mas...\"\n[ns2] \"O Clube de Pesquisa de Alquimia...?\""
10024030-9 = "Sim. É um dos lugares onde provavelmente usariam o 'Ginseng Milenar'."
10024030-10 = "Eu mesma, honestamente, nunca usei o 'Ginseng Milenar' para cozinhar."
10024030-11 = "Acho que a imagem que se tem dele é mais voltada para remédios, não é? #nEmbora seja verdade que algumas pessoas o usam na culinária e outras o desejam..."
10024030-12 = "De qualquer forma, viemos ao lugar onde é mais provável que o utilizem."
10024030-13 = "Pensei em pedir ajuda ao Clube de Pesquisa de Artes Marciais ou ao Clube de Ópera de Pequim, já que eles treinam o corpo... #nmas..."
10024030-14 = "Não acho que eles entendam muito sobre as propriedades ou benefícios. #nSabe, tem muita gente que pensa: 'se faz bem para o corpo, é só comer'."
10024030-15 = "Entendo... Presidente, então você quer dizer que se comer o 'Ginseng Milenar', pode ficar mais forte."
10024030-16 = "Será que o 'Ginseng Milenar' existe... para o Kung Fu?"
10024030-17 = "...Ninguém está falando de Kung Fu aqui, sabia?"
10024030-18 = "Mas ele não ajuda a fortalecer o corpo?"
10024030-19 = "Esquece, esquece. Vamos, acalme-se."
10024030-25 = "Se não é o Sensei com o Sindicato Genbu, fazendo barulho? #n...Que combinação incomum, o que aconteceu?"
10024030-26 = "[s] \"Tenho um pedido para a Saya.\""
10024030-27 = "...Eu tenho um péssimo pressentimento sobre isso. #nSe o Sindicato Genbu está junto, isso significa que..."
10024030-28 = "Sinto muito, Sensei, mas eu quero que você vá embora..."
10024030-29 = "Eu não quero me envolver de jeito nenhum nas brigas entre o Sindicato Genbu e o Genryumon!"
10024030-30 = "O Clube de Pesquisa de Alquimia está ocupado hoje desenvolvendo o elixir da imortalidade!"
10024030-31 = "Ora, ora, não diga isso."
10024030-32 = "Opa! Um macarrão fatiado com almôndegas fritas ao molho de queijo, bem aqui..."
10024030-38 = "Ma-macarrão fatiado com almôndegas fritas ao molho de queijo...! #nEu nunca vi nem ouvi falar de algo assim!"
10024030-39 = "O sabor e o aroma do queijo nas almôndegas fritas crocantes combinam perfeitamente com a textura macia do macarrão fatiado! #nHum~, parece delicioso~"
10024030-40 = "!!!"
10024030-41 = "E então? Não está curiosa sobre esse prato que harmoniza o sabor rico e aromático com o queijo?"
10024030-42 = "Foi o que fez mais sucesso nos testes recentes, #ne eu queria que uma gourmet como você, Saya, experimentasse..."
10024030-43 = "E-ehem, se você insiste tanto, não tenho escolha...! #nEu aceito!"
10024030-55 = "[ns] \"Então foi por isso que passamos na cozinha...\""
10024030-56 = "Sabe como é, o melhor jeito de conquistar alguém é pelo estômago, não é?"
10024030-66 = "...'Ginseng Milenar'? #nPor que você quer saber sobre uma planta tão difícil de lidar?"
10024030-67 = "[s] \"É tão difícil de lidar assim?\""
10024030-68 = "Primeiro, o método de cultivo é muito complicado."
10024030-69 = "Ele só cria raízes em terras frescas e com umidade suficiente, então só cresce perto do topo das Montanhas Kunlun —"
10024030-70 = "E leva pelo menos 6 anos para colher. #nAlém disso, se não esperar 10 anos, não se pode esperar benefícios suficientes, e ainda por cima —"
10024030-71 = "Ele é muito sensível a mudanças ambientais... #nMesmo que você plante 100 sementes, menos de 10 podem ser colhidas adequadamente."
10024030-72 = "[s] \"O nível de dificuldade é bem alto, hein...\""
10024030-73 = "E também... é famoso por ter um amargor que deixa a língua dormente."
10024030-74 = "Com esse amargor todo, não acho que sirva como ingrediente..."
10024030-75 = "Concordo, eu também acho."
10024030-76 = "Você já provou!?"
10024030-77 = "Só dei uma provadinha de leve."
10024030-79 = "Nem precisava provar, já era óbvio..."
10024030-80 = "Ahaha, é que eu sou do tipo que não sossega enquanto não testar com a própria língua."
10024030-82 = "De qualquer forma, como diz o ditado: 'remédio bom é amargo'. O 'Ginseng Milenar' não é exceção."
10024030-83 = "Ao repetir processos perigosos e complexos, é possível extrair um componente com 'certos benefícios'."
10024030-84 = "[s] \"Isso seria, por acaso...\""
10024030-85 = "A curto prazo, ele aumenta drasticamente a concentração."
10024030-86 = "Especificamente, a consciência desperta, a fadiga desaparece num instante, pode até ter efeito de emagrecimento —"
10024030-87 = "E a força muscular e a explosão aumentam significativamente."
10024030-88 = "Além disso, dizem que você ganha uma visão dinâmica extraordinária, a ponto de conseguir ver as balas voando em sua direção."
10024030-89 = "[s] \"Isso é incrível, não é!?\""
10024030-90 = "Não, eu disse que você consegue ver, não que consegue desviar."
10024030-91 = "Você fica pensando \"Preciso desviar!\", mas só consegue ficar olhando as balas te acertarem..."
10024030-97 = "Concentração... consciência despertando..."
10024030-98 = "Isso não pode, Reijo."
10024030-99 = "A-ainda não fiz nada..."
10024030-100 = "Se você ficar forte trapaceando, não é mais Kung Fu, certo?"
10024030-102 = "!!!"
10024030-104 = "A-ah, é verdade...! \"O lucro não vem do céu, nem brota da terra\", não é...!"
10024030-105 = "Como esperado da presidente! #nAfinal, comigo..."
10024030-106 = "Não vou fazer isso."
10024030-107 = "Eu ainda nem disse nada..."
10024030-108 = "Você quer dizer treinar Kung Fu, certo? #nAgora estou ocupada com o trabalho da associação e com a culinária."
10024030-109 = "[s] \"Parece que não traz só benefícios.\""
10024030-111 = "Mas parece que tem alunos por toda parte querendo esse tipo de remédio. #nEspecialmente na época de provas e exames..."
10024030-112 = "Eu achei que aquele amargor daria um toque especial ao sabor."
10024030-113 = "Você consegue conectar tudo à culinária... #nÉ bem a cara da presidente Lumi, eu diria..."
10024030-114 = "De qualquer forma, eu não consigo entender. #nSe estão tão curiosos, bastaria todos experimentarem para descobrir."
10024030-118 = "[ns] \"Não é todo mundo que pode experimentar...\""
10024030-119 = "Além disso, sobre as provas, se você der uma olhada no livro didático no dia anterior..."
10024030-120 = "A menos que coloquem questões muito maldosas, não é fácil tirar nota máxima?"
10024030-121 = "[s3] \"Não tenho tanta certeza...\"\n[s4] \"Acho que só a Saya consegue fazer isso...?\""
10024030-124 = "É-é mesmo..."
10024030-125 = "De fato... sendo assim, faz sentido que existam alunos querendo o \"Ginseng Milenar\"."
10024030-126 = "[s] \"É perigoso, e é algo que não se deve fazer de jeito nenhum...\""
10024030-127 = "O que me intriga é quem faria algo tão trabalhoso..."
10024030-128 = "É necessário um solvente perigoso e um controle rigoroso de temperatura..."
10024030-129 = "Não é apenas destilar, envolve vários processos complexos..."
10024030-130 = "Para extrair o efeito medicinal perfeito, seriam necessários equipamentos especializados de alto nível..."
10024030-131 = "Se houvesse tal equipamento em algum lugar fora do Clube de Pesquisa de Alquimia, #nteria chegado aos meus ouvidos."
10024030-132 = "Se tivessem transportado equipamentos desse porte, a Associação Genbu também teria recebido a informação."
10024030-133 = "[s] \"Como esperado.\""
10024030-134 = "Não existe ninguém em Shanhaijing que entenda mais de remédios do que eu!"
10024030-135 = "Embora, no fim das contas, nada disso tenha ajudado a criar o elixir da imortalidade..."
10024030-136 = "[s5] \"Eu estava curioso sobre isso há algum tempo...\"\n[s6] \"Por que você insiste tanto no elixir da imortalidade?\""
10024030-139 = "— É justamente porque é impossível."
10024030-140 = "O Sensei não entende esse romance? #nÉ justamente por ser impossível que vale a pena o desafio!"
10024030-141 = "Metas altas! E caminhos íngremes!"
10024030-142 = "Enquanto desafio problemas impossíveis, acabo tendo novas descobertas!"
10024030-143 = "Hum, você diz coisas bem interessantes, não é? #nEu achei que você só se interessava pelo elixir."
10024030-144 = "N-não é nada disso..."
10024030-145 = "Mas criar o elixir é o meu objetivo principal. #nEmbora existam muitas pessoas que acabam invertendo os meios e os fins..."
10024030-147 = "Pelo menos o Clube de Pesquisa de Alquimia toma cuidado para não deixar isso acontecer!"
10024030-148 = "[s] \"Você está se esforçando, Saya.\""
10024030-149 = "O-o que é isso! #nNão vou te dar nada só porque me elogiou de repente!"
10024030-150 = "Além disso, eu não sei como o \"Ginseng Milenar\" está sendo usado especificamente..."
10024030-151 = "...Ué?"
10024030-152 = "[s] \"Aconteceu alguma coisa?\""
10024030-153 = "N-não, não é nada!"
10024030-157 = "(Falando nisso, parece que houve uma pesquisa sobre o uso dos componentes do \"Ginseng Milenar\" para despertar o cérebro...)"
10024030-158 = "(Mas, aquilo é...)"
10024030-164 = "De qualquer forma, o \"Ginseng Milenar\" só pode ser cultivado no Monte Kunlun, certo?"
10024030-165 = "Então, vou começar indo até lá. #nObrigada, Saya."
10024030-166 = "...Eu não sei de nada, não disse nada. #nO que eu disse agora há pouco foi apenas um monólogo."
10024030-167 = "Ahaha, entendi. Vamos manter isso como o nosso segredo."
