[translation]
10024030-1 = "第3話;[ruby=ぞくれいかつう]鏃礪括羽[/ruby]"
10024030-3 = "錬丹術研究会の部室"
10024030-5 = "[ns1] \"一体どこに行くのかと思ったら……\"\n[ns2] \"錬丹術研究会……？\""
10024030-9 = "ええ。「萬年参」を使いそうな場所の一つです。"
10024030-10 = "あたしも流石に「萬年参」を料理に使ったことはなくてさ。"
10024030-11 = "どちらかというと薬に使われる事が多いイメージかな？#n料理に使う人がいるのも、欲しがる人がいるのも事実だけど……"
10024030-12 = "とりあえず、一番使ってそうなところに来てみたってわけ。"
10024030-13 = "武術研究部とか京劇部あたりの、#n身体を鍛えてる人たちを頼ろうかとも思ったけど……"
10024030-14 = "そっちは特性とか効能に詳しいと思えなくて。#nほら、身体に良いものは、とりあえず食べちゃおうって感じの人が多いでしょ。"
10024030-15 = "なるほど……会長、つまり「萬年参」を食べれば強くなれる、と。"
10024030-16 = "もしかして「萬年参」は――カンフーのために存在しているのでは？"
10024030-17 = "……誰もカンフーの話はしてないよ？"
10024030-18 = "ですが、身体を鍛えるのには役立つのでしょう？"
10024030-19 = "いいからいいから。ほら、落ち着いて。"
10024030-25 = "うるさいと思ったら、玄武商会に先生？#n……珍しい組み合わせだけど、一体どうしたのだ？"
10024030-26 = "[s] \"サヤにお願いがあってね。\""
10024030-27 = "……ぼく様、なんだか嫌な予感がするのだ。#n玄武商会が一緒ということは……つまり……"
10024030-28 = "先生には申し訳ないけど、帰ってほしいのだ……。"
10024030-29 = "玄武商会と玄龍門の争いなんて、ぜ～ったいに巻き込まれたくないのだ！"
10024030-30 = "錬丹術研究会は、今日も不老不死の霊薬開発で忙しいのだ！"
10024030-31 = "まあまあ、そんなこと言わずにさ。"
10024030-32 = "おっと！チーズ[ruby=ナンジャウォンス]南煎丸子[/ruby]をかけた焼き[ruby=ダオシャオミエン]刀削麺[/ruby]が、こんなところに……"
10024030-38 = "や、焼き刀削麺にチーズ南煎丸子をかけるなんて……！#nそんなの見たことも聞いたこともないのだ！"
10024030-39 = "カリッと揚げた南煎丸子にチーズの味と香りは、もっちりした刀削麺と相性抜群だよ！#nん～、美味しそうだなぁ～"
10024030-40 = "！！！"
10024030-41 = "どう？香ばしいコクとチーズが調和した一品、気にならない？"
10024030-42 = "この間の試作品で一番好評だったし、#nサヤみたいなグルメにこそ味わってもらいたくて……"
10024030-43 = "こほん、そこまで言われたら仕方がない……！#nいただきますなのだ！"
10024030-55 = "[ns] \"厨房に寄ったのは、このためだったんだ……。\""
10024030-56 = "ほら、まずは胃袋を掴めって言うでしょ？"
10024030-66 = "……「萬年参」？#nなんであんな扱いにくい植物について知りたいのだ？"
10024030-67 = "[s] \"そんなに扱いづらいの？\""
10024030-68 = "まず、栽培方法が難しいのだ。"
10024030-69 = "涼しくて湿度が十分な土地じゃないと根付かないから、植生地が[ruby=こんろんさん]崑崙山[/ruby]の山頂付近くらいしかないし――"
10024030-70 = "収穫まで少なくとも6年はかかるのだ。#nそれに、10年は待たないと十分な効能が期待できない上に――"
10024030-71 = "環境の変化にも敏感だから……#n100個タネを蒔いても、まともに収穫できるのは10本にも満たないのだ。"
10024030-72 = "[s] \"ずいぶんと難易度が高いんだね……。\""
10024030-73 = "あと……舌が痺れるほどの苦味で有名なのだ。"
10024030-74 = "あの苦味がある以上、食材には向かないと思うのだ……"
10024030-75 = "そうだね、あたしも同感。"
10024030-76 = "もう試したのか！？"
10024030-77 = "ちょ～っと味見してみただけだよ。"
10024030-79 = "試すまでもなく、分かりきっているのだ……"
10024030-80 = "あははっ、あたしは自分の舌で試してみないと気が済まない性格だからね。"
10024030-82 = "とにかく、良薬は口に苦しという言葉があるように、「萬年参」も例外ではない。"
10024030-83 = "危険で複雑な工程を繰り返すことで――「ある効能」を持った成分が抽出できるのだ。"
10024030-84 = "[s] \"それって、もしかして……\""
10024030-85 = "短期的に、集中力が大きく高まるのだ。"
10024030-86 = "具体的には、意識が覚醒し、疲労がポンと飛んでダイエット効果も期待でき――"
10024030-87 = "筋力と瞬発力が大幅に上昇するのだ。"
10024030-88 = "さらには並外れた動体視力も手に入り、飛んでくる銃弾が見えるようになるとか。"
10024030-89 = "[s] \"そんなにすごいんだ！？\""
10024030-90 = "いや、見えるだけで、避けられるとは言ってないのだ。"
10024030-91 = "「避けないと！」と思いながら、ただただ銃弾が当たるのを眺める事しか……"
10024030-97 = "集中力……意識が覚醒……"
10024030-98 = "ダメだからね、レイジョ。"
10024030-99 = "ま、まだ何も……"
10024030-100 = "ズルして強くなったら、カンフーじゃないよね？"
10024030-102 = "！！！"
10024030-104 = "そ、そうでした……！「利は天より来たらず、地より出でず」ですね……！"
10024030-105 = "流石です、会長！#nやはり私と一緒に……"
10024030-106 = "やらないよ。"
10024030-107 = "まだ何も申していませんが……"
10024030-108 = "カンフーの修行を、でしょ？#n今は商会の仕事と料理で忙しいの。"
10024030-109 = "[s] \"メリットばかりではなさそうだね。\""
10024030-111 = "だけど、そんな薬を欲しがる生徒があちこちに居るみたいなのだ。#n特に試験や受験の時期に……"
10024030-112 = "あたしは、あの苦味がコクを出してくれると思ったんだけどね。"
10024030-113 = "そこでも料理に繋げるのか……#nルミ会長らしいといえば、らしいけど……"
10024030-114 = "とにかく、ぼく様には理解できないのだ。#nそんなに気になるなら、みんな試してみれば分かるのに。"
10024030-118 = "[ns] \"誰でも試せるわけじゃないから……。\""
10024030-119 = "それに、試験なんて、前日に教科書に目を通しておいたら……"
10024030-120 = "よっぽどイジワルな問題が出されない限り、満点が取れるものじゃないのだ？"
10024030-121 = "[s3] \"そうとは限らないかな……。\"\n[s4] \"それが出来るのは、サヤくらいじゃ……？\""
10024030-124 = "そ、そうなのか……"
10024030-125 = "たしかに……それなら、「萬年参」を欲しがる生徒がいるのも納得なのだ。"
10024030-126 = "[s] \"危険だし、絶対にダメだけどね……。\""
10024030-127 = "気になるのは、そんな面倒なことを一体誰がするのか……"
10024030-128 = "危険な溶媒が必要で、厳密な温度管理も求められるし……"
10024030-129 = "蒸留するだけじゃなく、複雑な工程がいくつも続くものなのに……"
10024030-130 = "完璧な薬効を引き出すには、高度な専門設備が必要なはずだけど……"
10024030-131 = "錬丹術研究会以外の場所にそんな設備があるのなら、#nぼく様の耳に入っているはずなのだ。"
10024030-132 = "それだけの設備が運び込まれていたら、玄武商会にも情報が入ってくるはずだよ。"
10024030-133 = "[s] \"流石だね。\""
10024030-134 = "山海経の中で、ぼく様より薬に詳しい人はいないのだ！"
10024030-135 = "あれもこれも結局、不老不死の霊薬作りには役に立たなかったけど……"
10024030-136 = "[s5] \"前から気になってたんだけど……\"\n[s6] \"不老不死の霊薬にこだわる理由って？\""
10024030-139 = "――それが不可能だからなのだ。"
10024030-140 = "先生にはこのロマンが分からないのだ？#n不可能だからこそ、挑戦する甲斐があるというものなのだ！"
10024030-141 = "目標は高く！そして険しく！"
10024030-142 = "不可能な問題に挑戦している内に、新たな気づきもあるのだ！"
10024030-143 = "ふぅん、なかなか良いこと言うんだね？#n霊薬にしか興味ないのかと思ってたよ。"
10024030-144 = "そ、そんなことないのだ……。"
10024030-145 = "でも、霊薬作りが一番の目標なのだ。#n手段と目的が入れ替わっちゃう人は多いけど……"
10024030-147 = "少なくとも錬丹術研究会は、そうならないように気をつけてるのだ！"
10024030-148 = "[s] \"頑張ってるね、サヤ。\""
10024030-149 = "な、何なのだ！#nそんな急に褒められても何も出ないのだ！"
10024030-150 = "それに、「萬年参」の具体的な使われ方は知らないし……"
10024030-151 = "……あれ？"
10024030-152 = "[s] \"どうかしたの？\""
10024030-153 = "い、いやっ、何でもないのだ！"
10024030-157 = "（そういえば、「萬年参」の成分を利用して、脳を覚醒させる研究があったような……）"
10024030-158 = "（でも、あれは……）"
10024030-164 = "とりあえず、「萬年参」が栽培できるのは、[ruby=こんろんさん]崑崙山[/ruby]だけなんだよね？"
10024030-165 = "だったら、まずは行ってみるよ。#nありがと、サヤ。"
10024030-166 = "……ぼく様は何も知らない、何も言ってないのだ。#nさっきまでのは、ただの独り言なのだ。"
10024030-167 = "あはは、分かったよ。あたし達の秘密ってことで。"
