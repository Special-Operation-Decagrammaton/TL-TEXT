[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 24/06.]
10054080-1 = "Episódio 8: Aquela Que Caminha à Frente"
10054080-4 = "Boa noite. Aceitaria a minha companhia em uma caminhada?"
10054080-5 = "[ns] \"Shun...?\""
10054080-6 = "Eu te vi saindo e resolvi me juntar a você. Fufu."
10054080-7 = "[s] \"Me deu vontade de tomar um ar fresco da noite.\""
10054080-8 = "Ara, que coincidência. A mim também."
10054080-10 = "（Caminhei lentamente pela beira d'água sob a brisa noturna com a Shun）"
10054080-12 = "[ns] \"Ah, a propósito, o seu corpo está bem?\""
10054080-14 = "Como assim?"
10054080-15 = "......Ah. Está perguntando porque me transformei na 'Shunzinha'?"
10054080-16 = "Fufu. Ainda bem que eu pedi o antídoto para a Saya-san por precaução."
10054080-17 = "E parece que essa poção atual é uma versão aprimorada.\nNão tem efeitos colaterais e a reversão é totalmente segura."
10054080-18 = "Apesar de que a Saya-san não gostou muito que eu a chamasse de 'antídoto'."
10054080-19 = "[s] \"E-Entendi.\""
10054080-23 = "[ns] \"O que você achou depois de conhecer aquelas crianças?\""
10054080-24 = "Acho que é exatamente aquilo que eu relatei agora há pouco."
10054080-25 = "Ou você está perguntando a minha opinião pessoal...?"
10054080-26 = "......"
10054080-27 = "Para o bem ou para o mal, vi nelas apenas crianças agindo como crianças."
10054080-28 = "Isso me deixou um pouco mais aliviada... de certa forma."
10054080-29 = "Se as ações delas fossem parte de algum plano ardiloso para encobrir algo maior, a minha preocupação seria enorme."
10054080-30 = "No entanto, aquelas crianças agiram de certa forma simples e unicamente porque queriam..."
10054080-31 = "Elas são extremamente puras e genuínas."
10054080-32 = "......Embora as ações que resultaram disso não sejam dignas de aplausos, claro."
10054080-33 = "......"
10054080-37 = "Muitos dizem que as crianças são a encarnação da pureza."
10054080-38 = "[s] \"É verdade.\""
10054080-39 = "Eu concordo plenamente com isso."
10054080-40 = "Contudo, essa pureza não caminha necessariamente para o bem o tempo todo."
10054080-41 = "[s] \"......Como assim?\""
10054080-42 = "......"
10054080-46 = "Crianças também mentem."
10054080-47 = "Porque... a percepção de que mentir é errado ainda não está consolidada nelas."
10054080-48 = "A pureza também é a face da ignorância."
10054080-49 = "Por desconhecerem as regras, não conseguem prever o peso das consequências de suas ações."
10054080-54 = "É por isso que falam o que sentem sem filtros e criam mentirinhas atrapalhadas e óbvias."
10054080-55 = "E não há nenhum conceito de moralidade ou malícia embasando essas ações."
10054080-58 = "......É justamente a pureza o que acaba gerando problemas de forma totalmente não intencional."
10054080-61 = "Claro, as crianças são fofas, adoráveis e os sorrisos delas são angelicais――"
10054080-65 = "E eu quero protegê-las com a minha vida."
10054080-69 = "E é por isso que precisamos ensiná-las o que é certo e o que é errado para guiá-las."
10054080-70 = "......Talvez por causa disso, há momentos em que interagir com as crianças me causa um pouco de medo."
10054080-71 = "Afinal, elas observam as minhas ações com aqueles olhinhos cheios de pureza e absorvem cada movimento."
10054080-72 = "[s] \"Até você se sente assim, Shun...?\""
10054080-73 = "Eu também ainda sou apenas uma aluna, não é?"
10054080-74 = "......Mas, ao mesmo tempo, sou a instrutora do Jardim da Flor de Ameixeira."
10054080-75 = "A possibilidade de que um erro meu possa distorcer o futuro de uma criança..."
10054080-76 = "Isso... me apavora."
10054080-77 = "Quando chegam perto dos 10 anos, as crianças já não ouvem os adultos com a mesma obediência."
10054080-78 = "É a fase em que a própria vontade e teimosia começam a desabrochar nelas."
10054080-79 = "Isso não é ruim. É a prova de que a identidade delas está amadurecendo."
10054080-80 = "Mas... não consigo evitar de sentir um leve pesar."
10054080-81 = "Porque eu ainda tenho tantas coisas que gostaria de ensinar e caminhos pelos quais gostaria de guiá-las..."
10054080-82 = "[ns] \"......Entendo o que diz.\""
10054080-84 = "......"
10054080-85 = "Qual é a sua opinião sobre 'podar os brotos de possibilidade' das crianças, Sensei?"
10054080-86 = "Pode não ser frequente, mas há vezes em que precisamos intervir com firmeza."
10054080-87 = "Justamente por serem muito jovens e egoístas, elas não conseguem compreender os nossos motivos lógicos."
10054080-88 = "Diante disso, a única alternativa que nos resta é impor o 'O que é errado, não deve ser feito'."
10054080-89 = "Só nos resta torcer para que, quando crescerem, consigam entender sozinhas o porquê de termos agido assim."
10054080-90 = "Traçar linhas vermelhas e limites rígidos contra os perigos e atitudes irresponsáveis."
10054080-94 = "Acredito que ser educadora seja justamente isso."
10054080-95 = "Mas o processo... aperta o meu coração."
10054080-96 = "Pois essas repreensões jamais são proferidas por gosto."
10054080-97 = "[s] \"Entendo...\""
10054080-98 = "Mesmo com dor, ainda é um dever a ser cumprido."
10054080-99 = "Se nós fugirmos dessa responsabilidade por medo, as únicas vítimas que colherão as más consequências serão as próprias crianças."
10054080-100 = "[s] \"É o trabalho da disciplina.\""
10054080-101 = "Isso mesmo."
10054080-102 = "É algo extremamente importante."
10054080-103 = "Mas quase ninguém se prontifica para colocar isso em prática."
10054080-104 = "Afinal, fazendo isso, a criança com certeza vai te odiar e achar que você é um 'adulto chato'."
10054080-105 = "Mas se for algo que precisa ser feito por alguém... Eu serei essa pessoa, mesmo que sozinha."
10054080-106 = "Afinal, eu... amo as crianças."
10054080-107 = "[s] \"Isso está mais do que claro nas suas atitudes, Shun.\""
10054080-108 = "Fufu. Fico muito contente."
10054080-109 = "......Eu não quero ver nenhuma criança se perder num caminho ruim e ser odiada pelos outros."
10054080-110 = "Quero que se tornem boas pessoas, ao menos aquelas que eu puder alcançar."
10054080-111 = "......Para que um dia, quando crescerem, percebam de repente:\n'Ah... então era por isso que a instrutora dizia aquelas coisas'."
10054080-112 = "Se eu puder proporcionar isso... serei eternamente grata."
10054080-113 = "Mas, pensando em tudo isso... Sensei, a grandiosidade do seu trabalho me deixa admirada."
10054080-114 = "[s] \"Do nada, eu!?\""
10054080-115 = "Você guia e ensina alunas do ensino médio que já possuem a convicção de que 'já são adultas'."
10054080-116 = "A dificuldade absurda de lidar com isso... Chega a ser assustador e difícil de imaginar para mim."
10054080-117 = "[s] \"Quando a gente bota a mão na massa, acaba descobrindo um jeito. Sempre dá certo.\""
10054080-118 = "Fufu... Imagino que sim."
10054080-119 = "É por ver você agindo dessa forma... que de vez em quando, eu penso..."
10054080-124 = "Se um dia pudéssemos unir as forças e observar o crescimento das crianças juntos――"
10054080-125 = "Eu seria a mulher mais feliz do mundo..."
10054080-126 = "[s] \"Isso que você disse... eu posso levar ao pé da letra...?\""
10054080-127 = "E quem sabe? O que você acha, Sensei?"
10054080-128 = "O significado é segredo."
10054080-129 = "Afinal de contas, eu também sou uma aluna. Posso guardar pelo menos um segredinho caprichoso, não posso?"
10054080-131 = "Com toda a certeza. E é por toda essa sua dedicação que deposito tanta confiança na Instrutora Shun."
10054080-137 = "Ara?"
10054080-138 = "Senhora Monshu. Boa noite."
10054080-139 = "Não pedi para me chamar apenas de Kisaki-san?"
10054080-140 = "Como somos apenas nós três aqui."
10054080-141 = "Isso é verdade, mas..."
10054080-143 = "[ns] \"As crianças estão planejando fazer bagunça amanhã?\""
10054080-144 = "Umu... Ouvi quando falaram sobre isso."
10054080-145 = "No entanto, tendo essa informação em mãos, basta nos prepararmos.\nJá deixei a Rumi e o pessoal da rua comercial a par de tudo."
10054080-146 = "Deus do céu... que bando de pirralhas problemáticas."
10054080-147 = "Estava tentando recordar da minha própria infância e..."
10054080-148 = "Eu até poderia ter o sangue quente, mas com certeza mantinha o mínimo de autocontrole."
10054080-149 = "Fumu... Mas, pensando bem, talvez não fôssemos tão diferentes assim."
10054080-150 = "Ara, a Senhora Monshu está falando de si mesma?"
10054080-151 = "[ns] \"Fica difícil imaginar a Kisaki fazendo bagunça de criança agora.\""
10054080-152 = "Existe um velho ditado que diz: 'O coração humano é um oceano insondável'."
10054080-153 = "Isso se aplica tanto aos adultos quanto às crianças.\nSe subestimarmos as artimanhas infantis achando que são apenas brincadeiras, poderemos sofrer graves consequências depois."
10054080-154 = "Ainda mais na idade em que a ignorância as faz se sentirem donas do mundo."
10054080-159 = "......É realmente fascinante."
10054080-160 = "Quem diria que eu, que ainda tenho tanto a aprender, estaria na posição de guiar os outros."
10054080-161 = "Quer me coroem como Monshu ou presidente do conselho estudantil, independentemente de onde me coloquem..."
10054080-163 = "[ns] \"Eu vou te apoiar com tudo o que eu tenho.\""
10054080-164 = "Ter você ao meu lado já me traz uma imensa segurança, mas..."
10054080-165 = "Não há por que recusar uma oferta de boa vontade como essa."
10054080-166 = "[s] \"Se tiver qualquer coisa com que eu possa te ajudar, é só pedir.\""
10054080-167 = "Guardarei essas palavras na memória."
10054080-168 = "Pois bem, falando nisso..."
10054080-169 = "Para uma colaboração sem atritos, é fundamental que nos conheçamos muito bem, não concorda?"
10054080-170 = "[s] \"Sim... com certeza.\""
10054080-171 = "Umu."
10054080-172 = "O dever de uma Monshu exige que seus discursos tenham como alicerce o mais puro senso de razão e justiça."
10054080-173 = "Sendo assim, se a meta for aprofundar a nossa compreensão mútua..."
10054080-174 = "O mais lógico seria passarmos mais tempo juntos, o que acha?"
10054080-175 = "[ns] \"Ué, mas...\""
10054080-180 = "O que foi, Sensei?"
10054080-181 = "Eu estou usando o mais puro 'senso de lógica' aqui, sabia?"
10054080-182 = "E por isso, esta conversa inevitavelmente deságua na seguinte conclusão:"
10054080-183 = "Se o Sensei deseja ser a força e o apoio da minha pessoa――e de Shanhaijing."
10054080-184 = "Isso significa que você precisará passar muito mais tempo em Shanhaijing, ora."
10054080-185 = "[ns] \"M-Me pegou de jeito...!\""
10054080-186 = "Ara, me parece um arranjo espetacular."
10054080-187 = "Afinal, o Sensei é a pessoa que orienta e protege as 'crianças'..."
10054080-188 = "Sendo assim, convido você a visitar o Jardim da Flor de Ameixeira com mais frequência quando estiver em Shanhaijing."
10054080-193 = "Instrutora Shun, o tempo do Sensei não é infinito, sabia?"
10054080-194 = "Exatamente por isso, Senhora Monshu."
10054080-195 = "Se não formos um pouquinho egoístas com ele, não teremos a nossa chance."
10054080-196 = "Realmente, não consigo vencê-la na retórica, Instrutora Shun."
10054080-197 = "Eu apenas devolvo os elogios na mesma moeda."
10054080-198 = "Tão característico seu."
10054080-199 = "Ah, falando nisso, Sensei."
10054080-200 = "[s] \"Hm?\""
10054080-201 = "Você não deve esquecer a sua promessa com a Kokona-chan, certo?"
10054080-202 = "[s1] \"Claro, eu me lembro perfeitamente!\"\n[s2] \"Ah, verdade, tinha isso!\""
10054080-203 = "Sim, muito obrigada."
10054080-204 = "Ainda bem que você se lembrou. Lidar com uma Kokona-chan emburrada é muito complicado, viu?"
10054080-206 = "(Depois disso, continuamos a falar de várias coisas enquanto aproveitávamos a caminhada noturna)"
10054080-207 = "(Quando voltamos à pousada, a noite já estava alta)"
10054080-209 = "[ns] \"Boa noite para vocês.\""
10054080-210 = "Sim, boa noite e bom descanso."
10054080-211 = "Vocês dois também devem descansar o corpo. O dia de amanhã será cheio."
10054080-214 = "......Cof, cof."
10054080-219 = "Fuuu..."
10054080-220 = "......"
10054080-221 = "......Cof."