[translation]
10054080-1 = "第8話;先を歩むもの"
10054080-4 = "こんばんは。お散歩、ご一緒しても？"
10054080-5 = "[ns] \"シュン……？\""
10054080-6 = "先生が外に出るのを見かけまして。ふふっ。"
10054080-7 = "[s] \"夜風に当たりたくなったんだ。\""
10054080-8 = "あら、偶然ですね。私もです。"
10054080-10 = "（シュンと一緒に、夜の水辺を歩いた）"
10054080-12 = "[ns] \"そういえば、体は大丈夫？\""
10054080-14 = "はい？"
10054080-15 = "……あ。「シュエリン」になったからですか？"
10054080-16 = "ふふ。万が一に備えて、サヤさんから秘薬をもらっておいて正解でした。"
10054080-17 = "しかも、今回のは改良版だそうで。#n副作用もなく、解毒も安全らしいですよ。"
10054080-18 = "サヤさんは「解毒」という表現があまり気に入らない様子でしたけど。"
10054080-19 = "[s] \"そ、そうなんだ。\""
10054080-23 = "[ns] \"あの子たちに会ってみてどうだった？\""
10054080-24 = "それはさっき報告した通りですよ。"
10054080-25 = "もっと個人的な意見……ですか？"
10054080-26 = "……。"
10054080-27 = "良くも悪くも、子供だなと感じました。"
10054080-28 = "安心した……のかもしれません。"
10054080-29 = "何か大きな隠し事のための行動だったなら、私はもっと心配していたと思います。"
10054080-30 = "ですがあの子たちは、[ruby=・]た[/ruby][ruby=・]だ[/ruby][ruby=・]や[/ruby][ruby=・]り[/ruby][ruby=・]た[/ruby][ruby=・]い[/ruby][ruby=・]か[/ruby][ruby=・]ら[/ruby]行動していて……。"
10054080-31 = "至って純粋な子供でした。"
10054080-32 = "……その方向性は、決して褒められたものではありませんけどね。"
10054080-33 = "……。"
10054080-37 = "子供は純粋だと、よく言われます。"
10054080-38 = "[s] \"そうだね。\""
10054080-39 = "私も、その通りだと思います。"
10054080-40 = "ですが、必ずしも良い方向に働くわけではありません。"
10054080-41 = "[s] \"……もっと詳しく話してくれる？\""
10054080-42 = "……。"
10054080-46 = "子供も、嘘をつきます。"
10054080-47 = "なぜなら……嘘は悪いことだ、という認識が薄いから。"
10054080-48 = "純粋とは、無知であることの表れでもあります。"
10054080-49 = "まだ知らないから、自分の行いの結果が分からない。"
10054080-54 = "だから本音をそのまま言ったり、拙い隠し事をしたりします。"
10054080-55 = "ですがそこに、善悪の概念は結びついていません。"
10054080-58 = "……純粋であるがゆえに、意図せず問題を起こすことだってあります。"
10054080-61 = "もちろん子供は可愛いし、愛らしいし、笑顔は天使のようで――"
10054080-65 = "守りたいと思っています。"
10054080-69 = "だからこそ、善悪を教えて、導いてあげる必要があるんです。"
10054080-70 = "……そのせいか、私にも子供と接するのが怖くなる時があります。"
10054080-71 = "子供は、その純粋な目で私の行動を観察し、吸収してしまいますから。"
10054080-72 = "[s] \"シュンでもそう思うんだね……。\""
10054080-73 = "私だって、まだ生徒なんですよ？"
10054080-74 = "……ですがそれと同時に、私は梅花園の教官です。"
10054080-75 = "私の行いが、子供の明日を捻じ曲げてしまうかもしれない……。"
10054080-76 = "それが……怖いです。"
10054080-77 = "子供は10歳くらいになると、大人の言うことを聞かなくなります。"
10054080-78 = "自分の意地が芽生える時期なんです。"
10054080-79 = "悪いことではありません。自我が育っている証拠ですから。"
10054080-80 = "とはいえ、惜しいとも思います。"
10054080-81 = "教えたいことも、導かなければならないことも……まだたくさんあるというのに。"
10054080-82 = "[ns] \"……そうだね。\""
10054080-84 = "……。"
10054080-85 = "先生は「可能性の芽を摘む」ことをどう思いますか？"
10054080-86 = "頻度は多くないですが、どうしても必要なときはあります。"
10054080-87 = "まだ幼く、自己中心的になりがちだからこそ、理由を理解できない。"
10054080-88 = "だから、「ダメなものはダメ」と伝えるしかありません。"
10054080-89 = "いつか成長した時に、自分で理由に気づいてくれたらと願うばかりです。"
10054080-90 = "危ないことに、しっかりと線引きをしてあげる。"
10054080-94 = "子供を教えるのは、そういうことだと思います。"
10054080-95 = "でもその過程は……胸が痛みます。"
10054080-96 = "言いたくて言っているわけではありませんので。"
10054080-97 = "[s] \"うん……。\""
10054080-98 = "それでも、やるべきことだと思います。"
10054080-99 = "怖がって避けてしまったら、その悪影響を受けるのは子供ですから。"
10054080-100 = "[s] \"訓育、だね。\""
10054080-101 = "はい。"
10054080-102 = "とても大事なことです。"
10054080-103 = "ですが、みんな中々実践しようとはしません。"
10054080-104 = "だって、子供に「嫌な大人」だと思われてしまいますから。"
10054080-105 = "それでも誰かがやるべきことなら……私だけでも実践しようと思うのです。"
10054080-106 = "私は、子供が好きですから。"
10054080-107 = "[s] \"すごく伝わってくるよ。\""
10054080-108 = "ふふ。そうですか。"
10054080-109 = "……子供が道を間違えたり、誰かに嫌われたりする姿は、見たくありません。"
10054080-110 = "私の手が届く限り、良い人に育ってほしいんです。"
10054080-111 = "……その子が大きくなって、ふとした時に。#n昔、教官が言ってたのはこういうことだったのか、と。"
10054080-112 = "そう思ってもらえたら……私はそれで満足です。"
10054080-113 = "でも……そうですね……改めて考えると、先生の凄さに頭が下がります。"
10054080-114 = "[s] \"急に私！？\""
10054080-115 = "先生は、「自分はもう大人だ」と思っている高校生を指導しています。"
10054080-116 = "それがどれほど難しいことか……私には想像もできず、怖いとさえ思ってしまうのに。"
10054080-117 = "[s] \"やってれば、意外と何とかなるよ。\""
10054080-118 = "ふふ……そうですか。"
10054080-119 = "そんな先生だからこそ……たまに、考えるんです。"
10054080-124 = "いつか一緒に、子供が育っていく様子を見守れたら――"
10054080-125 = "とても幸せだろうな……と。"
10054080-126 = "[s] \"それ……言葉通りの意味だよね……？\""
10054080-127 = "さあ、どうでしょう？"
10054080-128 = "内緒です。"
10054080-129 = "私も生徒ですから。秘密の1つくらい、あってもいいでしょう？"
10054080-131 = "そうさな。じゃからこそ、妾もシュン教官を信じているのじゃ。"
10054080-137 = "あら？"
10054080-138 = "門主様。こんばんは。"
10054080-139 = "キサキさんとは呼んでくれぬのか？"
10054080-140 = "ここには私たちしかいませんので。"
10054080-141 = "それはそうじゃが……。"
10054080-143 = "[ns] \"あの子たち、明日やるんだって？\""
10054080-144 = "ああ……そう話しておったな。"
10054080-145 = "とはいえ、情報を得たからには備えておけばよい。#nすでに、ルミと商店街の者には共有しておる。"
10054080-146 = "まったく……実に身勝手な連中じゃった。"
10054080-147 = "妾の幼き時分を振り返っても見たのじゃが……。"
10054080-148 = "血の気は多かったが、最低限の自制はしておったのう。"
10054080-149 = "ふむ……根は同じなのやもしれぬな。"
10054080-150 = "あら、門主様がですか？"
10054080-151 = "[ns] \"今からは想像できないね。\""
10054080-152 = "「測り難きは人心」という言葉があるじゃろう。"
10054080-153 = "そこに、大人も子供もありはせん。#n子供のいたずらと甘く見ておれば、いずれ痛い目に遭うやもしれぬぞ？"
10054080-154 = "ましてや、怖いもの知らずの頃なら、なおのこと。"
10054080-159 = "……不思議じゃ。"
10054080-160 = "誰かを導くことはおろか、まだ学ばねばならぬというのに。"
10054080-161 = "門主やら生徒会長やらと、この座に祭り上げられようとも……。"
10054080-163 = "[ns] \"私が精一杯サポートするから。\""
10054080-164 = "其方は傍に居るだけで頼りになっておるのじゃが……。"
10054080-165 = "いいや、せっかくの善意を遠慮するものではないな。"
10054080-166 = "[s] \"私にできることがあれば何でも言ってね。\""
10054080-167 = "その言葉、しかと覚えたぞ。"
10054080-168 = "では早速じゃが……。"
10054080-169 = "円滑な協力のためには、お互いのことをよく知っておくべきじゃろう？"
10054080-170 = "[s] \"それは……そうだね。\""
10054080-171 = "うむ。"
10054080-172 = "門主とは、正しさを根拠に話さねばならぬものじゃ。"
10054080-173 = "して、互いの理解を深めるためとなれば……。"
10054080-174 = "共に過ごす時間を増やすべきと思うが、どうかの？"
10054080-175 = "[ns] \"あ、あれ……？\""
10054080-180 = "なんじゃ、先生。"
10054080-181 = "妾は「正論」の話をしているのじゃぞ？"
10054080-182 = "よって、この話は次のように帰結される。"
10054080-183 = "先生が妾の――山海経の力になりたいと申すのなら。"
10054080-184 = "山海経で過ごす時間を増やす必要がある、ということじゃ。"
10054080-185 = "[ns] \"や、やられた……！！！\""
10054080-186 = "あら、それはいいですね。"
10054080-187 = "先生は「子供」を教え導く方ですし……。"
10054080-188 = "山海経にいらした際は、梅花園にも是非。"
10054080-193 = "シュン教官よ。先生の時間は有限なのじゃぞ？"
10054080-194 = "だからこそですよ。"
10054080-195 = "少しくらい、わがままでなければ。"
10054080-196 = "言葉ではシュン教官には敵わぬのう。"
10054080-197 = "それはこちらのセリフですよ。"
10054080-198 = "ほんに其方らしい。"
10054080-199 = "そういえば、先生。"
10054080-200 = "[s] \"うん？\""
10054080-201 = "ココナちゃんとの約束、忘れちゃダメですよ？"
10054080-202 = "[s1] \"もちろん、ちゃんと覚えてるよ！\"\n[s2] \"あっ、そうだった！\""
10054080-203 = "はい、ありがとうございます。"
10054080-204 = "良かったですね、思い出せて。拗ねたココナちゃんは大変ですよ？"
10054080-206 = "（その後も色んなことを話しながら、夜の散歩を続けた）"
10054080-207 = "（宿に帰った頃には、夜も更けていた）"
10054080-209 = "[ns] \"おやすみ。\""
10054080-210 = "はい、おやすみなさい。"
10054080-211 = "2人も、ゆっくり休むようにな。明日は忙しくなるからの。"
10054080-214 = "……げほっ、げほっ。"
10054080-219 = "ふぅ……。"
10054080-220 = "……。"
10054080-221 = "……げほっ。"
