[translation]
10054080-1 = "Episode 8;Those Who Walk Ahead"
10054080-4 = "Good evening. Would you mind if I joined you for a walk?"
10054080-5 = "[ns] \"Shun...?\""
10054080-6 = "I happened to see you heading outside, Sensei. Fufu."
10054080-7 = "[s] \"I just felt like getting some night air.\""
10054080-8 = "Oh, what a coincidence. Me too."
10054080-10 = "(I walked along the waterfront at night with Shun.)"
10054080-12 = "[ns] \"By the way, how are you feeling?\""
10054080-14 = "Pardon?"
10054080-15 = "...Ah. You mean because I turned into 'Shunling'?"
10054080-16 = "Fufu. It was a good thing I got that secret medicine from Saya-san just in case."
10054080-17 = "And apparently, this one was an improved version. #nIt has no side effects, and the detoxification is supposed to be safe, too."
10054080-18 = "Though, Saya-san didn't seem to like the term 'detoxification' very much."
10054080-19 = "[s] \"I-I see.\""
10054080-23 = "[ns] \"How did it go when you met those kids?\""
10054080-24 = "I reported that to you earlier."
10054080-25 = "You want... a more personal opinion?"
10054080-26 = "..."
10054080-27 = "For better or worse, I felt that they are just children."
10054080-28 = "Perhaps... I felt relieved."
10054080-29 = "If they had been acting to hide something major, I think I would have been much more worried."
10054080-30 = "But those children were acting simply because they wanted to do it..."
10054080-31 = "They were perfectly innocent children."
10054080-32 = "...Though, that mindset is certainly not something to be praised."
10054080-33 = "..."
10054080-37 = "It is often said that children are innocent."
10054080-38 = "[s] \"That's true.\""
10054080-39 = "I agree with that as well."
10054080-40 = "However, that doesn't always lead to a good outcome."
10054080-41 = "[s] \"...Could you explain that in more detail?\""
10054080-42 = "..."
10054080-46 = "Children tell lies, too."
10054080-47 = "Because... they have little understanding that lying is a bad thing."
10054080-48 = "Innocence is also a manifestation of ignorance."
10054080-49 = "Because they don't know yet, they don't understand the consequences of their actions."
10054080-54 = "That is why they speak their true feelings directly or try to hide things clumsily."
10054080-55 = "But there is no concept of good or evil tied to that."
10054080-58 = "...Because they are innocent, they can sometimes cause problems unintentionally."
10054080-61 = "Of course, children are cute, adorable, and their smiles are like angels—"
10054080-65 = "I want to protect them."
10054080-69 = "That is precisely why it is necessary to teach them right from wrong and guide them."
10054080-70 = "...Perhaps because of that, there are times when I become afraid of interacting with children."
10054080-71 = "Because children observe my actions with those innocent eyes and absorb them."
10054080-72 = "[s] \"Even you feel that way, Shun...\""
10054080-73 = "I am still a student myself, you know?"
10054080-74 = "...But at the same time, I am an instructor at the Plum Blossom Garden."
10054080-75 = "My actions might twist a child's tomorrow..."
10054080-76 = "That... is what I fear."
10054080-77 = "When children reach about 10 years old, they stop listening to adults."
10054080-78 = "It is the time when their own will begins to sprout."
10054080-79 = "It is not a bad thing. It is proof that their sense of self is growing."
10054080-80 = "Even so, I also think it is a pity."
10054080-81 = "Even though there is still so much I want to teach them and so much I must guide them through..."
10054080-82 = "[ns] \"...I see.\""
10054080-84 = "..."
10054080-85 = "Sensei, what do you think about 'nipping the buds of possibility'?"
10054080-86 = "It doesn't happen often, but there are times when it is absolutely necessary."
10054080-87 = "Because they are still young and tend to be self-centered, they cannot understand the reasons."
10054080-88 = "Therefore, I have no choice but to tell them, 'No means no.'"
10054080-89 = "I only hope that when they grow up, they will realize the reason for themselves."
10054080-90 = "Drawing a clear line for dangerous things."
10054080-94 = "I believe that is what it means to teach children."
10054080-95 = "But that process... makes my heart ache."
10054080-96 = "Because I don't say these things because I want to."
10054080-97 = "[s] \"Yeah...\""
10054080-98 = "Even so, I believe it is something that must be done."
10054080-99 = "If I were to avoid it out of fear, it is the children who would suffer the negative consequences."
10054080-100 = "[s] \"Discipline, then.\""
10054080-101 = "Yes."
10054080-102 = "It is very important."
10054080-103 = "But not everyone tries to put it into practice."
10054080-104 = "Because they don't want the children to think of them as a 'mean adult'."
10054080-105 = "Even so, if it is something someone must do... I intend to practice it, if only by myself."
10054080-106 = "Because I love children."
10054080-107 = "[s] \"That really comes across.\""
10054080-108 = "Fufu. Is that so?"
10054080-109 = "...I don't want to see children go down the wrong path or be disliked by others."
10054080-110 = "As far as my reach extends, I want them to grow up to be good people."
10054080-111 = "...When that child grows up, and at some unexpected moment. #n'So that's what the instructor meant back then,' they might think."
10054080-112 = "If they think that... I am satisfied with that."
10054080-113 = "But... well... thinking about it again, I take my hat off to your greatness, Sensei."
10054080-114 = "[s] \"Suddenly me!?\""
10054080-115 = "Sensei, you are guiding high school students who think, 'I am already an adult'."
10054080-116 = "I cannot even imagine how difficult that must be... it even scares me."
10054080-117 = "[s] \"If you keep at it, things somehow work out.\""
10054080-118 = "Fufu... is that so?"
10054080-119 = "It is precisely because you are that kind of Sensei... that I sometimes think."
10054080-124 = "If one day we could watch over the children as they grow up together—"
10054080-125 = "I think that would be very happy..."
10054080-126 = "[s] \"That... you mean that literally, right...?\""
10054080-127 = "Well, who knows?"
10054080-128 = "It's a secret."
10054080-129 = "I am a student too, after all. It's fine to have at least one secret, isn't it?"
10054080-131 = "That is true. That is precisely why I also trust Instructor Shun."
10054080-137 = "Oh?"
10054080-138 = "Monshu-sama. Good evening."
10054080-139 = "Will you not call me Kisaki-san?"
10054080-140 = "There is no one else here but us."
10054080-141 = "That may be so, but..."
10054080-143 = "[ns] \"Those kids, they're doing it tomorrow, right?\""
10054080-144 = "Ah... so you have heard."
10054080-145 = "Still, now that we have the information, we should be prepared. #nI have already shared it with Lumi and the people of the shopping district."
10054080-146 = "Honestly... they were truly selfish people."
10054080-147 = "I even looked back on my own childhood..."
10054080-148 = "I was hot-blooded, but I exercised a minimum level of self-control."
10054080-149 = "Hmm... perhaps the roots are the same."
10054080-150 = "Oh, you were, Monshu-sama?"
10054080-151 = "[ns] \"I can't imagine that now.\""
10054080-152 = "There is a saying, 'The human heart is hard to measure'."
10054080-153 = "There is no distinction between adult and child there. #nIf you take it lightly as a child's prank, you might end up in pain someday, you know?"
10054080-154 = "Especially when they are at an age where they fear nothing, even more so."
10054080-159 = "...It is strange."
10054080-160 = "Even though I have yet to learn, let alone guide anyone."
10054080-161 = "Even though I have been hoisted into this seat as Monshu and student council president..."
10054080-163 = "[ns] \"I will support you with all my might.\""
10054080-164 = "You are reliable just by being by my side, but..."
10054080-165 = "No, I should not refuse such kindness."
10054080-166 = "[s] \"If there is anything I can do, just let me know.\""
10054080-167 = "I have taken those words to heart."
10054080-168 = "Then, to start..."
10054080-169 = "For smooth cooperation, we should know each other well, shouldn't we?"
10054080-170 = "[s] \"That... is true.\""
10054080-171 = "Indeed."
10054080-172 = "One must speak to the Monshu based on what is correct."
10054080-173 = "And so, if we are to deepen our mutual understanding..."
10054080-174 = "I think we should increase the time we spend together, what do you think?"
10054080-175 = "[ns] \"A-ah... wait...?\""
10054080-180 = "What is it, Sensei?"
10054080-181 = "I am speaking of 'logical reasoning', am I not?"
10054080-182 = "Therefore, this conversation concludes as follows."
10054080-183 = "If you say you want to be a strength to me—to Shanhaijing."
10054080-184 = "It means you need to increase the time you spend in Shanhaijing."
10054080-185 = "[ns] \"I-I've been had...!!!\""
10054080-186 = "Oh, that sounds nice."
10054080-187 = "Sensei is someone who teaches and guides 'children', after all..."
10054080-188 = "When you come to Shanhaijing, please do visit the Plum Blossom Garden as well."
10054080-193 = "Instructor Shun. Sensei's time is limited, you know?"
10054080-194 = "That is precisely why."
10054080-195 = "One must be a little selfish."
10054080-196 = "I cannot win against Instructor Shun with words."
10054080-197 = "That is my line."
10054080-198 = "Truly like you."
10054080-199 = "By the way, Sensei."
10054080-200 = "[s] \"Hm?\""
10054080-201 = "Don't forget your promise to Kokona-chan, okay?"
10054080-202 = "[s1] \"Of course, I remember it clearly!\"\n[s2] \"Ah, that's right!\""
10054080-203 = "Yes, thank you."
10054080-204 = "I'm glad you remembered. A sulking Kokona-chan is a handful, you know?"
10054080-206 = "(After that, we continued our night walk while talking about various things.)"
10054080-207 = "(By the time we returned to the inn, the night had grown late.)"
10054080-209 = "[ns] \"Good night.\""
10054080-210 = "Yes, good night."
10054080-211 = "You two should get some rest as well. Tomorrow will be a busy day."
10054080-214 = "...*Cough*, *cough*."
10054080-219 = "Phew..."
10054080-220 = "..."
10054080-221 = "...*Cough*."