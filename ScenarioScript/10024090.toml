[translation]
10024090-1 = "Episódio 9; Retorno ao Caminho Correto"
10024090-2 = "Genryumon - Interior"
10024090-4 = "……。"
10024090-5 = "……。"
10024090-10 = "Bem, a verdade é exatamente como eu disse."
10024090-11 = "Posso confiar que a Genryumon aplicará punições rigorosas aos membros envolvidos no contrabando, certo?"
10024090-12 = "E-então o caso está resolvido?"
10024090-13 = "Que bom, não é?#nAgora a inocência da Associação Genbu está provada—"
10024090-14 = "É só isso que tem a dizer?"
10024090-15 = "Sinceramente, a Genryumon é uma decepção."
10024090-16 = "[s] \"Interrogar a Associação Genbu sem nenhuma prova concreta...\""
10024090-17 = "……Não tenho mais nada a dizer.#nNão me incomodem com problemas pessoais."
10024090-18 = "Vocês querem dizer que o que alguns membros fizeram é responsabilidade de toda a Genryumon?"
10024090-19 = "Além disso, se falarem assim, a Genryumon ficará paralisada.#nSe isso acontecer, não seremos os únicos em apuros, sabe?"
10024090-21 = "Ah... parece que não adianta falar nada."
10024090-22 = "Ser tão descarado a esse ponto... estou tão perplexa que nem tenho palavras."
10024090-28 = "A Mestra do Portão chegou!!!"
10024090-29 = "Chegou!!!"
10024090-35 = "—Que barulheira é essa?"
10024090-40 = "M-Mestra do Portão! Aquelas pessoas..."
10024090-42 = "Já chega, eu já sei de tudo."
10024090-43 = "Mestra do Portão...!"
10024090-54 = "Mestra do Portão!?#nP-por favor, pare!!"
10024090-55 = "Ela... se curvou?"
10024090-56 = "Kisaki..."
10024090-60 = "A Genryumon oferecerá um pedido de desculpas oficial à Associação Genbu."
10024090-61 = "Por ter declarado que a Associação Genbu era a culpada sem provas concretas — e por ter manchado sua reputação."
10024090-62 = "E, consequentemente, por ter causado confusão não apenas a vocês, mas a toda Shanhaijing.#nE também, por minha falta de supervisão."
10024090-63 = "Como Mestra da Genryumon, prometo que tal coisa nunca mais acontecerá."
10024090-64 = "Esta é a decisão da Mestra da Genryumon, Kisaki Ryuge."
10024090-67 = "M-mas, Mestra do Portão..."
10024090-68 = "Retirem-se."
10024090-69 = "Nós, até o fim..."
10024090-71 = "—Não direi duas vezes."
10024090-73 = "P-perdão!"
10024090-79 = "V-vejam, ela se desculpou, não foi?#nA Genryumon fez um pronunciamento oficial!"
10024090-80 = "Por que esse olhar...#nEu também disse que foi um erro, não disse?!"
10024090-81 = "Francamente, a Mestra é gentil demais.#nIsso foi só um pequeno erro de investigação, não precisava se curvar..."
10024090-87 = "Eu ainda não consigo aceitar isso, Presidente!"
10024090-88 = "Bem... eu entendi mais ou menos o que a Kisaki está pensando."
10024090-89 = "Presidente Lumi, a senhora realmente acha que isso está bom!?"
10024090-90 = "Se está bom ou não, é complicado...#nMas bem, vamos considerar o caso encerrado."
10024090-91 = "Mas a Associação Genbu poderia ter sido dissolvida por causa disso...!"
10024090-92 = "[s1] \"Eu também entendi mais ou menos...\"\n[s2] \"Às vezes, as coisas terminam de um jeito que não nos deixa satisfeitos.\""
10024090-95 = "Bem, vamos encerrar esse assunto por aqui."
10024090-96 = "Eu entendi o pensamento da Kisaki...#ne para a Associação Genbu, se os clientes puderem voltar a vir com tranquilidade, já é o suficiente."
10024090-97 = "Por mais que ela seja a Mestra, sendo um conselho estudantil, existem circunstâncias inevitáveis."
10024090-98 = "Hum... entendi.#nPor hoje, vou respeitar a vontade da Presidente."
10024090-99 = "Mas saiba que eu não estou satisfeita!"
10024090-100 = "Ahaha. Obrigada, Reijo.#nVou preparar algo delicioso para você, então me perdoe por isso."
10024090-106 = "Primeiro, tenho um pedido para você e para a Associação Genbu."
10024090-107 = "[s] \"Claro, pode contar com a gente.\""
10024090-108 = "Agradeço. #nAo que parece, as alunas que ouviram sobre a confusão recente estão bastante inquietas."
10024090-109 = "Dissipar a ansiedade delas também é um papel importante do Genryumon. #n...Por isso, poderia nos emprestar sua força?"
10024090-110 = "Este é um pedido formal... da líder do Genryumon."
10024090-111 = "A-A líder!?"
10024090-112 = "Não faça escândalo, Mina. #nA Associação Genbu também faz parte de Shanhaijing."
10024090-113 = "É... verdade. Entendido, líder."
10024090-114 = "Então, qual é o pedido? #nNós aceitaremos qualquer coisa, sabe."
10024090-115 = "Diga isso com cuidado para não se arrepender depois, está bem?"
10024090-116 = "A Associação Genbu nunca recusa um pedido. #nExceto se for fisicamente impossível, é claro."
10024090-117 = "Não se esqueça dessas palavras, nem por um segundo."
10024090-118 = "Claro, desde que a recompensa seja boa. #nÉ assim que a Associação Genbu funciona."
10024090-119 = "Excelente. Então, poderia preparar um banquete para mim?"
10024090-120 = "Um banquete grandioso, convidando todas as alunas de Shanhaijing... e o Sensei."
10024090-121 = "[s] \"Eu também posso ir?\""
10024090-123 = "Certamente. #nOra, você foi a peça-chave que nos levou à resolução deste incidente, não foi?"
10024090-124 = "Aproveite esta oportunidade para saborear a verdadeira hospitalidade de Shanhaijing."
10024090-125 = "Com todo mundo de Shanhaijing... e o Sensei...?"
10024090-127 = "Não se preocupe com os custos. #nO Genryumon arcará com tudo."
10024090-128 = "Ou será que... meu pedido não é digno de ser aceito por vocês?"
10024090-129 = "Não, claro que não! #nAhaha, vai ser muito divertido."
10024090-130 = "Preciso reunir o pessoal da associação logo!"
10024090-132 = "Ah. Se precisar de mais mãos, não se importe em pedir ajuda à Mina e às outras."
10024090-133 = "Não se preocupe, todas as meninas que se juntaram à Associação Genbu são cozinheiras de primeira!"
