[translation]
10024090-1 = "第9話;[ruby=かいじゃきせい]改邪帰正[/ruby]"
10024090-2 = "玄龍門・内部"
10024090-4 = "……。"
10024090-5 = "……。"
10024090-10 = "さて、真相は話した通りだよ。"
10024090-11 = "密輸に関わった構成員には、玄龍門が厳正な処罰を与えると信じて良いのですよね。"
10024090-12 = "そ、それじゃあ事件は解決したわけだ？"
10024090-13 = "良かったじゃないか。#nこれで玄武商会の無実は証明され――"
10024090-14 = "言うことはそれだけ？"
10024090-15 = "玄龍門には、失望せざるを得ませんね。"
10024090-16 = "[s] \"確証もなく、玄武商会を問い詰めたのは……\""
10024090-17 = "……これ以上、話すことはない。#n個人の問題を我々に持ち出されても困るな。"
10024090-18 = "お前たちは一部の構成員が行った事を玄龍門全体の責任だと言いたいのか？"
10024090-19 = "尤も、そんなことを言われては玄龍門が麻痺してしまう。#nそうなったら、困るのは私たちだけじゃないぞ？"
10024090-21 = "はあ……なにを言っても通じそうにないね。"
10024090-22 = "ここまで清々しく開き直られるとは……呆れて言葉が出ません。"
10024090-28 = "門主様の、おなーりー！！！"
10024090-29 = "おなーりー！！！"
10024090-35 = "――何の騒ぎじゃ。"
10024090-40 = "も、門主様！あの者たちが……！"
10024090-42 = "もうよい、全て分かっておる。"
10024090-43 = "門主様……！"
10024090-54 = "門主様！？#nお、おやめください！！"
10024090-55 = "頭を……下げた？"
10024090-56 = "キサキ……。"
10024090-60 = "玄龍門は、玄武商会に対して公式に謝罪しよう。"
10024090-61 = "確たる証拠もなく玄武商会を犯人であると述べ――汚名を被せたこと。"
10024090-62 = "延いては、其方たちだけでなく、山海経に混乱を招いたこと。#nそして、妾の目が行き届いておらぬこと。"
10024090-63 = "玄龍門の門主として、かような事は二度と起こさぬと約束しよう。"
10024090-64 = "これが玄龍門の門主、[ruby=りゅうげ]竜華[/ruby]キサキの裁決じゃ。"
10024090-67 = "し、しかし門主様……"
10024090-68 = "下がれ。"
10024090-69 = "私たちは、あくまで……"
10024090-71 = "――二度は言わぬ。"
10024090-73 = "し、失礼しましたっ！"
10024090-79 = "さ、さあ、謝罪したぞ？#n玄龍門が公式に表明したのだからな！"
10024090-80 = "なんだ、その目は……#n私も悪かったと言っただろうが！"
10024090-81 = "まったく、門主様は優しすぎる。#nこんなのちょっとした捜査ミスじゃないか、何も頭を下げなくても……"
10024090-87 = "やはり納得できません、会長！"
10024090-88 = "まあ……キサキの考えてることは、なんとなく分かったよ。"
10024090-89 = "ルミ会長は、本当にこれで良いんですか！？"
10024090-90 = "良いか悪いかで言ったら微妙だけど……#nまあ、これで一件落着ということで。"
10024090-91 = "もしかしたら、玄武商会が解散するかもしれなかったのに……！"
10024090-92 = "[s1] \"私もなんとなく分かったような……。\"\n[s2] \"スッキリとしない終わり方の日もあるよね。\""
10024090-95 = "さ、この話はこれで終わりにしよっか。"
10024090-96 = "キサキの考えは分かったし……#n玄武商会としては、またお客さんが安心して来られるようになるなら十分。"
10024090-97 = "いくら門主とはいえ、生徒会である以上、どうしようもない事情はあるからね。"
10024090-98 = "うーん……分かりました。#n今日のところは、会長の意志を尊重します。"
10024090-99 = "ですが、私は納得してるわけではありませんからね！"
10024090-100 = "あはは。ありがとう、レイジョ。#n美味しいもの作ってあげるから、それで許してよ。"
10024090-106 = "一つ、[ruby=そなた]其方[/ruby]と玄武商会に、お願いがあるのじゃが。"
10024090-107 = "[s] \"もちろん、力になるよ。\""
10024090-108 = "礼を言う。#nどうやら、今回の騒ぎを聞きつけた生徒たちが、不安を抱いているようでの。"
10024090-109 = "彼女らの不安を払拭するのも、玄龍門の大事な役目じゃ。#n……そこで、力を貸してはくれぬか？"
10024090-110 = "これは、玄龍門の門主からの――正式な依頼じゃ。"
10024090-111 = "も、門主様！？"
10024090-112 = "騒ぐでない、ミナ。#n玄武商会も山海経じゃ。"
10024090-113 = "そう……ですね。分かりました、門主様。"
10024090-114 = "それで、依頼って何？#nどんな内容でも受けるつもりだけどね。"
10024090-115 = "そんなことを口にして、後悔せぬようにな？"
10024090-116 = "玄武商会が依頼を断ることはないよ。#n物理的に不可能な場合を除いてね。"
10024090-117 = "その言葉、努々違えるでないぞ？"
10024090-118 = "もちろん、報酬さえ十分ならね。#nそれが玄武商会だから。"
10024090-119 = "それは重畳――では、宴の準備を頼めるかの？"
10024090-120 = "山海経の全生徒……そして、先生を招待して執り行う、盛大な宴じゃ。"
10024090-121 = "[s] \"私もいいの？\""
10024090-123 = "無論。#nなにを言う、其方は此度の事件を解決に導いた立役者じゃろうて。"
10024090-124 = "この機会に、「山海経」の「おもてなし」を存分に味わうが良い。"
10024090-125 = "山海経のみんなと……先生を……？"
10024090-127 = "費用なら心配せずとも良い。#n全て、玄龍門が負担しよう。"
10024090-128 = "それとも……妾のお願いなど、引き受けるに値しないと？"
10024090-129 = "ううん、そんなわけないよ！#nあははっ、楽しくなりそうだね。"
10024090-130 = "久しぶりに商会のみんなを集めないと！"
10024090-132 = "ああ。手が足りぬようじゃったら、ミナたちも使ってくれて構わぬぞ？"
10024090-133 = "大丈夫、玄武商会に集まってくれた子たちは、みんな一人前の料理人だからね！"
