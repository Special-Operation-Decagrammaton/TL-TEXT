[translation]
80000055-1 = "Por onde eu deveria começar a comer...?"
80000055-2 = "（Ao chegar exatamente no horário, Mari estava me esperando em frente à fonte.）"
80000055-3 = "Ah, Sensei...! Obrigado por vir até aqui."
80000055-4 = "Bem, o assunto é... na verdade..."
80000055-5 = "……"
80000055-9 = "I-isto é para você...!"
80000055-14 = "[ns1] \"O que é isso, que incrível!?\"\n[ns2] \"É chocolate, né...!?\""
80000055-15 = "B-bem, tecnicamente é chocolate...!"
80000055-16 = "S-sim!"
80000055-17 = "Hoje é Dia dos Namorados..."
80000055-18 = "Ouvi dizer que é um dia para expressar gratidão a quem você aprecia, através de chocolates."
80000055-19 = "Sendo assim, eu senti que precisava entregar algo para você, Sensei."
80000055-20 = "Mas, enquanto eu pensava no que dar, acabei ficando muito indecisa..."
80000055-21 = "E, quando me dei conta, eu tinha comprado isto..."
80000055-22 = "V-você acha estranho...? Talvez um chocolate mais comum fosse melhor..."
80000055-23 = "[s3] \"Não, eu acho ótimo.\"\n[s4] \"Acho que o impacto é algo bom, não acha?\""
80000055-24 = "S-sério...?"
80000055-25 = "S-sério...?"
80000055-26 = "Fufu..."
80000055-27 = "Obrigada, Sensei."
80000055-28 = "É que eu estava muito nervosa."
80000055-29 = "Fiquei pensando se isso estava bom, ou se eu deveria mesmo te entregar..."
80000055-30 = "Mas fico feliz por ter conseguido. Por ter conseguido expressar meus sentimentos a você, Sensei..."
80000055-34 = "……?"
80000055-35 = "Sensei, o que houve? Você está encarando o chocolate com tanta intensidade..."
80000055-36 = "……Eh?"
80000055-37 = "Se é seguro comer isso de várias formas...?"
80000055-38 = "……"
80000055-39 = "……Eh, bem."
80000055-40 = "Isso é, bem..."
80000055-41 = "A parte da cabeça é um pouco complicada, mas... talvez as mãos, ou a barra da roupa...?"
80000055-42 = "Ah, nossa, até onde será que é seguro comer...!?"
80000055-43 = "O-o que nós deveríamos fazer...!!"
80000055-45 = "（Depois disso, fiquei um tempo com a Mari tentando decidir qual parte seria segura para comer.）"
80000055-49 = "（...No fim, depois de horas sem chegar a uma conclusão, Mari pareceu aceitar, então decidimos guardar como um item de decoração.）"
