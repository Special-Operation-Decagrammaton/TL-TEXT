[translation]
80000055-1 = "どこから食べれば……？"
80000055-2 = "（ちょうど時間通りに到着すると、噴水の前でマリーが待っていた）"
80000055-3 = "あ、先生……！わざわざお越しいただき、ありがとうございます。"
80000055-4 = "えっと、用件はその……実は……。"
80000055-5 = "……。"
80000055-9 = "こ、これを……！"
80000055-14 = "[ns1] \"何これすごい！？\"\n[ns2] \"チョコレート、だよね……！？\""
80000055-15 = "い、一応チョコレートです……！"
80000055-16 = "は、はい！"
80000055-17 = "今日はバレンタインデー……。"
80000055-18 = "日頃から感謝を伝えたい方に、チョコレートを通じて気持ちを伝える日だと聞きました。"
80000055-19 = "でしたら、やはり先生にはどうしてもお渡ししたいなと思ったんです。"
80000055-20 = "ただ、何をお渡しすればと悩んでいるうちに、考え込んでしまい……。"
80000055-21 = "気が付いたらなぜか、これを買っていて……。"
80000055-22 = "や、やっぱり変でしょうか……？もっと普通のチョコレートの方が……。"
80000055-23 = "[s3] \"ううん、良いと思うよ。\"\n[s4] \"インパクトもあって良いんじゃないかな。\""
80000055-24 = "そ、そうでしたか……？"
80000055-25 = "そ、そうでしたか……？"
80000055-26 = "ふふっ……。"
80000055-27 = "ありがとうございます、先生。"
80000055-28 = "その、ずっと緊張していたんです。"
80000055-29 = "これで大丈夫なのか、そもそもお渡しして良いのか、と……。"
80000055-30 = "ですがお渡しできて良かったです。先生に、気持ちを伝えることができて……。"
80000055-34 = "……？"
80000055-35 = "先生、どうされましたか？そんなにチョコレートを見つめられて……。"
80000055-36 = "……え？"
80000055-37 = "これを食べるのは色々な面で大丈夫なのか……？"
80000055-38 = "……。"
80000055-39 = "……え、っと。"
80000055-40 = "それは、その……。"
80000055-41 = "あ、頭の部分はちょっとアレですが……手も、ちょっと……服の裾とか、でしたら……？"
80000055-42 = "あ、あれ、どこまでなら食べても大丈夫なのでしょうか……！？"
80000055-43 = "わ、私たちは一体、どうすれば……！！"
80000055-45 = "（その後マリーとしばらく、どの部分なら食べて良いのかで一緒に悩んだ）"
80000055-49 = "（……結局何時間悩んでも答えが出ず、マリーもそれで納得したようなので、大事に飾っておくことにした）"
