[translation]
1011103-1 = "穏やかな休日"
1011103-4 = "思ったより早かったな、先生。"
1011103-5 = "そういうネルこそ早かった、って？"
1011103-6 = "ははっ！"
1011103-7 = "制服が楽しみでよ。"
1011103-8 = "しばらくスカジャンなし生活も悪くねぇな！"
1011103-9 = "[s] \"いつもと違う一日にしたいって言ってたけど……。\""
1011103-11 = "[ns] \"急にどうしたの？\""
1011103-12 = "聞かれると思ってたぜ。"
1011103-13 = "今のあたしは制服を着てるだろ？"
1011103-14 = "だから、C&Cのリーダーでもなければ、あいつらを気にする必要もない。"
1011103-15 = "完全に一般生徒Aってわけだ。"
1011103-16 = "こういう日じゃねぇと、生徒としての生活を思いっきり楽しめねぇからな。"
1011103-17 = "普段は立場上、できないことも多いからよ。"
1011103-18 = "……どうした、その顔。"
1011103-19 = "[s1] \"ネルも色々考えてたんだね。\"\n[s2] \"可愛いなって思って。\""
1011103-20 = "あぁ？当たり前だろ。"
1011103-21 = "な、何も出ねぇぞ！"
1011103-22 = "とにかく！"
1011103-23 = "今しかできないことを精一杯やろうって話だ！"
1011103-24 = "そんで、せっかくなら先生と一緒のほうが楽しいと思ってな！"
1011103-25 = "よし、さっさと行くぞ！"
1011103-31 = "いらっしゃいませ！#nクイーンバーガーミレニアム店へようこそ！"
1011103-33 = "[ns] \"普通のファーストフード店だよね？\""
1011103-34 = "まぁな。"
1011103-35 = "よく部員と来るんだ。#n意外と美味いんだぞ。"
1011103-36 = "[s] \"こんないつも通りで良いの？\""
1011103-37 = "いつもとは違うから、安心してくれ。"
1011103-38 = "とりあえず注文しようぜ。#n先生が先に頼んで良いぞ。"
1011103-39 = "[s] \"すみません、チーズバーガーお願いします。\""
1011103-40 = "んじゃ、あたしは……。"
1011103-41 = "キッズセットBで！"
1011103-42 = "[s] \"キッズセット……？\""
1011103-43 = "言っただろ？#n今日はいつもと違うってよ！"
1011103-44 = "ははっ、楽しくなってきたぜ！"
1011103-46 = "ほら、こっちが先生のチーズバーガーな。"
1011103-47 = "これが、あたしのキッズセットか。"
1011103-48 = "[s] \"キッズセット、頼んでみたかったの？\""
1011103-49 = "部員の前でこんなの注文したら、ガキみたいとか可愛いとか言われるだろ。"
1011103-50 = "それに、C&Cのリーダーがキッズセットを食ってたなんて話が広まったら、#nどうなると思う？"
1011103-51 = "外野が何を言おうと構わねぇけど、カッコがつかないだろ。"
1011103-52 = "[s] \"……それで、この機会に？\""
1011103-53 = "ま、そういうわけだ。"
1011103-54 = "それに、このセットはな……。"
1011103-55 = "……こんなのまでついてるんだぞ！"
1011103-61 = "[ns] \"……ロボットのおもちゃ？\""
1011103-62 = "ただのおもちゃじゃないんだな、それが。"
1011103-63 = "ここを回して、こうすると……。"
1011103-68 = "変形するんだ！"
1011103-69 = "[ns] \"……！\""
1011103-70 = "どうだ、カッコ良いだろ？"
1011103-71 = "ははっ！#nでもこれは、あたしのもんだぜ！"
1011103-72 = "先生も欲しけりゃ、自分で頼むんだな！"
1011103-78 = "さて、次はどうすっかな！"
1011103-79 = "あっちは公園か、ちょっと散歩しようぜ。"
1011103-80 = "今日は天気も良いしな。"
1011103-81 = "あぁ？#n別に散歩なんていつでもできるって？"
1011103-82 = "ははっ！#nまぁ、着いたら説明してやる。"
1011103-84 = "よっし、今日も空いてるな。"
1011103-85 = "この散策コースは、反対側に出ると小さな池があるんだ。"
1011103-86 = "ま、行ったことはねぇけど。"
1011103-87 = "[s] \"なのにどうして知ってるの？\""
1011103-88 = "C&Cの部室と近いからな。"
1011103-89 = "出動する時は、よく通り抜けるんだ。"
1011103-90 = "でもそのせいで、ゆっくりした記憶はなくてよ。"
1011103-91 = "いつか散歩でもしてみてぇと思ってたけど、なかなかチャンスがなかったんだ。"
1011103-92 = "今日なら、ちょうど良いと思ってな。"
1011103-93 = "どうだ先生、付き合ってくれるか？"
1011103-94 = "[s] \"もちろん。\""
1011103-95 = "よっし！#nじゃあ、さっそく行くぜ！"
1011103-97 = "おお、広いな！"
1011103-101 = "先生、池に魚がいるぞ！"
1011103-102 = "でけぇな！#n何を食ったらあんなにデカくなるんだ？"
1011103-103 = "[s] \"わっ、柵に乗ったら危ないよ。\""
1011103-104 = "大丈夫、大丈夫！"
1011103-105 = "ちょっとくらい別に良いだろ？"
1011103-106 = "この程度で揺れるわけ――"
1011103-110 = "うおっ！？"
1011103-115 = "[ns] \"ネル！？\""
1011103-119 = "び、びっくりした……。"
1011103-120 = "[s] \"無事で良かったよ。\""
1011103-121 = "まさか、こんなボロくなってるとは思わなかったな。"
1011103-122 = "……。"
1011103-123 = "おい、いつまで抱えてるんだ？"
1011103-124 = "そろそろ離してほしいんだが……。"
1011103-125 = "[s] \"ご、ごめん！\""
1011103-126 = "……べ、別に嫌ってわけじゃねぇからよ。"
1011103-127 = "ったく、心配性だな先生は！"
1011103-128 = "あたしが池に落ちるわけねぇだろ！"
1011103-129 = "けどまぁ、助けてくれてありがとよ。"
1011103-130 = "ああもう！#nほら、あっちのベンチ行くぞ！"
1011103-133 = "こうやって、ただ風景を眺めるのも悪くねぇな。"
1011103-134 = "穏やかな休日ってやつだ。"
1011103-135 = "先生も楽しめてるか？"
1011103-136 = "[s3] \"ネルと一緒なら何でも楽しいよ。\"\n[s4] \"たまにはこういう時間も必要だよね。\""
1011103-137 = "そ、そうなのか？"
1011103-138 = "……ははっ！先生はお世辞が上手だな！"
1011103-139 = "あぁ、本心で言ってるって？"
1011103-140 = "まぁ、あたしも先生と一緒なら、何だって楽しいけどよ……。"
1011103-141 = "ははっ、そうだろ？"
1011103-142 = "やっぱ、先生も喜んでくれると思ったぜ。"
1011103-143 = "ふわぁ。"
1011103-144 = "こんだけ気持ち良いと、眠くなってくるな……。"
1011103-150 = "……。"
1011103-151 = "[ns] ネルに肩を貸す。"
1011103-152 = "……んっ。"
1011103-154 = "（そうして数時間が経過し……）"
1011103-161 = "[ns] \"……ネル。\""
1011103-162 = "……。"
1011103-163 = "[ns] \"そろそろ起きないと、夜眠れなくなるよ。\""
1011103-164 = "……ん？"
1011103-169 = "うおっ！？"
1011103-170 = "寝ちゃったのか！？"
1011103-171 = "いつの間に！？"
1011103-172 = "[s] \"疲れは取れた？\""
1011103-173 = "……まぁな。"
1011103-174 = "待てよ、先生。#nもしかして……ずっと肩を貸してくれてたのか？"
1011103-175 = "起こしてくれて良かったのによ。"
1011103-176 = "思った以上に、寝ちまったな……。"
1011103-177 = "[s] \"ネルがぐっすり休めて良かったよ。\""
1011103-178 = "うーん……なんか悪ぃな。"
1011103-179 = "よっし、今度はあたしの肩を好きなだけ使っていいぞ！"
1011103-180 = "……って、もう遅いか。"
1011103-181 = "[s] \"気にしないで。\""
1011103-183 = "[ns] \"それより、次は何する？\""
1011103-184 = "今日はもう満足だ！"
1011103-185 = "おかげでゆっくりできたしな！"
1011103-186 = "これも先生のおかげだ。"
1011103-191 = "今日も付き合ってくれてありがとよ。"
