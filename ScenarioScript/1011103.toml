[translation]
1011103-1 = "feriado tranquilo"
1011103-4 = "Foi mais rápido do que eu esperava, senhor."
1011103-5 = "Você acha que esse tipo de flanela era rápido?"
1011103-6 = "Haha!"
1011103-7 = "Estou ansioso pelo uniforme."
1011103-8 = "Viver sem um Sukajan por um tempo não é tão ruim!"
1011103-9 = "[s] \"Você disse que queria ter um dia diferente do normal...\""
1011103-11 = "[ns] \"O que aconteceu de repente?\"\"\n1011103-12 = \"Achei que você ia me perguntar.\"\n1011103-13 = \"Estou usando uniforme agora, certo?\"\n1011103-14 = \"Portanto, não sou o líder do C&C e não preciso me preocupar com eles.\"\n1011103-15 = \"Eu sou completamente um aluno regular A.\"\n1011103-16 = \"Se não for um dia como este, não poderei aproveitar plenamente minha vida de estudante.\"\n1011103-17 = \"Há muitas coisas que normalmente não posso fazer devido à minha posição.\"\n1011103-18 = \"...O que há de errado com esse rosto?\"\n1011103-19 = \"[s1] \"Nel também estava pensando nisso.\"\n[s2] \"Achei fofo.\"\"\n1011103-20 = \"Ah? É óbvio.\"\n1011103-21 = \"Não, não sai nada!\"\n1011103-22 = \"de qualquer forma!\"\n1011103-23 = \"É sobre fazer o melhor que você pode no momento!\"\n1011103-24 = \"Então, pensei que seria mais divertido estar com a professora!\"\n1011103-25 = \"Ok, vamos agora!\"\n1011103-31 = \"Bem-vindo! #nBem-vindo à Loja Queen Burger Millennium!\"\n1011103-33 = \"[ns] \"É um restaurante fast food normal, certo?\"\"\n1011103-34 = \"Bem.\"\n1011103-35 = \"Costumo vir aqui com os membros do meu clube. #nÉ surpreendentemente delicioso.\"\n1011103-36 = \"[s] \"Está tudo bem continuar assim como sempre?\"\"\n1011103-37 = \"É diferente do normal, então não se preocupe.\"\n1011103-38 = \"Vamos apenas fazer um pedido. #nVocê pode perguntar primeiro ao sensei.\"\n1011103-39 = \"[s] \"Com licença, gostaria de um cheeseburger, por favor.\"\"\n1011103-40 = \"Pois bem, eu...\"\n1011103-41 = \"Com crianças conjunto B!\"\n1011103-42 = \"[s] \"Conjunto infantil...?\"\"\n1011103-43 = \"Eu te disse, certo? #nHoje está diferente do habitual!\"\n1011103-44 = \"Haha, está ficando divertido!\"\n1011103-46 = \"Olha, este é o cheeseburger do sensei.\"\n1011103-47 = \"Este é o conjunto dos meus filhos?\"\n1011103-48 = \"[s] \"Você quer encomendar o conjunto infantil?\"\"\n1011103-49 = \"Se você pedir algo assim na frente dos membros do clube, provavelmente ouvirão que você parece uma criança ou que é fofo.\"\n1011103-50 = \"Além disso, o que você acha que aconteceria se vazasse a notícia de que o líder do C&C estava comendo kits infantis?\"\n1011103-51 = \"Não me importo com o que os outfielders dizem, mas não é legal.\"\n1011103-52 = \"[s] \"...Então, nesta ocasião?\"\"\n1011103-53 = \"Bem, é assim que é.\"\n1011103-54 = \"Além disso, este conjunto...\"\n1011103-55 = \"...Vem até com isso!\"\n1011103-61 = \"[ns] \"...Robô de brinquedo?\"\"\n1011103-62 = \"Não é apenas um brinquedo, claro.\"\n1011103-63 = \"Vire isso e faça isso...\"\n1011103-68 = \"Isso transforma!\"\n1011103-69 = \"[ns] \"...!\"\"\n1011103-70 = \"O que você acha? É legal, certo?\"\n1011103-71 = \"Haha! #nMas isso é meu!\"\n1011103-72 = \"Se você também quer um sensei, tem que pedir você mesmo!\"\n1011103-78 = \"Bem, o que vem a seguir!\"\n1011103-79 = \"Vamos dar um passeio ali no parque.\"\n1011103-80 = \"O tempo está bom hoje.\"\n1011103-81 = \"Ah? #nVocê sempre pode dar um passeio?\"\n1011103-82 = \"Haha! #nBem, explicarei quando chegar lá.\"\n1011103-84 = \"Ok, estou livre hoje também.\"\n1011103-85 = \"Há um pequeno lago do outro lado deste percurso pedestre.\"\n1011103-86 = \"Bem, eu nunca estive lá.\"\n1011103-87 = \"[s] \"Mas como você sabe?\"\"\n1011103-88 = \"Fica perto da sala do clube do C&C.\"\n1011103-89 = \"Quando sou despachado, muitas vezes passo por aqui.\"\n1011103-90 = \"Mas por causa disso, não me lembro de ter sido lento.\"\n1011103-91 = \"Pensei em dar um passeio algum dia, mas nunca tive oportunidade.\"\n1011103-92 = \"Acho que hoje seria um bom momento.\"\n1011103-93 = \"O que você acha, Sensei, você vem comigo?\"\n1011103-94 = \"[s] \"Claro.\""

1011103-95 = "OK! #n Pois bem, vamos embora agora mesmo!"
1011103-97 = "Ah, é tão espaçoso!"
1011103-101 = "Sensei, tem peixes no lago!"
1011103-102 = "É enorme! #nO que você come para ficar tão grande?"
1011103-103 = "[s] \"Uau, é perigoso subir na cerca.\""
1011103-104 = "Está tudo bem, está tudo bem!"
1011103-105 = "Não é um pouco melhor?"
1011103-106 = "Isso é o quanto isso treme..."
1011103-110 = "Uau! ?"
1011103-115 = "[ns] \"Nel!?\""
1011103-119 = "Fiquei surpreso..."
1011103-120 = "[s] \"Estou feliz que você esteja bem.\"\"\n1011103-121 = \"Nunca pensei que estaria tão degradado.\"\n1011103-122 = \"…….\"\n1011103-123 = \"Ei, quanto tempo você vai me segurar?\"\n1011103-124 = \"Quero que você me deixe ir logo...\"\n1011103-125 = \"[s] \"Desculpe!\"\"\n1011103-126 = \"...Bem, não é que eu particularmente não goste disso.\"\n1011103-127 = \"Você é tão preocupado, sensei!\"\n1011103-128 = \"Não vou cair na lagoa de jeito nenhum!\"\n1011103-129 = \"Mas, obrigado pela sua ajuda.\"\n1011103-130 = \"Ah, já! #nVamos, vamos para aquele banco!\"\n1011103-133 = \"Não é ruim apenas olhar a paisagem assim.\"\n1011103-134 = \"É um feriado tranquilo.\"\n1011103-135 = \"O sensei também está se divertindo?\"\n1011103-136 = \"[s3] \"Qualquer coisa é divertida com Nell.\"\n[s4] \"Às vezes você precisa de um tempo como este.\"\"\n1011103-137 = \"É assim mesmo?\"\n1011103-138 = \"...Haha! O sensei é muito bom em lisonjear as pessoas!\"\n1011103-139 = \"Ah, você está falando sério?\"\n1011103-140 = \"Bem, desde que eu esteja com você, qualquer coisa é divertida...\"\n1011103-141 = \"Haha, não é?\"\n1011103-142 = \"Achei que a professora também ficaria feliz.\"\n1011103-143 = \"Uau.\"\n1011103-144 = \"É tão bom que começo a sentir sono...\"\n1011103-150 = \"…….\"\n1011103-151 = \"[ns] Empreste seu ombro para Nell.\"\n1011103-152 = \"...Hum.\"\n1011103-154 = \"(Várias horas se passaram...)\"\n1011103-161 = \"[ns] \"...Nel.\"\"\n1011103-162 = \"…….\"\n1011103-163 = \"[ns] \"Se você não acordar logo, não conseguirá dormir à noite.\"\"\n1011103-164 = \"……sim?\"\n1011103-169 = \"Uau! ?\"\n1011103-170 = \"Você adormeceu? ?\"\n1011103-171 = \"Antes que eu percebesse! ?\"\n1011103-172 = \"[s] \"Você está cansado?\"\"\n1011103-173 = \"...Bem.\"\n1011103-174 = \"Espere, sensei. #nTalvez... você esteve apoiando esse tempo todo?\"\n1011103-175 = \"Estou feliz que você me acordou.\"\n1011103-176 = \"Adormeci mais do que esperava...\"\n1011103-177 = \"[s] \"Estou feliz que Nell tenha tido uma boa noite de descanso.\"\"\n1011103-178 = \"Hmm... isso é meio ruim.\"\n1011103-179 = \"Ok, agora você pode usar meu ombro o quanto quiser!\"\n1011103-180 = \"...Acho que já é tarde.\"\n1011103-181 = \"[s] \"Não se preocupe.\""

1011103-183 = "[ns] \"Além disso, o que você vai fazer a seguir?\""
1011103-184 = "Estou satisfeito hoje!"
1011103-185 = "Graças a você, consegui ir com calma!"
1011103-186 = "Isso também é graças ao meu sensei."
1011103-191 = "Obrigado por se juntar a mim hoje."
