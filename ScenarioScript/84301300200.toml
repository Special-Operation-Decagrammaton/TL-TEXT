[translation]
84301300200-5 = "Como eu suspeitava, você acabou envolvido... De qualquer forma, fico feliz que esteja bem."
84301300200-6 = "(Como eu suspeitava, é isso mesmo.)"
84301300200-7 = "Isso é algo comum no Millennium?"
84301300200-8 = "É tão frequente que nem conseguimos acompanhar tudo. #nAlém disso, se fôssemos lidar com tudo, todos já teriam desmaiado de exaustão."
84301300200-9 = "É disso que se trata não saber quando ou onde algo vai acontecer."
84301300200-10 = "Por isso, se algo acontecer, não hesite em me avisar."
84301300200-11 = "Pode deixar, farei isso."
84301300200-12 = "Na verdade, estou até esperando que uma situação dessas aconteça de novo."
84301300200-13 = "Por que...?"
84301300200-15 = "Porque é divertido, não é? Eu também acho!"
84301300200-16 = "Senpai... nós somos as responsáveis pela segurança, lembra?..."
84301300200-17 = "Conto com vocês. Bem... é verdade que eu também estava me divertindo."
84301300200-18 = "Ouvi o nome 'Departamento de Engenharia' agora pouco. Disseram que foram eles que criaram aquele robô... #n— que tipo de clube é esse?"
84301300200-19 = "Que tipo de clube é?"
84301300200-23 = "O Departamento de Engenharia..."
84301300200-24 = "É um lugar onde criam um monte de coisas interessantes!"
84301300200-25 = "Asuna-senpai...!"
84301300200-27 = "Hum... então, teria problema se eu fosse até o Departamento de Engenharia?"
84301300200-28 = "Fiquei um pouco curioso."
84301300200-29 = "Isso não é uma piada... imagino."
84301300200-33 = "Ah... ele dá mais trabalho do que eu pensava."
84301300200-34 = "Não vou negar. Afinal, sou a pessoa que melhor conhece a si mesma."
84301300200-35 = "Bem, poderia me guiar até lá?"
84301300200-36 = "Certo! Vamos nessa!"
84301300200-37 = "Ah..."
84301300200-38 = "Não tem jeito. Atender aos desejos do cliente também é o papel da C&C."
84301300200-39 = "Se for o Departamento de Engenharia, o Seminar provavelmente já deve ter feito uma verificação minuciosa..."
84301300200-40 = "...Com certeza vai ficar tudo bem."
