[translation]
84301300200-5 = "やっぱり巻き込まれたか……とにかく、無事でよかった。"
84301300200-6 = "（やっぱり、か）"
84301300200-7 = "ミレニアムではよくあることなのだろうか？"
84301300200-8 = "日常茶飯事過ぎて、全ては把握できてない。#nそれに、全部対処してたら、今頃みんな過労で倒れてる。"
84301300200-9 = "いつどこで何があるか分からないというのは、こういうことだ。"
84301300200-10 = "だから、もし何かあれば遠慮せずに言って欲しい。"
84301300200-11 = "そうさせてもらおう。"
84301300200-12 = "むしろ、こういう状況が再び訪れることを期待しているよ。"
84301300200-13 = "何故……？"
84301300200-15 = "面白いからでしょ？私もそうだし！"
84301300200-16 = "先輩……私たちは警護する側なんだが……。"
84301300200-17 = "頼んだよ。まぁ……楽しんでいたのも事実だが。"
84301300200-18 = "先ほど「エンジニア部」という名を耳にしてね。なんでも、あのロボットを作ったのは#nその部活とのことだったが――"
84301300200-19 = "どのような部活なんだい？"
84301300200-23 = "エンジニア部……。"
84301300200-24 = "面白いものをいっぱい作ってるとこだよ！"
84301300200-25 = "アスナ先輩……！"
84301300200-27 = "ふむ……では、エンジニア部に行っても構わないだろうか。 "
84301300200-28 = "少し、興味が向いてね。"
84301300200-29 = "冗談ではない……のだろうな。"
84301300200-33 = "はぁ……思っていたよりも、世話が焼ける人だ。"
84301300200-34 = "否定はしないさ。自分のことは自分が一番よく分かっているからね。"
84301300200-35 = "さて、案内をお願いできるだろうか？"
84301300200-36 = "よーし！しゅっぱーつ！"
84301300200-37 = "はぁ……。"
84301300200-38 = "仕方ない。クライアントの望みに応えることもC&Cの役割。"
84301300200-39 = "エンジニア部なら、セミナーも入念にチェックしているだろうし……。"
84301300200-40 = "……きっと大丈夫。"
