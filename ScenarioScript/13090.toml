[translation]
13090-1 = "第9話;アビドス生徒会（２）"
13090-2 = "アビドス砂漠閉鎖地区セクター35-9"
13090-5 = "ユメ先輩、何も見つかりませんよ。"
13090-10 = "……こっちもハズレみたい、うぅ。"
13090-15 = "ごめんね、ホシノちゃん。#nもう、ここまでみたい……。"
13090-19 = "……良いから立ってください。"
13090-20 = "私のことは置いていって良いから……今までありがとね、ホシノちゃん。"
13090-24 = "ああ、もう！#nなんの真似ですか！"
13090-30 = "ふふっ。ごめんねホシノちゃん、冗談だから。#n次の駅には何かあるかもしれないし、行ってみよっか。"
13090-31 = "……はぁ。"
13090-32 = "どこも同じだと思いますよ。"
13090-33 = "高価な展示品があったとしても、とっくに前生徒会が売り払ってますから。"
13090-34 = "う～ん……。"
13090-35 = "もう帰りましょう。#n宝探しなんて、時間の無駄です。"
13090-36 = "えっ！？"
13090-37 = "ホシノちゃんも、最初はすっごいノリノリだったよね？"
13090-38 = "そ、それは……！"
13090-39 = "……って、先輩。#n手帳、落としましたよ。"
13090-40 = "あ、ありがとう！"
13090-45 = "良かった～。#n危うくホシノちゃんの大事な手帳を失くしちゃうところだったよ。"
13090-47 = "……いつから私の手帳になったんですか。"
13090-49 = "え、えーっと……。"
13090-53 = "見て見て、ホシノちゃん。リュックサック型の水筒だって！#n便利そうじゃない？"
13090-54 = "いえ。むしろ動く時、邪魔になります。#nしかも、高い割にクオリティも微妙そうですし……。"
13090-56 = "た、たしかに……。"
13090-60 = "ちょっと高すぎるかも。"
13090-61 = "そんな物を買うくらいなら、弾丸を補充しませんか？"
13090-62 = "……その通り、だね。"
13090-63 = "ひとつ気になったんですが……。"
13090-64 = "どうしたの？"
13090-65 = "先輩は、どうやって生徒会長になったんですか？#n一人しかいない生徒会なんて、聞いたことありませんよ。"
13090-66 = "……あはは。やっぱり、気になるよね。#n実は、ちゃんとした選挙が開催されたわけじゃないの。"
13090-67 = "そ、そうなんですか？"
13090-68 = "挙手投票で私を会長に選任したら、#n前の役員は全員いなくなっちゃったんだ。"
13090-69 = "そんなやり方で……！？"
13090-70 = "……あの時のアビドスは、もうまともな状態じゃなかったから。"
13090-71 = "ユメ先輩は、面倒事を押し付けられたんですね。"
13090-72 = "それは違うよ、ホシノちゃん。"
13090-76 = "私は望んで受け入れたの。"
13090-78 = "……どうしてですか？"
13090-79 = "生徒会長としての権限があれば、#nアビドスを守れるかもしれないと思ったからだよ。"
13090-83 = "いざ会長になってみたら、そんなことはなかったんだけどね。"
13090-84 = "でも……これがあれば大丈夫！"
13090-85 = "……これって？"
13090-89 = "じゃーん！生徒会長手帳だよ！"
13090-94 = "これでも毎日ちゃんと書いてるんだから！"
13090-95 = "どこにでも売ってる学習帳じゃないですか……。"
13090-96 = "が、学習帳じゃなくて、生徒会長手帳！#nほとんど私の日記みたいなものだけど……。"
13090-100 = "いつか、ホシノちゃんに受け継いでもらうんだ！"
13090-102 = "そんな未来は訪れませんよ。"
13090-103 = "ど、どうして！？ "
13090-104 = "って、そうだよね。#nホシノちゃんは生徒会でもないし……。"
13090-105 = "もう何回も断られてるのに、#nいつも一緒にいてくれるから勘違いしちゃってた……。"
13090-107 = "い、いや……そうじゃなくて！！"
13090-111 = "……あまりにもダサいのが、ちょっと。"
13090-112 = "え、そう？#n可愛いと思うけど……。"
13090-113 = "どこがですか！？"
13090-114 = "あ、そっか。#nホシノちゃんはお魚さんが好きだもんね。"
13090-115 = "な、何のことですか？"
13090-116 = "この前、可愛いクジラさんのノートをずっと見てたでしょ？#nホシノちゃんの目、すっごくキラキラしてたよ。"
13090-117 = "気のせいです！#nあと、クジラは魚じゃありません！"
13090-118 = "ふふっ、やっぱり好きなんだね。"
13090-123 = "もう知りません、先輩！"
13090-133 = "先輩？"
13090-134 = "……。"
13090-138 = "ユメ先輩！"
13090-142 = "……あ、ごめんね。"
13090-143 = "何してるんですか？#n早く見つけて帰りますよ。"
13090-144 = "……見て、ホシノちゃん。"
13090-145 = "アビドスの夜は、星がきれいだね。"
13090-146 = "周りに何もないですから。"
13090-147 = "それだけが理由なのかな……？"
13090-148 = "というか、星なんかより足元を見てください！#nそんなんだから、いつまでも落とし物が見つからないんですよ！"
13090-149 = "この近くにあるはずなんですよね？#nああ、もう。どうしてこんな面倒くさいお願いを……。"
13090-151 = "だって……困っている人は見過ごせないから。"
13090-156 = "あれ……？ "
13090-157 = "急に風が……。"
13090-162 = "ほ、ホシノちゃん、早く帰ろう！砂嵐だよ！"
13090-163 = "もう道が……あれ、コンパスどこに入れたかな……。"
13090-167 = "……ひぃん、また忘れちゃったみたい。"
13090-169 = "あれほど忘れないよう言ったのに……！#n砂嵐が来たら遭難することくらい、分かってるじゃないですか！"
13090-170 = "うぅ、ごめんね……。"
13090-171 = "はぁ、もう……念のため持ってきておいて正解でした。"
13090-172 = "わあっ、さすがホシノちゃん！#n持つべきものは頼れる後輩だね！"
13090-173 = "余計なこと言ってないで、早く行きますよ！"
13090-185 = "先生もホシノ先輩も、連絡がつかないわね。#nいつまで待たせるのよ。"
13090-189 = "セリカちゃん、そこの工具を取ってくれる？"
13090-195 = "ノノミ先輩とシロコ先輩も、どっか行っちゃったし。"
13090-200 = "セリカちゃん、ハンマーもお願い。"
13090-204 = "生徒会長とホシノ先輩の間には、何があったんだろ……。"
13090-205 = "……それは、先輩にしか分からないよ。"
13090-206 = "はぁ……でも、話してくれそうにないし。"
13090-212 = "そうだね……。"
13090-217 = "……よし、できた。"
13090-218 = "腰、大丈夫？"
13090-219 = "うん、大丈夫。#nそれに、こういう時は手を動かしてるほうが、気持ちが楽になるから。"
13090-220 = "なら良いんだけど……。"
13090-224 = "……ねえ、セリカちゃん。"
13090-230 = "私たちだけで、生徒会室に行ってみよう。"
13090-231 = "……生徒会室って、あの鍵がかかってる部屋よね？"
13090-233 = "きっと、あそこには生徒会長の秘密が隠されてるはず。"
13090-234 = "そうかもしれないけど……大丈夫かな、勝手に入っても。"
13090-235 = "セリカちゃんが心配してるように、怒られるかもしれないね。"
13090-236 = "……でも、これ以上ホシノ先輩を待っている余裕はないから。"
13090-237 = "確認、しよう。"
13090-241 = "ま、待ってよ！アヤネちゃん！"
13090-248 = "……ふぅ。"
13090-252 = "あれ……？"
13090-253 = "なんで雨雲号が出てるんだろ。"
13090-254 = "……アヤネちゃん、怒ってるかなぁ。"
13090-260 = "ホシノちゃん、ここが新しい校舎だよ！"
13090-265 = "新しいって……ただの別館じゃないですか。"
13090-268 = "それはそうだけど……。"
13090-269 = "……もう、私たちだけになっちゃったね。"
13090-270 = "いなくなった人たちのことは忘れましょう。#n期待するだけ無駄だったんです。"
13090-271 = "そういう言い方は良くないと思うの。#nだって、悪いのは砂漠化でしょ？"
13090-272 = "……。 "
13090-273 = "自分の自治区を離れるのは、誰しもつらいんだよ。"
13090-274 = "……でも、結局みんなアビドスを捨てたじゃないですか！"
13090-275 = "みんなじゃないよ、ホシノちゃんがいる。"
13090-276 = "……。 "
13090-277 = "それに……私も、ね？"
13090-278 = "……先輩。"
13090-279 = "これからは、二人で頑張っていこう。"
13090-280 = "私がホシノちゃんを守るから、ホシノちゃんは私を守ってね？"
13090-281 = "……先輩は自分のことだけ考えてください。#n弱いんですから。"
13090-282 = "そ、"
13090-283 = "そんな言い方しなくてもぉ……。"
13090-284 = "というか、ホシノちゃんが特別強いだけじゃない？"
13090-285 = "……いえ。#nもっと、強くならないと。"
13090-290 = "そのためにも……まずは先輩、これを受け取ってください。"
13090-292 = "うん……？"
13090-297 = "生徒会に入ってくれるの！？"
13090-298 = "やっ……って、どうして……？"
13090-299 = "生徒会かどうかに拘ってる意味がないと思ったので。"
13090-300 = "……どうせ、先輩とはこれからもずっと一緒でしょうし。"
13090-301 = "……あ、でもあのダサい手帳は受け取りませんから。"
13090-308 = "やったぁ！ありがとう、ホシノちゃん！"
13090-309 = "夢……？ううん、奇跡だよ！"
13090-310 = "……先輩、苦しいです。#n夢じゃないので、そんなに抱きしめられたら死んじゃいますよ。"
13090-311 = "そうだ、記念に写真撮ろうよ！"
13090-312 = "別に、わざわざ撮らなくても……。"
13090-313 = "お祝いの時は、"
13090-318 = "記念に写真を撮るものだから！"
13090-323 = "ほら、ホシノちゃん。ちゃんとカメラ見て？"
13090-324 = "ち、近いです先輩。#n……あ、当たってるんですが。"
13090-325 = "恥ずかしがってないで、もっと近くおいで？"
13090-326 = "いやいや、苦しいですって。"
13090-327 = "ふふっ。それじゃ、はいチーズ！"
13090-338 = "ここが新しい生徒会室だよ！"
13090-342 = "……狭いですね。"
13090-343 = "うっ……。"
13090-344 = "でも、今日からここでアビドス生徒会は生まれ変わるの！#n今は二人しかいないけど、いつかは……。"
13090-345 = "……いつかは？"
13090-349 = "えへへ。"
13090-350 = "いつかは後輩も入ってきて、きっと賑やかになると思うの！"
13090-387 = "失礼、します……。"
13090-388 = "ま、待ってよアヤネちゃん。"
13090-396 = "あれ……。 "
13090-397 = "思ったよりきれいね？"
13090-398 = "……うん。#n誰かが掃除してたんだと思う。"
13090-399 = "もしかして、ホシノ先輩が？"
13090-410 = "ん……。"
13090-416 = "シロコ先輩！？ "
13090-424 = "あれ……？"
13090-426 = "の、ノノミ先輩！？"
13090-427 = "……もしかして、先輩がここの掃除をしてたの？"
13090-429 = "そうですが……皆さんは何を？"
13090-432 = "先輩たちも、気になってたんですね。"
13090-433 = "うん……生徒会長に何があったのか、知りたくて。"
13090-434 = "……。"
13090-436 = "あはは……みんな、同じことを考えていたとは。"
13090-437 = "私は、掃除をしておこうと思って……。"
13090-438 = "……。"
13090-439 = "と言っても、自己満足ですけどね。"
13090-445 = "何かあるよ。"
13090-446 = "キャビネット……？ "
13090-448 = "あっ、それは……。"
13090-453 = "……生徒会長とホシノ先輩の個人ロッカーみたい。"
13090-455 = "生徒会長のキャビネットは、扉が開いてますね。"
13090-456 = "……何も入っていないようです。"
13090-458 = "ホシノ先輩のほうも開けてみる。"
13090-464 = "シロコ先輩！？#nどうしてピッキングツールなんて持ち歩いてるのよ！"
13090-465 = "……ん、ちょっとした趣味。"
13090-470 = "あれ、鍵はかかっていないみたいですよ。"
13090-475 = "ん……。"
13090-476 = "良かった……ホシノ先輩に怒られるところだった。"
13090-478 = "勝手に入ってる時点で、怒られるような気もしますが……。"
13090-479 = "何か入ってましたか？"
13090-484 = "……装備品。"
13090-485 = "防弾チョッキにサイドアーム……。"
13090-486 = "ホシノ先輩の物だと思う。#n使い込まれてるけど、手入れがされてる。"
13090-487 = "こんなにすごそうな装備……。"
13090-488 = "当時のホシノ先輩、何してたんだろ……。"
13090-498 = "ほ、ホシノ先輩！？"
13090-500 = "うわあっ！"
13090-501 = "ほ、ホシノ先輩、これは……。"
13090-502 = "……ん。"
13090-508 = "勝手に開けちゃダメでしょ～！"
13090-514 = "次回;あの日"
