[translation]
13090-1 = "Episódio 9; Grêmio Estudantil de Abydos (2)"
13090-2 = "Deserto de Abydos, Área Fechada, Setor 35-9"
13090-5 = "Yume-senpai, não encontramos nada."
13090-10 = "……Parece que aqui também não tem nada, ugh."
13090-15 = "Desculpe, Hoshino-chan. #nParece que chegamos ao nosso limite……."
13090-19 = "……Tudo bem, por favor, levante-se."
13090-20 = "Pode me deixar para trás…… Obrigada por tudo até agora, Hoshino-chan."
13090-24 = "Ah, chega! #nO que você está fazendo?!"
13090-30 = "Fufu. Desculpe, Hoshino-chan, é brincadeira. #nTalvez tenha algo na próxima estação, vamos dar uma olhada?"
13090-31 = "……Haa."
13090-32 = "Acho que em todo lugar é a mesma coisa."
13090-33 = "Mesmo que houvesse itens de exibição caros, o antigo Grêmio já teria vendido tudo há muito tempo."
13090-34 = "Hmm……."
13090-35 = "Vamos voltar. #nCaça ao tesouro é perda de tempo."
13090-36 = "Hã!?"
13090-37 = "Hoshino-chan, você estava super animada no começo, não estava?"
13090-38 = "Is-isso é……!"
13090-39 = "……Digo, Senpai. #nVocê deixou seu caderno cair."
13090-40 = "Ah, obrigada!"
13090-45 = "Que bom~. #nPor pouco você não perdia o caderno importante da Hoshino-chan."
13090-47 = "……Desde quando ele virou meu caderno?"
13090-49 = "Eh, é-é……."
13090-53 = "Olha só, Hoshino-chan. É um cantil em formato de mochila! #nNão parece útil?"
13090-54 = "Não. Na verdade, atrapalha na hora de se mover. #nAlém disso, parece ter uma qualidade duvidosa para um preço tão alto……."
13090-56 = "Is-isso é verdade……."
13090-60 = "Talvez seja caro demais."
13090-61 = "Em vez de comprar algo assim, por que não reabastecemos as munições?"
13090-62 = "……Você tem razão."
13090-63 = "Uma coisa que me deixou curiosa……."
13090-64 = "O que foi?"
13090-65 = "Como você se tornou presidente do Grêmio, Senpai? #nNunca ouvi falar de um Grêmio com apenas uma pessoa."
13090-66 = "……Ahaha. Eu sabia que você ia perguntar. #nNa verdade, não houve uma eleição de verdade."
13090-67 = "Sé-sério?"
13090-68 = "Quando me elegeram presidente por votação de braço levantado, #ntodos os outros membros foram embora."
13090-69 = "Desse jeito……!?"
13090-70 = "……A Abydos daquela época já não estava em condições normais."
13090-71 = "Então te empurraram os problemas, Yume-senpai."
13090-72 = "Não é bem assim, Hoshino-chan."
13090-76 = "Eu aceitei porque eu quis."
13090-78 = "……Por quê?"
13090-79 = "Porque pensei que, com a autoridade de presidente do Grêmio, #neu poderia proteger Abydos."
13090-83 = "Mas quando virei presidente, percebi que não era bem assim."
13090-84 = "Mas…… com isso aqui, vai dar tudo certo!"
13090-85 = "……Com isso?"
13090-89 = "Tcharam! É o caderno da presidente do Grêmio!"
13090-94 = "Eu escrevo nele todos os dias, viu!"
13090-95 = "Isso não é um caderno escolar que vende em qualquer lugar……?"
13090-96 = "Não é um caderno escolar, é o caderno da presidente do Grêmio! #nEmbora seja quase um diário meu……."
13090-100 = "Um dia, vou passar ele para você, Hoshino-chan!"
13090-102 = "Esse futuro nunca vai acontecer."
13090-103 = "P-por que!?"
13090-104 = "Quer dizer, é verdade. #nA Hoshino-chan nem é do conselho estudantil..."
13090-105 = "Mesmo tendo sido recusada tantas vezes, #nvocê sempre fica comigo, então acabei me confundindo..."
13090-107 = "N-não... não é isso!!"
13090-111 = "...É que é cafona demais, sabe."
13090-112 = "Sério? #nEu acho fofo..."
13090-113 = "Onde que é fofo!?"
13090-114 = "Ah, entendi. #nA Hoshino-chan gosta de peixinhos, né."
13090-115 = "D-do que você está falando?"
13090-116 = "Da outra vez, você ficou olhando para aquele caderno de baleia fofo o tempo todo, não ficou? #nOs olhos da Hoshino-chan estavam brilhando tanto."
13090-117 = "É impressão sua! #nE além disso, baleia não é peixe!"
13090-118 = "Fufu, você gosta mesmo, né."
13090-123 = "Já chega, não quero mais saber, senpai!"
13090-133 = "Senpai?"
13090-134 = "..."
13090-138 = "Yume-senpai!"
13090-142 = "...Ah, desculpa."
13090-143 = "O que você está fazendo? #nVamos logo encontrar isso e voltar."
13090-144 = "...Olha só, Hoshino-chan."
13090-145 = "As estrelas são lindas na noite de Abydos, né."
13090-146 = "É porque não tem nada em volta."
13090-147 = "Será que é só por isso...?"
13090-148 = "Quer saber, olha para o chão em vez de olhar para as estrelas! #nÉ por isso que a gente nunca encontra o que perdeu!"
13090-149 = "Deveria estar por aqui, não deveria? #nAi, meu Deus. Por que eu aceitei esse pedido tão problemático..."
13090-151 = "Porque... eu não consigo ignorar alguém que está em apuros."
13090-156 = "Ué...?"
13090-157 = "O vento mudou de repente..."
13090-162 = "H-Hoshino-chan, vamos voltar logo! É uma tempestade de areia!"
13090-163 = "O caminho já... ué, onde eu coloquei a bússola..."
13090-167 = "...Ai, parece que esqueci de novo."
13090-169 = "Eu avisei tantas vezes para não esquecer...! #nVocê sabe muito bem que podemos nos perder se uma tempestade de areia chegar!"
13090-170 = "Uu, desculpa..."
13090-171 = "Ai, meu Deus... ainda bem que eu trouxe por precaução."
13090-172 = "Uau, como esperado da Hoshino-chan! #nTer uma kouhai confiável é tudo de bom!"
13090-173 = "Para de falar besteira e vamos logo!"
13090-185 = "O Sensei e a Hoshino-senpai não atendem. #nAté quando vamos ter que esperar?"
13090-189 = "Serika-chan, pode pegar aquela ferramenta ali para mim?"
13090-195 = "A Nonomi-senpai e a Shiroko-senpai também sumiram."
13090-200 = "Serika-chan, o martelo também, por favor."
13090-204 = "O que será que aconteceu entre a presidente do conselho estudantil e a Hoshino-senpai..."
13090-205 = "...Só a senpai sabe disso."
13090-206 = "Ah... mas não parece que ela vai contar."
13090-212 = "É verdade..."
13090-217 = "...Pronto, terminei."
13090-218 = "Sua lombar está bem?"
13090-219 = "Sim, estou bem. #nAlém disso, manter as mãos ocupadas me ajuda a me sentir melhor nessas horas."
13090-220 = "Se você diz..."
13090-224 = "...Ei, Serika-chan."
13090-230 = "Vamos até a sala do conselho estudantil nós mesmas."
13090-231 = "...A sala do conselho estudantil? Aquela que está trancada, né?"
13090-233 = "Com certeza, o segredo da presidente do conselho estudantil deve estar escondido ali."
13090-234 = "Pode ser, mas... será que não tem problema entrarmos sem permissão?"
13090-235 = "Como a Serika-chan está preocupada, talvez a gente leve uma bronca."
13090-236 = "...Mas não temos mais tempo para esperar pela Hoshino-senpai."
13090-237 = "Vamos verificar."
13090-241 = "E-espera aí! Ayane-chan!"
13090-248 = "...Ufa."
13090-252 = "Ué...?"
13090-253 = "Por que o Amagumo-gou está aqui fora?"
13090-254 = "...Será que a Ayane-chan está brava?"
13090-260 = "Hoshino-chan, este é o nosso novo prédio escolar!"
13090-265 = "Novo... isso não passa de um anexo, não é?"
13090-268 = "Bem, é verdade, mas..."
13090-269 = "...No fim, só restamos nós duas."
13090-270 = "Vamos esquecer as pessoas que foram embora. #nNão valia a pena ter expectativas."
13090-271 = "Acho que não deveria falar assim. #nAfinal, a culpa é da desertificação, não é?"
13090-272 = "..."
13090-273 = "É difícil para qualquer um deixar seu próprio distrito autônomo."
13090-274 = "...Mas, no final, todos abandonaram Abydos!"
13090-275 = "Nem todos, a Hoshino-chan está aqui."
13090-276 = "..."
13090-277 = "E além disso... eu também, não é?"
13090-278 = "...Senpai."
13090-279 = "De agora em diante, vamos nos esforçar juntas."
13090-280 = "Eu vou proteger a Hoshino-chan, então a Hoshino-chan me protege, tá bom?"
13090-281 = "...Senpai, por favor, pense em si mesma. #nVocê é fraca."
13090-282 = "Po-,"
13090-283 = "Não precisa falar desse jeito..."
13090-284 = "Na verdade, não é só a Hoshino-chan que é especialmente forte?"
13090-285 = "...Não. #nEu preciso ficar mais forte."
13090-290 = "Para isso... primeiro, Senpai, aceite isto."
13090-292 = "Hm...?"
13090-297 = "Você vai entrar para o conselho estudantil!?"
13090-298 = "E-espera... por que..."
13090-299 = "Porque percebi que não faz sentido ficar insistindo se é ou não do conselho estudantil."
13090-300 = "...De qualquer forma, vamos continuar juntas daqui para frente, não vamos?"
13090-301 = "...Ah, mas não vou aceitar aquele caderno cafona, viu."
13090-308 = "Eba! Obrigada, Hoshino-chan!"
13090-309 = "É um sonho...? Não, é um milagre!"
13090-310 = "...Senpai, está me apertando. #nNão é um sonho, então se me abraçar tão forte assim, eu vou acabar morrendo."
13090-311 = "Ah, vamos tirar uma foto para comemorar!"
13090-312 = "Não precisa se dar ao trabalho de tirar uma foto..."
13090-313 = "Em celebrações,"
13090-318 = "a gente tira fotos para registrar o momento!"
13090-323 = "Vamos lá, Hoshino-chan. Olhe para a câmera, certo?"
13090-324 = "E-está muito perto, Senpai. #n...Ah, está encostando."
13090-325 = "Não seja tímida, chegue mais perto!"
13090-326 = "Não, não, eu disse que está me apertando."
13090-327 = "Fufu. Então, digam 'xis'!"
13090-338 = "Esta é a nova sala do conselho estudantil!"
13090-342 = "……É bem apertado aqui."
13090-343 = "Ugh……."
13090-344 = "Mas, a partir de hoje, o Conselho Estudantil de Abydos vai renascer aqui!#nEmbora sejamos apenas duas agora, algum dia……."
13090-345 = "……Algum dia?"
13090-349 = "Hehehe."
13090-350 = "Algum dia, calouras vão entrar e tenho certeza de que vai ficar bem movimentado!"
13090-387 = "Com licença……."
13090-388 = "E-espera aí, Ayane-chan."
13090-396 = "Ué……."
13090-397 = "Está mais limpo do que eu pensava, não está?"
13090-398 = "……Sim.#nAcho que alguém limpou aqui."
13090-399 = "Será que foi a Hoshino-senpai?"
13090-410 = "Hmm……."
13090-416 = "Shiroko-senpai!?"
13090-424 = "Ué……?"
13090-426 = "No-Nonomi-senpai!?"
13090-427 = "……Por acaso, foi você quem limpou tudo aqui?"
13090-429 = "Sim, fui eu…… mas o que vocês estão fazendo aqui?"
13090-432 = "Vocês também estavam curiosas, não estavam?"
13090-433 = "Sim…… eu queria saber o que aconteceu com a presidente do conselho estudantil."
13090-434 = "……."
13090-436 = "Ahaha…… pensar que todas nós estávamos pensando a mesma coisa."
13090-437 = "Eu só pensei em dar uma limpada……."
13090-438 = "……."
13090-439 = "Embora, no fim das contas, seja apenas uma satisfação pessoal."
13090-445 = "Tem alguma coisa ali."
13090-446 = "Um armário……?"
13090-448 = "Ah, isso é……."
13090-453 = "……Parecem ser os armários pessoais da presidente e da Hoshino-senpai."
13090-455 = "O armário da presidente está com a porta aberta."
13090-456 = "……Parece que não tem nada dentro."
13090-458 = "Vou tentar abrir o da Hoshino-senpai também."
13090-464 = "Shiroko-senpai!?#nPor que você anda por aí com ferramentas de gazua!"
13090-465 = "……Hmm, é só um hobby."
13090-470 = "Ué, parece que não está trancado."
13090-475 = "Hmm……."
13090-476 = "Que bom…… achei que a Hoshino-senpai ia ficar brava com a gente."
13090-478 = "Acho que ela ficaria brava só pelo fato de termos entrado sem permissão……."
13090-479 = "Tinha alguma coisa dentro?"
13090-484 = "……Equipamentos."
13090-485 = "Um colete à prova de balas e uma arma lateral……."
13090-486 = "Acho que são da Hoshino-senpai.#nEstão bem gastos, mas dá para ver que foram bem cuidados."
13090-487 = "Um equipamento tão impressionante assim……."
13090-488 = "O que será que a Hoshino-senpai fazia naquela época……."
13090-498 = "Ho-Hoshino-senpai!?"
13090-500 = "Uwaa!"
13090-501 = "Ho-Hoshino-senpai, isso é……."
13090-502 = "……Hmm."
13090-508 = "Vocês não podem sair abrindo as coisas sem permissão~!"
13090-514 = "Próximo episódio: Aquele dia"
