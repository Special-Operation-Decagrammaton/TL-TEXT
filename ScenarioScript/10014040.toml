[translation]
10014040-1 = "Episódio 4: Clube de Doces Depois da Aula?"
10014040-2 = "（……Dia seguinte）"
10014040-3 = "Ah, Sensei... Você veio."
10014040-4 = "……Então, o que houve?"
10014040-5 = "Não me diga que aconteceu alguma coisa de novo, né?"
10014040-6 = "Ah, não. #nNão estou brava nem nada, só fiquei curiosa mesmo……"
10014040-7 = "……Eh?"
10014040-8 = "Que eu deveria continuar com a \"consulta\" para resolver isso……?"
10014040-9 = "……Consulta? #nFaz sentido, mas……"
10014040-10 = "Não a Uzawa…… mas eu? #nO alvo da consulta sou eu? Por quê……?"
10014040-14 = "Hmm. Bem, se o Sensei adulto diz isso, deve ser verdade. #nAcho que não é bom ficar perguntando o motivo toda hora."
10014040-15 = "Então, vamos sentar primeiro……"
10014040-16 = "Ei, ei~ #nEi, gracinha ali~"
10014040-17 = "Parece entediada, hein~ #nQue tal se divertir um pouco com a gente?"
10014040-18 = "……?"
10014040-19 = "[ns] \"Essa voz é……\""
10014040-24 = "……?"
10014040-25 = "……？？？"
10014040-26 = "Hahaha! #nVocê está assustada, hein. Que cara engraçada você está fazendo."
10014040-27 = "C-claro que sim! #nN-nós somos assustadoras, sabe! Somos delinquentes, afinal!"
10014040-28 = "Ei…… é assim que se faz? #nTem certeza que está tudo bem?"
10014040-33 = "……O quê?"
10014040-34 = "[s3] \"……？？？\"\n[s4] （Cosplay de delinquente……？）"
10014040-35 = "Ei, vocês…… o que estão fazendo aqui? #n……E que visual é esse?"
10014040-36 = "Ei, vocês…… o que estão fazendo aqui? #n……E que visual é esse?"
10014040-37 = "K-Kazusa-chan! #nNão importa quem você seja, Kazusa-chan, nós estaremos sempre com você!"
10014040-38 = "Agradeço por isso, mas…… #nEstou perguntando o que vocês estão fazendo agora……"
10014040-39 = "Sério, não estou entendendo nada. #nO que é isso? Até o jeito de falar da Natsu está estranho……"
10014040-40 = "Fufufu…… não há necessidade de recusar, Kazusa."
10014040-41 = "A vida daqui para frente, um mundo diferente do que conhecia…… por que não vamos juntos?"
10014040-42 = "A vida daqui para frente……? Um mundo diferente do que conhecia……?"
10014040-46 = "……Não, espera um pouco. #nIsso não é simplesmente falta de entendimento?"
10014040-47 = "[s5] \"Bem, pode me explicar?\"\n[s6] \"O cosplay falhou, hein……\""
10014040-48 = "A partir de hoje, decidimos mudar nosso clube de \"Clube de Doces Depois da Aula\" para #n\"Gangue de Doces Depois da Aula\"."
10014040-49 = "A partir de hoje, decidimos mudar nosso clube de \"Clube de Doces Depois da Aula\" para #n\"Gangue de Doces Depois da Aula\"."
10014040-50 = "Kazusa-chan! #nNós queremos que você consiga ficar com a gente sem se esforçar demais."
10014040-52 = "Não, só mudou de \"Clube\" para \"Gangue\". #nPor que fazer isso de repente……"
10014040-53 = "O que exatamente……"
10014040-54 = "Ei, espera. Isso não é falta de entendimento, afinal?"
10014040-55 = "Primeiro, precisamos explicar nossas intenções direito……"
10014040-56 = "EU SABIA!! Eu imaginei que fosse isso!!!"
10014040-59 = "[ns] \"……Ah.\""
10014040-61 = "……？？"
10014040-62 = "Ué, essa voz é……"
10014040-63 = "……Eu conheço essa voz."
10014040-65 = "……Então era isso. #nEu sabia que era esse o caso……!"
10014040-66 = "Pensei que talvez você tivesse se arrependido de verdade, mas…… eu sabia! #nNão era nada disso!!"
10014040-67 = "Sua natureza maligna não é algo que mudaria tão facilmente, afinal!"
10014040-68 = "\"Gangue de Doces Depois da Aula\"…… que nome aterrorizante!!"
10014040-69 = "Como se estivessem comendo doces macios…… #nserá que significa que vocês vão devorar tudo ao redor, que horror!?"
10014040-70 = "Além disso, sequestrar o Sensei de novo...!#nE ainda tentar tomar o controle do poder público!!"
10014040-71 = "Como eu pensei, você estava esperando por uma chance de retornar..."
10014040-72 = "Sim, você criou uma nova organização para o seu renascimento, Kyoyama Kazusa!"
10014040-73 = "Não..."
10014040-74 = "“Cath Palug”!!"
10014040-78 = "Do que você está falando...?#nCath... o quê?"
10014040-79 = "Cath Palug não é aquela delinquente lendária?#nElas são delinquentes?"
10014040-80 = "...Cath... o quê?"
10014040-81 = "Sequestro...!?"
10014040-85 = "...A Kazusa!?#nSequestrou o Sensei!?"
10014040-86 = "Ka, Kazusa-chan...?#nÉ verdade!?"
10014040-87 = "Não, do que você está falando!?"
10014040-88 = "[s9] \"Kazusa... era isso que estava acontecendo!?\"\n[s10] \"Mal-entendidos crescem num piscar de olhos.\""
10014040-89 = "Tá louca!? Foi você quem chamou ela, não foi!!"
10014040-90 = "Sensei, por que você está explicando isso naturalmente!!"
10014040-91 = "Não é hora de brincar!#nTemos que corrigir isso antes que boatos estranhos se espalhem..."
10014040-92 = "Você acabou de ameaçar o Sensei, não foi?"
10014040-94 = "Ter essa atitude com um adulto... você é realmente impiedosa, Kyoyama Kazusa!!"
10014040-95 = "...Droga.#nJá é tarde demais, né."
10014040-96 = "Do que essa pessoa está falando desde agora..."
10014040-97 = "Ei, Kazusa. Dá um jeito nela.#nEla não é sua amiga?"
10014040-98 = "...Não, ela não é minha amiga!?"
10014040-103 = "...Eu não posso perdoar isso.#nPela paz desta terra! Pela cidade onde todos podem ir à escola com tranquilidade!!"
10014040-104 = "Prepare-se, Kyoyama Kazusa.#nE vocês, \"Clube de Doces Depois da Escola\"!!"
10014040-105 = "Desta vez, vou derrotar vocês e realizar a justiça!!"
10014040-106 = "Aceitem o meu desafio!!"
10014040-107 = "Não, é que, espera um pouco..."
10014040-112 = "Fufufu...#nEu aceito esse desafio."
10014040-113 = "I, isso mesmo!#nNão entendi muito bem, mas não vou perdoar que continuem implicando com a Kazusa-chan!!"
10014040-114 = "Não sei quem você é, mas... nós não vamos ficar paradas assistindo!!"
10014040-116 = "...O quê?"
10014040-117 = "O duelo está selado... muito bem.#nPreparem-se!!"
10014040-118 = "Vamos mostrar a união do nosso \"Clube de Doces Depois da Escola\"!!"
10014040-119 = "Ataquemmm!!!"
10014040-120 = "Wa, waa!!!"
10014040-121 = "Toryaaaaaa!!!"
10014040-137 = "Sensei...#nO que eu devo fazer..."
10014040-138 = "[s13] \"Vamos lá!! \"Clube de Doces Depois da Escola\"!!\"\n[s14] \"Vamos dominar a área, como quem come um doce macio!!\""
10014040-139 = "..."
10014040-140 = "..."
10014040-141 = "...Eu."
10014040-143 = "Ah, eu era a única que achava que tinha mudado.#nNo fim das contas, será que os pecados do passado estão me perseguindo..."
