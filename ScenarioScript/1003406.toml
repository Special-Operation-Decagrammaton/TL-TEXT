[translation]
1003406-1 = "ひと針ひと針に、心を込めて"
1003406-2 = "百鬼夜行・狐火百貨店"
1003406-6 = "あ、先生、見てください。新しい掃除機が出たみたいです。"
1003406-7 = "わっ、30分の充電で5時間も使えるだなんて……！"
1003406-8 = "それにコードレスみたいです！"
1003406-9 = "[s] \"へえ、すごいね。\""
1003406-11 = "あっ、先生。このワンピース、すごく素敵じゃありませんか？"
1003406-12 = "「特別なお手入れをしなくても、洗濯機でそのまま洗えるのがポイント！」だそうです！"
1003406-13 = "最近の新素材はすごいですね。"
1003406-14 = "[s] \"確かに、近頃はそういうのがあるんだね。\""
1003406-15 = "あらっ、あれは……。"
1003406-16 = "一人につき抽選券10枚でくじが回せる、ですって……！"
1003406-17 = "あ、それに3等の商品は先ほどのコードレス掃除機ですよ！"
1003406-18 = "先生！これはチャンスではないでしょうか！"
1003406-19 = "早く列に並びませんと……！"
1003406-20 = "[s1] \"ミモリ、その……感動してるところ申し訳ないんだけど、\"\n[s2] \"今日は何を買いに来たんだっけ？\""
1003406-21 = "あ……。"
1003406-22 = "あ……。"
1003406-23 = "すみません、そうでした……つい興奮してしまって……。"
1003406-24 = "えっと、今日はハンカチを買いに来たんでした。"
1003406-25 = "[s] \"ハンカチ？\""
1003406-26 = "はい、なので雑貨コーナーに行きませんか？"
1003406-27 = "…………あ、抽選券……。"
1003406-28 = "[s] \"抽選は帰りにやろっか？\""
1003406-29 = "あっ……ふふっ、はい！"
1003406-31 = "ハンカチにも色々種類があるんですね。"
1003406-32 = "えっと、価格も気になりますが、安ければ良いというものではありませんし……。"
1003406-33 = "素材のことも気になりますし……。"
1003406-35 = "うう、難しいですね……。"
1003406-36 = "[s] \"私が代わりに選ぼうか？\""
1003406-37 = "先生が……？"
1003406-38 = "あ、えっと……大丈夫です、お気遣いいただきありがとうございます。ただこれは、私が選ばないと意味がありませんから。"
1003406-39 = "[s] \"確かに、その人の好みじゃないのを選んでも困るもんね。\""
1003406-40 = "えっと、その、何と言いますか……。"
1003406-41 = "[s] \"ん？\""
1003406-42 = "い、いえ、何でもありません！"
1003406-43 = "そ、それよりハンカチ、どれにしましょう……。"
1003406-48 = "うーん……うーん……あ、これ……っ！"
1003406-51 = "あの、店員さん。こちらを包んでいただけませんか？"
1003406-52 = "えっと……"
1003406-53 = "プ、プレゼント用で！"
1003406-55 = "ふう……すみません、結構時間がかかってしまいました。"
1003406-56 = "[s3] \"ううん、ミモリの気に入った物が買えてよかった。\"\n[s4] \"抽選の結果がティッシュだったのは残念だったけど。\""
1003406-57 = "ふふっ、はい。良いものを買えました。"
1003406-58 = "えっと、あとは……。"
1003406-59 = "ふふっ、はい。良いものを買えました。"
1003406-60 = "えっと、あとは……。"
1003406-61 = "[s5] \"そういえば、プレゼント用って言ってたね。\"\n[s6] \"相手の人も、気に入ってくれると良いね。\""
1003406-62 = "はい、仰る通りです。"
1003406-63 = "はい、仰る通りです。"
1003406-64 = "ですので私だけではなく、このハンカチは、先生にも気に入っていただけると嬉しいです。"
1003406-65 = "[s] \"……え？\""
1003406-66 = "ふふっ、今日こうして先生と一緒に来たかったのは、"
1003406-67 = "こうしてすぐ先生にプレゼントをお渡ししたかったからなんです。"
1003406-68 = "いつも私の修行に付き合ってくださる先生に、"
1003406-69 = "ささやかですが、お返しをしたくって。"
1003406-70 = "[s] \"気持ちだけでも嬉しかったのに、ありがとう。\""
1003406-71 = "いえ、私がどうしてもお渡ししたくって……！"
1003406-72 = "もしかして、ただの私のわがままでしたでしょうか……？"
1003406-73 = "[s7] \"そんなことない、すごく嬉しいよ。\"\n[s8] \"プレゼントを貰って嬉しくない人なんていないよ。\""
1003406-74 = "ふふっ、それは良かったです。"
1003406-75 = "ふふっ、それは良かったです。"
1003406-76 = "[s] \"じゃあ、ありがたく……。\""
1003406-77 = "あっ、あの！先生！"
1003406-78 = "その、せっかく先生と買えたものなので、"
1003406-79 = "もちろんそのままでも良いのですが、その……。"
1003406-80 = "ひとつ、お願いしたいことがありまして……。"
1003406-81 = "[s] \"お願い？\""
1003406-82 = "その、勝手なお願いなのですが、えっと……。"
1003406-83 = "修行部で最近、縫物の練習も頑張ったんです！"
1003406-84 = "それで、よろしければ……。"
1003406-85 = "花嫁修行の結果をお見せするためにも、"
1003406-86 = "そのハンカチ、ちょっとお借りしても良いでしょうか？"
1003406-87 = "[s] \"これを？\""
1003406-88 = "は、はい！決して変なことはいたしませんので……！"
1003406-89 = "実は練習をしてまして、刺繡をしてさしあげたいな……と。"
1003406-90 = "も、もちろん先生がよろしければのお話なのですが……！"
1003406-91 = "め、迷惑でしたらそのままでも……！"
1003406-92 = "[s] \"ううん、ぜひやってほしいな。\""
1003406-93 = "あ、ありがとうございます。それでは……。"
1003406-94 = "少しお時間をいただきますね、先生。"
1003406-97 = "お隣で見守っていただけますと嬉しいです。"
1003406-100 = "[wa:300]― ふふっ、[wa:1200]先生。"
1003406-102 = "― もう少し[wa:500]近くで[wa:1000]見ていただいても[wa:500]大丈夫ですよ。"
1003406-105 = "[wa:1000]― 私の花嫁修行……"
1003406-107 = "― それから、[wa:1300]大和撫子に[wa:800]なりたいという[wa:700]私の夢も。"
1003406-110 = "[wa:100]― 先生は[wa:600]いつもこういう風に、"
1003406-112 = "― 傍で応援して、[wa:1400]手伝って[wa:400]くださいました。"
1003406-115 = "[ns] \"先生だからね。それに、ミモリがすごく頑張ってたから。\""
1003406-116 = "[wa:900]― ありがとう[wa:500]ございます。"
1003406-118 = "― ……その、[wa:1200]私。[wa:1200]先生と、[wa:1500]これから先も[wa:900]ずっと……。"
1003406-121 = "[wa:100]― な、[wa:800]何でもありません……！"
1003406-124 = "[wa:500]― は、[wa:500]はい！[wa:1000]刺繍、[wa:700]完成しました！"
1003406-127 = "[wa:250]― 私なりに[wa:700]頑張ってみたのですが、"
1003406-129 = "― その、[wa:1400]いかがでしょうか……？"
1003406-132 = "では、あらためてそちらがプレゼントです。"
1003406-133 = "どうか、これからも末永く大事にしていただけますと嬉しいです。ふふっ。"
1003406-135 = "（その後、ミモリと少しの間お散歩をしながら、他愛のないお喋りをして楽しく過ごした）"
