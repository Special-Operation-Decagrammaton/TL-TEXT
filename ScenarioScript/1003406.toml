[translation]
1003406-1 = "Ponto a ponto, com todo o meu coração."
1003406-2 = "Hyakkiyako - Loja de Departamentos Kitsunebi"
1003406-6 = "Ah, Sensei, olhe só. Parece que lançaram um aspirador de pó novo."
1003406-7 = "Uau, ele funciona por 5 horas com apenas 30 minutos de carga...!"
1003406-8 = "E parece que é sem fio!"
1003406-9 = "[s] \"Puxa, que incrível.\""
1003406-11 = "Ah, Sensei. Este vestido, não é simplesmente maravilhoso?"
1003406-12 = "Dizem que o ponto principal é que não precisa de cuidados especiais e pode ser lavado direto na máquina!"
1003406-13 = "Os novos materiais de hoje em dia são impressionantes, não são?"
1003406-14 = "[s] \"Com certeza, ultimamente tem surgido cada coisa.\""
1003406-15 = "Ora, aquilo é..."
1003406-16 = "Diz que você pode girar a roleta com 10 bilhetes de sorteio por pessoa...!"
1003406-17 = "Ah, e o terceiro prêmio é aquele aspirador de pó sem fio de agora pouco!"
1003406-18 = "Sensei! Essa não é a nossa chance?"
1003406-19 = "Precisamos entrar na fila logo...!"
1003406-20 = "[s1] \"Mimori, eu... desculpe interromper sua empolgação, mas\"\n[s2] \"o que viemos comprar hoje mesmo?\""
1003406-21 = "Ah..."
1003406-22 = "Ah..."
1003406-23 = "Sinto muito, é verdade... acabei me empolgando demais..."
1003406-24 = "Bem, hoje viemos comprar um lenço."
1003406-25 = "[s] \"Um lenço?\""
1003406-26 = "Sim, então, podemos ir até a seção de variedades?"
1003406-27 = "............Ah, os bilhetes do sorteio..."
1003406-28 = "[s] \"Que tal fazermos o sorteio na volta?\""
1003406-29 = "Ah... fufu, sim!"
1003406-31 = "Existem tantos tipos de lenços, não é?"
1003406-32 = "Bem, o preço também é importante, mas não é só porque é barato que é bom..."
1003406-33 = "E o material também me preocupa..."
1003406-35 = "Uuu, que difícil..."
1003406-36 = "[s] \"Quer que eu escolha por você?\""
1003406-37 = "O Sensei...?"
1003406-38 = "Ah, bem... não precisa, obrigada pela gentileza. Mas é que, se não for eu a escolher, não terá o mesmo significado."
1003406-39 = "[s] \"Verdade, seria um problema escolher algo que não seja do gosto da pessoa.\""
1003406-40 = "Bem, é que, como posso dizer..."
1003406-41 = "[s] \"Hm?\""
1003406-42 = "N-não, não é nada!"
1003406-43 = "M-mais importante, qual lenço eu deveria escolher..."
1003406-48 = "Hmm... hmm... ah, este...!"
1003406-51 = "Com licença, atendente. Poderia embrulhar este para mim?"
1003406-52 = "Bem..."
1003406-53 = "É, é para presente!"
1003406-55 = "Ufa... sinto muito, acabou levando bastante tempo."
1003406-56 = "[s3] \"Não tem problema, fico feliz que tenha conseguido comprar o que queria, Mimori.\"\n[s4] \"Uma pena que o resultado do sorteio tenha sido apenas um pacote de lenços de papel.\""
1003406-57 = "Fufu, sim. Consegui comprar algo bom."
1003406-58 = "Bem, agora..."
1003406-59 = "Fufu, sim. Consegui comprar algo bom."
1003406-60 = "Bem, agora..."
1003406-61 = "[s5] \"Falando nisso, você disse que era para presente.\"\n[s6] \"Espero que a pessoa goste.\""
1003406-62 = "Sim, exatamente como você disse."
1003406-63 = "Sim, exatamente como você disse."
1003406-64 = "Por isso, ficaria muito feliz se não apenas eu, mas você também gostasse deste lenço, Sensei."
1003406-65 = "[s] \"……Eh?\""
1003406-66 = "Fufu, a razão pela qual eu queria vir aqui hoje com você, Sensei,"
1003406-67 = "é porque eu queria te entregar este presente logo."
1003406-68 = "Para você, Sensei, que sempre me acompanha nos meus treinamentos,"
1003406-69 = "é algo simples, mas eu queria retribuir o carinho."
1003406-70 = "[s] \"Só de saber que você pensou em mim já fico feliz, obrigado.\""
1003406-71 = "Não, é que eu realmente queria te entregar……!"
1003406-72 = "Será que isso foi apenas um capricho meu……?"
1003406-73 = "[s7] \"De jeito nenhum, estou muito feliz.\"\n[s8] \"Não existe ninguém que não fique feliz ao receber um presente.\""
1003406-74 = "Fufu, fico feliz em ouvir isso."
1003406-75 = "Fufu, fico feliz em ouvir isso."
1003406-76 = "[s] \"Então, aceitarei com gratidão…….\""
1003406-77 = "Ah, espere! Sensei!"
1003406-78 = "Bem, já que compramos isso juntos,"
1003406-79 = "claro que ele está ótimo como está, mas, bem……."
1003406-80 = "Eu gostaria de te pedir um favor……."
1003406-81 = "[s] \"Um favor?\""
1003406-82 = "É um pedido um tanto egoísta, mas, bem……."
1003406-83 = "No Clube de Treinamento, eu tenho praticado bastante costura ultimamente!"
1003406-84 = "Então, se não for pedir muito……."
1003406-85 = "Para mostrar o resultado do meu treinamento de noiva,"
1003406-86 = "será que poderia me emprestar esse lenço por um momento?"
1003406-87 = "[s] \"Isso?\""
1003406-88 = "S-sim! Eu prometo que não farei nada estranho……!"
1003406-89 = "Na verdade, eu andei praticando e gostaria de bordar algo para você……."
1003406-90 = "M-mas, claro, apenas se você estiver de acordo……!"
1003406-91 = "S-se for um incômodo, pode deixar como está……!"
1003406-92 = "[s] \"Não, eu adoraria que você fizesse isso.\""
1003406-93 = "Ah, muito obrigada. Então……."
1003406-94 = "Vou precisar de um tempinho, Sensei."
1003406-97 = "Ficaria feliz se pudesse ficar aqui ao meu lado observando."
1003406-100 = "[wa:300]― Fufu, [wa:1200]Sensei."
1003406-102 = "― Não tem problema [wa:500] chegar um pouco [wa:1000] mais perto para [wa:500] ver."
1003406-105 = "[wa:1000]― Meu treinamento de noiva……"
1003406-107 = "― E também, [wa:1300] o meu sonho de me tornar [wa:800] uma mulher ideal, [wa:700] o Yamato Nadeshiko."
1003406-110 = "[wa:100]― Você, Sensei, [wa:600] sempre esteve assim,"
1003406-112 = "― ao meu lado, me apoiando [wa:1400] e me ajudando [wa:400]."
1003406-115 = "[ns] \"É porque sou seu Sensei. Além disso, a Mimori tem se esforçado muito.\""
1003406-116 = "[wa:900]― Muito [wa:500] obrigada."
1003406-118 = "― ……Bem, [wa:1200] eu. [wa:1200] Com você, Sensei, [wa:1500] daqui para frente [wa:900] para sempre……."
1003406-121 = "[wa:100]― N- [wa:800] não é nada……!"
1003406-124 = "[wa:500]― S- [wa:500] sim! [wa:1000] O bordado, [wa:700] está pronto!"
1003406-127 = "[wa:250]― Eu me esforcei [wa:700] ao máximo,"
1003406-129 = "― mas, [wa:1400] o que achou……?"
1003406-132 = "Então, aqui está o seu presente, oficialmente."
1003406-133 = "Por favor, espero que você possa cuidar dele com carinho por muito tempo. Fufu."
1003406-135 = "(Depois disso, passei um tempo caminhando com a Mimori, conversando sobre coisas triviais e nos divertindo.)"
