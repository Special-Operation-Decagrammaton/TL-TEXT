[translation]
10014025-10 = "う、ううっ……な、なんだ……"
10014025-11 = "急に……不意打ち、だと……。"
10014025-16 = "ハッハッハー！トリニティの審判者、[ruby=うざわ]宇沢[/ruby]レイサから隠れることなどできません！"
10014025-17 = "あんなに恥ずかしいセリフを……最悪だ……。"
10014025-18 = "しかも毎回中身違うし……さっきはみんなの騎士だって……。"
10014025-20 = "……支援要請を受けて駆けつけましたが、一人で全部解決してしまったのですね。"
10014025-21 = "まあ……これもレイサさんらしくはありますが……"
10014025-23 = "……あ、スズミさん！！"
10014025-24 = "すみません。#nどうしてもタイミングが遅れそうだったので先に入ってしまいました！"
10014025-25 = "ですが、スズミさんが来てくれると言ってくださったおかげで勇気が出ましたから！"
10014025-26 = "やっぱりスズミさんがいると違いますね！#nまさにトリニティの走る閃光弾！！"
10014025-27 = "そ、そうですか……。#nそれならとりあえず良かったのですが……。"
10014025-28 = "あと、その呼び方はもうやめてください……。#nお願いします……。"
10014025-29 = "あれ？#n……ところでその方は？"
10014025-30 = "うーん……。#n以前どこかでお会いしたことがあったような……？"
10014025-31 = "[s1] \"やあ、レイサ。\"\n[s2] \"この前も会ったね。\""
10014025-32 = "……！#nやっぱりそうですよね！思い出しました！"
10014025-33 = "……！#nやっぱりそうですよね！思い出しました！"
10014025-34 = "悪党、[ruby=きょうやま]杏山[/ruby]カズサに捕まっていた方ですね？#n大丈夫でしょうか？何かされてませんか？"
10014025-35 = "[s3] \"捕まってた？\"\n[s4] \"カズサが……悪党？\""
10014025-36 = "レイサさん、先に挨拶を。#nこの方はシャーレの先生です。"
10014025-37 = "レイサさん、先に挨拶を。#nこの方はシャーレの先生です。"
10014025-38 = "……え？先生？#nシャーレの？"
10014025-39 = "あれ、何か思い出せそうな気も……。"
10014025-40 = "[s5] \"改めて挨拶するね。こんにちは、レイサ。\"\n[s6] \"私がシャーレの先生だよ。\""
10014025-41 = "あ、こんにちは……。#n私はトリニティの騎士、宇沢レイサと申します……？"
10014025-42 = "あ、こんにちは……。#n私はトリニティの騎士、宇沢レイサと申します……？"
10014025-43 = "ちょうど私たちもその件でここに。#nレイサさん、今お時間大丈夫ですか？"
10014025-44 = "どうも、杏山カズサさんに関して、少し誤解があるようで……"
10014025-45 = "……はい？"
10014025-46 = "誤解……って、何の事ですか？"
10014025-50 = "え……まさか……。"
10014025-52 = "もしかして……あの人、実は杏山カズサじゃなかったとか……！？"
10014025-54 = "いえ、そんな話ではなく……"
10014025-55 = "……いや！"
10014025-56 = "いやいやいやいや！#nそんなわけないですよ！"
10014025-57 = "……！？"
10014025-58 = "スズミさん、私の目は正確です。#nあの人は杏山カズサ本人ですよ！"
10014025-59 = "いくら昔と違う雰囲気だとしても、私の目を欺くことはできません。#n絶対です！"
10014025-60 = "そもそも、見た目では隠しきれない「獣のオーラ」が出てますから！"
10014025-62 = "そうじゃないですか？……先生！？#nあの人は杏山カズサですよね！？"
10014025-63 = "[s7] \"カズサではあるけど……。\"\n[s8] \"獣……？\""
10014025-64 = "ほら！私の言う通りです！#n私に分からないわけがないのです！"
10014025-65 = "ほら！私の言う通りです！#n私に分からないわけがないのです！"
10014025-66 = "スズミさん、私は知っているんです。"
10014025-69 = "あの人は……杏山カズサは……"
10014025-72 = "かつて不良生徒たちを震え上がらせた神話！！"
10014025-74 = "泣くスケバンも泣き止むという恐怖の怪猫「キャスパリーグ」！！"
10014025-78 = "同時に、中学時代の私が……。"
10014025-79 = "唯一倒せなかった最凶のスケバン！"
10014025-80 = "そう……"
10014025-81 = "私の「宿敵」！！"
10014025-83 = "キャスパリーグだなんて、また大げさなあだ名を……。"
10014025-84 = "それよりも、レイサさん。#nまずは落ち着いて先生のお話を……。"
10014025-85 = "ある日突然姿を消し、誰もその行方を知らなかったというのに……！"
10014025-86 = "なのにまさか！！#nこんな場所で再起のチャンスを図っていたなんて……！！"
10014025-87 = "スズミさん！先生！！このままでは、杏山カズサが……キャスパリーグが復活してしまいます！！#n再びこの一帯が暗黒に染まってしまいますよ！！"
10014025-88 = "つまりこれは使命！！#n彼女を止めなければならないという、私の使命です！！"
10014025-89 = "待ってくださいレイサさん。#n今、先生はあなたのその考えが誤解だと言っているんです。"
10014025-93 = "……はい？"
10014025-94 = "誤解……とは、どういうことでしょうか？"
10014025-95 = "杏山カズサはもうスケバンでは、ない……？"
10014025-96 = "……えっ？"
10014025-97 = "今は普通に学園生活を送っている……？"
10014025-98 = "……杏山カズサが、ですか？"
10014025-102 = "……あの杏山カズサが？"
10014025-103 = "[s9] \"うん、そのカズサが。\"\n[s10] \"あんまり信じられないかな。\""
10014025-104 = "そ、そんなわけありません！やっぱり……あり得ないですよ！？#n本当に……？どうして……？"
10014025-105 = "そ、そんなわけありません！やっぱり……あり得ないですよ！？#n本当に……？どうして……？"
10014025-106 = "で、でもこのようにスズミさんと先生が仰るというのは……"
10014025-107 = "……え……？#nあれ？あれれ……？"
10014025-108 = "よくわかりませんが、そんなに納得しづらいのでしょうか……。"
10014025-109 = "そ、そりゃあ……スズミさんは杏山カズサを知らないのですから……。"
10014025-110 = "あの杏山カズサですよ！？キャスパリーグですよ？"
10014025-111 = "誰にも止められない獣ですよ！！"
10014025-112 = "そんな存在が……普通に学園生活を……？"
10014025-113 = "[s11] （レイサにとってカズサのイメージは……）\n[s12] （そんなに……獰猛なんだ）"
10014025-114 = "……で、ですが、他でもないお二人がそう仰るなら……。"
10014025-115 = "……で、ですが、他でもないお二人がそう仰るなら……。"
10014025-116 = "……その……。"
10014025-117 = "ご、ごめんなさい。#n今、正直少し混乱してて……考える時間を頂いてもいいですか……？"
10014025-118 = "[s13] \"もちろん。いつでも連絡してね。\"\n[s14] \"ゆっくり考えて大丈夫だよ。私たちを信じて。\""
10014025-119 = "あ、は、はい……。"
10014025-120 = "あ、は、はい……。"
10014025-121 = "それでは、私はこれで……。"
10014025-128 = "……行ってしまいましたね。"
10014025-129 = "でも、どうにか誤解が解けたみたいで良かったですね。"
10014025-130 = "[s] \"何か今……。\""
10014025-132 = "[ns] \"レイサ、ちょっと元気なさそうだったね。\""
10014025-133 = "そうですか……？#nすみません、私にはあまり……。"
10014025-137 = "……先生？"
