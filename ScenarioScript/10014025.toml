[translation]
10014025-10 = "U-ugh... q-que é isso..."
10014025-11 = "Um ataque... surpresa, de repente..."
10014025-16 = "Hahaha! Ninguém consegue se esconder da juíza de Trinity, Reisa Uzawa!"
10014025-17 = "Dizer uma frase tão vergonhosa assim... que horror..."
10014025-18 = "E o conteúdo muda toda vez... da última vez foi 'cavaleira de todos'..."
10014025-20 = "...Eu vim correndo após receber o pedido de apoio, mas parece que você resolveu tudo sozinha."
10014025-21 = "Bem... isso é bem a sua cara, Reisa..."
10014025-23 = "...Ah, Suzumi-san!!"
10014025-24 = "Desculpe. #nComo o tempo estava ficando apertado, eu acabei entrando primeiro!"
10014025-25 = "Mas, graças ao fato de você ter dito que viria, eu ganhei coragem!"
10014025-26 = "Como esperado, é diferente quando você está aqui! #nVocê é literalmente a granada de luz ambulante de Trinity!!"
10014025-27 = "É, é mesmo...? #nFico feliz que tenha dado certo, então..."
10014025-28 = "E, por favor, pare de me chamar assim... #nEu imploro..."
10014025-29 = "Ué? #n...A propósito, quem é essa pessoa?"
10014025-30 = "Hmm... #nSinto que já nos vimos em algum lugar antes...?"
10014025-31 = "[s1] \"Olá, Reisa.\"\n[s2] \"Nós nos vimos outro dia, lembra?\""
10014025-32 = "...! #nÉ verdade! Eu me lembrei!"
10014025-33 = "...! #nÉ verdade! Eu me lembrei!"
10014025-34 = "Você é a pessoa que estava sendo mantida refém pela vilã, Kazusa Kyoyama, certo? #nVocê está bem? Ela fez alguma coisa com você?"
10014025-35 = "[s3] \"Mantido refém?\"\n[s4] \"Kazusa... uma vilã?\""
10014025-36 = "Reisa, cumprimente primeiro. #nEsta pessoa é o Sensei do Schale."
10014025-37 = "Reisa, cumprimente primeiro. #nEsta pessoa é o Sensei do Schale."
10014025-38 = "...Eh? Sensei? #nDo Schale?"
10014025-39 = "Ué, sinto que estou quase me lembrando de algo..."
10014025-40 = "[s5] \"Vou me apresentar formalmente. Olá, Reisa.\"\n[s6] \"Eu sou o Sensei do Schale.\""
10014025-41 = "Ah, olá... #nEu sou a cavaleira de Trinity, Reisa Uzawa...?"
10014025-42 = "Ah, olá... #nEu sou a cavaleira de Trinity, Reisa Uzawa...?"
10014025-43 = "Nós viemos aqui justamente por causa disso. #nReisa, você tem um momento?"
10014025-44 = "Parece que há um pequeno mal-entendido sobre a Kazusa Kyoyama..."
10014025-45 = "...Sim?"
10014025-46 = "Mal-entendido... do que você está falando?"
10014025-50 = "Eh... não pode ser..."
10014025-52 = "Será que... aquela pessoa, na verdade, não era a Kazusa Kyoyama...!?"
10014025-54 = "Não, não é sobre isso..."
10014025-55 = "...Não!"
10014025-56 = "Não, não, não, não! #nNão tem como ser isso!"
10014025-57 = "...!?"
10014025-58 = "Suzumi-san, meus olhos não falham. #nAquela pessoa é a própria Kazusa Kyoyama!"
10014025-59 = "Mesmo que a atmosfera dela esteja diferente de antigamente, ela não consegue me enganar. #nCom certeza!"
10014025-60 = "Além disso, ela exala uma 'aura de fera' que não dá para esconder nem na aparência!"
10014025-62 = "Não é verdade? ...Sensei!? #nAquela pessoa é a Kazusa Kyoyama, não é!?"
10014025-63 = "[s7] \"Ela é a Kazusa, mas...\"\n[s8] \"Fera...?\""
10014025-64 = "Viu! Eu não estava errada! #nNão tem como eu não saber!"
10014025-65 = "Viu! Eu não estava errada! #nNão tem como eu não saber!"
10014025-66 = "Suzumi-san, eu sei de tudo."
10014025-69 = "Aquela pessoa... a Kazusa Kyoyama..."
10014025-72 = "É a lenda que fazia as alunas delinquentes tremerem de medo!!"
10014025-74 = "A gata monstruosa aterrorizante, \"Cath Palug\", que fazia até as sukebans mais duronas chorarem de medo!!"
10014025-78 = "E, ao mesmo tempo, durante o meu ensino fundamental..."
10014025-79 = "A sukeban mais perversa que eu nunca consegui derrotar!"
10014025-80 = "Entendo..."
10014025-81 = "Minha \"arqui-inimiga\"!!"
10014025-83 = "Cath Palug... que apelido exagerado..."
10014025-84 = "Mais importante, Reisa-san. Primeiro, acalme-se e ouça o que o Sensei tem a dizer..."
10014025-85 = "Ela desapareceu de repente um dia, e ninguém sabia do seu paradeiro...!"
10014025-86 = "Mas quem diria!! Que ela estava planejando seu retorno em um lugar como este...!!"
10014025-87 = "Suzumi-san! Sensei!! Se continuarmos assim, Ajitani Kazusa... Cath Palug vai ressurgir!! Esta área será mergulhada na escuridão novamente!!"
10014025-88 = "Portanto, isso é uma missão!! É minha missão impedi-la!!"
10014025-89 = "Espere, Reisa-san. O Sensei está dizendo que essa sua ideia é um mal-entendido."
10014025-93 = "...Sim?"
10014025-94 = "Um mal-entendido... o que quer dizer com isso?"
10014025-95 = "Ajitani Kazusa não é mais uma delinquente...?"
10014025-96 = "...Hã?"
10014025-97 = "Ela está levando uma vida escolar normal agora...?"
10014025-98 = "...A Ajitani Kazusa, está?"
10014025-102 = "...Aquela Ajitani Kazusa?"
10014025-103 = "[s9] \"Sim, essa mesma Kazusa.\"\n[s10] \"É difícil de acreditar, né?\""
10014025-104 = "I-isso é impossível! Não pode ser... é inacreditável!? Sério mesmo...? Por quê...?"
10014025-105 = "I-isso é impossível! Não pode ser... é inacreditável!? Sério mesmo...? Por quê...?"
10014025-106 = "Ma-mas, se a Suzumi-san e o Sensei estão dizendo isso..."
10014025-107 = "...Eh...? Ué? Mas o quê...?"
10014025-108 = "Não entendo muito bem, mas é tão difícil de acreditar assim...?"
10014025-109 = "B-bem... é que a Suzumi-san não conhece a Ajitani Kazusa..."
10014025-110 = "É a Ajitani Kazusa que estamos falando!? A Cath Palug!"
10014025-111 = "A fera que ninguém consegue parar!!"
10014025-112 = "Uma existência dessas... levando uma vida escolar normal...?"
10014025-113 = "[s11] (A imagem que a Reisa tem da Kazusa é...)\n[s12] (Tão... feroz assim?)"
10014025-114 = "...Ma-mas, se vocês dois estão dizendo..."
10014025-115 = "...Ma-mas, se vocês dois estão dizendo..."
10014025-116 = "...Bem..."
10014025-117 = "De-desculpe. Honestamente, estou um pouco confusa agora... pode me dar um tempo para pensar...?"
10014025-118 = "[s13] \"Claro. Entre em contato quando quiser.\"\n[s14] \"Pode pensar com calma. Confie na gente.\""
10014025-119 = "Ah, si-sim..."
10014025-120 = "Ah, si-sim..."
10014025-121 = "Então, eu vou indo..."
10014025-128 = "...Ela foi embora."
10014025-129 = "Mas fico feliz que o mal-entendido tenha sido esclarecido."
10014025-130 = "[s] \"Algo agora...\""
10014025-132 = "[ns] \"A Reisa parecia um pouco desanimada, não acha?\""
10014025-133 = "Você acha...? Desculpe, eu não percebi muito bem..."
10014025-137 = "...Sensei?"
