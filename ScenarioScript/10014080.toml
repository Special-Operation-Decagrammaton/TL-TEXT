[translation]
10014080-1 = "第8話;封印された魔獣は……"
10014080-3 = "（……翌日）"
10014080-4 = "やっほ、先生。"
10014080-5 = "……ふふ。今度は私が先生を待つ番だからね。"
10014080-6 = "先生は普段こんな早くに来てるんだね。"
10014080-7 = "[s1] \"早いね、カズサ。\"\n[s2] \"約束の時間はだいぶ先なのに……\""
10014080-8 = "……ん？いや、別に用事があるわけじゃないんだけど。"
10014080-9 = "……ん？いや、別に用事があるわけじゃないんだけど。"
10014080-10 = "ただ、先生がいつもどのくらい早く約束の時間に来てるのか確かめたかっただけ。"
10014080-11 = "まあ、こんな風に余裕ができたのも、全部先生のおかげだよ。"
10014080-12 = "……ありがとう、先生。#n心から感謝してる。"
10014080-13 = "[s3] \"前より態度がちょっとラフになったね。\"\n[s4] \"話し方に余裕が出てきたね、カズサ。\""
10014080-14 = "まあ……そうだね。"
10014080-15 = "まあ……そうだね。"
10014080-16 = "実は今回のこと……先生に話すまでは、どうすればいいか見当もつかなくて。"
10014080-17 = "相談したのも、藁をもつかむ思いだったんだけど……お願いして正解だった。"
10014080-18 = "……途中までは、ちょっと頼りなくてムカついたけどね。"
10014080-22 = "……先生さ。"
10014080-23 = "今回のこと、実は最初から全部分かってたんじゃない？#n……ただ、私がどう受け止めるかの問題だって。"
10014080-24 = "だから、[ruby=うざわ]宇沢[/ruby]じゃなくて私を呼び出し続けた。#nそうだよね？"
10014080-25 = "……どうして直接言ってくれなかったの？"
10014080-26 = "その……純粋に気になって。#n先生は、ずっと見守るばっかりだったから。"
10014080-27 = "「受け止め方次第」、「前向きに考えよう」、「気持ち次第だよ」……#nそうやって、雑に励ませばいいだけだったと思うんだよ。事実、そうだし。"
10014080-28 = "今になって自分でも思うし、私も相談されたらそう言うと思う。"
10014080-29 = "[s5] \"……そりゃ「今になって」でしょ。\"\n[s6] \"言葉で解決する問題じゃなかったからね。\"\n[s7] \"見守ることが必要だったから。\""
10014080-30 = "……うーん。"
10014080-31 = "……うーん。"
10014080-32 = "……うーん。"
10014080-33 = "そっか。正直、まだちょっと分からないところも多いけど……"
10014080-34 = "まあ……大丈夫。#nある程度は、そうだね……分かったし。"
10014080-35 = "……ん？"
10014080-36 = "……なんて？"
10014080-37 = "まだ一つ聞いてないこと？#n……なに？"
10014080-38 = "……スケバンをやめた理由？#nえ……言ってなかったっけ？"
10014080-42 = "……もっと詳しい理由、ねぇ。"
10014080-43 = "でも、本当に大した理由じゃないんだけど……"
10014080-44 = "あんまり面白くないし、期待してたらガッカリすると思うけど。#n大丈夫そう？"
10014080-45 = "……あ、はい。わかったわかった……。#nここまでお世話になったんだから、それくらい言いますよ。"
10014080-46 = "まあ、その……"
10014080-48 = "本当になんでもない日にさ。#nいつものように喧嘩して、勝利に酔いしれながら家に帰ってたの。"
10014080-49 = "そしたら……偶然、ある子が目に入って。"
10014080-52 = "道の片隅にあるきれいなカフェで、ケーキやパフェを食べながら騒いでて。"
10014080-54 = "なんで食べてるのか分からない……チョコミントを食べながら友達と笑っててさ。"
10014080-56 = "自分でもよく分からないけど……それを見て、足が止まったの。"
10014080-57 = "不思議だよね。本当に何でもなかったのに。#nなんでだろう……"
10014080-59 = "……すごく楽しそうだったんだ。#n可愛くて、やわらかくて……暖かい笑顔だった。"
10014080-61 = "あの時の私じゃ、どう逆立ちしたって真似できない雰囲気でさ。"
10014080-66 = "そう思ったら……急にあの子みたいになりたくなって。"
10014080-67 = "……あんな素敵な女の子になりたかった。#nホント、それだけ。"
10014080-70 = "バカみたいに真似してたら、いつの間にかこうなってたの。"
10014080-74 = "まあ……そういう事で、昔の自分は忘れたかったんだよね。"
10014080-75 = "今回はちょっと……それがいき過ぎて、ヒステリー気味だったかも。"
10014080-76 = "あの子達と全く同じになる必要はなかったのに……"
10014080-77 = "……？"
10014080-78 = "……ん。"
10014080-79 = "……はは。"
10014080-80 = "……なるほど、そっか。#nそういうことだったんだ。"
10014080-81 = "先生……"
10014080-82 = "……本当……大人ってずるいね。"
10014080-83 = "[s8] \"部室に戻ろっか。\"\n[s9] \"これで、相談は終わりだね。\""
10014080-89 = "……うん。"
