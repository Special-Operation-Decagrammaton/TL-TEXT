[translation]
10014080-1 = "Episódio 8: A fera selada é..."
10014080-3 = "（……No dia seguinte）"
10014080-4 = "Ei, Sensei."
10014080-5 = "……Hehe. Agora é a minha vez de esperar por você, Sensei."
10014080-6 = "Você costuma chegar tão cedo assim, né?"
10014080-7 = "[s1] \"Você chegou cedo, Kazusa.\"\n[s2] \"Ainda falta muito para o horário marcado...\""
10014080-8 = "……Hm? Não, não é como se eu tivesse algum assunto pendente."
10014080-9 = "……Hm? Não, não é como se eu tivesse algum assunto pendente."
10014080-10 = "Eu só queria confirmar o quão cedo você costuma chegar para os nossos encontros."
10014080-11 = "Bem, ter esse tempo livre é todo graças a você, Sensei."
10014080-12 = "……Obrigada, Sensei.#nAgradeço de coração."
10014080-13 = "[s3] \"Sua atitude ficou um pouco mais relaxada do que antes.\"\n[s4] \"Você parece mais à vontade para conversar, Kazusa.\""
10014080-14 = "Bem…… acho que sim."
10014080-15 = "Bem…… acho que sim."
10014080-16 = "Na verdade, sobre o que aconteceu... até eu falar com você, eu não fazia ideia do que fazer."
10014080-17 = "Quando te procurei, eu estava me agarrando a qualquer esperança... mas pedir sua ajuda foi a decisão certa."
10014080-18 = "……Embora, no começo, você tenha me irritado um pouco por parecer tão indeciso."
10014080-22 = "……Sabe, Sensei."
10014080-23 = "Sobre o que aconteceu, você já sabia de tudo desde o início, não sabia?#n……Era só uma questão de como eu iria encarar isso."
10014080-24 = "Por isso você continuou me chamando em vez da Uzawa.#nAcertei?"
10014080-25 = "……Por que você não me disse isso diretamente?"
10014080-26 = "É que... eu fiquei genuinamente curiosa.#nPorque você ficou apenas observando o tempo todo."
10014080-27 = "“Depende de como você encara”, “Vamos pensar de forma positiva”, “Tudo depende do seu sentimento”...#nEu acho que você poderia ter apenas me encorajado de forma superficial. Na verdade, é o que parece."
10014080-28 = "Agora eu mesma penso assim, e acho que diria o mesmo se alguém me pedisse conselhos."
10014080-29 = "[s5] \"……Isso é porque você diz 'agora'.\"\n[s6] \"Não era um problema que se resolvia apenas com palavras.\"\n[s7] \"Porque era necessário apenas observar.\""
10014080-30 = "……Hmm."
10014080-31 = "……Hmm."
10014080-32 = "……Hmm."
10014080-33 = "Entendi. Honestamente, ainda tem muita coisa que eu não entendo, mas..."
10014080-34 = "Bem... está tudo bem.#nAté certo ponto, sim... eu entendi."
10014080-35 = "……Hm?"
10014080-36 = "……O que você disse?"
10014080-37 = "Algo que eu ainda não perguntei?#n……O quê?"
10014080-38 = "……O motivo de eu ter parado de ser uma delinquente?#nAh... eu não tinha te contado?"
10014080-42 = "……Um motivo mais detalhado, é?"
10014080-43 = "Mas, na verdade, não é nada demais..."
10014080-44 = "Não é nada interessante, e acho que você vai se decepcionar se estiver esperando algo grandioso.#nTudo bem assim?"
10014080-45 = "……Ah, sim. Entendi, entendi...#nJá que você me ajudou tanto, eu vou te contar."
10014080-46 = "Bem, é que..."
10014080-48 = "Em um dia comum, sem nada de especial.#nEu estava voltando para casa depois de uma briga, como sempre, embriagada pela vitória."
10014080-49 = "Então... por acaso, meus olhos pararam em uma garota."
10014080-52 = "Em um café bonito no canto da rua, ela estava rindo com as amigas enquanto comia bolo e parfait."
10014080-54 = "Não sei por que ela estava comendo aquilo... ela ria com as amigas enquanto comia um sorvete de menta com chocolate."
10014080-56 = "Nem eu mesma sei explicar... mas ao ver aquilo, meus pés pararam."
10014080-57 = "É estranho, né? Sendo que não tinha nada de especial acontecendo.#nPor que será..."
10014080-59 = "……Ela parecia muito feliz.#nEra um sorriso fofo, gentil... e caloroso."
10014080-61 = "Com a pessoa que eu era naquela época, não importava o quanto eu tentasse, eu nunca conseguiria imitar aquela atmosfera."
10014080-66 = "Quando pensei nisso... de repente, eu quis ser como ela."
10014080-67 = "……Eu queria ser uma garota maravilhosa como ela.#nSério, só isso."
10014080-70 = "Fiquei imitando ela feito uma boba e, antes que eu percebesse, acabei assim."
10014080-74 = "Bem... é por isso que eu queria esquecer quem eu era antigamente."
10014080-75 = "Desta vez, talvez... eu tenha exagerado um pouco e ficado meio histérica."
10014080-76 = "Eu não precisava ter me tornado exatamente igual a elas..."
10014080-77 = "……？"
10014080-78 = "……hum."
10014080-79 = "……haha."
10014080-80 = "……Entendi, é isso. #nEra esse o caso."
10014080-81 = "Sensei……"
10014080-82 = "……Sério…… os adultos são tão astutos."
10014080-83 = "[s8] \"Vamos voltar para a sala do clube?\"\n[s9] \"Com isso, a nossa conversa termina aqui.\""
10014080-89 = "……Sim."
