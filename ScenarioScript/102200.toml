[translation]
102200-1 = "Capítulo 20;Batalha Final de Defesa「SCHALE」"
102200-8 = "Os preparativos para invadir os Sanctums de 1 a 5 já estão concluídos...!"
102200-9 = "As batalhas de defesa de todos os distritos também terminaram.#nBom trabalho, pessoal~"
102200-11 = "――Agora, todos os preparativos estão completos."
102200-15 = "……!? #nO que foi isso?!"
102200-16 = "Ahn... então..."
102200-20 = "……Eeeeh?!"
102200-21 = "O-o que aconteceu, Momoka-chan...?!"
102200-28 = "I-invasão!! Inimigos detectados ao redor da SCHALE!#nQ-quando foi que apareceram tantos assim...?!"
102200-57 = "Nós vamos cuidar da defesa do portão principal."
102200-58 = "O portão dos fundos fica com quem ainda tiver forças sobrando."
102200-60 = "Ku ku ku... eu tava justamente sem nada pra fazer mesmo."
102200-61 = "A defesa dos fundos fica com a gente!"
102200-62 = "Vamos mostrar o poder dessas irmãs assustadoras aqui!#nKu ku ku ku ku!"
102200-63 = "Bora! Pra cima deles!"
102200-64 = "Acha que a gente paga de delinquente à toa, é?!"
102200-66 = "Gangue dos Capacetes, reunir!!"
102200-75 = "Bom, é isso aí.#nEu, uma das chefonas da Gangue dos Capacetes――Love Komakaze, vou dar uma mãozinha!!"
102200-76 = "Vamos proteger a SCHALE! Todo mundo, avançar!!"
102200-81 = "Ufufufufu……♡"
102200-87 = "Que situação tão cruel para você... mas não se preocupe.#nDeixe tudo com esta Wakamo."
102200-88 = "Eu irei protegê-lo até o fim do fim."
102200-92 = "Ufufu... então, vamos começar?"
