[translation]
102200-1 = "第20話;最終防衛戦「シャーレ」"
102200-8 = "第1から第5サンクトゥムまでの突入準備、できてます……！"
102200-9 = "全自治区の防衛戦も完了してるよ。#nおつかれ～"
102200-11 = "――全ての準備が整いましたね。"
102200-15 = "……っ！#n何事ですか！？"
102200-16 = "えーっと……"
102200-20 = "……うえぇっ！？"
102200-21 = "ど、どうしたんですかモモカちゃん……！？"
102200-28 = "しゅ、襲撃！！シャーレ周辺に敵襲！#nい、いつの間にこんな……！"
102200-57 = "正門の防衛は私たちが担当しよう。"
102200-58 = "後門は余力のある者に頼みたい。"
102200-60 = "クックックッ……ちょうど暇してたんだよなぁ。"
102200-61 = "後門側の防衛はあたしらが引き受けた！"
102200-62 = "こわーいお姉さんたちの力を見せてやるぜ！#nクックックックッ！"
102200-63 = "うし、行くぞ！"
102200-64 = "ダテにツッパってねぇんだよこちとらよぉ！！"
102200-66 = "ヘルメット団、全員集合！！"
102200-75 = "ま、そういうこと。#nヘルメット団幹部――[ruby=こまかぜ]河駒風[/ruby]ラブ、助太刀しようじゃないの！！"
102200-76 = "ほら、シャーレを守るんだよ！全員突撃！！"
102200-81 = "うふふふふ……♡"
102200-87 = "なんと不憫なあなた様……ですがご安心を。#nこのワカモにお任せください。"
102200-88 = "果ての果てまで、あなた様をお守りいたしましょう。"
102200-92 = "うふふっ……では、始めましょうか？"
