[translation]
1601906-1 = "Memórias do alvorecer"
1601906-2 = "――Claro, não há brechas em nosso sistema de defesa. Afinal, foi a própria Rio-sama quem o criou."
1601906-3 = "Mas devemos estar sempre preparados para situações imprevistas."
1601906-4 = "Pois este é um lugar onde o senso comum não se aplica."
1601906-5 = "[s] \"Toki, você é realmente confiável.\""
1601906-6 = "Obrigada."
1601906-7 = "Mas há outro motivo para a patrulha ao amanhecer."
1601906-8 = "[s] \"E qual seria?\""
1601906-9 = "Você entenderá em breve."
1601906-17 = "……É o momento perfeito."
1601906-21 = "Sensei. Por favor, olhe para lá――"
1601906-25 = "[wa:2060]― [log=토키 결전]Que belo alvorecer.[/log]"
1601906-27 = "― [log=토키 결전]Aqui, é possível observar [wa:1670]esta paisagem [wa:510]todos os dias.[/log]"
1601906-30 = "[wa:730]― [log=토키 결전]Embora, [wa:1120]desde que cheguei aqui,[/log]"
1601906-32 = "― [log=토키 결전]só tenha registros de [wa:750]alguns dias…….[/log]"
1601906-35 = "― [log=토키 결전]Talvez não seja [wa:920]todos os dias.[/log]"
1601906-38 = "[ns] \"É muito bonito…….\""
1601906-39 = "#wait;1000"
1601906-40 = "[wa:1070]― [log=토키 결전]Sim. [wa:1460]Mas, [wa:1030] daqui,[/log]"
1601906-42 = "― [log=토키 결전]parece ter cores [wa:810]completamente diferentes.[/log]"
1601906-45 = "― [log=토키 결전]O céu……[/log]"
1601906-47 = "― [log=토키 결전]e a terra brilhando [wa:1110]em laranja…….[/log]"
1601906-50 = "[wa:890]― [log=토키 결전]Eu gosto [wa:1080]de compartilhar [wa:630]esta paisagem com você, [wa:1140]Sensei.[/log]"
1601906-52 = "― [log=토키 결전]Este momento em que posso [wa:1780]transmitir o que [wa:1490]me toca o coração…….[/log]"
1601906-55 = "[wa:1900]― [log=토키 결전]Este instante, [wa:1410]só existe [wa:740]neste momento.[/log]"
1601906-57 = "― [log=토키 결전]E nunca mais [wa:1190]voltará.[/log]"
1601906-60 = "[wa:2510]― [log=토키 결전]Sensei.[/log]"
1601906-62 = "― [log=토키 결전]Se agora, [wa:1360]o momento "final" [wa:690]chegasse――[/log]"
1601906-65 = "[wa:730]― [log=토키 결전]Eu, [wa:1270]ao seu lado, [wa:1610]compartilharia esse instante…….[/log]"
1601906-67 = "― [log=토키 결전]Posso ser a [wa:770]"última" pessoa ao seu lado?[/log]"
1601906-70 = "[ns] \"Então é isso que você mais gosta, Toki.\""
1601906-71 = "Sim."
1601906-72 = "Claro, eu sei que esses são sentimentos contraditórios."
1601906-73 = "Não importa como se olhe, este é um território inimigo."
1601906-74 = "Mesmo que eu encontre algo que considere bom…… no momento seguinte, isso pode se tornar o gatilho para um resultado fatal."
1601906-75 = "Mas…… os seres humanos são criaturas egoístas, não é?"
1601906-76 = "Independentemente da situação, se sentem que algo é bom, acabam percebendo aquela situação como algo positivo."
1601906-77 = "[s] \"Acho que sentir que algo belo é belo é uma coisa boa.\""
1601906-81 = "[ns1] \"Porque isso é――\"\n[ns2] \"a prova de que você não perdeu a esperança.\""
1601906-84 = "……Entendo."
1601906-85 = "……Sim? #nAs expressões sobre "o momento final chegar" ou "a última pessoa" foram um pouco assustadoras?"
1601906-86 = "……."
1601906-87 = "Certamente, pode ser. #nO "fim" é algo assustador."
1601906-88 = "Mas não se preocupe. Eu estou ao seu lado, Sensei."
1601906-89 = "Acima de tudo…… eu impedirei que esse momento chegue."
1601906-90 = "É por isso que estou aqui, armada e pronta."
1601906-94 = "……O alvorecer acabou. #nBons momentos passam rápido demais."
1601906-95 = "……."
1601906-97 = "Eu queria que o tempo parasse aqui."
1601906-98 = "Colecionando memórias preciosas――"
1601906-99 = "Se ao menos pudéssemos guardar isso com carinho para sempre."
1601906-101 = "[ns3] \"É verdade. Acho que seria maravilhoso.\" \n[ns4] \"Mas... o 'agora' que passamos juntos não é maravilhoso também?\""
1601906-104 = "……."
1601906-105 = "É verdade, sim……."
1601906-106 = "Eu e o Sensei……."
1601906-107 = "……."
1601906-108 = "Sensei."
1601906-109 = "[s] \"Hm?\""
1601906-110 = "Por favor, fique parado por um momento."
1601906-114 = "（Toki diz isso e――）"
1601906-120 = "（Suavemente, ela me abraçou）"
1601906-121 = "[ns] \"Toki!?\""
1601906-122 = "Shiii. Alguém pode acabar acordando."
1601906-123 = "Só um pouco…… apenas um pouquinho já basta."
1601906-125 = "……."
1601906-126 = "Já que não é possível parar o tempo……."
1601906-127 = "Deixe-me gravar isso profundamente…… em minha memória."
1601906-131 = "……Muito obrigada, Sensei."
