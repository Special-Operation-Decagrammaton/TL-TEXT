[translation]
1007305-1 = "até a última mordida"

1007305-5 = "(Havia Ui parada na praia à noite, atordoada.)"

1007305-10 = "...Ah, Senseia. Aqui está."

1007305-16 = "Não acredito que seja tão rápido. #nNa verdade, depois de enviar o Momotalk, me arrependi um pouco."

1007305-17 = "Realmente não é grande coisa. #nSó quero dar uma volta... foi exatamente o que pensei."

1007305-18 = "...Mas a Senseia veio até mim com duas respostas."

1007305-19 = "Qual é a alternativa para isso..."

1007305-23 = "...Você gostaria de se juntar a nós?"

1007305-24 = "[s1] \"Claro, eu ficaria feliz. É um Americano.\"\n[s2] Aceito a xícara de Oui."

1007305-31 = "(Caminhando pela praia com Ui, segurando um Americano na mão)"

1007305-34 = "...A Associação dos Santos costuma encontrar lugares maravilhosos como este."

1007305-38 = "Sempre achei que era uma organização inflexível e rígida..."

1007305-39 = "Esse pode não ser necessariamente o caso."

1007305-40 = "Hehe..."

1007305-41 = "...?"

1007305-42 = "Sensei, o que há de errado? Bem, quando as pessoas me olham assim..."

1007305-43 = "[s3] \"A expressão de Ui está mais suave do que o normal hoje.\"\n[s4] \"Você está se acostumando com a ilha deserta?\""

1007305-48 = "Hum... sim."

1007305-49 = "Então... reuni coragem para entrar em contato com a Senseia."

1007305-50 = "E..."

1007305-51 = "...O sol já se pôs."

1007305-52 = "Um lugar tranquilo e sem ninguém por perto. #nSe estiver tão escuro, não há necessidade de se preocupar em ser visto."

1007305-53 = "Para mim, o ambiente não poderia ser melhor."

1007305-54 = "...Se você cortar apenas as falas que ele acabou de dizer, é como os vampiros do filme."

1007305-55 = "Hehe. Não precisei explicar para você, mas você poderia dizer..."

1007305-56 = "O Sensei conhece vários alunos..."

1007305-57 = "Entre eles, devia haver algumas pessoas tímidas que não tinham confiança em si mesmas e estavam preocupadas com o que os outros pensavam delas."

1007305-58 = "...Eu não acho que sou especial."

1007305-59 = "[s5] \"Mas Oui é Oui.\"\n[s6] \"Você não acha que sou uma pessoa tímida?\""

1007305-64 = "...Sim, o que é isso?"

1007305-65 = "Eu vejo……"

1007305-66 = "Quando um Sensei me diz algo, é como se eu aceitasse naturalmente..."

1007305-67 = "...E provavelmente estaria mais perto de dizer que sou difícil do que tímido."

1007305-68 = "Não, não estou sendo condescendente. #nNo entanto, é verdade e estou ciente disso."

1007305-69 = "Há momentos em que eu ajo assim intencionalmente..."

1007305-70 = "Dessa forma, menos pessoas invadirão meu espaço pessoal."

1007305-71 = "...No entanto, ultimamente sinto que não está funcionando e estou tendo problemas."

1007305-75 = "…………."

1007305-76 = "... Não direi quem, no entanto."

1007305-77 = "Ou é melhor colocar em palavras?"

1007305-78 = "[s7] \"Ahaha, você também está com problemas.\"\n[s8] \"Essa é aquela piada de novo.\""

1007305-81 = "...Suspiro, isso parece artificial. Eu sabia disso."

1007305-82 = "Pessoalmente, não sou bom em conversas inventadas... mas não me importo porque isso realmente me ajuda."

1007305-83 = "Já que é seu Sensei, deve haver algum sentido nele ficar ao seu lado, certo?"

1007305-84 = "Graças a você sinto que posso mudar aos poucos... aos poucos."

1007305-85 = "...No entanto, não pretendo apenas ser pressionado."

1007305-86 = "Às vezes... uh, sou mimado..."

1007305-87 = "...Vingança pelo Sensei."

1007305-88 = "Por exemplo... assim, você pode reservar um tempo só para nós dois."

1007305-89 = "...Eca."

1007305-90 = "Na melhor das hipóteses, eu poderia ter dito coisas tão problemáticas... Aaah... O pior..."

1007305-91 = "...Você estará sem sorte se for pego por mim."

1007305-92 = "[s9] \"Assumirei a responsabilidade como Sensei até o fim.\"\n[s10] \"Estarei sempre ao seu lado cuidando de você.\""

1007305-95 = "... Haa. Faça isso de novo."

1007305-96 = "Bom, vamos encerrar essa história..."

1007305-97 = "Como eu disse no início...só queria caminhar um pouco hoje."

1007305-98 = "Aquela xícara ainda está lá, não está?"

1007305-99 = "não preciso dizer nada..."

1007305-103 = "Pelo menos até eu terminar de beber..."

1007305-104 = "Você gostaria de caminhar um pouco..."

1007305-105 = "...Isso é bom, certo?"

1007305-109 = "[ns11] Coloque a boca no copo. \n[ns12] Comece a caminhar com passos pequenos."

1007305-112 = "...Hehe."

1007305-114 = "...Não é ruim."

