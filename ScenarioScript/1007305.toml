[translation]
1007305-1 = "最後の一口まで"
1007305-5 = "（夜の海辺に、ぼんやりと立ち尽くすウイの姿があった）"
1007305-10 = "……あ、先生。こちらです。"
1007305-16 = "こんなに早いとは。#n実はモモトークを送ってから、少し後悔していました。"
1007305-17 = "本当に、大した用ではないんです。#nただ、少し散歩がしたい……そう、思っただけで。"
1007305-18 = "……なのに、先生は二つ返事で私のところへ。"
1007305-19 = "その、代わりと言っては何ですが……"
1007305-23 = "……ご一緒に、いかがですか？"
1007305-24 = "[s1] \"もちろん、喜んで。アメリカーノだね。\"\n[s2] ウイのカップを受け取る。"
1007305-31 = "（アメリカーノを片手に、ウイと海辺を歩く）"
1007305-34 = "……聖徒会も、こんな素敵な場所をよく見つけたものです。"
1007305-38 = "融通の利かない、堅苦しい組織だとばかり思っていましたが……"
1007305-39 = "そうとは限らないのかもしれませんね。"
1007305-40 = "ふふっ……"
1007305-41 = "……？"
1007305-42 = "先生、どうかしましたか？そ、そんなに見つめられると……"
1007305-43 = "[s3] \"今日のウイは、いつもより表情が柔らかいね。\"\n[s4] \"無人島にも慣れてきた？\""
1007305-48 = "えっと……はい。"
1007305-49 = "なので……勇気を出して、先生にご連絡したのです。"
1007305-50 = "それに……"
1007305-51 = "……もう、陽も落ちましたし。"
1007305-52 = "周りには誰もいない、静かな場所。#nこれだけ暗ければ、人目を気にする必要も、ないですから。"
1007305-53 = "私にとっては、これ以上ない環境です。"
1007305-54 = "……なんて、今のセリフだけ切り取れば、[ruby=おとぎばなし]御伽噺[/ruby]に出てくる吸血鬼のような。"
1007305-55 = "ふふっ。わざわざ説明しなくても、お見通しでしたよね……先生には。"
1007305-56 = "先生は、いろいろな生徒と面識がありますから――"
1007305-57 = "その中には、きっと……#n自分に自信が持てず、他人の目が気になって仕方がない小心者もいたはずです。"
1007305-58 = "……私が特別だとは、思っていません。"
1007305-59 = "[s5] \"でも、ウイはウイだよ。\"\n[s6] \"小心者だとは思わないかな？\""
1007305-64 = "……そう、なんですか？"
1007305-65 = "なるほど……"
1007305-66 = "先生に言われると、自然に受け止められるような……。"
1007305-67 = "……それに私は、小心者というより、気難しいと言った方が近いかもしれません。"
1007305-68 = "いえ、別に卑下しているわけではないので。#nただ、事実には違いありませんし、その自覚はあります。"
1007305-69 = "意図的に、そう振る舞っている時もありますし……"
1007305-70 = "そうすれば、私のパーソナルスペースに入ってくる人は減りますから。"
1007305-71 = "……ですが、最近はどうもそれが機能していない気がして、困っています。"
1007305-75 = "…………。"
1007305-76 = "……誰、とは言いませんけれど。"
1007305-77 = "それとも、言葉にした方が良いでしょうか？"
1007305-78 = "[s7] \"あはは、ウイも大変だね。\"\n[s8] \"またまた、そんなご冗談を。\""
1007305-81 = "……はぁ、わざとらしいですね。知ってましたけど。"
1007305-82 = "私としては、取り繕った会話は苦手ですし……むしろ助かるので構いませんが。"
1007305-83 = "先生のことですから、そばに居てくれるのにも、きっと意味があるのでしょう？"
1007305-84 = "おかげで私も、少し……少しずつ、変わっていけるような気がしています。"
1007305-85 = "……ですが、振り回されてばかりいるつもりは無いですよ。"
1007305-86 = "た、たまには……その、甘えたりして……"
1007305-87 = "……先生に、仕返しを。"
1007305-88 = "たとえば……こんな風に、2人だけの時間を作っていただいたり。"
1007305-89 = "……うぅ。"
1007305-90 = "よくもまぁこんな面倒くさい事を言えたもので……ああぁ……最悪……"
1007305-91 = "……私に捕まってしまうなんて、先生は運がありませんね。"
1007305-92 = "[s9] \"最後まで、先生として責任を取るから。\"\n[s10] \"いつでも、そばで見守ってるよ\""
1007305-95 = "……はぁ。またそんなことを。"
1007305-96 = "こ、この話は終わりにしましょう……。"
1007305-97 = "はじめにも言いましたが……今日は、少し歩きたかっただけですし。"
1007305-98 = "そのカップ、まだ残っていますよね。"
1007305-99 = "何も話さなくて良いので……"
1007305-103 = "せめて、それを飲み終わるまでは……"
1007305-104 = "すこし、歩きませんか……"
1007305-105 = "……いいですよね？"
1007305-109 = "[ns11] カップに口をつける。\n[ns12] 小さな歩幅で歩き出す。"
1007305-112 = "……ふふっ。"
1007305-114 = "……悪くないですね。"
