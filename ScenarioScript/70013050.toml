[translation]
70013050-1 = "The Weed That Doesn't Bloom Alone (5)"
70013050-2 = "A few days later..."
70013050-4 = "Lounge of the hotel's fine dining restaurant"
70013050-5 = "..."
70013050-6 = "...I never thought we'd end up coming back here."
70013050-7 = "Hehe, the hotel staff said they wanted to thank us, right? It's only polite to accept their gratitude!"
70013050-8 = "A-are you sure about this? It's not a trap to sue us for damages, is it?"
70013050-9 = "It's fine."
70013050-10 = "It seems this hotel has been troubled by the Rigatoni family for a while."
70013050-11 = "Since we took care of them, I don't think their desire to thank us is a lie."
70013050-12 = "If they try to deceive us... I will eliminate them."
70013050-13 = "So please don't worry, Aru-sama."
70013050-14 = "W-what!?"
70013050-15 = "I-I'm not worried! I just meant that it's better to consider all possibilities."
70013050-16 = "Hehehe... As expected of Aru-sama... Always so cautious."
70013050-18 = "Everyone! Welcome!"
70013050-19 = "Right this way, please!"
70013050-26 = "If they try anything funny... I'll dispose of them immediately."
70013050-27 = "L-like I said, there's no need to worry about that!"
70013050-29 = "Please, take a seat wherever you like."
70013050-30 = "Oh...? We're the only ones here?"
70013050-31 = "We have specially invited only you for this evening."
70013050-32 = "We have also prepared a special menu."
70013050-33 = "We have gathered the finest chefs for today, so please look forward to it."
70013050-34 = "Here is the menu."
70013050-39 = "T-this is...!"
70013050-40 = "Hm? What is it? Is there something weird written on it again?"
70013050-44 = "Oh~"
70013050-45 = "...What's wrong?"
70013050-49 = "This is..."
70013050-54 = "W-what happened? Did we get trapped?"
70013050-55 = "Haruka-chan. Do you know what this means?"
70013050-60 = "Osetra Golden Imperial Caviar Blini...?"
70013050-61 = "W-what is this...? I can read the words, but I have no idea what they mean..."
70013050-62 = "A-are these even the names of dishes? This isn't some kind of code, is it?"
70013050-63 = "Hehehe, I have no clue, but let's just order it!"
70013050-64 = "This, and this, and this too!"
70013050-65 = "But shouldn't we order at least one thing we actually recognize?"
70013050-66 = "Like... truffle cream risotto or something."
70013050-67 = "I-I don't really know what that is either... but I'll leave it to you...!"
70013050-68 = "Fine. Let's order then."
70013050-69 = "Excuse me!"
70013050-70 = "How may I help you?"
70013050-71 = "We'll take everything from here to here."
70013050-72 = "And this truffle cream risotto too!"
70013050-77 = "And for drinks?"
70013050-78 = "D-drinks?"
70013050-83 = "(Ugh, I didn't think about that...)"
70013050-84 = "(I can't order something ordinary in a place like this...!)"
70013050-90 = "Hehe, please enjoy your meal."
70013050-91 = "This restaurant is all yours for today."
70013050-99 = "Afterward, the group enjoyed a luxurious dinner."
70013050-100 = "It was arguably the most luxurious dinner since Problem Solver 68 was founded."
70013050-103 = "Ah, I'm stuffed. I'm so happy~"
70013050-104 = "The dish we had before dessert? That was super delicious."
70013050-105 = "What was it called again? Do you remember, Aru-chan?"
70013050-106 = "I-it was grilled beef, so it must have been a steak."
70013050-107 = "It wasn't just any steak, though."
70013050-108 = "A-anyway, it was delicious, so it's fine. Right, Haruka?"
70013050-114 = "..."
70013050-115 = "Haruka?"
70013050-116 = "Oh... yes! Aru-sama. I was happy too. Hehehe..."
70013050-117 = "What were you looking at?"
70013050-118 = "Oh, um... I saw a familiar alleyway over there..."
70013050-123 = "That alleyway..."
70013050-124 = "...Ah."
70013050-125 = "Hehe, let's go over there. It looks interesting."
70013050-126 = "But..."
70013050-127 = "It's fine. Let's go, let's go!"
70013050-128 = "Yes. If there's something on your mind, let's go."
70013050-129 = "Sometimes, it's important to face the past."
70013050-130 = "...Yes."
70013050-131 = "If you all... say so..."
70013050-133 = "...It's been a while."
70013050-134 = "The first time I met you all was... in this alley."
70013050-136 = "This place hasn't changed."
70013050-137 = "But Haruka-chan, you've changed a lot, haven't you?"
70013050-139 = "H-have I? I'm not sure..."
70013050-140 = "That's true."
70013050-141 = "Back then you were just a weak, pitiful girl, but now you're a valuable employee of Problem Solver 68."
70013050-142 = "Hehehe... I can't thank you enough for saying that..."
70013050-143 = "..."
70013050-144 = "I think it's around here. The place where Aru-sama saved me."
70013050-145 = "Back then, I... I wanted to protect the child I was looking after, but..."
70013050-146 = "..."
70013050-147 = "B-but it's okay! Thanks to you all...!"
70013050-148 = "...Huh? Wait a second, Haruka-chan."
70013050-149 = "Isn't that the weed right where you're standing? The one from back then?"
70013050-150 = "...Yes? What do you mean..."
70013050-155 = "Oh...! Ah...!"
70013050-156 = "I-it's alive...! This little one... it's actually alive...!!"
70013050-157 = "And it even bloomed... How did it manage on its own..."
70013050-160 = "It didn't bloom on its own."
70013050-161 = "It bloomed because you took care of it every day, Haruka."
70013050-162 = "Thanks to you, it was able to store enough nutrients to bloom."
70013050-163 = "T-that's..."
70013050-164 = "Oh! I just had a great idea!"
70013050-165 = "Let's take this little one to the office! We'll put it in a pot and take care of it together!"
70013050-166 = "Yes, that's very cool. That's truly hard-boiled."
70013050-167 = "Right, Haruka?"
70013050-172 = "............"
70013050-173 = "Th-thank you."
70013050-174 = "Thank you for taking me in back then."
70013050-175 = "Thank you for cherishing me, even though I was someone everyone else disliked..."
70013050-176 = "I will repay this debt even if it kills me...!"
70013050-177 = "What are you saying? I told you, you've already repaid your debt."
70013050-178 = "Hehehe, and stop saying you'll 'die'—what would we do if you were gone, Haruka-chan?"
70013050-179 = "Yeah. Problem Solver 68 is only complete when we're all together."
70013050-180 = "That's right. Let's keep working together, Haruka."
70013050-190 = "And so, the next day, and the day after that—"
70013050-191 = "The hard-boiled daily life of Problem Solver 68 continued."
70013050-193 = "The Weed That Doesn't Bloom Alone"