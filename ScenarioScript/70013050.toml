[translation]
70013050-1 = "Uma erva daninha não floresce sozinha (5)"
70013050-2 = "Alguns dias depois..."
70013050-4 = "Salão do restaurante fino do hotel"
70013050-5 = "..."
70013050-6 = "... Quem diria que a gente ia voltar aqui."
70013050-7 = "Kufufu, disseram que o hotel queria agradecer a gente, né? Então a gente aceita de bom grado!"
70013050-8 = "S-será que está tudo bem? Não é uma armadilha para pedir indenização?"
70013050-9 = "Tudo bem."
70013050-10 = "Parece que este hotel já estava sofrendo com a Família Rigatoni."
70013050-11 = "Nós nos livramos deles, então eles querem nos agradecer genuinamente."
70013050-12 = "Se tentarem nos enganar... eu mesma os elimino."
70013050-13 = "Então, não se preocupe, Aru-sama."
70013050-14 = "Ah, sim!?"
70013050-15 = "N-não estou preocupada! Só quis dizer que temos que considerar várias possibilidades."
70013050-16 = "Ehehe... a Aru-sama é sempre cautelosa, né."
70013050-18 = "Pessoal! Bem-vindos!"
70013050-19 = "Deixem-me guiá-los!"
70013050-26 = "Se fizerem alguma bobagem... elimino na hora."
70013050-27 = "P-por isso eu disse, não precisa se preocupar!"
70013050-29 = "Então, sentem-se onde preferirem."
70013050-30 = "Ora... não tem mais ninguém além da gente?"
70013050-31 = "Nós os convidamos exclusivamente para esta noite."
70013050-32 = "Também preparamos um menu especial."
70013050-33 = "Reunimos chefs de primeira linha para esta noite, podem esperar."
70013050-34 = "Aqui está o menu."
70013050-39 = "I-isso é...!"
70013050-40 = "Hã? O que foi? Mais palavras estranhas?"
70013050-44 = "Uau."
70013050-45 = "... O que foi?"
70013050-49 = "Isso é..."
70013050-54 = "O-o que houve? Caímos numa armadilha?"
70013050-55 = "Haruka-chan, entende alguma coisa?"
70013050-60 = "Blini de caviar imperial dourado de Osetra...?"
70013050-61 = "O que é isso? Dá para ler, mas não faz o menor sentido..."
70013050-62 = "Isso é nome de comida mesmo? Não é algum código?"
70013050-63 = "Kufufu, não entendi nada, mas vamos pedir!"
70013050-64 = "Isso, e isso, e também isso!"
70013050-65 = "Mas não seria melhor pedir algo que a gente entende?"
70013050-66 = "Por exemplo... risoto de creme de trufas."
70013050-67 = "Isso também não me parece familiar... mas deixo com vocês!"
70013050-68 = "Tá bom. Então vamos pedir."
70013050-69 = "Com licença!"
70013050-70 = "Qual vai ser?"
70013050-71 = "Vai ser tudo isso aqui."
70013050-72 = "Ah, e também esse risoto de creme de trufas!"
70013050-77 = "E para beber?"
70013050-78 = "B-beber?"
70013050-83 = "(Hã... não tinha pensado nisso.)"
70013050-84 = "(Num lugar desses, não posso pedir qualquer coisa...) "
70013050-90 = "Fufu, fiquem à vontade."
70013050-91 = "Este restaurante é só de vocês hoje."
70013050-99 = "Depois, todos aproveitaram um jantar luxuoso."
70013050-100 = "Um dos jantares mais luxuosos desde a fundação da Empresa de Conveniência 68."
70013050-103 = "Ah, estou tão cheia. Feliz demais."
70013050-104 = "Aquele prato antes da sobremesa, estava uma delícia!"
70013050-105 = "Qual era o nome, Aru-chan? Lembra?"
70013050-106 = "É... bife, né? Carne grelhada."
70013050-107 = "Mas não era só um bife."
70013050-108 = "O importante é que estava gostoso, está bom. Né, Haruka?"
70013050-114 = "..."
70013050-115 = "Haruka?"
70013050-116 = "Ah... sim, Aru-sama. Eu também fiquei feliz. Ehehe..."
70013050-117 = "Onde você estava olhando?"
70013050-118 = "Ah, é que... eu vi um beco familiar ali."
70013050-123 = "Aquele beco..."
70013050-124 = "... Ah."
70013050-125 = "Kufufu, vamos até lá. Parece interessante."
70013050-126 = "Mas..."
70013050-127 = "Pode ir, sim. Vamos, vamos!"
70013050-128 = "Sim. Se está curiosa, vamos."
70013050-129 = "De vez em quando, é importante encarar o passado."
70013050-130 = "... Sim."
70013050-131 = "Já que todos estão dizendo..."
70013050-133 = "... Quanto tempo, hein."
70013050-134 = "Foi neste beco que a gente se conheceu."
70013050-136 = "Aqui continua igual."
70013050-137 = "Mas a Haruka-chan mudou muito, né?"
70013050-139 = "Sério? Eu não sei não..."
70013050-140 = "Concordo."
70013050-141 = "Naquela época, ela era só uma garota fraca e indefesa. Agora é uma excelente funcionária da nossa Empresa de Conveniência 68."
70013050-142 = "Ehehe... fico muito feliz em ouvir isso..."
70013050-143 = "..."
70013050-144 = "Acho que é por aqui. O lugar onde a Aru-sama me salvou."
70013050-145 = "Naquela época, eu queria proteger a planta que cuidava, mas..."
70013050-146 = "..."
70013050-147 = "M-mas está tudo bem! Graças a vocês..."
70013050-148 = "... Opa, espera aí, Haruka-chan."
70013050-149 = "Essa planta onde você está pisando... não é a daquela época?"
70013050-150 = "... Como assim?"
70013050-155 = "Ah...! Aah...!"
70013050-156 = "Está viva...! Esta plantinha... está viva...!"
70013050-157 = "E ainda floresceu... como ela conseguiu sozinha..."
70013050-160 = "Ela não floresceu sozinha."
70013050-161 = "Ela floresceu porque você a regou todos os dias."
70013050-162 = "Conseguiu acumular nutrientes para florescer graças a você."
70013050-163 = "I-isso é..."
70013050-164 = "Ah! Tive uma ideia~"
70013050-165 = "Vamos levar ela para o escritório! Colocamos num vaso e cuidamos todos juntos!"
70013050-166 = "Sim, isso é muito cool. Hard-boiled, puro."
70013050-167 = "Não é, Haruka?"
70013050-172 = "..."
70013050-173 = "M-muito obrigada."
70013050-174 = "Obrigada por ter me acolhido naquela época."
70013050-175 = "Obrigada por ter cuidado de mim, que sempre fui rejeitada por todos."
70013050-176 = "Juro que vou retribuir esse favor mesmo que morra!"
70013050-177 = "O que está dizendo? Eu já disse que você já retribuiu."
70013050-178 = "Kufufu, para de falar 'morrer', Haruka-chan. O que seria da gente sem você?"
70013050-179 = "É. Somos a Empresa de Conveniência 68 graças a todas nós."
70013050-180 = "Isso. Vamos continuar contando com você, Haruka."
70013050-190 = "E assim, no dia seguinte, e no seguinte –"
70013050-191 = "O dia a dia hard-boiled da Empresa de Conveniência 68 continuou."
70013050-193 = "Uma erva daninha não floresce sozinha"