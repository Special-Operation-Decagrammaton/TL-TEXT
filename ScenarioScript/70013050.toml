[translation]#[Texto Final. - Filipe 08/07.]
70013050-1 = "Erva Daninha Que Não Floresce Sozinha (5)"
70013050-2 = "Alguns dias depois……"
70013050-4 = "Salão do Restaurante de Luxo do Hotel"
70013050-5 = "……"
70013050-6 = "……Quem diria que voltaríamos aqui."
70013050-7 = "Kufufu, o hotel disse que queria agradecer, né? Então é educação aceitar!"
70013050-8 = "T-tem certeza? Não é uma armadilha para cobrar os danos?"
70013050-9 = "Relaxa."
70013050-10 = "Esse hotel já sofria com a Família Rigatoni."
70013050-11 = "Nós os livramos disso, então o agradecimento é genuíno."
70013050-12 = "Se tentarem nos enganar…… eu elimino."
70013050-13 = "Então não se preocupe, Al-sama."
70013050-14 = "Hã!?"
70013050-15 = "N-não estou preocupada! Só acho que devemos considerar todas as possibilidades."
70013050-16 = "Hehe…… Al-sama é sempre cautelosa."
70013050-18 = "Bem-vindos, todos!"
70013050-19 = "Vou acompanhá-los!"
70013050-26 = "Se fizerem algo estranho…… vou eliminar."
70013050-27 = "P-por isso, não se preocupe!"
70013050-29 = "Então, sentem-se onde quiserem."
70013050-30 = "Ora…… não tem mais ninguém?"
70013050-31 = "Hoje, vocês são os únicos convidados."
70013050-32 = "Preparamos um cardápio especial."
70013050-33 = "Chefes renomados se reuniram para hoje. Aguardem."
70013050-34 = "Aqui está o cardápio."
70013050-39 = "I-isso é……!"
70013050-40 = "Hã? O quê? De novo algo estranho?"
70013050-44 = "Oh~"
70013050-45 = "……O que foi?"
70013050-49 = "Isso……"
70013050-54 = "O-que foi? Caímos numa armadilha?"
70013050-55 = "Haruka-chan, você entende o que é isso?"
70013050-60 = "Osetra Golden Imperial Caviar Blini……?"
70013050-61 = "O-que é isso? Eu até leio, mas não entendo nada……"
70013050-62 = "É mesmo o nome de um prato? Não é um código?"
70013050-63 = "Kufufu, não entendo nada, mas vamos pedir!"
70013050-64 = "Isso, isso, e isso também!"
70013050-65 = "Mas que tal pedir algo que pareça reconhecível?"
70013050-66 = "Por exemplo…… risoto de trufas."
70013050-67 = "Isso também não entendo…… fico na sua mão!"
70013050-68 = "Tá. Vamos pedir."
70013050-69 = "Com licença!"
70013050-70 = "O que desejam?"
70013050-71 = "Daqui até aqui, tudo."
70013050-72 = "E este risoto de trufas também."
70013050-77 = "E para beber?"
70013050-78 = "B-beber?"
70013050-83 = "(Ah, não pensei nisso……)"
70013050-84 = "(Não posso pedir algo comum aqui!)"
70013050-90 = "Fufu, fiquem à vontade."
70013050-91 = "Este restaurante é só de vocês hoje."
70013050-99 = "Depois, todos aproveitaram o jantar luxuoso."
70013050-100 = "Foi o jantar mais luxuoso desde a fundação da Oficina 68."
70013050-103 = "Ah, tô cheia. Que felicidade~"
70013050-104 = "Aquele prato antes da sobremesa? Era delicioso."
70013050-105 = "Qual era o nome? Al-chan, lembra?"
70013050-106 = "É-é carne grelhada, então bife."
70013050-107 = "Mas não era um bife comum."
70013050-108 = "O importante é que estava gostoso, certo? Haruka?"
70013050-114 = "……"
70013050-115 = "Haruka?"
70013050-116 = "Ah…… sim! Al-sama. Eu também gostei. Hehe……"
70013050-117 = "O que estava olhando?"
70013050-118 = "Ah, é que…… vi um beco familiar ali."
70013050-123 = "Aquele beco……"
70013050-124 = "……Ah."
70013050-125 = "Kufufu, vamos lá. Parece interessante."
70013050-126 = "Mas……"
70013050-127 = "Tudo bem. Vamos!"
70013050-128 = "Sim. Se há algo que te preocupa, vamos."
70013050-129 = "Às vezes, é bom encarar o passado."
70013050-130 = "……Sim."
70013050-131 = "Se vocês dizem……"
70013050-133 = "……Quanto tempo."
70013050-134 = "Foi aqui que nos conhecemos."
70013050-136 = "Aqui está igual."
70013050-137 = "Mas você, Haruka-chan, mudou muito!"
70013050-139 = "S-sério? Não sei……"
70013050-140 = "Com certeza."
70013050-141 = "Naquela época, era só uma garota frágil e coitada. Agora, é uma funcionária exemplar da Oficina 68."
70013050-142 = "Hehe…… ouvir isso me deixa sem palavras."
70013050-143 = "……"
70013050-144 = "Acho que é aqui. Onde Al-sama me salvou."
70013050-145 = "Naquela vez, eu queria proteger a erva que cuidava……"
70013050-146 = "……"
70013050-147 = "M-mas tudo bem! Graças a vocês……!"
70013050-148 = "……Ué? Espera, Haruka-chan."
70013050-149 = "A erva onde você está…… não é a de antes?"
70013050-150 = "……Hã? O que quer dizer?"
70013050-155 = "Ah……!"
70013050-156 = "Ela sobreviveu! Esta erva…… sobreviveu!"
70013050-157 = "E ainda floresceu. Como conseguiu sozinha?"
70013050-160 = "Ela não floresceu sozinha."
70013050-161 = "Floresceu porque você cuidou dela todos os dias."
70013050-162 = "Graças a você, ela acumulou nutrientes para florescer."
70013050-163 = "Isso……"
70013050-164 = "Ah! Tive uma ideia!"
70013050-165 = "Vamos levar ela para o escritório! Colocar num vaso e cuidar todos juntos!"
70013050-166 = "Sim, muito legal. Isso é hard-boiled."
70013050-167 = "Não é, Haruka?"
70013050-172 = "…………"
70013050-173 = "M-muito obrigada."
70013050-174 = "Obrigada por me acolherem naquela época."
70013050-175 = "Obrigada por valorizarem alguém que sempre foi rejeitada."
70013050-176 = "Vou pagar essa dívida mesmo que morra!"
70013050-177 = "O que está dizendo? Já pagou, falei."
70013050-178 = "Kufufu, pare de falar em 'morrer'. Se você for, o que será de nós?"
70013050-179 = "É. A Oficina 68 só existe com todas nós."
70013050-180 = "Isso. Continua com a gente, Haruka."
70013050-190 = "Assim, no dia seguinte e no seguinte――"
70013050-191 = "o cotidiano hard-boiled da Oficina 68 continuou."
70013050-193 = "Erva Daninha Que Não Floresce Sozinha"