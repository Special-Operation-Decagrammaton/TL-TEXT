[translation]
33220-1 = "Episódio 22;O Nome do Paraíso É (3)"
33220-3 = "Líder……."
33220-4 = "Saori……."
33220-5 = "O Conselho dos Santos de Justina já não funciona direito. No instante em que as ETO viraram duas, o preceito foi perdendo o sentido……."
33220-6 = "O que restou do Conselho dos Santos, e o Ambrosius também, já……."
33220-7 = "Sem cartas na mão…… é a nossa derrota."
33220-12 = "Saori…… desiste de uma vez."
33220-13 = "Não me façam rir!!"
33220-14 = "Por que, por que só você……!!"
33220-15 = "Nós sofremos juntas, nos desesperamos juntas! Neste mundo cinza!"
33220-16 = "Neste mundo em que tudo é vão, só você vai ter sentido!"
33220-17 = "Só você vai ficar assim, sob o céu azul!"
33220-18 = "Eu vou negar tudo! O que você aprendeu em Trinity, o que viveu, o que percebeu! Tudo, tudo isso!!"
33220-19 = "Porque tudo é vão!"
33220-20 = "Não; isso você não pode fazer."
33220-21 = "A nossa aprovação, todo o nosso esforço até ali; nada disso vai deixar de ter existido!"
33220-25 = "……Mesmo que seja vão, é dali que eu vou lutar de novo."
33220-29 = "Saori…… eu não perco mais."
