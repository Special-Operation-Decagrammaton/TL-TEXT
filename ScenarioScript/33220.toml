[translation]
33220-1 = "Episódio 22; O nome do paraíso é (3)"
33220-3 = "Líder..."
33220-4 = "Saori..."
33220-5 = "A Associação de Santas Justina já não funciona corretamente. No momento em que a ETO se dividiu em duas, os preceitos perderam o sentido..."
33220-6 = "A Associação de Santas que restou, e até mesmo Ambrosius, já não..."
33220-7 = "Não temos mais cartas na manga... Nós perdemos."
33220-12 = "Saori... desista logo."
33220-13 = "Não brinque comigo!!"
33220-14 = "Por que, por que só você...!!"
33220-15 = "Nós sofremos juntas, nos desesperamos! Neste mundo cinzento!"
33220-16 = "Neste mundo onde tudo é vazio, só você tem algum significado?!"
33220-17 = "Só você vai permanecer sob aquele céu azul?!"
33220-18 = "Vou negar tudo! O que você aprendeu em Trinity, o que vivenciou, o que percebeu! Tudo, absolutamente tudo!!"
33220-19 = "Porque tudo é vazio!"
33220-20 = "Não, eu não posso fazer isso."
33220-21 = "O fato de termos sido aprovadas e de termos nos esforçado tanto não pode ser apagado!"
33220-25 = "...Mesmo que seja vazio, eu vou continuar lutando a partir daí."
33220-29 = "Saori... eu não vou mais perder."
