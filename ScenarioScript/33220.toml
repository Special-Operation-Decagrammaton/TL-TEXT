[translation]
33220-1 = "Episódio 22; O Nome do Paraíso (3)"
33220-3 = "Líder..."
33220-4 = "Saori-san..."
33220-5 = "A Sociedade dos Santos Justina já não está funcionando direito. No momento em que a ETO se dividiu em duas, os mandamentos começaram a perder o sentido..."
33220-6 = "O que restou da Sociedade dos Santos, o Ambrosius, já..."
33220-7 = "Não temos mais cartas na manga... Nós perdemos."
33220-12 = "Saori... desista agora."
33220-13 = "Não brinca comigo!!"
33220-14 = "Por que, por que só você...!!"
33220-15 = "Nós sofremos juntas, nos desesperamos juntas! Neste mundo cinzento!"
33220-16 = "Neste mundo onde tudo é vazio, só você tem algum significado?!"
33220-17 = "Só você vai ficar aí, debaixo desse céu azul?!"
33220-18 = "Vou negar tudo! Tudo o que você aprendeu, experienciou e percebeu na Trinity! Tudo, absolutamente tudo!!"
33220-19 = "Porque tudo é vazio!"
33220-20 = "Não, você não pode fazer isso."
33220-21 = "O fato de termos sido aprovadas, e o quanto nos esforçamos, não pode ser apagado!"
33220-25 = "......Mesmo que seja em vão, eu vou lutar para sair disso."
33220-29 = "Saori... Eu não vou mais perder."