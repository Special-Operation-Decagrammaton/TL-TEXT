[translation]
10001090-1 = "Episódio 9; De volta à Secretaria"
10001090-2 = "Academia Federal Red Winter - Secretaria"
10001090-3 = "Fufufu... Entendo. O poder é algo realmente doce e maravilhoso."
10001090-4 = "Posso tirar sonecas o quanto quiser e comer quantos lanches desejar!#nEsta cadeira, onde apenas a Presidente pode sentar, parece um pouco pequena, mas é tão fofinha que adorei!"
10001090-5 = "Com essa vida, poderia aproveitar para sempre. Seria isso o paraíso...?"
10001090-6 = "Só que... ainda me preocupa não saber o paradeiro da Presidente Cherino..."
10001090-7 = "Bem, com certeza ela será capturada logo. Por mais que Red Winter seja vasta, já tenho uma boa ideia de onde aquela baixinha teimosa iria. Hahaha!"
10001090-8 = "Bem... o que farei agora?"
10001090-9 = "Já sei... vou mudar as estátuas espalhadas pela escola para a minha imagem e—"
10001090-12 = "Presidente Marina, é uma emergência!"
10001090-13 = "O que houve? Encontraram a Presidente Cherino, que estava desaparecida?"
10001090-14 = "Bem, se pode dizer que a encontramos, mas... a Presidente Cherino está vindo em direção à Secretaria junto com outros alunos."
10001090-15 = "O quê? A Presidente Cherino está vindo para cá?"
10001090-16 = "O-o-o que eu faço? Devo ir recebê-la?#nOu seria melhor preparar um chocolate quente para aquecê-la primeiro?"
10001090-17 = "Hum... Presidente Marina?"
10001090-18 = "Ah, sim...?"
10001090-19 = "A-ah, é isso! Agora eu sou a Presidente! Não há nada a temer!"
10001090-20 = "Fufufu. Não sei como aquela baixinha teimosa convenceu os outros alunos, mas... agora que ela não tem poder, diante da minha guarda pessoal, ela é como um bebê! Não há nada a temer!"
10001090-21 = "...Só por precaução, quantos alunos estão seguindo a Presidente Cherino?#nUmas 5 ou 6 pessoas?"
10001090-22 = "Não, não consegui contar com precisão, mas o número de alunos seguindo a Presidente Cherino é de aproximadamente... centenas."
10001090-23 = "Ce-centenas!? De onde veio toda essa gente!?"
10001090-24 = "Parece que os alunos da 'Classe Especial 227' do prédio antigo, os bibliotecários da 'Frente de Libertação do Conhecimento' e até mesmo os trabalhadores do 'Departamento de Obras' estão ajudando a Presidente Cherino..."
10001090-25 = "Você quer dizer que a Presidente Cherino convenceu todos esses alunos? Isso é um absurdo...!"
10001090-30 = "(E-e-e-é um desastre! Será que devo pedir desculpas agora e devolver o cargo de presidente?)"
10001090-31 = "(Não, com a personalidade da Presidente Cherino, ela nunca me perdoaria... Com certeza uma purga severa me espera...)"
10001090-32 = "(Além disso, o cargo de presidente do conselho estudantil que finalmente conquistei... não posso desistir assim!)"
10001090-35 = "...Ataquem."
10001090-36 = "Sim?"
10001090-37 = "Por mais que sejam muitos, eles não tiveram tempo suficiente. Não deve haver sistema de comando nem nada, é apenas um bando improvisado!"
10001090-38 = "A melhor defesa é o ataque! Se atacarmos primeiro e quebrarmos a formação deles, poderemos vencer!"
10001090-40 = "Guarda pessoal da Marina, avancem! Pelo contrário, capturem a Presidente Cherino!"
