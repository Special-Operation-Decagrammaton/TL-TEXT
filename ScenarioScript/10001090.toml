[translation]
10001090-1 = "第9話;再び事務局へ"
10001090-2 = "レッドウィンター連邦学園・事務局"
10001090-3 = "ふふふ……なるほど。権力とは本当に甘く、素晴らしいものだな。"
10001090-4 = "好きなだけ昼寝もできるし、おやつも好きなだけ食べられる！#n会長だけが座れるこの椅子も、まあちょっと小さい感じはするが、フカフカで気に入った！"
10001090-5 = "この生活ならいつまででも楽しめるな。これが天国というものか……。"
10001090-6 = "ただ……チェリノ会長の行方がまだ分からないのは気にかかるが……。"
10001090-7 = "まあ、きっとすぐに捕まるだろう。いくらレッドウィンターが広いとはいえ、あの頑固なちんちくりんが行きそうな場所など大方予想も付いているからな。ははは！"
10001090-8 = "さて……次は何をしようか？"
10001090-9 = "そうだな……校内に設置された銅像を、この私の姿に変えて――"
10001090-12 = "マリナ会長、大変です！"
10001090-13 = "どうした、失踪したチェリノ会長が見つかったのか！"
10001090-14 = "えっと、見つかったと言いますか、その……チェリノ会長が、他の生徒たちと一緒に事務局へ押し寄せてきています。"
10001090-15 = "なっ、チェリノ会長がこちらに？"
10001090-16 = "ど、ど、どうすればいい？お迎えに行くべきか？#nそれとも体を温めるために、先にココアでも用意しておいた方が良いか？"
10001090-17 = "えっと……マリナ会長？"
10001090-18 = "え、ん……？"
10001090-19 = "あ、そ、そうだ！今はこの私が会長！何も怖がる必要なんてない！"
10001090-20 = "ふふふ。あの頑固なちんちくりんが、他の生徒たちをどう説得したのか知らないが……権力も無い今、このマリナの親衛隊の前では赤子も同然！何も恐れることは無い！"
10001090-21 = "……念のために聞くが、チェリノ会長に従っている生徒の数はどれぐらいだ？#n5、6人ぐらいか？"
10001090-22 = "いえ、正確には数えられていませんが、チェリノ会長に従っている生徒の数はおよそ……数百人単位かと。"
10001090-23 = "す、数百人！？いったいその人数はどこから来たんだ！？"
10001090-24 = "旧校舎の「227号特別クラス」の生徒たちと、「知識解放戦線」の司書たち、そして「工務部」の労働者たちまでもがチェリノ会長に手を貸しているようでして……。"
10001090-25 = "その生徒たちを全員、チェリノ会長が説得したとでもいうのか？そんな、バカな……！"
10001090-30 = "（た、た、た、大変だ！今からでも謝罪して、会長の座を返した方が良いか？）"
10001090-31 = "（いや、チェリノ会長の性格なら、それでも絶対に許してくれないはず……きっと厳しい粛清が私を待っているに違いない……）"
10001090-32 = "（それに、ようやく手に入れた生徒会長の座……このまま諦めることはできない！）"
10001090-35 = "……突撃だ。"
10001090-36 = "はい？"
10001090-37 = "いくら数が多いと言っても、時間がたっぷりあったわけではない。指揮体系も何も無い、急ごしらえの寄せ集めに過ぎないはず！"
10001090-38 = "先手必勝！こちらから先に突撃して戦列を崩せば、勝機は掴めるはずだ！"
10001090-40 = "マリナ親衛隊、突撃だ！逆に、チェリノ会長をひっ捕らえろ！"
