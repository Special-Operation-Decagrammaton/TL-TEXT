[translation]
901010800110-8 = "Tô de volta."
901010800110-9 = "Demorou, hein. Ficar de guarda sozinho é entediante."
901010800110-10 = "Desculpa. O tambor era mais pesado do que eu pensava... rolá-lo até aqui levou tempo."
901010800110-11 = "No começo é difícil de controlar mesmo."
901010800110-12 = "Mas ficar rolando tambor vazio pelo porto, qual é o sentido?"
901010800110-13 = "E de madrugada... ninguém vai reclamar do barulho?"
901010800110-14 = "A gente, na base, não tem como entender as ideias dos de cima."
901010800110-15 = "Os peixes pequenos como a gente só têm que fazer o que mandam."
901010800110-20 = "Aqui FOX2. Aguardando no Ponto Whiskey."
901010800110-21 = "Confirmado o retorno do Tango 2, que havia se afastado do ponto. Sem outras novidades."
901010800110-25 = "... O que esses caras estão fazendo? Rolando tambor de madrugada?"
901010800110-26 = "Não é que... dentro do tambor tem caranguejo ou gente, será?"
901010800110-27 = "Não parece."
901010800110-28 = "Eles saíram do depósito e voltaram rapidinho –"
901010800110-29 = "O som do tambor estava muito leve. Se tivesse alguma coisa dentro, seria mais pesado."
901010800110-30 = "Se não é treino de madrugada, deve ter algum motivo."
901010800110-32 = "FOX3, consegue atrair o alvo para a direção do portão dos fundos?"
901010800110-33 = "Deixa comigo. Esconde-esconde é o meu forte."
901010800110-34 = "FOX4 cuida do controle do local. FOX2, entre no depósito quando o alvo estiver distraído."
901010800110-37 = "Entendido."
901010800110-43 = "Que barulho é esse?"
901010800110-44 = "Não é gato ou corvo?"
901010800110-45 = "Não, acho que ouvi passos..."
901010800110-46 = "Vamos ver."