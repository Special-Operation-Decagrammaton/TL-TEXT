[translation]
901010800110-8 = "I'm back."
901010800110-9 = "You're late. It's boring standing guard all by myself, you know."
901010800110-10 = "My bad. The drum cans were heavier than I thought... it took a while to haul them over."
901010800110-11 = "I guess it's hard to roll them if you're not used to it."
901010800110-12 = "But what's the point of rolling empty drum cans all around the harbor anyway?"
901010800110-13 = "And in the middle of the night, too... aren't we going to get noise complaints?"
901010800110-14 = "Like we'd ever understand what the higher-ups are thinking?"
901010800110-15 = "Low-level grunts like us just need to do as we're told."
901010800110-20 = "This is FOX2. Currently on standby at Point Whiskey."
901010800110-21 = "Confirmed Tango 2 has returned from the designated point. Nothing else to report."
901010800110-25 = "...What are they doing? Rolling drum cans in the middle of the night."
901010800110-26 = "Don't tell me... there aren't any crabs or people inside those, are there?"
901010800110-27 = "Doesn't look like it."
901010800110-28 = "They came back right after leaving the warehouse—"
901010800110-29 = "The sound of the drums is too light. If there was something inside, I think it would make a heavier sound."
901010800110-30 = "If it's not late-night training, there must be some other reason."
901010800110-32 = "FOX3, can you lure the target toward the back gate?"
901010800110-33 = "Leave it to me. Playing tag is my specialty."
901010800110-34 = "FOX4, take control of the scene. FOX2, infiltrate the warehouse while the target is distracted."
901010800110-37 = "Roger."
901010800110-43 = "What was that noise?"
901010800110-44 = "Probably just a cat or a crow, right?"
901010800110-45 = "No, I could've sworn I heard footsteps..."
901010800110-46 = "Let's go check it out."