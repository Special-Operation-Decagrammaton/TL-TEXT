[translation]#[Texto Final. - Filipe 05/07.]
901010800110-8 = "Voltei."
901010800110-9 = "Demorou hein. Ficar de guarda sozinho é um saco."
901010800110-10 = "Desculpa. O tambor era mais pesado do que eu pensei…… demorei pra carregar."
901010800110-11 = "No começo é difícil até pegar o jeito de rolar."
901010800110-12 = "Mas qual é o sentido de ficar rolando um tambor vazio pelo porto?"
901010800110-13 = "E de madrugada ainda…… não vão reclamar do barulho?"
901010800110-14 = "A gente não tem que entender as ordens de cima."
901010800110-15 = "Quem é peão igual a gente só faz o que mandam."
901010800110-20 = "Aqui FOX2. Aguardando no ponto Whiskey."
901010800110-21 = "Confirmo o retorno do Tango 2, que se afastou do ponto designado. Nenhuma outra ocorrência."
901010800110-25 = "……O que esses caras tão fazendo? Rolando tambor de madrugada."
901010800110-26 = "Não me diga que tem caranguejo – ou gente – dentro desse tambor."
901010800110-27 = "Não parece."
901010800110-28 = "Eles saíram do armazém e voltaram rápido――"
901010800110-29 = "O som do tambor é leve demais. Se tivesse alguma coisa dentro, faria mais peso."
901010800110-30 = "Se não é treino de madrugada, deve ter algum motivo."
901010800110-32 = "FOX3, consegue conduzir os alvos em direção ao portão dos fundos?"
901010800110-33 = "Deixa comigo. Pega-pega é minha especialidade."
901010800110-34 = "FOX4, fica no controle da cena. FOX2, entre no armazém enquanto a atenção deles está desviada."
901010800110-37 = "Entendido."
901010800110-43 = "Que barulho é esse?"
901010800110-44 = "Gato ou corvo, sei lá?"
901010800110-45 = "Não, pareceu passo de gente……"
901010800110-46 = "Vamos ver."