[translation]
901010400210-6 = "Com licença, sei que está ocupado."
901010400210-7 = "Hã? Quem é você?"
901010400210-8 = "Olá! Somos o 'FOX EATS', fazemos de tudo – desde entrega de bentô até reserva em restaurantes famosos!"
901010400210-9 = "Como parte da promoção de expansão da nossa área de entrega para o Porto Kanezaki, estamos oferecendo bentôs grátis..."
901010400210-10 = "Que tal provar um delicioso inarizushi?"
901010400210-11 = "Hmm... agradeço a boa vontade, mas estou meio ocupado agora."
901010400210-12 = "Aconteceu alguma coisa?"
901010400210-13 = "Pois é... você não viu um saco de serragem por aqui?"
901010400210-14 = "Saco de serragem?"
901010400210-15 = "Isso. Aquele saco com a serragem que sobra do processamento de madeira."
901010400210-16 = "Precisamos dele pra colocar os caranguejos nas caixas, mas alguém tirou todos os sacos do lugar."
901010400210-17 = "Sem eles não dá pra trabalhar..."
901010400210-18 = "Se você encontrar um 'saco de serragem abandonado' por aqui, pode me avisar?"
901010400210-19 = "É questão de frescor do caranguejo... Por favor!"
901010400210-21 = "Entendido. Se encontrarmos um 'saco de serragem abandonado', avisamos na certa."