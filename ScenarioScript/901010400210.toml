[translation]
901010400210-6 = "Pardon me for interrupting."
901010400210-7 = "Huh? Who's there?"
901010400210-8 = "Hello! We are 'FOX EATS,' your all-in-one delivery service for everything from lunch boxes to popular restaurant reservations!"
901010400210-9 = "As part of our promotion for expanding our delivery area to Kanezaki Port, we're giving away free lunch boxes..."
901010400210-10 = "Would you like to try one of our delicious inari sushi rolls?"
901010400210-11 = "Hmm... I appreciate the thought, but I'm a bit busy right now."
901010400210-12 = "Is something the matter?"
901010400210-13 = "Well... you haven't seen any bags of sawdust around here, have you?"
901010400210-14 = "Bags of sawdust?"
901010400210-15 = "Yeah. Bags filled with the sawdust produced when processing wood."
901010400210-16 = "I need them for packing the crabs into crates... but it looks like someone moved all the bags."
901010400210-17 = "I can't get any work done without them..."
901010400210-18 = "If you find any \"Abandoned Sawdust Bags\" nearby, could you let me know?"
901010400210-19 = "The freshness of these crabs is at stake... I'm counting on you!"
901010400210-21 = "Understood. If I find any \"Abandoned Sawdust Bags,\" I'll be sure to let you know."