[translation]#[Texto Final. - Filipe 05/07.]
901010400210-6 = "Com licença."
901010400210-7 = "Hã? Quem é?"
901010400210-8 = "Olá! Do delivery de marmitas a reservas em restaurantes – tudo que você precisar, 'FOX EATS'!"
901010400210-9 = "Como parte da promoção de expansão da área de entrega pro porto de Kanezaki, estamos distribuindo marmitas……"
901010400210-10 = "Que tal um inarizushi gostoso?"
901010400210-11 = "Hmm…… agradeço, mas agora tô ocupado."
901010400210-12 = "Aconteceu alguma coisa?"
901010400210-13 = "É que…… você não viu uns sacos de serragem por aqui?"
901010400210-14 = "Sacos de serragem?"
901010400210-15 = "É. Sacos com serragem de madeira."
901010400210-16 = "É essencial pra colocar caranguejo nas caixas, mas alguém tirou todos."
901010400210-17 = "Sem eles não dá pra trabalhar……"
901010400210-18 = "Se achar uns 'sacos de serragem abandonados', me avisa?"
901010400210-19 = "É questão de frescor do caranguejo…… por favor!"
901010400210-21 = "Entendido. Se eu encontrar 'sacos de serragem abandonados', aviso."