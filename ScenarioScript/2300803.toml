[translation]
2300803-1 = "Uma oração por você"
2300803-6 = "（O interior da catedral estava vazio）"
2300803-7 = "（Grandioso e solene, mas preenchido por uma atmosfera pura）"
2300803-8 = "……Sensei, por aqui."
2300803-9 = "[s1] \"……？\"\n[s2] Vira-se para a direção de onde a voz veio"
2300803-14 = "[wa:950]― ……Obrigada[wa:1250] por ter vindo,[wa:1150] Sensei."
2300803-17 = "― Sim,[wa:1200] eu estava[wa:700] orando pelo Sensei."
2300803-20 = "[wa:1800]― Um lugar[wa:400] silencioso como este[wa:1350] é perfeito[wa:550] para orar."
2300803-22 = "― Até o meu coração,[wa:700] que deveria estar orando,[wa:1750] parece[wa:400] estar sendo purificado……."
2300803-25 = "[wa:1950]― O caminho que o Sensei[wa:400] trilhou[wa:400] até aqui,"
2300803-27 = "― E o caminho que escolherá[wa:1200] daqui em diante……."
2300803-30 = "[wa:100]― Que nele,[wa:1600] por favor, haja o máximo de paz possível,"
2300803-32 = "― E que haja felicidade……."
2300803-35 = "[wa:600]― Ah,[wa:1000] você não vai[wa:750] orar por si mesmo……[wa:1300]?"
2300803-37 = "[wa:100]― Isso é……[wa:1900] não,[wa:1600] está tudo bem."
2300803-40 = "[wa:1600]― Se o Sensei[wa:450] estiver feliz,[wa:1900] eu também estarei."
2300803-42 = "― Ou seja, talvez esta seja[wa:1350] uma oração por nós……[wa:2150]."
2300803-45 = "Eu deveria ter vindo orar um pouco mais cedo... ultimamente, o trabalho tem estado muito corrido..."
2300803-46 = "……Não, dar desculpas não é bom."
2300803-47 = "Como uma irmã, eu não deveria dizer coisas assim."
2300803-48 = "Desculpe-me, Sensei……."
2300803-49 = "[s3] \"Não, só esse sentimento já me deixa feliz. Você parece uma irmã de verdade.\"\n[s4] \"Você realmente já parece uma irmã exemplar.\""
2300803-50 = "Ah, pare com isso……."
2300803-51 = "Ah, pare com isso……."
2300803-52 = "O Sensei sempre faz isso……."
2300803-53 = "Mentir não é bom, Sensei."
2300803-54 = "Ufa, de qualquer forma, vou orar para que nada de ruim aconteça mais com o Sensei……."
2300803-55 = "……？"
2300803-56 = "Então, com certeza ficará tudo bem?"
2300803-57 = "Além disso, não é mentira……? Ah, pare, Sensei, você é realmente……."
2300803-58 = "De, de qualquer forma…… ah, lembrei-me de algo bom."
2300803-59 = "Sensei, poderia vir um pouco mais para cá?"
2300803-65 = "A forma de orar não é única."
2300803-66 = "Às vezes, desta maneira……"
2300803-70 = "Existe também a forma de orar de mãos dadas."
2300803-71 = "Eu, pessoalmente, gosto deste método."
2300803-72 = "Acho que é especialmente bom para alguém como o Sensei…… que tem tantas pessoas para cuidar, mais do que a si mesmo."
2300803-73 = "Se alguém como o Sensei fosse orar, tenho certeza de que não seria por si mesmo, mas pelas suas alunas, não é?"
2300803-74 = "Por isso, às vezes, alguém precisa segurar o Sensei e orar firmemente junto. Não por outra pessoa, mas por você mesmo."
2300803-75 = "Se não se importar, deixe-me fazer isso…… como alguém que um dia será uma irmã."
2300803-76 = "Vamos, Sensei, feche os olhos também…… acalme sua respiração……."
2300803-77 = "Vamos orar. Mais uma vez, pelo Sensei……."
2300803-79 = "……E por nós."
