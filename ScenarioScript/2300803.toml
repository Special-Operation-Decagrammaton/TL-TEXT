[translation]
2300803-1 = "あなたのために祈りを"
2300803-6 = "（大聖堂の中はがらんとしていた）"
2300803-7 = "（雄大で、荘厳でありながら、清らかな雰囲気で満ちている）"
2300803-8 = "……先生、こちらです。"
2300803-9 = "[s1] \"……？\"\n[s2] 声が聞こえた方を向く"
2300803-14 = "[wa:950]― ……来ていただいて[wa:1250]ありがとうございます、[wa:1150]先生。"
2300803-17 = "― はい、[wa:1200]先生のことを[wa:700]祈っておりました。"
2300803-20 = "[wa:1800]― このように[wa:400]静かな場所は、[wa:1350]お祈りに[wa:550]ピッタリです。"
2300803-22 = "― 祈っているはずの[wa:700]私の心も、[wa:1750]まるで[wa:400]洗われていくようで……。"
2300803-25 = "[wa:1950]― 先生が[wa:400]これまで[wa:400]積み上げてきた道、"
2300803-27 = "― そして[wa:1200]これから選ばれる道……。"
2300803-30 = "[wa:100]― そこにどうか、[wa:1600]できるだけ多くの平和と、"
2300803-32 = "― 幸せがありますように……。"
2300803-35 = "[wa:600]― え、[wa:1000]自分のことも[wa:750]祈らないの……[wa:1300]ですか？"
2300803-37 = "[wa:100]― それは……[wa:1900]いえ、[wa:1600]大丈夫なんです。"
2300803-40 = "[wa:1600]― 先生が[wa:450]幸せでしたら、[wa:1900]私も幸せですので。"
2300803-42 = "― つまりこれは、[wa:1350]私たちのための祈り……[wa:2150]なのかもしれません。"
2300803-45 = "もう少し早くお祈りしておくべきでしたね……このところ、どうしてもお仕事が忙しく……。"
2300803-46 = "……いえ、言い訳は良くありませんね。"
2300803-47 = "シスターとして、このようなことを言ってはいけません。"
2300803-48 = "ごめんなさい、先生……。"
2300803-49 = "[s3] \"ううん、その気持ちだけで嬉しいよ。正にシスターって感じ。\"\n[s4] \"やっぱりもう立派なシスターって感じが。\""
2300803-50 = "も、もう……。"
2300803-51 = "も、もう……。"
2300803-52 = "先生はすぐそうやって……。"
2300803-53 = "嘘は良くないんですよ、先生。"
2300803-54 = "ふぅ、とにかくもうこれ以上悪いことが先生の元に起きないよう、お祈りを……。"
2300803-55 = "……？"
2300803-56 = "それならきっと大丈夫？"
2300803-57 = "それに、嘘じゃない……？も、もう、先生は本当に……。"
2300803-58 = "と、とにかく……ああ、良いことを思い出しました。"
2300803-59 = "先生、もう少しこちらへ来ていただけませんか？"
2300803-65 = "祈りの形は、一つではありません。"
2300803-66 = "中には、こうやって……"
2300803-70 = "一緒に、手を握る祈り方もあるのです。"
2300803-71 = "私は個人的に、このやり方が好きでして。"
2300803-72 = "特に先生のような……ご自分のこと以上に見守る相手が多い方には、特に良さそうだなと思うんです。"
2300803-73 = "先生のような方はもしお祈りをされるとしても、ご自分ではなくきっと、生徒たちのために祈られるでしょう？"
2300803-74 = "ですからこうやって、時には誰かが先生のことを捕まえて、しっかりと一緒にお祈りをしてあげないといけません。誰かのためではなく、ご自身のために。"
2300803-75 = "よろしければ私に、させてください……いつか、シスターになる者として。"
2300803-76 = "さあ、先生も目を閉じて……呼吸を落ち着けて……。"
2300803-77 = "祈りましょう。もう一度、先生のために……。"
2300803-79 = "……そして、私たちのために。"
