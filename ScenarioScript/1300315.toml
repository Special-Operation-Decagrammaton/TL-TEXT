[translation]
1300315-1 = "Caderno da Vice-Presidente do Comitê de Justiça"
1300315-4 = "Sim, é o meu caderno, sem dúvida."
1300315-5 = "Muito obrigada. Sinto muito pelo incômodo."
1300315-6 = "[s1] \"Fico feliz que tenha conseguido recuperar.\"\n[s2] \"Que bom que foi encontrado rápido.\""
1300315-12 = "Sim... estou muito aliviada por tê-lo encontrado. #nEste caderno... não tem como ser substituído."
1300315-13 = "......Hã?"
1300315-14 = "O conteúdo do caderno... você diz?"
1300315-15 = "[s3] \"Parece que você cuida muito bem dele, achei curioso.\"\n[s4] \"Talvez seja a primeira vez que vejo algo tão especial para a Hasumi.\""
1300315-18 = "......Entendo."
1300315-19 = "De fato, talvez eu seja um pouco indiferente a bens materiais."
1300315-20 = "Eu mesma não tenho tanto apego a coisas assim."
1300315-21 = "Este caderno é distribuído aos membros do Comitê de Justiça. #nEle contém o nome e o contato de todos os membros."
1300315-22 = "Como são informações pessoais, eu sempre aviso a todos do comitê para que cuidem bem deles... #nmas..."
1300315-26 = "Oh? Você está com uma expressão um tanto intrigada. #n...Não é nada tão interessante quanto o Sensei deve estar imaginando."
1300315-27 = "Se é que posso dizer... este é o meu caderno pessoal, onde venho fazendo anotações desde que o recebi no meu primeiro ano."
1300315-28 = "Não, não é uma questão de estoque. #nO caderno é distribuído todos os anos."
1300315-29 = "No meu caso, é que dá trabalho copiar todas as anotações para um novo. #nComo costumo anotar bastante coisa, o volume acabou ficando bem grande..."
1300315-30 = "......Hã!? Sensei, por favor, levante a cabeça! #nNão há motivo para você se desculpar..."
1300315-31 = "[s5] \"Eu não tive a intenção de espiar...\"\n[s6] (Entrega o post-it que caiu junto com o caderno)"
1300315-39 = "Entendo... ele deve ter se soltado quando deixei o caderno cair."
1300315-40 = "Não se preocupe com isso. #nNa verdade, agradeço por tê-lo pegado para mim."
1300315-41 = "......Algum problema com o post-it?"
1300315-42 = "Não tem nenhum significado profundo. #nComo o espaço do caderno acaba, eu uso post-its para adicionar informações em várias páginas."
1300315-43 = "......Dizer que é incrível, não é para tanto."
1300315-44 = "Eu só faço isso porque quero fazer."
1300315-45 = "Como vice-presidente, também sou responsável pelos recursos humanos do Comitê de Justiça."
1300315-46 = "Para otimizar a distribuição das tarefas, preciso entender os pontos fortes e fracos de cada membro."
1300315-47 = "Não é algo tão difícil assim. #nÉ só demonstrar um pouco de interesse pelos membros no dia a dia. Só isso."
1300315-48 = "Além disso, venho fazendo essas anotações há três anos. #nNão sinto que seja um fardo agora."
1300315-49 = "[s7] \"Mas, para fins de organização...\"\n[s8] \"Aniversários, hobbies...\""
1300315-52 = "Sim. De fato, gostos pessoais, hábitos, datas comemorativas e alergias não são informações necessárias para o trabalho."
1300315-53 = "No entanto, antes de ser um trabalho, é um clube, e nós somos estudantes."
1300315-54 = "Isso vale o mesmo para o \"Comitê de Justiça\"."
1300315-55 = "Existem muitos outros clubes mais fáceis e divertidos por aí. #nMesmo assim, elas escolheram este lugar, essas meninas preciosas... —"
1300315-56 = "Desejar que elas tenham uma vida escolar minimamente divertida... talvez seja o meu próprio \"desejo\" egoísta."
1300315-57 = "......Fufu. Desculpe. Acabei falando demais."
1300315-58 = "Se puder, por favor, esqueça o que acabou de ouvir..."
1300315-59 = "[s9] \"Não! Eu achei muito emocionante!\"\n[s10] \"O Sensei está muito feliz!\""
1300315-62 = "N-não é algo digno de elogios..."
1300315-63 = "Hã? #nAnotações sobre pessoas de fora do Comitê de Justiça... você diz?"
1300315-64 = "Registrar informações de pessoas de fora fugiria do propósito original do caderno."
1300315-65 = "Bem, eu diria isso, mas —"
1300315-66 = "Eu acabo ficando ocupada demais com as atividades do comitê."
1300315-67 = "Como resultado, as anotações sobre os membros do comitê acabaram ocupando quase tudo."
1300315-68 = "Uma coincidência incrível? O que você quer dizer com..."
1300315-69 = "Que havia uma aluna com o mesmo aniversário e hobbies parecidos com os do Sensei...?"
1300315-74 = "Sensei, vamos encerrar o assunto por aqui."
1300315-75 = "Você é uma pessoa ocupada, não posso tomar mais o seu tempo..."
1300315-76 = "[s] \"Hoje eu estou com tempo livre, não se preocupe.\""
1300315-77 = "Não! Por causa do meu descuido, não posso tomar mais o seu tempo!"
1300315-78 = "Eu também acabei de me lembrar de um compromisso urgente!"
1300315-79 = "Sendo assim, até mais!"
1300315-88 = "(Hasumi foi embora às pressas)"
