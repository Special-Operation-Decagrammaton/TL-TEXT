[translation]
1300315-1 = "正義実現委員会副委員長の手帳"
1300315-4 = "たしかに、私の手帳で間違いありません。"
1300315-5 = "ありがとうございます。お手数をおかけしました。"
1300315-6 = "[s1] \"持ち主の元に返せてよかったよ。\"\n[s2] \"すぐに見つかって良かった。\""
1300315-12 = "ええ……無事に見つかって本当に良かったです。#nこれは……替えがきかないので。"
1300315-13 = "……え？"
1300315-14 = "手帳の内容……ですか？"
1300315-15 = "[s3] \"すごく大切にしてるみたいだから、珍しいなって思って。\"\n[s4] \"ハスミの特別な物は初めて見たかも。\""
1300315-18 = "……なるほど。"
1300315-19 = "たしかに、物には無頓着なことが多いかもしれませんね。"
1300315-20 = "私自身、そこまで物欲があるわけでもないですし。"
1300315-21 = "この手帳は、正義実現委員会のメンバーに配布されるものでして。#nメンバー全員の名前と連絡先が載っているんです。"
1300315-22 = "個人情報ですから、しっかり管理するように、と……#n委員会の皆さんに注意していたのですが……。"
1300315-26 = "おや？なんだか難しい表情をされてらっしゃいますね。#n……先生が期待されるほど面白いものではありませんよ。"
1300315-27 = "強いて言うならば……これは、1年生のときに貰って以来、#nずっとメモを書き足してきた私だけの手帳なんです。"
1300315-28 = "いえ、別に在庫の問題ではありません。#n手帳は毎年配布されています。"
1300315-29 = "私の場合は、新しいものにメモを書き写すのが手間と言いますか。#nよくメモを取るほうなので、なかなかに分量が多くなってしまって……。"
1300315-30 = "……え！？先生、頭をあげてください！#n謝っていただくようなことはなにも……。"
1300315-31 = "[s5] \"盗み見するつもりはなかったんだけど……。\"\n[s6] （手帳と一緒に落ちていた付箋を渡す）"
1300315-39 = "なるほど……手帳を落とした時に、はがれてしまったんですね。"
1300315-40 = "お気になさらないでください。#nむしろ拾っていただいて、ありがとうございます。"
1300315-41 = "……付箋がどうかしましたか？"
1300315-42 = "特に深い意味はありません。#n手帳の余白が足りなくなってしまうので、色んなページに追加で貼って使っているんです。"
1300315-43 = "……すごいだなんて、そんなことは。"
1300315-44 = "ただそうしたいから、やっているだけです。"
1300315-45 = "私は副委員長として、正義実現委員会の人事も担当しています。"
1300315-46 = "配置を最適化するために、メンバーの得手不得手は把握しておかなければなりません。"
1300315-47 = "さほど難しいことでもありませんよ。#n普段から少しずつメンバーに関心を持つ。それだけです。"
1300315-48 = "それに、3年間ずっとメモをとってきましたから。#nいまさら負担に感じることもありません。"
1300315-49 = "[s7] \"でも、割り振りのためにしては……。\"\n[s8] \"誕生日とか、趣味とか……。\""
1300315-52 = "ええ。たしかに、趣味嗜好や習慣、記念日、アレルギーの有無などは、#n業務上で必要な情報ではありません。"
1300315-53 = "とはいえ、業務である以前に部活であり、私たちは生徒です。"
1300315-54 = "それは「正義実現委員会」にとっても同じこと。"
1300315-55 = "もっと楽で、もっと楽しい部活は他にいくらでもあります。#nだというのに、わざわざここを選んでくれた、大切な子たちに――"
1300315-56 = "少しでも楽しい学園生活を送って欲しいと思うのは……私なりの「欲」かもしれませんね。"
1300315-57 = "……ふふ。ごめんなさい。つい口が滑ってしまいました。"
1300315-58 = "できれば、今聞いたことは忘れてもらえると……。"
1300315-59 = "[s9] \"ううん！すごく感動したよ！\"\n[s10] \"先生は嬉しいです！\""
1300315-62 = "ほ、褒められるようなことでは……。"
1300315-63 = "え？#n正義実現委員会以外の方についてのメモ……ですか？"
1300315-64 = "部外者の情報を記載しては、本来の用途と異なってしまいますので。"
1300315-65 = "と、言いたいところですが――"
1300315-66 = "私はどうにも委員会の活動で手一杯なものですから。"
1300315-67 = "結果的に、委員会のメンバーに関するメモばかりが増えてしまいました。"
1300315-68 = "すごい偶然？それはどういう……。"
1300315-69 = "先生と同じ誕生日で、趣味も近しい生徒がいた……？"
1300315-74 = "先生、お話はこの辺で。"
1300315-75 = "お忙しい中、これ以上お時間を取ってしまうわけにもいかないですし……。"
1300315-76 = "[s] \"今日は余裕があるから大丈夫だよ。\""
1300315-77 = "いえ！私の忘れ物で、これ以上お時間をいただくわけにはいきません！"
1300315-78 = "ちょうど私も急用を思い出しましたので！"
1300315-79 = "では、これにて！"
1300315-88 = "（ハスミは大慌てで帰っていった）"
