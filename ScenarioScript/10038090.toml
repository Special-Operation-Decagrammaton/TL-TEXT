[translation]
10038090-1 = "Episódio 9; Todos os problemas"
10038090-16 = "G-Genryumon! E até mesmo a Mestra da Porta!?"
10038090-17 = "Por que vocês estão aqui...?"
10038090-19 = "Vim para libertar Yakushi Saya."
10038090-21 = "S-Saya, você diz... a ex-presidente do Clube de Pesquisa de Alquimia?"
10038090-22 = "Isso é um pouco...!"
10038090-24 = "Ho. Existe algum problema com isso?"
10038090-29 = "……."
10038090-30 = "É que... recebemos um pedido forte do Clube de Pesquisa de Alquimia... para manter Yakushi Saya detida pelo maior tempo possível..."
10038090-31 = "A acusação é... abandono das operações do Clube de Pesquisa de Alquimia, pelo que ouvimos..."
10038090-33 = "Hum. Então, vocês estão dizendo que o pedido do Clube de Pesquisa de Alquimia está acima das ordens da Mestra da Porta?"
10038090-34 = "Hmph. Se não obedecerem às ordens da Mestra da Porta, não poderão reclamar se forem punidos, certo?"
10038090-35 = "Mina, não os ameace tanto. Quando você, como Chefe da Executiva, diz isso, o peso das palavras muda."
10038090-39 = "P-perdão. Mestra da Porta!"
10038090-45 = "……Mestra da Porta, por favor, entenda."
10038090-47 = "Estou ouvindo. Pode falar."
10038090-49 = "É sobre... o fenômeno de rejuvenescimento que está se espalhando por Shanhaijing."
10038090-50 = "A pessoa que causou esse fenômeno é... como a Mestra da Porta já deve ter deduzido, aquela pessoa..."
10038090-52 = "Por isso... nós também... bem..."
10038090-57 = "Sabemos que o Clube de Pesquisa de Alquimia não está acima das ordens da Mestra da Porta, mas..."
10038090-58 = "Se não obedecermos, eles vão parar de nos fornecer remédios..."
10038090-60 = "……Hum."
10038090-61 = "Entendido. Sendo assim, a partir de agora, em nome da Genryumon — eu ordeno a libertação de Yakushi Saya."
10038090-66 = "Eh? Isso significa que...!?"
10038090-67 = "Toda a responsabilidade...!?"
10038090-69 = "Sim. Toda a responsabilidade será assumida pela Genryumon — e, por extensão, por mim, Ryuge Kisaki, a Mestra da Porta."
10038090-73 = "Afinal, a Mestra da Porta existe justamente para carregar todo tipo de problema nas costas."
