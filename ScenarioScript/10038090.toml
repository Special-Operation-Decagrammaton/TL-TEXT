[translation]
10038090-1 = "第9話;すべての面倒事を"
10038090-16 = "げ、玄龍門！それに門主様まで！？"
10038090-17 = "どうしてこちらに……？"
10038090-19 = "[ruby=やくし]薬子[/ruby]サヤの釈放に来た。"
10038090-21 = "さ、サヤ、とは……元錬丹術研究会長の？"
10038090-22 = "それは、少し……！"
10038090-24 = "ほう。何か問題でもあるのかのう？"
10038090-29 = "……。"
10038090-30 = "その……錬丹術研究会から、強い要請がありまして……#n薬子サヤの身柄を、できるだけ長く拘束しておくように、と……"
10038090-31 = "罪状は……錬丹術研究会の運営を放棄した罪、だと聞いております……"
10038090-33 = "ふむ。して、其方らは錬丹術研究会の要請が、門主の命より上にある、と？"
10038090-34 = "ふっ。門主様の命に従わないのであれば、処分が下っても文句は言えないぞ？"
10038090-35 = "ミナ、あまり脅すでない。執行部長である其方が言うと、言葉の重さが変わるであろう。"
10038090-39 = "し、失礼しました。門主様！"
10038090-45 = "……門主様、どうかご理解を。"
10038090-47 = "聞こう。話すがよい。"
10038090-49 = "その……山海経で流行っている、若返り現象に関して、です。"
10038090-50 = "例の現象を生み出したのが……門主様もお察しの通り、例の人で……。"
10038090-52 = "ですから……我々としても……その……。"
10038090-57 = "錬丹術研究会が門主様の命より上にないことは承知しておりますが……。"
10038090-58 = "従わなければ、薬を提供してもらえなくなってしまうのです……。"
10038090-60 = "……ふむ。"
10038090-61 = "あい分かった。であれば、これより玄龍門の名に於いて――薬子サヤの釈放を執行する。"
10038090-66 = "え？ということは……！？"
10038090-67 = "すべての責任を……！？"
10038090-69 = "ああ。すべての責任は玄龍門――ひいては門主である[ruby=りゅうげ]竜華[/ruby]キサキが負うこととする。"
10038090-73 = "門主とは本来、あれこれ面倒事を背負うために存在するものじゃからのう。"
