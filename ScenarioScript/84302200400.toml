[translation]
84302200400-5 = "ここか？"
84302200400-6 = "リオ、着いたぞ。どこに差せばいい？"
84302200400-11 = "……あん？リオ？おい、聞いてんのか？"
84302200400-15 = "おいおい、マジかよ。"
84302200400-16 = "ここに来て通信不良か？ジャミングの可能性もあるが……。"
84302200400-17 = "リオが計算してないとは思えねぇし……通信機の不具合か壊れたかのどっちかだろうな。"
84302200400-18 = "ん－、どうすっかな……。 "
84302200400-22 = "とりあえず右から全部差してみっか？どれか1個くらいヒットするだろ。"
84302200400-26 = "……ダメだよな。ミスったら面倒なことになりそうだし。"
84302200400-27 = "しゃあねぇ、一回戻るか。"
84302200400-28 = "写真を撮って行きゃ分かんだろ、あいつなら。"
84302200400-36 = "……いや、写真撮って大丈夫か？情報漏洩にならねぇ？"
84302200400-37 = "……まあ、終わったら消せばいいか。"
