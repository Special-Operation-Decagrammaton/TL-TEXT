[translation]
2601203-1 = "Ressuscitação Cardiopulmonar"
2601203-2 = "（Visitei a Academia de Polícia Valkyrie para ajudar no treinamento da Kirino）"
2601203-6 = "Olá, Sensei!"
2601203-7 = "No treinamento de hoje, não vamos entrar na água!"
2601203-8 = "Não vamos entrar na água!"
2601203-9 = "[s] （Ela disse duas vezes...）"
2601203-10 = "Afinal, a ressuscitação cardiopulmonar é o básico dos primeiros socorros, não é?"
2601203-11 = "Para aumentar a taxa de sobrevivência de alguém que caiu na água em uma situação de perigo..."
2601203-12 = "É necessário comprimir o coração para circular o sangue e evitar danos cerebrais!"
2601203-13 = "De acordo com minhas pesquisas, realizar a ressuscitação cardiopulmonar aumenta a taxa de sobrevivência em 2,4 vezes!"
2601203-14 = "[s1] \"Incrível, você decorou tudo.\"\n[s2] \"Você estudou bastante, hein.\""
2601203-17 = "…É o que está escrito neste \"Manual de Salva-vidas da Academia de Polícia Valkyrie\"!"
2601203-18 = "[s] \"...Manuais são importantes, né.\""
2601203-19 = "Então, vamos para a prática!#nPrimeiro, o boneco de treinamento..."
2601203-23 = "Ué?"
2601203-24 = "[s3] \"Será que...\"\n[s4] \"Onde está o boneco...?\""
2601203-27 = "E-eu esqueci de trazer o boneco de treinamento..."
2601203-28 = "O que eu faço?#nA sala de suprimentos é longe, então levaria muito tempo para ir e voltar..."
2601203-29 = "Talvez a gente perca o horário de uso da piscina..."
2601203-30 = "[s5] \"Se você esqueceu, não tem problema.\"\n[s6] \"Eu posso servir de boneco no seu lugar.\""
2601203-33 = "...O Sensei?"
2601203-34 = "Certamente, isso pode ser mais próximo de uma situação real, mas..."
2601203-35 = "Tem certeza de que tudo bem?"
2601203-36 = "[s] \"Eu vim para ajudar no treinamento, afinal.\""
2601203-37 = "E-então, por favor!"
2601203-38 = "Já que você está me ajudando, vou dar o meu melhor!"
2601203-41 = "（Fechou os olhos e deitou-se, entrando no papel de alguém que caiu na água）"
2601203-42 = "Você está bem?! Consegue me ouvir!?#nVocê aí na porta, chame uma ambulância!"
2601203-43 = "P-primeiro, verificar a respiração e o pulso...!"
2601203-44 = "[s] （Parece que ela está fazendo tudo certinho conforme o manual）"
2601203-45 = "Via aérea, liberada!"
2601203-46 = "[s] （Agora, levantar o queixo para alinhar a via aérea...）"
2601203-47 = "E-e agora..."
2601203-51 = "[ns] （...Hm?）"
2601203-52 = "Vou usar o DEA!"
2601203-56 = "[ns] \"！？！？！？！？\""
2601203-58 = "[ns7] \"O-o que você está fazendo!?\"\n[ns8] \"Isso é perigoso, sabia!?\""
2601203-61 = "M-mas...#nEste manual diz para usar o DEA, não diz?"
2601203-62 = "Diz que é essencial para aumentar a taxa de sobrevivência!"
2601203-63 = "[s] \"Mas isso é um treinamento, sabe.\""
2601203-64 = "Está escrito que só seguindo os mesmos passos da prática é que nos tornamos vencedores à beira da água!"
2601203-65 = "Então, vamos continuar logo!#nDeite-se, Sensei!"
2601203-66 = "[s9] \"N-não é bom ficar tão obcecada pelo manual!\"\n[s10] \"Vencedores à beira da água? Contra o que você está lutando!?\""
2601203-69 = "Hmm, se o Sensei diz, então não temos escolha a não ser pular essa parte."
2601203-70 = "De acordo com o manual, o próximo passo é..."
2601203-75 = "É, realmente, ficar obcecada pelo manual#nnão é uma boa escolha."
2601203-76 = "Afinal, não podemos realizar os procedimentos de emergência#nexatamente da mesma forma em um treinamento!"
2601203-77 = "C-com o Sensei, não seria ruim, mas... ainda é cedo demais!"
2601203-78 = "[s] \"...É, é mesmo?\""
2601203-79 = "S-sim! É isso mesmo!"
2601203-80 = "Vou agora mesmo até a sala de suprimentos buscar o modelo!"
2601203-81 = "Muito obrigada pela sua colaboração!"
2601203-85 = "[ns11] \"……。\"\n[ns12] Dou uma olhada no manual que a Kirino deixou para trás."
2601203-91 = "(Logo após as instruções de uso do DEA, havia informações sobre respiração artificial)"
