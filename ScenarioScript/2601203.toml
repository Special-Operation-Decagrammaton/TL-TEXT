[translation]
2601203-1 = "心肺蘇生法"
2601203-2 = "（キリノの訓練を手伝うために、ヴァルキューレ警察学校を訪れた）"
2601203-6 = "こんにちは、先生！"
2601203-7 = "今日の訓練では、水に入らない予定です！"
2601203-8 = "水には入りません！"
2601203-9 = "[s] （二回も言った……）"
2601203-10 = "やはり、心肺蘇生法は応急処置の定番ですよね。"
2601203-11 = "危険な状況下にある落水者の生存率を高めるためには……。"
2601203-12 = "心臓を圧迫し血液を循環させ、脳の損傷を防ぐ必要があります！"
2601203-13 = "本官の調べによると、心肺蘇生法を行なうことで生存率が2.4倍も上がるそうです！"
2601203-14 = "[s1] \"すごいね、覚えてきたんだ。\"\n[s2] \"しっかり勉強してきたんだね。\""
2601203-17 = "……と、この「ヴァルキューレ警察学校ライフセーバーマニュアル」に書いてあります！"
2601203-18 = "[s] \"……マニュアルは大事だよね。\""
2601203-19 = "では、実践に移りましょう！#nまずは、訓練用模型を――"
2601203-23 = "あれ？"
2601203-24 = "[s3] \"もしかして……。\"\n[s4] \"模型はどこに……？\""
2601203-27 = "く、訓練用模型を持ってきておりませんでした……。"
2601203-28 = "どうしましょう？#n備品室は遠いので、往復すると結構な時間が……。"
2601203-29 = "もしかしたら、プールの利用時間を過ぎてしまうかも……。"
2601203-30 = "[s5] \"忘れちゃったなら仕方ないよ。\"\n[s6] \"私が模型の代わりを務めるね。\""
2601203-33 = "……先生が？"
2601203-34 = "たしかに、そのほうが実際の現場に近いかもしれませんが……。"
2601203-35 = "本当に良いのですか？"
2601203-36 = "[s] \"訓練を手伝うために来たからね。\""
2601203-37 = "で、ではお願いします！"
2601203-38 = "付き合っていただいた分、頑張ります！"
2601203-41 = "（目を閉じて横になり、落水者の役になりきった）"
2601203-42 = "大丈夫ですか！聞こえていますか！？#nそこの出入り口にいる方、救急車を呼んでください！"
2601203-43 = "ま、まずは呼吸と脈を確認して……！"
2601203-44 = "[s] （マニュアル通りにうまくできているようだ）"
2601203-45 = "気道、確保！"
2601203-46 = "[s] （次は顎を上げて気道を一直線に……）"
2601203-47 = "こ、この次は……。"
2601203-51 = "[ns] （……ん？）"
2601203-52 = "[ruby=自動体外式除細動器]AEDを使[/ruby]用します！"
2601203-56 = "[ns] \"！？！？！？！？\""
2601203-58 = "[ns7] \"な、何してるの！？\"\n[ns8] \"危ないでしょ！？\""
2601203-61 = "で、ですが……#nこのマニュアルにはAEDを使用するよう書かれていますよ？"
2601203-62 = "生存率を高めるためにも、必須だそうです！"
2601203-63 = "[s] \"でも、これは訓練だからね。\""
2601203-64 = "実践と同じ手順を守ってこそ、水辺の勝者になれると書いてあります！"
2601203-65 = "なので、早く再開しましょう！#n横になってください、先生！"
2601203-66 = "[s9] \"ま、マニュアルに執着しすぎるのも良くないよ！\"\n[s10] \"水辺の勝者って、何と戦ってるの！？\""
2601203-69 = "うーん、先生がそう仰るのなら、飛ばすしかありません。"
2601203-70 = "マニュアルによると、この次は……。"
2601203-75 = "や、やはりマニュアルに執着するのは、#nあまり良い選択肢じゃないですね。"
2601203-76 = "緊急時の対応を、#n訓練でそっくりそのまま行なうわけにはいきませんから！"
2601203-77 = "せ、先生となら、嫌ではありませんが……まだ早すぎます！"
2601203-78 = "[s] \"……そ、そうなの？\""
2601203-79 = "は、はい！そうです！"
2601203-80 = "今からでも備品室に行って、模型を取りに行ってきます！"
2601203-81 = "ご協力、ありがとうございました！"
2601203-85 = "[ns11] \"……。\"\n[ns12] キリノが置いていったマニュアルを見てみる。"
2601203-91 = "（AEDの使用方法の次には、人工呼吸について書かれていた）"
