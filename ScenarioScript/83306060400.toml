[translation]
83306060400-6 = "アカリ！そっちの調味料ちょうだい～！"
83306060400-7 = "はい～★どうぞ、イズミさん。"
83306060400-8 = "ありがとう～！この濃縮ナマコソースを味噌汁に入れたら、もっと美味しくなると思う！"
83306060400-9 = "これを味わった子たちはね！みんな幸せで気絶しちゃったくらいだから！"
83306060400-10 = "ふんふ～ん♪お腹を空かせたみんなに、イズミ特製味噌汁を楽しんでもらわないと！"
83306060400-11 = "あははっ！この調子で行っちゃおう！"
83306060400-12 = "はい～★おかげで給食部占拠活動の邪魔になりそうな方々もまとめて倒せてますから。"
83306060400-18 = "予想はしていたけれど、やっぱり美食研究会だったのね。"
83306060400-19 = "ふえっ？風紀委員長がどうしてここに！？"
83306060400-20 = "あら、もうバレましたか？"
83306060400-21 = "あなた達、ここで何をしているの？"
83306060400-22 = "うぅ。私たちは……ただ、学生食堂に来るお腹を空かせた生徒に美味しい物を食べさせてあげようと……"
83306060400-23 = "ついでに、ちょっとだけイズミさんがアレンジした料理も一緒に味わってもらってました。"
83306060400-24 = "美食の道がどれだけ大変なのか、体験してもらおうかと思いまして～"
83306060400-25 = "そう！美味しい料理はみんなで一緒に食べた方が、もっと美味しいから！"
83306060400-26 = "その結果、食堂の生徒があんな状態になった……と。"
83306060400-27 = "……悪いけど、これ以上犠牲者を増やさないために、あなた達を拘束する。"
83306060400-28 = "ええっ？私はまだ全然味わえてないのに！"
83306060400-29 = "イズミさん。残念ですが、今回の作戦はここまでのようですね。"
83306060400-30 = "最後までご一緒できず残念ですが、お先に失礼します……では。"
83306060400-35 = "アカリ！？お、置いて行かないで～～～！ひどい！"
83306060400-41 = "……はぁ。悪意は無いでしょうし、追いかけるのは後にして……"
83306060400-42 = "まずは負傷者の手当てから。"
