[translation]
83306060400-6 = "Akari! Me passa aquele tempero ali!"
83306060400-7 = "Sim~★ Aqui está, Izumi-san."
83306060400-8 = "Obrigada! Acho que se eu colocar esse molho concentrado de pepino-do-mar na sopa de missô, vai ficar ainda mais gostoso!"
83306060400-9 = "As alunas que provaram isso antes ficaram tão felizes que até desmaiaram!"
83306060400-10 = "Hum-hum~♪ Tenho que garantir que todas as alunas famintas aproveitem a sopa de missô especial da Izumi!"
83306060400-11 = "Ahaha! Vamos continuar assim!"
83306060400-12 = "Sim~★ Graças a isso, também conseguimos derrotar todas as pessoas que poderiam atrapalhar as atividades de ocupação do Clube de Merenda."
83306060400-18 = "Eu já imaginava, mas tinha que ser o Clube de Pesquisa Gastronômica, não é?"
83306060400-19 = "Hã? Por que a Presidente do Comitê Disciplinar está aqui!?"
83306060400-20 = "Ora, já descobriram?"
83306060400-21 = "O que vocês estão fazendo aqui?"
83306060400-22 = "Ugh. Nós só... queríamos dar algo gostoso para as alunas famintas que vêm ao refeitório..."
83306060400-23 = "E, de quebra, fazê-las provar um pouco da comida preparada pela Izumi-san."
83306060400-24 = "Pensamos que seria bom elas experimentarem o quão difícil é o caminho da gastronomia~"
83306060400-25 = "Isso! Porque comida gostosa é muito melhor quando compartilhada com todo mundo!"
83306060400-26 = "E o resultado foi que as alunas do refeitório ficaram naquele estado..."
83306060400-27 = "...Sinto muito, mas para evitar que haja mais vítimas, vou ter que deter vocês."
83306060400-28 = "Ehh? Mas eu nem provei o suficiente ainda!"
83306060400-29 = "Izumi-san. É uma pena, mas parece que a operação de hoje termina aqui."
83306060400-30 = "Lamento não poder ficar até o fim, mas vou indo na frente... até mais."
83306060400-35 = "Akari!? N-não me deixe para trás~~~! Que cruel!"
83306060400-41 = "...Haa. Elas não devem ter feito por mal, então vou deixar para persegui-las depois..."
83306060400-42 = "Primeiro, preciso cuidar dos feridos."
