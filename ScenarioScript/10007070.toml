[translation]
10007070-1 = "Episódio 7: As férias de inverno de uma certa Comitê de Disciplina!?"
10007070-2 = "Termas 227 - Sala de Descanso"
10007070-4 = "（Com sede, visitei a sala de descanso onde parecia haver uma máquina de venda automática）"
10007070-5 = "（Lá, muitas alunas estavam encostadas nas cadeiras de massagem e...）"
10007070-6 = "Ah, meu corpo está relaxando... que sensação boa..."
10007070-7 = "As fontes termais de Gehenna não são ruins, mas estas aqui também são muito boas..."
10007070-8 = "[s] \"Parece que você está relaxando bastante.\""
10007070-9 = "......Se-Sensei!?"
10007070-10 = "Po-por que você está aqui...!?"
10007070-11 = "Es-espere um pouco, por favor. Vou desligar a cadeira de massagem agora mesmo...!"
10007070-12 = "......A-ah? Este é o botão de massagem de corpo inteiro?"
10007070-13 = "Onde fica o botão de cancelar..."
10007070-17 = "Kyaa!?"
10007070-23 = "[ns1] \"Ei, você não se machucou? Não precisa ficar tão apressada.\"\n[ns2] \"Pode continuar sentada enquanto conversamos, não tem problema.\""
10007070-26 = "Ma-mas, conversar com o Sensei enquanto estou deitada na cadeira de massagem parece um pouco desrespeitoso..."
10007070-27 = "Além disso, preciso voltar ao trabalho logo..."
10007070-28 = "E-eu sei que não parece muito convincente dizer isso nessa posição..."
10007070-29 = "[s3] \"Trabalho?\"\n[s4] \"Trabalho do Comitê de Disciplina de Gehenna?\""
10007070-30 = "Sim, desta vez estou operando em segredo, mas... claro, é um trabalho do Comitê de Disciplina de Gehenna."
10007070-31 = "Sim, desta vez estou operando em segredo, mas..."
10007070-37 = "Sensei, você conhece o \"Departamento de Desenvolvimento de Fontes Termais\" da Academia Gehenna?"
10007070-38 = "[s5] \"Sim, por cima.\"\n[s6] \"É um clube que literalmente desenvolve fontes termais, certo?\""
10007070-39 = "Sim. O Departamento de Desenvolvimento de Fontes Termais tem como atividade principal, literalmente, \"desenvolver fontes termais\", mas como eles frequentemente causam grandes acidentes usando máquinas pesadas como escavadeiras, é um dos clubes mais infames de Gehenna."
10007070-40 = "Sim. O Departamento de Desenvolvimento de Fontes Termais tem como atividade principal, literalmente, \"desenvolver fontes termais\", mas como eles frequentemente causam grandes acidentes usando máquinas pesadas como escavadeiras, é um dos clubes mais infames de Gehenna."
10007070-41 = "......Durante o treinamento do acampamento de verão passado, eles também fizeram um alvoroço dizendo que queriam \"desenvolver uma fonte termal de água profunda do oceano\"."
10007070-42 = "Felizmente, até agora, os problemas tinham ficado restritos ao distrito de Gehenna, que já possui muitas fontes termais..."
10007070-43 = "Mas, por algum motivo, desta vez eles parecem estar desenvolvendo uma fonte termal dentro do distrito da Academia Red Winter."
10007070-44 = "Em princípio, atividades de clubes dentro do distrito de outras academias são uma violação grave das regras."
10007070-45 = "Se algo der errado, pode se tornar um problema que levaria a um conflito entre a Academia Gehenna e a Academia Red Winter. Por isso estou aqui como membro do Comitê de Disciplina..."
10007070-46 = "[s] \"Entendo. Então, descanso antes da missão?\""
10007070-47 = "A-a cadeira de massagem é, bem..."
10007070-48 = "Fiquei exausta de tanto seguir os rastros do Departamento de Desenvolvimento de Fontes Termais... pensei em relaxar um pouco no banho e, quando saí, encontrei esta cadeira de massagem..."
10007070-49 = "Colocar uma armadilha tão astuta para despistar o Comitê de Disciplina... o Departamento de Desenvolvimento de Fontes Termais realmente não deve ser subestimado."
10007070-50 = "[s] \"Acho que isso provavelmente não tem nada a ver com as intenções deles...\""
10007070-52 = "[s] \"Não parece que eles estão causando tanto problema, não dá para deixar passar?\""
10007070-53 = "Não. Mesmo que pareça pacífico agora, não podemos baixar a guarda."
10007070-54 = "O Departamento de Desenvolvimento de Fontes Termais é um grupo sem bom senso que não hesita em correr riscos para desenvolver fontes termais..."
10007070-55 = "Se eles decidirem que algo atrapalha o desenvolvimento, não hesitarão em transformar tanto a Academia Red Winter quanto a Academia Gehenna em inimigas."
10007070-56 = "[s] \"A esse ponto...\""
10007070-57 = "Sim... acho que o Sensei ainda não viu a verdadeira face do Departamento de Desenvolvimento de Fontes Termais."
10007070-58 = "Pensando em todas as coisas que eles já fizeram para desenvolver fontes termais..."
10007070-59 = "Por exemplo... não seria estranho se este resort de fontes termais fosse explodido por inteiro agora mesmo."
10007070-60 = "[s] \"!?\""
10007070-61 = "Não se pode julgar as ações do Departamento de Desenvolvimento de Fontes Termais com base no bom senso."
10007070-62 = "Por isso preciso encontrá-los logo, mas não há relatos de avistamentos por aqui... e não é sensato andar por aí no território da Red Winter sem proteção contra o frio..."
10007070-63 = "Então, vou ficar um pouco neste resort, relaxar e esperar o Departamento de Desenvolvimento de Fontes Termais voltar."
10007070-67 = "Bem, vou voltar para a cadeira de massagem... ué?"
10007070-70 = "（Enquanto conversava com Chinatsu, todas as outras cadeiras de massagem foram ocupadas por outras alunas）"
10007070-73 = "......Todas estão exaustas do dia a dia, não é?"
10007070-74 = "Eu queria ter aproveitado um pouco mais, mas... não tem jeito."
10007070-75 = "[s7] \"Eu até sei fazer massagem, mas se a Chinatsu quiser, o que acha?\"\n[s8] \"Se for massagem, pode deixar comigo!\""
10007070-80 = "……Eh? E-e-está tudo bem! Eu não vim aqui para receber uma massagem, e isso seria, bem, é que……!"
10007070-81 = "E-então, eu vou fazer a patrulha da área, com licença!"
10007070-87 = "Antes que pudéssemos impedi-la, Chinatsu saiu apressada para fora das instalações……."
