[translation]
10007070-1 = "第7話;とある風紀委員のふゆやすみっ！？"
10007070-2 = "227号温泉郷・休憩室"
10007070-4 = "（喉が渇いて、自販機がありそうな休憩室へと訪れた）"
10007070-5 = "（そこでは多くの生徒たちが、マッサージチェアにもたれかかっており……）"
10007070-6 = "はあ、身体がほぐされます……気持ち良い……。"
10007070-7 = "ゲヘナの温泉も悪くありませんが、ここの温泉もなかなか……。"
10007070-8 = "[s] \"良い感じに寛いでるね。\""
10007070-9 = "……せ、先生！？"
10007070-10 = "ど、どうしてここに……！？"
10007070-11 = "ちょ、ちょっと待ってくださいっ。すぐにマッサージチェア止めますから……！"
10007070-12 = "……あ、あれ？これは全身マッサージのボタン？"
10007070-13 = "取り消しのボタンはどこに……"
10007070-17 = "きゃあっ！？"
10007070-23 = "[ns1] \"えっと、怪我とかしてない？そんなに慌てなくて良いよ。\"\n[ns2] \"座り直した状態で、聞いてもらって大丈夫だよ。\""
10007070-26 = "で、ですが、マッサージチェアに横になったまま先生とお話しするのは、なんだか失礼ですし……。"
10007070-27 = "それに、そろそろ仕事をしないと……。"
10007070-28 = "こ、こんな姿でそう言っても、説得力は無いかもしれませんが……。"
10007070-29 = "[s3] \"仕事？\"\n[s4] \"ゲヘナ風紀委員会の仕事？\""
10007070-30 = "はい、今回は秘密裏に動いているのですが……もちろんゲヘナの風紀委員会の仕事です。"
10007070-31 = "はい、今回は秘密裏に動いているのですが……。"
10007070-37 = "先生はゲヘナ学園の「温泉開発部」をご存知でしょうか？"
10007070-38 = "[s5] \"うん、ざっくりだけど。\"\n[s6] \"文字通り、温泉を開発する部活だっけ？\""
10007070-39 = "はい。温泉開発部は文字通り「温泉を開発すること」を主な活動としているのですが、掘削機のような重機を使った大きな事故を頻繁に起こすので、ゲヘナの中でもかなり悪名高い部類の部活です。"
10007070-40 = "はい。温泉開発部は文字通り「温泉を開発すること」を主な活動としているのですが、掘削機のような重機を使った大きな事故を頻繁に起こすので、ゲヘナの中でもかなり悪名高い部類の部活です。"
10007070-41 = "……この前の夏季合宿訓練の時も、突然「海洋深層水の温泉開発を」、と大騒ぎでしたし。"
10007070-42 = "幸いなことにこれまでは、温泉がかなり多いゲヘナ自治区内部だけのトラブルで済んでいたのですが……。"
10007070-43 = "今回はどういう訳か、レッドウィンター連邦学園の自治区内で温泉を開発していたようでして。"
10007070-44 = "原則的に、他の学園における自治区内での部活動は重大なルール違反。"
10007070-45 = "一歩間違えれば、ゲヘナ学園とレッドウィンター連邦学園の争いにもなりかねないような問題なのです。そこで風紀委員会の一員としてここに……という形ですね。"
10007070-46 = "[s] \"なるほど。それで、まずは任務の前に休息？\""
10007070-47 = "ま、マッサージチェアは、その……。"
10007070-48 = "ずっと温泉開発部の足跡を追ってたら、何だか疲れが溜まってしまい……まずはお風呂に入って疲れを落とそうと思ったら、ちょうど出たところにマッサージチェアがありまして……。"
10007070-49 = "風紀委員会の追跡をかわすために、こんなズルい罠を仕掛けるとは……温泉開発部、やはり侮れませんね。"
10007070-50 = "[s] \"それは多分、温泉開発部の意図とは関係無い気もするけど……。\""
10007070-52 = "[s] \"あんまり迷惑かけてなさそうだし、このまま放っておくってわけには？”"
10007070-53 = "いえ。今は平和そうに見えても、安心はできません。"
10007070-54 = "温泉開発部は温泉開発のためなら、どんなリスクも厭わない非常識な集団……。"
10007070-55 = "もし温泉開発の邪魔になると判断すれば、レッドウィンター連邦学園とゲヘナ学園の両方を敵に回すことも躊躇わないでしょう。"
10007070-56 = "[s] \"そこまでなんだ……。\""
10007070-57 = "はい……おそらく先生は、まだ温泉開発部の真の姿を見ていないのだと思います。"
10007070-58 = "今まで温泉開発部が、温泉を開発するためにやらかした数々のことを思うと……。"
10007070-59 = "例えばですが……この温泉郷が今から、丸ごと爆破されてしまってもおかしくありません。"
10007070-60 = "[s] \"！？\""
10007070-61 = "温泉開発部の行動は、常識的な判断で考えてはいけません。"
10007070-62 = "それで早く見つけないとなのですが、この周辺での目撃情報もありませんし……防寒対策もしないままレッドウィンターの敷地内を無暗に歩き回るのも、賢明ではないので……。"
10007070-63 = "なのでしばらくはこの温泉郷でゆっくり、温泉開発部が帰ってくるのを待つことにします。"
10007070-67 = "では、あらためてマッサージチェアを……あれ？"
10007070-70 = "（チナツと会話をしている間に、残りのマッサージチェアが全て他の生徒たちで埋まってしまっていた）"
10007070-73 = "……みなさん、日々疲れているのですね。"
10007070-74 = "もう少し堪能したかったのですが……仕方ありません。"
10007070-75 = "[s7] \"一応私マッサージできるけど、チナツが良ければどう？\"\n[s8] \"マッサージなら任せて！\""
10007070-80 = "……えっ？だ、だ、大丈夫です！ここにマッサージを受けに来たわけでもありませんし、それは流石にその……！"
10007070-81 = "で、では私は、周辺のパトロールに行きますので！"
10007070-87 = "引き留める間もなく、チナツは施設の外へと行ってしまった……。"
