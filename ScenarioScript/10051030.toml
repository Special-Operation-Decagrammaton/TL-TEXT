[translation]
10051030-1 = "Episódio 3: Encontro com o Talento"
10051030-2 = "Sala do Clube Yin-Yang"
10051030-3 = "Entendo. Então foi isso que aconteceu logo depois de ontem."
10051030-4 = "Sim... foi como as coisas acabaram acontecendo..."
10051030-5 = "O vestido foi consertado, então não há problemas, mas..."
10051030-6 = "Mas temos um problema... #nO Clube Yin-Yang não tem mais nenhum vestido maior que aquele."
10051030-7 = "O quê!?"
10051030-8 = "[s] \"Não dá para comprar um em uma loja próxima?\""
10051030-9 = "Eu já entrei em contato com a boutique, mas..."
10051030-10 = "Parece que, para o tamanho da Tsukuyo, só sob medida mesmo."
10051030-11 = "Então, peça agora mesmo—!"
10051030-12 = "Mas o evento começa em uma hora?"
10051030-13 = "Ah...!"
10051030-14 = "Não tem jeito."
10051030-15 = "Já que chegamos a esse ponto, só resta uma solução."
10051030-16 = "Existe um jeito!?"
10051030-17 = "Claro."
10051030-18 = "Só que... é um método que parte um pouco o coração..."
10051030-19 = "Hum...?"
10051030-21 = "(1 hora depois...)"
10051030-22 = "(A missão de escolta do Clube de Pesquisa de Ninjutsu começou)"
10051030-24 = "Interior do salão de banquetes do desfile de moda"
10051030-26 = "Uau, quanta gente... estou ficando tonta..."
10051030-27 = "Mas preciso fazer o que tem que ser feito!"
10051030-28 = "Responda, Agente Disfarçada 02. Está me ouvindo?"
10051030-32 = "Sim! Aqui é a Agente Disfarçada 02, estou ouvindo perfeitamente!"
10051030-33 = "Qual é a sua posição atual?"
10051030-34 = "Estou aguardando no lado leste do salão de banquetes, conforme as instruções!"
10051030-35 = "Entendido, continue assim!"
10051030-39 = "A Izuna parece estar bem. Agora..."
10051030-40 = "Agente Disfarçada 03, consegue me ouvir?"
10051030-42 = "Entrada principal do salão de banquetes do desfile de moda"
10051030-44 = "S-sim, aqui é a Agente Disfarçada 03... estou ouvindo..."
10051030-45 = "E-estou aguardando na entrada principal do salão..."
10051030-46 = "Tsukuyo, me desculpe..."
10051030-47 = "Você acabou ficando do lado de fora do salão sozinha..."
10051030-48 = "Os organizadores disseram que não dá para entrar sem estar usando um vestido..."
10051030-49 = "N-não precisa se desculpar, chefe!"
10051030-50 = "É que eu sou grande demais, só isso..."
10051030-51 = "E eu me sinto mais confortável com minhas roupas normais mesmo...!"
10051030-52 = "Obrigada por dizer isso."
10051030-53 = "Certo! Quando a missão terminar, vamos comer lámen!"
10051030-54 = "Precisamos nos vingar daquela sessão de fotos também!"
10051030-55 = "S-sim!"
10051030-56 = "Macarrão bem grosso! Gordura extra! E para finalizar, óleo de pimenta—"
10051030-57 = "Ah!"
10051030-58 = "O que foi!?"
10051030-59 = "A, a Shine Cat chegou!"
10051030-67 = "VIP confirmado! Todos, para seus postos!"
10051030-68 = "...É assim mesmo, né?"
10051030-72 = "（Calma, calma...！）"
10051030-73 = "（Só preciso ficar de olho para ver se não tem ninguém suspeito por perto...！）"
10051030-79 = "Você aí."
10051030-80 = "H-hein!?"
10051030-81 = "O que está fazendo aqui?"
10051030-82 = "E-eu... e-estou fazendo a segurança..."
10051030-83 = "O show vai começar em breve, não vai?#nPor que uma modelo estaria andando por fora do local?"
10051030-84 = "Hã!?"
10051030-85 = "Se tem tempo para ficar surpresa, volte logo para o camarim!"
10051030-86 = "A-a-ah, espere...!"
10051030-88 = "E-eu não sou uma modelo... eu juro!!"
10051030-93 = "É mesmo?"
10051030-94 = "Mas, olhando bem, você parece ser uma..."
10051030-95 = "E-eu sou apenas a responsável pela segurança..."
10051030-96 = "...Entendo."
10051030-97 = "Se foi um mal-entendido da minha parte, peço desculpas."
10051030-98 = "Mas..."
10051030-105 = "Ah... que desperdício."
10051030-106 = "Esse porte físico, esse talento... e você está na segurança..."
10051030-107 = "Sim...?"
10051030-108 = "Foi só um pensamento em voz alta."
10051030-109 = "Não se preocupe com isso."
10051030-110 = "Só porque alguém tem talento, não significa que precise seguir esse caminho."
10051030-111 = "Ainda assim... hum..."
10051030-112 = "...?"
10051030-113 = "Realmente, seria uma pena deixar passar."
10051030-114 = "Qual é o seu nome?"
10051030-115 = "Hein!?"
10051030-116 = "Oono Tsukuyo, é..."
10051030-117 = "Sou do Clube de Pesquisa de Ninjutsu, e minha idade é..."
10051030-118 = "Ah, não importa a qual clube você pertence."
10051030-119 = "Oono Tsukuyo. Vou me lembrar disso."
10051030-120 = "É bom que você se lembre de mim também."
10051030-121 = "...Aqui, pegue."
10051030-122 = "U-um cartão de visitas...!"
10051030-123 = "Bem, eu já vou indo."
10051030-127 = "（O-o que foi isso agora...?）"
10051030-128 = "（Uma pessoa tão importante, querendo saber meu nome...? E ainda me deu um cartão...?）"
10051030-129 = "（N-não consigo entender o que ela está pensando...）"
10051030-130 = "（Uuu...）"
10051030-131 = "（N-não, não, não posso ficar pensando nisso!）"
10051030-132 = "（Eu só preciso cumprir minha missão corretamente...!）"
10051030-133 = "...Certo! Oono Tsukuyo, iniciando a operação de segurança externa!"
10051030-135 = "Camarim do desfile de moda"
10051030-136 = "Os preparativos estão indo bem?"
10051030-137 = "Com certeza! Tudo está correndo conforme o planejado!"
10051030-138 = "Espero que as roupas estejam bem guardadas, não é?"
10051030-139 = "Cada uma delas é única no mundo... não há como substituí-las."
10051030-140 = "Sim! Estão bem guardadas na sala dos fundos!"
10051030-141 = "O ambiente está livre de luz solar direta, com desumidificação e controle de odores impecáveis!"
10051030-142 = "Gostaria de verificar uma vez?"
10051030-143 = "Ah, vamos fazer isso."
10051030-144 = "Já está quase na hora das modelos se trocarem."
10051030-145 = "Onde fica a sala com os trajes?"
10051030-146 = "Eu vou guiá-lo."
10051030-147 = "Por aqui, por favor!"
10051030-151 = "É aqui que... ué?"
10051030-152 = "A porta está... aberta...?"
10051030-153 = "O que houve?"
10051030-154 = "N-não... não é nada!"
10051030-155 = "Os trajes estão nesta sala..."
10051030-159 = "A-aaaaaaah...!"
10051030-160 = "Q-que aconteceu!?"
10051030-161 = "I-isso não pode ser...!"
10051030-162 = "S-s-s-Shine Cat...!"
10051030-163 = "M-m-mil perdões!!"
10051030-164 = "É uma emergência!!"
10051030-165 = "Não estou entendendo nada... explique-se direito!"
10051030-166 = "É-é que..."
10051030-167 = "As obras da Shine Cat... todas elas...!!"
10051030-168 = "N-não... isso é um sonho, tem que ser um sonho...!"
10051030-169 = "Saia da frente, agora!"
10051030-173 = "É nesta sala mesmo, não é...?"
10051030-174 = "Onde estão as minhas obras...!?"
10051030-175 = "M-mil perdões!#nAté agora há pouco, elas estavam certamente aqui...!"
10051030-176 = "Chega de desculpas!"
10051030-178 = "Capture o culpado agora mesmo!!"
10051030-179 = "Hã!?"
10051030-180 = "Não entendeu o que eu disse!?#nO culpado que roubou as minhas obras! Traga-o à minha frente! Agora mesmo!!"
10051030-181 = "Se não conseguir fazer isso, todos vocês estão demitidos! Entendido!?"
10051030-182 = "I-iiih! Entendido!!"
