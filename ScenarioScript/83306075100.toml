[translation]
83306075100-6 = "Reunidos em um lugar desses... que barulhentos vocês são."
83306075100-7 = "Gah! A presidente do Comitê Disciplinar? Por que você está aqui!?"
83306075100-8 = "É apenas uma patrulha."
83306075100-9 = "N-nós ainda não fizemos nada!"
83306075100-10 = "É isso mesmo! Você vai nos prender mesmo assim!?"
83306075100-12 = "......O que vocês pensam que eu sou?"
83306075100-13 = "Bem, suponho que não possa evitar que me entendam mal."
83306075100-14 = "Então, existe algum motivo para estarem reunidos na entrada?"
83306075100-15 = "......É um inseto."
83306075100-16 = "Hm?"
83306075100-17 = "Um inseto, um inseto! Um inseto enorme desapareceu debaixo da cama!"
83306075100-18 = "Por isso estamos todos reunidos aqui! E olha que viemos até o Departamento de Medicina de Emergência..."
83306075100-20 = "Entendo, era isso."
