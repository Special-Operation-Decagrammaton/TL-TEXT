[translation]
83306075100-6 = "こんな所に集まって……騒がしいわね。"
83306075100-7 = "げっ！風紀委員長？どうしてここに！？"
83306075100-8 = "ただのパトロールよ。"
83306075100-9 = "わ、私たちはまだ何もしてないぞ！"
83306075100-10 = "そうだ！なのに捕まえようっていうのか！？"
83306075100-12 = "……私を何だと思ってるの？"
83306075100-13 = "まあ、誤解されても仕方ないとは思うけれど。"
83306075100-14 = "それで、入り口に集まっているのには理由があるの？"
83306075100-15 = "……しだよ。"
83306075100-16 = "ん？"
83306075100-17 = "虫だよ、虫！ものすごく大きな虫がベッドの下に消えたんだよ！"
83306075100-18 = "だから、こうして集まってるんだ！せっかく救急医学部まで来たのに……！"
83306075100-20 = "そうだったのね。"
