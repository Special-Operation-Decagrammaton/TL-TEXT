[translation]
1006105-1 = "秘密の夜"
1006105-2 = "（サクラコに言われた通り、大聖堂内部にある回廊へ向かった）"
1006105-3 = "（夜遅い時間だったからか、明かりも消えており、人気も無かった）"
1006105-4 = "いらっしゃいませ、先生。"
1006105-5 = "ずっと、お待ちしておりました。"
1006105-10 = "遅い時間にも関わらず、応じてくださり、本当にありがとうございます……"
1006105-11 = "感謝の気持ちと同時に、申し訳ない気持ちにも苛まれております。"
1006105-12 = "人目につかない場所が必要だったので……#nこんな時間にお呼び立てしてしまう事になり申し訳ありません。"
1006105-13 = "……これは……私個人の用事なのです。"
1006105-14 = "私の……想いを打ち明ける場になるかと思います。"
1006105-15 = "いつもは他の方の秘密をお聞きして、共に祈りを捧げるのが私の務めですが、"
1006105-16 = "今日……今だけは、"
1006105-22 = "先生に、私の秘密を聞いていただきたくて。"
1006105-23 = "[s1] \"打ち明ける……？\"\n[s2] \"秘密……？\""
1006105-26 = "ふふっ……先生が期待しているようなお話とは違うかもしれません。"
1006105-27 = "ですが、もしかしたら先生は既に予想されていることかもしれませんね。"
1006105-28 = "ですが実は……今もまだ迷っています。"
1006105-29 = "先生にご迷惑をかける事だけは避けたいのですが……#nとはいえ……悩みの種を増やしてしまうやも。"
1006105-30 = "口にするだけで……そうなる可能性があるのです。"
1006105-34 = "そういう類のものを聞きたくはない、ということでしたら今からでも構いません。私の事は気にせず、シャーレに戻っていただいて大丈夫です。"
1006105-35 = "それに対して私が失望したり、悲しんだりすることはありません。#nいま、ここに誓いましょう。"
1006105-36 = "[s3] \"先生としては難しいかな……。\"\n[s4] \"逆にすごく気になるかな。\""
1006105-39 = "……そうですか。ふふ。"
1006105-40 = "何だかそんな予感がしておりました。#n勇気を出して、よかったです。"
1006105-41 = "では……"
1006105-45 = "少し、外で風に当たりませんか？"
1006105-52 = "実は私も、シスターフッドの皆様も……"
1006105-53 = "この学園に纏わる様々な事を知っており、日々対応しております。"
1006105-54 = "一般的な事から――口に出す事も憚られるような事まで。"
1006105-55 = "シスターフッドは、歴史のある組織ですから、#n表に出せない秘密の一つや二つ、あったとしても不思議ではないでしょう？"
1006105-56 = "それは――組織である以上、必要な事でもあります。"
1006105-57 = "このことを……他の皆様は知りません。#n経典の知識として理解している方はいらっしゃるかとは思いますが……。"
1006105-58 = "それがどのような向き・形であれ、切実な理由があったとしても……#n他の方に対して口を開くことは難しいです。"
1006105-59 = "たとえ、相手が先生であっても――"
1006105-60 = "言葉にするのは、難しいです……私の悩みの大半はそういったもので――"
1006105-65 = "……その、"
1006105-66 = "お話したいと言ったものの、具体的な内容に触れられず……#n本当に申し訳ありません。"
1006105-67 = "[s5] \"ううん大丈夫。それよりも大事なのは、\"\n[s6] \"サクラコが話してくれる事だからね。\""
1006105-70 = "先生……。"
1006105-71 = "……ふふっ。"
1006105-72 = "……もう悩みが解決してしまったような気持ちです。"
1006105-73 = "そう、ですね……"
1006105-79 = "今日は……それが目的だったのです。"
1006105-82 = "[wa:1400]― 先生に対して、"
1006105-84 = "[wa:1750]― あまり[wa:400]隠し事をしたくはないのですが……"
1006105-87 = "[wa:50]― 私の立場上、"
1006105-89 = "[wa:50]― 全てを明かすことは[wa:1250]難しく――"
1006105-92 = "[wa:1350]― ですが、"
1006105-94 = "― 私に[wa:500]「秘密があるという事実」[wa:1600]だけでも……"
1006105-97 = "― お伝えする事ができて、[wa:2250]良かったです。"
1006105-100 = "[wa:1200]― 理解を得られるとは"
1006105-102 = "― 思っておりません。"
1006105-105 = "― それを望む事も……"
1006105-108 = "― それでも、[wa:1650]私の素顔を"
1006105-110 = "― お見せしたい気持ちは……[wa:2000]あるのです。"
1006105-113 = "[wa:1000]― その……"
1006105-116 = "― そのような私でも良いのか、"
1006105-118 = "― 不安では[wa:700]あったのですが。"
1006105-121 = "[wa:1300]― 思っていたよりも早く、"
1006105-123 = "― 答えを頂いてしまいましたね。"
1006105-126 = "― 本当に……[wa:2100]ありがとうございます、[wa:1500]先生。"
1006105-129 = "先生のための祈りも、前よりもまっすぐな気持ちで捧げられると思うと嬉しいです。"
1006105-130 = "先生が出会う日常や出来事が幸せに満ちていますよう。"
1006105-131 = "これまで以上に、まっすぐな思いを込めて。"
1006105-135 = "……祈りを捧げます。私の意識がここに在る限りずっと、"
1006105-136 = "先生のために。"
1006105-138 = "（その後、サクラコと聖堂付近を散策して、シャーレに戻った）"
