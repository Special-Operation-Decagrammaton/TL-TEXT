[translation]
21110-1 = "Episódio 11; O que havia lá"
21110-2 = "Interior da Fábrica"
21110-7 = "Haa, haa... Deu tudo certo, será?"
21110-8 = "Infiltração bem sucedida. Missão concluída."
21110-9 = "Ei, ei, será que nós não somos na verdade super fortes? Se lutarmos contra a C&C ou grupos de combate de outras escolas, talvez a gente ganhe!"
21110-10 = "Pelo menos contra a C&C eu tenho certeza de que seria impossível, mas... Confesso que até eu tô meio surpresa."
21110-11 = "Com certeza foi graças ao comando do Sensei."
21110-12 = "Eu também acho isso... A sensação de segurança é completamente diferente com o Sensei aqui..."
21110-13 = "Falando nisso, a munição de vocês não acabou, não é?"
21110-14 = "A minha bateria está piscando... Será que isso significa que 'Falta Mana'?"
21110-15 = "Deve ser, sinto que ela só aguenta mais um tiro..."
21110-16 = "Nesse caso, vamos tentar evitar combates o máximo possível."
21110-18 = "Este lugar é...?"
21110-19 = "Ah..."
21110-20 = "Aris, o que foi?"
21110-21 = "......"
21110-22 = "Eu não sei... Mas é uma paisagem de alguma forma familiar. Precisamos ir por ali."
21110-24 = "Eh?"
21110-26 = "Isso não está na memória da Aris, mas... é como se eu tivesse um 'Save Data' guardado."
21110-27 = "O meu corpo está reagindo."
21110-30 = "Para usar uma metáfora, sim, é como conseguir avançar mesmo sem tutoriais ou explicações... Ou como se estivesse jogando um jogo que já zerei várias vezes..."
21110-31 = "Como assim...? É verdade que este lugar se parece muito com aquele de onde você veio, mas..."
21110-32 = "Ah, tem um computador ali... Ué?"
21110-33 = "Aquele computador, tá ligado...?"
21110-36 = "......"
21110-37 = "(Bip)"
21110-38 = "[Bem-vindo ao Divi:Sion System. Por favor, insira o item que deseja pesquisar.]"
21110-39 = "Oh, um design super amigável que eu não esperava ver. Que tal procurarmos pela G.Bible?"
21110-40 = "Não, isso não é um pouco suspeito demais? Além disso, se ele disse 'Bem-vindo', isso significa que... esse 'Division System' é o nome desta fábrica...?"
21110-41 = "(Swoosh)"
21110-42 = "Teclado encontrado... Vou digitar: G.Bible."
21110-43 = "Ah, apareceu alguma coisa!"
21110-44 = "......"
21110-45 = "......#$@#$$%#%^*&(#@"
21110-46 = "Q-Quebrou!? Aris, o que diabos você digitou!?"
21110-47 = "N-Não, eu ainda nem apertei Enter, mas..."
21110-50 = "[56cd7b]Você é AL-1S?"
21110-53 = "!?"
21110-54 = "!!"
21110-55 = "?"
21110-56 = "Não, Aris é Aris..."
21110-57 = "E-Espera aí!"
21110-58 = "......Tem algo de errado. Aris-chan, por enquanto é melhor você não digitar nad..."
21110-60 = "[Reconhecimento de voz concluído, credenciais confirmadas. Bem-vinda de volta, AL-1S.]"
21110-61 = "!?"
21110-62 = "Tem até reconhecimento de voz!?"
21110-63 = "Ehm... Esse negócio de AL-1S, é sobre você, Aris-chan?"
21110-64 = "Ah, desculpa. Agora que parei pra pensar, eu não tinha contado isso pra Yuzu-chan."
21110-65 = "......"
21110-66 = "O verdadeiro nome... da Aris... O verdadeiro... Eu..."
21110-67 = "Você sabe alguma coisa sobre a AL-1S?"
21110-68 = "......"
21110-69 = "............"
21110-70 = "A resposta tá lenta...?"
21110-71 = "A tela também tá ficando meio embaçada, será que travou o processamento?"
21110-72 = "É q......@!#%#@!$%@!!!!"
21110-73 = "E-Eh? O que é isso, o que isso significa!?"
21110-74 = "Isso é..."
21110-75 = "......"
21110-76 = "Ocorrência de emergência."
21110-77 = "O limite de energia foi alcançado. Os dados serão perdidos assim que o sistema for desligado. Tempo restante: 51 segundos."
21110-78 = "Eeeh!? N-Não pode ser! Pelo menos me conta sobre a G.Bible antes disso!"
21110-79 = "O que você busca é a G.Bible? <YES / NO>"
21110-80 = "!?"
21110-81 = "YES!"
21110-82 = "G.Bible... Confirmação concluída. Código: Jogo... Humanos, Compreensão, Referência. Número de registro da biblioteca: 193. Dado marcado para descarte nº 1. Tempo restante: 35 segundos."
21110-83 = "Descarte!? Por quê!? Isso é o tesouro dos desenvolvedores de jogos, ou melhor, o tesouro deste mundo inteiro!"
21110-84 = "Se você deseja a G.Bible, farei uma proposta. Conecte um dispositivo de armazenamento para transferência de dados."
21110-85 = "Eh...? Você sabe onde a G.Bible está?"
21110-87 = "[56cd7b]Vocês também sabem."
21110-90 = "[56cd7b]Bem aí, na sua frente."
21110-92 = "C-Como assim!?"
21110-94 = "Para ser exato, a G.Bible está dentro de mim. Porém, como eu estou prestes a desaparecer, desejo migrar para um novo dispositivo de armazenamento."
21110-95 = "V-Você fala isso, mas arrumar um dispositivo de armazenamento de repente é... Ah, serve o cartão de memória do 'Game Girls Advance SP'?"
21110-96 = "......................Bem, é possível."
21110-97 = "N-Não sei o porquê, mas sinto que ele aceitou isso muito a contragosto... É impressão minha?"
21110-98 = "Cabo de dados... Conexão concluída!"
21110-99 = "Iniciando transferência... Espaço de armazenamento insuficiente. Apagando os dados existentes. Tempo restante: 9 segundos."
21110-100 = "E-Eh, mentira!? Por acaso você não tá apagando os meus saves, né!? Ei!?"
21110-101 = "Como não há capacidade suficiente, estou assegurando espaço."
21110-102 = "N-Não! Por favor, pelo menos deixa os meus saves aí! Deu um baita trabalho juntar todo aquele equipamen――"
21110-103 = "Lamento, apagando."
21110-104 = "Eiiiiiiiii, paraaaa coooom isssooo!?"
21110-105 = "......"
21110-107 = "............"
21110-108 = "Ué... Acabou a energia...?"
21110-109 = "Ahhhhhh! Os dados do meu Game Girls Advanceeeee!!"
21110-111 = "Ah, espera!"
21110-112 = "Tem alguma coisa na tela...?"
21110-113 = "Transferência concluída."
21110-114 = "Eh?"
21110-115 = "Novos dados foram transferidos."
21110-116 = "<G.Bible.exe>"
21110-117 = "I-Isso é!?"
21110-118 = "V-Vamos executar isso agora mesmo! Precisamos confirmar se é de verdade!"
21110-120 = "Executando o exe! Ah, abriu um pop-up..."
21110-121 = "Espera aí, precisa de uma senha!? O que é isso, o que a gente faz agora!?"
21110-122 = "......Não tem problema. A Veritas deve conseguir contornar uma senha comum sem dificuldades...!"
21110-123 = "(Acena, acena!)"
21110-124 = "É, tem razão, se a gente fizer isso...!"
21110-125 = "Se tivermos isso, um jogo realmente divertido... 'Tales Saga Chronicle 2' poderá...!"
21110-126 = "Sim, poderemos criá-lo! Beleza!"
21110-127 = "Nos aguarde, Millennium Prize... Não, o Grande Prêmio de Jogos de Kivotos! Nosso novo jogo vai abalar o mundo dos jogos de Kivotos de um jeito bom desta vez!!"
21110-129 = "M-Mana, você tá falando alto demais. Gritar assim..."
21110-134 = "......"
21110-135 = "É a m-mesma coisa que d-dizer que estamos aqui..."
21110-136 = "Ai, ai..."
21110-137 = "■■■ ■ ■! ■■■!"
21110-138 = "N-Nossa, eles parecem muito zangados!?"
21110-140 = "(Tatatatata!)"
21110-142 = "Waaah, eles estão atirando! Vamos fugir, rápido!"
21110-143 = "Mana, antes disso...!"
21110-144 = "É mesmo, garantindo o Game Girls Advance! Yuzu, avance protegendo o Sensei! Eu e a Aris seremos a retaguarda, vamos escapar todos juntos abrindo caminho através dos robôs!"
21110-145 = "Eu também vou dar cobertura!"
21110-146 = "Finalmente conseguimos a G.Bible, não vamos perder num lugar como esse...!"
21110-147 = "......Vamos todos voltar em segurança para a sala do clube!"
21110-152 = "Sim!"