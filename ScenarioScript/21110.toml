[translation]
21110-1 = "Episódio 11; O que estava lá"
21110-2 = "Interior da fábrica"
21110-7 = "Haa, haa... Conseguimos, eu acho?"
21110-8 = "Invasão bem-sucedida. Missão concluída."
21110-9 = "Ei, ei, será que na verdade nós somos muito fortes? Talvez a gente até consiga vencer a C&C ou outros grupos de combate de outras escolas!"
21110-10 = "Acho que contra a C&C é impossível, com certeza... Mas, admito que estou um pouco surpresa também."
21110-11 = "Com certeza é graças ao comando do Sensei."
21110-12 = "Eu também acho... Quando o Sensei está por perto, a sensação de segurança é totalmente diferente..."
21110-13 = "Aliás, a munição de todas ainda está ok?"
21110-14 = "Minha bateria está piscando... Será que isso significa que 'falta mana'?"
21110-15 = "Pode ser, acho que só dura mais uma vez..."
21110-16 = "Então, vamos tentar evitar combates o máximo possível."
21110-18 = "Onde é aqui...?"
21110-19 = "Ah..."
21110-20 = "Alice, o que houve?"
21110-21 = "..."
21110-22 = "Não sei... Mas é uma paisagem que me parece familiar. Precisamos ir por aqui."
21110-24 = "Hã?"
21110-26 = "Não está nas memórias da Alice, mas... é como se eu tivesse um 'arquivo de salvamento'."
21110-27 = "Este corpo está reagindo."
21110-30 = "Para comparar, é como se eu pudesse avançar sem precisar de tutoriais ou explicações... Ou como se estivesse jogando um jogo que já joguei várias vezes..."
21110-31 = "O que isso significa...? É verdade que parece um pouco com o lugar onde a Alice estava originalmente, mas..."
21110-32 = "Ah, tem um computador ali... Ué?"
21110-33 = "Aquele computador, ele está ligado...?"
21110-36 = "..."
21110-37 = "(Bip)"
21110-38 = "[Bem-vindo ao sistema Divi:Sion. Por favor, insira o item que deseja buscar]"
21110-39 = "Oh, que design surpreendentemente amigável. Vamos pesquisar sobre a G.Bible?"
21110-40 = "Não, isso não é suspeito demais? Além disso, se diz 'bem-vindo', será que 'Divi:Sion System' é o nome desta fábrica...?"
21110-41 = "(Desliza)"
21110-42 = "Encontrei o teclado... Vou digitar G.Bible."
21110-43 = "Ah, apareceu alguma coisa!"
21110-44 = "..."
21110-45 = "...#$@#$$%#%^*&（#@"
21110-46 = "E-estragou!? Alice, o que exatamente você digitou!?"
21110-47 = "N-não, eu nem deveria ter apertado o Enter ainda..."
21110-50 = "[56cd7b]Você é a AL-1S?"
21110-53 = "!?"
21110-54 = "!!"
21110-55 = "?"
21110-56 = "Não, a Alice é a Alice..."
21110-57 = "E-espera!"
21110-58 = "...Tem algo errado. Alice-chan, por enquanto é melhor não digitar nada..."
21110-60 = "[Reconhecimento de voz concluído, credenciais confirmadas. Bem-vinda de volta, AL-1S]"
21110-61 = "!?"
21110-62 = "Com reconhecimento de voz!?"
21110-63 = "Ei... AL-1S, esse é o nome da Alice-chan?"
21110-64 = "Ah, desculpe. Acho que não tinha contado para a Yuzu-chan."
21110-65 = "..."
21110-66 = "O verdadeiro nome da Alice... a verdadeira, eu..."
21110-67 = "Você sabe sobre a AL-1S?"
21110-68 = "……"
21110-69 = "…………"
21110-70 = "A resposta está lenta……?"
21110-71 = "A tela também está ficando embaçada, será que está com problemas de processamento?"
21110-72 = "É……@！#%#@！$%@！！！！ "
21110-73 = "Ei, ei? O que é isso, o que significa!?"
21110-74 = "Isso é……"
21110-75 = "……"
21110-76 = "Estado de emergência detectado."
21110-77 = "Limite de energia atingido, o sistema será desligado e eu desaparecerei. Tempo restante: 51 segundos."
21110-78 = "O quê!? N-não! Pelo menos me conte sobre a G.Bible antes disso!"
21110-79 = "O que você está procurando é a G.Bible? <YES / NO>"
21110-80 = "!?"
21110-81 = "YES!"
21110-82 = "G.Bible…… confirmação concluída, código: Jogo…… humano, compreensão, referência, número de registro da biblioteca 193, objeto de descarte número 1. Tempo restante: 35 segundos."
21110-83 = "Descarte!? Por quê!? Isso é um tesouro para as desenvolvedoras de jogos, não, para este mundo todo!"
21110-84 = "Se você deseja a G.Bible, eu proponho uma solução. Conecte um dispositivo de armazenamento para a transferência de dados."
21110-85 = "Hã……? Você sabe onde a G.Bible está?"
21110-87 = "[56cd7b]Vocês também sabem."
21110-90 = "[56cd7b]Agora, bem na sua frente."
21110-92 = "O-o que você quer dizer com isso!?"
21110-94 = "Para ser exata, a G.Bible está dentro de mim. No entanto, estou prestes a desaparecer, então desejo migrar para um novo dispositivo de armazenamento."
21110-95 = "B-bem, dizendo assim de repente... ah, o cartão de memória do meu \"Game Girls Advance SP\" serve?"
21110-96 = "……………………bem, é possível."
21110-97 = "N-não sei por que, mas sinto que você está muito relutante…… é impressão minha?"
21110-98 = "Cabo de dados…… conexão concluída!"
21110-99 = "Iniciando transferência…… espaço de armazenamento insuficiente, excluindo dados existentes. Tempo restante: 9 segundos."
21110-100 = "Ei, mentira!? Você não está apagando meus dados salvos, está!? Ei!?"
21110-101 = "Como a capacidade é insuficiente, estou liberando espaço."
21110-102 = "N-não! Por favor, deixe meus dados salvos! Foi muito difícil conseguir todos aqueles equipamentos, não――"
21110-103 = "Lamento, excluído."
21110-104 = "Qual ééééééééééé!?"
21110-105 = "……"
21110-107 = "…………"
21110-108 = "Ué…… a energia acabou……?"
21110-109 = "Aaaaaah! Meus dados do Game Girls Advance!!"
21110-111 = "Ah, espere!"
21110-112 = "Tem algo na tela……?"
21110-113 = "Transferência concluída."
21110-114 = "Hã?"
21110-115 = "Novos dados transferidos."
21110-116 = "<G.Bible.exe>"
21110-117 = "I-isso é……!?"
21110-118 = "V-vou executar isso agora mesmo! Preciso confirmar se é real!"
21110-120 = "Executando exe! Ah, apareceu um pop-up……"
21110-121 = "Espera, precisa de uma senha!? O que é isso, o que eu faço!?"
21110-122 = "……Tudo bem. Se for uma senha comum, a Veritas deve conseguir descriptografar……!"
21110-123 = "(Concorda com a cabeça!)"
21110-124 = "É-é verdade, se fizermos isso……!"
21110-125 = "Com isso, um jogo realmente interessante... 'Tales Saga Chronicle 2'...!"
21110-126 = "Sim, com certeza dá para fazer! Certo!"
21110-127 = "Espere por nós, Millennium Prize... não, Grande Prêmio de Jogos de Kivotos! Nosso novo jogo vai causar um impacto positivo no mundo dos jogos de Kivotos desta vez, pode apostar!!"
21110-129 = "I-irmã, você está falando muito alto. Se gritar desse jeito..."
21110-134 = "..."
21110-135 = "É basicamente dizer para todo mundo que estamos aqui..."
21110-136 = "Ah, droga..."
21110-137 = "■■■ ■ ■! ■■■!"
21110-138 = "Q-que raiva toda é essa!?"
21110-140 = "(Tatatata!)"
21110-142 = "Ah, eles atiraram! Vamos fugir logo!"
21110-143 = "Irmã, antes disso...!"
21110-144 = "Certo, Game Girls Advance garantido! Yuzu, avance protegendo o Sensei! Eu e a Alice seremos a retaguarda, vamos todos expulsar esses robôs e escapar!"
21110-145 = "Eu também vou dar cobertura!"
21110-146 = "Depois de finalmente conseguir a G.Bible, não podemos ser derrotadas em um lugar como este...!"
21110-147 = "...Vamos todos voltar para a sala do clube em segurança!"
21110-152 = "Sim!"
