[translation]#[Texto Final , mas eventualmente pode haver alterações na formatação de texto. - Filipe 29/06.]
21110-1 = "Episódio 11: O Que Havia Lá."
21110-2 = "Interior da Fábrica"
21110-7 = "Hah, hah…… no fim deu certo, né?"
21110-8 = "Invasão bem-sucedida. Missão concluída."
21110-9 = "Ei, ei, será que a gente, na real, não é\nsuper forte? Quem sabe a gente até ganhasse\ndo C&C, ou de outros grupos de combate\nde outras colégios!"
21110-10 = "Do C&C eu acho que era impossível, com certeza……\nmas, de fato, até eu fiquei meio surpresa."
21110-11 = "Com certeza é graças ao comando do Sensei."
21110-12 = "Eu também acho…… com o Sensei por perto,\na sensação de segurança é totalmente outra……"
21110-13 = "Aliás, ninguém tá ficando sem munição?"
21110-14 = "A minha bateria tá piscando……\nseria isso \"mana insuficiente\"?"
21110-15 = "Pode ser, parece que aguenta só mais\numa vez, no máximo……"
21110-16 = "Então bora evitar combate o quanto der."
21110-18 = "Que lugar é este……?"
21110-19 = "Ah……"
21110-20 = "Aris, que foi?"
21110-21 = "……"
21110-22 = "Não sei dizer…… mas é uma paisagem que, de algum\njeito, me é familiar. Eu preciso ir por aqui."
21110-24 = "Hã?"
21110-26 = "Não está na memória da Aris…… mas é como se\neu tivesse um \"dado de save\"."
21110-27 = "Este corpo está reagindo."
21110-30 = "Pra comparar, é assim: como se desse pra avançar\nsem tutorial nem explicação…… ou então, como\nse eu estivesse jogando um jogo que já joguei\nvárias e várias vezes……"
21110-31 = "Como assim……? É verdade que é parecido com o\nlugar onde a Aris estava originalmente, mas……"
21110-32 = "Ah, ali tem um computador…… ué?"
21110-33 = "Aquele computador, está ligado……?"
21110-36 = "……"
21110-37 = "(Bip-bip)"
21110-38 = "［Seja muito bem-vindo ao Divi:Sion System. Por favor, insira o item que procura］"
21110-39 = "Oh, que designzinho prestativo, quem diria.\nBora pesquisar sobre a G.Bible?"
21110-40 = "Não, isso não tá suspeito demais? Aliás, esse\n\"seja muito bem-vindo\" quer dizer que…… \"Divi:Sion\nSystem\" é o nome desta fábrica……?"
21110-41 = "(Pronta)"
21110-42 = "Teclado localizado……\nvou digitar \"G.Bible\"."
21110-43 = "Ah, apareceu alguma coisa!"
21110-44 = "……"
21110-45 = "……#$@#$$%#%^*&（#@"
21110-46 = "Q-quebrou!? Aris, o que foi que você digitou!?"
21110-47 = "N-não, eu ainda nem apertei o enter,\nque eu saiba……"
21110-50 = "[56cd7b]Você é a AL-1S?"
21110-53 = "!?"
21110-54 = "!!"
21110-55 = "?"
21110-56 = "Não, a Aris é a Aris e……"
21110-57 = "P-peraí!"
21110-58 = "……Tem algo errado. Aris, por enquanto\né melhor não digitar nada……"
21110-60 = "［Voz reconhecida, autorização confirmada. Bem-vinda de volta, AL-1S］"
21110-61 = "!?"
21110-62 = "Tem reconhecimento de voz também!?"
21110-63 = "Ãh…… \"AL-1S\" é…… a Aris, é isso?"
21110-64 = "Ah, foi mal. Pensando bem, acho que eu\nnão tinha contado pra Yuzu."
21110-65 = "……"
21110-66 = "O verdadeiro nome da Aris…… a verdadeira……\neu……"
21110-67 = "Você sabe a respeito da AL-1S?"
21110-68 = "……"
21110-69 = "…………"
21110-70 = "A resposta tá lenta……?"
21110-71 = "A tela também ficou meio embaçada,\nserá que travou no processamento?"
21110-72 = "É iss…… @！#%#@！$%@！！！！ "
21110-73 = "H-hã? Que é isso, o que significa!?"
21110-74 = "Isso é……"
21110-75 = "……"
21110-76 = "Situação de emergência."
21110-77 = "Limite de energia atingido; no instante em que a\nenergia se esgotar, ocorrerá o desaparecimento.\nTempo restante: 51 segundos."
21110-78 = "Heein!? N-não pode! Pelo menos me conta\nsobre a G.Bible antes!"
21110-79 = "O que você procura é a G.Bible? ＜SIM / NÃO＞"
21110-80 = "!?"
21110-81 = "SIM!"
21110-82 = "G.Bible…… verificação concluída. Código: Jogo……\nhumano, compreensão, referência, número de registro\nde biblioteca 193, dado nº 1 destinado ao descarte.\nTempo restante: 35 segundos."
21110-83 = "Descarte!? Por quê!? Sendo que isso é o tesouro\ndos desenvolvedores de jogos, não, do mundo inteiro!"
21110-84 = "Se você deseja a G.Bible, eis a proposta: conecte\numa mídia de armazenamento para a transferência\ndos dados."
21110-85 = "Hã……? Você sabe onde fica a G.Bible?"
21110-87 = "[56cd7b]Vocês também sabem."
21110-90 = "[56cd7b]Agora, bem diante de vocês."
21110-92 = "C-como assim!?"
21110-94 = "Para ser exata, a G.Bible está dentro de mim. Porém,\nestou à beira do desaparecimento; solicito a migração\npara uma nova mídia de armazenamento."
21110-95 = "M-mesmo assim, mídia de armazenamento assim do\nnada…… ah, serve o cartão de memória do \"Game\nGirls Advance SP\"?"
21110-96 = "………………Bem, possível…… até é."
21110-97 = "S-sei lá, deu uma sensação de que ela detestou\nmuito a ideia…… é impressão minha?"
21110-98 = "Cabo de dados…… conexão concluída!"
21110-99 = "Transferência iniciada…… espaço de armazenamento\ninsuficiente; apagando dados existentes.\nTempo restante: 9 segundos."
21110-100 = "Hã, mentira!? Não me diga que você apagou\no meu dado de save!? Ei!?"
21110-101 = "Como a capacidade é insuficiente, vou liberá-la."
21110-102 = "N-não! Por favor, deixa o dado de save! Foi muito\ndifícil juntar todo aquele equipamento——"
21110-103 = "Que pena, apagado."
21110-104 = "Peeeeraaaí!?"
21110-105 = "……"
21110-107 = "…………"
21110-108 = "Ué…… a energia…… desligou……?"
21110-109 = "Aaaah! Os meus dados do Game Girls Advanceee!!"
21110-111 = "Ah, peraí!"
21110-112 = "Tem alguma coisa na tela……?"
21110-113 = "Transferência concluída."
21110-114 = "Hã?"
21110-115 = "Novos dados transferidos."
21110-116 = "＜G.Bible.exe＞"
21110-117 = "I-isto é!?"
21110-118 = "V-vamos executar isso agora mesmo!\nA gente tem que confirmar se é o original!"
21110-120 = "Executando o exe! Ah, apareceu um pop-up……"
21110-121 = "Ué, precisa de senha!? Que história é essa,\ne agora, o que a gente faz!?"
21110-122 = "……Calma. Se for uma senha comum,\na Veritas consegue quebrar……!"
21110-123 = "(Acena, acena!)"
21110-124 = "I-isso mesmo, fazendo assim……!"
21110-125 = "Com isto, dá pra fazer um jogo realmente\ndivertido…… o \"Tales Saga Chronicle 2\"……!"
21110-126 = "Sim, com certeza dá! Boa!"
21110-127 = "Espera só por mim, Prêmio Millennium…… não,\nGrande Prêmio de Jogos de Kivotos! O nosso novo\njogo, dessa vez, vai sacudir o mundo dos jogos\nde Kivotos no bom sentido, pode escrever!!"
21110-129 = "M-mana, sua voz tá alta demais.\nSe você gritar assim desse jeito……"
21110-134 = "……"
21110-135 = "é como dizer pra ele que a gente\ntá bem aqui, ó……"
21110-136 = "Eita……"
21110-137 = "■■■ ■ ■! ■■■!"
21110-138 = "T-tá parecendo bravo pra caramba!?"
21110-140 = "(Ratatatá!)"
21110-142 = "Aah, atiraram! Bora fugir, rápido!"
21110-143 = "Mana, antes disso……!"
21110-144 = "Isso, Game Girls Advance assegurado! Yuzu, avança\nprotegendo o Sensei! Eu e a Aris fazemos a\nretaguarda, então bora todo mundo escapar\nespantando os robôs no caminho!"
21110-145 = "Eu também dou cobertura!"
21110-146 = "Depois de finalmente conseguir a G.Bible,\nnão dá pra cair num lugar desses……!"
21110-147 = "……Vamos todas voltar sãs e salvas\npra sala do clube!"
21110-152 = "Sim!"