[translation]
1601405-1 = "イブキと職業体験！"
1601405-4 = "こんにちは、先生！"
1601405-5 = "イブキ、来たよ！"
1601405-6 = "[s1] \"こんにちは、イブキ。\"\n[s2] \"今日は私の仕事を見に来たの？\""
1601405-9 = "うん！学校で将来の夢を聞かれたんだ。"
1601405-10 = "これ！"
1601405-14 = "[ns] \"「進路希望調査書」？\""
1601405-15 = "しんろ、きぼう……たぶんそう！"
1601405-16 = "大きくなったらどんなお仕事がしたいか書くようにって。"
1601405-17 = "それで、先生が頭に浮かんだの！"
1601405-18 = "[s] \"イブキは、どんな仕事に挑戦してみたい？\""
1601405-19 = "うーん……"
1601405-20 = "イブキには何ができるのか、何が好きなのか考えてみたけど……"
1601405-21 = "まだ、よく分からなくて。"
1601405-22 = "[s] \"時間はあるから、焦る必要は無いよ。\""
1601405-23 = "うぅ……そうなの……？"
1601405-24 = "でも……"
1601405-25 = "[s3] \"それじゃあ、今から探しに行く？\"\n[s4] \"私も手伝うから。\""
1601405-28 = "わあ！本当？"
1601405-29 = "うん！イブキ、先生と一緒に色々やってみたい！"
1601405-32 = "こんにちは！イブキだよ！"
1601405-33 = "イブキさん、お待ちしてました。"
1601405-34 = "[s] \"今日はありがとう、よろしくね。\""
1601405-35 = "いえ、先生。ではまず、警察の仕事を説明しますね。"
1601405-36 = "はいっ！お願いします！"
1601405-37 = "私たちは市民の安全を守るべく、日頃から街を巡回して取り締まりを行なっています。"
1601405-38 = "警察業務とは、まさに正義感と責任感が求められる仕事と言えるでしょう！"
1601405-39 = "それと……せっかくなので、今日はイブキさんのために制帽を持ってきました。"
1601405-43 = "わあ！本物のお巡りさんになった気分！"
1601405-44 = "えへへっ、逮捕しちゃうよ！"
1601405-47 = "私たちの仕事は、みんなに美味しい料理を提供することさ。"
1601405-48 = "お客様の笑顔が一番のやりがいでね！"
1601405-49 = "イブキもコックさんになれるかな？"
1601405-50 = "もちろんだとも！#n諦めない気持ちさえあれば、誰でも素晴らしいシェフになれる！"
1601405-51 = "さっそく子ども用の包丁を貸すね。ここにある野菜を切ってみてくれるかな？"
1601405-52 = "先生、待ってて！イブキ、すぐに美味しいご飯を作ってあげるから！"
1601405-55 = "イブキ様もご存じの通り、戦車の操縦は複数人で呼吸を合わせる、とても繊細な作業になります。"
1601405-56 = "イブキ、知ってる！イロハ先輩がやってるの見た！一緒に乗ったこともあるの！"
1601405-57 = "それでしたら、話は早いですね。では早速、戦車長を体験していただきます。"
1601405-58 = "イブキ、好きに動かしてもいいの……？#nうん、やってみる！"
1601405-61 = "（色々な職業体験をしていたら、あっという間に日が暮れていた）"
1601405-63 = "[ns5] \"どうだった、イブキ？\"\n[ns6] \"どれが一番気に入った？\""
1601405-66 = "うーん……"
1601405-67 = "まだよく分からなかった！"
1601405-68 = "[s] \"たしかに、一日じゃ決められないよね。\""
1601405-69 = "でも……"
1601405-70 = "ちょっとだけ、何か分かった気がする！"
1601405-71 = "[s] \"よく分からないけど、分かる……？\""
1601405-72 = "えへへ。じゃあ先生、イブキ、今日は帰るね！"
1601405-73 = "今日はありがとう！ばいば～い！"
