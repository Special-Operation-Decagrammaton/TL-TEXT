[translation]
1601405-1 = "Experiência profissional com a Ibuki!"
1601405-4 = "Olá, Sensei!"
1601405-5 = "A Ibuki chegou!"
1601405-6 = "[s1] \"Olá, Ibuki.\"\n[s2] \"Veio ver o meu trabalho hoje?\""
1601405-9 = "Sim! Perguntaram na escola qual é o meu sonho para o futuro."
1601405-10 = "Olha só!"
1601405-14 = "[ns] \"Um 'Questionário de Orientação Vocacional'?\""
1601405-15 = "Orientação... vocacional... acho que é isso mesmo!"
1601405-16 = "Disseram para eu escrever que tipo de trabalho eu quero fazer quando crescer."
1601405-17 = "Aí, o Sensei veio na minha cabeça!"
1601405-18 = "[s] \"Que tipo de trabalho a Ibuki quer tentar fazer?\""
1601405-19 = "Hum..."
1601405-20 = "Eu tentei pensar no que eu consigo fazer e no que eu gosto..."
1601405-21 = "Mas ainda não sei muito bem."
1601405-22 = "[s] \"Você tem tempo, não precisa ter pressa.\""
1601405-23 = "Ué... é mesmo...?"
1601405-24 = "Mas..."
1601405-25 = "[s3] \"Então, que tal irmos procurar agora?\"\n[s4] \"Eu vou te ajudar.\""
1601405-28 = "Uau! Sério?"
1601405-29 = "Sim! A Ibuki quer tentar várias coisas com o Sensei!"
1601405-32 = "Olá! É a Ibuki!"
1601405-33 = "Ibuki-san, estávamos esperando por você."
1601405-34 = "[s] \"Obrigado por hoje, conto com você.\""
1601405-35 = "De nada, Sensei. Bem, primeiro, vou explicar como funciona o trabalho policial."
1601405-36 = "Sim! Por favor!"
1601405-37 = "Para proteger a segurança dos cidadãos, patrulhamos a cidade e realizamos fiscalizações diariamente."
1601405-38 = "O trabalho policial é uma profissão que exige um grande senso de justiça e responsabilidade!"
1601405-39 = "E... já que você está aqui, trouxe um quepe para a Ibuki-san hoje."
1601405-43 = "Uau! Sinto que virei uma policial de verdade!"
1601405-44 = "Hehe, vou te prender!"
1601405-47 = "Nosso trabalho é servir pratos deliciosos para todo mundo."
1601405-48 = "O sorriso dos clientes é a maior recompensa!"
1601405-49 = "Será que a Ibuki também consegue ser cozinheira?"
1601405-50 = "Com certeza! #nSe você tiver determinação, qualquer um pode se tornar um grande chef!"
1601405-51 = "Vou te emprestar uma faca infantil. Pode cortar esses vegetais aqui?"
1601405-52 = "Sensei, espera só! A Ibuki vai fazer uma comida deliciosa para você agora mesmo!"
1601405-55 = "Como a Ibuki-sama sabe, pilotar um tanque é um trabalho muito delicado que exige que várias pessoas estejam em sintonia."
1601405-56 = "A Ibuki sabe! Eu vi a Iroha-senpai fazendo isso! Já até andei junto uma vez!"
1601405-57 = "Nesse caso, fica mais fácil. Então, vamos começar a experiência como comandante de tanque."
1601405-58 = "Ibuki, posso controlar como eu quiser...? #nSim, vou tentar!"
1601405-61 = "(Depois de experimentar várias profissões, o dia passou num piscar de olhos)"
1601405-63 = "[ns5] \"Como foi, Ibuki?\"\n[ns6] \"Qual você gostou mais?\""
1601405-66 = "Hum..."
1601405-67 = "Ainda não sei muito bem!"
1601405-68 = "[s] \"Realmente, não dá para decidir em apenas um dia.\""
1601405-69 = "Mas..."
1601405-70 = "Acho que entendi um pouquinho!"
1601405-71 = "[s] \"Não entendi bem, mas entendi...?\""
1601405-72 = "Hehe. Então Sensei, a Ibuki vai para casa agora!"
1601405-73 = "Obrigada por hoje! Tchau, tchau!"
