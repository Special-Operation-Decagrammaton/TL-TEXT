[translation]
10049040-1 = "Episódio 4; O show no palco vai começar!"
10049040-2 = "Camarim"
10049040-3 = "Uau!! Então este é o camarim!!"
10049040-4 = "Me sinto como uma verdadeira integrante do elenco!!"
10049040-5 = "Reisa!"
10049040-7 = "Hummm..."
10049040-8 = "Vocês, são mesmo do elenco?"
10049040-9 = "Não me lembro de ver seus nomes na lista...#nAh, droga, esqueci de trazer a lista..."
10049040-10 = "!!"
10049040-15 = "(Isso não é bom... se descobrirem quem somos de verdade...)"
10049040-16 = "(Nossa infiltração será descoberta... e o alvo pode acabar percebendo...)"
10049040-17 = "(O que devemos fazer...?)"
10049040-18 = "(Preciso pensar em... alguma solução...)"
10049040-22 = "Do Feedlamp para a Câmara... Magia de rotação à direita da 6ª via! Conceda-me um poder inabalável!"
10049040-28 = "Bolt Forward! Thermite Pink!"
10049040-29 = "Pronto, tudo preparado!"
10049040-30 = "Reisa!?"
10049040-31 = "É só fazer uma pose natural que dá tudo certo!"
10049040-32 = "Ah... ugh..."
10049040-38 = "Magical, lyrical...#nThermite White!"
10049040-42 = "Acho que me preocupei demais...#nO show começa em 10 minutos, conto com vocês."
10049040-46 = "Ahhh..."
10049040-47 = "Conseguimos enganar ela!"
10049040-48 = "Por enquanto escapamos, mas... o problema vem agora."
10049040-49 = "Quem diria que chegaríamos a esse ponto... desse jeito, em 10 minutos estaremos no palco!"
10049040-50 = "[s1] \"Na verdade, não é conveniente?\"\n[s2] \"Do palco, teremos uma visão melhor.\""
10049040-53 = "V-você acha...?"
10049040-54 = "Mas eu... só assisti a obras de garotas mágicas quando era criança..."
10049040-55 = "E acima de tudo, ficar na frente de tanta gente... só de imaginar, fico com medo..."
10049040-56 = "Suzumi, você é incrível! Não precisa se preocupar com nada!"
10049040-57 = "Como membro do comitê de segurança, você está sempre agindo com tanta confiança!"
10049040-58 = "Uma coisa não tem nada a ver com a outra!"
10049040-59 = "O que eu faço..."
10049040-61 = "[ns3] \"Que tal dizer algumas falas convincentes?\"\n[ns4] \"Pense nisso como uma forma de ganhar tempo.\""
10049040-64 = "Mas que tipo de fala eu deveria dizer..."
10049040-65 = "Fufun, as falas da Thermite White, é claro!"
10049040-66 = "Deixe comigo!"
10049040-73 = "Isso é... uma caneta?"
10049040-74 = "Não é uma \"caneta\"!"
10049040-75 = "É uma \"Cola Mágica\"!"
10049040-76 = "Agora, com isso..."
10049040-77 = "Vou escrever as falas na palma da sua mão, Suzumi!"
10049040-82 = "E-espere! Não faça isso de repente... ah!"
10049040-87 = "Ah, fufu... faz cócegas! Ahahaha!!"
10049040-89 = "[ns] (A Suzumi também ri desse jeito)"
10049040-95 = "Preparação concluída!"
10049040-96 = "Ah, ah..."
10049040-97 = "Eu sou muito sensível a cócegas..."
10049040-98 = "Especialmente na palma da mão...!!"
10049040-99 = "Mas acho que com isso vai dar certo!"
10049040-100 = "Algo como... isso."
10049040-105 = "Bem, o show vai começar!"
10049040-107 = "Sim!!"
10049040-108 = "A-ainda estou conferindo as falas...! Preciso de mais um pouco de tempo...!"
10049040-109 = "Além disso, não deveríamos ter a Shimiko aqui para fazer o papel da vilã!?"
10049040-110 = "De acordo com o cronograma... parece que só nós duas somos o suficiente por enquanto!"
10049040-112 = "[ns5] \"Força!\"\n[ns6] \"Vai, Thermite White!\""
10049040-115 = "A-ahhhhhhh!!"
10049040-121 = "É a Thermite White!"
10049040-122 = "A Thermite Pink também está lá!"
10049040-123 = "Que fofas! Parecem princesas!!"
10049040-125 = "(O público não aumentou desde agora pouco!?)"
10049040-126 = "(Todos estão olhando para mim, torcendo...)"
10049040-127 = "(Estou com medo... o que eu faço, minhas pernas estão travadas. Não sinto a ponta dos meus dedos, que medo.)"
10049040-128 = "(Eu... não consigo. Ter tanta expectativa depositada em mim assim...)"
10049040-129 = "Bolt Forward! Thermite Pink!"
10049040-130 = "Uauuu!!!"
10049040-131 = "Reisa!?"
10049040-132 = "É a sua vez, Suzumi!"
10049040-133 = "Mostre a todos o seu lado mais incrível!!"
10049040-134 = "(Como a Reisa consegue ficar tão calma...)"
10049040-135 = "...Ufa."
10049040-139 = "Bolt Catch! Thermite White!"
10049040-140 = "Uauuuuuuuuuuu!!!"
10049040-142 = "White!! White!!"
10049040-143 = "Uauuu!!"
10049040-147 = "[ns] \"Thermite White!! Você é demais!!!\""
10049040-149 = "Ahaha! Sensei, sua voz dá para ouvir daqui!!"
10049040-150 = "Sensei...!"
10049040-151 = "Ehem... #nÉ uma emergência! Parece que Era e seus capangas estão se escondendo neste parque de diversões!"
10049040-152 = "Ah, sério? Isso é verdade?"
10049040-153 = "Sim! Com certeza eles estão tentando roubar a energia da amizade!"
10049040-168 = "(Que bom... parece que vou conseguir levar isso adiante...)"
10049040-169 = "(Como o Sensei disse, do palco dá para ver tudo ao redor... se for assim...)"
10049040-170 = "(Ah, o suor...)"
10049040-175 = "(Ah... acabei passando a mão no suor...!)"
10049040-176 = "(A escrita que fizeram para mim está borrando...!)"
10049040-177 = "Thermite White! O que faremos agora?"
10049040-182 = "...Suzumi! É a sua próxima fala!"
10049040-184 = "[ns] \"Suzumi...?\""
10049040-185 = "Ah, é, bem..."
10049040-186 = "Para fazer um bolo, precisamos de manteiga... não é...?"
10049040-187 = "Eh...?"
10049040-189 = "[ns] (Que tipo de fala é essa...?)"
10049040-191 = "Thermite White?"
10049040-192 = "O que isso significa...?"
10049040-193 = "Aquela garota é mesmo a Thermite White?"
10049040-195 = "E-entendi! A White pretende usar o \"Poder Mágico de Açúcar\"!"
10049040-196 = "Muito bem, a Pink também vai se preparar!"
10049040-197 = "Vamos praticar o golpe final!"
10049040-198 = "Pessoal! Por favor, me emprestem sua força!"
10049040-200 = "Sim!!"
10049040-201 = "Com certeza!!"
10049040-203 = "[ns7] \"A Reisa improvisou para ajudar!\"\n[ns8] \"Isso foi incrível, Reisa!\""
10049040-207 = "(A fala do golpe especial, ainda não está borrada. Mesmo assim...)"
10049040-212 = "(O que eu faço... minha voz não sai...)"
10049040-213 = "(A Reisa me ajudou... preciso dizer a próxima fala logo...)"
10049040-218 = "Pe-pela paz de todos..."
10049040-219 = "Mesmo que ninguém... entenda..."
10049040-223 = "Por que você faz parte do comitê de vigilância? Ninguém vai te entender, né?"
10049040-224 = "......É mesmo? #nAs minhas ações――"
10049040-228 = "Como esperado..."
10049040-229 = "Eu..."
10049040-233 = "Eu não... consigo..."
10049040-239 = "[ns] \"Suzumi...!\""
10049040-241 = "......"
