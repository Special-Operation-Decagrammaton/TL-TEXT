[translation]
1001305-1 = "大人のデート"
1001305-3 = "（大人のカードの利用実績がだいぶ溜まったとのことで、最高級のファインダイニングの招待券2人分が届いた）"
1001305-4 = "（それはともかくツルギの状態が良くなさそうだから、会いに行ってみよう）"
1001305-6 = "（ツルギは一人で公園に座っていた）"
1001305-7 = "……。"
1001305-8 = "[s1] 挨拶をする。\n[s2] 手を振る。"
1001305-9 = "せ、先生！？"
1001305-10 = "せ、先生！？"
1001305-11 = "ど、どうしてここに……い、いえ、それより……。"
1001305-12 = "[s3] \"なにかあった？\"\n[s4] \"悩み事でもある？\""
1001305-13 = "な、悩み事……ですか……。"
1001305-14 = "な、悩み事……ですか……。"
1001305-15 = "な、ないとは言えませんが……。"
1001305-16 = "[s] \"聞かせてくれる？\""
1001305-17 = "……。"
1001305-19 = "第32回正義実現委員会緊急任務・スケバン掃討作戦"
1001305-20 = "きゃははははははははははっ！！ "
1001305-21 = "退路は塞いだ！これでお前らにはもう、逃げる方法がないなぁ？"
1001305-22 = "ここで大人しく消えろ！！"
1001305-23 = "（ドカアァァン！ドカアアァァァァン！！！）"
1001305-25 = "上半期・トリニティ自治区武装巡回"
1001305-26 = "きひぇへへへへへへへへへへへへ！！"
1001305-27 = "これじゃあ駆除される虫と変わらないなぁ？"
1001305-28 = "（ドカアァァン！！！パーン！！パーン！！）"
1001305-30 = "緊急避難任務・指導主事の保護"
1001305-31 = "くへええええっへへへへええ！！！"
1001305-32 = "足りない、まだ足りねぇなぁぁ！！"
1001305-33 = "もっと、もっとだ、もっと抵抗しろ！！"
1001305-34 = "（ドカアァン！！！ドカーン！！ドカアアァァン！！）"
1001305-36 = "……ということで。"
1001305-37 = "[s5] \"……頑張ってるんだね、ツルギは。\"\n[s6] \"……えっと、仕事が多すぎるって話かな？\""
1001305-38 = "……そ、そうではなく。"
1001305-39 = "……そ、そうではなく。"
1001305-40 = "わ、わ、わ……。"
1001305-41 = "[s] \"わ？\""
1001305-42 = "私の青春は、これでいいのかな……という……。"
1001305-43 = "[s7] \"青春……！？\"\n[s8] \"恐ろしい単語が出てきた！\""
1001305-44 = "小説や雑誌とかで見る派手で甘酸っぱい、キラキラした恋愛とか、そういう青春って私の生活にはどこにも見当たらなくて……。"
1001305-45 = "小説や雑誌とかで見る派手で甘酸っぱい、キラキラした恋愛とか、そういう青春って私の生活にはどこにも見当たらなくて……。"
1001305-46 = "……私の場合はキラキラというか、鮮やかな赤色のって感じ、ですし……。"
1001305-47 = "[s9] \"ツルギも夢見る女の子だね。\"\n[s10] \"確かに赤色ではあるね。\""
1001305-48 = "せ、せ、せめて、す、す、好きな……と、で、で、で……デート…………みたいなこととか、あれば……。"
1001305-49 = "せ、せ、せめて、す、す、好きな……と、で、で、で……デート…………みたいなこととか、あれば……。"
1001305-50 = "……あ、す、すみません。また変なことを……。"
1001305-51 = "[s11] せっかくダイニングの招待券が手に入ったことだし、\n[s12] ツルギのその夢を叶えよう。"
1001305-56 = "（スッ）"
1001305-57 = "はい？こ、これは！？"
1001305-58 = "[s] \"私と[ruby=デート]青春を体験[/ruby]してみよう！ツルギ！\""
1001305-59 = "！？！！？"
1001305-61 = "いらっしゃいませ。お待ちしておりました、[USERNAME]様。"
1001305-62 = "選ばれしお客様のためのファインダイニング、「デラックスパレス・キヴォトス」にようこそ。"
1001305-63 = "……！？"
1001305-64 = "地上550メートルからの最高峰の夜景と共に、最高級の料理を味わいながら、ゆったりとしたお時間をお過ごしください。"
1001305-65 = "お席にご案内いたします、こちらへ。"
1001305-67 = "[s13] \"ありがとうございます、マスター。\"\n[s14] \"行こう、ツルギ。\""
1001305-68 = "はい？あ、あう……わ、私は……。"
1001305-69 = "はい？あ、あう……わ、私は……。"
1001305-73 = "― （逃げる？[wa:1200]今すぐにでも[wa:1500]窓から飛び降りる？）"
1001305-75 = "― （死ぬかな？[wa:1000]死ぬよな？[wa:1000]死にたい……[wa:1500]殺す？[wa:800]いや、[wa:500]違う違う！）[wa:200] "
1001305-78 = "[ns15] （練習だとしても、こういうのはきちんとしなきゃね）\n[ns16] （真剣にムードを作ろう）"
1001305-81 = "― な、な、な、な、[wa:1500]なにを、[wa:1000]は……[wa:1000]話そう[wa:1000]と……。"
1001305-83 = "― こ、[wa:500]こんなところは……[wa:1500]私には[wa:1000]似合わないのに……。"
1001305-86 = "[ns] \"ツルギ、伝えたいことがあるんだ。\""
1001305-87 = "― あ、[wa:1200]うう……[wa:1500]まだ[wa:1500]私は[wa:1500]準備が……。"
1001305-90 = "― （ぎゃあああああ～～！[wa:1800]なんでこんなところに[wa:1700]来ちゃったのおー！！）"
1001305-93 = "[ns] \"……これからも色々と、一緒に頑張ろうね？\""
1001305-94 = "あ……。"
1001305-95 = "……。"
1001305-96 = "……は、はい。"
1001305-97 = "（その後ツルギと、楽しく大人のデートを体験した）"
