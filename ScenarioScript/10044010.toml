[translation]
10044010-1 = "第1話;嵐の前の騒がしさ"
10044010-2 = "[log]数時間前……[/log]"
10044010-6 = "――というわけで、お前たちを呼んだ。"
10044010-7 = "なんだ、ただの貨物輸送じゃん。"
10044010-8 = "つまんなーい。"
10044010-9 = "重要な任務だと言ったはずだ。#nもう一度説明が必要か？"
10044010-10 = "いーよ別に。どうせやることは一緒だし。"
10044010-11 = "運ぶだけー。"
10044010-12 = "はぁ……どのみち、他に対応できる者もいないしな……。"
10044010-13 = "整備士を一人サポートにつける。#nお前らは運転に集中してくれ。"
10044010-14 = "いいか？時間通り、安全に、貨物を目的地まで――"
10044010-15 = "はいはい、分かってるって。"
10044010-16 = "あさめしまえー。"
10044010-17 = "お前たち、もっと真面目に――"
10044010-21 = "話長すぎ！#nヒカリ、行こ行こ。"
10044010-22 = "おぉーしゅっぱーつ。"
10044010-29 = "クククッ。これはこれは……頼もしい方々のようだ。"
10044010-30 = "お恥ずかしい限りです。#nあれでも力量はたしかですので……。"
10044010-31 = "むしろ、こういう任務には適しているのかもしれませんな。"
10044010-32 = "ご依頼の遂行に関しては、ご心配なく。"
10044010-33 = "ええ、もちろん。そうでなくては。ククッ……。"
10044010-36 = "貨物列車出発駅"
10044010-41 = "これで運ぶの？やっぱいつもと同じじゃん。"
10044010-42 = "重要任務っぽくしとくー？ステッカー貼るとかー。"
10044010-43 = "パヒャヒャッ！逆に目立って、色んなやつらに狙われるかも？"
10044010-44 = "面白そうだし、今度やってみよっか！"
10044010-48 = "あ、あのぉ……。"
10044010-52 = "し、CCCの幹部がここにいるって聞いてきたんですけど……。"
10044010-53 = "私らに何か用？"
10044010-54 = "だーれ？"
10044010-55 = "あ、よかった。えへへ……。"
10044010-56 = "わ、私は……[ruby=うつみ]内海[/ruby]アオバです……。"
10044010-57 = "せ、整備士で……事務局から連絡があったはずなんですけど……。"
10044010-58 = "あー、なんかそんなこと言ってたね。"
10044010-59 = "ニューフェイスー。"
10044010-60 = "列車のことは任せたよ。#nトラブったら、私らじゃ対処できないし！パヒャヒャッ！"
10044010-61 = "う、運転だけが取り柄で、運よく幹部になったというのは本当なんですね……。"
10044010-65 = "……ん？"
10044010-66 = "う、運を転がすのが上手なんだな……って……。"
10044010-67 = "や、なんか違うこと言ってたっしょ……。"
10044010-68 = "お、お二人は運転に集中してもらえたら……後はお任せください。"
10044010-70 = "んー……まあいっか。"
10044010-71 = "ヒカリは、ヒカリー。#nノゾミが、ノゾミー。"
10044010-73 = "あ、はい……よろしくお願いします……。"
10044010-74 = "そ、それにしても、幹部でも現場に出るんですね……#n現場の事なんて何も分かってないと思ってましたけど……。"
10044010-75 = "もちろん！現場は知ってるし――#nあれ……？それ、褒めてなくね？"
10044010-76 = "――な、なんちゃってぇ……へへ……。"
10044010-77 = "もうちょっとごまかし方あるだろ！？"
10044010-79 = "許さぬー、くらえー。"
10044010-88 = "うおおー！"
10044010-92 = "いたっ――"
10044010-96 = "――くない？ち、力弱すぎませんか……？"
10044010-97 = "ガスけつーぱわーだせないー。"
10044010-99 = "出発まで暇だし、駅員室借りよっか。"
10044010-100 = "待ちながら……アレ、頼んじゃう？"
10044010-101 = "ペパロニピザー。"
10044010-102 = "パヒャヒャッ！やっぱ仕事前にはピザだよね！"
10044010-103 = "ま、待ってください。勝手に入ったら……。"
10044010-104 = "なんで？"
10044010-105 = "きゅ、急に幹部が来たら……え、駅員さん、困っちゃうと思うんですけど……。"
10044010-109 = "そんなことなくない？"
10044010-110 = "え……ふ、普通に気まずいですけど……。"
10044010-111 = "ノープロブレムー。"
10044010-112 = "そうそう。私ら気にしないし。"
10044010-113 = "そ、それはそっち側だから言えることで……。"
10044010-114 = "気にしすぎ気にしすぎ！"
10044010-118 = "……。"
10044010-119 = "はぁ……これだから幹部は……。"
10044010-122 = "なんかシステムの調子おかしくない？"
10044010-123 = "どうしたの？"
10044010-124 = "自動発車システムが、さっきからずっと発車信号を送ってるの。"
10044010-125 = "まあ……運転手がコントロールできるし、大丈夫でしょ。"
10044010-126 = "そうなんだけど、なんか気になっちゃって。"
10044010-127 = "いいって。私たちでどうにかできる事でもないし。"
10044010-128 = "まあ、そうだね。"
10044010-135 = "ヒカリー、とーじょー。"
10044010-136 = "えっ！？こっ、困ります！ここは関係者以外――"
10044010-137 = "CCCだよ。邪魔するね～！"
10044010-141 = "CCC！？どっ、どういったご用件で――"
10044010-142 = "ま、まさか、抜き打ち検査！？"
10044010-144 = "あぁ～気にしないで。暇つぶしに来ただけだからさ。"
10044010-145 = "パヒャヒャッ。このソファ、ちょっと借りるよ？"
10044010-146 = "ハイパーダイブー。"
10044010-151 = "え……？あ、はい……。"
10044010-155 = "なんか、すみません……。"
10044010-156 = "いえ、ちょっとビックリしましたけど……ごゆっくりどうぞ……。"
10044010-157 = "すみません……って、私のせいではないんですけど……。"
10044010-162 = "なんで急に来るかな……。"
10044010-163 = "うぅ、お腹痛くなってきたかも……。"
10044010-164 = "気にしないでって言われてもねぇ……。"
10044010-165 = "はぁ……早く帰ってくんないかな……。"
10044010-166 = "あー、そういえばどっかの駅はクロノスが取材に来てるんだっけ。"
10044010-167 = "うわ……急いで掃除とかやってそう……。"
10044010-168 = "それに比べりゃマシかぁ……。"
10044010-170 = "10分後……"
10044010-179 = "ピザ来たー。"
10044010-180 = "もう？爆速だね。パヒャッ！"
10044010-182 = "え、ピザ……？"
10044010-188 = "ピザの配達にあがりましたー。"
10044010-189 = "こっちー。"
10044010-190 = "こちらがご注文の……ペパロニピザのLサイズと、コーラです。"
10044010-191 = "どうも、ありがとうございましたー。"
10044010-192 = "そんじゃ早速――"
10044010-193 = "――って。"
10044010-194 = "ちょい待ち！"
10044010-195 = "はい？"
10044010-196 = "これ！どういうこと！？"
10044010-201 = "どう運んだらこうなるわけ！？"
10044010-202 = "ぐちゃぐちゃー。"
10044010-207 = "腹に入れば同じだろ？細かいことぐだぐだ言ってんじゃねぇよ。"
10044010-208 = "は？"
10044010-209 = "つーか早く届けてやったんだから感謝して欲しいくらいだぜ。"
10044010-210 = "デリバリーは早さが命！待ち時間はお客様の損失だからな！"
10044010-211 = "いや、それ以前の問題でしょ。ヒカリ、お店に電話して！"
10044010-212 = "うおおー、無限コールスタートー。"
10044010-213 = "は？ごちゃごちゃ言ってねぇで早く食えよ！冷めちまうじゃねぇか！"
10044010-225 = "も、問題起こさないで欲しいんですけど……。"
10044010-226 = "ああ……駅員室がめちゃくちゃに……。"
10044010-228 = "はっ！喧嘩を売る相手は選ぶべきだったな！#n道路の支配者が誰なのか……思い知らせてやるよ！"
10044010-229 = "ばーか！私らはハイランダー！道路なんて使わないっての！"
10044010-230 = "なっ……！#nブロロロ疾走連合として、この借りは絶対に返してやるからな！"
10044010-231 = "覚えてやがれよ……！"
10044010-236 = "はぁ……しょーもな。"
10044010-238 = "空腹値100％……1秒ごとに5億のダメージ……。"
10044010-239 = "ちゃんとしたの持ってきてくれるみたいだし、もうちょっと我慢だね。"
10044010-241 = "こ、これが幹部のやり方……。"
10044010-242 = "そ、それより、あれ大丈夫なんですか……？#nぼ、暴走族に目をつけられたんですけど……。"
10044010-243 = "関係ないっしょ。どうせ私らは列車移動だし。"
10044010-244 = "あ、いえ……お二人のことじゃなくて……私の心配なんですけど……。"
10044010-245 = "っていうか、私がお二人のこと心配するわけないじゃないですか……。"
10044010-246 = "ヒカリ、アタック！"
10044010-248 = "むーりー、はらへりー。"
10044010-253 = "（時は流れ……）"
10044010-258 = "充電かんりょー。"
10044010-259 = "そろそろ行こっか。"
10044010-261 = "あっ！出発されるのですね！"
10044010-262 = "ほんと自由気ままですね……。#n付き合わされる方の身にもなってほしいんですけど。"
10044010-263 = "じゃあね～！"
10044010-264 = "アディオース。"
10044010-269 = "ご、ご迷惑をおかけしました……！"
10044010-274 = "ははは……はい……どうも……。"
10044010-279 = "ふぅ……やっと行ったね……。"
10044010-280 = "だね……。"
10044010-285 = "ま、まずは点検から始めますので……。"
10044010-286 = "ちゃっちゃとよろしくね～"
10044010-290 = "あれ？"
10044010-291 = "ど、どうしました……？"
10044010-292 = "列車……どこだっけ？"
10044010-293 = "はい？"
10044010-294 = "乗り場……は間違えてないね。"
10044010-295 = "えっ？……え？"
10044010-296 = "家出かなー？"
10044010-297 = "じょ、冗談のつもりなら面白くないんですけど……。"
10044010-298 = "おーまじめー。"
10044010-299 = "え、マジでどこ行った？"
10044010-300 = "……。"
10044010-307 = "ええええ！？！？！？！？"
