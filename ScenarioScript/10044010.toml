[translation]
10044010-1 = "Episódio 1; A agitação antes da tempestade"
10044010-2 = "[log]Algumas horas atrás...[/log]"
10044010-6 = "— E é por isso que chamei vocês."
10044010-7 = "Qual é, é só um transporte de carga."
10044010-8 = "Que tédio."
10044010-9 = "Eu disse que era uma missão importante. #nPreciso explicar de novo?"
10044010-10 = "Tanto faz. O que a gente tem que fazer é a mesma coisa de sempre."
10044010-11 = "Só levar de um ponto ao outro."
10044010-12 = "Haa... de qualquer forma, não tem mais ninguém disponível para lidar com isso..."
10044010-13 = "Vou colocar um mecânico para dar suporte. #nVocês só precisam se concentrar em dirigir."
10044010-14 = "Entendido? No horário, com segurança, levem a carga até o destino—"
10044010-15 = "Tá, tá, já entendemos."
10044010-16 = "Moleza."
10044010-17 = "Vocês, levem isso mais a sério—"
10044010-21 = "Fala demais! #nHikari, vamos, vamos."
10044010-22 = "Opa, partiu."
10044010-29 = "Hehehe. Ora, ora... parece que são pessoas bem confiáveis."
10044010-30 = "Peço desculpas pela falta de modos. #nMas, apesar disso, a competência delas é garantida..."
10044010-31 = "Na verdade, talvez elas sejam as mais adequadas para esse tipo de missão."
10044010-32 = "Quanto à execução do pedido, não se preocupe."
10044010-33 = "Sim, claro. É o que espero. Hehe..."
10044010-36 = "Estação de Partida do Trem de Carga"
10044010-41 = "É com isso que vamos levar? É igualzinho ao de sempre."
10044010-42 = "Quer que pareça uma missão importante? Tipo, colando uns adesivos?"
10044010-43 = "Pahyahya! Se fizer isso, vai chamar atenção e talvez viremos alvo de um monte de gente!"
10044010-44 = "Parece divertido, vamos tentar fazer isso qualquer dia!"
10044010-48 = "A-ah, com licença..."
10044010-52 = "E-eu ouvi dizer que os executivos da CCC estavam aqui..."
10044010-53 = "Algum problema com a gente?"
10044010-54 = "Quem é você?"
10044010-55 = "Ah, que bom. Ehehe..."
10044010-56 = "E-eu sou... Utsumi Aoba..."
10044010-57 = "S-sou a mecânica... a secretaria deve ter entrado em contato..."
10044010-58 = "Ah, é, acho que mencionaram algo assim."
10044010-59 = "Uma novata."
10044010-60 = "Deixamos o trem com você. #nSe der problema, a gente não sabe resolver! Pahyahya!"
10044010-61 = "E-então é verdade que vocês só são boas em dirigir e viraram executivas por sorte..."
10044010-65 = "...Hm?"
10044010-66 = "D-dizem que vocês são boas em 'rolar a sorte'..."
10044010-67 = "Ei, acho que você falou algo errado..."
10044010-68 = "B-bem, se vocês duas puderem se concentrar na direção... o resto deixem comigo."
10044010-70 = "Hmm... tanto faz."
10044010-71 = "Hikari é a Hikari. #nNozomi é a Nozomi."
10044010-73 = "Ah, sim... conto com vocês..."
10044010-74 = "A-ainda assim, é surpreendente que executivas saiam a campo... #nEu achava que vocês não entendiam nada do trabalho de campo..."
10044010-75 = "Claro que entendemos! A gente conhece o campo e— #nUé...? Isso não foi um elogio, foi?"
10044010-76 = "— B-brincadeirinha... hehe..."
10044010-77 = "Você não consegue inventar uma desculpa melhor?!"
10044010-79 = "Não vou te perdoar, toma essa!"
10044010-88 = "Uooo!"
10044010-92 = "Ai..."
10044010-96 = "—não doeu? V-você não está com pouca força...?"
10044010-97 = "Estou sem combustível, não consigo usar meu poder."
10044010-99 = "Ainda falta um tempo para a partida, que tal pegarmos a sala dos funcionários emprestada?"
10044010-100 = "Enquanto esperamos... que tal pedir aquilo?"
10044010-101 = "Pizza de pepperoni."
10044010-102 = "Pahyahya! Nada melhor que uma pizza antes do trabalho, né!"
10044010-103 = "E-esperem. Se entrarmos sem permissão..."
10044010-104 = "Por quê?"
10044010-105 = "P-porque se um executivo aparecer de repente... o funcionário da estação vai ficar em uma situação complicada..."
10044010-109 = "Não acha que está exagerando?"
10044010-110 = "Eh... é, eu me sinto desconfortável com isso..."
10044010-111 = "Sem problemas."
10044010-112 = "Pois é. A gente não liga."
10044010-113 = "I-isso é fácil de dizer porque vocês são do outro lado..."
10044010-114 = "Você se preocupa demais, demais!"
10044010-118 = "..."
10044010-119 = "Haa... é por isso que os executivos são assim..."
10044010-122 = "O sistema não está meio estranho?"
10044010-123 = "O que houve?"
10044010-124 = "O sistema de partida automática está enviando sinais de partida sem parar desde agora há pouco."
10044010-125 = "Bem... o maquinista pode controlar isso, então deve estar tudo bem."
10044010-126 = "Eu sei, mas isso está me incomodando."
10044010-127 = "Esquece. Não é algo que a gente possa resolver mesmo."
10044010-128 = "É, você tem razão."
10044010-135 = "Hikari, chegando."
10044010-136 = "Eh!? I-isso é um problema! Aqui é apenas para pessoal autorizado—"
10044010-137 = "É a CCC. Com licença!"
10044010-141 = "CCC!? P-por qual motivo vocês—"
10044010-142 = "N-não me diga que é uma inspeção surpresa!?"
10044010-144 = "Ah, não se preocupe. Só viemos aqui para passar o tempo."
10044010-145 = "Pahyahya. Vamos usar esse sofá um pouquinho, pode ser?"
10044010-146 = "Hyper dive."
10044010-151 = "Eh...? Ah, sim..."
10044010-155 = "Sinto muito por isso..."
10044010-156 = "Não, eu só fiquei um pouco surpresa... fiquem à vontade..."
10044010-157 = "Sinto muito... quer dizer, não é minha culpa, mas..."
10044010-162 = "Por que elas tiveram que vir logo agora..."
10044010-163 = "Ugh, acho que meu estômago começou a doer..."
10044010-164 = "Dizer para não me preocupar é fácil..."
10044010-165 = "Haa... será que elas não vão embora logo..."
10044010-166 = "Ah, falando nisso, a Chronos está fazendo uma reportagem em alguma estação por aí, né?"
10044010-167 = "Nossa... imagino que eles estejam correndo para limpar tudo..."
10044010-168 = "Comparado a isso, acho que estou no lucro..."
10044010-170 = "10 minutos depois..."
10044010-179 = "A pizza chegou."
10044010-180 = "Já? Que velocidade. Pahya!"
10044010-182 = "Eh, pizza...?"
10044010-188 = "Entrega de pizza, aqui está."
10044010-189 = "Aqui."
10044010-190 = "Aqui está o seu pedido... uma pizza de pepperoni tamanho G e uma coca."
10044010-191 = "Muito obrigado."
10044010-192 = "Então, vamos começar..."
10044010-193 = "— Espera aí."
10044010-194 = "Espera um pouco!"
10044010-195 = "Sim?"
10044010-196 = "Isso! O que significa isso!?"
10044010-201 = "Como é que vocês transportaram isso para ficar assim!?"
10044010-202 = "Tudo bagunçado."
10044010-207 = "Se vai parar na barriga, dá no mesmo, não dá? Não fica aí reclamando de bobagem."
10044010-208 = "Hã?"
10044010-209 = "E outra, eu entreguei rápido, então você deveria é me agradecer."
10044010-210 = "Na entrega, a velocidade é tudo! Tempo de espera é prejuízo para o cliente!"
10044010-211 = "Não, o problema é anterior a isso. Hikari, liga para a loja!"
10044010-212 = "Uooo, iniciando o ciclo infinito de chamadas."
10044010-213 = "Hã? Para de reclamar e come logo! Vai acabar esfriando!"
10044010-225 = "E-eu queria que vocês não causassem problemas..."
10044010-226 = "Ah... a sala dos funcionários está uma bagunça..."
10044010-228 = "Droga! Você deveria ter escolhido melhor com quem mexer! Vou te mostrar quem é que manda na estrada!"
10044010-229 = "Idiota! Nós somos da Highlander! A gente nem usa a estrada!"
10044010-230 = "O quê...!? Como a União de Velocidade Brororo, eu juro que vou te cobrar isso!"
10044010-231 = "Guarde bem as minhas palavras...!"
10044010-236 = "Haa... que perda de tempo."
10044010-238 = "Nível de fome em 100%... 500 milhões de dano a cada segundo..."
10044010-239 = "Parece que vão trazer uma nova, então vamos aguentar só mais um pouco."
10044010-241 = "E-esse é o jeito de agir de um executivo..."
10044010-242 = "M-mais importante, isso não é perigoso...? E-estamos na mira de uma gangue de motoqueiros..."
10044010-243 = "Não tem nada a ver com a gente. De qualquer forma, nós nos movemos de trem."
10044010-244 = "Ah, não... não estou falando de vocês... estou preocupada comigo mesma..."
10044010-245 = "Quer dizer, não é como se eu estivesse preocupada com vocês duas..."
10044010-246 = "Hikari, ataque!"
10044010-248 = "Impossível, estou morrendo de fome."
10044010-253 = "(O tempo passa...)"
10044010-258 = "Recarga concluída."
10044010-259 = "Hora de ir, então."
10044010-261 = "Ah! Vocês já vão partir!"
10044010-262 = "Vocês são realmente muito livres... Eu queria que pensassem um pouco em quem tem que acompanhar vocês."
10044010-263 = "Até mais!"
10044010-264 = "Adios."
10044010-269 = "P-peço desculpas pelo transtorno...!"
10044010-274 = "Hahaha... sim... muito obrigado..."
10044010-279 = "Ufa... finalmente foram embora..."
10044010-280 = "Pois é..."
10044010-285 = "B-bem, vou começar pela inspeção, então..."
10044010-286 = "Faz rapidinho aí, tá?"
10044010-290 = "Ué?"
10044010-291 = "O-o que houve...?"
10044010-292 = "O trem... onde ele está?"
10044010-293 = "Sim?"
10044010-294 = "A plataforma... não está errada."
10044010-295 = "Hã? ...Hã?"
10044010-296 = "Será que fugiu de casa?"
10044010-297 = "Se, se isso for uma piada, não tem graça nenhuma..."
10044010-298 = "Oh, que séria."
10044010-299 = "Ei, para onde ela foi de verdade?"
10044010-300 = "..."
10044010-307 = "EEEEEHHHHHH!?!?!?!"
