[translation]
10018090-1 = "第9話;二人の覚悟"
10018090-3 = "ふぅ……。"
10018090-4 = "[s] \"フウカ、大丈夫？\""
10018090-8 = "あ、先生。"
10018090-9 = "はい、大丈夫です。それにまだやることもたくさん残っていますから。"
10018090-10 = "[s1] \"あまり無理をするのも良くないよ。\"\n[s2] \"せめて少し休憩してきたらどうかな？\""
10018090-15 = "それでは……"
10018090-19 = "お言葉に甘えて。少し散歩でもしてきます。"
10018090-24 = "……。"
10018090-25 = "[s] \"ハルナもフウカに負担をかけすぎてないか心配なんだよね？\""
10018090-26 = "まだ何も言っていませんが……。"
10018090-27 = "[s] \"でもハルナがフウカを見守っていたのは知ってるよ。\""
10018090-31 = "先生に隠し事はできませんね。"
10018090-32 = "ええ、傍目に見ても明らかに限界ですわ。"
10018090-33 = "しかし、何を思い悩んでいるのか、それが分かりません。"
10018090-34 = "[s] \"ハルナの気持ちは？\""
10018090-35 = "……私の気持ち、ですか。"
10018090-36 = "先生には意表を突かれてばかりのような気がします。"
10018090-40 = "私は……負けたくありません。いえ、負けてはいけないと思います。"
10018090-41 = "美食のためだけではありません。スズメ亭には、多くの人の思いがかかっています。"
10018090-42 = "しかし、この対決で勝つために必要なのは……私の力ではありません。"
10018090-43 = "それが、その事実が悔しいですわ。"
10018090-44 = "[s] \"ハルナにできること、きっと残っているよ。\""
10018090-45 = "そう……でしょうか？"
10018090-46 = "[s] \"うん、私はそう思うよ。\""
10018090-54 = "……教えていただけませんか？"
10018090-55 = "[ns] \"それはね……。\""
10018090-61 = "だ、誰かフウカ先輩に何かあったか知りませんか？"
10018090-63 = "スクーターに乗ってゲヘナのほうに行ったみたいなんですが、心配で……。"
10018090-66 = "なるほど。気分転換に出たんですね。それなら安心です。"
10018090-67 = "[s] \"フウカの場所に心当たりはある？\""
10018090-71 = "はい……たぶん、あそこだと思います！"
10018090-75 = "本当に……フウカさんはここにいるのでしょうか？"
10018090-76 = "[s] \"ジュリが言うんだから、私は信じてるよ。\""
10018090-77 = "それは私もですが……"
10018090-78 = "気晴らしに訪れる場所が、いつも働いている給食部の屋上とは信じがたくて……。"
10018090-83 = "……あら、驚きました。本当にあそこにいますわ。"
10018090-84 = "[s] \"それじゃあ、後はハルナに任せるよ。\""
10018090-88 = "な、なぜでしょう？こういうときこそ、先生の出番なのではないでしょうか？"
10018090-89 = "[s] \"今日はハルナに行ってほしいんだ。\""
10018090-93 = "……理由を、聞いてもよろしいでしょうか？"
10018090-94 = "[ns] \"ハルナは同じ生徒の立場として、\""
10018090-96 = "[ns] \"フウカのことを理解しているはずだから。\""
10018090-97 = "そう言っていただけるのは、素直にありがたいものですが……。"
10018090-98 = "しかし、フウカさんにとっての料理、私にとっての食事のように、ここは先生が適任なのではないでしょうか？"
10018090-99 = "はい？だからこそ私が適任と……？"
10018090-100 = "……。"
10018090-101 = "……分かりました。"
10018090-102 = "先生がそこまで仰るのなら……。"
10018090-107 = "……誰か登ってくる音が聞こえると思ったら、ハルナだったんだ。"
10018090-108 = "失礼しますわ。"
10018090-109 = "よくここが分かったね。ジュリが教えてくれたんでしょう？"
10018090-110 = "その通りですわ。迷惑でしたか？"
10018090-111 = "仕事の続きなら心配しないで。すぐに戻るよ。"
10018090-112 = "でも少しだけ……時間をちょうだい。"
10018090-113 = "屋上がお好きなのですね。"
10018090-114 = "そうだね。いつも給食部の仕事が忙しいから、遠くに行く余裕もなくって。"
10018090-115 = "息抜きするとなったら、ここくらいのものだから。それで、いつの間にか落ち着ける場所になったの。"
10018090-116 = "料理対決……やはりフウカさんとしては複雑ですか？"
10018090-117 = "嫌じゃないと言えば嘘になるかな。"
10018090-118 = "私は何と戦っているのか悩んで……。"
10018090-119 = "当然、人々を騙して美食の道を乱すニャオフードですわ。"
10018090-120 = "私、グルメヘルメット団とハルナの話を聞いたよ。"
10018090-124 = "……アカリからですか？"
10018090-125 = "うん。"
10018090-126 = "そうでしたか……それで悩んでいたのですね。"
10018090-127 = "私たちが勝てば、ニャオフードで働く人たちは職を失うことになるのかな？"
10018090-128 = "……その可能性がないとは言いませんわ。"
10018090-129 = "スズメ亭がニャオフードの圧力を跳ね除けることになれば、"
10018090-130 = "周りも自分の店を守ろうと諦めなくなるでしょう。"
10018090-131 = "それが結果としてニャオフードの業績を下げることにつながれば……。"
10018090-132 = "仕事量も減って、解雇される人も出てくるはずですわ。"
10018090-133 = "うん……。私が気になってるのはそこなんだ。"
10018090-134 = "それに商人のなかには、ニャオフードの肩を持つ人がいるのも確かだよ。"
10018090-135 = "直接言われたわけじゃないけど、余計なことをするなって視線を感じたのも確かだし。"
10018090-136 = "ありのままが良い人もいるものですから。"
10018090-137 = "もちろん、私は変化を好みますが。"
10018090-138 = "ふふっ。ハルナの言う変化のせいで、私は苦労することも多いんだけどね。"
10018090-139 = "あら。そうでしたか？"
10018090-140 = "私はスズメ亭を助けたいと思っただけなのに。"
10018090-141 = "どうしてこんな大事になったんだろう。"
10018090-142 = "フウカさんが一番気にしていることは何でしょうか？"
10018090-143 = "私たちが勝つことで、負けて何かを失う人たちのこと。"
10018090-144 = "私は誰かが苦しんでいるのは嫌なの。それで給食部に入ったところもあるから。"
10018090-148 = "……私たちについては、どう思っていますか？"
10018090-149 = "ハルナたちも同じだよ。私にとって食堂に来てくれる人たちは、みんな面倒を見なくちゃいけない生徒だよ。"
10018090-150 = "グルメヘルメット団も似たような存在ということですね。"
10018090-151 = "変だよね。私たちを邪魔してきてるのに。"
10018090-156 = "フウカさん。"
10018090-158 = "ん？"
10018090-160 = "美食に犠牲はつきものです。#n躊躇っていては、素晴らしいお店はこうしてどんどん消えていってしまう――"
10018090-161 = "それを、ただ指を咥えて見ているだけなんてできません。#nだから私たちは戦っているのでしょう？"
10018090-162 = "……そう、だね。"
10018090-163 = "ええ。それに、ニャオフードは手加減しないはずですわ。"
10018090-167 = "あちらは手段を選ばずに潰してこようとしています。"
10018090-168 = "それにあちら側は、この勝負で負けたところで失うものは少ないです。"
10018090-169 = "社員の待遇が悪くなったり、解雇される人が出るかもしれません。ですが、それらは可能性の話ですわ。"
10018090-172 = "それに対してスズメ亭の女将は、負けたら全てを失います。"
10018090-173 = "可能性などではなく、確実に。"
10018090-174 = "それは……そうだね。"
10018090-177 = "そして被害を受けるのは、スズメ亭の女将だけではありません。"
10018090-178 = "商店街の人たちです。彼らも被害者と呼べますわね。"
10018090-179 = "どうして？"
10018090-185 = "真の美食を味わえなくなってしまうわけですから、当然でしょう？"
10018090-191 = "……ふふっ。"
10018090-192 = "な、なぜ笑うのですか！？"
10018090-193 = "いや、なんかハルナらしいなって思って。"
10018090-194 = "こほん。"
10018090-195 = "とにかく、私は美食においてだけは本気ですわ。一歩も譲る気などありません。"
10018090-196 = "そして、それはあなたも同じですよね、フウカさん。"
10018090-197 = "私……？"
10018090-198 = "あなたは本当の実力を見せたことがほとんどありませんよね。"
10018090-199 = "そういう機会がなかったといえば、そうなんでしょうが。"
10018090-201 = "ですが今こそチャンスです。あなたの実力を見せる絶好の機会ですわ。"
10018090-203 = "そうだね。"
10018090-204 = "ハルナが本気を出すんだから、私も頑張らなきゃね。"
10018090-205 = "ええ、ここまで来てしまいましたから。"
10018090-206 = "ふふっ、そこに隠れている先生のおかげでね。"
10018090-211 = "先生、出てきてください。"
10018090-212 = "そこにいらっしゃいますよね？"
10018090-213 = "[s] \"バレてたの？\""
10018090-215 = "なんとなく、近くにいるような気がしたんです。"
10018090-220 = "卵に出汁を混ぜて……"
10018090-224 = "後は砂糖と醤油、みりん……。"
10018090-225 = "数の子はどうなってますか？"
10018090-226 = "はい、漬け込みました。次はお魚を焼いて……。"
10018090-227 = "エビもふっくら仕上がってますね。"
10018090-232 = "食べる直前まで煮汁に浸しておいて……。"
10018090-236 = "先輩！にんじんを切り終わりました！"
10018090-237 = "ありがとう！"
10018090-238 = "あ、サトイモのこと忘れてた……。"
10018090-244 = "ふふっ。素敵な光景ですね。"
10018090-245 = "女将さんと給食部が力を合わせておせちを作り、美食研究会がそれをサポートするなんて。"
10018090-247 = "味見するという建前でたくさん食べてるだけですけどね★"
10018090-248 = "これも仕事なんだからね。味見が終わったら次に使う食材を運ぶわよ。"
10018090-249 = "わぁ～幸せ！毎日こんな風に食べられたらいいのに！"
10018090-259 = "ムッフフフ。おせちの生産ラインはどうかね？"
10018090-260 = "順調に進んでいます。煮沸ライン、漬物ライン、焼き物ライン、全て稼働中です。"
10018090-261 = "大量生産！大量消費！ベルトコンベア！"
10018090-262 = "これこそがニャオフードの食品工場！"
10018090-264 = "さあ、働け働け！仕事があってこその人生だろう！"
10018090-269 = "すでにみんな時間外勤務なんですが……。"
