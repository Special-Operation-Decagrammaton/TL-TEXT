[translation]
10018090-1 = "Episódio 9: A Determinação de Duas"
10018090-3 = "Ufa..."
10018090-4 = "[s] \"Fuuka, você está bem?\""
10018090-8 = "Ah, Sensei."
10018090-9 = "Sim, estou bem. Além disso, ainda tem muita coisa para fazer."
10018090-10 = "[s1] \"Não é bom se esforçar demais.\"\n[s2] \"Por que não tira pelo menos uma pequena pausa?\""
10018090-15 = "Sendo assim..."
10018090-19 = "Vou aceitar sua sugestão. Vou dar uma volta para espairecer."
10018090-24 = "..."
10018090-25 = "[s] \"Haruna, você também está preocupada por estar sobrecarregando a Fuuka, não está?\""
10018090-26 = "Eu ainda não disse nada, mas..."
10018090-27 = "[s] \"Mas eu sei que você tem ficado de olho nela.\""
10018090-31 = "Não dá para esconder nada de você, Sensei."
10018090-32 = "Sim, mesmo de longe, é óbvio que ela chegou ao limite."
10018090-33 = "No entanto, não consigo entender o que a está preocupando tanto."
10018090-34 = "[s] \"E o que você sente sobre isso, Haruna?\""
10018090-35 = "...O que eu sinto, você pergunta?"
10018090-36 = "Sinto que você sempre me pega de surpresa, Sensei."
10018090-40 = "Eu... não quero perder. Não, acho que não posso perder."
10018090-41 = "Não é apenas pela gastronomia. O Suzume-tei carrega as esperanças de muitas pessoas."
10018090-42 = "Mas, para vencer este confronto, o que é necessário não é... o meu poder."
10018090-43 = "E é esse fato que me deixa frustrada."
10018090-44 = "[s] \"Tenho certeza de que ainda há algo que você pode fazer, Haruna.\""
10018090-45 = "Você... acha mesmo?"
10018090-46 = "[s] \"Sim, eu acredito nisso.\""
10018090-54 = "...Poderia me dizer o quê?"
10018090-55 = "[ns] \"É que...\""
10018090-61 = "A-alguém sabe o que aconteceu com a Fuuka-senpai?"
10018090-63 = "Parece que ela pegou uma scooter e foi em direção a Gehenna, estou preocupada..."
10018090-66 = "Entendo. Então ela saiu para mudar de ares. Isso é um alívio."
10018090-67 = "[s] \"Você tem alguma ideia de onde ela possa estar?\""
10018090-71 = "Sim... acho que é naquele lugar!"
10018090-75 = "Será mesmo... que a Fuuka-san está aqui?"
10018090-76 = "[s] \"Já que a Juri disse, eu acredito nela.\""
10018090-77 = "Eu também, mas..."
10018090-78 = "É difícil acreditar que o lugar que ela escolheria para espairecer seria o telhado do Clube de Merenda, onde ela sempre trabalha..."
10018090-83 = "...Ora, que surpresa. Ela realmente está ali."
10018090-84 = "[s] \"Então, deixo o resto com você, Haruna.\""
10018090-88 = "P-por quê? Não seria este o momento perfeito para o Sensei agir?"
10018090-89 = "[s] \"Hoje, eu quero que você vá, Haruna.\""
10018090-93 = "...Poderia me dizer o motivo?"
10018090-94 = "[ns] \"Porque, como uma colega estudante,\""
10018090-96 = "[ns] \"você deve ser a pessoa que melhor entende a Fuuka.\""
10018090-97 = "Fico sinceramente grata por dizer isso, mas..."
10018090-98 = "No entanto, assim como a culinária é para a Fuuka-san e a refeição é para mim, não seria você a pessoa mais indicada para isso?"
10018090-99 = "Sim? É justamente por isso que eu sou a mais indicada...?"
10018090-100 = "..."
10018090-101 = "...Entendido."
10018090-102 = "Se você insiste tanto, Sensei..."
10018090-107 = "...Ouvi passos subindo e imaginei que fosse você, Haruna."
10018090-108 = "Com licença."
10018090-109 = "Como você me achou? Foi a Juri quem te contou, não foi?"
10018090-110 = "Exatamente. Isso foi um incômodo?"
10018090-111 = "Se for sobre o trabalho, não se preocupe. Já estou voltando."
10018090-112 = "Mas, só um pouquinho... me dê um tempo."
10018090-113 = "Você gosta do terraço, não é?"
10018090-114 = "Pois é. Como o trabalho no Clube de Merenda é sempre muito corrido, não tenho tempo para ir a lugares distantes."
10018090-115 = "Quando preciso de uma pausa, este é o único lugar que tenho. Por isso, acabou se tornando um lugar onde consigo relaxar."
10018090-116 = "Sobre o duelo culinário... você se sente dividida, Fuuka-san?"
10018090-117 = "Seria mentira dizer que não."
10018090-118 = "Fico me perguntando contra o que exatamente estamos lutando..."
10018090-119 = "Naturalmente, contra a Nyaofood, que engana as pessoas e corrompe o caminho da gastronomia."
10018090-120 = "Eu ouvi o que a Akari disse sobre o Grupo Gourmet Helmet e a Haruna."
10018090-124 = "...Foi a Akari quem te contou?"
10018090-125 = "Sim."
10018090-126 = "Entendo... então era por isso que você estava preocupada."
10018090-127 = "Se vencermos, será que as pessoas que trabalham na Nyaofood vão perder seus empregos?"
10018090-128 = "...Não posso dizer que essa possibilidade não existe."
10018090-129 = "Se o Suzume-tei conseguir repelir a pressão da Nyaofood,"
10018090-130 = "outros ao redor também não desistirão de proteger seus próprios estabelecimentos."
10018090-131 = "E se, como resultado, isso levar a uma queda no desempenho da Nyaofood..."
10018090-132 = "A carga de trabalho diminuirá e, inevitavelmente, haverá demissões."
10018090-133 = "É... é exatamente isso que me preocupa."
10018090-134 = "Além disso, é verdade que entre os comerciantes, há quem apoie a Nyaofood."
10018090-135 = "Não me disseram diretamente, mas senti olhares de reprovação, como se dissessem para eu não me meter onde não fui chamada."
10018090-136 = "Algumas pessoas preferem as coisas como elas são."
10018090-137 = "Embora, é claro, eu prefira mudanças."
10018090-138 = "Hehe. Por causa dessas mudanças que a Haruna tanto gosta, eu acabo passando por muitos apuros."
10018090-139 = "Ora, é mesmo?"
10018090-140 = "Eu só queria ajudar o Suzume-tei."
10018090-141 = "Como foi que isso tomou proporções tão grandes?"
10018090-142 = "O que mais te preocupa, Fuuka-san?"
10018090-143 = "As pessoas que vão perder algo se nós vencermos."
10018090-144 = "Eu não gosto de ver ninguém sofrendo. Foi por isso, em parte, que entrei para o Clube de Merenda."
10018090-148 = "...O que você pensa sobre nós?"
10018090-149 = "O mesmo que penso sobre a Haruna e os outros. Para mim, todos que vêm ao refeitório são alunos de quem preciso cuidar."
10018090-150 = "Então, o Grupo Gourmet Helmet é uma existência semelhante, não é?"
10018090-151 = "É estranho, né? Mesmo eles vivendo para nos atrapalhar."
10018090-156 = "Fuuka-san."
10018090-158 = "Hm?"
10018090-160 = "A gastronomia exige sacrifícios. #nSe hesitarmos, restaurantes maravilhosos continuarão desaparecendo assim —"
10018090-161 = "Não podemos simplesmente ficar de braços cruzados assistindo a isso. #nÉ por isso que estamos lutando, não é?"
10018090-162 = "...É, você tem razão."
10018090-163 = "Exato. Além disso, a Nyaofood não vai pegar leve conosco."
10018090-167 = "Eles estão tentando nos destruir usando qualquer meio necessário."
10018090-168 = "E, do lado deles, há pouco a perder caso sejam derrotados nesta disputa."
10018090-169 = "As condições de trabalho podem piorar ou alguém pode ser demitido, mas isso são apenas possibilidades."
10018090-172 = "Em contrapartida, a dona do Suzume-tei perderá tudo se perder."
10018090-173 = "Não é uma possibilidade, é uma certeza."
10018090-174 = "Isso é... verdade."
10018090-177 = "E quem sofre não é apenas a dona do Suzume-tei."
10018090-178 = "O pessoal do centro comercial. Eles também podem ser chamados de vítimas, não é?"
10018090-179 = "Por que?"
10018090-185 = "Porque eles perderiam a chance de saborear a verdadeira gastronomia, então é óbvio, não é?"
10018090-191 = "……Fufu."
10018090-192 = "P-por que está rindo!?"
10018090-193 = "Não, é que isso soa bem a sua cara, Haruna."
10018090-194 = "Ehem."
10018090-195 = "De qualquer forma, quando se trata de gastronomia, eu falo sério. Não pretendo ceder nem um passo."
10018090-196 = "E isso também vale para você, Fuuka-san."
10018090-197 = "Eu...?"
10018090-198 = "Você quase nunca mostrou o seu verdadeiro potencial, não é?"
10018090-199 = "Se disser que não tive a oportunidade, acho que é verdade."
10018090-201 = "Mas agora é a chance. É a oportunidade perfeita para mostrar o seu talento."
10018090-203 = "É verdade."
10018090-204 = "Já que a Haruna vai dar o seu melhor, eu também preciso me esforçar."
10018090-205 = "Sim, já chegamos até aqui."
10018090-206 = "Fufu, tudo graças ao Sensei que está escondido ali."
10018090-211 = "Sensei, pode sair."
10018090-212 = "Você está aí, não está?"
10018090-213 = "[s] \"Você sabia que eu estava aqui?\""
10018090-215 = "De alguma forma, senti que você estava por perto."
10018090-220 = "Misturando o caldo nos ovos..."
10018090-224 = "Agora açúcar, shoyu, mirin..."
10018090-225 = "Como está o kazunoko?"
10018090-226 = "Sim, já está de molho. Agora vou grelhar o peixe..."
10018090-227 = "Os camarões também ficaram bem suculentos."
10018090-232 = "Vou deixar de molho no caldo até a hora de servir..."
10018090-236 = "Senpai! Terminei de cortar as cenouras!"
10018090-237 = "Obrigada!"
10018090-238 = "Ah, esqueci do taro..."
10018090-244 = "Fufu. Que cena maravilhosa."
10018090-245 = "A dona do restaurante e o Clube de Merenda unindo forças para fazer o osechi, com o Clube de Pesquisa Gastronômica dando suporte."
10018090-247 = "Embora a gente só esteja comendo muito sob o pretexto de provar a comida★"
10018090-248 = "Isso também é trabalho, sabe. Quando terminar de provar, leve os próximos ingredientes."
10018090-249 = "Uau~ que felicidade! Quem dera pudéssemos comer assim todos os dias!"
10018090-259 = "Mufufufu. Como está a linha de produção do osechi?"
10018090-260 = "Está progredindo bem. A linha de fervura, a de conservas e a de grelhados estão todas operando."
10018090-261 = "Produção em massa! Consumo em massa! Esteira rolante!"
10018090-262 = "Isso sim é uma fábrica de alimentos da Nyao Foods!"
10018090-264 = "Vamos, trabalhem, trabalhem! A vida só tem sentido com trabalho!"
10018090-269 = "Todo mundo já está fazendo hora extra, mas..."
