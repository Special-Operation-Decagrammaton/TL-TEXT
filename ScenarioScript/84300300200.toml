[translation]
84300300200-5 = "Entendi a situação."
84300300200-6 = "Seia, concluí que não há motivos para ficar em alerta com você."
84300300200-7 = "Não... na verdade, eu deveria pedir desculpas primeiro por ter te envolvido nos problemas do Millennium."
84300300200-8 = "Não... não precisa se desculpar. Fui eu quem me intrometeu."
84300300200-9 = "……É certo que elas estão tramando algo."
84300300200-10 = "Você avisou o Seminar?"
84300300200-11 = "Normalmente eu teria feito isso, mas... desta vez não posso."
84300300200-12 = "A identidade do 'algo' que está agindo nos bastidores ainda não foi revelada."
84300300200-13 = "Se eu avisar o Seminar, a Millennium EXPO será cancelada. #nMas esse não é o resultado que eu desejo."
84300300200-14 = "Eu entendo, mas não parece haver outra saída..."
84300300200-19 = "……Entendo."
84300300200-20 = "Então é por isso que você estava lá."
84300300200-21 = "Vocês estão tentando resolver isso por baixo dos panos, não é?"
84300300200-22 = "Rio, você ainda recorre a esse tipo de método..."
84300300200-23 = "A Millennium EXPO é um dos eventos mais importantes. #nMesmo que eu tenha que me esforçar um pouco, não vou deixar que seja cancelada."
84300300200-24 = "……Encontrei um fluxo de dados suspeito durante o período de preparação."
84300300200-25 = "Ainda não consegui compreender a totalidade do plano, mas... é justamente por isso que estou seguindo as pistas que tenho agora—"
84300300200-27 = "……Não, espere."
84300300200-28 = "O que foi?"
84300300200-29 = "Essa pessoa estava escondida dentro da caixa antes mesmo de eu chegar."
84300300200-30 = "Será que ela não ouviu alguma coisa?"
84300300200-32 = "……Ah."
84300300200-33 = "Eu ouvi a conversa."
84300300200-34 = "E então... o que elas disseram?"
84300300200-35 = "Não me importo de contar, mas..."
84300300200-39 = "Tenho apenas uma condição."
84300300200-40 = "Uma condição?"
84300300200-42 = "Hã?"
84300300200-43 = "Ei, você não entende a situação em que está?"
84300300200-44 = "Ner, ela é do Tea Party de Trinity. #nPor favor, não crie problemas desnecessários."
84300300200-45 = "Então o que a gente faz?"
84300300200-46 = "Primeiro, devemos ouvir o que ela quer."
84300300200-47 = "Se for um acordo razoável, podemos aceitar. Não é só isso?"
84300300200-48 = "Bem, tudo depende do conteúdo da exigência dela."
84300300200-49 = "Dá para chamar isso de acordo? #nBem, se é assim que você quer, por mim tudo bem."
84300300200-50 = "……É irracional tirar conclusões antes de ter todos os elementos para julgar."
84300300200-51 = "Então... qual é a sua exigência?"
84300300200-53 = "Ora, você está sendo cooperativa..."
84300300200-54 = "Minha exigência é bem simples."
84300300200-58 = "……Quero que me incluam na operação."
84300300200-63 = "Hã...?"
84300300200-64 = "O quê? Você está falando sério?"
84300300200-65 = "Desculpe... não consigo entender suas intenções."
84300300200-66 = "É exatamente o que eu disse. Não há segundas intenções."
84300300200-68 = "Hã? Você acha que pode colaborar com algo assim?"
84300300200-69 = "Isso não vai dar certo. Vou jogá-la em qualquer lugar por aí—"
84300300200-71 = "Isso é uma péssima ideia. #nJá que ela sabe sobre nós, não podemos simplesmente deixá-la ir."
84300300200-72 = "Além disso... seria irracional perder uma pista aqui."
84300300200-73 = "Então, quer que eu a faça falar à força?"
84300300200-77 = "Seia... eu tenho uma dívida com você."
84300300200-78 = "……Permitirei que participe da operação."
84300300200-82 = "No entanto, você deve seguir minhas instruções, não importa o que aconteça. Essa condição é inegociável."
84300300200-88 = "……Hã!?"
84300300200-89 = "Ela é digna de confiança. Com esse acordo, os benefícios de tê-la como aliada devem ser maiores."
84300300200-90 = "Hã……???"
84300300200-91 = "……Uau, então você também consegue crescer, hein."
84300300200-92 = "Nunca pensei que ouviria a palavra \"confiança\" saindo da sua boca."
84300300200-93 = "Isso só mostra o quanto a posição e a habilidade dela são valiosas."
84300300200-94 = "Hmm……?"
84300300200-95 = "Bem, faça o que quiser, não é? Eu não vou ficar cuidando dela, entendeu?"
84300300200-96 = "Não pretendo forçá-la a isso. Planejo que ela siga por uma rota diferente."
84300300200-97 = "Diferente de mim e da Neru, ela pode caminhar livremente por lugares movimentados. #nUsando sua posição como convidada, ela não levantará suspeitas nem correrá perigo."
84300300200-98 = "Pretendo usar isso para que ela investigue qualquer movimento suspeito dentro do local."
84300300200-99 = "Enquanto isso, nós rastrearemos o fluxo de informações no centro de dados."
84300300200-100 = "Pode-se dizer que é uma operação de distração. Não é uma divisão de tarefas adequada?"
84300300200-105 = "Hum……."
84300300200-106 = "O que foi, está insatisfeita?"
84300300200-107 = "Nós não estamos fazendo isso por brincadeira—"
84300300200-108 = "Não, não tenho objeções. O acordo está feito."
84300300200-110 = "Sendo assim, gostaria de receber o pagamento."
84300300200-111 = "Qual a identidade e o objetivo delas?"
84300300200-112 = "Não obtive informações suficientes para esclarecer tudo, mas……."
84300300200-113 = "O objetivo é ganhar dinheiro. Mas o problema é o método."
84300300200-114 = "Elas estão……."
84300300200-115 = "……."
84300300200-116 = "……."
84300300200-121 = "Planejando a \"falência da Millennium EXPO\"."
