[translation]
84300300200-5 = "状況は理解したわ。"
84300300200-6 = "セイア、貴女を警戒する理由はない、そう結論づけたわ。"
84300300200-7 = "いえ……むしろミレニアムの問題に巻き込んでしまったことを先に謝罪すべきかしら。"
84300300200-8 = "いや……それには及ばない。深入りしたのは私だ。"
84300300200-9 = "……彼女らが何かを企んでいるのは確かだろう。"
84300300200-10 = "セミナーには知らせたのかい？"
84300300200-11 = "いつもならそうしているのだけれど……今回はそうもいかない。"
84300300200-12 = "裏で動いている「何か」の正体がまだ判明していないのよ。"
84300300200-13 = "セミナーに知らせれば、ミレニアムEXPOは中止になるでしょう。#nけれど、それは私の望む結果では無い。"
84300300200-14 = "理解はできるが、他に手があるようには……。"
84300300200-19 = "……なるほど。"
84300300200-20 = "だから、あの場に。"
84300300200-21 = "君たちは、水面下での解決を試みているのだね。"
84300300200-22 = "リオ、君はまだこんな手段を……。"
84300300200-23 = "ミレニアムEXPOは重要行事の一つ。#n多少無理をしたとしても、中止になどさせないわ。"
84300300200-24 = "……準備期間中に不審なデータの流れを見つけたの。"
84300300200-25 = "まだ計画の全容は掴めていないけれど……だからこそ、今ある手がかりを辿って――"
84300300200-27 = "……いや、待てよ。"
84300300200-28 = "なにかしら。"
84300300200-29 = "こいつ、あたしが着く前から箱の中に隠れてたんだ。"
84300300200-30 = "何か聞いてんじゃねぇのか？"
84300300200-32 = "……ああ。"
84300300200-33 = "会話を聞いていたよ。"
84300300200-34 = "それで……彼女たちはなんと？"
84300300200-35 = "伝えるのは構わないが……。"
84300300200-39 = "一つだけ条件がある。"
84300300200-40 = "条件？"
84300300200-42 = "ああん？"
84300300200-43 = "おい、状況分かってねぇのか？"
84300300200-44 = "ネル、彼女はトリニティのティーパーティーよ。#n余計な揉め事はやめてちょうだい。"
84300300200-45 = "じゃあどうすんだよ。"
84300300200-46 = "まずは彼女の要求を聞くべきよ。"
84300300200-47 = "合理的な取引であれば、応じれば良い。それだけじゃなくて？"
84300300200-48 = "まぁ、それも全ては要求の内容次第だけれど。"
84300300200-49 = "取引って言えるのか？#nまぁ、そういうのなら構わないけどよ。"
84300300200-50 = "……判断材料が揃う前に結論を出すのは非合理的だもの。"
84300300200-51 = "それで……要求は何かしら？"
84300300200-53 = "おや、協力的なのだね……。"
84300300200-54 = "私からの要求は至ってシンプルだ。"
84300300200-58 = "……作戦に私を加えて欲しい。"
84300300200-63 = "え……？"
84300300200-64 = "は？正気か？"
84300300200-65 = "ごめんなさい……貴女の意図が読めないのだけれど。"
84300300200-66 = "言葉通りだ。他意は無い。"
84300300200-68 = "は？そんなんで協力できると思ってんのか？"
84300300200-69 = "こりゃダメだ。適当にその辺に転がしてくるから――"
84300300200-71 = "それは悪手よ。#n私たちの事を知られた以上、彼女を帰すわけにはいかないわ。"
84300300200-72 = "それに……ここで手がかりを逃すのは非合理的だわ。"
84300300200-73 = "なら、物理的に[ruby=・]喋[/ruby][ruby=・]り[/ruby][ruby=・]た[/ruby][ruby=・]く[/ruby][ruby=・]な[/ruby][ruby=・]っ[/ruby][ruby=・]て[/ruby][ruby=・]も[/ruby][ruby=・]ら[/ruby][ruby=・]う[/ruby]か？"
84300300200-77 = "セイア……貴女には借りがある。"
84300300200-78 = "……作戦への参加を許可しましょう。"
84300300200-82 = "ただし、何があっても私の指示に従うこと。この条件は譲れないわ。"
84300300200-88 = "……はあ！？"
84300300200-89 = "彼女は信頼に値する。この取引なら、仲間に引き込むメリットの方が大きいはずよ。"
84300300200-90 = "は……？？？"
84300300200-91 = "……はぁ、お前も成長することあるんだな。"
84300300200-92 = "お前の口から「信頼」って言葉が出てくるなんてよ。"
84300300200-93 = "それだけ彼女の立場と能力には価値があるということよ。"
84300300200-94 = "ふーん……？"
84300300200-95 = "ま、好きにすればいいんじゃないか？あたしは面倒見ねぇからな？"
84300300200-96 = "貴女に押し付けるつもりはないわ。彼女には別のルートで行ってもらう予定よ。"
84300300200-97 = "私やネルと違って、彼女なら人目のある場所を堂々と歩ける。#n招待客の立場を利用すれば、疑われることも、危険にさらされることも無い。"
84300300200-98 = "それを利用して会場内の不審な動きを調査してもらおうと思っているわ。"
84300300200-99 = "その間、私たちはデータセンターで情報の流れを追う。"
84300300200-100 = "陽動作戦ともいえるわね。適切な役割分担ではなくて？"
84300300200-105 = "ふむ……。"
84300300200-106 = "なんだ、不満か？"
84300300200-107 = "あたし達は遊びでやってるわけじゃ――"
84300300200-108 = "いや、異存は無い。取引は成立だ。"
84300300200-110 = "それでは、対価をいただこうかしら。"
84300300200-111 = "彼女たちの正体と目的は？"
84300300200-112 = "全て[ruby=つまび]を詳ら[/ruby]かにできるほど情報を得た訳では無いが……。"
84300300200-113 = "目的は金稼ぎ。だが問題なのはその手段だ。"
84300300200-114 = "彼女たちは……。"
84300300200-115 = "……。"
84300300200-116 = "……。"
84300300200-121 = "「ミレニアムEXPOの破綻」を目論んでいる。"
