[translation]
80000087-1 = "眠気対策？"
80000087-2 = "シャーレ・執務室"
80000087-3 = "（バレンタインデーより数日前のある朝、シャーレの執務室に向かうと……）"
80000087-8 = "あー……コホン。"
80000087-9 = "いい朝だな、先生。"
80000087-10 = "[s] \"うん。おはよう、サキ。\""
80000087-11 = "ところで、その……特に深い意味はないんだけど。"
80000087-12 = "今、眠かったりしないか？"
80000087-13 = "[s1] \"うん、大丈夫だよ。\"\n[s2] \"昨日は久しぶりにぐっすり眠れたんだ！\""
80000087-14 = "……そうか、ならいい。"
80000087-15 = "……そうか、ならいい。"
80000087-16 = "いつも夜遅くまでシャーレの電気がついているから……。#n寝不足じゃないか、一応聞いてみただけだ。"
80000087-17 = "[s] \"……もしかして、心配してくれたの？\""
80000087-18 = "……はぁ？そ、そんなわけないだろ！"
80000087-19 = "わざわざ時間を作って当番の仕事に来てるのに、#n先生が居眠りしたら困るだけだ！"
80000087-20 = "ほ、ほら！元気ならさっさと今日の仕事を始めるぞ！"
80000087-22 = "（……しかしその後も、サキは何度も「眠くないか」と聞いてきた）"
80000087-24 = "（昼食後も……）"
80000087-25 = "ふぅ……もうお腹いっぱいだ。"
80000087-26 = "これだけ食べると、眠くなるな……。"
80000087-27 = "どうだ？先生も眠くならないか？"
80000087-28 = "[s] \"どうだろう……あんまりかな……？\""
80000087-29 = "そ、そうか……。"
80000087-31 = "（休憩中、テレビを見ている時も……）"
80000087-32 = "……はあ、この番組はハズレだな。"
80000087-33 = "ところで先生、ドキュメンタリー番組のナレーションは、#n「聞くだけで眠くなる」人もいるらしいぞ。"
80000087-34 = "先生はどうだ？眠くなってこないか？"
80000087-35 = "[s] \"そんなことはない……かな？\""
80000087-36 = "……ならいい。"
80000087-38 = "……ん？作業用BGMがいつもと違うな。"
80000087-39 = "クラシックか……。"
80000087-40 = "クラシックは静かで安らかな曲が多く、眠気に襲われやすい……"
80000087-41 = "どうだ？今眠かったりしないか？"
80000087-42 = "[s] \"そう言われると、眠くなってきた気も……。\""
80000087-51 = "ふふん、そうかそうか。"
80000087-52 = "そんな先生に、ちょうどいいものがある。"
80000087-57 = "ほら、これを受け取れ。"
80000087-58 = "[s] \"ありがとう！でも、どうしてキャラメル……？\""
80000087-59 = "キャラメルは簡単に作れて、かつ糖分やカロリーの補給に適している。#nそのため戦闘用の補給品としても支給されるんだ。"
80000087-60 = "特にこのチョコレートキャラメルは、口の中で溶けにくく歯ごたえがある。#n夜間の見張りを行う哨兵たちも眠気覚ましによく食べているそうだ。"
80000087-61 = "他にも、危険な夜道を車で移動する際、運転手が居眠りしないよう、#n助手席の者がこのキャラメルを食べさせ続けたという逸話もある。"
80000087-62 = "そんな素晴らしいキャラメルが、先日の補給で手に入ってな。#n先生にどうかと思って持ってきた。眠い時に食べるといい。"
80000087-63 = "[s] \"試してみるね。ところで、これ……。\""
80000087-65 = "[ns] \"もしかして、バレンタインデーのチョコレート？\""
80000087-67 = "は、はあっ！？そ、そんなわけないだろ！"
80000087-68 = "常日頃から訓練に励むべきSRT特殊学園の生徒が、#nバレンタインデーなんて浮ついたイベントに興味があるはずない！"
80000087-69 = "これはたまたま……たまたま時期が被っただけだ！"
80000087-73 = "ほ、本当だからな！勘違いするんじゃないぞ！"
