[translation]
80000087-1 = "Medidas contra o sono?"
80000087-2 = "Schale - Escritório"
80000087-3 = "（Algumas manhãs antes do Dia dos Namorados, ao me dirigir ao escritório da Schale...）"
80000087-8 = "Ah... cof, cof."
80000087-9 = "Bom dia, Sensei."
80000087-10 = "[s] \"Bom dia, Saki.\""
80000087-11 = "A propósito, não que isso tenha um significado profundo, mas..."
80000087-12 = "Você está com sono agora?"
80000087-13 = "[s1] \"Não, estou bem.\"\n[s2] \"Ontem eu consegui dormir muito bem pela primeira vez em muito tempo!\""
80000087-14 = "……Entendo, então está bem."
80000087-15 = "……Entendo, então está bem."
80000087-16 = "Como as luzes da Schale ficam acesas até tarde da noite...#nEu só queria saber se você não estava privado de sono."
80000087-17 = "[s] \"……Por acaso você estava preocupada comigo?\""
80000087-18 = "……Hã? C-claro que não!"
80000087-19 = "Eu tiro um tempo para vir aqui fazer meu trabalho de plantão, #nseria um problema se o Sensei ficasse dormindo no serviço!"
80000087-20 = "A-anda logo! Se você está bem, vamos começar o trabalho de hoje!"
80000087-22 = "（……No entanto, depois disso, Saki perguntou várias vezes se eu estava com sono）"
80000087-24 = "（Depois do almoço...）"
80000087-25 = "Ufa... estou satisfeita."
80000087-26 = "Comer tudo isso dá um sono..."
80000087-27 = "E você? Não está com sono, Sensei?"
80000087-28 = "[s] \"Quem sabe... talvez um pouco...?\""
80000087-29 = "E-entendo..."
80000087-31 = "（Durante o intervalo, enquanto assistíamos TV...）"
80000087-32 = "……Ah, esse programa é bem chato."
80000087-33 = "A propósito, Sensei, dizem que a narração de documentários #nfaz algumas pessoas sentirem sono só de ouvir."
80000087-34 = "Como você está? Não está ficando com sono?"
80000087-35 = "[s] \"Não acho que seja o caso... talvez?\""
80000087-36 = "……Então está bem."
80000087-38 = "……Hm? A música de fundo para o trabalho está diferente do habitual."
80000087-39 = "Música clássica, hein..."
80000087-40 = "Músicas clássicas costumam ser calmas e tranquilas, o que facilita o sono..."
80000087-41 = "E então? Você não está com sono agora?"
80000087-42 = "[s] \"Agora que você mencionou, acho que estou começando a ficar...\""
80000087-51 = "Hehe, é mesmo?"
80000087-52 = "Tenho algo perfeito para um Sensei como você."
80000087-57 = "Tome, pegue isto."
80000087-58 = "[s] \"Obrigado! Mas por que caramelo...?\""
80000087-59 = "Caramelo é fácil de fazer e é ótimo para repor açúcar e calorias. #nPor isso, é distribuído como suprimento de combate."
80000087-60 = "Este caramelo de chocolate, em especial, não derrete fácil na boca e é bem firme. #nDizem que os sentinelas que fazem vigília noturna costumam comer para espantar o sono."
80000087-61 = "Há também uma história de que, ao dirigir por estradas perigosas à noite, #no passageiro dava esses caramelos ao motorista para que ele não dormisse ao volante."
80000087-62 = "Consegui esse caramelo incrível nos suprimentos de outro dia. #nPensei em você e trouxe. Coma quando estiver com sono."
80000087-63 = "[s] \"Vou experimentar. A propósito, isso aqui...\""
80000087-65 = "[ns] \"Por acaso é um chocolate de Dia dos Namorados?\""
80000087-67 = "H-hã!? C-claro que não!"
80000087-68 = "Uma aluna da Academia SRT, que deve se dedicar ao treinamento diariamente, #nnão teria interesse em um evento fútil como o Dia dos Namorados!"
80000087-69 = "Isso foi apenas uma coincidência... uma coincidência de datas!"
80000087-73 = "É-é verdade! Não vá entender errado!"
