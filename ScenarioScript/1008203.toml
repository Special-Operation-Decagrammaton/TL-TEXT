[translation]
1008203-1 = "青春の定番：転校生"
1008203-3 = "[ns] \"青春活動って……具体的に何をすればいいの？\""
1008203-4 = "うむ、いい質問だ。"
1008203-5 = "突然「青春活動」と言われても、何をすればいいのか分からないと思う。"
1008203-6 = "特にアタシたちのような「青春初心者」には、全てが手探り……簡単には答えが出せない。"
1008203-7 = "ま、そもそも「青春活動」が曖昧だから仕方ないんだけど……"
1008203-8 = "[s1] \"青春活動に初心者とかあるんだ……\"\n[s2] \"うーん、そんなに難しく考えるものかな？\""
1008203-13 = "いやいや……青春活動を甘く見ないでよね？"
1008203-14 = "まともな青春活動をしてこなかったアタシたちのような初心者が、何も準備しないで飛び込んだら……"
1008203-15 = "[s] \"……飛び込んだら？\""
1008203-16 = "急激なショックを受けて……"
1008203-20 = "「急性セイシュニウムアレルギーショック」で大変なことになるかもしれない！"
1008203-24 = "[ns] \"青春活動の話だよね！？\""
1008203-25 = "もちろん……？#nそれだけ危険だという話だよ。"
1008203-26 = "こういうところは、運動と似ているかも。#n準備運動をしっかりしないと怪我しやすくなるのと同じ。"
1008203-27 = "……まあ、安心して。"
1008203-28 = "この日のために、日頃から「青春活動」の計画を立ててきたから。"
1008203-29 = "[s] \"そ、そこまでしてたんだ……\""
1008203-33 = "そ、それは！"
1008203-34 = "ずっと夢だったから仕方ないだろ！"
1008203-35 = "とにかく！青春について調べていたら、ひとつ気づいたことがあるんだ。"
1008203-36 = "青春とは、まず関係性が重要なんだと。"
1008203-37 = "[s] \"うーん、例えば……？\""
1008203-41 = "例えば……世間でいうライバル関係。"
1008203-42 = "お互い切磋琢磨し、喧嘩をしては仲直りをし、再び肩を並べて前に進む関係。"
1008203-43 = "その過程で友情が深まる様子は……"
1008203-44 = "まさに青春！！！"
1008203-45 = "[s] \"分かるような、分からないような……\""
1008203-46 = "もちろん、ライバル関係だけじゃないよ！"
1008203-47 = "世の中には色んな関係性があって、その数だけ「青春活動」がある。"
1008203-48 = "というわけで、記念すべき「第一回青春活動」でアタシが用意してきた関係性は……"
1008203-52 = "「転校生」だ！"
1008203-53 = "[ns] \"転校……生？\""
1008203-55 = "さあ、せんせ……"
1008203-56 = "いや、師匠！師匠には今から転校生になってほしい！"
1008203-62 = "（転校生といえば、まずはこれ！と言うレンゲに連れられて……）"
1008203-63 = "（調停室近くの路地まで来た）"
1008203-67 = "[ns] \"レンゲ、ここに転校生と何の関係が……\""
1008203-68 = "アタシ、この前も言ったな？"
1008203-69 = "青春活動とは……要するに「恋よ鯉」の作品みたいなものだって。"
1008203-70 = "師匠も知っての通り、「恋よ鯉」のデビュー作は主人公の転校生とヒロインがドタバタ劇を繰り広げる青春小説なんだけど……"
1008203-71 = "[s3] \"あ、うん。そうだったね。\"\n[s4] \"……そうだったかな？\""
1008203-74 = "突然やって来た謎の転校生と出会い、何が起こるか分からない毎日にときめくヒロイン！"
1008203-75 = "そこで今日の青春活動は、それをなぞってみようと思う！"
1008203-76 = "題して「転校生青春活動」だ！"
1008203-77 = "[s] \"作品と同じ体験をしてみようってこと？\""
1008203-78 = "その通り！"
1008203-79 = "アタシの考えを一瞬で見抜くとは！さすが師匠！"
1008203-80 = "ほら、これも忘れずに持ってきた。"
1008203-84 = "[ns] \"これは、食パン……？まさか……\""
1008203-85 = "よし、それじゃあ師匠はここにいてくれ！#n合図をしたら行くよ！"
1008203-89 = "[ns] \"ちょ、待っ……レンゲ！？\""
1008203-94 = "ふぅ、この辺りで良いかな。"
1008203-98 = "食パンをこうして……軽くストレッチもして……"
1008203-102 = "心地よい日差しに過ごしやすい風…… "
1008203-105 = "風のささやきが聞こえる……今こそ「青春活動」の時間だと！"
1008203-106 = "転校生といえば欠かせない、最初のエピソード……！"
1008203-111 = "「転校初日から遅刻しそうになり、食パンを咥えたまま走って曲がり角であの子と衝突！」イベント開始！"
1008203-116 = "（レンゲが合図と共に走り出した）"
1008203-121 = "さあ！食パンを咥えて！全力で！走る！"
1008203-122 = "ここであのセリフを……！"
1008203-123 = "「いけない！ちこくちこく～！」"
1008203-127 = "ふふっ！覚悟はできてるか……！師匠！"
1008203-133 = "[ns] \"レンゲが凄まじい勢いでこっちに……このままだと！\""
1008203-137 = "はああっ！"
1008203-138 = "（そうして、衝突する寸前で……）"
1008203-143 = "[ns] \"き、緊急回避っっ！\""
1008203-150 = "師匠！どうして避けるんだ！？"
1008203-151 = "ここで転校生とぶつかって、教室で「あっ！」ってならないといけないのに！"
1008203-152 = "[s5] \"あの勢いで衝突したら……\"\n[s6] \"残るのは印象じゃなくて怪我じゃないかな！？\""
1008203-157 = "う～ん……そ、そうかな？"
1008203-158 = "[s] \"危ないから中止！\""
1008203-159 = "まあ、師匠がそう言うなら……"
1008203-160 = "師匠の教えに従うよ！"
1008203-161 = "よし、次に行こう！"
1008203-163 = "（その後もレンゲの「転校生」エピソードは続いた）"
1008203-165 = "食パンイベントの次は、いよいよアレだ。"
1008203-166 = "朝のホームルームで……"
1008203-171 = "[ns] \"初めまして、転校してきた……\""
1008203-175 = "……あんたは！さっき曲がり角でぶつか……りはしなかったけど、あの時の！"
1008203-176 = "朝は見逃してやったけど、今度はタダじゃおかないからな！"
1008203-177 = "[s] \"それ、何かと混ざってない！？\""
1008203-179 = "そして隣の席になった二人には……"
1008203-180 = "また次のイベントが待っている。"
1008203-182 = "なんだ、"
1008203-183 = "転校初日で教科書が無いの？"
1008203-184 = "ふ……ふん！それなら仕方ないな！"
1008203-185 = "ほら、机をくっつけて。"
1008203-191 = "き、今日だけアタシの教科書を見せてやる。#n今日だけだからな！"
1008203-192 = "ちなみに、この線よりこっちに来たら……"
1008203-196 = "全力で机を叩き割ってやる。その覚悟でいるんだな。"
1008203-197 = "[s] \"普通はもっとこう、優しく接するんじゃない！？\""
1008203-199 = "え？そ、そうなの？#n経験が無いから、分からなくて……"
1008203-200 = "でも……実際、会ったばかりの転校生とそこまで距離が近いのはどうなんだ？"
1008203-201 = "あんまり距離が近いとちょっとこう……イライラするというか……"
1008203-202 = "[s] \"レンゲらしいとは思うけどね！？\""
1008203-208 = "（そうして様々な転校生エピソードを一つひとつ試していると……）"
1008203-210 = "（いつの間にか、夕方になっていた）"
1008203-216 = "[ns7] \"もうこんな時間だけど……\"\n[ns8] \"今日の青春活動はどうだった？\""
1008203-221 = "うーん、正直に言うと……"
1008203-222 = "微妙、だったような。"
1008203-226 = "ち、違う！師匠に文句があるわけじゃない！"
1008203-227 = "ただ……今日の活動は……アタシが夢に見ていたのとは微妙に違って……"
1008203-228 = "実際にやってみると、どこか物足りなくてな。"
1008203-229 = "なんて言えばいいんだ……"
1008203-230 = "自分でも何をしたかったのか……よく、分からなくなってきた。"
1008203-231 = "[s] \"そっか……\""
1008203-232 = "色々と協力してもらったのに、中途半端な結果になっちまったな。"
1008203-233 = "もっと、アタシがしっかりしてれば……"
1008203-234 = "ごめん、師匠。全部アタシのせいだ。"
1008203-235 = "……よし、切り替えよう！もうこんな時間だしな。"
1008203-239 = "残念だけど、今日はこれで解散して……"
1008203-240 = "[s] \"転校生なら、帰り道が分からないんじゃない？\""
1008203-244 = "……？"
1008203-245 = "[s] \"だから、一緒に帰るのはどうかな？\""
1008203-249 = "あ……"
1008203-250 = "引っ越してきたばかりの、知らない土地で……"
1008203-251 = "遊ぶ場所はどこにあるのか。#n本屋、映画館、バス停……"
1008203-252 = "転校生は知らないよな……"
1008203-253 = "[s] \"それを教えてあげたら喜んでくれるんじゃない？\""
1008203-254 = "……そう、だ。"
1008203-255 = "先生の言う通りだな！"
1008203-256 = "さすが師匠……いや、青春師匠！"
1008203-260 = "そうと決まったら！行こう！まだ時間は大丈夫？"
1008203-261 = "アタシの行きつけのバッティングセンターとか……ゲームセンターとか！"
1008203-265 = "あ！この近くに季節限定メニューがめちゃくちゃ美味しい定食屋さんがあって……！"
1008203-267 = "（そうして元気を取り戻したレンゲと一緒に、しばらく街を歩いて回った）"
