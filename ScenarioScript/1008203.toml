[translation]
1008203-1 = "Base da juventude: estudante transferido"

1008203-3 = "[ns] \"O que exatamente devo fazer em relação às atividades juvenis?\""

1008203-4 = "Hum, boa pergunta."

1008203-5 = "Acho que não saberia o que fazer se alguém de repente me falasse sobre “atividades para jovens”."

1008203-6 = "Especialmente para “jovens iniciantes” como nós, estamos todos tentando descobrir tudo... não conseguimos encontrar uma resposta facilmente."

1008203-7 = "Bem, não tem jeito porque “atividades juvenis” são vagas em primeiro lugar..."

1008203-8 = "[s1] \"Existem coisas como iniciantes em atividades juvenis...\"\n[s2] \"Hmm, é realmente tão difícil pensar nisso?\""

1008203-13 = "Não, não... não subestime as atividades juvenis, certo?"

1008203-14 = "Se iniciantes como eu, que não tiveram nenhuma atividade juvenil adequada, entram sem qualquer preparação..."

1008203-15 = "[s] \"...E se eu entrar?\""

1008203-16 = "Recebi um choque repentino..."

1008203-20 = "``Choque alérgico agudo ao Seishnium'' pode causar sérios problemas!"

1008203-24 = "[ns] \"É sobre atividades juvenis, certo!?\""

1008203-25 = "claro……? #nIsso é muito perigoso."

1008203-26 = "Nesse aspecto, pode ser semelhante ao exercício. #nSe você não fizer os exercícios de aquecimento adequadamente, terá maior probabilidade de se machucar."

1008203-27 = "...Bem, não se preocupe."

1008203-28 = "Tenho planejado minhas “atividades juvenis” para este dia."

1008203-29 = "[s] \"Bem, foi isso que eu fiz...\""

1008203-33 = "É isso!"

1008203-34 = "É meu sonho há muito tempo, então não posso evitar!"

1008203-35 = "de qualquer forma! Quando eu estava pesquisando sobre juventude, percebi uma coisa."

1008203-36 = "A juventude tem tudo a ver com relacionamentos."

1008203-37 = "[s] \"Hmm, por exemplo...?\""

1008203-41 = "Por exemplo... uma rivalidade no mundo."

1008203-42 = "Uma relação onde trabalhamos muito juntos, brigamos, nos reconciliamos e voltamos a seguir em frente lado a lado."

1008203-43 = "Como a amizade deles se aprofunda no processo..."

1008203-44 = "Verdadeiramente jovem! ! !"

1008203-45 = "[s] \"Eu entendo, não entendo...\""

1008203-46 = "Claro, não é apenas uma rivalidade!"

1008203-47 = "Existem muitos tipos de relacionamentos no mundo, e existem tantas “atividades juvenis” quantos relacionamentos."

1008203-48 = "Então, o relacionamento que preparei para as memoráveis ​​“Primeiras Atividades Juvenis” é..."

1008203-52 = "É um \"aluno transferido\"!"

1008203-53 = "[ns] \"Transferir... estudante?\""

1008203-55 = "Vamos, sensei..."

1008203-56 = "Não, mestre! Quero que meu mestre se torne um aluno transferido de agora em diante!"

1008203-62 = "(Falando em alunos transferidos, esse é o primeiro! Fui levado pelo Renge...)"

1008203-63 = "(Ele chegou a um beco perto da sala de mediação)"

1008203-67 = "[ns] \"Renge, o que isso tem a ver com o aluno transferido...\""

1008203-68 = "Eu não disse isso outro dia?"

1008203-69 = "As atividades juvenis são basicamente como os trabalhos de “Koi Yo Koi”."

1008203-70 = "Como meu mestre sabe, o trabalho de estreia de Koi Yo Koi é um romance juvenil em que o personagem principal, um estudante transferido, e a heroína se envolvem em um drama pastelão..."

1008203-71 = "[s3] \"Ah, sim. Isso mesmo.\"\n[s4] \"...Acho que sim?\""

1008203-74 = "A heroína conhece um misterioso estudante transferido que chega de repente, e seu coração palpita todos os dias, sem saber o que vai acontecer!"

1008203-75 = "Então, para a atividade juvenil de hoje, vou tentar rastrear isso!"

1008203-76 = "題して「転校生青春活動」だ！"
1008203-77 = "[s] \"Você quer ter a mesma experiência que o trabalho?\""

1008203-78 = "isso mesmo!"

1008203-79 = "Nunca pensei que ele pudesse ver através dos meus pensamentos em um instante! Como esperado de um mestre!"

1008203-80 = "Olha, não esqueci de trazer isso também."

1008203-84 = "[ns] \"Isso é pão branco...? De jeito nenhum...\""

1008203-85 = "Ok, então mestre, por favor, fique aqui! #nSe você me der o sinal eu vou!"

1008203-89 = "[ns] \"Espere...Renge!?\""

1008203-94 = "Ufa, acho que este é um bom lugar."

1008203-98 = "Coma um pão assim... e estique um pouco..."

1008203-102 = "Sol agradável e uma brisa agradável..."

1008203-105 = "Posso ouvir o sussurro do vento...agora é a hora das \"atividades juvenis\"!"

1008203-106 = "Falando em alunos transferidos, o primeiro episódio é essencial...!"

1008203-111 = "``Eu estava prestes a me atrasar no primeiro dia da minha nova escola, então corri com um pedaço de pão na boca e colidi com aquela garota na esquina!'' O evento começa!"

1008203-116 = "(Renge começou a correr com um sinal)"

1008203-121 = "aqui vamos nós! Segure o pão na boca! Com todas as minhas forças! correr!"

1008203-122 = "Aqui está aquela linha...!"

1008203-123 = "\"Não! Chikoku chikoku ~!\""

1008203-127 = "Hehe! Você está pronto...! Mestre!"

1008203-133 = "[ns] \"Astragalus está vindo em nossa direção com uma força tremenda... Se continuar assim!\""

1008203-137 = "Aaah!"

1008203-138 = "(Então, pouco antes de eles colidirem...)"

1008203-143 = "[ns] \"Evasão de emergência eletrônica!\""

1008203-150 = "Mestre! Por que você evita isso! ?"

1008203-151 = "Tive que encontrar um aluno transferido e ter um momento “Ah!” na sala de aula!"

1008203-152 = "[s5] \"Se colidirmos com essa força...\"\n[s6] \"Não seriam os ferimentos que permaneceriam, não as impressões?\""

1008203-157 = "Hmm... eu-eu acho que sim?"

1008203-158 = "[s] \"Cancelado devido ao perigo!\""

1008203-159 = "Bem, se o mestre diz isso..."

1008203-160 = "Seguirei os ensinamentos do meu mestre!"

1008203-161 = "Ok, vamos em frente!"

1008203-163 = "(O episódio do \"aluno transferido\" de Renge continuou depois disso)"

1008203-165 = "Depois do evento do pão, finalmente chegou a hora."

1008203-166 = "Na sala de aula da manhã..."

1008203-171 = "[ns] \"Prazer em conhecê-lo, fui transferido para uma nova escola...\""

1008203-175 = "...Você! Acabei de esbarrar em uma curva... não bati, mas naquela época!"

1008203-176 = "Perdi de manhã, mas não vou dar de graça dessa vez!"

1008203-177 = "[s] \"それ、何かと混ざってない！？\""
1008203-179 = "そして隣の席になった二人には……"
1008203-180 = "O próximo evento está esperando."

1008203-182 = "O que?"

1008203-183 = "É seu primeiro dia em uma nova escola e você não tem um livro didático?"

1008203-184 = "Huh... humf! Eu não posso evitar então!"

1008203-185 = "Aqui, junte as mesas."

1008203-191 = "Vou mostrar meu livro só por hoje. #nÉ só por hoje!"

1008203-192 = "A propósito, se você vem desta linha..."

1008203-196 = "Vou quebrar a mesa com todas as minhas forças. Acho que você está preparado para isso."

1008203-197 = "[s] \"Você normalmente não trata as pessoas com mais gentileza?\""

1008203-199 = "foto? É assim mesmo? #nNão sei porque não tenho experiência..."

1008203-200 = "Mas... como é estar tão perto do aluno transferido que você acabou de conhecer?"

1008203-201 = "Fico um pouco irritado quando estou muito perto..."

1008203-202 = "[s] \"Mas acho que parece o Renge!?\""

1008203-208 = "(Enquanto eu experimentava vários episódios de estudantes transferidos, um por um...)"

1008203-210 = "(Antes que eu percebesse, já era noite)"

1008203-216 = "[ns7] \"Já está na hora...\"\n[ns8] \"Como foi a atividade dos jovens de hoje?\""

1008203-221 = "Bem, para ser honesto..."

1008203-222 = "Parecia um pouco estranho."

1008203-226 = "Não, não! Não é como se eu tivesse alguma reclamação sobre meu mestre!"

1008203-227 = "Porém... as atividades de hoje... são um pouco diferentes do que eu sonhei..."

1008203-228 = "Quando eu realmente tentei, algo estava faltando."

1008203-229 = "O que devo dizer..."

1008203-230 = "Eu realmente não sei o que eu queria fazer..."

1008203-231 = "[s] \"Entendo...\""

1008203-232 = "Embora tenha recebido muita cooperação, acabei com um resultado incompleto."

1008203-233 = "Se eu fosse mais forte..."

1008203-234 = "Desculpe, mestre. É tudo culpa minha."

1008203-235 = "...Ok, vamos mudar! Já faz tanto tempo."

1008203-239 = "Infelizmente estamos nos separando hoje..."

1008203-240 = "[s] \"Se ele for um estudante transferido, provavelmente não saberá o caminho de casa.\""

1008203-244 = "...?"

1008203-245 = "[s] \"Então, que tal irmos para casa juntos?\""

1008203-249 = "um……"

1008203-250 = "Acabei de me mudar para um lugar desconhecido..."

1008203-251 = "Onde é o lugar para brincar? #nLivraria, cinema, ponto de ônibus..."

1008203-252 = "Não sei sobre alunos transferidos..."

1008203-253 = "[s] \"Você não ficaria feliz se eu lhe contasse isso?\""

1008203-254 = "...Sim, está certo."

1008203-255 = "A Senseia está certa!"

1008203-256 = "Como esperado de um mestre... não, um jovem mestre!"

1008203-260 = "Se você decidir fazer isso! vamos! Ainda há tempo?"

1008203-261 = "O centro de rebatidas que frequento... o centro de jogos!"

1008203-265 = "um! Há um restaurante com refeições fixas perto daqui que tem menus sazonais realmente deliciosos...!"

1008203-267 = "(Depois disso, Renge recuperou as energias e caminhou um pouco pela cidade.)"

