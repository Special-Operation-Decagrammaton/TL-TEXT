[translation]
1001105-1 = "Eu ainda não tenho essa idade toda!"
1001105-2 = "Shanhaijing - Sala de Aula"
1001105-4 = "Ufa... será que já estou velha? Mesmo tentando não pensar nisso, acabo me preocupando com essas coisas nessas horas."
1001105-5 = "Preciso me animar logo..."
1001105-6 = "[s] \"Você está se sentindo mal?\""
1001105-7 = "Ah, bem-vindo de volta, Sensei."
1001105-8 = "Não é nada. #n... É só que tem uma coisa me incomodando."
1001105-9 = "Hoje de manhã, quando eu estava dando conselhos sobre alimentação para a Kokona, ela me disse que, como eu já sou velha, deveria me preocupar comigo mesma em vez de me preocupar com os outros."
1001105-10 = "Claro, eu sei que ela não disse isso por mal..."
1001105-11 = "Mas sinto que, ultimamente, nossas pequenas discussões têm aumentado."
1001105-12 = "Bem, é uma pergunta estranha, mas... na sua visão, Sensei, eu pareço ser velha?"
1001105-13 = "Fufu, é engraçado perguntar isso para um Sensei adulto, mas... #nsempre me dizem que pareço mais madura do que as outras pessoas da minha idade."
1001105-14 = "Por isso, pensei que, se eu fosse mais jovem, mais infantil... talvez eu conseguisse entender melhor os sentimentos da Kokona..."
1001105-15 = "[s] \"Shun, você é uma ótima irmã mais velha por se preocupar tanto assim.\""
1001105-16 = "Você acha? A Kokona diz que eu vivo dando sermão e parece que ela não gosta de mim..."
1001105-17 = "Claro, a Kokona sabe que eu não faço isso por maldade, mas ser uma irmã mais velha é realmente difícil."
1001105-18 = "Às vezes, eu me pergunto como seria se eu não fosse uma instrutora do Jardim das Ameixeiras, mas sim uma aluna comum."
1001105-19 = "Viver sem me preocupar com a idade, apenas brincando com pessoas da minha idade..."
1001105-20 = "[s] \"Para mim, Shun, você também é uma das minhas alunas preciosas.\""
1001105-21 = "Ah, é mesmo? Ouvir isso de repente me deixa um pouco... envergonhada, eu diria..."
1001105-22 = "Mas fico feliz que o Sensei pense assim. Fufu..."
1001105-25 = "Ah, céus, já está na hora. As crianças do Jardim das Ameixeiras estão me esperando."
1001105-26 = "Fufu, assim como o Sensei cuida de mim, eu também tenho crianças que precisam dos meus cuidados."
1001105-28 = "...Em troca, quando eu voltar, deixe-me ser mimada por você também, está bem?"
