[translation]
12020-1 = "第2話;ゲヘナの風紀委員長"
12020-2 = "ゲヘナの風紀委員長……[ruby=そらさき]空崎[/ruby]ヒナ。"
12020-3 = "外見情報も一致します、間違いなく本人のようです。"
12020-4 = "ですが、ゲヘナ風紀委員長ということは……ゲヘナにおいてトップの戦闘力……この状況でそんな人物まで……。"
12020-6 = "……。"
12020-7 = "そ、その……これは、素行の悪い生徒たちを捕まえようと……。"
12020-8 = "便利屋68のこと？どこにいるの？今はシャーレとアビドスと、対峙してるように見えるけど。"
12020-9 = "え、便利屋ならそこに……。"
12020-12 = "（こつぜん）"
12020-13 = "い、いつの間に逃げたのですか！？さ、さっきまでそこにいたはず……！"
12020-14 = "……。"
12020-15 = "え、えっと……委員長、全て説明いたします。"
12020-16 = "……。"
12020-17 = "いや、もういい。だいたい把握した。"
12020-18 = "察するに、ゲヘナにとっての不安要素の確認及び排除。そういう政治的な活動の一環ってところね。"
12020-19 = "……。"
12020-20 = "でもアコ、私たちは風紀委員会であって、生徒会じゃない。"
12020-21 = "シャーレ、ティーパーティー、それに連邦生徒会長。そういう[ruby=パンデモニウム・ソサエティー]のは「万魔殿」のタ[/ruby]ヌキたちにでも任せておけばいい。"
12020-22 = "詳しい話は帰ってから。通信を切って校舎で謹慎していなさい、アコ。"
12020-23 = "……はい。"
12020-26 = "……。"
12020-28 = "……。"
12020-29 = "……。"
12020-30 = "……。"
12020-31 = "……。"
12020-32 = "[s] \"…………。\""
12020-33 = "じゃあ、あらためてやろうか。"
12020-35 = "ま、待ってください！ゲヘナの風紀委員長と言ったら、キヴォトスでも匹敵する人物を見つけるのが難しいほどの、強者の中の強者ですよ！"
12020-36 = "ここは下手に動かず、一旦交渉するのが吉です！どうしてそんなに戦うのが好きなんですかっ！"
12020-37 = "……ご、ごめん。"
12020-39 = "こちらアビドスの対策委員会です。ゲヘナの風紀委員長ですね、初めまして。"
12020-40 = "この状況については理解されてますでしょうか？"
12020-41 = "……。"
12020-42 = "もちろん。"
12020-43 = "事前通達無しでの他校自治区における無断兵力運用、及び他校生徒たちとの衝突。"
12020-44 = "……けれど、そちらが風紀委員会の公務を妨害したのも事実。違う？"
12020-45 = "……っ！？"
12020-46 = "それはそうかも。"
12020-47 = "それで？"
12020-48 = "私たちの意見は変わりませんよ？"
12020-49 = "ちょっと待ってください……！便利屋の人たちもいない、あっちの兵力の数は変わってない、私たちにはもう先生しか……どういうわけか味方を止めるのも大変だし……！"
12020-50 = "あうぅ、こういう時にホシノ先輩がいたら……！"
12020-51 = "……ホシノ？"
12020-52 = "……？"
12020-53 = "アビドスのホシノって……もしかして、[ruby=たかなし]小鳥遊[/ruby]ホシノ……？"
12020-54 = "はい？"
12020-55 = "うへ～、こいつはまた何があったんだか。すごいことになってるじゃ～ん。"
12020-60 = "！！"
12020-61 = "えっ！？"
12020-62 = "ほ、ホシノ先輩！？"
12020-64 = "ごめんごめん。ちょっと昼寝しててね～、少し遅れちゃった。"
12020-65 = "……。"
12020-67 = "昼寝ぇ！？こっちは色々大変だったのに！ゲヘナのやつらが……！"
12020-68 = "でも、もう全員撃退した。"
12020-69 = "まだ全員ではないですが……まあ大体は。"
12020-71 = "ゲヘナの風紀委員会かあ……便利屋を追ってここまで来たの？"
12020-72 = "……。"
12020-73 = "うーん、事情はよく分からないけど、対策委員会はこれで勢揃いだよ。ということで、あらためてやり合ってみる？風紀委員長ちゃん？"
12020-74 = "……。"
12020-75 = "……1年生の時とはずいぶん変わった、人違いじゃないかと思うくらいに。"
12020-76 = "……ん？私のこと知ってるの？"
12020-77 = "情報部にいた頃、各自治区の要注意生徒たちをある程度把握してたから。"
12020-78 = "特に小鳥遊ホシノ……あなたのことを忘れるはずがない。あの事件の後、アビドスを去ったと思ってたけど。"
12020-79 = "……。"
12020-80 = "……そうか、そういうことか……だからシャーレが……。"
12020-81 = "……。"
12020-82 = "まあいい、私も戦うためにここに来たわけじゃないから。"
12020-84 = "……イオリ、チナツ。"
12020-86 = "……委員長。"
12020-87 = "……はい。"
12020-92 = "撤収準備、帰るよ。"
12020-93 = "えっ！？"
12020-94 = "帰るんですか！？"
12020-100 = "（……スッ）"
12020-101 = "えっ？"
12020-102 = "頭を下げました……！？"
12020-103 = "事前通達無しでの無断兵力運用、そして他校の自治区で騒ぎを起こしたこと。"
12020-104 = "このことについては私、空崎ヒナより、ゲヘナの風紀委員会の委員長として、アビドスの対策委員会に対して公式に謝罪する。"
12020-105 = "！"
12020-106 = "！？"
12020-107 = "！！"
12020-108 = "今後、ゲヘナの風紀委員会がここに無断で侵入することは無いと約束する。どうか許してほしい。"
12020-111 = "委員長……。"
12020-112 = "ま、待って委員長！あの校則違反者たち……便利屋はどうするんだ！？"
12020-113 = "（ジロッ）"
12020-114 = "あ、う……。"
12020-115 = "ほら、帰るよ。"
12020-118 = "……。"
12020-120 = "（ヒュウゥゥ……）"
12020-121 = "風紀委員会の全兵力……すごい速さでアビドスの郊外へと消えていきました……。"
12020-122 = "あれほど大規模な兵力を、一糸乱れずに……風紀委員長、すごい方ですね。"
12020-123 = "もったいない、強い人と戦えるチャンスだったのに。"
12020-124 = "シロコ先輩、どこかの戦闘民族みたいだね……まあ私だって、もちろん喧嘩を売られたら逃げるようなことはしないけど。"
12020-125 = "うへ～、結局おじさんは状況が全然分かってないんだけど、何があったの？"
12020-126 = "説明したいところなのですが、私たちもまだ分かっていないことが多く……風紀委員長は、なぜここまで来たのでしょうか？"
12020-127 = "そうです、分からないのは私たちも同じなんですよ！そもそもホシノ先輩はこんなタイミングまでいったいどこで……！"
12020-129 = "ごめんごめん。"
12020-130 = "はあ……なんだか、さらに大ごとになってきている気がします。"
12020-131 = "慌ただしいことばっかりで……分かっていないことだらけです。"
12020-132 = "アヤネちゃん……。"
12020-133 = "そうですね、今日も色んなことがありましたし……無理せず、私たちも休憩した方が良いかもしれません。"
12020-134 = "はい。では今日は一旦解散して、また明日学校で状況の整理をしましょう。"
12020-135 = "……うん、そうだね～、アヤネちゃんの言う通りだよ。今日はもう解散、明日また教室で。"
12020-136 = "そうしましょうか。"
12020-137 = "早くシャワーが浴びたい……。"
12020-141 = "……先生。"
12020-142 = "風紀委員長が最後、先生に何か話しかけてたけど……。"
12020-143 = "何の話？"
12020-146 = "はあ……。"
12020-147 = "イオリ、大丈夫ですか？"
12020-148 = "ショットガンで至近距離の連射をされた上に、がっつりお腹に銃床喰らって、あちこちに吹っ飛ばされて……アコちゃんに怒られるし委員長には睨まれるし……今日はついてない。"
12020-149 = "……そうですね。"
12020-150 = "あのさ……その可哀想な犬でも見るような目、やめてくれないか？"
12020-151 = "お互い様ですよ、イオリ。"
12020-152 = "……そうか。"
12020-157 = "……シャーレの先生。"
12020-158 = "[s] \"ん、私？\""
12020-159 = "そう。あなたに伝えておきたいことがある。"
12020-160 = "これは直接言っておいた方がいいと思って。"
12020-161 = "[s] \"何の話？\""
12020-162 = "……カイザーコーポレーションのこと、知ってる？"
12020-163 = "[s1] \"……よく知ってる。\"\n[s2] \"……ざっくりだけどね。\""
12020-164 = "……そう。"
12020-165 = "……そう。"
12020-166 = "……。"
12020-167 = "これは[ruby=パンデモニウム・ソサエティー]まだ「万魔殿」も、[/ruby]ティーパーティーも知らない情報だけど。"
12020-168 = "……あなたには知らせておいた方が良いかもしれない。"
12020-169 = "……。"
12020-171 = "アビドスの捨てられた砂漠……あそこで、カイザーコーポレーションが何かを企んでる。"
12020-172 = "[s3] \"アビドスの砂漠で……。\"\n[s4] \"カイザーコーポレーションが……？\""
12020-173 = "そう。本当なら、廃校予定のアビドスに教える義理はないのだけど。"
12020-174 = "そう。本当なら、廃校予定のアビドスに教える義理はないのだけど。"
12020-175 = "……一応、ね。"
12020-176 = "じゃあまた、 [USERNAME]先生。"
12020-179 = "……。"
12020-180 = "[s] \"後で、みんなの前で話すね。\""
12020-181 = "……うん、分かった。"
12020-182 = "じゃあ帰ろう、先生。"
12020-184 = "次回;さよなら、便利屋68"
