[translation]
10033090-1 = "Episódio 9: De quem é este festival?"
10033090-3 = "M-mas o que você está...!?"
10033090-9 = "Já está decidido...#nNós, a Trupe Chimichami, vamos retomar este Festival da Árvore Sagrada!"
10033090-10 = "O Festival da Árvore Sagrada é um evento importante para rezar pela paz e tranquilidade de Hyakkiyako..."
10033090-11 = "Mesmo sendo convidados, não posso perdoar que estranhos se intrometam assim!!"
10033090-12 = "[ns] \"...Quais são as suas exigências específicas?\""
10033090-13 = "Fufufu... Ouça e se surpreenda, veja e trema.#nUm plano grandioso que faria até as crianças chorarem de medo—"
10033090-14 = "Intitulado!"
10033090-16 = "...Gulp."
10033090-17 = "Usaremos os fogos de artifício do clímax do Festival da Árvore Sagrada para...!"
10033090-19 = "O \"Plano de lançar todos os super fogos de artifício em pleno meio-dia\"!!"
10033090-21 = "...Hã?"
10033090-22 = "Fufufu... Fogos de artifício só têm graça se forem lançados no céu escuro.#nSe fizermos isso durante o dia, vai estragar tudo!"
10033090-23 = "E aí, ficou com medo? Pode chorar, pode pedir desculpas!#nBem, se vamos parar ou não, depende de nós!"
10033090-30 = "..."
10033090-31 = "..."
10033090-32 = "[ns] \"...\""
10033090-33 = "Por que esse olhar de pena!?"
10033090-37 = "N-não me diga que você está pensando: \"Mesmo dizendo isso, é só uma ameaça e eles não vão fazer nada no final\"!?"
10033090-41 = "Nós somos a Trupe Chimichami!#nNão nos subestime, entendeu!?"
10033090-42 = "[s] \"Mesmo que você diga para não subestimar...\""
10033090-43 = "Pare de usar palavras gentis comigo!"
10033090-45 = "O que, o que é toda essa confusão agora?"
10033090-47 = "Tem mais gente chegando, isso também faz parte do ritual?"
10033090-48 = "Falando nisso, ouvi dizer que Hyakkiyako tem entretenimento com participação do público."
10033090-49 = "Ah, era \"Waraku-hime\", não era?"
10033090-50 = "Bem, de qualquer forma, acho que vamos entender se ficarmos olhando, não é?"
10033090-52 = "..."
10033090-59 = "...Ei, ei, Erika-chan?"
10033090-60 = "Bem... parece que seria melhor a gente se mexer."
10033090-61 = "Pois é, né?"
10033090-62 = "Por enquanto, vamos até onde o Sensei está?"
10033090-63 = "Sim, com certeza a Umika-chan também deve estar lá!"
10033090-70 = "Por favor, parem!#nSe as coisas ficarem mais caóticas do que isso...!"
10033090-71 = "Eu nunca vou perdoar vocês por lançarem os fogos de artifício sem permissão!"
10033090-72 = "Cala a boca!#nNão importa se você perdoa ou não, é por isso que chamamos de \"fazer por conta própria\"!"
10033090-74 = "Fufu... Que pena para você!"
10033090-75 = "Sim!#nPara começar, os fogos de artifício desta vez não serão trazidos até pouco antes do lançamento noturno!"
10033090-77 = "O-o quê!?#nSe fosse um festival de antigamente, já teriam trazido há muito tempo!#nÉ por isso que pessoas que ignoram a tradição são..."
10033090-78 = "¡?"
10033090-80 = "Umika?#nO que aconteceu?"
10033090-81 = "N-na verdade...!"
10033090-83 = "Ei, líder, aquilo ali não são os fogos de artifício?"
10033090-85 = "...Hã?"
10033090-86 = "(Por eu ter trazido com antecedência, acabou saindo pela culatra...!?)"
10033090-90 = "N-não é não, e ponto final!"
10033090-91 = "Pelo bem de todos de Gehenna, pelo bem do Sensei,#ne por todos que apoiam este festival...!"
10033090-92 = "Não deixarei que toquem em um único dedo nos fogos de artifício!!"
10033090-93 = "A-acalme-se, Umika!"
10033090-94 = "T-tudo bem causar um tumulto aqui!?#nMesmo sendo o Festival da Árvore Sagrada? Mesmo sendo um local de ritual!?"
10033090-96 = "……Quando é hora de agir, eu preciso agir. #nSe eu não fizer isso…… algo muito pior vai acontecer."
