[translation]
10033090-1 = "第9話;このお祭りは誰のもの？"
10033090-3 = "い、一体何を……！？"
10033090-9 = "決まってる……#nこの神木祭を、魑魅一座の手で取り戻すんだ！"
10033090-10 = "神木祭は、百鬼夜行の平和と安寧を祈る大事なお祭り……。"
10033090-11 = "なのに、いくら招待客だからって、部外者が入り込むなんて許せない！！"
10033090-12 = "[ns] \"……具体的な要望は？\""
10033090-13 = "ふっふっふ……聞いて驚け見て[ruby=わなな]戦慄け[/ruby]。#n泣く子も黙る壮大な計画――"
10033090-14 = "題して！"
10033090-16 = "……ごくり。"
10033090-17 = "神木祭のクライマックスに使われる花火、それを利用した……！"
10033090-19 = "「超大型花火、明るい真っ昼間に全部打ち上げちまおう計画」！！"
10033090-21 = "……ハイ？"
10033090-22 = "ふっふっふ……真っ暗な空に打ち上げてこその花火。#nそれをお昼にやっちゃえば全部台無し！"
10033090-23 = "どうだ、ビビったか？泣いても良いぞー、謝っても良いぞ！#nまあそれで止めるかはこっち次第だけどなっ！"
10033090-30 = "……。"
10033090-31 = "……。"
10033090-32 = "[ns] \"……。\""
10033090-33 = "何だその優しい視線は！？"
10033090-37 = "ま、まさか「そうは言っても単なる脅しで、何だかんだ実行しないでしょ」#nみたいなこと考えてるのか！？"
10033090-41 = "あたしたちは魑魅一座だ！#n舐めるなよ！？"
10033090-42 = "[s] \"舐めるなよと言われましても……。\""
10033090-43 = "優しい言葉を掛けるなよぉ！？"
10033090-45 = "何なに、今度は何の騒ぎ？"
10033090-47 = "人が増えてるけど、これも儀式の一環？"
10033090-48 = "そういえば百鬼夜行には、#n観客参加型のエンタメがあるって聞いたことある。"
10033090-49 = "あー、「和楽姫」だっけ？"
10033090-50 = "まあ、とにかく見てれば分かるんじゃない？"
10033090-52 = "……。"
10033090-59 = "……ねぇねぇエリカちゃん？"
10033090-60 = "まぁ……動いた方が良さそうだね。"
10033090-61 = "だよねー？"
10033090-62 = "とりあえず、先生のところ行く？"
10033090-63 = "うん、きっとウミカちゃんもそこにいるはず！"
10033090-70 = "やめてください！#nこれ以上めちゃくちゃになったら……！"
10033090-71 = "花火を勝手に打ち上げるなんて、絶対に許しません！"
10033090-72 = "うるさい！#n許されようと許されまいと構わないから「勝手」なんだよ！"
10033090-74 = "ふふっ……それは残念だったね！"
10033090-75 = "ハイ！#nそもそも今回の花火は、夜の打ち上げ直前まで運び込まれマセンから！"
10033090-77 = "な、なにぃ！？#n昔のお祭りだったら、もうとっくに運び込んでたじゃんか！#nこれだから伝統を無視する奴らは……！"
10033090-78 = "っ！？"
10033090-80 = "ウミカ？#nどうしマシタか？"
10033090-81 = "じ、実は……！"
10033090-83 = "ねぇリーダー、あそこにあるの花火じゃないですか？"
10033090-85 = "……え？"
10033090-86 = "（私が前もって運び込んだせいで、逆効果に……！？）"
10033090-90 = "だ、ダメなものはダメです！"
10033090-91 = "ゲヘナの皆さんのためにも、先生のためにも、#nこのお祭りを支えてくれる人のためにも……！"
10033090-92 = "花火には指一つ触れさせませんっ！！"
10033090-93 = "お、落ち着いてクダサイ、ウミカ！"
10033090-94 = "こ、ここで暴れても大丈夫！？#n神木祭なのに？儀式の場所なのに！？"
10033090-96 = "……やる時は、やらないと。#nそうしないと……もっと大変なことが起きちゃう。"
