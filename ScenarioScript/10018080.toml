[translation]
10018080-1 = "第8話;背水の陣"
10018080-4 = "負けちゃったらどうするの！"
10018080-8 = "落ち着いてください、フウカさん。"
10018080-9 = "落ち着けるわけないでしょう！！"
10018080-10 = "料理対決……ですか？"
10018080-11 = "あのニャオフードと？そして最終的には商人会が試食をしてジャッジを……？"
10018080-12 = "つまり……何人分用意しなければいけないのでしょう？"
10018080-13 = "100個の重箱を提供することになっていますわ。"
10018080-14 = "おせちは何段か重ねた重箱で出すものですから。"
10018080-15 = "普通は一つの重箱を3人とか4人で食べるはずだから……。"
10018080-16 = "400人前ですね★"
10018080-18 = "その数を聞いただけで気を失いそう。"
10018080-19 = "ダメですわ。すでに対決は始まっています。"
10018080-20 = "足を踏み入れる前なら構いませんが、ここで退くなんて許されません。"
10018080-21 = "そもそも私は巻き込まれたんだけど……。"
10018080-22 = "というか、勝負を勝手に受けたのはハルナだよね！？"
10018080-23 = "それなのにその態度ってあんまりじゃないの？"
10018080-27 = "……"
10018080-28 = "申し訳ありませんでした、フウカさん。"
10018080-32 = "え、えぇっ……！？"
10018080-33 = "[ns] \"ハルナが……謝った！？\""
10018080-34 = "――私は、自分だけでなく皆さんに美味しいものを食べてほしいのです。#n美食は幸福を生んでくれますから。"
10018080-35 = "ニャオフードによるフランチャイズ化で、人々は安価に外食を楽しめるようになるでしょう。"
10018080-36 = "ですが、同じ味付けばかりのフランチャイズで、果たして食による幸福を得られるのでしょうか？"
10018080-38 = "同じような味付け……貧しい味に慣れてしまうのは、幸福ではありません。私はそれが嫌なのです。"
10018080-39 = "スズメ亭の廃業阻止は、その延長線の1つに過ぎません。#n私は、この商店街に住む人々から、美食が奪われる事を止めたいのです。"
10018080-40 = "……つまりハルナは、商店街のために勝負を受けたって事？"
10018080-41 = "ええ、その通りですわ。"
10018080-42 = "それで、私に手伝ってほしい、と。"
10018080-43 = "……そういう事になりますわね。"
10018080-44 = "……万が一、私がハルナのお願いを断ったらどうするつもりだったの？"
10018080-48 = "その時は、私たち美食研究員でどうにかするつもりでしたわ。"
10018080-49 = "[s] \"どうにかできるのかな……。\""
10018080-50 = "できるできないではありません。#nしなければならない[/ruby]のです。"
10018080-51 = "その程度の覚悟もなくニャオフードとの勝負を受けたわけではありません。"
10018080-52 = "もちろん、料理の専門家ではありませんから、笑いものになるかもしれませんが……"
10018080-53 = "それでも、未来の事は誰にも分かりません。#nそして、その程度で私の美食に対する志が挫けることもありませんわ。"
10018080-54 = "……そんな事いっちゃって。#nどうせ、そうなったら落ち込むくせに。"
10018080-58 = "そうかもしれませんわね。"
10018080-63 = "はぁ……。#n……分かった。手伝えばいいんでしょう？"
10018080-65 = "フウカさん？"
10018080-66 = "……私も、スズメ亭がこのままなくなっちゃうのは嫌だし。"
10018080-67 = "[s] \"……今さらだけど、他に方法はなかったの？\""
10018080-68 = "残念ですが、先生。"
10018080-69 = "飲食店の経営には、ある程度の資本力が必要です。"
10018080-70 = "家庭料理を作って楽しむだけならともかく、外食産業として経営する以上、避けては通れない道ですから。"
10018080-71 = "まぁ、世の中にはお値段相当の価値すら見出せないお店もありますけれど……"
10018080-72 = "私はそのようなお店を見るたびに、#n蛇口を締めて差し上げたいという衝動に駆られますが……"
10018080-73 = "蛇口？"
10018080-74 = "フウカさん、例えばですよ？#nもし誰も使ってない流し台で水が流しっぱなしになっていたら、#nどんなお気持ちになりますか？"
10018080-75 = "えっと……蛇口を締めなきゃって思うかな？"
10018080-76 = "ええ、その通りです。それと同じように、私はお値段相当の価値が見出だせない食堂を目にすると、そんな衝動に駆られるのですわ。"
10018080-77 = "締め方は考えなさいよね……。"
10018080-78 = "とにかく――"
10018080-79 = "資本力に差がある今の状態で、#nスズメ亭とニャオフードが条件なしに戦うのは不可能に近いでしょう。"
10018080-80 = "むしろあちらからこのような条件を出してきたことで、ようやく同じ土俵で競えるようになったのです。"
10018080-82 = "……そういうことは最初から説明してくれたら良かったのに。"
10018080-83 = "ともかく、ピンチはチャンスに変えられますわ。"
10018080-84 = "ここで勝利すれば、全てを取り戻せますから。"
10018080-85 = "それに私は負けるつもりなど一切ありませんわ。"
10018080-86 = "ハルナは絶対にギャンブルとかしちゃダメだから。"
10018080-87 = "どういう意味でしょうか？"
10018080-88 = "私は美食の道以外を追求するつもりなどありませんわ。"
10018080-89 = "……それならいいんだけど。"
10018080-94 = "400人前なんて……"
10018080-95 = "今まで一度にそのような量を調理したことはないのですが……。"
10018080-96 = "そこはフウカさんがどうにかしてくれますよ★"
10018080-97 = "私も料理だったら何でもできるわけじゃないんだよ！？"
10018080-98 = "それにいつも給食部で料理をしてるときも、必ず何かしら事故が起きるし……。"
10018080-99 = "そこは私たちが最大限バックアップするので、心配いりませんわ。"
10018080-100 = "……具体的には、どうやって？"
10018080-101 = "味見はお任せください。砂糖ひとさじ、醤油一滴の細かな違いまでこだわって見極めましょう！"
10018080-106 = "結局それって食べるだけじゃん！"
10018080-109 = "結局、あのとき野菜を買い占めていたのはニャオフードだったんですね……。"
10018080-110 = "悪かったね。私たちにも事情があってさ……。"
10018080-111 = "仕方ありませんよ。あまり気にしないでください。"
10018080-112 = "それにニャオフードが買い占めていた食材を今回は供給していただいたおかげで、また料理ができますから。"
10018080-113 = "それにしても、同じ食材を使ったスズメ亭とニャオフードの対決か……胸が高鳴るね。"
10018080-114 = "期待しているよ。頑張って。"
10018080-119 = "あれ、ところで食材の状態が……？"
10018080-120 = "何か問題でも……"
10018080-124 = "って、これは？"
10018080-125 = "これはひどい……。あちこち潰れているし、半分とまではいかないが、これじゃ結構な数の野菜が使えないだろう。"
10018080-126 = "ひどすぎる。いつもだったら、絶対こんなに雑な梱包はしないんだが……。"
10018080-130 = "ううぅ……。対決のルール上、他のところで買った食材は使えないのに……。"
10018080-136 = "「配送トラブルで食材を使えなくする作戦」成功。"
10018080-137 = "よし、報告しよう。"
10018080-144 = "ちょっと待ってくれ。この食材、どうなってるんだ？"
10018080-145 = "ニャオフードの本社に送ってから数日しか経ってないぞ。"
10018080-146 = "少し鮮度が落ちているだけの肉は使えるとして……腐っているものまであるじゃないか。"
10018080-147 = "あんなに新鮮だったのに、こんなのってないだろう。"
10018080-148 = "どうしたらいいのでしょう！？"
10018080-149 = "ニャオフードも同じ食材を使うのであれば、公正な戦いになるだろうけど……。"
10018080-150 = "いや、それはどうだろうな……。"
10018080-155 = "「冷凍トラブルで食材を早く傷める作戦」成功。"
10018080-156 = "よし、上層部に伝えよう。"
10018080-160 = "調味料は大丈夫だと思ったのに……。"
10018080-161 = "……申し訳ありません。代わりに謝罪します。"
10018080-162 = "梱包はニャオフードが引き受けるという話だったので、私にはどうすることもできなかったですが……。"
10018080-166 = "だからといって瓶にヒビが入っていたり、割れているものまであるだなんて。"
10018080-167 = "商品を大切に扱わない食品会社なんて、本当に許せませんね。"
10018080-168 = "そう言っていただけるだけでも……ありがとうございます。"
10018080-171 = "うう……なんとか食材を集めることはできましたね。"
10018080-172 = "うん。"
10018080-173 = "向こうの条件が「この商店街で手に入れた食材を使うこと」だからね……。"
10018080-179 = "とはいえ、一度このように信用を失ってしまうと、"
10018080-180 = "後で大きな代価を支払うことになると思いますね。"
10018080-184 = "ニャオフードの会長は、いったいどういうつもりなんでしょう★"
