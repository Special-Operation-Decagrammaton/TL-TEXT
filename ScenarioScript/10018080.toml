[translation]
10018080-1 = "Episódio 8: Encurralada"
10018080-4 = "O que vamos fazer se perdermos?!"
10018080-8 = "Por favor, acalme-se, Fuuka-san."
10018080-9 = "Como você quer que eu me acalme?!"
10018080-10 = "Uma competição de culinária... é isso?"
10018080-11 = "Contra aquela Nyao Food? E no final, a associação comercial vai provar e julgar...?"
10018080-12 = "Ou seja... para quantas pessoas teremos que preparar?"
10018080-13 = "Temos que fornecer 100 caixas de refeição."
10018080-14 = "Osechi é servido em caixas empilhadas, afinal."
10018080-15 = "Normalmente, uma caixa é dividida entre 3 ou 4 pessoas, então..."
10018080-16 = "São 400 porções! ★"
10018080-18 = "Só de ouvir esse número, sinto que vou desmaiar."
10018080-19 = "Não pode. A competição já começou."
10018080-20 = "Eu não me importaria se não tivéssemos entrado nisso, mas agora não podemos recuar."
10018080-21 = "Para começo de conversa, eu fui arrastada para isso..."
10018080-22 = "E outra, foi você quem aceitou o desafio por conta própria, Haruna, não foi?!"
10018080-23 = "E ainda vem com essa atitude? Isso não é demais?"
10018080-27 = "..."
10018080-28 = "Peço perdão, Fuuka-san."
10018080-32 = "H-hã...!?"
10018080-33 = "[ns] \"A Haruna... pediu desculpas!?\""
10018080-34 = "――Eu quero que todos, não apenas eu, comam coisas deliciosas. #nPorque a gastronomia gera felicidade."
10018080-35 = "Com a franquia da Nyao Food, as pessoas poderão comer fora por um preço baixo."
10018080-36 = "Mas será que é possível encontrar a felicidade através da comida em uma franquia que só serve o mesmo sabor?"
10018080-38 = "Se acostumar com sabores iguais... com sabores pobres, não é felicidade. Eu detesto isso."
10018080-39 = "Impedir o fechamento do Suzume-tei é apenas uma extensão disso. #nEu quero impedir que a gastronomia seja tirada das pessoas que vivem neste distrito comercial."
10018080-40 = "...Então, Haruna, você aceitou o desafio por causa do distrito comercial?"
10018080-41 = "Sim, exatamente."
10018080-42 = "E por isso você quer a minha ajuda."
10018080-43 = "...É isso mesmo."
10018080-44 = "...E se, por um acaso, eu tivesse recusado o seu pedido, o que você faria?"
10018080-48 = "Nesse caso, nós, do Clube de Pesquisa Gastronômica, daríamos um jeito."
10018080-49 = "[s] \"Será que elas conseguiriam mesmo...\""
10018080-50 = "Não se trata de conseguir ou não. #nÉ algo que precisa ser feito."
10018080-51 = "Eu não aceitei o desafio contra a Nyao Food sem estar preparada para isso."
10018080-52 = "Claro, não sou uma especialista em culinária, então talvez sejamos motivo de riso..."
10018080-53 = "Ainda assim, ninguém sabe o que o futuro reserva. #nE, por causa disso, minha determinação pela gastronomia não será abalada."
10018080-54 = "...Dizendo essas coisas... #nDe qualquer forma, você vai ficar deprimida se isso acontecer."
10018080-58 = "Talvez você tenha razão."
10018080-63 = "Ah... #n...Entendi. É só eu ajudar, certo?"
10018080-65 = "Fuuka-san?"
10018080-66 = "...Eu também não quero que o Suzume-tei desapareça assim."
10018080-67 = "[s] \"...É tarde demais para perguntar, mas não havia outro jeito?\""
10018080-68 = "Infelizmente não, Sensei."
10018080-69 = "A gestão de um restaurante exige um certo capital."
10018080-70 = "Deixando de lado o prazer de cozinhar em casa, como um negócio de alimentação, esse é um caminho inevitável."
10018080-71 = "Bem, existem lugares no mundo que não valem nem o preço que cobram..."
10018080-72 = "Sempre que vejo lugares assim, #nsinto um impulso de fechar a torneira para eles..."
10018080-73 = "Torneira?"
10018080-74 = "Fuuka-san, por exemplo, sabe? #nSe houvesse uma pia que ninguém estivesse usando e a água estivesse correndo sem parar, #ncomo você se sentiria?"
10018080-75 = "Bem... acho que eu sentiria vontade de fechar a torneira?"
10018080-76 = "Sim, exatamente. Da mesma forma, quando vejo um restaurante que não oferece um valor condizente com o preço, sou tomada por esse mesmo impulso."
10018080-77 = "Você deveria pensar melhor em como fechar as coisas..."
10018080-78 = "De qualquer forma—"
10018080-79 = "Com a diferença de capital que temos agora, é quase impossível para o Suzume-tei e o Nyaofood lutarem sem condições."
10018080-80 = "Na verdade, ao nos imporem essas condições, finalmente conseguimos competir em pé de igualdade."
10018080-82 = "...Você poderia ter explicado isso desde o começo."
10018080-83 = "De qualquer modo, podemos transformar uma crise em uma oportunidade."
10018080-84 = "Se vencermos aqui, poderemos recuperar tudo."
10018080-85 = "Além disso, não pretendo perder de jeito nenhum."
10018080-86 = "Haruna, você nunca deve entrar em apostas, entendeu?"
10018080-87 = "O que quer dizer com isso?"
10018080-88 = "Não tenho a menor intenção de seguir qualquer caminho que não seja o da gastronomia."
10018080-89 = "...Se é assim, tudo bem."
10018080-94 = "400 porções, isso é..."
10018080-95 = "Nunca cozinhei essa quantidade de uma só vez antes..."
10018080-96 = "A Fuuka-san dará um jeito nisso!★"
10018080-97 = "Eu não consigo fazer qualquer coisa só porque é culinária, sabia!?"
10018080-98 = "E sempre que cozinho no Clube de Merenda, algum tipo de acidente acontece..."
10018080-99 = "Nós daremos todo o suporte possível, então não precisa se preocupar."
10018080-100 = "...Mais especificamente, como?"
10018080-101 = "Deixe as provas de sabor conosco. Vamos analisar cada detalhe, desde uma colher de açúcar até uma gota de molho de soja!"
10018080-106 = "No fim das contas, isso é só comer!"
10018080-109 = "Então, no fim das contas, quem estava comprando todos os vegetais era o Nyaofood..."
10018080-110 = "Foi mal. Nós também tínhamos nossos motivos..."
10018080-111 = "Não tem problema. Não se preocupe muito com isso."
10018080-112 = "Além disso, graças ao fato de o Nyaofood ter fornecido os ingredientes que eles mesmos compraram, podemos cozinhar novamente."
10018080-113 = "Ainda assim, um confronto entre o Suzume-tei e o Nyaofood usando os mesmos ingredientes... meu coração está acelerado."
10018080-114 = "Estou na torcida. Boa sorte."
10018080-119 = "Ué, mas o estado dos ingredientes...?"
10018080-120 = "Algum problema...?"
10018080-124 = "Mas o que é isso?"
10018080-125 = "Isso é terrível... Estão todos amassados. Não diria metade, mas uma boa parte desses vegetais não dá para usar."
10018080-126 = "É horrível. Normalmente, eles nunca fariam uma embalagem tão desleixada..."
10018080-130 = "Uuu... Pelas regras do confronto, não podemos usar ingredientes comprados em outro lugar..."
10018080-136 = "Operação 'tornar os ingredientes inutilizáveis via problemas de entrega' concluída."
10018080-137 = "Certo, vou reportar."
10018080-144 = "Espere um pouco. O que aconteceu com esses ingredientes?"
10018080-145 = "Faz apenas alguns dias que enviamos para a sede do Nyaofood."
10018080-146 = "Dá para usar a carne que só perdeu um pouco do frescor, mas... tem até coisas apodrecendo aqui."
10018080-147 = "Estavam tão frescos, não é possível que tenha acontecido isso."
10018080-148 = "O que devemos fazer!?"
10018080-149 = "Se o Nyaofood usar os mesmos ingredientes, seria uma luta justa, mas..."
10018080-150 = "Não, será que seria mesmo...?"
10018080-155 = "Operação 'estragar os ingredientes rapidamente via problemas de refrigeração' concluída."
10018080-156 = "Certo, vou avisar a alta cúpula."
10018080-160 = "Eu achei que os temperos estariam bem..."
10018080-161 = "...Sinto muito. Peço desculpas em nome deles."
10018080-162 = "Como o Nyaofood ficou responsável pela embalagem, não pude fazer nada a respeito..."
10018080-166 = "Mesmo assim, chegar ao ponto de ter frascos rachados ou quebrados..."
10018080-167 = "Uma empresa de alimentos que não trata seus produtos com cuidado é algo realmente imperdoável."
10018080-168 = "Só de ouvir você dizer isso... muito obrigada."
10018080-171 = "Ugh... de alguma forma, conseguimos reunir os ingredientes."
10018080-172 = "Sim."
10018080-173 = "Afinal, a condição deles é que usemos apenas ingredientes obtidos neste distrito comercial..."
10018080-179 = "Dito isso, uma vez que se perde a confiança desta maneira,"
10018080-180 = "acredito que teremos que pagar um preço alto por isso mais tarde."
10018080-184 = "O que será que o presidente da Nyaofood está pensando?★"
