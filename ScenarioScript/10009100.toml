[translation]
10009100-1 = "Epílogo 3: O Oyakodon Supremo!?"
10009100-4 = "Dediquei minha vida inteira a fazer Oyakodon, mas..."
10009100-5 = "Não consigo pensar em nada...#nSerá que não sou capaz de criar o Oyakodon supremo?"
10009100-6 = "Apenas ser fofo e cremoso não é o suficiente#npara sobreviver nesta nova era..."
10009100-7 = "Será que mudaria algo se eu adicionasse um elemento novo?#nIsso! Vou tentar um toque explosivo!"
10009100-12 = "Decidido! Vou fechar a loja hoje e pesquisar uma nova receita!"
10009100-19 = "Certo, agora vou tentar aquele chocolate que está na moda... Hmm!#nÉ isso, é exatamente o que eu estava procurando!"
10009100-21 = "Essa sensação de explosão na boca, que um chocolate comum não tem...#nEstou começando a viciar nisso."
10009100-22 = "Se eu conseguir reproduzir essa sensação, com certeza criarei um Oyakodon com um novo conceito!"
10009100-23 = "Mas, que tipo de ingrediente eu usaria para reproduzir isso..."
10009100-24 = "Uma ideia que subverte o senso comum do Oyakodon... Hmm.#nComo passei a vida inteira pensando apenas em Oyakodon, não consigo pensar em nada..."
10009100-29 = "Isso, vou pedir a opinião de um jovem!"
10009100-33 = "...Oh."
10009100-34 = "Ei, você aí, estudante,"
10009100-35 = "Posso te fazer uma pergunta rapidinho?"
10009100-36 = "S-sim.#nSe eu puder ajudar em algo."
10009100-39 = "Você quer adicionar algo estimulante ao Oyakodon...?"
10009100-40 = "Exatamente! Como pratos que dão o que falar estão populares ultimamente, quero adicionar uma sensação nova e estimulante ao Oyakodon!"
10009100-41 = "Entendo... Estimulante e com um novo conceito..."
10009100-42 = "Algo que chame a atenção, sabe?#nAlgo que, uma vez que o cliente prove, ele nunca mais esqueça..."
10009100-47 = "Nesse caso... que tal este 'Tempero Estilo Granada de Luz'?"
10009100-48 = "G-granada de luz...!? O que é isso, exatamente!?"
10009100-49 = "É um tempero que explode na boca e emite uma luz intensa."
10009100-50 = "Acho que não existe nada que combine melhor com a imagem que o senhor deseja."
10009100-53 = "(Ela disse isso sem nem piscar...!)"
10009100-54 = "(Entendo, isso é a juventude... Eu envelheci bastante enquanto fazia Oyakodon...)"
10009100-56 = "...Será que realmente posso usar isso?"
10009100-57 = "Claro, é seguro."
10009100-58 = "Tempero estilo granada de luz, é..."
10009100-62 = "Eu nunca teria pensado nisso...#nEntão é isso que é a vanguarda da era...!"
10009100-63 = "Obrigado, estudante! Vou voltar agora mesmo e testar a nova receita!"
10009100-64 = "Não há de quê, fico feliz em ajudar."
10009100-65 = "E tome isto. Uma granada de luz."
10009100-66 = "Uma granada de luz... por quê?"
10009100-67 = "Ultimamente as coisas estão perigosas... por precaução, é melhor estar preparado."
10009100-68 = "(Espere um pouco...? Se eu adicionar esta granada de luz como um acompanhamento ao Oyakodon de tempero de granada de luz...)"
10009100-69 = "(Não seria uma receita ainda mais inovadora!?)"
10009100-70 = "Vou agradecer novamente, obrigado... Nunca esquecerei este favor!"
10009100-71 = "Não precisa exagerar, é apenas um favor. Tome cuidado."
10009100-78 = "Alô? Gostaria de pedir um Oyakodon."
10009100-83 = "Certo, um Oyakodon saindo. Renovei a receita do Oyakodon a partir de hoje!"
10009100-87 = "Depois que provar, você nunca mais vai esquecer, então aguarde ansiosamente!"
