[translation]
1011905-1 = "辿り着いた夜明け"
1011905-2 = "（日が沈む頃、ナグサと合流してパトロールを始めた）"
1011905-3 = "（広い範囲ではないし、早めに終わると思ったけれど……）"
1011905-4 = "（その予想は大きく外れるのだった）"
1011905-6 = "こんな時間に出歩いてたら危ないよ。"
1011905-7 = "……あんたとは関係ないじゃん。"
1011905-8 = "そうだね。"
1011905-9 = "でも、見てしまったから。#nどうせなら、近くのファミレスとかカフェに行った方がいいよ。"
1011905-10 = "嫌だね。お姉に会っちまう。"
1011905-11 = "……お姉さん？"
1011905-13 = "[ns] \"お姉さんと何かあったの？\""
1011905-14 = "……別に。"
1011905-16 = "「喧嘩して勢いで家出したけど、行き先がなかった」ってわけじゃないんだからね！"
1011905-17 = "[s] \"もしよかったら相談に乗るよ。\""
1011905-19 = "（家出した生徒の面倒を見たり……）"
1011905-25 = "……ねぇ。"
1011905-26 = "え、私ですか？"
1011905-27 = "ここで何をしてるの？"
1011905-28 = "見ての通り、こ、工事ですよ。"
1011905-29 = "ここに埋もれた下水道……いや、上水道の交換で……！"
1011905-30 = "私が知る限りだと、この辺で水道管工事の予定はなかったと思うけど。"
1011905-31 = "しかも、こんな遅い時間に。"
1011905-35 = "荷物の中身、見せてくれる？"
1011905-36 = "ううっ……！"
1011905-42 = "くそっ！みんな逃げろ！"
1011905-43 = "わざわざ暗くなってからやってたのにーっ！"
1011905-44 = "完璧な計画がこんなところでーっ！"
1011905-50 = "……逃がさない。"
1011905-64 = "（魑魅一座の企みを阻止したり……）"
1011905-66 = "[ns] \"失礼ですが……お宅はどちらですか？\""
1011905-67 = "家～？この空が屋根！その下はぜ～んぶ家なんだ～。"
1011905-68 = "自分の家で寝てて……なんか文句あんのか！？"
1011905-69 = "[s1] \"こんなところで寝るのは危ないので――\"\n[s2] \"近くのヴァルキューレ交番までご案内します。\""
1011905-72 = "何～！？警察に引き渡すってか！？"
1011905-73 = "そうはさせないぞ！かかってこい！"
1011905-74 = "面倒だから暴れないで。"
1011905-75 = "[s] \"や、優しくね……！\""
1011905-77 = "（酔っぱらいの対応をしたり……思ったより時間がかかってしまった）"
1011905-79 = "[ns] \"つ、疲れた……。\""
1011905-80 = "お疲れ様、先生。"
1011905-81 = "今日はいつもより多かったかな。"
1011905-82 = "こんな時間になるなんて思わなかった。"
1011905-83 = "[s] \"そろそろ部室に戻ろうか。\""
1011905-84 = "ちょっと待って。"
1011905-85 = "一日の中で、この時間帯が一番暗いの。"
1011905-86 = "足元が見にくいし、いま動くのは得策じゃない。"
1011905-87 = "……戻るなら、もう少し明るくなってから。"
1011905-89 = "（近くにあった喫茶店の縁側を借りて、夜が明けるまで待つことにした）"
1011905-91 = "……静かだよね。"
1011905-92 = "この喫茶店、いつもお客さんで賑わってるのに……#nこの時間だと、まるで時が止まったみたい……。"
1011905-96 = "……ここ、たまに来るんだ。"
1011905-97 = "今日みたいに帰りが遅くなったとき、この縁側で夜明けを待つの。"
1011905-98 = "[s] \"気に入ってるんだね。\""
1011905-99 = "……そんな明るい理由じゃない。"
1011905-100 = "怖さを紛らわせるため。"
1011905-101 = "私は……暗闇が怖いの……。"
1011905-104 = "[wa:2040]― [log=나구사ND]夜が明けるこの瞬間が――[/log]"
1011905-105 = "[wa:2960]― [log=나구사ND]もっとも[wa:1960]闇が深くなる。[/log]"
1011905-108 = "― [log=나구사ND]私は……[wa:2380]この漆黒が恐ろしかった。[/log]"
1011905-111 = "[wa:1630]― [log=나구사ND]闇夜を照らすほど[wa:1910]眩しく輝くことも――[/log]"
1011905-112 = "[wa:3500]― [log=나구사ND]夜が明けるまで[wa:2150]耐え忍ぶことも、[/log]"
1011905-115 = "― [log=나구사ND]私には[wa:2330]できなかったから。[/log]"
1011905-118 = "― [log=나구사ND]他人を演じることで――[/log]"
1011905-119 = "[wa:2680]― [log=나구사ND]影に紛れて[wa:910]平静を装うことしか、[wa:2660]できなかったの。[/log]"
1011905-122 = "[wa:750]― [log=나구사ND]でも――[wa:1900]今は[wa:590]違う。[/log]"
1011905-125 = "[wa:1300]― [log=나구사ND]明けない夜はないと――[/log]"
1011905-126 = "[wa:2700]― [log=나구사ND]私の影が落ちると、[wa:2770]知ったから。[/log]"
1011905-129 = "― [log=나구사ND]だから――[/log]"
1011905-132 = "[wa:1520]― [log=나구사ND]黄昏に[wa:2000]名乗りをあげよう――[/log]"
1011905-135 = "― [log=나구사ND]――私は[wa:1890]百花繚乱紛争調停委員会の[wa:2180]委員長、[/log]"
1011905-136 = "[wa:2010]― [log=나구사ND]御稜[wa:460]ナグサ！[/log]"
1011905-139 = "そろそろ日が昇る。"
1011905-140 = "……散々な夜だったね。"
1011905-141 = "[s] \"ふふっ、本当にね。\""
1011905-142 = "でも、もしかしたら……こんな騒がしくも馬鹿らしい夜こそ――"
1011905-143 = "百鬼夜行連合学院の名に相応しいのかもしれないね。"
