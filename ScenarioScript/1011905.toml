[translation]
1011905-1 = "O amanhecer chegou"
1011905-2 = "(Quando o sol estava se pondo, encontrei Nagusa e comecei a patrulhar.)"
1011905-3 = "(Não é uma área ampla e pensei que terminaria mais cedo, mas...)"
1011905-4 = "(Essa previsão revelou-se totalmente errada.)"
1011905-6 = "É perigoso sair para passear numa hora como esta."
1011905-7 = "...Não tem nada a ver com você."
1011905-8 = "Concordo."
1011905-9 = "Mas eu vi. #nDe qualquer forma, você deve ir a um restaurante ou café familiar próximo."
1011905-10 = "Eu não gosto disso. Vou conhecer sua irmã."
1011905-11 = "...Irmã?"
1011905-13 = "[ns] \"Aconteceu alguma coisa com sua irmã?\"\"\n1011905-14 = \"...Na verdade.\"\n1011905-16 = \"Não é como se eu tivesse brigado e fugido de casa, mas não tinha para onde ir!\"\n1011905-17 = \"[s] \"Se desejar, consultarei você.\"\"\n1011905-19 = \"(Cuidando dos alunos que fugiram de casa...)\"\n1011905-25 = \"...Ei.\"\n1011905-26 = \"Hã, sou eu?\"\n1011905-27 = \"o que você está fazendo aqui?\"\n1011905-28 = \"Como você pode ver, este é um trabalho de construção.\"\n1011905-29 = \"O esgoto enterrado aqui... ou melhor, o abastecimento de água foi trocado...!\"\n1011905-30 = \"Tanto quanto sei, não creio que existam planos para obras de canalização de água nesta área.\"\n\n1011905-31 = \"E a uma hora tão tardia.\"\n1011905-35 = \"Você pode me mostrar o conteúdo da sua bagagem?\"\n1011905-36 = \"Eca...!\"\n1011905-42 = \"Caramba! Todos corram!\"\n1011905-43 = \"Eu fiz isso propositalmente depois de escurecer!\"\n1011905-44 = \"Este é o plano perfeito!\"\n1011905-50 = \"...Eu não vou deixar você escapar.\"\n1011905-64 = \"(Para frustrar os planos da Trupe Chimi...)\"\n1011905-66 = \"[ns] \"Com licença, mas... qual é a sua casa?\"\"\n1011905-67 = \"Lar? Este céu é o telhado! Abaixo disso há uma casa.\"\n1011905-68 = \"Dormir na minha própria casa...Há alguma coisa que eu possa reclamar? ?\"\n1011905-69 = \"[s1] \"É perigoso dormir em um lugar como este---\"\n[s2] \"Vou guiá-lo até a delegacia de Valkyrie próxima.\""

1011905-72 = "O que ~! ? Você vai entregá-lo à polícia? ?"
1011905-73 = "Eu não vou deixar você fazer isso! Vamos!"
1011905-74 = "Não fique bravo porque é problemático."
1011905-75 = "[s] \"Oh, seja gentil...!\""
1011905-77 = "(Cuidar de uma pessoa bêbada... demorou mais do que eu esperava)"
1011905-79 = "[ns] \"E-estou cansado...\""
1011905-80 = "Obrigado pelo seu trabalho duro, sensei."
1011905-81 = "Acho que houve mais do que o habitual hoje."
1011905-82 = "Nunca pensei que demoraria tanto."
1011905-83 = "[s] \"Vamos voltar para a sala do clube agora.\"\"\n1011905-84 = \"espere um minuto.\"\n1011905-85 = \"Esta hora do dia é a mais escura.\"\n1011905-86 = \"É difícil ver para onde você está indo, então não é uma boa ideia mudar agora.\"\n1011905-87 = \"...Se eu voltar, esperarei até que fique um pouco mais claro.\"\n1011905-89 = \"(Decidi alugar uma varanda em uma cafeteria próxima e esperar até o amanhecer.)\"\n1011905-91 = \"...Está tranquilo, não é?\"\n1011905-92 = \"Esta cafeteria está sempre lotada de clientes, mas a essa hora do dia parece que o tempo parou...\"\n1011905-96 = \"...Eu venho aqui às vezes.\"\n1011905-97 = \"Quando chego tarde em casa como hoje, espero o amanhecer nesta varanda.\"\n1011905-98 = \"[s] \"Você gostou.\""

1011905-99 = "...Não é um motivo tão brilhante."
1011905-100 = "Para distrair do medo."
1011905-101 = "Eu... tenho medo do escuro..."
1011905-104 = "[wa:2040]― [log=나구사ND]Este momento em que a noite chega――[/log]"
1011905-105 = "[wa:2960]― [log=나구사ND]Mas [wa:1960]A escuridão se aprofunda. [/registro]"
1011905-108 = "― [log=나구사ND]Eu...[wa:2380]Esse preto era assustador. [/registro]"
1011905-111 = "[wa:1630]― [log=나구사ND]Ele pode brilhar tanto que ilumina a noite escura [wa:1910]―[/log]"
1011905-112 = "[wa:3500]― [log=나구사ND]Até o amanhecer [wa:2150]suportar[/log]"
1011905-115 = "― [log=나구사ND]Porque não consegui [wa:2330]. [/registro]"
1011905-118 = "― [log=나구사ND]Ao interpretar outra pessoa――[/log]"
1011905-119 = "[wa:2680]― [log=나구사ND]Tudo o que pude fazer foi me esconder nas sombras [wa:910] e fingir que estava calmo. [/registro]"
1011905-122 = "[wa:750]―― [log=나구사ND]Mas――[wa:1900]Agora [wa:590]É diferente. [/registro]"
1011905-125 = "[wa:1300]― [log=나구사ND]Não há noite que nunca acabe―[/log]"
1011905-126 = "[wa:2700]― [log=나구사ND]Quando minha sombra caiu, [wa:2770]eu sabia. [/registro]"
1011905-129 = "― [log=나구사ND]Então――[/log]"
1011905-132 = "[wa:1520]―― [log=나구사ND]Vamos nos apresentar ao crepúsculo [wa:2000]――[/log]"
1011905-135 = "― [log=나구사ND]――Eu sou o [wa:2180] presidente do [wa:1890] Comitê de Mediação de Conflitos das Cem Flores, [/log]"
1011905-136 = "[wa:2010]― [log=나구사ND]Miryo [wa:460] Nagusa! [/registro]"
1011905-139 = "O sol nascerá em breve."
1011905-140 = "...Foi uma noite difícil."
1011905-141 = "[s] \"Hehe, sério.\""
1011905-142 = "Mas talvez... em uma noite tão barulhenta, mas estúpida..."
1011905-143 = "Talvez o nome Hyakki Yagyo Union Academy seja apropriado."
