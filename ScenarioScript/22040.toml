[translation]
22040-1 = "第4話;～アリスと導かれる者たち～（１）"
22040-13 = "（アリスと一緒に歩いていると……）"
22040-30 = "いち、に、いち、に。"
22040-35 = "あっ！"
22040-36 = "[s] \"どうしたの？\""
22040-38 = "いち、に、#nいち、に。"
22040-40 = "先生、どこかでただならぬ声が聞こえてきます。"
22040-41 = "いち、に、#nいち、に。"
22040-42 = "[s] \"誰だろう……？\""
22040-43 = "これは……"
22040-44 = "ハッ……！アリス、分かりました！"
22040-45 = "ミレニアムのキャンパスで発生する特殊イベント……。"
22040-46 = "「ミレニアム・ランダムエンカウントイベント」の前兆です！"
22040-47 = "[s] \"ラ、ランダムエンカウント……？前兆……？\""
22040-48 = "はい！冒険中に遭遇するフィールドイベントです。"
22040-49 = "何が起こるか分かりません。#n先生、油断は禁物です！"
22040-51 = "いち、に、#nいち、に。"
22040-52 = "いち、に、#nいち、に、いち、に。"
22040-53 = "[ns] \"い、一体どんなイベントが……！？\""
22040-55 = "いち、に、#nいち、に！！"
22040-59 = "[ns] \"で、出た……！\""
22040-62 = "あれ？こんにちは。"
22040-66 = "今日も、良い運動日和ですね。"
22040-67 = "[s] \"す、スミレ……？こ、こんにちは。\""
22040-68 = "これはスミレ先輩との遭遇イベントだったんですね！"
22040-69 = "スミレ先輩は、今日も「運動冒険」中ですか？"
22040-70 = "[s] \"「運動冒険」……？\""
22040-71 = "はい。軽くジョギングでもしようかと思いまして。"
22040-72 = "アリスちゃんも「冒険運動」中ですか？"
22040-73 = "[s] \"「冒険運動」……？\""
22040-74 = "はい！今日は、先生と一緒に見習い勇者の冒険中です！"
22040-75 = "なるほど、今日はトレーナーと一緒に……。"
22040-76 = "毎日運動していて偉いですね。"
22040-77 = "冒険は継続が大事ですから！#nサボったらすぐにレベルが下がってしまいます。"
22040-78 = "デイリークエストを忘れるのは罪だと、モモイも言っていました。"
22040-79 = "ええ、運動は地道にコツコツ続けるのが肝要です。"
22040-80 = "それに、今日はトレーナーが一緒なのも、とても素晴らしいです。"
22040-81 = "[s] \"二人はよく会ってるの？\""
22040-82 = "はい。スミレ先輩は主なエンカウントイベントの一人です！"
22040-83 = "アリスさんとは、ジョギングしているとよく会うんです。"
22040-84 = "キャンパス内で……。"
22040-85 = "スミレ先輩は、「運動冒険」をするアリスの仲間ですからね！"
22040-86 = "ふふ、はい。#nアリスさんは、共に運動する仲間です。"
22040-87 = "[s1] \"「運動冒険」……って何？\"\n[s2] \"「冒険運動」……って何？\""
22040-88 = "冒険の一種です！"
22040-89 = "スミレ先輩は、ジョギングで筋力と素早さ……#nさらに、持久力を上げていると聞きました。"
22040-91 = "ええ、運動しながら身体を鍛えるのは楽しいですから。"
22040-92 = "主要ステータスを鍛え、普段からジョギングを続けるその姿勢……"
22040-93 = "これこそ立派な勇者の冒険なのです！"
22040-94 = "そんな……改めて褒められると照れますね。"
22040-95 = "[s] \"そ、そうなんだ……。\""
22040-96 = "アリスさんは、いつも「冒険？」をすると聞きまして。"
22040-97 = "曰く、冒険の主な目的は、心身を鍛え……"
22040-98 = "はい！レベルアップしてHPとMPを増加させるのです！"
22040-99 = "……鍛錬を通じて、できなかった事を克服するのだと言っていました。"
22040-100 = "レベルが上がったら新しいスキルを覚えられます！"
22040-101 = "なるほど……その心構え、素晴らしいです！"
22040-102 = "普段からコツコツと頑張るその姿勢……偉いですね、アリスさん！"
22040-103 = "[s] \"そ、そうなんだ……？\""
22040-105 = "[ns] \"なんだか……会話が噛み合ってるような、そうでもないような……。\""
22040-106 = "トレーナーと一緒にいるアリスさんを見ていると……なんだか……"
22040-107 = "……私も負けられなくなってきました。"
22040-109 = "あっ、アリスもです！#nスミレ先輩に負けないよう、レベル上げを頑張ります！"
22040-110 = "よし……それでは、まずはジョギング20km！参ります！"
22040-111 = "お先に失礼しますね、トレーナー！アリスさん！"
22040-112 = "[s] \"あ、えっと……頑張って。\""
22040-113 = "いち！に！#nいち！に！"
22040-114 = "アリスも負けられません！"
22040-118 = "先生、次のクエストに進みましょう！"
22040-119 = "[s] \"あ、う、うん……。\""
22040-127 = "（アリスの後を追っていたら、いつの間にかミレニアム郊外に出ていた）"
22040-128 = "[s3] \"キャンパスの外に出てしまったね……。\"\n[s4] \"アリスの冒険範囲は広いんだね……。\""
22040-131 = "はい。アリスの辞書に「止まれ」はありません。"
22040-132 = "それに、遠出をしたら、きっと予想外のイベントも起こるはずです！"
22040-133 = "[s] \"予想外のイベントかぁ……。\""
22040-141 = "あっ！ご主人様とアリスちゃんだ！"
22040-142 = "やっほー、こんにちは～！"
22040-143 = "[s] \"やっほー！？本当に予想外のイベントに……！？\""
22040-144 = "……あれ、先生？#n急にどうしたんだ？"
22040-145 = "あはは！なになに？何かあったー？"
22040-146 = "[s] \"いや、その……二人とも、あまり見ない格好だと思って。\""
22040-148 = "いつもと違う服装……新ジョブへの転職……"
22040-149 = "はっ！アリス、気が付きました！#n二人はメイドから新しいジョブ……"
22040-150 = "「女子高生」に転職したんですね！"
22040-151 = "いや……私も生徒だから。#nこれが普段の格好というか……。"
22040-152 = "「女子高生」は強いジョブだとアリスは知っています！#nモモイもよく言っていました。"
22040-153 = "そう、「女子高生」は寝る前にアイスクリームを食べても#n体重計が怖くないジョブなのだと！"
22040-154 = "[s] \"そんな事はないんじゃないかな……？\""
22040-155 = "あははっ、その通り！アリスちゃん鋭いね！"
22040-156 = "私たちは今、ジョブチェンジして秘密のクエストを進行中なんだ！#nこれはそのためのユニフォーム！"
22040-157 = "[s] \"秘密のクエスト……？\""
22040-158 = "うん！最近のゲヘナの情勢が気になるって、リオ会長が言っててね～"
22040-159 = "何だっけ？なにか動き？がないか調べてほしいって言われちゃって！"
22040-160 = "アスナ先輩、ちょっと……。"
22040-161 = "だから制服を着てね……#n通りすがりのゲヘナ生いないかな～って。"
22040-162 = "見かけたら声かけよ～！って思って！"
22040-163 = "なるほど、アスナ先輩もクエストを受けて冒険しているのですね。"
22040-164 = "アリスと同じです！"
22040-166 = "本当？#nアリスちゃんと同じだ～！おそろい！"
22040-167 = "ちょっと、アスナ先輩。#nアカネがそれは秘密だって……。"
22040-168 = "あ、そうだった！"
22040-169 = "アリスちゃん、ご主人様！さっきのは秘密だよ？"
22040-170 = "[s] \"あ、うん……分かった。\""
22040-171 = "はぁ……。#nまあ、先生とアリスなら……いいか。"
22040-173 = "はい！アリス、秘密は守ります！#nゲームでも、秘密を漏らすと呪いを受けたりしますから！"
22040-174 = "あはは！そうそう！#nアリスちゃんはいつも元気だね！"
22040-175 = "[s] \"とはいえ、二人の制服姿かぁ……。\""
22040-176 = "いや、私たちも生徒だから。#n普通に制服着るというか……"
22040-177 = "ただ、その……これは潜入用の格好というか……"
22040-178 = "任務で、普段の制服を着るようにと言われて……その……"
22040-179 = "その……"
22040-180 = "[s] \"そうなんだね……似合ってるよ。\""
22040-181 = "…………"
22040-182 = "……うっ。"
22040-183 = "あ、あまり見ないでくれ先生。"
22040-184 = "その……ちょっと恥ずかしい、から……。"
22040-185 = "[s] \"ご、ごめん！不躾だったね……。\""
22040-187 = "[ns] \"その、いつもと違うから新鮮で……似合ってると思うよ！\""
22040-188 = "ところで、アリスちゃんとご主人様は何してたの？"
22040-191 = "先生とアリスは冒険中でした。"
22040-192 = "おお、冒険！面白そうー！#nそれ！私もやりたい！"
22040-193 = "はぁ……先輩、任務を忘れないで……。"
22040-195 = "パーティーメンバーが増えるのはいつでも歓迎です！"
22040-196 = "メンバーが増えたら、使える戦術の幅が広がりますから！"
22040-198 = "パンパカパーン！#nアスナ先輩も、カリン先輩も！次の冒険では仲間です！"
22040-199 = "わぁい！パーティーに入った～！"
22040-200 = "わ、私も……？"
22040-201 = "はい！"
22040-205 = "そっか……よろしくね。"
22040-209 = "それじゃ……アリス、先生。"
22040-210 = "私たちは先に失礼する。"
22040-211 = "[s] \"うん、任務頑張ってね。\""
22040-212 = "うん、ありがとうご主人様！頑張るね～！"
22040-213 = "だから、それは秘密だって……#nいや、今更か。"
22040-214 = "ああ、そうだアリス。#nネル先輩が探していた。"
22040-216 = "えっ！？ち、チビメイド様がアリスのことをですか！？"
22040-217 = "何か用事があるそうだけど……"
22040-218 = "まぁ、会ったらよろしくね。"
22040-219 = "先輩は、アリスの事を本当に気に入っているみたいだから。"
22040-220 = "あ、うぅ……。"
22040-222 = "それじゃ、バイバイ～"
22040-226 = "あっ、そこのゲヘナの子！"
22040-233 = "え～、誰？……あたし達になんか用？"
22040-234 = "私たちはゲヘナに編入予定なんだが……。"
22040-235 = "編入前に気になることがあってね～！"
22040-236 = "……え？今の万魔殿のリーダー？"
22040-237 = "ねぇ、知ってる？"
22040-238 = "え、さあ？#nイブキちゃんじゃないの？"
22040-239 = "マコト？#n誰それ。"
22040-241 = "[ns] \"任務……大丈夫だろうか……？\""
22040-242 = "先生！こうしている場合じゃないです！"
22040-243 = "ネル先輩がいつ現れるか分かりません！#nひとまず退却しましょう！"
22040-247 = "[ns] \"あっ、アリス！待って！\""
22040-249 = "次回;～アリスと導かれる者たち～（２）"
