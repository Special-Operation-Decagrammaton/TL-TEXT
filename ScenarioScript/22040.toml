[translation]
22040-1 = "Episódio 4; ~Aris e os Guiados~ (1)"
22040-13 = "(Enquanto eu caminhava com a Aris...)"
22040-30 = "Um, dois, um, dois."
22040-35 = "Ah!"
22040-36 = "[s] \"O que foi?\""
22040-38 = "Um, dois, #n um, dois."
22040-40 = "Sensei, estou ouvindo vozes estranhas vindo de algum lugar."
22040-41 = "Um, dois, #n um, dois."
22040-42 = "[s] \"Quem será que é...?\""
22040-43 = "Isto é..."
22040-44 = "Ah...! Sensei, eu descobri!"
22040-45 = "É um evento especial que ocorre no campus da Millennium..."
22040-46 = "É o presságio do 'Evento de Encontro Aleatório da Millennium'!"
22040-47 = "[s] \"En-encontro aleatório...? Presságio...?\""
22040-48 = "Sim! É um evento de mapa que ocorre durante a aventura."
22040-49 = "Não sabemos o que vai acontecer. #n Sensei, não podemos baixar a guarda!"
22040-51 = "Um, dois, #n um, dois."
22040-52 = "Um, dois, #n um, dois, um, dois."
22040-53 = "[ns] \"Q-Que tipo de evento vai ser esse...!?\""
22040-55 = "Um, dois, #n um, dois!!"
22040-59 = "[ns] \"A-Apareceu...!\""
22040-62 = "Oh? Olá."
22040-66 = "Hoje é um ótimo dia para se exercitar, não é?"
22040-67 = "[s] \"S-Sumire...? O-Olá.\""
22040-68 = "Então era um evento de encontro com a Sumire-senpai!"
22040-69 = "Sumire-senpai, você está na sua 'Aventura de Exercícios' hoje também?"
22040-70 = "[s] \"'Aventura de Exercícios'...?\""
22040-71 = "Sim. Pensei em dar uma leve corrida."
22040-72 = "Aris-chan, você também está numa 'Aventura de Exercícios'?"
22040-73 = "[s] \"'Aventura de Exercícios'...?\""
22040-74 = "Sim! Hoje eu estou numa aventura como Heroína Aprendiz junto com o Sensei!"
22040-75 = "Entendi, hoje com o seu treinador..."
22040-76 = "Fico feliz em ver você se exercitando todos os dias."
22040-77 = "O importante em uma aventura é a constância! #n Se você relaxar, o seu nível cai rapidinho."
22040-78 = "A Momoi também disse que esquecer das missões diárias é um pecado."
22040-79 = "Sim, o fundamental nos exercícios é continuar de forma constante e regular."
22040-80 = "E é maravilhoso você ter o seu treinador ao seu lado hoje também."
22040-81 = "[s] \"Vocês duas costumam se encontrar bastante?\""
22040-82 = "Sim. A Sumire-senpai é um dos nossos principais eventos de encontro aleatório!"
22040-83 = "Eu costumo encontrar muito a Aris-san enquanto estou correndo."
22040-84 = "No campus..."
22040-85 = "A Sumire-senpai é uma parceira de 'Aventura de Exercícios' da Aris!"
22040-86 = "Fufu, sim. #n A Aris-san é uma parceira de exercícios."
22040-87 = "[s1] \"O que é essa tal... 'Aventura de Exercícios'?\"\n[s2] \"O que é esse tal... 'Aventura de Exercícios'?\""
22040-88 = "É um tipo de aventura!"
22040-89 = "Ouvi dizer que a Sumire-senpai corre para aumentar a força e a agilidade... #n e também a resistência."
22040-91 = "Sim, porque treinar o corpo enquanto nos exercitamos é muito divertido."
22040-92 = "Treinar os atributos principais e a atitude de continuar correndo regularmente..."
22040-93 = "Isso sim é a aventura de uma verdadeira heroína!"
22040-94 = "Oh... receber um elogio assim de repente me deixa com um pouco de vergonha."
22040-95 = "[s] \"E-Entendi...\""
22040-96 = "Eu ouvi dizer que você sempre faz essa sua 'Aventura?', Aris-san."
22040-97 = "Você disse que o objetivo principal da aventura é treinar a mente e o corpo..."
22040-98 = "Sim! É para subir de nível e aumentar o HP e o MP!"
22040-99 = "...E superar as suas limitações através do treinamento."
22040-100 = "Quando o nível aumenta, você aprende novas habilidades!"
22040-101 = "Entendo... Essa atitude é maravilhosa!"
22040-102 = "A atitude de se esforçar de forma constante no dia a dia... Você é formidável, Aris-san!"
22040-103 = "[s] \"E-Entendi...?\""
22040-105 = "[ns] \"De alguma forma... sinto que elas tão se entendendo, mas ao mesmo tempo não tão...\""
22040-106 = "Ver você se exercitando com o seu treinador, Aris-san... Sabe, de alguma forma..."
22040-107 = "...Isso me fez ter vontade de não ficar para trás."
22040-109 = "Ah, a Aris também! #n Vou dar o meu melhor para subir de nível e não perder para a Sumire-senpai!"
22040-110 = "Beleza... Então vou começar com uma corrida de 20km! Vamos lá!"
22040-111 = "Estou indo na frente, Treinador! Aris-san!"
22040-112 = "[s] \"A-Ah, certo... Bom treino.\""
22040-113 = "Um! Dois! #n Um! Dois!"
22040-114 = "A Aris também não pode ficar para trás!"
22040-118 = "Sensei, vamos para a próxima quest!"
22040-119 = "[s] \"A-A, ah, certo...\""
22040-127 = "(Seguindo a Aris, acabei chegando nos arredores da Millennium sem perceber)"
22040-128 = "[s3] \"Acabamos saindo do campus...\"\n[s4] \"Você vai bem longe nas suas aventuras, né, Aris...\""
22040-131 = "Sim. A palavra 'parar' não existe no dicionário da Aris."
22040-132 = "Além disso, ir mais longe com certeza fará com que eventos inesperados aconteçam!"
22040-133 = "[s] \"Eventos inesperados, é...\""
22040-141 = "Ah! É o Mestre e a Aris-chan!"
22040-142 = "Ooooi, boa tardee~!"
22040-143 = "[s] \"Ooooi!? O evento inesperado realmente...!\""
22040-144 = "......Hã, Sensei? #n O que foi, de repente?"
22040-145 = "Ahaha! O que foi? Aconteceu alguma coisa~?"
22040-146 = "[s] \"Não, é que... eu não costumo ver vocês duas vestidas assim.\""
22040-148 = "Roupas diferentes do normal... Mudança para uma nova classe..."
22040-149 = "Ah! Sensei, a Aris entendeu! #n Vocês duas mudaram a classe de Maids para..."
22040-150 = "A classe 'Estudantes do Ensino Médio'!"
22040-151 = "Bem... Nós também somos alunas. #n Essa é a nossa roupa normal, por assim dizer..."
22040-152 = "A Aris sabe que 'Estudante do Ensino Médio' é uma classe muito forte! #n A Momoi também costumava dizer isso."
22040-153 = "Sim, ela dizia que 'Estudante do Ensino Médio' é uma classe que #n não precisa ter medo da balança mesmo depois de comer sorvete antes de dormir!"
22040-154 = "[s] \"Acho que não é bem assim...?\""
22040-155 = "Ahaha, exatamente! A Aris-chan é bem perspicaz!"
22040-156 = "Nós fizemos uma mudança de classe e estamos fazendo uma quest secreta agora mesmo! #n E este é o nosso uniforme pra isso!"
22040-157 = "[s] \"Uma quest secreta...?\""
22040-158 = "Sim! A presidente Rio nos disse que estava preocupada com a situação política recente da Gehenna~"
22040-159 = "E ela nos pediu para investigar se havia alguma movimentação lá! O que era mesmo?"
22040-160 = "Asuna-senpai, por favor..."
22040-161 = "Por isso nós vestimos esses uniformes... #n Pra ver se não achamos alguma aluna da Gehenna passando por aqui~"
22040-162 = "Aí a gente aborda elas e pergunta~!"
22040-163 = "Entendo, a Asuna-senpai também está numa aventura fazendo quests."
22040-164 = "É a mesma coisa que a Aris!"
22040-166 = "Sério? #n Igualzinha à Aris-chan~! Nós combinamos!"
22040-167 = "Espere aí, Asuna-senpai. #n A Akane disse que isso era um segredo..."
22040-168 = "Ah, é mesmo!"
22040-169 = "Aris-chan, Mestre! O que eu acabei de falar é segredo, tá bem?"
22040-170 = "[s] \"A-Ah, sim... Tudo bem.\""
22040-171 = "Haa... #n Bom, se é o Sensei e a Aris... tudo bem, eu acho."
22040-173 = "Sim! A Aris guarda segredos muito bem! #n Porque nos jogos, se você espalhar segredos por aí você pode acabar sendo amaldiçoado!"
22040-174 = "Ahaha! É isso aí! #n A Aris-chan é sempre tão animada!"
22040-175 = "[s] \"Mas mesmo assim, ver vocês duas de uniforme escolar...\""
22040-176 = "Sabe como é, nós também somos alunas. #n Usar o uniforme é meio que..."
22040-177 = "Mas sabe... é que essa é uma roupa para infiltração, por assim dizer..."
22040-178 = "Nos disseram pra usar os uniformes normais na missão de hoje... e então..."
22040-179 = "Bem..."
22040-180 = "[s] \"Entendo... Caiu muito bem em você.\""
22040-181 = "............"
22040-182 = "......Ugh."
22040-183 = "P-Por favor, não fique me olhando muito, Sensei."
22040-184 = "Isso me... me deixa um pouco envergonhada..."
22040-185 = "[s] \"M-Me desculpe! Foi rude da minha parte...\""
22040-187 = "[ns] \"É que... como é diferente do que você sempre usa, é refrescante... Eu acho que caiu muito bem em você!\""
22040-188 = "E então, Mestre, o que você e a Aris-chan estavam fazendo?"
22040-191 = "O Sensei e a Aris estavam no meio de uma aventura."
22040-192 = "Uau, uma aventura! Parece divertido~! #n Quero ir junto!"
22040-193 = "Haa... Senpai, não se esqueça da nossa missão..."
22040-195 = "Sempre é bom ter mais membros na party!"
22040-196 = "Se tivermos mais membros, poderemos usar uma variedade maior de táticas!"
22040-198 = "Ta-da-da-daaan! #n A Asuna-senpai e a Karin-senpai também! Serão nossas aliadas na próxima aventura!"
22040-199 = "Ebaa! Entrei pra party~!"
22040-200 = "A-Até eu...?"
22040-201 = "Sim!"
22040-205 = "Entendi... conto com vocês."
22040-209 = "Então... Aris, Sensei."
22040-210 = "Nós já vamos indo."
22040-211 = "[s] \"Certo, boa sorte na missão.\""
22040-212 = "Isso aí, obrigada, Mestre! Vamos dar o nosso melhor~!"
22040-213 = "Eu já disse que isso era segredo... #n Quer dizer, não adianta reclamar disso agora."
22040-214 = "Ah, é verdade, Aris. #n A Neru-senpai estava procurando por você."
22040-216 = "Eh!? A-A Maid Baixinha-sama estava procurando pela Aris!?"
22040-217 = "Eu acho que ela precisava falar alguma coisa com você..."
22040-218 = "Mas enfim, se vocês se encontrarem, mande lembranças minhas."
22040-219 = "A Senpai parece ter gostado bastante de você, Aris."
22040-220 = "A-Auuh..."
22040-222 = "Então é isso, tchau tchau~"
22040-226 = "Ah, você aí de Gehenna!"
22040-233 = "Ué, quem é? ...Queria alguma coisa com a gente?"
22040-234 = "Sabe, a gente tá pensando em se transferir pra Gehenna..."
22040-235 = "E a gente tá curiosa com umas coisas antes de fazer isso~!"
22040-236 = "......Ahn? A líder atual do Clube Pandemonium?"
22040-237 = "É, você conhece?"
22040-238 = "Hm, não sei? #n Não seria a Ibuki-chan?"
22040-239 = "Makoto? #n Quem é essa."
22040-241 = "[ns] \"Será... que essa missão vai dar certo...?\""
22040-242 = "Sensei! Essa não é hora para isso!"
22040-243 = "Não sabemos quando a Neru-senpai pode aparecer! #n Vamos recuar por enquanto!"
22040-247 = "[ns] \"Ah, Aris! Espera aí!\""
22040-249 = "Próximo Episódio; ~Aris e os Guiados~ (2)"