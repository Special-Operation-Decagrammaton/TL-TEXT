[translation]
22040-1 = "Episódio 4; ~Alice e aqueles que são guiados~ (1)"
22040-13 = "(Enquanto caminhava com Alice...)"
22040-30 = "Um, dois, um, dois."
22040-35 = "Ah!"
22040-36 = "[s] \"O que houve?\""
22040-38 = "Um, dois, #num, dois."
22040-40 = "Sensei, estou ouvindo uma voz incomum vindo de algum lugar."
22040-41 = "Um, dois, #num, dois."
22040-42 = "[s] \"Quem será...?\""
22040-43 = "Isso é..."
22040-44 = "Hah...! Alice, eu entendi!"
22040-45 = "Um evento especial que ocorre no campus do Millennium..."
22040-46 = "É o prenúncio de um \"Evento de Encontro Aleatório do Millennium\"!"
22040-47 = "[s] \"En-encontro aleatório...? Prenúncio...?\""
22040-48 = "Sim! É um evento de campo que você encontra durante uma aventura."
22040-49 = "Não sabemos o que vai acontecer. #nSensei, não baixe a guarda!"
22040-51 = "Um, dois, #num, dois."
22040-52 = "Um, dois, #num, dois, um, dois."
22040-53 = "[ns] \"Que, que tipo de evento será...!?\""
22040-55 = "Um, dois, #num, dois!!"
22040-59 = "[ns] \"A-apareceu...!\""
22040-62 = "Oh? Olá."
22040-66 = "Hoje também é um ótimo dia para se exercitar, não é?"
22040-67 = "[s] \"Su-Sumire...? O-olá.\""
22040-68 = "Então este era um evento de encontro com a veterana Sumire!"
22040-69 = "Veterana Sumire, você está em uma \"Aventura de Exercício\" hoje também?"
22040-70 = "[s] \"\"Aventura de Exercício\"...?\""
22040-71 = "Sim. Pensei em fazer uma leve corrida."
22040-72 = "Alice-chan também está em uma \"Aventura de Exercício\"?"
22040-73 = "[s] \"\"Aventura de Exercício\"...?\""
22040-74 = "Sim! Hoje, estou em uma aventura de aprendiz de heroína junto com o Sensei!"
22040-75 = "Entendo, hoje você está com seu treinador..."
22040-76 = "É admirável que você se exercite todos os dias."
22040-77 = "Porque a consistência é importante na aventura! #nSe você relaxar, seu nível cairá rapidamente."
22040-78 = "Momoi também disse que esquecer as missões diárias é um pecado."
22040-79 = "Sim, é essencial continuar se exercitando de forma constante e paciente."
22040-80 = "Além disso, é maravilhoso que o treinador esteja junto hoje."
22040-81 = "[s] \"Vocês se encontram com frequência?\""
22040-82 = "Sim. A veterana Sumire é uma das principais personagens de eventos de encontro!"
22040-83 = "Eu encontro a Alice com frequência enquanto corro."
22040-84 = "Dentro do campus..."
22040-85 = "A veterana Sumire é uma companheira da Alice na \"Aventura de Exercício\"!"
22040-86 = "Fufu, sim. #nAlice-san é uma companheira de exercícios."
22040-87 = "[s1] \"O que é essa \"Aventura de Exercício\"?\"\n[s2] \"O que é essa \"Aventura de Exercício\"?\""
22040-88 = "É um tipo de aventura!"
22040-89 = "Ouvi dizer que a veterana Sumire aumenta sua força física, agilidade... #ne também sua resistência através da corrida."
22040-91 = "Sim, porque é divertido exercitar o corpo enquanto se movimenta."
22040-92 = "Treinar os atributos principais e manter a corrida diariamente, essa postura..."
22040-93 = "Isso sim é uma verdadeira aventura de heroína!"
22040-94 = "Assim... fico envergonhada de ser elogiada dessa forma."
22040-95 = "[s] \"É, é mesmo...\""
22040-96 = "Ouvi dizer que a Alice-san sempre sai em \"aventuras\"."
22040-97 = "Dizem que o objetivo principal da aventura é treinar o corpo e a mente..."
22040-98 = "Sim! É para subir de nível e aumentar o HP e o MP!"
22040-99 = "...Ela disse que, através do treinamento, é possível superar coisas que antes não conseguia fazer."
22040-100 = "Quando subo de nível, posso aprender novas habilidades!"
22040-101 = "Entendo... Essa mentalidade é maravilhosa!"
22040-102 = "Essa postura de se esforçar constantemente no dia a dia... Você é admirável, Alice-san!"
22040-103 = "[s] \"É, é mesmo...?\""
22040-105 = "[ns] \"De alguma forma... parece que a conversa está fluindo, mas ao mesmo tempo, não...\""
22040-106 = "Ver a Alice-san com o treinador... de alguma forma..."
22040-107 = "...Eu também não posso ficar para trás."
22040-109 = "Ah, a Alice também! #nPara não perder para a Sumire-senpai, vou me esforçar para subir de nível!"
22040-110 = "Muito bem... Então, primeiro, 20km de corrida! Vamos lá!"
22040-111 = "Com licença, vou indo na frente, Treinador! Alice-san!"
22040-112 = "[s] \"Ah, bem... boa sorte.\""
22040-113 = "Um! Dois! #nUm! Dois!"
22040-114 = "A Alice também não vai perder!"
22040-118 = "Sensei, vamos avançar para a próxima missão!"
22040-119 = "[s] \"Ah, sim, claro...\""
22040-127 = "(Ao seguir a Alice, percebi que já tínhamos saído dos arredores do Millennium)"
22040-128 = "[s3] \"Saímos do campus...\"\n[s4] \"O alcance das aventuras da Alice é bem grande, hein...\""
22040-131 = "Sim. No dicionário da Alice, não existe a palavra \"parar\"."
22040-132 = "Além disso, se formos para longe, com certeza eventos inesperados vão acontecer!"
22040-133 = "[s] \"Eventos inesperados, é...\""
22040-141 = "Ah! É o Mestre e a Alice-chan!"
22040-142 = "Iupii, olá~!"
22040-143 = "[s] \"Iupii...!? Será que isso é realmente um evento inesperado...?\""
22040-144 = "...Ué, Sensei? #nO que houve de repente?"
22040-145 = "Ahaha! O que foi, o que foi? Aconteceu alguma coisa?"
22040-146 = "[s] \"Não, é que... achei que o visual de vocês duas está bem diferente.\""
22040-148 = "Roupas diferentes do habitual... mudança para uma nova classe..."
22040-149 = "Ah! A Alice percebeu! #nVocês mudaram de classe, de empregadas para..."
22040-150 = "\"Estudante do ensino médio\"!"
22040-151 = "Não... eu também sou uma estudante. #nIsso é, tipo, meu visual normal..."
22040-152 = "A Alice sabe que \"Estudante do ensino médio\" é uma classe forte! #nA Momoi também dizia isso."
22040-153 = "Sim, \"Estudante do ensino médio\" é a classe que pode comer sorvete antes de dormir #nsem ter medo da balança!"
22040-154 = "[s] \"Acho que não é bem assim...\""
22040-155 = "Ahaha, exatamente! A Alice-chan é bem esperta!"
22040-156 = "Nós mudamos de classe e estamos realizando uma missão secreta agora! #nEste é o uniforme para isso!"
22040-157 = "[s] \"Uma missão secreta...?\""
22040-158 = "Sim! A presidente Rio disse que está preocupada com a situação recente em Gehenna~"
22040-159 = "Como era mesmo? Ela pediu para investigarmos se há algum movimento estranho!"
22040-160 = "Asuna-senpai, espere um pouco..."
22040-161 = "Por isso estamos usando o uniforme... #npara ver se encontramos algum aluno de Gehenna passando por aqui."
22040-162 = "Pensamos: \"Se virmos alguém, vamos falar com eles!\""
22040-163 = "Entendo, a Asuna-senpai também está aceitando missões e saindo em aventuras."
22040-164 = "É igual à Alice!"
22040-166 = "Sério? #nÉ igual à Alice-chan! Combinando!"
22040-167 = "Ei, Asuna-senpai. #nA Akane disse que isso era segredo..."
22040-168 = "Ah, é verdade!"
22040-169 = "Alice, Mestre! O que aconteceu agora é segredo, tá bom?"
22040-170 = "[s] \"Ah, sim... Entendido.\""
22040-171 = "Haa... #nBem, se são o Sensei e a Alice... acho que tudo bem."
22040-173 = "Sim! Alice manterá o segredo! #nPorque nos jogos, se você revelar um segredo, pode acabar sendo amaldiçoado!"
22040-174 = "Ahaha! É isso aí! #nAlice, você está sempre cheia de energia!"
22040-175 = "[s] \"Ainda assim, ver vocês duas de uniforme...\""
22040-176 = "Não, é que nós também somos alunas. #nEntão, usar o uniforme é algo normal..."
22040-177 = "Só que, bem... este é um traje para infiltração, por assim dizer..."
22040-178 = "Disseram para usarmos o uniforme comum na missão... então..."
22040-179 = "Então..."
22040-180 = "[s] \"Entendo... Ficou muito bom em vocês.\""
22040-181 = "............"
22040-182 = "...Ugh."
22040-183 = "A-ah, não olhe tanto, Sensei."
22040-184 = "É que... estou um pouco envergonhada..."
22040-185 = "[s] \"D-desculpe! Fui indelicado...\""
22040-187 = "[ns] \"É que, como é diferente do habitual, parece algo novo... e acho que combinou muito com vocês!\""
22040-188 = "Aliás, o que a Alice e o Mestre estavam fazendo?"
22040-191 = "O Sensei e a Alice estavam em uma aventura."
22040-192 = "Oh, uma aventura! Parece divertido! #nEu também quero participar!"
22040-193 = "Haa... Senpai, não se esqueça da missão..."
22040-195 = "Aumentar os membros do grupo é sempre bem-vindo!"
22040-196 = "Se o grupo aumentar, a variedade de táticas que podemos usar também aumenta!"
22040-198 = "Tan-tan-taran! #nAsuna-senpai e Karin-senpai! Vocês são nossas aliadas na próxima aventura!"
22040-199 = "Eba! Entramos para o grupo~!"
22040-200 = "E-eu também...?"
22040-201 = "Sim!"
22040-205 = "Entendi... Conto com vocês."
22040-209 = "Então... Alice, Sensei."
22040-210 = "Nós já vamos indo."
22040-211 = "[s] \"Certo, boa sorte na missão.\""
22040-212 = "Sim, obrigada, Mestre! Vamos nos esforçar~!"
22040-213 = "Eu disse que isso era segredo... #nBom, acho que não importa mais."
22040-214 = "Ah, é verdade, Alice. #nA Neru-senpai estava te procurando."
22040-216 = "Hã!? A-a pequena empregada estava procurando pela Alice!?"
22040-217 = "Parece que ela tem algum assunto com você..."
22040-218 = "Bem, quando você a encontrar, tente ser gentil."
22040-219 = "Parece que a Senpai realmente gosta da Alice."
22040-220 = "Ah, uuu..."
22040-222 = "Então, tchauzinho~"
22040-226 = "Ei, você aí, a garota de Gehenna!"
22040-233 = "Hã, quem é? ...Precisam de algo da gente?"
22040-234 = "Nós estamos planejando nos transferir para Gehenna..."
22040-235 = "E tem uma coisa que estamos curiosas antes de entrar~!"
22040-236 = "...Hã? A atual líder do Pandemonium?"
22040-237 = "Ei, vocês sabem?"
22040-238 = "Hã, quem sabe? #nNão é a Ibuki-chan?"
22040-239 = "Makoto? #nQuem é essa?"
22040-241 = "[ns] \"A missão... será que vai dar tudo certo...?\""
22040-242 = "Sensei! Não é hora para isso!"
22040-243 = "Não sabemos quando a Neru-senpai vai aparecer! #nVamos recuar por enquanto!"
22040-247 = "[ns] \"Ah, Alice! Espere!\""
22040-249 = "Próximo episódio: ～Alice e Aqueles que São Guiados～ (2)"
