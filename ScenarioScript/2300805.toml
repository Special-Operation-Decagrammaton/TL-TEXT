[translation]
2300805-1 = "内なる罰"
2300805-2 = "（マリーのことが心配になって、彼女の元を訪れた）"
2300805-6 = "えっと、どちら様ですか……？"
2300805-7 = "[s1] \"お見舞いに来たよ。\"\n[s2] \"ごめんね、起こしちゃった？\""
2300805-10 = "……っ！？"
2300805-11 = "せ、先生……！？ど、どうして先生がこちらに……！？"
2300805-12 = "しょ、少々お待ちください！本当に少しで大丈夫ですので……っ！"
2300805-20 = "せ、先生、お待たせしました……。"
2300805-21 = "すみません、だらしないお部屋をお見せしてしまって……。"
2300805-22 = "気にしないで……？"
2300805-23 = "で、ですが……。"
2300805-24 = "……？い、いえ、先生に来ていただいたのに、ベッドに横になったままなんてわけには……。"
2300805-25 = "[s3] \"お見舞いに来たんだから。\"\n[s4] \"体調崩してるんだから、無理しないで。\""
2300805-26 = "そ、そう、ですか……。"
2300805-27 = "そ、そう、ですか……。"
2300805-28 = "かえって先生のことを困らせるわけにもいきませんし……。"
2300805-29 = "それでは、お言葉に甘えて……。"
2300805-34 = "（マリーはもう一度ベッドへと戻った）"
2300805-35 = "なんだかご心配をおかけしてしまったようで、申し訳ございません。本当に大した症状ではないのですが……。"
2300805-36 = "[s] \"今は辛くない？\""
2300805-37 = "は、はい。それほどでも……。"
2300805-38 = "少し休んだら、だいぶ良くなりました。きっと明日には、またいつも通り元気に動けるかと思います。"
2300805-39 = "本来は誰かのために動かねばならないシスターが、こうして看病していただく側にというのは……何だか不思議な気分です。"
2300805-40 = "ふふっ……。"
2300805-41 = "……。"
2300805-46 = "[ns5] \"……マリー？\"\n[ns6] \"どうしたの？\""
2300805-49 = "その、えっとですね……。"
2300805-50 = "実は……。"
2300805-51 = "ここしばらく、何だか少しだけ疲れを感じていて……実はどこかで一日くらいお休みが欲しいなと、思っていたんです。"
2300805-52 = "もしかしたらこれは、そんなことを考えていたせいなのかな、と……。"
2300805-53 = "他のシスターの方々は今も頑張っているのに、何だか自分に甘えてしまったようで……。"
2300805-54 = "シスターとしてあまり良くないことを考えていたせいで、私の身体が私に対して、罰を下されたのではないかと……。"
2300805-55 = "……？"
2300805-56 = "罰ではなく、助けてくれた……？私の身体が、ですか？"
2300805-57 = "それは、どういった……？"
2300805-58 = "[s7] \"長く健康でいられる方が良いからね。\"\n[s8] \"できるだけ長くシスターでいられるように、とか。\""
2300805-64 = "……。"
2300805-65 = "……なるほど。"
2300805-66 = "そうですね……そういう考え方もできるかもしれません。"
2300805-72 = "ありがとうございます、先生。おかげさまで何だかスッキリしました。"
2300805-73 = "身体だけではなく、心の方まで。"
2300805-74 = "内心、今日もずっと色々と考えてしまっていたんです。それが、先生とお話している内にスッと……。"
2300805-75 = "誰かのために動く者として、ぜひ私も見習わせていただこうと思います。"
2300805-76 = "できれば私は、先生のことも、いつか……。"
2300805-77 = "……。"
2300805-78 = "あ、いえすみません、やはりお気になさらず……"
2300805-79 = "もちろん今すぐどうにかという話ではありませんし、今日はせっかくですのでゆっくりさせていただこうかと。"
2300805-80 = "明日のためにも、これから先のためにも……ただ……。"
2300805-81 = "いつかは……はい。"
2300805-83 = "（そして少しだけマリーの話し相手になった後、色々と看病をした）"
2300805-84 = "（その後マリーが再び眠りに落ちたのを見届けてから、シャーレへと戻った）"
