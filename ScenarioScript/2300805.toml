[translation]
2300805-1 = "Punição Interior"
2300805-2 = "（Preocupado com a Marie, você foi visitá-la）"
2300805-6 = "Hum, quem está aí...?"
2300805-7 = "[s1] \"Vim te visitar.\"\n[s2] \"Desculpe, te acordei?\""
2300805-10 = "……!?"
2300805-11 = "Se, Sensei...!? Po, por que o Sensei está aqui...!?"
2300805-12 = "Po, por favor, espere um pouco! Só um instante, eu prometo...!"
2300805-20 = "Se, Sensei, desculpe a demora..."
2300805-21 = "Sinto muito por deixar você ver meu quarto tão bagunçado..."
2300805-22 = "Não se preocupe com isso...?"
2300805-23 = "Ma, mas..."
2300805-24 = "...? Não, não, o Sensei veio me visitar, não posso ficar deitada na cama assim..."
2300805-25 = "[s3] \"Eu vim te visitar, afinal.\"\n[s4] \"Você está doente, não se force.\""
2300805-26 = "É, é mesmo...?"
2300805-27 = "É, é mesmo...?"
2300805-28 = "Não quero causar mais problemas para o Sensei..."
2300805-29 = "Então, aceitarei sua gentileza..."
2300805-34 = "（Marie voltou para a cama）"
2300805-35 = "Sinto muito por ter deixado você preocupado. Realmente não é nada grave..."
2300805-36 = "[s] \"Não está se sentindo mal agora?\""
2300805-37 = "Si, sim. Não tanto..."
2300805-38 = "Depois de descansar um pouco, melhorei bastante. Tenho certeza de que amanhã estarei pronta para agir como sempre."
2300805-39 = "Como uma irmã que deveria estar sempre a serviço dos outros, estar do lado de quem recebe cuidados é... uma sensação um tanto estranha."
2300805-40 = "Fufu..."
2300805-41 = "..."
2300805-46 = "[ns5] \"...Marie?\"\n[ns6] \"O que houve?\""
2300805-49 = "Bem, é que..."
2300805-50 = "Na verdade..."
2300805-51 = "Ultimamente, tenho me sentido um pouco cansada... e, na verdade, pensei que adoraria tirar um dia de folga em algum momento."
2300805-52 = "Talvez isso tenha acontecido por causa desses pensamentos..."
2300805-53 = "As outras irmãs continuam se esforçando tanto, e sinto como se tivesse sido indulgente demais comigo mesma..."
2300805-54 = "Por ter pensado em algo que não condiz com uma irmã, será que meu corpo não me impôs uma punição...?"
2300805-55 = "...?"
2300805-56 = "Não foi uma punição, mas sim uma ajuda...? Meu corpo, você diz?"
2300805-57 = "Como assim...?"
2300805-58 = "[s7] \"É melhor que você continue saudável por muito tempo.\"\n[s8] \"Para que você possa continuar sendo uma irmã pelo maior tempo possível, talvez.\""
2300805-64 = "..."
2300805-65 = "...Entendo."
2300805-66 = "É verdade... talvez seja possível pensar dessa forma."
2300805-72 = "Obrigada, Sensei. Graças a você, me sinto muito mais leve."
2300805-73 = "Não apenas no corpo, mas também na alma."
2300805-74 = "No fundo, eu estava pensando em muitas coisas hoje. Mas, enquanto conversava com o Sensei, tudo isso se dissipou..."
2300805-75 = "Como alguém que vive para ajudar os outros, espero poder seguir o seu exemplo."
2300805-76 = "Se possível, eu gostaria que o Sensei também, um dia..."
2300805-77 = "..."
2300805-78 = "Ah, não, desculpe, por favor, não leve em consideração..."
2300805-79 = "Claro que não é algo para agora, e já que você veio, vou aproveitar para descansar um pouco."
2300805-80 = "Pelo bem de amanhã, e pelo bem do futuro... apenas..."
2300805-81 = "Um dia... sim."
2300805-83 = "（Depois de conversar um pouco com a Marie, você cuidou dela de várias formas）"
2300805-84 = "(Depois de me certificar de que a Mari tinha caído no sono novamente, voltei para o Schale)"
