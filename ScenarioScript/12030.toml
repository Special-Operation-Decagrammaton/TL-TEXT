[translation]
12030-1 = "第3話;さよなら、便利屋68"
12030-2 = "便利屋68・事務所"
12030-3 = "はあ……。"
12030-4 = "アルちゃ～ん、さっきからため息ばっかりだよ、テキパキ荷物運ぼう？"
12030-5 = "はぁぁ……。"
12030-7 = "え、えっと、これはどこに運べばいいでしょうか？"
12030-8 = "ん？これ……ああ、アルちゃんが天賦の才を発揮した書道の残骸じゃん、あっちの燃えるゴミでいいよ。"
12030-11 = "捨てないでよ！！持っていくに決まってるじゃない！"
12030-12 = "でもこれ、書道の授業の宿題で書いたやつでしょ～？ほんとに要る？それにこれ、「一日一悪」って何？どういう意味？"
12030-13 = "き、きっと10年後には10億円ぐらいの価値が……。"
12030-14 = "……はぁ。"
12030-16 = "打っても響かないし、元気ないねぇアルちゃん……。"
12030-17 = "社長、どうしたの。"
12030-18 = "アルちゃん、事務所を引っ越すのがイヤみたい。"
12030-19 = "でも風紀委員会に場所を知られちゃったし、任務も失敗でクライアントからも狙われるだろうし、仕方ないでしょー？"
12030-20 = "そういえばアビドスとの戦いも、中途半端な感じで終わっちゃったね。"
12030-21 = "し、仕方ないでしょ！一緒に背中を合わせて戦った人たちを今になって狙うなんて……できるわけないじゃない！"
12030-22 = "……はあ。"
12030-23 = "あのカバンのお金も、残り全部あのラーメン屋の修理代として置いてきたし。本当にこの社長は……。"
12030-24 = "う、うるさい！うるさい！"
12030-25 = "だって、だって……！"
12030-26 = "……。"
12030-27 = "ハードボイルドなアウトローは……私は……。"
12030-29 = "……はあ。"
12030-30 = "本当に、手のかかる社長だ。"
12030-31 = "でもこういうのがうちのアルちゃんだもんね？一緒にいてすっごく楽しい！"
12030-32 = "はい、私もそう思います！アル様！わ、私、アル様がいなかったらきっと今こうして生きていないはずなので……。"
12030-35 = "元気出してください！私が一番尊敬しているのはアル様ですから！"
12030-36 = "う、うるさい！わかってるわよ！"
12030-38 = "よっ……と！"
12030-39 = "これで全部です！積み終わりました！"
12030-40 = "じゃあどこに行く？"
12030-41 = "うーん……。"
12030-42 = "まあ、特に当てもなさそうだし、またゲヘナに戻る？"
12030-43 = "[s] \"みんな、気を付けてね。\""
12030-45 = "！！"
12030-46 = "えっ……！？"
12030-47 = "シャーレの……！"
12030-48 = "えっ、あ、先生だ！来てくれたんだね！"
12030-49 = "な、なんで来たのよ！アビドスのことを手伝っている身でしょう！？"
12030-51 = "うーん、でもそれはそれとして、先生とは仲良くしたくない？"
12030-52 = "はい、そうですね。風紀委員会と戦う時も、お世話になりましたし……。"
12030-53 = "悪意があるようには見えないし……それに私たちはもう行くんだし、わざわざ敵対しなくてもいいでしょ。"
12030-54 = "[s] \"どこかに行っちゃうの？\""
12030-56 = "ま、また別の依頼を求めてちょっと移動するだけよ！"
12030-57 = "[s] \"そっか、また会おうね。アルも、みんなも。\""
12030-58 = "……ふふっ。"
12030-59 = "ふふっ、うふふふっ！もちろんよ！先生、あなたとは事業のパートナーとして協業するのも悪くなさそうだし。"
12030-60 = "ただ今はうちが忙しくてバタバタしてるから、また今度ね、今度。"
12030-61 = "まあアビドスに二度と来ないってわけでもないし。ここ、良いところだったからね。"
12030-62 = "まあ……それはそうだね。"
12030-63 = "はい、本当に。"
12030-64 = "も、もちろんまた来るわ、ラーメンを食べに！！"
12030-68 = "……本当に美味しかった、から。"
12030-71 = "（そして、便利屋68の荷物を積んだトラックは、路地の向こうへと消えてしまった）"
12030-73 = "こんにちは、大将。お見舞いに来ました。"
12030-74 = "大将、大丈夫？"
12030-75 = "やあ、セリカちゃん。それにアヤネちゃんも。こんな早い時間からありがとう。"
12030-76 = "[s] \"お体は如何ですか？\""
12030-77 = "ああ、先生まで。大丈夫大丈夫、ちょっと擦りむいただけだ。"
12030-78 = "でも……大将のお店が……。"
12030-79 = "ああ、バイトできなくなっちゃってごめんな、セリカちゃん。"
12030-80 = "そういう問題じゃないわよ……。"
12030-81 = "そもそも、もうすぐお店も畳む予定だったからな。予定がちょっと早くなっただけだ。"
12030-82 = "え？お店を……？"
12030-83 = "ああ、ちょっと前から退去通知を受け取っていてね。"
12030-84 = "た、退去通知って、何の話ですか？アビドス自治区の建物の所有者は、アビドス高校で……。"
12030-85 = "……そうか、君たちは知らなかったんだな。"
12030-87 = "……何年か前、アビドスの生徒会が借金を返せなくて、建物と土地の所有権が移ったんだ。"
12030-88 = "えっ！？"
12030-89 = "う、嘘！？アビドスの自治区なのに！？じゃあ今は一体誰が！？"
12030-90 = "[s1] \"……カイザーローンですか？\"\n[s2] \"……カイザーコーポレーションですか？\""
12030-91 = "うーん……そんな名前だったような気もするが……悪いな、はっきり覚えてねえや。"
12030-92 = "うーん……そんな名前だったような気もするが……悪いな、はっきり覚えてねえや。"
12030-93 = "そんな……でも、そういうことなら……。"
12030-95 = "セリカちゃん、先生。お二人は先に学校へ戻っていてください。私は確認したいことがあるので、ちょっと別のところに寄ってから行きます。"
12030-96 = "ん、何のこと？よく分からないけど……私も一緒に行く！"
12030-97 = "では、先生は教室に戻っていてください！私たちもすぐに戻りますので！"
12030-98 = "[s] \"分かった。私も伝えたいことがあるから、待ってるね。\""
12030-99 = "大将、まだ引退とか考えないでよ！分かった！？"
12030-100 = "お、おお……あっ、そうだセリカちゃん最後に、お店のところにお金が入った変なカバンがあったんだけど、何か知ってるかい？"
12030-102 = "[s] \"お店の再建のために使ってください。\""
12030-103 = "お、おお？"
12030-106 = "行こう、セリカちゃん！"
12030-107 = "うん！どこに行くのか分かってないけど……先生、また後でね！"
12030-110 = "次回;それぞれの物語（１）"
