[translation]
12030-1 = "Episódio 3; Adeus, faz-tudo 68"

12030-2 = "Faz-tudo 68/Escritório"

12030-3 = "Suspirar..."

12030-4 = "Al-chan, você está suspirando há algum tempo. Vamos carregar sua bagagem rapidamente?"

12030-5 = "Suspirar...."

12030-7 = "Bem, onde devo levar isso?"

12030-8 = "sim? Isso... ah, são os restos da caligrafia de Al-chan, onde ele demonstrou sua genialidade, então qualquer lixo combustível ali está bom."

12030-11 = "Não jogue fora! ! Tenho certeza que vou trazer!"

12030-12 = "Mas isso é algo que você escreveu como lição de casa para sua aula de caligrafia, certo? Você realmente precisa disso? Além disso, o que é isso, “um dia ruim por dia”? O que isso significa?"

12030-13 = "Tenho certeza que valerá cerca de 1 bilhão de ienes em 10 anos..."

12030-14 = "... Haa."

12030-16 = "Mesmo quando eu bato, não ressoa e não me sinto bem, Al-chan..."

12030-17 = "Presidente, o que há de errado?"

12030-18 = "Al-chan, não quero mudar de escritório."

12030-19 = "Mas agora que o comitê disciplinar descobriu nossa localização, e se falharmos em nossa missão, nossos clientes provavelmente nos atacarão, então não podemos evitar, certo?"

12030-20 = "Pensando bem, a batalha com Abydos também terminou de forma indiferente."

12030-21 = "Bem, não pode ser ajudado! Não tenho como mirar nas pessoas que lutaram lado a lado comigo agora..."

12030-22 = "...Suspirar."

12030-23 = "Deixei o resto do dinheiro naquela sacola para pagar os reparos naquela loja de ramen. Esse presidente é realmente..."

12030-24 = "Uh, barulhento! barulhento!"

12030-25 = "Porque, porque...!"

12030-26 = "……."

12030-27 = "Um fora-da-lei durão... eu..."

12030-29 = "...Suspirar."

12030-30 = "Ele é realmente um presidente difícil."

12030-31 = "Mas este é o meu Al-chan, certo? É muito divertido estarmos juntos!"

12030-32 = "Sim, eu também acho! Caro Al! E-eu provavelmente não estaria vivendo assim se não fosse por Al-sama..."

12030-35 = "Por favor, anime-se! A pessoa que mais respeito é o Sr. Al!"

12030-36 = "Uh, barulhento! Eu sei!"

12030-38 = "Ei...!"

12030-39 = "É tudo o que temos! Carregamento concluído!"

12030-40 = "Então, para onde devemos ir?"

12030-41 = "Hum..."

12030-42 = "Bem, não parece ter nenhum propósito específico, então talvez eu volte para a Geena?"

12030-43 = "[s] \"Todos, por favor, tenham cuidado.\""

12030-45 = "! !"

12030-46 = "Eh...! ?"

12030-47 = "Placa de Petri...!"

12030-48 = "Ah, ah, é a Senseia! Você veio!"

12030-49 = "Por que você veio! Ele deve estar ajudando Abydos! ?"

12030-51 = "Hmm, mas dito isso, você não quer se dar bem com seu Sensei?"

12030-52 = "Sim, está certo. Você me ajudou mesmo quando eu estava lutando contra o comitê disciplinar..."

12030-53 = "Não parece que haja qualquer intenção maliciosa... e já estamos a caminho, então não há necessidade de se esforçar para nos antagonizar."

12030-54 = "[s] \"Você está indo para algum lugar?\""

12030-56 = "Bem, só terei que me movimentar um pouco para receber outro pedido!"

12030-57 = "[s] \"Entendo. Vejo você de novo, Al e todos.\""

12030-58 = "...Hehe."

12030-59 = "Hehehe, hehehehe! Claro! Sensei, não seria uma má ideia trabalhar com você como parceiro de negócios."

12030-60 = "No entanto, estou ocupado e agitado agora, então vejo você na próxima vez."

12030-61 = "Bem, não é como se eu nunca mais voltasse a Abydos. Este lugar era um bom lugar."

12030-62 = "Bem... isso é verdade."

12030-63 = "Sim, realmente."

12030-64 = "Bem, é claro que voltarei para comer ramen! !"

12030-68 = "...Foi realmente delicioso."

12030-71 = "(Então, o caminhão carregado com a bagagem do Handyman 68 desapareceu no beco.)"

12030-73 = "Olá, General. Eu vim visitar você."

12030-74 = "General, você está bem?"

12030-75 = "Olá, Celica-chan. E Ayane também. Obrigado por ter vindo tão cedo."

12030-76 = "[s] \"Como você está se sentindo?\""

12030-77 = "Ah, até o Sensei. Está tudo bem, está tudo bem, só está um pouco arranhado."

12030-78 = "Mas... a loja do general..."

12030-79 = "Ah, me desculpe por não poder mais trabalhar meio período, Celica-chan."

12030-80 = "Esse não é o problema..."

12030-81 = "Em primeiro lugar, eu planejava fechar a loja em breve. É que minha agenda mudou um pouco."

12030-82 = "foto? Uma loja...?"

12030-83 = "Ah, já faz algum tempo que recebo um aviso de despejo."

12030-84 = "O que você quer dizer com aviso de despejo? O proprietário do edifício na Região Autónoma de Abydos é a Abydos High School..."

12030-85 = "... Entendo, vocês não sabiam disso."

12030-87 = "...Há alguns anos, o conselho estudantil de Abydos não conseguiu pagar as suas dívidas, pelo que a propriedade do edifício e do terreno foi transferida."

12030-88 = "Huh! ?"

12030-89 = "Uh, isso é mentira! ? Mesmo sendo uma região autónoma de Abydos! ? Então, quem é agora? ?"

12030-90 = "[s1] \"...Empréstimo Kaiser?\"\n[s2] \"...Kaiser Corporation?\""

12030-91 = "Hmm... sinto que foi chamado assim, mas... me desculpe, não consigo me lembrar claramente."

12030-92 = "Hmm... sinto que foi chamado assim, mas... me desculpe, não consigo me lembrar claramente."

12030-93 = "Isso é... mas se for esse o caso..."

12030-95 = "Celica-chan, Senseia. Por favor, vocês dois voltem para a escola primeiro. Tenho algo para verificar, então vou dar uma passada em outro lugar antes de sair."

12030-96 = "Hmm, o que você quer dizer? Eu realmente não sei... mas eu vou com você!"

12030-97 = "Agora, Senseies, por favor, voltem para sua sala de aula! Voltaremos em breve também!"

12030-98 = "[s] \"Tudo bem. Também tenho algo que quero lhe contar, então estarei esperando por você.\""

12030-99 = "General, não pense em se aposentar ainda! Entendi! ?"

12030-100 = "Ah, ah... Ah, isso mesmo, Celica-chan, no final tinha uma sacola estranha com dinheiro dentro na loja, sabe o que é?"

12030-102 = "[s] \"Por favor, use-o para reconstruir a loja.\""

12030-103 = "Ah, ah?"

12030-106 = "Vamos, Celica-chan!"

12030-107 = "Sim! Não sei para onde vou... mas até mais, Senseia!"

12030-110 = "Da próxima vez: cada história (1)"

