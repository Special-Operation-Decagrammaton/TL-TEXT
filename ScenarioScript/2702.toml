[translation]
2702-1 = "Vou te prender! (2)"
2702-2 = "Kivotos, 3ª Avenida, Rua 2 - Em frente à Master Donut"
2702-4 = "Hiiih! A-ajudem-me, por favor!"
2702-5 = "Hah! Se valoriza sua vida, passe todo o dinheiro que tiver!"
2702-6 = "Heh. Faço o gerente de refém para manter os outros afastados, pego o dinheiro e fujo antes que a polícia chegue... Mais um plano perfeito!"
2702-7 = "As alunas da Academia de Polícia Valkyrie podem até vir armadas com equipamentos poderosos, mas são famosas pela lentidão. Quando chegarem, eu já estarei longe daqui, hahaha!"
2702-8 = "Muito bem, hora de abrir o cofre..."
2702-11 = "Polícia! Todos, levantem as mãos e recuem até a parede!"
2702-12 = "O quê?! As alunas da Academia de Polícia Valkyrie, já?! Não faz nem 5 minutos que o alarme tocou!"
2702-13 = "Nós, do Departamento de Segurança Pública, conhecemos todos os atalhos desta área melhor do que o pessoal do Departamento de Segurança, graças às nossas patrulhas diárias!"
2702-14 = "...Departamento de Segurança Pública?"
2702-15 = "Não é o Departamento de Segurança, mas sim o de Segurança Pública? Puhahahaha!"
2702-16 = "O-o que há de tão engraçado?"
2702-17 = "É claro que é engraçado. Alunas do Departamento de Segurança Pública, que não têm equipamentos decentes e cujo trabalho não passa de organizar o trânsito, vieram me prender... Vocês só podem estar brincando!"
2702-19 = "Até o criminoso está nos subestimando..."
2702-20 = "Ugh... Eu não vou perdoar isso!"
2702-29 = "Uwaaa?! E-espere! É perigoso atirar desse jeito descuidado!"
2702-30 = "S-sua...! Disparar a esmo sem nem mirar, você quer matar o refém com as próprias mãos?!"
2702-32 = "Droga, minha pontaria, que já foi um problema no exame de admissão, está me atrapalhando de novo..."
2702-33 = "Fubuki, você poderia assumir e atirar no criminoso por mim?"
2702-34 = "...Eu também não tenho confiança para atirar a essa distância."
2702-35 = "Ugh... Mas se ficarmos perdendo tempo assim, o pessoal do Departamento de Segurança vai chegar e levar todo o crédito! #nPrecisamos fazer alguma coisa logo..."
2702-36 = "Não seria melhor deixar a prisão para as alunas do Departamento de Segurança?"
2702-37 = "Nós não temos rifles de precisão para mirar no criminoso, nem bombas para explodir a barricada. Se continuarmos nos intrometendo, as coisas só vão piorar..."
2702-38 = "Ugh, que frustração! Se ao menos não houvesse aquela barricada bloqueando a entrada da loja, poderíamos invadir facilmente..."
2702-40 = "...Kirino. Aquela barricada empilhada na entrada, não são sacos de farinha usados para fazer donuts?"
2702-41 = "Está longe e não consigo ver direito... Mas isso é algum problema?"
2702-42 = "Não é do meu estilo me intrometer, mas tive uma ideia para neutralizar o criminoso."
2702-43 = "...Chegue mais perto."
2702-45 = "Alguns minutos depois..."
2702-47 = "Ufa, finalmente ficou silencioso. Parece que o pessoal da polícia desistiu."
2702-48 = "Bem, hora de abrir o cofre novamente..."
2702-53 = "Bang! Bang! Bang!"
2702-54 = "O-o que foi isso, outro tiro?! É um tiro de advertência?"
2702-57 = "...Mas, como antes, que pontaria ruim. Nem passou perto, acertou tudo na farinha da barricada."
2702-58 = "Onde vocês estão mirando, idiotas?! Por que estão atirando nos sacos de farinha?!"
2702-59 = "Atirar na farinha não vai adiantar de nada!"
2702-64 = "Cof, cof... Droga. Hm, essa fumaça... será que?"
2702-69 = "Sim, exatamente. É a poeira da farinha que saiu dos sacos!"
2702-70 = "Aquele tiroteio não foi para intimidar. Nosso objetivo era encher o interior da loja com a poeira da farinha."
2702-71 = "A poeira dispersa no ar pode inflamar facilmente com uma pequena faísca. Ou seja..."
2702-73 = "...Explosão de poeira!"
2702-75 = "V-vocês estão loucas?!"
2702-76 = "Se fizerem isso, toda a área ao redor vai pelos ares—"
2702-78 = "BOOOOOOOOOOM!!"
2702-81 = "M-minha... loja... a rua que estava sempre cheia de clientes..."
2702-82 = "P-por causa dessas idiotas... meu plano perfeito foi arruinado... ugh..."
2702-87 = "Conseguimos! Nós prendemos o criminoso!"
2702-88 = "Explodir a barricada e o criminoso ao mesmo tempo sem usar bombas..."
2702-89 = "Até que foi uma ideia bem inovadora, se quer saber."
2702-90 = "Com isso, a alta cúpula da Academia de Polícia Valkyrie reconhecerá nossos méritos, não é?"
2702-93 = "Polícia! Todos com as mãos para o alto e recuem até a parede..."
2702-94 = "Ouvi dizer que havia uma situação de reféns na loja de donuts... mas não eram reféns, eram terroristas?"
2702-95 = "Chefe, olhe! Antes de vocês chegarem, nós mesmas capturamos o criminoso!"
2702-96 = "Kirino e Fubuki, do Departamento de Segurança Pública. #nMas, mais importante, o que é esse desastre... será que o criminoso explodiu tudo!?"
2702-97 = "Não, nós explodimos para neutralizar a barricada que o criminoso montou!"
2702-98 = "Peguei um pouco de farinha emprestada para substituir a pólvora, e o efeito foi excelente."
2702-99 = "……."
2702-100 = "O que acha? Com esse mérito, podemos ser transferidas para o Departamento de Segurança!?"
2702-101 = "Bocejo... A transferência não importa muito, eu só queria tirar umas duas semanas de folga..."
2702-102 = "Resolver um problema que um único atirador poderia ter resolvido explodindo a loja inteira..."
2702-103 = "As duas, voltem e preparem os relatórios de incidente!"
2702-108 = "Eeeeeeeh!?"
2702-110 = "Depois disso, Kirino e Fubuki foram suspensas por um tempo como punição por terem explodido a loja de donuts."
2702-111 = "Você está presa!"
