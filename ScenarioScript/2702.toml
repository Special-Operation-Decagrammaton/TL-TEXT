[translation]
2702-1 = "逮捕します！（２）"
2702-2 = "キヴォトス3丁目2番街・マスタードーナツ前"
2702-4 = "ひっ、ひぃっ！たっ、助けてください！"
2702-5 = "はっ！命が惜しければあり金を全部出せ！"
2702-6 = "ふっ。店長を人質にして、他のやつらを近寄れなくしてから、警察が来る前に金を奪って逃げる……今回も完璧だな！"
2702-7 = "ヴァルキューレ警察学校の生徒どもは強力な装備で武装してきやがるが、出動が遅いことで有名。やつらが着く頃に私は、もうすでに遠くに逃げてることになるだろうよ、はははっ！"
2702-8 = "さあて、じゃあ金庫を開けるとするか……。"
2702-11 = "警察です！全員、両手を上げて壁まで下がってください！"
2702-12 = "なっ！ヴァルキューレ警察学校の生徒どもが、もう！？警報が鳴ってから、まだ5分も経ってないぞ！？"
2702-13 = "私たち生活安全局は警備局の方々以上に、普段のパトロール任務を経て、この周辺の近道は全て把握していますので！"
2702-14 = "……生活安全局？"
2702-15 = "警備局ではなく、生活安全局だと？ふはははっ！"
2702-16 = "な、なにがそんなに面白いのですか？"
2702-17 = "そりゃあ面白いだろう。大した装備もない、交通整理ぐらいしか仕事の無い生活安全局の生徒どもが、この私を逮捕しにだと……笑わせてくれる！"
2702-19 = "犯人にも舐められてるねぇ……。"
2702-20 = "うぅっ……許しません！"
2702-29 = "うわぁっ！？ま、待ってください！そんな雑に発砲したら危ないですよ！"
2702-30 = "こ、このっ……！狙いも定めず銃を乱射するとは、人質を自らの手で殺す気か！"
2702-32 = "くっ、入学試験でも課題だった射撃力に、またしても足を引っ張られるとは……。"
2702-33 = "フブキ、私に代わってあの犯人を狙撃してくれませんか？"
2702-34 = "……私も、この距離での狙撃は自信ないなぁ。"
2702-35 = "うっ……ですが、こうして無意味に時間だけ過ごしていたら、後から来た警備局の生徒たちに全功績を持って行かれてしまいます！#n早く、早くなんとかしないと……。"
2702-36 = "これはもう、逮捕まで警備局の生徒たちに任せちゃった方がいいんじゃないの？"
2702-37 = "私たちには犯人を狙うための狙撃銃も、バリケードをぶっ飛ばす爆弾もないし。これ以上下手に出しゃばったら、事が大きくなるんじゃないかな……。"
2702-38 = "ううっ、悔しいっ！せめてお店の入り口を塞いでるあのバリケードさえ無ければ、簡単に突入できるのですが……。"
2702-40 = "……キリノ。入口に積んであるあのバリケード、ドーナツ作る時に使う小麦粉の袋じゃない？"
2702-41 = "遠くてよく見えませんが……それに何か問題でもありましたか？"
2702-42 = "あんまり出しゃばるのは私のスタイルじゃないんだけど、犯人を無力化させる案が一つ浮かんだ。"
2702-43 = "……ちょっと耳貸して。"
2702-45 = "数分後……"
2702-47 = "ふう、ようやく静かになったか。警察のやつらも、諦めたようだな。"
2702-48 = "さて、あらためて金庫を開けるとするか……。"
2702-53 = "ッターン！ターン！ターン！"
2702-54 = "な、なんだ、また銃声？！威嚇射撃か？"
2702-57 = "……しかしさっきもそうだったが、下手な射撃だな。惜しいどころか、こっちまで届かずバリケードの小麦粉に全部当たってやがる。"
2702-58 = "どこを狙ってやがる、バカどもが！小麦粉の袋を撃ってどうする！"
2702-59 = "小麦粉を撃ったところで、何にもならねえだろうが！"
2702-64 = "ゲホッ、ゲホッ……ったく。ん、この煙……まさか？"
2702-69 = "はい、そうです。それは、袋から出てきた小麦粉の粉塵です！"
2702-70 = "そもそもあの銃撃は威嚇目的じゃないってこと。お店の中に小麦粉の粉を充満させることこそが、私たちの目的。"
2702-71 = "大気中に飛散した粉塵は、小さな火花でも簡単に発火します。つまり……。"
2702-73 = "……粉塵爆発！"
2702-75 = "バッ、バカか！？"
2702-76 = "そんなことをしたら、周囲一帯が丸ごと吹っ飛――"
2702-78 = "ドカアアアアァァァァァァァン！！"
2702-81 = "わ、私の……お店が……いつもお客さんで賑わっていた道が……。"
2702-82 = "こ、こんなバカなやつらのせいで……私の完璧な計画が、崩れるとは……ぐっ……。"
2702-87 = "やりました！私たちで犯人を捕まえました！"
2702-88 = "爆弾無しで、バリケードと犯人を同時に吹っ飛ばすとか……"
2702-89 = "我ながら斬新なアイデアだったなぁ。"
2702-90 = "これなら、ヴァルキューレ警察学校の上層部も私たちの功績を認めてくれますよね？"
2702-93 = "警察だ！全員両手を上にして壁まで下がっ……。"
2702-94 = "ドーナツ屋で人質事件だと聞いて来たのだが……人質事件ではなく、テロリストだったのか？"
2702-95 = "局長、見てください！皆さんが来る前に、私たちの手で犯人を捕まえておきました！"
2702-96 = "生活安全局のキリノとフブキか。#nそれよりもこの惨状はいったい……もしや、犯人が爆破させたのか！？"
2702-97 = "いえ、犯人が設置したバリケードを無力化するために、私たちが爆破させました！"
2702-98 = "火薬の代わりに小麦粉を少し借りたんだけど、効果は抜群だったよ。"
2702-99 = "……。"
2702-100 = "どうですか？この功績があれば、警備局に転科できますか！？"
2702-101 = "ふぁーあ……転科は別にいいから、私は半月ぐらい休暇を貰えればそれで……。"
2702-102 = "狙撃手一人で解決できる問題を、店ごと爆発させて解決するとは……。"
2702-103 = "二人とも戻って、始末書の準備をしておきたまえ！"
2702-108 = "ええぇぇぇぇーーー！？"
2702-110 = "その後、キリノとフブキはドーナツ屋を爆破させたことへの処分として、しばらくの間停学になった。"
2702-111 = "逮捕します！"
