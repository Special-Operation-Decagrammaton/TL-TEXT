[translation]
80000056-1 = "一緒に食べられるもの"
80000056-3 = "……あっ。"
80000056-4 = "お疲れ様です、先生。こんな遅い時間にすみません。"
80000056-5 = "あ、いえ、本日は本の返却の件ではなく……。"
80000056-6 = "な、何だかもしかして、私のイメージってそういう感じになってます？あはは……。"
80000056-7 = "最近はしっかり返していただいてますし、大丈夫ですよ。ありがとうございます。"
80000056-8 = "本日の用件は、その……"
80000056-13 = "すみません、本当なら私の方から先生の方へお伺いするべきだったのですが……当直が重なってしまい。"
80000056-14 = "[s1] \"……これ、本？\"\n[s2] \"あ、中にチョコレートが……。\""
80000056-15 = "はい、今日はバレンタインデーですよ？なので、先生にお渡ししたいなと。"
80000056-16 = "はい、今日はバレンタインデーですよ？なので、先生にお渡ししたいなと。"
80000056-17 = "せっかくと言いますか……このように先生にお礼ができるタイミングも、なかなかありませんでしたので。"
80000056-18 = "見た目も面白いですが、チョコレートそのものも美味しいんですよ。自信を持ってお薦めします！"
80000056-19 = "……あれ、先生？どうかされましたか？"
80000056-20 = "大丈夫なのか、ですか？「大丈夫」、とは……？"
80000056-21 = "……あっ。"
80000056-22 = "図書館で本を読みながら、チョコレートを食べても良いのかというお話ですか？手が汚れて、本に付いてしまうのでは、と？"
80000056-23 = "……ふふっ、流石は先生。配慮してくださって、ありがとうございます。"
80000056-24 = "ですが大丈夫ですよ。"
80000056-25 = "そのチョコは手についたり、粉が落ちたりしないよう、特殊なコーティングがされているものなんです。"
80000056-26 = "そういった理由もあって、実は図書委員会でも人気のシリーズでして。もちろんこれは普段食べているのとは違う、バレンタイン専用の製品ですが。"
80000056-27 = "それで、その……。"
80000056-28 = "もしよろしければなのですが……。"
80000056-29 = "[s3] \"そしたらせっかくだし、ここで食べていっても良い？\"\n[s4] \"それぞれ作業しながら、ここで一緒に食べない？\""
80000056-30 = "……！"
80000056-31 = "……！"
80000056-32 = "先生……。"
80000056-33 = "……。"
80000056-37 = "……はい、喜んで！"
80000056-39 = "（その後シミコと並んで座り、夜中までお互いに作業をしながら、チョコレートを分け合って食べた）"
80000056-40 = "（チョコを食べ終わる頃にはシミコは眠ってしまい、静かに毛布をかけてからシャーレへと戻った）"
