[translation]
80000056-1 = "Algo que podemos comer juntos"
80000056-3 = "……Ah."
80000056-4 = "Bom trabalho, Sensei. Desculpe incomodar a uma hora tão tardia."
80000056-5 = "Ah, não, hoje não é sobre a devolução de livros..."
80000056-6 = "O-o quê? Será que essa é a imagem que você tem de mim? Ahaha..."
80000056-7 = "Ultimamente você tem devolvido tudo certinho, então está tudo bem. Obrigada."
80000056-8 = "O motivo de eu ter vindo hoje é, bem..."
80000056-13 = "Sinto muito, o certo seria eu ter ido até você, Sensei... mas acabei ficando sobrecarregada com os plantões."
80000056-14 = "[s1] \"...Isso é um livro?\"\n[s2] \"Ah, tem chocolate dentro...\""
80000056-15 = "Sim, hoje é Dia dos Namorados, não é? Por isso, eu queria te entregar isso, Sensei."
80000056-16 = "Sim, hoje é Dia dos Namorados, não é? Por isso, eu queria te entregar isso, Sensei."
80000056-17 = "É que... não é sempre que tenho uma oportunidade como esta para agradecer ao Sensei."
80000056-18 = "A aparência é interessante, mas o chocolate em si também é delicioso. Recomendo com confiança!"
80000056-19 = "……Ué, Sensei? Aconteceu alguma coisa?"
80000056-20 = "Se está tudo bem? O que quer dizer com \"tudo bem\"...?"
80000056-21 = "……Ah."
80000056-22 = "Você está perguntando se pode comer chocolate enquanto lê um livro na biblioteca? Por medo de sujar as mãos e manchar o livro?"
80000056-23 = "……Fufu, como esperado do Sensei. Obrigada pela consideração."
80000056-24 = "Mas não se preocupe."
80000056-25 = "Esse chocolate tem uma cobertura especial para não grudar nas mãos nem esfarelar."
80000056-26 = "Por esse motivo, na verdade, é uma série bem popular no Comitê da Biblioteca. É claro que este é um produto exclusivo de Dia dos Namorados, diferente do que comemos normalmente."
80000056-27 = "Então, sobre isso..."
80000056-28 = "Se não for pedir muito..."
80000056-29 = "[s3] \"Já que é assim, posso comer aqui mesmo?\"\n[s4] \"Que tal comermos juntos aqui enquanto trabalhamos?\""
80000056-30 = "……!"
80000056-31 = "……!"
80000056-32 = "Sensei……."
80000056-33 = "……."
80000056-37 = "……Sim, com prazer!"
80000056-39 = "（Depois disso, sentei ao lado de Shimiko e, enquanto trabalhávamos até tarde da noite, dividimos o chocolate.）"
80000056-40 = "（Quando terminamos o chocolate, Shimiko tinha adormecido. Cobri-a silenciosamente com um cobertor e voltei para o Schale.）"
