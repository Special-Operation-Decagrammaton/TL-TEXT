[translation]
1011506-1 = "遺されるもの、受け継がれるもの"
1011506-5 = "うわぁ……改めて見ると、すごい数ですね。"
1011506-6 = "縫い目がほつれたボール、破れたグローブ、曲がったアルミバット……。"
1011506-7 = "これは……泥汚れが全然落ちないユニフォーム？#nこういうのは自分で洗ってほしいんですけどね……。"
1011506-8 = "泥汚れは手洗いじゃないと取れないのに……。"
1011506-9 = "とりあえず、まずは修理品をリストアップしていきましょうか。"
1011506-10 = "[ns] \"私も手伝うよ。\" "
1011506-11 = "いいんですか？これは野球部の仕事ですし、今日の当番も私なのに……。"
1011506-16 = "というか、もう分別始めてるじゃないですか！？#nちょっと待ってください！私も一緒にやりますから！"
1011506-19 = "このグローブの破れ方と角度、キャッチの瞬間の衝撃を計算すると……！"
1011506-20 = "[s] \"計算すると……？\""
1011506-21 = "これは、ライナーを捕ったときに破れたグローブですね！"
1011506-22 = "フライと比べて、ライナーは勢いが違うので分かりやすいんです。"
1011506-23 = "これほど大きな破れ方をしているのがその証拠です。"
1011506-27 = "見てください、親指と人差し指の間のウェブが革紐ごと引きちぎられてますよね？"
1011506-28 = "相当強いライナーだったんでしょうね。#n守備位置がずれてたら、長打になってたかもしれません。"
1011506-31 = "このボールの縫い目のほつれ具合と位置を数えると……"
1011506-32 = "これはきっと、スイーパーを投げた時のダメージが原因ですね！"
1011506-33 = "[s] \"スイーパー？\""
1011506-34 = "横に大きく曲がるスライダーの一種です。 "
1011506-35 = "通常のスライダーと違って、ツーシームの握りで横に強く曲がるんですよ。"
1011506-36 = "よく曲がるスイーパーは、外角に逃げて打者が空振りしやすいんです！"
1011506-37 = "実はスライダーはセイバーメトリクスで常にトップのピッチでもあって……。"
1011506-38 = "[s1] \"それはすごいね……。\"\n[s2] \"ミレニアムにも、そんな球を投げられる投手がいるんだね。\""
1011506-41 = "あ、えっと……。"
1011506-42 = "たぶん……。"
1011506-43 = "ピッチングマシンが投げた球だと思います……。"
1011506-46 = "このアルミバットの曲がり方、妙じゃないですか？ "
1011506-47 = "どこが、って？普通の練習をしていたなら、ここから曲がるはずは無いんですよ。"
1011506-48 = "力のかかり方を考えると、多分これは球が当たったんじゃなくて……"
1011506-52 = "地面を引きずってたり、転んだ拍子に変な力がかかっちゃったり……#n曲がった原因として可能性が高いのはそんなところでしょうか。"
1011506-53 = "「道具をもっと大切にしましょう」って、キャプテンに話しておかないと！"
1011506-54 = "[s3] \"用具の状況から、逆算して原因を導き出す……\"\n[s4] \"やっぱりレイもミレニアムの生徒なんだね。\""
1011506-57 = "えっ、どういう意味ですか、先生？"
1011506-58 = "用具が壊れた原因を力学的に推測するくらい、ミレニアムじゃ普通ですよ？"
1011506-59 = "先生？どうしてそんな顔で私を見るんですか……？"
1011506-61 = "先生？なにをジッと見て……あっ、それは……！"
1011506-67 = "これは……ダメです。修理品じゃないので。混ぜないで、ちゃんと持っててください。"
1011506-68 = "[ns] \"そのボール、何か特別なものなの？\""
1011506-69 = "そうですね。とても、とても大切なもの。"
1011506-70 = "このボールは……。"
1011506-75 = "[wa:1950]― [log=레이]これは[wa:1120]私が初めて捕った……[/log]"
1011506-76 = "[wa:2250]― [log=레이]思い出の、[wa:1040]ホームランボールです。[/log]"
1011506-79 = "[wa:1290]― [log=레이]野球を始めたての頃、[/log]"
1011506-80 = "[wa:1690]― [log=레이]よく持ち歩いてました。[/log]"
1011506-83 = "[wa:1420]― [log=레이]あの日みたホームランを――[/log]"
1011506-84 = "[wa:2440]― [log=레이]いつか、[wa:1270]自分でも同じように[wa:940]打ちたいと思って。[/log]"
1011506-87 = "[wa:960]― [log=레이]今は[wa:720]―ボロボロになってしまったので[/log]"
1011506-88 = "[wa:1480]― [log=레이]ロッカーに保管しています。[/log]"
1011506-91 = "[wa:1330]― [log=레이]くじけそうな時は、[wa:1740]このボールを見ると[/log]"
1011506-94 = "― [log=레이]初心に戻れるような気がして……[wa:3180]元気をもらえる。[/log]"
1011506-95 = "[wa:2880]― [log=레이]……大切な、[wa:1770]お守りなんです。[/log]"
1011506-99 = "[ns] \"本当に大切なボールなんだね。\""
1011506-100 = "不思議ですよね。"
1011506-101 = "物質的に見れば、古びた革に、108本の縫い目。"
1011506-102 = "中身はコルクとゴムの芯でできた、ただの球体。"
1011506-103 = "なのに……こうやって手に持つと、心の奥が……熱くなる……。"
1011506-104 = "科学的根拠も無ければ、論理的でも無い。#nそれでも「まだいける！」って、このボールがいつも背中を押してくれるんです。"
1011506-105 = "[s] \"そういう存在があるって、素敵だね。\""
1011506-106 = "……はい。"
1011506-107 = "本当にそう思います。"
1011506-108 = "あの……先生？"
1011506-109 = "ちょっとだけ、いいですか……？"
1011506-113 = "私も、いつか……先生の……。"
1011506-114 = "私にとっての思い出のボールみたいな……存在に……。"
1011506-115 = "になれたら……いいなって……思って……。"
1011506-116 = "[s] \"もう、なってるよ？\""
1011506-117 = "えっ……！？"
1011506-118 = "[ns] \"レイはいつも元気をくれる、大切な生徒だよ。\" "
1011506-119 = "……うう。"
1011506-123 = "そ、それは……そうですけど……その言い方ズルいです……！"
1011506-124 = "でも、先生に元気を与えられているなら……。"
1011506-125 = "今はそれで十分です……へへっ。"
