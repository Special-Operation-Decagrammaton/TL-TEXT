[translation]
1011506-1 = "O que ficará para trás, o que será herdado"
1011506-5 = "Uau... quando olho de novo, é um número incrível."
1011506-6 = "Uma bola com costuras desgastadas, uma luva rasgada, um taco de alumínio torto..."
1011506-7 = "Isso é... um uniforme que não fica enlameado? #nQuero que você mesmo lave essas coisas..."
1011506-8 = "Manchas de lama só podem ser removidas lavando as mãos..."
1011506-9 = "Em primeiro lugar, vamos fazer uma lista de itens de reparo."
1011506-10 = "[ns] \"Eu também vou ajudar você.\"\"\n1011506-11 = \"Está tudo bem? Este é o trabalho do clube de beisebol, e estou de plantão hoje...\"\n1011506-16 = \"Na verdade, você já começou a classificar! ? #nPor favor, espere um momento! Farei isso com você também!\"\n1011506-19 = \"Se você calcular a forma e o ângulo do rasgo dessa luva, e o impacto no momento da pega...!\"\n1011506-20 = \"[s] \"Você calcula...?\"\"\n1011506-21 = \"Essa é a luva que rasgou ao pegar o forro!\"\n1011506-22 = \"Comparado a uma mosca, um transatlântico tem um impulso diferente, por isso é fácil de entender.\"\n1011506-23 = \"O fato de ter um rasgo tão grande é prova disso.\"\n1011506-27 = \"Olha, a teia entre o polegar e o indicador foi arrancada junto com a pulseira de couro, certo?\"\n1011506-28 = \"Deve ter sido um forro bem forte. #nSe a posição defensiva estivesse errada, poderia ter sido um golpe longo.\"\n1011506-31 = \"Se você contar o grau e a posição das costuras desgastadas desta bola...\"\n1011506-32 = \"Provavelmente isso é causado pelo dano causado ao lançar a varredora!\"\n1011506-33 = \"[s] \"Varredor?\"\"\n1011506-34 = \"É um tipo de controle deslizante que se dobra para os lados.\"\n1011506-35 = \"Ao contrário dos controles deslizantes normais, possui uma alça de duas costuras que permite dobrar fortemente para os lados.\"\n1011506-36 = \"Varredores que curvam bem tendem a correr para o canto externo e fazer com que os rebatedores erram!\"\n1011506-37 = \"Na verdade, o controle deslizante é sempre o tom mais alto na sabermetria...\"\n1011506-38 = \"[s1] \"Isso é incrível...\"\n[s2] \"Existem arremessadores no Millennium que conseguem lançar arremessos assim.\""

1011506-41 = "Ah, hum..."
1011506-42 = "talvez……."
1011506-43 = "Acho que foi uma bola lançada por uma máquina de arremesso..."
1011506-46 = "Não é estranho o modo como esse bastão de alumínio se curva?"
1011506-47 = "Onde? Se você estivesse praticando normalmente, não seria capaz de sair deste ponto."
1011506-48 = "Considerando a forma como a força foi aplicada, provavelmente não foi a bola que a atingiu..."
1011506-52 = "Talvez estivesse se arrastando no chão ou alguma força estranha tenha sido aplicada quando caiu... #nEssa é a causa mais provável da curva?"
1011506-53 = "Preciso dizer ao capitão: ``Vamos cuidar melhor de nossas ferramentas!''"
1011506-54 = "[s3] \"A partir da situação do equipamento, calcule de trás para frente para derivar a causa...\"\n[s4] \"Rei também é um aluno do Millennium, afinal.\""
1011506-57 = "O que você quer dizer, senhor?"
1011506-58 = "Não é normal que as pessoas do Millennium adivinhem mecanicamente a causa da avaria dos equipamentos?"
1011506-59 = "sensei? Por que você está me olhando assim...?"
1011506-61 = "sensei? O que você olha... ah, isso é...!"
1011506-67 = "Isso... não é bom. Este não é um item de reparo. Não misture tudo, apenas segure-o corretamente."
1011506-68 = "[ns] \"Essa bola é algo especial?\""
1011506-69 = "Concordo. Algo muito, muito importante."
1011506-70 = "Essa bola é..."
1011506-75 = "[wa:1950]― [log=레이]Esta é [wa:1120]A primeira vez que peguei...[/log]"
1011506-76 = "[wa:2250]― [log=레이]Uma bola de home run memorável [wa:1040]. [/registro]"
1011506-79 = "[wa:1290]― [log=레이]Quando comecei a jogar beisebol[/log]"
1011506-80 = "[wa:1690]― [log=레이]Muitas vezes eu carregava isso comigo. [/registro]"
1011506-83 = "[wa:1420]― [log=레이]O home run que vi naquele dia―[/log]"
1011506-84 = "[wa:2440]― [log=레이]Algum dia, quero [wa:1270]tocar [wa:940] da mesma maneira. [/registro]"
1011506-87 = "[wa:960]― [log=레이]Agora [wa:720]―Tudo desmoronou, então [/log]"
1011506-88 = "[wa:1480]― [log=레이]Eu guardo no meu armário. [/registro]"
1011506-91 = "[wa:1330]― [log=레이]Quando você sentir vontade de desistir, [wa:1740]olhe essa bola[/log]"
1011506-94 = "― [log=레이]Sinto que posso voltar ao básico...[wa:3180]Sinto-me energizado. [/registro]"
1011506-95 = "[wa:2880]― [log=레이]...É um talismã importante [wa:1770]. [/registro]"
1011506-99 = "[ns] \"É um baile muito importante.\""
1011506-100 = "É estranho, não é?"
1011506-101 = "Fisicamente é um couro velho com 108 pontos."
1011506-102 = "O interior é apenas uma esfera de cortiça e um núcleo de borracha."
1011506-103 = "E ainda assim... quando eu o seguro em minha mão assim, sinto um calor por dentro..."
1011506-104 = "Não há base científica e não há lógica. #nMesmo assim, essa bola sempre me empurra e diz: ``Ainda posso ir!''"
1011506-105 = "[s] \"É maravilhoso que algo assim exista.\""
1011506-106 = "……sim."
1011506-107 = "Eu realmente acho que sim."
1011506-108 = "Hum... sensei?"
1011506-109 = "Só um pouquinho, ok...?"
1011506-113 = "Eu também serei professora um dia..."
1011506-114 = "É como uma bola de memórias para mim... existe..."
1011506-115 = "Achei que seria bom se eu pudesse me tornar um."
1011506-116 = "[s] \"Isso já está acontecendo?\""
1011506-117 = "Eh...! ?"
1011506-118 = "[ns] \"Rei é um aluno importante que sempre me dá energia.\""
1011506-119 = "...Eca."
1011506-123 = "Bem... isso é verdade, mas... a maneira como você diz isso está errada...!"
1011506-124 = "Mas se o sensei está me dando energia..."
1011506-125 = "Isso é o suficiente por enquanto...hehe."
