[translation]
52145-2 = "(No mesmo instante, na \"Mansão Higan\"...)"
52145-15 = "Haa, haa..."
52145-16 = "Você está bem, Ayame!?"
52145-17 = "De alguma forma... E você?"
52145-18 = "Sim, eu estou bem."
52145-19 = "Mas, não importa quantos a gente derrote, eles não param de aparecer... Precisamos nos reunir com o pessoal logo... E também, o Sensei..."
52145-20 = "Não. Agora que a Ayame está aqui, com certeza vai ficar tudo bem."
52145-21 = "Você sempre resolve qualquer missão difícil com facilidade, né? Diferente de mim."
52145-25 = "..."
52145-30 = "...Ainda não entendeu?"
52145-31 = "Eu não disse? Que o coração humano é algo deveras misterioso."
52145-39 = "Faz tempo, não é? Senhorita da Hyakkiyako."
52145-50 = "Você foi quem levou a Ayame naquela época..."
52145-51 = "Não, não é! #nIsso é... apenas um pesadelo...!"
52145-52 = "Eu não disse nada disso... a Ayame..."
52145-53 = "Então, por que você me reconhece?"
52145-54 = "Esta cena também é um pesadelo?"
52145-55 = "...Não vou ser enganada. #nVocê é a presidente do Clube Kacho Fugetsu, que confunde a todos...!"
52145-59 = "Ayame, vamos fazer um ataque de pinça no meu sinal—"
52145-63 = "...Eh?"
52145-64 = "...On-onde?"
52145-69 = "...Desde o início, nós nunca estivemos juntas."
52145-84 = "Aya...me...?"
52145-85 = "Já está na hora de acordar do sonho?"
52145-86 = "Parecia estar se divertindo, Nagusa."
52145-87 = "Mas, daqui em diante é a realidade."
52145-88 = "...Não pode ser."
52145-89 = "A Ayame que eu conhe... não... mentira..."
52145-96 = "Próximo episódio: O fim do doce sonho"
