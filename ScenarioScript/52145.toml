[translation]
52145-2 = "(Enquanto isso, no mesmo momento, na 'Mansão Higantei'......)"
52145-15 = "Haa, haa......"
52145-16 = "Você está bem, Ayame!?"
52145-17 = "De alguma forma, sim...... E você?"
52145-18 = "Sim, eu estou bem."
52145-19 = "Mas não tem fim, não importa quantos a gente derrote...... precisamos nos reunir com todos logo...... e o Sensei também......"
52145-20 = "Não, tudo bem. Como a Ayame está aqui agora, vai ficar tudo bem."
52145-21 = "Você sempre resolve qualquer missão difícil com facilidade, né? Diferente de alguém como eu."
52145-25 = "......"
52145-30 = "......Você ainda não entendeu?"
52145-31 = "Eu não te disse? O coração humano é algo muito misterioso."
52145-39 = "Faz tempo, não é? Jovem senhorita da Hyakkaryouran."
52145-50 = "Você foi quem levou a Ayame naquela época......"
52145-51 = "Não, isso não é verdade! #n Aquilo...... foi só um pesadelo ruim......!"
52145-52 = "A Ayame disse que não falou nada daquilo......"
52145-53 = "Nesse caso, por que você me reconhece?"
52145-54 = "Você também acha que esta cena é um pesadelo?"
52145-55 = "......Não vou ser enganada. #n Você é a presidente do Clube das Flores, Pássaros, Vento e Lua que ilude a todos......!"
52145-59 = "Ayame, vamos atacá-la por ambos os lados no meu sinal――"
52145-63 = "......Eh?"
52145-64 = "......O, onde?"
52145-69 = "......Desde o começo, nós nunca estivemos juntas."
52145-84 = "Aya......me......?"
52145-85 = "Já está na hora de acordar desse sonho?"
52145-86 = "Parecia bem divertido, Nagusa."
52145-87 = "Mas agora, a realidade começa daqui."
52145-88 = "......Não pode ser."
52145-89 = "Você não é a Ayame que eu conhecia...... é mentira......"
52145-96 = "Próximo Episódio; O Fim do Doce Sonho"

