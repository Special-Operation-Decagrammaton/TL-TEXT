[translation]
52145-2 = "（同時刻の「彼岸邸」では……）"
52145-15 = "はぁ、はぁ……。"
52145-16 = "大丈夫、アヤメ！？"
52145-17 = "なんとかね……。そっちは？"
52145-18 = "うん、私は大丈夫。"
52145-19 = "でも、倒しても倒してもキリがない……。早くみんなと合流しないと……それに、先生……。"
52145-20 = "ううん。今はアヤメがいるから、きっと大丈夫。"
52145-21 = "いつだって、どんな難しい任務も軽く解決しちゃうもんね。私なんかと違って。"
52145-25 = "……。"
52145-30 = "……まだわからぬのかえ？"
52145-31 = "言ったろう？人の心とは摩訶不思議なもの、と。"
52145-39 = "ご無沙汰やね。百花繚乱のお嬢さん。"
52145-50 = "あなたはあの時アヤメを連れていった……。"
52145-51 = "いや、違う！#nあれは……ただの悪い夢だ……！"
52145-52 = "そんなこと言ってないって……アヤメが……。"
52145-53 = "なら、おまえさんはどうして我が分かるのかねぇ？"
52145-54 = "この光景もまた悪夢と？"
52145-55 = "……騙されない。#nあなたはみんなを惑わす、花鳥風月部の部長だから……！"
52145-59 = "アヤメ、私の合図で挟み撃ちにしよ――"
52145-63 = "……え？"
52145-64 = "……ど、どこ？"
52145-69 = "……最初から、一緒になんていなかったよ。"
52145-84 = "アヤ……メ……？"
52145-85 = "そろそろ夢から覚めた？"
52145-86 = "楽しそうだったね、ナグサ。"
52145-87 = "でも、ここからが現実なんだ。"
52145-88 = "……そんな。"
52145-89 = "私の知……アヤメ……じゃな……嘘……。"
52145-96 = "次回;甘い夢の終わり"
