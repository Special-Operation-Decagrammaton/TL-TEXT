[translation]
101-1 = "特別依頼・指名手配"
101-2 = "連邦生徒会・オペレーションルーム"
101-3 = "久しぶり、先生。#n元気だった？"
101-4 = "先生とかシャーレの生徒たちが色々と事件を解決してくれるおかげで、私は今日もお菓子を食べながらのんびりと過ごしてるよ（パリッ）。"
101-5 = "いやあ、本当にシャーレの生徒は使いやす……や、親切でよかったー。"
101-6 = "キヴォトスの生徒全員が、そんな風に優しくて善良な子ってわけじゃないからね。"
101-7 = "中には連邦生徒会の統制をかいくぐって、重犯罪で指名手配になった生徒もいるし。"
101-8 = "……というわけで、時間がある時にその指名手配中の生徒たち、私たちの代わりに捕まえてきてくれない？"
101-9 = "もし上手くいったら、私のお菓子ちょっと分けてあげるからさ～。（パリッパリッ）"
