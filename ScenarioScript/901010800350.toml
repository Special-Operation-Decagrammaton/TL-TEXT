[translation]#[Texto Final. - Filipe 05/07.]
901010800350-6 = "Resumindo os dados logísticos encontrados na doca……"
901010800350-7 = "A principal fonte de renda da filial da Família Carpaccio era……#ncomo esperado, o serviço de segurança do porto."
901010800350-8 = "Claro, depois de deduzir custos e o repasse pro chefe, sobra pouco."
901010800350-9 = "O estranho é que nos últimos meses eles cortaram gastos fixos e estão acumulando dinheiro."
901010800350-10 = "Comprando caranguejo que não vão comer e ainda cortando gastos…… qual será o objetivo?"
901010800350-11 = "Devem estar se preparando pra uma despesa grande, tipo um evento pra mostrar poder."
901010800350-12 = "Dá pra imaginar."
901010800350-13 = "Ontem na loja também ouvi: a preocupação da Família Carpaccio é uma só."
901010800350-14 = "O motivo de estarem economizando dinheiro é――"
901010800350-22 = "O motivo de estarem economizando dinheiro é――\n[as2] Juntar o repasse pro chefe.\n[as3] Comprar um robô transformável edição limitada.\n[as1] Pagar a taxa de licitação para renovar o contrato com o porto."
901010800350-23 = "Isso. A Família Carpaccio está prestes a renovar o contrato com o porto."
901010800350-24 = "Não sei o valor exato, mas licitação exige uma grana considerável."
901010800350-25 = "E como é leilão, o valor pode superar o esperado."
901010800350-27 = "Entendi, faz sentido economizar."
901010800350-28 = "É verdade que o repasse é alto, mas já está incluído nos custos fixos desde o início."
901010800350-29 = "Por isso, a economia recente não parece ter relação com isso."
901010800350-30 = "Deve haver outro motivo."
901010800350-42 = "……Robô transformável?"
901010800350-43 = "Tá falando sério? E custa tudo isso?"
901010800350-44 = "Brinquedo não custa mais que 10 mil ienes, né?"
901010800350-48 = "……Não subestima o mundo adulto, FOX3."
901010800350-52 = "Brinquedo edição limitada hoje em dia é de outro nível, olha."
901010800350-56 = "Isso custa o mesmo que o orçamento anual de uma academia!?"
901010800350-57 = "Com esse dinheiro dava pra comprar vários fuzis…… ou renovar o equipamento do esquadrão inteiro."
901010800350-58 = "Claro, sei que existem muitos itens de luxo caros por aí."
901010800350-59 = "Mas mesmo a Família Carpaccio tem limitações para usar dinheiro público em itens de luxo."
901010800350-60 = "Poderíamos considerar outro motivo?"