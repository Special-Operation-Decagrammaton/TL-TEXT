[translation]
901010800350-6 = "To summarize the contents of the logistics data found at the unloading dock..."
901010800350-7 = "The Carpaccio Family branch's main source of income is...#nAs expected, it's port security operations."
901010800350-8 = "Of course, after deducting labor costs and the tribute paid to the boss, there's hardly anything left."
901010800350-9 = "But what's strange is that for the past few months, they've been increasing their savings while cutting fixed expenses."
901010800350-10 = "Buying crab they have no intention of eating just to lower fixed costs... what on earth is their goal?"
901010800350-11 = "Maybe they're anticipating a major expense? Like a big event to show off their influence."
901010800350-12 = "I can pretty much guess what it is."
901010800350-13 = "I heard it at the shop yesterday, too. The Carpaccio Family only has one thing on their mind."
901010800350-14 = "The reason they're saving up money is—"
901010800350-22 = "The reason they're saving up money is—\n[as2] To collect the tribute to pay the boss.\n[as3] To buy a limited-edition transforming robot.\n[as1] To pay the commission fee for the contract renewal with the port."
901010800350-23 = "Exactly. The Carpaccio Family has a contract renewal with the port coming up."
901010800350-24 = "I don't know the exact amount, but it seems like a significant sum is required for the bid."
901010800350-25 = "And since public bidding is an auction-style process, the cost could end up being higher than expected."
901010800350-27 = "I see, that makes sense why they'd be working so hard to save up."
901010800350-28 = "While the tribute is indeed a substantial amount, it has been factored in as a fixed cost from the start."
901010800350-29 = "Therefore, I don't believe it's related to their recent efforts to save money."
901010800350-30 = "The money the family is saving must have a different purpose."
901010800350-42 = "A transforming robot... is it?"
901010800350-43 = "Are you serious? And besides, does a transforming robot really cost that much?"
901010800350-44 = "Aren't toys only like 10,000 yen at most?"
901010800350-48 = "...You shouldn't underestimate the adult world, FOX3."
901010800350-52 = "The latest limited-edition toys are on a whole different level. Look here."
901010800350-56 = "What is this? It's no different from an academy's annual operating budget!?"
901010800350-57 = "With this kind of money... we could buy several new guns... no, we could replace an entire platoon's equipment."
901010800350-58 = "Of course, I am aware that there are countless expensive luxury items in this world."
901010800350-59 = "However, no matter how much the Carpaccio Family has, I believe there are various restrictions on using public funds for luxury goods."
901010800350-60 = "Could you please consider other reasons?"