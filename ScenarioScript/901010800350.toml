[translation]
901010800350-6 = "Resumindo o conteúdo dos dados logísticos encontrados no cais de descarga..."
901010800350-7 = "A principal fonte de renda da filial da Família Carpaccio era, como esperado, o serviço de segurança do porto."
901010800350-8 = "Claro, depois de pagar salários e a parte do chefe, quase não sobra nada."
901010800350-9 = "Mas o estranho é que, nos últimos meses, eles têm aumentado o dinheiro enquanto reduzem as despesas fixas."
901010800350-10 = "Comprar caranguejo que não vão comer e ao mesmo tempo reduzir custos fixos... qual será o objetivo?"
901010800350-11 = "Deve ter algum gasto grande se aproximando, tipo um grande evento para mostrar a força deles."
901010800350-12 = "Já dá pra imaginar."
901010800350-13 = "Ontém também, um lojista me contou que a Família Carpaccio tem apenas uma preocupação."
901010800350-14 = "O motivo de eles estarem juntando dinheiro é –"
901010800350-22 = "O motivo de eles estarem juntando dinheiro é –\n[as2] Para pagar a parte do chefe.\n[as3] Para comprar um robô transformável edição limitada.\n[as1] Para pagar a taxa da renovação do contrato com o porto."
901010800350-23 = "Isso. A Família Carpaccio está prestes a renovar o contrato com o porto."
901010800350-24 = "Não sei o valor exato, mas a licitação deve exigir uma boa quantia."
901010800350-25 = "Além disso, a licitação é por concorrência, então o custo final pode ser maior que o esperado."
901010800350-27 = "Entendi, faz sentido eles se esforçarem para juntar dinheiro."
901010800350-28 = "De fato, o valor da parte do chefe é considerável, mas já está incluído nas despesas fixas."
901010800350-29 = "Portanto, não tem relação com essa corrida recente para juntar dinheiro."
901010800350-30 = "O dinheiro que a família está juntando deve ter outro propósito."
901010800350-42 = "Robô transformável...?"
901010800350-43 = "Cê tá falando sério? Aliás, precisa de tudo isso pra comprar um robô transformável?"
901010800350-44 = "Brinquedo, por mais caro que seja, não é uns dez mil ienes?"
901010800350-48 = "... Não subestime o mundo dos adultos, FOX3."
901010800350-52 = "Brinquedos limitados hoje em dia são outro nível, olha só."
901010800350-56 = "O quê? Isso é o orçamento anual da escola!"
901010800350-57 = "Com esse dinheiro dava pra comprar várias armas novas... aliás, dava pra renovar todo o equipamento do esquadrão."
901010800350-58 = "Claro, eu sei que existem inúmeros itens de luxo caros nesse mundo."
901010800350-59 = "Mas acho que até a Família Carpaccio tem limitações para gastar dinheiro público com gostos pessoais."
901010800350-60 = "Por favor, considere outras possibilidades."