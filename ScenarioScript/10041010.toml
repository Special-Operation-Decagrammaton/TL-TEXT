[translation]
10041010-1 = "第1話;自身の証明"
10041010-3 = "[log]1週間前[/log]"
10041010-9 = "何故ですか？そもそも、お忘れかもしれませんが――"
10041010-10 = "忘れるも何も、元は私の管轄。戻るだけさ。"
10041010-11 = "君はもしかして――"
10041010-12 = "――「[ruby=ゆりぞの]百合園[/ruby]セイア」にはできない、と。#nそう考えているのかい？"
10041010-16 = "そうではなく……"
10041010-20 = "[ns] \"……ん？\""
10041010-21 = "セイアちゃん、今日はなんかご機嫌斜め？"
10041010-22 = "今頃気づいたのか。君らしいといえばそうだが……。"
10041010-23 = "言い方ちょっとキツくない！？"
10041010-24 = "セイアさん落ち着いてください。#nミカさんも、まずはセイアさんのお話を伺いましょう。"
10041010-25 = "はぁ……これ以上、言の葉を紡ぐ必要があるのかね？"
10041010-26 = "ちゃんとお話しようって決めたばっかだと思うけど？"
10041010-27 = "お二人とも……これではティーパーティー同士で争っていると思われかねません。"
10041010-28 = "そもそも「争い」になるのかね？#n決定権はナギサにしかないだろう？"
10041010-29 = "セイアちゃん！"
10041010-30 = "[ns1] \"な、何事……？\"\n[ns2] 音がする方に向かう。"
10041010-38 = "……？"
10041010-39 = "先生……？"
10041010-44 = "何でここに……？"
10041010-48 = "さっきの聞こえちゃってた……？#nえっと……。"
10041010-49 = "別にケンカしてたわけじゃないよ！ただ……。"
10041010-55 = "はぁ……。"
10041010-56 = "――私がお呼びしたのです。"
10041010-61 = "ナギサが……？"
10041010-62 = "ナギちゃんが？"
10041010-64 = "杞憂であればよかったのですが……念のため。"
10041010-65 = "本来は自分たちで解決すべきことですが。"
10041010-67 = "……あっ！"
10041010-68 = "悩んだり、不安がある時は誰かにちゃんと相談する。"
10041010-69 = "……そう約束したもんね？"
10041010-70 = "なるほど……たしかにそうだね。"
10041010-71 = "しかし……先生を呼び出してまで説き伏せようとはね。"
10041010-72 = "もー、セイアちゃん、そういう言い方良くないと思う！"
10041010-74 = "私は本気です。"
10041010-75 = "これは、セイアさんの身を案じてこそ。"
10041010-76 = "その点、どうかご理解ください……。"
10041010-77 = "そうだよ！ナギちゃんはセイアちゃんが心配で言ってるんだよ。"
10041010-78 = "たしかに普段は、誤解されるようなことばっかするけど……！"
10041010-79 = "ミカさん……。"
10041010-85 = "[ns3] \"詳しい話を聞いてもいいかな？\"\n[ns4] \"お互いにちゃんと理由があるはずだから、話し合おう。\""
10041010-89 = "それは私より、セイアさんのほうが適任かと。"
10041010-90 = "よろしければ、説明をお願いしても？"
10041010-95 = "……意外だね。"
10041010-96 = "私の知っているナギサはそのような振る舞いをしなかったと記憶しているが。"
10041010-98 = "そういう日だってあると思うよ……？"
10041010-99 = "ナギちゃんはセイアちゃんのために言ってるんだし……。"
10041010-103 = "ナギちゃん……。"
10041010-109 = "……失言だった。済まない。"
10041010-110 = "私とて理解はしている。君たちが納得できるような――"
10041010-111 = "いや、君たちを「安心」させられるような根拠が必要なのだと。"
10041010-112 = "もちろん、ナギサの言葉を疑うべくもない。"
10041010-113 = "しかし君たちが私の心配をしてくれるというならば。"
10041010-114 = "その権利は同様に、私にも有って然るべきじゃないのかい？"
10041010-115 = "セイアさん……。"
10041010-116 = "……済まない、先生。内輪のことで時間を取ってしまった。私から経緯を説明しよう。"
10041010-117 = "[s5] \"ありがとう、よろしくね。\"\n[s6] \"何があったの？\""
10041010-120 = "……来たる「ミレニアム[ruby=エキスポ]EXPO[/ruby]」に、誰が「トリニティの代表」として参加するかで話が平行線になっていてね。"
10041010-123 = "ミレニアムEXPOは、ミレニアムサイエンススクールが主催する、大規模な技術披露の場だ。此度の開催にあたっては、生徒間交流を目的に、トリニティも参加することになっている。"
10041010-124 = "そこに……ナギサと私、それぞれ自分が出席すべきだと主張しているのだよ。"
10041010-125 = "……最近のナギサの業務量は常の倍以上となっている。#n疲労も蓄積しているだろう。"
10041010-128 = "ただでさえ綱渡りを続けている現状だ。#n外交に回す余力が今の彼女に残っているとは到底思えない。"
10041010-129 = "そもそも、このような対応は従来であれば私が担っていた。"
10041010-130 = "もちろん今なお、私はティーパーティーとしての資格も不足なく満たしている。"
10041010-131 = "……だが、ナギサは私の療養と安全を優先すべきだと譲らなくてね。"
10041010-132 = "確かに、セイアさんの状態は良くなりました。ですがそれは相対的なものに過ぎません。"
10041010-133 = "寛解はしていますが、完治とは言い切れない。#nこれは私個人の感想ではなく、救護騎士団の見解でもあります。"
10041010-134 = "ましてやセイアさんは頼みの綱――予知能力を失っています。#n不測の事態に備えることも叶いません。"
10041010-138 = "私からすれば、セイアさんは保護対象に他ならないのです。"
10041010-143 = "またその話かい？"
10041010-144 = "そういった面ではミカさんの方が安心と言えます。"
10041010-145 = "ナギちゃんは私のこと何だと思ってるのかなぁ？"
10041010-146 = "ミレニアムサイエンススクール周辺は、比較的治安の良いエリアです。#n犯罪に巻き込まれる可能性も、そう高くはないでしょう。"
10041010-147 = "しかし摩訶不思議な実験が日常的に行われており、#nそれによる事故が他の学園より頭一つ抜けて多いのも事実。"
10041010-148 = "万が一、セイアさんが不慮の事故にでも遭ったら……"
10041010-149 = "ナギサ、君ならば事故に巻き込まれないという保証でもあるのかい？"
10041010-150 = "……私はセイアさんのことを言っているのです。私とは関係ありません。"
10041010-152 = "それはなんか違くない……？"
10041010-156 = "というか、何で私は候補に居ないの？"
10041010-157 = "ミカさんは現状「トリニティの代表」としての立場に、無理がありますので……。"
10041010-161 = "あ……えへへ。そうだった、ごめんね。"
10041010-162 = "もしミカが向かうことになっていたら……#n今度はどんな問題を起こすのかと、気が気じゃなかっただろうね。"
10041010-163 = "……。 "
10041010-164 = "[s7] \"……とりあえず、話し合いができるようになったみたいでよかった。\"\n[s8] \"私はセイアの気持ちを応援してあげたいかな。\""
10041010-170 = "先生、嬉しいお言葉ですが今は……。"
10041010-171 = "……えっ？"
10041010-172 = "セイアさんに賛成、ですか？"
10041010-178 = "……セイアさんに？"
10041010-180 = "先生？"
10041010-181 = "……私に、か？"
10041010-182 = "[s9] \"私もついていくなら大丈夫じゃないかな。\"\n[s10] \"何かあったらすぐに連絡するから。\""
10041010-187 = "あれぇ……。"
10041010-188 = "なんか意外……先生呼ばない方がよかったんじゃないかな、これ？"
10041010-189 = "……彼女が受け入れるか次第ではあるが。"
10041010-194 = "ええと……。"
10041010-195 = "なるほど……先生のお考えはそうなのですね。"
10041010-208 = "ふぅ……。"
10041010-209 = "わかりました。では先生の仰るようにいたしましょう。"
10041010-214 = "……ナギサ？"
10041010-215 = "あっさり認めちゃうんだ！？"
10041010-216 = "本当にいいの……？ナギちゃん。"
10041010-221 = "みなさんの私に対するイメージは一体……？"
10041010-222 = "なにも、セイアさんの外出を禁じたいわけではありません。#n身の安全を第一に考えているだけですので。"
10041010-223 = "正直、先生がセイアさんに同行してくださったとしても、安全が保障されるとは考えにくいです。"
10041010-224 = "ええ、私が心配性というのはよくわかっています。"
10041010-225 = "それに、これまでも幾度となく私たちを助けてくださった先生のことですから。"
10041010-226 = "今回も先生ならなんとかしてくださる、と――"
10041010-227 = "そう――信じております。"
10041010-228 = "[s11] \"ありがとね、ナギサ。\"\n[s12] \"きっと、なんとかなるから。心配しないで。\""
10041010-231 = "はい……どうか、無事に終わりますよう。"
10041010-237 = "……ナギサ。"
10041010-239 = "先生を信じるのだね……私ではなく。"
10041010-243 = "[log]現在[/log]"
10041010-247 = "自身が一番理解しているとも。結局これは――己の問題である、と。"
10041010-248 = "「預言の力を失った百合園セイアに価値はない」"
10041010-249 = "……あの二人がそう思っていないことなど、百も承知だ。"
10041010-250 = "しかし、私も所詮は子供。#n感情を完全に制御できるわけではない。"
10041010-251 = "つまるところ、不完全で脆く……発展途上の存在なのだから。"
10041010-252 = "然ればこそ、ミレニアムEXPOへの参加は固持せざるを得なかった。"
10041010-253 = "やり遂げれば、他の誰でもなく……自分で自分を認められる、そう思ったんだ。"
10041010-254 = "……私の我儘に、先生を付き合わせてしまったね。"
10041010-255 = "[s13] \"そんなことないよ。\"\n[s14] \"必要な過程だよ。決して悪いことじゃない。\""
10041010-258 = "また君は……。"
10041010-259 = "そうか。少し気が楽になったよ。"
10041010-260 = "……ならば。"
10041010-261 = "一つ、お願いを聞いてはもらえないだろうか。"
10041010-262 = "この試練を通して「証明」するために。"
10041010-263 = "……自分の足で立てると、実感するために。"
10041010-264 = "今回のミレニアムEXPOでの活動を……"
10041010-265 = "先生、君が別途――"
10041010-272 = "……到着か。"
10041010-273 = "ひとまず後で……また説明しよう。"
