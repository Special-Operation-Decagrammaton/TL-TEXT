[translation]
21150-1 = "Episódio 15; Ameaça à Espreita"
21150-2 = "Sala de Operações do Millennium"
21150-3 = "Tragam todos os robôs confiscados!"
21150-4 = "Eu pretendia repintá-los e usá-los como robôs de limpeza da escola, mas..."
21150-5 = "Não há tempo para hesitar, nossa prioridade agora é repelir os invasores!"
21150-6 = "Eu alterei a programação de todas as unidades para obedecerem às ordens do Maid Club, Akane!"
21150-7 = "Entendido. Com a ajuda desses robôs, faremos uma nova 'limpeza' no Departamento de Desenvolvimento de Jogos."
21150-9 = "Corredor do Prédio Escolar do Millennium"
21150-10 = "Aaaah!"
21150-11 = "E-ela é absurdamente forte...!"
21150-12 = "Então essa é uma agente da C&C...!"
21150-15 = "Hmm..."
21150-18 = "(Não é nada mal, muito melhor do que eu pensava. Embora eu não possa dizer que a capacidade de combate delas seja incrível...)"
21150-19 = "(Dá para chamar isso de trabalho em equipe? Elas se movem como se fossem uma só pessoa. Nesse aspecto, elas são definitivamente de nível veterano...)"
21150-21 = "O poder das gêmeas, é isso? Nada mal, nada mal mesmo!"
21150-23 = "Droga, pensar que encontraríamos a Asuna-senpai aqui..."
21150-24 = "Irmã, vamos recuar por enquanto!"
21150-25 = "Sim, não temos escolha...!"
21150-28 = "Eu não vou deixar!"
21150-29 = "(BOOM!)"
21150-30 = "Kyaa!?"
21150-31 = "Projéteis de grosso calibre!? Por quê!?"
21150-32 = "Isso é da Karin-senpai... o que significa que, será que é a Utaha-senpai...!?"
21150-34 = "Telhado do 3º Prédio Escolar do Millennium"
21150-35 = "..."
21150-36 = "Por que estou deitada... e de quem é esse traseiro grande...?"
21150-37 = "...Sinto muito por ser grande."
21150-38 = "Deveria ter atingido um ponto bem crítico, mas você acordou mais rápido do que eu esperava."
21150-39 = "...Desculpe, eu não tive como pegar leve."
21150-40 = "Quem diria que você conseguiria me alvejar com precisão mesmo em meio aos ataques da Hibiki. E o fato de você estar assim, bem ao meu lado..."
21150-41 = "Exato. Nesta posição, ela, que se preocupa tanto com a veterana, não vai atirar."
21150-42 = "Ah, isso não estava nos meus cálculos. Como você conseguiu me mirar com tanta precisão no meio daquela fumaça de artilharia?"
21150-43 = "Não existem atiradores na C&C que dependam apenas da visão para capturar o alvo."
21150-44 = "Além disso, é melhor não se afastar. Tentar qualquer coisa só vai te machucar. E meu coração também dói."
21150-45 = "..."
21150-46 = "Poderia se afastar só um pouquinho? Nessa posição, seu traseiro está perto demais, é um pouco constrangedor."
21150-47 = "Por que você não vira de costas então!?"
21150-49 = "Corredor do Prédio Escolar do Millennium"
21150-50 = "Mensagem da Hare-senpai! Ela disse que não conseguiu conter a Karin-senpai e que a Utaha-senpai foi capturada!"
21150-51 = "Dá para ver só de olhar para a situação!"
21150-52 = "Ah, mensagem da Maki também! Parece que a Akane-senpai explodiu o obturador e escapou!"
21150-53 = "E ao mesmo tempo, um número enorme de robôs está vindo na nossa direção...!"
21150-54 = "O quê!?"
21150-57 = "Ahaha, não entendo muito bem o que está acontecendo, mas parece que estamos em vantagem, não é?"
21150-58 = "Será que o plano de vocês já está à beira do fracasso?"
21150-60 = "Ugh...!"
21150-61 = "Fracasso..."
21150-62 = "...Não,"
21150-63 = "Ainda não é um fracasso...!"
21150-65 = "Millennium - Veritas"
21150-66 = "(15 minutos antes do início da operação)"
21150-67 = "Ugh, não importa como eu pense, acabamos ficando presas aqui..."
21150-68 = "Destruir a porta e atrair a atenção de todas deve funcionar como um sucesso inicial."
21150-69 = "Depois, neutralizar a Akane-senpai e a Asuna-senpai, impedir a Karin-senpai e enfrentar os robôs de segurança do conselho estudantil. Se conseguirmos passar por isso, invadir o depósito de itens apreendidos não será difícil, mas..."
21150-70 = "Se falharmos em qualquer um desses pontos..."
21150-71 = "Então, o plano inteiro vai por água abaixo. Enfrentar o Maid Club preparado é impossível para qualquer grupo em Millennium."
21150-72 = "Mesmo que a gente use o nome da Himari-senpai para causar confusão, só ganharíamos um pouco de tempo e, no final, seríamos cercadas de qualquer jeito."
21150-73 = "Dentro de 2 minutos após a invasão, neutralizar a Akane-senpai e, se ela estiver junto, a Asuna-senpai também. 5 minutos depois, impedir a Karin-senpai, 11 minutos depois, passar pelos robôs, 13 minutos depois, garantir o 'Espelho', e depois..."
21150-74 = "...Não importa o quanto a gente tente, em 20 minutos todas seremos capturadas."
21150-75 = "..."
21150-76 = "...Não seria bom se não fossem todas?"
21150-77 = "Hã?"
21150-78 = "Mesmo que algumas de nós sejam derrotadas, existe um jeito de vencer no final..."
21150-79 = "Se, naquele momento..."
21150-80 = "M-Midori, o que você está dizendo?"
21150-81 = "...Precisamos planejar o que fazer caso as coisas não saiam como o planejado."
21150-83 = "Sala de detenção do conselho estudantil de Millennium"
21150-86 = "...Ah."
21150-87 = "Corte de energia, se esse evento aconteceu, então..."
21150-89 = "(Clack)"
21150-90 = "EMP ativado... Mudança de configurações usando a hackeada da Hare-senpai... O mesmo método usado para controlar as portas eletrônicas da torre e as persianas..."
21150-91 = "Entendido."
21150-92 = "Alice, iniciando a fuga."
21150-93 = "A partir daqui, a missão da Alice é..."
21150-94 = "...Primeiro, ir até o depósito de itens apreendidos do conselho estudantil."
21150-100 = "Corredor da escola de Millennium"
21150-101 = "Quanto mais chamarmos atenção, menor será a vigilância sobre a Alice que já foi trancada..."
21150-102 = "Além disso, mesmo que sejamos capturadas agora... se for só uma detenção, podemos assistir ao G.Bible escondidas na sala do clube enquanto criamos o 'Tales Saga Chronicle 2'."
21150-103 = "Hmm, que tipo de conversa é essa?"
21150-104 = "Sinto que o desespero de vocês está diminuindo aos poucos... não me digam que desistiram, né?"
21150-105 = "Nesta situação, acho que desistir seria a atitude mais sensata."
21150-106 = "Ugh, Yuuka!"
21150-107 = "Quanto tempo. Bem, vou elogiar vocês por terem bagunçado tanto a situação até agora. Fiquei realmente surpresa com isso."
21150-108 = "Mas uma coisa é uma coisa, outra coisa é outra coisa..."
21150-109 = "Usar todos esses métodos possíveis para atacar o conselho estudantil é ir longe demais."
21150-110 = "Talvez eu tenha sido boazinha demais ao dar um prazo para vocês."
21150-111 = "Isso não vai terminar apenas como uma travessura. É melhor se prepararem para uma suspensão incondicional de uma semana ou detenção."
21150-113 = "Suspensão!? Detenção!?"
21150-114 = "Não pode ser, uma semana... o Millennium Prize vai acabar!"
21150-115 = "A Alice-chan também está na sala de detenção agora. Fiquei com pena dela estar sozinha, mas ela certamente ficará feliz quando vocês chegarem."
21150-116 = "Ugh...!"
21150-117 = "I-Irmã..."
21150-118 = "Eu achei que não teria problema ser capturada, mas..."
21150-119 = "Desse jeito... mesmo que a gente consiga pegar o 'Espelho', não dá para fazer o jogo só com a Alice e a Yuzu..."
21150-120 = "Temos que dar um jeito de passar por aqui!"
21150-122 = "Passar? Heh, por nós?"
21150-123 = "Ufa, finalmente cheguei... Ficar tão ofegante assim, não me diga que meu peso realmente... não, isso não pode ser..."
21150-125 = "Ué!?"
21150-126 = "Ah, a Akane-senpai e até um robô de combate!"
21150-128 = "Fufu, desta vez parece que é a 'de verdade'."
21150-129 = "Mais uma vez, muito prazer. Momoi-chan, Midori-chan."
21150-130 = "Quanto à Maki-chan e à Kotori-chan, talvez eu consiga tolerar até certo ponto, mas..."
21150-131 = "Para vocês, que se intrometeram até aqui, não há mais espaço para desculpas."
21150-132 = "Além disso..."
21150-133 = "Professor, eu também farei questão de enviar uma carta de protesto ao Schale. Esteja ciente disso."
21150-136 = "Ugh..."
21150-137 = "Aqui, de verdade...? Não quero...!"
21150-138 = "Irmã...!"
21150-139 = "Desculpa, me desculpa, Professor... O Professor nos ajudou tanto, mas por nossa incompetência... por nossa causa...!!"
21150-140 = "[s1] \"Não desistam.\"\n[s2] \"Desculpe. Se eu tivesse mais poder...\""
21150-141 = "Eu queria, mas... não dá mais."
21150-142 = "À frente, a C&C; atrás, o conselho estudantil do Millennium... as duas forças mais poderosas do Millennium."
21150-143 = "Nessa situação, o que podemos fazer...!"
21150-144 = "Professor..."
21150-145 = "Não é culpa do Professor, eu, nós..."
21150-146 = "Mas essa situação, já está..."
21150-148 = "Alvo confirmado."
21150-149 = "(Zzzzz...)"
21150-150 = "Carga mágica, 100%..."
21150-151 = "E-esse som é..."
21150-152 = "Irmã, abaixa!"
21150-154 = "?"
21150-155 = "Hm?"
21150-156 = "...?"
21150-159 = "Ó luz!!"
21150-160 = "(BOOOOM!)"
21150-161 = "Argh!!"
21150-162 = "Ah!"
21150-163 = "A-Asuna-senpai!? Você está bem!?"
21150-164 = "Não estou nada bem! Ahaha, fui atingida em cheio! O que é isso, dói muito, não quero mover nem um milímetro da cabeça aos pés agora!"
21150-165 = "...Parece que você está bem."
21150-166 = "Não pode ser, ela deixou a Asuna-senpai e quase metade dos robôs fora de combate de uma vez...!?"
21150-167 = "C-com apenas um disparo, esse poder de fogo...!"
21150-168 = "Karin, relate a situação! De onde veio aquele canhão de feixe...!?"
21150-169 = "Karin, Karin!? Agora que parei para pensar, o suporte de fogo da Karin parou... desde quando!?"
21150-170 = "(Fwoosh!)"
21150-171 = "Aquela luz é... o telhado!?"
21150-173 = "Telhado do 3º Prédio do Millennium"
21150-174 = "Droga, meus olhos...! Uma granada de luz!?"
21150-175 = "Minha kouhai é uma kouhai gentil que não dispararia um bombardeio contra uma senpai importante... e eu estava certa."
21150-176 = "E, além disso, ela é extremamente inteligente. Inteligente o suficiente para prever essa situação e tomar a decisão precisa."
21150-177 = "Droga, desse jeito o suporte da Akane... como ela chegou a esse ponto...!"
21150-178 = "Como...? Isso é porque ela quer proteger o clube, não é óbvio?"
21150-179 = "...Mesmo eu, que não acompanho os boatos, já ouvi falar."
21150-180 = "Não conheço bem o Clube de Engenharia, mas aquele Clube de Desenvolvimento de Jogos dificilmente pode ser chamado de um clube de verdade."
21150-181 = "Por que ajudar aquelas encrenqueiras egoístas?"
21150-182 = "...Talvez porque elas não sejam apenas egoístas."
21150-183 = "Aquelas crianças estão se esforçando ao máximo pelos amigos."
21150-184 = "Dá para criar jogos mesmo sem ser um clube, não dá?"
21150-185 = "...Isso é como você diz."
21150-186 = "Mas veja bem. É claro que ser apenas "amigos" tem seu significado, mas ainda assim..."
21150-187 = "Ser companheiro de um mesmo clube é algo que une as pessoas fortemente."
21150-188 = "Elas também, por terem o desejo de fazer as coisas juntas naquele clube..."
21150-189 = "É por isso que estão se esforçando tanto, não é?"
21150-190 = "Ah, mas...!"
21150-192 = "(Fiu...)"
21150-194 = "(CABUUUUUM!)"
21150-195 = "Droga!?"
21150-196 = "...Hehe."
21150-199 = "Não foi exatamente como planejado, mas... as coisas ficaram interessantes."
21150-201 = "Corredor do Prédio Escolar - Millennium"
21150-202 = "Momoi, Midori!"
21150-203 = "Agora é a hora!"
21150-204 = "Alice!?"
21150-205 = "Por que você está aqui!?"
21150-206 = "Enquanto eu estava a caminho do depósito de itens apreendidos do Conselho Estudantil, eu fiquei pensando."
21150-207 = "'Final Fantasia', 'Dragon Test', 'Tales of Fate', 'Dragon Knight Tradition', 'Hero Myth', 'Eyes Eternal'... e 'Tales Saga Chronicle'..."
21150-208 = "Em qualquer jogo, os protagonistas..."
21150-209 = "Nunca, em momento algum, desistem de seus companheiros."
21150-210 = "Por isso, a Alice fará o mesmo."
21150-212 = "Devemos superar as provações juntos!"
21150-214 = "Alice..."
21150-215 = "...É, de qualquer forma, se formos pegas agora, tudo acaba."
21150-216 = "Vamos lá, Clube de Desenvolvimento de Jogos!"
21150-217 = "Certo!"
21150-219 = "Droga, isso é ruim...!"
21150-220 = "Ahaha, ficou interessante! Mas meu corpo ainda está tremendo todo e não consigo ficar de pé direito!"
21150-221 = "Asuna-senpai, você está realmente sentindo dor...? Além disso, o fato de o disparo da Karin ter parado significa que, provavelmente, lá também..."
21150-222 = "Droga, elas vão escapar!"
21150-223 = "Não, eu não vou deixar isso acontecer...!"
21150-224 = "Asuna-senpai, por favor, recue o máximo que puder."
21150-226 = "Akane, iniciando combate!"
