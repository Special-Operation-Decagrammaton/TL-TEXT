[translation]#[Texto Final , mas eventualmente pode haver alterações na formatação de texto. - Filipe 29/06.]
21150-1 = "Episódio 15: A Ameaça à Espreita."
21150-2 = "Millennium · Sala de Operações"
21150-3 = "Solta todos os robôs apreendidos!"
21150-4 = "Na verdade eu pensava em repintar eles e usar\ncomo robôs de limpeza da colégio, mas……"
21150-5 = "antes pingar do que secar; agora a prioridade\né repelir os invasores!"
21150-6 = "Reprogramei todas as unidades pra obedecer\nàs ordens do Clube das Maids, Akane!"
21150-7 = "Entendido. Vou usar os robôs também e dar uma nova\n\"faxina\" no Clube de Desenvolvimento de Jogos."
21150-9 = "Millennium · Corredor do Prédio"
21150-10 = "Uaah!"
21150-11 = "F-fora do normal de tão forte……!"
21150-12 = "Então isto é uma agente do C&C……!"
21150-15 = "Hmm……"
21150-18 = "(Bem menos ruins do que eu esperava. Não dá pra\ndizer, nem por gentileza, que têm uma capacidade\nde combate fora de série, mas……)"
21150-19 = "(Trabalho em equipe…… será que é assim que se diz?\nÉ como se fossem duas em uma só. Nesse ponto, sem\ndúvida, é nível de veteranas……)"
21150-21 = "É o tal do poder das gêmeas, né. Tô gostando,\ntô gostando!"
21150-23 = "Kh, justo aqui eu ir esbarrar na Asuna……"
21150-24 = "Mana, vamos recuar por enquanto!"
21150-25 = "Sim, não tem jeito……!"
21150-28 = "Isso eu não vou deixar!"
21150-29 = "(KABÃÃM!)"
21150-30 = "Kyaa!?"
21150-31 = "Munição de grosso calibre!? Por quê!?"
21150-32 = "Isso é da Karin…… quer dizer que, não me diga,\né a Utaha……!?"
21150-34 = "Millennium · Terraço do 3º Prédio"
21150-35 = "……"
21150-36 = "Por que é que eu estou deitada…… e, além disso,\nesse bumbum enorme é de quem, afinal……?"
21150-37 = "……Foi mal aí por ser grande."
21150-38 = "Você levou num ponto bem feio, eu diria……\nmas acordou mais cedo do que eu esperava."
21150-39 = "……Desculpa, não tive margem pra pegar leve."
21150-40 = "Quem diria que, no meio dos ataques da Hibiki,\nvocê ainda conseguiria me acertar com precisão.\nE você ficar bem do meu lado assim……"
21150-41 = "É isso. Nesta posição, aquela sua colega tão zelosa\ncom as veteranas dificilmente vai atirar."
21150-42 = "Haah, isso eu não tinha calculado. No meio de toda\naquela fumaça de pólvora, como você conseguiu\nme mirar com tanta precisão?"
21150-43 = "Atiradora que só captura o alvo pela visão,\nno C&C, não existe."
21150-44 = "Mais importante, eu prefiro que você não se afaste\nmuito. Se aprontar algo, só vai se machucar.\nE eu também fico com o coração apertado."
21150-45 = "……"
21150-46 = "Será que você pode se afastar só um pouquinho?\nNesta posição, o seu bumbum tá perto demais,\ne isso me incomoda um bocado."
21150-47 = "É você que devia virar de costas, ora!?"
21150-49 = "Millennium · Corredor do Prédio"
21150-50 = "Contato da Hare! Ela não conseguiu mais segurar\na Karin, e a Utaha acabou capturada!"
21150-51 = "Dá pra perceber isso só de olhar pra situação!"
21150-52 = "Ah, contato da Maki também! Parece que a Akane\nexplodiu a comporta e escapou!"
21150-53 = "E, ao mesmo tempo, um monte enorme de robôs\nestá vindo pra cá……!"
21150-54 = "Heein!?"
21150-57 = "Ahaha, não tô entendendo nada, mas a impressão\né de que a gente tá em vantagem, né?"
21150-58 = "Será que o plano de vocês já tá à beira\ndo fracasso!"
21150-60 = "Uuh……!"
21150-61 = "Fracasso……"
21150-62 = "……Não,"
21150-63 = "ainda não é fracasso……!"
21150-65 = "Millennium · Veritas"
21150-66 = "(15 minutos antes do início da operação)"
21150-67 = "Uuh, por qualquer ângulo a gente acaba\nempacando bem aqui……"
21150-68 = "Arrombar a porta e atrair a atenção de todo mundo,\naté aí deve dar certo de cara."
21150-69 = "Depois, prender a Akane e a Asuna, e deter a Karin.\nEnfrentar os robôs de segurança do Conselho. Passando\ndaqui, infiltrar no depósito de apreensões não é tão\ndifícil, mas……"
21150-70 = "Se uma só dessas etapas falhar……"
21150-71 = "aí o plano inteiro vai por água abaixo. Encarar o\nClube das Maids de prontidão é impossível pra\nqualquer grupo da Millennium."
21150-72 = "Mesmo que a gente jogue o nome da Himari pra\ncausar confusão, isso só ganha um tempinho; no\nfim, a gente acaba cercada do mesmo jeito."
21150-73 = "Em até 2 minutos da invasão, prender a Akane e,\nse estiver junto, a Asuna também. 5 minutos depois,\ndeter a Karin; 11 minutos depois, furar os robôs;\n13 minutos depois, garantir o \"Espelho\"; e depois……"
21150-74 = "……por mais que a gente se esforce,\nem 20 minutos todas são presas."
21150-75 = "……"
21150-76 = "……Se não forem todas, não tem problema, né?"
21150-77 = "Hã?"
21150-78 = "Um jeito de, mesmo que algumas de nós percam,\nno fim vencer……"
21150-79 = "Se, naquele exato momento……"
21150-80 = "M-Midori, o que você tá dizendo?"
21150-81 = "……Pro caso de não sair conforme o plano,\na gente também tem que planejar."
21150-83 = "Millennium · Sala de Reflexão do Conselho"
21150-86 = "……Ah."
21150-87 = "Corte de energia; esse evento ter acontecido\nquer dizer que……"
21150-89 = "(Tchác)"
21150-90 = "EMP ativado…… alteração de configuração usando\no hacking da Hare……#no mesmo método que usaram pra controlar à vontade\nas portas eletrônicas da Torre e nas comportas……"
21150-91 = "Compreendido."
21150-92 = "Aris vai escapar."
21150-93 = "A partir daqui, a quest da Aris é……"
21150-94 = "……primeiro, seguir até o depósito\nde apreensões do Conselho."
21150-100 = "Millennium · Corredor do Prédio"
21150-101 = "Quanto mais a gente se mexer de forma escandalosa,\nmais a vigilância sobre a Aris, que prenderam,\nvai baixando……"
21150-102 = "E, mesmo que a gente seja pega agora…… se for só\nsuspensão, dá pra ficar na sala do clube fazendo\no \"Tales Saga Chronicle 2\" escondida, olhando a G.Bible."
21150-103 = "Hmm, que conversa é essa, hein~?"
21150-104 = "Tô com a impressão de que aos pouquinhos vocês\nperderam o desespero…… não me diga\nque desistiram?"
21150-105 = "Nesta situação, eu acho que desistir seria\no mais sensato, viu."
21150-106 = "Uh, Yuuka!"
21150-107 = "Quanto tempo. Por ora, vou elogiar vocês por terem\nbagunçado a situação até este ponto. Quanto a isso,\neu fiquei realmente surpresa."
21150-108 = "Mas uma coisa é uma coisa, outra coisa é outra……"
21150-109 = "Invadir o Conselho recorrendo a toda e qualquer\nartimanha dessas é passar dos limites."
21150-110 = "Pelo visto, conceder o prazo e tudo, fui\nbranda demais."
21150-111 = "Isso já não passa mais por travessura. É melhor\nse prepararem pra, no mínimo, uma semana de\nsuspensão incondicional, ou detenção."
21150-113 = "Suspensão!? Detenção!?"
21150-114 = "Não pode, uma semana…… o Prêmio Millennium\nvai acabar!"
21150-115 = "A Aris também já está na sala de reflexão. Era\ntriste ela ficar sozinha, mas, se vocês forem,\ncom certeza ela vai ficar feliz."
21150-116 = "Uuh……!"
21150-117 = "M-mana……"
21150-118 = "Eu achei que tava tudo bem ser pega, mas……"
21150-119 = "Do jeito que tá…… mesmo que a gente consiga roubar\no \"Espelho\", só com a Aris e a Yuzu não dá\npra fazer o jogo……"
21150-120 = "A gente precisa romper de algum jeito!"
21150-122 = "Romper? Ora, logo a nós?"
21150-123 = "Ufa, até que enfim cheguei…… Ficar tão sem fôlego\nassim, não me diga que o meu peso, de verdade……\nnão, não pode ser……"
21150-125 = "Eca!?"
21150-126 = "A-a Akane, e ainda com robôs de combate!"
21150-128 = "Fufu, desta vez parecem ser as \"de verdade\"."
21150-129 = "Reforçando, muito prazer. Momoi, Midori."
21150-130 = "Quanto à Maki e à Kotori, talvez dê pra perdoar,\nno limite……"
21150-131 = "mas vocês, que se enfiaram até aqui dentro,\njá não têm a menor margem pra desculpas."
21150-132 = "E, além disso……"
21150-133 = "ao Sensei também, eu vou enviar ao menos uma\ncarta de protesto à Schale. Fiquem cientes, viu."
21150-136 = "Uuh……"
21150-137 = "Aqui, de verdade……? Não quero……!"
21150-138 = "Mana……!"
21150-139 = "Desculpa, me desculpa, Sensei…… o Sensei nos\najudou em tanta coisa, e, por falta de força nossa……\npor nossa culpa……!!"
21150-140 = "[s1] \"Não desista.\"\n[s2] \"Desculpe. Se eu também tivesse mais força……\""
21150-141 = "Eu queria, mas…… já não dá mais."
21150-142 = "Na frente, o C&C; atrás, o Conselho da Millennium……\nas duas maiores forças, do mais alto nível da Millennium."
21150-143 = "Numa situação dessas, o que é que a gente\npode fazer……!"
21150-144 = "Sensei……"
21150-145 = "A culpa não é do Sensei; sou eu, somos nós……"
21150-146 = "Mas, esta situação, já não tem mais……"
21150-148 = "Alvo confirmado."
21150-149 = "(Vííín……)"
21150-150 = "Carga de mana, 100%……"
21150-151 = "E-esse som é……"
21150-152 = "Mana, abaixa!"
21150-154 = "?"
21150-155 = "Hm?"
21150-156 = "……?"
21150-159 = "Surja, ó luz!!"
21150-160 = "(KABÃÃÃM!)"
21150-161 = "Kh!!"
21150-162 = "Kyaa!"
21150-163 = "A-a Asuna!? Você tá bem!?"
21150-164 = "Não tô nada bem~! Ahaha, acertou em cheio! Que\ncoisa, dói pra caramba, do topo da cabeça à ponta\ndo pé eu não quero mover nem 1 milímetro agora!"
21150-165 = "……Parece que ela tá bem."
21150-166 = "Não pode ser, neutralizar de uma vez a Asuna e\nquase metade dos robôs……!?"
21150-167 = "C-com um único tiro, esse poder de fogo……!"
21150-168 = "Karin, reporte a situação! De onde veio esse\ncanhão de feixe agora……!?"
21150-169 = "Karin, Karin!? Aliás, o apoio de fogo da Karin\nparou…… desde quando!?"
21150-170 = "(Fooon——!)"
21150-171 = "Aquela luz é…… do terraço!?"
21150-173 = "Millennium · Terraço do 3º Prédio"
21150-174 = "Kh, meus olhos……! Uma granada de luz!?"
21150-175 = "A minha colega é uma garota gentil, que não joga\nbombardeio em cima de uma veterana querida……\nsim, é exatamente isso."
21150-176 = "E, ainda por cima, é extremamente esperta. Esperta\no bastante pra prever esta situação e, nela, fazer\na escolha certa."
21150-177 = "Kh, assim o apoio da Akane vai…… por que chegar\na esse ponto……!"
21150-178 = "Por quê……? Ora, é claro que é porque elas\nquerem proteger o clube delas."
21150-179 = "……Mesmo eu, que sou meio por fora das fofocas,\njá ouvi falar."
21150-180 = "O Clube de Engenharia eu não conheço bem, mas\naquele Clube de Desenvolvimento de Jogos dificilmente\nse pode chamar de atividade de clube de verdade."
21150-181 = "Aquelas problemáticas tão egoístas, por que ajudá-las?"
21150-182 = "……Porque não é simples egoísmo, talvez."
21150-183 = "Aquelas garotas, pelas amigas, estão se\nesforçando de corpo e alma."
21150-184 = "Mesmo sem ser num clube, dá pra fazer jogo, não dá?"
21150-185 = "……Nisso você tem razão."
21150-186 = "Mas, sabe. Claro que ser só \"amigas\" também tem\no seu valor; ainda assim……"
21150-187 = "ser colegas do mesmo clube é algo que une as\npessoas com muito mais força."
21150-188 = "Aquelas garotas também têm a vontade de fazer as\ncoisas juntas, naquele clube; é por isso……"
21150-189 = "que elas se esforçam de forma tão desesperada."
21150-190 = "Kh, mas……!"
21150-192 = "(Sssh……)"
21150-194 = "(KABÃÃÃÃM!)"
21150-195 = "Essa não!?"
21150-196 = "……Fufu."
21150-199 = "Não exatamente conforme o cálculo, mas……\na coisa começou a ficar interessante."
21150-201 = "Millennium · Corredor do Prédio"
21150-202 = "Momoi, Midori!"
21150-203 = "Agora!"
21150-204 = "Aris!?"
21150-205 = "Por que você tá aqui!?"
21150-206 = "No caminho até o depósito de apreensões do Conselho,\neu fiquei pensando."
21150-207 = "\"Final Fantasia\", \"Dragon Test\", \"Tales of Fate\",\n\"Tradição dos Cavaleiros-Dragão\", \"Mito dos Heróis\",\n\"Eyes Eternal\"…… e o \"Tales Saga Chronicle\"……"
21150-208 = "Em qualquer um desses jogos, os protagonistas……"
21150-209 = "jamais desistiram dos seus companheiros."
21150-210 = "Por isso, a Aris faz o mesmo."
21150-212 = "As provações, a gente tem que superar juntas!"
21150-214 = "Aris……"
21150-215 = "……Sim, de qualquer forma, se a gente for pega\nassim, acaba tudo."
21150-216 = "Bora, Clube de Desenvolvimento de Jogos!"
21150-217 = "Sim!"
21150-219 = "Kh, isso tá ruim……!"
21150-220 = "Ahaha, começou a ficar divertido! Mas o meu corpo\nainda tá tremendo todo, não consigo nem ficar de pé!"
21150-221 = "Asuna, você tá realmente sentindo dor……? Mais\nimportante: o tiro da Karin ter parado quer dizer\nque, lá também, do mesmo jeito……"
21150-222 = "Kh, elas vão fugir!"
21150-223 = "Não, isso eu não vou deixar……!"
21150-224 = "Asuna, recue o máximo que conseguir."
21150-226 = "Akane, vou iniciar o combate!"