[translation]
21150-1 = "Episódio 15; Crise Iminente"
21150-2 = "Millennium - Sala de Operações"
21150-3 = "Liberem todos os robôs confiscados!"
21150-4 = "Originalmente eu estava pensando em pintá-los de novo para usar como robôs de limpeza da escola, mas..."
21150-5 = "Situações extremas exigem medidas extremas. Agora o mais importante é repelir as invasoras!"
21150-6 = "Alterei a programação de todos eles para obedecerem às ordens do Clube das Maids, Akane!"
21150-7 = "Entendido. Usarei os robôs também, e 'limparei' o Departamento de Desenvolvimento de Jogos."
21150-9 = "Millennium - Corredor"
21150-10 = "Uwaah!"
21150-11 = "Ela, ela é absurdamente forte...!"
21150-12 = "Então, essa é uma agente da C&C...!"
21150-15 = "Hmmm..."
21150-18 = "(Elas são muito melhores do que eu imaginava. Mesmo por educação eu não diria que a capacidade de combate delas é incrível, mas...)"
21150-19 = "(Trabalho em equipe... Será que posso chamar assim? Elas se movem como se as duas fossem uma só. Nesse ponto, sem dúvida, elas têm o nível de veteranas...)"
21150-21 = "Esse deve ser o poder das gêmeas. Mas que legal, que legalll!"
21150-23 = "Ugh, eu nunca imaginei que nós daríamos de cara com a Asuna-senpai aqui..."
21150-24 = "Mana, vamos recuar por enquanto!"
21150-25 = "Sim, a gente não tem escolha...!"
21150-28 = "Não vou deixar não!"
21150-29 = "(BOOOOOOOMMMM!)"
21150-30 = "Kyaah!?"
21150-31 = "Balas de grosso calibre!? Por quê!?"
21150-32 = "Isso é da Karin-senpai... não me diga que, a Utaha-senpai...!?"
21150-34 = "Millennium - Telhado do 3º Prédio Escolar"
21150-35 = "......"
21150-36 = "Por que eu estou deitada... E, aliás, de quem é essa bunda gigante...?"
21150-37 = "......Desculpe se ela é grande."
21150-38 = "Eu tinha certeza de que acertei em um ponto crítico... Mas você acordou mais rápido do que eu esperava."
21150-39 = "......Desculpe, eu não tinha margem para pegar leve."
21150-40 = "Eu nunca imaginaria que, mesmo no meio dos ataques da Hibiki, você ainda seria capaz de mirar em mim com precisão. E, o fato de você estar bem aqui do meu lado..."
21150-41 = "Isso mesmo. Desse jeito, é impossível que uma garota tão apegada a senpais como ela atire."
21150-42 = "Haa, isso foi um erro de cálculo. No meio daquela fumaça dos canhões, como você conseguiu mirar em mim com tanta precisão?"
21150-43 = "Na C&C não existem snipers que dependem apenas da visão para rastrear inimigos."
21150-44 = "Mas, mudando de assunto, eu gostaria que você não se afastasse muito. Se tentar fazer alguma gracinha agora, só vai machucar mais o seu corpo. E o meu coração vai doer também."
21150-45 = "......"
21150-46 = "Você poderia se afastar um pouquinho, só um pouquinho. É que assim a sua bunda tá perto demais, e isso tá me deixando meio constrangida."
21150-47 = "É só você virar de costas!?"
21150-49 = "Millennium - Corredor"
21150-50 = "Mensagem da Hare-senpai! Ela disse que não deu pra segurar a Karin-senpai, e a Utaha-senpai foi capturada!"
21150-51 = "Só de olhar a nossa situação já dá pra perceber!"
21150-52 = "Ah, mensagem da Maki também! Parece que a Akane-senpai explodiu a persiana e conseguiu escapar!"
21150-53 = "E parece que uma quantidade enorme de robôs tá vindo na nossa direção ao mesmo tempo...!"
21150-54 = "Eeeh!?"
21150-57 = "Ahaha, eu não entendi direito o que tá acontecendo, mas acho que nós estamos com a vantagem agora, né?"
21150-58 = "Será que o plano de vocês já não tá por um fio!"
21150-60 = "Uuuh...!"
21150-61 = "O plano..."
21150-62 = "......Não,"
21150-63 = "Ainda, não falhou...!"
21150-65 = "Millennium - Veritas"
21150-66 = "(15 minutos antes do início da operação)"
21150-67 = "Uuuh, por mais que eu tente pensar, o plano acaba dando ruim nessa parte..."
21150-68 = "Nós devemos conseguir ir bem até a parte onde destruímos a porta para chamar a atenção de todos."
21150-69 = "Depois disso, nós isolamos a Akane-senpai e a Asuna-senpai, e paramos a Karin-senpai. Então enfrentamos os robôs de segurança do Conselho Estudantil. Se passarmos por tudo isso, invadir o Depósito de Itens Confiscados não deve ser difícil, mas..."
21150-70 = "Se nós falharmos em sequer um desses passos..."
21150-71 = "Aí o plano inteiro vai por água abaixo. Enfrentar o Clube das Maids quando elas estão totalmente preparadas é impossível para qualquer grupo da Millennium."
21150-72 = "Mesmo se nós usarmos o nome da Himari-senpai pra causar confusão, isso só vai nos dar um pouco mais de tempo, no fim nós ainda seremos cercadas do mesmo jeito."
21150-73 = "Dentro de 2 minutos após a invasão, nós prendemos a Akane-senpai e, se a Asuna-senpai estiver junto, trancamos as duas de uma vez. Depois de 5 minutos paramos a Karin-senpai, depois de 11 minutos rompemos o cerco dos robôs, depois de 13 minutos garantimos o 'Espelho', e depois..."
21150-74 = "......Mesmo se nós dermos o nosso melhor, em 20 minutos todo mundo vai ser capturada."
21150-75 = "......"
21150-76 = "......Se não for todo mundo, tudo bem, né?"
21150-77 = "Eh?"
21150-78 = "A forma de conseguirmos vencer no fim das contas, mesmo se algumas de nós acabarem sendo derrotadas..."
21150-79 = "Se nós, naquele exato momento..."
21150-80 = "M, Midori, do que você tá falando?"
21150-81 = "......Nós também precisamos planejar o que fazer caso as coisas não saiam de acordo com o plano."
21150-83 = "Millennium - Sala de Reflexão do Conselho Estudantil"
21150-86 = "......Ah."
21150-87 = "Se o evento de corte de energia ocorreu, isso significa..."
21150-89 = "(Gashan)"
21150-90 = "Ativação de EMP... Alteração das configurações usando o hacking da Hare-senpai... #n O mesmo método de usar as persianas, que nos permite controlar as portas eletrônicas da torre livremente..."
21150-91 = "Situação compreendida."
21150-92 = "Aris, iniciando evasão."
21150-93 = "A partir de agora, a missão da Aris é..."
21150-94 = "......Primeiro, ir em direção ao Depósito de Itens Confiscados do Conselho Estudantil."
21150-100 = "Millennium - Corredor"
21150-101 = "Quanto mais chamarmos a atenção, menos eles focarão na Aris, que acabou de ser presa..."
21150-102 = "E além disso, mesmo se nós formos pegas agora... Se ganharmos só uma suspensão, poderemos ficar criando o 'Tales Saga Chronicle 2' lendo a G.Bible na sala do clube em segredo."
21150-103 = "Hmmm, do que será que elas tão conversando~?"
21150-104 = "Sinto que o desespero delas tá diminuindo um pouquinho... Mas espero que vocês não tenham desistido, não é?"
21150-105 = "Considerando a situação, eu diria que desistir seria a escolha mais sábia, porém."
21150-106 = "Ugh, Yuuka!"
21150-107 = "Há quanto tempo. Em primeiro lugar, vou elogiá-las por terem conseguido bagunçar tanto a situação. Em relação a isso, fiquei realmente impressionada."
21150-108 = "Mas uma coisa é uma coisa, outra coisa é outra coisa..."
21150-109 = "Usar todos os tipos de métodos possíveis e imagináveis para atacar o Conselho Estudantil, vocês passaram dos limites."
21150-110 = "Eu já tinha lhes dado um período de carência e tudo mais, será que fui um pouco gentil demais com vocês?"
21150-111 = "Isso já não pode mais ser considerado só uma travessura. É melhor se prepararem para, no mínimo, uma semana incondicional de suspensão escolar ou detenção."
21150-113 = "Suspensão!? Detenção!?"
21150-114 = "Não pode ser, em uma semana... o Millennium Prize já vai ter acabado!"
21150-115 = "A Aris-chan também está lá na Sala de Reflexão no momento. Eu estava com pena de deixá-la lá sozinha, mas se vocês também forem para lá, ela com certeza ficará muito feliz."
21150-116 = "Uuuh...!"
21150-117 = "M, mana..."
21150-118 = "Eu tinha pensado que tudo bem se nós fossemos presas, mas..."
21150-119 = "Se for assim... mesmo que nós consigamos o 'Espelho', a Aris e a Yuzu sozinhas não vão conseguir criar o jogo..."
21150-120 = "Temos que dar um jeito de forçar a passagem!"
21150-122 = "Forçar a passagem? Oh, por *nós*?"
21150-123 = "Phew, finalmente cheguei... Ficar tão sem fôlego assim, será que eu realmente ganhei peso... Não, isso é impossível..."
21150-125 = "Ueeeh!?"
21150-126 = "A Akane-senpai e... até robôs de combate!"
21150-128 = "Fufu, parece que desta vez vocês são as 'verdadeiras'."
21150-129 = "Gostaria de dizer muito prazer, novamente. Momoi-chan, Midori-chan."
21150-130 = "O que a Maki-chan e a Kotori-chan fizeram até pode ser tolerável em certo grau, mas..."
21150-131 = "Terem invadido o sistema e chegado tão longe, agora não há mais espaço para desculpas."
21150-132 = "E além disso..."
21150-133 = "Mesmo que você seja o Sensei, irei lhe enviar pelo menos uma carta de protesto pela Schale. Então, esteja ciente disso."
21150-136 = "Uuuh..."
21150-137 = "Isso é sério...? Não quero isso...!"
21150-138 = "Mana...!"
21150-139 = "Desculpa, me desculpa Sensei... O senhor ajudou tanto a gente, mas como nós somos muito fracas... a culpa é toda nossa...!!"
21150-140 = "[s1] \"Não desistam.\"\n[s2] \"Me desculpem. Se eu tivesse um pouco mais de força...\""
21150-141 = "Eu queria fazer isso, mas... não dá mais."
21150-142 = "A C&C na frente, o Conselho Estudantil da Millennium atrás... Enfrentando as duas forças mais poderosas de alto nível da Millennium."
21150-143 = "Em uma situação dessas, o que mais nós poderíamos fazer...!"
21150-144 = "Sensei..."
21150-145 = "A culpa não é sua, Sensei, fui eu, nós que..."
21150-146 = "Mas, agora, não há nada que possa ser feito com essa situação..."
21150-148 = "Alvos confirmados."
21150-149 = "(Whirrr...)"
21150-150 = "Carga de Poder Mágico, 100%..."
21150-151 = "Q-Que som é esse..."
21150-152 = "Mana, abaixa!"
21150-154 = "?"
21150-155 = "Hm?"
21150-156 = "......?"
21150-159 = "Luz!!"
21150-160 = "(BOOOOOOMMMM!)"
21150-161 = "Ugh!!"
21150-162 = "Kyaah!"
21150-163 = "A-Asuna-senpai!? Você tá bem!?"
21150-164 = "Não tô nada bem~! Ahaha, me pegou em cheião! O que é isso, dói pra caramba! Não quero me mover nem 1 milímetro da ponta do pé ao topo da cabeça!"
21150-165 = "......Parece que ela está bem."
21150-166 = "Impossível, a Asuna-senpai e quase metade dos robôs foram incapacitados de uma só vez...!?"
21150-167 = "C-Com apenas um tiro, todo esse poder de fogo...!"
21150-168 = "Karin, informe a situação! De onde veio esse canhão de feixe...!?"
21150-169 = "Karin, Karin!? Falando nisso, quando o suporte de fogo da Karin parou... desde quando!?"
21150-170 = "(Whoosh——!)"
21150-171 = "Aquela luz... Do telhado!?"
21150-173 = "Millennium - Telhado do 3º Prédio Escolar"
21150-174 = "Ugh, meus olhos...! Uma granada de luz!?"
21150-175 = "A minha kouhai é uma kouhai gentil que jamais usaria um bombardeio na sua preciosa senpai... Essa era a intenção dela, com certeza."
21150-176 = "Apesar disso, ela é incrivelmente esperta. Esperta o suficiente para prever essa situação e fazer a escolha correta naquele momento."
21150-177 = "Ugh, se for assim, o suporte da Akane não vai... Por que chegaram a esse ponto...!"
21150-178 = "Por quê...? A resposta é óbvia, não é? Porque nós queremos proteger o nosso clube."
21150-179 = "......Até mesmo eu, que sou alheia a fofocas, já ouvi falar."
21150-180 = "Eu não sei muito sobre o Clube de Engenharia, mas o Departamento de Desenvolvimento de Jogos dificilmente pode ser chamado de um clube de verdade."
21150-181 = "Por que vocês estão ajudando um bando de crianças problemáticas e egoístas assim?"
21150-182 = "......É porque elas não são apenas egoístas, talvez."
21150-183 = "Aquelas garotas estão dando o seu melhor, se esforçando ao máximo por suas amigas."
21150-184 = "Mas elas conseguiriam criar jogos mesmo que não fosse dentro de um clube."
21150-185 = "......Você tem razão nisso."
21150-186 = "Mas veja bem, embora apenas a palavra 'amigas' tenha um significado profundo por si só, ainda assim..."
21150-187 = "A sensação de serem companheiras do mesmo clube é algo que fortalece muito o vínculo entre elas."
21150-188 = "Porque aquelas garotas também possuem o sentimento de que querem fazer aquilo juntas, lá naquele clube..."
21150-189 = "Acho que é por isso que elas estão se esforçando tanto e dando tudo de si."
21150-190 = "Ugh, mas mesmo assim...!"
21150-192 = "(Ziuuu...)"
21150-194 = "(BOOOOOOOMMMM!)"
21150-195 = "Fui descuidada!?"
21150-196 = "......Fufu."
21150-199 = "Isso não estava nos cálculos, mas... as coisas começaram a ficar interessantes."
21150-201 = "Millennium - Corredor"
21150-202 = "Momoi, Midori!"
21150-203 = "É agora!"
21150-204 = "Aris-chan!?"
21150-205 = "Por que você está aqui!?"
21150-206 = "Enquanto eu ia em direção ao Depósito de Itens Confiscados, eu pensei."
21150-207 = "'Final Fantasia', 'Dragon Test', 'Tales of Fate', 'Dragoon Tradition', 'Hero Myth', 'Eyes Eternal'... E o 'Tales Saga Chronicle'..."
21150-208 = "Em todos esses jogos, os protagonistas..."
21150-209 = "Jamais desistiram dos seus companheiros."
21150-210 = "Por isso, a Aris também não irá."
21150-212 = "As provações, devem ser superadas juntas!"
21150-214 = "Aris-chan..."
21150-215 = "......Sim, se nós formos presas do jeito que estamos, é o fim de tudo."
21150-216 = "Vamos lá, Departamento de Desenvolvimento de Jogos!"
21150-217 = "Sim!"
21150-219 = "Ugh, isso não é nada bom...!"
21150-220 = "Ahaha, isso começou a ficar divertido! Mas o meu corpo continua se contorcendo e eu não consigo ficar de pé direito!"
21150-221 = "Asuna-senpai, você está sentindo dor de verdade...? Mais importante que isso, se os tiros da Karin pararam, isso quer dizer que no telhado..."
21150-222 = "G-Gente, a gente consegue fugir!"
21150-223 = "Não, nós não vamos permitir...!"
21150-224 = "Asuna-senpai, por favor, afaste-se o máximo que conseguir."
21150-226 = "Akane, entrando em combate!"