[translation]
84308100100-6 = "As duas chegaram na hora. Vamos direto ao ponto."
84308100100-11 = "Sério, todo santo dia, sem nem se cansar... quer dizer, vai ser assim a semana inteira?"
84308100100-12 = "Infelizmente, parece que sim."
84308100100-13 = "Mas, não acho que isso seja algo ruim."
84308100100-14 = "Heh... seu olhar mudou um pouco."
84308100100-15 = "Parece que você se acostumou a agir sozinha, não é?"
84308100100-19 = "Eu não diria que é impossível."
84308100100-20 = "Haha! Gostei! Adorei isso!"
84308100100-21 = "E então? O que vamos fazer hoje? Por mim, tudo bem se eu me separar da Seia."
84308100100-23 = "Nem pense nisso."
84308100100-25 = "Direta, hein."
84308100100-26 = "Direta mesmo."
84308100100-28 = "Primeiro, a premissa está errada. Se fosse um caso que pudesse ser resolvido individualmente, eu teria chamado vocês separadamente."
84308100100-29 = "Eu convoquei as duas ao mesmo tempo porque é mais racional lidar com isso em grupo."
84308100100-31 = "……Foi o que ela disse."
84308100100-32 = "Foi o que ela disse, sim."
84308100100-37 = "……Eu disse algo errado?"
84308100100-38 = "Foi só uma brincadeira. Não leve a mal."
84308100100-39 = "Então... que tipo de caso é esse, afinal?"
84308100100-40 = "Identificamos um invasor no estande do Departamento de Desenvolvimento de Jogos."
84308100100-41 = "Quero que vocês capturem o invasor e interroguem sobre o objetivo dele."
84308100100-43 = "Será que são remanescentes daquela época?"
84308100100-44 = "Não devemos descartar essa possibilidade. Talvez possamos encontrar alguma pista."
84308100100-45 = "A rota de invasão é desconhecida. Parece que eles já estavam infiltrados há algum tempo."
84308100100-46 = "Devido ao reforço na segurança, infiltrar-se no local está mais difícil do que antes. A cooperação de vocês é indispensável."
84308100100-47 = "Segurança reforçada...?"
84308100100-48 = "Será que..."
84308100100-49 = "Isso não é culpa nossa, é?"
84308100100-50 = "……Peguem isto."
84308100100-54 = "Ei."
84308100100-55 = "Vocês podem se comunicar usando este rádio."
84308100100-57 = "Então você quer mudar de assunto."
84308100100-58 = "Não temos tempo. O invasor já está no estande do Departamento de Desenvolvimento de Jogos."
84308100100-59 = "Investiguem a situação sem serem notadas, se possível. Se necessário, o combate está autorizado."
84308100100-60 = "……Entendido."
84308100100-61 = "Vamos, Neru. Primeiro, o trabalho."
