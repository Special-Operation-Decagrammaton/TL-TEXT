[translation]
84308100100-6 = "二人とも、時間通りね。早速本題に入るわ。"
84308100100-11 = "ほんと毎日毎日、飽きもせず……ってか一週間ずっとこの調子なのか？"
84308100100-12 = "残念ながら、そうなるだろうね。"
84308100100-13 = "だが、それも悪くないように思う。"
84308100100-14 = "へぇ……ちょっと目つきが変わったな。"
84308100100-15 = "単独行動にも慣れてきたんじゃねぇか？"
84308100100-19 = "無理とまでは言うまいよ。"
84308100100-20 = "ははっ！いいねぇ！気に入った！"
84308100100-21 = "で？今日はどうすんだ？セイアと別行動でも、あたしは構わねぇけど。"
84308100100-23 = "ダメよ。"
84308100100-25 = "きっぱりかよ。"
84308100100-26 = "きっぱりだね。"
84308100100-28 = "まず、前提が間違っている。単独で対応可能な事案なら、個別に呼び出しているわ。"
84308100100-29 = "同時に招集をかけているのは、複数人での対応が合理的だからよ。"
84308100100-31 = "……だそうだ。"
84308100100-32 = "だそうだね。"
84308100100-37 = "……何か間違ったことでも言ったかしら。"
84308100100-38 = "ただの冗談だ。気にしないでくれ。"
84308100100-39 = "それで……一体どんな事案なのかな？"
84308100100-40 = "ゲーム開発部の展示ブースに侵入者を確認したわ。"
84308100100-41 = "侵入者を確保した後、その目的を問い質して欲しいの。"
84308100100-43 = "あの時の残党でもいんのか？"
84308100100-44 = "その可能性を排除するべきではないわ。何か手掛かりを見つけられるかもしれない。"
84308100100-45 = "侵入経路は不明。どうやら、かなり前から潜り込んでいたようね。"
84308100100-46 = "セキュリティが強化されたせいで、会場への潜入はこれまでよりも難しくなっているわ。二人の協力が必要不可欠よ。"
84308100100-47 = "セキュリティが強化……？"
84308100100-48 = "もしかして……"
84308100100-49 = "それ、あたしらのせいじゃねえよな？"
84308100100-50 = "……これを受け取って。"
84308100100-54 = "おい。"
84308100100-55 = "この無線機で互いに連絡が取れるわ。"
84308100100-57 = "話を逸らす必要があるのだね。"
84308100100-58 = "時間がないの。侵入者はすでにゲーム開発部のブースにいる。"
84308100100-59 = "なるべく気取られずに状況を調べてちょうだい。場合によっては戦闘も認めるわ。"
84308100100-60 = "……承知した。"
84308100100-61 = "行こうかネル、まずは仕事だ。"
