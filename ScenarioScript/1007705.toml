[translation]
1007705-1 = "約束してくれませんか"
1007705-2 = "（夕方、飲み物を買おうとコンビニに向かっていると）"
1007705-6 = "（公園の片隅でダンボールに囲まれているイチカと遭遇した）"
1007705-7 = "……ん？"
1007705-8 = "先生！先生じゃないっすか、こんな時間にどうしたんすか？"
1007705-9 = "……飲み物を買いに？"
1007705-10 = "ああ、仕事の休憩ってことは、まだ終わってないっていう……"
1007705-11 = "今日もなかなか大変っすね。"
1007705-12 = "今はちょっと難しいっすけど、後で何か手伝えることがあれば連絡してください！"
1007705-13 = "……ん、私っすか？"
1007705-14 = "見ての通り、宅配の営業所に持っていく荷物をまとめてるとこっす。"
1007705-15 = "[s1] \"こ、この量のダンボールを全部……？\"\n[s2] \"すごい量だね、引っ越しかと思ったよ。\""
1007705-18 = "はは、何回か聞かれたっす。"
1007705-19 = "いろんなものに手を出しがちなんで、物が多いんすよ。"
1007705-20 = "……1つのことにはあんまり夢中になれなくて。"
1007705-21 = "生まれつきなんすかね……#nす～ぐやる気がなくなっちゃうんす。"
1007705-22 = "ま、でも！"
1007705-23 = "その分どれもきれいな状態なんで、引き取り手がすぐ見つかるのはいいっすね！"
1007705-27 = "これ見てくださいよ。フリマアプリの私の評価……"
1007705-28 = "[s3] \"えっ、プラチナランク！？\"\n[s4] \"初めて見たよ……！\""
1007705-31 = "トリニティだけじゃなくて、ミレニアムや百鬼夜行の人とも取引してるんで。"
1007705-32 = "こういうの意外と楽しいし、安く譲って相手が喜ぶのを見るのも好きなんすよね。"
1007705-33 = "このアプリがなかったら、ほとんどの物を捨ててたかもしれないっすね。#n本当にアプリ様々っす。"
1007705-34 = "……ん？"
1007705-35 = "ギターっすか？"
1007705-36 = "あ～いや。"
1007705-37 = "あれは売ってないっすよ。"
1007705-38 = "先生に褒めてもらったんで。"
1007705-39 = "ま、でも分かんないっすけどね！#nもし誰か欲しいって人がいたら、明日にでも譲っちゃうかもしれないっす、はは。"
1007705-43 = "……ちょっと正直過ぎるっすかね？"
1007705-44 = "[s5] \"ううん、正直なのはいいことだよ。\"\n[s6] \"イチカが気を遣う必要はないよ。\""
1007705-47 = "……またまた～"
1007705-48 = "口がうまいっすね、先生。"
1007705-49 = "そうやってすぐ褒めてくれるんすから。"
1007705-50 = "…………。"
1007705-51 = "たぶん、他の生徒にも同じなんでしょうけど。"
1007705-52 = "励ましたり、そっと裏でフォローしたり……#n生徒のために時間を使って。"
1007705-53 = "何かお礼をしようとしても、「先生だから」と言ってかわすんすよね。"
1007705-54 = "ん～……"
1007705-55 = "んん～～！"
1007705-56 = "[s7] \"……えっと、イチカ？\"\n[s8] \"そんな顔してどうしたの……？\""
1007705-59 = "やっぱ、このままじゃダメっす。"
1007705-60 = "こうして先生のペースに飲まれてたら、いつまで経っても変わらないっすから。"
1007705-61 = "先生にお返しをしないと、私が落ち着かないっす。"
1007705-62 = "……ひとつ、約束してくれませんか？"
1007705-63 = "まあ、そんなに大げさなものじゃないっすよ。"
1007705-64 = "逆に先生の負担になると思うし……"
1007705-65 = "そうっすね……#nもし「ちょっとした面倒事」が起きたら、すぐに連絡してください。"
1007705-66 = "この前みたいな生徒同士の揉め事とか、買い物に悩んだときとか……"
1007705-67 = "私、結構自信あるんすよ……そういうの。"
1007705-68 = "これくらいなら、負担にならないっすよね？#nんじゃ、約束っすから。"
1007705-69 = "[s9] \"まだ返事してないけど！？\"\n[s10] \"ありがとう、頼らせてもらうね。\""
1007705-72 = "……へへっ。"
1007705-73 = "それじゃ、いつでも連絡待ってるんで！"
1007705-75 = "（営業所に向かうイチカを見送ってから、コンビニに向かった）"
1007705-76 = "（コンビニの帰りに公園を覗いたところ、すべて綺麗に片付いていた）"
