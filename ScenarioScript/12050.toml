[translation]
12050-1 = "第5話;それぞれの物語（２）"
12050-2 = "カイザーコンストラクション……カイザーコーポレーションの系列ですか……！？"
12050-3 = "アビドスの自治区を、カイザーコーポレーションが所有している……！？"
12050-4 = "……柴関ラーメンも？"
12050-5 = "……はい。大将はそのことを知っていて、ずいぶん前から退去命令も出ていたとかで……。"
12050-6 = "大将は、元々もうお店を畳むことを決めていたそうです……いつかは起きるはずのことだった、と……。"
12050-7 = "……。"
12050-8 = "……！？"
12050-9 = "どういうこと……！？"
12050-10 = "そんな、柴関ラーメンが……。"
12050-11 = "……すでに砂漠になってしまった、本来のアビドス高校本館と、その周辺数千万坪の荒れ地。"
12050-12 = "そしてまだ砂漠化が進んでない、市内の建物や土地まで……。"
12050-13 = "所有権がまだ渡ってないのは、今は本館として使っているこの校舎と、周辺の一部の地域だけでした……。"
12050-14 = "で、ですが、どうしてこんなことに？学校の自治区の土地を取引だなんて、普通できるはずが……。"
12050-15 = "いったい誰が、こんなことを……。"
12050-16 = "……アビドスの生徒会、でしょ。"
12050-17 = "……！"
12050-18 = "学校の資産の議決権は、生徒会にある。それが可能なのは普通に考えて、その学校の生徒会だけ。"
12050-19 = "……はい、その通りです。取引の主体は、アビドスの前生徒会でした。"
12050-20 = "そんな……アビドスの生徒会は、もう2年前に無くなったはずでは……。"
12050-21 = "……はい。ですので、生徒会が無くなってからは、取引は行われていません。"
12050-22 = "そっか、2年前……。"
12050-23 = "何をやってんのよ、その生徒会のやつらは！！"
12050-24 = "学校の土地を売る？それもカイザーコーポレーションなんかに！？"
12050-25 = "学校の主体は生徒でしょ！？どうしてそんなこと……っ！！"
12050-26 = "……。"
12050-27 = "こんな大ごとに、ずっと私たちは気づかないまま……。"
12050-28 = "……それぞれの学校の自治区は、学校のもの。余りにも当たり前の常識です。当たり前すぎて、借金の方にばかり気を取られて、気づくことが出来ませんでした。"
12050-29 = "私が、もう少し早く気付いていたら……。"
12050-30 = "……ううん、それはアヤネちゃんが気にすることじゃないよ。"
12050-31 = "これはアヤネちゃんが入学するよりも前の……いや、対策委員会ができるよりも前のことなんだから。"
12050-32 = "……ホシノ先輩、何か知ってるの？"
12050-33 = "あ、そうです！ホシノ先輩も、アビドスの生徒会でしたよね？"
12050-34 = "え？そ、そうだったの！？"
12050-35 = "それに……最後の生徒会の、副会長だったと聞きました。"
12050-37 = "……うへ～、まあそんなこともあったねえ。2年も前のことだし、そもそも私もその辺の生徒会の先輩たちとは、実際に関わりは無くってさー。"
12050-38 = "私が生徒会に入った時には、もう生徒会の人たちはほとんど辞めちゃってたから。"
12050-39 = "その時はもう在校生も二桁になってたし、教職員もいない。授業なんてものは、もうとっくの昔に途絶えてた。"
12050-40 = "生徒会室も、そうと言われなければただの倉庫にしか見えないところだったし、引継ぎ書類なんて立派なものは一枚も無かった。ちょうど砂漠化を避けようとして、学校の建物を何度も移してた時期だったってこともあってね。"
12050-41 = "そもそも最後の生徒会って言ったって、新任の生徒会長と私の二人だけだったし。"
12050-42 = "……その生徒会長は無鉄砲で、会長なのに校内でも随一のバカで……私の方だって、嫌な性格の新入生でさ。"
12050-43 = "いや～……何もかもめちゃくちゃだったよ。"
12050-44 = "校内随一のバカが生徒会長……？何それ、どんな生徒会よ……？"
12050-45 = "成績と役回りは別だよ、セリカ。"
12050-46 = "そもそも、セリカちゃんも成績はそんなに……。"
12050-47 = "わ、分かってるってば！！どうして急に私の成績の話になるわけ！？一応ツッコんでおいただけじゃん！？"
12050-48 = "うへ～、いやいや、正にその通りだよ。生徒会なんて肩書だけで、おバカさん二人が集まっただけだったからね。"
12050-49 = "何の間違いだか、生徒会なんかに入っちゃって……いや～、あの時はあちこちに行ったり来たりだったねぇ。"
12050-50 = "ほんっとバカみたいに、なんにも知らないままさ……。"
12050-51 = "……。"
12050-52 = "ホシノ先輩……。"
12050-53 = "……ホシノ先輩が責任を感じることじゃない。"
12050-54 = "昔の事情は知らないけど、実際に生徒会が解散になった後……アビドスに対策委員会ができたのは、間違いなくホシノ先輩のおかげ。"
12050-55 = "う、うん……？"
12050-56 = "……ホシノ先輩は怠け者だし、色々とはぐらかしてばっかりだけど、大事な瞬間には絶対に誰よりも前に立ってる。"
12050-57 = "そうです。セリカちゃんが行方不明になった時、真っ先に先生に助けを求めたのもホシノ先輩でしたし……。"
12050-58 = "……うへ～、そうだっけ？よく覚えてな――"
12050-59 = "[s] \"そうだったね、いつも絶対に先陣を切る。\""
12050-60 = "私、それ初耳なんだけど！？何で教えてくれなかったの！？"
12050-61 = "ホシノ先輩は色々とダメなところもあるけど、尊敬はしてる。"
12050-62 = "それって褒め言葉なの？悪口なの……？"
12050-63 = "ど、どうしたのシロコちゃん！？急にそんな青春っぽい台詞を……！おじさんこういう雰囲気、ちょっと苦手なんだけど！？"
12050-64 = "……や、なんとなく、言っておこうかなって思って。"
12050-65 = "え、えぇ……？"
12050-66 = "……。"
12050-68 = "……では、どうして前の生徒会は、カイザーコーポレーションにアビドスの土地を売ったんでしょうか？"
12050-69 = "実は裏で手を組んでたとか。"
12050-70 = "いえ……それは違うと思います。"
12050-71 = "そうだね～。私もしっかり関わってないからただの推測だけど……ちゃんと学校のためを思って、色々と頑張ってた人たちだったんじゃないかなーって思ってる。"
12050-72 = "多分、最初は借金を返そうとして……って感じなんだろうな～。"
12050-73 = "借金のために、土地を……。"
12050-74 = "はい、私もそう思います。当時すでに学校の借金は、かなり膨れ上がった状態でした。"
12050-75 = "ただ、それでもこのアビドスの土地に高値が付くはずもなく、少なくとも借金自体を減らすには至らなかった……。"
12050-76 = "それで、繰り返し土地を売ってしまう負の循環に……ということでしょうか。"
12050-77 = "何それ、なんかおかしくない？最初からどうしようもないっていうか……。"
12050-78 = "[s] \"……そういう手口も、あるよね。\""
12050-79 = "え？どういうこと？"
12050-80 = "[s] \"アビドスは、悪質な罠に嵌められたのかもしれない。\""
12050-81 = "え、え？"
12050-82 = "あ～……"
12050-83 = "なるほど、そっか。"
12050-84 = "……アビドスにお金を貸したのも、カイザーコーポレーション。"
12050-85 = "……！！"
12050-86 = "ということは……"
12050-87 = "カイザーローンが、学校の手に負えないぐらいのお金を貸して、利子だけでも払ってもらうために土地を売るよう仕向ける。"
12050-88 = "はい。きっと最初は、要らない砂漠や荒廃した土地でも売ったらと、甘言を弄したのでしょう。"
12050-89 = "どうせ砂漠と化した使い道のない土地、その提案を断る積極的な理由もなく……"
12050-90 = "ですが、同時にそんな安値で売ったところで借金が減るわけでもなく、土地を取られる一方で……"
12050-91 = "……アビドス自治区そのものが、ゆっくりとカイザーコーポレーションのものになる。"
12050-92 = "元々、そういう計算だったのかもしれない。"
12050-93 = "アビドスにお金を貸した時点で、こうなるように全てを……。"
12050-94 = "だいぶ前から計画してた罠だったのかもね。それこそ、何十年も前から……。"
12050-95 = "それくらい、規模の大きな計画だったのかも……。"
12050-96 = "なにそれ！？ただただカイザーコーポレーションのやつらに弄ばれてるだけじゃん！"
12050-97 = "生徒会のやつら、どんだけ無能なわけ！？こんな詐欺みたいなやり方に、騙されてさえいなければ……！"
12050-98 = "[s] \"セリカ、落ち着いて。\""
12050-99 = "先生……？"
12050-100 = "[s] \"悪いのは騙されることより、騙すことだと思うよ。\""
12050-101 = "……。"
12050-102 = "……。"
12050-103 = "……わ、私も分かってるわよ！た、たまにゲルマニウムのブレスレットとか買ったりするし、下手したらここの誰よりも分かってる！悪いのは騙した方だってことは！"
12050-104 = "でも……。"
12050-105 = "悔しい、どうして……。"
12050-106 = "ただでさえ苦しんでるアビドスに、どうしてこんなひどいことを……。"
12050-107 = "セリカちゃん……。"
12050-108 = "[s] \"……。\""
12050-109 = "……。"
12050-110 = "……。"
12050-111 = "……苦しんでる人たちって、切羽詰まりやすくなっちゃうからね～。"
12050-112 = "……え？"
12050-113 = "切羽詰まると、人は何でもやっちゃうものなんだよ……。"
12050-114 = "ま、よくある話だけどね。ただそれだけだと思うよ、セリカちゃん。"
12050-116 = "学校の借金、このアビドスが陥ってる状況、そして私たちが先生と一緒に見つけ出してきた幾つかの糸口。"
12050-117 = "全てが少しずつ、繋がり始めている気がします。"
12050-118 = "カイザーコーポレーションは、アビドスの生徒会が消えてしまってから土地を購入する方法が無くなり……"
12050-119 = "まだ手に入れていない「最後の土地」であるこの学校を奪うために、ヘルメット団を雇用していた……！"
12050-120 = "カイザーコーポレーションの狙いはお金ではなく土地だった、という結論で良いと思います！"
12050-122 = "ですね、バッチリかと。そうなると、次の疑問が出てきますが……どうして土地なんでしょうか？"
12050-123 = "アビドス自治区は、もうほとんどが荒れ地と砂漠、砂まみれの廃墟になっているのに……。"
12050-124 = "確かに……こんな土地を奪ったところで、何か大きな利益があるとは思えませんが……。"
12050-125 = "[s] \"砂漠といえば、ちょっと耳に入れたいことが……。\""
12050-126 = "……先生？"
12050-127 = "[s] ヒナから聞いた情報を話す。"
12050-130 = "……シャーレの先生。"
12050-131 = "これは[ruby=パンデモニウム・ソサエティー]まだ万魔殿も、[/ruby]ティーパーティーも知らない情報だけど。"
12050-132 = "……あなたには知らせておいた方が良いかもしれない。"
12050-133 = "アビドスの捨てられた砂漠……あそこで、カイザーコーポレーションが何かを企んでる。"
12050-135 = "アビドスの砂漠で……"
12050-136 = "カイザーコーポレーションが……"
12050-137 = "何かを企んでる……？"
12050-138 = "そ、そんなことをどうして、ゲヘナの風紀委員長が……。"
12050-139 = "それに、どうして先生に……？"
12050-140 = "ああもう、そんな難しいことを考えるより、先にやることがあるでしょ！"
12050-141 = "アビドスの砂漠はうちの自治区なんだから！実際に行ってみればいいじゃん！"
12050-142 = "何が何だか分からないけど、この目で直接確かめた方が早いって！"
12050-143 = "……ん、そうだね。"
12050-144 = "……いや～、セリカちゃん良いこと言うねえ。こんなにたくましく育ってママは嬉しいよ、泣いちゃいそう。ティッシュちょうだい。"
12050-148 = "な、何よこの雰囲気！？私がまともなこと言ったらおかしいわけ！？"
12050-149 = "あ、あはは、"
12050-150 = "そんなことは……ですが、セリカちゃんの言う通りです。"
12050-153 = "[ns1] \"じゃあ、準備ができたら行こっか。\"\n[ns2] \"アビドス砂漠へ。\""
12050-158 = "[ruby=はい]うん[/ruby]！"
12050-161 = "……先生。"
12050-162 = "出発する前に、ちょっと時間が欲しい。"
12050-163 = "……相談したいことがあって。"
12050-164 = "[s] シロコについて行く。"
12050-168 = "……。"
12050-169 = "……これ。"
12050-170 = "[s] シロコから何かを受け取る。"
12050-171 = "……ホシノ先輩のバッグの中から見つけたの。"
12050-175 = "[ns] \"退会・退部届……対策委員会[ruby=たかなし]小鳥遊[/ruby]ホシノ……！？\""
12050-176 = "……ん。"
12050-177 = "書かれてる通りの意味だと思う。"
12050-178 = "先生以外には誰にも見せてないし、言ってもないけど……そもそもバッグを漁ったこと自体、ホシノ先輩にはバレてる気がする。"
12050-179 = "[s] \"シロコは、どうして……？\""
12050-180 = "……ホシノ先輩があそこまで長い時間席を外すなんてこと、今までに無かった。それに、風紀委員会からあんなに追い詰められるまで、先輩が来ないなんて。"
12050-181 = "それがどうしても引っかかって……先輩のバッグを漁ってみたら出てきたの。"
12050-182 = "……ごめん、悪いことなのは分かってる。ホシノ先輩からはもちろん、生徒として、先生にも怒られても仕方ない。"
12050-183 = "[s3] \"……まだ、分かってないことが多すぎるから。\"\n[s4] \"とりあえず保留で。一旦これは秘密にしておこうか。\""
12050-184 = "……うん。先生も分かってると思うけど……ホシノ先輩、何か隠し事をしてる。"
12050-185 = "……うん。先生も分かってると思うけど……ホシノ先輩、何か隠し事をしてる。"
12050-188 = "……。"
12050-190 = "次回;アビドス砂漠へ（１）"
