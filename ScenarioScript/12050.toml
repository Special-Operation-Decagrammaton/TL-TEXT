[translation]
12050-1 = "Episódio 5; Cada história (2)"
12050-2 = "Kaiser Construction...é afiliada à Kaiser Corporation...? ?"
12050-3 = "A Kaiser Corporation é dona da região autônoma de Abydos...! ?"
12050-4 = "...Ramen Shibaseki também?"
12050-5 = "……sim. Aparentemente o general sabia disso e já havia dado a ordem de evacuação há muito tempo..."
12050-6 = "Parece que o general já havia decidido fechar a loja... algo que um dia iria acontecer..."
12050-7 = "……."
12050-8 = "...! ?"
12050-9 = "O que você quer dizer...! ?"
12050-10 = "Assim é o ramen Shibaseki..."
12050-11 = "...O edifício principal original da Escola Secundária de Abydos, que já se tornou um deserto, e dezenas de milhões de tsubo de terreno baldio que o rodeiam."
12050-12 = "E mesmo os edifícios e terrenos dentro da cidade, onde a desertificação ainda não progrediu..."
12050-13 = "As únicas áreas que ainda não foram propriedade são este edifício escolar, que actualmente funciona como edifício principal, e algumas zonas envolventes..."
12050-14 = "Mas, por que isso aconteceu? Normalmente seria possível negociar terrenos no distrito autônomo da escola..."
12050-15 = "Quem diabos faria algo assim...?"
12050-16 = "...Conselho estudantil de Abydos, certo?"
12050-17 = "...!"
12050-18 = "Os direitos de voto sobre os bens da escola pertencem ao conselho estudantil. Normalmente, apenas o conselho estudantil daquela escola pode fazer isso."
12050-19 = "...Sim, está certo. A entidade por trás da transação foi o antigo conselho estudantil de Abydos."
12050-20 = "Que... o conselho estudantil de Abydos deveria ter desaparecido há dois anos..."
12050-21 = "……sim. Portanto, desde o desaparecimento do conselho estudantil, nenhuma transação ocorreu."
12050-22 = "Entendo, há dois anos..."
12050-23 = "O que esses membros do conselho estudantil estão fazendo? !"
12050-24 = "Você venderá o terreno da escola? Até a Kaiser Corporation! ?"
12050-25 = "O corpo principal da escola são os alunos! ? Como você pôde fazer isso...! !"
12050-26 = "……."
12050-27 = "Continuamos sem saber de tão grande coisa..."
12050-28 = "...A região autónoma de cada escola pertence à escola. É tudo muito bom senso. Era tão óbvio que eu estava tão focado na dívida que nem percebi."
12050-29 = "Se eu tivesse percebido isso antes..."
12050-30 = "...Bem, não é com isso que Ayane-chan se importa."
12050-31 = "Isso foi antes de Ayane entrar na escola... ou melhor, antes da força-tarefa ser formada."
12050-32 = "...Hoshino-senpai, você sabe de alguma coisa?"
12050-33 = "Ah, isso mesmo! Hoshino-senpai também era membro do conselho estudantil de Abydos, certo?"
12050-34 = "foto? Ah, isso mesmo! ?"
12050-35 = "Além disso... ouvi dizer que ele era o vice-presidente do último conselho estudantil."
12050-37 = "... Uau, bem, isso aconteceu. Isso foi há dois anos e, para começar, eu realmente não tinha nada a ver com os veteranos do conselho estudantil."
12050-38 = "Quando entrei para o conselho estudantil, a maioria dos membros já havia desistido."
12050-39 = "Naquela época, o número de alunos matriculados já era de dois dígitos e não havia docentes. As aulas cessaram há muito tempo."
12050-40 = "A sala do conselho estudantil parecia um armazém, a menos que alguém me dissesse o contrário, e não havia nenhum documento sofisticado de entrega. Esta foi também uma altura em que os edifícios escolares foram transferidos muitas vezes num esforço para evitar a desertificação."
12050-41 = "Para começar, a última reunião do conselho estudantil foi apenas o recém-nomeado presidente do conselho estudantil e eu."
12050-42 = "...O presidente do conselho estudantil é imprudente, e mesmo sendo o presidente, ele é o maior idiota da escola...Eu também sou um aluno novo com uma personalidade desagradável."
12050-43 = "Ah, não... estava tudo uma bagunça."
12050-44 = "O maior idiota da escola é o presidente do conselho estudantil...? Que tipo de conselho estudantil é esse...?"
12050-45 = "Notas e funções são duas coisas diferentes, Celica."
12050-46 = "Para começar, as notas da Celica-chan não são tão boas..."
12050-47 = "Eu-eu sei! ! Por que de repente é sobre minhas notas? ? Eu só tive que zombar disso! ?"
12050-48 = "Uau, não, isso é exatamente certo. O conselho estudantil era apenas um título e eram apenas dois idiotas reunidos."
12050-49 = "Não sei que erro cometi, mas acabei entrando para o conselho estudantil... Bem, naquela época eu estava indo e voltando."
12050-50 = "Me senti uma idiota e não sabia de nada..."
12050-51 = "……."
12050-52 = "Hoshino-senpai...."
12050-53 = "...Não é algo pelo qual Hoshino-senpai se sinta responsável."
12050-54 = "Não sei sobre as circunstâncias passadas, mas depois que o conselho estudantil foi dissolvido... foi definitivamente graças a Hoshino-senpai que uma força-tarefa foi formada em Abydos."
12050-55 = "U-Sim...?"
12050-56 = "... Hoshino-senpai é preguiçoso e sempre se movimenta de várias maneiras, mas em momentos importantes ele está sempre na frente de todos."
12050-57 = "isso mesmo. Quando Celica-chan desapareceu, Hoshino-senpai foi o primeiro a pedir ajuda ao sensei..."
12050-58 = "... Uau, é isso mesmo? Lembre-se bem..."
12050-59 = "[s] \"Isso mesmo, eu sempre assumo a liderança.\""
12050-60 = "Esta é a primeira vez que ouço isso! ? Por que você não me contou! ?"
12050-61 = "Hoshino-senpai tem alguns pontos negativos, mas eu o respeito."
12050-62 = "Isso é um elogio? Isso é uma coisa ruim...?"
12050-63 = "O que há de errado, Shiroko-chan? ? De repente, uma linha tão jovem...! Tio, não gosto desse tipo de ambiente! ?"
12050-64 = "...Bem, pensei que deveria dizer algo."
12050-65 = "Ei, ei...?"
12050-66 = "……."
12050-68 = "...Então por que o antigo conselho estudantil vendeu o terreno em Abydos para a Kaiser Corporation?"
12050-69 = "Na verdade, eles estavam trabalhando juntos nos bastidores."
12050-70 = "Não... não acho que isso seja verdade."
12050-71 = "Isso mesmo. Só estou supondo, já que não estive realmente envolvido, mas acho que eram pessoas que estavam pensando no bem da escola e trabalhando duro de várias maneiras."
12050-72 = "Acho que no início foi como tentar pagar uma dívida..."
12050-73 = "Terreno por dívida..."
12050-74 = "Sim, eu também acho. Naquela época, a dívida escolar já havia aumentado consideravelmente."
12050-75 = "Porém, mesmo assim, não havia como a terra em Abydos receber um preço alto, ou pelo menos não reduzir a dívida em si..."
12050-76 = "Isso leva a um ciclo negativo de venda repetida do terreno."
12050-77 = "O quê, não é algo estranho? Parecia que não havia nada que eu pudesse fazer desde o início..."
12050-78 = "[s] \"...Existem truques assim, certo?\""
12050-79 = "foto? O que você quer dizer?"
12050-80 = "[s] \"Abydos pode ter caído em uma armadilha cruel.\""
12050-81 = "Sim?"
12050-82 = "Ah..."
12050-83 = "Eu vejo, eu vejo."
12050-84 = "...A Kaiser Corporation também emprestou dinheiro a Abydos."
12050-85 = "...! !"
12050-86 = "Isso significa..."
12050-87 = "O Kaiser Loan empresta mais dinheiro do que a escola pode pagar e força a escola a vender o terreno para pagar os juros."
12050-88 = "sim. No início, tenho certeza de que tentaram seduzi-los oferecendo-se para lhes vender os desertos e as terras desoladas de que não precisavam."
12050-89 = "De qualquer forma, a terra havia se tornado um deserto, sem utilidade, e não havia razão positiva para recusar a proposta..."
12050-90 = "Porém, ao mesmo tempo, vender a um preço tão baixo não reduz a dívida, e enquanto o terreno é retirado..."
12050-91 = "...A própria Região Autônoma de Abydos está lentamente se tornando propriedade da Kaiser Corporation."
12050-92 = "Talvez esse tenha sido o cálculo original."
12050-93 = "No momento em que emprestei dinheiro para Abydos, fiz de tudo para que isso acontecesse..."
12050-94 = "Talvez tenha sido uma armadilha planejada há muito tempo. Foi o que aconteceu décadas atrás..."
12050-95 = "Talvez fosse um plano tão grande..."
12050-96 = "O que é aquilo! ? Eles estão apenas sendo enganados pelos caras da Kaiser Corporation!"
12050-97 = "Os membros do conselho estudantil são tão incompetentes! ? Se ao menos eu não tivesse sido enganado por um método tão fraudulento...!"
12050-98 = "[s] \"Celica, acalme-se.\""
12050-99 = "sensei……?"
12050-100 = "[s] \"Acho que o pior é ser enganado em vez de ser enganado.\""
12050-101 = "……."
12050-102 = "……."
12050-103 = "...Eu-eu também sei! Bem, às vezes compro coisas como pulseiras de germânio e, quando as coisas dão errado, eu sei melhor do que ninguém aqui! Quem tem culpa é quem me enganou!"
12050-104 = "mas……."
12050-105 = "Estou tão frustrado, por que..."
12050-106 = "Por que uma coisa tão terrível aconteceu com Abydos, que já estava sofrendo...?"
12050-107 = "Celica-chan..."
12050-108 = "[s] \"…….\""
12050-109 = "……."
12050-110 = "……."
12050-111 = "...As pessoas que sofrem têm maior probabilidade de se sentirem desesperadas."
12050-112 = "……foto?"
12050-113 = "Quando as pessoas estão desesperadas, elas farão qualquer coisa..."
12050-114 = "Bem, é uma história comum. Acho que é tudo, Celica-chan."
12050-116 = "A dívida escolar, a situação em que se encontra Abydos e algumas pistas que descobrimos com a Senseia."
12050-117 = "Sinto que tudo está começando a se conectar aos poucos."
12050-118 = "A Kaiser Corporation não tem como comprar terras desde que o Conselho Estudantil de Abydos desapareceu..."
12050-119 = "Ele contratou a Gangue do Capacete para roubar esta escola, que é o \"último pedaço de terra\" que ele ainda não obteve...!"
12050-120 = "Acho que é seguro concluir que o alvo da Kaiser Corporation era a terra, não o dinheiro!"
12050-122 = "Bem, é perfeito. Então surge a próxima pergunta... por que pousar?"
12050-123 = "A maior parte da Região Autônoma de Abydos é agora um terreno baldio, deserto e ruínas cobertas de areia..."
12050-124 = "É verdade... não creio que haja grande lucro roubando esse tipo de terra..."
12050-125 = "[s] \"Falando em deserto, há algo que eu gostaria de ouvir...\""
12050-126 = "……sensei?"
12050-127 = "[s] Conte a informação que você ouviu de Hina."
12050-130 = "... Sensei de placa de Petri."
12050-131 = "Esta é uma informação que nem o Tea Party conhece."
12050-132 = "...Talvez eu deva avisar você."
12050-133 = "No deserto de Abydos... a Kaiser Corporation está tramando algo ali."
12050-135 = "No deserto de Abydos..."
12050-136 = "Corporação Kaiser..."
12050-137 = "Você está planejando algo...?"
12050-138 = "Bem, como poderia o chefe do comitê de moral pública da Gehenna fazer algo assim...?"
12050-139 = "Além disso, por que você é sensei...?"
12050-140 = "Ah, você tem coisas melhores para fazer do que pensar em coisas tão difíceis!"
12050-141 = "O deserto de Abydos é a nossa região autónoma! Você realmente deveria ir e ver!"
12050-142 = "Não sei o que é, mas é mais rápido ver com meus próprios olhos!"
12050-143 = "...Hmm, isso mesmo."
12050-144 = "...Bem, Celica-chan não tem nada de bom para dizer. Mamãe está tão feliz por ter crescido tão forte que acho que ela vai chorar. Dê-me um lenço de papel."
12050-148 = "Uau, que atmosfera! ? É estranho se eu disser algo sensato! ?"
12050-149 = "Ah, ahaha,"
12050-150 = "Isso não é verdade... mas Celica-chan está certa."
12050-153 = "[ns1] \"Bem, vamos quando você estiver pronto.\"\n[ns2] \"Para o deserto de Abydos.\""
12050-158 = "!"
12050-161 = "……sensei."
12050-162 = "Preciso de algum tempo antes de partir."
12050-163 = "...Tenho algo que gostaria de discutir com você."
12050-164 = "[s] Siga Shiroko."
12050-168 = "……."
12050-169 = "……esse."
12050-170 = "[s] Receba algo de Shiroko."
12050-171 = "...Encontrei na bolsa de Hoshino-senpai."
12050-175 = "[ns] \"Notificação de renúncia/renúncia...Comitê de Tarefas Hoshino...!?\""
12050-176 = "……sim."
12050-177 = "Acho que significa exatamente como está escrito."
12050-178 = "Não mostrei para ninguém além do sensei e não contei a ninguém, mas... sinto que Hoshino-senpai sabe que eu até mesmo cavei na sacola em primeiro lugar."
12050-179 = "[s] \"Por que Shiroko...?\""
12050-180 = "...Eu nunca vi Hoshino-senpai sair de seu lugar por tanto tempo. Além disso, não posso acreditar que meus superiores não tenham vindo até que eu tenha sido encurralado daquele jeito pelo comitê disciplinar."
12050-181 = "Não pude deixar de me envolver nisso... e quando vasculhei a bolsa do meu veterano, encontrei."
12050-182 = "... Me desculpe, eu sei que é ruim. Como estudante, não posso deixar de ser repreendido não só por Hoshino-senpai, mas também por meu sensei."
12050-183 = "[s3] \"...Ainda há muitas coisas que não sabemos.\"\n[s4] \"Vamos deixar isso em espera por enquanto. Vamos manter isso em segredo por enquanto.\""
12050-184 = "……Sim. Acho que a Senseia também sabe... Hoshino-senpai, você está escondendo alguma coisa."
12050-185 = "……Sim. Acho que a Senseia também sabe... Hoshino-senpai, você está escondendo alguma coisa."
12050-188 = "……."
12050-190 = "Próxima vez; Para o deserto de Abydos (1)"