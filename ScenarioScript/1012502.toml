[translation]
1012502-1 = "\tImagem mágica"

1012502-5 = "Bem-vindo, Mestre!"

1012502-6 = "[s] \"Olá, Eli!\""

1012502-7 = "Estava pensando em como passar o dia..."

1012502-8 = "Fui guiado por um livro mágico."

1012502-9 = "É bom desenhar juntos no ateliê - isso mesmo!"

1012502-10 = "[s1] \"Vocês gostariam de desenhar juntos? Parece que seria divertido.\"\n[s2] \"Tenho certeza que vocês conseguirão criar uma imagem mágica.\""

1012502-13 = "sim! Com um mestre você pode criar uma obra-prima!"

1012502-14 = "Agora vamos para o ateliê!"

1012502-24 = "本日はテーマを決めずに筆を走らせてみようかと。"

1012502-25 = "Por outras palavras...as puras sensibilidades e impulsos de um pintor são libertados magicamente!"

1012502-26 = "Em dias como hoje, quando a mana está ressoando... acho melhor focar na #insensibilidade."

1012502-27 = "Aqui vamos nós! Hmmm!"

1012502-31 = "[ns] \"...Cartas de tarô? Você não deveria fazer desenhos?\""

1012502-32 = "sim! Este é o processo necessário para atividades artísticas mágicas."

1012502-33 = "Nyufufu... O primeiro arcano que conta o destino é...! ?"

1012502-37 = "Hmmm, é a “torre” na posição correta?"

1012502-38 = "Isto significa “destruição” ou “colapso”. Em outras palavras--"

1012502-39 = "Pinte com um toque feroz que parece romper a tela! #n...Isso é uma revelação!"

1012502-40 = "Bem... vamos lá! !"

1012502-49 = "[ns] \"Uau...isso é incrível.\""

1012502-50 = "Nyufufu…. #nAgora, vamos tentar prever o próximo movimento."

1012502-54 = "次に私を導くのは……！"

1012502-58 = "Hum? “Deus da Morte” reverso…?"

1012502-59 = "Isto representa a "estagnação" que resiste à mudança..."

1012502-63 = "Isso significa que você deve continuar a desenhar com um toque vigoroso!"

1012502-72 = "[ns] \"E-Está tudo bem desenhar tão vigorosamente...?\""

1012502-73 = "Não se preocupe! Porque acredito no poder da magia!"

1012502-74 = "Mesmo que a tela rasgue, #n é uma “expressão de poder”... é uma bela arte! #nNão tenha medo!"

1012502-75 = "Vou continuar desenhando assim...!"

1012502-77 = "(Mesmo depois disso, o Tarot continuou a convidar Eri para pinceladas violentas.)"

1012502-86 = "(depois de um tempo......)"

1012502-89 = "おお……これは！"

1012502-93 = "O fato de eu ter conseguido criar algo assim... é simplesmente mágico!"

1012502-94 = "[s] \"どんな絵ができたの？\""

1012502-98 = "Por favor, dê uma olhada! #n Uma obra-prima criada pela ressonância da minha mana e do meu mestre!"

1012502-103 = "(A imagem termina com uma atmosfera...!)"

1012502-104 = "O título é “[ruby=Towa]Eterna[/ruby] Tempestade”!"

1012502-105 = "Se continuarmos a desenvolver a magia que usamos desta vez, não demorará muito para que possamos dominar a #nª "magia de criação de mundo" do 10º nível...!"

1012502-106 = "[s3] \"A 10ª posição parece incrível...!\"\n[s4] \"É uma imagem realmente impressionante e legal...!\""

1012502-109 = "Nyufufufu ~"

1012502-110 = "Acho que a expressão “arte é uma explosão” cabe perfeitamente!"

1012502-111 = "Afinal, foi a decisão certa ligar para o mestre. #nTeria sido difícil para mim fazer um desenho como este sozinho."

1012502-112 = "Se eu continuar com esse ritmo, tenho certeza que passarei na próxima prova prática...!"

1012502-116 = "Ah... posso ter usado muito poder mágico."

1012502-117 = "Mestre, por favor reabasteça sua mana!"

1012502-118 = "[s5] \"Bem, reposição de mana...?\"\n[s6] \"Então, acho que você quer alguns lanches?""

1012502-122 = "[ns] Ele tira os biscoitos que trouxe após escapar da inspeção do inspetor do dormitório."

1012502-124 = "Uau...! Esses biscoitos parecem deliciosos!"

1012502-125 = "Mas o que devemos fazer? Minhas mãos estão cobertas de tinta..."

1012502-126 = "Nyufufu, isso não pode ser evitado. #nMestre... você poderia me deixar comer se não se importa?"

1012502-127 = "[s] \"Bem, se for esse o caso...\""

1012502-132 = "obrigado!"

1012502-133 = "Pois bem, vamos comer!"

1012502-137 = "Pois bem, receber mana diretamente do mestre é algo especial!"

1012502-138 = "[s] \"Talvez esse fosse o objetivo...?\""

1012502-139 = "Nyufu... que tal isso?"

1012502-140 = "Tenho certeza que esta também é uma orientação mágica!"

1012502-142 = "(Eles continuaram se divertindo enquanto reabasteciam Eri com mana.)"

