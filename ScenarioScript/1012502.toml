[translation]
1012502-1 = "\t魔法の絵"
1012502-5 = "ようこそいらっしゃいました、マスター！"
1012502-6 = "[s] \"やあ、エリ！\""
1012502-7 = "今日はどのように過ごそうか考えておりましたところ――"
1012502-8 = "魔導書の導きがありまして。"
1012502-9 = "アトリエで一緒に絵を描くと良い――そうです！"
1012502-10 = "[s1] \"一緒に描くの？なんだか楽しそうだね。\"\n[s2] \"きっと魔法みたいな絵ができるよ。\""
1012502-13 = "はい！マスターとなら、傑作ができそうです！"
1012502-14 = "さあ、アトリエへ向かいましょう！"
1012502-24 = "本日はテーマを決めずに筆を走らせてみようかと。"
1012502-25 = "つまり……画家としての純粋な感性と衝動を――#n魔法のように解き放つんです！"
1012502-26 = "今日のようにマナが共鳴している日は……#n感性を重視した方が良いと思いますからね。"
1012502-27 = "さぁ、いきますよ！むむん！"
1012502-31 = "[ns] \"……タロットカード？絵を描くんじゃないの？\""
1012502-32 = "はい！これこそが、魔法のような芸術活動に必要な工程なんです。"
1012502-33 = "にゅふふ……運命を告げるアルカナの一枚目は――！？"
1012502-37 = "ふむふむ、正位置の「塔」ですか。"
1012502-38 = "これは「破壊」や「崩壊」を意味します。つまり――"
1012502-39 = "キャンバスを突き破るような激しいタッチで描くべし！#n……という啓示ですね！"
1012502-40 = "では……いきます！！"
1012502-49 = "[ns] \"おお……すごい勢いだ。\""
1012502-50 = "にゅふふ……。#nでは、次なる一手を占ってみましょう。"
1012502-54 = "次に私を導くのは……！"
1012502-58 = "むむっ？逆位置の「死神」……？"
1012502-59 = "これは変化を拒む「停滞」を表していますが……。"
1012502-63 = "引き続き、激しいタッチで描けということですね！"
1012502-72 = "[ns] \"そ、そんな勢いよく描いちゃって大丈夫……？\""
1012502-73 = "ご安心を！私は魔法の力を信じていますから！"
1012502-74 = "たとえキャンバスが裂けようとも、#nそれは「力の表現」……立派な芸術ですよ！#n恐れることはありません！"
1012502-75 = "このまま描き続けます……！"
1012502-77 = "（その後もタロットはエリを激しい筆運びへ[ruby=いざな]と誘い[/ruby]続けた）"
1012502-86 = "（しばらくして……）"
1012502-89 = "おお……これは！"
1012502-93 = "私がこんな作品を生み出せるなんて……まさに魔法です！"
1012502-94 = "[s] \"どんな絵ができたの？\""
1012502-98 = "どうぞご覧ください！#nマスターと私のマナの共鳴が生み出した、渾身の一作を！"
1012502-103 = "（雰囲気がある絵に仕上がってる……！）"
1012502-104 = "タイトルは『[ruby=とわ]永久[/ruby]に吹き荒れる嵐』！"
1012502-105 = "今回用いた魔法を発展させていけば、#n階十位の『世界創造魔法』を使いこなす日もそう遠くはありませんね……！"
1012502-106 = "[s3] \"階十位って、なんだか凄そう……！\"\n[s4] \"ほんとに迫力があってかっこいい絵だね……！\""
1012502-109 = "にゅっふっふ～"
1012502-110 = "「芸術は爆発だ」という言葉がぴったりな出来映えかと！"
1012502-111 = "やはりマスターをお呼びして正解でした。#nこのような絵を描くのは、私一人では難しかったでしょう。"
1012502-112 = "この勢いでいけば、次の実技試験もきっと……！"
1012502-116 = "あっ……魔力を使いすぎてしまったかも知れません。"
1012502-117 = "マスター、マナの補給をお願いします！"
1012502-118 = "[s5] \"ま、マナの補給……？\"\n[s6] \"要するに、おやつがほしいってことかな？\""
1012502-122 = "[ns] 寮監隊の検問をかいくぐって持ち込んだクッキーを取り出す。"
1012502-124 = "わあ……！美味しそうなクッキーですね！"
1012502-125 = "でも、どうしましょう。手が絵の具まみれで……。"
1012502-126 = "にゅふふ、こうなっては仕方ありません。#nマスター……よければ食べさせてくれませんか？"
1012502-127 = "[s] \"そ、そういうことなら……。\""
1012502-132 = "ありがとうございます！"
1012502-133 = "それでは、いただきますっ！"
1012502-137 = "いや～、マスターから直接いただくマナは格別ですね！"
1012502-138 = "[s] \"もしかして、これが狙いだったりした……？\""
1012502-139 = "にゅふ……それはどうでしょう？"
1012502-140 = "きっとこれも、魔法の導きですよ！"
1012502-142 = "（その後もエリにマナを補給しながら、楽しい時間を過ごしたのだった）"
