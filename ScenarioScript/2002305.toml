[translation]
2002305-1 = "Um descanso solitário"
2002305-2 = "D.U. Porto Kanezaki"
2002305-3 = " (Vim ao porto para perseguir contrabandistas sob a liderança do Departamento de Segurança Pública)"
2002305-7 = "……Entendo. Bom trabalho."
2002305-8 = "Recebi a notícia de que os contrabandistas que fugiram de barco foram presos pelos alunos do Departamento de Segurança que aguardavam no cais."
2002305-9 = "Pessoal, vocês fizeram um ótimo trabalho. #nCom isso, a operação está encerrada."
2002305-10 = "Bom trabalho!"
2002305-11 = "[s] \"Bom trabalho, Kanna.\""
2002305-12 = "Não, não foi uma operação difícil."
2002305-13 = "Graças ao fato de o Sensei ter reunido as informações das testemunhas dos alunos, conseguimos localizar o paradeiro dos criminosos rapidamente."
2002305-14 = "Em nome do Departamento de Segurança Pública, agradeço."
2002305-15 = "[s] \"Ficar sendo elogiado assim formalmente me deixa sem jeito…….\""
2002305-22 = "Diretora Kanna! Terminamos mais cedo do que o esperado, que tal irmos comer algo?"
2002305-24 = "Comigo……?"
2002305-25 = "Naquela lanchonete ali, a Viseria!"
2002305-26 = "Da última vez, chegou um novo Root Beer no bar de bebidas da Viseria……."
2002305-27 = "E colocar sorvete de sobremesa por cima está bombando nas redes sociais!"
2002305-28 = "Vamos comemorar o sucesso da operação com todo mundo!"
2002305-29 = "……Sinto muito, mas ainda tenho trabalho para fazer hoje à tarde."
2002305-30 = "Vão vocês. #nMesmo que eu, a diretora, vá a uma comemoração, o clima vai ficar pesado."
2002305-31 = "Mas…… da última vez você também disse que tinha trabalho urgente e foi embora antes, não foi?"
2002305-32 = "Todo mundo quer conversar com a diretora."
2002305-33 = "Se a superior estiver presente, eles não vão conseguir dizer o que querem."
2002305-34 = "Se for para conversar sobre coisas triviais, procurem outros alunos. #nEstou ocupada."
2002305-35 = "[s1] \"Acho que você se divertiria se fosse.\"\n[s2] \"Quer que eu faça o relatório por você?\""
2002305-38 = "Agradeço a intenção, mas já tenho planos para depois do expediente."
2002305-39 = "A oportunidade de comer com os membros da equipe…… vou pensar nisso em algum momento."
2002305-40 = "Sendo assim, com licença."
2002305-42 = "(Naquela noite. Enquanto voltava para o Schale após terminar outro trabalho……)"
2002305-47 = "[ns3] \"Está na hora de jantar.\"\n[ns4] \"Deixa ver, algum lugar por perto…….\""
2002305-52 = "É o Lamen da Suzu~."
2002305-53 = "Que tal um lamen? #nTambém temos yakitori e oden~."
2002305-58 = "[ns] Decidi comer lamen na barraca."
2002305-61 = "Bem-vindo!"
2002305-62 = "O que vai pedir~?"
2002305-63 = "[s] \"Um lamen da Suzu, por favor.\""
2002305-64 = "Certo, um lamen. Pode se sentar onde estiver vazio~."
2002305-69 = "Ah…… um yakitori depois do trabalho é especial."
2002305-70 = "Este lugar tem um sabor único que não se encontra em outros lugares."
2002305-71 = "Beber chá oolong junto com o yakitori parece lavar o cansaço do dia junto com a gordura da boca……."
2002305-72 = "[s] \"……Kanna?\""
2002305-76 = "……Hm?"
2002305-77 = "Se, se, se, Sensei!? Por que você está aqui?"
2002305-80 = "[wa:1300]— Que o Sensei [wa:600] estivesse em uma barraca [wa:700] como esta……"
2002305-82 = "[wa:400]— Foi inesperado……."
2002305-85 = "[ns] \"Digo o mesmo. Nunca imaginei que encontraria a Kanna aqui.\""
2002305-86 = "[wa:1000]— É mesmo?"
2002305-88 = "[wa:1000]— Para mim, [wa:500] este lugar [wa:1000] é o que [wa:300] mais me acalma."
2002305-91 = "[wa:2200]— Mesmo sendo a [wa:600] incansável diretora do Departamento de Segurança Pública [wa:1000] que todos temem……"
2002305-93 = "[wa:1100]— ……eu preciso de um lugar [wa:300] onde eu possa tirar a armadura, [wa:1300] pelo menos."
2002305-96 = "[wa:2000]― Portanto[wa:500], hoje,"
2002305-98 = "[wa:1200]― eu ficaria grata[wa:500] se pudesse fingir[wa:2000] que não viu nada."
2002305-106 = "[ns5] \"Se queria mudar de ares...\"\n[ns6] \"Não teria sido melhor ir com os outros?\""
2002305-109 = "......Já que fui vista, não tenho como dar desculpas."
2002305-110 = "Como você já deve ter percebido, assim como as outras alunas, #nnão é que eu não goste de comer e beber e me divertir."
2002305-111 = "Mas, como carrego o nome de \"Cão Raivoso do Departamento de Segurança Pública\", #nnão posso simplesmente baixar a guarda na frente dos outros tão facilmente."
2002305-112 = "Se descobrirem que eu, temida como o Cão Raivoso do Departamento de Segurança Pública que nunca hesita, #nna verdade sou uma pessoa comum que se emociona com as coisas ao meu redor..."
2002305-113 = "......Criminosos convencidos podem acabar ameaçando a segurança de Kivotos ainda mais do que agora."
2002305-114 = "Por isso, escondi minha verdadeira face de todos, mas..."
2002305-115 = "――Você acabou me vendo, Sensei."
2002305-116 = "Por favor, mantenha o que aconteceu hoje em segredo de todos."
2002305-117 = "[s] \"Pode me dar uma recomendação, Kanna?\""
2002305-118 = "Hã?#nO que foi...?"
2002305-119 = "[s7] \"Como pagamento pelo seu silêncio.\"\n[s8] \"Quero saber o que você recomenda comer.\""
2002305-122 = "......Fufu.#nEntendido. Se for só isso, a qualquer momento."
2002305-123 = "O sortido de espetinhos que estou comendo não é ruim, mas #nem dias frios como hoje, um oden quentinho também é bom."
2002305-124 = "Especialmente o tendão de boi deste lugar, que é preparado lentamente, #nfica macio e bem temperado, é delicioso."
2002305-125 = "[s] \"Então, vou pedir mais um pouco.\""
2002305-126 = "Dono, mais duas porções de oden, por favor."
2002305-127 = "E um chá oolong especial também."
2002305-128 = "Certo, só um instante~."
2002305-131 = "(Depois disso, passei um tempo agradável comendo oden com a Kanna)"
