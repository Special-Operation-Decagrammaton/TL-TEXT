[translation]
10054070-1 = "Chapter 7;The Trial"
10054070-3 = "Who are you people?"
10054070-4 = "We haven't met before, have we...?"
10054070-5 = "So, what can I do for you?"
10054070-6 = "Um... we heard the rumors, so we came to ask if we could join!#nOh! My name is Xuelin!"
10054070-7 = "And I'm Kiki!"
10054070-8 = "The Chicks Group is a super cool and famous organization, right?"
10054070-9 = "Xuelin and Kiki..."
10054070-10 = "You heard rumors...?"
10054070-11 = "Super cool, famous organization..."
10054070-12 = "I guess we do look suspicious..."
10054070-13 = "I can't deny it feels a bit thrown together, even if it is our own doing..."
10054070-14 = "Well, can't be helped if that's what they think!"
10054070-15 = "Anyone who hates being disciplined is always welcome here!"
10054070-16 = "Hehehe. Until the day we turn every kindergartner in Kivotos into a member of the Chicks Group..."
10054070-17 = "...Huh?"
10054070-18 = "Hmm..."
10054070-19 = "Thank you! We look forward to working with you!"
10054070-20 = "Yay! I'm so happy!"
10054070-21 = "But wait... aren't you guys a bit big? Are you really kindergarteners?"
10054070-22 = "!?"
10054070-23 = "Y-yes, that's right... Kiki has always been worried about that too..."
10054070-24 = "Everyone just teases me and won't play with me..."
10054070-25 = "Ah, ah, don't worry about it. They're just jealous."
10054070-26 = "Perhaps you just hit your growth spurt early."
10054070-27 = "I'll be bigger than everyone else someday!"
10054070-28 = "Thank you!"
10054070-29 = "But, that's one thing, and this is another.#nI admire the courage it took to come here, but..."
10054070-30 = "Eh...?"
10054070-31 = "Sorry, but we don't need anyone weak or spineless.#nSo, you'll have to prove your courage to us."
10054070-32 = "The path the Chicks Group walks is a thorny one indeed... can you two endure it...?"
10054070-33 = "W-what exactly do we have to do...?"
10054070-34 = "You must pass the trial to join the group!!"
10054070-35 = "A trial...!?"
10054070-36 = "It's a very harsh and terrifying trial..."
10054070-37 = "Sometimes it even shows up in my dreams..."
10054070-38 = "I-is it really that bad... I wonder if I'll be okay..."
10054070-39 = "Ugh... it's scary, but... Kiki doesn't want to give up..."
10054070-40 = "I like that. I like your guts."
10054070-41 = "Then let's start right away!#nThe trial is—"
10054070-46 = "Chugging a bottle of unsweetened yogurt drink!"
10054070-47 = "...Hm?"
10054070-48 = "Ugh, unsweetened... how terrifying... just sour, plain yogurt..."
10054070-49 = "Just thinking about it makes me want to cry..."
10054070-50 = "And the taste lingers, it's so gross..."
10054070-51 = "We couldn't actually chug it either, to be honest."
10054070-52 = "Yes. So, I think you'll pass as long as you can drink a decent amount."
10054070-53 = "..."
10054070-54 = "That is indeed a harsh trial. #nDrinking sour, unsweetened yogurt all at once..."
10054070-55 = "But I understand... Kiki will do her best!"
10054070-62 = "Phew..."
10054070-63 = "W-wait, really...?"
10054070-64 = "No way, you actually did it...?"
10054070-65 = "Even I couldn't chug it...!"
10054070-66 = "I'll drink it too!"
10054070-73 = "Gulp, gulp, gulp... *swallow*!"
10054070-74 = "I drank it all!"
10054070-75 = "How was that? Kiki did her best!"
10054070-76 = "..."
10054070-77 = "............"
10054070-78 = "Heh, hehe... I knew my judgment was sound!#nWelcome to the group, both of you!"
10054070-81 = "Now that we have new recruits, let's move on to the next plan!"
10054070-82 = "You mean that small-fry adult, right?"
10054070-83 = "Hehehe, isn't it about time we... showed them our true power?"
10054070-84 = "This time for sure... let's give that town a grand 'celebration' with some 'fireworks'!"
10054070-85 = "Agreed!"
10054070-86 = "Eh..."
10054070-87 = "What's wrong? You don't look very excited."
10054070-88 = "...You aren't going to tell me you can't do it now, are you?#nThe Chicks Group is a community of shared destiny, after all."
10054070-89 = "K-Kiki is looking forward to it!"
10054070-90 = "H-how wonderful! Y-yay..."
10054070-91 = "But..."
10054070-92 = "Why 'fireworks'?"
10054070-93 = "Because—"
10054070-94 = "It sounds fun, that's why. Hehehe..."
10054070-95 = "Besides... I don't like those adults."
10054070-96 = "Oh, and get this. They were taking on other clients besides us, you know? Isn't that weird?#nI mean, I didn't say they 'couldn't,' but you'd think an adult would have the sense to read the room!"
10054070-97 = "But... isn't that the reason we were able to become the Chicks Group?"
10054070-98 = "I suppose that's true."
10054070-99 = "That's not enough... I still can't forgive them."
10054070-100 = "Exactly! So then...!"
10054070-107 = "My lady, what is it?"
10054070-108 = "Get some heavy weapons and ammunition ready. And call the security team too!#nUntil tomorrow morning!"
10054070-109 = "But, we can't just reassign the security team..."
10054070-110 = "Then just hire some mercenaries, can't you?#nWe have to teach those small-fry adults a lesson!"
10054070-111 = "Again...?#nWhat is the reason this time...?"
10054070-112 = "Don't ask me every single time! Do you want to get fired!?"
10054070-113 = "M-my apologies...#nI will make the arrangements by tomorrow morning."
10054070-118 = "..."
10054070-119 = "Everything's ready now!"
10054070-120 = "I'll get to see some beautiful fireworks... I can't wait for tomorrow!"
10054070-121 = "Now then, shall we—"
10054070-124 = "Want to play?"
10054070-125 = "Let's play!"
10054070-126 = "..."
10054070-127 = "What do you usually play?"
10054070-128 = "Curious? It's something you guys couldn't even imagine! It's..."
10054070-129 = "Mortar Shell Toss!"
10054070-130 = "Mortar shell... toss?"
10054070-131 = "Follow me!"
10054070-134 = "See that circle drawn over there?"
10054070-135 = "Yes."
10054070-136 = "We fire these mortars, and whoever gets the most inside the circle wins!"
10054070-137 = "But you have to aim using only your intuition. Remember that, it's an important rule."
10054070-138 = "I-I see?#nWe're using shells that don't explode, right?"
10054070-139 = "Hehehe. You don't think we'd do something that boring, do you?#nThey're all live rounds."
10054070-140 = "Ehh!?"
10054070-141 = "Because you're also allowed to shoot down the shells your opponent fires."
10054070-142 = "Exactly! It gets really exciting when you pull it off!"
10054070-143 = "Alright... Kiki, you go first. I'll give you the special privilege of going first!"
10054070-144 = "Though it's actually more advantageous to go second."
10054070-145 = "Hehehe..."
10054070-153 = "Ahahahaha! Shot down successfully!"
10054070-154 = "That was close... you managed to get three in, though..."
10054070-156 = "Let's do Clay-Manpads next."
10054070-157 = "Clay-Manpads...? You don't mean clay pigeon shooting?"
10054070-158 = "We use infantry anti-air missiles to shoot down clay plates."
10054070-159 = "The important part here is that you're allowed to detonate them with a timed fuse!#nIt counts as a hit even if you don't score a direct impact, as long as the shockwave shatters it."
10054070-160 = "However, you have to set the timer on the fuse yourself.#nThat's the real thrill of this game."
10054070-161 = "My turn! Here I go, fire!!!"
10054070-172 = "Ah, maybe I was a bit too early! Kyahahaha!!"
10054070-173 = "Next is target practice using grenade launchers."
10054070-174 = "Whoever takes down more targets in one shot wins."
10054070-175 = "High-explosive rounds are meant for area attacks, right?"
10054070-176 = "Did you think it would be easy?#nHehehe, too bad. The ones we use in this game have a slightly smaller caliber."
10054070-177 = "The original blast radius is said to be 5m at most, but in reality, it's more like 2-3m."
10054070-178 = "But if you shoot it just right, you can aim for the maximum radius!"
10054070-179 = "That's the true essence of this game."
10054070-180 = "This... this is my first time using one of these..."
10054070-181 = "Eh, that's not our problem."
10054070-195 = "Nnn~!"
10054070-196 = "That was fun!!"
10054070-197 = "It's always more fun when there are more people."
10054070-198 = "The more the merrier, after all."
10054070-199 = "We had fun too!"
10054070-200 = "But we have to go now... let's continue tomorrow!"
10054070-201 = "Eh, already? Let's play more!"
10054070-202 = "We'd love to, but... we have to be back by evening..."
10054070-203 = "Ah, curfew. That sucks."
10054070-204 = "Poor things... I really must hurry and get every kindergartner in Kivotos into the Chicks Group as soon as possible."
10054070-205 = "Exactly! Then things like curfews and other annoying stuff will all disappear!"
10054070-206 = "Well, head home for today.#nLike I said, tomorrow is the fireworks! Meet up at the shopping district!"
10054070-212 = "(The sun set in the blink of an eye, and we reported our respective 'findings' to each other.)"
10054070-213 = "(Perhaps exhausted, Kokona had already fallen asleep.)"
10054070-221 = "(Everyone else headed back to their own rooms.)"
10054070-224 = "[ns] \"...\""
10054070-226 = "[ns] \"I should organize my thoughts...\""
10054070-232 = "[ns] \"Even though it's such a peaceful and quiet place...\""
10054070-233 = "That's right. It's a very nice place."
10054070-234 = "[ns] \"This voice...\""
10054070-237 = "Good evening. May I join you for a walk?"