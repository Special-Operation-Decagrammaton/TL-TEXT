[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 24/06.]
10054070-1 = "Episódio 7: Provação"
10054070-3 = "Quem são vocês?"
10054070-4 = "É a primeira vez que nos vemos, não é...?"
10054070-5 = "E então, o que vocês querem?"
10054070-6 = "Ahn... Nós ouvimos os boatos e viemos\npedir para entrar na gangue!\nAh! Meu nome é Shunzinha!"
10054070-7 = "E eu sou a Kiki!"
10054070-8 = "A Gangue dos Passarinhos é uma\norganização super famosa e legal, né?"
10054070-9 = "Shunzinha e Kiki..."
10054070-10 = "Ouviram os boatos...?"
10054070-11 = "Uma organização super famosa e legal..."
10054070-12 = "Como eu imaginei, elas desconfiaram..."
10054070-13 = "Nós tivemos que bolar isso tudo de\nimproviso, não tem jeito..."
10054070-14 = "Bom, se vocês estão dizendo,\nquem sou eu pra negar!"
10054070-15 = "Crianças que odeiam disciplina\nsão sempre bem-vindas!"
10054070-16 = "Ufufu. Até o dia em que todas as crianças de\nKivotos fizerem parte da Gangue dos Passarinhos..."
10054070-17 = "......Ué?"
10054070-18 = "Fumu..."
10054070-19 = "Muito obrigada! Contamos com vocês!"
10054070-20 = "Ebaaa! Que alegria!"
10054070-21 = "Mas tipo... vocês não são um pouco grandes demais?\nVocês tão mesmo na educação infantil?"
10054070-22 = "!?"
10054070-23 = "É, p-pois é... A Kiki também sofre muito com isso..."
10054070-24 = "Todo mundo tira sarro e\nninguém quer brincar com a gente..."
10054070-25 = "Ah, relaxa e não liga pra isso.\nEles só estão com inveja."
10054070-26 = "Pode ser que o estirão de crescimento\nde vocês tenha vindo um pouco mais cedo."
10054070-27 = "Um dia eu ainda vou ficar muito maior\nque vocês, podem apostar!"
10054070-28 = "Muito obrigada!"
10054070-29 = "Porém, uma coisa é uma coisa,\noutra coisa é outra coisa.\nEu até reconheço a coragem\nde vocês por virem até aqui, mas..."
10054070-30 = "Eh...?"
10054070-31 = "Sinto muito, mas não aceitamos covardes\nsem força de vontade.\nVocês vão ter que provar a sua coragem para nós."
10054070-32 = "O caminho da Gangue dos Passarinhos\né cheio de espinhos...\nSerá que vocês duas conseguem suportar...?"
10054070-33 = "M-Mas o que nós teremos que fazer..."
10054070-34 = "Para entrarem na gangue,\nterão que superar a nossa provação!!"
10054070-35 = "Provação...!?"
10054070-36 = "É uma provação muito cruel e aterrorizante..."
10054070-37 = "Às vezes, ela até aparece\nnos meus piores pesadelos..."
10054070-38 = "S-Se é tão assustador assim...\nSerá que vamos dar conta...?"
10054070-39 = "Uuh... dá muito medo...\nmas a Kiki não quer desistir...!"
10054070-40 = "Muito bem. Gostei da atitude de vocês."
10054070-41 = "Então vamos começar agora mesmo!\nA provação é――"
10054070-46 = "Virar iogurte de beber\nsem açúcar de uma vez só!"
10054070-47 = "......Ahn?"
10054070-48 = "Ugh, sem açúcar... que coisa terrível...\num iogurte que é pura acidez..."
10054070-49 = "Só de lembrar, me dá até vontade de chorar..."
10054070-50 = "E o gosto fica na boca\num tempão, é nojento..."
10054070-51 = "Sendo sincera, nem a gente conseguiu\nvirar tudo de uma vez."
10054070-52 = "Sim. Por isso, acho que se vocês conseguirem\nbeber uma boa quantidade,\njá podem ser aprovadas."
10054070-53 = "......"
10054070-54 = "Com certeza é uma provação implacável.\nUm iogurte azedo, sem nenhum docinho,\nengolido de uma vez só..."
10054070-55 = "Mas a gente entendeu...\nA Kiki vai dar o seu melhor!"
10054070-62 = "Pwah..."
10054070-63 = "E-Ehh...?"
10054070-64 = "Mentira, é sério isso...?"
10054070-65 = "Nem eu mesma consegui\nengolir tudo de uma vez...!"
10054070-66 = "Eu também vou beber!"
10054070-73 = "Glub, glub, glub... Aahhh!"
10054070-74 = "Bebi tudinho!"
10054070-75 = "O que acharam? A Kiki não foi incrível?"
10054070-76 = "......"
10054070-77 = "............"
10054070-78 = "F-Fufu... Como eu esperava,\nos meus olhos não se enganaram!\nSejam muito bem-vindas, vocês duas!"
10054070-81 = "Nossas novas integrantes chegaram,\nentão vamos pro próximo plano!"
10054070-82 = "Aquele plano contra os adultos fracassados?"
10054070-83 = "Ufufu, acho que já está na hora...\nde mostrarmos do que somos\ncapazes de verdade, não?"
10054070-84 = "Dessa vez sim... Vamos dar uma festa\nde arromba e 'comemorar' naquela rua de comércio\nusando muitos 'fogos de artifício'!"
10054070-85 = "Apoiado!"
10054070-86 = "Ehhh..."
10054070-87 = "Que foi? Vocês parecem meio desanimadas."
10054070-88 = "......Vocês não vão dar pra trás agora, né?\nA Gangue dos Passarinhos é uma família\nonde todos dividem o mesmo destino."
10054070-89 = "A-A Kiki tá super ansiosa!"
10054070-90 = "Q-Que maravilha! Y-Yaaay..."
10054070-91 = "Porém..."
10054070-92 = "Por que soltar 'fogos de artifício'?"
10054070-93 = "É porque――"
10054070-94 = "Parece que vai ser divertido. Ufufu..."
10054070-95 = "Além disso... nós não vamos muito\ncom a cara daqueles adultos."
10054070-96 = "Sim, escuta essa. Eles tinham a cara de pau\nde receber outros clientes além da gente,\nnão é um absurdo?\nTipo, ninguém disse que era 'proibido', né?\nMas, sendo adultos, eles deveriam pelo menos\nter o bom senso de não fazer isso!"
10054070-97 = "Mas... não foi graças a isso que nós nos\ntornamos a Gangue dos Passarinhos?"
10054070-98 = "Isso é verdade."
10054070-99 = "Só que isso... ainda não é motivo\npara perdoá-los."
10054070-100 = "É exatamente por isso! Então...!"
10054070-107 = "Senhorita, o que a senhora deseja?"
10054070-108 = "Quero armas pesadas e munições prontas.\nE chame a equipe de segurança também!\nPara amanhã de manhã, sem falta!"
10054070-109 = "Porém, enviar a equipe de\nsegurança para o exterior é um pouco..."
10054070-110 = "Então contrate mercenários, tanto faz!\nA gente precisa ensinar uma lição\nnaqueles adultos fracassados!"
10054070-111 = "De novo...?\nPosso saber o motivo desta vez..."
10054070-112 = "Não fique me enchendo de perguntas!\nQuer ser demitido!?"
10054070-113 = "M-Mil perdões, senhorita...\nProvidenciarei tudo até amanhã\nde manhã, conforme solicitado."
10054070-118 = "......"
10054070-119 = "Prontinho! Preparações finalizadas!"
10054070-120 = "Vai ser uma queima de fogos linda...\nQuero que amanhã chegue logo!"
10054070-121 = "Então, agora que resolvemos isso――"
10054070-124 = "Vamos brincar?"
10054070-125 = "Vamos!!!"
10054070-126 = "......"
10054070-127 = "E do que vocês costumam\nbrincar normalmente?"
10054070-128 = "Quer saber? É algo que vocês jamais imaginariam!\nÉ..."
10054070-129 = "Arremesso de projétil de morteiro!"
10054070-130 = "Arremesso... de projétil de morteiro?"
10054070-131 = "Venham comigo!"
10054070-134 = "Estão vendo aquele círculo\ndesenhado lá longe?"
10054070-135 = "Sim."
10054070-136 = "Quem atirar com esse morteiro e conseguir\nacertar mais vezes dentro daquele círculo ganha!"
10054070-137 = "Mas tem que mirar só pelo instinto.\nÉ uma regra de ouro, não se esqueçam."
10054070-138 = "E-Entendi?\nVocês usam projéteis que não\nexplodem de verdade, né?"
10054070-139 = "Ufufu. E qual seria a graça se fosse assim?\nSão todos projéteis reais, prontos para detonar."
10054070-140 = "Eeeh!?"
10054070-141 = "Isso porque a regra permite que a gente atire nos\nprojéteis que o adversário lançar\npara derrubá-los no ar."
10054070-142 = "Isso aí! Quando alguém consegue\nderrubar, a galera vai à loucura!"
10054070-143 = "Então... A Kiki vai primeiro. Eu vou deixar\nvocês começarem porque são as novatas!"
10054070-144 = "Embora atirar por último\nseja bem mais vantajoso, né."
10054070-145 = "Ufufu..."
10054070-153 = "Ahahahaha! Abatido com sucesso!"
10054070-154 = "Que pena para você... Mas ainda\nconseguiu acertar três dentro do círculo..."
10054070-156 = "Agora, vamos brincar de Manpad de Argila."
10054070-157 = "Manpad... de Argila? Não seria Tiro ao Prato?"
10054070-158 = "A gente lança aqueles pratinhos de argila pro alto e\nabate eles usando mísseis antiaéreos portáteis."
10054070-159 = "A melhor parte é que você pode usar\nas espoletas de tempo para detonar!\nNão precisa ser um acerto direto,\nse a onda de choque estilhaçar o alvo,\ntambém conta como abate."
10054070-160 = "No entanto, o temporizador\nda espoleta é ajustado manualmente.\nE esse é o grande charme do jogo."
10054070-161 = "Então é a minha vez!\nLá vou eeeeeeeu, fogo!!!"
10054070-172 = "Ah, acho que o timer foi muito curto!\nKyahahahahaha!!"
10054070-173 = "Agora é o tiro ao alvo com lança-granadas."
10054070-174 = "Quem conseguir destruir mais alvos\ncom um único disparo vence."
10054070-175 = "Mas as granadas de fragmentação já não são\nfeitas justamente para atacar uma área vasta?"
10054070-176 = "Vocês acharam que seria tão simples assim?\nUfufu, que pena. As granadas que usamos\nneste jogo possuem um calibre levemente menor."
10054070-177 = "O raio de explosão normal seria de até 5 metros,\nmas na prática, elas cobrem cerca de 2 a 3 metros no máximo."
10054070-178 = "Mas se você atirar direitinho, consegue fazer o raio da\nexplosão atingir a potência máxima!"
10054070-179 = "Esse é o verdadeiro desafio do nosso jogo."
10054070-180 = "É a minha primeira vez... segurando uma arma dessas..."
10054070-181 = "Aah, mas a gente não tá nem aí pra isso~"
10054070-195 = "Nnn~!"
10054070-196 = "Foi tão divertido!!"
10054070-197 = "As brincadeiras ficam muito melhores\ncom mais gente, né."
10054070-198 = "Quanto mais, melhor, esse é o espírito."
10054070-199 = "Nós adoramos também!"
10054070-200 = "Mas já está na nossa hora...\nVamos deixar o resto para amanhã!"
10054070-201 = "Sério, já? Fica mais um pouquinho!"
10054070-202 = "Até queríamos... mas precisamos\nvoltar antes do cair da tarde..."
10054070-203 = "Aah, o toque de recolher, né. É um saco isso."
10054070-204 = "Que pena... Está decidido, precisamos recrutar\ntodas as crianças de Kivotos para a\nGangue dos Passarinhos o mais rápido possível."
10054070-205 = "Pois é! Aí nunca mais teremos\ntoque de recolher ou regras chatas!"
10054070-206 = "Bem, por hoje vocês podem ir.\nLembrem do que conversamos mais cedo,\namanhã é dia de soltar os fogos de artifício!\nEncontro marcado na rua de comércio, ok!?"
10054070-212 = "（O sol se pôs num piscar de olhos, e nos reunimos para\ncompartilhar o que havíamos descoberto nas nossas investigações）"
10054070-213 = "（Talvez por estar esgotada,\na Kokona acabou adormecendo antes de todo mundo）"
10054070-221 = "（Todos se recolheram em seus próprios quartos em seguida）"
10054070-224 = "[ns] \"......\""
10054070-226 = "[ns] \"Acho que vou tentar organizar\nos meus pensamentos...\""
10054070-232 = "[ns] \"Este lugar é tão calmo e pacífico...\""
10054070-233 = "Sim, é verdade. É um lugar maravilhoso."
10054070-234 = "[ns] \"Essa voz...\""
10054070-237 = "Boa noite. Aceitaria a minha\ncompanhia em uma caminhada?"