[translation]
10054070-1 = "第7話;試練"
10054070-3 = "誰、あんたたち。"
10054070-4 = "初めましてだよね……？"
10054070-5 = "それで、何のご用ですか？"
10054070-6 = "えっと……噂を聞いて、仲間に入れてもらいに来ました！#nあっ！私はシュエリンって言います！"
10054070-7 = "私はキキです！"
10054070-8 = "雛鳥組って、とってもすごくてカッコいい、有名な組織なんですよね？"
10054070-9 = "シュエリンと、キキ……。"
10054070-10 = "噂を聞いた……？"
10054070-11 = "すごくて、カッコいい、有名な組織……。"
10054070-12 = "やっぱり、怪しまれますよね……。"
10054070-13 = "我が事ながら急ごしらえの感は否めんが……。"
10054070-14 = "そう言われちゃぁ仕方ない！"
10054070-15 = "しつけが嫌な子は、いつでも大歓迎！"
10054070-16 = "うふふっ。キヴォトス中の園児を雛鳥組にする日まで……。"
10054070-17 = "……あれ？"
10054070-18 = "ふむ……。"
10054070-19 = "ありがとうございます！よろしくお願いします！"
10054070-20 = "わ～い！嬉しいです！"
10054070-21 = "でもさ……なんか大きくない？本当に幼稚園児？"
10054070-22 = "！？"
10054070-23 = "そ、そうです……キキもそれが悩みでぇ……。"
10054070-24 = "みんなからかって、遊んでくれなくて……。"
10054070-25 = "あーあー、気にしないで。あれ、うらやましがってるだけだから。"
10054070-26 = "成長期が早く訪れたのかもしれませんね。"
10054070-27 = "いつかは私のほうが大きくなるんだから！"
10054070-28 = "ありがとうございます！"
10054070-29 = "でも、それはそれ、これはこれ。#nここまで来た勇気は認めるけど……。"
10054070-30 = "え……？"
10054070-31 = "悪いけど、弱くて根性のないやつはいらないの。#nだから勇気を証明してもらうよ。"
10054070-32 = "雛鳥組が進むのは、まさにいばらの道……お二人は耐えられますか……？"
10054070-33 = "い、いったい何をすれば……。"
10054070-34 = "組に入るための試練を突破してもらおう！！"
10054070-35 = "試練……！？"
10054070-36 = "とても過酷でおぞましい試練なの……。"
10054070-37 = "たまに夢に出たりするんですよね……。"
10054070-38 = "そ、そんなに……大丈夫かな……。"
10054070-39 = "うぅ……怖いけど……キキ、諦めたくありません……。"
10054070-40 = "いいね。その根性、気に入った。"
10054070-41 = "じゃあ早速始めよっか！#n試練とは――"
10054070-46 = "無糖の飲むヨーグルトを一気飲みすること！"
10054070-47 = "……ん？"
10054070-48 = "うぅ、無糖……なんて恐ろしい……酸っぱいだけのヨーグルト……。"
10054070-49 = "思い出すだけで涙が出そうです……。"
10054070-50 = "しかも、ずっと味が残って気持ち悪いの……。"
10054070-51 = "うちらも本当は一気飲みできなかったけどね。"
10054070-52 = "ええ。なのである程度飲めれば、合格でいいと思いますよ。"
10054070-53 = "……。"
10054070-54 = "たしかに過酷な試練ですね。#n酸っぱくて、甘くもないヨーグルトを一気に……。"
10054070-55 = "でも、分かりました……キキ、がんばります！"
10054070-62 = "ふぅ……。"
10054070-63 = "え、ええ……？"
10054070-64 = "嘘、本当に……？"
10054070-65 = "私ですら一気飲みはできなかったのに……！"
10054070-66 = "私も飲みます！"
10054070-73 = "んぐっ、んぐっ、んぐっ……ごくり！"
10054070-74 = "全部飲みました！"
10054070-75 = "どうですか？キキ、がんばりました！"
10054070-76 = "……。"
10054070-77 = "…………。"
10054070-78 = "ふ、ふふ……やっぱり私の目に狂いはなかったね！#n2人とも、歓迎するよ！"
10054070-81 = "新入りも入ってきたし、次の計画に移ろうか！"
10054070-82 = "あの雑魚大人のことだよね？"
10054070-83 = "うふふっ、そろそろ……本気を出してもいいのでは？"
10054070-84 = "今度こそ……あの街を「花火」で盛大に「お祝い」してあげよう！"
10054070-85 = "賛成！"
10054070-86 = "えぇ……。"
10054070-87 = "なに、元気ないじゃん。"
10054070-88 = "……まさか、今さらできないって言わないよね？#n雛鳥組は運命共同体なんだから。"
10054070-89 = "き……キキ、楽しみです！"
10054070-90 = "す、素敵ですね！わ、わあい……。"
10054070-91 = "でも……。"
10054070-92 = "どうして「花火」を？"
10054070-93 = "それはね――"
10054070-94 = "楽しそうだからですよ。うふふっ……。"
10054070-95 = "それに……あの大人たち、気に入らないですし。"
10054070-96 = "そうそう、聞いてよ。うちら以外にも客を取ってたんだよ？おかしくない？#nいや、「ダメ」とは言ってないよ？でも、大人ならそれくらい察してよねって話！"
10054070-97 = "でも……私たちはそのおかげで雛鳥組になれたのに？"
10054070-98 = "それはそうよね。"
10054070-99 = "その程度では……まだ許せません。"
10054070-100 = "そういうことなの！じゃあ……！"
10054070-107 = "お嬢様、どうなさいましたか？"
10054070-108 = "重火器と弾薬を用意して。あと、警備隊も呼んどいて！#n明日の朝までね！"
10054070-109 = "ですが、警備隊を外に回すわけには……。"
10054070-110 = "だったら傭兵でも雇えばいいでしょ？#nうちらは雑魚大人を懲らしめなきゃいけないの！"
10054070-111 = "またですか……？#n今度はどういった理由で……。"
10054070-112 = "いちいち聞かないで！クビにしちゃうよ！？"
10054070-113 = "も、申し訳ございません……。#n翌朝までの手配、承りました。"
10054070-118 = "……。"
10054070-119 = "これで準備オッケー！"
10054070-120 = "綺麗な花火が見れそうだし……早く明日になんないかなぁ！"
10054070-121 = "では、そろそろ――"
10054070-124 = "遊びませんか？"
10054070-125 = "遊ぶー！"
10054070-126 = "……。"
10054070-127 = "普段は何をして遊んでるんですか？"
10054070-128 = "気になる？あんたたちには想像もつかないことだよ！それはね……。"
10054070-129 = "迫撃砲弾投げ！"
10054070-130 = "迫撃砲弾……投げ？"
10054070-131 = "ついて来て！"
10054070-134 = "あっちに丸が描いてあるの見える？"
10054070-135 = "はい。"
10054070-136 = "この迫撃砲を撃って、あの丸の中に一番多く入れたほうが勝ち！"
10054070-137 = "でも、照準は感覚だけで撃つこと。大事なルールだから覚えといて。"
10054070-138 = "な、なるほど？#n砲弾は爆発しないやつを使うんですよね？"
10054070-139 = "うふふっ。そんなつまらないこと、するわけないでしょう？#n全部、実弾です。"
10054070-140 = "えぇっ！？"
10054070-141 = "なぜなら、相手が先に撃った砲弾を撃墜することも許されてるんです。"
10054070-142 = "そう！決まると大盛り上がりだよ！"
10054070-143 = "じゃあ……キキから。特別に先攻は譲ってあげる！"
10054070-144 = "後で撃ったほうが有利なんだけどね。"
10054070-145 = "うふふっ……。"
10054070-153 = "あはははは！撃墜成功！"
10054070-154 = "惜しいですね……3つは入れられましたけど……。"
10054070-156 = "次はクレー・マンパッツにしよっか。"
10054070-157 = "クレー・マンパッツ……？クレー射撃ではなく？"
10054070-158 = "クレーって呼ばれる素焼き皿を、歩兵用対空ミサイルで撃ち落とすの。"
10054070-159 = "ここで大事なのは、時限信管で爆発させてもいいってとこ！#n直撃だけじゃなくて、衝撃波で粉々にしても墜落扱いになるよ。"
10054070-160 = "ただし、信管のタイマーは自分で設定します。#nそれがこのゲームの醍醐味なんです。"
10054070-161 = "じゃあ私から！いっくよー、発射！！！"
10054070-172 = "あ、ちょっと早すぎたかも！きゃははははっ！！"
10054070-173 = "次は、グレネードランチャーを使った的当てです。"
10054070-174 = "一発で、より多くの標的を倒したほうの勝ちです。"
10054070-175 = "榴弾は面での攻撃を目的にしたものですよね？"
10054070-176 = "それなら簡単だと思いましたか？#nうふふっ、残念。このゲームで使用するのは、口径がやや小さめでして。"
10054070-177 = "本来の爆発半径は最大5mと言われていますが、実際は2～3ｍといったところです。"
10054070-178 = "でも上手く撃てば、最大半径での爆発も狙えるよ！"
10054070-179 = "このゲームの真骨頂はそこだよね。"
10054070-180 = "これ……使うの初めてなんですけど……。"
10054070-181 = "えー、うちらには関係ないしー。"
10054070-195 = "ん～っ！"
10054070-196 = "楽しかった！！"
10054070-197 = "やっぱ人が増えると面白いね。"
10054070-198 = "多ければ多いほど楽しいものですから。"
10054070-199 = "私たちも楽しかったです！"
10054070-200 = "でも、もう行かなくちゃ……続きはまた明日にしましょう！"
10054070-201 = "え、もう？もっと遊ぼうよ！"
10054070-202 = "そうしたいんですけど……夕方には戻らなきゃいけなくて……。"
10054070-203 = "ああ、門限ね。ヤだよねー。"
10054070-204 = "可哀想に……やはり1日でも早く、キヴォトス中の幼稚園児を雛鳥組に入れなくては。"
10054070-205 = "そうだよ！そしたら門限とか嫌なこととか、全部なくなるもん！"
10054070-206 = "ま、今日のところは帰りなよ。#nさっき話した通り、明日は花火だから！商店街で集合ね！"
10054070-212 = "（あっという間に日が暮れて、それぞれの「調査結果」を報告し合った）"
10054070-213 = "（疲れがたまっていたのか、ココナは先に寝てしまった）"
10054070-221 = "（みんなも、自分の部屋に帰っていった）"
10054070-224 = "[ns] \"……。\""
10054070-226 = "[ns] \"考えを整理しようかな……。\""
10054070-232 = "[ns] \"平和で静かな場所なのになぁ……。\""
10054070-233 = "そうですね。とてもいい場所です。"
10054070-234 = "[ns] \"この声は……。\""
10054070-237 = "こんばんは。お散歩、ご一緒しても？"
