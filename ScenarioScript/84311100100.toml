[translation]
84311100100-6 = "セイア……？"
84311100100-7 = "どうした、忘れ物か？"
84311100100-9 = "いや……こうして休息を、という配慮には感謝しているのだが。"
84311100100-10 = "何もしなくて良い、という状況が落ち着かなくってね。"
84311100100-11 = "改めて、何か手伝わせてはくれまいか。"
84311100100-13 = "任務は遊びじゃねえんだぞ。"
84311100100-14 = "申し出は嬉しいのだけれど……不規則な生活は成長に影響を与えるわ。"
84311100100-15 = "身長が伸び悩む原因にもなり得るの。夜間の行動は――"
84311100100-16 = "あん……？"
84311100100-17 = "今、なんつった？"
84311100100-18 = "……何のことかしら？"
84311100100-19 = "あたしがチビなのは、夜の行動が多いからだって言いてぇのか？"
84311100100-20 = "え……？いえ、そんなつもりはなかったのだけれど……。 "
84311100100-21 = "なぜ急にそんなことを……？身長を気にしているのかしら。"
84311100100-22 = "おまっ……！やっぱわざと言ってんだろ！なあ！？"
84311100100-23 = "何について怒っているの……？さっきも言った通り、他意は無いわ。"
84311100100-24 = "意図を感じるのは、貴女自身のコンプレックスが原因なのでは……？"
84311100100-29 = "へぇ……？言いたいことはそれで全部か？"
84311100100-30 = "補足するなら、身長を決定づける要素は、生活習慣だけでなく先天的なものも複合的に――"
84311100100-32 = "うるせぇ！"
84311100100-33 = "続きを促したのは貴女でしょう？"
84311100100-37 = "（触れてはいけない部分なのだね……）"
84311100100-39 = "話を戻したいのだが、何か、手伝えることはないかな？"
84311100100-44 = "ちょうど、二人がかりになりそうな案件があるわ。"
84311100100-45 = "展示ブースに、無許可の展示品が設置されたの。閉場後に追加されたものだから、まだ誰にも発見されていないわ。"
84311100100-46 = "無許可、という点が気になるの。回収して、確認するわ。"
84311100100-47 = "確認？大丈夫だったら戻すってことか？"
84311100100-48 = "ええ、そのつもりよ。"
84311100100-49 = "ふーん。"
84311100100-50 = "まあ、ちょうどいいんじゃねぇの？こいつもうずうずしてたみたいだし。 "
84311100100-52 = "ふっ……腕が鳴るね。"
84311100100-53 = "とりあえず行ってくる。身長の話はまた後でな。"
84311100100-54 = "日程を決めてくれれば時間を合わせるわ。"
84311100100-58 = "はぁぁぁ……。"
84311100100-60 = "その……。"
84311100100-61 = "（いや、二人の問題だ。私が口を挟むことではないだろう）"
