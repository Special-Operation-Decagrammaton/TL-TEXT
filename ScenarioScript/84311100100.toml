[translation]
84311100100-6 = "Seia...?"
84311100100-7 = "O que houve? Esqueceu alguma coisa?"
84311100100-9 = "Não... agradeço pela consideração em me deixar descansar, mas..."
84311100100-10 = "Ficar sem fazer nada me deixa inquieta."
84311100100-11 = "Poderia me deixar ajudar em algo?"
84311100100-13 = "Missões não são brincadeira, sabe."
84311100100-14 = "Fico feliz com a oferta, mas... uma vida irregular afeta o crescimento."
84311100100-15 = "Pode até ser a causa de você não crescer mais. Agir durante a noite é..."
84311100100-16 = "Hã...?"
84311100100-17 = "O que você disse agora?"
84311100100-18 = "...Do que você está falando?"
84311100100-19 = "Está querendo dizer que eu sou baixinha porque fico acordada até tarde?"
84311100100-20 = "Eh...? Não, não tive essa intenção, mas..."
84311100100-21 = "Por que reagiu assim de repente...? Será que você se preocupa com a sua altura?"
84311100100-22 = "Sua...! Você está fazendo isso de propósito, não está?! Hein?!"
84311100100-23 = "Por que está brava...? Como eu disse, não tive segundas intenções."
84311100100-24 = "Será que você sente que há uma intenção por causa do seu próprio complexo...?"
84311100100-29 = "É mesmo...? É só isso que tem a dizer?"
84311100100-30 = "Se quer que eu complemente, os fatores que determinam a altura não são apenas hábitos de vida, mas também uma combinação de fatores congênitos..."
84311100100-32 = "Cala a boca!"
84311100100-33 = "Mas não foi você quem pediu para eu continuar?"
84311100100-37 = "(Parece que esse é um assunto proibido...)"
84311100100-39 = "Voltando ao assunto, não há nada em que eu possa ajudar?"
84311100100-44 = "Na verdade, tem um caso que vai exigir duas pessoas."
84311100100-45 = "Colocaram um item não autorizado no estande de exibição. Como foi adicionado depois do fechamento, ninguém descobriu ainda."
84311100100-46 = "O fato de não ser autorizado me preocupa. Vou recolher e verificar."
84311100100-47 = "Verificar? Se estiver tudo bem, você vai devolver?"
84311100100-48 = "Sim, essa é a intenção."
84311100100-49 = "Hum."
84311100100-50 = "Bem, não é perfeito? Ela já estava impaciente para fazer algo."
84311100100-52 = "Hmph... minhas mãos estão coçando para agir."
84311100100-53 = "Vou indo. A gente termina essa conversa sobre altura depois."
84311100100-54 = "Se você marcar uma data, eu ajusto meu horário."
84311100100-58 = "Ahhh..."
84311100100-60 = "Bem..."
84311100100-61 = "(Não, isso é um problema entre as duas. Acho que não devo me intrometer.)"
