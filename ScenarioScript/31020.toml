[translation]
31020-1 = "Episódio 2; Clube de Estudos Suplementares"
31020-2 = "Já chega!!"
31020-3 = "Não aguento mais isso! Não entendo nada! É chato! É trabalhoso!!"
31020-4 = "E tudo isso, é tudo culpa do Sensei!!"
31020-5 = "[s] \"Eh, minha... culpa?\""
31020-8 = "Ora, Koharu-chan. Se você disser coisas tão absurdas assim, o Sensei vai ficar em apuros, não acha?"
31020-9 = "Afinal, o Sensei veio até aqui para nos ajudar... e, para começo de conversa, não entender a matéria e ter reprovado no exame é culpa sua, Koharu-chan, não do Sensei..."
31020-10 = "Ugh...!!"
31020-11 = "E-Eu sou um membro do Comitê de Justiça! Por isso, acabo não conseguindo ir às aulas com frequência... Isso! É por causa disso!"
31020-12 = "Os outros membros do Comitê de Justiça estão na mesma situação. Mas só a Koharu está aqui."
31020-13 = "..."
31020-14 = "Entendo. Então, Azusa-chan, o que você está tentando dizer é que a Koharu-chan é simplesmente uma bobinha, estou certa?"
31020-15 = "Bem, isso não deixa de ser verdade. O que não tem remédio, remediado está; a vida é frequentemente um vazio."
31020-16 = "De fato, a vida é uma sucessão de sofrimentos... coisas assim acontecem."
31020-17 = "Ah, chega, que barulhentas vocês são!? Se for assim, então todas vocês também são iguais! Se eu sou uma boba, então todo mundo aqui é um bando de bobas, suas idiotas!!!!"
31020-18 = "A-Ahaha... bem, isso é..."
31020-19 = "N-Não estou errada, estou? Vocês estão aqui porque são bobas, não estão!?"
31020-20 = "Você também!"
31020-21 = "Você também!!"
31020-22 = "Você também!!!"
31020-26 = "Você também!!!!"
31020-27 = "[s] \"Eu sou o Sensei, tecnicamente...?\""
31020-28 = "Auu... K-Koharu-chan, acalme-se um pouco..."
31020-29 = "Não tem como eu me acalmar! Em uma situação dessas, onde todas nós corremos o risco de sermos expulsas juntas...!"
31020-30 = "Se eu for expulsa... e-eu não vou mais ser um membro do Comitê de Justiça... uuu..."
31020-31 = "Claro que eu também não pretendo ser expulsa. Farei o que for preciso, mesmo que tenha que passar por situações humilhantes, eu vou superar isso."
31020-32 = "Bem, bem, só porque seremos expulsas não significa que tudo acabou, então vamos levar com calma. Na verdade..."
31020-33 = "E-Ei, vocês!!"
31020-34 = "..."
31020-35 = "..."
31020-36 = "..."
31020-41 = "Ah, bem, é que... estamos reunidas aqui justamente para evitar a expulsão..."
31020-42 = "Por enquanto, precisamos unir nossas mentes e encontrar um bom método..."
31020-43 = "Se não fizermos isso, daqui a uma semana, todas nós seremos expulsas juntas, como planejado..."
31020-44 = "\"Unir nossas mentes\"... Entendo. Não é ruim, mas não é algo que me empolga muito. Talvez algo um pouco mais..."
31020-45 = "Que tal, por exemplo... \"unir nossas partes fracas e sensíveis\"? O que acham?"
31020-50 = "Q-Que tipo de conversa é essa do nada!? Nada de piadas sujas! Proibido! Pena de morte!! Q-Que partes sensíveis, o que você quer dizer com unir!?"
31020-51 = "Ah, foi um pouco difícil de entender? Então, que tal eu demonstrar na prática? Por favor, abra um pouco mais as pernas..."
31020-55 = "...Eh? Ehhh!?"
31020-58 = "P-Pare! Não se aproxime! Eu não conheço, não quero conhecer e ainda é cedo demais para isso!!"
31020-59 = "Ei! ♡"
31020-63 = "P-Pare...! Pare com isso! S-Socorro, Sensei...!"
31020-64 = "E-Eu estava errada, desculpe por falar de forma informal com uma veterana! Já chega, pare, isso ainda não, nãooooo!!!!"
31020-65 = "Entendo, existe esse tipo de técnica de supressão também. Parece útil em combate corpo a corpo... aprendi algo novo."
31020-66 = "Embora eu ache que há muitos movimentos inúteis. Se fosse eu, teria imobilizado as articulações dois tempos antes."
31020-68 = "..."
31020-69 = "S-Sensei..."
31020-70 = "[s] \"...Sim, eu também vou me esforçar.\""
31020-71 = "C-Conto com você..."
31020-72 = "Se continuar assim, nós realmente... todas nós seremos... expulsas..."
31020-74 = "（O início desta história remonta a algumas semanas atrás...）"
31020-76 = "Terraço da Trinity"
31020-78 = "Olá, Sensei [USERNAME]. É um prazer conhecê-lo pessoalmente pela primeira vez."
31020-79 = "Eu sou Kirifuji Nagisa, a anfitriã do Tea Party."
31020-81 = "E esta é Misono Mika, que também é membro do Tea Party."
31020-82 = "Mais uma vez, é um prazer conhecê-lo. Nós somos o conselho estudantil da Trinity, o Tea Party."
31020-84 = "Próximo episódio: Tea Party"
