[translation]
31020-1 = "Episódio 2: Clube de Reforço"
31020-2 = "Já tô de saco cheio!!!"
31020-3 = "Não aguento mais isso! Não entendo nada! É chato pra caralho! Que saco!!!"
31020-4 = "E tudo isso é culpa sua, Sensei!!!"
31020-5 = "[s] \"Eh? Minha culpa…？\""
31020-8 = "Calma aí, Koharu-chan. Se você falar esse tipo de coisa, vai deixar o Sensei sem graça, né?"
31020-9 = "O Sensei veio aqui pra nos ajudar… e, no fim das contas, quem não entende as matérias e reprovou nas provas foi você mesma, Koharu-chan…"
31020-10 = "Ugh…！！"
31020-11 = "E-eu sou membro do Comitê de Execução da Justiça! Por isso eu falto bastante nas aulas… isso! É por causa disso!"
31020-12 = "As outras membros do Comitê também faltam, mas aqui só você veio."
31020-13 = "……。"
31020-14 = "Entendi. Ou seja, o que a Azusa-chan quer dizer é que você é simplesmente burra, acertei?"
31020-15 = "Bom, isso também não tá totalmente errado. O que não tem jeito não tem jeito, a vida é cheia de frustrações mesmo."
31020-16 = "Realmente a vida é uma sequência de sofrimentos… essas coisas acontecem."
31020-17 = "Ah, calem a boca!!! Se vocês vão falar assim, então todo mundo aqui também é burro! Se eu sou burra, vocês são todos burros também, seus idiotas！！！！"
31020-18 = "A-ahaha… é que… bem…"
31020-19 = "O que foi? Não tô errada né? Se sou burra, todo mundo aqui também é burro, né!? Burros！！"
31020-20 = "Você também!"
31020-21 = "Você também！！"
31020-22 = "Você também！！！"
31020-26 = "Você também！！！！"
31020-27 = "[s] \"Eu sou professor, sabia…？\""
31020-28 = "A-au… K-Koharu-chan, calma um pouco…"
31020-29 = "Como eu vou ficar calma!? Se a gente for reprovada, todo mundo vai ser expulso junto…！"
31020-30 = "Se eu for expulsa… não vou mais poder ser membro do Comitê de Execução da Justiça… uuu……"
31020-31 = "Claro que eu também não pretendo ser expulsa. Vou fazer o que for preciso, mesmo que seja humilhante, vou superar isso."
31020-32 = "Calma, calma. Mesmo que a gente seja expulsa, não é o fim do mundo. Vamos com leveza. Na verdade…"
31020-33 = "A-aquele！！！"
31020-34 = "……。"
31020-35 = "……。"
31020-36 = "……。"
31020-41 = "Ah, é que… a gente tá aqui justamente pra tentar não ser expulsa…"
31020-42 = "Por enquanto, vamos juntar as ideias e tentar achar uma solução…"
31020-43 = "Senão, daqui a uma semana vamos todos ser expulsos juntos…"
31020-44 = "「Juntar as ideias」…… entendi. Não é uma má ideia, mas não me anima muito. Será que não dá pra deixar mais… assim…"
31020-45 = "Aqui, por exemplo… que tal a gente «juntar as partes fracas e sensíveis»?"
31020-50 = "Q-que porra você tá falando de repente!? Safadeza proibida! Morte! Pena de morte！！ E-e o que você quer juntar de sensível!?"
31020-51 = "Ah, ficou confuso? Então vou mostrar na prática. Abre um pouco mais as pernas…"
31020-55 = "……Eh? EHH!?"
31020-58 = "P-para! Não chega perto! Eu não quero, ainda é cedo, me solta！！"
31020-59 = "Ei♡"
31020-63 = "P-para…！ Paraaa！ S-Sensei, me ajuda…！"
31020-64 = "Eu errei! Desculpa ter falado de igual pra igual com as senpais! Me perdoa, para, isso ainda não, aaaahhhhh！！！！"
31020-65 = "Entendi. Então existe esse tipo de técnica de supressão. Pode ser útil em combate corpo a corpo… aprendi algo novo."
31020-66 = "Só acho que tem movimento demais. Eu já teria travado a articulação dois tempos antes."
31020-68 = "……。"
31020-69 = "S-Sensei…"
31020-70 = "[s] \"……Tá bom, eu também vou me esforçar.\""
31020-71 = "P-por favor…"
31020-72 = "Se continuar assim… a gente realmente vai ser expulsa…"
31020-74 = "（A história começa algumas semanas atrás……）"
31020-76 = "Trinity Terrace"
31020-78 = "Olá, Sensei [USERNAME]. É a primeira vez que nos encontramos assim, né."
31020-79 = "Eu sou Nagisa Kirifuji, anfitriã do Tea Party."
31020-81 = "E aqui está Mika Misono, também membro do Tea Party."
31020-82 = "Prazer em conhecê-lo. Nós somos o Conselho Estudantil de Trinity, o Tea Party."
31020-84 = "Próximo; Tea Party"