[translation]
31020-1 = "Episódio 2;Clube de Aulas de Reforço"
31020-2 = "Não aguento mais!!"
31020-3 = "Não dá pra fazer isso! Não entendo! Que chato! Que saco!!"
31020-4 = "E tudo isso é culpa do Sensei, tudo!!"
31020-5 = "[s] \"Hã, eu……?\""
31020-8 = "Ai, Koharu. Se você falar uma coisa tão sem noção, o Sensei vai ficar sem jeito, né?"
31020-9 = "O Sensei só veio pra ajudar a gente…… e, no fim, não entender a matéria e ter reprovado na prova é culpa sua mesma, Koharu, não do Sensei……."
31020-10 = "Uh……!!"
31020-11 = "E-eu sou membro do Comitê de Realização da Justiça! Por isso falto muita aula…… isso! É por causa disso!"
31020-12 = "Isso vale pros outros membros do Comitê de Realização da Justiça também. Mas a única que veio parar aqui foi você, Koharu."
31020-13 = "……."
31020-14 = "Sei. Ou seja, o que a Azusa está tentando dizer é, simplesmente, que é porque a Koharu é uma tontinha. É isso, tá certo?"
31020-15 = "Bom, isso também não está de todo errado. O que não tem jeito não tem jeito; a vida, com frequência, é vazia."
31020-16 = "De fato, a vida é uma sucessão de sofrimentos…… essas coisas acontecem."
31020-17 = "Aah, que saco, calem a boca!? Se é assim, então vocês tão tudo no mesmo barco! Se eu sou burra, todo mundo aqui é burro, suas burras!!!!"
31020-18 = "A-ahaha…… é, isso é…….."
31020-19 = "N-não tá errado, né? Vocês tão aqui porque são burras também, né!?"
31020-20 = "Você também!"
31020-21 = "Você também!!"
31020-22 = "Você também!!!"
31020-26 = "Você também!!!!"
31020-27 = "[s] \"Eu, em tese, sou o Sensei, viu……?\""
31020-28 = "Au…… K-Koharu, se acalma um pouco……."
31020-29 = "Como é que eu vou me acalmar!? Numa situação dessas, em que todo mundo vai ser expulso juntinho……!"
31020-30 = "Se eu for expulsa…… eu deixo de ser membro do Comitê de Realização da Justiça…… uu……."
31020-31 = "É claro que eu também não pretendo ser expulsa. Custe o que custar, nem que eu passe vergonha, hei de superar isto."
31020-32 = "Calma, calma; ser expulsa não quer dizer que tudo acabou, então vamos com tranquilidade. Aliás……"
31020-33 = "É-ei, escutem aqui!!"
31020-34 = "……."
31020-35 = "……."
31020-36 = "……."
31020-41 = "A-ah, é que…… a gente tá reunida assim justamente pra não acabar sendo expulsa……."
31020-42 = "Por ora, é que…… agora a gente tem que juntar as cabeças e achar algum jeito bom……."
31020-43 = "Senão, daqui a uma semana, a gente vai mesmo, juntinha, ser toda expulsa……."
31020-44 = "\"Juntar as cabeças\"…… sei. Não é ruim, mas não é algo que me empolgue muito. Falta um quê, sabe……."
31020-45 = "Que tal, por exemplo, assim…… \"juntar as partes fracas e sensíveis\"?"
31020-50 = "D-do nada, que é que você tá falando!? Piada suja não pode! Proibido! Pena de morte!! P-partes sensíveis, juntar o quê com o quê, como assim!?"
31020-51 = "Ah, ficou meio difícil de entender? Então deixa eu mostrar na prática. Abre um pouquinho mais as pernas……"
31020-55 = "……Hã? Quê!?"
31020-58 = "P-para! Não chega perto! Eu não conheço, não quero conhecer e ainda é cedo pra isso!!"
31020-59 = "Toma♡"
31020-63 = "P-para……! Paraaa! S-socorro, Sensei……!"
31020-64 = "E-eu errei, desculpa falar sem formalidade com a veterana, me desculpa! Me perdoa, para, essa aí eu ainda não quero, nãoooo!!!!"
31020-65 = "Sei, então existe uma técnica de imobilização dessas também. Parece útil pro combate corpo a corpo…… aprendi algo."
31020-66 = "Só que sinto que tem movimento desnecessário demais. Se fosse eu, uns 2 tempos antes eu já teria travado a articulação."
31020-68 = "……."
31020-69 = "S-Senseiii……."
31020-70 = "[s] \"……Sim, eu também vou me esforçar.\""
31020-71 = "C-contamos com você……."
31020-72 = "Do jeito que vai, de verdade…… a gente toda vai ser expulsa……."
31020-74 = "(A origem da história remonta a algumas semanas atrás……)"
31020-76 = "Trinity - Terraço"
31020-78 = "Olá, Sensei [USERNAME]. É a primeira vez que nos vemos assim, não é?"
31020-79 = "Sou Nagisa Kirifuji, a host do Tea Party."
31020-81 = "E esta é, também membro do Tea Party, a Mika Misono."
31020-82 = "Reapresentando-me, é um prazer conhecê-lo. Nós somos o conselho estudantil de Trinity, o Tea Party."
31020-84 = "Próximo Episódio;Tea Party"
