[translation]
80000134-1 = "Tiramisu em Espera"
80000134-2 = "（Convidado por Miyo, visitei o dormitório de Wild Hunt）"
80000134-3 = "（Como eu sabia de antemão o momento em que a inspeção da equipe de vigilância do dormitório ficava mais relaxada, consegui entrar com mais facilidade que o habitual）"
80000134-4 = "Dormitório do Departamento de Comércio Especial"
80000134-7 = "Olá, Sensei."
80000134-8 = "[s] \"Ei, como você tem passado?\""
80000134-9 = "Sim... a escrita do meu romance não tem avançado muito, mas..."
80000134-10 = "Se fosse um plano de contrabando, as ideias fluiriam facilmente, no entanto..."
80000134-11 = "[s] \"...?\""
80000134-12 = "Ah, não... perdão por isso."
80000134-13 = "Acho que é apenas temporário, mas as regras de saída ficaram mais rígidas... e tem sido difícil para mim ir te encontrar."
80000134-14 = "[s] \"Não se preocupe. Se for para encontrar a Miyo, eu venho a qualquer momento!\""
80000134-15 = "V-verdade? #nFufu... "
80000134-16 = "[s] \"Se eu recusasse, talvez você me sequestrasse...\""
80000134-17 = "O quê...?! #nE-eu não faria algo tão perigoso assim!"
80000134-18 = "Certamente seria possível se eu quisesse, mas... se chegasse a esse ponto, primeiro eu calcularia várias variáveis..."
80000134-22 = "...Não é isso! #nEu não faria uma coisa dessas!"
80000134-23 = "Uuu..."
80000134-24 = "[s] \"A propósito, o que é isso...?\""
80000134-25 = "Ah, isso é..."
80000134-26 = "...Tiramisu."
80000134-27 = "[s] \"Por acaso... você estava no meio do preparo?\""
80000134-28 = "E-estou envergonhada..."
80000134-29 = "Na verdade, deveria estar pronto a esta hora, mas..."
80000134-30 = "Como é a primeira vez que faço algo à mão..."
80000134-31 = "[s] \"Então, quer fazer comigo?\""
80000134-32 = "N-não posso fazer isso...! "
80000134-33 = "Além disso, já está quase pronto!"
80000134-34 = "Só falta polvilhar o cacau em pó..."
80000134-35 = "E assim, está pronto..."
80000134-38 = "[greeting][greeting][SFX de algo sendo polvilhado rapidamente]"
80000134-40 = "[…]"
80000134-41 = "...De alguma forma."
80000134-42 = "[s] \"Hm?\""
80000134-43 = "Ao polvilhar o cacau em pó preto sobre o mascarpone branco assim..."
80000134-44 = "Parece que estou escrevendo frases em uma folha de papel de manuscrito..."
80000134-45 = "[s] \"É verdade, talvez seja mesmo.\""
80000134-46 = "...Às vezes eu penso."
80000134-47 = "Que escrever é como preencher o papel — se for assim, eu também..."
80000134-48 = "...Desculpe, não ligue para isso."
80000134-53 = "De qualquer forma, com isso..."
80000134-57 = "Está pronto, Sensei!"
80000134-60 = "[ns] \"Parece delicioso!\""
80000134-61 = "Fufu... obrigada."
80000134-62 = "Ah, bem, é que..."
80000134-63 = "[s] \"Aconteceu alguma coisa?\""
80000134-69 = "Eu descobri agora há pouco... #nO tiramisu fica ainda mais gostoso se for resfriado na geladeira por cerca de 2 horas."
80000134-70 = "E-então..."
80000134-71 = "Se, se o Sensei não se importar..."
80000134-72 = "[s] \"Eu espero essas 2 horas tranquilamente!\""
80000134-73 = "Sé-sério mesmo!?#nMuito obrigada!"
80000134-74 = "Então, vou preparar um chá agora mesmo."
80000134-75 = "Que tal tomarmos um chá de camomila hoje?"
80000134-77 = "(Duas horas se passaram num piscar de olhos enquanto eu conversava com Miyo)"
80000134-78 = "(O tiramisu pareceu ainda mais delicioso depois de todo esse tempo que passamos juntos)"
