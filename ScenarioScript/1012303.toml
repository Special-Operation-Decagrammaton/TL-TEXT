[translation]
1012303-1 = "停滞の先へ"
1012303-2 = "シャーレ執務室"
1012303-3 = "（セイアが来るというので、散らかった室内を慌てて片付けていた）"
1012303-8 = "ほう……ここまで念入りに準備してくれるとはね。"
1012303-9 = "これでは、かえって気軽に足を運びづらくなってしまうじゃないか。"
1012303-10 = "[s1] \"……セイア？\"\n[s2] \"よ、よく来たね。\""
1012303-17 = "……。 "
1012303-18 = "いや、むしろ光栄というべきかな。#n私に対する先生の気遣い。その証左なのだからね。"
1012303-19 = "これはつまり、先生の中で私の存在感が一層増した……という解釈でいいのかな？"
1012303-20 = "[s3] \"……セイア？\"\n[s4] \"その格好でここまで来たの？\""
1012303-23 = "……ふふ、気になるかい？"
1012303-24 = "案ずることはないさ。この格好は、誰にも見咎められていないはずだ。#n今日は車で来たからね。"
1012303-25 = "……うん？"
1012303-26 = "この服が気に入っているのか、と？#nああ、たしかに。最近はこればかり着ているからな。"
1012303-27 = "答えは――当然だ。#n自分で見立てたのだから。"
1012303-28 = "そういえば、まだ感想を聞いていなかった。"
1012303-29 = "君は、どんな言葉を尽くしてくれるんだい？"
1012303-30 = "[s5] \"もちろん、よく似合ってるよ。\"\n[s6] \"いいファッションセンスだね。\""
1012303-33 = "……ふむ。"
1012303-34 = "期待通りではあるが……#n期待を裏切らないというのも、考えものだ。"
1012303-38 = "……照れ隠しだ。そう気にしないでくれ。"
1012303-39 = "ファッションセンス……か……。"
1012303-40 = "私とて、密かに一家言あるんだ。"
1012303-41 = "季節の趣を損なわず、凡庸さを避ける一工夫を施す――#nそれが醍醐味だと思っている。"
1012303-42 = "出来の良い物語や洒落た謎解きを仕掛けるような感覚……#nとでも言えばいいだろうか。"
1012303-43 = "とはいえ立場上、周囲の目は中々無視できないものだ。#n実践の機会は滅多にないのが実情だけれどね。"
1012303-44 = "だからこそ機会が巡ってきた時には、存分に活用しなければ。"
1012303-45 = "自慢の着こなしを見てもらいたいと思うのは、#n何もおかしくないだろう？"
1012303-46 = "そういうわけで、君の褒め言葉は実に良かった。#n嬉しかったよ。"
1012303-47 = "……おや、意外かな？"
1012303-48 = "[s7] \"少しだけ。でも、いいことだと思うよ。\"\n[s8] \"新しい一面を知れて、私も嬉しいよ。\""
1012303-51 = "先生……君は否定の語彙をどこかに捨ててきてしまったのかい？"
1012303-52 = "欲を言えば、先生と水遊びでもと思わないでもないが……#nもっとも、先生がその様子ではね。"
1012303-53 = "安心してくれ。仕事の邪魔まではしないさ。"
1012303-57 = "……いや、いいんだ。#n我儘も、あまり頻繁では輝きを失ってしまう。"
1012303-58 = "今日はここで、静かに時を過ごすとしよう。#nこれくらいの贅沢は、許されると願いたいが……。"
1012303-59 = "[s9] \"もちろんだよ。\"\n[s10] \"どこでも、好きなだけどうぞ。\""
1012303-62 = "…………。"
1012303-66 = "…………。"
1012303-67 = "[s11] \"セイア？\"\n[s12] \"ど、どうしたの……？\""
1012303-70 = "……気にせず仕事を続けてくれ。"
1012303-71 = "君がそういう人間だと知っていながら、#n性懲りもなく同じ手を講じる私の落ち度だ。"
1012303-72 = "先生がそのつもりならば、こちらとしても一歩踏み込む他あるまい。"
1012303-80 = "[ns13] \"……セ、セイア！？\"\n[ns14] \"これは勘弁して欲しいかな……って。\""
1012303-83 = "どこでも、と言ったのは君だろう？#n今日は、ここでしばし休むとしよう。"
1012303-84 = "もしくは……ご所望とあらば、何か手伝おうか。#n「単なる雑務」や「機密書類」の類でなければの話だが。"
1012303-85 = "一応は、仕事となればそれなりに手際はいい方でね。"
1012303-86 = "……ん？"
1012303-87 = "怒っている？私が？なぜそんなことを聞くんだい？#nそれは君……まさか、私が怒っていると思っていたのか……？"
1012303-88 = "……ふふっ。"
1012303-89 = "これしきで腹を立てるほど、私の了見は狭くないつもりだ。"
1012303-90 = "……まあ。"
1012303-91 = "多少なり苛立ちを覚えてはいたが……お陰様で、どうでもよくなってしまった。"
1012303-92 = "いやはや、実に座り心地が良いじゃないか。"
1012303-96 = "……君の膝の上は。"
1012303-97 = "さあ、先生。早速業務に取り掛かろうか。#nさっさと片付けて、心置きなく寛ぐとしよう。"
1012303-98 = "でないと――"
1012303-103 = "私に費やされるべき貴重な時間を、業務に奪われてしまうからね。"
1012303-105 = "（セイアの協力もあり、その日の仕事は想定より早く終わった）"
1012303-106 = "（休憩室のソファで気持ちよさそうに昼寝をしてから、セイアは帰っていった）"
