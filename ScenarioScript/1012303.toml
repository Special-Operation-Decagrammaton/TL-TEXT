[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 22/06.]
1012303-1 = "Além da Estagnação"
1012303-2 = "No escritório da Schale"
1012303-3 = "(Como a Seia disse que vinha, arrumei o escritório correndo)"
1012303-8 = "Hooh... você preparou tudo\ncom bastante capricho, não é?"
1012303-9 = "Desse jeito, vai ficar difícil pra mim\naparecer de surpresa e sem calcinha... digo,\nsem avisar."
1012303-10 = "[s1] \"...Seia?\"\n[s2] \"O-Opa, que bom que veio.\""
1012303-17 = ".... "
1012303-18 = "Na verdade, acho que eu devia me sentir honrada.#nAfinal, isso é a prova de todo o carinho (e suor)\nque o Sensei dedica a mim."
1012303-19 = "Isso quer dizer que... a minha presença\nganhou ainda mais 'peso' na sua cabeça, não é?"
1012303-20 = "[s3] \"...Seia?\"\n[s4] \"Você veio até aqui... vestida desse jeito?\""
1012303-23 = "...Fufu, está curioso?"
1012303-24 = "Não se preocupe. Ninguém me viu\ncom essa pouca roupa lá fora.#nVim de carro direto pra cá, só pra você."
1012303-25 = "...Hm?"
1012303-26 = "Você quer saber se eu gosto dessa roupa?\n#nSim, é verdade. Ultimamente eu só\ntenho vestido isso."
1012303-27 = "E a resposta é――óbvio que gosto.#nFui eu mesma que escolhi, pensando em\ncomo agradar os seus olhos."
1012303-28 = "Por falar nisso, ainda não ouvi\na sua opinião sobre ela."
1012303-29 = "Quais palavras pervertidas você vai\nusar pra me elogiar agora?"
1012303-30 = "[s5] \"Claro, ficou maravilhoso em você.\"\n[s6] \"Você tem um ótimo senso de moda.\""
1012303-33 = "...Hmm."
1012303-34 = "Era exatamente o que eu esperava, mas...\n#nNão quebrar as expectativas... também é\nalgo que te faz pensar muito, não acha?"
1012303-38 = "...Estou só escondendo a vergonha.\nNão liga muito pra isso."
1012303-39 = "Senso de moda... é?"
1012303-40 = "Sabe... eu, secretamente, tenho\nminhas próprias regrinhas pra isso."
1012303-41 = "Sem perder a vibe deliciosa da estação,\nadicionar um toque especial pra sair do banal――\n#nAcho que essa é a melhor parte da brincadeira."
1012303-42 = "É a mesma sensação de...\npreparar uma história cheia de safadezas ou um enigma muito bem elaborado...#nSeria esse o termo certo?"
1012303-43 = "Dito isso, pela minha posição,\né difícil ignorar os olhares cravados nas minhas costas.\n#nO fato é que eu quase não tenho\noportunidades de colocar isso em prática."
1012303-44 = "E é justamente por isso que, quando a chance surge,\neu preciso usar e abusar dela."
1012303-45 = "Eu querer que você devore com os olhos essa roupa\nque eu escolhi com tanto orgulho...\n#nnão tem nada de anormal, não acha?"
1012303-46 = "E por causa disso... os seus elogios\ncaíram maravilhosamente bem.\n#nFiquei molhadi... digo, muito feliz."
1012303-47 = "...Ara, achou a minha resposta\ninesperada?"
1012303-48 = "[s7] \"Só um pouquinho. Mas acho que isso é algo muito bom.\"\n[s8] \"Também fico feliz em descobrir um lado novo seu.\""
1012303-51 = "Sensei... por acaso você jogou fora o seu vocabulário\nde 'negação' em algum lugar?"
1012303-52 = "Se eu fosse ser sincera e egoísta,\nadoraria brincar com água e molhar nós dois...\n#nmas vendo o seu estado de ocupado,\nacho que não vai rolar."
1012303-53 = "Relaxe e respire fundo. Não vou\natrapalhar o seu trabalho suado."
1012303-57 = "...Não, está tudo bem.\n#nSer mimada toda hora... acaba\nfazendo a brincadeira perder o tesão."
1012303-58 = "Hoje, vou apenas passar um tempinho tranquilo aqui com você.\n#nEspero que me permita esse nível de luxo e intimidade..."
1012303-59 = "[s9] \"Com toda a certeza.\"\n[s10] \"Sinta-se em casa, onde e o quanto quiser.\""
1012303-62 = "............"
1012303-66 = "............"
1012303-67 = "[s11] \"Seia?\"\n[s12] \"O-O que houve...?\""
1012303-70 = "...Pode continuar o seu trabalho.\nNão ligue para os meus olhos no seu corpo."
1012303-71 = "Mesmo sabendo que você é esse tipo de homem...\n#nfoi burrice minha tentar usar o mesmo\ntruquezinho de sempre e achar que ia funcionar."
1012303-72 = "Mas se essa é a intenção do Sensei,\neu não tenho outra escolha a não ser dar o próximo passo e avançar nas preliminares."
1012303-80 = "[ns13] \"...S-Seia!?\"\n[ns14] \"P-Pera aí, isso já é maldade comigo...\""
1012303-83 = "Você mesmo disse 'onde quiser', não disse?\n#nEntão hoje eu vou sentar e descansar aqui por um tempinho."
1012303-84 = "Ou... se você implorar por isso, eu posso\nte dar uma mãozinha suada.#nIsso se não for nenhuma daquelas 'tarefas chatas'\nou 'documentos confidenciais', claro."
1012303-85 = "Até que eu tenho as mãos bem habilidosas\nquando se trata de 'trabalho', sabia?"
1012303-86 = "...Hm?"
1012303-87 = "Se eu estou brava? Eu? Por que me pergunta isso?\n#nPor acaso... você achou mesmo que\neu tava irritada com você...?"
1012303-88 = "...Fufu."
1012303-89 = "A minha tolerância e o meu coração não são tão estreitos assim\npra eu me irritar com uma bobagem dessas."
1012303-90 = "...Bom."
1012303-91 = "Pode até ser que eu estivesse com um pouquinho\nde frustração acumulada, mas... graças a esse lugar gostoso,\nisso já não importa mais."
1012303-92 = "Nossa, nossa... aqui é um lugar realmente\nmacio e gostoso de sentar..."
1012303-96 = "...Bem no seu colo, Sensei."
1012303-97 = "Vamos, Sensei. Pode voltar ao trabalho.\n#nTermine isso bem rápido para podermos\nrelaxar e fazer outras coisas sem preocupação."
1012303-98 = "Senão――"
1012303-103 = "O tempo valioso que você deveria gastar esfregando... digo, dedicando a mim,\nvai acabar sendo roubado por esse trabalho inútil."
1012303-105 = "(Com a 'ajuda' da Seia ali perto, o trabalho daquele dia terminou muito mais rápido do que o esperado)"
1012303-106 = "(Ela tirou um cochilo bem gostoso no sofá da sala de descanso, e depois foi embora satisfeita)"