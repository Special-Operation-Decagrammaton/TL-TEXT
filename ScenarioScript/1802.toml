[translation]
1802-1 = "O Comitê de Justiça está de folga (2)"
1802-2 = "Academia Trinity - Jardim do Campus"
1802-3 = "(Clube de Literatura - Reunião de Almoço)"
1802-4 = "Vocês já leram a nova coletânea de poemas do sensei Yoshimoto que foi lançada recentemente?"
1802-5 = "Com certeza. A descrição dos sentimentos daquela garota, que teve que escolher se separar, foi tão dolorosa... Fiquei emocionada enquanto lia."
1802-6 = "……."
1802-7 = "Falando nisso, parece que o novo ensaio do sensei Nogami será lançado no final deste mês."
1802-8 = "Ah, essa me escapou. O trabalho anterior dele foi maravilhoso, estou ansiosa por este também."
1802-9 = "…………."
1802-10 = "Bem... e você, Mashiro-san? Tem lido algum livro interessante ultimamente?"
1802-11 = "E-eu? Bem, um livro que li recentemente... ah, um chamado 'Vamos Falar Sobre Justiça'..."
1802-12 = "'Vamos Falar Sobre Justiça'... ? Que tipo de livro é esse? Poesia? Ensaio? Ou um romance?"
1802-13 = "B-bem, é, hum, um livro que explica o que é a justiça através de vários exemplos..."
1802-14 = "Entendo, então é um livro de filosofia. Combina perfeitamente com a Mashiro-san, que é sempre tão séria."
1802-15 = "Se não se importar, poderia nos contar um pouco mais sobre o conteúdo?"
1802-16 = "Bem, é difícil explicar o conceito de 'justiça' de forma concisa... sabe como é..."
1802-19 = "(Que situação difícil... Quero voltar logo para o Comitê de Justiça...)"
1802-20 = "(Será que as veteranas estão bem...)"
1802-22 = "(Clube de Chá - Reunião de Chá Extraordinária)"
1802-23 = "Nossa, Hasumi-san, você é muito boa em preparar chá."
1802-24 = "É raro conseguir beber um chá tão delicioso quanto este...!"
1802-25 = "Eu também não sou nenhuma especialista, mas ouvi dizer que o sabor do chá muda sensivelmente dependendo da temperatura da água e do tempo de infusão."
1802-26 = "Seguindo o básico fielmente e respeitando o tempo e as medidas, o chá fica delicioso."
1802-27 = "Hasumi-san, como esperado de alguém do Comitê de Justiça. Seus modos são cheios de elegância..."
1802-28 = "Sim, cada palavra sua é refinada, e seu jeito de se vestir também é maravilhoso...!"
1802-29 = "São palavras gentis demais. Ainda tenho muito o que aprender."
1802-30 = "Mas, deixando isso de lado, estas folhas de chá têm um aroma muito bom. De onde são?"
1802-31 = "Parece que recebemos isso da Academia Gehenna como um sinal de intercâmbio. Foi compartilhado conosco pelo nosso conselho estudantil, o 'Tea Party', mas dizem que é um chá difícil de conseguir—"
1802-32 = "……Gehenna, você disse?"
1802-33 = "……Que erro imperdoável. Eu nem sabia que tinha recebido isso daquelas pessoas e tratei com tanto cuidado..."
1802-34 = "Se for para beber algo assim, seria melhor enxaguar a boca com água barrenta...!"
1802-35 = "Vamos queimar o resto das folhas junto com as folhas secas do jardim. Não posso beber algo que é puro lixo."
1802-37 = "……C-como esperado da vice-presidente do Comitê de Justiça. Você não tem piedade quando se trata de Gehenna."
1802-38 = "E-estou com medo..."
1802-40 = "(Clube de Doces Pós-Aula - Reunião Mensal de Segunda-feira)"
1802-41 = "……."
1802-42 = "…………."
1802-43 = "………………."
1802-46 = "……………………."
1802-47 = "(O clima está pesado...)"
1802-48 = "(O que é essa situação!? Por que a presidente do Comitê de Justiça está aqui!?)"
1802-49 = "(Não me pergunte...)"
1802-50 = "Haa..."
1802-51 = "(Ela está suspirando!? O que a gente faz!?)"
1802-52 = "(E-eu já disse, não me pergunte...!)"
1802-54 = "(Quer tentar falar com ela?)"
1802-55 = "(Tá falando sério!? E se ela decidir nos devorar!?)"
1802-57 = "(Devorar a gente!?)"
1802-58 = "(Acho difícil que ela chegue a esse ponto, mas...)"
1802-59 = "……."
1802-60 = "Kyaaaaaaaah!!"
1802-61 = "(Hiiiii!??)"
1802-62 = "(!?)"
1802-63 = "(Q-que foi de repente!? A gente fez alguma coisa!?)"
1802-64 = "(Não adianta me perguntar, eu não faço ideia...!)"
1802-65 = "……."
1802-66 = "……………"
1802-67 = "(Ah, ficou em silêncio.)"
1802-68 = "Hehe,"
1802-69 = "Hehehehehehehehe!!"
1802-73 = "(Q-que medo...)"
1802-74 = "(Não entendi nada...)"
1802-75 = "(Quero ir embora...)"
1802-77 = "Jardim da Academia Trinity"
1802-78 = "(No dia seguinte)"
1802-79 = "(Depois disso, os membros do Comitê de Justiça se reuniram no jardim)"
1802-80 = "Eu não fazia ideia de que seria tão difícil conversar de forma elegante, misturada com as alunas comuns de Trinity..."
1802-81 = "......Eu sinto que, desde aquele chá, várias pessoas têm me evitado...?"
1802-82 = "Tsurugi-senpai? Como foi para você, senpai?"
1802-83 = "……?"
1802-84 = "……."
1802-85 = "Foi muito, muito divertido."
1802-86 = "E todos me deram as boas-vindas, fiquei muito feliz."
1802-87 = "Hihi, kihi."
1802-88 = "Kihihihihihihihi!"
1802-89 = "……."
1802-90 = "Pelo visto, foi um momento extremamente divertido para ela."
1802-91 = "......É mesmo?"
1802-92 = "É um pouco irritante pensar que tudo saiu exatamente como a Nagisa-sama planejou, mas fico feliz que a Tsurugi tenha se sentido melhor. ...Dá para dizer que foi um mal que veio para o bem."
1802-93 = "Fiquei aliviada ao ver a Tsurugi com uma expressão tão relaxada. Com certeza foi um dia muito divertido para ela."
1802-94 = "......Será que o pessoal do Clube de Doces depois da aula também pensou o mesmo?"
1802-97 = "Ihihihihihihihi!"
1802-98 = "O Comitê de Justiça está de folga"
