[translation]
1802-1 = "正義実現委員会はお休みです（２）"
1802-2 = "トリニティ総合学園・校内の庭園"
1802-3 = "（純文学部・ランチ会）"
1802-4 = "先日新しく発売されたヨシモト先生の詩集、もう読まれましたか？"
1802-5 = "もちろんですわ。別れを選択せざるを得なかった、あの女の子の気持ちの描写が切なくって……読みながら感激してしまいました。"
1802-6 = "……。"
1802-7 = "そういえば、今月末にはノガミ先生の新しいエッセイが発売されるそうですよ。"
1802-8 = "あらっ、それは見落としておりました。前作も素敵でしたし、今から楽しみですわね。"
1802-9 = "…………。"
1802-10 = "えっと……マシロさんはいかがですか？最近読んだ面白い本などありますでしょうか？"
1802-11 = "わ、私ですか？えっと、最近読んだ本……あ、『正義のことを話そう』という本を……。"
1802-12 = "『正義のことを話そう』……？それはどういう本なのでしょう？詩集？エッセイ？それとも小説ですか？"
1802-13 = "そ、それは、えっと、正義とは何かということが様々な事例を通して書かれている……。"
1802-14 = "なるほど、哲学書なのですね。いつも真剣なマシロさんにぴったりです。"
1802-15 = "よろしければ、もう少し内容を教えていただけませんこと？"
1802-16 = "えっと、「正義」というものの話を簡潔に伝えるのは難しくてですね……その……。"
1802-19 = "（やりづらい…………早く正義実現委員会に戻りたい……）"
1802-20 = "（先輩たちは、大丈夫かな……）"
1802-22 = "（紅茶部・臨時のお茶会）"
1802-23 = "あらっ、ハスミさん、紅茶を淹れるのがとっても上手なのですね。"
1802-24 = "こんなに美味しい紅茶は、なかなか飲めません……！"
1802-25 = "私もそれほど詳しいわけではありませんが、紅茶の味はお水の温度と時間によって敏感に変わると聞きました。"
1802-26 = "基本を忠実に守り、時間や分量などをきっちり守ることで、紅茶は美味しくなるものだと。"
1802-27 = "ハスミさん、さすがは正義実現委員会のお方ですわね。立ち振る舞いも、気品が溢れていて……。"
1802-28 = "はい、言葉のひとつひとつにも品がありますし、着こなしも素敵です……！"
1802-29 = "身に余る言葉です。私も、まだまだ至らない点ばかりですから。"
1802-30 = "それよりもこの茶葉、良い香りですね。どこの茶葉ですか？"
1802-31 = "これは、先日ゲヘナ学園から交流の印として頂いたものみたいです。うちの生徒会、「ティーパーティー」から分けていただいたのですが、なかなか手に入らない紅茶だそうで――"
1802-32 = "……ゲヘナ、ですか？"
1802-33 = "……失態です。あの者たちから受け取ったとも知らず、丁寧に扱ってしまうだなんて……。"
1802-34 = "こんなものを飲むくらいなら、泥水で口をゆすいだ方がマシです……！"
1802-35 = "残りの茶葉は、その辺の落ち葉と一緒に燃やしましょう。ゴミを煎じて飲むわけにはいきません。"
1802-37 = "……さ、流石は正義実現委員会の副委員長。ゲヘナに関することには容赦ないですね。"
1802-38 = "こ、怖いです……。"
1802-40 = "（放課後スイーツ部・月曜日の定例会）"
1802-41 = "……。"
1802-42 = "…………。"
1802-43 = "………………。"
1802-46 = "……………………。"
1802-47 = "（空気が重い……）"
1802-48 = "（何この状況！？どうして正義実現委員会の委員長がここにいるわけ！？）"
1802-49 = "（私に聞かれても……）"
1802-50 = "はあ……。"
1802-51 = "（ため息ついてるじゃん！？どうしろっていうのよ！？）"
1802-52 = "（だ、だから私に聞かれても……！）"
1802-54 = "（声、かけてみる？）"
1802-55 = "（本気！？取って食われたらどうすんの！？）"
1802-57 = "（食べられちゃうの！？）"
1802-58 = "（いくら何でもそれないと思うけど……）"
1802-59 = "……。"
1802-60 = "くひゃあぁぁぁああっ！！"
1802-61 = "（ひいぃっ！？）"
1802-62 = "（！？）"
1802-63 = "（きゅ、急に何！？私たち何かした！？）"
1802-64 = "（私に聞かれても分からないってば……！）"
1802-65 = "………。"
1802-66 = "……………。"
1802-67 = "（あっ、静かになった）"
1802-68 = "げへっ、"
1802-69 = "げへへへへへへへへへっっ！！"
1802-73 = "（こ、こわい……）"
1802-74 = "（意味分かんない……）"
1802-75 = "（帰りたい……）"
1802-77 = "トリニティ総合学園・校内の庭園"
1802-78 = "（次の日）"
1802-79 = "（その後、正義実現委員会のメンバーが庭園に集まった）"
1802-80 = "普通のトリニティの生徒に混ざって、上品に会話をするのがこんなに難しいとは……知りませんでした。"
1802-81 = "……私はなんだか、あのお茶会以来、色々な方に避けられているような……？"
1802-82 = "ツルギ先輩？先輩はどうでしたか？"
1802-83 = "……？"
1802-84 = "……。"
1802-85 = "すごく、楽しかった。"
1802-86 = "それに、みんな歓迎してくれて、嬉しかった。"
1802-87 = "ひひ、きひっ。"
1802-88 = "きひひひひひひひひっ！"
1802-89 = "……。"
1802-90 = "どうやら、相当楽しい時間になったようですね。"
1802-91 = "……そうなんですか？"
1802-92 = "ナギサ様の手のひらの上のようで少々癪ですが、ツルギも気分が晴れたようで良かったです。……災い転じて福となす、とでも言いましょうか。"
1802-93 = "ツルギのこんなリラックスした顔を見られて、ホッとしました。きっとすごく楽しい一日だったのでしょう。"
1802-94 = "……放課後スイーツ部の人たちも、そう思ってくれたでしょうか？"
1802-97 = "いひひひひひひひひっ！"
1802-98 = "正義実現委員会はお休みです"
