[translation]
1007303-1 = "森の佇む小さなカフェ"
1007303-3 = "（ウイから教えてもらった「素敵な場所」に向かう）"
1007303-7 = "[ns1] \"……？\"\n[ns2] \"たぶん、この辺だと思うんだけど……。\""
1007303-12 = "あ、先生。"
1007303-16 = "どうぞこちらへ。"
1007303-20 = "[ns] 声が聞こえた方を向く。"
1007303-23 = "[wa:1200]― [log=우이 수영복ND]ど、[wa:1150]どうですか……？[/log]"
1007303-25 = "― [log=우이 수영복ND]私の、[wa:1500]隠れ家は……。[/log]"
1007303-28 = "― [log=우이 수영복ND]結構、[wa:1250]良い雰囲気[wa:1350]ですよね？[wa:2370]ひひ……。[/log]"
1007303-31 = "[ns3] \"自分で作ったの？\"\n[ns4] \"すごい、カフェみたいだね。\""
1007303-32 = "[wa:1150]― [log=우이 수영복ND]先生も、[wa:1570]中に入りますか？[/log]"
1007303-33 = "[wa:1150]― [log=우이 수영복ND]先生も、[wa:1570]中に入りますか？[/log]"
1007303-35 = "― [log=우이 수영복ND]意外と、[wa:1350]居心地いいですよ。[/log]"
1007303-38 = "― [log=우이 수영복ND]あ……[wa:1300]二人で入るには、[/log]"
1007303-40 = "[wa:200]― [log=우이 수영복ND]少し、[wa:1550]狭いですかね……。[/log]"
1007303-43 = "[wa:450]― [log=우이 수영복ND]……え？[wa:1800]見てるだけで、[wa:2070]十分……？[/log]"
1007303-46 = "― [log=우이 수영복ND]……それだと、[wa:2000]先生に[wa:1030]来ていただいた意味が……。[/log]"
1007303-49 = "[wa:4320]― [log=우이 수영복ND]……でも、[wa:1980]良いですね、[wa:1900]こういうの。[/log]"
1007303-52 = "― [log=우이 수영복ND]外も……[/log]"
1007303-54 = "― [log=우이 수영복ND]悪いことばかりでは、[wa:2550]ないのかもしれません。[/log]"
1007303-57 = "[wa:1150]― [log=우이 수영복ND]……あの、[wa:1550]先生……[/log]"
1007303-60 = "― [log=우이 수영복ND]もし、[wa:1400]よろしければ……。[/log]"
1007303-63 = "― [log=우이 수영복ND]一杯……[wa:2050]いかがですか？[/log]"
1007303-67 = "は、はい……どうぞ。"
1007303-68 = "森の中で飲むアイスアメリカーノは、一味違いますよ。"
1007303-69 = "この中は涼しいので、すぐに氷が溶けることもないですし……"
1007303-70 = "コーヒーの味を、ゆっくり味わっていただけます。"
1007303-71 = "[s5] ウイからコーヒーを受け取る。\n[s6] \"ありがとう、ちょうど喉が渇いてたんだ。\""
1007303-74 = "ふふっ……"
1007303-75 = "……あ。"
1007303-76 = "念のために言っておきますが……他の方には、内緒ですよ。"
1007303-77 = "静かに過ごしたくて探し回った、せっかくの隠れ家ですから。"
1007303-78 = "なので……"
1007303-79 = "先生だけに、特別です。"
1007303-80 = "え、えっと、その……先生にだけ教えたのは……"
1007303-81 = "誰も私の居場所を知らないと、皆さんに迷惑をかけてしまうかもしれませんし……"
1007303-82 = "私は自分の時間が欲しいだけで、余計な心配をかけたいわけではありません。"
1007303-83 = "せ、先生さえ知っていれば、他の方に探されることもないはずなので。"
1007303-87 = "いえ……"
1007303-88 = "……本当は、そんな理由なんて、どうでも良いんです。"
1007303-89 = "私が先生に……し、知っていただきたかった、それだけです。"
1007303-90 = "[s7] \"2人だけの貸切空間だね。\"\n[s8] \"秘密のカフェだなんて……カッコいいね！\""
1007303-93 = "2人だけの……秘密のカフェ……"
1007303-94 = "はい……"
1007303-95 = "……そうですね。"
1007303-96 = "いいですか？#n他の方は、連れてこないでくださいね。"
1007303-97 = "先生には、いつでもコーヒーをお出ししますが……"
1007303-98 = "ここは、私と先生だけの場所、ということで。"
1007303-102 = "どうでしょう？"
1007303-103 = "……ふふ。"
1007303-105 = "（その後、ウイとアイスアメリカーノを飲みながら、静かに夏を感じて過ごし……）"
1007303-109 = "（名残惜しかったが、日が暮れる前には拠点に戻った）"
