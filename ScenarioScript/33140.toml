[translation]
33140-1 = "Episódio 14;Dentro da Escuridão"
33140-5 = "UOOOOOON――――"
33140-10 = "C-confirmado…… aquilo é o tal……."
33140-11 = "A \"arma tática\", é…… é só um monstro."
33140-12 = "(Suave, ssuave……)"
33140-13 = "Uma obra fracassada, criada com base na \"doutrina antiga\"……? Aquela boneca fracassou, é isso?"
33140-14 = "(balança a cabeça)"
33140-15 = "(Suave, ssuave, suave, ssuave……)"
33140-16 = "As partes difíceis eu não entendo bem, mas…… mesmo sendo uma obra fracassada, não deixa de ser uma \"arma tática\"?"
33140-17 = "Se for isso, tudo bem…… mas já não tá na hora de descobrirem? Seja o \"Conselho dos Santos de Justina\", seja esta \"arma tática\", seja o nosso próximo alvo."
33140-22 = "……De todo jeito, já é tarde demais."
33140-23 = "Contatem as tropas em espera."
33140-24 = "A partir de agora, iniciamos o avanço sobre Trinity."
33140-26 = "Distrito autônomo de Trinity - Zona de ruínas abandonadas"
33140-31 = "Distrito autônomo de Trinity - Catacumbas"
33140-36 = "Distrito autônomo de Trinity - Canal subterrâneo"
33140-41 = "Muito bem, então, as ordens――"
33140-42 = "……."
33140-43 = "Líder?"
33140-44 = "A-aconteceu alguma coisa?"
33140-45 = "……Por quanto tempo a gente deixou este lugar vazio?"
33140-46 = "Umas 3 horas, eu acho……."
33140-47 = "……."
33140-48 = "……Ela está aqui."
33140-50 = "Ela?"
33140-51 = "(Suave, ssuave……)"
33140-52 = "A-a Azusa, é?"
33140-56 = "Hi, hiiiih!?"
33140-57 = "Booby-trap; quando foi que……!?"
33140-58 = "Ah, a-aqui também!?"
33140-62 = "……!!"
33140-68 = "Não se mexam!!"
33140-69 = "……Gh!"
33140-70 = "!!"
33140-71 = "……."
33140-72 = "O alvo disto é o nosso abalo. É pra aproveitar a nossa brecha."
33140-73 = "Como sempre, só nesse tipo de método ela é boa. Mas, ao contrário, se a gente lidar com calma……"
33140-77 = "Não, por essa sensação, provavelmente ainda tem mais ao redor!? Temos que sair logo……!"
33140-81 = "Hiyori!"
33140-85 = "Gh……!"
33140-86 = "Q-que sofrido, que dolorido…… por que a vida é tão……"
33140-91 = "……."
33140-92 = "……."
33140-93 = "……."
33140-94 = "Ela mirou claramente na Hiyori primeiro. Processar a atiradora antes quer dizer que……."
33140-95 = "……Ela quer levar pro corpo a corpo?"
33140-99 = "(clique)"
33140-100 = "!!"
33140-102 = "Em cima, granada!"
33140-106 = "Azusa Shirasu!!"
33140-113 = "Não vai escapar!!"
33140-114 = "Líder. Se for atrás, é exatamente o que ela quer……"
33140-118 = "……Bom, não tem jeito. Hime, e o estado da Hiyori?"
33140-119 = "(Suave, ssuave, suave……)"
33140-120 = "Sei."
33140-121 = "(Ssuave, suave……)"
33140-122 = "……Vai virar uma batalha longa? Bom, se a Azusa ficou séria, de fato……"
33140-129 = "……O tiro da Líder. Será que ela alcançou?"
33140-133 = "……."
33140-134 = "Não tem jeito. Vamos nós também, Hime."
33140-135 = "……."
33140-140 = "É por ali!!"
33140-144 = "Nada mau o julgamento, Azusa! De frente, você não me vence!"
33140-145 = "Fugindo desse jeito……"
33140-149 = "só te resta mirar na minha brecha, não é!!"
33140-151 = "Haa, haa…… dobrando a esquina, o próximo……!"
33140-158 = "!?"
33140-159 = "(clique)"
33140-163 = "……Gh!"
33140-164 = "……."
33140-165 = "Atsuko……."
33140-166 = "(Suave, ssuave……)"
33140-167 = "……Recuso."
33140-172 = "KABUUUM!!!"
33140-173 = "……!?"
33140-177 = "Azusa!!"
33140-178 = "Espera, Líder. Desse jeito não vai ter fim."
33140-179 = "Que tal chamar o Conselho dos Santos de Justina?"
33140-180 = "……."
33140-181 = "(balança a cabeça)"
33140-182 = "O Conselho dos Santos só intervém em conflitos entre Trinity e Gehenna…… e, além disso, há a possibilidade de a Azusa ser interpretada como não sendo aluna de Trinity."
33140-183 = "……Hmm, que estrutura mais trabalhosa."
33140-184 = "(assente, assente)"
33140-185 = "Pior: se a Azusa for interpretada como \"Squad de Arius\"……"
33140-186 = "……Bom, o preceito, no fim, também depende de interpretação, né. De fato, foi assim que a gente conseguiu essa força; é natural que haja restrições e penalidades."
33140-187 = "Sim. E é justamente por isso que só resta fazer assim."
33140-188 = "O jeito de lutar dela, o jeito de pensar…… tudo isso, no fundo, fui eu que ensinei. Só eu posso derrotá-la."
33140-189 = "Vamos atrás."
33140-193 = "……Então eu vou pelo lado oposto. Hime, você vai pelo outro caminho, tá."
33140-194 = "……."
33140-195 = "(Gogogogogogo……)"
33140-196 = "Que é isto, terremoto……? Não, não me diga……"
33140-197 = "Este andar, inteiro……?"
33140-198 = "Gogogogogo……!"
33140-199 = "Gh, quando foi que ela……! Perigo, o andar de cima vai desabar. Corram!"
33140-201 = "KABUUUUUUM!!!"
33140-203 = "Cof, cof…… ah……."
33140-204 = "Não dá pra se mexer, assim……."
33140-205 = "Azusaaa!!!"
33140-210 = "……Cof."
33140-228 = "Xeque-mate, Azusa."
33140-229 = "……Gh."
33140-232 = "……Pra você, até que foi bem-feito. Mesmo assim, é inútil. O seu jeito de pensar, o seu raciocínio; tudo isso, desde o começo, eu enxergo por inteiro……."
33140-233 = "Desde o começo, era uma resistência inútil."
33140-234 = "Desde quando……?"
33140-235 = "?"
33140-238 = "Desde quando a Arius tem coisas como mísseis de cruzeiro……?"
33140-239 = "E quando foi que vocês passaram a manejar aquele poder estranho……?"
33140-240 = "……E a \"bomba que destrói aureolas\" também."
33140-241 = "Desde quando, afinal……."
33140-244 = "……."
33140-245 = "Azusa, sabe por que você não consegue vencer?"
33140-246 = "Porque você é fraca."
33140-247 = "……."
33140-248 = "O que você acha que torna alguém um \"assassino\"?"
33140-249 = "É a existência, ou não, do \"instinto assassino\"."
33140-251 = "O primeiro \"assassino\" que aparece nas escrituras, dizem, matou uma pessoa com uma única pedra."
33140-252 = "É isso, Azusa. Havendo vontade, a ferramenta não importa. O que importa é só a \"vontade\" que se põe ali."
33140-253 = "Os mísseis e todos os outros meios não passam de ferramentas que provam o nosso rancor…… nada mais, nada menos."
33140-256 = "Saori……"
33140-257 = "Vou perguntar de novo: \"desde quando\"?"
33140-258 = "……!?"
33140-259 = "Esse rancor, eu, naquela época, só o \"aprendi\" naquele lugar…… esse rancor, afinal, é de quem――"
33140-260 = "Que vão."
33140-265 = "Fraca, Azusa Shirasu. Essa fraqueza é o que te amarra."
33140-269 = "Sim, como esse pelúcia que, mesmo numa situação destas, você não solta."
33140-270 = "!!"
33140-271 = "O primeiro presente que uma amiga te deu, é?"
33140-273 = "Que vão."
33140-320 = "Vão, vão, vão, vão, vão, vão, vão, vão, vão, vão, vão, vão, vão, vão, vão, vão, vão, vão, vão"
33140-354 = "Vão, vão, vão, vão, vão, vão, vão, vão, vão, vão, vão, vão, vão, vão, vão, vão, vão, vão, vão"
33140-387 = "Vão, vão, vão, vão, vão, vão, vão, vão, vão, vão, vão, vão, vão, vão, vão, vão, vão, vão, vão"
33140-388 = "Gh, aaah!?"
33140-389 = "Que vão, Azusa."
33140-390 = "Amizade, é…… então vamos começar destruindo essa coisa inútil e vã. Se não me engano, era Hifumi, né?"
33140-395 = "(balança a cabeça)"
33140-396 = "……Hime."
33140-397 = "……Não se preocupe, estou pegando leve. Essa daí, eu conheço bem――"
33140-407 = "Azusa, vai fugir de novo!"
33140-412 = "……."
33140-413 = "……Rápida na fuga como sempre."
33140-417 = "Bom, tanto faz; de todo jeito, ela vai voltar."
33140-418 = "……?"
33140-424 = "Afinal, ela deixou cair esta preciosa \"prova de amizade\"."
33140-425 = "……."
33140-426 = "Ela vai, sem falta, voltar pra recuperar isto."
33140-427 = "(Suave, ssuave……)"
33140-428 = "……O inseto que encontrou a luz dentro da escuridão já não consegue viver sem ela."
33140-429 = "Uma coisinha boba destas deve ser a luz que sustenta o coração da Azusa."
33140-430 = "Ela não consegue desistir disto; vai voltar, com toda a certeza."
33140-431 = "Nessa hora, eu a capturo de novo e, mais uma vez, ensino a ela a verdade deste mundo."
33140-433 = "Sim, nem que seja à força……"
33140-438 = "……Hm?"
33140-439 = "O quê, dentro……"
33140-446 = "……!!"
33140-447 = "Isto é o que entregamos no ataque à Seia……!"
33140-448 = "Foge, Hime!!!"
33140-449 = "……Gh!"
33140-461 = "……."
33140-462 = "…………."
33140-463 = "Uh……."
33140-464 = "Uh, uuh……."
33140-465 = "Desculpa, Hifumi…… desculpa……."
33140-466 = "Eu…… com isto, nunca mais…… uh, uuh……."
33140-468 = "Desculpa, desculpa, gente…… uh, uuuh……!! Aaah……!!!"
33140-471 = "Próximo Episódio;A Resposta à Quinta Regra Antiga"
