[translation]
33140-1 = "Episódio 14; Na escuridão"
33140-5 = "Uooooooooon――――"
33140-10 = "C-confirmei... aquilo é, o tal..."
33140-11 = "Uma \"arma tática\"... não passa de um monstro."
33140-12 = "(Suss, sussu...)"
33140-13 = "Criada com base na \"doutrina antiga\", uma falha...? Aquela boneca, quer dizer que ela é um fracasso?"
33140-14 = "(Balança a cabeça)"
33140-15 = "(Suss, sussu, suuu, sussu...)"
33140-16 = "Não entendo muito bem essas coisas complicadas, mas... mesmo sendo uma falha, não muda o fato de que é uma \"arma tática\", certo?"
33140-17 = "Se for assim, tudo bem... mas não está na hora de sermos descobertos? Tanto a \"Associação de Santas Justina\" quanto essa \"arma tática\", e também o nosso próximo objetivo."
33140-22 = "...De qualquer forma, já é tarde demais."
33140-23 = "Contatem as unidades em espera."
33140-24 = "A partir de agora, iniciaremos o avanço sobre Trinity."
33140-26 = "Distrito Autônomo de Trinity - Zona de Ruínas Abandonadas"
33140-31 = "Distrito Autônomo de Trinity - Catacumbas"
33140-36 = "Distrito Autônomo de Trinity - Canalização Subterrânea"
33140-41 = "Muito bem, então, as ordens são――"
33140-42 = "..."
33140-43 = "Líder?"
33140-44 = "A-aconteceu alguma coisa?"
33140-45 = "...Há quanto tempo estamos fora daqui?"
33140-46 = "Umas 3 horas, eu diria..."
33140-47 = "..."
33140-48 = "...Ela está aqui."
33140-50 = "Ela?"
33140-51 = "(Suss, sussu...)"
33140-52 = "A-Azusa-chan, por acaso?"
33140-56 = "Hii, hiiiiiii!?"
33140-57 = "Armadilhas explosivas, desde quando...!?"
33140-58 = "A-aqui também!?"
33140-62 = "...!!"
33140-68 = "Não se movam!!"
33140-69 = "...!"
33140-70 = "!!"
33140-71 = "..."
33140-72 = "O objetivo disso é nos deixar abalados. É para explorar nossas brechas."
33140-73 = "Como sempre, ela é boa apenas nesse tipo de tática. Mas, se lidarmos com calma..."
33140-77 = "Não, com essa sensação, provavelmente ainda há mais por perto!? Precisamos sair logo...!"
33140-81 = "Hiyori!"
33140-85 = "Droga...!"
33140-86 = "Q-que sufoco, que dor... por que a vida é tão..."
33140-91 = "..."
33140-92 = "..."
33140-93 = "..."
33140-94 = "Ela claramente mirou na Hiyori primeiro. Se ela eliminou a atiradora, isso significa..."
33140-95 = "...Ela pretende partir para o combate corpo a corpo?"
33140-99 = "(Click)"
33140-100 = "!!"
33140-102 = "Cima, granada!"
33140-106 = "Shirasu Azusa!!"
33140-113 = "Não vai escapar!!"
33140-114 = "Líder. Se a perseguirmos, cairemos exatamente na armadilha dela..."
33140-118 = "...Bem, não tem jeito. Princesa, como está o estado da Hiyori?"
33140-119 = "(Sussurro, sussurro...)"
33140-120 = "Entendo."
33140-121 = "(Sussurro, sussurro...)"
33140-122 = "...Vai ser uma batalha longa? Bem, se a Azusa levar a sério, com certeza..."
33140-129 = "...O tiro da líder. Será que ela a alcançou?"
33140-133 = "..."
33140-134 = "Não tem jeito. Vamos também, Princesa."
33140-135 = "..."
33140-140 = "É por ali!!"
33140-144 = "Nada mal o seu julgamento, Azusa! Você não pode me vencer em um confronto direto!"
33140-145 = "Fugindo desse jeito..."
33140-149 = "Você só tem a chance de atacar quando eu baixar a guarda!!"
33140-151 = "Haa, haa... Dobrar a esquina, e depois...!"
33140-158 = "¡?"
33140-159 = "(Click)"
33140-163 = "...!"
33140-164 = "..."
33140-165 = "Atsuko..."
33140-166 = "(Sussurro, sussurro...)"
33140-167 = "...Eu recuso."
33140-172 = "BOOOOM!!!"
33140-173 = "...!?"
33140-177 = "Azusa!!"
33140-178 = "Espere, líder. Desse jeito não vamos chegar a lugar nenhum."
33140-179 = "Por que não chama a Associação de Santas Justina?"
33140-180 = "..."
33140-181 = "(Balança a cabeça)"
33140-182 = "A Associação de Santas só intervém em conflitos entre Trinity e Gehenna... Além disso, existe a possibilidade de interpretarem que a Azusa não é uma aluna de Trinity."
33140-183 = "...Hum, é uma estrutura bem complicada, não é?"
33140-184 = "(Assente)"
33140-185 = "Pior ainda, se interpretarem que a Azusa é do 'Esquadrão Arius'..."
33140-186 = "...Bem, no fim das contas, os dogmas dependem da interpretação. É verdade que conseguimos esse poder dessa forma, então talvez seja natural que existam restrições e penalidades."
33140-187 = "Sim. É por isso que não temos outra escolha."
33140-188 = "O jeito dela lutar, o modo como pensa... Tudo isso foi basicamente o que eu ensinei. Ninguém além de mim pode derrotá-la."
33140-189 = "Vamos persegui-la."
33140-193 = "...Então, eu vou pelo outro lado. Princesa, por favor, vá pelo outro caminho."
33140-194 = "..."
33140-195 = "(Estrondo, estrondo...)"
33140-196 = "O que é isso, um terremoto...? Não, não pode ser..."
33140-197 = "Neste andar inteiro...?"
33140-198 = "Estrondo, estrondo...!"
33140-199 = "Droga, desde quando isso...! Péssimo, o andar de cima vai desabar. Corram!"
33140-201 = "BOOOOOOOOM!!!"
33140-203 = "Cof, cof... Ah..."
33140-204 = "Não consigo me mover, isso é..."
33140-205 = "Azusaaaa!!!"
33140-210 = "...Cof."
33140-228 = "Xeque-mate, Azusa."
33140-229 = "……ugh."
33140-232 = "……Você fez um bom trabalho para alguém como você. Ainda assim, é inútil. Sua maneira de pensar, seu raciocínio, tudo isso estava claro para mim desde o início……."
33140-233 = "Desde o começo, foi uma resistência inútil."
33140-234 = "Desde quando……?"
33140-235 = "?"
33140-238 = "Desde quando Arius tem algo como mísseis de cruzeiro……?"
33140-239 = "E desde quando vocês conseguiram manipular um poder tão estranho……?"
33140-240 = "……E aquela 'bomba que destrói halos' também."
33140-241 = "Afinal, desde quando……."
33140-244 = "……."
33140-245 = "Azusa, você sabe por que não consegue vencer?"
33140-246 = "Porque você é fraca."
33140-247 = "……."
33140-248 = "O que você acha que torna alguém um 'assassino'?"
33140-249 = "É a presença ou ausência de 'intenção de matar'."
33140-251 = "Dizem que o primeiro 'assassino' que aparece nas escrituras matou alguém com apenas uma pedra."
33140-252 = "É disso que se trata, Azusa. Se você tem a vontade, a ferramenta não importa. O que é importante é apenas a 'vontade' contida nela."
33140-253 = "Os mísseis, incluindo outros meios e qualquer outra coisa, são apenas ferramentas para provar nosso ressentimento…… nada mais, nada menos."
33140-256 = "Saori……"
33140-257 = "Vou perguntar de novo, 'desde quando'?"
33140-258 = "……!?"
33140-259 = "Esse ressentimento, eu apenas 'aprendi' lá naquele momento…… esse ressentimento, afinal, de quem é――"
33140-260 = "Vazio."
33140-265 = "Você é fraca, Shirasu Azusa. Essa fraqueza está prendendo você."
33140-269 = "Sim, como esse boneco que você não consegue soltar nem mesmo nesta situação."
33140-270 = "!!"
33140-271 = "Foi o primeiro presente que uma amiga te deu, não é?"
33140-273 = "Que vazio."
33140-320 = "Vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio"
33140-354 = "Vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio"
33140-387 = "Vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio"
33140-388 = "Guh, aaaaah!?"
33140-389 = "Que vazio, Azusa."
33140-390 = "Amizade, é…… então, vou destruir essa coisa inútil e vazia. Hifumi, era esse o nome?"
33140-395 = "(Tremendo)"
33140-396 = "……Princesa."
33140-397 = "……Não precisa se preocupar, estou pegando leve. Eu conheço bem essa coisa――"
33140-407 = "Azusa, você vai fugir de novo!"
33140-412 = "……."
33140-413 = "……Como sempre, você é rápida para fugir."
33140-417 = "Bem, não importa, ela voltará de qualquer jeito."
33140-418 = "……?"
33140-424 = "Afinal, ela deixou cair essa importante 'prova de amizade'."
33140-425 = "……."
33140-426 = "Ela certamente voltará para recuperar isso."
33140-427 = "(Sussurro, sussurro……)"
33140-428 = "……Um inseto que encontrou a luz na escuridão não consegue mais viver sem ela."
33140-429 = "Essa coisa sem importância deve ser a luz da esperança que sustenta o coração da Azusa."
33140-430 = "Ela não consegue desistir disso, ela definitivamente vai voltar."
33140-431 = "Naquela hora eu vou te capturar de novo, e te ensinarei a verdade deste mundo mais uma vez."
33140-433 = "Sim, mesmo que seja à força..."
33140-438 = "…Hm?"
33140-439 = "O que é isso, dentro..."
33140-446 = "…!!"
33140-447 = "Isso é o que eu entreguei na época do ataque à Seia...!"
33140-448 = "Fuja, Princesa!!!"
33140-449 = "…!"
33140-461 = "…."
33140-462 = "…………."
33140-463 = "Ugh..."
33140-464 = "Ugh, ugh..."
33140-465 = "Desculpe, Hifumi... desculpe..."
33140-466 = "Eu... com isso, nunca mais... ugh, ugh..."
33140-468 = "Desculpe, desculpe, pessoal... ugh, ughhh...!! Aaaah...!!!"
33140-471 = "Próximo episódio: A resposta para o quinto princípio antigo"
