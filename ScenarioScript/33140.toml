[translation]
33140-1 = "Episódio 14; Na Escuridão"
33140-5 = "Wooooooooooon――――"
33140-10 = "C-Confirmado... aquilo é a tal..."
33140-11 = "'Arma tática', hein... parece só um monstro."
33140-12 = "(Sss, Sss...)"
33140-13 = "Um fracasso criado com base nos 'Dogmas Antigos'...? Quer dizer que a criação daquela boneca deu errado?"
33140-14 = "(Abalando a cabeça)"
33140-15 = "(Sss, Sss, Sss, Sss...)"
33140-16 = "Não entendo muito dessas coisas difíceis, mas... mesmo sendo um fracasso, ainda é uma 'arma tática', não é?"
33140-17 = "Então tá bom... mas não tá na hora deles descobrirem? Seja a 'Sociedade dos Santos Justina', essa 'arma tática', ou o nosso próximo alvo."
33140-22 = "......De qualquer forma, já é tarde demais."
33140-23 = "Contate as tropas em espera."
33140-24 = "A partir de agora, iniciamos o avanço contra a Trinity."
33140-26 = "Distrito Autônomo da Trinity - Área de Ruínas Abandonadas"
33140-31 = "Distrito Autônomo da Trinity - Catacumbas"
33140-36 = "Distrito Autônomo da Trinity - Aqueduto Subterrâneo"
33140-41 = "Certo, então a ordem é――"
33140-42 = "......"
33140-43 = "Líder?"
33140-44 = "A-Aconteceu alguma coisa?"
33140-45 = "......Quanto tempo nós deixamos este lugar vazio?"
33140-46 = "Umas 3 horas, eu acho..."
33140-47 = "......"
33140-48 = "......Ela está aqui."
33140-50 = "Ela?"
33140-51 = "(Sss, Sss...)"
33140-52 = "A-A Azusa-chan?"
33140-56 = "Hiii, hiiii!?"
33140-57 = "Armadilhas, desde quando...!?"
33140-58 = "A-A-Aqui também!?"
33140-62 = "......!!"
33140-68 = "Não se movam!!"
33140-69 = "......!"
33140-70 = "!!"
33140-71 = "......"
33140-72 = "O objetivo dela é nos abalar. É para criar uma brecha."
33140-73 = "Ela continua boa nesse tipo de coisa. Mas, por outro lado, se lidarmos com isso com calma..."
33140-77 = "Não, por essa sensação, provavelmente ainda tem mais ao redor!? Temos que sair logo...!"
33140-81 = "Hiyori!"
33140-85 = "Ugh...!"
33140-86 = "E-Está doendo, muito... por que a vida é tão..."
33140-91 = "......"
33140-92 = "......"
33140-93 = "......"
33140-94 = "Ela claramente mirou na Hiyori. Ter eliminado a atiradora primeiro significa que..."
33140-95 = "......Ela quer forçar um combate de perto?"
33140-99 = "(Click)"
33140-100 = "!!"
33140-102 = "Em cima, granada!"
33140-106 = "Azusa Shirasu!!"
33140-113 = "Não vou deixar você escapar!!"
33140-114 = "Líder. Se a gente for atrás dela, é exatamente o que ela quer..."
33140-118 = "......Bom, não tem jeito. Princesa, como está a Hiyori?"
33140-119 = "(Sss, Sss, Sss...)"
33140-120 = "Entendi."
33140-121 = "(Sss, Sss...)"
33140-122 = "......Vai ser uma luta longa? É, se a Azusa estiver falando sério..."
33140-129 = "......Tiro da líder. Acho que ela a alcançou."
33140-133 = "......"
33140-134 = "Não tem jeito. Vamos também, Princesa."
33140-135 = "......"
33140-140 = "É por aí!!"
33140-144 = "A sua decisão não é ruim, Azusa! Você não pode me vencer num confronto direto!"
33140-145 = "Por isso está fugindo..."
33140-149 = "A única opção é tentar me pegar de surpresa!!"
33140-151 = "*Haa, haa*... Virar a esquina, a próxima...!"
33140-158 = "!?"
33140-159 = "(Clack)"
33140-163 = "......!"
33140-164 = "......"
33140-165 = "Atsuko..."
33140-166 = "(Sss, Sss...)"
33140-167 = "......Recuso."
33140-172 = "DOKAAAAAAN!!!"
33140-173 = "......!?"
33140-177 = "Azusa!!"
33140-178 = "Espera, líder. Isso não vai acabar nunca."
33140-179 = "Por que não chamamos a Sociedade dos Santos Justina?"
33140-180 = "......"
33140-181 = "(Abalando a cabeça)"
33140-182 = "A Sociedade dos Santos só intervém no conflito entre Trinity e Gehenna... E também existe a possibilidade de interpretarem que a Azusa não é uma aluna da Trinity."
33140-183 = "......Hum, é um sistema bem chato."
33140-184 = "(Concordando)"
33140-185 = "Além disso, se interpretarem que a Azusa é do 'Esquadrão Arius'..."
33140-186 = "......Bom, no fim das contas, os mandamentos dependem da interpretação. É verdade que esse poder foi obtido dessa forma, então é natural que haja restrições e penalidades."
33140-187 = "Sim. Por isso, essa é a única maneira."
33140-188 = "O estilo de luta dela, a forma como ela pensa... fui eu quem ensinou tudo isso. Só eu posso derrotá-la."
33140-189 = "Vou atrás dela."
33140-193 = "...Então, eu vou pelo outro lado. Princesa, por favor, vá por outro caminho."
33140-194 = "......"
33140-195 = "(RUMBLE RUMBLE RUMBLE...)"
33140-196 = "O que é isso, um terremoto...? Não, não me diga que..."
33140-197 = "Nesse andar inteiro...?"
33140-198 = "RUMBLE RUMBLE RUMBLE...!"
33140-199 = "Ugh, quando foi que ela armou tudo isso...! Merda, o andar de cima vai desabar. Corram!"
33140-201 = "DOKAAAAAAAAAAAAAAN!!!"
33140-203 = "*Cof, cof*... Aah..."
33140-204 = "Isso me imobilizou de vez..."
33140-205 = "Azusaaaaaaa!!!"
33140-210 = "......*Cof*."
33140-228 = "Xeque-mate, Azusa."
33140-229 = "......Ugh."
33140-232 = "......Para os seus padrões, você foi bem. Mas mesmo assim, é inútil. A sua forma de pensar, a sua lógica, eu já previa tudo desde o início..."
33140-233 = "Desde o começo, foi uma resistência inútil."
33140-234 = "Desde quando...?"
33140-235 = "?"
33140-238 = "Desde quando a Arius possui coisas como mísseis de cruzeiro...?"
33140-239 = "E desde quando passamos a conseguir manipular um poder tão estranho...?"
33140-240 = "......E aquela 'bomba que destrói o halo' também."
33140-241 = "Desde quando, exatamente..."
33140-244 = "......"
33140-245 = "Azusa, você sabe por que não consegue vencer?"
33140-246 = "Porque você é fraca."
33140-247 = "......"
33140-248 = "O que você acha que faz de alguém um 'assassino'?"
33140-249 = "É a presença ou ausência da 'intenção de matar'."
33140-251 = "Dizem que o primeiro 'assassino' das escrituras matou alguém com apenas uma pedra."
33140-252 = "É sobre isso, Azusa. Se houver a vontade, os meios não importam. O que importa é apenas a 'vontade' colocada ali."
33140-253 = "Os mísseis e os outros meios não passam de ferramentas para provar o nosso ódio... nada mais, nada menos."
33140-256 = "Saori..."
33140-257 = "Vou perguntar de novo, 'desde quando'?"
33140-258 = "......!?"
33140-259 = "Esse ódio, eu só 'aprendi' sobre ele lá... De quem é esse ódio, afinal――"
33140-260 = "É tudo vaidade."
33140-265 = "Você é fraca, Azusa Shirasu. Essa sua fraqueza é o que te prende."
33140-269 = "Sim, como esse bichinho de pelúcia que você não solta nem numa situação dessas."
33140-270 = "!!"
33140-271 = "O primeiro presente que a sua amiguinha te deu, é?"
33140-273 = "Que vazio."
33140-320 = "Vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio"
33140-354 = "Vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio"
33140-387 = "Vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio, vazio"
33140-388 = "Guh, aaaaah!?"
33140-389 = "Que vazio, Azusa."
33140-390 = "Amizade, é...? Então vou destruir essa coisa inútil e vazia primeiro. O nome dela era Hifumi, certo?"
33140-395 = "(Abalando a cabeça)"
33140-396 = "......Princesa."
33140-397 = "......Não se preocupe, eu estou pegando leve. Eu sei muito bem do que ela é capaz――"
33140-407 = "Azusa, você vai fugir de novo!"
33140-412 = "......"
33140-413 = "......Continua rápida pra fugir."
33140-417 = "Tudo bem, ela vai voltar de qualquer jeito."
33140-418 = "......?"
33140-424 = "Afinal, ela deixou cair esse precioso 'símbolo de amizade'."
33140-425 = "......"
33140-426 = "Ela com certeza vai voltar para recuperar isso."
33140-427 = "(Sss, Sss...)"
33140-428 = "......Um inseto que encontra a luz na escuridão não consegue mais viver sem ela."
33140-429 = "Essa coisinha sem graça deve ser a luz que sustenta o coração da Azusa."
33140-430 = "Ela não vai conseguir desistir disso, ela vai voltar com certeza."
33140-431 = "E quando ela voltar, eu vou capturá-la de novo e ensinar a ela a verdade deste mundo."
33140-433 = "Sim, mesmo que seja à força..."
33140-438 = "......Hum?"
33140-439 = "O que é isso, tem alguma coisa aqui dentro..."
33140-446 = "......!!"
33140-447 = "Isso é o que eu entreguei a ela durante o ataque à Seia...!"
33140-448 = "Foge, Princesa!!!"
33140-449 = "......!"
33140-461 = "......"
33140-462 = "............"
33140-463 = "Ugh..."
33140-464 = "Ugh, ugh..."
33140-465 = "Desculpa, Hifumi... Desculpa..."
33140-466 = "Eu... agora, nunca mais... ugh, ugh..."
33140-468 = "Desculpa, me desculpem, meninas... ugh, ugh...!! Aaaaaah...!!!"
33140-471 = "Próximo Episódio; A Resposta Para a Quinta Regra Antiga"