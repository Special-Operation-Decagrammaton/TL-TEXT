[translation]
10010105-1 = "Episódio 10: Para não deixar terminar (2)"
10010105-11 = "（……Acordei naturalmente, talvez porque o cansaço passou）"
10010105-12 = "……A-acordou, Sensei?"
10010105-19 = "V-você acordou mais cedo do que eu pensava…… Por acaso, o barulho do trabalho te incomodou……?"
10010105-20 = "A outra pessoa…… continua dormindo profundamente, falando enquanto sonha……."
10010105-22 = "Nnn…… faz cócegas, fufu……."
10010105-23 = "……E-está assim faz um tempo."
10010105-24 = "Que tipo de sonho ela está tendo, afinal…… Até agora pouco, ela parecia estar exausta……."
10010105-25 = "[s1] \"……Ui, bom trabalho também. Obrigado.\"\n[s2] \"O trabalho está indo bem?\""
10010105-28 = "B-bem, suponho que sim……."
10010105-29 = "Eu disse que podia deixar comigo, então não posso dizer que não deu certo……."
10010105-30 = "E…… deve ficar pronto em mais ou menos uma hora."
10010105-31 = "[s3] \"Que rapidez, e olha que estava tudo espalhado…….\"\n[s4] \"Como esperado da maga.\""
10010105-34 = "E-eu não ganho nada sendo elogiada assim, mas……."
10010105-35 = "Bem, não é que eu não goste…… é que eu raramente sou elogiada, então……."
10010105-36 = "D-de qualquer forma…… sim, obrigada……."
10010105-37 = "……."
10010105-38 = "I-isso é, bem……."
10010105-39 = "Foi só um pensamento em voz alta enquanto trabalhava…… p-pense que foi só isso."
10010105-40 = "N-na verdade, pedir para trazer o bolo foi…… uma espécie de provocação, por assim dizer."
10010105-41 = "Como me trouxeram um caso impossível, eu acabei dizendo algo impossível também…… saiu sem eu pensar."
10010105-42 = "Por isso, honestamente, eu não estava esperando nada……."
10010105-43 = "Mas a Hinata, e você, Sensei, compraram mesmo…… resolveram o problema…… e a Hinata continuou se esforçando para fazer o que é certo, do jeito dela……."
10010105-44 = "N-não que eu vá mudar de opinião sobre ela imediatamente por causa disso, mas……."
10010105-45 = "Bem……."
10010105-46 = "[s5] \"Por causa disso, ela está se esforçando.\"\n[s6] \"……Você sentiu algo diferente?\""
10010105-47 = "Quem sabe……."
10010105-48 = "Quem sabe……."
10010105-49 = "Eu não pretendo dizer facilmente que \"nos tornamos amigas\"…… mas……."
10010105-51 = "Se fosse antes, eu…… definitivamente não teria dito para você dormir aqui…… provavelmente."
10010105-52 = "É-é estranho até para mim……."
10010105-56 = "Além disso, a-a essa hora da noite……."
10010105-57 = "Estar conversando com alguém assim, é, bem, uma sensação estranha……."
10010105-59 = "Talvez…… é só um \"talvez\", mas……."
10010105-60 = "Por causa disso, eu também……."
10010105-61 = "E-estou, como posso dizer, me abrindo……."
10010105-62 = "Isso……."
10010105-63 = "Fuah……! Dormi muito bem."
10010105-65 = "……."
10010105-69 = "……A-ah? Onde estou……."
10010105-70 = "I-isso mesmo. A restauração das escrituras……."
10010105-71 = "Bem, que horas são……?"
10010105-72 = "Ah, o horário da chamada do dormitório já passou……."
10010105-73 = "……Horário da chamada?"
10010105-74 = "Hinata, você finalmente acordou——"
10010105-76 = "Horário da chamada!?"
10010105-77 = "……Q-que foi, de repente?"
10010105-78 = "[ns7] \"Hinata……?\"\n[ns8] \"O que houve?\""
10010105-79 = "É-é-é-é-é um problema, Sensei! A chamada, o horário da chamada já passou……!?"
10010105-80 = "É-é-é-é-é um problema, Sensei! A chamada, o horário da chamada já passou……!?"
10010105-81 = "Já chegou nessa hora sem eu nem perceber...! O-o que eu faço...!?"
10010105-82 = "...Eu me perguntava por que tanto barulho. Por favor, não faça esse escândalo todo por causa da chamada do dormitório. Além disso, ainda estou trabalhando..."
10010105-83 = "M-m-mas! Eu vou levar bronca! Se as outras irmãs souberem que eu cochilei e me atrasei para a chamada, não consigo nem imaginar o tipo de repreensão que vou receber...!"
10010105-84 = "A-a Sisterhood é bem rigorosa, hein... Não sei muito sobre os assuntos internos de vocês, mas acho que é exatamente como eu imaginava. Dito isso, por favor, faça silêncio..."
10010105-85 = "O-o que eu faço!? O-o que eu deveria dizer, afinal...!? Se continuar assim, eu...!"
10010105-86 = "Silêncio..."
10010105-88 = "Si..."
10010105-90 = "P-primeiro de tudo, preciso entrar em contato com o dormitório...!"
10010105-91 = "Faça silêncio!!!!"
10010105-92 = "Iiiih!?"
10010105-93 = "[s9] \"Ah...\"\n[s10] \"Dessa vez não teve jeito...\""
10010105-94 = "Quantas vezes vou ter que dizer para você ficar em silêncio!? Hein!?"
10010105-95 = "Quantas vezes vou ter que dizer para você ficar em silêncio!? Hein!?"
10010105-96 = "D-desculpe...!? M-mas, sabe, é que...!"
10010105-97 = "Uuu, me desculpe..."
10010105-102 = "Coloque o celular no modo silencioso!!"
10010105-103 = "Sim, vou mudar agora mesmo...!"
10010105-104 = "...?"
10010105-108 = "...Hã?"
10010105-110 = "...O que foi agora?"
10010105-111 = "Bem..."
10010105-112 = "E-é mentira, né? Essa mensagem de agora..."
10010105-113 = "O aviso geral..."
10010105-114 = "...Aviso geral?"
10010105-115 = "Bem, diz: \"Aviso. Sobre a cerimônia de leitura e exposição das escrituras agendada para amanhã...\""
10010105-116 = "..."
10010105-117 = "[s11] \"Hinata...?\"\n[s12] \"E o resto...?\""
10010105-118 = "\"Por decisão unânime de todos os participantes, a data foi antecipada.\""
10010105-119 = "\"Por decisão unânime de todos os participantes, a data foi antecipada.\""
10010105-120 = "\"O horário de início da cerimônia será hoje à meia-noite.\"..."
10010105-121 = "...Meia-noite?"
10010105-122 = "..."
10010105-124 = "Meia-noite de hoje, isso significa..."
10010105-131 = "Daqui a uma hora, então..."
