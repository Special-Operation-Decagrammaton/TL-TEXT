[translation]
10010105-1 = "第10話;終わらせないために（２）"
10010105-11 = "（……疲れが取れたからか、自然と目が覚めた）"
10010105-12 = "……お、お目覚めですか、先生。"
10010105-19 = "お、思ったより、早かったですね……もしかして、作業の音が気になりましたか……？"
10010105-20 = "もう一方は……寝言を言いながら、ぐっすりですが……。"
10010105-22 = "んんっ……くすぐったいです、ふふっ……。"
10010105-23 = "……さ、さっきから、ずっとこんな感じです"
10010105-24 = "いったい、どんな夢を見ているのか……さっきまで、かなり疲弊した様子だったのに……。"
10010105-25 = "[s1] \"……ウイも、お疲れ様。ありがとう。\"\n[s2] \"作業は順調？\""
10010105-28 = "ま、まあ、そうですね……。"
10010105-29 = "任せてくださいと啖呵を切って、だ、ダメでしたとは言えないので……。"
10010105-30 = "あと……だいたい一時間くらいで、完成しそうです。"
10010105-31 = "[s3] \"すごい速さだね、あんなバラバラだったのに……。\"\n[s4] \"さすがは魔術師。\""
10010105-34 = "そ、そうやって褒められても、何も出ませんが……。"
10010105-35 = "まあ、嫌ではないものの……そもそも褒められることも、少ないので……。"
10010105-36 = "と、とにかく……はい、ありがとうございます……。"
10010105-37 = "……。"
10010105-38 = "こ、これは、ですね……。"
10010105-39 = "作業中のひとり言……そ、そんなものだと、思ってください。"
10010105-40 = "じ、実はケーキを取ってきて欲しいというのは……やや嫌がらせのようなもの、と言いますか。"
10010105-41 = "む、無茶な案件を持ち込まれたので、少しこっちも無理なことを言おうと……口から出てしまったんです。"
10010105-42 = "ですので正直なところ、期待はしていませんでした……。"
10010105-43 = "ですがヒナタさんは、そして先生はちゃんと買ってきて……トラブルも解決してて……ヒナタさんなりに正しくあろうと、ずっと頑張って……。"
10010105-44 = "だ、だからと言って、すぐに見方を変えるわけではありませんが……。"
10010105-45 = "えっと……。"
10010105-46 = "[s5] \"それもあって、頑張ってくれてるんだ。\"\n[s6] \"……少し感じるところがあったとか？\""
10010105-47 = "どう、ですかね……。"
10010105-48 = "どう、ですかね……。"
10010105-49 = "な、「仲良くなった」だなんて、簡単に言うつもりもありません……ですが……。"
10010105-51 = "以前だったら、その……ここで寝てくださいとは、絶対に言いませんでした……多分。"
10010105-52 = "じ、自分でも、不思議です……。"
10010105-56 = "それに、こ、こんな遅い時間に……。"
10010105-57 = "こうして、だ、誰かと話しているなんて、その、不思議な感じで……。"
10010105-59 = "もしかしたら……あくまで「もしかしたら」という話、ですが……。"
10010105-60 = "その分、私も……。"
10010105-61 = "こ、こう、向き合うと言いますか……。"
10010105-62 = "その……。"
10010105-63 = "ふあっ……！良く寝ました。"
10010105-65 = "……。"
10010105-69 = "……あ、あれ？ここは……。"
10010105-70 = "そ、そうでした。経典の復元を……。"
10010105-71 = "えっと、今の時間は……？"
10010105-72 = "あっ、寮の点呼の時間、過ぎてしまいました……。"
10010105-73 = "……点呼の、時間？"
10010105-74 = "ヒナタさん、ようやくお目覚め――"
10010105-76 = "点呼の時間！？"
10010105-77 = "……な、何ですか急に。"
10010105-78 = "[ns7] \"ヒナタ……？\"\n[ns8] \"どうしたの？\""
10010105-79 = "た、たたたたた大変です先生！点呼、点呼の時間を過ぎてしまいました……！？"
10010105-80 = "た、たたたたた大変です先生！点呼、点呼の時間を過ぎてしまいました……！？"
10010105-81 = "いつの間にもう、こんな時間に……！ど、どうすれば……！？"
10010105-82 = "……何を騒いでいるのかと思ったら。寮の点呼くらいでそんなにうるさくしないでください。それにまだ作業中で……"
10010105-83 = "だだだ、だって！怒られちゃいます！居眠りをして点呼に遅れるだなんて、他のシスターに知られたらどんな叱責を受けることか……！"
10010105-84 = "し、シスターフッドは厳しいんですね……内情についてはあんまり知りませんが、イメージ通りといえばイメージ通りでしょうか。というか、静かにしてください……。"
10010105-85 = "ど、どうしましょう！？い、一体何と言えば……！？このままですと私……！"
10010105-86 = "静かに……"
10010105-88 = "し……"
10010105-90 = "ま、まずとにかく寮に連絡を……！"
10010105-91 = "静かにしなさい！！！！"
10010105-92 = "ひいいっ！？"
10010105-93 = "[s9] \"あー……。\"\n[s10] \"今のは仕方ない……。\""
10010105-94 = "静かにしなさいって何度言えば分かるんですか！？ねぇ！？"
10010105-95 = "静かにしなさいって何度言えば分かるんですか！？ねぇ！？"
10010105-96 = "す、すみません……！？で、ですがその、えっと……！"
10010105-97 = "うぅ、ごめんなさい……。"
10010105-102 = "スマホはマナーモードに！！"
10010105-103 = "はいっ、すぐに切り替えます……！"
10010105-104 = "……？"
10010105-108 = "……え？"
10010105-110 = "……今度は何ですか。"
10010105-111 = "えっと……。"
10010105-112 = "え、嘘ですよね？今の、メッセージ……。"
10010105-113 = "全体連絡が……。"
10010105-114 = "……全体連絡？"
10010105-115 = "えっと、「お知らせです。明日に予定されていた経典の公開および朗読の式典につきまして……"
10010105-116 = "……。"
10010105-117 = "[s11] \"ヒナタ……？\"\n[s12] \"続きは……？\""
10010105-118 = "「ご出席される方々の全会一致で、日程を早めることになりました」"
10010105-119 = "「ご出席される方々の全会一致で、日程を早めることになりました」"
10010105-120 = "「式典の開催時間は、今夜の12時とします」……"
10010105-121 = "……12時？"
10010105-122 = "……。"
10010105-124 = "今夜の12時って……"
10010105-131 = "あと1時間後、ですね……。"
