[translation]
1006802-1 = "おはよう、レイサ"
1006802-4 = "よいしょ、っと……"
1006802-5 = "……あれ？"
1006802-6 = "……あっ！"
1006802-7 = "あああっ！！先生！！こんにちは！！"
1006802-8 = "[s1] \"こんにちは、レイサ。\"\n[s2] \"こんな所で会うなんて奇遇だね。\""
1006802-11 = "本当ですね！私も会えるとは思っていませんでした！"
1006802-12 = "その……先生は、こちらで何をなさっているんですか……？"
1006802-13 = "あっ、帰りのバス……たしかに言われてみれば時間的にそうですよね！#n変なことを聞いてしまってすみません！"
1006802-14 = "んん……"
1006802-15 = "あはは！では、私はこれで……！"
1006802-19 = "[ns3] \"朝はごめんね。いま時間、大丈夫？\"\n[ns4] レイサを呼び止める。"
1006802-22 = "……？"
1006802-23 = "どうしました？何かご用でも……？"
1006802-24 = "……あっ、今朝のモモトークですか？"
1006802-25 = "あ、あはは……! あれは……すみません、気を遣わせてしまって。#n全然、本当に大丈夫ですので！"
1006802-26 = "特に何かあったわけじゃないんです！#nご挨拶を、と思っただけで……"
1006802-27 = "ですが、よくよく考えたら先生はお忙しいのですから、ご迷惑だったな、と思い直しまして……"
1006802-28 = "これからは無駄な連絡をしないよう、気をつけます！"
1006802-29 = "[s5] \"もっと気軽に連絡して大丈夫だよ。\"\n[s6] \"気兼ねなくいつでも送ってね。\""
1006802-32 = "……え？"
1006802-33 = "ん……は、はい？#nあ、ありがとうございます……"
1006802-34 = "もしかして……それを言うために……？"
1006802-35 = "……え？この後、ですか？#n予定は、特にありませんが……"
1006802-36 = "何か事件でも起きない限り……あはは。"
1006802-37 = "……あっ！！"
1006802-38 = "えっと……クラスの子には、仲良くしてもらってます！！#n全然、そういうのじゃありませんから！！本当に！！"
1006802-39 = "むしろ、色々と誘ってもらっているのですが……#nその……うまく返事ができなくて……"
1006802-40 = "なんて返事をしようか悩みすぎて結局送れなかったり、#n大げさな反応をして困らせてしまったり……#nまぁ、そんな感じなんです！"
1006802-41 = "そ、それで……その……#nアドバイスを、先生に伺えたら、と……"
1006802-42 = "[s7] \"話し相手が欲しかったんだね。\"\n[s8] \"レイサの気持ち、よく分かるよ。\""
1006802-45 = "お忙しいのに、申し訳ないです……ただ……"
1006802-46 = "不思議なことに先生の前では、その……なんというか……"
1006802-47 = "ちょっとくらい変な事を言っても、許してくださるというか……#nきっと大丈夫、と甘えてしまう気持ちが……"
1006802-51 = "あ……私、今とっても失礼なことを……すみません。"
1006802-52 = "大丈夫？そう、でしょうか……"
1006802-53 = "[s9] \"うん、素直なレイサが一番だよ。\"\n[s10] \"あまり細かいところを気にしないほうが逆に良いかもね。\""
1006802-56 = "……？？？#nどういう意味でしょうか？"
1006802-57 = "失言ばかりしてしまっているのに、気にしなくて良い、だなんて……"
1006802-58 = "気にすると意識が引っ張られてしまう……？#nうーん……んん……？"
1006802-59 = "……すみません、まだよく分かりません！"
1006802-60 = "ですが！先生から頂いたアドバイスですから！"
1006802-61 = "正直、自分の中で理解はできておらず、怖いところもありますが……#nまずは挑戦してみます！当たって砕けろ、ですね！"
1006802-67 = "あっ、ちょうどバスが来ましたね。#nすみません、すっかり話し込んでしまいました。"
1006802-68 = "私はお先に失礼します！先生、良い一日を！"
1006802-73 = "……では、またご連絡しますね！！！"
1006802-77 = "[ns11] \"……怪我しないようにね。\"\n[ns12] バスに乗り込む。"
