[translation]
1002603-1 = "大したことじゃないからこそ"
1002603-2 = "（ネルに呼び出されたのは、ミレニアムの外れにある小さな体育館だった）"
1002603-3 = "（かなり辺鄙なところだったせいか、辺りは閑散としている）"
1002603-4 = "あー、くそ……。"
1002603-5 = "[s] \"……？\""
1002603-6 = "ん、地味に痛ぇなこれ。"
1002603-7 = "ちっ……。"
1002603-8 = "[s] \"……？？？\""
1002603-9 = "やっぱ何か間違ってんのか……？"
1002603-10 = "全員が全員こんなことになるなら、こんなん履かねーだろ……。"
1002603-11 = "あー痛ぇ……。"
1002603-12 = "[s1] \"ネル！？\"\n[s2] 慌てて中に入る。"
1002603-23 = "[ns] \"……ネル？\""
1002603-24 = "……ん？先生？"
1002603-25 = "ああ、思ったより早く来たな。持ってきてくれたか？"
1002603-26 = "……あん？"
1002603-27 = "だーから、モモトークでも大したことじゃねぇって言っただろうが……。"
1002603-28 = "ちょっと靴擦れしただけだ。"
1002603-29 = "……は？"
1002603-30 = "何でまた着てるのか……？"
1002603-31 = "あー、それは何つーか……。"
1002603-32 = "まあ、別に先生になら良いか……。"
1002603-33 = "ただ、慣れておこうかと思ってよ。"
1002603-34 = "普段から着るもんじゃねぇけど、だからこそ着慣れる機会がねぇし。"
1002603-35 = "いざまた任務で着る必要があるってなったら、困るだろ？"
1002603-36 = "そんで、慣らすためにちょっと動き回ってたら……はぁ。"
1002603-37 = "この靴、ほんとにめんどくせぇよな……。"
1002603-38 = "まあ情けねぇことに、見事に靴擦れしちまったってことだ。"
1002603-39 = "……な、大したことねぇだろ？つーわけでほら、くれ。"
1002603-40 = "……はぁ？貼ってあげる……？"
1002603-41 = "な、何言ってんだ！？んなガキ扱いすんなっての！"
1002603-42 = "え、じゃあ帰る？何で急に子どもみたいなこと言ってんだ！？"
1002603-43 = "ちょっ、バカ本気か！？ああもう……！"
1002603-44 = "……。"
1002603-45 = "……はぁ。"
1002603-46 = "まぁ、別に先生だし、大したことねぇし……。"
1002603-47 = "……ほら、さっさとやれよ。"
1002603-50 = "[wa:650]― はぁ……[wa:1450]な、[wa:1000]何だよ[wa:1000]その目は。"
1002603-53 = "[wa:250]― ……ん、[wa:1850]OK。"
1002603-56 = "― ちゃんと貼れたか？"
1002603-58 = "― ああ、[wa:1400]大丈夫だな、[wa:1350]サンキュ。"
1002603-61 = "[ns3] \"そういえば……。\"\n[ns4] \"何だかこういうネルを見るのは、珍しいね。\""
1002603-62 = "[wa:1150]― ……言っとくけどあたし、"
1002603-63 = "[wa:1150]― ……言っとくけどあたし、"
1002603-65 = "― 普段はこういうこと[wa:950]誰かにやってもらったりしねぇから。"
1002603-68 = "― 先生だから[wa:900]お願いしたんであって……。"
1002603-71 = "[wa:1850]― ……まあ良いや。"
1002603-73 = "― 相変わらず、[wa:1070]先生は変なやつだな。"
1002603-76 = "[wa:2500]― ま、[wa:1200]だからこそ……[wa:2400]ってな。"
1002603-79 = "― ……もう分かってるだろうけど、"
1002603-81 = "― こういうの、[wa:1200]他のやつには言うんじゃねーぞ？"
1002603-84 = "……考えてみりゃ、そういう話で言えばあたしの方も、先生の珍しい一面を見たな。"
1002603-85 = "急にドアを蹴り飛ばして入ってきた時のあの顔……"
1002603-86 = "ははっ！なかなか傑作だったぜ。"
1002603-87 = "……何だ、もっと慌てた顔するかと思ったのによ。"
1002603-88 = "ま、とにかく……。"
1002603-89 = "……ありがとな、先生。"
1002603-91 = "（その後、ネルともう少しゆっくりしてから、シャーレへと戻った）"
