[translation]
1002603-1 = "Just because it's not a big deal"
1002603-2 = "（Ner foi chamada para um pequeno ginásio nos arredores de Millennium.）"
1002603-3 = "（Talvez por ser um lugar bem isolado, a área está deserta.）"
1002603-4 = "Ah, droga..."
1002603-5 = "[s] \"……？\""
1002603-6 = "Hum, isso dói de um jeito chato."
1002603-7 = "Tsc..."
1002603-8 = "[s] \"……？？？\""
1002603-9 = "Será que tem algo errado mesmo...?"
1002603-10 = "Se todo mundo ficasse assim, ninguém usaria isso..."
1002603-11 = "Ah, que dor..."
1002603-12 = "[s1] \"Ner!?\"\n[s2] Entro apressado."
1002603-23 = "[ns] \"……Ner?\""
1002603-24 = "……Hum? Sensei?"
1002603-25 = "Ah, você chegou mais rápido do que eu pensava. Trouxe o que eu pedi?"
1002603-26 = "……Hã?"
1002603-27 = "Eu já disse no Momotalk que não era nada demais..."
1002603-28 = "Só fiquei com um calo no pé, só isso."
1002603-29 = "……Hã?"
1002603-30 = "Por que eu estou usando isso de novo...?"
1002603-31 = "Ah, isso é, tipo..."
1002603-32 = "Bom, sendo você, Sensei, acho que não tem problema..."
1002603-33 = "É só que eu queria me acostumar."
1002603-34 = "Não é algo que eu uso no dia a dia, então não tenho muitas chances de me acostumar."
1002603-35 = "Se eu precisar usar em uma missão de repente, vou ficar em apuros, né?"
1002603-36 = "Aí, enquanto eu andava por aí para me acostumar... ah."
1002603-37 = "Esse sapato é realmente um saco..."
1002603-38 = "Bom, é patético, mas acabei ficando com um calo mesmo."
1002603-39 = "……Viu? Não é nada demais, né? Então, anda, me dá isso."
1002603-40 = "……Hã? Você vai colocar em mim...?"
1002603-41 = "O-o que você está dizendo!? Não me trate como uma criança!"
1002603-42 = "Ei, vai embora então? Por que está agindo como uma criança de repente!?"
1002603-43 = "Ei, idiota, você está falando sério!? Ah, droga...!"
1002603-44 = "……"
1002603-45 = "……Ah."
1002603-46 = "Bom, é só o Sensei, e não é nada demais..."
1002603-47 = "……Anda logo, faz logo isso."
1002603-50 = "[wa:650]― Ah... [wa:1450]que, [wa:1000]que olhar [wa:1000]é esse?"
1002603-53 = "[wa:250]― ……Hum, [wa:1850]OK."
1002603-56 = "― Conseguiu colocar direito?"
1002603-58 = "― Ah, [wa:1400]está tudo bem, [wa:1350]valeu."
1002603-61 = "[ns3] \"Pensando bem...\"\n[ns4] \"É raro ver a Ner assim.\""
1002603-62 = "[wa:1150]― ……Já vou avisando que eu,"
1002603-63 = "[wa:1150]― ……Já vou avisando que eu,"
1002603-65 = "― Normalmente não deixo [wa:950]ninguém fazer esse tipo de coisa por mim."
1002603-68 = "― Só pedi porque é você, [wa:900]Sensei..."
1002603-71 = "[wa:1850]― ……Bom, deixa pra lá."
1002603-73 = "― Você continua sendo [wa:1070]um cara estranho, Sensei."
1002603-76 = "[wa:2500]― Bem, [wa:1200]é por isso que... [wa:2400]entende?"
1002603-79 = "― ……Você já deve saber, mas,"
1002603-81 = "― Esse tipo de coisa, [wa:1200] não conte para mais ninguém, entendeu?"
1002603-84 = "……Pensando bem, por falar nisso, eu também acabei vendo um lado raro do Sensei."
1002603-85 = "Aquela cara que você fez quando chutou a porta e entrou de repente……"
1002603-86 = "Hahaha! Aquilo foi uma obra-prima."
1002603-87 = "……O que foi? Achei que você fosse ficar mais desesperado."
1002603-88 = "Bem, de qualquer forma……"
1002603-89 = "……Valeu, Sensei."
1002603-91 = "（Depois disso, passei mais um tempo com a Neru antes de voltar para o Schale）"
