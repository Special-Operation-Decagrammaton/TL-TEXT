[translation]
90000090-1 = "Episódio 10; \"Coleta de Dados (8) Kether\""
90000090-2 = "Sala do Departamento de Investigação de Fenômenos Singulares"
90000090-5 = "Desculpem a espera.#nVamos começar a reunião sobre a nova missão."
90000090-10 = "Ebaaa!"
90000090-11 = "[s1] \"Eba!\"\n[s2] (Aplaudindo)"
90000090-12 = "……O que é esse clima?"
90000090-13 = "……O que é esse clima?"
90000090-14 = "A análise de Kether foi concluída, então só precisamos discutir a próxima rota de infiltração, mas……"
90000090-15 = "Sim. Mas isso é algo que só a Chefe Himari consegue fazer, então, aplausos."
90000090-16 = "[s] \"Obrigada sempre, Himari.\""
90000090-17 = "……Entendo."
90000090-18 = "Parece que meu talento inato não pôde ser escondido. Uma situação em que todos se convencem à primeira vista, sem perder para a minha beleza―― é isso."
90000090-19 = "Fufu…… Eimi, você finalmente percebeu meu talento brilhante também?#nUfufu."
90000090-20 = "……É, pois é.#nEu percebi, várias coisas."
90000090-21 = "Ufufu, é mesmo……"
90000090-22 = "[s] (A Eimi é tão gentil……)"
90000090-25 = "Primeiro, a partir das coordenadas onde Kether aparece, consegui restringir a área que ele está protegendo."
90000090-30 = "Localizada bem na periferia da área submersa das ruínas, é uma região com laboratórios e salas de experimentos――"
90000090-31 = "Para facilitar, vamos chamar de \"Distrito de Pesquisa\"."
90000090-33 = "\"Distrito de Pesquisa\"…… Esse é o nosso destino, então."
90000090-34 = "Sim. Para ser exata, o objetivo final é o ponto onde detectamos o sinal de Decagrammaton, mas……"
90000090-35 = "Para chegar lá, precisamos afastar o profeta Kether."
90000090-36 = "Além disso, mesmo que consigamos despistar Kether, ainda precisaremos avançar com a busca pela área, então……"
90000090-37 = "Será difícil realizar isso sendo perseguidos por Kether."
90000090-38 = "Portanto, neutralizar Kether aqui se torna essencial."
90000090-39 = "No fim das contas, significa derrotar Kether, né?"
90000090-40 = "Sim. O que vamos começar agora é a coleta de dados para isso!"
90000090-41 = "Se o que estávamos fazendo até agora era \"esconde-esconde\",#no que faremos a partir de agora é \"pega-pega\"!"
90000090-42 = "Então Kether não é o \"pegador\"."
90000090-43 = "[s] \"Desta vez nós somos os pegadores?\""
90000090-44 = "Sim, é exatamente isso.#nEntão…… vamos começar a coleta de dados para a estratégia contra Kether!"
