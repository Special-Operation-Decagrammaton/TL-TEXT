[translation]
80000063-1 = "その前に、その後に"
80000063-3 = "（公園のベンチで待っていたら、約束していたハルカが走ってくるのが見えた）"
80000063-4 = "も、申し訳ございません……！ご連絡があってすぐ走ってきたのですが、こんなことになってしまい、どのようにお詫びすれば良いのか……！"
80000063-5 = "ま、まさかずっとここでお待ちになっていたのですが……！？そんな、私なんかのせいで先生の大事なお時間を……！！"
80000063-6 = "もうこれは何で償えば……内臓とかでぜひ謝罪を……！"
80000063-7 = "……え、だ、大丈夫ですか？あ……は、はい……。"
80000063-8 = "と、ところで今日は、どういったご用件で……あ、いえその、問いただすだなんてそんな、分不相応なことがしたいわけでは……。"
80000063-9 = "え、バレンタインデー、ですか？は、はい、そうですね……！？"
80000063-10 = "準備……？あ、や、実はその、確かにあるのですが……！いえ、思い上がりだなんて滅相もございません……！"
80000063-11 = "ど、どうして……？"
80000063-12 = "先生は、どうしてそこまでご存じなのですか……？未来予知……！？"
80000063-13 = "[s1] （もしくれるんだったら、大ごとになる前に収めないと……）\n[s2] （考え込み過ぎて加速しちゃう前に……）"
80000063-14 = "……？"
80000063-15 = "……？"
80000063-16 = "……えっと、先生？"
80000063-17 = "あ、ちょ、チョコレートですね！はい、ずっと大切に持ち歩いてまして……！"
80000063-18 = "よ、よろしければこちらを……！！"
80000063-23 = "じ、実はその、私あまり普段チョコレートを食べなくって……それで、何をお渡しすれば良いのかよく分からなかったのですが……。"
80000063-24 = "えっと、所持金で払えそうな中で一番高くて、一番数字が凄そうなものを選んできました！"
80000063-25 = "も、もちろん私なんかが買った物が、先生にとって価値があるのかは分かりませんが……。"
80000063-26 = "いえ、本来はあったとしても、私の手に触れた瞬間にゴミになったかもしれませんし……そもそも受け取ってくれる前提だなんて失礼なことを……。"
80000063-27 = "[s3] \"ううん、すっごく嬉しい。早く貰いたくて連絡したから。\"\n[s4] \"ハルカから貰えるってことが嬉しいよ。ありがとう。\""
80000063-28 = "えっ……？"
80000063-29 = "えっ……？"
80000063-30 = "わ、私のを、ですか……？先生が……？"
80000063-31 = "ほ、本当ですか！？あ、いえ！決して先生のことを疑うですとか、そういったことではないのですが……！"
80000063-32 = "ただ、信じられなくて……その、私なんかのチョコを先生が喜んでくださるなんて、えっと……！？"
80000063-33 = "わ、私はどうすれば良いのでしょうか……こんな身に余る光栄を、どうしたら……？"
80000063-34 = "え、素直に受け止めてほしい……？え、で、できれば笑顔で……！？"
80000063-38 = "えっ、と……こ、こうでしょうか……えへへ……。"
80000063-39 = "[s5] \"うん、それだと私はますます嬉しい。\"\n[s6] \"うん、ハルカ可愛い！\""
80000063-40 = "……！？"
80000063-41 = "……！？"
80000063-42 = "へ……。"
80000063-47 = "えへへへ……その、こちらこそありがとうございます、先生……！"
80000063-49 = "（その後ハルカを見送ってから、99％チョコの中にある甘味を味わった）"
