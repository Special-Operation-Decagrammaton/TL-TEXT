[translation]
80000063-1 = "Antes disso, depois daquilo"
80000063-3 = "（Enquanto esperava no banco da praça, vi Haruka correndo em minha direção conforme o combinado）"
80000063-4 = "M-mil perdões...! Eu corri assim que recebi sua mensagem, mas agora que as coisas chegaram a este ponto, como posso me desculpar...!"
80000063-5 = "N-não me diga que você estava me esperando aqui esse tempo todo...!? Não pode ser, por minha causa, o tempo precioso do Sensei...!!"
80000063-6 = "Como posso compensar isso... talvez com meus órgãos internos como pedido de desculpas...!"
80000063-7 = "……Ei, v-você está bem? Ah... s-sim..."
80000063-8 = "A-a propósito, qual seria o motivo de nos encontrarmos hoje...? Ah, não, não, eu não quis dizer que estou interrogando você, não tenho a audácia de fazer algo tão inapropriado..."
80000063-9 = "Eh, Dia dos Namorados...? S-sim, é verdade...!?"
80000063-10 = "Preparação...? Ah, n-na verdade, eu tenho algo, sim...! Não, não, eu não estou sendo presunçosa, de jeito nenhum...!"
80000063-11 = "P-por que...?"
80000063-12 = "Sensei, como você sabe de tudo isso...? Previsão do futuro...!?"
80000063-13 = "[s1] （Se ela for me dar algo, preciso resolver isso antes que vire um problema maior...）\n[s2] （Antes que ela pense demais e entre em pânico...）"
80000063-14 = "……？"
80000063-15 = "……？"
80000063-16 = "……Hum, Sensei?"
80000063-17 = "Ah, c-certo, o chocolate! Sim, eu estive carregando comigo com muito cuidado...!"
80000063-18 = "S-se não for incômodo, por favor, aceite isto...!!"
80000063-23 = "N-na verdade, eu não costumo comer muito chocolate... então, eu não sabia muito bem o que deveria te dar..."
80000063-24 = "Hum, eu escolhi o mais caro que consegui pagar com o dinheiro que tinha, aquele que parecia ter os números mais impressionantes!"
80000063-25 = "C-claro, não sei se algo comprado por alguém como eu tem algum valor para o Sensei..."
80000063-26 = "Não, mesmo que tivesse, talvez tivesse virado lixo no momento em que toquei nele... e, para começo de conversa, foi muito indelicado da minha parte assumir que você aceitaria..."
80000063-27 = "[s3] \"Não, eu estou muito feliz. Eu entrei em contato porque queria receber logo.\"\n[s4] \"Fico feliz em receber de você, Haruka. Obrigado.\""
80000063-28 = "Eh...?"
80000063-29 = "Eh...?"
80000063-30 = "O, o meu...? O Sensei quer...?"
80000063-31 = "É-é verdade mesmo!? Ah, não! Não é que eu esteja duvidando do Sensei, de jeito nenhum...!"
80000063-32 = "É só que eu não consigo acreditar... que o Sensei ficaria feliz com um chocolate de alguém como eu, hum...!?"
80000063-33 = "O-o que eu deveria fazer...? Como posso lidar com tanta honra...?"
80000063-34 = "Eh, você quer que eu aceite de bom grado...? E, se possível, com um sorriso...!?"
80000063-38 = "Eh, hum... a-assim está bom...? Ehehe..."
80000063-39 = "[s5] \"Sim, isso me deixa ainda mais feliz.\"\n[s6] \"Sim, a Haruka é fofa!\""
80000063-40 = "……！？"
80000063-41 = "……！？"
80000063-42 = "He..."
80000063-47 = "Ehehehe... bem, eu que agradeço, Sensei...!"
80000063-49 = "（Depois de me despedir de Haruka, saboreei o doce que estava dentro do chocolate de 99%）"
