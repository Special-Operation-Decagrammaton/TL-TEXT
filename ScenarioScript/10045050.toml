[translation]
10045050-1 = "第5話;脱落からの浮上をかけて"
10045050-4 = "[ns] \"……ョウ……！\""
10045050-6 = "[ns] \"キキョウ……！\""
10045050-9 = "ゴホッ、ゴホッ！#n……ゲホッ、ゲホッ！"
10045050-13 = "キキョウ！"
10045050-18 = "先生……？"
10045050-19 = "[s1] \"目を覚ましてくれてよかった……。\"\n[s2] \"浅いところで助かったよ。\""
10045050-22 = "ゴホッ……！"
10045050-23 = "い、一体……どうなったの？試合は？"
10045050-24 = "試合はもう終わったよ。決勝に進んだのはチセさんとイズナさん。 "
10045050-25 = "私たちは全員脱落。"
10045050-26 = "……！！"
10045050-27 = "まさか、私のせいで……？"
10045050-28 = "そんな気にすんなって！仲間を助けるのは当然だろ？"
10045050-29 = "私のせいだ……。"
10045050-30 = "私は泳げない……水が怖いって最初から言っておけば……こんなことにはならなかったのに。"
10045050-32 = "水が嫌いなのではなくて……怖がっていたんですの？"
10045050-33 = "……アウトドアは苦手だから、水辺に行く機会なんてなかった。"
10045050-34 = "当然、泳ぐこともできないし、深い水に入るのなんて死んでも御免。"
10045050-35 = "でも……百花繚乱の作戦参謀である私が、そんなこともできないなんて言い出せなくて……。"
10045050-36 = "本当にごめん。私が余計な意地を張ったせいで……。"
10045050-37 = "だから、気にするなって！そもそも、これはアタシの責任でもあるんだ。"
10045050-38 = "幼なじみなのに、そんなことも気づいてやれなかったんだから。"
10045050-39 = "アタシこそ、ごめん。"
10045050-40 = "違う、悪いのは私。"
10045050-41 = "いや、アタシが悪いんだって！"
10045050-42 = "どう考えても私が！"
10045050-43 = "いいや、アタシが……！"
10045050-45 = "ふふっ、お二人は本当に仲良しですの。"
10045050-46 = "キキョウ先輩。あまり気にしないでください。"
10045050-47 = "身共は、先輩が無事だっただけで十分ですわ。"
10045050-48 = "……みんな、私を恨まないの？"
10045050-50 = "どうして？大会に出たのは親睦を深めるのが目的だったよね？#n勝ち負けは関係ないよ。"
10045050-51 = "その通りですの。ご自分を責めすぎないでください。"
10045050-52 = "でも……。"
10045050-54 = "[ns] \"心配しないで！チャンスはまだ残ってるよ！\""
10045050-55 = "どういうこと？"
10045050-56 = "[s3] \"それは後のお楽しみに取っておこう。\"\n[s4] \"みんな、ビーチバレー会場でまた会おう！\""
10045050-59 = "……？"
10045050-62 = "早いもので、百夜水上祭も終盤に差し掛かってきましたね～"
10045050-63 = "でも、こうして終わりに近づいていくのは寂しい……ですよね？"
10045050-67 = "そんな皆さんの熱い声援にお応えして、追加試合を用意しました！#nそれがこちら……！"
10045050-68 = "敗者復活戦！"
10045050-69 = "水上障害物レースで脱落した8人が2人1組のチームになって、トーナメント方式でビーチバレーを行います！"
10045050-70 = "この敗者復活戦で優勝したチームは、追加で最終戦に進出できますよ！"
10045050-71 = "お祭りはまだまだ続きます！#n皆さん、がんばってくださいね、にゃんにゃん！"
10045050-72 = "[ns] \"ランダムに決まった組分けと対戦カードを発表するよ！\""
10045050-74 = "[log]ビーチバレー第1試合！[/log]"
10045050-77 = "VS"
10045050-81 = "おっ、キキョウと一緒か。#nそれに、初戦の相手も悪くないな。"
10045050-82 = "……。"
10045050-84 = "なんでよりによってあいつらなんだ……！"
10045050-85 = "まだだ！私たちにだって、勝てる可能性はある！"
10045050-87 = "[ns] \"次はこちら！\" "
10045050-89 = "[log]ビーチバレー第2試合！[/log]"
10045050-92 = "VS"
10045050-96 = "ナグサ先輩とチーム！これはですてぃにーですの！"
10045050-97 = "先輩と一緒なら優勝間違いなしですわ！"
10045050-98 = "うん、頑張ろうね。"
10045050-100 = "ど、どうしましょう？ 相手が強すぎます……！"
10045050-101 = "もっと自信を持ってください。#n私たちだって、ここまで勝ち残っているんですから。"
10045050-102 = "ふふっ……修行相手として、申し分ありませんね。"
10045050-104 = "これは面白い対戦カードになりました！"
10045050-105 = "第1試合は、休憩を挟んだ後に！"
10045050-106 = "[ns] \"みんな、チャンネルはそのままで……！\""
10045050-108 = "（結局、私たちか先輩たち、どっちかは脱落する）"
10045050-109 = "（でも、もしまた私のせいでレンゲまで敗退することになったら……）"
10045050-110 = "（……）"
10045050-111 = "（私がやらなきゃ……）"
10045050-112 = "（今度は水の上じゃないし、私にもできるはず……！）"
10045050-113 = "（初戦の相手もそこまで強くない。レンゲがいれば大丈夫）"
10045050-114 = "（なのに、どうして……）"
10045050-115 = "（……どうして、嫌な予感がするの？）"
