[translation]
10030040-1 = "Episódio 4; Dance com o Urso"
10030040-3 = "Ufa... acho que chegamos longe o suficiente."
10030040-7 = "Bem, é hora de preparar o gravador..."
10030040-11 = "Houve uma inspeção de bagagem antes de partirmos, mas a vice-presidente nunca imaginaria que eu escondi um gravador minúsculo no meu sapato."
10030040-12 = "A qualidade do som e a sensibilidade são inferiores, mas a vantagem do gravador é que ele pode ser miniaturizado o quanto eu quiser... hehe."
10030040-13 = "...Não existe a opção de não gravar o tempo precioso que passo com o Sensei."
10030040-21 = "Configurações de sensibilidade do microfone e supressão de ruído concluídas."
10030040-22 = "O ajuste também terminou, então vamos começar gravando alguns sons ambientes."
10030040-28 = "Ouvir com meus próprios ouvidos os sons da natureza, que só conhecia através de gravações, é um tanto refrescante..."
10030040-33 = "O som do vento passando pelas árvores..."
10030040-38 = "O som das plantas balançando e o canto dos pássaros..."
10030040-41 = "Grrr..."
10030040-42 = "O rugido de uma fera..."
10030040-47 = "...O rugido de uma fera?"
10030040-52 = "UOOOOHHH—!"
10030040-58 = "I-iiih...!?"
10030040-62 = "[ns] \"...Ouvi o grito da Kotama vindo dali!\""
10030040-68 = "Kotama-senpai, você está bem!?"
10030040-69 = "E-eh, bem, vindo dali..."
10030040-70 = "Dali...? O que aconteceu ali...?"
10030040-75 = "Eu ouvi o som de uma fera feroz...!"
10030040-80 = "Uma fera...?"
10030040-83 = "[ns] \"Será que aquela sombra...\""
10030040-88 = "OOOOOHHH...!"
10030040-94 = "Vamos! Coloque mais força no abdômen e grite bem alto!"
10030040-95 = "Ugh..."
10030040-100 = "J-já não é o suficiente!? #nEu nunca gritei tão alto nem mesmo na hora de torcer!"
10030040-101 = "Minha garganta está doendo..."
10030040-102 = "E, acima de tudo, o que gritar tem a ver com beisebol!?"
10030040-103 = "Não, Rei-san."
10030040-107 = "Para dar gritos altos, é necessária uma capacidade pulmonar suficiente."
10030040-109 = "E uma excelente capacidade pulmonar é indispensável para qualquer exercício! #nO beisebol não é exceção!"
10030040-110 = "Para que você possa ter resultados melhores na próxima temporada, vamos treinar sua capacidade cardiorrespiratória a partir de agora!"
10030040-112 = "Eu já disse várias vezes, eu quero força muscular para rebater home runs, não treinar minha capacidade cardiorrespiratória!"
10030040-113 = "Ugh... As veteranas disseram que #n\"se você for ao Clube de Treinamento, conseguirá rebater mais home runs\", eu não deveria ter acreditado...!"
10030040-114 = "E outra! Não precisávamos ter vindo até o fundo desta montanha, precisávamos!?"
10030040-115 = "Nesta época, os animais selvagens deveriam estar hibernando, mas se um urso acordar..."
10030040-116 = "Não podemos interromper um treinamento importante por causa de problemas tão triviais."
10030040-117 = "A paixão da Rei-san pelo beisebol era apenas isso?"
10030040-118 = "Uma coisa não tem nada a ver com a outra!"
10030040-119 = "[ns] \"...Não parece ser uma fera feroz.\""
10030040-123 = "Ué? Treinador... e o pessoal do Veritas também."
10030040-125 = "Quanto tempo, Sumire-bucho."
10030040-126 = "Bem... é a primeira vez que nos vemos, certo? Uma nova integrante do Clube de Treinamento?"
10030040-128 = "Sim, embora seja apenas um teste."
10030040-130 = "Ah, é a Rei-chan."
10030040-131 = "Que bom... não era uma fera, era a voz da Rei."
10030040-132 = "Veritas...? Não esperava encontrar vocês aqui."
10030040-133 = "[s] \"Conhecidos de vocês?\""
10030040-134 = "Sim, a Rei é a rebatedora principal e a quarta no bastão do Clube de Beisebol do Millennium."
10030040-135 = "Você agita o quadro de avisos esportivos do Millennium toda vez que entra em uma partida, não tem um aluno do Millennium que não te conheça, né?"
10030040-136 = "Hehe... Fico até sem graça quando dizem isso."
10030040-137 = "Na temporada passada, você agitou as coisas, mas no sentido oposto..."
10030040-141 = "Bem... é, eu admito que minha média de rebatidas foi baixa, mas..."
10030040-142 = "Depois que eu terminar esse treinamento especial, um ciclo de rebatidas na próxima temporada não será apenas um sonho!"
10030040-144 = "Treinar em uma época tão fria assim... que paixão incrível."
10030040-145 = "A mentalidade de atleta realmente não parece combinar comigo..."
10030040-147 = "E aliás, o que o pessoal da Veritas está fazendo aqui no meio do nada...?"
10030040-148 = "Vocês quase nunca saem da sala do clube, né...?"
10030040-150 = "Nós viemos acampar porque queríamos ver o primeiro nascer do sol do ano, mas..."
10030040-151 = "A Kotama-senpai disse que tinha algo para fazer na floresta."
10030040-152 = "...Não me diga que vocês estavam fazendo algo perigoso na floresta, né?"
10030040-157 = "N-Não é isso!"
10030040-158 = "A gente só estava aproveitando o teste do gravador para captar sons ambientes..."
10030040-162 = "...Ah."
10030040-163 = "Haa... Eu já imaginava que você estava escondendo isso..."
10030040-167 = "Vamos, entregue. Isso envolve a privacidade do Sensei, então não pode."
10030040-168 = "Ugh... E olha que era a chance perfeita de criar um novo registro do Sensei [USERNAME] com o cenário da montanha no inverno..."
10030040-169 = "[s1] (Um novo registro...?)\n[s2] (Pareceu que ouvi algo assustador...)"
10030040-173 = "Ainda assim, acampar com todos os membros do clube é um feriado maravilhoso."
10030040-174 = "Já que estamos aqui, vamos aproveitar essa bela natureza."
10030040-176 = "Haa... Eu acho que dá para aproveitar a natureza sem sair de casa..."
10030040-177 = "Exatamente. Se usar alto-falantes com som tridimensional, dá para sentir os sons externos de forma realista até dentro de casa."
10030040-178 = "Dá para ver tudo da sala do clube, então não precisava nem sair..."
10030040-180 = "Mas você não acha que existem coisas que só podem ser aproveitadas estando lá fora?"
10030040-181 = "Como ver a luz do sol no topo da montanha enquanto aguenta o vento frio da madrugada..."
10030040-182 = "Dá para reproduzir isso dentro de casa, sabia?"
10030040-183 = "É só se enrolar num cobertor na sala do clube com o ar-condicionado no máximo e assistir a um documentário de alpinismo, não é perfeito?"
10030040-184 = "E não podemos esquecer do macarrão instantâneo para comer lá."
10030040-185 = "U-Ué, é que é um pouco diferente disso, sabe..."
10030040-190 = "De fato, hoje em dia vivemos em uma era onde podemos desfrutar facilmente de paisagens de lugares onde não podemos ir pessoalmente, direto do nosso quarto."
10030040-191 = "Não precisamos nem mover a cadeira, podemos apreciar o pôr do sol sempre que quisermos."
10030040-192 = "No entanto... acredito que a vista do topo da montanha, vista com os próprios olhos, é algo que você só entende se vivenciar."
10030040-193 = "Eeh~? A paisagem é a mesma, só muda o lugar de onde você olha, não é?"
10030040-194 = "É que a paisagem vista do quarto não inclui o processo de chegar até lá."
10030040-195 = "Isso também se aplica aos exercícios; habilidades obtidas sem esforço são facilmente perdidas."
10030040-196 = "Usando um jogo como exemplo... seria como derrotar um inimigo usando trapaças."
10030040-197 = "Hmm... acho que entendo um pouco..."
10030040-198 = "Mas eu não quero passar por todo esse sufoco só por causa de uma vista momentânea."
10030040-199 = "Não precisa se forçar, tem muitas coisas divertidas para fazer dentro de casa."
10030040-200 = "De fato... existem muitas coisas convenientes em ambientes fechados."
10030040-201 = "Mas, às vezes, o descanso também pode levar ao crescimento."
10030040-202 = "Por isso, o treinamento especial de hoje não foi focado em musculação pesada, mas sim em exercícios aeróbicos leves."
10030040-203 = "Não existe essa palavra de 'leve' no treinamento da Sumire-senpai, né!?"
10030040-216 = "Desculpe interromper a conversa, mas acho melhor não fazermos muito barulho aqui..."
10030040-217 = "Dizem que tem ursos por perto... se a gente acabar acordando um deles――"
10030040-229 = "...Ah."
10030040-230 = "...Ah."
10030040-239 = "GRRRRRRRRR!"
10030040-244 = "[ns] \"...U-Um urso!!\""
10030040-245 = "Eu não disse, Senpai! Se fizéssemos barulho aqui, um urso apareceria!"
10030040-246 = "……Essa é uma boa oportunidade."
10030040-250 = "Rei-san. Que tal usarmos aquele urso como um jogador de campo e fazermos um treinamento de corrida?"
10030040-251 = "É só fugir sem ser tocado por alguém que está vindo atrás de você com tudo!"
10030040-253 = "Isso não é uma boa ideia? Se o urso te tocar, você vai estar fora de jogo em todos os sentidos."
10030040-254 = "Não é hora para piadas!?"
10030040-260 = "GRRRRRRRRR!!"
10030040-261 = "Vamos lá, Rei-san, corra e rebata! Concentre-se!"
10030040-262 = "Desta vez, não é hora de dizer que isso é apenas um treinamento!"
