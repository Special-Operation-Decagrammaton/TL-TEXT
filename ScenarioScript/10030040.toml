[translation]
10030040-1 = "第4話;ダンス・ウィズ・ベア"
10030040-3 = "ふぅ……ここまで来れば大丈夫でしょう。"
10030040-7 = "では、そろそろ録音機の準備を……"
10030040-11 = "出発前に持ち物検査がありましたけど、まさか靴に小型録音機を仕込んでいるとは副部長も思わないでしょう。"
10030040-12 = "音質や感度は劣りますが、いくらでも小型化できるのが録音機の良いところですね……ふふっ。"
10030040-13 = "……先生と過ごす貴重な時間を、録音しないなんて選択肢、ありませんから。"
10030040-21 = "マイクの感度とノイズ抑制のセッティング完了。"
10030040-22 = "調整も終わりましたし、まずは環境音でも録ってみましょうか。"
10030040-28 = "音源でしか聞いたことのない自然の音を自分の耳で聞くのは、なんだか新鮮です……"
10030040-33 = "風が木々を通り抜ける音……"
10030040-38 = "草木が揺れる音や鳥のさえずり……"
10030040-41 = "ぐおおお……"
10030040-42 = "ケモノの鳴き声……"
10030040-47 = "……ケモノの鳴き声？"
10030040-52 = "ぅぉおおおっ――！"
10030040-58 = "ひ、ひぃっ……！？"
10030040-62 = "[ns] \"……あっちからコタマの悲鳴が聞こえた！\""
10030040-68 = "コタマ先輩、大丈夫！？"
10030040-69 = "え、えっと、あそこから……"
10030040-70 = "あっち……？あっちで何が……？"
10030040-75 = "凶暴な、ケモノの声が聞こえました……！"
10030040-80 = "ケモノ……？"
10030040-83 = "[ns] \"まさか、あの影が……\""
10030040-88 = "おおおおおっっ……！"
10030040-94 = "さあ！もっとお腹に力を入れて、大きな声で！"
10030040-95 = "ううっ……"
10030040-100 = "も、もう十分じゃないですか！？#n応援の時でも、ここまでの声を出したことないですよ！？"
10030040-101 = "喉が痛いんですけど……"
10030040-102 = "そもそも、声を出すのと野球に何の関係があるんですか！？"
10030040-103 = "いいえ、レイさん。"
10030040-107 = "大きな声を上げるには、十分な肺活量が必要です。"
10030040-109 = "そして、どんな運動にも優れた肺活量は必要不可欠！#n野球も例外ではありません！"
10030040-110 = "来シーズンではもっと良い成績を上げられるよう、今から心肺能力を鍛えていきましょう！"
10030040-112 = "何度も言いましたけど、私は長打を打てるような筋力が欲しいのであって、心肺能力を鍛えたいわけじゃないんですって！"
10030040-113 = "うっ……先輩たちが#n「トレーニング部に行けばもっとホームランが打てるようになる」って言ってたけど、信じなければ良かった……！"
10030040-114 = "というか！こんな山奥まで来る必要ありませんでしたよね！？"
10030040-115 = "今の時期、野生動物は冬眠してるはずですけど、もしクマが目を覚ましてしまったら……"
10030040-116 = "そのような些末な問題で、大切なトレーニングを中断するわけにはいきません。"
10030040-117 = "レイさんの野球にかける情熱は、その程度だったのですか？"
10030040-118 = "それとこれは関係ないですよね！"
10030040-119 = "[ns] \"……凶暴なケモノではなさそうだね。\""
10030040-123 = "あれ？トレーナー……それにヴェリタスの皆さんまで。"
10030040-125 = "久しぶり、スミレ部長。"
10030040-126 = "えっと……そちらは初めましてだよね？トレーニング部の新しい部員？"
10030040-128 = "はい、体験入部ではありますが。"
10030040-130 = "あ、レイちゃんだ。"
10030040-131 = "良かった……ケモノではなく、レイの声だったのですね。"
10030040-132 = "ヴェリタス……？こんなところで会えるなんて思ってなかった。"
10030040-133 = "[s] \"みんなの知り合い？\""
10030040-134 = "はい、レイはミレニアム野球部のエースで4番です。"
10030040-135 = "試合に出るたびにミレニアムの校内スポーツ掲示板を沸かせてるし、ミレニアム生で知らない人は居ないかな？"
10030040-136 = "へへっ……そこまで言われると照れるなぁ。"
10030040-137 = "前シーズンは逆の意味で沸かせていましたが……"
10030040-141 = "えっと……た、たしかに打率は低かったですけど……"
10030040-142 = "今回の特訓を終えたら、来シーズンではサイクルヒットも夢じゃありません！"
10030040-144 = "こんな寒い時期に特訓……すごい情熱だね。"
10030040-145 = "体育会系の考え方は、やはり私には合わなそうです……"
10030040-147 = "というか、ヴェリタスの皆さんはこんな山奥で一体何を……？"
10030040-148 = "普段は部室からもほとんど出てないですよね……？"
10030040-150 = "私たちは初日の出を見ようと思って、キャンプに来たんだけど……"
10030040-151 = "コタマ先輩が森に用事があるって言ってたから。"
10030040-152 = "……もしかして、森で危ないことをしてたんじゃないんでしょうね？"
10030040-157 = "ち、違います！"
10030040-158 = "ただ録音機のテストついでに、環境音を録ろうと……"
10030040-162 = "……あ。"
10030040-163 = "はぁ……隠し持ってるだろうなとは思ってたけど……"
10030040-167 = "はい、出して。それは先生のプライバシーに関わるからダメ。"
10030040-168 = "うっ……冬の山を舞台にした[USERNAME]先生の新しいレコードを作るチャンスだったのに……"
10030040-169 = "[s1] （新しいレコード……？）\n[s2] （何か怖い話が聞こえたような……）"
10030040-173 = "それにしても、部員みんなでキャンプだなんて、素晴らしい休日ですね。"
10030040-174 = "せっかくですし、お互い美しい大自然を堪能していきましょう。"
10030040-176 = "はぁ……自然なんて屋内からでも楽しめると思うんだけどなぁ……"
10030040-177 = "そうです。立体音響対応のスピーカーを使えば、室内でも外の音をリアルに感じられますから。"
10030040-178 = "部室からでも見られるんだから、外に出なくてもさぁ……"
10030040-180 = "でも、外に居るからこそ楽しめるものだって、あると思いません？"
10030040-181 = "早朝の冷たい風に耐えながら、山頂で迎える陽の光とか……"
10030040-182 = "そういうのだって屋内で再現できるよ？"
10030040-183 = "クーラーガンガンの部室で毛布にくるまって、登山ドキュメンタリーを観れば完璧じゃん？"
10030040-184 = "そこで食べるカップ麵も外せません。"
10030040-185 = "う、うーん、そういうのとはちょっと違うというか……"
10030040-190 = "たしかに最近は、直接足を運べないような場所の風景も部屋で手軽に楽しめるような時代になりました。"
10030040-191 = "椅子を動かす必要もなく、いつだって好きなときに夕日を鑑賞できるようになったのです。"
10030040-192 = "しかし……自分の目で山頂から見る景色は、味わってみなければ分からないと思います。"
10030040-193 = "え～？見てる場所が違うだけで、景色は同じでしょ？"
10030040-194 = "部屋で見る景色には、たどり着くまでの過程が含まれていませんから。"
10030040-195 = "運動においても言えますが、苦労せず手に入れた能力は簡単に失ってしまうものです。"
10030040-196 = "ゲームで例えると……チートで敵を倒したようなものでしょうか。"
10030040-197 = "うーん……ちょっとは分かるような……"
10030040-198 = "けど、その一瞬の景色のためにしんどい思いするのはやだなぁ。"
10030040-199 = "わざわざ無理しなくても、屋内には楽しいことがたくさんあります。"
10030040-200 = "たしかに……屋内には便利なものが多いです。"
10030040-201 = "ですが時には、休息が成長に繋がる場合もありますから。"
10030040-202 = "なので今回の特訓は、負荷の大きい筋トレではなく、軽めの有酸素運動を中心にメニューを組んでみました。"
10030040-203 = "スミレ先輩の特訓に「軽め」なんて言葉ないですからね！？"
10030040-216 = "話が盛り上がってるところ悪いんだけど、ここであまり騒がないほうがいいんじゃないかな……"
10030040-217 = "近くでクマが出るって噂だし……起こしちゃったりしたら――"
10030040-229 = "……あ。"
10030040-230 = "……あ。"
10030040-239 = "ぐおおおおお！"
10030040-244 = "[ns] \"……く、クマだっ！！\""
10030040-245 = "だから言ったじゃないですか、先輩！ここで騒いだらクマが出るって！"
10030040-246 = "……これは良い機会ですね。"
10030040-250 = "レイさん。あのクマを内野手に見立てて、走塁の訓練をするのはいかがでしょうか？"
10030040-251 = "全力で追いかけてくる相手から、タッチされないように逃げ切るのです！"
10030040-253 = "それ、いいんじゃない？クマにタッチされたら、色んな意味でアウトだろうし。"
10030040-254 = "冗談言ってる場合！？"
10030040-260 = "ぐおおおおおっ！！"
10030040-261 = "さあレイさん、ラン・アンド・ヒットです！集中してください！"
10030040-262 = "今回ばかりは本当に訓練って言ってる場合じゃないですよ！"
