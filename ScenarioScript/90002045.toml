[translation]
90002045-2 = "[ns] \"Isso!\""
90002045-3 = "O sinal de Yesod está enfraquecendo ao limite!"
90002045-4 = "[s] \"Será que conseguimos!?\""
90002045-8 = "Ei, não diga isso――!!"
90002045-13 = "Aaaah!?"
90002045-14 = "Kyaa!?"
90002045-16 = "Momoi, Midori, olhem ali."
90002045-18 = "Uaa... m-meus ouvidos... espera, ali?"
90002045-19 = "A parede que separava o Continente de Aço...?"
90002045-25 = "Sim, desapareceu."
90002045-26 = "……."
90002045-27 = "Obrigada, Sensei. Graças a você, estamos salvas."
90002045-30 = "Equipe de ataque de Yesod, retornem imediatamente!"
90002045-31 = "Já estamos iniciando o resgate. Hangar, estão me ouvindo?"
90002045-35 = "Tan-tan-tan! Alice retornou em segurança! Derrotamos a grande parede!"
90002045-36 = "Sim, vocês fizeram um ótimo trabalho."
90002045-38 = "Fechamento da escotilha confirmado. Recebi contato da Eimi dizendo que está bem também. Com isso――"
90002045-43 = "!?"
90002045-44 = "Rio? Aconteceu alguma coisa?"
90002045-45 = "Olhem para a direção da parede!"
90002045-46 = "A parede de Yesod... está começando a se regenerar!"
90002045-47 = "!!!"
90002045-52 = "O que é agora!?"
90002045-53 = "Eh...?#nA parede... está começando a se formar de dentro para fora... desse jeito...!"
90002045-55 = "Corram!"
90002045-57 = "De novo!?"
90002045-58 = "Irmã, rápido! Se a parede se formar, não vamos conseguir entrar!"
90002045-63 = "Ofegante, ofegante...!"
90002045-64 = "Haa, haa...!"
90002045-65 = "Pulem!"
90002045-74 = "Vocês duas, estão bem?"
90002045-80 = "Ai, ai... conseguimos entrar?"
90002045-84 = "Uau..."
90002045-88 = "I-incrível..."
90002045-89 = "Parece um sonho..."
90002045-95 = "Eimi, relatório do local."
90002045-96 = "Entramos na parede do Continente de Aço."
90002045-98 = "Próximo episódio: Base Avançada"
