[translation]
1303-1 = "A presidente está sempre certa (3)"
1303-3 = "……Atrasada!"
1303-4 = "Já se passaram 10 minutos desde o início da reunião regular, por que a Comissária Marina ainda não chegou!?"
1303-6 = "Como a Presidente Cherino se atrasou ao acordar, o início da reunião já está com 30 minutos de atraso, mas……"
1303-8 = "Ah, ah, não quero ouvir! O fato de eu ter me atrasado não tem nada a ver com isso agora, tem!? A minha declaração de abertura tem prioridade sobre o horário escrito no cronograma!"
1303-9 = "Além disso, como Comissária de Segurança, fazer esta Presidente do Conselho Estudantil, Cherino-sama, esperar…… isso é uma questão de dignidade, é imperdoável!"
1303-10 = "Quando a Comissária Marina chegar, farei uma purga exemplar……!"
1303-15 = "D-desculpe pela demora, Cherino-sama!"
1303-16 = "Atrasada!!"
1303-17 = "Como ousa me fazer esperar por 10 minutos? Quer ser expurgada!?"
1303-18 = "D-desculpe, Presidente. Preparar o relatório levou mais tempo do que eu pensava……"
1303-19 = "Mas, trago boas notícias."
1303-20 = "……Ho, vamos ouvir."
1303-21 = "Sim. Conforme as instruções anteriores, convenci aquele 'Peroro' e conseguimos transferi-lo para a nossa Academia Red Winter!"
1303-22 = "O quê, isso é verdade!?"
1303-23 = "Se for verdade, só resta esperar que os estudantes de todo o Kivotos se reúnam…… fufufu, bom trabalho, Comissária Marina!"
1303-24 = "Sim! É uma honra ser útil à Presidente!"
1303-25 = "Então, onde está esse Peroro agora?"
1303-26 = "Sim, bem ali."
1303-28 = "No-do…… cof, cof. Peroro, à frente!"
1303-32 = "Pe, Peropero……."
1303-41 = "Pe, Peropero! Pero!"
1303-43 = "O, o que é isso!? Que pássaro grande e feio é esse!?"
1303-44 = "Bem…… este não é aquele Peroro de quem a Presidente estava falando?"
1303-45 = "E-é verdade, mas olhando de perto assim, ele tem uma aparência estranha…… então isso é o Peroro……."
1303-46 = "Da última vez que vi, foi de longe, e é a primeira vez que vejo a essa distância…… mas ele é menos fofo do que eu pensava."
1303-47 = "M-mas o Peroro é um personagem popular em todo o Kivotos. Se colocarmos um bigode nele e o deixarmos na frente da secretaria, com certeza será um sucesso!"
1303-48 = "N-não tem como colocar o bigode, símbolo da autoridade, em um pássaro tão feio quanto esse!"
1303-49 = "Essa sugestão me parece familiar…… de qualquer forma, essa ideia está rejeitada!"
1303-52 = "Colocar um pássaro tão feio na frente da secretaria…… toda vez que eu entrar ou sair do prédio, ele vai entrar no meu campo de visão! Não posso suportar isso!"
1303-53 = "Comissária Marina, assuma a responsabilidade e purgue esse Peroro! Já sei…… mande-o para a Classe Especial 227 do antigo prédio escolar!"
1303-55 = "……Antigo prédio, pero?"
1303-56 = "……Hm? O Peroro não acabou de falar?"
1303-57 = "Por mais que o antigo prédio seja um lugar frio e abandonado, para nós é um lugar importante…… tratá-lo como uma lixeira para descartar coisas inúteis……."
1303-64 = "Mesmo sendo a Presidente, isso é cruel, pero!!"
1303-66 = "O quê!? Por que aquela pirralha da 227 está dentro do Peroro!? Esse Peroro era falso!?"
1303-67 = "A Presidente é idiota!? Não é questão de ser falso ou não, o Peroro nem existe na realidade, pero!"
1303-68 = "Ugh…… como ousa me enganar, Marina!"
1303-69 = "P-peço perdão!"
1303-70 = "Mas Presidente, não importa o método, é impossível trazer o Peroro para a realidade……"
1303-71 = "Ei, cale a boca! Não quero ouvir desculpas! Não importa o motivo, o crime de conspirar com uma estudante suspensa da Classe Especial 227 para me enganar é imperdoável!"
1303-72 = "Purga, purga! Levem essa pirralha e a Comissária de Segurança para o antigo prédio agora mesmo!"
1303-74 = "Humph! De qualquer forma, já estou suspensa, então não tenho medo de mais nenhuma purga, pero!"
1303-75 = "Já que chegamos a esse ponto, vou me rebelar completamente, pero!"
1303-76 = "Comissária Marina, vamos! Não fique aí parada, é hora de começar uma revolução, pero!"
1303-77 = "Eh, bem…… e-eu só segui a Presidente Cherino……"
1303-79 = "Mas se for para ser expurgada, então…… certo, aceito a proposta! Revolução!!"
1303-81 = "O quê, a Comissária de Segurança está fazendo um golpe de estado!?"
1303-82 = "To-Tomoe! Socorro!!"
1303-84 = "Depois disso, após três revoluções e inúmeras purgas ao longo de uma semana, a secretaria voltou ao seu estado original."
1303-85 = "Parece que a fantasia do Peroro, que não tinha mais utilidade, foi comprada por um aluno da Trinity por um preço alto."
1303-86 = "A Presidente está sempre certa."
