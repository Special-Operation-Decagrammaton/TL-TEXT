[translation]
1303-1 = "会長はいつも正しい（３）"
1303-3 = "……遅い！"
1303-4 = "定例会議が始まってもう10分も経つというのに、なぜマリナ委員長は来ないんだ！？"
1303-6 = "チェリノ会長が寝坊されたので、会議の開始自体がすでに30分遅れていますが……。"
1303-8 = "あーあー聞きたくない！おいらが遅れた事は今関係無いだろう！？スケジュールに書かれた時間よりも、おいらの開会宣言の方が優先されるのだ！"
1303-9 = "それに保安委員長の身分で、この生徒会長であるチェリノ様を待たせるだなんて……これは威厳の問題だ、許されない！"
1303-10 = "マリナ委員長が来たら、しっかり粛清を……！"
1303-15 = "お、お待たせしましたチェリノ様！"
1303-16 = "遅い！！"
1303-17 = "よくもこのおいらを10分も待たせたな。粛清されたいのか！？"
1303-18 = "す、すみません。会長。報告の準備をするのに、思ったより時間がかかってしまいまして……"
1303-19 = "ですが、朗報をお持ちしました。"
1303-20 = "……ほう、聞こうじゃないか"
1303-21 = "はい。前回指示を頂いた通りあの「ペロロ」を説得して、我らがレッドウィンター連邦学園へと編入させることに成功しました！"
1303-22 = "なっ、それは本当なのか！？"
1303-23 = "もしそれが本当なら、あとはもうキヴォトス全域から生徒たちが集まるのを待つだけ……ふふふっ、ご苦労であったなマリナ委員長！"
1303-24 = "はいっ！会長のお役に立てて光栄です！"
1303-25 = "それで、そのペロロは今どこにいるのだ？"
1303-26 = "はい、すぐそこに。"
1303-28 = "ノド……こほん。ペロロよ、前へ！"
1303-32 = "ぺ、ペロペロ……。"
1303-41 = "ぺ、ペロペロ！ペロー！"
1303-43 = "な、なんだ！？この大きくてブサイクな鳥は！？"
1303-44 = "えっと……こちらが会長がお話されていた、あのペロロではないのですか？"
1303-45 = "た、確かにそうだが、こうしてあらためて見るとやはり奇妙な見た目だな……これがペロロ……。"
1303-46 = "前に見た時は遠くからだったし、こうしてこの距離で見るのは初めてだが……思っていた以上に可愛くない。"
1303-47 = "で、ですがペロロは、キヴォトス中で人気のあるキャラクターです。髭をつけて事務局の前に立たせれば、話題になることは間違いないかと！"
1303-48 = "こ、こんなブサイクな鳥に、権威の象徴である髭を付けられるわけないだろう！"
1303-49 = "何だか聞き覚えのある提案だが……とにかくその案は却下だ！"
1303-52 = "こんなブサイクな鳥を、事務局の前に置くだなんて……それでは建物に出入りするたびに、おいらの視界に入るじゃないか！そんなの耐えられない！"
1303-53 = "マリナ委員長、このペロロは責任を持って粛清しろ！そうだな……もう旧校舎227号特別クラスにでも送ってしまえ！"
1303-55 = "……旧校舎、ペロ？"
1303-56 = "……ん？今ペロロが喋らなかったか？"
1303-57 = "いくら旧校舎が寒くて荒れ果てた場所だとはいえ、私たちにとっては大切な場所なのに……それを、いらない物を捨てるゴミ箱扱いだなんて……。"
1303-64 = "いくら会長とはいえ、それは酷いペロ！！"
1303-66 = "なっ！？どうしてペロロの中から、227号のエロガキが！？このペロロは偽物だったのか！？"
1303-67 = "会長はバカなんですか！？偽物も何も、そもそも現実にペロロは存在しないペロ！"
1303-68 = "ううっ……よくもこのおいらを騙したな、マリナ！"
1303-69 = "も、申し訳ありません！"
1303-70 = "ですが会長、どんなに方法を考えても、現実にペロロを連れてくることなんてことは不可能で……"
1303-71 = "ええい、うるさい！言い訳なんぞ聞きたくない！たとえどんな理由があろうと、227号特別クラスの停学生と結託しておいらを欺いたその罪は、到底許せるものではない！"
1303-72 = "粛清だ、粛清！このエロガキと保安委員長を、すぐに旧校舎へ連れて行け！"
1303-74 = "ふんだ！どうせ停学中の身ですから、これ以上の粛清なんか怖くないペロ！"
1303-75 = "こうなったらいっそのこと、徹底的に反抗するペロ！"
1303-76 = "マリナ委員長も、ほら！ぼーっとしてないで、革命を起こす時ペロ！"
1303-77 = "えっ、えぇ……わ、私はただ、チェリノ会長に従っただけなのに……"
1303-79 = "だが粛清されるくらいならいっそ……よしっ、その提案乗った！革命だ！！"
1303-81 = "なっ、保安委員長がクーデターだと！？"
1303-82 = "と、トモエぇ！助けてー！！"
1303-84 = "その後1週間に渡って3度の革命と、無数の粛清が起きた末に、事務局は元の状態へと戻った。"
1303-85 = "使い道が無くなったペロロの着ぐるみは、トリニティの生徒が高額で買い取ってくれたらしい。"
1303-86 = "会長はいつも正しい"
