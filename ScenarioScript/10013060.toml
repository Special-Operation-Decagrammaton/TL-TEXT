[translation]
10013060-1 = "第6話;玄武の使者たち（１）"
10013060-6 = "ここですね！今ネットでも話題の#n「全てに代価を要求する玄武の使者たち」がいるリゾートというのは！"
10013060-7 = "[s] \"かなり賑やかなところだね。\""
10013060-8 = "そうですね。しかも人が多いだけじゃなく……"
10013060-9 = "くんくん――むむっ、何やらすごくおいしそうな匂いがいっぱいします！"
10013060-15 = "……先生、私のお腹、鳴ってる～。"
10013060-16 = "[s] \"それじゃあ、何か買って食べようか。\""
10013060-17 = "はい！イズナ、賛成です！"
10013060-18 = "花より団子、という言葉もありますからね。"
10013060-20 = "ところで……一見平和そうに見えるけど、本当にここが「リゾート狩り」として……"
10013060-21 = "悪名高い場所であってるの？"
10013060-22 = "その件についてはネットで調べてみたんですけどー。"
10013060-23 = "どうやらこのリゾートの管理全般は、あの有名な「玄武商会」が受け持っているみたいなんです。"
10013060-24 = "[s] \"玄武商会って山海経の？\""
10013060-25 = "身バレ待ったなしの名前じゃない！"
10013060-26 = "でも不思議なんですよね。"
10013060-27 = "口コミを見ると、サービスに関して炎上しているみたいで……"
10013060-28 = "それは妙な話ね。玄武商会って料理に厳しいことで有名じゃない。#nなら、サービスが悪評を受けるとは思えないんだけど……"
10013060-29 = "詳しいことは、直接確認してみるしかなさそうですね。"
10013060-36 = "ん～？あっちで騒ぎが起きてるよ。"
10013060-37 = "あれは……お客さんと従業員の方、でしょうか？"
10013060-39 = "ひ、ひどいです！ただ椅子に座っただけなのに料金を請求するだなんて！"
10013060-40 = "ああ？何がひどいってんだ！使うなら利用料をもらうのがトーゼンだろ！"
10013060-41 = "それと椅子だけじゃないからな！箸に触れた料金と、グラスに触れた料金。"
10013060-42 = "あっ、今テーブルにも触ったな！それも請求させてもらうぞ！"
10013060-43 = "あ、あんまりだぁ～～！！"
10013060-44 = "ははは！私たちは玄武商会だぞ？#nなら、高級なサービスをしている分の対価はしっかり払ってもらわないとな！"
10013060-45 = "そ～れ～が～！正当な費用請求なわけないでしょぉおお！！！"
10013060-46 = "[s] \"あっ、シズコ！\""
10013060-47 = "な、何だお前は！？営業妨害だぞ！"
10013060-48 = "サービスというのは、提供する側の技術代や土地代――様々な要因で価格が決まっているもの……どのような値をつけるのかも、提供側の裁量だと分かっているわ。"
10013060-49 = "特にこういったリゾート施設みたいな非日常なところだと……財布のヒモが緩んじゃうのも仕方ないし。"
10013060-50 = "それを狙ってちょ～っと高い値段でサービスを提供するのも、需要と供給の関係から生じる自然なことだってのは重々理解してるわ！"
10013060-51 = "でもねぇ、それにも限度ってものがあるでしょ！"
10013060-52 = "椅子に座った料金？箸に、グラスに、テーブルに触った料金？#n意味分かんないわよそれ！"
10013060-53 = "そうです！まったく、商売を何だと思ってるんですか！#nぼったくりはアウトですよ！"
10013060-54 = "「全てに対価を要求する玄武の使者たち」ってどんな意味なのか気になってたけど……"
10013060-55 = "文字通りすべてのものに費用を請求する悪徳リゾートだったってわけね！"
10013060-56 = "あの玄武商会がどうしてこんなことを……！"
10013060-57 = "[s] \"いや、あの子たちは黒亀組だよ。\""
10013060-61 = "えっ？"
10013060-62 = "ということは……玄武商会では、ない？"
10013060-63 = "ええ！？そうだったんですかぁ！？"
10013060-65 = "くそっ、バレた！"
10013060-66 = "ええい、こうなったら応援だ！応援を呼べ！"
10013060-74 = "玄武商会じゃなくて黒亀組って……何がどうなってるんですか？"
10013060-75 = "[s] \"確か黒亀組は瓦解したはずなんだけどね……。\""
10013060-80 = "一体何事だ？突然呼び出しおって……"
10013060-85 = "些細なトラブルならお前たちだけでも解決できるだろうに……"
10013060-91 = "あっ。"
10013060-92 = "あら。"
10013060-93 = "[s] \"あっ。\""
10013060-98 = "…………あ。"
10013060-99 = "にゃ、にゃにゃにゃ、ニャン天丸！？"
10013060-100 = "ま、待て！なぜ貴様らがここに……！？"
10013060-101 = "……いや、よく考えてみたら然程おかしなことでもないか。"
10013060-102 = "儂が手にしているこの契約書に書いてあった「百鬼夜行お祭り運営委員会」という名前を目にした時点で、"
10013060-103 = "この事態も考えなくはなかった。"
10013060-104 = "[s] \"ここで何を？\""
10013060-105 = "ふんっ！何を、だと？見ての通り商売をしている。"
10013060-106 = "別にサービスを押し売りしているわけでもないし、商売に必要な「リゾート使用権」もこの通りちゃんと持っている。やましい点など一つもないが？"
10013060-107 = "[s] \"いやいや、玄武商会を騙っていたでしょ。\""
10013060-108 = "コホン！それはあくまで事業の一環として儂の手腕を振るっていただけじゃ！"
10013060-109 = "滅びかけた組織を再興し、新たな事業を推し進めているに過ぎん！#nそうじゃろう？"
10013060-111 = "はいっ！その通りです！"
10013060-113 = "そうやって、今度はどんな悪巧みをするつもりですか！"
10013060-114 = "悪巧みとは失礼な。別に、ただ良い機会だと思っただけだ。"
10013060-115 = "この「リゾート使用権」どう見ても何者かが仕掛けた罠だろう？#nそんなものに見事引っかかるとは、実に情けないな。お祭り運営委員会。"
10013060-116 = "！！"
10013060-117 = "だが見ろ。そのおかげで、またこうして組織の人員を集め、リゾート地を手に入れることができた！再起のための土台を得られたことに感謝するべきかな？"
10013060-118 = "全て知っているのなら話は早いですね！その契約書、今すぐ返してください！"
10013060-119 = "ふんっ。返せと言われて、はいどうぞ、と渡すバカがいるか！"
10013060-120 = "そもそも、この状況を招いたのは貴様のミスだろう。#nなあ、[ruby=かわわ]河和[/ruby]シズコよ！"
10013060-121 = "そ、それは……"
10013060-122 = "どうせ金に目がくらんで、身の丈に合わない欲でもかいたんだろう？"
10013060-123 = "考えなしに名義を貸した挙げ句がこのザマとは……がっかりだ。"
10013060-124 = "ち、違います！社長には考えが――"
10013060-125 = "[s] \"シズコはそんな単純な考えで動くような子じゃない。\""
10013060-126 = "……先生？"
10013060-128 = "口先だけなら何とでも言える！だが、忘れるなよ。#n貴様らは、ここに足を踏み入れた時点で既に終わりだということをな！"
10013060-129 = "契約書を持った者は皆――「リゾート狩り」の対象だ！"
10013060-133 = "故に、我々の手で貴様らの全てを奪ってくれるわ！"
10013060-135 = "皆さん！気をつけてください！"
10013060-136 = "主殿！イズナも一緒に戦います！"
10013060-137 = "よ～し、燃やすね～。"
