[translation]
10013060-1 = "Episódio 6; Os Mensageiros de Xuanwu (1)"
10013060-6 = "É aqui! O resort que está dando o que falar na internet por causa dos #n\"Mensageiros de Xuanwu que exigem pagamento por tudo\"!"
10013060-7 = "[s] \"É um lugar bem movimentado, não é?\""
10013060-8 = "Pois é. E não é só por causa da quantidade de gente..."
10013060-9 = "Snif, snif... hum, tem um cheiro muito gostoso vindo de todos os lados!"
10013060-15 = "…Sensei, minha barriga está roncando~."
10013060-16 = "[s] \"Então, que tal comprarmos algo para comer?\""
10013060-17 = "Sim! Izuna concorda!"
10013060-18 = "Como diz o ditado, é melhor comer do que admirar as flores."
10013060-20 = "Mas, mudando de assunto... parece pacífico à primeira vista, mas será que este é realmente o lugar que ficou conhecido como o \"Resort Predador\"..."
10013060-21 = "e que tem uma má fama?"
10013060-22 = "Eu andei pesquisando sobre isso na internet."
10013060-23 = "Ao que parece, a administração geral deste resort está nas mãos da famosa \"Associação Comercial Xuanwu\"."
10013060-24 = "[s] \"A Associação Comercial Xuanwu de Shanhaijing?\""
10013060-25 = "Esse é um nome que não dá para esconder a identidade!"
10013060-26 = "Mas é estranho."
10013060-27 = "Pelas avaliações, parece que eles estão sendo muito criticados pelo serviço..."
10013060-28 = "Isso é muito estranho. A Associação Comercial Xuanwu não é famosa por ser rigorosa com a culinária? #nSe for esse o caso, não consigo imaginar que o serviço receba críticas tão ruins..."
10013060-29 = "Parece que a única forma de saber os detalhes é verificando pessoalmente."
10013060-36 = "Hum? Tem uma confusão acontecendo ali."
10013060-37 = "Aquilo é... um cliente e um funcionário, talvez?"
10013060-39 = "I-isso é um absurdo! Me cobrar só por sentar na cadeira!"
10013060-40 = "Ah? O que tem de absurdo nisso! Se vai usar, é óbvio que tem que pagar a taxa de uso!"
10013060-41 = "E não é só a cadeira! Tem a taxa por tocar nos hashis e a taxa por tocar no copo!"
10013060-42 = "Ah, você tocou na mesa agora também! Vou cobrar por isso também!"
10013060-43 = "I-isso é demais~~!!"
10013060-44 = "Hahaha! Nós somos a Associação Comercial Xuanwu, sabia? #nSe quer um serviço de alta qualidade, tem que pagar o preço justo por ele!"
10013060-45 = "I-i-isso não é uma cobrança justa de jeito nenhum!!!"
10013060-46 = "[s] \"Ah, Shizuko!\""
10013060-47 = "Q-quem é você!? Isso é obstrução de negócios!"
10013060-48 = "O preço de um serviço é determinado por vários fatores, como a técnica de quem oferece e o custo do local... Eu entendo que o valor cobrado é uma decisão de quem presta o serviço."
10013060-49 = "Especialmente em lugares fora do comum como este resort... é normal que as pessoas acabem gastando um pouco mais."
10013060-50 = "Eu entendo perfeitamente que cobrar um preço um pouco mais alto por um serviço, aproveitando essa situação, é algo natural que surge da relação entre oferta e demanda!"
10013060-51 = "Mas, mesmo assim, tudo tem um limite!"
10013060-52 = "Taxa por sentar na cadeira? Taxa por tocar nos hashis, no copo e na mesa? #nIsso não faz o menor sentido!"
10013060-53 = "Exatamente! Francamente, o que vocês acham que é o comércio? #nExploração não é aceitável!"
10013060-54 = "Eu estava curiosa sobre o que significava \"Mensageiros de Xuanwu que exigem pagamento por tudo\"..."
10013060-55 = "Então, literalmente, era um resort corrupto que cobra por absolutamente tudo!"
10013060-56 = "Como a Associação Comercial Xuanwu pôde fazer algo assim...!"
10013060-57 = "[s] \"Não, eles são do Grupo Kurokame.\""
10013060-61 = "Hã?"
10013060-62 = "Isso significa que... não é a Associação Comercial Xuanwu?"
10013060-63 = "O quê!? Era isso!?"
10013060-65 = "Droga, fomos descobertos!"
10013060-66 = "Droga, se é assim, chamem reforços! Chamem reforços!"
10013060-74 = "Grupo Kurokame, e não Associação Comercial Xuanwu... o que está acontecendo aqui?"
10013060-75 = "[s] \"Até onde eu sei, o Grupo Kurokame deveria ter sido dissolvido...\""
10013060-80 = "O que está acontecendo? Me chamando de repente..."
10013060-85 = "Se fosse um problema trivial, vocês mesmos deveriam ser capazes de resolver..."
10013060-91 = "Ah."
10013060-92 = "Ora."
10013060-93 = "[s] \"Ah.\""
10013060-98 = "…………Ah."
10013060-99 = "Nya, nya-nya-nya, Nyantenmaru!?"
10013060-100 = "E-espere! Por que vocês estão aqui...!?"
10013060-101 = "……Não, pensando bem, não é algo tão estranho assim."
10013060-102 = "No momento em que vi o nome \"Comitê de Gestão do Festival de Hyakkiyako\" escrito neste contrato que tenho em mãos,"
10013060-103 = "eu já deveria ter considerado essa possibilidade."
10013060-104 = "[s] \"O que estão fazendo aqui?\""
10013060-105 = "Humph! \"O que\", você diz? Como pode ver, estamos fazendo negócios."
10013060-106 = "Não estou forçando ninguém a comprar nossos serviços, e tenho o \"Direito de Uso do Resort\" necessário para o negócio, como pode ver. Não há nada de errado nisso, tem?"
10013060-107 = "[s] \"Não, não, vocês estavam se passando pela Associação Comercial Genbu, não estavam?\""
10013060-108 = "Ahem! Isso foi apenas uma parte da minha estratégia de negócios para demonstrar minhas habilidades!"
10013060-109 = "Não passo de alguém revivendo uma organização à beira da ruína e promovendo novos empreendimentos!#nNão é verdade?"
10013060-111 = "Sim! Exatamente!"
10013060-113 = "Que tipo de plano maligno vocês pretendem executar agora!"
10013060-114 = "Plano maligno? Que falta de educação. Eu só achei que era uma boa oportunidade."
10013060-115 = "Este \"Direito de Uso do Resort\" é claramente uma armadilha armada por alguém, não é?#nCair em algo assim é realmente patético, Comitê de Gestão do Festival."
10013060-116 = "!!"
10013060-117 = "Mas veja só. Graças a isso, consegui reunir o pessoal da organização novamente e colocar as mãos em um resort! Devo agradecer por terem me dado a base para o meu retorno?"
10013060-118 = "Se você já sabe de tudo, então vamos direto ao ponto! Devolva esse contrato agora mesmo!"
10013060-119 = "Humph. Existe algum idiota que, ao ser mandado devolver algo, simplesmente diz \"aqui está\" e entrega?"
10013060-120 = "Para começar, foi um erro seu que causou essa situação.#nNão é, Shizuko Kawawa!"
10013060-121 = "Is-isso é..."
10013060-122 = "Você provavelmente ficou cega pelo dinheiro e teve uma ganância maior do que podia suportar, não foi?"
10013060-123 = "Emprestar seu nome sem pensar e acabar nessa situação... que decepção."
10013060-124 = "N-não é isso! A presidente tem um plano—"
10013060-125 = "[s] \"A Shizuko não é o tipo de pessoa que age por um motivo tão simples.\""
10013060-126 = "……Sensei?"
10013060-128 = "É fácil falar qualquer coisa da boca para fora! Mas não se esqueça.#nNo momento em que vocês pisaram aqui, já era para vocês!"
10013060-129 = "Todos que possuem o contrato são—alvos da \"Caça ao Resort\"!"
10013060-133 = "Portanto, vamos tirar tudo de vocês com nossas próprias mãos!"
10013060-135 = "Pessoal! Tomem cuidado!"
10013060-136 = "Mestre! Izuna também vai lutar junto!"
10013060-137 = "Muito bem, vou queimar tudo."
