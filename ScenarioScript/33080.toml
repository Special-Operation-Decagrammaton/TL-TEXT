[translation]
33080-1 = "Episódio 8;O Dia Tingido de Fogo e Cinzas (2)"
33080-10 = "……É um número fora do normal. Ao redor, dezenas…… não, uma escala de centenas……."
33080-18 = "Gh!"
33080-21 = "……Alcancei. Réplica do Conselho dos Santos também confirmada."
33080-22 = "O tratado foi assinado…… e o negócio com a boneca também parece ter dado certo, né, Atsuko."
33080-27 = "Hiih……!!"
33080-28 = "U-uma boneca de madeira……!?"
33080-30 = "……Que falta de modos. Se vão me chamar, quero que me chamem de \"Maestro\", com o devido respeito à arte."
33080-31 = "……."
33080-32 = "Para vós, talvez ainda seja cedo demais compreender o que é a arte…… então, sinto muito, mas um diálogo prazeroso convosco não parece possível."
33080-33 = "Inteligência, classe, experiência…… venham munidas disso. Ó, alunas de Kivotos, peço que não me decepcionem."
33080-34 = "……Contudo, o único ponto que me despertou o interesse foi poderem replicar a \"dignidade\" daqueles guardiões. Em consideração a isso, desta vez, hei de ajudá-las."
33080-35 = "A linhagem dos que guardam os preceitos…… poder testemunhar o \"mandamento\" desse sangue real em operação foi uma grande fortuna."
33080-36 = "……."
33080-37 = "Graças a isso, o meu experimento há de se aproximar ainda mais do \"Sublime\"."
33080-38 = "……Hum, explicações são tediosas e vãs, não? Então, como prometido, que me guiem até o fundo deste subsolo, onde jaz a doutrina."
33080-39 = "……."
33080-43 = "Pois bem, sigamos……."
33080-51 = "Kieeeeeh!"
33080-66 = "Haa, haa……."
33080-67 = "……Não tem fim. Quem são essas criaturas, afinal……?"
33080-68 = "I-isso é ruim…… ao menos o Sensei precisa escapar……!?"
33080-74 = "……Gh!!"
33080-75 = "Por aqui!"
33080-76 = "[ns] \"Hina……!\""
33080-77 = "A presidente do Comitê Disciplinar de Gehenna……!?"
33080-78 = "Hiyori, não me diga que vocês não conseguiram deter a Hina?"
33080-79 = "Cof, cof…… d-desculpa, não deu…… antes mesmo de o Conselho dos Santos se manifestar, todo mundo foi varrido……"
33080-83 = "Comitê de Realização da Justiça, o Sensei pra cá! Não há tempo!"
33080-84 = "……."
33080-85 = "……."
33080-86 = "……Entendido."
33080-87 = "Sensei, nós seguramos o inimigo aqui. O resto, aquela presidente do Comitê Disciplinar com certeza resolve; agora corra!"
33080-89 = "[s] \"E a Hasumi e as outras!?\""
33080-91 = "……Nós protegemos a sua rota de fuga, Sensei."
33080-92 = "Sim. É desagradável, mas…… aquela presidente do Comitê Disciplinar confia que a gente vai fazer isso. De fato, agora, não há outro método."
33080-93 = "[s] \"Mas……!\""
33080-94 = "Sensei, a cúpula de Trinity, neste momento, está em estado de quase aniquilação. Agora, sem a Sisterhood e sem o Tea Party……"
33080-95 = "se algo acontecer até com o senhor, aí sim não haverá mais conserto!"
33080-96 = "[s] \"…….\""
33080-97 = "……Rezo pela sua segurança. Esse caminho, nós vamos proteger!"
33080-98 = "Sensei, depressa!"
33080-99 = "……Sensei!"
33080-100 = "P-por favor! Agora vá, Sensei……!"
33080-101 = "[s] \"………\""
33080-105 = "[ns] Sai correndo em direção à Hina."
33080-107 = "Presidente do Comitê Disciplinar……! O Sensei, contamos com você!"
33080-115 = "……Deixa comigo."
33080-116 = "Sensei, agora não há como enfrentar aqueles monstros de frente. Agora, romper o cerco e escapar é――"
33080-117 = "Gh……!"
33080-118 = "[s] \"Hina, seus ferimentos……!\""
33080-119 = "Isto não é nada…… Sensei, não se afaste de mim."
33080-120 = "A rota de fuga, eu abro na marra."
