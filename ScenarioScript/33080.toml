[translation]
33080-1 = "Episódio 8; O Dia Tingido de Fogo e Cinzas (2)"
33080-10 = "……É um número absurdo. Dezenas…… não, centenas ao redor……."
33080-18 = "¡!"
33080-21 = "……Alcancei. Também confirmei a réplica da Associação de Estudantes."
33080-22 = "O tratado foi assinado…… e parece que a negociação com a boneca também correu bem. Atsuko."
33080-27 = "Iiiih……!!"
33080-28 = "U, uma boneca de madeira……!?"
33080-30 = "……Que falta de modos. Se for me chamar, gostaria que me chamasse de \"Maestro\", com o devido respeito à arte."
33080-31 = "……."
33080-32 = "Para vocês, talvez ainda seja cedo demais para entender o que é a arte…… nesse caso, sinto muito, mas não parece que teremos um diálogo agradável."
33080-33 = "Tragam inteligência, dignidade e experiência…… Alunas de Kivotos, por favor, não me decepcionem."
33080-34 = "……No entanto, fiquei intrigado com o fato de ser possível replicar a \"majestade\" daquelas guardiãs. Por isso, desta vez, vou ajudá-las."
33080-35 = "A linhagem daqueles que protegem os preceitos…… Foi um prazer testemunhar o funcionamento do \"mandamento\" daquele sangue real."
33080-36 = "……."
33080-37 = "Graças a isso, meu experimento poderá se aproximar ainda mais do \"sublime\"."
33080-38 = "……Hum, explicações são entediantes e inúteis, não é? Então, como prometido, vamos seguir para a base da doutrina que reside neste subsolo."
33080-39 = "……."
33080-43 = "Vamos, sigamos……."
33080-51 = "Kieeeeeee!"
33080-66 = "Ha, ha……."
33080-67 = "……Não tem fim. Quem são essas pessoas, afinal……?"
33080-68 = "I, isso é ruim…… Pelo menos, o Sensei deveria escapar……!?"
33080-74 = "……¡!"
33080-75 = "Por aqui!"
33080-76 = "[ns] \"Hina……!\""
33080-77 = "A Presidente do Comitê Disciplinar de Gehenna……!?"
33080-78 = "Hiyori, por acaso você não conseguiu parar a Hina?"
33080-79 = "Gueh, keuh…… D, desculpe, não deu…… Antes mesmo da Associação de Estudantes aparecer, ela derrubou todo mundo……"
33080-83 = "Comitê de Justiça, tragam o Sensei para cá! Não temos tempo!"
33080-84 = "……."
33080-85 = "……."
33080-86 = "……Entendido."
33080-87 = "Sensei, nós vamos segurar os inimigos aqui. Aquela Presidente do Comitê Disciplinar certamente dará um jeito no resto, então por favor, apresse-se!"
33080-89 = "[s] \"E a Hasumi e as outras!?\""
33080-91 = "……Nós protegeremos a rota de fuga do Sensei."
33080-92 = "Sim. Embora seja desagradável…… aquela Presidente do Comitê Disciplinar deve acreditar que faremos isso. De fato, agora não há outro jeito."
33080-93 = "[s] \"Mas……!\""
33080-94 = "Sensei, agora a liderança de Trinity está praticamente em estado de colapso. Sem a Sisterhood e o Tea Party……"
33080-95 = "Se algo acontecer com o Sensei, a situação ficará realmente fora de controle!"
33080-96 = "[s] \"…….\""
33080-97 = "……Rezo pela segurança do Sensei. Nós protegeremos esse caminho!"
33080-98 = "Sensei, apresse-se!"
33080-99 = "……Sensei!"
33080-100 = "P, por favor! Agora vá, Sensei……!"
33080-101 = "[s] \"…….\""
33080-105 = "[ns] Começa a correr em direção à Hina."
33080-107 = "Presidente do Comitê Disciplinar……! Por favor, cuide do Sensei!"
33080-115 = "……Deixe comigo."
33080-116 = "Sensei, não há como enfrentar esses monstros de frente agora. O único jeito é romper o cerco e escapar,"
33080-117 = "¡……!"
33080-118 = "[s] \"Hina, seus ferimentos...!\""
33080-119 = "Isso não é nada... Sensei, não se afaste de mim."
33080-120 = "Eu vou abrir caminho para nossa retirada."
