[translation]
33080-1 = "Episódio 8; O Dia Tingido de Fogo e Cinzas (2)"
33080-10 = "......São números absurdos. Dezenas... não, centenas deles ao redor..."
33080-18 = "!"
33080-21 = "......Finalmente alcancei vocês. A Réplica da Sociedade dos Santos também está confirmada."
33080-22 = "O tratado foi assinado... e parece que o negócio com a boneca também deu certo, Atsuko."
33080-27 = "Hiii...!!"
33080-28 = "U-Uma boneca de madeira...!?"
33080-30 = "......Que falta de modos. Se for me chamar, deveria usar 'Maestro', em respeito à arte."
33080-31 = "......"
33080-32 = "Acho que ainda é cedo demais para vocês entenderem o que é a arte... então, peço desculpas, mas não acho que teremos uma conversa agradável."
33080-33 = "Tragam inteligência, classe e experiência... Alunas de Kivotos, por favor, não me decepcionem."
33080-34 = "...Porém, fiquei intrigado pelo fato de poderem replicar a 'dignidade' daquelas guardiãs. Por causa disso, vou ajudar vocês desta vez."
33080-35 = "A linhagem daquelas que protegem os mandamentos... foi uma sorte poder presenciar como o 'Mandamento' do Sangue Real funciona."
33080-36 = "......"
33080-37 = "Graças a isso, meu experimento poderá se aproximar ainda mais do 'sublime'."
33080-38 = "......Hum, acho que explicar seria apenas um desperdício de tempo. Então, como prometido, nos guie até o dogma que está neste subsolo."
33080-39 = "......"
33080-43 = "Vamos lá, em frente..."
33080-51 = "Kieeeeeeeeh!"
33080-66 = "*Haa, haa*..."
33080-67 = "......Isso não tem fim. Quem são essas pessoas, afinal...?"
33080-68 = "I-Isso é ruim... pelo menos o Sensei precisa escapar...!?"
33080-74 = "......!!"
33080-75 = "Por aqui!"
33080-76 = "[ns] \"Hina...!\""
33080-77 = "A Presidente do Comitê Disciplinar de Gehenna...!?"
33080-78 = "Hiyori, por acaso você não conseguiu parar a Hina?"
33080-79 = "*Cof, cof*... S-Sinto muito, não deu... Antes mesmo da Sociedade dos Santos aparecer, ela derrubou todo mundo..."
33080-83 = "Comitê de Realização da Justiça, tragam o Sensei para cá! Não temos tempo!"
33080-84 = "......"
33080-85 = "......"
33080-86 = "......Entendido."
33080-87 = "Sensei, nós vamos segurar os inimigos aqui. Aquela Presidente do Comitê Disciplinar certamente dará um jeito no resto, então, por favor, vá rápido!"
33080-89 = "[s] \"E quanto à Hasumi e as outras!?\""
33080-91 = "......Nós vamos proteger o caminho de fuga do Sensei."
33080-92 = "Sim. Embora seja desagradável... aquela Presidente deve estar contando que faremos isso. De fato, não há outra maneira agora."
33080-93 = "[s] \"Mas...!\""
33080-94 = "Sensei, a cúpula da Trinity está praticamente em frangalhos agora. Sem a Irmandade nem a Tea Party por perto..."
33080-95 = "Se algo acontecer com o Sensei, a situação vai sair do controle de vez!"
33080-96 = "[s] \"......\""
33080-97 = "......Rezo pela segurança do Sensei. Nós vamos proteger esse caminho a qualquer custo!"
33080-98 = "Sensei, rápido!"
33080-99 = "......Sensei!"
33080-100 = "P-Por favor! Agora vá, Sensei...!"
33080-101 = "[s] \".........\""
33080-105 = "[ns] Começa a correr em direção à Hina."
33080-107 = "Presidente do Comitê...! Por favor, cuide do Sensei!"
33080-115 = "......Deixe comigo."
33080-116 = "Sensei, não há como enfrentar esses monstros de frente agora. O importante é romper o cerco e escapar,"
33080-117 = "Ugh...!!"
33080-118 = "[s] \"Hina, esses ferimentos...!\""
33080-119 = "Isso não é nada... Sensei, não saia do meu lado."
33080-120 = "Eu vou abrir caminho à força."