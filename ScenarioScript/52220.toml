[translation]
52220-1 = "Episódio 22; O festival continua"
52220-5 = "Kaho-sama... Kaho-sama!"
52220-6 = "...Por que tanta pressa? O que aconteceu desta vez?"
52220-7 = "Falta menos de uma hora para o início do Festival Waraku. #nEu deveria ter avisado que, exceto em casos de extrema urgência, não devem incomodar Niya-sama na sala do clube."
52220-8 = "Não me diga que a Niya-sama sumiu de novo...?"
52220-9 = "Sim. Ela desapareceu de novo... Mas, além disso..."
52220-10 = "N-num momento como este...!? #nEu implorei tanto para que ela não fizesse isso desta vez...!"
52220-11 = "Ah, o que você quer dizer com 'além disso'...?"
52220-12 = "Existe um problema mais grave do que o desaparecimento da Niya-sama logo antes do Festival Waraku?"
52220-13 = "Será que aconteceu algo com a nossa protagonista e ídolo suprema, Chise-chan—"
52220-14 = "Estou bem aqui~"
52220-15 = "Ah, Chise-chan. Que bom que você está bem."
52220-16 = "Sendo assim, o que poderia ser...?"
52220-17 = "Bem... acho que seria mais rápido se você saísse para ver."
52220-21 = "M-mas o que é isso..."
52220-22 = "Olhos estão cobrindo toda a academia..."
52220-23 = "Tem um monte deles por toda parte~"
52220-24 = "...Há pouco tempo, esses olhos apareceram de repente perto do local do evento."
52220-25 = "Shizuko-san, do comitê organizador do festival, disse que não faz ideia do que seja, então achei que fosse alguma atração preparada por você, Kaho-sama..."
52220-26 = "Eu jamais usaria algo tão sinistro para promover a fofura da Chise-chan!"
52220-27 = "Mas, se nem a Shizuko-san sabe..."
52220-33 = "Não, esses olhos estranhos... eu já vi isso em algum lugar..."
52220-34 = "Kaho, posso brincar de encarar eles~?"
52220-35 = "De jeito nenhum!"
52220-38 = "Eca, que olhos são esses?"
52220-39 = "Que nojo... eles estão piscando?"
52220-40 = "Quer tentar atirar? Talvez eles se assustem e fujam."
52220-41 = "E-espere! Até descobrirmos o que são, não os provoque sem necessidade—"
52220-45 = "A bala... atravessou?"
52220-46 = "Não senti impacto nenhum..."
52220-54 = "Uau, eles aumentaram!?"
52220-55 = "Quer dizer, isso é... aquele monstro do incêndio anterior...!"
52220-56 = "N-nós não damos conta! Fujam!"
52220-60 = "...Tsukumogami."
52220-61 = "É obra do Clube Kachou Fuugetsu."
52220-62 = "E logo agora que o Hyakkiyako está ausente..."
52220-63 = "Não, é justamente por isso, eu suponho... De qualquer forma, é o pior momento possível."
52220-64 = "K-Kaho-sama. O que devemos fazer...?"
52220-65 = "Primeiro, digam a todos os visitantes e funcionários para evitarem qualquer confronto com esses 'olhos'!"
52220-66 = "E evacuem todos para o lugar mais distante possível!"
52220-67 = "M-mas parece que esses olhos apareceram por toda a academia. Para onde devemos fugir..."
52220-68 = "I-isso é...!"
52220-70 = "Vice-presidente Kaho! Além desses olhos, os monstros que apareceram da última vez também surgiram! Eles estão atacando os civis!"
52220-71 = "É como se estivessem nos esperando..."
52220-72 = "Não temos para onde fugir!"
52220-77 = "Desse jeito, o Festival Waraku será cancelado..."
52220-78 = "Kaho-sama, o que faremos...!"
52220-80 = "...Niya-sama."
52220-81 = "Se ao menos a Niya-sama estivesse aqui."
52220-82 = "Tudo o que eu posso fazer é apenas entender a situação e organizar as coisas..."
52220-83 = "Como superar esta situação..."
52220-87 = "...Kaho."
52220-88 = "Sinto muito, Chise-chan."
52220-89 = "Você se esforçou ao máximo nos preparativos do festival até hoje, mas desta vez, o Festival Waraku..."
52220-90 = "Não, não é isso."
52220-91 = "Tem um ninja ali~"
52220-92 = "Ninja...?"
52220-98 = "Clube de Pesquisa de Ninjutsu, apresentando-se!"
52220-99 = "Senhorita Kaho, você está bem!"
52220-100 = "É que... monstros apareceram de repente... e acabamos demorando!"
52220-102 = "Pessoal do Clube de Pesquisa de Ninjutsu, por que vocês estão aqui...?"
52220-103 = "Será que vieram nos salvar?"
52220-104 = "Com certeza!"
52220-105 = "O sensei [USERNAME] nos pediu!"
52220-106 = "E também trouxemos uma mensagem da senhorita Niya! Nin-nin!"
52220-107 = "Sensei [USERNAME]...?#nAlém disso, da senhorita Niya...?"
52220-109 = "(Cerca de 30 minutos atrás...)"
52220-112 = "Nya-ha... que situação deplorável."
52220-113 = "Mesmo sendo apenas uma sombra falsa, não é fácil de derrotar."
52220-114 = "A presidente Ayame é realmente durona~"
52220-119 = "A história de terror começou."
52220-120 = "Até aqui, tudo estava dentro do esperado... mas, uma vez confinada, não há mais o que fazer."
52220-121 = "Ah... não tenho mais cartas na manga..."
52220-128 = "Senhorita Niya!"
52220-129 = "Viemos te salvar!"
52220-130 = "V-você não se feriu?"
52220-131 = "Pessoal do Clube de Pesquisa de Ninjutsu...? Por que estão aqui..."
52220-132 = "Na verdade, estávamos seguindo vocês desde agora pouco!"
52220-133 = "O sensei nos pediu para fazer a escolta."
52220-134 = "O sensei pediu a vocês...?"
52220-135 = "S-sim! Ele disse que, com a ausência do Hyakkiyako, o Yin-Yang Club poderia ser um alvo."
52220-136 = "Fufun, observar silenciosamente na escuridão... esse é o verdadeiro dever de um ninja!"
52220-137 = "Quer dizer que... quando eu estava lutando contra a sombra da presidente Ayame, vocês estavam observando?"
52220-141 = "Isso é... bem... é que ficamos chocados e não conseguimos nos mover..."
52220-142 = "E mesmo que ajudássemos, sentimos que não conseguiríamos parar a presidente Ayame..."
52220-143 = "Sim... ficamos tão intimidados que não conseguimos dar um passo sequer..."
52220-144 = "M-mas! O dever de um ninja não é o confronto direto!"
52220-145 = "Quem não arrisca, não petisca! Evitamos situações desfavoráveis e esperamos a chance de nos esgueirar!"
52220-146 = "Desde o início, estávamos esperando o momento em que a senhorita Niya ficasse sozinha!"
52220-147 = "Como esperado da nossa presidente! A técnica de passos furtivos, não é?"
52220-148 = "Vamos, senhorita Niya! Vamos aproveitar agora para escapar daqui!"
52220-149 = "...Agradeço a oferta, mas acho difícil."
52220-150 = "Hã...!? P-por que?"
52220-151 = "O Hyakkiyako atual está cheio de Hitotsume por toda parte."
52220-152 = "Os Hitotsume observam tudo e enxergam através de tudo."
52220-153 = "Enquanto aquele olho estiver no Hyakkiyako, todos os nossos movimentos serão descobertos."
52220-154 = "Seja entrando ou saindo do Hyakkiyako, eles perceberão e nos interceptarão."
52220-155 = "Esta conversa também... talvez eles estejam espionando, não é?"
52220-156 = "N-nosso plano foi descoberto!? O-onde!"
52220-161 = "É, é ali? Ou aqui!?"
52220-162 = "O-o que faremos...? Mesmo que façamos um plano, não é como se tudo fosse ser descoberto...?"
52220-163 = "Senhorita Tsukuyo! Não desista!"
52220-164 = "Se é um pedido do mestre, um ninja deve dar tudo de si, não importa quão perigosa seja a missão!"
52220-165 = "Hehe, belas palavras."
52220-166 = "Isolados e sem saída. Ainda assim, não fazer nada seria uma tolice ainda maior."
52220-167 = "Mesmo que estejamos sendo observados, só precisamos continuar fazendo como sempre fizemos."
52220-168 = "Pessoal do Clube de Pesquisa de Ninjutsu, poderiam... entregar uma mensagem para a Kaho no local do festival?"
52220-172 = "――Que o festival deve continuar, não importa a situação."
52220-174 = "A senhorita Niya disse... algo assim?"
52220-175 = "Eu já disse que sim! Ela está falando sério sobre realizar o festival nesta situação!?"
52220-176 = "Ma-mas, se a chefe do Departamento Yin-Yang diz isso..."
52220-177 = "A propósito, ela não disse mais nada?"
52220-178 = "Bem, ela disse que, como o Departamento Yin-Yang é a organização que mantém o equilíbrio de Hyakkiyako, basta manter a harmonia como sempre fizemos..."
52220-182 = "……Entendo."
52220-183 = "Pessoal do Clube de Pesquisa de Ninjutsu, sinto muito...#npoderiam me fazer mais um favor?"
52220-184 = "Sim, qualquer coisa!"
52220-185 = "Poderiam trazer a Shizuko, do comitê organizador do festival, até aqui imediatamente?"
52220-190 = "Assim que a Shizuko chegar... o Festival Waraku será realizado conforme o planejado!"
52220-192 = "Próximo episódio: Canção da Harmonia em Quatro Lados"
