[translation]
52220-1 = "第22話;祭りは続く"
52220-5 = "カホ様……カホ様！"
52220-6 = "……そんなに慌てて、今度はどうしました？"
52220-7 = "和楽まつりの開始まで1時間を切っているのです。#n火急の用以外は、部室に居るニヤ様に、とお伝えしたはずですが。"
52220-8 = "まさか、またニヤ様が……？"
52220-9 = "はい。[ruby=・]ま[/ruby][ruby=・]た[/ruby]消えてしまいました……それよりも……。"
52220-10 = "こ、こんな時にまで……！？#n今回こそはと、あれだけお願いしたのに……！"
52220-11 = "ああ、「それよりも」とは……？"
52220-12 = "和楽まつり直前にニヤ様が消えたことよりも、深刻な問題が？"
52220-13 = "もしや、主役にして至高のアイドル、チセちゃんに何か異変が――"
52220-14 = "ここに居るよ～"
52220-15 = "ああ、チセちゃん。ご無事だったのですね。"
52220-16 = "とすれば、一体何が……？"
52220-17 = "その……外に出られた方が早いかと思われます。"
52220-21 = "こ、これは一体……。"
52220-22 = "学園全体を目玉が覆っている……。"
52220-23 = "あっちこっちいっぱいー。"
52220-24 = "……先ほど、会場付近にあの目玉が突然現れたのです。"
52220-25 = "お祭り運営委員会のシズコさんも心当たりがないとのことで、てっきりカホ様の方で用意された出し物なのかと……。"
52220-26 = "チセちゃんの可愛さをアピールするのに、あのような不気味なものは飾りません！"
52220-27 = "ですが、シズコさんも知らないとは……。"
52220-33 = "いや、あの気味の悪い瞳……どこかで見たことが……。"
52220-34 = "カホー、あれとにらめっこしてもいい～？"
52220-35 = "いけません！"
52220-38 = "げっ、なにこの目玉。"
52220-39 = "気持ちわる……瞬きしてるよ？"
52220-40 = "撃ってみる？ビックリして逃げるかも。"
52220-41 = "お、お待ちください！正体が分かるまで、不用意に刺激を与えな――"
52220-45 = "弾が……通り抜けた？"
52220-46 = "全然手応えないんだけど……。"
52220-54 = "うわっ、増えたぞ！？"
52220-55 = "っていうかこれ……前の火事のときの化け物じゃん……！"
52220-56 = "う、うちらじゃ無理だ！逃げろー！"
52220-60 = "……付喪神。"
52220-61 = "花鳥風月部の仕業ですね。"
52220-62 = "よりによって百花繚乱が不在の今とは……。"
52220-63 = "いえ、今だからこそでしょうね……いずれにせよ、最悪のタイミングです。"
52220-64 = "か、カホ様。私たちはどうしたら……？"
52220-65 = "まずは来場者とスタッフ全員に、あの「目」との交戦は避けるよう伝えてください！"
52220-66 = "そして、みなさんをできる限り遠くに避難させるのです！"
52220-67 = "で、ですが学園中にあの目が出現しているようです。どこに逃げたら……。"
52220-68 = "そ、それは……！"
52220-70 = "カホ副部長！あの目に加え、前回現れた怪物たちも出現しました！市民を襲っています！"
52220-71 = "まるで待ち伏せでもしていたかのようで――"
52220-72 = "逃げ場がありません！"
52220-77 = "このままでは、和楽まつりが中止に……。"
52220-78 = "カホ様、どうしたら……！"
52220-80 = "……ニヤ様。"
52220-81 = "せめてここに、ニヤ様が居れば。"
52220-82 = "私にできることは、あくまで現状把握と整理にすぎません……。"
52220-83 = "この状況を打開することは……。"
52220-87 = "……カホ。"
52220-88 = "申し訳ございません、チセちゃん。"
52220-89 = "今日まで精一杯お祭りの準備に励んでいただきましたが、今回和楽まつりは――"
52220-90 = "ううん、そうじゃなくて。"
52220-91 = "そこに忍者がいる～"
52220-92 = "忍者……？"
52220-98 = "[ruby=にんじゅつけんきゅうぶ]忍術研究部[/ruby]、ここに参上！"
52220-99 = "カホ殿、ご無事でしたか！"
52220-100 = "と、突然怪物が現れて……時間がかかってしまいました！"
52220-102 = "忍術研究部の皆さんが、なぜこちらに……？"
52220-103 = "もしかして助けに来てくださったのですか？"
52220-104 = "もちろんだよ！"
52220-105 = "[USERNAME]先生からお願いされていまして！"
52220-106 = "そしてこちらにニヤ殿からのお便りがあります！ニンニン！"
52220-107 = "[USERNAME]先生……？#nそれに、ニヤ様から……？"
52220-109 = "（約30分前……）"
52220-112 = "にゃは……この有り様、みっともないですねぇ。"
52220-113 = "紛い物の影とはいえ、簡単には倒せませんか。"
52220-114 = "アヤメ委員長ったら手強いんだから～"
52220-119 = "怪談が始まりましたか。"
52220-120 = "ここまでは想定通り……しかし、監禁されてしまっては打つ手なし、です。"
52220-121 = "あ～ん……もう切れる手札がないなぁ……。"
52220-128 = "ニヤ殿！"
52220-129 = "助けに来たよ！"
52220-130 = "お、お怪我はありませんか？"
52220-131 = "忍術研究部のみなさん……？なぜこちらに……。"
52220-132 = "実は、先ほどから後を尾けていたのです！"
52220-133 = "先生殿から護衛の依頼があってねー。"
52220-134 = "先生が皆さんに……？"
52220-135 = "は、はいっ！百花繚乱が不在の隙に、陰陽部が狙われるかもしれないから、とのことで。"
52220-136 = "ふふーん、闇の中でひっそりと見守る……まさに忍者の務めだね！"
52220-137 = "つまり……私がアヤメ委員長の影と戦っていた時も、見守ってたんです？"
52220-141 = "それは……ええっと……ビックリして動けなかったというか……。"
52220-142 = "加勢しても、アヤメ委員長は止められなかった気がするっていうか……。"
52220-143 = "はい……気圧されてしまって、一歩も動けませんでした……。"
52220-144 = "で、でも！忍者の本分は正面突破じゃないからね！"
52220-145 = "「急がば回れ」！不利な状況は避け、機を見て忍び寄る！"
52220-146 = "最初から、ニヤ殿が一人になるこのときを待ってたんだよ！"
52220-147 = "さすがです部長！忍び足の術、ですね！"
52220-148 = "さあ、ニヤ殿！いまのうちにここから抜け出そう！"
52220-149 = "……ありがたい申し出ですが、難しいでしょう。"
52220-150 = "えっ……！？ど、どうしてですか？"
52220-151 = "今の百鬼夜行は、あちこちにヒトツメがいますから。"
52220-152 = "ヒトツメはすべてを見渡し、見通す。"
52220-153 = "あの目が百鬼夜行にいる限り、全ての事柄が筒抜けでしょう。"
52220-154 = "百鬼夜行を出るも入るも、勘づかれて先回りされるはず。"
52220-155 = "この会話も……覗き見てるかもしれませんね？"
52220-156 = "わ、我々の計画がバレバレだなんて！？ど、どこ！"
52220-161 = "あ、あっちか？それともこっち！？"
52220-162 = "ど、どうしましょう……計画を立てても、それが全て知られるのでは……。"
52220-163 = "ツクヨ殿！諦めてはいけません！"
52220-164 = "主殿の依頼とあらば、どんな危険な任務にも全力を尽くすのが忍者です！"
52220-165 = "ふふ、いいこと言いますね。"
52220-166 = "孤立無援の八方塞がり。とはいえ、何もしないならそれこそ愚策。"
52220-167 = "見られていようと、[ruby=・]こ[/ruby][ruby=・]れ[/ruby][ruby=・]ま[/ruby][ruby=・]で[/ruby][ruby=・]通[/ruby][ruby=・]り[/ruby]にやればいいんですよ。"
52220-168 = "忍術研究部の皆さん、ひとつ……お祭り会場にいるカホに伝言をお願いできます？"
52220-172 = "――お祭りはどんな時も続けるべきである、と。"
52220-174 = "ニヤ様が……そのようなことを？"
52220-175 = "そうなんだってば！この状況でお祭りをやろうだなんて本気なの！？"
52220-176 = "で、でも、陰陽部の部長さんがそう仰るのですから……。"
52220-177 = "ちなみに、他には何か仰っていませんでしたか？"
52220-178 = "ええっと、陰陽部は百鬼夜行の均衡を維持する組織だから、[ruby=・]こ[/ruby][ruby=・]れ[/ruby][ruby=・]ま[/ruby][ruby=・]で[/ruby][ruby=・]通[/ruby][ruby=・]り[/ruby]調和を保つだけでいいって……。"
52220-182 = "……なるほど。"
52220-183 = "忍術研究部の皆さん、申し訳ないのですが……。#nもう一つお願いを聞いていただけないでしょうか？"
52220-184 = "はいっ、なんなりと！"
52220-185 = "直ちにお祭り運営委員会のシズコさんを、こちらにお連れいただけませんか？"
52220-190 = "シズコさんが到着次第……和楽まつりは、予定通り開催いたします！"
52220-192 = "次回;四面和楽歌"
