[translation]
52220-1 = "Episódio 17; O Festival Continua"
52220-5 = "Kaho-sama...... Kaho-sama!"
52220-6 = "......Por que tanta pressa? O que houve desta vez?"
52220-7 = "Falta menos de uma hora para o início do Festival Waraku. #n Eu deveria ter dito para não me procurar, a menos que fosse urgente, enquanto eu estivesse na sala do clube."
52220-8 = "Não me diga que a Niya-sama...... novamente?"
52220-9 = "Sim. Ela desapareceu de novo...... mas, mais do que isso......"
52220-10 = "N, nem mesmo em um momento como este......!? #n Eu pedi tanto para que desta vez fosse diferente......!"
52220-11 = "Ah, sobre esse 'mais do que isso'......?"
52220-12 = "Existe um problema mais grave do que o desaparecimento da Niya-sama logo antes do Festival Waraku?"
52220-13 = "Não me diga que aconteceu algo com a protagonista e ídolo suprema, Chise-chan――"
52220-14 = "Estou aqui~"
52220-15 = "Ah, Chise-chan. Você está bem."
52220-16 = "Então, o que diabos pode ser......?"
52220-17 = "Bem...... acho que será mais rápido se você sair lá fora."
52220-21 = "M, mas o que é isto......"
52220-22 = "Olhos estão cobrindo toda a escola......"
52220-23 = "Tem um monte de olhos em todo lugar~"
52220-24 = "......Há pouco, aqueles olhos apareceram de repente perto do local do evento."
52220-25 = "Shizuko-san, do Comitê Organizador do Festival, disse que não sabe de nada, então pensei que fossem atrações que você tivesse preparado, Kaho-sama......"
52220-26 = "Eu não usaria algo tão sinistro para promover a fofura da Chise-chan!"
52220-27 = "Mas, se a Shizuko-san também não sabe......"
52220-33 = "Não, aqueles olhos sinistros...... eu já vi isso em algum lugar......"
52220-34 = "Kaho, posso fazer uma competição de encarar com eles~?"
52220-35 = "De jeito nenhum!"
52220-38 = "Eca, o que são esses olhos?"
52220-39 = "Que nojo...... eles estão piscando?"
52220-40 = "Quer tentar atirar neles? Talvez fiquem assustados e fujam."
52220-41 = "E, espere! Até descobrirmos o que são, não os provoque descuidadamente――"
52220-45 = "As balas...... atravessaram?"
52220-46 = "Não sinto impacto nenhum......"
52220-54 = "Uau, eles aumentaram!?"
52220-55 = "E mais, isso é...... aquele mesmo monstro do incêndio anterior......!"
52220-56 = "N, não temos chance! Fujam!"
52220-60 = "......Tsukumogami."
52220-61 = "É obra do Clube das Flores, Pássaros, Vento e Lua."
52220-62 = "Justamente agora, que a Hyakkaryouran está ausente......"
52220-63 = "Não, é justamente porque eles estão ausentes...... De qualquer forma, é o pior momento possível."
52220-64 = "K, Kaho-sama. O que devemos fazer......?"
52220-65 = "Primeiro, avisem a todos os visitantes e à equipe para evitarem entrar em confronto com aqueles 'olhos'!"
52220-66 = "E evacuem todos para o lugar mais longe possível!"
52220-67 = "M, mas parece que esses olhos apareceram por toda a escola. Para onde devemos fugir......?"
52220-68 = "I, isso é......!"
52220-70 = "Vice-presidente Kaho! Além desses olhos, os monstros da última vez também apareceram! Eles estão atacando os civis!"
52220-71 = "Parece que eles estavam nos esperando――"
52220-72 = "Não há para onde fugir!"
52220-77 = "Neste ritmo, o Festival Waraku será cancelado......"
52220-78 = "Kaho-sama, o que faremos......!"
52220-80 = "......Niya-sama."
52220-81 = "Se ao menos a Niya-sama estivesse aqui."
52220-82 = "Tudo o que posso fazer é entender e organizar a situação atual......"
52220-83 = "Não consigo encontrar uma solução para isso......"
52220-87 = "......Kaho."
52220-88 = "Sinto muito, Chise-chan."
52220-89 = "Você se esforçou tanto nos preparativos do festival até hoje, mas desta vez o Festival Waraku――"
52220-90 = "Não, não é isso."
52220-91 = "Tem um ninja ali~"
52220-92 = "Ninja......?"
52220-98 = "O Pesquisa Ninjutsu está aqui!"
52220-99 = "Kaho-dono, você está bem?"
52220-100 = "M, monstros apareceram de repente...... demoramos um pouco!"
52220-102 = "O que o Pesquisa Ninjutsu está fazendo aqui......?"
52220-103 = "Por acaso vocês vieram nos ajudar?"
52220-104 = "Claro!"
52220-105 = "O Sensei [USERNAME] nos pediu!"
52220-106 = "E temos um recado da Niya-dono para você! Nin-nin!"
52220-107 = "Sensei [USERNAME]......? #n E, da Niya-sama......?"
52220-109 = "(Cerca de 30 minutos atrás......)"
52220-112 = "Nyaha...... que situação lamentável."
52220-113 = "Embora sejam apenas sombras falsas, é difícil derrotá-las facilmente."
52220-114 = "A presidente Ayame é muito durona~"
52220-119 = "A história de fantasma começou, então."
52220-120 = "Até aqui, tudo ocorreu como planejado...... mas agora que estou trancada, não tenho mais movimentos."
52220-121 = "Ah~... não tenho mais cartas na manga......"
52220-128 = "Niya-dono!"
52220-129 = "Viemos te salvar!"
52220-130 = "V, você está ferida?"
52220-131 = "Pessoal do Pesquisa Ninjutsu......? Por que vocês estão aqui......"
52220-132 = "Na verdade, estamos seguindo você faz um tempo!"
52220-133 = "O Sensei nos pediu para fazer sua escolta."
52220-134 = "O Sensei pediu para vocês......?"
52220-135 = "S, sim! Ele disse que o Clube Yin-Yang poderia ser alvo enquanto a Hyakkaryouran estiver ausente."
52220-136 = "Fufu, observar silenciosamente na escuridão...... é exatamente o dever de um ninja!"
52220-137 = "Então...... quando eu estava lutando contra a sombra da presidente Ayame, vocês também estavam observando?"
52220-141 = "Isso é...... bem...... ficamos tão surpresos que não conseguimos nos mover......"
52220-142 = "Mesmo que tivéssemos tentado ajudar, não acho que conseguiríamos parar a presidente Ayame......"
52220-143 = "Sim...... ficamos tão intimidados que não conseguimos mover um passo......"
52220-144 = "M, mas! A essência de um ninja não é o ataque frontal!"
52220-145 = "'Se tiver pressa, dê a volta'! Evite situações desfavoráveis e espere o momento de se esgueirar!"
52220-146 = "Esperávamos desde o começo por esse momento, em que a Niya-dono ficasse sozinha!"
52220-147 = "Como esperado da nossa chefe! A técnica do passo furtivo!"
52220-148 = "Vamos, Niya-dono! Vamos fugir daqui enquanto podemos!"
52220-149 = "......Agradeço a oferta, mas provavelmente será difícil."
52220-150 = "Eh......!? P, por que?"
52220-151 = "Neste momento, existem Hitotsume por toda parte em Hyakkiyako."
52220-152 = "Os Hitotsume olham para tudo e conseguem ver tudo."
52220-153 = "Enquanto esses olhos estiverem em Hyakkiyako, tudo o que fizermos será descoberto."
52220-154 = "Ao tentar sair ou entrar em Hyakkiyako, seremos descobertos e interceptados."
52220-155 = "Eles podem até estar observando esta conversa agora......"
52220-156 = "N, não me diga que todo nosso plano foi descoberto!? O, onde!"
52220-161 = "A, ali? Ou aqui!?"
52220-162 = "O, o que vamos fazer...... mesmo que façamos planos, eles saberão de tudo......"
52220-163 = "Tsukuyo-dono! Não desista!"
52220-164 = "Se é um pedido do Mestre, um ninja dá tudo de si, não importa o quão perigosa seja a missão!"
52220-165 = "Fufu, bem dito."
52220-166 = "Isolada e cercada. Dito isso, não fazer nada é o pior plano de todos."
52220-167 = "Mesmo que estejamos sendo observados, faremos exatamente como planejado."
52220-168 = "Pessoal do Pesquisa Ninjutsu, eu tenho um pedido...... podem levar uma mensagem para a Kaho, que está no local do festival?"
52220-172 = "――O festival deve continuar a todo custo."
52220-174 = "A Niya-sama...... disse isso?"
52220-175 = "Eu já disse que sim! Você fala sério em realizar o festival nessa situação!?"
52220-176 = "M, mas, já que é a chefe do Clube Yin-Yang que está dizendo......"
52220-177 = "A propósito, ela disse mais alguma coisa?"
52220-178 = "Bem, ela disse que como o Clube Yin-Yang é a organização que mantém o equilíbrio de Hyakkiyako, basta mantermos a harmonia como sempre......"
52220-182 = "......Entendi."
52220-183 = "Pessoal do Pesquisa Ninjutsu, desculpe-me...... #n mas poderiam me atender em mais um pedido?"
52220-184 = "Sim, qualquer coisa!"
52220-185 = "Poderiam trazer a Shizuko-san, do Comitê Organizador do Festival, até aqui imediatamente?"
52220-190 = "Assim que a Shizuko-san chegar...... o Festival Waraku será realizado conforme planejado!"
52220-192 = "Próximo Episódio; Canção da Harmonia em Quatro Lados"

