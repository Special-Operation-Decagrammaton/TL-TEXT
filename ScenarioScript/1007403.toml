[translation]
1007403-1 = "ありのままの姿"
1007403-2 = "（拠点の周りを散策していたつもりが、気づけば、森の奥深くに迷い込んでいた）"
1007403-6 = "（遠くから水の音が聞こえてくる。もしかしたら、滝があるのかもしれない）"
1007403-7 = "♪～♬～～♪～♬～"
1007403-8 = "[ns1] \"なんの歌だろう……？\"\n[ns2] \"この声は……\""
1007403-11 = "♪～～～～♬♪～～♬～"
1007403-15 = "[ns] 声のする方へ向かう。"
1007403-19 = "あら……"
1007403-20 = "……先生？"
1007403-23 = "[wa:300]― [log=하나코 수영복]よく[wa:400]ここを[wa:500]見つけましたね。[/log]"
1007403-25 = "― [log=하나코 수영복]それとも、[wa:1400]偶然ですか？[/log]"
1007403-28 = "[wa:200]― [log=하나코 수영복]先生のことですから……[/log]"
1007403-30 = "― [log=하나코 수영복]きっと[wa:400]たまたま、[wa:1400]なんでしょうね。[/log]"
1007403-33 = "[wa:200]― [log=하나코 수영복]ふふ……[wa:1700]そんなに[wa:500]慌てないで[wa:600]ください。[/log]"
1007403-35 = "― [log=하나코 수영복]服は[wa:400]ちゃんと[wa:1300]着てますから。[/log]"
1007403-38 = "[wa:100]― [log=하나코 수영복]水の温度を、[wa:1600]感じたかったんです。[/log]"
1007403-41 = "[wa:900]― [log=하나코 수영복]先生も……[wa:2700]こちらへ[wa:600]どう[wa:500]ぞ？[/log]"
1007403-44 = "[wa:100]― [log=하나코 수영복]ここは……[/log]"
1007403-46 = "― [log=하나코 수영복]トリニティの噴水とは[wa:2700]真逆の姿を[wa:1200]しています。[/log]"
1007403-49 = "[wa:1200]― [log=하나코 수영복]人影のない、[wa:2600]自然な姿……。[/log]"
1007403-51 = "― [log=하나코 수영복]ええ。[wa:2700]何も着飾ってない、[wa:3400]ありのままの姿なんです。[/log]"
1007403-54 = "[wa:500]― [log=하나코 수영복]だから、[wa:2100]それを一緒に[wa:1400]感じてほしくて。[/log]"
1007403-56 = "― [log=하나코 수영복]……先生さえ、[wa:2000]よろしければ。[/log]"
1007403-59 = "ふふっ……やはり、こちらには来ていただけないのですね。#nまあ、そんな気はしていましたが……"
1007403-60 = "先生には、先生なりの線引きがあるのでしょう。"
1007403-61 = "ですが、こうして2人で過ごせる機会も、そうないというのに……"
1007403-62 = "大変じゃありませんか？#nせっかく無人島まで来たのに、そうやって気を張っているのも。"
1007403-66 = "こんな時くらい、普段は生徒に見せない先生の表情を見てみたかったのですが……"
1007403-67 = "[s3] \"大変だとは思ってないよ。\"\n[s4] \"そういう姿を見せるのはちょっと緊張するかな。\""
1007403-70 = "ふぅん……そうなんですね。"
1007403-71 = "時々、先生が私に対して距離をおいているのでは、と思ってしまいますが……"
1007403-72 = "……え？"
1007403-73 = "私が楽しそうで安心したのですか……？"
1007403-74 = "……ふふっ。"
1007403-75 = "…………。"
1007403-76 = "そういうところが、ズルいんですよね……#n何か言おうかと思いましたが、忘れてしまいました♪"
1007403-77 = "……そうですね。先生の仰る通りかもしれません。#nこの島に来てから、とても楽しく過ごせています。"
1007403-78 = "まだ、やり残したことはありますが……"
1007403-79 = "……それが何か、って？"
1007403-80 = "ふふ……仕方ないですね。少し、耳を貸していただけますか？#nもし他の子が近くにいたら、聞かれてしまうかもしれないので……"
1007403-81 = "[s5] \"……？\"\n[s6] ハナコの方に向かう。"
1007403-87 = "……ふふっ。"
1007403-91 = "えいっ♡"
1007403-96 = "うふふっ、仲良くびしょ濡れになっちゃいましたね。"
1007403-97 = "……先生、じっとしていてください？"
1007403-98 = "これで、ようやく……"
1007403-99 = "私の近くに来てくれましたね。"
