[translation]
1011705-1 = "ガール・オン・アンド・アドベンチャー "
1011705-2 = "（とりあえずヒカリが居るという場所に向かった）"
1011705-8 = "[ns] \"今日は何してるの？\""
1011705-10 = "先生、ヒカリ今ちょーぴんち。"
1011705-14 = "[ns] \"周りには何もないけど……？\""
1011705-15 = "ここ、全部マグマー。"
1011705-16 = "白いとこは岩場。安全地帯ー。"
1011705-17 = "マグマに落ちたらおわりー。"
1011705-21 = "[ns1] \"ああっ……！\"\n[ns2] \"私もこうやって遊んだ記憶が……。\""
1011705-24 = "先生、そこマグマ。"
1011705-25 = "逃げてー。"
1011705-28 = "（ヒカリに言われた通り、白のタイルに移動した）"
1011705-30 = "よくやったー。 "
1011705-31 = "あっちの交差点まで生き残ろー。"
1011705-32 = "[s] \"よし、やってみる。\""
1011705-39 = "赤いとこは浮島でセーフー。"
1011705-40 = "落ちたらアウトー。"
1011705-44 = "[ns] \"まずい……赤いタイルがない……！\""
1011705-45 = "あの店の前、赤いじゅうたんあるよー。"
1011705-46 = "あそこ安全地帯ー。"
1011705-47 = "[s] \"あそこまで飛べるかな……？\""
1011705-48 = "無理なら先生の冒険は終わりー。"
1011705-49 = "[s] \"ぐぬぬ……やってみるよ！\""
1011705-57 = "[ns] \"あっ！\""
1011705-61 = "おわーっ！？"
1011705-62 = "[s] \"す、すみません……！！\""
1011705-63 = "い、一体何を……？"
1011705-64 = "[s] \"いやっ、その……。\""
1011705-69 = "赤ー。"
1011705-70 = "赤踏まないとアウトー。"
1011705-74 = "この島の上じゃないと生きられないー。"
1011705-75 = "えっ？"
1011705-76 = "……ああ！"
1011705-77 = "懐かしいね。"
1011705-78 = "冒険ごっこか、私も小さい頃はよくやったもんだ。"
1011705-79 = "ははっ、旅の無事を祈ってるよ。"
1011705-84 = "[ns] \"ちょっと恥ずかしい……。\""
1011705-85 = "恥はいっしゅーん。"
1011705-86 = "命のほうが大事ー。"
1011705-87 = "[s] \"そ、そうだね……！\""
1011705-91 = "[ns] \"くっ……こうなったら最後まで行くぞ！\""
1011705-92 = "いくぞー。"
1011705-106 = "（ヒカリとの過酷な冒険の旅を経て、シャーレに戻ってきた）"
1011705-108 = "今日は最長記録達成ー！はいすこあー。"
1011705-109 = "[s3] \"楽しかったよ……そろそろ仕事に戻ろうかな。\"\n[s4] \"そういえば、ヒカリはどこに行こうとしてたの？\""
1011705-115 = "わすれたー。"
1011705-116 = "[s] \"い、いいのかなそれで……。\""
1011705-117 = "いいのー。ノーデスでクリアできたからー。"
1011705-118 = "先生は8回落ちたけど、初挑戦なら悪くないー。 "
1011705-119 = "[s] \"よかった……大昔にやってたからね。\""
1011705-120 = "あ……。"
1011705-121 = "ヒカリ、動けない。"
1011705-122 = "ここ、安全地帯なさすぎー。"
1011705-123 = "[s5] \"そういえば……\"\n[s6] \"ここから先は、同じ色のタイルしかないね。\""
1011705-126 = "ヒカリ死亡フラグー。"
1011705-127 = "いままで楽しかったー。あとはまかせるー。"
1011705-128 = "ヒカリのこと、忘れないでねー。"
1011705-132 = "[ns] \"ヒカリは私が助ける！\""
1011705-134 = "（動けずにいるヒカリを抱きかかえて、オフィスに向かった）"
1011705-135 = "うぉー、たのもしー。"
1011705-137 = "（ヒカリはシャーレで楽しそうに遊ぶと帰っていった）"
