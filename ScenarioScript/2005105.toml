[translation]
2005105-1 = "Que fofa, Reisa."
2005105-2 = "（Preocupado com o conteúdo do MomoTalk, fui procurar a Reisa）"
2005105-5 = "[ns] \"Ainda bem... que nada aconteceu...\""
2005105-6 = "Você não se surpreende mais ao me ver vestida assim, Sensei."
2005105-7 = "Na verdade, uma granada incendiária que eu deixei no bolso do casaco explodiu..."
2005105-8 = "Eu apaguei o fogo às pressas, mas... #nO guarda-roupa e as roupas dentro ficaram encharcados... ahaha..."
2005105-9 = "Se não fosse por este traje que acabou de voltar da lavanderia—"
2005105-10 = "Eu não teria como sair de casa e estaria em apuros."
2005105-11 = "Então, vou comprar roupas novas agora!"
2005105-12 = "[s] \"Quer que eu vá junto?\""
2005105-13 = "!!"
2005105-14 = "O Sensei vai escolher para mim!? Que tranquilidade!"
2005105-15 = "Vamos! Agora mesmo!"
2005105-18 = "Hmm..."
2005105-19 = "Não entendo nada disso!"
2005105-20 = "Acho melhor comprar logo tudo o que o manequim está vestindo!"
2005105-21 = "[s] \"Reisa, você não tem muito interesse em moda?\""
2005105-22 = "Eu gosto de usar muitos acessórios, mas!"
2005105-23 = "Não entendo nada de tendências!"
2005105-24 = "Achei que, se comprasse o conjunto completo, não teria erro..."
2005105-25 = "Por enquanto, vou levar este e este. Agora, para o caixa—"
2005105-26 = "O que significa isso, seu idiota!"
2005105-27 = "Isso é venda forçada, não é?!"
2005105-32 = "C-cliente, não podemos realizar trocas ou devoluções. #nSinto muito..."
2005105-33 = "Acho que estava especificado que não podia lavar com água..."
2005105-34 = "Você está de brincadeira comigo, né?"
2005105-35 = "O suéter encolheu e ficou apertado, mostrando minha barriga! #nComo você quer que eu use isso!? Hein!?"
2005105-36 = "Iiiih... precisamos do recibo para trocas e devoluções...!"
2005105-37 = "Você não entende nada, né! Quer que eu quebre tudo aqui?!"
2005105-38 = "S-Sensei! Precisamos intervir nisso...!"
2005105-39 = "Mas se eu for me trocar, não vou chegar a tempo..."
2005105-40 = "[s1] \"Garotas mágicas são heroínas que protegem a todos.\"\n[s2] \"E o código de vestimenta também está impecável.\""
2005105-43 = "Sensei...!"
2005105-44 = "Sim! Já estou indo...!"
2005105-45 = "Fiu..."
2005105-49 = "Kyururu~... Plim! Shakin! Bam!"
2005105-54 = "A superestrela do comitê disciplinar, o ás de copas fatal..."
2005105-55 = "Uzawa Reisa, apresentando-se!!!"
2005105-57 = "Q-quem é essa?"
2005105-58 = "Você também veio pedir reembolso?"
2005105-59 = "Eles vendem roupas assim também? Até que mudei minha opinião sobre essa loja..."
2005105-61 = "Pessoas mal-intencionadas que ameaçam cidadãos de bem... Eu, Uzawa Reisa, não permitirei!"
2005105-62 = "Além disso, você fica bem mesmo com a barriga de fora!"
2005105-63 = "O que você disse!?"
2005105-64 = "Acabem com ela!"
2005105-73 = "Argh..."
2005105-74 = "E-ela é forte..."
2005105-79 = "Em nome da justiça, receba o seu castigo!"
2005105-80 = "Ah, muito obrigada! Você me salvou!"
2005105-85 = "Você derrotou eles num piscar de olhos... incrível!"
2005105-86 = "Que legal! Você é um verdadeiro herói!"
2005105-87 = "He, hehe... assim você... me deixa sem jeito."
2005105-88 = "Bem, pessoal, aproveitem as compras com calma!"
2005105-94 = "Ah, cliente garota mágica. #n... Parece que você ainda não pagou."
2005105-95 = "O caixa é por aqui."
2005105-99 = "Ah..."
2005105-101 = "S-sim...!"
2005105-103 = "(Comprei roupas junto com a Reisa, que estava com o rosto corado, e saímos da loja)"
2005105-104 = "(A Reisa vestindo roupas novas estava muito fofa)"
