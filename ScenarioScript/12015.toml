[translation]
12015-2 = "なるほど……。"
12015-3 = "第一中隊、全滅です！退却し、再整備に入ります！"
12015-4 = "第三中隊、これ以上の続行は不可能！補給のため、一時撤退します！"
12015-5 = "……。"
12015-6 = "なるほど、だいたい把握できました。シャーレの力、必要となるであろう兵力……。"
12015-7 = "予想を遥かに上回っています……素晴らしいですね。"
12015-8 = "決して甘く見ていたわけではないのですが、もっと慎重に進めるべきだったかもしれません。"
12015-9 = "それでも、決して無敵というわけでもありません。弱点も見えましたし……おおよその戦況は読めました。"
12015-10 = "この辺りをもう少し押していけば……折れるのは、時間の問題ですね。"
12015-13 = "第八中隊。後方待機をやめて、突入してください。"
12015-15 = "風紀委員会、第三陣を展開してきました！"
12015-16 = "はあ……はあ……まだいるの！？"
12015-17 = "この状況でさらに投入……！？"
12015-18 = "た、大したことないわよ！まだまだ戦えるんだから！"
12015-19 = "それはそうだとしても……これはもう、アコの権限で動かせる兵力を超えてる。ということはこの襲撃、アコの独断じゃなくて、まさか……。"
12015-20 = "……風紀委員長が？"
12015-21 = "えっ、ヒナが来るの！？無理無理無理！？逃げるわよ、早く！！！"
12015-22 = "いや、そうは言ってない……落ち着いて、社長……。"
12015-26 = "（ザッ、ザッ、ザッ、ザッ、ザッ、ザッ、ザッ、ザッ……）"
12015-28 = "ふふっ……これ以上は流石に……。"
12015-29 = "委員長に知られてしまったら、イオリと仲良く反省文ですね……。"
12015-30 = "さあ、では……三度目の正直と行きましょうか。風紀委員会、攻撃を――"
12015-31 = "（ザザッ）"
12015-33 = "アコ。"
12015-34 = "……え？"
12015-35 = "ひ、ひ、ヒナ委員長！？"
12015-37 = "委員長？"
12015-38 = "あ、あの通話相手が……？委員長ってことは、風紀委員会のトップ……？"
12015-39 = "い、い、委員長がどうしてこんな時間に……？"
12015-40 = "アコ、今どこ？"
12015-41 = "わ、私ですか？私は……そ、その……えっと……げ、ゲヘナ近郊の市内の辺りです！風紀委員のメンバーとパトロールを……。"
12015-42 = "思いっきり嘘じゃん！"
12015-43 = "やっぱり、行政官の独断行動だったみたいですね……。"
12015-44 = "そ、それより委員長はどうしてこんな時間に……出張中だったのでは？"
12015-45 = "さっき帰ってきた。"
12015-46 = "そ、そうでしたか……！その、私、今すぐ迅速に処理しなくてはいけない用事がありまして……後ほどまたご連絡いたします！い、今はちょっと立て込んでいまして……！"
12015-47 = "立て込んでる……？パトロール中なのに珍しい、何かあったの？"
12015-48 = "え？そ、その……それは……。"
12015-49 = "他の学園の自治区で、委員会のメンバーを独断で運用しないといけないようなことが？"
12015-50 = "……え？"
12015-56 = "……えっ？"
12015-57 = "っ！？"
12015-58 = "え、あれっ！？"
12015-59 = "！？"
12015-60 = "い、い、い、委員長！？い、一体いつから！？"
12015-61 = "！！"
12015-62 = "……え、"
12015-64 = "ええええっ！？"
12015-66 = "……。"
12015-67 = "……アコ。この状況、きちんと説明してもらう。"
12015-69 = "次回;ゲヘナの風紀委員長"
