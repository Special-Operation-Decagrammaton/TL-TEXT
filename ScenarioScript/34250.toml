[translation]
34250-1 = "Episódio 25; Pessoas Importantes"
34250-3 = "[ns] \"Estão todas bem?\""
34250-4 = "É... por pouco."
34250-5 = "Sim..."
34250-6 = "A-Ainda bem, então realmente acabou...?"
34250-7 = "A Beatrice..."
34250-8 = "[s] \"Ela fugiu.\""
34250-12 = "Fugiu...?"
34250-13 = "[s] \"Mas acredito que ela não atormentará vocês nunca mais.\""
34250-14 = "……"
34250-15 = "……"
34250-16 = "……"
34250-23 = "Sensei, obrigada por nos ajudar."
34250-24 = "[s] \"Você não precisa mais usar a máscara?\""
34250-25 = "...Sim, eu tô bem."
34250-26 = "Eu não entendia por que a Madame queria tanto que eu usasse aquela máscara..."
34250-27 = "Quando fomos pegas pela explosão da bomba da Azusa, teve um dispositivo que protegeu o meu corpo... #nAcho que a máscara era necessária para ativá-lo."
34250-28 = "No fim das contas, acho que a Madame me obrigava a usar a máscara pra me manter viva."
34250-29 = "[s1] \"Então use quando for necessário.\"\n[s2] \"Muita gente ficaria triste se você se machucasse, Atsuko.\""
34250-30 = "……"
34250-31 = "……"
34250-32 = "É verdade... vou usar de vez em quando."
34250-33 = "...Sensei."
34250-34 = "Como prometido... você salvou a princesa... #nFaça o que quiser comigo agora."
34250-35 = "[s] \"O que eu quiser...?\""
34250-36 = "Eu sou a raiz de tudo... O incidente do Tratado do Éden, o ataque à Seia, o ataque à Nagisa... #nA Misaki, a Hiyori, a Atsuko... todas acabaram assim por minha causa."
34250-37 = "O Conselho Geral dos Estudantes, a Trinity... a Casa de Correção, qualquer lugar serve. #nMe mande para onde achar que for o lugar mais apropriado."
34250-39 = "Que papo é esse...!?"
34250-40 = "L-Líder...!?"
34250-41 = "……"
34250-42 = "N-Não brinca com isso, líder... Você não pode simplesmente...!"
34250-44 = "Não... eu vivi fugindo das minhas responsabilidades por tempo demais..."
34250-45 = "Tá na hora... A hora chegou."
34250-46 = "L-Líder..."
34250-48 = "[ns3] \"………………\"\n[ns4] \"...É verdade. Você precisa assumir a responsabilidade, Saori.\""
34250-52 = "[ns] \"Saori, você lutou por muito tempo para proteger as garotas à sua volta.\""
34250-55 = "[ns5] \"Você cuidou delas, as protegeu,\"\n[ns6] \"suportou tudo—e assumiu essa responsabilidade.\""
34250-59 = "[ns7] \"E foi justamente por ter recebido uma educação distorcida em um ambiente insano\"\n[ns8] \"que você acabou fazendo escolhas erradas.\""
34250-64 = "[ns] \"Isso não muda o fato de que você e as outras cometeram crimes... e são alunas ruins.\""
34250-65 = "……"
34250-66 = "……"
34250-67 = "……"
34250-69 = "[ns] \"Mas isso não significa que vocês mereçam sofrer.\""
34250-72 = "[ns9] \"A culpa do sofrimento das crianças não é delas.\"\n[ns10] \"A responsabilidade por criar um mundo onde crianças sofrem recai sobre mim, o adulto aqui.\""
34250-75 = "M-Mas o que você tá dizendo...! Isso é...!!"
34250-76 = "Então... o que exatamente eu... que responsabilidade eu devo assumir...?"
34250-78 = "……"
34250-79 = "Líder..."
34250-80 = "……"
34250-86 = "[ns] \"Você deve assumir a responsabilidade pela sua própria vida, Saori.\""
34250-87 = "...E-Eu não entendo o que isso quer dizer."
34250-88 = "...Acho que eu entendo."
34250-89 = "Princesa...?"
34250-90 = "Saori, tem alguma coisa que você queira fazer?"
34250-94 = "A Azusa disse que amava aprender coisas novas. #nQue se sentia feliz por estar com as amigas."
34250-99 = "O que você gosta, Saori? O que quer fazer? Quais são os seus hobbies?"
34250-100 = "Qual é a sua comida favorita? #nEu nunca te ouvi falar de nada disso até hoje."
34250-101 = "Saori, qual é o seu sonho para o futuro? #nTem algo que você queira ser?"
34250-103 = "...Isso, esse tipo de coisa..."
34250-104 = "Eu não sei... eu nunca pensei nisso antes..."
34250-105 = "O que eu gosto, o que eu quero fazer... Eu não sei responder a nenhuma dessas perguntas..."
34250-107 = "A Saori tem um forte senso de responsabilidade... e é decidida... vejamos."
34250-108 = "E-Ela é ótima em ensinar as coisas... embora ela dê medo quando... ensina a gente..."
34250-109 = "Ela é bem focada também. Muito boa em planejar as coisas e dar ordens."
34250-114 = "……"
34250-115 = "[ns] \"Entendi... Nesse caso, talvez você...\""
34250-117 = "[ns] \"Você daria uma ótima professora, Saori.\""
34250-118 = "...!!!"
34250-121 = "A líder v-virar... Sensei...!?"
34250-122 = "Bem, eu não consigo imaginar muito bem isso."
34250-123 = "Que nada, daria certinho. #nCombina muito com ela, não acha?"
34250-125 = "...Eu não sei. Eu... ter um futuro assim, de verdade...?"
34250-129 = "Essa história de assumir a responsabilidade pela minha vida, o que eu gosto, um futuro assim... eu não entendo nada disso..."
34250-130 = "Eu..."
34250-131 = "...Alguém como eu... tem o direito de viver?"
34250-132 = "[s] \"Encontre essa resposta por si mesma, Saori.\""
34250-133 = "……"
34250-136 = "……"
34250-137 = "……"
34250-138 = "……"
34250-142 = "[ns] \"Bem, nossa despedida fica por aqui.\""
34250-144 = "O quê...!? #nTão de repente... Espera, Sensei!?"
34250-145 = "[s] \"Ainda tenho uma aluna que precisa de ajuda.\""
34250-147 = "E-Espera...!!"
34250-148 = "Eu... nós..."
34250-152 = "Não... entendi..."
34250-153 = "Descobrir isso é o meu..."
34250-154 = "[s] \"Eu te garanto, como um adulto—você vai encontrar a sua resposta.\""
34250-155 = "...!!"
34250-161 = "E-Ele foi embora...?"
34250-162 = "...Ele deve ter ido salvar a Mika."
34250-163 = "S-Será que ele vai ficar bem sozinho...?"
34250-165 = "...Acho que ele vai ficar bem. Afinal, foi assim da outra vez também."
34250-166 = "Da outra vez...?"
34250-167 = "Como o Sensei é um adulto, tenho certeza de que ele tem uma carta na manga."
34250-168 = "A Beatrice não está mais aqui, e toda aquela repressão que controlava o distrito de Arius também sumiu."
34250-169 = "……"
34250-170 = "Líder..."
34250-171 = "Saori, tá tudo bem...?"
34250-172 = "Sim... #nEu... ainda não entendo muita coisa... mas, mesmo assim..."
34250-178 = "Pela primeira vez... eu sinto que tenho o direito de existir neste mundo."
34250-193 = "*Cof*... *Cof*..."
34250-196 = "...Aaah, tô só o pó, toda suja..."
34250-197 = "Mas... eu consegui aguentar até o sol nascer... foi bem sofrido, mas consegui..."
34250-198 = "Tenho certeza de que a Atsuko foi salva, né?"
34250-199 = "Será que a Saori e o resto do Squad... conseguiram ter o seu final feliz? #nCom o Sensei junto com elas, acho que sim..."
34250-203 = "É... se for assim, tudo bem..."
34250-211 = "Me desculpa, Sensei... acho que pra mim, acaba por aqui..."
34250-212 = "Eu queria tanto ter voltado com você, Sensei..."
34250-230 = "[ns] \"Espera!!!\""
34250-232 = "S-Se... Sensei!?"
34250-233 = "[s] \"Desculpe pela demora, Mika.\""
34250-234 = "S-Sensei... o que você tá fazendo aqui...? #nP-Por quê...?"
34250-235 = "[s] \"Eu não te disse? Que estaria sempre ao seu lado.\""
34250-236 = "...!!"
34250-237 = "[s] \"É claro que eu viria correndo salvar você.\""
34250-238 = "M-Mas... E-Eu... eu sou uma garota má..."
34250-239 = "Alguém como eu não merece ser salva por você, Sensei..."
34250-246 = "E-E além do mais... S-Sensei, como você vai encarar aquela Santa Sé sozinho...?"
34250-247 = "Eles são de outro nível, Sensei... #nE-Eu até que sou forte, mas... aqueles caras são trapaça, sabia!?"
34250-248 = "Sensei, por favor, foge! #nEu não valho tudo isso... ainda dá tempo, então vai!! "
34250-249 = "[s] \"Você é uma aluna problema, Mika.\""
34250-251 = "[ns11] \"Mas mesmo que seja uma aluna delinquente cheia de problemas...\"\n[ns12] \"Nenhum professor dá as costas para uma aluna em perigo!\""
34250-254 = "[ns] Puxa o Cartão de Adulto."
34250-258 = "[ns] \"...O QUE PENSAM...\""
34250-260 = "[ns13] \"O QUE PENSAM QUE ESTÃO FAZENDO COM A MINHA PRECIOSA ALUNA!!\"\n[ns14] \"COM A MINHA PRECIOSA PRINCESA!!\""
34250-261 = "!?"
34250-263 = "...Uau."