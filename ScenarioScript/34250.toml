[translation]
34250-1 = "Episódio 25: Pessoa Preciosa"
34250-3 = "[ns] \"Estão todos bem?\""
34250-4 = "Sim... por pouco."
34250-5 = "Ah..."
34250-6 = "A-acabou mesmo, não é...?"
34250-7 = "A Beatrice..."
34250-8 = "[s] \"Ela fugiu.\""
34250-12 = "Fugiu...?"
34250-13 = "[s] \"Mas acho que ela nunca mais fará ninguém sofrer.\""
34250-14 = "..."
34250-15 = "..."
34250-16 = "..."
34250-23 = "Sensei, obrigado por nos salvar."
34250-24 = "[s] \"Você não precisa mais usar a máscara?\""
34250-25 = "...Sim, estou bem."
34250-26 = "Eu não entendia por que a Madame queria tanto que eu usasse essa máscara..."
34250-27 = "Quando fui atingida pela explosão da bomba da Azusa, havia um dispositivo que protegeu meu corpo...#nAcho que era necessário para ativá-lo."
34250-28 = "No fim das contas, a Madame me fez usar esta máscara para me proteger."
34250-29 = "[s1] \"Então, vamos usá-la quando for necessário.\"\n[s2] \"Porque muitas pessoas ficariam tristes se a Atsuko se machucasse.\""
34250-30 = "..."
34250-31 = "..."
34250-32 = "É verdade... vou tentar usar a máscara de vez em quando."
34250-33 = "...Sensei."
34250-34 = "Como prometido... você salvou a Princesa...#nFaça o que quiser comigo."
34250-35 = "[s] \"O que eu quiser...?\""
34250-36 = "Eu sou a causa de tudo... o incidente do Tratado de Eden, o ataque à Seia, o ataque à Nagisa...#nMisaki, Hiyori, Atsuko... todos acabaram assim por minha causa."
34250-37 = "O Conselho Estudantil Geral, Trinity... ou o Departamento Correcional, não importa.#nMe envie para onde você achar mais apropriado."
34250-39 = "O que você está dizendo...!?"
34250-40 = "L-líder...!?"
34250-41 = "..."
34250-42 = "N-não brinque comigo, líder... sozinha, desse jeito...!"
34250-44 = "Não... eu vivi por muito tempo abandonando a responsabilidade que deveria carregar..."
34250-45 = "Isso é o certo... agora é o momento."
34250-46 = "L-líder..."
34250-48 = "[ns3] \"..............\"\n[ns4] \"...É verdade. Saori precisa assumir a responsabilidade.\""
34250-52 = "[ns] \"Saori se esforçou muito por muito tempo para proteger as crianças ao seu redor.\""
34250-55 = "[ns5] \"Cuidou dos outros, protegeu-os,\"\n[ns6] \"suportou... e assumiu a responsabilidade.\""
34250-59 = "[ns7] \"É justamente por isso que, em um ambiente distorcido e recebendo uma educação insana,\"\n[ns8] \"acredito que ela tenha feito escolhas erradas.\""
34250-64 = "[ns] \"Saori e as outras são alunas que cometeram erros... isso não muda.\""
34250-65 = "..."
34250-66 = "..."
34250-67 = "..."
34250-69 = "[ns] \"Mas isso não significa que elas mereçam sofrer.\""
34250-72 = "[ns9] \"O sofrimento das crianças não é culpa delas.\"\n[ns10] \"A responsabilidade por criar um mundo onde as crianças sofrem é de nós, adultos.\""
34250-75 = "O-o que você está dizendo...! Isso não pode ser...!!"
34250-76 = "Então... afinal... que responsabilidade eu devo assumir...?"
34250-78 = "..."
34250-79 = "Líder..."
34250-80 = "..."
34250-86 = "[ns] \"Assumir a responsabilidade é sobre a sua própria vida, Saori.\""
34250-87 = "……O, o que isso significa, eu não sei."
34250-88 = "……Eu acho que eu sei."
34250-89 = "Princesa……?"
34250-90 = "Saori, tem algo que você queira fazer?"
34250-94 = "Azusa disse que aprender é divertido.#nQue estar com os amigos é felicidade."
34250-99 = "Do que você gosta, Saori? O que você quer fazer? Quais são seus hobbies?"
34250-100 = "Qual sua comida favorita?#nEu nunca, nem uma vez sequer, ouvi você falar sobre isso."
34250-101 = "Saori, qual seu sonho para o futuro?#nTem algo que você queira ser?"
34250-103 = "……Isso, esse tipo de coisa……"
34250-104 = "Eu não sei…… Nunca, nem uma vez, pensei sobre algo assim……."
34250-105 = "Do que eu gosto, o que eu quero fazer…… Eu não sei nada sobre isso……."
34250-107 = "A Saori tem um forte senso de responsabilidade…… e é decidida…… hum."
34250-108 = "E, ela é boa em ensinar…… embora seja assustador quando ela nos ensina várias coisas……."
34250-109 = "Ela é séria, né. É boa em fazer planos e também em liderar."
34250-114 = "……."
34250-115 = "[ns] \"Entendi…… Nesse caso, Saori, daqui para frente…….\""
34250-117 = "[ns] \"Talvez você possa se tornar uma ótima professora.\""
34250-118 = "……!!!"
34250-121 = "A líder, uma, uma professora……!?"
34250-122 = "Bem, não consigo imaginar muito bem."
34250-123 = "Não, não é verdade.#nAcho que combinaria muito com você…… não acha?"
34250-125 = "……Eu não sei. Será que esse futuro…… realmente existe para mim……?"
34250-129 = "Eu não sei de nada…… nem o significado de carregar a responsabilidade de uma vida, nem do que eu gosto, nem desse futuro…… nada."
34250-130 = "Eu……."
34250-131 = "……Eu, será que eu…… posso continuar vivendo?"
34250-132 = "[s] \"A resposta para isso, vamos encontrar juntos.\""
34250-133 = "……."
34250-136 = "……."
34250-137 = "……."
34250-138 = "……."
34250-142 = "[ns] \"Bem, então, é hora de nos despedirmos.\""
34250-144 = "O quê……!?#nDe repente…… espere, Sensei!?"
34250-145 = "[s] \"Ainda há alunos que precisam de ajuda.\""
34250-147 = "Es, espere……!!"
34250-148 = "Eu…… nós……."
34250-152 = "Não, é verdade……"
34250-153 = "Encontrar isso é a minha……."
34250-154 = "[s] \"Como adulto, eu garanto — você certamente encontrará essa resposta.\""
34250-155 = "……!!"
34250-161 = "E, ele foi embora……?"
34250-162 = "……Com certeza foi ajudar a Mika, não foi?"
34250-163 = "Se, será que ele ficará bem sozinho……."
34250-165 = "……Eu acho que ele ficará bem. Foi assim daquela vez também."
34250-166 = "Daquela vez……?"
34250-167 = "O Sensei é um adulto, então acho que ele deve ter algum jeito."
34250-168 = "Beatrice já se foi, e tudo o que oprimia o Distrito Autônomo de Arius desapareceu."
34250-169 = "……."
34250-170 = "Líder……."
34250-171 = "Saori, você está bem……?"
34250-172 = "Sim……#nEu ainda…… não sei de nada…… mas mesmo assim……."
34250-178 = "Pela primeira vez... eu consegui pensar que está tudo bem eu estar neste mundo."
34250-193 = "Cof... cof."
34250-196 = "Ah... droga, estou toda coberta de lama..."
34250-197 = "Mas... eu consegui aguentar até o sol nascer... foi bem difícil, mas..."
34250-198 = "Tenho certeza de que a Atsuko foi salva, né?"
34250-199 = "A Saori e o resto do esquadrão também... será que todos tiveram um final feliz? Como o Sensei estava lá com eles, com certeza..."
34250-203 = "Sim... então, está tudo bem..."
34250-211 = "Desculpe, Sensei... acho que cheguei ao meu limite..."
34250-212 = "Mesmo querendo voltar para casa junto com você..."
34250-230 = "[ns] \"Espere!!!\""
34250-232 = "Se, Se... Sensei!?"
34250-233 = "[s] \"Desculpe pela demora, Mika.\""
34250-234 = "Se, Sensei... por que você está aqui...? Po, por quê...?"
34250-235 = "[s] \"Eu não disse? Eu sempre estarei do lado da Mika.\""
34250-236 = "...!!"
34250-237 = "[s] \"É claro que eu correria para ajudar se a Mika estivesse em perigo.\""
34250-238 = "Isso não... eu... eu sou uma garota má..."
34250-239 = "Eu não sou alguém que vale a pena ser salva por você, Sensei..."
34250-246 = "E, além disso... Se, Sensei, como você vai enfrentar o Conselho Estudantil sozinho...?"
34250-247 = "Eles estão em outro nível, Sensei... Eu também sou bem forte, mas... aquilo é praticamente trapaça!?"
34250-248 = "Sensei, por favor, pare! Eu não sou alguém que valha tanto a pena... fuja enquanto ainda pode...!!"
34250-249 = "[s] \"A Mika é uma aluna problemática.\""
34250-251 = "[ns11] \"Mas, mesmo sendo uma aluna rebelde cheia de problemas...\"\n[ns12] \"Não existe nenhum sensei que daria as costas para uma aluna em perigo!\""
34250-254 = "[ns] Saca o Cartão de Adulto."
34250-258 = "[ns] \"...Minha.\""
34250-260 = "[ns13] \"O que vocês estão fazendo com a minha aluna preciosa!!\"\n[ns14] \"O que vocês estão fazendo com a minha princesa preciosa!!\""
34250-261 = "!?"
34250-263 = "...Uau."
