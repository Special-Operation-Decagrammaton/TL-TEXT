[translation]
51180-1 = "Episódio 18; Histórias de Fantasmas Caminhando Pela Cidade (2)"
51180-4 = "Mesmo assim... mesmo assim, eu queria trazer de volta..."
51180-5 = "Eu só sentia falta do tempo que passávamos todas juntas...!"
51180-8 = "'Se você usou isso como desculpa achando que era para o bem dela..."
51180-9 = "Vocês só estão se machucando mutuamente', o Sensei disse..."
51180-10 = "......Eu falei aquilo para o bem da Yukari."
51180-11 = "Mas no fim, quem mais sofreu foi..."
51180-17 = "Nagusa-senpai..."
51180-18 = "Por que, você, naquela hora..."
51180-22 = "......Quem é?"
51180-29 = "Kikyou, quanto tempo."
51180-30 = "Nagusa-senpai...!?"
51180-31 = "Onde você estava até agora...?"
51180-32 = "Não... não importa. #n ――Bem-vinda de volta, senpai. "
51180-33 = "O estado atual da Hyakkaryouran é lamentável... #n Depois que você e a Presidente Ayame desapareceram, os outros membros também foram saindo um após o outro."
51180-34 = "Neste ritmo, a Hyakkaryouran... pode realmente acabar. #n Mas ainda dá tempo... Se a Nagusa-senpai falar com todo mundo――"
51180-40 = "――Kikyou, aceite isso."
51180-41 = "Isso é... o 'Emblema'? #n Por quê?"
51180-46 = "Kikyou, você é excepcional. #n Como estrategista da Hyakkaryouran, todos confiam em você."
51180-47 = "Não apenas as outras garotas... mas eu também."
51180-48 = "Por isso eu pensei. Que você... é muito mais digna de ser a presidente da Hyakkaryouran do que eu. "
51180-49 = "Então... estou devolvendo o emblema."
51180-55 = "Quero que você o guarde, Kikyou."
51180-60 = "Depois de desaparecer por meio ano sem dar notícias... #n Isso é tudo o que você tem a me dizer?"
51180-62 = "Sim."
51180-63 = "......Por quê?"
51180-68 = "......Porque eu, não sou a Ayame."
51180-69 = "Porque eu não posso substituir a Ayame."
51180-75 = "Fiquei com raiva."
51180-76 = "Não foi porque você tentou devolver o emblema e fugir."
51180-81 = "Você, era a nossa admiração."
51180-82 = "Adorávamos ver as suas costas, sempre caminhando à nossa frente. #n Nós te respeitávamos do fundo do coração."
51180-83 = "E mesmo assim... mesmo assim."
51180-85 = "Para mim, a Presidente Ayame não importava."
51180-86 = "Eu, nunca sequer pensei na Nagusa-senpai como uma substituta para a presidente... "
51180-87 = "E nem nunca desejei que fosse... nem uma única vez."
51180-92 = "Será que eu... errei?"
51180-94 = "O que você... quer que eu faça!?"
51180-99 = "......A cidade está agitada."
51180-105 = "(Com focos de incêndio se espalhando por toda parte, a cidade mergulhou no caos)"
51180-115 = "Uwaaah!"
51180-116 = "S, socorro, m, monstros...!!"
51180-124 = "Phew... você está bem?"
51180-127 = "[ns] \"Eu derrotei o monstro deste lado, então está seguro! Rápido, procure um abrigo!\""
51180-128 = "S, sim...! #n M-Muito obrigado!"
51180-135 = "......Isso não tem fim."
51180-136 = "[s] \"Vamos procurar se há mais alguém que não conseguiu fugir.\""
51180-137 = "......! O que você está dizendo numa situação dessas?"
51180-138 = "Sensei... você tá falando sério?"
51180-139 = "Achei que pelo menos você tivesse consciência de que isso é uma emergência."
51180-140 = "Numa hora dessas, você deveria garantir uma rota de fuga e evacuar o local... mesmo assim, por quê?"
51180-141 = "[s] \"Porque todos estão em perigo.\""
51180-142 = "Quem não conseguir fugir, ou o que vai acontecer com essa cidade, não tem nada a ver com você... #n São estranhos para você..."
51180-143 = "Normalmente, numa situação assim, a prioridade seria a própria vida. Não é?"
51180-144 = "Então por que você...?"
51180-145 = "[s1] \"As alunas...\"\n[s2] \"E as pessoas de Hyakkiyako são meus conhecidos.\""
51180-149 = "[ns3] \"E mesmo que fossem estranhos...\"\n[ns4] \"Não posso simplesmente ignorar pessoas em perigo.\""
51180-152 = "Tudo isso é, no fim, só discurso bonito...!"
51180-153 = "[ns] \"E além do mais, a Nagusa também veio comigo, não é?\""
51180-157 = "[ns] \"Você também não consegue ignorar. Igual a mim.\""
51180-158 = "......!!"
51180-159 = "Isso..."
51180-160 = "Eu, só..."
51180-161 = "[s5] \"Eu quero que me conte.\"\n[s6] \"Você sabe a verdadeira identidade daquelas coisas, não sabe?\""
51180-164 = "......Parece que você não vai voltar, não é."
51180-165 = "............"
51180-172 = "Aquilo é... um 'Genryou Tsukumogami'."
51180-173 = "Contos e boatos que a Hyakkaryouran costumava exterminar――"
51180-174 = "――Uma das 'Histórias de Fantasmas' que vêm do 'Crepúsculo'."
51180-175 = "[s] \"......Histórias de fantasmas.\""
51180-179 = "É uma espécie de lenda urbana, uma fofoca... não, se eu for usar um termo mais adequado..."
51180-182 = "Uma 'História de Fantasmas'―― talvez."
51180-183 = "Eles são conhecidos como 'O clube diabólico que não reconhece a forma atual da aliança da Hyakkiyako', ou 'O espírito maligno que manipula livros misteriosos e ilude as pessoas', ou algo do tipo..."
51180-186 = "Mesmo assim, é estranho..."
51180-187 = "Por que eles estão aqui...?"
51180-188 = "Não era pra eles estarem em um lugar desses... Por quê..."
51180-189 = "[s] \"Isso também é obra do Clube das Flores, Pássaros, Vento e Lua...?\""
51180-193 = "Onde você ouviu esse nome...!"
51180-199 = "Atrás de você...!?"
51180-205 = "Uwawa, espere, espere! #n Eu não sou um monstro!"
51180-206 = "Essa voz..."
51180-215 = "Ah, é o Sensei~!"
51180-216 = "Sensei! Você não se machucou...!?"
51180-217 = "[s] \"Não, estou bem. E vocês?\""
51180-219 = "......Nós estamos bem~"
51180-220 = "Mais importante..."
51180-222 = "Escuta, Sensei!"
51180-223 = "Foi horrível, a gente lutou contra umas coisas estranhas, caímos e...!"
51180-224 = "Eu não entendo mais nada! Uwaaaahn!"
51180-226 = "Está tudo bem, Kaede-chan. #n Você está com a gente, não precisa ter medo."
51180-227 = "Uuh... Mimori-senpai~!"
51180-228 = "[s] \"Que bom que não se machucaram. E os outros, além do Clube de Treinamento...\""
51180-236 = "Nagusa-senpai, então você estava aqui."
51180-237 = "......Renge."
51180-238 = "Tenho um monte de coisas... que quero te dizer e perguntar."
51180-239 = "Mas antes disso――"
51180-251 = "Precisamos cuidar desses monstros!"
51180-252 = "Então... você vai ajudar, Nagusa-senpai?"
51180-257 = "Eu..."
51180-263 = "Uma fera..."
51180-264 = "Esse rugido... não me diga que...!"
51180-269 = "(A cidade inteira está em chamas)"
51180-270 = "(Rugidos ecoam por toda parte)"
51180-276 = "O fato do Clube das Flores, Pássaros, Vento e Lua estar aqui, significa... "
51180-278 = "Os Tsukumogami não são os únicos...?"
51180-280 = "Vamos fugir."
51180-281 = "Hã!? Espera aí, Nagusa-senpai, como assim fugir..."
51180-282 = "Ei! Espera aí, vai fugir de novo!?"
51180-283 = "[s] \"Renge, calma...\""
51180-284 = "Como posso ter calma! #n Ela tá fazendo isso de novo...!"
51180-285 = "Se fossem só Tsukumogami, tudo bem... #n ――Se [ruby=·   ·]ao menos[/ruby] fossem apenas eles."
51180-290 = "Eles não são nada além de fragmentos do 'Hyakumonogatari'... seres derivados da história, criados a partir de 'boatos'..."
51180-291 = "Mas, se 'aquilo' apareceu..."
51180-292 = "Se a história transcendeu os 'boatos' e se tornou uma 'História de Fantasmas'... #n O próximo será――"
51180-302 = "O que é... aquilo?"
51180-303 = "............Um gatinho?"
51180-304 = "Ué, existe gato desse tamanho!?"
51180-306 = "Tarde demais..."
51180-307 = "A 'Genryou Hyakumonogatari'... está aqui."
51180-308 = "Aquilo é―― a [ruby=·   ·   ·   ·   ·   ·   ·]história que virou fantasma[/ruby]...!"
51180-309 = "Sem a Ayame, eu não...!"
51180-314 = "[ns] \"Pessoal, cuidado! Ele está vindo...!\""
