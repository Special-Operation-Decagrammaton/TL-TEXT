[translation]
51180-1 = "Episódio 18; A lenda urbana que caminha pela cidade (2)"
51180-4 = "Mesmo assim... mesmo assim, eu queria recuperar tudo..."
51180-5 = "Eu só sentia falta do tempo que passávamos todos juntos...!"
51180-8 = "“Se for apenas uma desculpa dita por consideração ao outro..."
51180-9 = "Isso só vai acabar ferindo a ambos”, eu disse..."
51180-10 = "...Eu disse aquilo por causa da Yukari."
51180-11 = "Mas, no fim, quem mais sofreu foi..."
51180-17 = "Nagusa-senpai..."
51180-18 = "Por que você, naquele momento..."
51180-22 = "...Quem está aí?"
51180-29 = "Kikyou, quanto tempo."
51180-30 = "Nagusa-senpai...!?"
51180-31 = "Onde você esteve esse tempo todo...?"
51180-32 = "Não... esquece isso. #n— Bem-vinda de volta, senpai."
51180-33 = "A situação atual da Hyakkiyako é terrível... #nCom o desaparecimento da presidente Ayame e da Nagusa-senpai, os outros membros foram saindo um a um."
51180-34 = "Se continuar assim, é bem possível que... a Hyakkiyako deixe de existir. #nNão é tarde demais... Nagusa-senpai, fale com todos—"
51180-40 = "—Kikyou, aceite isto."
51180-41 = "Isto é... o \"emblema\"? #nPor quê?"
51180-46 = "Kikyou, você é talentosa. #nComo estrategista da Hyakkiyako, todos confiam em você."
51180-47 = "Não só os outros membros... eu também."
51180-48 = "Por isso eu pensei. Mais do que eu... você é quem merece ser a presidente da Hyakkiyako."
51180-49 = "Então... estou devolvendo o emblema."
51180-55 = "Quero que você fique com ele, Kikyou."
51180-60 = "Depois de meio ano sem dar notícias... #né essa a sua resposta?"
51180-62 = "Sim."
51180-63 = "...Por quê?"
51180-68 = "...Porque eu não sou a Ayame."
51180-69 = "Porque eu não consigo ser um substituto para a Ayame."
51180-75 = "Eu fiquei furiosa."
51180-76 = "Não porque você tentou fugir devolvendo o emblema."
51180-81 = "Você era a nossa inspiração."
51180-82 = "Eu amava ver você caminhando à nossa frente. #nEu te respeitava do fundo do meu coração."
51180-83 = "E ainda assim... mesmo assim."
51180-85 = "Eu não me importo com a presidente Ayame."
51180-86 = "Eu nunca, em momento algum, pensei na Nagusa-senpai como um substituto para a presidente..."
51180-87 = "Nunca desejei que você fosse um substituto... nem uma única vez."
51180-92 = "Será que eu... estava errada?"
51180-94 = "O que você quer que eu faça...!?"
51180-99 = "...A cidade está barulhenta."
51180-105 = "(Focos de incêndio se espalhavam por toda parte, e a cidade estava mergulhada no caos)"
51180-115 = "Aaaah!"
51180-116 = "A-ajuda, um, um monstro...!!"
51180-124 = "Ufa... você está bem?"
51180-127 = "[ns] \"Derrotei os monstros deste lado, então está seguro! Vamos, evacue!\""
51180-128 = "S-sim...! #nO-obrigada!"
51180-135 = "...Isso não tem fim."
51180-136 = "[s] \"Vamos procurar por pessoas que não conseguiram fugir.\""
51180-137 = "...! O que você está dizendo nessa situação?"
51180-138 = "Sensei... você está falando sério?"
51180-139 = "Eu achei que você tivesse noção de que estamos em uma situação de emergência."
51180-140 = "Nessas horas, o certo é garantir uma rota de fuga e se retirar... mas, por que você..."
51180-141 = "[s] \"É porque todos estão em perigo.\""
51180-142 = "Não importa quem fique para trás ou o que aconteça aqui, não é problema seu...#nVocê nem os conhece..."
51180-143 = "Normalmente, a prioridade nessas horas é a própria vida. Não é assim?"
51180-144 = "Então, por que você...?"
51180-145 = "[s1] \"Incluindo as alunas...\"\n[s2] \"Porque conheço o pessoal de Hyakkiyako.\""
51180-149 = "[ns3] \"Mesmo que eu não os conhecesse...\"\n[ns4] \"Eu não conseguiria ignorar uma situação perigosa.\""
51180-152 = "Isso não passa de conversa fiada...!"
51180-153 = "[ns] \"Além disso, Nagusa, você também veio comigo, não veio?\""
51180-157 = "[ns] \"Você não consegue deixar para lá, consegue? Eu também não.\""
51180-158 = "……！！"
51180-159 = "Isso é..."
51180-160 = "Eu só..."
51180-161 = "[s5] \"Eu quero que me conte.\"\n[s6] \"Você sabe quem eles são, não sabe?\""
51180-164 = "...Você não pretende voltar, não é?"
51180-165 = "…………"
51180-172 = "Aquilo é... um \"Genryo Tsukumogami\"."
51180-173 = "Algo que o Hyakka Ryoran costumava exterminar, contos e rumores――"
51180-174 = "――Um dos \"Contos de Terror\" que vêm do \"Crepúsculo\"."
51180-175 = "[s] \"...Contos de terror.\""
51180-179 = "É um tipo de lenda urbana, uma existência de fofoca... ou melhor, se formos usar um termo mais apropriado..."
51180-182 = "Seria um \"Hyakumonogatari\", talvez."
51180-183 = "Eles são chamados de \"um clube cruel que não reconhece a forma atual da união de Hyakkiyako\", ou de \"monstros que manipulam livros proibidos e confundem as pessoas\"... ou talvez não sejam..."
51180-186 = "Mesmo assim, é estranho..."
51180-187 = "Por que eles estão aqui...?"
51180-188 = "Eles não deveriam estar em um lugar como este... por que..."
51180-189 = "[s] \"Isso também é obra do Clube Kachou Fuugetsu...?\""
51180-193 = "Onde você ouviu esse nome...!"
51180-199 = "Atrás de mim...!?"
51180-205 = "Uau, espera, espera!#nEu não sou um monstro!"
51180-206 = "Essa voz é..."
51180-215 = "Ah, Sensei!"
51180-216 = "Sensei! Você não se machucou, machucou...!?"
51180-217 = "[s] \"Estou bem. E vocês?\""
51180-219 = "...Nós estamos bem~"
51180-220 = "Mas, antes disso..."
51180-222 = "Sensei, escuta!"
51180-223 = "Foi um caos, lutamos contra umas coisas estranhas e caímos por aí!"
51180-224 = "Eu nem sei mais o que está acontecendo! Buááá!"
51180-226 = "Está tudo bem, Kaede-chan.#nVocê está com todos nós, então não precisa ter medo."
51180-227 = "Uuu... Mimori-senpai~!"
51180-228 = "[s] \"Fico feliz que não tenham se ferido. Além do Clube de Treinamento...\""
51180-236 = "Nagusa-senpai, então você estava aqui."
51180-237 = "...Renge."
51180-238 = "Eu tenho tantas coisas para dizer e perguntar..."
51180-239 = "Mas, antes disso――"
51180-251 = "Precisamos acabar com esse monstro!"
51180-252 = "Então... Nagusa-senpai, você vai nos ajudar, não vai?"
51180-257 = "Eu..."
51180-263 = "Besta..."
51180-264 = "Esse grito... será que...!"
51180-269 = "(A cidade inteira está em chamas)"
51180-270 = "(O grito ecoa)"
51180-276 = "Se o Clube Kachoufuugetsu veio até aqui, isso significa que..."
51180-278 = "Os Tsukumogami não são o fim...?"
51180-280 = "Vamos fugir."
51180-281 = "Hã!? Espere, Nagusa-senpai, fugir, você diz..."
51180-282 = "Ei! Espere, você vai fugir de novo?!"
51180-283 = "[s] \"Renge, acalme-se...\""
51180-284 = "Como quer que eu me acalme!#nAquela pessoa de novo...!"
51180-285 = "Se forem Tsukumogami, tudo bem...#n――Desde que sejam apenas Tsukumogami, é claro."
51180-290 = "Aquilo é apenas uma parte das Cem Histórias... Uma existência derivada de contos, criada por \"rumores\"..."
51180-291 = "Mas, se \"aquilo\" apareceu..."
51180-292 = "Se a história transcender os \"rumores\" e se tornar uma \"história de terror\"...#nO que vem a seguir é――"
51180-302 = "O que é... aquilo?"
51180-303 = "............Um gatinho?"
51180-304 = "Ei, existe um gato desse tamanho!?"
51180-306 = "Chegamos tarde demais..."
51180-307 = "As \"Cem Histórias de Fantasmas Ilusórias\"... estão aqui."
51180-308 = "Aquilo é――as Cem Histórias que se tornaram uma história de terror...!"
51180-309 = "Se não for a Ayame, não tem mais jeito...!"
51180-314 = "[ns] \"Pessoal, cuidado! Lá vem...!\""
