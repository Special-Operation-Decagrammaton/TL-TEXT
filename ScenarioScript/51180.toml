[translation]
51180-1 = "第18話;街を歩く怪談（２）"
51180-4 = "それでも……それでも、身共は取り戻したかったのです……"
51180-5 = "身共はただ、みんなで過ごしていた時間が恋しくて……！"
51180-8 = "「もしも、相手を思っての建前だとしたら……"
51180-9 = "それは互いを傷つけるだけだよ」って……。"
51180-10 = "……ユカリのために、ああ言ったけど。"
51180-11 = "結局一番苦しんだのは……。"
51180-17 = "ナグサ先輩……"
51180-18 = "なんで、あなたはあの時……。"
51180-22 = "……誰？"
51180-29 = "キキョウ、久しぶり。"
51180-30 = "ナグサ先輩……！？"
51180-31 = "今までどこに……？"
51180-32 = "いや……そういうのはいいか。#n――おかえり、先輩。 "
51180-33 = "今の百花繚乱の惨状はすごいよ……#nアヤメ委員長とナグサ先輩が居なくなって、他のメンバーもどんどん抜けていった。"
51180-34 = "このままじゃ本当に……百花繚乱は無くなってしまうかもしれない。#n今からでも遅くない……ナグサ先輩がみんなに話を――"
51180-40 = "――キキョウ、これを受け取って。"
51180-41 = "これは……「証」？#nどうして？"
51180-46 = "キキョウ、あなたは優秀。#n百花繚乱の作戦参謀として、みんながあなたを頼りにしてる。"
51180-47 = "他のメンバーだけじゃなく……私もそう。"
51180-48 = "だから思ったの。私よりも……あなたの方が、百花繚乱の委員長に相応しいと。 "
51180-49 = "だから……証を返すよ。"
51180-55 = "キキョウに預かっていてほしい。"
51180-60 = "半年も連絡がとれなくなったと思ったら……#nこんなものが答え？"
51180-62 = "そう。"
51180-63 = "……どうして？"
51180-68 = "……私は、アヤメじゃないから。"
51180-69 = "私は、アヤメの代わりになれないから。"
51180-75 = "腹が立った。"
51180-76 = "証を返して逃げようとしたから、じゃない。"
51180-81 = "あなたは、私たちの憧れだった。"
51180-82 = "私たちの前を歩くあなたの姿が好きだった。#n心から敬愛していた。"
51180-83 = "なのに……それなのに。"
51180-85 = "アヤメ委員長の事なんてどうでもいいんだよ。"
51180-86 = "私、今までナグサ先輩を委員長代わりだと思ったことなんて…… "
51180-87 = "代わりになってほしいと思ったことなんて……一度もなかったのに。"
51180-92 = "私が……間違ってたの？"
51180-94 = "私に、どうしろと……！？"
51180-99 = "……街が騒がしい。"
51180-105 = "（至る所に火の手が広がり、街は混乱に陥っていた）"
51180-115 = "うわああっ！"
51180-116 = "た、助けて、か、怪物が……！！"
51180-124 = "ふぅ……大丈夫？"
51180-127 = "[ns] \"こっち側の怪物は倒してきたので安全です！さあ、避難を！\""
51180-128 = "は、はい……！#nあ、ありがとうございます！"
51180-135 = "……キリがないね。"
51180-136 = "[s] \"逃げ遅れてる人がいないか探してみよう。\""
51180-137 = "……！この状況で何を言ってるの？"
51180-138 = "先生……あなた、本気？"
51180-139 = "緊急事態である認識くらい、持っていると思っていたのだけど。"
51180-140 = "こういう時は退路を確保して避難しないと……それなのに、どうして。"
51180-141 = "[s] \"みんなに危険が迫ってるからだよ。\""
51180-142 = "ここで誰が逃げ遅れようと、何が起ころうとあなたにとっては関係ない……#n他人なのに……"
51180-143 = "普通、こういう時に優先するのは自身の命。そうじゃないの？"
51180-144 = "なのに、どうしてあなたは……？"
51180-145 = "[s1] \"生徒含め……\"\n[s2] \"百鬼夜行の人たちとは知り合いだからね。\""
51180-149 = "[ns3] \"たとえ他人だったとしても……\"\n[ns4] \"危険な状況を見過ごすことはできないよ。\""
51180-152 = "そんなの所詮、綺麗事でしょ……！"
51180-153 = "[ns] \"それに、ナグサだって一緒に来てくれてるでしょ。\""
51180-157 = "[ns] \"放っておけないんだよね？私もそう。\""
51180-158 = "……！！"
51180-159 = "それは……"
51180-160 = "私は、ただ……"
51180-161 = "[s5] \"教えてほしいんだ。\"\n[s6] \"あいつらの正体、知ってるんだよね？\""
51180-164 = "……帰るつもりはないのね。"
51180-165 = "…………"
51180-172 = "アレは……[ruby=げんりょうつくもがみ]「幻魎付喪神」[/ruby]。"
51180-173 = "かつては百花繚乱が退治してきた、説話やうわさ――"
51180-174 = "――「黄昏」より[ruby=きた]来[/ruby]る「怪談」の一つ。"
51180-175 = "[s] \"……怪談。\""
51180-179 = "いわば都市伝説の一種でありゴシップ的な存在……いえ、もう少しそれっぽい言い方をすれば……"
51180-182 = "「[ruby=かいだん]百物語[/ruby]」――でしょうか。"
51180-183 = "彼らは｢百鬼夜行の連合の今の形態を認めない、極悪非道の部活｣だとか、｢怪書を操り、人々を惑わす[ruby=ちみもうりょう]魑魅魍魎[/ruby]」と呼ばれたり､呼ばれなかったり……"
51180-186 = "だとしてもおかしい……"
51180-187 = "どうしてここに……？"
51180-188 = "こんなところにいるはずないのに……どうして……"
51180-189 = "[s] \"これも花鳥風月部の……？\""
51180-193 = "どこでその名を……！"
51180-199 = "後ろ……！？"
51180-205 = "わわっ、待った待った！#nアタシは怪物じゃないってば！"
51180-206 = "この声は……"
51180-215 = "あっ、先生だ～！"
51180-216 = "先生！お怪我はありませんか……！？"
51180-217 = "[s] \"うん、大丈夫。そっちは？\""
51180-219 = "……私たちは大丈夫～"
51180-220 = "それより……"
51180-222 = "先生聞いて！"
51180-223 = "なんか変なのと戦ったり転んだりで大変だったんだよ！"
51180-224 = "何が何だかもう分かんないよぉ！うわぁあん！"
51180-226 = "大丈夫ですよカエデちゃん。#nみなさんと一緒ですから、怖がらないでください。"
51180-227 = "ううっ……ミモリ先輩～！"
51180-228 = "[s] \"怪我がなくてよかった。修行部以外には……\""
51180-236 = "ナグサ先輩、ここに居たんだな。"
51180-237 = "……レンゲ。"
51180-238 = "言いたいことも、聞きたいことも……山ほどあるけど。"
51180-239 = "その前にまず――"
51180-251 = "この怪物を片付けないとな！"
51180-252 = "その……ナグサ先輩も協力してくれるよな？"
51180-257 = "私は……"
51180-263 = "獣……"
51180-264 = "この鳴き声……もしかして……！"
51180-269 = "（街中が燃えている）"
51180-270 = "（鳴き声が木霊する）"
51180-276 = "花鳥風月部がここに来たという事は…… "
51180-278 = "[ruby=つくもがみ]付喪神[/ruby]が最後では、ない……？"
51180-280 = "逃げるよ。"
51180-281 = "へ！？待ってくれナグサ先輩、逃げるって……"
51180-282 = "ちょっと！待ってくれよ、また逃げるのかよ！"
51180-283 = "[s] \"レンゲ、落ち着いて……\""
51180-284 = "落ち着いてられるか！#nあの人はまた……！"
51180-285 = "付喪神なら大丈夫……#n――付喪神[ruby=・   ・]まで[/ruby]なら、ね。"
51180-290 = "アレは百物語の一部に過ぎない……「うわさ」によって作られた、物語から派生した存在……"
51180-291 = "でも、「アレ」が現れたのなら……"
51180-292 = "物語が、「うわさ」を超えて「怪談」となってしまうのなら……#nこの次は――"
51180-302 = "なんだ……アレ？"
51180-303 = "…………ねこ、さん？"
51180-304 = "えっ、あんなデカい猫、いる！？"
51180-306 = "遅かった……"
51180-307 = "[ruby=げんりょうひゃくものがたり]「幻魎百物語」[/ruby]が……ここに。"
51180-308 = "アレは――[ruby=・   ・   ・   ・   ・   ・   ・]怪談へと成った[/ruby]百物語は……！ "
51180-309 = "アヤメじゃないと、もう……！"
51180-314 = "[ns] \"みんな気を付けて！来るよ……！\""
