[translation]
10035030-1 = "第3話;みんなで遊びましょう！"
10035030-2 = "新しい配置先はあそこですね！"
10035030-3 = "子供たちが遊んでいるプールです！"
10035030-4 = "屋内に来たのはいいけど、子供の世話は面倒だなぁ……。"
10035030-5 = "あっちこっち走り回って疲れるじゃん。"
10035030-9 = "……。"
10035030-10 = "[s1] \"ミスは誰だってするものだから。\"\n[s2] \"あまり気にしすぎないようにね。\""
10035030-13 = "……はい、先生。"
10035030-14 = "先ほどはつい、いつもの癖が出てしまいました。"
10035030-15 = "長年、公安局にいたせいで、体に染み付いてしまったのでしょう。"
10035030-16 = "気にしないでください！ミスぐらい、誰だってするものですから！"
10035030-17 = "最初から完璧な人なんて、いないからね～"
10035030-18 = "まっ、元気出してよ、局長。"
10035030-19 = "……ありがとう。"
10035030-20 = "たしかに、市民対応に関しては、お前たちの方が私より上だ。"
10035030-21 = "アドバイスをもらえるか？さっきのような事を起こさないためにも。"
10035030-22 = "簡単かんたん！力を抜いて、適当に働いて適当に休めばそれで――"
10035030-23 = "フブキ！休む以上に大切なことがあるでしょう！"
10035030-24 = "こほん。それでは局長のために……。#n生活安全局の市民対応三大原則をお教えしましょう！"
10035030-26 = "三大原則か。"
10035030-27 = "なーんか、楽しそうだねー。"
10035030-29 = "はい！生活安全局の市民対応三大原則。#nそれは――"
10035030-30 = "「奉仕、傾聴、誠実」です！"
10035030-31 = "奉仕！常に市民に奉仕する気持ちで！"
10035030-32 = "傾聴！常に市民の声に耳を傾けて！"
10035030-33 = "誠実！常に市民に誠実な対応を！"
10035030-34 = "前期の市民対応で、本官は高い点数を獲得しましたが……。#nすべてこの三大原則を忠実に守っていたおかげだと思います！"
10035030-35 = "一番重視される射撃の評価は0点だったけどね。"
10035030-36 = "そ、それは、今は関係ないでしょう！"
10035030-37 = "それと、もう一つ大事なことがあるのですが。"
10035030-38 = "他にもあるのか？"
10035030-39 = "これは三大原則ではありません……。#n本官が生活安全局で、勤務するなかで気づいたことです。"
10035030-40 = "市民対応で大事なこと。#nそれは――「笑顔」です！"
10035030-41 = "笑顔……？"
10035030-42 = "はい。本官は、いつどんな時も！#n市民には笑顔で接することを心がけています。"
10035030-43 = "そうすれば、市民の皆さんも笑顔になってくれて。#n本官も前向きな気持ちになれますから！"
10035030-44 = "分かった。参考にさせてもらう。"
10035030-45 = "はい！では、さっそく行きましょう！"
10035030-49 = "このプール、本当に子供用なんですね。"
10035030-50 = "深さも腰までしかありませんし……。"
10035030-51 = "本官はまだ水泳に慣れていないのですが。#nこれなら救助活動に支障はなさそうです！"
10035030-52 = "それに、子供たちもみんな、可愛らしいですね！"
10035030-53 = "んん、なんだ？新米が入ってきたぞ？"
10035030-54 = "へへっ。お前らも一緒に遊ぶか？"
10035030-55 = "あ、あれ？"
10035030-56 = "うーん、不穏な感じ……。"
10035030-57 = "あっ！そこの黄色い水着の子！走らないで！危ないですよ！"
10035030-58 = "けけけっ！捕まえてみろー！"
10035030-59 = "こらぁ、待ちなさい！"
10035030-63 = "キリノ！危ない！"
10035030-65 = "今だっ！撃て！"
10035030-72 = "うわっ！？"
10035030-77 = "おぉ～、綺麗に落とされたね。"
10035030-78 = "あの子、射撃の素質がありそうだよ。"
10035030-79 = "あっぷあっぷ！"
10035030-80 = "ふ、フブキ！助けてください！"
10035030-81 = "普通に足つくでしょ。水深も浅いんだしさ。"
10035030-82 = "あ、そうでした……。"
10035030-83 = "わぁ！魔女がよみがえったぞ！"
10035030-84 = "撃て！撃て――！"
10035030-85 = "うわっ！顔に水をかけるのはやめてください！"
10035030-86 = "ううっ！本官も負けませんよ！"
10035030-87 = "くらえっ！やっ！"
10035030-91 = "……。"
10035030-92 = "[s] \"なんだか、仲良く遊んじゃってるね。\""
10035030-93 = "だね～"
10035030-94 = "しょうがない。私が落ち着かせてくるよ。"
10035030-95 = "どうするつもりだ？"
10035030-98 = "は～い。みんな注目！"
10035030-99 = "なんだ？あのチビ？"
10035030-100 = "弱そうなやつ！"
10035030-101 = "今から……「だるまさんがころんだ」を始めるよ！"
10035030-102 = "だるまさんがころんだ！？"
10035030-103 = "誰が一番長く立っていられるかなぁ。勝負だよ！"
10035030-104 = "（そんなこと、いきなり言って子供が応じるのか……？）"
10035030-105 = "最後まで立っていた人には、プラス10点！"
10035030-106 = "（なんの点数かわからないのに、受け入れるわけが……）"
10035030-107 = "それじゃあ、ゲームスタート！"
10035030-108 = "だるまさんが～～ころんだ！"
10035030-109 = "……（なんとなく始めたけど！）"
10035030-110 = "……（なんかよく分かんないけど……！）"
10035030-111 = "……（負けたくない……！）"
10035030-113 = "あ！そこ、動いたね。アウト！"
10035030-117 = "さっきまで走り回っていたのに……。"
10035030-118 = "大人しくなりましたね……！"
10035030-119 = "さあ、もっかい行くよ。#nだるまさんが～ころんだ！"
10035030-121 = "（フブキは子供たちが飽きるまで遊んだ……。）"
10035030-123 = "[ns3] \"すごかったよ、フブキ。\"\n[ns4] \"フブキは子供の相手、慣れてるね。\""
10035030-126 = "まぁ、それなりにねー。"
10035030-127 = "無理やり押さえつけるより、競わせる方が楽なんだよ。"
10035030-128 = "パトロール中は、子供の相手をすることも多いからさ。"
10035030-129 = "そ、そうなのか……。"
10035030-130 = "なるほどな。勉強になった。"
10035030-131 = "これで、子供たちのことはゆっくり見守るだけでいいよ。"
10035030-132 = "んじゃ、後は任せた～。"
10035030-134 = "はい！お任せください！"
10035030-135 = "さっきは油断しましたが、二度目はありません！"
10035030-136 = "では、私は反対側を見張っておこう。"
10035030-137 = "[s] \"私もカンナの近くにいるね。\""
10035030-138 = "はい！では二手に分かれて両サイドを担当しましょう！"
10035030-139 = "先生もお手伝い、ありがとうございます。"
10035030-142 = "ライフセーバーの仕事は、思った以上に難しいですね。"
10035030-143 = "[s] \"カンナなら、すぐに慣れるよ。\""
10035030-144 = "そうだといいんですが……正直、自信はありません。"
10035030-145 = "さっきのミスもありますし、私にはフブキのような手際の良さもありませんので。"
10035030-146 = "[s] \"落ち込むのはまだはやいよ。\""
10035030-148 = "[ns] \"奉仕、傾聴、誠実、それと笑顔でしょ？\""
10035030-150 = "ふふ、そうでしたね。"
10035030-151 = "仰るとおりです。もう少し頑張ってみましょう。"
10035030-155 = "！？"
10035030-156 = "ううっ！ごふっ！"
10035030-157 = "た、助けてー！"
10035030-158 = "あっぷ！あっぷ！"
10035030-159 = "子供が溺れている……！"
10035030-160 = "先生、助けに行ってきます！"
10035030-165 = "はぁ、はぁ。"
10035030-166 = "大丈夫だったか？"
10035030-167 = "げほげほ……！"
10035030-168 = "み、水の中にワニが！大きなワニが……！"
10035030-169 = "驚いて幻を見たんだな。もう大丈夫だ、安心してくれ。"
10035030-170 = "プール怖いよぅ！"
10035030-171 = "もう入りたくない……！"
10035030-172 = "心配するな。溺れないように私が見ている。"
10035030-173 = "[s] \"カンナ！笑顔！笑顔！\""
10035030-174 = "……あ！"
10035030-178 = "も、もう安心して、いいんだよ。"
10035030-179 = "ふぇ……。"
10035030-180 = "うわああああぁぁん！！"
10035030-188 = "……？"
10035030-189 = "[ns] （カンナの顔を見て、プールに逃げた……？）"
10035030-190 = "あのお姉ちゃんも怖いよぉぉ！うわあぁぁん！"
10035030-194 = "……先生。"
10035030-195 = "私は……、本当に市民を守れるのか……。"
10035030-196 = "自信が無くなりました……。"
