[translation]
10035030-1 = "Episódio 3; Vamos brincar todos juntos!"
10035030-2 = "O novo local de patrulha é ali, não é?"
10035030-3 = "É a piscina onde as crianças estão brincando!"
10035030-4 = "É bom que tenhamos vindo para um ambiente fechado, mas cuidar de crianças é um saco..."
10035030-5 = "Elas ficam correndo para todo lado, é cansativo."
10035030-9 = "……."
10035030-10 = "[s1] \"Todo mundo comete erros, afinal.\"\n[s2] \"Não se preocupe tanto com isso.\""
10035030-13 = "……Sim, Sensei."
10035030-14 = "Acabei de deixar meu hábito de sempre falar mais alto."
10035030-15 = "Deve ser porque passei tantos anos no Departamento de Segurança Pública, acabou ficando enraizado em mim."
10035030-16 = "Não se preocupe com isso! Todo mundo comete erros, afinal!"
10035030-17 = "Ninguém é perfeito desde o começo, né~"
10035030-18 = "Vamos lá, anime-se, Chefe."
10035030-19 = "……Obrigada."
10035030-20 = "De fato, no que diz respeito ao atendimento ao cidadão, vocês são melhores do que eu."
10035030-21 = "Poderiam me dar um conselho? Para que algo como o que aconteceu agora não se repita."
10035030-22 = "Fácil! É só relaxar, trabalhar de qualquer jeito e descansar de qualquer jeito, e aí—"
10035030-23 = "Fubuki! Tem coisas mais importantes do que descansar!"
10035030-24 = "Ehem. Então, para a Chefe... #nDeixe-me ensinar os três princípios fundamentais do atendimento ao cidadão do Departamento de Segurança Pública!"
10035030-26 = "Três princípios, é?"
10035030-27 = "Parece ser algo bem divertido."
10035030-29 = "Sim! Os três princípios fundamentais do atendimento ao cidadão do Departamento de Segurança Pública. #nSão eles—"
10035030-30 = "“Serviço, Escuta e Sinceridade”!"
10035030-31 = "Serviço! Sempre com o desejo de servir aos cidadãos!"
10035030-32 = "Escuta! Sempre ouvindo a voz dos cidadãos!"
10035030-33 = "Sinceridade! Sempre tratando os cidadãos com sinceridade!"
10035030-34 = "No período passado, obtive uma pontuação alta no atendimento ao cidadão... #ne acredito que tudo isso foi graças a seguir fielmente esses três princípios!"
10035030-35 = "Mas a avaliação de tiro, que é a mais importante, foi nota zero."
10035030-36 = "Is-isso não tem nada a ver com o assunto agora!"
10035030-37 = "Além disso, tem mais uma coisa importante."
10035030-38 = "Tem mais alguma coisa?"
10035030-39 = "Isso não faz parte dos três princípios... #nfoi algo que percebi enquanto trabalhava no Departamento de Segurança Pública."
10035030-40 = "Algo importante no atendimento ao cidadão. #nÉ... o “Sorriso”!"
10035030-41 = "Sorriso...?"
10035030-42 = "Sim. Eu, a qualquer momento e em qualquer situação! #nMe esforço para atender os cidadãos com um sorriso."
10035030-43 = "Fazendo isso, os cidadãos também sorriem. #ne eu também consigo manter um pensamento positivo!"
10035030-44 = "Entendido. Vou levar isso em consideração."
10035030-45 = "Sim! Então, vamos começar logo!"
10035030-49 = "Essa piscina é realmente para crianças."
10035030-50 = "A profundidade só chega até a cintura..."
10035030-51 = "Ainda não estou acostumada a nadar, mas... #nassim não haverá problemas para as atividades de resgate!"
10035030-52 = "Além disso, as crianças são todas tão adoráveis!"
10035030-53 = "Hmm, o que é isso? Novatos chegaram?"
10035030-54 = "Hehe. Vocês também querem brincar com a gente?"
10035030-55 = "Ah, hã?"
10035030-56 = "Hmm, que sensação estranha..."
10035030-57 = "Ah! A criança de roupa de banho amarela ali! Não corra! É perigoso!"
10035030-58 = "Hehehe! Tenta me pegar!"
10035030-59 = "Ei, espere aí!"
10035030-63 = "Kirino! Cuidado!"
10035030-65 = "Agora! Atirem!"
10035030-72 = "Uau!?"
10035030-77 = "Oh, ela foi derrubada direitinho."
10035030-78 = "Aquela garota parece ter talento para o tiro."
10035030-79 = "Socorro, estou me afogando!"
10035030-80 = "Fu-Fubuki! Por favor, me ajude!"
10035030-81 = "Você consegue tocar o chão normalmente, sabe? A água é rasa."
10035030-82 = "Ah, é verdade..."
10035030-83 = "Uau! A bruxa ressuscitou!"
10035030-84 = "Atirem! Atirem!"
10035030-85 = "Ei! Parem de jogar água no meu rosto!"
10035030-86 = "Grrr! Eu não vou perder!"
10035030-87 = "Toma essa! Hah!"
10035030-91 = "..."
10035030-92 = "[s] \"Parece que eles estão se divertindo juntos.\""
10035030-93 = "Pois é~"
10035030-94 = "Não tem jeito. Vou lá acalmar as coisas."
10035030-95 = "O que você pretende fazer?"
10035030-98 = "Ei, pessoal! Atenção aqui!"
10035030-99 = "Quem é aquele baixinho?"
10035030-100 = "Parece fraco!"
10035030-101 = "A partir de agora... vamos brincar de \"Estátua\"!"
10035030-102 = "Estátua!?"
10035030-103 = "Vamos ver quem consegue ficar parado por mais tempo. É um desafio!"
10035030-104 = "(Será que as crianças vão obedecer do nada assim...?)"
10035030-105 = "Quem ficar de pé até o final ganha 10 pontos extras!"
10035030-106 = "(Eles nem sabem que pontos são esses, por que aceitariam...?)"
10035030-107 = "Então, o jogo começou!"
10035030-108 = "Estátua!"
10035030-109 = "...(Comecei isso do nada, mas funcionou!)"
10035030-110 = "...(Não entendi direito, mas...!)"
10035030-111 = "...(Não quero perder...!)"
10035030-113 = "Ah! Você aí, se mexeu. Está fora!"
10035030-117 = "E pensar que eles estavam correndo por aí até agora..."
10035030-118 = "Eles ficaram quietos de repente...!"
10035030-119 = "Certo, vamos de novo. #nEstátua!"
10035030-121 = "(Fubuki brincou com as crianças até elas se cansarem...)"
10035030-123 = "[ns3] \"Isso foi incrível, Fubuki.\"\n[ns4] \"Você tem jeito com crianças, hein.\""
10035030-126 = "Bem, mais ou menos."
10035030-127 = "É mais fácil fazê-los competir do que tentar forçá-los a parar."
10035030-128 = "Durante as patrulhas, acabo lidando com crianças com frequência."
10035030-129 = "É, é mesmo...?"
10035030-130 = "Entendi. Aprendi algo novo."
10035030-131 = "Agora, só precisamos ficar de olho neles com calma."
10035030-132 = "Bom, deixo o resto com vocês~"
10035030-134 = "Sim! Pode deixar conosco!"
10035030-135 = "Eu me descuidei antes, mas não acontecerá de novo!"
10035030-136 = "Então, vou vigiar o lado oposto."
10035030-137 = "[s] \"Eu também vou ficar perto da Kanna.\""
10035030-138 = "Certo! Então vamos nos dividir e cuidar de ambos os lados!"
10035030-139 = "Professor, obrigado por ajudar também."
10035030-142 = "O trabalho de salva-vidas é mais difícil do que eu pensava."
10035030-143 = "[s] \"Kanna, você vai se acostumar logo.\""
10035030-144 = "Espero que sim... mas, honestamente, não tenho confiança."
10035030-145 = "Houve aquele erro de agora pouco, e eu não tenho a agilidade que a Fubuki tem."
10035030-146 = "[s] \"Ainda é cedo para ficar desanimada.\""
10035030-148 = "[ns] \"Serviço, escuta ativa, sinceridade e um sorriso, certo?\""
10035030-150 = "Fufu, é verdade."
10035030-151 = "Como você disse. Vou me esforçar um pouco mais."
10035030-155 = "！？"
10035030-156 = "Ugh! Cof!"
10035030-157 = "A-ajuda!"
10035030-158 = "Glup! Glup!"
10035030-159 = "Uma criança está se afogando...!"
10035030-160 = "Professor, vou lá ajudar!"
10035030-165 = "Haa, haa."
10035030-166 = "Você está bem?"
10035030-167 = "Cof, cof...!"
10035030-168 = "H-havia um crocodilo na água! Um crocodilo enorme...!"
10035030-169 = "Você deve ter visto uma miragem por causa do susto. Já está tudo bem, pode ficar tranquilo."
10035030-170 = "Tenho medo da piscina!"
10035030-171 = "Não quero mais entrar...!"
10035030-172 = "Não se preocupe. Eu estarei de olho para que você não se afogue."
10035030-173 = "[s] \"Kanna! Sorriso! Sorriso!\""
10035030-174 = "……Ah!"
10035030-178 = "P-pode ficar tranquilo agora, está tudo bem."
10035030-179 = "Snif..."
10035030-180 = "Waaaaaaaah!!"
10035030-188 = "……？"
10035030-189 = "[ns] (A criança viu o rosto da Kanna e fugiu da piscina...?)"
10035030-190 = "Aquela moça também é assustadora! Waaaaah!"
10035030-194 = "……Professor."
10035030-195 = "Será que eu... realmente consigo proteger os cidadãos...?"
10035030-196 = "Perdi a confiança..."
