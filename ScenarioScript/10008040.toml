[translation]
10008040-1 = "第4話;集まる邪魔者たち"
10008040-6 = "ひゃははっ！賽銭箱は私たちのものだ！"
10008040-7 = "賽銭箱さえ手に入れば……！"
10008040-8 = "普段から胸の内に秘めていた、あの夢がついに……！"
10008040-10 = "邪魔よっ！！"
10008040-14 = "そ、そんな、戦闘パートも無しだなんて雑な……ぐはっ！"
10008040-22 = "見つけた！あいつらをどうにかすれば賽銭箱が……！"
10008040-23 = "賽銭箱を奪って、今度新しく出る銃火器を……！"
10008040-27 = "せ、せめて話を、銃火器語りを……。"
10008040-32 = "はぁ、はぁ……。"
10008040-33 = "やっぱりこれ、何かがおかしいような……。"
10008040-37 = "んー？今度は何？"
10008040-38 = "あそこだ！"
10008040-39 = "逃がすか！"
10008040-40 = "行けっ、総員突撃！！"
10008040-42 = "な、何か一気に集まってきた！？"
10008040-43 = "ああもう何なのよぉ！？"
