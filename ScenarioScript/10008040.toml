10008040-23 = "Vou roubar a caixa de ofertas e comprar aquela arma nova que vai sair...!"
10008040-27 = "P-pelo menos me deixem falar, falar sobre armas de fogo..."
10008040-32 = "Haa, haa..."
10008040-33 = "Sério, tem algo de errado com isso..."
10008040-37 = "Hmm? O que é agora?"
10008040-38 = "Ali!"
10008040-39 = "Não deixem escapar!"
10008040-40 = "Vão, todos para o ataque!!"
