[translation]
10037105-3 = "Ugh, guh...!?"
10037105-9 = "Sim, bom trabalho! Chefe de Gabinete Tomoe, Presidente Marina!"
10037105-10 = "Obrigada, Secretária-Geral."
10037105-11 = "Sensei, você não se feriu?"
10037105-12 = "[s] \"Sim. Graças à Tomoe e à Marina, estou bem.\""
10037105-13 = "Sim, contanto que esteja bem, não há problema."
10037105-14 = "Hmph, que fracos... Se fosse eu, teria feito muito melhor—"
10037105-15 = "Presidente Marina. #nVocê ainda quer limpar os banheiros?"
10037105-19 = "N-não! De jeito nenhum, Chefe de Gabinete Tomoe!"
10037105-20 = "Por precaução, deixe-me perguntar. #nIsso é comum na Academia Red Winter... mas ainda assim, pode ser prevenido. #nBem— qual você acha que é o método?"
10037105-21 = "Enviar todos aqueles que são mais grandiosos que a Presidente Cherino para a Classe Especial 227!"
10037105-22 = "Resposta correta— então, quem seriam os alunos mais grandiosos que a Secretária-Geral Cherino?"
10037105-23 = "Claro, não existe ninguém!"
10037105-24 = "Sim, muito bem."
10037105-31 = "Genryumon, reunir!"
10037105-36 = "!?"
10037105-37 = "Diretora Executiva Mina...!"
10037105-43 = "Clube de Ópera de Pequim... não vou questionar o que vocês estavam planejando por enquanto. #nPrimeiro, precisamos organizar este lugar..."
10037105-44 = "Vamos! Levem o Clube de Ópera de Pequim e escoltem o Mestre e os visitantes até o Rikuwakaku!"
10037105-49 = "S-sim!"
10037105-50 = "Como desejar!"
10037105-54 = "(Mas... qual era afinal a intenção do Mestre até agora...)"
10037105-55 = "(Até agora, eu nunca tinha pensado em algo assim...)"
10037105-62 = "(Ser capturado é apenas um detalhe trivial.)"
10037105-63 = "(No caminho da lealdade, não existem sucessos ou fracassos.)"
10037105-64 = "(Mestre... por favor, abra os seus olhos...)"
