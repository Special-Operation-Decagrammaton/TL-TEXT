[translation]
90002120-1 = "Episódio 12; O que desapareceu"
90002120-5 = "O que está acontecendo...?"
90002120-6 = "Até agora pouco eles estavam se ajudando... Brigas internas?"
90002120-11 = "De fato, é intrigante. #nVendo a reação daquelas três, é difícil acreditar que isso faça parte do plano, mas..."
90002120-16 = "Aquilo é... algum tipo de ritual...? #nQual seria o objetivo...?"
90002120-17 = "Se formos falar apenas dos fatos, o fluxo de energia que convergia para Malkuth se estabilizou. #nA transformação do Continente de Aço também parece ter cessado."
90002120-18 = "Kei, você saberia dizer?"
90002120-23 = "Não. A única impressão que tive é que eles são bastante fanáticos. #nMas, deixando isso de lado..."
90002120-25 = "Por favor! Por favor! #nPor favor... não levem a minha irmã!!"
90002120-26 = "Se alguém tem que ser sacrificado, que seja eu no lugar dela――!!!"
90002120-30 = "(Qual seria o verdadeiro significado daquelas palavras...?)"
90002120-35 = "Sensei!"
90002120-36 = "Cuidado!"
90002120-41 = "[ns] \"Uau!?\""
90002120-43 = "(Kei, Alice e Rio foram empurradas)"
90002120-44 = "Sensei! Você está bem!?"
90002120-45 = "[s] \"O que aconteceu!?\""
90002120-46 = "No chão! Ainda não acabou!"
90002120-53 = "[ns] \"Uma parede――saindo do chão!?\""
90002120-54 = "Ah...!?"
90002120-55 = "Rio!"
90002120-60 = "Obrigada..."
90002120-68 = "O tremor parou por enquanto, mas... em um instante, essa parede..."
90002120-69 = "Aliados sendo separados... é exatamente como naquela vez."
90002120-74 = "Naquela vez?"
90002120-75 = "Kei?"
90002120-76 = "Em \"Eridu\". #nNaquela época, ativamos as anteparas para separar o pessoal da C&C, não foi?"
90002120-77 = "É verdade..."
90002120-78 = "As memórias daquele momento... ainda permanecem com a Alice."
90002120-79 = "Embora pareça um sonho antigo, algo meio embaçado..."
90002120-80 = "...Faz sentido. #nNaquela época, a Alice... era uma só com a Kei."
90002120-81 = "..."
90002120-82 = "..."
90002120-83 = "Kei. Se eu tivesse――"
90002120-84 = "Se você ia dizer que a culpa foi sua, ou que poderia ter feito melhor... #nSe for isso, pare imediatamente."
90002120-85 = "K-Kei?"
90002120-86 = "Kei!?"
90002120-87 = "As coisas simplesmente acontecem. Não há um motivo para isso. #nPortanto, só nos resta aceitar como fatos."
90002120-88 = "Além disso, não adianta remoer o que já aconteceu. #nE se for algo que não tem relação comigo, menos ainda."
90002120-89 = "Para começar, não é isso que importa agora!"
90002120-90 = "Ou seja...?"
90002120-91 = "Como podemos sair dessa situação. #nE como podemos voltar em segurança. Só isso é importante!"
90002120-92 = "Entendido? Eu vou voltar viva. Não importa o que aconteça――eu vou voltar!"
90002120-93 = "Não importa o que aconteça, eu quero sobreviver até o fim!"
90002120-94 = "...!"
90002120-95 = "Sim! A Kei tem razão!"
90002120-96 = "[s] \"Sim. Eu concordo.\""
90002120-101 = "[ns1] \"Não importa o que aconteça――\"\n[ns2] \"A Kei deve sobreviver e voltar.\""
90002120-104 = "...Você entendeu direito o que eu disse?"
90002120-109 = "Eu estou falando de todos que estão aqui! De que adianta eu voltar sozinha!"
90002120-113 = "[ns] \"Sim.\""
90002120-114 = "Haa... o que é esse sorriso...?"
90002120-116 = "[ns] \"Muito bem. Então vamos nessa.\""
90002120-117 = "Você tem algum palpite de para onde ir?"
90002120-118 = "Não importa para onde seja, é melhor do que ficar parada aqui, não é?#nPrecisamos andar por aí e coletar o máximo de informações possível."
90002120-119 = "Além disso, precisamos nos reunir com a Himari e os outros o quanto antes."
90002120-120 = "Sim! Como a Alice é uma heroína, eu vou na frente!"
90002120-121 = "É muito reconfortante ouvir isso."
90002120-127 = "……Espere um pouco. Aquilo é... o quê?"
90002120-128 = "Eh...?"
90002120-130 = "（Olhei para a direção que Rio apontava）"
90002120-131 = "（Do outro lado da parede, ao longe, estava...）"
90002120-135 = "（Era a forma de \"algo\" que, até pouco tempo atrás, era chamado de Malkuth...）"
90002120-137 = "Próximo episódio: Crianças"
