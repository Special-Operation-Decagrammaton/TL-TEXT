[translation]
34240-1 = "Episódio 24; Kyrie Pelas Garotas (2)"
34240-2 = "……"
34240-3 = "...Por que não estão vindo...?"
34240-4 = "E o que houve com Barbara? #nPor que ninguém..."
34240-9 = "...!!"
34240-14 = "Essa música é..."
34240-15 = "Isso é... Kyrie eleison...?"
34240-16 = "[s] \"Mika...!\""
34240-18 = "Inaceitável!!!"
34240-19 = "Inaceitável! Fazer ecoar no meu domínio uma música que prega a misericórdia?!"
34240-20 = "Mas que tipo de truque é esse...?"
34240-21 = "Eu já havia destruído todos os instrumentos e gramofones! —Acham que algum tipo de milagre aconteceu?!"
34240-22 = "Inaceitável!! #nAs alunas devem exaltar o ódio, o desprezo... a maldição!"
34240-23 = "Em um inferno onde enganam e ferem umas às outras, elas devem existir unicamente para serem exploradas por nós!"
34240-27 = "[ns] \"Cale a boca.\""
34240-29 = "...O quê?!"
34240-30 = "[s] \"Não fale assim das minhas preciosas alunas.\""
34240-31 = "...!!!"
34240-32 = "[s1] \"Você usou ensinamentos falsos para arrastar essas crianças para o abismo.\"\n[s2] \"Eu jamais vou te perdoar por isso.\""
34240-33 = "C-Como ousa me dizer..."
34240-34 = "C-Como ousa me dizer..."
34240-38 = "PALAVRAS ASSIIIIM—!!"
34240-43 = "E-Ela tá começando a se transformar de novo...!?"
34240-45 = "Ah, é isso, Saori—"
34240-46 = "Eu a oferecerei como meu novo sacrifício!"
34240-48 = "...!!"
34240-49 = "Já que você arruinou os meus planos, pagará o preço por isso!!"
34240-53 = "—Faça o que quiser, Madame."
34240-55 = "L-Líder!?"
34240-56 = "...Que idiotice você tá falando!?"
34240-58 = "Se ainda há algum preço que eu possa pagar... pelo contrário, eu até agradeço."
34240-62 = "Venha, Madame. #nEu estou bem aqui!! Pode me levar!"
34240-64 = "Ugh, Sensei...! Rápido...!"
34240-66 = "[ns] \"É a batalha final! Vamos todos juntos!\""
34240-67 = "S-Sim!!"
34240-69 = "Guh... a-ah, AAAAAA!"