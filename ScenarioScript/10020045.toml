[translation]
10020045-5 = "Conseguimos!!"
10020045-6 = "Conseguimos destruir todos os quatro motores dimensionais...!"
10020045-12 = "Hacking de todas as áreas da \"Arca de Atra-Hasis\" concluído.#nTaxa de ocupação de 100% atingida."
10020045-13 = "Com isso, podemos iniciar a \"sequência de autodestruição\" da Arca."
10020045-17 = "Pessoal, me avisem quando estiverem prontos!"
10020045-18 = "A \"sequência de autodestruição\" não pode ser cancelada depois de iniciada. Voltem para a nave imediatamente!"
10020045-28 = "Sala de controle, destruição concluída!"
10020045-29 = "E a Shiroko?"
10020045-30 = "O Sensei foi para a seção onde a Shiroko-senpai está!"
10020045-34 = "[ns] Abre a porta da sala onde Shiroko está."
10020045-37 = "...Sensei."
10020045-38 = "[s] \"Shiroko... você está bem?\""
10020045-39 = "Sim. Tenho muita coisa para conversar, mas por enquanto precisamos ir, não é?"
10020045-40 = "[s] \"É verdade. Depois conversamos com calma.\""
10020045-41 = "Shiroko-senpai, você está bem!?"
10020045-42 = "Sim, vou seguir com o Sensei... me mostre o caminho."
10020045-43 = "S-sim...! Bem... então, por favor, venha para a Área 1, onde a nave está!#nEu vou guiar vocês!"
10020045-44 = "Sim. Conto com você."
10020045-45 = "Vamos, Sensei."
10020045-46 = "[ns] \"Sim, vamos nessa.\""
