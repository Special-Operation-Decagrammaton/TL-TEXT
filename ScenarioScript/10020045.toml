[translation]
10020045-5 = "やったぁ！！"
10020045-6 = "4つの次元エンジンを、全て破壊できた……！"
10020045-12 = "「アトラ・ハシースの箱舟」、全エリアのハッキング完了。#n占有率100%を達成。"
10020045-13 = "これで、箱舟の「自爆シーケンス」を起動できるよ。"
10020045-17 = "皆、準備が完了したら報告して！"
10020045-18 = "「自爆シーケンス」は一度起動したら取り消すことはできないからね。すぐ船に戻って！"
10020045-28 = "制御室、破壊完了です！"
10020045-29 = "シロコちゃんは？"
10020045-30 = "シロコ先輩がいるセクションには、先生が向かわれました！"
10020045-34 = "[ns] シロコのいる部屋の扉を開ける。"
10020045-37 = "……先生。"
10020045-38 = "[s] \"シロコ……大丈夫？\""
10020045-39 = "ん。話したいことがたくさんあるけど、今はとりあえず行かないとだよね。"
10020045-40 = "[s] \"そうだね。詳しい話はまた後で聞くね。\""
10020045-41 = "シロコ先輩、大丈夫ですか！？"
10020045-42 = "ん、このまま先生と一緒に行く……道を教えて。"
10020045-43 = "は、はい……！えっと……それでは、船がある、第1エリアに来てください！#n案内します！"
10020045-44 = "ん。お願い。"
10020045-45 = "行こう、先生。"
10020045-46 = "[ns] \"うん、行こうか。\""
