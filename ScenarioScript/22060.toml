[translation]
22060-1 = "Episódio 6; Máquina Misteriosa (1)"
22060-2 = "（Um dia, recebi um contato da Veritas――）"
22060-10 = "[ns] \"O que houve de repente?\""
22060-11 = "Sensei, escuta! Tive uma \"grande descoberta do século\"!!"
22060-12 = "É algo incrível...!! Pode ser uma descoberta histórica que ficará marcada na história de Kivotos!!"
22060-13 = "[s] \"……Uma descoberta histórica?\""
22060-14 = "Maki, isso é um exagero, não importa como você olhe."
22060-15 = "A Hare tem razão. É verdade que encontramos algo incomum, mas..."
22060-16 = "A maioria das coisas que encontramos no Millennium costuma ser sucata, então, estatisticamente, é muito provável que isso também seja."
22060-17 = "Ah, qual é! Vocês não acham que deveriam ter um pouco mais de imaginação? Perguntei para várias pessoas e ninguém nunca viu algo assim."
22060-18 = "Bem, é verdade..."
22060-19 = "O argumento da Maki tem um fundo de verdade, mas..."
22060-20 = "[s] \"O que exatamente vocês encontraram?\""
22060-21 = "Hum... é um pouco difícil de explicar com palavras."
22060-22 = "Como a Maki disse, é um objeto que nunca vimos antes..."
22060-23 = "Como é difícil para nós julgarmos o que é, decidimos pedir para o Sensei vir pessoalmente."
22060-24 = "É por isso que... Sensei, você tem tempo?"
22060-25 = "[s] \"Tenho sim.\""
22060-26 = "Então, estaremos te esperando na sala da Veritas."
22060-27 = "Eba! Se o Sensei vem, vamos fazer uma festa!"
22060-28 = "Certo. Vamos pedir uma pizza."
22060-29 = "Não, isso é exagero demais..."
22060-32 = "（Ao chegar na sala da Veritas――）"
22060-33 = "Ah! Alice, encontrei o Sensei!"
22060-41 = "……Ué?"
22060-42 = "O-olá……."
22060-44 = "Oi, Sensei!"
22060-45 = "……Por que vocês estão aqui?"
22060-46 = "[s] \"Oi. Fui chamado pela Veritas... e o Clube de Desenvolvimento de Jogos também?\""
22060-47 = "Sim! A Maki encontrou algo interessante!"
22060-49 = "Pensei que talvez pudéssemos tirar alguma inspiração disso."
22060-50 = "Como um evento importante pode acontecer, a Yuzu também está aqui hoje!"
22060-51 = "Sim... se isso levar a uma boa ideia... mas, c-chegar até aqui foi... um pouco..."
22060-52 = "……Foi muito difícil, mas……."
22060-53 = "Falta só um pouquinho, Yuzu!"
22060-54 = "Sim, vamos nos esforçar."
22060-56 = "Para que a Yuzu não desmaie, a Alice vai dar todo o apoio!"
22060-57 = "O-obrigada a todos……."
22060-58 = "[s] \"Então, vamos entrar?\""
22060-63 = "Sim! Podem entrar!"
22060-71 = "Oi! Com licença!"
22060-72 = "Os membros do grupo que encontramos no caminho, o Sensei também está conosco."
22060-74 = "Parece que chegamos bem na hora."
22060-75 = "Oi~! Faz tempo, hein."
22060-76 = "（*acena com a cabeça*）"
22060-77 = "[s] \"Oi.\""
22060-79 = "Então, Hare-senpai. O que é aquele tal objeto?"
22060-80 = "Ah, sobre isso..."
22060-81 = "É isto."
22060-91 = "（O que a Hare mostrou era um robô de formato estranho）"
22060-92 = "（Olhando bem, há um total de 5 robôs espalhados pela sala do clube）"
22060-93 = "[s] \"Isso é... onde vocês encontraram isso?\""
22060-95 = "Todos foram encontrados nos arredores do distrito escolar de Millennium."
22060-96 = "E não são só esses, ainda tem pelo menos uns 20 por aí!"
22060-97 = "[s] \"A aparência é meio...\""
22060-98 = "Parecem peixes de águas profundas, né?"
22060-99 = "Bem, até parecem robôs, mas..."
22060-100 = "Mas não é um pouco estranho?#nNão tinha nenhum drone com esse formato feito em Millennium."
22060-101 = "É uma aparência bem peculiar."
22060-102 = "Hmm, peculiar ou... sei lá..."
22060-107 = "[ns] （É uma sensação estranha, ou melhor...）"
22060-108 = "Ai, que susto! É completamente diferente do que eu imaginei!"
22060-110 = "É como se eu estivesse assistindo a um filme de comédia e de repente virasse um terror...!#nO que é isso!!"
22060-111 = "Será que isso foi realmente feito em Millennium...?"
22060-112 = "Hare-senpai, qual é o estado atual deles?"
22060-113 = "Se a gente se esforçar, será que dá para ligar..."
22060-115 = "…………."
22060-117 = "Nós também demos uma olhada geral neles."
22060-118 = "Como estavam bem conservados, pensei que talvez desse para ligar."
22060-119 = "Mas, no fim, não encontramos nada."
22060-120 = "[s] \"Ou seja...?\""
22060-121 = "Após a análise, não encontramos nem o botão de ligar, nem portas de conexão."
22060-122 = "Além disso, não há nem sequer uma emenda na superfície."
22060-123 = "Como não dá para abrir, não sabemos se o motivo de não ligar é hardware ou software—"
22060-124 = "Na verdade, nem sabemos se estão realmente quebrados..."
22060-130 = "Por isso chamamos o Sensei."
22060-131 = "Sim. Se for algo perigoso, pensei em pedir a colaboração do Schale."
22060-135 = "Nesse sentido, acho que chamar o Departamento de Desenvolvimento de Jogos foi um pouco fora de propósito."
22060-136 = "Ahaha. Bem, foi só por aproveitar a oportunidade.#nÉ mais divertido ver essas coisas em grupo, não é?"
22060-141 = "…………."
22060-146 = "E então, Sensei? Conseguiu descobrir algo?"
22060-147 = "[s] \"...Hmm, talvez não.\""
22060-148 = "Poxa, não deu certo.#nEu achei que talvez o Sensei conseguisse..."
22060-149 = "Será que temos que perguntar para a presidente...?#nSe não me engano, ela gosta dessas coisas de ocultismo."
22060-150 = "Ocultismo, hein..."
22060-151 = "Ou talvez a vice-presidente?#nSe fosse ela, com certeza teria achado alguma informação~!"
22060-152 = "Não adianta falar de quem não está aqui agora."
22060-153 = "Dizer que não está aqui é modo de falar, a presidente nem aparece mesmo."
22060-155 = "……Ah."
22060-159 = "O que foi? Aconteceu alguma coisa?"
22060-162 = "Alice..."
22060-163 = "Alice............ já viu isso antes."
22060-164 = "Alice-chan...?"
22060-166 = "Isso, é..."
22060-180 = "Hã!? O que foi!? Ligou!?"
22060-181 = "Hã!?"
22060-182 = "Hã? O que, o que foi!?"
22060-188 = "Esse som..."
22060-189 = "Irmã, está saindo um som de videogame?"
22060-190 = "Hã?"
22060-196 = "Ah, é verdade. #nAté agora não ligava... por que será?"
22060-198 = "Es-espera... o estado da Alice está... estranho."
22060-199 = "Alice...?"
22060-200 = "………………"
22060-204 = "<<<O meu...>>>"
22060-206 = "[ns] \"Alice?\""
22060-208 = "<<<O meu precioso...>>>"
22060-211 = "…………Inicialização iniciada."
22060-212 = "……Alice?"
22060-221 = "Uwaa! Por que ela se moveu de repente!? #nKotama-senpai, você fez alguma coisa!?"
22060-222 = "Maki, não. Eu não fiz nada..."
22060-223 = "……Cuidado! Tem algo estranho acontecendo!"
22060-225 = "<<<O meu precioso...>>>"
22060-227 = "[ns] \"O que diabos é isso...\""
22060-229 = "……Codinome \"AL-1S\" inicialização concluída."
22060-236 = "Executando protocolo ATRAHASIS."
22060-237 = "[ns] \"……!\""
