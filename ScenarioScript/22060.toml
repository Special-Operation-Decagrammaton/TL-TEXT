[translation]
22060-1 = "Episódio 6; A Máquina Misteriosa (1)"
22060-2 = "(Certo dia, recebi uma mensagem da Veritas...)"
22060-10 = "[ns] \"O que aconteceu tão de repente?\""
22060-11 = "Escuta isso, Sensei! A gente fez a 'Descoberta do Século'!!"
22060-12 = "E é incrível...!! Pode ser uma descoberta histórica que ficará marcada na história de Kivotos!!"
22060-13 = "[s] \"......Descoberta histórica?\""
22060-14 = "Maki, mesmo pra você isso é um exagero."
22060-15 = "A Hare tem razão. #n É fato que descobrimos algo incomum, mas..."
22060-16 = "A maior parte das coisas que encontramos na Millennium normalmente é sucata, #n então estatisticamente é muito provável que isso também seja."
22060-17 = "Ah, fala sério! Todo mundo deveria ter um pouquinho mais de senso de romance, não acham? #n Eu perguntei pra várias pessoas e todas disseram que nunca viram nada igual."
22060-18 = "Bem, isso é verdade..."
22060-19 = "O argumento da Maki tem o seu sentido..."
22060-20 = "[s] \"E o que foi que vocês descobriram, afinal?\""
22060-21 = "Hmmm... é um pouco difícil de explicar com palavras."
22060-22 = "Como a Maki disse, é um objeto que nunca vimos antes..."
22060-23 = "Como está sendo difícil para nós julgarmos o que é, gostaríamos que você viesse ver pessoalmente, Sensei."
22060-24 = "Então, é isso... Você tem tempo, Sensei?"
22060-25 = "[s] \"Tenho, sim.\""
22060-26 = "Beleza, então a gente te espera na sala da Veritas."
22060-27 = "Ebaa! Se o Sensei vai vir, vamos dar uma festa!"
22060-28 = "Sim. Vamos pedir pizza."
22060-29 = "Não, aí já é exagero demais..."
22060-32 = "(E assim, quando cheguei à sala da Veritas...)"
22060-33 = "Ah! Aris detectou o Sensei!"
22060-41 = "......Ué?"
22060-42 = "O-Olá..."
22060-44 = "Opa, Sensei!"
22060-45 = "......O que vocês estão fazendo aqui?"
22060-46 = "[s] \"Olá. Eu fui chamado pela Veritas... Vocês do Clube de Jogos também?\""
22060-47 = "Sim! Parece que a Maki encontrou algo interessante!"
22060-49 = "Pensei que, quem sabe, poderíamos conseguir alguma inspiração com isso."
22060-50 = "Como pode ser que ocorra um evento importante, a Yuzu também veio hoje!"
22060-51 = "Sim... S-Se isso puder nos ajudar a ter boas ideias... #n Mas, c-chegar até aqui foi... um pouco..."
22060-52 = "......Foi muito, difícil, mas..."
22060-53 = "Falta só mais um pouco, Yuzu!"
22060-54 = "S-Sim, vou dar o meu melhor."
22060-56 = "A Aris vai te segurar firme para que você não caia, Yuzu!"
22060-57 = "O-Obrigada, gente..."
22060-58 = "[s] \"Vamos entrar?\""
22060-63 = "Siiiiim! Podem entrar!"
22060-71 = "Ooooi! Com licença!"
22060-72 = "O nosso membro da party que se juntou no caminho, o Sensei, também está aqui."
22060-74 = "Parece que vocês chegaram bem na hora."
22060-75 = "Opaaa! Há quanto tempo, né?"
22060-76 = "(Abaixando a cabeça)"
22060-77 = "[s] \"Opaaa.\""
22060-79 = "Então, Hare-senpai. Qual é a tal da coisa?"
22060-80 = "Ah, isso..."
22060-81 = "É isso."
22060-91 = "(O que a Hare nos mostrou foi um robô com um formato estranho)"
22060-92 = "(Olhando bem, havia um total de 5 robôs espalhados pela sala)"
22060-93 = "[s] \"Isso... onde vocês acharam isso?\""
22060-95 = "Todos eles foram encontrados nos arredores do distrito escolar da Millennium."
22060-96 = "E não são só esses, tinha pelo menos uns 20 a mais do que isso!"
22060-97 = "[s] \"Tem uma aparência meio...\""
22060-98 = "Parecem com aqueles peixes das profundezas, não é?"
22060-99 = "Bem, parecem robôs, mas..."
22060-100 = "Mas são meio estranhos, não são? #n Não tinha nada com esse formato no meio dos drones construídos na Millennium."
22060-101 = "Eles têm uma aparência muito peculiar."
22060-102 = "Hum, não sei se peculiar é a palavra certa... mas tipo..."
22060-107 = "[ns] (Eu diria que passam uma sensação bizarra...)"
22060-108 = "Q-Que susto! É totalmente diferente do que eu tava imaginando!"
22060-110 = "É como se a gente tivesse assistindo a um filme de comédia e de repente virasse terror...! #n O que é isso!!"
22060-111 = "Esses robôs... será que foram mesmo construídos na Millennium?"
22060-112 = "Hare-senpai, qual é a situação deles no momento?"
22060-113 = "Será que dá pra ligar eles se a gente tentar..."
22060-115 = "............"
22060-117 = "Nós também já demos uma investigada em tudo."
22060-118 = "Como eles estavam em bom estado, a gente achou que ia conseguir ligar."
22060-119 = "Mas, no final, não conseguimos encontrar nada."
22060-120 = "[s] \"Como assim...?\""
22060-121 = "Como resultado da nossa investigação, não encontramos portas de conexão e muito menos um botão de liga/desliga."
22060-122 = "Antes disso, nem sequer há emendas na superfície deles."
22060-123 = "Como nós não conseguimos abrir, não dá pra saber se o motivo para não ligarem é problema de hardware ou software――"
22060-124 = "Para ser sincera, nem sabemos se eles estão realmente quebrados..."
22060-130 = "É por isso que chamamos o Sensei."
22060-131 = "Sim. Caso sejam objetos perigosos, gostaríamos de contar com a cooperação da Schale."
22060-135 = "Pensando por esse lado, acho que foi um erro termos chamado o Departamento de Desenvolvimento de Jogos também."
22060-136 = "Ahaha. Bem, já que íamos mostrar pro Sensei. #n Além do mais, é mais divertido ver esse tipo de coisa todo mundo junto, né?"
22060-141 = "............"
22060-146 = "E aí, Sensei? Consegue descobrir alguma coisa?"
22060-147 = "[s] \"......Hmmm, acho que eu também não sei.\""
22060-148 = "Então, como eu imaginava. #n Pensei que o Sensei pudesse saber..."
22060-149 = "Acho que a gente vai ter que perguntar para a Presidente... #n Se bem me lembro, ela gostava dessas coisas de ocultismo e afins."
22060-150 = "Ocultismo, hein..."
22060-151 = "Ou talvez, para a Vice-Presidente? #n Eu sinto que ela conseguiria achar alguma informação sobre isso pra gente~!"
22060-152 = "Não adianta falar sobre pessoas que não estão aqui agora."
22060-153 = "A Presidente nem sequer tem vindo para o clube pra início de conversa."
22060-155 = "......Ah."
22060-159 = "Qual é o problema? Aconteceu alguma coisa?"
22060-162 = "Aris..."
22060-163 = "Aris............ já viu isso antes."
22060-164 = "Aris-chan...?"
22060-166 = "Isso... é..."
22060-180 = "Eh!? O que foi!? Ligou!?"
22060-181 = "Eeeh!?"
22060-182 = "Eh? O que, o que foi!?"
22060-188 = "Esse som..."
22060-189 = "Mana, tá saindo som do videogame?"
22060-190 = "Eh?"
22060-196 = "Ah, é mesmo. #n Não tinha ligado até agora... por que será."
22060-198 = "E-Espera... a Aris-chan tá... estranha."
22060-199 = "Aris...?"
22060-200 = ".................."
22060-204 = "<<<A minha............>>>"
22060-206 = "[ns] \"Aris?\""
22060-208 = "<<<A minha preciosa............>>>"
22060-211 = "............Iniciando ativação."
22060-212 = "......Aris?"
22060-221 = "Wawah! Por que se moveram do nada!? #n Kotama-senpai, você fez alguma coisa!?"
22060-222 = "Não, Maki, não fui eu. Eu não fiz nad..."
22060-223 = "......Cuidado! Eles parecem estranhos!"
22060-225 = "<<<A minha preciosa............ para mim.>>>"
22060-227 = "[ns] \"Mas o que é... isso...\""
22060-229 = "......Codename 'AL-1S', ativação concluída."
22060-236 = "Executando Protocolo ATRAHASIS."
22060-237 = "[ns] \"......!\""