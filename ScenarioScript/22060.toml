[translation]
22060-1 = "第6話;不思議な機械（１）"
22060-2 = "（ある日、ヴェリタスから連絡が届き――）"
22060-10 = "[ns] \"急にどうしたの？\""
22060-11 = "先生聞いて！「世紀の大発見」があって！！"
22060-12 = "それがすっごくてさ……！！キヴォトス史に残るような歴史的な発見かもしれないの！！"
22060-13 = "[s] \"……歴史的な発見？\""
22060-14 = "マキ、いくらなんでもそれは大げさ。"
22060-15 = "ハレの言う通りです。#n変わったものを発見したのは事実ですが……。"
22060-16 = "普段、ミレニアムで見つかる物の大半がガラクタですから、#n統計的にコレもそうである可能性が高いです。"
22060-17 = "も～！みんなちょっとくらいはロマンを持った方がいいんじゃない？#n色んな人に聞いても見たことないって言ってたし。"
22060-18 = "まあ、そうだね……。"
22060-19 = "マキの言い分にも一理ありますが……。"
22060-20 = "[s] \"いったい何を見つけたの？\""
22060-21 = "うーん……ちょっと言葉だと説明しづらい。"
22060-22 = "マキの言う通り、今まで見たことがないような物体で……"
22060-23 = "私たちでは判断が難しいため、先生に直接お越し願おうかと。"
22060-24 = "そういう訳なんだけど……先生、時間大丈夫？"
22060-25 = "[s] \"大丈夫だよ。\""
22060-26 = "じゃあ、ヴェリタスの部室で待ってるね。"
22060-27 = "やったー！先生来るならパーティーしよ！"
22060-28 = "はい。ピザを注文するとしましょう。"
22060-29 = "いや、大げさすぎ……"
22060-32 = "（そうしてヴェリタスの部室に到着すると――）"
22060-33 = "あっ！アリス、先生を発見しました！"
22060-41 = "……あれ？"
22060-42 = "こ、こんにちは……。"
22060-44 = "やっほー先生！"
22060-45 = "……どうしてここに？"
22060-46 = "[s] \"やほ。ヴェリタスに呼ばれてね……ゲーム開発部も？\""
22060-47 = "うん！マキが面白いもの見つけたらしくて！"
22060-49 = "もしかしたら、何かインスピレーションをもらえるんじゃないかと思って。"
22060-50 = "重要なイベントが発生するかもしれないので、今日はユズもいます！"
22060-51 = "はい……い、いいアイデアに繋がるなら……#nでも、こ、ここまで来るのは……ちょっと……"
22060-52 = "……すごく、大変だったけど……。"
22060-53 = "あとちょっとだよ、ユズ！"
22060-54 = "うん、頑張ろう。"
22060-56 = "ユズが倒れないよう、アリスがしっかり支えます！"
22060-57 = "み、みんな、ありがとう……。"
22060-58 = "[s] \"じゃあ、入ろうか？\""
22060-63 = "はーい！どうぞー！"
22060-71 = "やっほー！お邪魔します！"
22060-72 = "途中で合流したパーティーメンバー、先生も一緒です。"
22060-74 = "ちょうど間に合ったみたいだね。"
22060-75 = "やっほ～！久しぶりだね。"
22060-76 = "（ぺこり）"
22060-77 = "[s] \"やっほ～。\""
22060-79 = "それで、ハレ先輩。例のブツって？"
22060-80 = "ああ、それなら……"
22060-81 = "これ。"
22060-91 = "（ハレが見せてくれたのは、奇妙な形をしたロボットだった）"
22060-92 = "（よく見ると、部室のあちこちに、合計5体のロボットが置かれている）"
22060-93 = "[s] \"これは……どこにあったの？\""
22060-95 = "すべてミレニアム学区の郊外で発見されたものです。"
22060-96 = "これで全部じゃなくて、少なくともまだあと20体はあったよ！"
22060-97 = "[s] \"なんだか外見が……。\""
22060-98 = "なんか、深海魚みたいな見た目してるよね。"
22060-99 = "まぁ、ロボットっぽくはあるけど……。"
22060-100 = "でもちょっと変だよね？#nミレニアムで作ったドローンの中に、こんな形状のはなかったし。"
22060-101 = "かなり個性的な見た目です。"
22060-102 = "うーん、個性的というか……なんか……。"
22060-107 = "[ns] （奇怪な感じというか……）"
22060-108 = "び、びっくりしたー！なんか想像してたのと全然違うんだけど！"
22060-110 = "コメディー映画だと思って見てたら急にホラーになったみたいな……！#nなにこれ！！"
22060-111 = "これって、本当にミレニアムで作られたロボット……なのかな？"
22060-112 = "ハレ先輩、これって今どんな状態なんですか？"
22060-113 = "頑張ったら起動させる事ってできたり……"
22060-115 = "…………。"
22060-117 = "私たちの方でも一通り調べてみたんだけど。"
22060-118 = "結構きれいだったから、起動できないかなーって思ったんだけどね。"
22060-119 = "でも、結局何も見つけられなかったんだ。"
22060-120 = "[s] \"というと……？\""
22060-121 = "調べた結果、電源ボタンはおろか接続ポートすら見つかりませんでした。"
22060-122 = "それ以前に、表面に継ぎ目すらない。"
22060-123 = "開ける事ができないから、起動しない理由がハードなのかソフトなのか――"
22060-124 = "そもそも、本当に故障なのかさえも分からなくて……。"
22060-130 = "だから先生を呼んだんだ。"
22060-131 = "はい。もし危険物であれば、シャーレにご協力いただこうと思いまして。"
22060-135 = "そういう意味だと、ゲーム開発部も呼んだのはちょっと違う気がするけどね。"
22060-136 = "あははっ。まあ、ついでってことで。#nこういうのはみんなで見た方が面白いし？"
22060-141 = "…………。"
22060-146 = "どう、先生？何か分かったりする？"
22060-147 = "[s] \"……うーん、分からないかも。\""
22060-148 = "やっぱダメかぁ。#n先生ならもしかしたら……って思ったんだけど。"
22060-149 = "部長に聞くしかないのかなぁ……。#nたしか、オカルトとかそういうのが好きだったし。"
22060-150 = "オカルトかぁ……。"
22060-151 = "もしくは副部長とか？#n副部長なら情報とか見つけてきてくれそうなのになぁ～！"
22060-152 = "今ここにいない人の事を話しても仕方ないですよ。"
22060-153 = "ここにいないっていうか、部長はそもそも全然来てないし。"
22060-155 = "……あ。"
22060-159 = "どしたの？何かあった？"
22060-162 = "アリス……"
22060-163 = "アリス…………見たことあります。"
22060-164 = "アリスちゃん……？"
22060-166 = "これ、は……。"
22060-180 = "え！？何！？電源入った！？"
22060-181 = "えっ！？"
22060-182 = "え？なになに！？"
22060-188 = "この音……"
22060-189 = "お姉ちゃん、ゲーム機の音出てるよ？"
22060-190 = "え？"
22060-196 = "あ、本当だ。#n今まで起動しなかったのに……どうしてだろ。"
22060-198 = "ま、待って……アリスちゃんの様子が……おかしい。"
22060-199 = "アリス……？"
22060-200 = "………………"
22060-204 = "＜＜＜私の…………＞＞＞"
22060-206 = "[ns] \"アリス？\""
22060-208 = "＜＜＜私の大切な…………＞＞＞"
22060-211 = "…………起動開始。"
22060-212 = "……アリス？"
22060-221 = "わわっ！なんで急に動くの！？#nコタマ先輩、何かした！？"
22060-222 = "マキ、違います。私は何も……。"
22060-223 = "……気をつけて！何か様子がおかしい！"
22060-225 = "＜＜＜私の大切な…………よ。＞＞＞"
22060-227 = "[ns] \"一体、これは……\""
22060-229 = "……コードネーム「AL-1S」起動完了。"
22060-236 = "プロトコルATRAHASISを実行します。"
22060-237 = "[ns] \"……！\""
