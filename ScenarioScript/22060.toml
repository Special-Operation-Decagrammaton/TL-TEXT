[translation]#[Texto Final , mas eventualmente pode haver alterações na formatação de texto. - Filipe 29/06.]
22060-1 = "Episódio 6: A Máquina Misteriosa (1)"
22060-2 = "(Certo dia, chegou um contato da Veritas——)"
22060-10 = "[ns] \"O que houve de repente?\""
22060-11 = "Sensei, escuta! Teve uma \"grande descoberta do século\"!!"
22060-12 = "E é incrível……!! Pode ser uma descoberta histórica,\ndessas que ficam na história de Kivotos!!"
22060-13 = "[s] \"……Descoberta histórica?\""
22060-14 = "Maki, por mais que seja, isso tá exagerado."
22060-15 = "A Hare tem razão.#nQue a gente descobriu uma coisa diferente, é fato, mas……"
22060-16 = "Como a maioria das coisas que se acham na Millennium é tranqueira,#nestatisticamente, a chance de esta ser também é alta."
22060-17 = "Aah! Gente, vocês não deviam ter pelo menos um pouquinho de romantismo?#nPerguntei pra um monte de gente, e todo mundo disse nunca ter visto."
22060-18 = "Bom, é verdade……"
22060-19 = "O argumento da Maki também tem a sua lógica, mas……"
22060-20 = "[s] \"Afinal, o que vocês encontraram?\""
22060-21 = "Hmm…… é meio difícil de explicar com palavras."
22060-22 = "Como a Maki disse, é um objeto que a gente nunca\nviu até hoje……"
22060-23 = "Como é difícil pra gente julgar, pensamos em pedir\npro Sensei vir pessoalmente."
22060-24 = "É isso…… Sensei, tá com tempo?"
22060-25 = "[s] \"Tá tudo certo.\""
22060-26 = "Então, a gente espera na sala da Veritas."
22060-27 = "Ebaa! Se o Sensei vem, bora fazer uma festa!"
22060-28 = "Sim. Vamos pedir uma pizza."
22060-29 = "Que isso, exagero demais……"
22060-32 = "(E assim, ao chegar na sala da Veritas——)"
22060-33 = "Ah! Aris localizou o Sensei!"
22060-41 = "……Ué?"
22060-42 = "O-olá……"
22060-44 = "Oieee, Sensei!"
22060-45 = "……Por que você tá aqui?"
22060-46 = "[s] \"Oie. Fui chamado pela Veritas…… o Clube de Desenvolvimento de Jogos também?\""
22060-47 = "Sim! Parece que a Maki achou uma coisa interessante!"
22060-49 = "Pensei que talvez a gente conseguisse alguma inspiração."
22060-50 = "Como pode ocorrer um evento importante, hoje a Yuzu também veio!"
22060-51 = "Sim…… s-se levar a uma boa ideia……#nmas, c-chegar até aqui foi…… meio……"
22060-52 = "……muito, cansativo, mas……"
22060-53 = "Falta pouco, Yuzu!"
22060-54 = "Sim, vamos nos esforçar."
22060-56 = "Pra Yuzu não cair, a Aris segura ela bem firme!"
22060-57 = "G-gente, obrigada……"
22060-58 = "[s] \"Então, vamos entrar?\""
22060-63 = "Ôba! Entrem!"
22060-71 = "Oieee! Com licença!"
22060-72 = "O membro da party que se juntou no caminho,\no Sensei, também está junto."
22060-74 = "Chegaram bem na hora, pelo visto."
22060-75 = "Oieee~! Quanto tempo."
22060-76 = "(Curva leve)"
22060-77 = "[s] \"Oieee~.\""
22060-79 = "Então, Hare. Cadê a tal coisa?"
22060-80 = "Ah, isso……"
22060-81 = "É isto."
22060-91 = "(O que a Hare mostrou foi um robô de formato esquisito.)"
22060-92 = "(Olhando bem, havia, espalhados pela sala, um total de 5 robôs.)"
22060-93 = "[s] \"Isto…… onde foi achado?\""
22060-95 = "Tudo foi encontrado nos arredores do distrito colégior da Millennium."
22060-96 = "E não é tudo: tinha pelo menos mais uns 20!"
22060-97 = "[s] \"A aparência é meio……\""
22060-98 = "Sei lá, parece um peixe abissal, né."
22060-99 = "Bom, jeitão de robô até que tem……"
22060-100 = "Mas é meio estranho, né?#nEntre os drones que a Millennium fez, não tinha nenhum com esse formato."
22060-101 = "É uma aparência bem peculiar."
22060-102 = "Hmm, peculiar é forma de dizer…… sei lá……"
22060-107 = "[ns] (Mais pra uma sensação esquisita……)"
22060-108 = "Q-que susto! É totalmente diferente do que eu imaginava!"
22060-110 = "É como assistir a um filme de comédia e, do nada, virar terror……!#nQue coisa é essa!!"
22060-111 = "Isto aqui é mesmo um robô feito na Millennium……será?"
22060-112 = "Hare, em que estado isto está agora?"
22060-113 = "Será que, com esforço, dá pra ligar……"
22060-115 = "…………"
22060-117 = "A gente também deu uma investigada geral."
22060-118 = "Como tava bem conservado, achei que talvez desse pra ligar."
22060-119 = "Mas, no fim, não achamos nada."
22060-120 = "[s] \"Como assim……?\""
22060-121 = "Investigando, não achamos nem botão de ligar, nem porta de conexão."
22060-122 = "Antes disso, na superfície não há nem uma emenda."
22060-123 = "Como não dá pra abrir, se o motivo de não ligar é\nhardware ou software——"
22060-124 = "pra começar, nem dá pra saber se está mesmo com defeito……"
22060-130 = "Por isso a gente chamou o Sensei."
22060-131 = "Sim. Se for material perigoso, pensamos em pedir\na colaboração da Schale."
22060-135 = "Nesse sentido, chamar o Clube de Desenvolvimento de Jogos também foi meio fora de propósito, né."
22060-136 = "Ahaha. Bom, foi de carona.#nEsse tipo de coisa é mais divertido de ver todo mundo junto, né?"
22060-141 = "…………"
22060-146 = "E aí, Sensei? Conseguiu entender alguma coisa?"
22060-147 = "[s] \"……Hmm, acho que não.\""
22060-148 = "Não deu mesmo, né.#nPensei que, sendo o Sensei, talvez……"
22060-149 = "Só vai sobrar perguntar pra presidente, né……#nSe não me engano, ela curtia ocultismo e essas coisas."
22060-150 = "Ocultismo, né……"
22060-151 = "Ou então pra vice-presidente?#nA vice-presidente até que ia conseguir achar alguma informação~!"
22060-152 = "Não adianta falar de quem não está aqui agora."
22060-153 = "Não está aqui é eufemismo, a presidente nem aparece, pra começar."
22060-155 = "……Ah."
22060-159 = "Que foi? Aconteceu alguma coisa?"
22060-162 = "Aris……"
22060-163 = "Aris…………já vi isto antes."
22060-164 = "Aris……?"
22060-166 = "Isto, é……"
22060-180 = "Hã!? O quê!? Ligou!?"
22060-181 = "Hã!?"
22060-182 = "Hã? Que foi, que foi!?"
22060-188 = "Esse som……"
22060-189 = "Mana, tá saindo um som de videogame?"
22060-190 = "Hã?"
22060-196 = "Ah, é verdade.#nAté agora não ligava…… por que será."
22060-198 = "P-peraí…… a Aris tá com um jeito…… estranho."
22060-199 = "Aris……?"
22060-200 = "………………"
22060-204 = "＜＜＜minha…………＞＞＞"
22060-206 = "[ns] \"Aris?\""
22060-208 = "＜＜＜minha querida…………＞＞＞"
22060-211 = "…………Inicialização iniciada."
22060-212 = "……Aris?"
22060-221 = "Uaah! Por que ligou do nada!?#nKotama, você fez alguma coisa!?"
22060-222 = "Maki, não fui eu. Eu não fiz nada……"
22060-223 = "……Cuidado! Tem algo estranho nela!"
22060-225 = "＜＜＜minha querida…………＞＞＞"
22060-227 = "[ns] \"Afinal, isto é……\""
22060-229 = "……Codinome \"AL-1S\", inicialização concluída."
22060-236 = "Executando o protocolo ATRAHASIS."
22060-237 = "[ns] \"……!\""