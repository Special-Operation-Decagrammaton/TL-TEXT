[translation]
10046070-1 = "第7話;一難去ってまた一難"
10046070-8 = "なるほど、概ね予想通りだな。"
10046070-13 = "もう分かったの！？"
10046070-14 = "[s1] \"早くない！？\"\n[s2] \"何か知ってるの？\""
10046070-20 = "ん？まあ元々温泉開発のために調べていたからな。"
10046070-21 = "それに、何より……。"
10046070-22 = "経験からくる慣れというものだ、ハーハッハッハ！！"
10046070-23 = "では、諸君――"
10046070-27 = "――開発を始めるぞ。"
10046070-31 = "これはどういうことですか！？"
10046070-38 = "なぜ温泉開発部が！？"
10046070-39 = "イチカ、早く準備を！今度こそ奴らを追い払います！"
10046070-44 = "私が呼びました。"
10046070-48 = "……イチカ？"
10046070-53 = "ハスミ先輩……私からのお願いっす。#n今回だけ、見逃してくれないっすか？"
10046070-54 = "何があったのですか……？"
10046070-55 = "温泉開発部の危険性については、あなたが一番理解しているはず……。"
10046070-56 = "[s3] \"私からもお願い。\"\n[s4] \"イチカは最善を尽くしてくれたんだ。\""
10046070-61 = "先生まで……そうですか。"
10046070-62 = "お二人がここまで言うのでしたら、きっと何かあるのでしょう。"
10046070-63 = "この件が片づいたら、きちんと説明してもらいますからね。"
10046070-64 = "ありがとうございます！"
10046070-68 = "お～い！お友達さん～！"
10046070-72 = "だから友達じゃないって言ったっすよね！？"
10046070-73 = "え？でも部長が言ってたし……。"
10046070-74 = "……。"
10046070-75 = "[s5] \"これを機に仲良くなるのはどうかな……。\"\n[s6] \"って私は思うけど……。\""
10046070-81 = "先生。"
10046070-82 = "……言っていいことと、悪いことがあるんすよ。"
10046070-83 = "[s7] \"ご、ごめんなさい！\"\n[s8] （目を逸らす）"
10046070-86 = "部長は、えっと……社交的で誰とも仲良くなれる性格だよ？"
10046070-87 = "本人が言ってるだけじゃないっすか。"
10046070-88 = "あ、知ってた？#nあははっ、やっぱ二人って仲良いんだね！"
10046070-89 = "じゃなくて……はぁ。#n部員を責めても意味ないっすよね。"
10046070-90 = "……いや、あるかも？"
10046070-91 = "あっ！忘れてた！部長が呼んでたんだった！"
10046070-92 = "私をっすか……？#n工事にトラブルでも？"
10046070-93 = "工事はもう終わったよ。#n竣工式があるから、依頼主も来るべきだって。"
10046070-94 = "えっ、もう？#nまさか手を抜いたんじゃ……？"
10046070-95 = "こっち、ついてきて～！"
10046070-105 = "……温泉じゃないっすか。"
10046070-110 = "これだから素人は困るなぁ！"
10046070-111 = "パッと見はそう見えるかもしれんが――"
10046070-112 = "肝心な温泉が湧いていない！これでは温泉とは呼べんぞ！！"
10046070-113 = "なので、沸かした湯に入浴剤を入れて、雰囲気だけ出しているものだ。"
10046070-114 = "もちろん、いずれは必ず……#n本物の温泉を湧かせてみせるから、安心してくれ。"
10046070-115 = "……本当に温泉が好きなんすね。"
10046070-116 = "にしても、もうちょっと何とかならなかったんすか？#n元の建物と全然違うっすよ！？"
10046070-120 = "急ぎの依頼だっただろう？"
10046070-121 = "ありものの資材を使ったら、こうなった。#n元々が温泉施設を建てるために持ってきた資材だからな。"
10046070-122 = "……返した資材を、そのまま使ったんすか？"
10046070-123 = "そうだが？"
10046070-124 = "それじゃあ、何の利益にもならないのでは？"
10046070-125 = "まあ、成り行きでな。"
10046070-126 = "どうしてここまで……？"
10046070-127 = "契約を履行しただけに過ぎんよ。"
10046070-131 = "あなた、やっぱり……。"
10046070-136 = "みんな！ナギちゃんこっち来てるって！"
10046070-137 = "カスミちゃん！ほんっとうに悪いんだけど――"
10046070-138 = "ああ、分かっているとも。#n招かれざる客……脇役はそろそろ退場の時間だ。"
10046070-139 = "大切な友達のためにも、な？"
10046070-143 = "本当にありがとうね！"
10046070-144 = "感謝ならイチカちゃんにしておくことだ！"
10046070-152 = "まさかティーパーティーの品位について論ずることになるだなんて……。"
10046070-153 = "不可抗力だ。#nあれだけ茶を飲ませて、何を求めていたというのだい？"
10046070-154 = "この件は、後ほどミカさんの前でもう一度――"
10046070-158 = "あら？別荘が……？"
10046070-159 = "みんなお帰り！楽しんでた？"
10046070-160 = "あ、ミカさん。聞いてください。セイアさんが本当にもう……。"
10046070-161 = "ところで、別荘の趣が……少し変わっていませんか？"
10046070-165 = "え、そうかな！？#n掃除したから、綺麗になってちょっと雰囲気変わったかも？"
10046070-166 = "ちょっと、どころではないと思いますが……。"
10046070-168 = "ナギサ、それこそ君に疲労が溜まっている証拠だろう。#n私からしても別荘に問題はない。"
10046070-170 = "そうでしょうか？まあ、セイアさんもそうおっしゃるのなら……。"
10046070-171 = "では入りましょうか。もうくたくたです……。"
10046070-175 = "あ、お風呂沸かしてあるからね！"
10046070-176 = "あら、ご配慮ありがとうございます。では、お先に失礼します。"
10046070-182 = "……ふふっ。ちょっと、か。#n苦労がしのばれるね。"
10046070-183 = "どうやって建て直したのかは見当もつかないが。"
10046070-184 = "気づいてたの！？"
10046070-185 = "これだけの変化に、まさか気づかないとでも？"
10046070-186 = "私のフォローがあったとて――#n普段のナギサであれば誤魔化すことなど到底不可能だっただろう。"
10046070-187 = "……そう、[ruby=・]普[/ruby][ruby=・]段[/ruby][ruby=・]の[/ruby]ナギサ、だったなら。"
10046070-188 = "ん？どういう意味？"
10046070-189 = "言い換えれば、少しは肩の力を抜いても良いということだ。#n今の君にとって、それが難しいことも理解しているがね。"
10046070-190 = "その理由……負い目については、私も無頓着ではない。#nだが……君とナギサの関係は、それほど希薄なものではないだろう？"
10046070-191 = "これは……ただそれだけの話さ。#nでは、私もミカの厚意に甘えることにしよう。先に失礼するよ。"
10046070-197 = "……ま～た難しいことばっか言って。"
10046070-198 = "先生は分かった？"
10046070-199 = "え、先生にも分からなかったの……？#nなのに、私になら分かるかもしれない……？"
10046070-200 = "……なにそれ。先生もセイアちゃんに似てきたの？"
10046070-205 = "……ミカ、なにか焦げたような香りがしないかい？"
10046070-209 = "……あっ！お鍋を火にかけたままだった！"
10046070-210 = "ごめん、先生！先行くね！"
10046070-222 = "（その後、夕食を終え、ナギサとセイアは部屋に戻った）"
10046070-225 = "みんな、お疲れ～！"
10046070-226 = "お疲れっす～！"
10046070-231 = "ミカ様に、イチカ、そして先生……#nまさか裏であれほど動いてくださっていたとは。"
10046070-232 = "そうとは露知らず、私はのんきにバカンスを満喫して……お恥ずかしい限りです。"
10046070-233 = "ううん。ハスミちゃんが二人の相手をしてくれていたから、安心して準備に集中できたんだよ。"
10046070-234 = "寂しいじゃないか。私たちは除け者扱いかな？"
10046070-235 = "温泉開発部……。"
10046070-236 = "よくもまぁ、ぬけぬけと……#nここに顔を出せたものですね……。"
10046070-237 = "ははっ！そうかね？お褒めにあずかり光栄だよ。"
10046070-238 = "――ですが、助けられたのは事実です。"
10046070-239 = "まさか、あなた方に感謝する日がくるとは……。"
10046070-244 = "全部解決！みんなハッピー！……いいことじゃないの？"
10046070-245 = "そうだそうだ！もっと言ってやれ！"
10046070-246 = "あ、そういえば。結局は何が原因だったの？"
10046070-247 = "地面が崩れるってよっぽどだよね？"
10046070-248 = "ああ、それは地下に水脈があったのが原因だ。"
10046070-249 = "水脈？"
10046070-250 = "地下水の移動によって土砂流出が起こり、地盤が弱くなっていた。#n来るべき時が来ただけの、時間の問題だったというわけだ。"
10046070-251 = "こんな場所に建てるなら、事前調査と基礎工事を入念に行うべきだったというのに。"
10046070-252 = "ま、いわゆる「安全意識の欠如」による人災ってことさ。"
10046070-254 = "へぇ～カスミちゃんって、ちゃんと詳しいんだね。"
10046070-258 = "[ns9] \"待って、今なんて……？\"\n[ns10] \"地下に、水脈……？\""
10046070-261 = "さすがは先生。察しがいいじゃないか！"
10046070-265 = "ああ、つまり……！"
10046070-270 = "[ns11] \"みんな！カスミを止めて！！\"\n[ns12] \"マズい、もう遅――\""
10046070-275 = "ハーハッハッハッハ！！#nああ、おんせ――！"
10046070-287 = "……ごふっ！？"
10046070-288 = "い、いつから気づいて……？"
10046070-295 = "初めからっす。"
10046070-296 = "……ははっ、やっぱりお前は、私と似て――"
10046070-300 = "……ほんと、最後まで油断できないっすよね。"
10046070-302 = "え、ええ？何がどうなってたの？"
10046070-303 = "さっきカスミちゃんが取り出したのって……起爆スイッチ！？"
10046070-304 = "はい。まあ、工事中に爆弾を仕掛けておいたんでしょうね。"
10046070-305 = "念のため警戒しておいたんすけど、まさか本当にやらかすなんて。#nまあ、スイッチさえ回収してしまえば――"
10046070-314 = "何事ですか？やけに騒がしいような……。"
10046070-315 = "気にしないのが最善だと思うのだが……。"
10046070-326 = "……ゲヘナ？これは……どういう状況だ……？"
10046070-330 = "ま、まって！私が説明するから！"
10046070-331 = "あら、これはなんでしょう？"
10046070-335 = "スイッチ、ですかね？"
10046070-339 = "ちょっ、待っ――"
10046070-340 = "えいっ。"
10046070-361 = "……？？？"
