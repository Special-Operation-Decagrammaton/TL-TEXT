[translation]
10046070-1 = "Episódio 7: Um problema atrás do outro"
10046070-8 = "Entendo, foi exatamente como eu esperava."
10046070-13 = "Você já descobriu!?"
10046070-14 = "[s1] \"Não foi rápido demais!?\"\n[s2] \"Você sabe de alguma coisa?\""
10046070-20 = "Hm? Bem, eu já estava investigando isso para o desenvolvimento da fonte termal, afinal."
10046070-21 = "Além disso, acima de tudo..."
10046070-22 = "É o hábito que vem com a experiência, ha-ha-ha!!"
10046070-23 = "Então, pessoal—"
10046070-27 = "—vamos começar o desenvolvimento."
10046070-31 = "O que significa isso!?"
10046070-38 = "Por que o Departamento de Desenvolvimento de Fontes Termais está aqui!?"
10046070-39 = "Ichika, prepare-se! Desta vez vamos expulsá-los daqui!"
10046070-44 = "Fui eu quem os chamei."
10046070-48 = "……Ichika?"
10046070-53 = "Hasumi-senpai... é um pedido meu. #nPoderia abrir uma exceção desta vez?"
10046070-54 = "O que aconteceu...?"
10046070-55 = "Você é quem melhor entende o quão perigoso é o Departamento de Desenvolvimento de Fontes Termais..."
10046070-56 = "[s3] \"Eu também peço que considere.\"\n[s4] \"A Ichika fez o melhor que pôde.\""
10046070-61 = "Até você, Sensei... entendo."
10046070-62 = "Se vocês dois estão dizendo isso, deve haver algum motivo."
10046070-63 = "Quando isso terminar, quero uma explicação detalhada."
10046070-64 = "Muito obrigada!"
10046070-68 = "Ei! Amiguinha!"
10046070-72 = "Eu já disse que não somos amigas, não disse!?"
10046070-73 = "Eh? Mas a chefe disse que..."
10046070-74 = "……"
10046070-75 = "[s5] \"Que tal aproveitar a oportunidade para se tornarem amigas...\"\n[s6] \"É o que eu acho, pelo menos...\""
10046070-81 = "Sensei."
10046070-82 = "……Tem coisas que se pode dizer e coisas que não se deve dizer."
10046070-83 = "[s7] \"D-desculpe!\"\n[s8] (Desvia o olhar)"
10046070-86 = "A chefe é, bem... sociável e tem uma personalidade que faz amizade com qualquer um, sabe?"
10046070-87 = "Isso é só o que ela diz, não é?"
10046070-88 = "Ah, você sabia? #nAhaha, vocês dois são bem próximos, né!"
10046070-89 = "Não é isso... hah. #nNão adianta culpar os membros do departamento, né."
10046070-90 = "……Não, talvez adiante?"
10046070-91 = "Ah! Esqueci! A chefe estava me chamando!"
10046070-92 = "Chamando a mim...? #nHouve algum problema na obra?"
10046070-93 = "A obra já terminou. #nComo vai ter a cerimônia de inauguração, o cliente deveria estar presente."
10046070-94 = "Eh, já? #nNão me diga que vocês fizeram um trabalho malfeito...?"
10046070-95 = "Vem, me segue!"
10046070-105 = "……Isso não é uma fonte termal?"
10046070-110 = "É por isso que amadores são um problema!"
10046070-111 = "Pode parecer uma à primeira vista, mas—"
10046070-112 = "A parte mais importante, a água termal, não está brotando! Isso não pode ser chamado de fonte termal!!"
10046070-113 = "Por isso, aquecemos a água e adicionamos sais de banho para criar apenas a atmosfera."
10046070-114 = "Claro, eventualmente, com certeza... #nvou fazer uma fonte termal de verdade brotar, então fique tranquila."
10046070-115 = "……Você realmente gosta de fontes termais, né."
10046070-116 = "Mas mesmo assim, não dava para ter feito algo melhor? #nEstá completamente diferente do prédio original!?"
10046070-120 = "Foi um pedido urgente, não foi?"
10046070-121 = "Usei os materiais que tínhamos à mão e ficou assim. #nOriginalmente, esses materiais foram trazidos para construir instalações termais, afinal."
10046070-122 = "……Você usou os materiais que devolveu, assim mesmo?"
10046070-123 = "E daí?"
10046070-124 = "Isso não significa que não houve lucro algum?"
10046070-125 = "Bem, foi como as coisas aconteceram."
10046070-126 = "Por que chegar a esse ponto...?"
10046070-127 = "Eu apenas cumpri o contrato, nada mais."
10046070-131 = "Você, realmente..."
10046070-136 = "Pessoal! A Nagi-chan está vindo para cá!"
10046070-137 = "Kasumi-chan! Sinto muito mesmo, mas—"
10046070-138 = "Ah, eu entendo. #nConvidados indesejados... está na hora de os coadjuvantes saírem de cena."
10046070-139 = "Pelo bem de uma amiga importante, não é?"
10046070-143 = "Muito obrigada mesmo!"
10046070-144 = "Se quer agradecer, agradeça à Ichika-chan!"
10046070-152 = "Quem diria que eu acabaria discutindo sobre a dignidade do Chá das Cinco..."
10046070-153 = "Força maior. #nDepois de me servir tanto chá, o que você esperava que acontecesse?"
10046070-154 = "Sobre este assunto, mais tarde, na frente da Mika-san, novamente—"
10046070-158 = "Ué? A casa de campo está...?"
10046070-159 = "Pessoal, bem-vindas de volta! Estão se divertindo?"
10046070-160 = "Ah, Mika-san. Por favor, escute. A Seia-san realmente..."
10046070-161 = "Aliás, o estilo da casa de campo... não parece um pouco diferente?"
10046070-165 = "Sério? Você acha? #nComo eu limpei tudo, talvez o ambiente tenha mudado um pouco por estar mais arrumado?"
10046070-166 = "Acho que 'um pouco' é um eufemismo..."
10046070-168 = "Nagisa, isso é prova de que você está acumulando fadiga. #nPara mim, não há nada de errado com a casa de campo."
10046070-170 = "É mesmo? Bem, se a Seia-san diz isso..."
10046070-171 = "Então, vamos entrar? Estou exausta..."
10046070-175 = "Ah, eu já deixei a água do banho pronta!"
10046070-176 = "Oh, obrigada pela gentileza. Então, com licença."
10046070-182 = "……Fufu. 'Um pouco', é? #nDá para sentir o esforço que ela fez."
10046070-183 = "Embora eu não faça ideia de como ela conseguiu reconstruir tudo."
10046070-184 = "Você percebeu!?"
10046070-185 = "Como eu não notaria uma mudança desse tamanho?"
10046070-186 = "Mesmo com a minha ajuda— #nseria impossível para a Nagisa de sempre conseguir disfarçar algo assim."
10046070-187 = "……Sim, se fosse a Nagisa de sempre."
10046070-188 = "Hm? O que você quer dizer?"
10046070-189 = "Em outras palavras, significa que ela pode relaxar um pouco os ombros. #nEmbora eu entenda que, para você agora, isso seja difícil."
10046070-190 = "Sobre o motivo... a culpa, eu não sou indiferente a isso. #nMas... a relação entre você e a Nagisa não é tão frágil assim, é?"
10046070-191 = "É apenas isso. #nBem, vou aceitar a gentileza da Mika. Com licença."
10046070-197 = "……Sempre falando coisas complicadas."
10046070-198 = "Sensei, você entendeu?"
10046070-199 = "Ah, nem o Sensei entendeu...? #nMas, se for eu, talvez eu entenda...?"
10046070-200 = "……O que é isso? O Sensei também está ficando parecido com a Seia-chan?"
10046070-205 = "……Mika, você não está sentindo um cheiro de queimado?"
10046070-209 = "……Ah! Eu deixei a panela no fogo!"
10046070-210 = "Desculpa, Sensei! Já volto!"
10046070-222 = "(Depois disso, após o jantar, Nagisa e Seia voltaram para o quarto)"
10046070-225 = "Pessoal, bom trabalho hoje!"
10046070-226 = "Bom trabalho!"
10046070-231 = "A Mika-sama, a Ichika e o Sensei... #nnunca imaginei que tivessem se esforçado tanto nos bastidores."
10046070-232 = "Sem saber de nada, eu estava aproveitando as férias tranquilamente... que vergonha."
10046070-233 = "Não diga isso. Como a Hasumi-chan estava cuidando das duas, eu pude me concentrar nos preparativos com tranquilidade."
10046070-234 = "Que falta de consideração. Estamos sendo deixados de fora?"
10046070-235 = "Departamento de Desenvolvimento de Fontes Termais..."
10046070-236 = "Como vocês têm a cara de pau de aparecer por aqui depois de tudo...?"
10046070-237 = "Haha! É mesmo? Fico honrada com o elogio."
10046070-238 = "— Mas é verdade que vocês nos ajudaram."
10046070-239 = "Quem diria que chegaria o dia em que eu agradeceria a vocês..."
10046070-244 = "Tudo resolvido! Todos felizes! ...Não é ótimo?"
10046070-245 = "Isso mesmo! Diga a eles!"
10046070-246 = "Ah, falando nisso. Afinal, qual foi a causa de tudo?"
10046070-247 = "O chão desmoronar é algo bem sério, não é?"
10046070-248 = "Ah, isso foi causado por um veio de água subterrâneo."
10046070-249 = "Um veio de água?"
10046070-250 = "O movimento da água subterrânea causou erosão no solo, deixando a base instável. #nEra apenas uma questão de tempo até que o inevitável acontecesse."
10046070-251 = "Se iam construir algo em um lugar desses, deveriam ter feito uma pesquisa prévia e uma fundação cuidadosa."
10046070-252 = "Bem, foi um desastre causado pela chamada 'falta de consciência de segurança'."
10046070-254 = "Uau, a Kasumi entende bastante disso, hein."
10046070-258 = "[ns9] \"Espere, o que você disse agora...?\"\n[ns10] \"Um veio de água... no subsolo?\""
10046070-261 = "Como esperado do Sensei. Você é bem perspicaz!"
10046070-265 = "Ah, então quer dizer...!"
10046070-270 = "[ns11] \"Pessoal! Parem a Kasumi!!\"\n[ns12] \"Droga, é tarde dema—\""
10046070-275 = "Hahahahaha!! #nAh, a fonte ter—!"
10046070-287 = "...Guh!?"
10046070-288 = "D-desde quando você percebeu...?"
10046070-295 = "Desde o começo."
10046070-296 = "...Haha, você realmente é parecida comigo—"
10046070-300 = "...Sério, não dá para baixar a guarda com você até o fim."
10046070-302 = "Ei, ei? O que está acontecendo?"
10046070-303 = "O que a Kasumi tirou agora há pouco era... um detonador!?"
10046070-304 = "Sim. Bem, ela provavelmente instalou bombas durante a construção."
10046070-305 = "Eu fiquei em alerta por precaução, mas não achei que ela realmente faria isso. #nBem, contanto que eu tenha recuperado o interruptor—"
10046070-314 = "O que está acontecendo? Parece estar muito barulhento..."
10046070-315 = "Acho que o melhor é não se importar com isso..."
10046070-326 = "...Gehenna? O que é isso... que situação é essa...?"
10046070-330 = "E-esperem! Eu explico!"
10046070-331 = "Ora, o que seria isso?"
10046070-335 = "Um interruptor, talvez?"
10046070-339 = "Ei, espe—"
10046070-340 = "Já era."
10046070-361 = "...???"
