[translation]
100-1 = "特別依頼"
100-2 = "連邦生徒会・オペレーションルーム"
100-3 = "こんにちは。あなたがリン先輩の言ってた、シャーレの先生？"
100-7 = "ふーん……思ってたよりは、まあアリかな。"
100-8 = "ま、どうでもいいんだけど。"
100-9 = "なによ、そんな目で見ても、この明太子のお菓子はあげないんだから。（パリッパリッ）"
100-10 = "私はモモカ、リン先輩と同じく連邦生徒会に所属してる幹部だよ。"
100-11 = "連邦生徒会長がいきなりいなくなっちゃったせいで、本当はお菓子を食べる暇もないくらい忙しいんだけど。（パリッ）"
100-12 = "それでもせっかくだから、暇そうな連邦捜査部シャーレに、直接お仕事をあげようと思って。"
100-13 = "ん？シャーレは、学校の問題を解決することに精一杯で、忙しいって？"
100-14 = "ふーん……でもそんなに忙しいなら、もう一つ仕事が増えても、そんな変わらないでしょ？"
100-15 = "あなたも知っての通り、連邦生徒会長が消えて以降、キヴォトス全域のあっちこっちでバカな連中が暴れてるの。"
100-16 = "正義の味方を名乗りながら器物を壊すやつらから、機密書類を盗み出す大胆なやつらまで……。"
100-17 = "ほんと、猫の手も借りたいぐらい。"
100-18 = "まあ、私は何もしてないんだけど。（パリッパリッ）"
100-19 = "とはいえこのまま問題を放置したらまた、リン先輩に何か言われるかもしれないし。"
100-20 = "連邦生徒会の仕事は連帯責任だから、あなたもこのことは無関係じゃないんだよ。ふっふっふ……。"
100-21 = "じゃあ、簡単なのから始めてみよっか？（パリッ）"
