[translation]
100-1 = "Pedido Especial"
100-2 = "Conselho Estudantil Geral - Sala de Operações"
100-3 = "Olá. Você é o Sensei da Schale de quem a Rin falou?"
100-7 = "Hmm... Acho que você é aceitável, considerando o que eu esperava..."
100-8 = "Bem, tanto faz, na verdade."
100-9 = "O que foi? Não adianta me olhar assim, eu não vou te dar esse salgadinho de mentaiko... (Croc, croc)"
100-10 = "Eu sou Momoka, uma executiva do Conselho Estudantil Geral, assim como a Rin."
100-11 = "Como a Presidente do Conselho Estudantil Geral desapareceu de repente, eu deveria estar ocupada demais até para comer salgadinhos. (Croc)"
100-12 = "Mas, já que estamos aqui, pensei em dar um trabalho diretamente para o Departamento de Investigação Federal, a Schale, que parece estar sem fazer nada."
100-13 = "Hm? A Schale está ocupado demais tentando resolver os problemas das escolas?"
100-14 = "Hmm... Mas se vocês já estão tão ocupados, não vai fazer muita diferença ter mais um trabalho, certo?"
100-15 = "Como você bem sabe, desde que a Presidente do Conselho Estudantil Geral sumiu, um bando de idiotas tem causado confusão por toda a Kivotos."
100-16 = "Desde aqueles que se dizem defensores da justiça enquanto destroem propriedade pública, até os audaciosos que roubam documentos confidenciais..."
100-17 = "Sério, a situação está tão caótica que qualquer ajuda é bem-vinda."
100-18 = "Bom, eu mesma não estou fazendo nada, claro. (Croc, croc)"
100-19 = "Ainda assim, se eu deixar esses problemas de lado, a Rin pode acabar vindo reclamar comigo de novo."
100-20 = "O trabalho do Conselho Estudantil Geral é uma responsabilidade coletiva, então você também não está fora dessa. Hehe..."
100-21 = "Então, que tal começarmos por algo simples? (Croc)"