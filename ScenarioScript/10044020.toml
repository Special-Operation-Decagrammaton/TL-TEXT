[translation]
10044020-1 = "第2話;消えた列車を追って"
10044020-2 = "勝手に発車しちゃったの？システムの誤作動で？"
10044020-3 = "は、はい……。#n一応、乗務員室の権限で制御はできるのですが――"
10044020-4 = "い、今、乗務員室には誰もいないんですけど……。"
10044020-9 = "なんでこっち見るのさ。"
10044020-10 = "あ、遊んでなければ、こんなことにはならなかったのに……。"
10044020-11 = "悩んでても始まらないし！追いかけるよ！"
10044020-13 = "イレギュラー発生ー。"
10044020-14 = "ま、まずは路線図を確認して――"
10044020-15 = "今からなら、地下鉄に乗ったほうが早いですよ。"
10044020-16 = "おっけ。急ぐよ。"
10044020-17 = "地下鉄ーめんどくさーい……。"
10044020-20 = "――てなわけでさ。"
10044020-21 = "[ns1] \"なるほど。\"\n[ns2] \"だいたい状況は分かったよ。\""
10044020-24 = "あ、あなたは……もしかして、シャーレの先生ですか！？"
10044020-25 = "な、なんで先生がここに……？"
10044020-27 = "ヒカリが呼んだー。"
10044020-28 = "どうして！？"
10044020-29 = "困ったら呼んでいいって言われたからー？"
10044020-30 = "そ、そんなの社交辞令だと思いますけど……！？"
10044020-35 = "えっ……わ、私に……何か……？"
10044020-36 = "あっ、え、えと……貨物輸送管理部2年、[ruby=うつみ]内海[/ruby]アオバ、です……。"
10044020-37 = "[s] \"よろしく、アオバ。\""
10044020-38 = "よ、よろしくはしなくても……いいですけど……。"
10044020-40 = "え？2年生だったの？"
10044020-41 = "は、はい……お二人は1年生ですよね？"
10044020-42 = "アオバが先輩ー？"
10044020-43 = "い、いまさら先輩扱いされたいとも思ってないですけど……。"
10044020-44 = "そもそも期待してないし……。"
10044020-49 = "おっ、来た来た！乗り込めー！"
10044020-50 = "ほいー。"
10044020-55 = "はぁ、どうして私がこんな連中と一緒に……。"
10044020-62 = "うおー、ゆれるゆれるー。"
10044020-63 = "地下鉄ならこんなもんでしょ。ま、しゃーないしゃーない。"
10044020-64 = "そ、そういうのはよくないと思うんですけど……。"
10044020-65 = "どういうのー？"
10044020-66 = "わ、悪口は言わないほうが……。#nは、ハイランダーの制服を着ているんですし……。"
10044020-67 = "なんで？事実っしょ？"
10044020-68 = "じ、事実だとしても……。"
10044020-69 = "[ruby=時と場所と場合]TPO[/ruby]ってあるじゃないですか……。"
10044020-70 = "難しいこと考えて大変だね。"
10044020-71 = "なんでこんなのが幹部をやれてるんだろ……。"
10044020-72 = "そんなことより、後のことを考えなきゃ。"
10044020-73 = "どうやって言い訳する？"
10044020-74 = "時間通りならー問題ないかなー？"
10044020-75 = "パヒャヒャッ！たしかに！パパッとリカバリーしちゃおっか。"
10044020-81 = "おい、あれ見ろよ。"
10044020-82 = "ん？ハイランダーの連中じゃん。"
10044020-83 = "そういやこの前、運賃を値上げしたんだっけ。いい迷惑だぜ……。"
10044020-84 = "勝手なことされると参っちゃうよな。#nま、うちらは金払ってないからいいけどよ。"
10044020-85 = "つーか、地下鉄ってハイランダーなんだっけ？"
10044020-86 = "列車も地下鉄も似たようなもんだろ？"
10044020-88 = "関係ないね。どうせ金持ってんだろうし、ちょっとくらい分けてもらおうぜ。"
10044020-90 = "つり革体操ー、インフィニティ・スパイラル・スピンー。"
10044020-91 = "パヒャヒャッ、10点！10点！10点！"
10044020-93 = "[ns3] \"ヒカリ、つり革にぶら下がるのはやめようか。\"\n[ns4] \"ノゾミも、あまり大声は出さないでね。\""
10044020-96 = "はーい。"
10044020-97 = "ごめんなさーい。"
10044020-99 = "せ、先生の言うことは素直に聞くんですね……。"
10044020-100 = "あ、あの……すべての幹部がこうってわけじゃないので……。#nは、ハイランダーのこと、誤解しないでくださいね……。"
10044020-101 = "[s] \"今は私がついているから大丈夫だよ。\""
10044020-102 = "はい……。#nうぅ……こっちまで恥ずかしくなってくるんですけど……。"
10044020-104 = "おい、ハイランダー！"
10044020-110 = "お前ら、地下鉄の運賃を上げたんだってな？"
10044020-111 = "うちらみてぇな貧乏人は乗るなって言いてぇのか？あぁん？"
10044020-112 = "地下鉄は私らの所管じゃないよ？"
10044020-114 = "え……あ、そうなの？"
10044020-115 = "所管じゃないからなんだってんだ！"
10044020-116 = "お前らだって列車走らせるだけで金とってるじゃねぇか。#n代わりに責任取れっつってんだよ！"
10044020-118 = "い、言いがかり過ぎるんですけど……。"
10044020-119 = "とにかく、そのなんだ……？イシャキン……？ってもんをよこせ！"
10044020-120 = "慰謝料のことー？"
10044020-121 = "それだ、それ！バイショーしろ、バイショウ！"
10044020-122 = "てか、お前今うちらのこと馬鹿にした？"
10044020-123 = "こりゃ「イシャキン」追加だぜ～。"
10044020-125 = "ノゾミ、お金あるー？"
10044020-126 = "ううん？運賃も先生が出してくれたじゃん。"
10044020-127 = "ヒカリたちもーびんぼー。"
10044020-129 = "おい、んなこと通じると思ってんのか？"
10044020-130 = "金がねぇなら弾でもよこせ！"
10044020-132 = "[ns] \"みんな、ちょっと落ち着こうか……。\""
10044020-134 = "あん？大人ぁ？"
10044020-135 = "ちょうどいい。大人なら金もあんだろ？お前が払ってくれてもいいんだぜ？"
10044020-136 = "[s5] \"私もお金に余裕があるわけじゃないんだけど……。\"\n[s6] \"とりあえず、落ち着いて話を……！\""
10044020-139 = "話して解決するわけねぇだろ！？"
10044020-140 = "うちらだってこんなことしたくないんだよ！"
10044020-141 = "でも勉強は嫌いだし、金もない！もう喧嘩以外やることないんだぜ！？"
10044020-142 = "成績悪いのにー性格も悪いのー？"
10044020-144 = "あぁん！？ナメてんのか！？"
10044020-145 = "わ、私も、その気持ち分かります……。"
10044020-146 = "あぁん？"
10044020-147 = "わ、私も古典のテスト、毎回赤点なので……よく分かります。"
10044020-149 = "なんだ、お前も勉強できねぇのか。そんで？"
10044020-150 = "で、でも……勉強がイヤで逃げたのは、ご自身の選択ですよね……？"
10044020-151 = "なら、そ、その結果も、素直に受け入れるべきでは……？"
10044020-152 = "はぁ！？なんでだよ！？"
10044020-153 = "なんでそんなこと言うんだよ。ちょっとくらい優しくしてくれたっていいじゃねぇか！"
10044020-157 = "ど、どうしてですか……？"
10044020-162 = "……そりゃ、誰だって優しくされてぇだろ？"
10044020-164 = "あ、頭お花畑なんですね……。#nせ、世界はもともと冷たくて酷いんですけど……。"
10044020-165 = "だ、誰も責任なんて取ってくれやしないのに、どうして人任せでいられるんですか……？"
10044020-166 = "だ、だって！う、うちらだって愛されたいんだぜ！？"
10044020-167 = "ふ、ふふ……期待をするから、失望するんです……。#nお、お馬鹿さん、ですね……。"
10044020-168 = "だ、誰だって……傷つくのは嫌じゃないですか……。"
10044020-169 = "き、期待しなければ、傷つくこともないのに……ふふふ……。"
10044020-174 = "こ、こいつ……。"
10044020-175 = "なんか……もういいか。"
10044020-176 = "い、行くぞ……！"
10044020-181 = "よく撃退したね！#nすっごいマイナスオーラじゃん！"
10044020-182 = "ふ、普通だと思うんですけど……？"
10044020-183 = "生きてて楽しくないのー？"
10044020-184 = "え……？生きるのに……楽しさって要ります……？"
10044020-189 = "もっっっちろん！！楽しくないなら、やる必要も、理由もないじゃん？"
10044020-190 = "あぐりー。"
10044020-192 = "[ns7] \"人生は、人それぞれだからね。\"\n[ns8] \"アオバが、少しでも未来に期待できるようになるといいね。\""
10044020-195 = "き、期待しないで……おきます……。"
10044020-201 = "あ、ここです。"
10044020-202 = "大人しく待っててくれよ～？"
10044020-203 = "うぉー、ロストトレインー。"
10044020-210 = "[ns] \"行こう、アオバ。\""
10044020-211 = "は、はい……。"
