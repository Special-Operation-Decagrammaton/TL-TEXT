[translation]
10044020-1 = "Episódio 2; Em busca do trem desaparecido"
10044020-2 = "Ele partiu sozinho? Por causa de um erro no sistema?"
10044020-3 = "S-sim...#nEm teoria, é possível controlar a partir da cabine do operador, mas..."
10044020-4 = "N-não tem ninguém na cabine agora..."
10044020-9 = "Por que você está olhando para mim?"
10044020-10 = "Se não tivéssemos ficado de brincadeira, isso não teria acontecido..."
10044020-11 = "Ficar preocupada não vai adiantar nada! Vamos atrás dele!"
10044020-13 = "Irregularidade detectada."
10044020-14 = "P-primeiro, vamos verificar o mapa da linha..."
10044020-15 = "Se formos agora, é mais rápido pegar o metrô."
10044020-16 = "Beleza. Vamos nos apressar."
10044020-17 = "Metrô... que preguiça..."
10044020-20 = "— E é por isso."
10044020-21 = "[ns1] \"Entendo.\"\n[ns2] \"Já entendi a situação geral.\""
10044020-24 = "V-você é... por acaso, o Sensei do Schale!?"
10044020-25 = "P-por que o Sensei está aqui...?"
10044020-27 = "A Hikari chamou."
10044020-28 = "Por que!?"
10044020-29 = "Porque me disseram que eu podia chamar se estivesse em apuros?"
10044020-30 = "I-isso foi só uma formalidade, eu acho...!?"
10044020-35 = "Eh... v-você quer... algo... de mim?"
10044020-36 = "Ah, e-eu sou... Utsumi Aoba, do 2º ano do Departamento de Gestão de Cargas..."
10044020-37 = "[s] \"Prazer em conhecê-la, Aoba.\""
10044020-38 = "N-não precisa... ter prazer em me conhecer..."
10044020-40 = "Ué? Você é do 2º ano?"
10044020-41 = "S-sim... vocês duas são do 1º ano, certo?"
10044020-42 = "A Aoba é nossa veterana?"
10044020-43 = "N-não que eu espere ser tratada como veterana agora..."
10044020-44 = "E, para começo de conversa, eu nem espero nada..."
10044020-49 = "Opa, chegou! Vamos entrar!"
10044020-50 = "Beleza."
10044020-55 = "Ai, por que eu estou com esse tipo de gente..."
10044020-62 = "Uau, balança muito, balança muito."
10044020-63 = "É assim mesmo no metrô. Bom, não tem jeito."
10044020-64 = "E-eu acho que esse tipo de atitude não é bom..."
10044020-65 = "Que tipo de atitude?"
10044020-66 = "D-dizer coisas ruins...#nNós estamos usando o uniforme da Highlander, afinal..."
10044020-67 = "Por quê? É a verdade, não é?"
10044020-68 = "M-mesmo que seja verdade..."
10044020-69 = "Existe algo chamado bom senso, não existe?"
10044020-70 = "Você se complica demais pensando nessas coisas."
10044020-71 = "Como é que alguém assim conseguiu virar executiva..."
10044020-72 = "Mais importante que isso, precisamos pensar no que vem a seguir."
10044020-73 = "Como vamos dar uma desculpa?"
10044020-74 = "Se chegarmos no horário, não tem problema, né?"
10044020-75 = "Pahyahya! Com certeza! Vamos dar um jeito nisso rapidinho."
10044020-81 = "Ei, olha aquilo."
10044020-82 = "Hm? É o pessoal da Highlander."
10044020-83 = "Falando nisso, eles aumentaram a tarifa outro dia. Que incômodo..."
10044020-84 = "É um saco quando eles fazem o que querem.#nBom, como a gente não paga mesmo, tanto faz."
10044020-85 = "Digo, o metrô não é da Highlander?"
10044020-86 = "Trem e metrô não são a mesma coisa?"
10044020-88 = "Não importa. De qualquer jeito, vocês devem ter dinheiro, então é melhor dividir um pouco com a gente."
10044020-90 = "Ginástica no corrimão, Espiral Infinita de Giro."
10044020-91 = "Pahya-hya, nota 10! Nota 10! Nota 10!"
10044020-93 = "[ns3] \"Hikari, vamos parar de ficar pendurada no corrimão?\"\n[ns4] \"Nozomi, não fale tão alto também, tá bom?\""
10044020-96 = "Tá bom."
10044020-97 = "Desculpeee."
10044020-99 = "E-eles ouvem o que o Sensei diz tão facilmente..."
10044020-100 = "A-ah, sabe... nem todos os executivos são assim... Por favor, não entenda mal a Highlander..."
10044020-101 = "[s] \"Está tudo bem, eu estou aqui agora.\""
10044020-102 = "Sim... Ugh... Até eu estou ficando com vergonha disso..."
10044020-104 = "Ei, Highlander!"
10044020-110 = "Vocês, não foram vocês que aumentaram a tarifa do metrô?"
10044020-111 = "Tá querendo dizer que gente pobre como a gente não pode andar de metrô? Hein?"
10044020-112 = "O metrô não está sob nossa jurisdição, sabia?"
10044020-114 = "É... ah, é mesmo?"
10044020-115 = "E daí que não está sob a jurisdição de vocês!"
10044020-116 = "Vocês também ganham dinheiro só por rodar trens, não ganham? Então assumam a responsabilidade no lugar deles!"
10044020-118 = "I-isso é uma acusação sem fundamento..."
10044020-119 = "De qualquer forma, esse tal de... I-ishakin...? Passem logo pra cá!"
10044020-120 = "Você quer dizer indenização?"
10044020-121 = "Isso, isso mesmo! Paguem a indenização, paguem!"
10044020-122 = "Espera, você acabou de zombar da gente?"
10044020-123 = "Isso vai ser um adicional na \"indenização\"."
10044020-125 = "Nozomi, você tem dinheiro?"
10044020-126 = "Não? O Sensei não pagou a nossa passagem?"
10044020-127 = "Hikari e as outras também são pobres."
10044020-129 = "Ei, vocês acham que esse papo cola?"
10044020-130 = "Se não têm dinheiro, passem as balas!"
10044020-132 = "[ns] \"Pessoal, vamos nos acalmar um pouco...\""
10044020-134 = "Hein? Um adulto?"
10044020-135 = "Ainda bem. Se é adulto, deve ter dinheiro, né? Que tal você pagar pra gente?"
10044020-136 = "[s5] \"Eu também não estou exatamente nadando em dinheiro...\"\n[s6] \"Por enquanto, vamos nos acalmar e conversar...!\""
10044020-139 = "Como se conversar fosse resolver alguma coisa!"
10044020-140 = "A gente também não queria estar fazendo isso!"
10044020-141 = "Mas a gente odeia estudar e não tem dinheiro! Não sobra nada pra fazer além de brigar, né?!"
10044020-142 = "Notas baixas e personalidade ruim também?"
10044020-144 = "Hein!? Tá querendo apanhar!?"
10044020-145 = "E-eu também entendo esse sentimento..."
10044020-146 = "Hein?"
10044020-147 = "E-eu também sempre tiro nota vermelha na prova de clássicos... então eu entendo bem."
10044020-149 = "O quê, você também não consegue estudar? E daí?"
10044020-150 = "M-mas... fugir porque odeia estudar foi uma escolha sua, não foi...?"
10044020-151 = "Então, o resultado disso não deveria ser aceito de bom grado...?"
10044020-152 = "Hã!? Por que você diz isso!?"
10044020-153 = "Por que você fala desse jeito? Podia ser um pouco mais gentil com a gente!"
10044020-157 = "P-por que...?"
10044020-162 = "...Ora, todo mundo quer ser tratado com gentileza, não quer?"
10044020-164 = "V-você vive no mundo da lua, hein... O mundo, por natureza, é frio e cruel..."
10044020-165 = "N-ninguém vai assumir a responsabilidade por nós, então por que você consegue deixar tudo nas mãos dos outros...?"
10044020-166 = "M-mas é que! N-nós também queremos ser amadas, sabe!?"
10044020-167 = "He, hehe... Se você cria expectativas, acaba se decepcionando... Que boba, você não acha?"
10044020-168 = "N-ninguém gosta de... se machucar, não é...?"
10044020-169 = "S-se você não criar expectativas, não vai se machucar... hehehe..."
10044020-174 = "E-essa garota..."
10044020-175 = "Sei lá... tanto faz."
10044020-176 = "V-vamos nessa...!"
10044020-181 = "Mandou bem em repelir eles!#nQue aura negativa incrível, hein!"
10044020-182 = "E-eu acho que é normal...?"
10044020-183 = "Você não se diverte vivendo?"
10044020-184 = "Eh...? Viver... precisa ser divertido...?"
10044020-189 = "Claaaaaro!! Se não for divertido, não tem por que fazer, nem motivo para continuar, né?"
10044020-190 = "Concordo."
10044020-192 = "[ns7] \"A vida é diferente para cada pessoa, afinal.\"\n[ns8] \"Seria bom se a Aoba pudesse ter um pouco mais de esperança no futuro.\""
10044020-195 = "E-eu vou... evitar criar expectativas..."
10044020-201 = "Ah, é aqui."
10044020-202 = "Fique esperando quietinha, tá bom?"
10044020-203 = "Uou, o trem perdido."
10044020-210 = "[ns] \"Vamos, Aoba.\""
10044020-211 = "S-sim..."
