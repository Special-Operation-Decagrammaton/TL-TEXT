[translation]
2005905-1 = "小悪魔とホカンス"
2005905-2 = "（その晩、ムツキのメッセージが気になってホテルへ向かった）"
2005905-8 = "ホテルのロビー"
2005905-12 = "[ns]（この部屋かな？）"
2005905-14 = "ん？どちらさま～？"
2005905-15 = "あれ、先生？こんな時間に？"
2005905-19 = "へえ、本当に来たんだ？"
2005905-20 = "本気？女の子が一人で泊まってるホテルだよ？"
2005905-21 = "くふふっ。先生って結構大胆だね？"
2005905-22 = "[s] \"大丈夫？本当に何ともないんだよね？\""
2005905-23 = "……ん？もしかして心配してくれてたの？"
2005905-24 = "あはははっ。本当に何でもないってば。なんでかって言うと――"
2005905-37 = "――それで残党がいないか調べたら、案の定でね。"
2005905-38 = "資金を集めたら武器を買って、先生を人質に取るつもりだったみたい。"
2005905-39 = "でも心配しないで。みんな木っ端微塵にしといたから。"
2005905-40 = "奴らが爆弾を売って儲けたお金も、全部持ってきたよ。"
2005905-41 = "ほらこれ。"
2005905-46 = "（ムツキの鞄にはたくさんのお金が入っていた）"
2005905-50 = "[ns] \"こんなに！？\""
2005905-51 = "くふふっ、驚いた？"
2005905-52 = "それで、万が一何かあったらと思って安全そうなホテルに来たんだ。"
2005905-53 = "これを狙う奴らがいるかもしれないからね～。"
2005905-54 = "[s] \"このお金はどうする？\""
2005905-55 = "んー持ち主に返せるわけでもないし……。"
2005905-56 = "今回の件で苦労した私が貰っちゃおうかな～？"
2005905-57 = "先生はどう思う？"
2005905-58 = "[s1] \"いいと思う。\"\n[s2] \"それはちょっと……。\""
2005905-59 = "へえ～本当に～？"
2005905-60 = "くふふっ、やっぱ先生はそう言うと思った。"
2005905-61 = "まあ、私もいろいろ考えてみたんだけどさ。"
2005905-62 = "私がこのお金を貰うのは……。"
2005905-63 = "面白くなーい！"
2005905-64 = "[ns] \"……うん？\""
2005905-65 = "考えてみて。このお金、私が貰ったら便利屋の運営に充てられるよ？そんなの面白くなくない？"
2005905-66 = "[ruby=うち]便利屋[/ruby]はやっぱ、カツカツなくらいがちょうどいいと思うんだ～"
2005905-67 = "あ、これみんなには内緒ね？くふふっ。"
2005905-68 = "[s] \"じゃあどこか預けるところはある？\""
2005905-69 = "うん！このお金は……。"
2005905-70 = "全部先生に預ける！"
2005905-73 = "[wa:974]― [log=무츠키 드레스]あのね？[wa:1119]こう見えても[wa:637]私、[/log]"
2005905-75 = "― [log=무츠키 드레스]結構信頼してるんだよ？[wa:1890]先生のこと。[/log]"
2005905-78 = "[wa:952]― [log=무츠키 드레스]え、[wa:626]意外？[/log]"
2005905-80 = "― [log=무츠키 드레스]……いつもイタズラばっかりしてるから？[/log]"
2005905-83 = "― [log=무츠키 드레스]くふふっ。[wa:926]私だって[wa:1189]誰彼構わずやるわけじゃないって。[/log]"
2005905-86 = "[wa:2098]― [log=무츠키 드레스]まあ、[wa:932]だから [wa:1416]……そのお金をどうするかは、[wa:1650]任せるよ。[/log]"
2005905-88 = "― [log=무츠키 드레스]先生なら、[wa:1166]ちゃんと意味のあることに[wa:1502]使ってくれるでしょ？[/log]"
2005905-91 = "― [log=무츠키 드레스]どっかに寄付しても[wa:754]いいし、[/log]"
2005905-93 = "― [log=무츠키 드레스]先生の活動資金にしても[wa:1529]いいし……。[/log]"
2005905-96 = "[wa:740]― [log=무츠키 드레스]それが嫌なら、[wa:1225]先生が預かるってことにして――[/log]"
2005905-98 = "― [log=무츠키 드레스]私たちの[wa:569]未来のために取っておいても、[wa:2393]いいかもね？[/log]"
2005905-101 = "[wa:1285]― [log=무츠키 드레스]え？[wa:755]何を言っているのかって？[/log]"
2005905-104 = "[wa:882]― [log=무츠키 드레스]くふふっ！[wa:993]さあ？[/log]"
2005905-106 = "― [log=무츠키 드레스]どういう意味だろうね♪[/log]"
2005905-110 = "（その後もムツキの冗談に付き合って楽しく過ごした）"
2005905-111 = "（心配で遅くまで一緒にいたものの、特にトラブルは起きなかった）"
2005905-116 = "（ホテル代は後でこっそり払っておいた）"
2005905-117 = "（大ごとにならなくて本当によかった……）"
