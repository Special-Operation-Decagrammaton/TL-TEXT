[translation]
2002105-1 = "Esperando ansiosamente por você"
2002105-2 = "Bem-vindo, Sensei!"
2002105-3 = "Hehe. Falando nisso, é a primeira vez que convido você para cá, não é?"
2002105-4 = "Não é nada demais, mas por favor, fique à vontade!"
2002105-7 = "[wa:800]— Isso é..."
2002105-9 = "— É a minha forma de [wa:600] me preparar para receber o [wa:1200] Papai Noel."
2002105-12 = "[wa:700]— Para que o Papai Noel não sinta frio,"
2002105-14 = "— Eu acendo o fogo [wa:500] na lareira..."
2002105-17 = "— E decoro a árvore de Natal [wa:800] de um jeito bem fofo."
2002105-20 = "[wa:900]— Papai Noel,"
2002105-22 = "— Estou te esperando~ [wa:900] é o que eu digo."
2002105-25 = "— Quando faço isso,"
2002105-27 = "— Ele sempre coloca [wa:1100] um presente [wa:600] na minha meia!"
2002105-30 = "[wa:700]— E este ano..."
2002105-33 = "[wa:800]— Eu decidi que vou [wa:600] agradecer ao Papai Noel!"
2002105-36 = "— Hehe, [wa:900] o que acha?"
2002105-38 = "— São biscoitos caseiros e [wa:1000] leite fresco!"
2002105-41 = "O Papai Noel não fica muito sobrecarregado nesta época do ano?"
2002105-42 = "Mesmo assim, eu só recebia presentes e nunca fiz nada por ele..."
2002105-43 = "Por isso, este ano, eu realmente queria retribuir."
2002105-44 = "Espero que isso ajude o Papai Noel a se sentir um pouco melhor."
2002105-46 = "(Depois disso, fiquei com a Hanae até ela terminar de fazer a meia)"
2002105-47 = "(Hanae, exausta por ter terminado a meia, sentou-se no sofá e começou a cochilar...)"
2002105-48 = "Hmm... que o presente deste ano seja... que ninguém se machuque gravemente..."
2002105-49 = "Ou então... por favor, me dê um antisséptico incrível..."
2002105-50 = "[ns] Comi silenciosamente o leite e os biscoitos que a Hanae preparou para o Papai Noel."
2002105-52 = "[ns] Saí para comprar um presente para a Hanae."
2002105-54 = "(Encontrar um \"antisséptico incrível\" foi bem difícil...)"
