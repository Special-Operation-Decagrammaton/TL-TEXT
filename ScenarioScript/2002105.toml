[translation]
2002105-1 = "あなたを待ちわびて"
2002105-2 = "ようこそ、先生！"
2002105-3 = "えへへ。#nそういえば、先生をここにご招待するのは初めてですね。"
2002105-4 = "大したものでは無いですが、ゆっくりしていってください！"
2002105-7 = "[wa:800]― これは……"
2002105-9 = "― 私なりの[wa:600]サンタさんをお迎えする[wa:1200]準備です。"
2002105-12 = "[wa:700]― サンタさんが寒くないよう、"
2002105-14 = "― 暖炉に[wa:500]火を入れて……"
2002105-17 = "― クリスマスツリーを[wa:800]可愛く飾り付けるんです。"
2002105-20 = "[wa:900]― サンタさん、"
2002105-22 = "― 待ってますよ～[wa:900]って。"
2002105-25 = "― そうすると、"
2002105-27 = "― 必ず靴下に[wa:1100]プレゼントを[wa:600]入れてくれるんです！"
2002105-30 = "[wa:700]― そして今年はですね……"
2002105-33 = "[wa:800]― サンタさんに[wa:600]お礼をしようと思っています！"
2002105-36 = "― えへへ、[wa:900]どうでしょう？"
2002105-38 = "― 手作りクッキーと[wa:1000]新鮮なミルクです！"
2002105-41 = "サンタさんは毎年この時期、#nすっごく大変じゃないですか。"
2002105-42 = "なのに私はもらってばかりで、#n何もしてあげられなかったので……。"
2002105-43 = "だから今年は、どうしてもお礼がしたくて。"
2002105-44 = "これでサンタさんが#n少しでも元気になってくれると良いなあって。"
2002105-46 = "（その後、ハナエが靴下を作り終わるまで一緒にいた）"
2002105-47 = "（靴下を作り終えたハナエは疲れたのか、ソファーに座ってうとうとしていて……）"
2002105-48 = "んん……今年のプレゼントは……誰も大きな怪我をしませんように……。"
2002105-49 = "それか……すんごい消毒薬をください……。"
2002105-50 = "[ns] ハナエがサンタさんのために用意していた牛乳とクッキーを、そっと食べる。"
2002105-52 = "[ns] ハナエへのプレゼントを買いに出かける。"
2002105-54 = "（「すんごい消毒薬」を見つけるのは、なかなか大変だった……)"
