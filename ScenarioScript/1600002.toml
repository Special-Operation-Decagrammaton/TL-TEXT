[translation]
1600002-1 = "Destinatário errado"
1600002-3 = "Ah, obrigada por vir. Na verdade, eu instalei uma bomba aqui, mas..."
1600002-4 = "Sinto que tem pouca... queria confirmar se essa quantidade está boa..."
1600002-5 = "……？"
1600002-6 = "[s] \"……？\""
1600002-7 = "……Sensei?"
1600002-8 = "[s] \"Ei, Haruka.\""
1600002-9 = "……？"
1600002-10 = "Se, se, se, se, Sensei!? Por que o Sensei está aqui...!?"
1600002-11 = "Eh, sim? Vo, vo, você me chamou? Eu, eu, eu chamei o Sensei!?"
1600002-12 = "Uma mensagem...?"
1600002-13 = "……。"
1600002-14 = "……。"
1600002-15 = "……!!! De, de, de, desculpe! Que, que, que falta de educação a minha...!"
1600002-16 = "Eu, isso, na verdade...! Eu não queria enviar para o Sensei...!"
1600002-17 = "Foi um erro...! Eu enviei para o Sensei por engano...! O, o que eu faço...!"
1600002-18 = "Por minha causa, por causa de alguém como eu, o Sensei veio até aqui...!"
1600002-19 = "Desculpe... de, de verdade, me desculpe..."
1600002-20 = "Desculpe desculpe desculpe desculpe desculpe desculpe desculpe..."
1600002-21 = "……？"
1600002-22 = "Eh, vo, você está bem...? E o que eu estava fazendo, você pergunta...?"
1600002-23 = "Is, isso é, bem..."
1600002-24 = "……。"
1600002-25 = "U, uma bomba..."
1600002-26 = "Eu estava instalando uma bomba..."
1600002-27 = "[s] \"……Uma bomba?\""
1600002-28 = "Sim, bem... é um pedido para a Loja de Conveniência... parece que tem alguém que precisa se atrasar amanhã, custe o que custar..."
1600002-29 = "Essa pessoa vai passar por aqui, então se eu explodir quando ela passar..."
1600002-30 = "Então... ela vai se atrasar... para sempre..."
1600002-31 = "……Eh? Ah, não, ninguém me deu ordens específicas para instalar uma bomba..."
1600002-32 = "Is, isso foi só... eu que fiz por conta própria..."
1600002-33 = "E, então eu fiquei preocupada se tinha feito direito...! Mandei a mensagem para pedir uma confirmação, mas acabei enviando para o Sensei por engano..."
1600002-34 = "Desculpe por ter te chamado até aqui, de verdade, me desculpe..."
1600002-35 = "……Eh, está tudo bem com isso?"
1600002-36 = "Ah, você quer dizer que não tem problema eu ter entrado em contato...? Sim, desculpe..."
1600002-37 = "……Eh, vamos recolher todas as bombas...?"
1600002-38 = "Si, sim, claro...! Se o Sensei diz isso..."
1600002-40 = "(Depois disso, ao recolher as bombas que Haruka instalou, o número chegou a dois dígitos)"
1600002-42 = "Terminei... bem, será que eu fiz algo desnecessário...?"
1600002-43 = "……Eh, outros lugares onde instalei? Si, sim, para garantir que sumissem, eu coloquei em vários lugares..."
1600002-44 = "Não precisava ter sumido...? E onde estão as bombas restantes, você pergunta...?"
1600002-45 = "Bem... no subsolo do prédio e... na academia... e também no parque..."
1600002-46 = "Si, sim? Vamos desarmar todas...? Sim, entendi..."
1600002-47 = "Eh, ehhh!? Não, não! Eu dou conta sozinha! Não posso fazer o Sensei perder tempo comigo...!"
1600002-48 = "[s1] \"Porque eu quero ir com a Haruka.\"\n[s2] \"Você não quer ir comigo?\""
1600002-49 = "……!?"
1600002-50 = "Po, por que... comigo..."
1600002-51 = "Não, não! Eu nunca diria que não quero...!"
1600002-52 = "……Ma, mas, é verdade...? Você quer mesmo ir comigo... eh...?"
1600002-53 = "En, entendi... se o Sensei insiste..."
1600002-54 = "E-então, vamos partir..."
1600002-56 = "……Aqui…… atrás do pilar…… sim, está ok……"
1600002-57 = "[s] \"Bom trabalho.\""
1600002-58 = "B-bom trabalho... que palavras tão generosas... não mereço tanto..."
1600002-59 = "……Uuu, muito obrigada."
1600002-62 = "（Haruka continua andando a passos rápidos, como se estivesse fugindo）"
1600002-64 = "Aqui também……"
1600002-65 = "……É um pouco desperdício…… se eu explodisse aqui, teria sumido tão perfeitamente……"
1600002-66 = "Ah, n-não é nada. Foi só um pensamento em voz alta……"
1600002-67 = "[s] \"Ainda tem mais, vamos lá.\""
1600002-68 = "S-sim……"
1600002-70 = "Com isso…… tudo…… foi removido……"
1600002-71 = "……P-Sensei, hum…… por acaso eu…… fiz algo que tenha te incomodado……?"
1600002-72 = "Por minha causa…… te causando problemas a essa hora…… e ainda me acompanhando……"
1600002-73 = "D-desculpe…… eu sempre…… só causo problemas……"
1600002-74 = "Eu pensei que, fazendo isso, todos ficariam felizes……"
1600002-75 = "[s3] \"Não, foi interessante.\"\n[s4] \"Foi divertido fazer um passeio noturno incomum.\""
1600002-76 = "……Eh, n-não diga isso……"
1600002-77 = "……Eh, n-não diga isso……"
1600002-78 = "P-por que dizer palavras tão gentis…… para alguém como eu……"
1600002-79 = "Eh…… para relaxar um pouco os ombros…… você diz……?"
1600002-80 = "Que não preciso ser tão formal……?"
1600002-81 = "I-isso……! Não é possível, e-eu……!"
1600002-82 = "N-não! De jeito nenhum! Eu não quis dizer que o que o Sensei diz está errado, é que, isso, aquilo, bem……!"
1600002-83 = "I-isso é, então, não…… não é isso……!"
1600002-84 = "É a primeira vez que alguém me diz algo assim……!"
1600002-85 = "……"
1600002-86 = "……Ehehe……"
1600002-87 = "Muito obrigada…… Sensei, você é…… uma pessoa realmente boa……"
1600002-88 = "Conversar comigo assim…… me acompanhar, e até me dar conselhos……"
1600002-89 = "……Muito obrigada…… de verdade……"
1600002-90 = "Sensei…… pelo Sensei, eu…… tudo……"
1600002-91 = "Tudo……"
1600002-93 = "Pelo Sensei…… sinto que consigo eliminar todos aqueles que são um estorvo……"
1600002-94 = "[s] \"……！？\""
1600002-95 = "Hehe…… fufu, fufufu……"
1600002-97 = "（Haruka continua se curvando em 90 graus várias vezes para pedir desculpas e agradecer, antes de ir embora com um jeito de rir um tanto estranho）"
