[translation]
10011090-1 = "Episódio 9; A Regra de Ouro da Garota Ninja"
10011090-7 = "O que é isso? Está tudo uma bagunça!"
10011090-8 = "Como o plano do Sensei Sorridente deu errado...!"
10011090-14 = "Nyahaha! Estão todos se esforçando?"
10011090-15 = "A perseguição está ficando cada vez mais intensa..."
10011090-16 = "E está chegando ao clímax! Vamos ver o que vai acontecer!"
10011090-21 = "Droga, o Departamento Yin-Yang...!"
10011090-22 = "Tsc, pensar que poderíamos forçá-los a aceitar nossas exigências causando confusão na reunião foi um erro!"
10011090-23 = "Já que chegamos a esse ponto, vou pessoalmente encher eles de bala!"
10011090-24 = "Vamos nessa, ataque total ao Departamento Yin-Yang!"
10011090-25 = "S-sério!?"
10011090-26 = "Entendido, é por isso que você é o líder!"
10011090-31 = "Encontramos a Trupe Chimi!"
10011090-34 = "O quê, um tanque!?"
10011090-35 = "O-o que a gente faz!?"
10011090-39 = "...Vamos explodir a ponte em frente ao portão do castelo."
10011090-41 = "Oh, boa ideia! Assim eles não vão conseguir nos seguir!"
10011090-42 = "Vamos explodir tudo com estilo!"
10011090-49 = "Q-que explosão foi essa...!?"
10011090-50 = "Droga! A ponte não foi destruída!?"
10011090-51 = "Uau! Izuna, eu já vi isso em filmes! É um clássico de perseguições!"
10011090-55 = "[ns] \"Iroha, o que vamos fazer?\""
10011090-56 = "Eles destruíram a ponte para tentar nos despistar..."
10011090-57 = "...Que ingênuos."
10011090-58 = "Hã, o quê!? Por que você está tão calma!?"
10011090-59 = "Sensei, e todos os outros. Segurem-se firme."
10011090-60 = "[s] \"Não me diga que...\""
10011090-78 = "E daí que não tem chão?"
10011090-79 = "Não vamos desistir por causa de algo assim."
10011090-84 = "Do que você está falando!? Ei!?"
10011090-87 = "O que precisamos é de velocidade—"
10011090-88 = "Girem o canhão para trás, preparem-se para disparar."
10011090-89 = "Vamos saltar usando o impacto do disparo."
10011090-92 = "Será que isso vai dar certo mesmo!?"
10011090-95 = "Vai dar certo, eu vi em um filme."
10011090-96 = "Preparem-se...!"
10011090-102 = "NOOOOOOOOOOOOAAAHHHH!!?!?"
