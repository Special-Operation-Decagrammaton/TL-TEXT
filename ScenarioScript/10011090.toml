[translation]
10011090-1 = "第9話;[ruby=少女]忍者[/ruby]の鉄則"
10011090-7 = "何すかこれ、全部めちゃくちゃじゃないっすか！"
10011090-8 = "ニヤニヤ教授の作戦が、なぜ……！"
10011090-14 = "にゃははっ！みんな頑張ってますか～？"
10011090-15 = "ますます激しくなる追撃戦……"
10011090-16 = "それもそろそろ終盤です！さあ、どうなるんでしょう～！"
10011090-21 = "くそっ、陰陽部め……！"
10011090-22 = "ちっ、最初から「交流会を混乱させて要望を飲ませる」なんてのが甘かったか！"
10011090-23 = "こうなったら、直接行って銃弾をぶち込んでやる！"
10011090-24 = "行くぞ、陰陽部のところに突撃だ！"
10011090-25 = "ま、マジか！？"
10011090-26 = "なるほど、それでこそリーダーっす！"
10011090-31 = "魑魅一座、発見です！"
10011090-34 = "なっ、戦車だと！？"
10011090-35 = "ど、どうするんすか！？"
10011090-39 = "……城門の前にある橋を、爆弾で吹き飛ばす。"
10011090-41 = "お、ナイスアイディア！そうすれば追って来られないはず！"
10011090-42 = "派手に吹っ飛ばすっすよー！"
10011090-49 = "い、今の爆発は……！？"
10011090-50 = "やばっ！橋が吹き飛ばされてない！？"
10011090-51 = "おおおっ！イズナ、こういうのドラマで見たことあります！追撃戦の王道ですね！"
10011090-55 = "[ns] \"イロハ、どうしよっか？\""
10011090-56 = "橋を破壊して、追撃を振り切ろうと……。"
10011090-57 = "……甘いですね。"
10011090-58 = "え、何！？なんで余裕なの！？"
10011090-59 = "先生も、それ以外の皆さんも。しっかり捕まっててください。"
10011090-60 = "[s] \"まさか……。\""
10011090-78 = "足場が無いから何なんですか。"
10011090-79 = "これくらいで、諦めるわけないでしょう。"
10011090-84 = "何言ってんの！？ねぇ！？"
10011090-87 = "必要なのは、速度――"
10011090-88 = "砲身を後ろ側に回してください、発射準備を。"
10011090-89 = "発砲の衝撃で飛び越えます。"
10011090-92 = "それ本当に行けるかなぁ！？"
10011090-95 = "大丈夫です、映画で見ましたから。"
10011090-96 = "気合入れてください……！"
10011090-102 = "のああああああぁぁぁぁぁっ！！？！？"
