[translation]
10034120-1 = "6日前：王道の解決策"
10034120-3 = "……辛い。"
10034120-4 = "練習より、理論を勉強する方が遥かに辛い……。"
10034120-5 = "同感、しんどいねこれ……"
10034120-9 = "まあまあ……。"
10034120-10 = "でもほら、練習してても直らない部分だって、理論が分かればすんなり行くかもよ？"
10034120-11 = "だからまずは、教本に沿って基礎練をしてみよう！"
10034120-12 = "時には先人の道に従うこともまた近道……ってね。"
10034120-13 = "そりゃそうなんだけどさぁ……。"
10034120-14 = "まさか、ここに来て本を読まないといけないなんて……。"
10034120-19 = "な～に？その自信無さげな顔は？"
10034120-20 = "……先に不満の声を上げたのはそっちでしょ？"
10034120-21 = "うるさいわねっ！！"
10034120-22 = "ほら、さっさと始めるわよ！！"
