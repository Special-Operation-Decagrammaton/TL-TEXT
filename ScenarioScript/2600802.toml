[translation]
2600802-1 = "Eu consegui, eu tive sucesso!"
2600802-2 = "（Conforme prometido com Shizuko, cheguei à casa de praia）"
2600802-3 = "Ah!"
2600802-4 = "Poxa, você está atrasado, Sensei!"
2600802-5 = "[s] \"Desculpe, desculpe. A Shizuko está sempre cheia de energia, né.\""
2600802-6 = "É claro que sim!"
2600802-7 = "Como proprietária da Hyakkiyako e ídolo, nunca posso esquecer de manter uma postura alegre e positiva!"
2600802-8 = "[s] \"Entendo. Mas, por que me chamou hoje?\""
2600802-9 = "V-você está calmo demais...!"
2600802-10 = "Estamos no mar, e é verão, afinal!"
2600802-11 = "A casa de praia também, é como se estivéssemos surfando em uma onda gigante!"
2600802-12 = "Vamos aumentar essa empolgação!"
2600802-13 = "[s1] \"T-tá bom!!\"\n[s2] \"Não entendi muito bem, mas combinado!\""
2600802-16 = "D-dá para notar que você está entrando na onda só por educação..."
2600802-17 = "De qualquer forma, vamos prosseguir com o assunto."
2600802-18 = "Mas, se você ouvir o que tenho a dizer agora..."
2600802-19 = "Garanto que o Sensei vai ficar fascinado e não vai conseguir tirar os olhos de mim!"
2600802-24 = "Dê uma olhada. Esta franquia da Hyakkiyako,"
2600802-25 = "a \"Casa de Praia\"!"
2600802-27 = "Não é por nada não, mas esta Shizuko aqui..."
2600802-28 = "Conseguiu transformar tudo em franquia através de parcerias com vários resorts..."
2600802-29 = "E completei quase tudo!"
2600802-31 = "E com vários produtos, além de serviços desenvolvidos exclusivamente em cada resort..."
2600802-32 = "É como uma loja matriz, onde tudo foi refinado!"
2600802-33 = "Estabeleci um sistema para gerenciar cada filial tão bem quanto a matriz!"
2600802-35 = "Também vendemos produtos que aproveitam as características de cada filial!"
2600802-36 = "E ao tornar os itens importantes disponíveis em todas as lojas!"
2600802-37 = "No geral, geramos o maior lucro da história!"
2600802-39 = "Os números concretos são segredo comercial, mas..."
2600802-40 = "As vendas da Hyakkiyako dispararam como nunca antes!"
2600802-41 = "Aproveitando esta oportunidade, não apenas neste mar e arquipélago..."
2600802-42 = "Pretendo fazer o nome da Hyakkiyako ecoar por todo o Kivotos!"
2600802-43 = "Sim, essa expansão não vai parar por aqui!!"
2600802-44 = "[s3] \"Nossa... Shizuko, você parece muito animada.\"\n[s4] \"Como esperado da Shizuko, você é incrível mesmo.\""
2600802-47 = "Droga, minha empolgação não está passando..."
2600802-48 = "Por que o Sensei é tão estranhamente calmo nessas horas...!"
2600802-49 = "Ah, você já visitou várias filiais?"
2600802-50 = "E-entendo. E então, o que achou?"
2600802-51 = "O serviço da nova Hyakkiyako de verão!"
2600802-52 = "[s] \"Foi bom, mas talvez seja uma pena não ter mais aquele serviço clássico da Hyakkiyako.\""
2600802-53 = "I-isso significa..."
2600802-54 = "Você está se referindo àquele serviço desastrado?"
2600802-55 = "B-bem, se olhar apenas para o resultado, não era muito eficiente..."
2600802-56 = "É uma questão de prioridades, sabe..."
2600802-57 = "Ou talvez, eu não tenha pensado tão longe..."
2600802-58 = "É que, especialmente..."
2600802-59 = "Por questões realistas de carga de trabalho..."
2600802-60 = "Então... bem, eu também sentia falta, mas..."
2600802-61 = "[s] \"Shizuko, você tem descansado ultimamente?\""
2600802-62 = "I-isso é...!?"
2600802-63 = "E-eu fiz algo estranho agora!?"
2600802-64 = "[s5] \"É que a Shizuko, que sempre diverte os clientes, parecia tão feliz e fofa.\" \n[s6] \"Bem, acho que algumas mudanças são inevitáveis, mas...\""
2600802-67 = "Ah, bem..."
2600802-68 = "Isso é, tipo..."
2600802-69 = "(O rosto de Shizuko vai ficando vermelho rapidamente)"
2600802-70 = "E-eu acabei de me lembrar de um compromisso!"
2600802-71 = "Tenho uma reunião inteligente, luxuosa e elegante para participar agora!"
2600802-72 = "E-então, até amanhã!"
2600802-77 = "(Shizuko saiu correndo)"
2600802-78 = "(Apesar de ter ficado curioso com várias coisas, decidi voltar para o resort por enquanto)"
