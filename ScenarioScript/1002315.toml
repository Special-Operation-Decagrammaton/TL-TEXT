[translation]
1002315-1 = "夕暮れの海辺"
1002315-2 = "夕暮れの浜辺"
1002315-4 = "いい加減諦めろ！"
1002315-5 = "いま降参すれば見逃してやる。"
1002315-9 = "ううっ……！ふ、ふざけんな！"
1002315-10 = "多国籍料理専門の海の家って聞いてたのに、#nワサビ入りのかき氷が出てくるってどういうことだよ！！"
1002315-11 = "いや、百歩譲ってそれはいいとして！#n焼きそばにイチゴジャムってなんだよ！？いくらなんでもひどくないか！？"
1002315-12 = "こんなの有り得ねえ！あんな店……許せねえよ！"
1002315-14 = "そ、創作料理には挑戦が大事ですから……！"
1002315-15 = "[s] \"それは流石に同情する……。\""
1002315-16 = "同情してる場合じゃない！#nそれに、風紀委員としては見逃すわけにいかないんだよ。"
1002315-17 = "指揮をお願い、先生！さっさと片付けるぞ！"
1002315-18 = "[s] \"まあ仕方ないか……！\""
1002315-21 = "くっ！このまま倒れるわけには……！"
1002315-28 = "うう……痛いよぉ！"
1002315-33 = "や、やられっぱなしでいられるか！"
1002315-38 = "[ns] \"手榴弾……！\""
1002315-39 = "フン、こんなもの！"
1002315-46 = "[ns1] \"海にはじき返した……！\"\n[ns2] \"ナイス、イオリ！\""
1002315-53 = "[ns] \"あ……。\""
1002315-56 = "（大量の海水を被り、びしょ濡れになってしまった……）"
1002315-59 = "ふう、だいたい片付いたか。"
1002315-60 = "先生、良い指揮だっ……"
1002315-61 = "なっ、何でそんなびしょ濡れなんだ？"
1002315-62 = "[s3] \"さっきの手榴弾が海に落ちて……\"\n[s4] \"水を被っちゃったんだ……。\""
1002315-65 = "あ……。"
1002315-66 = "そ、そうだった。私が海に吹き飛ばしたから……。"
1002315-67 = "大丈夫か？怪我は？"
1002315-68 = "[s] \"あ、うん……濡れただけだよ。大丈夫。\""
1002315-69 = "それならいいけど……。"
1002315-70 = "うーん、でも夏とはいえ夜は冷えるし……"
1002315-71 = "そのままだと風邪引くかも……。"
1002315-72 = "……先生、着替えは持ってる？"
1002315-73 = "[s] \"ホテルになら……。\""
1002315-78 = "そうだ、あれを……。"
1002315-83 = "[ns] \"これは……\""
1002315-85 = "[ns] \"イオリが使っていたブランケット？\""
1002315-86 = "し、仕方ないだろ、今は着替え持ってきてないし。"
1002315-87 = "風邪を引かれても困るから……。"
1002315-88 = "ホテルに戻るまで使ってくれ。"
1002315-89 = "[s] \"あったかい……。\""
1002315-90 = "それ、結構大事にしてるやつだから……#n扱いには注意してよ！？"
1002315-91 = "[s] \"これも風紀委員会の備品？\""
1002315-92 = "備品というか……風紀委員会に入って初めての合宿でもらったんだ。"
1002315-93 = "手触りもいいし、あったかくて気に入ってる。"
1002315-94 = "嫌なことがあった時も、それを触ってるとちょっと落ち着くというか……。"
1002315-95 = "[s] \"イオリの「安心毛布」的なもの？\""
1002315-96 = "そ、そんな大層なものじゃないけど……。"
1002315-97 = "[s] \"大切な毛布を貸してくれてありがとう。\""
1002315-98 = "……。"
1002315-99 = "新品ってほどきれいじゃないけど……。"
1002315-100 = "[s] \"普段はどういう時に使ってるの？\""
1002315-101 = "いつもはひざ掛けにしたり……ベンチに敷いたり……"
1002315-102 = "教室で仮眠を取る時の布団代わりにもしてるかな……。"
1002315-105 = "[ns] \"たしかに、そこはかとなくイオリの匂いがするかも……。\""
1002315-106 = "は、はぁっ！？何言ってるんだ！？#nちゃんと洗ってるぞ！？"
1002315-107 = "変なこと言うなバカ！！！"
1002315-108 = "[ns5] \"（ブランケットのにおいを嗅ぐ）\"\n[ns6] \"（鼻をうずめて息をする）\""
1002315-111 = "へ、ヘンタイ！！！"
1002315-112 = "[s] \"イオリのにおい！！！\""
1002315-113 = "もう、返せっ！！！このヘンタイ！死ね！！！"
1002315-115 = "（結局ブランケットを没収されて、風邪を引いた……）"
