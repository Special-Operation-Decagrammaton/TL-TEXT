[translation]
1002315-1 = "Beira-mar ao entardecer"
1002315-2 = "Praia ao entardecer"
1002315-4 = "Desista logo!"
1002315-5 = "Se se render agora, eu deixo passar."
1002315-9 = "Argh...! N-não me faça rir!"
1002315-10 = "Disseram que era uma casa de praia especializada em culinária multinacional, mas o que significa servirem raspadinha com wasabi?!"
1002315-11 = "Não, mesmo que eu deixasse isso passar! O que é esse yakisoba com geleia de morango!? Isso não é horrível demais?!"
1002315-12 = "Isso é inaceitável! Aquele restaurante... eu não posso perdoar!"
1002315-14 = "B-bem, a criatividade é importante na culinária experimental...!"
1002315-15 = "[s] \"Isso é de dar pena, sinceramente...\""
1002315-16 = "Não é hora de ter pena! Além disso, como membro do Comitê Disciplinar, não posso ignorar isso."
1002315-17 = "Assuma o comando, Sensei! Vamos acabar logo com isso!"
1002315-18 = "[s] \"Bem, não tem jeito...!\""
1002315-21 = "Droga! Não posso cair aqui...!"
1002315-28 = "Ai... que dor!"
1002315-33 = "V-vocês acham que eu vou ficar aqui apanhando?!"
1002315-38 = "[ns] \"Uma granada...!\""
1002315-39 = "Humph, isso não é nada!"
1002315-46 = "[ns1] \"Ela rebateu para o mar...!\"\n[ns2] \"Boa, Iori!\""
1002315-53 = "[ns] \"Ah...\""
1002315-56 = "(Fui atingido por uma grande quantidade de água do mar e estou encharcado...)"
1002315-59 = "Ufa, acho que terminamos por aqui."
1002315-60 = "Sensei, bom comando..."
1002315-61 = "Ei, por que você está tão encharcado?"
1002315-62 = "[s3] \"Aquela granada caiu no mar...\"\n[s4] \"E eu acabei levando um banho de água...\""
1002315-65 = "Ah..."
1002315-66 = "É-é verdade. Fui eu que joguei para o mar..."
1002315-67 = "Você está bem? Se machucou?"
1002315-68 = "[s] \"Ah, sim... só me molhei. Estou bem.\""
1002315-69 = "Se é assim, tudo bem..."
1002315-70 = "Hum, mas mesmo sendo verão, a noite esfria..."
1002315-71 = "Você pode acabar pegando um resfriado se ficar assim..."
1002315-72 = "...Sensei, você tem roupas para trocar?"
1002315-73 = "[s] \"No hotel, sim...\""
1002315-78 = "Isso, vou usar aquilo..."
1002315-83 = "[ns] \"Isso é...\""
1002315-85 = "[ns] \"O cobertor que a Iori estava usando?\""
1002315-86 = "N-não tem jeito, né? Você não trouxe roupas extras."
1002315-87 = "Eu não quero que você fique resfriado..."
1002315-88 = "Use isso até voltarmos para o hotel."
1002315-89 = "[s] \"Está quentinho...\""
1002315-90 = "Ei, eu cuido muito bem disso, então... trate com cuidado, entendeu?!"
1002315-91 = "[s] \"Isso também é equipamento do Comitê Disciplinar?\""
1002315-92 = "Equipamento? Bem... eu ganhei no meu primeiro acampamento depois que entrei para o Comitê Disciplinar."
1002315-93 = "É macio, quentinho e eu gosto muito dele."
1002315-94 = "Quando algo ruim acontece, tocar nele me faz sentir um pouco mais calma..."
1002315-95 = "[s] \"Tipo um 'cobertor de segurança' da Iori?\""
1002315-96 = "N-não é nada tão importante assim, mas..."
1002315-97 = "[s] \"Obrigado por me emprestar seu cobertor especial.\""
1002315-98 = "..."
1002315-99 = "Não está exatamente novo, mas..."
1002315-100 = "[s] \"Como você costuma usar isso?\""
1002315-101 = "Eu geralmente uso como cobertor para os joelhos... ou coloco em cima de bancos..."
1002315-102 = "E acho que também uso como um cobertor improvisado quando tiro uma soneca na sala de aula..."
1002315-105 = "[ns] \"É verdade, acho que tem um leve cheiro da Iori...\""
1002315-106 = "H-hã!? O que você está dizendo!? #nEu lavo isso, sabia!?"
1002315-107 = "Não diga coisas estranhas, seu idiota!!!"
1002315-108 = "[ns5] \"(Cheira o cobertor)\"\n[ns6] \"(Enterra o rosto nele e respira fundo)\""
1002315-111 = "P-pervertido!!!"
1002315-112 = "[s] \"O cheiro da Iori!!!\""
1002315-113 = "Já chega, devolve isso!!! Seu pervertido! Morra!!!"
1002315-115 = "(No fim, o cobertor foi confiscado e eu acabei pegando um resfriado...)"
