[translation]
1004503-1 = "産地直送の新鮮な食材"
1004503-2 = "（海辺に向かった）"
1004503-7 = "先生、ここだよ～"
1004503-8 = "[s] \"どうしたの？\""
1004503-13 = "お願いした通り一人で来てくれてありがとね、先生。"
1004503-14 = "万が一にでも、セリカちゃんやアヤネちゃんに知られたらダメなんだ……。"
1004503-15 = "まぁ、"
1004503-16 = "あまり大したことじゃないんだけど……"
1004503-17 = "ちょっとそこで休んでたら、二人が来てさ……"
1004503-21 = "まあとにかく、私が海の幸を取りに行かないといけないってことになっちゃって……"
1004503-22 = "あはは……先生にも手伝ってもらえたらな～って"
1004503-23 = "えへへ……ダメ？"
1004503-24 = "他の子に内緒にしてねってお願いしたのも、そういう事なんだけど……"
1004503-25 = "みんなにバレたら怒られちゃうからね……。"
1004503-31 = "先生もここまで来たからには、おじさんを置いて帰るなんてことしないよね？"
1004503-32 = "困ってる生徒を助けてくれるよね？……ね？"
1004503-33 = "[s1] \"困ってる生徒は放っておけないし……。\"\n[s2] \"私もご飯代くらいはお手伝いしようかな。\""
1004503-34 = "うへへ、さっすが先生～！"
1004503-35 = "うへへ、さっすが先生～！"
1004503-36 = "おじさんも一緒にやるからには、頑張るぞ～。"
1004503-37 = "それじゃあよろしくね、先生。"
1004503-40 = "（その後、ホシノと一緒に海で食べ物を採取した）"
1004503-46 = "わぁ……すごい……。"
1004503-47 = "人が全然いないからか、大漁だ～。"
1004503-52 = "先生、見て見て！大きいアワビ！こんなサイズになるんだねぇ～。"
1004503-53 = "うへ～、もうザルがいっぱいになっちゃった。"
1004503-54 = "海ってすごいなぁ……毎回新しい発見があるよ。"
1004503-55 = "[s3] \"いつもより元気だね。\"\n[s4] \"ホシノ、海は楽しい？\""
1004503-61 = "……そ、そうかな。"
1004503-62 = "……うへ。"
1004503-63 = "まぁ……先生の言う通りかもだねぇ～"
1004503-64 = "夏だし、海だし……"
1004503-65 = "だから、ちょっとおじさん浮かれちゃってるのかも。"
1004503-66 = "今限定のおじさんの姿、ちゃんと目に焼き付けておくんだよ？"
1004503-67 = "こんな風に浮かれてるおじさん、今だけだからね！"
1004503-68 = "なんちゃって……うへへ。"
1004503-69 = "こんな時だからこそ、普段できないような事もできちゃうってあるよね。"
1004503-75 = "先生と一緒にこうやって海の幸をとったり、お昼寝したり……"
1004503-76 = "アビドスに戻ったらできないからね～"
1004503-77 = "……うへ、ちょっと恥ずかしくなってきたな。"
1004503-78 = "これが夏の魔物ってやつ？無人島の魔力？"
1004503-79 = "うへ～……みんなには言わないでよ？"
1004503-80 = "……約束だからね？"
1004503-81 = "[s5] \"もちろん。\"\n[s6] \"なんたって「共犯者」だからね。\""
1004503-87 = "……えへへ。ありがと、先生。"
