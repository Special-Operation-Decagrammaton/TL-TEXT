[translation]
1004503-1 = "Ingredientes frescos direto da fonte"
1004503-2 = "（Indo em direção à praia）"
1004503-7 = "Sensei, é por aqui~"
1004503-8 = "[s] \"O que houve?\""
1004503-13 = "Obrigada por vir sozinho como eu pedi, Sensei."
1004503-14 = "Não podemos deixar que a Serika ou a Ayane descubram isso de jeito nenhum..."
1004503-15 = "Bem,"
1004503-16 = "Não é nada demais, mas..."
1004503-17 = "Eu estava descansando ali, e as duas apareceram..."
1004503-21 = "Enfim, acabou que eu precisei vir buscar frutos do mar..."
1004503-22 = "Ahaha... eu estava pensando se você poderia me ajudar, Sensei~"
1004503-23 = "Ehehe... não pode?"
1004503-24 = "Foi por isso que eu pedi para você não contar para as outras..."
1004503-25 = "Se elas descobrirem, vão acabar me dando uma bronca..."
1004503-31 = "Já que você veio até aqui, Sensei, não vai me deixar na mão e ir embora, vai?"
1004503-32 = "Você vai ajudar uma aluna em apuros, né? ...Né?"
1004503-33 = "[s1] \"Não posso deixar uma aluna em apuros...\"\n[s2] \"Acho que posso ajudar com o custo da comida.\""
1004503-34 = "Uhehe, esse é o meu Sensei~!"
1004503-35 = "Uhehe, esse é o meu Sensei~!"
1004503-36 = "Já que o tio aqui vai participar, vou dar o meu melhor."
1004503-37 = "Então conto com você, Sensei."
1004503-40 = "（Depois disso, colhi comida na praia junto com a Hoshino）"
1004503-46 = "Uau... incrível..."
1004503-47 = "Talvez seja porque não tem ninguém aqui, mas a pesca foi farta~"
1004503-52 = "Sensei, olha só! Um abalone enorme! Nem sabia que ficavam desse tamanho~"
1004503-53 = "Uhe~, a cesta já está cheia."
1004503-54 = "O mar é incrível... sempre tem uma descoberta nova."
1004503-55 = "[s3] \"Você está mais animada que o normal.\"\n[s4] \"Hoshino, o mar é divertido?\""
1004503-61 = "......S-será?"
1004503-62 = "......Uhehe."
1004503-63 = "Bem... talvez você tenha razão, Sensei~"
1004503-64 = "É verão, estamos na praia..."
1004503-65 = "Por isso, talvez o tio aqui esteja um pouco empolgado demais."
1004503-66 = "É bom você gravar bem essa versão do tio, viu?"
1004503-67 = "Um tio tão empolgado assim, só agora!"
1004503-68 = "Brincadeirinha... uhehe."
1004503-69 = "É justamente em momentos assim que a gente acaba fazendo coisas que não faria normalmente."
1004503-75 = "Como colher frutos do mar com você, Sensei, ou tirar uma soneca..."
1004503-76 = "Não dá para fazer isso quando voltarmos para Abydos~"
1004503-77 = "......Uhehe, estou começando a ficar com vergonha."
1004503-78 = "Será que isso é a magia do verão? O poder de uma ilha deserta?"
1004503-79 = "Uhe~... não conta para ninguém, tá?"
1004503-80 = "......É uma promessa, hein?"
1004503-81 = "[s5] \"Com certeza.\"\n[s6] \"Afinal, somos 'cúmplices'.\""
1004503-87 = "......Ehehe. Obrigada, Sensei."
