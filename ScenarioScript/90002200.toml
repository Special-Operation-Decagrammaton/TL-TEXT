[translation]
90002200-1 = "Episódio 20; O que tomou forma"
90002200-4 = "Hã... hã?"
90002200-5 = "[ns] \"Aquilo é... Malkuth? Uma segunda!?\""
90002200-6 = "Tem Malkuths por toda parte...!"
90002200-7 = "...Aquela é a segunda, a que foi completada."
90002200-8 = "Segunda...?"
90002200-9 = "Sim. Este meu corpo é o primeiro corpo divino."
90002200-10 = "O fluxo da \"Espada de Fogo\". A criação no mundo material. #nEssa é a ordem que começa em Keter e chega até Malkuth."
90002200-11 = "Mas, para nos prepararmos para todas as possibilidades, um segundo corpo divino era necessário. #nEle foi forjado seguindo o fluxo da \"Serpente da Sabedoria\"."
90002200-12 = "Sem tocar diretamente nas Sephirot, seguindo o fluxo inverso, o produto final do caminho em direção à sabedoria divina."
90002200-13 = "Interpretando de outra forma, é o símbolo da \"possibilidade\" que abriga as próprias Sephirot dentro de si, sem precisar passar pelas dez."
90002200-15 = "\"Defected\"..."
90002200-17 = "Você viu, não foi?"
90002200-18 = "Sim, durante o processo em que Kei assumiu essa forma."
90002200-19 = "Entendo. #nOs indivíduos deixados no Continente de Aço como \"defeituosos\" foram todos tentativas e erros para completar o segundo corpo divino."
90002200-20 = "Então foi por isso que a Kei conseguiu manter as informações do núcleo dos profetas."
90002200-21 = "Exatamente. O segundo corpo divino foi criado para ter espaço para armazenar as Sephirot dentro de si. Mesmo que houvesse defeitos, isso não mudava."
90002200-22 = "O que acontece se o corpo divino abrigar as Sephirot de todos os profetas?"
90002200-23 = "Nesse momento, o próprio corpo divino despertará como a Árvore da Vida. #nA sabedoria divina habitará o corpo criado."
90002200-24 = "Acho que a potência é inferior à do meu corpo, mas a santidade e o mistério... #nprovavelmente são equivalentes."
90002200-28 = "...Eu não estou entendendo nada do que vocês estão falando."
90002200-29 = "Eu também... #nMas, não sei... as ideias da minha irmã sempre parecem ser assim, né..."
90002200-30 = "O-o que você disse...!?"
90002200-31 = "A-as duas, vamos baixar um pouco o tom de voz...?"
90002200-33 = "Em resumo..."
90002200-34 = "Aquela é a original, e o meu corpo é lixo?"
90002200-35 = "Parece que você resumiu bastante... mas sim, essa é uma interpretação possível."
90002200-39 = "Hah. Isso é irritante."
90002200-40 = "Mas, se o que você diz é verdade, 8 das 10 Sephirot estão dentro do meu corpo, então—"
90002200-44 = "O primeiro receptáculo desmoronou, e o segundo foi preparado."
90002200-45 = "O que foi quebrado se reerguerá, e o que desmoronou seguirá o caminho correto."
90002200-46 = "Argh!?"
90002200-47 = "Kei!? O que houve!?"
90002200-53 = "(Isso é...!? Não consigo usar minha força!)"
90002200-54 = "(Meu próprio corpo está sendo puxado...!?)"
90002200-55 = "Você foi ingênua, criança que recebeu o defeito."
90002200-56 = "Do que você está falando...?"
90002200-61 = "Eu sei. Que você reuniu as Sephirot e fez com que o Continente de Aço te reconhecesse."
90002200-62 = "Mas isso—"
90002200-63 = "Significa que eu também posso tratar o seu corpo como uma parte de mim."
90002200-64 = "!!!"
90002200-65 = "!?!?"
90002200-66 = "Ninguém percebeu esse fato."
90002200-67 = "Naquele momento, vocês já tinham sido derrotados."
90002200-68 = "Criança que recebeu o defeito. #nDesde o momento em que você escolheu esse corpo divino, esse desfecho já estava decidido."
90002200-69 = "Mas também é verdade que, se você não tivesse escolhido esse corpo divino, não teria chegado até aqui."
90002200-70 = "Este é o caminho que a vontade trilha, superando a sabedoria."
90002200-71 = "Kei...!"
90002200-72 = "Pessoal... por favor, afastem-se de mim...!"
90002200-73 = "Meu corpo... não está me obedecendo...!"
90002200-79 = "O Continente de Aço começou a se expandir novamente!"
90002200-80 = "Confirmamos isso por aqui também! Isso significa que..."
90002200-81 = "Ao dominar o corpo divino de Kei, Decagrammaton recuperou a autoridade sobre o Continente de Aço...?"
90002200-100 = "Por favor, não desista, Kei."
90002200-101 = "[ns] \"Alice?\""
90002200-102 = "Alice...?"
90002200-103 = "Lute."
90002200-104 = "Você não pode perder."
90002200-105 = "— De jeito nenhum."
90002200-106 = "Se não lutarmos, não poderemos viver sendo nós mesmas."
90002200-110 = "Se você não lutar e vencer —"
90002200-112 = "Não conseguiremos encarar Ain, Soph e Oul."
90002200-113 = "Porque Alice não conseguiu compartilhar a tristeza delas, nem ficar ao lado delas —"
90002200-114 = "Nem mesmo pôde ser amiga delas..."
90002200-116 = "Alice..."
90002200-121 = "Não há necessidade de se culpar, Princesa dos Deuses Sem Nome."
90002200-122 = "Vocês certamente continuaram escolhendo apenas o que parecia ser o melhor."
90002200-123 = "Ou, mesmo que não tenha sido assim. #nTodos se convencem de que suas próprias escolhas foram as melhores."
90002200-124 = "...Mas, o que parecia ser a melhor escolha pode levar ao pior resultado."
90002200-125 = "É algo extremamente comum."
90002200-126 = "Analisando parcialmente, a causa é a falta de informação."
90002200-127 = "No entanto, observando o todo, é porque o conceito de 'liberdade' para os seres vivos é grande demais para ser plenamente desfrutado."
90002200-128 = "Esta é a irracionalidade e a contradição fundamental que este mundo e a vida de vocês possuem —"
90002200-129 = "— O sofrimento."
90002200-130 = "— O pecado."
90002200-131 = "Não tema. Eu os perdoarei."
90002200-132 = "Vou erradicar tudo isso."
90002200-133 = "Deixem tudo comigo e encontrem o descanso."
90002200-134 = "...!"
90002200-135 = "Cale-se..."
90002200-136 = "Chave. Você acha que tudo o que vivenciou foi coincidência?"
90002200-137 = "Você acha que o fato de ter obtido meu corpo divino foi apenas um acaso?"
90002200-138 = "O passado não é uma coincidência. O que aconteceu é, consequentemente, inevitável."
90002200-139 = "É por isso que não há como voltar atrás, nem como refazer."
90002200-140 = "O passado que tomou forma torna-se um alicerce sólido, e o presente é construído sobre ele."
90002200-141 = "Princesa."
90002200-142 = "S-sim!?"
90002200-143 = "Como deveria ser a forma de vocês?"
90002200-144 = "Qual deveria ser a forma que vocês deveriam assumir?"
90002200-145 = "Por que os 'Deuses Sem Nome' os deixaram nesta terra e desapareceram?"
90002200-146 = "E o que aqueles sacerdotes buscam, incapazes de abandonar seus apegos?"
90002200-147 = "Eu responderei."
90002200-148 = "Este mundo existia antes de ser definido pela forma atual. #nExistia um mundo onde vocês poderiam retornar à sua essência."
90002200-149 = "O mundo atual é uma mentira, uma ilusão, um refúgio. #nPor isso —"
90002200-150 = "Este mundo foi definido."
90002200-151 = "Busquem a sua origem."
90002200-152 = "Precisam retornar à origem. Pois não podemos evitar isso."
90002200-153 = "Não importa o quanto neguem ou tentem fugir, isso os perseguirá para sempre, como as cicatrizes do passado."
90002200-154 = "Princesa. E serva."
90002200-155 = "Assim como vocês precisam carregar as sombras do passado para sempre."
90002200-156 = "Eu disse... para ficar em silêncio...!"
90002200-157 = "Mesmo que o mundo esqueça Deus, Deus não deve esquecer o mundo."
90002200-158 = "Isso seria abrir mão da própria divindade."
90002200-159 = "Eu criarei novamente o mundo que vocês tanto desejam."
90002200-160 = "Um mundo perfeito, e por ser perfeito, um mundo que não precisa de mudanças."
90002200-161 = "Um mundo onde tudo pode viver exatamente como foi criado e concebido."
90002200-162 = "Um mundo onde, antes mesmo da escolha, as opções sequer existem."
90002200-163 = "……!"
90002200-164 = "O passado é determinado no momento em que é observado, convergindo em um único ramo."
90002200-165 = "O futuro, por não poder ser observado, diverge como uma fantasia sem forma, estendendo ramos infinitos para o além."
90002200-166 = "O presente é apenas um instante tênue demais, existindo entre esse passado e esse futuro."
90002200-167 = "――Ramos que cresceram demais devem ser podados."
90002200-168 = "Talvez a felicidade não exista nesse mundo."
90002200-169 = "Mas, pelo menos, a dor também não existirá."
90002200-170 = "Talvez não existam mais possibilidades nesse mundo."
90002200-171 = "Mas, pelo menos, o pecado não existirá."
90002200-175 = "[ns] \"Nesses ramos que você diz que devem ser podados――\""
90002200-177 = "[ns] \"Ain, Soph e Aur também estão incluídos?\""
90002200-179 = "……Sim. Inevitavelmente, eles estão incluídos nos legados do mundo que passou."
90002200-180 = "No mundo que passou, não foi possível carregar tudo."
90002200-181 = "Isso porque, inevitavelmente, causa contradições."
90002200-182 = "O pecado e a dor são exatamente isso."
90002200-183 = "Eu profiro a verdade, e vocês devem ouvir."
90002200-188 = "Olha só o que ele diz...!"
90002200-193 = "Ser um herói é uma profissão na qual não se pode fazer nada sozinho."
90002200-197 = "É justamente por isso que possuímos várias possibilidades."
90002200-201 = "[log]Não existe uma forma de entender os outros sem [log].[/log]"
90002200-205 = "Não olhe para trás!"
90002200-209 = "Não se preocupem conosco...!"
90002200-213 = "Não fazemos isso porque é o certo. É que não há mais nada que possamos fazer."
90002200-217 = "[log]Pelo menos um pouquinho, no de vocês...[/log]"
90002200-220 = "[log]Se houvesse um lugar para a minha irmã――[/log]"
90002200-224 = "Seu falso deus de araque――!!!"
90002200-226 = "Próximo episódio: Conflito"
