[translation]
1002302-1 = "海でしてはいけないこと"
1002302-2 = "イオリに頼まれた通りに日焼け止めを買って、風紀委員会を訪れた。"
1002302-5 = "ゲヘナ・風紀委員会"
1002302-8 = "あ、先生。来てくれたんだ。"
1002302-9 = "[s] \"頼まれてた日焼け止め、買ってきたよ。\""
1002302-10 = "ああ、ありがとう。"
1002302-11 = "夏の合宿訓練が近かったから助かる。"
1002302-12 = "さて。じゃあ引き続き、合宿の書類を片付けないと……"
1002302-17 = "[ns] \"忙しそうだね。\""
1002302-18 = "まあ合宿ってことは、ヒナ委員長が一時的にゲヘナ学園からいなくなるってことだし。"
1002302-19 = "諸々整備をしておかないと、校則の穴を突いて予想外の奇行をやらかす生徒とかが出てくるから……。"
1002302-20 = "元々こういうのはヒナ委員長の仕事だけど、最近の委員長は問題児の対応だけでもかなり忙しそうで……。"
1002302-21 = "だから他の風紀委員たちとも相談して、委員長の仕事を手分けして手伝うことにしたんだ。"
1002302-22 = "[s] \"私にも何か手伝えることはある？\""
1002302-23 = "いや、そうは言ってもほとんど終わりかけだから大丈夫。"
1002302-24 = "強いて言えば……あとは、合宿中の規則をまとめることくらいかな。"
1002302-25 = "[s] \"合宿中の規則？\""
1002302-27 = "そう。いつもの校則をそのまま、合宿中も適用させるわけにはいかない。"
1002302-28 = "海辺では制服の代わりに水着姿が多くなるし、湿気に敏感な爆発物なんかを不用意に扱うとマズいことになるし……校内とは色々と環境が違うから。"
1002302-29 = "ただ、あらためて考えようとした時に、「海辺で生徒がやっちゃいけないこと」って何だろう……って悩んじゃって。"
1002302-30 = "そうだ、先生。もし良ければちょっと知恵を貸してくれない？"
1002302-31 = "「夏に海へ行った生徒に対して、禁止しないといけないこと」……何か思いつく？"
1002302-32 = "[s1] \"スリ。\"\n[s2] \"強盗。\""
1002302-33 = "ま、まあ確かに……"
1002302-34 = "ま、まあ確かに……"
1002302-35 = "……っていやいや、そうじゃなくて！それは普段からしちゃダメだろ！？"
1002302-36 = "そんなことをわざわざ校則に書いてたら、他の学園の生徒からどう見られると思う？"
1002302-37 = "何か、もうちょっとこう、海に行ったらついやっちゃいそうな非行の例を……"
1002302-38 = "[s3] \"砂浜に地雷を埋めること、とか？\"\n[s4] \"海の家を爆破すること、とか？\""
1002302-39 = "いや、まあ確かにダメだけどさ……？"
1002302-40 = "いや、まあ確かにダメだけどさ……？"
1002302-41 = "ああもう漫才やってるんじゃないんだから、真剣に考えて！"
1002302-44 = "……ああもう、全然ダメ。"
1002302-45 = "先生は色々と、根本的に発想がおかしくないか……？"
1002302-46 = "はあ……そもそも先生に期待してた私がバカだった。"
1002302-47 = "先生は救いようがないほどダメで情けなくてヘンタイの大人だってこと、忘れてた……。"
1002302-48 = "[s5] \"ひどい……。\"\n[s6] \"今の、もう一度言ってくれない？\""
1002302-50 = "嫌だ、気持ち悪い！"
1002302-53 = "（いや、逆に考えてみると……ヘンタイのことはヘンタイの方が一番詳しいはず？）"
1002302-54 = "（つまり、先生の思考を逆に利用すれば……）"
1002302-57 = "先生、もし海水浴場に行って「何をしても良いよ」って言われたら、まず何をする？"
1002302-58 = "[s] \"水着姿の生徒たちの写真を撮る。\""
1002302-59 = "気っ持ち悪い……やっぱりただのヘンタイじゃん……。"
1002302-60 = "……でもそういえば、前の夏季合宿では無断撮影が問題になってた気がするな。"
1002302-61 = "合宿用の規則に入れておくか……。"
1002302-62 = "……一応聞くけど、他にやってみたいこととかは？"
1002302-63 = "[s] \"イオリと一本のストローでジュースが飲みたい。\""
1002302-64 = "ばっ、バッカじゃないの！？そんな破廉恥なこと、風紀委員に許されるわけが……っ！"
1002302-65 = "……まあでも、もしそういうことをしてる生徒がいたら取り締まらないといけないな……。"
1002302-66 = "……取り合えず、続けて。"
1002302-68 = "その後、イオリに内なる欲望を正直に吐露した。"
1002302-71 = "よし、できた！うん、これくらいあれば十分だな。"
1002302-72 = "まさか、ここに書いてないほどとんでもないことをやらかす生徒は流石に出てこないはず……。"
1002302-73 = "助かったよ先生、ありがとう。"
1002302-74 = "[s7] \"大したことじゃないよ。\"\n[s8] \"海辺での悪事なら任せて。\""
1002302-77 = "まあ助かったのは本当だけど、"
1002302-78 = "先生が普段からこんなことばっかり考えてたなんて……。"
1002302-79 = "……気持ち悪い。今後は、私の半径5歩以内には近づかないで。"
1002302-81 = "イオリの誤解が深まった……。"
