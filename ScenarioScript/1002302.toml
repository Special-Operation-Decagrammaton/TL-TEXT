[translation]
1002302-1 = "O que não se deve fazer na praia"
1002302-2 = "Comprei o protetor solar que a Iori pediu e fui até o Comitê Disciplinar."
1002302-5 = "Gehenna - Comitê Disciplinar"
1002302-8 = "Ah, Sensei. Você veio."
1002302-9 = "[s] \"Comprei o protetor solar que você pediu.\""
1002302-10 = "Ah, obrigada."
1002302-11 = "O treinamento do acampamento de verão está próximo, então isso ajuda muito."
1002302-12 = "Bem, agora preciso continuar organizando os documentos do acampamento..."
1002302-17 = "[ns] \"Parece ocupada.\""
1002302-18 = "Bem, o acampamento significa que a Presidente Hina ficará temporariamente fora da Academia Gehenna."
1002302-19 = "Se eu não organizar tudo, algumas alunas podem encontrar brechas no regulamento escolar e acabar fazendo algo inesperado..."
1002302-20 = "Originalmente, esse é o trabalho da Presidente Hina, mas ultimamente ela tem estado muito ocupada apenas lidando com as alunas problemáticas..."
1002302-21 = "Por isso, conversei com as outras integrantes do comitê e decidimos dividir o trabalho da presidente."
1002302-22 = "[s] \"Tem algo em que eu possa ajudar?\""
1002302-23 = "Não, na verdade já estou quase terminando, então está tudo bem."
1002302-24 = "Se for para dizer algo... só falta definir as regras durante o acampamento."
1002302-25 = "[s] \"Regras durante o acampamento?\""
1002302-27 = "Isso. Não podemos aplicar as mesmas regras escolares de sempre durante o acampamento."
1002302-28 = "Na praia, as alunas usam mais trajes de banho em vez de uniformes, e manusear explosivos sensíveis à umidade de forma descuidada pode causar problemas... o ambiente é bem diferente da escola."
1002302-29 = "Mas, ao tentar pensar nisso, fiquei na dúvida sobre o que exatamente as alunas não deveriam fazer na praia..."
1002302-30 = "Ah, Sensei. Se não se importar, poderia me dar uma luz?"
1002302-31 = "\"O que devemos proibir as alunas de fazer ao irem à praia no verão?\"... Consegue pensar em algo?"
1002302-32 = "[s1] \"Roubo.\"\n[s2] \"Assalto.\""
1002302-33 = "B-bem, certamente..."
1002302-34 = "B-bem, certamente..."
1002302-35 = "...Não, não, não é isso! Isso já é proibido normalmente, não é!?"
1002302-36 = "Se eu escrevesse algo assim no regulamento, o que as alunas de outras academias pensariam de nós?"
1002302-37 = "Algo mais, sabe, um exemplo de má conduta que alguém poderia acabar cometendo na praia..."
1002302-38 = "[s3] \"Enterrar minas terrestres na areia?\"\n[s4] \"Explodir a casa de praia?\""
1002302-39 = "Não, bem, isso é proibido, mas..."
1002302-40 = "Não, bem, isso é proibido, mas..."
1002302-41 = "Ah, chega, não estamos fazendo comédia, pense seriamente!"
1002302-44 = "...Ah, chega, não dá."
1002302-45 = "Sensei, o seu modo de pensar não é fundamentalmente estranho...?"
1002302-46 = "Haa... Fui uma tola por esperar algo de você, Sensei."
1002302-47 = "Esqueci que você é um adulto irremediavelmente inútil, patético e um pervertido..."
1002302-48 = "[s5] \"Que cruel...\"\n[s6] \"Pode repetir o que disse agora?\""
1002302-50 = "Que nojo, não quero!"
1002302-53 = "(Não, pensando bem... um pervertido deve saber mais sobre perversões, certo?)"
1002302-54 = "(Ou seja, se eu usar o pensamento do Sensei ao contrário...)"
1002302-57 = "Sensei, se você fosse à praia e te dissessem \"pode fazer o que quiser\", o que você faria primeiro?"
1002302-58 = "[s] \"Tirar fotos das alunas de traje de banho.\""
1002302-59 = "Que nojo... você é só um pervertido mesmo..."
1002302-60 = "...Mas, pensando bem, acho que no acampamento de verão passado, fotos não autorizadas foram um problema."
1002302-61 = "Vou incluir isso nas regras do acampamento..."
1002302-62 = "...Vou perguntar só por perguntar, tem mais alguma coisa que você gostaria de fazer?"
1002302-63 = "[s] \"Quero beber suco com a Iori usando o mesmo canudo.\""
1002302-64 = "V-você é idiota!? Uma coisa tão indecente assim, o Comitê Disciplinar jamais permitiria...!"
1002302-65 = "...Bem, mas se houvesse alunas fazendo isso, eu teria que intervir..."
1002302-66 = "...De qualquer forma, continue."
1002302-68 = "Depois disso, confessei honestamente meus desejos internos para a Iori."
1002302-71 = "Certo, pronto! É, com isso aqui deve ser o suficiente."
1002302-72 = "Duvido muito que apareça uma aluna que faça algo tão absurdo que não esteja escrito aqui..."
1002302-73 = "Você me salvou, Sensei, obrigado."
1002302-74 = "[s7] \"Não foi nada.\"\n[s8] \"Se for sobre travessuras na praia, pode deixar comigo.\""
1002302-77 = "Bem, é verdade que você me ajudou, mas..."
1002302-78 = "Eu não acredito que o Sensei fica pensando nessas coisas o tempo todo..."
1002302-79 = "...Que nojo. De agora em diante, não chegue a menos de cinco passos de mim."
1002302-81 = "O mal-entendido da Iori só aumentou..."
