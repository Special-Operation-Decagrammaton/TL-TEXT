[translation]
206-1 = "O Mundo dos Signos"
206-5 = "……É a primeira vez que nos encontramos desta forma, não é? Meu nome é 'Golconde'."
206-6 = "Por alguns motivos, acabei tendo que cumprimentá-lo desta maneira, mas... peço que me perdoe pela falta de educação de saudá-lo de costas. Infelizmente, não tenho outra forma de me apresentar……."
206-7 = "É bem por aí!"
206-8 = "……Ah, sim. A propósito, este é 'Decalcomanie', que atua como meu corpo substituto."
206-9 = "Nós somos, por assim dizer, parceiros que simbolizam a 'imagem virtual' e a 'não existência' um do outro, somos signos."
206-10 = "É bem por aí!"
206-11 = "Como acontece com todos os signos, Decalcomanie e eu não podemos existir apenas por nós mesmos. A todo momento, um signo contém em si um 'texto' que é extraído através da interpretação."
206-12 = "Mas este não é um problema exclusivo nosso. Afinal, tudo o que existe é um signo. Essa é a forma como eu e Decalcomanie enxergamos o 'mundo'."
206-13 = "Poderíamos chamar de um inferno de signos e símbolos, ou talvez o Limbo dos existencialistas."
206-16 = "Por exemplo... o Kuroko, que tomou o seu próprio signo como seu nome."
206-21 = "E o Maestro, que manifestou seu próprio 'texto' como uma forma externa, também seria um bom exemplo."
206-22 = "O Maestro tem duas cabeças... ao observar detalhes como esse, parece ser possível até mesmo ler o desejo oculto de que seu 'texto' seja decifrado."
206-24 = "E o mesmo pode ser dito sobre esta cidade. Por que ela possui tais signos……."
206-25 = "……Ao observar esta vista noturna, acabo pensando nisso."
206-26 = "É bem por aí!"
206-27 = "E a existência que você encontrará a partir de agora é... por assim dizer, uma variante desse 'signo'."
206-28 = "Poderíamos chamar de paródia, homenagem... talvez, mas não é apenas isso."
206-29 = "Em outras palavras, trata-se de uma lenda urbana moderna, um conto de terror... ou o que é vulgarmente chamado de 'creepypasta', um caso extremamente raro onde uma história originalmente sem sentido alcançou por si mesma o estado de 'Sublime'."
206-30 = "Ou seja, um novo 'Sublime' que nasceu sem 'Mistério' ou 'Terror'. Um signo que possui um texto raro, que nasceu ao carregar um significado por puro acaso em meio a repetições infinitas……."
206-31 = "Este é um 'signo' extremamente interessante que, sem dúvida, merece ser interpretado."
206-32 = "E eu, pegando emprestado o nome da obra de um grande artista, o nomeei da seguinte forma."
206-34 = "The Library of Lore."
206-35 = "É bem por aí!"
206-36 = "O fato de o primeiro volume ser uma paródia pode parecer... bem, talvez um pouco engraçado. Mas, pensando bem, também pode ser considerado um 'signo' digno."
206-37 = "Um conto de terror sobre a alma de um bicho de pelúcia que subitamente enlouquece. Tenho certeza de que várias outras homenagens como esta virão a seguir."
206-38 = "Isso é apenas uma parte do banco de dados da biblioteca. Para o Sensei, certamente não é algo que possa ser ignorado."
206-39 = "Ainda não conseguimos compreender a imagem completa desta biblioteca. Mas é justamente por não podermos compreendê-la por completo que ela é interessante... pode-se dizer que sim."
206-40 = "É bem por aí!!"
206-45 = "Então, Sensei, que a sorte esteja com você em seu caminho. Estou ansioso para ver que tipo de texto você lerá a partir daquele signo……."
