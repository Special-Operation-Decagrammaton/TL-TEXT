[translation]
206-1 = "記号の世界"
206-5 = "……こうしてお会いするのは初めてでしょうか。わたくしの名前は、「ゴルコンダ」と申します。"
206-6 = "少々故あって、このような形で貴下に挨拶することとなりましたが……背を向けた状態での挨拶となるご無礼、どうかお許しくださいませ。わたくしにはこれ以外の方法がありませんもので……。"
206-7 = "まあそういうこった！"
206-8 = "……あぁ、そうでした。ちなみにこちらは、わたくしの身体を代行してくれている「デカルコマニー」です。"
206-9 = "わたくしたちは言うなれば、お互いにお互いが「虚像」と「非実在」を象徴する相棒であり、記号なのです。"
206-10 = "そういうこった！"
206-11 = "全ての記号がそうであるように、デカルコマニーと私もまた、自らによってのみ存在することは叶いません。いつ何時も記号というものは、その中に解釈によって導き出される「テクスト」を含んでいるのです。"
206-12 = "ですがこれは、わたくしたちだけの問題というわけではございません。何せ、存在するものはことごとく記号なのですから。それこそが、わたくしとデカルコマニーが見ている「世界」の在り方です。"
206-13 = "云わば記号と象徴の地獄、実存主義者たちの[ruby=Limbo]辺獄[/ruby]、とでも申しましょうか。"
206-16 = "例えば……自身の記号そのものを自分の名前とした黒服。"
206-21 = "そして自身の「テクスト」を外形として顕現させたマエストロなども、良い例となるでしょう。"
206-22 = "マエストロには頭が二つある……こういった部分から、そこに秘められた「テクスト」を解読してほしいという渇望すら読み取れるようにも思えます。"
206-24 = "そしてそのようなことは、この都市についても同様のことが言えます。どうしてこのような記号なのか……。"
206-25 = "……こうしてこの夜景を見ていると、ついそんなことを思うのです。"
206-26 = "そういうこった！"
206-27 = "そして、今から出会う存在は……いわばその「記号」の変種でございます。"
206-28 = "パロディ、オマージュ……まあそういったものとも言えるかもしれませんが、ただそれだけではありません。"
206-29 = "言うなればこれは現代の都市伝説、怪談……あるいは俗に「クリーピーパスタ」とも呼ばれる、本来無意味なお話が自ら「崇高」の境地へと至った非常に稀なケースなのです。"
206-30 = "つまり「神秘」も「恐怖」も無いままに胎動した、新たな「崇高」。無限に繰り返される中で偶然に意味を孕んで誕生した、稀有なテクストを持ちうる記号……。"
206-31 = "これは非常に興味深い、ぜひとも解釈されるべき「記号」であるわけでございます。"
206-32 = "そして私はある偉大な芸術家の作品の名を少々お借りして、このように名づけました。"
206-34 = "「[ruby=止め処無い奇談の図書館]The Library of Lore[/ruby]」、と。"
206-35 = "そういうこった！"
206-36 = "その第一弾がパロディであるのは……そうですね、少々可笑しい話に思えるかもしれません。ですが逆に考えてみれば、それもまた一つの立派な「記号」であるとも言えます。"
206-37 = "ぬいぐるみの魂が唐突に暴れるという怪談。この後もきっと、様々なオマージュのようなものが続いていくことでしょう。"
206-38 = "これはあくまで、図書館のデータベースの一部。先生にとってもきっと、無視できるものではないはずです。"
206-39 = "この図書館の全体像はまだ掴めません。しかし全体像が掴めないからこそ興味深い……そうとも言えるでしょう。"
206-40 = "そういうこったぁ！！"
206-45 = "それでは先生、その道に幸運があらんことを。先生があの記号から一体どのようなテクストを読み取るのか……楽しみにしておりますよ。"
