[translation]
10024050-1 = "第5話;[ruby=きょいちはんさん]挙一反三[/ruby]"
10024050-2 = "梅花園・内部"
10024050-4 = "72点、53点、81点、48点……"
10024050-5 = "ふぅ、今日の分の採点はおしまいっ！#nふわぁ～っ……"
10024050-6 = "ん～……子ども達は、どうして勉強が嫌いなんだろう？"
10024050-7 = "そんなに難しい問題でもないのに、いつも補習が必要な子がいるし……"
10024050-8 = "難しい問題が多いと、またシュン姉さんに怒られちゃう……"
10024050-15 = "こんにちは、教官ちゃん。#n梅花園で会うのは久しぶりだね。"
10024050-16 = "あっ、ルミ会長、こんにちは！"
10024050-17 = "それより、教官ちゃんじゃないです！#n私には、ココナという名前がちゃんとあるんですよ！"
10024050-18 = "ははっ、ごめんね。ココナちゃんが可愛くて、つい。#n元気だった？教官の仕事はどう？"
10024050-25 = "（ココナちゃんって呼ばれるのも、子ども扱いされてるような気がするけど……）"
10024050-26 = "（立派なレディーは、この程度、いちいち気にしたりしません！）"
10024050-29 = "元気ですよ！私は一人前の教官ですから！"
10024050-30 = "久しぶりだな、ココナ教官。何か困ったりしてないか？"
10024050-31 = "急に訪ねて、迷惑ではなかったですか、ココナ教官。"
10024050-32 = "め、迷惑だなんて、とんでもありません！#nようこそ、梅花園へ！"
10024050-33 = "ところで……玄龍門と玄武商会の方が一緒にいらっしゃるなんて、珍しいですね？"
10024050-34 = "これには事情が……"
10024050-36 = "不本意ではあるのだがな……いいか、ココナ教官。この悪いお姉さんたちと遊んじゃダメだぞ。伝統の何たるかも知らずに、いつもコソコソと何か企んでるようだからな。"
10024050-37 = "こんな意地悪な人たちと一緒にいては、良くありませんよ。#n新しい文化を取り入れないで、殻に籠もっているような人たちですから。"
10024050-43 = "……言ってくれるじゃないか。言葉には気をつけたほうがいいぞ？#nそれとも、言われたまま黙っているように見えたか？"
10024050-44 = "そちらこそ、よく考えてから口にする事です。"
10024050-46 = "あ、あはは……"
10024050-47 = "[s] \"2人とも、ココナちゃんの前だよ。\""
10024050-48 = "ちっ。"
10024050-49 = "ふん。"
10024050-51 = "ありがとう、先生がいてくれて助かったよ。"
10024050-52 = "それで、ココナちゃん。#nあたし達がここに来た理由なんだけどさ……"
10024050-58 = "[ns] \"最近、中身の分からない荷物を預かったりしなかった？\""
10024050-59 = "中身の分からない荷物、ですか……？#nええっと……"
10024050-60 = "あ！そういえば……！"
10024050-61 = "心当たりがあるのだな？"
10024050-63 = "はい！この間、玄武商会のダンボールに入った食材を、#n「山海経の外で待ってる人に渡してほしい」と頼まれました！"
10024050-64 = "やはり玄武商会の仕業か……"
10024050-65 = "そう結論づけるのは早計ですよ。#nココナ教官、頼んできた生徒の顔や服装は覚えてますか？"
10024050-67 = "いえ……具合が悪かったのか、マスクをしていたので……"
10024050-68 = "顔を隠していたのか。#nますます玄武商会の疑いが強まったな。"
10024050-69 = "何を根拠に、私たちだと決めつけるんですか。"
10024050-70 = "玄武商会は、食材のためなら何でもする。#n違うのか？"
10024050-71 = "否定は、できませんが……"
10024050-73 = "たとえ下部組織であっても、違法な手段に手を染めていたら、誰よりも先に私に連絡が入ってくるはず。"
10024050-74 = "ほう、ルミ会長じゃなくてか？"
10024050-75 = "まあ……「そっち」の仕事は、レイジョに任せてるからね……"
10024050-76 = "レイジョの目は信用できるよ。#nあたしが保証する。"
10024050-78 = "あっ！それと……梅花園の園児にも、似たような「おつかい」が頼まれたんです。"
10024050-80 = "園児たちに！？"
10024050-82 = "子ども達に……ですか！？"
10024050-83 = "……もう少し、詳しい話を聞けないか？"
10024050-84 = "う～んと……その、梅花園の園児は、#nおつかいの練習で配達の依頼を受けたりしてるんです。"
10024050-85 = "いつもは近所の方からの依頼が多いんですが……#nここ最近、いくつか山海経の外に荷物を届ける依頼が来ました。"
10024050-86 = "その依頼を受けたんですね？"
10024050-87 = "え……？はい、受けました。#n危険な物ではないと言われましたし、何かあれば守ってくれるとの事だったので……"
10024050-88 = "私も一度だけ付き添ったんですが、特に問題はありませんでした。"
10024050-90 = "そもそも、山海経の園児に手を出すような怖いもの知らずが、キヴォトスにいるのでしょうか？"
10024050-95 = "……ビンゴだな。"
10024050-96 = "えっと、何がですか……？"
10024050-97 = "いえ、何でもありませんよ、ココナ教官。#n私たちはそろそろ行かなくては。"
10024050-98 = "[s] \"ありがとう、ココナちゃん！\""
10024050-104 = "えっ、はい？お疲れ様でした……？"
10024050-110 = "山海経の街中"
10024050-112 = "良い判断だったよ、レイジョ。#nココナちゃんの前で話すことじゃないから。"
10024050-113 = "……子ども達に気づかれてはいけない。#nそうでしょう、ミナ執行部長。"
10024050-114 = "何も知らない子どもの善意を利用するなんて……"
10024050-120 = "世の中には越えてはならない一線というものがあるだろうに！"
10024050-121 = "すぐにでも犯人を見つけて、とっ捕まえてやる！#n玄龍門の力を総動員してでもだ！"
10024050-126 = "[ns] \"落ち着いて、ミナ。\""
10024050-127 = "アレを聞いて、先生は黙っていられるのか？"
10024050-129 = "慌てても仕方がない、って言いたいんじゃないかな。"
10024050-130 = "キミに玄龍門を動かすだけの権限があるなら、話は別だけど。"
10024050-131 = "あたしの知る限り、キサキでも難しいはずだよ。"
10024050-132 = "……随分と知ったような口を聞くのだな？"
10024050-133 = "まあ、お互いのことなら、それなりに知り尽くしてるんじゃないかな。"
10024050-134 = "なんだと……？"
10024050-135 = "[s] \"実行犯を捕まえるだけじゃ、意味がないからね。\""
10024050-137 = "先生の言う通りです。"
10024050-138 = "全ての責任を押しつけ、尻尾を切ることで逃げ延びた組織は数知れません。"
10024050-139 = "玄武商会で扱った事件でも……#n下の者を切り捨て、言い逃れする者の姿を多く目にしてきました。"
10024050-140 = "個人の裁量に委ねているから、そんなことが起きるのだろう？"
10024050-141 = "組織を管理するには、厳格な規則が必要だ。#n例外など、あってはならない。"
10024050-142 = "それでは、非効率的な方法を強制することに成り得ます。"
10024050-143 = "日々変化する状況に対応するのが現場なのですから。"
10024050-144 = "……それで、梅花園の子ども達に犯罪の片棒を担がせたというのか？"
10024050-145 = "まだ玄武商会を疑ってるなんて、本当に頭が固い……。"
10024050-146 = "何度も繰り返しますが、うちがやったという確たる証拠はありません。"
10024050-147 = "レイジョの言う通りだよ。#nだからこそ、あたし達は調査をしているんでしょう？"
10024050-148 = "梅花園を巻き込むだなんて、あたしも怒ってるよ。"
10024050-150 = "もし玄武商会の関与が明らかになった場合はどうするつもりなんだ？"
10024050-151 = "あたしが責任を取る。#n商会の活動停止でも、解散でも、好きにして。"
10024050-152 = "会長！"
10024050-154 = "大丈夫だよ、レイジョ。#nもしそうなっても、もう一度やり直せばいいんだから。"
10024050-155 = "解散する覚悟でも見せないと、#nずっと疑われたままじゃ調査にならないし。"
10024050-156 = "それで先生、何か作戦があるの？"
10024050-162 = "[ns] \"罠を張るのはどうかな。\""
10024050-163 = "罠……？"
