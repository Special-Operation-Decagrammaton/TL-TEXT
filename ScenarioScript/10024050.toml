[translation]
10024050-1 = "Episódio 5; Aprender um e deduzir dez"
10024050-2 = "Jardim das Ameixeiras - Interior"
10024050-4 = "72 pontos, 53 pontos, 81 pontos, 48 pontos..."
10024050-5 = "Ufa, terminei as correções de hoje!#nAhhh..."
10024050-6 = "Hum... por que será que as crianças odeiam tanto estudar?"
10024050-7 = "Não são problemas tão difíceis assim, mas sempre tem alguém que precisa de reforço..."
10024050-8 = "Se tiverem muitos problemas difíceis, a Shun vai acabar me dando uma bronca de novo..."
10024050-15 = "Olá, instrutora.#nFaz tempo que não nos vemos no Jardim das Ameixeiras."
10024050-16 = "Ah, presidente Lumi, olá!"
10024050-17 = "E não me chame de instrutora!#nEu tenho um nome, é Kokona!"
10024050-18 = "Haha, desculpe. É que a Kokona-chan é tão fofa que eu não resisti.#nComo você está? Como vai o trabalho de instrutora?"
10024050-25 = "(Ser chamada de Kokona-chan também me faz sentir como se estivessem me tratando como criança...)"
10024050-26 = "(Uma dama de verdade não se importa com essas coisas!)"
10024050-29 = "Estou muito bem! Eu sou uma instrutora de verdade!"
10024050-30 = "Quanto tempo, instrutora Kokona. Está tendo algum problema?"
10024050-31 = "Não estamos incomodando com essa visita repentina, instrutora Kokona?"
10024050-32 = "I-incomodando? De jeito nenhum!#nSejam bem-vindos ao Jardim das Ameixeiras!"
10024050-33 = "Mas, diga-me... é raro ver o pessoal do Portão Genryu e da Associação Genbu juntos, não é?"
10024050-34 = "Sobre isso, há um motivo..."
10024050-36 = "Embora seja contra a minha vontade... Escute bem, instrutora Kokona. Não brinque com essas moças más. Elas não conhecem o valor da tradição e vivem tramando algo pelas costas."
10024050-37 = "Não é bom ficar perto de pessoas tão maldosas assim.#nSão pessoas que se fecham em suas próprias bolhas e não aceitam novas culturas."
10024050-43 = "...Olha só como fala. É melhor tomar cuidado com as palavras.#nOu você achou que eu ficaria calada ouvindo isso?"
10024050-44 = "Você deveria pensar bem antes de abrir a boca também."
10024050-46 = "Ah, ahaha..."
10024050-47 = "[s] \"As duas, a Kokona-chan está ouvindo.\""
10024050-48 = "Tsc."
10024050-49 = "Humpf."
10024050-51 = "Obrigado, Sensei, é bom ter você aqui."
10024050-52 = "Enfim, Kokona-chan.#nO motivo de termos vindo aqui é..."
10024050-58 = "[ns] \"Você recebeu algum pacote com conteúdo desconhecido recentemente?\""
10024050-59 = "Pacote com conteúdo desconhecido...?#nBem..."
10024050-60 = "Ah! Agora que você falou...!"
10024050-61 = "Então você sabe de algo?"
10024050-63 = "Sim! Outro dia, me pediram para entregar uma caixa de ingredientes da Associação Genbu para alguém que estava esperando fora de Shanhaijing!"
10024050-64 = "Então foi obra da Associação Genbu mesmo..."
10024050-65 = "É precipitado tirar essa conclusão.#nInstrutora Kokona, você se lembra do rosto ou das roupas da aluna que pediu isso?"
10024050-67 = "Não... ela estava usando uma máscara, talvez porque não estivesse se sentindo bem..."
10024050-68 = "Escondeu o rosto, é?#nIsso só aumenta as suspeitas sobre a Associação Genbu."
10024050-69 = "Com base em quê você nos acusa?"
10024050-70 = "A Associação Genbu faz qualquer coisa por ingredientes.#nEstou errada?"
10024050-71 = "Não posso negar, mas..."
10024050-73 = "Mesmo que fosse uma organização subordinada, se estivessem envolvidos em meios ilegais, eu seria a primeira a ser informada."
10024050-74 = "Ora, e não a presidente Lumi?"
10024050-75 = "Bem... eu deixo esse tipo de trabalho para a Reijo..."
10024050-76 = "O olhar da Reijo é confiável.#nEu garanto isso."
10024050-78 = "Ah! E tem mais... pediram para uma das crianças do Jardim das Ameixeiras fazer um \"favor\" parecido."
10024050-80 = "Para as crianças!?"
10024050-82 = "Para as crianças...?"
10024050-83 = "...Pode nos contar mais detalhes?"
10024050-84 = "Bem... é que as crianças do Jardim das Ameixeiras costumam aceitar pedidos de entrega como parte do treinamento de tarefas."
10024050-85 = "Normalmente recebo muitos pedidos de vizinhos, mas... ultimamente, recebi alguns pedidos para entregar encomendas fora de Shanhaijing."
10024050-86 = "Então você aceitou esses pedidos?"
10024050-87 = "Eh...? Sim, eu aceitei. Disseram que não eram itens perigosos e que, se acontecesse algo, eles me protegeriam, então..."
10024050-88 = "Eu também acompanhei uma vez, mas não houve problema algum."
10024050-90 = "Além disso, existe alguém em Kivotos tão imprudente a ponto de mexer com as crianças de Shanhaijing?"
10024050-95 = "...Bingo."
10024050-96 = "Err, o que quer dizer com isso...?"
10024050-97 = "Não, não é nada, Instrutora Kokona. Nós já devemos ir."
10024050-98 = "[s] \"Obrigado, Kokona-chan!\""
10024050-104 = "Ah, sim? Bom trabalho...?"
10024050-110 = "Ruas de Shanhaijing"
10024050-112 = "Foi uma boa decisão, Reijo. Não é algo para se falar na frente da Kokona-chan."
10024050-113 = "...As crianças não podem descobrir. Não é, Diretora Executiva Mina?"
10024050-114 = "Utilizar a boa vontade de crianças que não sabem de nada..."
10024050-120 = "Existem limites que não devem ser ultrapassados neste mundo!"
10024050-121 = "Vou encontrar o culpado e capturá-lo imediatamente! Mesmo que tenha que mobilizar todas as forças da Genryumon!"
10024050-126 = "[ns] \"Calma, Mina.\""
10024050-127 = "Depois de ouvir aquilo, você acha que o Sensei consegue ficar calado?"
10024050-129 = "Acho que ele quer dizer que não adianta se desesperar."
10024050-130 = "Se você tivesse autoridade para mover a Genryumon, a história seria outra."
10024050-131 = "Até onde eu sei, isso seria difícil até para Kisaki."
10024050-132 = "...Você fala como se soubesse de muita coisa, não é?"
10024050-133 = "Bem, acho que conhecemos bem um ao outro, não é?"
10024050-134 = "O que disse...?"
10024050-135 = "[s] \"Só capturar o executor não adianta nada.\""
10024050-137 = "O Sensei tem razão."
10024050-138 = "Existem inúmeras organizações que escapam jogando toda a responsabilidade nos outros e descartando os peões."
10024050-139 = "Mesmo nos casos que a Associação Genbu lidou... vi muitas pessoas descartando seus subordinados e dando desculpas."
10024050-140 = "Isso acontece porque deixam tudo a critério individual, não é?"
10024050-141 = "Para gerenciar uma organização, são necessárias regras rígidas. Não deve haver exceções."
10024050-142 = "Isso pode acabar forçando métodos ineficientes."
10024050-143 = "Afinal, o campo de batalha é onde se lida com situações que mudam diariamente."
10024050-144 = "...Então, você está dizendo que fizeram as crianças do Plum Blossom Garden serem cúmplices de um crime?"
10024050-145 = "Você ainda suspeita da Associação Genbu, que cabeça dura..."
10024050-146 = "Repito várias vezes: não há provas concretas de que fomos nós."
10024050-147 = "A Reijo está certa. É por isso que estamos investigando, não é?"
10024050-148 = "Eu também estou furiosa por terem envolvido o Plum Blossom Garden."
10024050-150 = "O que você pretende fazer se ficar claro que a Associação Genbu está envolvida?"
10024050-151 = "Eu assumirei a responsabilidade. Pode suspender as atividades da associação ou até dissolvê-la, faça o que quiser."
10024050-152 = "Presidente!"
10024050-154 = "Está tudo bem, Reijo. Se isso acontecer, podemos apenas recomeçar do zero."
10024050-155 = "Se eu não mostrar que estou disposta a dissolver, a investigação não vai avançar enquanto continuarem suspeitando de nós."
10024050-156 = "Então, Sensei, você tem algum plano?"
10024050-162 = "[ns] \"Que tal armarmos uma armadilha?\""
10024050-163 = "Uma armadilha...?"
