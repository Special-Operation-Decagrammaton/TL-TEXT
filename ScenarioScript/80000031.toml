[translation]
80000031-1 = "1年越しに"
80000031-2 = "ヴァルキューレ・生活安全局"
80000031-3 = "ふふっ……楽しみだねぇ。"
80000031-4 = "[s] \"何か良いことでもあったの？\""
80000031-5 = "おっ、先生じゃん。おはよ。"
80000031-6 = "そりゃあそうだよ、今日はバレンタインデーじゃん？"
80000031-7 = "誰もが浮つく日だよ、楽しみしかないね。"
80000031-8 = "[s] \"なるほど、もしかして大切な相手とか？\""
80000031-9 = "ふふっ、鋭いね……。"
80000031-10 = "そう、私は今日という日をもう一年も待っていた。"
80000031-11 = "今までは、どれだけ会いたくても会えなくって……。"
80000031-12 = "一日千秋とはこのことだったね。それが今日やっとだから、もう朝から楽しみで仕事なんかやってられないよ。"
80000031-13 = "[s] \"いったいそれって……\""
80000031-14 = "もうそろそろだと思うよ？"
80000031-18 = "来たぁ！"
80000031-20 = "こんにちは！いつでもどこでもドーナッツを、「マスタードーナッツ」のデリバリーサービスです！"
80000031-21 = "えー、「バレンタインデー記念・特製チョコドーナッツ」を2箱ご注文のフブキ様でよろしいでしょうか？"
80000031-22 = "待ってた待ってたー！"
80000031-27 = "[ns] \"フブキ……？\""
80000031-29 = "見て分かるでしょ？バレンタイン限定のチョコクルーラーだよ！"
80000031-30 = "年中いつでも食べられそうに見えて、このスプリンクルがかかった「特製バージョン」はバレンタインにしか味わえないの！"
80000031-31 = "それにバレンタインシーズンは、ずっと割引イベントが開催されてるから……。"
80000031-32 = "いやー、やっぱりバレンタインデー最高ー！"
80000031-33 = "[s1] \"これが一年待ってた相手……。\"\n[s2] \"全部ドーナッツのためだったんだ……\""
80000031-34 = "あ、それは……うーん……"
80000031-35 = "あ、それは……うーん……"
80000031-39 = "……ほら。先生も、食べない？"
