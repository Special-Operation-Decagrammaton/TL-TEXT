[translation]
80000031-1 = "Depois de um ano inteiro"
80000031-2 = "Escola de Polícia Valkyrie - Departamento de Segurança Pública"
80000031-3 = "Hehe... estou tão animada."
80000031-4 = "[s] \"Aconteceu alguma coisa boa?\""
80000031-5 = "Ah, Sensei. Bom dia."
80000031-6 = "Bem, é claro que sim, hoje é Dia dos Namorados, não é?"
80000031-7 = "É um dia em que todo mundo fica animado, só tem coisas boas para esperar."
80000031-8 = "[s] \"Entendi, por acaso é alguém especial?\""
80000031-9 = "Hehe, você é perspicaz..."
80000031-10 = "Sim, eu esperei por este dia durante um ano inteiro."
80000031-11 = "Até agora, não importava o quanto eu quisesse encontrar, eu não conseguia..."
80000031-12 = "Eu estava contando os minutos. Como finalmente chegou o dia, estou tão animada desde cedo que nem consigo trabalhar."
80000031-13 = "[s] \"O que exatamente seria isso...\""
80000031-14 = "Acho que já está na hora, não é?"
80000031-18 = "Chegou!"
80000031-20 = "Olá! Serviço de entrega da \"Master Donuts\", trazendo donuts a qualquer hora e em qualquer lugar!"
80000031-21 = "Hum, você seria a Fubuki, que pediu duas caixas do \"Donut de Chocolate Especial Comemorativo do Dia dos Namorados\", correto?"
80000031-22 = "Eu estava esperando por isso!"
80000031-27 = "[ns] \"Fubuki...?\""
80000031-29 = "Dá para ver, não dá? É o donut de chocolate exclusivo do Dia dos Namorados!"
80000031-30 = "Pode parecer que dá para comer o ano todo, mas essa \"versão especial\" com granulados só dá para saborear no Dia dos Namorados!"
80000031-31 = "Além disso, durante a temporada de Dia dos Namorados, sempre tem eventos de desconto, então..."
80000031-32 = "Cara, o Dia dos Namorados é o melhor!"
80000031-33 = "[s1] \"Então era por isso que você esperou um ano inteiro...\"\n[s2] \"Era tudo por causa de donuts...\""
80000031-34 = "Ah, sobre isso... hum..."
80000031-35 = "Ah, sobre isso... hum..."
80000031-39 = "...Aqui. Sensei, não quer comer um também?"
