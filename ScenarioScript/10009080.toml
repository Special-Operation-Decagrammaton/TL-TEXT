[translation]
10009080-1 = "後日談その1;ハッピーバレンタイン……？"
10009080-3 = "こんにちは、救護騎士団です。#n今日はバレンタインデーなので、皆さんにチョコレートをお配りしています。"
10009080-4 = "よければどうぞ！#nハッピーバレンタインです～！"
10009080-5 = "これがバレンタインチョコ……#n実は私、今までもらったことがなくて……。"
10009080-6 = "ありがとうございます！#n救護騎士団の皆さん、いつもお疲れ様です。"
10009080-8 = "ふふ。愛を求める方に幸せを届けることも、#n「救護」の形なのではないかと思ったのです。"
10009080-9 = "それに、笑顔を返して頂けると私も嬉しくなりますから。"
10009080-13 = "ふふっ、ハナエちゃんが素敵なアイデアを提案してくれたおかげですね。"
10009080-14 = "ある意味ではこれも「本当の救護」なのかもしれません……！"
10009080-15 = "たしかに……#n「救護」の本質は、人々に恵みを与えること――"
10009080-16 = "セリナ、ハナエ、ありがとうございます。#n私はまた一つ、学びを得る事ができました。"
10009080-17 = "そんな……！#n私もハナエちゃんも、皆さんと一緒に楽しめたらいいなと思っただけなので……！"
10009080-18 = "それに、チョコレートはみんなで食べたほうが美味しいですし！"
10009080-20 = "ありがとうございます……大切に頂きますね。#nいや、家宝にしようかな……。"
10009080-21 = "救護騎士団には、いつも助けてもらってばかりだなぁ……。#nそうだ、何か手伝えることはないかな？"
10009080-23 = "あっ、お気遣いありがとうございます……！#nでも、大丈夫ですよ。"
10009080-24 = "ありがとうございます。#n皆さんが「救護の精神」と共にありますよう。"
10009080-25 = "こんなに喜んでもらえるなんて……"
10009080-29 = "嬉しくて胸が張り裂けちゃいそうです！"
10009080-35 = "きゃあっ！爆発！？"
10009080-36 = "わ、私のせいですか！？#n胸が張り裂けそうなんて言ったから！？"
10009080-37 = "そうではないと思いますが……！"
10009080-39 = "緊急速報です！#n先ほど、矯正局へと向かっていたヴァルキューレの車両が爆破！"
10009080-40 = "そこで多数の問題児集団が、暴行を働いているというニュースが入りました！"
10009080-42 = "あっちで爆発があったみてぇだな？"
10009080-43 = "んだな。#nヴァルキューレのサツもそっちにかかりきりみてぇだし。"
10009080-44 = "暴れるなら今のうちってか！#nよし、今日は祭だ！パーッと行こうぜ！"
10009080-45 = "おうよ！そうと来たら思いっきり楽しまねーとな！#nおい、みんな集めろ！"
10009080-50 = "い、一体何が……！？"
10009080-51 = "爆破騒ぎに……今度は問題児まで……！？"
10009080-52 = "あぁ……今日は平和だと思ってたのになんてことだ！"
10009080-53 = "ヴァルキューレはまだなの！？#nだ、誰か助けて！"
10009080-55 = "な、なんだか大変な事態になってしまっているような……！"
10009080-56 = "どうしましょう、先輩！？"
10009080-57 = "深呼吸ですよ、ハナエちゃん。#nまずは私たちが落ち着いて……。#nそして、怪我人がいないか見て回りましょう……！"
10009080-58 = "ええ。その通りです、セリナ。"
10009080-59 = "団長……？"
10009080-60 = "「救護」とは、人々に恵みを与えること。"
10009080-61 = "そして、道を外れようとしている者、外れてしまった者を正すこと。#nそれもまた救護の在り方と言えるでしょう。"
10009080-62 = "これより私は、彼女たちを「救護」してきます。#nセリナ、ハナエ、負傷者の治療は任せました。"
10009080-63 = "ま、待ってくださ――"
10009080-64 = "参ります！『救護が必要な場に救護を』！"
