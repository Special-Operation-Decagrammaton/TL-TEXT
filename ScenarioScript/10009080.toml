[translation]
10009080-1 = "Epílogo parte 1; Feliz Dia dos Namorados...?"
10009080-3 = "Olá, aqui é o Esquadrão de Socorro. #nComo hoje é Dia dos Namorados, estamos distribuindo chocolates para todos."
10009080-4 = "Fiquem à vontade para pegar! #nFeliz Dia dos Namorados~!"
10009080-5 = "Isso é um chocolate de Dia dos Namorados... #nNa verdade, eu nunca ganhei um antes..."
10009080-6 = "Muito obrigado! #nPessoal do Esquadrão de Socorro, obrigado pelo trabalho duro de sempre."
10009080-8 = "Fufu. Pensei que levar felicidade a quem busca amor também poderia ser uma forma de \"socorro\"."
10009080-9 = "Além disso, fico feliz quando recebo um sorriso em troca."
10009080-13 = "Fufu, isso graças à Hanae-chan, que sugeriu essa ideia maravilhosa."
10009080-14 = "De certa forma, isso também pode ser um \"socorro verdadeiro\"...!"
10009080-15 = "Com certeza... #nA essência do \"socorro\" é conceder bênçãos às pessoas――"
10009080-16 = "Serina, Hanae, obrigado. #nEu aprendi mais uma lição hoje."
10009080-17 = "Que isso...! #nEu e a Hanae-chan só queríamos aproveitar o dia com todos vocês...!"
10009080-18 = "Além disso, chocolate é muito mais gostoso quando comemos juntos!"
10009080-20 = "Muito obrigado... Vou guardar com muito carinho. #nOu melhor, talvez eu transforme em uma relíquia de família..."
10009080-21 = "Eu sempre sou ajudado pelo Esquadrão de Socorro... #nEi, tem algo em que eu possa ajudar?"
10009080-23 = "Ah, obrigada pela preocupação...! #nMas não se preocupe, está tudo bem."
10009080-24 = "Obrigada. #nQue todos vocês estejam sempre acompanhados pelo \"espírito de socorro\"."
10009080-25 = "Fico tão feliz que estejam gostando..."
10009080-29 = "Estou tão feliz que meu coração quase explode!"
10009080-35 = "Ah! Uma explosão!?"
10009080-36 = "A-a culpa é minha!? #nFoi porque eu disse que meu coração ia explodir!?"
10009080-37 = "Acho que não foi por isso...!"
10009080-39 = "Plantão de emergência! #nUm veículo da Valkyrie que seguia para o Centro Correcional acabou de explodir!"
10009080-40 = "Recebemos notícias de que um grupo de encrenqueiros está causando tumulto por lá!"
10009080-42 = "Parece que teve uma explosão ali, né?"
10009080-43 = "Pois é. #nE os tiras da Valkyrie parecem estar todos ocupados com isso."
10009080-44 = "Se é pra causar confusão, a hora é agora! #nBeleza, hoje é dia de festa! Vamos tocar o terror!"
10009080-45 = "Isso aí! Já que é assim, vamos aproveitar ao máximo! #nEi, juntem todo mundo!"
10009080-50 = "O-o que está acontecendo...!?"
10009080-51 = "Uma explosão... e agora esses encrenqueiros...!?"
10009080-52 = "Ah... eu achei que hoje seria um dia de paz, mas olha só o que aconteceu!"
10009080-53 = "A Valkyrie ainda não chegou!? #nA-alguém, socorro!"
10009080-55 = "A-a situação parece ter ficado muito séria...!"
10009080-56 = "O que faremos, senpai!?"
10009080-57 = "Respire fundo, Hanae-chan. #nPrimeiro, precisamos manter a calma... #ne então, vamos verificar se há feridos...!"
10009080-58 = "Sim. Exatamente, Serina."
10009080-59 = "Comandante...?"
10009080-60 = "\"Socorro\" significa conceder bênçãos às pessoas."
10009080-61 = "E também significa corrigir aqueles que estão saindo do caminho, ou que já se perderam. #nIsso também pode ser considerado uma forma de socorro."
10009080-62 = "Vou prestar \"socorro\" a elas agora. #nSerina, Hanae, deixo o tratamento dos feridos com vocês."
10009080-63 = "E-espere um pouco――"
10009080-64 = "Estou indo! \"Onde houver necessidade de socorro, lá estaremos\"!"
