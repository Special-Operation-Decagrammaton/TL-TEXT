[translation]#[Texto Final , mas eventualmente pode haver alterações na formatação de texto. - Filipe 29/06.]
21010-1 = "Episódio 1: O Começo da Aventura."
21010-2 = "……"
21010-4 = "A minha voz……\nestá chegando até você……?"
21010-6 = "Está aí?\nAquele que vai salvar este mundo——"
21010-11 = "——Ó, Herói."
21010-12 = "Esperei você por todo esse tempo."
21010-13 = "Chegou a hora de revelar tudo.\nNos primórdios, a tribo celeste\ne a tribo demoníaca……"
21010-14 = "……"
21010-15 = "Corta, corta, COOORTAA!"
21010-16 = "Não, não, clichê demais!\nDesse jeito o jogo já vai flopar logo no lançamento!"
21010-17 = "Se eu fosse jogadora, no segundo que esse\ntexto aparecesse no prólogo eu já pensava\n\"ah, deixa pra lá\" e largava!"
21010-18 = "Mais uma vez! Hmm……"
21010-20 = "——Ó, Herói, eu esperava por você."
21010-21 = "Eu sou a deusa \"Momoria\"."
21010-23 = "O nosso mundo, \"Millennium Land\",\nenfrenta agora uma ameaça\ncomo nunca se viu."
21010-24 = "Superar essa ameaça e salvar o Clube de Desenvolvimento de Jogos\n da ordem de dissolução do Conselho Estudantil……\nnão, salvar a própria Millennium Land: só você é capaz disso."
21010-25 = "O caminho pode ser cruel……\nainda assim, eu lhe imploro: aceite."
21010-27 = "Lá no fim da aventura\nque está prestes a começar……"
21010-28 = "Que provações e adversidades a esperam,\nainda não se pode saber."
21010-29 = "Mas…… por favor, até o fim,\nnão perca a sua coragem."
21010-30 = "Pois ao lado do herói haverá garotas\npara trilhar a jornada junto."
21010-32 = "Nesse novo mundo, para essas garotas\nvocê não será o \"Herói\"……"
21010-34 = "mas será chamado por um nome\nmuito mais especial, um nome à sua altura."
21010-36 = "E esse nome é——"
21010-39 = "Sensei!!"
21010-41 = "???"
21010-42 = "……"
21010-43 = "[s1] \"Um teto que eu não reconheço……\"\n[s2] \"Onde é que…… eu tô……?\""
21010-44 = "Ah, acordou?!"
21010-45 = "Ah, acordou?!"
21010-46 = "Voltou a si? Você tem sorte, viu!"
21010-48 = "Para de falar esquisito assim do nada,\ntá deixando o Sensei confuso."
21010-49 = "Hehe, foi a empolgação……\nSensei, tá tudo bem?\nCheguei a achar que você não ia mais acordar."
21010-50 = "Que alívio, de verdade. Quando o KivoStation que\na mana jogou pela janela acertou em cheio a cabeça\ndo Sensei — por mais que tenha sido sem querer —\neu já me vi virando suspeita num caso de assassinato."
21010-51 = "Peço desculpas no lugar da minha mana.\nMe perdoa, Sensei."
21010-52 = "Ah, é? Pois a Midori, que agora tá toda certinha,\nquando eu gritei \"acho que acertei o Sensei!?\",\na primeira coisa que ela soltou foi\n\"e o KivoStation, tá inteiro!?\"."
21010-53 = "I-isso é porque ele é o item número 1\nda lista de patrimônio do nosso\nClube de Desenvolvimento de Jogos,\nme escapou sem querer……"
21010-54 = "E-enfim!!"
21010-55 = "Sensei, você veio daquela tal de Schale, não é?"
21010-56 = "Uau, sério?! Então você leu\na carta que a gente mandou!\nE olha que, mesmo que lesse, eu nunca\nimaginei que você viria de verdade!"
21010-57 = "[s] \"A carta…… aquela…… \""
21010-59 = "Schale · Escritório"
21010-60 = "Sensei, chegou um pedido\nvindo da Colégio de Ciências Millennium."
21010-61 = "A remetente é…… o Clube de Desenvolvimento de Jogos de Millennium? Pelo visto.\nVou ler pra você."
21010-62 = "\"O Clube de Desenvolvimento de Jogos corre\no risco de deixar de existir. Com a ordem de\ndissolução decretada pelo Conselho Estudantil,\na nossa ruína está logo ali, e a única pessoa\na quem podemos pedir socorro é o Senhor.\nHerói, por favor, salve a gente!\""
21010-63 = "Entendi. Como eu poderia dizer, é bem\ncativante…… dá pra sentir na pele\no quanto eles estão desesperados……"
21010-64 = "Ah, Sensei, você conhece\na Colégio de Ciências Millennium?"
21010-65 = "[s3] \"Conheço, mas é mais ou menos.\"\n[s4] \"Nem tanto……\""
21010-66 = "Ah, sim. A Colégio de Ciências Millennium,\ncomo você sabe——"
21010-67 = "junto com a Trinity e a Gehenna, é uma\ndas grandes instituições conhecidas como\nas Três Grandes Academias de Kivotos."
21010-68 = "Apelidada de Millennium, ela valoriza a razão\ne a tecnologia mais do que qualquer outra academia."
21010-69 = "É especializada em pesquisa científica e se\ndestaca por reunir muitas alunas das áreas de exatas."
21010-70 = "Comparada às outras duas, Gehenna e Trinity\n— tradicionais feito velhas famílias de prestígio —,\nnão tem uma história tão longa; mas em questão\nde influência, não fica nada atrás."
21010-71 = "Não é exagero dizer que, em Kivotos, quase tudo\nque leva o título de \"mais moderno\" ou\n\"mais avançado\" nasce dentro da Millennium."
21010-72 = "É uma colégio e tanto……\nmas, afinal, o que será que aconteceu lá?"
21010-73 = "Então deixa eu explicar. A Colégio de Ciências Millennium\njunto com a Trinity e a Gehenna, é\numa das grandes instituições conhecidas como\nas Três Grandes Academias de Kivotos."
21010-74 = "Apelidada de Millennium, ela valoriza a razão\ne a tecnologia mais do que qualquer outra academia."
21010-75 = "É especializada em pesquisa científica e se\ndestaca por reunir muitas alunas das áreas de exatas."
21010-76 = "Comparada às outras duas, Gehenna e Trinity\n— tradicionais feito velhas famílias de prestígio —,\nnão tem uma história tão longa; mas em questão\nde influência, não fica nada atrás."
21010-77 = "Não é exagero dizer que, em Kivotos, quase tudo\nque leva o título de \"mais moderno\" ou\n\"mais avançado\" nasce dentro da Millennium."
21010-78 = "Então, o que acha? Vamos até lá?"
21010-79 = "……"
21010-81 = "Millennium · Clube de Desenvolvimento de Jogos"
21010-82 = "Reforçando as boas-vindas……\nseja bem-vindo ao Clube de Desenvolvimento de Jogos\nSensei!"
21010-83 = "Fico muito feliz\nque você tenha vindo, Sensei."
21010-84 = "Eu sou a Momoi, roteirista do\nClube de Desenvolvimento de Jogos!"
21010-85 = "Eu sou a Midori. Sou ilustradora,\ncuido de toda a parte visual dos jogos."
21010-86 = "E tem também a nossa presidente, a Yuzu,\nque cuida do planejamento — agora ela\nnão tá aqui, mas contando com ela……"
21010-87 = "……nós somos o Clube de Desenvolvimento de Jogos da\nColégio de Ciências Millennium!"
21010-88 = "Boa! Então, já que o Professor chegou,\nbora pras \"Ruínas\"!"
21010-89 = "[s5] \"Ruínas……?\"\n[s6] \"Ei, dá pra me explicar a situação com um pouco mais de detalhe?\""
21010-90 = "Ah, então deixa eu explicar tudo\ndesde o começo, por partes."
21010-91 = "Ah, isso!"
21010-92 = "Então, ó: a gente do Clube de Desenvolvimento de Jogos\nsempre viveu numa boa, fazendo\nuns joguinhos de 16 bits e tal."
21010-93 = "Aí, um belo dia…… do nada,\no Conselho Estudantil partiu pra cima da gente!"
21010-94 = "Anteontem, a Yuuka, uma das Quatro Reis Celestiais do Conselho\n veio e cravou um ultimato na nossa cara."
21010-95 = "[s] \"Ultimato?\""
21010-96 = "Sobre isso, que tal\neu mesma explicar pessoalmente?"
21010-97 = "E-essa voz!?"
21010-99 = "Próximo episódio: A Tesoureira da Seminar, Yuuka."