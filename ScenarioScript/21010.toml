21010-62 = "\"O Departamento de Desenvolvimento#nde Jogos corre o risco de deixar de#nexistir.#nCom a ordem de dissolução decretada#npelo Conselho Estudantil,#na nossa ruína está logo ali, e a#núnica pessoa a quem podemos pedir#nsocorro é o Senhor.#nHerói, por favor, salve a gente!\""
