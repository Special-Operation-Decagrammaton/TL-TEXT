21010-72 = "É um colégio e tanto……#nmas, afinal, o que será que#naconteceu lá?"
21010-73 = "Então deixa eu explicar.#nA Escola Ciêntifica Millennium#njunto com a Trinity e a Gehenna,#né uma das grandes instituições#nconhecidas como as Três Grandes#nAcademias de Kivotos."
