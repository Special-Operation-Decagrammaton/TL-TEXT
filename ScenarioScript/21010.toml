[translation]
21010-1 = "Episódio 1: O Início da Aventura"
21010-2 = "……"
21010-4 = "Você consegue ouvir a minha voz……"
21010-6 = "Você está aí? Para salvar este mundo――"
21010-11 = "――Ó, herói."
21010-12 = "Eu estive esperando por você há muito tempo."
21010-13 = "Agora, vamos contar tudo. Nos tempos antigos, os celestiais e os demônios……"
21010-14 = "……"
21010-15 = "Corta, corta, coooorta!"
21010-16 = "Não, não, está muito clichê! Desse jeito, vai fracassar assim que for lançado!"
21010-17 = "Se eu fosse o usuário, no momento em que esse texto aparecesse no prólogo, eu diria: 'Ah, vou parar por aqui'!"
21010-18 = "Mais uma vez! Hum……"
21010-20 = "……Ó, herói, eu estava esperando por você."
21010-21 = "Eu sou a deusa 'Momoria'."
21010-23 = "Nosso mundo, 'Millennium Land', está enfrentando uma crise sem precedentes."
21010-24 = "Você é o único que pode superar essa crise e salvar o Departamento de Desenvolvimento de Jogos... não, salvar Millennium Land da ordem de fechamento do Conselho Estudantil."
21010-25 = "Pode ser uma jornada árdua…… mesmo assim, eu lhe peço, por favor."
21010-27 = "No que está por vir, no caminho da sua aventura……"
21010-28 = "Quais provações e adversidades o aguardam, eu ainda não sei."
21010-29 = "Mas…… por favor, até o fim, não perca a sua coragem."
21010-30 = "Pois ao lado do herói, certamente haverá garotas que compartilharão essa jornada com você."
21010-32 = "No novo mundo, você não será chamado por essas garotas de 'herói'……"
21010-34 = "Mas sim por um nome muito mais especial e apropriado."
21010-36 = "Esse nome é――"
21010-39 = "Sensei!!"
21010-41 = "???"
21010-42 = "……"
21010-43 = "[s1] \"Um teto que não me é familiar…….\"\n[s2] \"Onde estou……?\""
21010-44 = "Ah, acordou!?"
21010-45 = "Ah, acordou!?"
21010-46 = "Recobrou a consciência? Você tem sorte!"
21010-48 = "Não mude seu jeito de falar de repente, o Sensei está confuso."
21010-49 = "Hehe, é que eu estou tão feliz…… Sensei, você está bem? Achei que você não fosse acordar."
21010-50 = "Ficamos muito preocupadas. Quando a minha irmã jogou o PlayStation pela janela e ele atingiu a cabeça do Sensei, mesmo que tenha sido um acidente…… achei que eu me tornaria suspeita de um caso de assassinato."
21010-51 = "Peço desculpas em nome da minha irmã. Sinto muito, Sensei."
21010-52 = "Humpf. Falando nisso, Midori, quando eu gritei 'Será que atingi o Sensei!?', a primeira coisa que você disse foi 'O PlayStation está bem?', não foi?"
21010-53 = "I-Isso é porque ele é o item número 1 da lista de bens do nosso Departamento de Desenvolvimento de Jogos, então eu não pude evitar……"
21010-54 = "E-Enfim!!"
21010-55 = "O Sensei veio daquele Schale, não foi?"
21010-56 = "Uau, sério mesmo!? Então você leu a carta que enviamos! Mesmo que tivesse lido, eu não achei que você realmente viria!"
21010-57 = "[s] \"Sobre a carta, aquela……\""
21010-59 = "Schale - Escritório"
21010-60 = "Sensei, chegou uma solicitação da Millennium Science School."
21010-61 = "O remetente é…… o Departamento de Desenvolvimento de Jogos da Millennium? Parece ser isso. Vou ler."
21010-62 = "\"O Departamento de Desenvolvimento de Jogos está em crise. Com a ordem de fechamento do Conselho Estudantil, a ruína está próxima, e você é o único a quem podemos pedir ajuda. Ó, herói, por favor, salve-nos!\""
21010-63 = "Entendo. É muito interessante, por assim dizer…… dá para sentir claramente que elas estão desesperadas……"
21010-64 = "Ah, Sensei, você conhece a Millennium Science School?"
21010-65 = "[s3] \"Sim, um pouco.\"\n[s4] \"Não muito……\""
21010-66 = "Entendo. Como você sabe, a Millennium Science School é――"
21010-67 = "Uma das grandes escolas conhecidas como as Três Academias de Kivotos, junto com Trinity e Gehenna."
21010-68 = "Conhecida como Millennium, ela prioriza a lógica e a tecnologia mais do que qualquer outra escola."
21010-69 = "É especializada em pesquisa científica e tem como característica reunir muitos estudantes da área de exatas."
21010-70 = "Embora não tenha uma história tão longa quanto as outras duas, Gehenna e Trinity, que são como casas tradicionais renomadas, ela não fica atrás em termos de influência."
21010-71 = "Não é exagero dizer que quase tudo o que ostenta o nome de 'estado da arte' ou 'vanguarda' em Kivotos nasce em Millennium."
21010-72 = "Mas, afinal... o que será que aconteceu por lá?"
21010-73 = "Então, deixe-me explicar. A Millennium Science School é uma das grandes escolas conhecidas como as Três Grandes Academias de Kivotos, junto com Trinity e Gehenna."
21010-74 = "Conhecida como Millennium, ela prioriza a lógica e a tecnologia mais do que qualquer outra escola."
21010-75 = "É especializada em pesquisa científica e tem como característica reunir muitos estudantes da área de exatas."
21010-76 = "Embora não tenha uma história tão longa quanto as outras duas, Gehenna e Trinity, que são como casas tradicionais renomadas, ela não fica atrás em termos de influência."
21010-77 = "Não é exagero dizer que quase tudo o que ostenta o nome de 'estado da arte' ou 'vanguarda' em Kivotos nasce em Millennium."
21010-78 = "O que acha, vamos dar uma olhada?"
21010-79 = "……"
21010-81 = "Departamento de Desenvolvimento de Jogos de Millennium"
21010-82 = "Mais uma vez... bem-vindo ao Departamento de Desenvolvimento de Jogos, Sensei!"
21010-83 = "Ficamos felizes que tenha vindo, Sensei."
21010-84 = "Eu sou a Momoi, roteirista do Departamento de Desenvolvimento de Jogos!"
21010-85 = "Eu sou a Midori. Sou ilustradora e cuido de todo o visual dos jogos."
21010-86 = "E, embora não esteja aqui agora, incluindo nossa presidente Yuzu, que cuida do planejamento..."
21010-87 = "Nós somos o Departamento de Desenvolvimento de Jogos da Millennium Science School!"
21010-88 = "Beleza! Já que o Sensei chegou, vamos logo para as 'ruínas'!"
21010-89 = "[s5] \"Ruínas...?\"\n[s6] \"Ei, vocês poderiam explicar melhor a situação?\""
21010-90 = "Ah, então vou explicar desde o começo."
21010-91 = "Ah, sim!"
21010-92 = "Bem, primeiro, nosso Departamento de Desenvolvimento de Jogos sempre esteve criando jogos de 16 bits em paz, mas..."
21010-93 = "Um dia... fomos atacadas de repente pelo conselho estudantil!"
21010-94 = "Anteontem, recebemos um ultimato da Yuuka, uma das quatro grandes do conselho estudantil."
21010-95 = "[s] \"Um ultimato?\""
21010-96 = "Sobre isso, será que eu mesma poderia explicar diretamente?"
21010-97 = "E-essa voz!?"
21010-99 = "Próximo episódio: A tesoureira do Seminar, Yuuka"
