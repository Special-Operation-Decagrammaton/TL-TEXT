[translation]
21010-1 = "Episódio 1; O Início da Aventura"
21010-2 = "......"
21010-4 = "Você consegue ouvir a minha voz......"
21010-6 = "Você está aí? Aquele que salvará este mundo――"
21010-11 = "――Ó, Herói."
21010-12 = "Eu estive esperando por você por tanto tempo."
21010-13 = "Agora, contarei tudo a você. Nos tempos antigos, a Tribo Celestial e a Tribo Demoníaca......"
21010-14 = "......"
21010-15 = "Corta, corta, coooorta!"
21010-16 = "Não, não, tá muito clichê! Desse jeito o jogo vai flopar no momento em que for lançado!"
21010-17 = "Se eu fosse a jogadora, no momento em que esse texto aparecesse no prólogo eu pensaria: 'Ah, vou dropar'!"
21010-18 = "De novo! Hmmm......"
21010-20 = "......Ó, Herói, eu estava esperando por você."
21010-21 = "Eu sou a deusa 'Momoria'."
21010-23 = "O nosso mundo, 'Millennium Land', está enfrentando uma crise sem precedentes."
21010-24 = "O único capaz de superar essa crise e salvar o Departamento de Desenvolvimento de Jogos da ordem de fechamento do Conselho Estudantil...... digo, salvar Millennium Land, é você."
21010-25 = "Pode ser uma jornada árdua...... mas, mesmo assim, eu imploro a você."
21010-27 = "No fim da aventura que você está prestes a começar......"
21010-28 = "Não sabemos quais provações ou adversidades o aguardam."
21010-29 = "Mas...... por favor, nunca perca a coragem até o fim."
21010-30 = "Pois as garotas que compartilharão essa jornada estarão sempre ao seu lado, Herói."
21010-32 = "Neste novo mundo, você não será chamado de 'Herói' por essas garotas......"
21010-34 = "Você será chamado por um nome muito mais especial e apropriado."
21010-36 = "E esse nome é――"
21010-39 = "Sensei!!"
21010-41 = "???"
21010-42 = "......"
21010-43 = "[s1] \"Um teto desconhecido......\"\n[s2] \"Onde...... estou?\""
21010-44 = "Ah, ele acordou!?"
21010-45 = "Ah, ele acordou!?"
21010-46 = "Você acordou? Você tem muita sorte!"
21010-48 = "Para de falar estranho do nada, você tá deixando o Sensei confuso."
21010-49 = "Hehe, é que eu fiquei feliz... Você tá bem, Sensei? Achei que não fosse mais acordar."
21010-50 = "Ainda bem mesmo. Quando o PlaySation que a minha irmã jogou pela janela acertou a cabeça do Sensei, mesmo que por acidente... Achei que fôssemos virar suspeitas de um caso de assassinato."
21010-51 = "Peço desculpas no lugar da minha irmã. Me perdoe, Sensei."
21010-52 = "Hmph. Você fala isso, Midori, mas quando eu gritei 'Acho que acertei o Sensei!?', a primeira coisa que você disse foi 'O PlaySation tá inteiro!?'"
21010-53 = "I-Isso é porque ele é o patrimônio número 1 do Departamento de Desenvolvimento de Jogos, então eu falei sem pensar..."
21010-54 = "D-De qualquer forma!!"
21010-55 = "O Sensei veio daquela Schale, não veio?"
21010-56 = "Uau, sério!? Então você leu a carta que nós enviamos! Mesmo que tivesse lido, eu não achei que viria mesmo!"
21010-57 = "[s] \"Essa carta, por acaso era...\""
21010-59 = "Schale - Escritório"
21010-60 = "Sensei, recebemos um pedido da Millennium Science School."
21010-61 = "As remetentes são... do Departamento de Desenvolvimento de Jogos da Millennium? Parece que sim. Vou ler para você."
21010-62 = "「O Departamento de Desenvolvimento de Jogos está atualmente em risco de extinção. Com a ruína iminente devido à ordem de fechamento do Conselho Estudantil, você é o único a quem podemos pedir ajuda. Ó, Herói, por favor, nos salve!」"
21010-63 = "Entendo. Achei muito interessante, por assim dizer... dá para sentir claramente que elas estão bem desesperadas..."
21010-64 = "Ah, o senhor conhece a Millennium Science School, Sensei?"
21010-65 = "[s3] \"Sim, um pouco.\"\n[s4] \"Não muito...\""
21010-66 = "Entendi. A Millennium Science School, como o senhor sabe――"
21010-67 = "É uma grande academia que, juntamente com a Trinity e a Gehenna, compõe as Três Grandes Academias de Kivotos."
21010-68 = "Conhecida como Millennium, ela valoriza a racionalidade e a tecnologia mais do que qualquer outra academia."
21010-69 = "Eles se especializam em pesquisa científica, e sua principal característica é a grande concentração de alunas da área de exatas."
21010-70 = "Em comparação com as outras duas, Gehenna e Trinity, que são como famílias tradicionais e prestigiosas, a sua história não é tão longa, mas não fica atrás em termos de influência."
21010-71 = "Não é exagero dizer que a maioria das coisas que levam o título de 'estado da arte' ou 'tecnologia de ponta' em Kivotos nascem na Millennium."
21010-72 = "É esse tipo de escola, mas... o que será que aconteceu por lá?"
21010-73 = "Então eu vou explicar. A Millennium Science School é uma grande academia que, juntamente com a Trinity e a Gehenna, compõe as Três Grandes Academias de Kivotos."
21010-74 = "Conhecida como Millennium, ela valoriza a racionalidade e a tecnologia mais do que qualquer outra academia."
21010-75 = "Eles se especializam em pesquisa científica, e sua principal característica é a grande concentração de alunas da área de exatas."
21010-76 = "Em comparação com as outras duas, Gehenna e Trinity, que são como famílias tradicionais e prestigiosas, a sua história não é tão longa, mas não fica atrás em termos de influência."
21010-77 = "Não é exagero dizer que a maioria das coisas que levam o título de 'estado da arte' ou 'tecnologia de ponta' em Kivotos nascem na Millennium."
21010-78 = "O que o senhor acha, gostaria de ir até lá ver?"
21010-79 = "......"
21010-81 = "Millennium - Depto. de Desenvolvimento de Jogos"
21010-82 = "Novamente... bem-vindo ao Departamento de Desenvolvimento de Jogos, Sensei!"
21010-83 = "Fico feliz que você tenha vindo, Sensei."
21010-84 = "Eu sou a Momoi, a roteirista do Departamento de Desenvolvimento de Jogos!"
21010-85 = "Eu sou a Midori. Sou ilustradora e cuido de toda a parte visual dos jogos."
21010-86 = "Ah, e também tem a Yuzu, a nossa presidente, que cuida do planejamento, mas ela não está aqui agora..."
21010-87 = "Nós somos o Departamento de Desenvolvimento de Jogos da Millennium Science School!"
21010-88 = "Beleza! Já que o Sensei tá aqui, vamos pras 'Ruínas'!"
21010-89 = "[s5] \"Ruínas...?\"\n[s6] \"Poderiam me explicar a situação com um pouco mais de detalhes?\""
21010-90 = "Ah, então vou explicar tudo desde o começo na ordem."
21010-91 = "Ah, sim!"
21010-92 = "Então, o Departamento de Desenvolvimento de Jogos sempre fez jogos de 16 bits tranquilamente até agora."
21010-93 = "Mas um dia... fomos atacadas de repente pelo Conselho Estudantil!"
21010-94 = "E antes de ontem, a Yuuka, um dos Quatro Reis Celestiais do Conselho Estudantil, nos deu um ultimato."
21010-95 = "[s] \"Ultimato?\""
21010-96 = "Sobre isso, que tal eu mesma explicar diretamente?"
21010-97 = "E-Essa voz!?"
21010-99 = "Próximo Episódio; A Tesoureira da Seminar, Yuuka"