[translation]
2300303-1 = "エナドリ中毒"
2300303-2 = "ヴェリタス・ハッカー休憩室"
2300303-5 = "あっ、先生。来たんだ。"
2300303-6 = "新しく改造したドローンの制御実験がもうそろそろ終わるから……#nごめん、ちょっとだけ待ってて。"
2300303-7 = "[s] 買ってきたエナジードリンクを手渡す。"
2300303-8 = "あ、「妖怪MAX」のパッションフルーツ味だね。ちょうど集中が切れかけてたところだった……ありがとう。"
2300303-10 = "ふぅ……「妖怪MAX」といえばこの味に限るね。#n他の味は人工甘味料特有の苦みがあって、後味がちょっと……。"
2300303-11 = "わざわざ買ってきてくれてありがとう。"
2300303-12 = "昨日からずっと新しいプログラムを作るのに忙しかったから、中々買い物に行く時間も取れなくって。"
2300303-13 = "ご飯は食べたの、って？大丈夫、合間にエナジードリンクを飲んでれば平気。"
2300303-14 = "「妖怪MAX」は目を覚ますのに効くカフェインだけじゃなく、活力の元になる糖分やビタミンも十分入ってるから。"
2300303-15 = "これ一つで、徹夜作業もなんのその！"
2300303-16 = "[s] 今日一日で、エナジードリンクを何本飲んだのか聞いてみる。"
2300303-17 = "そんなに飲んでないよ、多分4本ぐらいかな？"
2300303-18 = "普段に比べたら、むしろ少ない方だよ。多い時は10本とかの日もあるから。"
2300303-19 = "……ん？エナジードリンクの飲み過ぎは体に良くないから、できるだけ飲まないほうが良い、って？"
2300303-20 = "でも、エナジードリンク無しでの徹夜作業は眠いし、甘い炭酸がないとやる気が出ないし……。"
2300303-21 = "うーん……。"
2300303-22 = "先生がそこまで言うなら仕方ない。"
2300303-23 = "分かった、これを機に一回止めてみる。"
2300303-24 = "まあ、眠気を覚ますにはサプリメントっていう手もあるし、ミント系のガムもある。"
2300303-25 = "でも、そうなると夜遅くまで一人で作業するのは難しそうだから、代わりに……先生。私の手伝い、してくれる？"
2300303-26 = "そんなに難しいことは頼まないから心配しないで。"
2300303-27 = "まずはこの工具箱を、こっちに移してもらって……。"
2300303-29 = "次の日の朝。"
2300303-30 = "ふあぁ……。"
2300303-31 = "[s] \"おはよう、ハレ。\""
2300303-32 = "おはよう、先生……。"
2300303-33 = "昨日は全然眠れなくて……しばらくベッドの上でもぞもぞしてて、朝方になる頃にようやく眠れた。"
2300303-34 = "なんだかだるくて、ずっと疲れた感じがしてて……これ、カフェインの禁断症状なのかな。"
2300303-35 = "こんな時、「妖怪MAX」を一本入れればすぐに元気になるんだけど……。"
2300303-36 = "大丈夫、しばらくエナジードリンクは止めるって決めたから……もう少し頑張ってみる。"
2300303-37 = "たった一種類の飲み物を我慢するだけ、そんなに難しいことでもないはず。"
2300303-39 = "さらに次の日の朝。"
2300303-40 = "…………。"
2300303-41 = "[s1] \"大丈夫？\"\n[s2] \"具合悪そうだけど……。\""
2300303-42 = "頭は痛いし、体も重い、おまけに吐き気までする……ちゃんと寝たのに、疲労感が取れなくて……今にも倒れそう。"
2300303-43 = "頭は痛いし、体も重い、おまけに吐き気までする……ちゃんと寝たのに、疲労感が取れなくて……今にも倒れそう。"
2300303-44 = "やっぱり、カフェインの禁断症状だよね……。"
2300303-45 = "こんなにカフェイン中毒になってたなんて……過去の自分が憎い……。"
2300303-46 = "先生、その……エナジードリンク、一口だけ飲んじゃダメ？"
2300303-47 = "本当に一口でも飲めば、元気になりそうな気がするんだけど……。"
2300303-48 = "……やっぱりダメ、だよね？"
2300303-49 = "[s] \"今飲んだら、昨日の努力が水の泡になっちゃうよ。\""
2300303-50 = "……分かった。今日は違う方法で我慢してみる。"
2300303-51 = "ミントガム、どこにあったっけ……。"
2300303-53 = "さらにまた次の日の朝。"
2300303-59 = "ダメ……もう耐えられない……。#nカフェイン……カフェインが足りない……。"
2300303-60 = "先生……もう限界……早く、エナドリを……。"
2300303-61 = "[s3] エナジードリンクを渡す。\n[s4] 断る。"
2300303-63 = "たとえ先生がダメだと言っても……もう我慢できない！"
2300303-65 = "ふぅ……冷たい……美味しい……。"
2300303-66 = "久々のエナジードリンク、体中の隅々にまで染みわたって……溶けちゃいそう……。"
2300303-67 = "やっぱりエナジードリンクなしで3日も耐えるなんて、到底無理だったよ……。"
2300303-68 = "[s] \"じゃあ今日はこれで満足したんだし、また止めてみる？\""
2300303-69 = "ううん……もう止められない。この味はやっぱり諦められない！"
2300303-70 = "たとえカフェイン中毒で死ぬことになっても……エナジードリンクを止めるなんてことは、今後絶対にない！"
