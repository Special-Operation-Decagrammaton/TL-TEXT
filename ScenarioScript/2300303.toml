[translation]
2300303-1 = "Viciada em energético"
2300303-2 = "Sala de Descanso da Veritas"
2300303-5 = "Ah, Sensei. Você chegou."
2300303-6 = "O teste de controle do drone que modifiquei está quase acabando, então...#nDesculpe, espere só um pouquinho."
2300303-7 = "[s] Entrega o energético que comprou."
2300303-8 = "Ah, é o sabor maracujá do \"Youkai MAX\". Eu estava justamente perdendo a concentração... obrigado."
2300303-10 = "Ufa... Quando se fala em \"Youkai MAX\", esse é o único sabor que presta.#nOs outros têm aquele amargor típico de adoçante artificial, e o retrogosto é meio..."
2300303-11 = "Obrigada por ter se dado ao trabalho de comprar para mim."
2300303-12 = "Estive ocupada criando um novo programa desde ontem, então não consegui tempo para ir às compras."
2300303-13 = "Se eu comi alguma coisa? Está tudo bem, fico bem se tomar energéticos nos intervalos."
2300303-14 = "O \"Youkai MAX\" não tem só a cafeína para me manter acordada, mas também açúcar e vitaminas suficientes para me dar energia."
2300303-15 = "Com um desses, virar a noite trabalhando não é nada!"
2300303-16 = "[s] Pergunta quantas latas de energético ela bebeu hoje."
2300303-17 = "Não bebi tanto assim, talvez umas 4?"
2300303-18 = "Comparado ao normal, é até pouco. Tem dias que chego a beber 10."
2300303-19 = "...Hm? Beber energético demais faz mal à saúde, então é melhor evitar o máximo possível?"
2300303-20 = "Mas, trabalhar a noite toda sem energético dá sono, e sem um refrigerante doce não sinto vontade de fazer nada..."
2300303-21 = "Hum..."
2300303-22 = "Se o Sensei está dizendo isso, não tenho escolha."
2300303-23 = "Entendido, vou aproveitar a oportunidade e parar de beber."
2300303-24 = "Bem, para espantar o sono, existem suplementos ou até chicletes de menta."
2300303-25 = "Mas, se for assim, vai ser difícil trabalhar sozinha até tarde da noite, então... Sensei. Você pode me ajudar?"
2300303-26 = "Não se preocupe, não vou pedir nada muito difícil."
2300303-27 = "Primeiro, leve esta caixa de ferramentas para lá..."
2300303-29 = "Na manhã seguinte."
2300303-30 = "Ahhh..."
2300303-31 = "[s] \"Bom dia, Hare.\""
2300303-32 = "Bom dia, Sensei..."
2300303-33 = "Ontem não consegui dormir nada... Fiquei me revirando na cama por um tempo e só consegui pegar no sono quando já estava amanhecendo."
2300303-34 = "Estou me sentindo mole e exausta... Será que isso é crise de abstinência de cafeína?"
2300303-35 = "Nessas horas, se eu tomasse um \"Youkai MAX\", ficaria bem na hora..."
2300303-36 = "Tudo bem, decidi que vou ficar um tempo sem energéticos... Vou me esforçar um pouco mais."
2300303-37 = "É só aguentar ficar sem um tipo de bebida, não deve ser tão difícil assim."
2300303-39 = "Na manhã seguinte."
2300303-40 = "............"
2300303-41 = "[s1] \"Você está bem?\"\n[s2] \"Parece que você não está se sentindo bem...\""
2300303-42 = "Minha cabeça dói, meu corpo está pesado e, para completar, estou enjoada... Dormi direito, mas o cansaço não passa... Sinto que vou desmaiar a qualquer momento."
2300303-43 = "Minha cabeça dói, meu corpo está pesado e, para completar, estou enjoada... Dormi direito, mas o cansaço não passa... Sinto que vou desmaiar a qualquer momento."
2300303-44 = "É, com certeza é crise de abstinência de cafeína..."
2300303-45 = "Eu estava tão viciada em cafeína assim... Odeio a minha eu do passado..."
2300303-46 = "Sensei, tipo... não posso tomar só um golinho de energético?"
2300303-47 = "Sinto que se eu tomar só um gole, vou ficar bem..."
2300303-48 = "...Acho que não pode, né?"
2300303-49 = "[s] \"Se beber agora, todo o seu esforço de ontem terá sido em vão.\""
2300303-50 = "...Entendi. Hoje vou tentar aguentar de outro jeito."
2300303-51 = "Onde foi que eu coloquei o chiclete de menta..."
2300303-53 = "Na manhã seguinte."
2300303-59 = "Não dá... não aguento mais...#nCafeína... preciso de cafeína..."
2300303-60 = "Sensei... cheguei no meu limite... rápido, me dê um energético..."
2300303-61 = "[s3] Entregar o energético.\n[s4] Recusar."
2300303-63 = "Mesmo que o Sensei diga que não pode... eu não aguento mais!"
2300303-65 = "Ufa... gelado... que delícia..."
2300303-66 = "Faz tempo que não tomo um energético, está se espalhando por cada canto do meu corpo... sinto que vou derreter..."
2300303-67 = "Realmente, aguentar três dias sem energético era impossível..."
2300303-68 = "[s] \"Então, já que está satisfeita por hoje, que tal tentar parar de novo?\""
2300303-69 = "Não... não consigo mais parar. Eu simplesmente não consigo desistir desse sabor!"
2300303-70 = "Mesmo que eu acabe morrendo de overdose de cafeína... eu nunca, jamais vou parar de tomar energético!"
