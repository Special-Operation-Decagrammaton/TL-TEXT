[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 22/06.]
1011005-1 = "O Primeiro Passo de uma Conversa" 
1011005-7 = "...Sensei? O que faz por aqui...?" 
1011005-8 = "Eu até gosto de usar umas 'desculpas' de vez em quando,#nmas eu juro que não te convidei de forma tão descuidada assim..." 
1011005-9 = "Bom, não que eu me importe.\nO Sensei é sempre muito bem-vindo." 
1011005-10 = "Mas, mais importante do que isso.\nEsta é a biblioteca exclusiva do Tea Party." 
1011005-11 = "Um lugar onde apenas os membros\ndo Tea Party podem entrar, mas..." 
1011005-12 = "[s1] \"Eu tava andando e acabei me perdendo aqui por acaso.\"\n[s2] \"Me perdi no caminho e vim parar aqui.\"" 
1011005-15 = "...Certo. Se o Sensei diz,\nentão vamos fingir que foi isso mesmo." 
1011005-16 = "Afinal, é uma alegria para esta biblioteca\nreceber um usuário tão 'precioso'." 
1011005-17 = "Nunca tivemos a oportunidade de falar sobre isso, mas...\nO Tea Party tem muitas estudantes sob suas asas, como esperado." 
1011005-18 = "E existem várias 'instalações exclusivas do Tea Party'\nespalhadas conforme a necessidade, mas..." 
1011005-19 = "No caso desta biblioteca, como pode ver...\nela é praticamente só minha." 
1011005-20 = "A maioria das alunas só vem aqui quando precisam\nde materiais que só existem neste acervo." 
1011005-21 = "Se o objetivo for apenas ler,\nTrinity tem bibliotecas muito mais convenientes." 
1011005-22 = "Então, por que eu venho ler aqui...?\nAh, é uma dúvida bem justa." 
1011005-23 = "Eu tento sempre ler os meus livros\nfora do meu quarto." 
1011005-24 = "O meu quarto é aconchegante demais." 
1011005-25 = "Se eu abrisse um livro lá dentro,\neu passaria o dia e a noite inteira na cama..." 
1011005-26 = "Porém, se me perguntarem se qualquer lugar serve,#não é tão simples assim, sabe?" 
1011005-27 = "Se quer saber a verdade, eu adoraria ler\ne discutir os meus gostos com todo mundo, mas..." 
1011005-28 = "A diferença nas nossas 'posições'\nacaba trazendo certos problemas." 
1011005-29 = "A posição de membro do 'Tea Party',\nquer eu queira ou não,#nfaz com que as outras pessoas me vejam\ncomo uma figura intocável e grandiosa." 
1011005-30 = "Em resumo, não há debate――frequentemente minhas palavras são\naceitas como a 'opinião correta', independentemente do que eu diga." 
1011005-31 = "E isso vem sendo um pé no saco pra mim\njá faz bastante tempo." 
1011005-32 = "A não ser que seja alguém bem íntimo,\nou que esteja na mesma posição que eu..." 
1011005-33 = "Realizar o meu simples desejo de 'apenas curtir uma conversa'...\né acompanhado de muita dificuldade." 
1011005-34 = "[s3] \"Isso não te deixa solitária?\"\n[s4] \"Você pretende continuar lendo sozinha daqui pra frente?\"" 
1011005-37 = "...Eu entendo muito bem o que\nvocê quer dizer." 
1011005-38 = "Mas não precisa se preocupar com o meu corpo." 
1011005-39 = "Minhas amizades não estão arruinadas.\nEu não me sinto sozinha no meu dia a dia." 
1011005-43 = "No entanto... veja bem..." 
1011005-44 = "Se me permitir um desejo egoísta..." 
1011005-45 = "Não precisa ser sempre. Mas você não gostaria de\nser o meu parceirinho de conversas na cama... digo, sobre 'leitura'?" 
1011005-46 = "Se for o Sensei, não vai ligar a mínima\npara a minha 'posição'..." 
1011005-47 = "E vai trocar palavras e opiniões sem reservas apenas com o 'eu', não é?" 
1011005-48 = "Acredito que, se for o Sensei, até eu serei\ncapaz de me soltar e revelar as minhas partes mais abertas." 
1011005-49 = "[s5] \"Claro, sem problemas.\"\n[s6] \"Com todo o prazer.\"" 
1011005-52 = "Aceitou tão rápido assim... fufu.\nEspero que não se arrependa, hein?" 
1011005-53 = "Para começar logo... tem uma coisa bem interessante\nque eu estava doida para fazer." 
1011005-54 = "Gostaria de te apresentar\nalgumas das minhas recomendações literárias." 
1011005-55 = "Ou, talvez seja mais gostoso descobrirmos juntos\num livro que faça o tipo do Sensei.#nAfinal, esta biblioteca guarda praticamente todos\nos livros renomados de Trinity." 
1011005-56 = "A não ser que seja um livro antigo e raríssimo,\ncom certeza encontraremos o que você deseja provar." 
1011005-57 = "E na pior das hipóteses, se não estiver aqui,#neu posso usar os privilégios do Tea Party\npara trazer qualquer coisa pra você, mas..." 
1011005-62 = "Se eu fizer isso, a presidente do Comitê da Biblioteca\ncom certeza não ficaria calada." 
1011005-63 = "Mas a verdade é que eu quero muito te recomendar alguns... \nVocê gostaria de dar uma olhada na minha 'lista de sugestões' que\neu vinha guardando no coração justamente para um dia como esse?" 
1011005-64 = "Eu fui bem seletiva nas escolhas, sabe..." 
1011005-68 = "Hmm... entendo... Então é esse\nlivro que chamou a sua atenção pervertida..." 
1011005-72 = "......Ah." 
1011005-73 = "[s7] \"...Seia?\"\n[s8] \"O que foi?\"" 
1011005-76 = "A-Ah, nada... É que, por coincidência,\nesse único livro que você escolheu não está aqui." 
1011005-77 = "Na verdade, é o livro que eu estou\nlendo e mantendo comigo no momento." 
1011005-78 = "E esse livro... está guardadinho\nlá no meu quarto." 
1011005-79 = "Sinceramente, não achei que você iria mirar\ne acertar justamente nele..." 
1011005-80 = "De qualquer forma, o Sensei escolher justo\num livro que está na intimidade do meu quarto..." 
1011005-81 = "Parece que a minha sorte está\nótima hoje. Fufu." 
1011005-85 = "Para eu poder te entregar esse livro,\nvocê poderia me acompanhar até o meu quarto?" 
1011005-86 = "De vez em quando, não é nada mau desfrutar\nde uma sorte (e uma companhia) que não planejamos." 
1011005-87 = "Eu também pretendia pegar alguns outros livros hoje, mas...\nComo você bem sabe, eu sou uma garota frágil e delicada." 
1011005-94 = "[ns9] \"Seia?\"\n[ns10] \"Você vai pegar bastante coisa?\"" 
1011005-97 = "Não é sempre que a gente é abençoada\ncom uma sorte gostosa dessas, não é?" 
1011005-98 = "Hoje eu serei só um pouquinho gananciosa." 
1011005-99 = "Mas levar tudo isso pro meu quarto sozinha...\né meio pesado demais para o meu corpinho." 
1011005-100 = "......Sensei." 
1011005-106 = "Poderia dar uma passadinha lá e me ajudar?" 
1011005-108 = "(Depois disso, fui com a Seia carregar os livros até o quarto dela)" 
1011005-109 = "(Os 'livros recomendados' da Seia estavam perfeitamente\narrumados na cama... como se já estivessem esperando pela gente)" 