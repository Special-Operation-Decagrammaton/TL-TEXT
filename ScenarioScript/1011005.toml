[translation]
1011005-1 = "A primeira etapa do processo de contar histórias"
1011005-7 = "...... doutor? Por que você está aqui ......?"
1011005-8 = "Não pretendo ser um provocador bagunçado, mas quero que você veja isso como um \"pretexto\" para a peculiaridade. ......"

1011005-9 = "Não, os professores são sempre bem-vindos."
1011005-10 = "Não se trata disso. Esta é a biblioteca dedicada do Tea Party."
1011005-11 = "É um lugar onde somente os estudantes que pertencem ao Tea Party são permitidos. ......"
1011005-12 = "[s1] \"Eu estava caminhando e me perdi por acaso. \"\n[s2] \"Eu estava perdido e cheguei lá. \"\n[s2]\"\"\n1011005-15 = \"...... Bem, se é isso que o sensei diz, então é isso que faremos.\"\n1011005-16 = \"É um prazer para esta biblioteca ter mais usuários valiosos.\"\n1011005-17 = \"Embora não tenhamos tido a oportunidade de discutir esse assunto em detalhes, o ...... tea party tem vários alunos, de acordo com a organização.\"\n1011005-18 = \"Também existem \"instalações dedicadas ao Tea Party\", algumas delas por necessidade: ......\"\n1011005-19 = \"Quanto a essa biblioteca, como você pode ver, ela é toda reservada.\"\n1011005-20 = \"Muitos alunos só o utilizam quando estão procurando materiais que, inevitavelmente, só estão disponíveis aqui.\"\n1011005-21 = \"Se estiver visitando com o objetivo de ler, há muitas outras bibliotecas mais convenientes.\"\n1011005-22 = \"Então, por que estou aqui lendo um livro ......? Sim, essa é uma pergunta justa.\"\n1011005-23 = \"Tento ler livros fora do meu quarto o máximo possível.\"\n1011005-24 = \"Não deve ser muito aconchegante em um cômodo.\"\n1011005-25 = \"Se eu abrisse um livro em meu quarto, eu o leria dia e noite.\"\n1011005-26 = \"Entretanto, a dificuldade é que não é tão fácil perguntar se é possível ir a algum lugar externo.\"\n1011005-27 = \"Para dizer a verdade, eu adoraria ler e discutir o livro com todos. ......\"\n1011005-28 = \"As diferenças de posição causam muitos danos.\"\n1011005-29 = \"A posição do \"Tea Party\" faz com que os outros deduzam, querendo ou não, que minha vida interior é sublime.\"\n1011005-30 = \"Afinal, não se trata de uma discussão - muitas vezes minhas palavras são resolvidas como \"opinião correta\", independentemente de seu conteúdo.\"\n1011005-31 = \"Há muito tempo estou um pouco abalado com isso.\"\n1011005-32 = \"Somos almas gêmeas ou somos iguais? ......\"\n1011005-33 = \"É um desafio realizar o desejo de \"apenas aproveitar a conversa\".\"\n1011005-34 = \"[s3] \"Isso não o deixaria solitário? \"\n[s4] \"Você vai ficar lendo livros sozinho pelo resto da vida? \"\"\n[s3]]\"\n1011005-37 = \"...... Entendo o que você quer dizer.\"\n1011005-38 = \"Não se preocupe.\"\n1011005-39 = \"Não é que minhas amizades estejam rompidas. Não me sinto solitário em meu dia a dia.\"\n1011005-43 = \"Mas ...... sim ......\"\n1011005-44 = \"Se você me perdoa o egoísmo: ......\"\n1011005-45 = \"Não me importo se for só de vez em quando. Você estaria disposto a conversar comigo sobre leitura?\"\n1011005-46 = \"Um sensei não se importaria com minha \"posição\" ......\"\n1011005-47 = \"Você se sentiria à vontade para compartilhar suas opiniões comigo, não é mesmo?\""

1011005-48 = "Acho que me sentiria à vontade para compartilhar minhas opiniões com um sensei primeiro."
1011005-49 = "[s5] \"Claro que pode. \"\n[s6] \"Com prazer. \"\n[s6]\"\"\n1011005-52 = \"Você não se arrependerá de ter dito duas palavras, não é mesmo?\"\n1011005-53 = \"Sei que é cedo, mas ...... Estou querendo fazer isso há algum tempo.\"\n1011005-54 = \"Posso apresentar minhas recomendações?\"\n1011005-55 = \"Não, ou poderíamos colaborar para encontrar um dos livros favoritos do sensei. #Afinal, é aqui que quase todos os livros de destaque do Trinity estão guardados.\"\n1011005-56 = \"A menos que seja um livro antigo muito raro, você provavelmente encontrará o que deseja.\"\n1011005-57 = \"É bem provável que, mesmo que não esteja aqui, eu possa encomendar pelo menos uma cópia da autoridade do Tea Party #n. ......\"\n1011005-62 = \"Se eu fizesse isso, o presidente do comitê da biblioteca não ficaria calado.\"\n1011005-63 = \"Mas é verdade que eu gostaria de recomendar livros. ...... Você pode dar uma olhada na minha \"lista de recomendações\", que eu tenho préaquecido para dias como este?\"\n1011005-64 = \"Você ainda precisa ser muito seletivo com isso. ......\"\n1011005-68 = \"Hmmm...... Estou vendo...... que você escolheu esse livro......\"\n1011005-72 = \"...... Ah.\"\n1011005-73 = \"[s7] \"......Sayer? \"\n[s8] \"What's wrong? \"\"\n1011005-76 = \"Ah, não, apenas o livro escolhido pelo sensei ...... não está aqui.\"\n1011005-77 = \"Na verdade, estou prestes a alugar um.\"\n1011005-78 = \"Eu guardo esse livro em meu quarto.\"\n1011005-79 = \"Não acho que eu escolheria isso como um ponto de referência. ......\"\n1011005-80 = \"De qualquer forma, eu não sabia que o sensei escolheria os livros da sala: ......\"\n1011005-81 = \"Dizem que hoje é seu dia de sorte.\"\n1011005-85 = \"Você pode me acompanhar até meu quarto depois para que eu possa lhe dar o livro?\"\n1011005-86 = \"Às vezes, não é uma má ideia aproveitar a pura sorte não intencional.\"\n1011005-87 = \"Eu também ia pegar um livro emprestado hoje, mas ...... sou uma pessoa sem poderes.\"\n1011005-94 = \"[ns9] \"Sayre? \"\n[ns10] \"Você pega muito emprestado, não é? \"\"\n[ns10]\""

1011005-97 = "Nem sempre temos esse tipo de sorte tantas vezes."
1011005-98 = "Vamos ser um pouco gananciosos hoje."
1011005-99 = "É um pouco pesado demais para uma pessoa carregar para casa. ......"
1011005-100 = "...... Sensei."
1011005-106 = "Você pode ajudar?"
1011005-108 = "(Depois, carregamos juntos os livros de Seia para o quarto dela)"
1011005-109 = "(As \"recomendações de livros\" de Seia foram colocadas sobre a mesa como se estivessem esperando por ela)."

