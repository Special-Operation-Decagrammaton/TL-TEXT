[translation]
1011005-1 = "語らいの第一歩"
1011005-7 = "……先生？どうしてここに……？"
1011005-8 = "流石にあれを「口実」と捉えて欲しいと言うほど、#n雑なお誘いをしているつもりはないのだが……。"
1011005-9 = "いや、先生ならいつでも大歓迎だがね。"
1011005-10 = "そんなことよりも、だ。ここはティーパーティーの専用図書館。"
1011005-11 = "ティーパーティーに所属する生徒しか入れない場所なのだが……"
1011005-12 = "[s1] \"歩いてたら偶然迷い込んでたんだ。\"\n[s2] \"道に迷ってたら辿り着いてたんだ。\""
1011005-15 = "……まぁ、先生がそう言うのなら、そういうことにしておこう。"
1011005-16 = "貴重な利用者が増えるのは、この図書館にとって喜ばしいことだからね。"
1011005-17 = "これまで詳しく話す機会は無かったが……ティーパーティーは組織相応に、数多の生徒を抱えている。"
1011005-18 = "「ティーパーティー専用の施設」もまた、必要に応じていくつか存在しているのだが……"
1011005-19 = "こと、この図書館に関しては、御覧の通りの貸切状態なのだよ。"
1011005-20 = "多くの生徒は、どうしてもここにしか無い資料を探す時くらいでしか、ここを利用しないんだ。"
1011005-21 = "読書を目的として訪れるなら、より利便性の高い図書館が他にいくらでもあるのだよ。"
1011005-22 = "なら、なぜ私はここで本を読むのか……ああ、もっともな疑問だ。"
1011005-23 = "なるべく本は自室以外で読むよう心掛けている。"
1011005-24 = "部屋だと居心地が良すぎていけない。"
1011005-25 = "もし自室で本を開こうものなら、昼も夜もなく読み続けてしまうのだよ。"
1011005-26 = "とはいえ外ならどこでもいいかと問われれば、#nそう容易い話でも無いのが難点でね。"
1011005-27 = "本音を言えば、皆と一緒に本を読んで、語り合いたいところだが……"
1011005-28 = "立場の違いは、少なからずの弊害をもたらすものだ。"
1011005-29 = "「ティーパーティー」という立場は、望むと望まざるとに関わらず、#n私の内面を崇高なものとして、他者に推察させる。"
1011005-30 = "つまるところ、議論にはならず――往々にして私の言葉は、その内容の如何を問わず「正しい意見」として解決される。"
1011005-31 = "私は長らくそれが億劫でね。"
1011005-32 = "気心の知れた間柄か、はたまた対等な立場か……"
1011005-33 = "「ただ会話を楽しみたい」という願いの実現には、困難が伴うのだよ。"
1011005-34 = "[s3] \"それだと寂しくない？\"\n[s4] \"この先もずっと一人で本を読むつもりなの？\""
1011005-37 = "……君の言いたいことは分かっている。"
1011005-38 = "心配は無用だ。"
1011005-39 = "交友関係が破綻している訳では無いからね。日々を歩むに当たって、孤独を感じてはいないさ。"
1011005-43 = "だが……そうだな……"
1011005-44 = "我が儘を許してもらえるならば……"
1011005-45 = "偶にで構わない。「読書」について、話し相手になってはくれないだろうか。"
1011005-46 = "先生なら、私の「立場」など構いもせず……"
1011005-47 = "「私」と気兼ねなく意見を交わしてくれるだろう？"
1011005-48 = "さしもの私も、まずは先生となら、気兼ねなく意見を交わせると思うんだ。"
1011005-49 = "[s5] \"もちろんいいよ。\"\n[s6] \"喜んで。\""
1011005-52 = "二つ返事をしたこと、後悔しないでくれよ？"
1011005-53 = "早速なのだが……前からやりたいと思っていたことがあるんだ。"
1011005-54 = "私のお薦めを紹介させてもらってもいいだろうか。"
1011005-55 = "いや、それとも先生好みの一冊を協力して見つけるのも良いな。#n何せここには、トリニティで著名な本のほぼすべてが所蔵されている。"
1011005-56 = "よほど珍しい古書でもない限り、望みのものがきっと見つかるだろう。"
1011005-57 = "万に一つ、ここに無かったとしても、#nティーパーティーの権限で一冊ぐらい取り寄せることもできるんだが……"
1011005-62 = "そんなことをすれば、図書委員会の委員長が黙ってないだろう。"
1011005-63 = "だが、本を薦めたいのは事実……こんな日のために[ruby=かね]予[/ruby]てより温めてきた、私の「おすすめリスト」を見てくれるかい？"
1011005-64 = "これでも厳選をしていてね……"
1011005-68 = "ふむ……なるほど……その本を選ぶとは……"
1011005-72 = "......あ。"
1011005-73 = "[s7] \"……セイア？\"\n[s8] \"どうしたの？\""
1011005-76 = "あ、いや……先生が選んだその本だけ、ここにはないのだよ。"
1011005-77 = "実は、ちょうど私が借りているところでね。"
1011005-78 = "その本は、私の部屋に置いてあるんだ。"
1011005-79 = "ピンポイントでそれを選ぶとは思うまいよ……。"
1011005-80 = "ともあれ、部屋にある本を先生が選んでくれるとは……"
1011005-81 = "今日は運が良いらしい。"
1011005-85 = "本を渡すためにも、この後、私の部屋まで付き合ってくれるかい？"
1011005-86 = "偶には、意図しない純粋な幸運を享受するのも悪くない。"
1011005-87 = "今日も本を借りて行こうと思っていたのだが……なにぶん私は非力なものでね。"
1011005-94 = "[ns9] \"セイア？\"\n[ns10] \"たくさん借りるんだね？\""
1011005-97 = "こんな幸運に、そう何度も恵まれるとも限らない。"
1011005-98 = "今日は少し欲張るとしよう。"
1011005-99 = "一人で持ち帰るには、いささか重すぎるのだが……。"
1011005-100 = "……先生。"
1011005-106 = "手伝ってくれるかい？"
1011005-108 = "（その後、セイアの本を一緒に部屋まで運んだ） "
1011005-109 = "（セイアの「おすすめの本」は、#nまるで待っていたのかのようにテーブルの上に置かれていた）"
