[translation]
2600106-1 = "まっしろで透き通るような"
2600106-2 = "キヴォトス中央区・電気街"
2600106-4 = "（新しいイヤホンを買うために電気街を歩き回っていると、レコード屋さんで試聴をしているコタマを見つけた。）"
2600106-9 = "…………。"
2600106-10 = "[ns] \"あ、コタマだ。\""
2600106-11 = "……♪"
2600106-15 = "（コタマは音楽に夢中で、こちらの存在に気づいてないようだった。）"
2600106-16 = "[s] レコード屋さんの中に入る。"
2600106-22 = "― [log=코타마]……[wa:300]あっ、[wa:740]先生。[/log]"
2600106-25 = "[wa:500]― [log=코타마]すみません……[/log]"
2600106-26 = "[wa:1820]― [log=코타마]夢中になっていて、[wa:1115]気がつきませんでした。[/log]"
2600106-30 = "[ns] \"ううん、何を聴いてたの？\""
2600106-31 = "[wa:600]― [log=코타마]これ、[wa:725]ですか？[/log]"
2600106-34 = "[wa:400]― [log=코타마]……[wa:500]ふふっ。[wa:1695]せっかくですし、[/log]"
2600106-35 = "[wa:1850]― [log=코타마]先生も[wa:740]聞いてみますか？[/log]"
2600106-39 = "[ns] \"これ……雑音？\""
2600106-40 = "[wa:400]― [log=코타마]はい。[wa:1385]これは音楽ではなく、[/log]"
2600106-41 = "[wa:2230]― [log=코타마]カフェにいる人たちの[wa:965]会話や音が収録された、[/log]"
2600106-44 = "[wa:500]― [log=코타마]いわゆる「環境音」です。[/log]"
2600106-47 = "[wa:1450]― [log=코타마]リズムもメロディーもありませんが……[/log]"
2600106-48 = "[wa:2765]― [log=코타마]耳を澄ませていると、[wa:2100]様々な音や声が聞こえてきます。[/log]"
2600106-51 = "[wa:400]― [log=코타마]人々が織りなすこの音色が、[/log]"
2600106-52 = "[wa:2700]― [log=코타마]私にとってはなぜだか[wa:2205]どんな音楽よりも、[wa:990]心に響いて……。[/log]"
2600106-55 = "[wa:1000]― [log=코타마]いつまでも、[/log]"
2600106-56 = "[wa:1650]― [log=코타마]聴いていたくなるんです。[/log]"
2600106-59 = "（その後、コタマが勧めてくれたものを色々と聴きながら二人で過ごした。）"
2600106-61 = "先生、環境音はいかがでしたか？"
2600106-62 = "[s] \"思ったより種類が多くてびっくりした。\""
2600106-63 = "最近は作業の集中力を高めるために、色々な環境音がレコードで出ているんです。"
2600106-64 = "カフェの騒音以外にも、雨の音など、色々な種類の作業用環境音があります。"
2600106-65 = "[s] \"コタマが一番好きなのは？\""
2600106-66 = "そうですね……今日先生と最初に聴いたようなカフェの騒音も好きですし、雨の音も良いですが……。"
2600106-70 = "やはり……先生の声、でしょうか。"
2600106-71 = "[s] \"私の声……？\""
2600106-72 = "はい、先生の優しい声を聴いてると心が落ち着いて、集中できます。"
2600106-73 = "先生の声が入ったレコードが存在しないのが、残念です。"
2600106-78 = "そういうわけで先生。機器を設置して録音したいのですが、良いでしょうか？"
2600106-79 = "[s] \"ダメ。\""
2600106-80 = "今の流れなら、行けると思ったのですが……。"
2600106-82 = "（その後も、隙あらば録音しようとしてくるコタマと攻防を繰り広げながら、二人で楽しい時間を過ごした。）"
