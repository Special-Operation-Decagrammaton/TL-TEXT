[translation]
2600106-1 = "Branco e cristalino"
2600106-2 = "Distrito Central de Kivotos - Distrito Eletrônico"
2600106-4 = "（Enquanto caminhava pelo distrito eletrônico para comprar fones de ouvido novos, encontrei Kotama ouvindo algo em uma loja de discos.）"
2600106-9 = "…………。"
2600106-10 = "[ns] \"Ah, é a Kotama.\""
2600106-11 = "……♪"
2600106-15 = "（Kotama estava tão imersa na música que parecia não ter notado minha presença.）"
2600106-16 = "[s] Entro na loja de discos."
2600106-22 = "― [log=코타마]……[wa:300]Ah, [wa:740]Sensei.[/log]"
2600106-25 = "[wa:500]― [log=코타마]Desculpe……[/log]"
2600106-26 = "[wa:1820]― [log=코타마]Eu estava tão concentrada que [wa:1115]não percebi você.[/log]"
2600106-30 = "[ns] \"Não tem problema, o que você estava ouvindo?\""
2600106-31 = "[wa:600]― [log=코타마]Isto, [wa:725]você diz?[/log]"
2600106-34 = "[wa:400]― [log=코타마]……[wa:500]Hehe. [wa:1695]Já que estamos aqui,[/log]"
2600106-35 = "[wa:1850]― [log=코타마]Sensei, [wa:740]gostaria de ouvir também?[/log]"
2600106-39 = "[ns] \"Isso é... ruído?\""
2600106-40 = "[wa:400]― [log=코타마]Sim. [wa:1385]Isso não é música,[/log]"
2600106-41 = "[wa:2230]― [log=코타마]é uma gravação de conversas e sons [wa:965]de pessoas em um café,[/log]"
2600106-44 = "[wa:500]― [log=코타마]o que chamamos de \"sons ambientes\".[/log]"
2600106-47 = "[wa:1450]― [log=코타마]Não tem ritmo nem melodia, mas……[/log]"
2600106-48 = "[wa:2765]― [log=코타마]se você prestar atenção, [wa:2100]pode ouvir vários sons e vozes.[/log]"
2600106-51 = "[wa:400]― [log=코타마]Esse timbre tecido pelas pessoas,[/log]"
2600106-52 = "[wa:2700]― [log=코타마]para mim, por algum motivo, [wa:2205]toca o coração [wa:990]mais do que qualquer música……[/log]"
2600106-55 = "[wa:1000]― [log=코타마]Eu poderia ficar,[/log]"
2600106-56 = "[wa:1650]― [log=코타마]ouvindo para sempre.[/log]"
2600106-59 = "（Depois disso, passamos um tempo juntos ouvindo várias coisas que a Kotama recomendou.）"
2600106-61 = "Sensei, o que achou dos sons ambientes?"
2600106-62 = "[s] \"Fiquei surpreso com a variedade, é mais do que eu pensava.\""
2600106-63 = "Ultimamente, vários sons ambientes têm sido lançados em discos para ajudar a aumentar a concentração no trabalho."
2600106-64 = "Além do barulho de café, existem vários tipos de sons para trabalho, como o som da chuva."
2600106-65 = "[s] \"Qual é o seu favorito, Kotama?\""
2600106-66 = "Bem…… eu gosto do barulho de café que ouvimos primeiro com você, Sensei, e o som da chuva também é bom, mas……"
2600106-70 = "Na verdade…… acho que é a voz do Sensei."
2600106-71 = "[s] \"Minha voz……?\""
2600106-72 = "Sim, ouvir a voz gentil do Sensei me acalma e me ajuda a concentrar."
2600106-73 = "É uma pena que não exista um disco com a voz do Sensei."
2600106-78 = "Sendo assim, Sensei. Posso instalar um equipamento para gravar?"
2600106-79 = "[s] \"Não.\""
2600106-80 = "Pelo rumo da conversa, achei que conseguiria……"
2600106-82 = "（Depois disso, passamos um tempo divertido enquanto eu me defendia das tentativas constantes da Kotama de me gravar.）"
