[translation]
1000920-1 = "ホットドッグデー"
1000920-9 = "あ、先生いらっしゃい！待ってたよ！"
1000920-10 = "[s] \"こんにちは。見せたいものって？\""
1000920-11 = "それはね～"
1000920-12 = "じゃーん！これ！"
1000920-18 = "[ns1] \"イズミ！？食品サンプルは食べちゃダメだよ！？\"\n[ns2] \"あああ、もう食べちゃってる……。\""
1000920-21 = "んもう、違うよ！先生は私の事なんだと思ってるの！"
1000920-22 = "いくら私でもそれくらい分かるよ！"
1000920-23 = "[s3] \"よ……よかった……？\"\n[s4] \"これ……本当にサンプル？すごいクオリティだね……\""
1000920-26 = "すごいよね！触った感じも匂いも、本物のホットドッグみたい！"
1000920-27 = "すりーでぃーぷりんたー？で作れるんだって！"
1000920-28 = "[s5] \"最近の3Dプリンターはすごいんだね。\"\n[s6] \"ところで、イズミはどうしてこれを？\""
1000920-31 = "これを持っているとね、美味しいものによく出会えるんだ～"
1000920-32 = "私のラッキーアイテム！みたいな！"
1000920-37 = "（その時！突如として大きなカラスが！）"
1000920-42 = "（ああっと！イズミのホットドッグが攫われたーー！）"
1000920-44 = "ふえええー－ん！！返してよー－！#n私のホットドッグー－！！"
1000920-53 = "はぁ、はぁ……。"
1000920-54 = "[s] \"カラスを追いかけていたら、こんな所に……。\""
1000920-55 = "あっ、見て先生！#nカラスさんが私のホットドックを雛にあげてる！"
1000920-56 = "でも……プラスチックだから食べられないみたい……"
1000920-57 = "ど、どうしよう！？#nこのままじゃ誰も幸せにならないよ……。"
1000920-58 = "[s] \"ちょっと待っててね、イズミ。すぐ戻るから。\""
1000920-59 = "せ、先生？どこ行くの？#n置いてかないでーー！"
1000920-64 = "（少し心苦しいけど、涙ぐむイズミを置いてコンビニに行ってきた）"
1000920-68 = "先生？そのホットドック、私に……？"
1000920-69 = "違う？じゃあどうするの……？"
1000920-70 = "あ……それをカラスさんたちに？"
1000920-78 = "（イズミに手伝ってもらいながら、木に登った）"
1000920-82 = "（ホットドックを巣の近くに置いておくと……）"
1000920-86 = "先生、カラスさんが少し味見して……"
1000920-91 = "雛たちに分け与えてる！"
1000920-100 = "私のホットドッグ！"
1000920-101 = "わあ！返してくれたの？#nありがとう！本当に賢いね君たち！"
1000920-108 = "[ns7] \"カラスは知能が高いらしいからね。\"\n[ns8] \"よかったね、イズミ。\""
1000920-111 = "うん！"
1000920-112 = "でも、結構走ったらお腹空いてきちゃった……。"
1000920-113 = "[s] \"ふっふっふ……そう言うと思って。\""
1000920-114 = "え？えっ？先生、どうしたの？"
1000920-118 = "それは……ホットドック！？"
1000920-119 = "[s9] \"なんだか私もホットドックが食べたい気分でね。\"\n[s10] \"イズミの分もあるよ。\""
1000920-122 = "ほんと？私こんなに幸せでもいいの？"
1000920-123 = "ありがとう先生！#nいっただっきま～す！"
1000920-124 = "[s] \"今日はイズミの「ホットドッグデー」だね。\""
1000920-125 = "なにそれ？一日中ホットドッグを食べる日？"
1000920-126 = "あははっ！面白いね～！"
1000920-127 = "じゃあ……ホットドッグにウナギゼリー味のソースと、高級マグロ味の「にゅ～る」、あとチョコマスタード味のフレークをかけて食べよっかな！"
1000920-128 = "あ、先生もかける？#n美食の新境地を見ることができるよ～！"
1000920-131 = "[ns] \"わ、私は遠慮しておこうかな……。\""
1000920-132 = "そう……？"
1000920-134 = "（どうやらイズミは本気だったようで、その好意をやんわりと断るのは中々骨が折れた……）"
