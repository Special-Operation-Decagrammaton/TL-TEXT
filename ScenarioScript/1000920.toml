[translation]
1000920-1 = "Dia do Cachorro-Quente"
1000920-9 = "Ah, Sensei, bem-vindo! Eu estava te esperando!"
1000920-10 = "[s] \"Olá. O que você queria me mostrar?\""
1000920-11 = "É o seguinte~"
1000920-12 = "Tcharam! Isso aqui!"
1000920-18 = "[ns1] \"Izumi!? Você não pode comer amostras de comida, sabia!?\"\n[ns2] \"Ah, não... ela já está comendo...\""
1000920-21 = "Ah, qual é, não é nada disso! O que você pensa de mim, Sensei?!"
1000920-22 = "Mesmo eu sei diferenciar isso!"
1000920-23 = "[s3] \"Q-que bom...\"\n[s4] \"Isso... é realmente uma amostra? A qualidade é incrível...\""
1000920-26 = "Não é incrível? Tanto o toque quanto o cheiro parecem um cachorro-quente de verdade!"
1000920-27 = "Disseram que dá para fazer com uma impressora 3D!"
1000920-28 = "[s5] \"As impressoras 3D de hoje em dia são impressionantes.\"\n[s6] \"Mas, Izumi, por que você tem isso?\""
1000920-31 = "Quando eu tenho isso comigo, acabo encontrando coisas deliciosas~"
1000920-32 = "É como se fosse meu amuleto da sorte!"
1000920-37 = "(Nesse momento! De repente, um corvo grande aparece!)"
1000920-42 = "(Ah, não! O corvo roubou o cachorro-quente da Izumi!)"
1000920-44 = "Waaaaah!! Devolve!#nMeu cachorro-quente!!"
1000920-53 = "Haa, haa..."
1000920-54 = "[s] \"Depois de perseguir o corvo, acabamos vindo parar aqui...\""
1000920-55 = "Ah, olha só, Sensei!#nO corvo está dando meu cachorro-quente para os filhotes!"
1000920-56 = "Mas... como é de plástico, parece que eles não conseguem comer..."
1000920-57 = "O-o que eu faço!?#nDesse jeito, ninguém vai ficar feliz..."
1000920-58 = "[s] \"Espere um pouco aqui, Izumi. Já volto.\""
1000920-59 = "S-Sensei? Onde você vai?#nNão me deixa aqui sozinha!"
1000920-64 = "(Embora me doa um pouco o coração, deixei a Izumi chorosa para trás e fui até a loja de conveniência)"
1000920-68 = "Sensei? Esse cachorro-quente, é para mim...?"
1000920-69 = "Não? Então o que você vai fazer...?"
1000920-70 = "Ah... você vai dar para os corvos?"
1000920-78 = "(Com a ajuda da Izumi, subimos na árvore)"
1000920-82 = "(Ao colocar o cachorro-quente perto do ninho...)"
1000920-86 = "Sensei, o corvo provou um pouco..."
1000920-91 = "Ele está dividindo com os filhotes!"
1000920-100 = "Meu cachorro-quente!"
1000920-101 = "Uau! Eles devolveram?#nObrigada! Vocês são muito inteligentes!"
1000920-108 = "[ns7] \"Dizem que corvos têm uma inteligência alta.\"\n[ns8] \"Que bom, Izumi.\""
1000920-111 = "Sim!"
1000920-112 = "Mas, depois de correr tanto, acabei ficando com fome..."
1000920-113 = "[s] \"Hehe... eu imaginei que diria isso.\""
1000920-114 = "Hã? O quê? Sensei, o que foi?"
1000920-118 = "Isso é... um cachorro-quente!?"
1000920-119 = "[s9] \"Eu também fiquei com vontade de comer um cachorro-quente.\"\n[s10] \"Tem um para você também, Izumi.\""
1000920-122 = "Sério? Eu posso ser tão feliz assim?"
1000920-123 = "Obrigada, Sensei!#nItadakimasu!"
1000920-124 = "[s] \"Hoje é o 'Dia do Cachorro-Quente' da Izumi, então.\""
1000920-125 = "O que é isso? Um dia para comer cachorro-quente o dia todo?"
1000920-126 = "Ahaha! Que divertido~!"
1000920-127 = "Então... acho que vou colocar molho de geleia de enguia, um pouco de atum premium, e flocos com sabor de mostarda com chocolate!"
1000920-128 = "Ah, Sensei, você quer um pouco também?#nVocê vai conhecer uma nova fronteira da gastronomia~!"
1000920-131 = "[ns] \"E-eu acho que vou recusar...\""
1000920-132 = "É mesmo...?"
1000920-134 = "(Pelo visto a Izumi estava falando sério, e recusar gentilmente aquele gesto foi um trabalho e tanto...)"
