[translation]
10025100-1 = "第10話;甲板掃除"
10025100-8 = "こちらRABBIT1、右舷1Fに突入。"
10025100-9 = "こちらRABBIT2、左舷1Fに突入。"
10025100-10 = "了解。"
10025100-11 = "RABBIT2、何か異常は？"
10025100-12 = "クルーの姿が見当たらないな。#n……うっ、なんだこの臭いは！"
10025100-13 = "どうしましたか？"
10025100-14 = "……船体に、大量の冷凍エビが……まだ時間はあまり経ってないぞ。"
10025100-15 = "冷凍庫から出して間もないのか、凍ってるものもある。"
10025100-17 = "エビが、捨てられとる……じゃと？"
10025100-25 = "これは……ワシが「レッド・フック・エクスプレス」に納品したエビじゃないか。"
10025100-27 = "一目で分かるものなのか？"
10025100-28 = "ああ、自分で捕った獲物は忘れん。"
10025100-29 = "これは……D.U.の高級レストランに納品すると聞いたもんで、特に肉厚のエビを選別したのじゃが……こんなところに捨てられてしまうとはな……"
10025100-31 = "せっかく捕ったエビを、こんな……ひどい……"
10025100-38 = "理解できないな。#n高値で買い取ったエビを、わざわざ人目のつかない場所で破棄するなんて。"
10025100-39 = "……何か別の目的があるのか？"
10025100-40 = "箱……"
10025100-41 = "エビが入っていた箱は……"
10025100-46 = "……「レッド・フック・エクスプレス」の箱なら、ここに積まれてますよ！"
10025100-47 = "ん？なんか変な音がするけど……何が入ってるんだ？"
10025100-49 = "……RABBIT2、確認をお願いします。"
10025100-50 = "ラジャー。"
10025100-55 = "なんだこれ。壺に絹に、こっちは香水か……？"
10025100-56 = "「レッド・フック・エクスプレス」って、こんな物まで取り扱ってるのか？"
10025100-57 = "いや。確認したけど、水産加工品しか許可を得てないみたいだよ。"
10025100-58 = "他の品目を取り扱うなら、連邦生徒会に事前申請しないとねぇ。"
10025100-60 = "じゃあこれは、全部密輸品ってこと……？"
10025100-62 = "それと、密輸品の共通点を挙げるとしたら……"
10025100-64 = "すべて高額な関税がかかる贅沢品ってところかな？"
10025100-69 = "……見つかってしまったようですね。"
10025100-75 = "あなたは……"
10025100-76 = "「レッド・フック・エクスプレス」の代表……！"
10025100-81 = "このバージ船の存在、エビを捨てた理由……これは一体どういうことじゃ！"
10025100-82 = "そう怒らないでください、興奮しては身体に障りますよ。"
10025100-83 = "言われなくても、ひとつずつ説明させていただきますから。"
10025100-87 = "……はい。ご覧の通り、このバージ船は「再来の船」なんかじゃありません。"
10025100-88 = "私たち「レッド・フック・エクスプレス」のバージ船です。"
10025100-89 = "それにしても、海底に棲む正体不明の生き物が、供物を回収するため陸に上がる――#nなんて、今の時代にまだこんな都市伝説を信じる人がいたんですねぇ。"
10025100-90 = "……なぜエビを捨てた？"
10025100-91 = "金にならないんですよ、エビは。"
10025100-93 = "……私たちのコレは、ビジネスなので。"
10025100-95 = "知らなかったんですか？エビなんか取り扱っても稼げはしないって。"
10025100-96 = "漁獲量は安定しないから契約の取りつけは困難。#nなのに補助金は申し訳程度……"
10025100-97 = "ところがどうでしょう？エビと偽って密輸品を運び、ブラックマーケットに引き渡せば……なんと10倍、いや20倍もの利益が得られるんです。"
10025100-98 = "だ、だからといって捨てる必要は無いだろ！"
10025100-99 = "そのエビを捕るために、このじっちゃんがどれだけ汗水垂らしたのか……#nお前に分かるのか！"
10025100-100 = "……るせえな。"
10025100-101 = "それで、何か問題が？#nエビの代金は支払いましたよね？"
10025100-102 = "だったら、あとはどう扱おうがこちらの自由では？"
10025100-104 = "前にも言いませんでした？#n……俺はエビが嫌いだって。"
10025100-111 = "この罰当たりめ！！"
10025100-119 = "まだ状況が飲み込めてないんですか？#n……ここ、私の船ですよ？"
10025100-120 = "船から転落して、そのまま行方不明になってしまう悲しい[ruby=・ ・]事故[/ruby]は、#nニュースでもよく目にするでしょう？"
10025100-122 = "自分が何を言っているのか分かっているんですか！？#nこれは犯罪ですよ！"
10025100-123 = "すべて、分かったうえで言っているとしたら……？"
10025100-124 = "なあ、君たちに何ができるんだ？#n教えてくれよ。"
10025100-126 = "エビを捕るしか脳がないくたびれた漁師。"
10025100-128 = "本部から見放された落ちこぼれの生徒。"
10025100-129 = "数日前まで、この村をロクに知らなかった部外者。"
10025100-131 = "この村の経済を……いや、すべてを握っている私に何ができる？"
10025100-132 = "感情に踊らされて、村の伝説なんかにビビってるようなヤツらに……！#nいったい何ができるっていうんだよ！！"
10025100-142 = "[ns] \"……ミヤコ。\""
10025100-143 = "……はい。――お話はすべて聞かせていただきました。"
10025100-145 = "ああ……覚えているよ。#nたしか、君も村に来たばかりの観光客だったね。"
10025100-147 = "海運会社「レッド・フック・エクスプレス」の代表。あなたは、ここ[ruby=やとうら]夜戸浦[/ruby]村での経済的地位を悪用し、数々の罪を犯しました。"
10025100-148 = "水産物の不法投棄による海洋汚染、及び組合に渡るはずだった補助金の着服。"
10025100-149 = "会計帳簿の操作。取扱品目にない商品を輸送および、多額の脱税。"
10025100-150 = "不正に得た収益で私兵を雇い、虚偽の情報で住民を騙し――"
10025100-151 = "――そして、夜戸浦村産のエビを、D.U.の市民から奪った。"
10025100-152 = "これらはキヴォトスの市民の安全を脅かす、重大な犯罪に当たるため……"
10025100-153 = "SRT特殊学園の名の下に、あなたを緊急逮捕します！"
10025100-155 = "SRT、特殊学園……？#nなぜ、SRTの生徒がここに……！？"
10025100-156 = "あなたは「金にならないから」と言って、無下に扱ってきたようですけど……"
10025100-157 = "私たち、好きなんです……この村のエビが。"
10025100-159 = "SRT……特殊学園？"
10025100-160 = "聞いたことあるぞ。#n事件が発生したら、真っ先に現場へ投入されるという、あの特殊部隊……"
10025100-161 = "てっきり廃校になったと思っていましたが……まだ健在だったんですね！"
10025100-167 = "チッ……！海のド真ん中でSRTと鉢合わせか、今日はとことんツイてないな。"
10025100-168 = "だが、このまま引き下がるわけにはいかねぇ……#nこの計画に、いくら注ぎ込んだと思ってる！"
10025100-169 = "オイッ、お前ら甲板に集合しろ！！"
10025100-177 = "いくら戦闘に特化したSRTとはいえ、数の暴力には勝てないよなぁ？"
10025100-179 = "人のビジネスを邪魔するとどうなるか、思い知らせてやるよ！！"
10025100-184 = "総員、戦闘準備。"
10025100-188 = "これより――甲板掃除を開始します！"
