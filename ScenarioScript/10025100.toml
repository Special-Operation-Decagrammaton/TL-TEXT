[translation]
10025100-1 = "Episódio 10; Limpeza do Convés"
10025100-8 = "Aqui é RABBIT 1, invadindo o 1º andar a estibordo."
10025100-9 = "Aqui é RABBIT 2, invadindo o 1º andar a bombordo."
10025100-10 = "Entendido."
10025100-11 = "RABBIT 2, alguma anormalidade?"
10025100-12 = "Não vejo sinal da tripulação. #n... Ugh, que cheiro é esse!"
10025100-13 = "O que houve?"
10025100-14 = "...No casco, há uma enorme quantidade de camarões congelados... e não faz muito tempo que foram deixados aqui."
10025100-15 = "Parece que acabaram de tirar do freezer, alguns ainda estão congelados."
10025100-17 = "Camarões... sendo descartados... é isso mesmo?"
10025100-25 = "Esses são... os camarões que eu entreguei para a 'Red Hook Express'."
10025100-27 = "Dá para saber só de olhar?"
10025100-28 = "Sim, eu nunca esqueço da presa que eu mesmo capturei."
10025100-29 = "Disseram que seriam entregues em um restaurante de luxo no D.U., então eu selecionei os camarões mais carnudos... pensar que seriam jogados fora em um lugar como este..."
10025100-31 = "Depois de todo o esforço para capturá-los, descartá-los assim... que terrível..."
10025100-38 = "Não consigo entender. #nPor que comprar camarões caros para depois descartá-los em um lugar escondido?"
10025100-39 = "...Será que há outro objetivo?"
10025100-40 = "Caixas..."
10025100-41 = "As caixas onde os camarões estavam..."
10025100-46 = "...Se são caixas da 'Red Hook Express', elas estão empilhadas aqui!"
10025100-47 = "Hm? Tem um barulho estranho vindo daqui... o que tem dentro?"
10025100-49 = "...RABBIT 2, por favor, verifique."
10025100-50 = "Câmbio."
10025100-55 = "O que é isso? Vasos, seda, e isso aqui é perfume...?"
10025100-56 = "A 'Red Hook Express' lida com esse tipo de coisa?"
10025100-57 = "Não. Eu verifiquei, e eles só têm permissão para produtos processados do mar."
10025100-58 = "Se quisessem lidar com outros itens, teriam que solicitar autorização prévia ao Conselho Estudantil Federal."
10025100-60 = "Então isso significa que tudo aqui é contrabando...?"
10025100-62 = "E, se formos listar o que esses itens contrabandeados têm em comum..."
10025100-64 = "Acho que todos são artigos de luxo com altas taxas alfandegárias, não é?"
10025100-69 = "...Parece que vocês descobriram."
10025100-75 = "Você é..."
10025100-76 = "O representante da 'Red Hook Express'...!"
10025100-81 = "O que significa a existência desta balsa e o motivo de terem jogado os camarões fora!"
10025100-82 = "Não fique tão irritado, a excitação faz mal à saúde."
10025100-83 = "Mesmo que não peça, explicarei um por um."
10025100-87 = "...Sim. Como podem ver, esta balsa não é nenhum 'Navio do Retorno'."
10025100-88 = "É uma balsa da nossa 'Red Hook Express'."
10025100-89 = "Aliás, acreditar que uma criatura desconhecida das profundezas do mar sobe à terra para coletar oferendas... #nquem diria que ainda existem pessoas que acreditam em lendas urbanas assim nos dias de hoje."
10025100-90 = "...Por que descartaram os camarões?"
10025100-91 = "Camarões não dão dinheiro."
10025100-93 = "...O que fazemos aqui é um negócio."
10025100-95 = "Não sabia? Não se ganha nada lidando com camarões."
10025100-96 = "O volume de pesca é instável, então é difícil fechar contratos. #nE os subsídios são apenas uma miséria..."
10025100-97 = "Mas veja só: se usarmos os camarões como fachada para transportar contrabando e entregá-lo no mercado negro... podemos obter 10, ou até 20 vezes mais lucro."
10025100-98 = "M-mas isso não é motivo para jogá-los fora!"
10025100-99 = "Você tem ideia de quanto suor esse velho derramou para capturar esses camarões... #nVocê tem noção disso?!"
10025100-100 = "...Que irritante."
10025100-101 = "E daí, qual é o problema? #nO pagamento pelos camarões foi feito, não foi?"
10025100-102 = "Sendo assim, o que eu faço com eles depois não é problema meu?"
10025100-104 = "Eu não disse antes?#n... Eu odeio camarão."
10025100-111 = "Seu sacrilégio!!"
10025100-119 = "Ainda não entendeu a situação?#n... Este é o meu navio, sabia?"
10025100-120 = "Acidentes tristes onde alguém cai do navio e acaba desaparecendo...#nVocê vê muito disso nos noticiários, não vê?"
10025100-122 = "Você tem noção do que está dizendo!?#nIsso é um crime!"
10025100-123 = "E se eu estiver dizendo tudo isso com plena consciência...?"
10025100-124 = "Ei, o que vocês acham que podem fazer?#nMe diga."
10025100-126 = "Pescadores cansados que só sabem pescar camarão."
10025100-128 = "Alunas fracassadas que foram abandonadas pelo quartel-general."
10025100-129 = "Forasteiras que mal conheciam esta vila até alguns dias atrás."
10025100-131 = "O que vocês podem fazer contra mim, que controlo a economia... não, que controlo tudo nesta vila?"
10025100-132 = "Vocês, que se deixam levar por emoções e se assustam com lendas de vila...!#nO que diabos vocês acham que podem fazer!!"
10025100-142 = "[ns] \"... Miyako.\""
10025100-143 = "... Sim. — Eu ouvi tudo o que foi dito."
10025100-145 = "Ah... eu me lembro de você.#nSe não me engano, você também era uma turista que acabou de chegar na vila."
10025100-147 = "Representante da empresa de navegação \"Red Hook Express\". Você abusou de sua posição econômica na vila de Yatoura para cometer inúmeros crimes."
10025100-148 = "Poluição marinha pelo descarte ilegal de produtos pesqueiros e a apropriação indébita de subsídios que deveriam ir para a associação."
10025100-149 = "Manipulação de livros contábeis. Transporte de mercadorias não listadas e sonegação fiscal de alto valor."
10025100-150 = "Contratação de soldados particulares com lucros obtidos ilegalmente, enganando os moradores com informações falsas—"
10025100-151 = "—E, além disso, roubou os camarões da vila de Yatoura dos cidadãos de D.U."
10025100-152 = "Como esses atos constituem crimes graves que ameaçam a segurança dos cidadãos de Kivotos..."
10025100-153 = "Em nome da Academia Especial SRT, eu prendo você em flagrante!"
10025100-155 = "SRT, Academia Especial...?#nPor que alunas da SRT estão aqui...!?"
10025100-156 = "Parece que você nos tratou com desdém, dizendo que \"não dava lucro\"..."
10025100-157 = "Mas nós gostamos... dos camarões desta vila."
10025100-159 = "SRT... Academia Especial?"
10025100-160 = "Já ouvi falar.#nAquela unidade especial que é enviada imediatamente para o local assim que um incidente ocorre..."
10025100-161 = "Eu pensei que a escola tivesse sido fechada... mas vocês ainda estão na ativa!"
10025100-167 = "Tsc...! Encontrar a SRT no meio do oceano, hoje não é mesmo o meu dia de sorte."
10025100-168 = "Mas não posso recuar agora...#nVocê tem ideia de quanto eu investi neste plano!"
10025100-169 = "Ei, todos vocês, reúnam-se no convés!!"
10025100-177 = "Mesmo sendo da SRT e especializadas em combate, vocês não podem vencer a força dos números, certo?"
10025100-179 = "Vou ensinar a vocês o que acontece quando se intrometem nos negócios dos outros!!"
10025100-184 = "Todos, preparem-se para o combate."
10025100-188 = "A partir de agora — iniciaremos a limpeza do convés!"
