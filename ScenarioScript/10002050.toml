[translation]
10002050-1 = "第5話;泳ぎを習得する（１）"
10002050-2 = "では、せっかく海に来たわけですし、泳ぐとしましょう！"
10002050-3 = "あ、でもリストには「泳ぎを習得する」と書かれてますね……。"
10002050-5 = "ただ泳いでいる写真を撮るのではなく、泳げない人に教えているところを撮らないといけないのでしょうか？"
10002050-6 = "こ、この中に、泳げない人っていらっしゃいますか？"
10002050-7 = "私は、泳げないというほどではないので……。"
10002050-8 = "海に来たのは初めてだけど、訓練としての水泳なら習得済み。"
10002050-9 = "私も、ある程度泳いだことはあります。"
10002050-14 = "……。"
10002050-16 = "……ひひ。"
10002050-17 = "[s1] \"ツルギも泳げるんだね。\"\n[s2] \"どうやらみんな泳げるみたいだね。\""
10002050-18 = "だ、だとすると……"
10002050-19 = "だ、だとすると……"
10002050-20 = "これは、どう頑張っても実行できないということですか……！？"
10002050-21 = "……！"
10002050-22 = "なるほど、そういう罠か。"
10002050-23 = "昔の物語にもある、珍しくもないやり方だ。遠回しに拒絶するために、あえて無理難題をふっかける……。"
10002050-24 = "やられた……！"
10002050-25 = "さ、流石にそういうことではないと思いたいですが……。"
10002050-26 = "にしても、困りましたね……。"
10002050-28 = "……習得しているように見える写真なら、「できないふり」、でも良いのでしょうか？"
10002050-29 = "なるほど。書かれていることは「泳ぎを習得する」だとしても、ミッション自体は「そういうシーンの写真を撮る」こと。"
10002050-30 = "毒を以て毒を制す、そういうことか。ヒフミ、その考えは悪くない。"
10002050-31 = "問題無いな、監視役？"
10002050-32 = "え、私ですか？"
10002050-33 = "まあ、大丈夫なんじゃないでしょうか。多分……。"
10002050-34 = "よし。じゃあ監視役の許可も下りたことだし、始めるとしよう。"
10002050-35 = "ところで、教わる役と教える役は誰がやる？"
10002050-36 = "やっぱりここは、"
10002050-37 = "先生じゃないでしょうか……？"
10002050-38 = "[s] \"……私？\""
10002050-39 = "「ふり」だとバレないように、説得力のことを考えると……教えるといったら先生かなと思いまして。"
10002050-40 = "[s] \"なるほど、私で良ければ喜んで。\""
10002050-41 = "あ、ありがとうございます！"
10002050-43 = "えっと、でしたらあまり深くないところで、先生に手を繋いでいただいて……"
10002050-44 = "それで、てきとうにバタ足をする……"
10002050-45 = "そんな感じで良さそうですね？"
10002050-46 = "えっと、では教わる方を……"
10002050-50 = "……あ、あれ？みなさんどこに……？"
10002050-56 = "そういえば私泳げないんでした、溺れそうですー、先生助けてくださーい。"
10002050-57 = "緊急事態につき支援を要請する。繰り返す、緊急事態につき支援を要請する。"
10002050-58 = "くへぁっ！あぶっ、あっぷ！くへぁぐぼぼぼぼっ！ぐへっ、けへっ！！うぇっ！？ぎゃぶっ、ごぼぼっ……！！？"
10002050-59 = "え……あれ？"
10002050-60 = "[s3] \"みんな演技が上手だね。\"\n[s4] \"……ツルギ、もしかして本当に溺れてない？\""
10002050-61 = "み、みなさんさっき泳げるって――"
10002050-62 = "み、みなさんさっき泳げるって――"
10002050-64 = "ダダダダダダダダッ！！"
10002050-65 = "きゃっ！？"
10002050-70 = "見ろ！あいつら何だか知らねえけど、溺れてやがるぜ！"
10002050-71 = "ナイスタイミング！これはチャンスだ！"
10002050-72 = "さっきの仕返しをしてやろう！"
10002050-73 = "おい！みんなを連れてこい！"
10002050-82 = "ふー、ふー……ああん？"
10002050-84 = "……戦闘ですか？"
10002050-89 = "……え？"
10002050-90 = "あれぇ……？"
10002050-92 = "そういえばその辺り、膝くらいまでの深さしかなかったな……？"
