[translation]
10002050-1 = "Episódio 5; Aprendendo a nadar (1)"
10002050-2 = "Bem, já que viemos até a praia, vamos nadar!"
10002050-3 = "Ah, mas na lista está escrito \"aprender a nadar\"..."
10002050-5 = "Será que não temos que tirar uma foto apenas nadando, mas sim ensinando alguém que não sabe nadar?"
10002050-6 = "A-alguém aqui não sabe nadar?"
10002050-7 = "Eu não diria que não sei nadar..."
10002050-8 = "É minha primeira vez na praia, mas como parte do treinamento, já aprendi a nadar."
10002050-9 = "Eu também já nadei um pouco antes."
10002050-14 = "..."
10002050-16 = "...Hehe."
10002050-17 = "[s1] \"Tsurugi também sabe nadar, né.\"\n[s2] \"Parece que todo mundo sabe nadar.\""
10002050-18 = "N-nesse caso..."
10002050-19 = "N-nesse caso..."
10002050-20 = "Isso significa que não tem como realizar essa tarefa, não importa o quanto tentemos...!?"
10002050-21 = "...!"
10002050-22 = "Entendo, então é essa a armadilha."
10002050-23 = "É um método comum, visto em histórias antigas. Pedir algo impossível para recusar de forma indireta..."
10002050-24 = "Fomos enganados...!"
10002050-25 = "B-bem, eu gostaria de acreditar que não é esse o caso..."
10002050-26 = "Ainda assim, que situação complicada..."
10002050-28 = "...Se a foto precisa parecer que estamos aprendendo, será que podemos apenas \"fingir que não sabemos\"?"
10002050-29 = "Entendi. Mesmo que o texto diga \"aprender a nadar\", a missão em si é \"tirar uma foto de uma cena assim\"."
10002050-30 = "Combater o fogo com fogo, é isso. Hifumi, essa ideia não é ruim."
10002050-31 = "Sem problemas, supervisora?"
10002050-32 = "Ah, eu?"
10002050-33 = "Bem, acho que não tem problema. Provavelmente..."
10002050-34 = "Certo. Já que temos a permissão da supervisora, vamos começar."
10002050-35 = "A propósito, quem vai ser o instrutor e quem vai ser o aluno?"
10002050-36 = "Acho que, nesse caso,"
10002050-37 = "não deveria ser o Sensei...?"
10002050-38 = "[s] \"...Eu?\""
10002050-39 = "Para não parecer que estamos \"fingindo\", pensei que o Sensei seria o mais convincente para ensinar."
10002050-40 = "[s] \"Entendo, se for por mim, farei com prazer.\""
10002050-41 = "Ah, muito obrigada!"
10002050-43 = "Bem, então em um lugar raso, o Sensei poderia segurar minha mão..."
10002050-44 = "E então, eu bato as pernas de qualquer jeito..."
10002050-45 = "Parece bom assim, não é?"
10002050-46 = "Bem, então quem vai ser o aluno..."
10002050-50 = "...Ah, ué? Onde todos foram...?"
10002050-56 = "Falando nisso, eu não sei nadar, estou me afogando, Sensei, me ajude!"
10002050-57 = "Solicitando apoio devido a uma emergência. Repito, solicitando apoio devido a uma emergência."
10002050-58 = "Kueh! Abu, ap! Kueh gubobobobo! Gueh, keheh!! Ueh!? Gyabu, gobobo...!!?"
10002050-59 = "Eh... ué?"
10002050-60 = "[s3] \"Todos são ótimos atores.\"\n[s4] \"...Tsurugi, por acaso você não está se afogando de verdade?\""
10002050-61 = "M-mas vocês disseram agora pouco que sabiam nadar..."
10002050-62 = "M-mas vocês disseram agora pouco que sabiam nadar..."
10002050-64 = "DADADADADADADADA!!"
10002050-65 = "Kya!?"
10002050-70 = "Olhem! Não sei quem são, mas eles estão se afogando!"
10002050-71 = "Timing perfeito! Essa é a nossa chance!"
10002050-72 = "Vou me vingar do que aconteceu agora há pouco!"
10002050-73 = "Ei! Tragam todo mundo aqui!"
10002050-82 = "Ufa, ufa... Ahn?"
10002050-84 = "...É um combate?"
10002050-89 = "...Hã?"
10002050-90 = "Ué...?"
10002050-92 = "Pensando bem, aquela área só tinha profundidade até o joelho, não é...?"
