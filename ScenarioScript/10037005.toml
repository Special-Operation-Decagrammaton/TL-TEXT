[translation]
10037005-1 = "プロローグ;遠方からの手紙"
10037005-4 = "今までのあらすじ"
10037005-8 = "（山海経の特産物――「[ruby=まんねんじん]萬年参[/ruby]」が外部へと密売されていた）"
10037005-9 = "山海経では、「[ruby=まんねんじん]萬年参[/ruby]」という植物が採れるのですが――"
10037005-10 = "収穫量が少なく、#n希少価値が高いから外部への持ち出しが厳しく制限されているんです。"
10037005-11 = "昨今、「萬年参」を[ruby=うち]玄武商会[/ruby]が学園外に密売しているという噂が広まっておりまして……"
10037005-14 = "（山海経の生徒会に該当する「玄龍門」の門主、[ruby=りゅうげ]竜華[/ruby]キサキは、玄武商会を萬年参の密売犯とし――）"
10037005-15 = "萬年参は山海経でも貴重ゆえ、採取するのにも許可が必要での。"
10037005-16 = "かような特産物が山海経の外に――#nそれも玄龍門の預かり知らぬところで流れておると聞けば、当然、黙ってはおれん。"
10037005-17 = "門主として、看過するわけにはいかぬからな。#nして――これに対しての申し開きはあるかの？"
10037005-20 = "（玄武商会の会長、[ruby=あけしろ]朱城[/ruby]ルミは、濡れ衣を晴らすべく、#n　シャーレの先生に助けを求めた）"
10037005-21 = "相談というか、お願いというか……"
10037005-22 = "あたしたち玄武商会から、シャーレに依頼があってね。"
10037005-25 = "（しかし、萬年参を密売したのは、玄龍門の幹部の一人で――）"
10037005-26 = "あぁ。前々から目障りだったんだ。"
10037005-27 = "どうにかしてお前を陥れようと思ったが、協力を集めるには金が必要でな。"
10037005-29 = "（幹部が取引したのは、秘薬の密輸に手を染め、山海経から追放された）"
10037005-30 = "（七囚人の一人――[ruby=しんたに]申谷[/ruby]カイだった）"
10037005-33 = "でも、残念なことに後一歩遅かった。#nすでに新薬の実験は終えたところさ。"
10037005-34 = "欲を言えば、もう少しばかり実験データを集めたかったところではあるけど……"
10037005-42 = "むにゃむにゃ……"
10037005-43 = "ダメだ、トモエ……プリンの川に、プリンのダムを建てては……プリンが食べられなくなるだろう……"
10037005-44 = "うぅーん……だが、カステラも、イチゴミルクも……バナナエクレアも……。"
10037005-48 = "チェリノちゃん？#nまだ、おねむなんですか？"
10037005-49 = "むにゃむにゃ……。"
10037005-50 = "ふふっ、チェリノちゃんの寝顔は可愛いですね。"
10037005-54 = "もうお目覚めの時間ですよ？"
10037005-59 = "う～ん……？トモエ……？#nお昼寝中は起こすなと……言ったはずだが……。"
10037005-60 = "もうお昼寝の時間は終わりましたよ？"
10037005-61 = "んん……？"
10037005-62 = "うぅーん……あと、5分……。"
10037005-63 = "チェリノちゃん、いえ、チェリノ書記長宛に書類が届いております。#nすぐに処理していただかないと。"
10037005-64 = "しょるい……？そんなもの、トモエがテキトーにやっておけぇ……#nそれとも、またクーデターか？"
10037005-65 = "いえ、山海経高級中学校の生徒会――玄龍門からの公文書です。"
10037005-66 = "せんがいきょう……こうきゅうちゅうがっこぉ……？"
10037005-72 = "なるほど――交流会の申し入れか。"
10037005-73 = "断る理由などない。おいらが盛大に迎えてやろう！"
10037005-74 = "しかし、山海経からレッドウィンターまで来るのはなかなか大変そうだな。"
10037005-75 = "いえ、書記長。#nそれが……[ruby=・   ・   ・   ・]私たちが[/ruby]山海経に招待されたのです。"
10037005-76 = "んん？おいらたちが山海経に行くのか？"
10037005-77 = "そうなります。"
10037005-78 = "めんどくさ……いや、おいらは忙しいのだ！#nそれに他所の自治区に行ってる間にクーデターでも起こされたらどうするんだ！"
10037005-79 = "チェリノちゃん……これは滅多にないチャンスですよ？#n交流会という名の旅行だと思ってみては？"
10037005-80 = "りょ、旅行！？"
10037005-81 = "う、うむ！山海経との交流会だったか？#nおいらに任せておけ！"
10037005-82 = "流石はチェリノ書記長です。#nその毅然としたお姿は、生徒の模範となるに違いありません。"
10037005-83 = "当然だ！おいらはレッドウィンター連邦学園の生徒会長であり、環境美化部部長兼、書記長兼、運動部代表兼、掃除部部長兼、風紀委員長兼、給食部長兼、そして――"
10037005-85 = "――今月の最優秀プリン試食家兼、#nカステラ工場を直接指導するチェリノ様だからな！"
10037005-86 = "ええ、その通りです、チェリノ書記長！"
10037005-88 = "うむ……ところで、トモエ。一つ聞きたいんだが。"
10037005-89 = "はい、なんでしょう。"
10037005-93 = "その……山海経は……どこにあるんだ？"
10037005-100 = "#video;10037"
