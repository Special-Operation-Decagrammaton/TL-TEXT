[translation]
10037005-1 = "Prólogo; Carta de longe"
10037005-4 = "Resumo até agora"
10037005-8 = "（Especialidades de Shanhaijing — o \"Ginseng Milenar\" — estavam sendo contrabandeadas para fora）"
10037005-9 = "Em Shanhaijing, colhemos uma planta chamada \"Ginseng Milenar\", mas..."
10037005-10 = "Como a quantidade colhida é pequena e seu valor de raridade é alto, sua exportação para fora é estritamente restrita."
10037005-11 = "Recentemente, espalhou-se o boato de que a Associação Genbu está contrabandeando o \"Ginseng Milenar\" para fora da escola..."
10037005-14 = "（Kisaki Ryuuge, a líder do \"Genryumon\", que equivale ao conselho estudantil de Shanhaijing, apontou a Associação Genbu como a culpada pelo contrabando de Ginseng Milenar —）"
10037005-15 = "O Ginseng Milenar é precioso até mesmo em Shanhaijing, por isso é necessária uma permissão para colhê-lo."
10037005-16 = "Ouvir que tal especialidade está sendo levada para fora de Shanhaijing — e sem o conhecimento do Genryumon, é claro que não posso ficar calada."
10037005-17 = "Como líder, não posso ignorar isso. E então... você tem alguma explicação sobre isso?"
10037005-20 = "（Rumi Akeshiro, a presidente da Associação Genbu, buscou a ajuda do Sensei do Schale para limpar seu nome）"
10037005-21 = "É um conselho, ou talvez um pedido..."
10037005-22 = "Nós da Associação Genbu temos um pedido para o Schale."
10037005-25 = "（No entanto, quem contrabandeou o Ginseng Milenar foi um dos executivos do Genryumon —）"
10037005-26 = "Ah. Você sempre foi um estorvo para mim."
10037005-27 = "Eu pensei em como te derrubar, mas precisava de dinheiro para conseguir cooperação."
10037005-29 = "（O executivo fez um acordo com alguém que se envolveu no contrabando de drogas secretas e foi expulso de Shanhaijing）"
10037005-30 = "（Uma das Sete Prisioneiras — Kai Shintani）"
10037005-33 = "Mas, infelizmente, você chegou um passo atrasado. O experimento com a nova droga já foi concluído."
10037005-34 = "Se eu pudesse pedir mais, gostaria de ter coletado um pouco mais de dados experimentais, mas..."
10037005-42 = "Munya munya..."
10037005-43 = "Não, Tomoe... não construa uma represa de pudim no rio de pudim... senão não vou conseguir comer o pudim..."
10037005-44 = "Uuuun... mas o bolo castella, o leite de morango... e o éclair de banana também..."
10037005-48 = "Cherino-chan? Você ainda está com sono?"
10037005-49 = "Munya munya..."
10037005-50 = "Fufu, o rosto da Cherino-chan dormindo é tão fofo."
10037005-54 = "Já está na hora de acordar, sabia?"
10037005-59 = "Uuun...? Tomoe...? Eu disse... para não me acordar durante a soneca..."
10037005-60 = "A hora da soneca já acabou."
10037005-61 = "Nnn...?"
10037005-62 = "Uuuun... só mais 5 minutos..."
10037005-63 = "Cherino-chan, não, chegaram documentos para a Secretária-Geral Cherino. Você precisa processá-los imediatamente."
10037005-64 = "Documentos...? Cuide disso de qualquer jeito, Tomoe... Ou será que é outro golpe de estado?"
10037005-65 = "Não, é um documento oficial do conselho estudantil da Escola Superior Shanhaijing — o Genryumon."
10037005-66 = "Shanhaijing... Escola Superior...?"
10037005-72 = "Entendo — um convite para um encontro de intercâmbio."
10037005-73 = "Não há motivos para recusar. Eu mesma os receberei em grande estilo!"
10037005-74 = "Mas parece ser bem difícil vir de Shanhaijing até Red Winter."
10037005-75 = "Não, Secretária-Geral. É que... nós fomos convidadas para Shanhaijing."
10037005-76 = "Nnn? Nós vamos para Shanhaijing?"
10037005-77 = "Exatamente."
10037005-78 = "Que trabalhoso... não, eu estou ocupada! Além disso, o que faremos se derem um golpe de estado enquanto eu estiver em outro distrito?"
10037005-79 = "Cherino-chan... essa é uma oportunidade rara, sabe? Por que não pensa nisso como uma viagem sob o nome de encontro de intercâmbio?"
10037005-80 = "Vi-viagem!?"
10037005-81 = "U-uhum! Era um encontro de intercâmbio com Shanhaijing, não era? Deixe comigo!"
10037005-82 = "Como esperado da Secretária-Geral Cherino. Essa sua postura resoluta certamente servirá de exemplo para os alunos."
10037005-83 = "Claro! Eu sou a presidente do conselho estudantil da Academia Federal Red Winter, chefe do Departamento de Embelezamento Ambiental, Secretária-Geral, representante do Departamento de Esportes, chefe do Departamento de Limpeza, presidente do Comitê Disciplinar, chefe do Departamento de Merenda, e também..."
10037005-85 = "— A melhor provadora de pudim deste mês e a Cherino-sama que supervisiona diretamente a fábrica de bolo castella!"
10037005-86 = "Sim, exatamente, Secretária-Geral Cherino!"
10037005-88 = "Uhum... a propósito, Tomoe. Quero te perguntar uma coisa."
10037005-89 = "Sim, o que deseja?"
10037005-93 = "Aquele... onde fica... Shanhaijing?"
10037005-100 = "#video;10037"
