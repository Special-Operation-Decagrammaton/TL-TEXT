[translation]
10043030-1 = "Episódio 3; As pessoas sonham com beisebol"
10043030-4 = "Ah, Sensei, por aqui!"
10043030-5 = "Conseguimos nos encontrar, de alguma forma."
10043030-6 = "[s] \"Como estão as coisas?\""
10043030-7 = "Ainda não aconteceu nada."
10043030-8 = "……E não conseguimos encontrar nenhuma pista."
10043030-9 = "Mas, como vamos trocar de ataque e defesa, depois disso……!"
10043030-16 = "Falando no diabo……!"
10043030-20 = "Haa, haa……"
10043030-21 = "Estou com palpitações…… está ouvindo?"
10043030-26 = "Ah, sim. Estou bem."
10043030-28 = "Você acha que aquela defesa está bem!?#nO que você está dizendo!?"
10043030-29 = "Não, esqueça isso.#nRepetindo: se chegar à base, o próximo rebatedor deve fazer um bunt."
10043030-30 = "Faça com que seja um sucesso."
10043030-34 = "E-espere um pouco!#nExistem as regras de etiqueta do beisebol, não é!?"
10043030-35 = "Não são regras oficiais, mas como um entendimento tácito……"
10043030-36 = "Por exemplo, não fazer bunt durante um no-hitter ou um jogo perfeito, ou quando há uma grande diferença no placar……."
10043030-37 = "Acho que ninguém vai te criticar por fazer um bunt agora, mas……."
10043030-38 = "Ainda estamos na parte baixa da 2ª entrada!?"
10043030-39 = "Além disso, você coloca um rebatedor principal, capaz de rebater rebatidas longas, como o 4º rebatedor――"
10043030-40 = "E pedir para o 3º rebatedor, que aumenta o moral da equipe, fazer um bunt!"
10043030-41 = "Do ponto de vista da sabermetria…… um bunt aqui, na verdade, diminui a expectativa de pontuação!"
10043030-42 = "[s] \"O que é sabermetria?\""
10043030-46 = "É uma teoria que analisa dados de beisebol para analisar estratégias de forma mais científica."
10043030-47 = "De acordo com a sabermetria, a probabilidade de pontuar com um corredor na primeira base e nenhum eliminado é de 43,4%, e a expectativa de pontuação é de 0,884 pontos."
10043030-48 = "Mas se você fizer um bunt e deixar a situação com um eliminado e um corredor na segunda base, a probabilidade de pontuar cai para 41,6% e a expectativa de pontuação cai para 0,714 pontos.#nOu seja―― o resultado é mais desfavorável!"
10043030-52 = "[ns1] \"……E-entendi?\"\n[ns2] (Não entendi nada……!)"
10043030-55 = "Aliás, existe um filme famoso sobre usar essa teoria para contratar jogadores com estatísticas excelentes――"
10043030-56 = "E transformar um time que está na lanterna da liga em um time de elite!"
10043030-57 = "É um dos meus filmes favoritos, então se o Sensei tiver interesse, qualquer dia――"
10043030-61 = "Cale……"
10043030-65 = "Cale?"
10043030-69 = "Amadores, fiquem quietos!!!"
10043030-73 = "M-mas eu também sou do clube de beisebol!"
10043030-74 = "Que sentido tem essa teoria de poltrona!#nOlhe para a média de rebatidas do 3º rebatedor à sua frente!"
10043030-75 = "É só pesquisar que aparece!"
10043030-76 = "Hmm, há quem diga que a média de rebatidas não é confiável, mas……."
10043030-77 = "Bem, 3º rebatedor dos Braves, média de rebatidas……."
10043030-82 = "Ah, i-isso é……!?"
10043030-83 = "17%!?"
10043030-84 = "[s] \"Média de 17%!?\""
10043030-85 = "Exatamente. Entendeu agora?"
10043030-89 = "Quem diria que ele era um rebatedor tão poderoso!"
10043030-90 = "Hã……?"
10043030-91 = "Como esperado do 3º rebatedor dos Braves…… é frustrante, mas ele é só um pouquinho…… melhor que eu."
10043030-92 = "Qual é a…… sua média de rebatidas……?"
10043030-93 = "8%!"
10043030-94 = "[s] \"…….\""
10043030-95 = "O-oito por cento……?"
10043030-96 = "Mas não pode! Pedir para um rebatedor tão poderoso fazer um bunt!"
10043030-97 = "Para não interromper o fluxo da partida, eu realmente preciso..."
10043030-101 = "Cala a boca, silêncio!#nFaçam o que eu estou mandando!!!"
10043030-105 = "Ugh..."
10043030-106 = "[s] \"Treinador, o que faremos?\""
10043030-107 = "Precisamos impedir a explosão da fábrica a todo custo..."
10043030-108 = "Então, só nos resta conseguir um bunt..."
10043030-109 = "Para isso, alguém precisa chegar à base...!#nO primeiro batedor desta entrada é o segundo, mas..."
10043030-124 = "Ele rebateu! Ah, não! É uma bola rasteira para o campo interno!"
10043030-125 = "Ah! Os Raiders cometeram um erro na recepção!"
10043030-126 = "[s] \"Talvez essa seja a nossa chance...!\""
10043030-127 = "Corra...! Corra até a primeira base!!"
10043030-138 = "Braves, o primeiro batedor chega à base devido a um erro!"
10043030-139 = "Será que os Raiders estavam tensos por estarem na defesa?"
10043030-140 = "Talvez tenha sido o cansaço da longa parte alta da segunda entrada."
10043030-141 = "Será que eles vão contra-atacar a partir daqui? Fiquem de olho na ofensiva dos Braves!"
10043030-147 = "O próximo a ir para o bastão é o terceiro batedor."
10043030-148 = "Podemos esperar uma rebatida longa... Oh, um bunt aqui?#nIsso é... bem incomum."
10043030-149 = "Por favor! Que dê certo...!"
10043030-158 = "É um bunt! A bola tocou... na linha da terceira base!"
10043030-159 = "O corredor vai para a segunda base. A bola é lançada para a primeira... fora.#nNão foi um bunt de segurança, pelo visto."
10043030-160 = "Temos um eliminado, mas o corredor conseguiu avançar. Vamos ver como o jogo se desenrola."
10043030-161 = "Conseguimos!"
10043030-162 = "Ufa..."
10043030-163 = "[s] \"Que tenso...\""
10043030-164 = "Tudo conforme o plano. Agora é o quarto batedor, hora de mudar para uma rebatida longa."
10043030-165 = "Marquem um ponto de cada vez, com certeza...!"
10043030-166 = "A chance chegou!"
10043030-167 = "Isso! Vamos transformar isso em pontos!"
10043030-172 = "O quarto batedor dos Braves se posicionou no bastão."
10043030-173 = "Isso vai ser interessante."
10043030-174 = "Hoje em dia, o beisebol valoriza muito os números e estatísticas, mas a atmosfera no montinho continua sendo um elemento indispensável."
10043030-175 = "Exatamente! Capturar o fluxo da partida também é uma habilidade!"
10043030-187 = "E ele... rebateu o primeiro arremesso!"
10043030-192 = "Ele acertou...! Mas... isso é um fly direto para o terceira base...!#nDois eliminados...!?"
10043030-193 = "[s] \"Ah, o corredor da segunda base começou a correr...!\""
10043030-194 = "O quê!? Isso é ruim! Desse jeito vai virar uma eliminação dupla!"
10043030-199 = "Ah, não! O corredor não conseguiu voltar a tempo, foi uma eliminação dupla!#nBraves, três eliminados, troca de lado!"
10043030-200 = "Era uma grande chance, mas infelizmente o resultado foi decepcionante para os Braves."
10043030-204 = "..."
10043030-209 = "Sensei, você está bem?"
10043030-210 = "[s] \"Eu não estou com nada, por quê?\""
10043030-211 = "Então o treinador está em choque?"
10043030-212 = "Não?"
10043030-213 = "Então, quem foi..."
10043030-218 = "Fui eu!!!"
10043030-219 = "Tínhamos uma chance... e tudo terminou com um fly que virou eliminação dupla!?"
10043030-220 = "Sendo o quarto batedor, não consegue rebater longe, e o corredor sai correndo num fly...!"
10043030-221 = "O que há de errado com esse pessoal!!"
10043030-225 = "Ora... os Braves também estão se esforçando..."
10043030-226 = "Todo mundo está se esforçando, não é só eles!"
10043030-227 = "Haa, haa, droga... a, a partida ainda não acabou."
10043030-228 = "Até o último arremesso... eu não posso desistir!"
10043030-232 = "N-nossa, que legal...!"
10043030-237 = "Cale a boca! Não tem jeito... vamos tentar outro padrão."
10043030-241 = "Troca de arremessador na 3ª entrada!"
10043030-245 = "Espere um pouco, não seria melhor deixar ele arremessar até a 5ª entrada!?"
10043030-246 = "O Quality Start já não é mais possível, mas..."
10043030-247 = "Aquele arremessador também é um jogador promissor, sabe!"
10043030-248 = "Você é cego ou o quê!?"
10043030-249 = "Não acha que está exagerando um pouco!?"
10043030-250 = "Como alguém com um ERA de 7 pode ser um jogador promissor!!!"
10043030-254 = "Ele é super talentoso!"
10043030-258 = "......Ugh."
10043030-262 = "[ns] \"Ele caiu de novo...\""
10043030-265 = "N-nossa..."
10043030-266 = "...Parece que você está passando por maus bocados."
10043030-267 = "Haa... faça exatamente como eu disse! Quer ser explodido junto com a arquibancada!?"
10043030-271 = "Não me diga que tem uma bomba na arquibancada!?"
10043030-273 = "Entendeu? Troca de arremessador na 3ª entrada!!"
10043030-280 = "O-o que devemos fazer... Sensei?"
10043030-281 = "[s] \"Por enquanto...\""
10043030-283 = "[ns] \"Vamos retomar as buscas...\""
10043030-284 = "Sim..."
