[translation]
10043030-1 = "第3話;人は野球に夢を見る"
10043030-4 = "あ、先生こっちです！"
10043030-5 = "なんとか合流できましたね。"
10043030-6 = "[s] \"様子はどう？\""
10043030-7 = "まだ何も起きていないです。"
10043030-8 = "……手がかりも、掴めていません。"
10043030-9 = "でも、攻守交代なので、このあと……！"
10043030-16 = "噂をすれば……！"
10043030-20 = "はぁ、はぁ……"
10043030-21 = "動悸がする……聞いてるか？"
10043030-26 = "あ、ああ。大丈夫だ。"
10043030-28 = "あの守備で大丈夫だと！？#n何を言っているんだ！？"
10043030-29 = "いや、それはいい。#n繰り返しになるが、出塁したら次のバッターはバントだ。"
10043030-30 = "必ず成功させろ。"
10043030-34 = "ま、待ってください！#n野球のお約束がありますよね！？"
10043030-35 = "正式な規定ではありませんが、暗黙の了解として……"
10043030-36 = "例えば、ノーヒットノーランと[ruby=パーフェクトゲーム]か完全試合、[/ruby]あとは、大差がついている局面ではバントを控えるとか……。"
10043030-37 = "今バントをしても非難されることはないと思いますが……。"
10043030-38 = "まだ2回裏ですよ！？"
10043030-39 = "しかも、長打も打てる主力バッターを4番に配置しておいて――"
10043030-40 = "その士気を高めてくれる、3番バッターにバントをさせるだなんて！"
10043030-41 = "セイバーメトリクスの観点で言えば……ここでのバントは、むしろ得点期待値を下げる行為です！"
10043030-42 = "[s] \"セイバーメトリクスって何？\""
10043030-46 = "野球のデータを分析して、戦略をより科学的に分析する理論です。"
10043030-47 = "セイバーメトリクスによると、ノーアウト一塁での得点確率は43.4%で、得点期待値は0.884点になります。"
10043030-48 = "でもバントを打ってワンアウト二塁状況にすれば、得点確率は41.6%に減少し、得点期待値も0.714点になります。#nつまり――より不利な結果になるんです！"
10043030-52 = "[ns1] \"……な、なるほど？\"\n[ns2] （わからない……！）"
10043030-55 = "ちなみに、この理論を使って優れたステータスを持つ選手をスカウトし――"
10043030-56 = "リーグ最下位のチームを強豪チームに作り変えていく名作映画もありますよ！"
10043030-57 = "私の大好きな1作なので、先生もご興味あれば今度――"
10043030-61 = "し……"
10043030-65 = "し？"
10043030-69 = "素人は黙っとれ！！！"
10043030-73 = "こ、これでも野球部なんですけど！"
10043030-74 = "机上の空論に何の意味がある！#n目の前の3番バッターの打率を見てみろ！"
10043030-75 = "検索すればすぐ出る！"
10043030-76 = "うーん、打率はあてにならないとの見解もありますが……。"
10043030-77 = "ええと、ブレーブス3番バッター、打率っと……。"
10043030-82 = "え、こっ、これは……！？"
10043030-83 = "1割7分！？"
10043030-84 = "[s] \"打率17％！？\""
10043030-85 = "そうだよ。分かったか？"
10043030-89 = "まさか、これほどの強打者だったなんて！"
10043030-90 = "は……？"
10043030-91 = "さすがはブレーブスの3番バッター……悔しいですが、ほんの少しだけ……私より上です。"
10043030-92 = "お前の……打率は……？"
10043030-93 = "0割8分です！"
10043030-94 = "[s] \"……。\""
10043030-95 = "は、8%……？"
10043030-96 = "でも、ダメです！こんな[ruby=・]強[/ruby][ruby=・]打[/ruby][ruby=・]者[/ruby]にバントをさせるなんて！"
10043030-97 = "試合の流れを止めないためにも、やっぱり――"
10043030-101 = "うるさい黙れ！#n言うことを聞けーっ！！！"
10043030-105 = "ううっ……。"
10043030-106 = "[s] \"監督、どうしますか？\""
10043030-107 = "工場の爆破だけはなんとしても阻止したいです……。"
10043030-108 = "では、バントを成功させるしか……。"
10043030-109 = "そのためには誰かが出塁しなくては……！#nこの回のトップバッターは2番ですが――"
10043030-124 = "打った！あっ、いけない！内野ゴロです！"
10043030-125 = "あ！レイダースが捕球ミスしました！"
10043030-126 = "[s] \"これはチャンスかも……！\""
10043030-127 = "走って……！一塁まで突っ走れっ！！"
10043030-138 = "ブレーブス、エラーによりトップバッターが出塁です！"
10043030-139 = "レイダース、守備に回って緊張していたのでしょうか。"
10043030-140 = "長かった2回表の疲労が出たのかもしれません。"
10043030-141 = "ここから反撃なるか！ブレーブスの攻勢に注目です！"
10043030-147 = "次、打席に立つのは3番バッターです。"
10043030-148 = "長打が期待できますね……おや、ここでバント？#nこ、これは……珍しいですね。"
10043030-149 = "お願い！成功して……！"
10043030-158 = "バントです！ボールが当たって……！三塁線へ！"
10043030-159 = "ランナーは二塁へ。ボールが一塁に投げられ……アウト。#nセーフティバントにはなりませんでしたね。"
10043030-160 = "ワンアウトですがランナーは進塁できましたね。試合の展開を見ていきたいところです。"
10043030-161 = "やったぁ！"
10043030-162 = "ふぅ……。"
10043030-163 = "[s] \"緊張したね……。\""
10043030-164 = "計画通りだ。次は4番、長打に切り替えるタイミングだな。"
10043030-165 = "1点ずつ確実に取っていけ……！"
10043030-166 = "チャンス到来です！"
10043030-167 = "ああ！このまま得点につなげよう！"
10043030-172 = "ブレーブスの4番バッター、打席に立ちました。"
10043030-173 = "これは楽しみですね。"
10043030-174 = "昨今、野球も数字と統計が重視されていますが、やはりマウンドの空気も欠かせない要素となっています。"
10043030-175 = "その通り！試合の流れを掴むのも実力です！"
10043030-187 = "そして初球を……打ちました！"
10043030-192 = "当たった……！けど……これはサード真上のフライ……！#nツーアウトですね……！？"
10043030-193 = "[s] \"あっ、二塁ランナーが走り出してる……！\""
10043030-194 = "えっ！？マズいです！これじゃ[ruby=ゲッツー]併殺[/ruby]になっちゃいます！"
10043030-199 = "あーっと！ランナーの帰塁が間に合いません、ダブルプレーになってしまいました！#nブレーブス、3アウトでチェンジです！"
10043030-200 = "せっかくのチャンスでしたが、ブレーブスとしては残念な結果になってしまいましたね。"
10043030-204 = "……っ。"
10043030-209 = "先生、大丈夫ですか？"
10043030-210 = "[s] \"私はなんともないよ？\""
10043030-211 = "じゃあ監督がショックで？"
10043030-212 = "いや？"
10043030-213 = "じゃあ、一体誰が……。"
10043030-218 = "俺だよ！！！"
10043030-219 = "チャンスだったのに……フライからの[ruby=ゲッツー]併殺[/ruby]で終わりだと！？"
10043030-220 = "4番バッターのくせに長打も打てないわ、ランナーはフライで走り出すわ……！"
10043030-221 = "もう何なんだよ、こいつら！！"
10043030-225 = "ほら……ブレーブスも頑張っていますから……。"
10043030-226 = "頑張ってるのはみんな同じだろうが！"
10043030-227 = "はぁ、はぁ、くそっ……ま、まだ試合は終わりじゃない。"
10043030-228 = "最後の一球まで……諦めるわけにはいかないんだ！"
10043030-232 = "な、なんだかカッコイイ……！"
10043030-237 = "お前は黙ってろ！仕方ない……別パターンでいこう。"
10043030-241 = "3回でピッチャー交代だ！"
10043030-245 = "待ってください、5イニングめまで投げた方がいいのでは！？"
10043030-246 = "クオリティ・スタートはもう叶いませんが……。"
10043030-247 = "あの投手だって、それなりに有望な選手なんですよ！"
10043030-248 = "お前の目は節穴か！"
10043030-249 = "ちょっと言い過ぎじゃないですか！？"
10043030-250 = "防御率7点台が、有望選手なわけあるかーっ！！！"
10043030-254 = "超優秀ですよ！"
10043030-258 = "……うっ。"
10043030-262 = "[ns] \"また倒れちゃった……。\""
10043030-265 = "な、なんだか……"
10043030-266 = "……苦労されてるみたいですね。"
10043030-267 = "はぁっ……言った通りにしろ！座席ごと吹っ飛ばされたいのか！？"
10043030-271 = "まさか観客席に爆弾を！？"
10043030-273 = "いいか？3回でピッチャー交代だ！！"
10043030-280 = "ど、どうしましょう……先生？"
10043030-281 = "[s] \"とりあえず……\""
10043030-283 = "[ns] \"捜索を再開しよう……。\""
10043030-284 = "はい……。"
