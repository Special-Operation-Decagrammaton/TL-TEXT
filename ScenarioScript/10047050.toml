[translation]
10047050-1 = "Episódio 5: Aqueles que devem ser evitados"
10047050-2 = "（Após terminar a visita, voltamos para o dormitório）"
10047050-4 = "Então, primeiro, vamos começar criando uma atmosfera adequada para o ritual..."
10047050-9 = "[ns] \"J-já não está parecendo o suficiente...?\""
10047050-10 = "Sensei. Você tem interesse em histórias de terror?"
10047050-11 = "Este dormitório possui regras que não são conhecidas pelo mundo exterior."
10047050-12 = "Estava pensando em ler algumas delas para você... fufu."
10047050-13 = "[ns] Acena com a cabeça."
10047050-14 = "Fufu... então vamos começar."
10047050-18 = "Regras especiais do dormitório, nº 13."
10047050-19 = "『Este manual, assim como as outras regras, é o 13º documento criado para a vida saudável e segura das alunas da academia no dormitório』"
10047050-20 = "『Como é uma preparação para situações imprevistas, as residentes do dormitório devem seguir rigorosamente as regras abaixo』"
10047050-26 = "『Item 1... Ao usar o telefone vermelho no saguão do 1º andar, #njamais pressione o número 6 repetidamente』"
10047050-27 = "『Não existem números de telefone dentro de Wildhunt que contenham o 6 em sequência』"
10047050-28 = "『Caso, por algum motivo, pressione o 6 repetidamente, vá imediatamente para o sótão e esconda-se por 10 minutos』"
10047050-29 = "『Durante esse tempo, não responda a ninguém, mesmo que chamem por você』"
10047050-33 = "『Pois aquela voz não pertence a ninguém que você conheça――』"
10047050-34 = "[ns] \"Entendo...\""
10047050-35 = "Eu vou ler o item 2!"
10047050-39 = "『A escadaria central deste dormitório é exclusiva para a equipe de supervisão, sendo proibido o uso por alunas comuns』"
10047050-40 = "『Para um trânsito tranquilo, esta regra deve ser sempre respeitada』"
10047050-41 = "『Caso exista algum item que contradiga esta regra, jamais o siga』"
10047050-42 = "[s] \"O que isso significa?\""
10047050-43 = "Nyufufu, o que será que significa?"
10047050-44 = "Não precisa se preocupar... estou apenas falando de um jeito misterioso."
10047050-45 = "Ihi... então, Lena-chan, quer tentar ler o próximo...?"
10047050-50 = "P-por que eu?"
10047050-51 = "Se é só para falar de um jeito misterioso... então deve estar tudo bem..."
10047050-52 = "Hum, você só quer me provocar de novo."
10047050-53 = "Não estou com medo, tá? Tudo bem! #nDe qualquer forma, é tudo mentira!"
10047050-58 = "『Item 3... Neste dormitório, realizamos um treinamento de evacuação uma vez por ano』"
10047050-59 = "『Como o treinamento simula uma emergência, algumas escadas do dormitório serão bloqueadas』"
10047050-60 = "『Por isso, as residentes devem utilizar a escadaria central』... Ué?"
10047050-61 = "[s1] \"Mas no item 2...\"\n[s2] \"Dizia que o uso da escadaria central era proibido...\""
10047050-66 = "Lena-chan... logo que você entrou, fizemos um treinamento de evacuação, lembra?"
10047050-67 = "Sim, mas..."
10047050-68 = "Qual escada usamos naquela época...?"
10047050-69 = "Se não me engano, a escadaria cen――"
10047050-74 = "Ihi... então você violou o \"item 2\"..."
10047050-75 = "Ah... então a voz do espírito que ouvimos hoje, foi por causa disso...?"
10047050-76 = "N-não tem como ser isso!? Não diga bobagens!"
10047050-77 = "Além disso, não fui só eu que usei a escadaria central! #nAs outras alunas também deveriam ter ouvido!"
10047050-78 = "Ihi..."
10047050-79 = "Eu vou ler o último..."
10047050-83 = "『Item 4... Por fim――』"
10047050-84 = "『Após confirmar o conteúdo acima... #nqueime este documento e descarte-o』"
10047050-85 = "『Caso o descarte não seja fácil... #npressione \"666\" no telefone vermelho do saguão do 1º andar』"
10047050-86 = "『Um especialista aparecerá para descartar este documento...』"
10047050-87 = "[s3] \"Mas não deveria existir um número com 6 repetido...\"\n[s4] \"Quem será que viria...?\""
10047050-92 = "V-viu só! É tudo mentira!"
10047050-93 = "Vamos jogar fora essa coisa que não faz o menor sentido!"
10047050-94 = "Se descartar de qualquer jeito, você pode acabar sendo amaldiçoada..."
10047050-95 = "É verdade... #nPor isso... vamos queimar e jogar fora..."
10047050-96 = "Para servir de... ritual também."
10047050-100 = "Ah! Então esse era o seu objetivo desde o começo, né!!"
10047050-102 = "Nyufufu... de qualquer forma, agora a preparação e a atmosfera estão perfeitas."
10047050-103 = "...Então, vamos dar início ao ritual de invocação do demônio!"
10047050-104 = "Mestre! Você vai ajudar, não vai?"
10047050-108 = "Não existe direito de recusa... eu acho. Ihi!"
10047050-109 = "[ns5] \"Já que estamos no barco... né.\"\n[ns6] \"Não tem mais como voltar atrás, né...\""
10047050-112 = "Então, vou desenhar o círculo mágico para a invocação!"
10047050-113 = "[s] \"Onde você vai desenhar?\""
10047050-114 = "...Mestre, o que você acha do número '4'?"
10047050-115 = "Não tem uma impressão de algo sinistro ou assustador?"
10047050-116 = "E se falarmos de um lugar que tem muitos desses '4'..."
10047050-117 = "É este quarto, o 4º dormitório, quarto 404!"
10047050-118 = "[s] \"Não tem o quarto 606 do 6º dormitório...?\""
10047050-119 = "Infelizmente, não existe..."
10047050-120 = "Sim, ou seja... #neste é o quarto mais adequado para a invocação do demônio."
10047050-121 = "Na verdade, não consigo pensar em nenhum outro lugar!"
10047050-122 = "Ei, você vai desenhar no nosso quarto?"
10047050-123 = "Nyufufu, não se preocupe. Vou usar uma tinta segura."
10047050-124 = "Só vai fazer um pequeno barulho de explosão e sair um pouco de fumaça."
10047050-125 = "Vai explodir, então!!"
10047050-126 = "Fufu, Rena-chan, você não está curiosa? #nO que acontecerá se desenharmos o círculo mágico aqui..."
10047050-127 = "Nem um pouco!"
10047050-128 = "Eu... queria ver..."
10047050-132 = "Será que... não pode fazer?..."
10047050-133 = "Caa..."
10047050-134 = "Miau..."
10047050-135 = "Até eles estão desanimados!?"
10047050-136 = "Rena-chan..."
10047050-137 = "U, uuu...!!"
10047050-142 = "Tá bom, eu entendi! Mas não me cause problemas!"
10047050-143 = "Se quebrar minhas coisas, vou exigir uma indenização!"
10047050-144 = "Nyufufu, obrigada! Como esperado da Rena-chan!"
10047050-146 = "(E assim, os preparativos para o ritual começaram)"
10047050-150 = "Hee... nunca vi esse círculo mágico antes... #nOnde você conseguiu isso...?"
10047050-151 = "É um círculo mágico original, baseado na numerologia antiga."
10047050-152 = "Ihi, você é boa nisso..."
10047050-153 = "Mesmo para mim, que sou leiga, dá para sentir que é incrível...!"
10047050-154 = "Ei, parem de empolgar ela!?"
10047050-156 = "(Depois de um tempo...)"
10047050-159 = "Pronto, o círculo mágico está completo."
10047050-160 = "Agora só falta recitar o encantamento."
10047050-166 = "Bem, Ph'nglui... Mglw'nafh..."
10047050-167 = "Ei, pare! Parece que vai aparecer algo errado!"
10047050-168 = "Não pode? Então..."
10047050-173 = "Hocus Pocus...!"
10047050-174 = "Dá para invocar um demônio com isso!?"
10047050-175 = "Rena-chan... você entende bastante disso, hein..."
10047050-176 = "Hum, então na verdade você leva o ocultismo mais a sério do que qualquer um..."
10047050-181 = "C-cala a boca! É porque todo mundo fica recitando feitiços o tempo todo!"
10047050-182 = "Nyu-fu... então, que tal usarmos um feitiço original meu?"
10047050-186 = "Aqueles que recebem a orientação dos arcanos e contemplam o alvorecer."
10047050-187 = "O destino que aguarda no fim da jornada de luz — no amanhã..."
10047050-188 = "Reúnam os desejos da terra e invoquem a chama proibida — #nManifeste-se aqui!"
10047050-193 = "Rache, semente da explosão —!!"
10047050-194 = "E-explosão!? Isso significa que...!"
10047050-198 = "Oh... eu pensei que só sairia um pouco de fumaça, mas que explosão foi essa...!"
10047050-199 = "Será que é o resultado do treinamento diário...!?"
10047050-211 = "Vocês! O que estão fazendo!!"
10047050-213 = "Ah...! Finalmente os \"malditos\" chegaram...!"
10047050-214 = "[s] \"Então os 'malditos' eram o Comitê Disciplinar?\""
10047050-215 = "Nossos... maiores inimigos..."
10047050-216 = "Fufu, sempre há obstáculos antes do sucesso."
10047050-217 = "Mas não podemos desistir. O que importa é..."
10047050-222 = "— A \"mente\"."
10047050-223 = "...Por isso."
10047050-224 = "Já chega de tanta teimosia!"
10047050-225 = "Ah, acabou, já era, isso não vai dar certo..."
10047050-226 = "A confusão no museu também foi obra de vocês, não foi?"
10047050-228 = "Ei! Prendam todos!!"
10047050-235 = "[ns] \"A-ah... eu também...?\""
10047050-236 = "Não importa quem sejam, não há exceções para a nossa execução!"
10047050-243 = "(Fui levada junto com o pessoal do Clube de Pesquisa Oculta)"
