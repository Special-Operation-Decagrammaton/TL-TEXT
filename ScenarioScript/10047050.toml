[translation]
10047050-1 = "第5話;忌むべき者たち"
10047050-2 = "（見学を終えて、寮に戻った）"
10047050-4 = "ではまず、儀式にふさわしい雰囲気作りから……。"
10047050-9 = "[ns] \"も、もう十分それらしくなってない……？\""
10047050-10 = "先生。怖い話にご興味はありますか？"
10047050-11 = "この寮には、外部には知られていないルールがあるのです。"
10047050-12 = "その一部を読み上げようかと……ふふっ。"
10047050-13 = "[ns] 頷く。"
10047050-14 = "ふふ……では始めます。"
10047050-18 = "寮の特別規則、第13号。"
10047050-19 = "『このマニュアルは他の規則と同様、学院の生徒の健全かつ安全な寮生活のために作成された、13番目の文書である』"
10047050-20 = "『不測の事態に備えたものであるため、寮生は以下の規則を厳守すること』"
10047050-26 = "『その1……1階ロビーの赤い電話を利用する場合、#n絶対に6を連続で押さないこと』"
10047050-27 = "『ワイルドハント内の電話番号に6が連続で入ることはない』"
10047050-28 = "『万が一、6を連続で押してしまった場合、速やかに屋根裏部屋に移動し、10分間身を潜めること』"
10047050-29 = "『この間、声をかけられようと絶対に答えてはならない』"
10047050-33 = "『その声は、あなたの知る誰でもないのだから――』"
10047050-34 = "[ns] \"なるほど……。\""
10047050-35 = "その2は私が読みあげますね！"
10047050-39 = "『本寮の中央階段は寮監隊専用であるため、一般生徒の利用を禁ずる』"
10047050-40 = "『円滑な通行のため、本規則は必ず遵守すること』"
10047050-41 = "『この項目と矛盾する項目が存在する場合も、決して従ってはならない』"
10047050-42 = "[s] \"どういうこと？\""
10047050-43 = "にゅふふ、どういうことでしょうね？"
10047050-44 = "気にしなくていいよ……それっぽく言ってるだけだから。"
10047050-45 = "イヒッ……じゃ、次はレナちゃんが読んでみる……？"
10047050-50 = "な、なんで私なの？"
10047050-51 = "それっぽく言ってるだけなら……大丈夫なはず……。"
10047050-52 = "ふん、またからかうつもりでしょ。"
10047050-53 = "別に怖くないし？いいよ？#nどうせ、うそっぱちなんだから！"
10047050-58 = "『その3……本寮では年に1回、避難訓練を実施する』"
10047050-59 = "『訓練は非常時を想定しているため、寮内の一部階段が封鎖される』"
10047050-60 = "『そのため、寮生は中央階段を利用すること』……あれ？"
10047050-61 = "[s1] \"たしかその2では……。\"\n[s2] \"中央階段の使用は禁止だって……。\""
10047050-66 = "レナちゃん……入学して間もないころ、避難訓練したよね。"
10047050-67 = "そうだけど……。"
10047050-68 = "その時の階段は……？"
10047050-69 = "確か、中央階――"
10047050-74 = "イヒッ……じゃ、「その2」に違反しちゃったねぇ……。"
10047050-75 = "あっ……では今日聞いた怨霊の声は、それが理由……？"
10047050-76 = "そ、そんなわけないじゃない！？でたらめ言わないで！"
10047050-77 = "それに中央階段を使ったの、私だけじゃないし！#n他の子も聞いてないとおかしいし！"
10047050-78 = "イヒッ……。"
10047050-79 = "最後は、私が読みあげるねぇ……。"
10047050-83 = "『その4……最後に――』"
10047050-84 = "『上記内容を確認した後……#n必ず本文書を燃やし、廃棄すること』"
10047050-85 = "『万が一廃棄が容易でない場合……#n1階ロビーの赤い電話で「666」と押すこと』"
10047050-86 = "『専門家が現れ、本文書を廃棄する……』"
10047050-87 = "[s3] \"6が連続する番号はないはずなのに……。\"\n[s4] \"誰が来るんだろう……？\""
10047050-92 = "ほ、ほら！でたらめじゃん！"
10047050-93 = "こんなわけわかんない物、捨てちゃおうよ！"
10047050-94 = "むやみに捨てれば、呪われることもあります……。"
10047050-95 = "その通り……。#nだから……燃やして、捨てようねぇ……。"
10047050-96 = "儀式も……兼ねて。"
10047050-100 = "あっ！最初からそれが狙いだったんでしょ！！"
10047050-102 = "にゅふふ……とにかく、これで準備も雰囲気もバッチリですね。"
10047050-103 = "……では、これより悪魔召喚の儀を執り行います！"
10047050-104 = "マスター！手伝ってくれますよね？"
10047050-108 = "拒否権は、ない……けどねぇ。イヒッ！"
10047050-109 = "[ns5] \"乗りかかった船……か。\"\n[ns6] \"もう後には退けないってことだよね……。\""
10047050-112 = "では、召喚のための魔法陣を描きます！"
10047050-113 = "[s] \"どこに描くの？\""
10047050-114 = "……マスターは「4」という数字について、どう思いますか？"
10047050-115 = "不吉、不気味……そんな印象があるのでは？"
10047050-116 = "そんな「4」が最も入っている場所といえば……。"
10047050-117 = "この部屋、第4寮、404号室です！"
10047050-118 = "[s] \"第6寮の606号室はないの……？\""
10047050-119 = "非常に残念ながら、ありません……。"
10047050-120 = "そう、つまり……#nここが悪魔の召喚に最も適している部屋なのです。"
10047050-121 = "むしろ、他の場所は考えられません！"
10047050-122 = "えっ、私たちの部屋に描くの？"
10047050-123 = "にゅふふ、ご心配なく。安全な塗料を使いますから。"
10047050-124 = "小さな爆発音と、少々の煙が出るくらいです。"
10047050-125 = "爆発するんじゃん！！"
10047050-126 = "ふふ、レナちゃんも気になりませんか？#nここに魔法陣を描いて、何が起こるか……。"
10047050-127 = "ぜんっぜん！"
10047050-128 = "私……見てみたいなぁ……。"
10047050-132 = "やったら……ダメかなぁ……。"
10047050-133 = "カァァ……。"
10047050-134 = "ニャオ……。"
10047050-135 = "こいつらまでしょんぼりしてる！？"
10047050-136 = "レナちゃん……。"
10047050-137 = "う、ううっ……！！"
10047050-142 = "わかったわよ！でも、私に迷惑かけないでね！"
10047050-143 = "私の物を壊したら、損害賠償請求してやるんだから！"
10047050-144 = "にゅふふ、ありがとうございます！さすがレナちゃんです！"
10047050-146 = "（そうして、儀式の準備が始まった）"
10047050-150 = "へぇ……この魔法陣、初めて見るねぇ……#nどこでこれを……？"
10047050-151 = "古代の[ruby=アイソセフィ]数秘術[/ruby]を参考にした、オリジナル魔法陣です。"
10047050-152 = "イヒッ、やるねぇ……。"
10047050-153 = "素人の私にも素晴らしさが伝わってきます……！"
10047050-154 = "ちょっと、盛り上げないで！？"
10047050-156 = "（しばらくして……）"
10047050-159 = "はい、これで魔法陣は完成です。"
10047050-160 = "あとは呪文を唱えるだけですね。"
10047050-166 = "ええと、[ruby=Ph'nglui]ふんぐるい[/ruby]……[ruby=Mglw'nafh]むぐるうなふ[/ruby]……。"
10047050-167 = "ちょっ、ストップ！なんか違うの出て来ちゃいそう！"
10047050-168 = "だめですか？では……。"
10047050-173 = "ホクス・ポクス……！"
10047050-174 = "それ悪魔呼べるの！？"
10047050-175 = "レナちゃん……詳しいねぇ……。"
10047050-176 = "ふむ、本当は誰よりもオカルトに真剣だったのですね……。"
10047050-181 = "う、うるさいっ！みんながいっつも呪文唱えてるからっ！"
10047050-182 = "にゅふ……では、私オリジナルの呪文にしましょうか。"
10047050-186 = "アルカナの導きをいただき、暁を見つめる者たちよ。"
10047050-187 = "光の旅路の先――[ruby=あす]明日[/ruby]に待つ運命よ……。"
10047050-188 = "地上の願いを集め、禁断の炎に呼びかける――#nここに、顕現せよ！"
10047050-193 = "割れよ、炸裂の種子――！！"
10047050-194 = "さ、炸裂！？それって……！"
10047050-198 = "おお……煙があがる程度かと思いきや、こんな爆発が……！"
10047050-199 = "日々の鍛錬の成果でしょうか……！？"
10047050-211 = "お前ら！何をしているっ！！"
10047050-213 = "ああっ……！とうとう「忌むべき者」たちが……！"
10047050-214 = "[s] \"「忌むべき者」って寮監隊のことだったんだ？\""
10047050-215 = "私たちの……最大の宿敵……。"
10047050-216 = "ふふ、成功の前には障害があるもの。"
10047050-217 = "ですが、諦めてはいけません。大事なのは――"
10047050-222 = "――「マインド」。"
10047050-223 = "……ですから。"
10047050-224 = "そろそろ懲りろっ！"
10047050-225 = "あーもう終わりよ終わり、ダメねこれ……。"
10047050-226 = "美術館の騒ぎも、お前たちだな？"
10047050-228 = "おい！全員拘束しろ！！"
10047050-235 = "[ns] \"あ、あの……私も……？\""
10047050-236 = "何者であろうと、我々の執行対象に例外はない！"
10047050-243 = "（オカ研のみんなと一緒に連行された）"
