[translation]
1010505-1 = "ライブを終えて"
1010505-2 = "（ライブ当日、マリーに会いに行った）"
1010505-4 = "……はい、そろそろ時間ですね。"
1010505-5 = "準備はできています。"
1010505-6 = "……？"
1010505-7 = "先生……！？"
1010505-8 = "もしかして、心配で様子を見に……？"
1010505-9 = "……申し訳ありません。#nまた先生に気を遣わせてしまいました。"
1010505-10 = "[s1] \"気にしないで、私が会いたかっただけだから。\"\n[s2] \"マリーのライブを見たくて来たんだ。\""
1010505-13 = "……ありがとうございます、先生。"
1010505-14 = "ほかのお二人ですか……？"
1010505-15 = "このステージは、私だけで行う予定になっています。"
1010505-16 = "学園祭期間中、ミニライブを何回も開催するんだそうです。"
1010505-17 = "お二人は、別の場所で頑張ってくださっています！"
1010505-18 = "[s3] \"今日はマリーの単独ライブなんだ！\"\n[s4] \"盛り上がりそうだね！\""
1010505-21 = "えへへ……。"
1010505-22 = "……私にとって、この時間はかけがえのない贈り物です。#n皆さんの前で歌を披露したり、先生に応援していただいたり……。"
1010505-23 = "こんなにも、たくさんの笑顔が見られるだなんて。"
1010505-24 = "考えてみれば……。"
1010505-25 = "……相談室よりも、多くの方が訪れているような気も。"
1010505-26 = "あれ……。"
1010505-27 = "……こ、これで良いんでしょうか？"
1010505-28 = "[s5] \"普段からそんなに多くの人が……？\"\n[s6] \"それよりも多いって……マリーはすごいね！\""
1010505-31 = "そんな、もったいないお言葉を……。"
1010505-32 = "……ふふっ。"
1010505-33 = "あっ、そろそろ行かないと……。"
1010505-34 = "その、先生……よろしければ、ライブが終わったら……。"
1010505-39 = "……な、何でもありません！"
1010505-40 = "[s7] \"応援してるね！\"\n[s8] \"行ってらっしゃい！\""
1010505-43 = "……！"
1010505-44 = "はい、先生。"
1010505-45 = "……行ってきます！"
1010505-48 = "（ライブが終わるまで、舞台袖でマリーを待った）"
1010505-49 = "（ステージ上のマリーも、とても輝いていた）"
1010505-53 = "（そして、ライブ終了後……）"
1010505-54 = "……先生！"
1010505-63 = "（マリーは元気良く戻ってきた）"
1010505-66 = "[wa:800]― [log=마리 아이돌]先生、[wa:880]待っていてくださったのですね！[/log]"
1010505-68 = "― [log=마리 아이돌]まさか[wa:930]ずっとここで[wa:550]待っていてくださったなんて……[/log]"
1010505-71 = "[wa:1500]― [log=마리 아이돌]その……[wa:1500]ステージ、[wa:1200]どうでしたか？[/log]"
1010505-73 = "― [log=마리 아이돌]舞台袖からだと[wa:1550]あんまり良く[wa:700]見えなかったとは思うのですが……[/log]"
1010505-76 = "[wa:830]― [log=마리 아이돌]でも、[wa:1050]先生はずっと[wa:900]見守ってくださっていたから……[/log]"
1010505-78 = "― [log=마리 아이돌]舞台袖からでも[wa:1300]大丈夫かな……[/log]"
1010505-81 = "[wa:830]― [log=마리 아이돌]その……[wa:1250]パフォーマンス、[wa:1200]どうでした？[/log]"
1010505-83 = "― [log=마리 아이돌]ちゃんと……[wa:950]「アイドル」に[wa:900]なれていました？[/log]"
1010505-86 = "[ns9] \"正真正銘、アイドルだったよ！\"\n[ns10] \"マリーは最初から、みんなのアイドルだよ！\"\n[ns11] \"ファン一号の私が保証する！\""
1010505-90 = "[wa:670]― [log=마리 아이돌]……！！[/log]"
1010505-92 = "[wa:1300]― [log=마리 아이돌]……ありがとうございます、[wa:1100]先生……！[/log]"
1010505-95 = "[wa:1350]― [log=마리 아이돌]……えへへ。[/log]"
1010505-98 = "（その後、熱気で火照ったマリーが落ち着くのを待ってから）"
1010505-99 = "（ライブの余韻を胸に、会場をあとにした）"
