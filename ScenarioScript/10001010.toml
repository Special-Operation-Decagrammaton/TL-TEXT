[translation]
10001010-1 = "Episódio 1: O Festival de Solstício manchado pela purga"
10001010-2 = "Academia Federal Red Winter - Refeitório"
10001010-3 = "Este é o refeitório, o local responsável pelas refeições da nossa Academia Federal Red Winter!"
10001010-4 = "A alimentação é a base das atividades vitais!#nNão deve haver qualquer tipo de discriminação no conteúdo das refeições baseada em status social..."
10001010-5 = "Por isso, na nossa Academia Federal Red Winter, a mesma quantidade é distribuída para todas as alunas!"
10001010-6 = "Claro, como Secretária-Geral desta academia, Presidente do Conselho Estudantil, Chefe do Departamento de Embelezamento Ambiental, Chefe do Departamento de Limpeza, e..."
10001010-7 = "Hum..."
10001010-8 = "Enfim, como eu, Cherino, assumo todas as funções importantes, sou muito grandiosa. Por isso, tenho o privilégio de comer um pudim a mais que as outras alunas!"
10001010-9 = "Todas as outras pessoas podem desfrutar de uma refeição igualitária. Hahaha!"
10001010-10 = "[s] \"O que estão fazendo aqui agora?\""
10001010-11 = "Boa pergunta, camarada!#nEu também estava curiosa com esse cheiro doce desde agora."
10001010-12 = "Chefe de cozinha, o que você está preparando?"
10001010-14 = "Ah, Presidente! Seguindo as ordens da grandiosa Presidente, estamos fazendo pudins para o \"Ivan Kupala\"."
10001010-15 = "Como houve a instrução de \"dobrar a cota de distribuição de pudins\" para este Ivan Kupala, todos os membros do Departamento de Refeições estão trabalhando dia e noite na produção."
10001010-16 = "Entendo, uma postura exemplar para o Departamento de Refeições! Muito bem!"
10001010-17 = "Quando este Festival de Solstício terminar, concederei a vocês a \"Ordem do Bigode de Primeira Classe\"!"
10001010-18 = "Muito obrigado, Presidente!"
10001010-19 = "E então, este é o tal pudim... Muito bem, vou provar um pouco."
10001010-22 = "Nham, nham..."
10001010-23 = "Ugh...! O que é este pudim!?#nO sabor está fraco e a textura está mole demais!?"
10001010-24 = "I-Isso é... embora tenha havido ordens para \"aumentar a produção\", também fomos informados de que \"não poderíamos adicionar mais ingredientes\"..."

10001010-25 = "Como faltava leite e não havia outra forma de aumentar a quantidade, decidi que era inevitável e usei água..."
10001010-26 = "M-Misturar água no pudim!? Que absurdo...!"
10001010-28 = "Mesmo que tenha sido para aumentar a produção, não posso permitir que algo assim aconteça!"
10001010-29 = "Marina!"
10001010-31 = "Chamou, Presidente Cherino?"
10001010-32 = "Expurgo! Expurge todos esses membros imperdoáveis que misturaram água no pudim!"
10001010-33 = "P-Por favor, nos perdoe, Presidente! Nós também não queríamos fazer isso...!"
10001010-34 = "Sua insolente! Você acha que vai sair impune depois de cometer tal estupidez contra o plano perfeito da Presidente Cherino?!"
10001010-35 = "Ou será que você pretende desafiar a autoridade do Grande Bigode?"
10001010-36 = "Uuu, não pode ser... não pode ser...!"
10001010-40 = "Ufa, acabei fazendo um pouco de barulho."
10001010-41 = "[s1] \"Assustador...\"\n[s2] \"A Academia Red Winter é um lugar assustador, não é...\""
10001010-42 = "Haha. Esqueça o que acabou de acontecer, camarada. Foi apenas um pequeno incidente."
10001010-43 = "Haha. Esqueça o que acabou de acontecer, camarada. Foi apenas um pequeno incidente."
10001010-44 = "Hm? Quer saber o que acontecerá com os alunos que foram expurgados?"
10001010-45 = "Isso é, obviamente..."
10001010-46 = "Eles receberão um castigo muito terrível!"
10001010-47 = "Por exemplo... ter que limpar os banheiros sozinhos por uma semana,"
10001010-48 = "ou ter a distribuição de lanches suspensa por um mês!"
10001010-49 = "Por isso, Camarada, é melhor você não tentar desafiar a autoridade na Academia Federal de Red Winter, hahaha!"
10001010-50 = "De qualquer forma, vamos continuar e seguir para o próximo local de inspeção!"
10001010-52 = "Academia Federal de Red Winter - Gráfica"
10001010-53 = "Este é o departamento editorial do 'Red Bear', o jornal diário responsável pela propaganda e relações públicas aqui dentro da nossa Academia Federal de Red Winter!"
10001010-54 = "Hm? Você achava que todas as atividades de imprensa em Kivotos eram de responsabilidade da Chronos...?"
10001010-55 = "Que absurdo...!"
10001010-56 = "O 'Red Bear' é diferente daquele jornalismo sensacionalista da Chronos! Comparado àquelas matérias cheias de fofocas e informações falsas, o nosso é muito mais rápido e preciso!"
10001010-57 = "Camarada, se tiver oportunidade, leia o 'Red Bear'. #nVocê certamente descobrirá muitos fatos novos que não conhecia antes, hahahaha!"
10001010-60 = "Editor-chefe, como está a preparação para a 'Edição Especial Ivan Kupala do Red Bear'?"
10001010-62 = "Sim, não há problemas, Presidente. Nesta edição especial de Ivan Kupala, usaremos tintas coloridas especiais e o papel da mais alta qualidade para imprimir o retrato da Presidente em destaque na capa."
10001010-63 = "Isso é maravilhoso! Quando o Festival do Solstício de Verão terminar, concederei medalhas a todos vocês!"
10001010-64 = "É uma honra imensa! Muito obrigado, Presidente!"
10001010-65 = "Hum, então deixe-me ler um pouco."
10001010-67 = "'A grande Presidente Cherino inspecionou o local onde as obras de expansão do parque de diversões estão sendo realizadas...'"
10001010-68 = "Hum, hum, ótimo!"
10001010-69 = "……Hm? Espere, editor-chefe. Esta foto..."
10001010-70 = "Marina e Tomoe estão na foto, mas a minha figura, que é a mais importante, não aparece. O que significa isso?"
10001010-71 = "I-isso é... como não tínhamos um banquinho na hora, foi muito difícil conseguir enquadrar todos na mesma foto..."
10001010-72 = "O quê...!? Você está dizendo que eu sou baixinha!?"
10001010-73 = "D-de forma alguma! Jamais diria algo assim...!"
10001010-75 = "Seu insolente!"
10001010-76 = "Mesmo que fosse o caso, existem várias formas de fazer isso, como usar edição de imagem para fazer a Presidente parecer mais alta!"
10001010-77 = "M-mas nós, do 'Red Bear', somos uma mídia sincera que sempre transmite apenas os fatos com precisão..."
10001010-78 = "Uuuuh...! Marina!"
10001010-79 = "Sim, Presidente."
10001010-81 = "Este sujeito insultou a Presidente Cherino, a pessoa com a maior dignidade na Academia Federal Red Winter! Purgue este editor-chefe insolente!"
10001010-83 = "E-eu vou corrigir o artigo imediatamente! Por favor, Presidente, eu imploro!"
10001010-85 = "Palavras e artigos não podem ser corrigidos depois de publicados... Você não sabe nem isso?!"
10001010-89 = "Ufa... Sinto que ultimamente há muitos insolentes por aí."
10001010-90 = "Bem, não importa, já que posso simplesmente purgar todos eles."
10001010-91 = "Yaaawn... Trabalhei demais, estou com sono..."
10001010-92 = "Tomoe, vou voltar para casa para tirar uma soneca..."
10001010-93 = "Fufu, entendido. Prepararei sua cama imediatamente."
10001010-94 = "Camarada, certifique-se de descansar bastante enquanto eu tiro minha soneca..."
10001010-96 = "Sensei, por favor, utilize a sala de descanso."
10001010-97 = "Vou guiá-lo. Vamos, por aqui."
10001010-99 = "Corredor do Novo Edifício da Academia Federal Red Winter"
10001010-101 = "Bom trabalho, Presidente Marina!"
10001010-102 = "Sim! Bom trabalho a todos também!"
10001010-103 = "Já que terminamos as purgas de forma satisfatória hoje, vou voltar para o dormitório e descansar..."
10001010-107 = "Ah, uaa!?"
10001010-111 = "Ai, ai... Ugh, minhas costas..."
10001010-112 = "Como pode haver uma lata vazia jogada aqui? O que o Clube de Embelezamento Ambiental está fazendo?!"
10001010-113 = "Vou levar todos os membros sob custódia por suspeita de sabotagem!"
10001010-114 = "Deixando isso de lado, sinto que bati em algo quando caí,"
10001010-115 = "mas o que seria...?"
10001010-119 = "I-isso é... a estátua da Presidente Cherino!?"
10001010-120 = "E por causa da queda, a parte do bigode quebrou de um jeito estranho!"
10001010-121 = "O-o que eu faço? Não parece que dá para colar com adesivo..."
10001010-122 = "S-se a Presidente Cherino descobrir isso..."
10001010-126 = "Você quebrou a minha estátua? E ainda por cima, o bigode caiu e ficou com uma aparência ridícula?"
10001010-127 = "Uuu... Que atrocidade, isso é imperdoável! Expurgo, é hora do expurgo!"
10001010-129 = "Levem a Comissária Marina para aquele banheiro imundo do prédio antigo! Façam ela limpar banheiros até se formar!"
10001010-131 = "I-isso não pode acontecer! Você não tem ideia de quanto esforço eu fiz para chegar a este cargo...!"
10001010-132 = "Preciso encontrar um jeito, qualquer jeito, de evitar ser expurgada pela Presidente Cherino...!"
10001010-134 = "...Espere um pouco."
10001010-135 = "Pelo contrário, se a Presidente Cherino não estiver aqui, eu não serei expurgada, certo?"
10001010-136 = "Isso mesmo...! O básico da tática é atacar antes de ser atacado! Se eu expulsar a Presidente Cherino e me tornar a presidente, não serei expurgada!"
10001010-137 = "Comitê de Segurança, todos reunidos!"
10001010-143 = "Comissária, o que houve de repente?"
10001010-144 = "……A partir de agora, vamos avançar contra a secretaria. Vamos derrubar todos os executivos e derrotar a Presidente Cherino!"
10001010-145 = "Presidente, isso significa que... estamos falando de uma revolução?"
10001010-147 = "I-Isso mesmo! Isso é uma revolução!"
10001010-148 = "……Não é de forma alguma porque estou com medo de ser expurgada pela Presidente Cherino, entenda!"
10001010-149 = "Oh, a Presidente Marina desembainhou sua espada!"
10001010-150 = "É hora de martelar a corrupta Presidente Cherino e aqueles puxa-sacos dela!"
10001010-153 = "（Comecei isso por um impulso repentino, mas... isso não é nada mal!）"
10001010-154 = "（Muito bem, vou aproveitar para me tornar a nova Presidente de Red Winter e desfrutar de todo o poder!）"
10001010-157 = "Certo! Então, todos, em direção à secretaria..."
10001010-158 = "Ataquem!"
