[translation]
10023095-2 = "こちらです！"
10023095-3 = "はあ、はあ……！どうして……こんな事にっ……！"
10023095-12 = "ごきげんよう――素敵な夜ですね。"
10023095-13 = "また現れおって……「慈愛の怪盗」め！"
10023095-14 = "おや、熱烈な歓迎ですね……そんなに興奮されても困ってしまいます。"
10023095-15 = "まだ諦めておらんとは……！"
10023095-16 = "ふふ……本当にそう思っていたのですか？"
10023095-17 = "ええい、うるさい！#nこれは私のものだ……金を払わん限り、誰にも渡すつもりは無い！"
10023095-18 = "嗚呼、それはいけない――その王冠は貴方の物ではないでしょう？#nそれは、お嬢さん方のものだ。"
10023095-19 = "貴方のような価値の分からぬ成金には――相応しくない。"
10023095-20 = "お前の意見など聞いとらん！#nケッ……C&Cも所詮は噂だけだったか。"
10023095-21 = "事情も伝えずに王冠を守れだなんて……#nよくもまあ、そのような無茶を蕾たちに言ったものですよ。"
10023095-22 = "そもそも貴方が依頼したのは、本当にC&Cだったのですか？"
10023095-23 = "なに……どういう事だ？"
10023095-24 = "嗚呼、お気になさらず。#n金稼ぎしか考えていない貴方にとっては、どうでも良い話でしょうから。"
10023095-31 = "おわっ！？"
10023095-35 = "みんな、今だよ！"
10023095-36 = "お姉ちゃん、王冠を確保しないと！"
10023095-38 = "と、止めろ！"
10023095-39 = "警備たち！"
10023095-45 = "全力で敵を排除します。"
10023095-47 = "光よ！"
10023095-58 = "王冠は……この王冠は、私の物だ……！"
10023095-65 = "……ん？何故こんな所に箱が……"
10023095-66 = "ま、まさか！？"
10023095-71 = "もう……逃げ場はありません。[ruby=めいたろう]明太郎[/ruby]さん……"
10023095-72 = "王冠を……渡してください。#nそうすれば、誰も傷付かずに済みます……"
10023095-73 = "ふざけるな！私は絶対に屈しない！"
10023095-74 = "……仕方ない……ですね……"
10023095-75 = "お願い、します。"
10023095-83 = "な、はっ！？"
10023095-84 = "最初からこうした方が早かったと思いますよ？"
10023095-85 = "でも……せめて、お話を聞いてから……"
10023095-98 = "「時計王の冠」……回収しました……！"
10023095-99 = "よ、良かったぁ……"
10023095-101 = "パンパカパーン！仲間と力を合わせて、宝物を取り戻しました！"
10023095-102 = "盗品の回収を完了しました。#nこれで私の任務も無事終わりです。"
10023095-104 = "C、C&C……！お前たち、私を裏切ったのか！この恥知らずめ！"
10023095-106 = "恥知らずなのは、本当に私たちでしょうか？"
10023095-107 = "C&Cが動いている裏で地下オークションを開き、#n盗品の売買を行っていたあなたに言われたくはありません。"
10023095-108 = "――私、[ruby=あすま]飛鳥馬[/ruby]トキが、あなたを拘束します。"
10023095-109 = "ふ、ふざけるな！"
10023095-110 = "こんなところで捕まってたまるか！！"
10023095-114 = "あっ、逃げた！"
10023095-115 = "お任せください。"
10023095-120 = "ふふ……では、お嬢さんの代わりに、王冠は私がありがたく頂くとしましょうか。"
10023095-124 = "ゲホ、ゲホッ！煙で……前が見えない……！"
10023095-125 = "この煙幕……まさか……！？"
10023095-126 = "ゆ、ユズちゃん！#n王冠！気をつけて！"
10023095-128 = "う、うん……！しっかり握ってる、から……！"
10023095-130 = "ふふ……果たして、それは本物の王冠かな？"
10023095-131 = "え、えっ……？"
10023095-136 = "これ……"
10023095-137 = "銅の塊じゃん！"
10023095-138 = "……いつの間に！？"
10023095-144 = "お疲れ様でした、皆々様。#n――嗚呼、お嬢さん方には感謝していますよ。"
10023095-145 = "「時計王の冠」――しかとこの手に。"
