[translation]
10023095-2 = "É por aqui!"
10023095-3 = "Haa, haa...! Por que... isso está acontecendo...!"
10023095-12 = "Boa noite — que noite maravilhosa, não é?"
10023095-13 = "Você apareceu de novo... sua 'Ladra da Benevolência'!"
10023095-14 = "Ora, que recepção calorosa... fico até sem jeito com tanta empolgação."
10023095-15 = "Ainda não desistiu, é...!"
10023095-16 = "Fufu... você realmente achou que era isso?"
10023095-17 = "Grrr, cale a boca!#nIsso é meu... enquanto não pagarem, não pretendo entregar a ninguém!"
10023095-18 = "Ah, isso não está certo — essa coroa não pertence a você, não é?#nEla pertence às moças."
10023095-19 = "Para um novo-rico que não conhece o valor das coisas como você — ela não é digna."
10023095-20 = "Não pedi a sua opinião!#nTsc... então a C&C não passava de boatos, afinal."
10023095-21 = "Pedir para proteger a coroa sem nem explicar a situação...#nComo você teve a coragem de dizer algo tão absurdo para as meninas?"
10023095-22 = "Aliás, foi realmente a C&C que você contratou?"
10023095-23 = "O quê... o que você quer dizer com isso?"
10023095-24 = "Ah, não se preocupe.#nPara alguém como você, que só pensa em ganhar dinheiro, esse assunto não deve importar."
10023095-31 = "Opa!?"
10023095-35 = "Pessoal, agora!"
10023095-36 = "Irmã, precisamos garantir a coroa!"
10023095-38 = "P-parem!"
10023095-39 = "Seguranças!"
10023095-45 = "Eliminarei os inimigos com força total."
10023095-47 = "Luz!"
10023095-58 = "A coroa... esta coroa é minha...!"
10023095-65 = "...Hm? Por que tem uma caixa aqui..."
10023095-66 = "N-não pode ser!?"
10023095-71 = "Já chega... não há mais para onde fugir, Meitarou-san..."
10023095-72 = "Por favor... entregue a coroa.#nAssim, ninguém precisará se machucar..."
10023095-73 = "Não me faça rir! Eu nunca vou me render!"
10023095-74 = "...Não tem jeito... então..."
10023095-75 = "Por favor."
10023095-83 = "O-o quê!?"
10023095-84 = "Acho que teria sido mais rápido fazer assim desde o começo, não acha?"
10023095-85 = "Mas... pelo menos, depois de ouvir o que tínhamos a dizer..."
10023095-98 = "A 'Coroa do Rei do Relógio'... recuperada...!"
10023095-99 = "A-ainda bem..."
10023095-101 = "Tan-tan-tan! Unindo forças com os amigos, recuperamos o tesouro!"
10023095-102 = "Recuperação do item roubado concluída.#nCom isso, minha missão termina em segurança."
10023095-104 = "C, C&C...! Vocês me traíram! Seus sem-vergonhas!"
10023095-106 = "Será que somos nós que não temos vergonha?"
10023095-107 = "Não quero ouvir isso de alguém que abriu um leilão clandestino para vender itens roubados enquanto a C&C estava em ação."
10023095-108 = "— Eu, Asuma Toki, vou prendê-lo."
10023095-109 = "N-não me faça rir!"
10023095-110 = "Eu não vou ser pego em um lugar desses!!"
10023095-114 = "Ah, ele fugiu!"
10023095-115 = "Deixe comigo."
10023095-120 = "Fufu... então, no lugar da moça, acho que aceitarei a coroa com gratidão."
10023095-124 = "Cof, cof! Com essa fumaça... não consigo ver nada...!"
10023095-125 = "Essa cortina de fumaça... não pode ser...!?"
10023095-126 = "Y-Yuzu-chan!#nA coroa! Cuidado!"
10023095-128 = "S-sim...! Estou segurando firme, então...!"
10023095-130 = "Fufu... será mesmo que essa é a coroa verdadeira?"
10023095-131 = "Eh, hã...?"
10023095-136 = "Isso aqui..."
10023095-137 = "É só um pedaço de cobre!"
10023095-138 = "...Desde quando!?"
10023095-144 = "Bom trabalho a todos. #n――Ah, sou muito grato a vocês, senhoritas."
10023095-145 = "A \"Coroa do Rei Relógio\"... finalmente está em minhas mãos."
