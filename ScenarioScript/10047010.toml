[translation]
10047010-1 = "Episódio 1: Reencontro Destinado"
10047010-4 = "(Ao visitar uma certa praça para descansar...)"
10047010-8 = "[ns1] \"Que legal...\"\n[ns2] \"Sinto que já ouvi isso em algum lugar...\""
10047010-12 = "N-não pode ser?#nUma estudante do ensino médio tocando algo tão incrível...!?"
10047010-13 = "Esse death metal... faz minha alma ferver!!"
10047010-17 = "[ns] \"Estudante do ensino médio... death metal...\""
10047010-22 = "[ns] \"Ah! Essa música é...!!\""
10047010-26 = "Fufu. Obrigada a todos."
10047010-27 = "Meu nome é Shiina Tsumugi.#nVim do País das Maravilhas."
10047010-28 = "Embora, na verdade, um país de contos de fadas não exista—"
10047010-33 = "—O \"sentimento\"."
10047010-34 = "...é o que importa."
10047010-35 = "[ns] \"Eu sabia, era a Tsumugi!\""
10047010-39 = "Oh? Você é..."
10047010-40 = "Este é... um reencontro inesperado."
10047010-41 = "Ah... Então era disso que \"aquela criança\" falava#nsobre um \"encontro do destino\"."
10047010-42 = "Entendo...#nO fio vermelho do destino não era apenas ficção, afinal."
10047010-47 = "Já que nos reencontramos,#nque tal conversarmos um pouco?"
10047010-48 = "O show de hoje já terminou, afinal."
10047010-49 = "[s] \"Com prazer!\""
10047010-50 = "Então, vamos lá."
10047010-51 = "—Para o País das Maravilhas."
10047010-52 = "[s] \"País das Maravilhas...?\""
10047010-56 = "[ns3] \"Você quer dizer a floresta do parque?\"\n[ns4] \"O local do show?\""
10047010-59 = "Fufu... Deixe isso como uma surpresa para depois."
10047010-60 = "Vamos, por aqui. Com certeza será uma experiência inesquecível."
10047010-65 = "Bem-vindo ao País das Maravilhas.#n...Então, o que achou?"
10047010-66 = "[s] \"Aqui... é só um café comum, não é?\""
10047010-67 = "...Sensei.#n\"Maravilha\" significa \"algo diferente do comum\"."
10047010-68 = "Esta é a primeira vez que você vem a um café comigo, não é?#nOu seja, uma situação diferente do comum.#nSe não chamarmos isso de \"maravilha\", o que chamaríamos?"
10047010-69 = "[s] \"Bem, dito dessa forma...\""
10047010-70 = "Ainda assim... que a relação entre sensei e aluno#npermaneça apenas como uma \"maravilha\"...#nseria um pouco solitário, não acha?"
10047010-71 = "Por isso... que tal?#nQue tal avançarmos um pouco a nossa história?"
10047010-72 = "[s] \"Você quer dizer que quer nos conhecer melhor?\""
10047010-73 = "Fufu, dito assim, parece até que estou te convidando para um encontro."
10047010-74 = "Não, não vou negar. Nesse tipo de desenvolvimento—"
10047010-79 = "—A \"emoção\"."
10047010-80 = "...é o que importa."
10047010-81 = "Deixe-me perguntar uma coisa."
10047010-82 = "A minha apresentação de outro dia... você gostou?"
10047010-85 = "KYEEEEEE! A morte dos humanos é o bem-estar da sociedade!!!!"
10047010-86 = "WOEEEEEERRRRRRRRRRRRRR!!!!"
10047010-89 = "Sensei?"
10047010-90 = "[s5] \"Ah, bem...\"\n[s6] \"F-foi divertido...\""
10047010-93 = "Fufu, fico feliz em ouvir isso."
10047010-94 = "Sinto muito por não ter podido convidá-lo para a festa pós-show naquela época.#nOs membros são um pouco tímidos..."
10047010-95 = "Espero que um dia eu possa apresentá-los ao Sensei."
10047010-96 = "[s] \"Todos eles são do clube de música de Wildhunt, não são?\""
10047010-97 = "Não, alunos de várias escolas diferentes se reuniram."
10047010-98 = "Para começar, não existe um clube de música em Wildhunt."
10047010-99 = "Fufu, é estranho, não é? Sendo uma \"Academia de Artes\"?"
10047010-100 = "Para ser mais precisa, não existem clubes oficiais por lá."
10047010-101 = "Como o aprendizado acadêmico já está diretamente ligado às atividades artísticas, a política é que não há necessidade de #nclubes."
10047010-102 = "Ainda assim, se você obtiver uma permissão especial como eu, #npode realizar atividades com pessoas de fora da academia..."
10047010-103 = "E também há alunas que se reúnem com pessoas de interesses semelhantes dentro da escola para realizar atividades discretamente."
10047010-104 = "…Hmm. #nEu adoraria continuar apresentando a Wildhunt, mas #neste lugar, parece que não há espaço suficiente para falar sobre tudo."
10047010-105 = "Então, sendo direta... #nA Wildhunt é, para os artistas, #num lugar que parece um \"País das Maravilhas de sonhos e esperanças\"."
10047010-106 = "[s] \"Um País das Maravilhas de sonhos e esperanças...?\""
10047010-107 = "Porque é uma academia onde você pode entrar com sonhos e ambições, e persegui-los como bem entender."
10047010-111 = "Ah, já que estamos aqui, talvez..."
10047010-115 = "Que tal se eu, Shiina Tsumugi, servisse como a coelha do Sensei?"
10047010-116 = "[s] \"Isso... o que significa...?\""
10047010-117 = "Como o coelho que guiou a garota ao País das Maravilhas. #nEu convido você, Sensei, para a Wildhunt."
10047010-118 = "Claro, não sou uma coelha de verdade, mas..."
10047010-123 = "— É uma questão de \"criar o clima\"."
10047010-124 = "…Isso é muito importante."
10047010-125 = "Não gostaria de visitar a academia comigo e conversarmos?"
10047010-126 = "Além disso, adoraria apresentar minhas amigas do dormitório."
10047010-127 = "Quando contei a elas sobre o Sensei, seus olhos brilharam."
10047010-128 = "[s] \"Boa ideia. Eu também estou ansioso!\""
10047010-129 = "Fufu, então está decidido."
10047010-130 = "Mas agora é um pouco difícil... #nEntão, vamos deixar para fazer uma visita detalhada em outro dia."
10047010-131 = "Claro, cumprirei meu papel e irei vestida de coelhinha—"
10047010-132 = "[s] \"Não precisa ir tão longe!\""
10047010-133 = "Hmm... que pena..."
10047010-134 = "Coelhinhas e guitarras são uma combinação com uma certa história #n\"deste lado\"."
10047010-135 = "Eu realmente queria mostrar isso ao Sensei..."
10047010-136 = "[s7] \"Desta vez...\"\n[s8] \"Prefiro que venha com roupas normais.\""
10047010-139 = "Fufu... então deixaremos para uma próxima oportunidade."
10047010-140 = "Vamos pedir? O menu é..."
10047010-145 = "…Isso é! #nSensei, olhe isto."
10047010-146 = "Diz aqui: \"Apaixone-se em uma mordida. Feira de Doces Demoníacos!\""
10047010-147 = "Este \"Bolo de Frutas Vermelhas\", por exemplo, #nsó de olhar a foto já dá vontade de se apaixonar...!"
10047010-148 = "[s] \"Tem uma quantidade surpreendente de frutas vermelhas...\""
10047010-149 = "O fato de as frutas parecerem olhos também é muito charmoso, não é?"
10047010-153 = "Falando nisso... #nno dormitório, tenho uma veterana que gosta de acessórios parecidos com este."
10047010-154 = "Além dela, tem uma garota que sempre usa um chapéu pontudo, #ne outras com um estilo bem único..."
10047010-155 = "…Fufu, estou ansiosa para apresentá-las."
10047010-156 = "[s9] \"Elas parecem ser bem únicas.\"\n[s10] \"Parecem ser pessoas interessantes.\""
10047010-163 = "(Neste momento, eu ainda não sabia)"
10047010-166 = "(Que a história já havia começado...)"
