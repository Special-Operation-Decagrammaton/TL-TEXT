[translation]
1004815-1 = "Não existe nada que seja vazio"
1004815-2 = "（Depois de um tempo, Saori apareceu）"
1004815-4 = "Desculpe pelo incômodo repentino."
1004815-5 = "Tem um equipamento que eu preciso consertar a todo custo."
1004815-6 = "É isto aqui..."
1004815-11 = "[ns] \"Essa é a máscara que você usa, não é, Saori?\""
1004815-12 = "Sim. A função de filtro quebrou."
1004815-13 = "Já pararam de fabricar e...#ncomo as peças são especiais, ninguém aceita consertar."
1004815-14 = "[s] \"É uma máscara tão antiga assim?\""
1004815-15 = "Foi fornecida pela Escola Arius quando fui para o meu primeiro combate real."
1004815-16 = "Se você conseguir consertar... farei qualquer coisa que o Sensei pedir."
1004815-17 = "Por favor... se tiver algum contato, me diga."
1004815-18 = "[s] \"Sério mesmo?\""
1004815-19 = "A-ah... é sério."
1004815-20 = "[s1] \"Dizer algo assim...\"\n[s2] \"Saori, você tem um apego muito grande por essa máscara, não é?\""
1004815-25 = "……Isso é apenas um item fornecido."
1004815-26 = "Não é nada especial."
1004815-27 = "Eu gostava da resistência dela, mas..."
1004815-28 = "Já que quebrou, não tem jeito."
1004815-29 = "Antigamente, ferramentas que paravam de funcionar..."
1004815-30 = "Eu descartava sem hesitar."
1004815-31 = "Mas agora, sinto que esta máscara é como uma companheira importante."
1004815-32 = "Por assim dizer... é como uma parceira."
1004815-33 = "Mesmo que esteja quebrada..."
1004815-34 = "Eu não consigo descartá-la como algo vazio."
1004815-35 = "Por isso, quero dar um jeito de consertá-la."
1004815-36 = "Porque... eu já não sou mais a mesma daquela época."
1004815-37 = "[s] \"Entendo...\""
1004815-41 = "[ns3] \"Se a Saori sente tudo isso...\"\n[ns4] \"Vamos ajudar essa coitadinha a ficar bem de novo!\""
1004815-44 = "……Obrigada, Sensei."
1004815-45 = "[s] \"Mas... não se esqueça da promessa!\""
1004815-46 = "A-a promessa será cumprida. Fui eu quem propôs isso."
1004815-48 = "（Embora tenhamos saído cheios de determinação...）"
1004815-50 = "Uau, que nostálgico, esse modelo!"
1004815-51 = "Mas... com esse estado... talvez fosse mais rápido comprar um novo."
1004815-52 = "Mesmo que eu conserte, não sei quando conseguiria entregar..."
1004815-53 = "Quanto tempo levaria?"
1004815-54 = "No mínimo, teria que esperar um ano..."
1004815-55 = "……Entendo."
1004815-57 = "Bem-vindo! O que deseja procurar?"
1004815-58 = "Sinto muito, estamos sem estoque dessa peça..."
1004815-59 = "A última vez que recebemos foi há muito tempo."
1004815-60 = "Mas, se for o modelo mais recente, a proteção contra poeira é melhor do que esse..."
1004815-61 = "……Tem que ser este aqui."
1004815-63 = "Fufufu, que bom que veio...!"
1004815-64 = "Se for essa peça, eu consigo arranjar! Você tem sorte, cliente!"
1004815-65 = "……Você realmente consegue arranjar?"
1004815-66 = "Fique tranquilo! Algum dia eu vou conseguir! Algum dia..."
1004815-67 = "……Vamos embora, Sensei."
1004815-69 = "（Visitamos várias lojas, mas não tivemos sucesso...）"
1004815-72 = "Já ficou completamente escuro."
1004815-73 = "Pelo visto, consertar algo tão antigo é difícil mesmo..."
1004815-74 = "...Vou desistir."
1004815-75 = "Se eu conseguir esconder meu rosto, já basta."
1004815-76 = "Desculpe. Acabei tomando o seu tempo também, Sensei—"
1004815-77 = "[s5] \"Saori!\"\n[s6] \"Ainda é cedo para desistir!\""
1004815-80 = "...Não houve ninguém que conseguisse consertar, sabia?"
1004815-81 = "[s7] \"Existe sim.\"\n[s8] \"Bem na sua frente!\""
1004815-84 = "...Você vai consertar, Sensei?"
1004815-85 = "[s9] \"Eu já fiz reparos simples em máquinas antes,\"\n[s10] \"e o que eu não souber, é só pesquisar.\""
1004815-88 = "Eu também tentei fazer isso, mas..."
1004815-89 = "Não deu muito certo."
1004815-90 = "[s11] \"Eu sei que é difícil.\"\n[s12] \"Mas, no fundo, você não quer desistir, quer?\""
1004815-96 = "...É verdade."
1004815-97 = "Se houver algo em que eu possa ajudar, me diga."
1004815-98 = "[s13] \"Eu vou cuidar do conserto, então cuide do turno no Schale para mim.\"\n[s14] \"Vamos nos esforçar juntos!\""
1004815-101 = "Eu cuidar do turno no Schale...?"
1004815-102 = "...Entendido."
1004815-104 = "(No dia seguinte...)"
1004815-108 = "(Comecei o conserto da máscara da Saori)"
1004815-118 = "(O conserto foi mais difícil do que eu imaginava...)"
1004815-126 = "(Continuou até tarde da noite)"
1004815-128 = "(O que eu não sabia, pesquisei desesperadamente—)"
1004815-129 = "(As peças quebradas foram substituídas por outras retiradas de outros produtos)"
1004815-136 = "(Foi um trabalho árduo, mas—)"
1004815-137 = "(Quero que os \"companheiros\" da Saori fiquem bem)"
1004815-142 = "(Alguns dias depois...)"
1004815-144 = "...Já é de manhã?"
1004815-145 = "Parece que acabei pegando no sono."
1004815-146 = "Sensei...? Essa sua cara..."
1004815-147 = "[s15] \"Tcharam!\"\n[s16] \"Operação concluída com sucesso!\""
1004815-153 = "...Você conseguiu consertar!?"
1004815-154 = "[s] \"Sim! Experimenta!\""
1004815-160 = "Isso é...!"
1004815-161 = "O filtro está funcionando."
1004815-162 = "...Eu não acredito que você realmente conseguiu."
1004815-166 = "Mais uma vez, você cuidou de mim."
1004815-167 = "[s] \"Foi graças ao apoio da Saori.\""
1004815-171 = "[ns] \"Uma vitória da nossa equipe, né?\""
1004815-172 = "O resultado do esforço do Sensei e meu..."
1004815-173 = "Esta máscara..."
1004815-177 = "Obrigada. Vou cuidar bem dela."
1004815-178 = "[s] \"Sendo assim, agora é a vez da Saori cumprir a promessa.\""
1004815-179 = "É verdade..."
1004815-180 = "[s] \"Você vai atender qualquer pedido meu, não vai!?\""
1004815-181 = "...Com certeza."
1004815-182 = "[s17] \"Fufufu... Mal posso esperar por isso.\"\n[s18] \"Eu queria fazer isso há tanto tempo...!\""
1004815-185 = "O que exatamente você—"
1004815-186 = "...Você não está pensando em nada estranho, está!?"
1004815-187 = "[s] \"É algo que vai deixar a Saori bem envergonhada...!\""
1004815-188 = "Droga...! F-faça o que quiser!"
1004815-189 = "[ns] \"É exatamente o que eu vou fazer!\""
1004815-191 = "[ns] \"...Por isso, quero que venha visitar o Schale sempre que quiser.\""
1004815-192 = "Que tipo de indecência é essa...!"
1004815-193 = "...O quê?"
1004815-194 = "[s] \"De agora em diante, não precisa se acanhar para vir ao Schale.\""
1004815-198 = "[ns19] \"Eu sei que você está sendo atenciosa, mas...\"\n[ns20] \"Eu nunca achei que você fosse um incômodo.\""
1004815-201 = "[ns] \"Saori, você é sempre bem-vinda.\""
1004815-203 = "...Eu nunca tinha pensado em vir aqui para me divertir."
1004815-204 = "Sempre que encontro o Sensei, fico tensa..."
1004815-205 = "Não esperava que você tivesse percebido isso."
1004815-206 = "Tudo bem."
1004815-207 = "Da próxima vez, vou tentar relaxar um pouco mais."
1004815-208 = "Se esta máscara precisar de manutenção, eu voltarei."
1004815-209 = "...Afinal, somos parceiros que consertaram isso juntos."
1004815-210 = "[s] \"Claro! Venha sempre que quiser!\""
1004815-211 = "...Aprendo muito quando estou com o Sensei."
1004815-212 = "Conto com você daqui para frente."
1004815-214 = "(Depois disso, passei um tempo agradável com uma Saori de expressão serena)"
