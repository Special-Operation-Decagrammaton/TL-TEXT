[translation]
1004815-1 = "虚しいものなどない"
1004815-2 = "（しばらくして、サオリがやってきた）"
1004815-4 = "急ですまない。"
1004815-5 = "どうしても修理したい装備があるんだ。"
1004815-6 = "これなんだが……。"
1004815-11 = "[ns] \"それ、サオリの着けてるマスクだよね？\""
1004815-12 = "ああ。フィルター機能が壊れてしまってな。"
1004815-13 = "既に生産中止になっていて……#nパーツも特殊だからどこも修理を引き受けてくれないんだ。"
1004815-14 = "[s] \"そんなに古いマスクなんだ。\""
1004815-15 = "初めて実戦に出たとき、アリウス分校から支給されたものだ。"
1004815-16 = "もしも修理ができるなら……先生の頼みはなんでも聞く。"
1004815-17 = "頼む……何かツテがあれば教えてくれ。"
1004815-18 = "[s] \"本当に？\""
1004815-19 = "あ、ああ……本当だ。"
1004815-20 = "[s1] \"そこまで言うなんて……。\"\n[s2] \"サオリは、このマスクにすごく思い入れがあるんだね。\""
1004815-25 = "……これは、あくまで支給品の一つだ。"
1004815-26 = "特別でもなんでもない。"
1004815-27 = "頑丈なところは気に入っていたが……。"
1004815-28 = "もう壊れてしまったからな。"
1004815-29 = "昔なら、機能しなくなった道具など――"
1004815-30 = "躊躇なく捨てていた。"
1004815-31 = "だが今の私には、このマスクも大切な仲間のように感じられる。"
1004815-32 = "いわば……相棒のようなものだ。"
1004815-33 = "壊れたとしても――"
1004815-34 = "――私はそれを、虚しいものとして切り捨てられない。"
1004815-35 = "だから、なんとか直してやりたいんだ。"
1004815-36 = "もう……あの頃とは違うからな。"
1004815-37 = "[s] \"そうだったんだね……。\""
1004815-41 = "[ns3] \"サオリがそこまで思っているなら……\"\n[ns4] \"一緒に、この子を元気にしよう！\""
1004815-44 = "……ありがとう、先生。"
1004815-45 = "[s] \"でも……約束は忘れないでね！\""
1004815-46 = "や、約束は守る。私が言い出したことだ。"
1004815-48 = "（と、意気込んで出かけたものの……）"
1004815-50 = "うわあ、懐かしいですね、このモデル！"
1004815-51 = "でも……この状態……買い換えた方が早いかもなあ。"
1004815-52 = "直すとしても、いつ納品できるやら……。"
1004815-53 = "どのくらいになる？"
1004815-54 = "最短で1年は見てもらわないと……。"
1004815-55 = "……そうか。"
1004815-57 = "いらっしゃいませ！何をお求めでしょうか！"
1004815-58 = "すみません、そちらの部品は在庫を切らしてまして……。"
1004815-59 = "最後に入荷したのも、ずいぶん前になります。"
1004815-60 = "ですが、最新モデルならば、防塵性能もそちらの物より――"
1004815-61 = "……これじゃないとダメなんだ。"
1004815-63 = "ふっふっふ、よくいらっしゃいました……！"
1004815-64 = "その部品でしたら、用意できますよ！お客さんもツイてるなあ！"
1004815-65 = "……本当に用意できるのか？"
1004815-66 = "ご安心ください！ いつか調達しますよ！いつか……ね。"
1004815-67 = "……行こう、先生。"
1004815-69 = "（何軒もお店を回ったが、収穫はなかった……）"
1004815-72 = "すっかり暗くなってしまったな。"
1004815-73 = "やはり、こんな古いものの修理は難しいか……。"
1004815-74 = "……諦めるとしよう。"
1004815-75 = "顔を隠せれば、それでいい。"
1004815-76 = "すまない。先生にも時間を使わせてしま――"
1004815-77 = "[s5] \"サオリ！\"\n[s6] \"諦めるには早いよ！\""
1004815-80 = "……修理できる者はいなかったんだぞ？"
1004815-81 = "[s7] \"いるよ。\"\n[s8] \"サオリの目の前にね！\""
1004815-84 = "……先生が直すのか？"
1004815-85 = "[s9] \"機械の簡単な修理はしたことあるし、\"\n[s10] \"わからないことは、調べればいいんだよ。\""
1004815-88 = "それは私も試してみたが……。"
1004815-89 = "あまり上手くいかなかった。"
1004815-90 = "[s11] \"難しいのはわかってる。\"\n[s12] \"でも、本当はあきらめたくないよね？\""
1004815-96 = "……そうだな。"
1004815-97 = "手伝えることがあれば、言ってくれ。"
1004815-98 = "[s13] \"修理は私がするから、シャーレの当番を頼むよ。\"\n[s14] \"一緒に頑張ろう！\""
1004815-101 = "私がシャーレの当番を……？"
1004815-102 = "……了解だ。"
1004815-104 = "（翌日……）"
1004815-108 = "（サオリのマスクの修理を始めた）"
1004815-118 = "（修理は想像以上に大変で……）"
1004815-126 = "（夜遅くまで続いた）"
1004815-128 = "（わからないことは、必死に調べ――）"
1004815-129 = "（壊れた部品は、別の製品から取り出したものと交換した）"
1004815-136 = "（大変な作業ばかりだったけど――）"
1004815-137 = "（サオリの「仲間」には、元気でいてほしい）"
1004815-142 = "（数日後……）"
1004815-144 = "……朝か。"
1004815-145 = "眠ってしまっていたようだな。"
1004815-146 = "先生……？その顔は……"
1004815-147 = "[s15] \"ジャーン！\"\n[s16] \"作戦成功だ！\""
1004815-153 = "……直せたのか！？"
1004815-154 = "[s] \"うん！着けてみて！\""
1004815-160 = "これは……！"
1004815-161 = "フィルターが動作している。"
1004815-162 = "……本当に直せるとは。"
1004815-166 = "また、世話になってしまったな。"
1004815-167 = "[s] \"サオリの支援があってこそだよ。\""
1004815-171 = "[ns] \"チームの勝利、だね。\""
1004815-172 = "先生と私の努力の成果……"
1004815-173 = "このマスクが……"
1004815-177 = "ありがとう。大切に使わせてもらう。"
1004815-178 = "[s] \"というわけで、今度はサオリが約束を守る番だよ。\""
1004815-179 = "そうだったな……"
1004815-180 = "[s] \"どんな頼みも聞いてくれるんだよね！？\""
1004815-181 = "……もちろんだ。"
1004815-182 = "[s17] \"ふふふ……どれだけ待ち望んだことか。\"\n[s18] \"ずっとこうしたかったんだ……！\""
1004815-185 = "一体何を――"
1004815-186 = "……変なことを考えていないだろうな！？"
1004815-187 = "[s] \"サオリが恥ずかしがることだよ……！\""
1004815-188 = "くっ……！す、好きにしろ！"
1004815-189 = "[ns] \"そうさせてもらうよ！\""
1004815-191 = "[ns] \"……だから、いつでもシャーレに遊びに来てほしいな。\""
1004815-192 = "そのような破廉恥なことを……！"
1004815-193 = "……何？"
1004815-194 = "[s] \"これからは、遠慮せずにシャーレへおいで。\""
1004815-198 = "[ns19] \"気をつかってるんだろうけれど……\"\n[ns20] \"迷惑なんて、思ったことはないよ。\""
1004815-201 = "[ns] \"サオリをいつでも歓迎する。\""
1004815-203 = "……遊びに来るなど、考えたこともなかった。"
1004815-204 = "先生に会うときも、常に緊張して……"
1004815-205 = "そこまで見抜いていたとはな。"
1004815-206 = "いいだろう。"
1004815-207 = "次回からは、もう少し肩の力を抜くとしよう。"
1004815-208 = "このマスクに整備が必要になったら、また来る。"
1004815-209 = "……共に修理をした、相棒だからな。"
1004815-210 = "[s] \"もちろん！いつでも来てね！\""
1004815-211 = "……先生といると、学ぶことが多いな。"
1004815-212 = "これからも、よろしく頼む。"
1004815-214 = "（その後、穏やかな表情のサオリと楽しい時間を過ごした）"
