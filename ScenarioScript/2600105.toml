[translation]
2600105-1 = "Coisas que não podem ser ditas"
2600105-2 = "Quarto da Kotama"
2600105-3 = "Hackerar o servidor da estação base neste horário permite ouvir muitas conversas interessantes, não é?"
2600105-4 = "Vejamos, que tipo de ligação poderei interceptar hoje..."
2600105-5 = "Remetente desconhecido... Suspeito. #nDo lado do destinatário..."
2600105-6 = "Schale?"
2600105-7 = "Quem diria que alguém ligaria para o Sensei a essa hora da noite... Não posso deixar de ouvir."
2600105-9 = "Interceptação iniciada... Capturado."
2600105-12 = "Um pedido direto do Sensei do Schale? Será que era algo tão urgente assim?"
2600105-13 = "(Talvez por causa da má qualidade da linha, não consigo ouvir claramente...)"
2600105-14 = "...Com certeza, lidar com aquilo é nossa especialidade. Se amadores tentarem fazer isso sozinhos, as roupas podem acabar manchadas de vermelho."
2600105-15 = "(Lidar com... e, roupas manchadas de vermelho...)"
2600105-16 = "O descarte também não é simples. Se não amarrar direito e colocar uma pedra pesada em cima, vai ser um problema se a coisa acabar boiando depois."
2600105-17 = "(Descarte? Pedra pesada? Isso, será que...)"
2600105-18 = "Vou processar tudo direitinho para não apodrecer. Fique no aguardo, hahaha!"
2600105-20 = "..."
2600105-21 = "Pelo visto... você está envolvido em um caso perigoso."
2600105-23 = "Schale - Escritório"
2600105-24 = "..."
2600105-26 = "(De acordo com o que interceptei, o horário em que o outro lado enviará 'aquela coisa' é às 14h de hoje.)"
2600105-27 = "(Pelo menos, antes que o Sensei se envolva em um crime ainda maior, preciso convencê-lo.)"
2600105-28 = "(Se algo acontecer com o Sensei, isso afetará todo o Kivotos...)"
2600105-31 = "[ns] \"Kotama? Você está pálida, está tudo bem?\""
2600105-32 = "E-está tudo bem. É só que não consegui dormir muito bem ontem à noite."
2600105-33 = "O Sensei parece bem feliz, por outro lado. Aconteceu algo de bom?"
2600105-34 = "[s] \"É que algo que eu pedi está prestes a chegar.\""
2600105-35 = "Algo que você pediu, é..."
2600105-36 = "Ei, Sensei. Eu preciso falar uma coisa com você."
2600105-38 = "Vim entregar o item solicitado."
2600105-40 = "Sensei, espere, dentro disso tem...!"
2600105-42 = "[ns] \"Como esperado, o acabamento deste 'Umeboshi' está excelente.\""
2600105-43 = "...Hã? Umeboshi?"
2600105-44 = "O que tem dentro dessa caixa não era uma prova de um crime sangrento?"
2600105-45 = "[s] \"...Kotama, do que você está falando?\""
2600105-47 = "...Entendo. Então, 'manchado de vermelho' era sobre as folhas de shiso, e a 'pedra pesada' era o peso usado na conserva."
2600105-48 = "Pelo conteúdo da ligação, eu interpretei errado e achei que o Sensei estava tentando apagar vestígios de um crime sangrento."
2600105-49 = "[s1] \"Não tem como ser isso...\"\n[s2] \"O que você pensa de mim, Kotama...?\""
2600105-50 = "Fufu, fico feliz que você seja o Sensei de sempre que eu conheço."
2600105-51 = "Fufu, fico feliz que você seja o Sensei de sempre que eu conheço."
2600105-52 = "...Ah. Esse Umeboshi parece delicioso."
2600105-53 = "A cor está bonita, dá para sentir a habilidade do artesão."
2600105-54 = "[s] \"Mas antes disso, Kotama, como você sabe o conteúdo da minha ligação?\""
2600105-55 = "Ah. Isso, é que..."
2600105-56 = "...Coincidência?"
2600105-58 = "Depois disso, dei uma bronca na Kotama por ter grampeado meu telefone."
