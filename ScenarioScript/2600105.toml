[translation]
2600105-1 = "言えないこと"
2600105-2 = "コタマの部屋"
2600105-3 = "この時間帯に基地局のサーバーをハッキングすると、面白い盗み聞きがたくさんできますね。"
2600105-4 = "どれどれ、今日はどんな通話を傍受できるでしょうか……。"
2600105-5 = "発信者不明……怪しいですね。#n受信者側は……"
2600105-6 = "シャーレ？"
2600105-7 = "こんな夜中に先生と電話をする人がいるなんて……これは聞かずにはいられませんね。"
2600105-9 = "傍受開始……キャッチ。"
2600105-12 = "シャーレの先生が直接の依頼だなんて、よっぽど急ぎだったのかな？"
2600105-13 = "（回線の状態が悪いせいか、はっきりとは聞こえませんね……）"
2600105-14 = "……確かにアレの処理についてはオレたちの専門だ。アマチュアが自分たちでやろうとすると、服が赤く染まっちまうかもしれないからな。"
2600105-15 = "（処理……それに、服が赤くって……）"
2600105-16 = "後始末も一筋縄じゃ行かねえ。ちゃんと結んで重い石を乗せとかねえと、後でモノが浮かんで来ちまったら面倒だしな。"
2600105-17 = "（後始末？重い石？これは、まさか……）"
2600105-18 = "腐らないよう、ちゃんと処理しておいてやるからな。楽しみにしてろよ、はははっ！"
2600105-20 = "……。"
2600105-21 = "どうやら……良くない事件に巻き込まれている様ですね。"
2600105-23 = "シャーレ・執務室"
2600105-24 = "……。"
2600105-26 = "（傍受した内容によれば、相手が「例のモノ」を送ってくる時間は、今日の午後2時）"
2600105-27 = "（せめて、先生がこれ以上大きな犯罪に巻き込まれる前に、先生を説得しなければなりません）"
2600105-28 = "（先生に何かあれば、キヴォトス全域に影響が……）"
2600105-31 = "[ns] \"コタマ？顔色が悪いけど、大丈夫？\""
2600105-32 = "だ、大丈夫です。昨晩、少し眠れなかっただけで。"
2600105-33 = "先生の方は、なんだか嬉しそうですが。何かいいことでもありましたか？"
2600105-34 = "[s] \"ちょっと頼んでたモノがもうすぐ届きそうでね。\""
2600105-35 = "頼んでたモノ、って……。"
2600105-36 = "あの、先生。ちょっとお話したいことが。"
2600105-38 = "ご注文の品の配達に参りましたー。"
2600105-40 = "先生、待ってください、その中には……！"
2600105-42 = "[ns] \"今回もさすがの仕上がりだね、「梅干し」。\""
2600105-43 = "……え？梅干し？"
2600105-44 = "その箱の中に入っているのは、血塗られた犯罪の証拠ではなかったんですか？"
2600105-45 = "[s] \"……コタマ、何を言ってるの？\""
2600105-47 = "……なるほど。赤く染まるというのはシソの葉のことで、重い石は漬ける時の重石のことだったんですね。"
2600105-48 = "電話の内容から勝手に、先生が血で染まった犯罪の痕跡を消そうとしているのかと勘違いしていました。"
2600105-49 = "[s1] \"そんなわけないでしょ……。\"\n[s2] \"コタマは私のことを何だと思ってるの……？\""
2600105-50 = "ふふ、私が知ってるいつもの先生でよかったです。"
2600105-51 = "ふふ、私が知ってるいつもの先生でよかったです。"
2600105-52 = "……あっ。この梅干し、美味しそうですね。"
2600105-53 = "色も綺麗で、職人の腕の良さが感じられます。"
2600105-54 = "[s] \"それよりコタマは、何で私の通話の内容を知ってるの？\""
2600105-55 = "あ。それは、その……。"
2600105-56 = "……偶然？"
2600105-58 = "その後しばらく、電話を盗聴した件について、コタマにお説教をした。"
