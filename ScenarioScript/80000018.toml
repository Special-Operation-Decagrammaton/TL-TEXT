[translation]
80000018-1 = "O limite da contabilidade"
80000018-2 = "Escritório do Seminário de Millennium"
80000018-5 = "Falando nisso, já é Dia dos Namorados na semana que vem..."
80000018-6 = "Tenho certeza de que o Sensei vai ganhar muitos chocolates de outras alunas também, mas..."
80000018-7 = "Sabendo que ele vai ganhar chocolate até não conseguir comer tudo, será que eu realmente preciso me dar ao trabalho de presentear também...?"
80000018-8 = "..."
80000018-9 = "Mas presentes são importantes para o trabalho, e como as alunas de outras escolas também vão dar, se só eu não der..."
80000018-10 = "É. Vou acabar dando algo que pareça apropriado."
80000018-17 = "...\"Conjunto de chocolates para presente, voltado para parceiros de negócios\"."
80000018-18 = "O conteúdo é bonito e a reputação não é ruim... deve ter muitos sabores que o Sensei gosta."
80000018-19 = "O preço é... 10 mil ienes!?"
80000018-20 = "Ugh... será que esse valor é alto demais para um presente de uma aluna para um professor? Além disso, eu sempre vivo chamando a atenção do Sensei por desperdício..."
80000018-21 = "Mas, por outro lado, se for barato, vai parecer inferior e o Sensei vai ficar desapontado... não, quer dizer, não seria educado... o que eu faço..."
80000018-25 = "Bem, então, se eu fizer assim..."
80000018-27 = "Escritório do Schale"
80000018-28 = "(Manhã do Dia dos Namorados)"
80000018-29 = "Bom dia, Sensei."
80000018-30 = "[s] \"Bom dia, Yuuka.\""
80000018-31 = "Diga-me... Sensei, o senhor sabe que dia é hoje?"
80000018-32 = "[s1] \"Dia da Fundoshi?\"\n[s2] \"...Dia da Sardinha Seca?\""
80000018-33 = "...O quê? Existe um feriado tão estranho assim?"
80000018-34 = "...O quê? Existe um feriado tão estranho assim?"
80000018-35 = "Não é isso, hoje é Dia dos Namorados! Eu não deixei anotado no calendário do Schale?"
80000018-36 = "E-enfim, por isso... não é como se eu estivesse muito empolgada, mas o senhor tem cuidado tanto de mim que seria indelicado não fazer nada..."
80000018-41 = "...Aqui está o meu chocolate de Dia dos Namorados."
80000018-42 = "C-claro, não precisa comer tudo se não quiser. Este chocolate é um giri — não, é um presente com fins profissionais!"
80000018-43 = "[s] \"Obrigado, vou comer com carinho.\""
80000018-51 = "[ns] \"...E este recibo?\""
80000018-52 = "I-isso é, bem...!"
80000018-53 = "Eu disse antes para o Sensei não comprar nada acima de 5 mil ienes sem permissão, então achei estranho que só eu comprasse um chocolate caro..."
80000018-54 = "Não quero que pensem que sou uma garota carente que compra chocolates caros demais em dias como este..."
80000018-55 = "E-enfim! Eu não sou uma mulher desleixada que gasta muito dinheiro com chocolates de obrigação sem sentido!"
80000018-56 = "Este chocolate custou exatamente 5 mil ienes! Não entenda errado!"
80000018-57 = "I-isso é apenas... um presente com fins profissionais para manter nosso relacionamento daqui para frente!"
80000018-59 = "(Depois disso, vi outro recibo de 5 mil ienes parcelados saindo da carteira da Yuuka, mas decidi fingir que não vi.)"
