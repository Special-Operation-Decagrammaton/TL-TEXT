[translation]
80000018-1 = "会計の限界"
80000018-2 = "ミレニアム・セミナーのオフィス"
80000018-5 = "そういえば、もう来週はバレンタイン……。"
80000018-6 = "きっと先生は、他の生徒たちからもチョコレートをたくさんもらうんだろうけど……。"
80000018-7 = "食べきれないくらいチョコをもらうって分かってるのに、わざわざ私までプレゼントする必要あるのかしら……？"
80000018-8 = "……。"
80000018-9 = "けど贈り物は仕事上大事だし、他の学園の生徒もプレゼントするのに、私だけっていうのも……。"
80000018-10 = "うん。やっぱり何かちょうど良さそうなものでも渡そう。"
80000018-17 = "……「ビジネス相手のための、プレゼント用チョコレートセット」。"
80000018-18 = "中身も綺麗だし、評判も悪くない……先生の好きな味のも多いはず。"
80000018-19 = "値段は……1万円！？"
80000018-20 = "うっ……生徒から先生への贈り物の額としては、ちょっと高すぎるかしら？そもそも日頃から、先生には無駄遣いを注意しているわけだし……。"
80000018-21 = "だからといって安いのだと見劣りするし、先生もがっかり……じゃなくて礼儀がなってないし……どうしよう……。"
80000018-25 = "えっと、じゃあ、こうすれば…………。"
80000018-27 = "シャーレ・オフィス"
80000018-28 = "（バレンタインデー当日の朝）"
80000018-29 = "おはようございます、先生。"
80000018-30 = "[s] \"おはよう、ユウカ。\""
80000018-31 = "あの……先生、今日が何の日かご存知でしょうか？"
80000018-32 = "[s1] \"ふんどしの日？\"\n[s2] \"……煮干しの日？\""
80000018-33 = "……はい？そんな変な記念日があるんですか？"
80000018-34 = "……はい？そんな変な記念日があるんですか？"
80000018-35 = "ではなくて、今日はバレンタインデーです！シャーレのカレンダーにも書いておいたでしょう？"
80000018-36 = "と、とにかく、なので……別にそんな張り切ったわけではないのですが、何もしないということにするにはお世話になり過ぎてますし……。"
80000018-41 = "……私からの、バレンタインデーチョコレートです。"
80000018-42 = "も、もちろん全部食べなくても大丈夫です。このチョコレートは義理――いえ、ビジネス的な意味での物ですから！"
80000018-43 = "[s] \"ありがとう、大切に食べるね。\""
80000018-51 = "[ns] \"……この領収書は？\""
80000018-52 = "そ、それは、ええっと……！"
80000018-53 = "以前先生に、5000円を超えるものは勝手に買うなと言ってたのに、私だけが高いチョコを買うのもおかしいと思って……。"
80000018-54 = "こういう日にやたら高いチョコを買ってくる、重い女の子と思われるのも嫌だし……"
80000018-55 = "と、とにかく！私は意味のない義理チョコに大金を使うーーそんなだらしない女ではないので！"
80000018-56 = "このチョコレートはぴったり5000円のものです！誤解しないでくださいね！"
80000018-57 = "こ、これはあくまでも……今後の先生との関係性を保つための、ビジネス的な意味でのプレゼントですので！"
80000018-59 = "（その後ユウカの財布からはみでた、分割決済した5000円の領収書をもう一枚見てしまったが、それについては見なかったことにした。）"
