[translation]
1001508-1 = "A magia da Alice"
1001508-2 = "Departamento de Desenvolvimento de Jogos do Millennium"
1001508-3 = "Ah, boa noite, Sensei. É uma noite agradável, não é?"
1001508-4 = "……Obrigada por vir. A Alice passou o dia todo jogando sozinha."
1001508-5 = "[s] \"Desculpe a demora, que tipo de jogo você estava jogando?\""
1001508-6 = "Um RPG retrô."
1001508-7 = "RPG é o mais divertido, sem dúvida. Outros jogos também são legais, mas o RPG parece o lar do coração da Alice."
1001508-8 = "[s] \"Espadas e magia, né?\""
1001508-9 = "Sim, são elementos essenciais em um RPG."
1001508-10 = "[s] \"Tem um romance que não existe na realidade, afinal.\""
1001508-11 = "……Você acha mesmo?"
1001508-13 = "A Alice não pensa assim."
1001508-18 = "― A Alice não consegue acreditar que não existe…[wa:2500] magia em Kivotos."
1001508-21 = "― A magia existe. [wa:2450] Porque, [wa:850] o Sensei [wa:500] agora, [wa:550] fez a Alice se sentir feliz."
1001508-24 = "― O motivo dos jogos serem divertidos é que [wa:3000] a beleza do mundo [wa:800] está contida neles."
1001508-26 = "[wa:100]― Isso é algo que [wa:550] eu entendi através do Sensei."
1001508-29 = "― Os jogos, [wa:1350] os gatos, [wa:1350] os amigos… [wa:1700] e [wa:1800] este momento agora."
1001508-31 = "[wa:200]― Existem muitas coisas lindas [wa:1130] neste mundo."
1001508-34 = "― A Alice quer saber mais. [wa:3440] Junto com o Sensei…"
1001508-37 = "― Eu quero aprender [wa:1250] mais sobre este mundo!"
1001508-40 = "(Passei a noite conversando com a Alice sobre vários RPGs até tarde)"
