[translation]
1001508-1 = "アリスの魔法"
1001508-2 = "ミレニアム・ゲーム開発部"
1001508-3 = "あっ、こんばんは先生。良い夜ですね。"
1001508-4 = "……来てくれて、ありがとうございます。アリスは今日ずっと、一人でゲームをしていました。"
1001508-5 = "[s] \"遅くなってごめんね、何のゲームをやってたの？\""
1001508-6 = "レトロチックなRPGです。"
1001508-7 = "やはりRPGが一番楽しいです。他のゲームも楽しいですが、RPGはまるでアリスの心の故郷のような感じがします。"
1001508-8 = "[s] \"剣と魔法、だね。\""
1001508-9 = "はい、RPGには付き物ですね。"
1001508-10 = "[s] \"現実には無いロマンがあるし。\""
1001508-11 = "……そう、思いますか？"
1001508-13 = "アリスは、そうは思いません。"
1001508-18 = "― アリスはキヴォトスに…[wa:2500]魔法がないとは思えません。"
1001508-21 = "― 魔法は存在しています。[wa:2450]だって、[wa:850]先生は[wa:500]今、[wa:550]アリスを幸せにしてくれましたから。"
1001508-24 = "― ゲームが面白い理由は[wa:3000]そこに、[wa:800]世界の美しさが込められているから。"
1001508-26 = "[wa:100]― これは、[wa:550]先生を通じてわかったことです。"
1001508-29 = "― ゲームも、[wa:1350]猫も、[wa:1350]友達も…[wa:1700]そして[wa:1800]今この瞬間も。"
1001508-31 = "[wa:200]― この世界には[wa:1130]美しいものがたくさんあります。"
1001508-34 = "― アリスはもっと知りたいです。[wa:3440]先生と一緒に…"
1001508-37 = "― この世界のことを[wa:1250]もっと学びたいです！"
1001508-40 = "（アリスと一緒に夜遅くまで、色々なRPGのことを語り合った）"
