[translation]
90000030-1 = "Episódio 4; \"Coleta de Dados (3) Área de Escavação da PMC\""
90000030-2 = "Distrito de Millennium - Área Periférica"
90000030-4 = "Ah, Sensei. Estava te esperando."
90000030-5 = "A nova sala do clube já está pronta."
90000030-6 = "[s] \"Nova sala do clube?\""
90000030-7 = "Sim. O lugar que usávamos antes foi invadido pelo Decagrammaton."
90000030-8 = "Quando invadiram, todos os equipamentos foram destruídos, e não era seguro continuar no mesmo lugar."
90000030-9 = "Por isso, a Presidente Himari preparou um novo local."
90000030-10 = "Segundo a presidente, é o lugar mais seguro de Kivotos, mas..."
90000030-11 = "Bem, você pode perguntar os detalhes para ela."
90000030-15 = "Fica em uma área secreta, então me siga para não se perder."
90000030-16 = "[s] \"Certo, conto com você.\""
90000030-23 = "Segui Eimi por becos labirínticos, troquei de elevador... e finalmente chegamos ao local."
90000030-28 = "Departamento de Investigação de Fenômenos Especiais - Sala do Clube"
90000030-30 = "[ns] \"Isto é...\""
90000030-31 = "Presidente, trouxe o Sensei... Presidente?"
90000030-37 = "...Presidente? Presidente Himari?"
90000030-38 = "...!"
90000030-49 = "[ns] \"Himari...!?\""
90000030-50 = "Presidente..."
90000030-58 = "Hyaaa!?"
90000030-62 = "O-o que foi, Eimi...!?"
90000030-63 = "...Trouxe o Sensei, presidente."
90000030-64 = "[s] \"...Bom dia, Himari.\""
90000030-65 = "Err, aquilo foi..."
90000030-66 = "...Por favor, finja que não viu nada. Estávamos esperando por você, Sensei."
90000030-67 = "Finalmente posso lhe apresentar... esta é a nova sala do \"Departamento de Investigação de Fenômenos Especiais\"."
90000030-68 = "Protegida pelo sistema de firewall especial que eu inventei, é o lugar mais seguro de Kivotos."
90000030-69 = "Um espaço ultrassecreto que só eu, Eimi... e você, Sensei, conhecemos. O que achou? Não parece o esconderijo de uma organização secreta?"
90000030-70 = "...Por que esse olhar? Tem algo no meu rosto?"
90000030-71 = "Presidente, está babando."
90000030-72 = "..."
90000030-73 = "Mesmo que me olhe assim... não é porque o quarto está tão quente que dá sono?"
90000030-74 = "Vou ajustar a temperatura da sala para 12 graus. Quando esfriar, você vai acordar."
90000030-80 = "O que está fazendo, Eimi? Para eu trabalhar em condições adequadas, preciso de um número que comece pelo menos com \"3\"."
90000030-85 = "3 graus? Por mim tudo bem."
90000030-90 = "Eimi, isto não é uma geladeira. Tem que ser um número de dois dígitos, obviamente."
90000030-95 = "[ns] \"Ei, vocês duas...\""
90000030-99 = "[ns3] \"O ar-condicionado está fazendo barulho aqui...\"\n[ns4] \"E o aquecedor está fazendo barulho ali...\""
90000030-100 = "Presidente, é um desperdício de energia."
90000030-101 = "Presidente, é um desperdício de energia."
90000030-102 = "Então Eimi, desista. Além disso, a conta de luz será enviada para a Rio, então não há problema."
90000030-103 = "Se for assim, o único recurso restante é..."
90000030-107 = "Espere, vamos resolver isso conversando como intelectuais."
90000030-108 = "Sente-se um pouco, Eimi. Eimi?"
90000030-109 = "[s] Desligar o ar-condicionado e o aquecedor."
90000030-115 = "[ns] \"Ajustei para uma temperatura que não está nem quente nem fria, podem me perdoar?\""
90000030-116 = "Sim. Está quente, mas não é insuportável."
90000030-117 = "...Não tem jeito. Talvez assim minha mente fique mais clara."
90000030-118 = "[s] \"Certo, obrigado.\""
90000030-121 = "Então... qual é o próximo plano de ação?"
90000030-122 = "...Primeiro, nosso objetivo é revelar a verdadeira identidade do Decagrammaton."
90000030-123 = "Da última vez, enquanto coletávamos informações, o Decagrammaton percebeu nossa presença."
90000030-124 = "Por mais que tenhamos baixado a guarda, foi humilhante... A honra de ser a hacker genial e bela número um de Millennium foi profundamente ferida."
90000030-125 = "(O fato de ser uma 'bela garota' não tem nada a ver com isso, tem...?)"
90000030-126 = "Eles nos detectaram, mas nós ainda não sabemos quase nada sobre a verdadeira identidade deles."
90000030-127 = "Se não virarmos esse jogo agora, eles continuarão ditando o ritmo..."
90000030-128 = "Por isso, pensei em começar encontrando os 'Profetas' do Decagrammaton."
90000030-129 = "'Profetas'... Com certeza, é um caminho mais curto do que tentar encontrar o Decagrammaton diretamente."
90000030-130 = "Sim. Se o Decagrammaton é definido como uma 'inteligência artificial', o conceito de 'Profeta' sempre me pareceu estranho."
90000030-131 = "Não são clones, nem subordinados que apenas executam ordens. São existências que agem de forma independente e cercam o Decagrammaton... Por isso os chamo de 'Profetas'."
90000030-132 = "Não sei por que foram nomeados assim."
90000030-134 = "Mas, ao investigar esses 'Profetas', certamente conseguiremos nos aproximar do 'Decagrammaton'."
90000030-135 = "Até agora, observamos um total de três 'Profetas'."
90000030-136 = "'Binah', 'Chesed' e, por fim... 'Hod'."
90000030-137 = "Pelo que ouvi do Sensei e por esses nomes, deduzo que eles têm relação com uma antiga lenda chamada 'Árvore da Vida'."
90000030-138 = "Árvore da Vida...?"
90000030-142 = "Esta é a 'Árvore da Vida'. É uma das lendas esquecidas, quase impossível de se conhecer no Kivotos atual."
90000030-143 = "Impossível...? Então, como a Himari-senpai sabe disso?"
90000030-144 = "Eu disse 'quase' impossível. Eimi, você sabe qual é o meu apelido?"
90000030-145 = "...Uma flor flutuando na fossa séptica?"
90000030-146 = "Metade está correta. A outra metade é o apelido da Rio, não é? Não se deve misturar apelidos, isso é senso comum."
90000030-147 = "...Isso é mesmo senso comum?"
90000030-148 = "Questionar o 'senso comum' de alguém que possui o título de 'Onisciência' é bastante audacioso da sua parte."
90000030-149 = "Agora que você mencionou..."
90000030-150 = "Eu só tinha ouvido falar desse título como um boato."
90000030-151 = "Ainda assim, é um nome pomposo, não é?"
90000030-152 = "Fufufu... No mundo, criar uma imagem é muito importante às vezes, Eimi."
90000030-153 = "..."
90000030-154 = "[s] \"...Podemos voltar ao assunto principal agora?\""
90000030-155 = "...É verdade."
90000030-156 = "Desculpe, Sensei, acabei entrando no ritmo da presidente de novo."
90000030-157 = "Não,"
90000030-158 = "fui eu quem entrou no ritmo da Eimi."
90000030-159 = "De qualquer forma, voltemos ao assunto. Por favor, olhem isto."
90000030-163 = "Nesta 'Árvore da Vida', existem dez elementos chamados 'Sephiroth'."
90000030-164 = "'Binah', 'Chesed', 'Hod'... Os 'Profetas' do Decagrammaton carregam os nomes dessas Sephiroth."
90000030-165 = "Se essa hipótese estiver correta, ainda existem sete 'Profetas' que não conhecemos..."
90000030-166 = "Dizem que a Árvore da Vida significa o 'caminho para a providência divina'. Ou seja, tornar-se um deus através das 10 Sephiroth... Isso coincide com as alegações do Decagrammaton."
90000030-167 = "Uma IA que hackeia repetidamente para se tornar um deus... Já estamos no campo do ocultismo, mas depois de confirmar a existência deles com meus próprios olhos, não posso ignorar."
90000030-168 = "'Árvore da Vida', 'Sephiroth', 'caminho para a providência divina'... Para entender o significado disso, o melhor é investigar esses 10 'Profetas'."
90000030-169 = "Investigar, tipo... como exatamente?"
90000030-173 = "Nós vamos encontrá-los."
90000030-176 = "Bem, faz sentido. Mas só conhecemos dois 'Profetas' e nem sequer conseguimos observar o 'Hod' ainda."
90000030-177 = "Temos que começar pelo que podemos fazer. Talvez encontremos outros métodos no caminho."
90000030-178 = "[s] \"Concordo. Então vamos começar logo.\""
90000030-179 = "Sim, sem objeções."
90000030-180 = "Então, primeiro vamos localizar 'Binah' e 'Chesed' para garantir esses dados..."
90000030-184 = "O 'Departamento de Investigação de Fenômenos Singulares' está oficialmente em ação novamente."
90000030-188 = "O próximo alvo é o deserto de Abydos de novo?"
90000030-189 = "É porque os dados que você coletou até então foram perdidos quando foi atacada da última vez?"
90000030-190 = "Não, aquele nível de dados pode ser recuperado rapidamente, mas,"
90000030-191 = "existe outro motivo para isso."
90000030-192 = "Outro motivo?"
90000030-193 = "A Kaiser PMC."
90000030-194 = "Pelo que sei, a Kaiser PMC estava tentando desenterrar algo no deserto de Abydos. Não faço ideia da identidade ou do objetivo daquilo, mas..."
90000030-195 = "Por que eles estariam fazendo algo assim no local onde o Binah aparece? As especulações são infinitas."
90000030-196 = "Talvez exista alguma relação com o Decagrammaton. Por isso, pensei em investigar esse ponto."
90000030-197 = "Entendo."
90000030-198 = "Espera, isso significa que você vai invadir o banco de dados da Kaiser? Tem certeza?"
90000030-199 = "Quem você acha que eu sou, Eimi?"
90000030-200 = "Eu sou a ex-chefe da Veritas e a garota frágil mais linda e genial de Millennium, Himari! Se eu tiver um \"ponto de partida\"... ou seja, qualquer \"informação\" mínima, entrar e sair do banco de dados de uma empresa privada é algo simples."
90000030-201 = "..."A parte da \"garota frágil\" tem alguma relação com isso?"
90000030-202 = "Deixando a sede de lado, a segurança da PMC não deve ser tão difícil de contornar."
90000030-203 = "Vale muito a pena tentar."
90000030-204 = "Bem, se a chefe diz isso..."
90000030-208 = "Então vamos nessa. O objetivo é qualquer \"informação\" sobre a Kaiser PMC."
90000030-209 = "[s] \"Certo, então vamos partir.\""
