[translation]
90000030-1 = "Episódio 4; “Coleta de dados (3) Área de escavação do PMC”"

90000030-2 = "Região Autónoma/Área Exterior do Milénio"

90000030-4 = "Ah, Senseia. Eu estava esperando."

90000030-5 = "A nova sala do clube está pronta."

90000030-6 = "[s] \"Nova sala de clube?\""

90000030-7 = "Sim. O local que eu usava antes foi invadido por Deka Grammaton."

90000030-8 = "Todos os nossos equipamentos foram destruídos durante a invasão e é perigoso permanecer no mesmo lugar."

90000030-9 = "É por isso que o Diretor Himari preparou um novo local."

90000030-10 = "Segundo o gerente, é o local mais seguro de Kivotos, mas..."

90000030-11 = "Bem, você pode saber mais detalhes perguntando ao gerente."

90000030-15 = "Está em uma área secreta, então me siga para não se separar."

90000030-16 = "[s] \"Sim, prazer em conhecê-lo.\""

90000030-23 = "Segui Amy por um labirinto de becos, troquei de elevador e finalmente cheguei ao local."

90000030-28 = "Departamento/Departamento de Investigação de Fenômenos Peculiares"

90000030-30 = "[ns] \"Isto é...\""

90000030-31 = "Diretor, eu trouxe o Sensei... Diretor?"

90000030-37 = "...Diretor? Chefe Himari?"

90000030-38 = "...!"

90000030-49 = "[ns] \"Himari...!?\""

90000030-50 = "Diretor...."

90000030-58 = "Olá! ?"

90000030-62 = "O que foi, Amy...! ?"

90000030-63 = "...Eu trouxe o Sensei comigo, Diretor."

90000030-64 = "[s] \"...Bom dia, Himari.\""

90000030-65 = "Bom, é isso que acontece agora..."

90000030-66 = "...Vamos fingir que não vimos. Estava esperando por você, senhor."

90000030-67 = "Posso finalmente apresentar-lhe o Sensei... Este é o novo departamento do ``Departamento de Investigação de Fenômenos Peculiares''."

90000030-68 = "O lugar mais seguro de Kivotos, protegido por um sistema de firewall especial que inventei."

90000030-69 = "É um espaço ultrassecreto que só eu, Amy e a Senseia conhecemos. Gosta disto? Parece o esconderijo de uma organização secreta, não é?"

90000030-70 = "...O que são esses olhos? O que está no meu rosto?"

90000030-71 = "Diretor, baba."

90000030-72 = "……."

90000030-73 = "Mesmo se você me olhar assim... você não sente sono porque o quarto está muito quente?"

90000030-74 = "Vamos definir a temperatura interna para 12 graus. Você deve acordar quando esfriar."

90000030-80 = "O que você está fazendo, Amy? Para poder trabalhar em condições adequadas, preciso usar um número que comece com pelo menos “3”."

90000030-85 = "3 graus? Mas está tudo bem."

90000030-90 = "Amy, isto não é um frigorífico. Não deveria ser dois dígitos?"

90000030-95 = "[ns] \"Hum, vocês dois...\""

90000030-99 = "[ns3] \"O ar condicionado está zumbindo aqui...\"\n[ns4] \"O aquecedor está zumbindo ali...\""

90000030-100 = "Gestor, a conta de luz é um desperdício."

90000030-101 = "Gestor, a conta de luz é um desperdício."

90000030-102 = "Nesse caso, Amy deveria desistir. Além disso, a conta de luz será cobrada do Rio, então não há problema."

90000030-103 = "Se isso acontecer, a única outra opção é..."

90000030-107 = "Espere, vamos resolver isso falando como intelectuais."

90000030-108 = "Por favor, sente-se por um momento, Amy. Amém?"

90000030-109 = "[s] Desligue o ar condicionado e o aquecedor."

90000030-115 = "[ns] \"Eu ajustei a temperatura para nem quente nem fria, então você me perdoa?\""

90000030-116 = "Sim. Está quente, mas não insuportável."

90000030-117 = "...Eu não posso evitar. Talvez isso deixe sua cabeça mais clara."

90000030-118 = "[s] \"Sim, obrigado.\""

90000030-121 = "Então... qual é a sua próxima estratégia?"

90000030-122 = "...Em primeiro lugar, o nosso objetivo é revelar a verdadeira identidade do Decagrammaton."

90000030-123 = "Da última vez, enquanto recolhíamos essa informação, a nossa existência foi notada pelo Decagrammaton."

90000030-124 = "Não importa o quão descuidado eu tenha sido, foi humilhante... Minha reputação como o hacker mais talentoso e bonito do milênio foi bastante prejudicada."

90000030-125 = "(Garotas bonitas não têm nada a ver com isso...?)"

90000030-126 = "O outro lado nos reconheceu, mas ainda temos pouco conhecimento da sua verdadeira identidade."

90000030-127 = "A menos que revertamos esta situação primeiro, o nosso adversário continuará a controlar o ritmo..."

90000030-128 = "Então, decidi primeiro encontrar o “profeta” do Decagrammaton."

90000030-129 = "\"Profeta\"... Esse pode ser um corte mais curto do que procurar diretamente pelo Decagrammaton."

90000030-130 = "sim. Em primeiro lugar, se Decagrammaton é definido como “inteligência artificial”, o conceito de “profeta” sempre foi desconfortável."

90000030-131 = "Não é um clone de si mesmo, nem um subordinado cumprindo ordens. Um ser que age de forma independente e rodeia o Decagrammaton é chamado de “profeta”."

90000030-132 = "Não sei por que deram esse nome."

90000030-134 = "Porém, ao pesquisar este “profeta”, certamente nos aproximaremos do “Decagrammaton”."

90000030-135 = "Um total de três “profetas” foram observados até agora."

90000030-136 = "\"Binah\", \"Chesed\" e... \"Hod\"."

90000030-137 = "O que ouvi do meu Sensei e esses nomes. Inferindo disso, estes estão relacionados a uma antiga lenda chamada “Árvore da Vida”."

90000030-138 = "Árvore da vida...?"

90000030-142 = "Esta é a \"Árvore da Vida\". É uma daquelas tradições esquecidas que é quase impossível saber nos Kivotos de hoje."

90000030-143 = "impossível………? Então, como Himari-senpai sabe?"

90000030-144 = "É simplesmente \"quase\" impossível. Amy, você sabe meu apelido?"

90000030-145 = "...Uma única flor flutuando na fossa séptica?"

90000030-146 = "Metade das respostas estão corretas. A outra metade é o apelido do Rio, não é? Não misture apelidos, é bom senso."

90000030-147 = "...Isso é bom senso?"

90000030-148 = "É um grande desafio para alguém como eu, que tenho um certo grau de “onisciência”, fazer perguntas sobre “bom senso”."

90000030-149 = "Pensando bem, isso mesmo..."

90000030-150 = "Eu só tinha ouvido falar desse diploma através de rumores."

90000030-151 = "Ainda assim, é um nome chique."

90000030-152 = "Hehehe...Há muitos momentos neste mundo em que é importante criar uma imagem, Amy."

90000030-153 = "……."

90000030-154 = "[s] \"...Podemos começar a trabalhar agora?\""

90000030-155 = "……Concordo."

90000030-156 = "Desculpe, sensei, eu estava sendo colocado no ritmo do diretor novamente."

90000030-157 = "lar,"

90000030-158 = "Fui colocado no ritmo de Amy."

90000030-159 = "Enfim, voltando ao assunto, dê uma olhada."

90000030-163 = "Há um total de 10 ``Sephirah'' nesta ``Árvore da Vida''."

90000030-164 = "``Binah'', ``Chesed'', ``Hod''...os ``profetas'' do Decagrammaton são nomeados após esta Sephira."

90000030-165 = "Se essa hipótese estiver correta, existem mais sete “profetas” que ainda não conhecemos…"

90000030-166 = "Diz-se que a Árvore da Vida significa “o caminho que leva à providência de Deus”. Em outras palavras, Ele se torna Deus através das 10 Sephirah... Isto é consistente com a afirmação do Decagrammaton."

90000030-167 = "IA que hackeia repetidamente para se tornar um deus... Já é o reino do ocultismo, mas agora que confirmei sua existência com meus próprios olhos, não posso ignorá-lo."

90000030-168 = "``Árvore da Vida'', ``Sephirah'', ``O Caminho para a Providência Divina''... Acho que a melhor maneira de entender o significado dessas palavras é examinar esses 10 ``profetas''."

90000030-169 = "O que você quer dizer com investigar... especificamente?"

90000030-173 = "Eu vou encontrar."

90000030-176 = "Bem, isso mesmo. No entanto, só conhecemos dois “profetas”, e ainda nem fomos capazes de observar “Hod”."

90000030-177 = "Não temos escolha a não ser começar a fazer o que podemos. Talvez eu encontre outro caminho com o tempo."

90000030-178 = "[s] \"Isso mesmo. Bem, então vamos começar.\""

90000030-179 = "Sim, nenhuma objeção."

90000030-180 = "Primeiro, vamos encontrar \"Bina\" e \"Chesed\" e proteger seus dados..."

90000030-184 = "O ``Departamento de Investigação de Fenômenos Peculiares'' está começando novamente."

90000030-188 = "O próximo objetivo é o Deserto de Abydos?"

90000030-189 = "Isso significa que os dados que coletamos foram perdidos quando fomos atacados da última vez?"

90000030-190 = "Sim, você pode recuperar isso rapidamente, mas"

90000030-191 = "Há outra razão para isso."

90000030-192 = "Outro motivo?"

90000030-193 = "Kaiser PMC."

90000030-194 = "Acredito que o Kaiser PMC estava tentando desenterrar algo no deserto de Abydos. Não tenho ideia do que seja ou qual seja a sua finalidade..."

90000030-195 = "Por que ele estava fazendo isso num lugar onde Binah apareceu? Não há fim para a especulação."

90000030-196 = "Existe a possibilidade de que tenha algum tipo de ligação com o Decagrammaton. Então pensei em tentar explorar isso."

90000030-197 = "Eu vejo."

90000030-198 = "Então você quer dizer invadir o banco de dados do Kaiser? Você está bem?"

90000030-199 = "Quem você pensa que eu sou, Amy?"

90000030-200 = "Sou Himari, ex-gerente da \"Veritas\" e uma garota linda e doentia no topo do milênio. Desde que haja um “gatilho”...isto é, algum tipo de “informação”, é tão fácil como aceder à base de dados de uma empresa privada."

90000030-201 = "...A parte da “garota linda e doentia” tem alguma coisa a ver com isso?"

90000030-202 = "Pode não ser difícil manter a segurança na sede, mas sim na PMC."

90000030-203 = "Vale a pena tentar."

90000030-204 = "Bem, se o gerente disser."

90000030-208 = "Então vamos lá. O objetivo é “informação” sobre o Kaiser PMC."

90000030-209 = "[s] \"Ok, então vamos.\""

