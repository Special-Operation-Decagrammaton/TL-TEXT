[translation]
90000030-1 = "第4話;「データ収集（３）PMC発掘区域」"
90000030-2 = "ミレニアム自治区・外郭地域"
90000030-4 = "あ、先生。待ってた。"
90000030-5 = "新しい部室の準備、できたよ。"
90000030-6 = "[s] \"新しい部室？\""
90000030-7 = "うん。前に使ってたところは、デカグラマトンに侵入されちゃったから。"
90000030-8 = "侵入された時に機材も全部壊しちゃったし、同じ場所に留まるのも危ないし。"
90000030-9 = "だから、ヒマリ部長が新しい場所を用意したの。"
90000030-10 = "部長いわく、キヴォトスで一番安全な場所らしいけど……。"
90000030-11 = "まあ、詳しいことは部長に聞けば分かるよ。"
90000030-15 = "秘密のエリアにあるから、はぐれないようについてきてね。"
90000030-16 = "[s] \"うん、よろしく。\""
90000030-23 = "エイミの後を追って迷路のように入り組んだ路地に入り、エレベーターを乗り換え……ようやくその場所へとたどり着いた。"
90000030-28 = "特異現象捜査部・部室"
90000030-30 = "[ns] \"ここは……。\""
90000030-31 = "部長、先生を連れてきたよ……部長？"
90000030-37 = "……部長？ヒマリ部長？"
90000030-38 = "……っ！"
90000030-49 = "[ns] \"ヒマリ……！？\""
90000030-50 = "部長……。"
90000030-58 = "ひゃうっ！？"
90000030-62 = "な、何ですかエイミ……！？"
90000030-63 = "……先生を連れてきたよ、部長。"
90000030-64 = "[s] \"……おはよう、ヒマリ。\""
90000030-65 = "えー、今のはですね……。"
90000030-66 = "……見なかったことにしていただきましょう。お待ちしておりましたよ、先生。"
90000030-67 = "ようやく先生にご紹介できますね……ここが「特異現象捜査部」の新たな部室です。"
90000030-68 = "私が発明した特殊なファイアウォールシステムで保護されている、キヴォトスで最も安全な場所。"
90000030-69 = "私とエイミ……そして先生だけが存在を知っている、トップシークレットの空間です。いかがです？まるで秘密組織のアジトみたいじゃないですか？"
90000030-70 = "……何ですかその目は。私の顔に何かついてますか？"
90000030-71 = "部長、よだれ。"
90000030-72 = "……。"
90000030-73 = "そんな顔されても……部屋がこんなに温かいから眠くなるんじゃないの？"
90000030-74 = "室内の設定温度を12度にしよう。涼しくなったら目も覚めるはず。"
90000030-80 = "何をしてるんですかエイミ。私が真っ当なコンディションで作業するためには、少なくとも「3」から始まる数字にしていただかなくては。"
90000030-85 = "3度？別に良いけど。"
90000030-90 = "エイミ、ここは冷蔵庫じゃありません。二桁に決まってるではありませんか。"
90000030-95 = "[ns] \"あの、二人とも……。\""
90000030-99 = "[ns3] \"こっちではエアコンが唸ってて……。\"\n[ns4] \"あっちではヒーターが唸ってるんだけど……。\""
90000030-100 = "部長、電気代が勿体ない。"
90000030-101 = "部長、電気代が勿体ない。"
90000030-102 = "ならエイミが諦めてください。それに電気代ならリオ宛に請求されますので、問題ありません。"
90000030-103 = "そうなったら、残りの手段は……。"
90000030-107 = "待ってください、ここは知識人らしく話し合いで解決しましょう。"
90000030-108 = "一旦座ってくださいエイミ。エイミ？"
90000030-109 = "[s] エアコンとヒーターの電源を切る。"
90000030-115 = "[ns] \"暑くも寒くもない気温に設定したから、これで許してくれない？\""
90000030-116 = "うん。暑いけど、耐えられないほどじゃない。"
90000030-117 = "……仕方ないですね。これくらいの方が、頭も冴えるかもしれませんし。"
90000030-118 = "[s] \"うん、ありがとう。\""
90000030-121 = "それで……次はどういう作戦でいくの？"
90000030-122 = "……まず、私たちの目標はデカグラマトンの正体を明かすことです。"
90000030-123 = "前回はその情報を集めている途中、デカグラマトンに私たちの存在が気づかれてしまいました。"
90000030-124 = "いくら油断していたとはいえ、屈辱ですね……ミレニアム随一の天才美少女ハッカーである私の名誉は大いに傷つきました。"
90000030-125 = "（美少女は関係ないんじゃ……？）"
90000030-126 = "向こうは私たちを認知しましたが、こちらはまだ向こうの正体をほとんど知り得ていません。"
90000030-127 = "まずはこの状況をひっくり返さない限り、相手にずっとペースを握られたまま……。"
90000030-128 = "そこで、まずはデカグラマトンの「預言者」を見つけることにしようかと。"
90000030-129 = "「預言者」……確かに直接デカグラマトンを探すより、そっちの方が近道かもしれないね。"
90000030-130 = "はい。そもそもデカグラマトンが「人工知能」と定義されるのであれば、「預言者」という概念には違和感がつきまとっていました。"
90000030-131 = "自身のクローンでもなく、命令を遂行する部下でもなく。独立して行動し、デカグラマトンを取り巻く存在……それを 「預言者」、と表現しています。"
90000030-132 = "なぜそのような命名をしたのかは分かりません。"
90000030-134 = "しかしこの「預言者」について調べることで、きっと私たちは「デカグラマトン」に近づけるでしょう。"
90000030-135 = "これまでに観測された「預言者」は全部で3つ。"
90000030-136 = " 「ビナー」、「ケセド」、そして…… 「ホド」。"
90000030-137 = "先生から伝え聞いたこと、そしてこれらの名前。そこから推測するに、これらは「生命の樹」と呼ばれる古代の伝承と関係があります。"
90000030-138 = "生命の樹……?"
90000030-142 = "これが「生命の樹」。今のキヴォトスでは知ることがほとんど不可能な、忘れられてしまった伝承の一つです。"
90000030-143 = "不可能………？じゃあ、ヒマリ先輩はどうして知ってるの？"
90000030-144 = "「ほとんど」不可能というだけですよ。エイミ、私のあだ名をご存知ですか？"
90000030-145 = "……浄化槽に浮かぶ一輪の花？"
90000030-146 = "半分は正解です。もう半分はそれ、リオのあだ名じゃないですか。あだ名を混ぜてはいけません、常識ですよ。"
90000030-147 = "……そんな常識ある？"
90000030-148 = "「全知」の学位を持つ私に対して「常識」に関する問いかけとは、なかなか挑戦的ですね。"
90000030-149 = "そういえばそうだったね……"
90000030-150 = "その学位、噂程度にしか聞いたことなかったけど。"
90000030-151 = "それにしても、仰々しい名前だね。"
90000030-152 = "うふふ……世の中、イメージ作りが大事な時も多いのですよ、エイミ。"
90000030-153 = "……。"
90000030-154 = "[s] \"……そろそろ本題に入っても良いかな？\""
90000030-155 = "……そうですね。"
90000030-156 = "ごめん先生、また部長のペースに乗せられてた。"
90000030-157 = "いえ、"
90000030-158 = "私がエイミのペースに乗せられたんです。"
90000030-159 = "とにかく本題に戻りましょう、こちらをご覧ください。"
90000030-163 = "この「生命の樹」には、全部で10個の「セフィラ」と呼ばれるものが存在します。"
90000030-164 = " 「ビナー」、「ケセド」、「ホド」………デカグラマトンの「預言者」は、このセフィラの名を冠しているのです。"
90000030-165 = "その仮説が正しいなら、まだ私たちが知らない「預言者」があと7つ……。"
90000030-166 = "生命の樹は「神の摂理へと至る道」を意味するそうです。つまり、10のセフィラを通じて神となる……これはデカグラマトンの主張と一致します。"
90000030-167 = "神になるためにハッキングを繰り返すAI……もはやオカルトの領域ですが、この目でその存在を確認してしまった以上無視はできません。"
90000030-168 = "「生命の樹」、「セフィラ」、「神の摂理に至る道」……これらの意味を知るには、この10の「預言者」たちを調べていくのが一番かと。"
90000030-169 = "調べるって……具体的には？"
90000030-173 = "探し出します。"
90000030-176 = "まあ、そうだよね。でもこっちが把握してる「預言者」は2つだけで、「ホド」はまだ実際に観測すらできてないけど。"
90000030-177 = "やれることから手を付けていくしかありません。そのうちに他の方法も見つかるかもしれませんし。"
90000030-178 = "[s] \"そうだね。それじゃあ早速始めようか。\""
90000030-179 = "うん、異論無し。"
90000030-180 = "それではまず「ビナー」と「ケセド」を探し出し、これらのデータを確保するため……"
90000030-184 = "「特異現象捜査部」、あらためて始動です。"
90000030-188 = "次の目標は、またアビドス砂漠？"
90000030-189 = "前に襲撃された時、それまでに集めたデータが消失したからってこと？"
90000030-190 = "いえ、あの程度すぐに復旧できますが、"
90000030-191 = "これには別の理由があります。"
90000030-192 = "別の理由？"
90000030-193 = "カイザーPMCです。"
90000030-194 = "たしかカイザーPMCは、アビドスの砂漠で何かを掘り出そうとしていました。正体や目的は全く分かりませんが……。"
90000030-195 = "ビナーが出現する場所で、どうしてそんなことをしていたのか。推測は尽きません。"
90000030-196 = "もしかしたらデカグラマトンと何らかの関係がある可能性もあります。なので、そこを一度探ってみようかと。"
90000030-197 = "なるほど。"
90000030-198 = "あれ、つまりカイザーのデータベースに侵入するってこと？大丈夫？"
90000030-199 = "私を誰だと思ってるんですか、エイミ。"
90000030-200 = "私は「ヴェリタス」の元部長であり、ミレニアム最高峰の病弱美少女、ヒマリですよ？「きっかけ」……即ち何かちょっとした「情報」さえあれば、私企業のデータベースへ出入りすることくらい簡単なことです。"
90000030-201 = "……「病弱美少女」の部分、関係あるかな？"
90000030-202 = "本社ならともかく、PMCのセキュリティなら難しくもないでしょう。"
90000030-203 = "試してみる価値は十分にあります。"
90000030-204 = "まあ、部長がそう言うなら。"
90000030-208 = "じゃあ行こっか。目標はカイザーPMCに関する「情報」。"
90000030-209 = "[s] \"よし、それじゃあ出発。\""
