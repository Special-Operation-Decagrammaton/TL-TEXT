[translation]
51050-1 = "Episódio 5: A autoproclamada garota de elite, entra em cena!"
51050-5 = "Yukari, Yukari...#nHum... sinto que já ouvi esse nome em algum lugar."
51050-6 = "Yukari da Hyakkaryouran... Seria ela da família Kadenokouji...?"
51050-7 = "[s] \"Você é aquela de agora há pouco...?\""
51050-12 = "Ora? O Sensei do Schale... por que está aqui?"
51050-16 = "Ah...! Eu acabei de perceber."
51050-17 = "Então, você me ajudou agora há pouco porque já previa que isso aconteceria...!?"
51050-18 = "Como a veterana dizia, esse é o truque do \"Sou eu! Sou eu!\"!#nEu não acredito que você faria algo assim... estou chocada!"
51050-23 = "Ora, ora, parece que enquanto eu não estava olhando, vocês dois desenvolveram uma relação complicada...?"
51050-24 = "[s] \"Não, isso é um mal-entendido...\""
51050-25 = "Nyahaha~. Então, Yukari-san da Hyakkaryouran...#nO que traz você ao Departamento Yin-Yang?"
51050-26 = "É verdade!"
51050-27 = "Eu ouvi aquele boato!"
51050-28 = "A vice-presidente do Comitê de Mediação de Conflitos Hyakkaryouran..."
51050-30 = "Não, que a vice-presidente interina, Nagusa-senpai, apareceu!"
51050-32 = "……Oh?"
51050-34 = "……A propósito, onde você ouviu isso?"
51050-36 = "Naquele dia, quando o céu se tingiu de vermelho—"
51050-37 = "Nós da Hyakkaryouran obtivemos a informação de que o Departamento Yin-Yang estava agindo nos bastidores para resolver a situação."
51050-38 = "[s] \"Onde exatamente você conseguiu isso...\""
51050-40 = "……Se tratando da Hyakkaryouran, coletar informações deve ser fácil.#nElas possuem sua própria rede de inteligência."
51050-41 = "Nós também monitoramos a Hyakkaryouran, afinal.#nNaturalmente, elas fazem o mesmo conosco."
51050-42 = "Ni-ya-sama…………"
51050-43 = "Haa."
51050-45 = "Segundo essa informação, o Departamento Yin-Yang enviou agentes para a grande planície nevada do norte."
51050-46 = "A unidade de agentes sob comando direto do Departamento Yin-Yang, que resolveu inúmeros incidentes em Hyakkiyako...!"
51050-57 = "A lendária... \"Unidade Especial Ninja\"!!"
51050-63 = "[ns] \"A história não está ficando exagerada demais...?\""
51050-64 = "Não consegui captar os detalhes da missão, mas uma coisa eu sei..."
51050-65 = "A unidade enviada encontrou \"alguém da Hyakkaryouran\" na grande planície nevada."
51050-66 = "Fufun! Ficou surpreso com a capacidade de investigação da Hyakkaryouran, não ficou?"
51050-67 = "Nyahaha. Nós gerenciamos as informações rigorosamente para evitar confusão, mas saberem até disso... vocês parecem ser bem competentes, hein♪"
51050-68 = "Sim! Sim! Com certeza! Ninguém supera a capacidade de coleta de informações da Kikyou-senpai!"
51050-69 = "Entendo~ Kikyou...#nA aluna do segundo ano da Hyakkaryouran, a estrategista Kiryuu Kikyou-san, certo?"
51050-73 = "Ah...! Eu acabei mencionando o nome da veterana... E-esqueça o que eu disse agora!"
51050-74 = "Bem, não há necessidade de esconder... então sim, é um fato."
51050-76 = "Ni-ya-sama—"
51050-78 = "Ora, ora, Kaho.#nJá passou do tempo, e se tratando da Hyakkaryouran, não há problema em saberem a verdade."
51050-79 = "Então, é verdade mesmo...!"
51050-83 = "Sim. Nós entramos em contato com a vice-presidente do Comitê de Mediação de Conflitos Hyakkaryouran, \"Goryou Nagusa\"-san."
51050-84 = "……!"
51050-85 = "Sendo assim, fica mais fácil!#nEu tenho um pedido para o Departamento Yin-Yang!"
51050-86 = "Hum……?"
51050-87 = "[s] \"Você quer que a convençamos a voltar, é isso...?\""
51050-88 = "Não, não é isso."
51050-93 = "Para que eu possa me tornar a presidente da Hyakkaryouran—"
51050-95 = "Por favor, sejam as testemunhas da \"Batalha de Sucessão da Hyakkaryouran\"!"
51050-103 = "[ns] \"Batalha... de sucessão?\""
51050-105 = "[log=유카리]（O que seria a \"Batalha de Sucessão da Hyakkaryouran\"...）[/log]"
51050-109 = "（Hyakkaryouran... um comitê de prestígio, responsável por mediar conflitos, onde apenas os mais selecionados de Hyakkiyako podem entrar）"
51050-110 = "（Naturalmente, quem está no topo deve possuir a habilidade correspondente.）"
51050-113 = "（Portanto, se o alto escalão julgar que quem está no topo não é digno do título—）"
51050-130 = "（Qualquer membro do comitê pode solicitar uma \"Batalha de Sucessão\" para tomar o seu lugar! Essa é a \"Batalha de Sucessão da Hyakkiyako\"!）"
51050-144 = "[ns] \"A Hyakkiyako tem um sistema de subversão assim!?\""
51050-145 = "Hmm... entendi o que você quer fazer, mas por que uma Batalha de Sucessão...?"
51050-146 = "É muito doloroso para mim ter que dizer isso, mas..."
51050-147 = "A atual Hyakkiyako, aos olhos de qualquer um, não pode ser chamada de \"Comitê\"."
51050-148 = "A causa disso é... que a Nagusa-senpai, que deveria estar no centro da Hyakkiyako,..."
51050-149 = "...a Nagusa-senpai, como comissária interina, deixou o cargo vago. #nÉ por causa da ausência da comissária!"
51050-154 = "Hmm..."
51050-155 = "Ao ouvir sobre a ordem de dissolução da Hyakkiyako..."
51050-156 = "Enquanto pensava no que fazer no banho...!"
51050-157 = "Isso! Tive um estalo de genialidade!"
51050-158 = "Sobre a Batalha de Sucessão que eu tinha ouvido falar em ＜rumores＞ antigamente!!"
51050-159 = "[s] \"Então não é algo que acontece com frequência?\""
51050-161 = "Sim. Embora a \"Batalha de Sucessão\" esteja nos manuais da Hyakkiyako, ela não acontece tantas vezes assim, então..."
51050-162 = "Não é de se estranhar que a Yukari-san, que acabou de entrar, nunca tenha visto uma."
51050-164 = "Por isso mesmo! Sabendo que existe um método que pode ser uma brecha para superar a situação atual... eu tomei uma decisão!"
51050-165 = "Eu, Yukari, a elite da Hyakkiyako e a super nova promissora!"
51050-166 = "Vou derrotar a Nagusa-senpai na Batalha de Sucessão e assumir o cargo de comissária com maestria!"
51050-167 = "Se eu fizer isso, tudo deve se resolver... #nPor isso, por favor... me empreste sua força!"
51050-168 = "[s] \"Bem, mas a Nagusa é a comissária interina, não é...?\""
51050-170 = "Sim. A atual comissária da Hyakkiyako é a Ayame Nanakado-san."
51050-171 = "A Nagusa Uryo-san é apenas a vice-comissária, afinal."
51050-172 = "Hmm... mesmo assim, posso perguntar o motivo de desafiar a Nagusa-san para a Batalha de Sucessão?"
51050-178 = "A comissária Ayame... deixou a Hyakkiyako há muito tempo."
51050-179 = "[s] \"...há quanto tempo?\""
51050-180 = "Foi quase na mesma época em que entrei na Hyakkiyako, cerca de 10 meses atrás."
51050-181 = "A comissária Ayame passou o \"Símbolo\" herdado por gerações na Hyakkiyako para a Nagusa-senpai. Depois disso, ela desapareceu."
51050-182 = "Originalmente, a Nagusa-senpai, que recebeu o símbolo, deveria assumir o cargo de comissária, mas..."
51050-183 = "Por algum motivo, a Nagusa-san recusou e se contentou em ser interina..."
51050-184 = "Será que existe algum motivo para isso?"
51050-185 = "............Eu não sei de nada."
51050-186 = "Eu não tive muitas oportunidades de conversar com a comissária Ayame, mas..."
51050-187 = "Nós, alunas do primeiro ano, não podemos opinar sobre as decisões dela."
51050-188 = "A Renge-senpai e a Kikyou-senpai aceitaram a decisão da Ayame-senpai."
51050-189 = "No entanto, a Nagusa-senpai não aceitou até o fim... dizendo que só a Ayame-senpai poderia ser a comissária."
51050-190 = "Foi assim que a comissária desapareceu e apenas a Nagusa-senpai ficou..."
51050-196 = "...Chega de assuntos sombrios!"
51050-197 = "O que importa é o futuro! O fu-tu-ro!"
51050-198 = "Tudo será resolvido quando eu, a super genial elite Yukari, me tornar comissária!"
51050-199 = "Isso mesmo — a partir de agora, a lenda da Yukari da Hyakkiyako vai começar!"
51050-200 = "...Eu gostaria de dizer isso, mas infelizmente a Batalha de Sucessão não pode ser feita apenas pela minha vontade."
51050-201 = "[s] \"A Batalha de Sucessão tem alguma condição especial?\""
51050-203 = "Sim, exatamente como você disse."
51050-204 = "Se qualquer um pudesse fazer uma Batalha de Sucessão livremente, todos se candidatariam, não é? #nÉ preciso ter algumas regras."
51050-205 = "Para realizar uma Batalha de Sucessão, é necessário obter a aprovação de pelo menos 2 pessoas."
51050-206 = "Para garantir que o julgamento da Batalha de Sucessão seja justo, um membro do alto escalão da Hyakkiyako e..."
51050-208 = "Uma testemunha de fora da Hyakkiyako."
51050-209 = "[s] \"É uma regra para garantir a imparcialidade, entendi.\""
51050-211 = "Nyahaha. A Batalha de Sucessão é supervisionada pelo Departamento Yin-Yang há gerações."
51050-212 = "De certa forma, dentro de Hyakkiyako, nossa posição é bastante respeitada♪"
51050-213 = "Dito isso, o atual Hyakka Ryoran está sob uma 'Ordem de Dissolução'."
51050-214 = "Realizar uma 'Batalha de Sucessão' neste momento é..."
51050-220 = "Certamente, algo errado."
51050-222 = "Oh...? "
51050-224 = "Porque a veterana Kikyou, a veterana Renge... e todos os outros também."
51050-225 = "Enquanto houver pessoas que amam o Hyakka Ryoran, uma ordem de dissolução é impossível."
51050-226 = "[s] \"……。\""
51050-227 = "Entendo..."
51050-228 = "Em outras palavras, como uma ordem de dissolução é impossível, a Batalha de Sucessão pode ser realizada sem problemas, é isso..."
51050-229 = "Sim, com certeza!"
51050-234 = "――Nesse caso, posso confirmar uma coisa?"
51050-235 = "……？"
51050-236 = "Como você bem sabe, Yukari, o atual Hyakka Ryoran não está funcionando. Isso é um fato puro e simples."
51050-237 = "Nessa situação, se realizarmos a 'Batalha de Sucessão', existe a possibilidade de que, externamente, pensem que você 'aproveitou o caos do Hyakka Ryoran para assumir o cargo de presidente'."
51050-242 = "Além disso, se contarmos com a ajuda do Departamento Yin-Yang..."
51050-244 = "Em suma, isso significaria que você está nos fazendo ser cúmplices de uma rebelião."
51050-247 = "――Você tem consciência disso?"
51050-249 = "……Ugh!"
51050-250 = "Eu não tinha pensado até esse ponto..."
51050-251 = "Eu nunca imaginei que seria interpretado dessa forma..."
51050-252 = "……M-mas!"
51050-253 = "Mesmo assim..."
51050-254 = "……Mesmo assim, eu..."
51050-255 = "……Você quer pedir nossa ajuda mesmo entendendo isso?"
51050-256 = "……É um pedido como alguém da família Kadenokouji?"
51050-257 = "……!!"
51050-261 = "…………。"
51050-262 = "Não, não é."
51050-263 = "Isso é..."
51050-268 = "É apenas um pedido da Yukari... como indivíduo."
51050-270 = "……Entendo."
51050-272 = "Mas, se existe a possibilidade de ser vista dessa forma pelos outros..."
51050-273 = "Se isso for causar problemas ao Departamento Yin-Yang, então eu..."
51050-274 = "Brincadeirinha. Em tempos normais, eu teria recusado dizendo 'não podemos atravessar pontes perigosas'~"
51050-275 = "Nyahaha, você tem sorte, Yukari."
51050-277 = "Hã...?"
51050-282 = "Acontece que temos aqui alguém que não consegue ignorar o seu sofrimento..."
51050-287 = "Niya-sama...!"
51050-289 = "Ora? Eu disse algo errado, Sensei?"
51050-290 = "[s] \"Bem... não está errado, mas...\""
51050-291 = "……?? O que isso significa...?"
51050-292 = "Se o 'Sensei do Schale' estiver presente, pelo menos os problemas políticos podem ser evitados. Nyaha."
51050-294 = "Niya-sama... não podemos causar mais problemas ao Sensei por causa das nossas circunstâncias..."
51050-296 = "Ora, ora, Kaho... não precisa ficar com essa cara assustada."
51050-297 = "O Sensei não recusaria um pedido de um aluno... não é?"
51050-298 = "[s] \"Se a Yukari está em apuros, isso é moleza para mim.\""
51050-302 = "……!"
51050-303 = "Ufufu, fico feliz em ouvir isso. #nO nome do Schale tem poder suficiente para virar o jogo de qualquer situação, afinal♪"
51050-304 = "Então, pediremos ao professor [USERNAME] do Schale para ser a \"testemunha\"..."
51050-305 = "Bem, não acho que alguém vá questionar o Schale... mas, para garantir, eu também serei uma testemunha."
51050-306 = "Com isso... você está satisfeita?"
51050-308 = "S-sim! Com certeza...!"
51050-309 = "Sua consideração me deixa..."
51050-310 = "— No entanto."
51050-316 = "Não se esqueça de que isso é uma exceção que só existe por causa da presença do Schale."
51050-318 = "……Sim!"
51050-319 = "Manterei isso em mente."
51050-320 = "Ah... entendi."
51050-321 = "Então, prosseguirei com os procedimentos, Yukari, por favor, venha por aqui..."
51050-322 = "Chise-chan, venha aqui também."
51050-323 = "Sim~#nEntão, professor, até mais~"
51050-329 = "Nyahaha~, que timing perfeito, não é mesmo?#nQue bom, que bom."
51050-330 = "[s] \"Você me chamou porque sabia que isso aconteceria?\""
51050-331 = "Hmm~? Não faço ideia do que está falando."
51050-332 = "Digamos que foi uma coincidência atrás da outra, ou talvez apenas uma questão de timing."
51050-333 = "Se nossos interesses coincidem, não há motivo para não darmos as mãos, certo?#nAlém disso, achei que seria simplesmente interessante."
51050-334 = "……E também, pensei que me aproximar da Hyakkaryouran seria uma boa oportunidade para conhecer Kuzunoha."
51050-335 = "[s] \"Nya, você previu tudo isso desde o início...?\""
51050-336 = "Nyaha~, quem sabe?"
51050-337 = "Pelo menos, parece que conseguiremos sair dessa situação de causar problemas unilateralmente."
51050-338 = "É difícil manter um relacionamento onde só se recebe, não é?"
51050-342 = "[ns] \"……Obrigado.\""
51050-343 = "Ora, ora, essa frase deveria ser minha. Nfufu."
51050-348 = "……Por favor, cuide de Hyakkiyako, professor."
51050-350 = "Próximo; Próximo destino"
