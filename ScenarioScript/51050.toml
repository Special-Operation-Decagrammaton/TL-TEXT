[translation]
51050-1 = "Episódio 5; Apresentando a Autoproclamada Garota de Elite!"
51050-5 = "Yukari, Yukari... #n Hmm... sinto que já ouvi esse nome em algum lugar."
51050-6 = "Yukari da Hyakkaryouran... será que... da família Kadenokouji...?"
51050-7 = "[s] \"Você é a garota de antes...?\""
51050-12 = "Ara? O Sensei da Schale... o que faz aqui?"
51050-16 = "Hah...! Eu entendi tudo."
51050-17 = "Você ter me salvado antes, já era prevendo esse desdobramento...!?"
51050-18 = "É exatamente o truque do 'Sou eu! Sou eu!' que a senpai falou! #n Não acredito que você faria algo assim... Estou chocada!"
51050-23 = "Ora, ora, parece que vocês dois desenvolveram um relacionamento complicado sem que eu soubesse...?"
51050-24 = "[s] \"Não, isso é um mal-entendido...\""
51050-25 = "Nyahaha~. Então, Yukari-san da Hyakkaryouran―― #n O que a traz ao Clube Yin-Yang?"
51050-26 = "Ah, é verdade!"
51050-27 = "Eu ouvi aquele boato!"
51050-28 = "A vice-presidente do Comitê de Conciliação de Conflitos Hyakkaryouran..."
51050-30 = "Digo, a presidente interina Nagusa-senpai apareceu!"
51050-32 = "......Ora?"
51050-34 = "......A propósito, onde você ouviu isso?"
51050-36 = "Naquele dia em que o céu ficou vermelho――"
51050-37 = "Nós, da Hyakkaryouran, recebemos a informação de que o Clube Yin-Yang estava agindo nos bastidores para controlar a situação."
51050-38 = "[s] \"Onde diabos você...\""
51050-40 = "......Tratando-se da Hyakkaryouran, coletar informações deve ser fácil. #n Afinal, elas têm sua própria rede de informações."
51050-41 = "Nós também estamos de olho na Hyakkaryouran, sabe. #n E, claro, elas estão fazendo o mesmo."
51050-42 = "Senhorita Niya......"
51050-43 = "Haa."
51050-45 = "De acordo com as informações, o Clube Yin-Yang enviou seus agentes para o grande campo de neve ao norte."
51050-46 = "A força-tarefa de agentes ligada diretamente ao Clube Yin-Yang, que resolveu vários incidentes na Hyakkiyako...!"
51050-57 = "A lendária―― 'Força Especial Ninja'!!"
51050-63 = "[ns] \"A história não está ficando um pouco exagerada...?\""
51050-64 = "Não conseguimos descobrir os detalhes da missão, mas uma coisa é certa..."
51050-65 = "A força-tarefa enviada encontrou 'alguém da Hyakkaryouran' no grande campo de neve."
51050-66 = "Fufufu! Surpresa com a capacidade de investigação da Hyakkaryouran?"
51050-67 = "Nyahaha. Nós controlamos as informações estritamente para não causar pânico, mas o fato de vocês saberem tanto... mostra que são bem competentes♪"
51050-68 = "Sim! Claro! Obviamente! Ninguém supera a habilidade de coleta de informações da Kikyou-senpai!"
51050-69 = "Entendo~ Kikyou... #n Kiryuu Kikyou-san, a estrategista e aluna do 2º ano da Hyakkaryouran, certo?"
51050-73 = "Hah...! Falei o nome da senpai... e-esqueça o que eu acabei de dizer!"
51050-74 = "Bem, não há necessidade de esconder... sim, é a verdade."
51050-76 = "Senhorita Niya――"
51050-78 = "Calma, calma, Kaho. #n É passado, e se for a Hyakkaryouran, acho que não tem problema saberem a verdade."
51050-79 = "Então, realmente...!"
51050-83 = "Sim. Nós entramos em contato com a vice-presidente do Comitê de Conciliação de Conflitos Hyakkaryouran, 'Goryou Nagusa'-san."
51050-84 = "......!"
51050-85 = "Sendo assim, isso facilita as coisas! #n Eu tenho um pedido para o Clube Yin-Yang!"
51050-86 = "Hmm...?"
51050-87 = "[s] \"Que convençam a Nagusa a voltar, ou algo assim...?\""
51050-88 = "Não, não é isso."
51050-93 = "Para que eu possa me tornar a presidente da Hyakkaryouran――"
51050-95 = "Por favor, sejam testemunhas da 'Batalha de Sucessão da Hyakkaryouran'!"
51050-103 = "[ns] \"Batalha... de sucessão?\""
51050-105 = "[log=Yukari](O que é a 'Batalha de Sucessão da Hyakkaryouran'...)[/log]"
51050-109 = "(Hyakkaryouran... é um comitê histórico com o papel de mediar conflitos, e apenas os melhores da Hyakkiyako podem entrar)"
51050-110 = "(Naturalmente, aqueles que estão no topo devem ter a capacidade adequada)"
51050-113 = "(Então, se os líderes acharem que alguém no topo não está à altura de seu título――)"
51050-130 = "(Qualquer membro do comitê pode solicitar uma 'Batalha de Sucessão' e usurpar o posto! Essa é a 'Batalha de Sucessão da Hyakkaryouran'!)"
51050-144 = "[ns] \"A Hyakkaryouran tem um sistema de usurpação assim!?\""
51050-145 = "Hmmm... entendi o que você quer fazer, mas por que uma batalha de sucessão...?"
51050-146 = "É muito doloroso dizer isso, mas..."
51050-147 = "Aos olhos de qualquer um, a atual Hyakkaryouran não está em condições de ser chamada de 'comitê'."
51050-148 = "O motivo é... porque a Nagusa-senpai, que deveria estar no centro da Hyakkaryouran... "
51050-149 = "......Porque a presidente interina, Nagusa-senpai, deixou seu posto. #n É devido à ausência da presidente!"
51050-154 = "Hmm..."
51050-155 = "Ao ouvir sobre o Decreto de Dissolução da Hyakkaryouran..."
51050-156 = "Enquanto pensava no que fazer no banho...!"
51050-157 = "Sim! Tive uma ideia brilhante! "
51050-158 = "Lembrei-me da batalha de sucessão que eu tinha ouvido falar há muito tempo, como um <boato>!!"
51050-159 = "[s] \"Então não é algo que acontece com frequência?\""
51050-161 = "Sim. Embora a 'Batalha de Sucessão' conste nos manuais da Hyakkaryouran, ela não ocorre tantas vezes..."
51050-162 = "Não é surpresa que a Yukari-san, que acabou de ingressar, nunca a tenha visto."
51050-164 = "Sendo assim! Já que descobri um método que pode virar a situação atual... e se tornar uma solução, eu tomei uma decisão!"
51050-165 = "Eu, Yukari, a elite da Hyakkaryouran e a supernova promissora!"
51050-166 = "Derrotarei a Nagusa-senpai na batalha de sucessão e herdarei brilhantemente a posição de presidente!"
51050-167 = "Dessa forma, tudo se resolverá... #n Portanto, por favor... peço a ajuda de vocês!"
51050-168 = "[s] \"Ehm, mas a Nagusa é a presidente interina, não é...?\""
51050-170 = "Sim. A atual presidente da Hyakkaryouran é a Nanakado Ayame-san."
51050-171 = "Goryou Nagusa-san não passa de vice-presidente."
51050-172 = "Hmm... mesmo assim, posso perguntar o motivo de solicitar uma batalha de sucessão à Nagusa-san?"
51050-178 = "A Presidente Ayame... deixou a Hyakkaryouran há muito tempo."
51050-179 = "[s] \"......Há quanto tempo?\""
51050-180 = "Foi quase na mesma época em que entrei na Hyakkaryouran, há cerca de 10 meses."
51050-181 = "A Presidente Ayame passou o 'Emblema' que é herdado de geração em geração na Hyakkaryouran para a Nagusa-senpai. E depois disso, desapareceu."
51050-182 = "Normalmente, a Nagusa-senpai, que recebeu o emblema, assumiria a posição de presidente..."
51050-183 = "Mas por algum motivo ela recusou, e acabou ficando como interina..."
51050-184 = "Havia algum motivo para isso?"
51050-185 = "............Eu não sei de nada."
51050-186 = "Eu não tive muitas oportunidades de conversar com a Presidente Ayame..."
51050-187 = "Nós, as alunas do 1º ano, não podemos opinar nas decisões que ela tomou."
51050-188 = "As senpais Renge e Kikyou aceitaram a decisão da Senpai Ayame."
51050-189 = "Mas a Nagusa-senpai não aceitou até o final... dizendo que se a Senpai Ayame não fosse a presidente, não daria certo."
51050-190 = "E então, a presidente desapareceu em algum lugar, e só restou a Nagusa-senpai..."
51050-196 = "......Chega dessa conversa deprimente!"
51050-197 = "O importante é o futuro! O future!"
51050-198 = "Tudo se resolverá quando essa elite super genial, Yukari, se tornar a presidente!"
51050-199 = "Sim―― A partir de agora, a lenda da Yukari da Hyakkaryouran começa!"
51050-200 = "......Gostaria de poder dizer isso, mas infelizmente a batalha de sucessão não pode ser realizada apenas pela minha vontade."
51050-201 = "[s] \"Há alguma condição especial para a batalha de sucessão?\""
51050-203 = "Sim, você está certo."
51050-204 = "Se qualquer um pudesse fazer uma batalha de sucessão livremente, todos se candidatariam, não acha? #n Algumas regras são necessárias."
51050-205 = "Para realizar a batalha de sucessão, é preciso obter a aprovação de pelo menos duas pessoas."
51050-206 = "Para provar que o julgamento da batalha de sucessão é justo, é necessário um líder da Hyakkaryouran e――"
51050-208 = "Uma testemunha de fora da Hyakkaryouran."
51050-209 = "[s] \"É uma regra para garantir a imparcialidade, entendi.\""
51050-211 = "Nyahaha. O Clube Yin-Yang tem sido a testemunha das batalhas de sucessão por gerações."
51050-212 = "De certa forma, somos uma posição respeitada na Hyakkiyako♪"
51050-213 = "Mas, no momento, a Hyakkaryouran está sob um 'Decreto de Dissolução'."
51050-214 = "Realizar uma 'Batalha de Sucessão' neste momento..."
51050-220 = "Com certeza seria um erro."
51050-222 = "Oh...?"
51050-224 = "Porque, tanto a Kikyou-senpai quanto a Renge-senpai... e todas as outras também."
51050-225 = "Enquanto houver pessoas que amam a Hyakkaryouran, um decreto de dissolução é impossível."
51050-226 = "[s] \"......\""
51050-227 = "Entendo..."
51050-228 = "Ou seja, como um decreto de dissolução é impossível, a batalha de sucessão pode ocorrer sem problemas..."
51050-229 = "Sim, of course!"
51050-234 = "――Sendo assim, posso confirmar uma coisa?"
51050-235 = "......?"
51050-236 = "Como a Yukari-san sabe, a atual Hyakkaryouran não está funcionando. Isso é um fato puro e simples."
51050-237 = "Se uma 'Batalha de Sucessão' for realizada nessas circunstâncias, quem está de fora pode pensar que você 'se aproveitou do caos na Hyakkaryouran para tomar a posição de presidente'."
51050-242 = "E, além disso, se você usar a ajuda do Clube Yin-Yang..."
51050-244 = "Basicamente, você estaria nos fazendo cúmplices de uma rebelião."
51050-247 = "――Você está ciente disso?"
51050-249 = "......Ugh!"
51050-250 = "Eu não tinha pensado tão longe..."
51050-251 = "Não acredito que possa ser interpretado dessa maneira..."
51050-252 = "......M, mas!"
51050-253 = "Ainda assim..."
51050-254 = "......Ainda assim, eu..."
51050-255 = "......Mesmo entendendo isso, você quer a nossa ajuda."
51050-256 = "Isso seria... um [ruby=·   ·   ·]pedido[/ruby] de alguém da família Kadenokouji?"
51050-257 = "......!!"
51050-261 = "............"
51050-262 = "Não, não é isso."
51050-263 = "Isso é..."
51050-268 = "Um pedido meu... da Yukari como [ruby=·   ·]indivíduo[/ruby]."
51050-270 = "......Entendo."
51050-272 = "No entanto, se há a possibilidade de ser visto dessa forma por quem está de fora..."
51050-273 = "Se isso causar problemas ao Clube Yin-Yang, eu..."
51050-274 = "Brincadeirinha. Normalmente, eu recusaria dizendo que 'não posso cruzar uma ponte perigosa', mas~"
51050-275 = "Nyahaha, Yukari-san tem muita sorte."
51050-277 = "Eh...?"
51050-282 = "Justamente aqui, temos alguém que não pode simplesmente ignorar o seu problema..."
51050-287 = "Senhorita Niya...!"
51050-289 = "Ara? Eu disse alguma coisa errada, Sensei?"
51050-290 = "[s] \"Bem... errado não está...\""
51050-291 = "......?? O que isso significa...?"
51050-292 = "Significa que se o 'Sensei da Schale' for a testemunha, pelo menos os problemas políticos poderão ser evitados. Nyaha."
51050-294 = "Senhorita Niya... causar mais problemas ao Sensei por causa das nossas circunstâncias é..."
51050-296 = "Calma, calma, Kaho... não faça essa cara assustadora."
51050-297 = "O Sensei não recusaria o pedido de uma aluna... não é?"
51050-298 = "[s] \"Se a Yukari está com problemas, isso não é nada.\""
51050-302 = "......!"
51050-303 = "Ufufu, que bom. #n Afinal, o nome da Schale tem poder suficiente para virar qualquer balança♪"
51050-304 = "Então, pediremos ao Sensei da Schale para ser a 'testemunha'..."
51050-305 = "Bem, não acho que haja alguém que vá contra a Schale, mas... #n Por precaução, eu também serei testemunha."
51050-306 = "Isso... a satisfaz?"
51050-308 = "S-Sim! É claro...!"
51050-309 = "Agradeço profu――"
51050-310 = "――No entanto."
51050-316 = "Não se esqueça, de [ruby=forma]maneira alguma[/ruby], que isso é uma exceção possível apenas devido à presença da Schale."
51050-318 = "......Sim!"
51050-319 = "Guardarei isso em meu coração."
51050-320 = "Haa... Entendido."
51050-321 = "Então, começarei os procedimentos. Yukari-san, por aqui..."
51050-322 = "Chise-chan, por aqui também."
51050-323 = "Uhum~ #n Até mais, Sensei~"
51050-329 = "Nyahaha~, isso foi em um momento perfeito, não foi? #n Ainda bem, ainda bem."
51050-330 = "[s] \"Você me chamou porque sabia que isso ia acontecer?\""
51050-331 = "Hmm? Não faço a menor ideia do que você está falando."
51050-332 = "Digamos que foi apenas uma coincidência, ou uma questão de timing."
51050-333 = "Se os nossos interesses estão alinhados, não há motivo para não darmos as mãos, não é? #n E, além disso, eu simplesmente achei que seria interessante."
51050-334 = "......E também, pensei que nos aproximar da Hyakkaryouran seria uma boa oportunidade para descobrir mais sobre a Kuzunoha."
51050-335 = "[s] \"Você já tinha planejado tudo isso desde o início, Niya...?\""
51050-336 = "Nyaha~, quem sabe."
51050-337 = "No mínimo, parece que conseguiremos sair dessa situação onde só causamos problemas unilateralmente~, sabe."
51050-338 = "Relacionamentos onde você só recebe as coisas são difíceis de lidar, não acha?"
51050-342 = "[ns] \"......Obrigado.\""
51050-343 = "Ora, ora, essa fala deveria ser minha. Nfufu."
51050-348 = "......Por favor, cuide da Hyakkiyako, Sensei."
51050-350 = "Próximo Episódio; O Próximo Destino"
