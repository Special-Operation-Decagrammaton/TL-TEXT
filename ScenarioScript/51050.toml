[translation]
51050-1 = "第5話;自称えり～と少女、登場！"
51050-5 = "ユカリ、ユカリ……#nふむ……どこかで聞き覚えがあるような。"
51050-6 = "百花繚乱のユカリ……もしや、[ruby=かでのこうじ]勘解由小路[/ruby]家の……？"
51050-7 = "[s] \"君はさっきの……？\""
51050-12 = "あら？シャーレの先生が……どうしてこちらに？"
51050-16 = "ハッ……！[ruby=みども]身共[/ruby]、気がついてしまいましたの。"
51050-17 = "先ほど身共を助けてくださったのは、この展開を見越してだったのですね……！？"
51050-18 = "先輩が仰っていた通り、「オレだよ！オレ！」の手口ですの！#nまさかそのような事をなさるだなんて……身共はしょっくです！"
51050-23 = "おやおや、私の知らない間にお二人はなにやら複雑なご関係になったようで……？"
51050-24 = "[s] \"いや、これは誤解で……\""
51050-25 = "にゃはは～。それで、百花繚乱のユカリさんが――#n陰陽部にどんなご用で？"
51050-26 = "そうでしたの！"
51050-27 = "身共、あの噂を聞きまして！"
51050-28 = "百花繚乱紛争調停委員会の副委員長……"
51050-30 = "いえ、委員長代理のナグサ先輩が姿を現したと！"
51050-32 = "……おや？"
51050-34 = "……ちなみに、その話はどちらで？"
51050-36 = "空が赤く染まった、あの日――"
51050-37 = "身共たち百花繚乱は、陰陽部が事態を収拾すべく裏で動いていたという情報を入手しましたの。"
51050-38 = "[s] \"一体どこでそれを……\""
51050-40 = "……百花繚乱であれば、情報収集は容易いでしょう。#n彼女たちは独自の情報網を持っていますから。"
51050-41 = "私たちも百花繚乱をマークしてるからねぇ。#n当然あちらも同じ。"
51050-42 = "ニヤ様…………"
51050-43 = "はぁ。"
51050-45 = "それによれば、陰陽部は北部の大雪原にえーじぇんとを派遣したのだとか。"
51050-46 = "百鬼夜行で数々の事件を解決してきた、陰陽部直属のえーじぇんと部隊……！"
51050-57 = "伝説の――「特殊忍者隊」を！！"
51050-63 = "[ns] \"微妙に話が大きくなってない……？\""
51050-64 = "任務の詳細までは掴めておりませんが、一つ分かっているのは……"
51050-65 = "派遣された部隊が、大雪原で「百花繚乱のどなたか」と会ったこと。"
51050-66 = "ふっふ～ん！百花繚乱の調査能力にびっくりしたでしょう？"
51050-67 = "にゃはは。混乱を招かないようにと、情報の管理は徹底していたのですが、そこまで知られているとは……なかなか優秀なようですね♪"
51050-68 = "ええ！ええ！そうでしょうとも！キキョウ先輩の情報収集能力に敵うものなどおりませんの！"
51050-69 = "なるほど～キキョウ……#n百花繚乱の2年生、作戦参謀の[ruby=きりゅう]桐生[/ruby]キキョウさんでしたっけ？"
51050-73 = "ハッ……！先輩の名前を出してしまいました……い、今のは無しですの！"
51050-74 = "まあ、あえて隠す必要はありませんし……そうですね、事実です。"
51050-76 = "ニヤ様――"
51050-78 = "まあまあ、カホ。#nもう過ぎたことだし、百花繚乱なら本当のことを知っても良いでしょう。"
51050-79 = "では、本当に……！"
51050-83 = "ええ。私たちは百花繚乱紛争調停委員会の副委員長、「[ruby=ごりょう]御稜[/ruby]ナグサ」さんと接触しました。"
51050-84 = "……！"
51050-85 = "それなら、むしろ話は早いですわ！#n身共、陰陽部にお願いがありますの！"
51050-86 = "ふむ……？"
51050-87 = "[s] \"ナグサに帰ってくるよう説得してほしい、とか……？\""
51050-88 = "いいえ、違いますわ。"
51050-93 = "身共が、百花繚乱の委員長になれるよう――"
51050-95 = "[ruby=ひゃっかりょうらんけいしょうせん]「百花繚乱継承戦」[/ruby]の証人となってくださいまし！"
51050-103 = "[ns] \"継承……戦？\""
51050-105 = "[log=유카리]（「百花繚乱継承戦」とは……）[/log]"
51050-109 = "（百花繚乱……それは紛争を調停する役割を担い、百鬼夜行の中でも選りすぐりの者だけが入れる由緒正しい委員会）"
51050-110 = "（当然、上に立つ者には相応の能力が無くてはならない）"
51050-113 = "（そこで、肩書に見合わない者が上にいると幹部クラスが判断した場合――）"
51050-130 = "（委員会のメンバーであれば、誰でも「継承戦」を申し込んで、その座を奪うことができる！それが「百花繚乱継承戦」である！）"
51050-144 = "[ns] \"百花繚乱って、そんな下剋上制度があるんだ！？\""
51050-145 = "ふむぅ……やりたい事は分かりましたが、どうして継承戦を……？"
51050-146 = "身共の口からこれを申し上げるのは大変心苦しいのですが……"
51050-147 = "現在の百花繚乱は、誰の目から見ても「委員会」とは呼べない状態にあります。"
51050-148 = "その原因は……本来であれば、百花繚乱の中心に立つべきナグサ先輩が…… "
51050-149 = "……委員長代理のナグサ先輩が、席を空けたがゆえ。#n委員長の不在ゆえなのです！"
51050-154 = "ふむ……"
51050-155 = "百花繚乱の解散令を耳にし……"
51050-156 = "お風呂でどうすればいいのかと考えていた時に……！"
51050-157 = "そう！キラッ！とひらめいてしまったのです！ "
51050-158 = "その昔、＜噂＞で聞いていた継承戦のことを！！"
51050-159 = "[s] \"そんなに行われるわけじゃないんだ？\""
51050-161 = "はい。「継承戦」は、百花繚乱の教範に載っているものの、そう何度も行われるものではないため……"
51050-162 = "入学したばかりのユカリさんが、今まで目にしてこなかったのも不思議ではありません。"
51050-164 = "でありますゆえ！今の状況を覆す……突破口になるかもしれない方法を知った以上、身共は決心したのです！"
51050-165 = "百花繚乱のえりーとであり！期待の超新星であるユカリが！"
51050-166 = "継承戦でナグサ先輩を倒し、委員長の座を見事、引き継いでみせますの！"
51050-167 = "そうすれば、全ては丸く収まるはず……#nゆえに、どうか……身共にお力を貸してほしいのです！"
51050-168 = "[s] \"えっと、でもナグサは委員長代理なんだよね……？\""
51050-170 = "はい。百花繚乱の現委員長は[ruby=ななかど]七稜[/ruby]アヤメさんです。"
51050-171 = "御稜ナグサさんは、あくまで副委員長に過ぎませんので。"
51050-172 = "ふむ……それでもナグサさんに継承戦を申し込む理由をお聞きしても？"
51050-178 = "アヤメ委員長は……随分と前に百花繚乱を離れました。"
51050-179 = "[s] \"……どのくらい前から？\""
51050-180 = "身共が百花繚乱に入ったのとほぼ同時期ですから、約10ヶ月ほど前のことです。"
51050-181 = "アヤメ委員長は、百花繚乱に代々受け継がれている[ruby=あかし]「証」[/ruby]をナグサ先輩に継承しました。それきり、姿をくらましたのです。"
51050-182 = "本来なら、証を受け取ったナグサ先輩が委員長の座に就くところですが……"
51050-183 = "なぜかナグサさんは拒否し、代理に落ち着いた、と…… "
51050-184 = "何か理由でもあるのでしょうか？"
51050-185 = "…………身共は何も存じませぬ。"
51050-186 = "アヤメ委員長とは、あまり話す機会が無かったのですが……"
51050-187 = "あの方が決めた事に、1年生の身共たちが何か口を出すことはできません。"
51050-188 = "アヤメ先輩の決断を、レンゲ先輩やキキョウ先輩は受け入れました。"
51050-189 = "ただ、ナグサ先輩は最後まで受け入れず……アヤメ先輩が委員長でなければダメだ、と。"
51050-190 = "そうして、委員長はどこかへと行方をくらませ、ナグサ先輩だけが……。"
51050-196 = "……こんな暗い話はおしまい！"
51050-197 = "大事なのは、未来！ふゅ～ちゃ～、です！"
51050-198 = "全ては、この超天才えりーとのユカリが委員長になれば解決ですの！"
51050-199 = "そう――これより、百花繚乱のユカリ伝説が幕を開けるのです！"
51050-200 = "……と言いたいところですが、残念ながら継承戦は身共の意志だけではできません。"
51050-201 = "[s] \"継承戦には、何か特別な条件があるの？\""
51050-203 = "はい、仰る通りです。"
51050-204 = "誰でも自由に継承戦ができるのなら、皆こぞって立候補するでしょう？#nある程度のルールは必要ですから。"
51050-205 = "継承戦を行うには、最低でも2名以上の承認を得なくてはなりません。"
51050-206 = "継承戦の判断が公平であることを示すために、百花繚乱所属の幹部が1人と――"
51050-208 = "百花繚乱以外の立会い人が1人。"
51050-209 = "[s] \"公平性を担保するためのルールなんだね。\""
51050-211 = "にゃはは。継承戦は代々、陰陽部が立ち会ってきました。"
51050-212 = "一応、百鬼夜行の中では、一目置かれる立場でして♪"
51050-213 = "とはいえ、現在の百花繚乱は「解散令」が出されている状態です。"
51050-214 = "このタイミングで「継承戦」を行うのは……"
51050-220 = "きっと、間違っているのです。"
51050-222 = "ほう……？"
51050-224 = "だって、キキョウ先輩もレンゲ先輩も……それに他の皆様も。"
51050-225 = "百花繚乱を愛する人がいる限り、解散令なんてあり得ませんわ。"
51050-226 = "[s] \"……。\""
51050-227 = "なるほどねぇ……"
51050-228 = "つまり、解散令なんてあり得ないから、継承戦は問題なくできる、と……"
51050-229 = "ええ、おふこーすですわ！"
51050-234 = "――であれば、一つ。確認しても？"
51050-235 = "……？"
51050-236 = "ユカリさんもご存じの通り、現在の百花繚乱は機能しておりません。これは純然たる事実。"
51050-237 = "そんな中、「継承戦」を行えば、外部からは「百花繚乱の混乱に乗じて委員長の座に就いた」と思われる可能性があります。"
51050-242 = "その上、陰陽部の手も借りるとなると……"
51050-244 = "要は、私たちに反乱の片棒を担がせようとしている事になるわけですが。"
51050-247 = "――その認識はお有りですか？"
51050-249 = "……うっ！"
51050-250 = "そこまでは考えが及んでおりませんでした……。"
51050-251 = "まさか、そのように受け取られてしまうだなんて……"
51050-252 = "……で、ですが！"
51050-253 = "それでも…… "
51050-254 = "……それでも、身共は。"
51050-255 = "……理解した上で力を借りたいということは。"
51050-256 = "……[ruby=かでのこうじ]勘解由小路[/ruby]家の者としての[ruby=・   ・   ・]お願い[/ruby]でしょうか？"
51050-257 = "……っ！！"
51050-261 = "…………。"
51050-262 = "いいえ、違いますわ。"
51050-263 = "これは……"
51050-268 = "ただのユカリ……身共[ruby=・   ・]個人[/ruby]としてのお願いです。"
51050-270 = "……なるほど。"
51050-272 = "しかし、周りからそのように見られる可能性があるのなら……"
51050-273 = "陰陽部が困ってしまうのなら、身共は……"
51050-274 = "なーんて。普段であれば「危ない橋は渡れませんねぇ」と断ったと思いますが～"
51050-275 = "にゃははっ、ユカリさんは幸運ですねぇ。"
51050-277 = "へ……？"
51050-282 = "ちょうどここに、あなたの悩みを見て見ぬ振りなどできないお方がいらっしゃいまして……"
51050-287 = "ニヤ様……！ "
51050-289 = "あらぁ？私、何か間違ったことでも言いましたっけ、先生？"
51050-290 = "[s] \"まぁ……間違ってはいないけど……\""
51050-291 = "……？？どういう、意味でしょうか……？"
51050-292 = "「シャーレの先生」が立ち会うのであれば、少なくとも政治的な問題は避けられる、ということですよ。にゃはっ。"
51050-294 = "ニヤ様……これ以上、私たちの事情で先生にご迷惑をおかけするのは……"
51050-296 = "まぁまぁ、カホったら……そんな怖い顔しなくても。"
51050-297 = "先生なら、生徒のお願いを断るはずないですし……ねぇ？"
51050-298 = "[s] \"ユカリが困っているなら、それくらいお安い御用だよ。\""
51050-302 = "……！"
51050-303 = "うふふ、それは良かったです。#nシャーレの名は、全てのバランスをひっくり返せるほどの力がありますからねぇ♪"
51050-304 = "では、「立会い人」はシャーレの[USERNAME]先生にお願いするとして……"
51050-305 = "ま、シャーレに突っかかる人は居ないと思いますが……#n万が一に備えて、私も立会い人をいたしましょう。"
51050-306 = "これで……ご満足、いただけましたか？"
51050-308 = "は、はいっ！もちろん……！"
51050-309 = "お心遣いに感――"
51050-310 = "――ただし。"
51050-316 = "これはシャーレの存在があってこその特例であること[ruby=ゆめゆめ]、努々お[/ruby]忘れなく。"
51050-318 = "……ええ！"
51050-319 = "心に留めておきますわ。"
51050-320 = "はぁ……分かりました。"
51050-321 = "それでは手続きを進めますので、ユカリさんはこちらへ……"
51050-322 = "チセちゃんもこちらに。"
51050-323 = "うん～#nそれじゃ先生、またね～"
51050-329 = "にゃはは～、これは何とも絶妙なタイミングでしたねぇ。#n良かった良かった。"
51050-330 = "[s] \"こうなると分かっていたから私を呼んだの？\""
51050-331 = "ん～？何を仰っているのやら、さっぱりですねぇ。"
51050-332 = "たまたま偶然が重なったといいますか、タイミングの問題といいますか。"
51050-333 = "利害が一致しているのなら、手を取らない理由は無いでしょう？#n後はまあ、単純に面白いんじゃないかなぁと。"
51050-334 = "……それに、百花繚乱に近づけば、クズノハを知る良い機会になるかな、と思いましてねぇ。"
51050-335 = "[s] \"ニヤは初めから、そこまで読んで……？\""
51050-336 = "にゃは～、どうでしょうねぇ。"
51050-337 = "少なくとも、一方的に迷惑をかけ続ける状態からは脱却できそうかな～なんて。"
51050-338 = "もらってばかりの関係ですと、やりづらいですし？"
51050-342 = "[ns] \"……ありがとう。\""
51050-343 = "あらあら、それはこちらの台詞ですよ。んふふ。"
51050-348 = "……どうか百鬼夜行をお願いしますね、先生。"
51050-350 = "次回;次の目的地"
