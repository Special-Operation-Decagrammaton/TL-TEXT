[translation]
500-1 = "クラフトチェンバーとは"
500-2 = "クラフトチェンバー"
500-3 = "お仕事は順調ですか、先生。"
500-4 = "はい、また私です。……それは会えて嬉しいという表情、ですよね？"
500-5 = "……そんな話はさておき。"
500-6 = "シャーレの地下にある「とある物」について、説明しに参りました。"
500-7 = "シャーレの地下には連邦生徒会長が先生に残した、ある物が存在します。"
500-8 = "物、と言いましょうか……正確には施設と呼んだ方が良いかもしれません。"
500-10 = "「クラフトチェンバー」……"
500-11 = "ざっくり言いますと、「シッテムの箱」の管理者だけが接続・操作できる、ありとあらゆる物質を生成する機械です。"
500-12 = "大型の3Dプリンター……のようなもの、とでも言いましょうか？私も、原理や仕組みはよく分かっていないのですが。"
500-13 = "今は先生だけが作動させられるオーパーツ、ということですね。"
500-14 = "私たちはこういう、いつもの連邦生徒会長のおもちゃには興味ありませんので……。"
500-15 = "まあ、今は居ない人の話はともかく。"
500-16 = "その説明をしに来ただけですので、私はこれで。"
500-17 = "それでは、また後ほど。"
