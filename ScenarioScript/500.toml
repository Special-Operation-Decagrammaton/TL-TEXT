[translation]
500-1 = "O que é a Câmara de Criação"
500-2 = "Câmara de Criação"
500-3 = "O trabalho está indo bem, Sensei?"
500-4 = "Sim, sou eu de novo. ...Essa é uma expressão de felicidade por me ver, não é?"
500-5 = "...Deixando esse assunto de lado."
500-6 = "Vim explicar sobre 'certa coisa' que fica no subsolo da Schale."
500-7 = "No subsolo da Schale, existe algo que a Presidente do Conselho Estudantil Geral deixou para você, Sensei."
500-8 = "Ou melhor, talvez fosse mais preciso chamar de instalação do que de coisa."
500-10 = "A 'Câmara de Criação'..."
500-11 = "Em termos simples, é uma máquina capaz de gerar qualquer tipo de matéria, que só pode ser conectada e operada pelo administrador do 'Shittim Chest'."
500-12 = "Como se fosse uma impressora 3D de grande porte... eu diria? Embora nem eu entenda bem os princípios ou o funcionamento dela."
500-13 = "Basicamente, é um artefato que só você, Sensei, pode operar agora."
500-14 = "Nós não temos interesse nesses brinquedos habituais da Presidente do Conselho Estudantil Geral..."
500-15 = "Bem, deixando de lado o assunto sobre alguém que não está mais aqui."
500-16 = "Eu só vim para explicar isso, então já vou indo."
500-17 = "Até mais tarde."
