[translation]
1302-1 = "会長はいつも正しい（２）"
1302-5 = "……というわけで、お前にはペロロになってもらう。"
1302-7 = "何が「というわけで」なんですか！？何も理解できないんですけど！？"
1302-9 = "本校舎に呼び出されたから、ようやく旧校舎での停学処分期間が終わるのかと喜んでたのに……。"
1302-10 = "いきなり「ペロロになれ」って、そんな冗談を言うために私を呼び出したんですか！？"
1302-11 = "残念ながら冗談ではない。この提案を飲んでさえくれれば、お前たちが本校舎に戻れるように全力で取り計らおう。何ならプリンも2つずつ支給するように交渉もする。"
1302-12 = "……ただしばらくの間、このペロロの着ぐるみに入って、語尾に「ペロ～」をつけて生活してくれれば良いんだ。"
1302-13 = "そんな変な着ぐるみ、絶対に嫌なんですけど！？"
1302-14 = "そもそもどうして私なんですか？それだけで良いなら、他の保安委員の方たちにやらせればいいじゃないですか。"
1302-15 = "それは無理だ、この着ぐるみに入れる身長の保安委員はいない。"
1302-16 = "これはお前みたいに、小さくて素早いちびっ子じゃないと実行できない作戦なんだ。"
1302-17 = "誰がちびっ子ですか！！それが人に物を頼む態度ですか！？"
1302-18 = "……そもそも「仮想のキャラクターを生徒として学校に編入させよう」だなんて、どうして承諾したんですか？"
1302-19 = "いくら会長の命令とは言え、委員長もダメなのはダメとはっきり言ってくださいよ！"
1302-20 = "そ、それはそうなのだが……。"
1302-22 = "……いや、同志ノドカ。お前はまさか、「チェリノ会長が間違っている」とでも主張しているのか？"
1302-23 = "この保安委員長の前で、そのような不遜な発言……粛清されてもやむを得ないぞ！"
1302-25 = "ふーんだ。どうせ停学中の身ですから、そんな脅しなんか効きません！"
1302-26 = "と・に・か・く！こんな変な着ぐるみを着て、謎の語尾で話すだなんて絶対に嫌です！　たとえ停学が取り消されるとしても断固拒否します！"
1302-27 = "くっ……。"
1302-28 = "この方法だけは使いたくなかったが……仕方あるまい。"
1302-30 = "お前たち、例のブツを持ってこい！"
1302-46 = "そ、それは……「ルワゾー・ブッレ」の最高級プリン？"
1302-47 = "確か、1個1000円くらいするはずの……その最高級プリンで、私を買収する気ですか？"
1302-48 = "も、もちろん、ままま全くまったく心が動かないわけでは、ないですけど？こ、この程度で私の決心をゆゆ揺さぶることができるなんてお考えでしたら、あ、甘く見られたものですね……？"
1302-50 = "くく……考えが甘いのはお前の方だ。"
1302-51 = "これは買収するための物ではなく……お前の意志を挫くための、極悪非道な拷問道具だ！"
1302-53 = "ぷ、プリンで拷問……！？　それは一体どういう……"
1302-54 = "パクっ。"
1302-56 = "た、食べた！？しかも一口であんなに！？"
1302-57 = "そ、そんな……私だったら一口ずつ……いえ、ひとかけらずつ舐めるように味わうのに……それを一口で！？"
1302-58 = "な、何てことを……しかし、その程度で屈するわけには……。"
1302-59 = "まあ、悪くは無いな。"
1302-63 = "なっ、まだ残ってるのに捨てた！？"
1302-64 = "ご、ご自分が何をしてるのか分かってるんですか！？なんて勿体ないことを……！"
1302-65 = "ふふっ……お前をここに呼んだ時点で、身辺調査はあらかた済ませてある。"
1302-66 = "旧校舎の生活で節約が身についたお前にとって、甘味は大切に味わうものだろう。それを目の前でこんな雑に食べられて、そのショックはさぞかし大きかろう。"
1302-67 = "これ以上悲惨な思いをしたくないなら、大人しく私に協力することだな！"
1302-68 = "な、何て残酷なことを……やはりチェリノ会長の番犬、血も涙も無いマリナ委員長ですね。"
1302-69 = "でも私にだってプライドがあります……これくらいの拷問では屈しません！何があっても、ペロロの格好なんてしません！"
1302-70 = "流石、あの227号特別クラスで長く生活してるだけはあるな。しかしその決心も、いつまで続くかな……？"
1302-72 = "さあ保安委員たちよ、どんどん次のおやつを持ってこい！"
1302-74 = "その後も、マリナの拷問という名の暴飲暴食は続いた……。"
1302-77 = "ふむ。これが同志ノドカの大切にしている天体望遠鏡か……なるほど、噂通り大きくて立派だな……付いているレンズもそれに比例してかなりのものだ。"
1302-78 = "くくっ。もしもこの望遠鏡のレンズに、素手で触れたら……お前はどんな反応をするのかな？"
1302-79 = "なっ、何をしようとしてるんですか！？そんなことをしたら、指紋がっ……！！"
1302-82 = "次はくすぐりの刑だ！事務局から持ってきたこの柔らかい羽箒で、首や腹をくすぐりまくってやろう。"
1302-84 = "（こしょこしょこしょこしょ…….）"
1302-85 = "うひゃっ！？ひっ、いひっ、や、やめっ、ひゃぁあっ！？"
1302-86 = "わ、分かりましたっ！ひっ、い、言われた通りするのでやめっ、あはははははっ！？"
1302-87 = "それならばペロロらしく鳴いてみせろ！さあ「ペロ～」と叫ぶのだ！"
1302-90 = "次は、そうだな……この「ミントチョコをのせたパイナップルの天ぷら」でも食べてみるか？"
1302-92 = "い、いっそ楽にして……"
1302-95 = "うっ、うぅ……。"
1302-96 = "ふう。これくらいで勘弁してやろう。"
1302-97 = "さあもう一度聞こうか、お前は誰だ？"
1302-98 = "ノド……いえ、ぺ、ペロロです。"
1302-99 = "兎でも熊でもなく、れっきとしたペロロです、ペロペロ……。"
1302-101 = "素晴らしい、まさにペロロそのものだ！"
1302-102 = "これなら問題なくチェリノ会長を騙せ……いや、チェリノ会長に報告できそうだな。"
1302-103 = "この「偽ペロロ」を事務局へと編入させ、「特別黄金ひげ勲章」を貰い、それを足がかりにしてさらに高い地位へとのし上がっていくのだ……くくく。"
1302-105 = "さあ、同志ノド……いや、ペロロよ。今すぐチェリノ会長に謁見しに行こうではないか。"
1302-106 = "レッドウィンター連邦学園の威信をかけた、大事な任務の始まりだ！学園の趨勢がその両肩に乗っているつもりで、気合を入れろ！"
1302-107 = "ぺ、ペロ～……。"
