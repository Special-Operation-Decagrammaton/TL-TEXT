[translation]
1302-1 = "A Presidente está sempre certa (2)"
1302-5 = "……Então, é por isso que você vai se tornar o Peroro."
1302-7 = "O que quer dizer com \"é por isso\"!? Eu não entendi nada do que você disse!?"
1302-9 = "Fui chamada ao prédio principal e achei que finalmente tinha acabado o meu período de suspensão no prédio antigo, fiquei tão feliz..."
1302-10 = "E agora, do nada, você me chama aqui só para dizer \"se torne o Peroro\"? Isso é algum tipo de piada!?"
1302-11 = "Infelizmente, não é uma piada. Se você aceitar esta proposta, farei o possível para que vocês voltem ao prédio principal. Posso até negociar para que recebam dois pudins cada uma."
1302-12 = "……No entanto, por um tempo, você terá que vestir esta fantasia de Peroro e viver terminando suas frases com \"Pero~\"."
1302-13 = "Eu não quero vestir uma fantasia estranha dessas de jeito nenhum!?"
1302-14 = "E por que eu, para começar? Se é só isso que precisa, por que não pede para as outras integrantes do Comitê de Segurança?"
1302-15 = "Isso é impossível. Não há ninguém no Comitê de Segurança com a altura necessária para entrar nesta fantasia."
1302-16 = "Esta é uma operação que só pode ser executada por alguém pequena e ágil como você."
1302-17 = "Quem você está chamando de baixinha!! É assim que se pede um favor para alguém!?"
1302-18 = "……E, antes de tudo, por que você aceitou a ideia de \"matricular um personagem fictício como aluno na escola\"?"
1302-19 = "Mesmo sendo uma ordem da Presidente, a Presidente do Comitê deveria ter dito claramente que isso não faz sentido!"
1302-20 = "I-Isso é verdade, mas..."
1302-22 = "……Não, camarada Nodoka. Você está por acaso sugerindo que a \"Presidente Cherino está errada\"?"
1302-23 = "Diante da Presidente do Comitê de Segurança, tal declaração insolente... não me culpe se eu tiver que realizar um expurgo!"
1302-25 = "Humph. De qualquer forma, já estou suspensa, então esse tipo de ameaça não funciona comigo!"
1302-26 = "De-qualquer-jeito! Eu não vou vestir essa fantasia estranha e falar com esse final de frase bizarro! Mesmo que cancelem minha suspensão, eu recuso terminantemente!"
1302-27 = "Grr..."
1302-28 = "Eu não queria ter que usar este método, mas... não tenho escolha."
1302-30 = "Vocês, tragam aquele item!"
1302-46 = "I-Isso é... o pudim de altíssima qualidade da \"L'Oiseau Brûlé\"?"
1302-47 = "Se não me engano, custa uns 1000 ienes cada... Você pretende me subornar com esse pudim de luxo?"
1302-48 = "C-Claro que, b-bem, não é como se eu estivesse completamente tentada, sabe? Se você acha que pode abalar minha determinação com isso, você está me subestimando, não acha...?"
1302-50 = "Hehe... quem está subestimando as coisas é você."
1302-51 = "Isso não é para suborno... é uma ferramenta de tortura cruel e impiedosa para quebrar a sua vontade!"
1302-53 = "P-Pudim como tortura...? O que você quer dizer com..."
1302-54 = "Nhac."
1302-56 = "V-Você comeu!? E tudo de uma vez só!?"
1302-57 = "N-Não pode ser... Se fosse eu, comeria uma colherada por vez... não, eu saborearia cada pedacinho... e você comeu tudo de uma vez!?"
1302-58 = "C-Como você pôde... Mas, mesmo assim, não posso me render por causa disso..."
1302-59 = "Bem, não é ruim."
1302-63 = "O quê, você jogou fora mesmo tendo sobrado!?"
1302-64 = "V-Você tem noção do que está fazendo!? Que desperdício...!"
1302-65 = "Hehe... No momento em que chamei você aqui, já tinha feito uma investigação completa sobre sua vida."
1302-66 = "Para você, que aprendeu a economizar vivendo no prédio antigo, doces são algo para se saborear com cuidado. Ver isso ser comido de forma tão descuidada na sua frente deve ser um choque enorme."
1302-67 = "Se não quiser sofrer mais, é melhor cooperar comigo pacificamente!"
1302-68 = "Q-Que crueldade... Como esperado da cão de guarda da Presidente Cherino, a Presidente Marina não tem sangue nem lágrimas."
1302-69 = "Mas eu também tenho meu orgulho... Não vou me render com esse tipo de tortura! Não importa o que aconteça, não vou vestir a roupa do Peroro!"
1302-70 = "Como esperado de alguém que vive há tanto tempo na Classe Especial 227. Mas vamos ver por quanto tempo essa determinação dura...?"
1302-72 = "Vamos, integrantes do Comitê, tragam mais lanches!"
1302-74 = "Depois disso, a orgia alimentar de Marina, que ela chamava de tortura, continuou..."
1302-77 = "Hum. Então este é o telescópio astronômico que a camarada Nodoka tanto preza... Entendo, é grande e impressionante como dizem... e as lentes também são de altíssima qualidade."
1302-78 = "Hehe. Se eu tocasse nas lentes deste telescópio com as mãos nuas... como será que você reagiria?"
1302-79 = "O-O que você está tentando fazer!? Se fizer isso, vai deixar marcas de dedos...!!"
1302-82 = "A próxima é a tortura de cócegas! Vou usar este espanador macio que trouxe da secretaria para fazer cócegas no seu pescoço e na sua barriga até você não aguentar mais."
1302-84 = "(Cócegas, cócegas, cócegas, cócegas...)"
1302-85 = "Uhiii!? I-Ih, hihi, p-pare, aaaaah!?"
1302-86 = "E-Eu entendi! Hihi, eu vou fazer o que você pediu, então pare, ahahahahaha!?"
1302-87 = "Sendo assim, mostre-me como um Peroro deve soar! Vamos, grite 'Pero~'!"
1302-90 = "Em seguida, vejamos... que tal comer este 'tempurá de abacaxi com cobertura de chocolate com menta'?"
1302-92 = "A-acabe logo com isso..."
1302-95 = "Ugh, ugh..."
1302-96 = "Ufa. Vou te perdoar por enquanto."
1302-97 = "Vamos ouvir de novo, quem é você?"
1302-98 = "Nodo... não, é, é o Peroro."
1302-99 = "Não sou um coelho nem um urso, sou um legítimo Peroro, pero-pero..."
1302-101 = "Maravilhoso, é exatamente como um Peroro!"
1302-102 = "Com isso, não haverá problemas em enganar a Presidente Cherino... digo, em reportar à Presidente Cherino."
1302-103 = "Vou integrar este 'falso Peroro' ao secretariado, ganhar a 'Medalha de Ouro Especial do Bigode' e usá-la como trampolim para subir a cargos ainda mais altos... hehehe."
1302-105 = "Vamos, camarada Nodo... não, Peroro. Vamos agora mesmo ter uma audiência com a Presidente Cherino."
1302-106 = "É o início de uma missão importante que coloca em jogo o prestígio da Academia Federal de Red Winter! Prepare-se, como se o destino da academia estivesse sobre seus ombros!"
1302-107 = "Pe, pero~..."
