[translation]
1010102-1 = "食堂アルバイト"
1010102-4 = "（サオリから連絡をもらい、海辺の食堂に向かった）"
1010102-10 = "ご注文のお好み焼きだ。ごゆっくりどうぞ。"
1010102-11 = "美味しそう！"
1010102-12 = "……あれ、マヨネーズは？"
1010102-16 = "あっ！そうだった！#nすまない！すぐ持ってくる！"
1010102-21 = "すみませーん！#nまだメニュー来てないんですけどー！"
1010102-22 = "すまない！もう少し待ってくれ！"
1010102-27 = "[ns] （忙しそうだし、ゆっくり待とう）"
1010102-32 = "はぁ、はぁ……。"
1010102-33 = "いらっしゃいませ。こちらはメニューに……。"
1010102-37 = "先生じゃないか。"
1010102-38 = "わざわざ来てくれたのか、感謝する。"
1010102-39 = "[s] \"すごく忙しそうだね。\""
1010102-40 = "仕事の量が多いというより、まだ慣れなくてな……。"
1010102-41 = "未熟な姿を見せてしまったか。"
1010102-42 = "……あ、メニューならここにある。"
1010102-43 = "好きなものを選んでくれ。"
1010102-44 = "[s1] \"色々あるんだね。\"\n[s2] \"サオリのオススメは？\""
1010102-47 = "それなら……。"
1010102-51 = "この一番注文の多いメニューにするのはどうだ？"
1010102-52 = "ここに載ってる、「真心サービス付きの特製オムライス」だな。"
1010102-53 = "……うん？"
1010102-54 = "真心サービスは、オムライスにケチャップで絵を描くサービスだ。"
1010102-55 = "絵なんて描いたところで、食べたら消えてしまうだろう？#nなのに、どうしてこんな手間をかけるのか理解できないが……。"
1010102-59 = "[ns] \"じゃあ、それにする！\""
1010102-60 = "ん！？#n先生もオムライスを頼むのか？"
1010102-61 = "……そうか、分かった。#nしかし、可愛い絵を描ける保証はないが……。"
1010102-62 = "[s3] \"むしろ、それでいいんだよ！\"\n[s4] \"サオリが描いてくれたら、それだけで充分だよ！\""
1010102-65 = "そ、そうなのか……？"
1010102-66 = "分かった。では――"
1010102-71 = "おい！これはいったい、どういうことだ！？"
1010102-75 = "あっちのほうで何か起きたようだな。"
1010102-76 = "[s] \"行かなくていいの？\""
1010102-77 = "……気になるが、まずは先生の注文が先だろう。"
1010102-78 = "目の前のお客様一人ひとりと向き合うよう、接客マナーを教わったからな。"
1010102-83 = "さっさと責任者を呼べ！"
1010102-84 = "……。"
1010102-85 = "[s] \"私なら大丈夫だよ。\""
1010102-86 = "すまない、様子を見てくる。"
1010102-90 = "[ns] 心配になって、サオリについていく。"
1010102-98 = "おい！なんだこれは！#nメニューと違うじゃねえか！"
1010102-99 = "ふざけてんのか！？"
1010102-104 = "あなたは……たしか、さっきの料理を注文した……"
1010102-105 = "何か問題でもあったのか？"
1010102-106 = "あるから店員を呼んだんだろ！"
1010102-110 = "ちゃんと見てみろ！"
1010102-114 = "……すまないが、よく分からない。#n普通のオムライスじゃないか？"
1010102-115 = "[s] （……それも、食べかけの）"
1010102-116 = "自分で提供しておいて、気付かねえってどういうことだ？"
1010102-117 = "ケチャップで猫の絵を描いてくれるって話だっただろ！"
1010102-121 = "なのに、どっからどう見ても猫じゃなくてウサギになってるじゃねーか！"
1010102-122 = "[ns] \"ただの言いがかりでしょ！\""
1010102-123 = "注文と違うもんが出されたんだから……。"
1010102-124 = "代金は要らねえよな？"
1010102-128 = "なっ……！"
1010102-132 = "……確かに、この絵は猫に見えないかもしれない。"
1010102-133 = "注文をミスした私が悪かった……。"
1010102-134 = "そんじゃ、ここの飯代はタダってことでいいんだな？"
1010102-135 = "[s] \"サオリ、それは――\""
1010102-140 = "なら、お前が満足するまで猫の絵を描き直してやろう！"
1010102-145 = "……は？"
1010102-146 = "そういうわけじゃ……！"
1010102-147 = "心配ない、期待していてくれ！"
1010102-148 = "こういう事態に備えて、ケチャップなら持ち歩いている！"
1010102-152 = "はぁぁっ！"
1010102-153 = "ま、待ってくれ……！"
1010102-155 = "（……1時間後）"
1010102-159 = "過去一番の出来だ……！#nこれで満足してくれたか？"
1010102-160 = "い、いや。こんなつもりじゃ……。"
1010102-161 = "これでもダメとは……。"
1010102-162 = "よし、もう一度やり直そう！"
1010102-168 = "（……4時間後）"
1010102-172 = "どうだ！#nこれなら猫に見えるだろう？"
1010102-173 = "わ、分かったから……！"
1010102-174 = "納得できてなさそうだが……。"
1010102-178 = "よし、もう一度だ！"
1010102-182 = "も、もうやめてくれぇ！#n私が悪かった！"
1010102-183 = "か、金なら払う！#n許してくれっ！"
1010102-188 = "ま、待ってくれ！"
1010102-189 = "うまく描けたと思うんだが……！"
1010102-193 = "……行ってしまった。"
1010102-194 = "先生……私の絵は、そんなにダメだったのだろうか？"
1010102-195 = "[s] \"……絵の問題じゃないと思うよ。\""
1010102-196 = "……？"
1010102-197 = "なるほど……#nつまり、あの客はお金を払いたくないがために、言いがかりをつけてきたと？"
1010102-198 = "しかし、思い通りにならず、金を払って出ていったのか。"
1010102-199 = "ありがとう、勉強になった。#n今日のことはしっかりと覚えておこう。"
1010102-200 = "……それと、今度からは言いがかりをつけられないように、#nケチャップで絵を描く練習もしなくては。"
