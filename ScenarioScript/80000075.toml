[translation]
80000075-1 = "Em troca de tudo?"
80000075-2 = "Hotel abandonado"
80000075-3 = "（Recebi uma mensagem da Hiyori dizendo que ela tinha algo incrível, então vim correndo）"
80000075-4 = "……Ah, Sensei?"
80000075-5 = "Hehehe…… Você realmente veio."
80000075-6 = "Eh? Você sempre vem quando eu chamo……?"
80000075-7 = "I-Isso é…… não sei se digo que fico feliz ou que me sinto aliviada……."
80000075-8 = "……Porque você se preocupa em me deixar sozinha?"
80000075-9 = "Entendo, era isso……#nNo fim das contas, eu sou como um celular velho que ninguém sabe o que fazer, não é……."
80000075-10 = "[s1] \"N-Não é nada disso.\"\n[s2] \"Mas, afinal, o que é essa coisa incrível que você tem?\""
80000075-11 = "Ah…… i-isso mesmo."
80000075-12 = "Ah…… i-isso mesmo."
80000075-13 = "Bem…… por favor, aceite isto!"
80000075-18 = "[ns] \"……Chocolate?\""
80000075-19 = "Hehehe…… Hoje, pelo que parece, é o tal do Dia dos Namorados, não é?"
80000075-20 = "O dia de dar chocolates para as pessoas que cuidam da gente……."
80000075-21 = "M-Mas…… se isso não for o suficiente, eu deveria dar outra coisa, né?#nMeu corpo, meu coração, ou algo ainda mais incrível que isso……!"
80000075-22 = "……Ah! Falando nisso, e se isso não for o bastante……?#nEu não tenho mais nada além de um celular velho……."
80000075-23 = "A-Ahhh…… acabou……!#nO Dia dos Namorados, que dia assustador……!"
80000075-24 = "Dizer que é \"dar chocolate para quem cuida de você\" é só uma fachada……#nNa verdade, é um dia para usar isso como desculpa para fazer todo tipo de coisa com a outra pessoa……!"
80000075-25 = "Minha vida, acho que não tem mais jeito……#nChegou ao fim de vez…… Uwaaaaaan!"
80000075-26 = "[s3] \"C-Calma, Hiyori!\"\n[s4] \"O Dia dos Namorados não é nada disso!\""
80000075-27 = "É-É mesmo……?"
80000075-28 = "É-É mesmo……?"
80000075-29 = "Mas…… com um chocolate tão pequeno assim, o Sensei não vai ficar satisfeito, né.#nAfinal, você é um adulto……."
80000075-30 = "[s5] \"Fico feliz com qualquer coisa que você me der, Hiyori.\"\n[s6] \"É uma novidade receber algo de você, Hiyori.\""
80000075-31 = "É-É mesmo……? Então, fico aliviada. Hehehe……."
80000075-32 = "É-É mesmo……? Então, fico aliviada. Hehehe……."
80000075-33 = "[s] \"A propósito, como você conseguiu esse chocolate?\""
80000075-34 = "N-Na verdade…… foi com o dinheiro que consegui vendendo as revistas que eu colecionava……."
80000075-35 = "[s7] \"As revistas da Hiyori!?\"\n[s8] \"Aquilo que não seria exagero chamar de 'Tudo sobre a Hiyori'!?\""
80000075-36 = "C-Claro que eu hesitei um pouco……#nMas revistas, eu posso colecionar de novo……."
80000075-37 = "C-Claro que eu hesitei um pouco……#nMas revistas, eu posso colecionar de novo……."
80000075-38 = "Além disso…… eu queria poder te dar algo, Sensei, pelo menos uma vez……."
80000075-39 = "F-Foi ruim? Eu te incomodei? Eu fiz algo desnecessário de novo?#nEssa sua expressão, quer dizer isso……?"
80000075-40 = "No fim, é melhor eu não fazer nada mesmo.#nAfinal, o que alguém como eu poderia fazer…… Uwaaaaaan!"
80000075-41 = "[s] \"N-Não é nada disso! Não chore, tá?\""
80000075-42 = "Snif…… se for assim, por favor, aceite……."
80000075-43 = "Eu ficaria muito mais grata se você aceitasse……."
80000075-44 = "Porque isso é tudo o que eu tenho para te oferecer……."
80000075-45 = "[s] \"……Então, eu aceito. Obrigado, Hiyori.\""
80000075-46 = "S-Sim……!#nHehehe…… fico feliz que você tenha aceitado……."
80000075-50 = "……Eh? S-Sensei? Por que você está fazendo carinho na minha cabeça de repente……"
80000075-51 = "Ei, por que você está sorrindo em silêncio……!?"
80000075-52 = "U-Uuu…… isso é muito vergonhoso, sabia……."
