[translation]
80000075-1 = "すべてと引き換えに？"
80000075-2 = "閉鎖されたホテル"
80000075-3 = "（ヒヨリからすごいものがあると連絡をもらい、急いで出てきた）"
80000075-4 = "……あ、先生？"
80000075-5 = "えへへ……本当に来てくれたんですね。"
80000075-6 = "え？呼んだらいつでも来てくれる……？"
80000075-7 = "そ、それは……うれしいと言いますか、安心すると言いますか……。"
80000075-8 = "……放っておくのは心配だから？"
80000075-9 = "なるほど、そういうことでしたか……。#nつまるところ私なんて、扱いに困る古いスマホみたいなものですよね……。"
80000075-10 = "[s1] \"そ、そんなことはないよ。\"\n[s2] \"それより、何かすごいものがあるんだって？\""
80000075-11 = "あっ……そ、そうでした。"
80000075-12 = "あっ……そ、そうでした。"
80000075-13 = "えっと……これ、受け取ってください！"
80000075-18 = "[ns] \"……チョコレート？\""
80000075-19 = "えへへ……今日はどうやら、バレンタインデーという日らしいじゃないですか？"
80000075-20 = "いつもお世話になってる方に、チョコレートを渡すという……。"
80000075-21 = "で、ですが……それで足りなければ、別のものを渡すんですよね？#n体とか、心とか、それよりもすごい何かとか……！"
80000075-22 = "……はっ！そういえば、これで足りなかったらどうしましょう……？#n私、他には古いスマホくらいしか持ってないんですが……。"
80000075-23 = "あ、ああっ……もう終わりです……！#nバレンタインデー、なんて恐ろしい日なんでしょう……！"
80000075-24 = "「お世話になった人へチョコを渡す」というのは表面上の話で……#n本当は、それを口実に相手へあんなことやこんなことを#nするための日だったなんて……！"
80000075-25 = "私の人生、やっぱりもうダメかもしれません……#nいよいよ完全に終わりです……うわああぁぁん！"
80000075-26 = "[s3] \"お、落ち着いて、ヒヨリ！\"\n[s4] \"バレンタインデーはそんな日じゃないよ！\""
80000075-27 = "そ、そうなんですか……？"
80000075-28 = "そ、そうなんですか……？"
80000075-29 = "でも……こんなに小さなチョコレートじゃ、先生は満足できないですよね。#nなにせ、大人ですし……。"
80000075-30 = "[s5] \"ヒヨリがくれるなら何でも嬉しいよ。\"\n[s6] \"ヒヨリから何かをもらうのは新鮮だし。\""
80000075-31 = "そ、そうですか……？それなら、よかったです。えへへ……。"
80000075-32 = "そ、そうですか……？それなら、よかったです。えへへ……。"
80000075-33 = "[s] \"ところで、このチョコレートはどうやって用意したの？\""
80000075-34 = "じ、実は……集めていた雑誌を売ったお金で……。"
80000075-35 = "[s7] \"ヒヨリの雑誌を！？\"\n[s8] \"あの「ヒヨリのすべて」と言っても過言ではないものを！？\""
80000075-36 = "も、もちろん躊躇う気持ちはあったのですが……。#nでも雑誌なら、また集めればいいですし……。"
80000075-37 = "も、もちろん躊躇う気持ちはあったのですが……。#nでも雑誌なら、また集めればいいですし……。"
80000075-38 = "それに……一度くらいは、先生に何かを差し上げたかったといいますか……。"
80000075-39 = "だ、ダメでした？迷惑でしたか？私、また余計なことをしちゃいました？#nその表情、そういう意味ですか……？"
80000075-40 = "やっぱり私、何もしない方が良いんですね。#nそもそも私ごときにできることなんて……うわぁぁあん！"
80000075-41 = "[s] \"そ、そんなことないよ！泣かないで、ね？\""
80000075-42 = "ぐすん……であれば、ぜひ受け取っていただけると……。"
80000075-43 = "そうしていただける方が、むしろありがたいと言いますか……。"
80000075-44 = "これが、私の差し上げられるすべてですから……。"
80000075-45 = "[s] \"……なら、もらうね。ありがとうヒヨリ。\""
80000075-46 = "は、はい……！#nえへへ……そうしてくださると、私も嬉しいです……。"
80000075-50 = "……え？せ、先生？どうして急に頭を撫でて……"
80000075-51 = "あの、なぜ無言のまま笑顔で……！？"
80000075-52 = "う、ううぅ……何だかこれ、すごく恥ずかしいんですが……。"
