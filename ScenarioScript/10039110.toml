[translation]
10039110-1 = "Epílogo 3: Casa Assombrada Depois da Aula"
10039110-3 = "Então este é o café de casa assombrada da Trinity..."
10039110-4 = "Como será que ele se compara com a nossa casa assombrada?"
10039110-5 = "Qual será que dá mais medo?"
10039110-16 = "Guooooh, sejam bem-vindos..."
10039110-21 = "...Eu sou a Franken-Natsu, vim anotar o seu pedido."
10039110-22 = "Hã, o que é isso?#nNão dá medo nenhum..."
10039110-23 = "Na verdade, é até meio fofo..."
10039110-27 = "..."
10039110-28 = "Grr, então o próximo será..."
10039110-32 = "Vá, espírito maligno ancestral...!"
10039110-34 = "O governante da morte que rasteja das profundezas do inferno!#nVou te mostrar o desespero e a maldição que sufocam a terra...!"
10039110-39 = "Iiiih...!"
10039110-40 = "I-isso é...!"
10039110-52 = "Ei, isso já é demais!"
10039110-56 = "..."
10039110-61 = "Ku, kuaaa... e-eu sou uma múmia!"
10039110-62 = "Se não fizerem o pedido, vou lançar uma maldição em vocês!"
10039110-68 = "...Este era para ser um café de estilo fofo?"
10039110-69 = "Não era de terror...?"
10039110-71 = "..."
10039110-72 = "Natsu, o que você está fazendo!#nEles não estão entendendo nada!"
10039110-73 = "Droga, quem diria que eles seriam tão difíceis..."
10039110-74 = "Já que chegamos a esse ponto, não temos escolha a não ser usar nosso trunfo!"
10039110-78 = "Chamas que queimam, lamentos que ecoam.#nSua sombra maligna cobrirá até o mundo!"
10039110-80 = "Apareça, besta demoníaca do inferno, 'Cath Palug'!"
10039110-86 = "Eu disse para parar com isso!#nÉ só um lobisomem!"
10039110-87 = "...Você se contenta com 'só um lobisomem'?#nAcha que a natureza selvagem que habita em você é só isso?"
10039110-91 = "Mostre mais de si mesma, Cath Palug!#nAh, vá logo anotar o pedido."
10039110-96 = "Primeiro eu vou acabar com você!"
10039110-110 = "É um café de luta...?"
10039110-111 = "Não entendo bem..."
10039110-114 = "Ei, os clientes estão decepcionados."
10039110-115 = "Tudo bem, isso também faz parte da estratégia."
10039110-116 = "O 'verdadeiro' trunfo está em outro lugar!"
10039110-122 = "Talvez eu estivesse esperando demais."
10039110-123 = "É um café de casa assombrada, então imaginei algo bem mais assustador."
10039110-124 = "Mas, pensando bem, isso não é bom também?"
10039110-125 = "Já que viemos até aqui, vamos comer uns doces."
10039110-126 = "Com licença, podemos fazer o pedido?"
10039110-133 = "Ué?"
10039110-138 = "O-o que é isso...?"
10039110-148 = "..."
10039110-150 = "..."
10039110-152 = "A-ah, com licença..."
10039110-157 = "..."
10039110-158 = "Po-podemos fazer o pedido...?"
10039110-167 = "A-aaaaah!"
10039110-168 = "Fujam!"
10039110-173 = "..."
10039110-174 = "Ah, ué?#nSegui o que a Natsu-chan disse e só fiquei parada, mas..."
10039110-175 = "Excelente."
10039110-176 = "Esta é a carta na manga da nossa casa mal-assombrada do clube...#n\"13 Dias Seguidos de Menta com Chocolate\", Airi Kurimura!"
10039110-177 = "Expressão vazia, passos incessantes, uma arma sinistra."
10039110-179 = "Ela é, sem dúvida, o próprio terror em pessoa."
10039110-180 = "Na, Natsu-chan... tem certeza de que isso está certo?"
10039110-181 = "Fufu, sem problemas."
10039110-183 = "Não é ruim se os clientes fugirem?!"
10039110-184 = "Não!#nEste é o primeiro passo para a Airi alçar voo como a próxima geração de ícones do terror!"
10039110-185 = "Ela será a pessoa que liderará o mundo das casas mal-assombradas daqui para frente!"
10039110-186 = "Mas você só está expulsando os clientes!?"
10039110-187 = "Desse jeito, o lucro vai ser zero!#nO que vamos fazer com a montanha de doces e bebidas que preparamos!?"
10039110-188 = "Apenas aqueles que enfrentarem o medo poderão fazer seus pedidos...!"
10039110-190 = "Por isso mesmo, não pode ser assim!?"
10039110-199 = "[ns] \"Airi, aquilo de agora há pouco foi incrível...\""
10039110-203 = "Se, Sensei!#nDesde quando você estava aí!?"
10039110-204 = "[s1] \"Desde a parte do 'espírito maligno ancestral'...\"\n[s2] \"Desde a parte da 'besta infernal'...\""
10039110-210 = "Ei, por que você está olhando sem permissão!#nEsqueça isso!"
10039110-211 = "Sensei, você sabe o que acontece se disser mais alguma coisa!?"
10039110-213 = "...O que você acha, Sensei, olhando para este café?"
10039110-214 = "[s] \"Acho que está fofo e muito bem feito.\""
10039110-216 = "[ns3] \"Mas a fantasia da Airi estava realmente assustadora...\"\n[ns4] \"Tanto a roupa quanto os acessórios estavam muito bem feitos...\""
10039110-220 = "E-está me elogiando...?"
10039110-221 = "É um elogio, e dos melhores."
10039110-222 = "Como esperado da Airi, nossa presidente."
10039110-223 = "Po, por isso..."
10039110-228 = "Eu provavelmente ficaria estranha, é um talento invejável."
10039110-229 = "[ns] \"Faz aquilo de novo, Yoshimi!\""
10039110-233 = "Eu, eu não vou fazer de jeito nenhum!"
10039110-235 = "Haa... nosso tema é uma casa mal-assombrada, não é?"
10039110-236 = "Por que não aprendem um pouco com a Airi?"
10039110-237 = "Falta seriedade a vocês."
10039110-242 = "Hã?"
10039110-243 = "O que você quer dizer com isso?"
10039110-245 = "Mesmo que o tempo de preparação tenha sido curto, deveriam se dedicar ao personagem."
10039110-246 = "Afinal, Kazusa e Yoshimi têm temas muito mais assustadores que a Airi."
10039110-247 = "Mesmo assim..."
10039110-249 = "Por que vocês não conseguem abandonar a \"fofura\"!?"
10039110-253 = "Vocês mesmas devem se tornar o fantasma!"
10039110-254 = "A gente nem estava tentando ser \"fofa\" desde o começo!?"
10039110-255 = "Ingênuo, muito ingênuo!"
10039110-256 = "Você que diz isso, acha mesmo que consegue assustar alguém com essa fantasia!?"
10039110-257 = "...Frankenstein é o mais fraco entre nós, afinal."
10039110-258 = "Não venha dar desculpas só para você!"
10039110-259 = "Tsc, recorrer à violência... por que fogem do diálogo!#nDeve ser porque não confiam na própria lógica!"
10039110-265 = "Yoshimi!#nVamos pendurar esse cara de cabeça para baixo!"
10039110-271 = "Frankenstein não se curva à violência!#nNão posso perder até encontrar o doce supremo...!"
10039110-278 = "Pe, pessoal... primeiro, vamos nos acalmar?"
10039110-279 = "Afinal, nosso objetivo era mesmo assustar os clientes...?"
10039110-284 = "Ué, não era?"
10039110-286 = "Não é uma casa mal-assombrada, é um café com tema de casa mal-assombrada, não é?"
10039110-287 = "Acho que não precisa ser tão assustador assim."
10039110-288 = "……Entendo."
10039110-289 = "Parece que nos empolgamos demais com o tema e perdemos de vista o objetivo original……"
10039110-290 = "Sim, não seria bom ter fantasmas fofos também?"
10039110-295 = "……Para começo de conversa, isso não deveria ter sido discutido desde o início?"
10039110-296 = "Ninguém nasce perfeito, afinal."
10039110-297 = "A culpa é sua!"
10039110-298 = "E então, o que vamos fazer no final das contas?!"
10039110-304 = "[ns] \"Fico feliz que todos pareçam bem.\""
10039110-307 = "（Depois disso, ao mudarmos para um tema mais fofo, os clientes começaram a aparecer）"
10039110-311 = "（Dizem que a fantasia da Airi se tornou muito popular entre alguns entusiastas de terror……）"
