[translation]
10039110-1 = "後日談その3;放課後お化け屋敷"
10039110-3 = "ここがトリニティのお化け屋敷カフェ……。"
10039110-4 = "うちのお化け屋敷と比べてどうだろうな～。"
10039110-5 = "どっちのほうが怖いんだろ？"
10039110-16 = "ぐおぉぉ、いらっしゃいませぇー……。"
10039110-21 = "……私はフランケンナツイン、オーダーを取りにきたのだよ。"
10039110-22 = "え、これ何？#n全然怖くないけど……。"
10039110-23 = "むしろ、ちょっと可愛いかも……。"
10039110-27 = "……。"
10039110-28 = "ぐっ、ならば次は……。"
10039110-32 = "行け、古代の悪霊よ……！"
10039110-34 = "地獄の底より這い寄る死の支配者！#n大地を窒息させる絶望と呪いを見せてやるのだ……！"
10039110-39 = "ひいっ……！"
10039110-40 = "こ、これは……！"
10039110-52 = "ちょっと、それはやりすぎでしょ！"
10039110-56 = "……。"
10039110-61 = "く、くあぁ……わ、私はミイラよ！"
10039110-62 = "注文しないと、呪いをかけちゃうんだから！"
10039110-68 = "……これ、可愛い系のカフェだったっけ？"
10039110-69 = "ホラー系じゃなかったの……？"
10039110-71 = "……。"
10039110-72 = "ナツ、どうするのよ！#n全然通じてないんだけど！"
10039110-73 = "くっ、まさかここまで手強いとは……。"
10039110-74 = "こうなった以上、我々の切り札を出すしかない！"
10039110-78 = "燃え上がる炎、轟く慟哭。#nその邪悪な影は世界をも埋め尽くす！"
10039110-80 = "いでよ、地獄の魔獣「キャスパリーグ」！"
10039110-86 = "だから、やめろって言ったでしょ！#nただの狼人間だし！"
10039110-87 = "……「ただの狼人間」で満足するのか？#n君の中に潜む野生は、その程度だとでも？"
10039110-91 = "もっと己をさらけ出すのだ、キャスパリーグ！#nあ、早くオーダー取りに行って。"
10039110-96 = "まずはあんたを始末してからね！"
10039110-110 = "格闘系のカフェなの……？"
10039110-111 = "よく分からないね……。"
10039110-114 = "ちょっと、お客さんガッカリしてるじゃない。"
10039110-115 = "大丈夫、これも戦略のうち。"
10039110-116 = "「本当」の切り札は、ほかにある！"
10039110-122 = "ちょっと期待しすぎてたかも。"
10039110-123 = "お化け屋敷カフェなんだし、もっと怖いやつを想像してたのにね。"
10039110-124 = "でも、これはこれで良いんじゃない？"
10039110-125 = "せっかく来たし、スイーツでも食べようよ。"
10039110-126 = "すみませーん、注文良いですか？"
10039110-133 = "あれ？"
10039110-138 = "な、なに……？"
10039110-148 = "……。"
10039110-150 = "……。"
10039110-152 = "あ、あの……。"
10039110-157 = "……。"
10039110-158 = "ちゅ、注文良いですか……？"
10039110-167 = "わ、わあああっ！"
10039110-168 = "逃げろー！"
10039110-173 = "……。"
10039110-174 = "あ、あれ？#nナツちゃんに言われた通り、立ってただけなのに……。"
10039110-175 = "エクセレーント。"
10039110-176 = "これぞ放課後お化け屋敷の切り札……#n「13日連続チョコミント」、アイリ・クリムラ！"
10039110-177 = "虚ろな表情、止まらぬ足音、禍々しい[ruby=バット]凶器[/ruby]。"
10039110-179 = "彼女は、まさに恐怖そのものだろう。"
10039110-180 = "な、ナツちゃん……本当にこれで良いの？"
10039110-181 = "ふふ、ノープロブレム。"
10039110-183 = "お客さんが逃げ出したらダメじゃない！"
10039110-184 = "いや！#nこれはアイリが次世代のホラー役として羽ばたくための第一歩！"
10039110-185 = "彼女こそ、これからのお化け屋敷界を牽引する存在になるのだ！"
10039110-186 = "お客さんを追い出してるだけなんだけど！？"
10039110-187 = "このままだと売上ゼロじゃん！#n大量に準備したスイーツとドリンクはどうするの！？"
10039110-188 = "恐怖と向き合った者のみが、注文できるのだ……！"
10039110-190 = "だから、それじゃダメでしょ！？"
10039110-199 = "[ns] \"アイリ、さっきのすごかったね……。\""
10039110-203 = "せ、先生！#nいつからいらしてたんですか！？"
10039110-204 = "[s1] \"「古代の悪霊」のところから……。\"\n[s2] \"「地獄の魔獣」のところから……。\""
10039110-210 = "ちょ、なに勝手に見てんのよ！#n忘れなさい！"
10039110-211 = "先生、それ以上言ったらどうなるか分かってる！？"
10039110-213 = "……どうかな、先生から見てこのカフェは。"
10039110-214 = "[s] \"可愛いし、良くできてると思うよ。\""
10039110-216 = "[ns3] \"でも、アイリの仮装は本当に怖かったよ……。\"\n[ns4] \"衣装も小道具も凝ってて……。\""
10039110-220 = "ほ、褒めてもらえてるのかな……？"
10039110-221 = "褒め言葉だよ、それも最上級の。"
10039110-222 = "さすがはアイリ、我らが部長。"
10039110-223 = "だ、だから……。"
10039110-228 = "私はぎこちないだろうし、羨ましい才能だわ。"
10039110-229 = "[ns] \"さっきのもう一回やってみせて、ヨシミ!\""
10039110-233 = "ぜ、絶対にやらないんだから！"
10039110-235 = "はぁ……私たちのテーマはお化け屋敷だろう。"
10039110-236 = "もう少し、アイリを見習ってはどうだ？"
10039110-237 = "君たちには、真剣度が足りていない。"
10039110-242 = "はぁ？"
10039110-243 = "何が言いたいわけ？"
10039110-245 = "準備期間が短かったとはいえ、キャラクターになりきるべき。"
10039110-246 = "そもそもアイリより、カズサとヨシミのほうが恐ろしいモチーフだというのに。"
10039110-247 = "だからって……。"
10039110-249 = "君たちは、なぜ「可愛さ」を捨てきれないのか！"
10039110-253 = "自分自身がお化けになるのだ！"
10039110-254 = "最初から「可愛さ」なんて目指してないけど！？"
10039110-255 = "甘い、甘すぎる！"
10039110-256 = "そういうあんたこそ、そんな仮装で驚かせられるの！？"
10039110-257 = "……フランケンシュタインは、このなかでも最弱だから。"
10039110-258 = "自分だけ言い訳するんじゃないの！"
10039110-259 = "くっ、暴力とは……なぜ対話から逃げるのか！#nそれは論理に自信がないからだろう！"
10039110-265 = "ヨシミ！#nこいつ、逆さ吊りにするよ！"
10039110-271 = "フランケンシュタインは暴力に屈しない！#n究極のスイーツを見つけるまで、負けるわけには……！"
10039110-278 = "み、みんな……まずは落ち着いて？"
10039110-279 = "そもそも私たちの目的って、お客さんを脅かすことだったかな……？"
10039110-284 = "えっ、違うの？"
10039110-286 = "お化け屋敷じゃなくて、お化け屋敷[ruby=・]風[/ruby]のカフェでしょう？"
10039110-287 = "そこまで怖がらせる必要はないと思うの。"
10039110-288 = "……なるほど。"
10039110-289 = "テーマに熱を入れすぎたあまり、本来の目的を見失っていたわけか……。"
10039110-290 = "うん、可愛いおばけだっていて良いんじゃないかな。"
10039110-295 = "……そもそも、この話って最初にしておくべきじゃなかった？"
10039110-296 = "最初から完璧な者などいないのだよ。"
10039110-297 = "あんたのせいじゃん！"
10039110-298 = "それで、結局どうするのよ！"
10039110-304 = "[ns] \"みんな、元気そうで良かった。\""
10039110-307 = "（その後、可愛い系のテーマに変えると、お客さんも来てくれるようになった）"
10039110-311 = "（一部のホラーマニアから、アイリの仮装がとても人気だったとか……）"
