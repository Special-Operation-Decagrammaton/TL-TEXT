[translation]
10000070-1 = "Episódio 7: A conspiração revelada e o que vem a seguir"
10000070-3 = "Trazer o Sensei para um lugar como este..."
10000070-4 = "Não pode ser...?"
10000070-7 = "(Consigo ouvir vozes...)"
10000070-8 = "Eles provavelmente vão para lá, vou me esconder no teto para não ser vista..."
10000070-16 = "Com certeza, é aqui..."
10000070-18 = "Nós o trouxemos como ordenado!"
10000070-19 = "Nós o trouxemos!"
10000070-20 = "Muito bem, Trupe Chimi. Vejo que conseguem fazer as coisas quando querem."
10000070-21 = "(Aquilo é... é o Sensei mesmo!!)"
10000070-23 = "Estou feliz em vê-lo novamente, Sensei do Schale."
10000070-28 = "[ns] \"...O presidente da associação comercial, Nyan-tenmaru?\""
10000070-30 = "Humpf, meu nome verdadeiro não é Nyan-tenmaru!"
10000070-31 = "Meu nome é Masamunye..."
10000070-32 = "O Dragão de Um Olho do beco! Nyate Masamunye, esse sou eu!"
10000070-33 = "(Badabum!)"
10000070-34 = "(............)"
10000070-36 = "Ehem... Ouvi dizer que fui atrapalhado por um tal de \"Sensei\" com habilidades de comando excepcionais, e fiquei me perguntando de quem se tratava."
10000070-37 = "E pensar que esse Sensei do Schale era você..."
10000070-38 = "Se não me engano, já nos vimos uma vez na Hyakkiyako, não é?"
10000070-39 = "[s1] \"Foi isso mesmo.\"\n[s2] \"Foi?\""
10000070-40 = "Hahaha! Conseguir manter a calma mesmo nessa situação, você é alguém notável. Parece até que tem algum truque na manga."
10000070-41 = "Hahaha! Conseguir manter a calma mesmo nessa situação, você é alguém notável. Parece até que tem algum truque na manga."
10000070-42 = "Eu não sou como um vilão de quadrinhos. Acha mesmo que eu não notaria esse seu truque? ...Sinto muito, mas vou ter que impedir que você use esse recurso."
10000070-44 = "[s] \"O smartphone...\""
10000070-45 = "Com a idade, a gente fica mais cauteloso, então vou confiscar isso."
10000070-46 = "Pronto, agora você não tem como pedir ajuda."
10000070-47 = "Mesmo que grite mentalmente, o pessoal do Comitê Organizador do Festival não virá. A expressão 'isolado e sem ajuda' cai como uma luva aqui."
10000070-48 = "Ou talvez, 'como uma mariposa voando em direção ao fogo', não é, Sensei?"
10000070-49 = "[s3] \"...Por que você está fazendo isso?\"\n[s4] \"O que você ganha atrapalhando o festival?\""
10000070-53 = "[ns] \"...Para proteger a tradição do Festival Ouka?\""
10000070-54 = "Tradição...? Ah, está falando dos fogos de artifício?"
10000070-55 = "Hahaha! Você presta bastante atenção no que os outros dizem, não é?"
10000070-56 = "Mas não é isso. Nem tudo o que eu disse foi mentira, mas não é realmente com isso que eu me importo."
10000070-57 = "Meu objetivo é bem simples: dinheiro."
10000070-58 = "[s] \"Dinheiro...?\""
10000070-59 = "O Festival Ouka de Hyakkiyako... você tem ideia de quanto dinheiro circula cada vez que esse festival acontece?"
10000070-60 = "Dada a escala, você deve imaginar que é uma quantia considerável. E, no entanto, esse dinheiro fica nas mãos do Comitê Organizador do Festival, aquelas pirralhas. Eu não gosto nada disso."
10000070-61 = "\"Tornar o festival algo maravilhoso\"?"
10000070-62 = "Dizem que, para isso, é necessário gastar uma fortuna contratando o Millennium, não é?"
10000070-63 = "Que ideia ingênua! Se tivessem me deixado no comando, teríamos ganhado muito mais dinheiro do que eles!"
10000070-64 = "[s] \"Então, foi por isso que você atrapalhou o Festival Ouka?\""
10000070-65 = "Exatamente."
10000070-66 = "Se o Festival Ouka for cancelado, o comitê organizador terá que assumir a responsabilidade e renunciar à gestão."
10000070-67 = "Naturalmente, o próximo a assumir esse papel serei eu. Afinal, sou o presidente da associação comercial, controlar isso não é difícil."
10000070-68 = "[s] \"E por causa disso, a Izuna também...\""
10000070-69 = "Izuna... Ah, aquela pirralha que se diz ninja."
10000070-70 = "Pois é, ela foi extremamente útil."
10000070-71 = "Trabalhou muito bem, mesmo sem eu ter gastado quase nada."
10000070-72 = "Eu nem imaginava que ela seria tão ativa só por eu ter entrado na brincadeira de ninja dela."
10000070-73 = "Só em termos de força de combate, ela valia por dezenas de membros da trupe Chimichanga."
10000070-74 = "[s] \"Brincadeira...?\""
10000070-75 = "Sim, uma brincadeira de criança infantil, não é? Essa tal de \"ninja\" mágica que ela tanto fala é coisa de mundo de fantasia."
10000070-76 = "Coisas como \"estou às suas ordens como seu empregador\" ou \"o caminho do ninja é fazer o que for ordenado\"."
10000070-77 = "Foi difícil até segurar o riso."
10000070-78 = "Pelo lado bom, esse foi o único incômodo; bastou entrar no jogo dela e olha só o resultado."
10000070-79 = "Quando ela disse toda empolgada que \"daria o seu melhor como ninja!\", nem eu consegui parar de rir!"
10000070-80 = "Posso falar agora, mas querer ser ninja nessa idade é de morrer de rir!"
10000070-81 = "Sinceramente, só de olhar do lado, foi difícil segurar a risada."
10000070-82 = "Ah, ela é realmente uma ferramenta útil. Tão econômica, tão idiota, foi uma mão na roda para mim! Hahahaha!"
10000070-83 = "[s] \"……Então você usou o sonho da Izuna por causa de dinheiro?\""
10000070-84 = "……Sonho? Do que você está falando?"
10000070-85 = "Você chama aquela fantasia idiota, que nem chega a ser um sonho, de sonho? Você é um cara bem compreensivo, não é? Mesmo sendo o Sensei, você é um bobo de marca maior."
10000070-87 = "……!!!"
10000070-88 = "(Eu disse que acreditava nela, que queria que a Izuna brilhasse como uma ninja……)"
10000070-89 = "(Mas tudo isso foi…… uma mentira para enganar a Izuna……?)"
10000070-90 = "(A Izuna foi enganada……?)"
10000070-91 = "Pelo que você diz, você percebeu que a senhorita Izuna…… não, que a Izuna estava agindo sob as minhas ordens, não é?"
10000070-92 = "Sabendo que tanto o Grupo Chimichanga quanto a Izuna estavam sob meu controle, não foi um pouco de falta de juízo vir acompanhando a Izuna assim? Você nem pensou na possibilidade de ser uma armadilha."
10000070-93 = "Deixar a Izuna, que tem muita energia, agir por conta própria poderia me levar até você. Mandei parte do Grupo Chimichanga segui-la e, na primeira oportunidade, sequestrá-la……."
10000070-94 = "Foi apenas uma das minhas estratégias, mas funcionou melhor do que o esperado. Ela trabalhou muito bem para mim. Hahahaha!"
10000070-95 = "……!!"
10000070-96 = "(Por causa da Izuna ter sido enganada……!)"
10000070-97 = "(O Sensei, que apoiou o sonho da Izuna……!)"
10000070-99 = "[ns] \"Talvez tenha sido imprudente da minha parte estar com a Izuna.\""
10000070-100 = "Ora, ora, então você consegue fazer uma autoanálise."
10000070-101 = "[s] \"Mas isso foi uma decisão minha, a Izuna não tem culpa de nada.\""
10000070-104 = "……Se, Sensei?"
10000070-107 = "[ns] \"Brincadeira de ninja…… foi isso que você disse?\""
10000070-108 = "……Hm? Ah, sim. Inesperadamente, essa \"brincadeira\" também foi útil."
10000070-109 = "Então, o que tem essa brincadeira de ninja?"
10000070-110 = "[s] \"Vou te dizer uma coisa, ninjas são...\""
10000070-116 = "[ns5] \"Se você pesquisar bem, eles são muito legais, sabia!?\"\n[ns6] \"É uma questão de romance, entende!?\""
10000070-117 = "!!?"
10000070-118 = "!!?"
10000070-120 = "......"
10000070-121 = "...Hã?"
10000070-122 = "...Como é?"
10000070-123 = "P-por que isso de repente...?"
10000070-124 = "[s7] \"Mesmo que digam que é infantil ou imaturo...!\"\n[s8] \"O que é legal, é legal, ponto final!!!\""
10000070-125 = "...Kuh,"
10000070-126 = "...Kuh,"
10000070-127 = "Kuhahahaha! Isso é uma obra-prima!"
10000070-128 = "Disseram que você era o Sensei do Schale, então achei que fosse alguém com quem se pudesse conversar um pouco mais!"
10000070-129 = "Eu ia tentar te convencer, mas esquece. Não tenho tempo para perder com alguém que não faz o menor sentido!"
10000070-130 = "Até mais, Sensei do Schale. O seu azar foi ter interferido no meu plano. Ataquem, Trupe Chimichami!"
10000070-131 = "Oraaaaaa!"
10000070-140 = "O-o que é isso!? O teto caiu de repente!? O que está acontecendo!?"
10000070-141 = "Cof, cof! O que está acontecendo aqui!?"
10000070-142 = "E-eu não sei!"
10000070-144 = "Uma ninja que almeja ser a mais forte de Kivotos!"
10000070-145 = "Para salvar meu verdadeiro mestre de uma situação difícil, aqui estou eu!"
10000070-146 = "[s] \"Izuna!\""
10000070-147 = "Izuna! Por que você estava no teto...!?"
10000070-148 = "Eu ouvi tudo."
10000070-149 = "O que o meu empregador disse... e também os sentimentos do Sensei, que nunca riu dos meus sonhos, não importa a situação."
10000070-150 = "Eu finalmente encontrei..."
10000070-153 = "Se for ao lado do Sensei, que sempre apoiou o meu sonho desde o início... eu poderei continuar sonhando para sempre!"
10000070-154 = "Grr, você vai me trair, Izuna!?"
10000070-155 = "Sensei..."
10000070-156 = "Não, meu mestre!"
10000070-157 = "[s] \"Mestre... eu!?\""
10000070-159 = "Sim! De agora em diante, dedicarei tudo ao meu verdadeiro mestre e lutarei por você! ...Vamos nessa!"
