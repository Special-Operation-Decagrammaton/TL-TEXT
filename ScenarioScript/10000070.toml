[translation]
10000070-1 = "第7話;暴かれる陰謀とその先に"
10000070-3 = "こんなところに先生を連れてきて……。"
10000070-4 = "まさか……？"
10000070-7 = "（声が聞こえる……）"
10000070-8 = "多分あそこに向かうはず、見つからないように天井に隠れて……。"
10000070-16 = "きっと、ここに……。"
10000070-18 = "命令通り連れてきたよ！"
10000070-19 = "連れてきたっす！"
10000070-20 = "よくやった、魑魅一座。やればできるじゃないか。"
10000070-21 = "（あれは……やっぱり先生！！）"
10000070-23 = "また会えて嬉しいよ、シャーレの先生。"
10000070-28 = "[ns] \"……商店街の会長の、ニャン天丸？\""
10000070-30 = "ふん、儂の本名はニャン天丸じゃない！"
10000070-31 = "儂の名はマサムニェ……。"
10000070-32 = "路地裏の独眼竜！ニャテ・マサムニェとは儂のことじゃ！"
10000070-33 = "（ドドーン！）"
10000070-34 = "（…………）"
10000070-36 = "おほん……類まれなる指揮能力を持つ「先生」とやらに邪魔をされたと聞いて、誰のことかと思ったら。"
10000070-37 = "そのシャーレの先生が、おぬしだったとは……。"
10000070-38 = "たしか、一度百夜堂で会ったな？"
10000070-39 = "[s1] \"そうだったね。\"\n[s2] \"そうだっけ？\""
10000070-40 = "ははっ！こんな状況でも余裕でいられるとは、大したやつだ。まるで何か奥の手でもあるみたいじゃないか。"
10000070-41 = "ははっ！こんな状況でも余裕でいられるとは、大したやつだ。まるで何か奥の手でもあるみたいじゃないか。"
10000070-42 = "私はコミックの悪役なんかとは違う。その手に気づかないとでも思うか？……悪いが、その手段は封じさせてもらうよ。"
10000070-44 = "[s] \"スマホを……。\""
10000070-45 = "歳を取ると用心深くなるでな、これは没収することにしよう。"
10000070-46 = "さあ、これでおぬしが助けを求める手段はない。"
10000070-47 = "心の中で叫んだところで、お祭り運営委員会の連中は来ない。孤立無援という言葉がぴったりだな。"
10000070-48 = "あるいは飛んで火にいる夏の虫というところかな、先生？"
10000070-49 = "[s3] \"……どうしてこんなことをするの？\"\n[s4] \"お祭りの邪魔をして何の得があるの？\""
10000070-53 = "[ns] \"……桜花祭の伝統を守るため？\""
10000070-54 = "伝統……？ああ、花火のことか？"
10000070-55 = "ふはは！人の話をよく聞いているじゃないか。"
10000070-56 = "だが違うわい、全部が全部口から出まかせってわけじゃあないが、本当に気にしているのはそこじゃない。"
10000070-57 = "儂の目的はいたってシンプル、金だよ。"
10000070-58 = "[s] \"お金……？\""
10000070-59 = "百夜ノ春ノ桜花祭……このお祭りが一度開かれるたびに、いったいどれぐらいの金が動くと思う？"
10000070-60 = "この規模だ、それなりに大きいことくらいは分かるだろう。なのにその金をお祭り運営委員会、あんなチビ共が握っとる。儂はそれが気に食わんのだ。"
10000070-61 = "「お祭りを素敵なものに」？"
10000070-62 = "そのためなら、大枚をはたいてミレニアムに依頼するのも必要なことだって？"
10000070-63 = "何という青い考えだ！儂に任せれば、あいつらよりはるかに多くの金を稼げたというのに!"
10000070-64 = "[s] \"それで、桜花祭の邪魔をしたの？\""
10000070-65 = "そうさ。"
10000070-66 = "桜花祭が中止になれば、お祭り運営委員会はその責任をとって運営を下りるしかない。"
10000070-67 = "自然と次にその役割が任されるのは儂だろう。これでも商店街の会長だ、そのコントロールも難しくはない。"
10000070-68 = "[s] \"そのために、イズナも……。\""
10000070-69 = "イズナ……ああ、あの自称忍者のチビっ子か。"
10000070-70 = "そうだな、あいつは実に役に立ってくれた。"
10000070-71 = "大したお金もかけていないのに、よく働いてくれたよ。"
10000070-72 = "ちょっと[ruby=お遊び]忍者ごっこ[/ruby]に付き合っただけで、こんなにも活躍をしてくれるとは思ってもみなかった。"
10000070-73 = "戦力だけなら、魑魅一座の数十人分はあったからな。"
10000070-74 = "[s] \"お遊び……？\""
10000070-75 = "ああ、幼稚な子供のごっこ遊びだろう？あいつの言う、魔法のような「忍者」なんて、ファンタジー世界の話だ。"
10000070-76 = "「雇い主としてご命令を」だとか「ご命令とあらば何でもこなすのが忍びの道」だとか。"
10000070-77 = "笑わないようにするのが大変だったくらいだ。"
10000070-78 = "逆に言えば面倒だったのはそれくらいで、ちょっと付き合ってあげればあの通り。"
10000070-79 = "もうやる気満々で「忍びとして全力を尽くします！」なんて言った時には、いくら儂でも笑いが止まらなかったさ！"
10000070-80 = "今なら言えるけど、あの歳で忍者とか笑わせるよな！"
10000070-81 = "正直、隣で見てるだけでも笑いをこらえるのが大変だったっす。"
10000070-82 = "ああ、本当に便利なやつだ。実に経済的で、バカで、こちとら大助かりだよ！ふははははっ！"
10000070-83 = "[s] \"……お金のために、イズナの夢を利用したってこと？\""
10000070-84 = "……夢？何を言っているんだ？"
10000070-85 = "あんな夢想とすら言えないバカの妄想を、夢だと？おぬしも付き合いの良いやつだな。先生とはいえ、大したお人よしだよ。"
10000070-87 = "……っ！！！"
10000070-88 = "（イズナに忍者として活躍してほしいって、信じるって言ってたのに……）"
10000070-89 = "（でも、それもこれも全部……イズナを騙すための嘘だった……？）"
10000070-90 = "（イズナは、騙されて……？）"
10000070-91 = "話を聞いてるとおぬし、イズナ殿……いや、イズナが儂の命令を聞いて動いていたことに気づいてたんだろう？"
10000070-92 = "魑魅一座もイズナも、どちらも儂の支配下にあると知っていたのに、のこのことイズナに同行するのはちょっと頭が足りないんじゃないか？裏に罠がある可能性を考えないとは。"
10000070-93 = "行動力だけはあるイズナを泳がせた方が、おぬしを上手く見つけるかもしれない。一部の魑魅一座にはイズナを尾行させ、隙を見て誘拐……。"
10000070-94 = "あくまで策の一つだったが、面白いほど上手くいった。あいつは本当によく働いてくれたよ。ふはははっ！"
10000070-95 = "……！！"
10000070-96 = "（イズナが騙されたせいで……！）"
10000070-97 = "（イズナの夢を応援してくれた、先生が……！）"
10000070-99 = "[ns] \"イズナと一緒にいたのは確かに迂闊だったかもしれない。\""
10000070-100 = "何だ、自己分析できてるんじゃないか。"
10000070-101 = "[s] \"でもそれは私が決めたこと、イズナが悪いわけじゃない。\""
10000070-104 = "……せ、先生？"
10000070-107 = "[ns] \"忍者ごっこ……だっけ？\""
10000070-108 = "……ん？ああ、そうだ。存外その「ごっこ遊び」も役に立ったがな。"
10000070-109 = "それで、その忍者ごっこがどうした？"
10000070-110 = "[s] \"一つ言わせてもらうけど、忍者っていうのは……。\""
10000070-116 = "[ns5] \"よく調べてみても、すごくかっこいいんだよ！？\"\n[ns6] \"ロマンなんだよ！？\""
10000070-117 = "！！？"
10000070-118 = "！！？"
10000070-120 = "……。"
10000070-121 = "……へ？"
10000070-122 = "……はい？"
10000070-123 = "き、急に何を……？"
10000070-124 = "[s7] \"人から幼稚と言われても子供っぽいと言われても……！\"\n[s8] \"かっこいいものはかっこいいんだよ！！！\""
10000070-125 = "……くっ、"
10000070-126 = "……くっ、"
10000070-127 = "くははははははっ！これは傑作だ！"
10000070-128 = "シャーレの先生というから、もう少しくらい話が通じるやつだと思っていたんだがな！"
10000070-129 = "説得しようと思っていたが止めだ、何を言ってるか分からないやつにこれ以上付き合う時間は無い！"
10000070-130 = "じゃあな、シャーレの先生。儂の計画を邪魔したのが運の尽きだ。やれ、魑魅一座！"
10000070-131 = "おらあぁぁぁっ！"
10000070-140 = "な、何だ！？急に天井が落ちてきた！？どうなっている！？"
10000070-141 = "げほげほっ！何が起きてるんだ！？"
10000070-142 = "わ、分かんないっす！"
10000070-144 = "キヴォトス最強を目指す忍び！"
10000070-145 = "真の主君の窮地を救うため、今ここに参りました！"
10000070-146 = "[s] \"イズナ！\""
10000070-147 = "イズナ！どうして天井から……！？"
10000070-148 = "全部聞いていました。"
10000070-149 = "雇い主の話も……どんな時もイズナの夢を笑わない、先生の気持ちも。"
10000070-150 = "イズナはついに見つけました……"
10000070-153 = "最初からずっとイズナの夢を応援してくれた、先生の隣でなら……イズナは、これから先もずっと、夢を見続けることができます！"
10000070-154 = "ぐっ、裏切るのか、イズナ！？"
10000070-155 = "先生……"
10000070-156 = "いえ、主殿！"
10000070-157 = "[s] \"主殿って……私！？\""
10000070-159 = "はいっ！今からイズナは、全てを真の主君たる主殿に捧げ、主殿のために戦います！……いざっ！"
