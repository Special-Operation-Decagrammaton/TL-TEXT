[translation]
33250-1 = "Episódio 25; Epílogo"
33250-2 = "Como ousa, como ousa enganar a mim, Makoto-sama!!!"
33250-3 = "Iroha, onde está a Iroha! Prepare aquilo agora mesmo! Não vou ficar aqui parado aceitando essa derrota...!"
33250-4 = "Não faço a menor ideia do que quer dizer com \"aquilo\", mas acho que seria melhor se o senhor continuasse deitado."
33250-5 = "E se for falar, por favor, dê um jeito nessa sua cabeça engraçada antes. Além disso, as coisas já foram resolvidas."
33250-6 = "O que disse... cabeça?"
33250-7 = "O-o que é issooooo!?"
33250-8 = "Bem, é que naquela hora, você foi envolvido pelas chamas... ah."
33250-10 = "...Como está se sentindo, Nagisa-sama?"
33250-11 = "Pensei que seu halo fosse se despedaçar... mas parece que está tudo bem."
33250-12 = "Sim, felizmente... foi o mais importante. Por favor, não se esforce."
33250-13 = "...Obrigada. A propósito, você veio por algum motivo?"
33250-14 = "Ah, na verdade, recebi uma carta da Mika-sama..."
33250-15 = "...O que diz nela?"
33250-16 = "Bem, é que..."
33250-18 = "Iae, Nagi-chan! Ouvi dizer que você ficou desmaiada desde que o míssil atingiu o local, é verdade?"
33250-19 = "Depois de tanta confusão, você dormir tranquilamente assim... não é uma imagem que uma anfitriã deveria mostrar para todo mundo, né?"
33250-20 = "Bom, eu sei que você se esforçou muito e queria que descansasse, mas não achei que fosse dormir tão profundamente."
33250-21 = "Já que acordou bem, pode me fazer um favor? Ficaria muito feliz se você voltasse logo ao posto de anfitriã e desse um jeito nas coisas!"
33250-22 = "Primeiro, essa TV aqui só passa canais comuns, né? Pode colocar aquela que passa de tudo 24 horas por dia?"
33250-23 = "E meu creme de mãos acabou. Eu só uso aquela marca de sempre, então pode comprar para mim? Depois te digo onde vende!"
33250-24 = "Ah, e o secador de cabelo parece que está ficando fraco. Pode trocar por um um pouco melhor?"
33250-25 = "Ah, já que vamos fazer isso, vou pegar um igual ao seu! Você usa aquele modelo de luxo de uma marca incrível, né? Aquele que você começou a usar quando seu cabelo melhorou. Eu sei de tudo!"
33250-26 = "E também, e também..."
33250-28 = "..."
33250-29 = "Bem... o que faremos? Afinal, não é uma prisão..."
33250-30 = "De agora em diante, a refeição da Mika-san será composta apenas por rocamboles."
33250-31 = "Sim... Sim!?"
33250-72 = "Pessoal."
33250-73 = "D-Danchou...!?"
33250-74 = "Danchou!!!"
33250-75 = "...Desculpem-me por ter ido embora sem dizer nada."
33250-76 = "Uaaaaa!! Danchou----!!"
33250-82 = "Desculpem-me por fazê-los esperar... embora um pouco atrasada, estou de volta."
33250-85 = "Mika-san..."
33250-86 = "Nagi-chan, por que ainda está com essa cara? As coisas terem dado certo... bem, talvez não tenha dado tanto assim."
33250-87 = "Isso é porque..."
33250-93 = "...ainda temos uma pilha de deveres de casa que não resolvemos, não é?"
33250-94 = "Se-Seia-san...?"
33250-95 = "Seia-chan!?"
33250-97 = "...Olá, Nagisa, Mika."
33250-98 = "Faz tempo que não nos reunimos assim."
33250-99 = "Muito tempo se passou e muitas coisas aconteceram, mas..."
33250-100 = "Já está na hora de conversarmos entre nós."
33250-101 = "Sobre o que não dissemos e o que não conseguimos dizer."
33250-102 = "E sobre o que, na verdade, queríamos ter dito."
33250-103 = "Haverá mal-entendidos e coisas difíceis de acreditar. Mesmo que não cheguemos a lugar nenhum... ainda assim, não temos escolha a não ser enfrentar o problema indemonstrável que é o coração do outro."
33250-104 = "Todas nós precisamos seguir em frente. Carregando esse dever de casa nas costas, mesmo nesta escuridão... apenas mirando no que está adiante."
33250-108 = "...É verdade."
33250-109 = "Sim, concordo plenamente... mas você continua falando de coisas difíceis. Seia-chan, é por isso que você não tem amigos, sabia? Já se deu conta disso?"
33250-110 = "……。"
33250-111 = "Primeiro, Mika, não seria melhor colocar um pouco de cultura e refinamento nessa sua cabeça que parece fazer tanto barulho?"
33250-112 = "Ah, vocês duas……."
33250-114 = "[ns] \"Bem…… o antigo Clube de Reforço Escolar deveria ter se formado, não é…….\""
33250-116 = "[ns] \"Ouvi dizer que um novo Clube de Reforço Escolar foi formado, mas……?\""
33250-117 = "……。"
33250-118 = "……。"
33250-119 = "……。"
33250-120 = "……。"
33250-121 = "[ns] \"São os mesmos membros, não são!?\""
33250-123 = "Ah, ahaha…… bem, é que……."
33250-124 = "Eu estava participando do show do Peroro-sama, mas, na verdade, parece que era dia de prova……."
33250-125 = "Ainda não aprendi a matéria da próxima prova."
33250-126 = "Bem, é que…… eu tentei fazer a prova do terceiro ano, mas……."
33250-127 = "Deixar alguém de fora assim é muito solitário, não acha? ♡"
33250-128 = "Ah, desculpe, Sensei…… não sei como acabamos assim de novo……."
33250-129 = "Ma-mas desta vez não há risco de expulsão, e a matéria da prova é normal……!"
33250-130 = "[ns] Sente uma tontura e desmaia."
33250-132 = "Se-Sensei!?"
33250-133 = "Sensei!"
33250-134 = "O-o que é isso! Não precisa reagir assim, né!?"
33250-135 = "Ora, isso é……"
33250-136 = "Ei! Você acabou de fazer uma cara de quem pensou \"que oportunidade perfeita\", não fez!?"
33250-137 = "Idiota, nada de coisas pervertidas!! Pena de morte!!!"
33250-144 = "……。"
33250-145 = "Você continuará aprendendo muitas coisas. Sempre, junto com seus amigos."
33250-146 = "Você vai estudar, se esforçar e descobrir várias possibilidades."
33250-147 = "……Porque você é forte."
33250-148 = "Mesmo que tudo pareça vazio, mesmo que este mundo seja sombrio e solitário……"
33250-149 = "Mesmo que seja em um canto de concreto……."
33250-150 = "……Azusa."
33250-151 = "Sobre aquela flor que você me mostrou naquela época…… acho que agora consigo entender um pouco."
33250-152 = "Talvez nunca mais nos vejamos novamente."
33250-153 = "Por favor, seja feliz."
33250-166 = "……Entendo."
33250-167 = "Então aquela sangue-real fugiu."
33250-168 = "……Traga-a de volta. Sem ferimentos, trate-a com cuidado."
33250-169 = "Quanto aos outros, pode eliminá-los se quiser."
33250-170 = "……Sim. Quero dizer que pode \"destruir o halo\" deles."
