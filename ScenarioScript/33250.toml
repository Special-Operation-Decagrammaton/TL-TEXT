[translation]
33250-1 = "Episódio 25; Epílogo"
33250-2 = "Como vocês ousam, como ousam enganar a mim, Lorde Makoto!!! Iroha, onde está a Iroha! Prepare 'aquilo' agora mesmo! Não vou deixar que saiam ilesos depois de me fazerem de bobo dessa forma...!"
33250-3 = "Quando diz 'aquilo', eu não faço a menor ideia do que está falando, mas acho que seria melhor o senhor continuar deitado. Além disso, se for falar, por favor, dê um jeito nessa sua cabeça engraçada primeiro. Para começo de conversa, muitas coisas já foram resolvidas."
33250-4 = "O que disse... cabeça?"
33250-5 = "Q-Que diabos é issooooo!?"
33250-6 = "Bom, é que naquela hora ela foi envolvida pelas chamas... haa."
33250-7 = "......Como está se sentindo, Nagisa-sama?"
33250-8 = "Pensei que seu Halo fosse se estilhaçar... mas parece que está tudo bem."
33250-9 = "Sim, felizmente... realmente, não poderia ser melhor. Por favor, não se esforce."
33250-10 = "......Obrigada. A propósito, você veio aqui por algum motivo?"
33250-11 = "Ah, na verdade, recebi uma carta da Mika-sama..."
33250-12 = "......O que diz nela?"
33250-13 = "Bem, é..."
33250-14 = "Ya-hoo, Nagi-chan! Ouvi dizer que você ficou inconsciente desde que o míssil atingiu o local, é verdade?"
33250-15 = "Depois de tudo o que aconteceu, você ficou aí dormindo tranquilamente? Não é uma postura que uma anfitriã (Host) mostra para os outros, né?"
33250-16 = "Bom, eu sabia que você estava se esforçando, então queria que descansasse, mas não achei que fosse dormir tão profundamente."
33250-17 = "Parece que você acordou, então pode me fazer um favor? Eu ficaria feliz se você voltasse ao posto de anfitriã logo e desse um jeito nas coisas!"
33250-18 = "Primeiro, a TV daqui só passa canais comuns, né? Não tem como colocar aquela que passa um monte de coisas 24h?"
33250-19 = "Ah, e meu creme de mãos acabou. Só pode ser daquela minha marca, então compra pra mim? Te aviso onde vende depois!"
33250-20 = "E o secador de cabelo parece que tá fraco. Não dá pra trocar por um mais caro?"
33250-21 = "Ah, e já que estamos nisso, vou pegar um igual ao seu! Sei que você usa aquele modelo top de linha daquela marca caríssima, aquele que você mudou quando seu cabelo ficou mais sedoso. Eu sei, tá?"
33250-22 = "E mais uma coisa, e mais uma――"
33250-23 = "......"
33250-24 = "Bem... o que devemos fazer? Como não é para a prisão..."
33250-25 = "De agora em diante, a Mika-san só comerá rocambole."
33250-26 = "S-Sim... S-Sim!?"
33250-27 = "Pessoal."
33250-28 = "L-Líder...!?"
33250-29 = "Líder!!!"
33250-30 = "......Desculpem por ter sumido sem dizer nada."
33250-31 = "Uaaaaaah!! Líder!!!"
33250-32 = "Desculpem por fazê-los esperar... peço perdão pela demora, estou de volta."
33250-33 = "Mika-san..."
33250-34 = "Nagi-chan, por que você ainda está com essa cara? As coisas podem não ter saído... bem, talvez não como esperado."
33250-35 = "Isso é..."
33250-36 = "Porque ainda temos uma pilha de tarefas que não resolvemos... não é?"
33250-37 = "S-Seia-san...?"
33250-38 = "Seia-chan!?"
33250-39 = "......Olá, Nagisa, Mika. É um reencontro depois de muito tempo."
33250-40 = "Muito tempo se passou e muitas coisas aconteceram, mas..."
33250-41 = "Acho que já está na hora de conversarmos."
33250-42 = "Coisas que não dissemos, ou que não conseguimos dizer."
33250-43 = "E as coisas que realmente queríamos ter dito."
33250-44 = "Haverá mal-entendidos e coisas em que não poderemos acreditar. Mesmo que não cheguemos a lugar nenhum... ainda assim, não temos escolha a não ser encarar o problema impossível que é o coração do outro."
33250-45 = "Todos nós devemos seguir em frente. Carregando esse dever nas costas, mesmo assim, através desta escuridão... simplesmente, visando o que vem depois."
33250-46 = "......É verdade."
33250-47 = "Sim, concordo plenamente... mas, como sempre, vocês só falam coisas difíceis. Seia-chan, é por isso que você não tem amigos, sabia? Tem um pouco de autoconsciência?"
33250-48 = "......"
33250-49 = "Antes de tudo, Mika, parece que seria bom colocar um pouco de educação e dignidade nessa cabeça que parece fazer barulho demais, não é?"
33250-50 = "Hum, pessoal..."
33250-51 = "[ns] \"Bem... tecnicamente, o antigo Clube de Reposição deveria ter se formado...\""
33250-52 = "[ns] \"Ouvi dizer que um novo Clube de Reposição... ouvi falar que...\""
33250-53 = "......"
33250-54 = "......"
33250-55 = "......"
33250-56 = "......"
33250-57 = "[ns] \"Os mesmos membros, hein!?\""
33250-58 = "Ah, ahaha... É que, bem..."
33250-59 = "Participamos do show do Peroro-sama, mas na verdade era dia de prova..."
33250-60 = "Ainda não aprendemos a matéria da próxima prova."
33250-61 = "Bem, é que... eu tentei fazer a prova do terceiro ano..."
33250-62 = "Ficar sozinha sem ninguém por perto é tão solitário, não é♡"
33250-63 = "Ah, a-ah, desculpe, Sensei... parece que aconteceu de novo..."
33250-64 = "M-Mas dessa vez não tem expulsão, e a matéria da prova é normal...!"
33250-65 = "[ns] Fica tonta e desmaia."
33250-66 = "S-Sensei!?"
33250-67 = "Sensei!"
33250-68 = "O que é isso! Não precisa reagir desse jeito, né!?"
33250-69 = "Ora, o que é isso..."
33250-70 = "Ei! Você acabou de fazer uma cara de 'a oportunidade perfeita para atacar', não foi!?"
33250-71 = "Idiota, coisas safadas são proibidas!! Pena de morte!!!"
33250-72 = "......"
33250-73 = "Você continuará aprendendo muitas coisas. E continuará sempre com seus amigos."
33250-74 = "Estudando, se esforçando e descobrindo várias possibilidades."
33250-75 = "...Porque você é forte."
33250-76 = "Mesmo que tudo seja vazio, mesmo que este mundo seja sombrio e solitário..."
33250-77 = "Mesmo que seja em um canto de concreto..."
33250-78 = "......Azusa."
33250-79 = "A flor que você me mostrou naquela época... acho que agora entendo um pouco."
33250-80 = "Talvez nunca mais nos vejamos."
33250-81 = "Por favor, seja feliz."
33250-82 = "......Entendo."
33250-83 = "Aquele Sangue Real, escapou."
33250-84 = "......Capture-a. Sem feri-la, com todo o cuidado."
33250-85 = "Pode eliminar todos, exceto ela."
33250-86 = "......Sim. Quero dizer que 'destruir a halo' é permitido."