[translation]
33250-1 = "Episódio 25;Epílogo"
33250-2 = "Como ousaram, como ousaram enganar esta grandiosa Makotooo!!!"
33250-3 = "Iroha, cadê a Iroha! Prepara aquilo agora mesmo! Acham que eu vou ficar apanhando de graça……!"
33250-4 = "Você fala \"aquilo\", mas eu não faço a menor ideia do que é; e acho melhor a senhora ficar deitada mais um pouco."
33250-5 = "E, se for falar, dê antes um jeito nessa sua cabeça engraçada. Aliás, já está tudo mais ou menos resolvido."
33250-6 = "Como é…… cabeça?"
33250-7 = "Q-que é istoooo!?"
33250-8 = "Ora, é que, naquela hora, a senhora foi envolvida pelo fogo…… haa."
33250-10 = "……Como está o seu corpo, senhorita Nagisa?"
33250-11 = "Cheguei a achar que a aureola fosse se despedaçar, mas…… pelo visto, está tudo bem."
33250-12 = "Sim, por sorte…… que alívio, de verdade. Por favor, não se force."
33250-13 = "……Muito obrigada. Aliás, a sua visita, há algum assunto?"
33250-14 = "Ah, na verdade, é que…… chegou uma carta da senhorita Mika……."
33250-15 = "……E o que diz?"
33250-16 = "É, deixa ver……"
33250-18 = "Oi, oi, Nagi! Pelo que eu soube, você ficou desmaiada esse tempo todo desde que o míssil caiu, né?"
33250-19 = "Dormir tranquilinha no meio daquilo tudo; como host, é uma cena que não dá pra mostrar pra todo mundo, hein?"
33250-20 = "Bom, você sempre se esforçou tanto que eu até queria que descansasse. Só não imaginei que fosse dormir TÃO fundo assim."
33250-21 = "Já que você acordou bem, será que atende uns pedidinhos? Ficaria feliz se você voltasse logo a ser host e desse um jeito!"
33250-22 = "Primeiro: a TV daqui só pega canal comum, né? Não dá pra instalar aquele negócio que pega de tudo 24 horas?"
33250-23 = "E o meu creme de mão acabou. Eu só uso o da marca de sempre, então compra pra mim? Depois eu te falo onde vende!"
33250-24 = "E o secador de cabelo tá meio fraco. Não dá pra trocar por um mais carinho?"
33250-25 = "Ah, aproveitando, vou querer igual ao da Nagi! Você usa o modelo top daquela marca ótima, né; aquele que você trocou justo quando o cabelo melhorou. Eu sei de tudo, viu!"
33250-26 = "Ah, e mais, e mais――"
33250-28 = "……."
33250-29 = "É que…… o que fazemos? Talvez, em vez da prisão……"
33250-30 = "A alimentação da Mika, daqui pra frente, pode ser composta exclusivamente de rocambole."
33250-31 = "Sim…… siim!?"
33250-72 = "Pessoal."
33250-73 = "C-comandante……!?"
33250-74 = "Comandante!!!"
33250-75 = "……Perdão por ter sumido sem dizer nada."
33250-76 = "Buááá!! Comandanteee!!"
33250-82 = "Desculpem a demora…… com atraso, mas estou de volta."
33250-85 = "Mika……."
33250-86 = "Nagi, por que essa cara ainda? Coisa que deu certo…… bom, até que foram poucas, né."
33250-87 = "Isso é……."
33250-93 = "Porque ainda temos uma montanha de deveres não resolvidos…… não é?"
33250-94 = "S-Seia……?"
33250-95 = "Seia!?"
33250-97 = "……Olá, Nagisa, Mika."
33250-98 = "Uma reunião que não acontecia há tempos, né."
33250-99 = "Passou-se um longo tempo, e muita coisa aconteceu, mas……"
33250-100 = "já está na hora de nós conversarmos umas com as outras."
33250-101 = "O que não dissemos, o que não conseguimos dizer."
33250-102 = "E o que, na verdade, queríamos dizer."
33250-103 = "Haverá mal-entendidos, haverá o que custe a crer. Ainda que não se chegue a lugar algum…… ainda assim, só nos resta encarar esse problema improvável de provar que é o coração do outro."
33250-104 = "Todas nós precisamos seguir. Carregando esse dever nas costas, e, ainda assim, dentro desta escuridão…… mirando, apenas, o que há adiante."
33250-108 = "……Pois é."
33250-109 = "Sim, concordo muito…… mas continua só falando difícil. Seia, é por isso que você não tem amigos, sabia? Tem noção disso?"
33250-110 = "……."
33250-111 = "Primeiro, a Mika devia pôr um pouco de cultura e classe nessa cabeça oca que parece que faz barulho, né?"
33250-112 = "Ei, vocês duas……."
33250-114 = "[ns] \"É que…… o Clube de Aulas de Reforço anterior tinha se formado por completo……\""
33250-116 = "[ns] \"E eu vim porque ouvi que agora tem um Clube de Aulas de Reforço novo de novo……?\""
33250-117 = "……."
33250-118 = "……."
33250-119 = "……."
33250-120 = "……."
33250-121 = "[ns] \"São os mesmos membros!?\""
33250-123 = "A-ahaha…… é que, então……."
33250-124 = "Eu estava participando do show do senhor Peroro, mas, pelo visto, era dia de prova……."
33250-125 = "A matéria da próxima prova eu ainda não aprendi."
33250-126 = "É que…… eu tentei fazer a prova do 3º ano……."
33250-127 = "Ficar de fora sozinha é solitário demais, não é♡"
33250-128 = "A-ah, desculpa, Sensei…… acabou dando nisso de novo……."
33250-129 = "M-mas dessa vez não tem expulsão, e a matéria da prova é normal, direitinho……!"
33250-130 = "[ns] Tem uma vertigem e desmaia."
33250-132 = "S-Sensei!?"
33250-133 = "Sensei!"
33250-134 = "Q-que é isso! Não precisava reagir assim, né!?"
33250-135 = "Ora, isto é……"
33250-136 = "Ei! Você acabou de fazer uma cara de \"que conveniente, vou aproveitar a brecha\", não fez!?"
33250-137 = "Sua boba, coisa safada é proibido!! Pena de morte!!!"
33250-144 = "……."
33250-145 = "Você vai, daqui pra frente, continuar aprendendo muitas coisas. Daqui pra frente, sempre, junto das suas amigas."
33250-146 = "Vai estudar, se esforçar, e encontrar muitas possibilidades."
33250-147 = "……Porque você é forte."
33250-148 = "Mesmo que tudo seja vão, mesmo que este mundo seja escuro e solitário……"
33250-149 = "mesmo que seja num canto de concreto……."
33250-150 = "……Azusa."
33250-151 = "Aquela flor que você me mostrou naquela hora…… agora, talvez, eu a compreenda um pouco."
33250-152 = "Talvez nunca mais nos vejamos, mas."
33250-153 = "Por favor, seja feliz."
33250-166 = "……Ah, era isso."
33250-167 = "Aquele sangue real fugiu, então."
33250-168 = "……Vão capturá-la. Sem ferimentos, com todo o cuidado."
33250-169 = "Fora ela, podem processar todas as demais."
33250-170 = "……Sim. No sentido de que podem, inclusive, \"destruir as aureolas\"."
