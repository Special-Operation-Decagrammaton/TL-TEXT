[translation]
84310100702-5 = "あっ、お前は！"
84310100702-6 = "君は……！"
84310100702-7 = "生きてたんだな……うまく逃げられたみたいでよかったよ！"
84310100702-8 = "……ええっと。"
84310100702-10 = "さっきは悪かったな。こっちも必死だったんだ。"
84310100702-11 = "まっ、終わり良ければすべてよしってことで。"
84310100702-13 = "君たちも、逃げ出せたのだね。"
84310100702-14 = "でも気をつけろよ？あいつ、まだ近くにいるかもしれないからさ。"
84310100702-16 = "もし見つけたら絶対連絡しろよ！"
84310100702-21 = "あ、ああ……。"
