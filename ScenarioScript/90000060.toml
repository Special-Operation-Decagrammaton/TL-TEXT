[translation]
90000060-1 = "第7話;「データ収集（６）ケセド」"
90000060-6 = "分析完了。座標を特定しました。"
90000060-7 = "ここが軍需工場……もとい、ケセドがいる場所です。"
90000060-8 = "今から軍需工場に潜入しに行けばいいの？"
90000060-9 = "はい。ケセドの本体まで繋がるルートを設定しますので、素早く進入してケセドと接触、データを確保して退却してください。"
90000060-10 = "うん、簡単だね。"
90000060-11 = "……簡単ですか？まあ、エイミがそう言うなら、そうなのでしょうが……。"
90000060-12 = "うん。部長がサポートしてくれるし、先生もいるから。"
90000060-13 = "……そうですね。なんだかエイミが頼もしく見えてきました。これは何かの錯覚でしょうか？もしくは幻覚？"
90000060-14 = "錯覚でも幻覚でもないよ。ただの事実。部長が下水道好きなのと同じで。"
90000060-15 = "別に私は下水道好きじゃありません。事実を捻じ曲げないでください。"
90000060-16 = "[s] \"……そろそろ出発しようか。\""
90000060-20 = "……こほん。それでは、次の任務をお願いします。"
90000060-21 = "うん、じゃあ出発。"
90000060-22 = "[s] \"出発！\""
