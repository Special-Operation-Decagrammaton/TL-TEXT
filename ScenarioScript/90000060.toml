[translation]
90000060-1 = "Episódio 7;「Coleta de Dados (6) Chesed」"
90000060-6 = "Análise concluída. Coordenadas identificadas."
90000060-7 = "Este é o complexo industrial... ou melhor, o local onde Chesed está."
90000060-8 = "Então, devemos nos infiltrar no complexo industrial agora?"
90000060-9 = "Sim. Vou definir a rota que leva até o núcleo de Chesed, então entrem rapidamente, façam contato com Chesed, garantam os dados e recuem."
90000060-10 = "Sim, parece fácil."
90000060-11 = "……Fácil? Bem, se a Eimi diz que é, então deve ser……."
90000060-12 = "Sim. A Chefe vai nos dar suporte e o Sensei também está aqui."
90000060-13 = "……É verdade. De alguma forma, a Eimi parece confiável agora. Isso é uma ilusão? Ou talvez uma alucinação?"
90000060-14 = "Não é ilusão nem alucinação. É apenas um fato. Assim como o fato de que a Chefe gosta de esgotos."
90000060-15 = "Eu não gosto de esgotos. Não distorça os fatos."
90000060-16 = "[s] \"……Vamos partir logo.\""
90000060-20 = "……Ehem. Então, por favor, prossigam com a próxima missão."
90000060-21 = "Certo, então vamos partir."
90000060-22 = "[s] \"Partir!\""
