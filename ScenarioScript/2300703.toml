[translation]
2300703-1 = "Uma garota nada comum"
2300703-2 = "（Ao chegar no local que a Hanako me indicou, encontrei o depósito de esportes imediatamente.）"
2300703-3 = "（Por que será que ela ficou trancada sozinha em um lugar desses...?）"
2300703-4 = "（……？）"
2300703-5 = "（A porta do depósito está... entreaberta?）"
2300703-6 = "[s] （Tentar abrir a porta）"
2300703-8 = "（Creeeak...）"
2300703-10 = "Depósito de Esportes"
2300703-11 = "（……？）"
2300703-12 = "Ah, você veio. Sensei, aqui."
2300703-13 = "[s] \"……Hanako?\""
2300703-16 = "Olá, Sensei. Fico feliz em vê-lo."
2300703-17 = "[s] \"…….\""
2300703-19 = "[s] \"……？\""
2300703-20 = "Obrigada por ter vindo."
2300703-21 = "[s] \"……？？\""
2300703-23 = "[s] \"？？？？？？？？？？？\""
2300703-24 = "Fufu, o que houve? Seus olhos estão arregalados."
2300703-25 = "Parece que você está confuso..."
2300703-26 = "……Fufu."
2300703-27 = "Aconteceu alguma coisa?"
2300703-28 = "[s1] \"……Por que você está de roupa de banho?\"\n[s2] \"Por que está vestida assim...?\""
2300703-29 = "……？"
2300703-30 = "……？"
2300703-31 = "É uma roupa de banho... tem algum problema?"
2300703-32 = "Este é o depósito de esportes da Trinity, ou seja, literalmente o lugar usado para as aulas de \"Educação Física\"."
2300703-33 = "E o que estou vestindo agora é..."
2300703-34 = "Uma das peças designadas pela escola para as \"aulas de educação física\"... sabe? Tem algo de estranho nisso?"
2300703-35 = "E eu só estou aqui no depósito, é só isso..."
2300703-36 = "Não sei o que o Sensei está pensando, mas não acho que seja nada estranho."
2300703-37 = "Ou será que... você realmente pensou em algo \"estranho\"? Ou talvez algum \"gosto peculiar\"?"
2300703-38 = "Talvez o que o Sensei esteja pensando seja verdade, quem sabe..."
2300703-39 = "Fufu, o que você acha?"
2300703-40 = "Se quiser conferir as respostas, adoraria que o Sensei me contasse."
2300703-41 = "Quer... conferir as respostas?"
2300703-42 = "[s] \"……Por enquanto, que tal vestir seu uniforme?\""
2300703-43 = "Ora... você realmente quer que eu me troque? Sério, aqui e agora?"
2300703-44 = "Sensei... você é mais ousado do que eu pensava."
2300703-45 = "Bem, mesmo com a nossa relação, ser observada de perto enquanto tiro as peças uma a uma é um pouco..."
2300703-46 = "Mas, como é um pedido direto do Sensei... atender a ele é natural para uma aluna."
2300703-47 = "Já que é assim, vamos aproveitar e deixar você observar com calma... o quanto eu cresci..."
2300703-48 = "[s3] Sair correndo do depósito.\n[s4] \"Isso é demais para o meu psicológico, vamos parar por aqui...\""
2300703-49 = "Fufu. É brincadeira, brincadeira. Desculpe, a reação do Sensei é tão boa que eu não resisti."
2300703-50 = "Fufu. É brincadeira, brincadeira. Desculpe, a reação do Sensei é tão boa que eu não resisti."
2300703-51 = "Vamos deixar por isso mesmo. Poderia se virar de costas por um instante? Vou me trocar rapidinho."
2300703-52 = "[s5] Virar de costas e esperar.\n[s6] Virar de costas, fechar os olhos e esperar."
2300703-57 = "Hum hum~~ hum hum hum~♪"
2300703-58 = "Hmm... ah, algo prendeu... Sensei, poderia me dar uma ajudinha?"
2300703-59 = "[s7] （Imóvel como uma montanha...）"
2300703-60 = "Fufu... que insensível. Falta pouco, então espere só mais um pouco."
2300703-62 = "Sim, OK. Já pode se virar."
2300703-63 = "……Sensei?"
2300703-66 = "O que acha? Será que estou vestindo corretamente?"
2300703-68 = "Hmm-hmm~~ hmm-hmm-hmm~♪"
2300703-69 = "Ngh... Ué, algo prendeu... Sensei, poderia me ajudar um pouco?"
2300703-70 = "[s8] (Imóvel como uma montanha...)"
2300703-71 = "Fufu... Que insensível. Falta pouco, então por favor, espere."
2300703-73 = "Sim, OK. Já pode se virar."
2300703-74 = "……Sensei?"
2300703-76 = "O que acha? Será que estou vestindo corretamente?"
2300703-77 = "Fufu, graças a você, hoje também foi divertido. Vamos indo?"
2300703-78 = "[s9] \"Por acaso, foi uma brincadeira...?\"\n[s10] \"É ruim para o coração, então poderia parar de me provocar...?\""
2300703-79 = "Sinto muito, Sensei. Mas, dizer que você me ajudou não é, de certa forma, uma mentira."
2300703-80 = "Sinto muito, Sensei. Mas, dizer que você me ajudou não é, de certa forma, uma mentira."
2300703-81 = "Não sei bem como dizer, mas..."
2300703-82 = "……Poder ter esse momento de descanso é um tempo precioso para mim."
2300703-83 = "……?"
2300703-84 = "O que isso significa... você pergunta?"
2300703-85 = "Fufu, isso é segredo. Tentar forçar uma aluna a revelar seus segredos é falta de educação para um Sensei, não acha?"
2300703-86 = "Então..."
2300703-87 = "Oh?"
2300703-88 = "(Apito! Apito!!)"
2300703-90 = "Vocês dois aí! O que estão fazendo em um lugar desses!? Este é um horário de acesso proibido!"
2300703-91 = "O uso das instalações esportivas é permitido apenas durante as aulas de educação física; fora isso, é necessária a autorização do conselho estudantil!"
2300703-92 = "Além disso, aquela aluna ali... hã?"
2300703-93 = "O que é isso que você está segurando? A remoção de equipamentos é proibida――"
2300703-94 = "Ah, isso?"
2300703-95 = "Isso é..."
2300703-96 = "É o meu traje de banho que acabei de tirar, sabe?"
2300703-97 = "……."
2300703-98 = "……Hã?"
2300703-100 = "[s] \"……?\""
2300703-103 = "……!!!!!!?!!?!?"
2300703-105 = "(Correu com toda a força)"
2300703-106 = "(Depois disso, embora eu tenha voltado ao guarda após me acalmar, levou um tempo considerável para desfazer o mal-entendido)"
