[translation]
2300703-1 = "普通ではない女の子"
2300703-2 = "（ハナコに聞いた場所に着くと、すぐに体育倉庫が見つかった）"
2300703-3 = "（どうしてこんなところに、一人で閉じ込められてしまったんだろう……）"
2300703-4 = "（……？）"
2300703-5 = "（倉庫の扉が、微かに空いてる……？）"
2300703-6 = "[s] （扉を開けてみる）"
2300703-8 = "（キィィ……）"
2300703-10 = "体育倉庫"
2300703-11 = "（……？）"
2300703-12 = "あっ、来てくださったんですね。先生、こちらです。"
2300703-13 = "[s] \"……ハナコ？\""
2300703-16 = "こんにちは、先生。お会いできて嬉しいです。"
2300703-17 = "[s] \"……。\""
2300703-19 = "[s] \"……？\""
2300703-20 = "来ていただいてありがとうございます。"
2300703-21 = "[s] \"……？？\""
2300703-23 = "[s] \"？？？？？？？？？？？\""
2300703-24 = "ふふっ、どうしたんですか。お目々がまん丸になってますよ？"
2300703-25 = "なんだか戸惑われているようですが……。"
2300703-26 = "……ふふっ。"
2300703-27 = "どうかなさいましたか？"
2300703-28 = "[s1] \"……どうして水着に？\"\n[s2] \"どうしてそんな格好を……？\""
2300703-29 = "……？"
2300703-30 = "……？"
2300703-31 = "水着ですが……何か問題でも？"
2300703-32 = "ここはトリニティの体育倉庫、つまり文字通り、「体育」の授業で使う場所です。"
2300703-33 = "そして今私が着ているのは……"
2300703-34 = "学校で指定されている「体育の授業で着るもの」の一つ……ですよ？何かおかしいことでもありますか？"
2300703-35 = "そして私はただ、こうして倉庫にいるというだけ……。"
2300703-36 = "先生が何をお考えになっているかは分かりませんが、特に変なことではないと思いますよ。"
2300703-37 = "それとも……何か本当に「変なこと」でもお考えになりましたか？あるいは何か「変な趣味」とか？"
2300703-38 = "もしかしたら、先生のお考えの通りかもしれませんが……。"
2300703-39 = "ふふっ、どう思います？"
2300703-40 = "答え合わせをされたいのであれば、ぜひ先生の方から教えていただきたいですね。"
2300703-41 = "答え合わせ……してみますか？"
2300703-42 = "[s] \"……とりあえず制服に着替えよう？\""
2300703-43 = "あら……本当に着替えても良いのですか？本当に、今ここで？"
2300703-44 = "先生……思っていた以上に大胆なのですね。"
2300703-45 = "ただ、いくら私と先生の間柄とはいえ、少しずつ脱いでいくところを間近で見られてしまうのはちょっと……。"
2300703-46 = "ですが、先生直々のお願いですし……それに応えるのも生徒としては当然のこと。"
2300703-47 = "であればせっかくですし、じっくり見ていただきましょうか……私が、どれくらい成長しているのか……"
2300703-48 = "[s3] ダッシュで倉庫から出る。\n[s4] \"いくら何でも精神がすり減るから、この辺で……。\""
2300703-49 = "ふふっ。冗談ですよ、冗談。すみません、先生の反応が良くってつい。"
2300703-50 = "ふふっ。冗談ですよ、冗談。すみません、先生の反応が良くってつい。"
2300703-51 = "このくらいにしておきましょうか。では、少しだけ後ろを向いておいていただけませんか？すぐに着替えてしまいますので。"
2300703-52 = "[s5] 後ろを向いて待つ。\n[s6] 後ろを向いて目を瞑って待つ。"
2300703-57 = "ふんふん～～ふんふふん～♪"
2300703-58 = "んっ……あれ、何か引っかかって……先生、少し手伝っていただけませんか？"
2300703-59 = "[s7] （動かざること山の如し……）"
2300703-60 = "ふふっ……つれないですね。もう少しですので待っていてください。"
2300703-62 = "はい、OKです。もう振り向いても大丈夫ですよ。"
2300703-63 = "……先生？"
2300703-66 = "いかがでしょう、ちゃんと着られているでしょうか？"
2300703-68 = "ふんふん～～ふんふふん～♪"
2300703-69 = "んっ……あれ、何か引っかかって……先生、少し手伝っていただけませんか？"
2300703-70 = "[s8] （動かざること山の如し……）"
2300703-71 = "ふふっ……つれないですね。もう少しですので待っていてください。"
2300703-73 = "はい、OKです。もう振り向いても大丈夫ですよ。"
2300703-74 = "……先生？"
2300703-76 = "いかがでしょう、ちゃんと着られているでしょうか？"
2300703-77 = "ふふっ、おかげで今日も楽しかったです。そろそろ出るとしますか？"
2300703-78 = "[s9] \"もしかして、いたずらだった……？\"\n[s10] \"心臓に悪いからあんまり揶揄わないでもらえると……。\""
2300703-79 = "すみません、先生。ですが、先生に助けていただいた、というのはある意味嘘ではありません。"
2300703-80 = "すみません、先生。ですが、先生に助けていただいた、というのはある意味嘘ではありません。"
2300703-81 = "何といえば良いのか分かりませんが……"
2300703-82 = "……こういう息抜きをさせてもらえるのは、私にとって大切な時間でして。"
2300703-83 = "……？"
2300703-84 = "どういう意味か……ですか？"
2300703-85 = "ふふっ、それは内緒です。生徒の秘密を無理に聞き出そうとするのは、先生としてマナー違反ですよ？"
2300703-86 = "それでは……"
2300703-87 = "あら？"
2300703-88 = "（ピーッ！ピーッ！！）"
2300703-90 = "そこの二人！こんなところで何をしているんですか！？今は出入り禁止の時間帯ですよ！"
2300703-91 = "体育施設の使用は体育の授業がある時のみ、それ以外の場合は生徒会の許可が必要です！"
2300703-92 = "それに、そこの生徒さ……ん？"
2300703-93 = "それは、何を持っているのですか？備品の持ち出しは禁止されて――"
2300703-94 = "ああ、これですか？"
2300703-95 = "これは……"
2300703-96 = "ちょうど今脱いだばかりの、私の水着ですよ？"
2300703-97 = "……。"
2300703-98 = "……え？"
2300703-100 = "[s] \"……？\""
2300703-103 = "……っ！！！！！？！！？！？"
2300703-105 = "（全力で走った）"
2300703-106 = "（その後、冷静になってから警備員さんの元に戻ったものの、誤解を解くのにかなりの時間を要した）"
