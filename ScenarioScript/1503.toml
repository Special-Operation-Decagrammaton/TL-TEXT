[translation]
1503-1 = "Trouble & Trackers（３）"
1503-2 = "ヴェリタス・ハッカー休憩所"
1503-4 = "コードインジェクションによる悪性の命令を確認、バックドアが作られました。"
1503-5 = "あ、またそれとは別の経路からハッキングが……。"
1503-7 = "ハレ先輩助けて！どうにかして～！"
1503-8 = "私は万能猫型ロボットじゃないんだから、どうにかしてって言われても……。"
1503-9 = "でもこのままだと学籍データを修正するどころか、こっちのPCまで乗っ取られちゃう！"
1503-10 = "あたしの力じゃ到底無理！お願い、助けて～！"
1503-14 = "はぁ、仕方ない。防御コードを組むのは専門分野じゃないけど、試しにちょっとだけやってみようか……。"
1503-19 = "パケットの中身を偽装して、間違った経路に進入するように誘導すれば……え？もう防がれた？"
1503-23 = "じゃあ、攻撃が予想されるフォルダに論理爆弾を仕込んで過負荷を誘導……これも？"
1503-28 = "うーん、困った。私の力でも、これは難しいかも……。"
1503-29 = "そ、そんな！あのハレ先輩がハッキングで苦戦するなんて！？"
1503-30 = "まるでこっちの行動を予想してるみたいに、全部のパターンに対してリアルタイムで対応されてる。"
1503-31 = "こんな実力者がヴェリタス以外にもいたなんて、信じがたいね。"
1503-32 = "ハレ。接続遅延のせいで、どんどんトラフィックが増えています。"
1503-33 = "これ以上は、こちらの正体がセミナーにバレる恐れが……。"
1503-34 = "その通りだね。#nマキ、今回ばかりは残念だけど、学籍データの記録を修正するのは諦めよう。"
1503-36 = "うう……仕方ない。セミナーに呼び出されて小言を言われるのは嫌だし……。"
1503-37 = "接続終了。ハレ先輩も、ドローンを撤収させて。"
1503-38 = "＜SYSTEM＞ログを削除中……システムを終了します。"
1503-40 = "（事件当日の夕方……）"
1503-44 = "ただいま。"
1503-45 = "あ、久しぶり、先輩……。"
1503-46 = "……何かあった？どうしてみんなして、そんなに元気ないの？"
1503-47 = "自分の限界をあらためて感じたというか……。"
1503-48 = "世界は広く、実力者は多いです……。"
1503-50 = "午前中にハッキングをしてたら、途中から知らないハッカーに逆襲されちゃって。"
1503-51 = "ハレ先輩まで一瞬でやられちゃった。#nまさかヴェリタス以外にあんな実力者がいるなんて……。"
1503-52 = "ほんと？ハレですらお手上げの実力者だなんて、それはすごいね……。"
1503-53 = "それより「知らないハッカー」で思い出したけど、私もさっき学籍データのサーバーを点検してたらすごいのに出くわしたよ。"
1503-54 = "何でか分からないけど、身体測定の記録だけをしつこく取ろうとするハッカーだった。対応がとんでもない速さで、危うく私もやられるところだったよ。"
1503-55 = "……ん？学籍データのサーバー？"
1503-56 = "じゃあまさか、さっき私たちが戦った相手は……。"
1503-57 = "副部長だった、ということですか？"
1503-59 = "……え？まさかさっき学籍データをハッキングして、あの騒ぎを起こしたのって……あんたたち？"
1503-60 = "はぁ、なーんかどこかで見た手口だと思ってたら……。"
1503-61 = "私たちは最初から、勝ち目のない戦いをしていたのですね。"
1503-62 = "顔も知らないハッカーに負けたなら悔しかったけど、相手がヴェリタスの副部長なら仕方ないね。"
1503-63 = "そ、そうだね！あたしたちヴェリタスを越える有能なハッカーなんていないってことが証明されて、良かった良かった！"
1503-65 = "良くないっ！！#nあんたたち、他人の個人情報をなんだと思ってるの？"
1503-69 = "こうなったらあらためて、その身体に厳しくハッカー倫理を教え込んであげないとね……ほら、早くこっち来て！"
1503-70 = "それはやだぁ！？先輩ごめんなさい、許してえぇぇー！"
1503-72 = "ミレニアム・校舎内廊下"
1503-73 = "（事件から数日後……。）"
1503-77 = "あの人が噂の……？"
1503-78 = "ええ、前回の身体測定で体重が100kgなことが判明したっていう、会計のユウカね。"
1503-79 = "ぱっと見、そんなに太ってるようには見えないけど……なにか特殊な装備でも付けてるのかな？"
1503-80 = "もしかしたら「痩せてる状態のイメージ映像」を、身体の上からホログラムで映しているのかもしれないわ！"
1503-81 = "……そんなわけないでしょう！？そんな無駄な装備を開発する時間があったら、最初から運動してるわよ！"
1503-82 = "この前の情報は嘘だって、すぐ告知を出したのに！どうして日に日に噂が大きくなっていくわけ！？"
1503-87 = "ああもう！一体犯人は誰なのよ、捕まえたら許さないんだからっ！！！"
1503-88 = "Trouble & Trackers"
