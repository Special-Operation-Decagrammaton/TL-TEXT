[translation]
1013805-1 = "Eu vou te dar isso!"
1013805-2 = "(Ao ir para Wild Hunt...)"
1013805-5 = "Ah, professora."
1013805-6 = "Ele realmente veio."
1013805-7 = "Como você está ultimamente?"
1013805-8 = "De repente você tem problemas para dormir ou sente calafrios inexplicáveis?"
1013805-9 = "[s] \"Nada de especial. O que há de errado?\""
1013805-10 = "Por precaução... só para ter certeza, acabei de perguntar."
1013805-11 = "Meus idosos eram tão barulhentos que algo assim poderia acontecer se eles encontrassem um fantasma..."
1013805-12 = "Suspiro... eu me pergunto por que isso aconteceu."
1013805-13 = "Bem, tudo bem. Sim, eu vou te dar isso."
1013805-19 = "Um encanto que fiz."
1013805-20 = "Achei que poderia comprar um, mas disseram que eu mesmo teria que fazer..."
1013805-21 = "Na verdade, não sei se seria eficaz se eu fizesse isso, pois não acredito no ocultismo. #nBem, é melhor que nada."
1013805-22 = "Pegue."
1013805-23 = "[s] \"Está incrivelmente acabado!? Você também sabe bordar?\""
1013805-24 = "É óbvio, não é? Estou no departamento de moda?"
1013805-25 = "[s] \"Estou tão feliz! Vou adorar!\""
1013805-29 = "[ns] \"Não sei como agradecer... mas você gostaria de comer algo delicioso?\""
1013805-30 = "imagem?Luxo do professor?"

1013805-31 = "Yay♪#nEu só queria fazer um lanche."
1013805-32 = "[s] \"Crepe de chocolate e banana?\""
1013805-33 = "...Como você sabia?"
1013805-34 = "Você não come isso o tempo todo, não é?"
1013805-35 = "Bem, aconteceu de eu querer comê-lo! ! ? ?"
1013805-36 = "[s1] \"Ok, ok. Vamos então.\"\n[s2] \"Eu só queria comer algo doce também.\""

1013805-39 = "Você também gosta de crepe de banana com chocolate?"
1013805-40 = "[s] \"Eu te amo!\"\"\n1013805-45 = \"Você não está tirando sarro de mim.\"\n1013805-46 = \"Bem, ok... vamos rápido.\"\n1013805-51 = \"(Quando eu estava prestes a entrar em uma loja próxima...)\"\n1013805-57 = \"(pisei em chiclete...)\"\n1013805-58 = \"Ugh... isso é um pedaço enorme de chiclete.\"\n1013805-60 = \"(remove rapidamente a goma)\"\n1013805-61 = \"[ns] \"Ok... vamos para a loja.\"\"\n1013805-65 = \"O que foi desta vez! ?\"\n1013805-66 = \"[ns5] (De repente o vidro da porta quebrou)\n[ns6] \"E-eu empurrei suavemente...!?\"\"\n1013805-69 = \"Oh...? Esta é uma porta de \"puxar\".\"\n1013805-70 = \"Você poderia me compensar?\"\n1013805-71 = \"[s] \"S-me desculpe!\"\"\n1013805-73 = \"(Depois de pagar a indenização, tento pedir um crepe de chocolate e banana)\"\n1013805-74 = \"(Estava esgotado pouco antes da nossa vez...)\"\n1013805-75 = \"(...saí do café me sentindo impotente)\"\n1013805-80 = \"(E no caminho para casa, pisei numa casca de banana e caí.)\"\n1013805-82 = \"Não há algumas coisas ruins acontecendo hoje? O que aconteceu?\"\n1013805-87 = \"Sensei, por favor, mostre-me o amuleto de antes. Algo não está certo.\"\n1013805-92 = \"Ah! !\"\n1013805-93 = \"[ns] \"O que há de errado?\"\"\n1013805-94 = \"Ei, esqueci de colocar o conteúdo...! #nTalvez seja porque ganhei muito de uma vez...\"\n1013805-95 = \"Achei estranho! #nO pior... É por isso que é assim...\"\n1013805-96 = \"[s] \"Você acredita em amuletos?\"\"\n1013805-97 = \"Não, não! Mas esse não é o caso!\"\n1013805-98 = \"Huh, só pensei que talvez tivesse lhe dado algo incompleto.\"\n1013805-99 = \"Espere um momento, vou pegar algo adequado para você!\"\n1013805-104 = \"(depois de um tempo......)\"\n1013805-109 = \"Sim, isso...! Tudo bem! Pegue!\"\n1013805-115 = \"(Definitivamente havia algo dentro, mas eu não sabia o que havia dentro.)\"\n1013805-116 = \"Estou lhe dizendo, você não deveria olhar para dentro.\"\n1013805-117 = \"O amuleto perde eficácia no momento em que você o abre.\"\n1013805-118 = \"Ah, você entendeu? Nunca abra!\"\n1013805-119 = \"[s] \"Sim, eu entendo.\""

1013805-124 = "(Quando entrei em outra loja de doces com Lena...)"
1013805-125 = "(Crepes de chocolate e banana eram vendidos lá.)"
1013805-126 = "(Aparentemente é novo)"
1013805-128 = "Pois bem, vamos lá!"
1013805-134 = "(Talvez este seja um sinal de uma pequena felicidade.)"
