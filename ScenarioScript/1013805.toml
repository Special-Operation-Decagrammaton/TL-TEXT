[translation]
1013805-1 = "これあげる！"
1013805-2 = "（ワイルドハントへ向かうと……）"
1013805-5 = "あ、先生。"
1013805-6 = "本当に来てくれたんだ。"
1013805-7 = "最近調子はどう？"
1013805-8 = "突然眠れなくなったとか、原因不明の寒気を感じるとか、ない？"
1013805-9 = "[s] \"特になにもないよ。どうかしたの？\""
1013805-10 = "一応……念のため、聞いただけ。"
1013805-11 = "先輩たちが、幽霊と会ったらそういうことがあるかもしれないーってうるさくて……。"
1013805-12 = "はぁ……もう、なんでこんなことになったんだか。"
1013805-13 = "まぁいいわ。はい、これあげる。"
1013805-19 = "私が作ったお守り。"
1013805-20 = "適当に買えばいいかなって思ったんだけど、自分で作らなきゃダメって言うからさ……。"
1013805-21 = "というか、オカルトを信じてない私が作って効果があるのかは分からないけど。#nまあないよりマシでしょ。"
1013805-22 = "持ってて。"
1013805-23 = "[s] \"すごい完成度だね！？刺繍もできるんだ？\""
1013805-24 = "当たり前でしょ。私は服飾科よ？"
1013805-25 = "[s] \"すごく嬉しい！大事にするね！\""
1013805-29 = "[ns] \"お礼といってはなんだけど……何か美味しいものでも食べに行く？\""
1013805-30 = "え？先生の奢り？"
1013805-31 = "やった♪#nちょうどおやつ食べたかったのよね。"
1013805-32 = "[s] \"チョコバナナクレープとか？\""
1013805-33 = "……な、何で分かったの？"
1013805-34 = "いつも食べてるわけじゃないのよ？"
1013805-35 = "た、たまたま食べたくなっただけだから！！？？"
1013805-36 = "[s1] \"はいはい。それじゃあ行こうか。\"\n[s2] \"私もちょうど甘いものが食べたかったんだ。\""
1013805-39 = "先生もチョコバナナクレープ、好きなの？"
1013805-40 = "[s] \"好きだよ！\""
1013805-45 = "私のことからかってるわけじゃないわよね。"
1013805-46 = "まあいいわ……早く行きましょ。"
1013805-51 = "（近くの店に入ろうとしたその時……）"
1013805-57 = "（ガムを踏んでしまった……）"
1013805-58 = "うげ……でっかいガムだね。"
1013805-60 = "（急いでガムを剥がす）"
1013805-61 = "[ns] \"よし……お店入ろっか。\""
1013805-65 = "こ、今度はなに！？"
1013805-66 = "[ns5] （突然ドアのガラスが割れた）\n[ns6] \"そ、そっと押したのに……！？\""
1013805-69 = "おや……？こちらは「引く」ドアですよ。"
1013805-70 = "こちら、弁償していただいても？"
1013805-71 = "[s] \"す、すみませんでした！\""
1013805-73 = "（弁償を終え、チョコバナナクレープを注文しようとすると）"
1013805-74 = "（自分たちの順番の直前で売り切れてしまった……）"
1013805-75 = "（……やるせない気持ちでカフェを後にし）"
1013805-80 = "（そして帰り道ではバナナの皮を踏んで転んでしまった）"
1013805-82 = "なんか今日、悪い事続きじゃない？どうしたんだろ。"
1013805-87 = "先生、さっきのお守りちょっと見せて。なにか変。"
1013805-92 = "あーーっ！！"
1013805-93 = "[ns] \"どうしたの？\""
1013805-94 = "な、中身入れ忘れちゃった……！#n一度にたくさん作ったからかも……。"
1013805-95 = "なんか変だとおもったのよ！#n最悪……だからあんな……。"
1013805-96 = "[s] \"お守りのことは信じてるんだ？\""
1013805-97 = "い、いや！そういうわけじゃないけど！"
1013805-98 = "ふ、不完全なものをあげちゃったのかもって思っただけ。"
1013805-99 = "ちゃんとしたやつ取ってくるから、ちょっと待ってて！"
1013805-104 = "（しばらくして……）"
1013805-109 = "はい、これ……！これなら大丈夫だから！持ってって！"
1013805-115 = "（たしかに何かが入っていたけど、中身までは分からなかった）"
1013805-116 = "言っとくけど、中身は見ちゃダメだからね。"
1013805-117 = "お守りは開けた瞬間効果がなくなっちゃうんだから。"
1013805-118 = "わ、分かった？絶対開けちゃダメだからね！"
1013805-119 = "[s] \"うん、分かった。\""
1013805-124 = "（ダメもとでレナと他のスイーツ店に入ってみると……）"
1013805-125 = "（そこでは、チョコバナナクレープが売られていた）"
1013805-126 = "（どうやら新作らしい）"
1013805-128 = "それじゃ、いっただきまーす！"
1013805-134 = "（もしかするとこれが、小さな幸せの予兆なのかもしれない）"
