[translation]
2600402-1 = "Garota que ama livros"
2600402-2 = "Bom dia, Sensei! Você realmente veio."
2600402-3 = "Eu sei que fui eu quem te chamei, mas eu sabia que você estava ocupado... então, obrigada, fico muito feliz."
2600402-4 = "Desculpe por te convidar para um lugar que não é exatamente apropriado para receber visitas."
2600402-5 = "Ah... perdão, será que podemos baixar um pouco o tom de voz? Como pode ver, todos estão lendo..."
2600402-6 = "Esta biblioteca é bem grande, então conversar em voz baixa não é um problema. A estrutura também não deixa o som ecoar muito."
2600402-7 = "É só por precaução, sabe? Obrigada, hehe."
2600402-8 = "Já que você se deu ao trabalho de vir, gostaria de pegar algum livro emprestado?"
2600402-9 = "Eu vou escolher as melhores recomendações para você!"
2600402-10 = "Que tipo de gênero você gosta, Sensei? Romances, biografias, ou talvez algo de não-ficção? Temos até revistas científicas..."
2600402-11 = "[s1] \"Estou com vontade de ler um romance relaxante.\"\n[s2] \"Queria ler algo como um livro de culinária ou um guia de viagem.\""
2600402-12 = "Entendo... exatamente o que eu esperava! Então, deixe comigo!"
2600402-13 = "Entendo... exatamente o que eu esperava! Então, deixe comigo!"
2600402-14 = "Bem... nesse caso, por aqui..."
2600402-15 = "...? Que barulheira é essa?"
2600402-19 = "Ahihahaha! Isso é hilário! Ahahahaha!! Ah, ah, ah, ai, minha barriga!! Ahihahaha!!"
2600402-21 = "...Ah? O que você está olhando, seu idiota? Algum problema? Sabe que eu sou um cliente, né?"
2600402-22 = "Ah, esse salgadinho é bom... nham nham, croc, croc... ah, caiu. Tanto faz, deve ter alguém pra limpar isso."
2600402-26 = "..."
2600402-27 = "Espere um momento, Sensei. Como bibliotecária, não posso deixar isso passar em branco."
2600402-29 = "Com licença, você aí."
2600402-30 = "Ah? O quê, eu?"
2600402-31 = "Sim, você. Este é um local público, poderia respeitar as regras de convivência?"
2600402-32 = "Não estou dizendo para não falar nada, mas o seu comportamento é inaceitável."
2600402-33 = "Para começar, é proibido trazer comida. Bebidas só são permitidas em recipientes fechados que possam ser consumidos com canudo."
2600402-34 = "Não incomode as outras pessoas!"
2600402-35 = "Fala sério... que pessoa chata... e olha que eu vim até essa biblioteca só pra ler um pouco!"
2600402-36 = "Vem cá então, vou te mostrar. Gente como você só aprende levando uma lição."
2600402-38 = "Amassado"
2600402-39 = "...!"
2600402-40 = "...Agora."
2600402-41 = "...O que você acabou de fazer?"
2600402-42 = "Não quero acreditar nisso, mas... você dobrou a página do livro?"
2600402-43 = "Hã? É claro que dobrei, senão eu ia esquecer onde parei de ler."
2600402-45 = "...O respeito pelo livro,"
2600402-48 = "é inexistente!!!!"
2600402-50 = "PÁ!!!!!"
2600402-51 = "...!?!?"
2600402-52 = "Ai, ah... agora...? Eh...? Minha visão, o mundo... ficou cinza..."
2600402-53 = "Ah, a cerimônia de entrada do primário... festa de aniversário... memórias..."
2600402-54 = "Ué? ...Um rio? Quem é? Do outro lado... vovô...?"
2600402-55 = "...Ah!? O que... a quina do livro bateu na minha cabeça...?"
2600402-58 = "Você teve várias atitudes problemáticas, mas danificar um livro é algo que eu jamais perdoarei!"
2600402-59 = "Não saber nem o valor de um livro! Parece que você precisa de uma educação..."
2600402-60 = "Incluindo o custo do livro que você dobrou, não vou deixar barato... prepare-se!"
2600402-61 = "Ai, minha cabeça... finalmente a visão voltou..."
2600402-62 = "E outra, se eu tivesse dado um passo em falso, eu teria morrido! Eu vi minha vida passar diante dos olhos!?"
2600402-63 = "As pessoas não morrem tão facilmente assim. Este livro é feito de um material resistente e eu controlei a força."
2600402-64 = "Não é esse o problema! Que tipo de pessoa é você!? Você é mesmo uma bibliotecária!?"
2600402-65 = "Sua...! Droga, agora é a minha vez, toma isso!!"
2600402-69 = "Vrum!!"
2600402-70 = "[ns] \"Shimiko!\""
2600402-74 = "Pá"
2600402-75 = "……Hã?"
2600402-76 = "E? Não pode ser……?"
2600402-77 = "Ela parou o soco com uma mão só……?"
2600402-78 = "……Você consegue entender o conteúdo completo de um livro apenas olhando a capa?"
2600402-79 = "Qualquer pessoa que leia livros sabe disso. Não pense que pode me subestimar só porque sou uma bibliotecária."
2600402-80 = "Você sabe quantos livros uma bibliotecária carrega por dia, ou quantos ela consegue segurar de uma vez?"
2600402-82 = "Mesmo apenas em força bruta, eu não perderia para alguém como você."
2600402-83 = "O, hã……!? E-estou flutuando!?"
2600402-84 = "U, ué!? M-me coloca no chão! Eu disse para me colocar no chão!"
2600402-85 = "……Ufa."
2600402-86 = "Eu adoraria te arremessar agora mesmo, mas o barulho chamaria muita atenção, então vou evitar."
2600402-87 = "Vou deixar passar só desta vez, entendeu?"
2600402-88 = "E-entendi, já entendi! De agora em diante eu vou……."
2600402-90 = "Vou tomar cuidado……"
2600402-91 = "……Como se eu fosse dizer isso! Até mais!!!!"
2600402-93 = "……."
2600402-95 = "……?"
2600402-96 = "……E, hã? Quando foi que ela……!?"
2600402-97 = "Ufa……."
2600402-98 = "Por que será que tenho que repetir a mesma coisa tantas vezes……."
2600402-99 = "Você sabe qual é o trabalho de uma bibliotecária?"
2600402-100 = "Você tem ideia de quantos quilômetros uma bibliotecária percorre por dia para devolver todos os livros emprestados?"
2600402-101 = "Mover-se rapidamente sem fazer barulho é uma habilidade que qualquer bibliotecária possui."
2600402-102 = "Atender com um sorriso também é natural para uma bibliotecária, mas como você não mostra nenhum sinal de arrependimento……."
2600402-103 = "Parece difícil continuar sorrindo."
2600402-104 = "Iiiih!? V-você está sorrindo! É assustador, não venha para cá com esse sorriso!"
2600402-106 = "N-não se aproxime……! Não venha!"
2600402-109 = "U, uaaaaaah, mmmph!!"
2600402-110 = "(No fim, aquele aluno delinquente foi \"educado\" por Shimiko sem nem conseguir soltar um grito)"
2600402-112 = "(Algum tempo depois……)"
2600402-113 = "……Ufa. Às vezes aparecem pessoas assim……."
2600402-114 = "Desculpe, Sensei. Fui eu quem convidei, mas acabei mostrando algo desagradável."
2600402-115 = "Na verdade, eu queria ter mostrado um lado mais calmo, ou talvez mais intelectual……."
2600402-116 = "[s3] \"Não, você parecia uma guardiã do conhecimento.\"\n[s4] \"Foi intelectual (?) e muito legal, Shimiko.\""
2600402-117 = "……!"
2600402-118 = "……!"
2600402-119 = "Q-que elogio……."
2600402-120 = "……Fufu."
2600402-121 = "Não, mas fico feliz que o Sensei tenha dito isso."
2600402-122 = "Obrigada, Sensei. Demorou um pouco, mas agora, por favor, fique à vontade!"
2600402-124 = "(Depois disso, passei o tempo relaxando enquanto lia o livro que Shimiko me recomendou)"
2600402-125 = "(……Ainda bem que o café que trouxe hoje estava em um copo com tampa e canudo)"
