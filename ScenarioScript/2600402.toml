[translation]
2600402-1 = "本好きの少女"
2600402-2 = "おはようございます、先生！本当に来てくださったんですね。"
2600402-3 = "私から呼んでおいてなんですが、お忙しいのは知っていましたので……ありがとうございます、嬉しいです。"
2600402-4 = "招待したのに、おもてなしができるような場所でなくてごめんなさい。"
2600402-5 = "あっ……すみません、ちょっとだけ声のトーンを下げましょうか？みなさん本を読んでいるので……。"
2600402-6 = "この図書館はすごく広いので、小声のお話でしたら大丈夫です。構造的にも、それほど響きませんので。"
2600402-7 = "あくまでも念のため、ですが。ありがとうございます、ふふっ。"
2600402-8 = "それではせっかく来ていただきましたし、何か本でも借りていかれますか？"
2600402-9 = "私が全力でお勧めの本を選びますので！"
2600402-10 = "先生はどんなジャンルのものが好きですか？小説とか自伝とか、それとも非文学の方でしょうか？科学雑誌とかもありますし……。"
2600402-11 = "[s1] \"のんびり小説でも読みたい気分かな。\"\n[s2] \"料理本とか、旅行ガイドみたいなのが読みたいな。\""
2600402-12 = "なるほど……解釈一致です！では、私にお任せください！"
2600402-13 = "なるほど……解釈一致です！では、私にお任せください！"
2600402-14 = "えっと……それでしたらこちらの方に……。"
2600402-15 = "……？何の騒ぎでしょう？"
2600402-19 = "あひゃひゃひゃひゃ！これめっちゃウケる！あははははっ！！あはっ、はっ、ひー、お腹いてぇ！！あっひゃひゃひゃ！！"
2600402-21 = "……あぁん？なに見てんだこの野郎。なんか用でもあんのか、あん？こちとら客だぞ？"
2600402-22 = "あーお菓子うま……モグモグ、パリパリ……あ、こぼれた。まあいいか、掃除の人いんだろ。"
2600402-26 = "……。"
2600402-27 = "ちょっと待っていてくださいね、先生。これは司書として黙って見過ごせません。"
2600402-29 = "ちょっと、そこの方。"
2600402-30 = "あん？なに、私？"
2600402-31 = "はい。あなたです。ここは公共の場ですので、マナーは守っていただけますか？"
2600402-32 = "一切喋らないでくださいとは言いません、ですがあなたの言動は目に余ります。"
2600402-33 = "そもそも食べ物の持ち込みは禁止です、飲み物もちゃんと密閉容器に入っていてストローなどで飲めるものしか許されていません。"
2600402-34 = "他の方々に迷惑をかけないでください！"
2600402-35 = "ったく……頭の固そうなやつが……せっかくこうやってしゅしょーに本を読みに来てやったのにさぁ！"
2600402-36 = "おら来いよ、相手してやっから。あんたみてえのは一回痛い目見ないとわかんねえだろ。"
2600402-38 = "グシャ"
2600402-39 = "……！"
2600402-40 = "……今。"
2600402-41 = "……今、何をしましたか？"
2600402-42 = "まさかとは思いますが……本の頁を折りましたか？"
2600402-43 = "はぁ？そりゃそうだろ、どこまで読んでたか分かんなくなるだろうが。"
2600402-45 = "……本への礼儀が、"
2600402-48 = "なってませんっっっ！！！！"
2600402-50 = "ガッ！！！！！！！"
2600402-51 = "……！？！？"
2600402-52 = "ぐ、ぁ……今……？え……？視界、世界が……灰色に……。"
2600402-53 = "う、小学校の入学式……お誕生日会……思い出……。"
2600402-54 = "あれ？……川？誰？向こう側から……おじいちゃん……？"
2600402-55 = "……はっ！？な、何が……本の角が、頭に当たって……？"
2600402-58 = "色々と問題行動だらけでしたが、本を傷つけることだけは絶対に許しません！"
2600402-59 = "本の価値も知らないなんて！あなたには教育が必要みたいですね……。"
2600402-60 = "折った本の弁償代も含めて、タダでは済ましません……覚悟しなさい！"
2600402-61 = "う、頭いった……ようやく視界が……。"
2600402-62 = "ってか一歩間違えれば死ぬとこだっただろうが！走馬灯見えたぞ！？"
2600402-63 = "そんな簡単に人は死にません。この本もこれくらいではびくともしない素材ですし、ちゃんと力も調整しました。"
2600402-64 = "そういう問題じゃねえよ！何だこいつ！？本当に司書なのか！？"
2600402-65 = "こんの……！くそっ、今度はこっちの番だ、くらえっ！！"
2600402-69 = "ブォンッ！！"
2600402-70 = "[ns] \"シミコっ！\""
2600402-74 = "パシッ"
2600402-75 = "……は？"
2600402-76 = "え？嘘だろ……？"
2600402-77 = "拳を、片手で受け止めた……？"
2600402-78 = "……あなたは表紙だけで、本の中身が完璧に分かりますか？"
2600402-79 = "本を読む人なら、誰でも知っていることです。図書館の司書だからといって、舐めてもらっては困ります。"
2600402-80 = "司書が一日に何冊の本を運んでいるのか、一度に何冊持っているのかご存知ですか？"
2600402-82 = "ただの腕力だけでも、あなたみたいな人に負けたりしません。"
2600402-83 = "な、は……！？う、浮いてる！？"
2600402-84 = "う、うわっ！？お、降ろして！降ろしてってば！"
2600402-85 = "……ふう。"
2600402-86 = "このまま投げ飛ばしてしまいたいところですが、音が響きそうなので止めておきます。"
2600402-87 = "見逃すのは今回だけですよ、分かりましたね？"
2600402-88 = "わ、分かった、分かったから！これからはちゃんと……。"
2600402-90 = "ちゃんと注意して……"
2600402-91 = "……なーんて言うとでも思ったか！じゃあね！！！！"
2600402-93 = "……。"
2600402-95 = "……？"
2600402-96 = "……え、は？いつの間に……！？"
2600402-97 = "ふう……。"
2600402-98 = "どうしてこう何度も同じようなことを言わないといけないのでしょうか……。"
2600402-99 = "あなたは、図書館の司書の仕事内容を知ってますか？"
2600402-100 = "図書館の司書が貸し借りされたすべての本を戻すために、一日にどれぐらいの距離を移動してると思いますか？"
2600402-101 = "音を出さずに素早く移動するなんて、司書でしたら誰でも持っているスキルです。"
2600402-102 = "笑顔で対応するのも司書としては当然のことなのですが、反省の色も見えませんし……。"
2600402-103 = "これ以上、笑顔でいることは難しそうです。"
2600402-104 = "ひっ！？わ、笑ってるじゃん！怖いからそんな笑顔のままこっち来ないで！"
2600402-106 = "ち、近づくな……！来るなっ！"
2600402-109 = "う、うわああムグッ！！"
2600402-110 = "（結局、その不良生徒は悲鳴すら出せない状態のまま、シミコに「教育」された）"
2600402-112 = "（しばらくして……）"
2600402-113 = "……ふう。ああいう方、時々いるんですよね……。"
2600402-114 = "すみません、先生。私から誘ったのに、変なところを見せてしまいました。"
2600402-115 = "本当はこう、もっと落ち着いたというか、知的な側面をお見せしたかったのですが……。"
2600402-116 = "[s3] \"ううん、知識の守護者って感じだった。\"\n[s4] \"知的（？）でかっこよかったよ、シミコ。\""
2600402-117 = "……！"
2600402-118 = "……！"
2600402-119 = "そ、そんなお世辞を……。"
2600402-120 = "……ふふっ。"
2600402-121 = "いえ、でも先生にそう言っていただけると嬉しいです。"
2600402-122 = "ありがとうございます、先生。時間がかかってしまいましたがあらためて、ゆっくりしてくださいね！"
2600402-124 = "（その後、シミコが薦めてくれた本を読みながらのんびり過ごした）"
2600402-125 = "（……今日持ってきてたコーヒー、ちゃんと封がされたストロー式のもので良かった）"
