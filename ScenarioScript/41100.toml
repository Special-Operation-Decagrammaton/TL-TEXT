[translation]
41100-1 = "Episódio 10;O Desapego e a Marmita de Churrasco"
41100-11 = "……Ora, ora, vejo que o belo adormecido finalmente acordou."
41100-17 = "Como se sente? A cabeça ainda dói?"
41100-19 = "Se estiver tudo em cima, fico aliviado. Fiquei receoso de que meu \"hospitalidade\" fosse um pouco bruto demais…… Afinal, é a primeira vez que recebemos um figurão de fora de Kivotos."
41100-20 = "[s] \"……E quem diabos é você?\""
41100-21 = "Mil perdões pela falta de modos. Me chamo Descartes."
41100-22 = "Sou o líder deste nobre grupo: a \"Reunião Daqueles que Buscam a Felicidade Certa Mesmo Sem Possuir Nada\"…… ou como os íntimos chamam, a \"FeliSem\"."
41100-23 = "[s1] \"???\"\n[s2] \"Feli…… o quê?\""
41100-24 = "Nunca ouviu falar de nós? Que ultraje."
41100-25 = "Nunca ouviu falar de nós? Que ultraje."
41100-26 = "Pensei que qualquer um que buscasse a pureza da pobreza já teria cruzado com o nosso nome…… Entendi."
41100-27 = "Bom, eu já suspeitava."
41100-28 = "Afinal, pelo que soube, você anda usando as suas capangas para saquear comida de gente honesta."
41100-29 = "[s] \"Peraí, do que você tá falando……?\""
41100-30 = "Não se faça de sonso! Meus companheiros viram com esses olhos que a terra há de comer: você e aquelas garotas de orelha de coelho andando por aí!"
41100-31 = "[s3] \"Orelhas de coelho……\"\n[s4] \"Ele tá falando do Esquadrão RABBIT?\""
41100-32 = "Não dou a mínima para o nome oficial daquelas delinquentes."
41100-33 = "Não dou a mínima para o nome oficial daquelas delinquentes."
41100-34 = "O que importa é que vocês são seres gananciosos que ousam atrapalhar o nosso caminho rumo à ilum inação!"
41100-35 = "[s] \"Atrapalhar o caminho? Mas a gente só tá tentando sobreviver……\""
41100-36 = "……Às vezes nos chamam de nomes cruéis."
41100-37 = "Dizem que somos \"vadius\" ou a \"ferida da sociedade\"…… "
4100-38 = "Mas eles erram o alvo por quilômetros. Nós não somos inúteis……"
41100-39 = "Nós apenas praticamos o \"Desapego Absoluto\"!"
41100-40 = "[s] \"Eu ainda não entendi onde você quer chegar com esse papo……\""
41100-41 = "O povo de Kivotos é obcecado por posses. Eles querem ter tudo."
41100-42 = "Tanques novos, fuzis caros, bunkers anti-mísseis…… É um poço sem fundo."
41100-43 = "Esses desejos nunca são satisfeitos. Quanto mais você tem, mais você quer…… No fim, a vida vira uma maratona de cansaço e frustração."
41100-44 = "A verdadeira felicidade não nasce do \"ter\", mas sim do \"não ter nada\"……"
41100-45 = "Abrir mão de tudo, exceto do mínimo para não morrer, e viver em harmonia com o nada…… só assim se alcança o Nirvana urbano."
41100-46 = "Por isso, nós vivemos aqui, sem trabalhar e sem possuir nada, apenas praticando o nosso desapego sagrado."
41100-50 = "Porém, um dia desses, umas intrusas apareceram aqui."
41100-51 = "Umas meninas com orelhas de coelho, armadas com equipamentos caríssimos, começaram a rapar todas as marmitas descartadas da conveniência!"
41100-52 = "Depois que elas passavam, não sobrava nem um grão de arroz pra contar história…… nem uma marmita de broto de feijão que fosse!"
41100-53 = "Marmitas de \"Churrasco\" já são raríssimas de sobrarem no descarte…… e elas pegaram TUDO só pra elas! Que egoísmo!"
41100-54 = "Uma falta de ética dessas…… como ousam agir assim?!"
41100-55 = "[s] \"Ué, mas você não disse que \"luxo e prazeres materiais não importam\"?\""
41100-56 = "I-Isso é verdade, mas…… mas……"
41100-57 = "Não importa! Seja Esquadrão RABBIT ou Esquadrão Lebre, eu não vou perdoar essa atrocidade!"
41100-58 = "E já que você é o líder delas…… agora você vai me dar a sua palavra."
41100-59 = "De agora em diante, toda marmita de churrasco que for descartada pertence à FeliSem!"
41100-60 = "[s5] \"Elas não são minhas subordinadas……\"\n[s6] \"Elas são apenas minhas alunas, entende?\""
41100-61 = "Subordinada, aluna, dá na mesma! Elas não obedecem o que você fala?"
41100-62 = "Subordinada, aluna, dá na mesma! Elas não obedecem o que você fala?"
41100-63 = "……Que cara de tacho é essa? Quer dizer que você é o professor e não manda nem nas suas próprias alunas?"
41100-64 = "Francamente, que homem lamentável……"
41100-68 = "Pois bem, passa esse celular pra cá e fica quietinho aí. Eu mesmo vou negociar com elas."
41100-69 = "[s] \"Boa sorte, você vai precisar……\""
41100-73 = "Vejamos…… qual o número……"
41100-74 = "Deve ser este aqui."
41100-81 = "……O que foi agora? A gente tá ocupada preparando a janta, fala logo."
41100-82 = "Alô? É a líder do Esquadrão RABBIT?"
41100-83 = "Nós somos os buscadores da verdade, os iluminados da \"Reunião Daqueles que Buscam a Felicidade Certa Mesmo Sem Possuir Nada\", ou FeliSem pra encurtar――"
41100-87 = "……E-Ela desligou na minha cara?"
41100-88 = "[s] \"Ela deve ter achado que era trote ou telemarketing……\""
41100-89 = "Esses plebeus que não conhecem a verdade são impossíveis……!"
41100-96 = "Alô? Estão me ouvindo agora?! Eu não sou trote!"
41100-97 = "Nós capturamos o professor de vocês! Se não aceitarem as nossas exigências agora, eu vou fazer coisas terríveis com ele――"
41100-98 = "Faz o que você quiser. Aquele pervertido descarado merece."
41100-103 = "……DESLIGOU DE NOVO?!"
41100-104 = "Que palhaçada é essa?! Você é realmente o Sensei delas?! Elas não dão a mínima se você morrer ou sofrer?!"
41100-105 = "[s] \"É que a gente teve um mal-entendido…… climático…… outro dia.\""
41100-106 = "Droga, achei que sequestrar o figurão da Schale ia me garantir marmitas premium pro resto da vida…… desse jeito eu perco o bife……"
41100-107 = "Vou ter que apelar pra outro método……"
41100-108 = "[s] \"Posso tentar ligar pra elas?\""
41100-109 = "Você quer negociar pessoalmente?"
41100-110 = "Por mim tudo bem, mas nem pense em ligar pra polícia. Se tentar qualquer gracinha……"
41100-111 = "Saiba que o arsenal da FeliSem humilha o da Valkyrie!"
41100-112 = "[s] (Ligo para o Esquadrão RABBIT.)"
41100-121 = "Ah, fala sério, Sensei…… o que você quer agora? A gente tá morta de cansaço depois de treinar até tarde."
41100-122 = "Se for pra falar abobrinha ou pedir pra espiar o nosso banho de novo, eu vou――"
41100-123 = "[s] \"Meninas, eu acabei de achar um lote de marmitas descartadas de Bife Wagyu Premium……\""
41100-129 = "Hahaha!"
41100-130 = "Você é patético! Estava todo confiante e elas te ignoraram do mesmo jeito!"
41100-131 = "Chega, vou ter que sequestrar outra aluna pra dar medo nelas……"
41100-142 = "AQUI É A SRT! TODO MUNDO PRO CHÃO!"
41100-144 = "Saki, a gente não tá em missão oficial, não precisava se identificar…… peraí."
41100-145 = "C-Cuidado! Cadê o Bife Wagyu Premium que o Sensei falou?!"
41100-146 = "Marmita de bife de luxo…… eu nem comia isso quando a escola tava aberta……"
41100-148 = "Sim, ele disse com todas as letras. Eu ouvi. Wagyu. Premium."
41100-149 = "Rastreei o sinal dele e deu bem aqui! Elas devem estar escondendo o bife! Rápido!"
41100-150 = "[s] \"Gente…… elas são eficientes até demais quando o assunto é comida.\""
41100-152 = "Ah, Sensei…… você tá aí."
41100-153 = "CADÊ A MARMITA DE WAGYU?!"
41100-154 = "Coleta rápida de suprimentos é o pilar da nossa sobrevivência."
41100-155 = "Se estiver perto do vencimento, cada segundo conta pro sabor não degradar! Cadê o bife?!"
41100-156 = "Espera…… onde tá a comida?"
41100-157 = "[s] \"Então, sobre isso……\""
41100-159 = "Hahaha! Vocês caíram direitinho no nosso plano, suas gulosas!"
41100-160 = "O desejo é apenas uma ilusão, uma sombra do que não existe……"
41100-161 = "Vocês se deixaram cegar pela ganância de um bife de luxo e agora caminham direto para a ruína!"
41100-162 = "Eu não entendi droga nenhuma do que você falou, mas…… quer dizer que o bife é mentira?"
41100-163 = "Obviamente. Quem jogaria um Wagyu de luxo no lixo? Seus tolos."
41100-164 = "Que isso sirva de lição para vocês aprenderem as maravilhas do desapego!"
41100-166 = "Agora, meus irmãos de fé! Vamos ensinar a elas o que é a verdadeira pobreza!"
41100-176 = "Eita caramba! Olha esses caras! Tão tudo esfarrapados, mas os fuzis são de última geração?!"
41100-177 = "F-Fomos cercadas……"
41100-179 = "Mantenham o foco. Não entrem em pânico."
41100-180 = "Estratégia padrão: atrair pra um lugar estreito e eliminar um por um. Mesmo em desvantagem numérica, a gente ganha."
41100-181 = "Arma boa na mão de amador não vale de nada."
41100-182 = "Vocês mexeram com o esquadrão errado. Não subestimem a SRT!"
41100-183 = "Miyu, os snipers no segundo andar são seus. Limpa a área."
41100-184 = "Saki, a frente é nossa. Moe, cuida da retaguarda e dá cobertura. Pode ser?"
41100-186 = "……Entendido. Vamos nessa."
41100-187 = "Vou lançar as granadas de luz. No sinal, dispersar e atacar!"
41100-188 = "Preparar……"
41100-190 = "INICIAR OPERAÇÃO!"