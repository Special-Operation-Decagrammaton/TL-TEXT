[translation]
41100-1 = "Episódio 10: O Não-Ter e o Bento de Churrasco"
41100-11 = "……Ora, finalmente acordou."
41100-17 = "Como está se sentindo?"
41100-19 = "Ainda bem que parece estar bem. Fiquei preocupado que algo pudesse ter acontecido com aquela recepção inadequada… afinal, é a primeira vez que recebemos alguém de fora de Kivotos."
41100-20 = "[s] \"……Quem é você?\""
41100-21 = "Desculpe a demora na apresentação. Meu nome é Descartes."
41100-22 = "Sou o líder desta organização, a 'Irmandade que Busca a Felicidade Certa sem Possuir Nada'… abreviando, a 'FeliSem'."
41100-23 = "[s1] \"???\"\n[s2] \"Fe-li-Sem…?\""
41100-24 = "É a primeira vez que ouve falar?"
41100-25 = "É a primeira vez que ouve falar?"
41100-26 = "Pensei que alguém que busca uma vida de pobreza já teria ouvido falar… hmm, entendo."
41100-27 = "Bem, já imaginava que pudesse ser o caso."
41100-28 = "Afinal, o senhor usa seus subordinados para roubar comida."
41100-29 = "[s] \"Ahm, do que você está falando…?\""
41100-30 = "Pouco fingimento! Meus companheiros viram com seus próprios olhos, o senhor e aquelas alunas de orelhas de coelho bem enturmados!"
41100-31 = "[s3] \"Orelhas de coelho… quer dizer…\"\n[s4] \"As meninas do Esquadrão RABBIT?\""
41100-32 = "Não tenho interesse em como as chamam."
41100-33 = "Não tenho interesse em como as chamam."
41100-34 = "O importante é que vocês são seres gananciosos, atrapalhando nossa busca espiritual."
41100-35 = "[s] \"Atrapalhamos alguma coisa…?\""
41100-36 = "……Às vezes, somos chamados assim."
41100-37 = "'Vagabundos', ou 'pus da sociedade'…"
41100-38 = "Mas nenhum desses termos está correto. Não é que não façamos nada…"
41100-39 = "É que estamos apenas praticando o 'não-ter'!"
41100-40 = "[s] \"Não estou acompanhando…\""
41100-41 = "As pessoas de Kivotos possuem coisas demais."
41100-42 = "Novos tanques, fuzis caros, bunkers antimísseis…"
41100-43 = "Esses desejos, no entanto, nunca são satisfeitos. Quanto mais se tem, mais se quer… e no fim, isso apenas esgota a vida."
41100-44 = "A verdadeira felicidade não vem do 'ter', mas do 'não-ter'…"
41100-45 = "Abrir mão de tudo, exceto o mínimo necessário para sobreviver, e manter um estado de harmonia com a natureza… só assim se alcança a verdadeira felicidade."
41100-46 = "Por isso, vivíamos praticando o 'não-ter': sem trabalhar, sem possuir."
41100-50 = "Até que, um dia, convidadas indesejadas apareceram."
41100-51 = "Aquelas alunas com orelhas de coelho, portando armamentos de alto valor, foram pegando um a um os bentôs descartados."
41100-52 = "Depois que passaram, não sobrou nem um pé de alface… nem mesmo um mísero bentô de broto de feijão."
41100-53 = "Já é raro um 'bentô de churrasco' ser descartado… e mesmo assim, elas o tomaram para si…!"
41100-54 = "Como pode um ato tão insano ser tolerado?!"
41100-55 = "[s] \"Ahm, não era para ser 'não tenho interesse em luxos'…?\""
41100-56 = "B-bem, isso é verdade…"
41100-57 = "De qualquer forma! Não sei se é Esquadrão Coelho ou Esquadrão RABBIT, mas não vou tolerar esse ultraje!"
41100-58 = "E, considerando que o senhor é o líder delas… vamos fazer um acordo."
41100-59 = "Da próxima vez que um 'bentô de churrasco' for descartado, ele será cedido à nossa 'FeliSem'!"
41100-60 = "[s5] \"Elas não são minhas subordinadas.\"\n[s6] \"Elas são apenas minhas alunas.\""
41100-61 = "Subordinadas ou alunas, tanto faz. Elas obedecem ao senhor, não?"
41100-62 = "Subordinadas ou alunas, tanto faz. Elas obedecem ao senhor, não?"
41100-63 = "……O que significa essa expressão duvidosa? Mesmo sendo professor, não consegue controlar suas próprias alunas?"
41100-64 = "Ah, que falta de jeito…"
41100-68 = "Já que é assim, entregue-me seu celular e aguarde quieto. Eu mesmo negociarei."
41100-69 = "[s] \"Acho que vai ser perda de tempo…\""
41100-73 = "Ahm…"
41100-74 = "É este aqui?"
41100-81 = "……O que vocês querem? Estamos ocupados preparando a comida."
41100-82 = "Ah, então você é a líder do 'Esquadrão RABBIT'?"
41100-83 = "Somos buscadores urbanos da verdadeira felicidade, a 'Irmandade que Busca a Felicidade Certa sem Possuir Nada'… abreviando, 'FeliSem'――"
41100-87 = "……C-caiu na hora?"
41100-88 = "[s] \"Ela deve ter achado que era trote…\""
41100-89 = "É por isso que os mortais ignorantes não entendem a verdade…"
41100-96 = "S-Senhoras? Parece que confundiram com um 'trote telefônico'…"
41100-97 = "Nós capturamos o professor de vocês. Se não atenderem às nossas exigências, serão aplicadas punições severas――"
41100-98 = "Façam o que quiserem."
41100-103 = "……Caiu de novo?!"
41100-104 = "O que significa isso? Você é mesmo o 'professor'?! Não demonstrou a mínima preocupação!"
41100-105 = "[s] \"Bem, há circunstâncias complicadas…\""
41100-106 = "Droga, sequestramos o Professor da Schale à toa… agora não teremos os bentôs de luxo…"
41100-107 = "Nesse caso, teremos que pensar em outro jeito…"
41100-108 = "[s] \"Que tal eu tentar ligar?\""
41100-109 = "O senhor mesmo vai negociar?"
41100-110 = "Não me oponho, mas é melhor não tentar nenhum truque, como chamar a polícia."
41100-111 = "Nosso armamento na 'FeliSem' supera em muito o da Valkyrie!"
41100-112 = "[s] Ligo para o Esquadrão RABBIT."
41100-121 = "Ah, que saco, o que foi, Professor… Estamos trabalhando até tarde, já cansadas."
41100-122 = "Se não for importante――"
41100-123 = "[s] \"Na verdade, encontrei uns bentôs descartados de bife de wagyu…\""
41100-129 = "Ahaha!"
41100-130 = "Todo confiante, e agora está sendo ignorado também!"
41100-131 = "Ah, nesse caso, vou ameaçar outras alunas…"
41100-142 = "SRT! Afastem-se, intrusos!"
41100-144 = "Saki, não estamos em missão da SRT agora, é melhor não――"
41100-145 = "M-mas ali, tem mesmo wagyu de verdade…?"
41100-146 = "Nunca comi um bentô de bife de wagyu nem quando estava na SRT…"
41100-148 = "Sim, foi exatamente isso que você disse. Sem dúvida."
41100-149 = "Pela geolocalização, ele deve estar perto! Depressa!"
41100-150 = "[s] \"Uau, são eficientes…\""
41100-152 = "Ah, Professor…"
41100-153 = "Cadê o bentô de bife de wagyu?!"
41100-154 = "Coleta rápida é o básico da missão."
41100-155 = "Se o prazo de validade venceu, o sabor se perde a cada minuto, por isso precisamos garantir agora――"
41100-156 = "Pensei nisso, mas… onde está o bentô?"
41100-157 = "[s] \"Ahm… é que…\""
41100-159 = "Ahaha! Caíram direitinho no nosso plano!"
41100-160 = "O fim do desejo é uma ilusão, como uma miragem…"
41100-161 = "Aqueles que sucumbem ao desejo e se encantam por essa ilusão acabam, mais cedo ou mais tarde, trilhando o caminho da ruína."
41100-162 = "Não sei do que você está falando… quer dizer que não tem bentô de bife de wagyu?"
41100-163 = "Claro que não. Por que razão algo assim seria descartado?"
41100-164 = "Que tal aproveitar esta oportunidade para despertar para a maravilha do 'não-ter'?"
41100-166 = "Vamos, meus companheiros. Mostremos a elas!"
41100-176 = "Uau, que gente é essa?! Roupas esfarrapadas, mas armas ultramodernas…!"
41100-177 = "E-estamos cercadas…"
41100-179 = "Primeiro, vamos nos acalmar."
41100-180 = "O básico é atraí-las para um espaço confinado e derrotar uma a uma; mesmo com esse número, conseguimos…"
41100-181 = "Bem, armas boas não significam nada."
41100-182 = "Não subestimem a SRT!"
41100-183 = "A atiradora no segundo andar, eu cuido…"
41100-184 = "Miyako, eu e Miyu cuidamos da frente, a retaguarda é sua. Está bem?"
41100-186 = "…Sim, vamos assim."
41100-187 = "Usarei uma granada de luz. Ao sinal, dispersem."
41100-188 = "Então…"
41100-190 = "Operação, iniciar!"