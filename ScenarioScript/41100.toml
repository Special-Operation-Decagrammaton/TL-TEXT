[translation]
41100-1 = "Episódio 10: Não-posse e Marmita de Yakiniku"
41100-11 = "……Oh, você acordou."
41100-17 = "Como está se sentindo?"
41100-19 = "Fico feliz que não pareça haver problemas. Fiquei preocupado caso algo acontecesse devido à nossa hospitalidade amadora... Afinal, é a primeira vez que recebemos alguém de fora de Kivotos."
41100-20 = "[s] \"……Quem é você?\""
41100-21 = "Peço desculpas pela demora nas apresentações, meu nome é Descartes."
41100-22 = "Sou o líder desta organização, a \"Sociedade de Busca pela Felicidade Certa sem Posse\"... conhecida como \"Shokakkou\"."
41100-23 = "[s1] \"???\"\n[s2] \"Shokakkou……?\""
41100-24 = "É a primeira vez que ouve falar?"
41100-25 = "É a primeira vez que ouve falar?"
41100-26 = "Pensei que, se você fosse alguém que busca uma vida de pobreza voluntária, já teria ouvido falar pelo menos uma vez... Entendo."
41100-27 = "Bem, eu já imaginava que pudesse ser o caso."
41100-28 = "Afinal, parece que você usou seus subordinados para roubar comida."
41100-29 = "[s] \"Espere, do que você está falando……?\""
41100-30 = "Chega de fingir demência! Meus companheiros viram claramente com os próprios olhos você e as alunas de orelhas de coelho agindo juntas!"
41100-31 = "[s3] \"Orelhas de coelho, então……\"\n[s4] \"Você está falando do RABBIT Squad?\""
41100-32 = "Não tenho interesse em como você chama essas alunas."
41100-33 = "Não tenho interesse em como você chama essas alunas."
41100-34 = "O que importa é que vocês são pessoas gananciosas que atrapalham nossa busca pelo caminho."
41100-35 = "[s] \"Será que eu atrapalhei alguma coisa……?\""
41100-36 = "……Às vezes nos chamam assim."
41100-37 = "\"Parasitas\", ou \"a escória da sociedade\"……"
41100-38 = "No entanto, nenhum desses termos acerta o alvo. Não é que não estejamos fazendo nada……"
41100-39 = "Nós apenas estamos praticando a \"Não-posse\"!"
41100-40 = "[s] \"Não estou entendendo onde você quer chegar……\""
41100-41 = "As pessoas de Kivotos possuem coisas demais."
41100-42 = "Tanques novos, fuzis caros, bunkers para se proteger de mísseis, e por aí vai……"
41100-43 = "Esses desejos, porém, nunca são satisfeitos. Mais alto, mais longe... No fim, isso só serve para exaurir a vida."
41100-44 = "A verdadeira felicidade não nasce da \"posse\", mas da \"não-posse\"……"
41100-45 = "Desapegar-se de tudo, exceto do mínimo necessário para a sobrevivência, e manter um estado de não-ação natural... Só assim se alcança a verdadeira felicidade."
41100-46 = "Por isso, vivíamos praticando a \"não-posse\", sem trabalhar e sem possuir nada."
41100-50 = "Porém, um dia, um convidado indesejado apareceu aqui."
41100-51 = "Aquelas alunas, com orelhas de coelho e armamentos caros, começaram a pegar as marmitas descartadas uma após a outra."
41100-52 = "Depois que elas passaram, não sobrou nem grama no chão... nem sequer uma marmita de broto de feijão."
41100-53 = "Já é difícil encontrar \"marmitas de Yakiniku\" descartadas... e elas ainda levaram tudo para si……!"
41100-54 = "Como um comportamento tão absurdo pode ser permitido!?"
41100-55 = "[s] \"Espere, você não disse que 'não tinha interesse em itens de luxo'……?\""
41100-56 = "I-isso é verdade, mas……"
41100-57 = "De qualquer forma! Não sei se é RABBIT Squad ou Esquadrão Coelho, mas não posso perdoar esse comportamento ultrajante!"
41100-58 = "E eu vi que você é a líder delas... Vamos, prometa-me."
41100-59 = "De agora em diante, se houver \"marmitas de Yakiniku\" descartadas, você as deixará para nós, da \"Shokakkou\"!"
41100-60 = "[s5] \"Elas não são minhas subordinadas.\"\n[s6] \"Elas são apenas minhas alunas.\""
41100-61 = "Sejam subordinadas ou alunas, não importa. Elas te obedecem, não é?"
41100-62 = "Sejam subordinadas ou alunas, não importa. Elas te obedecem, não é?"
41100-63 = "……Por que essa expressão estranha? Você é o sensei, não consegue nem controlar seus próprios alunos?"
41100-64 = "Francamente, não tem jeito……"
41100-68 = "Já que é assim, me dê seu celular e fique aí quieto. Eu mesmo vou negociar."
41100-69 = "[s] \"Acho que é perda de tempo, mas……\""
41100-73 = "Bem……"
41100-74 = "É isto, não é?"
41100-81 = "……O que você quer? Estamos ocupadas preparando o jantar agora."
41100-82 = "Ah, você é a líder do RABBIT Squad?"
41100-83 = "Nós somos os buscadores da verdade na cidade, em busca da verdadeira felicidade. Somos o 'Grupo de Busca pela Felicidade sem Posses'... ou, abreviando, o 'Grupo da Felicidade'—"
41100-87 = "……D-desligaram na minha cara?"
41100-88 = "[s] \"Devem ter pensado que era algum tipo de trote…….\""
41100-89 = "É por isso que esses mortais que não conhecem a verdade……."
41100-96 = "P-pessoal? Parece que elas acham que é um 'trote' ou algo do tipo……."
41100-97 = "Nós capturamos o seu Sensei. Se não atenderem às nossas exigências agora, vamos submeter o Sensei a um tratamento cruel—"
41100-98 = "Quer fazer o quê?"
41100-103 = "……Desligaram de novo!?"
41100-104 = "O que significa isso? Você é mesmo o 'Sensei'!? Elas não estão nem um pouco preocupadas com você!?"
41100-105 = "[s] \"Bem, é uma situação complicada…….\""
41100-106 = "Droga, e olha que a gente fez o esforço de manter o Sensei do Schale como refém…… Com isso, o bento de luxo vai……"
41100-107 = "Se é assim, vamos tentar outro método……."
41100-108 = "[s] \"Posso tentar fazer uma ligação para ver?\""
41100-109 = "Você quer negociar diretamente?"
41100-110 = "Não me importo, mas é melhor não tentar nenhum truque, como fingir que está ligando para a polícia."
41100-111 = "O armamento do nosso 'Grupo da Felicidade' supera facilmente o da Valkyrie, sabe!"
41100-112 = "[s] Ligar para o RABBIT Squad."
41100-121 = "Ah, qual é, Sensei…… A gente está trabalhando até tarde da noite e estamos exaustas."
41100-122 = "Se não for nada importante, eu vou—"
41100-123 = "[s] \"Na verdade, eu encontrei um bento de bife de wagyu descartado……\""
41100-129 = "Hahaha!"
41100-130 = "Estava tão confiante, mas veja só, você também foi ignorado!"
41100-131 = "Ah, se é assim, vou ter que ameaçar outros alunos……."
41100-142 = "É a SRT! Saiam da frente, intrusos!"
41100-144 = "Saki, não estamos em missão da SRT agora, então é melhor não nos identificarmos……."
41100-145 = "E-e além disso, tem mesmo um wagyu de altíssima qualidade aqui……?"
41100-146 = "Eu nunca comi um bento de bife de wagyu nem quando estava na SRT……."
41100-148 = "Sim, ela disse isso com certeza. Não tem erro."
41100-149 = "Pelo resultado do rastreamento reverso, elas devem estar por perto! Rápido!"
41100-150 = "[s] \"Nossa, elas são eficientes…….\""
41100-152 = "Ah, Sensei……."
41100-153 = "Onde está o bento de bife de wagyu!?"
41100-154 = "Coleta rápida é o básico de uma missão."
41100-155 = "Se o prazo de validade vencer, o sabor diminuirá a cada segundo, então precisamos garantir isso agora……"
41100-156 = "Foi o que pensei, mas onde está o bento?"
41100-157 = "[s] \"Bem, é que…….\""
41100-159 = "Hahaha! Caíram direitinho no nosso plano!"
41100-160 = "O fim do desejo é como uma miragem que não existe……"
41100-161 = "Aqueles que se deixam levar pela ganância e são seduzidos por essa miragem, inevitavelmente caminham para a própria ruína."
41100-162 = "Não entendi nada do que você disse, mas…… quer dizer que não tem bento de bife de wagyu?"
41100-163 = "Claro que não. Por que você achou que algo assim seria descartado?"
41100-164 = "Espero que, a partir disso, vocês percebam a maravilha da 'não posse'."
41100-166 = "Vamos, camaradas. Vamos ensinar isso a elas!"
41100-176 = "Nossa, quem são esses!? As roupas estão todas rasgadas, mas as armas são super modernas……!"
41100-177 = "F-fomos cercadas……."
41100-179 = "Primeiro, vamos manter a calma."
41100-180 = "O básico é atraí-los para um lugar estreito e derrotá-los um por um. Assim, mesmo com esse número……"
41100-181 = "Bem, não importa se as armas são boas."
41100-182 = "Não subestimem a SRT!"
41100-183 = "Eu cuidarei de todos os atiradores no segundo andar..."
41100-184 = "Miyako, eu e a Miyu cuidaremos da frente, então cuide da retaguarda. Tudo bem para você?"
41100-186 = "...Sim, vamos fazer assim."
41100-187 = "Vou usar uma granada de luz, então dispersem ao meu sinal."
41100-188 = "Então..."
41100-190 = "Iniciando operação!"
