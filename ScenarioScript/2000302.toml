[translation]
2000302-1 = "Uniforme preto"
2000302-2 = "Sala de aula de Trinity"
2000302-6 = "Ah, Sensei.#nBom trabalho hoje."
2000302-7 = "A saia...?#nSim, a Hasumi-senpai me emprestou o kit de costura, então fiz um alinhavo provisório por enquanto."
2000302-8 = "Se eu me mover muito bruscamente, pode acabar rasgando de novo, mas...#naté que a saia nova chegue, não tem outro jeito."
2000302-9 = "Mesmo que eu quisesse pedir uma saia emprestada, a da Hasumi-senpai não serve em mim, e a da Tsurugi-senpai está sempre manchada de sangue..."
2000302-10 = "Como não existem muitas peças de reposição para este uniforme preto do Comitê de Justiça em Trinity, sempre passo por dificuldades nessas horas."
2000302-11 = "O motivo de o uniforme do Comitê de Justiça ser preto, ao contrário dos uniformes das outras alunas de Trinity?"
2000302-12 = "É para que, caso o sangue de pessoas como as da Academia Gehenna respingue, não fique tão visível.#nSe você olhar para a Tsurugi-senpai, talvez entenda melhor, não é?"
2000302-13 = "Enquanto eu estiver vestindo este uniforme preto, posso retalhar meus inimigos sem hesitação."
2000302-14 = "[s] Com o rosto tenso, engoli em seco."
2000302-15 = "Ah... aquilo foi uma piada...#nSerá que exagerei um pouco?"
2000302-16 = "[s] \"Achei que estivesse falando sério e fiquei um pouco assustado.\""
2000302-17 = "Eu acho que não tenho talento para piadas. Quando eu conto uma, todo mundo costuma ficar com uma cara de assustado."
2000302-18 = "Por que será...?"
2000302-19 = "[s] \"Não é porque sua expressão é muito séria?\""
2000302-20 = "Sim, provavelmente é por isso.#nHmm..."
2000302-21 = "Bem, de qualquer forma, não é como se eu usasse o uniforme preto só porque ele suja de sangue."
2000302-22 = "Manter a limpeza é algo muito importante.#nSempre que ele se suja de sangue durante uma operação, eu o lavo muito bem."
2000302-23 = "[s] \"Haha, isso também é uma piada, né?\""
2000302-24 = "Não, isso é verdade, mas..."
2000302-25 = "Não tem como realizar a justiça sem sujar estas mãos de sangue, não é mesmo?#nFufu..."
2000302-26 = "[s] Meu rosto se contraiu novamente e engoli em seco."
2000302-27 = "Hmm... quando eu conto uma piada, acham que é verdade, e quando digo a verdade, acham que é piada..."
2000302-28 = "Será que eu realmente não tenho talento para piadas?"
2000302-30 = "Depois disso, passei o tempo ouvindo as preocupações da Mashiro."
