[translation]
2000302-1 = "黒い制服"
2000302-2 = "トリニティ・教室"
2000302-6 = "あ、先生。#nお疲れ様でした。"
2000302-7 = "スカート……ですか？#nはい、ハスミ先輩が裁縫箱を貸してくれたので、とりあえず仮縫いしておきました。"
2000302-8 = "派手に動いてしまうとまた破けてしまうかもしれませんが……#n新しいスカートが届くまでは、仕方ないです。"
2000302-9 = "スカートを借りようにも、ハスミ先輩のスカートはサイズが合いませんし、ツルギ先輩のスカートはいつも血が滲んでいますし……。"
2000302-10 = "この、正義実現委員会の黒い制服は、トリニティでも予備があまりないため、こういう時は毎回苦労します。"
2000302-11 = "正義実現委員会の制服が、他のトリニティの生徒たちの制服と違って黒い理由、ですか？"
2000302-12 = "それは、ゲヘナ学園のような者たちの血が飛び散っても目立たないようにです。#nツルギ先輩を見れば、分かりやすいかもしれませんね？"
2000302-13 = "この黒い制服を着ている限り、迷うことなく敵を切り刻むことができます。"
2000302-14 = "[s] ひきつった顔で、乾いたつばを飲み込む。"
2000302-15 = "あ……今のは冗談です……#n少しやりすぎましたでしょうか？"
2000302-16 = "[s] \"本気だと思って、ちょっと怯えてた。\""
2000302-17 = "私は冗談の才能がないと思うのです。私が冗談を言うと、みんながよく怯えた顔をするんですよね。"
2000302-18 = "どうしてでしょう……？"
2000302-19 = "[s] \"表情が真面目だからじゃない？\""
2000302-20 = "はい、たぶんそのせいですよね。#nうーん……。"
2000302-21 = "えっと、とにかく、血が付くから黒い制服を着る、というわけではありません。"
2000302-22 = "清潔な状態を維持するのは大事なことなので。#n作戦中に血が付いた時は、その度毎回綺麗に洗ってますよ。"
2000302-23 = "[s] \"はは、それも冗談だよね？\""
2000302-24 = "いえ、これは本当ですが……。"
2000302-25 = "この手を血で汚さずに正義を実現させるなんて、できるわけないじゃないですか。#nふふ……。"
2000302-26 = "[s] また顔がひきつり、乾いたつばを飲み込んだ。"
2000302-27 = "うーん……冗談を言うと本当だと思われて、本当のことを言うと冗談と思われる……。"
2000302-28 = "やっぱり、私には冗談の才能がないでしょうか。"
2000302-30 = "その後、マシロの悩みを聞いて過ごした。"
