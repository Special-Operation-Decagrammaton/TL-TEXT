1010005-120 = "[s] \"É um segredo.\""

1010005-125 = "Ah, já tenho uma resposta."

1010005-130 = "[ns] \"Posso ver?\""

1010005-137 = "“Hmm, aceito o desafio do Cavaleiro Mascarado. Da Equipe de Maiôs Mascarados.”"

1010005-141 = "[ns] \"...É fácil saber de quem é a mensagem.\""

1010005-142 = "……sim."

