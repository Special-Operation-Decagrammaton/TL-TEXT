1010005-93 = "[s] \"Hmm...\""

1010005-94 = "Sensei, o que você acha que devo fazer...?"

1010005-95 = "[s7] \"Com o grupo de maiôs mascarados...\"\n[s8] \"Cavaleiro Mascarado, hein...\""

1010005-100 = "[ns9] \"Ambos estão mascarados...\"\n[ns10] \"Eu me pergunto se Abydos está bem...\""

1010005-103 = "[ns] \"Acho que você deveria pensar sobre esse assunto sozinho e decidir.\""

1010005-104 = "sim……."

