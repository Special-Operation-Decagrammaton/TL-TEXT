[translation]
1010005-1 = "覆面ライダー"
1010005-3 = "（約束の場所でシロコを待っていると……）"
1010005-9 = "[ruby=ど]退[/ruby]け、[ruby=ど]退[/ruby]けぇ！"
1010005-12 = "[ns1] \"うわっ！？\"\n[ns2] 安全な場所に避難する。"
1010005-19 = "ご、強盗です！#n誰か、あのトラックを止めてください！"
1010005-20 = "あの中には、キャベツがたくさんあるんだ！"
1010005-21 = "[s3] （最近、アビドスの治安がさらに悪くなっているような……）\n[s4] （いや、今はそれより……）"
1010005-27 = "先生、ちょっとごめん。"
1010005-34 = "じ、自転車！？"
1010005-35 = "覆面ライダーだ！"
1010005-37 = "う、嘘だろ！？"
1010005-38 = "自転車でトラックに追いつくなんて、ありえねぇ！"
1010005-52 = "[ns] \"…………。\""
1010005-55 = "[ns] \"…………。\""
1010005-60 = "ありがとうございます、覆面ライダーさん！"
1010005-61 = "都市伝説かと思ってました！"
1010005-66 = "……先生、どこか場所を移そう。"
1010005-67 = "[s] \"そうだね……。\""
1010005-74 = "ん、ここなら大丈夫。"
1010005-75 = "[s5] \"どうしてこうなったの！？\"\n[s6] \"すごく目立ってなかった！？\""
1010005-81 = "うーん。"
1010005-82 = "[ns] \"覆面ライダー、だっけ……？\""
1010005-83 = "変な噂が立たないように、顔を隠そうと思って。"
1010005-84 = "[s] \"むしろ、逆効果のような……。\""
1010005-85 = "……ん。"
1010005-86 = "[s] \"それ、新しい自転車の？\""
1010005-87 = "まだ未完成だけど。#nサイクルジャージもないし……。"
1010005-88 = "ちゃんと組めたら、紹介する。"
1010005-89 = "[s] \"楽しみにしてるね。ところで、悩み事って？\""
1010005-90 = "ん。"
1010005-91 = "対策委員会から、#n「アビドス生徒会」の名前を受け継いでほしい、って言われたんだけど……。"
1010005-92 = "あの生徒会の意味を考えたら、#nどう答えれば良いのか分からなくて……。"
1010005-93 = "[s] \"うーん……。\""
1010005-94 = "先生、どうすれば良いと思う……？"
1010005-95 = "[s7] \"覆面水着団と……。\"\n[s8] \"覆面ライダー、か……。\""
1010005-100 = "[ns9] \"どっちも覆面……。\"\n[ns10] \"アビドスって、大丈夫なのかな……。\""
1010005-103 = "[ns] \"この問題は、自分で悩んで決めるべきだと思う。\""
1010005-104 = "ん……。"
1010005-105 = "[ns] \"ただ、みんなシロコが心配なんじゃないかな。\""
1010005-109 = "……。"
1010005-110 = "ん。"
1010005-111 = "分かった。"
1010005-112 = "さっそくメッセージを送ってみる。"
1010005-117 = "ん、これで良し。"
1010005-118 = "[ns] \"なんて送ったの？\""
1010005-119 = "……それは秘密。"
1010005-120 = "[s] \"秘密かぁ。\""
1010005-125 = "あ、もう返事が。"
1010005-130 = "[ns] \"見ても良いの？\""
1010005-137 = "「ん、覆面ライダーからの挑戦状、受けて立つ。覆面水着団より」……だって。"
1010005-141 = "[ns] \"……誰からのメッセージか分かりやすいね。\""
1010005-142 = "……ん。"
1010005-143 = "そうだね。"
