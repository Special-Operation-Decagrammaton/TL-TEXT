[translation]
10023100-1 = "Episódio 10; Por favor, prestem atenção. É um momento importante."
10023100-3 = "……Então, tudo fazia parte do plano desde o início."
10023100-4 = "Ora, eu pensava que nossos interesses apenas coincidiam, não é mesmo?"
10023100-5 = "Para você, senhorita, isso era uma 'missão'.#nPara mim, era apenas por causa desta 'Coroa do Rei Relógio'.#nAlém disso, em algum momento nós combinamos de compartilhar a mesma estética?"
10023100-6 = "Você sempre viveu sua vida dessa maneira?"
10023100-7 = "Hum... isso é..."
10023100-8 = "É sobre não escolher meios para atingir seus objetivos?#nOu talvez... sobre trair seus aliados tão facilmente?"
10023100-9 = "Ah... é sobre estar disposto a sacrificar tudo para realizar seus próprios desejos?"
10023100-10 = "……"
10023100-11 = "Se você quer tanto perguntar, mesmo já sabendo a resposta, eu lhe direi:#n— Tudo."
10023100-12 = "Tudo."
10023100-14 = "— Eu não consigo entender."
10023100-15 = "Fufu, eu não esperava que você entendesse desde o início."
10023100-16 = "É fácil falar bonito, não é? ...Mas, no final, todos partem deixando as mesmas palavras."
10023100-17 = "Dúvida, rejeição, exclusão — Ah, que eu sou um monstro!"
10023100-18 = "Vocês também são assim, não são?#n...Incluindo o Sensei que está aí."
10023100-19 = "……Acho que havia outras formas de resolver isso."
10023100-20 = "Então, deixe-me perguntar uma coisa.#nSupondo que eu não tivesse levado a coroa, o que vocês pretendiam fazer depois?"
10023100-21 = "Até que Doda fosse preso e as suspeitas de comércio ilegal fossem reveladas...#nela seria confiscada pela Valkyrie."
10023100-22 = "Ou seja, uma obra de arte valiosa perderia a chance de ser vista pelo público... é isso, não é?"
10023100-24 = "……Se o Meitaro for preso, as obras de arte da mansão não seriam doadas para um museu?"
10023100-26 = "Sim, provavelmente. Elas seriam gerenciadas e exibidas apenas como formalidade por pessoas que nem sequer tentam entender o verdadeiro valor das obras."
10023100-27 = "Então, o que você quer dizer com isso?"
10023100-28 = "Digo que ambos estão errados."
10023100-37 = "Não pode ser!"
10023100-38 = "Alice e as outras precisam dessa coroa para completar a missão!"
10023100-40 = "Fufu... sinto muito, mas isso seria um problema para mim."
10023100-41 = "As obras de arte devem existir para o bem de todas as senhoritas...#nEsse é o meu princípio de ação."
10023100-42 = "……A aliança... acabou...?"
10023100-43 = "Fufu, foi pouco tempo, mas me diverti bastante."
10023100-44 = "Terminar dessa forma... não é uma sensação muito agradável."
10023100-45 = "Eu também lamento por isso."
10023100-46 = "……Mas, infelizmente, a bela história de amizade termina aqui."
10023100-47 = "— Está na hora de fechar as cortinas."
