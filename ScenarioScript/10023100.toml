[translation]
10023100-1 = "第10話;注目してください。大事な場面です"
10023100-3 = "……最初から全て、計画の内だったと。"
10023100-4 = "おや、私たちは互いの利害が一致していただけに過ぎないと思っていたのですがね？"
10023100-5 = "お嬢さんとっては、それが「任務」。#n私にとっては、この「時計王の冠」だっただけの事。#nそもそも、美学を共にしようだなんて話をしましたか？"
10023100-6 = "あなたは今までも、このような生き方を？"
10023100-7 = "ふむ――それは……"
10023100-8 = "目的のためなら手段を選ばない事ですか？#nそれとも――同盟相手をあっさりと裏切る事？"
10023100-9 = "嗚呼……己の本懐を遂げるためならば、全て[ruby=なげう]を擲つ[/ruby]覚悟の事？"
10023100-10 = "……"
10023100-11 = "[ruby=わたくし]私の[/ruby]答えなど分かりきった上で、あえて聞きたいのであれば、#n申し上げましょう――"
10023100-12 = "[ruby=・  ・]全て[/ruby]だと。"
10023100-14 = "――理解できませんね。"
10023100-15 = "ふふ、理解など端から求めておりません。"
10023100-16 = "口先だけならいくらでも紡げるでしょう？……だが、最後は皆、同じ言葉を残して去っていく。"
10023100-17 = "疑念、拒絶、排除――嗚呼[ruby=わたくし]、私は[/ruby]バケモノである、と！"
10023100-18 = "お嬢さん方も同じでしょう？#n……そこにいらっしゃる先生も。"
10023100-19 = "……他の解決方法もあったかと思いますが。"
10023100-20 = "それでは、一つ伺いましょう。#n私が王冠を持っていかなかったと仮定して、その後どうするおつもりなのですか？"
10023100-21 = "[ruby=どうだ]銅田[/ruby]の身柄が拘束され、違法取引の容疑が明らかになるまで……#nヴァルキューレで差し押さえられるはずです。"
10023100-22 = "つまりは、貴重な美術品がひと目に触れる機会を失う、と……そういう事ですよね？"
10023100-24 = "……[ruby=めいたろう]明太郎[/ruby]さんが捕まったら、屋敷の美術品は博物館にでも寄贈されるんじゃないのかな？"
10023100-26 = "ええ、そうでしょうとも。美術品の真の価値を理解しようとすらしない人の手によって、形だけの管理と展示が繰り返される事でしょう。"
10023100-27 = "つまり、何が言いたいのですか？"
10023100-28 = "どちらも間違っている、というお話です。"
10023100-37 = "ダメです！"
10023100-38 = "アリスたちがクエストをクリアするには、その王冠が必要です！"
10023100-40 = "ふふ……残念ですが、それでは私が困ってしまいます。"
10023100-41 = "美術品とは、全てのお嬢さん方のために存在すべきである……#nそれが私の行動原理ですからね。"
10023100-42 = "……同盟は……お終いですか……？"
10023100-43 = "ふふっ、短い時間でしたが、楽しませてもらいましたよ。"
10023100-44 = "こんな形で終わるとは……あまり気分の良いものではありませんね。"
10023100-45 = "私も残念に思っておりますとも。"
10023100-46 = "……ですが、残念ながら美しい友情の物語はここで終わり。"
10023100-47 = "――そろそろ幕引きと致しましょう。"
