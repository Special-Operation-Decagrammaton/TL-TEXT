[translation]
80000089-1 = "A doce pegadinha da secretária do Seminar, Noah"
80000089-2 = "Olá, Sensei."
80000089-3 = "Você teria um momento?"
80000089-4 = "[s1] \"Olá, Noah.\"\n[s2] \"Claro, mas o que houve hoje?\""
80000089-5 = "Fufu. Na verdade, eu comprei \"certa coisa\" perto do Schale..."
80000089-6 = "Fufu. Na verdade, eu comprei \"certa coisa\" perto do Schale..."
80000089-7 = "Como tive a oportunidade, pensei em mostrar para você também, então resolvi passar aqui."
80000089-8 = "[s] \"Algo interessante...?\""
80000089-12 = "É isto..."
80000089-13 = "Tcharam!"
80000089-15 = "É um frasco de tinta."
80000089-16 = "Hoje em dia, quase todo mundo usa caneta esferográfica, então as oportunidades de ver isso diminuíram, não é?"
80000089-17 = "Mas, como secretária do Seminar... #nEu queria tentar praticar caligrafia com uma pena e tinta uma vez."
80000089-18 = "Atualmente, os documentos em Millennium são quase todos registrados digitalmente. #nÉ difícil encontrar artigos de papelaria tradicionais como este..."
80000089-19 = "Foi então que, por acaso, vi isso na galeria comercial ali perto."
80000089-20 = "Eu queria testar como é escrever com ela imediatamente, mas infelizmente não trouxe papel..."
80000089-21 = "Por isso, acabei vindo até aqui. Desculpe pela surpresa."
80000089-22 = "[s] \"Não se preocupe, pode vir quando quiser.\""
80000089-23 = "Obrigada, Sensei."
80000089-24 = "Já que estamos aqui... você poderia me dar um pouco de papel?"
80000089-25 = "[s] Entregar para a Noah."
80000089-26 = "Obrigada."
80000089-27 = "Então..."
80000089-32 = "Ora, a tinta não está saindo direito."
80000089-33 = "Parece que seria melhor umedecer. Então, vou usar a língua levemente..."
80000089-43 = "[ns3] \"Noah, você acabou de lamber a tinta!?\"\n[ns4] \"Cuspa isso logo!\""
80000089-46 = "…Fufu."
80000089-47 = "Pegadinha, sucesso total~♪"
80000089-48 = "[s] \"U-uma pegadinha...?\""
80000089-49 = "Sensei, você sabe que dia é hoje?"
80000089-50 = "[s] \"...Dia dos Namorados, né?\""
80000089-51 = "Sim, exatamente. #nO dia de presentear a pessoa amada com chocolates... um dia doce, muito doce e especial."
80000089-52 = "Quando passei pela galeria comercial, vi vários chocolates diferentes que não costumo ver."
80000089-53 = "Este frasco de tinta também é um deles."
80000089-54 = "Parece tinta por fora, mas o conteúdo é chocolate."
80000089-55 = "...Hum, é doce e delicioso."
80000089-56 = "[s5] \"Ainda bem...\"\n[s6] \"Pensei que fosse tinta e fiquei preocupado.\""
80000089-57 = "Fufu. Como pedido de desculpas pela pegadinha, vou dar este chocolate para você, Sensei."
80000089-58 = "Fufu. Como pedido de desculpas pela pegadinha, vou dar este chocolate para você, Sensei."
80000089-59 = "Como é chocolate, talvez seja difícil ter a fluidez da tinta ao escrever. #nAlém disso, o prazo de validade é limitado, mas..."
80000089-60 = "É justamente por isso que, quando quiser expressar seus sentimentos mais sinceros... não deve haver tinta melhor do que esta."
80000089-61 = "Se esse momento chegar para você, Sensei..."
80000089-62 = "Por favor, use esta tinta."
