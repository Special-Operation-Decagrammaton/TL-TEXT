[translation]
80000089-1 = "セミナー書記ノアの甘いイタズラ"
80000089-2 = "こんにちは、先生。"
80000089-3 = "少々お時間、よろしいですか？"
80000089-4 = "[s1] \"こんにちは、ノア。\"\n[s2] \"もちろんだけど、今日はどうしたの？\""
80000089-5 = "ふふっ。実はシャーレの近くで、「とある物」を買いまして……"
80000089-6 = "ふふっ。実はシャーレの近くで、「とある物」を買いまして……"
80000089-7 = "せっかくですし先生にもお見せしたいなと思い、立ち寄ってみました。"
80000089-8 = "[s] \"面白い物って……？\""
80000089-12 = "それは……"
80000089-13 = "じゃじゃーん！"
80000089-15 = "ボトルインクです。"
80000089-16 = "今となってはボールペンを使う方がほとんどなので、目にする機会は減りましたね。"
80000089-17 = "ですがセミナーの書記として……#n一度、羽ペンとインクでカリグラフィーに挑戦してみたいと思いまして。"
80000089-18 = "今やミレニアムにおける文書は、大抵デジタルで記録していますので。#nこういった昔ながらの文具は、なかなか見受けられないんですよね……。"
80000089-19 = "そんな中で偶然、先ほど向こうの商店街で、こちらが目に留まったんです。"
80000089-20 = "すぐにでも書き味を試したかったのですが、あいにく紙の持ち合わせも無く……"
80000089-21 = "それで、こうして来てしまいました。突然のことですみません。"
80000089-22 = "[s] \"ううん、いつでも来て大丈夫だよ。\""
80000089-23 = "ありがとうございます、先生。"
80000089-24 = "早速ですが……何か紙を頂いてもよろしいでしょうか？"
80000089-25 = "[s] ノアに手渡す。"
80000089-26 = "ありがとうございます。"
80000089-27 = "それでは……"
80000089-32 = "あら、上手くインクが出ませんね。"
80000089-33 = "濡らした方が良さそうです。では、舌で軽く……"
80000089-43 = "[ns3] \"ノア、今インク舐めた！？\"\n[ns4] \"早くペッてして！\""
80000089-46 = "……ふふっ。"
80000089-47 = "ドッキリ、大成功です～♪"
80000089-48 = "[s] \"ど、ドッキリ……？\""
80000089-49 = "先生、今日は何の日かご存じですか？"
80000089-50 = "[s] \"……バレンタインデー、だよね？\""
80000089-51 = "はい、その通りです。#n愛する人にチョコレートを贈る……甘い甘い、特別な日。"
80000089-52 = "ふと商店街に立ち寄ってみたところ、見慣れないチョコレートが色々と売られていました。"
80000089-53 = "このボトルインクも、そのひとつです。"
80000089-54 = "見た目はインクですが、中身はチョコレートでして。"
80000089-55 = "……うん、甘くて美味しいですね。"
80000089-56 = "[s5] \"なら良かった……。\"\n[s6] \"インクだと思って、心配したよ。\""
80000089-57 = "ふふっ。イタズラのお詫びに、このチョコレートは先生に差し上げましょう。"
80000089-58 = "ふふっ。イタズラのお詫びに、このチョコレートは先生に差し上げましょう。"
80000089-59 = "チョコレートなので、インクのように滑らかな筆運びは難しいかもしれません。#nそれに、保存期間も限られていますが……"
80000089-60 = "だからこそ、心からの気持ちを伝えたい時には……これほど最適なインクも、他にそうそう無いでしょう。"
80000089-61 = "もし先生に、そんな時が訪れたら……"
80000089-62 = "ぜひ、このインクを使ってくださいね。"
