[translation]
2600302-1 = "O Anjo de Trinity"
2600302-2 = "（Como fiquei trabalhando o dia todo e meu corpo começou a doer, vim ao parque tomar um pouco de ar fresco para mudar de ares）"
2600302-3 = "（Sinto vontade de tomar um suco de maçã, não sei por quê...）"
2600302-4 = "Ah, Sensei! Olá, que coincidência encontrar você por aqui."
2600302-5 = "Veio passear para relaxar? Acho isso muito saudável e positivo!"
2600302-6 = "Ah, eu? Eu estou, bem..."
2600302-7 = "Obrigada, irmã mais velha!"
2600302-8 = "Obrigada!"
2600302-9 = "Sim, de nada. ...Ah, não, não fiz nada demais. É que essas crianças estavam com problemas, então só dei uma ajudinha..."
2600302-10 = "A irmã mais velha pegou o balão que tinha ficado preso na árvore para a gente!"
2600302-11 = "Ela também cuidou do meu machucado quando me feri brincando de bola! Obrigada, irmã mais velha!!"
2600302-12 = "Não, não, realmente não foi nada... Ouvir vocês dizerem isso me deixa um pouco envergonhada."
2600302-13 = "Gentil...? Eu? Não, não, isso é o normal. Afinal, como pode ver, sou um membro do Esquadrão de Primeiros Socorros."
2600302-14 = "Além disso..."
2600302-15 = "Ver as pessoas que estavam em apuros felizes é algo que me deixa muito contente."
2600302-16 = "Pode parecer um pouco clichê, mas talvez seja porque sempre tive esse tipo de personalidade."
2600302-17 = "Mas, Sensei, você parece um pouco cansado... está tudo bem?"
2600302-18 = "Dizer que não é nada... Sensei, essas desculpas não funcionam comigo, sabia?"
2600302-19 = "Eu sei de tudo. Você trabalha até tarde todas as noites e se alimenta de qualquer jeito..."
2600302-20 = "E mesmo assim, vai a lugares perigosos para ajudar os outros... O último ponto é louvável, mas se continuar assim, vai acabar desmaiando!"
2600302-21 = "Eu estou sempre preparada para prestar socorro, mas, na verdade, o ideal é que nunca precisemos entrar em ação."
2600302-22 = "……Ah."
2600302-23 = "D-desculpe... estou aqui dando sermão no Sensei..."
2600302-24 = "……Mas, pensando bem, talvez eu não tenha me preocupado o suficiente com a sua rotina e com a sua saúde até agora."
2600302-25 = "Será que, por você ser um adulto, acabei negligenciando isso inconscientemente...?"
2600302-26 = "Sinto muito, preciso refletir sobre isso."
2600302-27 = "[s1] \"Está tudo bem, eu sou um adulto.\"\n[s2] \"Deve ser difícil ter que se preocupar com todo mundo.\""
2600302-28 = "Uuu... Por favor, não venha com essa história de que \"é um adulto\"!"
2600302-29 = "Entendo, obrigada... mas ainda assim, peço desculpas."
2600302-31 = "……Não que seja uma compensação, mas aceitaria isto? É suco de maçã."
2600302-32 = "Ah, você estava com vontade de beber exatamente isso? Que bom!"
2600302-33 = "Fico feliz em saber que o Sensei gostou."
2600302-34 = "……Hehe."
2600302-35 = "Então, vamos lá para o resto do dia! Mas não se esforce demais, vá com calma!"
2600302-36 = "Se sentir que as coisas estão difíceis, por favor, me chame."
2600302-37 = "Eu correrei para o seu lado imediatamente!"
2600302-38 = "[s]\"Sim, obrigado.\""
2600302-39 = "……Fufu."
2600302-40 = "É uma promessa, hein?"
2600302-41 = "Pode me chamar a qualquer momento!"
