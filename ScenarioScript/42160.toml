[translation]
42160-1 = "Episódio 16; As circunstâncias do Sensei"
42160-3 = "[log]Registro de Interrogatório: 001-S-1[/log]"
42160-5 = "[log]Responsável: Aluna do 1º ano da Academia Especial SRT, Miyako Tsukiyuki[/log]"
42160-7 = "[log]Suspeito: Sensei do Schale, [USERNAME][/log]"
42160-10 = "Sala de interrogatório no subsolo do campo de treinamento"
42160-12 = "……Eu não entendo."
42160-13 = "Por que você veio até aqui?"
42160-14 = "[s1] \"O que eu disse antes era brincadeira...\"\n[s2] \"Vim para ver a Miyako.\""
42160-17 = "……Essa é uma história difícil de acreditar."
42160-18 = "Esta é uma base militar a mais de alguns quilômetros do centro da cidade."
42160-19 = "Mesmo que tenha fingido ser uma coincidência, não é um lugar onde se possa aparecer facilmente...#nAcho que o Sensei também já entendeu o quão perigoso este lugar é no momento."
42160-20 = "Se você veio até aqui evitando os olhos das outras alunas, deve ter algum objetivo especial."
42160-21 = "……Vou perguntar mais uma vez, Sensei."
42160-22 = "――Por que você veio até aqui?"
42160-23 = "[s3] \"Minha resposta não muda.\"\n[s4] \"É para ver a Miyako.\""
42160-26 = "……Então você veio para me convencer."
42160-27 = "Como mencionei na carta, eu já tomei minha decisão."
42160-28 = "Desde que a Chefe Kaya prometeu a restauração da SRT,#nnão há mais necessidade de continuar os protestos no Parque dos Coelhinhos."
42160-29 = "Para as outras integrantes do esquadrão... não, para as integrantes do destacamento.#nJulguei que seria melhor permanecer em instalações com comida, moradia e equipamentos adequados."
42160-30 = "……Acredito que esta seja a melhor solução ao meu alcance."
42160-31 = "Não... como uma arma que executa ordens superiores,#nnão há necessidade de julgar mais nada além disso."
42160-32 = "Por isso――não importa o que o Sensei diga…… não posso mudar minha decisão."
42160-33 = "[ns] \"Eu não vim para convencer a Miyako.\""
42160-35 = "[ns5] \"Só queria perguntar uma coisa.\"\n[ns6] \"Miyako, você está feliz agora?\""
42160-38 = "……Por que você pergunta isso?"
42160-39 = "Eu sou da SRT――uma integrante de uma unidade especial que trabalha pela missão de proteger a justiça e a segurança dos cidadãos."
42160-40 = "Para uma integrante da SRT que age sob tais deveres,#nemoções como \"felicidade\" não passam de um luxo."
42160-41 = "[s7] \"Se a Miyako está satisfeita com a situação atual, não direi nada, mas...\"\n[s8] \"Eu gostaria que você não interpretasse mal o que é 'responsabilidade'.\""
42160-44 = "Interpretar mal, você diz……?"
42160-45 = "A palavra responsabilidade tem algum significado além de \"dever a ser cumprido\"?"
42160-46 = "[ns9] \"'Assumir a responsabilidade' não significa carregar um fardo de sofrimento.\"\n[ns10] \"Nem assumir coisas que você detesta――\"\n[ns11] \"――E nem é um castigo por uma ação errada.\""
42160-52 = "[ns12] \"'Assumir a responsabilidade' significa não ter arrependimentos sobre suas próprias ações――\"\n[ns13] \"É algo prazeroso, que alivia o peso do coração.\""
42160-59 = "[ns] \"Então…… Miyako, você está feliz agora?\""
42160-64 = "……É por isso que eu não queria encontrar o Sensei."
42160-67 = "……Eu achava que tornar-se um adulto era algo doloroso."
42160-68 = "Que para crescer, era preciso encarar verdades amargas e duvidar dos outros."
42160-69 = "Que mesmo que isso significasse negar quem eu fui no passado, era algo inevitável para se tornar adulta……."
42160-72 = "O futuro que caminha à frente sussurra para o meu eu do passado."
42160-73 = "Por mais que eu tente negar,#npara mim, que não conheço aquele mundo, a ansiedade sempre me persegue..."
42160-74 = "……Tentei acreditar nas palavras da minha superior para encontrar paz."
42160-75 = "Mesmo assim――por que o Sensei diz essas coisas?"
42160-76 = "Por que――você nos diz, que não passamos de crianças, para decidirmos por nós mesmas?"
42160-77 = "[ns] \"Bem…… é porque eu sou um adulto estranho.\""
42160-81 = "……Um adulto estranho."
42160-85 = "――Eu decidi."
42160-89 = "Sensei, venha comigo."
42160-102 = "A saída é por aqui."
42160-103 = "Desativei os alarmes desta área por um curto período."
42160-104 = "Se sair daqui e seguir em frente, chegará ao ponto de ônibus mais próximo sem que ninguém perceba."
42160-105 = "[s14] \"Você vai me deixar ir assim mesmo?\"\n[s15] \"Não precisa reportar para as outras integrantes do esquadrão?\""
42160-108 = "Sim. A responsável pela segurança hoje sou eu."
42160-109 = "……Além disso, se souberem que o sensei [USERNAME] está aqui, vai virar uma confusão."
42160-110 = "Como agente da SRT, se eu puder reduzir nem que seja um pouco a confusão que acontece em Kivotos, já é o suficiente."
42160-111 = "[s] \"O que você vai fazer agora, Miyako?\""
42160-112 = "Eu…… vou cumprir com a minha responsabilidade."
42160-113 = "É a primeira vez que passo por algo assim.#nCom certeza, as coisas podem não sair como planejado…… mas……"
42160-114 = "[ns16] \"Vá em frente.\"\n[ns17] \"Se algo acontecer, eu assumo a responsabilidade.\""
42160-119 = "……Sim!"
42160-124 = "……Você demorou."
42160-125 = "Houve alguma anormalidade durante a segurança?"
42160-126 = "Não, não houve nada de anormal."
42160-127 = "……Entendo."
42160-134 = "Novas ordens do comando. O Esquadrão RABBIT também participará desta operação."
42160-135 = "……E este mapa?"
42160-136 = "Você deve se lembrar dele.#nÉ a planta da Estação Coelhinho."
42160-139 = "Amanhã, às 09:00, um trem de carga da Kaiser Construction parará na plataforma 2 da Estação Coelhinho para descarregar ogivas termobáricas <A.N.T.I.O.C.H.>."
42160-140 = "Devido ao trabalho, a plataforma da Estação Coelhinho ficará fechada até o meio-dia, mas――#nexiste a possibilidade de forças de oposição que notaram a anormalidade tentarem invadir a estação.#nPor isso, o Esquadrão RABBIT deve cooperar com a Kaiser Security e defender o exterior da estação."
42160-142 = "Ogivas termobáricas <A.N.T.I.O.C.H.>…… Você quer dizer as ogivas que as veteranas neutralizaram na primeira operação pública?"
42160-143 = "Exatamente."
42160-144 = "Trazer para dentro da cidade, neste momento, armas de destruição em massa que estavam guardadas nos subúrbios de D.U. por segurança dos cidadãos……"
42160-145 = "O Conselho Estudantil Federal está―― não, o que a senhora pretende fazer?"
42160-146 = "Assim que o descarregamento for concluído, as ogivas serão instaladas nas instalações do silo subterrâneo da estação e―― serão detonadas.#nOs envolvidos devem evacuar as instalações imediatamente."
42160-147 = "……Detonar ogivas termobáricas no metrô, bem no centro da cidade……?"
42160-148 = "As ogivas termobáricas têm seu poder ainda mais amplificado quando detonadas em espaços fechados, e ainda assim――"
42160-149 = "――Não preciso que me explique as especificações novamente.#nEu conheço o poder das ogivas <A.N.T.I.O.C.H.> melhor do que ninguém."
42160-150 = "……Por que você obedece a ordens como essa?"
42160-151 = "――Porque é uma ordem.#nO Conselho Estudantil Federal assumirá toda a responsabilidade pela operação."
42160-152 = "Mesmo que não haja responsabilidade―― é uma operação que arrisca vidas, e você nem nos diz o objetivo?"
42160-153 = "Todo o plano existe――"
42160-155 = "――para a restauração da Academia Especial SRT."
42160-159 = "……Restauração?#nFazendo algo assim?"
42160-160 = "Como uma academia construída sobre o medo das pessoas…… pode se tornar a Academia Especial SRT?"
42160-161 = "Uma SRT que ameaça a segurança dos cidadãos e sobrevive dependendo da autoridade dos outros――#nnão tem o direito de ser chamada de SRT."
42160-163 = "O direito não é algo que se recebe.#n――É algo que se constrói."
42160-164 = "Por enquanto, se pudermos normalizar esse caos……#nqualquer justificativa pode ser criada depois."
42160-169 = "……A senhora dizia isso muitas vezes."
42160-170 = "A justiça da SRT não vacila em nenhuma situação."
42160-171 = "――Eu lutarei por valores imutáveis, em vez de uma SRT que é apenas um nome vazio."
42160-176 = "……Eu disse que é uma ordem."
42160-177 = "Você pretende se rebelar?"
42160-179 = "――Não."
42160-180 = "Quem está se rebelando é você, Yukino Shichido."
42160-184 = "A única pessoa que pode nos dar ordens―― é a Presidente do Conselho Estudantil Federal."
42160-196 = "Mi, Miyako-chan……"
42160-197 = "Haa……"
42160-198 = "No fim, acaba sempre assim, né."
42160-200 = "……Peço desculpas."
42160-208 = "\nPróximo episódio: Ishu Yako"
