[translation]
33070-1 = "Episódio 7;O Dia Tingido de Fogo e Cinzas (1)"
33070-3 = "Kyaaaah!?"
33070-4 = "Aqui, tem feridos aqui……!"
33070-5 = "Cof, cof! A-alguém……."
33070-7 = "Emergência! A catedral antiga foi envolvida em chamas por uma explosão de origem desconhecida……!"
33070-8 = "Mas o que é…… a-a torre está desabando!"
33070-9 = "……Nagi?"
33070-12 = "Kyaaaah!!"
33070-13 = "Cuidado! Aí é……!"
33070-14 = "Q-que é isto……."
33070-18 = "A-a Azusa, cadê a Azusa……!?"
33070-19 = "A-as veteranas……!"
33070-20 = "Koharu, Hifumi! Esperem!"
33070-21 = "Até a gente entender a situação, se mexer não é uma boa!"
33070-22 = "M-mas a Azusa……!"
33070-24 = "Tanto a Azusa quanto o Comitê de Realização da Justiça, no mínimo, sabem se defender! Agora, mais perigoso que isso é a gente se espalhar!"
33070-25 = "M-mas……!"
33070-26 = "Hanako, Koharu…… o que a gente faz……."
33070-30 = "(……O que aconteceu?)"
33070-31 = "(Explosão…… fomos atacados? Situação?)"
33070-32 = "(Aquele som de agora, de algo voando em alta velocidade…… e este nível de dano……)"
33070-33 = "(Míssil de cruzeiro…… e numa velocidade que o sistema antiaéreo não conseguiu interceptar?)"
33070-34 = "(……Motor ramjet? Em Kivotos, quem teria tecnologia a esse ponto……)"
33070-35 = "(Não; só isso não geraria uma explosão desta escala…… havia explosivos na catedral desde o começo……?)"
33070-36 = "(Afinal, desde onde era armadilha? E quem…… Trinity, a Sisterhood……?)"
33070-38 = "(……Não. O que eu devo pensar agora é……!)"
33070-39 = "(A Ako…… está bem. Sendo assim……)"
33070-40 = "(O próximo movimento deve ser……)"
33070-41 = "……Gh! Sensei……!?"
33070-43 = "A-a Hina ainda tá de pé, né……."
33070-44 = "E-e agora…… levar aquilo e continuar de pé, que impressionante, que forte…… ainda querer lutar, por quê…… sendo que deve doer, sendo que deve sofrer……."
33070-46 = "Façam. E, principalmente, não deixem a Hina escapar."
33070-47 = "S-sim!"
33070-51 = "É-é isso, pelo visto…… me desculpa, ehehe……."
33070-53 = "(……Filial de, Arius)"
33070-54 = "M-me disseram pra não te deixar passar…… desculpa, mas isto também é ordem……."
33070-56 = "……."
33070-57 = "……Saiam da frente."
33070-58 = "No fim, é só coisa dolorosa mesmo, né……."
33070-63 = "Kikikikiki!!"
33070-64 = "Sucesso! Isto sim é conforme o plano! Kihyahyahyahya!!"
33070-65 = "Veterana Makoto, o que a senhora……?"
33070-66 = "Com isto, todos os estorvos desaparecem. Tanto o Tea Party quanto aquela Hina insuportável!"
33070-67 = "Entende, Iroha? Isto é o tal \"dois coelhos numa cajadada só\"."
33070-69 = "Pois saiba que esta grandiosa Makoto já estava mancomunada, de muito antes, com a Arius, que guarda rancor de Trinity!"
33070-70 = "O conflito interno do Tea Party, o golpe; eu sabia de tudo desde o começo. Tudo pelo plano de hoje!"
33070-72 = "Golpe……?"
33070-73 = "Quando foi que…… ou seja, a senhora, desde o começo, não tinha intenção nenhuma de firmar o Tratado do Éden?"
33070-74 = "Sim; nisso eu não tenho o menor interesse! O meu interesse sempre foi um só: despachar os estorvos!"
33070-75 = "Pra atrair o povo do Tea Party, que nunca dava as caras, só pra isso eu fingi concordar com o tratado."
33070-76 = "E, de quebra, até a Hina foi despachada; sorte maior não há! Kikiki!"
33070-77 = "Pra isso, a Arius deu um apoio e tanto. Este dirigível também é um presente como prova da nossa amizade…… o inimigo do meu inimigo é meu amigo, kikikiki!!"
33070-78 = "Vamos, contatem a Arius. Vamos começar pra valer a guerra de aniquilação de Trinity."
33070-79 = "Hina, Nagisa; já não resta nenhum estorvo no meu caminho!"
33070-81 = "Agora é a hora de apagar Trinity do mapa de Kivotos!"
33070-83 = "Veterana Makoto…… quem essa Arius odeia, talvez até mais que Trinity, somos nós, Gehenna. Por que a senhora achou que elas fossem se aliar à gente?"
33070-88 = "……O quêê!?"
33070-89 = "Ei, ei, o que são estas caixas todas empilhadas? Tá escrito \"manuseio cuidadoso\", \"inflamável\"……"
33070-90 = "Bom, ou seja…… a veterana Makoto foi enganada de novo."
33070-92 = "KABUUUUUUM!!"
33070-96 = "Equipe II, reportar."
33070-97 = "Equipe II, invadimos a catedral antiga. Em breve entramos em combate com o Comitê de Realização da Justiça. E aí?"
33070-98 = "Sim, aqui o assunto também terminou."
33070-99 = "E-Equipe III, em combate com a Hina neste momento! A Equipe V, conforme o previsto, está invadindo o subsolo……!"
33070-100 = "Entendido; já me junto a vocês."
33070-102 = "Trinity, e Gehenna…… chegou a hora de pagarem a dívida do nosso longo, longo ódio."
33070-103 = "Nós, a Arius, em nome do paraíso……"
33070-105 = "vamos julgar vocês."
33070-107 = "……ei!"
33070-108 = "Sensei, acorde, por favor!"
33070-109 = "[s] \"Arona……?\""
33070-110 = "Sensei, o senhor está bem!? Firme……!"
33070-111 = "[s] \"O que foi que……\""
33070-112 = "A catedral antiga foi explodida…… eu tentei proteger o senhor de todo jeito, mas……."
33070-113 = "Já, mais que isso…………firme…… as forças……"
33070-114 = "[s] \"Arona……!?\""
33070-125 = "[ns] （Isso agora foi……!）"
33070-127 = "……Sensei!"
33070-129 = "S-Sensei…… cof, cof…… o senhor está bem!"
33070-130 = "[ns] （O corpo não se mexe……）"
33070-131 = "Que bom, por pouco, numa fresta entre os escombros……."
33070-132 = "Espera, eu já vou……!"
33070-136 = "Agradeço por ter toda esta força…… Sensei, consegue se levantar?"
33070-137 = "[ns] Levanta-se."
33070-139 = "Ferimentos…… parece não haver. Ser engolido por aquela explosão e sair quase sem um arranhão, parece mesmo um milagre……."
33070-143 = "Sensei! O senhor está bem!"
33070-144 = "S-Sensei……!"
33070-145 = "Pessoal do Comitê de Realização da Justiça……!"
33070-146 = "[s] \"Vocês estão bem feridas……\""
33070-147 = "Isto não é nada. Mas, com a explosão de agora, a maior parte do Comitê de Realização da Justiça ficou fora de combate."
33070-148 = "Além disso, a senhorita Nagisa, a Sakurako…… e muitas outras não estão à vista……."
33070-149 = "……Do lado de Gehenna também quase ninguém à vista. O que será que……"
33070-151 = "Gh!!"
33070-158 = "Chegamos à zona da operação; remanescentes do Comitê de Realização da Justiça localizados. ……Não, correção. Não são remanescentes; são a essência do Comitê de Realização da Justiça."
33070-159 = "Tsurugi e Hasumi, é…… mandem o efetivo pra cá. Entramos em combate agora."
33070-161 = "A Filial de Arius……!?"
33070-162 = "D-de onde veio um efetivo deste tamanho……!? Como, se a região inteira estava em alerta……"
33070-163 = "N-não me diga……!!"
33070-167 = "Não me diga que, pelo subsolo……? Por aquela catacumba embaixo da catedral antiga……!?"
33070-168 = "……."
33070-169 = "……Sei. Ou seja, esta situação, posso considerar obra de vocês, da Arius?"
33070-170 = "……Imperdoável. Esse preço, aqui e agora……!"
33070-171 = "……Hasumi."
33070-172 = "……!"
33070-173 = "Calma."
33070-174 = "……Sim, tem razão."
33070-175 = "Obrigada, Tsurugi. Agora, a segurança do Sensei é a prioridade máxima…… vamos levá-lo e sair daqui."
33070-176 = "Sim…… quebrar tudo é o meu papel."
33070-177 = "Kuhihihi…… vamos."
33070-178 = "Eu enfrento vocês, seus vermes! Podem vir!!!"
33070-180 = "Hyáháháháááá――!"
33070-181 = "Sensei, vamos!"
