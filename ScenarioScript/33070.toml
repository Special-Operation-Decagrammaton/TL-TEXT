[translation]
33070-1 = "Episódio 7; O Dia Tingido de Fogo e Cinzas (1)"
33070-3 = "Aaaaaah!?"
33070-4 = "Aqui, tem feridos aqui...!"
33070-5 = "*Cof, cof!* A-Alguém..."
33070-7 = "Emergência! O Tabernáculo foi envolvido em chamas por uma explosão desconhecida...!"
33070-8 = "O que é isso... o-o campanário está desmoronando!"
33070-9 = "...Nagi-chan?"
33070-12 = "Aaaaaah!!"
33070-13 = "Cuidado! Para esse lado...!"
33070-14 = "Q-O que é isso..."
33070-18 = "Ah, onde está a Azusa-chan...!?"
33070-19 = "As... as veteranas...!"
33070-20 = "Koharu-chan, Hifumi-chan! Esperem!"
33070-21 = "Não é uma boa ideia sair por aí sem entender a situação!"
33070-22 = "M-Mas a Azusa-chan está..."
33070-24 = "Azusa-chan e o Comitê de Realização da Justiça pelo menos conseguem se proteger! O mais perigoso agora é a gente se separar!"
33070-25 = "M-Mas...!"
33070-26 = "Hanako-chan, Koharu-chan... o que a gente faz...?"
33070-30 = "(...O que aconteceu?)"
33070-31 = "(Explosão... fomos atacados? Qual é a situação?)"
33070-32 = "(Aquele som de algo voando em alta velocidade... e esse nível de destruição...)"
33070-33 = "(Mísseis de cruzeiro... e rápidos demais para o sistema de defesa antiaérea interceptar?)"
33070-34 = "(...Motores ramjet? Quem teria esse nível de tecnologia em Kivotos...)"
33070-35 = "(Não, só isso não causaria uma explosão desse tamanho... Será que já tinham instalado explosivos no Tabernáculo?)"
33070-36 = "(Onde é que a armadilha começou? E quem foi... Trinity, Irmandade...?)"
33070-38 = "(...Não. O que eu preciso pensar agora é...!)"
33070-39 = "(A Akko... está bem. Então...)"
33070-40 = "(O que eu devo fazer a seguir...)"
33070-41 = "...! Sensei...!?"
33070-43 = "A H-Hina-san ainda está de pé..."
33070-44 = "O que a gente faz... é impressionante ela continuar de pé depois disso, ela é tão forte... por que ela insiste em lutar... mesmo sentindo dor, mesmo sofrendo tanto..."
33070-46 = "Vamos lá, não deixem a Hina escapar de jeito nenhum."
33070-47 = "S-Sim!"
33070-51 = "P-Parece que é isso... desculpe, hehehe..."
33070-53 = "(...Arius, Filial)"
33070-54 = "Ah, me deram ordens para não deixar você passar... desculpe, isso também é uma ordem..."
33070-56 = "......"
33070-57 = "...Saia da frente."
33070-58 = "É, a vida é cheia de coisas difíceis, né..."
33070-63 = "Kikikiki!!"
33070-64 = "Sucesso! Exatamente como planejado! Kihihahahaha!!"
33070-65 = "Makoto-senpai, o que diabos você...?"
33070-66 = "Com isso, todos os estorvos vão desaparecer. A Tea Party, e até aquela Hina irritante!"
33070-67 = "Entendeu, Iroha? Isso se chama matar dois coelhos com uma cajadada só."
33070-69 = "Eu, Sua Majestade Makoto, estava em conluio com a Arius, que odeia a Trinity, já faz um tempo!"
33070-70 = "Eu sabia de tudo, desde as brigas internas da Tea Party até o golpe de estado. Tudo foi planejado para o dia de hoje!"
33070-72 = "Golpe de estado...?"
33070-73 = "Quando foi que você planejou isso... quer dizer que a senhora não tinha intenção nenhuma de assinar o Tratado do Éden desde o início?"
33070-74 = "Ah, eu não tenho o menor interesse nisso! Meu único objetivo sempre foi varrer os estorvos do meu caminho!"
33070-75 = "Eu fingi que concordava com o tratado só para atrair o pessoal da Tea Party, que nunca aparecia."
33070-76 = "E de quebra ainda me livrei da Hina, que sorte incrível! Kikiki!"
33070-77 = "Para isso, Arius me deu um apoio enorme. Essa aeronave foi um presente em sinal de nossa amizade... 'O inimigo do meu inimigo é meu amigo', entendeu? Kikikiki!!"
33070-78 = "Vamos lá, contatem a Arius. Vamos começar a guerra de aniquilação contra a Trinity de verdade."
33070-79 = "A Hina e a Nagisa, não tenho mais ninguém no meu caminho!"
33070-81 = "É agora que vamos apagar a Trinity do mapa de Kivotos!"
33070-83 = "Makoto-senpai... se bobear, aquela Arius odeia a gente de Gehenna muito mais do que a Trinity. Por que você achou que eles iam se aliar a nós?"
33070-88 = "...O QUÊ!?"
33070-89 = "Ei, ei, o que são essas caixas todas espalhadas aqui? Tá escrito 'Frágil' e 'Inflamável'..."
33070-90 = "Bom, basicamente... a Makoto-senpai foi enganada de novo."
33070-92 = "DOKAAAAAAN!!"
33070-96 = "Time II, relatório."
33070-97 = "Time II, invadimos o Tabernáculo. Estamos prestes a entrar em combate com o Comitê de Realização da Justiça. E vocês?"
33070-98 = "Ah, terminamos o serviço por aqui também."
33070-99 = "T-Time III, estamos em combate com a Hina-san agora! O Time V está invadindo o subsolo conforme o planejado...!"
33070-100 = "Entendido, nos encontraremos em breve."
33070-102 = "Trinity, e Gehenna... chegou a hora de vocês pagarem a dívida do nosso ódio de longa data."
33070-103 = "Nós, da Arius, em nome do Paraíso..."
33070-105 = "Vamos julgar vocês."
33070-107 = "...Ah!"
33070-108 = "Sensei, acorde!"
33070-109 = "[s] \"Arona...?\""
33070-110 = "Sensei, você está bem!? Mantenha a calma...!"
33070-111 = "[s] \"O que diabos...\""
33070-112 = "O Tabernáculo foi explodido... eu tentei proteger o Sensei o máximo que pude..."
33070-113 = "Não dá mais... aguente firme... minhas forças estão..."
33070-114 = "[s] \"Arona...!?\""
33070-125 = "[ns] (...O que foi isso!)"
33070-127 = "...Sensei!"
33070-129 = "S-Sensei... *cof, cof*... você está bem!"
33070-130 = "[ns] (Não consigo mover o corpo...)"
33070-131 = "Que bom, você conseguiu ficar nesse vão dos escombros..."
33070-132 = "Espere um pouco, eu vou logo..."
33070-136 = "Sou grata por ter esse poder... Sensei, consegue ficar de pé?"
33070-137 = "[ns] Levanta-se."
33070-139 = "Você parece não ter se machucado... É quase um milagre você ter sido pego por essa explosão e quase não ter nenhum ferimento..."
33070-143 = "Sensei! Você está bem!"
33070-144 = "S-Sensei...!"
33070-145 = "Pessoal do Comitê de Realização da Justiça...!"
33070-146 = "[s] \"Pessoal, vocês estão muito feridas...\""
33070-147 = "Isso não é nada. Mas com a explosão de agora a pouco, quase todo o Comitê ficou fora de combate."
33070-148 = "Além disso, não encontramos a Nagisa-sama, a Sakurako-san... e muitas outras..."
33070-149 = "...Também não tem sinal de ninguém de Gehenna. O que diabos está acontecendo..."
33070-151 = "...!!"
33070-158 = "Chegamos na área de operação, encontramos os remanescentes do Comitê de Realização da Justiça. ...Não, correção. Não são remanescentes, é a essência do Comitê."
33070-159 = "É a Tsurugi e a Hasumi... mandem as tropas para cá. Vamos entrar em combate."
33070-161 = "Filial Arius...!?"
33070-162 = "D-De onde veio tanta gente...!? Como, se toda a região estava em alerta máximo..."
33070-163 = "N-Não me diga...!!"
33070-167 = "Será que eles vieram do subsolo...? Das catacumbas embaixo do Tabernáculo...!?"
33070-168 = "......"
33070-169 = "...Entendo. Então, devemos considerar que essa situação é obra de vocês da Arius?"
33070-170 = "...Eu não perdoo. Vocês vão pagar por isso agora mesmo...!"
33070-171 = "...Hasumi."
33070-172 = "...!"
33070-173 = "Acalme-se."
33070-174 = "...Sim, você tem razão."
33070-175 = "Obrigada, Tsurugi. A prioridade agora é a segurança do Sensei... vou levá-lo daqui."
33070-176 = "Ah... destruir tudo é meu papel."
33070-177 = "Kuhihihi... vamos lá."
33070-178 = "Vou acabar com vocês, insetos! Venham pra cima!!!"
33070-180 = "Hyaaaah!!!"
33070-181 = "Sensei, vamos!"