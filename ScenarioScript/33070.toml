[translation]
33070-1 = "Episódio 7; O Dia Tingido de Fogo e Cinzas (1)"
33070-3 = "Aaaahhh!?"
33070-4 = "Aqui, tem alguém ferido aqui...!"
33070-5 = "Cof, cof! A-alguém...!"
33070-7 = "Emergência! A Antiga Basílica foi envolvida em chamas por uma explosão de origem desconhecida...!"
33070-8 = "O que é isso... A-a torre está desmoronando!"
33070-9 = "...Nagi-chan?"
33070-12 = "Aaaahhh!!"
33070-13 = "Cuidado! Ali não...!"
33070-14 = "O-o que é isso..."
33070-18 = "Ah, onde está a Azusa-chan...!?"
33070-19 = "As, as veteranas estão...!"
33070-20 = "Koharu-chan, Hifumi-chan! Esperem!"
33070-21 = "Não é uma boa ideia se mover até entendermos a situação!"
33070-22 = "M-mas a Azusa-chan está..."
33070-24 = "Tanto a Azusa-chan quanto o Comitê de Justiça conseguem se proteger! É mais perigoso nos separarmos agora!"
33070-25 = "M-mas...!"
33070-26 = "Hanako-chan, Koharu-chan... O que nós devemos fazer..."
33070-30 = "(...O que aconteceu?)"
33070-31 = "(Uma explosão... Fomos atacados? Qual é a situação?)"
33070-32 = "(Aquele som de algo voando em alta velocidade agora pouco... E essa extensão dos danos...)"
33070-33 = "(Um míssil de cruzeiro... E rápido o suficiente para que o sistema de defesa antiaérea não conseguisse interceptar?)"
33070-34 = "(...Motor ramjet? Em Kivotos, quem teria tecnologia desse nível...)"
33070-35 = "(Não, só isso não causaria uma explosão dessa escala... Será que já havia explosivos na Antiga Basílica desde o início...?)"
33070-36 = "(Onde exatamente a armadilha começou? E quem... Trinity, a Irmandade...?)"
33070-38 = "(...Não. O que eu preciso pensar agora é...!)"
33070-39 = "(Ako está... bem. Sendo assim...)"
33070-40 = "(O próximo passo deve ser...)"
33070-41 = "...! Sensei...!?"
33070-43 = "H-Hina-san, você ainda está de pé..."
33070-44 = "O-o que faremos... É incrível que ela ainda esteja de pé depois daquilo, ela é forte... Por que continuar lutando... Mesmo sentindo dor, mesmo sofrendo..."
33070-46 = "Ei, não deixem a Hina escapar, especialmente ela."
33070-47 = "S-sim!"
33070-51 = "P-parece que é isso... Sinto muito, ehehe..."
33070-53 = "(...Arius, filial)"
33070-54 = "Me disseram para não deixar você passar... Sinto muito, mas isso também é uma ordem..."
33070-56 = "..."
33070-57 = "...Saia da frente."
33070-58 = "Como esperado, só acontecem coisas dolorosas..."
33070-63 = "Kikikikiki!!"
33070-64 = "Sucesso! Isso foi exatamente como planejado! Kihihahahaha!!"
33070-65 = "Makoto-senpai, o que você fez...?"
33070-66 = "Com isso, todos os estorvos desaparecerão. O Tea Party e aquela Hina que era um incômodo!"
33070-67 = "Entendeu, Iroha? Isso é o que chamamos de matar dois coelhos com uma cajadada só."
33070-69 = "Não é segredo para ninguém que eu, a grande Makoto, estava conspirando com o Arius, que odeia Trinity, há muito tempo!"
33070-70 = "As disputas internas do Tea Party, o golpe de estado... Eu sabia de tudo desde o início. Tudo foi para o plano de hoje!"
33070-72 = "Golpe de estado...?"
33070-73 = "Desde quando você planejou isso... Então, senpai, você nunca teve a intenção de assinar o Tratado do Éden?"
33070-74 = "Ah, eu não tenho o menor interesse nisso! Meu único interesse sempre foi me livrar dos estorvos!"
33070-75 = "Eu fingi concordar com o tratado apenas para atrair o pessoal do Tea Party, que nunca aparecia."
33070-76 = "De quebra, ainda me livrei da Hina, não poderia ter tido mais sorte! Ki-ki-ki!"
33070-77 = "Para isso, Arius nos deu um suporte imenso. Até este dirigível é um presente como prova da nossa amizade... O inimigo do meu inimigo é meu amigo, ki-ki-ki-ki!!"
33070-78 = "Vamos, entrem em contato com Arius. Está na hora de começar a campanha de aniquilação de Trinity de verdade."
33070-79 = "Hina e Nagisa, não há mais ninguém para ficar no meu caminho!"
33070-81 = "Agora é o momento de apagar Trinity do mapa de Kivotos!"
33070-83 = "Makoto-senpai... se bobear, esse pessoal de Arius odeia a nós, da Gehenna, ainda mais do que odeiam Trinity. Por que você achou que eles se aliariam a nós?"
33070-88 = "...O quê!?"
33070-89 = "Ei, ei, o que são todas essas caixas aqui? Está escrito \"Manuseie com cuidado\" e \"Inflamável\"..."
33070-90 = "Bom, em resumo... a Makoto-senpai foi enganada de novo."
33070-92 = "CABUUUUUUUM!!"
33070-96 = "Equipe II, relatem."
33070-97 = "Equipe II, invadimos a Antiga Basílica. Estamos prestes a entrar em combate com o Comitê de Justiça. E vocês?"
33070-98 = "Ah, aqui também terminamos o serviço."
33070-99 = "Eq-Equipe III, estamos em combate com a Hina agora! A Equipe V está invadindo o subsolo conforme o planejado...!"
33070-100 = "Entendido, nos encontraremos em breve."
33070-102 = "Trinity, e Gehenna... chegou a hora de pagarem a dívida pelo nosso ódio acumulado por tanto tempo."
33070-103 = "Nós, de Arius, em nome do paraíso..."
33070-105 = "Vamos julgar todos vocês."
33070-107 = "...i!"
33070-108 = "Sensei, por favor, acorde!"
33070-109 = "[s] \"Arona...?\""
33070-110 = "Sensei, você está bem!? Mantenha a calma...!"
33070-111 = "[s] \"O que aconteceu exatamente...?\""
33070-112 = "A Antiga Basílica foi explodida... Eu tentei proteger o Sensei de alguma forma, mas..."
33070-113 = "Não consigo mais... por favor... mantenha-se firme... minhas forças estão..."
33070-114 = "[s] \"Arona...!?\""
33070-125 = "[ns] (O que foi isso...!)"
33070-127 = "...Sensei!"
33070-129 = "Se-Sensei... *cof*, *cof*... você está bem!"
33070-130 = "[ns] (Não consigo mover meu corpo...)"
33070-131 = "Que bom, você estava por pouco em uma fresta entre os escombros..."
33070-132 = "Espere um pouco, eu vou logo..."
33070-136 = "Sou grata por ter esse poder... Sensei, consegue se levantar?"
33070-137 = "[ns] Levantar-se."
33070-139 = "Parece que você não se feriu... É um verdadeiro milagre que você tenha sido pego naquela explosão e quase não tenha um arranhão..."
33070-143 = "Sensei! Você está bem!"
33070-144 = "Se-Sensei...!"
33070-145 = "Pessoal do Comitê de Justiça...!"
33070-146 = "[s] \"Vocês estão muito feridos...\""
33070-147 = "Isso não é nada. Mas, com a explosão de agora pouco, a maioria dos membros do Comitê de Justiça ficou incapacitada para o combate."
33070-148 = "Além disso, a Nagisa-sama e a Sakurako-san... e muitas outras pessoas não estão em lugar nenhum..."
33070-149 = "...O pessoal da Gehenna também não está por perto. O que será que isso significa..."
33070-151 = "!!"
33070-158 = "Chegamos à área de operação, encontramos os remanescentes do Comitê de Justiça. ...Não, correção. Não são remanescentes, é a elite do Comitê de Justiça."
33070-159 = "Tsurugi e Hasumi, é? Redirecionem as tropas para cá. Vamos iniciar o combate."
33070-161 = "Escola de Arius...!?"
33070-162 = "De-de onde veio tanto poder de fogo...!? Como eles conseguiram, se toda a área ao redor estava em estado de alerta..."
33070-163 = "Não, não pode ser...!!"
33070-167 = "Não me diga que vieram do subsolo...? Daquelas catacumbas que ficam abaixo da Antiga Basílica...!?"
33070-168 = "..."
33070-169 = "……Entendo. Então, podemos considerar que esta situação é obra de vocês, do Arius?"
33070-170 = "……Eu não vou perdoar. O preço por isso, aqui e agora……!"
33070-171 = "……Hasumi."
33070-172 = "……!"
33070-173 = "Acalme-se."
33070-174 = "……Sim, você tem razão."
33070-175 = "Obrigada, Tsurugi. Agora, a segurança do Sensei é a prioridade máxima…… Vou levar o Sensei e sair daqui."
33070-176 = "Ah…… Fazer bagunça é o meu papel."
33070-177 = "Kuhihihihi…… Vamos lá."
33070-178 = "Vou cuidar de vocês, seus insetos! Venham para cima!!!"
33070-180 = "Hya-hahahahaaaaaa!"
33070-181 = "Sensei, vamos!"
