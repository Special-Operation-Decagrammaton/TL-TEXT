[translation]
90001210-1 = "Episódio 21: O Dever Final"
90001210-4 = "……？"
90001210-12 = "To-todos pararam de se mover……!"
90001210-13 = "Uwaaa! Parece até o começo de um jogo de terror……."
90001210-14 = "Hein……?"
90001210-18 = "No céu, uma luz……?"
90001210-19 = "A-Alice está com medo. #nAlguém, por favor, me ajude!"
90001210-23 = "Mantenha a calma, Princesa. #nNão há nada a temer."
90001210-24 = "Kei, você está bem! #nO que exatamente está acontecendo……?"
90001210-25 = "Há pouco, uma enorme quantidade de energia foi disparada."
90001210-26 = "Este é o poder do próprio \"Deus Sem Nome\". #nUm campo de força foi formado ao redor."
90001210-27 = "Os dispositivos eletrônicos pararam devido a uma força que a tecnologia atual não consegue interpretar completamente."
90001210-28 = "O grupo de luzes que parece uma aurora no céu também é a estrutura do poder do \"Deus Sem Nome\", visível apenas para você e para mim, Princesa."
90001210-29 = "Esta situação é conveniente para nós. #nNeste ambiente saturado de energia, podemos fazer qualquer coisa."
90001210-30 = "Por exemplo, realizar uma conexão temporária de consciência como esta――"
90001210-31 = "Veja, todos os outros parecem estar parados, não é?"
90001210-32 = "……."
90001210-33 = "Entendi!"
90001210-34 = "……Princesa, você realmente entendeu?"
90001210-35 = "Sim! Não entendi nada!"
90001210-36 = "Bem……."
90001210-37 = "Para explicar de um jeito que você entenda, Princesa……."
90001210-38 = "Este lugar está, neste momento, repleto de uma vasta quantidade de poder mágico."
90001210-39 = "Pense nisso como se nossos pontos de magia estivessem transbordando."
90001210-41 = "Entendi perfeitamente!"
90001210-42 = "Que bom, Princesa."
90001210-43 = "Kei…… esse jeito de me chamar, é solitário."
90001210-44 = "Alice quer estar no mesmo lugar que a Kei."
90001210-45 = "Caminhar lado a lado, de mãos dadas. #nQuero caminhar com você para onde quer que seja."
90001210-46 = "Sim. É exatamente por isso, Princesa."
90001210-47 = "Acho que esta será a última oportunidade que terei de chamá-la de Princesa."
90001210-48 = "O que isso significa……?"
90001210-49 = "……."
90001210-50 = "Vamos falar sobre o destino."
90001210-51 = "Destino, você diz……?"
90001210-52 = "Dizem que o futuro das pessoas já está definido desde o nascimento."
90001210-53 = "Que, não importa o que aconteça, tudo converge para o fim."
90001210-54 = "Seria mais fácil entender se falássemos da \"linhagem do herói\"."
90001210-55 = "Assim como existe a ideia de que o destino é influenciado pela genética."
90001210-56 = "Coisas que não podem ser mudadas, muitas vezes, existem."
90001210-61 = "Este lugar é……!"
90001210-62 = "A cidade fortaleza \"Eridu\". #nA cidade secreta que Rio preparou para o fim dos tempos."
90001210-63 = "É também o lugar onde nosso destino foi invertido."
90001210-64 = "……."
90001210-65 = "O que será que foi o nosso destino?"
90001210-66 = "Você era a Princesa. #nE eu era a sua serva."
90001210-67 = "Provavelmente, isso já estava decidido pelo destino."
90001210-68 = "Mas, a Alice……."
90001210-73 = "Sim, eu sei."
90001210-74 = "Quando eu acordei, percebi que o que realmente importa são as escolhas……."
90001210-75 = "Você, que..."
90001210-76 = "……Espere, o que é isso?"
90001210-81 = "Pessoal, esperem um pouco."
90001210-84 = "Não, está errado. #nIsso não deveria ser possível……!"
90001210-88 = "Vamos ouvir o que a Aris tem a dizer até o fim."
90001210-91 = "A primeira coisa que me veio à mente foi, por acaso……!"
90001210-96 = "O que você quer se tornar é"
90001210-99 = "！！！！！"
90001210-104 = "Você pode decidir"
90001210-107 = "Não pode ser, não era para ser assim……."
90001210-113 = "Kei, o que houve!?"
90001210-115 = "Bem……."
90001210-116 = "Quando recuperei a consciência, a primeira coisa que me veio à mente foi a existência da princesa."
90001210-117 = "A existência da princesa é grande demais para mim."
90001210-118 = "Porque ela sempre esteve no meu centro. #nOu pelo menos era o que eu pensava……."
90001210-119 = "Pensava?"
90001210-123 = "……O que eu me lembrei foram as palavras do Sensei."
90001210-124 = "É natural, afinal, o Sensei é o Sensei!"
90001210-125 = "Uaaaaaaaaaaaa!"
90001210-126 = "Que bom. #nPara a Kei também, o Sensei é uma existência importante."
90001210-127 = "Impossível, por quê! #nEu não aceito isso de jeito nenhum!"
90001210-128 = "Droga…… por que tamanha injustiça está me esperando!"
90001210-129 = "Não fique tão brava, o Sensei está……."
90001210-130 = "Não, eu vou ficar brava sim!"
90001210-131 = "……Não importa o que aconteça, a princesa superará qualquer obstáculo."
90001210-132 = "Junto com vocês, como uma heroína, com um sorriso no rosto."
90001210-137 = "Mas eu sou diferente."
90001210-138 = "Vou resistir a todas as injustiças até o fim!"
90001210-154 = "Mesmo que eu tenha que beber água barrenta, não vou me curvar! #nPorque a vida é uma batalha!"
90001210-158 = "Além disso, não tem problema reclamar um pouco, tem……!?"
90001210-159 = "……Olhe para essa aparência!"
90001210-164 = "Eu tenho todo o direito de ficar brava com isso!"
90001210-165 = "Não importa a aparência, a Kei é a Kei!"
90001210-166 = "É que eu não gosto disso!"
90001210-167 = "U-uááá!"
90001210-186 = "Fuu, fuu…… haa."
90001210-187 = "A Aris está muito feliz por poder estar com a Kei."
90001210-188 = "E agora, conseguimos ajudar uma à outra."
90001210-189 = "……."
90001210-190 = "E, enfim."
90001210-191 = "……Às vezes eu penso."
90001210-192 = "No futuro ditado pelo destino, como seria a princesa — e como eu seria."
90001210-193 = "Deveriam existir inúmeras possibilidades."
90001210-195 = "Com certeza, até mesmo possibilidades que superam a luz do céu."
90001210-197 = "……Em algum lugar, esse tipo de final também deve ter existido."
90001210-198 = "A-a Aris não quer esse tipo de possibilidade!"
90001210-199 = "Não quero que as memórias que passei com todos sejam apagadas."
90001210-201 = "……Sim, eu sei."
90001210-202 = "Porque você é uma heroína."
90001210-206 = "……Você sabe o que é um herói, Kei?"
90001210-207 = "Não, honestamente, não é como se eu entendesse profundamente..."
90001210-208 = "Dizem que o herói é uma profissão que pode fazer qualquer coisa."
90001210-209 = "Mas, na verdade, não é assim."
90001210-210 = "Em força, o guerreiro é superior; em magia, o mago é superior."
90001210-211 = "Em agilidade, o ladrão é superior; em cura, o monge é superior."
90001210-212 = "Naturalmente, também não sou tão boa em negociações quanto um mercador."
90001210-213 = "A profissão de herói é aquela que não consegue fazer nada sozinha."
90001210-214 = "Então, por que ser um herói...?"
90001210-215 = "Porque é uma profissão que segue em frente junto com todos."
90001210-216 = "...Porque é uma existência que segura as mãos de todos e os mantém unidos."
90001210-217 = "Mesmo em lugares que não se alcança com a força de um só, podemos avançar se estivermos com todos."
90001210-218 = "O herói é apenas alguém que dá um passo à frente de todos..."
90001210-219 = "E tem a coragem de abrir caminho."
90001210-220 = "Por isso, Kei... por favor, fique sempre com a Alice."
90001210-221 = "Pelo mesmo caminho, observando o mesmo céu."
90001210-222 = "...Este é o pedido da Alice."
90001210-227 = "Muito obrigada, minha princesa."
90001210-228 = "Para isso, cumprirei meu último trabalho como aquela que a guia."
90001210-232 = "Isso é... o que significa?"
90001210-234 = "O papel de uma serva é..."
90001210-235 = "Acompanhá-la de perto, guiando seu caminho..."
90001210-236 = "E ensinar como caminhar pelo mundo."
90001210-237 = "...Talvez haja dias em que eu reclame um pouco para corrigir seus erros."
90001210-238 = "Ah não, essa última parte eu não quero..."
90001210-239 = "Sua origem é a princesa dos deuses sem nome."
90001210-240 = "Mesmo que você tenha abandonado o destino, sua essência não muda."
90001210-241 = "Assim como você era a princesa, e eu era a serva."
90001210-243 = "Esta visão é a prova disso."
90001210-244 = "Prova, você diz?"
90001210-245 = "Olhe para o céu, minha princesa."
90001210-246 = "As inúmeras luzes parecem muito bonitas, não é?"
90001210-247 = "Todas elas..."
90001210-248 = "Eram uma das suas possibilidades."
90001210-249 = "E agora, essa luz se tornará sua força."
90001210-250 = "……!"
90001210-251 = "Aqueles \"pirralhos\" não notarão nossa presença. #nPorque eu estou interferindo."
90001210-252 = "Elas não conseguem dominar o poder do \"deus sem nome\"."
90001210-253 = "Não tenha medo, minha princesa. #nVocê só está recuperando o que é seu."
90001210-254 = "Erga a cabeça e declare ao mundo com confiança."
90001210-255 = "Que você é a verdadeira dona — e a sucessora legítima."
90001210-256 = "Como usar esse poder é uma escolha sua."
90001210-257 = "Seja para abrir caminho como herói, ou para corrigir este mundo."
90001210-258 = "Não existe mais nenhum deus que possa impedi-la."
90001210-259 = "Eu seguirei a sua vontade."
90001210-260 = "Meu destino sempre esteve ao seu lado."
90001210-261 = "...Aqui e agora, cumprirei meu último dever."
90001210-262 = "Kei...!"
90001210-263 = "Como você já deve ter percebido — o conceito de tempo, originalmente, não existe."
90001210-264 = "A matéria é a mesma coisa. O que existe é apenas um espaço quase infinito, além de partículas extremamente pequenas."
90001210-265 = "Dependendo das coordenadas do observador, o passado, o presente e o futuro podem mudar de qualquer forma e, às vezes, existir simultaneamente."
90001210-266 = "E então, depois de encontrarmos possibilidades além das estrelas, estendemos a mão para a próxima possibilidade."
90001210-267 = "Vamos, por um momento... feche os olhos."
90001210-269 = "Minha preciosa"
90001210-271 = "Alice"
90001210-276 = "Vocês duas estão distraídas, o que houve?"
90001210-281 = "……Entendo, era isso."
90001210-282 = "Momoi, por quanto tempo a Alice e as outras ficaram distraídas?"
90001210-283 = "Hmm, uns dois segundos, eu acho?"
90001210-284 = "É sobre isso que se trata, Kei."
90001210-285 = "――Sim, Alice."
90001210-287 = "……?"
90001210-288 = "Alice, Kei... vocês estão bem?"
90001210-290 = "Sim, tanto a Alice quanto a Kei estão bem.#nRio-senpai, por favor, nos informe sobre a situação atual."
90001210-291 = "……Todos os dispositivos eletrônicos pararam de funcionar completamente."
90001210-292 = "O navio de transporte está aguardando na retaguarda, então talvez esteja seguro, mas... como não consigo operá-lo remotamente, não posso chamá-lo agora."
90001210-293 = "Está tudo bem."
90001210-294 = "――A Alice iluminará o caminho."
90001210-295 = "……?"
90001210-296 = "Você tem alguma solução em mente?"
90001210-297 = "Não consigo explicar muito bem, mas por favor, confie na Alice e na Kei."
90001210-298 = "[s] \"Eu sempre confio na Alice.\""
90001210-299 = "Obrigada, Sensei.#nGraças a isso, a Alice também ganhou coragem."
90001210-300 = "Kei."
90001210-301 = "Sim, Alice."
90001210-302 = "Posso te pedir um favor?"
90001210-303 = "Com certeza."
90001210-308 = "Este lugar está repleto da energia do poder do \"Deus sem Nome\"."
90001210-310 = "……!"
90001210-311 = "É por isso que estávamos presas aqui.#nComo estamos fora do alcance de observação de ondas de rádio, é por esse motivo que os dispositivos eletrônicos pararam."
90001210-312 = "Então era isso……!"
90001210-313 = "Agora que sabemos, o que devemos fazer……?"
90001210-314 = "É simples, se o inimigo criou um campo de força――"
90001210-315 = "Não há como não aproveitá-lo."
90001210-316 = "Isso é possível?"
90001210-317 = "Com certeza."
90001210-318 = "Se eu e a Alice estivermos juntas――"
90001210-319 = "Sim, a partir de agora é a vez da Kei e da Alice!"
90001210-320 = "Alice, o céu――#nVocê consegue ver?"
90001210-324 = "Eu consigo ver, Kei!#nEntão era assim que funcionava!"
90001210-325 = "Eu gostaria que o Sensei também pudesse ver a paisagem que a Alice está vendo!"
90001210-326 = "Eu ajustarei a potência."
90001210-327 = "A Alice só precisa provar quem é a verdadeira dona desse poder."
90001210-328 = "Entendido!#nVamos lá, Kei!"
90001210-335 = "Luz────！！！！！"
90001210-338 = "[000000]Luz────！！！！！[-]"
90001210-345 = "(A \"Espada de Luz\" da Alice literalmente cortou o céu noturno ao meio)"
90001210-346 = "(Um clarão tão brilhante que era impossível manter os olhos abertos coloriu o céu...)"
90001210-351 = "Aquilo é……?"
90001210-352 = "Não é uma aurora……?"
90001210-353 = "……Que lindo."
90001210-355 = "Considerando a latitude, não é algo impossível. #nMas isso é..."
90001210-356 = "Diretora, o equipamento está...!"
90001210-357 = "Está operando normalmente... Por que...?"
90001210-358 = "……。"
90001210-359 = "É graças a você, Aris."
90001210-360 = "Sim, porque Aris é uma heroína."
90001210-361 = "Pois ser uma heroína significa abrir caminhos junto com todos."
90001210-362 = "[s1] \"A aurora é linda, não é?\"\n[s2] \"Mas, por que será que uma aurora se formou?\""
90001210-365 = "Aris sabe, Sensei."
90001210-366 = "[s] \"Sério?\""
90001210-367 = "É porque aquela luz é..."
90001210-371 = "A nossa possibilidade."
90001210-377 = "Ei! O que está acontecendo!?"
90001210-378 = "E-emergência! O campo de força no local... colapsou completamente!"
90001210-379 = "E-e não só isso, os drones... a Flywheel-chan..."
90001210-381 = "Waaaaaah!"
90001210-382 = "N-não chore, Ein! #nNós vamos... bem, sabe... nos vingar por você!"
90001210-387 = "Além disso, há algo mais interessante... ou melhor, preocupante. #nAo analisar o log..."
90001210-388 = "O \"Poder Proibido\" que mantinha o campo de força desapareceu como se tivesse sido sugado para algum lugar—"
90001210-389 = "Logo depois, uma energia poderosa abateu os drones com um único golpe."
90001210-390 = "Hã!? Isso significa que entre aquelas pessoas existe alguém capaz de usar o \"Poder Proibido\" livremente?"
90001210-391 = "Mas quem...? As únicas possibilidades seriam Rio Tsukatsuki, Himari Akeboshi ou Toki Asuma."
90001210-392 = "Fora elas, ninguém mais entra na lista de suspeitos!"
90001210-393 = "A quantidade de energia expelida também está em um nível que não deveria ser possível."
90001210-394 = "Chegou ao ponto de romper temporariamente a ionosfera acima do local."
90001210-395 = "Como resultado, uma aurora foi gerada. #nAcho que isso pode ser confirmado visualmente."
90001210-396 = "Uma aurora...? #nDeve ser linda... ehehe."
90001210-397 = "Ah, sim... é linda."
90001210-398 = "Primeiro precisamos confirmar. #nExiste uma variável entre eles que desconhecemos."
90001210-399 = "Uma variável capaz de usar o \"Poder Proibido\" livremente e emitir energia forte o suficiente para perturbar o campo magnético."
90001210-400 = "O que será que é isso...?"
90001210-401 = "Dentro do que compreendemos, não existe nada capaz de liberar tal poder. #nMas se aconteceu de fato, não temos escolha a não ser aceitar."
90001210-402 = "Ainda assim, acho melhor mantermos isso em segredo da Irmã Mais Velha."
90001210-403 = "Concordo."
90001210-404 = "Sim, entendi..."
90001210-405 = "M-mas, se aquele adulto... o Sensei, continuar avançando assim..."
90001210-406 = "……。"
90001210-407 = "……。"
90001210-408 = "A Tifa-chan, será que ela está bem...?"
90001210-409 = "Por enquanto, vamos aumentar o nível de resposta. #nNão parece uma boa ideia continuar pensando como antes."
90001210-410 = "Concordo. É melhor estarmos preparados para todas as possibilidades."
90001210-411 = "E-eu entrarei em contato com a Tifa-chan... #nMas a Tifa-chan, basicamente, o Owl..."
90001210-412 = "Exato. A gestão de Tiphareth é minha função. #nEntão, aceitando a opinião da Soph de aumentar o nível de resposta...!"
90001210-413 = "……Vamos mostrar a essência dos profetas!"
90001210-414 = "I-isso é incrível, Owl!"
90001210-419 = "(...Por que essa inquietação não desaparece?)"
90001210-420 = "(Talvez isso não seja o suficiente...)"
90001210-421 = "(Mesmo que haja uma chance mínima...)"
90001210-426 = "(Nesse caso, contarei à Irmã Mais Velha...)"
90001210-428 = "Próximo episódio: Grid Point"
