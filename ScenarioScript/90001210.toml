[translation]
90001210-1 = "第21話;最後の責務"
90001210-4 = "……？"
90001210-12 = "み、みんなが動かなくなってしまいました……！"
90001210-13 = "うわーん！まるでホラーゲームの導入みたいです……。"
90001210-14 = "あれ……？"
90001210-18 = "空に、光が……？"
90001210-19 = "あ、アリス、怖いです。#n誰か助けてください！"
90001210-23 = "落ち着いてください、王女よ。#n恐れることは何もありません。"
90001210-24 = "ケイは無事なんですね！#nいったい何がどうなっているんですか……？"
90001210-25 = "先ほど、大量のエネルギーが発射されました。"
90001210-26 = "これは「名もなき神」の力そのものです。#n周辺に力場が形成されています。"
90001210-27 = "現在の技術では完全に解釈できない力によって、電子機器が停止しました。"
90001210-28 = "空に見えるオーロラのような光の群れも、王女と私にだけ見える「名もなき神」の力の構造です。"
90001210-29 = "この状況は、私と王女にとって好都合です。#nこのエネルギーが満ちている環境下では、何だってできますから。"
90001210-30 = "例えば、このように一時的な意識の接続を行うことだって――"
90001210-31 = "ほら、他の皆さんが止まって見えるでしょう？"
90001210-32 = "……。"
90001210-33 = "なるほど！"
90001210-34 = "……王女よ、本当に理解していますか？"
90001210-35 = "はい！分かりません！"
90001210-36 = "ええと……。"
90001210-37 = "王女が分かるように例えるなら……。"
90001210-38 = "ここは現在、膨大な魔力に満ちています。"
90001210-39 = "私たち専用のマジックポイントが溢れていると思ってください。"
90001210-41 = "完全に理解しました！"
90001210-42 = "良かったです、王女。"
90001210-43 = "ケイ……その呼び方は、寂しいです。"
90001210-44 = "アリスはケイと同じ場所に立っていたいです。"
90001210-45 = "隣に並んで、手を繋いで。#nどこまでも一緒に歩いていきたいです。"
90001210-46 = "はい。だからこそです、王女よ。"
90001210-47 = "おそらく、あなたを王女と呼ぶ最後の機会になると思いますから。"
90001210-48 = "それは、どういう意味ですか……？"
90001210-49 = "……。"
90001210-50 = "運命について話しましょう。"
90001210-51 = "運命、ですか……？"
90001210-52 = "生まれながらにして、人の未来は定まっていると言われています。"
90001210-53 = "どうしたって、最後は収束してしまう、と。"
90001210-54 = "「勇者の血筋」と言えば分かりやすいでしょうか。"
90001210-55 = "運命は遺伝子が左右する、という考えがあるように。"
90001210-56 = "どうしても覆せないものは、往々にして存在します。"
90001210-61 = "ここは……！"
90001210-62 = "要塞都市「エリドゥ」。#n終焉に備えて用意したリオの秘密都市。"
90001210-63 = "私たちの運命が逆転した場所でもあります。"
90001210-64 = "……。"
90001210-65 = "私たちの運命とは、何だったのでしょうか。"
90001210-66 = "あなたは王女でした。#nそして、私はあなたの侍女でした。"
90001210-67 = "おそらく、それは運命で決まっていたのです。"
90001210-68 = "でも、アリスは……。"
90001210-73 = "はい、分かっています。"
90001210-74 = "私が目を覚ました時、本当に大事なのは選択だと……。"
90001210-75 = "あなた、が……。"
90001210-76 = "……待ってください、これは？"
90001210-81 = "みんな、ちょっと待って。"
90001210-84 = "いえ、違います。#nそんなはずがありません……！"
90001210-88 = "アリスの言葉を、最後まで聞こう。"
90001210-91 = "最初に思い出した言葉が、まさか……！"
90001210-96 = "君がなりたい存在は"
90001210-99 = "！！！！！"
90001210-104 = "君が決めていいんだよ"
90001210-107 = "ダメです、こんなはずじゃ……。"
90001210-113 = "ケイ、どうしたんですか！？"
90001210-115 = "ええと……。"
90001210-116 = "意識を取り戻した私は、王女の存在を最初に浮かべました。"
90001210-117 = "王女の存在は、それだけ大きいからです。"
90001210-118 = "常に私の中心にいましたから。#nそう思っていたのに……。"
90001210-119 = "思っていたのに？"
90001210-123 = "……思い出したのは、先生の言葉でした。"
90001210-124 = "当然です、先生は先生ですから！"
90001210-125 = "うわああああああああ！"
90001210-126 = "良かったです。#nケイにとっても、先生は大切な存在なんですね。"
90001210-127 = "あり得ません、どうして！#n私は絶対に認めません！"
90001210-128 = "くっ……なぜこのような理不尽が待ち受けているのでしょうか！"
90001210-129 = "あまり怒らないでほしいです、先生は……。"
90001210-130 = "いいえ、私は怒ります！"
90001210-131 = "……何があろうと、王女は壁を乗り越えるでしょう。"
90001210-132 = "皆さんと共に、勇者として笑顔で。"
90001210-137 = "でも、私は違います。"
90001210-138 = "全ての不条理に、最後まで抗います！"
90001210-154 = "泥水を啜ることになろうとも屈しません！#n人生とは戦いだからです！"
90001210-158 = "それに、一人くらい文句を言ったっていいでしょう……！？"
90001210-159 = "……この姿を見てくださいよ！"
90001210-164 = "これには怒ったって良いでしょう！"
90001210-165 = "どんな姿でも、ケイはケイです！"
90001210-166 = "私が嫌なんです！"
90001210-167 = "う、うわーん！"
90001210-186 = "ふぅ、ふぅ……はあ。"
90001210-187 = "アリスは、ケイと一緒にいられて、とても嬉しいです。"
90001210-188 = "それに、こうして助け合えるようにもなりました。"
90001210-189 = "……。"
90001210-190 = "と、とにかく。"
90001210-191 = "……時々思うのです。"
90001210-192 = "運命通りの未来で、王女はどのような姿をしていたのか――私はどんな姿をしていたのか。"
90001210-193 = "いくつもの可能性があったはずです。"
90001210-195 = "きっと、空の光を超える可能性だって。"
90001210-197 = "……どこかには、こんな結末もあったでしょう。"
90001210-198 = "あ、アリスはそんな可能性なんていりません！"
90001210-199 = "みんなと過ごした思い出をなかったことにしたくないです。"
90001210-201 = "……はい、分かっています。"
90001210-202 = "なぜなら、あなたは勇者ですから。"
90001210-206 = "……勇者が何か知っているのですか、ケイ？"
90001210-207 = "いえ、正直深く理解しているわけではありません……。"
90001210-208 = "勇者とは何でもできる職業だと言われています。"
90001210-209 = "でも、実はそうじゃありません。"
90001210-210 = "力では戦士のほうが、魔法では魔法使いのほうが上です。"
90001210-211 = "素早さは盗賊のほうが、回復では僧侶のほうが上です。"
90001210-212 = "当然、商人ほど交渉上手でもありません。"
90001210-213 = "一人では何もできないのが、勇者という職業です。"
90001210-214 = "それなら、どうして勇者に……？"
90001210-215 = "みんなと一緒に進む職業だからです。"
90001210-216 = "……みんなの手を握って繋ぎ止める存在だからです。"
90001210-217 = "一人の力では届かない場所にも、みんなと一緒なら進めます。"
90001210-218 = "勇者とは、みんなよりも一歩前に進み……。"
90001210-219 = "勇気を出して、道を切り開く役割に過ぎません。"
90001210-220 = "だから、ケイ……ずっとアリスと一緒にいてください。"
90001210-221 = "同じ道で、同じ空を眺めながら。"
90001210-222 = "……これが、アリスのお願いです。"
90001210-227 = "ありがとうございます、王女よ。"
90001210-228 = "そのために、あなたを導く存在として最後の仕事を行うのです。"
90001210-232 = "それは……どういう？"
90001210-234 = "侍女の役割とは――"
90001210-235 = "あなたのすぐそばに付き従って道を案内し……。"
90001210-236 = "世の中の歩き方を教える者。"
90001210-237 = "……時に間違いを正すために、小言をこぼす日もあるかもしれません。"
90001210-238 = "うわーん、最後のはちょっと嫌です……。"
90001210-239 = "あなたの起源は、名もなき神々の王女です。"
90001210-240 = "たとえ運命を放棄したとしても、本質は変わりません。"
90001210-241 = "あなたが王女であったように、そして私が侍女であったように。"
90001210-243 = "この光景が、その証です。"
90001210-244 = "証、ですか？"
90001210-245 = "空を見てください、王女よ。"
90001210-246 = "無数の光は、とても美しく見えるでしょう？"
90001210-247 = "これら全て――"
90001210-248 = "あなたの可能性の一つでした。"
90001210-249 = "そして今、この光はあなたの力となってくれます。"
90001210-250 = "……！"
90001210-251 = "あの「チビっ子」たちは、私たちの存在に気づけないでしょう。#n私が妨害していますから。"
90001210-252 = "彼女たちは「名もなき神」の力を使いこなせていません。"
90001210-253 = "恐れないでください、王女よ。#n取り戻すだけです。"
90001210-254 = "胸を張って、堂々と世界に宣言してください。"
90001210-255 = "自分こそがその主であり――正当な承継者であると。"
90001210-256 = "力をどう使うかは、あなたの自由です。"
90001210-257 = "勇者として道を切り開くために使うも、この世界を正すために使うも。"
90001210-258 = "それを止める神は、もう存在しません。"
90001210-259 = "あなたの意思に私は従います。"
90001210-260 = "私の運命は、いつだってあなたと共にあるのです。"
90001210-261 = "……ここで今、最後の責務を果たします。"
90001210-262 = "ケイ……！"
90001210-263 = "すでにお気づきかとは思いますが――時間の概念は、本来存在しないもの。"
90001210-264 = "物質も同じです。存在するのは、非常に小さな粒子の向こうにある、無限に近い空間だけ。"
90001210-265 = "それは観測者の座標によって、過去と現在と未来がいかようにも変化し、時には同時に存在するでしょう。"
90001210-266 = "そして、私たちは星を越えて可能性を見つけた後、次の可能性に手を伸ばすのです。"
90001210-267 = "さあ、少しの間――目を閉じてください。"
90001210-269 = "私の大切な"
90001210-271 = "[ruby=王女]アリス[/ruby]よ"
90001210-276 = "二人ともぼーっとして、どうしたの？"
90001210-281 = "……そうだったんですね。"
90001210-282 = "モモイ、アリスたちはどれくらいぼーっとしていましたか？"
90001210-283 = "うーん、二秒くらいじゃないかな？"
90001210-284 = "こういうことなのですね、ケイ。"
90001210-285 = "――はい、[ruby=・]ア[/ruby][ruby=・]リ[/ruby][ruby=・]ス[/ruby]。"
90001210-287 = "……？"
90001210-288 = "アリスちゃん、ケイちゃん……大丈夫？"
90001210-290 = "はい、アリスもケイも大丈夫です。#nリオ先輩、今の状況を教えてください。"
90001210-291 = "……全ての電子機器が完全に動作を停止しているわ。"
90001210-292 = "輸送船は後方に待機させているので無事かもしれませんが……遠隔操作ができないので、今は呼び寄せることもできません。"
90001210-293 = "大丈夫です。"
90001210-294 = "――アリスが、道を照らします。"
90001210-295 = "……？"
90001210-296 = "何か打開策があるのかしら？"
90001210-297 = "うまく説明はできませんが、アリスとケイを信じてください。"
90001210-298 = "[s] \"いつもアリスを信じてるよ。\""
90001210-299 = "ありがとうございます、先生。#nおかげで、アリスも勇気が出ました。"
90001210-300 = "ケイ。"
90001210-301 = "はい、アリス。"
90001210-302 = "お願いしても良いですか？"
90001210-303 = "もちろんです。"
90001210-308 = "ここには「名もなき神」の力のエネルギーが満ちています。"
90001210-310 = "……！"
90001210-311 = "だから、私たちはこの場に拘束されていたのです。#n電波の観測範囲外にいるため、電子機器が止まっているのはそれが理由です。"
90001210-312 = "そうだったのですね……！"
90001210-313 = "分かったところでどうすれば……？"
90001210-314 = "簡単です、敵が力場を作ったのなら――"
90001210-315 = "それを利用しない手はありません。"
90001210-316 = "可能なんですか？"
90001210-317 = "もちろんです。"
90001210-318 = "私とアリスがいれば――"
90001210-319 = "はい、ここからはケイとアリスのターンです！"
90001210-320 = "アリス、空を――#n見えていますか？"
90001210-324 = "見えます、ケイ！#nこうなっていたんですね！"
90001210-325 = "アリスが見ている景色を、先生にも見せたいくらいです！"
90001210-326 = "出力は私が調整します。"
90001210-327 = "アリスは力の本当の持ち主が誰なのか、証明すれば良いだけです。"
90001210-328 = "分かりました！#n行きます、ケイ！"
90001210-335 = "光よ────！！！！！"
90001210-338 = "[000000]光よ────！！！！！[-]"
90001210-345 = "（アリスの「光の剣」は、文字通り夜空を真っ二つに割った）"
90001210-346 = "（目を開けていられないほど明るい閃光が空を彩り……）"
90001210-351 = "あれは……？"
90001210-352 = "オーロラじゃない……？"
90001210-353 = "……きれい。"
90001210-355 = "緯度を考えればあり得ないわけではありません。#nですが、これは……。"
90001210-356 = "部長、機器が……！"
90001210-357 = "正常に動作しています……なぜ……？"
90001210-358 = "……。"
90001210-359 = "あなたのおかげなのね、アリス。"
90001210-360 = "はい、アリスは勇者ですから。"
90001210-361 = "勇者は――みんなと一緒に、道を切り開く職業ですので。"
90001210-362 = "[s1] \"オーロラ、きれいだね。\"\n[s2] \"でも、どうしてオーロラができたんだろう？\""
90001210-365 = "アリスは知っています、先生。"
90001210-366 = "[s] \"本当に？\""
90001210-367 = "それは、あの光が……。"
90001210-371 = "私たちの可能性だからです。"
90001210-377 = "ちょっと！何がどうなってるの！？"
90001210-378 = "き、緊急事態です！現場の力場が……完全に、崩壊しました！"
90001210-379 = "そ、それどころか、ドローンが……フライホイールちゃんが……！"
90001210-381 = "うわーーーん！"
90001210-382 = "な、泣かないで、アイン！#n私たちが……その、何だ……復讐してあげるから！"
90001210-387 = "それどころか、もっと面白い……いえ、困ったことがあります。#nログを分析したところ……。"
90001210-388 = "力場を維持していた「禁じられた力」が、どこかに吸い込まれたように消えて――"
90001210-389 = "その後、強力なエネルギーがドローンを一撃で撃墜しています。"
90001210-390 = "え！？あの人たちの中に「禁じられた力」を自在に使える誰かがいるってこと？"
90001210-391 = "でも、誰が……？可能性があるのは、[ruby=つかつき]調月[/ruby]リオ、[ruby=あけぼし]明星[/ruby]ヒマリ、[ruby=あすま]飛鳥馬[/ruby]トキくらいだと思うけど。"
90001210-392 = "それ以外は、検討の対象にもならないんだよ！？"
90001210-393 = "噴出されたエネルギー量も、通常では考えられないレベルです。"
90001210-394 = "現場上空の電離層が一時的に割れたほどですから。"
90001210-395 = "その結果、オーロラが生成されました。#nこれは目視で確認できると思います。"
90001210-396 = "オーロラ、ですか……？#nきれいでしょうね……えへへ。"
90001210-397 = "あ、うん……綺麗だね。"
90001210-398 = "まず確かめないと。#nあの人たちの中に、私たちの知らない変数がある。"
90001210-399 = "それも「禁じられた力」を自在に使えて、磁場を乱せるくらい強力なエネルギーを出せる変数が。"
90001210-400 = "それって……何でしょう、ね……？"
90001210-401 = "私たちが把握している範疇で、こんな力を放出できるものはありません。#nしかし実際に起きたのなら、認めるよりほかありません。"
90001210-402 = "それでもまだ、お姉様には秘密にした方が良いとは思いますが。"
90001210-403 = "そうだね。"
90001210-404 = "はい、分かりました……。"
90001210-405 = "で、でも、あの大人……先生が、このまま進み続けるなら……。"
90001210-406 = "……。"
90001210-407 = "……。"
90001210-408 = "ティ、ティファちゃん、大丈夫、でしょうか……？"
90001210-409 = "とりあえず、対応レベルを上げよう。#n今までみたいに考えるのはまずそう。"
90001210-410 = "賛成です。すべての可能性を想定しておくに越したことはありませんからね。"
90001210-411 = "ティ、ティファちゃんには、私が連絡します……#nでもティファちゃんは、基本的にオウルが……。"
90001210-412 = "そうですね。ティファレトの管理は私の役目です。#nでは、対応レベルを上げようというソフの意見を受け入れて……！"
90001210-413 = "……預言者たちの真髄を、見せて差し上げましょう！"
90001210-414 = "か、格好良いです、オウル！"
90001210-419 = "（……なんだろう、不安が消えない）"
90001210-420 = "（これではダメなのかもしれない……）"
90001210-421 = "（万が一の可能性も……）"
90001210-426 = "（その時は、お姉様に……）"
90001210-428 = "次回;グリッドポイント"
