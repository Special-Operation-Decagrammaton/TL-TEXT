[translation]
1000902-1 = "すっごく美味しくなる方法"
1000902-2 = "ゲヘナ学園・生徒用第19グラウンド"
1000902-3 = "（イズミとの約束の場所に着いた）"
1000902-4 = "先生！こっちこっちー！"
1000902-5 = "[s1] \"とりあえず来てみたけど……。\"\n[s2] \"結局、何をするんだっけ？\""
1000902-10 = "これこれ。この本にね、昨日言った通りのことが書いてあったの。"
1000902-11 = "[s3] \"『運動に効く食事』……？\"\n[s4] \"ずいぶんストレートなタイトルだね。\""
1000902-12 = "うん。タイトルを見てこれは読むしかないなって思って、買ってみたら想像以上に面白かったから、取り憑かれたみたいに一気に読んじゃった。"
1000902-13 = "うん。タイトルを見てこれは読むしかないなって思って、買ってみたら想像以上に面白かったから、取り憑かれたみたいに一気に読んじゃった。"
1000902-14 = "[s] \"取り憑かれたみたいに……。\""
1000902-15 = "大事なのはここ！"
1000902-16 = "えーっとね……。"
1000902-17 = "「トライアスロンの選手として毎日激しい運動をする私は、食べることが大好きだった」"
1000902-18 = "「世の中には美味しい物がたくさんあるが、私が最も美味しいと思っているものがある」"
1000902-19 = "「ミッシンのカップラーメン、豚骨味だ」"
1000902-20 = "「毎日のようにランニング20km、スクワット200回、反復横跳び100回。このような過酷なメニューをこなした後、家に帰ってきてから食べるカップラーメンの味と言ったら……」"
1000902-21 = "「どんな山海珍味にも代えがたい、至福の味である……」"
1000902-22 = "……じゅるり。"
1000902-23 = "[s] \"えっと、イズミ。もしかして……？\""
1000902-24 = "これ……"
1000902-25 = "これだよ先生！"
1000902-26 = "つまりここに書かれている通り、激しい運動を終えてからカップラーメンを食べれば……！"
1000902-27 = "それはもう、最っっっ高に美味しい味になるってことだよね！"
1000902-28 = "[s] \"でもそれって多分……。\""
1000902-29 = "そういうわけで持ってきたよ！はい、豚骨味のカップラーメン。先生の分と合わせて2個！"
1000902-30 = "[s] \"人の話を聞いてない！けど用意が良い！\""
1000902-31 = "もちろんトッピングも忘れてないよ。ほら、イチゴジャム！"
1000902-32 = "[s] \"イ、イズミらしいチョイス……！\""
1000902-33 = "高い食材を使うこともなく、難しい調理法を必要とすることも無く、最上の味が味わえるかもしれないなんて……。"
1000902-34 = "もうじっとなんてしていられない！"
1000902-35 = "さあ、一緒に運動しよう、先生！"
1000902-36 = "[s] \"やっぱり私もか……。\""
1000902-38 = "（そしてイズミと二人で、地獄の特訓が始まった）"
1000902-45 = "いっち！にっ！さんっ！しっ！"
1000902-46 = "ほら、先生も頑張って！"
1000902-47 = "[s] \"キ、キツイ！！\""
1000902-49 = "次は、走り幅跳びだよ、先生！"
1000902-51 = "おいっち、にっ……！"
1000902-52 = "ふぅっ……！"
1000902-57 = "ファイトだよ、先生！"
1000902-58 = "[s] \"うおおおおっ……！！！\""
1000902-61 = "（その後も全力ダッシュ、スクワット、マラソン、腹筋、柔軟運動等々……）"
1000902-62 = "（2時間以上かけて、イズミと一緒に本に書かれている通りの運動をした）"
1000902-65 = "[ns] \"はぁ……はぁ……。\""
1000902-66 = "ふぅ……終わったー！達成感あるね！"
1000902-67 = "先生、大丈夫？"
1000902-68 = "[s] \"ひぃ、ひぃ……ふぅ……。\""
1000902-69 = "ツンツン、ツンツン。先生、生きてる～？"
1000902-70 = "[s] \"やっと……終わ……り……？\""
1000902-73 = "（グツグツグツ……）"
1000902-74 = "[s] \"バーナーまで用意してたなんて、徹底してるね。\""
1000902-75 = "美味しいモノのためにはこれくらい当たり前だよ～。"
1000902-77 = "（ガチャッ）"
1000902-78 = "さて、お湯を入れて……イチゴジャムも入れて……かき混ぜて～……あとは3分待つだけ！"
1000902-80 = "（じゅるっ……）"
1000902-83 = "うん、いいかな。"
1000902-84 = "じゃあ先生、食べよっか！"
1000902-85 = "[s] \"さて、味や如何に……。\""
1000902-87 = "あむっ、ずるずるずるっ！もぐもぐ……。"
1000902-88 = "……！"
1000902-89 = "こ、これはっ……！？"
1000902-90 = "[s5] \"イ、イズミ！？\"\n[s6] \"そ、そんなに美味しかった！？\""
1000902-91 = "……普通。"
1000902-92 = "……普通。"
1000902-93 = "[s] \"……え？\""
1000902-94 = "いつも通りの味がする……これ、いつものカップラーメンだよ……！"
1000902-95 = "ううん！いつも通り美味しいんだけど！でも、何て言うか……。"
1000902-96 = "そんなに劇的に味が変わってるわけじゃない……！？"
1000902-97 = "[s] \"それは、運動しただけだからというか何というか……。\""
1000902-98 = "でも、本に書いてあったのに……本が間違ってる？ううん、そんなことは無いだろうし、そうすると……。"
1000902-99 = "……食べ物が美味しく感じられる運動は人によって違う、とか？"
1000902-100 = "[s] \"……。\""
1000902-101 = "これは、まだまだきちんと調査してみる必要があるわね……。"
1000902-102 = "美食の研究を途中でなんてやめられないわ、美食研究会の一員として！……ちょっと足りないかも。もう一つ取ってこようかな。"
1000902-103 = "[s7] \"そ、そっか……。\"\n[s8] \"お、応援するね……！\""
1000902-104 = "うん！ありがとう！"
1000902-105 = "うん！ありがとう！"
1000902-108 = "（お腹が空くと普段より美味しく感じられるという当たり前のことであって、味が変わるわけじゃないんだよ、と、最後まで伝えることができなかった）"
