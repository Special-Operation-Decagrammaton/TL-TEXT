[translation]
1000902-1 = "O segredo para ficar incrivelmente delicioso"
1000902-2 = "Academia Gehenna - Campo de Treinamento nº 19 para Alunas"
1000902-3 = "（Cheguei ao local combinado com Izumi）"
1000902-4 = "Sensei! Por aqui, por aqui!"
1000902-5 = "[s1] \"Eu vim porque você pediu, mas...\"\n[s2] \"O que a gente vai fazer, afinal?\""
1000902-10 = "Isso aqui! Este livro diz exatamente o que eu te falei ontem."
1000902-11 = "[s3] \"'Refeições que potencializam o exercício'...?\"\n[s4] \"Um título bem direto, hein.\""
1000902-12 = "Sim. Quando vi o título, pensei que precisava ler, e quando comprei, achei mais interessante do que imaginava, então li tudo de uma vez como se estivesse possuída."
1000902-13 = "Sim. Quando vi o título, pensei que precisava ler, e quando comprei, achei mais interessante do que imaginava, então li tudo de uma vez como se estivesse possuída."
1000902-14 = "[s] \"Como se estivesse possuída...\""
1000902-15 = "O importante é aqui!"
1000902-16 = "Vejamos..."
1000902-17 = "\"Como uma atleta de triatlo que faz exercícios intensos todos os dias, eu adorava comer.\""
1000902-18 = "\"Existem muitas coisas deliciosas no mundo, mas há uma que considero a mais saborosa de todas.\""
1000902-19 = "\"O macarrão instantâneo de copo da Misshin, sabor tonkotsu.\""
1000902-20 = "\"Correr 20km, fazer 200 agachamentos e 100 saltos laterais quase todos os dias. Depois de completar uma rotina tão cruel, o sabor do macarrão instantâneo ao chegar em casa é...\""
1000902-21 = "\"Um sabor de felicidade suprema, que não pode ser substituído por nenhuma iguaria rara...\""
1000902-22 = "...Slurp."
1000902-23 = "[s] \"Ei, Izumi. Por acaso... você...?\""
1000902-24 = "Isso..."
1000902-25 = "É isso, Sensei!"
1000902-26 = "Ou seja, como está escrito aqui, se comermos macarrão instantâneo depois de um exercício intenso...!"
1000902-27 = "Vai ficar com um sabor absolutamente incrível, não é?!"
1000902-28 = "[s] \"Mas isso provavelmente...\""
1000902-29 = "Por isso eu trouxe! Aqui, macarrão instantâneo sabor tonkotsu. Dois, um para você e um para mim!"
1000902-30 = "[s] \"Você não me ouviu! Mas está bem preparada!\""
1000902-31 = "Claro, não esqueci dos acompanhamentos. Olha só, geleia de morango!"
1000902-32 = "[s] \"Uma escolha bem a cara da Izumi...!\""
1000902-33 = "Sem precisar de ingredientes caros ou métodos de preparo difíceis, podemos saborear o melhor sabor possível..."
1000902-34 = "Não consigo mais ficar parada!"
1000902-35 = "Vamos, vamos nos exercitar juntos, Sensei!"
1000902-36 = "[s] \"Eu também vou ter que participar, né...\""
1000902-38 = "（E assim, começou o treinamento infernal com a Izumi）"
1000902-45 = "Um! Dois! Três! Quatro!"
1000902-46 = "Vamos, Sensei, se esforce!"
1000902-47 = "[s] \"I-isso é exaustivo!!\""
1000902-49 = "O próximo é salto em distância, Sensei!"
1000902-51 = "Um, dois...!"
1000902-52 = "Ufa...!"
1000902-57 = "Força, Sensei!"
1000902-58 = "[s] \"Uoooooooh...!!!\""
1000902-61 = "（Depois disso, corridas de velocidade, agachamentos, maratona, abdominais, alongamentos, etc...）"
1000902-62 = "（Passamos mais de duas horas fazendo exatamente os exercícios descritos no livro com a Izumi）"
1000902-65 = "[ns] \"Haa... haa...\""
1000902-66 = "Ufa... terminamos! Que sensação de dever cumprido!"
1000902-67 = "Sensei, você está bem?"
1000902-68 = "[s] \"Hii, hii... ufa...\""
1000902-69 = "Cutucando, cutucando. Sensei, você ainda está vivo?"
1000902-70 = "[s] \"Finalmente... acabou...?\""
1000902-73 = "（Borbulhando...）"
1000902-74 = "[s] \"Até trouxe um maçarico, você é bem dedicada, hein.\""
1000902-75 = "Para conseguir algo delicioso, isso é o mínimo, né~."
1000902-77 = "(Click)"
1000902-78 = "Muito bem, colocar a água quente... adicionar a geleia de morango... misturar~... e agora é só esperar 3 minutos!"
1000902-80 = "(Slurp...)"
1000902-83 = "Hum, acho que está bom."
1000902-84 = "Então, Sensei, vamos comer!"
1000902-85 = "[s] \"Bem, vamos ver qual é o gosto...\""
1000902-87 = "Nhac, slurp, slurp, slurp! Mastiga, mastiga..."
1000902-88 = "……！"
1000902-89 = "I-Isso é...!?"
1000902-90 = "[s5] \"I-Izumi!?\"\n[s6] \"F-Ficou tão gostoso assim!?\""
1000902-91 = "……Normal."
1000902-92 = "……Normal."
1000902-93 = "[s] \"……Hã?\""
1000902-94 = "Tem o gosto de sempre... é o miojo de sempre...!"
1000902-95 = "Não, não! Está gostoso como sempre! Mas, como posso dizer..."
1000902-96 = "Não é como se o sabor tivesse mudado drasticamente...!?"
1000902-97 = "[s] \"Isso é porque você só se exercitou, ou algo do tipo...\""
1000902-98 = "Mas estava escrito no livro... será que o livro está errado? Não, não pode ser, então..."
1000902-99 = "……Será que os exercícios que fazem a comida parecer mais gostosa variam de pessoa para pessoa?"
1000902-100 = "[s] \"…….\""
1000902-101 = "Isso significa que ainda preciso investigar isso direito..."
1000902-102 = "Não posso desistir da pesquisa gastronômica no meio do caminho, como membro do Clube de Pesquisa Gastronômica! ...Acho que ainda falta um pouco. Vou pegar outro."
1000902-103 = "[s7] \"E-Entendi...\"\n[s8] \"E-Eu te apoio...!\""
1000902-104 = "Sim! Obrigada!"
1000902-105 = "Sim! Obrigada!"
1000902-108 = "(Não consegui dizer até o fim que é apenas um fato óbvio de que a comida parece mais gostosa quando se está com fome, e que o sabor em si não muda.)"
