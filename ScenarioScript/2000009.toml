[translation]
2000009-1 = "Esta noite é para você!"
2000009-2 = "Millennium - Corredor"
2000009-3 = "Sensei!"
2000009-4 = "Você veio."
2000009-5 = "Obrigada, mas não parece que teremos tempo para cumprimentos formais."
2000009-6 = "Alguém fez uma travessura na 1ª Usina de Energia de Millennium, que fica do outro lado da ponte."
2000009-7 = "Provavelmente foi obra de algum grupo de delinquentes que não gosta muito de Millennium."
2000009-8 = "Se continuar assim, o fornecimento de energia para Millennium será interrompido."
2000009-9 = "Agora está claro, então tudo bem, mas..."
2000009-10 = "Se não resolvermos essa situação antes de anoitecer..."
2000009-11 = "Millennium será envolta pela escuridão."
2000009-12 = "[s] \"Não é um exagero...?\""
2000009-13 = "Não estou brincando."
2000009-14 = "Como esta é uma escola de tecnologia de ponta, velas e lâmpadas são artigos raros por aqui."
2000009-15 = "Além disso... a partir desta noite, começa o evento para apreciar a vista noturna de Millennium..."
2000009-16 = "Com certeza, muitos alunos estavam esperando por este dia."
2000009-17 = "...Eu sou uma delas."
2000009-18 = "O que posso fazer é consertar a usina danificada."
2000009-19 = "Os outros veteranos do Clube de Engenharia estão dando o seu melhor nos reparos internos."
2000009-20 = "Eu preciso ir até a usina."
2000009-21 = "Preciso da sua ajuda, Sensei."
2000009-23 = "1ª Usina de Energia de Millennium"
2000009-25 = "Isso é... mais sério do que eu pensava."
2000009-26 = "Acho que houve um combate intenso quando expulsaram os delinquentes."
2000009-28 = "...Não adianta ficar falando, Sensei, vamos começar!"
2000009-30 = "Primeiro, vou verificar o núcleo nº 1... Como esperado, está completamente destruído."
2000009-31 = "Vou trocar pelo núcleo auxiliar que trouxe... Pronto... Núcleo nº 1 conectado!"
2000009-32 = "Verificando a operação de energia. Que bom. A unidade de alimentação parece estar intacta."
2000009-33 = "Mas... desse jeito não vai ter fim."
2000009-34 = "Se todos os núcleos até o nº 13 estiverem nesse estado..."
2000009-35 = "Mesmo que a gente conserte um por um... #nTalvez não dê tempo antes de anoitecer."
2000009-37 = "Verificando o núcleo nº 3! #nFelizmente, o estado não é tão ruim, então se eu consertar a fiação..."
2000009-39 = "O núcleo nº 7 também... reparo concluído. #nUfa, finalmente conectado."
2000009-40 = "[s1] \"Por que não descansa um pouco...?\"\n[s2] \"Quanto ainda falta?\""
2000009-41 = "...Com isso, chegamos apenas na metade."
2000009-42 = "...Com isso, chegamos apenas na metade."
2000009-43 = "O que eu faço? Se não terminarmos a tempo..."
2000009-44 = "...Snif."
2000009-45 = "[s3] \"Não desista.\"\n[s4] \"Viver um dia sem a ajuda da tecnologia não seria tão ruim.\""
2000009-47 = "...Sim."
2000009-49 = "...Não quero!"
2000009-50 = "Eu não... posso desistir."
2000009-51 = "Mesmo que não consigamos terminar a tempo..."
2000009-52 = "Se eu desistir aqui, não poderei me chamar de Meister de Millennium."
2000009-53 = "...Você não acha, Sensei?"
2000009-54 = "...Certo, vamos lá."
2000009-56 = "Pelo menos, até onde conseguirmos... Hã?"
2000009-57 = "...O nº 8... está bom?"
2000009-58 = "N-não pode ser!?"
2000009-59 = "O nº 9 também está praticamente novo?"
2000009-60 = "O-oh, talvez termine mais rápido do que eu pensava!"
2000009-61 = "Sensei!"
2000009-63 = "Depressa!"
2000009-65 = "Conectado até o núcleo 13. Reiniciando o sistema."
2000009-66 = "(Wiiiiiiin...)"
2000009-67 = "Por favor... por favor..."
2000009-69 = "(...Piron)"
2000009-70 = "Ah! Sucesso!"
2000009-71 = "M-muito obrigada, Sensei!"
2000009-72 = "Graças a você, consegui reiniciar toda a energia da usina."
2000009-73 = "Claro, é apenas uma medida de emergência, então precisaremos fazer uma manutenção adequada depois."
2000009-76 = "..."
2000009-77 = "...Sensei, quero retribuir a ajuda que você me deu."
2000009-78 = "Lembra que eu prometi te mostrar algo mais incrível que fogos de artifício?"
2000009-79 = "Acho que finalmente poderei te mostrar algo bom como agradecimento."
2000009-82 = "Que tal darmos uma saída?"
2000009-86 = "Já perdi a conta de quantas vezes disse isso, mas... mais uma vez."
2000009-89 = "[wa:1000]— Obrigado, [wa:500]Sensei. [wa:1500]Esta paisagem, [wa:1000]só é possível graças a você."
2000009-91 = "— É linda, não é? [wa:2700]Que bom que chegamos a tempo."
2000009-94 = "— Hm? [wa:1000]Por que [wa:1000]eu me esforcei [wa:1000]tanto assim?"
2000009-96 = "— Porque eu queria que as alunas do Millennium [wa:1700] pudessem..."
2000009-99 = "— Caminhar por estradas noturnas iluminadas com segurança."
2000009-102 = "[wa:500]— Porque é só isso... [wa:1800]que eu consigo fazer."
2000009-105 = "— E [wa:800]para mim..."
2000009-107 = "— Momentos como este [wa:1600] já são [wa:400] algo mais maravilhoso do que qualquer \"presente\"."
2000009-110 = "[wa:3000]— O que acha, [wa:500]Sensei? [wa:1500]Ainda temos tempo, então..."
2000009-112 = "— Você poderia... [wa:1300] ficar comigo por mais um pouco?"
2000009-115 = "É uma sensação estranha."
2000009-116 = "É uma paisagem que eu vejo todos os dias, com a qual estou acostumada."
2000009-117 = "Mas quando estou com o Sensei... ela parece tão..."
2000009-118 = "..."
2000009-119 = "...linda."
