[translation]
2000009-1 = "この夜をあなたに！"
2000009-2 = "ミレニアム・廊下"
2000009-3 = "先生！"
2000009-4 = "来てくれたんだね。"
2000009-5 = "ありがとう、でもちゃんと挨拶する時間もなさそう。"
2000009-6 = "さっき、橋の向こうにあるミレニアム第1発電所で、誰かがいたずらをしたの。"
2000009-7 = "おそらくミレニアムをよく思ってない、どこかの不良集団の仕業じゃないかと思うけど。"
2000009-8 = "このままだとミレニアムへの電力供給が途切れる。"
2000009-9 = "今は明るいからいいけど、"
2000009-10 = "夜になるまでにこの事態を解決できなければ……"
2000009-11 = "ミレニアムは、暗闇に包まれてしまう。"
2000009-12 = "[s] \"そんな大げさな……。\""
2000009-13 = "冗談を言ってるわけじゃない。"
2000009-14 = "科学の先端にある学校だから、ここではロウソクやランプも珍しい。"
2000009-15 = "それに……今夜から、ミレニアムの夜景を楽しむイベントが始まるのに……。"
2000009-16 = "この日を待っていた生徒たちは……きっと多いはず。"
2000009-17 = "……私も、その一人。"
2000009-18 = "私にできることは、壊れた発電所を修理すること。"
2000009-19 = "他のエンジニア部の先輩たちは、内部側の修理に全力を尽くしてる。"
2000009-20 = "発電所の方は、私が行かなきゃいけない。"
2000009-21 = "手伝ってほしい、先生。"
2000009-23 = "ミレニアム第1発電所"
2000009-25 = "これは……思ったより深刻。"
2000009-26 = "多分不良集団を追い出すときに、激しい戦闘があったんだと思う。"
2000009-28 = "……言ってても仕方ない、先生、始めよう！"
2000009-30 = "まずは1番コアを確認……やっぱり、完全に壊れてる。"
2000009-31 = "持ってきた補助コアに取り換えて……よし……1番コア連結！"
2000009-32 = "エネルギーの稼働を確認。良かった。電源部は無事みたい。"
2000009-33 = "でも……このままじゃきりがない。"
2000009-34 = "もし13番コアまで全部この状態だったら……"
2000009-35 = "このまま順番に直していっても……#n夜までに、間に合わないかもしれない。"
2000009-37 = "3番コアを確認！#n幸い、状態はひどくないから電線の修理さえすれば……。"
2000009-39 = "7番コアも……何とか修理完了。#nはあ、ようやく繋がった。"
2000009-40 = "[s1] \"ちょっと休んだら……？\"\n[s2] \"あとどれぐらい残ってる？\""
2000009-41 = "……まだこれで、やっと半分ぐらいだから。"
2000009-42 = "……まだこれで、やっと半分ぐらいだから。"
2000009-43 = "どうしよう、このまま時間までに間に合わなかったら……。"
2000009-44 = "……ぐすっ。"
2000009-45 = "[s3] \"諦めないで。\"\n[s4] \"一日ぐらい、文明の助けなしで生活するのも悪くないよ。\""
2000009-47 = "……うん。"
2000009-49 = "……嫌だ！"
2000009-50 = "諦め……られない。"
2000009-51 = "もし、このまま時間に間に合わないとしても……"
2000009-52 = "ここで諦めてしまったら、ミレニアムのマイスターとはいえない。"
2000009-53 = "……そう思わない？先生。"
2000009-54 = "……よし、やろう。"
2000009-56 = "せめて、やれるところまで……ん？"
2000009-57 = "……8番……良好？"
2000009-58 = "ま、まさか！？"
2000009-59 = "きゅ、9番もほぼ新品状態？"
2000009-60 = "お、思っていたより早く終わるかもしれない！"
2000009-61 = "先生！"
2000009-63 = "急いで！"
2000009-65 = "13番コアまで連結されました。システムを再起動します。"
2000009-66 = "（ウイィィィィィン……）"
2000009-67 = "お願い……お願い……。"
2000009-69 = "（……ピロン）"
2000009-70 = "っ！成功！"
2000009-71 = "ほ、本当にありがとう、先生！"
2000009-72 = "おかげで発電所の動力を全部再起動することができた。"
2000009-73 = "もちろん応急処置な部分も多いから、後できちんと整備しなきゃいけないけど。"
2000009-76 = "……。"
2000009-77 = "……先生、手伝ってくれたお返しがしたい。"
2000009-78 = "前に、花火よりすごいものを見せてあげるって約束したの……覚えてる？"
2000009-79 = "お返しとして、良いものを見せてあげられそうだから。"
2000009-82 = "ちょっと外に出てみない？"
2000009-86 = "もう何度目か分からないけど……あらためて。"
2000009-89 = "[wa:1000]― ありがとう、[wa:500]先生。[wa:1500]この風景は、[wa:1000]先生のおかげで叶ってるの。"
2000009-91 = "― 美しいでしょ？[wa:2700]間に合ってよかった。"
2000009-94 = "― うん？[wa:1000]どうして[wa:1000]そんなに……[wa:1000]頑張ったのかって？"
2000009-96 = "― ミレニアムの生徒たちが、[wa:1700]安全に……。"
2000009-99 = "― 輝く夜道が歩けるようにしてあげたかったから。"
2000009-102 = "[wa:500]― 私にできることは……[wa:1800]これくらいしかないから。"
2000009-105 = "― そして[wa:800]私にとって……。"
2000009-107 = "― こういう瞬間は[wa:1600]すでに[wa:400]「プレゼント」以上の、素敵なものなの。"
2000009-110 = "[wa:3000]― どう、[wa:500]先生？[wa:1500]まだ時間はあるから……。"
2000009-112 = "― もう少し……[wa:1300]一緒にいてくれる？"
2000009-115 = "変な気分だね。"
2000009-116 = "毎日見てた、見慣れた風景なのに。"
2000009-117 = "先生と一緒だと……こんなにも……。"
2000009-118 = "……。"
2000009-119 = "……きれい。"
