[translation]
51200-1 = "Episódio 20; O Contador de Histórias de Fantasmas do Clube Kacho Fugetsu (2)"
51200-5 = "……Que susto."
51200-6 = "Apontar uma arma para alguém do nada... que falta de educação, não acha?#nIsso dá um susto e tanto. Bem, não que funcione em mim, mas..."
51200-7 = "Por que você tem que estragar o clima logo agora que as coisas estavam ficando interessantes?"
51200-8 = "Professor do Schale e vocês outros... é muita falta de tato interromper um momento como este, não é?"
51200-9 = "[s] \"É porque a pessoa que causou todo esse alvoroço está bem na nossa frente.\""
51200-10 = "Estamos aqui pela paz da cidade, sabe?"
51200-11 = "Por isso, sentimos que tínhamos que te parar."
51200-12 = "Isso mesmo! Independentemente do motivo, já que uma confusão está acontecendo,#nnão podemos simplesmente deixar você em paz."
51200-13 = "Exatamente!"
51200-14 = "O pessoal do Clube de Treinamento vai te parar!"
51200-19 = "Pessoal..."
51200-20 = "Vocês..."
51200-22 = "……Foi por esse motivo que vocês atrapalharam o meu trabalho?"
51200-23 = "E estava quase acabando, viu."
51200-24 = "Que decepção... Não estraguem a história que estamos contando—"
51200-35 = "Por isso eu disse... que não fazia sentido, não disse?"
51200-36 = "Agora é a sua vez... a gata preta do Hyakkiyako?"
51200-38 = "Como o Clube de Treinamento disse, o importante é conter essa confusão."
51200-39 = "Mesmo que o oponente seja um monstro que faz duvidar da própria visão—#nO Hyakkaryoran não pode recuar."
51200-40 = "Renge, mantenha a calma."
51200-41 = "……E-eu sei disso!"
51200-42 = "Nagusa-senpai."
51200-47 = "……!"
51200-49 = "……Então, ela é a mente por trás de tudo, certo?"
51200-50 = "Haa... com certeza, ela tem toda a cara disso."
51200-51 = "Ei, ei, ei~ isso não é um pouco cruel?#nNão precisa falar desse jeito."
51200-52 = "Professor... sobre o ataque contra ela."
51200-53 = "[s] \"Sim, foi como atirar na superfície da água, passou direto.\""
51200-54 = "Viu só? Por isso eu disse que era inútil, não disse?"
51200-55 = "Diante do meu livro de histórias estranhas, o \"Ino Mononoke Roku\", vocês são impotentes. Não importa quem sejam, não podem causar nem um arranhão em mim, muito menos nas \"Cem Histórias\"!"
51200-56 = "—A menos que fosse a Ayame, é claro."
51200-57 = "Ah! Mas, mas!#nAqui só tem a Nagusa-chan, uma chorona inexperiente. Que pena!"
51200-59 = "…………."
51200-61 = "Heh..."
51200-62 = "Então você é só uma covarde que só sabe provocar de uma zona segura."
51200-63 = "Lá vem você de novo, que coisa feia~"
51200-64 = "Haa... bem, não importa mais."
51200-65 = "Não importa o quanto vocês façam barulho—"
51200-66 = "O pano da história já foi levantado.#nO \"palco\" e os \"atores\" que eu desejava já estão reunidos."
51200-67 = "As nossas \"Cem Histórias\" estão, lenta e seguramente—caminhando para o seu ponto final."
51200-68 = "[s1] \"……Shuro, qual é o verdadeiro objetivo do Clube Kacho Fugetsu?\"\n[s2] \"Por que causar toda essa confusão?\""
51200-71 = "Ahaha, você vai me perguntar isso só agora?"
51200-72 = "……Bem, tudo bem. Eu responderei para você."
51200-77 = "Tudo é—pelo \"estilo\"."
51200-78 = "Como contadora de histórias de fantasmas do Clube Kacho Fugetsu, é para completar as minhas \"Cem Histórias\"."
51200-80 = "Você invocou aquilo por um motivo desses?"
51200-81 = "O Clube Kacho Fugetsu é mais ocioso do que eu pensava."
51200-89 = "Ah!"
51200-90 = "Ahaha!"
51200-96 = "Ahahahahaha!!"
51200-97 = "O-o que é isso...!?"
51200-103 = "Que tolos."
51200-104 = "Vocês realmente pensam assim?"
51200-105 = "Manipular monstros, incendiar a cidade...#nE achar que a simples aparição de vocês diante de mim criaria as \"Cem Histórias\"."
51200-106 = "Que equívoco adorável... que mal-entendido tão estúpido."
51200-108 = "As nossas \"Cem Histórias\" são contos que vêm sendo transmitidos desde muito, muito tempo atrás."
51200-109 = "Algo que vocês nem sequer conhecem... sim, algo que nem conseguem imaginar."
51200-110 = "Para chegar até aqui... bastava apenas um único \"rumor\"."
51200-111 = "[s] \"...Um rumor?\""
51200-113 = "Sim. Um \"rumor\" é algo que, mesmo que você não se lembre de onde ouviu, permanece no cantinho da sua mente."
51200-114 = "Exato, o que é necessário é apenas... o \"rumor\"."
51200-115 = "Vejamos...#nPor exemplo, ensinar sobre a existência da \"Guerra de Sucessão\" para manipular uma jovem inocente..."
51200-116 = "[s] \"...!\""
51200-117 = "Ou dizer que \"a juventude só acontece agora\" para manipular uma garota tola..."
51200-119 = "...Hã?"
51200-121 = "E então, e então..."
51200-122 = "Dizer a uma garota extremamente arrogante que \"se ela se importa com sua veterana, deveria mandá-la de volta para casa\",#ne induzi-la a lutar contra a jovem inocente."
51200-127 = "[ns] \"...Não pode ser.\""
51200-129 = "Vocês sabiam de tudo desde o começo, não sabiam?"
51200-133 = "Tudo isso só foi possível porque o Sensei do Schale...#nporque você, senhor, veio até aqui."
51200-134 = "O motivo de você ter vindo até aqui... você tem uma ideia, não tem?"
51200-142 = "[ns] \"...A carta endereçada ao Departamento Yin-Yang.\""
51200-143 = "Ah, ahahaha!"
51200-144 = "[s] \"Será que... desde o início...\""
51200-145 = "Cada um lutou e sofreu para tomar a \"melhor\" atitude..."
51200-146 = "E por causa dessa melhor atitude, tudo foi arruinado..."
51200-147 = "Quem diria que o que deveria ser o melhor, na verdade, era o \"pior\"... nem nos seus sonhos, não é?"
51200-148 = "Ah, que coisa, não é mesmo?"
51200-149 = "Uma história tão tola... e tão maravilhosa!"
51200-150 = "Ahaha! Tenho que agradecer a vocês, tolos, não é?"
51200-151 = "Graças à estupidez de vocês, posso recriar a história de fantasmas de 20 anos atrás."
51200-164 = "Outro monstro...!"
51200-165 = "Kaede-chan! Não se afaste de mim!"
51200-166 = "S-sim...!"
51200-181 = "É inútil, sabe? O conflito já começou."
51200-182 = "A nossa elegância está apenas começando... sim, o clímax que todos esperavam está por vir."
51200-183 = "Graças aos esforços de vocês, a protagonista da história nasceu."
51200-184 = "Ahaha! Sim, sim! Vamos deixar que aquela pessoa... se torne a protagonista."
51200-188 = "...Não pode ser, Yukari!"
51200-189 = "Hã!?"
51200-190 = "Ihihi! Eu esperava que vocês percebessem pelo menos isso."
51200-193 = "Sim, sim! É isso mesmo. Graças a vocês...#nA garota que carrega as feridas e o desespero mais profundos do que qualquer outra..."
51200-194 = "Uma garota pobre e miserável, presa na maldição de que \"precisa recriar o palco de 20 anos atrás\"."
51200-196 = "Ah... tenho certeza de que ela...!#nNos proporcionará uma elegância maravilhosa...!"
51200-197 = "Sim... ela será a melhor das Cem Histórias!"
51200-202 = "Vocês... de novo, como na época da Ayame..."
51200-203 = "[s] (Na época da Ayame...?)"
51200-208 = "Muito bem, então, com licença."
51200-212 = "[ns] \"Pessoal, peguem a Shuro...!\""
51200-221 = "É inútil, sabe?"
51200-226 = "A história que começou a se mover não pode mais ser parada por ninguém."
