[translation]
51200-1 = "Episódio 20; A Contadora de Histórias de Fantasmas do Clube das Flores, Pássaros, Vento e Lua (2)"
51200-5 = "......Que susto."
51200-6 = "Apontar uma arma para alguém do nada assim... é falta de educação, sabia? #n Quer me matar do coração? Bom, não é como se fosse funcionar em mim..."
51200-7 = "Por que estão estragando a diversão quando as coisas estavam começando a ficar animadas?"
51200-8 = "Sensei da Schale e companhia... É de muito mau gosto atrapalhar em um momento como este, sabia?"
51200-9 = "[s] \"Porque a pessoa responsável por todo esse tumulto está bem na nossa frente.\""
51200-10 = "Nós estamos aqui para manter a paz na cidade~"
51200-11 = "Por isso, achei que deveríamos detê-la."
51200-12 = "Sim! Seja qual for o motivo, já que um tumulto está ocorrendo, #n não podemos simplesmente deixá-la em paz."
51200-13 = "Isso mesmo!"
51200-14 = "O Clube de Treinamento inteiro vai te deter!"
51200-19 = "Pessoal..."
51200-20 = "Vocês..."
51200-22 = "......É por um motivo desses, que vocês estão me atrapalhando? "
51200-23 = "Faltava só mais um pouquinho."
51200-24 = "Acabou com a minha empolgação... por favor, não estraguem as nossas hist――"
51200-35 = "Eu já disse... que é inútil, não disse? "
51200-36 = "Agora é você... a gatinha preta da Hyakkaryouran?"
51200-38 = "Como o Clube de Treinamento disse, o mais importante agora é acalmar a situação."
51200-39 = "Mesmo que o oponente seja um espírito maligno que nos faça duvidar dos próprios olhos―― #n a Hyakkaryouran não pode recuar. "
51200-40 = "Renge, concentre-se."
51200-41 = "......S, sim, eu sei!"
51200-42 = "Nagusa-senpai."
51200-47 = "......!"
51200-49 = "......Aquela ali é a mente por trás de tudo isso, certo?"
51200-50 = "Haa... ela realmente tem cara de vilã."
51200-51 = "Ei, ei~ que maldade é essa? #n Não precisava falar assim."
51200-52 = "Sensei... sobre o meu ataque a ela agora."
51200-53 = "[s] \"Sim, passou direto por ela como se tivesse atirado na água.\""
51200-54 = "Isso mesmo, não foi? Então, então, eu não disse que era inútil?"
51200-55 = "Diante do meu livro misterioso 'Inou Mononokeroku', vocês são impotentes. Não importa quem seja, ninguém pode fazer um arranhão sequer na 'Hyakumonogatari', e claro, muito menos em mim!"
51200-56 = "――A não ser que seja a Ayame."
51200-57 = "Ah! Mas, mas! #n Aqui só temos a chorona e inexperiente da Nagusa-chan. Que pe~na!"
51200-59 = "............"
51200-61 = "Entendi..."
51200-62 = "É apenas uma covarde que só consegue provocar a partir de um lugar seguro."
51200-63 = "Ai, ai, de novo, isso é muito cruel~"
51200-64 = "Haa... bem, não importa mais."
51200-65 = "Não importa o quanto vocês façam barulho――"
51200-66 = "As cortinas da história já se abriram. #n O 'palco' e os 'atores' que eu desejava estão reunidos."
51200-67 = "A nossa 'Hyakumonogatari' está se dirigindo de forma lenta, mas certa―― para o seu desfecho."
51200-68 = "[s1] \"......Shuro, qual é o verdadeiro objetivo do Clube das Flores, Pássaros, Vento e Lua?\"\n[s2] \"Para que causar todo esse tumulto?\""
51200-71 = "Ahaha, agora, só agora, você está me perguntando isso? "
51200-72 = "......Bem, tudo bem. Vou responder a sua pergunta."
51200-77 = "Tudo é―― em prol da 'Elegância'. "
51200-78 = "Para criar a minha 'Hyakumonogatari', como a contadora de histórias de fantasmas do Clube das Flores, Pássaros, Vento e Lua."
51200-80 = "Por um motivo desses, você invocou aquela coisa?"
51200-81 = "O Clube das Flores, Pássaros, Vento e Lua tem mais tempo livre do que eu pensava."
51200-89 = "Aha!"
51200-90 = "Ahaha!"
51200-96 = "Ahahahahah!!"
51200-97 = "O-o que foi...!?"
51200-103 = "Que tolice."
51200-104 = "Vocês realmente acham isso?"
51200-105 = "Que apenas controlar monstros, queimar a cidade e... #n aparecer na frente de vocês seria o suficiente para criar uma 'Hyakumonogatari'."
51200-106 = "Que erro mais adorável... ter um mal-entendido tão tolo."
51200-108 = "Sendo que a nossa 'Hyakumonogatari' é uma história que foi passada de geração em geração, muito, mui~to tempo atrás."
51200-109 = "Algo que vocês não têm como saber―― sim, algo que vocês não podem nem imaginar."
51200-110 = "Para chegar até aqui... bastou apenas um 'boato'."
51200-111 = "[s] \"......Boato?\""
51200-113 = "Sim. Os 'boatos' são coisas que ficam num canto da nossa mente, mesmo que não nos lembremos de onde os ouvimos."
51200-114 = "Isso mesmo, tudo o que precisávamos era―― apenas de 'boatos'."
51200-115 = "Deixe-me ver... #n Por exemplo, contar sobre a existência da 'Batalha de Sucessão' para fazer uma jovem ingênua agir――"
51200-116 = "[s] \"......!\""
51200-117 = "E fazer uma garota tola agir dizendo que 'a juventude é só agora'――"
51200-119 = "......Hã?"
51200-121 = "E também, e também..."
51200-122 = "Dizer a uma garota arrogante que 'se ela se importa com a sua kouhai, deveria mandá-la de volta para casa', #n e manipulá-la para lutar contra a jovem ingênua."
51200-127 = "[ns] \"......Não pode ser.\""
51200-129 = "Vocês já sabiam tu~do isso desde o início, não é mesmo?"
51200-133 = "E eu só consegui fazer isso tu~do, graças ao Sensei da Schale... #n Graças a você ter vindo até aqui."
51200-134 = "Você sabe o motivo... pelo qual veio até aqui, não sabe?"
51200-142 = "[ns] \"......A carta, endereçada ao Clube Yin-Yang.\""
51200-143 = "Aha, Ahaha!"
51200-144 = "[s] \"Será que... desde o início...\""
51200-145 = "Cada um lutando e sofrendo para tomar a 'melhor' decisão――"
51200-146 = "E por causa [ruby=disso]dessa decisão[/ruby], tudo acaba arruinado..."
51200-147 = "O que deveria ser a melhor decisão acabou sendo a 'pior'... Nem nos seus pesadelos poderiam imaginar isso―― não é?"
51200-148 = "Ah, que tragédia."
51200-149 = "Uma história tão tola―― e maravilhosa!"
51200-150 = "Ahaha! Devo agradecer a vocês, seus tolos. "
51200-151 = "Graças à idiotice de vocês―― eu poderei recriar a história de fantasmas de 20 anos atrás."
51200-164 = "Outro monstro...!"
51200-165 = "Kaede-chan! Não se afaste de mim!"
51200-166 = "S-Sim...!"
51200-181 = "É inútil, sabia? As chamas da batalha já foram acesas."
51200-182 = "A nossa elegância só está começando... sim, a partir de agora é o tão aguardado clímax."
51200-183 = "Pois graças aos esforços de vocês―― a protagonista da história nasceu."
51200-184 = "Ahaha! Sim, sim! Faremos com que ela―― seja a nossa protagonista."
51200-188 = "......Não me diga que, a Yukari!"
51200-189 = "Hã!?"
51200-190 = "Ihihi! Era de se esperar que vocês percebessem pelo menos isso."
51200-193 = "Sim, sim! Isso mesmo. Graças a vocês... #n A garota que carrega a ferida e o desespero mais profundos de todos――"
51200-194 = "Uma garota muito, mui~to lamentável que ficou presa à maldição de que 'o palco de 20 anos atrás deve ser recriado'."
51200-196 = "Ah... Tenho certeza de que ela...! #n Proporcionará uma elegância maravilhosa...!"
51200-197 = "Sim... ela se tornará a melhor Hyakumonogatari de todas!"
51200-202 = "Vocês vão... fazer de novo, como na época da Ayame..."
51200-203 = "[s] (Época da Ayame...?)"
51200-208 = "Muito bem, muito bem, então eu me despeço por aqui."
51200-212 = "[ns] \"Pessoal, a Shuro――!\""
51200-221 = "É inútil, sabia?"
51200-226 = "Porque uma vez que a história começa a se mover, ninguém mais pode pará-la."
