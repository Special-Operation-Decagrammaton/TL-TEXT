[translation]
2600608-1 = "Em busca das nuvens"
2600608-2 = "Kivotos - Dentro da estação de metrô"
2600608-5 = "Nodoka caminha carregando um grande telescópio nas costas."
2600608-6 = "[s] \"Bom dia, Nodoka.\""
2600608-8 = "Ah, bom dia, Sensei. Está indo trabalhar agora?"
2600608-9 = "O tempo está ótimo hoje. Em dias assim, se subirmos em um lugar alto, com certeza conseguiremos ver bem longe."
2600608-10 = "Essa não é a linha para a Academia Federal Red Winter, é?"
2600608-11 = "Ah, sim, é verdade. Na verdade, hoje eu não estou indo para a academia, estou a caminho de uma estação depois das montanhas para ver as nuvens."
2600608-12 = "Quando acordei e olhei para o céu do leste, vi uns cirros lindos pairando na encosta da montanha."
2600608-13 = "Acho que eles devem parecer ainda mais bonitos vistos de cima da montanha, então saí trazendo meu telescópio."
2600608-14 = "[s] \"Esse telescópio não é pesado?\""
2600608-15 = "Isso aqui?"
2600608-16 = "Claro que é pesado, mas... se eu não tiver o equipamento adequado, não conseguirei observar a bela paisagem como se deve."
2600608-17 = "Se for para ver uma paisagem bonita, esse peso não é nada demais."
2600608-18 = "Sensei, por que não vem comigo ver as nuvens?"
2600608-19 = "Ah, tem muito trabalho no Schale e não vai conseguir ir, é?"
2600608-20 = "Que pena, mas não tem jeito, né..."
2600608-21 = "Eu vou ver bastante daquela paisagem linda por você!"
2600608-22 = "[s] \"Quer que eu segure o telescópio por um instante?\""
2600608-23 = "Ah, muito obrigada, Sensei."
2600608-27 = "Então, por favor, me acompanhe até a plataforma!"
2600608-29 = "Depois de me despedir de Nodoka na plataforma, voltei para o Schale."
