[translation]
2502-1 = "O caminho dos jogos começa pelas boas maneiras (2)"
2502-2 = "Arredores do Millennium - Grande Fliperama"
2502-7 = "Nossa, parece bem maior do que da última vez que viemos. Será que fizeram uma reforma?"
2502-8 = "Pode ser. Ah, olha só! Tem até a nova máquina de arcade de 'Space Cat'!"
2502-10 = "Yuzu, tem um quiosque de demonstração de um novo console ali."
2502-11 = "Ah...! Finalmente, a era da 15ª geração de consoles chegou..."
2502-12 = "Hum... ah, o sistema de resfriamento lateral é de um novo tipo... corrigiram os problemas anteriores."
2502-13 = "A parte da memória também parece bem diferente, a velocidade de resposta está muito mais rápida..."
2502-14 = "Ahaha... a Yuzu realmente vira outra pessoa quando começa a falar de jogos."
2502-15 = "Irmã, vamos jogar 'Space Cat' também?"
2502-16 = "Sim, então não vou pegar leve..."
2502-17 = "Quer dizer... não! Não é hora para isso!"
2502-18 = "Esqueceu por que viemos aqui? Precisamos encontrar aquele jogador sem modos logo!"
2502-21 = "Bom, na verdade eu vim aqui para comprar um controle novo, mas..."
2502-22 = "Momoi, tem muitos monstros para derrotar. Por qual jogo vamos começar?"
2502-23 = "Eu também... não queria brigar... só queria continuar olhando os consoles novos..."
2502-24 = "Nada disso! Enquanto estamos aqui, aquele usuário pode estar destilando ódio em algum outro lugar!"
2502-25 = "Se os jogadores ficarem desanimados e pararem de jogar, e outros fizerem o mesmo... um dia, os jogos competitivos vão acabar!"
2502-26 = "Isso não é ser pessimista demais...?"
2502-27 = "Entendo, esta é uma batalha nobre para salvar o mundo..."
2502-28 = "Heróis, vamos para a fortaleza do Rei Demônio imediatamente!"

2502-29 = "Certo, vamos logo para onde tem o 'Student Fighter 2'!"
2502-31 = "Tem menos gente do que eu pensava. Será que já foi embora?"
2502-32 = "Não, ainda não dá para saber. Dá uma olhada no ID da tela."
2502-35 = "Não é esse usuário..."
2502-38 = "Esse também não..."
2502-46 = "Isso aí! Ganhei de novo! Vitória atrás de vitória!"
2502-47 = "Ugh, perdi de novo... e olha que eu treinei tanto..."
2502-48 = "Treinou? Aqueles combos que parecem que você apertou os botões por acidente? Tá falando sério?"
2502-49 = "Desse jeito, até jogando com os pés eu ganharia! Kuku, ahaha!!"
2502-50 = "Ei, não precisa falar assim só por causa de um jogo!"
2502-51 = "Retira o que disse agora mesmo!"
2502-52 = "Nem pensar, idiota. Se não consegue nem jogar direito, o que você sabe fazer? Se não consegue se esforçar nem em algo divertido, em que mais conseguiria? Estudos? Esportes? Namoro?"
2502-53 = "Ugh... vou contar tudo pra minha mãe!"
2502-57 = "Nossa, que horror. Não acredito que existem jogadores que destilam tanto ódio assim, mesmo pessoalmente."
2502-58 = "Ah, achei! Aquele ID!"
2502-61 = "Hm? O que foi? Vocês também querem me desafiar?"
2502-64 = "Você é a 'Sukeban312', né? Ontem, na partida online, você me chamou de 'vovó'!"
2502-65 = "Então quer dizer que... você é a 'Peach_Fighter'?"
2502-66 = "Haha, olha só, como eu pensei, é só uma pirralha."
2502-67 = "Eu não sou pirralha!"
2502-68 = "Ser assim mesmo pessoalmente... que pessoa mal-educada."
2502-69 = "...Momoi. Vamos purificar esse rei demônio maligno?"
2502-70 = "Se não pedir desculpas pelo que disse ontem agora mesmo, vai se arrepender! Pede desculpas logo!"
2502-71 = "Nem pensar."
2502-72 = "Por que não?!"
2502-73 = "Eu não peço desculpas para quem é mais fraco que eu."
2502-74 = "Por que eu deveria baixar a cabeça para alguém que joga pior que eu? Meu orgulho seria ferido sem motivo."
2502-76 = "Sua...!"
2502-77 = "...Irmã, posso atirar?"
2502-78 = "Ó, heroína, se for da sua vontade, eu me retiro a qualquer momento."
2502-80 = "Hah, se você insiste tanto, que tal resolvermos isso de uma vez no 'Student Fighter 2'? Se você conseguir me vencer pelo menos uma vez, eu peço desculpas pelo que aconteceu ontem."
2502-81 = "Você disse isso, então tá bom. Dessa vez eu não vou pegar leve...!"
2502-82 = "É melhor você já ir pensando no seu pedido de desculpas!"
2502-83 = "Então..."
2502-89 = "Lutar!"
2502-96 = "<SYSTEM> Vitória da jogadora 「Sukeban312」!"
2502-97 = "Pff, o quê?! Você veio toda confiante para uma revanche e é só isso?"
2502-98 = "Você não tem nenhum talento para jogos, não é? Hehe...!"
2502-99 = "Ei! Ficar agachada no canto da tela só esperando é trapaça!"
2502-100 = "Ganhar só usando golpes de contenção é covardia!"
2502-101 = "Não, não, isso é uma técnica legítima do jogo. Se está frustrada, deveria ter procurado uma estratégia para vencer. Não é um pouco infantil ficar inventando regras próprias só porque está perdendo?"
2502-102 = "Ugh... ah, qual é!"
2502-104 = "Deixando os golpes de contenção de lado... aquele golpe especial da sua irmã, que deveria causar dano mesmo com a guarda, parece que não fez efeito nenhum...?"
2502-105 = "Não tem algo errado...?"
2502-106 = "...Provavelmente, ela está usando um bug."
2502-107 = "Um bug?"
2502-108 = "Sim. Em 'Student Fighter 2', existe um bug onde, ao realizar uma sequência específica de comandos, a tela congela por um breve instante."
2502-109 = "Acredito que ela esteja abusando desse bug para desviar dos ataques da Momoi. Foi o que a Alice percebeu."
2502-110 = "A-assim não tem como ganhar, né!?"
2502-111 = "Se a diferença de habilidade fosse grande, tudo bem, mas com ela jogando bem desse jeito..."
2502-114 = "..."
2502-121 = "Hum... desculpem, eu poderia tentar no lugar da Momoi...?"
2502-122 = "Hm, uma nova desafiante?"
2502-123 = "Ok, aceito o desafio. Bem, não importa quantas venham, o resultado vai ser o mesmo. Hahaha!"
2502-124 = "...Ufa. Só um pouquinho..."
2502-125 = "<SYSTEM> A partida começou!"
2502-132 = "<SYSTEM> Perfeito! Vitória da jogadora 「UZQueen」!"
2502-133 = "I-impossível... Eu perdi para uma pirralha dessas?"
2502-134 = "E ainda por cima sem levar dano...! Fui derrotada por um combo contínuo sem conseguir fazer nada...!"
2502-135 = "...Peça desculpas."
2502-136 = "...Hã?"
2502-137 = "Como prometido, peça desculpas para a Momoi..."
2502-138 = "Tsc... bom, era uma promessa, né."
2502-140 = "...Foi mal. Tanto ontem quanto agora, eu exagerei um pouco."
2502-143 = "Yuzu, você é incrível! Conseguiu de primeira!"
2502-144 = "E ainda uma vitória perfeita... Como esperado da Yuzu-chan!"
2502-145 = "Como esperado da lendária heroína, 「UZQueen」!"
2502-146 = "E-ei, pessoal, não é para tanto... Fico com vergonha quando dizem essas coisas..."
2502-148 = "E-espera aí! V-você é a 「UZQueen」?"
2502-149 = "Aquela lendária gamer que nunca cedeu o topo do ranking online, mas que ninguém nunca viu o rosto!?"
2502-150 = "Eu não sei se sou uma gamer lendária... mas sim. A UZQueen sou eu."
2502-153 = "Hã? Aquela garota é a UZQueen!?"
2502-154 = "A UZQueen... aquela lenda que está sempre em primeiro lugar não só em jogos de luta, mas também em jogos de ritmo!?"
2502-155 = "A UZQueen realmente existe..."
2502-156 = "Senhorita UZQueen, me dá um autógrafo!"
2502-157 = "Ei, ei, respeitem a fila! Eu vou atirar, hein!? Eu que vou pedir o autógrafo primeiro!"
2502-158 = "U-uau... t-tem muita gente..."
2502-159 = "M-Momoi, Midori, Alice-chan! M-me ajudem...!"
2502-160 = "Ah, é, afinal estamos num fliperama. Todo mundo aqui conhece ela."
2502-161 = "Fico tão feliz em ver que tem tanta gente que gosta da Yuzu-chan. De alguma forma, isso me deixa muito contente também."
2502-162 = "Para se tornar uma grande rainha, é preciso suportar o peso da coroa."
2502-163 = "E-eu não estou jogando porque quero me tornar algo assim...!"
2502-164 = "Vossa Majestade UZQueen, já que estamos aqui, por favor, nos ensine como melhorar!"
2502-165 = "Por favor, jogue uma partida comigo...!"
2502-166 = "Tem tanta gente chegando..."
2502-167 = "Ah, ahhhhh...!!"
2502-169 = "Depois disso, Yuzu, mesmo estando em pânico, esforçou-se para cumprimentar cada um dos fãs que a cercavam e, só então, conseguiu finalmente sair do fliperama..."
2502-170 = "O caminho dos jogos começa com boas maneiras"
