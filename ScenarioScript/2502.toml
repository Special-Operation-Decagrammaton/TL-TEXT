[translation]
2502-1 = "ゲームの道はマナーから（２）"
2502-2 = "ミレニアム近隣・大型ゲームセンター"
2502-7 = "何だか、前に来た時よりもだいぶ広くなったね。改築工事でもしたのかな？"
2502-8 = "確かにそうかも。あっ、『スペースキャット』の新作アーケードも入ってる！"
2502-10 = "ユズ、あそこに新しい据え置き型ゲーム機の試遊台があります。"
2502-11 = "あぁ……！ついに、第15世代ゲームコンソールの時代が……"
2502-12 = "えっと……あ、側面に新しい方式の冷却装置……前の問題点がちゃんと改善されてる。"
2502-13 = "メモリの部分も全然違うかも、反応速度がだいぶ速くなって……。"
2502-14 = "あはは……やっぱりユズはゲームに触れると人が変わったみたいになるね。"
2502-15 = "お姉ちゃん、私たちも『スペースキャット』やってみようよ。"
2502-16 = "うんっ、じゃあ手加減無しで……"
2502-17 = "……じゃなくて！こんなことしてる場合じゃないよ！"
2502-18 = "ここに来た目的を忘れたの？早くあのマナーのなってないゲーマーを見つけなきゃ！"
2502-21 = "いや、そもそも私は新しいコントローラーを買いに来たんだけど……。"
2502-22 = "モモイ、倒すべきモンスターがたくさんです。どのゲームからやりましょう？"
2502-23 = "わたしも、喧嘩なんてしないで……ずっと新しいゲーム機を見てたい……。"
2502-24 = "ダメダメ！こうしてる間にも、あのユーザーがまたどこかで暴言を吐いているかもしれないんだよ！？"
2502-25 = "それで落ち込んじゃったユーザーがゲームから離れて、また別のユーザーも……ってなったら、いつかは対戦型ゲームそのものが廃れちゃう！"
2502-26 = "それは流石に、悲観的すぎない……？"
2502-27 = "なるほど、これは世界を救うための崇高な戦い……"
2502-28 = "勇者たちよ、早速魔王の根城に向かうとしよう！"
2502-29 = "うん、とりあえず『スチューデントファイター2』があるところに行こっか！"
2502-31 = "思ったより人が少ないね、もしかしてもう帰っちゃったんじゃない？"
2502-32 = "ううん、まだ分からないよ。画面のIDを見てみて。"
2502-35 = "このユーザーは違う……"
2502-38 = "こっちも違う……。"
2502-46 = "いやっほーぅ、また勝った！連戦連勝ぉ！"
2502-47 = "うぅ、また負けた……せっかく練習したのに……。"
2502-48 = "練習って、あの「偶然出た」みたいな連携技っぽいやつ？それ本気で言ってんの？"
2502-49 = "これなら足で操作したって勝てそうだよ！くくっ、あははっ！！"
2502-50 = "ちょっ、ゲームでそこまで言わなくてもいいじゃん！"
2502-51 = "今言ったこと、取り消して！"
2502-52 = "ヤダよバ～カ、ゲームもできないのに何ができるの？楽しいことでも頑張れないのに、他の何なら頑張れるわけ？勉強？スポーツ？恋愛？"
2502-53 = "うぅ……ママに言いつけてやるっ！"
2502-57 = "うわ、ひっどいね。オフラインでもあんな暴言を吐くゲーマーがいるなんて。"
2502-58 = "ああっ、見つけた！あのID！"
2502-61 = "ん？何だ、お前たちもあたしに挑戦するつもりか？"
2502-64 = "あんた、「Sukeban312」だよね？昨日オンライン対戦で、私のことを「おばあちゃん」って言ったでしょ！"
2502-65 = "ってことは……お前が「Peach_Figther」？"
2502-66 = "ははっ、なんだ、予想通りやっぱりガキじゃん。"
2502-67 = "が、ガキじゃないし！？"
2502-68 = "対面でもこれって、本当に失礼な人……。"
2502-69 = "……モモイ。[ruby=スーパーノヴァ]「光の剣」[/ruby]でこの邪悪な魔王、浄化しますか？"
2502-70 = "昨日の暴言について今すぐ謝らないと、痛い目にあうよ！早く謝って！"
2502-71 = "やーだよーだ。"
2502-72 = "何でっ！"
2502-73 = "あたしは、自分より弱い相手なんかには謝らない。"
2502-74 = "どうして自分より下手な人に頭を下げなきゃいけないわけ？意味もなくプライドが傷つくじゃん。"
2502-76 = "こんっの……！"
2502-77 = "……お姉ちゃん、撃っていい？"
2502-78 = "勇者よ、汝が許可するのであれば、私はいつでもこ[ruby=レールガン]の剣を[/ruby]抜こう。"
2502-80 = "はっ、そこまで言うならあらためて『スチューデントファイター2』で勝負を決めるのはどうだ？一度でも私に勝てたら、昨日のことは謝ってやるよ。"
2502-81 = "言ったね、よしっ。今度は手加減しないんだから……！"
2502-82 = "謝罪の言葉でも考えておいた方が良いよ！"
2502-83 = "んじゃ……"
2502-89 = "勝負！"
2502-96 = "<SYSTEM> 「Sukeban312」選手の勝利！"
2502-97 = "ふはっ、何だよ！自信満々で再挑戦しておいて、こんなもんか？"
2502-98 = "お前、本当にゲームの才能無いんじゃない？くくっ……！"
2502-99 = "ちょっとぉ！画面隅のしゃがみガードでガン待ちとか反則でしょ！"
2502-100 = "牽制技だけで勝つとか卑怯だよ！"
2502-101 = "いやいや、これだってれっきとしたゲームの技じゃん。悔しかったらちゃんと攻略法でも見つけてくるべきだし、自分ルールを押し付けて駄々をこねるとか幼稚すぎない？"
2502-102 = "うぅぅ……もうっ！"
2502-104 = "牽制技は一旦置いておくとして……お姉ちゃんの方の、ガードされてもある程度ダメージが入るはずの特殊技が、全く効いてなかったような……？"
2502-105 = "何かおかしくない……？"
2502-106 = "……恐らく、バグ技を利用しているのだと思います。"
2502-107 = "バグ技？"
2502-108 = "はい、『スチューデントファイター2』では特殊な操作をすることで、ほんの一瞬ですが画面がフリーズするバグがあります。"
2502-109 = "恐らくですがそのバグを悪用して、モモイの攻撃を回避しているのかと。アリスにはそう見えました。"
2502-110 = "そ、そんなの勝てっこないじゃん！？"
2502-111 = "相手との実力差が大きければまだしも、あっちも普通に強いこの状況じゃ……。"
2502-114 = "……。"
2502-121 = "えっと……すみません、モモイの代わりにわたしでも、良いですか……？"
2502-122 = "ん、新しいチャレンジャーか？"
2502-123 = "OK、受けて立つよ。ま、何人来ても結果は変わんねえけどな。はははっ！"
2502-124 = "……ふぅ。ちょっとだけ……。"
2502-125 = "<SYSTEM> 試合、開始！"
2502-132 = "<SYSTEM> パーフェクト！「UZQueen」選手の勝利！"
2502-133 = "あ、ありえない……こんなガキに、あたしが負けただと？"
2502-134 = "しかもノーダメージ……！ほとんど何もできないまま連続コンボで……！"
2502-135 = "……謝って。"
2502-136 = "……は？"
2502-137 = "約束通り、モモイに謝って……。"
2502-138 = "ちっ……まあ、約束だったからな。"
2502-140 = "……悪かった。昨日といいさっきといい、ちっとあたしが言い過ぎた。"
2502-143 = "ユズすごい！一回でやっちゃった！"
2502-144 = "それにパーフェクト勝利なんて……さすがユズちゃん！"
2502-145 = "さすがは伝説の勇者、「UZQueen」です！"
2502-146 = "ちょ、ちょっと、みんな大袈裟……そんなに言われると、恥ずかしい……。"
2502-148 = "ま、待ってくれ！あ、あんたが「UZQueen」なのか？"
2502-149 = "オンライン対戦ランキングで、ただの一度も頂点の座を譲ったことが無い……しかしその姿を誰も見たことがないという、あの伝説のゲーマーの！？"
2502-150 = "伝説のゲーマーかどうかは、知らないけど……うん。UZQueenは、わたし。"
2502-153 = "えっ？あの子がUZQueen！？"
2502-154 = "UZQueenって……対戦型アクションゲームはもちろん、リズムゲームでも常にランキング1位の、あの伝説のゲーマー！？"
2502-155 = "UZQueen、本当に実在したんだ……。"
2502-156 = "UZQueen様、サインください！"
2502-157 = "ちょっ、ちょっと、順番は守って！撃つよ！？私が先にサインをもらうの！"
2502-158 = "う、うぁ……ひ、人がいっぱい……。"
2502-159 = "も、モモイ、ミドリ、アリスちゃん！た、助けて……！"
2502-160 = "あー、やっぱりゲーセンだもんね。みんな知ってるか。"
2502-161 = "ユズちゃんのことを好きな人が、こんなにたくさんいてくれるなんて。何だか、私もすっごく嬉しい。"
2502-162 = "立派な王になるためには、王冠の重さに耐えねばなりません。"
2502-163 = "わ、わたしは、別にこうなりたくて、ゲームをしてるわけじゃ……！"
2502-164 = "UZQueen様、せっかくですし上達法を教えてください！"
2502-165 = "私とぜひお手合わせを……！"
2502-166 = "人がどんどん……"
2502-167 = "あぁ、あぁぁぁ……！！"
2502-169 = "その後ユズはあわあわしながらも、押し寄せたファンの一人一人全員と頑張ってどうにか挨拶を交わした後、ようやくゲームセンターから出ることができた……。"
2502-170 = "ゲームの道はマナーから"
