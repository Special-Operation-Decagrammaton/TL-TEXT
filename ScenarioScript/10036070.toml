[translation]
10036070-1 = "Episódio 7; A aparição de \"Ela\""

10036070-3 = "Ai!#nVai com calma..."
10036070-4 = "Agradeça por eu estar passando o remédio em você."
10036070-5 = "Foi mal, tá bom."
10036070-6 = "A pouco, fomos atacados por alguém usando um capacete misterioso."
10036070-7 = "Pensei que ainda estivesse longe, mas num instante já estava na minha frente..."
10036070-8 = "Quem diria que alguém assim estava no Grupo dos Capacetes..."
10036070-9 = "Droga!"
10036070-10 = "O plano para arruinar a assembleia do Grupo dos Capacetes foi por água abaixo."
10036070-11 = "E olha que a gente fez tudo o que podia!"
10036070-12 = "...!"
10036070-13 = "Se a gente seguiu o plano e não deu certo..."
10036070-14 = "A culpa não é nossa, né?"
10036070-15 = "Ou seja, o plano estava errado desde o começo!"
10036070-16 = "É isso mesmo!#nA culpa é daquela professora com nome de Niconico ou Niyaniya!"
10036070-17 = "Vamos ligar de novo!"
10036070-24 = "Ora, ora, pessoal, o que aconteceu?"
10036070-26 = "Não brinca com a gente!"
10036070-27 = "Você não tinha intenção nenhuma de cooperar desde o início, né!"
10036070-28 = "Por sua causa, a gente se machucou, sabia!"
10036070-30 = "Sim?"
10036070-31 = "Eu calculei o poder de combate e tinha certeza de que venceríamos..."
10036070-33 = "Você criou um plano de qualquer jeito!"
10036070-35 = "Hum, poderiam me contar o que aconteceu?"
10036070-37 = "Entendo, entendo, foi assim então."
10036070-39 = "Ah? Tá tirando a gente?#nSabe quanto a gente te pagou?!"
10036070-40 = "É isso mesmo!#nO que você acha que é o dinheiro que a gente suou para juntar!"
10036070-41 = "É difícil conseguir dinheiro extorquindo os outros, sabia!"
10036070-43 = "Tanto a operação de sequestro inicial quanto o ataque surpresa de agora...#nterem sido interrompidos por alguém..."
10036070-44 = "O plano deveria ser perfeito..."
10036070-45 = "Ora, ora, as coisas estão ficando interessantes."
10036070-47 = "É hora de achar graça?"
10036070-49 = "Fiquem quietos."
10036070-51 = "Hã!?"
10036070-52 = "A gente pode te derrotar primeiro, sabia!"
10036070-54 = "Apontar a arma para mim não vai resolver nada."
10036070-55 = "...Ufa.#nMas, já que chegamos a esse ponto, tenho que admitir."
10036070-56 = "O oponente não é alguém comum."
10036070-57 = "Provavelmente, alguém que rivaliza com o meu intelecto."
10036070-58 = "Dito isso, a disputa está apenas começando."
10036070-59 = "Tenho mais uma proposta."
10036070-61 = "...?"
10036070-63 = "Ah, ah, aviso do Grupo dos Capacetes!"
10036070-64 = "O horário do palco do DJ foi alterado para as 6 horas!"
10036070-65 = "Pessoal, não se confundam!"
10036070-66 = "Esse anúncio de agora, será que foi por nossa causa?"
10036070-68 = "Exatamente.#nGraças a vocês, conseguimos mudar o horário."
10036070-70 = "Não me diga que você planejou isso desde o começo!?"
10036070-71 = "Você previu tudo isso até aqui...!"
10036070-73 = "Bem, quem sabe.#nA situação muda a cada instante."
10036070-74 = "De qualquer forma, é uma boa notícia.#nCom isso, a vingança de vocês será realizada."
10036070-75 = "Embora, não pelas mãos de vocês, mas sim por \"ela\"..."
10036070-76 = "Ela...?"
10036070-81 = "Em vez de tramar tanto, eu deveria ter falado com ela desde o início."
10036070-82 = "Já chega de vocês."
10036070-83 = "Façam o que quiserem."
10036070-84 = "Então, com licença."
10036070-91 = "……O que isso significa?"
10036070-92 = "Não entendi nada……."
10036070-93 = "E agora, o que a gente faz?#nVamos desistir e ir embora?"
10036070-94 = "O Sensei disse aquilo também……."
10036070-95 = "Sendo sincera, a gente não tem chance de ganhar, né……."
10036070-99 = "É cedo demais para desistir!"
10036070-100 = "Não desanimem por causa disso!"
10036070-101 = "Como vamos encarar a nossa Chefe depois disso!?"
10036070-102 = "Esqueceram?#nAquelas costas fortes e resilientes!"
10036070-103 = "……!"
10036070-108 = "Nós somos as Sukeban, que fazem até as crianças chorosas se calarem!"
10036070-109 = "Nós mesmas vamos vingar a nossa Chefe!"
10036070-110 = "Não me importo com o que aquele Sensei diz!"
10036070-111 = "Vamos mostrar o que uma Sukeban é capaz de fazer!"
10036070-112 = "Ooooh!"
10036070-113 = "Quem tiver coragem, venha comigo!"
10036070-114 = "Vamos destruir tudo!"
10036070-117 = "Faltam 20 minutos para começar.#nO público já está se reunindo."
10036070-118 = "Vamos acelerar o ritmo para compensar o tempo extra!"
10036070-119 = "Sim!"
10036070-120 = "A verificação de som já foi feita?"
10036070-121 = "Daqui a um minuto faremos a checagem final antes do show!"
10036070-122 = "Parece que vocês estão ocupados."
10036070-124 = "Uou! Joomae-san!"
10036070-125 = "Eu também vou ajudar."
10036070-126 = "N-não precisa!#nÉ melhor você descansar!"
10036070-127 = "Não posso fazer isso.#nO trabalho que aceitei, vou cumprir até o fim."
10036070-128 = "E-então, por favor, verifique a mesa de som e teste os alto-falantes……."
10036070-129 = "Entendido."
10036070-130 = "C-conto com você……!"
10036070-135 = "[ns] \"Saori.\""
10036070-136 = "Chegou na hora certa.#nO palco vai começar em breve."
10036070-137 = "Como estão todos?"
10036070-138 = "……Entendo, vocês vieram assistir.#nEspere um pouco. Deixe-me fazer a última checagem dos equipamentos——"
10036070-139 = "[s] \"Eu também vou ajudar em algo.\""
10036070-140 = "……Eu sabia que o Sensei diria isso."
10036070-141 = "Então, suba no palco."
10036070-143 = "É a primeira vez que vejo um palco de DJ!#nComo será que é?"
10036070-144 = "Acho que vai ser muito divertido!#nO som é alto e a energia vai lá para cima!"
10036070-145 = "Vamos curtir todos juntos!"
10036070-147 = "……Tem muita gente."
10036070-148 = "[s3] \"Tem tantos espectadores aqui.\"\n[s4] \"Será que já está lotado?\""
10036070-151 = "Passei o dia todo correndo por causa do palco, mas……."
10036070-152 = "Eu não imaginava que a atmosfera mudaria tanto antes do show começar."
10036070-153 = "Todos parecem tão animados."
10036070-154 = "……Surpreendente."
10036070-155 = "É a primeira vez que sinto algo assim."
10036070-158 = "Fufu, ainda bem que chegamos cedo."
10036070-159 = "Este parece ser o melhor lugar para assistir."
10036070-160 = "Embora eu não goste muito de multidões……."
10036070-161 = "Eu vi isso em uma revista!#nO palco de DJ parece ser o evento principal do festival!"
10036070-162 = "Dizem que quem se destaca no palco de DJ faz sucesso na praia……!"
10036070-163 = "E de que serviria fazer sucesso com o Grupo do Capacete……."
10036070-167 = "Ah, parece que o ensaio vai começar."
10036070-168 = "Olha, a Sa-chan também está lá."
10036070-169 = "O-onde ela está?"
10036070-174 = "Ei, Hiyori, se você ficar agitada desse jeito――"
10036070-178 = "Espere, você não ouviu um barulho agora pouco?"
10036070-179 = "Um barulho?"
10036070-184 = "Ataquemmm!"
10036070-185 = "Atiremmm!"
10036070-194 = "S-Sukebans!?"
10036070-195 = "É um ataque surpresa!"
10036070-197 = "Vou vingar a nossa líder!"
10036070-204 = "Droga……."
10036070-205 = "Vocês acharam mesmo que podiam vencer?"
10036070-206 = "Não importa quantos de vocês venham, vocês vão perder de qualquer jeito."
10036070-207 = "O que será que eles têm na cabeça……."
10036070-209 = "Droga!"
10036070-210 = "Será que é o fim……."
10036070-211 = "Líder, me perdoe……."
10036070-218 = "O que será que aconteceu…… quem eram aquelas pessoas……?"
10036070-219 = "Elas estavam tentando levar o DJ agora pouco, o que será que querem?"
10036070-223 = "……?"
10036070-225 = "Atsuko, Hiyori, cuidado!"
10036070-230 = "Kyaa!?"
10036070-231 = "Waaaaah!?"
10036070-235 = "Argh!"
10036070-236 = "O que está acontecendo!?"
10036070-238 = "Cof, cof!#nEssas Sukebans, até um lança-foguetes elas trouxeram……!"
10036070-239 = "N-nós não trouxemos nada disso!"
10036070-240 = "Então, quem foi……."
10036070-242 = "[ns] \"O que é aquilo……!?\""
10036070-244 = "Ufufufufu, quanto tempo, não é mesmo?#nPessoal do Grupo do Capacete."
10036070-245 = "Eu me preocupei com vocês todos os dias."
10036070-246 = "Espero que todos tenham passado bem?"
10036070-247 = "Se não passaram―― eu ficaria muito chateada."
10036070-248 = "Porque eu―― estive esperando ansiosamente por isso."
10036070-252 = "――O dia em que eu me vingaria de vocês!"
