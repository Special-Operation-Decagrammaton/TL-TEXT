[translation]
10036070-1 = "第7話;「彼女」の登場"
10036070-3 = "いたっ！#n優しくしろよ……。"
10036070-4 = "薬を塗ってやってるだけ感謝するんだな。"
10036070-5 = "悪かったって。"
10036070-6 = "さっき、謎のヘルメットを被った奴に襲われたんだ。"
10036070-7 = "まだ距離があると思いきや、一瞬で目の前にいて……。"
10036070-8 = "あんな奴がヘルメット団にいたなんてな……。"
10036070-9 = "ちくしょう！"
10036070-10 = "ヘルメット団の総会を潰す計画が台無しだ。"
10036070-11 = "やれること全部やったってのによぉ！"
10036070-12 = "……！"
10036070-13 = "計画通り動いてダメだったなら……。"
10036070-14 = "私たちのせいじゃないだろ？"
10036070-15 = "つまり、最初から計画が間違ってたってことか！"
10036070-16 = "そういうことだ！#nあのニコニコだかニヤニヤとかいう名前の教授が悪い！"
10036070-17 = "もう一回電話しよう！"
10036070-24 = "おやおや皆さん、どうされたのですか？"
10036070-26 = "ふざけんなよ！"
10036070-27 = "最初から協力する気なんてなかったんだろ！"
10036070-28 = "お前のせいで怪我しただろうが！"
10036070-30 = "はい？"
10036070-31 = "戦力を計算したうえで、勝てると踏んでおりましたが……。"
10036070-33 = "いい加減な計画を立てやがって！"
10036070-35 = "ほむ、何があったのか聞かせていただいても？"
10036070-37 = "なるほどなるほど、左様でしたか。"
10036070-39 = "ああ？ナメてんのか？#nお前にいくら払ったと思ってんだ！"
10036070-40 = "そうだ！#n人が苦労して貯めた金を何だと思ってる！"
10036070-41 = "たかるのも大変なんだぞ！"
10036070-43 = "最初の拉致作戦も、今回の奇襲も、#n横から邪魔が入るとは……。"
10036070-44 = "計画は完璧だったはず……。"
10036070-45 = "これはこれは、面白くなってきましたねぇ。"
10036070-47 = "面白がってる場合か？"
10036070-49 = "静かにしていなさい。"
10036070-51 = "はぁ！？"
10036070-52 = "先にお前を倒してやっても良いんだぞ！"
10036070-54 = "私に矛先を向けたところで、何も解決しないでしょう。"
10036070-55 = "……ふぅ。#nですが、こうなった以上は認めざるを得ません。"
10036070-56 = "相手は只者ではないでしょう。"
10036070-57 = "おそらく、私の頭脳に匹敵するほどの存在。"
10036070-58 = "とはいえ、まだまだ勝負はこれから。"
10036070-59 = "もうひとつ、ご提案があります。"
10036070-61 = "……？"
10036070-63 = "あー、あー、ヘルメット団からお知らせだ！"
10036070-64 = "DJステージの開催時間が6時に変更された！"
10036070-65 = "みんな、間違えないようにな！"
10036070-66 = "今のアナウンス、もしかしてウチらの影響か？"
10036070-68 = "その通りです。#n皆さんのおかげで、時間をズラすことに成功しました。"
10036070-70 = "もしかして、最初からこのために！？"
10036070-71 = "ここまで見越していたのか……！"
10036070-73 = "さぁ、どうでしょう。#n状況は、刻一刻と変わっていくもの。"
10036070-74 = "いずれにせよ、朗報です。#nこれで皆さんの復讐は叶うでしょう。"
10036070-75 = "もっとも、皆さんの手によってではなく、「彼女」によって……ですが。"
10036070-76 = "彼女……？"
10036070-81 = "あれこれ策を弄するよりも、最初から彼女に声をかけるべきでした。"
10036070-82 = "もう、あなた方は結構です。"
10036070-83 = "ご自由になさい。"
10036070-84 = "では、失礼するとしましょう。"
10036070-91 = "……どういう意味だ？"
10036070-92 = "まったく分からん……。"
10036070-93 = "そんで、どうするよ。#nもう諦めて帰るか？"
10036070-94 = "教授もああ言ってたし……。"
10036070-95 = "ぶっちゃけ、ウチらじゃ勝ち目ないよな……。"
10036070-99 = "諦めるには早すぎるっ！"
10036070-100 = "こんくらいで音を上げるな！"
10036070-101 = "姐様に合わせる顔がなくなるだろっ！？"
10036070-102 = "忘れたのか？#nあの強靭でたくましい背中を！"
10036070-103 = "……！"
10036070-108 = "我ら、泣く子も黙るスケバン！"
10036070-109 = "姐様の仇は、ウチらが打つ！"
10036070-110 = "あんな教授のことなんざ知るか！"
10036070-111 = "スケバンの本気を見せてやるぞ！"
10036070-112 = "おーっ！"
10036070-113 = "覚悟がある奴はついてこい！"
10036070-114 = "めちゃくちゃにしてやる！"
10036070-117 = "開始まで残り20分だ。#nもう観客が集まってるじゃないか。"
10036070-118 = "延長した分の時間を巻きで進めるぞ！"
10036070-119 = "はい！"
10036070-120 = "音響チェックは済んでるな？"
10036070-121 = "1分後には本番前の最終確認だ！"
10036070-122 = "忙しそうだな。"
10036070-124 = "うおっ[ruby=じょうまえ]！錠前さ[/ruby]ん！"
10036070-125 = "私も手伝おう。"
10036070-126 = "だ、大丈夫だ！#nむしろ休んでいてくれ！"
10036070-127 = "そうはいかない。#n引き受けた仕事は最後まで全うする。"
10036070-128 = "じゃ、じゃあ、ターンテーブルの点検とスピーカーのテストを……。"
10036070-129 = "分かった。"
10036070-130 = "た、頼んだぞ……！"
10036070-135 = "[ns] \"サオリ。\""
10036070-136 = "ちょうど良いタイミングだ。#nもう少しでステージが始まる。"
10036070-137 = "みんなはどうしていた？"
10036070-138 = "……そうか、見に来てくれているのだな。#nちょっと待ってくれ。最後の機材チェックを――"
10036070-139 = "[s] \"私も何か手伝うよ。\""
10036070-140 = "……先生ならそう言うと思っていた。"
10036070-141 = "じゃあ、ステージに上がってきてくれ。"
10036070-143 = "DJステージ、初めて見るんだよね！#nどんな感じなんだろ？"
10036070-144 = "むっちゃ楽しいと思うよ！#n爆音だしテンションも超上がるし！"
10036070-145 = "みんなで盛り上がっていこ！"
10036070-147 = "……多いな。"
10036070-148 = "[s3] \"こんなに観客がいるんだね。\"\n[s4] \"もう満席なのかな？\""
10036070-151 = "今日は一日中、ステージのために走り回っていたが……。"
10036070-152 = "本番前は、こうも雰囲気が違うとは。"
10036070-153 = "みんな、生き生きしている。"
10036070-154 = "……驚いた。"
10036070-155 = "こんな気持ちは初めてだ。"
10036070-158 = "ふふ、早めに来て良かった。"
10036070-159 = "一番見やすそうな場所だね。"
10036070-160 = "人混みは苦手なんだけど……。"
10036070-161 = "私、雑誌で見たことがあります！#nDJステージは、お祭りのメインイベントらしいです！"
10036070-162 = "DJステージで盛り上がれる人は、海でモテると……！"
10036070-163 = "ヘルメット団にモテてどうするの……。"
10036070-167 = "あ、リハーサルが始まるみたい。"
10036070-168 = "見て、サッちゃんもいる。"
10036070-169 = "ど、どこですか？"
10036070-174 = "ちょっとヒヨリ、そんなにはしゃいだら――"
10036070-178 = "待って、今なにか音がしなかった？"
10036070-179 = "音、ですか？"
10036070-184 = "突撃ぃぃぃぃ！"
10036070-185 = "撃てぇぇぇぇ！"
10036070-194 = "す、スケバン！？"
10036070-195 = "奇襲だ！"
10036070-197 = "姐様の仇、打たせてもらうぜ！"
10036070-204 = "くっ……。"
10036070-205 = "勝てると思ってたのか？"
10036070-206 = "こんな人数で来たところで、負けるに決まってるだろ。"
10036070-207 = "何を考えてるのやら……。"
10036070-209 = "くそっ！"
10036070-210 = "ここまでなのか……。"
10036070-211 = "姐様、すまねぇ……。"
10036070-218 = "いったい何だったのでしょうか……あの方たちは……？"
10036070-219 = "さっきはDJさんを連れ去ろうとしてたし、何がしたいんだろう。"
10036070-223 = "……？"
10036070-225 = "アツコ、ヒヨリ、危ないっ！"
10036070-230 = "きゃっ！？"
10036070-231 = "うわぁああん！？"
10036070-235 = "ぐはっ！"
10036070-236 = "何が起こってるんだ！？"
10036070-238 = "げほ、げほっ！#nスケバンめ、ロケットランチャーまで持ってきやがって……！"
10036070-239 = "そ、そんなもん持ってきてねぇ！"
10036070-240 = "じゃあ、いったい誰が……。"
10036070-242 = "[ns] \"アレは……！？\""
10036070-244 = "うふふふふっ、お久しぶりですわね。#nヘルメット団の皆さん。"
10036070-245 = "毎日毎日、心配でしたわ。"
10036070-246 = "皆さん、元気に過ごされていたかしら？"
10036070-247 = "そうでなければ――困ってしまいますわ。"
10036070-248 = "だって――ずうっと、楽しみにしていたんですもの。"
10036070-252 = "――アンタたちに復讐する日をねぇ！"
