[translation]
1300308-1 = "短いけれど贅沢な"
1300308-2 = "トリニティ・別館"
1300308-3 = "ふう……。"
1300308-4 = "あれ、先生？"
1300308-5 = "夜遅くまでお疲れ様でした、今からお帰りですか？"
1300308-6 = "ええ、はい。私も委員会で必要な、重要書類の作業が中々終わらなくって……。"
1300308-7 = "ですが、先ほど何とか終わりました。"
1300308-8 = "報告書は結局のところ、誰かの労力を対価に完成するものなのですよね……。"
1300308-9 = "[s] \"お疲れ様。\""
1300308-10 = "ありがとうございます。先生も、お疲れ様でした。"
1300308-11 = "ふう……夜中まで作業していると肩が凝りますね。"
1300308-12 = "一緒に帰りましょう。遅いので、私がエスコートいたします。"
1300308-13 = "（ゴロゴロゴロ……ドカーーン！！）"
1300308-14 = "……あら。"
1300308-15 = "雨が降りそうですね。"
1300308-16 = "先生、走りましょう！"
1300308-20 = "（ザアーーーーー）"
1300308-21 = "あ……さらに強くなってきましたね。"
1300308-22 = "どこか、雨宿りできそうなところは……。"
1300308-23 = "[s] \"公園に行こう。\""
1300308-24 = "公園ですか？"
1300308-25 = "あ……そうですね、あそこなら……。"
1300308-27 = "（以前ハスミと一緒に夕暮れを見た公園へ向かった）"
1300308-30 = "[ns] \"ここで雨宿りしよう。\""
1300308-31 = "はい、ここなら……大丈夫そうですね。"
1300308-34 = "― ああ、[wa:1500]全身びしょ濡れになってしまいましたね。[wa:2500]困りました。"
1300308-37 = "― うーん、[wa:1500]雨、[wa:1500]すぐには止みそうにないですね。"
1300308-40 = "― 二人でどうすることもできず、[wa:2500]足止めされてしまいましたね？"
1300308-43 = "― ふふ、[wa:1500]このようなことは予想していなかったのですが。"
1300308-46 = "[wa:3500]― 少しくらいなら……[wa:2000]このような時間もいいでしょう。"
1300308-48 = "― ……贅沢ですが、[wa:2500]私にとっては[wa:1500]大切な時間です。"
1300308-51 = "（雨は朝方になって、ようやく止んだ）"
1300308-54 = "……。"
1300308-55 = "[s] ハスミを起こす。"
1300308-56 = "ん……。"
1300308-57 = "私、寝てしまっていましたか？失礼しました……。"
1300308-58 = "最近、残業が多かったせいでしょうか……。"
1300308-59 = "……。"
1300308-60 = "……徐々に明るくなってきていますね。"
1300308-61 = "[s] \"大丈夫？\""
1300308-62 = "はい、大丈夫です。寮には残業すると伝えてありますので……特に心配はないと思います。"
1300308-63 = "……ふふ。"
1300308-64 = "またお世話になってしまいましたね、先生。"
1300308-65 = "……ちょっとだけだと思っていた時間を、こんなに贅沢に過ごせるなんて。"
1300308-66 = "[s] \"？\""
1300308-67 = "……何でもありません。"
1300308-68 = "えっと、誰かに見られてしまう前に、私は寮に戻りますね。"
1300308-69 = "では、先生。"
1300308-71 = "また……。"
