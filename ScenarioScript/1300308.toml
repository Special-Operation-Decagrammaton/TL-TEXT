[translation]
1300308-1 = "Curto, porém luxuoso"
1300308-2 = "Trinity - Anexo"
1300308-3 = "Ufa..."
1300308-4 = "Ah, Sensei?"
1300308-5 = "Obrigada pelo trabalho duro até tarde. Já está indo embora?"
1300308-6 = "Sim, é isso. Eu também não conseguia terminar o trabalho com os documentos importantes da comissão..."
1300308-7 = "Mas, acabei de conseguir finalizar."
1300308-8 = "No fim das contas, um relatório só fica pronto à custa do esforço de alguém, não é mesmo..."
1300308-9 = "[s] \"Bom trabalho.\""
1300308-10 = "Obrigada. Sensei, bom trabalho para você também."
1300308-11 = "Ufa... trabalhar até o meio da noite deixa os ombros tensos."
1300308-12 = "Vamos voltar juntos. Está tarde, então eu farei a sua escolta."
1300308-13 = "(Estrondo... BUM!!)"
1300308-14 = "...Oh."
1300308-15 = "Parece que vai chover."
1300308-16 = "Sensei, vamos correr!"
1300308-20 = "(Chuááááá)"
1300308-21 = "Ah... ficou ainda mais forte."
1300308-22 = "Onde será que podemos nos abrigar da chuva..."
1300308-23 = "[s] \"Vamos ao parque.\""
1300308-24 = "Ao parque?"
1300308-25 = "Ah... é verdade, naquele lugar..."
1300308-27 = "(Fomos em direção ao parque onde vi o pôr do sol com Hasumi anteriormente)"
1300308-30 = "[ns] \"Vamos nos abrigar aqui.\""
1300308-31 = "Sim, aqui... parece que ficaremos bem."
1300308-34 = "— Ah, [wa:1500] acabamos ficando encharcados. [wa:2500] Que situação."
1300308-37 = "— Hum, [wa:1500] a chuva [wa:1500] não parece que vai parar tão cedo."
1300308-40 = "— Nós dois acabamos ficando presos aqui sem ter o que fazer, não é?"
1300308-43 = "— Fufu, [wa:1500] eu não esperava que algo assim fosse acontecer."
1300308-46 = "[wa:3500] — Mas, por um momento... [wa:2000] esse tipo de tempo também é bom."
1300308-48 = "— ...É um luxo, mas [wa:2500] para mim, [wa:1500] é um tempo precioso."
1300308-51 = "(A chuva finalmente parou ao amanhecer)"
1300308-54 = "..."
1300308-55 = "[s] Acordar Hasumi."
1300308-56 = "Hmm..."
1300308-57 = "Eu acabei dormindo? Peço desculpas..."
1300308-58 = "Será que é porque tive muitas horas extras ultimamente..."
1300308-59 = "..."
1300308-60 = "...Está clareando aos poucos."
1300308-61 = "[s] \"Você está bem?\""
1300308-62 = "Sim, estou bem. Avisei no dormitório que faria hora extra, então... não acho que haja motivo para preocupação."
1300308-63 = "...Fufu."
1300308-64 = "Acabei sendo cuidada por você novamente, Sensei."
1300308-65 = "...Quem diria que um tempo que pensei ser apenas um momento, poderia ser passado de forma tão luxuosa."
1300308-66 = "[s] \"?\""
1300308-67 = "...Não é nada."
1300308-68 = "Bem, antes que alguém nos veja, vou voltar para o dormitório."
1300308-69 = "Então, Sensei."
1300308-71 = "Até mais..."
