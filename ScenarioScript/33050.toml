[translation]
33050-1 = "Episódio 5; Cerimônia de Assinatura do Tratado do Éden (1)"
33050-4 = "Olá a todos que estão assistindo a este vídeo!"
33050-5 = "Eu sou a Sinon Karyu, a repórter idol do Clube de Reportagem da escola Chronos!"
33050-6 = "Hoje estamos aqui no local onde finalmente será assinado o 'Tratado do Éden' entre a Academia Gehenna e a Academia Trinity!"
33050-7 = "Estou agora mesmo na frente do 'Antigo Tabernáculo da Comunhão'..."
33050-17 = "O clima aqui já está super quente, e a tensão entre os dois lados é tanta que dá pra cortar com uma faca!"
33050-18 = "É uma atmosfera que pode virar um desastre total se alguém der um passo em falso! Conseguem sentir essa pressão no ar?"
33050-20 = "Podemos dizer que é uma relação de cão e gato, ou que é aquele ditado de 'embarcar no mesmo barco sendo inimigos'! É o cenário da Trinity e de Gehenna que a gente já conhece bem!"
33050-21 = "...Sim? Para de falar bobagem? Vai logo ao ponto? Não tem jeito, né... antes que as palavras que voam por fora da tela virem socos, vamos logo com isso!"
33050-23 = "Que presença intimidadora! Aqui é o interior do Tabernáculo, o local da cerimônia!"
33050-25 = "Sobre o 'por que este local foi escolhido', segundo fontes, foi uma 'proposta da cúpula de Gehenna'! Isso é inesperado!"
33050-26 = "Será que é porque este é um local histórico, onde foi realizado o 'Primeiro Concílio' da Trinity?"
33050-27 = "Não, não parece ser isso. O motivo parece ser... 'Como é um evento tão grande, um lugar grande e imponente é melhor'."
33050-28 = "Resumindo, a lógica foi: 'Um lugar grande é mais maneiro, né!'... Bem, bem simples de entender, né!"
33050-29 = "Mudando um pouco de assunto, sobre o 'Primeiro Concílio' que mencionei, dizem que os mandamentos estabelecidos lá foram protegidos por um grupo poderoso da época, chamado 'Sociedade dos Santos Justina'."
33050-30 = "Será que tem alguma relação? Foi confirmado que hoje a 'Irmandade' da Trinity também está participando desta cerimônia!"
33050-31 = "A 'Irmandade', que por tanto tempo se absteve de atividades externas... por que elas decidiram aparecer aqui hoje?"
33050-32 = "Será que elas se consideram as sucessoras daquela organização, a 'Sociedade dos Santos Justina', que se perdeu na história?"
33050-33 = "Bem, o que será que vai acontecer nessa tempestade política que assola a Academia Trinity... Sim? Chega de falar difícil? Audiência caindo e acessos diminuindo?"
33050-34 = "Não dá pra lidar com política, mas também não dá pra lidar com a pressão da redação! Mas ainda temos liberdade de expressão――"
33050-38 = "Devido a problemas de transmissão, a imagem está distorcida. Por favor, aguarde um momento."
33050-40 = "......Após a assinatura do Tratado do Éden, a cúpula de ambas as academias concordará com a criação da 'Organização do Tratado do Éden'!"
33050-42 = "Com isso, a Trinity e Gehenna... academias que foram inimigas por tanto tempo, assumirão a obrigação de resolverem juntas qualquer conflito que surgir entre elas!"
33050-43 = "Como a assinatura será neste local sagrado, espera-se que elas cumpram fielmente essa obrigação, seguindo os mandamentos sagrados!"
33050-44 = "Confuso, né? Vou simplificar: as duas academias gigantes de Kivotos, famosas por viverem brigando, finalmente estão tentando dar as mãos pela paz!"
33050-45 = "E nesse momento tão importante, o que será que a nossa Administração Federal está fazendo?"
33050-46 = "Vejam como foi a entrevista coletiva de emergência realizada ontem pela Administração Federal!"
33050-48 = "......Damos por encerrada a coletiva."
33050-51 = "Espere um pouco, Administradora! Isso quer dizer que o paradeiro da Presidente do Conselho Federal ainda é desconhecido?"
33050-52 = "Basicamente, sim."
33050-53 = "Não podia resumir um pouco menos!?"
33050-55 = "A avaliação do público sobre a capacidade da Administração Federal está ficando rígida. O que tem a dizer sobre isso?"
33050-56 = "Bom, não tem jeito, né?"
33050-57 = "Momo-chan...!"
33050-58 = "Não faremos comentários sobre informações incertas no momento."
33050-59 = "Como vocês estão lidando com a gentrificação que está ocorrendo em cada distrito autônomo?"
33050-60 = "O fechamento da 'Academia Especial SRT' tem alguma relação com o incidente anterior na Sanctum Tower? Há informações de que parte da torre foi queimada, é verdade?"
33050-61 = "O que vocês pensam sobre o 'Tratado do Éden' entre Trinity e Gehenna?"
33050-62 = "Em relação aos incidentes em cada distrito, basicamente delegamos as respostas para as próprias academias. Acredito que uma intervenção descuidada da Administração Federal seria irresponsável."
33050-63 = "Bom, também não temos tempo nem pessoal para intervir."
33050-64 = "Momo-chan...!"
33050-65 = "Dito isso, encerraremos aqui."
33050-70 = "Sim! Em outras palavras, vocês 'não têm interesse nenhum'!"
33050-71 = "Como esperado da Administração Federal! Essa tranquilidade chega a ser de outro mundo!"
33050-72 = "A seguir, vamos falar sobre as figuras principais de cada academia que participará deste Tratado do Éden――"
33050-75 = "......Que barulheira."
33050-76 = "Hoje é o dia da assinatura do Tratado do Éden, afinal! A escola deu folga e a cidade está cheia de gente!"
33050-77 = "O pessoal da Chronos tava aqui agora pouco, parece até um festival!"
33050-78 = "Pois é. É uma festa, seria ótimo se o Sensei estivesse aqui também... mas parece que ele está ocupado com o tratado."
33050-79 = "......Mas então, por que me chamaram aqui?"
33050-80 = "Porque, é claro, nós ainda somos amigas do Clube de Reposição, Koharu-chan♡"
33050-81 = "Como isso praticamente serve como uma festa de formatura do Clube de Reposição, não pode ficar um pouco mais com a gente?"
33050-82 = "E-Eu não disse que não queria! A gente se esforçou e superou tudo juntas..."
33050-83 = "......Além disso, não é como se tudo fosse acabar aqui. Eu vou continuar no Comitê de Realização da Justiça, então se você vier na sala de gerenciamento de itens confiscados..."
33050-84 = "Sim. Vou te visitar logo, Koharu."
33050-85 = "Se for assim, eu também vou te visitar em breve. Preciso que me devolvam o 'Kama Sutra' que foi confiscado um dia."
33050-86 = "Kama...? O que é isso?"
33050-87 = "É uma obra clássica da literatura. Eu estava lendo tranquilamente perto da fonte, mas por algum motivo confiscaram do nada..."
33050-88 = "Literatura clássica? Hmmm..."
33050-89 = "......Não tem como isso ser verdade! Se você estava lendo, com certeza era algo indecente! Coisa indecente não pode! Incineração!!"
33050-90 = "Hum, esquecendo o confisco, peguei emprestado na biblioteca antiga, então vai ser um problema se queimarem..."
33050-94 = "Ah, Azusa-chan. Por acaso você anda carregando esse bicho de pelúcia pra todo lado?"
33050-98 = "Sim. É algo importante, então tenho que andar com ele."
33050-99 = "N-Não sabia que era tanto... não que eu não ache ótimo! O mundo dos Momofriends é vasto, por que não aproveita e coleciona outros? Qualquer dia vamos numa loja..."
33050-100 = "Sim, estou ansiosa por isso."
33050-101 = "Sim, vamos! Logo vai sair o anime das aventuras do Peroro-sama também!"
33050-102 = "......Anime?"
33050-103 = "Sim! Elas unem forças com os amigos para destruir o mal, superam as dificuldades juntas, e no final todos terminam sorrindo... parece que o final é muito emocionante...!"
33050-104 = "Isso não foi um baita de um spoiler?"
33050-105 = "Ah, ops!? E-Esqueça o que eu acabei de dizer!?"
33050-106 = "Fufu, a Hifumi-chan gosta de finais felizes assim?"
33050-107 = "S-Sim, gosto. Será que é muito comum...?"
33050-108 = "......Não que seja ruim, mas não é meio clichê? Tipo, no final todo mundo vive feliz para sempre em harmonia."
33050-109 = "......Eu também não entendo muito bem o 'final feliz'. Por mais que você se esforce, o mundo não muda tão fácil, e as feridas não somem. Essa é a verdade deste mundo."
33050-110 = "Auuu... vocês são muito 'dark'..."
33050-111 = "Eu sofro um pouco com isso... eu gosto de finais felizes onde todos podem ser felizes."
33050-112 = "Bom, gosto é gosto. Falando nisso, eu gosto de finais onde a heroína fica de olhos vidrados, babando enquanto implora por perdão♡"
33050-113 = "V-Você é louca!? Existe um final desses!?"
33050-114 = "Hmmm, acho que tem vários, na verdade..."
33050-115 = "...Mesmo assim, se a Hifumi gosta, não acho que seja algo ruim. Acho que esse tipo também tem o seu valor."
33050-119 = "Azusa-chaaaaan!"
33050-125 = "Ora, ora♡"
33050-126 = "Hyaaa... !?"
33050-128 = "Depois que tudo isso acabar..."
33050-129 = "Não, depois que a cerimônia de assinatura de hoje acabar, quero conversar com o Sensei com calma."
33050-130 = "......Sim, eu também."
33050-131 = "......O Sensei devia estar aqui, não é?"
33050-132 = "É verdade... será que ele está no Tabernáculo agora? Provavelmente ele deve estar ocupado...?"
33050-134 = "Tabernáculo - Salão Principal"
33050-136 = "[ns] \"......Que tédio.\""
33050-139 = "Próximo Episódio; Cerimônia de Assinatura do Tratado do Éden (2)"