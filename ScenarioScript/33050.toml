[translation]
33050-1 = "Episódio 5;A Cerimônia de Assinatura do Tratado do Éden (1)"
33050-4 = "Olá a todos que estão assistindo a este vídeo agora!"
33050-5 = "Sou a repórter-idol do Clube de Jornalismo da Chronos School, Shinon Kawaru!"
33050-6 = "Hoje é a cerimônia de assinatura do \"Tratado do Éden\" entre a Academia Gehenna e a Academia Geral de Trinity, que enfim será firmado. E estamos direto do local!"
33050-7 = "Eu estou, neste momento, em frente à \"Antiga Catedral da Comunhão\", mas……"
33050-17 = "o local já está fervendo, num clima tenso em que nenhum lado quer ceder um milímetro!"
33050-18 = "É uma atmosfera em que, se alguém der um passo em falso, isto aqui vira uma tragédia! Dá pra sentir este clima!?"
33050-20 = "Como cão e gato, digamos, ou inimigos no mesmo barco! É a cara da Trinity e da Gehenna que a gente tão bem conhece!"
33050-21 = "……Hã? \"Para de falar o que não deve\"? \"Anda logo\"? Fazer o quê, né; hoje também, antes que as palavras que voam de fora da tela virem socos, vamos tocar logo a pauta!"
33050-23 = "Que imponência avassaladora! Esta é a catedral antiga, o palco da cerimônia de assinatura!"
33050-25 = "Sobre o \"porquê de este lugar ter sido escolhido\", segundo informações de certa fonte, foi \"uma proposta da cúpula de Gehenna\"! Isso é surpreendente!"
33050-26 = "Será porque aqui é o lugar histórico onde, um dia, se realizou o \"Primeiro Concílio\" de Trinity?"
33050-27 = "Não, não; parece que não é isso. Pelo visto, o motivo foi…… \"um evento deste porte pede um lugar grande e com autoridade\"."
33050-28 = "Em suma: \"lugar GRANDE é mais estiloso, oras!\"! Sei, bem fácil de entender!"
33050-29 = "Mudando um pouco de assunto: o \"Primeiro Concílio\" que eu citei, e os preceitos ali estabelecidos, dizem que foram guardados por um poderoso grupo da época chamado \"Conselho dos Santos de Justina\"."
33050-30 = "Será que tem a ver? Hoje, foi confirmada também a participação da \"Sisterhood\" de Trinity nesta cerimônia!"
33050-31 = "A \"Sisterhood\", que por longo tempo proibiu a si mesma qualquer atividade externa…… por que será que elas resolveram aparecer agora?"
33050-32 = "Será que há aí o sentido de se assumirem sucessoras daquele \"Conselho dos Santos de Justina\", organização que hoje se perdeu na história?"
33050-33 = "E então, qual será o destino da tempestade política que varre a Academia Geral de Trinity…… hã? \"Chega de papo difícil\"? \"A audiência e os acessos caem\"?"
33050-34 = "Política já é difícil de aguentar, mas a pressão da chefia também não fica atrás! Mas nós temos a liberdade de imprensa――"
33050-38 = "No momento, devido a problemas de conexão, a imagem está instável. Aguardem um instante."
33050-40 = "……Quando o Tratado do Éden for firmado, em seguida, as cúpulas das duas academias vão acordar, na catedral antiga, a criação da \"Organização do Tratado do Éden\"!"
33050-42 = "Com isso, Trinity e Gehenna…… essas duas academias, inimigas por tantos anos, passam a ter o dever de resolver, juntas, os conflitos que ocorrerem entre si!"
33050-43 = "E, sendo firmado nesta catedral antiga, espera-se que, seguindo a guarda dos preceitos sagrados, esse dever seja cumprido com sinceridade!"
33050-44 = "Complicado, né; falando simples! As duas academias gigantes de Kivotos, famosas por viverem às turras, estão enfim prestes a dar as mãos pela paz!"
33050-45 = "E, num momento tão importante, o que será que o nosso Conselho Estudantil Geral está fazendo?"
33050-46 = "Vejam as imagens da coletiva de imprensa de emergência do Conselho Estudantil Geral, realizada ontem!"
33050-48 = "……Com isto, encerramos a coletiva."
33050-51 = "Espera um pouco, administradora! Isso quer dizer que o paradeiro da presidente do Conselho Estudantil Geral segue desconhecido?"
33050-52 = "Em suma, sim."
33050-53 = "Mesmo sem resumir, não é isso!?"
33050-55 = "A avaliação pública sobre a capacidade do Conselho Estudantil Geral está cada vez mais dura. O que dizem sobre esse ponto?"
33050-56 = "Bom, fazer o quê, né?"
33050-57 = "Momoka……!"
33050-58 = "Sobre informações incertas, nos abstemos de comentar no estágio atual."
33050-59 = "E as medidas contra a gentrificação que ocorre em cada distrito autônomo?"
33050-60 = "A decisão de fechar a \"Academia Especial SRT\" tem relação com aquele tumulto na Torre do Sanctum? Há informações de que parte da torre teria sido incendiada."
33050-61 = "Sobre o \"Tratado do Éden\" entre Trinity e Gehenna, qual a posição de vocês?"
33050-62 = "Sobre os incidentes nos distritos autônomos de cada academia, em princípio, confiamos a resposta a cada uma delas. Consideramos que uma intervenção leviana do Conselho Estudantil Geral seria, pelo contrário, irresponsável."
33050-63 = "Bom, também não tem nem tempo nem gente pra intervir."
33050-64 = "Momoka……!"
33050-65 = "Então, encerramos por aqui."
33050-70 = "Sim! Ou seja: \"não temos muito interesse\"!"
33050-71 = "Como esperado do Conselho Estudantil Geral! Uma serenidade que fura até o céu!"
33050-72 = "A seguir, sobre as principais figuras de cada academia que participam deste Tratado do Éden――"
33050-75 = "……Que barulheira."
33050-76 = "É que hoje é, enfim, o dia em que aquele Tratado do Éden vai ser assinado! A escola até virou feriado especial, e a cidade tá lotada!"
33050-77 = "O pessoal da emissora Chronos também tava aqui agorinha; tá com cara de festival, né!"
33050-78 = "Pois é. Já que é essa festa toda, seria ótimo se o Sensei estivesse junto…… mas parece que ele está ocupado com o lado do tratado."
33050-79 = "……E aí, por que EU fui chamada pra cá?"
33050-80 = "Ora, é claro: porque a gente ainda é companheira de Clube de Aulas de Reforço, Koharu♡"
33050-81 = "Na prática, isto também é a festa de formatura do Clube de Aulas de Reforço, então não dá pra você ficar mais um pouquinho?"
33050-82 = "N-não falei que não queria, oras! A-a gente se esforçou junto e superou tudo……."
33050-83 = "……Além disso, não é que tudo acabe com isto. Eu vou estar sempre no Comitê de Realização da Justiça, então, se aparecerem na sala de gestão de itens apreendidos, na maioria das vezes……"
33050-84 = "Sim. Vou te visitar logo, logo, Koharu."
33050-85 = "Então, da próxima, eu também apareço. Um dia, preciso pegar de volta o \"Kama Sutra\" que foi apreendido."
33050-86 = "Kama……? Que é isso?"
33050-87 = "É uma obra da literatura clássica. Eu tava lendo gostoso perto da fonte, e, sabe-se lá por quê, foi apreendido de repente……"
33050-88 = "Literatura clássica? Hmm……"
33050-89 = "……Peraí, claro que não! Se é você lendo, é coisa safada na certa! Coisa safada não pode! Incineração!!"
33050-90 = "Hmm, apreensão vá lá, mas é emprestado da Biblioteca Antiga, então queimar me complica……."
33050-94 = "Ué, Azusa. Não me diga que esse pelúcia você carrega o tempo todo?"
33050-98 = "Sim. É uma coisa importante, então tenho que levar comigo."
33050-99 = "A-a esse ponto…… não, eu agradeço! Mas o mundo de MomoFriends é vasto; que tal aproveitar e colecionar outros também? Da próxima, vamos juntas na loja……"
33050-100 = "Sim, fico no aguardo."
33050-101 = "Sim, com certeza! Ainda mais que o anime de aventura do senhor Peroro vai estrear!"
33050-102 = "……Anime?"
33050-103 = "Sim! Dizem que aquele final, em que ele une forças com os amigos pra esmagar o mal, superam juntos as adversidades e, no fim, todo mundo termina sorrindo, é emocionante demais……!"
33050-104 = "Isso não é spoiler demais, não?"
33050-105 = "Hã, ah!? E-esqueçam o que eu disse agora!?"
33050-106 = "Ufu, a Hifumi gosta desse tipo de final feliz?"
33050-107 = "S-sim, pois é. Será que é comum demais……?"
33050-108 = "……Não digo que seja ruim, mas não é meio batido? No fim, todo mundo feliz num grande final."
33050-109 = "……Eu também não entendo bem esse negócio de final feliz. Por mais que se esforce, o mundo não muda assim tão fácil; as feridas não deixam de ter existido. Porque essa é a verdade deste mundo."
33050-110 = "Auu…… vocês são todas do time sombrio, né……."
33050-111 = "Pra mim, isso é meio doloroso…… eu gosto mesmo é de um final feliz em que todo mundo possa ser feliz."
33050-112 = "Bom, gosto é gosto, né. Aliás, eu gosto daquele tipo de final em que a heroína, com o olhar derretido e babando, implora por perdão♡"
33050-113 = "S-sua boba!? Existe final assim!?"
33050-114 = "Hmm, acho que tem bastante……."
33050-115 = "……De todo modo, se a Hifumi gosta, não acho que seja algo ruim. Isso também tem lá o seu valor."
33050-119 = "Azusaaa!"
33050-125 = "Ora, ora♡"
33050-126 = "Hiáá……!?"
33050-128 = "Se tudo terminar assim……."
33050-129 = "Aliás, quando a cerimônia de hoje acabar, eu quero conversar com calma com o Sensei."
33050-130 = "……Sim, eu também."
33050-131 = "……Bem que o Sensei podia estar aqui."
33050-132 = "Pois é…… será que o Sensei está agora na catedral antiga? Deve estar ocupado, né……?"
33050-134 = "Catedral Antiga - Hall"
33050-136 = "[ns] \"……Que tédio.\""
33050-139 = "Próximo Episódio;A Cerimônia de Assinatura do Tratado do Éden (2)"
