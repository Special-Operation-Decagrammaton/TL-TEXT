[translation]
33050-1 = "Episódio 5; Cerimônia de Assinatura do Tratado de Eden (1)"
33050-4 = "Olá a todos que estão assistindo a este vídeo agora!"
33050-5 = "Eu sou Shinon Kaware, a repórter ídolo do departamento de jornalismo da Escola Kronos!"
33050-6 = "Hoje, estou no local da cerimônia de assinatura do \"Tratado de Eden\", que finalmente será firmado entre a Academia Gehenna e a Academia Trinity!"
33050-7 = "Estou agora em frente à \"Antiga Basílica da Comunhão\", mas..."
33050-17 = "O local já está fervilhando de energia, e o clima está tenso, com ninguém querendo ceder um centímetro!"
33050-18 = "A atmosfera é tal que, se alguém cometer um erro, este lugar pode virar um desastre total! Conseguem sentir essa tensão no ar?"
33050-20 = "Poderíamos chamar de rivalidade entre cão e gato, ou talvez de inimigos no mesmo barco! É o cenário típico da Trinity e da Gehenna que conhecemos tão bem!"
33050-21 = "…Sim? Para parar de falar besteira? Para seguir logo com isso? Não tem jeito, né? Antes que as palavras que voam de fora da tela virem socos, vamos logo com isso!"
33050-23 = "Que pressão imensa! Este é o estado da Antiga Basílica, o local da cerimônia de assinatura!"
33050-25 = "Sobre o \"porquê deste local ter sido escolhido\", segundo informações de certas fontes, foi uma \"proposta da liderança de Gehenna\"! Isso é surpreendente!"
33050-26 = "Será porque este é um local histórico onde a \"Primeira Assembleia Geral\" da Trinity foi realizada?"
33050-27 = "Não, não, parece que não é isso. Aparentemente, o motivo é... \"Já que é um evento tão grande, um lugar grande e com autoridade é melhor\"."
33050-28 = "Em suma, \"um lugar grande é mais legal, não é?!\" Entendo, bem direto, não é mesmo?"
33050-29 = "Mudando um pouco de assunto, a \"Primeira Assembleia Geral\" que mencionei antes, e os preceitos estabelecidos nela, dizem ter sido protegidos por um grupo poderoso chamado \"Justina Council\" da época."
33050-30 = "Será que isso tem alguma relação? Hoje, foi confirmado que a \"Sisterhood\" da Trinity também está participando desta cerimônia de assinatura!"
33050-31 = "A \"Sisterhood\", que por muito tempo se absteve de atividades externas... por que elas apareceram aqui agora?"
33050-32 = "Será que isso significa que elas se consideram as sucessoras daquela organização, o \"Justina Council\", que agora desapareceu na história?"
33050-33 = "Bem, qual será o destino da tempestade política que assola a Academia Trinity... Sim? Chega de papo difícil? A audiência e os acessos vão cair?"
33050-34 = "Não dá para lidar com a política, mas também não dá para lidar com a pressão da redação! No entanto, nós temos a liberdade de expressão—"
33050-38 = "Devido a problemas de conexão, a imagem está instável. Por favor, aguarde um momento."
33050-40 = "…Após a assinatura do Tratado de Eden, as lideranças de ambas as academias concordarão com a criação da \"Organização do Tratado de Eden\" na Antiga Basílica!"
33050-42 = "Com isso, Trinity e Gehenna... essas duas academias que foram inimigas por tantos anos, assumirão a obrigação de resolver juntas quaisquer conflitos que ocorram entre elas!"
33050-43 = "Já que será assinado nesta Antiga Basílica, espera-se que, seguindo a proteção dos preceitos sagrados, essa obrigação seja cumprida com sinceridade!"
33050-44 = "É complicado, né? Vamos simplificar! Essas duas academias gigantes de Kivotos, famosas por viverem em pé de guerra, finalmente estão tentando dar as mãos pela paz!"
33050-45 = "Bem, em um momento tão importante, o que o nosso Conselho Estudantil Federal está fazendo?"
33050-46 = "Vejam como foi a coletiva de imprensa de emergência realizada ontem pelo Conselho Estudantil Federal!"
33050-48 = "…Encerramos a coletiva por aqui."
33050-51 = "Espere um pouco, oficial! Isso significa que o paradeiro da Presidente do Conselho Estudantil Federal ainda é desconhecido?"
33050-52 = "Em resumo, é isso."
33050-53 = "Não precisava nem resumir, não é!?"
33050-55 = "A avaliação pública sobre a competência do Conselho Estudantil Federal está ficando rigorosa. O que tem a dizer sobre isso?"
33050-56 = "Bem, não tem jeito, né?"
33050-57 = "Momoka-chan...!"
33050-58 = "Sobre informações incertas, nos absteremos de comentar nesta fase."
33050-59 = "Quais são as medidas para lidar com a gentrificação que está ocorrendo em cada distrito autônomo?"
33050-60 = "O fechamento da \"SRT Special Academy\" tem alguma relação com o incidente anterior na Sanctum Tower? Há informações de que parte da torre foi queimada, é verdade?"
33050-61 = "O que vocês pensam sobre o \"Tratado de Eden\" entre Trinity e Gehenna?"
33050-62 = "Sobre os incidentes ocorridos nos distritos de cada academia, basicamente deixamos a cargo de cada uma delas. Acreditamos que uma intervenção imprudente do Conselho Estudantil Federal seria irresponsável."
33050-63 = "Bem, também não temos tempo nem pessoal para intervir."
33050-64 = "Momoka-chan...!"
33050-65 = "Bem, encerraremos por aqui."
33050-70 = "Sim! Ou seja, \"não temos muito interesse\"!"
33050-71 = "Como esperado do Conselho Estudantil Federal! Essa magnanimidade parece até tocar o céu!"
33050-72 = "Agora, a seguir, sobre as figuras principais de cada academia que participarão deste Tratado de Eden—"
33050-75 = "…Que barulheira."
33050-76 = "Hoje é finalmente o dia em que o Tratado de Eden será assinado! A escola deu folga especialmente para isso, e a cidade está cheia de gente!"
33050-77 = "O pessoal da Kronos Broadcasting também estava aqui agora há pouco, parece até um festival!"
33050-78 = "É verdade. Já que é uma festa, teria sido bom se o Sensei estivesse conosco... mas parece que ele está ocupado com o tratado."
33050-79 = "…E por que eu fui chamada para vir aqui?"
33050-80 = "Isso é óbvio, afinal ainda somos companheiras do Clube de Estudos Suplementares, Koharu-chan♡"
33050-81 = "Já que isso também serve como uma festa de formatura para o Clube de Estudos Suplementares, você não poderia ficar mais um pouco?"
33050-82 = "E-Eu não disse que não queria! É que... nós nos esforçamos tanto e superamos tudo juntas..."
33050-83 = "E além disso, não é como se tudo fosse acabar aqui. Eu estarei sempre no Comitê de Justiça, então se você vier até a sala de gestão de itens confiscados, na maioria das vezes..."
33050-84 = "Sim. Eu vou te visitar logo, Koharu."
33050-85 = "Nesse caso, eu também irei visitá-la em breve. Preciso recuperar o meu \"Kama Sutra\" que foi confiscado algum dia desses."
33050-86 = "Kama...? O que é isso?"
33050-87 = "É uma obra da literatura clássica. Eu estava lendo tranquilamente perto da fonte, mas por algum motivo, ele foi confiscado de repente..."
33050-88 = "Literatura clássica? Humm..."
33050-89 = "...Não tem como ser isso! Se você estava lendo, com certeza é algo safado! Coisas safadas são proibidas! Incineração!!"
33050-90 = "Humm, deixando o confisco de lado, como eu peguei emprestado na biblioteca antiga, seria um problema se fosse queimado..."
33050-94 = "Ah, Azusa-chan. Por acaso você carrega esse bicho de pelúcia para todo lugar?"
33050-98 = "Sim. É algo importante, então é claro que preciso carregar comigo."
33050-99 = "E-Eu não sabia que era tanto assim... Não, eu agradeço, mas! O mundo dos Momo Friends é vasto, então, já que estamos nisso, por que não colecionar outros também? Da próxima vez, vamos a uma loja..."
33050-100 = "Sim, estou ansiosa por isso."
33050-101 = "Sim, com certeza! Afinal, o anime de aventuras do Peroro-sama será lançado em breve!"
33050-102 = "...Anime?"
33050-103 = "Sim! Eles unem forças com os amigos para derrotar o mal, superam as dificuldades juntos, e o final, onde todos terminam sorrindo, é muito emocionante...!"
33050-104 = "Isso não é um grande spoiler?"
33050-105 = "Ah, opa!? E-Esqueça o que eu acabei de dizer!?"
33050-106 = "Fufu, Hifumi-chan, você gosta desse tipo de final feliz?"
33050-107 = "S-Sim, é verdade. Será que é comum demais...?"
33050-108 = "...Não vou dizer que é ruim, mas não é um pouco clichê? Tipo, no final, todos se dão bem e tudo termina em harmonia."
33050-109 = "...Eu também não entendo muito bem o final feliz. Mesmo que você se esforce, o mundo não muda tão facilmente, e as feridas não desaparecem. Essa é a verdade deste mundo."
33050-110 = "Auu... vocês são todas bem sombrias, hein..."
33050-111 = "Eu acho esse tipo de coisa um pouco doloroso... Eu prefiro finais felizes onde todos podem ser felizes."
33050-112 = "Bem, o gosto varia de pessoa para pessoa. Aliás, eu gosto de finais onde a heroína fica com os olhos perdidos, babando enquanto implora por perdão♡"
33050-113 = "V-Você é idiota!? Existe um final desses!?"
33050-114 = "Humm, acho que existem vários, na verdade..."
33050-115 = "...Dito isso, se a Hifumi gosta, não acho que seja algo ruim. Acho que isso também tem o seu valor."
33050-119 = "Azusa-chaaaan!"
33050-125 = "Ora, ora♡"
33050-126 = "Hyaaaa...!?"
33050-128 = "Se tudo terminar assim..."
33050-129 = "Não, quando a cerimônia de assinatura de hoje terminar, quero conversar calmamente com o Sensei."
33050-130 = "...Sim, eu também."
33050-131 = "...Sensei, teria sido bom se você estivesse aqui."
33050-132 = "É verdade... Será que o Sensei está na Antiga Catedral agora? Provavelmente ele deve estar ocupado, não é...?"
33050-134 = "Antiga Catedral - Salão"
33050-136 = "[ns] \"...Que tédio.\""
33050-139 = "Próximo episódio: Cerimônia de Assinatura do Tratado do Éden (2)"
