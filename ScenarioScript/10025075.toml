[translation]
10025075-5 = "……今日は新月だが、なんで村が騒がしいんだ？"
10025075-6 = "「深きもの」にあれほど怯え外に出ようとしなかった者たちが、#n海辺で釣りや食事を楽しんでいるだと……？"
10025075-7 = "……これも全部、あの観光客たちのせいか。#nチッ、余計なことをしやがって。"
10025075-8 = "村の伝説がまやかしに過ぎないと知られるのは構わねぇが、この船の存在までバレちゃ面倒だな……"
10025075-13 = "代表――いえ、船長。"
10025075-14 = "明日の朝に予定していた荷積みですが、別の日に調整しましょうか？"
10025075-18 = "いや……これくらいで恐れてちゃ、事業は務まらんねぇだろ。#nどれだけのカネがかかってると思ってる。"
10025075-19 = "予定通り、明日の朝に決行だ。#n予報じゃ霧が濃いらしいな……そう簡単には見つからないだろう。"
10025075-20 = "それに……もし見つかったとしても、ここの住民じゃ相手にならん。#n軽く脅して黙らせておけ。"
10025075-21 = "では、このまま「鬼の[ruby=がんしょう]岩礁[/ruby]」近くに停泊します。"
10025075-27 = "フッ……フフ。全て計画通り。"
10025075-28 = "今回の[ruby=・   ・]荷物[/ruby]をブラックマーケットに売り捌けば、次の事業に向けた資金は十分。"
10025075-29 = "いよいよ、この悪臭漂う村ともおさらばだ！"
