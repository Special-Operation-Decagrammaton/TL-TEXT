[translation]
10025075-5 = "……Hoje é lua nova, mas por que a vila está tão agitada?"
10025075-6 = "Aqueles que tinham tanto medo dos \"Profundos\" a ponto de não saírem de casa, agora estão pescando e comendo na beira da praia...?"
10025075-7 = "……Isso também é tudo culpa daqueles turistas. #nTsc, que incômodo."
10025075-8 = "Não me importo que descubram que as lendas da vila não passam de mentiras, mas se a existência deste navio for revelada, será um problema..."
10025075-13 = "Representante... não, capitão."
10025075-14 = "Sobre o carregamento agendado para amanhã de manhã, devemos ajustar para outro dia?"
10025075-18 = "Não... se tivermos medo de algo assim, não conseguiremos tocar o negócio. #nVocê tem ideia de quanto dinheiro está em jogo?"
10025075-19 = "Como planejado, vamos seguir amanhã de manhã. #nA previsão diz que haverá neblina densa... não seremos encontrados tão facilmente."
10025075-20 = "Além disso... mesmo que nos encontrem, os moradores daqui não são páreo para nós. #nApenas dê um susto neles e faça-os calar a boca."
10025075-21 = "Entendido, continuaremos ancorados perto do \"Recife do Demônio\"."
10025075-27 = "Heh... hehe. Tudo conforme o planejado."
10025075-28 = "Se eu vender esta carga no mercado negro, terei fundos suficientes para o próximo empreendimento."
10025075-29 = "Finalmente, vou dar adeus a esta vila fedorenta!"
