[translation]
10002120-1 = "Episódio 12: Fogos de Artifício"
10002120-2 = "（Após muitas reviravoltas, conseguimos terminar as 5 missões da lista e agora observávamos calmamente o céu do pôr do sol.）"
10002120-3 = "（Como o último item, \"fogos de artifício\", só poderia ser feito após o anoitecer, tínhamos um pouco de tempo livre.）"
10002120-5 = "Já está nesse horário..."
10002120-6 = "Além disso, a Hifumi-san e a Azusa-san estão demorando, não é..."
10002120-7 = "[s] \"Será que elas foram longe demais para comprar os fogos?\""
10002120-8 = "Talvez seja isso mesmo."
10002120-9 = "……Kihi! Kihihi! Gehehehe!!"
10002120-10 = "……Senpai, você também está animada?"
10002120-11 = "Sinto muito por tê-las enviado para comprar, mas... como pude descansar um pouco assim, preciso agradecer às duas."
10002120-12 = "Quando terminarmos tudo, voltarei para relatar à Hasumi-senpai, mostrarei as fotos..."
10002120-13 = "Parece que tudo terminará sem problemas, graças ao Sensei."
10002120-14 = "[s1] \"Mashiro, você se divertiu?\"\n[s2] \"Tem mais alguma coisa que você queira fazer?\""
10002120-15 = "E-eu, bem, originalmente eu sou apenas um extra, vim porque a Hasumi-senpai me pediu..."
10002120-16 = "E-eu, bem, originalmente eu sou apenas um extra, vim porque a Hasumi-senpai me pediu..."
10002120-17 = "Mas, levada pela atmosfera, acabei me divertindo bastante também."
10002120-18 = "Eu pensava em manter meu coração voltado para a justiça em todos os momentos, mas... acabei me deixando levar."
10002120-19 = "Preciso refletir sobre isso... Mas, sim. Foi divertido, obrigada."
10002120-20 = "A Hifumi-san e as outras estão demorando um pouco. Vou lá buscá-las."
10002120-26 = "[ns3] \"Tsurugi, como foi para você?\"\n[ns4] \"Você se divertiu?\""
10002120-27 = "……！！"
10002120-28 = "……！！"
10002120-29 = "E-eu!? B-bem, eu...!"
10002120-30 = "……。"
10002120-31 = "N-na verdade, eu não sei bem... se isso está certo..."
10002120-32 = "Sinto que é diferente do que eu imaginava..."
10002120-33 = "Mas também sinto que pode estar certo..."
10002120-34 = "[s5] \"Se a Tsurugi se divertiu, então acho que está certo.\"\n[s6] \"Mais do que estar certo ou não, o que você sentiu é o que importa.\""
10002120-35 = "E-entendo... Ainda não sei explicar direito, mas..."
10002120-36 = "E-entendo... Ainda não sei explicar direito, mas..."
10002120-37 = "Era um pouco diferente do mar que vi nos livros... mas, brincar com todo mundo assim..."
10002120-38 = "É, muito, isso..."
10002120-39 = "Além disso, a-acima de tudo, bem...!"
10002120-40 = "Se-sensei—"
10002120-42 = "Voltamos!"
10002120-43 = "……！？"
10002120-49 = "Desculpem a demora. Finalmente encontramos uma loja, então compramos o que deu para comprar...!"
10002120-50 = "O alcance e o poder de fogo são insignificantes, mas são explosivos como encomendado."
10002120-51 = "Para mim, acho estranho serem tão caros para um poder de fogo tão fraco..."
10002120-52 = "Azusa-chan, não precisamos de poder de fogo para fogos de artifício..."
10002120-53 = "Por precaução, peguei algumas outras bombas que podem ser úteis. Vamos usá-las se algo acontecer."
10002120-54 = "Eu preferiria que esse \"algo\" não acontecesse..."
10002120-56 = "……Bem,"
10002120-57 = "Tsurugi-san, aconteceu alguma coisa? Ah, será que interrompi a conversa de vocês...!?"
10002120-58 = "……E-eh, não, é que..."
10002120-60 = "……Ki, kihi! Kukikiki...!"
10002120-62 = "Uuu, desculpe, não sei o que aconteceu, mas me desculpeee..."
10002120-63 = "[s] \"……Fufu.\""
10002120-65 = "（Depois disso, o tempo passou de alguma forma e, quando escureceu completamente）"
10002120-68 = "（Assim que o sol se pôs no horizonte, o ambiente ficou escuro rapidamente）"
10002120-69 = "(As lojas fecham uma após a outra, e apenas o som das ondas ecoa pela praia)"
10002120-70 = "Que silêncio... Não vejo mais ninguém por aqui. Será que todos, exceto nós, já foram embora?"
10002120-71 = "Não, ainda tem algumas delinquentes ali. Não sei o que estão fazendo agora, porém."
10002120-72 = "Entendo. Ainda estamos a uma certa distância, mas... por precaução, quer que eu faça um ataque preventivo?"
10002120-73 = "Q-que tipo de \"precaução\" é essa? Não acho que precisamos começar uma briga...! Nada aconteceu ainda...!"
10002120-74 = "É verdade, mas,"
10002120-75 = "elas nos atacaram várias vezes antes. Não acha que podem fazer isso de novo?"
10002120-76 = "[s7] \"Pode ser, mas também pode não ser.\"\n[s8] \"Talvez elas também estejam soltando fogos de artifício.\""
10002120-78 = "Fogos de artifício...?"
10002120-80 = "Fogos de artifício...?"
10002120-81 = "Não é algo que possamos descartar. Quando fui comprar fogos de artifício na loja que vende explosivos, as delinquentes também estavam lá."
10002120-82 = "Dada aquela situação, mesmo considerando outras variáveis, é bem provável que elas tenham comprado fogos."
10002120-83 = "Claro, ainda existe uma chance mínima de algo acontecer. No sentido de identificar e me preparar para todos os riscos possíveis, eu concordo, mas..."
10002120-84 = "A-acho que não precisa ir tão longe..."
10002120-85 = "...Eu sabia que a Hifumi diria isso. Por enquanto, vou apenas ficar em alerta."
10002120-86 = "Entendido. Nesse caso, não direi mais nada."
10002120-96 = "Fogos de artifício..."
10002120-97 = "Pois é."
10002120-98 = "Na direção onde as delinquentes estavam... eram realmente fogos de artifício."
10002120-101 = "...Incrível. Estão brilhando..."
10002120-105 = "...!?!?"
10002120-112 = "(...Pá!!!)"
10002120-113 = "Ainda não, isso não é o suficiente! Azusa, vamos lançar uns ainda maiores para não perder para os fogos delas!"
10002120-114 = "Claro, não podemos perder."
10002120-115 = "Eeeehhh!? P-por que vocês estão competindo!?"
10002120-116 = "Por que estão transformando isso em uma disputa!?"
10002120-120 = "P-parece que elas estão revidando também...!?"
10002120-121 = "Hauuu!! S-sensei~~!!"
10002120-122 = "[s] \"...É lindo, não é?\""
10002120-124 = "Uma disputa de teimosia,"
10002120-125 = "não é ruim."
10002120-126 = "D-desse jeito, os fogos que compramos com tanto esforço vão acabar num piscar de olhos...!!"
10002120-127 = "(BOOOOM!!)"
10002120-128 = "...!?"
10002120-129 = "...!!"
10002120-130 = "...Aquilo é,"
10002120-131 = "Provavelmente, uma bomba de napalm."
10002120-132 = "De fato, bombas de napalm são muito mais potentes que fogos comuns. Usá-las como fogos de artifício... que ideia, hein?"
10002120-133 = "Acho que aquilo já não pode ser chamado de fogos de artifício..."
10002120-134 = "Atiradora, temos bombas de napalm aqui?"
10002120-135 = "Não temos."
10002120-137 = "Ah, lá vem outra coisa...!"
10002120-139 = "...?"
10002120-140 = "A trajetória está baixa, não está...?"
10002120-141 = "...Ah."
10002120-142 = "...?"
10002120-143 = "...Haa."
10002120-144 = "Então é isso."
10002120-148 = "(BOOOOM!!)"
10002120-149 = "...Muito bem, então é guerra."
