[translation]
10002120-1 = "第12話;花火"
10002120-2 = "（紆余曲折の末、何とかリストに書かれた5つのミッションを終わらせて、今はゆっくりと夕日の空を見つめていた）"
10002120-3 = "（最後に残った「花火」は日が暮れないとできないことだったので、少し時間の余裕がある）"
10002120-5 = "もうこんな時間……。"
10002120-6 = "それに、ヒフミさんとアズサさん、遅いですね……。"
10002120-7 = "[s] \"花火を買いに、遠くまで行っちゃったのかな？\""
10002120-8 = "もしかしたら、そうかもしれません。"
10002120-9 = "……きひっ！きひひっ！げへへへ！！"
10002120-10 = "……先輩も、楽しみですか？"
10002120-11 = "買いに行ってもらったのは申し訳ないのですが……こうして少しゆっくり休めましたので、お二人には感謝しないとですね。"
10002120-12 = "全部終わったら、帰ってハスミ先輩に報告して、写真をお見せして……"
10002120-13 = "問題無く終わりそうですね、先生のおかげです。"
10002120-14 = "[s1] \"マシロは楽しかった？\"\n[s2] \"他に何か、やりたいこととかない？\""
10002120-15 = "え、えっと、本来私はおまけと言いますか、ハスミ先輩に言われて付いてきただけで……。"
10002120-16 = "え、えっと、本来私はおまけと言いますか、ハスミ先輩に言われて付いてきただけで……。"
10002120-17 = "ですが雰囲気にのまれて、私もだいぶ楽しんでしまいました。"
10002120-18 = "いついかなる時も正義の心を、と思っていたのですが……だいぶ夢中になってしまいました。"
10002120-19 = "そこは、反省しないとですね……。ですが、はい。楽しかったです、ありがとうございます。"
10002120-20 = "ヒフミさんたち、少し遅いですね。ちょっとお迎えに行ってきます。"
10002120-26 = "[ns3] \"ツルギはどうだった？\"\n[ns4] \"楽しかった？\""
10002120-27 = "……！！"
10002120-28 = "……！！"
10002120-29 = "わ、私ですか！？え、えっと、私は……！"
10002120-30 = "……。"
10002120-31 = "じ、実は、よく分からないんです……これで正しいのか……。"
10002120-32 = "お、思っていたのとは違う気もしますし……。"
10002120-33 = "正しいような気も、しますし……。"
10002120-34 = "[s5] \"ツルギが楽しかったなら、それが正しいと思うよ。\"\n[s6] \"正しいかどうかより、ツルギの感じたことが全てだよ。\""
10002120-35 = "な、なるほど……まだはっきりとは良く分かりませんが……。"
10002120-36 = "な、なるほど……まだはっきりとは良く分かりませんが……。"
10002120-37 = "本で見た海とは、少し違いましたが……こうして、一緒にみんな遊んでくれて……。"
10002120-38 = "す、すごく、その……。"
10002120-39 = "それに、な、何より、えっと……！"
10002120-40 = "せ、せん――"
10002120-42 = "ただいま戻りましたー！"
10002120-43 = "……っ！？"
10002120-49 = "すみません、お待たせしました。ようやくお店が見つかりまして、とりあえず買える分だけ買ってきました……！"
10002120-50 = "範囲や火力は微々たるものだけど、注文通りの爆発物だ。"
10002120-51 = "私としては、火力が弱い割に値段が高くてどうかとも思うのだけど……。"
10002120-52 = "アズサちゃん、花火に火力は要らないんですよ……。"
10002120-53 = "念のため、花火以外にも幾つか使えそうな爆弾を手に入れてきた。万が一の時はこれを使おう。"
10002120-54 = "その「万が一」は、できれば起きてほしくないのですが……。"
10002120-56 = "……えっと、"
10002120-57 = "ツルギさんどうかしましたか？あ、もしかしてお話の途中に割り込んでしまいましたか……！？"
10002120-58 = "……え、や、その……。"
10002120-60 = "……きっ、ききっ！くきききっ……！"
10002120-62 = "ううっ、すみません、なんだか分かりませんがごめんなさいいぃぃぃ……。"
10002120-63 = "[s] \"……ふふっ。\""
10002120-65 = "（その後、なんだかんだで時間が過ぎ、日が完全に暮れた頃）"
10002120-68 = "（水平線の向こうに太陽が沈むと、すぐに周囲は暗くなった）"
10002120-69 = "（次々とお店も閉店し、海辺には波の音だけが響いている）"
10002120-70 = "静かですね……もう誰も見当たりませんし、私たち以外みなさん帰られてしまったんでしょうか？"
10002120-71 = "いや、あっちの方に、まだスケバンたちが残ってる。今何をしてるかは知らないけど。"
10002120-72 = "そうでしたか。距離はそれなりにありますが……念のため、先制攻撃しておきますか？"
10002120-73 = "な、何が「念のため」なのか良く分かりませんが、喧嘩は売らなくても良いのではないかと……！まだ何も起こっていませんし……！"
10002120-74 = "確かにそうですが、"
10002120-75 = "これまで何度もあちらから仕掛けてきました。また次もやってくると思いませんか？"
10002120-76 = "[s7] \"そうかもしれないけど、そうじゃないかもしれない。\"\n[s8] \"もしかしたらあっちでも、花火をしてるんじゃないかな。\""
10002120-78 = "花火……ですか？"
10002120-80 = "花火……ですか？"
10002120-81 = "一概に否定できる話でもない。さっき花火を買いに、爆発物を取り扱ってるお店に入った時、そこにスケバン達もいた。"
10002120-82 = "あの状況からして、他の変数を加味しても花火を買っていた可能性は高い。"
10002120-83 = "もちろん、それでも万が一ということはある。できる限りのリスクを洗い出して備えるという意味では、私は賛成だけど……"
10002120-84 = "そ、そこまでやらなくても良いと思います……。"
10002120-85 = "……ヒフミならそう言うと思った。とりあえず、警戒だけはしておく。"
10002120-86 = "分かりました。でしたら私も、これ以上は何も言わないでおきますね。"
10002120-96 = "花火……。"
10002120-97 = "ですね。"
10002120-98 = "スケバンたちがいた方角……本当に花火だったんだ。"
10002120-101 = "……すごい。キラキラ、してる……。"
10002120-105 = "……！？！？"
10002120-112 = "（……パァン！！！）"
10002120-113 = "まだです、これでは足りません！アズサさん、あちらの花火に負けないくらいもっと大きいのを打ち上げましょう！"
10002120-114 = "もちろん、負けるわけにはいかない。"
10002120-115 = "えぇぇぇっ！？な、何を張り合ってるんですか！？"
10002120-116 = "どうしてまた勝負してるんですか！？"
10002120-120 = "な、何だか向こうも対抗してきているような……！？"
10002120-121 = "はうぅぅ！！せ、せんせえ～～！！"
10002120-122 = "[s] \"……綺麗だね。\""
10002120-124 = "意地の張り合いか、"
10002120-125 = "悪くない。"
10002120-126 = "こ、これじゃ、せっかく買ってきた花火があっという間に……！！"
10002120-127 = "（ドカアアァァァァン！！）"
10002120-128 = "……！？"
10002120-129 = "……！！"
10002120-130 = "……あれは、"
10002120-131 = "恐らく、ナパーム弾ですね。"
10002120-132 = "確かに、ナパーム弾は普通の花火より遥かに強力。それを花火として使うとは、考えたな……？"
10002120-133 = "もうあれは花火じゃないと思いますが……。"
10002120-134 = "狙撃手、こちらにナパーム弾は？"
10002120-135 = "ありません。"
10002120-137 = "あっ、また何か……！"
10002120-139 = "……？"
10002120-140 = "軌道が低い、ですね……？"
10002120-141 = "……あ。"
10002120-142 = "……？"
10002120-143 = "……はぁ。"
10002120-144 = "そういうことか。"
10002120-148 = "（ドカアアァァァァン！！）"
10002120-149 = "……良いだろう、ならば戦争だ。"
