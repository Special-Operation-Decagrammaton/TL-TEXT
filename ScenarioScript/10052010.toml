[translation]
10052010-1 = "Binah: Uma compreensora de observação e percepção da diferença."
10052010-2 = "Momoi―― Cheguei!"
10052010-3 = "Descer do céu, é incrível……。 "
10052010-4 = "Uuu, fiquei com medo……。#n……e aí?"
10052010-6 = "[ns] \"Isso……? \""
10052010-9 = "É visível……。 "
10052010-10 = "Visível……。 "
10052010-11 = "……Como eu diria isso?"
10052010-12 = "É um buraco grande, então, não seria melhor chamar de 'grande buraco'?"
10052010-13 = "Não é muito simples demais esse nome……。 "
10052010-14 = "Ei, o nome precisa ser fácil de entender, Kay!"
10052010-19 = "De alguma forma…… um som embotado está sendo ouvido. "
10052010-20 = "Um som artificial…… provavelmente o som de algum mecanismo."
10052010-21 = "[s] \"Então, Binah está no fundo do buraco? \""
10052010-22 = "……Provavelmente sim."
10052010-27 = "Pessoal, há uma resposta de Binah no fundo do buraco. #nMas isso é……"
10052010-28 = "Há algum problema?"
10052010-29 = "O sinal emitido é mais fraco que o dos outros Profetas. #nPodemos especular algumas causas, mas――"
10052010-30 = "Entendi! Binah está dormindo, não?"
10052010-31 = "Essa possibilidade existe também……。 "
10052010-32 = "O buraco é tão grande que o sinal detectado pode estar fraco."
10052010-33 = "[s] \"Por que Binah está no fundo do buraco? \""
10052010-34 = "Não temos uma resposta clara. #nMas Binah tem diferenças claras dos outros Profetas."
10052010-35 = "É mesmo?"
10052010-36 = "Pelo que vemos nos registros, Binah é observada há muito tempo. #nAntes mesmo do início das atividades da Deca Gramaton."
10052010-37 = "O Conselho Estudantil de Abydos estava estudando isso, mas os documentos da época já foram perdidos.……。 "
10052010-38 = "Mesmo o fato de Binah vagar pelo Deserto de Abydos é um mistério. "
10052010-39 = "Então, quer dizer que Binah é especial?"
10052010-40 = "Sim. Então, essa geografia e configuração podem ter algum motivo."
10052010-41 = "De qualquer forma, precisamos chamar Binah."
10052010-42 = "Chamar…… Uma boa expressão. #nEu também estava pensando em algo semelhante."
10052010-43 = "Yuzu? Vou te dar o ângulo e a velocidade inicial. #nVocê consegue disparar um projétil de granada exatamente como eu digo?"
10052010-44 = "H, h-hai!? Eu?…… D-porque……?"
10052010-45 = "Eu queria estimular Binah um pouco. #nE também para medir o tamanho e a profundidade do buraco."
10052010-46 = "Yuzu, eu sei como funciona sua arma."
10052010-47 = "Se você disparar com o ângulo correto e controlar a velocidade inicial, a granada cairá quase em queda livre."
10052010-48 = "Calculando o tempo de explosão e o eco do som da explosão, podemos estimar o tamanho do buraco."
10052010-49 = "Vou enviar um drone de observação. Não vou demorar muito."
10052010-56 = "Então…… vamos disparar!"
10052010-63 = "[ns] \"Como está? Entendeu? \""
10052010-64 = "……Mais do que eu esperava. Primeiro, a largura perto do fundo é――"
10052010-65 = "Pelo menos, é muito maior do que imaginamos. Não acha?"
10052010-71 = "――!? Detectamos uma grande reação de massa!"
10052010-78 = "U, uwaaa!?"
10052010-79 = "Um som horrível vindo do fundo……!"
10052010-80 = "B-Binah está subindo! Parece que ela acordou."
10052010-81 = "Talvez tenhamos a acordado.……。 "
10052010-82 = "[s] \"Tudo deu certo. \""
10052010-83 = "Bem, como previsto."
10052010-84 = "[ns] \"Essa área é…… nossa! \""
10052010-85 = "Essa frase ainda é cedo demais...."
