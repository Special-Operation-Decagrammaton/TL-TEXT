[translation]#[Texto Final , mas eventualmente pode haver alterações na formatação de texto. - Filipe 29/06.]
21060-1 = "Episódio 6: Um Jeito de Aprender a Falar."
21060-2 = "Millennium · Clube de Desenvolvimento de Jogos"
21060-3 = "Enfim, deixa eu me apresentar de novo."
21060-4 = "Sou a Yuzu, presidente\ndo Clube de Desenvolvimento de Jogos."
21060-5 = "Obrigada por ter vindo pra este clube, Aris."
21060-6 = "Conto com você daqui pra frente."
21060-7 = "Conto…… com você?"
21060-8 = "……Compreendido."
21060-9 = "Yuzu entrou para o grupo, tcharaaam!"
21060-10 = "……Está correto?"
21060-11 = "Ah, sim. É mais ou menos\nessa a ideia, acho."
21060-12 = "Hehe, por essa reação, você curtiu mesmo o nosso\njogo, né…… ganhar companheiros é uma das\nmaiores graças de um RPG."
21060-13 = "Ah, se você achou RPG divertido……"
21060-14 = "eu te indico outros jogos bons também."
21060-15 = "Peeera aí! Quem indica pra Aris primeiro sou eu!"
21060-16 = "Quanto mais jogo de qualidade ela jogar, mais\nnatural fica o jeito de falar, e mais sobe\na taxa de sucesso do nosso plano!"
21060-17 = "Então, primeiro o \"Mito dos Heróis\", aí o\n\"Final Fantasia\", aí o \"Eyes Eternal\", aí……"
21060-18 = "Que isso, a Aris é iniciante em jogo! Começar pela\n\"Lenda de Zelna: A Ilha dos Sonhos\" é o melhor,\ncom certeza!"
21060-19 = "Só nisso eu não abro mão: o próximo a jogar é o\n\"Conto Romancing\". Ah, mas só o terceiro da série,\nna minha opinião, pode pular……"
21060-22 = "……??"
21060-23 = "……"
21060-25 = "……Expectativa. Iniciando o jogo mais uma vez."
21060-27 = "(2 horas depois)"
21060-28 = "(Tec, tec, tec, tec, tec, tec……)"
21060-29 = "Uau, Aris, você não tá lendo rápido demais……?\nÉ tipo, mal o diálogo aparece na tela\ne você já terminou de ler……"
21060-30 = "Aris, agora bora jogar \"A Lendária Batalha\ndos Orcs\"! Vou te ensinar a graça\nda batalha por turnos!"
21060-31 = "(Acena que sim)"
21060-32 = "(Tec, tec, tec, tec, tec, tec……)"
21060-34 = "(Zzz……)"
21060-35 = "……Nhami."
21060-36 = "(Tec, tec, tec, tec, tec, tec……)"
21060-38 = "(Tec, tec, tec, tec, tec, tec……)"
21060-39 = "……Concluído."
21060-41 = "(Tec, tec, tec, tec, tec, tec……)"
21060-42 = "……Concluído."
21060-44 = "Piu, piu……"
21060-45 = "Hmmm……"
21060-46 = "Hã, já é de manhã!? Droga,\ntenho que me arrumar……!"
21060-47 = "……"
21060-48 = "Então finalmente despertaste……"
21060-49 = "Que bom que acordaste são e salvo;\ntens sorte, viajante."
21060-50 = "Hã!?"
21060-51 = "A-Aris, é você……? Como você tá?\nConseguiu aprender um monte de coisa?"
21060-52 = "Hei de validar tuas palavras, ó mortal."
21060-53 = "S-será que ela não andou aprendendo\nsó fala meio enviesada……!?"
21060-54 = "Fããã…… bom dia, gente……"
21060-56 = "(Cláqui)"
21060-57 = "Bom dia!"
21060-58 = "Aris, toma."
21060-62 = "……?"
21060-63 = "Aris obteve \"documento não identificado\"."
21060-65 = "Oh, o jeito de falar tá ainda mais refinado.\nIsto aqui é a \"carteirinha estudantil\"."
21060-66 = "Refinado é forma de dizer, é a cara\ndo diálogo de jogo retrô, né……"
21060-67 = "Carteirinha estudantil……?"
21060-68 = "Essa carteirinha é o comprovante de que você é\naluna da nossa colégio. A Veritas hacker…… digo,\nregistrou você na lista de alunas também, então\nagora a Aris já é oficialmente da nossa equipe!"
21060-69 = "Equipe…… compreendido, entendi."
21060-71 = "Tcharaaam, Aris se juntou ao grupo\ncomo \"companheira\"!"
21060-73 = "Ei, você não falou \"hackear\" agora……?"
21060-74 = "Que nada, que nada! Enfim, roupa, carteirinha\ne jeito de falar! Isso tudo a gente já resolveu,\nentão……"
21060-75 = "Agora falta……"
21060-76 = "a arma, né."
21060-77 = "Beleza. Aris, já que é assim, eu te mostro o caminho."
21060-78 = "Mostrar o caminho……?"
21060-81 = "Pela nossa colégio, a Millennium!"
21060-83 = "Próximo episódio: Grande Demais para ser uma Arma de Fogo."