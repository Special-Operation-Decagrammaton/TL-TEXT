[translation]
21060-1 = "Episódio 6; O Método para Aprender Palavras"
21060-2 = "Millennium - Depto. de Desenvolvimento de Jogos"
21060-3 = "Enfim, novamente."
21060-4 = "Sou a presidente do Departamento de Desenvolvimento de Jogos, Yuzu."
21060-5 = "Obrigada por vir para o nosso clube, Aris-chan."
21060-6 = "Contamos com você de agora em diante."
21060-7 = "Contam... comigo...?"
21060-8 = "......Compreendido."
21060-9 = "Yuzu entrou para o grupo, ta-da-da-daaan!"
21060-10 = "......Está correto?"
21060-11 = "Ah, sim. É mais ou menos assim, eu acho."
21060-12 = "Fufu, pelo visto, você realmente se divertiu com o nosso jogo... Afinal, ganhar mais membros no grupo é uma das melhores coisas nos RPGs, não é."
21060-13 = "Ah, se você achou os RPGs divertidos..."
21060-14 = "Eu posso te recomendar outros jogos."
21060-15 = "Espera aí! Eu vou recomendar os meus para a Aris primeiro!"
21060-16 = "Quanto mais jogos de qualidade ela jogar, mais natural a fala dela vai ficar, e a taxa de sucesso do nosso plano vai aumentar!"
21060-17 = "Então, primeiro vamos de 'Hero Myth', 'Final Fantasia', 'Eyes Eternal' e..."
21060-18 = "Do que você tá falando, a Aris-chan é iniciante em jogos!? Começar por 'A Lenda de Zerna - A Ilha dos Sonhos' é a melhor opção!"
21060-19 = "Disso eu não abro mão, o próximo que ela tem que jogar é 'Romancing Story'. Ah, mas o terceiro jogo, pessoalmente, acho que ela não precisa jogar..."
21060-22 = "......??"
21060-23 = "......"
21060-25 = "......Expectativa. Iniciando o jogo novamente."
21060-27 = "(2 horas depois)"
21060-28 = "(Beep, beep, beep, beep, beep, beep...)"
21060-29 = "Uau, a velocidade de leitura da Aris não tá rápida demais...? É como se ela terminasse de ler quase no mesmo instante em que o texto aparece na tela..."
21060-30 = "Aris-chan, agora vamos jogar 'A Lendária Batalha dos Ogros'! Vou te mostrar o quão divertidas são as batalhas por turnos!"
21060-31 = "(Acena)"
21060-32 = "(Beep, beep, beep, beep, beep, beep...)"
21060-34 = "(Zzz...)"
21060-35 = "......Nyah."
21060-36 = "(Beep, beep, beep, beep, beep, beep...)"
21060-38 = "(Beep, beep, beep, beep, beep, beep...)"
21060-39 = "......Zerado."
21060-41 = "(Beep, beep, beep, beep, beep, beep...)"
21060-42 = "......Zerado."
21060-44 = "Piu, piu..."
21060-45 = "Uhhnn..."
21060-46 = "Eh, já é de manhã!? Droga, tenho que me arrumar...!"
21060-47 = "......"
21060-48 = "Finalmente acordou, hein..."
21060-49 = "Ainda bem que despertou em segurança, você tem sorte."
21060-50 = "Eh!?"
21060-51 = "Ah, é a Aris-chan... Como você tá? Conseguiu aprender bastante coisa?"
21060-52 = "Irei afirmar as tuas palavras, ó ser mortal."
21060-53 = "V-Você não acabou aprendendo só um monte de falas de fantasia esquisitas...!?"
21060-54 = "Fuaaah... Bom dia, pessoal..."
21060-56 = "(Clack)"
21060-57 = "Bom dia!"
21060-58 = "Aris, pegue isso."
21060-62 = "......?"
21060-63 = "Aris obteve [Documento Misterioso]."
21060-65 = "Oh, sua fala ficou ainda mais refinada. Isso é uma 'Carteirinha de Estudante'."
21060-66 = "Não diria refinada, ela tá falando exatamente igual aos textos de jogos retrô..."
21060-67 = "Carteirinha de Estudante...?"
21060-68 = "Essa carteirinha é um documento que prova que você é aluna da nossa escola. A Veritas hacke... quer dizer, registrou você na lista de alunos também, então a Aris agora é oficialmente parte do nosso grupo!"
21060-69 = "Grupo... Certo, compreendido."
21060-71 = "Ta-da-da-daaan, Aris se juntou ao 'grupo' como companheira!"
21060-73 = "Ei, você não ia dizer 'hackeou' agorinha...?"
21060-74 = "Tá tudo bem, relaxa! Bom, temos roupas, a carteirinha de estudante e o jeito de falar! Já que resolvemos tudo isso..."
21060-75 = "Agora só falta..."
21060-76 = "Uma arma."
21060-77 = "Beleza. Aris, já que estamos nessa, vou te mostrar o lugar."
21060-78 = "Mostrar o lugar...?"
21060-81 = "A nossa escola, a Millennium!"
21060-83 = "Próximo Episódio; Grande demais para ser chamada de arma"