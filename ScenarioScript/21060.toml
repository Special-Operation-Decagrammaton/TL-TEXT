[translation]
21060-1 = "Episódio 6; Como aprender palavras"
21060-2 = "Departamento de Desenvolvimento de Jogos do Millennium"
21060-3 = "De qualquer forma, prazer em conhecê-la novamente."
21060-4 = "Eu sou a Yuzu, a presidente do Departamento de Desenvolvimento de Jogos."
21060-5 = "Obrigada por vir ao nosso clube, Alice-chan."
21060-6 = "Conto com você daqui para frente."
21060-7 = "Con...to com você...?"
21060-8 = "……Entendido."
21060-9 = "A Yuzu se tornou uma aliada, tan-tan-taran!"
21060-10 = "……Está correto?"
21060-11 = "Ah, sim. É mais ou menos por aí, eu acho."
21060-12 = "Fufu, pelo visto, você realmente gostou dos nossos jogos... Ganhar novos aliados é um dos pontos altos de um RPG, não é?"
21060-13 = "Ah, se você achou que RPGs são interessantes..."
21060-14 = "Eu posso te recomendar outros jogos."
21060-15 = "Espere um pouco! Eu que vou recomendar jogos para a Alice primeiro!"
21060-16 = "Quanto mais jogos de qualidade ela jogar, mais natural será o seu jeito de falar, e a taxa de sucesso do nosso plano também vai aumentar!"
21060-17 = "Vamos lá, primeiro temos 'Mito dos Heróis', 'Final Fantasia', 'Olhos Eternos' e..."
21060-18 = "O que você está dizendo? A Alice-chan é iniciante em jogos, sabia!? O melhor é começar por 'A Lenda de Zelna: Ilha dos Sonhos'!"
21060-19 = "Disso eu não abro mão, o próximo que ela deve jogar é 'História Romântica'. Ah, mas o terceiro jogo, pessoalmente, acho que não precisa jogar..."
21060-22 = "……？？"
21060-23 = "……."
21060-25 = "……Expectativa. Começando o jogo novamente."
21060-27 = "(2 horas depois)"
21060-28 = "(Bip, bip, bip, bip, bip, bip……)"
21060-29 = "Nossa, Alice, a sua velocidade de leitura não está muito rápida...? Parece que você termina de ler quase no mesmo instante em que o diálogo aparece..."
21060-30 = "Alice-chan, o próximo será 'Batalha de Orcs Lendária'! Vou te ensinar como as batalhas por turno são divertidas!"
21060-31 = "(Assente)"
21060-32 = "(Bip, bip, bip, bip, bip, bip……)"
21060-34 = "(Zzz……)"
21060-35 = "……Funya."
21060-36 = "(Bip, bip, bip, bip, bip, bip……)"
21060-38 = "(Bip, bip, bip, bip, bip, bip……)"
21060-39 = "……Concluído."
21060-41 = "(Bip, bip, bip, bip, bip, bip……)"
21060-42 = "……Concluído."
21060-44 = "Piu, piu……"
21060-45 = "Uuuuh……"
21060-46 = "Hã, já é de manhã!? Droga, preciso me preparar……!"
21060-47 = "……."
21060-48 = "Finalmente acordou……"
21060-49 = "Fico feliz que tenha despertado em segurança, você tem sorte."
21060-50 = "Hã!?"
21060-51 = "Ah, Alice-chan... Como você está se sentindo? Conseguiu aprender bastante coisa?"
21060-52 = "Afirmo suas palavras, ó mortal."
21060-53 = "V-você não aprendeu só frases estranhas, aprendeu...!?"
21060-54 = "Faa... Bom dia, pessoal……"
21060-56 = "(Click)"
21060-57 = "Bom dia!"
21060-58 = "Alice, isto aqui."
21060-62 = "……?"
21060-63 = "Alice obteve o 'Documento de Origem Desconhecida'."
21060-65 = "Oh, seu tom de voz está ainda mais refinado. Isso é uma 'Carteira de Estudante'."
21060-66 = "Mais do que refinado, parece exatamente com o estilo de diálogo de um jogo retrô..."
21060-67 = "Carteira de estudante...?"
21060-68 = "Esta carteira de estudante é a prova de que você é uma aluna da nossa escola. A Veritas já ha... quer dizer, já registrou você no registro de alunos, então agora a Alice é oficialmente uma de nós!"
21060-69 = "Uma de nós... Entendido, compreendido."
21060-71 = "Tan-tan-tan! Alice juntou-se ao grupo como uma 'aliada'!"
21060-73 = "Ei, você não disse 'hacking' agora pouco...?"
21060-74 = "Está tudo bem, tudo bem! Bem, as roupas, a carteira de estudante e o jeito de falar! Já resolvemos tudo isso, então..."
21060-75 = "Agora só falta..."
21060-76 = "A arma, né."
21060-77 = "Certo. Alice, já que estamos aqui, vou te mostrar o lugar."
21060-78 = "Mostrar...?"
21060-81 = "A nossa escola, Millennium!"
21060-83 = "Próximo episódio: Grande demais para ser chamada de arma"
