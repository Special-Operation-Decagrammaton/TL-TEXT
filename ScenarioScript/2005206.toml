[translation]
2005206-1 = "A psicologia da gestão"
2005206-2 = "Professor, você faria qualquer coisa por um aumento nas vendas?"
2005206-3 = "[s1] \"Você diz coisas assustadoras...\"\n[s2] \"Aconteceu alguma coisa?\""
2005206-6 = "Na verdade, ultimamente as coisas estão um pouquiiiiinho difíceis..."
2005206-7 = "Bem, problemas na indústria editorial não são novidade, mas..."
2005206-8 = "Você sabia, Professor?"
2005206-9 = "Existe um ditado que diz: \"Gestores sempre podem alegar que estão em crise\"."
2005206-10 = "Se as vendas aumentam, você pode insistir que é uma crise porque o futuro é incerto—"
2005206-11 = "E se as vendas caem, bem, aí é uma crise de verdade."
2005206-12 = "Depois de atingir o recorde histórico de vendas, uma queda relativa é inevitável,"
2005206-13 = "então isso se torna a base perfeita para chamar a queda na proporção de vendas de uma grande crise, sabe?"
2005206-14 = "Francamente... não dá para confiar na raça dos gestores, mufufu."
2005206-15 = "[s] \"Então, não dá para confiar em você também, Yakumo~\""
2005206-16 = "Eh."
2005206-17 = "...É, é assim que funciona...?"
2005206-18 = "I-isso foi uma brincadeira, só uma brincadeira. Hehe, he..."
2005206-19 = "E-enfim."
2005206-20 = "Livros físicos já são tratados como lembrancinhas,"
2005206-21 = "e os livros digitais estão... em um caos imprevisível."
2005206-22 = "Hmm... não tem nenhuma ideia brilhante por aí que possa mudar essa situação?"
2005206-23 = "Mesmo que tivesse, provavelmente seria apenas um paliativo."
2005206-24 = "Mas, se você acumular vários paliativos, eles podem acabar se tornando uma solução."
2005206-25 = "[s] \"Primeiro, precisamos fazer com que todos leiam livros.\""
2005206-26 = "Essa é exatamente a diretriz básica do nosso Departamento Editorial."
2005206-27 = "Ah, quem me dera que caísse uma nevasca daquelas..."
2005206-28 = "Por que? Se nevasse tanto a ponto de ninguém sair de casa, poderíamos manipular a opinião pública dizendo que o melhor a se fazer é ficar trancado consumindo conteúdo..."
2005206-29 = "Opa, perdão... é que poderíamos fazer uma \"recomendação saudável\"."
2005206-30 = "[s] \"Você nem tenta mais esconder, né...\""
2005206-31 = "...Por favor, diga que estou seguindo as normas de conformidade direitinho."
2005206-32 = "E aqui temos um problema."
2005206-33 = "Red Winter está sempre coberta de neve, sabe..."
2005206-34 = "Como nevar é algo do dia a dia, não tem muita credibilidade dizer que está caindo uma nevasca..."
2005206-35 = "[s] \"Ou seja, você quer destacar que a neve está muito forte, certo?\""
2005206-36 = "Em resumo, é isso."
2005206-37 = "Eh? Você tem uma boa ideia...?"
2005206-41 = "...Com licença, Professor?"
2005206-42 = "Não estou conseguindo acompanhar, poderia explicar de novo...?"
2005206-43 = "[s3] \"Uma foto da Yakumo fazendo um anjo de neve--\"\n[s4] \"Vamos colocar na próxima capa!\""
2005206-46 = "Por que..."
2005206-47 = "[s] \"Porque não dá para fazer um anjo de neve se não tiver muita neve acumulada.\""
2005206-48 = "E por que eu teria que fazer isso...?"
2005206-49 = "Eu não gosto de aparecer em público."
2005206-50 = "Sou uma pessoa caseira assumida, afinal..."
2005206-51 = "[s5] \"Exatamente!\"\n[s6] \"Se virem uma Yakumo enterrada na neve desse jeito,\"\n[s7] \"todos vão achar que caiu uma nevasca enorme.\""
2005206-57 = "Eh... se a chefe do Departamento Editorial, que nunca sai de casa, está enterrada na neve, então..."
2005206-58 = "Todos vão achar que é uma situação extraordinária...?"
2005206-59 = "E, para você, Professor, essa cena parece interessante e você quer fotografar...?"
2005206-60 = "...Você só quer tirar a foto, não é?"
2005206-61 = "[s] \"Não foi você quem disse que faria qualquer coisa pelas vendas?\""
2005206-62 = "Ugh... isso é o que chamam de karma..."
2005206-63 = "Não tem jeito... a língua é o chicote do corpo..."
2005206-71 = "[wa:470]― [log=야쿠모]Oh... [wa:1590]é bem fofinho, né.[/log]"
2005206-74 = "― [log=야쿠모]Surpreendentemente [wa:840]bom... [wa:1460]talvez.[/log]"
2005206-77 = "[wa:330]― [log=야쿠모]...Foi o que [wa:560]eu pensei, mas [wa:2550]está frio [wa:780]mesmo.[/log]"
2005206-80 = "― [log=야쿠모]Atchim![/log]"
2005206-83 = "[ns] \"Olha aqui pra foto!\""
2005206-84 = "[wa:1910]― [log=야쿠모]Conseguiu tirar?[/log]"
2005206-86 = "― [log=야쿠모]Então [wa:400]agora [wa:450]é a vez do Sensei.[/log]"
2005206-89 = "― [log=야쿠모]Ué?[/log]"
2005206-91 = "― [log=야쿠모]...Não me diga que [wa:530]pretende deixar [wa:720]só eu fazendo isso?[/log]"
2005206-94 = "[wa:650]― [log=야쿠모]Ora, ora, [wa:1570]isso é muito[/log]"
2005206-96 = "― [log=야쿠모]simplório, [wa:390]não acha? [wa:1730]Sensei?[/log]"
2005206-99 = "[wa:980]― [log=야쿠모]O General Inverno de [wa:850]Red Winter,[/log]"
2005206-101 = "― [log=야쿠모]é igual para [wa:680]todos, sabe? [wa:1920]Mufufu.[/log]"
