22050-127 = "[s] \"Ué, Neru?\""
22050-128 = "Que é isso, o Sensei também tava junto."
22050-129 = "Ótimo, bem na hora.#nVocês duas, me acompanhem um pouco."
22050-130 = "H-heein!? A Aris ainda tá no meio da aventura……"
22050-132 = "Anda, bora logo."
