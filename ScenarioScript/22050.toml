22050-83 = "……Ah, é mesmo.#nAris, ultimamente o railgun……"
22050-88 = "Quer dizer, a espada de luz, como ela tá? Sem nenhum probleminha?"
22050-92 = "Tudo certinho!#nPra Aris, a espada de luz é um tesouro!"
22050-93 = "Isso, porque é o símbolo do herói! Eu cuido dela com carinho!"
22050-94 = "[s] \"Pra Aris é um tesouro insubstituível, né.\""
22050-96 = "[ns] \"……Embora o detalhe seja que, de vez em quando, ela destrói o teto com isso.\""
22050-97 = "Hã? Isso é um problema?"
22050-98 = "Na Millennium é coisa comum."
22050-100 = "Porque o avanço da tecnologia traz consigo\num certo grau de sacrifício."
22050-101 = "[s] \"……Sei. Pro Clube de Engenharia também era coisa comum, né.\""
22050-102 = "Bom, ainda assim……"
22050-103 = "se você cuida dela com carinho, pra gente\ntambém é motivo de alegria."
22050-104 = "Conto com você daqui pra frente, Aris."
22050-106 = "Sim!"
22050-108 = "(E assim, sendo incentivada durante a aventura……)"
22050-109 = "(A aventura com a Aris continuou——)"
22050-118 = "(Houve outros encontros também……)"
22050-120 = "Achei você, baixinha."
