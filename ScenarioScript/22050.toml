22050-148 = "[s] \"Desculpa, Neru. A gente tá no meio da aventura, meio ocupada……\""
22050-149 = "Hã? Que é que você tá falando?"
22050-150 = "Mais que isso, tem uma coisa mais importante, ora."
22050-151 = "[s] \"Uma coisa mais importante……?\""
22050-152 = "Hã? Ora, é——"
22050-156 = "Millennium · Fliperama"
22050-163 = "Droga! Perdi de novo!#nGruaah! Que raiva!"
22050-164 = "Que golpe é esse!? Isso é golpe-trava, ora!"
22050-165 = "A Yuzu disse que golpe-trava também é um elemento de jogo!"
22050-166 = "Hã? Para de usar truque sujo!?"
22050-167 = "U-uaaah!?"
22050-168 = "[s] \"A coisa importante era…… jogo?\""
22050-169 = "Hãã?"
22050-170 = "Mas é claro, ora.#nPorque hoje eu decidi que ia tirar a revanche daquela baixinha."
22050-171 = "Da última vez eu vacilei, mas………"
22050-172 = "A Aris de agora é de outro nível. Porque eu treinei os combos!"
22050-174 = "Aris, essas palavras da veterana Neru……\neu lembro de ouvir na semana passada também."
22050-176 = "O que é que você disse, ãã!"
22050-177 = "(E assim, mesmo nessa implicância, as duas seguiram com o jogo de luta.)"
22050-194 = "[ns] \"Vocês duas batalham bastante?\""
22050-195 = "Sim…… como a veterana Neru me desafia muito,\na Aris atende."
22050-196 = "Hã? Tá parecendo que sou eu que te obrigo a jogar."
22050-197 = "[s] \"Ué, não é?"
22050-198 = "Claro que não é!?"
22050-199 = "Fiquei na dúvida sobre que tipo de coisa essa aqui\ne o pessoal do Clube de Desenvolvimento de Jogos faziam."
22050-200 = "Foi investigando que acabei batalhando algumas vezes, só isso."
22050-201 = "Mas, segundo a memória da Aris, hoje foi a 50ª vez\nque batalhei com a veterana Neru."
22050-202 = "……Foi só coincidência de os horários baterem."
22050-203 = "[s] \"Neru…… você gosta mais de jogo do que aparenta, hein.\""
22050-204 = "Sim, segundo a experiência da Aris, a veterana Neru\nadora jogo."
22050-205 = "Ela vem muito à sala do clube e joga no KivoStation da Midori."
22050-206 = "Aliás, o histórico até agora é 50 batalhas, 50 vitórias.\nA Aris está numa sequência de vitórias."
22050-208 = "Em habilidade de jogo, a veterana Neru ainda tem que melhorar!#nCom um pouco mais de capricho nos combos, aquele de agora……"
22050-209 = "[s] \"……Você gosta mesmo, né.\""
22050-210 = "Droga, que é que você tá falando!! Cala a boca!!"
22050-211 = "Próxima! A gente joga mais uma."
22050-212 = "É-é…… de novo……?"
22050-213 = "Até eu ganhar.#nAnda, me ensina os combos."
22050-214 = "Mas, assim…… até a veterana Neru ganhar……#na Aris…… não volta pra sala do clube antes do anoitecer……"
22050-215 = "Isso depende do seu jeito de ensinar, ora!?"
22050-221 = "(E assim, a batalha entre a Neru e a Aris recomeçou——)"
22050-222 = "Droga!? S-sua!"
22050-233 = "Veterana Neru…… socando os botões os combos não saem……\né preciso digitar um por um, com calma!"
22050-234 = "E-eu sei disso!"
22050-241 = "(E assim, as duas seguiram jogando……)"
22050-246 = "U-uaah!#nA-a veterana Neru não consegue emendar os combos……"
22050-247 = "Do jeito que tá, a barra de fome da Aris e do Sensei vai chegar a zero……"
22050-248 = "Tch, droga, de novo, do começo!"
22050-249 = "(Mesmo soltando palavrão, a Neru não parava o jogo; e, empurrada pela empolgação dela, a aula de jogo de luta da Aris continuou……)"
22050-265 = "……Droga, faltou tão pouquinho pra emendar."
22050-266 = "………………(acanhada)"
22050-271 = "Gruaah……! Mais uma. Pode ser, né?"
22050-272 = "S-sim!"
22050-273 = "(E ali estavam as duas, aprofundando aos poucos a compreensão uma da outra através do jogo——)"
22050-293 = "[ns] \"Ah……\""
22050-294 = "…………"
22050-295 = "Vai, esse! Vai! Emenda!"
22050-296 = "Ah, é…… aquilo……"
22050-297 = "Ei, ãã! Não tira o olho da tela!"
22050-298 = "O meu combo magnífico……"
22050-299 = "——Eu me perguntava onde você tava enrolando……"
22050-300 = "Então estava aqui, presidente."
