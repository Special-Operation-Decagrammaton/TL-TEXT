[translation]
22050-1 = "Episódio 5; ~Alice e Aqueles que São Guiados~ (2)"
22050-2 = "Praça nº 19 do Millennium"
22050-3 = "（Desde então, a aventura continuou junto com Alice）"
22050-4 = "A próxima área é aqui!"
22050-11 = "Alice consegue sentir... há sinais de um novo item aqui!"
22050-12 = "Então, vamos começar a exploração..."
22050-14 = "Ah, é a Alice-chan."
22050-21 = "O que houve hoje? Está em treinamento de guerreira de novo?"
22050-22 = "Não é treinamento de guerreira, é treinamento de heroína.#nHoje é a versão heroína aprendiz!"
22050-23 = "Tem alguma diferença...? Não entendi muito bem."
22050-24 = "Quem é a pessoa ao seu lado? Um adulto?"
22050-25 = "O Sensei é o Sensei!#nEle é o mascote do grupo da heroína."
22050-26 = "[s1] \"Olá, sou o Sensei do Schale.\"\n[s2] \"Olá, sou o mascote do grupo da heroína.\""
22050-29 = "Sensei, tipo, do Schale...?"
22050-30 = "Que pessoa com uma aura misteriosa...#nDe certa forma, até consigo entender por que é o mascote..."
22050-31 = "............ É, você acha?"
22050-32 = "Bom, deixa pra lá.#nAlice-chan, boa sorte na aventura de hoje~"
22050-33 = "Sim! Alice recebeu o apoio e está recarregada!"
22050-34 = "（Dessa forma, elas caminhavam por todo o Millennium, recebendo apoio dos alunos que encontravam pelo caminho）"
22050-36 = "Grande Sala de Aula nº 11 do Millennium"
22050-37 = "Hm? Ué, não é a Alice?"
22050-38 = "Alice, oi~#nEstá em uma missão hoje também?"
22050-39 = "Sim! Hoje estou fazendo uma missão que a Yuzu me deu."
22050-40 = "Hum, é mesmo?"
22050-41 = "Então, pode levar isso aqui para a sala de aula?"
22050-42 = "Err, isso é uma missão?"
22050-43 = "Sim. A recompensa é esta!#nUm Mont Blanc que comprei na famosa doceria de Trinity!"
22050-44 = "O que é isso, que injusto!"
22050-45 = "Então, se você completar essa missão, eu te dou uma bolinha de chocolate!"
22050-46 = "Sim! Missões são a especialidade da Alice!#nDeixe com a Alice!"
22050-47 = "（Às vezes, ela recebia doces como recompensa por missões）"
22050-49 = "Hum! Será que quem está ali é..."
22050-56 = "Ah, o Sensei e a Alice."
22050-57 = "Oi."
22050-59 = "O-olá!"
22050-63 = "[ns] \"Olá, é raro ver o Clube de Engenharia por aqui.\""
22050-64 = "O Sensei está interessado na nossa agenda, não é!"
22050-65 = "Tudo bem! Eu mesma explicarei!#nNós do Clube de Engenharia acordamos às 7 da manhã..."
22050-67 = "（Garota explicando）"
22050-69 = "...e foi assim que chegamos aqui!#nNão é, Hibiki! Utaha-senpai!?"
22050-70 = "Ah, sim, bem, é mais ou menos isso."
22050-71 = "...talvez?"
22050-72 = "Em resumo, viemos aqui para repor equipamentos que estavam faltando."
22050-73 = "Hum hum... essa figura que continua criando novas armas todos os dias..."
22050-74 = "Como esperado da ferreira de aço que criou a Espada de Luz para mim!#nAlice! Estou emocionada!"
22050-75 = "Armas...?"
22050-76 = "Ah, não entendi muito bem... mas vou aceitar como um elogio."
22050-77 = "Ferreira... que escolha de palavras típica da Alice!"
22050-78 = "Bem, em um sentido amplo, é verdade."
22050-79 = "A arma da Alice é o orgulho do Clube de Engenharia, afinal..."
22050-83 = "……É isso. #nAlice, como tem passado o seu canhão elétrico ultimamente……"
22050-88 = "Não, digo, como está a sua espada de luz? Algum problema com ela?"
22050-92 = "Está perfeita! #nPara a Alice, a espada de luz é um tesouro!"
22050-93 = "Sim, porque é o símbolo da heroína! Eu cuido dela com muito carinho!"
22050-94 = "[s] \"É um tesouro insubstituível para você, não é, Alice?\""
22050-96 = "[ns] \"……Embora o problema seja que, às vezes, você acaba destruindo o teto com ela.\""
22050-97 = "Hã? Isso é um problema?"
22050-98 = "É algo comum no Millennium."
22050-100 = "O desenvolvimento tecnológico sempre traz algum nível de sacrifício, afinal."
22050-101 = "[s] \"……Entendi. É algo comum para o Clube de Engenharia também, né?\""
22050-102 = "Bem, ainda assim……"
22050-103 = "Fico feliz em saber que você cuida dela com tanto carinho."
22050-104 = "Continue assim, Alice."
22050-106 = "Sim!"
22050-108 = "（E assim, enquanto recebia incentivo durante a aventura……）"
22050-109 = "（A aventura com a Alice continuou――）"
22050-118 = "（Outros encontros também aconteceram……）"
22050-120 = "Te achei, tampinha."
22050-125 = "Ah, uma empregada tampinha selvagem apareceu!"
22050-126 = "Hã? Quem você está chamando de tampinha selvagem!?"
22050-127 = "[s] \"Ora, Neru?\""
22050-128 = "O que foi? Você também estava com o Sensei?"
22050-129 = "Veio na hora certa. #nOs dois, venham comigo agora."
22050-130 = "E-espera!? A Alice ainda está no meio de uma aventura……"
22050-132 = "Anda logo, vamos."
22050-136 = "U-uwaaaaa……!?"
22050-137 = "Alice foi capturada pela empregada tampinha! #nSerá que a aventura da Alice acaba aqui!?"
22050-138 = "Se for para ter um final ruim, pelo menos eu queria uma imagem de cena!"
22050-139 = "Do que você está falando……?"
22050-141 = "E esquece isso, que história é essa de empregada tampinha!?"
22050-142 = "……Então, como a Alice deveria te chamar?"
22050-143 = "Me chame de senpai, como qualquer um faria."
22050-144 = "Vamos, me chame de Neru-senpai."
22050-145 = "Hum…… Sim, entendi!"
22050-146 = "Neru-senpai tampinha."
22050-147 = "Tira o tampinha daí!"
22050-148 = "[s] \"Desculpe, Neru. Estamos um pouco ocupados com a nossa aventura……\""
22050-149 = "Hã? Do que você está falando?"
22050-150 = "Tem coisas muito mais importantes do que isso, sabia?"
22050-151 = "[s] \"Coisas…… mais importantes?\""
22050-152 = "Hã? É claro que――"
22050-156 = "Centro de Jogos do Millennium"
22050-163 = "Droga! Perdi de novo! #nGrrr! Que raiva!"
22050-164 = "Que golpe foi esse!? Isso não é um combo infinito!?"
22050-165 = "A Yuzu disse que combos infinitos também fazem parte do jogo!"
22050-166 = "Hã? Não use truques sujos!"
22050-167 = "U-uwaaaaa!?"
22050-168 = "[s] \"Coisas importantes…… eram jogos?\""
22050-169 = "Hã?"
22050-170 = "É óbvio que sim. #nEu decidi que hoje eu ia me vingar daquela tampinha."
22050-171 = "Da última vez eu baixei a guarda, mas..."
22050-172 = "Agora eu sou uma pessoa diferente. Eu pratiquei meus combos!"
22050-174 = "Alice, eu me lembro de ter ouvido a senpai Neru dizer isso... na semana passada também."
22050-176 = "O que você disse, sua pirralha?!"
22050-177 = "（Enquanto brincam uma com a outra dessa forma, as duas continuam jogando o jogo de luta.）"
22050-194 = "[ns] \"Vocês costumam jogar uma contra a outra?\""
22050-195 = "Sim... A senpai Neru costuma me desafiar, e a Alice responde aos desafios."
22050-196 = "Hã? Tá querendo dizer que eu tô forçando ela a jogar comigo?"
22050-197 = "[s] \"Ué, não é?\""
22050-198 = "Claro que não!?"
22050-199 = "Eu só queria ver que tipo de coisa ela e o pessoal do Clube de Desenvolvimento de Jogos estavam criando."
22050-200 = "Acabou que, enquanto eu investigava, a gente acabou jogando algumas partidas."
22050-201 = "Mas, de acordo com a memória da Alice, hoje é a 50ª vez que a senpai Neru joga contra mim."
22050-202 = "……Foi só coincidência nossos horários baterem."
22050-203 = "[s] \"Neru... você gosta bastante de jogos, né?\""
22050-204 = "Sim, de acordo com a experiência da Alice, a senpai Neru adora jogos."
22050-205 = "Ela vem sempre ao clube e joga no Play-Station da Midori."
22050-206 = "Aliás, o placar até agora é de 50 vitórias para a Alice em 50 partidas. A Alice está em uma sequência de vitórias."
22050-208 = "Em termos de habilidade no jogo, a senpai Neru ainda tem muito o que aprender!#nSe você aprimorar um pouco mais o combo, aquele de agora..."
22050-209 = "[s] \"...Você gosta mesmo, né?\""
22050-210 = "Droga, o que você tá dizendo?! Cala a boca!!"
22050-211 = "Próxima! Vamos de novo."
22050-212 = "S-sim... de novo...?"
22050-213 = "Até eu ganhar. #nAnda, me ensina o combo."
22050-214 = "Não pode ser... dizer que vai jogar até a senpai Neru ganhar...#nAlice... não vai conseguir voltar para o clube até o anoitecer..."
22050-215 = "Isso depende de como você ensina, não depende?!"
22050-221 = "（E assim, a partida entre Neru e Alice recomeçou――）"
22050-222 = "Droga!? Essa, sua...!"
22050-233 = "Senpai Neru... ficar apertando os botões aleatoriamente não vai fazer o combo conectar... você precisa inserir cada comando com cuidado!"
22050-234 = "E-eu já sei disso!"
22050-241 = "（Enquanto isso, as duas continuam jogando...）"
22050-246 = "U-uuaa!#nO, o combo da senpai Neru não conecta..."
22050-247 = "Desse jeito, a barra de fome da Alice e do Sensei vai chegar a zero..."
22050-248 = "Tsc, droga, vamos de novo desde o começo!"
22050-249 = "（Mesmo resmungando, Neru não para de jogar, e a orientação de jogos de luta da Alice continua, impulsionada pelo entusiasmo de Neru...）"
22050-265 = "……Droga, faltou tão pouco para conectar."
22050-266 = "………………（tímida）"
22050-271 = "Grrr...! Mais uma vez. Tudo bem?"
22050-272 = "S-sim!"
22050-273 = "（Ali estavam as duas, aprofundando sua compreensão mútua pouco a pouco através dos jogos――）"
22050-293 = "[ns] \"Ah...\""
22050-294 = "…………"
22050-295 = "Essa! Vai! Conecta!"
22050-296 = "Ah, u... hum..."
22050-297 = "Ei, sua pirralha! Não tira o olho da tela!"
22050-298 = "O meu combo magnífico..."
22050-299 = "――Eu me perguntava onde você estava matando tempo..."
22050-300 = "Então você estava em um lugar como este, Chefe."
22050-302 = "Uau! Ah, Akane!?#nDesde quando você está aí!?"
22050-303 = "Eu não lhe avisei?"
22050-304 = "Hoje tem um aviso de missão da presidente, então por favor, prepare-se, foi o que..."
22050-305 = "……Ah."
22050-306 = "[s] \"Eu tinha esquecido…….\""
22050-307 = "N-Não é isso! #nQuando isso acabar……"
22050-318 = "Ei!?"
22050-319 = "É a vitória perfeita da Alice!"
22050-320 = "Isso foi trapaça!"
22050-321 = "O mundo dos jogos é cruel. Você deve sempre lutar em sua melhor forma."
22050-322 = "Ou você está dizendo, senpai, que se fosse atingida por estar distraída durante o combate, isso seria inválido?"
22050-323 = "Heh…… olha só o que você diz……"
22050-324 = "Muito bem! Esse desafio……"
22050-326 = "Jogos são uma hora por dia. #nNós prometemos, não é?"
22050-327 = "Vamos, volte para a missão, chefe. #nNão vou permitir mais que isso."
22050-328 = "Ah, espere um pouco, Akane! Só mais um pouquinho……!"
22050-335 = "[ns] (Eu ignorei completamente o dever de casa……)"
22050-337 = "……Oh, Sensei? #nAconteceu alguma coisa?"
22050-338 = "[s] \"Não…….\""
22050-340 = "Droga, me aguarde! #n――Na próxima eu venço."
22050-341 = "Sim, sim, claro. #nVamos logo."
22050-346 = "Então, com licença. #nSensei, Alice-chan."
22050-358 = "(Ao sair do fliperama com a Alice, o sol já tinha se posto)"
22050-359 = "[s] \"Falando nisso, Alice.\""
22050-360 = "Sim?"
22050-361 = "[s3] \"Você não estava com medo da Neru?\n[s4] \"Pensei que você tivesse medo da Neru…….\""
22050-369 = "(Apesar disso, a Alice estava se divertindo muito com a Neru)"
22050-370 = "(Será que eu entendi errado……?)"
22050-371 = "Ah, bem……"
22050-372 = "É verdade que a Neru-senpai foi uma inimiga temporariamente…… mas agora ela é uma aliada."
22050-373 = "Por isso, a Momoi disse que há uma grande chance de a Neru-senpai estar mais fraca."
22050-374 = "Então, a Alice não tem mais medo da Neru-senpai."
22050-375 = "[s] \"A Momoi disse isso……? Se a Neru ouvir, ela vai ficar brava.\""
22050-376 = "C-Claro, a Alice ainda não gosta muito de roupas de empregada, mas……"
22050-377 = "Mesmo assim, agora……"
22050-383 = "Sim, a Neru-senpai também é uma companheira!"
22050-384 = "Uma companheira para jogar com a Alice e com todos……"
22050-385 = "Bem, é um problema não poder fazer aventuras enquanto jogo com a Neru-senpai, mas……"
22050-386 = "Só hoje, na aventura com o Sensei…… bem……"
22050-387 = "[s] (Ah…… então é por isso que você estava evitando a Neru……)"
22050-389 = "[ns] \"Eu me diverti muito na aventura de hoje.\""
22050-390 = "!!"
22050-391 = "É mesmo?"
22050-392 = "[s] \"Alice, o que achou da aventura de hoje?\""
22050-394 = "(Caminhando por Millennium o dia todo, entendi como é a vida cotidiana da Alice)"
22050-402 = "(Conhecendo várias alunas,)"
22050-408 = "(sendo mimada por elas,)"
22050-420 = "(a Alice, que se esforça tanto em suas aventuras aqui……)"
22050-422 = "A Alice……"
22050-427 = "A Alice também se divertiu muito na aventura com o Sensei hoje!"
22050-428 = "Bem, infelizmente não conseguimos avançar na missão da Yuzu, mas……"
22050-429 = "Mesmo assim, a Alice é uma heroína. #nUma heroína nunca desiste!"
22050-435 = "Ainda sou uma aprendiz, mas continuarei completando missões e subindo muito de nível para..."
22050-436 = "Um dia, derrotarei o Rei Demônio que ameaça o mundo com esta espada de luz!"
22050-441 = "Até lá... você vai continuar se aventurando com a Alice, Sensei?"
22050-443 = "[s] \"Sim, é claro.\""
22050-450 = "（E assim o dia termina――）"
22050-451 = "（O cotidiano comum de Millennium continua）"
22050-452 = "（――Sim, eu pensava que continuaria）"
22050-455 = "Próximo episódio; A Máquina Misteriosa (1)"
