[translation]
22050-1 = "第5話;～アリスと導かれる者たち～（２）"
22050-2 = "第19番ミレニアムの広場"
22050-3 = "（その後もアリスと共に冒険は続いた）"
22050-4 = "次の地域はここです！"
22050-11 = "アリスには分かります……ここに、新しいアイテムの気配が！"
22050-12 = "それでは探索をはじめ……"
22050-14 = "あっ、アリスちゃんだ～。"
22050-21 = "今日はどうしたの？今日も武者修行中？"
22050-22 = "武者修行ではなく勇者修行です。#n今日は見習い勇者バージョンです！"
22050-23 = "それって何か違いあるの……？あんまり分かんないけど。"
22050-24 = "隣の人は誰？大人？"
22050-25 = "先生は先生です！#n勇者パーティーのマスコットです。"
22050-26 = "[s1] \"こんにちは、シャーレの先生です。\"\n[s2] \"こんにちは、勇者パーティーのマスコットです。\""
22050-29 = "先生って、シャーレの……？"
22050-30 = "不思議な雰囲気の人だね……#nなんだかマスコットっていうのも、ちょっと理解できるかも……。"
22050-31 = "…………そ、そうかな？"
22050-32 = "まぁいいや。#nアリスちゃん、今日も冒険頑張ってね～"
22050-33 = "はい！アリス、応援を受けて充電しました！"
22050-34 = "（そんな風にミレニアム中を歩き回って、道行く生徒に応援をもらったり）"
22050-36 = "ミレニアム・第11番大講義室"
22050-37 = "ん？あれ、アリスじゃない？"
22050-38 = "アリス、やっほ～#n今日もクエスト中？"
22050-39 = "はい！今日はユズからもらったクエストをしています。"
22050-40 = "ふ～ん、そうなんだ？"
22050-41 = "じゃあ、これ。講義室に持って行ってくれない？"
22050-42 = "えっと、それはクエストですか？"
22050-43 = "うん。報酬はこれ！#nトリニティの有名スイーツ店で買ってきたモンブラン！"
22050-44 = "なにそれ、ずるい！"
22050-45 = "じゃあ、私はこのクエストを達成したら、チョコボールあげる！"
22050-46 = "はい！クエストはアリスの得意分野です！#nアリスにお任せください！"
22050-47 = "（クエスト報酬という名目でお菓子をプレゼントされたり）"
22050-49 = "むむっ！そこにいるのはもしや――"
22050-56 = "ああ、先生とアリスか。"
22050-57 = "やほ。"
22050-59 = "こ、こんにちは！"
22050-63 = "[ns] \"こんにちは、エンジニア部がここにいるのは珍しいね。\""
22050-64 = "先生は私たちのスケジュールにご興味があるんですね！"
22050-65 = "いいでしょう！私から説明しましょう！#n私たちエンジニア部は朝7時に起き……。"
22050-67 = "（少女説明中）"
22050-69 = "……してここに至ったわけです！#nそうですよね、ヒビキ！ウタハ先輩！？"
22050-70 = "あ、うん、まあ、そんな感じ。"
22050-71 = "……たぶん？"
22050-72 = "つまり、足りない装備を補充するために出てきたってわけさ。"
22050-73 = "ふむふむ……毎日新しい武具を作り続けるその姿……"
22050-74 = "さすが、光の剣を作ってくれた鋼鉄の鍛冶屋ですね！#nアリス！感激しました！"
22050-75 = "武具……？"
22050-76 = "あ、あまりよく分からないけど……お褒めの言葉として受け取っておこうかな。"
22050-77 = "鍛冶屋……アリスらしい言葉選びですね！"
22050-78 = "まぁ、広義でいえば、たしかにそうだね。"
22050-79 = "アリスの武器はエンジニア部の自信作だし……。"
22050-83 = "……そうだ。#nアリス、最近レールガンの……"
22050-88 = "いや、光の剣の調子はどうかな？不調とかはない？"
22050-92 = "バッチリです！#nアリスにとって、光の剣は宝物です！"
22050-93 = "そう、勇者の象徴ですから！大切に扱ってます！"
22050-94 = "[s] \"アリスにとってはかけがえのない宝物なんだね。\""
22050-96 = "[ns] \"……たまにそれで天井を壊してしまうのが難点だけど。\""
22050-97 = "え？それって問題なんですか？"
22050-98 = "ミレニアムではよくあること。"
22050-100 = "技術の発展には、ある程度の犠牲が伴うものだからね。"
22050-101 = "[s] \"……そっか。エンジニア部にとってもよくある事だったね。\""
22050-102 = "まぁ、それでも……。"
22050-103 = "大切にしてくれているのなら、私たちとしても嬉しいよ。"
22050-104 = "これからもよろしく頼むよ、アリス。"
22050-106 = "はい！"
22050-108 = "（そうして、冒険中に励まされたりしながら……）"
22050-109 = "（アリスとの冒険は続いた――）"
22050-118 = "（出会いは他にもあり……）"
22050-120 = "見つけた、チビ。"
22050-125 = "や、野生のチビメイド様が現れました！"
22050-126 = "あぁん？誰が野生のチビだ！？"
22050-127 = "[s] \"あれ、ネル？\""
22050-128 = "んだよ、先生も一緒にいたのか。"
22050-129 = "ちょうど良かった。#n二人ともちょっと付き合ってくれ。"
22050-130 = "え、ええっ！？アリスはまだ冒険の途中で……"
22050-132 = "ほら、さっさと行くぞ。"
22050-136 = "う、うわぁぁあん……！？"
22050-137 = "アリス、チビメイド様に捕獲されてしまいました！#nアリスの冒険はここまでなのでしょうか！？"
22050-138 = "せめてバッドエンドになるならスチルが欲しいです！"
22050-139 = "何言ってんだ……？"
22050-141 = "んなことより、チビメイドってなんだよ！"
22050-142 = "……では、アリスは何と呼べばいいのですか？"
22050-143 = "先輩でいいだろ、普通に。"
22050-144 = "ほら、ネル先輩って呼べよ。"
22050-145 = "うーん……はい、わかりました！"
22050-146 = "チビネル先輩。"
22050-147 = "チビを外せよ！"
22050-148 = "[s] \"ごめんね、ネル。私たち冒険中でちょっと忙しくて……。\""
22050-149 = "あ？何言ってんだ？"
22050-150 = "そんなんより、もっと大事なことがあるだろうがよ。"
22050-151 = "[s] \"もっと、大事なこと……？\""
22050-152 = "あ？そりゃ――"
22050-156 = "ミレニアム・ゲームセンター"
22050-163 = "くっそ！また負けた！#nぐああーっ！ムカつく！"
22050-164 = "んだよ、その技っ！？ハメ技じゃねぇかっ！"
22050-165 = "ユズはハメ技もゲーム要素の一つだと言っていました！"
22050-166 = "あ？セコい手使ってんじゃねぇよ！？"
22050-167 = "う、うわぁあん！？"
22050-168 = "[s] \"大事なことって……ゲーム？\""
22050-169 = "あぁ？"
22050-170 = "そりゃ当然だろうがよ。#n今日こそ、あのチビにリベンジするって決めてたからな。"
22050-171 = "前回は油断したがよぉ………"
22050-172 = "今のあたしは一味違うぜ。コンボの練習をしたからな！"
22050-174 = "アリス、ネル先輩のその言葉……先週も聞いた覚えがあります。"
22050-176 = "んだとゴルァ！"
22050-177 = "（そうやってじゃれあいながらも、二人は対戦ゲームを続けるのだった）"
22050-194 = "[ns] \"二人はよく対戦してるの？\""
22050-195 = "はい……ネル先輩がよく挑戦してくるので、アリスはそれに応じています。"
22050-196 = "あん？あたしが無理に付き合わせてるみてぇじゃねえか。"
22050-197 = "[s] \"あれ、違うの？"
22050-198 = "ちげぇよ！？"
22050-199 = "こいつやゲーム開発部の連中が作ってるもんが、どんなもんかと思ってな。"
22050-200 = "調べてるうちに、何回か対戦する事になっただけだ。"
22050-201 = "ですが、アリスの記憶によると、ネル先輩と対戦したのは今日で50回目です。"
22050-202 = "……たまたま、時間がかぶっただけだ。"
22050-203 = "[s] \"ネル……意外とゲーム好きなんだね。\""
22050-204 = "はい、アリスの経験によると、ネル先輩はゲームが大好きです。"
22050-205 = "よく部室に来て、ミドリのプライステーションでゲームをしています。"
22050-206 = "ちなみに、これまでの戦績は50戦50勝。アリスが連勝中です。"
22050-208 = "ゲームの腕ではネル先輩はまだまだです！#nもうちょっとコンボを工夫すれば、さっきのだって……"
22050-209 = "[s] \"……好きなんだね。\""
22050-210 = "クソッ、何いってんだよ！！っせぇな！！"
22050-211 = "次！もう一回やんぞ。"
22050-212 = "は、はい……またですか……？"
22050-213 = "あたしが勝つまでだ。#nほら、コンボ教えろよ。"
22050-214 = "そんな……ネル先輩が勝つまでだなんで……#nアリス……夕方まで部室に戻れません……。"
22050-215 = "お前の教え方次第だろうがよ！？"
22050-221 = "（そうして、ネルとアリスの対戦が再開された――）"
22050-222 = "くそっ！？こ、この！"
22050-233 = "ネル先輩……レバガチャではコンボは繋がりません……一つ一つ丁寧に入力しないとダメです！"
22050-234 = "わ、わかってるっての！"
22050-241 = "（そうやって、二人はゲームを続け……）"
22050-246 = "う、うわぁん！#nね、ネル先輩のコンボが繋がりません……"
22050-247 = "このままではアリスと先生の空腹ゲージがゼロになってしまいます……。"
22050-248 = "チッ、くそ、もっかい最初からだ！"
22050-249 = "（ネルは悪態を吐きながらも、ゲームを止めることはなく、ネルの熱意に押されるようにアリスの格ゲー指南は続き……）"
22050-265 = "……クソッあとちょっとで繋がったのに。"
22050-266 = "………………（おどおど）"
22050-271 = "ぐああ……！もう一回だ。いいよな？"
22050-272 = "は、はいっ！"
22050-273 = "（そこには、ゲームを通して少しずつ互いの理解を深めていく二人の姿が――）"
22050-293 = "[ns] \"あ……。\""
22050-294 = "…………"
22050-295 = "この！いけ！繋がれ！"
22050-296 = "あ、う……あの……"
22050-297 = "おい、ゴルァ！画面から目ぇ離すな！"
22050-298 = "あたしの華麗なコンボを……。"
22050-299 = "――どこでサボっているのかと思ったら……"
22050-300 = "こんなところにいらっしゃったのですね、部長。"
22050-302 = "うわっ！あ、アカネ！？#nいつの間に！？"
22050-303 = "私言いましたよね？"
22050-304 = "今日は会長からの任務の通達があるから、準備しておいてください、と――"
22050-305 = "……あ。"
22050-306 = "[s] \"忘れてたんだ……。\""
22050-307 = "ち、違う！#nこれが終わったら……"
22050-318 = "ちょっ！？"
22050-319 = "アリスの完璧な勝利です！"
22050-320 = "今のは反則だろ！"
22050-321 = "勝負の世界は冷酷なもの。常に最高の状態で勝負しなければならないのです。"
22050-322 = "それとも、ネル先輩は、戦闘中によそ見してやられても、今のは無効だと言うのですか？"
22050-323 = "へぇ……言ってくれるじゃねぇか……"
22050-324 = "上等だ！その挑戦……"
22050-326 = "ゲームは1日1時間。#n約束、しましたよね？"
22050-327 = "さあ、任務に戻りますよ部長。#nこれ以上は許しませんからね？"
22050-328 = "あ、ちょっと待ってくれアカネ！あと少しだけ……！"
22050-335 = "[ns] （完全に宿題をサボった……）"
22050-337 = "……あら、先生？#n何かありましたか？"
22050-338 = "[s] \"いいえ……。\""
22050-340 = "くっそ、覚えてろよ！#n――次こそは勝つ。"
22050-341 = "はいはい、そうですね。#n早く行きますよ。"
22050-346 = "それでは、お先に失礼いたします。#n先生、アリスちゃん。"
22050-358 = "（アリスと一緒にゲームセンターを出ると、もう日が暮れていた）"
22050-359 = "[s] \"そういえばアリス。\""
22050-360 = "はい？"
22050-361 = "[s3] \"アリスはネルを怖がっていたんじゃなかったの？\n[s4] \"ネルを怖がってるのかと思ってたけど……。\""
22050-369 = "（それにしては、アリスはネルと楽しく遊んでいた）"
22050-370 = "（もしかして、自分の勘違いだったのか……？）"
22050-371 = "あ、その……"
22050-372 = "たしかに、一時的にネル先輩は敵でしたが……今は味方。"
22050-373 = "なので、モモイが言うには、ネル先輩は弱くなっている確率が高いと言っていました。"
22050-374 = "だから、アリスはネル先輩の事はもう怖くありません。"
22050-375 = "[s] \"モモイがそんな事を……それ、ネルが聞いたら怒るよ。\""
22050-376 = "も、もちろん、アリスは未だにメイド服が少し苦手ですが……。"
22050-377 = "それでも今は……"
22050-383 = "はい、ネル先輩も仲間です！"
22050-384 = "アリスや、みんなとゲームをする仲間……。"
22050-385 = "その、ネル先輩とゲームをする間、冒険ができないのは困りますが……。"
22050-386 = "先生と冒険する今日だけは……その……"
22050-387 = "[s] （ああ……だからネルを避けて……）"
22050-389 = "[ns] \"私は今日の冒険、とても楽しかったよ。\""
22050-390 = "！！"
22050-391 = "そうですか？"
22050-392 = "[s] \"アリスは今日の冒険、どうだった？\""
22050-394 = "（一日中ミレニアムを歩き回って、アリスが普段どんな生活を送っているかが分かった）"
22050-402 = "（様々な生徒と出会い、）"
22050-408 = "（可愛がられたりしながら、）"
22050-420 = "（一生懸命ここで冒険をするアリスは……）"
22050-422 = "アリスは……"
22050-427 = "アリスも、今日の先生との冒険は楽しかったです！"
22050-428 = "その、残念ながらユズのクエストを進める事はできませんでしたが……。"
22050-429 = "それでもアリスは勇者です。#n勇者は諦めないものです！"
22050-435 = "まだ見習いですが、これからもクエストをこなし、たくさんレベルアップして……"
22050-436 = "いつかは、この光の剣で世界を脅かす魔王を倒します！"
22050-441 = "その時まで……アリスと一緒に冒険してくれますか、先生？"
22050-443 = "[s] \"うん、もちろん。\""
22050-450 = "（そうして今日が終わり――）"
22050-451 = "（ミレニアムの平凡な日常は続いていく）"
22050-452 = "（――そう、続くと思っていた）"
22050-455 = "次回;不思議な機械（１）"
