22050-327 = "Vamos, de volta à missão, presidente.#nMais que isso eu não permito, viu?"
22050-328 = "Ah, peraí, Akane! Só mais um pouquinho……!"
22050-335 = "[ns] (Matou a tarefa de casa por completo……)"
22050-337 = "……Ué, Sensei?#nAconteceu alguma coisa?"
22050-338 = "[s] \"Não……\""
22050-340 = "Droga, pode esperando!#n——Da próxima eu ganho."
22050-341 = "Sim, sim, claro.#nVamos logo."
22050-346 = "Então, com licença, vou indo.#nSensei, Aris."
22050-358 = "(Quando saí do fliperama junto da Aris, o sol já tinha se posto.)"
