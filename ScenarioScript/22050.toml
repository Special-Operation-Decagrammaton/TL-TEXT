22050-45 = "Então, se eu completar esta quest, eu dou um Chocoball!"
22050-46 = "Sim! Quest é a especialidade da Aris!#nPode deixar com a Aris!"
22050-47 = "(Ganhando doces com o pretexto de recompensa de quest……)"
22050-49 = "Hmm! Quem está ali não seria——"
22050-56 = "Ah, é o Sensei e a Aris."
22050-57 = "Oie."
22050-59 = "O-olá!"
22050-63 = "[ns] \"Olá. É raro ver o Clube de Engenharia por aqui.\""
22050-64 = "O Sensei tem interesse na nossa agenda, então!"
22050-65 = "Pois muito bem! Deixa eu explicar!#nNós, do Clube de Engenharia, acordamos às 7 da manhã……"
22050-67 = "(Garota explicando……)"
22050-69 = "……e foi assim que chegamos até aqui!#nNão é, Hibiki!? Utaha!?"
22050-70 = "Ah, é, bom, mais ou menos isso."
22050-71 = "……Talvez?"
22050-72 = "Ou seja, a gente saiu pra repor o equipamento que tava faltando."
22050-73 = "Hmmm…… continuar fabricando armas novas todo dia, essa postura……"
22050-74 = "Não é à toa que são as ferreiras de aço que fizeram a espada de luz!#nAris! Estou comovida!"
