22050-307 = "N-não!#nQuando isto aqui acabar……"
22050-318 = "Pera!?"
22050-319 = "Vitória perfeita da Aris!"
22050-320 = "Isso aí foi falta!"
22050-321 = "O mundo do duelo é cruel. É preciso lutar sempre\nno melhor estado possível."
22050-322 = "Ou então, veterana Neru, você diria que, se durante\no combate olhasse pro lado e fosse derrotada, aquilo não valeria?"
22050-323 = "Ah é…… falou bonito, hein……"
22050-324 = "Tá ótimo! Esse desafio……"
