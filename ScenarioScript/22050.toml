[translation]
22050-1 = "Episódio 5; ~Aris e os Guiados~ (2)"
22050-2 = "Millennium - Praça 19"
22050-3 = "(E então, a aventura com a Aris continuou)"
22050-4 = "A próxima área é aqui!"
22050-11 = "A Aris consegue sentir... Uma presença de um novo item aqui!"
22050-12 = "Então vamos começar a explorar..."
22050-14 = "Ah, é a Aris-chan~."
22050-21 = "O que foi hoje? Treinamento de guerreira de novo?"
22050-22 = "Não é de guerreira, é treinamento de heroína. #n Hoje eu estou na versão Heroína Aprendiz!"
22050-23 = "Tem alguma diferença...? Eu não entendo muito bem."
22050-24 = "E quem é essa pessoa do seu lado? Um adulto?"
22050-25 = "O Sensei é o Sensei! #n Ele é o mascote da party da heroína."
22050-26 = "[s1] \"Olá, eu sou o Sensei da Schale.\"\n[s2] \"Olá, eu sou o mascote da party da heroína.\""
22050-29 = "Sensei da... Schale?"
22050-30 = "Você tem uma aura misteriosa... #n De alguma forma, acho que consigo entender o porquê de você ser o mascote..."
22050-31 = ".........S-Será?"
22050-32 = "Bom, não importa. #n Boa sorte na sua aventura de hoje, Aris-chan~"
22050-33 = "Sim! A Aris recarregou as energias com a sua torcida!"
22050-34 = "(E assim, enquanto caminhávamos por toda a Millennium, recebíamos incentivos das alunas que passavam)"
22050-36 = "Millennium - Grande Sala de Palestras 11"
22050-37 = "Hm? Olha só, não é a Aris?"
22050-38 = "Ooooi, Aris~ #n Fazendo quests hoje também?"
22050-39 = "Sim! Hoje estou fazendo uma quest que a Yuzu me deu."
22050-40 = "Huum, entendi~"
22050-41 = "Então, toma aqui. Pode levar isso lá para a sala de palestras?"
22050-42 = "Ehm, isso é uma quest?"
22050-43 = "Uhum. E a recompensa é isso aqui! #n Um Mont Blanc que eu comprei numa doceria famosa de Trinity!"
22050-44 = "O que é isso, que injusto!"
22050-45 = "Então, quando eu terminar a minha quest, eu te dou bolinhas de chocolate!"
22050-46 = "Sim! Quests são a especialidade da Aris! #n Deixem com a Aris!"
22050-47 = "(Recebíamos doces como presentes sob o pretexto de serem 'recompensas de quests')"
22050-49 = "Mumu! Quem está ali é, por um acaso――"
22050-56 = "Ah, Sensei e a Aris."
22050-57 = "Opa."
22050-59 = "O-Olá!"
22050-63 = "[ns] \"Olá, é raro ver o Clube de Engenharia por aqui.\""
22050-64 = "Então o Sensei tem interesse na nossa agenda!"
22050-65 = "Muito bem! Deixe que eu explique! #n Nós do Clube de Engenharia acordamos às 7 da manhã e..."
22050-67 = "(Garota Explicando)"
22050-69 = "...e é por isso que nós viemos parar aqui! #n Não é mesmo, Hibiki! Utaha-senpai!?"
22050-70 = "Ah, uhum, bem, é por aí."
22050-71 = "......Eu acho?"
22050-72 = "Em outras palavras, nós saímos para repor os equipamentos que estavam faltando."
22050-73 = "Humm... A sua atitude de continuar construindo novas armas e armaduras todos os dias..."
22050-74 = "Como esperado das ferreiras de aço que criaram a Espada de Luz! #n A Aris está profundamente comovida!"
22050-75 = "Armas e armaduras...?"
22050-76 = "Ah, não entendi muito bem... mas vou aceitar isso como um elogio."
22050-77 = "Ferreiras... Que vocabulário bem a cara da Aris!"
22050-78 = "Bem, num sentido amplo da palavra, de fato somos."
22050-79 = "E a arma da Aris é a obra-prima do Clube de Engenharia..."
22050-83 = "......É mesmo. #n Aris, recentemente como anda o Railg..."
22050-88 = "Digo, como está a Espada de Luz? Nenhum problema de funcionamento?"
22050-92 = "Está perfeita! #n Para a Aris, a Espada de Luz é um tesouro!"
22050-93 = "Sim, ela é o símbolo de uma heroína! Eu estou cuidando dela com muito carinho!"
22050-94 = "[s] \"Então ela é um tesouro insubstituível pra Aris.\""
22050-96 = "[ns] \"......O único problema é que de vez em quando ela destrói o teto com ela.\""
22050-97 = "Eh? Isso é um problema?"
22050-98 = "Na Millennium isso é bem comum."
22050-100 = "O desenvolvimento da tecnologia sempre vem acompanhado de um certo nível de sacrifício."
22050-101 = "[s] \"......Entendo. Isso deve ser bem comum pro Clube de Engenharia também.\""
22050-102 = "Bem, mesmo assim..."
22050-103 = "Ficamos felizes por você estar cuidando dela com tanto carinho."
22050-104 = "Continue cuidando bem dela, Aris."
22050-106 = "Sim!"
22050-108 = "(E assim, recebendo encorajamentos durante a nossa aventura...)"
22050-109 = "(A aventura com a Aris continuou――)"
22050-118 = "(Tivemos outros encontros também...)"
22050-120 = "Te achei, baixinha."
22050-125 = "U-Uma Maid Baixinha-sama selvagem apareceu!"
22050-126 = "Ahnnn!? Quem é baixinha selvagem!?"
22050-127 = "[s] \"Olha só, Neru?\""
22050-128 = "Hã, o Sensei também tava junto."
22050-129 = "Que bom. #n Vocês dois, venham comigo."
22050-130 = "E-Eeeh!? A Aris ainda está no meio de uma aventura..."
22050-132 = "Anda logo, vamos nessa."
22050-136 = "U-Uwaaaah...!?"
22050-137 = "A Aris foi capturada pela Maid Baixinha-sama! #n Será este o fim da aventura da Aris!?"
22050-138 = "Se eu for pegar um Bad End, eu pelo menos queria uma CG!"
22050-139 = "Do que é que você tá falando...?"
22050-141 = "Mais importante que isso, o que diabos é Maid Baixinha!"
22050-142 = "......Então, como a Aris deve chamá-la?"
22050-143 = "Senpai já tá bom, do jeito normal."
22050-144 = "Fala logo, me chama de Neru-senpai."
22050-145 = "Hmmm... Sim, compreendido!"
22050-146 = "Baixinha Neru-senpai."
22050-147 = "Tira esse baixinha!"
22050-148 = "[s] \"Me desculpe, Neru. Nós estamos no meio de uma aventura e meio ocupados no momento...\""
22050-149 = "Hã? O que você tá dizendo?"
22050-150 = "Nós temos algo muito mais importante pra fazer do que isso."
22050-151 = "[s] \"Algo, mais importante...?\""
22050-152 = "Hã? É claro que é――"
22050-156 = "Millennium - Game Center"
22050-163 = "Merda! Perdi de novo! #n Gwaaah! Que raiva!"
22050-164 = "Mas que porra de golpe foi esse!? Isso foi tática de cheese, não foi!?"
22050-165 = "A Yuzu me disse que táticas de cheese também são um elemento do jogo!"
22050-166 = "Hã? Não venha me usar essas táticas sujas!?"
22050-167 = "U-Uwaaaah!?"
22050-168 = "[s] \"O 'algo importante' era... um jogo?\""
22050-169 = "Hã!?"
22050-170 = "É claro que era. #n Porque eu decidi que hoje eu ia ter a minha revanche contra essa baixinha."
22050-171 = "Eu baixei a guarda da última vez..."
22050-172 = "Mas eu tô diferente agora. Porque eu fiquei treinando meus combos!"
22050-174 = "Aris se lembra de ter ouvido a Neru-senpai dizer isso... na semana passada."
22050-176 = "O que você disse, caralho!"
22050-177 = "(E assim, enquanto brigavam de forma brincalhona, as duas continuaram jogando)"
22050-194 = "[ns] \"Vocês jogam muito uma contra a outra?\""
22050-195 = "Sim... A Neru-senpai vive me desafiando, então a Aris sempre aceita."
22050-196 = "Hã? Faz parecer que eu tô te forçando a jogar."
22050-197 = "[s] \"Ué, não é isso?"
22050-198 = "Claro que não!"
22050-199 = "Eu só tava curiosa pra ver o que essa pirralha e o pessoal do Departamento de Desenvolvimento de Jogos tavam fazendo."
22050-200 = "Enquanto eu investigava, acabei jogando contra ela umas vezes."
22050-201 = "No entanto, segundo a memória da Aris, essa foi a 50ª vez que jogamos juntas hoje."
22050-202 = "......Os nossos horários só bateram por coincidência."
22050-203 = "[s] \"Neru... você gosta mais de jogos do que eu imaginava.\""
22050-204 = "Sim, pela experiência da Aris, a Neru-senpai adora jogos."
22050-205 = "Ela costuma ir na sala do clube para jogar no PlayStation da Midori."
22050-206 = "A propósito, o placar até agora é de 50 vitórias e 0 derrotas. A Aris está numa sequência de vitórias."
22050-208 = "A Neru-senpai ainda tem muito o que melhorar nos jogos! #n Se você melhorar um pouquinho mais os seus combos, até aquele de agorinha..."
22050-209 = "[s] \"......Você gosta bastante, hein.\""
22050-210 = "Merda, o que vocês tão falando!! Calem a boca!!"
22050-211 = "Próxima! Vamos mais uma vez."
22050-212 = "H-Hã... de novo...?"
22050-213 = "Até eu ganhar. #n Vai, me ensina esses combos logo."
22050-214 = "Não pode ser... Até a Neru-senpai ganhar... #n A Aris... não vai conseguir voltar para o clube até o anoitecer..."
22050-215 = "Tudo depende da forma como você for me ensinar, não é!?"
22050-221 = "(E assim, a partida entre a Neru e a Aris recomeçou――)"
22050-222 = "Merda!? S-Seu...!"
22050-233 = "Neru-senpai... não dá pra fazer combos só esmagando os botões... você tem que apertar cada botão com precisão!"
22050-234 = "E-Eu sei disso, porra!"
22050-241 = "(E assim, as duas continuaram jogando...)"
22050-246 = "U-Uwaaah! #n O combo da Neru-senpai não tá encaixando..."
22050-247 = "Se continuar assim, a barra de fome da Aris e do Sensei vai chegar a zero..."
22050-248 = "Tsc, merda, de novo desde o começo!"
22050-249 = "(Embora xingasse, a Neru não parava de jogar, e a Aris continuava ensinando a jogar, sendo empurrada pelo entusiasmo da Neru...)"
22050-265 = "......Merda, o combo quase encaixou dessa vez."
22050-266 = "..................(Tremendo de medo)"
22050-271 = "Gwaah...! Mais uma vez. Você aguenta, né?"
22050-272 = "S-Sim!"
22050-273 = "(Lá estavam as duas, aprofundando a compreensão mútua aos poucos através do jogo――)"
22050-293 = "[ns] \"Ah...\""
22050-294 = "............"
22050-295 = "Sua! Vai! Encaixa!"
22050-296 = "A, u... ehm..."
22050-297 = "Ei, caralho! Não tira os olhos da tela!"
22050-298 = "Presta atenção no meu combo magnífico..."
22050-299 = "――Eu estava me perguntando onde a senhora estaria matando aula..."
22050-300 = "Então a senhora estava por aqui, Presidente."
22050-302 = "Uwaah! A, Akane!? #n Desde quando você tá aí!?"
22050-303 = "Eu já havia lhe avisado, não?"
22050-304 = "Que nós tínhamos uma reunião sobre uma missão da Presidente hoje, então era para estar preparada――"
22050-305 = "......Ah."
22050-306 = "[s] \"Você tinha esquecido...\""
22050-307 = "N-Não! #n Quando isso aqui acabar..."
22050-318 = "Espera!?"
22050-319 = "Uma vitória perfeita da Aris!"
22050-320 = "Isso não valeu, porra!"
22050-321 = "O mundo das batalhas é cruel e impiedoso. Precisamos estar sempre nas nossas melhores condições para lutar."
22050-322 = "Ou será que a Neru-senpai está sugerindo que, mesmo se você se distrair no meio da batalha e for derrotada, o combate deve ser anulado?"
22050-323 = "Hã... então quer dizer que é assim que vai ser..."
22050-324 = "Pois que venha! Eu aceito esse desafio..."
22050-326 = "O tempo de jogo é de 1 hora por dia. #n Nós tínhamos prometido, não é?"
22050-327 = "Vamos, volte para a missão, Presidente. #n Eu não vou tolerar mais atrasos, ouviu bem?"
22050-328 = "A-Ah, espera um pouquinho Akane! Só mais um pouco...!"
22050-335 = "[ns] (Essa foi clássica de quem fugiu da lição de casa...)"
22050-337 = "......Ara, Sensei? #n Aconteceu alguma coisa?"
22050-338 = "[s] \"Não...\""
22050-340 = "Merda, você me paga! #n ――Da próxima vez eu ganho."
22050-341 = "Sim, sim, com certeza. #n Vamos logo, ande."
22050-346 = "Sendo assim, peço licença para nos retirarmos. #n Sensei, Aris-chan."
22050-358 = "(Quando eu e a Aris saímos do fliperama, o sol já estava se pondo)"
22050-359 = "[s] \"A propósito, Aris.\""
22050-360 = "Sim?"
22050-361 = "[s3] \"Você não estava com medo da Neru?\"\n[s4] \"Eu pensei que você tivesse medo da Neru...\""
22050-369 = "(Porque apesar de tudo, a Aris estava brincando bem feliz com a Neru)"
22050-370 = "(Será que fui eu quem tinha entendido errado...?)"
22050-371 = "Ah, isso..."
22050-372 = "É verdade que a Neru-senpai foi uma inimiga temporariamente... mas agora ela é uma aliada."
22050-373 = "Por isso, de acordo com o que a Momoi me disse, há uma grande probabilidade de a Neru-senpai ter ficado mais fraca."
22050-374 = "Sendo assim, a Aris não tem mais medo da Neru-senpai."
22050-375 = "[s] \"Então a Momoi disse isso... Se a Neru escutar, ela vai ficar muito brava.\""
22050-376 = "É-É claro, a Aris ainda não lida muito bem com roupas de maid..."
22050-377 = "Mesmo assim, agora..."
22050-383 = "Sim, a Neru-senpai também é nossa aliada!"
22050-384 = "Uma aliada da Aris e de todo mundo com quem ela joga..."
22050-385 = "Bem, o fato de a Aris não poder explorar enquanto joga com a Neru-senpai é um problema..."
22050-386 = "Mas apenas hoje, na aventura com o Sensei... a Aris..."
22050-387 = "[s] (Ah... Foi por isso que ela estava tentando evitar a Neru...)"
22050-389 = "[ns] \"Eu me diverti muito na nossa aventura de hoje.\""
22050-390 = "!!"
22050-391 = "Sério?"
22050-392 = "[s] \"E você, Aris, como foi a sua aventura de hoje?\""
22050-394 = "(Andando por toda a Millennium o dia todo, eu pude ver como é a vida normal da Aris)"
22050-402 = "(Encontrando diversas alunas,)"
22050-408 = "(E sendo tratada com muito carinho,)"
22050-420 = "(A Aris, se dedicando de corpo e alma em suas aventuras aqui...)"
22050-422 = "Aris..."
22050-427 = "A Aris também achou a aventura de hoje com o Sensei muito divertida!"
22050-428 = "É uma pena que a gente não tenha conseguido avançar na quest da Yuzu..."
22050-429 = "Mesmo assim, a Aris é uma heroína. #n E heroínas nunca desistem!"
22050-435 = "A Aris ainda é uma aprendiz, mas continuará fazendo as quests, vai subir bastante de nível e..."
22050-436 = "Algum dia, usarei esta Espada de Luz para derrotar o Rei Demônio que ameaça este mundo!"
22050-441 = "Até que esse momento chegue... Sensei, o senhor fará mais aventuras com a Aris?"
22050-443 = "[s] \"Sim, com certeza.\""
22050-450 = "(E assim o dia chegou ao fim――)"
22050-451 = "(E a vida pacata e rotineira da Millennium continuará amanhã)"
22050-452 = "(――Pelo menos, era isso que eu pensava)"
22050-455 = "Próximo Episódio; A Máquina Misteriosa (1)"