22050-376 = "C-claro, a Aris ainda tem um pouquinho de receio\nde vestido de maid, mas……"
22050-377 = "ainda assim, agora……"
22050-383 = "Sim, a veterana Neru também é uma companheira!"
22050-384 = "Companheira de jogar com a Aris e com todo mundo……"
22050-385 = "É que, enquanto eu jogo com a veterana Neru,\nnão dá pra aventurar, e isso é um problema, mas……"
