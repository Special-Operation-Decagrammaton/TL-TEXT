22050-370 = "(Será que era impressão minha……?)"
22050-371 = "Ah, é que……"
22050-372 = "De fato, por um tempo a veterana Neru foi inimiga……\nmas agora é aliada."
22050-373 = "E, segundo a Momoi, há uma alta probabilidade de\na veterana Neru estar mais fraca."
22050-374 = "Por isso, a Aris já não tem mais medo da veterana Neru."
