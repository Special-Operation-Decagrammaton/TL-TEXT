10054040-373 = "Heavy weapons, you say?"
10054040-375 = "I-is that true...?"
10054040-376 = "Just here to play..."
10054040-377 = "Tourists...?"
10054040-378 = "Ah! This person is a tourist, and she is Kisaki-sama, whom I serve!"
10054040-379 = "I see... that was my mistake. I thought you were those children..."
10054040-380 = "Let's drop that subject. We finally have customers."
10054040-381 = "Everyone, here is the menu."
10054040-382 = "Thank you. #n...By the way, where are the other customers...? It should be peak season..."
10054040-383 = "……."
10054040-384 = "That is..."
10054040-385 = "Hey, stop."
10054040-386 = "……."
10054040-387 = "(They were afraid when they saw the Monshu and Kokona-chan earlier, weren't they?)"
10054040-388 = "(Does that mean...?)"
10054040-390 = "Wha~t? What's all the commotion?"
10054040-391 = "Hah!?"
10054040-392 = "Th-they're here!"
10054040-393 = "E-everyone, be careful!"
10054040-397 = "...Eh?"
10054040-398 = "Hmm..."
10054040-402 = "Ah, ah, we went out of our way to come here, and there's no welcome?"
10054040-403 = "Don't get cocky, you small-fry adults."
10054040-404 = "Trembling like that even though you're adults. How pathetic."
10054040-405 = "But don't you think seeing that pathetic look gets you excited? Ufufu."
10054040-407 = "[ns] \"...Eh?\""