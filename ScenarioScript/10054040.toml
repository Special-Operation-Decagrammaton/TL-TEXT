[translation]
10054040-1 = "Episode 4;Water Play, Inspections, and a Comprehensive Vacation (2)"
10054040-2 = "Everyone, are you listening?"
10054040-3 = "Even while doing warm-up exercises, be sure to stay alert."
10054040-4 = "If anything happens, call for Sensei or me immediately."
10054040-5 = "You must absolutely follow these two rules, okay?"
10054040-6 = "Yes!"
10054040-12 = "Aren't you coming, Kisaki?"
10054040-13 = "I am... quite content right here."
10054040-14 = "Just sitting and gazing at the water's surface is enough to clear my head."
10054040-15 = "I see... well, come join us whenever you feel like it!"
10054040-20 = "Everyone is so full of energy. That is a good thing."
10054040-21 = "……."
10054040-23 = "The water is like a band of blue silk—"
10054040-24 = "The mountains are like a jade hairpin."
10054040-26 = "It surpasses even ascending to the celestial realm—"
10054040-27 = "Why would one even need to ride a crane to fly away...?"
10054040-30 = "If only I had spent time like this sooner..."
10054040-31 = "No, even now, like this..."
10054040-33 = "This, too, is thanks to everyone—"
10054040-34 = "And thanks to you, Sensei."
10054040-38 = "I-it's almost... my, limit...!"
10054040-40 = "Kokona!?"
10054040-42 = "You're okay! Try kicking a little harder!"
10054040-43 = "Even if something happens, we're right here with you!"
10054040-49 = "B-but, I don't really need to know how to swim..."
10054040-50 = "Are you sure? Swimming is a lady's accomplishment, you know?"
10054040-51 = "……I-is that true?"
10054040-52 = "I believe a true lady should be prepared for anything."
10054040-53 = "Ugh... Shun-neesan, you always say things like that..."
10054040-55 = "Haa... I can rest easy knowing those two are with her."
10054040-56 = "To think a vacation could have such power to change people..."
10054040-57 = "[ns] \"So, Kisaki, why don't you try letting your hair down too?\""
10054040-58 = "Sensei!?"
10054040-59 = "How long have you been there..."
10054040-60 = "Sitting here is no different from my usual routine. #nI understand that, but... I am fine as I am..."
10054040-61 = "No, it is a vacation, after all. Perhaps this is an experience as well. #n...So, what would you have me do?"
10054040-62 = "...I see. You are telling me to enter the river with you."
10054040-63 = "……."
10054040-64 = "Very well."
10054040-69 = "But in return... you had better not let go of my hand, understood?"
10054040-70 = "[s] \"！？\""
10054040-75 = "(I took Kisaki's timidly offered hand and stepped down to the water's edge.)"
10054040-78 = "(Kisaki's body was trembling slightly.)"
10054040-79 = "It's cold...!"
10054040-80 = "What is it, Sensei? I am fine. #nIt was just colder than I expected."
10054040-81 = "……."
10054040-82 = "I-isn't this a bit fast? Could we go a little... slower..."
10054040-87 = "(I matched my pace to Kisaki's and moved slowly.)"
10054040-91 = "！？"
10054040-92 = "S-something slimy just touched my leg!?"
10054040-93 = "...A fish? #nI see. There are fish here."
10054040-94 = "……."
10054040-95 = "It's beautiful. The water is so clear I can see my feet."
10054040-96 = "Hehe. When you can see the bottom, the fear subsides."
10054040-97 = "At this rate, I might be able to..."
10054040-101 = "Ugh!?"
10054040-106 = "(Kisaki lost her balance!)"
10054040-107 = "(I instinctively caught her to keep her from falling.)"
10054040-111 = "[ns] \"Are you okay?\""
10054040-112 = "No need to worry. It is thanks to you holding my hand."
10054040-116 = "……."
10054040-117 = "No... it seems I am not quite okay after all."
10054040-118 = "[s] \"Eh...!?\""
10054040-119 = "So, Sensei."
10054040-120 = "Give me a piggyback ride."
10054040-125 = "(I crouched down and gave Kisaki a piggyback ride.)"
10054040-129 = "Am I heavy?"
10054040-130 = "...You don't feel anything? That is a concerning observation in its own right."
10054040-131 = "Somehow... it reminds me of that time."
10054040-132 = "……."
10054040-133 = "I offer you my utmost gratitude, Sensei."
10054040-134 = "...That is my honest, unadorned heart."
10054040-135 = "……."
10054040-136 = "Could you put me down now?"
10054040-140 = "[ns] \"Are you okay now?\""
10054040-141 = "Yes."
10054040-142 = "I have enjoyed your back enough."
10054040-145 = "Now then, shall I try swimming a little?"
10054040-146 = "I have never done it before, but..."
10054040-147 = "I am well-versed in the theory. It should not be that difficult."
10054040-149 = "(Kisaki dove into the water with full confidence.)"
10054040-154 = "(And then, she started flailing.)"
10054040-158 = "[ns] \"Kisaki!?\""
10054040-159 = "...No problem. It is only my first time, after all."
10054040-160 = "Once more..."
10054040-165 = "[ns] \"Kisaki—!!\""
10054040-166 = "This was not... supposed to happen..."
10054040-167 = "……."
10054040-168 = "So, knowledge alone is not enough..."
10054040-169 = "The unity of knowledge and action requires equal practice..."
10054040-171 = "Then, let me help you out!"
10054040-177 = "！？"
10054040-181 = "Ahaha! To get along with the water, you have to start by soaking in it!"
10054040-182 = "Rumi... don't startle me like that."
10054040-183 = "If we're talking about being startled, I was surprised too, you know?"
10054040-184 = "Who would've thought? Kisaki having a private lesson with Sensei?"
10054040-185 = "That is...!"
10054040-186 = "……."
10054040-187 = "You have always been far too perceptive..."
10054040-188 = "Anyway, if you want to learn to swim, you have to put in the reps, even if it's just for show!"
10054040-195 = "Wait. I am not mentally prepared—"
10054040-200 = "Ahaha! Come on, come on! Move your arms more! I'm going to leave you behind!"
10054040-201 = "Could you at least consider the height difference!"
10054040-205 = "Honestly, could you at least go easy on me?"
10054040-206 = "I'd at least like you to catch me once before saying that~"
10054040-207 = "You won't go back on your word, will you?"
10054040-212 = "[ns1] \"Before I knew it...\"\n[ns2] \"You've gotten better at swimming!\""
10054040-215 = "???"
10054040-216 = "Yes, very good."
10054040-217 = "……."
10054040-218 = "Don't tell me, was this your plan all along...?"
10054040-219 = "Who knows~? What could you mean?"
10054040-220 = "Though it is true I had a bit of a mischievous streak."
10054040-221 = "T-that was, well..."
10054040-222 = "So... Sensei! Give me a piggyback ride too!"
10054040-223 = "[s] \"Rumi too!?\""
10054040-228 = "[ns] \"...Bring it on!\""
10054040-231 = "(I felt Rumi's presence on my back.)"
10054040-232 = "(Perhaps thanks to the buoyancy, she wasn't that heavy.)"
10054040-233 = "I have many things I want to say, but..."
10054040-234 = "I suppose we're even now."
10054040-235 = "Oh~ my perspective is a bit higher than usual."
10054040-236 = "Besides... I'm usually in the kitchen. #n...Time like this isn't bad either."
10054040-237 = "[ns] \"Hey, if you talk right there...!\""
10054040-238 = "Why? #n...Oh, your ear?"
10054040-239 = "……."
10054040-240 = "Hmm~?"
10054040-241 = "[ns] \"！？！？\""
10054040-242 = "T-that doesn't feel right..."
10054040-243 = "Didn't Kisaki do this earlier too?"
10054040-244 = "It'll be too late if something happens to Sensei—"
10054040-250 = "Whoa!? Sorry! Sensei, are you okay?"
10054040-251 = "No, this is...!"
10054040-256 = "Ehehe! Operation 'Surprise Sensei' was a huge success!"
10054040-257 = "Oh, wait...? Sensei...? #nDid I go too far...!?"
10054040-258 = "I-I'm sorry! Waaaaah!"
10054040-259 = "[s3] \"It's okay. It's okay, but...\"\n[s4] \"Time for payback!\""
10054040-262 = "Whoa!?"
10054040-264 = "(I dove into the water and put Kokona on my shoulders.)"
10054040-268 = "Eek!? S-Sensei! That's cheating!"
10054040-269 = "(Kokona clung to my head.)"
10054040-270 = "(I grabbed Kokona and fell into the water with her!)"
10054040-274 = "Hyaaaaah!? Sensei, you're mean!!!"
10054040-275 = "Fine! Then I'll...!"
10054040-278 = "(After diving once, Kokona popped out and hugged me from the front!)"
10054040-282 = "Ehehe! Now Sensei can't move!"
10054040-284 = "Oh my, shall I help out too?"
10054040-285 = "[ns5] \"Shun!?\"\n[ns6] (I feel pressure on my back...!)"
10054040-289 = "Ufufu... I've caught you."
10054040-290 = "Shun-neesan! That's it!"
10054040-291 = "[ns] \"Is this... the Shanhaijing sisters' sandwich attack!?\""
10054040-293 = "Now Sensei is ours."
10054040-294 = "If I just watch in silence... well, let me join in as well."
10054040-295 = "[s] \"Even Kisaki!?\""
10054040-300 = "T-this formation, could it be—the new Shanhaijing specialty, 'Sensei Liuhuge'! #nI can't help but join in too!"
10054040-306 = "(In the end, the mysterious 'Sensei Liuhuge' couldn't bear the weight and collapsed...)"
10054040-311 = "Ahahaha! Sensei, what is that look!"
10054040-312 = "Ufufu, this is fun."
10054040-318 = "Hmm... it looks fun... if I had known, I would have brought a swimsuit..."
10054040-319 = "N-no! What are you thinking, Konoe Mina! #nI am here for protection!"
10054040-320 = "……."
10054040-321 = "...I should have brought a swimsuit."
10054040-325 = "Oh my, Kokona-chan's stomach is growling."
10054040-326 = "N-no, it's not! That's just, um...!"
10054040-327 = "Now that I think about it, it's that time already. Shall we go get lunch?"
10054040-328 = "What? I thought you were going to prepare something."
10054040-329 = "I love cooking, but today is a vacation, after all."
10054040-330 = "Besides, I want to try the food here too."
10054040-331 = "In other words, a field investigation... the time for the main event has finally arrived."
10054040-332 = "Come, let the inspection begin!"
10054040-333 = "We also need to verify how our investment money is being used."
10054040-334 = "But... if possible, I'd prefer if you didn't use the word 'inspection'..."
10054040-335 = "[ns] \"I want to eat something delicious!\""
10054040-336 = "Yes! I'm looking forward to it!"
10054040-337 = "Fufu. Kokona-chan? You shouldn't rely on Sensei too much."
10054040-338 = "Kokona-chan is a patient lady, right?"
10054040-339 = "O-of course!"
10054040-341 = "……."
10054040-342 = "…………。"
10054040-343 = "……………………。"
10054040-344 = "Huh?"
10054040-345 = "……."
10054040-346 = "Hmm...?"
10054040-347 = "I-is something wrong, ladies?"
10054040-348 = "No, let's just look around for now."
10054040-349 = "...Welcome... we have what we have, and we don't have what we don't have..."
10054040-350 = "We have rafting and boat tours, too..."
10054040-351 = "Noodles... fish... tea... we have various things..."
10054040-352 = "I am no expert, but isn't something wrong here?"
10054040-353 = "The Shanhaijing shopping district is ten times as lively as this."
10054040-359 = "Um, I have a question I'd like to ask..."
10054040-360 = "Hmm...?"
10054040-361 = "Eek!?"
10054040-362 = "I-I'm so sorry! Please! Please, at least spare this shop...!"
10054040-363 = "If I lose this place, I won't be able to face the seniors who ran this business before me!!"
10054040-364 = "Yes? I didn't do anything..."
10054040-365 = "I just came here to have a meal..."
10054040-366 = "A meal...? A meal, you say!? #nA-anything you wish, please just say the word...!"
10054040-367 = "B-but we can't serve dishes that aren't on the menu... p-please, have mercy...!"
10054040-368 = "Why are you so afraid? #nI don't know what you are imagining, but I have no intention of causing harm."
10054040-369 = "Two children...! Oh...! It's them!"
10054040-370 = "I'm so sorry! Please forgive us...!"
10054040-371 = "Please, just don't use the heavy weapons...!!"
