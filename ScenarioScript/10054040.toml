[translation]
10054040-1 = "第4話;水遊びと査察、総合的に休暇（２）"
10054040-2 = "皆さん、いいですか？"
10054040-3 = "準備体操をしていても、十分気をつけること。"
10054040-4 = "何かあった場合は、すぐに先生や私を呼ぶこと。"
10054040-5 = "この2つは絶対に守ってくださいね？"
10054040-6 = "は～い！"
10054040-12 = "キサキは行かないの？"
10054040-13 = "妾は……ここで十分じゃ。"
10054040-14 = "座って水面を眺めるだけで、頭がすっきりするような心地での。"
10054040-15 = "そっか……来たくなったらいつでもおいでね！"
10054040-20 = "皆、元気がいいのう。良きことじゃ。"
10054040-21 = "……。"
10054040-23 = "水は[ruby=せいら]青羅[/ruby]の帯と[ruby=な]作[/ruby]り――"
10054040-24 = "山は[ruby=へきぎょく]碧玉[/ruby][ruby=かんざし]の簪の[/ruby]如し。"
10054040-26 = "[ruby=そ]其[/ruby]は仙界に登るにもなお勝り――"
10054040-27 = "[ruby=いずく]安ん[/ruby]ぞ鶴に乗りて飛ぶ由あらんや……。"
10054040-30 = "もっと早く、このような時間を過ごしておれば……。"
10054040-31 = "いいや、今でもこうして……。"
10054040-33 = "これも……皆と――"
10054040-34 = "先生のおかげじゃな。"
10054040-38 = "そっ、そろそろ……げん、かい……っ！"
10054040-40 = "ココナ！？"
10054040-42 = "大丈夫！もっと強く蹴ってみて！"
10054040-43 = "何かあっても、お姉さんたちがついていますよ！"
10054040-49 = "で、でも別に泳げなくても……。"
10054040-50 = "いいのかな？水泳もレディーの嗜みなんだよ？"
10054040-51 = "……ほ、本当ですか？"
10054040-52 = "あらゆる事に備えるのが、真のレディーだと思います。"
10054040-53 = "うぅ……シュン姉さんはそれっぽいことばっかり言って……。"
10054040-55 = "はぁ……あの2人がついておれば安心じゃな。"
10054040-56 = "休暇に、こうも人を変える力があるとはのう……。"
10054040-57 = "[ns] \"じゃあ、キサキも羽目を外してみない？\""
10054040-58 = "先生！？"
10054040-59 = "いつからそこに……。"
10054040-60 = "ここに座ったままでは普段と変わらぬ。#nそれは分かっておるのじゃが……妾はこのままでも……。"
10054040-61 = "いいや、せっかくの休暇じゃ。これも経験か。#n……して、何をすればいいのかえ？"
10054040-62 = "……なるほど。共に川へ入れと申すか。"
10054040-63 = "……。"
10054040-64 = "よい。"
10054040-69 = "その代わり……手を離したら許さぬぞ？"
10054040-70 = "[s] \"！？\""
10054040-75 = "（おずおずと差し出されたキサキの手を握って、水辺に下りた）"
10054040-78 = "（キサキの体は少し震えていた）"
10054040-79 = "冷たっ……！"
10054040-80 = "なんじゃ、先生。妾は平気じゃぞ。#n存外に水が冷たかっただけじゃ。"
10054040-81 = "……。"
10054040-82 = "す、少し速くないかの？もう少し、ゆっくり……。"
10054040-87 = "（キサキの歩調に合わせて、ゆっくり進んだ）"
10054040-91 = "っ！？"
10054040-92 = "な、何かぬるりとしたものが脚に触れたのじゃが！？"
10054040-93 = "……魚？#nそうか。ここには魚がおるのじゃな。"
10054040-94 = "……。"
10054040-95 = "綺麗じゃな。足が見えるほど、水が透き通っておる。"
10054040-96 = "ふふ。底が見えれば怖さも和らぐのう。"
10054040-97 = "これなら、もっと……。"
10054040-101 = "うっ！？"
10054040-106 = "（キサキが体勢を崩してしまった！）"
10054040-107 = "（倒れないよう、とっさに支えた）"
10054040-111 = "[ns] \"大丈夫？\""
10054040-112 = "心配は要らぬ。其方が手を握ってくれていたおかげじゃ。"
10054040-116 = "……。"
10054040-117 = "いや……やはり大丈夫ではないようじゃ。"
10054040-118 = "[s] \"え……！？\""
10054040-119 = "じゃから、先生。"
10054040-120 = "おんぶしてくりゃれ。"
10054040-125 = "（屈んで、キサキをおんぶしてあげた）"
10054040-129 = "重くないかえ？"
10054040-130 = "……何も感じない？それはそれで心配になる感想じゃな。"
10054040-131 = "なんだか……あの時を思い出すの。"
10054040-132 = "……。"
10054040-133 = "先生には、最大限の感謝を。"
10054040-134 = "……何も飾らぬ本心じゃ。"
10054040-135 = "……。"
10054040-136 = "そろそろ、降ろしてはくれぬか。"
10054040-140 = "[ns] \"もう大丈夫そう？\""
10054040-141 = "ああ。"
10054040-142 = "其方の背中は楽しんだからの。"
10054040-145 = "どれ、少しは水泳をやってみようか。"
10054040-146 = "一度とて経験はないが……。"
10054040-147 = "それでも理論は熟知しておる。そう難しくはないはずじゃ。"
10054040-149 = "（キサキは自信満々に水の中へ飛び込んだ）"
10054040-154 = "（そして、ジタバタしていた）"
10054040-158 = "[ns] \"キサキ！？\""
10054040-159 = "……問題ない。まだ初回じゃからな。"
10054040-160 = "もう一度……。"
10054040-165 = "[ns] \"キサキ――！！\""
10054040-166 = "こんなはず……では……。"
10054040-167 = "……。"
10054040-168 = "やはり、知識だけでは足りぬか……。"
10054040-169 = "知行合一とは、即ち同等の実践が求められるもの……。"
10054040-171 = "じゃあ、あたしが手伝ってあげよう！"
10054040-177 = "っ！？"
10054040-181 = "あはは！#n水と仲良くなるには、まずは水に浸かるところからだよ！"
10054040-182 = "ルミ……驚かせるでない。"
10054040-183 = "それを言うなら、あたしだってびっくりしたんだよ？"
10054040-184 = "ま、さ、か。キサキが先生と個人レッスンしてるなんてねぇ～？"
10054040-185 = "それは……！"
10054040-186 = "……。"
10054040-187 = "其方は昔から察しが良すぎるのじゃ……。"
10054040-188 = "とにかく、泳げるようになりたいなら、形からでも数をこなさないと！"
10054040-195 = "待つのじゃ。まだ心の準備が――"
10054040-200 = "あははっ！ほらほら！もっと大きく腕を回して！置いてっちゃうよ～？"
10054040-201 = "少しは身長差を考慮せんか！"
10054040-205 = "まったく、少しは手加減せんか。"
10054040-206 = "せめて1回くらいはあたしを捕まえてから言ってほしいかな～"
10054040-207 = "二言はないな？"
10054040-212 = "[ns1] \"いつの間にか……。\"\n[ns2] \"泳ぎが上手になってる！\""
10054040-215 = "？？？"
10054040-216 = "はい、よくできました。"
10054040-217 = "……。"
10054040-218 = "まさか、これを狙っていたのか……？"
10054040-219 = "さあ～？なんのことかな～？"
10054040-220 = "ちょっとしたイタズラ心があったのは本当だけどね。"
10054040-221 = "あ、あれは、じゃから……。"
10054040-222 = "だから……先生！あたしもおんぶして！"
10054040-223 = "[s] \"ルミも！？\""
10054040-228 = "[ns] \"……どんとこい！\""
10054040-231 = "（ルミの存在を背中で感じた）"
10054040-232 = "（浮力のおかげか、そこまで重くはなかった）"
10054040-233 = "言いたいことは色々あるが……。"
10054040-234 = "お互い様じゃな。"
10054040-235 = "お～、いつもよりちょっと目線が高い。"
10054040-236 = "それに……ほとんど厨房にいるからさ。#n……こういう時間も、悪くないね。"
10054040-237 = "[ns] \"ちょっと、そこで喋られると……！\""
10054040-238 = "なんで？#n……あ、耳？"
10054040-239 = "……。"
10054040-240 = "ふぅ～ん？"
10054040-241 = "[ns] \"！？！？\""
10054040-242 = "そ、それは良くない気がするのじゃ……。"
10054040-243 = "キサキもさっきこうしてなかった？"
10054040-244 = "先生に何かあってからでは遅――"
10054040-250 = "うわっ！？ごめん！先生、大丈夫？"
10054040-251 = "いや、これは……！"
10054040-256 = "えへへ！先生を驚かせちゃおう作戦、大成功です！"
10054040-257 = "あ、あれ……？先生……？#nもしかして、やり過ぎちゃいましたか……！？"
10054040-258 = "ご、ごめんなさい！うわぁーん！"
10054040-259 = "[s3] \"大丈夫だよ。大丈夫だけど……。\"\n[s4] \"仕返しだー！\""
10054040-262 = "わわっ！？"
10054040-264 = "（水に潜って、ココナを肩車した）"
10054040-268 = "きゃっ！？せ、先生！ずるいです！"
10054040-269 = "（ココナが頭にしがみついてきた）"
10054040-270 = "（そのままココナを掴んで、水の中へ倒れ込んだ！）"
10054040-274 = "ひゃああぁっ！？先生のいじわる！！！"
10054040-275 = "いいですよ！じゃあ、私も……！"
10054040-278 = "（1度水に潜ったココナは、飛び出してきて前から抱きしめてきた！）"
10054040-282 = "えへへ！これで先生は動けません！"
10054040-284 = "あら、私もお手伝いしましょうか？"
10054040-285 = "[ns5] \"シュン！？\"\n[ns6] （背中に圧力を感じる……！）"
10054040-289 = "うふふ……捕まえました。"
10054040-290 = "シュン姉さん！その調子！"
10054040-291 = "[ns] \"これが……春原姉妹のサンドイッチ・アタックか！\""
10054040-293 = "これで先生は私たちのものですね。"
10054040-294 = "黙って見ておれば……どれ、妾も混ぜてもらおうかの。"
10054040-295 = "[s] \"キサキまで！？\""
10054040-300 = "こ、この陣形はまさか――新・山海経名物「先生六和閣」！#nあたしも加勢しないわけにはいかないね！"
10054040-306 = "（結局、謎の「先生六和閣」は重さに耐えきれず崩れてしまった……）"
10054040-311 = "あはははっ！先生、何その格好！"
10054040-312 = "うふふっ、楽しいですね。"
10054040-318 = "う～む……楽しそうだな……こんなことなら私も水着を……。"
10054040-319 = "い、いや！何を考えている[ruby=このえ]近衛[/ruby]ミナ！#n私は護衛のためにここにいるのだぞ！"
10054040-320 = "……。"
10054040-321 = "……水着、持って来ればよかった。"
10054040-325 = "あら、ココナちゃんのお腹が鳴いてますね。"
10054040-326 = "ち、違うの！これはその、えっと……！"
10054040-327 = "気づけばこんな時間だし、お昼ご飯食べに行かない？"
10054040-328 = "なんじゃ、其方が用意してくれるものと思っておったが。"
10054040-329 = "料理は好きだけど、今日は休暇だからね。"
10054040-330 = "それに、ここの料理も食べてみたいし。"
10054040-331 = "つまりは現地調査……ようやく本題の時間だな。"
10054040-332 = "さあ、査察を始めよう！"
10054040-333 = "うちとしても、投資したお金の使われ方は確かめておかないと。"
10054040-334 = "でも……できれば「査察」って言葉は出さないでほしいかな……。"
10054040-335 = "[ns] \"美味しいもの食べたいね！\""
10054040-336 = "はい！楽しみです！"
10054040-337 = "ふふっ。ココナちゃん？あまり先生に甘えちゃダメですよ。"
10054040-338 = "ココナちゃんは、我慢強いレディーなんですよね？"
10054040-339 = "も、もちろん！"
10054040-341 = "……。"
10054040-342 = "…………。"
10054040-343 = "……………………。"
10054040-344 = "あれ？"
10054040-345 = "……。"
10054040-346 = "ふむ……？"
10054040-347 = "お、お姉さんたち、どうかしましたか？"
10054040-348 = "いや、取りあえずは見て回ろう。"
10054040-349 = "……いらっしゃ、ませ……あるもんはあって、ないもんはない、です。"
10054040-350 = "ラフティングに、ボートツアーも、あります……。"
10054040-351 = "麺に……魚……お茶……色々あります……。"
10054040-352 = "私は詳しいわけではないが、何かおかしくないか？"
10054040-353 = "山海経の商店街のほうが10倍は賑やかだぞ。"
10054040-359 = "あの、お聞きしたいことがあるんですけど……。"
10054040-360 = "ん……？"
10054040-361 = "ひぃっ！？"
10054040-362 = "も、申し訳ありません！どうか！どうかこのお店だけは……！"
10054040-363 = "ここを失ったら、商売を続けてきた先輩に合わせる顔がありません！！"
10054040-364 = "はい？私は別に何も……。"
10054040-365 = "ただ食事をしに来ただけなのじゃが……。"
10054040-366 = "しょくじ……？食事ですか！？#nな、何なりとお申し付けください……！"
10054040-367 = "で、ですがメニューにない料理はお出しできなくて……ど、どうかご勘弁を……！"
10054040-368 = "なぜそこまで怯えるのじゃ？#n其方らが何を想像しているかは分からぬが、害をなす意思など毛頭ない。"
10054040-369 = "子供が2人……！ああ……！あの方たちだ！"
10054040-370 = "申し訳ありません！どうかお許しください……！"
10054040-371 = "どうか、重火器だけは……！！"
10054040-372 = "え……？"
10054040-373 = "重火器、ですか？"
10054040-375 = "ほ、本当ですか……？"
10054040-376 = "ただ遊びに来ている……。"
10054040-377 = "観光客……？"
10054040-378 = "ああ！このお方は観光客にして、私がお仕えするキサキ様だ！"
10054040-379 = "そうか……それは悪かった。てっきり、あの子供たちかと思って……。"
10054040-380 = "その話はもういいじゃないか。せっかくお客さんが来てくれたんだ。"
10054040-381 = "皆さん、メニューはこちらに。"
10054040-382 = "ありがとうございます。#n……ところで、他のお客さんは……？今は繁忙期のはずですが……。"
10054040-383 = "……。"
10054040-384 = "それは……。"
10054040-385 = "おい、よせ。"
10054040-386 = "……。"
10054040-387 = "（先ほどは、門主様とココナちゃんを見て怯えていましたね）"
10054040-388 = "（ということは……？）"
10054040-390 = "な～に？どういう騒ぎ？"
10054040-391 = "はっ！？"
10054040-392 = "で、出た！"
10054040-393 = "みっ、みんな気をつけろ！"
10054040-397 = "……え？"
10054040-398 = "ふむ……。"
10054040-402 = "あー、あー、うちらがわざわざ来てあげたのに、出迎えも無いの？"
10054040-403 = "雑魚大人が調子に乗るんじゃねぇですよ。"
10054040-404 = "大人のくせにビクビクして。なっさけねぇですねぇ。"
10054040-405 = "ですが、その情けない姿を見るのも気持ちが高ぶると思いませんか？うふふっ。"
10054040-407 = "[ns] \"……え？\""
