[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 24/06.]
10054040-1 = "Episódio 4: Brincar, Inspecionar, Resumindo: Férias (2)"
10054040-2 = "Meninas, prestem bastante atenção, ok?"
10054040-3 = "Mesmo tendo se aquecido direitinho, vocês\nprecisam ter muito cuidado na água."
10054040-4 = "E se sentirem qualquer incômodo ou precisarem de ajuda,\ngritem por mim ou pelo Sensei no mesmo instante."
10054040-5 = "Não se esqueçam de seguir essas duas\nregras rigorosamente, entenderam?"
10054040-6 = "Entendidooo!"
10054040-12 = "A Kisaki não vem brincar com a gente na água?"
10054040-13 = "Não é necessário... Ficar por aqui já\nbasta para me satisfazer."
10054040-14 = "Apenas estar aqui, sentada contemplando as\náguas fluírem, já limpa e liberta a minha alma."
10054040-15 = "Tá bom então... Mas se der vontade depois,\né só vir correndo pro rio com a gente!"
10054040-20 = "O fôlego e as vozes agitadas de todos ali\nna água formam uma bela cena. É admirável."
10054040-21 = "......"
10054040-23 = "A água forma uma fita de seda azul――"
10054040-24 = "E as montanhas são como grampos de jade."
10054040-26 = "Este recanto terreno suplanta em paz até\nmesmo o reino dos Imortais――"
10054040-27 = "E não seria eu a atirar-me aos ares nas asas\ndos grous se a paz já repousa aos meus pés..."
10054040-30 = "Se ao menos eu tivesse me permitido desfrutar de\ntais preciosos momentos de descanso há mais tempo..."
10054040-31 = "Não, ainda está em tempo... Que bom que posso vivenciar\nisto tudo agora, deste jeito..."
10054040-33 = "Esta paz também... E as risadas com todos no rio..."
10054040-34 = "São tudo graças aos esforços do meu precioso Sensei."
10054040-38 = "Eu... eu acho que já... cheguei no meu limite...!"
10054040-40 = "Kokona!?"
10054040-42 = "Calma! Bate os pés com mais força na água!"
10054040-43 = "Não precisa ficar com medo, se algo der errado\nnós duas estamos aqui para te ajudar!"
10054040-49 = "M-Mas eu nem preciso saber nadar se eu não quiser..."
10054040-50 = "Isso não é verdade! Saber nadar e dominar a água com elegância\né um requisito fundamental de qualquer dama refinada, esqueceu?"
10054040-51 = "......Isso é sério!?"
10054040-52 = "Com certeza! Afinal, uma verdadeira dama deve estar sempre\npronta e capacitada para todos os contratempos da vida."
10054040-53 = "Uuuuuh... A Irmãzona Shun sempre consegue\nme convencer quando fala desse jeito..."
10054040-55 = "Hah... Sabendo que as duas estão amparando a garotinha ali\nno rio, posso descansar com o coração tranquilo."
10054040-56 = "Jamais imaginei que um simples período de férias\npoderia transformar e alterar as pessoas dessa forma..."
10054040-57 = "[ns] \"E então, por que a Kisaki também não se liberta\num pouco das amarras e curte a diversão?\""
10054040-58 = "Sensei!?"
10054040-59 = "Desde quando seus passos chegaram tão perto...?"
10054040-60 = "Entendo que ficar aqui sentada me mantém atada à minha\nrotina normal, eu tenho total ciência disso. \nMas saiba que eu ficaria bem em continuar assim..."
10054040-61 = "Não, quer saber? Você tem a razão ao seu lado.\nSe esta é uma viagem de férias, consideremos isto uma experiência.\n......Dito isso, o que você sugere que eu faça primeiro?"
10054040-62 = "......Ah, compreendo perfeitamente o seu intento.\nVocê exige que eu entre na água junto de todos."
10054040-63 = "......"
10054040-64 = "Que seja."
10054040-69 = "Todavia... se as suas mãos me soltarem num descuido,\nnão espere receber o meu perdão. Você me ouviu?"
10054040-70 = "[s] \"!?\""
10054040-75 = "（Envolvi minhas mãos calorosamente ao redor da mão miudinha\ne relutante que a Kisaki estendeu, e a guiei até a beira do rio）"
10054040-78 = "（Pude sentir o corpo dela tremer sutilmente de nervosismo）"
10054040-79 = "Q-Que gelado...!"
10054040-80 = "N-Não me olhe assim, Sensei. Eu estou perfeitamente bem.\nApenas não esperava que o choque térmico e o frescor da água fosse tão intenso."
10054040-81 = "......"
10054040-82 = "V-Você não acha que a sua marcha agressiva está muito rápida?\nPoderia caminhar um pouco mais devagar... por obséquio."
10054040-87 = "（Diminuí o compasso, avançando lentamente para me ajustar ao ritmo da Kisaki）"
10054040-91 = "Tsc!?"
10054040-92 = "A-Algo intrusivo e liso roçou nas minhas pernas agora mesmo!?"
10054040-93 = "......Um peixe?\nAh, claro. Era de se esperar que este rio fosse habitado por peixes."
10054040-94 = "......"
10054040-95 = "As águas são incrivelmente cristalinas.\nConsigo até mesmo enxergar os meus próprios pés submersos."
10054040-96 = "Fufu. Quando as transparências nos permitem avistar o fundo sem turvações amedrontadoras, os terrores desaparecem e o alívio toma conta."
10054040-97 = "Sendo assim... acho que não há problemas em me aventurar um pouquinho mais..."
10054040-101 = "Uh!?"
10054040-106 = "（A Kisaki perdeu o equilíbrio e seu corpo pendulou abruptamente!）"
10054040-107 = "（Num reflexo veloz, avancei o meu braço para ampará-la e evitar que caísse na correnteza）"
10054040-111 = "[ns] \"Você se machucou?\""
10054040-112 = "Não há motivo para preocupações. A sua mão segurou-me firmemente e me salvou da queda."
10054040-116 = "......"
10054040-117 = "Não... pensando bem, creio que eu não esteja inteiramente bem."
10054040-118 = "[s] \"Eh...!?\""
10054040-119 = "Sendo assim, Sensei."
10054040-120 = "Peço humildemente que me carregue nas suas costas."
10054040-125 = "（Eu curvei o meu corpo e a encaixei confortavelmente em minhas costas）"
10054040-129 = "Eu não sou muito pesada?"
10054040-130 = "......Ah, você finge que não sente peso algum?\nEsse comentário só injeta uma aflição ainda maior nas minhas preocupações..."
10054040-131 = "Contudo... isso me traz à memória as lembranças daquele dia agradável."
10054040-132 = "......"
10054040-133 = "Dedico as minhas mais grandiosas reverências e agradecimentos a você, Sensei."
10054040-134 = "......Esse é o meu sentimento mais sincero, despido de quaisquer falsos pudores."
10054040-135 = "......"
10054040-136 = "Pois bem. Acredito que já pode me colocar de volta ao chão."
10054040-140 = "[ns] \"Já passou o susto?\""
10054040-141 = "Aham."
10054040-142 = "O passeio nas suas costas foi maravilhosamente proveitoso."
10054040-145 = "Vejamos. Que tal se eu tentasse praticar um pouco de natação?"
10054040-146 = "De fato, reconheço que as minhas experiências práticas na água são absolutamente nulas..."
10054040-147 = "Mesmo assim... eu acumulei teorias esplêndidas nos livros, portanto, a execução desses movimentos não deve ser um desafio insuperável."
10054040-149 = "（A Kisaki despencou de cabeça e se lançou nas águas do rio com total confiança!）"
10054040-154 = "（E, no segundo seguinte... O corpo dela começou a se debater desengonçadamente na parte rasa）"
10054040-158 = "[ns] \"Kisaki!?\""
10054040-159 = "......Tudo sob controle. Afinal, essa foi apenas a minha primeira e inédita tentativa."
10054040-160 = "Mais uma vez..."
10054040-165 = "[ns] \"Kisaki――!!\""
10054040-166 = "O roteiro teórico destas correntes não indicava... que as coisas aconteceriam dessa forma..."
10054040-167 = "......"
10054040-168 = "Eis a prova fatídica de que apenas o acúmulo de conhecimento intelectual não é suficiente..."
10054040-169 = "Unir o saber à prática é o que consagra o verdadeiro aprendizado..."
10054040-171 = "Bom, deixa que a sua amiga Rumi aqui te ajuda nessa parada!"
10054040-177 = "Ouch!?"
10054040-181 = "Ahahahaha!\nSe o que você quer é dominar e ficar de bem com a água, o primeiro passo é mergulhar nela sem medo!"
10054040-182 = "Rumi... não surja das águas subitamente me causando sustos desnecessários."
10054040-183 = "E se pra me desculpar das pancadas eu disser que a surpresa de ver vocês dois escondidinhos aqui também me deixou assustada!?"
10054040-184 = "Como é que eu iria imaginar que a Kisaki e o Sensei estariam aqui orquestrando aulinhas particulares de natação tão a sós assim, hein~?"
10054040-185 = "Cale-se...!"
10054040-186 = "......"
10054040-187 = "A sua intuição aguçada sempre foi a sua pior e melhor característica..."
10054040-188 = "De qualquer jeito, a regra de ouro para aprender a nadar é bater os braços sem pensar muito até o seu corpo pegar o jeito na repetição da prática!"
10054040-195 = "Contenha e represse essa sua força excessiva! A minha mente ainda não reuniu a coragem devida para...!"
10054040-200 = "Ahahaha! Bora, bora! Bate esses braços com mais vontade! Senão a sua mestra de natação aqui vai te deixar pra trás, hein~?"
10054040-201 = "O seu desdém pelas nossas enormes diferenças de estaturas físicas nesta correnteza é uma barbárie assustadora!"
10054040-205 = "Minha nossa... tenha ao menos um pingo de clemência nas suas lições brutais."
10054040-206 = "No mínimo, você deveria conseguir nadar até mim e me agarrar pelo menos uma vez antes de jogar desculpas na roda, não acha?~"
10054040-207 = "Anotarei esse desafio provocado no meu peito. Espero que não volte atrás com as suas palavras."
10054040-212 = "[ns1] \"Num piscar de olhos...\"\n[ns2] \"A sua natação melhorou de uma forma absurda!\""
10054040-215 = "???"
10054040-216 = "Aí, muito bem! Você conseguiu."
10054040-217 = "......"
10054040-218 = "O teatro de provocações brutais que você encenou agora mesmo... visava justamente arquitetar e instigar essa minha evolução forçada no nado!?"
10054040-219 = "Opaaa~? Mas do que será que você tá falando~? Não entendi foi nada~"
10054040-220 = "Mas, eu confesso que rolou sim um pouquinho de intenção maléfica e vontade de te zoar misturada aí no meio da brincadeira."
10054040-221 = "Ah, então sendo assim..."
10054040-222 = "Sendo assim... Sensei! Eu também quero brincar de cavalinho nas suas costas!"
10054040-223 = "[s] \"A Rumi também!?\""
10054040-228 = "[ns] \"...Pode vir de cabeça que os ombros do Sensei aguentam!\""
10054040-231 = "（Senti a presença e o calor do corpo da Rumi se apoiarem confortavelmente em minhas costas）"
10054040-232 = "（Graças ao empuxo favorável da água e das leis da física, sustentar o peso dela ali não forçou as minhas articulações de forma alguma）"
10054040-233 = "As minhas indignações e queixas que eu tinha guardado para soltar nos seus ouvidos eram infinitas... "
10054040-234 = "Mas nós duas fomos cúmplices nisso, consideraremos nossas dívidas quites."
10054040-235 = "Uoooh~, a vista daqui de cima dos seus ombros é muito maior e diferente do normal."
10054040-236 = "Além do mais... a minha paisagem diária e entediante se resume à visão retangular de um fogão apertado na cozinha.\n......Estar no alto assim e relaxando não é nada mal..."
10054040-237 = "[ns] \"Ei, falar desse jeito encostada na minha orelha e jogando o ar no meu pescoço tá me dando um... arrepio...!\""
10054040-238 = "Opa, por quê?\n......Ah, a orelha?"
10054040-239 = "......"
10054040-240 = "Fuuuumm~?"
10054040-241 = "[ns] \"!?!?!?!?!?\""
10054040-242 = "Esse comportamento provocativo e físico tão descabido não beira aos limites do razoável..."
10054040-243 = "Aha! A imaculada e puritana Kisaki também não estava se escorando no cangote do Sensei e aproveitando o passeio de cavalinho até uns segundos atrás?"
10054040-244 = "Se formos por essa ladeira perigosa de brincadeiras bruscas e inconsequentes, você acabará trazendo um infortúnio irreversível sobre a saúde do Sense――"
10054040-250 = "Uwaah!? Desculpa! Você tá bem, Sensei?"
10054040-251 = "N-Não, espera, isso é...!"
10054040-256 = "Ehehe! A operação de chocar o Sensei e dar um baita susto molhado pelas costas foi um tremendo de um sucesso!"
10054040-257 = "A-Ah... ué? Sensei...?\nS-Será que... Eu pulei com muita força e acabei exagerando na dose e te machuquei... !?"
10054040-258 = "M-Me desculpe! Uwaaaaaahn!"
10054040-259 = "[s3] \"Fica tranquila, não aconteceu nada comigo, eu tô firme como uma rocha. Mas...\"\n[s4] \"A minha vingança vai ser impiedosa!\""
10054040-262 = "Aaah, Kyaaaaaa!?"
10054040-264 = "（Afundei o corpo inteiro rapidamente na água com um impulso brusco e icerrei a Kokona nos meus ombros montada no meu pescoço!）"
10054040-268 = "Kyahh!? S-Sensei! Seu vigarista desleal!"
10054040-269 = "（A Kokona num solavanco amarrou os bracinhos desengonçados no redor da minha cabeça pra não cair!）"
10054040-270 = "（Aproveitando a manobra, abracei com força o corpinho que estava em cima de mim e nós dois mergulhamos caindo para trás nas correntes e espirrando água pra todo lado!）"
10054040-274 = "Hyaaah!? O Sensei é muito sujo e injusto nas táticas de afogamento!!!"
10054040-275 = "Se é guerra que você quer, é guerra que você vai ter! A retaliação é justa e não vou pegar leve...!"
10054040-278 = "（A Kokona afundou um tempinho e engoliu o terror da minha investida aquática... E, ao subir as cabeças das ondas com a fúria e amargura de uma leoa de águas doces, ela arremessou o corpo inteiro na minha direção e me trancou num tremendo de um abraço travador frontal!）"
10054040-282 = "Ehehe! Assim você não consegue nadar e escapar, Sensei!"
10054040-284 = "Ara, você quer um pouco de ajuda tática nessa sua imobilização genial?"
10054040-285 = "[ns5] \"Shun!?\"\n[ns6] （O peso de outro corpo aterrisou violentamente nas minhas costas e me prensou no meio d'água...!）"
10054040-289 = "Ufufu... Você está sem saídas agora. Nós te capturamos e a sua rendição é oficial."
10054040-290 = "Aí sim, Irmãzona Shun! Manda a ver e segura a fuga dele!"
10054040-291 = "[ns] \"Então esse é... O lendário combo aquático de esmagamento invencível das Irmãs Sunohara!\""
10054040-293 = "A vitória agora nos pertence em absoluto, o troféu deste confronto na bacia é integralmente nosso."
10054040-294 = "Ficar apenas observando passivamente dos camarotes é uma ofensa aos meus ímpetos brincalhões e turísticos.\nCedam um espaço no esmagamento para que a minha carcaça de Monshu se junte à imobilização nas suas costas, Sensei!"
10054040-295 = "[s] \"Você também perdeu o pudor, Kisaki!?\""
10054040-300 = "Pelas manobras conjuntas de esmagamento, esta torre humana formou a mais formidável, inédita e invicta maravilha de Shanhaijing:\n'A Majestosa Rokuwakaku Humana Aquática do Sensei'!\n#nA minha alma de combatente da chapa clama pela glória dessa montaria, eu vou me escalar e atirar as minhas pernas de cozinheira ali no topo dessa maravilha molhada arquitetônica!"
10054040-306 = "（E no fim das contas, a pilha humana majestosa que as formosas turistas molhadas encenaram para me transformar num parque de diversões colapsou miseravelmente sobre a água doce após as minhas pernas fraquejarem com tantas toneladas caindo de barrigada em mim...）"
10054040-311 = "Ahahahaha! Sensei, de onde você tirou aquele mergulho escandaloso se debatendo que nem um sapo sujo de lama e engolindo rio!? Aquilo foi a melhor coisa da nossa tarde de piscinas!"
10054040-312 = "Ufufu, o caos afogado das nossas lutinhas com certeza é o melhor e mais delicioso e divertido colírio para lavar a alma de nós todas, não é mesmo? Fufu."
10054040-318 = "Uuuhn... O contentamento genuíno estampado nesses sorrisos molhados delas exala tanta alegria que até corrompe o meu dever de guarda armada... \nAh, mas como eu queria não ter esquecido o meu traje de banho escondido nas malas no fundo do quarto..."
10054040-319 = "I-Isso, não! Jogue essa frouxidão e moleza fantasiosa pros ares varridos para fora da mente, Mina Konoe!\nA sua única missão em pedra sagrada nesta planície areada é segurar firme a sua muralha de aço de guarda-costas em defesa dessas vidas imponentes!"
10054040-320 = "......"
10054040-321 = "......Mas ah, se eu pudesse voltar correndo no tempo pro quarto e embrulhar meu maiô bem rapidinho nas tralhas..."
10054040-325 = "Ara, me parece que o alarme sonoro nas profundezas do estômago da Kokona-chan despertou."
10054040-326 = "I-Isso é pura e crua difamação!\nO barulho constrangedor daquela trombeta suada saiu lá pros confins do fundo, de qualquer outra pessoa aqui, menos de mim!"
10054040-327 = "A conversa fluiu tão leve que nós nem demos conta do sol passar, mas já é hora de comer, não é?\nQuerem largar esses maiôs, colocar uma roupa seca e ir provar os lanches humanos dali da rua comercial?"
10054040-328 = "Fumu? Achei que as suas mãos sagradas da panela teriam preparado a nossa iguaria diária de costume, sem chance de errar e depender da miséria das lojas alheias."
10054040-329 = "Ah, o meu coração bate quente pelas minhas cozinhas e potes sem sombra de dúvida. \nMas mesmo que a faca me chame na mão para fazer os rituais doces do fogão e apaziguar a fome, hoje o meu crachá é 100% de folgas prolongadas puras do balcão de pratos!"
10054040-330 = "E pra botar pimenta na decisão de recusar o fogareiro,\na minha curiosidade está borbulhando para testar as especiarias nativas de um vale inexplorado!"
10054040-331 = "Então chegou o momento de encerrarmos o teatro molhado e bater perna atrás da nossa investigação disfarçada... As cortinas para a nossa missão verdadeira estão içadas!"
10054040-332 = "As portas abençoadas de nossa 'Inspeção Secreta de Negócios e Balanços Financeiros' estão estouradas em aberto!"
10054040-333 = "Até mesmo sob a desculpa furada e as sombras confortáveis dos banhos lúdicos, o investimento gordo de Shanhaijing exige o nosso escrutínio de olhos cravados."
10054040-334 = "Mas, eu faço só um pedidinho amigável e camarada: Por favorzinho de todas as formas sagradas imagináveis... amarrem as pontas da língua para esconder e NUNCA expurguem em praça alta o uso sujo da palavra 'inspeção' com transeuntes...!"
10054040-335 = "[ns] \"Nós faremos um bom sacrifício na rua e que essas ruelas comerciais encham as nossas barrigas de banquetes majestosos e maravilhosos!\""
10054040-336 = "Ebaaa! O esquadrão faminto das meninas de Shanhaijing avança pela conquista da comilança suprema!"
10054040-337 = "Fufu. Tente não atirar todo o seu peso num chilique grudento e folgado por comida para cima do coitado do Sensei e abalá-lo no estresse, viu Kokona-chan."
10054040-338 = "As recusas manhosas perante esses excessos e alvoroços públicos que você exibe de sobra provam a notória classe madura de dama responsável que cresce inabalável e robusta na sua alma, não concorda com o que ouve?"
10054040-339 = "C-Certamente! E é esse tipo de classe superior que faz o meu escudo moral e educado ser indestrutível, intacto e formoso em Shanhaijing!"
10054040-341 = "......"
10054040-342 = "............"
10054040-343 = "........................"
10054040-344 = "Mas ué?"
10054040-345 = "......"
10054040-346 = "Fumu...?"
10054040-347 = "O q-que foi que baixou a pressão em vocês, amigas e irmãs maduras adultas?"
10054040-348 = "O meu alerta aguçado de instintos apita avisando que as patrulhas e observações táticas urgem inadiáveis."
10054040-349 = "......Podem puxar as cadeiras se ainda há sobras pro chão... mas fiquem caladas... só servimos a escória e o refugo do tédio em panelas paradas..."
10054040-350 = "A gente tem excursão e passeio com barcos nas águas correntes... se isso preenche o vazio lúdico nas veias cansadas de vocês..."
10054040-351 = "Sopas ralas de macarrões sem graça... peixes escaldados boiando solitários em caldos turvos... os chás nativos cheios de grama sem prestígio local... o catálogo escasso serve um leque inútil e humilde de opções para os desesperados de passagem..."
10054040-352 = "Não é necessária uma expertise refinada dos meus conhecimentos de comércio mercadológico para diagnosticar e atestar o elefante gritante branco e gigante nesta praça.\nA apatia pavorosa e o silêncio fantasmagórico deste fim de mundo é algo que não encontra desculpas nem na temporada mais inóspita do verão turvo e escuso!"
10054040-353 = "Isso não possui escapatória de críticas ou atestados que passem o pano rústico de desculpas em considerações comparativas.\nUma feira nas praças diárias escoradas dos confins das entranhas de Shanhaijing vibra num tumulto de lucros vibrantes com uma animação e um calor infernal dez mil vezes maior do que esta poeira de mortos fétida!"
10054040-359 = "Com as vossas devidas tolerâncias e licenças cordiais em meio ao caos esvaziado, \ntemos poucas e sinceras interrogações a respeito do cemitério em que esta praça se encontra chafurdada..."
10054040-360 = "Hmmm...?"
10054040-361 = "Ghyyeeehh!?"
10054040-362 = "M-Me perdoem por todas e infinitas ofensas proferidas no alvoroço silencioso e profano!! \nEu me prosterno no barro do asfalto com a honra em lágrimas e imploro que... eu ajoelho que a vossa fúria magnânima divina isente as paredes miseráveis desta minha humilde tasca podre de vendedor sujo...!"
10054040-363 = "Se o fogo das chamas consumir o nosso último grão de arroz e lamber as telhas do galpão de sobrevivência humilde,\neu morro em desonra eterna e nunca mais cruzarei o meu olhar raso com o clã ancião mestre da nossa história...!!"
10054040-364 = "Ué? O que raios brota e sai como espinhos venenosos das minhas feições ou posições inofensivas que inflige tamanho terror ameaçador e alarme fatal aos olhos chorosos de vocês...?"
10054040-365 = "Nossas intenções são pautadas na simplicidade turística das barrigas vazias rosnando.\nNós meramente varamos o mundo e o sol quente até esse recinto esburacado e humilde para mastigar uns belos de uns pãezinhos quentes do forno e acalmar os roncos ensurdecedores do estômago..."
10054040-366 = "Co-Comer...? Fritar petiscos nos fornos falhos de panela quente nos abismos da minha fogueira rala e chula!? \nA-As lousas de chapa de cozinha estão humildemente dobradas prontas para queimar e untar num belo óleo fervente a sua preciosa paciência sem questionar as gorjetas secas e caras vossas senhorias em sacrifício submisso de chapa...!"
10054040-367 = "M-Mas imploro compaixão pura dos meus pedidos! \nCertas iguarias imponentes nos desejos de pratos requintados ausentam a minha pobre cozinha amarga nas panelas frouxas.\nPoupe as varridas violentas de castigo pra cima de meus potes e deixe a minha pobre barraquinha de feira escorada respirar viva mais esse dia pífio de dores nas calçadas!"
10054040-368 = "Para que berrar aos lamentos agudos como se os próprios sapatos alheios dos opressores já esmagassem a poeira das botas brutais para triturar os vossos crânios assombrados!? \nNão vejo rastro ou motivo visível de ameaça bélica pairando perante nossas modestas e imaculadas intenções inofensivas fofas de turistas amigáveis para suscitar pânicos chorosos em praça aberta..."
10054040-369 = "Duas minúsculas... Criaturas disfarçadas nesses visuais perversos de formas cruéis e doces crianças do abismo de duas pernas pisando com a sola nas trevas da entrada da porta...!!!\nAhhhhh... O terror impiedoso dos algozes de dente de leite infernais com os terrores sádicos dos tiranos de praça bateram nas orelhas trêmulas com alarme fatal nos ossos frágeis e sujos!"
10054040-370 = "Piedade magnânima e esmolas purificadoras da vossa clemência inabalável divina não me falhem...!! N-Não desçam a foice das punições nas vigas de ferro pra rachar a lojinha de pão num pandemônio infernal de destroços de destruição esmagada... eu imploro de pernas dobradas e joelhos feridos do asfalto sujo e pobre...!"
10054040-371 = "Tirem dos calibres grossos e engatem travas secas sem engatilhar chuvas violentas mortais da artilharia letal nas barracas, não tragam o desespero bélico em bazucas e rojões das lousas explosivas para as areias empoeiradas da feira rala e barata...!!"
10054040-372 = "Fumuum...?"
10054040-373 = "Chuva de balísticas mortais de armamentos de artilharias de fogueira abissal nas nossas vitrines rasas e singelas feiras em calçadas do interior!?\nA que delírios paranoicos infundados doentios insanos da fobia de guerra urbana bélica em praça vocês permitiram que rebaixassem e sujassem os miolos fracos ressequidos dos juízos de bom senso a ponto de inventarem na paranoia das poeiras da cabeça tais cenários infames escorregadios grotescos ridículos!?"
10054040-375 = "A-As ameaças assombrosas emudeceram dos ouvidos esmagados!? \nÉ verídico, oh céus fadigantes magnânimos imperadores turísticos puros e isentos da brutal destruição sádica de massacre dos meus muros no caldeirão de fogo inclemente infernal...?"
10054040-376 = "Nós somos a pura e singela trupe inofensiva de visitantes de calçada em passeio de pés relaxados turísticos..."
10054040-377 = "F-Forasteiros fofinhos forasteiros caminhando pra comer lanches de feira amigável dos panfletos inofensivos turísticos passeando com turistas soltos e grátis em sorrisos passeando...?"
10054040-378 = "A honra imaculada intocável sagrada do passeio está firme, sim! \nA formosa e sublime garota que se esconde à paisana sob as roupas balneares e as areias e serve do meu inquebrantável dever sagrado de leal escolta...\né ninguém mais, ninguém menos do que a majestosa líder Kisaki, de Shanhaijing, disfarçada nas relaxadas praias turísticas!"
10054040-379 = "Os ventos e o alívio que acalmam a cegueira rústica e bruta das sombras dos pensamentos alheios...! Peço meus sinceros perdões pelo escândalo bruto, os meus juízos embaralharam os olhos na farsa doentia de que o diabo e as fogueiras rastejariam por essas crianças foleiras insanas no capuz...! "
10054040-380 = "Abafa os incidentes patéticos passados e recomecemos do pé de chumbo da paz. Os bolsos recheados pisaram e enfeitaram os pisos vazios desse chão."
10054040-381 = "Pois bem. Este é o caderninho da glória humilde. O cardápio para os olhares curiosos e estômagos esmagados no asfalto rústico da fome das nossas barracas."
10054040-382 = "Fico agradecida pelas honras modestas cordiais e servidão pacífica da lousa de pães.\n...Mas voltando ao cerne estilhaçado foleiro desse balcão fantasma de tédio da areia... e quanto aos esquadrões ruidosos fervilhantes de consumidores vibrantes de veraneios ruidosos que as temporadas cheias engarrafam em congestionamentos ferventes...?"
10054040-383 = "......"
10054040-384 = "Isso tudo ocorreu pelo fatídico fardo dos desastres sombrios na bacia suada e doentia..."
10054040-385 = "Cala essa língua maldita de pregos tortos fedidos nos lábios e a desculpa frouxa de dentes trêmulos afogados em choradeiras!"
10054040-386 = "......"
10054040-387 = "（Como a minha intuição cantou perfeitamente nos ventos quentes... o terror cego pânico abissal que congelou os espasmos e afogou no pavor estagnante foi justamente e exato gerado pelas impressões turvas no medo brutal foleiro de quando a Senhora Monshu e a pura garota infantil da Kokona botaram as pernas miúdas no solo da praça, não foi...?）"
10054040-388 = "（Sendo essa premissa cruel base da verdade do silêncio assustado no pavor foleiro fofo, então não precisa cavar longos buracos lógicos mentais para suspeitarmos a origem...）"
10054040-390 = "Que merda nojenta é essa algazarra de pífia ralé rala solta solene falida na nossa areia sagrada que ruge num coral feio murcho fedido nas vitrines suadas amargas de praça e calçada de Shanhaijing!?"
10054040-391 = "Hah!?"
10054040-392 = "D-Demônios malditos de fogueiras...! E-Elas deram as fuças podres cruéis infernais desumanas diabólicas insanas na nossa ruela!"
10054040-393 = "Aviso vermelho bélico! T-Todos escorreguem e tapem as testas pros abismos covardes e rezem na barricada para sobreviver aos estilhaços amargos e explosões cegas de fogo do além ardido na calçada! Fuja e dobre os traseiros pro esconderijo da lama rústica!"
10054040-397 = "......Eh?"
10054040-398 = "Fumu..."
10054040-402 = "Ooopa opaaa pooeira murcha fedida rala da chapa! Ué! As excelentíssimas autoridades supremas fofas desceram no palanque furreca humilde bosta da escória e não recebemos tapete dourado ou banda marcial ridícula suada na poça!?"
10054040-403 = "Vocês abusam e fedem prepotências infladas burras cegas na ilusão frouxa medíocre lixosa adulta da rua!"
10054040-404 = "Marmanjos lixosos foleiros fedidos que vestem terno de poeira e não servem de pilar nem pra choradeira de frouxo foleiro nojento murcho! O espetáculo e papelão feio de vergonha miserável amarga e doce que se encolhe foleiro com covardia cega fútil afogada nos poços de poças faz pena ridícula pros olhos imaculados amargos!"
10054040-405 = "Não obstante... A vergonha inútil de covardes trêmulos fedidos se esgueirando nojentinhos pálidos docinhos no chororô foleiro nos injeta um frenesi brutal sublime delicioso fofo sádico que mexe os ânimos de alegria no fogo cruel foleiro suado pálido. Ufufu..."
