[translation]
10036010-1 = "Episódio 1; O Mar e Saori"
10036010-6 = "Tudo certo! Tudo certo!"
10036010-7 = "Comecem carregando as bagagens maiores!"
10036010-8 = "Certo!"
10036010-9 = "Ei, pode vir aqui um instante?"
10036010-14 = "……Eu?"
10036010-15 = "Você parece pálida, está tudo bem?"
10036010-16 = "Ah, não……."
10036010-17 = "É que eu estava pensando se é seguro circular assim abertamente em um horário tão claro."
10036010-18 = "……Não tem problema se as forças de segurança de outras escolas nos encontrarem?"
10036010-19 = "Por acaso você é novata?"
10036010-20 = "A 'Praia Fora da Lei' é uma terra de liberdade!"
10036010-21 = "Terra de liberdade……?"
10036010-25 = "Ah! Exatamente!"
10036010-26 = "Este lugar fica na divisa de três distritos autônomos, então a jurisdição é ambígua."
10036010-27 = "O pessoal da Valkyrie pode até tentar se intrometer, mas……#nnão vai adiantar nada quando aqueles lerdos chegarem."
10036010-28 = "Quando eles sentirem o cheiro de algo, a reunião geral já terá acabado."
10036010-30 = "Entendo. #nEntão é por isso que grupos de delinquentes como o Grupo do Capacete agem de forma tão ousada……."
10036010-32 = "G-Grupo de delinquentes!?"
10036010-34 = "……Não era? #nDesculpe, peço perdão."
10036010-36 = "Não, não é que eu queira um pedido de desculpas……."
10036010-37 = "Embora seja verdade que somos um grupo de delinquentes……."
10036010-39 = "Por enquanto, é só carregar estas bagagens, certo?"
10036010-44 = "Carregar aquelas três barras de ferro pesadas ao mesmo tempo……."
10036010-45 = "Isso foi de grande ajuda."
10036010-47 = "Onde devo colocar?"
10036010-49 = "Ah, sim! #nColoque na areia com um intervalo de 2 metros entre elas!"
10036010-54 = "Certo, esta é a última."
10036010-55 = "O próximo é……."
10036010-58 = "Você aí!"
10036010-59 = "Pode me dar uma mãozinha?"
10036010-60 = "Ah, pode deixar comigo."
10036010-62 = "Eia, pronto."
10036010-63 = "Hmph!"
10036010-67 = "Obrigada, você me salvou!"
10036010-68 = "Não precisa agradecer."
10036010-69 = "O contrato dizia que eu deveria colaborar com outros trabalhos além da escolta."
10036010-70 = "Séria, ou talvez um pouco estranha?"
10036010-71 = "Estranha, disse……?"
10036010-72 = "Ei, venha aqui também!"
10036010-73 = "Queremos montar uma quadra de vôlei de praia, mas #nnão temos gente suficiente."
10036010-74 = "Ah, entendi."
10036010-79 = "……Ufa. #nO trabalho termina por aqui, então."
10036010-80 = "Está na hora de preparar a escolta……."
10036010-84 = "Ah……."
10036010-89 = "(Pensando bem, eu já tinha ouvido falar disso)"
10036010-90 = "(Sobre a história de que, no fim do mundo, existe um vasto oceano)"
10036010-91 = "(Mas é a primeira vez que vejo com meus próprios olhos……)"
10036010-92 = "……."
10036010-100 = "……."
10036010-101 = "……Que paz."
10036010-102 = "Atsuko, Misaki, Hiyori…… Azusa."
10036010-103 = "Eu queria que todos pudessem ver essa paisagem também……"
10036010-105 = "（Por outro lado, em outra parte da Praia Fora da Lei……）"
10036010-111 = "Sensei, olhe. #nUm caranguejo de verdade, que fofo."
10036010-112 = "[s] \"É mesmo, que fofo.\""
10036010-116 = "O sorvete vai cair. #nCuidado."
10036010-119 = "Se, Sensei…… meu sorvete derreteu! #nAcabou tudo! Uwaaaaaa!"
