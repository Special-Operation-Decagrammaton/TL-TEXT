[translation]
10036010-1 = "第1話;海とサオリと"
10036010-6 = "オーライ！オーライ！"
10036010-7 = "大きい荷物から運んでいけ！"
10036010-8 = "はいっ！"
10036010-9 = "おーい、ちょっと良いか？"
10036010-14 = "……私か？"
10036010-15 = "顔色が悪そうだが、大丈夫か？"
10036010-16 = "ああ、いや……。"
10036010-17 = "こんな明るい時間に堂々と動いて、良いのかと思ってな。"
10036010-18 = "……他の学園の治安維持部隊に見つかっても大丈夫なのか？"
10036010-19 = "もしかして、新入りか？"
10036010-20 = "「アウトロービーチ」は自由の地なんだ！"
10036010-21 = "自由の地……？"
10036010-25 = "ああ！その通り！"
10036010-26 = "ここは3つの自治区の境になっているから、管轄が曖昧になっているんだ。"
10036010-27 = "ヴァルキューレの連中が出しゃばってくるかもしれないが……#nあのノロマたちが来たところで、何になるって話だ。"
10036010-28 = "奴らが嗅ぎつけた頃には、もう総連合会は終わってるはずさ。"
10036010-30 = "そうか。#nだからヘルメット団のような不良集団が、こうも大胆に活動しているのか……。"
10036010-32 = "ふ、不良集団！？"
10036010-34 = "……違ったか？#nすまない、謝罪する。"
10036010-36 = "いや、謝ってほしいわけじゃ……。"
10036010-37 = "たしかに不良の集まりではあるが……。"
10036010-39 = "ひとまず、この荷物を運べば良いんだな？"
10036010-44 = "あの重たい鉄棒を3本同時に……。"
10036010-45 = "こりゃ、大助かりだな。"
10036010-47 = "どこに置くんだ？"
10036010-49 = "あ、ああ！#n砂浜に2メートル間隔で並べてくれ！"
10036010-54 = "よし、これで最後だな。"
10036010-55 = "次は……。"
10036010-58 = "そこの人！"
10036010-59 = "ちょっと手伝ってもらえないかな？"
10036010-60 = "ああ、任せてくれ。"
10036010-62 = "よいしょ、っと。"
10036010-63 = "ふっ！"
10036010-67 = "ありがとう、おかげで助かったよ！"
10036010-68 = "礼は不要だ。"
10036010-69 = "契約書には、護衛以外の仕事にも協力するよう書かれていたからな。"
10036010-70 = "真面目というか、ちょっと変わってるのかな？"
10036010-71 = "変わっている、だと……？"
10036010-72 = "おーい、こっちにも来てくれ！"
10036010-73 = "ビーチバレーのコートを作りたいんだけど、#n人手が足りないんだ。"
10036010-74 = "ああ、分かった。"
10036010-79 = "……ふぅ。#nこれで作業は一区切りか。"
10036010-80 = "そろそろ護衛の準備を……。"
10036010-84 = "あっ……。"
10036010-89 = "（そういえば、聞いたことがあったな）"
10036010-90 = "（地の果てには、広大な海があるという話を）"
10036010-91 = "（しかし、実際に目にするのは初めてだ……）"
10036010-92 = "……。"
10036010-100 = "……。"
10036010-101 = "……平和だ。"
10036010-102 = "アツコ、ミサキ、ヒヨリ……アズサ。"
10036010-103 = "みんなにも、この景色を……。"
10036010-105 = "（一方、アウトロービーチの別の場所では……）"
10036010-111 = "先生、見て。#n本物のカニさん、可愛い。"
10036010-112 = "[s] \"可愛いね。\""
10036010-116 = "アイス、こぼれそうだよ。#n気をつけて。"
10036010-119 = "せ、先生……私のアイス、溶けちゃいました！#nもう終わりです！うわぁぁああん！"
