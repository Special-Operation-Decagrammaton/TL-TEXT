[translation]
10019060-6 = "Muito bem, com isso, todos os 5 Sanctums foram conquistados!"
10019060-7 = "Só resta um — o 6º Sanctum no centro de D.U.!"
10019060-8 = "Sim. Sendo assim, reuniremos todas as forças do Schale no 6º Sanctum."
10019060-9 = "Provavelmente, esta será a batalha final."
10019060-10 = "Por favor, prepare-se para a conquista do 6º Sanctum...!!"
10019060-16 = "E-espere um momento...!#nUma reação de energia poderosa foi confirmada vindo do Distrito Shiratori de D.U. ...!!"
10019060-27 = "I-isso é..."
10019060-28 = "...!?#nFinalmente, o 'Guardião' do 6º Sanctum...?"
10019060-29 = "Hmm...?#nRi-Rin-senpai, espere...! Aqui também está perigoso."
10019060-30 = "Das coordenadas dos Sanctums destruídos, uma reação de energia de altíssima concentração está...!!"
10019060-32 = "!!"
10019060-37 = "Os Sanctums que deveriam ter sido destruídos estão..."
10019060-47 = "...I-isso... o que significa...? Eles reviveram?"
10019060-48 = "...!"
10019060-49 = "Isso é..."
10019060-50 = "Será que todos os nossos ataques até agora foram inúteis...?"
10019060-54 = "Não, isso não é verdade."
10019060-61 = "Com o renascimento de cada Sanctum, a reação de energia do 6º Sanctum desapareceu. Ou seja, podemos concluir que aquilo era um sistema de backup dos outros Sanctums."
10019060-62 = "Agora, o 6º Sanctum não é diferente dos outros.#nO fato de o 'Guardião' ter aparecido é a prova disso."
10019060-63 = "...Se for esse o caso, a situação é simples."
10019060-64 = "A conquista dos 5 Sanctums revividos e do 6º Sanctum — vai começar!!"
10019060-65 = "Sensei.#nPor favor, assuma o comando mais uma vez."
