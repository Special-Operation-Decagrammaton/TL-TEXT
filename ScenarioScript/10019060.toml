[translation]
10019060-6 = "よし、これで5か所のサンクトゥムは全部攻略完了！"
10019060-7 = "残るは――D.U.中心部の第6サンクトゥムだけ！"
10019060-8 = "はい。それでは「シャーレ」の全戦力を第6サンクトゥムに集結させます。"
10019060-9 = "おそらく、これが最後の戦いとなるでしょう。"
10019060-10 = "第6サンクトゥム攻略の準備をお願いします……！！"
10019060-16 = "ま、待ってください……！#nD.U.シラトリ区から、強力なエネルギー反応が確認されました……！！"
10019060-27 = "こ、これは……"
10019060-28 = "……！？#nついに、第6サンクトゥムの「守護者」が……？"
10019060-29 = "んん……？#nり、リン先輩待って……！こっちもヤバい。"
10019060-30 = "破壊されたサンクトゥムの座標から、超高濃度のエネルギー反応が……！！"
10019060-32 = "！！"
10019060-37 = "破壊したはずのサンクトゥムが――"
10019060-47 = "……こ、これ……一体どういう事……復活したってわけ？"
10019060-48 = "……っ！"
10019060-49 = "こ、れは……"
10019060-50 = "今までの攻撃は、無意味だったのでしょうか……？"
10019060-54 = "いいえ、それは違います。"
10019060-61 = "各サンクトゥムが復活したことで、第6サンクトゥムのエネルギー反応が消滅しました。つまり、アレは他サンクトゥムのバックアップシステムだったと見て良いでしょう。"
10019060-62 = "これで第6サンクトゥムは他と変わらなくなりました。#n「守護者」が出現したことがその証左です。"
10019060-63 = "……それであれば話は単純ですね。 "
10019060-64 = "復活した5つのサンクトゥム、そして第6サンクトゥムの攻略を――開始します！！"
10019060-65 = "先生。#nもう一度、指揮をお願いします。"
