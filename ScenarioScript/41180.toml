[translation]#[Texto revisado.] Em aguardo de revisão de formatação de texto. - Filipe 10/06.
41180-1 = "Episódio 18: Operação Trevo (2)"
41180-2 = "Ugh... Grrr... Droga...!"
41180-5 = "……Sem chance. Essa porta não vai ceder nem com reza braba."
41180-6 = "A gente conseguiu a prova do crime, mas do que adianta se morrermos presas aqui?"
41180-7 = "O tempo tá acabando. Alguém tem um plano que não envolva apodrecer nesse cofre?"
41180-8 = "Cê não ouviu o que eu disse, Moe? A porta tá selada. Não abre."
41180-9 = "……Hã? Mas por que diabos vocês fecharam a porta pra começo de conversa?!"
41180-10 = "É um cofre de segurança máxima! É óbvio que o sistema de trava é automático!"
41180-11 = "E-Eu achei que se deixássemos a porta aberta... alguém ia ver a gente e... e..."
41180-12 = "Eu tava monitorando os guardas, sua anta! Eu falei que o caminho tava limpo!"
41180-13 = "Por que você tem que ser tão paranoica e estragar tudo?!"
41180-14 = "D-Desculpa... m-me desculpa mesmo..."
41180-16 = "Se a gente tivesse pelo menos usado um calço ou uma granada pra travar o trilho..."
41180-17 = "Uuuuh... snif... snif..."
41180-18 = "Eu sabia... Alguém como eu nunca deveria ter entrado na SRT..."
41180-19 = "Eu só sinto medo... e só sei atrapalhar vocês..."
41180-20 = "O mundo seria melhor se eu nunca tivesse nascido... me deixem aqui pra morrer..."
41180-21 = "Miyu, pare com isso agora. É natural que uma franco-atiradora sinta desconforto em operações de infiltração em locais fechados."
41180-22 = "A falha foi minha por não ter previsto essa variável no planejamento tático."
41180-23 = "……Ah, sério mesmo, Miyako?"
41180-24 = "Não passa a mão na cabeça dela. O erro foi da Miyu e ponto final."
41180-26 = "Gente, não é hora de procurar culpadas! O sistema vai resetar em menos de 5 minutos!"
41180-27 = "E aí, o que a gente faz? Vamos tentar explodir a porta por dentro e rezar pra não virar patê?"
41180-28 = "Moe, você não consegue hackear a tranca de novo?"
41180-29 = "Não adianta liberar o sinal eletrônico se a trava física tá travada por dentro, gênio! A porta não tem maçaneta!"
41180-30 = "Eu quero sumir... quero desaparecer... snif..."
41180-32 = "M-Meninas, por favor... vamos manter a calma..."
41180-34 = "Miyako, dá a ordem! O que a gente faz?! Faltam menos de cinco minutos!!"
41180-35 = "Você é a droga da nossa capitã, não é?!"
41180-36 = "Miyako-chan... ajuda a gente..."
41180-41 = "E-Eu..."
41180-42 = "Decide logo, Miyako! O tempo tá voando!!"
41180-43 = "MIYAKO!!"
41180-44 = "……"
41180-50 = "（……Olhando pra trás, desde que saímos da SRT, todas as operações que eu liderei foram um desastre.）"
41180-51 = "（O parque ocupado, o dilúvio no acampamento...）"
41180-52 = "（……Eu não tenho a visão estratégica do Sensei. Não tenho esse carisma de líder.）"
41180-53 = "（Nessa situação desesperadora... encurraladas num caixão de aço...）"
41180-54 = "（O que eu posso fazer...? O que eu sou capaz de fazer por elas...?）"
41180-55 = "[s1] \"Miyako, respira. Olha pra mim.\"\n[s2] \"Ainda não é o fim. Eu tô aqui com você.\""
41180-56 = "……Sensei."
41180-57 = "……Sensei."
41180-58 = "Olha em volta... eu não vejo saída. Eu falhei com elas."
41180-59 = "Se o senhor estivesse aqui dentro, talvez desse um jeito... o senhor sempre dá um jeito."
41180-60 = "Mas eu não sou o senhor. Eu não tenho esse poder."
41180-61 = "Eu tô perdida! Eu não sei o que fazer, o medo tá me cegando...!"
41180-62 = "Eu não consigo fazer nada sozinha!"
41180-63 = "Eu... eu não consigo nem confiar em mim mesma...!"
41180-64 = "[s] \"Mas você não está sozinha. E não precisa carregar o mundo nas costas.\""
41180-68 = "[ns] \"Olhe para elas. Confie no laço que une vocês.\""
41180-69 = "……?"
41180-74 = "Vai ficar aí parada com cara de paisagem? Dá a ordem logo."
41180-75 = "Isso aqui não tá nos manuais da SRT. Eu tô fora de combate emocionalmente, se vira."
41180-76 = "Eu sempre tive medo das missões... tudo é assustador..."
41180-77 = "Mas eu aguento qualquer coisa... se a Miyako-chan estiver comigo..."
41180-78 = "Sensei, eu tô ocupada tentando não deixar o firewall fritar a gente. A estratégia é com a capitã."
41180-80 = "Então..."
41180-82 = "[s] \"A escolha é sua, Miyako. Mostre pra elas quem é a nossa capitã.\""
41180-88 = "……Entendido. Na escuta."
41180-89 = "Vou retomar o comando da operação. Minhas ordens podem parecer... pouco ortodoxas a partir de agora, mas exijo obediência absoluta e imediata."
41180-90 = "Nossa situação é crítica e o caminho será um inferno. Mas não importa o que aconteça..."
41180-91 = "Nós vamos levar esse 'Trevo' de volta... para o nosso [ruby=Parque dos Coelhinhos]único e verdadeiro lar[/ruby]."
41180-92 = "Estamos entendidas?"
41180-95 = "AFIRMATIVO, CAPITÃ!"
41180-97 = "（Cerca de 5 minutos depois……）"
41180-102 = "O ALARME?! O QUE TÁ ROLANDO?!"
41180-103 = "As câmeras não mostram nada! Tá tudo normal nos monitores!"
41180-104 = "Não deve ser nada, deve ser só um gato ou um rato passando pelo sensor..."
41180-105 = "O alarme é do cofre de segurança máxima, seu imbecil! Como é que um gato ia entrar lá dentro?!"
41180-106 = "Sei lá, talvez ele tenha cavado um buraco?"
41180-118 = "Mizinho, vem cá... aparece pra gente... se for um rato eu juro que não te mordo~……"
41180-121 = "……Hã? (A porta do cofre se abre pelo lado de fora)"
41180-135 = "Regra número um da elite: Em caso de anomalia, assuma sempre o pior cenário possível."
41180-136 = "É por causa dessa negligência amadora que Kivotos é esse caos sem fim."
41180-141 = "I-INVASORAS!! ELAS TÃO AQUI!!"
41180-153 = "Ativar o alarme de incêndio por dentro pra forçar os guardas a abrirem a porta em pânico... Uma estratégia suja, ousada e nada convencional. Bem a sua cara, Miyako."
41180-154 = "Mas ver que o nível tático da polícia que deveria proteger a cidade é tão baixo... eu não sei se fico feliz por ser fácil ou deprimida por ser patético."
41180-155 = "M-Mas isso vai dar certo mesmo...?"
41180-156 = "O alarme não para de tocar, tá todo mundo correndo pra cá...!"
41180-161 = "Sim. O enxame de cadetes da Valkyrie vai cair em cima de nós em segundos."
41180-162 = "Evitem combate em campo aberto. Vamos usar a confusão a nosso favor e atacar onde elas menos esperarem."
41180-163 = "Vamos pelo corredor leste. Tem mais cobertura e pontos cegos."
41180-167 = "Atenção ao perímetro! Avançar em direção ao [ruby=Ponto de Extração]PDE[/ruby] agora!"