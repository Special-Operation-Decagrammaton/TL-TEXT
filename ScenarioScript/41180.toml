[translation]
41180-1 = "Episódio 18: Operação Trevo (2)"
41180-2 = "Ugh, droga…!"
41180-5 = "…Não adianta. Não vai abrir."
41180-6 = "Já garantimos as provas, então o que estamos fazendo?"
41180-7 = "Já está quase no fim, não vamos sair logo?"
41180-8 = "Não ouviu? A porta não abre."
41180-9 = "…Hã? E por que a fechou?"
41180-10 = "Porta de cofre, é óbvio que é automática!"
41180-11 = "Ah, achei que se deixasse aberta, alguém poderia ver…"
41180-12 = "Eu estava vigiando justamente…"
41180-13 = "Por que você fica insegura com essas coisas?"
41180-14 = "D-desculpa…"
41180-16 = "Pelo menos devia ter colocado um batente ou algo assim…"
41180-17 = "Ugh, ugh, ugh…"
41180-18 = "Afinal, eu não devia ter entrado na SRT…"
41180-19 = "Só tenho medo e atrapalho todo mundo…"
41180-20 = "Eu nem devia ter nascido…"
41180-21 = "Miyu, não diga isso. Não é culpa sua se atiradores não estão acostumados com ambientes fechados."
41180-22 = "Na verdade, a culpa é minha, que não considerei isso."
41180-23 = "…Tem certeza?"
41180-24 = "Não tente disfarçar. A culpa é da Miyu, não tem jeito."
41180-26 = "Não é hora de ficar apontando culpados, o tempo está acabando!"
41180-27 = "Então o que sugere? Arrombar, como eu disse antes?"
41180-28 = "Aliás, não é só hackear de novo?"
41180-29 = "Só destravar a fechadura eletrônica não adianta, a porta não vai abrir fisicamente."
41180-30 = "Ugh, quero morrer… quero fugir…"
41180-32 = "P-pessoal, vamos nos acalmar…"
41180-34 = "Miyako, não tem algum jeito? Já faltam 5 minutos."
41180-35 = "Você é a comandante, não?"
41180-36 = "Miyako-chan…"
41180-41 = "E-eu…"
41180-42 = "Decide logo, Miyako. Não temos tempo!"
41180-43 = "Miyako!"
41180-44 = "……"
41180-50 = "(…Pensando bem, desde que saímos da SRT, todas as operações que comandei deram errado.)"
41180-51 = "(Na praça, no alagamento do acampamento…)"
41180-52 = "(…Eu não tenho visão estratégica nem capacidade de liderança como o Professor.)"
41180-53 = "(Nesta situação desesperadora…)"
41180-54 = "(O que eu posso fazer…?)"
41180-55 = "[s1] \"Miyako, respira.\"\n[s2] \"Ainda não acabou.\""
41180-56 = "…Professor."
41180-57 = "…Professor."
41180-58 = "Nesta situação… não consigo fazer nada."
41180-59 = "Se o senhor estivesse aqui, talvez desse um jeito…"
41180-60 = "Eu sou diferente do senhor. Não tenho esse poder."
41180-61 = "Mesmo que tivesse, agora já não sei de mais nada!"
41180-62 = "Sozinha, não consigo nada!"
41180-63 = "Não consigo confiar em mim mesma!"
41180-64 = "[s] \"Não precisa carregar tudo sozinha.\""
41180-68 = "[ns] \"Confie nelas.\""
41180-69 = "…?"
41180-74 = "É você quem vai fazer."
41180-75 = "Não tem nada no manual para esta situação, então não posso."
41180-76 = "Missões são sempre assustadoras…"
41180-77 = "Mas com a Miyako-chan…"
41180-78 = "Aliás, eu já não posso fazer mais nada. Já estou ocupada com a operação."
41180-80 = "Então…"
41180-82 = "[s] \"Vai na fé, Miyako.\""
41180-88 = "…Sim, entendido."
41180-89 = "Vamos recomeçar a operação. Podem surgir dúvidas, mas por favor, sigam sem hesitar."
41180-90 = "A situação não é boa, e haverá dificuldades. Mesmo assim…"
41180-91 = "Temos que levar este 'Trevo' e voltar ao 'Parque dos Coelhinhos'."
41180-92 = "Certo?"
41180-95 = "Entendido!"
41180-97 = "(Cerca de 5 minutos depois…)"
41180-102 = "Alarme!"
41180-103 = "Nas câmeras não tem nada…"
41180-104 = "Não é um gato ou rato?"
41180-105 = "É o alarme do depósito. Como um gato entraria?"
41180-106 = "Cavou um buraco?"
41180-118 = "Gatinho~, sai daí~. Rato é meio, mas…"
41180-121 = "…Hã?"
41180-135 = "Quando há uma anomalia, o básico é prever o pior caso."
41180-136 = "É por essa mentalidade que Kivotos não para de ter problemas."
41180-141 = "I-intrusos!"
41180-153 = "Fazer o alarme tocar de propósito… uma estratégia típica da Miyako, que não está no manual. É para fazê-los abrir a porta, né."
41180-154 = "Mesmo assim, que o esquadrão responsável pela segurança de Kivotos tenha esse nível… é ao mesmo tempo uma sorte e uma tristeza…"
41180-155 = "I-isso vai dar certo…?"
41180-156 = "O alarme não para de tocar…"
41180-161 = "Sim, outros alunos vão se juntando."
41180-162 = "Evitemos encontros em áreas abertas. Ao engajar, que seja partindo da nossa surpresa."
41180-163 = "Usemos o corredor leste, com mais cobertura."
41180-167 = "Cuidado com emboscadas e vamos para o Ponto de Reagrupamento!"