[translation]
41180-1 = "Episódio 18; Operação Trevo (2)"
41180-2 = "Argh, guhh...!"
41180-5 = "……Não dá, não parece que vai abrir."
41180-6 = "E então, já garantimos as provas, o que vocês estão fazendo?"
41180-7 = "O tempo está acabando, por que não saímos logo?"
41180-8 = "Você não ouviu? A porta não abre."
41180-9 = "……Hã? E por que você fechou ela, para começo de conversa?"
41180-10 = "Portas de cofre são trancadas automaticamente, é óbvio!"
41180-11 = "Ah, eu pensei que se a deixasse aberta, alguém poderia nos encontrar……."
41180-12 = "E olha que eu estava vigiando essa parte……."
41180-13 = "Por que você teve que ficar preocupada com isso logo agora?"
41180-14 = "De-desculpe……"
41180-16 = "Pelo menos deveria ter colocado um calço na porta ou algo assim……."
41180-17 = "Uuu, uuuu……."
41180-18 = "Eu sabia que alguém como eu não deveria ter entrado na SRT……."
41180-19 = "Sempre com medo, atrapalhando todo mundo……."
41180-20 = "Se eu não tivesse nascido, seria melhor……."
41180-21 = "Miyu, por favor, não diga isso. É compreensível que uma atiradora não esteja acostumada com operações em ambientes fechados."
41180-22 = "Na verdade, a culpa é minha por não ter considerado isso."
41180-23 = "……É mesmo?"
41180-24 = "Não tente encobrir, não há dúvidas de que foi um erro da Miyu."
41180-26 = "Não é hora de discutir de quem é a culpa, o limite de tempo está chegando, sabia?"
41180-27 = "Então o que você sugere? Como eu disse antes, quer que a gente arrombe na força bruta?"
41180-28 = "Digo, não seria mais fácil hackear como fizemos antes?"
41180-29 = "Não adianta nada destravar o bloqueio eletrônico se a porta não abre fisicamente."
41180-30 = "Ugh, quero morrer…… quero fugir……."
41180-32 = "To-todos, por favor, se acalmem……."
41180-34 = "Miyako, você não tem alguma ideia boa? Não restam nem 5 minutos!"
41180-35 = "Você é a líder do esquadrão, não é?"
41180-36 = "Miyako-chan……."
41180-41 = "Eu, eu……."
41180-42 = "Decida logo, Miyako. Não temos tempo!"
41180-43 = "Miyako!"
41180-44 = "……."
41180-50 = "(……Pensando bem, desde que deixei a SRT, todas as operações que comandei falharam)"
41180-51 = "(Tanto no parque, quanto quando o acampamento foi inundado……)"
41180-52 = "(……Eu não tenho a visão estratégica nem a capacidade de liderança do Sensei)"
41180-53 = "(Nesta situação de vida ou morte……)"
41180-54 = "(O que eu, exatamente, posso……?)"
41180-55 = "[s1] \"Miyako, acalme-se.\"\n[s2] \"Ainda não acabou.\""
41180-56 = "……Sensei."
41180-57 = "……Sensei."
41180-58 = "Nesta situação…… eu não consigo fazer nada."
41180-59 = "Se o Sensei estivesse aqui, talvez pudesse resolver, mas……."
41180-60 = "Eu sou diferente do Sensei. Não tenho esse tipo de poder."
41180-61 = "Mesmo que eu tivesse, agora eu não sei mais de nada……!"
41180-62 = "Sozinha, eu não consigo fazer nada!"
41180-63 = "Eu não consigo acreditar em mim mesma……!"
41180-64 = "[s] \"Não precisa carregar tudo sozinha.\""
41180-68 = "[ns] \"Confie em todos ao seu redor.\""
41180-69 = "……？"
41180-74 = "Você que vai fazer, não é?"
41180-75 = "O manual não menciona esse tipo de situação, então para mim é impossível."
41180-76 = "As missões são sempre assustadoras, mas..."
41180-77 = "Mas, como a Miyako-chan está aqui..."
41180-78 = "Além disso, eu não consigo fazer mais nada. Já estou sobrecarregada só com a operação."
41180-80 = "Por isso..."
41180-82 = "[s] \"Conto com você, Miyako.\""
41180-88 = "……Sim, entendido."
41180-89 = "Dando continuidade, iniciaremos a operação. Pode ser que surjam pontos questionáveis nas instruções daqui para frente, mas, por favor, siga-as sem hesitar."
41180-90 = "A situação não é boa, e enfrentaremos muitas dificuldades pela frente. Ainda assim..."
41180-91 = "Vamos dar um jeito de levar este \"Trevo\" e voltar para o nosso lugar."
41180-92 = "Entendido?"
41180-95 = "Entendido!"
41180-97 = "（Cerca de 5 minutos depois...）"
41180-102 = "Alarme!!"
41180-103 = "Mas não tem nada nas câmeras de segurança, tem?"
41180-104 = "Não deve ser só um gato de rua ou um rato?"
41180-105 = "É o alarme do depósito, como um gato entraria aqui?"
41180-106 = "Talvez tenham cavado um buraco?"
41180-118 = "Gatinho, pode sair daí. Ratos são um pouco problemáticos, mas..."
41180-121 = "……Eh?"
41180-135 = "Quando ocorre uma anomalia, o básico é presumir o pior cenário."
41180-136 = "É por causa dessa mentalidade que Kivotos nunca fica sem problemas."
41180-141 = "I-Intrusos!"
41180-153 = "Acionar o alarme de propósito... é uma estratégia bem a cara da Miyako, que não está no manual. Então é assim que ela faz eles abrirem a porta."
41180-154 = "Ainda assim, pensar que uma unidade que compartilha a responsabilidade pela segurança de Kivotos tem esse nível de treinamento... não sei se fico aliviada ou desanimada..."
41180-155 = "I-Isso vai dar certo mesmo...?"
41180-156 = "O alarme continua tocando..."
41180-161 = "Sim, as outras alunas devem estar vindo para cá uma após a outra."
41180-162 = "Não vamos nos expor em áreas de visão aberta. Basicamente, ao encontrar o inimigo, faremos isso pegando-os de surpresa."
41180-163 = "Vamos usar o corredor do lado leste, que tem mais cobertura."
41180-167 = "Cuidado com emboscadas, vamos avançar até o ORP!"
