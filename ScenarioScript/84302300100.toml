[translation]
84302300100-5 = "（ネルはデータセンターでの出来事をリオに説明した）"
84302300100-8 = "……なるほど。"
84302300100-9 = "理解したわ。お疲れ様。"
84302300100-10 = "通信機が使えなかったのは参ったぜ。"
84302300100-11 = "それでもよくやってくれたわ。やはり適任だったわね。"
84302300100-15 = "へえお前が世辞いうなんて珍しいな。"
84302300100-16 = "本心よ。"
84302300100-18 = "ふむ……流石C&Cのリーダーだね。"
84302300100-19 = "もういい。もういいって。褒めても何も出ねぇぞ？"
84302300100-20 = "実際貴女のおかげで、ミレニアムの全データの流れを追跡できるようになった。ここからは私の番ね。"
84302300100-21 = "……ところで、コユキの件は本当にこれでよかったのかしら。"
84302300100-22 = "事の顛末はセミナーに報告しておいたけれど。"
84302300100-23 = "契約を破ってしまうのでは？"
84302300100-27 = "いや？約束は守ってるからな。"
84302300100-28 = "「ユウカ先輩とノア先輩には絶対言わないでください」"
84302300100-29 = "……言ってねぇだろ？[ruby=・]あ[/ruby][ruby=・]た[/ruby][ruby=・]し[/ruby]は。"
84302300100-33 = "そうだな。[ruby=・]君[/ruby]は言っていない。"
84302300100-34 = "ネル以外が報告することについては、その阻止を契約で担保していない……というわけか。"
84302300100-35 = "ああ。コユキが捕まったら、あたしらのこともバレるかもしんねぇけど……あれで意外とすぐには捕まらねぇからな。"
84302300100-36 = "一日くらいはもつだろ。あたしらはその間に用件を済ませりゃいいだけだ。"
84302300100-37 = "ただ……。"
84302300100-43 = "お、来たな。"
84302300100-46 = "「裏切者」"
84302300100-47 = "「黒崎コユキはこのことを忘れませんからね」"
84302300100-51 = "こうなるわけだ。"
84302300100-52 = "まあ返事くらいしてやるか。"
84302300100-53 = "「あたしは……セミナーに言ってない……約束は破ってない……」"
84302300100-54 = "送信っと。"
84302300100-59 = "「せいぜい夜道には気をつけるんですよ」"
84302300100-60 = "……で、次の作戦は？"
84302300100-61 = "……作戦会議の準備をするわ。"
84302300100-62 = "（美甘ネル……） "
84302300100-63 = "（抜かりのない人物だ）"
84302300100-65 = "（敵に回したくはないな）"
