[translation]
84302300100-5 = "（Neru explicou a Rio o que aconteceu no centro de dados）"
84302300100-8 = "……Entendo."
84302300100-9 = "Compreendido. Bom trabalho."
84302300100-10 = "Foi um saco não poder usar o comunicador."
84302300100-11 = "Mesmo assim, você fez um ótimo trabalho. Como esperado, você era a pessoa certa para isso."
84302300100-15 = "Hmph, é raro ver você fazendo elogios."
84302300100-16 = "É a minha opinião sincera."
84302300100-18 = "Hum... como esperado da líder da C&C."
84302300100-19 = "Já chega. Sério, para com isso. Não vai ganhar nada me elogiando, sabia?"
84302300100-20 = "Graças a você, agora posso rastrear o fluxo de todos os dados do Millennium. Daqui em diante, é a minha vez."
84302300100-21 = "……A propósito, será que o caso da Koyuki realmente terminou bem assim?"
84302300100-22 = "Eu relatei o desfecho da situação para o Seminar, mas..."
84302300100-23 = "Você não vai quebrar o contrato?"
84302300100-27 = "Não? Eu estou cumprindo a promessa."
84302300100-28 = "“Por favor, não conte nada para a Yuuka-senpai e para a Noa-senpai”"
84302300100-29 = "……Eu não contei, né? Eu."
84302300100-33 = "É verdade. Você não contou."
84302300100-34 = "Então o contrato não garantia a prevenção de que outras pessoas, além de você, fizessem o relato... é isso?"
84302300100-35 = "É. Se a Koyuki for pega, talvez a gente acabe sendo descoberta também... mas, surpreendentemente, ela não é pega tão fácil assim."
84302300100-36 = "Deve durar pelo menos um dia. Só precisamos terminar o que temos que fazer nesse meio tempo."
84302300100-37 = "Só que..."
84302300100-43 = "Oh, chegou."
84302300100-46 = "“Traidora”"
84302300100-47 = "“A Kurosaki Koyuki não vai esquecer disso, viu”"
84302300100-51 = "É, vai acabar assim."
84302300100-52 = "Bom, acho que vou responder."
84302300100-53 = "“Eu... não contei para o Seminar... não quebrei a promessa...”"
84302300100-54 = "Enviado."
84302300100-59 = "“É melhor tomar cuidado ao andar à noite”"
84302300100-60 = "……E então, qual é a próxima missão?"
84302300100-61 = "……Vou preparar a reunião de estratégia."
84302300100-62 = "（Mikamo Neru……）"
84302300100-63 = "（Uma pessoa que não deixa passar nada）"
84302300100-65 = "（Não gostaria de tê-la como inimiga）"
