[translation]
1000806-1 = "遅刻大騒動"
1000806-2 = "ミレニアム郊外・スラム街"
1000806-3 = "……"
1000806-4 = "……。"
1000806-5 = "……。"
1000806-6 = "……聞いた？"
1000806-7 = "噂によれば……。"
1000806-8 = "[ruby=みかも]美甘[/ruby]ネル、度重なる遅刻と欠席で……。"
1000806-10 = "出席日数がもう、赤信号一歩手前らしい。"
1000806-11 = "へえ……と、いうことは……。"
1000806-12 = "これ以上遅刻や欠席をすれば留年、もしくは懲戒ってこと？"
1000806-13 = "理解が早いね。"
1000806-14 = "留年か懲戒にでもなれば……あのエージェント活動も公的に禁止されるよね？"
1000806-15 = "そう……まさにその通り。"
1000806-18 = "手段も方法も選ばない！どうにかしてネルを遅刻させる！"
1000806-20 = "ミレニアム・通学路"
1000806-21 = "よお、先生。おはよ。"
1000806-22 = "あたしの出席日数のことが心配？"
1000806-23 = "ははっ、ありがとよ。まあ、実のところあと一回遅刻したら懲戒……ってところでさ。"
1000806-24 = "ちゃんと決まった時間に家を出てるのに、なぜか遅刻するんだよな。"
1000806-25 = "今日も時間ギリギリだから、話すのは歩きながらにしようぜ。"
1000806-26 = "今日は真面目に登校しねぇとな！"
1000806-28 = "ミレニアム・通学路"
1000806-29 = "あっ、そこの先生とチビのメイドさ～ん。"
1000806-30 = "誰がチビだゴルァ！！"
1000806-31 = "（ガチャッ！）"
1000806-32 = "ひいっ！す、すみません！"
1000806-33 = "うちの店で新メニューを準備したんですが、試食をお願いしたくて……。"
1000806-34 = "へえ、試食か。まあちょうど今朝、家を出る時にちゃんと食べなかったってのはあるけど。"
1000806-35 = "先生はどうだ？"
1000806-36 = "[s] \"時間は大丈夫？\""
1000806-37 = "すげぇギリギリだけど……まあ、試食ぐらいなら……。"
1000806-38 = "……。"
1000806-39 = "……いや、いいや。こんなところで道草食ってたら……せっかくの決心が崩れる。"
1000806-40 = "悪いけど、今日はパス。"
1000806-41 = "さあ、行こうぜ。先生。"
1000806-43 = "……。"
1000806-44 = "ちっ！試食の中に下剤を入れておいたのに、引っ掛からないとは！"
1000806-45 = "次の手段だ！"
1000806-47 = "いらっしゃいませ！オープン特価イベントです！"
1000806-48 = "被るだけでものすごく強く見えるリーゼントウィッグが、今から5分間！90%オフの激安セール！！"
1000806-49 = "……。"
1000806-52 = "（や、やべぇ！リーゼントのウィッグだと？めちゃくちゃカッコいいじゃねぇか！）"
1000806-53 = "（しかも90%オフ？よく分かんねぇけど、すげぇ安いってことだよな？）"
1000806-56 = "さあ、そこのお客さん！このウィッグ、いかがですか？#nお客さんにとてもお似合いだと思いますよ！！"
1000806-57 = "そ、そうか……？"
1000806-58 = "被るだけで根性が溢れ出る、この最新の流行アイテム！お店の中には、長さ別で色んな種類があります！#n1メートルのものもありますよ！"
1000806-59 = "い、1メートル……。"
1000806-60 = "さあ、どうぞ中へ。いらっしゃいませ！このチャンスをお見逃しなく！"
1000806-61 = "うぅ……。"
1000806-62 = "[s] \"時間は大丈夫？\""
1000806-63 = "だ、大丈夫じゃねぇ！く、ぐううっ……！"
1000806-64 = "……パス！早く行くぞ、先生！！"
1000806-66 = "……。"
1000806-67 = "何故だ、何故中に入らないんだ？罠を用意していたというのに……。"
1000806-68 = "なかなか引っかからないな、次の手段に移ろう。"
1000806-70 = "……。"
1000806-71 = "[s] \"残念そうだね。\""
1000806-72 = "……なあ。あそこの店員、さっき試食を勧めてたヤツじゃね？"
1000806-73 = "[s1] \"そう？\"\n[s2] \"みんな似た顔だから分からない。\""
1000806-74 = "ふーん……なんかおかしいな。"
1000806-75 = "ふーん……なんかおかしいな。"
1000806-77 = "これからどうする？"
1000806-78 = "こうなったら、武装して突撃する。次の路地で襲撃！"
1000806-79 = "特攻？あのネルを相手に？#nあまり気分が乗らないな……。"
1000806-80 = "心配するな、私たちの目標はネルを倒すことじゃない。何とかして時間を稼ぐことだ！#n計算通りならネルの奴は1分後に、次の路地に到着するはずだ。"
1000806-81 = "そこで15分、やつを足止めできれば、ネルは確実に遅刻する！"
1000806-82 = "なるほど……そういうことなら、やってみるのもアリか。"
1000806-83 = "絶対に成功させる！"
1000806-84 = "（タッタッタッ）"
1000806-85 = "ちょっと、先生！遅れるぞ！もっと早く走れ！"
1000806-86 = "さあ、もうすぐ到着する。"
1000806-87 = "行こう！！襲撃！"
1000806-89 = "（バッ！）"
1000806-91 = "美甘ネル、覚悟！！"
1000806-92 = "これまでよくも私たちの邪魔を……あれ？いない？！"
1000806-93 = "さ、さっきまでここにいたのに……。"
1000806-95 = "やっぱりそうか。"
1000806-97 = "え、うわっ！？"
1000806-98 = "どっかで見たことある奴らだなと思ったら、この前あたしらにやられた不良どもだな？"
1000806-99 = "あたしを遅刻させようとこそこそ企んでたわけか。"
1000806-102 = "覚悟してもらおうか。"
1000806-104 = "ひ、ひいっ！？"
1000806-106 = "（ドカアアァァァァッン！）"
1000806-108 = "ミレニアム本校舎・廊下"
1000806-109 = "ふぅ……。"
1000806-110 = "なんとかセーフか。ったく、登校するだけでこんな目に遭うとか。"
1000806-111 = "[s] \"慌ただしい登校だったね。\""
1000806-112 = "ははっ、そうだな。"
1000806-113 = "これから遅刻には少し気を付けなきゃな。"
1000806-114 = "一緒に登校してくれてありがとよ、先生。"
1000806-115 = "じゃ、また後でな！"
1000806-118 = "ネルは風のようなスピードで、教室の方へ消えていった。"
