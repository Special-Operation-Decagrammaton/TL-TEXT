[translation]
2005506-1 = "A Salvação do Mundo e a Gamer"
2005506-2 = "Departamento de Desenvolvimento de Jogos - Sala do Clube"
2005506-3 = "N-não, não é nada disso."
2005506-4 = "……."
2005506-5 = "Ah, muito obrigada, pessoal."
2005506-6 = "[ns] \"Yuzu?\""
2005506-7 = "Ah... essa voz é..."
2005506-12 = "P-Sensei? Desde quando você está aí!?"
2005506-13 = "Uuu...!"
2005506-14 = "[s1] \"Você estava jogando um jogo de VR, né?\"\n[s2] \"Sobre o que vocês estavam conversando agora pouco?\""
2005506-17 = "Eh? Ah, bem..."
2005506-18 = "...As pessoas dentro do jogo estavam me agradecendo."
2005506-19 = "Agradecendo por eu ter salvado o mundo delas."
2005506-20 = "[s] \"Então você salvou este mundo!\""
2005506-21 = "S-salvar, eu não diria tanto...!"
2005506-22 = "M-mas, pela primeira vez em muito tempo, senti uma sensação de dever cumprido... ou talvez orgulho."
2005506-23 = "Eu não sou boa em nada além de jogos, e na vida real não consigo ajudar ninguém..."
2005506-24 = "Mas dentro do jogo, eu consigo salvar o mundo assim..."
2005506-25 = "Claro, é só um jogo, então..."
2005506-26 = "Talvez não tenha um significado tão profundo assim..."
2005506-27 = "[s] \"Mas, não existe motivo para dizer que o jogo não é real, certo?\""
2005506-28 = "Eh? O que... como assim...?"
2005506-29 = "...O tempo que passamos vivenciando algo é, em si, a realidade, é isso?"
2005506-30 = "……."
2005506-31 = "É verdade. Mesmo que o mundo do jogo seja virtual..."
2005506-32 = "As emoções, as experiências e a sensação de conquista que senti lá..."
2005506-33 = "Podem, de fato, ser reais."
2005506-34 = "[s3] \"Os jogos que você e o clube vão criar daqui para frente...\"\n[s4] \"Também terão esse mesmo significado para alguém.\""
2005506-37 = "Esse significado... para alguém..."
2005506-38 = "……."
2005506-39 = "A-ah, Sensei."
2005506-40 = "O mundo que eu protegi... você gostaria de vê-lo comigo?"
2005506-42 = "(Não há um único motivo para recusar)"
2005506-43 = "(Coloquei o equipamento de VR que Yuzu me entregou e entramos juntos no mundo do jogo)"
2005506-47 = "[wa:3200]― [log=유즈 결전]Por favor, veja, [wa:1430]Sensei.[/log]"
2005506-49 = "― [log=유즈 결전]Este é o [wa:1150]mundo que eu protegi.[/log]"
2005506-52 = "[wa:1700]― [log=유즈 결전]...Claro, [wa:950]eu entendo.[/log]"
2005506-54 = "― [log=유즈 결전]Que eu não fui a única [wa:820]a ver [wa:1650]esta cena, [wa:1200]Sensei.[/log]"
2005506-57 = "[wa:810]― [log=유즈 결전]Na época do torneio, [wa:2090]você disse [wa:1060]algo assim, não disse?[/log]"
2005506-59 = "― [log=유즈 결전]Que este momento, [wa:2560]que o jogo, [wa:1840]é a nossa realidade [wa:1910]agora.[/log]"
2005506-62 = "[wa:780]― [log=유즈 결전]Por isso, [wa:2330]mesmo que seja um mundo [wa:1030]com um final já definido...[/wa:830]"
2005506-64 = "― [log=유즈 결전]Mesmo que todos neste mundo [wa:650]sigam o mesmo cenário...[/wa:1570]"
2005506-67 = "[wa:890]― [log=유즈 결전]As escolhas que fiz, [wa:2840]e estes [wa:370]sentimentos...[/log]"
2005506-69 = "― [log=유즈 결전]São, sem dúvida, [wa:2670]reais.[/log]"
2005506-72 = "[ns] \"Falando nisso Yuzu, você gostou dessa roupa, né?\""
2005506-73 = "Eh? Roupa...?"
2005506-74 = "A-ahhh...!?"
2005506-75 = "N-n-não é nada disso...! #nIsso é...!"
2005506-76 = "É só porque é adequada para este jogo...!"
2005506-77 = "S-sério, é só por isso!"
2005506-78 = "Para salvar o mundo, não posso ser exigente quanto aos meios...!"
2005506-79 = "[ns] (Sorri satisfeita)"
2005506-80 = "N-não ria de mim...!"
2005506-82 = "(Depois disso, passei um tempo explorando o mundo que se tornou pacífico junto com a Yuzu)"
