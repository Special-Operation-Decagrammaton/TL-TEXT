[translation]
10046250-3 = "あの～"
10046250-4 = "このビーチを管理されてる方……ですか？"
10046250-5 = "管理……まあ、そんな感じっすね。"
10046250-6 = "何か用っすか？"
10046250-7 = "はじめまして。#n私は「百夜堂」の看板娘兼オーナーの[ruby=かわわ]河和[/ruby]シズコといいます。"
10046250-8 = "ああ、百鬼夜行の有名店っすね……#nたしか、このビーチで海の家をやるんでしたっけ。"
10046250-9 = "はい！#nあわせて、お祭りを開催する許可をいただいたのですが……ちょっと問題が……。"
10046250-10 = "……ん？"
10046250-11 = "お祭りの開催は、お祭り運営委員会の管轄じゃないっすか？"
10046250-12 = "こ、こほん……！#n実は私、そっちの委員長も兼任しておりまして。"
10046250-13 = "あっ、そうなんすか！？失礼しました。"
10046250-14 = "でもすごいっすね。#n有名店のオーナーでありながら、百鬼夜行のお祭りまで管理するなんて……。"
10046250-15 = "えっへん！"
10046250-16 = "……じゃなくて！#nこ、これくらい大したことありませんよ～"
10046250-17 = "それより！お祭りのことなのですが――"
10046250-25 = "全っ然！開催できる状況じゃなかったんです！"
10046250-26 = "ティーパーティー所有のプライベートビーチを、初めて一般公開したんですよね！？"
10046250-27 = "もっとエレガントでセレブな客が集まるんじゃ……！"
10046250-31 = "あっ、い、いえ……もう少し、こう……#n治安が良い場所だと思ってたんですけど……。"
10046250-32 = "このままでは、お祭りどころか商売すら怪しくて……。"
10046250-33 = "あはは……その……。"
10046250-34 = "申し訳ないっす。#n私一人だと、どうしても手が回らなくって。"
10046250-35 = "なるほど、なるほど……。#n警備の人手が足りない感じなんですね？"
10046250-36 = "お恥ずかしながら……。"
10046250-37 = "……よっし。"
10046250-38 = "ではこうしましょう。私もビーチの管理を手伝います。"
10046250-39 = "はい？いえ、その必要は――"
10046250-40 = "あるんです！！"
10046250-41 = "ここまでの資材運搬費に、店の準備に掛かった費用まで考えると……！"
10046250-42 = "もう大赤字ですから！大・赤・字！"
10046250-43 = "……。"
10046250-44 = "……あっ！#nみ、みんなが楽しく遊べるような環境にしたいなぁ～と……。"
10046250-50 = "……。"
10046250-51 = "……。"
10046250-52 = "そういうことにしておいてください！"
10046250-53 = "あ、はい。"
