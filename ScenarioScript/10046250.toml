[translation]
10046250-3 = "Com licença..."
10046250-4 = "Você é a pessoa responsável por administrar esta praia...?"
10046250-5 = "Administrar... bem, algo assim."
10046250-6 = "Precisa de alguma coisa?"
10046250-7 = "Muito prazer. #nEu sou a Kawawa Shizuko, a garota-propaganda e proprietária da 'Hyakkiyako'."
10046250-8 = "Ah, a loja famosa de Hyakkiyako, né... #nSe não me engano, vocês iam abrir uma barraca de praia aqui, certo?"
10046250-9 = "Sim! #nAlém disso, recebemos permissão para realizar um festival, mas... estamos com um pequeno problema..."
10046250-10 = "......Hm?"
10046250-11 = "A realização de festivais não é responsabilidade do Comitê Organizador de Festivais?"
10046250-12 = "Co-cof...! #nNa verdade, eu também acumulo o cargo de presidente desse comitê."
10046250-13 = "Ah, é mesmo!? Peço desculpas."
10046250-14 = "Mas isso é impressionante. #nSer proprietária de uma loja famosa e ainda administrar os festivais de Hyakkiyako..."
10046250-15 = "Ehem!"
10046250-16 = "...Não é isso! #nI-isso não é nada demais~"
10046250-17 = "Mas mudando de assunto! Sobre o festival――"
10046250-25 = "Não está nada, absolutamente nada pronto para ser realizado!"
10046250-26 = "Esta é a primeira vez que uma praia privada do Tea Party é aberta ao público, não é!?"
10046250-27 = "Eu esperava que clientes mais elegantes e sofisticados viessem...!"
10046250-31 = "Ah, n-não... é que... #nEu achei que este fosse um lugar um pouco mais... seguro..."
10046250-32 = "Desse jeito, não só o festival, mas o próprio negócio está em risco..."
10046250-33 = "Ahaha... bem..."
10046250-34 = "Sinto muito. #nSozinha, eu simplesmente não dou conta de tudo."
10046250-35 = "Entendo, entendo... #nEntão o problema é a falta de pessoal para a segurança?"
10046250-36 = "É vergonhoso admitir, mas..."
10046250-37 = "......Muito bem."
10046250-38 = "Então vamos fazer o seguinte. Eu também vou ajudar a administrar a praia."
10046250-39 = "Sim? Não, não há necessidade disso――"
10046250-40 = "Há, sim!!"
10046250-41 = "Se eu considerar os custos de transporte de materiais até aqui e as despesas com a preparação da loja...!"
10046250-42 = "Eu já estou no prejuízo total! Prejuízo total!"
10046250-43 = "......"
10046250-44 = "......Ah! #nÉ que eu quero criar um ambiente onde todos possam se divertir, sabe..."
10046250-50 = "......"
10046250-51 = "......"
10046250-52 = "Vamos deixar por isso mesmo!"
10046250-53 = "Ah, sim."
