[translation]
10047020-1 = "第2話;夢と希望のワンダーランド"
10047020-2 = "（ツムギにワイルドハントを案内してもらう日になった）"
10047020-5 = "この長いトンネル……ラビット・ホールのようですね。"
10047020-6 = "やはり、バニーガールの格好をするべきでしたか……。"
10047020-7 = "ふっ……冗談です。#n私も時と場所は選びますよ。"
10047020-8 = "[s] \"つ、つまり条件が揃ったら……？\""
10047020-9 = "それは……どうでしょうね。"
10047020-10 = "ふふっ、今は旅を楽しみましょう。#n――出会いの予感に胸を躍らせながら。"
10047020-15 = "こちらへ。すぐそこですよ。"
10047020-20 = "[ns] \"ここは……？\" "
10047020-21 = "検問のご協力、お願いします。"
10047020-22 = "[s] \"け、検問？\""
10047020-23 = "ワイルドハントは、物品の持ち込みに少々厳しいのです。"
10047020-24 = "ですが、先生の持ち物ならば、引っかかるようなものもないでしょう。"
10047020-29 = "……特に問題はありませんね。#nどうぞお進みください。"
10047020-33 = "ふふっ、では行きましょうか。"
10047020-34 = "[s] \"ワイルドハントは、校則がしっかりしてるんだね。\""
10047020-35 = "芸術は爆発、という言葉を一度は聞いたことがあると思います。"
10047020-36 = "かつて、「それを実践してみせる！」と、物理的に爆発事故を起こした方がおりまして……。"
10047020-37 = "また、とある音楽科の生徒は、高出力の拡声器を持ち込み――"
10047020-38 = "学院中の窓ガラスを粉々にしてしまいました。"
10047020-39 = "[s1] \"たしかに検問は必要かもね。\"\n[s2] \"情熱があるのはいいことだけど……。\""
10047020-42 = "ふふ、芸術は爆発……ですからね。"
10047020-43 = "では、行きましょう。"
10047020-48 = "（しばらく歩くと……）"
10047020-53 = "さあ、先生。ようこそおいでくださいました。"
10047020-54 = "ご紹介します。#nここが、芸術の[ruby=ふるさと]故郷[/ruby]――"
10047020-59 = "「ワイルドハント芸術学院」です。"
10047020-60 = "[ns] \"綺麗なところだね！\""
10047020-62 = "まさに、芸術家の、芸術家による、芸術家のための学院。"
10047020-63 = "三大学園ほどの規模はありませんが、#n歴史はトリニティやゲヘナに引けを取りません。"
10047020-64 = "学院の生徒は、厳しく管理された寮生活をしながら、#n日夜その腕を磨いているのです。"
10047020-69 = "（少し遠くから、言い争う声が飛び込んできた）"
10047020-71 = "は？時代遅れ？#n私の作品が古臭いって言うのかよ！？"
10047020-72 = "そんなこと言ってないけど～？#n耳にまで埃詰まってるんじゃない？"
10047020-76 = "ちっ……こうなったら！"
10047020-77 = "勝負だ！！"
10047020-84 = "……時には、見解の相違から衝突に至ることもしばしば。"
10047020-85 = "[s] \"物理的に衝突してるけど！？\""
10047020-86 = "芸術とは、勝ち取るものですから。"
10047020-87 = "それでは、寮の方へ向かいましょう。"
10047020-98 = "[ns] \"これが芸術家達の日常……。\""
10047020-100 = "ワイルドハント寮の廊下"
10047020-102 = "この廊下の先に、私たちの部屋があります。"
10047020-103 = "[s] \"ツムギの部屋は……。\""
10047020-107 = "[ns3] \"童話の世界みたいな雰囲気かな？\"\n[ns4] \"それとも、デスメタルな感じ？\""
10047020-110 = "ふふ、ご想像にお任せします。"
10047020-111 = "私たちの部屋は、第4寮の404号室……。"
10047020-112 = "「4」は「死」と響きが同じことから、#n不吉と見なされますが――"
10047020-113 = "個人的にはすごく気に入っているんです……ふふっ。"
10047020-114 = "[s] \"「人間の死が社会の福祉」って歌ってたね……！\""
10047020-115 = "あら、先生にとっても印象的な歌詞だったのですね。"
10047020-116 = "あれは……あくまで社会批判。#n言葉通りの意味では、受け取らないでくださいね？"
10047020-117 = "それはともかく、一般的には避けられている数字ですから。#n私たちは別の呼び方をしているのですが――"
10047020-121 = "さあ、着きましたよ。"
10047020-125 = "どうぞ、こちらが私たちの部屋です。"
10047020-126 = "[ns] \"おお……なんだか神秘的な雰囲気。\""
10047020-132 = "イヒッ……イヒヒッ……。"
10047020-133 = "ようこそいらっしゃいました――アルカナに導かれし者よ。"
10047020-138 = "私も……運命を感じてたよぉ。"
10047020-139 = "ちょっと！初対面なのよ！？#nまずは普通に挨拶でしょ！"
10047020-140 = "ですが、「雰囲気のある挨拶をしたほうがいい」と占いで……。"
10047020-141 = "エリちゃんの占いは……誰よりも正確だからねぇ。"
10047020-142 = "はぁ……ごめんなさい。#nまともなの、私だけで……。"
10047020-147 = "では、紹介しますね。"
10047020-148 = "こちらはみんなのお姉さん、カノエ先輩。"
10047020-153 = "ムギちゃんから話は聞いてるよ……よろしくねぇ……。"
10047020-154 = "ニャーオ……ンニャーオォ！"
10047020-155 = "ガァッ！ガァァッ！"
10047020-157 = "[ns] \"こ、個性的なペットだね？\""
10047020-158 = "また入ってきちゃったの……。"
10047020-159 = "そのうち居なくなるから、気にしないでぇ。"
10047020-160 = "[ns] \"そうなんだ……。\""
10047020-165 = "そしてこちらが、同級生のエリです。"
10047020-170 = "先生は……「魔法」って存在すると思いますか？"
10047020-171 = "[s] \"色んな驚きの連続を「魔法」と呼ぶなら……？\""
10047020-172 = "やっぱり！先生は「こちら側」だと思っていました。"
10047020-173 = "これからは「マスター」と呼ばせていただきます！"
10047020-174 = "この巡り合い……まさに魔力の導きですね……！"
10047020-175 = "[ns] \"私はマスターだったんだ……。\""
10047020-180 = "そして、こちらは末っ子のレナちゃん。"
10047020-185 = "先生、今ならまだ間に合うよ！早く逃げて！"
10047020-186 = "私は仕方なく捕まってるけど……#n先生ならきっと逃げられる……！"
10047020-187 = "[s] \"仕方なく……捕まってる……の？\""
10047020-189 = "ふふっ、冗談ですよ。#nご覧の通り元気いっぱいで、大事な友人です。"
10047020-190 = "最後に私、椎名ツムギ……可愛いみんなに囲まれた白雪姫です。 "
10047020-191 = "[s5] \"……眠れる森の姫じゃなくて？\"\n[s6] \"……不思議の国のウサギじゃなかった？\""
10047020-194 = "その気になれば、誰にでもなり得るのが私。#nこと芸術では――"
10047020-199 = "――「ペルソナ」。"
10047020-200 = "……は大事ですから！"
10047020-202 = "[ns] \"なるほど……。\""
10047020-203 = "ほら！分かったでしょ？みんな普通じゃないんだよ！"
10047020-204 = "イヒッ……#nワイルドハントの「普通」って、なんだろうねぇ……？"
10047020-205 = "本当はレナちゃんも、私たちといるのが楽しいんですよね？"
10047020-206 = "誰！が！楽しんでるって……！？"
10047020-210 = "いつか全部インチキだって、証明してやるんだから！"
10047020-211 = "[s] \"インチキ？何が？\""
10047020-212 = "前にお話しした通り、ワイルドハントに公式の部活はありません。"
10047020-213 = "しかし、専攻以外の趣味も、やはり必要です。"
10047020-214 = "創作意欲は……無限だからねぇ……。"
10047020-218 = "ええ！それで私がみんなの趣味をまとめて……#n非公認の部活を作ったんです！"
10047020-219 = "芸術史を辿り――#nオカルトがいかに貢献してきたかを研究する会――"
10047020-223 = "オカルト研究会！略して「オカ研」！"
10047020-227 = "[ns7] \"オカ……研？\"\n[ns8] \"だから、不思議な雰囲気の部屋だったんだね。\""
10047020-230 = "では、改めて自己紹介をいたしましょう。"
10047020-231 = "私は[ruby=しらお]白尾[/ruby]エリ。専攻は絵画！"
10047020-232 = "オカ研の初代会長にして、魔法を研究する……#n現代最後の魔法使いです！"
10047020-233 = "[ruby=しいな]椎名[/ruby]ツムギ。#n実用音楽専攻、オカルト研究会の副会長を務めております。"
10047020-234 = "参加した理由は……デスメタルで悪魔を召喚できるのか確かめてみたくて。"
10047020-235 = "……[ruby=いたがき]板垣[/ruby]カノエ。専攻は……秘密。"
10047020-236 = "分からないことがあれば、気軽に聞いて。#n何でも……教えてあげる。"
10047020-238 = "な・ん・で・も……ねぇ。イヒヒッ……。"
10047020-239 = "ニャーオ……ンニャーオォ！"
10047020-240 = "ガァ！ガァァッ！"
10047020-244 = "ね？ヘンテコ集団でしょ！？#n今なら間に合うから、早く逃げて！！"
10047020-245 = "自分のことをまともだと信じているあの子は、[ruby=きぬい]衣斐[/ruby]レナ……。"
10047020-246 = "アクセサリーのセンスは変わってるけど……#n実は、ファッションデザイン専攻。"
10047020-247 = "変なのはカノエ先輩の目玉ヘアピンでしょ！"
10047020-248 = "はぁ……。#nみんな、オカルトなんて信じちゃってさ。バカげてるよ。"
10047020-249 = "オカルトは本当に[ruby=あ]在[/ruby]るんですよ！#n目撃談も、ほら！"
10047020-250 = "D.U.近郊の海域に突如出現したペロロ型の巨大怪獣……！"
10047020-251 = "閉鎖された遊園地で……踊り狂う人形たち……イヒッ。"
10047020-252 = "怪しげな本から、怪異が飛び出すという噂も……。"
10047020-253 = "[s] \"それはまた別の話のような……。\""
10047020-258 = "[ns] \"でも、寮生活を楽しんでるんだね。\""
10047020-259 = "寮に限らず、この学院は本当に素敵なところです！"
10047020-260 = "……というわけで、早速学院を見て回りましょうか？"
10047020-264 = "「芸術」に隠されしオカルトを！共に！研究していくのです！"
10047020-269 = "[ns] \"うん、よろしくね！\""
10047020-272 = "……はぁ、もう知らないっ。私は言ったからね？"
10047020-273 = "決まりですね！"
10047020-274 = "それでは、みんなで行きましょうか。"
10047020-275 = "ちょっと、どこに行くか決めてるの？"
10047020-276 = "もちろんです。マスターが来る前から、こうなる[ruby=さだめ]運命[/ruby]でしたから。"
10047020-277 = "最初は、私おすすめの「あそこ」へ……。"
10047020-278 = "ふふ、素敵な場所ですよね。"
10047020-279 = "もしかして……！？"
10047020-280 = "イヒッ……正解ぃ。"
10047020-281 = "……お願いだから、問題起こさないでよね。"
10047020-283 = "（こうしてワイルドハント巡りが始まった）"
