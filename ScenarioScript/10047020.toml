[translation]
10047020-1 = "Episódio 2: O País das Maravilhas dos Sonhos e Esperanças"
10047020-2 = "（Chegou o dia em que Tsumugi me levaria para conhecer Wildhunt）"
10047020-5 = "Este túnel longo... parece uma toca de coelho, não é?"
10047020-6 = "Será que eu deveria ter vindo vestida de coelhinha...?"
10047020-7 = "Pff... é brincadeira. #nEu também sei escolher a hora e o lugar."
10047020-8 = "[s] \"E-então, se as condições forem atendidas...?\""
10047020-9 = "Isso é... quem sabe?"
10047020-10 = "Fufu, vamos aproveitar a jornada por enquanto. #n――Enquanto meu coração palpita com a premonição de um encontro."
10047020-15 = "Por aqui. É logo ali."
10047020-20 = "[ns] \"Onde estamos...?\" "
10047020-21 = "Por favor, colabore com a inspeção."
10047020-22 = "[s] \"I-inspeção?\""
10047020-23 = "Wildhunt é um pouco rigorosa quanto à entrada de objetos."
10047020-24 = "Mas, sendo pertences do Sensei, não deve haver nada que cause problemas."
10047020-29 = "...Não há problemas. #nPor favor, pode prosseguir."
10047020-33 = "Fufu, então vamos lá."
10047020-34 = "[s] \"Wildhunt tem regras escolares bem rígidas, hein.\""
10047020-35 = "Acho que você já deve ter ouvido a frase: 'A arte é uma explosão'."
10047020-36 = "Antigamente, alguém disse: 'Vou colocar isso em prática!' e acabou causando um acidente de explosão física..."
10047020-37 = "Além disso, uma aluna do curso de música trouxe um megafone de alta potência e—"
10047020-38 = "acabou estilhaçando todas as janelas da academia."
10047020-39 = "[s1] \"Realmente, a inspeção pode ser necessária.\"\n[s2] \"É bom ter paixão, mas...\""
10047020-42 = "Fufu, afinal, a arte é uma explosão... não é?"
10047020-43 = "Então, vamos."
10047020-48 = "（Depois de caminhar um pouco...）"
10047020-53 = "Muito bem, Sensei. Seja muito bem-vindo."
10047020-54 = "Deixe-me apresentar. #nEste é o lar da arte—"
10047020-59 = "a 'Academia de Artes Wildhunt'."
10047020-60 = "[ns] \"Que lugar lindo!\""
10047020-62 = "É, literalmente, uma academia dos artistas, pelos artistas e para os artistas."
10047020-63 = "Não tem a mesma escala das três grandes academias, #nmas sua história não perde em nada para Trinity ou Gehenna."
10047020-64 = "As alunas da academia vivem em dormitórios rigorosamente controlados, #nenquanto aprimoram suas habilidades dia e noite."
10047020-69 = "（De um pouco longe, vozes de uma discussão chegaram até nós）"
10047020-71 = "Hã? Ultrapassado? #nVocê está dizendo que meu trabalho é antiquado!?"
10047020-72 = "Eu não disse isso~? #nSerá que você está com poeira até nos ouvidos?"
10047020-76 = "Tsc... já que é assim!"
10047020-77 = "É um duelo!!"
10047020-84 = "...Às vezes, divergências de opinião levam a conflitos como este."
10047020-85 = "[s] \"Mas eles estão entrando em conflito físico!?\""
10047020-86 = "Porque a arte é algo que se conquista."
10047020-87 = "Bem, vamos seguir para o dormitório."
10047020-98 = "[ns] \"Então esse é o cotidiano dos artistas...\""
10047020-100 = "Corredor do dormitório de Wildhunt"
10047020-102 = "Nosso quarto fica no final deste corredor."
10047020-103 = "[s] \"O quarto da Tsumugi é...\""
10047020-107 = "[ns3] \"Tem uma atmosfera de conto de fadas?\"\n[ns4] \"Ou talvez algo mais estilo death metal?\""
10047020-110 = "Fufu, deixarei que você imagine."
10047020-111 = "Nosso quarto é o 404, no 4º dormitório..."
10047020-112 = "Como o número '4' soa como 'morte', #né considerado um presságio ruim, mas—"
10047020-113 = "pessoalmente, eu gosto muito dele... fufu."
10047020-114 = "[s] \"'A morte humana é o bem-estar da sociedade', você cantou isso, não foi...?!\""
10047020-115 = "Ora, parece que foi uma letra marcante para o Sensei também."
10047020-116 = "Aquilo é... puramente uma crítica social. #nPor favor, não leve ao pé da letra, está bem?"
10047020-117 = "De qualquer forma, é um número geralmente evitado. #nNós o chamamos de outra forma, mas..."
10047020-121 = "Pronto, chegamos."
10047020-125 = "Por favor, esta é a nossa sala."
10047020-126 = "[ns] \"Uau... que atmosfera misteriosa.\""
10047020-132 = "Ihi... ihihi..."
10047020-133 = "Seja bem-vindo — ó, aquele guiado pelos arcanos."
10047020-138 = "Eu também... senti o destino..."
10047020-139 = "Ei! É a primeira vez que nos vemos, sabia!? #nPrimeiro, cumprimente normalmente!"
10047020-140 = "Mas, a adivinhação disse que 'é melhor fazer uma saudação com atmosfera'..."
10047020-141 = "A adivinhação da Eri... é mais precisa do que a de qualquer um."
10047020-142 = "Ah... me desculpem. #nA única pessoa sensata aqui sou eu..."
10047020-147 = "Bem, vou apresentá-las."
10047020-148 = "Esta é a irmã mais velha de todas, Kanoe-senpai."
10047020-153 = "Ouvi falar de você pela Mugi-chan... prazer em conhecê-lo..."
10047020-154 = "Miau... nnyauuu!"
10047020-155 = "Grrr! Grrrr!"
10047020-157 = "[ns] \"Q-que animal de estimação peculiar, não é?\""
10047020-158 = "Ele entrou de novo..."
10047020-159 = "Ele vai embora logo, não se preocupe."
10047020-160 = "[ns] \"Entendi...\""
10047020-165 = "E esta é a minha colega de classe, Eri."
10047020-170 = "Sensei... você acredita que a 'magia' existe?"
10047020-171 = "[s] \"Se chamarmos uma sucessão de surpresas de 'magia'...?\""
10047020-172 = "Eu sabia! Eu achava que o Sensei era do 'nosso lado'."
10047020-173 = "De agora em diante, vou chamá-lo de 'Mestre'!"
10047020-174 = "Este encontro... é realmente guiado pela magia...!"
10047020-175 = "[ns] \"Então eu era um mestre...\""
10047020-180 = "E esta é a caçula, Rena-chan."
10047020-185 = "Sensei, ainda dá tempo! Fuja logo!"
10047020-186 = "Eu estou presa aqui contra a minha vontade, mas... #nO Sensei com certeza consegue fugir...!"
10047020-187 = "[s] \"Contra a sua vontade... presa...?\""
10047020-189 = "Fufu, é brincadeira. #nComo pode ver, ela é cheia de energia e uma amiga muito importante."
10047020-190 = "Por último, eu, Shiina Tsumugi... a Branca de Neve cercada por todas essas fofas."
10047020-191 = "[s5] \"...Não seria a Bela Adormecida?\"\n[s6] \"...Não seria o Coelho do País das Maravilhas?\""
10047020-194 = "Se eu quiser, posso ser qualquer pessoa. #nEspecialmente na arte —"
10047020-199 = "— 'Persona'."
10047020-200 = "...é algo muito importante!"
10047020-202 = "[ns] \"Entendo...\""
10047020-203 = "Viu! Entendeu agora? Ninguém aqui é normal!"
10047020-204 = "Ihi... #no que será que é o 'normal' da Wild Hunt...?"
10047020-205 = "Na verdade, a Rena-chan também se diverte estando conosco, não é?"
10047020-206 = "Quem! Disse! Que eu estou me divertindo...!?"
10047020-210 = "Um dia eu vou provar que tudo isso é uma farsa!"
10047020-211 = "[s] \"Farsa? O que é?\""
10047020-212 = "Como mencionei antes, a Wild Hunt não possui um clube oficial."
10047020-213 = "No entanto, hobbies além da especialização também são necessários."
10047020-214 = "O desejo de criar... é infinito..."
10047020-218 = "Sim! Então eu reuni os hobbies de todo mundo e...#nCriei um clube não oficial!"
10047020-219 = "Um grupo para pesquisar a história da arte e...#no quanto o ocultismo contribuiu para ela—"
10047020-223 = "O Clube de Pesquisa de Ocultismo! Ou, abreviando, 'Oculto-Ken'!"
10047020-227 = "[ns7] \"Oculto... Ken?\"\n[ns8] \"Então é por isso que a sala tinha uma atmosfera estranha.\""
10047020-230 = "Bem, vamos nos apresentar formalmente."
10047020-231 = "Eu sou Eri Shirao. Minha especialidade é pintura!"
10047020-232 = "Como a primeira presidente do Oculto-Ken, eu estudo magia...#nsou a última maga da era moderna!"
10047020-233 = "Tsumugi Shiina.#nEspecialista em música prática, atuo como vice-presidente do Clube de Pesquisa de Ocultismo."
10047020-234 = "O motivo de eu ter entrado foi... porque queria verificar se é possível invocar demônios com death metal."
10047020-235 = "...Kanoe Itagaki. Minha especialidade é... segredo."
10047020-236 = "Se tiver algo que não entenda, pode perguntar sem medo.#nEu te ensino... qualquer coisa."
10047020-238 = "Qual-quer... coisa, é? Ihihi..."
10047020-239 = "Miau... Nmiaaau!"
10047020-240 = "Gaa! Gaaaa!"
10047020-244 = "Viu? É um grupo bem esquisito, né!?#nAinda dá tempo, fuja enquanto pode!!"
10047020-245 = "Aquela ali, que acredita ser uma pessoa normal, é a Rena Kinui..."
10047020-246 = "O gosto dela para acessórios é bem peculiar, mas...#nna verdade, ela é especialista em design de moda."
10047020-247 = "O que é estranho mesmo é o grampo de olho da Kanoe-senpai!"
10047020-248 = "Ah...#nTodo mundo aqui acredita em ocultismo. É um absurdo."
10047020-249 = "O ocultismo realmente existe!#nOlha só, até temos relatos de testemunhas!"
10047020-250 = "Um monstro gigante em forma de Peroro que apareceu de repente nas águas perto de D.U...!"
10047020-251 = "Bonecos dançando freneticamente em um parque de diversões abandonado... Ihi."
10047020-252 = "E há rumores de que aparições saltam de livros suspeitos..."
10047020-253 = "[s] \"Isso parece ser uma história completamente diferente...\""
10047020-258 = "[ns] \"Mas parece que vocês estão aproveitando a vida no dormitório.\""
10047020-259 = "Não só no dormitório, esta academia é um lugar realmente maravilhoso!"
10047020-260 = "...Sendo assim, que tal darmos uma volta pela academia agora?"
10047020-264 = "Vamos pesquisar juntos o ocultismo escondido na 'arte'!"
10047020-269 = "[ns] \"Certo, conto com vocês!\""
10047020-272 = "...Ah, quer saber, desisto. Eu avisei, viu?"
10047020-273 = "Está decidido!"
10047020-274 = "Então, vamos todos juntos."
10047020-275 = "Ei, vocês já decidiram para onde vamos?"
10047020-276 = "Com certeza. Desde antes de o Mestre chegar, esse era o destino."
10047020-277 = "Primeiro, vamos para aquele lugar que eu recomendo..."
10047020-278 = "Fufu, é um lugar maravilhoso, não é?"
10047020-279 = "Será que é...!?"
10047020-280 = "Ihi... Acertou."
10047020-281 = "...Por favor, não causem problemas."
10047020-283 = "(Assim começou o tour por Wildhunt)"
