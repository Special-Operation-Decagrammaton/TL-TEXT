[translation]
200003-1 = "Эпизод 3;Странный сон"
200003-4 = "«Это история о \"вас\", Сенсее из Шале, и об \"умных часах\".»"
200003-5 = "«Ваш образ жизни сложно назвать упорядоченным, но вы всё равно изо всех сил старались проснуться пораньше.»"
200003-6 = "«Умные часы на прикроватной тумбочке — ваш единственный помощник, готовый начать этот день вместе с вами.»"
200003-10 = "[ns1] «Арона...?»\n[ns2] «А где Сундук Шиттима?»"
200003-13 = "«Похоже, вы всё ещё во власти сновидения. Ведь вы ищете планшет, которого здесь и быть не должно.»"
200003-14 = "«...Несмотря на то, что единственное электронное устройство, полученное вами от Президента Федерального Студенческого Совета, — это те самые умные часы, известные как \"Посох Шакада\".»"
200003-15 = "[s] Искать Сундук Шиттима."
200003-16 = "«Вы обыскиваете спальню, но в итоге так ничего и не находите.»"
200003-17 = "«Вы задаётесь вопросом, не могли ли вы оставить планшет где-то ещё.»"
200003-18 = "«Привычным движением вы надеваете умные часы и направляетесь в комнату отдыха.»"
200003-22 = "«В неосвещённой комнате отдыха вы, как обычно, включаете кофемашину и варите себе эспрессо.»"
200003-23 = "«Эхом отдаётся звук перемалываемых зёрен, и чёрная жидкость наполняет чашку. Это дешёвый сорт, почти лишённый аромата, но он идеально подходит, чтобы стряхнуть остатки сна.»"
200003-30 = "«Вы выпиваете его одним глотком и идёте в свой кабинет.»"
200003-34 = "«Придя в кабинет, вы замечаете ещё одну странность.»"
200003-35 = "«Дежурная студентка, которая должна быть здесь, отсутствует. Однако вы не придаёте этому большого значения, решив, что она просто опаздывает.»"
200003-36 = "«...По крайней мере, до тех пор, пока вы не раздвигаете шторы.»"
200003-43 = "[ns] «А...?»"
200003-44 = "«Наконец вы замечаете третью странность.»"
200003-45 = "«Мир стал чёрно-белым. Кивотос, когда-то наполненный ярким сиянием и живыми красками, лишился своего цвета, окрасившись в оттенки серого.»"
200003-46 = "«И дело не в пасмурном небе. Абсолютно всё вокруг стало монохромным.»"
200003-47 = "«...И вокруг нет ни единой живой души.»"
200003-48 = "«Будто все люди исчезли, оставив вас в полном одиночестве.»"
200003-49 = "[ns] «Что это за голос...?»"
200003-50 = "«Сбитый с толку множеством аномалий, вы начинаете сомневаться даже в словах, что рождаются в вашем собственном разуме.»"
200003-51 = "«но будьте покойны. Это, по крайней мере, не аномалия.»"
200003-52 = "«Когда пишешь историю — поначалу берёшься за первое лицо ради глубины описания чувств, но затем заходишь в тупик и переключаешься на третье. Для тех, кто впервые берётся за перо, это вполне обычное явление.»"
200003-56 = "«...Прошу прощения. Возможно, эта тема оказалась слишком далека от вас.»"
200003-57 = "«Вернёмся к истории. Вы накидываете пиджак и спешите к больнице. Вы намерены выяснить, что с вами происходит.»"
200003-58 = "[ns] Направиться к зданию Федерального Студенческого Совета."
200003-59 = "«...Нет, вы выбрали другой путь.»"
200003-62 = "«Но даже по дороге к Федеральному Студенческому Совету пейзаж вокруг не меняется.»"
200003-63 = "«Покачивающийся салон транспорта тоже окрашен в монохром, словно он позабыл свои цвета.»"
200003-64 = "«Вы... вспоминаете сцену, свидетелем которой уже были когда-то.»"
200003-66 = "«Тогда мир был окрашен в багрово-красный. И всё же —»"
200003-67 = "«Студенты были рядом с вами.»"
200003-73 = "«Но... сейчас всё иначе.»"
200003-75 = "«Добравшись до здания Федерального Студенческого Совета, вы обыскиваете каждый угол. Но вокруг по-прежнему никого.»"
200003-76 = "«Ни вечно ворчащей управляющей в очках, что приглядывала за вами, ни розововолосой сотрудницы, вечно уплетающей чипсы со вкусом ментайко — никого нет.»"
200003-77 = "«...В конце концов, вы направляетесь \"туда\".»"
200003-78 = "«Словно ведомый неведомой силой, вы взбегаете по лестнице.»"
200003-79 = "«К месту, где всё началось.»"
200003-87 = "«Кабинет Президента Федерального Студенческого Совета. Там сидела странная девочка —»"
200003-88 = "«Нет. Там сидела девочка, которая казалась смутно знакомой и вызывала тоску по прошлому.»"
200003-89 = "[ns] «Этот голос... это ты?»"
200003-90 = "«Да. Но в то же время... нет, это тоже правда.»"
200003-91 = "«Этот мир — воспоминание девочки и ваш собственный сон.»"
200003-92 = "«И так же, как вы смотрите на неё, она смотрит на вас.»"
200003-93 = "[ns] «Кто ты?»"
200003-98 = "Я так рада нашей встрече, Сенсей."
200003-99 = "Я — Кивотоса..."
200003-109 = "[ns] «Где я...?»"
200003-114 = "Сенсей, вы в порядке?!"
200003-115 = "Вы так долго ворочались во сне, я так за вас переживала!"
200003-116 = "[s] «Это был сон...?»"
200003-117 = "Вывод: Возможно, вам приснился кошмар."
200003-118 = "[s] «Нет. Это был не кошмар, но...»"
200003-129 = "[ns] «И всё же это был очень странный сон.»"
200003-130 = "Я рада, что это не кошмар, но..."
200003-131 = "Я рекомендую вам регулярно проходить медицинский осмотр. Нарушения сна могут быть вызваны различными скрытыми проблемами."
200003-132 = "Это всё из-за вашего ненормированного графика! Супер-Арона знает всё!"
200003-133 = "Отныне я сама буду звать вас, когда пора обедать. Пожалуйста, питайтесь как следует!"
200003-134 = "[s] «Прости, что заставил волноваться. Спасибо.»"
200003-138 = "[ns] «...Ты знаешь, что такое \"Посох Шакада\"?»"
200003-139 = "...Ответ отрицательный. В моей памяти нет таких записей."
200003-140 = "Хм... Мне кажется, я где-то слышала это... а может, и нет..."
200003-141 = "Сенсей, а где именно вы об этом услышали?"
200003-142 = "[s] «Я и сам уже толком не помню...»"
200003-146 = "[ns3] «Размышления о сне могут подождать...»\n[ns4] «Ещё немного рано, но, может, начнём сегодняшнюю работу?»"
200003-149 = "Сейчас ведь только четыре часа утра?!"
200003-150 = "Рекомендация: Ради вашего здоровья советую вам лечь поспать ещё немного."
200003-151 = "Вот именно! Пожалуйста, возвращайтесь в кровать."
200003-152 = "А если не можете уснуть, я спою вам колыбельную!"
200003-153 = "У нас нет встроенного плагина для пения, но... я очень постараюсь."
200003-159 = "Следующий эпизод;Сияющий Трапецоэдр"