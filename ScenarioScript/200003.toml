[translation]
200003-1 = "Episódio 3: Um Sonho Estranho"
200003-4 = "「Esta―― é uma história sobre 'você', o Sensei da Schale, e seu 'smartwatch'.」"
200003-5 = "「Você tem uma rotina de vida bastante irregular,#nmas ainda assim, vinha se esforçando para acordar cedo.」"
200003-6 = "「O smartwatch descansando sobre a mesa de cabeceira é o seu único e absoluto assistente na hora de despertar.」"
200003-10 = "[ns1] \"Arona...?\"\n[ns2] \"Onde está a Caixa de Shittim?\""
200003-13 = "「Ao que parece, você ainda está mergulhado no mundo dos sonhos.#nPor qual outra razão procuraria por um tablet que jamais deveria existir?」"
200003-14 = "「...Afinal, o único aparelho eletrônico que você recebeu da Presidente do Conselho Estudantil é aquele smartwatch que você chama de 'Cajado de Sharkade'.」"
200003-15 = "[s] Continuo procurando pela Caixa de Shittim."
200003-16 = "「Você revira o quarto inteiro, mas, como esperado, não encontra nada.」"
200003-17 = "「Você começa a cogitar a hipótese de ter esquecido o tablet em algum outro lugar.」"
200003-18 = "「Com um gesto já automatizado, você coloca o smartwatch no pulso e segue em direção à sala de descanso.」"
200003-22 = "「No breu da sala de descanso ainda apagada,#nvocê liga a máquina de café e passa um expresso, exatamente como faz todos os dias.」"
200003-23 = "「O som dos grãos sendo moídos ecoa, e o líquido negro e espesso preenche a xícara.#nÉ um grão barato e quase sem aroma, mas cumpre perfeitamente a função de espantar o sono.」"
200003-30 = "「Você vira a xícara de uma vez e caminha em direção ao seu escritório principal.」"
200003-34 = "「Assim que pisa no escritório, você nota algo fora do comum.」"
200003-35 = "「A aluna escalada para o turno de guarda não está lá.#nMas você dá de ombros, presumindo que ela apenas se atrasou.」"
200003-36 = "「...Isto é, até você abrir as cortinas da janela.」"
200003-43 = "[ns] \"O que...?!\""
200003-44 = "「Foi então que você finalmente percebeu a terceira e mais grave anomalia.」"
200003-45 = "「O mundo lá fora estava em preto e branco. A cidade de Kivotos, outrora vibrante e banhada em cores cintilantes, havia sido drenada e engolida por um cinza opressor.」"
200003-46 = "「Não é um dia nublado. É a própria existência do mundo que foi reduzida a tons monocromáticos.」"
200003-47 = "「...E o mais assustador: não há um único traço de vida humana nas ruas.」"
200003-48 = "「É como se todos tivessem desaparecido, deixando apenas você para trás.」"
200003-49 = "[ns] \"Essa voz... quem é você?\""
200003-50 = "「Soterrado por anomalias inexplicáveis, você passa a duvidar até mesmo da voz do narrador ecoando em sua mente.」"
200003-51 = "「Mas tranquilize-se. Esta, pelo menos, não é uma anomalia grave.」"
200003-52 = "「Ao redigir um romance... não é incomum começar narrando em primeira pessoa para aprofundar os sentimentos e, ao bater num bloqueio criativo, mudar bruscamente para a terceira pessoa.#nÉ um vício comum entre escritores de primeira viagem.」"
200003-56 = "「...Perdão. Talvez eu tenha escolhido uma metáfora pouco empática.」"
200003-57 = "「Voltando ao roteiro. Você veste o seu casaco às pressas e corre em direção ao hospital.#nNuma tentativa desesperada de descobrir qual diagnóstico médico explicaria essa alucinação.」"
200003-58 = "[ns] Decido correr até o prédio do Conselho Estudantil Geral."
200003-59 = "「...Não, a sua bússola moral escolheu outro destino.」"
200003-62 = "「Durante todo o trajeto até a torre do Conselho, a paisagem morta não muda.」"
200003-63 = "「Até mesmo o interior do trem parece ter esquecido as próprias cores, afogado naquele mar cinzento.」"
200003-64 = "「Você... é assaltado por uma lembrança familiar.」"
200003-66 = "「Naquele dia, o céu e o mundo foram pintados num tom de vermelho vivo e sufocante. E mesmo assim――」"
200003-67 = "「As suas alunas ainda estavam lutando ao seu lado.」"
200003-73 = "「Mas... agora o silêncio é absoluto.」"
200003-75 = "「Ao chegar no prédio do Conselho, você vasculha cada corredor e escritório.#nMas o vazio é absoluto. Não há vivalma.」"
200003-76 = "「A Chefe de Administração de óculos que cuidava de você enquanto resmungava não está lá.#nA oficial de cabelo rosa que passava o expediente inteiro mastigando salgadinhos sabor ovas não está lá... Ninguém.」"
200003-77 = "「...Por fim, como último recurso, você ruma para 'Aquele Lugar'.」"
200003-78 = "「Subindo as escadas quase tropeçando, como se um fantasma soprasse a sua nuca.」"
200003-79 = "「De volta ao marco zero, onde todas as engrenagens começaram a girar.」"
200003-87 = "「O Escritório da Presidente. E, sentada na poltrona do poder, uma garota desconhecida――」"
200003-88 = "「Não. Uma garota que desperta uma saudade inexplicável em seu coração.」"
200003-89 = "[ns] \"Essa voz na minha cabeça... era sua?\""
200003-90 = "「Sim. E, ao mesmo tempo... não.」"
200003-91 = "「Este mundo pálido é as memórias póstumas de uma garota, que se manifestam como os seus sonhos.」"
200003-92 = "「E, assim como você tenta enxergá-la através da névoa, ela também fita a sua alma.」"
200003-93 = "[ns] \"Quem é você?\""
200003-98 = "É uma honra conhecê-lo, Sensei."
200003-99 = "Eu sou a... de Kivotos."
200003-109 = "[ns] \"Onde eu...\""
200003-114 = "Sensei!! O senhor está bem?!"
200003-115 = "O senhor estava suando e gemendo muito... eu fiquei apavorada!"
200003-116 = "[s] \"Foi só... um sonho?\""
200003-117 = "Hipótese: O senhor foi vítima de um pesadelo severo."
200003-118 = "[s] \"Não. Eu não chamaria de pesadelo... mas...\""
200003-129 = "[ns] \"Foi um sonho bem bizarro, confesso.\""
200003-130 = "Se não foi um pesadelo aterrador, já é um alívio... mas..."
200003-131 = "Recomendação médica: Marque um check-up clínico o quanto antes. Distúrbios do sono geralmente mascaram problemas crônicos e invisíveis."
200003-132 = "É óbvio que a sua saúde tá quebrando! A sua rotina de sono e alimentação tá um lixo!#nE a Super Arona-chan tem os registros de todos os seus vacilos!"
200003-133 = "A partir de hoje, eu vou apitar no seu ouvido a cada refeição! Quero ver o senhor comer direito!"
200003-134 = "[s] \"Foi mal por deixar vocês tão preocupadas. E obrigado pelo cuidado.\""
200003-138 = "[ns] \"...Por acaso... a palavra 'Cajado de Sharkade' significa alguma coisa pra vocês?\""
200003-139 = "……Negativo. Nenhuma correspondência nos bancos de dados do meu núcleo de memória."
200003-140 = "Hummm... me soa super familiar... mas ao mesmo tempo parece que eu nunca ouvi..."
200003-141 = "Onde foi que o senhor escutou um nome de RPG de fantasia desses, Sensei?"
200003-142 = "[s] \"Pois é... também não consigo me lembrar direito...\""
200003-146 = "[ns3] \"Vou deixar a interpretação de sonhos pra depois.\"\n[ns4] \"Eu sei que ainda tá escuro, mas vou dar o pontapé no trabalho de hoje.\""
200003-149 = "Mas Sensei, são só 4 da manhã!!"
200003-150 = "Aviso urgente. Pela integridade da sua saúde, recomendo fortemente que o senhor retorne à cama imediatamente."
200003-151 = "Exatamente! Volta pra debaixo da coberta agora!"
200003-152 = "Se a ansiedade não deixar o senhor dormir, eu canto canções de ninar pra você apagar!"
200003-153 = "Nós não possuímos plugins de síntese vocal ativados... mas faremos o nosso melhor."
200003-159 = "Próximo Episódio: O Trapezoedro Cintilante"