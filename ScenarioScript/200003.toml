[translation]
200003-1 = "Episódio 3: Um Sonho Estranho"
200003-4 = "“Esta é uma história sobre 'você', o sensei do Schale, e um 'smartwatch'.”"
200003-5 = "“Você leva uma vida irregular, mas#nainda assim, se esforçava para acordar cedo.”"
200003-6 = "“O smartwatch deixado na mesa de cabeceira é o único assistente que te ajuda a despertar.”"
200003-10 = "[ns1] \"Arona...?\"\n[ns2] \"Onde está o Shittim Chest?\""
200003-13 = "“Ao que parece, você ainda está dormindo.#nAfinal, está procurando por um tablet que não deveria estar aqui.”"
200003-14 = "“...Embora o único dispositivo eletrônico que você recebeu da Presidente do Conselho Estudantil Geral seja o smartwatch chamado 'Cajado de Schale'.”"
200003-15 = "[s] Procurar pelo Shittim Chest."
200003-16 = "“Você vasculha o quarto, mas terminará sem encontrá-lo.”"
200003-17 = "“Você reflete. Será que não deixou o tablet em algum lugar?”"
200003-18 = "“Com um gesto habitual, você coloca o smartwatch e segue para a sala de descanso.”"
200003-22 = "“Dentro da sala de descanso ainda sem luz,#nvocê liga a máquina de café como de costume e prepara um expresso.”"
200003-23 = "“O som de moer os grãos ecoa, e o líquido preto enche a xícara.#nÉ um café barato, quase sem aroma, mas perfeito para espantar o sono.”"
200003-30 = "“Você bebe tudo de uma vez e segue para o escritório.”"
200003-34 = "“Ao chegar ao escritório, você percebe outra anomalia.”"
200003-35 = "“A aluna de plantão, que deveria estar lá, não está.#nNo entanto, você não deu muita importância, pensando que talvez ela tivesse se atrasado.”"
200003-36 = "“...Até abrir as cortinas.”"
200003-43 = "[ns] \"Hã...?\""
200003-44 = "“Finalmente, você percebe a terceira anomalia.”"
200003-45 = "“O mundo tornou-se monocromático. Kivotos, que antes era cheia de brilho e cores vibrantes, perdeu sua cor e tingiu-se de cinza.”"
200003-46 = "“Não é um dia nublado. Tudo no mundo tornou-se um tom de cinza.”"
200003-47 = "“...E não há sinal algum de pessoas.”"
200003-48 = "“Como se todos tivessem desaparecido, deixando apenas você para trás.”"
200003-49 = "[ns] \"Essa voz... o que é?\""
200003-50 = "“Confuso com tantas anomalias, você começa a duvidar até das palavras que surgem em sua mente.”"
200003-51 = "“Mas fique tranquilo. Pelo menos isso não é uma anomalia.”"
200003-52 = "“Ao escrever uma história — embora tenha começado em primeira pessoa por uma questão de descrição emocional, você acaba mudando para a terceira pessoa por estar travado no desenvolvimento.#nEsse é um fenômeno comum para quem escreve pela primeira vez.”"
200003-56 = "“...Perdão. Talvez tenha sido um assunto difícil de se identificar.”"
200003-57 = "“Vamos voltar ao assunto. Você veste seu casaco e corre para o hospital.#nVocê tentará esclarecer o que está acontecendo com você.”"
200003-58 = "[ns] Ir para o prédio do Conselho Estudantil Geral."
200003-59 = "“...Não, você tomou outro caminho.”"
200003-62 = "“Enquanto se dirige ao Conselho Estudantil Geral, a paisagem ao redor não muda.”"
200003-63 = "“O interior do veículo em movimento também está tingido de monocromático, como se tivesse esquecido as cores.”"
200003-64 = "“Você... lembrou-se de uma cena que viu anteriormente.”"
200003-66 = "“Naquela época, o mundo estava tingido de um vermelho vívido. Mesmo assim—”"
200003-67 = "“As alunas estavam com você.”"
200003-73 = "“Mas... agora é diferente.”"
200003-75 = "“Ao chegar ao prédio do Conselho Estudantil Geral, você vasculhará cada canto.#nNo entanto, ainda não há sinal de ninguém.”"
200003-76 = "“Nem a administradora de óculos que cuidava de você enquanto reclamava,#nnem a oficial de cabelo rosa que está sempre comendo batatas fritas sabor mentaiko — não há ninguém.”"
200003-77 = "“...Por fim, você segue para 'aquele lugar'.”"
200003-78 = "“Você subiu as escadas correndo, como se estivesse sendo perseguido por algo.”"
200003-79 = "“Para aquele lugar, onde tudo começou.”"
200003-87 = "“O escritório da Presidente do Conselho Estudantil Geral. Lá, uma garota desconhecida—”"
200003-88 = "“Não. Uma garota que trazia uma sensação de nostalgia estava sentada.”"
200003-89 = "[ns] \"Essa voz... é você?\""
200003-90 = "“Sim. Mas, ao mesmo tempo... não, também é.”"
200003-91 = "“Este mundo é uma retrospectiva da garota, e o seu sonho.”"
200003-92 = "“Assim como você observa a garota, a garota também observa você.”"
200003-93 = "[ns] \"Quem é você?\""
200003-98 = "É um prazer conhecê-lo, Sensei."
200003-99 = "Eu sou de Kivotos..."
200003-109 = "[ns] \"Onde é que estou...?\""
200003-114 = "Sensei, você está bem!?"
200003-115 = "Você estava se debatendo enquanto dormia, fiquei preocupada!"
200003-116 = "[s] \"Um sonho...?\""
200003-117 = "Suposição. Será que você teve um pesadelo?"
200003-118 = "[s] \"Não. Não foi exatamente um pesadelo, mas...\""
200003-129 = "[ns] \"Foi um sonho estranho, eu acho.\""
200003-130 = "Fico feliz que não tenha sido um pesadelo, mas..."
200003-131 = "Recomendo que faça um check-up médico regularmente. Distúrbios do sono podem ter várias causas ocultas."
200003-132 = "É porque você tem uma vida irregular!#nA Super Arona-chan sabe de tudo!"
200003-133 = "De agora em diante, vou te chamar na hora das refeições. Por favor, coma direito!"
200003-134 = "[s] \"Desculpe por preocupar vocês. Obrigado.\""
200003-138 = "[ns] \"...Você conhece o 'Cajado de Shaked'?\""
200003-139 = "...Negação. Não há registros disso na minha memória."
200003-140 = "Hmm... sinto que já ouvi falar disso... ou talvez não..."
200003-141 = "Onde exatamente você ouviu isso, Sensei?"
200003-142 = "[s] \"Eu também não consigo me lembrar direito...\""
200003-146 = "[ns3] \"Deixando o sonho de lado por enquanto...\"\n[ns4] \"Está um pouco cedo, mas vamos começar o trabalho de hoje.\""
200003-149 = "Ainda são 4 da manhã!?"
200003-150 = "Recomendação. Pela sua saúde, sugiro que volte a dormir."
200003-151 = "Isso mesmo! Volte para a cama."
200003-152 = "Se não conseguir dormir, eu canto uma canção de ninar para você!"
200003-153 = "Nós não temos um plugin de canto, mas... faremos o nosso melhor."
200003-159 = "Próximo episódio: O Trapézoedro Brilhante"
