[translation]
2300606-1 = "Recarregando energias"
2300606-2 = "（Ao chegar em frente à Hyakkiyako, havia algo escrito na porta）"
2300606-3 = "“Hoje, a Hyakkiyako estará fechada durante o período da manhã e abrirá a partir da 1 da tarde.”"
2300606-4 = "[s] \"Não era pela entrada principal, era pelos fundos... certo?\""
2300606-8 = "（A Hyakkiyako, sem ninguém por perto, estava extremamente silenciosa）"
2300606-9 = "（No meio daquele silêncio absoluto――）"
2300606-10 = "……Ah, você chegou."
2300606-14 = "[wa:400]― Fufu, [wa:1700]bem-vindo de volta~ [wa:1600]meu mestre~?"
2300606-17 = "[ns] \"Que raro, a Shizuko está relaxada como nunca vi antes.\""
2300606-18 = "[wa:550]― Pois é~."
2300606-20 = "― Como pode ver, [wa:1380]estou oficialmente [wa:1300]tirando uma folga agora~."
2300606-23 = "[wa:350]― ……É [wa:1000]estranho."
2300606-25 = "― Eu sempre achei que [wa:480]não deveria fazer esse tipo de coisa,"
2300606-28 = "― Que eu precisava estar sempre alerta,"
2300606-30 = "― Eu sempre [wa:500]pensei assim, mas……."
2300606-33 = "― Quando estou com o [wa:400]Sensei……."
2300606-35 = "― De alguma forma, [wa:1150]eu acabo relaxando, sabe……."
2300606-38 = "[wa:500]― Ei, [wa:450]Sensei? [wa:1500]Venha aqui."
2300606-40 = "― ……Você vai assumir a responsabilidade [wa:500] por me deixar assim, [wa:2180]não vai?"
2300606-43 = "Muito bem, recarga concluída!"
2300606-44 = "Shizuko, totalmente recuperada!"
2300606-45 = "Graças a você, poderei trabalhar normalmente a partir da tarde."
2300606-46 = "Obrigada, Sensei."
2300606-47 = "[s] \"De nada.\""
2300606-48 = "Então, conto com você para o resto do dia, certo?"
2300606-49 = "Ehehe."
2300606-51 = "（Naquela tarde, ajudei a Shizuko na Hyakkiyako）"
