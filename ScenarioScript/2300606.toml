[translation]
2300606-1 = "元気リチャージ中"
2300606-2 = "（百夜堂の前に到着すると、ドアの前に何かが書かれていた）"
2300606-3 = "「本日、百夜堂は午前中の営業をお休みとさせていただき、午後1時から営業を開始します」"
2300606-4 = "[s] \"正面玄関じゃなくて、裏から……だっけ？\""
2300606-8 = "（人けの無い百夜堂は、ものすごく静かだった）"
2300606-9 = "（しんと静まり返ったその中で――）"
2300606-10 = "……あっ、来ましたか。"
2300606-14 = "[wa:400]― ふふっ、[wa:1700]お帰りなさいませ～[wa:1600]ご主人様～？"
2300606-17 = "[ns] \"珍しい、シズコがこれ以上ないくらいだらけてる。\""
2300606-18 = "[wa:550]― そうですよぉ～。"
2300606-20 = "― 見ての通り、[wa:1380]現在進行形で[wa:1300]おサボり中で～す。"
2300606-23 = "[wa:350]― ……不思議[wa:1000]ですね。"
2300606-25 = "― こういうことは[wa:480]しちゃいけないって、"
2300606-28 = "― 気を張ってなきゃって、"
2300606-30 = "― ずっと[wa:500]思ってたはずなんですが……。"
2300606-33 = "― 先生と[wa:400]一緒にいると……。"
2300606-35 = "― なんだか、[wa:1150]気が抜けちゃうって言うか……。"
2300606-38 = "[wa:500]― ほら、[wa:450]先生？[wa:1500]こっちに来てください。"
2300606-40 = "― ……私を[wa:500]こんな風にした責任、[wa:2180]取ってくれますよね？"
2300606-43 = "さてっ、充電完了！"
2300606-44 = "シズコ、完全復活です！"
2300606-45 = "おかげさまで、午後からはいつも通り働けそうです。"
2300606-46 = "ありがとうございます、先生。"
2300606-47 = "[s] \"どういたしまして。\""
2300606-48 = "では今日も一日、よろしくお願いしますね？"
2300606-49 = "えへへっ。"
2300606-51 = "（その日の午後は、百夜堂でシズコのことを手伝った）"
