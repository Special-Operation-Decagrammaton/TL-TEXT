[translation]
1007402-1 = "今日は安全日です"
1007402-2 = "（ハナコに呼ばれて、島の外れに位置する森に足を踏み入れた）"
1007402-3 = "（そこは暖かい日差しと柔らかな風を感じる心地良い場所だった）"
1007402-4 = "あら、先生。思ったよりも早くいらっしゃったのですね。"
1007402-9 = "ふふっ。そんなに急がなくても大丈夫でしたのに。"
1007402-10 = "……先生？ "
1007402-11 = "どうかされましたか？#nなんだか緊張しているご様子ですが……"
1007402-12 = "[s1] \"い、いや、そんなことはないと思うけど……\"\n[s2] \"手に持ってるのは……何？\""
1007402-15 = "ああ、これはただのフルーツですよ。#nこの島は、色々なフルーツが実っているみたいで……不思議なものですね？"
1007402-16 = "見てください、先生。イチゴにバナナ、桃……"
1007402-17 = "ふふっ、こんなに大きなスイカもありました。"
1007402-18 = "……先生？"
1007402-19 = "[s3] \"あっ……そ、そうだね。\"\n[s4] \"フルーツのラインナップ的に、もしかしたら……って。\""
1007402-25 = "……なるほど。"
1007402-26 = "ふふっ……そんな事を思っていたなんて。"
1007402-27 = "そう構えられると、なんだか申し訳ない気持ちになってきます。#nたしか、以前も似たようなことがありましたね。"
1007402-28 = "先生が何を心配されているのか、分かるような気もしますけど……今回は大丈夫ですよ。"
1007402-29 = "……いえ。[ruby=・   ・]今回[/ruby]ではなく、[ruby=・   ・   ・   ・]ここでは[/ruby]と言った方が正しいでしょうか。"
1007402-30 = "ここは――違う場所なので。"
1007402-31 = "……うん？"
1007402-32 = "何が違うのか、と？#nそうですね。ここはトリニティではありませんし――私たち以外、誰もいません。"
1007402-33 = "なので、こんな所で先生を困らせても――面白くないなと思いまして。"
1007402-34 = "[s5] \"そこなの！？\"\n[s6] \"困らせてる自覚はあったんだ……。\""
1007402-37 = "ふふっ、ですが……以前も申し上げた通り――"
1007402-38 = "私の忠告を聞かず、ナカに踏み込んできたのは……先生、ですよね。"
1007402-39 = "もちろん、私が――"
1007402-43 = "……ふふっ。"
1007402-44 = "[s7] \"……ハナコ？\"\n[s8] \"何か言いかけてたみたいだけど……\""
1007402-47 = "うふふっ……あの時も申し上げた通り、このくらいは大目に見てくださいな。"
1007402-48 = "……私はただ、この心地良さを手放したくないだけなのです。"
1007402-49 = "ここでは――他人にどう思われるのかとか、自分に何を求められているのかとか……そういった細々とした事を気にする必要もありません。"
1007402-50 = "……こうして、胸の[ruby=うち]裡[/ruby]をさらけ出したって問題になることもない。"
1007402-51 = "ふふっ。もしコハルちゃんやウイさんがいれば、このフルーツを絡めて楽しいお話ができそうなものですが――"
1007402-52 = "残念ながら、ここには先生と私しかいませんし……ご安心ください。"
1007402-53 = "それとも……"
1007402-54 = "先生は[ruby=・   ・   ・   ・]いつもの[/ruby]私を期待されていたのでしょうか？"
1007402-55 = "でしたら、今からでも先生の期待に応えて――"
1007402-56 = "[s9] \"今のままで十分だよ！？\"\n[s10] \"どうかこのままでお願いします……。\""
1007402-59 = "……ふふっ。"
1007402-60 = "それでは……そろそろ戻りましょうか？ "
1007402-64 = "……そうだ、こちらを一緒に持っていただけませんか？"
1007402-69 = "（ハナコが持ってきたフルーツを代わりに持って、一緒に拠点まで戻ると……）"
1007402-70 = "（拠点に着くや否や、ハナコはフルーツを手にみんなを困らせるのだった……）"
