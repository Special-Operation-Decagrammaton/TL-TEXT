[translation]
3103-1 = "価値の証明（３）"
3103-4 = "ミレニアム・実習室"
3103-9 = "や、やっと完成した……。"
3103-13 = "これがヒマリ部長の設計した、未来観測機関「讖」！"
3103-14 = "お疲れ様～。"
3103-15 = "ふぅ、だいぶ時間がかかったわね……。"
3103-16 = "やっぱり工学系の作業は大変だわ……。"
3103-17 = "ノアが助けてくれなかったら、きっと完成する前に挫折してたわ。ありがとね。"
3103-18 = "いえいえ、感謝されるようなことでは。"
3103-19 = "こんな面白そ――"
3103-20 = "おっといけない。"
3103-21 = "セミナーの一員として、ミレニアムの技術と可能性のためですから。"
3103-22 = "流石というか何と言うか、本当に真面目ね。"
3103-27 = "とにかく、まずは動かしてみましょうか。"
3103-32 = "＜大規模変数分析装置――a.k.a. 未来観測機関「[ruby=しん]讖[/ruby]」――が実行されました＞"
3103-33 = "＜この機関は収集したデータをもとに変化やそこから生まれる予測値を計算し、#n　実現の可能性が最も高い結果を出力します＞"
3103-34 = "＜どんな未来が知りたいか、何でもお聞きください＞"
3103-35 = "本当に動いてる、流石はヒマリ部長……！"
3103-36 = "とはいえ、「どんな未来が知りたい」って言われても……。"
3103-37 = "量子力学的な観点からすると、観測すれば未来は変わってしまう……#nとなると、質問も慎重に選ばないといけないわね。"
3103-38 = "ぱっと34個くらい思い浮かぶけど、えっと……。"
3103-39 = "これから先、先生との関係がどうなるか――とか？"
3103-43 = "そ、そんな個人的な質問を、こんな風に聞けるわけないでしょ！？"
3103-44 = "せっかくお金をかけて作った貴重な装置なんだから、#nもっとこう、公的なことに……！"
3103-45 = "気になること自体は否定しないんですね？"
3103-46 = "ああもう……！"
3103-47 = "と、とにかくまずは、制作費用を回収しないと……#n予測でお金を稼げるとしたら……。"
3103-48 = "えっと、じゃあこれから1ヶ月間で希少金属の価格がどうやって変化するか……#nそれを教えてもらえる？"
3103-52 = "＜リクエストを受け取りました＞"
3103-53 = "＜まずはあなたの生年月日を入力してください＞"
3103-54 = "……？市場価格変化の予測に、使用者の生年月日が必要なロジックが……？"
3103-55 = "まあ良いけど……えっと、3月14日……"
3103-60 = "＜未来を演算しています、少々お待ちください……＞"
3103-64 = "＜演算が完了しました＞"
3103-71 = "＜おめでとうございます！うお座のあなた、今月の運勢は大吉です！＞"
3103-72 = "＜問題は解決し、たくさんの良いことが起こる一か月でしょう！＞"
3103-73 = "＜今月の幸運アイテムは丈夫なチタニウム！#n　持ち歩けば、良いことが起こるかも！？＞"
3103-77 = "……？"
3103-78 = "あら……。"
3103-79 = "……え、終わり？"
3103-81 = "嘘でしょ、終わりなの！？"
3103-84 = "チーちゃん。ここにあった本、知りません？"
3103-85 = "モニターの横にあった、あの分厚い天文学の？"
3103-86 = "見てみたら返却期限が近かったから、代わりに図書館に返しておいたけど。"
3103-87 = "……あら、そうでしたか。"
3103-88 = "何かあったの？"
3103-89 = "それがですね……。"
3103-90 = "私が新しく設計した最先端の演算装置、未来観測機関「讖」の設計図をその本に挟んだままでして。"
3103-91 = "まあ無くなったところで、特にそれほど困るわけではないのですが……。"
3103-92 = "あれは未来を垣間見る事ができる、危険な能力を持った発明品……#nもしも悪い人の手に渡ってしまったら、と思うと……。"
3103-93 = "未来観測機関「讖」って……。"
3103-94 = "前に言ってた、あの「星座占い」のやつ？"
3103-95 = "科学的な統計解析とビッグデータに基づく最先端の演算装置ですよ？"
3103-96 = "なにせ、この私の偉大な発明品なのですから。#nただの「星座占い」と同じにしないでください。"
3103-97 = "でも「空の星が同じ位置にいるときに生まれた」ってだけで、#nその人たちが同じ運命を共有する……。"
3103-98 = "その考え方は、だいぶ非科学的じゃない？"
3103-99 = "占星術を舐めてはいけませんよ、チーちゃん。"
3103-100 = "「占星術」……それは古代の天文学者たちが長きに渡って研究してきた、#n黄道十二宮の流れと人間の生涯との連動性を観測するビッグデータ……。"
3103-101 = "まだ論理的な説明はつかずとも、統計が示す傾向性は無視できません。"
3103-105 = "何より……私の属する「へびつかい座」の星が、私にそう囁いていますから！"
3103-111 = "……ヒマリ。"
3103-112 = "へびつかい座って、黄道十二宮に含まれてないけど？"
3103-116 = "……そ、そうなのですか！？"
3103-118 = "つまりこれって、「未来を予測する装置」というか……"
3103-119 = "単なる、星座占いの機械だったってこと！？"
3103-120 = "そ、そんな……ヒマリ部長の発明品がこんな役に立たないものだったなんて……。"
3103-121 = "も、もしかして何か、制作過程にミスが……？"
3103-122 = "いえ、完璧に設計図通りです。"
3103-123 = "そういえば、最近の図書館の貸し出し記録からして……#nヒマリ部長、占星術周りの本をたくさん借りられていましたね。"
3103-124 = "これはおそらく、ヒマリ部長がお遊びで作ったおもちゃなのではないでしょうか？"
3103-125 = "おもちゃ……あれだけの予算を、おもちゃに……。"
3103-126 = "……ちょっと待って。"
3103-127 = "ノア、その言い方……もしかしてあなた、最初から気づいてたんじゃ……？"
3103-128 = "まあ、確信はありませんでしたが。"
3103-129 = "じゃ、じゃあどうして言ってくれなかったの！？"
3103-130 = "どうしてって……。"
3103-131 = "……聞かれてませんし？"
3103-136 = "……ノアぁ！！"
3103-138 = "（結局ユウカは予定通り、未来観測機関「讖」にかかった金額を自腹で負担することになってしまったものの……)"
3103-139 = "（幸いにも、先物取引で購入したチタニウムの価格が暴騰したおかげで、#n　お金周りは何とかなったらしい）"
3103-140 = "価値の証明"
