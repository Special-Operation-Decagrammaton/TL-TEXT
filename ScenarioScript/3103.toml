[translation]
3103-1 = "Prova de Valor (3)"
3103-4 = "Sala de Práticas do Millennium"
3103-9 = "Fi-finalmente terminamos..."
3103-13 = "Este é o órgão de observação do futuro, o \"Shin\", projetado pela Chefe Himari!"
3103-14 = "Bom trabalho~."
3103-15 = "Ufa, levou bastante tempo, não é..."
3103-16 = "Trabalhos de engenharia são realmente exaustivos..."
3103-17 = "Se a Noa não tivesse me ajudado, com certeza teria desistido antes de terminar. Obrigada."
3103-18 = "De nada, não é para tanto."
3103-19 = "Algo tão interessante assim—"
3103-20 = "Opa, não posso."
3103-21 = "Como membro do Seminar, é pelo bem da tecnologia e do potencial do Millennium."
3103-22 = "Como esperado, ou devo dizer... você é realmente séria."
3103-27 = "De qualquer forma, vamos começar ligando-o."
3103-32 = "<Dispositivo de análise de variáveis em larga escala — a.k.a. Órgão de observação do futuro \"Shin\" — foi executado>"
3103-33 = "<Este órgão calcula mudanças e valores previstos a partir dos dados coletados e#n exibe o resultado com a maior probabilidade de realização>"
3103-34 = "<Que tipo de futuro você deseja conhecer? Pode perguntar qualquer coisa>"
3103-35 = "Está funcionando de verdade, como esperado da Chefe Himari...!"
3103-36 = "Dito isso, mesmo que ele pergunte \"que tipo de futuro você deseja conhecer\"..."
3103-37 = "Do ponto de vista da mecânica quântica, se observarmos, o futuro mudará...#n então, precisamos escolher a pergunta com cuidado."
3103-38 = "Me vêm umas 34 coisas à mente, mas, bem..."
3103-39 = "Como será o meu relacionamento com o Sensei daqui para frente — talvez?"
3103-43 = "Vo-você não pode perguntar algo tão pessoal assim, não é!?"
3103-44 = "Já que é um dispositivo valioso que custou caro para ser feito,#n deveríamos usar para algo mais... público!"
3103-45 = "Você não nega que está curiosa, não é?"
3103-46 = "Ah, chega...!"
3103-47 = "De, de qualquer forma, primeiro precisamos recuperar o custo de produção...#n Se pudermos ganhar dinheiro com previsões..."
3103-48 = "Bem, então, como o preço dos metais raros vai mudar no próximo mês...#n Você pode me dizer isso?"
3103-52 = "<Solicitação recebida>"
3103-53 = "<Primeiro, por favor, insira sua data de nascimento>"
3103-54 = "...? Qual é a lógica de precisar da data de nascimento do usuário para prever mudanças no preço de mercado...?"
3103-55 = "Bem, tudo bem... então, 14 de março..."
3103-60 = "<Calculando o futuro, por favor, aguarde um momento...>"
3103-64 = "<Cálculo concluído>"
3103-71 = "<Parabéns! Você, de Peixes, terá muita sorte este mês!>"
3103-72 = "<Os problemas serão resolvidos e será um mês com muitas coisas boas acontecendo!>"
3103-73 = "<O item de sorte deste mês é um titânio resistente!#n Se você carregá-lo consigo, talvez coisas boas aconteçam!>"
3103-77 = "...?"
3103-78 = "Ora..."
3103-79 = "...Ei, acabou?"
3103-81 = "Não acredito, acabou mesmo!?"
3103-84 = "Chi-chan. Você sabe do livro que estava aqui?"
3103-85 = "Aquele grosso de astronomia que estava ao lado do monitor?"
3103-86 = "Vi que o prazo de devolução estava perto, então o devolvi na biblioteca para você."
3103-87 = "...Ah, foi isso?"
3103-88 = "Aconteceu alguma coisa?"
3103-89 = "É que..."
3103-90 = "Eu deixei o projeto do meu novo dispositivo de cálculo de ponta, o órgão de observação do futuro \"Shin\", dentro daquele livro."
3103-91 = "Bem, não é como se eu fosse ficar em apuros se ele sumisse..."
3103-92 = "Aquilo é uma invenção com uma habilidade perigosa capaz de vislumbrar o futuro...#n Se caísse nas mãos de alguém mal-intencionado, fico pensando..."
3103-93 = "O instituto de observação do futuro 'Shin'..."
3103-94 = "Aquele de 'horóscopo' que você mencionou antes?"
3103-95 = "É um dispositivo de computação de ponta baseado em análise estatística científica e big data, sabia?"
3103-96 = "Afinal, é uma das minhas grandes invenções. #nNão compare com um simples 'horóscopo'."
3103-97 = "Mas a ideia de que, só porque 'nasceram quando as estrelas estavam na mesma posição', #nas pessoas compartilham o mesmo destino..."
3103-98 = "Isso não é um pouco anticientífico?"
3103-99 = "Não subestime a astrologia, Chi-chan."
3103-100 = "A 'astrologia'... é um big data que observa a conexão entre o fluxo do zodíaco e a vida humana, algo que astrônomos antigos estudaram por muito tempo..."
3103-101 = "Mesmo que ainda não haja uma explicação lógica, as tendências mostradas pelas estatísticas não podem ser ignoradas."
3103-105 = "Acima de tudo... a estrela de 'Ofiúco', à qual pertenço, está sussurrando isso para mim!"
3103-111 = "...Himari."
3103-112 = "Ofiúco não faz parte do zodíaco, sabia?"
3103-116 = "...É, é mesmo!?"
3103-118 = "Quer dizer que isso, em vez de um 'dispositivo para prever o futuro'..."
3103-119 = "É só uma máquina de horóscopo!?"
3103-120 = "Não pode ser... a invenção da diretora Himari ser algo tão inútil assim..."
3103-121 = "S-será que houve algum erro no processo de fabricação...?"
3103-122 = "Não, está perfeitamente de acordo com o projeto."
3103-123 = "Falando nisso, pelos registros de empréstimos da biblioteca recentemente... #na diretora Himari pegou muitos livros sobre astrologia, não foi?"
3103-124 = "Provavelmente, isso não seria apenas um brinquedo que a diretora Himari fez por diversão?"
3103-125 = "Um brinquedo... gastar todo aquele orçamento em um brinquedo..."
3103-126 = "...Espere um pouco."
3103-127 = "Noa, esse jeito de falar... será que você já sabia desde o começo...?"
3103-128 = "Bem, eu não tinha certeza absoluta."
3103-129 = "E-então por que você não me contou!?"
3103-130 = "Por que, você pergunta..."
3103-131 = "...Você não me perguntou, não é?"
3103-136 = "...Noa!!"
3103-138 = "(No fim, embora Yuuka tenha acabado arcando com os custos do instituto de observação do futuro 'Shin' do próprio bolso, conforme o planejado...)"
3103-139 = "(Felizmente, graças à disparada no preço do titânio comprado em negociações futuras, #na situação financeira parece ter se resolvido.)"
3103-140 = "Prova de Valor"
