[translation]
80000120-1 = "Com todos os cinco sentidos"
80000120-2 = "Ultimamente, novos ventos têm soprado em Shanhaijing."
80000120-3 = "Sendo assim — como líder da escola, pensei em aproveitar isso também. #nPor isso, preparei esta cerimônia do chá."
80000120-4 = "[s] \"Então era isso. Obrigado.\""
80000120-5 = "Fufu. Não precisa ser tão formal."
80000120-6 = "Bem, vamos tomar uma xícara —"
80000120-11 = "[ns] \"Isto é...?\""
80000120-12 = "Fufu, percebeu?"
80000120-13 = "Hoje, preparei um \"chá de nibs de cacau\" especial."
80000120-14 = "Aprecie a cor, sinta o aroma, perceba o sabor..."
80000120-15 = "Por favor, desfrute com calma."
80000120-16 = "[s] \"Nibs de cacau...?\""
80000120-17 = "São sementes de cacau secas e processadas. Pode-se dizer que são a forma original do chocolate."
80000120-18 = "No entanto, este chá não tem a doçura do chocolate."
80000120-19 = "[s] \"O amargor e o aroma são ótimos...!\""
80000120-20 = "...Pensei que você estivesse cansado de \"doçura\" hoje."
80000120-21 = "Queria que você, Sensei, sentisse um sabor um pouco mais refrescante."
80000120-22 = "A \"arte do chá\" consiste em desfrutar do sabor do chá junto com um amigo. Bem, vamos continuar —"
80000120-24 = "(Enquanto bebia o chá de nibs de cacau com Kisaki em uma sala silenciosa —)"
80000120-25 = "(Senti meu corpo relaxar e uma energia surgir...!)"
80000120-27 = "...Diz que seu corpo e mente se acalmaram e que se sente revigorado?"
80000120-28 = "Hum. Dizem que as sementes de cacau têm o efeito de prevenir doenças cardíacas."
80000120-29 = "Dizem também que, em pequena escala, ajudam a prevenir o envelhecimento e auxiliam na perda de peso."
80000120-30 = "[s1] \"Até esse tipo de efeito!\"\n[s2] \"Aceito mais uma xícara...!\""
80000120-33 = "Quando você vier a Shanhaijing... servirei o quanto quiser."
80000120-34 = "Também seria bom enviar chá da Xuanlongmen para o Schale."
80000120-35 = "Claro, eu também posso visitar o Schale."
80000120-36 = "...Você não pensa em aprender a arte do chá, Sensei?"
80000120-37 = "Você gosta do chá que eu preparo...?"
80000120-38 = "Ah..."
80000120-39 = "O seu defeito está exatamente aí."
80000120-40 = "[s] \"S-será mesmo...?\""
80000120-41 = "Você não percebe...?"
80000120-42 = "Se você realmente não tem consciência disso —"
80000120-43 = "Isso também é um defeito."
80000120-44 = "...Um Sensei travesso precisa de um castigo."
80000120-45 = "O que seria bom..."
80000120-46 = "Hum... vejamos. Que tal se eu continuar \"invadindo\" os lugares onde você está para te deixar sem jeito?"
80000120-47 = "[s] \"Por favor, pegue leve comigo...\""
80000120-48 = "Verei o que posso fazer."
80000120-49 = "Fufu. Esse castigo..."
80000120-50 = "É apenas uma brincadeira."
80000120-51 = "...Além disso, se formos falar de travessuras, eu sou igual a você."
80000120-52 = "Na verdade, neste chá —"
80000120-53 = "Eu fiz uma pequena \"travessura\"."
80000120-54 = "[s3] \"O... o que você fez!?\"\n[s4] \"Agora que falou, parece que um aroma intenso de chocolate surgiu...\""
80000120-57 = "Fufu. Percebeu?"
80000120-58 = "Pedi ao Clube de Pesquisa de Alquimia... e fiz uma \"armadilha\" no meu chá."
80000120-59 = "O outro efeito dos nibs de cacau —"
80000120-60 = "Promover a circulação sanguínea, recuperar a fadiga e, além disso —"
80000120-61 = "Desta vez, pedi para adicionarem mais um \"efeito\"."
80000120-62 = "O quê..."
80000120-63 = "Não é nada para se assustar."
80000120-64 = "Hoje é o dia de saborear chocolate... apenas isso."
80000120-69 = "(Kisaki se levanta de repente e se aproxima...)"
80000120-70 = "Você consegue sentir,"
80000120-71 = "este aroma...?"
80000120-72 = "[s] \"E-eu consigo, mas...!\""
80000120-73 = "Fufu. Sendo assim, está ótimo."
80000120-75 = "Você sabe que dia é hoje, não sabe?"
80000120-76 = "Dizem que, neste dia, é costume expressar seus sentimentos a alguém importante através de chocolates."
80000120-77 = "Fufu... pensei em uma maneira própria de presentear."
80000120-78 = "(Um aroma de chocolate tão intenso que faz as pernas bambearem envolve todo o meu corpo...!)"
80000120-79 = "Vamos, Sensei."
80000120-80 = "Aproveite o dia de hoje com todos os seus cinco sentidos..."
