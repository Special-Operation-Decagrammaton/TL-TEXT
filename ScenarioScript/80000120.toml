[translation]
80000120-1 = "五感全てで"
80000120-2 = "近頃、山海経にも新たな風が吹いてきてな。"
80000120-3 = "であるならば――門主として、妾もそれに興じようと思っての。#nこうして茶の席を設けさせてもらった。"
80000120-4 = "[s] \"そういうことだったんだね。ありがとう。\""
80000120-5 = "ふふ。そう堅苦しくするでない。"
80000120-6 = "さて、一服しようかの――"
80000120-11 = "[ns] \"これは……？\""
80000120-12 = "ふふ、気付いたかの？"
80000120-13 = "今日は特別に「カカオニブのお茶」を淹れてみたのじゃ。"
80000120-14 = "色合いを楽しみ、香りを吸い、味を感じ……"
80000120-15 = "どうか、ゆっくりと楽しんでみてほしい。"
80000120-16 = "[s] \"カカオニブ……？\""
80000120-17 = "乾燥させたカカオの種を加工したものじゃ。チョコレートの原型とも言える。"
80000120-18 = "じゃが、このお茶にチョコのような甘みはない。"
80000120-19 = "[s] \"苦味と香りがいいね……！\""
80000120-20 = "……今日は「甘味」に、飽きていると思ってな。"
80000120-21 = "少し新鮮な味を、先生に感じて欲しかったのじゃよ。"
80000120-22 = "「茶芸」とは、友と共にお茶の風味を楽しむもの。では、続けるとしようか――"
80000120-24 = "（静かな部屋の中で、キサキとカカオニブのお茶を飲んでいると――）"
80000120-25 = "（体がリラックスし、エネルギーが湧いてくるような気がした……！）"
80000120-27 = "……心身が落ち着き、気が満ちてくるようじゃと？"
80000120-28 = "ふむ。カカオの種には心の臓の病を予防する効果があると言われておる。"
80000120-29 = "僅かながら、老化防止や減量にも効果があるそうじゃ。"
80000120-30 = "[s1] \"そんな効果まで！\"\n[s2] \"おかわりください……！\""
80000120-33 = "先生が山海経に来たときには……好きなだけ振る舞ってやろう。"
80000120-34 = "玄龍門からシャーレに、お茶を送るのも良いな。"
80000120-35 = "もちろん、妾がシャーレを訪ねてもよい。"
80000120-36 = "……先生自身は茶芸を学んでみようとは思わぬのか？"
80000120-37 = "妾の淹れるお茶が好き……？"
80000120-38 = "はぁ……。"
80000120-39 = "[ruby=そなた]其方[/ruby]の欠点は、まさにここにある。"
80000120-40 = "[s] \"そ、そうかな……？\""
80000120-41 = "分かっておらぬのか……。"
80000120-42 = "本当に自覚がないのなら――"
80000120-43 = "それもまた、欠点じゃのう。"
80000120-44 = "……意地の悪い先生には、仕置きが必要じゃ。"
80000120-45 = "なにがいいかのう……。"
80000120-46 = "ふむ……そうさな。今後も先生のいる場に「突撃」し、困らせるとしようか。"
80000120-47 = "[s] \"お手柔らかにお願いします……。\""
80000120-48 = "善処しよう。"
80000120-49 = "ふふっ。仕置きというのは……"
80000120-50 = "ほんの冗談じゃ。"
80000120-51 = "……それに、意地悪で言えば、妾も同じことじゃからの。"
80000120-52 = "実はの、このお茶に――"
80000120-53 = "少し、「悪戯」をさせてもらった。"
80000120-54 = "[s3] \"ど……どんな！？\"\n[s4] \"そういえば、強烈なチョコレートの香りがしてきたような……？\""
80000120-57 = "ふふ。気付いたかの？"
80000120-58 = "錬丹術研究会に頼んでの……妾のお茶に「仕掛け」をしたのじゃ。"
80000120-59 = "カカオニブの、もう一つの効果――"
80000120-60 = "血液の循環を促進し、疲労を回復させ、さらに――"
80000120-61 = "今回は、さらにもう一つ「効果」を足してもらった。"
80000120-62 = "なに――"
80000120-63 = "怯えるようなものではない。"
80000120-64 = "今日はチョコレートを味わう日……ただ、それだけのことじゃ。"
80000120-69 = "（キサキが突然立ち上がり、近づいてきた……）"
80000120-70 = "わかるかのう、"
80000120-71 = "この、香りが……。"
80000120-72 = "[s] \"わ、わかるけど……！\""
80000120-73 = "ふふ。ならば良い。"
80000120-75 = "今日がなんの日かくらいは知っておるじゃろう？"
80000120-76 = "この日は、大切な者にチョコレートで想いを伝えるのが習わしだという。"
80000120-77 = "ふふ……妾なりの贈り方を考えたのじゃ。"
80000120-78 = "（腰が抜けるほどの濃厚なチョコレートの香りが、体中を包み込んでいく……！）"
80000120-79 = "さあ、先生。"
80000120-80 = "五感全てで、今日を楽しむとよい……。"
