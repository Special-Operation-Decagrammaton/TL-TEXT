[translation]
12200-1 = "Episódio 20; Epílogo"
12200-2 = "Olá, Sensei."
12200-3 = "O dia a dia do Comitê de Contramedidas de Abydos continua agitado como sempre."
12200-4 = "Depois daquilo, o Comitê de Contramedidas foi oficialmente reconhecido como um comitê legítimo da Escola de Abydos, graças à certificação oficial do Sensei."
12200-5 = "Passamos por maus bocados por não sermos reconhecidos, então é um grande alívio."
12200-6 = "Graças a isso, o Comitê de Contramedidas também assumiu oficialmente o papel de conselho estudantil de Abydos."
12200-7 = "Pessoalmente, eu queria que a Hoshino-senpai se tornasse a presidente do conselho estudantil, mas ela recusou categoricamente..."
12200-8 = "A nova presidente do conselho estudantil ainda não foi decidida."
12200-10 = "Bem-vindo! É o Lámen Shibaseki!"
12200-12 = "O Lámen Shibaseki reabriu no formato de barraca de comida."
12200-15 = "Parece que os clientes estão voltando, então a Serika-chan também voltou a trabalhar aqui como meio período."
12200-17 = "O mestre também está trabalhando com mais energia do que nunca... parece que a aposentadoria ainda vai demorar um pouco."
12200-19 = "Graças ao Sensei, o caso da Hoshino-senpai foi resolvido, mas a dívida de Abydos continua sendo de 900 milhões... bem, isso não mudou muito desde o início..."
12200-20 = "Disseram que a Kaiser Loan sofreu uma investigação do Conselho Estudantil Geral após as transações financeiras ilegais no mercado negro terem sido descobertas."
12200-21 = "Será que a Trinity agiu após o relatório da Hifumi-san...?"
12200-22 = "Honestamente, duvido que o Conselho Estudantil Geral consiga investigar isso direito, mas... ainda assim, acho que a situação vai mudar um pouco."
12200-23 = "Dizem que o diretor da Kaiser Corporation foi colocado na lista de procurados como o principal suspeito do caso de sequestro de estudantes."
12200-24 = "Dito isso, como o Conselho Estudantil Geral não está funcionando muito bem agora, talvez não seja tão fácil capturá-lo..."
12200-25 = "Dizem que a Kaiser Corporation o demitiu imediatamente para alegar que não tinha relação com ele. Os adultos são assustadores, não são...?"
12200-26 = "Ah, e sobre aqueles juros abusivos, isso também foi levantado como um problema, e no fim das contas, conseguimos pagar uma taxa muito menor do que antes, o que nos ajudou muito."
12200-28 = "No entanto, a maior parte do distrito autônomo de Abydos continua sob posse da Kaiser Corporation..."
12200-29 = "Como a transação entre Abydos e a Kaiser Corporation em si não era ilegal, parece que não há muito o que fazer por enquanto."
12200-30 = "O que eles estavam planejando naquele lugar... no fim, nunca descobrimos."
12200-32 = "Falando nisso, o pessoal da Loja de Conveniências parece ter montado um escritório em algum lugar novamente."
12200-33 = "Mas há muitos rumores conflitantes, então não sei se é no distrito de Gehenna ou em outro lugar..."
12200-34 = "Disseram que eles estão na mira do Comitê Disciplinar de Gehenna, então com certeza as coisas devem estar difíceis para eles..."
12200-36 = "E sobre aquela pessoa chamada 'Kurofuku' (Terno Preto)."
12200-37 = "Investiguei com base nas informações que o Sensei e a Hoshino-senpai me deram, mas... não apareceu nada de concreto."
12200-38 = "Parece que toda a culpa foi jogada nas costas do diretor da Kaiser... o nome verdadeiro e a identidade do 'Kurofuku' continuam um mistério..."
12200-39 = "Parece que o resto ficará a cargo do 'Schale'."
12200-41 = "...Bem, vamos começar a reunião regular do Comitê de Contramedidas de Abydos."
12200-42 = "Muita coisa aconteceu ultimamente, mas, no final, a dívida não desapareceu."
12200-43 = "Mas os juros mensais diminuíram bastante."
12200-44 = "É verdade~ Já que o peso diminuiu, que tal tirarmos uma soneca?"
12200-45 = "Sim, sim! Estivemos muito ocupadas ultimamente, então sou totalmente a favor de relaxar!"
12200-46 = "O que você está dizendo!! Talvez tenhamos um pouco mais de folga, mas não temos tempo para essas coisas!"
12200-47 = "Serika-chan..."
12200-48 = "Como responsável pelas finanças do Comitê de Contramedidas, preciso dizer: ainda estamos no meio de uma crise! Não temos folga nenhuma!"
12200-49 = "Ah, sim..."
12200-50 = "Dito isso, eu pesquisei as últimas tendências!"
12200-52 = "Alguém sabe o que é isso?"
12200-53 = "Hum... peças de computador?"
12200-54 = "Isso se chama placa de vídeo, e serve para minerar uma criptomoeda chamada Scan Coin!"
12200-55 = "Criptomoeda é... o quê!? Por que todos estão me olhando com esse olhar de pena!?"
12200-56 = "Deixando de lado as histórias de golpe da Serika, existe um método melhor. Olhem só, se invadirmos o prédio por este caminho—"
12200-57 = "Ambas as ideias foram rejeitadas~"
12200-58 = "...O Comitê de Contramedidas continua sendo assim."
12200-59 = "Voltamos ao nosso ritmo de sempre, onde nada muda..."
12200-60 = "...Mas, sinceramente, estou muito feliz."
12200-64 = "O relatório da situação atual termina aqui. Bem, continuaremos contando com você. Sensei."
12200-65 = "O que foi perdido, o que não foi deixado para trás"
12200-67 = "Capítulo do Comitê de Contramedidas; Continua no Capítulo 3"
