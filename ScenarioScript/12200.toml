[translation]
12200-1 = "第20話;エピローグ"
12200-2 = "こんにちは、先生。"
12200-3 = "アビドス対策委員会の一日は、今日もまた慌ただしいです。"
12200-4 = "あの後、対策委員会は先生の公的な認証によって、アビドス高等学校の正式な委員会として承認されました。"
12200-5 = "非公認だったせいで酷い目に遭ったという部分も大きいので、一安心です。"
12200-6 = "お陰さまで対策委員会は、正式にアビドス生徒会としての役割も担うことになりました。"
12200-7 = "個人的には、ホシノ先輩に生徒会長になっていただきたかったのですが、断固として拒否されまして……。"
12200-8 = "新しい生徒会長は、まだ決まっていません。"
12200-10 = "いらっしゃいませ！柴関ラーメンです！"
12200-12 = "柴関ラーメンは、屋台の形で再開しました。"
12200-15 = "お客さんも結構来てくれているようでして、セリカちゃんもまたバイトとして復帰することになりました。"
12200-17 = "大将も、以前にも増して元気にお仕事されてますので……引退はまだまだ先の話になりそうです。"
12200-19 = "先生のおかげで、ホシノ先輩の件は解決しましたが、アビドスの借金は相変わらず9億円のままです……まあ、これは最初とあまり変わらないのですが……。"
12200-20 = "カイザーローンはブラックマーケットでの不法な金融取引がバレて、連邦生徒会の捜査が入るとのことでした。"
12200-21 = "ヒフミさんの報告を受けて、トリニティが手を打ってくれたのでしょうか……？"
12200-22 = "正直、連邦生徒会がきちんと捜査してくれるのかどうかは疑わしいですが……それでも、少しは状況が変わると思います。"
12200-23 = "カイザーコーポレーションの理事はあの後、生徒誘拐事件の主な容疑者として指名手配されているそうです。"
12200-24 = "とはいえ、連邦生徒会が今は機能していないので、そうそう簡単には捕まらないかもしれませんが……。"
12200-25 = "カイザーコーポレーションは、自分たちとは関係ないと主張するために、即座に解雇処理を行ったとか。大人って怖いですね……。"
12200-26 = "あ、それからあの無理に上げられた利子についても問題として挙がって、最終的には以前より遥かに少ない利子の支払いで済む形になったので、助かりました。"
12200-28 = "ただ、アビドス自治区の大半は相変わらず、カイザーコーポレーションが所有したままで……。"
12200-29 = "アビドスとカイザーコーポレーションの取引自体は違法ではなかったので、ひとまずは仕方ないみたいです。"
12200-30 = "あの場所で何を企んでいるのか……それは結局分かりませんでした。"
12200-32 = "そういえば、便利屋の方々はまたどこかに事務所を設けたようです。"
12200-33 = "ただ、それがゲヘナの自治区なのか、それとも別の所なのか、噂が錯綜していて詳しくは分からないのですが……。"
12200-34 = "ゲヘナの風紀委員会に睨まれているとのことだったので、色々と大変そうなのは確かですね……。"
12200-36 = "それからあの、「黒服」という人について。"
12200-37 = "先生とホシノ先輩から聞いた情報をもとに調べてみたのですが……特にこれといった情報は何も出てきませんでした。"
12200-38 = "全ての罪がカイザーの理事に被せられたようでして……「黒服」の本当の名前も、正体も分からず……。"
12200-39 = "後は、「シャーレ」にお任せとさせていただくことになりそうです。"
12200-41 = "……それでは、アビドス対策委員会の定例会議をはじめます。"
12200-42 = "ここしばらく色々なことがありましたが、最終的に借金が消えたわけではありません。"
12200-43 = "でも、毎月支払う利子はかなり減った。"
12200-44 = "そうだね～せっかく負担が減ったことだし、ちょっとゆっくり昼寝でもしない？"
12200-45 = "うんうん！このところすっごく忙しかったですし、のんびり過ごすのは大賛成です！"
12200-46 = "何を言ってるの！！少しは余裕ができたかもしれないけど、そんなことしてる暇なんて無いんだから！"
12200-47 = "セリカちゃん……。"
12200-48 = "対策委員会の会計担当として言わせてもらうけど、今もまだ私たちは危機の真っただ中にいるの！余裕なんて全然無いの！"
12200-49 = "う、うん……。"
12200-50 = "というわけで、最新のトレンドを調査してきたわ！"
12200-52 = "これ、何なのか分かる人いる？"
12200-53 = "えっと……パソコンの部品？"
12200-54 = "これはグラフィックボードって言うんだけど、これでスキャンコインっていう仮想通貨を採掘するの！"
12200-55 = "仮想通貨っていうのは……な、なによ！？何でみんなしてそんな、生暖かい目線で見てくるの！？"
12200-56 = "セリカの詐欺話はさておき、もっと良い方法がある。これを見て、この経路で建物に侵入すると――"
12200-57 = "どっちも却下～。"
12200-58 = "……対策委員会は、相変わらずこんな感じです。"
12200-59 = "何も変わらない、いつもの感じに戻ってしまいましたが……。"
12200-60 = "……でも、本当に良かったです。"
12200-64 = "現状の報告は一旦こんなところです。それでは、引き続きよろしくお願いしますね。先生。"
12200-65 = "失ったもの、手放さなかったもの"
12200-67 = "対策委員会編;To be Continued in Chapter 3"
