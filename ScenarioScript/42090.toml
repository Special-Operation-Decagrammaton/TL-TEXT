[translation]
42090-1 = "Episódio 9; Uma nova manhã em D.U."
42090-2 = "（Na manhã seguinte, em frente ao Parque dos Coelhinhos）"
42090-6 = "<Atenção, cidadãos. #n A partir das 0h de hoje, novas ordens administrativas entrarão em vigor.>"
42090-7 = "<Pedimos que os cidadãos verifiquem o conteúdo no site do Conselho Estudantil Federal ou nos avisos fixados nos órgãos administrativos de cada região. Caso haja uma solicitação de inspeção por parte das autoridades, pedimos sua colaboração.>"
42090-8 = "<……O Conselho Estudantil Federal não se responsabiliza por quaisquer prejuízos decorrentes do desconhecimento das ordens administrativas ou da recusa em cooperar com as inspeções.>"
42090-9 = "<Repetindo o aviso aos cidadãos. A partir das 0h de hoje, novas ordens administrativas……>"
42090-10 = "……O que diabos está acontecendo?"
42090-11 = "Quem sabe? Eu é que queria saber."
42090-12 = "Eu até dei uma olhada no site do Conselho Estudantil Federal, mas #n só tem um monte de termos complicados e não entendi nada……."
42090-13 = "Será que o Sensei está bem……? #n Ontem ele foi chamado pelo Conselho Estudantil Federal, não foi……."
42090-15 = "Com certeza ele está bem. #n Não houve grandes mudanças na Torre Sanctum……."
42090-16 = "Além disso, o que precisamos priorizar agora é o que está acontecendo na área urbana."
42090-17 = "É. Além daquela transmissão, também é preocupante ver carros com soldados armados e veículos blindados indo em direção à cidade desde cedo."
42090-18 = "Será que vai acontecer outro golpe de estado?"
42090-19 = "Mas, para isso, está quieto demais, não acha?"
42090-20 = "Mesmo que eu queira verificar a situação, não dá para ver nada da cidade daqui do parque……."
42090-26 = "……Vamos sair do acampamento e verificar a situação na área urbana."
42090-27 = "Pessoal, preparem os equipamentos de reconhecimento e munição. #n Assim que terminarem, partiremos para o destino."
42090-28 = "Espero que não esteja acontecendo nada de grave……."
42090-32 = "Ei, aqueles ali não são as forças especiais da Kaiser Corporation?"
42090-33 = "Por que soldados de uma empresa estão no meio da cidade……?"
42090-35 = "Atenção, cidadãos. Devido às ordens administrativas que entraram em vigor hoje, as operações de manutenção da ordem em 47 distritos administrativos, incluindo a Cidade dos Coelhinhos, foram transferidas para a Kaiser Security."
42090-36 = "Esta é uma operação autorizada pelo representante do Conselho Estudantil Federal. #n A Kaiser Security promete cumprir suas funções de forma justa, seguindo as ordens administrativas."
42090-37 = "Pedimos a compreensão e colaboração de todos os cidadãos――"
42090-39 = "Droga, estou atrasado, atrasado!"
42090-43 = "Ah, por que o sinal está demorando tanto para mudar logo hoje!"
42090-44 = "Desse jeito eu vou me atrasar de verdade……."
42090-45 = "……Não vem nenhum carro. Se for agora――"
42090-47 = "Você aí, pare!"
42090-48 = "Hã!? E-eu……?"
42090-49 = "Isso mesmo, você."
42090-50 = "Você tentou atravessar a faixa de pedestres com o sinal vermelho agora pouco."
42090-51 = "I-isso é…… eu ia me atrasar para um compromisso e acabei fazendo sem pensar……."
42090-52 = "Sinto muito! Mas, por favor, poderia deixar passar só desta vez……?"
42090-53 = "De jeito nenhum! As regras devem ser aplicadas de forma justa a todos!"
42090-54 = "Como punição por ignorar as normas do Conselho Estudantil Federal e #n tentar tumultuar o sistema de trânsito――"
42090-56 = "Vou aplicar uma multa de 100 mil ienes!"
42090-58 = "C-cem mil ienes!? #n Só por ter atravessado no sinal vermelho!?"
42090-59 = "Não, eu sei que estou errado, mas isso é demais……"
42090-60 = "……Devo considerar essas palavras como um ato de rebeldia contra o Conselho Estudantil Federal?"
42090-61 = "――Prendam este indivíduo imediatamente por incitação à desordem!"
42090-62 = "N-não pode ser, que absurdooooo!!"
42090-64 = "Hum, este botão aqui…… para que servia mesmo?"
42090-65 = "Aquele caixa eletrônico ali…… por que está tão cheio?"
42090-66 = "Ei, você aí! O que está fazendo aí parado?"
42090-67 = "Hii……! E-espere um pouco. É que a operação da máquina é difícil……."
42090-68 = "Na minha idade, até para sacar dinheiro demora um pouco……."
42090-69 = "Não quero desculpas! Não está vendo a fila atrás de você!?"
42090-71 = "Não fique enrolando aí! #n Não monopolize um serviço público que todos precisam usar!"
42090-72 = "Ai…… por que isso está acontecendo……."
42090-77 = "Ei, o que é isso que você está segurando na mão?"
42090-78 = "……Eh? É só uma granada de mão……."
42090-79 = "Uma granada de mão, disse?"
42090-80 = "Andar por aí abertamente com uma arma de fogo perigosa, que causa tantos danos apenas puxando o pino e jogando……."
42090-81 = "Você, está planejando cometer um ato de terrorismo, não é!"
42090-82 = "Es-espere um pouco. #nEu nunca ouvi falar que carregar granadas de mão era proibido!?"
42090-83 = "Além disso, granadas de mão são praticamente itens de uso diário em Kivotos, não são!?"
42090-84 = "É proibido portar armas de fogo contendo mais de 100g de explosivos dentro da área jurisdicional de D.U. sem permissão, a partir de hoje, meia-noite!"
42090-86 = "Prendam esse sujeito por tentativa de terrorismo!"
42090-87 = "Ugh…… isso é tão absurdo……!"
42090-89 = "Prisões aqui, prisões ali…… é um festival de prisões, hein."
42090-90 = "Mas, o que é essa história de proibição de carregar granadas? #nEu nunca ouvi falar que existia uma regra dessas!"
42090-91 = "Foi um conteúdo anunciado por ordem administrativa. #nOutras regras relacionadas à segurança pública e controle também foram adicionadas……."
42090-92 = "Mas, por que a Kaiser Corporation está realizando o trabalho de manutenção da ordem pública em vez da Valkyrie?"
42090-93 = "Eles não tinham sido presos no golpe de estado da última vez?"
42090-95 = "Além disso, mesmo que seja para prevenir crimes, #nnão acho correto levar cidadãos à força e incitar o medo."
42090-96 = "Mas…… a área urbana hoje está realmente estranhamente silenciosa……."
42090-97 = "É verdade~ Normalmente, sempre tem uma ou duas pessoas atirando para todo lado ou jogando bombas, né."
42090-99 = "Nesta situação, onde você é preso imediatamente se sacar uma arma ou bomba, #nparece que não houve nenhum idiota tentando causar confusão."
42090-100 = "（……De alguma forma, sinto um sentimento estranho）"
42090-101 = "（É uma sociedade onde todos seguem as regras e a justiça é realizada pela lei…… #nmas não consigo me sentir nem um pouco tranquila）"
42090-102 = "（Será que esta é a forma da justiça que eu sonhava……?）"
42090-104 = "Ei, você aí. Identifique-se."
42090-106 = "Ora, ora…… vocês não nos conhecem?"
42090-107 = "Qualquer um que busque uma vida de pobreza voluntária deveria nos conhecer…… #nVocês parecem ter vivido vidas bem distantes disso."
42090-111 = "Meu nome é Descartes. #nSou o líder da Associação de Busca pelo Caminho da Pobreza Voluntária — o \"Grupo que busca a verdadeira felicidade sem possuir nada\", #nabreviado como \"Shokakuko\"!"
42090-112 = "Shokakuko……?"
42090-113 = "Sim. Nós somos buscadores que vivem em ruínas, com o lema de não trabalhar e não possuir nada."
42090-114 = "O que acham, vocês também têm interesse em uma vida de pobreza voluntária—"
42090-115 = "Bravo 1, leve-os."
42090-119 = "Es-es-espere, por favor!? #nO que nós fizemos!?"
42090-120 = "Se vão nos levar, não deveriam dizer o motivo!?"
42090-121 = "……É justamente porque não fizeram nada."
42090-122 = "Vocês não passam de pragas que parasitam esta sociedade, desejando recursos sem trabalhar."
42090-123 = "Para a sobrevivência de uma sociedade saudável, #né necessário reabilitar parasitas sociais como vocês."
42090-124 = "Portanto, enviaremos vocês para as instalações de agenciamento de emprego da Kaiser Corporation. #nSe conseguirem um trabalho lá e começarem a trabalhar, logo renascerão como trabalhadores maravilhosos que contribuem para a sociedade!"
42090-125 = "Nã-não querooooo!!"
42090-127 = "Eu não quero virar um escravo corporativooooo!!!!"
42090-128 = "Espere um pouco."
42090-132 = "Por mais que seja pela segurança pública, #nvocês não podem levar cidadãos sem um mandado."
42090-133 = "Se continuarem abusando da autoridade, nós vamos……"
42090-134 = "O que está dizendo? Esta é uma \"ordem\" da Presidente do Conselho Estudantil Federal substituta — pretende desobedecer?"
42090-135 = "Uma ordem, é……."
42090-137 = "Armas têm valor justamente porque não julgam por si mesmas."
42090-139 = "……."
42090-140 = "Mas, de qual escola vocês são? #nÉ a primeira vez que vejo esse uniforme."
42090-141 = "Eh, da SRT Special Academy, mas……."
42090-142 = "……SRT Special Academy? #nNão havia tal escola na lista de escolas."
42090-143 = "O quê? Está querendo briga?"
42090-144 = "……Bem, se não conhece, não tem problema. #nÉ só te ensinar com bastante calma a partir de agora, né? #nKuhihihi……."
42090-145 = "Além disso, parece que vocês possuem muitas armas de fogo que violam as ordens administrativas..."
42090-150 = "Vou prender todos vocês! Joguem as armas no chão agora mesmo e levantem as mãos!"
42090-154 = "……RABBIT 1, qual a resposta?"
42090-155 = "……Permissão concedida. Ao sinal, imediatamente――"
42090-157 = "……Não importa, deixem que eles vão."
42090-159 = "Faz tempo, RABBIT Squad."
42090-160 = "Você é…… aquele de antigamente……?"
42090-161 = "O comandante que tentou explodir o prédio bem na nossa frente durante a operação de retomada do Schale?"
42090-162 = "É uma honra que a elite da Academia Especial SRT tenha se lembrado da minha decisão."
42090-163 = "……Não."
42090-164 = "Na verdade, eu me lembrei de vocês porque a forma como se debatiam foi marcante."
42090-165 = "Fufu…… houve isso também, não é?"
42090-166 = "De fato, naquela época eu subestimei vocês."
42090-167 = "Mas agora é diferente. Eu não sou um incompetente que não consegue aprender com os próprios erros."
42090-169 = "……Por que nos deixou escapar?"
42090-170 = "Porque recebi uma \"ordem\"."
42090-171 = "Diretamente da Presidente Interina do Conselho Estudantil Geral, proibindo qualquer hostilidade contra as alunas da Academia Especial SRT."
42090-172 = "A Chefe do Gabinete de Defesa, Kaya……?"
42090-173 = "Sim. #n――Falando nisso, ela também disse que pretende restaurar a Academia Especial SRT e colocá-la sob seu comando."
42090-174 = "Se isso acontecer, vocês serão nossas aliadas. #nNão há vantagem alguma em ser hostil com futuras amigas."
42090-175 = "A restauração…… da Academia Especial SRT……."
42090-177 = "Hm? Estão com uma aparência ruim. Estão se alimentando direito?"
42090-178 = "Se o suprimento não for suficiente, nós da Kaiser Corporation podemos ajudar. #nOra, seja munição ou suprimentos, temos estoque de sobra. #nSe precisarem, posso fazer a Kaiser Express entregar na frente do parque a qualquer momento."
42090-180 = "Mesmo que o que precisem sejam armas que violam os regulamentos……"
42090-182 = "Não é impossível ajudar."
42090-183 = "……É uma oferta tentadora, mas ser tratado com tanta gentileza assim chega a ser suspeito."
42090-184 = "É…… por que tanta bondade?"
42090-185 = "Mesmo que nosso plano tenha falhado por causa de vocês e tenhamos sofrido grandes prejuízos……."
42090-186 = "Você não nos odeia?"
42090-188 = "Fufu, que pergunta óbvia."
42090-193 = "――Ah, é claro que eu detesto vocês da SRT."
42090-194 = "Vocês possuem um poder imenso que uma pessoa comum jamais conseguiria, mesmo se esforçando a vida toda, #ne o desperdiçam em coisas inúteis como justiça e convicções……."
42090-195 = "Graças a essa brincadeira de justiça ridícula, #neu quase perdi tudo o que levei meia vida para construir."
42090-196 = "Dá vontade de fazer todos vocês se ajoelharem aqui e pisar em suas cabeças com meus sapatos, e ainda seria pouco……!"
42090-197 = "I-iiih……."
42090-198 = "……Mas, não importa o quanto eu odeie alguém, #nser capaz de apertar a mão com um sorriso é o que define um profissional."
42090-199 = "Se você escolher com quem se relacionar baseado em rancores pessoais, nunca alcançará grandes feitos."
42090-200 = "Nesse sentido, a Presidente Interina Kaya é um exemplo realmente admirável. #nMesmo sendo uma traidora que apontou uma arma para a nuca dela, ela estende a mão sem hesitar pelo bem do futuro."
42090-201 = "O vínculo entre aqueles que entendem como usar uns aos outros é mais forte do que qualquer coisa."
42090-202 = "Coisas inúteis como amizade ou camaradagem são apenas ilusões para consolar os incapazes."
42090-203 = "……Você não tem convicções?"
42090-204 = "Convicções? É claro que eu tenho. #nMas isso é um assunto à parte da execução de uma missão."
42090-205 = "Receber ordens e executá-las. Mesmo que sejam diferentes das minhas próprias convicções."
42090-206 = "Isso é o que define um profissional correto e a forma correta de ser uma unidade especial."
42090-207 = "Comparadas a isso, vocês são como…… bebês que apenas possuem poder."
42090-208 = "São covardes que se enfurecem com a injustiça diante dos olhos, mas fecham os olhos para o absurdo que não conseguem alcançar."
42090-209 = "É por isso que, embora possam vencer em \"combates\", nunca vencerão uma \"guerra\"."
42090-214 = "……."
42090-215 = "……Vamos embora."
42090-216 = "Já coletamos informações suficientes do local."
42090-220 = "Já vai? Por que não leva alguns suprimentos?"
42090-221 = "Não, obrigada."
42090-222 = "Não sou tola o suficiente para ficar em dívida com alguém que nem sei o que deseja."
42090-223 = "Haha, a líder do esquadrão parece ser bem esperta. Fico aliviado."
42090-224 = "Então, até a próxima."
42090-229 = "Tsc... Por que eu tive que ouvir sermão de um cara daqueles?"
42090-230 = "……Tem algo estranho."
42090-231 = "O quê? Tem alguma sujeira no meu rosto?"
42090-232 = "Não, é sobre quando aquele comandante te provocou."
42090-233 = "Sendo a Saki, eu achei que você ia perder a cabeça e atacar no meio da conversa, mas você aguentou até o fim."
42090-234 = "Kuhihi, você cresceu, que orgulho~"
42090-235 = "O que você acha que eu sou, Moe? Não sou tão idiota a ponto de atacar naquela situação."
42090-236 = "……Além disso, as últimas palavras dele não estavam totalmente erradas."
42090-237 = "Não importa o quanto a gente derrote o inimigo em combate, se os superiores mudarem a situação, não há como vencer a guerra."
42090-238 = "Pois é. No fim das contas, somos apenas membros de esquadrão que seguem ordens e executam missões."
42090-239 = "E é verdade que, se priorizarmos nossas emoções, não conseguiremos nos concentrar na batalha..."
42090-241 = "……."
42090-242 = "Miyako, o que vamos fazer agora?"
42090-243 = "H-hein? Agora, como assim?"
42090-244 = "Tem várias coisas, não tem? Como aquele assunto do destacamento que as veteranas do FOX Squad mencionaram ontem."
42090-245 = "Sinceramente, não estou muito animada, mas... se a academia for revivida, não faz sentido continuar com os protestos..."
42090-246 = "Talvez ouvir o que as veteranas disseram seja a melhor escolha."
42090-248 = "Na verdade, eu também não sei mais se precisamos continuar ficando no parque..."
42090-249 = "Os suprimentos estão ficando cada vez mais difíceis de conseguir, e quando o inverno chegar, vai ser difícil até conseguir água..."
42090-250 = "Eu... tanto faz, mas..."
42090-255 = "……É verdade."
42090-260 = "(Já que a Chefe Kaya garantiu a reabertura da Academia Especial SRT, não há motivo para continuarmos neste parque.)"
42090-261 = "(...Se formos para onde as veteranas estão, teremos uma vida regrada, equipamentos poderosos e quartos aquecidos... teremos tudo.)"
42090-262 = "(Mas, e os sonhos e crenças que eu tinha desde que entrei na academia... o que será deles...)"
42090-263 = "(............Mas, se for pelo bem de todas...)"
42090-266 = "……Pessoal, um momento, por favor."
42090-267 = "Antes da decisão final, tenho algo a perguntar a vocês."
42090-269 = "Próximo episódio: Fora de Controle"
