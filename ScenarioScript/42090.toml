[translation]
42090-1 = "Episódio 9: Uma Nova Manhã no Distrito D.U."
42090-2 = "(Manhã seguinte, em frente ao Parque dos Coelhinhos)"
42090-6 = "<Atenção, cidadãos. Atenção.#n A partir das 00:00 de hoje, Decretos Executivos de Nível Crítico entraram em vigor em todo o território.>"
42090-7 = "<Os cidadãos devem verificar imediatamente os portais do Conselho Estudantil e as agências locais para conhecerem as novas regras. Solicitamos obediência irrestrita aos novos postos de controle de segurança espalhados pela cidade.>"
42090-8 = "<……O Conselho Estudantil Geral isenta-se de qualquer responsabilidade ou dano causado a cidadãos que alegarem ignorância dos decretos ou resistirem à fiscalização das forças de segurança.>"
42090-9 = "<Repetindo. A partir das 00:00 de hoje, Decretos Executivos de Nível Crítico…>"
42090-10 = "……Alguém me explica que porra tá acontecendo?"
42090-11 = "Sei lá, eu ia perguntar a mesma coisa pra você."
42090-12 = "Eu abri a página do Conselho pelo celular hoje cedo, mas#ntá tudo enterrado num juridiquês nojento que eu não consegui entender uma linha…"
42090-13 = "O Professor… será que ele está bem…?#nEle foi intimado na base inimiga ontem à tarde e sumiu…"
42090-15 = "Ele deve estar a salvo.#nNós não vimos fumaça na Torre Sanctum, então a negociação não deve ter acabado em tiroteio…"
42090-16 = "A nossa prioridade primária é entender a anomalia que tá infestando o centro da cidade agora."
42090-17 = "É. Aquela sirene bizarra lá em cima não é a única coisa estranha. Eu vi jipes militares e caveirões blindados cortando as avenidas desde o amanhecer."
42090-18 = "Será que algum outro maluco tá tentando dar um golpe de estado de novo?!"
42090-19 = "Poderia ser, mas… pra um golpe, a cidade tá quieta demais."
42090-20 = "E pra piorar, o muro do parque bloqueia o nosso campo de visão. Daqui a gente não enxerga nada."
42090-26 = "……Não dá pra ficar no escuro. Vamos abandonar o acampamento temporariamente e fazer reconhecimento nas ruas."
42090-27 = "Esquadrão RABBIT, puxem equipamento tático leve e carreguem os pentes.#nVamos infiltrar a zona urbana e colher informações visuais."
42090-28 = "Espero que o mundo não tenha virado de pernas pro ar de ontem pra hoje…"
42090-32 = "Ei… aqueles coturnos ali… não são os fuzileiros particulares da Kaiser Corporation?"
42090-33 = "O que cães de guarda corporativos estão fazendo patrulhando uma avenida pública…?"
42090-35 = "Atenção, cidadãos. Por força do Decreto Executivo Nº 1, a partir deste amanhecer, a jurisdição de segurança pública de 47 distritos administrativos, incluindo a Vila dos Coelhinhos, foi transferida para a Kaiser Security."
42090-36 = "Nós operamos sob a bênção e ordem direta da Presidência Interina do Conselho Estudantil.#nA Kaiser Security jura trazer ordem absoluta, eficiência e justiça às ruas de Kivotos."
42090-37 = "A resistência é inútil. Exigimos a colaboração civil para um amanhã perfeito――"
42090-39 = "Tô lascada! Atrasada, muito atrasada!"
42090-43 = "Aaargh! Justo hoje que eu preciso correr, o farol vermelho não abre nunca!"
42090-44 = "Se eu perder essa prova eu tô ferrada…"
42090-45 = "……A rua tá vazia. Foda-se, eu vou correr pro outro lad--"
42090-47 = "Cidadã, congele agora!"
42090-48 = "E-Eh?! V-Você tá falando comigo…?"
42090-49 = "Exatamente. Com você, infratora."
42090-50 = "Você cruzou a calçada e estava na iminência de avançar o sinal de pedestres vermelho. Uma violação direta das leis de trânsito."
42090-51 = "I-Isso… é que eu tô extremamente atrasada pro colégio e a rua tava morta de vazia, então eu meio que…"
42090-52 = "Mil desculpas! Foi sem pensar! Eu juro que nunca mais faço isso, moço! Me deixa ir…?!"
42090-53 = "Negativo! A tolerância às infrações corrompe a sociedade! A lei é a foice que corta todos por igual!"
42090-54 = "Pela violação intencional das normas do Conselho Estudantil#ne crime de distúrbio contra o fluxo viário urbano――"
42090-56 = "Pague a multa imediata de 100 Mil Ienes!"
42090-58 = "C-CEM MIL IENES?!#nVOCÊ FICOU LOUCO?! EU SÓ IA ATRAVESSAR FORA DA FAIXA!!"
42090-59 = "E-Eu sei que tava errada, mas não acha que cem mil ienes é extorqu――"
42090-60 = "……Insulto a uma autoridade fardada? Está desafiando o julgamento do Conselho Estudantil?"
42090-61 = "――Infratora presa em flagrante delito sob acusações de fomento de rebelião e desacato!"
42090-62 = "ISSO É LOUCURA!! ME SOLTA, SEU MANÍACO!!"
42090-64 = "Uhn… esses botões de touch-screen modernos… qual deles é o do saldo, afinal…?"
42090-65 = "Pelo amor de Deus… por que essa fila do caixa eletrônico tá parada há meia hora?"
42090-66 = "Ei, seu imprestável aí da frente! Você tá dormindo no caixa ou o quê?!"
42090-67 = "Hiiih… p-perdão, tenha paciência… os menus dessas máquinas são confusos demais…"
42090-68 = "Na minha idade, os olhos falham e o dedo não acerta o botão direito…"
42090-69 = "Cale a boca e desocupe o terminal! Você é cego e não viu a fila quebrando a esquina?!"
42090-71 = "Vadiar no caixa e monopolizar equipamentos públicos é um crime de perturbação de ordem!#nSeus direitos civis estão suspensos!"
42090-72 = "Uuuuuh… como esse mundo ficou tão cruel…"
42090-77 = "Você aí. Pare onde está. O que é esse objeto de formato suspeito pendurado na sua mochila?"
42090-78 = "……Quê? É só uma granada de fragmentação básica. E daí?"
42090-79 = "Granada de fragmentação?!"
42090-80 = "Uma arma letal projetada para derramar sangue e mutilar dezenas de civis inocentes pendurada na bolsa como enfeite?!"
42090-81 = "Você está montando uma célula terrorista no centro da cidade, não está?!"
42090-82 = "E-EI, vai com calma, idiota!!#nQue papo é esse de proibido? Granadas são permitidas!"
42090-83 = "Desde quando é crime carregar explosivo?! As meninas levam granada junto com o estojo de lápis em Kivotos!!"
42090-84 = "Decreto Administrativo Nº 42, em vigor a partir da zero hora de hoje: Fica estritamente proibido o porte em via pública de qualquer artefato contendo mais de 100 gramas de carga explosiva sem licença expressa corporativa!"
42090-86 = "Prendam e isolem esse terrorista potencial!!"
42090-87 = "ISSO É UMA DITADURA, CARALHO…!!"
42090-89 = "Ajoelhando cidadãos aqui, algemando estudantes acolá… O bagulho virou um festival de fascismo na rua."
42090-90 = "E desde quando granada de bolso é ilegal em Kivotos?!#nQuem foi o palhaço que passou uma lei dessas sem avisar?!"
42090-91 = "Tudo fruto das tais 'Ordens Executivas' citadas de madrugada.#nA cidade tá infestada de leis de controle draconianas e armadilhas burocráticas…"
42090-92 = "Mas a pergunta que não quer calar: por que diabos a Kaiser Corporation tomou as chaves da segurança pública que pertenciam à Valkyrie?!"
42090-93 = "Eu juro que a gente tinha estourado a base da Kaiser por tentar dar um golpe não faz nem um mês!"
42090-95 = "E pior, mesmo com o pretexto de 'Segurança'…#nArrastar civis pelas ruas com violência cega só tá criando terror e pânico, não justiça."
42090-96 = "Mas… você tem que admitir que hoje o asfalto tá quieto como um cemitério…"
42090-97 = "Tem razão~. Normalmente, numa manhã dessas, a gente ouviria pelo menos uns três tiroteios de gangues ou banco explodindo no quarteirão do lado."
42090-99 = "Com os blindados da Kaiser nas ruas e punições absurdas até por cuspir no chão,#nos baderneiros se encolheram de medo. A violência caiu a zero."
42090-100 = "(……Isso é muito perturbador.)"
42090-101 = "(Todo mundo tá em silêncio. As leis estão sendo aplicadas como navalhas, e os crimes sumiram. É uma paz forçada…#nMas eu nunca senti tanto nojo e calafrio andando na rua.)"
42090-102 = "(Será que… essa submissão doentia é o 'Certo' que eu lutei tanto pra proteger…?)"
42090-104 = "Você aí. Detenha-se. Identificação imediata."
42090-106 = "Oh, meus bons rapazes da lei… vocês não reconhecem os iluminados na sua frente?"
42090-107 = "Qualquer habitante de Kivotos que busca a verdadeira Salvação da Alma através da Fome e da Pobreza Extrema saberia nossos nomes…#nMas noto que a alma de vocês é suja de consumismo e carnificina."
42090-111 = "Meu nome é Descartes.#nEu sou o Líder Supremo da Irmandade Ascendente da Pobreza, 'A Busca Pela Felicidade no Nada'――#nou, pros íntimos, a FeliSem!"
42090-112 = "FeliSem…?"
42090-113 = "Exatamente! Nosso mantra é: não trabalhar, não ter dinheiro e não ter posses!#nNós vivemos de restos nas ruínas e meditamos na sarjeta para alcançar o paraíso interior!"
42090-114 = "O que acham, nobres mercenários? Gostariam de se libertar do salário opressor e abraçar o mendigo dentro de voc――"
42090-115 = "Bravo 1, prenda esses vagabundos."
42090-119 = "P-P-P-PERAÍ, GENTE?!#nO que foi que nós fizemos?!"
42090-120 = "Nós não roubamos nada! O arruaceiro tem o direito de saber seu crime antes de ser trancafiado!!"
42090-121 = "……O seu crime é não fazer nada."
42090-122 = "Vocês são sanguessugas nojentos. Vermes que respiram o nosso ar, usam nosso asfalto e não geram um centavo de lucro ou produtividade pra Kaiser."
42090-123 = "Pra limpar a estética urbana e otimizar os cofres do governo,#npragas mendicantes como vocês precisam ser reeducadas à força."
42090-124 = "Eu vou enviar você e a sua laia para o 'Centro de Realocação e Disciplina de Mão de Obra' da Kaiser Corporation.#nLá vocês aprenderão a trabalhar quebrando pedra até as mãos sangrarem. Em breve, serão escravos perfeitos e produtivos para o sistema!"
42090-125 = "NÃOOO!! MENTIRAAA!!"
42090-127 = "A MINHA ALMA É LIVRE!! EU ME RECUSO A BATER PONTO E TRABALHAR EM ESCRITÓRIO!! SOCORRO!!"
42090-128 = "Segurem eles aí."
42090-132 = "Mesmo que vocês usem a desculpa de manter a 'ordem',#nprender civis por vadiagem e mandá-los para campos de trabalho forçado é um crime constitucional de sequestro."
42090-133 = "Se continuarem agredindo a liberdade das pessoas e abusando da força, a SRT vai ter que fuzilar vo――"
42090-134 = "Que piada. Você vai 'fuzilar' a ordem emanada diretamente do Trono da Nova Presidente do Conselho Estudantil? Você é uma anarquista?"
42090-135 = "Ordem direta… do Conselho…"
42090-137 = "«A única utilidade e valor de uma arma… reside no fato de que ela não pensa, ela apenas executa.»"
42090-139 = "……"
42090-140 = "Pensando bem, que farda de segunda categoria é essa que vocês estão usando?#nEu não reconheço essa academia."
42090-141 = "Ahm… nós somos as cadetes especiais da SRT."
42090-142 = "……SRT?#nNão existe nenhuma escola legalizada com essa sigla ridícula no nosso banco de dados. Vocês são fraude."
42090-143 = "COMO É QUE É?! Cê quer morrer, seu babaca?!"
42090-144 = "……Ah, vocês não sabem de onde viemos? Que peninha.#nDeixa que eu vou ensinar com bala de grosso calibre até vocês decorarem o nome…#nKuhihihi…"
42090-145 = "Além da farda ilegal, vocês estão ostentando fuzis e granadas de padrão militar de alto poder destrutivo… Isso é uma violação gravíssima das novas portarias…"
42090-150 = "TODAS AS INFRATORAS SOB PRISÃO IMEDIATA! JOGUEM AS ARMAS NO CHÃO E DEITEM NO ASFALTO COM AS MÃOS NA CABEÇA!!"
42090-154 = "……RABBIT1. Como procedo?"
42090-155 = "……Liberação concedida. No meu sinal, quero fogo total na cab――"
42090-157 = "……Abaixe as armas. Deixem elas passarem."
42090-159 = "Há quanto tempo, Esquadrão RABBIT."
42090-160 = "Você… eu conheço esse rosto…"
42090-161 = "Quando invadimos a Schale pra resgatar o Professor, você era o oficial fardado que estava supervisionando a detonação das bombas no andar de cima!"
42090-162 = "Fico extremamente lisonjeado em saber que uma mente tática do meu nível gravou uma impressão nas gloriosas veteranas da… ops, da finada SRT."
42090-163 = "……Na verdade, não."
42090-164 = "A gente só lembrou do seu rosto porque foi muito engraçado ver o seu exército levar uma surra de crianças como nós e ver você correr igual um covarde."
42090-165 = "Fufu… você tem língua afiada. E você tem razão."
42090-166 = "Cometi o erro de julgar que coelhinhas sem teto não saberiam manusear um fuzil."
42090-167 = "Mas os tempos mudaram. E, diferente do populacho medíocre, eu sou um estrategista corporativo.#nEu aprendo com o meu sangue e não repito as falhas de ontem."
42090-169 = "……Se você sabe quem somos e é o líder da Kaiser, por que abaixou a arma e está nos poupando?"
42090-170 = "Porque eu não sou um cão selvagem, eu obedeço 'Ordens'."
42090-171 = "Um memorando da Presidente Kaya chegou à minha mesa: 'É terminantemente proibido qualquer engajamento letal ou atrito contra os remanescentes da SRT'."
42090-172 = "Uma ordem direta… da Chefe Kaya…?"
42090-173 = "De fato.#n――Ela me confidenciou, nos bastidores, que a ressurreição da Academia SRT e a submissão de vocês à causa dela são favas contadas."
42090-174 = "Se isso se concretizar amanhã, nós, da Kaiser, e vocês da SRT comeremos do mesmo prato. Seremos aliados de trincheira.#nAtirar no meu futuro parceiro de negócios hoje não é rentável."
42090-175 = "A ressurreição… da nossa Academia…!"
42090-177 = "Mas vejam só… a cor da pele de vocês tá horrível. E vocês estão com fome, não estão?"
42090-178 = "A pobreza nas trincheiras é brutal. Se a logística falhar, deixem a Kaiser Corporation cobrir as suas costas.#nNossos armazéns transbordam munição de chumbo e de boca. Se quiserem, mandamos os caminhões da Kaiser Express descarregarem no parque hoje à noite."
42090-180 = "Até mesmo… se o que vocês desejam forem certas armas 'ilegais'…"
42090-182 = "Posso providenciar a entrega por debaixo da mesa, com um sorriso."
42090-183 = "……Sabe que, no mundo adulto, quando a esmola é tanta assim, o santo quer arrancar o seu rim fora, né?"
42090-184 = "Sim… A sua gentileza sínica me enoja. Você perdeu rios de dinheiro quando explodimos os esquemas de corrupção do seu Chefe.#nAs suas operações milionárias desmoronaram por nossa culpa…"
42090-186 = "E agora você finge bondade e tenta nos comprar?#nVocê nos odeia até a medula óssea, não odeia?"
42090-188 = "Fufu, não faça perguntas tão banais se você já sabe a resposta matemática."
42090-193 = "――Sim. O meu ódio pelo que vocês representam é quase divino."
42090-194 = "Gentalha medíocre mata e morre de fome nas ruas para ter um décimo do poder de fogo e da genialidade que a academia depositou nas mãos de vocês… E o que vocês fazem com esse dom?#nSujam o potencial militar e desperdiçam vidas abraçadas numa fantasia barata de 'Honra' e 'Dever'."
42090-195 = "E essa fantasia patética com roupagem de coelho… me custou bilhões. A fortuna, os contatos e os anos que eu passei construindo meu império escorreram pelo ralo por causa da ingenuidade doentia de vocês."
42090-196 = "Se os meus instintos controlassem minha mente agora… eu esmagaria os joelhos de cada uma de vocês com chumbo grosso e chafurdaria as botas na suas caras molhadas de sangue enquanto vocês me pedem perdão…!!"
42090-197 = "Hiiih…"
42090-198 = "……Mas. Engolir a raiva, disfarçar o cheiro de sangue com um perfume caro e apertar a mão de quem quer ver você morto…"
42090-199 = "Isso é o que separa os porcos emocionais dos Verdadeiros Adultos e Capitalistas.#nDeixar vinganças banais atrapalharem o lucro é o caminho para a ruína."
42090-200 = "Por esse ponto de vista, a Presidente Kaya é um ícone intocável da modernidade fria.#nMesmo com vocês enfiando armas no rabo dos parceiros dela ontem, ela oferece a maçã do paraíso a vocês hoje. O Pragmatismo em sua essência."
42090-201 = "Quando predadores entendem a utilidade de quem está ao redor, o império cresce. Laços de sangue não pagam contas."
42090-202 = "Conversinhas sobre 'Honra', 'Camaradagem' ou 'Sacrifício' são drogas entorpecentes que os fracos inventam para mascarar a própria incompetência de não ter dinheiro para dominar."
42090-203 = "……Você tem alguma alma ou convicção debaixo desse paletó…?"
42090-204 = "Convicções? Eu durmo abraçado com elas. Mas não sou um amador que confunde crença pessoal com objetivo corporativo."
42090-205 = "Nós não criamos o cardápio, nós comemos o prato. Se a diretoria mandar aniquilar, eu aniquilo sem hesitar, ainda que o alvo seja um bebê ou a minha própria mãe."
42090-206 = "A apatia moral é a virtude máxima de uma Sociedade Adulta e Funcional. E para uma unidade de Forças Especiais Táticas, deveria ser o evangelho."
42090-207 = "A SRT é composta de lixo.#nVocês têm canhões nas mãos, mas mentalidade de crianças de fralda chorando por justiça."
42090-208 = "Cospem chamas quando veem assaltantes na esquina… mas quando a burocracia do mundo desce e quebra vocês no meio, abaixam a cabeça e aceitam a miséria como cães fofos."
42090-209 = "É por essa inconsistência esquizofrênica que vocês vencem tiroteios.#n――Mas perdem a Guerra."
42090-214 = "……"
42090-215 = "……Bateu a retirada. Formação de regresso."
42090-216 = "Nós já sugamos todas as informações vitais dessa calçada."
42090-220 = "Já estão batendo em retirada tão cedo? Não querem levar pelo menos as latas de comida vencida pra casa?"
42090-221 = "Não alimentamos a nossa honra com o lixo da Kaiser."
42090-222 = "Somos imaturas, mas não burras a ponto de assinar uma dívida de sangue com uma corporação mafiosa."
42090-223 = "Hahaha. Pelo menos o cérebro da Comandante não é de isopor. Fico genuinamente aliviado em saber."
42090-224 = "Até a próxima encruzilhada de interesses, Coelhinhas."
42090-229 = "Tch… Eu nunca fiquei com tanta vontade de dar um soco na traqueia de um engravatado antes… Que sermão de filho da puta."
42090-230 = "……Saki, você tá muito quieta. O que te deram?"
42090-231 = "Tá doida, é? O que foi agora, Kurumi me possuindo e eu não tô sabendo?"
42090-232 = "É que… quando aquele lixo engravatado cuspiu na sua cara,"
42090-233 = "Eu já tava me preparando pra segurar o seu braço quando você fosse gritar e engatilhar o fuzil na testa dele.#nMas você ficou plantada ali e engoliu o ódio a seco."
42090-234 = "Kuhihi~ A nossa agressiva vanguardista Saki-chan criou neurônios e maturidade tática!"
42090-235 = "O que cês acham que eu sou, uma macaca de briga que morde em qualquer isca?!#nEu não vou dar de presente pra Kaiser a chance de ter uma desculpa legal pra fuzilar a gente na rua!"
42090-236 = "……E outra. O babaca tinha um fundo de razão escondido na sujeira dele."
42090-237 = "Seja franco-atirador ou demolição, a gente só obedece ordens.#nEnquanto os engravatados do Conselho puderem apertar um botão no escritório e apagar o mapa inteiro, a gente pode derramar sangue todo dia que NUNCA vamos 'Vencer a Guerra'."
42090-238 = "Real… As nossas armas são brilhantes, mas, no fim, somos o cachorro que os donos mandam morder o osso."
42090-239 = "Se a gente começar a questionar a crueldade do tiro e enfiar sentimentos na arma, o dedo trava.#nE num piscar de olhos, é a gente que vai pro caixão de madeira…"
42090-241 = "……"
42090-242 = "Miyako… sendo pragmática agora. Que diabos a gente faz do nosso futuro?"
42090-243 = "Eh… sobre a janta de hoje ou…?"
42090-244 = "Para com isso, você sabe muito bem do que eu tô falando.#nA oferta do capeta da Yukino de engolir a RABBIT pra dentro do Esquadrão FOX. Lembra?"
42090-245 = "Olha. Meu sangue ferve só de pensar em aceitar. Mas…#nSe o milagre de trazer o nome da nossa amada SRT de volta pra placa do prédio puder ser realizado… ficar mofando num parque com morcegos perdendo fôlego não tem mais propósito…"
42090-246 = "Abaixar a cabeça pras veteranas da FOX, engolir as mágoas… talvez seja o sacrifício moral menos pior no final de tudo."
42090-248 = "Vou jogar a real… Eu já tô começando a me perguntar se tem sentido brincar de casinha no parque há muito tempo, viu…"
42090-249 = "Munição virou luxo. A despensa tá cheia de vento. O inverno tá chegando e a gente vai acabar lavando calcinha na água congelante da chuva, Saki…"
42090-250 = "E-Eu não me importo com o caminho… eu só quero sobreviver…"
42090-255 = "……Entendo."
42090-260 = "(A Presidente Kaya colocou na mesa o poder de reconstruir os tijolos do nosso lar, a Academia SRT.#nIsso arranca a única justificativa que nos prendia às sombras imundas e úmidas desse parque esquecido.)"
42090-261 = "(……Se eu ceder a alma do Esquadrão para as Veteranas FOX e abaixar a cabeça, as meninas não terão que chorar de fome e dores de frio.#nE nós teremos camas secas e fuzis potentes mais uma vez…)"
42090-262 = "(Mas os ideais puros e os sonhos brilhantes e incorruptíveis que queimavam no nosso peito quando seguramos um fuzil pela primeira vez… Pra onde eles vão se eu fizer isso? Pro lixo?)"
42090-263 = "(…………Se for pra salvar as minhas meninas do inferno… eu me afogo com eles.)"
42090-266 = "……Saki, Moe, Miyu. Vocês me dão um segundo?"
42090-267 = "Antes de tomarmos o veneno que vai selar o nosso destino militar… Eu quero abrir o meu peito pra vocês."
42090-269 = "Próximo Episódio: Fora de Controle"