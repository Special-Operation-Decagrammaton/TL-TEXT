[translation]
10051040-1 = "Episódio 4: Ninjas e Ladrões"
10051040-2 = "Interior do salão de banquetes do desfile de moda"
10051040-4 = "Hmm-hmm~♪"
10051040-5 = "Hum-hum-hum~♪"
10051040-6 = "(Eu estava nervosa, mas... não tem muita coisa para fazer aqui...)"
10051040-7 = "(Todo mundo está se comportando bem e não há problemas em particular...)"
10051040-8 = "(Será que eu deveria conversar com a Izuna e a Tsukuyo pelo rádio?)"
10051040-9 = "(O assunto poderia ser... 'O código de conduta que um ninja deve seguir durante uma missão de infiltração entediante'?)"
10051040-10 = "(Ou talvez... 'Durante a infiltração, você é do time onigiri ou do time pílula de ração'?)"
10051040-11 = "(Já que estamos aqui, seria bom falar sobre algo que faça o tempo valer a pena.)"
10051040-12 = "[s] \"Michiru, você estava aqui.\""
10051040-13 = "Ugh! Que susto!"
10051040-14 = "Sensei, você também veio!?"
10051040-15 = "Espera... será que você veio espiar a troca de roupa de novo, igual àquela vez...!?"
10051040-16 = "[s] \"Claro que não!\""
10051040-17 = "Então... não me diga que o Sensei também vai estrear como modelo!?"
10051040-18 = "O Sensei é cheio de surpresas, hein!"
10051040-19 = "[s] \"Eu só vim porque recebi um convite...\""
10051040-20 = "Ah, entendi, você é um convidado."
10051040-21 = "Eu até que estava animada para ver o Sensei desfilando no palco."
10051040-22 = "[s] \"Não tenho a menor intenção de fazer isso...\""
10051040-23 = "Hm? Não tem interesse na vida de modelo?"
10051040-24 = "Entendi, entendi. Então o Sensei está mesmo é interessado em ninjas!"
10051040-25 = "[s] \"Por que você chegou a essa conclusão!?\""
10051040-26 = "Ahaha! Mas fico feliz em te ver, Sensei."
10051040-27 = "Sinceramente, eu estava entediada até agora!"
10051040-28 = "Eu estava até pensando em armar uma emboscada para alguém!"
10051040-29 = "[s] \"Um ninja pode fazer esse tipo de coisa!?\""
10051040-30 = "Uma emboscada antes da saudação oficial é permitida."
10051040-31 = "Mas... acho que aqui não é o lugar ideal para isso."
10051040-32 = "Por isso eu estava andando de um lado para o outro!"
10051040-33 = "Como é um evento formal, realmente não acontece nada."
10051040-34 = "[s] \"Mas depois que alguém diz isso, geralmente algo acontece, não é?\""
10051040-35 = "Sensei, você é do tipo que acredita nessas coisas?"
10051040-36 = "Mesmo que acontecesse um incidente aqui, não seria nada de mais—"
10051040-38 = "Bip-bip-bip!"
10051040-41 = "Hã...?"
10051040-42 = "O quê!?"
10051040-43 = "I-isso é um rádio de emergência...!?"
10051040-44 = "Equipe de infiltração, estão me ouvindo?"
10051040-45 = "A-aqui é Infiltração 01, estou ouvindo!"
10051040-46 = "Escutem com atenção. #nO traje da Shine Cat foi roubado agora pouco."
10051040-47 = "Se continuar assim... o desfile de moda não poderá acontecer!!"
10051040-48 = "Os convidados vieram justamente para ver o traje da Shine Cat!"
10051040-49 = "O quê!?"
10051040-50 = "Pela situação no local, o culpado não deve ter ido muito longe. #nHá uma grande chance de ainda estar dentro do salão!"
10051040-51 = "M-mas... o que a gente faz...?"
10051040-52 = "O que fazer? Vocês têm que capturá-lo! #nNão me diga que esqueceu o motivo pelo qual contratamos vocês!"
10051040-53 = "B-bem, pode ser, mas...!"
10051040-54 = "Capturem o culpado a qualquer custo! Entendido!?"
10051040-55 = "E-espera um pouco! Pelo menos a aparência do culpado ou algo assim...!"
10051040-57 = "Do que você está falando? #nSe eu soubesse as características do culpado, já teria capturado ele faz tempo!"
10051040-58 = "A-ah, é mesmo!?"
10051040-59 = "En-entendido!!"
10051040-63 = "Haa..."
10051040-64 = "Acabou acontecendo exatamente como o Sensei disse..."
10051040-65 = "...Hm? O Sensei também vai ajudar?"
10051040-66 = "Já que é assim..."
10051040-67 = "Inspira... Expira..."
10051040-68 = "Muito bem, não tenho escolha a não ser mostrar a verdadeira determinação de uma ninja!"
10051040-69 = "Undercover 02, Undercover 03! Respondam!"
10051040-70 = "Undercover 02, pronta para agir a qualquer momento!"
10051040-71 = "Undercover 03, da mesma forma!"
10051040-72 = "Vocês ouviram o rádio agora pouco, né? Vamos recuperar a roupa roubada!"
10051040-73 = "Não sabemos nada sobre as características do culpado... mas vamos encontrá-lo, custe o que custar!"
10051040-74 = "Porque um ninja, em qualquer situação de aperto...!"
10051040-75 = "Enfrenta qualquer dificuldade...!"
10051040-76 = "E, e nunca desiste... é por isso!"
10051040-80 = "Certo! Iniciar operação!!"
10051040-82 = "Bosque nos fundos do local do desfile de moda"
10051040-86 = "Conseguimos sair do local em segurança."
10051040-87 = "Disfarçar-se de entregador evita suspeitas... como planejado."
10051040-88 = "Mas mesmo assim, Shine Cat-sama... #nVocê sempre chega no local em cima da hora, por que veio tão cedo logo hoje? Quase demos de cara com você."
10051040-89 = "Bem, a peça foi 'resgatada' com sucesso, então está tudo bem."
10051040-90 = "Dentro deste arbusto, não será tão fácil nos encontrarem..."
10051040-91 = "De qualquer forma, finalmente a obra de Shine Cat-sama está em minhas mãos...!"
10051040-93 = "Ah, Shine Cat-sama... a luz da minha vida, a chama da minha existência...!"
10051040-94 = "A única peça no mundo feita para o desfile pelo maior de todos os designers...!"
10051040-95 = "Toda roupa, um dia, acaba sendo usada por alguém e se desgasta."
10051040-96 = "Uma obra que deveria ter inspirado tantas pessoas, #nacabar se tornando um mero item descartável... essa é a maior das tragédias...!"
10051040-98 = "É por isso que o 'Dadaistic Helmet Gang' precisa agir!"
10051040-99 = "Uma roupa verdadeiramente grandiosa só alcança valor imortal se ninguém a vestir...!"
10051040-100 = "Vamos aplicar um tratamento de conservação nesta peça e exibi-la em nosso esconderijo para sempre..."
10051040-101 = "Fufufu, ufufu, fufufu..."
10051040-107 = "...Hm? Tinha uma árvore aqui?"
10051040-108 = "E-eu... não sou uma árvore..."
10051040-109 = "É, faz sentido. Árvores não aparecem do nada para bloquear o caminho..."
10051040-110 = "Bom, então eu vou indo..."
10051040-111 = "E-eu não vou deixar você ir...!"
10051040-112 = "Por que não?"
10051040-113 = "Você... roubou a roupa, não foi...?"
10051040-114 = "Roubei!?"
10051040-116 = "Isso é... eu só estou levando para um lugar onde o verdadeiro valor desta roupa possa ser preservado!"
10051040-117 = "Para um lugar onde esta obra não seja danificada...!"
10051040-118 = "Pense bem. Se essa obra-prima for usada por alguém e ficar suja ou gasta... #nNão seria triste demais?"
10051040-119 = "Se-seja qual for o motivo, roubo é roubo...!"
10051040-120 = "Tsc, é por isso que pessoas comuns não entendem o valor da arte...!"
10051040-121 = "Me chamar de ladrão sem nem saber o que é arte... aliás—"
10051040-122 = "Quem é você?! Você não era uma árvore!?"
10051040-127 = "A-aqui é a Undercover 03, relatório! Encontrei o culpado! Ele está ao lado da estátua no quintal!!"
10051040-128 = "Droga, era a segurança?! Saiam da frente!"
10051040-129 = "Não... eu não vou!"
10051040-130 = "Eu sou... uma ninja!!"
10051040-131 = "Ninja?"
10051040-142 = "Interior do local do desfile de moda"
10051040-144 = "Izuna, você estava ouvindo o rádio, né? O culpado está no quintal!"
10051040-145 = "Izuna, entrando em ação!"
10051040-147 = "Bosque nos fundos do local do desfile de moda"
10051040-148 = "Arf, arf... esse cara é forte...!"
10051040-159 = "U-uma ninja... nunca desiste...!"
10051040-160 = "Por que você insiste tanto nessa história de ninja?! Me solta!"
10051040-161 = "E-eu não vou... soltar!!"
10051040-163 = "[ns] \"Tsukuyo, você se esforçou muito.\""
10051040-164 = "Daqui em diante...!"
10051040-165 = "Nós também vamos lutar juntas! Nin-nin!"
10051040-169 = "Clube de Pesquisa de Ninjutsu, apresentando-se!"
10051040-170 = "Chefe...! Izuna-chan...!"
10051040-171 = "3 contra 1?! Covardes!"
10051040-172 = "Não quero ouvir isso de um ladrão de figurinos!"
10051040-173 = "C-cala a boca! Eu não roubei, só estou levando para um lugar onde serão tratadas como merecem—"
10051040-174 = "Droga, chega! Eu já esperava que isso fosse acontecer desde o início!"
10051040-176 = "Grupo Dadaistic Helmet! Reunir!!"
10051040-185 = "Meus companheiros! Até que consigamos transportar esta obra em segurança—"
10051040-186 = "Me protejam!!!"
