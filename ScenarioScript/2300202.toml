[translation]
2300202-1 = "Uma injeção que não dói?"
2300202-2 = "Academia Trinity - Enfermaria"
2300202-3 = "Sensei! Sobre aquele método de aplicar injeções sem dor que conversamos antes, continuei pensando muito nisso depois daquela vez..."
2300202-4 = "No fim das contas, aplicar injeções é igual a estudar, não é? O importante é o esforço constante!"
2300202-5 = "Se eu praticar dezenas, centenas de vezes, será que um dia eu não vou conseguir aplicar injeções tão bem quanto as veteranas?"
2300202-6 = "[s1] \"É verdade.\"\n[s2] \"Com certeza você vai ficar boa nisso logo, Hanae.\""
2300202-7 = "Hehe, é verdade, né? Quero me acostumar a aplicar injeções logo."
2300202-8 = "Hehe, é verdade, né? Quero me acostumar a aplicar injeções logo."
2300202-9 = "Para isso..."
2300202-10 = "Sensei, seja minha cobaia de treino!"
2300202-11 = "[s] Fugir"
2300202-12 = "Ah, Sensei! #nNão pode fugir! Você é um adulto, afinal!"
2300202-13 = "[s] \"Mas eu não preciso tomar injeção agora...!\""
2300202-14 = "Não se preocupe! O que tem nesta seringa não é remédio, é apenas vitamina."
2300202-15 = "Mesmo que eu aplique várias vezes, só vai te deixar mais saudável!"
2300202-16 = "Então, vamos lá, Sensei, estenda o braço!"
2300202-17 = "[s] \"Ma-mas...!\""
2300202-18 = "Por favor, Sensei. Isso também é pelo bem de todos em Kivotos... #nSó uma vez, por favor, Sensei...!"
2300202-20 = "[s] Estender o braço sem jeito."
2300202-21 = "Obrigada, Sensei!"
2300202-22 = "Vou dar o meu melhor para que não doa nada!"
2300202-24 = "Então, respire fundo... lá vai..."
2300202-25 = "............"
2300202-26 = "Ah, um boneco do Peroro no céu!?"
2300202-27 = "[s] \"O quê!?\""
2300202-28 = "Agora!"
2300202-30 = "Ah, eu errei..."
2300202-31 = "[s] \"Ei, que truque foi esse!?\""
2300202-32 = "Li em um livro de enfermagem que dizia: 'insira a agulha rapidamente enquanto o paciente não percebe', então tentei distrair você para que não notasse..."
2300202-33 = "Falhei, hehe."
2300202-34 = "[s] \"É perigoso se você acertar em um lugar errado, sabia!?\""
2300202-35 = "Está tudo bem! Esse novo tipo de suplemento nutricional é absorvido corretamente em quase qualquer parte do corpo!"
2300202-36 = "Então, vamos para a segunda tentativa?"
2300202-37 = "[s] \"Você não disse que seria só uma vez!? Ei!\""
2300202-40 = "Depois disso, fui submetido a várias injeções, e meu braço ficou cheio de marcas de agulha."
