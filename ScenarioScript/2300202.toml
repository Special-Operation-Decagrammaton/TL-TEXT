[translation]
2300202-1 = "痛くない注射？"
2300202-2 = "トリニティ総合学園・保健室"
2300202-3 = "先生！以前お話しした痛くない注射の打ち方について、あの後も一生懸命考えてみたんですが、"
2300202-4 = "やっぱり注射も勉強と同じで、地道に努力するのが大事なんじゃないかなって！"
2300202-5 = "何十回も、何百回も繰り返し練習をすれば、私もいつかはベテランの先輩たちみたいに、注射をうまく打てるんじゃないでしょうか？"
2300202-6 = "[s1] \"そうだね。\"\n[s2] \"ハナエならきっと、すぐに上手くなるよ。\""
2300202-7 = "えへへ、そうですよね。早く注射に慣れたいです。"
2300202-8 = "えへへ、そうですよね。早く注射に慣れたいです。"
2300202-9 = "そのために……"
2300202-10 = "先生、練習台になってください！"
2300202-11 = "[s] 逃げる"
2300202-12 = "あっ、先生！#n逃げちゃダメですよ！大人なんですからっ！"
2300202-13 = "[s] \"でも私、今は注射を打つ必要無いし……！\""
2300202-14 = "ご心配なく！この注射器に入ってるのは、薬ではなくビタミン剤です。"
2300202-15 = "たくさん打っても、健康になるだけです！"
2300202-16 = "ですので、さあ先生、腕を差し出してください！"
2300202-17 = "[s] \"で、でも……！\""
2300202-18 = "お願いです、先生。これもキヴォトスのみなさんのためなんです……。#n一度だけでいいですから、先生……！"
2300202-20 = "[s] 仕方なく腕を差し出す。"
2300202-21 = "ありがとうございます、先生！"
2300202-22 = "痛くないように、全力で頑張りますね！"
2300202-24 = "では深く息を吸って……行きますよー……。"
2300202-25 = "…………。"
2300202-26 = "あっ、ペロロ人形が空を！？"
2300202-27 = "[s] \"えっ！？\""
2300202-28 = "今ですっ！"
2300202-30 = "あっ、失敗しちゃいました……。"
2300202-31 = "[s] \"ちょっ、今のフェイクは何！？\""
2300202-32 = "この前読んだ看護の本で、「患者が気づかないうちに注射の針を素早く入れる」って書いてあったので、気づかないように注意を逸らそうかと……。"
2300202-33 = "失敗です、えへっ。"
2300202-34 = "[s] \"変なところに刺さったら危ないでしょ！？\""
2300202-35 = "大丈夫です！この新型の栄養剤、体のどこの部位に打ってもだいたいきちんと吸収されるらしいので！"
2300202-36 = "さあ、では2回目のチャレンジ行きましょうか？"
2300202-37 = "[s] \"さっき一度だけって言ってなかった！？ねえ！？\""
2300202-40 = "その後、何度も注射をされて、腕が針の痕でいっぱいになってしまった。"
