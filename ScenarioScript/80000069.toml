[translation]
80000069-1 = "Sabor e elegância"
80000069-6 = "……！！"
80000069-7 = "Você veio, Sensei! O chá acabou de ficar pronto, que timing perfeito!"
80000069-8 = "……Ah, quer saber o que estou fazendo?"
80000069-12 = "Hoje é Dia dos Namorados! O Dia dos Namorados é o dia de retribuir a gratidão àqueles que são importantes para nós!!"
80000069-13 = "Claro que é para o Sensei, a pessoa mais importante para a Phina! Preparei algo especial para hoje!"
80000069-14 = "O clima está bom e a vista está linda, é o dia perfeito para apreciar um pouco de elegância!!"
80000069-15 = "Então, Sensei,"
80000069-16 = "que tal tomar uma comigo?"
80000069-17 = "[s1] \"Uma... o quê?\"\n[s2] \"Não deveria ser chocolate...?\""
80000069-18 = "Sim! A Phina se preparou muito bem!"
80000069-19 = "Sim! A Phina se preparou muito bem!"
80000069-20 = "Então, como prova do laço entre o Sensei e a Phina..."
80000069-21 = "Um brinde!"
80000069-26 = "[ns3] \"……Um copo de saquê!?\"\n[ns4] \"Isso significa que, por acaso, depois disso...?\""
80000069-27 = "……Aconteceu alguma coisa?"
80000069-28 = "……Aconteceu alguma coisa?"
80000069-29 = "……Oh."
80000069-30 = "A Phina esqueceu de explicar!"
80000069-31 = "Só para garantir, isso não é um copo de saquê de verdade!"
80000069-32 = "Afinal, hoje é Dia dos Namorados..."
80000069-33 = "Olhe com atenção!"
80000069-39 = "[ns5] \"……Ah, é feito de chocolate.\"\n[ns6] \"Um chocolate em formato de copo...?\""
80000069-40 = "Isso mesmo! Eu sabia que o Sensei entenderia!"
80000069-41 = "Isso mesmo! Eu sabia que o Sensei entenderia!"
80000069-42 = "E nesse copo..."
80000069-47 = "（Phina serviu chá no copo de chocolate）"
80000069-48 = "Dizem que ao servir o chá assim, o doce do chocolate se mistura com o aroma do chá, criando um sabor incrível!"
80000069-49 = "É a primeira vez que faço isso também! Mas, já que estamos aqui, queria aproveitar com você, Sensei."
80000069-50 = "Vamos lá, Sensei. Agora sim..."
80000069-51 = "Um brinde!"
80000069-52 = "[s] Brindar com a Phina."
80000069-54 = "Ufa, que bom... A Phina quer continuar aproveitando momentos maravilhosos como este com o Sensei!"
80000069-55 = "Por isso, daqui para frente..."
80000069-59 = "……Eu sei que não sou perfeita, mas conto com você."
80000069-60 = "Hehehe..."
80000069-62 = "（Depois disso, passei um tempo elegante com a Phina）"
