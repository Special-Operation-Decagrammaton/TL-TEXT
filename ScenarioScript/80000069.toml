[translation]
80000069-1 = "風味と風情と"
80000069-6 = "……！！"
80000069-7 = "来てくださったんデスね、センセイ！ちょうどお茶も入りましたので、良いタイミング！"
80000069-8 = "……え、何をしてるか、デスか？"
80000069-12 = "今日はバレンタインデー！バレンタインデーというのは、大切な方に今までの恩を返す日デス！！"
80000069-13 = "もちろんフィーナの一番大事なセンセイのタメに！今日は特別に、一席ご用意しマシタ！"
80000069-14 = "天気も景色も良いデスし、今日は風情を楽しむのにぴったりの日デス！！"
80000069-15 = "というわけで先生"
80000069-16 = "フィーナと一杯いかがデスか？"
80000069-17 = "[s1] \"一杯……？\"\n[s2] \"チョコレートとかではなく……？\""
80000069-18 = "ハイ！フィーナ、しっかり準備して来ました！"
80000069-19 = "ハイ！フィーナ、しっかり準備して来ました！"
80000069-20 = "それではセンセイとフィーナの絆の証として……"
80000069-21 = "カンパイ！"
80000069-26 = "[ns3] \"……盃！？\"\n[ns4] \"ってことは、もしかしてこの後……？\""
80000069-27 = "……どうかしましたか？"
80000069-28 = "……どうかしましたか？"
80000069-29 = "……Oh。"
80000069-30 = "フィーナ、説明を忘れていマシタ！"
80000069-31 = "念のためデスが、これは本物の盃ではアリマセン！"
80000069-32 = "なにせ今日はバレンタインデー……"
80000069-33 = "よくご覧クダサイ！"
80000069-39 = "[ns5] \"……あ、チョコレートでできてる。\"\n[ns6] \"盃の形をしたチョコレート……？\""
80000069-40 = "デス！やはりセンセイなら分かってくださると思っていマシタ！"
80000069-41 = "デス！やはりセンセイなら分かってくださると思っていマシタ！"
80000069-42 = "そしてその盃に……"
80000069-47 = "（フィーナが盃に、お茶を淹れてくれた）"
80000069-48 = "こうしてお茶を淹れることで、チョコの甘味とお茶の香りが混ざって、スゴク良い風味になるそうデス！"
80000069-49 = "ワタシも実際にやるのは初めてなのデスが！せっかくなので、センセイと一緒に味わいたいなと。"
80000069-50 = "さあ、センセイ。今度こそ……"
80000069-51 = "カンパイ！"
80000069-52 = "[s] フィーナと一緒に盃を交わす。"
80000069-54 = "フゥ、良いですね……こういった素敵なモノを、フィーナはこれからもセンセイと一緒に楽しみたいデス！"
80000069-55 = "デスから、これからも……"
80000069-59 = "……こんなワタシですが、よろしくお願いしマス。"
80000069-60 = "エヘヘ……。"
80000069-62 = "（その後フィーナと一緒に、風情のある時間を過ごした）"
