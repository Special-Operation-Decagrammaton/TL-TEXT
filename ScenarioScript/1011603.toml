[translation]
1011603-1 = "aula para dois"
1011603-2 = "(O que foi enviado foi o endereço de um estúdio fotográfico brilhante.)"
1011603-6 = "Sensei, é isso."
1011603-7 = "[s1] \"Isso é um estúdio?\"\n[s2] \"É um lugar legal.\""
1011603-10 = "ah. Não há outros planos de filmagem hoje, então estou livre para usá-lo como quiser."
1011603-11 = "Então... peço sua ajuda."
1011603-12 = "Quero que você me ensine a dançar."
1011603-13 = "Dançar com alguém... nem consigo imaginar."
1011603-14 = "[s] \"Então, acho que sou o primeiro parceiro da Saori?\""
1011603-18 = "Isso mesmo."
1011603-19 = "Meu primeiro parceiro foi meu sensei..."
1011603-23 = "Estou feliz por ser um adulto em quem posso confiar."
1011603-24 = "Por favor, seja gentil."
1011603-25 = "[s] \"Claro...!\""
1011603-26 = "sim……? O sensei também está nervoso?"
1011603-27 = "...Eu vejo. Para ser sincero, também estou um pouco nervoso."
1011603-28 = "Numa sala tão grande..."
1011603-29 = "Estamos tão perto que quase podemos sentir a respiração um do outro..."
1011603-30 = "[s] \"Bem, então! Vamos começar a dançar!\""
1011603-31 = "...acho que a professora também não está acostumada com esse tipo de situação."
1011603-32 = "Mas não consegui pensar em mais ninguém para perguntar."
1011603-33 = "Se o sensei concordar... gostaria de pedir a ele que seja meu parceiro durante a sessão de fotos."
1011603-34 = "Eu sei que é impossível. Se parecer difícil, sinta-se à vontade para recusar."
1011603-35 = "[s3] \"Por favor, faça isso!\"\n[s4] \"Na verdade, nós agradeceríamos!\""
1011603-38 = "...Obrigado, sensei."
1011603-39 = "Agora que confirmamos nossa decisão, vamos começar."
1011603-40 = "...A propósito, como você começa a dançar?"
1011603-41 = "……saudações? Para um parceiro?"
1011603-42 = "Deixe-me aprender uma coisa."
1011603-44 = "Sensei... não, diga olá ao seu parceiro."
1011603-49 = "[wa:2530]― [log=사오리 드레스 비무장]Aqui, [wa:1140] Devo fazer isso...? [/registro]"
1011603-52 = "― [log=사오리 드레스 비무장]Se o sensei diz...[wa:2920]Mas [wa:1300]Isso é um pouco... [/log]"
1011603-53 = "[wa:3070]― [log=사오리 드레스 비무장]Normalmente, [wa:1260]Eu nunca faria essa pose. [/registro]"
1011603-56 = "[wa:2200]― [log=사오리 드레스 비무장]Quando minhas mãos estão ocupadas, [wa:2380]me sinto um pouco ansioso. [/registro]"
1011603-57 = "[wa:4350]― [log=사오리 드레스 비무장]Se você não [wa:440]confiar em seu parceiro, será [wa:1600]difícil. [/registro]"
1011603-60 = "[wa:890]― [log=사오리 드레스 비무장]Talvez... [wa:1940] Essa foi a saudação [wa:2200]? [/registro]"
1011603-63 = "[wa:830]― [log=사오리 드레스 비무장]Se sim... [wa:1620]Vamos fazer isso [wa:2630] até que o sensei esteja satisfeito. [/registro]"
1011603-66 = "[wa:1250]― [log=사오리 드레스 비무장]Isso...[wa:2640]É a prova da minha confiança. [/registro]"
1011603-70 = "Aprendi que até uma saudação tem um significado profundo."
1011603-71 = "sim? Por que eu sorri... fiz algo errado?"
1011603-72 = "...De qualquer forma, vamos para a próxima coisa."
1011603-73 = "Próximo...você vai dar as mãos ao seu parceiro?"
1011603-77 = "Ufa...estou pronto.Venha, professora!"

1011603-78 = "[s] \"Vamos, Saori!\""
1011603-83 = "Mesmo que tenhamos apenas dado as mãos... meu corpo está tremendo...?"
1011603-88 = "Pensando bem, já vi uma dança como essa antes, enquanto estava de guarda."
1011603-89 = "...Nunca pensei que seria eu quem faria isso."
1011603-90 = "Tudo graças ao sensei."
1011603-91 = "Nunca imaginei que eu, que só conhecia a luta, vivenciaria algo assim."
1011603-95 = "...!"
1011603-96 = "Entendo... aquele tremor de antes..."
1011603-97 = "...Talvez tenha sido porque tive contato com a professora."
1011603-98 = "Ainda há muitas coisas que ainda não alcancei, mas por favor continuem a me apoiar."
1011603-103 = "Ah, espere! Por que você coloca a mão na minha cintura...!"
1011603-104 = "Ainda estou mentalmente preparado...!"
1011603-108 = "Ah... faz parte da dança. Desculpe pelo mal-entendido."
1011603-109 = "Parece que estive pensando demais nas coisas."
1011603-110 = "Bem, da próxima vez coloco a mão no ombro do sensei?"
1011603-111 = "Entendido...ufa..."
1011603-112 = "Vamos, professora...!"
1011603-114 = "(Os dois praticaram dança juntos)"
