[translation]
11115-2 = "敵、後退しています！"
11115-3 = "だけどこのままでは……。"
11115-4 = "仲間を呼ぶつもり？いくらでも相手してあげる。"
11115-5 = "ま、待ってください！それ以上戦っちゃダメです！"
11115-6 = "ん？どうして？"
11115-7 = "だ、だって……ブラックマーケットで騒ぎを起こしたら、ここを管理している治安機関に見つかってしまうかもしれません！"
11115-8 = "あうう……そうなったら本当に大ごとです……まずはこの場から離れ……。"
11115-9 = "ふむ……わかった。ここのことはヒフミちゃんのほうが詳しいだろうから、従おう。"
11115-10 = "ちぇっ、運のいいやつらめ！"
11115-11 = "こっちです！"
11115-15 = "次回;ブラックマーケットへ（２）"
