11115-9 = "Hmm... entendo. Hifumi-chan provavelmente sabe mais sobre isso do que eu, então vamos segui-la."
11115-10 = "Ei, seus sortudos!"
11115-11 = "É por aqui!"
11115-15 = "Próxima vez; Para o mercado negro (2)"
