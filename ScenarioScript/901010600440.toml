[translation]
901010600440-7 = "Resumindo as rotas de acesso ao Porto Kanezaki..."
901010600440-8 = "Atualmente, a única entrada \"oficialmente reconhecida\" é o portão principal, vigiado pela Família Carpaccio."
901010600440-9 = "Oficialmente? Então há outras entradas?"
901010600440-10 = "Bom, é um porto, dá para entrar de barco."
901010600440-11 = "Mas o Porto Kanezaki não é um porto de passageiros."
901010600440-13 = "Dá para sair escondido em um cargueiro, como contrabando, mas é perigoso, não recomendam."
901010600440-14 = "Quem disse isso?"
901010600440-15 = "Um trabalhador que encontrei no porto de manhã."
901010600440-16 = "Diz que antigamente um ladrão roubou coisas no porto e se escondeu num cargueiro..."
901010600440-17 = "A viagem foi tão longa que o ladrão foi encontrado desnutrido."
901010600440-18 = "Credo... essa é a história de terror mais nojenta que ouvi ultimamente."
901010600440-19 = "Outro método seria usar a estação do porto."
901010600440-20 = "Também é uma estação de carga, mas só de madrugada tem um trem para os trabalhadores."
901010600440-21 = "Uma linha que vai até o pátio de manobras. Quase ninguém usa, mas se precisar sair rápido do porto, essa rota é viável."
901010600440-22 = "Como Miyaguchi pode ter saído do porto..."
901010600440-30 = "Como Miyaguchi pode ter saído do porto...\n[as2] Pelo portão principal.\n[as3] Nadando.\n[as1] No trem de trabalhadores."
901010600440-31 = "Verdade, se ele pegou o trem de madrugada, ninguém ia ver."
901010600440-32 = "A estação é administrada pela Highlander, então a Família Carpaccio não teria como saber."
901010600440-33 = "Aliás, pedi para um contato do Conselho Estudantil Geral verificar os registros de embarque –"
901010600440-35 = "... Acho que não funcionaria."
901010600440-36 = "O portão principal do Porto Kanezaki é vigiado pela Família Carpaccio, a quem Miyaguchi devia dinheiro."
901010600440-37 = "A Família Carpaccio não deixaria um devedor passar."
901010600440-46 = "Nadar no escuro? Não é perigoso demais?"
901010600440-47 = "Deve ter uma maneira mais segura de sair do porto."
901010600440-60 = "Ah, o Departamento de Trânsito respondeu!"
901010600440-64 = "O que disseram? Miyaguchi pegou o trem?"
901010600440-65 = "... Sim. No horário, Miyaguchi emitiu um bilhete e saiu do porto."
901010600440-66 = "Ora, tanto boato de caranguejo monstro, e no final era só alguém fugindo."
901010600440-67 = "E eu aqui preocupado com acidente."
901010600440-69 = "Mas que bom que não houve vítimas, né?"