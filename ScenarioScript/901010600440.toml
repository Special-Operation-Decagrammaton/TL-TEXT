[translation]#[Texto Final. - Filipe 05/07.]
901010600440-7 = "Resumindo as rotas de entrada e saída do porto de Kanezaki……"
901010600440-8 = "Atualmente, a única entrada 'oficialmente reconhecida' é o portão principal, vigiado pela Família Carpaccio."
901010600440-9 = "Oficialmente? Então tem outras entradas?"
901010600440-10 = "É um porto, né. Dá pra entrar de barco."
901010600440-11 = "Mas o porto de Kanezaki não recebe navios de passageiros."
901010600440-13 = "Daria pra esconder num navio de carga como contrabando, mas é perigoso, não recomendam."
901010600440-14 = "Quem disse isso?"
901010600440-15 = "Um trabalhador que encontrei no porto de manhã."
901010600440-16 = "Diz que uma vez um ladrão roubou coisa valiosa no porto e se escondeu num navio de carga……"
901010600440-17 = "Mas a viagem foi tão longa que ele foi encontrado com desnutrição."
901010600440-18 = "Nossa…… essa é a história mais assustadora que ouvi ultimamente."
901010600440-19 = "Outra opção seria usar a estação do porto."
901010600440-20 = "Lá também é uma estação de carga, mas de manhã cedinho passa um trem de funcionários."
901010600440-21 = "A linha vai até o pátio de manutenção, quase ninguém usa…… mas se precisasse sair rápido, seria uma rota possível."
901010600440-22 = "O Miyaguchi pode ter saído do porto por……"
901010600440-30 = "O Miyaguchi pode ter saído do porto por……\n[as2] Portão principal.\n[as3] Nado pelo mar.\n[as1] Trem de funcionários."
901010600440-31 = "É, se pegasse o trem pro pátio de manutenção de manhã cedo, dava pra sair sem ser visto."
901010600440-32 = "A estação é administrada pela Highlander, então a Família Carpaccio não veria."
901010600440-33 = "Inclusive, eu já tinha pedido pra uma responsável do Conselho verificar o registro de embarque――"
901010600440-35 = "……Acho difícil."
901010600440-36 = "O portão principal é vigiado pela Família Carpaccio, que é a credora do Miyaguchi."
901010600440-37 = "Outra organização até deixaria passar, mas a Família Carpaccio não vai deixar um devedor escapar."
901010600440-46 = "Fugir nadando no mar escuro de noite…… não é perigoso demais?"
901010600440-47 = "Acho que há meios mais seguros de sair do porto."
901010600440-60 = "Ah, chegou resposta da Sala de Transportes."
901010600440-64 = "O que disseram? O Miyaguchi pegou o trem?"
901010600440-65 = "……Sim. No horário em questão, ele emitiu o bilhete e saiu do porto."
901010600440-66 = "Ué, com todo esse papo de caranguejo monstro, no fim ele só fugiu escondido."
901010600440-67 = "E eu preocupada se tinha sofrido acidente."
901010600440-69 = "Mas se não teve desaparecido de verdade, então tá tudo bem, né."