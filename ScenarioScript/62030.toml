[translation]
62030-1 = "Episódio 3; Aquilo Em Que Acreditamos"
62030-2 = "Kyaah!"
62030-3 = "Waaah!?"
62030-4 = "Atsuko, para trás!"
62030-8 = "Guh...!?"
62030-10 = "Misaki-san!?"
62030-17 = "Uggh...!?"
62030-18 = "É perigoso!"
62030-26 = "Mine-san!?"
62030-27 = "Guh...!?"
62030-41 = "(O que é isso...?)"
62030-42 = "(É como se eu estivesse afundando em um pântano sem fundo...!)"
62030-47 = "――!!"
62030-54 = "Isso se devia a uma interpretação diferente."
62030-55 = "Para quem olhava, era algo simples――"
62030-56 = "Para quem olhava, era algo insignificante."
62030-59 = "Elas acreditavam que eram as únicas a 'compreender a verdade'."
62030-60 = "Queriam provar que eram as 'justas'."
62030-61 = "No entanto, erguer essa bandeira significava rotular todo o resto como um 'erro'."
62030-64 = "Declaro aqui a resolução do Concílio."
62030-71 = "Decreto a excomunhão eterna de Arius a partir de agora."
62030-72 = "――Em nome das almas sagradas."
62030-79 = "[log]Esse foi[/log]"
62030-81 = "[log]o início de uma perseguição sem fim.[/log]"
62030-84 = "(Isso é... o passado de Arius...)"
62030-91 = "Não havia caminho. Por isso, abrimos nossa passagem à força com mãos cobertas de feridas."
62030-92 = "A luz nos deixou, e nos afundamos em meio a ecos de [ruby=lamentos]lamento[/ruby]."
62030-93 = "Do ponto mais alto do céu ao ponto mais baixo da terra――"
62030-94 = "[ruby=Elas]Trinity[/ruby] tentou fazer parecer que nós 'nunca existimos'."
62030-97 = "Portanto, 'sobreviver' tornou-se nossa única resistência e nossa maior virtude."
62030-98 = "Contudo, o ódio que não podia ser direcionado para fora não teve escolha senão voltar-se contra nós mesmos."
62030-104 = "Muitos desapareceram."
62030-105 = "Aqueles que não precisavam desaparecer se foram――"
62030-106 = "E those que não precisavam se odiar, odiaram-se mutuamente."
62030-111 = "[log]O fim disso tudo foi――[/log]"
62030-113 = "[log][ruby=Vanitas vanitatum et omnia vanitas]Tudo é vaidade. Não importa quão longe vamos, tudo não passa de vaidade.[/ruby][/log]"
62030-116 = "……!"
62030-119 = "[ruby=Trinity]Aqueles que nos exilaram[/ruby] disseram――#nQue fomos exilados porque era o nosso destino."
62030-120 = "[ruby=Trinity]Aqueles que nos exilaram[/ruby] disseram――#nQue nós mesmos trouxemos esse resultado."
62030-121 = "[ruby=Trinity]Aqueles que nos exilaram[/ruby] disseram――#nQue sofremos porque era assim que deveria ser."
62030-123 = "Mas, declaro aqui."
62030-124 = "Ninguém nasce destinado a ser assim."
62030-127 = "[ruby=Trinity]Aqueles que nos exilaram[/ruby] devem responder――#nSe não fosse pelo passado que criaram, onde [ruby=Arius]os exilados[/ruby] estariam agora?"
62030-128 = "[ruby=Trinity]Aqueles que nos exilaram[/ruby] devem responder――#nSe não fosse pela história que teceram, com que tipo de amanhã [ruby=Arius]os exilados[/ruby] poderiam sonhar?"
62030-129 = "[ruby=Trinity]Aqueles que nos exilaram[/ruby] devem responder――#nSe não fosse pelo ódio que semearam, que tipo de amor [ruby=Arius]os exilados[/ruby] poderiam ter recebido?"
62030-134 = "Desculpe... me perdoe... desculpe..."
62030-135 = "Desculpe... desculpe... eu nunca mais vou fazer isso...!"
62030-136 = "……!"
62030-141 = "Existe um mundo onde ter esperança é considerado um pecado."
62030-142 = "Existe um mundo onde uma criança que deseja ser feliz é punida."
62030-143 = "Eu nunca mais vou desobedecer... não terei mais esperança..."
62030-144 = "Nunca mais vou desejar ser feliz... #ne-eu nunca mais farei isso..."
62030-146 = "Nesse mundo, até mesmo a misericórdia perde o sentido e desbota."
62030-147 = "Por favor... tenha misericórdia..."
62030-148 = "Misericórdia..."
62030-151 = "Responda."
62030-152 = "Que tipo de virtude reside em uma verdade que apaga as crianças?"
62030-153 = "Há crianças que roubam para sobreviver à fome. Há crianças que aquecem suas mãos e pés congelados com o próprio sopro. Diante de suas lágrimas, que tipo de retidão vocês ousam ostentar?"
62030-154 = "Diante de uma criança que diz que a vida não passa de sofrimento sem sentido―― que tipo de justiça ousa falar em igualdade?"
62030-155 = "Isso... é..."
62030-156 = "Responda!"
62030-157 = "Você tem a obrigação de responder."
62030-158 = "Todo o '[ruby=agora]presente[/ruby]' é construído sobre os alicerces do 'passado'."
62030-160 = "Era apenas uma 'interpretação diferente'. #nSimples, insignificante, que nem sequer tinha sentido."
62030-161 = "Mas isso se tornou o estopim para toda a fúria e o ódio."
62030-162 = "As crianças desta terra foram as que mais se aproximaram da morte."
62030-163 = "Com base em quê [ruby=vocês]os que exilaram[/ruby] pretendem continuar vivendo――"
62030-164 = "Responda!!"
62030-169 = "Eu――"
62030-170 = "Não posso... responder."
62030-171 = "Porque esta é... uma pergunta que, para começar, não deveria ter uma resposta..."
62030-172 = "*sniff*..."
62030-173 = "Uuh... uuuuh..."
62030-183 = "[log]Até as estrelas e a lua no céu,[/log]"
62030-185 = "[log]incapazes de suportar seus próprios pecados, esconderam sua luz.[/log]"
62030-188 = "[log][ruby=Quo vadis, Domine.]Para onde vais, Senhor?[/ruby] [/log]"
62030-201 = "[log]……Posso[/log]"
62030-203 = "[log]lhe perguntar uma coisa?[/log]"
62030-207 = "[log]Quando tudo parecer perdido no desespero……[/log]"
62030-209 = "[log]o que é que ainda nos sustenta?[/log]"
62030-211 = "[log]O que…… seria isso?[/log]"
62030-215 = "(O que é isso...?)"
62030-216 = "(Ah... Naquela época, eu fiz essa pergunta ao Sensei...)"
62030-217 = "(E o que foi que o Sensei disse...?)"
62030-220 = "\"Aquilo em que a pessoa acredita... eu acho.\""
62030-221 = "\"Afinal, o que move as pessoas são as emoções e as crenças.\""
62030-222 = "\"Nem tudo pode ser resolvido apenas com a lógica.\""
62030-226 = "\"Mesmo que seja la fé em uma existência grandiosa.\""
62030-227 = "\"……Ou a confiança em algo que reside dentro de si mesmo.\""
62030-228 = "(Mas, Sensei...)"
62030-229 = "(No que eu deveria acreditar agora?)"
62030-230 = "(Por favor, me diga, Sensei...)"
62030-231 = "(Diante da tristeza e da calamidade que [ruby=nós]Trinity[/ruby] causamos... o que nós poderíamos fazer...?)"
62030-236 = "[log]……Acredite.[/log]"
62030-240 = "(Sensei...? Tenho certeza de que você não disse isso...)"
62030-243 = "[ruby=・]A[/ruby][ruby=・]c[/ruby][ruby=・]r[/ruby][ruby=・]e[/ruby][ruby=・]d[/ruby][ruby=・]i[/ruby][ruby=・]t[/ruby][ruby=・]o[/ruby][ruby=・]u[/ruby]."
62030-244 = "E naquilo que sustentou Mine, fez com que ela andasse e a manteve viva. #nAcredite nisso."
62030-246 = "(Não...)"
62030-247 = "(Se fosse o Sensei, tenho certeza de que ele diria isso...!)"
62030-250 = "Nós não podemos mudar o passado."
62030-251 = "Mas isso jamais será uma razão para deixar de viver o 'presente'."
62030-254 = "Se você acredita que o caminho que trilhou não estava errado――"
62030-255 = "Prove a si mesma seguindo esse caminho até o fim."
62030-256 = "(O caminho que eu trilhei...)"
62030-257 = "(Esse caminho é...)"
62030-262 = "[log]Se fecharmos os ouvidos[/log]"
62030-264 = "[log]aos pedidos de socorro――[/log]"
62030-266 = "[log]quem nós seríamos?[/log]"
62030-270 = "……!!"
62030-271 = "(……É verdade. O [ruby=Sensei]senhor[/ruby], com certeza...!)"
62030-275 = "……."
62030-276 = "Peço perdão pelo atraso. ……Eu responderei à sua pergunta."
62030-277 = "Mas esta pode não ser uma resposta perfeita."
62030-278 = "Mesmo assim... acredito ser o suficiente para responder 'com base em quê pretendo continuar vivendo'."
62030-280 = "……Este mundo está cheio de tristeza. #nE isso é um fato imutável."
62030-281 = "O presente é construído sobre os alicerces do passado. Isso também é indiscutível."
62030-284 = "Porém... mesmo que as minhas ações sejam imperfeitas e insignificantes――"
62030-285 = "se eu puder diminuir essa tristeza, mesmo que seja apenas uma colherada..."
62030-286 = "Eu... não desejo nada além disso."
62030-292 = "Há algo a ser protegido."
62030-293 = "Não desejo recompensas."
62030-294 = "Farei aquilo em que acredito."
62030-295 = "Porque é exatamente nisso que reside o orgulho."
62030-299 = "Gravando o orgulho e as crenças no peito――"
62030-302 = "Olhando para trás, havia pedidos de socorro por toda parte."
62030-303 = "Mas eu não pude responder a todos eles."
62030-304 = "Por que só posso ter um corpo?"
62030-306 = "Tudo o que posso fazer é..."
62030-307 = "ouvir essas vozes o máximo possível."
62030-309 = "E, pelo menos ao alcance das minhas mãos―― estendê-las para ajudar."
62030-310 = "E quando essas pequenas escolhas, que para alguns podem ser insignificantes, se acumularem――"
62030-311 = "mesmo que seja apenas um pouco..."
62030-316 = "espero que um dia todos possam caminhar em direção a um mundo mais amplo."
62030-319 = "――Onde houver necessidade de resgate, haverá resgate."
62030-326 = "Pessoal, fiquem atrás de mi!"
62030-331 = "Capitã!?"
62030-332 = "Capitã!!"
62030-337 = "A partir de agora, a Corporação de Cavaleiros de Resgate irá protegê-las!"