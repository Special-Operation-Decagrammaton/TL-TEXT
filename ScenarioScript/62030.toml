[translation]
62030-1 = "Episódio 3: Aquilo em que acreditamos"
62030-2 = "Ah!"
62030-3 = "Aaaah!?"
62030-4 = "Atsuko, abaixe-se!"
62030-8 = "Ugh...!?"
62030-10 = "Misaki!?"
62030-17 = "Ugh...!?"
62030-18 = "É perigoso!"
62030-26 = "Mine!?"
62030-27 = "Argh...!?"
62030-41 = "(O que é isso...?)"
62030-42 = "(É como se eu estivesse afundando em um pântano sem fim...!)"
62030-47 = "――!!"
62030-54 = "Isso se devia a interpretações diferentes."
62030-55 = "Para alguns, era algo simples――"
62030-56 = "Para outros, era algo insignificante."
62030-59 = "Elas acreditavam que eram as únicas que "compreendiam a verdade"."
62030-60 = "Queriam provar que eram as "justas"."
62030-61 = "No entanto, proclamar isso significa rotular todo o resto como "errado"."
62030-64 = "Declaro aqui a resolução do Concílio."
62030-71 = "A partir de agora, sentenciamos Arius à excomunhão eterna."
62030-72 = "――Em nome da alma sagrada."
62030-79 = "[log]Esse foi o[/log]"
62030-81 = "[log]início de uma perseguição sem fim.[/log]"
62030-84 = "(Isso é... de Arius...)"
62030-91 = "Não havia caminho. Por isso, abrimos nossa própria trilha com mãos feridas."
62030-92 = "A luz nos abandonou e mergulhamos no eco."
62030-93 = "Do lugar mais alto do céu ao lugar mais baixo da terra――"
62030-94 = "tentaram fazer com que nós "nunca tivéssemos existido"."
62030-97 = "Por isso, "sobreviver" tornou-se nossa única resistência e nossa sublimidade."
62030-98 = "Contudo, o ódio que não podia ser direcionado ao exterior só podia retornar para nós mesmos."
62030-104 = "Muitos desapareceram."
62030-105 = "Aqueles que não precisavam desaparecer, desapareceram――"
62030-106 = "e aqueles que não precisavam se odiar, odiaram-se."
62030-111 = "[log]O fim disso foi――[/log]"
62030-113 = "[log].[/log]"
62030-116 = "……!"
62030-119 = "disse――#nVocês foram banidos porque era o destino de vocês."
62030-120 = "disse――#nVocês mesmos atraíram esse resultado."
62030-121 = "disse――#nVocês sofrem porque era para ser assim."
62030-123 = "Mas eu digo aqui:"
62030-124 = "Não existe ninguém que deveria ser assim desde o início."
62030-127 = "deve responder――#nOnde estaria se não fosse pelo passado que criou?"
62030-128 = "deve responder――#nQue tipo de amanhã poderia sonhar se não fosse pela história que teceu?"
62030-129 = "deve responder――#nQue tipo de amor poderia dar se não fosse pelo ódio que espalhou?"
62030-134 = "Desculpe... me perdoe... desculpe..."
62030-135 = "Desculpe... desculpe... eu nunca mais farei isso de novo...!"
62030-136 = "……!"
62030-141 = "Existe um mundo onde ter esperança é considerado um pecado."
62030-142 = "Existe um mundo onde crianças que desejam ser felizes são punidas."
62030-143 = "Nunca mais vou desobedecer... Não terei mais esperança alguma..."
62030-144 = "Nunca mais vou desejar ser feliz... #nEu não farei... nada disso..."
62030-146 = "Nesse mundo, até a misericórdia perde o sentido e desbota."
62030-147 = "Eu lhe peço... por favor, tenha misericórdia..."
62030-148 = "Misericórdia..."
62030-151 = "Responda."
62030-152 = "Que tipo de virtude reside nessa verdade que apagou as crianças?"
62030-153 = "Há crianças que roubam para saciar a fome. Há crianças que aquecem as mãos e pés congelados com o próprio hálito. Diante dessas lágrimas, que tipo de retidão pode ser proclamada?"
62030-154 = "A vida não passa de um sofrimento sem sentido. Diante de uma criança que diz isso — que tipo de justiça pode falar em equidade?"
62030-155 = "Isso... é..."
62030-156 = "Responda!"
62030-157 = "Você tem o dever de responder."
62030-158 = "Todas as \"\" são construídas tendo o \"passado\" como alicerce."
62030-160 = "Aquilo foi apenas uma \"interpretação diferente\". #nSimples, trivial e sem significado algum."
62030-161 = "Mas foi isso que serviu de estopim para toda a fúria e o ódio."
62030-162 = "As crianças desta terra estiveram mais perto da morte do que qualquer outra pessoa."
62030-163 = "Com o que elas pretendem viver —"
62030-164 = "Responda!!"
62030-169 = "Eu... não..."
62030-170 = "Não consigo responder..."
62030-171 = "Essa é uma pergunta... que, por natureza, não deveria ter uma resposta..."
62030-172 = "Snif..."
62030-173 = "Uuu... uuuu..."
62030-183 = "[log]Nem as estrelas nem a lua no céu,[/log]"
62030-185 = "[log]suportaram o peso dos próprios pecados e esconderam sua luz.[/log]"
62030-188 = "[log] [/log]"
62030-201 = "[log]...Posso lhe fazer,[/log]"
62030-203 = "[log]uma pergunta?[/log]"
62030-207 = "[log]Quando se está totalmente desesperado...[/log]"
62030-209 = "[log]O que é que ainda nos sustenta?[/log]"
62030-211 = "[log]O que... seria isso?[/log]"
62030-215 = "(Isso é...?) "
62030-216 = "(Ah... Naquela época, eu perguntei ao Sensei...)"
62030-217 = "(E o que o Sensei respondeu...?)"
62030-220 = "\"Aquilo em que a pessoa acredita... talvez.\""
62030-221 = "\"Porque o que move as pessoas são as emoções e as convicções.\""
62030-222 = "\"Nem sempre as coisas podem ser explicadas pela lógica.\""
62030-226 = "\"Seja a fé em uma existência grandiosa.\""
62030-227 = "\"Ou a confiança em algo dentro de si mesmo.\""
62030-228 = "(Mas, Sensei)"
62030-229 = "(No que devo acreditar agora?)"
62030-230 = "(Por favor, me diga, Sensei)"
62030-231 = "(Diante da tristeza e da calamidade que [wa:62030] criou, o que nós... o que podemos fazer...?)"
62030-236 = "[log]...Acredite.[/log]"
62030-240 = "(Sensei...? Você não deveria ter dito algo assim...)"
62030-243 = "coisa."
62030-244 = "E aquilo que sustentou Mine, a fez caminhar e a manteve viva. #nAcredite nisso."
62030-246 = "(Não...)"
62030-247 = "(Se fosse o Sensei, com certeza ele diria isso...!)"
62030-250 = "Nós não podemos mudar o passado."
62030-251 = "Mas isso nunca será um motivo para não viver o \"presente\"."
62030-254 = "Se você acredita que o caminho que percorreu não foi um erro—"
62030-255 = "então prove quem você é seguindo esse caminho até o fim."
62030-256 = "(O caminho que eu percorri...)"
62030-257 = "(É...)"
62030-262 = "[log]Se eu fechar meus ouvidos[/log]"
62030-264 = "[log]aos pedidos de socorro—[/log]"
62030-266 = "[log]quem, afinal, eu seria?[/log]"
62030-270 = "……！！"
62030-271 = "(...É verdade. Eu, com certeza...!)"
62030-275 = "……。"
62030-276 = "Peço perdão. ...Responderei à sua pergunta."
62030-277 = "No entanto, talvez esta não seja a resposta perfeita."
62030-278 = "Ainda assim... acredito que seja o suficiente para responder à pergunta: \"pelo que você pretende viver?\""
62030-280 = "……Este mundo está repleto de tristeza. #nIsso é um fato inabalável."
62030-281 = "O presente é construído sobre as bases do passado. Isso também é inegável."
62030-284 = "Mas... mesmo que minhas ações sejam desajeitadas e insignificantes—"
62030-285 = "se eu puder reduzir essa tristeza, nem que seja um pouco,"
62030-286 = "eu... não desejo nada além disso."
62030-292 = "Há coisas que devem ser protegidas."
62030-293 = "Não espero nada em troca."
62030-294 = "Faço o que acredito ser certo."
62030-295 = "Pois é nisso que reside o meu orgulho."
62030-299 = "Com orgulho e convicção gravados no peito—"
62030-302 = "Ao olhar para trás, havia pedidos de socorro por toda parte."
62030-303 = "No entanto, não pude responder a todos eles."
62030-304 = "Por que só podemos ter um corpo?"
62030-306 = "Tudo o que posso fazer é..."
62030-307 = "ouvir esses pedidos o máximo que eu puder."
62030-309 = "Pelo menos, dentro do meu alcance... estender esta mão."
62030-310 = "Essas escolhas pequenas, que para alguns podem parecer insignificantes, vão se acumulando—"
62030-311 = "mesmo que seja apenas um pouquinho."
62030-316 = "Para que, um dia, todos possam caminhar em direção a um mundo mais amplo."
62030-319 = "—Onde houver necessidade de socorro, lá estaremos."
62030-326 = "Pessoal, fiquem atrás de mim!"
62030-331 = "Comandante!?"
62030-332 = "Comandante!!"
62030-337 = "A partir de agora, a Brigada de Socorro protegerá todos vocês!"
