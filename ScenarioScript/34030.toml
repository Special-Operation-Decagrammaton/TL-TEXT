[translation]
34030-1 = "Episódio 3; A Princesa na Gaiola"
34030-2 = "Desde o incidente do Tratado do Éden, a situação na Trinity General School tornou-se complexa."
34030-3 = "Em especial, a opinião pública em relação à Mika-san tem piorado consideravelmente..."
34030-4 = "Mika-san já foi expulsa da facção Pater a qual pertencia, e foi decidido que ela também perderá o seu título na Tea Party na audiência de amanhã."
34030-5 = "Não importam os detalhes ou a verdade——Mika-san é a principal culpada pelo incidente do Tratado do Éden em conluio com a filial de Arius."
34030-6 = "[s] \"......!!\""
34030-7 = "Até mesmo antes da audiência, protestos exigindo a condenação dela aconteciam frequentemente, chegando ao ponto de algumas alunas jogarem pedras na gaiola onde ela estava presa, fazendo justiça com as próprias mãos..."
34030-8 = "Os fóruns da academia foram inundados de postagens criticando a Mika-san... e a facção Pater passou a ser vista com maus olhos apenas por ela já ter pertencido a ela..."
34030-9 = "Os livros e pertences que ela usava foram confiscados, e as roupas e acessórios que ela guardava com carinho foram incinerados..."
34030-10 = "[s] \"As coisas chegaram a esse ponto...\""
34030-11 = "......O Comitê de Realização da Justiça está tentando intervir, mas é quase impossível dissipar a tensão que tomou conta de toda a academia."
34030-12 = "[s1] \"......\"\n[s2] \"Eu não sabia que estava assim...\""
34030-13 = "......Mika-san se tornou a inimiga número um na Trinity."
34030-14 = "......Mika-san se tornou a inimiga número um na Trinity."
34030-15 = "Poderíamos ignorar tudo isso dizendo que é apenas o castigo que ela merece..."
34030-16 = "......Ainda assim, eu quero defendê-la. Pois ela já pagou um preço muito maior do que os crimes que cometeu."
34030-17 = "[s3] \"Você tem razão... Eu vou ajudar também.\"\n[s4] \"O que eu posso fazer para ajudar?\""
34030-18 = "......Sim, muito obrigada, Sensei. Mas..."
34030-19 = "......Sim, muito obrigada, Sensei. Mas..."
34030-20 = "A própria Mika-san... parece não ter intenção de se defender..."
34030-21 = "[s] \"A Mika...?\""
34030-22 = "Ela está pensando em não comparecer à audiência. Fazer a audiência nesse estado... sem dúvida vai resultar na expulsão imediata dela."
34030-23 = "Mas... eu não consegui convencê-la a comparecer..."
34030-24 = "Talvez a Seia-san conseguisse, mas... a saúde dela não permite, dadas as circunstâncias."
34030-28 = "......Então, eu tenho um favor a pedir."
34030-29 = "[s] \"Certo... Vou me encontrar com a Mika e tentar conversar com ela.\""
34030-33 = "Muito obrigada. Tenho certeza que ela vai ouvir você, Sensei..."
34030-34 = "Além disso, parece que a Mika-san também está esperando por você..."
34030-35 = "......Phew."
34030-36 = "Me sinto um pouco mais aliviada. Embora nada tenha se resolvido ainda..."
34030-37 = "[s] \"Você está bem, Nagisa...?\""
34030-38 = "Eu...? Ah..."
34030-39 = "Eu estou bem... como sempre."
34030-40 = "......Fufu, acho que só o Sensei se preocupa comigo. Muito obrigada."
34030-41 = "Sendo assim... Deixo o resto com você."
34030-43 = "Após me despedir de Nagisa, no caminho para encontrar a Mika..."
34030-46 = "Tragam a traidora que tentou fazer mal à Seia-sama para fora!"
34030-47 = "É imperdoável que uma criminosa que se aliou com a Arius para arruinar o Tratado do Éden faça parte da Tea Party!"
34030-48 = "Que a pecadora pague por seus crimes! Condenação!"
34030-50 = "P-Pessoal! Por favor, não cruzem esta linha!"
34030-51 = "Punição à traidora!! Faça ela pagar por nos enganar!!"
34030-55 = "[ns] (Que clima pesado...)"
34030-58 = "Gaiola onde a Mika está confinada"
34030-59 = "[ns] \"Mika...?\""
34030-61 = "Shhh."
34030-65 = "[ns5] \"...?\"\n[ns6] (...Consigo ouvir uma música bem baixinha)"
34030-70 = "......Desculpe a demora. Era hora da missa. Hoje é dia de ouvir hinos."
34030-71 = "Eles não abrem mão de me fazer participar da missa nem mesmo estando aqui... Não acha isso um pouco cruel?"
34030-72 = "Podiam muito bem dar um desconto pra essas coisas, né."
34030-73 = "[s] \"Mas, é uma bela música.\""
34030-74 = "Sério? Não acha entediante ouvir isso? Toda hora 'Senhor, tende piedade', 'Cristo, tende piedade'――"
34030-75 = "Kyrie eleison, pra começar, eu nem gosto do nome. Por que temos de nos curvar a um ser que nem sequer conseguimos ver?"
34030-76 = "Sabe, dizer 'tende piedade' em voz alta só faz você se sentir patética. Ninguém deveria fazer isso consigo mesmo ou com os outros."
34030-77 = "Mas eu gosto de cantar! Apesar de achar as letras um pouco cafonas."
34030-78 = "Ah, Sensei, você nunca ouviu a minha voz, não é?"
34030-79 = "Normalmente, eu não canto de graça, mas para você eu abro uma exceção. Você até veio me ver aqui!"
34030-80 = "Uma princesa trancafiada em uma torre cantando uma serenata para a sua alma gêmea. O que acha? Parece cena de filme, né?"
34030-81 = "[s] \"Mas não é uma torre, é uma gaiola, né.\""
34030-82 = "Uau, você tinha que me trazer de volta para a realidade...? Bem, não que seja mentira."
34030-86 = "......Então, o que te traz aqui hoje, Sensei?"
34030-87 = "[s7]  \"Eu já sei mais ou menos de tudo, Mika.\"\n[s8]  \"Ouvi dizer que você não vai comparecer à audiência. A Nagisa está preocupada.\""
34030-88 = "......"
34030-89 = "......"
34030-90 = "A Nagi-chan está bem, né? ......Que bom."
34030-91 = "E eu aposto que a Irmandade e a capitã dos Cavaleiros Hospitalários estavam com a Nagi-chan, não é?"
34030-92 = "......Como eu imaginei. Quanto mais a posição da Tea Party fica ameaçada, mais as outras facções começam a impor autoridade."
34030-93 = "Eu só não achei que fosse ser tão direto, sabe..."
34030-94 = "......A Nagi-chan deve estar estressada, tadinha."
34030-95 = "[s] \"Pois é... A propósito, vi aquela multidão na praça quando vim para cá.\""
34030-96 = "Ah... entendi."
34030-97 = "......Bom, a minha situação atual é exatamente o que você viu. E não tem o que fazer."
34030-98 = "A Nagi-chan acha que tudo se resolverá se eu comparecer à audiência, mas... as alunas da Trinity não são tão compreensíveis assim."
34030-99 = "......Desde o incidente, o prestígio da Tea Party despencou."
34030-100 = "Tanto a opinião pública na academia quanto nossa posição política... e a culpa é toda minha, claro, pelas coisas que fiz."
34030-101 = "No estado em que as coisas estão, quanto mais a Nagi-chan me defender..."
34030-102 = "A 'Tea Party'... não só a posição da Nagi-chan, mas a da Seia-chan também ficará em risco."
34030-103 = "E eu não quero que isso aconteça por minha causa."
34030-104 = "Afinal, tudo isso... esse é o preço que eu tenho que pagar."
34030-105 = "[s9]  \"Mas elas me disseram que você pode ser expulsa...\"\n[s10] \"E a Mika já suportou tantas coisas até agora...\""
34030-108 = "......"
34030-109 = "[s] \"Você já não pagou um preço alto o bastante?\""
34030-110 = "M-Mas..."
34030-111 = "......Ainda assim, a culpa é minha."
34030-112 = "Ouvir dizer que meus tesouros, cheios de memórias que reuni com a Nagi-chan, foram todos queimados..."
34030-113 = "Mas mesmo assim, não posso ser perdoada... A Seia-chan... a Seia-chan ainda me odeia..."
34030-114 = "[s11] \"A Seia não odeia a Mika. Você tem a minha palavra.\"\n[s12] \"Ela já perdoou a Mika.\""
34030-115 = ".........N-Não! Claro que não... Afinal, eu tentei pedir desculpas várias vezes, mas sem sucesso..."
34030-116 = ".........N-Não! Claro que não... Afinal, eu tentei pedir desculpas várias vezes, mas sem sucesso..."
34030-117 = "E da última vez que nos vimos..."
34030-120 = "Seia-chan, seu rosto tá pálido hoje também. Não conseguiu dormir? Sua pele tá ressecada também... Quer que eu te empreste um hidratante?"
34030-121 = "......"
34030-122 = "Err, Seia-chan...?"
34030-123 = "......Ei, se você quiser, bem..."
34030-124 = "A gente não podia comer alguma coisa juntas? Bem, 'comer', eu quero dizer o rocambole que tem aqui na gaiola!"
34030-125 = "Nossa, a Nagi-chan é bem cabeça-dura, né? Onde já se viu me dar rocambole em todas as três refeições do dia!"
34030-126 = "......Mika."
34030-127 = "A-Aham? Quer comer?"
34030-128 = "Sinto muito, mas no momento eu..."
34030-129 = "Ah... C-Claro... S-Sabia..."
34030-130 = "Não estou me sentindo muito bem... Peço desculpas, mas vou voltar para o meu quarto."
34030-137 = "[ns] \"A Seia disse isso...?\""
34030-138 = "......"
34030-139 = "A Seia-chan tem ficado trancada no quarto ultimamente, não quer ver ninguém..."
34030-140 = "Existem até boatos de que ela não consegue mais sair da cama... Você sabe, a saúde da Seia-chan sempre foi bem frágil."
34030-141 = "Para piorar, há uma série de boatos horríveis sobre ela... Como pessoas dizendo que ouviram choro vindo do quarto dela..."
34030-142 = "O que a Seia-chan diz é sempre tão confuso, mas..."
34030-143 = "Acho que isso quer dizer que ela ainda não me perdoou..."
34030-144 = "[s13] \"A Seia me disse pessoalmente que perdoava você.\"\n[s14] \"Vocês não tiveram um mal-entendido?\""
34030-145 = "......Obrigada, Sensei. Mas sabe, tudo bem se a Seia-chan ainda me odiar..."
34030-146 = "......Obrigada, Sensei. Mas sabe, tudo bem se a Seia-chan ainda me odiar..."
34030-147 = "Porque, eu ainda não consegui nem falar pra Seia-chan um 'me desculpa' direito..."
34030-148 = "No estado em que ela está, se a saúde dela piorar ainda mais por minha causa..."
34030-149 = "Se a Seia-chan forçasse os próprios limites de novo... eu... eu nunca me perdoaria..."
34030-150 = "[s] \"Eu vou tentar falar com a Seia.\""
34030-151 = "S-Sensei...?"
34030-152 = "[s] \"Para que você consiga dizer o seu 'me desculpa' de forma apropriada para ela.\""
34030-153 = "......!"
34030-154 = "[s15] \"E depois disso... eu, Nagisa, Seia, e você, Mika...\"\n[s16] \"Nós quatro iremos para a audiência de amanhã juntas!\""
34030-155 = "......"
34030-156 = "......"
34030-157 = "......E-Espera um pouco. Por que...?"
34030-158 = "S-Será que... eu valho tanto a pena assim pra você se esforçar tanto por mim...?"
34030-159 = "Eu... Eu jurei que não ia mais chorar... mas por que você...?"
34030-160 = "......Por que diz essas coisas pra mim?"
34030-164 = "......Entendi, eu prometo."
34030-165 = "Se você está insistindo tanto... eu irei para a audiência junto com todas."
34030-166 = "[s] \"Certo. Obrigado por decidir ir, Mika.\""
34030-167 = "......"
34030-168 = "......Para ser sincera, achei que não teria uma segunda chance... mas se isso for o destino..."
34030-169 = "Quem sabe, eu realmente seja a princesa trancada na torre afinal...?"
34030-173 = "Ah... N-Não é nada, Sensei!"
34030-174 = "Então, deixo a Seia-chan... em suas mãos, Sensei."
34030-176 = "[ns] Me dirijo aos aposentos de Seia."
34030-181 = "Quarto de recuperação da Seia"
34030-183 = "......Sensei?"
34030-184 = "[s] \"Tudo bem com você, Seia? Você está muito pálida.\""
34030-185 = "Sensei... Que bom que você está bem. Não, espere, isso pode ser só mais um dos meus sonhos convenientes. Uma ilusão, uma farsa... ou talvez sejam a mesma coisa..."
34030-186 = "[s] \"O-O que aconteceu...?\""
34030-187 = "......"
34030-188 = "Não, parece que eu estava enganada... esses seus olhos――"
34030-189 = "......É verdade. Hoje era o dia em que você nos faria uma visita na Trinity."
34030-190 = "Minhas desculpas. A linha que separa meus sonhos da realidade tem ficado cada vez mais tênue ultimamente..."
34030-191 = "O presente, o passado, o futuro... Tudo isso me envolve sem cessar, a ponto de me deixar em dúvida sobre onde estou pisando."
34030-192 = "Bem, o que eu quis dizer é que... você não precisa se preocupar com isso."
34030-193 = "[s] \"Todo mundo está preocupado com você. O que foi que aconteceu?\""
34030-194 = "......Entendo."
34030-195 = "É um pouco difícil responder com exatidão à sua pergunta... mas há algo que eu posso compartilhar com você."
34030-196 = "No momento, estou carregando o fardo de um futuro que não ouso compartilhar com ninguém. Mas, Sensei, com você, sinto que posso..."
34030-197 = "......Você poderia me ouvir?"
34030-198 = "[s] \"Sim, claro.\""
34030-199 = "Isso é algo totalmente diferente de tudo o que você já experienciou até hoje... algo de uma categoria completamente diferente."
34030-200 = "Mas, eu imploro a você... mesmo que minhas palavras pareçam um absurdo, por favor, ouça."
34030-201 = "[s] \"...Pode falar.\""
34030-202 = "......Noutro dia, o mensageiro dos meus sonhos me deu um aviso."
34030-203 = "Foi o que poderíamos chamar de 'sonho premonitório'—um vislumbre de um futuro que está destinado a se concretizar. Obviamente, isso faz parte do que estou acostumada a ver no mundo dos sonhos."
34030-204 = "No entanto, havia algo diferente naquele dia em particular. Sim, naquele dia eu..."
34030-205 = "......Eu vislumbrei o fim do mundo. Eu testemunhei o momento em que a própria Kivotos encontrou seu fim."
34030-207 = "Próximo Episódio; Entre Sonhos e Miragens"