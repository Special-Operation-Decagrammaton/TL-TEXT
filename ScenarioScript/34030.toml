[translation]
34030-1 = "Episódio 3; A Princesa na Jaula"
34030-2 = "Desde o incidente do Tratado de Eden, a situação na Academia Trinity tornou-se complexa."
34030-3 = "Especialmente a opinião pública em relação à Mika-san, que piorou consideravelmente..."
34030-4 = "Mika-san já foi expulsa da facção Pater, à qual pertencia, e foi decidido que ela perderá seu cargo no Tea Party na audiência que ocorrerá amanhã."
34030-5 = "Independentemente do processo ou da verdade — Mika-san é a principal culpada por ter conspirado com a filial de Arius para causar o incidente do Tratado de Eden."
34030-6 = "[s] \"……！！\""
34030-7 = "Mesmo antes da audiência, tumultos exigindo sua condenação ocorrem com frequência, e há alunas que chegam a jogar pedras na jaula onde Mika-san está, como uma forma de justiça pelas próprias mãos..."
34030-8 = "O mural da academia está inundado de mensagens de condenação contra Mika-san... e a facção Pater é vista com desprezo apenas por ela ter pertencido a eles..."
34030-9 = "Os livros e pertences que Mika-san usava foram confiscados, e as roupas e acessórios que ela colecionava com tanto carinho foram incinerados..."
34030-10 = "[s] \"A esse ponto…….\""
34030-11 = "……O Comitê de Justiça está tentando controlar a situação, mas é quase impossível dissipar essa atmosfera que se espalhou por toda a academia."
34030-12 = "[s1] \"……。\"\n[s2] \"Então era isso…….\""
34030-13 = "……Mika-san tornou-se uma inimiga pública em Trinity."
34030-14 = "……Mika-san tornou-se uma inimiga pública em Trinity."
34030-15 = "Pode-se dizer que tudo isso é apenas o castigo que Mika-san merece, mas……."
34030-16 = "……Mesmo assim, eu quero defender a Mika-san. Pois ela já pagou um preço maior do que os crimes que cometeu."
34030-17 = "[s3] \"Entendo…… eu também vou ajudar.\"\n[s4] \"Existe algo que eu possa fazer?\""
34030-18 = "……Sim, obrigada, Sensei. Mas……."
34030-19 = "……Sim, obrigada, Sensei. Mas……."
34030-20 = "Parece que a própria Mika-san…… não tem intenção de se defender……."
34030-21 = "[s] \"A Mika……?\""
34030-22 = "Mika-san pretende faltar à audiência. Uma audiência realizada nessas condições…… sem dúvida levará diretamente à expulsão dela."
34030-23 = "Mas…… eu não consegui convencê-la a comparecer……."
34030-24 = "Talvez a Seia-san pudesse ter conseguido, mas…… ela não está em condições de lidar com isso agora."
34030-28 = "……Por isso, tenho um pedido a lhe fazer."
34030-29 = "[s] \"Certo…… eu vou encontrar a Mika e tentar convencê-la.\""
34030-33 = "Obrigada. Se forem as palavras do Sensei, com certeza……."
34030-34 = "Além disso, parece que a Mika-san está esperando pelo Sensei……."
34030-35 = "……Ufa."
34030-36 = "Sinto-me um pouco mais aliviada. Embora nada tenha sido resolvido ainda……."
34030-37 = "[s] \"Nagisa, você está bem……?\""
34030-38 = "Eu……? Ah……."
34030-39 = "Eu estou bem…… não é nada diferente do habitual."
34030-40 = "……Fufu, você é a única pessoa que se preocupa comigo, Sensei. Obrigada."
34030-41 = "Então…… deixo o resto com você."
34030-43 = "Após me despedir de Nagisa e seguir em direção à Mika……."
34030-46 = "Tragam para fora a traidora que tentou ferir a Seia-sama!"
34030-47 = "Não posso perdoar que uma criminosa que se aliou a Arius e arruinou o Tratado de Eden faça parte do Tea Party!"
34030-48 = "Castigo à criminosa! Condenação!"
34030-50 = "P-por favor, pessoal! Não ultrapassem esta linha!"
34030-51 = "Castigo à traidora!! Pelo preço que pagamos por sermos enganados!!"
34030-55 = "[ns] (Que atmosfera pesada……)"
34030-58 = "A jaula onde Mika está confinada"
34030-59 = "[ns] \"Mika……?\""
34030-61 = "Shiii."
34030-65 = "[ns5] \"……？\"\n[ns6] (……Dá para ouvir uma música suave)"
34030-70 = "……Desculpe a espera. Era hora do culto. Hoje é dia de ouvir hinos."
34030-71 = "Não é um pouco cruel ter que participar obrigatoriamente do culto mesmo aqui?"
34030-72 = "Poderiam ser um pouco mais compreensivos com coisas assim."
34030-73 = "[s] \"Mas é uma música bonita.\""
34030-74 = "Sério? Não acha entediante ouvir? Coisas como 'tenha piedade' ou 'tenha misericórdia'..."
34030-75 = "Kyrie eleison, nem gosto desse nome. Por que temos que implorar para uma existência que nem podemos ver?"
34030-76 = "Dizer 'tenha misericórdia' só torna tudo mais miserável. Não é algo que se deva fazer consigo mesmo ou com os outros."
34030-77 = "Mas eu gosto de cantar! A letra é um pouco estranha, mas..."
34030-78 = "Ah, é verdade, Sensei. Você nunca me ouviu cantar, né?"
34030-79 = "Normalmente eu não cantaria de graça, mas para você é uma exceção. Afinal, você veio me ver!"
34030-80 = "Uma princesa trancada na torre cantando uma serenata para o seu destino. O que acha? Parece uma cena de um conto de fadas, não é?"
34030-81 = "[s] \"Não é uma torre, é uma cela.\""
34030-82 = "Uau, você teve que me trazer de volta para a realidade...? Bem, é verdade, mas..."
34030-86 = "……Então, por que você veio hoje, Sensei?"
34030-87 = "[s7]  \"Ouvi sobre a situação, Mika.\"\n[s8]  \"Você vai faltar à audiência? A Nagisa está preocupada.\""
34030-88 = "……."
34030-89 = "……."
34030-90 = "A Nagi-chan está bem, né? ...Ufa, que bom."
34030-91 = "Provavelmente, a Irmandade e a Chefe da Brigada de Socorro estavam com ela, não estavam?"
34030-92 = "……Eu sabia. Quanto mais a posição do Chá das Partes fica instável, mais as outras facções ganham poder."
34030-93 = "Não achei que fossem confrontar o Chá das Partes tão diretamente, mas..."
34030-94 = "……O estresse da Nagi-chan deve estar terrível."
34030-95 = "[s] \"Pois é... aliás, vi o grupo na praça quando cheguei.\""
34030-96 = "Ah... entendi."
34030-97 = "……Bem, minha situação atual é exatamente o que você viu. Não tem jeito."
34030-98 = "A Nagi-chan parece achar que tudo vai se resolver se eu comparecer à audiência, mas... a Trinity não é tão ingênua assim."
34030-99 = "……Desde aquele incidente, a autoridade do Chá das Partes caiu por terra."
34030-100 = "A opinião pública dentro da escola, a posição política... é natural, já que eu fiz aquilo."
34030-101 = "Nesse estado deplorável, quanto mais a Nagi-chan tenta me proteger..."
34030-102 = "A posição não só do 'Chá das Partes' e da Nagi-chan, mas até da Seia-chan fica em risco."
34030-103 = "Não quero que isso aconteça por minha causa."
34030-104 = "Tudo isso é um preço que eu preciso pagar."
34030-105 = "[s9]  \"Mas você pode acabar sendo expulsa...\"\n[s10] \"Além disso, você já sofreu tanto...\""
34030-108 = "……."
34030-109 = "[s] \"Você já não pagou o preço suficiente?\""
34030-110 = "Ma-mas..."
34030-111 = "……Mesmo assim, a culpa é minha."
34030-112 = "Parece que aqueles tesouros preciosos cheios de memórias que juntei com a Nagi-chan foram queimados..."
34030-113 = "Mesmo assim, eu não sou perdoada... e a Seia-chan ainda me odeia..."
34030-114 = "[s11] \"A Seia não te odeia, Mika. Eu garanto.\"\n[s12] \"A Seia já te perdoou.\""
34030-115 = "………N-não! Não pode ser... porque eu tentei pedir desculpas várias vezes, mas não deu certo..."
34030-116 = "………N-não! Não pode ser... porque eu tentei pedir desculpas várias vezes, mas não deu certo..."
34030-117 = "Até da última vez que nos vimos..."
34030-120 = "Seia-chan, você não está com uma cara boa hoje. Não conseguiu dormir? Sua pele está ressecada também? Quer que eu te empreste um creme hidratante?"
34030-121 = "……."
34030-122 = "Ei, Seia-chan...?"
34030-123 = "……Sabe, se você quiser..."
34030-124 = "Quer comer alguma coisa comigo? Bem, quando digo comer, é só rocambole aqui na cela!"
34030-125 = "Nossa, a Nagi-chan é muito mente fechada. Servir rocambole em todas as três refeições!"
34030-126 = "……Mika."
34030-127 = "O-oi? Vai comer?"
34030-128 = "Sinto muito, mas agora..."
34030-129 = "Ah... e-entendi. É, claro..."
34030-130 = "Não estou me sentindo muito bem... peço desculpas, mas vou voltar para o meu quarto."
34030-137 = "[ns] \"A Seia...?\""
34030-138 = "……。"
34030-139 = "A Seia-chan não sai do quarto ultimamente, e parece que ela não deixa ninguém entrar..."
34030-140 = "Tem até boatos de que ela está acamada... A Seia-chan sempre teve a saúde frágil, afinal."
34030-141 = "Além disso, há muitos outros boatos ruins... Dizem que ouviram soluços vindo do quarto dela..."
34030-142 = "As palavras da Seia-chan são sempre difíceis de entender, mas..."
34030-143 = "Provavelmente, ela não me perdoou..."
34030-144 = "[s13] \"A Seia disse claramente que perdoava a Mika.\"\n[s14] \"Será que não houve algum mal-entendido?\""
34030-145 = "……Obrigada, Sensei. Mas, sabe, não me importo se a Seia-chan me odiar..."
34030-146 = "……Obrigada, Sensei. Mas, sabe, não me importo se a Seia-chan me odiar..."
34030-147 = "É que eu ainda não consegui dizer um \"desculpe\" de verdade para a Seia-chan..."
34030-148 = "Nesse estado, se a saúde dela piorar por minha causa..."
34030-149 = "Se a Seia-chan se esforçar demais de novo... eu... acho que nunca conseguiria me perdoar."
34030-150 = "[s] \"Eu vou tentar falar com a Seia.\""
34030-151 = "V-você, Sensei...?"
34030-152 = "[s] \"Para que a Mika possa dizer \"desculpe\" para a Seia corretamente.\""
34030-153 = "……!"
34030-154 = "[s15] \"E então... eu, a Nagisa, a Seia e a Mika, todos juntos,\"\n[s16] \"vamos participar da audiência de amanhã!\""
34030-155 = "……。"
34030-156 = "……。"
34030-157 = "……E-espere um pouco. Por que você faria isso..."
34030-158 = "S-será que eu valho tanto esforço assim...?"
34030-159 = "Eu... eu jurei que nunca mais choraria, então por que você..."
34030-160 = "……Por que diz essas coisas?"
34030-164 = "……Sim, eu entendi."
34030-165 = "Se você insiste tanto... eu vou à audiência com todos."
34030-166 = "[s] \"Sim. Obrigado por decidir isso, Mika.\""
34030-167 = "……。"
34030-168 = "……Sinceramente, achei que não teria uma segunda chance... Mas, se este é o destino..."
34030-169 = "Será que eu era mesmo uma princesa trancada em uma torre...?"
34030-173 = "Ah... n-não é nada, Sensei!"
34030-174 = "Então, eu conto com você... para falar com a Seia-chan, Sensei."
34030-176 = "[ns] Dirige-se ao quarto da Seia."
34030-181 = "Sala de tratamento da Seia"
34030-183 = "……Sensei?"
34030-184 = "[s] \"Seia, você está bem? Seu rosto está pálido.\""
34030-185 = "Sensei... então você está bem. Não, talvez seja apenas um sonho conveniente. Uma ilusão, uma ficção, ou talvez tudo seja a mesma coisa..."
34030-186 = "[s] \"O-o que houve...?\""
34030-187 = "……。"
34030-188 = "Não, parece que não... Esse olhar é..."
34030-189 = "……Entendo. Hoje era o dia em que você visitaria Trinity."
34030-190 = "Perdoe-me. Ultimamente, a fronteira entre meus sonhos e a realidade está mais confusa do que nunca..."
34030-191 = "Presente, passado, futuro... eles me envolvem constantemente, a ponto de eu nem saber onde estou agora."
34030-192 = "Bem, no fim das contas, não precisa se preocupar... pode encarar dessa forma."
34030-193 = "[s] \"Todos estão preocupados. O que aconteceu?\""
34030-194 = "……Entendo."
34030-195 = "É difícil responder com precisão ao que aconteceu... mas, se há algo que eu possa dizer."
34030-196 = "Eu acabei obtendo um futuro que não posso contar a ninguém. Mas, Sensei, para você..."
34030-197 = "……Você poderia me ouvir?"
34030-198 = "[s] \"Sim, claro.\""
34030-199 = "A partir daqui, trata-se de algo completamente diferente... de uma natureza totalmente distinta de todos os incidentes que você vivenciou até agora."
34030-200 = "Mas, por favor... mesmo que pareça absurdo, peço que me escute."
34030-201 = "[s] \"...Entendido.\""
34030-202 = "...Dias atrás, o mensageiro dos sonhos me revelou algo."
34030-203 = "Poderíamos chamar de um tipo de \"sonho premonitório\" — ou seja, um vislumbre de um futuro que inevitavelmente chegará... embora, por si só, isso seja apenas um dos mundos que costumo observar diariamente."
34030-204 = "No entanto, naquele dia específico, algo estava diferente. Sim, naquele dia eu..."
34030-205 = "...Vi a cena em que o mundo, em que Kivotos, encontra o seu fim."
34030-207 = "Próximo episódio: Entre o sonho e a miragem"
