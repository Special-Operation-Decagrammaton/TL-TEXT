[translation]
34030-1 = "Episódio 3;A Princesa na Jaula"
34030-2 = "Desde o incidente do Tratado do Éden, o cenário da Academia Geral de Trinity ficou complexo."
34030-3 = "Em especial, a opinião pública contra a Mika piorou bastante……."
34030-4 = "A Mika já foi expulsa da facção Pater, à qual pertencia, e, na audiência de amanhã, já está decidido que também será destituída da qualificação de Tea Party."
34030-5 = "Processo e verdade à parte――a Mika é a mentora que, mancomunada com a Filial de Arius, causou o incidente do Tratado do Éden."
34030-6 = "[s] \"……!!\""
34030-7 = "Até a audiência acontecer, tumultos exigindo a condenação ocorreram várias vezes, e apareceram até alunos que, como linchamento, jogaram pedras na jaula da Mika……."
34030-8 = "No mural da academia chovem mensagens de acusação contra a Mika…… a facção Pater é olhada com frieza só por ela ter pertencido a ela……."
34030-9 = "Os livros e pertences que ela usava foram apreendidos, e as roupas e acessórios que colecionava com carinho foram incinerados……."
34030-10 = "[s] \"A esse ponto…….\""
34030-11 = "……O Comitê de Realização da Justiça reprime, mas dissipar esse clima espalhado pela academia inteira é quase impossível."
34030-12 = "[s1] \"…….\"\n[s2] \"Então era isso…….\""
34030-13 = "……A Mika virou inimiga pública em Trinity."
34030-14 = "……A Mika virou inimiga pública em Trinity."
34030-15 = "Dá até pra descartar tudo isso como o castigo que cabe à Mika, mas……."
34030-16 = "……Ainda assim, eu quero defendê-la. Porque ela já pagou um preço maior que o pecado que cometeu."
34030-17 = "[s3] \"Pois é…… eu também vou ajudar.\"\n[s4] \"Tem algo que eu possa fazer?\""
34030-18 = "……Sim, muito obrigada, Sensei. Mas……."
34030-19 = "……Sim, muito obrigada, Sensei. Mas……."
34030-20 = "A própria Mika…… parece não ter a intenção de se defender……."
34030-21 = "[s] \"A Mika……?\""
34030-22 = "A Mika está tentando faltar à audiência. Uma audiência realizada nesse estado…… vai, sem dúvida, direto pra expulsão dela."
34030-23 = "Mas…… eu não consegui convencê-la a comparecer……."
34030-24 = "A Seia talvez conseguisse…… mas ela, agora, não está em condições."
34030-28 = "……E, por isso, tenho um pedido."
34030-29 = "[s] \"Sim…… eu vou encontrar a Mika e tentar convencê-la.\""
34030-33 = "Muito obrigada. Vindo do senhor, com certeza……."
34030-34 = "Além disso, a Mika parece estar esperando pelo senhor……."
34030-35 = "……Ufa."
34030-36 = "Me sinto um pouco aliviada. Embora nada esteja resolvido ainda……."
34030-37 = "[s] \"E você, Nagisa, tá bem……?\""
34030-38 = "Eu……? Ah……."
34030-39 = "Eu estou bem…… como sempre."
34030-40 = "……Ufu, quem se preocupa comigo é praticamente só o senhor, né. Obrigada."
34030-41 = "Então…… o resto, conto com o senhor."
34030-43 = "Despedindo-se da Nagisa, a caminho da Mika……"
34030-46 = "Arrastem pra fora a traidora que tentou ferir a senhorita Seia!"
34030-47 = "Uma criminosa que se juntou à Arius e arruinou o Tratado do Éden, no Tea Party? Inaceitável!"
34030-48 = "À criminosa, castigo! Condenação!"
34030-50 = "P-pessoal! Não saiam de dentro desta linha!"
34030-51 = "Castigo à traidora!! O preço por nos enganar!!"
34030-55 = "[ns] （Que clima pesado……）"
34030-58 = "A jaula onde Mika está confinada"
34030-59 = "[ns] \"Mika……?\""
34030-61 = "Shhh."
34030-65 = "[ns5] \"……?\"\n[ns6] （……Dá pra ouvir uma música, de leve）"
34030-70 = "……Desculpa a demora. Era a hora do culto. Hoje é dia de ouvir os hinos."
34030-71 = "Ter que participar do culto sem falta até aqui dentro; não é meio cruel?"
34030-72 = "Ao menos nisso podiam fazer vista grossa, né."
34030-73 = "[s] \"Mas é uma música bonita.\""
34030-74 = "Será? Não é entediante de ouvir? \"Tende piedade\", \"compadecei-vos\"――"
34030-75 = "Kyrie eleison; nem o nome me agrada. Por que a gente tem que se agarrar a uma existência que nem se vê?"
34030-76 = "Dizer \"compadecei-vos\" só torna tudo mais miserável. Isso não é coisa que se faça nem consigo, nem com os outros."
34030-77 = "Mas da música eu gosto! A letra é meio duvidosa, mas."
34030-78 = "Ah, é mesmo, Sensei. Você nunca ouviu a minha voz cantando, né?"
34030-79 = "Normalmente eu não cantaria de graça, mas, sendo você, é especial, digamos. Você veio até aqui me ver!"
34030-80 = "A princesa presa na torre canta uma serenata à pessoa do destino. E aí? Parece uma cena de história, né!"
34030-81 = "[s] \"Só que não é torre, é jaula.\""
34030-82 = "Uau, você me puxa de volta pra realidade logo aí……? Bom, é fato."
34030-86 = "……E aí, o que te traz aqui hoje, Sensei?"
34030-87 = "[s7]  \"Eu já ouvi a história toda, Mika.\"\n[s8]  \"Você vai faltar à audiência? A Nagisa tá preocupada.\""
34030-88 = "……."
34030-89 = "……."
34030-90 = "A Nagi tá bem…… né? ……Sim, que bom."
34030-91 = "Provavelmente, do lado da Nagi estavam a Sisterhood e a comandante da Ordem, né?"
34030-92 = "……Eu sabia. Quanto mais a posição do Tea Party balança, mais as outras forças ganham espaço."
34030-93 = "Eu não imaginava que fossem conter o Tea Party de forma tão direta, mas……."
34030-94 = "……O estresse da Nagi deve estar terrível, né."
34030-95 = "[s] \"Pois é…… aliás, vindo pra cá, eu vi a aglomeração na praça.\""
34030-96 = "Ah…… sim, sei."
34030-97 = "……Bom, a minha posição atual é essa que você viu. Fazer o quê, né."
34030-98 = "A Nagi parece achar que, se eu comparecer à audiência, tudo se resolve em paz…… mas Trinity não é tão mole assim."
34030-99 = "……Desde aquele incidente, a autoridade do Tea Party caiu por terra."
34030-100 = "A opinião dentro da academia, a posição política, tudo…… é natural, né; fui eu que fiz aquilo."
34030-101 = "E, nesse estado em frangalhos, quanto mais a Nagi me protege……"
34030-102 = "mais a posição do \"Tea Party\"…… não só da Nagi; até a da Seia fica em risco."
34030-103 = "Por alguém como eu, eu não quero que isso aconteça."
34030-104 = "Porque isto tudo é o preço que EU tenho que pagar."
34030-105 = "[s9]  \"Mas dizem que você pode ser expulsa…….\"\n[s10] \"E você também já sofreu de tudo até aqui, Mika…….\""
34030-108 = "……."
34030-109 = "[s] \"Você já não pagou preço que chega?\""
34030-110 = "M-mas……."
34030-111 = "……Ainda assim, a culpa é minha."
34030-112 = "Os tesouros preciosos, cheios de memórias, que eu juntei com a Nagi, parece que queimaram, mas……."
34030-113 = "Eu, mesmo assim, não mereço perdão…… e a Seia ainda guarda rancor de mim……."
34030-114 = "[s11] \"A Seia não guarda rancor de você. Eu garanto.\"\n[s12] \"A Seia já te perdoou.\""
34030-115 = "………N-não! Não pode ser…… porque eu tentei me desculpar várias vezes e não deu……."
34030-116 = "………N-não! Não pode ser…… porque eu tentei me desculpar várias vezes e não deu……."
34030-117 = "Até quando a gente se viu outro dia……."
34030-120 = "Seia, hoje você também tá com uma cor ruim. Não dormiu? Sua pele também tá ressecada, viu? Quer que eu te empreste o creme hidratante?"
34030-121 = "……."
34030-122 = "É que, Seia……?"
34030-123 = "……Escuta, se você quiser, é que……"
34030-124 = "não quer comer comigo? Bom, falar em comer, aqui na jaula é rocambole, mas!"
34030-125 = "Francamente, a Nagi também é uma mão-fechada, né. Fazer as três refeições virarem só rocambole!"
34030-126 = "……Mika."
34030-127 = "S-sim? Quer?"
34030-128 = "Sinto muito, mas agora……."
34030-129 = "Ah…… é-é, né? No fim, é que……."
34030-130 = "Estou me sentindo um pouco mal…… me desculpe, mas vou voltar pro quarto."
34030-137 = "[ns] \"A Seia……?\""
34030-138 = "……."
34030-139 = "A Seia, ultimamente, não sai do próprio quarto, e parece que não deixa ninguém entrar……."
34030-140 = "Tem até boato de que ela está acamada…… a Seia, de origem, tem o corpo fraco."
34030-141 = "E, além disso, só corre boato ruim…… que se ouve um choro abafado vindo do quarto dela……."
34030-142 = "As palavras da Seia sempre são difíceis de entender, mas……"
34030-143 = "provavelmente, eu não fui perdoada, né……."
34030-144 = "[s13] \"A Seia disse, com todas as letras, que te perdoa.\"\n[s14] \"Não teria sido algum desencontro?\""
34030-145 = "……Obrigada, Sensei. Mas, sabe, que a Seia guarde rancor de mim, tudo bem……."
34030-146 = "……Obrigada, Sensei. Mas, sabe, que a Seia guarde rancor de mim, tudo bem……."
34030-147 = "É que eu ainda não consegui dizer direito um \"me desculpa\" pra Seia……."
34030-148 = "E, nesse estado, se, por minha culpa, a saúde dela piorar ainda mais……."
34030-149 = "Se a Seia se forçar de novo…… eu…… acho que jamais conseguiria me perdoar……."
34030-150 = "[s] \"Eu vou encontrar a Seia.\""
34030-151 = "V-você……?"
34030-152 = "[s] \"Pra que você consiga dizer direitinho o 'me desculpa' pra ela.\""
34030-153 = "……!"
34030-154 = "[s15] \"E aí…… eu, a Nagisa, a Seia e a Mika, todos juntos,\"\n[s16] \"vamos comparecer juntos à audiência de amanhã!\""
34030-155 = "……."
34030-156 = "……."
34030-157 = "……P-peraí. Por que tanto……."
34030-158 = "S-será que eu valho tudo isso……?"
34030-159 = "Eu…… jurei que nunca mais ia chorar, e você vem com isso……."
34030-160 = "……Como é que você diz uma coisa dessas."
34030-164 = "……Sim, entendi."
34030-165 = "Se você diz a esse ponto…… eu vou à audiência, com todo mundo."
34030-166 = "[s] \"Sim. Obrigado por decidir, Mika.\""
34030-167 = "……."
34030-168 = "……Sinceramente, eu achava que segunda chance não existia…… mas, se isto é o destino……."
34030-169 = "no fim, será que eu era mesmo a princesa presa na torre……?"
34030-173 = "Ah…… n-não é nada, Sensei!"
34030-174 = "Então, a Seia…… conto com você, Sensei."
34030-176 = "[ns] Dirige-se ao quarto da Seia."
34030-181 = "Sala de tratamento da Seia"
34030-183 = "……Sensei?"
34030-184 = "[s] \"Seia, você tá bem? Seu rosto tá pálido demais.\""
34030-185 = "Sensei…… você estava bem, então. Não; talvez isto seja um sonho conveniente meu. Ilusão, ficção, ou talvez ambos sejam a mesma coisa……"
34030-186 = "[s] \"Q-que foi……?\""
34030-187 = "……."
34030-188 = "Não, parece que não…… esse olhar――"
34030-189 = "……Ah, sei. Hoje era o dia da sua visita a Trinity."
34030-190 = "Perdão. Ultimamente, mais do que nunca, a fronteira entre sonho e realidade anda turva pra mim……."
34030-191 = "Presente, passado, futuro…… eles me envolvem sem cessar, a ponto de nem ficar claro onde eu estou pisando agora."
34030-192 = "Bom, em suma, não precisa se preocupar…… pode encarar assim."
34030-193 = "[s] \"Todo mundo tá preocupado. O que aconteceu?\""
34030-194 = "……Sei."
34030-195 = "Responder com precisão à pergunta \"o que aconteceu\" é difícil――mas, se há uma coisa que eu posso dizer……"
34030-196 = "eu, agora, tenho em mãos um futuro que não posso contar a ninguém. Mas a você, Sensei……."
34030-197 = "……Você daria ouvidos às minhas palavras?"
34030-198 = "[s] \"Sim, claro.\""
34030-199 = "Daqui pra frente, é algo de espécie totalmente diferente dos incidentes que você viveu até hoje…… de um tipo completamente distinto."
34030-200 = "Mas, por favor…… mesmo que soe absurdo, por favor, escute."
34030-201 = "[s] \"……Entendido.\""
34030-202 = "……Dias atrás, o mensageiro dos sonhos me anunciou."
34030-203 = "Algo do tipo \"sonho premonitório\", digamos――ou seja, um fragmento do futuro que um dia chega…… claro, isso, em si, é um dos mundos que eu vejo no dia a dia."
34030-204 = "Mas, só naquele dia, o quadro era diferente. Sim; naquele dia, eu――"
34030-205 = "……vi a cena do mundo, de Kivotos, chegando ao fim."
34030-207 = "Próximo Episódio;Entre o Sonho e a Miragem"
