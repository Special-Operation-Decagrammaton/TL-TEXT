[translation]
80000053-1 = "Não coma desse jeito!"
80000053-2 = "（Recebi uma mensagem da Koharu e fiquei esperando em frente ao portão da Trinity, no horário da saída.）"
80000053-7 = "（No meio de tantos alunos, encontrei a Koharu andando de um jeito estranho.）"
80000053-11 = "P-Sensei, você está atrasado!!"
80000053-12 = "[s1] \"...Ué?\"\n[s2] \"Espera, a Koharu acabou de chegar...?\""
80000053-13 = "N-não, não é isso... quer dizer, não era isso que eu queria dizer..."
80000053-14 = "B-bem, é que eu acabei de sair da escola... ah, espera? O que eu estou dizendo...?"
80000053-15 = "E-enfim! O que importa não é isso...!"
80000053-16 = "P-pegue logo!! Fique com isso! Não pergunte nada, só pegue logo!"
80000053-23 = "[ns3] \"Ah, chocolate.\"\n[ns4] \"Posso aceitar como um presente de Dia dos Namorados?\""
80000053-24 = "B-bem, sim, mas... por que você está tão calmo!? É um chocolate de Dia dos Namorados! Um presente especial de uma aluna!!"
80000053-25 = "B-bem, sim, mas... por que você está tão calmo!? É um chocolate de Dia dos Namorados! Um presente especial de uma aluna!!"
80000053-26 = "V-você não deveria ter alguma reação!? Parece que só eu estou fazendo escândalo aqui!?"
80000053-30 = "...Sensei?"
80000053-31 = "P-por que você abriu... espera, vai comer agora?"
80000053-32 = "Ah, não que seja proibido, mas..."
80000053-38 = "...Ah!?"
80000053-39 = "[s5] \"...Koharu?\"\n[s6] \"O que houve?\""
80000053-40 = "B-bem, é que... eu não prestei muita atenção quando comprei..."
80000053-41 = "B-bem, é que... eu não prestei muita atenção quando comprei..."
80000053-42 = "O-o desenho do papel de embrulho, o formato do chocolate, é que..."
80000053-43 = "[s] \"...O desenho?\""
80000053-44 = "N-não é nada! Esquece! É só o papel de embrulho! Só isso, não tem segundas intenções!"
80000053-48 = "..."
80000053-57 = "P-por que você está comendo desse jeito estranho!? Coma normalmente! E trate a caixa com cuidado!"
80000053-58 = "[s] \"Acho que estou comendo normal...\""
80000053-59 = "Kyaaaa...!? P-por que você está lambendo assim...!"
80000053-60 = "Você está fazendo de propósito, não está? Eu sei que está! Em um lugar público como este...!"
80000053-61 = "Me humilhando desse jeito, me deixando toda confusa...!"
80000053-62 = "S-será que essa situação também foi planejada!? Você gosta de me ver assim, e ainda por cima sendo vista pelos outros alunos...!?"
80000053-63 = "[s7] \"???\"\n[s8] \"Koharu...?\""
80000053-64 = "Seu idiota! Pervertido!!!"
80000053-65 = "Seu idiota! Pervertido!!!"
80000053-66 = "Babaca! De nada!! Pena de morte, pena de morte pra você!!"
80000053-68 = "（Sem entender direito o motivo da raiva da Koharu, acabei saboreando o chocolate ali mesmo até o fim.）"
