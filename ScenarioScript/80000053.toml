[translation]
80000053-1 = "そんな風に食べないで！"
80000053-2 = "（コハルから連絡をもらって、下校時間に合わせてトリニティの校門前で待っていた）"
80000053-7 = "（たくさんの生徒の中から、何だか変な歩き方をしているコハルを見つけた）"
80000053-11 = "せ、先生遅い！！"
80000053-12 = "[s1] \"……あれ？\"\n[s2] \"えっと、今コハルが来たような……？\""
80000053-13 = "や、違う、これじゃない……えっと、こんなことが言いたかったんじゃなくて……。"
80000053-14 = "そ、そりゃ私は今学校が終わったから……あ、あれ？私何言ってるの……？"
80000053-15 = "と、とにかく！大事なのはそんなことじゃなくて……！"
80000053-16 = "は、はいっ！！これ貰って！良いから、何も言わないで早く！"
80000053-23 = "[ns3] \"あ、チョコレート。\"\n[ns4] \"バレンタインのプレゼントってことで貰って良い？\""
80000053-24 = "そ、そうだけど……どうしてそんなに平常心なわけ！？バレンタインのチョコなのよ！生徒からの、特別な！！"
80000053-25 = "そ、そうだけど……どうしてそんなに平常心なわけ！？バレンタインのチョコなのよ！生徒からの、特別な！！"
80000053-26 = "も、もうちょっと何かこう、反応とかあるでしょ！？私だけうるさくしてるみたいじゃん！？"
80000053-30 = "……って、先生？"
80000053-31 = "な、何で開けて……え、今食べるの？"
80000053-32 = "え、いや別にダメじゃないけど……。"
80000053-38 = "……あっ！？"
80000053-39 = "[s5] \"……コハル？\"\n[s6] \"どうしたの？\""
80000053-40 = "や、その……買う時にはあんまり気にしてなかったっていうか……。"
80000053-41 = "や、その……買う時にはあんまり気にしてなかったっていうか……。"
80000053-42 = "そ、そのラッピングの柄とか、チョコの模様とかが、その……。"
80000053-43 = "[s] \"……柄？\""
80000053-44 = "な、何でもない！気にしないで！あくまでそういうラッピング！それだけだから、他意は無いから！"
80000053-48 = "……。"
80000053-57 = "な、何でそんな変な食べ方するの！？普通に食べて！あと箱も大事に扱って！"
80000053-58 = "[s] \"普通だと思うけど……？\""
80000053-59 = "ひゃあぁぁぁっ……！？な、何でそんな舐るみたいに……！"
80000053-60 = "やっぱりわざとでしょ、分かってるんでしょ！？こんな公共の場で……！"
80000053-61 = "そうやって私のこと辱めて、めちゃくちゃに……！"
80000053-62 = "も、もしかしてこの状況も狙い通り！？私が見てるのを楽しんで、それを他の生徒たちに見られてるのも……！？"
80000053-63 = "[s7] \"？？？\"\n[s8] \"コハル……？\""
80000053-64 = "最っ低！変態！！！"
80000053-65 = "最っ低！変態！！！"
80000053-66 = "バーカ！お粗末様！！死刑だ死刑っ！！"
80000053-68 = "（コハルが怒ってる理由がほぼ分からないまま、結局最後までその場でありがたく味わった）"
