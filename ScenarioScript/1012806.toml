[translation]
1012806-1 = "フユの空間"
1012806-2 = "（フユに言われた場所に到着したものの……）"
1012806-6 = "ワイルドハント生の展覧会……これは見逃せませんね。"
1012806-7 = "ええ、楽しみです。"
1012806-9 = "（思っていた以上に賑わっている）"
1012806-10 = "（とあるポスターが目に入った）"
1012806-11 = "[ns] \"[ruby=わかさ]若狭[/ruby]フユのメディアアート個展……？\""
1012806-12 = "はい！"
1012806-14 = "ここが私の個展会場です！"
1012806-15 = "さあ、芸術の世界をご案内しましょう！"
1012806-16 = "[s] \"……なんだか芸術家っぽいね！\""
1012806-17 = "へへ、そうですか？"
1012806-18 = "……じゃなくて！#n私だってワイルドハント芸術学院の生徒ですから！"
1012806-19 = "今日だけは特殊交易部の営業担当ではなく……。"
1012806-20 = "一人の芸術家として見てください！"
1012806-21 = "[s1] \"うーん、じゃあ何と呼べばいいのかな？\"\n[s2] \"フユ先生？\""
1012806-24 = "えっと、まあ、普通に……。"
1012806-25 = "……フユちゃん、とか？"
1012806-26 = "と、とにかく！中に入りましょうか？"
1012806-27 = "作家本人の解説つきで鑑賞できるなんてこと、滅多にありませんよ？"
1012806-29 = "（展示室はとても暗く）"
1012806-30 = "（メディアアートを映し出すスクリーンだけが光を放っている）"
1012806-31 = "まず、こちらの作品から見てみましょうか。"
1012806-32 = "もしこの展覧会を一篇の詩集に例えるとしたら……。"
1012806-33 = "この作品は、「序詩」でしょうか。"
1012806-34 = "[s] \"展示されている作品のコンセプトを示すもの……って感じ？\""
1012806-35 = "その通りです！"
1012806-36 = "ですから、入り口にこの作品を配置して……。"
1012806-37 = "来場者がどの順番で作品を鑑賞したとしても、#nこれだけは最初に目に入るようにしました。"
1012806-38 = "[s] \"しっかり考えているんだね。\""
1012806-39 = "もちろんです。#n作品の配置や照明、スクリーンの明るさから動線にいたるまで……。"
1012806-40 = "展示物のすべてに、意図があります。#nもちろん、この会場も含めて。"
1012806-41 = "では、こちらへどうぞ。"
1012806-48 = "（そうしてフユの作品を鑑賞していると……）"
1012806-50 = "こちらのオブジェですが――"
1012806-55 = "……お腹が空きましたか？"
1012806-56 = "[s] \"いや、これはフユのほうから……。\""
1012806-57 = "ふふ、仕方ありませんね。"
1012806-58 = "芸術家たるもの、VIPの空腹にも対応できて然るべき。ということですね？"
1012806-59 = "[s] \"わ、私はそこまでお腹は……！\""
1012806-60 = "しっ。"
1012806-61 = "ついてきてくださいね。せ・ん・せ・い？"
1012806-66 = "（そうやってフユに連れていかれた場所は……）"
1012806-71 = "（ギャラリーの片隅だった）"
1012806-72 = "[ns] \"こ、ここは……？\""
1012806-75 = "[wa:490]― [log=후유]ここは、[wa:1440]スクリーンの裏側です。[/log]"
1012806-77 = "― [log=후유]つまり、[wa:1370]舞台裏……。[/log]"
1012806-80 = "[wa:540]― [log=후유]作家だけが出入りできる空間です。[/log]"
1012806-83 = "― [log=후유]ここに入る唯一の方法は……[/log]"
1012806-85 = "[wa:80]― [log=후유]作家である私に[wa:1170]許可を取ること。[/log]"
1012806-88 = "[wa:530]― [log=후유]だから、[wa:1500]ここは今――[/log]"
1012806-90 = "― [log=후유]先生と[wa:1090]私、[wa:2660]二人……[wa:1660]きりの……。[/log]"
1012806-93 = "[wa:250]― [log=후유]って！[wa:650]いやいやいや！[/log]"
1012806-95 = "― [log=후유]そ、そうじゃなくてですね！[/log]"
1012806-98 = "― [log=후유]とにかく！[/log]"
1012806-100 = "― [log=후유]お弁当を作ってきたんですけど……。[/log]"
1012806-103 = "[ns] \"フユの手作り弁当！？\""
1012806-104 = "[wa:620]― [log=후유]えっと、[wa:1450]もし、[wa:830]よろしければ……。[/log]"
1012806-106 = "― [log=후유]……一緒に、[wa:2720]食べませんか？[/log]"
1012806-109 = "（その後、一緒にお弁当を食べた）"
1012806-110 = "（料理上手だというフユの言葉は、本当だった）"
