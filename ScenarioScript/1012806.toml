[translation]
1012806-1 = "Espaço de Fuyu"
1012806-2 = "(Embora eu tenha chegado ao lugar que Fuyu me disse para ir...)"
1012806-6 = "Uma exposição de alunos do Wild Hunt...você não pode perder."
1012806-7 = "Sim, estou ansioso por isso."
1012806-9 = "(Está mais lotado do que eu esperava)"
1012806-10 = "(Um certo pôster chamou minha atenção)"
1012806-11 = "[ns] \"Wakasa Exposição individual de arte de mídia de Fuyu...?\""
1012806-12 = "sim!"
1012806-14 = "Este é o meu local de exposição individual!"
1012806-15 = "Deixe-nos apresentá-lo ao mundo da arte!"
1012806-16 = "[s] \"...Você parece um artista!\""
1012806-17 = "Hehe, é isso mesmo?"
1012806-18 = "...Não! #nTambém sou estudante da Wild Hunt Art Academy!"
1012806-19 = "Só que hoje não sou responsável pelas vendas do departamento de comércio especial..."
1012806-20 = "Olhe para mim como um artista!"
1012806-21 = "[s1] \"Hmm, então como devo chamá-lo?\"\n[s2] \"Fuyu-sensei?\""
1012806-24 = "Bem, normalmente..."
1012806-25 = "...Fuyu-chan ou algo assim?"
1012806-26 = "E de qualquer maneira! Vamos entrar?"
1012806-27 = "Não é sempre que você pode assistir a um filme com comentários do próprio artista."
1012806-29 = "(A sala de exposição é muito escura)"
1012806-30 = "(Apenas a tela que mostra a arte multimídia está emitindo luz)"
1012806-31 = "Primeiro, vamos dar uma olhada neste trabalho."
1012806-32 = "Se eu comparasse esta exposição a uma coleção de poemas..."
1012806-33 = "Este trabalho é um \"prefácio\"?"

1012806-34 = "[s] \"É algo que mostra o conceito da obra exposta...?\""
1012806-35 = "Isso mesmo!"
1012806-36 = "Por isso coloquei esse trabalho na entrada..."
1012806-37 = "Independentemente da ordem em que os visitantes visualizaram as obras, garantimos que #nthis fosse a primeira coisa que viam."
1012806-38 = "[s] \"Você está pensando com cuidado.\""
1012806-39 = "Claro. #nTudo desde a colocação da obra, a iluminação, o brilho da tela, até as linhas de fluxo..."
1012806-40 = "Todas as exposições têm um propósito. #nClaro, incluindo este local."
1012806-41 = "Pois bem, aqui está."
1012806-48 = "(E enquanto eu apreciava o trabalho de Fuyu...)"
1012806-50 = "Este objeto é..."
1012806-55 = "...Está com fome?"
1012806-56 = "[s] \"Não, isso é de Fuyu...\""
1012806-57 = "Hehe, não posso evitar."
1012806-58 = "Como artista, você deve ser capaz de satisfazer a fome dos VIPs. É isso que você quer dizer?"
1012806-59 = "[s] \"E-eu estou com tanta fome...!\""
1012806-60 = "Shh."
1012806-61 = "Por favor, siga-me. sensei?"
1012806-66 = "(O lugar onde Fuyu me levou assim...)"
1012806-71 = "(Estava em um canto da galeria)"
1012806-72 = "[ns] \"A-aqui...?\""
1012806-75 = "[wa:490]― [log=후유]Este é o verso da tela [wa:1440]. [/registro]"
1012806-77 = "― [log=후유]Em outras palavras, [wa:1370] nos bastidores... [/log]"
1012806-80 = "[wa:540]― [log=후유]Este é um espaço onde apenas artistas podem entrar e sair. [/registro]"
1012806-83 = "― [log=후유]A única maneira de entrar aqui é...[/log]"
1012806-85 = "[wa:80]― [log=후유]Obtenha [wa:1170]permissão minha como escritor. [/registro]"
1012806-88 = "[wa:530]―― [log=후유]Então, [wa:1500]Isso é agora――[/log]"
1012806-90 = "― [log=후유]Professor e [wa:1090]eu, [wa:2660]duas pessoas... [wa:1660]Kirino... [/log]"
1012806-93 = "[wa:250]― [log=후유]! [wa:650] No, no, no! [/registro]"
1012806-95 = "― [log=후유]Ah, não é isso! [/registro]"
1012806-98 = "― [log=후유]De qualquer forma! [/registro]"
1012806-100 = "- [log=후유]Eu fiz uma lancheira... [/log]"
1012806-103 = "[ns] \"Bento caseiro de Fuyu!?\""
1012806-104 = "[wa:620]― [log=후유]Bem, [wa:1450]Se você não se importa [wa:830]... [/log]"
1012806-106 = "― [log=후유]...Você gostaria de comer [wa:2720] comigo? [/registro]"
1012806-109 = "(Depois almoçamos juntos.)"
1012806-110 = "(As palavras de Fuyu sobre ser um bom cozinheiro eram verdadeiras.)"
