[translation]
1010003-1 = "O que mudou, o que permanece igual"

1010003-3 = "[ns1] \"Em outras palavras, com os números da loteria que você descobriu do outro lado...\"\n[ns2] \"Visando os ganhos...!?\""

1010003-6 = "sim. #nO número que você acabou de memorizar ganhará no próximo sorteio."

1010003-7 = "[s3] \"Hmm.\"\n[s4] \"Mas...\""

1010003-10 = "Hmm, é um método que só eu posso fazer. #nVocê pode tentar qualquer coisa, certo?"

1010003-11 = "[s] \"O desafio é importante, mas...\""

1010003-13 = "[ns5] \"Me pergunto se está tudo bem...\"\n[ns6] \"Como educador...\""

1010003-18 = "[ns7] \"...Isto é para Shiroko!\"\n[ns8] Compre um bilhete de loteria."

1010003-26 = "(Quando verifiquei o resultado mais tarde, era diferente do número que Shiroko lembrava.)"

1010003-35 = "...Desculpe, professor. #nVocê desperdiçou dinheiro por minha causa..."

1010003-36 = "[s] \"Tudo bem, gostei de esperar pelos resultados.\""

1010003-37 = "……sim. #nAfinal, esse mundo pode ser um pouco diferente daquele que conheço."

1010003-38 = "[s] \"Por exemplo, de que lado?\""

1010003-39 = "...O que devo dizer?"

1010003-40 = "Não tenho essa memória detalhada."

1010003-41 = "...Não consigo explicar bem, me desculpe."

1010003-42 = "...Não sou a mesma pessoa que costumava ser e não sou #nthisworldloco."

1010003-43 = "Muitas coisas podem ser diferentes, como números de loteria."

1010003-44 = "[s] \"Mas algumas coisas nunca mudam.\""

1010003-45 = "Hum, isso mesmo. #nÉ estranho, mas...a única coisa que não mudou foi o professor."

1010003-46 = "[s] \"Também gosto do fato de Shiroko adorar andar de bicicleta.\""

1010003-47 = "……."

1010003-48 = "[s] \"Você pode me dizer por que desistiu?\""

1010003-50 = "[ns9] \"Eu simplesmente pedalo minha bicicleta para gerar eletricidade.\"\n[ns10] \"Meu quarto tem até garagem para minha bicicleta.\""

1010003-53 = "sim……."

1010003-54 = "Não há nenhuma razão específica. #nNo entanto, faz um tempo que não ando nele."

1010003-55 = "Eu costumava dirigir levemente, cerca de alguns milhares de quilômetros, mas..."

1010003-56 = "Não tenho mais confiança de que posso terminar a corrida..."

1010003-57 = "Quando você percebe que mesmo pressionando o pedal, você não pode voltar a ser como era antes..."

1010003-58 = "[s] \"Por que você achou isso?\""

1010003-59 = "...É assustador."

1010003-60 = "Se estou em Abidos e estou com você...#n, é tudo um sonho."

1010003-64 = "Desculpe, professor. #nDiga algo estranho novamente."

1010003-70 = "[ns] \"Não estou sonhando, Shiroko.\""

1010003-74 = "[ns] \"Estarei sempre ao lado de Shiroko.\""

1010003-75 = "...Tch, está um pouco perto."

1010003-79 = "...Hmm, eu sei. #n sempre esteve ao meu lado."

1010003-80 = "Há coisas que não mudam."

1010003-86 = "Também me lembro desta estrada."

1010003-87 = "O local onde fui no primeiro dia de travessia de Kivotos."

1010003-88 = "...Fui pego num semáforo de lá e mandei um Momotalk para a professora."

1010003-92 = "……sim. #nLembro de tudo."

1010003-96 = "Professor, por aqui."

1010003-97 = "[ns] \"Shiroko?\""

1010003-107 = "Você pode obter uma vista panorâmica daqui."

1010003-111 = "[ns11] \"Bem, espere... Shiroko.\"\n[ns12] \"Haa... haa, já estou ficando sem energia.\""

1010003-114 = "[ns] Alinhe-se onde Shiroko está."

1010003-120 = "[wa:1800]― [log=시로코 테러 무소속]……いつも通りだね、[wa:1230]ここは。[/log]"
1010003-121 = "[wa:3260]― [log=시로코 테러 무소속]変わったのは、[wa:1190]私だけか。[/log]"
1010003-124 = "[wa:550]― [log=시로코 테러 무소속]ん……[wa:1140]でも、[wa:860]変わってないものもあって、[wa:1630]少し安心した。[/log]"
1010003-127 = "[wa:1540]― [log=시로코 테러 무소속]先生、[wa:1560]私、[wa:1280]また自転車に乗ってみたいと思う。[/log]"
1010003-130 = "[wa:1170]― [log=시로코 테러 무소속]色々と壁はあるかもしれないけど……[/log]"
1010003-131 = "[wa:3720]― [log=시로코 테러 무소속]でも、[wa:940]先生が居てくれたら……[wa:2250]できる気がするの。[/log]"
1010003-134 = "[ns] \"Sim. Estou torcendo por você, Shiroko.\""

1010003-135 = "[wa:820]― [log=시로코 테러 무소속]ん、[wa:1110]ありがとう。[wa:990]先生。[/log]"
