[translation]
3502-1 = "プレゼント？"
3502-3 = "うわぁ……あっつい～"
3502-4 = "でも、ゴリゴリ君があるから大丈夫！"
3502-5 = "食後のおやつに～ゴ～リゴ～リ～君～"
3502-11 = "あれ……？"
3502-12 = "……風紀委員長！？"
3502-13 = "……？"
3502-14 = "ああ、メグね。ここにはどんな用で……？"
3502-18 = "……もしかして、温泉を掘りに？"
3502-19 = "え？ううん、違うよ～！おやつにゴリゴリ君を買いにきたの！"
3502-20 = "「ゴリゴリ君」……？"
3502-21 = "ああ、そういえばそういった名前のアイスがあったわね。"
3502-22 = "じゃあ、今日は温泉を掘るわけではないのね？"
3502-23 = "えっとねぇ……"
3502-24 = "……あ！そうだ！"
3502-25 = "思い出した！カスミ部長が言ってた#n「風紀委員会かヴァルキューレに会った時の対処法」！#n相手はヒナ委員長だから……！"
3502-26 = "……？"
3502-27 = "……うーん、えっと。#nどうやるんだっけ……。"
3502-31 = "その……。"
3502-32 = "……あ！"
3502-33 = "そうそう！まずはこれを出して……！"
3502-38 = "じゃじゃーん！#nはい、どうぞ！"
3502-44 = "そして――"
3502-45 = "「いつもご苦労様です。ささやかながら心ばかりのプレゼントです。これからも何卒よろしくお願いいたします。」"
3502-46 = "…………。"
3502-47 = "……………………。"
3502-48 = "……でいいんだよね？"
3502-49 = "よし！完了！"
3502-50 = "あ、さっき委員長が言っていた温泉についてだけど……私は分かんないや！#n多分そのうち部長が教えてくれると思う！"
3502-51 = "なるほど……これが……。"
3502-55 = "ふぅ……。"
3502-56 = "……メグ。"
3502-57 = "カスミから教わったこれ、他の人にもやったことある？"
3502-58 = "……うん？まだだよ？"
3502-59 = "実際に試したのはヒナ委員長が初めて！それがどうかしたの？"
3502-60 = "そう……ならいいわ。"
3502-61 = "一つ、頼みがあるのだけど。聞いてくれないかしら。"
3502-62 = "頼み……？"
3502-63 = "もちろん！なんでも言って！"
3502-64 = "ありがとう。じゃあ……"
3502-65 = "今から私がやることを、カスミにそのまま伝えてあげて。"
3502-71 = "……はっ！？"
3502-72 = "袋が、粉々に……！？"
3502-73 = "彼女ならこれだけで十分伝わるはずよ。もしも上手くいかなかったら……"
3502-74 = "「次にこのような行為が発覚したら、その時は確実に制裁を受けてもらう。」"
3502-75 = "「ゲヘナでは、昔の悪癖は慎むように。」"
3502-78 = "……と言ってあげて。"
3502-79 = "プレゼントを渡したのに、それが壊されたと……部長に伝える……。"
3502-80 = "うーん、よく分かんないけど……。"
3502-81 = "ま、ヒナ委員長もカスミ部長も頭いいんだし、なにか理由があるんだよね！#nうん！分かった！"
3502-82 = "ふふ、ありがとう。"
3502-83 = "……あ、そうだ！"
3502-84 = "ちょっと待っててね、風紀委員長！すぐ行ってくるから！！"
3502-89 = "お待たせ！"
3502-90 = "はい、これ！"
3502-95 = "これは……アイス？"
3502-96 = "……ゴリゴリ君を、私にくれるの？"
3502-97 = "うん！いっぱい買って、みんなに分けようと思ってたんだ。#nヒナ委員長にも1個あげる！"
3502-98 = "今日暑いし、こういう日はゴリゴリ君に限るよね！"
3502-99 = "……あっ。"
3502-100 = "そういえば、さっきプレゼント壊してたよね……もしかして、こういうのイヤだった？"
3502-101 = "ご、ごめんね！ついクセで……。"
3502-105 = "……ううん。違うわ。"
3502-106 = "ありがとう、メグ。"
3502-107 = "……うん？これはいいの？さっきと何が違うんだろう……？"
3502-108 = "それはカスミに聞けば分かるはずよ。"
3502-109 = "…………。"
3502-110 = "……メグ。"
3502-111 = "うん？"
3502-112 = "あなたは今、3年生よね？#nカスミとは随分と仲良さそうだけど……。"
3502-113 = "温泉開発部は以前から存在している部活……#n部員の数は今よりだいぶ少なくて、15名くらいだったはず。"
3502-114 = "以前はメグが部長を務めていたと思うのだけど。#nカスミは後から入部したのよね？"
3502-115 = "うん、そうだよ！カスミ部長が、自分が部長をやるって言ったから、お願いしたの。"
3502-116 = "さすが風紀委員長！何でも知ってるんだね！"
3502-117 = "何でもってわけじゃないわ……。"
3502-118 = "……。"
3502-119 = "じゃあ、カスミが先に「部長をやる」って言ったのね？"
3502-120 = "うん。"
3502-121 = "……そう。"
3502-122 = "……あ、ちょっと違うかも？"
3502-123 = "……？"
3502-124 = "正確には「何がしたい？」って言われて、「温泉だけ掘ってたい！」って答えたの。"
3502-125 = "そしたら、カスミ部長が「じゃあ、そうさせてやろう」って言ってくれて。"
3502-126 = "その後からは、本当に温泉を掘るだけの仕事を任されたんだ！#n部員もいっぱい増えたよ！"
3502-130 = "……そうなのね。"
3502-131 = "だいたい予想通りだわ。[ruby=・]あ[/ruby][ruby=・]そ[/ruby][ruby=・]こ[/ruby]の連中は、そういった口約束を重視してきたもの。"
3502-134 = "……うん？どういうこと？"
3502-135 = "いえ、なんでもないわ。こっちの話。"
3502-136 = "では先に失礼するわね。今日は暑いし、メグも熱中症には気をつけて。#nそれとカスミには……"
3502-137 = "……あまり騒ぎを起こさないように、と伝えておいて。"
3502-138 = "うん！分かった～！風紀委員長も気をつけてね！"
3502-142 = "んじゃ、部長のところに帰ろっと。"
3502-144 = "……って事があってね！"
3502-145 = "あ、風紀委員長にこう言われたの。"
3502-146 = "「次にこのような行為が発覚したら、その時は確実に制裁を与える。」"
3502-147 = "「ゲヘナでは、昔の悪癖は慎むように。」――だって！"
3502-151 = "ひいいいいっ！！！"
3502-152 = "プレゼント？"
