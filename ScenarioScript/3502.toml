[translation]
3502-1 = "Um presente?"
3502-3 = "Uau... que calor..."
3502-4 = "Mas, com o Gorigori-kun, tudo bem!"
3502-5 = "Um lanchinho depois da refeição~ Go~ri~go~ri~kun~"
3502-11 = "Ué...?"
3502-12 = "...Presidente do Comitê Disciplinar!?"
3502-13 = "...?"
3502-14 = "Ah, é a Meg. O que você veio fazer aqui...?"
3502-18 = "...Por acaso, veio cavar uma fonte termal?"
3502-19 = "Hã? Não, não é isso! Eu vim comprar um Gorigori-kun de lanche!"
3502-20 = "“Gorigori-kun”...?"
3502-21 = "Ah, agora que você falou, lembro que existe um sorvete com esse nome."
3502-22 = "Então, hoje você não veio para cavar uma fonte termal?"
3502-23 = "Bem, é que..."
3502-24 = "...Ah! Já sei!"
3502-25 = "Lembrei! O que a Presidente Kasumi disse sobre#n“como lidar com o Comitê Disciplinar ou a Valkyrie”!#nComo a pessoa é a Presidente Hina...!"
3502-26 = "...?"
3502-27 = "...Hmm, bem. #nComo é que se faz mesmo..."
3502-31 = "Então..."
3502-32 = "...Ah!"
3502-33 = "Isso mesmo! Primeiro, eu tiro isso aqui...!"
3502-38 = "Tcharam!#nAqui, pode pegar!"
3502-44 = "E então—"
3502-45 = "“Obrigada pelo seu trabalho árduo de sempre. É apenas uma pequena lembrança. Conto com você daqui para frente.”"
3502-46 = "............"
3502-47 = "...................."
3502-48 = "...É assim que se diz, né?"
3502-49 = "Beleza! Missão cumprida!"
3502-50 = "Ah, sobre a fonte termal que você mencionou antes... eu não faço ideia!#nProvavelmente a presidente vai te contar sobre isso qualquer dia desses!"
3502-51 = "Entendo... então é isso..."
3502-55 = "Ufa..."
3502-56 = "...Meg."
3502-57 = "Isso que você aprendeu com a Kasumi, você já fez com outras pessoas?"
3502-58 = "...Hum? Ainda não."
3502-59 = "A Presidente Hina foi a primeira pessoa com quem eu testei! Por que a pergunta?"
3502-60 = "Entendo... então está bem."
3502-61 = "Tenho um pedido para você. Poderia me ouvir?"
3502-62 = "Um pedido...?"
3502-63 = "Claro! Pode falar qualquer coisa!"
3502-64 = "Obrigada. Então..."
3502-65 = "Transmita exatamente o que eu vou fazer agora para a Kasumi."
3502-71 = "...Hã!?"
3502-72 = "O pacote, em pedaços...!?"
3502-73 = "Para ela, isso será o suficiente para entender. E se não funcionar..."
3502-74 = "“Se esse tipo de comportamento for descoberto novamente, desta vez você certamente receberá uma punição.”"
3502-75 = "“Em Gehenna, tente abandonar seus velhos maus hábitos.”"
3502-78 = "...Diga isso a ela."
3502-79 = "Então eu dei um presente, mas ele foi destruído... e eu tenho que contar isso para a presidente..."
3502-80 = "Hmm, não entendi muito bem, mas..."
3502-81 = "Bem, a Presidente Hina e a Presidente Kasumi são inteligentes, então deve ter algum motivo!#nIsso! Entendido!"
3502-82 = "Fufu, obrigada."
3502-83 = "……Ah, já sei!"
3502-84 = "Espere um pouco, Presidente do Comitê Disciplinar! Já volto!!"
3502-89 = "Desculpe a demora!"
3502-90 = "Aqui, pegue!"
3502-95 = "Isto é…… um sorvete?"
3502-96 = "……Você vai me dar um Gori-Gori-kun?"
3502-97 = "Sim! Eu comprei um monte, pensando em dividir com todo mundo. #nVou dar um para a Presidente Hina também!"
3502-98 = "Está tão quente hoje, e dias assim pedem um Gori-Gori-kun, né!"
3502-99 = "……Ah."
3502-100 = "Falando nisso, você destruiu aquele presente agora pouco…… será que você não gosta desse tipo de coisa?"
3502-101 = "De-desculpe! Foi força do hábito……"
3502-105 = "……Não. Não é isso."
3502-106 = "Obrigada, Meg."
3502-107 = "……Hm? Então esse está tudo bem? O que será que mudou em relação ao anterior……?"
3502-108 = "Você deveria perguntar isso para a Kasumi."
3502-109 = "…………."
3502-110 = "……Meg."
3502-111 = "Sim?"
3502-112 = "Você está no terceiro ano agora, certo? #nVocês parecem ser bem próximas da Kasumi, mas……"
3502-113 = "O Departamento de Desenvolvimento de Fontes Termais já existia há algum tempo…… #nO número de membros era bem menor do que agora, devia ter umas 15 pessoas."
3502-114 = "Eu acho que a Meg era a presidente antes. #nA Kasumi entrou depois, não foi?"
3502-115 = "Sim, é isso mesmo! A Presidente Kasumi disse que ela assumiria o cargo, então eu pedi para ela."
3502-116 = "Como esperado da Presidente do Comitê Disciplinar! Você sabe de tudo!"
3502-117 = "Não é como se eu soubesse de tudo……"
3502-118 = "……."
3502-119 = "Então, foi a Kasumi quem disse primeiro que "assumiria a presidência"?"
3502-120 = "Sim."
3502-121 = "……Entendo."
3502-122 = "……Ah, talvez seja um pouco diferente?"
3502-123 = "……?"
3502-124 = "Para ser exata, ela me perguntou "O que você quer fazer?", e eu respondi "Eu só quero cavar fontes termais!"."
3502-125 = "Então a Presidente Kasumi disse: "Então, deixe que eu cuido disso para você"."
3502-126 = "Depois disso, ela me deixou encarregada apenas do trabalho de cavar fontes termais! #nE o número de membros aumentou bastante!"
3502-130 = "……Entendo."
3502-131 = "É mais ou menos como eu esperava. Aquele pessoal sempre deu importância a esse tipo de promessa verbal."
3502-134 = "……Hm? O que você quer dizer?"
3502-135 = "Não, não é nada. Esqueça."
3502-136 = "Bem, vou indo na frente. Está quente hoje, então tome cuidado com a insolação, Meg. #nE quanto à Kasumi……"
3502-137 = "……Diga a ela para não causar tanta confusão."
3502-138 = "Sim! Entendido~! A Presidente do Comitê Disciplinar também se cuide!"
3502-142 = "Bom, vou voltar para onde a presidente está."
3502-144 = "……E foi isso que aconteceu!"
3502-145 = "Ah, a Presidente do Comitê Disciplinar me disse o seguinte:"
3502-146 = "“Se esse tipo de comportamento for descoberto novamente, desta vez, eu aplicarei uma sanção com certeza.”"
3502-147 = "“Em Gehenna, tente se livrar dos velhos maus hábitos.” — foi o que ela disse!"
3502-151 = "Aaaaaaaah!!!"
3502-152 = "Presente?"
