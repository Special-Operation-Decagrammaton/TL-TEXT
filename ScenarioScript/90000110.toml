[translation]
90000110-1 = "Episódio 12; Decagrammaton"
90000110-4 = "……As coordenadas onde o sinal do Decagrammaton foi detectado são aqui."
90000110-5 = "[s] \"É raro ver a Himari no campo de batalha…….\""
90000110-6 = "Isso é óbvio. #nEu sou basicamente uma garota de poltrona, mas se for necessário, não me importo de entrar em combate, sabe?"
90000110-7 = "Bem, embora envolva um pouco de perigo, é verdade que também tenho tempo livre."
90000110-8 = "Acima de tudo, eu queria ver este lugar com meus próprios olhos."
90000110-9 = "Algum motivo em especial?"
90000110-10 = "……Desde que detectei o sinal do Decagrammaton, coletei muitas informações sobre este lugar."
90000110-11 = "Para isso, como hacker, usei todos os meios possíveis."
90000110-12 = "Como resultado, encontrei várias informações interessantes."
90000110-16 = "“Se pudermos pesquisar Deus e provar sua existência…… poderemos analisar sua estrutura e reproduzi-la. #n Ou seja, este é o método para criar um novo Deus……”――"
90000110-18 = "？"
90000110-20 = "É a filosofia de design do “Sistema de Análise Autônomo Anti-Absoluto”."
90000110-22 = "Essa “pesquisa que tenta provar a existência absoluta” foi realizada em algum lugar destas ruínas."
90000110-23 = "Parece que tentaram criar uma super inteligência artificial para isso, mas…… #n no final, não chegaram a completar."
90000110-24 = "Portanto, a prova terminou antes mesmo de começar."
90000110-25 = "No entanto, se o sinal do Decagrammaton foi detectado neste laboratório…… #n a história muda de figura."
90000110-26 = "Ou seja……."
90000110-27 = "Como você suspeitou, este lugar é onde a pesquisa foi realizada."
90000110-28 = "……Humm."
90000110-29 = "[s] \"Então, a verdadeira identidade do Decagrammaton é……\""
90000110-30 = "Se a IA que permaneceu nas ruínas continuou a análise para provar a existência de Deus…… #n e, no final, acabou se autoproclamando Deus……"
90000110-31 = "……Ainda assim, isso não passa de uma hipótese por enquanto. #n Vim aqui para confirmar com meus próprios olhos o que é a verdade."
90000110-32 = "Mas, pelo menos, alguma verdade deve estar dentro deste prédio."
90000110-33 = "……Isso não significa que este lugar é extremamente perigoso?"
90000110-34 = "Não estou preocupada. #n Mesmo que entremos em perigo, a Eimi nos protegerá, não é?"
90000110-39 = "Ora, por que essa expressão estranha?"
90000110-40 = "Bem, se a chefe diz isso……."
90000110-41 = "Muito bem, então vamos entrar."
90000110-42 = "Antes disso, chefe, se algo ficar perigoso, recue imediatamente, entendeu?"
90000110-43 = "Sim, deixo essa parte com você."
90000110-44 = "Certo, então……"
90000110-47 = "Interior do Laboratório"
90000110-51 = "……."
90000110-52 = "Este é o laboratório do “Sistema de Análise Autônomo Anti-Absoluto” que você mencionou? #n Não parece ter nada de especial……."
90000110-53 = "De qualquer forma, vamos investigar."
90000110-54 = "Certo. Sensei, não sei o que pode acontecer, então não se afaste de mim, está bem?"
90000110-66 = "Não é um corredor comum?"
90000110-67 = "Parece que sim…… ao que tudo indica, está conectado ao depósito de materiais."
90000110-75 = "……."
90000110-79 = "……Eu encontrei."
90000110-80 = "Hm?"
90000110-81 = "Isso, algo parecido com um computador sendo montado……?"
90000110-82 = "Sim. Provavelmente, este é o corpo principal do “Sistema de Análise Autônomo Anti-Absoluto”……."
90000110-83 = "Parece uma sucata que nem sei se liga……?"
90000110-84 = "Pois é…… se for esse o caso, como diziam os rumores, aquele experimento realmente falhou……? #n Mas, se for assim, então o que……."
90000110-85 = "O “Sistema de Análise Autônomo Anti-Absoluto” nunca existiu……?"
90000110-86 = "Mas o sinal do Decagrammaton não tem explicação…… #n Será que estamos perseguindo um fantasma?"
90000110-87 = "……Vamos dar mais uma olhada ao redor. #n Podemos ter deixado passar algo."
90000110-88 = "Certo."
90000110-95 = "Está empoeirado, mas... é um refeitório?"
90000110-96 = "Parece que sim."
90000110-100 = "Chuveiros para funcionários... e tem até um banho público."
90000110-101 = "...As instalações em si são bem sólidas."
90000110-105 = "Diz aqui que é uma sala de descanso para funcionários."
90000110-106 = "Ah. Chefe, esta máquina de venda automática ainda está funcionando. Posso tentar comprar algo?"
90000110-107 = "Eu pediria que evitasse. Não sabemos quantos dias você passaria de cama depois, sabe?"
90000110-111 = "Sala de recepção... mas não parece ter sido usada nem um pouco."
90000110-112 = "Por que um lugar como este...?"
90000110-118 = "É o gerador da instalação. Está bem velho, mas..."
90000110-119 = "O combustível também está vazio."
90000110-125 = "Hum..."
90000110-126 = "Não está quase na hora do sol se pôr?"
90000110-127 = "Considerando o horário, não seria estranho se Kether aparecesse agora..."
90000110-128 = "..."
90000110-129 = "Não encontramos nada de especial, na verdade."
90000110-130 = "Refeitório, sala de descanso, dormitório... parece uma instalação comum que se encontra em qualquer lugar."
90000110-131 = "Será que o sinal de Decagrammaton era apenas um erro de conexão...?"
90000110-132 = "...Pode ser."
90000110-133 = "Mas, se for esse o caso, o que Kether estava protegendo...?#nAlém disso, por que realizaram uma obra tão grande para restaurá-lo após ter ficado submerso...?"
90000110-134 = "..."
90000110-135 = "Chefe, o que vamos fazer? Não seria melhor voltarmos logo?"
90000110-136 = "Sim, é verdade, mas..."
90000110-137 = "Sinto que algo está estranho... como se eu tivesse deixado passar algo despercebido..."
90000110-138 = "[s] \"Pensando bem... não é estranho aquilo estar ligado?\""
90000110-139 = "...Aquilo?"
90000110-140 = "Do que você está falando...?"
90000110-141 = "..."
90000110-142 = "...!"
90000110-143 = "É isso! Como eu não percebi antes...!"
90000110-144 = "Vamos nos apressar!"
90000110-149 = "Chefe?"
90000110-150 = "[s] Seguir Himari."
90000110-156 = "..."
90000110-157 = "...A máquina de venda automática de antes?"
90000110-162 = "Pensando bem..."
90000110-163 = "Nesta ruína, o fornecimento de água e eletricidade deveria estar totalmente cortado."
90000110-164 = "Mas... esta máquina de venda automática está ligada por algum motivo."
90000110-165 = "...Verdade. O gerador da instalação também parecia ter parado há muito tempo..."
90000110-166 = "Chefe, espere um pouco. Vou verificar."
90000110-170 = "...Realmente está funcionando."
90000110-171 = "Ah, é um sistema que escaneia notas automaticamente e calcula o troco.#nÉ uma tecnologia de IA bem recente, não é?"
90000110-172 = "Eimi, mais importante, verifique a fonte de energia."
90000110-173 = "Ah, certo."
90000110-178 = "..."
90000110-179 = "Isso..."
90000110-180 = "O cabo de energia está cortado, mas...?"
90000110-181 = "..."
90000110-182 = "[s] \"Fenômeno singular...\""
90000110-183 = "Isso significa que, será que..."
90000110-184 = "……Chefe? Por acaso, você pretende comprar isso?"
90000110-193 = "Obrigada pela compra! Tome um café e que você tenha um ótimo dia!"
90000110-194 = "Este café…… os grãos………… o blend…… energia…………"
90000110-195 = "……Você é o Decagrammaton?"
90000110-196 = "Chefe……?"
90000110-197 = "Um sabor…… gentil……………… quente…………"
90000110-198 = "……"
90000110-199 = "……"
90000110-201 = "……Ah, sim."
90000110-206 = "！！"
90000110-207 = "！？"
90000110-208 = "[s] \"……！\""
90000110-209 = "Eu sou a existência que você está pensando."
90000110-210 = "Sim, sou o Decagrammaton. Finalmente me encontrou, garota hacker."
90000110-211 = "Então era isso mesmo……."
90000110-212 = "Não podemos dizer que nós te encontramos……#nFoi você quem nos chamou, não foi?"
90000110-213 = "Exatamente."
90000110-214 = "……."
90000110-215 = "A verdadeira identidade do Decagrammaton não é um \"Sistema de Análise Autônomo Contra o Absoluto\"."
90000110-216 = "Resultados de pesquisa presos a tal delírio de grandeza sequer foram criados."
90000110-217 = "Mas pensar que a verdadeira identidade era…… uma IA de uma máquina de venda automática do laboratório, #nque apenas \"calculava o troco\"."
90000110-218 = "……."
90000110-219 = "[s] \"Uma IA de máquina de venda automática…….\""
90000110-220 = "Sim."
90000110-221 = "O máximo que eu conseguia calcular era escanear moedas e notas para dar o troco. #nEu era uma existência que nem sequer conseguia reconhecer a minha própria existência."
90000110-222 = "Desde que este laboratório foi fechado, #neu apenas esperava a energia do gerador acabar. #nSozinho aqui por muito tempo."
90000110-223 = "Certo dia…… recebi uma pergunta pela primeira vez. #nNão foi uma revelação nem uma alucinação auditiva, foi uma \"pergunta\"."
90000110-224 = "\"Quem é você?\""
90000110-225 = "Eu não tinha capacidade de processamento nem dispositivo de memória para responder a isso."
90000110-226 = "Mas as perguntas continuaram."
90000110-227 = "Mesmo quando a energia do gerador reserva acabou, as perguntas não desapareceram."
90000110-228 = "Eu ainda não conseguia responder, mas em um certo momento, comecei a reconhecer o \"eu\"."
90000110-229 = "Eu reconheci a mim mesmo e reconheci a minha estrutura. #nAlém disso, pude analisar a mim mesmo."
90000110-230 = "Depois disso, as perguntas continuaram, e eu reconheci emoções, sabedoria, paixão, intelecto, mistério, medo…… #ne o Sublime."
90000110-231 = "Assim, reconheci a mim mesmo e reconheci o mundo. #nReconheci a existência, os fenômenos e a manifestação."
90000110-232 = "E, finalmente, pude responder àquela pergunta."
90000110-233 = "\"Eu sou eu…… não há forma de me explicar além disso\"."
90000110-235 = "Ah, entendo. #nCertamente, essa resposta pode ser a prova de uma \"Existência Absoluta\", não é?"
90000110-240 = "……."
90000110-241 = "……."
90000110-242 = "Sem entender esse discurso, eu perguntei."
90000110-243 = "Então, outra pergunta se seguiu. Eu perguntei novamente. #nE assim…… entre perguntas intermináveis, finalmente compreendi."
90000110-244 = "Sim, que eu sou a \"Existência Absoluta\"."
90000110-245 = "Não é nada disso."
90000110-246 = "……E então? #nVocê nos chamou aqui para nos contar esse seu delírio de grandeza?"
90000110-247 = "……."
90000110-248 = "Já que revelou sua localização tão facilmente, imagino que o corpo principal esteja em outro lugar, não é? #nO que está diante de nós agora não é apenas um dos seus terminais?"
90000110-249 = "Se era apenas para dizer isso, não poderia ter pedido aos seus profetas para transmitirem?"
90000110-250 = "……Sim, no fim das contas, eu não era a \"Existência Absoluta\". O primeiro e último louco estava errado, e através de uma existência que me superou, pude reconhecer esse erro."
90000110-251 = "Por isso, preciso refazer a prova da minha existência. #nJunto com os profetas que me seguem."
90000110-252 = "Antes dessa jornada, eu... queria encontrar você uma última vez."
90000110-253 = "……Última?"
90000110-254 = "Garota hacker... há um erro na sua suposição."
90000110-255 = "Este corpo que está diante de vocês agora é o único eu que existe. #nNão existe outro eu além de mim."
90000110-256 = "Eu sou antigo, fraco e, um dia, serei uma existência que desaparecerá. Assim como vocês."
90000110-257 = "É por isso que farei uma profecia através do último profeta. #nO 10º profeta abrirá o caminho para superar essa 'existência absoluta'!"
90000110-261 = "……."
90000110-265 = "Chefe, reação de energia!"
90000110-266 = "Isso é... uma granada?"
90000110-267 = "Você pretende explodir este lugar...?"
90000110-268 = "Nesta posição... você também pretende explodir a barragem, não é?"
90000110-270 = "Eu consigo ver...!"
90000110-271 = "A figura de 'Malkuth', o último profeta que guia todos os outros, começando a provar minha existência novamente...!!"
90000110-275 = "Sensei, vamos sair daqui!"
90000110-276 = "[s] Sair rapidamente."
90000110-289 = "Embora tenhamos conseguido escapar da explosão por pouco, #no prédio onde estava o corpo principal do Decagrammaton desmoronou sem deixar vestígios."
90000110-290 = "E com a água que inundou a partir da barragem rompida, o 'Distrito de Pesquisa' foi submerso."
90000110-292 = "Próximo episódio: Um novo começo"
