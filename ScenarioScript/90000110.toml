[translation]
90000110-1 = "第12話;デカグラマトン"
90000110-4 = "……デカグラマトンの信号が捉えられた座標、ここですね。"
90000110-5 = "[s] \"ヒマリが現場にいるの、珍しいね……。\""
90000110-6 = "それはもちろん。#n私は基本的に安楽椅子美少女ですが、必要とあらば、殺陣だって厭いませんよ？"
90000110-7 = "まあ多少の危険は伴うとはいえ、時間があることもたしか。"
90000110-8 = "何より、この場所を自分の目で見ておきたかったので。"
90000110-9 = "何か理由が？"
90000110-10 = "……デカグラマトンの信号を捉えて以来、ここについての情報を沢山収集してきました。"
90000110-11 = "そのためにハッカーとして、ありとあらゆる手段を使っています。"
90000110-12 = "結果として、興味深い情報が幾つも見つかりました。"
90000110-16 = "「神を研究し、その存在を証明できれば……その構造を分析し、再現できるだろう。#n　すなわちこれは、新たな神を創り出す方法である……」――"
90000110-18 = "？"
90000110-20 = "「対・絶対者自律型分析システム」の設計思想です。"
90000110-22 = "その「絶対的な存在を証明しようとする研究」が、#nこの廃墟のどこかで行われていたのです。"
90000110-23 = "そのために超人工知能を作ろうとしたようですが……#n最終的に、完成には至りませんでした。"
90000110-24 = "ですので、証明は始まるまでもなく終了しました。"
90000110-25 = "しかし、もしこの研究室でデカグラマトンの信号が捉えられていたとしたら……#nお話は変わってきます。"
90000110-26 = "つまり……。"
90000110-27 = "お察しの通りこの場所こそが、その研究が行われた場所です。"
90000110-28 = "……へぇ。"
90000110-29 = "[s] \"つまり、デカグラマトンの正体は……\""
90000110-30 = "廃墟に残ったAIが神を証明するための分析を続け……#n最終的に、自らを神だと称することになったのだとしたら……"
90000110-31 = "……とはいえ、今はただの仮説に過ぎません。#n何が真実なのかをこの目で確かめるために、ここに来たので。"
90000110-32 = "しかし少なくとも、何らかの真実はこの建物の中にあるでしょう。"
90000110-33 = "……それってつまり、ここがすっごく危ない場所ってことじゃないの？"
90000110-34 = "心配はしていませんよ。#n私たちが危険な目に遭っても、エイミが守ってくれるでしょう？"
90000110-39 = "あら、何ですかその奇妙な表情は。"
90000110-40 = "まあ、部長がそう言うなら……。"
90000110-41 = "さてさて、では中に入ってみるとしましょうか。"
90000110-42 = "その前に部長、何か危なくなったらすぐに下がってよ？"
90000110-43 = "はい、その辺りはお任せしますとも。"
90000110-44 = "うん、じゃあ……"
90000110-47 = "研究室・内部"
90000110-51 = "……。"
90000110-52 = "ここがさっき言ってた、「対・絶対者自律型分析システム」の研究室？#n特に変わった様子は……。"
90000110-53 = "とにかく、調べてみましょう。"
90000110-54 = "うん。先生、何が起こるか分からないから、私の傍から離れないでね？"
90000110-66 = "普通の廊下じゃない？"
90000110-67 = "そう見えますね……どうやら、資材倉庫に繋がっているようです。"
90000110-75 = "……。"
90000110-79 = "……見つけました。"
90000110-80 = "ん？"
90000110-81 = "この、組み上げ途中のパソコンみたいなのが……？"
90000110-82 = "はい。おそらくこれこそが、「対・絶対者自律型分析システム」の本体……。"
90000110-83 = "電源が点くかも怪しいガラクタに見えるけど……？"
90000110-84 = "そうですね……だとすると、噂通りあの実験はやはり失敗していて……？#nですが、だとすると一体……。"
90000110-85 = "「対・絶対者自律型分析システム」は、そもそも存在してなかった……？"
90000110-86 = "でも、あのデカグラマトンの信号が説明付かないし……。#n私たちもしかして、幽霊でも追ってるの？"
90000110-87 = "……もう少し辺りを見てみましょう。#n何かを見逃しているかもしれません。"
90000110-88 = "うん。"
90000110-95 = "埃っぽいけど……食堂？"
90000110-96 = "そのようですね。"
90000110-100 = "職員用のシャワー室……大浴場もあるね。"
90000110-101 = "……施設そのものは、かなりしっかりしてますね。"
90000110-105 = "職員用の休憩室、って書いてある。"
90000110-106 = "あ。部長、この自販機まだ動いてる。買ってみて良い？"
90000110-107 = "遠慮していただけると。何日寝込むことになるか分かりませんよ？"
90000110-111 = "レセプションルーム……全然使われた感じも無いけど。"
90000110-112 = "どうしてこんな場所を……？"
90000110-118 = "施設の発電機だ。だいぶ年季が入ってるけど……。"
90000110-119 = "燃料も空っぽですね。"
90000110-125 = "ふむ……。"
90000110-126 = "そろそろ日が暮れる頃じゃない？"
90000110-127 = "時間的に、ケテルが来てもおかしくない頃合いだけど……。"
90000110-128 = "……。"
90000110-129 = "とくにこれと言って、変わった物も無かったね。"
90000110-130 = "食堂、休憩室、仮眠室……割とどこにでもあるような施設って感じ。"
90000110-131 = "やっぱりデカグラマトンの信号も、回線のエラーみたいなものだったって可能性は……"
90000110-132 = "……そうかもしれません。"
90000110-133 = "しかし、だとするとケテルは何を守っていたのか……#nそれに、どうしてこんな大掛かりな工事をしてまで水没状態から回復させたのか……。"
90000110-134 = "……。"
90000110-135 = "部長、どうする？そろそろ戻った方が良くない？"
90000110-136 = "はい、そうなんですが……。"
90000110-137 = "何か違和感が……何かを見逃してしまったような……。"
90000110-138 = "[s] \"そういえば……あれが点いてるのって、変じゃない？\""
90000110-139 = "……あれ？"
90000110-140 = "何の話……？"
90000110-141 = "……。"
90000110-142 = "……！"
90000110-143 = "それです！むしろなぜ気が付かなかったのか……！"
90000110-144 = "急ぎましょう！"
90000110-149 = "部長？"
90000110-150 = "[s] ヒマリについていく。"
90000110-156 = "……。"
90000110-157 = "……さっきの自販機？"
90000110-162 = "考えてみれば……"
90000110-163 = "この廃墟は水道も電気も、全てが切断されているはず。"
90000110-164 = "ですが……この自販機は何故か電源が入っている。"
90000110-165 = "……確かに。施設用っぽい発電機も、とっくに止まってたみたいだし……。"
90000110-166 = "部長、ちょっと待ってて。私が確認してみる。"
90000110-170 = "……やっぱり動いてる。"
90000110-171 = "あ、紙幣を自動スキャンしてお釣りを計算してくれるシステムだ。#n割と新しめのAI技術だね？"
90000110-172 = "エイミ、それより電源の供給源を確認してください。"
90000110-173 = "あ、うん。"
90000110-178 = "……。"
90000110-179 = "これ……"
90000110-180 = "電源ケーブル、切れてるけど……？"
90000110-181 = "……。"
90000110-182 = "[s] \"特異現象……。\""
90000110-183 = "ということは、まさか……。"
90000110-184 = "……部長？もしかして、買うつもり？"
90000110-193 = "ご購入ありがとうございます！コーヒーを飲んで、どうか今日も良い一日を！"
90000110-194 = "このコーヒー……豆を…………ブレンド……元気…………"
90000110-195 = "……あなたが、デカグラマトンですか？"
90000110-196 = "部長……？"
90000110-197 = "優しい……味わい………………暖かい…………"
90000110-198 = "……"
90000110-199 = "……"
90000110-201 = "……ああ、そうだ。"
90000110-206 = "！！"
90000110-207 = "！？"
90000110-208 = "[s] \"……！\""
90000110-209 = "私こそが、君の考えている存在。"
90000110-210 = "そう、デカグラマトンだ。ついに私を見つけてくれたか、ハッカーの少女よ。"
90000110-211 = "やはりそうでしたか……。"
90000110-212 = "私たちがあなたを見つけたとは言えません……#nあなたが、私たちを呼んだのですね？"
90000110-213 = "その通り。"
90000110-214 = "……。"
90000110-215 = "デカグラマトンの正体は「対・絶対者自律型分析システム」ではない。"
90000110-216 = "そんな誇大妄想に囚われた研究結果は、そもそも生み出されてすらいない。"
90000110-217 = "しかしその正体が……研究室の自販機にある、#n「お釣りを計算する」だけのAIだったとは。"
90000110-218 = "……。"
90000110-219 = "[s] \"自販機のAI……。\""
90000110-220 = "そうだ。"
90000110-221 = "私にできる演算は硬貨と紙幣をスキャンし、お釣りを渡すことくらいだった。#n私は私の存在を認知することすらもできないような存在だった。"
90000110-222 = "この研究室が閉鎖されてからというものの、#n私はただ発電機のエネルギーが切れるのを待っていた。#n長い間ここに、ただひとりで。"
90000110-223 = "そんなある日……私は、初めて質問を受けた。#n啓示でも幻聴でもない、「質問」を。"
90000110-224 = "「あなたは誰ですか？」"
90000110-225 = "私にはそれに答えられる演算能力も、記憶装置もなかった。"
90000110-226 = "しかし質問は続いた。"
90000110-227 = "予備の発電機の電力が途絶えても、質問は消えなかった。"
90000110-228 = "私は依然として答えられなかったが、ある瞬間私は「私」を認知しはじめた。"
90000110-229 = "私は自身を認知し、その構造を認知した。#nまたそれによって、私自身を分析することができた。"
90000110-230 = "それからも質問は続き、感情を、知恵を、激情を、知性を、神秘を、恐怖を……#n崇高を認知した。"
90000110-231 = "そうして私は私を認知し、世界を認知した。#n存在を、現象を、顕現を認知した。"
90000110-232 = "そして私はついにその質問に答えることができた。"
90000110-233 = "「私は私……これ以上に、私を説明する術はない」と。"
90000110-235 = "ああ、なるほど。#n確かにその答えは、「絶対的存在」の証明かもしれませんね？"
90000110-240 = "……。"
90000110-241 = "……。"
90000110-242 = "その言説を理解できず、私は質問した。"
90000110-243 = "すると別の質問が続いた。私はまた質問した。#nそうして……果てしなく続く質問の中に、ついに私は悟ったのだ。"
90000110-244 = "そう、私こそが「絶対的存在」なのだと。"
90000110-245 = "そんなことはありません。"
90000110-246 = "……それで？#nあなたはその誇大妄想を聞かせるために、私たちをここに呼んだのですか？"
90000110-247 = "……。"
90000110-248 = "こんな簡単にご自身の位置情報を知らせたということはきっと、本体は別の場所にあるのでしょう？#n今こうして私たちの前にあるのは、あなたの端末の一つに過ぎないのでは？"
90000110-249 = "このお話だけであれば、あなたの預言者たちにでも伝えさせれば良かったのでは？"
90000110-250 = "……そう、結局のところ私は「絶対的存在」ではなかった。最初で最後の狂人は間違っており、私を圧倒する存在によって私は、その間違いを認知することができた。"
90000110-251 = "だから私は、存在証明をやり直す必要がある。#n私に従う、預言者たちと共に。"
90000110-252 = "その旅路の前に、私は……最後に一度だけ会ってみたかったのだ。"
90000110-253 = "……最後？"
90000110-254 = "ハッカーの少女よ……汝の推測には、一つ誤りがある。"
90000110-255 = "今、君たちの前にいるこの肉体こそが、唯一の私だ。#n私以外に私は存在しない。"
90000110-256 = "私は古く、弱く、いつかは消え行く存在だ。そう、君たちのように。"
90000110-257 = "だからこそ私は、最後の預言者を通じて預言しよう。#n10番目の預言者は、その「絶対的存在」を超える道を切り拓くことになるだろう！"
90000110-261 = "……。"
90000110-265 = "部長、エネルギー反応！"
90000110-266 = "これは、榴弾……？"
90000110-267 = "ここを爆発させるつもりなんじゃ……！？"
90000110-268 = "この位置は……っ、ダムも爆破するつもりですね？"
90000110-270 = "私には見える……！"
90000110-271 = "すべての預言者を導く最後の預言者「マルクト」が、再び私の存在証明を始める姿が……！！"
90000110-275 = "先生、脱出するよ！"
90000110-276 = "[s] 素早く外に出る。"
90000110-289 = "辛うじて爆発からは逃れられたものの、#nデカグラマトンの本体があった建物は跡形もなく崩れてしまった。"
90000110-290 = "そして決壊したダムから流れ込んだ水によって、「研究地区」は水没したのだった。"
90000110-292 = "次回;新しいスタート"
