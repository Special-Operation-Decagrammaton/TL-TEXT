[translation]
1010806-1 = "セミナーの眠れない夜"
1010806-2 = "ふぅ……あっという間の一日だったわね。"
1010806-10 = "片付けも終わったし……。"
1010806-11 = "あっ、ラジオの時間！"
1010806-16 = "うふふ、みんな待った？#n私、DJメリー！いま、クロノスのラジオスタジオにいるよ！"
1010806-17 = "ここ最近、ぐっと寒くなったよね？"
1010806-18 = "天気が変わると体調も崩れがちだから気をつけて！#nそれと、ちゃんと布団で寝るように。"
1010806-19 = "それじゃあ、お悩み相談室の時間だよ。"
1010806-20 = "今回のお便りは……「ミレニアムサイエンススクールのHさん」から。"
1010806-21 = "あれ……私のお便りだわ。"
1010806-22 = "眠れなくて適当に書いたものが読まれちゃうなんて……。"
1010806-23 = "「こんにちは、DJメリーのミュージックトリップをいつも楽しく聴いています。」"
1010806-24 = "「優しい曲が多くて、寝る前にラジオを聞くのが最近の日課です。」"
1010806-25 = "実は激しいロックも好きだけど、この時間帯は意識してそういう曲を流してるの。"
1010806-26 = "「メリーのせいで眠れないんだけど！」なんてクレームが来たら困っちゃうから！#nあははっ。"
1010806-28 = "「でも、最近はDJメリーのラジオを聴いてもあまり寝れなくなってしまって。」"
1010806-29 = "「選曲のせいとかではないんです。寝る前にあれこれ考えてしまうせいか……。」"
1010806-30 = "「ベッドに横になって、真っ暗な天井を見ていると、その日あったいろんなことが頭をよぎるんです。」"
1010806-31 = "「もっと頑張れたのに、とか……明日は頑張れるかな、とか。」"
1010806-32 = "「そうしていると、不安になって寝付けなくて……ここ一か月ほど不眠症に悩まされています。」"
1010806-33 = "「DJメリーさん、不眠を治す良い方法はないでしょうか？」"
1010806-35 = "うわぁ……あらためて聞くと恥ずかしいわね。"
1010806-36 = "そうねぇ……DJメリーの周りにも、不眠症に悩まされてる人がいるの。"
1010806-37 = "現代人にとって、身近な悩みって言うよね。"
1010806-38 = "でも、DJメリーは目を閉じたらすぐ眠れちゃうから、力になれないかも。"
1010806-39 = "もしこのラジオを聴いてる人のなかに、良い方法を知ってる人がいたらお便りをちょうだい！"
1010806-40 = "やっぱり、良い方法なんてないのかしら。"
1010806-41 = "[USERNAME]先生の言う通り、考えすぎないようにすれば寝られるのは分かってるけど……。"
1010806-42 = "毎日、ああすれば良かった、こうすれば良かったなんて悩みは尽きないんだもの。"
1010806-46 = "……良い曲ね。"
1010806-48 = "（それから1週間後……）"
1010806-53 = "うふふ！みんな待った？#n私、DJメリー！「DJメリーのミュージックトリップ」の時間だよ！"
1010806-54 = "ミレニアムのとある生徒が不眠症で悩んでいる、ってお便りは覚えてるかな？#nあの後、同じような悩みを持ってる人からたくさんお便りが届いたの。"
1010806-55 = "ええっ……！？"
1010806-56 = "うぅ、私が送ったやつだって気づかれたらどうしよう……。"
1010806-57 = "お便りのほとんどは共感する内容だったけど、いくつか解決策も届いたから紹介するね。"
1010806-58 = "今日の一通目は、匿名で「シャーレのS」さんから。"
1010806-59 = "……この匿名、意味あるのかな？"
1010806-60 = "……まさか先生！？"
1010806-61 = "何だかラジオの向こうが騒がしいような。"
1010806-62 = "みんな、変な憶測はせずに落ち着いて聞いてね。"
1010806-63 = "それじゃあ、読み上げるよ。"
1010806-65 = "「多くの人が、一度は寝たくないと思うもの。だって、寝ると明日が来てしまう。」"
1010806-66 = "「何が起こるか分からない未来には、今日のことを振り返って予測するしかなくて。"
1010806-67 = "「輝いていた昼を思い返してしまえば、目の前の闇に怖気づいてしまうのも当然のこと。」"
1010806-68 = "「でも大丈夫。夜が不安になるのは、それだけ昼が充実していたということだから。」"
1010806-69 = "「いつも頑張っている人の明日は、きっと良い日になるよ。」"
1010806-72 = "……良い話だね。#nミレニアムのHさんも聞いてくれてるかな。"
1010806-73 = "じゃあ、今日は不安な気持ちに寄り添う一曲を届けるよ。#n最後まで付き合ってね。"
1010806-74 = "……そうよね。"
1010806-80 = "明日は、きっと良い日になる。"
1010806-82 = "（その日、ユウカはいつもよりぐっすり眠れた）"
