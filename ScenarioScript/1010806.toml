1010806-37 = "Você diz que esse é um problema familiar para as pessoas atualmente."

1010806-38 = "Mas a DJ Mary talvez não possa ajudar porque ela adormece assim que fecha os olhos."

1010806-39 = "Se algum de vocês que está ouvindo esta rádio souber de uma maneira melhor, escreva para mim!"

1010806-40 = "Ainda me pergunto se não há uma maneira melhor."

1010806-41 = "[USERNAME] Sei que você está certo, sei que posso dormir se não pensar demais. ......"

1010806-42 = "Todos os dias tenho preocupações intermináveis sobre o que deveria ter feito, o que deveria ter feito."

1010806-46 = "...... Boa música."

1010806-48 = "(Uma semana depois, ......)"

1010806-53 = "Uh-huh! Vocês estavam esperando por mim? #n Sou a DJ Mary! É hora da "Viagem musical da DJ Mary"!"

1010806-54 = "Lembra-se da nossa carta sobre um certo aluno da Millennium que sofria de insônia? #nDepois disso, recebemos muitas cartas de pessoas com problemas semelhantes."

1010806-55 = "O quê? ......!"

1010806-56 = "Ugh, e se eles perceberem que é a que eu enviei ......."

1010806-57 = "A maioria das cartas foi simpática, mas também recebemos algumas soluções, que compartilharei com vocês."

1010806-58 = "A primeira carta do dia foi enviada anonimamente por "S. of Shirley"."

1010806-59 = "...... Esse anonimato faz sentido?"

1010806-60 = "...... De jeito nenhum, professor!"

1010806-61 = "É um pouco barulhento no rádio."

1010806-62 = "Pessoal, por favor, não especulem, apenas se acalmem e ouçam."

1010806-63 = "Então, vou ler em voz alta."

1010806-65 = "'Muitas pessoas, em um momento ou outro, não querem ir para a cama. Porque se você for para a cama, o amanhã virá.""

1010806-66 = "'Em um futuro em que não sabemos o que vai acontecer, só podemos olhar para trás e prever o que vai acontecer hoje."

1010806-67 = "Quando você se lembra daqueles dias gloriosos, é natural ficar com medo da escuridão que está por vir."

1010806-68 = "Mas está tudo bem. Se as noites são inquietantes, é porque os dias foram muito cheios.""

1010806-69 = ""Amanhã será um bom dia para aqueles que sempre trabalham duro"."

1010806-72 = "...... Boa história. Gostaria de saber se o #nMillennium H está ouvindo."

1010806-73 = "Muito bem, hoje vou apresentar uma música que o ajudará com sua ansiedade. #nPor favor, fique comigo até o fim."

1010806-74 = "...... Right."

