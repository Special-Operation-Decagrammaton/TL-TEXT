1010806-26 = "Não consigo dormir por causa da Merry!" Estarei em apuros se alguém reclamar! #n haha."

1010806-28 = "Mas ultimamente não consigo dormir muito ouvindo a DJ Mary no rádio."

1010806-29 = "'Não é por causa da seleção de músicas ou algo assim. Talvez seja porque eu penso nisso e naquilo antes de ir para a cama. .......""

1010806-30 = "Quando me deito na cama e olho para o teto escuro como breu, todos os tipos de coisas que aconteceram naquele dia me vêm à mente."

1010806-31 = "'Eu poderia ter me esforçado mais, ou poderia ...... me esforçar mais amanhã'."

1010806-32 = "Quando o faço, fico ansioso e não consigo dormir. ...... Tenho sofrido de insônia no último mês, mais ou menos."

1010806-33 = "DJ Mary, existe uma maneira melhor de curar a insônia?"

