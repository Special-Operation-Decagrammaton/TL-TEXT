1010806-11 = "Ah, hora do rádio!"

1010806-16 = "Ummmmm................ vocês estavam esperando por mim? #n Eu sou a DJ Mary! Estou no estúdio da rádio Kronos agora mesmo!"

1010806-17 = "Tem feito muito mais frio aqui recentemente, não é mesmo?"

1010806-18 = "Tenha cuidado quando o clima mudar, pois você tende a ficar doente! #nE certifique-se de dormir sob um edredom."

