[translation]#[Texto revisado, mas pode haver alterações como Censura.] Em aguardo de revisão de formatação de texto. - Filipe 10/06.
42130-1 = "Episódio 13: Choque e Pavor"
42130-2 = "Sala de Reuniões do Conselho Estudantil Geral"
42130-5 = "……Minha condição é muito simples."
42130-6 = "Já que os arruaceiros vandalizando o meu gramado são da sua instituição, o Secretariado de Red Winter deve assumir a responsabilidade e recolher esse lixo de volta pra casa."
42130-7 = "……Entendeu bem a minha exigência, Presidente Cherino?"
42130-12 = "Hmph. Acho que o seu cérebro de governante novata tá pulando os detalhes, 'Presidente Interina'."
42130-13 = "Eu não sou uma mera e reles 'Presidente'..."
42130-14 = "Eu sou a Soberana Suprema de Red Winter, Diretora do Clube de Paisagismo e Embelezamento, Secretária-Geral, Representante dos Esportes, Diretora do Esquadrão de Limpeza, Comandante do Comitê Disciplinar, Chefe do Departamento de Merenda e, o mais importante: A Provadora Chefe Oficial de Pudins do Mês, A GRANDE CHERINO!!"
42130-15 = "Não ouse abreviar meus títulos divinos pra 'Presidente Cherino'!!"
42130-16 = "Certo, certo. Soberana Suprema e Diretora Disso e Daquilo, a Poderosa Cherino que carrega o peso do mundo nas costas. O que importa não é o título, o fato é que――"
42130-17 = "'Disso e Daquilo'?! 'O que importa'?!#nComo ousa tratar meus cargos de poder com tamanho desdém?!"
42130-23 = "（Por que diabos esse pirralho tem um ego tão inflado por causa de clubinhos inúteis de escola...?）"
42130-29 = "……Eu me curvo em perdão à sua infinita glória, Secretária-Geral Cherino."
42130-30 = "Mas o que exige atenção agora é a milícia radical que está liderando rebeliões em todo o Distrito D.U., estrangulando as rodovias e paralisando a minha gestão."
42130-31 = "Os relatórios de inteligência da Kaiser Security provaram que noventa por cento desses manifestantes violentos vieram direto das oficinas e alojamentos da sua Red Winter."
42130-32 = "Como Diretora de Defesa Suprema e Presidente Interina de Kivotos,#neu exijo que o Secretariado de Red Winter assuma a culpa e tire a coleira das suas alunas!"
42130-33 = "Ah, agora que você mencionou... as pirralhas do Departamento de Obras tavam caladas demais lá na base esses dias...#nEntão elas tavam brincando de revolução no seu asfalto...?"
42130-34 = "E o que diabos tá deixando elas tão furiosas no seu gramado, afinal?"
42130-35 = "Excelente pergunta, Secretária Cherino."
42130-36 = "Elas não estão apenas exigindo cotas ridículas de pudim no refeitório ou uma jornada inútil de trabalho de só dois dias na semana..."
42130-37 = "……Elas estão armando um Motim Armado!"
42130-42 = "……E daí?"
42130-47 = "……Acho que a minha voz não está ecoando pelo fone."
42130-48 = "Um Golpe. Um Motim. Revolta armada...#nElas querem marchar nas portas do meu Conselho e quebrar a minha coroa!!"
42130-49 = "Como Presidente Interina que segura a balança de poder e paz em Kivotos, eu não vou tolerar que essas parasitas――"
42130-50 = "Motim? Golpe de Estado? Relaxa, amiga, eu entendo a dor de cabeça que isso dá. Eu mesmo acordo toda semana com alguém tentando arrancar a minha cabeça do trono. É rotina."
42130-51 = "Mas entenda uma coisa essencial da política, Chefe de Defesa Kaya――Não existe cura pra golpe."
42130-52 = "A plebe não gosta das leis que a gente inventa, então elas pegam em armas e botam fogo em tudo.#nNão é pra isso que as armas servem, no fim das contas?"
42130-53 = "O QUÊ?!#nA senhora tá relativizando um golpe de estado?!"
42130-54 = "Óbvio. As formigas trabalhadoras jamais vão alcançar o raciocínio complexo que nós, as líderes geniais, usamos para governar. Elas só sabem morder."
42130-55 = "E eu confesso que tô com um pinguinho de dó da sua cara agora... ser Presidente Interina e levar golpe logo de cara deve ser um inferno... aguenta firme."
42130-56 = "Exato!! É o inferno!! Então faça o seu Secretariado descer aqui com viaturas e prender cada maldita manifestante――"
42130-57 = "Olha, a minha política externa diz pra eu não me meter nas fogueiras que as outras academias acendem...#nMas como eu fui com a sua cara chorona de Presidente de primeira viagem..."
42130-62 = "Vou dar a ordem pro meu pessoal mandar uma caixa inteira de Cheryonka pra sua mesa!!"
42130-67 = "Cheryonka... O que diabos é uma Cheryonka?!"
42130-68 = "Hã? Cê tá me dizendo que assumiu o conselho e nunca comeu uma Cheryonka?!"
42130-69 = "É o chocolate ao leite supremo que nós forjamos no frio de Red Winter! É o ápice do açúcar!"
42130-70 = "Coloque isso na boca e relaxa! Se você babar e gostar... Eu aprovo uma cota semanal pra entregar direto no cofre do Conselho Estudantil."
42130-71 = "Eu não quero a droga do chocolate!! Eu exijo que os seus esquadrões venham recolher a mulambada do gram——"
42130-72 = "……Eita, olha pro relógio!"
42130-73 = "Ficar batendo papo sobre política fez o ponteiro rodar! A minha soneca sagrada pós-almoço já tá atrasada!"
42130-74 = "A gente marca um chá outro dia pra conversar... Tchauzinho, Dona Presidente Nova e sei lá o quê Interina!"
42130-80 = "Criança insolente e asquerosa...!!"
42130-81 = "Será que nesse buraco congelado de Red Winter não existe UM único cérebro político funcional pra dialogar comigo?!"
42130-88 = "……Eh? M-Mas eu nem sou de Red Winter, por que você tá gritando comigo...?"
42130-90 = "……Eu não estava ofendendo você, Diretora da Mediação."
42130-91 = "Me explique uma coisa. Aquela pirralha anã é mesmo a líder soberana que assina as leis em Red Winter?"
42130-93 = "Sim. Atualmente, a detentora do cargo máximo da academia é a Presidente Rengkawa Cherino."
42130-94 = "Como assim 'atualmente'...?!"
42130-95 = "Ah... é que... na semana passada, o poder tava nas mãos da Comandante Ikekura Marina, que deu um golpe nela e virou Presidente por uns dias... mas depois a Cherino retomou o cargo."
42130-99 = "Você está me dizendo que eu perdi quinze minutos de estresse..."
42130-100 = "Negociando diplomacia e segurança internacional... com uma escola imunda onde o Presidente muda toda semana por causa de porrada?!"
42130-102 = "Pois é. A política lá é volátil, hahaha.#nMas sabe, a Oficial Rin engolia essas reuniões malucas sem dar um único pio de reclamação..."
42130-103 = "Diz a lenda que se você dar um doce pra Cherino e elogiar o bigode dela, a negociação flui muito mais rápido que na mesa burocrática de Trinity ou de Gehenna..."
42130-104 = "Mas, ei... Alguém cujo cérebro foi treinado no Escritório de Defesa pra só resolver as coisas na bala, acho que ser política deve ser chatinho mesmo, né? (Croc... croc...)"
42130-111 = "Ahm... Com licença... Chefe Kaya..."
42130-112 = "……Presidente Interina, para você."
42130-113 = "P-Perdão, desculpe... Presidente Interina!!"
42130-114 = "É o relatório atualizado de campo da Defesa... O seu novo decreto que exige 10 documentos autenticados pra sacar miséria no caixa do banco gerou uma revolta explosiva na população."
42130-115 = "Civis normais estão perdendo a cabeça e sacando fuzis na cara de gerentes bancários pelo D.U. inteiro pra conseguir tirar o próprio salário à força, sem papelada..."
42130-116 = "Issso não é saque... é um Surto de Roubo a Banco em massa!!"
42130-117 = "Com bancos sendo estourados em cada esquina da cidade, o que raios o departamento de segurança e as tropas da Kaiser estão fazendo de braços cruzados?!"
42130-118 = "Como eu alertei de manhã, senhora Presidente... A polícia e os mercenários da Kaiser estão focados 100% nas barreiras e nas blitzes dos decretos. Nós não temos mais fardas sobrando pra prender bandido..."
42130-119 = "Se as tropas acabaram, pague o dobro e contrate PMCs menores! Recrute gangues, recrute lixeiras! Faça o que for necessário pra conter a cidade!!"
42130-120 = "Enquanto a minha bunda estiver no Trono de Kivotos, eu não admitirei UMA ÚNICA estatística de crime nas ruas! Fui clara?!"
42130-126 = "Haaah... Pra um regime de 'Paz Absoluta', o asfalto tá fedendo a pólvora mais que antes, né..."
42130-127 = "Com o trânsito travado por protestos armados e blitzes do exército, minha corrida pra vir trampar hoje de manhã dobrou de tempo..."
42130-128 = "A criminalidade pequena de beco sumiu, mas os homicídios e ataques a banco dispararam, que irônico..."
42130-129 = "A culpa não é da população. É o que acontece quando você aperta o nó no pescoço do cidadão honesto de uma vez."
42130-130 = "Depois que ela enxotou a Chefe dos Recursos Humanos na reunião, mais da metade dos conselheiros neutros debandaram e lavaram as mãos pra Kaya..."
42130-131 = "Sério que o Conselho vai sobreviver operando nessa zona de guerra...?"
42130-132 = "Quem sabe... talvez a Oficial Rin amarrasse os sapatos melhor que a novata..."
42130-137 = "……SESSÃO ENCERRADA!!#nO COMITÊ ESTÁ DISPENSADO E A REUNIÃO ACABA AQUI!!"
42130-152 = "Escritório da Presidência Interina do Conselho Estudantil Geral"
42130-156 = "……Você está atrasado."
42130-157 = "Perdão pela informalidade, Presidente Interina."
42130-158 = "O fluxo de caixa vindo do Conselho atrasou na minha mesa. Achei mais produtivo aparecer e resolver o problema da fatura cara a cara."
42130-159 = "Considerando as frotas de blindados, suor militar e horas-extras que estou queimando pra segurar essa sua cidade em chamas... a grana transferida pro meu caixa tá uma miséria. Precisamos renegociar."
42130-161 = "Por que eu pagaria a mais se o serviço prestado está pífio e cheio de brechas?!"
42130-162 = "Você tem noção da fortuna cósmica que a minha gestão derramou nos cofres da Kaiser?#nE mesmo assim, o seu super-exército de veteranos não consegue domar um mísero bando de colegiais baderneiras nos meus portões! Que piada!"
42130-163 = "Hahaha... 'Fortuna cósmica' não é exatamente a palavra que eu usaria para definir o seu contrato."
42130-164 = "Pelos tostões que você transferiu, o estrangulamento da cidade e a blitz de trânsito é o máximo de qualidade militar que a Kaiser pode entregar."
42130-165 = "Se as minhas tropas não estão contendo a anarquia do seu gramado, o primeiro reflexo que a senhora deveria ter como líder é analisar se a injeção de dinheiro está adequada à gravidade do problema."
42130-166 = "……Vocês da Kaiser estão realmente em posição confortável para cobrar a conta e choramingar por dinheiro agora?"
42130-167 = "Você e seus executivos parecem ter esquecido magicamente que, graças à minha amnésia governamental, a papelada e os indiciamentos do Golpe que a Kaiser armou foram parar no lixo e vocês não fecharam as portas por terrorismo contra Kivotos."
42130-168 = "Óbvio que não esquecemos.#nNo mundo corporativo sangrento, 'confiança' e 'credibilidade' é o que dita a sobrevida da empresa."
42130-169 = "……No entanto, a paciência do meu Presidente da Holding tem um limite diário."
42130-170 = "Tirar a sua cabeça da guilhotina e ignorar o massacre passado é favorável. Mas sangrar as minhas tropas inteiras no seu asfalto por migalhas não paga os lucros dos acionistas e nem mascara os buracos financeiros do fim do mês."
42130-175 = "Na pior das hipóteses astrofísicas... eu declaro falência na sigla Kaiser, rasgo as patentes e forjo um novo império com outro nome do dia pra noite. Eu sobrevivo."
42130-176 = "Mas e você, Presidente?#nDepois que a sua credibilidade, alianças e poder despencarem na lama da desonra, você acha que tem força pra erguer a coroa e dominar o cenário a partir do zero?"
42130-181 = "……Fazer vista grossa para o complexo e os silos subterrâneos ilegais de contenção que você cavou clandestinamente sob os trens da Estação dos Coelhinhos não foi um bônus gordo o bastante pra você?"
42130-183 = "Isso não equilibra a planilha. Quando os vazamentos do dossiê das propinas vazaram pelos malditos canais na semana passada, o escândalo queimou rios do nosso caixa negro."
42130-184 = "Encerre as tropas, espanque os rebeldes até amanhã, e eu assino o cheque final gordo pra cobrir isso tudo. Coloque como 'Adiantamento Emergencial' na sua planilha e cobre juros do meu bolso, se te faz feliz."
42130-185 = "Eu adoro ouvir a palavra 'juros'. Se é assim que a senhora prefere, eu jogo minhas fichas na sua roleta."
42130-186 = "……Mas. Emitir papéis e promessas milionárias assim... sem cobertura real, não é dar um tiro no próprio estômago?"
42130-187 = "As paredes sujas da cidade espalham o boato de que a Nova Presidente não consegue sequer aprovar dez dólares de verba porque o Escritório de Finanças tranca a porta na sua cara..."
42130-188 = "No mercado de Wall Street da sobrevivência, não tem idiotas. Apostar armas e vidas numa líder que os próprios cães de escritório odeiam e traem... cheira a risco tóxico."
42130-195 = "（……Deus. Que inferno é esse? Qual é o erro sistêmico do mundo?!）"
42130-196 = "（Por que todos os vermes que rodeiam o Trono são teimosos a ponto de cuspir na minha bondade em vez de rastejar aos meus pés com gratidão?!）"
42130-197 = "（Se essa matilha acéfala fechasse os olhos, lambesse minhas botas e seguisse a minha bússola... eu os levaria ao nirvana de paz absoluta! Por que a anarquia fala mais alto?!）"
42130-198 = "（……Quando AQUELA MULHER ditava a lei... a cidade engolia até o veneno dela com sorrisos, e os clãs se ajoelhavam pra proteger cada decisão que ela empurrava goela abaixo.）"
42130-199 = "（Qual é o detalhe genético ou mágico que eu não possuo?! Onde foi que a fórmula quebrou?!）"
42130-200 = "（Por que... eu não consigo pisar na lama e virar uma deusa intocável e Suprema como ela foi...?!）"
42130-201 = "（O que ditava a força esmagadora da velha Presidência... em contraste à podridão de rebeldia que suja a minha...）"
42130-208 = "……Ficou óbvio."
42130-209 = "As massas desgraçadas desta cidade... sentem a falta do TERROR."
42130-210 = "……Se eu quebrar os alicerces, rasgar os céus e forçar o Medo Absoluto até no último rato de rua... a audácia da rebeldia some."
42130-213 = "……Presidente Kaya?"
42130-214 = "Capitã Yukino. Relatório de inventário letal. O protótipo de extermínio <A.N.T.I.O.C.H.> — A Ogiva Termobárica Balística Intercontinental que você arrancou dos terroristas da Kaiser — Onde a carga repousa neste exato momento?"
42130-215 = "……A carga está dormente e desativada. Nós enterramos a bomba em um silo nas profundezas do Complexo Militar Clandestino de D.U."
42130-216 = "A estabilidade crítica dela é baixa e o potencial aniquilador da explosão em cadeia seria imprudente de manejar a céu aberto."
42130-217 = "……Esta é uma diretriz de Extermínio Total. Ouça bem, Capitã."
42130-218 = "Tire o demônio da jaula. Arraste essa ogiva até o fundo dos túneis das plataformas da Estação dos Coelhinhos... engatilhe os timers e faça o chão de Kivotos derreter."
42130-226 = "……Qual é o objetivo tático dessa insanidade?"
42130-227 = "Desde quando a minha Cadete Especial de Elite tem a ousadia e a heresia de vomitar 'porquês' de volta para a minha face em vez de puxar o gatilho?!"
42130-228 = "――O cálculo militar é primitivo."
42130-229 = "Você e eu concordamos que o inferno desencadeado pela <A.N.T.I.O.C.H.> seria apocalíptico, não foi? Retardamos o uso da bomba porque a zona letal era incontrolável em área urbana densa."
42130-230 = "Mas a região maldita da Estação dos Coelhinhos se esvaziou de vermes residenciais e foi engolida por canteiros de obras fracassados... É uma cova rasa e vazia, pronta pra receber uma purificação infernal que cause danos físicos irrelevantes à população."
42130-232 = "Isso não é uma equação limpa. O perímetro da estação e a favela em volta ainda possuem ninhos civis. O número de mortos na calçada será expressivo."
42130-233 = "Sem falar que se a ignição acontecer no útero de um túnel fechado... a onda de choque hiperbárica vai vomitar fogo através dos dutos, esmagando os bairros acima da crista e moendo infraestrutura em massa!"
42130-235 = "Ah, as luzes se acenderam. Exatamente.#nAs estações anexas, as linhas nervosas e as vilas operárias... todas virarão poeira."
42130-241 = "……O teatro exige um mar de cinzas. Quando a cidade acordar amanhã e ver no noticiário que a Nova Presidente tem o poder de varrer uma zona urbana inteira do mapa só num estalar de dedos..."
42130-243 = "………!!"
42130-244 = "Se a lenda sussurrar que eu apago a existência de cidades periféricas quando me incomodo... o medo envenenará a espinha de cada líder dessa escola, e ninguém nunca mais cuspirá nas minhas botas."
42130-245 = "E não me julgue mal. Politicamente, eu não sou uma carrasca, foi tudo um 'Desastre Operacional de Trânsito'. Eu usarei as valas dos mortos e os dutos despedaçados como desculpa de fraude de infraestrutura pra decapitar a liderança do Comitê de Trânsito e tomar a máquina ferroviária de assalto."
42130-246 = "――O massacre sela o respeito, limpa o meu conselho e pavimenta a minha vitória."
42130-251 = "Kuhihi... Essa frieza é espetacular."
42130-252 = "Eu jurava que cê não tinha as presas ou os colhões para manchar o seu tapete branco de sangue em nome da glória absoluta...#nMas essa sua mente podre superou a minha ambição."
42130-253 = "Agora eu vejo... O meu Presidente viu uma alma diabólica atrás desse sorriso de burocrata e acertou na aposta."
42130-255 = "……Ajoelhe-se e elogie a minha crueldade à vontade. É a sua melhor qualidade militar."
42130-256 = "No entanto, as ruínas da Estação dos Coelhinhos e as vias de acesso ainda estão preenchidas pelos ativos de escavação que a Kaiser comprou do governo. Por que diabos eu deixaria você queimar o meu lixo suado a custo zero?"
42130-257 = "Vamos colocar os pontos nos 'i's... Como a logística da explosão vai consumir as veias de trem do seu quintal, a Kaiser merece e será compensada regiamente."
42130-258 = "……Que tal a escritura, as patentes e a soberania eterna do monopólio ferroviário subterrâneo de Kivotos pra vocês?"
42130-259 = "Depois que eu jogar as cinzas no colo da equipe de Trânsito e expurgar a liderança que restou, uma mega-empresa externa com 'maestria em logística' vai ser urgente para 'conter os danos'."
42130-260 = "Se a Kaiser Corporation abraçar a linha férrea e sugar o lucro eterno dessa máquina, as nossas contas estarão saldadas?"
42130-261 = "Oferta sangrenta e suculenta. Considerando a tragédia diplomática que a nossa marca afundou mês passado com a falha na tomada de poder das docas... O controle absoluto dos trens cairia muito bem no relatório trimestral..."
42130-262 = "Dominar as espinhas dorsais de concreto entre os distritos é uma máquina de lavar dinheiro inesgotável..."
42130-263 = "Eu não cuspo num poço de bilhões só pra manter meia dúzia de escavadeiras inúteis de pé."
42130-264 = "Fechado com sangue. Eu mando limpar os funcionários e destranco os portões de segurança do silo da estação. Deixem os cães do seu esquadrão armarem a bomba, nós damos a logística."
42130-266 = "……"
42130-267 = "Maravilha.#nEntão a nossa ópera letal está ajeitada e――"
42130-268 = "……Espera. A minha Cadete não cuspiu o seu latido de afirmação ainda."
42130-269 = "Capitã Yukino. Puxe o fôlego e morda a ordem. Imediatamente."
42130-273 = "……FOX 1. Ordem absoluta compreendida. Preparando a bomba para expurgo e eliminação da cidade."
42130-275 = "Próximo Episódio: O Dilema dos Prisioneiros"