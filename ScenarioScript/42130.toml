[translation]
42130-1 = "Episódio 13; Choque e Pavor"
42130-2 = "Sala de Reuniões do Conselho Estudantil Geral de Kivotos"
42130-5 = "……A condição que exijo é apenas uma."
42130-6 = "Já que são manifestantes da Academia Federal Red Winter, a secretaria deve assumir a responsabilidade de dissolvê-los."
42130-7 = "……Entendeu, Presidente Cherino?"
42130-12 = "Parece que há algum mal-entendido, nova Presidente Interina do Conselho Estudantil Geral."
42130-13 = "Eu não sou apenas uma simples presidente estudantil……"
42130-14 = "Eu sou a Presidente Estudantil da Academia Federal Red Winter, Chefe do Departamento de Embelezamento Ambiental, Secretária-Geral, Representante do Departamento de Esportes, Chefe do Departamento de Limpeza, Presidente do Comitê Disciplinar, Chefe do Departamento de Merenda e a Cherino, eleita a melhor provadora de pudim deste mês!"
42130-15 = "Não me chame de \"Presidente Cherino\" abreviando!"
42130-16 = "Sim. Cherino, a Presidente Estudantil da Academia Federal Red Winter e detentora de vários outros cargos de grande responsabilidade. O que importa agora não é o título, mas sim――"
42130-17 = "“Vários outros cargos”……? #nQue falta de educação!"
42130-23 = "(Por que ela é tão apegada a cargos que ninguém se importa...?)"
42130-29 = "……Peço perdão, Secretária-Geral Cherino."
42130-30 = "No entanto, o que precisamos lidar agora com urgência são os manifestantes que estão liderando protestos por toda D.U. e paralisando a administração do Conselho Estudantil Geral."
42130-31 = "Como resultado das investigações das agências de segurança externas, descobrimos que a maioria desses manifestantes são alunas da Academia Federal Red Winter."
42130-32 = "Como Chefe do Escritório de Defesa, responsável pela segurança de D.U., e como Presidente Interina do Conselho Estudantil Geral, #nprotesto veementemente contra a secretaria da Red Winter."
42130-33 = "Falando nisso, achei que o pessoal do Departamento de Obras estava estranhamente quieto ultimamente…… #nEntão eles estavam fazendo protestos por lá……"
42130-34 = "Do que eles estão reclamando, afinal?"
42130-35 = "Boa pergunta, Presidente Cherino."
42130-36 = "Elas não estão apenas exigindo políticas incompreensíveis, como o fornecimento de pudim e uma semana de trabalho de dois dias……"
42130-37 = "……Elas estão tentando organizar um golpe de estado!"
42130-42 = "……E o que tem isso?"
42130-47 = "……Parece que a comunicação falhou."
42130-48 = "Um golpe de estado…… Elas estão tentando se rebelar―― #nelas planejam derrubar o Conselho Estudantil Geral!"
42130-49 = "Como Presidente Interina do Conselho Estudantil Geral, responsável pela manutenção da ordem em Kivotos, não posso tolerar tal situação――"
42130-50 = "Golpe de estado…… Sei muito bem o quão problemático isso é. #nEu mesma já passei por isso muitas vezes."
42130-51 = "Mas, veja bem, Chefe do Escritório de Defesa — não existe uma maneira de prevenir um golpe de estado fundamentalmente."
42130-52 = "Se as políticas do conselho estudantil não agradam, então elas organizam um golpe. #nNão é algo natural?"
42130-53 = "Como é? #nBem, o que você quer dizer com……"
42130-54 = "Claro, alunas amadoras não conseguem entender as políticas de grandes líderes como nós."
42130-55 = "A Presidente Interina do Conselho Estudantil Geral também deve ter muitas dificuldades…… Parece ser bem complicado lidar com elas."
42130-56 = "Por isso, a secretaria da Red Winter deve assumir a responsabilidade de dissolver os manifestantes――"
42130-57 = "Como princípio, não me envolvo em assuntos fora da minha academia, mas #npor esta vez, em consideração à Presidente Interina do Conselho Estudantil Geral――"
42130-62 = "Vou enviar uma caixa de Cherionka da nossa secretaria da Red Winter!"
42130-67 = "Cherionka…… o que é isso?"
42130-68 = "Hum? A Chefe do Escritório de Defesa nunca comeu Cherionka?"
42130-69 = "Cherionka é um chocolate ao leite especial produzido na Academia Federal Red Winter! É uma iguaria!"
42130-70 = "Experimente, e se gostar―― considerarei o fornecimento regular de Cherionka para o Conselho Estudantil Geral."
42130-71 = "Por isso, o que precisamos agora não é de chocolate ao leite, mas sim da dissolução do protesto――"
42130-72 = "……Opa! Já é essa hora?"
42130-73 = "Estávamos conversando tão bem que quase perdi a hora da minha soneca."
42130-74 = "Bem, conversamos outra hora…… Presidente Interina do Conselho Estudantil Geral, seja lá qual for o seu nome."
42130-80 = "Essa pirralha……"
42130-81 = "Não existe nenhuma aluna sensata na Academia Federal Red Winter?!"
42130-88 = "……Eh? E-eu não sou da Academia Red Winter, sabia?"
42130-90 = "……Não estou falando de você."
42130-91 = "Chefe do Escritório de Mediação. Aquela baixinha é realmente a representante e presidente estudantil da Academia Federal Red Winter?"
42130-93 = "Sim, a atual presidente estudantil da Academia Federal Red Winter é ela―― Cherino Renkawa."
42130-94 = "Atual……?"
42130-95 = "Bem…… há uma semana, a Comissária Marina Ikekura era a presidente estudantil da Academia Federal Red Winter."
42130-99 = "Ou seja, o que você está dizendo é que nós agora..."
42130-100 = "Temos que negociar com academias cujos representantes mudam a cada semana e resolver problemas de segurança pública?"
42130-102 = "Exatamente. Mas a Rin, minha antecessora, fazia isso sem reclamar nem um pouco~"
42130-103 = "Se você souber dosar bem a cenoura e o chicote, acho que é mais fácil de lidar do que com as presidentes do conselho estudantil da Trinity ou da Gehenna..."
42130-104 = "Bem, para alguém que veio do Departamento de Defesa e só conhece o chicote, talvez seja um pouquinho difícil. (Croc)"
42130-111 = "A-ah... Chefe Kaya..."
42130-112 = "...Presidente Interina do Conselho Estudantil Federal."
42130-113 = "D-desculpe... Presidente Interina do Conselho Estudantil Federal!"
42130-114 = "É sobre o relatório periódico do Departamento de Defesa... Os cidadãos estão demonstrando grande insatisfação com a nova ordem administrativa que exige a apresentação de mais de 10 tipos de documentos toda vez que sacam dinheiro da conta..."
42130-115 = "Dizem que, em vários locais de D.U., têm ocorrido casos sucessivos de pessoas apontando armas para os bancários em vez de apresentarem os documentos para forçar o saque dos depósitos."
42130-116 = "Isso... isso não é apenas um assalto?!"
42130-117 = "Com assaltos a banco acontecendo por toda D.U., o que a Agência de Segurança Valkyrie e a Kaiser Security estão fazendo, afinal?"
42130-118 = "Como mencionei anteriormente, a Agência de Segurança e a Kaiser Security estão sobrecarregadas com as inspeções..."
42130-119 = "Se falta mão de obra, contratem mais pessoas, sejam empresas de segurança privadas ou o que for, e estabilizem a segurança pública."
42130-120 = "Em Kivotos, sob minha gestão, não tolerarei nem um único crime!"
42130-126 = "Não, parece mais caótico do que antes..."
42130-127 = "Até para chegar aqui, por causa das manifestações, levei mais de 30 minutos a mais que o normal..."
42130-128 = "A taxa de criminalidade diminuiu, mas os crimes graves aumentaram, né..."
42130-129 = "Para falar a verdade, não é só o resultado de terem selecionado os cidadãos 'inocentes'?"
42130-130 = "Dizem que, depois que o Chefe do Departamento de Recursos Humanos saiu, o número de funcionários que apoiam a Chefe Kaya diminuiu bastante..."
42130-131 = "Será que vai dar certo continuar como interina desse jeito?"
42130-132 = "Talvez a Administradora Rin fosse mais competente..."
42130-137 = "...Dispensados! A reunião de hoje termina aqui!"
42130-152 = "Gabinete da Presidente Interina do Conselho Estudantil Federal"
42130-156 = "...Você está atrasada."
42130-157 = "Chegou, Presidente Interina do Conselho Estudantil Federal."
42130-158 = "O pagamento parece estar atrasado. Por isso, viemos pessoalmente visitar você."
42130-159 = "Considerando a mão de obra e os equipamentos necessários para a gestão da segurança, devo dizer que é impossível continuar a operação com o valor que já foi pago—"
42130-161 = "Por que há falhas no controle?"
42130-162 = "Você tem ideia de quanto gastamos com vocês? Não conseguem nem conter um simples grupo de manifestantes e ainda têm a cara de pau de vir aqui."
42130-163 = "Ora, ora, você acha mesmo que está pagando o suficiente?"
42130-164 = "Com esse valor, esse nível de regulação é o limite."
42130-165 = "Quando os soldados que você contrata não conseguem resolver os problemas, primeiro pense se o valor pago é suficiente."
42130-166 = "...Acho que vocês não estão em posição de falar sobre dinheiro, não é?"
42130-167 = "Já se esqueceu de que a Kaiser Corporation só não faliu porque eu encobri o incidente anterior?"
42130-168 = "Como poderíamos esquecer? O valor de uma empresa é a sua credibilidade, afinal."
42130-169 = "...No entanto, a paciência do Presidente não dura para sempre."
42130-170 = "Por mais que você tenha nos ajudado, não compensa emprestar tanto esforço por um salário tão baixo."
42130-175 = "Na pior das hipóteses, podemos descartar o nome Kaiser e criar uma nova organização."
42130-176 = "Mas e você? Será que consegue jogar fora a reputação que construiu até agora e recomeçar do zero?"
42130-181 = "...Não basta eu fazer vista grossa para o silo construído no subsolo da estação dos coelhinhos?"
42130-183 = "Isso é outra história. Como os subornos foram expostos da última vez, acabamos ficando no prejuízo."
42130-184 = "Pagarei quando este trabalho terminar, então coloque na minha conta como dívida. Com juros bem altos."
42130-185 = "Se é isso que deseja, assim faremos."
42130-186 = "...Mas, será que é realmente seguro aumentar ainda mais a fatura?"
42130-187 = "Ouvi boatos de que a nova Presidente Interina, que ainda não conquistou a confiança do Chefe do Departamento Financeiro, está com dificuldades para levantar fundos..."
42130-188 = "Investir em uma líder que não tem a confiança dos subordinados me deixa um pouco preocupado."
42130-195 = "(...O que é que há de errado, afinal?)"
42130-196 = "(Por que as pessoas ao meu redor não confiam em mim de verdade?)"
42130-197 = "(Basta seguir minhas instruções e tudo ficará perfeito... por que todos insistem em me desafiar...?)"
42130-198 = "(……Não importa o que aquela mulher, a Presidente do Conselho Estudantil Federal, dissesse, todas as alunas de Kivotos depositavam nela total confiança e a seguiam.)"
42130-199 = "(Qual é a diferença entre ela e eu……?)"
42130-200 = "(Por que eu não consigo me tornar uma \"super-humana\"……?)"
42130-201 = "(A diferença entre o antigo Conselho Estudantil Federal e o atual……)"
42130-208 = "……Entendo."
42130-209 = "Nesta Kivotos, falta medo."
42130-210 = "……Se eu mostrar todo o medo possível, todos passarão a ouvir o que eu digo."
42130-213 = "……Kaya?"
42130-214 = "Yukino, onde está armazenada a ogiva termobárica para míssil balístico, o produto do projeto <A.N.T.I.O.C.H.> que você recuperou outro dia?"
42130-215 = "……Aquilo foi desativado e está armazenado em uma instalação militar nos arredores de D.U."
42130-216 = "O poder de destruição é grande demais e o processo de detonação não é simples."
42130-217 = "……É uma ordem, Líder de Esquadrão Yukino."
42130-218 = "Leve a ogiva imediatamente para o silo subterrâneo da Estação Coelhinho e detone-a."
42130-226 = "……O motivo?"
42130-227 = "Responder a uma ordem com uma pergunta, isso não é do seu feitio."
42130-228 = "――É algo simples."
42130-229 = "Como a Líder de Esquadrão Yukino disse há pouco, a ogiva do <A.N.T.I.O.C.H.> tem um poder destrutivo imenso, e o processo de detonação foi adiado por preocupações com danos aos arredores."
42130-230 = "No entanto, a maioria dos residentes da Cidade Coelhinho já partiu devido à reurbanização, então podemos minimizar os danos causados pela detonação."
42130-232 = "Ainda assim, não são poucos os cidadãos que permanecem na Cidade Coelhinho."
42130-233 = "Além disso, se a ogiva termobárica for detonada em um espaço fechado como o metrô, o poder de destruição será ainda maior――"
42130-235 = "Sim, eu sei. #nNão apenas a Estação Coelhinho, mas as estações vizinhas também sofrerão danos."
42130-241 = "……Mas, se mostrarmos um nível de ameaça como esse, todos entenderão o nosso poder, não é?"
42130-243 = "………!"
42130-244 = "Se souberem que, se necessário, podemos apagar uma pequena cidade facilmente, não haverá mais alunas que ousem nos enfrentar."
42130-245 = "Além disso, será um \"acidente\" ocorrido no metrô. #nUsando a falha nos dispositivos de segurança como pretexto, podemos transformar isso em um problema de responsabilidade do Departamento de Tráfego e expulsar os executivos……"
42130-246 = "――Isso não seria matar dois coelhos com uma cajadada só?"
42130-251 = "Hehehe…… Magnífico."
42130-252 = "Eu sabia que você era uma pessoa capaz de fazer o que pessoas comuns não conseguem, mas――#nnunca imaginei que fosse tão audaciosa."
42130-253 = "Como esperado, o julgamento da Presidente não falha."
42130-255 = "……Vou aceitar isso como um elogio."
42130-256 = "Mas o silo subterrâneo da Estação Coelhinho é propriedade da Kaiser Corporation. Que ganho teríamos ao causar uma explosão lá?"
42130-257 = "Bem――já que vamos utilizar as instalações da sua empresa, pagaremos uma compensação à altura……"
42130-258 = "……Que tal o direito de operação do metrô de D.U.?"
42130-259 = "Se substituirmos os executivos do Departamento de Tráfego, será necessária uma nova organização para operar o metrô."
42130-260 = "Se a Kaiser Corporation puder assumir esse papel, para mim será muito bem-vindo."
42130-261 = "Nada mal. De qualquer forma, já que falhamos em adquirir o negócio ferroviário da Saint Nephthys, eu estava justamente procurando uma alternativa."
42130-262 = "Operar o principal meio de transporte que conecta cada distrito――obteremos uma fonte de renda muito mais estável do que qualquer outra indústria……"
42130-263 = "Eu não sou um tolo que perde a riqueza do futuro por causa de um lucro imediato e insignificante."
42130-264 = "Tudo bem. Deixarei os preparativos necessários para o transporte da ogiva e a operação do silo prontos. Agiremos conforme o tempo em que as raposas se moverem."
42130-266 = "……."
42130-267 = "Obrigada. #nCom isso, o caso está encerrado――"
42130-268 = "……Ah, é verdade. Ainda não ouvi a resposta à minha ordem."
42130-269 = "Líder de Esquadrão Yukino, qual é a sua resposta?"
42130-273 = "……FOX1, entendido."
42130-275 = "Próximo episódio: O Dilema do Prisioneiro"
