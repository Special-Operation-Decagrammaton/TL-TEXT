[translation]
2005805-1 = "Erika and the Vending Machine"
2005805-2 = "(Stopping by a vending machine on the way back after finishing errands in #nGehenna...)"
2005805-4 = "[ns] \"What should I get...\""
2005805-6 = "(Just as I was about to press the button...)"
2005805-7 = "That one's not great."
2005805-12 = "[ns] \"Ah, Erika.\""
2005805-13 = "The one next to it is recommended."
2005805-14 = "Two to the right... Ah, yeah, that one."
2005805-15 = "[s] \"I trust you, okay?\""
2005805-16 = "Well, it should be fine, right?"
2005805-20 = "[ns] \"You're sure I can trust you?\""
2005805-21 = "Ahaha! Say that after you drink it."
2005805-25 = "[ns] \"Ah... this is delicious!\""
2005805-26 = "See? It's good, right? #nI thought you'd like it, Sensei."
2005805-27 = "Eh? You're asking why I know your preferences? #nYou told me before, didn't you?"
2005805-28 = "[s1] \"You remembered?\"\n[s2] \"I'm impressed!\""
2005805-31 = "It just sort of stuck in my memory."
2005805-32 = "Hehe, do you remember my preferences, Sensei? How about it?"
2005805-33 = "Come on, pick one!"
2005805-34 = "[s] \"Eh... I might be a little nervous.\""
2005805-35 = "Yes, yes, relax your shoulders~"
2005805-36 = "..."
2005805-37 = "Hmm... So that's it...?"
2005805-38 = "..."
2005805-39 = "Ah, or are you going to choose a different one? #nYou look troubled~ tee-hee."
2005805-40 = "[ns] \"T-This is it!!\""
2005805-42 = "Oh..."
2005805-43 = "Ohhh!"
2005805-44 = "Correct♪ #nI like this one."
2005805-45 = "But, didn't you just pick it at random, Sensei?"
2005805-46 = "Hmm, I had a feeling... right?"
2005805-47 = "Cold over warm, non-carbonated over carbonated...?"
2005805-48 = "..."
2005805-49 = "You were thinking about it a lot, weren't you."
2005805-50 = "You have good taste. Thanks."
2005805-51 = "Ah, sorry... Could you open this for me? #nMy nails are long, so I can't open it very well..."
2005805-52 = "[s] \"Hah, leave it to me!\""
2005805-53 = "Ahaha, you seem happy, Sensei."
2005805-57 = "[ns] \"Ouch!\""
2005805-58 = "Ah, are you okay!?"
2005805-59 = "Ah... you got hurt on the rim... that looks hurt."
2005805-60 = "Wait a second. I have a bandage."
2005805-65 = "Here, let me see your hand."
2005805-66 = "I'm sorry... It's my fault."
2005805-67 = "No, it's definitely not okay. I'm sorry."
2005805-68 = "[s] \"So you carry bandages around.\""
2005805-69 = "Well, yeah. I have plenty of chances to use them. It's just a necessity, you know? #nMy friends get hurt often."
2005805-70 = "Kind? Maybe? I don't really think so."
2005805-74 = "Ah... maybe this is a bit too cute for you to wear, Sensei?"
2005805-75 = "Well... whatever. #nThey say cute patterns make wounds heal faster, right?"
2005805-76 = "[s] \"Does that have anything to do with it?\""
2005805-80 = "Hehe. Who knows. #nThere, all done..."
2005805-81 = "..."
2005805-82 = "...Somehow."
2005805-83 = "Sensei, try applying it."
2005805-84 = "Yes yes, just like that…"
2005805-90 = "Hmmm…"
2005805-91 = "...I've thought about this for a while, but your hands are warm, Sensei."
2005805-92 = "[s] \"Erika's hands are somehow soft.\""
2005805-93 = "..."
2005805-94 = "I-Is that so? Being soft is probably a good thing, right? #nAhaha."
2005805-96 = "..."
2005805-97 = "Oh, speaking of which! You treated me to another drink... thanks."
2005805-98 = "Sensei, every time you meet me, you treat me to various things... and get injured. #nIt might not be very fun for you right? Are you okay?"
2005805-99 = "[s] \"Let's eat something delicious again.\""
2005805-100 = "..."
2005805-104 = "Yeah. #nSee you later, Sensei."