[translation]#[Não revisado] - Filipe 09/06/26
2005805-1 = "Erika e a máquina de venda automática"
2005805-2 = "(No caminho de volta depois de resolver as coisas em Gehenna, parou na máquina de venda automática...)"
2005805-4 = "[ns] \"O que será que eu vou pegar...\""
2005805-6 = "(No momento em que ia apertar o botão...)"
2005805-7 = "Esse aí é meio duvidoso."
2005805-12 = "[ns] \"Ah, Erika.\""
2005805-13 = "O do lado é melhor."
2005805-14 = "Dois para a direita... isso, aquele."
2005805-15 = "[s] \"Pode confiar?\""
2005805-16 = "Sei lá, acho que vai."
2005805-20 = "[ns] \"Confiei mesmo, hein.\""
2005805-21 = "Ahaha! O gosto é que decide."
2005805-25 = "[ns] \"Ah... gostoso!\""
2005805-26 = "Viu? É gostoso? Eu sabia que você ia gostar."
2005805-27 = "Hã? Como eu sei do seu gosto? Você mesmo disse outro dia."
2005805-28 = "[s1] \"Você lembrou?\"\n[s2] \"Estou emocionado!\""
2005805-31 = "É que ficou na minha cabeça."
2005805-32 = "Fufu, e você, professor, lembra do meu gosto?"
2005805-33 = "Vamos, escolhe aí!"
2005805-34 = "[s] \"Hã... fiquei um pouco tenso agora.\""
2005805-35 = "Tá, tá, relaxa"
2005805-36 = "..."
2005805-37 = "Hmm... esse aí?"
2005805-38 = "..."
2005805-39 = "Ah, quer trocar? Quanta indecisão... te peguei."
2005805-40 = "[ns] \"É... esse daqui!!\""
2005805-42 = "Uau..."
2005805-43 = "Uau-uu!"
2005805-44 = "Acertô, miserávi♪ Esse é o meu favorito."
2005805-45 = "Mas na verdade você escolheu no chute, não foi?"
2005805-46 = "Hmm... foi o que eu achei, né?"
2005805-47 = "Coisas geladas em vez de quentes, sem gás em vez de com gás...?"
2005805-48 = "..."
2005805-49 = "Puxa, você pensou mesmo, hein."
2005805-50 = "Tem bom gosto. Valeu."
2005805-51 = "Ah, desculpa... pode abrir para mim? A unha é grande, não consigo abrir direito."
2005805-52 = "[s] \"Humpf, deixa comigo!\""
2005805-53 = "Ahaha, professor, parece animado."
2005805-57 = "[ns] \"Ai!\""
2005805-58 = "Ah, você está bem!?"
2005805-59 = "Ah... machucou a beirada, né? Deve doer."
2005805-60 = "Espera aí. Tenho band-aid."
2005805-65 = "Pronto, dá a mão."
2005805-66 = "Desculpa... foi por minha causa."
2005805-67 = "Não, não está nada bem. Desculpa."
2005805-68 = "[s] \"Você anda com band-aid?\""
2005805-69 = "Sim. Tenho que usar bastante. Meio que hábito... Meus amigos também se machucam."
2005805-70 = "Gentil? Acho que não."
2005805-74 = "Ah... talvez tenha sido muito fofo para você, professor?"
2005805-75 = "Bem, que seja. Dizem que band-aid fofo ajuda a cicatrizar mais rápido."
2005805-76 = "[s] \"Será que tem relação?\""
2005805-80 = "Fufu. Vai saber. Pronto, terminei..."
2005805-81 = "..."
2005805-82 = "... Sabe"
2005805-83 = "Professor, me dá a sua mão."
2005805-84 = "Isso. Assim..."
2005805-90 = "Hum..."
2005805-91 = "... Já pensei nisso antes, mas a sua mão é quentinha."
2005805-92 = "[s] \"A sua é meio macia, Erika.\""
2005805-93 = "..."
2005805-94 = "S-sério? Macio é bom, né? Ahaha."
2005805-96 = "..."
2005805-97 = "A, aliás! Você pagou minha bebida de novo... obrigada."
2005805-98 = "De alguma forma, sempre que a gente se encontra você paga alguma coisa para mim... ou se machuca. Não é muito divertido, né? Você está bem?"
2005805-99 = "[s] \"Vamos comer algo gostoso de novo qualquer dia desses.\""
2005805-100 = "..."
2005805-104 = "Hum. Até mais, professor."