[translation]
2005805-1 = "エリカと自販機"
2005805-2 = "（ゲヘナでの用事を終えた帰りに自販機に寄ったところ……）"
2005805-4 = "[ns] \"何にしようかな……。\""
2005805-6 = "（ボタンを押そうとしたその時……）"
2005805-7 = "それ微妙なヤツだよ。"
2005805-12 = "[ns] \"あ、エリカ。\""
2005805-13 = "隣の方がオススメ。"
2005805-14 = "2つ右の……ああ、そうそう、それ。"
2005805-15 = "[s] \"信じるからね？\""
2005805-16 = "まあイケるんじゃない？"
2005805-20 = "[ns] \"本当に信じたからね？\""
2005805-21 = "あははっ！飲んでからいいなよ。"
2005805-25 = "[ns] \"あ……美味しい！\""
2005805-26 = "ほらね。美味しいでしょ？#n先生好きだと思った。"
2005805-27 = "え？なんで好みを知ってるのか？#n前教えてくれたじゃん。"
2005805-28 = "[s1] \"覚えててくれたんだ？\"\n[s2] \"先生、感動！\""
2005805-31 = "なんか記憶に残ってたんだよね。"
2005805-32 = "ふふっ、先生は私の好み覚えてる？どう？"
2005805-33 = "ほら、選んで！"
2005805-34 = "[s] \"え……ちょっと緊張するかも。\""
2005805-35 = "はいはい、肩の力抜いて～"
2005805-36 = "……。"
2005805-37 = "ふーん……それなんだ……？"
2005805-38 = "……。"
2005805-39 = "あ、やっぱ違うのにする？#n悩んでおりますなぁ～くっくっく。"
2005805-40 = "[ns] \"こ……これだっ！！\""
2005805-42 = "おお……。"
2005805-43 = "おおーーっ！"
2005805-44 = "せいかい♪#nこれ好きなんだ。"
2005805-45 = "でも、本当は先生テキトーに選んだんじゃない？"
2005805-46 = "ふーん、そんな気がした……ねぇ？"
2005805-47 = "あったかいものよりは冷たいもの、炭酸よりは炭酸なし……？"
2005805-48 = "……。"
2005805-49 = "めっちゃ考えてくれてるじゃん。"
2005805-50 = "センスいいね。ありがと。"
2005805-51 = "あ、ごめん……開けてもらっていい？#n爪長いからあんまりうまく開けられなくて……。"
2005805-52 = "[s] \"フッ、任せなさい！\""
2005805-53 = "あははっ、せんせーなんか嬉しそう。"
2005805-57 = "[ns] \"痛っ！\""
2005805-58 = "あっ、大丈夫！？"
2005805-59 = "あー……フチで怪我しちゃったか……痛そ。"
2005805-60 = "ちょっと待ってて。絆創膏あるから。"
2005805-65 = "はい、手出して。"
2005805-66 = "ごめんね……私のせいで。"
2005805-67 = "いや、全然大丈夫じゃないでしょ。ごめんね。"
2005805-68 = "[s] \"絆創膏持ち歩いてるんだね。\""
2005805-69 = "まあね。結構使う機会多いからさ。たしなみってやつ？#n友達もよく怪我するし。"
2005805-70 = "優しい？のかな？そんなこともないと思うよ。"
2005805-74 = "あー……先生がつけるにはちょっと可愛すぎたかも？"
2005805-75 = "まあ……いっか。#n可愛い柄だと早く治るって言うし？"
2005805-76 = "[s] \"関係あるかなそれ？\""
2005805-80 = "ふふっ。どうだろね。#nはい、できましたっと……。"
2005805-81 = "……。"
2005805-82 = "……なんか。"
2005805-83 = "先生、ちょっと手当ててみて。"
2005805-84 = "そうそう。そうやって……。"
2005805-90 = "うん……。"
2005805-91 = "……前から思ってたけど、先生の手ってあったかいよね。"
2005805-92 = "[s] \"エリカの手はなんだか柔らかいね。\""
2005805-93 = "……。"
2005805-94 = "そ、そう？柔らかいのはたぶん、いいことだよね？#nあははっ。"
2005805-96 = "……。"
2005805-97 = "そ、そういえば！飲み物また奢ってもらっちゃったね……ありがと。"
2005805-98 = "なんか先生、私に会う度に色々奢ってくれたり……怪我しちゃったり。あんま楽しくないかも？大丈夫？"
2005805-99 = "[s] \"また美味しいもの食べようね。\""
2005805-100 = "……。"
2005805-104 = "うん。#nまたね、先生。"
