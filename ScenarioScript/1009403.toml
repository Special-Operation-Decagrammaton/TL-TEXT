[translation]
1009403-1 = "メイドの料理！"
1009403-2 = "いらっしゃい、先生！待ってたよ！"
1009403-3 = "ふふふっ……楽しみにしてて！#n今度こそ、メイドver[ruby=さいば]才羽[/ruby]モモイの真価を見せてあげるから！"
1009403-4 = "[ns1] \"ちょっと、いやかなり不安だけど……。\"\n[ns2] \"モモイの料理、期待してるよ……！\""
1009403-7 = "旅人よ、こういう言葉がある。"
1009403-8 = "未知のものへの恐れと期待――#nそれこそが……冒険の[ruby=はな]華[/ruby]であると！"
1009403-9 = "またゲームのセリフを適当に言ってるだけじゃないかって？#nち、違うよ！ゲームのセリフではあるけど！適当じゃないもん！"
1009403-10 = "こほんっ……さっきも言った通り。#n食事の支度はメイドにとって、最重要クエストのひとつ！"
1009403-11 = "そしてっ！メイドが作る料理と言えば、フルコース以外にありえない！"
1009403-12 = "だから今日は、私が先生をフルコースでもてなしてあげる！"
1009403-13 = "最初に出すのは……これだぁっ！"
1009403-14 = "[s] \"紫色の……ジュース？\""
1009403-15 = "そう、何を隠そう！#nこれぞ「食前ジュース」的なもの！"
1009403-16 = "コース料理では、食事の前に葡萄の果汁を飲むらしいよ。食欲をかき立てる役割があるんだってさ！"
1009403-17 = "どうしてそうなるのか、理屈はわかんないけど……。"
1009403-18 = "とにかく、何か甘いものを飲むといいってこと！"
1009403-19 = "そこで用意したのが、この！#n「リザードマンの葡萄ジュース」だよ！"
1009403-20 = "[s3] \"ただの葡萄ジュースじゃないんだね？\"\n[s4] \"リザードマンの葡萄ジュース……？\""
1009403-23 = "ふっふっふっ……よくぞ聞いてくれました！"
1009403-24 = "もちろん、これはただの葡萄ジュースじゃないよ！"
1009403-25 = "なんとっ！飲むと毒が効かなくなって、水中で呼吸できるようになる！"
1009403-26 = "[s] \"ほ、ほんとに！？\""
1009403-27 = "……って、ゲームのテキストには書かれてる。"
1009403-28 = "な、なにさっ！その反応に困ったような顔は！"
1009403-29 = "そうだ！リザードマンの私生活？を描いたスピンオフ小説、#n『誠実なるメイド・リザードマン』も評判みたいだよ。"
1009403-30 = "私もまだ手に入れてないから、貸せないけどね！"
1009403-34 = "（モモイが熱心に勧めるジュースは、いつもの葡萄の味がした……）"
1009403-36 = "よし！次はスープだね！#nスープは胃腸を刺激して、この後の消化を助けてくれるんだって！"
1009403-37 = "持ってきたのは……！ビーフスープの缶詰！"
1009403-38 = "[s] \"どうして缶詰……？\""
1009403-39 = "ふふん！缶詰を甘く見ちゃダメだよ、先生。"
1009403-40 = "缶詰は長期保存できる、旅人の貴重な食糧！"
1009403-41 = "それにこの缶詰には……。#nエネルギーを回復して、水分量を減少させる特殊効果もある！"
1009403-42 = "[s] \"エネルギー？水分量……？\""
1009403-43 = "えっと、つまりその……。"
1009403-44 = "ポストアポカリプスの世界観だと長期保存に缶詰を使うから……。"
1009403-45 = "これもゲームのテキストかって？そ、そうだけど……？"
1009403-46 = "こ、この缶詰には、まだまだスゴイところがあるんだからね！#n設定上では――"
1009403-47 = "スープをぐつぐつ煮詰めて、水分量を極限まで減らしてるの！"
1009403-50 = "（スープの味は悪くなかったものの、強い塩気とどろどろした食感で……）"
1009403-51 = "（本当に体内の水分量を減少させる効果があるように感じた……）"
1009403-53 = "次は、ついにメインディッシュ！"
1009403-54 = "準備したのは……ふふっ。"
1009403-58 = "なんと、スーパースペシャル親子丼！"
1009403-59 = "この親子丼を食べれば……。#n最大HPと獲得経験値が増加！アイテム獲得率も2倍に！"
1009403-60 = "レシピもすっごくレアなんだよ！#n展望台がある公園で、市民の食事を観察するのが条件になってて！"
1009403-61 = "ふっふっふっ。だけど、この親子丼の一番注目すべき点は――#nやっぱりアイテム獲得率2倍のバフかな！"
1009403-62 = "これさえあれば、どんな狩りでも――"
1009403-63 = "[s5] \"つまり、これを食べて宝くじを買えば……。\"\n[s6] \"1等当選の確率が2倍になる！？\""
1009403-66 = "……そ、そこまで保証できないけど、試してみるのはアリかも？"
1009403-67 = "ええっ？ハズレたら私のせいにするって！？#n生徒に責任をなすりつけるのは、よくないよ！"
1009403-70 = "（幸いなことに、親子丼はふわとろで味も抜群だった）"
1009403-72 = "ついに、デザートだねっ！"
1009403-73 = "最後に準備したのは……うんっ！これは期待していいよ！"
1009403-74 = "絶対に忘れられないデザートを持ってきたから！"
1009403-75 = "さあ、いでよっ……！#n捻じれし[ruby=たそがれ]黄昏[/ruby]の堕落した黒炭ケーキ！"
1009403-76 = "[s7] \"なんて不吉な名前だ！\"\n[s8] \"捻じれし黄昏って何……？\""
1009403-79 = "え、名前の由来……？#nそれは私もわかんないけど……。"
1009403-80 = "でもさ、なんか強そうじゃない？"
1009403-81 = "この真っ黒で、ぐにゃぐにゃとした見た目とか……。"
1009403-82 = "[s] \"モモイ、料理は見た目も大事だよ……。\""
1009403-83 = "そ、それはそうだけどっ……！"
1009403-84 = "味が良ければ、すべて良しでしょ？"
1009403-87 = "（とても不吉な名前のデザートで不安だったが……）"
1009403-88 = "（食べてみると、意外と普通のチョコレートケーキだった）"
1009403-90 = "どうどう？先生？感想は？"
1009403-91 = "なんかバフにかかったとかさ。#n体が強化されたとか、レベルアップした感じとかない？"
1009403-92 = "それはよくわからないけど……？#n料理は全部おいしかった、って？"
1009403-93 = "ふっふっふっ！さすが先生！舌がこえてるね！"
1009403-97 = "わわっと、あー、袋の中身が……！"
1009403-98 = "これは何かって？え、えっとね……。"
1009403-99 = "コース料理に必要そうなものを、コンビニで買ったんだけど……。#nつい、いろいろ買いすぎちゃって……。"
1009403-100 = "ど、どうしよう、先生っ！#nゲーム開発部には冷蔵庫が無いんだった……！"
1009403-101 = "あっ、そうだ！さっきのフルコースを特許に出すでしょ？#nで、その特許料で冷蔵庫を購入するのは――？"
1009403-102 = "[s] \"特許を取るのは難しいかな……。\""
1009403-103 = "うぅ――……先生、助けてぇ！"
1009403-105 = "（モモイと一緒に残り物の処理について、策を練った）"
1009403-106 = "（なんとかすべて片付けることに成功したものの……）"
1009403-107 = "（あまりにも量が多く、終わる頃には疲労困憊だった……）"
