[translation]
1009403-1 = "A empregada está cozinhando!"
1009403-2 = "Bem-vindo, doutor! Eu estava esperando por você!"
1009403-3 = "Hmmm... aguardo ansiosamente o ......! #nDesta vez, mostrarei a vocês o verdadeiro valor da empregada verSaiba Momoi!"
1009403-4 = "[ns1] \"Estou um pouco, não muito ansioso ....... \"\n[ns2] \"Estou ansioso pela culinária do Momoy, ......! \""
1009403-7 = "Viajantes, há um ditado que diz."
1009403-8 = "Medo e expectativa do desconhecido - #nÉ disso que se trata a flower da aventura ......!"
1009403-9 = "Você acha que estou apenas dizendo frases aleatórias de jogos novamente? #Não, não é isso! É uma frase de um jogo! Não é aleatória!"
1009403-10 = "Kohonkk ...... Como eu disse antes. #Preparar refeições é uma das tarefas mais importantes para as empregadas domésticas!"
1009403-11 = "E mais! Uma refeição preparada por uma empregada pode ser nada mais do que um prato completo!"
1009403-12 = "Portanto, hoje vou presentear meu sensei com uma refeição completa!"
1009403-13 = "O primeiro a ser publicado é ....... É isso aí!"
1009403-14 = "[s]\"purple ...... juice? \""
1009403-15 = "Sim, qual é o segredo! #n Este é o tipo de \"suco antes do jantar\"!"

1009403-16 = "Eles bebem suco de uva antes da refeição para uma refeição completa. Dizem que isso ajuda a estimular o apetite!"
1009403-17 = "Não sei qual é a lógica por trás desse fato. ......"
1009403-18 = "De qualquer forma, isso significa que você deve beber algo doce!"
1009403-19 = "Então preparamos isso! #n 'Suco de uva Lizardman'!"
1009403-20 = "[s3] \"Não é apenas suco de uva? \"\n[s4] \"Suco de uva Lizardman ......? \""
1009403-23 = "Phew. ...... Muito obrigado por ouvir!"
1009403-24 = "É claro que não se trata apenas de suco de uva!"
1009403-25 = "Que surpresa! Se você beber, o veneno se torna ineficaz e você pode respirar debaixo d'água!"
1009403-26 = "[s]\"Ho, realmente! \""
1009403-27 = "......, o texto do jogo diz."
1009403-28 = "Mas que diabos? Esse olhar de irritação em sua reação!"
1009403-29 = "Certo! A vida pessoal dos Homens-lagarto? O romance spin-off, #n 'Sincere Maid Lizardman', sobre a vida pessoal do Lizardman, também parece ter sido bem recebido."
1009403-30 = "Ainda não o tenho, portanto não posso emprestá-lo a você!"
1009403-34 = "(Momoy recomendou com entusiasmo o suco, que tinha o gosto das uvas de sempre. ......)"
1009403-36 = "OK! O próximo passo é a sopa! Dizem que a sopa estimula o estômago e ajuda na digestão depois!"
1009403-37 = "Trazido a você por ......! Sopa de carne enlatada!"
1009403-38 = "[s]\"Por que o ...... em lata? \""
1009403-39 = "Hmph! Não subestime a comida enlatada, doutor."
1009403-40 = "Os alimentos enlatados podem ser armazenados por muito tempo e são um alimento valioso para os viajantes!"
1009403-41 = "Além disso, esse alimento enlatado tem ....... Também tem o efeito especial de restaurar a #n-energia e reduzir o teor de água!"
1009403-42 = "[s]\"Energia? Conteúdo de água......? \""
1009403-43 = "Hum, quero dizer que ......."
1009403-44 = "Na visão de mundo pós-apocalipse, o enlatamento é usado para armazenamento de longo prazo. ......"
1009403-45 = "Esse é outro texto de um jogo? Sim, é, mas ......?"
1009403-46 = "Esse alimento enlatado ainda contém algumas coisas incríveis! Na configuração #n..."
1009403-47 = "A sopa é fervida para reduzir o conteúdo de água a um mínimo absoluto!"
1009403-50 = "(Embora o sabor da sopa não fosse ruim, ela tinha uma textura muito salgada e viscosa ......)"
1009403-51 = "(Realmente parece ter o efeito de reduzir a quantidade de água no corpo: ......)"
1009403-53 = "Em seguida, finalmente, o prato principal!"
1009403-54 = "Preparado por ...... phew."
1009403-58 = "Que oyakodon superespecial!"
1009403-59 = "Coma este oyakodon e você poderá ....... #nAumento do HP máximo e da experiência adquirida! A taxa de aquisição de itens também dobrou!"
1009403-60 = "As receitas também são muito raras! #nEles precisam estar em um parque com um observatório e observar os cidadãos comendo!"
1009403-61 = "Ufa! Mas a coisa mais notável sobre esse oyakodon é - #n acho que o bônus de taxa de aquisição de itens em dobro!"
1009403-62 = "Com isso, qualquer caça..."
1009403-63 = "[s5] \"Quero dizer, se você comer isso e comprar um bilhete de loteria, você ganhará ....... \"\n[s6] \"Dobre suas chances de ganhar o primeiro prêmio! \""
1009403-66 = "...... Portanto, não posso garantir isso, mas talvez valha a pena tentar?"
1009403-67 = "E aí? Você vai me culpar se não receber um trote! #Não é uma boa ideia colocar a culpa nos alunos!"
1009403-70 = "(Felizmente, o oyakodon estava macio e com um sabor excelente)."
1009403-72 = "Finalmente, a sobremesa!"
1009403-73 = "Última versão preparada por ...... Yeah! Você pode contar com este!"
1009403-74 = "Porque eu lhe trouxe uma sobremesa que você nunca esquecerá!"
1009403-75 = "Vamos lá, vamos lá. ......! #n twisted twilight corrupt black coal cake!"
1009403-76 = "[s7] \"Que nome sinistro! \"\n[s8] \"O que é crepúsculo distorcido ......? \""
1009403-79 = "Qual é a origem do nome ......? #n Também não sei sobre isso. ......"
1009403-80 = "Mas ei, ele não parece meio forte?"
1009403-81 = "Como esse visual preto e macio. ......"
1009403-82 = "[s]\"Momoy, a comida também deve ter boa aparência. ...... \""
1009403-83 = "Bem, isso é verdade. ......"
1009403-84 = "Se o sabor for bom, melhor ainda, certo?"
1009403-87 = "(Fiquei preocupado com o nome muito sinistro da sobremesa, mas ......)"
1009403-88 = "(Quando experimentei, era um bolo de chocolate surpreendentemente comum)"
1009403-90 = "Como está indo? Sensei? O que o senhor acha?"
1009403-91 = "Como se você tivesse sido aprimorado de alguma forma. #nVocê sente que seu corpo foi aprimorado ou melhorado?"
1009403-92 = "Não sei quanto a isso. ......? #nToda a comida era boa, você diz?"
1009403-93 = "Ufa! Esse é o meu sensei! Você tem uma língua dura!"
1009403-97 = "Uau, ah, o conteúdo da bolsa. ......"
1009403-98 = "O que é isso? Bem, vamos ver. ......."
1009403-99 = "Comprei algumas coisas em uma loja de conveniência que achei que poderia precisar para uma refeição. ...... #Acabei comprando coisas demais. ......"
1009403-100 = "O que devo fazer, Sensei? O Departamento de Desenvolvimento de Jogos #n não tinha uma geladeira. ......"
1009403-101 = "Ah, sim! Você patentearia aquele curso completo que acabou de fazer, não é mesmo? #n E vai usar a taxa da patente para comprar uma geladeira para -?"
1009403-102 = "[s]\"É difícil obter uma patente? ....... \""
1009403-103 = "Ugh... ...... doutor, me ajude!"
1009403-105 = "(Com a Momoy, elaboramos um plano de como lidar com as sobras)."
1009403-106 = "(......, embora tenham conseguido esclarecer tudo)"
1009403-107 = "(Foi demais e eu estava exausto quando terminei. ......)"
