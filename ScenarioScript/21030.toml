[translation]#[Texto Final , mas eventualmente pode haver alterações na formatação de texto. - Filipe 29/06.]
21030-1 = "Episódio 3: Rumo às Ruínas."
21030-2 = "Ruínas"
21030-5 = "……"
21030-6 = "……"
21030-7 = "……Ei, mana."
21030-8 = "Até quando a gente vai ter\nque ficar desse jeito?"
21030-9 = "Quietinha. Ah, Sensei,\nabaixa mais um pouco a cabeça……!"
21030-16 = "……"
21030-17 = "…… ■■■ ■■■■……"
21030-20 = "…… ■■■."
21030-21 = "■■■■ ■■."
21030-27 = "……ufa, será que já foram embora?"
21030-28 = "Beleza, então bora."
21030-29 = "Que \"bora\" o quê!"
21030-30 = "Que lugar é este, afinal!? Tem uns robôs\nmisteriosos andando pra todo lado, num número\nque não dá nem pra contar!"
21030-31 = "Como assim \"que lugar\"……\neu já falei isso um montão de vezes."
21030-34 = "É as \"Ruínas\"."
21030-36 = "Sabendo que era área proibida, até que eu\nesperava algum perigo…… mas, nossa, dá\num frio na espinha……"
21030-37 = "Aqueles robôs……\no que será que são, afinal……?"
21030-38 = "Não, mais que isso: estas \"Ruínas\", com um monte\ndaquilo vagando por aí…… o que é este lugar, afinal?"
21030-39 = "Hmm, eu também só ouvi um pouco da Veritas,\nentão ainda é tudo um mistério pra mim……"
21030-40 = "Originalmente, o acesso aqui era duramente\nrestrito — isso eu já tinha contado pro Sensei, né?"
21030-41 = "[s1] \"Sim, isso eu ouvi.\"\n[s2] \"Onde é aqui…… quem sou eu……?\""
21030-42 = "Já que a gente chegou até aqui mesmo, deixa eu\nexplicar de novo. Quem restringia o acesso e tentava\nesconder ao máximo a própria existência deste lugar……"
21030-43 = "O status do Sensei tá em estado de confusão,\nentão deixa eu explicar de novo. Quem restringia\no acesso e escondia a existência deste lugar……"
21030-44 = "era o Presidente do Conselho Estudantil Geral."
21030-45 = "Presidente do Conselho Geral…… aquele que\nestava no topo de todos os presidentes de conselho\nde Kivotos e, do nada, desapareceu?"
21030-46 = "Isso. Depois que ele sumiu, as forças do Conselho\nGeral também se retiraram, e o lugar parece\nter ficado abandonado assim mesmo."
21030-47 = "Foi graças a isso que a gente conseguiu entrar……\nmas enfim!"
21030-48 = "Com a segurança do Conselho Geral fora daqui\ne a ajuda da Veritas, a gente conseguiu chegar\na este lugar."
21030-49 = "Segundo a Himari, aqui é,"
21030-50 = "\"talvez um lugar feito o esgoto dos tempos, onde\nse junta tudo o que sumiu de Kivotos e foi\nesquecido\"…… foi o que ela disse."
21030-51 = "A Himari…… aquela Himari bonita da Veritas,\na que anda de cadeira de rodas?"
21030-52 = "É raro a Himari, que sempre age feito o sábio de\num RPG, no estilo \"eu sei de tudo\", usar uma palavra\ncomo \"talvez\"…… é mundo desconhecido a esse ponto."
21030-53 = "Mas por que a G.Bible estaria num lugar\ndesses…… ah, peraí!?"
21030-54 = "Não me diga que…… quando você falou \"a G.Bible\ntá aqui\", foi só porque ouviu que aqui \"se junta o que\nsumiu de Kivotos e foi esquecido\"!? F-foi só por isso\nque a gente veio parar num lugar desses!?"
21030-55 = "Não foi só por isso. Quando pedi pra Veritas\nprocurar a G.Bible, eles me passaram uma coordenada.\nA \"última coordenada em que a G.Bible foi vista ativa\"."
21030-56 = "E essa coordenada apontava pra um\n\"lugar que não existe em mapa nenhum comum\"."
21030-57 = "Ou seja……!?"
21030-58 = "Isso."
21030-59 = "Juntando essas duas coisas, a G.Bible com certeza\nestá aqui…… nestas \"Ruínas\", cuja existência ficou\nescondida esse tempo todo."
21030-60 = "[s] \"G.Bible…… no fim, o que é isso mesmo?\""
21030-61 = "Ah, é mesmo, eu ainda tava no meio\nde explicar isso também."
21030-62 = "Resumindo: na Millennium de antigamente, não,\nem toda a Kivotos de antigamente……"
21030-63 = "existia um criador de jogos lendário."
21030-64 = "E o que essa pessoa criou enquanto estudava\nna Millennium foi a \"G.Bible\"."
21030-65 = "Os detalhes eu não sei direito……"
21030-66 = "mas dizem que dentro dela está \"o método secreto\npra criar o melhor jogo do mundo\"."
21030-67 = "……Isso não é, sei lá, propaganda de alguma\ncolégio de criação de jogos por aí?"
21030-68 = "Não é! A G.Bible existe! A \"Bíblia dos Jogos\",\nque te faz capaz de criar o melhor jogo só de ler,\nela existe, com toda a certeza!"
21030-69 = "Lendo essa G.Bible, dá pra criar o melhor\njogo do mundo…… o \"Tales Saga Chronicle 2\"!"
21030-70 = "Se a gente seguir nessa coordenada que a Veritas\ndeu, com certeza a G.Bible vai estar lá……"
21030-72 = "……"
21030-73 = "……■■■ ■■■■!"
21030-74 = "A-aquilo ali!"
21030-75 = "Um robô!?"
21030-83 = "N-não é impressão minha, a gente não tá super\nna mira deles!? Tão todos se juntando bem pra cá!?"
21030-84 = "S-se continuar assim, a gente vai ser cercada!"
21030-85 = "Aaai, e-e agora, o que a gente faz!?"
21030-86 = "[s] \"Por ali! Dá pra ver tipo uma fábrica!\""
21030-87 = "Hã? U-uma fábrica!?"
21030-88 = "Oh, Sensei, boa! Rápido! Bora furar o cerco\ndos robôs e se refugiar naquela fábrica!"
21030-89 = "Sensei, assuma o comando da batalha, por favor!"