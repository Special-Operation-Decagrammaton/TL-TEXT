[translation]
21030-1 = "Episódio 3; Em Direção às Ruínas"
21030-2 = "Ruínas"
21030-5 = "......"
21030-6 = "......"
21030-7 = "......Ei, mana."
21030-8 = "Até quando vamos ter que ficar assim?"
21030-9 = "Quieta. Ah, Sensei, abaixe a cabeça mais um pouco......!"
21030-16 = "......"
21030-17 = "...... ■■■ ■■■■......"
21030-20 = "...... ■■■."
21030-21 = "■■■■ ■■."
21030-27 = "......Ufa, acho que eles já foram?"
21030-28 = "Beleza, então vamos lá."
21030-29 = "Beleza nada!"
21030-30 = "Que lugar é esse!? Têm tantos daqueles robôs misteriosos andando por aí que nem dá pra contar!"
21030-31 = "Como assim... eu já falei várias vezes."
21030-34 = "São as 'Ruínas'."
21030-36 = "Como é uma área de acesso restrito, eu estava preparada para algum nível de perigo. Mas nossa, isso dá um frio na barriga..."
21030-37 = "O que diabos são aqueles robôs...?"
21030-38 = "Não, mais importante que isso... O que diabos são essas 'Ruínas' onde várias dessas coisas ficam rondando?"
21030-39 = "Hmmm, eu também só ouvi um pouco sobre isso da Veritas, então tem muitas coisas que eu não sei, mas..."
21030-40 = "Eu já tinha dito para você, Sensei, que o acesso aqui era estritamente restrito, não é?"
21030-41 = "[s1] \"Sim, eu ouvi até essa parte.\"\n[s2] \"Onde estou... Quem sou eu...?\""
21030-42 = "Já que chegamos até aqui, vou explicar de novo. Quem restringiu o acesso aqui e tentou esconder a própria existência deste lugar ao máximo foi..."
21030-43 = "Como os status do Sensei estão em estado de Confusão, vou explicar de novo. Quem restringiu o acesso aqui e tentou esconder a própria existência deste lugar ao máximo foi..."
21030-44 = "A Presidente do Conselho Estudantil Geral."
21030-45 = "A Presidente do Conselho Estudantil Geral... aquela que estava no topo de todos os conselhos estudantis de Kivotos, mas que desapareceu de repente?"
21030-46 = "Sim. Parece que, desde que ela desapareceu, as forças do Conselho Estudantil Geral também se retiraram e o lugar foi deixado abandonado assim."
21030-47 = "Graças a isso nós conseguimos entrar... Mas enfim!"
21030-48 = "Os guardas do Conselho Estudantil Geral se foram, e com a ajuda da Veritas, nós conseguimos chegar aqui."
21030-49 = "De acordo com a Himari-senpai, este lugar..."
21030-50 = "'Talvez seja um lugar como os esgotos da era, onde as coisas que desapareceram e foram esquecidas em Kivotos se reúnem'... foi o que ela disse."
21030-51 = "Himari-senpai... você quer dizer aquela Himari linda da Veritas que anda de cadeira de rodas?"
21030-52 = "É raro ver a Himari-senpai, que sempre age como um Sábio de RPG dizendo 'Eu sei de tudo', usar a palavra 'talvez'... É um mundo assim tão desconhecido."
21030-53 = "Mas por que a G.Bible estaria num lugar desses... Ei, espera aí!?"
21030-54 = "Eu duvido que seja isso, mas... A mana disse que a 'G.Bible está aqui' só porque ouviu que 'as coisas que desapareceram e foram esquecidas em Kivotos se reúnem' aqui!? V-Viemos para um lugar desses só por causa disso!?"
21030-55 = "Não é só isso. Quando pedi para a Veritas procurar a G.Bible, elas me deram as coordenadas. 'As coordenadas da última vez em que a ativação da G.Bible foi confirmada'."
21030-56 = "E as coordenadas apontavam para um 'lugar que não existe em mapas comuns'."
21030-57 = "Isso significa que...!?"
21030-58 = "Isso mesmo."
21030-59 = "Juntando essas duas coisas, a G.Bible com certeza está aqui... nas 'Ruínas', que tiveram sua existência escondida por tanto tempo."
21030-60 = "[s] \"A G.Bible... o que é ela exatamente mesmo?\""
21030-61 = "Agora que você mencionou, eu também estava no meio dessa explicação, né."
21030-62 = "Resumindo, na antiga Millennium... não, na antiga Kivotos..."
21030-63 = "Existiu um criador de jogos lendário."
21030-64 = "E o que ele criou enquanto estudava na Millennium foi a 'G.Bible'."
21030-65 = "Eu não sei os detalhes do conteúdo, mas..."
21030-66 = "Dizem que lá dentro está guardado o 'método secreto para criar o melhor jogo de todos'."
21030-67 = "......Isso não parece um anúncio de alguma escola de design de jogos?"
21030-68 = "Não é nada disso! A G.Bible existe de verdade! A 'Bíblia dos Jogos' que, se você ler, conseguirá criar o melhor jogo, existe com certeza!"
21030-69 = "Se lermos essa G.Bible, deveremos conseguir criar o melhor jogo... o 'Tales Saga Chronicle 2'!"
21030-70 = "Se seguirmos em direção a essas coordenadas que recebi da Veritas, a G.Bible com certeza estará..."
21030-72 = "......"
21030-73 = "......■■■ ■■■■!"
21030-74 = "A-Aquilo é!"
21030-75 = "Um robô!?"
21030-83 = "N-Nós não estamos sendo muito miradas!? Eles estão se juntando pra cá!?"
21030-84 = "D-Desse jeito vamos ser cercadas!"
21030-85 = "Uwawawa, o-o que a gente faz!?"
21030-86 = "[s] \"Por ali! Dá pra ver algo que parece uma fábrica!\""
21030-87 = "Eh? F-Fábrica!?"
21030-88 = "B-Boa, Sensei! Rápido! Vamos romper os robôs e fugir para aquela fábrica!"
21030-89 = "Sensei, por favor, assuma o comando da batalha!"