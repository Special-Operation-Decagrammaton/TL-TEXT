[translation]
21030-1 = "Episódio 3; Para as Ruínas"
21030-2 = "Ruínas"
21030-5 = "……"
21030-6 = "……。"
21030-7 = "……Ei, irmã."
21030-8 = "Até quando vamos ter que ficar assim?"
21030-9 = "Silêncio. Ah, Sensei, abaixe a cabeça um pouco mais……!"
21030-16 = "……。"
21030-17 = "…… ■■■ ■■■■……。"
21030-20 = "…… ■■■。"
21030-21 = "■■■■ ■■。"
21030-27 = "……Ufa, será que já foram?"
21030-28 = "Beleza, então vamos nessa."
21030-29 = "Nada de beleza!"
21030-30 = "O que é este lugar, afinal!? Tem uma quantidade incontável daqueles robôs misteriosos andando por aí!"
21030-31 = "O que é…… eu já disse várias vezes."
21030-34 = "São as \"Ruínas\"."
21030-36 = "Disseram que era uma área proibida, então eu estava preparada para um certo nível de perigo. Mas nossa, que tensão……."
21030-37 = "O que será que são aqueles robôs……?"
21030-38 = "Não, mais importante que isso, o que são essas \"Ruínas\" onde várias daquelas coisas ficam vagando……?"
21030-39 = "Hum, eu só ouvi um pouco da Veritas, então tem muita coisa que eu não sei também, mas……"
21030-40 = "Eu já disse ao Sensei que a entrada aqui era estritamente restrita, certo?"
21030-41 = "[s1] \"Sim, até aí eu entendi.\"\n[s2] \"Onde estou…… quem sou eu……?\""
21030-42 = "Já que viemos até aqui, vou explicar de novo. Quem restringia a entrada aqui e tentava esconder a existência deste lugar o máximo possível foi……"
21030-43 = "O status do Sensei está confuso, então vou explicar de novo. Quem restringia a entrada aqui e tentava esconder a existência deste lugar o máximo possível foi……"
21030-44 = "A Presidente do Conselho Estudantil Federal."
21030-45 = "A Presidente do Conselho Estudantil Federal…… aquela pessoa que estava no topo de todas as presidentes de conselho de Kivotos, mas que desapareceu de repente?"
21030-46 = "Isso. Depois que ela desapareceu, as forças do Conselho Estudantil Federal também se retiraram, e parece que o lugar foi deixado assim."
21030-47 = "Graças a isso conseguimos entrar, mas…… enfim!"
21030-48 = "A segurança do Conselho Estudantil Federal se foi, e com a ajuda da Veritas, conseguimos chegar a este lugar."
21030-49 = "Segundo a Himari-senpai, este lugar é,"
21030-50 = "\"Talvez um tipo de esgoto da história, onde se reúnem as coisas que desapareceram e foram esquecidas por Kivotos\"…… foi o que ela disse."
21030-51 = "A Himari-senpai…… aquela Himari-senpai da Veritas, a beldade que anda de cadeira de rodas?"
21030-52 = "É raro a Himari-senpai, que sempre age como uma sábia de RPG dizendo \"eu sei de tudo\", usar a palavra \"talvez\"…… isso mostra o quão desconhecido é este mundo."
21030-53 = "Mas por que a G.Bible estaria em um lugar desses…… espera, um minuto!?"
21030-54 = "Não quero nem pensar, mas…… você disse que a \"G.Bible está aqui\" só porque ouviu que \"aqui é onde se reúnem as coisas esquecidas por Kivotos\"!? S-só por esse motivo viemos para um lugar desses!?"
21030-55 = "Não foi só por isso. Quando pedi para a Veritas investigar a G.Bible, eles me deram as coordenadas. As \"coordenadas onde a última operação da G.Bible foi confirmada\"."
21030-56 = "Essas coordenadas apontavam para um \"lugar que não existe em mapas comuns\"."
21030-57 = "Isso significa que……!?"
21030-58 = "Exato."
21030-59 = "Juntando as duas coisas, a G.Bible certamente deve estar aqui…… nas \"Ruínas\", onde sua existência foi mantida escondida por todo esse tempo."
21030-60 = "[s] \"G.Bible…… afinal, o que é isso mesmo?\""
21030-61 = "Falando nisso, eu estava no meio da explicação sobre isso também."
21030-62 = "Simplificando, na Millennium de antigamente, não, na Kivotos de antigamente……"
21030-63 = "Existia um criador de jogos lendário."
21030-64 = "Foi essa pessoa que criou a \"G.Bible\" enquanto estudava na Millennium."
21030-65 = "Não sei os detalhes, mas……"
21030-66 = "Dizem que dentro dela está o \"método secreto para criar o melhor jogo de todos\"."
21030-67 = "……Isso não é propaganda de alguma escola de criação de jogos?"
21030-68 = "Não é! A G.Bible existe! A \"Bíblia dos Jogos\", que permite criar o melhor jogo de todos se você a ler, ela definitivamente existe!"
21030-69 = "Se eu ler essa G.Bible, com certeza conseguirei criar o melhor jogo de todos... 'Tales Saga Chronicle 2'!"
21030-70 = "Se eu seguir estas coordenadas que recebi da Veritas, a G.Bible certamente estará lá..."
21030-72 = "……."
21030-73 = "……■■■ ■■■■!"
21030-74 = "A-aquilo é!"
21030-75 = "Um robô!?"
21030-83 = "N-não estamos sendo muito visados!? Eles estão todos se reunindo aqui, não estão!?"
21030-84 = "S-se continuar assim, vamos ser cercados!"
21030-85 = "Uwaaaa, o-o que eu faço!?"
21030-86 = "[s] \"Ali! Dá para ver algo que parece uma fábrica!\""
21030-87 = "Hã? U-uma fábrica!?"
21030-88 = "O-ótima ideia, Sensei! Rápido! Vamos romper o cerco desses robôs e fugir para aquela fábrica!"
21030-89 = "Sensei, por favor, comande o combate!"
