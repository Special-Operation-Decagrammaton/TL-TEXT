[translation]
2005205-1 = "Horário"
2005205-4 = "[ns] \"……。\""
2005205-5 = "……。"
2005205-6 = "[s1] \"O trem... não chega nunca...\"\n[s2] \"Já faz quase uma hora que estou esperando...\""
2005205-9 = "Não é bom falar mal da própria família, mas..."
2005205-10 = "Será que não dá para fazer algo em relação a essa infraestrutura caindo aos pedaços...?"
2005205-11 = "O trem circular da academia nunca chegou no horário nem uma vez sequer..."
2005205-12 = "……Já cheguei no meu limite, Sensei."
2005205-13 = "Eu, Aramaki Yakumo, tomei uma decisão."
2005205-14 = "[s] \"Essa sua decisão me dá medo...\""
2005205-15 = "Que reação é essa? Eu não vou te devorar, sabe?"
2005205-16 = "Para toda mudança, é necessária uma \"visão\"."
2005205-17 = "Para mudar a infraestrutura ferroviária de Red Winter, precisamos de uma operação ferroviária que sirva de modelo...#"
2005205-18 = "Pelo menos, precisamos aprender na prática o que é chegar e partir no horário!"
2005205-19 = "[s] \"Isso faz sentido!\""
2005205-20 = "Mufufu."
2005205-21 = "Então, sobre o que faremos a partir de agora..."
2005205-22 = "Eu vou sair de Red Winter e..."
2005205-23 = "Vou focar na experiência de viagem nos trens de D.U. para analisar as rotas e os horários!"
2005205-24 = "Sensei, por favor, me acompanhe como consultor de pesquisa~"
2005205-25 = "[s] \"Então é isso...\""
2005205-26 = "Opa? Isso faz parte do trabalho de educação dos alunos, sabia?"
2005205-27 = "Se você preencher o relatório de despesas corretamente, o orçamento deve ser aprovado."
2005205-28 = "Ah, se precisar de ajuda com \"esse tipo\" de documento, sinta-se à vontade para pedir. Estou sempre disposta a ajudar."
2005205-29 = "Mufufufu."
2005205-31 = "（……Deixando a papelada de lado,）"
2005205-32 = "（Senti que a pesquisa ferroviária era necessária, então comprei dois bilhetes diários.）"
2005205-35 = "Entendo, vamos começar pelo metrô, então..."
2005205-36 = "O metrô é conhecido por ter horários de chegada e partida bem estabelecidos, não é?"
2005205-37 = "Bem, isso também tem seu charme, então está ótimo."
2005205-41 = "Então, conto com você para o nosso passeio de trem de hoje~"
2005205-42 = "Mufufu."
2005205-49 = "……O balanço rítmico e o som dos trilhos. Graças ao isolamento acústico, o som é relativamente suave... é bem relaxante..."
2005205-50 = "Entendo perfeitamente o motivo de algumas pessoas sentirem sono ao andar de metrô...#"
2005205-51 = "……。"
2005205-52 = "Zzz..."
2005205-57 = "Nossa, que estação imponente. #nInstalações limpas e tantos passageiros por aqui...!"
2005205-58 = "Uau, as linhas de trem de alta velocidade que conectam todo o Kivotos também passam por aqui. 32 linhas só de trilhos... entendo, entendo."
2005205-59 = "Aqui vai uma pergunta, Sensei. Quando chegamos a uma estação principal, qual deve ser a nossa primeira atitude?"
2005205-60 = "[s3] \"Hmm... garantir que não estamos na linha errada?\"\n[s4] \"Verificar bem o horário?\""
2005205-63 = "Isso também é importante, mas..."
2005205-64 = "A resposta correta é o ponto alto de qualquer viagem de trem: escolher o bento da estação!"
2005205-65 = "[s] \"A-ah, entendi...\""
2005205-66 = "Sua reação foi bem fraca. Já ouviu dizer que é melhor comer do que só olhar?"
2005205-67 = "Se estivermos seguindo o horário, ainda temos 40 minutos até a partida."
2005205-68 = "Mufufu. Parece que teremos tempo de sobra para escolher um bento com calma. Vamos lá."
2005205-73 = "Oh, este é o famoso bento de polvo na panela de barro."
2005205-74 = "Enguia cozida, arroz com vegetais e tempurá de polvo..."
2005205-75 = "O detalhe é que o recipiente do bento é uma panela de barro de verdade."
2005205-76 = "Por causa disso, é um pouco pesado, mas não tem jeito."
2005205-77 = "Transformar um pote usado para a pesca de polvo em um produto comercial foi uma ideia realmente brilhante."
2005205-81 = "Uma marmita de gyudon?"
2005205-82 = "Pratos clássicos têm um charme que só pode ser apreciado naquele lugar específico."
2005205-83 = "Carne bovina temperada com shoyu, vegetais cozidos e ovo frito. O gengibre em conserva também é indispensável, não é?"
2005205-84 = "Parece que o gengibre passou por um tratamento para eliminar o odor, pensando em quem vai comer dentro do trem."
2005205-85 = "Não acha que esse tipo de atenção aos detalhes é o que mais contribui para as vendas?"
2005205-89 = "Olha, uma marmita em formato de trem!"
2005205-90 = "O recipiente da marmita tem o formato de um trem."
2005205-91 = "O conteúdo é uma seleção simples de onigiri, frango frito e salsicha, mas..."
2005205-92 = "Poder levar o recipiente como lembrança é só vantagem, não é mesmo?"
2005205-95 = "Este sorvete aqui também é famoso."
2005205-96 = "Por que ficou famoso? Bem..."
2005205-97 = "...dizem que é famoso por ser tão congelado que você não consegue comer por vários minutos."
2005205-98 = "Dizem até que existe uma lenda de que é tão duro que é impossível pegar com a colher, e que um martelo usado para tentar quebrá-lo acabou ricocheteando..."
2005205-101 = "O que acha? Não acha que as marmitas de estação são incríveis?"
2005205-102 = "[s] \"Sim! Vamos comprar todas!\""
2005205-103 = "Hã?"
2005205-104 = "Todas, você diz?"
2005205-105 = "Eu pensei que você tivesse escolhido todas por esse motivo..."
2005205-106 = "Não que você esteja errado, mas..."
2005205-107 = "Fico surpresa que tenha concordado tão prontamente..."
2005205-108 = "[s] \"A Yakumo está na idade de comer bastante, afinal.\""
2005205-109 = "..."
2005205-113 = "Vou devolver algumas, então."
2005205-114 = "Surpreso?"
2005205-115 = "Bem..."
2005205-116 = "Existe um limite para a falta de vergonha, sabe?"
2005205-117 = "Além disso, não conseguiríamos comer tudo se comprássemos tudo. #nSeria um desperdício se tivéssemos que jogar fora, não seria?"
2005205-139 = "[ns] \"Como foi a viagem de trem?\""
2005205-140 = "Bem... ainda me sinto como se estivesse sonhando, mas... uma coisa posso dizer com certeza —"
2005205-141 = "Red Winter precisa rever seus dormentes."
2005205-142 = "[s] \"Isso é importante, de fato.\""
2005205-143 = "Se os dormentes estiverem instáveis, a vibração e o ruído pioram muito, e"
2005205-144 = "acima de tudo, o trem não consegue atingir a velocidade adequada."
2005205-145 = "Mas, se formos trocar os dormentes, acabaríamos tendo que reformar os trilhos também..."
2005205-146 = "Considerando a vastidão de Red Winter..."
2005205-147 = "Uma ferrovia que atravesse de ponta a ponta do território..."
2005205-151 = "..."
2005205-152 = "Ah..."
2005205-153 = "Parece que será um projeto enorme, mas ainda assim, um dia, eu gostaria de ver uma linha ferroviária decente instalada em Red Winter."
2005205-154 = "[s5] \"Você se interessa por linhas ferroviárias, hein.\"\n[s6] \"Por que não tenta criar um horário de trens?\""
2005205-157 = "Hã, você quer dizer criar um cronograma? Dispenso, obrigado."
2005205-158 = "Se eu aceitasse algo assim, seria explorada por todo mundo, não seria?"
2005205-159 = "Eu não conseguiria mais cuidar do departamento editorial!"
2005205-160 = "Meu interesse é apenas na análise das rotas! De preferência, de forma passiva!"
2005205-161 = "Para começo de conversa, o motivo de eu ter me interessado foi porque começamos a transportar livros por trem."
2005205-162 = "[s] \"Entendi. Você sempre pensa no departamento editorial.\""
2005205-163 = "Sim. Não sou a chefe do departamento editorial à toa."
2005205-164 = "Mufufu."
