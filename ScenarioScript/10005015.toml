[translation]
10005015-4 = "Ufa..."
10005015-5 = "E os perseguidores?"
10005015-9 = "...Não."
10005015-10 = "Parece que estamos bem, conseguimos despistá-los. Eles nem chegaram a ver nossos rostos..."
10005015-11 = "Sensei, você está bem? Não se machucou em lugar nenhum?"
10005015-12 = "[s1] \"Sim, estou bem. Obrigado.\"\n[s2] \"Meu joelho dói, mas isso já é de costume...\""
10005015-13 = "Que bom. Fico aliviada."
10005015-14 = "Ah, ahaha... É um pouco difícil comentar sobre isso..."
10005015-15 = "Ah, falando nisso..."
10005015-16 = "Líder, quem é essa pessoa...?"
10005015-18 = "...Hm? Ah, essa aqui?"
10005015-23 = "...U-uhum...?"
10005015-24 = "O-onde é aqui... um quarto de hóspedes...? O que diabos..."
10005015-29 = "Hah! V-vocês...!"
10005015-38 = "Gah! Guh!? Ugh..."
10005015-44 = "Você teve o trabalho de trazê-la até aqui...?"
10005015-45 = "Não tinha outro jeito, ela viu nossos rostos claramente. Se a deixássemos solta, ela espalharia a informação, não acha?"
10005015-46 = "Por enquanto, vamos deixá-la dormindo aqui até as coisas se acalmarem."
10005015-48 = "De fato, não há outra opção."
10005015-49 = "Sendo assim, vamos amarrar as mãos e os pés dela nas costas..."
10005015-53 = "Vamos colocar uma venda também. Ela já sabe que estamos no quarto de hóspedes, mas não sabemos o que pode acontecer se ela tiver mais informações."
10005015-54 = "Seria um problema se ela acordasse e começasse a gritar, então cole algo na boca dela também."
10005015-58 = "[ns] \"...\""
10005015-60 = "[ns3] \"Isso, a aparência está um pouco...\"\n[ns4] \"Vocês não têm piedade... se possível, sejam um pouco mais gentis...\""
10005015-61 = "Hm? Tem algo de errado?"
10005015-62 = "Hm? Tem algo de errado?"
10005015-63 = "Isso é normal para mim. Nem cheguei a machucá-la, na verdade, estou sendo até gentil."
10005015-64 = "É verdade. Se o Sensei não estivesse aqui, a líder provavelmente teria amarrado os membros dela e a jogado no mar."
10005015-65 = "Cala a boca, Akane!"
10005015-66 = "Bom, de qualquer forma, parece que não teremos mais problemas."
10005015-67 = "Akane, qual o próximo passo?"
10005015-69 = "Bem, agora que estabelecemos uma base..."
10005015-70 = "Eu gostaria de seguir para assumir o controle da sala de sistemas, mas há algo que precisamos fazer antes disso."
10005015-71 = "O que você quer dizer?"
10005015-72 = "Antes da líder silenciá-la, ela disse várias coisas. Parece que este navio tem regras especiais."
10005015-73 = "Ela falou como se esse traje de coelhinha fosse o vestuário padrão daqui. Deixando o Sensei de lado, parece que precisamos nos trocar."
10005015-74 = "Ah, é verdade... ela disse algo assim mesmo."
10005015-75 = "Até agora, era fácil nos infiltrar em qualquer lugar usando uniformes de empregada, mas..."
10005015-76 = "Significa que aqui existem regras próprias, por mais peculiares que sejam."
10005015-77 = "Portanto, para nos movermos sem problemas, é melhor nos trocarmos."
10005015-79 = "Que trabalhão, hein...?"
10005015-80 = "Isso vai poupar esforço, com certeza. Sendo assim, aqui está. Acabei de pegar emprestado."
10005015-85 = "Acredito que o tamanho esteja correto. Eu sempre estive observando, afinal."
10005015-86 = "Como esperado da Akane, você é muito eficiente, não é?"
10005015-91 = "...?"
10005015-92 = "Considerando que isso foi tirado das garotas que nocauteamos agora há pouco..."
10005015-93 = "Pensando bem, como você sabia o tamanho... será que esse \"sempre estive observando\" que você disse..."
10005015-94 = "Fufu, bem, não se preocupe com os detalhes."
10005015-95 = "De qualquer forma, vamos experimentar?"
10005015-96 = "Ah, líder, venha por aqui. Eu vou ajudar você a vestir."
10005015-97 = "Hã?"
10005015-98 = "Não me trate como uma criança, entendeu?"
10005015-99 = "Ora, você sabe como vestir isso?"
10005015-100 = "Não faço ideia."
10005015-101 = "Fufu, então eu vou te ajudar."
10005015-102 = "Haa..."
10005015-105 = "Akane, eu ainda estou pensando naquilo de agora pouco... como você sabia o tamanho..."
10005015-109 = "Por favor, não se preocupe com detalhes."
10005015-110 = "Certo?"
10005015-111 = "..."
10005015-112 = "Bem, o mais importante agora é a missão..."
10005015-113 = "Ei, como é que se veste isso? E que formato é esse? Isso é mesmo uma roupa?"
10005015-114 = "Ora, ora, espere um pouco, por favor."
10005015-115 = "Muito bem. Depois de trocar de roupa, vamos para a sala de sistemas e, depois disso..."
10005015-116 = "...?"
10005015-117 = "Sensei, aconteceu alguma coisa? Tem algo que está te incomodando?"
10005015-118 = "[s5] \"É um pouco tarde para perguntar, mas...\"\n[s6] \"...Onde está a Asuna?\""
10005015-119 = "...?"
10005015-120 = "...?"
10005015-121 = "Ah, entendo... era isso. Pensando bem, esta é a primeira vez que o Sensei nos acompanha pessoalmente em uma operação, não é?"
10005015-122 = "Quanto à Asuna-senpai, não precisa se preocupar. É que ela é assim mesmo..."
10005015-123 = "E mesmo que a gente falasse, ela não é do tipo que escuta."
10005015-124 = "Exatamente. Poderíamos chamá-la de força de ataque independente... A Asuna-senpai é do tipo que funciona melhor quando tem liberdade para se mover."
10005015-125 = "Claro, passamos todas as instruções no briefing inicial, mas depois ela age por conta própria. É sempre assim."
10005015-126 = "Aliás, sobre isso..."
10005015-127 = "[s] \"...?\""
10005015-133 = "Como posso dizer..."
10005015-134 = "Não, quer dizer, não que me incomode se você continuar assim, mas..."
10005015-135 = "Se possível, bem... é que, sendo sincera, ser encarada desse jeito..."
10005015-136 = "Ah, mas também existe a opção de você se trocar comigo, não é?"
10005015-137 = "[s7] \"...Desculpe.\"\n[s8] Vira-se silenciosamente para trás."
10005015-142 = "(Assim, passou-se um tempo que pareceu longo, mas foi curto)"
