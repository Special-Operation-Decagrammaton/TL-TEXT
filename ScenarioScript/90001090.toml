[translation]
90001090-1 = "Episódio 9; Vitória Tática"
90001090-2 = "[ns] \"Conseguimos!!\""
90001090-6 = "Como está a atividade vulcânica?"
90001090-10 = "Confirmamos uma redução na erupção de lava. Os tremores também diminuíram."
90001090-11 = "A erupção se acalmou. #nE quanto a Chokmah...?"
90001090-15 = "I-isso é impossível...! #nMesmo que não estivesse em perfeitas condições, não acredito que a Chokmah tenha perdido...!"
90001090-16 = "Espere um pouco, o que é isso? #nA extração de recursos foi concluída...?"
90001090-17 = "Entendo. #nEntão ela estava tentando proteger os recursos que coletou..."
90001090-21 = "Poxa, se era isso, era só ter dito."
90001090-22 = "A-a Chokmah é um pouco tímida, sabe? #nHehe, hehehe."
90001090-23 = "Bem, então vamos fazer a Chokmah recuar. #nAfinal, o objetivo já foi alcançado."
90001090-29 = "[ns] \"A Chokmah...\""
90001090-30 = "Ela foi embora. #nParece que seguiu em direção à geleira, mas..."
90001090-31 = "Quem diria que ela mudaria de forma..."
90001090-32 = "Aqueles rastros eram literalmente pegadas de um monstro gigante."
90001090-33 = "[s] \"Exato! Era um monstro gigante transformável!!!\""
90001090-34 = "……Sensei, você não está animado demais?"
90001090-35 = "[s1] \"Mas é um monstro gigante transformável, né!?\"\n[s2] \"Não tem como alguém não gostar disso, né!?\""
90001090-42 = "Fufu... você entende bem, não é? #nBem, o problema é que você é o Sensei."
90001090-43 = "……Mas fico feliz que alguém tenha reconhecido o verdadeiro valor da Chokmah."
90001090-44 = "Não é hora de elogiar o inimigo..."
90001090-46 = "Aquele que nós derrotamos. #nEmbora isso não importe muito."
90001090-51 = "Ugh...! Pense o que quiser. #nMas não se engane! Nós só recuamos porque quisemos, entendeu?!"
90001090-52 = "Hiiin..."
90001090-53 = "N-não fique deprimida, Ein! #nEstá tudo bem, você se esforçou bastante!"
90001090-54 = "Vou deixar por isso mesmo por enquanto. Se vocês acham que venceram, aproveitem bem essa sensação."
90001090-55 = "Mas, por favor, entendam uma coisa: #numa vitória tática nem sempre significa uma vitória estratégica, certo?"
90001090-61 = "[ns] \"Ela foi embora...\""
90001090-62 = "Parece desapontado, Sensei."
90001090-63 = "……Eu queria ter obtido o máximo de informações possível."
90001090-64 = "Mesmo que fossem pistas triviais."
90001090-65 = "[s3] \"Pois é. Agora temos poucas pistas.\"\n[s4] \"Eu queria ter conversado mais sobre o monstro transformável...\""
90001090-66 = "Sim. Se o diálogo fosse possível, seria..."
90001090-67 = "Essa seria a melhor forma de obter informações sobre o inimigo."
90001090-68 = "Já que as coisas chegaram a esse ponto, não teremos que dar um jeito nós mesmos?"
90001090-69 = "Pelo menos superamos a crise imediata. #nAh, que calor... vou subir primeiro."
90001090-70 = "S-sim..."
90001090-71 = "É-é isso que te preocupa?"
90001090-72 = "Eu também sou uma empregada de combate transformável, Sensei."
90001090-73 = "Não deveria ter mais interesse em mim do que no monstro?"
90001090-74 = "(Será que a Toki sempre foi assim...?)"
90001090-79 = "Vamos voltar por enquanto. #nNós também não saímos ilesas."
90001090-80 = "Verdade. Precisamos de um tempo para nos recuperar."
90001090-81 = "É... assim como Geburah, não conseguimos derrotar a Chokmah completamente. #nEstou exausta de tantas batalhas..."
90001090-82 = "Eu ainda posso lutar. Sou uma empregada perfeita, afinal."
90001090-87 = "Primeiro, desative o Abi-Eshuh, Toki. #nNão é prudente forçar mais do que isso."
90001090-95 = "……Entendido, Rio-sama."
90001090-98 = "Pessoal, bom trabalho a todas."
90001090-99 = "Ah... sinto que voltei à vida... #nEi, Chefe, posso aumentar o ar-condicionado?"
90001090-100 = "Por favor, não faça isso. #nJá está frio o suficiente."
90001090-101 = "Por que não veste um casaco? Aquele amarelo."
90001090-102 = "Usar aquilo e deixar o ar-condicionado no máximo... isso não é o auge da ineficiência!?"
90001090-103 = "É mais ineficiente não conseguir usar suas habilidades por causa do calor."
90001090-104 = "Energia pode ser reposta e máquinas podem ser consertadas ou trocadas, mas o corpo humano não funciona assim."
90001090-106 = "Vou sair desta zona vulcânica na velocidade máxima. Assim, vocês dois encontrarão um meio-termo."
90001090-107 = "[s] \"Toki, muito bem.\""
90001090-108 = "De nada. Paz, paz."
90001090-109 = "Pa... paz...?"
90001090-110 = "Sim. A diretora Himari me ensinou."
90001090-111 = "Sim. A sua Toki está crescendo a cada dia."
90001090-112 = "Graças a mim, a mentora do Millennium, a genial, pura e frágil beldade."
90001090-113 = "Ah, não... a diretora ficou animada por causa da Rio."
90001090-115 = "N-não, eu..."
90001090-116 = "[s5] \"Himari está dizendo que 'está feliz por nos encontrarmos assim'.\"\n[s6] \"E 'obrigada por me ajudar até agora'.\""
90001090-119 = "Sensei, não diga coisas sem permissão."
90001090-120 = "...Bem, é um fato inegável que fui ajudada em várias coisas."
90001090-121 = "Obrigada, Rio. ...Graças a você, fui salva."
90001090-122 = "...Sim."
90001090-126 = "Estamos sobrevoando a zona de tundra agora. O fluxo de ar está estável, mas fiquem atentos a qualquer imprevisto."
90001090-127 = "Não vejo forças remanescentes do Decagrammaton."
90001090-128 = "...Falando nisso, eu coletei algumas amostras."
90001090-129 = "Quando você fez isso? Devo adicionar 'esquilo' aos atributos da diretora?"
90001090-130 = "Ora, é fofo, então está ótimo."
90001090-131 = "Falei uma besteira... desculpe, Sensei."
90001090-132 = "[s] \"Ah, sim...\""
90001090-133 = "Desta vez a Eimi está errada. Concordo. Embora eu não saiba exatamente do que estão falando."
90001090-134 = "(Se eu me meter, vou acabar me envolvendo em problemas...)"
90001090-140 = "[ns] \"E-ei, que amostras?\""
90001090-141 = "No sentido literal. Chokmah, as instalações de extração de recursos e os subordinados do Decagrammaton que pareciam protegê-las..."
90001090-142 = "Todas pareciam valiosas para análise."
90001090-143 = "Já que Chesed, a fábrica militar, não estava presente, eles operavam tantos soldados e instalações... É muito provável que haja novas descobertas."
90001090-144 = "Dito isso, precisamos pousar o helicóptero em algum lugar para analisar."
90001090-145 = "Já que vamos parar, vamos para um lugar fresco."
90001090-146 = "Um lugar fresco para a Eimi é um pouco..."
90001090-147 = "Mas, se continuarmos assim, o motor vai superaquecer."
90001090-148 = "...Não tem jeito. Desta vez, eu vou aguentar."
90001090-153 = "Não vestiu rápido demais?"
90001090-155 = "Próximo episódio: O Legado do Deus Sem Nome"
