[translation]
90001090-1 = "第9話;戦術的勝利"
90001090-2 = "[ns] \"やった！！\""
90001090-6 = "火山の活動状況は？"
90001090-10 = "溶岩噴出量の減少を確認。地鳴りも減っています。"
90001090-11 = "噴火は落ち着いたわ。#nコクマーは……？"
90001090-15 = "あ、ありえません……！#nいくら完全な状態じゃないとはいえ、コクマーちゃんが負けるなんて……！"
90001090-16 = "ちょっと待って、何これ？#n資源の採掘が完了してる……？"
90001090-17 = "なるほど。#n確保した資源を守ろうと……。"
90001090-21 = "ったく、それならそうって言ってよね。"
90001090-22 = "こ、コクマーちゃんは恥ずかしがり屋さんですからね。#nえへっ、えへへっ。"
90001090-23 = "んじゃ、コクマーを撤退させよっか。#n目的は達成したわけだし。"
90001090-29 = "[ns] \"コクマーが……。\""
90001090-30 = "行ってしまいましたね。#n氷河の方に向かったようですが……。"
90001090-31 = "まさか形態変化するだなんて……。"
90001090-32 = "あの痕跡は文字通り怪獣の足跡だったのですね。"
90001090-33 = "[s] \"そう！巨大変身怪獣だったんだよ！！！\""
90001090-34 = "……先生テンション高くない？"
90001090-35 = "[s1] \"だって、巨大変身怪獣だよ！？\"\n[s2] \"嫌いな人なんていないよ！？\""
90001090-42 = "ふふ……わかってますねぇ。#nまぁ、それが先生なのが問題ですが。"
90001090-43 = "……でも、コクマーちゃんの真価をわかってくれる方がいてよかったです。"
90001090-44 = "敵を褒めてる場合じゃないでしょうが……。"
90001090-46 = "私たちが倒したヤツですね。#nどうでもいいことですが。"
90001090-51 = "うっ……！勝手にそう思ってればいいじゃない。#nでも勘違いしないで！私たちは退いてあげただけなんだからね！"
90001090-52 = "ひぃん……。"
90001090-53 = "お、落ち込まないでアイン！#n大丈夫、アインは十分頑張ったよ！"
90001090-54 = "この辺りにしておいてあげます。勝ったと思っているのなら、その余韻に存分に浸っていてください。"
90001090-55 = "ですが、これだけはご理解ください。#n戦術の勝利が、必ずしも戦略の勝利を意味するわけではありませんからね？"
90001090-61 = "[ns] \"行ってしまったね……。\""
90001090-62 = "残念そうですね、先生。"
90001090-63 = "……少しでも多くの情報を得たかったのですが。"
90001090-64 = "些細な手がかりでも良いので。"
90001090-65 = "[s3] \"そうだね。今は手がかりが少なすぎる。\"\n[s4] \"変身怪獣の話、もっとしたかったのに……。\""
90001090-66 = "ええ。対話が可能ならそれこそ……。"
90001090-67 = "敵の情報を一番多く得られる方法なのですが。"
90001090-68 = "こうなった以上、自分たちで何とかするしかないんじゃない？"
90001090-69 = "とりあえず急場は凌いだわけだし。#nはあ、暑い……私、先に上がるね。"
90001090-70 = "え、ええ……。"
90001090-71 = "そ、そっちですか？"
90001090-72 = "私も変身戦闘メイドですよ、先生。"
90001090-73 = "変身怪獣より興味を持つべきでは？"
90001090-74 = "（トキって前からこうだったかしら……？）"
90001090-79 = "ひとまず帰りましょう。#n私たちも無傷ではないので。"
90001090-80 = "そうね。少し立て直す時間が必要だわ。"
90001090-81 = "うん……ゲブラもそうだけど、コクマーも完全に倒せたわけじゃないし。#n連戦でへとへと……。"
90001090-82 = "私はまだ戦えます。完璧なメイドですので。"
90001090-87 = "まずはアビ・エシュフを解除しなさい、トキ。#nこれ以上の無茶は禁物よ。"
90001090-95 = "……わかりました、リオ様。"
90001090-98 = "皆さん、お疲れ様でした。"
90001090-99 = "はあ……生き返る……。#nねえ部長、エアコンちょっと強くしていい？"
90001090-100 = "これ以上はやめてください。#nもう十分寒いです。"
90001090-101 = "防寒具着たら？あの黄色いやつ。"
90001090-102 = "あれを着てエアコンをフル稼働させるなんて……それこそ非効率の極みじゃないですか！？"
90001090-103 = "暑くて能力が発揮できないほうが非効率的だよ。"
90001090-104 = "エネルギーは補充できるし、機械は整備したり交換できるけど、#n人間の身体はそうはいかないからね。"
90001090-106 = "最高速度でこの火山地帯から脱出します。#nそうすれば、お二人の妥協点が見つかるでしょう。"
90001090-107 = "[s] \"トキ、ナイス。\""
90001090-108 = "どういたしまして。ピース、ピース。"
90001090-109 = "ぴ、ピース……？"
90001090-110 = "はい。ヒマリ部長に教えてもらいました。"
90001090-111 = "ええ。あなたのトキは日々成長しているのですよ。"
90001090-112 = "ミレニアムのメンターであり、天才清楚系病弱美少女であるこの私のおかげで。"
90001090-113 = "あーあ、リオ会長のせいで部長が元気になっちゃった。"
90001090-115 = "い、いえ、私は……。"
90001090-116 = "[s5] \"ヒマリは「こうして会えて嬉しいし」。\"\n[s6] \"「今まで手伝ってくれてありがとう」って言ってるよ。\""
90001090-119 = "先生、勝手なことを言わないでください。"
90001090-120 = "……まあ、色々と助けられたのは紛れもない事実ですが。"
90001090-121 = "ありがとう、リオ。#n……おかげで、助かりました。"
90001090-122 = "……ええ。"
90001090-126 = "現在、凍原地帯の上空を飛行しています。#n気流は安定していますが、万が一の事態に注意してください。"
90001090-127 = "デカグラマトンの残存兵力は見当たらないわね。"
90001090-128 = "……そういえば、サンプルを少し採取しておいたんです。"
90001090-129 = "いつの間に。#n部長の属性にリスを追加しておいたほうがいい？"
90001090-130 = "あら、可愛くていいですね。"
90001090-131 = "変なこと言っちゃった……ごめんね、先生。"
90001090-132 = "[s] \"う、うん……。\""
90001090-133 = "今回はエイミが悪いですね。同意します。#n何のことかよく分かっていませんが。"
90001090-134 = "（口を挟んだら厄介事に巻き込まれそうね……）"
90001090-140 = "[ns] \"え、えっと……サンプルって？\""
90001090-141 = "文字通りの意味ですよ。#nコクマーと資源採取施設、それを守っているように見えたデカグラマトンの眷属……。"
90001090-142 = "どれも分析する価値が高そうでしたので。"
90001090-143 = "軍需工場であるケセドが不在の中、これだけの兵と施設を運用していたのですから。#n新たな発見がある可能性が高いです。"
90001090-144 = "とはいえ、分析するにはヘリをどこかに着陸させる必要がありますね。"
90001090-145 = "どうせ行くなら涼しいとこにしよう。"
90001090-146 = "エイミにとっての涼しい場所はちょっと……。"
90001090-147 = "でも、このままだとエンジンがオーバーヒートしちゃうよ。"
90001090-148 = "……仕方ありませんね。#n今回は私が我慢します。"
90001090-153 = "着るの早すぎない？"
90001090-155 = "次回;名もなき神の遺産"
