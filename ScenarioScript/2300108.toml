[translation]
2300108-1 = "給食部部長は頑張りたい！"
2300108-2 = "（今日はゲヘナの学食で、フウカを手伝う日だ）"
2300108-3 = "（そういうわけで、学生食堂に着いた頃……）"
2300108-4 = "今日また生徒たちからクレームを受けたんですよ！"
2300108-5 = "[s] \"フ、フウカ？\""
2300108-7 = "（これは……みりん？）"
2300108-8 = "[s] \"フウカ、もしかしてこれ味見した？\""
2300108-9 = "はい！少しだけ味見しました！仕方ないじゃないですか！料理を作るためなんですから……！"
2300108-10 = "[s] \"みりんって、確かアルコールが……。\""
2300108-11 = "今大事なのはみりんではありません。先生！"
2300108-12 = "私はみんなに美味しいごはんを食べてほしいから、いつも努力して、頑張ってるのに……！"
2300108-13 = "[s] \"う、うん。フウカが努力してるのは、私も良く知ってるよ。\""
2300108-14 = "もちろん給食を一気に調理して、それで料理のクオリティーが落ちることがあって、不満なのはよく分かっています。"
2300108-15 = "それに、みんなが私の努力を分かってくれないのも……。"
2300108-16 = "心は痛いですけど、同時に仕方ないとも思ってるから、理解ができないってわけでもないんですよ。"
2300108-17 = "だ！と！し！て！も！"
2300108-18 = "いくら何でも、黄色いソースだから多分合ってるよね？って勝手にマスタードとからしを間違えておいて、"
2300108-19 = "それで料理が辛いって私にクレームを入れて、何をどうしろって！？"
2300108-20 = "そんなに不満ばかり言うなら自分たちで作ったら！？"
2300108-21 = "給食部の部長の苦労は苦労じゃないとでも言うつもり！！？ねえ！？"
2300108-22 = "[s] \"ご、ご苦労さま。\""
2300108-23 = "ん？……待ってください。"
2300108-24 = "……いっそのこと、料理に入れるマスタードを先んじて全部からしに変えてしまえば、かえってクレームを受けることもないのでは？"
2300108-25 = "ちょっとした考え方の転換で、ゲヘナの学生食堂にも変化の兆しが……？"
2300108-26 = "[s] \"あ、諦めないで！\""
2300108-27 = "冗談です、そんなことはしませんよ。給食部として食べ物に対する怠惰は罪なので。"
2300108-28 = "[s] \"さすがフウカ！料理に対して真摯！\""
2300108-29 = "あ、でも給食部のお仕事は、辛い事ばかりではありません。"
2300108-30 = "私が作った料理を美味しいって言ってくれた時はものすごく嬉しいですし、やりがいも感じますし、何より……。"
2300108-31 = "こうやって先生が来て、手伝ってくださるだけで、胸の片隅がきゅーって温かくなって。"
2300108-32 = "えへ、えへへ……。"
2300108-35 = "[s] \"フウカ？\""
2300108-36 = "……。"
2300108-37 = "[s] \"ふ、フウカたん……？\""
2300108-38 = "くうぅ……。"
2300108-39 = "（その時ふと、みりんの裏側のラベルが目に入った）"
2300108-40 = "（アルコール分 0.00003%）"
2300108-42 = "（その後、これからは絶対フウカの近くにアルコールを置かないようにしようと決心した）"
