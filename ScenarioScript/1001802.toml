[translation]
1001802-1 = "O espaço de cura fica dentro do armário"
1001802-5 = "Sala do Clube de Desenvolvimento de Jogos"
1001802-7 = "Vim porque ouvi dizer que estavam criando um novo jogo no Clube de Desenvolvimento de Jogos, mas não havia ninguém na sala."
1001802-8 = "Vou esperar tranquilamente na sala até que os membros cheguem."
1001802-9 = "[s] Tiro o casaco e abro o armário."
1001802-13 = "Ai, aiii!?"
1001802-14 = "V-você me assustou...! P-sensei, por favor, bata antes de abrir o armário...!"
1001802-15 = "......Desculpe. Pensando bem, acho que acabei de dizer algo um pouco estranho..."
1001802-16 = "A-aliás, por que você está aqui? #nVocê precisa de algo de mim?"
1001802-17 = "......Ah, você veio ver o novo jogo do Clube de Desenvolvimento de Jogos?"
1001802-18 = "E-entendo... Sinto muito, esse jogo está no notebook que a Momoi levou, então não posso te mostrar agora..."
1001802-19 = "Por favor, espere um pouco até que todos voltem."
1001802-20 = "[s] \"Yuzu, por que você está sempre dentro do armário?\""
1001802-21 = "Isso é porque..."
1001802-22 = "Se eu ficar aqui dentro, ninguém me nota."
1001802-23 = "Se eu ficar na sala normalmente, as pessoas aparecem com frequência para conversar..."
1001802-24 = "Especialmente a Yuuka-senpai do Seminário, que vive vindo com uma cara assustadora me obrigar a participar das reuniões de clubes... Quando ela entra no meu campo de visão, eu sinto vontade de fugir..."
1001802-25 = "M-mas, se eu estiver aqui dentro, ninguém consegue me encontrar."
1001802-26 = "Enquanto estou aqui, este armário é o meu pequeno espaço de cura. Ehehe..."
1001802-27 = "[s] \"Não é apertado e sufocante dentro desse armário?\""
1001802-28 = "Não, na verdade, ele se ajusta perfeitamente ao meu corpo, é muito bom."
1001802-29 = "Além disso, em dias quentes como hoje, as paredes de metal são frias e refrescantes."
1001802-30 = "Quando encosto meu corpo na parede e escuto os sons que vêm de fora... dá até vontade de ficar aqui para sempre..."
1001802-31 = "[s] \"Posso entrar aí com você?\""
1001802-32 = "S-sim!?"
1001802-33 = "M-mas este armário é para uma pessoa só...!?"
1001802-34 = "C-claro, não está escrito que há um limite oficial de pessoas no armário, mas... não ficaria um pouco apertado para dois?"
1001802-35 = "Ficaria ainda mais apertado e, por isso, talvez parecesse mais aconchegante, você diz?"
1001802-36 = "Hmm... S-se o sensei diz isso..."
1001802-40 = "E-espere, sensei! Não entre à força...!"
1001802-41 = "Uuu, está perto demais... a temperatura do corpo... a respiração... uuu..."
1001802-42 = "N-não dá, não serve...!"
1001802-46 = "É impossível! Duas pessoas em um armário é impossível!!"
1001802-47 = "Hã? Então, em vez de mim, o sensei quer ficar sozinho dentro do armário?"
1001802-48 = "N-não pode! Este é o meu espaço de cura, só meu!"
1001802-50 = "Depois disso, passei o tempo travando uma batalha pelo armário com a Yuzu até que os outros membros voltassem..."
