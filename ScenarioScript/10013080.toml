[translation]
10013080-1 = "第8話;ヘルメット団！最後の決戦！"
10013080-6 = "ここですね！"
10013080-7 = "やっと着いたー！ここが「ロスト・パラダイス・リゾート」の中で最大勢力を誇るというヘルメット団のリゾートね！"
10013080-8 = "ですが、これは……"
10013080-9 = "今まで見たリゾートと、雰囲気が違う気がします……！"
10013080-13 = "[ns] \"人が全然いないね……？\""
10013080-15 = "あ……"
10013080-16 = "[s] \"どうしたの、チセ？\""
10013080-17 = "キラキラテントウムシさん。"
10013080-18 = "はい？テントウムシ……？"
10013080-24 = "だぁぁれが赤と黒が素敵に調和したテントウムシだ！！！！"
10013080-25 = "[s] \"聞こえてたの！？\""
10013080-27 = "あなたが噂のヘルメット団幹部？"
10013080-28 = "まるで待ち構えていたかのように、私たちを包囲したということは……"
10013080-29 = "い、イズナたち、敵の術中にはまっていたということですか！？"
10013080-31 = "ええ、そうよ！ここは最初からあんたらの墓場として目星をつけてた場所。#nそこに自ら足を運んでくるなんて酔狂なことね！"
10013080-32 = "[s] \"でも、どうして私たちがここに来ることを知ってたの？\""
10013080-34 = "顧客に対するアフターケアは確実に責任を持つ。"
10013080-35 = "それがカイザーコーポレーションの社訓だからだ。"
10013080-41 = "[ns] \"薄々予感はしていたけれど……。\""
10013080-42 = "久しぶりだな、シャーレの先生。"
10013080-43 = "[s1] \"カイザー理事……！\"\n[s2] \"結構満喫してない！？\""
10013080-46 = "あっ、あなたは！オクトパスバンクで会った職員さん！"
10013080-47 = "またお会いしましたね！？"
10013080-48 = "[s] \"しかも担当者だったの！？\""
10013080-49 = "そう、この「ロスト・パラダイス・リゾート」に良い商品があると唆し、そちらのお嬢さん方に取引を提案したのはこの私だ。"
10013080-50 = "以前、貴様とアビドスの連中に関わってしまったことで大損害を受けた後、理事の座を辞任させられ――"
10013080-51 = "今では「オクトパスバンク」の営業職員だ！！"
10013080-52 = "[s] \"なるほど、そんな経緯が……じゃなくて！\""
10013080-53 = "しかし……ここで一体何をしているんだ？"
10013080-58 = "今はリゾート運営に尽力せねばならん時だろう？"
10013080-59 = "何って……そんなの、あんたが勝手にばら撒いた契約書を回収してるに決まってるじゃない！"
10013080-60 = "そうです！私たちに使用権を売りつけておきながら、まさかこんな詐欺まがいなことを企んでいただなんて！"
10013080-61 = "はて？私はただ、君たちが銀行を訪れた際、良い商品があると提案しただけだが。"
10013080-62 = "あの時は強要もしなければ強制もしなかった。#n金を稼ぎたい一心でその商品を買ったのは君たちじゃないか。"
10013080-63 = "それは……！"
10013080-64 = "しかし困るな。勝手に他のリゾートに赴き、使用権を回収しようとするなど……"
10013080-65 = "そのような越権行為は見過ごすわけにはいかない。だから、アフターケアサービスのためにここまで出向いてきたのだ。"
10013080-66 = "ボディーガードを同伴させてな。"
10013080-68 = "ケッ！"
10013080-69 = "……屁理屈ですね。先にシズコちゃんたちを騙したのは、あなたでしょうに……"
10013080-71 = "[ns] \"最初から百夜堂を狙っていたんでしょう？\""
10013080-72 = "お祭り運営委員会は良い商品になるからな。#n百鬼夜行連合学院で祭りを開催できる権限、それを放っておくなどもったいない。"
10013080-76 = "故に、今回の一件で百夜堂の名誉を失墜させる。"
10013080-82 = "そのために様々な連中をこの群島に呼び寄せたのだ。"
10013080-88 = "そして百鬼夜行の名が傷ついたところで、満身創痍となった百夜堂を買収する。"
10013080-89 = "――どうだ、完璧な計画だろう？"
10013080-91 = "……しかし、その計画もまた貴様に邪魔されてしまったな。シャーレの先生。"
10013080-92 = "[s] \"邪魔された？\""
10013080-93 = "今回はどんな手を使ったんだ？"
10013080-94 = "百夜堂の支えにでもなったか？#n諦めずに戦えと、そんな甘い言葉でも囁いたのか？"
10013080-95 = "無意味だな。そんなものより、もっと現実的な提案を私がしてやろう。"
10013080-96 = "……どういうこと？"
10013080-97 = "契約を結ぼうじゃあないか。私が貴様らに投資してやる。"
10013080-98 = "と、投資を？#n私たちにオクトパスバンク……いや、カイザーコーポレーションが、ですか？"
10013080-99 = "ああ。ここまで辿り着いたのだ。腕の立つ連中には違いない。"
10013080-100 = "ここに来るまでの間、様々な者たちとフランチャイズ契約を結んだのだろう？#nならば、我々もそこに手を貸してやろうじゃないか。"
10013080-101 = "もちろん、これまでお祭り運営委員会の名で契約書を配布してしまったせいで、多少名前に傷はついているかもしれんが。"
10013080-102 = "しかしそれも全て金で解決できる問題だ。"
10013080-103 = "さあ、我々が投資してやろう。"
10013080-104 = "より多くの金を稼げるチャンスだ。今度こそちゃんとした契約関係をもって――"
10013080-105 = "お祭り運営委員会がここ、「ロスト・パラダイス・リゾート」を運営し莫大な利益を得るのだ。"
10013080-106 = "……余程のバカでもない限り、蹴ることのない話だと思うがね？"
10013080-111 = "社長……"
10013080-112 = "シズコちゃん……"
10013080-113 = "…………"
10013080-114 = "たしかに、すごく魅力的な提案ですね。"
10013080-115 = "シズコ殿……"
10013080-116 = "……でも。"
10013080-120 = "断ります。"
10013080-121 = "なんだと……？本気か？"
10013080-124 = "ニヤがね、こう言ってたんです。"
10013080-125 = "カイザーコーポレーションに騙されたのなら、今すぐ帰ってこいって。"
10013080-126 = "向こうが汚い手を使うなら、こっちもそうすればいいって。#nだから、そこに残る必要はない、って。"
10013080-128 = "でも……私は残ることにした。"
10013080-129 = "もちろん、百鬼夜行の――百夜堂の「ブランド価値」を守りたいからってのもあるんですけど……"
10013080-130 = "それ以上に……"
10013080-131 = "お祭りをバカにするやつらを、私は見過ごす事なんてできない！#nだからここにいるんです！"
10013080-135 = "戯言を……"
10013080-136 = "温泉開発部と契約したのは、"
10013080-142 = "純粋に自分たちが見つけたいものに向かって、"
10013080-143 = "努力していたからだし――"
10013080-149 = "ムシクイーン大会の子たちと契約したのは、面白いと思うから開く……"
10013080-150 = "そんなお祭りの余興みたいな理由だったから。"
10013080-155 = "でも、あんたたちは違う。ニャン天丸と同じ……"
10013080-156 = "こうしている間にも、あちこちの島で「リゾート狩り」が行われていて、多くのお客さんが被害を受けているはず……"
10013080-158 = "一番楽しくあるはずの夏の休暇が――あんたの私利私欲のせいで壊されてるのよ！"
10013080-162 = "そんなの絶対に許せない！"
10013080-163 = "この状況を作ったカイザーコーポレーションも同罪よ。だから――"
10013080-164 = "私の答えはこう！"
10013080-165 = "論外！完全にお断り！絶対NO！"
10013080-167 = "社長……！"
10013080-168 = "シズコちゃん！"
10013080-170 = "……そんなくだらない理由でチャンスを蹴るだと？#nそれがどれほど愚かな選択か、理解しているのか？"
10013080-171 = "[s] \"愚かな選択じゃない。シズコが決めたことだ。\""
10013080-172 = "貴様……"
10013080-173 = "[s3] \"私は最初から何もしてないし、全部シズコが決めたことだ。\"\n[s4] \"生徒を信じ、ついて行っているに過ぎないよ。\""
10013080-176 = "バカな……！そんな信念が一体何になるというのだ！"
10013080-177 = "……まあいい。ここで怒ったところで滑稽なだけだしな。"
10013080-178 = "ならば、こちらもヘルメット団の名をもって「リゾート狩り」をするだけだ。"
10013080-179 = "ラブ、全員集めろ！"
10013080-180 = "あはは！その言葉を待ってたよ！"
10013080-195 = "全員集合！"
10013080-201 = "あわわわわ！もも、ものすごい数ですよ！？どうしましょう、主殿！？"
10013080-202 = "みんなで、お祭りするの？"
10013080-203 = "まあ、お祭りと言えばお祭りなんですけど……どうします？社長。"
10013080-205 = "と、とにかく後退しながら逃げ道を……！"
10013080-206 = "はっ、まさか逃げられると思ってんの？ほら、後ろも塞いで！"
10013080-210 = "[ns] \"まずい！囲まれ……た？\""
10013080-212 = "今回は腕の立つメンバーを選抜したの！さあ、その実力を見せつけてやりな！"
10013080-214 = "よ～し、作戦成功。"
10013080-216 = "これ、成功したの！？ていうか、本当にこれでいいの！？"
10013080-218 = "それだけすごい作戦だったってことですね～☆"
10013080-223 = "ん。「ヘルメット団に偽装して疑われずに潜り込む作戦」大成功。"
10013080-224 = "[s] \"………。\""
10013080-225 = "………………えっ？えええええ！？"
10013080-226 = "……ちょっと、何してんの？#n早くあいつらの退路を塞ぎなって！"
10013080-227 = "[s] \"いや、その……。\""
10013080-228 = "……待て、ラブ。"
10013080-229 = "貴様が言っていた腕の立つ新入りというのは、まさか……"
10013080-230 = "新入りがどうかした？"
10013080-237 = "あ、あんたは……！あの時の！"
10013080-242 = "あれ？気のせい？"
10013080-243 = "と、とにかく！戦闘準備！"
10013080-248 = "うへぇ～。"
10013080-249 = "え……ええええええ！？あ、あんたは！！"
10013080-250 = "…………。"
10013080-251 = "……あらあら。"
10013080-252 = "あ、先生。蝶々……"
10013080-253 = "あ、アビドスだと……！何故貴様らがここに！？#nラブ、これはどういうことだ！？"
10013080-254 = "ちょ、ちょっと待って！うちはただ、ちょっと変だけど、すっごくクールで個性的なヘルメットをかぶったやつらだと思って！！"
10013080-255 = "たしかに、先生の言う通り、すごいやり方ですね……。"
10013080-256 = "[s] \"さすがに私もこれは予想できなかったなー。\""
10013080-257 = "私らも、あんた達が仕組んだリゾート使用権が当たったから来たのよ！"
10013080-258 = "今回のことは全て……カイザー理事！あなたの仕業だったんですね！"
10013080-259 = "いや、そんなはずは……#n私はあくまで騒動を起こす問題児のみを選んで使用権を……。"
10013080-261 = "待て。今、「当たった」と言ったな。それはどういうことだ？"
10013080-262 = "[s] \"そういえば、セリカがどこで当てたのか聞いてなかったね。\""
10013080-263 = "えっ？どこって……"
10013080-264 = "柴関ラーメン屋で大将がやってたくじで、だけど……。"
10013080-268 = "[ns] \"そういうことだったんだ。\""
10013080-269 = "まあ、そのおかげでみんなここに集まれたんだけどねー。"
10013080-271 = "うん！すっごく心強いよ！"
10013080-276 = "[ns] \"それじゃあ、百鬼夜行とアビドスの共同作戦、スタート！\""
