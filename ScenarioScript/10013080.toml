[translation]
10013080-1 = "Episódio 8: Grupo do Capacete! A Batalha Final!"
10013080-6 = "É aqui!"
10013080-7 = "Finalmente chegamos! Então este é o resort do Grupo do Capacete, que ostenta o maior poder dentro do \"Lost Paradise Resort\"!"
10013080-8 = "Mas, isto é..."
10013080-9 = "Sinto que a atmosfera é diferente dos resorts que vimos até agora...!"
10013080-13 = "[ns] \"Não tem ninguém aqui...?\""
10013080-15 = "Ah..."
10013080-16 = "[s] \"O que houve, Chise?\""
10013080-17 = "Joaninha brilhante."
10013080-18 = "Sim? Joaninha...?"
10013080-24 = "QUEM É A JOANINHA COM UMA HARMONIA PERFEITA DE VERMELHO E PRETO!!!!"
10013080-25 = "[s] \"Ela ouviu!?\""
10013080-27 = "Você é a tal executiva do Grupo do Capacete de quem tanto falam?"
10013080-28 = "Cercarem-nos como se estivessem nos esperando significa que..."
10013080-29 = "I-Izuna e as outras caíram na armadilha do inimigo!?"
10013080-31 = "Isso mesmo! Este lugar foi escolhido desde o início para ser o túmulo de vocês. #nQue excentricidade vir até aqui por conta própria!"
10013080-32 = "[s] \"Mas como você sabia que viríamos para cá?\""
10013080-34 = "Nós garantimos a responsabilidade pelo pós-atendimento aos nossos clientes."
10013080-35 = "Esse é o lema da Kaiser Corporation."
10013080-41 = "[ns] \"Eu já tinha um pressentimento...\""
10013080-42 = "Quanto tempo, Sensei do Schale."
10013080-43 = "[s1] \"Diretor da Kaiser...!\"\n[s2] \"Você não está aproveitando demais!?\""
10013080-46 = "Ah, é você! O funcionário que conhecemos no Octopus Bank!"
10013080-47 = "Nos encontramos de novo!?"
10013080-48 = "[s] \"E você era o responsável!?\""
10013080-49 = "Sim, fui eu quem instigou aquelas moças a fazerem o negócio, sugerindo que havia um bom produto neste \"Lost Paradise Resort\"."
10013080-50 = "Depois de sofrer um prejuízo enorme por me envolver com você e o pessoal de Abydos, fui forçado a renunciar ao cargo de diretor..."
10013080-51 = "E agora sou um funcionário de vendas do \"Octopus Bank\"!!"
10013080-52 = "[s] \"Entendo, então foi isso... não, espera!\""
10013080-53 = "Mas... o que você está fazendo aqui?"
10013080-58 = "Não é hora de se dedicar à administração do resort?"
10013080-59 = "Como assim... é óbvio que estamos aqui para recuperar os contratos que você espalhou por aí!"
10013080-60 = "Exatamente! Nos venderam o direito de uso e, no fim, estavam planejando esse tipo de fraude!"
10013080-61 = "Ora? Eu apenas sugeri que havia um bom produto quando vocês visitaram o banco."
10013080-62 = "Naquela época, não forcei nem obriguei ninguém. #nForam vocês que compraram o produto com o desejo de ganhar dinheiro."
10013080-63 = "Isso é..."
10013080-64 = "Mas é problemático. Ir a outros resorts por conta própria para tentar recuperar os direitos de uso..."
10013080-65 = "Não posso ignorar tal abuso de autoridade. Por isso, vim até aqui para prestar um serviço de pós-atendimento."
10013080-66 = "Acompanhado de guarda-costas, é claro."
10013080-68 = "Tsc!"
10013080-69 = "...Que desculpa esfarrapada. Foi você quem enganou a Shizuko e as outras primeiro..."
10013080-71 = "[ns] \"Você estava de olho na Hyakkiyako desde o início, não estava?\""
10013080-72 = "O Comitê de Administração do Festival é um bom produto. #nÉ um desperdício deixar de lado a autoridade para realizar festivais na Academia Hyakkiyako."
10013080-76 = "Portanto, com este incidente, o nome da Hyakkiyako será manchado."
10013080-82 = "Para isso, atraímos várias pessoas para este arquipélago."
10013080-88 = "E quando o nome da Hyakkiyako estiver arruinado, compraremos a Hyakkiyako, que estará em frangalhos."
10013080-89 = "— O que acha? Um plano perfeito, não é?"
10013080-91 = "...Mas esse plano também foi arruinado por você, Sensei do Schale."
10013080-92 = "[s] \"Arruinado?\""
10013080-93 = "Que tipo de truque você usou desta vez?"
10013080-94 = "Será que serviu de apoio para a Hyakkiyako?#nSussurrou palavras doces como 'não desista e lute'?"
10013080-95 = "Que sem sentido. Em vez disso, farei uma proposta muito mais realista."
10013080-96 = "……O que quer dizer com isso?"
10013080-97 = "Vamos fechar um contrato. Eu investirei em vocês."
10013080-98 = "In-investir?#nA Octopus Bank... não, a Kaiser Corporation, em nós?"
10013080-99 = "Sim. Vocês chegaram até aqui. Devem ser um grupo competente."
10013080-100 = "Vocês fecharam contratos de franquia com várias pessoas até chegar aqui, não foi?#nSendo assim, por que não nos deixam ajudar também?"
10013080-101 = "Claro, como distribuíram contratos em nome do Comitê Organizador do Festival, talvez a reputação esteja um pouco manchada."
10013080-102 = "Mas isso é um problema que pode ser resolvido com dinheiro."
10013080-103 = "Vamos lá, nós investiremos em vocês."
10013080-104 = "É uma chance de ganhar muito mais dinheiro. Desta vez, com uma relação contratual adequada――"
10013080-105 = "O Comitê Organizador do Festival administrará este 'Lost Paradise Resort' e obterá lucros imensos."
10013080-106 = "……A menos que sejam idiotas, acho que não recusariam uma oferta dessas, não é?"
10013080-111 = "Presidente……"
10013080-112 = "Shizuko-chan……"
10013080-113 = "…………"
10013080-114 = "De fato, é uma proposta muito atraente."
10013080-115 = "Srta. Shizuko……"
10013080-116 = "……Mas."
10013080-120 = "Eu recuso."
10013080-121 = "O que disse……? Está falando sério?"
10013080-124 = "A Niya me disse uma coisa."
10013080-125 = "Que se eu fosse enganada pela Kaiser Corporation, era para voltar imediatamente."
10013080-126 = "Que se eles usam métodos sujos, nós também podemos usar.#nPor isso, não há necessidade de ficar aí."
10013080-128 = "Mas…… eu decidi ficar."
10013080-129 = "Claro, também é porque quero proteger o 'valor da marca' da Hyakkiyako―― da Hyakkiyado……"
10013080-130 = "Mas, acima de tudo……"
10013080-131 = "Eu não posso ignorar quem faz pouco caso do festival!#nÉ por isso que estou aqui!"
10013080-135 = "Que bobagem……"
10013080-136 = "Eu fechei contrato com o Departamento de Desenvolvimento de Fontes Termais porque,"
10013080-142 = "eles estavam se esforçando puramente,"
10013080-143 = "em busca daquilo que queriam encontrar――"
10013080-149 = "E fechei contrato com o pessoal do torneio Mushiking porque achei divertido realizar o evento……"
10013080-150 = "Foi por motivos simples como esse, típicos de um festival."
10013080-155 = "Mas vocês são diferentes. São iguais ao Nyan-Tenmaru……"
10013080-156 = "Enquanto estamos aqui, o 'saque aos resorts' está acontecendo em várias ilhas, e muitos clientes devem estar sendo prejudicados……"
10013080-158 = "As férias de verão, que deveriam ser o momento mais divertido, estão sendo destruídas por causa da sua ganância!"
10013080-162 = "Eu nunca vou perdoar isso!"
10013080-163 = "A Kaiser Corporation, que criou essa situação, é igualmente culpada. Por isso――"
10013080-164 = "Minha resposta é esta!"
10013080-165 = "Fora de questão! Recuso completamente! Absolutamente NÃO!"
10013080-167 = "Presidente……!"
10013080-168 = "Shizuko-chan!"
10013080-170 = "……Recusar uma chance por um motivo tão ridículo?#nVocê entende o quão estúpida é essa escolha?"
10013080-171 = "[s] \"Não é uma escolha estúpida. Foi a Shizuko quem decidiu.\""
10013080-172 = "Você……"
10013080-173 = "[s3] \"Eu não fiz nada desde o início, tudo foi decisão da Shizuko.\"\n[s4] \"Eu apenas confio na minha aluna e a acompanho.\""
10013080-176 = "Que tolice……! O que uma convicção dessas vai trazer?!"
10013080-177 = "……Bem, tanto faz. Não adianta ficar com raiva aqui, seria apenas ridículo."
10013080-178 = "Sendo assim, nós também faremos o 'saque aos resorts' em nome do Grupo Capacete."
10013080-179 = "Love, reúna todo mundo!"
10013080-180 = "Ahaha! Eu estava esperando por essas palavras!"
10013080-195 = "Todos reunidos!"
10013080-201 = "Awawawawa! Momo, tem uma quantidade absurda de gente!? O que faremos, Mestre!?"
10013080-202 = "Todo mundo vai fazer uma festa?"
10013080-203 = "Bem, se você quer chamar de festa... mas o que faremos, Presidente?"
10013080-205 = "De, de qualquer forma, vamos recuar e encontrar uma rota de fuga...!"
10013080-206 = "Hah, você acha mesmo que vai conseguir fugir? Ei, bloqueiem a retaguarda também!"
10013080-210 = "[ns] \"Droga! Fomos... cercados?\""
10013080-212 = "Desta vez, eu selecionei membros habilidosos! Vamos, mostrem a eles do que são capazes!"
10013080-214 = "Isso, missão cumprida."
10013080-216 = "Isso foi um sucesso!? Quer dizer, isso realmente conta como sucesso!?"
10013080-218 = "Isso só mostra o quão incrível foi o plano, não é?☆"
10013080-223 = "Hmm. \"Plano de se infiltrar disfarçados como a Gangue dos Capacetes sem levantar suspeitas\" foi um grande sucesso."
10013080-224 = "[s] \"………。\""
10013080-225 = "………………Eh? Eeeeeeeh!?"
10013080-226 = "……Ei, o que você está fazendo? #nDepressa, bloqueie a rota de fuga deles!"
10013080-227 = "[s] \"Não, é que...\""
10013080-228 = "……Espere, Love."
10013080-229 = "Os novatos habilidosos que você mencionou, não me diga que..."
10013080-230 = "O que tem os novatos?"
10013080-237 = "Vo-você é...! Aquele de lá!"
10013080-242 = "Ué? Foi impressão minha?"
10013080-243 = "De, de qualquer forma! Preparem-se para o combate!"
10013080-248 = "Uhee~."
10013080-249 = "Eh... eeeeeeeh!? Vo-você é!!"
10013080-250 = "…………。"
10013080-251 = "……Ora, ora."
10013080-252 = "Ah, Sensei. Borboletas..."
10013080-253 = "Ah, Abydos!? Por que vocês estão aqui!? #nLove, o que significa isso!?"
10013080-254 = "Es-espera um pouco! Eu só achei que eles eram um pessoal usando capacetes bem estranhos, mas muito legais e únicos!!"
10013080-255 = "Realmente, como o Sensei disse, é um método impressionante..."
10013080-256 = "[s] \"Nem eu esperava por essa, para ser sincero.\""
10013080-257 = "Nós também viemos porque ganhamos o direito de uso do resort que vocês armaram!"
10013080-258 = "Tudo isso foi... Diretor Kaiser! Foi obra sua, não foi!"
10013080-259 = "Não, isso não pode ser... #nEu apenas selecionei os encrenqueiros que causam confusão para dar o direito de uso..."
10013080-261 = "Espere. Você disse que eles \"ganharam\". O que isso significa?"
10013080-262 = "[s] \"Pensando bem, eu não perguntei onde a Serika tinha ganhado isso.\""
10013080-263 = "Eh? Onde..."
10013080-264 = "Foi na rifa que o dono do Ramen Shibaseki estava fazendo, mas..."
10013080-268 = "[ns] \"Então era isso.\""
10013080-269 = "Bem, graças a isso, todo mundo conseguiu se reunir aqui."
10013080-271 = "Sim! É muito reconfortante!"
10013080-276 = "[ns] \"Então, operação conjunta entre Hyakkiyako e Abydos, começar!\""
