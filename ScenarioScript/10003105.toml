[translation]
10003105-1 = "第10話;この夏はまだ終わらない"
10003105-2 = "（そうして熱く燃え上がった海辺の事件は、ヒナの活躍で鎮静化）"
10003105-3 = "（合宿もこれにて終了、学園に戻る時間が近づいていた……と思いきや）"
10003105-5 = "夏季合宿用オペレーションルーム"
10003105-6 = "す、すみませんでした、委員長！ただ、その……何とか事態を大きくしないように、解決しようとしていたと言いますか……！"
10003105-7 = "それなりに大きくなってたけど……？"
10003105-8 = "その、委員長にバレないように解決すれば万事OKかなと……。"
10003105-9 = "そもそも、どうしてバレないようにしようとしたのかが全然理解できない。"
10003105-10 = "こういうのは、私に言ってくれればすぐに解決したはず……違う？"
10003105-11 = "それは、その……そうしたら……"
10003105-12 = "ん？"
10003105-13 = "そんなことしたら、また委員長は頑張ってお仕事をされちゃうじゃないですかぁ！"
10003105-14 = "……え？"
10003105-15 = "私はただ、委員長にお休みをとって欲しかっただけでしたのに……！うわぁぁぁん！"
10003105-16 = "ちょ、ちょっと待って……何の話？お休み？"
10003105-17 = "えっと、委員長。アコちゃんが言うには、その……。"
10003105-18 = "委員長のストレスがすごいことになっているから、と……。"
10003105-19 = "ストレス？私が？……どうして？"
10003105-20 = "この前、私が淹れたコーヒーを委員長が「美味しい」って……ヒナ委員長、そんなこと滅多に仰らないのに……。"
10003105-21 = "コーヒー……ってあの、シャーレとの共同作戦のことを話してた時の……？"
10003105-22 = "えっと……アコ、それは誤解。"
10003105-23 = "……？"
10003105-24 = "あの時、私が美味しいって言ったのはストレスのせいじゃなくて、その、逆に気分が悪くなかったからと言うか……。"
10003105-25 = "[s1] \"どういうこと……？\"\n[s2] \"海辺で食べるトウモロコシって美味しいよね、みたいな？\""
10003105-26 = "せ、先生はちょっと静かにしてて……！"
10003105-27 = "せ、先生はちょっと静かにしてて……！"
10003105-28 = "その、何て言うか、えっと……。"
10003105-29 = "こ、細かいことは気にしないで！とにかく、私のことを気遣っての行動だったのは分かったけれど……他にもやり方があったでしょう。"
10003105-30 = "はい、すみません……。"
10003105-31 = "まあでも……この一泊二日、結構ゆっくりできたのは確かだし……うん、色々と悪くなかった。"
10003105-32 = "……でもそれはそれ、これはこれ。"
10003105-33 = "それに私はやっぱり、何もせずにじっとしてるより、仕事をしてる方が落ち着くってことも分かったし……。"
10003105-34 = "[s] \"完全にワーカーホリック……。\""
10003105-35 = "……何か言った、先生？"
10003105-36 = "[s] \"何でも無いです……。\""
10003105-37 = "はぁ。とにかく、どうやら今回の夏の合宿訓練はめちゃくちゃになったみたいだし……。"
10003105-38 = "このまま帰っ[ruby=パンデモニウム・ソサエティー]たら万魔殿のや[/ruby]つらに、どれだけ嫌味を言われるか分からない。"
10003105-39 = "……うん、仕方ない。決めた。"
10003105-40 = "今からあらためて、夏の合宿訓練を始める。"
10003105-41 = "えっと、委員長、訓練はある程度っていうか、もうボロボロっていうか……。"
10003105-42 = "現時点をもって、海への出入りは禁止。元々私が準備してたスケジュールの通りに、これから36時間の地獄の訓練を始める。"
10003105-43 = "……。"
10003105-44 = "……。"
10003105-45 = "……。"
10003105-46 = "自由時間は一切なし、このくらいの長さだから当然徹夜。この二日間みんな夏を満喫したみたいだし、少しくらい辛くても耐えられるはず。"
10003105-47 = "これなら万魔殿のタヌキ共も、文句は言えないでしょう。"
10003105-48 = "うっそだろ……！？"
10003105-49 = "私たちは、もうすでに疲労困憊なのですが……まあ、こうなっては何を言っても言い訳ですね。"
10003105-50 = "うぅ、承知しました……。"
10003105-51 = "……ふう。"
10003105-52 = "先生は？何か言いたいことある？"
10003105-53 = "[s] \"ありません！\""
10003105-54 = "うん、良い返事。"
10003105-59 = "……すっぽかした約束の埋め合わせは、また訓練の後で……ね？"
10003105-61 = "（そうしてゲヘナ風紀委員会のみんなと一緒に過ごした、短いようで長い夏は……まだもう少し終わりそうになかった）"
10003105-62 = "ヒナ委員長のなつやすみっ！"
