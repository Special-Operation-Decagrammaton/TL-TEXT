[translation]
10003105-1 = "Episódio 10: Este verão ainda não acabou"
10003105-2 = "（E assim, o incidente na praia, que esquentou bastante, foi contido graças à atuação de Hina）"
10003105-3 = "（O acampamento terminou aqui, e o momento de retornar à academia estava próximo... ou era o que se pensava）"
10003105-5 = "Sala de Operações do Acampamento de Verão"
10003105-6 = "M-me desculpe, Presidente! É que, sabe... eu estava tentando resolver a situação sem que ela tomasse proporções maiores...!"
10003105-7 = "Mas acabou tomando proporções consideráveis, não acha...?"
10003105-8 = "Bem, eu pensei que se resolvesse sem a Presidente descobrir, estaria tudo bem..."
10003105-9 = "Para começo de conversa, não consigo entender por que você tentou esconder isso de mim."
10003105-10 = "Nesse tipo de situação, se tivesse me contado, eu teria resolvido imediatamente... não é?"
10003105-11 = "Isso é, bem... se eu fizesse isso..."
10003105-12 = "Hm?"
10003105-13 = "Se eu fizesse isso, a Presidente ia acabar se esforçando demais no trabalho de novo!"
10003105-14 = "……Hã?"
10003105-15 = "Eu só queria que a Presidente tirasse um descanso...! Buáááá!"
10003105-16 = "Es-espera um pouco... Do que você está falando? Descanso?"
10003105-17 = "Bem, Presidente. Pelo que a Ako-chan disse, é que..."
10003105-18 = "O nível de estresse da Presidente está altíssimo, então..."
10003105-19 = "Estresse? Eu? ...Por quê?"
10003105-20 = "Da última vez, quando a Presidente disse que o café que eu fiz estava 'delicioso'... A Presidente Hina raramente diz coisas assim..."
10003105-21 = "Café... você está falando daquela vez que conversamos sobre a operação conjunta com o Schale...?"
10003105-22 = "Bem... Ako, isso é um mal-entendido."
10003105-23 = "……?"
10003105-24 = "Naquela hora, eu disse que estava delicioso não por causa de estresse, mas sim porque, bem, eu não estava me sentindo mal, por assim dizer..."
10003105-25 = "[s1] \"O que você quer dizer com isso...?\"\n[s2] \"Tipo, 'milho comido na praia é gostoso', sabe?\""
10003105-26 = "Sen-Sensei, fique quieto por um momento...!"
10003105-27 = "Sen-Sensei, fique quieto por um momento...!"
10003105-28 = "Bem, como posso dizer, é que..."
10003105-29 = "N-não se preocupe com os detalhes! De qualquer forma, entendi que suas ações foram por preocupação comigo, mas... havia outras formas de fazer isso."
10003105-30 = "Sim, me desculpe..."
10003105-31 = "Mas, bem... é verdade que consegui descansar bastante nesses dois dias... sim, não foi de todo ruim."
10003105-32 = "……Mas uma coisa é uma coisa, outra coisa é outra coisa."
10003105-33 = "Além disso, descobri que, na verdade, me sinto mais tranquila trabalhando do que ficando parada sem fazer nada..."
10003105-34 = "[s] \"Completamente viciada em trabalho...\""
10003105-35 = "……Disse alguma coisa, Sensei?"
10003105-36 = "[s] \"Não foi nada...\""
10003105-37 = "Haa. De qualquer forma, parece que o treinamento do acampamento de verão desta vez foi por água abaixo..."
10003105-38 = "Se voltarmos assim, não sei quantas provocações terei que ouvir daqueles caras do Pandemonium Society."
10003105-39 = "……Sim, não tem jeito. Decidido."
10003105-40 = "A partir de agora, vamos recomeçar o treinamento do acampamento de verão."
10003105-41 = "Bem, Presidente, o treinamento já está, digamos, em frangalhos..."
10003105-42 = "A partir deste momento, a entrada e saída da praia estão proibidas. Seguindo o cronograma que eu preparei originalmente, vamos começar 36 horas de treinamento infernal."
10003105-43 = "……"
10003105-44 = "……"
10003105-45 = "……"
10003105-46 = "Sem tempo livre, e com essa duração, obviamente será sem dormir. Todos parecem ter aproveitado bem o verão nestes dois dias, então devem conseguir aguentar um pouco de esforço."
10003105-47 = "Assim, aqueles guaxinins do Pandemonium Society não terão do que reclamar."
10003105-48 = "Não pode ser...!"
10003105-49 = "Nós já estamos exaustas... mas, chegados a este ponto, qualquer coisa que eu disser será apenas uma desculpa."
10003105-50 = "Ugh, entendido..."
10003105-51 = "……Phew."
10003105-52 = "Professor? Tem algo que queira dizer?"
10003105-53 = "[s] \"Não tenho!\""
10003105-54 = "Sim, essa é uma boa resposta."
10003105-59 = "……Sobre compensar o compromisso que você furou, a gente vê isso depois do treino…… tá bom?"
10003105-61 = "（E assim, o verão que passei com o pessoal do Comitê Disciplinar de Gehenna, que pareceu curto, mas foi longo…… ainda não parecia estar perto do fim）"
10003105-62 = "As férias de verão da Presidente Hina!"
