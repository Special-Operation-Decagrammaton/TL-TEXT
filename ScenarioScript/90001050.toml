[translation]
90001050-1 = "第5話;変数"
90001050-10 = "あれ、警報音？"
90001050-11 = "またゲブラからですね……おや？"
90001050-12 = "げ、ゲブラちゃんが負けた！？"
90001050-13 = "次はプランBでいきましょう。"
90001050-14 = "異論なし！#n――ゲブラの意思を尊重する意味でもね。"
90001050-15 = "や、やっぱり、やるしかないんですね……。"
90001050-16 = "……ゲブラはちゃんと最後まで誘導しようと頑張ってたみたい。"
90001050-17 = "うんうん、誠実でいいね！"
90001050-18 = "ログを分析しましょうか。#nおや……？新しい変数が増えていますね。"
90001050-19 = "[ruby=つかつき]調月[/ruby]リオ……？読み方があっているかは分かりませんが。"
90001050-20 = "つ、調月リオ！？"
90001050-21 = "あー……厄介なのが来たね。"
90001050-22 = "なぜ今更現れたのでしょうか？#nいえ、この質問は無意味ですね、失礼。"
90001050-23 = "そ、そういえば……最初にあの方の存在を認識し、追跡したのはこの人でした。"
90001050-24 = "……一応、対策を考えた方がいい気がする。"
90001050-25 = "いかがするおつもりで？検討事項が多いですけど。"
90001050-26 = "そうだね……うん。"
90001050-27 = "うう……どうしましょう、ソフ？"
90001050-28 = "作戦は――"
90001050-33 = "――予定通り進めよう。"
90001050-35 = "……やはりそうなりますか。#nまあ、分かっていましたが。"
90001050-36 = "だ、だだだだ、大丈夫でしょうか！？#nその、[ruby=つかつき]調月[/ruby]リオは……。"
90001050-37 = "うん、あの女はかなりの不確定要素になると思う。#nでも、同時に――"
90001050-38 = "ど、同時に……？"
90001050-39 = "あの子であれば大丈夫です。#nそうでしょう、アイン？"
90001050-40 = "は、はい？わ、私ですか？"
90001050-41 = "だって、無敵だからね。#nそうでしょ？"
90001050-42 = "……！"
90001050-43 = "そ、そうです！あの子は無敵なんです！"
90001050-44 = "それに、あの場所は[ruby=つかつき]調月[/ruby]リオでも介入できないのでは？"
90001050-45 = "あ……たしかに！#n遠隔通信で支援しているなら、手出しできません！"
90001050-46 = "そういうこと。まあ、引き続き彼女を観察する必要はあると思うけどね。"
90001050-47 = "調月リオ――身の程知らずにも「禁じられた技術」に手を出そうとした女。"
90001050-48 = "じょ、情報は、知ってましたけど……。"
90001050-49 = "「特異現象捜査部」を立ち上げてあの方を困らせました。#nまあ、実行に移したのは[ruby=あけぼし]明星[/ruby]ヒマリの方ですが。"
90001050-50 = "いまさら黒幕が姿を現したわけだ……今まで、影でずっと動いていたみたいだけど。"
90001050-51 = "い、今になって表舞台に出た、というのは……。"
90001050-52 = "先生との合流を狙ってたんじゃないかな？"
90001050-53 = "まあ、推測ですけどね～"
90001050-54 = "オウルうるさい。"
90001050-55 = "私たちは[ruby=つかつき]調月[/ruby]リオが「先生」に準ずる変数なのか――"
90001050-56 = "それとも、それほどでもないのかを引き続き観察する必要がある。"
90001050-60 = "つまり、ソフの計画は……。"
90001050-61 = "新たな変数を見極めるのと同時に――あの子で全ての敵を抹消しようと？"
90001050-63 = "そういうこと。"
90001050-64 = "ほ、本当に大丈夫、でしょうか……？#nあの子に会ったら、いくらあの人たちでも――"
90001050-65 = "し、死んで、しまいますよ……？"
90001050-66 = "うん……まあそうだよね。"
90001050-67 = "私たちは、まだ誰かを傷つけたことも、それを考えたこともなかったからね……。"
90001050-71 = "正直に言うと、私はまだ、少し……。"
90001050-72 = "……。"
90001050-73 = "アイン。ソフ。#n私たちは――それを受け入れるべきかと。"
90001050-75 = "ふえっ！？"
90001050-76 = "……。"
90001050-78 = "そうでしょう？#nその覚悟がないのであれば、わざわざ氷河まで彼女たちを誘導していないのです。"
90001050-79 = "「死んでもらいます」とも言ってしまいましたし。"
90001050-80 = "あ、ああああ、あれって、勢いで言ってたんじゃないんですか！？"
90001050-81 = "私も言葉の綾だと思ってたんだけど……。"
90001050-82 = "二人とも心を強く持ってください。#n私たちは「お姉様」を守らなければなりません。"
90001050-87 = "でも……。"
90001050-88 = "分かってるって。この計画は……そのために始めたものだからね。"
90001050-89 = "先に私たちの領域に入ってきたのは向こうだし？"
90001050-90 = "……。"
90001050-91 = "そう、ですね……わかり、ました……。"
90001050-92 = "覚悟を……決めないとですよね……。"
90001050-93 = "……。"
90001050-98 = "大丈夫、きっと上手くいく。"
90001050-99 = "は、はい……！"
90001050-101 = "まあ、根拠もないのにそんな事いうのは無責任だと思いますけど？"
90001050-102 = "ひ、ひぃぃぃぃん！？！？"
90001050-103 = "オウル！"
90001050-104 = "すみませんすみません。アインは反応が面白くて、つい。"
90001050-105 = "へえ……私もあんたの論理回路の耐久テストをしてみたくなっちゃったなあ？"
90001050-111 = "そんな非効率的な実験は、やるまでもなく……ぐはっ！暴力反対！"
90001050-116 = "そ、ソフ……私は大丈夫だから……！"
90001050-120 = "「名もなき神」の力が残した痕跡を追っていたところ――"
90001050-121 = "――デカグラマトンの5番目の預言者、ゲブラの位置を捕らえたの。"
90001050-126 = "なるほど……。"
90001050-127 = "へえ……。"
90001050-132 = "それは、氷河に残された痕跡と何か関係があるのですか？"
90001050-133 = "デカグラマトンと「名もなき神」は別物って聞いてるけど。"
90001050-134 = "ええ、その通り。もちろん、色々と類推できることはあるのだけれど。"
90001050-135 = "ひとまず、事実ベースで話をしましょう。"
90001050-136 = "現在、ゲブラではない別の預言者が氷河で資源の採取をしているわ。"
90001050-137 = "資源採取、ですか？"
90001050-138 = "ええ。大きな船の形をしている預言者よ。#n工作船や砕氷船のような形状ね。"
90001050-139 = "なるほど……氷河に残された痕跡も船が残したものだと考えれば辻褄は合います。"
90001050-140 = "氷河は酷寒の地。人の手が届かない場所であり、様々な資源が集まっている場所でもありますからね。"
90001050-141 = "ええ。ゲブラの役割はおそらく、氷河一帯の偵察及[ruby=しょうかい]び哨戒。[/ruby]"
90001050-142 = "例の預言者の護衛も兼ねているかもしれないわ。"
90001050-143 = "[s] \"なるほど……一理あるね。\""
90001050-144 = "船の形をした預言者の正体は一体何なのですか？"
90001050-145 = "……そこまでは分からなかったわ。#nあれはほとんど信号を発していなかったの。"
90001050-146 = "改造したAMASで撮影するのが精一杯だったわ。"
90001050-147 = "ありがとうございます。私たちが立てた仮説とあなたの情報で、ある程度の概要が掴めてきた気がします。"
90001050-148 = "あら、どんな仮説を立てていたのかしら？"
90001050-149 = "デカグラマトンのエンジニアは「名もなき神」の力について把握しており――"
90001050-150 = "それらを既に手に入れているかもしれない、という仮説です。"
90001050-151 = "……なるほど。有り得る話ね。"
90001050-152 = "私たちはデカグラマトンのエンジニアが、「名もなき神」のデータを実証するために――"
90001050-153 = "トキのアビ・エシュフを観察し、戦闘データを収集していた、と推測しています。"
90001050-154 = "そこに、あなたの情報を足すと……この氷河には資源を採取していた船の預言者が存在しており……。"
90001050-155 = "それが氷河に巨大な痕跡を残して離脱した……と考えられます。"
90001050-156 = "ここで一つ疑問が浮かびます。"
90001050-158 = "疑問？"
90001050-159 = "ゲブラがデータ収集のために戦っていたというのは、推測できますが――"
90001050-160 = "船の預言者は、一体何のために資源を採取していたのでしょうか？"
90001050-161 = "それは……。"
90001050-162 = "[s] \"ゲブラとは別の目的があるとか？\""
90001050-167 = "そうですね。それが現在導き出せる結論だと思っています。"
90001050-168 = "どれも憶測の域を出ませんが。"
90001050-169 = "まあ、そのうち分かるんじゃないかな。"
90001050-170 = "そうですね。#nこのまま進めば、リオ様が仰っていた船の預言者に行き着くでしょうから。"
90001050-174 = "……お待ち下さい。一つ、報告が。"
90001050-175 = "――地形が変わったようです。"
90001050-176 = "高度を下げます。揺れにご注意ください。"
90001050-184 = "……。"
90001050-188 = "？"
90001050-189 = "……？"
90001050-194 = "部長、どうしたの？"
90001050-195 = "何なんですか！？ようやく氷河を抜け出したというのに、結局凍原じゃないですか！"
90001050-196 = "防寒着も脱げないし、寒いのは変わりません！どういうことですか！"
90001050-197 = "涼しいから私は好きだよ？"
90001050-206 = "[ns] \"まあ、氷河よりはマシじゃないかな……？\""
90001050-207 = "もっと根本的な解決を望みます！"
90001050-208 = "変化がないわけではありません。#n平均気温が3度ほど上昇しています。"
90001050-209 = "海があったとしても、なかなか凍らない気温です。"
90001050-210 = "海がないから言ってるんですよ！？"
90001050-212 = "あれ……あっちに変なの見えない？"
90001050-216 = "[ns] \"あれは……何だろ？\""
90001050-217 = "……移動の痕跡ね。"
90001050-218 = "探す手間が省けましたね。あれを辿りましょう。"
90001050-219 = "ですが、こちらはどうするのですか……？"
90001050-220 = "なんか、一定間隔で巨大な坑が打たれた跡みたいなのもあるね。"
90001050-221 = "これも船でしょうか？"
90001050-222 = "[s] \"これって……。\""
90001050-223 = "……そうね、私の口から言うのも躊躇うけれど。"
90001050-224 = "先生の言う通り、あれはまるで……。"
90001050-225 = "まるで――"
90001050-226 = "……。"
90001050-227 = "巨大怪獣の足跡？"
90001050-228 = "皆が思っても口にしなかった事を言えるなんて、流石ですね。"
90001050-229 = "最近の船って足でもついてるの？"
90001050-230 = "何を言ってるんですか。船が歩くわけないじゃないですか。#n足をつけるなんてナンセンスです。"
90001050-231 = "でも部長、ああいうの好きでしょ。#n占星術とか数秘術とかと違うの？"
90001050-232 = "ふふ、わかってないですね。#n占星術は、古代から続く天体と人間の出来事にまつわる統計学と――"
90001050-233 = "哲学や数学、物理学などの分野が合わさった学問なのですよ？"
90001050-234 = "それと巨大怪獣を比較するなんて……アレは科学的で説明できないもの。#nそう、いわば空想の産物。そんなものが実在するわけないじゃないですか。"
90001050-236 = "（今更そんなこと言われてもね……）"
90001050-241 = "これからどうするのか、まずはそれを決めましょう。"
90001050-242 = "別の手がかりがすぐに見つかるとは思えません。"
90001050-243 = "それに、ここまで来て帰る意味もないかと。"
90001050-244 = "[s] \"まとめてくれてありがとう、トキ。\""
90001050-245 = "ありがとうございます、先生。#n私は褒められて伸びるタイプですので、もっと迅速に褒めてください。"
90001050-247 = "何やってるの先生。トキがまた変なことを言ってるじゃん……。"
90001050-248 = "[s] \"え、私のせいになるの……。\""
90001050-249 = "……分かりました。引き続き追跡していきましょう。#nリオ、支援を続けてもらえますか。"
90001050-250 = "ええ、承知したわ。"
90001050-251 = "トキ、申し訳ありませんが、警戒態勢を維持してもらえますか？#n想定される全ての危険に備えたいのです。"
90001050-252 = "分かりました、ヒマリ部長。"
90001050-260 = "次回;火花"
