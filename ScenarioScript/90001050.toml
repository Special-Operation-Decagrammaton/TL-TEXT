[translation]
90001050-1 = "Episódio 5; Variável"
90001050-10 = "Ué, um alarme?"
90001050-11 = "É de novo o Geburah... Ora?"
90001050-12 = "O-o Geburah perdeu!?"
90001050-13 = "Vamos para o Plano B."
90001050-14 = "Sem objeções!#n— Até porque é uma forma de respeitar a vontade do Geburah."
90001050-15 = "A-afinal, não temos outra escolha, não é..."
90001050-16 = "...Parece que o Geburah se esforçou para tentar guiá-los até o fim."
90001050-17 = "Sim, sim, é muito sincero da parte dele!"
90001050-18 = "Vamos analisar o log.#nOra... tem uma nova variável aqui."
90001050-19 = "Tsukatsuki Rio...? Não sei se a leitura está correta, mas..."
90001050-20 = "T-Tsukatsuki Rio!?"
90001050-21 = "Ah... alguém problemática apareceu."
90001050-22 = "Por que ela apareceu só agora?#nNão, essa pergunta é inútil, perdão."
90001050-23 = "A-aliás... foi essa pessoa quem reconheceu a existência daquela pessoa e a rastreou primeiro."
90001050-24 = "...Acho melhor pensarmos em medidas preventivas."
90001050-25 = "O que pretende fazer? Há muitos pontos a considerar."
90001050-26 = "É verdade... sim."
90001050-27 = "Uuu... o que faremos, Soph?"
90001050-28 = "A estratégia é..."
90001050-33 = "— Seguir conforme o planejado."
90001050-35 = "...Então é isso.#nBem, eu já imaginava."
90001050-36 = "E-e-e-está tudo bem mesmo!?#nDigo, a Tsukatsuki Rio é..."
90001050-37 = "Sim, acho que aquela mulher será um fator de incerteza considerável.#nMas, ao mesmo tempo—"
90001050-38 = "A-ao mesmo tempo...?"
90001050-39 = "Com aquela criança, ficará tudo bem.#nNão é, Ein?"
90001050-40 = "S-sim? E-eu?"
90001050-41 = "Porque ela é invencível, não é?#nNão acha?"
90001050-42 = "...!"
90001050-43 = "I-isso mesmo! Aquela criança é invencível!"
90001050-44 = "Além disso, aquele lugar não é inacessível até para a Tsukatsuki Rio?"
90001050-45 = "Ah... é verdade!#nSe ela estiver dando suporte por comunicação remota, não tem como interferir!"
90001050-46 = "Exatamente. Bem, acho que ainda precisamos continuar observando-a."
90001050-47 = "Tsukatsuki Rio — a mulher que, sem conhecer o próprio lugar, tentou colocar as mãos em uma \"tecnologia proibida\"."
90001050-48 = "E-eu sabia das informações, mas..."
90001050-49 = "Ela fundou o \"Departamento de Investigação de Fenômenos Especiais\" e causou problemas para aquela pessoa.#nBem, quem colocou em prática foi a Akeboshi Himari, no entanto."
90001050-50 = "Então a mente por trás de tudo apareceu agora... parece que ela estava agindo nas sombras o tempo todo."
90001050-51 = "A-aparecer em cena só agora, isso significa..."
90001050-52 = "Será que ela estava mirando em se encontrar com o Sensei?"
90001050-53 = "Bem, é só uma suposição~"
90001050-54 = "Cale a boca, Owl."
90001050-55 = "Precisamos continuar observando se a Tsukatsuki Rio é uma variável equivalente ao \"Sensei\"—"
90001050-56 = "Ou se ela não é tudo isso."
90001050-60 = "Ou seja, o plano da Soph é..."
90001050-61 = "Identificar a nova variável e, ao mesmo tempo — usar aquela criança para eliminar todos os inimigos?"
90001050-63 = "Exatamente."
90001050-64 = "S-será que isso é realmente seguro...?#nSe encontrarem aquela criança, mesmo que sejam aquelas pessoas—"
90001050-65 = "E-elas vão morrer, sabe...?"
90001050-66 = "Sim... bem, é verdade."
90001050-67 = "Porque nós ainda nunca ferimos ninguém, nem sequer pensamos nisso..."
90001050-71 = "Para ser sincera, eu ainda estou um pouco..."
90001050-72 = "……"
90001050-73 = "Ain. Soph. #nNós devemos... aceitar isso?"
90001050-75 = "Hã!?"
90001050-76 = "……"
90001050-78 = "Não é óbvio? #nSe não estivéssemos preparadas para isso, não teríamos nos dado ao trabalho de atraí-las até a geleira."
90001050-79 = "Eu até disse que 'iríamos matá-las'."
90001050-80 = "A-a-a-aquilo não foi só algo que você disse por impulso!?"
90001050-81 = "Eu também achei que fosse apenas uma força de expressão..."
90001050-82 = "Ambas, mantenham a firmeza. #nNós precisamos proteger a 'Irmã Mais Velha'."
90001050-87 = "Mas..."
90001050-88 = "Eu sei. Este plano... foi iniciado exatamente para isso."
90001050-89 = "E além disso, foram elas que entraram no nosso território primeiro, não foram?"
90001050-90 = "……"
90001050-91 = "É, você tem razão... eu entendi..."
90001050-92 = "Precisamos... tomar uma decisão, não é..."
90001050-93 = "……"
90001050-98 = "Está tudo bem, com certeza vai dar certo."
90001050-99 = "S-sim...!"
90001050-101 = "Bem, acho um pouco irresponsável dizer isso sem base nenhuma, não acha?"
90001050-102 = "H-hiiiiii!?"
90001050-103 = "Owl!"
90001050-104 = "Desculpe, desculpe. A reação da Ain é tão engraçada que eu não resisti."
90001050-105 = "Hmph... eu também fiquei com vontade de testar a durabilidade dos seus circuitos lógicos, sabia?"
90001050-111 = "Um experimento tão ineficiente, nem precisa ser feito... guah! Nada de violência!"
90001050-116 = "S-Soph... eu estou bem, então...!"
90001050-120 = "Enquanto eu rastreava os vestígios deixados pelo poder do 'Deus Sem Nome'—"
90001050-121 = "—eu capturei a localização de Geburah, o quinto profeta de Decagrammaton."
90001050-126 = "Entendo..."
90001050-127 = "Hmph..."
90001050-132 = "Isso tem alguma relação com os vestígios deixados na geleira?"
90001050-133 = "Ouvi dizer que Decagrammaton e o 'Deus Sem Nome' são coisas diferentes."
90001050-134 = "Sim, exatamente. Embora, é claro, existam várias coisas que possamos deduzir."
90001050-135 = "Por enquanto, vamos falar com base nos fatos."
90001050-136 = "Atualmente, outro profeta, que não é Geburah, está coletando recursos na geleira."
90001050-137 = "Coleta de recursos?"
90001050-138 = "Sim. É um profeta com formato de um grande navio. #nTem a forma de um navio de trabalho ou um quebra-gelo."
90001050-139 = "Entendo... se pensarmos que os vestígios deixados na geleira também foram feitos por um navio, tudo faz sentido."
90001050-140 = "A geleira é um lugar de frio extremo. É um local inacessível para humanos e, ao mesmo tempo, um lugar onde vários recursos se acumulam."
90001050-141 = "Sim. O papel de Geburah provavelmente é o reconhecimento e patrulha de toda a área da geleira."
90001050-142 = "Pode ser que ele também esteja servindo de escolta para aquele profeta."
90001050-143 = "[s] \"Entendo... faz sentido.\""
90001050-144 = "Qual é a verdadeira identidade do profeta em forma de navio?"
90001050-145 = "…Isso eu não consegui descobrir. #nEle quase não emitia sinais."
90001050-146 = "Foi o máximo que consegui fotografar com o AMAS modificado."
90001050-147 = "Obrigado. Com a hipótese que levantamos e suas informações, sinto que conseguimos ter uma visão geral."
90001050-148 = "Ora, que tipo de hipótese vocês levantaram?"
90001050-149 = "A hipótese de que os engenheiros de Decagrammaton conhecem o poder do 'Deus Sem Nome' e—"
90001050-150 = "—que eles talvez já tenham colocado as mãos nele."
90001050-151 = "…Entendo. É uma possibilidade."
90001050-152 = "Presumimos que os engenheiros de Decagrammaton, para comprovar os dados do \"Deus Sem Nome\"——"
90001050-153 = "estavam observando o Abi-Eshuh de Toki e coletando dados de combate."
90001050-154 = "Se adicionarmos as suas informações a isso... significa que um Profeta da Nave, que estava coletando recursos, existiu nesta geleira..."
90001050-155 = "E que ele partiu, deixando para trás marcas gigantescas na geleira... é o que se pode deduzir."
90001050-156 = "Aqui surge uma dúvida."
90001050-158 = "Uma dúvida?"
90001050-159 = "Podemos presumir que Geburah estava lutando para coletar dados, mas——"
90001050-160 = "por que exatamente o Profeta da Nave estava coletando recursos?"
90001050-161 = "Isso é..."
90001050-162 = "[s] \"Será que ele tem um objetivo diferente do de Geburah?\""
90001050-167 = "Sim. Acredito que essa seja a conclusão que podemos tirar no momento."
90001050-168 = "Embora tudo isso não passe de especulação."
90001050-169 = "Bem, acho que descobriremos em breve."
90001050-170 = "Concordo. #nSe continuarmos assim, chegaremos ao Profeta da Nave que a Rio mencionou."
90001050-174 = "……Espere um momento. Tenho um relatório."
90001050-175 = "――O terreno parece ter mudado."
90001050-176 = "Vou reduzir a altitude. Por favor, cuidado com a turbulência."
90001050-184 = "……."
90001050-188 = "?"
90001050-189 = "……?"
90001050-194 = "Chefe, o que houve?"
90001050-195 = "O que é isso!? Finalmente saímos da geleira, mas ainda estamos na tundra!"
90001050-196 = "Não podemos nem tirar as roupas de frio, continua congelante! O que significa isso?!"
90001050-197 = "Eu gosto daqui porque é refrescante, sabe?"
90001050-206 = "[ns] \"Bem, acho que é melhor do que a geleira...?\""
90001050-207 = "Eu gostaria de uma solução mais definitiva!"
90001050-208 = "Não é como se não houvesse mudanças. #nA temperatura média subiu cerca de 3 graus."
90001050-209 = "Mesmo que houvesse um mar, é uma temperatura que dificilmente congelaria."
90001050-210 = "É justamente por não ter mar que estou reclamando!"
90001050-212 = "Ei... vocês não estão vendo algo estranho ali?"
90001050-216 = "[ns] \"O que será aquilo?\""
90001050-217 = "……São rastros de movimento."
90001050-218 = "Isso nos poupou o trabalho de procurar. Vamos segui-los."
90001050-219 = "Mas, e quanto a isto aqui...?"
90001050-220 = "Parece que há marcas de estacas gigantes cravadas em intervalos regulares também."
90001050-221 = "Será que isso também é da nave?"
90001050-222 = "[s] \"Isso é...\""
90001050-223 = "……Pois é, hesito até em dizer isso."
90001050-224 = "Como o Sensei disse, aquilo parece..."
90001050-225 = "Parece――"
90001050-226 = "……."
90001050-227 = "Pegadas de um monstro gigante?"
90001050-228 = "É impressionante que você consiga dizer o que todos pensavam, mas não tinham coragem de falar."
90001050-229 = "As naves de hoje em dia têm pernas?"
90001050-230 = "O que você está dizendo? Naves não andam. #nColocar pernas nelas é um absurdo."
90001050-231 = "Mas Chefe, você gosta dessas coisas, não gosta? #nNão é tipo astrologia ou numerologia?"
90001050-232 = "Fufu, você não entende nada. #nA astrologia é uma ciência estatística que lida com eventos humanos e corpos celestes desde a antiguidade, combinada com――"
90001050-233 = "campos como filosofia, matemática e física, sabia?"
90001050-234 = "Comparar isso com um monstro gigante... aquilo é algo que não pode ser explicado cientificamente. #nSim, é um produto da fantasia. Coisas assim não existem de verdade."
90001050-236 = "(Dizer isso agora não ajuda em nada...)"
90001050-241 = "Primeiro, vamos decidir o que faremos a partir de agora."
90001050-242 = "Não acho que encontraremos outra pista tão cedo."
90001050-243 = "Além disso, não faz sentido voltar depois de termos chegado até aqui."
90001050-244 = "[s] \"Obrigado por resumir tudo, Toki.\""
90001050-245 = "Obrigada, Sensei. #nEu sou do tipo que melhora quando é elogiada, então, por favor, me elogie com mais rapidez."
90001050-247 = "O que você está fazendo, Sensei? A Toki está dizendo coisas estranhas de novo..."
90001050-248 = "[s] \"Ué, a culpa vai ser minha...?\""
90001050-249 = "...Entendido. Vamos continuar com o rastreamento. #nRio, você pode continuar nos dando suporte?"
90001050-250 = "Sim, entendido."
90001050-251 = "Toki, sinto muito, mas você poderia manter o estado de alerta? #nQuero estar preparada para todos os perigos possíveis."
90001050-252 = "Entendido, Chefe Himari."
90001050-260 = "Próximo episódio: Faíscas"
