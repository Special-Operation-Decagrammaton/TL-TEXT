[translation]
42040-1 = "Episódio 4: Encontro Inesperado"
42040-3 = "……Aqui é RABBIT1. Horário atual: 16:25."
42040-4 = "Rastreamos o sinal de GPS do nosso equipamento roubado. A localização dos mercenários foi confirmada no Ponto Sierra. Chegamos ao perímetro do alvo."
42040-5 = "Chuva pesada sobre o Ponto Romeo de desembarque.#nVisibilidade reduzida para menos de 500 metros. Mantenham os olhos abertos e a cautela máxima."
42040-6 = "A-Aqui é RABBIT4… A chuva limpou completamente as ruas. Nenhum civil na área…"
42040-7 = "Nenhuma sentinela de emboscada no telhado também… Daqui eu consigo cobrir qualquer ângulo e dar apoio letal…"
42040-8 = "Copiado. RABBIT2, status da infiltração."
42040-9 = "Aqui é RABBIT2. Invasão do circuito fechado e sabotagem do sistema de segurança concluídas.#nOs alarmes dessa pocilga vão ficar mudos por um bom tempo."
42040-10 = "Mas…"
42040-11 = "Algum problema, RABBIT2?"
42040-12 = "Não é bem um problema, mas… essa estrutura toda me dá uma sensação bizarra de déjà vu."
42040-14 = "Você não tá confundindo as coisas? Nós não temos nenhum registro operacional nessa área."
42040-15 = "Eu sei disso. Mas o que me incomoda é a… 'arquitetura' desse lugar."
42040-16 = "Três vias de acesso, um labirinto fechado de três andares com corredores estreitos…#nEssa planta é idêntica à 'Killhouse' de simulação de combate a curta distância da nossa Academia."
42040-17 = "Kuhihi, agora que você falou… é exatamente o mesmo layout de corredores cruzados."
42040-19 = "E eu aqui achando que estava relaxada demais pra quem tá em território inimigo… Era por causa disso…"
42040-20 = "Entendido. A familiaridade com o terreno de batalha joga a nosso favor.#nEstaremos um passo à frente de qualquer imprevisto e saberemos onde os gargalos estão."
42040-21 = "Por outro lado, esse layout favorece absurdamente quem tá defendendo a base.#nNas simulações da escola, a defesa sempre esmagava quem tentava invadir… Isso me dá um mau pressentimento."
42040-22 = "Tá tremendo na base por quê, Saki? Nós somos a elite da SRT, esqueceu?"
42040-23 = "Mesmo se esses terroristas de fundo de quintal tiverem uma surpresa engatilhada, a gente varre eles com poder de fogo bruto e tática. Kuhihi…"
42040-24 = "……É, você tem razão. A gente aniquilou a tropa pesada da PMC Kaiser sem nem suar… não são uns saqueadores com nossas armas que vão nos parar."
42040-25 = "Deixem a cobertura de atirador de elite comigo… vai dar tudo certo."
42040-26 = "Iniciando a incursão tática. RABBIT2, avance para o ponto de ação!"
42040-31 = "Porta arrombada. Perímetro violado."
42040-36 = "Corredor de acesso sob controle!"
42040-37 = "RABBIT1 iniciando invasão no núcleo do prédio!"
42040-41 = "……Setor A, limpo."
42040-42 = "Setor B, limpo!"
42040-43 = "Avançando formação para o Setor C!"
42040-47 = "(……Isso está completamente errado. Nós já invadimos o coração do prédio e não encontramos resistência alguma.)"
42040-48 = "(Sem armadilhas, sem minas terrestres, sem patrulhas… É como se a porta estivesse aberta esperando a gente entrar. O que eu estou deixando passar…?)"
42040-49 = "Aqui é RABBIT2.#nRABBIT1, o corredor tá bloqueado por uma barricada cega pesada de metal. Não dá pra passar.#nO que fazemos? Explodo com C4 e abro caminho à força?"
42040-53 = "Negativo. Uma explosão vai entregar nossas posições imediatamente.#nRecue e procure uma rota de flanqueamento."
42040-54 = "Copiado. Vou dar a volta pelo corredor central, zona liberada…"
42040-55 = "RABBIT2, continue o avanç--"
42040-59 = "Urgh…!"
42040-63 = "Isso foi um disparo com silenciador?!"
42040-64 = "RABBIT2, reporte sua situação! RABBIT2!!"
42040-65 = "O rádio… ficou mudo?!"
42040-66 = "RABBIT4, exijo varredura visual imediata do Setor C! RABBIT3, puxe a telemetria do GPS da Saki agora!"
42040-70 = "……Jammer. Eles ativaram um bloqueador de frequência militar."
42040-71 = "(Nesse cenário… o rádio virou peso morto. Eu não consigo contatar a Saki, nem pedir suporte aéreo tático da Moe… Estamos cegas.)"
42040-72 = "(Eles neutralizaram a nossa vanguarda furtivamente, ativaram um bloqueador de pulso e nos isolaram na escuridão num piscar de olhos…)"
42040-73 = "(Sincronizar abates silenciosos e dominar a guerra eletrônica em um ambiente fechado exige um nível absurdo de controle.#nIsso não é trabalho de mercenários ou terroristas normais…)"
42040-74 = "(Primeira prioridade: resgatar a Saki…)"
42040-83 = "(Movimento rápido?! Nas minhas seis horas… Quando foi que ela chegou tão perto?!)"
42040-85 = "……"
42040-97 = "(Droga… O corredor é muito estreito, o cano do meu fuzil é muito longo pra virar a tempo!)"
42040-98 = "(Eu não sou especialista em combate corpo a corpo, mas vou ter que apostar tudo nisso!)"
42040-102 = "(Primeiro, vou quebrar o centro de gravidade dela com o peso do ombro――)"
42040-103 = "……FOXTROT."
42040-104 = "(……! Como assim?! Uma granada de luz a queima-roupa――!!)"
42040-113 = "……Tempo de resposta: 1.5 segundos. Mesmo levando em conta o trauma neurológico do clarão e da explosão sônica na sua cara, você foi letárgica demais."
42040-114 = "Você seguiu o manual básico de CQB e invadiu meu espaço pessoal para anular minha arma de fogo. Decisão aceitável.#nMas ao ser cegada, a teoria engessada mandou você tentar recuar. Em um embate letal, a sua única chance de sobrevivência seria abandonar a forma e jogar o peso do seu crânio contra o meu rosto em um reflexo primitivo."
42040-115 = "Argh…!"
42040-116 = "Não tensione esse músculo. Você vai acabar quebrando seu próprio braço."
42040-117 = "Quem é você…? A sua precisão e técnica militar…#nVocê não é uma contrabandista de rua…"
42040-118 = "……Em uma operação tática, a identidade do inimigo é irrelevante.#nO que importa é assumir o pior inferno possível e se preparar para ele."
42040-119 = "Até o veterano mais armado e blindado do planeta pode engolir uma bala perdida no escuro e morrer com o pescoço quebrado como um novato qualquer."
42040-120 = "É exatamente por isso que esquadrões de Operações Especiais são ensinados a agir com a precisão cirúrgica de um covarde medroso."
42040-121 = "Essa voz de gelo… essa ideologia inquebrável… Não pode ser…"
42040-122 = "Faz muito tempo que não nos vemos no campo de batalha, Comandante Tsukiyuki."
42040-127 = "……Eu fico muito feliz em reencontrar você."
42040-128 = "Veterana Yukino…?!"
42040-130 = "Próximo Episódio: A Sombra da Veterana"