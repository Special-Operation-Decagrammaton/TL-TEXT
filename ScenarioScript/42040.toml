[translation]
42040-1 = "Episódio 4; Reencontro Inesperado"
42040-3 = "……Aqui é RABBIT1. Horário atual, 1625."
42040-4 = "Rastreando o sinal de GPS da RABBIT3, identificamos a localização do suspeito que invadiu o Ponto S. Chegamos à área alvo."
42040-5 = "No Ponto R, nosso ponto de descida, está chovendo no momento e a visibilidade está limitada a menos de 500m, tomem cuidado."
42040-6 = "A-aqui é a RABBIT4…… Graças à chuva, não parece haver nenhum transeunte……."
42040-7 = "Não há combatentes de tocaia também…… Desta posição, consigo mirar em qualquer lugar……."
42040-8 = "Entendido. Prossiga, RABBIT2, por favor, relate."
42040-9 = "Aqui é a RABBIT2, realizei uma sabotagem no circuito fechado externo do prédio. #nCom isso, o alarme não deve tocar por um tempo."
42040-10 = "Mas……."
42040-11 = "RABBIT2, algum problema?"
42040-12 = "Não, quer dizer, não é um problema…… mas este prédio, parece muito familiar."
42040-14 = "Não está se enganando? Não há registros de operações realizadas perto daqui."
42040-15 = "Eu sei disso. Não é isso…… #nEu reconheço a \"estrutura\" deste prédio."
42040-16 = "Três vias de acesso e um interior que parece um labirinto de três andares…… #nNão é exatamente igual ao campo de treinamento de combate interno da SRT?"
42040-17 = "Kuhihi, agora que você mencionou, é idêntico mesmo."
42040-19 = "Então era por isso que eu me sentia tão calma, mesmo estando em território inimigo……."
42040-20 = "Sim. Justamente por ser um lugar familiar, #nseremos capazes de lidar com calma caso ocorra algum imprevisto."
42040-21 = "Porém, essa estrutura é desvantajosa para quem ataca. #nMesmo nos treinos dentro da academia, a taxa de vitória da defesa sempre era maior, então estou um pouco preocupada……."
42040-22 = "Saki, por que está com medo? Nós somos da SRT, esqueceu?"
42040-23 = "Mesmo que o inimigo tenha armas desconhecidas, se avançarmos com poder de fogo, não teremos problemas, kuhi……."
42040-24 = "……É verdade. Além disso, até a elite da PMC não conseguiu fazer nada contra nós……."
42040-25 = "Deixem o suporte comigo…… Está tudo bem, nós conseguimos."
42040-26 = "Então, iniciaremos a invasão. RABBIT2, siga para o ponto de operação!"
42040-31 = "Arrombando."
42040-36 = "Via de acesso, garantida!"
42040-37 = "RABBIT1, entrando no prédio!"
42040-41 = "……Setor A, limpo."
42040-42 = "Setor B, limpo!"
42040-43 = "Continuem avançando para o Setor C!"
42040-47 = "（……Estranho. Mesmo tendo entrado tão fundo, eles não apareceram）"
42040-48 = "（Não parece haver armadilhas, mas…… sinto que estou deixando passar algo……）"
42040-49 = "Aqui é a RABBIT2. #nRABBIT1, há uma barricada bloqueando o caminho à frente. #nO que faremos? Vamos romper por aqui mesmo?"
42040-53 = "Não, fazer muito barulho pode revelar nossa posição ao inimigo. #nVamos contornar."
42040-54 = "Entendido. Então vamos pela passagem central que está aberta……."
42040-55 = "RABBIT2, continue a operação――"
42040-59 = "Ugh……!"
42040-63 = "Que tiro foi esse!?"
42040-64 = "RABBIT2, relate. RABBIT2!"
42040-65 = "A comunicação…… foi cortada?"
42040-66 = "RABBIT4, solicito informações de observação. RABBIT3, verifique os dados de GPS!"
42040-70 = "……Um bloqueador de comunicação, é?"
42040-71 = "（Nesta situação…… a RABBIT2 não conseguirá solicitar apoio, nem dos outros membros do esquadrão）"
42040-72 = "（Atacar a vanguarda de surpresa e ativar um bloqueador para cortar a comunicação. #n　Isolar cada membro da unidade……）"
42040-73 = "（Para subjugar o oponente com o rádio em silêncio, é necessário um trabalho em equipe de alto nível…… #nIsso não é algo que mercenários ou estudantes comuns conseguiriam fazer……）"
42040-74 = "（Primeiro, preciso resgatar a RABBIT2……）"
42040-83 = "（Um ataque surpresa!? Desde quando……?）"
42040-85 = "……."
42040-97 = "（Droga…… o corredor é estreito e minha arma principal está atrapalhando……）"
42040-98 = "（Não estou acostumada com combate corpo a corpo, mas não tenho escolha……）"
42040-102 = "（Primeiro, vou desequilibrar o centro de gravidade do oponente――）"
42040-103 = "……FOXTROT。"
42040-104 = "（……！Não pode ser, uma granada de luz――）"
42040-113 = "……1,5 segundos. Mesmo considerando o impacto do estresse causado pelo estrondo e pelo clarão, sua reação foi lenta."
42040-114 = "Eu elogio o fato de você ter entrado no alcance seguindo o manual de CQB, mas#nnessa situação, teria sido melhor dar uma cabeçada do que recuar como manda o figurino."
42040-115 = "Ugh……!"
42040-116 = "É melhor não se mexer. Seu braço vai quebrar."
42040-117 = "Quem é você……?#nNão parece ser um mercenário ou um traficante de armas……."
42040-118 = "……Em uma operação, o que importa não é a identidade do oponente.#nO que importa é prever o pior cenário possível."
42040-119 = "Mesmo um veterano equipado com armamento de ponta pode ser neutralizado por uma bala perdida no campo de batalha."
42040-120 = "Por isso, exige-se que as forças especiais ajam com a cautela de um covarde."
42040-121 = "Essa voz, não pode ser……"
42040-122 = "Faz tempo, capitã do esquadrão Tsukiyuki."
42040-127 = "……Estou feliz por nos reencontrarmos."
42040-128 = "Yukino-senpai……!?"
42040-130 = "Próximo episódio: A sombra da veterana"
