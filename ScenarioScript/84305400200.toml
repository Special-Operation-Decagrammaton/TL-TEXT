[translation]
84305400200-5 = "Vocês duas, muito obrigado pelo trabalho duro."
84305400200-6 = "Foi uma operação tensa como há muito tempo não via."
84305400200-7 = "B-bem..."
84305400200-9 = "Heh... é verdade."
84305400200-11 = "Com isso, as coisas se acalmam... certo?"
84305400200-12 = "Sim. O grupo criminoso foi capturado. O algoritmo Big Sister também foi enterrado na escuridão. A situação foi completamente resolvida."
84305400200-13 = "Vocês duas podem voltar primeiro. Se eu continuar aqui, algum aluno pode acabar percebendo meu envolvimento."
84305400200-14 = "Deixando o Sensei de lado... ainda é cedo demais para os outros alunos saberem."
84305400200-15 = "Entendido. É só eu inventar qualquer desculpa, né?"
84305400200-20 = "Rio, o que você pretende fazer?"
84305400200-21 = "Vou deixar o Millennium por um tempo novamente. Não pretendo deixar nenhum rastro de que estive aqui."
84305400200-25 = "...Entendo."
84305400200-26 = "Compreendido."
84305400200-30 = "Então, até mais."
