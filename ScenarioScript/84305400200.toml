[translation]
84305400200-5 = "二人とも、本当にお疲れ様。"
84305400200-6 = "久々にひりつく作戦だったな。"
84305400200-7 = "え、ええと……。"
84305400200-9 = "ふっ……その通りだね。"
84305400200-11 = "これでひと段落……でいいんだよな？"
84305400200-12 = "ええ。犯行グループは一網打尽。ビッグシスターアルゴリズムも闇に葬った。事態は完全に収束したわ。"
84305400200-13 = "二人は先にもう戻ってちょうだい。このままだと私の関与に気づく生徒が出てくるかもしれない。"
84305400200-14 = "先生はともかく……他の生徒にはまだ早いわ。"
84305400200-15 = "わーったよ。適当に言っときゃいいんだろ？"
84305400200-20 = "リオ、君はどうするつもりだい？"
84305400200-21 = "またしばらくミレニアムを離れるわ。ここにいた痕跡は一つも残すつもりはない。"
84305400200-25 = "……そうか。"
84305400200-26 = "承知した。"
84305400200-30 = "では、また。"
