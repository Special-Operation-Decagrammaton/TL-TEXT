[translation]
2300102-1 = "Você não gostaria de ir às compras comigo?"
2300102-2 = "Ah, Sensei. Vo-você realmente veio."
2300102-3 = "[s1] \"O que houve?\"\n[s2] \"É natural eu vir quando a Fuuka-tan me chama.\""
2300102-4 = "Bem... na verdade, eu estava pensando em ir às compras hoje."
2300102-5 = "Bem... na verdade, eu estava pensando em ir às compras hoje."
2300102-6 = "Mas parece que a quantidade vai ser maior do que eu esperava."
2300102-7 = "Eu pensei que talvez fosse um incômodo pedir para o Sensei me ajudar, mas..."
2300102-8 = "[s] \"Se é algo em que posso ajudar, eu ajudo.\""
2300102-9 = "Fufu, pensando bem, o Sensei é exatamente esse tipo de pessoa."
2300102-10 = "Entendido. Então, vamos às compras juntos hoje."
2300102-11 = "Porque tem muitos, muitos ingredientes que eu preciso comprar♪"
2300102-13 = "Uau... não importa quantas vezes eu venha a um supermercado grande, eu sempre fico empolgada."
2300102-14 = "[s] \"Você gosta de supermercados grandes?\""
2300102-15 = "Se eu gosto de supermercados grandes, ou melhor..."
2300102-16 = "Quando sinto o ar frio da seção de alimentos frescos, meu coração começa a bater mais forte naturalmente."
2300102-17 = "Ao ver os vegetais e frutas coloridas alinhados, não consigo evitar de ficar hipnotizada."
2300102-18 = "É como se fosse uma caixa de joias de ingredientes."
2300102-19 = "Não é assim para todo mundo?"
2300102-20 = "[s] \"Hmm, será?\""
2300102-22 = "Ah! Olhe só para este pepino. Ele ainda tem os espinhos e é áspero ao toque,"
2300102-23 = "e o talo não está seco, está firme. Este aqui tem uma qualidade realmente excelente."
2300102-27 = "Ah! Esta melancia aqui faz um som bom quando batemos nela, isso também é maravilhoso!"
2300102-28 = "[s] \"Você é bem acostumada com esse tipo de coisa, hein, Fuuka.\""
2300102-29 = "Ah, desculpe, eu me diverti tanto que acabei me empolgando. Ahaha..."
2300102-30 = "Por mais que não pareça, eu seleciono cuidadosamente os ingredientes para as refeições que servimos na escola."
2300102-31 = "...Claro, mesmo me preparando bem, quando se trata de cozinhar em grandes quantidades, às vezes acabo matando o sabor dos ingredientes."
2300102-32 = "Às vezes, recebo muitas reclamações, mas..."
2300102-33 = "[s] \"Eu sei muito bem que você se esforça mais do que qualquer um, Fuuka.\""
2300102-34 = "Ugh... você diz essas coisas com tanta naturalidade de novo..."
2300102-35 = "E-e além disso, vamos lá! Já terminamos de escolher todos os ingredientes."
2300102-36 = "[s] \"Então, depois de comprar isso, as compras acabam?\""
2300102-37 = "Não, Sensei."
2300102-38 = "As compras de verdade começam agora."
2300102-39 = "[s] \"Começam agora...?\""
2300102-41 = "Com licença! Bem, eu gostaria de comprar estes produtos aqui."
2300102-42 = "Aconteceu alguma coisa? Cliente."
2300102-43 = "Os pimentões e pepinos daqui estão em ótimas condições, não estão? O tamanho também é perfeito. A qualidade é maravilhosa."
2300102-44 = "Se eu fizer comida com isso, com certeza ficará uma delícia."
2300102-45 = "Toda vez que visito este lugar, fico impressionada com a qualidade do frescor."
2300102-46 = "Obrigado, você é uma cliente frequente, não é? Gostaria de fazer um pedido?"
2300102-47 = "Eu estava pensando em comprar uma grande quantidade."
2300102-48 = "Mais do que o suficiente para alimentar todos os alunos de Gehenna."
2300102-49 = "Hmm, entendo! ...Especificamente, quanto você gostaria de levar?"
2300102-50 = "Eu estava pensando em comprar esta quantidade destes itens de uma só vez..."
2300102-52 = "O que acha deste preço?"
2300102-55 = "H-hmm, esse preço é um pouco... eu precisaria consultar o gerente da área..."
2300102-56 = "Se vocês venderem nessas condições, comprarei todos os outros ingredientes da cantina escolar aqui nesta loja pelo próximo mês."
2300102-57 = "Hmmmm, isso é...!"
2300102-58 = "...Entendido. Nessas condições, nem precisamos consultar ninguém. Vamos fechar negócio com os termos que você propôs."
2300102-59 = "Ah. Obrigada por um excelente negócio."
2300102-61 = "[ns] \"Fuuka, incrível...\""
2300102-62 = "Afinal, eu sou a chefe do Clube de Merenda de Gehenna. Já estou acostumada com esse tipo de coisa!"
2300102-63 = "Vamos lá. Então, vamos voltar, Sensei!"
2300102-65 = "(Depois disso, carregando uma grande quantidade de ingredientes, voltei para a Academia Gehenna junto com a Fuuka)"
