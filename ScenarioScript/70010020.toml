[translation]
70010020-1 = "The End of the Manual Era (2)"
70010020-2 = "Hmm, what should I ask next...?"
70010020-3 = "（Everyone must be getting tired right about now...）"
70010020-5 = "Inside the Box"
70010020-6 = "There are too many questions! There's no end to this!"
70010020-7 = "Setting that aside... Minori, aren't you answering every single question?!"
70010020-8 = "Hm? Me?"
70010020-9 = "I'm just giving random answers to the ones I don't know."
70010020-10 = "What?! What if she finds out?!"
70010020-11 = "Worried she'll find out? Then let me ask you, what is the definition of a 'question'?"
70010020-13 = "「Inquiring about a fact one does not know」――"
70010020-14 = "Right?"
70010020-15 = "Exactly. You ask because you don't know. That's a question."
70010020-16 = "If you don't know, then you wouldn't know if the answer is right or wrong, would you?"
70010020-17 = "...So you're just giving an answer, then."
70010020-18 = "It's like the answer to, 「Meruly, what does this scene mean?」 isn't it."
70010020-19 = "Senpai, I don't think they're asking because they don't know in that case."
70010020-21 = "Either way, there's no need to worry about being exposed. It's enough to just answer with what we know."
70010020-23 = "Hmm... I've pretty much asked everything I wanted to ask."
70010020-25 = "I'm glad you are satisfied!#nThen, to prepare for tomorrow, let's turn off the power――"
70010020-27 = "I know! I'll have it draw a picture!"
70010020-29 = "Huh?!"
70010020-31 = "I'm pretty sure that thing from Millennium could draw pictures, too."
70010020-32 = "So without further ado... 『Draw a majestic portrait of me!』#nMhm, I can't wait!"
70010020-33 = "『Draw a majestic portrait of me!』...?"
70010020-34 = "I've only ever drawn blueprints..."
70010020-35 = "Hmm..."
70010020-41 = "...Eh?"
70010020-42 = "Why are you looking at me?#n...You want me to draw it?!"
70010020-43 = "Out of all of us here, the great author Meruly is the most qualified."
70010020-44 = "Senpai, you aren't going to meet your deadline anyway.#nYou haven't made a single bit of progress since you got in here."
70010020-45 = "Good for you, great author Meru, getting a chance to show off your skills. Heheh."
70010020-47 = "No way!"
70010020-48 = "Just because I'm a manga artist, you're dead wrong if you think I'll just draw a picture on command!"
70010020-49 = "Art isn't free! And drawing isn't easy to begin with!"
70010020-51 = "Senpai! Let's deal with the crisis right in front of us first!#nBesides, didn't you come here looking for material?!"
70010020-52 = "No, no, no!! Tell her it doesn't have that feature! Just tell her!"
70010020-53 = "Hmm, no response."
70010020-55 = "That's probably because... it lacks the feature...#nIf you could just wait a moment..."
70010020-57 = "It lacks the feature? Does that mean it's inferior to that thing from Millennium?"
70010020-58 = "Then it's completely useless."
70010020-60 = "...Let's toss it into the blast furnace and recycle it."
70010020-61 = "Huh?!"
70010020-63 = "I just heard from the Publishing Department that they're short on metal for type."
70010020-64 = "I'll wait a little longer, and if there's still no response, I'll melt it down!"
70010020-68 = "Meruly! No, Lady Meruly!!"
70010020-69 = "Well now, they say men of letters leave behind type...#nBut it looks like our very bodies are going to become type... Bleh..."
70010020-70 = "Even Club President Yakumo loses her cool when faced with a huge crisis..."
70010020-72 = "Argh, fine, I get it! Minori, give me a pen! Hurry!!"
70010020-73 = "I'm fine. A resolute end is fitting for a revolutionary."
70010020-74 = "It's an honor to stand alongside Comrade Meru, who stuck to her principles to the very end..."
70010020-75 = "Why are you accepting this?! Hurry up!! Hand over the pen!!!"
70010020-78 = "Ooh! There it is!"
70010020-82 = "Wow... This is incredible work!"
70010020-84 = "（Himeki Meru... I promise to pay you for the drawing later...）"
70010020-85 = "（Thank you... really...!）"
70010020-86 = "Hmm... It looks a little unnatural...#nIs this the limit of a computer?"
70010020-90 = "Well, this is what you'd expect――"
70010020-96 = "BAM!! BAM!!"
70010020-97 = "What's that?"
70010020-98 = "Th-That's the sound of it reading a disk!"
70010020-100 = "I've had it!!"
70010020-102 = "Senpai! Please calm down!#nThey'll hear you outside?!"
70010020-103 = "I'm sure she means you drew lines so cleanly it looks like they were printed!"
70010020-105 = "Let me go!! Let me punch her!!"
70010020-107 = "President, it's time for the new pudding tasting session."
70010020-108 = "Is it that time already?! I got so absorbed in my testing."
70010020-109 = "Chief Marina, good work."
70010020-110 = "I'll recommend you as an official candidate for this month's 『Hero of the Red Winter Federation』!"
70010020-112 = "Th-Thank you very much, President!"
70010020-113 = "Finally... let me ask one last crucial question regarding the future of Red Winter."
70010020-114 = "The question must be kept top secret. Everyone, leave the room!"
70010020-115 = "E-Everyone, leave the room!"
70010020-116 = "Yes, Ma'am! Understood!"
70010020-126 = "Hmm..."
70010020-127 = "My, my... we can effortlessly obtain Red Winter's top secrets..."
70010020-128 = "We are truly blessed~ Heheh~"
70010020-129 = "The tyrant herself is leaking top secret information... That's more than enough justification for a revolution."
70010020-131 = "If she finds out we know, a triple purge won't be enough?!"
70010020-135 = "A piece of paper came in."
70010020-137 = "Let me see..."
70010020-138 = "『I want Comrade to come to Red Winter more often.』"
70010020-142 = "『And I want him to play with me a lot. What should I do?』"
70010020-143 = "..."
70010020-145 = "Ah..."
70010020-146 = "This gets a 9..."
70010020-148 = "If she finds out, even 9 purges won't be enough...!?"
70010020-149 = "We were definitely looking for material, but this is too heavy!"
70010020-150 = "Come on! Isn't there a good answer! Everyone, rack your brains!"
70010020-152 = "How are we supposed to answer such a fluffy letter?!"
70010020-153 = "Anything will do, just hurry! Everyone, write down whatever comes to mind!!"
70010020-156 = "It's out!"
70010020-157 = "Let's see..."
70010020-159 = "『Good question, Comrade! Please implement the following!』"
70010020-160 = "『The introduction of a two-day work week, a threefold increase in the Publishing Department's budget, and budget allocation for doujin activities.』"
70010020-161 = "『...Implement the above, and you'll be able to play with Sensei a lot more!』"
70010020-164 = "What! That's easy!"
70010020-165 = "Thank you, supercomputer!"
70010020-171 = "Safe..."
70010020-177 = "I'll lock up. Go on ahead."
70010020-178 = "Understood! Excuse me, then!"
70010020-186 = "It's safe to come out now."
70010020-187 = "Ahhhh! The air of freedom!"
70010020-189 = "Takane is fast asleep. Well, it is already night."
70010020-190 = "We somehow managed to survive..."
70010020-192 = "I'm sorry, everyone! I swear I'll repay this debt someday! I promise on my honor!"
70010020-193 = "Please, just endure it for one more day tomorrow! I'm begging you!"
70010020-194 = "There's no need for that. Because tonight, our revolution will bear fruit!"
70010020-195 = "Yeah! Tonight, the revolution――"
70010020-199 = "――Wait, what did you just say?"
70010020-200 = "The final piece to save our long-suffering comrades has fallen into place."
70010020-201 = "In other words, all we have to do is drag down President Cherino, the root of all evil."
70010020-202 = "How did it come to that?!"
70010020-203 = "Thanks to Comrade Marina bringing this 『computer』 into the Secretariat."
70010020-204 = "This revolution won't start from the outside... We'll start it from the inside!"
70010020-206 = "It's time for liberation, Comrade Marina!"
70010020-207 = "Th-That's――!!"
70010020-214 = "Onwards! Liberation is right before our eyes!!"
70010020-219 = "...So it ended up like this anyway."
70010020-220 = "Waaah! My deadline! What am I gonna do!!"
70010020-224 = "What's all the commotion? What happened while I was sleeping..."
70010020-225 = "This is just like...#na virus bursting out of a computer..."
70010020-227 = "Like a... Trojan horse?"
70010020-229 = "Finally here! Red Winter!"
70010020-230 = "Red Winter's supercomputer... I can't wait."
70010020-231 = "I wonder what kind of specs it has? I want to see it a――"
70010020-239 = "Supercomputer Revolutionary Army, overthrow the Secretariat!!"
70010020-240 = "Let us seize victory with the power of the supercomputer!!"
70010020-245 = "You supercomputer, you betrayed me?!"
70010020-246 = "Purge! Purge!!!!!!"
70010020-259 = "Supercomputer Revolutionary... Army? Betrayal...?"
70010020-263 = "I'd better... lower my kid's specs..."
70010020-264 = "The End of the Manual Era"