[translation]
70010020-1 = "O Fim do Período Manual (2)"
70010020-2 = "Hmm, o que devo perguntar a seguir..."
70010020-3 = "（Todos já devem estar começando a ficar cansados...）"
70010020-5 = "Dentro da caixa"
70010020-6 = "São perguntas demais! Assim não vamos chegar a lugar nenhum!"
70010020-7 = "Deixando isso de lado... Minori-san, você não está respondendo a todas as perguntas!?"
70010020-8 = "Hm? Eu?"
70010020-9 = "Eu respondo qualquer coisa quando não sei a resposta."
70010020-10 = "Hã! E se fizerem isso e descobrirem, o que você vai fazer!?"
70010020-11 = "Preocupada em ser descoberta? Então me diga, qual é a definição de \"pergunta\"?"
70010020-13 = "\"Pedir a alguém para esclarecer um fato que você desconhece\"――"
70010020-14 = "Não é isso?"
70010020-15 = "Exato. Você pergunta porque não sabe. Isso é uma pergunta."
70010020-16 = "Se você não sabe, também não saberá se a resposta está certa ou errada, certo?"
70010020-17 = "……Então você só respondeu por responder, é isso."
70010020-18 = "É como a resposta para \"Meru-san, o que esta cena significa?\", não é?"
70010020-19 = "Senpai, nesse caso, acho que não é porque não sabemos que estamos perguntando, sabe?"
70010020-21 = "De qualquer forma, não há risco de ser descoberta. Basta responder apenas o que você sabe."
70010020-23 = "Hum... Acho que já perguntei quase tudo o que queria."
70010020-25 = "Fico feliz que esteja satisfeito!#nEntão, para nos prepararmos para amanhã, vou desligar――"
70010020-27 = "Já sei! Peça para desenhar algo!"
70010020-29 = "Hã!?"
70010020-31 = "Se me lembro bem, aquele dispositivo do Millennium também conseguia desenhar."
70010020-32 = "Então, vamos lá... \"Desenhe um retrato digno de mim!\"#nHum, estou ansioso!"
70010020-33 = "\"Desenhe um retrato digno de mim!\", você disse...?"
70010020-34 = "Eu só desenhei plantas de projetos até hoje..."
70010020-35 = "Hmm..."
70010020-41 = "……Hã?"
70010020-42 = "Por que está olhando para mim?#n……Quer dizer que sou eu quem tem que desenhar!?"
70010020-43 = "Dentre nós, a pessoa mais qualificada é a grande escritora Meru-san."
70010020-44 = "Senpai, de qualquer forma, você não vai conseguir terminar o manuscrito.#nVocê não avançou nada desde que entramos aqui, não é?"
70010020-45 = "Que bom para você, grande escritora Meru-san, ter uma oportunidade de brilhar. Mufufu."
70010020-47 = "Nem pensar!"
70010020-48 = "Só porque sou mangaká, não significa que vou sair desenhando tudo o que me pedirem!"
70010020-49 = "Desenhos não são de graça! E, para começar, desenhar não é nada fácil!"
70010020-51 = "Senpai! Vamos resolver a crise que temos diante de nós agora!#nQuer dizer, você não veio aqui para buscar inspiração!?"
70010020-52 = "Não, não, não!! Não tenho essa função! Diga que não tenho!"
70010020-53 = "Hum, não há resposta."
70010020-55 = "Provavelmente... é porque não está nas funções...#nSe puder esperar um pouco..."
70010020-57 = "Não tem a função? Isso significa que é inferior àquele dispositivo do Millennium?"
70010020-58 = "Nesse caso, não serve para nada."
70010020-60 = "……Vou jogar no alto-forno e reciclar."
70010020-61 = "Hã!?"
70010020-63 = "Ouvi dizer que o departamento editorial está precisando de metal para tipos móveis."
70010020-64 = "Vou esperar mais um pouco, e se ainda assim não responder, vamos derreter!"
70010020-68 = "Meru-san! Não, Meru-sama!!"
70010020-69 = "Puxa vida, dizem que os escritores deixam seus textos para a posteridade...#nMas parece que vou acabar virando metal para tipos móveis... Argh..."
70010020-70 = "Até a Chefe Yakumo perde a compostura diante de uma crise dessas..."
70010020-72 = "Ah, chega, eu faço! Minori, me empresta a caneta! Rápido!!"
70010020-73 = "Eu estou bem. Para um revolucionário, um fim digno é o que convém."
70010020-74 = "Foi uma honra caminhar ao lado de Mel, uma camarada que manteve suas convicções até o fim."
70010020-75 = "Por que você está aceitando isso?! Anda logo!! Me passa a caneta!!!"
70010020-78 = "Oh! Saiu!"
70010020-82 = "Ora... não é que ficou um trabalho magnífico?"
70010020-84 = "(Himeki Mel... o pagamento pelo desenho, eu pagarei depois, com certeza...)"
70010020-85 = "(Muito... obrigada...!)"
70010020-86 = "Hum... parece um pouco artificial, mas...#nserá que este é o limite do computador?"
70010020-90 = "Bem, no fim das contas, é só isso mesmo—"
70010020-96 = "Tum!! Tum!!"
70010020-97 = "O que é isso?"
70010020-98 = "É, é o som do disco sendo lido!"
70010020-100 = "Já chega, estou furiosa!!"
70010020-102 = "Sênior! Por favor, acalme-se!#nVão acabar ouvindo lá fora!?"
70010020-103 = "Com certeza ela quis dizer que as linhas ficaram tão limpas que parecem ter sido impressas!"
70010020-105 = "Me solta!! Deixa eu dar um soco nela!!"
70010020-107 = "Presidente, está na hora da degustação dos novos pudins."
70010020-108 = "Já é essa hora?! Fiquei imersa demais na verificação."
70010020-109 = "Comissária Marina, bom trabalho."
70010020-110 = "Vou recomendá-la como candidata oficial a 'Herói Federal de Red Winter' deste mês!"
70010020-112 = "Mu-muito obrigada, Presidente!"
70010020-113 = "Por fim... tenho uma pergunta importante sobre o futuro de Red Winter para fazer.#n"
70010020-114 = "O assunto é ultrassecreto. Todos, saiam da sala!"
70010020-115 = "To-todos, retirar-se!"
70010020-116 = "Sim! Entendido!"
70010020-126 = "Hum..."
70010020-127 = "Nossa... conseguimos informações ultrassecretas de Red Winter tão facilmente~"
70010020-128 = "Que sorte a nossa~ Mufufu~"
70010020-129 = "A própria tirana vazando informações confidenciais... é uma justificativa mais do que suficiente para a revolução."
70010020-131 = "Se descobrirem que a gente sabe disso, três expurgos não vão ser o bastante, né!?"
70010020-135 = "O papel saiu."
70010020-137 = "Vejamos..."
70010020-138 = "'Camarada, quero que o Sensei venha mais vezes a Red Winter'"
70010020-142 = "'E também, quero brincar muito com ele. O que eu devo fazer?'"
70010020-143 = "..."
70010020-145 = "Ah..."
70010020-146 = "Isso é... nota 9..."
70010020-148 = "Se descobrirem, acho que nem 9 expurgos vão ser o bastante...!?"
70010020-149 = "A gente estava procurando por um furo de reportagem, mas isso é pesado demais!"
70010020-150 = "Alguma ideia! Não tem uma resposta boa? Pessoal, espremam o cérebro!"
70010020-152 = "Como espera que a gente responda a essa carta tão fofa!?"
70010020-153 = "Qualquer coisa serve, rápido! Cada um escreva o que vier à cabeça!!"
70010020-156 = "Saiu!"
70010020-157 = "Vejamos..."
70010020-159 = "'Excelente pergunta, camarada! Então, pratique os seguintes pontos!'"
70010020-160 = "'Introdução da semana de trabalho de 2 dias, aumento de 3 vezes no orçamento do Departamento de Publicações, orçamento para atividades de doujin'"
70010020-161 = "'...Se praticar isso, poderá brincar muito mais com o Sensei!'"
70010020-164 = "Ora! Não é algo simples?"
70010020-165 = "Obrigado, supercomputador!"
70010020-171 = "Salvos..."
70010020-177 = "Eu trancarei a porta. Voltem na frente."
70010020-178 = "Entendido! Então, com licença!"
70010020-186 = "Já pode sair, está tudo bem."
70010020-187 = "Ahhh! O ar da liberdade!"
70010020-189 = "Takane está dormindo. Bem, já é noite, afinal."
70010020-190 = "Conseguimos sobreviver de alguma forma..."
70010020-192 = "Pessoal, me desculpem! Vou pagar essa dívida, eu prometo! Dou minha palavra de honra!"
70010020-193 = "Aguentem só mais um dia, por favor!"
70010020-194 = "Não será necessário. Nossa revolução dará frutos esta noite!"
70010020-195 = "Sim! A revolução é esta noite—"
70010020-199 = "—O que você disse?"
70010020-200 = "A peça final para salvar os camaradas que continuaram sofrendo está completa."
70010020-201 = "Ou seja, basta derrubar a causa de tudo, a Presidente Cherino."
70010020-202 = "Por que chegamos a esse ponto!?"
70010020-203 = "Graças à camarada Marina, que trouxe este 'computador' para a secretaria."
70010020-204 = "Desta vez, a revolução não começará de fora... mas de dentro!"
70010020-206 = "É hora da libertação, camarada Marina!"
70010020-207 = "Ma-mas que coisa—!!"
70010020-214 = "Vamos avançar! A libertação está próxima!!"
70010020-219 = "...No fim das contas, acabou assim."
70010020-220 = "Ahhh! O prazo! O que eu faço!!"
70010020-224 = "Que barulheira é essa? O que aconteceu enquanto eu dormia..."
70010020-225 = "Isso é, tipo... #nUma existência que saiu de dentro do computador como um vírus..."
70010020-227 = "Tipo um... cavalo de Troia?"
70010020-229 = "Finalmente chegamos! Red Winter!"
70010020-230 = "O supercomputador da Red Winter... estou tão empolgada."
70010020-231 = "Qual será o desempenho dele? Mal posso esperar para ver—"
70010020-239 = "Exército da revolução do supercomputador, derrubem a secretaria!!"
70010020-240 = "Vamos alcançar a vitória com o poder do supercomputador!!"
70010020-245 = "Seu supercomputador, você me traiu!?"
70010020-246 = "Expurgo, expurgo!!!!!!"
70010020-259 = "Revolução do supercomputador... exército? Traição...?"
70010020-263 = "Vou reduzir o desempenho da minha criança..."
70010020-264 = "O fim da era manual"
