[translation]#[Texto Final. - Filipe 08/07.]
70010020-1 = "O Fim da Era Manual (2)"
70010020-2 = "Hmm, o que perguntar agora……"
70010020-3 = "(As outras devem estar cansadas……)"
70010020-5 = "Dentro da caixa"
70010020-6 = "São perguntas demais! Sem fim!"
70010020-7 = "Mas, aliás…… Minori, você não respondeu a todas?"
70010020-8 = "Hã? Foi eu?"
70010020-9 = "O que não sei, respondo de qualquer jeito."
70010020-10 = "Hã! Se descobrirem, o que fazemos?"
70010020-11 = "Medo de descobrirem? Então me diga, qual é a definição de 'pergunta'?"
70010020-13 = "É 'questionar o outro sobre algo que não se sabe'――"
70010020-14 = "Isso?"
70010020-15 = "Isso. Se não sabe, pergunta. É a definição."
70010020-16 = "Se não sabe, também não sabe se a resposta está certa ou errada, né?"
70010020-17 = "……Então, só respondi, é isso?"
70010020-18 = "Como quando você pergunta 'Mel, o que esta cena significa?'"
70010020-19 = "Senpai, nesse caso, você pergunta porque quer saber, não?"
70010020-21 = "De qualquer forma, não há risco. Só preciso responder o que sei."
70010020-23 = "Hmm…… já perguntei quase tudo o que queria."
70010020-25 = "Que bom que gostou!#nEntão, para amanhã, vou desligar――"
70010020-27 = "Ah! Vamos pedir um desenho!"
70010020-29 = "Hã!?"
70010020-31 = "Aquele de Millennium também desenhava."
70010020-32 = "Então…… 'Desenhe um retrato meu cheio de dignidade!'#nHmm, mal posso esperar!"
70010020-33 = "'Desenhe um retrato meu cheio de dignidade!'……?"
70010020-34 = "Eu só sei desenhar plantas……"
70010020-35 = "Hmm……"
70010020-41 = "……Hã?"
70010020-42 = "Por que olham pra mim?…… Quer dizer que eu vou desenhar?"
70010020-43 = "Entre nós, a mais indicada é a grande escritora Mel."
70010020-44 = "Senpai, de qualquer forma, não vai terminar o manuscrito.#nNão desenhou nada desde que entrou aqui."
70010020-45 = "Que bom, a grande Mel vai ter seu momento. Mufufu."
70010020-47 = "Não quero!"
70010020-48 = "Só porque sou mangaká, acham que desenho de graça? Engano!"
70010020-49 = "Desenho não é de graça! E não é fácil!"
70010020-51 = "Senpai! Vamos resolver a crise agora! E você veio buscar ideias, não?"
70010020-52 = "Não, não, não!! Não tenho essa função! Digam que não tenho!"
70010020-53 = "Hmm, sem resposta."
70010020-55 = "Provavelmente…… não tem essa função……#n……se puder esperar……"
70010020-57 = "Não tem função? Então é inferior ao de Millennium?"
70010020-58 = "Assim, é inútil."
70010020-60 = "……Vou jogar na fornalha e reciclar."
70010020-61 = "Hã!?"
70010020-63 = "O departamento de publicações precisa de metal para tipos."
70010020-64 = "Espero um pouco, se não responder, derreto!"
70010020-68 = "Mel! Mel-sama!"
70010020-69 = "Dizem que os literatos deixam tipos, mas……#n……vamos virar tipos vivos…… gué……"
70010020-70 = "Até a presidente entra em pânico!"
70010020-72 = "Ah, tá bom! Minori, me empresta a caneta! Rápido!"
70010020-73 = "Estou bem. Para um revolucionário, um fim firme é adequado."
70010020-74 = "Foi uma honra caminhar com a camarada Mel."
70010020-75 = "Nao aceite!! Me dá a caneta!"
70010020-78 = "Oh! Saiu!"
70010020-82 = "Que…… trabalho magnífico!"
70010020-84 = "(Mel Himeda…… vou pagar pelo desenho……)"
70010020-85 = "(Muito obrigado!)"
70010020-86 = "Hmm…… meio estranho……#n……será que é o limite do computador?"
70010020-90 = "Bom, no fim das contas――"
70010020-96 = "DONG!! DONG!!"
70010020-97 = "O que foi?"
70010020-98 = "É-é o som do disco sendo lido!"
70010020-100 = "Me deu raiva!!"
70010020-102 = "Senpai! Calma!#nVai dar pra ouvir lá fora!"
70010020-103 = "Acho que ela quis dizer que desenhou tão bem que parece impresso!"
70010020-105 = "Solta!! Deixa eu dar um soco!"
70010020-107 = "Presidente, é hora da degustação de pudim."
70010020-108 = "Já é hora? Fiquei tão absorta."
70010020-109 = "Marina, bom trabalho."
70010020-110 = "Vou te indicar para o prêmio de 'Herói Federal de Red Winter'!"
70010020-112 = "M-muito obrigado, presidente!"
70010020-113 = "Por fim…… vou fazer uma pergunta crucial sobre o futuro de Red Winter."
70010020-114 = "É secreta. Todos, saiam!"
70010020-115 = "T-todos, retirem-se!"
70010020-116 = "Sim! Entendido!"
70010020-126 = "Hmm……"
70010020-127 = "Ah, que maravilha…… informações secretas de Red Winter chegando fácil~"
70010020-128 = "Que alegria~ Mufufu~"
70010020-129 = "O próprio tirano vazando segredos…… justificativa para a revolução."
70010020-131 = "Se descobrirem que sabemos, não vai ser só purga!"
70010020-135 = "Chegou papel."
70010020-137 = "Vamos ver……"
70010020-138 = "'Quero que os camaradas venham mais a Red Winter'"
70010020-142 = "'E quero brincar muito. O que fazer?'"
70010020-143 = "……"
70010020-145 = "Ah……"
70010020-146 = "Isso é…… 9 pontos……"
70010020-148 = "Se descobrirem, não vai ser só purga!"
70010020-149 = "Vim buscar ideias, mas isso é pesado demais!"
70010020-150 = "Uma boa resposta! Pensem!"
70010020-152 = "Como responder a esta carta fofa?"
70010020-153 = "Qualquer coisa, rápido! Escrevam o que vier à mente!"
70010020-156 = "Saiu!"
70010020-157 = "Vamos ver……"
70010020-159 = "'Boa pergunta, camarada! Pratique o seguinte!'"
70010020-160 = "'Jornada de 2 dias por semana, triplo do orçamento do departamento de publicações, verba para atividades independentes'"
70010020-161 = "'……Assim, poderá brincar mais com o Sensei!'"
70010020-164 = "Que fácil!"
70010020-165 = "Obrigado, supercomputador!"
70010020-171 = "Salvo……"
70010020-177 = "Vou trancar. Voltem."
70010020-178 = "Entendido! Até logo!"
70010020-186 = "Podem sair."
70010020-187 = "Ufa! Ar livre!"
70010020-189 = "Takane dormiu. Já é noite."
70010020-190 = "Sobrevivemos……"
70010020-192 = "Desculpe a todos! Vou pagar essa dívida! Em minha honra, prometo!"
70010020-193 = "Aguentem mais um dia!"
70010020-194 = "Não precisa. Nossa revolução acontecerá esta noite!"
70010020-195 = "Sim! A revolução esta noite――"
70010020-199 = "――como assim?"
70010020-200 = "A peça final para salvar os camaradas que sofreram está pronta."
70010020-201 = "Ou seja, basta derrubar a presidente Cherino."
70010020-202 = "Por que isso?"
70010020-203 = "Graças à camarada Marina, que trouxe este 'computador'."
70010020-204 = "A revolução de hoje será de dentro!"
70010020-206 = "Hora da libertação, camarada Marina!"
70010020-207 = "Isso não pode――!!"
70010020-214 = "Avante! A libertação está próxima!"
70010020-219 = "……No fim, deu nisso."
70010020-220 = "Ah! O prazo! O que faço?"
70010020-224 = "O que foi? Enquanto eu dormia……"
70010020-225 = "Isso é como……#n……um vírus que saiu do computador……"
70010020-227 = "Tipo um…… cavalo de Troia?"
70010020-229 = "Finalmente chegamos! Red Winter!"
70010020-230 = "O supercomputador de Red Winter…… mal posso esperar."
70010020-231 = "Como será? Quero ver――"
70010020-239 = "Exército Revolucionário do Supercomputador, derrubem o gabinete!"
70010020-240 = "Com o poder do supercomputador, vamos vencer!"
70010020-245 = "Supercomputador, você me traiu!?"
70010020-246 = "PURGA! PURGA!!!!!!"
70010020-259 = "Exército Revolucionário do Supercomputador?…… Traição?"
70010020-263 = "Vou diminuir o desempenho do meu……"
70010020-264 = "O Fim da Era Manual"