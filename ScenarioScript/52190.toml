[translation]
52190-1 = "Episódio 19: Memórias do Outro Lado"
52190-5 = "Tem certeza de que o \"Templo do Crepúsculo\" fica mesmo por aqui?"
52190-6 = "……Sim, é por aqui mesmo."
52190-7 = "Mesmo neste campo de neve, existem pontos de referência."
52190-8 = "As árvores cobertas de neve, o rio congelado... e aquela colina também."
52190-9 = "A paisagem é... a mesma daquela época."
52190-10 = "Essa sua atenção aos detalhes, Nagusa-chan, é bem útil nessas horas."
52190-11 = "Bem, vamos indo então."
52190-18 = "……Aquela ali, será que comeu alguma coisa estragada?"
52190-19 = "Nos libertar do nada... o que será que ela está planejando?"
52190-20 = "Quem sabe. Mas não dá para confiar no Clube Kacho Fugetsu."
52190-21 = "Com certeza tem algo por trás disso."
52190-22 = "Eu também penso o mesmo... Afinal, foram elas que trouxeram o caos para Hyakkiyako. Não podemos confiar nelas."
52190-23 = "Só que... tenho a leve impressão de que ela está agindo por conta própria."
52190-24 = "Talvez a gente consiga escapar da vigilância do Clube Kacho Fugetsu."
52190-25 = "Ora, ora? Vocês não estão pensando em fugir, estão?"
52190-26 = "Não pensem em bobagens, entenderam?#nNão importa o quão rápido vocês corram, não conseguirão escapar de mim."
52190-27 = "Além disso... pode ser que, sem querer, o cano da minha arma acabe apontando para a cabeça do Sensei...#nquem sabe?"
52190-28 = "……Hmph."
52190-30 = "[ns] \"Ah, então eu sou o refém?\""
52190-31 = "Hã?"
52190-32 = "Você tem o hábito de manipular alunas com palavras, mas não aguenta nem um tiro sequer, não é?#nTodo mundo vai mirar em você primeiro, é óbvio."
52190-33 = "E mesmo assim, você se joga na frente sem nem pensar em si mesmo. Sério..."
52190-46 = "……Sério, que idiota."
52190-47 = "[s] \"Para proteger alguém, a minha própria força não importa.\""
52190-48 = "Ah, de novo com isso..."
52190-49 = "Um fraco que não consegue nem se proteger, querendo proteger os outros... isso realmente faz sentido?#nVocê vai cair antes mesmo da pessoa que está tentando proteger, não vai?"
52190-50 = "Que tipo de lógica é essa?#nNão faz o menor sentido."
52190-51 = "[s1] \"Como eu disse antes, ver uma aluna em perigo faz meu corpo se mover sozinho...\"\n[s2] \"Independente de ser racional ou normal.\"\n[s3] \"É simplesmente o que se espera de uma pessoa.\""
52190-55 = "Espe... rado...?"
52190-56 = "Isso não é..."
52190-57 = "Não tem nada de esperado nisso!"
52190-61 = "Haa, haa..."
52190-62 = "Sério, que coisa mais idiota..."
52190-63 = "Vamos logo para o Templo do Crepúsculo...#nE não pensem em fugir, entenderam?"
