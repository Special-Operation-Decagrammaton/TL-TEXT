[translation]
52190-1 = "第19話;彼岸の記憶"
52190-5 = "こっちに本当に「黄昏の寺院」があるんですかぁ？"
52190-6 = "……うん、合ってるよ。"
52190-7 = "こんな雪原でも、道しるべはあるから。"
52190-8 = "雪の降り積もった木々に、凍りついた川――あの丘も。"
52190-9 = "あのときの風景と……同じ。"
52190-10 = "ナグサちゃんの妙に細かいとこ、こういう時は役に立ちますねぇ。"
52190-11 = "さ、行きましょうかぁ。"
52190-18 = "……あいつ、なんか変なもんでも食ったのか？"
52190-19 = "いきなりアタシらを解放して……何企んでるのやら。"
52190-20 = "さあね。でも、花鳥風月部は信用ならない。"
52190-21 = "裏があるのは確かだよ。"
52190-22 = "身共もそう思います……元は百鬼夜行に混乱を招いた相手ですもの。信用できませんわ。"
52190-23 = "ただ……なんとなくだけど、独断で動いてるような気がする。"
52190-24 = "もしかしたら、花鳥風月部の監視の目から抜け出せるかもしれない。"
52190-25 = "おやおやぁ？まさか、逃げようだなんて思ってませんよねぇ？"
52190-26 = "くだらないことは考えないでくださいねぇ？#nいくら足が速くても、手前からは逃れられませんよぉ？"
52190-27 = "それに……ついつい銃口が先生の頭に向いちゃう――#nなぁんてことも、あるかもしれませんし？"
52190-28 = "……ふん。"
52190-30 = "[ns] \"あ、私が人質だったの？\""
52190-31 = "はぁ？"
52190-32 = "生徒を言葉一つで操る癖に、#n銃弾の一発にも耐えられないですよぉ？#nみーんな、真っ先に手前様を狙うに決まってますぅ。"
52190-33 = "そのクセ、自分の身も顧みず飛び込んで。本当に……。"
52190-46 = "……本当に、愚か。"
52190-47 = "[s] \"誰かを守るのに、自分の強さは関係ないよ。\""
52190-48 = "はぁ、またそれですか……。"
52190-49 = "自分の身も守れない弱者が、誰かを庇うだなんて……それ、本当に意味ありますぅ？#n庇う相手よりも先に崩れ落ちて、終わりじゃないですか。"
52190-50 = "どういう理屈で、そんなことするんですぅ？#n意味不明なんですけど？"
52190-51 = "[s1] \"前にも言ったけど、危険な目に遭っている子を見て体が動くのは……。\"\n[s2] \"合理的か、普通かの以前に。\"\n[s3] \"人として当然のことだから。\""
52190-55 = "当……然……？"
52190-56 = "そんなの……。"
52190-57 = "当然なわけないでしょう！"
52190-61 = "はぁ、はぁ……。"
52190-62 = "本当に本当にくだらない……。"
52190-63 = "とっとと黄昏の寺院に行きますよぉ……。#n逃げようだなんて、考えないでくださいね？"
