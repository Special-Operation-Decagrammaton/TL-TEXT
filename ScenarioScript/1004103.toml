[translation]
1004103-1 = "ままならない身体"
1004103-2 = "……。"
1004103-3 = "[s] \"……。\""
1004103-4 = "……先生に会うつもり、なかったんだけど。"
1004103-5 = "[s] \"ご、ごめんね……。\""
1004103-6 = "それで、今日は何の用？"
1004103-7 = "[s] \"特に用事があったわけじゃないんだけど……。\""
1004103-8 = "じゃあ、帰る。"
1004103-9 = "[s] \"ま、待って！\""
1004103-10 = "……今度は何？"
1004103-11 = "[s] \"親睦を深めるとか、どうかな？\""
1004103-12 = "何のために？"
1004103-13 = "[s] \"えっと……こうやって知り合えたのも、何かの縁だし……。\""
1004103-14 = "縁なんて、ない。"
1004103-15 = "そもそも人間なんて、肉体っていう孤島に閉じ込められた遭難者にすぎない。"
1004103-16 = "一人で生まれて、一人で生きて、一人で死ぬ。それが人生でしょ。"
1004103-17 = "だからそんな、人と人の間をつなぐ糸なんて妄想でしかない。"
1004103-18 = "[s] \"そっか……。\""
1004103-19 = "……。"
1004103-20 = "……はあ。"
1004103-21 = "……もう、勝手にして。"
1004103-22 = "それで、何をしたら良いわけ。"
1004103-23 = "[s] \"えっと……散歩とかどう？\""
1004103-24 = "……。"
1004103-25 = "……それが、命令なら。 "
1004103-27 = "……。"
1004103-28 = "[s] \"花が綺麗だね。\""
1004103-29 = "うん。"
1004103-30 = "[s] \"川があるよ。\""
1004103-31 = "……そう。"
1004103-32 = "[s] \"あ……えっと……。\""
1004103-33 = "……。"
1004103-34 = "ただそこに在るだけのものに、一体何の意味が？ "
1004103-35 = "[s] \"そ、そうだね……。\""
1004103-36 = "ここに長くいる気はないよ……命令だから、ついて来ただけ。"
1004103-37 = "[s] \"ところで、なんで今マスクつけてるの？\""
1004103-38 = "……いや。まあ、ちょっと。"
1004103-39 = "[s1] \"マスク、外してみたら？\"\n[s2] \"新鮮な空気を吸ったほうが良いよ。\""
1004103-40 = "い、いや……ちょっと、それより…近づかな――"
1004103-41 = "い、いや……ちょっと、それより…近づかな――"
1004103-42 = "はっ……！ッ――"
1004103-43 = "はっっくしゅん――！！"
1004103-44 = "[s] \"……！？\""
1004103-45 = "はっくしょん！"
1004103-46 = "はっくしゅん！"
1004103-47 = "へっくし、はっくしゅん！！！"
1004103-48 = "[s] \"……。\""
1004103-49 = "か……花粉が多すぎる、ここ……！"
1004103-50 = "[s] \"ミサキ、今……。\""
1004103-51 = "花粉症で本当もう……………へ？"
1004103-52 = "[s] \"ミサキ……その……鼻が。\""
1004103-53 = "……え？"
1004103-54 = "う、ウワァーーーーーーーーーーッッ！？！"
1004103-55 = "ま、まって……ティッシュはどこ……？！"
1004103-56 = "[s3] \"ちょっと待ってね！\"\n[s4] \"ハンカチなら……。\""
1004103-63 = "（しばらくして……。）"
1004103-65 = "はあ……。"
1004103-66 = "[s] \"だ、大丈夫？ミサキ？\" "
1004103-67 = "……はやくここを出よう。"
1004103-70 = "[ns] \"はい、飲み物。\""
1004103-71 = "……ありがとう、先生。"
1004103-72 = "はあ……。"
1004103-73 = "……肉体なんて、最悪。 "
1004103-74 = "[s] \"花粉症だったんだね……。\""
1004103-75 = "うん……でも、先生のおかげで最悪の状況は免れたよ。 "
1004103-76 = "[s] \"それなら良かった。\""
1004103-77 = "……。"
1004103-78 = "[s] \"私とミサキの縁の賜だね\""
1004103-79 = "そもそも原因は先生だったでしょ。 "
1004103-80 = "図々しいのも大概にしてよね。"
1004103-81 = "[s] \"すみませんでした……。\""
1004103-82 = "……。"
1004103-83 = "でも、ありがとう……。"
1004103-84 = "……ハンカチは、洗って返すね。"
1004103-85 = "[s] \"そのまま、持っていっていいよ。予備のハンカチあるし。\""
1004103-86 = "……借りを作る気はない。"
1004103-87 = "[s] \"……そっか。\""
1004103-88 = "はあ。"
