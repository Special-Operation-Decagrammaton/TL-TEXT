[translation]
34220-1 = "Episódio 22;Agnus Dei"
34220-2 = "……Mas vocês chegaram tarde.#nO ritual já está em curso."
34220-3 = "……!!"
34220-5 = "Extraindo o mistério do sangue real e tomando emprestado o poder que chega de fora de Kivotos…… eu estou sublimando a minha existência a algo superior."
34220-7 = "Vamos, Sensei.#n――Ó, adulto incompreensível, meu adversário."
34220-8 = "Talvez você esteja me entendendo errado."
34220-9 = "Nós, através deste mundo, perseguimos, cada um, o que deseja.#nVocê também. Pode se tornar qualquer coisa, pode conhecer tudo."
34220-10 = "Tornar-se uma existência superior――e, através disso, salvar a todos: esse é o dever de um adulto."
34220-11 = "Sim; este ritual foi preparado para que eu, usando o poder de fora de Kivotos, me torne uma existência superior."
34220-12 = "E, assim, subir ao alto e salvar este mundo――este é o patamar a que um adulto deve chegar!"
34220-13 = "Um pequeno sacrifício nesse processo é algo inevitável."
34220-14 = "Sim…… este sacrifício é necessário."
34220-15 = "Este é, justamente, o caminho que leva ao \"Sublime\"."
34220-16 = "Você compreende esse valor, não compreende?#nVocê, que detém o poder absoluto de julgar todos os alunos, e também de salvá-los……!!"
34220-17 = "[s] \"Você está errada.\""
34220-18 = "……!?"
34220-19 = "[s1] \"Você me entendeu errado.\"\n[s2] \"Eu não sou uma existência tão grandiosa.\""
34220-20 = "O quê……?"
34220-21 = "O quê……?"
34220-26 = "[ns] \"Eu não sou um juiz. O direito de julgar alguém, eu não tenho.\""
34220-29 = "[ns] \"Eu não sou um salvador. Apagar o sofrimento deste mundo, eu não posso.\""
34220-32 = "[ns] \"Eu não sou um absoluto. Eliminar os pecados deste mundo, eu não posso.\""
34220-34 = "……!!"
34220-35 = "[s] \"Eu não sou nada disso.\""
34220-36 = "Então…… o que, afinal, você diz que é!!"
34220-37 = "A sua capacidade, o seu valor de existência; o que são!"
34220-38 = "[s] \"Um Sensei, que existe pelos alunos.\""
34220-39 = "……!!"
34220-41 = "[ns] \"Eu só quero estar ao lado dos alunos esquecidos, que sofrem.\""
34220-45 = "Então prove……!!"
34220-49 = "……!!"
34220-50 = "Q-quê……."
34220-51 = "A-auu……."
34220-52 = "Vamos, gravem bem nos olhos!#nEsta sou eu…… a figura que se tornou uma existência superior!"
34220-53 = "Esta é a verdadeira forma――a forma de um adulto grandioso………!!"
34220-54 = "[s] \"Então essa é a sua verdadeira face, Beatrice.\""
34220-55 = "Aquilo é…… a verdadeira Madame……."
34220-56 = "Só consigo ver um mero monstro, mas……."
34220-57 = "Sim…… e a uma coisa daquelas, nós, esse tempo todo……."
34220-58 = "[s] \"――Saori, Hiyori, Misaki.\""
34220-59 = "……Sim."
34220-60 = "……Sim!"
34220-61 = "……Sim."
34220-62 = "[s] \"Não tenham medo…… eu estou com vocês. Vamos juntos.\""
34220-64 = "……Sim."
34220-65 = "Sim――vamos derrotar aquele monstro."
34220-66 = "Sim!! Vamos salvar a Hime……!!"
34220-67 = "[ns] \"Vamos!!!\""
