[translation]
34220-1 = "Episódio 22; Agnus dei"
34220-2 = "……Mas você chegou tarde demais. #nO ritual já está em andamento."
34220-3 = "……！！"
34220-5 = "Estou explorando o mistério do Sangue Real e, com o auxílio de um poder que vem de fora de Kivotos…… estou elevando minha própria existência a um patamar superior."
34220-7 = "Vamos lá, Sensei. #n――Adulto incompreensível, meu adversário."
34220-8 = "Talvez você esteja me interpretando mal."
34220-9 = "Neste mundo, cada um de nós busca o que deseja. #nVocê também. Você pode se tornar qualquer coisa e conhecer tudo."
34220-10 = "Tornar-se um ser de ordem superior――através disso, salvar a tudo é o dever de um adulto."
34220-11 = "Sim, este ritual foi preparado para utilizar o poder de fora de Kivotos e me tornar um ser de ordem superior."
34220-12 = "Ao ascender a tais alturas e salvar este mundo――esse é o patamar que um adulto deve alcançar!"
34220-13 = "Pequenos sacrifícios durante esse processo são inevitáveis."
34220-14 = "Isso mesmo…… esse sacrifício é necessário."
34220-15 = "Este é o caminho que leva ao \"Sublime\"."
34220-16 = "Você, que possui o poder absoluto de julgar e salvar todos os alunos, deve entender esse valor, não é……！！"
34220-17 = "[s] \"Isso está errado.\""
34220-18 = "……！？"
34220-19 = "[s1] \"Você me entendeu mal.\"\n[s2] \"Eu não sou nada disso.\""
34220-20 = "O quê……?"
34220-21 = "O quê……?"
34220-26 = "[ns] \"Eu não sou um juiz. Não tenho o direito de julgar ninguém.\""
34220-29 = "[ns] \"Eu não sou um salvador. Não posso apagar o sofrimento deste mundo.\""
34220-32 = "[ns] \"Eu não sou um ser absoluto. Não posso eliminar o pecado deste mundo.\""
34220-34 = "……！！"
34220-35 = "[s] \"Eu não sou esse tipo de ser.\""
34220-36 = "Então…… o que exatamente você diz ser!!"
34220-37 = "Qual é a sua capacidade, qual é o seu valor de existência!"
34220-38 = "[s] \"Sou apenas um sensei para os alunos.\""
34220-39 = "……！！"
34220-41 = "[ns] \"Só quero estar ao lado dos alunos que foram esquecidos e que sofrem.\""
34220-45 = "Então, prove isso……！！"
34220-49 = "……！！"
34220-50 = "O quê……"
34220-51 = "Ah, ahhh……"
34220-52 = "Vamos, contemple com seus próprios olhos! #nEsta é a minha forma…… a forma de um ser de ordem superior!"
34220-53 = "Esta é a minha verdadeira forma――a forma de um grande adulto………！！"
34220-54 = "[s] \"Então essa é a sua verdadeira face, Beatrice.\""
34220-55 = "Aquela é…… a verdadeira Madame……"
34220-56 = "Só parece um monstro, no entanto……"
34220-57 = "É verdade…… nós estivemos sob o comando de algo assim por tanto tempo……"
34220-58 = "[s] \"――Saori, Hiyori, Misaki.\""
34220-59 = "……Ah."
34220-60 = "……Sim!"
34220-61 = "……Sim."
34220-62 = "[s] \"Não tenham medo…… eu estou aqui com vocês. Vamos dar o nosso melhor juntos.\""
34220-64 = "……Ah."
34220-65 = "Sim――vamos derrotar aquele monstro."
34220-66 = "Sim!! Vamos salvar a Princesa……！！"
34220-67 = "[ns] \"Vamos!!!\""
