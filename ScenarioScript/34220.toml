[translation]
34220-1 = "Episódio 22; Agnus dei"
34220-2 = "......No entanto, chegou tarde.#nO ritual já está em andamento."
34220-3 = "......!!"
34220-5 = "Explorando o mistério do Sangue Real, emprestando o poder que chega de fora de Kivotos... eu estou elevando minha existência a algo superior."
34220-7 = "Venha, Sensei.#n――Incompreensível adulto, meu antagonista."
34220-8 = "Talvez você tenha me entendido mal."
34220-9 = "Cada um de nós busca alcançar o que deseja através deste mundo.#nE com você, não é diferente. Você pode se tornar qualquer coisa, e pode conhecer qualquer coisa."
34220-10 = "Tornar-se uma existência superior――e através disso, salvar a todos. Esse é o dever de um adulto."
34220-11 = "Sim, esse ritual usa poderes de fora de Kivotos e foi preparado exclusivamente para que eu me torne uma existência superior."
34220-12 = "E ao ascender a essas alturas, salvar este mundo――esse sim é o patamar que um adulto deve alcançar!"
34220-13 = "O sacrifício deste pequeno Agnus dei durante o processo é algo que não pode ser evitado."
34220-14 = "Exatamente... esse sacrifício é necessário."
34220-15 = "Este é o verdadeiro caminho para o 'Sublime'."
34220-16 = "Você com certeza deve entender esse valor, não é mesmo?#nVocê, que possui o poder absoluto para julgar ou salvar qualquer aluna...!!"
34220-17 = "[s] \"Você está errada.\""
34220-18 = "......!?"
34220-19 = "[s1] \"Você me entendeu mal.\"\n[s2] \"Eu não sou alguém tão importante assim.\""
34220-20 = "O que..."
34220-21 = "O que..."
34220-26 = "[ns] \"Eu não sou um juiz. Não tenho o direito de julgar ninguém.\""
34220-29 = "[ns] \"Não sou um salvador. Não posso apagar a dor deste mundo.\""
34220-32 = "[ns] \"Não sou um ser absoluto. Não posso acabar com os pecados deste mundo.\""
34220-34 = "......!!"
34220-35 = "[s] \"Eu não sou esse tipo de existência.\""
34220-36 = "Então... o que diabos você é!!"
34220-37 = "O que suas habilidades e a sua existência valem!?"
34220-38 = "[s] \"Eu sou um Sensei para as alunas.\""
34220-39 = "......!!"
34220-41 = "[ns] \"Eu só quero estar ao lado daquelas alunas que foram esquecidas e sofrem.\""
34220-45 = "Sendo assim, tente provar isso...!!"
34220-49 = "......!!"
34220-50 = "N-Nossa..."
34220-51 = "A-Auu..."
34220-52 = "Agora, gravem isso em seus olhos!#nEste é a minha verdadeira forma... como uma existência superior!"
34220-53 = "Esta é a minha verdadeira aparência――a imagem de uma adulta grandiosa...!!"
34220-54 = "[s] \"Então essa é a sua verdadeira forma, Beatrice.\""
34220-55 = "Aquela é... a verdadeira Madame..."
34220-56 = "Ela só parece um monstro..."
34220-57 = "Entendi... todo esse tempo, nós fomos... por aquilo..."
34220-58 = "[s] \"――Saori, Hiyori, Misaki.\""
34220-59 = "......Aham."
34220-60 = "......Sim!"
34220-61 = "......Aham."
34220-62 = "[s] \"Não tenham medo... eu estou aqui com vocês. Vamos dar o nosso melhor.\""
34220-64 = "......Sim."
34220-65 = "Certo――Vamos acabar com aquele monstro."
34220-66 = "Sim!! Nós vamos salvar a Princesa...!!"
34220-67 = "[ns] \"Vamos nessa!!!\""