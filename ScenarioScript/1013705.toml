[translation]
1013705-1 = "刑事の身だしなみ"
1013705-2 = "ちわ～っす、先生。"
1013705-3 = "あ、尾行とかされてないっすよね？#nちょーっと知られたらまずくって。"
1013705-4 = "[s1] \"それは大丈夫だと思うけど……。\"\n[s2] \"一体どうしたの……？\""
1013705-7 = "ここは人目につくので、中に入りましょう。"
1013705-8 = "あ、これから目にするものはすべて極秘情報っすよ。"
1013705-9 = "絶対に外に漏らさないでくださいね。"
1013705-10 = "[s] \"う、うん……！\""
1013705-15 = "おい、誰だ？見ない内に随分とさっぱりしたじゃねぇか。"
1013705-16 = "つれないっすねー。あたしっすよ、あたし。"
1013705-17 = "お客さんを連れてきたっすよ。#n口は堅いんで、大丈夫っす。"
1013705-18 = "ここは知る人ぞ知る名所のまま。"
1013705-19 = "まーた勝手なことを……！！"
1013705-24 = "こっちは商売で服屋やってんだ！秘密の場所にしてどうすんだよ！！！"
1013705-25 = "まぁまぁ、代わりにいっぱい買ってるじゃないっすか。"
1013705-26 = "個人の売上だけじゃやってけねぇって！！"
1013705-28 = "[ns] \"ここは……アロハシャツ屋？\""
1013705-29 = "そっす！アロハシャツ買うならここなんすよね～"
1013705-30 = "古着から新品まであるし、カラーのバリエーションも豊富で……本当に隠れた名店って感じで！"
1013705-31 = "隠してねえよ！お前が隠してるだけだろ！"
1013705-32 = "まぁまぁ……10人分買うから許してほしいっす～"
1013705-33 = "人が増えたらレアなシャツ売り切れちゃうじゃないっすか。"
1013705-34 = "あなた、シャーレの先生ですよね？#nお願いします！どうかうちの店を宣伝してください！"
1013705-35 = "させないっすよ～！#nあたしがぜーったい情報を止めるっす！"
1013705-36 = "はぁ……これのどこが警察なんだよ……。"
1013705-37 = "はぁ、でもまぁ……そうだな。#nアロハシャツの良さを理解できるヤツはそう多くない。"
1013705-38 = "嬢ちゃんの言う通り、理解できるマニアにだけ教えてくれてるのは助かってるが……。"
1013705-39 = "まんざらでもないんじゃないっすか。#nさーてと、何があるかな～"
1013705-40 = "ど～～れにしよ～～かな～～"
1013705-44 = "ふんふん～～警察しゅつど～～ヘルメット団たいほ～～♪"
1013705-48 = "お前は～～おしまいだ～～♪"
1013705-49 = "うーん、配色は好きなんだけど……バランスがちょーっと惜しいかも。"
1013705-50 = "[ns3] \"コノカはアロハシャツに詳しいんだね。\"\n[ns4] \"昔から好きだったの？\""
1013705-53 = "昔から、ではないっすねぇ。"
1013705-54 = "別に興味もなかったし。どっちかっていうと、あんまり好きじゃなかったかも。"
1013705-55 = "興味を持つようになったのは、ヴァルキューレに来てからっすね。"
1013705-56 = "あれあれ～？気になるんすか？#nあたしがアロハシャツを好きになったきっかけ。"
1013705-57 = "[s] \"……うっ！そんなに分かりやすかった？\""
1013705-58 = "ははっ！こう見えて公安局の副局長っすからね。"
1013705-59 = "いつからだったかなぁ……。"
1013705-60 = "入学したあたりの頃かな？#n不良をしばいたら褒められる学園があるって聞いて入ったんすよ。"
1013705-61 = "んで、まぁあたしはケンカの仕方しか知らなかったんで、教育担当がついたんすよね。#nあたしの担当は、口数は少ないけど説教臭い人で……。"
1013705-62 = "通報を受けて2人で現場に向かったら……罠で。#n複数人で襲ってきて……タコ殴りにされたんすよね。"
1013705-63 = "なんとか勝ったんすけど、制服ボロボロになっちゃって。#nまぁ、最後はあいつら警察呼ぼうとしてたくらいには怖がってたんすけどね。"
1013705-64 = "[s] \"警察を殴って、警察を呼ぼうとした……？\""
1013705-65 = "いやー、あたしの担当、顔怖いしめちゃめちゃ強かったんすよね……。"
1013705-66 = "んでまぁ、流石にそのまま帰るわけにもいかなくて、開いてるお店探してたらここを見つけたんすよね。"
1013705-67 = "どこを見てもアロハ、アロハ、アロハ！でめっちゃ笑ったんすけどね！"
1013705-68 = "あの時の嬢ちゃん、最初はそういう柄のアロハシャツかと思うぐらい服がドロドロだったよな。"
1013705-69 = "いやぁ、はっはっは！生の声があるとリアルっすね！"
1013705-70 = "んで、仕方なく担当と一緒にアロハ着て帰ったら意外と似合ってるじゃんって思って。#n以来ずっとアロハを着てるっす！捜査の時にも便利っすし。"
1013705-74 = "あ！これこれ！ちょうどアヒルの柄がほしかったんすよね！"
1013705-75 = "こっちにももう1着あるんで、先生にもあげますね。#nあたしからのプレゼントっす！"
1013705-76 = "店主、これ2着お願いしまーす。"
1013705-77 = "あいよ～#n先生、お似合いですねぇ。"
1013705-78 = "[s] \"いくらですか？\""
1013705-79 = "お代は気にしないでください。刑事の嬢ちゃんが、財布を持ち歩くの面倒くさいからって300枚分くらい先払いしてくれてるんですよ。"
1013705-80 = "また来てください！店の宣伝もどうかよろしくお願いします！"
1013705-82 = "はぁー！ショッピング最高ー！えへへっ！"
1013705-83 = "先生、秘密……絶対に守ってくださいね。#nまた一緒に行くっすよ！"
1013705-84 = "いやぁ～久々に昔のことを思い出したなぁ……。"
1013705-85 = "あのときの姉御のアロハ姿、写真撮っとけばよかったなぁ……。"
1013705-86 = "[s] \"もしかしてコノカが言ってた担当って……？\""
1013705-87 = "ああ、先生が思ってる通りっすよ。#nってか、他に誰がいるんすか。"
1013705-88 = "不良に狂犬。この組み合わせを考えた当時の上層部はマジパないっす。"
1013705-89 = "んじゃ、お先失礼しますね～#nあ！シャツ、一回洗ってから着てくださいね！"
1013705-90 = "ではでは～！"
1013705-92 = "（その後、コノカはウキウキした足取りで路地の向こうへと消えていった）"
