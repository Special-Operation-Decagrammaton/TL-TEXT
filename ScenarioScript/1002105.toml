[translation]
1002105-1 = "Meu mundo"
1002105-2 = "（Como estávamos mais perto um do outro do que eu pensava, vou em direção à Azusa. O lugar onde cheguei era uma praia tingida pelo pôr do sol）"
1002105-3 = "Ah, Sensei. Eu disse que iria até você..."
1002105-4 = "[s1] \"Não, é que eu queria vir te buscar.\"\n[s2] \"Então, vamos ter uma discussão estratégica baseada na nossa intuição tática?\""
1002105-5 = "...Haa."
1002105-6 = "...Haa."
1002105-7 = "B-bem... é que, graças a você, Sensei, finalmente comecei a aproveitar um pouco o mar, mas..."
1002105-8 = "...Mas não resta muito tempo."
1002105-9 = "Não temos muito tempo para fazer pesquisas preliminares também..."
1002105-10 = "Como podemos aproveitar o mar da forma mais eficiente possível no tempo que nos resta...?"
1002105-11 = "O que você acha que devemos fazer, Sensei?"
1002105-12 = "[s3] \"Eficiente, hein...\"\n[s4] \"Algo que nos permita aproveitar várias coisas de uma vez...\""
1002105-13 = "Já gastamos bastante tempo."
1002105-14 = "Já gastamos bastante tempo."
1002105-15 = "Não, não é que eu esteja dizendo que o tempo que passamos até agora foi desperdiçado..."
1002105-16 = "...Hm?"
1002105-17 = "Você tem um bom método?"
1002105-18 = "Como esperado, foi uma boa ideia entrar em contato com você, Sensei. Então, depois disso..."
1002105-19 = "...Eh? Você quer que eu apenas te siga...?"
1002105-20 = "Bem, eu não me importo, mas..."
1002105-21 = "Entendido, vou confiar na sua escolha, Sensei."
1002105-22 = "Então, vamos lá."
1002105-26 = "...?"
1002105-27 = "...Sensei?"
1002105-28 = "Bem, para onde estamos indo...?"
1002105-29 = "Já caminhamos por uns 20 minutos..."
1002105-30 = "Não é que eu não confie em você, Sensei. É só que... eu queria confirmar o plano de ação..."
1002105-31 = "Parece que estamos nos afastando do mar...?"
1002105-33 = "...Por que estamos nos afastando do mar e indo em direção às montanhas?"
1002105-34 = "Além disso, sinto que estamos dando uma volta e indo na direção do mar onde estávamos antes..."
1002105-35 = "Sendo você, Sensei, deve haver algum motivo..."
1002105-36 = "...Hm?"
1002105-37 = "Já estamos chegando?"
1002105-38 = "Entendo, embora eu sinta que isso não responde à minha pergunta."
1002105-39 = "...Eu confio em você, Sensei."
1002105-42 = "Heave-ho..."
1002105-43 = "...?"
1002105-44 = "Isso é... o fluxo do vento...?"
1002105-45 = "O que tem à frente, será que...?"
1002105-46 = "...!"
1002105-49 = "[wa:500]— Uau...! [wa:2350]É a primeira vez [wa:500]que vejo algo assim..."
1002105-51 = "— Tudo o que [wa:700]meus olhos veem está brilhando, [wa:2550]é incrível..."
1002105-54 = "[wa:3000]— Sem nada para me atrapalhar,"
1002105-56 = "— Eu não sabia que existia um lugar [wa:500]onde pudesse ver tudo assim..."
1002105-59 = "— É uma [wa:1250]sensação estranha..."
1002105-62 = "[wa:1000]— Originalmente, [wa:1000]eu não gostava muito [wa:1850]de lugares [wa:500]abertos assim."
1002105-64 = "— Não tem onde se esconder, [wa:2450]e é difícil ficar alerta com o que está ao redor..."
1002105-67 = "[wa:750]— Mas agora... [wa:2300]não estou nem um pouco ansiosa."
1002105-69 = "[wa:500]— Com certeza [wa:450]isso é, [wa:2600]sim..."
1002105-72 = "[wa:750]— No meu campo de visão agora, [wa:3500]sempre assim..."
1002105-74 = "― ……Talvez seja porque o Sensei está [wa:1850] aqui comigo."
1002105-77 = "……Como eu pensei, minha intuição não estava errada."
1002105-78 = "Sim, foi muito melhor do que eu imaginava. Não, na verdade……"
1002105-79 = "……Obrigada. Minha primeira vez no mar se tornou uma ótima lembrança."
1002105-80 = "……Hehe."
1002105-82 = "……Muito obrigada, Sensei."
