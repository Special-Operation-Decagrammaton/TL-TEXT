[translation]
1002105-1 = "私の世界"
1002105-2 = "（お互いに思ったよりすぐ近くにいたので、アズサの元へ向かう。辿り着いたのは、夕焼けに染まった海辺だった）"
1002105-3 = "あ、先生。私の方から行くって言ったのに……"
1002105-4 = "[s1] \"ううん、私がアズサを迎えに来たかったから。\"\n[s2] \"じゃあ、戦術的直感による戦略的話し合いをしよっか。\""
1002105-5 = "……はぁ。"
1002105-6 = "……はぁ。"
1002105-7 = "と、とにかく……えっと、先生のおかげで、ようやく少し海を楽しめるようになったけど……。"
1002105-8 = "……でも、もうあまり時間も残されてない。"
1002105-9 = "下調べをする時間も、そんなに無いし……。"
1002105-10 = "どうすれば残りの時間で、最大限効率的に海を楽しめるのか……。"
1002105-11 = "先生はどうすれば良いと思う？"
1002105-12 = "[s3] \"効率的、かあ……。\"\n[s4] \"色んなものを、一気に楽しめるような何か……。\""
1002105-13 = "もうすでに、かなりの時間を使ってしまった。"
1002105-14 = "もうすでに、かなりの時間を使ってしまった。"
1002105-15 = "いや、そうは言っても、これまでの時間が無駄だったと言いたいわけじゃなくて……。"
1002105-16 = "……ん？"
1002105-17 = "良い方法がある？"
1002105-18 = "流石、先生に連絡して正解だった。じゃあ、この後は……"
1002105-19 = "……え？取り合えずついてきてほしい……？"
1002105-20 = "まあ、別に構わないけれど……。"
1002105-21 = "分かった、先生の選択を信じる。"
1002105-22 = "じゃあ、行こうか。"
1002105-26 = "……？"
1002105-27 = "……先生？"
1002105-28 = "えっと、これはどこに向かって……？"
1002105-29 = "もう20分くらいは歩いたけれど……。"
1002105-30 = "いや、先生のことを信じてないわけじゃない。ただ、作戦内容の確認というか……。"
1002105-31 = "海からは遠ざかってるような……？"
1002105-33 = "……どうして海から離れて、山の方に？"
1002105-34 = "それに、ぐるっと回って、またさっきまでいた海の方向へ向かっている気がするけど……。"
1002105-35 = "先生のことだし、何か理由があるはず……。"
1002105-36 = "……ん？"
1002105-37 = "もうすぐ着く？"
1002105-38 = "そうか、質問に対する答えにはなってない気がするけど。"
1002105-39 = "……先生のことは、信じてるから。"
1002105-42 = "んしょ……。"
1002105-43 = "……？"
1002105-44 = "これは、風の流れが……？"
1002105-45 = "この先は、もしかして……？"
1002105-46 = "……っ！"
1002105-49 = "[wa:500]― わぁ……！[wa:2350]こんなの[wa:500]初めて……"
1002105-51 = "― 目に映る[wa:700]全部がキラキラして、[wa:2550]すごい……"
1002105-54 = "[wa:3000]― 何にも邪魔されずに、"
1002105-56 = "― こうして[wa:500]何もかもを見渡せる場所があったなんて……。"
1002105-59 = "― 何だか、[wa:1250]不思議な感覚……"
1002105-62 = "[wa:1000]― 元々、[wa:1000]こういう開けた場所は[wa:1850]あまり[wa:500]好きじゃなかった。"
1002105-64 = "― 隠れる場所も無いし、[wa:2450]周囲の警戒も大変で……"
1002105-67 = "[wa:750]― でも今は……[wa:2300]全然不安じゃない。"
1002105-69 = "[wa:500]― きっと[wa:450]これは、[wa:2600]うん……"
1002105-72 = "[wa:750]― 今の私の視界には、[wa:3500]いつもこうやって……"
1002105-74 = "― ……先生が、[wa:1850]いてくれるからかな。"
1002105-77 = "……やっぱり、私の直感は間違ってなかった。"
1002105-78 = "うん、思ってたよりずっと悪くない。ううん、むしろ……"
1002105-79 = "……ありがとう。初めての海は、良い思い出になった。"
1002105-80 = "……ふふっ。"
1002105-82 = "……本当に、ありがとう。先生。"
