[translation]
51250-1 = "Episódio 25: Agora, para você"
51250-13 = "..."
51250-14 = "...Ela fugiu, é?"
51250-15 = "O que foi aquilo...?#nPensei que ela tinha rasgado o livro, e de repente...!"
51250-17 = "Fez um barulho enorme, eu levei um susto daqueles...!"
51250-18 = "[s] \"Talvez aquilo também fosse uma das Cem Histórias...\""
51250-19 = "Hum... parece impossível persegui-la agora."
51250-20 = "Que tipo incompreensível era aquele!?#nE afinal, quem é o Clube Kacho Fugetsu!?"
51250-21 = "[s1] \"De qualquer forma, vamos cuidar dos ferimentos agora!\"\n[s2] \"Estão todos bem? Algum ferimento?\""
51250-26 = "Ah, aqui está tudo bem. E você, Yukari?"
51250-27 = "Eu também estou ótima!"
51250-28 = "[s] \"E a Kikyou e a Nagusa...\""
51250-34 = "..."
51250-35 = "..."
51250-37 = "Bem..."
51250-43 = "Nagusa-senpai... sobre o que você disse antes..."
51250-47 = "...Sim."
51250-51 = "...Não, esquece."
51250-52 = "............Entendi."
51250-57 = "............"
51250-58 = "[s] \"............\""
51250-62 = "(Sussurro) Sensei, não é como se eu devesse dizer isso, mas..."
51250-63 = "(Sussurro) Essas duas... o clima entre elas não está um pouco tenso demais?"
51250-64 = "[s] \"(Sussurro) Você vai mesmo falar disso!?\""
51250-65 = "M-mas, sabe...!"
51250-66 = "A causa de tudo foi, bem, não derrotada, mas ela fugiu!"
51250-67 = "Mesmo que não seja um final feliz, não está na hora de começarmos a pensar em voltar para casa?"
51250-68 = "Não podemos ficar aqui para sempre... Sensei, não pode dar um jeito nisso?"
51250-69 = "[s] \"Hum, mesmo que você me peça...\""
51250-75 = "Ehem."
51250-76 = "Nagusa-senpai, Kikyou-senpai, Renge-senpai.#nE também... Sensei."
51250-82 = "[ns] \"Yukari?\""
51250-87 = "Neste dia, aconteceram tantas coisas que nem consigo contar."
51250-88 = "Por causa disso, causei problemas a muitas pessoas... e graças à ajuda de todos, consegui chegar até aqui."
51250-89 = "Sinto que tive muita sorte de poder enfrentar tudo isso ao lado de vocês."
51250-90 = "Do fundo do meu coração... muito obrigada."
51250-95 = "Não... na verdade..."
51250-96 = "Somos nós que deveríamos agradecer à Yukari por não ter desistido até o fim..."
51250-97 = "Yukari... eu também..."
51250-98 = "[s] \"É o resultado do esforço de todos vocês.\""
51250-103 = "Sim! E já que estamos todos reunidos aqui novamente..."
51250-104 = "Eu tenho algo que quero dizer à Nagusa-senpai na frente de todos!"
51250-112 = "Eu, Kadenokouji Yukari, desafio a Nagusa-senpai para a Batalha de Sucessão!!"
51250-116 = "[ns] \"............O quê?\""
51250-121 = "Hã, agora...!?"
51250-122 = "Sim! Isso é algo muito importante!"
51250-123 = "Renge-senpai, Kikyou-senpai, vocês se lembram, não é?#nNo fim das contas, eu vim até aqui para desafiar a Nagusa-senpai para a Batalha de Sucessão!"
51250-124 = "Isso é verdade, mas..."
51250-125 = "[s] \"Mas, a Nagusa também não está em condições de uma Batalha de Sucessão agora...\""
51250-131 = "Sim, eu entendo."
51250-133 = "Sério!?"
51250-134 = "……Senpai?"
51250-136 = "Se esse é o objetivo original, então precisamos fazer isso direito."
51250-140 = "Eu, Nagusa Goryo, vice-presidente do Comitê de Mediação de Conflitos Hyakkiyako..."
51250-141 = "Aceito o desafio de Yukari Kadekouji."
51250-145 = "……Sim!"
51250-155 = "[ns] \"Então…… comecem!\""
51250-172 = "Kyaaauun!?"
51250-177 = "[ns] \"Ah, bem…… a vencedora é Nagusa Goryo!\""
51250-179 = "Uau, foi num piscar de olhos."
51250-180 = "Eu já suspeitava, mas…… sendo a Nagusa-senpai…… bem, é um resultado esperado."
51250-185 = "Será que…… eu não li bem a situação……?"
51250-186 = "[s3] \"Não, o mundo das lutas é rigoroso.\"\n[s4] \"Por isso, Yukari, não fique tão desanimada――\""
51250-194 = "Yukari! Está de volta! É isso mesmo!!"
51250-195 = "[s] \"Você não estava nem um pouco desanimada, né!?\""
51250-196 = "Desanimada……?"
51250-197 = "Fufu, Sensei."
51250-198 = "Eu lutei com todas as minhas forças e fui derrotada."
51250-199 = "Foi uma luta perfeita. Não há motivo para eu não aceitar isso."
51250-200 = "Sim! É o resultado natural! É isso mesmo!"
51250-201 = "Através desta luta, eu só queria confirmar mais uma vez que a Nagusa-senpai é a pessoa que eu admiro!!"
51250-202 = "E-entendo……"
51250-203 = "Sim!!"
51250-206 = "Se é assim, então tudo bem…… é, como posso dizer."
51250-207 = "É bem a sua cara, Yukari."
51250-208 = "[s] \"……É verdade.\""
51250-210 = "Ehehe…… então, pessoal! Vamos voltar logo!"
51250-217 = "Para a Hyakkiyako……"
51250-218 = "Para a nossa casa――!"
51250-229 = "Próximo episódio: Com um desejo"
