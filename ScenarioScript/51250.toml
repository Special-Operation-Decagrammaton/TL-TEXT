[translation]
51250-1 = "第25話;今あなたに"
51250-13 = "っ……！"
51250-14 = "……逃げたか。"
51250-15 = "今のは何だったんだ……？#n本を破ったと思ったら、突然……！"
51250-17 = "すごい音がして、身共びっくりしてしまいました……！"
51250-18 = "[s] \"もしかしたらアレも百物語だったのかも……。\""
51250-19 = "んー……追いかけるのは無理そうだな。"
51250-20 = "何だあの意味わかんないヤツ！#nってか花鳥風月部って何者なんだ！？"
51250-21 = "[s1] \"とりあえず、今は怪我の手当てをしよう！\"\n[s2] \"みんな大丈夫？怪我は？\""
51250-26 = "ああ、こっちは大丈夫だ。ユカリは？"
51250-27 = "身共もバッチリですわ！ "
51250-28 = "[s] \"キキョウとナグサは……\""
51250-34 = "……。"
51250-35 = "……。"
51250-37 = "えーと……。"
51250-43 = "ナグサ先輩……さっき言ってたことだけど……。"
51250-47 = "……うん。"
51250-51 = "……いや、何でもない。"
51250-52 = "…………そっか。"
51250-57 = "…………。"
51250-58 = "[s] \"…………。\""
51250-62 = "（ひそひそ）先生、アタシの口から言うのもなんだけどさ……"
51250-63 = "（ひそひそ）あの2人……ちょっとギクシャクしすぎじゃないか？"
51250-64 = "[s] \"（ひそひそ）それ、言っちゃう！？\""
51250-65 = "で、でもさ……！"
51250-66 = "元凶は一応倒し……てはないけど、逃げたし！"
51250-67 = "は、ハッピーエンド！とまではいかなくても、そろそろ帰る雰囲気になるんじゃないかなって……"
51250-68 = "ずっとここにいるわけにもいかないし……先生、ちょっと何とかしてくんない？"
51250-69 = "[s] \"うーん、そう言われても……。\""
51250-75 = "こほん。"
51250-76 = "ナグサ先輩、キキョウ先輩、レンゲ先輩。#nそして……先生。"
51250-82 = "[ns] \"ユカリ？\""
51250-87 = "この一日、本当に数え切れないほどの出来事がありました。"
51250-88 = "そのせいで、たくさんの方にご迷惑をかけて……そして手助けいただいたおかげで、身共もここまでこれました。"
51250-89 = "本当に運よく、皆様とこうして向き合えたのだと思っております。"
51250-90 = "誠に……ありがとう存じます。"
51250-95 = "ううん……むしろ……"
51250-96 = "最後まで諦めずにいてくれたユカリに、アタシたちが感謝したいくらいっていうか……"
51250-97 = "ユカリ……私の方、こそ……"
51250-98 = "[s] \"みんなが努力した結果だよ。\""
51250-103 = "ええ！それに、せっかくこうして皆様とまた集まれたのですし……"
51250-104 = "身共、皆さんの前でナグサ先輩に伝えたいことがありますの！"
51250-112 = "この[ruby=かでのこうじ]勘解由小路[/ruby]ユカリ、ナグサ先輩に継承戦を申し込みます！！"
51250-116 = "[ns] \"…………え？\""
51250-121 = "え、今……！？"
51250-122 = "はい！これは大切なことですので！"
51250-123 = "レンゲ先輩、キキョウ先輩も覚えていらっしゃいますよね？#n元はといえば、身共はナグサ先輩に継承戦を申し込むためにここまで来たのです！"
51250-124 = "それは、そう、だけど……"
51250-125 = "[s] \"でも、今から継承戦はナグサも……\""
51250-131 = "うん、分かった。"
51250-133 = "マジか！？"
51250-134 = "……先輩？"
51250-136 = "本来の目的がそうなら、ちゃんとしないとね。"
51250-140 = "百花繚乱紛争調停委員会の委員長代理、[ruby=ごりょう]御稜[/ruby]ナグサ……"
51250-141 = "勘解由小路ユカリの挑戦に、受けて立つ。"
51250-145 = "……はい！"
51250-155 = "[ns] \"では……始め！\""
51250-172 = "きゃううん！？"
51250-177 = "[ns] \"あっ、えっと……勝者、御稜ナグサ！\""
51250-179 = "わわっ、一瞬じゃん。"
51250-180 = "薄々予想はしてたけど……相手はナグサ先輩だし#n……まぁ、当然の結果だよね。 "
51250-185 = "もしかして……空気読めてなかった……？"
51250-186 = "[s3] \"ううん、勝負の世界は厳しいからね。\"\n[s4] \"だからユカリもあまり落ち込まずに――\""
51250-194 = "ユカリ！復活！ですの！！"
51250-195 = "[s] \"全っ然落ち込んでなかったね！？\""
51250-196 = "落ち込む……？"
51250-197 = "ふふっ、先生ったら。"
51250-198 = "身共は全力で戦いに挑み、敗北したのです。"
51250-199 = "それこそ完璧な勝負でしたわ。身共がこれに納得できない理由などありません。"
51250-200 = "ええ！当然の結果！ということですの！"
51250-201 = "この戦いを通して、今一度ナグサ先輩が身共の憧れであると、確かめたかっただけですゆえ！！"
51250-202 = "そ、そっか……。"
51250-203 = "はい！！"
51250-206 = "それならいいけどさ……うん、なんというか。"
51250-207 = "本当、ユカリらしいね。"
51250-208 = "[s] \"……そうだね。\""
51250-210 = "えへへ……それでは、皆様！早く戻りましょう！"
51250-217 = "百花繚乱に…… "
51250-218 = "身共たちの、家に――！"
51250-229 = "次回;願いを込めて"
