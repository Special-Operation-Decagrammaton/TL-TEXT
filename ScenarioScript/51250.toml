[translation]
51250-1 = "Episódio 25; Agora, Para Você"
51250-13 = "Ugh...!"
51250-14 = "......Ela fugiu."
51250-15 = "O que foi aquilo...? #n Pensei que tinha destruído o livro, mas de repente...!"
51250-17 = "Fez um barulho enorme, levei um susto...!!"
51250-18 = "[s] \"Talvez aquilo também fosse uma Hyakumonogatari...\""
51250-19 = "Hm... parece impossível perseguir ela agora."
51250-20 = "Que coisa sem sentido era aquela! #n E afinal, quem é esse Clube das Flores, Pássaros, Vento e Lua!?"
51250-21 = "[s1] \"Bem, primeiro vamos cuidar dos ferimentos!\"\n[s2] \"Estão todas bem? Algum ferimento?\""
51250-26 = "Ah, por aqui estamos bem. E a Yukari?"
51250-27 = "Eu também estou ótima!"
51250-28 = "[s] \"E a Kikyou e a Nagusa...\""
51250-34 = "......"
51250-35 = "......"
51250-37 = "Hum..."
51250-43 = "Nagusa-senpai... sobre o que você disse antes..."
51250-47 = "......Sim."
51250-51 = "......Não, deixa pra lá."
51250-52 = "............Entendi."
51250-57 = "............"
51250-58 = "[s] \"............\""
51250-62 = "(Sussurrando) Sensei, sei que não é da minha conta, mas..."
51250-63 = "(Sussurrando) Essas duas... não estão um pouco tensas demais?"
51250-64 = "[s] \"(Sussurrando) Você vai mesmo falar isso!?\""
51250-65 = "Ma-mas...!"
51250-66 = "A mente por trás de tudo foi, de certa forma, derrotada... ou melhor, ela fugiu!"
51250-67 = "Não dá nem pra dizer que é um final feliz, mas acho que é hora de começarmos a pensar em voltar para casa..."
51250-68 = "Não podemos ficar aqui para sempre... Sensei, pode dar um jeito nisso?"
51250-69 = "[s] \"Hmm, mesmo me pedindo isso...\""
51250-75 = "*Ahem*."
51250-76 = "Nagusa-senpai, Kikyou-senpai, Renge-senpai. #n E também... Sensei."
51250-82 = "[ns] \"Yukari?\""
51250-87 = "Neste dia, aconteceram tantas coisas que não consigo nem contar."
51250-88 = "Por minha causa, causei problemas para muitas pessoas... e graças à ajuda de vocês, consegui chegar até aqui."
51250-89 = "Acho que tive muita sorte de poder encarar todas vocês assim."
51250-90 = "Sinceramente... muito obrigada."
51250-95 = "Não... na verdade..."
51250-96 = "Eu que agradeço à Yukari por não ter desistido até o fim..."
51250-97 = "Yukari... eu que..."
51250-98 = "[s] \"É o resultado do esforço de todas vocês.\""
51250-103 = "Sim! E já que conseguimos nos reunir todas de novo..."
51250-104 = "Eu tenho algo para dizer à Nagusa-senpai na frente de todas!"
51250-112 = "Eu, Kadenokouji Yukari, desafio a Nagusa-senpai para uma Batalha de Sucessão!!"
51250-116 = "[ns] \"............Hã?\""
51250-121 = "Eh, agora...!?"
51250-122 = "Sim! Porque isso é muito importante!"
51250-123 = "Renge-senpai, Kikyou-senpai, vocês lembram, não lembram? #n No fundo, foi para desafiar a Nagusa-senpai para a Batalha de Sucessão que eu vim até aqui!"
51250-124 = "É, verdade, mas..."
51250-125 = "[s] \"Mas, agora a Nagusa também...\""
51250-131 = "Sim, entendi."
51250-133 = "Sério!?"
51250-134 = "......Senpai?"
51250-136 = "Se esse era o objetivo original, então precisamos fazer isso direito."
51250-140 = "Eu, Goryou Nagusa, presidente interina do Comitê de Mediação de Conflitos Hyakkaryouran..."
51250-141 = "Aceito o desafio de Kadenokouji Yukari."
51250-145 = "......Sim!"
51250-155 = "[ns] \"Então... comecem!\""
51250-172 = "Kyaun!?"
51250-177 = "[ns] \"Ah, hum... Vencedora, Goryou Nagusa!\""
51250-179 = "Uau, foi num instante."
51250-180 = "Eu já imaginava, mas... a oponente é a Nagusa-senpai... #n Bem, resultado esperado."
51250-185 = "Será que... eu não li o clima...?"
51250-186 = "[s3] \"Não, não, o mundo dos desafios é rigoroso.\"\n[s4] \"Então Yukari, não fique tão triste――\""
51250-194 = "Yukari! Renasceu!! Sim!!"
51250-195 = "[s] \"Você não estava nem um pouco triste!?\""
51250-196 = "Triste...?"
51250-197 = "Fufu, Sensei."
51250-198 = "Eu encarei a batalha com todas as minhas forças e fui derrotada."
51250-199 = "Foi um duelo perfeito. Não tenho motivos para não aceitar o resultado."
51250-200 = "Sim! É o resultado natural! Apenas isso!"
51250-201 = "Eu só queria confirmar, mais uma vez, através desta luta, que a Nagusa-senpai é a minha admiração!!"
51250-202 = "E-Entendi..."
51250-203 = "Sim!!"
51250-206 = "Se é assim, tudo bem... é, de certa forma."
51250-207 = "A cara da Yukari mesmo."
51250-208 = "[s] \"......É verdade.\""
51250-210 = "Ehehe... Então, pessoal! Vamos voltar logo!"
51250-217 = "Para a Hyakkaryouran..."
51250-218 = "Para o nosso lar――!"
51250-229 = "Próximo Episódio; Com os Meus Desejos"
