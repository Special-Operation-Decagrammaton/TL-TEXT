[translation]
2902-1 = "E assim, todos reunidos (2)"
2902-2 = "Uau, que incrível!"
2902-10 = "Este é o lendário Clube de Pesquisa de Ninjutsu...!"
2902-12 = "……Tsukuyo, venha aqui um pouco."
2902-16 = "Hum...?"
2902-22 = "O que eu faço, Tsukuyo! Uma garota suspeita apareceu! Quer dizer, ela parece fofa, mas!"
2902-23 = "Hum, suspeita, será...?"
2902-24 = "Não, eu sei que sou eu quem está dizendo, mas é o 'Clube de Pesquisa de Ninjutsu', sabe?"
2902-25 = "Alguém pedir para 'entrar' em um clube tão misterioso assim, é normal?"
2902-26 = "É suspeito, não seria exagero dizer que a suspeita caminha por aí vestindo roupas!"
2902-27 = "Mas, eu também entrei para o clube, não foi...?"
2902-28 = "A Tsukuyo não conta! Eu mesma te recrutei!"
2902-29 = "É, verdade."
2902-30 = "Será que... ela é uma espiã do Departamento Onmyo ou do Hyakkiyako...!"
2902-34 = "Não, mas ela não parece ser uma pessoa má...!"
2902-35 = "Embora seja assustador conhecê-la pela primeira vez, já que ela se deu ao trabalho de vir até aqui..."
2902-39 = "Pode ser o primeiro passo,"
2902-40 = "para nos tornarmos um clube oficial...!"
2902-41 = "Hum... eu quero membros, mas aceitar alguém sem saber que tipo de pessoa ela é, é um pouco..."
2902-45 = "……Certo, decidi."
2902-49 = "Vamos fazer uma entrevista!"
2902-51 = "Entrevista...?"
2902-52 = "Isso mesmo, vamos confirmar se ela é digna de ser um membro do Clube de Pesquisa de Ninjutsu!"
2902-54 = "Sendo assim, eu gostaria de fazer uma entrevista, mas... hum, Izuna-san? O que acha?"
2902-55 = "Entendo, um trabalho incompleto pode atrapalhar as missões como ninja... é isso que quer dizer!"
2902-56 = "Para a Izuna, não há problema algum!"
2902-57 = "Hum... B-bem, tudo bem então."
2902-58 = "Ah, é verdade, Tsukuyo. Já que temos uma visita, poderia trazer algo para beber?"
2902-59 = "Sim...!"
2902-67 = "Hum, bem..."
2902-73 = "Eu trouxe... algo para beber...!"
2902-75 = "Sim, muito obrigada!"
2902-80 = "É algo bem simples, mas, por favor...!"
2902-82 = "Agradeço! Nin-nin!"
2902-83 = "Uau... acho que é a primeira vez que ouço isso ao vivo...!"
2902-84 = "Ah, desculpe, hum... não temos chá nem nada do tipo, sinto muito..."
2902-85 = "É só água da torneira, então, me desculpe..."
2902-86 = "Entendo, esta é a água da hospitalidade..."
2902-87 = "Ah, desculpe...! Mesmo sendo uma visita, servir apenas água...!"
2902-88 = "Não foi com a intenção de ser indelicada, mas...! Hum, não temos folhas de chá, e..."
2902-89 = "Porque não temos verba para o clube..."
2902-91 = "T-tá tudo bem!"
2902-92 = "Água da torneira também é uma bebida digna, feita graças às pessoas que mantêm o sistema de encanamento funcionando! Então está tudo bem! Provavelmente!"
2902-93 = "Desculpe, eu não entendi muito bem...!"
2902-95 = "……Entendo!"
2902-96 = "Hã?"
2902-97 = "……?"
2902-98 = "A Izuna já viu algo parecido em dramas de época sobre ninjas!"
2902-99 = "Um verdadeiro ninja deve se contentar apenas com água...! Não se deve buscar luxos além disso!"
2902-100 = "Praticar isso no dia a dia é ainda mais incrível do que eu ouvi nos rumores... Este é o Clube de Pesquisa de Ninjutsu! A Izuna está emocionada!"
2902-101 = "……É, será?"
2902-102 = "Bem, de qualquer forma, vamos ao que interessa..."
2902-103 = "Izuna-san, como você ficou sabendo da gente?"
2902-104 = "Não querendo me gabar, mas esta sala do clube fica em um lugar... bem remoto, mesmo aqui em Hyakkiyako, sabe?"
2902-105 = "O transporte é ruim, não tem muitas instalações por perto..."
2902-106 = "(Bom, é para evitar que o Hyakaryouran ou o Comitê Yin-Yang nos encontrem, então não tem jeito...)"
2902-108 = "É verdade, é inconveniente e difícil de chegar... Se perder o ônibus, é um sufoco para ir à escola..."
2902-109 = "Às vezes a luz ou a água acabam... e a loja de conveniência também é bem longe..."
2902-110 = "Tsukuyo, será que você passou por tudo isso esse tempo todo!?"
2902-111 = "Mas, é um lugar bom, então...!"
2902-112 = "À noite, dá para ver bem as estrelas... e como é silencioso, é fácil gravar os vídeos de ninjutsu..."
2902-113 = "É verdade, não receber reclamações é uma vantagem."
2902-114 = "A minha 'Arte Ninja: Fogo Cintilante' também daria o que falar se tivesse gente por perto..."
2902-116 = "U-uma arte ninja original...!!"
2902-117 = "?"
2902-118 = "Ah, bem, era sobre o motivo de eu ter vindo aqui! Izuna encontrou isto!"
2902-122 = "Isso é..."
2902-126 = "Ah, lembrei! Foi um panfleto de divulgação que eu fiz há uns seis meses!"
2902-127 = "O código escrito neste panfleto é o mesmo que aparece na obra-prima do diretor Shiba Inu Wanzou, 'O Ninja com o Cão', não é?"
2902-128 = "Hã, você percebeu isso!?"
2902-129 = "Incrível..."
2902-131 = "(É verdade, entender esse mecanismo significa que ela gosta dos mesmos filmes que eu... Eu até fiz pensando nisso, mas...)"
2902-132 = "(Até agora, quem veio por causa desse panfleto foi só o Hyakaryouran para dizer 'não saia colando isso por aí', então achei que tinha sido um fracasso...)"
2902-133 = "(Quem diria, essa garota...!?)"
2902-135 = "……Fufu, você é boa, hein! Então, posso fazer a segunda pergunta?"
2902-136 = "Talvez essa seja a pergunta mais importante de todas..."
2902-137 = "Ah, sim!"
2902-138 = "Quero que me diga o motivo de você querer entrar no 'Clube de Pesquisa de Ninjutsu', Izuna-san."
2902-139 = "Ah..."
2902-140 = "Izuna... quer se tornar uma ninja exemplar, como todas vocês do Clube de Pesquisa de Ninjutsu!"
2902-141 = "Como... a gente?"
2902-142 = "Hã...?"
2902-143 = "O canal 'Diário Ninja da Michiru-cchi'!"
2902-144 = "Eu fiquei muito emocionada quando vi aquele episódio: 'Vejam, o super ninjutsu que racha até rochas!'"
2902-145 = "Isso é..."
2902-146 = "Aquele vídeo que é o mais popular do nosso canal...!"
2902-147 = "Entendo, realmente aquele ficou muito bem gravado."
2902-149 = "(A gente só deixou a rocha mais fina antes e cronometrou bem os efeitos de explosão... mas como o visual ficou chamativo, acabou bombando mesmo)"
2902-150 = "(Então... ela assistiu ao nosso canal)"
2902-151 = "(E virou fã, e quer entrar no clube para ficar igual a gente...?)"
2902-153 = "……Ei, espera. Isso significa que você... é inscrita no canal, Izuna-san!?"
2902-154 = "Sim!"
2902-155 = "Presidente...! É a primeira vez que conheço alguém que realmente é inscrito...!"
2902-160 = "O que a gente faz, tiramos uma foto...!? Ela não é tipo um monumento natural ou algo assim...!?"
2902-161 = "Não, não, não fale como se ela fosse um Tsuchinoko! Tem gente que se inscreve, então não é algo tão impossível assim! Mas fico feliz!"
2902-162 = "Ao ver aquele vídeo, Izuna pensou que, se estivesse com vocês, poderia se tornar a melhor ninja de Kivotos!"
2902-163 = "……Hm?"
2902-164 = "A melhor ninja... de Kivotos."
2902-165 = "Bem, não entendi muito bem, mas é incrível...!"
2902-166 = "A melhor ninja de Kivotos, hein..."
2902-167 = "Sim, é isso aí! Já que você é uma ninja, acho que um objetivo grandioso assim é o ideal!"
2902-168 = "Conseguir decifrar o código do diretor Shiba Inu Wanzou e sentir a mesma alegria que nós... essa sua sensibilidade,"
2902-172 = "e essa determinação inabalável...!"
2902-173 = "Izuna-san, você é certamente uma de nós!"
2902-175 = "Sim, fico muito feliz em conhecê-las!"
2902-176 = "É exatamente o tipo de talento que a nossa presidente estava procurando...!"
2902-178 = "Claro, eu ainda não sou uma Chunin que chega aos pés de vocês do Clube de Pesquisa de Ninjutsu!"
2902-179 = "B-bem, acho que nós também não somos lá essas coisas!"
2902-180 = "Izuna-san, nós somos iguais."
2902-181 = "Mas, eu ainda não tenho treinamento suficiente..."
2902-182 = "Você veio até aqui por causa do nosso panfleto, não veio? Sei que você ama ninjas tanto quanto nós. Isso é o suficiente para sermos companheiras de mesma posição."
2902-183 = "……！！"
2902-184 = "……Sim! Eu amo ninjas!"
2902-185 = "Antes, ninguém me entendia e eu sempre estive sozinha..."
2902-186 = "E houve vezes em que fui usada por pessoas que queriam arruinar o festival..."
2902-190 = "（Arruinar o festival...? Usada...?）"
2902-191 = "（...Será que ela está falando do Comi-Sen?）"
2902-192 = "（Se ela quer dizer arruinar o Comi-Sen...）"
2902-194 = "Izuna-san, isso significa que..."
2902-195 = "Você está falando daqueles caras que fazem bagunça no festival só para benefício próprio?"
2902-196 = "Sim, exatamente! Por acaso vocês sabiam disso?"
2902-197 = "Bem, esse tipo de gente existe em qualquer evento."
2902-198 = "Pessoas que, só porque se acham o 'mainstream' ou 'alta cultura', ficam menosprezando os outros!"
2902-199 = "Francamente, se querem curtir seus hobbies, deveriam ter respeito por outros gêneros também. No fim, quem acaba sofrendo com isso são eles mesmos ou seus próprios companheiros."
2902-200 = "E-entendo...! Então existem muitas pessoas como Nyantenmaru no mundo...!"
2902-201 = "Eu não sabia que o mundo dos ninjas era assim... Izuna aprendeu algo novo hoje!"
2902-202 = "Mesmo passando por isso, você ainda ama ninjas, não é? Isso é incrível, e acho que é uma coisa boa."
2902-204 = "Se algo assim acontecesse comigo, acho que eu sairia correndo..."
2902-205 = "Izuna-san, você é, bem, incrível."
2902-206 = "Eu,"
2902-207 = "consegui encontrar o meu Mestre!"
2902-208 = "……Mestre?"
2902-210 = "（Explicando a situação）"
2902-212 = "……E foi assim que eu me tornei a ninja do meu Mestre!"
2902-213 = "E-entendi...?"
2902-218 = "（...Ué, que tipo de aventura ninja é essa?）"
2902-219 = "（E esse 'Mestre'? Que tipo de... relacionamento é esse?）"
2902-221 = "E esse tal de 'Sensei do Schale', parece que já ouvi esse nome em algum lugar..."
2902-222 = "Snif, snif..."
2902-223 = "Ei, Tsukuyo? Por que você está chorando...?"
2902-224 = "Izuna-san, você passou por tanta coisa... superar todas essas adversidades..."
2902-225 = "Fiquei muito emocionada...!"
2902-226 = "Foi um pouco difícil, mas eu estou bem!"
2902-227 = "Graças a isso, encontrei meu Mestre e pude continuar perseguindo meus sonhos!"
2902-228 = "Que história bonita...! Presidente, você não acha...?"
2902-229 = "Ah, sim, bem... talvez eu não tenha entendido tudo..."
2902-230 = "Mas deu para sentir o que você sente, Izuna-san. Deve ter sido difícil."
2902-231 = "Eu adoraria conhecer esse seu Mestre um dia!"
2902-232 = "Com certeza, se tivermos a oportunidade, adoraria!"
2902-236 = "E foi assim que eu vim parar aqui no Clube de Pesquisa de Ninjutsu!"
2902-237 = "Com isso, a resposta está clara?"
2902-242 = "Presidente...?"
2902-243 = "Izuna... não, Izuna!"
2902-244 = "Tudo o que você vivenciou, toda a sua trajetória até aqui, e o sonho que você carrega!"
2902-245 = "Nós, do Clube de Pesquisa de Ninjutsu, concordamos plenamente com isso e lhe damos as boas-vindas!"
2902-247 = "Bem-vinda ao Clube de Pesquisa de Ninjutsu, Izuna! Podemos dizer assim, né, Tsukuyo?"
2902-248 = "Sim, é claro...! Izuna-san, não, Izuna-chan! Bem-vinda ao Clube de Pesquisa de Ninjutsu...!"
2902-249 = "Ah..."
2902-253 = "Sim! Como membro do Clube de Pesquisa de Ninjutsu, conto com o apoio de vocês daqui em diante!"
2902-254 = "Presidente! E também Tsukuyo-dono!"
2902-255 = "Pre-presidente? Não estou acostumada a ser chamada assim por alguém além da Tsukuyo, mas..."
2902-256 = "Sim, é muito bom!"
2902-257 = "Tsukuyo-dono, é... hehe, hehehe..."
2902-258 = "Nós que agradecemos, Izuna-chan."
2902-259 = "Sim! Aqui, junto com vocês,"
2902-260 = "a Izuna continuará se esforçando para se tornar a melhor ninja de Kivotos!"
2902-261 = "Muito bem, vamos mirar na "aprovação oficial do clube"! E também em alcançar 100 inscritos no canal "Diário Ninja da Michiru"!"
2902-262 = "Sim, vamos nos esforçar...!"
2902-263 = "Nin-nin!"
2902-270 = "(Assim, as garotas, cada uma com seus próprios sonhos, se reuniram. O encontro delas com a pessoa a quem Izuna chama de "Mestre" é uma história para um pouco mais tarde...)"
2902-271 = "E assim, todas reunidas"
