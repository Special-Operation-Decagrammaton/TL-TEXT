[translation]
2902-1 = "そうして一堂に会して（２）"
2902-2 = "わぁ、すごいですっ！"
2902-10 = "ここが噂の、忍術研究部……！"
2902-12 = "……ツクヨ、ちょっと来て。"
2902-16 = "えっと……？"
2902-22 = "どうしようツクヨ！怪しい子来ちゃった！いや見た目は可愛いけど！"
2902-23 = "えっと、怪しい、でしょうか……？"
2902-24 = "いや自分で言うのもなんだけど、「忍術研究部」だよ？"
2902-25 = "こんな正体不明の部活に「入部希望」なんて、普通いる？"
2902-26 = "怪しいよ、怪しさが服を着て歩いてると言っても過言じゃないよ！"
2902-27 = "でも、私も入部、しましたよ……？"
2902-28 = "ツクヨはノーカン！私が直接スカウトしたんだし！"
2902-29 = "そう、でした。"
2902-30 = "もしかして……陰陽部、あるいは百花繚乱からの刺客とか！？"
2902-34 = "いや、でもそんな悪い子には見えない……！"
2902-35 = "初対面で、怖くはありますが、せっかくいらっしゃってくれましたし……。"
2902-39 = "正式な部活への、"
2902-40 = "第一歩かも、しれません……！"
2902-41 = "んー……部員は欲しいけど、どんな子か分からないまま入部してもらうのはちょっと……。"
2902-45 = "……よし、決めた。"
2902-49 = "面接をしよう！"
2902-51 = "面接……？"
2902-52 = "そう、あの子が忍術研究部の部員としてふさわしいか！それを確認させてもらおう！"
2902-54 = "というわけで、面接をさせてもらおうと思ってるんだけど……えっと、イズナさん？どう、かな？"
2902-55 = "なるほど、中途半端では忍者としての任務に支障をきたす……そういうことですね！"
2902-56 = "イズナは全く問題ありません！"
2902-57 = "えっと……？ま、まあ、良いか。"
2902-58 = "あ、そうだツクヨ。せっかくのお客様だし、飲み物を出してくれる？"
2902-59 = "はいっ……！"
2902-67 = "あの、えっと……。"
2902-73 = "お飲み物を、お持ち、しました……！"
2902-75 = "はい、ありがとうございます！"
2902-80 = "つまらないものですが、その、どうぞ……！"
2902-82 = "感謝します！ニンニン！"
2902-83 = "わぁっ……私それ、実際に聞いたのは初めてかもしれません……！"
2902-84 = "あ、すみませんえっと……こちら、お茶とかが無くて、申し訳ないのですが……。"
2902-85 = "ただの水道水で、その、ごめんなさい……。"
2902-86 = "なるほど、これがおもてなしの水……。"
2902-87 = "あ、ごめんなさい……！せっかくのお客様、なのに、お水だなんて……！？"
2902-88 = "嫌がらせのつもりでは、なかったの、ですが……！えっと、茶葉とかも、無くて、その……！"
2902-89 = "部費が、無いので……。"
2902-91 = "だ、大丈夫！"
2902-92 = "水道水も、水道ってシステムを整備してくれてる人たちのおかげで成り立ってる、立派な飲み物！だから大丈夫！多分！"
2902-93 = "ごめんなさい、よく、分かりません……！"
2902-95 = "……なるほど！"
2902-96 = "えっ？"
2902-97 = "……？"
2902-98 = "イズナ、忍者の時代劇で似たようなものを見たことがあります！"
2902-99 = "真の忍者であれば、水さえあれば十分……！それ以上の贅沢を求むべからず、と！"
2902-100 = "それを日常から実践しているとは、噂で聞いた以上です……これが忍術研究部！イズナ、感激しました！"
2902-101 = "……そ、そうかな？"
2902-102 = "えっと、とにかく本題に入ろうか……"
2902-103 = "イズナさんは、どうやって私たちのことを知ったの？"
2902-104 = "自分で言うのもなんだけど、この部室ってその……百鬼夜行でも、結構辺鄙なところにあるでしょ？"
2902-105 = "交通も不便だし、近くに施設とかもあんまり無いし……。"
2902-106 = "（まあ百花繚乱とか陰陽部に見つからないようにするためだから、仕方ないんだけど……）"
2902-108 = "そうですね、不便ですし、行き来も大変ですし……バスを一本逃したら、学校に行くのも一苦労で……。"
2902-109 = "時々電気とか、水も切れますし……コンビニも、かなり遠いですし……。"
2902-110 = "ツクヨ、もしかして今までずっと辛かった！？"
2902-111 = "でも、良いところ、なので……！"
2902-112 = "夜になると、星もよく見えますし……静かなので、忍術の撮影とかも、やりやすくて……。"
2902-113 = "だね、確かにクレームとかが入らないのは利点かも。"
2902-114 = "私の作った「忍法・キラキラファイアーの術」とかも、近くに人がいたらクレームものだし……"
2902-116 = "じ、自作の忍術……！！"
2902-117 = "？"
2902-118 = "あ、えっと、ここに来られた理由でしたね！イズナ、これを見つけたんです！"
2902-122 = "それって……。"
2902-126 = "あっ、思い出した！私が半年くらい前に作った、広報用のチラシ！"
2902-127 = "このチラシに書かれている暗号、柴犬ワン蔵監督の代表作『犬連れ忍者』に出てきたものと同じですよね？"
2902-128 = "えっ、それに気づいたの！？"
2902-129 = "すごい、ですね……！"
2902-131 = "（確かに、この仕組みが分かるってことは同じような映画が好きってこと……それを狙って作ったところはあるけど……）"
2902-132 = "（そのチラシを見て来たのは、今まで「こういうのを勝手に貼らないで」って言いに来た百花繚乱だけだったし、失敗したと思ってたら……）"
2902-133 = "（まさか、この子……！？）"
2902-135 = "……ふふっ、中々やるねぇ！じゃあ、二つ目の質問良いかな。"
2902-136 = "これがもしかしたら、一番大事な質問かもしれないけど……。"
2902-137 = "あ、はいっ！"
2902-138 = "イズナさんが「忍術研究部」に入りたい理由を、教えてほしいな。"
2902-139 = "あっ……"
2902-140 = "イズナは……忍術研究部のみなさんのように、立派な忍者になりたいと思ったからです！"
2902-141 = "私たち、みたいに……？"
2902-142 = "え……？"
2902-143 = "「少女忍法帖ミチルっち」チャンネル！"
2902-144 = "あの「見よ、岩をも砕く超絶忍術！」の回を見て、イズナはとても感動しました！"
2902-145 = "それって……。"
2902-146 = "私たちのチャンネルで、一番伸びてる、あの動画……！"
2902-147 = "なるほど、確かにあれは上手く撮れたやつだったね。"
2902-149 = "（事前に岩を薄くしておいて、タイミング良く爆薬の演出を重ねただけだけど……ビジュアルが派手だったせいで、そういえば割と伸びたんだった）"
2902-150 = "（そっか……私たちのチャンネル、見てくれたんだ）"
2902-151 = "（それでファンになってくれて、私たちみたいになりたくて忍術研究部に入ろうと……？）"
2902-153 = "……え、待った。っていうことはイズナさん……チャンネル登録してくれてるの！？"
2902-154 = "はい！"
2902-155 = "部長……！実際に登録してくれる方、私、初めて会いました……！"
2902-160 = "どうしましょう、写真とか、撮りますか……！？天然記念物みたいな方なのでは……！？"
2902-161 = "いやいや、ツチノコみたいな言い方しないの！それなりに登録してくれる人もいるんだから、あり得ない事態ってほどじゃないでしょ！嬉しいけど！"
2902-162 = "その映像を見てイズナはみなさんと一緒なら、キヴォトス最高の忍者になれるのではと思いました！"
2902-163 = "……ん？"
2902-164 = "キヴォトス最高の、忍者……。"
2902-165 = "えっと、よく分かりませんが、凄いですね……！"
2902-166 = "キヴォトス最高の忍者ねぇ……。"
2902-167 = "うん、良いね！せっかくの忍者なんだし、それくらいでっかい目標の方が良いと思う！"
2902-168 = "柴犬ワン蔵監督の暗号を見抜き、私たちと同じものに喜んでくれるその感性、"
2902-172 = "そして強い決意……！"
2902-173 = "イズナさん、あなたは確かに私たちの同志かも！"
2902-175 = "はい、お会いできて嬉しいです！"
2902-176 = "まさに、部長が探していた、人材……！"
2902-178 = "もちろんイズナは、まだ忍術研究部のみなさんに及ぶような中忍ではありませんが！"
2902-179 = "ま、まあ私たちも、それほどじゃないと思うけどね！"
2902-180 = "イズナさんも私たちも、一緒だよ。"
2902-181 = "ですが、イズナはまだ修行が足りない身で……"
2902-182 = "私たちのチラシを見て、ここまで来てくれたんでしょ？イズナさんも私たちと同じで、忍者のことがすっごく好きだってことは分かる。それなら十分、同じ立場の仲間だよ。"
2902-183 = "……！！"
2902-184 = "……はい！イズナは、忍者が大好きです！"
2902-185 = "以前は誰にも理解していただけず、ずっとひとりでしたが……"
2902-186 = "祭りを台無しにしようとする方々に、利用されてしまったこともありましたが……。"
2902-190 = "（祭りを台無しに……？利用……？）"
2902-191 = "（……コミセンの話？）"
2902-192 = "（コミセンを台無しにってことは……）"
2902-194 = "イズナさん、それって……"
2902-195 = "自分たちの利益のために、お祭りの場で好き勝手暴れるようなやつらのこと？"
2902-196 = "はい、そうです！もしかして、ご存知でしたか？"
2902-197 = "まあ、どこの会場にでもいるもんだよね。"
2902-198 = "自分たちがメインストリームだからって、あるいはハイカルチャーだからって、相手をバカにするような輩が！"
2902-199 = "全く、趣味を楽しむなら他ジャンルにもリスペクトを持ってほしいもんだよ。それによって苦労するのは自分たちか、自分の仲間たちだってのに。"
2902-200 = "な、なるほど……！世の中には、ニャン天丸のような存在がたくさんいるのですね……！"
2902-201 = "忍者の世界がそこまでのものだったとは……イズナ、また一つ賢くなりました！"
2902-202 = "そんな目に遭っても、今でも忍者が好きなんだよね？それはすごいことだし、良いことだと思う。"
2902-204 = "そんなことが起きたら、私、逃げてしまうと思います……"
2902-205 = "イズナさんは、その、すごいです。"
2902-206 = "イズナは、"
2902-207 = "主殿と出会うことができましたので！"
2902-208 = "……主殿？"
2902-210 = "（説明中）"
2902-212 = "……というわけでイズナは、主殿の忍者になったのでした！"
2902-213 = "な、なるほど……？"
2902-218 = "（……え、何その忍者もビックリな冒険活劇。）"
2902-219 = "（っていうか主殿？何そのプレ……関係？）"
2902-221 = "っていうか「シャーレの先生」って、どこかで聞いたような……"
2902-222 = "うっ、うぅっ……。"
2902-223 = "え、ツクヨ？どうして泣いて……？"
2902-224 = "イズナさん、大変、だったのですね……そんな逆境を、乗り越えて、きただなんて……。"
2902-225 = "感動、してしまいました……！"
2902-226 = "少し辛かったですが、イズナは大丈夫です！"
2902-227 = "そのおかげで主殿にも出会い、夢を追い続けられるようになりましたので！"
2902-228 = "良いお話、ですね……！部長も、そう思いませんか……？"
2902-229 = "あ、うん、えっと……全部は理解できなかったかもだけど……。"
2902-230 = "でも、イズナさんの気持ちは伝わってきた。大変だったね。"
2902-231 = "イズナさんの主殿って人にも、いつか会ってみたいな！"
2902-232 = "そうですね、機会があればぜひ！"
2902-236 = "そんなこんなでイズナは、この忍術研究部にやってきたのです！"
2902-237 = "これで、答えになってますでしょうか？"
2902-242 = "部長……？"
2902-243 = "イズナさん……ううん、イズナ！"
2902-244 = "君が経験してきたこと、これまでの軌跡のその全てと、君の掲げる夢！"
2902-245 = "それらに我々忍術研究部は大いに同意し、歓迎しよう！"
2902-247 = "忍術研究部にようこそ、イズナ！ってことで良いよね、ツクヨ？"
2902-248 = "はい、もちろん、です……！イズナさん、いえ、イズナちゃん！忍術研究部へ、ようこそ……！"
2902-249 = "あっ……。"
2902-253 = "はい！忍術研究部の部員として、これからどうぞよろしくお願いします！"
2902-254 = "部長！そしてツクヨ殿！"
2902-255 = "ぶ、部長？何だかツクヨ以外に言われるのは慣れないけど……"
2902-256 = "うん、良いね！"
2902-257 = "つ、ツクヨ殿、だなんて……えへ、えへへっ……。"
2902-258 = "こちらこそ、よろしくね、イズナちゃん。"
2902-259 = "はい！イズナはここでみなさんと一緒に、"
2902-260 = "引き続きキヴォトス最高の忍者を目指して邁進していきます！"
2902-261 = "よーし、このまま目指せ「部活の正式な認可」！あと「少女忍法帖ミチルっち」のチャンネル登録者数100人突破！"
2902-262 = "はい、頑張りましょう……！"
2902-263 = "ニンニン！"
2902-270 = "（こうして、それぞれに夢を抱いた少女たちが集まった。イズナが「主殿」と呼ぶ存在に彼女たちが出会うのは、もう少し後のお話……）"
2902-271 = "そうして一堂に会して"
