[translation]
10050030-1 = "Episódio 3: Declaração de Imposto"
10050030-2 = "Dormitório das alunas de Trinity"
10050030-3 = "Ahhh... estou exausta... e olha que é apenas o primeiro dia."
10050030-4 = "Bom trabalho, Chefe."
10050030-5 = "Ainda assim, Trinity é incrível. Quem diria que eles teriam um lugar como este dentro da escola."
10050030-6 = "Como é uma escola com muito intercâmbio externo, não é de se estranhar que tenham algo assim."
10050030-7 = "Embora... tenha custado um preço considerável."
10050030-8 = "Hmm, pensando que as despesas da viagem saíram do nosso bolso, é um pouco doloroso. #nSerá que deveríamos ter mudado a porcentagem naquela hora?"
10050030-9 = "Se tivéssemos feito isso, o contrato não teria sido fechado, não é...?"
10050030-10 = "Além disso... vendemos mais cópias do que o esperado, então isso deve ter coberto as despesas da viagem."
10050030-11 = "É verdade. Vamos dar uma olhada nos lucros novamente."
10050030-12 = "Ah, esse é o momento que mais faz meu coração disparar. Vamos ver..."
10050030-13 = "..."
10050030-14 = "..."
10050030-19 = "T-Takane!? Mantenha a calma!"
10050030-20 = "Chefe... isso é um sonho, não é? #nSe for um sonho, eu entendo tudo..."
10050030-21 = "Não, isso é inegavelmente a realidade."
10050030-22 = "Nós... conseguimos tudo isso? Tem certeza que podemos ficar com isso!?"
10050030-23 = "Eu entendo o que você quer dizer, mas... eu disse que é a realidade."
10050030-24 = "Mas, de fato, o número de dígitos é diferente. #nQuantos zeros são...? Então é isso que é Trinity, realmente assustador."
10050030-25 = "Como eu pensava, para arrecadar dinheiro, deveríamos ter ido a um lugar onde o dinheiro se concentra!"
10050030-26 = "Pode ser tarde para dizer isso, mas acho que o fato de as alunas de Trinity acharem as histórias de Red Winter algo novo foi um fator importante."
10050030-27 = "Lembrei-me do comentário de uma aluna... #n'É um tipo de nutrição que nunca provei antes...'"
10050030-28 = "O que é comum em Red Winter é diferente para os outros, não é?"
10050030-29 = "Acho que isso prova que devemos promover o intercâmbio cultural ativamente. #nCaso contrário, a cultura estagna e se torna uma doença que corrói tudo ao redor."
10050030-30 = "Como um sonho que se tornou esfarrapado e decadente..."
10050030-31 = "Chefe..."
10050030-32 = "Bem, basicamente, nosso trabalho é espalhar e fazer a cultura circular."
10050030-33 = "Afinal, a cultura é um ser vivo que nasce e cresce a partir do solo que é o dinheiro."
10050030-34 = "Embora também haja o fato de que o valor de troca inerente ao conceito de dinheiro tenha se inflado..."
10050030-35 = "Mas a circulação é necessária. Pode se tornar um bem precioso para nós."
10050030-36 = "Sonhos e culturas que definharam são apenas legados tristes que arruínam o que está ao redor."
10050030-37 = "E acima de tudo... o dinheiro também circula durante esse processo. Mufufu."
10050030-38 = "Sim, sim, é verdade..."
10050030-39 = "De qualquer forma, é hora do outro acerto de contas. Vamos entrar em contato com a Frente de Libertação do Conhecimento!"
10050030-43 = "Faaah... o que foi? Yakumo. #nEu estava prestes a dormir..."
10050030-44 = "Não é hora de dormir, Mel. Tenho muitas coisas para falar, mas... #nque tal eu te mostrar os números em vez de palavras?"
10050030-45 = "Aqui está, o acerto de contas de hoje."
10050030-46 = "Acerto de contas...? #nAh, era isso... certo, entendi..."
10050030-53 = "Senpai Mel? Senpai Mel!? O que aconteceu!!?"
10050030-54 = "Momiji... acho que minha visão piorou. Pode dar uma olhada?"
10050030-55 = "Hã? Bem... isso é o acerto de contas de hoje...?"
10050030-56 = "Hiiiiiiiiii!?!?"
10050030-57 = "Confesse a verdade, Yakumo. Você não assaltou um banco em algum lugar, não é? #nOu talvez tenha hackeado uma financeira, ou algo criminoso..."
10050030-59 = "O que você pensa de mim?"
10050030-60 = "Dinheiro de origem desconhecida que pode atrair riscos, eu dispenso."
10050030-61 = "Então, isso é..."
10050030-62 = "É... real?"
10050030-63 = "Francamente. É por isso que escritores só sabem criar histórias."
10050030-64 = "Primeiro, que tal comer alguma coisa? Você ficou sem jantar hoje também, não ficou?"
10050030-65 = "Sério, tem certeza...?"
10050030-66 = "Sim. Afinal, isso é fruto do trabalho de vocês da Frente de Libertação do Conhecimento."
10050030-67 = "É exatamente isso. #nParabéns para as duas."
10050030-68 = "Ah... é... hum, hmmm..."
10050030-69 = "Não pode ser assim, Senpai Meru. #nNessas horas, você precisa agradecer direito."
10050030-70 = "Muito obrigada, pessoal do Departamento Editorial! #nSério... graças a vocês, nós fomos salvas...!"
10050030-71 = "Bem, basicamente foi porque o livro ficou bom. Por isso vendeu."
10050030-72 = "Além disso, eu não tenho a habilidade de vender livros que não têm futuro."
10050030-73 = "...Quem diria que chegaria o dia em que você me elogiaria. #nAmanhã vai chover canivete?"
10050030-74 = "Ora, é algo tão estranho assim? #nIsso é algo que só eu posso dizer, vindo da Takane, jamais sairia algo assim, não é?"
10050030-75 = "Bem, de fato..."
10050030-77 = "...Diretora? Meru-san? Sobre o que vocês duas estão conversando tão amigavelmente?"
10050030-78 = "Hii!? N-não é nada, eu juro!?"
10050030-79 = "I-isso mesmo! É uma conversa natural de quem está trabalhando... isso, é sobre negócios!"
10050030-80 = "Hum...?"
10050030-81 = "E-enfim. Nesse ritmo, vai esgotar em poucos dias!"
10050030-82 = "Então pode ficar na expectativa, viu? Pode deixar com a gente."
10050030-83 = "E-entendi...! Eu já acreditava, mas depois de ouvir o que você disse hoje, fiquei com ainda mais vontade de acreditar."
10050030-84 = "Ora. Deixando a diretora de lado, desde quando a Meru-san começou a... comigo? Que estranho."
10050030-85 = "Enfim, vou desligar! Obrigada!"
10050030-86 = "S-sim! Coma bem, viu?"
10050030-91 = "V-vamos! Nós também precisamos ir! #nPara trabalharmos com energia amanhã, precisamos descansar!"
10050030-92 = "Sim, sim. Então vamos descansar também."
10050030-93 = "Mas a Takane até que acompanha bem esse ritmo intenso, não é? Mudei minha opinião sobre você."
10050030-94 = "É natural. Comparado ao dia a dia em Red Winter, isso é normal..."
10050030-95 = "Sim, é verdade. Mas... a Takane tem uma aura meio nobre, por assim dizer..."
10050030-96 = "Disseram até que foi a primeira vez que souberam que havia uma aluna que parecia uma dama em Red Winter."
10050030-97 = "D-do nada, o que você...!? Não existe essa história de dama em Red Winter!"
10050030-98 = "Claro, esse é o fato. Mas no marketing, não é necessário lidar com 100% de fatos, sabia?"
10050030-99 = "...A maioria dos anúncios que vemos é composta apenas por conteúdos que 'não são mentiras'."
10050030-100 = "O que você quer dizer com isso?"
10050030-101 = "O ponto é este, escute. #nVamos considerar tudo isso como parte da campanha publicitária... então..."
10050030-106 = "Comitê de Justiça - Sala de Aula"
10050030-107 = "Olá, Sensei, Shimiko-san! Vamos seguir em frente pela justiça hoje também!"
10050030-108 = "[s] \"O-olá, Mashiro. Você está cheia de energia, hein.\""
10050030-109 = "Você está muito determinada, Mashiro-san..."
10050030-110 = "Ah, me desculpe por te assustar. É que, com a cooperação do Comitê de Biblioteca e a presença do Sensei, acabei me empolgando."
10050030-111 = "E acima de tudo, um livro não oficial. Não deve haver nada mais incompatível com a justiça do que isso."
10050030-112 = "De qualquer ângulo que se olhe, é algo suspeito e duvidoso...!"
10050030-113 = "Devemos erradicar isso!"
10050030-114 = "[s] (Parece que a paixão dela está indo para uma direção estranha...)"
10050030-115 = "A propósito, você leu o conteúdo, Mashiro-san?"
10050030-116 = "Não há necessidade de ler. Basta haver o fato de que vai contra a justiça."
10050030-117 = "S-sério...?"
10050030-118 = "Além disso, nosso tempo é limitado..."
10050030-119 = "Por isso, enviei os outros membros do Comitê de Justiça para vários lugares de Trinity!"
10050030-120 = "Logo, o local onde os livros não oficiais estão sendo negociados será identificado."
10050030-121 = "[s] \"Já!?\""
10050030-122 = "S-sim, Sensei! Vou dar o meu melhor...!"
10050030-123 = "Farei o meu melhor para atender às suas expectativas!"
10050030-124 = "Muito obrigada a todos. Por favor, aguardem em suas respectivas posições."
10050030-125 = "Entendido!"
10050030-130 = "Então, irei para o local primeiro. Por favor, entre em contato a qualquer momento!"
10050030-135 = "Que paixão incrível..."
10050030-136 = "[s] \"É verdade, chega a ser um pouco preocupante...\""
10050030-137 = "Está preocupado com a Mashiro, Sensei?"
10050030-138 = "[s1] \"Com a Mashiro também, mas...\"\n[s2] \"Talvez com as garotas que estão vendendo aquele livro também.\""
10050030-141 = "Entendo, era sobre elas. Na verdade, eu estava pensando a mesma coisa."
10050030-142 = "Foi inesperado? Mas tenho certeza de que a Presidente diria o mesmo. #nNão existem pessoas más entre aqueles que amam livros."
10050030-143 = "...Você quer dizer que talvez elas estejam apenas usando os livros para ganhar dinheiro?"
10050030-144 = "..."
10050030-145 = "...Eu não penso assim."
10050030-146 = "Os livros... bem, a menos que você goste deles, as chances de sequer pegá-los nas mãos diminuíram muito."
10050030-147 = "Se o objetivo fosse apenas dinheiro, não haveria necessidade de se limitar a livros. #nExistem inúmeras outras formas de ganhar dinheiro."
10050030-148 = "[s] \"Com certeza... talvez você tenha razão.\""
10050030-149 = "Sim. Por isso, acredito que as pessoas no centro dessa confusão devem ser boas pessoas."
10050030-150 = "Deve ser possível conversar com elas. #nPorque, entre os amantes de livros, não existem pessoas más."
