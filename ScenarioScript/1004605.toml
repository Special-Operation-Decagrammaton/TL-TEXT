[translation]
1004605-1 = "Perigo iminente com a Izuna!"
1004605-4 = "Desculpe a espera, Mestre!"
1004605-5 = "[s] \"Não, eu não esperei nada. Mas, nossa, está ainda mais quente hoje...\""
1004605-6 = "É verdade...!"
1004605-7 = "A previsão do tempo disse que este é o dia mais quente dos últimos tempos..."
1004605-8 = "Sendo assim, o que faremos com o treinamento ninja de hoje...?"
1004605-9 = "Um treinamento que leve em conta esse calor..."
1004605-10 = "[s] \"Com tanto calor, a primeira coisa que vem à mente é, claro, um...\""
1004605-11 = "!!"
1004605-12 = "N-natação, talvez...!?"
1004605-13 = "E-eu, bem, é que...!"
1004605-14 = "Ah, isso mesmo!"
1004605-15 = "Já que estamos aqui, bem...!"
1004605-16 = "Da última vez, nós só fizemos um castelo de areia e acabou."
1004605-17 = "Aquilo foi muito divertido, mas que tal uma forma diferente de brincar na areia!"
1004605-18 = "[s] \"Entendo, boa ideia. Brincar na areia.\""
1004605-19 = "Hehehe, a Izuna também acha!"
1004605-20 = "……Ah!?"
1004605-21 = "D-desculpe, retiro o que disse! Não é brincar na areia...!"
1004605-22 = "É um treinamento ninja usando areia!"
1004605-23 = "O que acha disso, Mestre!?"
1004605-24 = "[s1] \"Ah, entendi, fico feliz em ajudar.\"\n[s2] \"Como seria esse treinamento na areia?\""
1004605-27 = "Sim! É um treinamento que a Izuna acabou de inventar...!"
1004605-28 = "Hoje, vamos escapar desta areia quente..."
1004605-29 = "Que tal o \"Treinamento de Fuga do Banho de Areia\"!"
1004605-30 = "[s] \"Fuga... banho de areia...?\""
1004605-32 = "Eu vi em um drama de época outro dia!"
1004605-33 = "Quando o inimigo invadiu o castelo, o ninja fugiu com o seu mestre por uma passagem secreta..."
1004605-37 = "No momento em que escaparam, o ninja explodiu a passagem secreta!"
1004605-43 = "A terra e a areia voaram com a explosão! O inimigo entrou em pânico!"
1004605-44 = "Mas, embora tenha conseguido salvar o mestre, o ninja acabou soterrado pela força da explosão!"
1004605-45 = "Quem diria que ele se sacrificaria assim...!? E enquanto a Izuna estava toda ansiosa para saber o que aconteceria!"
1004605-47 = "O ninja saltou esplendidamente de dentro dos escombros!"
1004605-48 = "[s] \"Entendi, então quer dizer...\""
1004605-49 = "Sim! A Izuna quer fazer aquilo!"
1004605-50 = "Um ninja deve estar preparado para qualquer situação extrema..."
1004605-51 = "Em um dia quente como hoje, podemos dizer que estamos em uma situação extrema!"
1004605-52 = "……Por isso, Mestre!"
1004605-53 = "Por favor, coloque areia em cima da Izuna!"
1004605-54 = "Vou me esforçar para escapar desse banho de areia!"
1004605-55 = "[s] (……Será que isso conta como treinamento?)"
1004605-59 = "[ns] \"Por enquanto, vamos fazer isso na sombra, pelo menos.\""
1004605-60 = "Sim!"
1004605-65 = "(Assim, evitando um pouco o sol escaldante, decidimos tentar o \"Treinamento de Fuga do Banho de Areia\")"
1004605-66 = "[ns] \"Então, me avise se ficar difícil, tá?\""
1004605-67 = "Sim, conto com você!"
1004605-75 = "[ns] \"O que acha dessa quantidade?\""
1004605-76 = "Bem, deixa eu testar... Ah!"
1004605-77 = "Ah, parece que consigo sair facilmente!"
1004605-78 = "Mestre, por favor, coloque muito mais!"
1004605-79 = "[s] \"E-então...\""
1004605-84 = "[ns] \"Assim está bom?\""
1004605-85 = "Hmm... acho que ainda dá para colocar mais."
1004605-86 = "Mestre! Por favor, continue!"
1004605-87 = "[s] \"T-tudo bem...!\""
1004605-92 = "[ns] \"C-com isso aqui...\""
1004605-93 = "Não, isso ainda não pode ser chamado de estado limite!"
1004605-94 = "Por favor, mais!"
1004605-98 = "[ns] \"Não está ficando perigoso...?\""
1004605-99 = "Ainda não, ainda dá! Com certeza dá para aguentar um pouco mais!"
1004605-100 = "[ns] \"Droga, não consigo ver o limite...!\""
1004605-105 = "(Depois disso, continuei colocando areia,)"
1004605-109 = "(e a cada vez, Izuna pedia por \"mais\" repetidamente...)"
1004605-110 = "[ns] \"I-isso está ficando incrível...\""
1004605-114 = "(Já não dava mais para ver a Izuna, e eu tinha empilhado tanta areia que, vista de longe, parecia uma duna)"
1004605-118 = "[ns] \"Izuna, está bom assim?\""
1004605-120 = "[ns] \"...Izuna?\""
1004605-122 = "[ns] \"Izuna!?\""
1004605-134 = "[ns] \"Izuna, você está bem!?\""
1004605-135 = "Mestre... munya munya..."
1004605-136 = "[s] \"...?\""
1004605-137 = "Hehehe... vamos brincar... mais... Mestre..."
1004605-138 = "Já que é verão... Izuna quer, mais... com o Mestre..."
1004605-139 = "Munya..."
1004605-140 = "[s] \"...Acho que ela cansou de brincar.\""
1004605-144 = "[ns] \"...Vamos brincar bastante depois.\""
1004605-147 = "(E depois de remover o excesso de areia para não ser um peso,)"
1004605-152 = "(fiquei lendo um livro calmamente bem ao lado da Izuna que dormia)"
