[translation]
1004605-1 = "イズナと一緒に危機一髪！"
1004605-4 = "お待たせしました、主殿！"
1004605-5 = "[s] \"ううん、全然待ってないよ。それにしてもまた一段と暑いね……。\""
1004605-6 = "そうですね……！"
1004605-7 = "天気予報でも、ここ最近で一番の暑さと言っていました……。"
1004605-8 = "となると、今日の忍者修行はいかがしましょう……？"
1004605-9 = "この暑さを踏まえた上での、修行……"
1004605-10 = "[s] \"こんなに暑いと、最初に思いつくのはやっぱりす――\""
1004605-11 = "！！"
1004605-12 = "す、水泳ですか……！？"
1004605-13 = "そ、その、えーっと……！"
1004605-14 = "あ、そうです！"
1004605-15 = "せっかくですし、その……！"
1004605-16 = "以前はその、砂のお城を作って終わってしまったので。"
1004605-17 = "あれもすごく楽しかったのですが、別の形での砂遊びはいかがでしょう！"
1004605-18 = "[s] \"なるほど、良いね。砂遊び。\""
1004605-19 = "えへへっ、イズナもそう思います！"
1004605-20 = "……はっ！？"
1004605-21 = "す、すみません撤回します！砂遊びではなく……！"
1004605-22 = "砂を用いた、忍びとしての修行です！"
1004605-23 = "それでいかがでしょうか、主殿！？"
1004605-24 = "[s1] \"あ、うん、それはそれで喜んで。\"\n[s2] \"砂の修行ってどんな感じ？\""
1004605-27 = "はい！イズナが今思いついた修行なのでですが……！"
1004605-28 = "今日はこの熱い砂の中から脱出する……"
1004605-29 = "「脱出・砂風呂修行」はいかがでしょう！"
1004605-30 = "[s] \"脱出……砂風呂……？\""
1004605-32 = "先日、時代劇で見たんです！"
1004605-33 = "敵が城に攻め込んできた時、忍者が主殿と共に秘密の通路へと逃げ込み……"
1004605-37 = "無事脱出した瞬間、忍者がその秘密通路をドカン！と！"
1004605-43 = "爆発で襲い来る土砂！パニックに陥る敵！"
1004605-44 = "しかし主殿を逃がしたは良いものの、あまりの勢いに忍者もまたその土砂の中に埋もれてしまったのです！"
1004605-45 = "まさか、その身を[ruby=てい]挺[/ruby]して……！？そしてどうなるのかとイズナがドキドキしていたその時！"
1004605-47 = "崩れた土砂の中から、忍者が華麗に飛び出してきたのです！"
1004605-48 = "[s] \"なるほど、つまり……\""
1004605-49 = "はい！イズナ、あれがやりたいです！"
1004605-50 = "忍びというのは、あらゆる極限の状況に備えるべきもの……。"
1004605-51 = "今日みたいに暑い日は、まさに極限の状況とも言えます！"
1004605-52 = "……ということで、主殿！"
1004605-53 = "イズナの上に砂を乗せてください！"
1004605-54 = "その砂風呂から頑張って、脱出してみせますので！"
1004605-55 = "[s]（……修行になるのかな、それ？）"
1004605-59 = "[ns] \"とりあえず、せめて日陰の方でやろっか。\""
1004605-60 = "はい！"
1004605-65 = "（そうして多少炎天下を避け、「脱出・砂風呂修行」をやってみることにした）"
1004605-66 = "[ns] \"じゃあ、苦しかったら言ってね？\""
1004605-67 = "はい、よろしくお願いします！"
1004605-75 = "[ns] \"これくらいでどう？\""
1004605-76 = "えーっと、試しに……はっ！"
1004605-77 = "あ、全然出られそうです！"
1004605-78 = "主殿、もっともっとお願いします！"
1004605-79 = "[s] \"じゃ、じゃあ……。\""
1004605-84 = "[ns] \"こんな感じ？\""
1004605-85 = "うーん……まだ全然行けそうです。"
1004605-86 = "主殿！もっとやってしまってください！"
1004605-87 = "[s] \"よ、よし……！\""
1004605-92 = "[ns] \"こ、これくらいで……。\""
1004605-93 = "いえ、これではまだ極限状態とは言えません！"
1004605-94 = "もっとお願いします！"
1004605-98 = "[ns] \"そろそろ危なくない……！？\""
1004605-99 = "まだです、まだ行けます！もう少しいけるはずです！"
1004605-100 = "[ns] \"くっ、限界が見えない……！\""
1004605-105 = "（その後も砂を乗せ続け、）"
1004605-109 = "（そのたびにイズナから「もっと」と言われることを繰り返し……）"
1004605-110 = "[ns] \"す、すごいことになってきた……。\""
1004605-114 = "（もはやイズナの姿が見えず、遠くから見たら砂丘だと思われるのではないかというくらいに積んでしまった）"
1004605-118 = "[ns] \"イズナ、これでOK？\""
1004605-120 = "[ns] \"……イズナ？\""
1004605-122 = "[ns] \"イズナ！？\""
1004605-134 = "[ns] \"イズナ、大丈夫！？\""
1004605-135 = "主殿……むにゃむにゃ……。"
1004605-136 = "[s] \"……？\""
1004605-137 = "えへへっ……もっと、遊びましょう……主殿……"
1004605-138 = "せっかくの、夏ですし……イズナは、もっと主殿、と……"
1004605-139 = "むにゃ……"
1004605-140 = "[s] \"……遊び疲れたのかな。\""
1004605-144 = "[ns] \"……たくさん遊ぼうね。\""
1004605-147 = "（そして負担にならないくらいに山を切り崩した後、）"
1004605-152 = "（眠っているイズナのすぐ横で、しばらく本を読んでゆったりと過ごした）"
