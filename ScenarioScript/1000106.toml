[translation]
1000106-1 = "ファッションの完成"
1000106-2 = "ショッピングモール・レディースフロア"
1000106-8 = "こういうところに来るのは久しぶり。#n服は一度買ったら、破れるまで新しい物を買わないから、あまり来る機会がなかった。"
1000106-9 = "どれどれ……最近はフロントホックのブラも、色がいっぱいあるんだね。前の方が種類が少なくて、選びやすかったのに。"
1000106-10 = "フロントホックのブラは、ホックが前にあるから脱ぐときにすごく楽なの。背中に腕を回してホックを外すのはかなり面倒で難しいから。"
1000106-13 = "先生、顔色があまり良くないけど……どこか具合でも悪い？"
1000106-14 = "[s] \"どうして私をここに呼んだの……？\""
1000106-15 = "ん？さっきメールで言った通りだよ、服が似合うか見てほしいって。"
1000106-16 = "何か急ぎの仕事でもあった？"
1000106-17 = "下着は服じゃないって……？#n何を言ってるの、先生。下着はちゃんと服の一種だよ。"
1000106-18 = "身体に合わない下着を着けると身体全体のバランスが崩れる上に、作戦の途中すぐに疲れちゃうんだから。良い下着を着けるのは効率の面から見てもすごく大事なこと。"
1000106-19 = "[s] \"なら、普通に身体にとって楽な下着でいいんじゃ……？\""
1000106-20 = "そうなんだけど、友達の話では、可愛い下着を着けないと万が一の時に困るって……。"
1000106-23 = "私にはどれが可愛い下着なのかよく分からないから、先生に見てほしくて。"
1000106-26 = "[wa:500]― 先生、[wa:1000]この服はどう？[wa:3000]似合ってる？"
1000106-29 = "[wa:700]― 下着も服の一種だから、[wa:1800]別に人に見せてもいいんじゃないのかな。"
1000106-32 = "― この下着、[wa:1000]私にはちょっと小さそう……[wa:3500]もっと[wa:300]大きいサイズはないのかな。"
1000106-35 = "― うーん……[wa:2000]ダメ。[wa:1800]やっぱり着替えて、[wa:1200]直接着てる姿を見せてあげる。"
1000106-38 = "― うん……？[wa:1300]ここで着替えちゃダメ？[wa:2700]更衣室は狭くて面倒なのに……。"
1000106-41 = "その後、売り場内で下着を脱ごうとするエイミを止めて、最終的に何着か購入した。"
1000106-43 = "今日はありがとう、先生。おかげで予定してたものは全部買えた。"
1000106-44 = "次からは売り場で服を脱がないで、って？"
1000106-45 = "分かってる、先生が今日何度も注意してくれたから。"
1000106-46 = "ちょっと非効率的だとは思うけど、先生との約束だから……#n守れるように、努力するね。"
