[translation]
1000106-1 = "O toque final da moda"
1000106-2 = "Shopping Center - Setor Feminino"
1000106-8 = "Faz tempo que não venho a um lugar assim. Como só compro roupas novas quando as minhas rasgam, não tenho muitas oportunidades de vir aqui."
1000106-9 = "Vejamos... Hoje em dia, até sutiãs com fecho frontal têm muitas cores, né? Antigamente tinha menos variedade, o que tornava mais fácil escolher."
1000106-10 = "Sutiãs com fecho frontal são muito práticos na hora de tirar, porque o fecho fica na frente. Ficar tentando alcançar as costas para soltar o fecho é bem trabalhoso e difícil."
1000106-13 = "Sensei, você não parece muito bem... Está se sentindo mal?"
1000106-14 = "[s] \"Por que você me chamou aqui...?\""
1000106-15 = "Hm? Como eu disse no e-mail, queria que você visse se as roupas combinam comigo."
1000106-16 = "Você tem algum trabalho urgente?"
1000106-17 = "Que roupa íntima não é roupa...? O que você está dizendo, Sensei? Roupa íntima é, sim, um tipo de roupa."
1000106-18 = "Usar roupas íntimas que não se ajustam bem ao corpo desequilibra o corpo todo e, além disso, faz com que eu me canse rápido durante as missões. Usar uma boa roupa íntima é muito importante, até mesmo do ponto de vista da eficiência."
1000106-19 = "[s] \"Mas, nesse caso, não seria melhor usar algo confortável para o corpo...?\""
1000106-20 = "É verdade, mas uma amiga me disse que, se eu não usar uma roupa íntima bonita, posso ter problemas caso algo aconteça..."
1000106-23 = "Eu não sei bem o que é uma roupa íntima bonita, então queria que você desse uma olhada para mim."
1000106-26 = "[wa:500]— Sensei, [wa:1000] o que acha desta? [wa:3000] Combina comigo?"
1000106-29 = "[wa:700]— Como roupa íntima também é roupa, [wa:1800] não vejo problema em mostrar para alguém."
1000106-32 = "— Esta roupa íntima, [wa:1000] parece um pouco pequena para mim... [wa:3500] Será que não tem [wa:300] um tamanho maior?"
1000106-35 = "— Hmm... [wa:2000] Não deu. [wa:1800] Vou me trocar e [wa:1200] te mostrar como fica no corpo."
1000106-38 = "— Sim...? [wa:1300] Não posso me trocar aqui? [wa:2700] O provador é apertado e dá muito trabalho..."
1000106-41 = "Depois disso, impedi Eimi de tirar a roupa íntima ali mesmo na loja e, no fim, acabamos comprando algumas peças."
1000106-43 = "Obrigada por hoje, Sensei. Graças a você, consegui comprar tudo o que estava planejado."
1000106-44 = "Para pedir que eu não tire a roupa na loja da próxima vez?"
1000106-45 = "Eu entendi, já que você me avisou várias vezes hoje."
1000106-46 = "Acho um pouco ineficiente, mas como é uma promessa com você... farei o possível para cumprir."
