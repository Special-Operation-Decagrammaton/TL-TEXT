[translation]
10002030-1 = "第3話;砂のお城と砂風呂と（１）"
10002030-4 = "すみません、お待たせしました。ちょっとお手洗いが遠くて……"
10002030-6 = "調子はいかがですか？"
10002030-7 = "……先生？"
10002030-8 = "[s1] 無言で向こうの方を見つめる。\n[s2] \"えっと、あんな感じに……。\""
10002030-9 = "……？"
10002030-10 = "……？"
10002030-15 = "（ドドン！！）"
10002030-18 = "ふええぇぇぇぇぇ！？！？"
10002030-20 = "こ、これは一体どうしたんですかアズサちゃん！？どうしてこんな大きさにしちゃったんですか！？いえ、それ以前に一体どうやって！？"
10002030-21 = "注文は「砂のお城」だった。お城、つまりはフォートレス。どんな攻撃を受けても対応できるようにした。"
10002030-22 = "間違ってないですけど、違うところが間違ってますよ！？"
10002030-23 = "ちょうど良かった。この海岸、遮蔽物も塹壕も無くて不安だったから。"
10002030-24 = "これなら敵の攻撃があっても大丈夫、安心してヒフミ。"
10002030-25 = "同意します。逆にこちら側からは狙撃がしやすい造りにもなっていて、とても良い感じです。"
10002030-26 = "マシロさん！？マシロさんもノっちゃったんですか！？"
10002030-31 = "……。"
10002030-32 = "……ふふっ。"
10002030-33 = "……！？"
10002030-34 = "楽しそうですね！？！？"
10002030-35 = "これ、写真に納まるんでしょうか……もう少し、小さくて可愛い感じにはできなかったんですか……？"
10002030-36 = "いや、敵襲のことを考えるとこれでも最小限のサイズだ。これ以上小さくすると、身の安全を保障できない。"
10002030-37 = "素材が砂だということはともかく、こうして高いところにいるのは気持ち良いですね。"
10002030-40 = "とりあえずみんなで写真は撮った。"
10002030-42 = "思わぬ形で、お二人が意気投合しましたね……。"
10002030-43 = "それにしても、攻撃ですとか敵襲ですとか……"
10002030-44 = "こんな平和なビーチで、そうそうそんなこと――"
10002030-48 = "（ドカアアアァァァァァァァン！！！！）"
10002030-49 = "……え？"
10002030-51 = "（ダダダダダダダダッ！ダンッ、ダンッ！！）"
10002030-52 = "敵を発見、3時の方向！水着のスケバンが多数！"
10002030-53 = "ね、敵襲来たでしょ。"
10002030-54 = "……。"
10002030-62 = "さっきの仕返しだ！"
10002030-63 = "こんだけいりゃあ負けねえだろ、覚悟しやがれ！"
10002030-69 = "望むところだ。"
10002030-70 = "狙撃手、後ろは頼む。"
10002030-71 = "お任せください、私の実力をお見せします。"
10002030-74 = "どうしてこんなことに～～～～！？"
