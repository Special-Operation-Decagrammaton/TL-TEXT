[translation]
10002030-1 = "Episódio 3; Castelo de areia e banho de areia (1)"
10002030-4 = "Desculpe, obrigado por esperar. O banheiro era um pouco longe..."
10002030-6 = "Como você está se sentindo?"
10002030-7 = "...Sensei?"
10002030-8 = "[s1] Olha para o horizonte em silêncio.\n[s2] \"Bem, é que, daquele jeito...\""
10002030-9 = "...?"
10002030-10 = "...?"
10002030-15 = "(BUM!!)"
10002030-18 = "Huuuuhhhhhh!?!?"
10002030-20 = "O-o que aconteceu aqui, Azusa-chan!? Por que você fez algo desse tamanho!? Não, antes disso, como você fez isso!?"
10002030-21 = "O pedido era um \"castelo de areia\". Um castelo, ou seja, uma fortaleza. Fiz de modo que pudesse lidar com qualquer ataque."
10002030-22 = "Você não está errada, mas o ponto onde você errou é outro!?"
10002030-23 = "Veio a calhar. Eu estava preocupada porque esta praia não tinha cobertura nem trincheiras."
10002030-24 = "Com isso, mesmo que haja um ataque inimigo, estaremos bem. Fique tranquila, Hifumi."
10002030-25 = "Concordo. Pelo contrário, a estrutura facilita o disparo de precisão deste lado, é muito bom."
10002030-26 = "Mashiro-san!? Você também entrou na onda!?"
10002030-31 = "..."
10002030-32 = "...Fufu."
10002030-33 = "...!?"
10002030-34 = "Vocês estão se divertindo, né!?!?"
10002030-35 = "Será que isso vai caber na foto...? Não dava para ter feito algo menor e mais fofo...?"
10002030-36 = "Não, considerando a possibilidade de um ataque inimigo, este é o tamanho mínimo. Se for menor que isso, não posso garantir a nossa segurança."
10002030-37 = "Deixando de lado o fato de ser feito de areia, é muito bom estar em um lugar alto assim."
10002030-40 = "De qualquer forma, tiramos a foto com todo mundo."
10002030-42 = "De uma forma inesperada, vocês duas se entenderam muito bem..."
10002030-43 = "Mas ainda assim, sobre ataques e invasões inimigas..."
10002030-44 = "Em uma praia tão pacífica, não é como se algo assim fosse acontecer--"
10002030-48 = "(CABUUUUUUUUUM!!!!)"
10002030-49 = "...Hã?"
10002030-51 = "(RATATATATATATATÁ! BANG, BANG!!)"
10002030-52 = "Inimigos avistados, direção das 3 horas! Muitas delinquentes de roupa de banho!"
10002030-53 = "Viu? O ataque inimigo chegou."
10002030-54 = "..."
10002030-62 = "É o troco pelo que fizeram antes!"
10002030-63 = "Com esse tanto de gente, não tem como a gente perder. Preparem-se!"
10002030-69 = "Era exatamente o que eu queria."
10002030-70 = "Atiradora, cuide da retaguarda."
10002030-71 = "Deixe comigo, vou mostrar do que sou capaz."
10002030-74 = "Por que as coisas chegaram a esse ponto~~~~!?"
