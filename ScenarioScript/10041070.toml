[translation]
10041070-1 = "Episódio 7; Epílogo"
10041070-9 = "……A entrega para a Valkyrie foi concluída. Missão cumprida. V."
10041070-11 = "Foi uma quantidade incrível…… Não teria sido estranho se a Millennium EXPO tivesse sido cancelada."
10041070-12 = "Foi divertido~! As alunas da Trinity também ficaram dizendo coisas como \"Isso é que é Millennium!\"!"
10041070-13 = "A imagem da Millennium acabou ficando um pouco distorcida, mas……."
10041070-15 = "Ainda assim, comparado à escala da situação, acho que resolver isso desse jeito foi um ótimo trabalho."
10041070-16 = "……E quanto àquela tesoureira? Ela não disse nada?"
10041070-17 = "Claro que ela parece estar furiosa, mas…… como o resultado final foi bom, tudo bem. Também foi uma operação conjunta com o Sensei."
10041070-18 = "Ela disse que, da próxima vez, quer que compartilhemos todas as informações possíveis. Ela tem uma palavra a dizer ao Sensei. Mas é só isso."
10041070-19 = "[s1] \"No fim, a que leva bronca sou eu…….\"\n[s2] \"He, hehe…… Já estou acostumada a levar bronca, então não tem problema.\""
10041070-22 = "Aliás, nós também temos algo a dizer."
10041070-23 = "Deixando o Seminar de lado, pelo menos para nós, você deveria ter contado. Que era uma operação em conjunto com um VIP da Trinity."
10041070-24 = "Sem saber disso, nós……."
10041070-29 = "Sinto muito, isso foi por minha conta. Não era algo que a Neru ou o Sensei pudessem decidir."
10041070-30 = "Eles apenas atenderam ao meu egoísmo."
10041070-31 = "Aproveitando esta oportunidade, deixem-me pedir desculpas."
10041070-35 = "Ah, não……."
10041070-36 = "N-não foi com essa intenção que eu disse aquilo……!"
10041070-37 = "Hehe. Isso não é incrível? Receber um pedido de desculpas do Tea Party."
10041070-38 = "Da minha parte também…… foi mal. Eu também fui forçada a fazer isso porque me pediram."
10041070-39 = "Vou compensar isso em outra ocasião. Não fique tão brava."
10041070-44 = "Não, eu disse que não foi com essa intenção……!"
10041070-55 = "……Sensei."
10041070-56 = "[s3] \"Está tudo bem? Não se feriu?\"\n[s4] \"Como foi? Está tudo bem?\""
10041070-59 = "……Você realmente sabe de tudo."
10041070-60 = "Eu tinha decidido no meu coração que provaria isso, mas……."
10041070-61 = "……Não. Se não fosse pelo Sensei, teríamos chegado ao pior final possível."
10041070-65 = "Obrigada, Sensei."
10041070-66 = "Além disso…… sinto muito por ter agido por conta própria."
10041070-67 = "[s5] \"Ainda não acabou!\"\n[s6] \"Espere um pouco até a hora de ir embora.\""
10041070-72 = "Eu não me importo com isso, mas……"
10041070-73 = "Não há alguém com quem você deveria se preocupar mais do que comigo?"
10041070-74 = "Sensei…… você não deveria ir até aquela garota?"
10041070-75 = "Ainda não deve ser tarde. A essa altura, ela deve estar arrumando as malas."
10041070-76 = "……Está tudo bem?"
10041070-77 = "Entendo. Que inesperado."
10041070-78 = "[s7] \"Ainda está tudo bem.\"\n[s8] \"Palavras também têm o seu momento certo.\""
10041070-81 = "……Entendo."
10041070-82 = "[s9] \"Em vez disso, por que não pensa sobre a Seia?\"\n[s10] \"Vamos pensar um pouco mais sobre o porquê de você ter vindo aqui.\""
10041070-85 = "……?"
10041070-86 = "……Ah."
10041070-90 = "É verdade."
10041070-93 = "(Uma hora depois)"
10041070-100 = "Cheguei, Rio."
10041070-101 = "Eu também terminei de organizar o básico. E quanto a você――"
10041070-111 = "……Você já vai embora?"
10041070-112 = "Bem…… acho que sim. Era essa a intenção desde o começo."
10041070-113 = "Entendo……."
10041070-114 = "……Heh."
10041070-115 = "O que foi? Com essa cara de desânimo. Não combina com você."
10041070-119 = "……Não."
10041070-123 = "……É, talvez. Sinceramente, sinto que é uma pena."
10041070-124 = "Só que... não sei, sinto um certo desânimo. Acho que é isso."
10041070-125 = "Desânimo?"
10041070-126 = "É. Eu..."
10041070-127 = "Sobre a tal 'prova' que a Rio mencionou. Sinceramente, acho que não é necessária."
10041070-128 = "Embora ela mesma não perceba, as pessoas ao redor já..."
10041070-132 = "……?"
10041070-136 = "……? O que foi! Vai começar a falar e parar de novo?"
10041070-137 = "As pessoas ao redor já a aceitaram."
10041070-138 = "A única que não consegue aceitar... é ela mesma."
10041070-142 = "……Entendo."
10041070-143 = "……Então, Sensei, sobre aquelas palavras."
10041070-144 = "Vai ficar falando sozinho de novo? Não está ficando parecido com a Rio? Isso é irritante, me poupe."
10041070-145 = "……Desculpe. É um mau hábito meu."
10041070-146 = "……Mas, mudando de assunto."
10041070-150 = "Neru, se não se importar, gostaria de pedir um último favor."
10041070-151 = "Hã? O que foi?"
10041070-152 = "É que..."
10041070-160 = "Rio, preciso falar com você."
10041070-165 = "O que foi?"
10041070-170 = "Quero que fique em Millennium por mais uma semana."
10041070-171 = "Eu e a Neru também ficaremos."
10041070-172 = "Poderia acompanhar até o fim o evento que você protegeu?"
10041070-178 = "E eu achando que você ia dizer algo importante..."
10041070-179 = "Isso é impossível, o assunto já está encerrado. Eu não tenho o direito de aproveitar a EXPO."
10041070-180 = "……Não estou falando de direitos."
10041070-181 = "O que quer dizer com isso?"
10041070-182 = "Você parece achar que tudo foi resolvido, mas a EXPO está apenas no primeiro dia."
10041070-183 = "Não há garantia de que não surgirão problemas daqui para frente. Por menores que sejam, algo vai acontecer."
10041070-184 = "A maioria deve ser resolvida pelo Seminar sem problemas. Mas nem tudo será assim."
10041070-185 = "Frequentemente, exceções podem ocorrer."
10041070-186 = "Se você disser que não pode, no fim, o Seminar ou... o próprio Sensei terá que assumir."
10041070-192 = "Será que é isso que você deseja?"
10041070-193 = "Isso é..."
10041070-198 = "……O que acha, Neru?"
10041070-203 = "Vai jogar a decisão para mim?"
10041070-204 = "Bom, por que não? Se não sair andando por aí chamando atenção, ninguém vai notar."
10041070-205 = "Isso também não faz parte do trabalho de uma presidente estudantil? Sei lá."
10041070-207 = "Ah..."
10041070-208 = "Sinto que estou sendo manipulada, mas..."
10041070-209 = "Não é isso."
10041070-210 = "Se não quiser, não posso te forçar."
10041070-215 = "N-não... não disse que não queria."
10041070-216 = "É, talvez..."
10041070-221 = "Está bem, eu entendi."
10041070-225 = "Apenas uma semana — assim que o evento terminar, eu irei embora."
10041070-226 = "Isso é o suficiente. Nós também vamos ajudar."
10041070-227 = "……Vou desfazer as malas."
10041070-231 = "……Parece que deu certo."
10041070-233 = "Haha! Você é bem esperto, hein. Aposto que vocês ficaram próximos por causa desse caso, não é?"
10041070-234 = "Pode-se dizer que sim."
10041070-235 = "Ela é do tipo que não se convence a menos que tenha uma desculpa para tudo."
10041070-236 = "Eu a conheço melhor do que ninguém... afinal, tenho observado através do espelho."
10041070-237 = "Sério, que pessoa problemática."
10041070-238 = "……Fufu."
10041070-239 = "É verdade."
10041070-243 = "……Um tipo problemático, de fato."
10041070-244 = "Code:BOX Sombra sobre o Millennium"
