[translation]
10041070-1 = "第7話;エピローグ"
10041070-9 = "……ヴァルキューレへの引き渡し、完了しました。ミッションコンプリートです。ブイ。"
10041070-11 = "すごい数だったな……ミレニアムEXPOが中止になっていてもおかしくなかった。"
10041070-12 = "楽しかったね～！トリニティ生たちもみんな「これぞミレニアム！」とか言ってさ！"
10041070-13 = "ミレニアムのイメージは、少し歪んだ気もするが……。"
10041070-15 = "それでも事態の規模に比べれば、この程度で片を付けたのは上出来だと思いますよ。"
10041070-16 = "……あの会計からは？なんか言われなかったか？"
10041070-17 = "もちろんお怒りの様子ですが……結果的には上手くいきましたので。#n先生との合同作戦でもありましたし。"
10041070-18 = "次からは可能な限りの情報共有を、と。先生には一言あるらしい。だがそれくらいだな。"
10041070-19 = "[s1] \"結局怒られるのは私なんだね……。\"\n[s2] \"ふ、ふふ……怒られるのは慣れてるから大丈夫。\""
10041070-22 = "ちなみに、私たちからも言いたいことがある。"
10041070-23 = "セミナーはともかく、せめて私たちには言って欲しかった。トリニティのVIPと組む作戦だと。"
10041070-24 = "それも知らずに私たちは……。"
10041070-29 = "済まない、それは私の都合だ。ネルや先生が判断できるものではなかった。"
10041070-30 = "私の我儘を聞いてくれただけに過ぎない。 "
10041070-31 = "この場を借りて、謝罪させてくれ。"
10041070-35 = "あ、いや……。"
10041070-36 = "そ、そういうつもりで言ったわけでは……！"
10041070-37 = "ふふっ。すごいじゃないですか。ティーパーティーから謝罪の言葉をいただくなんて。"
10041070-38 = "あたしからも……悪かったな。こっちも頼まれて仕方なかったんだよ。"
10041070-39 = "この件はまた今度埋め合わせするからよ。そんな怒んなって。"
10041070-44 = "いやっ、だからそんなつもりじゃなくて……！"
10041070-55 = "……先生。"
10041070-56 = "[s3] \"大丈夫？怪我はない？\"\n[s4] \"どうだった？大丈夫だった？\""
10041070-59 = "……本当に全部知っているのだな。"
10041070-60 = "証明するため、と心に決めていたはずが……。"
10041070-61 = "……いや。先生がいなければ、最悪の結末を迎えていたはずだ。"
10041070-65 = "ありがとう、先生。"
10041070-66 = "それに……勝手をして済まなかった。"
10041070-67 = "[s5] \"まだだよ！\"\n[s6] \"帰るまでもう少し待って。\""
10041070-72 = "それは構わないが……"
10041070-73 = "私よりも構うべき相手がいるのではないかね。"
10041070-74 = "先生は……あの子の元に行ってやらなくていいのかい？"
10041070-75 = "まだ遅くないはずだ。今頃は荷物をまとめているところだろう。"
10041070-76 = "……大丈夫？ "
10041070-77 = "そうか。意外だな。"
10041070-78 = "[s7] \"まだ大丈夫。\"\n[s8] \"言葉にもタイミングがあるから。\""
10041070-81 = "……そうか。"
10041070-82 = "[s9] \"それより、セイアのことを考えてみない？\"\n[s10] \"なぜここに来たのか、もう少し考えてみよう。\""
10041070-85 = "……？"
10041070-86 = "……ああ。"
10041070-90 = "そうだな。"
10041070-93 = "（一時間後）"
10041070-100 = "来たよ、リオ。"
10041070-101 = "こっちも大まかな整理が終わったぜ。そっちは――"
10041070-111 = "……もう帰るのか。"
10041070-112 = "まあ……だろうよ。最初からそのつもりだったし。"
10041070-113 = "そうか……。"
10041070-114 = "……へぇ。"
10041070-115 = "なんだ？そのしけたツラは。らしくねぇ。"
10041070-119 = "……いや。"
10041070-123 = "……そうだな。正直残念に思う。"
10041070-124 = "ただ……どこか気持ちが冴えない。そんなところだろうか。"
10041070-125 = "冴えない？"
10041070-126 = "ああ。私は……"
10041070-127 = "リオが口にしていた「証明」について。実のところ必要ないと思っている。"
10041070-128 = "本人こそ気づいてないものの、すでに周りは……"
10041070-132 = "……？"
10041070-136 = "……？何だよ！また言いかけてやめんのかよ！"
10041070-137 = "すでに周りは、彼女のことを受け入れている。"
10041070-138 = "受け入れられないのは……彼女自身だけだ。"
10041070-142 = "……そうか。"
10041070-143 = "……それで先生は、あの言葉を。"
10041070-144 = "今度は自問自答かよ？リオに似てきてねえか？マジでイライラしてくるから勘弁してくれ。"
10041070-145 = "……すまない。悪いクセでね。"
10041070-146 = "……それより。"
10041070-150 = "ネル、よければ最後にもう一つだけ、助力を乞いたい。"
10041070-151 = "あん？なんだ？"
10041070-152 = "それは……。"
10041070-160 = "リオ、君に話がある。"
10041070-165 = "何かしら？"
10041070-170 = "もう1週間ほど、ミレニアムに逗留して欲しいのだよ。"
10041070-171 = "私やネルも残る。"
10041070-172 = "君が守り抜いたイベントを見届けてはくれまいか。"
10041070-178 = "何を言うかと思えば……。"
10041070-179 = "それは無理よ、終わった話だわ。私にEXPOを楽しむ資格など無いもの。"
10041070-180 = "……これは資格の話ではない。"
10041070-181 = "どういう意味かしら。"
10041070-182 = "君はすべて無事に解決したと思っているようだが、EXPOはまだ一日目だ。"
10041070-183 = "今後も問題に見舞われないという保証はない。大小に差こそあれ、何かしらは起きるだろう。"
10041070-184 = "そのほとんどは、つつがなくセミナーが処理するはずだ。けれど全部がそうとは限らない。"
10041070-185 = "往々にして、例外は発生しうるものだ。"
10041070-186 = "君ができないと言うなら、結局はセミナーや……それこそ先生が担うのだろうが。"
10041070-192 = "果たして、それを望むのかな？"
10041070-193 = "それは……。"
10041070-198 = "……どう思う？ネル。"
10041070-203 = "あたしに振んのか？"
10041070-204 = "ま、いいんじゃん？堂々と出歩かなければバレないだろ。"
10041070-205 = "これも生徒会長としての仕事ってやつなんじゃねえの？知らねえけど。"
10041070-207 = "はぁ……。"
10041070-208 = "なんだか、乗せられている気がするけれど。"
10041070-209 = "それは違う。"
10041070-210 = "嫌なら無理強いはできねえよな。"
10041070-215 = "い、いえ……嫌とは言ってないわ。"
10041070-216 = "そう、ね……"
10041070-221 = "ええ、わかったわ。"
10041070-225 = "1週間だけ――イベントが終わればすぐに帰る。"
10041070-226 = "それで十分だ。私たちも力を貸そう。"
10041070-227 = "……荷を解いてくるわ。"
10041070-231 = "……うまくいったようだ。"
10041070-233 = "ハハッ！なかなかのやり手じゃんか。やっぱ今回の件で仲良くなったんだろ？"
10041070-234 = "そうとも言えるだろうか。"
10041070-235 = "彼女は、何かにかこつけないと納得できないタイプだ。"
10041070-236 = "誰よりもよく知っている……鏡越しで見てきたのだからね。"
10041070-237 = "ほんっと、めんどくせえ奴だよ。"
10041070-238 = "……ふふ。"
10041070-239 = "そうだな。"
10041070-243 = "……めんどうなタイプさ。"
10041070-244 = "Code:BOX　ミレニアムに迫る影"
