[translation]
10040090-1 = "Epílogo parte 1; O azarão do jogo de cartas"
10040090-2 = "Hmm..."
10040090-3 = "Huuuum..."
10040090-4 = "É aqui! Vai!"
10040090-6 = "〈Errado!〉"
10040090-7 = "Ahhh!?"
10040090-8 = "Po-por que...!"
10040090-12 = "Sério... como é que você consegue tirar só as opções erradas...?"
10040090-13 = "Essa foi a quinta vez seguida. #nEm termos de probabilidade, é cerca de 0,00006%..."
10040090-14 = "Talvez você esteja amaldiçoada pelo deus dos dados."
10040090-16 = "Não existe esse deus! Isso é um absurdo!"
10040090-17 = "Isso tem que ser uma fraude! Com certeza adulteraram alguma coisa!!"
10040090-19 = "Eu verifiquei a estrutura antes de começar. #nNão havia nenhuma adulteração na roleta."
10040090-20 = "Pegamos esse jogo emprestado pouco antes da festa. #nNão teriam tido tempo de modificar só para te prejudicar, né?"
10040090-21 = "Embora, tenha sido instalado um sensor infravermelho para que o boneco do Peroro atingisse uma pessoa específica..."
10040090-22 = "Quem foi que se deu ao trabalho de colocar um sistema tão complexo #nem um jogo desses?"
10040090-24 = "Pensando bem, acho que emprestei isso para o Departamento de Engenharia uma vez. #nEles disseram que tinham feito umas modificações para animar a festa..."
10040090-25 = "De novo o Departamento de Engenharia...?"
10040090-26 = "Se eles vierem reclamar do orçamento de novo, vou ter que dar uma bronca neles!"
10040090-28 = "Mesmo assim, isso é... injusto! #nEm um jogo de sorte como a roleta, eu fico em muita desvantagem!"
10040090-29 = "Dizer que está em desvantagem em um jogo de sorte... #nEu não estou entendendo o que você quer dizer..."
10040090-30 = "Desvantagem é desvantagem! Eu protesto!"
10040090-31 = "Juiz! Solicito a troca da modalidade!"
10040090-32 = "Não existe juiz em um jogo de festa..."
10040090-33 = "Mas tudo bem. Se você insiste tanto, podemos trocar de jogo. #nPreparei vários jogos de tabuleiro."
10040090-34 = "Então, o que vamos jogar agora? #n\"A Vida\"? Ou \"O Jogo do Lobisomem de Wild Hunt\"?"
10040090-35 = "Hehehe. Eu sugiro... \"O Jogo do Velho\"!"
10040090-36 = "Aquele jogo em que quem ficar com o curinga no final perde?"
10040090-37 = "Isso, é um jogo simples onde você tira cartas na vez e descarta os pares iguais."
10040090-38 = "Todos devem conhecer, então \"O Jogo do Velho\" está bom, né?"
10040090-40 = "Mas no fim das contas, não é um jogo de sorte também...?"
10040090-41 = "Tem certeza disso?"
10040090-42 = "Hehehe. #nSenpai Kotama, o Jogo do Velho é um jogo de alta estratégia, sabia?"
10040090-43 = "Dá para calcular quais cartas restam com base nas que foram descartadas, #ne se observar as reações, dá para deduzir onde está o curinga."
10040090-44 = "Por isso, diferente da roleta que depende só da sorte, #nno Jogo do Velho eu tenho chances de ganhar!"
10040090-46 = "Sendo assim, vamos começar a partida! #nAh, quem perder vai levar um peteleco na testa como punição!"
10040090-48 = "Fufu. Parece divertido. Posso participar também?"
10040090-49 = "Por mim tudo bem, mas... acho que vai acabar rápido."
10040090-51 = "Hmm... eu passo. #nEu não gosto de Jogo do Velho porque é simples demais."
10040090-52 = "Ué... por que essa reação desanimada? #nSerá que vocês ficaram com medo?"
10040090-53 = "— Bem, não importa, vamos começar!"
10040090-55 = "(Algum tempo depois...)"
10040090-57 = "(Por que...)"
10040090-62 = "(...Logo a Noah-senpai tinha que sobrar!)"
10040090-63 = "Pela situação, #nnão há dúvidas de que a Noah-senpai está com o curinga..."
10040090-64 = "...Ei, senpai?"
10040090-65 = "O que foi, Koyuki-chan?"
10040090-66 = "É que... você está com o curinga, né?"
10040090-67 = "Fufu, quem sabe?"
10040090-68 = "É a da esquerda? Ou a da direita?"
10040090-69 = "Bem, qual será?"
10040090-70 = "（Ugh! Não consigo ler a expressão dela de jeito nenhum...）"
10040090-71 = "（Um duelo cara a cara com a veterana Noah é pedir demais...!）"
10040090-72 = "（Ser abandonada pela sorte até fora dos jogos... isso não faz sentidooo!?）"
10040090-73 = "……Ufa."
10040090-78 = "（Já que chegamos a esse ponto, é tudo ou nada!）"
10040090-82 = "Decidi! Vou apostar na esquerda!"
10040090-83 = "Que peeeena. Era a direita♪"
10040090-84 = "Aaaaaahhh!#nEu sabia que era a direitaaa!"
10040090-85 = "Se você sabia, por que não escolheu a direita?"
10040090-86 = "Eu achei que escolher o oposto da minha intuição me faria ganhar!"
10040090-87 = "Que tipo de lógica sem sentido é essa..."
10040090-89 = "Impressionante. Não é à toa que você tem a melhor poker face do Seminar."
10040090-90 = "Bem, eu já sabia desde o começo. #nNão tem como vencer a veterana Noah em um jogo psicológico."
10040090-91 = "Por que você fez algo tão imprudente se não tinha chance de ganhar?"
10040090-93 = "……Bem, a Koyuki é esse tipo de garota, afinal."
10040090-95 = "（...Depois disso, Koyuki, que sofreu cinco derrotas consecutivas, #nrecebeu o peteleco que ela mesma sugeriu como punição e foi embora chorando）"
