[translation]
10040090-1 = "後日談その1;ババ抜きのオニ"
10040090-2 = "うーん……。"
10040090-3 = "う～～ん……。"
10040090-4 = "ここですっ！はいっ！"
10040090-6 = "〈ブッブー！〉"
10040090-7 = "ああっ！？"
10040090-8 = "ど、どうしてぇ……！"
10040090-12 = "えぇ……どうすればこんなにハズレばっかり引けるの……？"
10040090-13 = "今ので五回連続ですか。#n確率で言えば、約0.00006%……。"
10040090-14 = "サイコロの神様に呪われてるってレベルかも。"
10040090-16 = "そんな神様、いませんって！絶対おかしいです！"
10040090-17 = "こんなの詐欺に決まってます！きっと何か細工されてるんですよ！！"
10040090-19 = "構造は始める前に確認済みです。#nルーレットに細工なんてされてませんでしたよ。"
10040090-20 = "パーティー直前に借りたゲームなのよ。#nあんたを陥れるためにだけに、改造する時間なんてなかったでしょ？"
10040090-21 = "飛び出したペロロ人形が特定の人物を狙い撃つよう、#n赤外線誘導装置が組み込まれていましたけどね――"
10040090-22 = "誰なのよ、そんな複雑なシステムを、#nこんなゲームにわざわざ組み込んだのは。"
10040090-24 = "そういえばこれ、エンジニア部に貸したことがあったっけ。#nパーティーを盛り上げるために、ちょっと改造したとか言ってたかも……。"
10040090-25 = "またエンジニア部の仕業……？"
10040090-26 = "また部費に文句をつけに来たら、厳しく言っておかなきゃ！"
10040090-28 = "だとしてもこれは……不公平です！#nルーレットみたいな運頼みのゲームじゃ、私が不利すぎます！"
10040090-29 = "運ゲーでは自分に不利って……#nちょっと何言ってるかわからないかも……。"
10040090-30 = "不利ったら不利なんですぅ！異議あり、です！"
10040090-31 = "審判！種目の変更を希望します！"
10040090-32 = "パーティーゲームに審判なんているわけないじゃない……。"
10040090-33 = "でもそうね。そこまで言うなら、ほかのゲームにしても良いわ。#nテーブルゲームならたくさん用意したから。"
10040090-34 = "じゃあ、次は何する？#n「ザ・人生」？それとも「ワイルドハントの人狼ゲーム」？"
10040090-35 = "ふっふっふっ。ここはですね……「ババ抜き」を提案させていただきます！"
10040090-36 = "最後までジョーカーを持ってた人が負けのゲームだっけ？"
10040090-37 = "はい、順番にカードを引いて、#n同じ数字が揃ったら捨てるだけのシンプルなゲームです。"
10040090-38 = "皆さんご存知でしょうし、「ババ抜き」で良いですよね？"
10040090-40 = "でも結局、運頼みのゲームじゃないですか……。"
10040090-41 = "それで良いのですか？"
10040090-42 = "ふっふっふ。#nコタマ先輩、ババ抜きは戦略性の高いゲームなんですよ？"
10040090-43 = "捨てられたカードから残ってるカードを計算できますし、#n反応を見ればどこにジョーカーがあるか推察できるんですから。"
10040090-44 = "だから、運にしか頼れないルーレットとは違って、#nババ抜きなら私にも勝ち目があるわけです！"
10040090-46 = "というわけで、さっそく勝負です！#nあ、負けたら罰ゲームでデコピンですよ！"
10040090-48 = "ふふっ。面白そうですね。私も参加していいですか？"
10040090-49 = "私は構わないけど……すぐ終わっちゃいそうね。"
10040090-51 = "うーん……あたしはパス。#nシンプルすぎるから、ババ抜きって好きじゃないんだよね"
10040090-52 = "あれれ……なんか反応薄くないですか？#nもしかして、怖気づいちゃいました？"
10040090-53 = "――まあいいです、じゃ始めましょう！"
10040090-55 = "（しばらくして……）"
10040090-57 = "（どうしてぇ……）"
10040090-62 = "（……よりにもよって、ノア先輩が残るなんて！）"
10040090-63 = "状況的に、#nジョーカーを持ってるのはノア先輩で間違いないんですが……。"
10040090-64 = "……あの、先輩？"
10040090-65 = "何ですか、コユキちゃん？"
10040090-66 = "その……先輩が、ジョーカーをお持ちですよね？"
10040090-67 = "ふふっ、どうでしょうね？"
10040090-68 = "左です？右です？"
10040090-69 = "さて、どっちでしょう？"
10040090-70 = "（くうっ！まったく表情が読めません……）"
10040090-71 = "（ノア先輩とサシ勝負はさすがに……！）"
10040090-72 = "（ゲーム外でも運に見放されるなんて……おかしいですよぉ！？）"
10040090-73 = "……ふぅ。"
10040090-78 = "（こうなったら、一か八か！）"
10040090-82 = "決めました！左で……勝負っ！"
10040090-83 = "ざ～んねん。右でした♪"
10040090-84 = "ああぁぁああああ～！#nやっぱり右だったぁぁ～～！"
10040090-85 = "わかってたなら、なんで右にしなかったのよ。"
10040090-86 = "直感の逆を選んだほうが勝てると思ったんです！"
10040090-87 = "なに訳の分からないこと言ってるのよ……。"
10040090-89 = "さすが。セミナーで随一のポーカーフェイスだけあるね。"
10040090-90 = "まあ、ハナからわかってたけどね。#nノア先輩相手に心理戦なんて、通用するわけないよ。"
10040090-91 = "勝ち目なんてないのに、なんでこんな無謀なことしちゃったの？"
10040090-93 = "……まあ、コユキってそういう子だから。"
10040090-95 = "（……その後、五連敗を喫したコユキは、#n罰ゲームで自ら提案したデコピンを喰らい、泣きながらどこかへ行ってしまった）"
