[translation]
1005306-1 = "スポーツカード"
1005306-2 = "シャーレ・オフィス"
1005306-5 = "先日ご連絡した業務協力報告書を……"
1005306-6 = "あれ、留守かな？"
1005306-7 = "こんなに机を散らかしたまんま、一体どこに……。"
1005306-8 = "ふふっ。先生は私がいないとダメなんだから……。"
1005306-17 = "あれ？これ……。"
1005306-22 = "私の写真！？"
1005306-23 = "い、いつの間に撮られて……#nそれより、どうして先生が私の写真を……？"
1005306-24 = "もしかして、いつでも私の姿を見られるように、こっそり撮ったのかな……。"
1005306-25 = "もう……言ってくれたら、写真くらい何枚でも送るのに。"
1005306-26 = "で、でも……よりによって、こんな汗だくになってる競技中の写真だなんて……。"
1005306-27 = "なんだかちょっと不健全なような……。"
1005306-32 = "[ns] \"来てたんだね、ユウカ。\""
1005306-33 = "あっ、先生いらっしゃったんですね！？"
1005306-34 = "[s1] \"ううん、ちょっと備品の確認をしてただけだよ。\"\n[s2] \"それより、その手に持ってるのは……？\""
1005306-35 = "こ、これは、その……。"
1005306-36 = "こ、これは、その……。"
1005306-37 = "って、むしろ聞きたいのは私の方です！#n何ですか、この写真！"
1005306-38 = "全ての生徒を公正に指導すべき立場の先生が、こっそり特定の生徒の写真を持ってるだなんて……。"
1005306-39 = "ふ、不健全です！"
1005306-40 = "[s3] \"あ、そのスポーツカードのこと？\"\n[s4] \"クロノススクールの生徒からもらったんだ。\""
1005306-41 = "……スポーツカード、ですか？"
1005306-42 = "……スポーツカード、ですか？"
1005306-44 = "……なるほど。晄輪大祭に参加した生徒たちの写真がトレーディングカードとして流通しているのですね。"
1005306-45 = "こういったカードを集めるマニアもいることは知っていましたが……#nまさか私まで撮られているなんて……。"
1005306-46 = "たしかに晄輪大祭中に撮影された写真は、クロノススクールに使用許可を出しましたけど、こんな商売をするだなんて、思いもしませんでした。"
1005306-47 = "こうなることが分かっていたら、もっと細かく契約書を詰めたんですが……。"
1005306-48 = "[s5] \"許可の範囲内なら、いいんじゃないかな？\"\n[s6] \"この写真、可愛く撮れてるね。\""
1005306-49 = "しかし……不思議ですね。#nこんなカードが、とんでもない高値で取引される事もあるのだそうです。"
1005306-50 = "そ、そんな風に言われても……。"
1005306-51 = "しかし……不思議ですね。#nこんなカードが、とんでもない高値で取引される事もあるのだそうです。"
1005306-52 = "会計業務に携わっていると、コレクター品の価値を耳にすることもありますが…………コレクターの世界を理解するのは難しそうです。"
1005306-53 = "前に耳にしたのですが、こういったカードは本人の活躍次第で価値が変わるのだとか……。"
1005306-54 = "ふふっ、いつか私のカードも高値で取引されたりして。"
1005306-55 = "今はただの会計に過ぎませんが、一生懸命頑張れば、ミレニアムの生徒会長になる日が来るかもしれませんから。"
1005306-56 = "そうだ先生、直筆サイン入りなら、さらに高値が付くんですよね。"
1005306-57 = "今なら特別に、サインしましょうか？"
1005306-58 = "[ns] \"そうだね。\""
1005306-60 = "[ns] \"でも、このカードが高値で取引されることはないよ。\""
1005306-61 = "……どうしてですか？"
1005306-62 = "もしかして先生は、私なんかに生徒会長が務まるはずはないと……。"
1005306-63 = "[ns] \"違うよ、ユウカ。\""
1005306-65 = "[ns] \"このカードは、私が一生大切にするから。\""
1005306-72 = "……やっぱり、不健全です。"
