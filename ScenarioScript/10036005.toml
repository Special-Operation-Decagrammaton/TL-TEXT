[translation]
10036005-1 = "Prólogo"
10036005-4 = "Aquele cara, para onde ele fugiu?"
10036005-5 = "Tsc, me dando trabalho..."
10036005-11 = "Ali está! Atirem!"
10036005-17 = "Será que acertamos?"
10036005-26 = "Argh..."
10036005-31 = "...Isso encerra o assunto."
10036005-35 = "Vou levar a mercadoria."
10036005-39 = "Aqui está o item do contrato."
10036005-40 = "Não acredito que você realmente conseguiu..."
10036005-41 = "Muito bem feito!"
10036005-42 = "Imagino que tenha sido um trabalho difícil... como você conseguiu?"
10036005-43 = "Não fiz nada de especial."
10036005-48 = "Apenas investiguei o alvo minuciosamente antes."
10036005-49 = "Se você conhece o poder de fogo, a posição do inimigo e a estrutura do prédio, #n a taxa de sucesso da missão aumenta naturalmente."
10036005-50 = "...Impressionante."
10036005-51 = "...Poderia me dar o pagamento?"
10036005-52 = "Ah, sim, está aqui."
10036005-56 = "Um, dois, três... está tudo certo."
10036005-57 = "Mas..."
10036005-59 = "Faltou alguma coisa? #n Contei várias vezes, não deveria estar errado..."
10036005-60 = "Não, o valor está correto..."
10036005-65 = "(Se eu repuser o equipamento e a munição, mesmo cortando gastos com comida, só vai durar uma semana...)"
10036005-66 = "(Preciso encontrar um trabalho que pague melhor...)"
10036005-70 = "Por acaso, você está precisando de dinheiro?"
10036005-71 = "Se quiser, posso te indicar vários trabalhos."
10036005-72 = "S-sério?"
10036005-73 = "Claro, se você tem essa habilidade, posso confiar em você sem preocupações. #n Quer tentar?"
10036005-74 = "Sim... eu aceito."
10036005-75 = "É um caso que preciso resolver em breve..."
10036005-76 = "Você sabe que a \"Grande União dos Grupos de Capacete\" vai acontecer em breve?"
10036005-77 = "...\"Grande União\"?"
10036005-78 = "Isso mesmo. #n Sendo um dos executivos, talvez não seja o melhor para eu dizer, mas os Grupos de Capacete nunca foram uma organização grande."
10036005-79 = "No entanto, as coisas mudaram recentemente."
10036005-80 = "Como alguns caras perigosos fugiram da Agência Correcional, #n tivemos que fortalecer a organização às pressas..."
10036005-81 = "Ops, me desviei do assunto."
10036005-82 = "A Grande União é como uma confraternização onde todos os membros dos Grupos de Capacete se reúnem. #n Talvez possamos até chamar de festival."
10036005-84 = "...E o que eu preciso fazer lá?"
10036005-85 = "Na verdade..."
10036005-86 = "Convidamos um DJ famoso do mercado negro para a próxima Grande União."
10036005-87 = "Mas não conseguimos encontrar ninguém capaz de fazer a escolta."
10036005-88 = "O que acha, quer tentar?"
10036005-89 = "Escolta, é..."
10036005-90 = "...Não, não estou em posição de escolher trabalho agora."
10036005-91 = "Pode deixar esse trabalho comigo."
10036005-92 = "Ótimo, decidido. #n A Grande União será daqui a três dias, na \"Praia Fora da Lei\"."
10036005-96 = "...Praia, disse?"
