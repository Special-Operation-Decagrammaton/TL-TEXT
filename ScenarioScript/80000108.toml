[translation]
80000108-1 = "A hospitalidade suprema e definitiva"
80000108-2 = "Olá, Sensei."
80000108-3 = "[s] \"Desculpe, Toki. Você esperou muito?\""
80000108-4 = "Não, está tudo bem. O fato de você ter vindo é o que mais importa."
80000108-5 = "Então, Sensei, vamos?"
80000108-6 = "[s] \"Sim, hoje é no escritório da Toki, né?\""
80000108-7 = "Sim. Imagino que já esteja acostumado a vir aqui, mas..."
80000108-8 = "Hoje também serei sua escolta."
80000108-13 = "Seja bem-vindo, Sensei. Por favor, entre."
80000108-15 = "(Ao entrar no escritório, talheres estavam dispostos sobre a mesa)"
80000108-21 = "[ns] \"Então, sobre o que você queria falar...?\""
80000108-22 = "Sim, sobre isso..."
80000108-23 = "Hoje, você irá saborear um curso especial de Dia dos Namorados que preparei para você, Sensei."
80000108-24 = "[s1] \"Ah, Dia dos Namorados!\"\n[s2] \"Então é por isso que a mesa está arrumada?\""
80000108-27 = "Sim, exatamente."
80000108-28 = "Pensei que não deveríamos desperdiçar um dia tão importante, e depois de pensar em como poderia retribuir ao Sensei..."
80000108-29 = "Uma ideia me veio à mente..."
80000108-30 = "[s] \"Uma ideia...?\""
80000108-31 = "Sim, essa é a minha hospitalidade suprema e definitiva."
80000108-32 = "...Por acaso, isso está sendo um incômodo?"
80000108-33 = "[s] \"Não, na verdade, estou muito feliz.\""
80000108-34 = "Entendo. Fico feliz em ouvir isso."
80000108-35 = "Então, trarei o primeiro prato imediatamente."
80000108-36 = "Ah, não se preocupe, todos os chocolates foram encomendados de lojas famosas."
80000108-38 = "O primeiro item é o clássico chocolate ao leite. O sabor rico do leite e a doçura aguçam o apetite."
80000108-43 = "O próximo é o chocolate branco. Como não contém massa de cacau nem cacau em pó, acredito que poderá saborear um gosto diferente do anterior."
80000108-47 = "Agora, um chocolate amargo com alto teor de cacau. Tivemos chocolates doces até agora, então gostaria que aproveitasse um sabor mais amargo desta vez."
80000108-52 = "Também preparei uma bebida. É um chocolate quente com xarope de rum. #nSinta-se à vontade para adicionar açúcar, se desejar."
80000108-56 = "Este é um chocolate com frutas. #nVocê poderá experimentar uma textura diferente da que provou até agora."
80000108-60 = "[ns3] \"Tudo está realmente delicioso, Toki.\"\n[ns4] \"Eu não sabia que existiam tantos tipos de chocolate.\""
80000108-63 = "O que achou? Estava ao seu gosto?"
80000108-64 = "Não sei se consegui satisfazê-lo."
80000108-65 = "[s] \"Sim, já estou mais do que satisfeito...\""
80000108-66 = "Minha hospitalidade ainda não terminou."
80000108-67 = "[s5] \"Ainda tem mais!?\"\n[s6] \"Certo... vou continuar comendo!\""
80000108-70 = "Como esperado, esse é o meu Sensei."
80000108-71 = "Sendo assim, prepare-se para saborear todo o esforço de Asuma Toki."
80000108-76 = "[ns] \"Isso é...?\""
80000108-77 = "É o meu bolo de chocolate caseiro. #nEste será o final do curso de hoje."
80000108-78 = "Por assim dizer, a estrela do show."
80000108-79 = "Vou provar que meu bolo não deixa nada a desejar em comparação às lojas famosas de Kivotos."
80000108-80 = "[s] \"Não, você não precisava ir tão longe, com a sua habilidade...\""
80000108-81 = "Você é ingênuo. Mais ingênuo que chocolate ao leite."
80000108-82 = "Ouvi dizer que o Dia dos Namorados é um dia para entregar chocolates a alguém por quem você tem sentimentos especiais e expressar seus sentimentos. Estou correta?"
80000108-83 = "[s] \"Sim, está correto.\""
80000108-84 = "Sendo assim, não deveríamos entregá-los de uma maneira especial e adequada?"
80000108-85 = "Se for para isso, não deveríamos dedicar tudo e entregar o chocolate definitivo!?"
80000108-86 = "[s] \"Isso é verdade, mas!\""
80000108-87 = "Ufa, peço desculpas. Acabei me empolgando um pouco. #nComo esperado do Dia dos Namorados, ele é um adversário difícil... Vamos voltar ao assunto."
80000108-88 = "O motivo de eu ter chamado o Sensei ao escritório hoje é porque este é um lugar importante para mim."
80000108-89 = "Eu queria oferecer a melhor hospitalidade possível ao meu querido Sensei, em um lugar especial."
80000108-90 = "[s] \"……Sim.\""
80000108-91 = "E eu queria que você provasse os melhores chocolates que selecionei a dedo."
80000108-92 = "Usei avaliações da internet como referência... especialmente as postagens das alunas da Trinity e do Clube de Pesquisa Gastronômica de Gehenna."
80000108-93 = "Visitei todas as lojas populares e provei pessoalmente antes de escolher."
80000108-97 = "Então... Sensei. Você ficou satisfeito com a seleção de chocolates que escolhi?"
80000108-98 = "[s] \"Na verdade, fico até sem jeito por você ter feito tudo isso.\""
80000108-99 = "Entendo, fico feliz em ouvir isso."
80000108-100 = "No entanto, o que servi até agora foram apenas produtos prontos. #nEles não contêm 100% da minha sinceridade."
80000108-101 = "……Por isso, acho que já está na hora de você provar."
80000108-102 = "O bolo de chocolate que fiz exclusivamente para você, Sensei."
80000108-103 = "……Ou talvez, você não goste de algo feito por mim?"
80000108-104 = "[s7] \"N-não é nada disso!\"\n[s8] \"Eu mal posso esperar para comer!\""
80000108-107 = "Fico feliz em saber disso."
80000108-108 = "Vou buscar uma bebida, então por favor, deixe o garfo de lado e espere um momento."
80000108-109 = "Para garantir que minha sinceridade seja transmitida perfeitamente, eu mesma vou te dar na boca."
80000108-111 = "(O bolo que Toki fez, provado daquela forma...)"
80000108-112 = "(...Não sei bem como descrever, mas era um sabor que acalmava o coração.)"
