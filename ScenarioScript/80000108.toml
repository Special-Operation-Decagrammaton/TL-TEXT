[translation]
80000108-1 = "至高にして究極のおもてなし"
80000108-2 = "こんにちは、先生。"
80000108-3 = "[s] \"ごめん、トキ。待ったよね？\""
80000108-4 = "いえ、大丈夫です。来ていただけた事実が何よりも重要ですので。"
80000108-5 = "それでは先生、行きましょうか。"
80000108-6 = "[s] \"うん、今日はトキのオフィスだよね。\""
80000108-7 = "はい。もう通い慣れた場所かとは思いますが……"
80000108-8 = "本日も私がエスコートします。"
80000108-13 = "ようこそ、先生。こちらへどうぞ。"
80000108-15 = "（オフィスに入ると、テーブルの上にはカトラリーが置かれていた）"
80000108-21 = "[ns] \"それで話って……？\""
80000108-22 = "はい、それについてなのですが……"
80000108-23 = "今日は先生のために用意した、バレンタイン特別コースを召し上がっていただきます。"
80000108-24 = "[s1] \"あ、バレンタインデー！\"\n[s2] \"だからテーブルがセッティングされてるんだ？\""
80000108-27 = "ええ、その通りです。"
80000108-28 = "このように大切な日を無駄にしてはいけないと思い、どうすれば先生に恩返しできるのか考えた結果……"
80000108-29 = "とあるアイデアが浮かんだのです……"
80000108-30 = "[s] \"アイデア……？\""
80000108-31 = "そう、それがこの至高にして究極のおもてなしです。"
80000108-32 = "……もしかして、ご迷惑でしたか？"
80000108-33 = "[s] \"ううん、むしろすごく嬉しいよ。\""
80000108-34 = "そうでしたか。なら良かったです。"
80000108-35 = "では、さっそくお持ちします。"
80000108-36 = "あ、チョコレートはどれも有名店から取り寄せましたので、ご心配なく。"
80000108-38 = "一品目は、定番のミルクチョコレートです。豊かなミルクの風味と甘さが食欲をそそります。"
80000108-43 = "次はホワイトチョコレートです。カカオマスとカカオパウダーが入っていないので、先ほどとは異なった風味を味わっていただけるかと。"
80000108-47 = "今度はカカオの含有量が高いダークチョコレートです。甘いチョコレートが続きましたが、ここで一度ビターな味わいを楽しんでいただきます。"
80000108-52 = "飲み物もご用意しました。ラムシロップを加えたココアです。#nお好みで砂糖をお入れください。"
80000108-56 = "果物が入ったフルーツチョコレートです。#n先ほどまでとは異なる食感を味わっていただけます。"
80000108-60 = "[ns3] \"どれも本当に美味しいよ、トキ。\"\n[ns4] \"チョコレートってこんなに種類があるんだね。\""
80000108-63 = "いかがでしょう、お口に合いましたか？"
80000108-64 = "満足していただけたかは分かりませんが。"
80000108-65 = "[s] \"うん、もう十分満足……\""
80000108-66 = "まだ私のおもてなしは終わっておりません。"
80000108-67 = "[s5] \"まだあるの！？\"\n[s6] \"よし……まだまだ食べるよ！\""
80000108-70 = "さすが、それでこそ私の先生です。"
80000108-71 = "それなら、この[ruby=あすま]飛鳥馬[/ruby]トキの全力を味わっていただきましょう。"
80000108-76 = "[ns] \"これは……！？\""
80000108-77 = "私の手作りチョコレートケーキです。#nこれが今日のコースの最後になります。"
80000108-78 = "言わば、主役ですね。"
80000108-79 = "キヴォトスの有名店と比べても、私のケーキは遜色ないと証明してみせましょう。"
80000108-80 = "[s] \"いや、そこまでしなくてもトキの腕なら……\""
80000108-81 = "甘いです。ミルクチョコレートよりも甘いですね。"
80000108-82 = "バレンタインデーというのは、特別な想いを抱いている方に、チョコレートを渡して気持ちを伝える日だと聞きました。間違いありませんか？"
80000108-83 = "[s] \"うん、合ってるよ。\""
80000108-84 = "でしたら、それ相応の特別な方法で渡すべきではないでしょうか？"
80000108-85 = "そのためであれば、全てを捧げて究極のチョコレートを渡すべきではないでしょうか！？"
80000108-86 = "[s] \"たしかにその通りなんだけど！\""
80000108-87 = "ふう、申し訳ありません。私としたことが、少し興奮してしまいました。#nさすがはバレンタインデー、手強いですね……話を戻しましょう。"
80000108-88 = "今日、先生をオフィスにお呼びした理由は、ここが私にとって大切な場所だからです。"
80000108-89 = "大切な場所で、大切な先生に、最高のおもてなしをしたかったのです。"
80000108-90 = "[s] \"……うん。\""
80000108-91 = "そして、私が厳選した最高のチョコレートを召し上がっていただきたかったのです。"
80000108-92 = "インターネットの口コミ……特にトリニティの生徒やゲヘナの美食研究会の投稿を参考にして。"
80000108-93 = "人気のお店には全て足を運び、直接味わってから選んできました。"
80000108-97 = "その……先生。私の選んだチョコレートコースは、ご満足いただけましたか？"
80000108-98 = "[s] \"むしろ、ここまでしてもらって恐縮だよ。\""
80000108-99 = "そうでしたか、良かったです。"
80000108-100 = "しかし、今までお出ししたのはあくまで既製品。#n私の真心を100%は込められておりません。"
80000108-101 = "……なので、そろそろ食べていただきましょうか。"
80000108-102 = "私が先生のためだけに作った、チョコレートケーキを。"
80000108-103 = "……それとも、私の手作りは嫌でしたか？"
80000108-104 = "[s7] \"そ、そんなことないよ！\"\n[s8] \"すぐにでも食べたいくらいだよ！\""
80000108-107 = "でしたら良かったです。"
80000108-108 = "飲み物をお持ちするので、フォークを置いて少々お待ちください。"
80000108-109 = "完璧に真心が伝わるよう、私が食べさせてあげますので。"
80000108-111 = "（そうして味わったトキのケーキは……）"
80000108-112 = "（……どう表現すれば良いのか分からないが、心が落ち着く味だった）"
