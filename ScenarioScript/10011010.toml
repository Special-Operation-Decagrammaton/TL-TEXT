[translation]
10011010-1 = "Episódio 1; O início do encontro de intercâmbio!"
10011010-4 = "[ns] \"O local do encontro era, se não me engano...\""
10011010-5 = "Ah, Chefe! Encontramos o Mestre!"
10011010-9 = "Oh, Professor! Por aqui, por aqui!"
10011010-10 = "Bom, dia..."
10011010-11 = "[s] \"Bom dia, pessoal. Estão prontas?\""
10011010-12 = "Com certeza!"
10011010-13 = "Izuna também se preparou com força total! Mais especificamente, algo como um treinamento mental!"
10011010-14 = "Eu também, tomei um remédio para o estômago esta manhã, então..."
10011010-15 = "Ah, Tsukuyo, não precisa ficar tão nervosa!"
10011010-16 = "[s] \"De alguma forma, Michiru parece mais animada do que quando nos vimos antes.\""
10011010-17 = "Hum, parece? ...Bem, talvez eu esteja um pouco empolgada."
10011010-18 = "Se ajudarmos bem neste encontro de intercâmbio, talvez possamos nos tornar um clube oficial."
10011010-19 = "Só de pensar nisso, fico empolgada... Tenho que dar o meu melhor!"
10011010-20 = "Um encontro de intercâmbio entre Hyakkiyako e a Academia Gehenna..."
10011010-21 = "É a primeira vez que algo assim acontece... Estou tão nervosa..."
10011010-22 = "[s] \"Quem diria que as coisas chegariam a esse ponto.\""
10011010-26 = "(Uma semana atrás, levada por Kaho para visitar o Departamento Yin-Yang)"
10011010-30 = "[ns] \"Que ambiente solene...\""
10011010-31 = "N-não baixe a guarda, Professor! A outra parte é nada menos que a Chefe do Departamento Yin-Yang! Ela é praticamente a presidente do conselho estudantil!"
10011010-32 = "Já ouvi rumores sobre isso... Dizem que a Chefe do Departamento Yin-Yang consegue roubar a alma de alguém apenas com sua lábia..."
10011010-33 = "Mestre, não se preocupe! Eu, Izuna, protegerei a sua segurança!"
10011010-34 = "...Parece que houve algum mal-entendido."
10011010-38 = "Ué... visitas?"
10011010-43 = "Ora, Chise-chan."
10011010-44 = "...Eh?"
10011010-48 = "[ns] \"...Chise?\""
10011010-52 = "Da névoa"
10011010-53 = "Um encontro repentino"
10011010-54 = "Surpresa"
10011010-55 = "...Como você tem passado?"
10011010-56 = "[s] \"Ah, sim. Estou bem.\""
10011010-57 = "Uau...! O haiku da Chise-sama, ao vivo...!"
10011010-58 = "Ah, a Chise-chan é tão fofa..."
10011010-59 = "[s] \"A Chise continua sendo popular como sempre...\""
10011010-60 = "...Ehem, peço desculpas."
10011010-61 = "Niya-sama, temos visitas."
10011010-70 = "Ora, ora, ora~."
10011010-77 = "Hum, vejo só..."
10011010-85 = "Entendo, entendo."
10011010-86 = "O rosto é bem do meu agrado, na verdade é o meu tipo... Não, será que é o oposto?"
10011010-88 = "Ainda assim, bem... parece interessante."
10011010-89 = "[s] \"...?\""
10011010-90 = "Niya-sama, isso é falta de educação."
10011010-91 = "Nyahaha, a Kaho continua sendo tão rígida."
10011010-92 = "Ehem."
10011010-97 = "Meu nome é Amachi Niya, sou a Chefe do Departamento Yin-Yang. Hm? Acha que sou arrogante? De jeito nenhum, é o contrário."
10011010-98 = "É só porque minha paciência é curta que pareço arrogante. Na verdade, sou uma pessoa bem importante, sabe. Mas, de qualquer forma, estou feliz em conhecê-lo, Professor de Schale♪"
10011010-99 = "[s] \"Digo o mesmo. Fico feliz em conhecê-la, Niya.\""
10011010-100 = "Nyahaha, que reação séria."
10011010-101 = "Entendo, entendo, então este é o Sensei do Schale..."
10011010-102 = "Já ouvi falar tanto de você que meus ouvidos estão até cansados. Dizem que, desde o desaparecimento da Presidente do Conselho Estudantil Federal, você tem feito um grande trabalho em vários lugares..."
10011010-103 = "[s] \"Estou apenas dando uma pequena ajuda.\""
10011010-104 = "Isso é perfeito. Sendo assim, você poderia nos dar uma ajuda também?"
10011010-105 = "Bem, para isso, por onde devo começar a explicar... Sensei, o quanto você sabe sobre nós, o \"Departamento Yin-Yang\"?"
10011010-106 = "[s1] \"Ouvi dizer que são como o conselho estudantil de Hyakkiyako...\"\n[s2] \"Se não me engano, vocês cuidam de funções administrativas...?\""
10011010-109 = "Hum-hum-hum... Você não está errado, mas talvez sua percepção esteja um pouquinho distorcida."
10011010-110 = "Esta Academia Hyakkiyako é uma escola composta por inúmeras uniões..."
10011010-111 = "...Por causa disso, não existe aqui algo como um \"conselho estudantil\" ou uma \"organização que ocupa o topo\"."
10011010-112 = "[s] \"Então, o que é o Departamento Yin-Yang...?\""
10011010-113 = "Nya-ha-ha, não estamos no topo. Pelo contrário, mantemos uma posição um pouco mais recuada, sendo uma existência que sustenta a história e a tradição de Hyakkiyako, e por isso, há um aspecto em que atraímos respeito..."
10011010-119 = "Bem, quando uma organização cresce, esse tipo de papel se torna necessário. É só isso."
10011010-120 = "[s] \"Entendo...\""
10011010-121 = "Bem, na prática, somos quase como ídolos; fazemos apresentações e transmissões de adivinhação."
10011010-122 = "Nya-ha-ha, a Chise, especialmente, é muito popular, não é?"
10011010-123 = "Não é?"
10011010-124 = "...Foi isso mesmo?"
10011010-125 = "Niya-sama, vamos ao assunto principal."
10011010-126 = "Ora, Kaho, não precisa ficar com ciúmes... É claro que você também tem muitos fãs secretos, sabe?"
10011010-127 = "N-Niya-sama...!"
10011010-128 = "Nya-ha-ha."
10011010-129 = "Bem, serei direta."
10011010-131 = "Daqui a uma semana... está planejado um evento de intercâmbio entre nós, a \"Academia Hyakkiyako\", e a \"Academia Gehenna\"."
10011010-132 = "[s] \"Gehenna?\""
10011010-134 = "Sim."
10011010-136 = "Recebemos o consentimento das líderes da Academia Gehenna, o \"Pandemonium Society\"."
10011010-138 = "Decidimos convidar o pessoal de Gehenna para a \"Vila Cinematográfica Uzumaki de Hyakkiyako\"."
10011010-139 = "E desta vez, de forma especial..."
10011010-140 = "Planejamos realizar a \"Waraku-hime\", a apresentação que é o orgulho do nosso Departamento Yin-Yang."
10011010-141 = "[s] \"Waraku-hime...?\""
10011010-143 = "Sensei, não me diga que você não conhece a Waraku-hime!?"
10011010-144 = "A Vila Cinematográfica Uzumaki tem várias atrações, mas essa é uma das mais populares!"
10011010-145 = "E, acima de tudo, a protagonista da \"Waraku-hime\" é a Chise-sama! É uma atração maravilhosa onde você pode apreciar ao máximo a adorabilidade da Chise-sama, a maior ídolo de Hyakkiyako...!"
10011010-146 = "...?"
10011010-147 = "Michiru-san, por favor, controle o tom da sua voz..."
10011010-148 = "Hum-hum-hum, então você estava nos assistindo, né?♪"
10011010-149 = "Err... se não me engano... Lun-Lun-san, era esse o nome?"
10011010-150 = "É Michiru! Quem é Lun-Lun?!"
10011010-154 = "(Droga, que perigo!)"
10011010-155 = "(Eu gritei com o Departamento Yin-Yang...!)"
10011010-157 = "Fufu... especialmente esta \"Waraku-hime\" é um evento que preparamos com muito esforço, mas..."
10011010-158 = "Tenho apenas uma preocupação."
10011010-159 = "[s] \"Uma preocupação?\""
10011010-164 = "Sim. Como o Sensei bem sabe, o pessoal de Gehenna é extremamente livre e espontâneo. Por isso, caso aconteça algo..."
10011010-171 = "É uma possibilidade remota, mas... se algo inesperado acontecer e surgir algum problema durante a apresentação da \"Waraku-hime\"..."
10011010-172 = "Isso seria muito divertido... não, quer dizer."
10011010-173 = "Pensei que poderia ser um problema."
10011010-175 = "Sendo assim, para que a apresentação termine em segurança, gostaríamos de pedir a ajuda do Schale. O que acha?"
10011010-176 = "[s] \"Certo, acho que vou ajudar vocês.\""
10011010-177 = "Sensei!?"
10011010-178 = "[s] \"Não que seja uma compensação, mas tenho uma proposta.\""
10011010-179 = "……Ora, do que se trata?"
10011010-180 = "[s3] \"Pensei em pedir a ajuda do Clube de Pesquisa de Ninjutsu para lidar com esse assunto.\"\n[s4] \"Se a apresentação for um sucesso, você poderia reconhecer o Clube de Pesquisa de Ninjutsu?\""
10011010-183 = "O Clube de Pesquisa de Ninjutsu, é……?"
10011010-184 = "Ei, Sensei……! Você não pode dizer algo assim de repente……!"
10011010-185 = "Com todo o respeito, Sensei, isso requer procedimentos formais……"
10011010-187 = "[ns] \"O que acha?\""
10011010-191 = "Hum, Clube de Pesquisa de Ninjutsu…… um clube que não conheço muito bem, não é?"
10011010-192 = "Entendo, um clube que pesquisa ninjas e que ainda não recebeu a autorização oficial."
10011010-193 = "Nfufu. E por que será que isso acontece……?"
10011010-194 = "……Até hoje, nunca recebemos um \"formulário de solicitação de atividade oficial\" do Clube de Pesquisa de Ninjutsu."
10011010-198 = "Os documentos necessários para essa solicitação são: 1 \"Certificado de Realizações do Clube\" e 3 \"Cartas de Garantia de outros clubes sobre as atividades\"."
10011010-202 = "No caso de vocês do Clube de Pesquisa de Ninjutsu, o primeiro item não seria um problema, considerando o canal \"Diário Ninja da Michiru\" que vocês operam, e os fanzines de ninjutsu apresentados no \"Comi-Sen\" outro dia, mas……"
10011010-204 = "Po-por que a Kaho sabe disso!?"
10011010-205 = "No entanto, só faltam as cartas de garantia de outros clubes."
10011010-206 = "Se tiverem isso, a solicitação é possível, mas……?"
10011010-207 = "[s] \"É mesmo?\""
10011010-208 = "Mas, sabe…… é que não tem muita gente que entende a natureza solitária dos ninjas……"
10011010-209 = "É que, para a cultura ninja criar raízes em Kivotos, ainda precisamos de preparativos……"
10011010-210 = "E também tem, sabe, questões pessoais……"
10011010-211 = "……"
10011010-212 = "Nyahaha, bem, tudo bem. Vamos aceitar o desafio."
10011010-213 = "Niya-sama, você de novo……!"
10011010-214 = "Sério, é verdade!?"
10011010-215 = "Ora, ora, Kaho, não tem problema nenhum nisso."
10011010-216 = "Se a apresentação for um sucesso,"
10011010-217 = "e a reunião de intercâmbio terminar sem problemas…… claro."
10011010-218 = "[s] \"Obrigado, Niya.\""
10011010-219 = "Nyahaha, de nada. Sendo assim, pessoal do Clube de Pesquisa de Ninjutsu, conto com vocês para a próxima apresentação~♪"
10011010-220 = "Se é assim……!"
10011010-221 = "Presidente……!"
10011010-222 = "Ah, sim, claro……"
10011010-228 = "C-claro, podem deixar comigo, como se estivessem em um navio seguro! Eu vou dar o meu melhor para garantir o sucesso……!"
10011010-229 = "Francamente, a Niya-sama é……"
10011010-230 = "♪"
10011010-231 = "Nyahaha…… bem, vamos ver do que vocês são capazes, não é?"
10011010-233 = "……Então é isso! Vamos direto para o local! Rumo ao sucesso da apresentação!"
10011010-238 = "Sim!"
10011010-239 = "[s] \"Muito bem, vamos dar o nosso melhor!\""
