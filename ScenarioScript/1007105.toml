[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1007105-1 = "SRT, Iniciando Exploração" 
1007105-4 = "Ah, Sensei……!" 
1007105-5 = "[s1] \"Chegou cedo, Miyako.\"\n[s2] \"Desculpe, te fiz esperar?\"" 
1007105-8 = "I-Isso é……" 
1007105-9 = "Eu estava tão ansiosa para andar sobre o mar que acabei chegando mais cedo do que o combinado……" 
1007105-10 = "É vergonhoso que a comandante da SRT não consiga cumprir o horário marcado." 
1007105-11 = "[s3] \"Acho que consigo entender o sentimento.\"\n[s4] \"Em dias de excursão, dá vontade de chegar mais cedo na escola mesmo.\"" 
1007105-16 = "Fufu…… Tem razão." 
1007105-17 = "De qualquer forma, exatamente como os moradores haviam nos contado, um caminho se formou assim que a maré baixou." 
1007105-18 = "Um fenômeno misterioso como este, acontecendo duas vezes por dia……" 
1007105-19 = "Diante das marés, até mesmo as Forças Especiais da SRT se sentem impotentes." 
1007105-23 = "……Acabei ficando um pouco emotiva." 
1007105-27 = "A maré baixa não dura muito tempo, então vamos logo?" 
1007105-28 = "Tome cuidado com os passos, Sensei. O caminho do mar pode ser bem escorregadio." 
1007105-32 = "（Caminhei lado a lado com a Miyako pelo caminho no mar em direção à ilha remota.）" 
1007105-34 = "Uau…… É uma ilha linda, exatamente como disseram." 
1007105-35 = "A natureza é tão abundante……" 
1007105-36 = "Nunca imaginei que veria uma paisagem tão maravilhosa numa ilha remota……" 
1007105-37 = "……Não, na verdade, é exatamente por ser uma ilha remota que essa paisagem esplêndida foi preservada." 
1007105-41 = "Sensei…… se não se importar, o que acha de darmos a volta e subirmos no topo do penhasco?" 
1007105-42 = "Como vi de longe, posso ter me enganado, mas me pareceu que havia flores desabrochando por lá……" 
1007105-43 = "[s] \"Vamos lá dar uma olhada, Miyako.\"" 
1007105-44 = "Fufu…… Ficar ao seu lado me deixa tão animada." 
1007105-49 = "（Depois de admirar as flores no topo do penhasco, retornamos à praia, porém……）" 
1007105-56 = "U-Ué……?" 
1007105-57 = "[s] \"O caminho do mar……\"" 
1007105-58 = "Fiquei tão encantada com as flores que perdi a noção do tempo……\nSem eu perceber, a maré subiu……" 
1007105-59 = "Desse jeito, não poderemos voltar andando." 
1007105-60 = "Me desculpe…… Isso aconteceu porque eu abusei da sua gentileza, Sensei……" 
1007105-61 = "[s5] \"Está tudo bem, não se preocupe com isso.\"\n[s6] \"A culpa não é sua, Miyako.\"" 
1007105-64 = "Como eu planejava voltar para a vila logo, acabei deixando a bateria extra para trás……" 
1007105-65 = "Até a próxima maré baixa, acho que vai demorar umas 10 horas.\n……Sensei, o que faremos?" 
1007105-66 = "[s] \"Eu não tenho outros planos para hoje, então……\"" 
1007105-68 = "[ns] \"Já que estamos de folga, vamos passar o tempo relaxando.\"" 
1007105-70 = "……Certo!" 
1007105-73 = "（Cerca de uma hora depois……）" 
1007105-76 = "（……O Sensei disse para relaxarmos, mas essa situação onde não podemos fazer nada me deixa um tanto frustrada.）" 
1007105-77 = "（Nós já vimos praticamente tudo o que tinha para ver na ilha……）" 
1007105-78 = "（Não há nenhum assunto interessante para conversar……）" 
1007105-83 = "……Hã? Senti a presença de alguma coisa naqueles arbustos……" 
1007105-87 = "Seria algum animal selvagem?" 
1007105-95 = "Ah……" 
1007105-96 = "[ns] \"É um coelho.\"" 
1007105-97 = "Um coelho…… é mesmo." 
1007105-105 = "E não é só um, tem vários…… Não, deve haver dezenas deles." 
1007105-109 = "Fufu, que fofinhos. São bem amigáveis." 
1007105-110 = "Mas, por que haveria uma colônia de coelhos numa ilha remota como esta……?" 
1007105-111 = "[s] \"Eles não vieram nadando?\"" 
1007105-112 = "Não, os coelhos têm medo de água.\nA probabilidade de terem nadado pelo mar é bem baixa." 
1007105-113 = "Porém, é difícil de acreditar que sempre viveram aqui numa ilha cercada de água…… e não acho que alguém se daria ao trabalho de vir até aqui só para soltar coelhos." 
1007105-117 = "Eu não tenho provas, mas……" 
1007105-118 = "……Talvez eles tenham se perdido." 
1007105-119 = "[s] \"Se perdido……?\"" 
1007105-120 = "Sim. Por um acaso do destino, eles atravessaram o caminho de mar que apareceu na maré baixa, acabaram na mesma situação que nós, e terminaram se estabelecendo aqui." 
1007105-121 = "[s] \"Mesmo assim, há muitos deles.\"" 
1007105-122 = "Provavelmente……" 
1007105-123 = "……Os primeiros coelhos a visitarem a ilha deviam ser um casal." 
1007105-124 = "Nesta ilha não há predadores e há abundância de comida.\nEles se estabeleceram, tiveram filhotes e continuaram se multiplicando." 
1007105-125 = "No começo, pode ter sido uma ilha isolada e solitária.\nMas, em algum momento, tornou-se este paraíso dos coelhos……" 
1007105-131 = "Mesmo que tivessem se mudado para uma terra desconhecida, onde não conheciam ninguém……" 
1007105-132 = "Eu também…… se estiver ao lado de alguém em quem confio, não importa o lugar―― tenho certeza de que não terei medo." 
1007105-134 = "（Depois disso, até a maré baixar novamente, fiquei coladinho com a Miyako enquanto cuidávamos dos coelhos juntos.）" 