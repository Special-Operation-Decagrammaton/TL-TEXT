[translation]
1007105-1 = "SRT、探検します"
1007105-4 = "あっ、先生……！"
1007105-5 = "[s1] \"早かったね、ミヤコ。\"\n[s2] \"ごめん、待ったよね。\""
1007105-8 = "そ、それが……"
1007105-9 = "海の上を歩けるのが待ち遠しくて、約束の時間よりも早く……"
1007105-10 = "SRTの小隊長が集合時刻に合わせられないなんて、情けない話ですね。"
1007105-11 = "[s3] \"その気持ち、分かる気がする。\"\n[s4] \"遠足の日は、早く学校に行きたくなるよね。\""
1007105-16 = "ふふっ……そうですね。"
1007105-17 = "それにしても、住民の皆さんからお話を聞いた通り、潮が引くと本当に道が出来ましたね。"
1007105-18 = "こんなに不思議な現象が、1日に2回も……"
1007105-19 = "[ruby=ちょうせき]潮汐の[/ruby]前では、私たちSRTの特殊部隊も無力に感じます。"
1007105-23 = "……少し、感傷的になってしまいましたね。"
1007105-27 = "潮が引いている時間はそう長くありませんし、さっそく行きましょうか？"
1007105-28 = "先生、海の道は足を取られて転びやすいので足元にお気をつけて。"
1007105-32 = "（海の道をミヤコと並んで歩き、離島に向かった）"
1007105-34 = "わぁ……お話で聞いた通り、美しい島ですね。"
1007105-35 = "本当に、自然が豊かで……"
1007105-36 = "まさか離島で、こんなにも素晴らしい景色を見られるなんて……"
1007105-37 = "……いえ、むしろ離島だからこそ、素晴らしい景色が残っているのでしょうね。"
1007105-41 = "先生……よろしければ、グルっと回って岸壁の上にも行ってみませんか？"
1007105-42 = "遠目からなので見間違いかもしれませんが、花が咲いてそうに見えたので……"
1007105-43 = "[s] \"行ってみようか、ミヤコ。\""
1007105-44 = "ふふっ……先生と一緒だと、何だか浮かれてしまいますね。"
1007105-49 = "（崖上の花を眺めてから、浜辺に戻ったところ……）"
1007105-56 = "あ、あれ……？"
1007105-57 = "[s] \"海の道が……\""
1007105-58 = "お花に夢中になっていたら、時間を忘れてしまって……#nいつの間にか、潮が……"
1007105-59 = "これでは、歩いて帰れそうにありませんね。"
1007105-60 = "すみません……私が先生に甘えていたばかりに……"
1007105-61 = "[s5] \"大丈夫だよ、気にしないで。\"\n[s6] \"ミヤコのせいじゃないよ。\""
1007105-64 = "すぐ村に戻る予定だったので、予備のバッテリーを置いてきてしまいました……"
1007105-65 = "次の干潮まで、10時間はあると思います。#n……先生、どうしましょう？"
1007105-66 = "[s] \"今日は他に予定もないし……\""
1007105-68 = "[ns] \"せっかくの休みだから、ゆっくり過ごそうか。\""
1007105-70 = "……はい！"
1007105-73 = "（およそ1時間後……）"
1007105-76 = "（……先生は、ゆっくり過ごそうと言ってくれましたが、何もできない状況はもどかしいですね）"
1007105-77 = "（島の風景は、もう一通り見て回ってしまいましたし……）"
1007105-78 = "（何か面白い話題は……）"
1007105-83 = "……あれ？今、そこの草むらに何か気配が……"
1007105-87 = "野生動物でも居るのでしょうか？"
1007105-95 = "えっ……"
1007105-96 = "[ns] \"ウサギだね。\""
1007105-97 = "ウサギ……ですね。"
1007105-105 = "それも一匹ではなく、何匹も……いえ、数十匹は居そうです。"
1007105-109 = "ふふっ、かわいい。人懐っこいですね。"
1007105-110 = "しかし、どうしてこんな離島にウサギの群れが……？"
1007105-111 = "[s] \"泳いできたんじゃないかな？\""
1007105-112 = "いえ、ウサギは水を怖がります。#n海を泳いできた可能性は低いでしょう。"
1007105-113 = "しかし、水に囲まれた島で、もとからウサギが住んでいたとも思えませんし……わざわざ島まで来て、ウサギを放すような人が居たとも思えませんね。"
1007105-117 = "根拠はありませんが……"
1007105-118 = "……道に迷ったのではないでしょうか。"
1007105-119 = "[s] \"道に……？\""
1007105-120 = "はい。偶然、干潮時に現れた海の道をウサギが渡り、私たちと同じ状況に陥って、住み着いたのだと思います。"
1007105-121 = "[s] \"でも、それにしては数が多いね。\""
1007105-122 = "おそらく……"
1007105-123 = "……最初に島を訪れたウサギは、夫婦だったはずです。"
1007105-124 = "この島には天敵も見当たりませんし、食べ物も豊富ですから。#n定住し、子を生み、増え続けていったのでしょう。"
1007105-125 = "はじめは誰も住んでいない寂しい島だったかもしれません。#nですが、いつしかこうしてウサギたちの楽園に……"
1007105-131 = "たとえ、誰も自分のことを知らない土地に移り住んだとしても……"
1007105-132 = "私も心を許せる方と一緒なら、どんなところでも――きっと怖くないです。"
1007105-134 = "（その後、再び潮が引くまで、ミヤコと肩を寄せ合いウサギの世話をしながら過ごした）"
