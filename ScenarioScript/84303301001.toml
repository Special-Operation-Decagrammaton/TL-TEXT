[translation]
84303301001-5 = "Alice... acredita no Rei Ladrão!"
84303301001-6 = "Esse jeito de me chamar, tem certeza que está tudo bem...?"
84303301001-7 = "Pode me chamar como quiser. Mas, se diz que acredita em mim, gostaria que fizesse o mesmo pelo Sábio."
84303301001-8 = "O Rei Ladrão e o Sábio. Preciso agradecer aos dois!"
84303301001-9 = "A minha irmã está dizendo algo normal..."
84303301001-10 = "Ei!?"
