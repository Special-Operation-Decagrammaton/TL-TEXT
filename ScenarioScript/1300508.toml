[translation]
1300508-1 = "レコード屋"
1300508-2 = "商店街・レコード屋前"
1300508-3 = "あれ、先生。こんなところで会うなんて、偶然だね。"
1300508-4 = "うん。今日は非番だから、ちょっと音楽を聴きに来たの。"
1300508-5 = "レコード屋はいいよね、色んなジャンルの音楽が一気に聞ける。"
1300508-6 = "うん……やっぱりこの曲も悪くないね。"
1300508-7 = "先生も一回聞いてみる？"
1300508-8 = "[s1] \"うん。\"\n[s2] \"カヨコのおススメの曲……。\""
1300508-9 = "遠慮しないで、聞いてみて。"
1300508-10 = "遠慮しないで、聞いてみて。"
1300508-14 = "静かなジャズのメロディーが響き渡る……。"
1300508-15 = "……"
1300508-18 = "[ns] \"これ……ヘビーメタルとは違うジャンルの曲？\""
1300508-19 = "……なんでまたヘビーメタルだと思ったの？"
1300508-20 = "ゲヘナの生徒だからって、過激な音楽ばっかり聞くわけじゃない。"
1300508-21 = "音楽はジャンルを問わず、どれもそれぞれのストーリーを持ってる。"
1300508-22 = "きちんと意志が込められた音楽は、全部好きだよ。"
1300508-23 = "先生はどんな音楽が好き？"
1300508-24 = "[s] 好きな曲の名前を教えてあげる。"
1300508-25 = "うーーん……聞いたことない曲。"
1300508-26 = "でもきっと私も好きだと思う。"
1300508-27 = "だって、先生のおすすめだし。"
1300508-28 = "じゃあ、それを探してみようかな……。"
1300508-30 = "その後、カヨコと一緒に、音楽を楽しみながら休日を過ごした。"
