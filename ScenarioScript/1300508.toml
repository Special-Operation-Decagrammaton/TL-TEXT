[translation]
1300508-1 = "Loja de discos"
1300508-2 = "Rua comercial - Em frente à loja de discos"
1300508-3 = "Ora, Sensei. Que coincidência encontrar você por aqui."
1300508-4 = "Sim. Hoje estou de folga, então vim ouvir um pouco de música."
1300508-5 = "Lojas de discos são ótimas, dá para ouvir vários gêneros musicais de uma vez."
1300508-6 = "Sim... essa música também não é nada mal."
1300508-7 = "Quer ouvir um pouco também, Sensei?"
1300508-8 = "[s1] \"Sim.\"\n[s2] \"Uma música recomendada pela Kayoko...\""
1300508-9 = "Não seja tímido, pode ouvir."
1300508-10 = "Não seja tímido, pode ouvir."
1300508-14 = "Uma melodia suave de jazz ecoa pelo ambiente..."
1300508-15 = "……"
1300508-18 = "[ns] \"Isso... é um gênero diferente de heavy metal?\""
1300508-19 = "……Por que você pensou em heavy metal de novo?"
1300508-20 = "Só porque sou uma aluna de Gehenna, não significa que eu só ouça músicas radicais."
1300508-21 = "Independentemente do gênero, toda música carrega sua própria história."
1300508-22 = "Eu gosto de qualquer música que tenha uma intenção clara por trás."
1300508-23 = "Que tipo de música você gosta, Sensei?"
1300508-24 = "[s] Dizer o nome da música favorita."
1300508-25 = "Hmm... nunca ouvi essa música."
1300508-26 = "Mas tenho certeza de que vou gostar."
1300508-27 = "Afinal, é uma recomendação sua, Sensei."
1300508-28 = "Então, acho que vou procurar por ela..."
1300508-30 = "Depois disso, passei o resto do dia de folga curtindo música junto com a Kayoko."
