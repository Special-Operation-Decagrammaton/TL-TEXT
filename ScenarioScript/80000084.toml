[translation]
80000084-1 = "それはまるでラブコメのように"
80000084-2 = "（バレンタインデー当日、早い時間帯からミチルがシャーレに訪れた）"
80000084-4 = "先生殿、今日はバレンタインデーでしょ？"
80000084-5 = "[s] \"うん、そうだね。\""
80000084-6 = "これを上手く利用すれば、「少女忍法帖ミチルっち」のチャンネル登録者数を伸ばせると思うの。"
80000084-7 = "だから、もう当日になっちゃったし、急だけど……"
80000084-8 = "今からでもバレンタインデー用の動画を撮って、チャンネルにアップした方が良いかなって！"
80000084-9 = "イベント事に乗っからない手はないでしょ！？"
80000084-10 = "……というわけで、どうかな！先生殿！？"
80000084-11 = "[s] \"それは良いけど、あれって忍者系のチャンネルなんじゃ……？\""
80000084-12 = "だって、忍者もチョコレート好きだよ？"
80000084-13 = "[s] \"好き嫌いの問題なの！？\""
80000084-14 = "うにゃっ、とにかくそれでチャンネル登録者が増えるなら良いの！"
80000084-15 = "だから手伝ってー、先生殿～。"
80000084-16 = "バレンタインデーの動画をアップして、今度こそ「少女忍法帖ミチルっち」チャンネルの登録者数も増加！"
80000084-17 = "そのために、ね？お願い！"
80000084-18 = "[s] \"それじゃあ、一緒に頑張ろっか。\""
80000084-19 = "ほ、本当に！？"
80000084-20 = "さっすがは先生殿～！"
80000084-21 = "困っている生徒を見たら、助けずにはいられないその姿勢！"
80000084-22 = "やっぱり、私が見込んだ次期頭領は違うね！"
80000084-23 = "[s1] \"頭領は初耳だけど……ところで、何を手伝えば良い？\"\n[s2] \"動画の内容は決まってるの？\""
80000084-24 = "あ、そこは大丈夫！"
80000084-25 = "あ、そこは大丈夫！"
80000084-26 = "このミチル部長による、完璧な企画と台本があるから！"
80000084-27 = "[s] \"あれ、困ってた割に準備が良いね……？\""
80000084-28 = "……ん？"
80000084-29 = "うにゃっっ！"
80000084-30 = "そそっ、それは……！"
80000084-31 = "私くらいの忍者ともなれば、これくらい朝飯前だから！あと部長だから！"
80000084-32 = "と、とにかく今日の撮影は、私に任せて……！"
80000084-33 = "[s] \"うん、了解。\""
80000084-34 = "（よ、よし……これでまずは、先生殿を連れ出すのに成功したから……）"
80000084-35 = "（あとは隙を見て「コレ」を……！）"
80000084-36 = "それじゃ、レッツスタートー！"
80000084-38 = "（そうしてミチルの指示で、バレンタイン用の動画撮影が始まった）"
80000084-39 = "じゃあ最初は……とある路地の曲がり角で、2人がドーンってぶつかるシーンから！"
80000084-40 = "[s] \"いきなり何故……。\""
80000084-41 = "まあまあ、やってみれば分かるよ！"
80000084-42 = "とにかく今から私たちが撮るのは、バレンタインデーに因んだ動画！"
80000084-43 = "ふふっ……タイトルは「バレンタインデーにラブコメシチュを再現してみた！」かな！"
80000084-44 = "[s] \"……忍者要素は？\""
80000084-45 = "あっ、そ、それは……！"
80000084-46 = "うーん、それなら普通のラブコメじゃなくて……"
80000084-47 = "「忍者ラブコメ」ってことにすれば、まったく問題ないよね！"
80000084-48 = "[s] \"そ、それで良いなら……。\""
80000084-49 = "まずはやってみよう！私があっちの曲がり角から走ってくるから……"
80000084-50 = "私が大きな声で合図したら、先生殿はここから走り始めて？"
80000084-55 = "先生殿、良いよー！"
80000084-59 = "（ミチルの声を聞いて、気を付けながら走り出すと……）"
80000084-66 = "おりゃああっ！！"
80000084-71 = "（ぶつかる瞬間、気付かれないように「コレ」を先生殿のポケットに忍ばせて……！）"
80000084-72 = "……ん！？ちょ、ちょっと！？何でバナナの皮がっ……！？"
80000084-73 = "う、うわあぁぁぁっ！？"
80000084-77 = "[ns] \"ミ、ミチル！大丈夫！？\""
80000084-79 = "もー、誰ぇ！？こんなところにバナナの皮を捨てたのは！"
80000084-80 = "危ないじゃん！？これのせいで失敗しちゃったし！"
80000084-81 = "[s] \"まあ、そもそも見通しの悪い道で走るのは危ないから……。\""
80000084-82 = "正論！？"
80000084-83 = "うーん……でも確かに先生の言う通り危険だし、ネタが古すぎるかも……。"
80000084-84 = "じゃ、じゃあ次……まだまだあるから！"
80000084-85 = "次の「忍者ラブコメ」をやるよ！"
80000084-87 = "（その後もミチルと共に、色々な「ラブコメシチュエーション」……もとい「忍者ラブコメシチュエーション」に挑戦した）"
80000084-89 = "今度は幼馴染の「先生殿くん」が風邪でお休みしたシチュエーションね！"
80000084-90 = "……良し。"
80000084-91 = "先生殿くん！お粥、作ってきたよ～。#nあっ、そのまま横になってて！"
80000084-92 = "君には早く元気になってほしいから、私が食べさせてあげる……！"
80000084-93 = "[s] \"えっと……そのお粥、真っ黒だけど……。\""
80000084-95 = "[ns] \"あと、すごく焦げ臭いような……？\""
80000084-96 = "ぐっ、シチュエーションに固執するあまり、凄い状態に……！"
80000084-97 = "つ、次こそ大丈夫だから！"
80000084-99 = "あの、私……。#n先生殿先輩に、渡したい物があるんです！"
80000084-100 = "先生殿先輩が次の大会で優勝したら、その時は……。#nそこの桜の木の下に埋めておいた、あの日のタイムカプセルを一緒に……！"
80000084-101 = "[s] \"設定が複雑！！\""
80000084-102 = "た、確かにそうかも……！？"
80000084-103 = "と、とにかく次！"
80000084-105 = "次こそ……！"
80000084-106 = "（その後もミチルが考えたシチュエーションを、次々に再現していったものの……）"
80000084-107 = "（どれも邪魔が入ったり、事故が起きてしまい……）"
80000084-108 = "（満足いく映像が撮れないまま、いつの間にか日が暮れていた）"
80000084-110 = "むー……。"
80000084-111 = "[s] \"ミチル、大丈夫？\""
80000084-112 = "だ、大丈……"
80000084-113 = "……ばないかも……身体が限界に近い……。"
80000084-114 = "[s] \"それなら少し休憩しようか。喉は乾いてる？\""
80000084-115 = "う、うん……ありがとう、先生殿ぉ……。"
80000084-119 = "うっ……"
80000084-120 = "うわ～～～ん！上手く行かないよー！"
80000084-121 = "バレンタインデーのために用意した、とっておきの作戦――"
80000084-122 = "私の「自然にシュバッと作戦」が……！"
80000084-123 = "[s3] \"やっぱり、そのために来てくれたんだね。\"\n[s4] \"そんな気はしてたけど……。\""
80000084-124 = "……へ？"
80000084-125 = "……へ？"
80000084-126 = "せ、せ、先生殿ぉぉおおお！？ななな、なんで！？"
80000084-127 = "の、飲み物を買いに行ってくれたんじゃ！？"
80000084-128 = "[s] \"何を飲みたいか、聞き忘れてたなって思って……。\""
80000084-129 = "それで……どっ、どこから聞いて……！"
80000084-130 = "[s] \"うわ～～～ん！から……。\""
80000084-131 = "う、うぅっ……ほぼ最初からなんて……！"
80000084-132 = "もう、こうなったら……！"
80000084-133 = "そうだよ！今日、先生殿を呼んで動画を撮ろうって言ったのは……"
80000084-134 = "最初から、チョコレートを渡すため！"
80000084-135 = "いつも忍術研究部を助けてくれる先生に……"
80000084-136 = "か、か……感謝の気持ちを伝えたいにゃっ――"
80000084-137 = "[s] \"だ、大丈夫……？\""
80000084-138 = "ううぅ、大事なところで噛んだ……！"
80000084-139 = "[s] \"でもチョコレートなら、普通に渡してくれても……。\""
80000084-140 = "なっ！？なんて恐ろしい発言を！？"
80000084-141 = "バレンタインデーのチョコレートを、「普通」に渡すなんて……！"
80000084-142 = "そんな甘々なラブコメみたいなこと……わわ、私に出来るわけないでしょぉ！？"
80000084-143 = "そういうのは「陽の者」がやることだから！#n私みたいなのには無理だよ！"
80000084-144 = "[s] \"すごく偏った先入観が……。\""
80000084-145 = "うぅぅ……"
80000084-146 = "変な形で、全部バレちゃった……"
80000084-147 = "それに、先生殿に色々と迷惑を……"
80000084-148 = "[s] \"大丈夫だよ。むしろ楽しかったし。\""
80000084-149 = "そ、そう？なら良かったけど……"
80000084-150 = "……って！安心しかけたけど、それどういう意味の「楽しかった」かなぁ！？"
80000084-151 = "私の独り相撲が面白かったってことだったりしない！？"
80000084-152 = "うぅ……もう良い！吹っ切れた！"
80000084-153 = "はい、これ！あげる！"
80000084-158 = "日頃の感謝を込めて、特別にオーダーメイドしたから！#n受け取って！"
80000084-159 = "[s] \"ありがとね、ミチル。\""
80000084-160 = "うにゃあああ～っ！#n今日は本当に、私らしくない一日だった……"
80000084-161 = "こんなに遠回りして……結局、普通に渡すことになるなんて……"
80000084-162 = "……いや、むしろこれが私らしい、のかな……？"
80000084-163 = "[s] \"でも、よく考えてみると……\""
80000084-164 = "……？"
80000084-165 = "[s] \"2人で夕焼けを見ながらチョコを、って……\""
80000084-167 = "[ns] \"いかにも定番で「普通」の、バレンタインっぽくない？\""
80000084-168 = "……え？"
80000084-172 = "あ。あは、はは、ははっ……"
80000084-173 = "……うにゃあぁっ！@##$！@#$！！！"
80000084-177 = "[ns] \"あっ……行っちゃった。\""
80000084-179 = "（小さくなっていく背中を見つめながら、冷たい風に肩を縮めたが……）"
80000084-180 = "（ミチルがくれたチョコレートからは、ほのかな温もりを感じた）"
