[translation]
80000084-1 = "Como se fosse uma comédia romântica"
80000084-2 = "（No dia dos namorados, Michiru visita o Schale bem cedo）"
80000084-4 = "Sensei, hoje é Dia dos Namorados, né?"
80000084-5 = "[s] \"Sim, é verdade.\""
80000084-6 = "Se eu usar isso bem, acho que consigo aumentar o número de inscritos no canal \"Crônicas Ninja da Michiru-chi\"."
80000084-7 = "Por isso, como já chegou o dia, embora seja de última hora..."
80000084-8 = "Pensei que seria uma boa gravar um vídeo de Dia dos Namorados agora mesmo e postar no canal!"
80000084-9 = "Não dá para perder a chance de aproveitar um evento desses, né!?"
80000084-10 = "……Então, o que acha, Sensei!?"
80000084-11 = "[s] \"Tudo bem, mas aquele não é um canal de ninjas...?\""
80000084-12 = "Ora, ninjas também gostam de chocolate, sabia?"
80000084-13 = "[s] \"É uma questão de gosto pessoal!?\""
80000084-14 = "Nyaa, de qualquer forma, se isso aumentar os inscritos, está ótimo!"
80000084-15 = "Então me ajuda, Sensei~."
80000084-16 = "Postar um vídeo de Dia dos Namorados e, desta vez, aumentar o número de inscritos do canal \"Crônicas Ninja da Michiru-chi\"!"
80000084-17 = "Para isso, sabe? Por favor!"
80000084-18 = "[s] \"Então, vamos nos esforçar juntos.\""
80000084-19 = "Sé-sério mesmo!?"
80000084-20 = "Como esperado do Sensei~!"
80000084-21 = "Essa sua postura de não conseguir deixar de ajudar um aluno em apuros!"
80000084-22 = "Como eu esperava, o futuro líder que eu escolhi é diferente!"
80000084-23 = "[s1] \"É a primeira vez que ouço sobre ser um líder... mas enfim, no que devo ajudar?\"\n[s2] \"O conteúdo do vídeo já está decidido?\""
80000084-24 = "Ah, quanto a isso, não se preocupe!"
80000084-25 = "Ah, quanto a isso, não se preocupe!"
80000084-26 = "Porque eu, a Chefe Michiru, já tenho um planejamento e um roteiro perfeitos!"
80000084-27 = "[s] \"Ué, você estava em apuros, mas está bem preparada...?\""
80000084-28 = "……Hm?"
80000084-29 = "Nyaaa!"
80000084-30 = "Is-isso é……!"
80000084-31 = "Para uma ninja do meu nível, isso é moleza! Além disso, eu sou a Chefe!"
80000084-32 = "En-enfim, deixe a gravação de hoje comigo……!"
80000084-33 = "[s] \"Certo, entendido.\""
80000084-34 = "（Ó-ótimo... com isso, primeiro consegui tirar o Sensei de lá...）"
80000084-35 = "（Agora é só achar uma brecha para usar \"isso\"...!）"
80000084-36 = "Então, vamos começar!"
80000084-38 = "（Assim, sob as instruções de Michiru, a gravação do vídeo de Dia dos Namorados começou）"
80000084-39 = "Então, para começar... vamos fazer a cena em que nós dois trombamos em uma esquina!"
80000084-40 = "[s] \"Por que logo de cara...\""
80000084-41 = "Ora, ora, você vai entender quando a gente fizer!"
80000084-42 = "De qualquer forma, o que vamos gravar agora é um vídeo sobre o Dia dos Namorados!"
80000084-43 = "Fufu... o título vai ser \"Recriando cenas de comédia romântica no Dia dos Namorados!\""
80000084-44 = "[s] \"……E o elemento ninja?\""
80000084-45 = "Ah, is-isso……!"
80000084-46 = "Hum, nesse caso, em vez de uma comédia romântica comum..."
80000084-47 = "Se a gente chamar de \"Comédia Romântica Ninja\", não tem problema nenhum, né!"
80000084-48 = "[s] \"Se é assim que tem que ser...\""
80000084-49 = "Vamos tentar! Eu vou correr daquela esquina ali..."
80000084-50 = "Quando eu der o sinal em voz alta, o Sensei começa a correr daqui, tá?"
80000084-55 = "Sensei, pode ir!"
80000084-59 = "（Ao ouvir a voz de Michiru, comecei a correr com cuidado...）"
80000084-66 = "Toma essa!!"
80000084-71 = "（No momento da colisão, vou colocar 'isto' no bolso do Sensei sem que ele perceba...!）"
80000084-72 = "……Hã!? Espera, um segundo!? Por que tem uma casca de banana aqui...!?"
80000084-73 = "A-aaaahhh!?"
80000084-77 = "[ns] \"Mi-Michiru! Você está bem!?\""
80000084-79 = "Poxa, quem foi!? Quem jogou uma casca de banana aqui!?"
80000084-80 = "Isso é perigoso, sabia!? Por causa disso, tudo deu errado!"
80000084-81 = "[s] \"Bem, correr em um caminho com visibilidade ruim já é perigoso por si só...\""
80000084-82 = "Argumento lógico!?"
80000084-83 = "Hmm... mas é verdade, o Sensei tem razão, é perigoso e talvez esse clichê seja velho demais..."
80000084-84 = "B-bem, então o próximo... ainda temos muitos!"
80000084-85 = "Vamos fazer a próxima \"Comédia Romântica Ninja\"!"
80000084-87 = "（Depois disso, junto com Michiru, desafiamos várias \"situações de comédia romântica\"... ou melhor, \"situações de comédia romântica ninja\"）"
80000084-89 = "Desta vez é a situação em que o amigo de infância \"Sensei-dono-kun\" faltou por causa de um resfriado!"
80000084-90 = "……Certo."
80000084-91 = "Sensei-dono-kun! Fiz uma canja para você~. #nAh, pode ficar deitado aí mesmo!"
80000084-92 = "Eu quero que você melhore logo, então eu mesma vou te dar na boca...!"
80000084-93 = "[s] \"Err... essa canja está preta...\""
80000084-95 = "[ns] \"E tem um cheiro muito forte de queimado...?\""
80000084-96 = "Droga, de tanto focar na situação, acabei criando um desastre...!"
80000084-97 = "O-o próximo vai dar certo, eu prometo!"
80000084-99 = "Ei, eu... #nTenho algo para entregar ao Sensei-dono-senpai!"
80000084-100 = "Se o Sensei-dono-senpai vencer o próximo torneio, então... #nVamos abrir juntos aquela cápsula do tempo daquele dia, que enterrei debaixo daquela cerejeira...!"
80000084-101 = "[s] \"O roteiro é complicado demais!!\""
80000084-102 = "É-é verdade, talvez seja mesmo...!?"
80000084-103 = "D-de qualquer forma, o próximo!"
80000084-105 = "Desta vez vai dar certo...!"
80000084-106 = "（Depois disso, continuamos tentando recriar as situações que a Michiru pensou, uma após a outra...）"
80000084-107 = "（Mas em todas elas, algo nos atrapalhava ou acontecia algum acidente...）"
80000084-108 = "（Sem conseguir gravar um vídeo satisfatório, o dia acabou passando sem percebermos）"
80000084-110 = "Hmm..."
80000084-111 = "[s] \"Michiru, você está bem?\""
80000084-112 = "E-estou bem..."
80000084-113 = "……Talvez não... meu corpo está chegando no limite..."
80000084-114 = "[s] \"Nesse caso, vamos descansar um pouco. Está com sede?\""
80000084-115 = "S-sim... obrigada, Sensei-dono..."
80000084-119 = "Ugh..."
80000084-120 = "Waaaaaah! Nada está dando certo!"
80000084-121 = "O plano especial que preparei para o Dia dos Namorados—"
80000084-122 = "Meu \"Plano de Surgir Naturalmente\"..."
80000084-123 = "[s3] \"Eu sabia que você tinha vindo por causa disso.\"\n[s4] \"Eu já imaginava que fosse algo assim...\""
80000084-124 = "……Hã?"
80000084-125 = "……Hã?"
80000084-126 = "Se-se-Sensei-dono-ooooo!? Po-po-por que!?"
80000084-127 = "Você não tinha ido comprar uma bebida!?"
80000084-128 = "[s] \"Pensei que tinha esquecido de perguntar o que você queria beber...\""
80000084-129 = "Então... desde quando você estava ouvindo...!"
80000084-130 = "[s] \"Desde o 'Waaaaaah!'...\""
80000084-131 = "A-ah... desde quase o começo, então...!"
80000084-132 = "Já que chegou a esse ponto...!"
80000084-133 = "É isso mesmo! Chamar o Sensei hoje para gravar o vídeo foi..."
80000084-134 = "Desde o começo, só para te entregar o chocolate!"
80000084-135 = "Para o Sensei, que sempre ajuda o Clube de Pesquisa Ninjutsu..."
80000084-136 = "Eu queria... queria... expressar minha gratidão, nya—"
80000084-137 = "[s] \"V-você está bem...?\""
80000084-138 = "Uuuu, eu gaguejei na hora mais importante...!"
80000084-139 = "[s] \"Mas se era só o chocolate, você poderia ter entregado normalmente...\""
80000084-140 = "O quê!? Que tipo de declaração assustadora é essa!?"
80000084-141 = "Entregar um chocolate de Dia dos Namorados \"normalmente\"...!"
80000084-142 = "Algo tão meloso quanto uma comédia romântica... uwaa, não tem como eu fazer isso, né!?"
80000084-143 = "Esse tipo de coisa é para as \"pessoas populares\"!#nPara alguém como eu, é impossível!"
80000084-144 = "[s] \"Você tem um preconceito bem forte...\""
80000084-145 = "Uuuu..."
80000084-146 = "Acabou sendo revelado de um jeito tão estranho..."
80000084-147 = "E ainda por cima, causei vários problemas para o Sensei..."
80000084-148 = "[s] \"Está tudo bem. Na verdade, foi divertido.\""
80000084-149 = "S-sério? Então fico aliviada, mas..."
80000084-150 = "...espera! Eu ia ficar aliviada, mas o que você quer dizer com \"foi divertido\"!?"
80000084-151 = "Não vai me dizer que achou engraçado me ver lutando sozinha!?"
80000084-152 = "Uuu... chega! Já decidi!"
80000084-153 = "Toma, aqui! É seu!"
80000084-158 = "É um pedido especial que fiz para agradecer por tudo!#nAceite!"
80000084-159 = "[s] \"Obrigado, Michiru.\""
80000084-160 = "Unyaaaaaa~!#nHoje foi um dia que realmente não combinou comigo..."
80000084-161 = "Depois de dar tantas voltas... no fim, acabei entregando normalmente..."
80000084-162 = "...não, talvez isso seja o que mais combina comigo, afinal...?"
80000084-163 = "[s] \"Mas, pensando bem...\""
80000084-164 = "...?"
80000084-165 = "[s] \"Entregar chocolates enquanto vemos o pôr do sol a sós...\""
80000084-167 = "[ns] \"Não é um clichê bem \"normal\" de Dia dos Namorados?\""
80000084-168 = "...eh?"
80000084-172 = "Ah. Aha, hahaha, haha..."
80000084-173 = "...unyaaaaah! @##$! @#$!!!"
80000084-177 = "[ns] \"Ah... ela foi embora.\""
80000084-179 = "(Enquanto observava as costas dela se afastando, encolhi os ombros por causa do vento frio, mas...)"
80000084-180 = "(Pude sentir um calor suave vindo do chocolate que a Michiru me deu.)"
