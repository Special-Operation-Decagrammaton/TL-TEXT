[translation]
84312100601-6 = "えっ、ちょっ、うまぁっ！？なんでこんな上手なの！？ゲームとかできなさそうなのに！"
84312100601-7 = "お姉ちゃん、そういうこと本人の前で言っちゃダメだよ。いや、陰で言うのも良くないけど……。"
84312100601-9 = "シーフはDEXとINTが高くないといけません。上手くて当然なのです！"
84312100601-11 = "ぎこちないけど反射神経がすごい……練習してできるような動きじゃない。"
84312100601-12 = "それでも全敗しているのだが……褒められて妙な心地だ。"
84312100601-14 = "ユズ相手だしそれはしょうがないよ。"
84312100601-15 = "うん……褒められたのもすごいことですよ？"
84312100601-17 = "……そうなのか。"
