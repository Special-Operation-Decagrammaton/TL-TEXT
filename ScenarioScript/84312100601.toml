[translation]
84312100601-6 = "Ei, espera, que incrível!? Por que você é tão boa nisso!? Nem parece que você sabe jogar!"
84312100601-7 = "Irmã, você não deveria dizer essas coisas na frente dela. Bem, dizer pelas costas também não é legal..."
84312100601-9 = "Um ladrão precisa ter DEX e INT altas. É natural que eu seja boa nisso!"
84312100601-11 = "Os movimentos são desajeitados, mas os reflexos são incríveis... Não é algo que se consegue apenas com treino."
84312100601-12 = "Mesmo assim, perdi todas as partidas... É uma sensação estranha ser elogiada."
84312100601-14 = "Considerando que é contra a Yuzu, isso é inevitável."
84312100601-15 = "Sim... E ser elogiada já é um grande feito, sabia?"
84312100601-17 = "...É mesmo?"
