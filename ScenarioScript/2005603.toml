[translation]
2005603-1 = "まるで我が家"
2005603-2 = "（昼過ぎくらいにインターホンが鳴った）"
2005603-6 = "[ns1] \"開いてるから入っていいよ～\"\n[ns2] 開けるボタンを押す。"
2005603-10 = "呼ばれて飛び出てじゃじゃじゃーん！[ruby=くろさき]黒崎[/ruby]コユキ、参上しました！！"
2005603-11 = "今日は先生の優秀な右腕兼左腕として働きますから、なんでも任せてください！"
2005603-12 = "あ、でも……パスワード関係の仕事とかは勘弁してくださいね！#nにはははは！"
2005603-13 = "[s3] \"それはいいけど……どうしてその格好なの？\"\n[s4] \"なんでパジャマ？\""
2005603-16 = "えっ？#nあー……。"
2005603-17 = "……シャーレに服務規程ってありましたっけ？"
2005603-18 = "あ、特にない？そうですよね！#nにははは！びっくりしましたよ～！"
2005603-19 = "制服より楽なんで、これ。"
2005603-20 = "ほら、動きやすいほうが仕事もはかどるじゃないですか！"
2005603-21 = "セミナーでは先輩たちがうるさいから制服着てますけど――"
2005603-22 = "こっちの当番って、サポートとかヘルプ中心ですし？#n楽な服着ててもいいですよね？"
2005603-23 = "噂によると水着とかバニーガールの服で来てる生徒だっているって聞きましたよ？何か問題あるんです？"
2005603-24 = "[s5] \"ま、まあそれはそうだけど……。\"\n[s6] \"そう言われると、たしかに返す言葉がない……。\""
2005603-27 = "にはははは！！でしょでしょ？#nそういうことです！"
2005603-28 = "では、さっそく先生のお仕事手伝う前に――"
2005603-32 = "んっ、しょっ……！"
2005603-33 = "[ns7] \"……コユキさん？\"\n[ns8] \"まさか、レジャーシート敷いて寝る気？\""
2005603-36 = "……何か問題でも？"
2005603-37 = "え？お仕事の準備をしているんですよ？"
2005603-38 = "ここでゴロゴロしてるので、何かあったらすぐ言ってください！#n全部ちゃんとやりますので！"
2005603-42 = "……先生？"
2005603-43 = "なんでもない？#nにははは！つれないな～！"
2005603-44 = "んじゃ、ポジションも決まったし――"
2005603-45 = "……今日のお仕事、始めていきますよ～！！"
2005603-47 = "（そのあと、床でゴロゴロしてるコユキと一緒に、今日の業務に取りかかった）"
2005603-48 = "（コユキはパジャマ姿でゴロゴロしながら仕事をしていたけど……）"
2005603-52 = "（……本人の宣言通り、あっという間に全部終わらせてしまった）"
2005603-58 = "[ns9] \"これで最後だよ。\"\n[ns10] \"すごいね。想定よりずっとたくさんやってくれてる。\""
2005603-61 = "にははは！！だから言ったじゃないですか、なんでも任せてくださいって！#n言ったことはちゃんと守りますよ～！"
2005603-62 = "……ん？どうしたんですか？"
2005603-63 = "セミナーの業務状況？#nあー……。"
2005603-67 = "いや、そんな無茶言わないでくださいよ……。"
2005603-68 = "[s11] \"まあ、そんな気はしてたけど……。\"\n[s12] \"何が違うんだろう？\""
2005603-71 = "あー……セミナーのオフィスは窮屈なんですよ。"
2005603-72 = "床でゴロゴロできませんし、制服もかっちりしてるし……。"
2005603-73 = "仮眠も取れないし、ちょっと騒いだら怒られるし、お菓子もろくに食べられないし……。"
2005603-74 = "正直、そんな環境で作業効率なんか上がるわけないじゃないですか？#nえ、違う？"
2005603-75 = "まあ……先輩たちからは来客もあるし、ちゃんとした格好でって言われてるんですけどね。"
2005603-76 = "でも、「ちゃんとした格好」なんて、みんながしなければそれで解決だと思うんですけど……。"
2005603-77 = "……まあ、それを提案しても採用されたことないんですけど！にははははー！！！"
2005603-78 = "[s13] \"……なるほどね。\"\n[s14] \"コユキのこと、少し分かった気がする。\""
2005603-81 = "ええぇぇ！？何ですかそれ。#nいきなり変なこと言わないでくださいよ！"
2005603-82 = "……にはっ。"
2005603-83 = "まあでも、先生のお役に立てたのなら、嬉しいです！"
2005603-84 = "これで今日の業務は全部終わりです？#nんじゃ閉店しますか。ガラガラ～"
2005603-85 = "このまま特に頼みたいことがないなら私はこれでお暇しますね！"
2005603-86 = "先生の中でも有能な私のイメージ、ちょっとはついたでしょうし！"
2005603-87 = "[ns15] \"……あ、コユキ。ちょっと待って。\"\n[ns16] 帰ろうとするコユキを呼び止める。"
2005603-90 = "……どうしました？"
2005603-91 = "……はい？"
2005603-92 = "え、泊まっていいんです……？"
2005603-93 = "うーん、でもそれだと話が変わっちゃうし……迷惑かかっちゃいません？"
2005603-94 = "時間が遅いのはそうですけど……まあ、迷惑じゃないなら。"
2005603-95 = "[s17] \"頑張ったご褒美。セミナーには私から伝えておくし。\"\n[s18] \"ここ、ゲーム機とかあるから好きに使っていいよ。\""
2005603-98 = "え……。"
2005603-100 = "……！！！！！"
2005603-101 = "ゲーム……！！！"
2005603-102 = "にはははははは！！！もう～、仕方ないな～！#n本当は先生も一緒に遊びたかったんですよね？"
2005603-103 = "そこまで言われたら断れませんよ！#nちょうど今日はパジャマ着てるし、準備万端！"
2005603-104 = "さあ、行きましょう先生！#n休憩室のゲーム機もお菓子も、私たちを待っています！！"
2005603-105 = "[s19] \"急にテンション上がったね！\"\n[s20] \"全部用意してるの私なんだけどね。\""
2005603-108 = "にははははー！！細かいことは気にしない気にしない！"
2005603-109 = "いきますよ、先生！夜はまだまだ長いんですから！！"
2005603-110 = "It’s show time～!!!"
2005603-112 = "（その後、コユキと一緒に休憩室でゲームを遊んだりしながら夜を過ごした）"
2005603-113 = "（コユキは夜通し遊ぶ気満々だったみたいだけど……）"
2005603-117 = "（疲れていたのか、少し遊んだら眠ってしまった）"
