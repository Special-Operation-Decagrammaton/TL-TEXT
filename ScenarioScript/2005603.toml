[translation]
2005603-1 = "Como se estivesse em casa"
2005603-2 = "（A campainha tocou logo depois do meio-dia）"
2005603-6 = "[ns1] \"Está aberto, pode entrar!\"\n[ns2] Aperto o botão para abrir."
2005603-10 = "Chamou, apareceu, tcharam! Kurosaki Koyuki, apresentando-se!!"
2005603-11 = "Hoje vou trabalhar como o braço direito e esquerdo do Sensei, então pode deixar tudo comigo!"
2005603-12 = "Ah, mas... por favor, me poupe de trabalhos relacionados a senhas! Ni-hahaha!"
2005603-13 = "[s3] \"Tudo bem, mas... por que você está vestida assim?\"\n[s4] \"Por que está de pijama?\""
2005603-16 = "Hã? Ah..."
2005603-17 = "...O Schale tem algum código de vestimenta?"
2005603-18 = "Ah, não tem? Pois é! Ni-hahaha! Que susto!"
2005603-19 = "Isso aqui é mais confortável que o uniforme."
2005603-20 = "Veja bem, o trabalho rende muito mais quando estamos confortáveis, não é?"
2005603-21 = "No Seminar eu uso uniforme porque as veteranas são chatas, mas..."
2005603-22 = "O trabalho aqui é focado em suporte e ajuda, né? Então não tem problema usar uma roupa confortável, certo?"
2005603-23 = "Ouvi dizer que tem alunas que vêm até de biquíni ou roupa de coelhinha! Tem algum problema nisso?"
2005603-24 = "[s5] \"B-bem, é verdade, mas...\"\n[s6] \"Dito dessa forma, realmente não tenho como rebater...\""
2005603-27 = "Ni-hahaha!! Viu só? É exatamente isso!"
2005603-28 = "Então, antes de começar a ajudar com o trabalho do Sensei..."
2005603-32 = "Ngh, pronto...!"
2005603-33 = "[ns7] \"...Koyuki?\"\n[ns8] \"Você não vai estender um tapete de piquenique e dormir, vai?\""
2005603-36 = "...Algum problema?"
2005603-37 = "Hã? Estou me preparando para o trabalho, ué!"
2005603-38 = "Vou ficar rolando por aqui, então se precisar de algo, é só falar! Vou fazer tudo direitinho!"
2005603-42 = "...Sensei?"
2005603-43 = "Não é nada? Ni-hahaha! Que sem graça!"
2005603-44 = "Bom, já que defini minha posição..."
2005603-45 = "...Vamos começar o trabalho de hoje!!"
2005603-47 = "（Depois disso, comecei as tarefas do dia junto com a Koyuki, que estava rolando pelo chão）"
2005603-48 = "（A Koyuki trabalhou enquanto rolava pelo chão de pijama, mas...）"
2005603-52 = "（...Como ela mesma prometeu, terminou tudo num piscar de olhos）"
2005603-58 = "[ns9] \"Este é o último.\"\n[ns10] \"Incrível. Você fez muito mais do que eu esperava.\""
2005603-61 = "Ni-hahaha!! Eu não disse? Pode deixar tudo comigo! Eu sempre cumpro o que prometo!"
2005603-62 = "...Hm? O que foi?"
2005603-63 = "A situação do trabalho no Seminar? Ah..."
2005603-67 = "Não, não me peça algo tão impossível assim..."
2005603-68 = "[s11] \"Bem, eu já imaginava...\"\n[s12] \"O que será que é diferente?\""
2005603-71 = "Ah... o escritório do Seminar é muito sufocante."
2005603-72 = "Não dá para rolar no chão, o uniforme é todo apertado..."
2005603-73 = "Não dá para tirar um cochilo, se fizer um pouco de barulho levamos bronca, e nem dá para comer uns doces direito..."
2005603-74 = "Sinceramente, como a eficiência de trabalho subiria num ambiente desses? Hã, não sobe?"
2005603-75 = "Bem... as veteranas dizem que recebemos visitas, então temos que estar bem vestidas."
2005603-76 = "Mas eu acho que se ninguém se preocupasse com essa tal de \"roupa adequada\", o problema estaria resolvido..."
2005603-77 = "...Bom, nunca aceitaram essa minha sugestão! Ni-hahaha!!!"
2005603-78 = "[s13] \"...Entendi.\"\n[s14] \"Sinto que entendi um pouco melhor a Koyuki.\""
2005603-81 = "Eeeeh!? O que é isso? Não venha dizer coisas estranhas do nada!"
2005603-82 = "...Ni-ha."
2005603-83 = "Mas, de qualquer forma, fico feliz em ter sido útil para o Sensei!"
2005603-84 = "O trabalho de hoje acabou? Então vou fechar a loja. *Clack clack*"
2005603-85 = "Se não tiver mais nada para eu fazer, vou indo nessa!"
2005603-86 = "Pelo menos agora você já tem uma imagem de que eu sou uma funcionária competente, né!"
2005603-87 = "[ns15] \"……Ah, Koyuki. Espere um pouco.\"\n[ns16] Chamo Koyuki, que estava prestes a ir embora."
2005603-90 = "……O que foi?"
2005603-91 = "……Sim?"
2005603-92 = "Sério, eu posso ficar……?"
2005603-93 = "Hmm, mas se for assim, as coisas mudam de figura…… não vai ser um incômodo?"
2005603-94 = "É verdade que está tarde, mas…… bem, se não for um incômodo."
2005603-95 = "[s17] \"É uma recompensa pelo seu esforço. Eu mesma aviso o Seminar.\"\n[s18] \"Tem consoles de videogame aqui, então pode usar à vontade.\""
2005603-98 = "Ah……."
2005603-100 = "……！！！！！"
2005603-101 = "Videogame……！！！"
2005603-102 = "Ni-hahahaha!!! Ah, não tem jeito, né!#nNa verdade, você também queria jogar comigo, não queria, Sensei?"
2005603-103 = "Se você insiste tanto, não posso recusar!#nEu já estou de pijama mesmo, estou pronta para tudo!"
2005603-104 = "Vamos lá, Sensei!#nOs consoles e os doces da sala de descanso estão nos esperando!!"
2005603-105 = "[s19] \"Você ficou animada de repente!\"\n[s20] \"Mas fui eu quem preparei tudo, sabia?\""
2005603-108 = "Ni-hahaha!! Não se preocupe com detalhes, não se preocupe!"
2005603-109 = "Vamos lá, Sensei! A noite ainda é uma criança!!"
2005603-110 = "It’s show time～!!!"
2005603-112 = "（Depois disso, passei a noite na sala de descanso jogando videogame com a Koyuki）"
2005603-113 = "（Parecia que a Koyuki estava disposta a virar a noite jogando, mas……）"
2005603-117 = "（Talvez por estar cansada, ela adormeceu depois de jogar um pouco）"
