[translation]
1005106-1 = "Hino de incentivo apaixonado"
1005106-6 = "Millennium Science School - Karaokê da vizinhança"
1005106-8 = "[ns1] \"……O que houve?\"\n[ns2] \"……Por que um karaokê?\""
1005106-11 = "Você mesmo disse, Sensei. #nQue deveríamos encontrar uma forma de animar os veteranos."
1005106-12 = "Falando em incentivo, nada melhor que um hino. Você entende, não é, Sensei?"
1005106-13 = "Em suma, é por isso que estamos no karaokê!"
1005106-17 = "[ns3] \"……Q-qual é a conexão?\"\n[ns4] \"……Estou ficando para trás.\""
1005106-18 = "Ora, ouvir músicas divertidas ajuda a levantar o ânimo, não ajuda?"
1005106-19 = "Ora, ouvir músicas divertidas ajuda a levantar o ânimo, não ajuda?"
1005106-20 = "Mesmo usando todas as minhas habilidades técnicas, não consigo resolver perfeitamente os problemas dos meus veteranos……."
1005106-21 = "Então, pensei que talvez cantar músicas divertidas pudesse, pelo menos, aliviar o peso em seus corações."
1005106-22 = "……Isso mesmo, com uma música original que incorpora as atividades do Clube de Engenharia na letra!"
1005106-23 = "[s] \"Uma música original?\""
1005106-24 = "Fufu, na verdade, eu queria compor um tema para o Clube de Engenharia há algum tempo."
1005106-25 = "É uma ótima oportunidade para incentivar o pessoal e criar a música do clube ao mesmo tempo."
1005106-26 = "[s] \"Utaha vai compor...?\""
1005106-27 = "É algo tão surpreendente assim?"
1005106-28 = "Lidar com sons, lidar com máquinas. #nAmbas as coisas compartilham a mesma essência."
1005106-29 = "Assim como um engenheiro cria um projeto e combina peças, um músico sobrepõe sons para dar forma a uma partitura."
1005106-30 = "Além disso, as palavras Maestro e Meister compartilham a mesma origem etimológica."
1005106-31 = "Fufu…… se eu não tivesse entrado em Millennium, mas sim na Academia de Artes Wildhunt, talvez eu tivesse seguido o caminho de uma maestrina."
1005106-32 = "[s] \"…….\""
1005106-33 = "……O que houve? Alguma lembrança ruim?"
1005106-34 = "De qualquer forma, coloquei uma melodia na letra que veio à minha mente. #nDeixe-me cantar para você."
1005106-40 = "Muito bem então…… *cof*, 'A Alma Ardente do Meister'."
1005106-49 = "― Colocando a alma ardente do Meister"
1005106-52 = "― Vamos modificar as coisas de todos vocês"
1005106-56 = "― Mesmo que não queiram, vamos modificar"
1005106-59 = "[ns] \"…….\""
1005106-61 = "― Onde precisa de movimento, óleo lubrificante"
1005106-64 = "― Onde precisa de fixação, fita adesiva"
1005106-68 = "― Qualquer um pode consertar facilmente, mas"
1005106-71 = "― Se busca um desempenho garantido, é só pedir"
1005106-74 = "[ns] \"……Espere um pouco, Utaha.\""
1005106-79 = "Ora, algo estava errado?"
1005106-80 = "A parte emocionante começa agora."
1005106-81 = "[s5] \"……A melodia e o ritmo não estão batendo.\"\n[s6] \"A letra está…….\""
1005106-82 = "Eh? O ritmo não estava batendo?"
1005106-83 = "Não…… talvez eu tenha colocado paixão demais na letra. #nParece que ela acabou queimando mais do que a melodia."
1005106-84 = "Hum? O conteúdo da letra foi difícil de entender?"
1005106-85 = "Não…… talvez eu tenha colocado paixão demais na melodia. Quem diria que ela superaria a letra."
1005106-86 = "Ainda está em fase de ajuste. Acho que vai melhorar em breve……."
1005106-87 = "De qualquer forma, ouça até o refrão. Tenho certeza de que o charme desta música vai chegar até você, Sensei!"
1005106-88 = "……Então, vou continuar."
1005106-93 = "― Borbulhando <Tabasco!> Espalhando <Parmesão!>"
1005106-96 = "― Se tiver paixão, podemos modificar qualquer coisa"
1005106-100 = "[ns] \"Por que Tabasco...?\""
1005106-102 = "(Depois disso, a música estranha da Utaha continuou por mais de uma hora……)"
1005106-103 = "(……Dias depois, descobriu-se que o motivo dos membros estarem desanimados era porque a Utaha ficava cantarolando aquela música estranha na sala de trabalho……)"
