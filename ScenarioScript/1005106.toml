[translation]
1005106-1 = "情熱の応援歌"
1005106-6 = "ミレニアムサイエンススクール・近所のカラオケ店"
1005106-8 = "[ns1] \"……どうしたの？\"\n[ns2] \"……なんでカラオケ？\""
1005106-11 = "先生が言っていたじゃないか。#n後輩たちが元気を取り戻せる方法を探そうって話だよ。"
1005106-12 = "応援と言えば応援歌。先生も分かるだろう？"
1005106-13 = "つまりはカラオケというわけだ！"
1005106-17 = "[ns3] \"……ど、どういう繋がり？\"\n[ns4] \"……置いてけぼりになってる。\""
1005106-18 = "ほら、楽しい歌を聞けば元気が出るだろう？"
1005106-19 = "ほら、楽しい歌を聞けば元気が出るだろう？"
1005106-20 = "私の持ち得る技術を駆使しても、後輩たちの悩みを完璧に解消はできない……。"
1005106-21 = "せめて気が晴れるようにと思って、楽しい歌を聴かせるのはどうかなと。"
1005106-22 = "……そう、エンジニア部の活動を歌詞に盛り込んだオリジナル曲でね！"
1005106-23 = "[s] \"オリジナル曲？\""
1005106-24 = "ふふ、実は前からエンジニア部のテーマ曲を作ってみたかったんだ。"
1005106-25 = "応援もできて、エンジニア部の曲も作れる良い機会だろう。"
1005106-26 = "[s] \"ウタハが作曲を……？\""
1005106-27 = "そんなに驚く事かい？"
1005106-28 = "音を扱うこと、機械を扱うこと。#nどちらも本質的な部分は一緒さ。"
1005106-29 = "エンジニアが設計書を作成して部品を組み合わせるように、音楽家は音を重ねて楽譜を形にするんだ。"
1005106-30 = "しかも、指揮者を意味する「マエストロ」と「マイスター」は語源が一緒なんだ。"
1005106-31 = "ふふ……もし私がミレニアムではなく、ワイルドハント芸術学院に入学していたら、マエストロの道を歩んでいたかもしれないね。"
1005106-32 = "[s] \"……。\""
1005106-33 = "……どうしたんだい？何か悪い記憶でも？"
1005106-34 = "とにかく、頭に浮かんだ歌詞にメロディーを乗せてみたんだ。#n聞いてもらおうじゃないか。"
1005106-40 = "それじゃあ……コホン、『燃えるマイスターの魂』。"
1005106-49 = "― マイスターの　熱い　魂を　込め"
1005106-52 = "― 皆様の　物を　改造して　差し上げます"
1005106-56 = "― 望まなくても　改造して　差し上げます"
1005106-59 = "[ns] \"………。\""
1005106-61 = "― 動いて　もらいたい　所は　グリースオイル"
1005106-64 = "― 固定して　欲しい　所はぁ　ダクトテープ"
1005106-68 = "― 誰だって　簡単に　直せる　けど"
1005106-71 = "― 確実な　性能を　求めるなら　お申しつけください"
1005106-74 = "[ns] \"……ちょっと待って、ウタハ。\""
1005106-79 = "おや、どこかおかしかったかな？"
1005106-80 = "ここからが盛り上がるところなんだ。"
1005106-81 = "[s5] \"……メロディーとリズムが合ってない。\"\n[s6] \"歌詞が……。\""
1005106-82 = "え？リズムが合ってなかった？"
1005106-83 = "いや……歌詞に情熱を込めすぎたか。#nメロディー以上の燃え上がりを見せてしまったようだね。"
1005106-84 = "うん？歌詞の内容が難しかったかな？"
1005106-85 = "いや……メロディーに情熱を込めすぎたかな。まさか歌詞を圧倒するなんて。"
1005106-86 = "まだ調整段階なんだ。もう少しで良くなると思うんだけど……。"
1005106-87 = "とりあえずサビまで聞いてくれ。きっと先生にもこの歌の魅力が伝わるはずさ！"
1005106-88 = "……それでは、続けるよ。"
1005106-93 = "― 湧き上がるぅ　＜チャバスコ！＞　飛び散る　＜パルメザン！＞"
1005106-96 = "― 情熱さえ　あれば　なんだって　改造できるさ"
1005106-100 = "[ns] \"なんでチャバスコ……？\""
1005106-102 = "（その後、ウタハの変な歌は1時間以上続いた……）"
1005106-103 = "（……後日、部員の元気がなかった理由は、ウタハが作業室でずっと変な歌を口ずさんでいたせいだと分かった……）"
