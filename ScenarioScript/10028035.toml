[translation]
10028035-5 = "Uau――!!"
10028035-6 = "Isso foi surpreendente!"
10028035-7 = "Eu já tinha visto o poder do Sensei antes, então sabia até certo ponto, mas..."
10028035-12 = "A senhorita também é muito competente! Peço perdão pelo meu erro!!"
10028035-13 = "Sinto muito por ter te chamado de \"fofinha\"! Você não é qualquer uma, isso é certo..."
10028035-14 = "……É, bem."
10028035-15 = "Você vai continuar me chamando assim, né……"
10028035-16 = "Não adianta nada ficar se preocupando com detalhes assim o tempo todo!"
10028035-20 = "De qualquer forma. Como vocês duas se esforçaram tanto até aqui, preciso retribuir de alguma forma!"
10028035-23 = "O vagão em que vocês estão agora — não, o vagão em que nós estamos, é o penúltimo da fila."
10028035-24 = "O \"vagão de carga\" provavelmente deve estar na locomotiva, onde fica a cabine de comando."
10028035-25 = "……Enquanto eu estava presa, acabei ouvindo algumas coisas. Pode deixar esses cálculos comigo."
10028035-26 = "Seja para parar o trem ou para encontrar a bolsa……"
10028035-27 = "Primeiro, vamos todos para o primeiro vagão!"
10028035-28 = "No plano original, se eu falhasse em desengatar o vagão de escolta, eu partiria para o \"Plano B\"... detonar uma bomba em um certo ponto para fazer o trem tombar."
10028035-29 = "E então, aproveitar a confusão para me reunir com os membros do clube…… e fugir como planejado."
10028035-30 = "[s] \"Entendi, fazer o trem tombar……\""
10028035-34 = "[ns1] \"……Espera, o quê!?\"\n[ns2] \"De um jeito tão perigoso assim!?\""
10028035-37 = "Hahaha! Não precisa me olhar com essa cara!"
10028035-38 = "Não se preocupe, enquanto eu estiver aqui, nada disso vai acontecer! Enquanto eu estiver aqui!"
10028035-39 = "Agora estamos no mesmo barco, não é? Mesmo eu não trairia vocês tão facilmente."
10028035-40 = "Vocês estão procurando por algo, não estão? Algo importante que não pode ser destruído."
10028035-41 = "Bom, seria um problema se o trem tombasse, não seria? E com o Sensei aqui, seria ainda pior."
10028035-42 = "Vai dar um pouco de trabalho, mas já que chegamos a esse ponto, só nos resta recuperar por conta própria, certo?"
10028035-43 = "Para alguém que está sendo perseguida como eu……"
10028035-44 = "\"Promessas\" e \"confiança\" são fundamentais."
10028035-45 = "É por isso que consegui chegar até aqui…… Fufu."
10028035-46 = "Bem, mas de certa forma, estou aliviada."
10028035-53 = "Essa senhorita, para ser da Trinity, parece ser bem capaz!"
10028035-58 = "[ns3] \"I-Ichika! Isso foi um elogio do jeito da Kasumi……!\"\n[ns4] \"B-bem, primeiro vamos procurar a bolsa!\""
10028035-61 = "……Ah, ahahahaha."
10028035-62 = "……Hm? Você está com uma cara estranha. Parece que eu disse algo inconveniente de novo."
10028035-63 = "Bem, como você está de olhos fechados o tempo todo, nem dá para saber se sua expressão está realmente ruim!"
10028035-64 = "Se eu te ofendi, peço desculpas! Foi mal! Hahahaha!"
10028035-65 = "…………."
10028035-66 = "……………………."
10028035-67 = "Opa? Está sem energia, é?"
10028035-68 = "Vocês não estão procurando algo? Não podem ficar assim, precisam se animar!"
10028035-69 = "……Haha."
10028035-70 = "É, pois é…… primeiro precisamos encontrar a bolsa, então……"
10028035-71 = "……Hahaha."
10028035-72 = "[s5] \"…………。\"\n[s6] \"Ah, depois vamos comer algo gostoso…… tá bom?\""
10028035-75 = "Bom, o tempo é curto! Vamos partir!!"
10028035-76 = "O destino mudou, então deve ter muitos passageiros irritados. Todos eles devem nos ajudar também!"
10028035-77 = "Muito bem, vamos lá. Não faz sentido começar algo se não for para ir até o fim!"
10028035-78 = "Avante――"
10028035-79 = "Rumo ao primeiro vagão!!"
