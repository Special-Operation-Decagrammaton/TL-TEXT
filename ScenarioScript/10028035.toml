[translation]
10028035-5 = "ひゅ――！！"
10028035-6 = "これは驚いたな！"
10028035-7 = "先生の力は前に見た事があるから、ある程度知っていたが……"
10028035-12 = "お嬢ちゃんも優秀なんだな！#nこれは失礼した！！"
10028035-13 = "「可愛らしい」だなんて言ってすまなかった！#nただ者ではないな、これは……"
10028035-14 = "……えーっと。"
10028035-15 = "その呼び方は続けるんすね……"
10028035-16 = "そんな細かいことをいちいち気にしていては始まらないぞ！"
10028035-20 = "ともかく。ここまで頑張ってくれた2人には、何かお礼をしなくてはならないな！"
10028035-23 = "今、2人が乗っている車両――違うな、[ruby=・   ・]我々[/ruby]が乗っているこの車両は、最後尾一つ前の車両だ。"
10028035-24 = "「貨物用車両」は、おそらく操縦席のある先頭車両の方だろう。"
10028035-25 = "……捕らわれている間、なんとなく聞いていたのさ。#nこういう計算は任せてくれ。"
10028035-26 = "列車を止めるにせよ、カバンを探すにせよ……"
10028035-27 = "まずはみんなで先頭車両に行くぞ！"
10028035-28 = "当初の予定では、私が護送車両を切り離すことに失敗した時点で「プランB」に突入……とある地点で爆弾を起爆し列車を横転させる。"
10028035-29 = "そして騒ぎに乗じて部員たちと合流し……#nそのまま逃げる計画だったんだが。"
10028035-30 = "[s] \"なるほど、列車を横転……\""
10028035-34 = "[ns1] \"……って、待って！？\"\n[ns2] \"そんな危ない方法で！？\""
10028035-37 = "ハーハッハッハッハ！そんな顔で見ないでもらいたいな！"
10028035-38 = "心配するな、私がいる限りそんなことは起きない！私がいる限りはな！"
10028035-39 = "これで我々は一蓮托生だろう？#nいくら私だって、簡単に裏切りはしない。"
10028035-40 = "2人はブツを探しているんだろう？#n壊してはいけない大切な何かを。"
10028035-41 = "そりゃあ、列車が横転したら困るよなぁ～？#n先生もいるわけだし、なおさらマズいだろう。"
10028035-42 = "ちょ～っとばかし手間はかかるが、こうなったら自力で取り戻すしかないよな？"
10028035-43 = "私のような追われている身には……"
10028035-44 = "「約束」と「信用」が大事なんだよ。"
10028035-45 = "だからこそ、ここまでやってこれているのさ……フフッ。"
10028035-46 = "ま、でもホッとしている部分はある。"
10028035-53 = "このお嬢ちゃん、トリニティにしちゃあできる方みたいだからな！"
10028035-58 = "[ns3] \"い、イチカ！これはカスミなりの褒め言葉で……！\"\n[ns4] \"ま、まずはカバンを探そっか！\""
10028035-61 = "……あは、はははは。"
10028035-62 = "……ん？なんだか顔色が悪いぞ？#nまたなんかマズいことでも言ってしまったようだな。"
10028035-63 = "まあ、ずっと目を閉じているもんだから、本当に顔色が悪いのかは分からないな！"
10028035-64 = "気を悪くしたなら謝ろう！すまなかったな！ハーハッハッハッ！"
10028035-65 = "…………。"
10028035-66 = "……………………。"
10028035-67 = "お～？元気がないな！"
10028035-68 = "探しものをするんだろう？もっと元気を出さないとダメじゃあないか！"
10028035-69 = "……はは。"
10028035-70 = "そう、っすね……まずはカバンを探さなきゃいけないんで……"
10028035-71 = "……ははは。"
10028035-72 = "[s5] \"…………。\"\n[s6] \"あ、後で美味しいごはんでも食べに行こう……ね？\""
10028035-75 = "さ、時間は限られているからな！出発するぞ～！！"
10028035-76 = "行き先が変更になって、ご立腹の乗客も多いはずだ。#nみんなも力になってくれるはずさ！"
10028035-77 = "よーし、行くぞ。何事も果てまでいかなくては意味がない！"
10028035-78 = "いざ――"
10028035-79 = "先頭車両へ往かん！！"
