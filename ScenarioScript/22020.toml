[translation]
22020-1 = "Episódio 2; O Cotidiano Pacato do Clube de Desenvolvimento de Jogos"
22020-3 = "(Num raro dia em que eu não tinha tarefas na Schale e estava com o meu tempo livre)"
22020-4 = "(Recebi uma mensagem do Departamento de Desenvolvimento de Jogos pedindo para eu fazer companhia nas atividades do clube)"
22020-5 = "(Embora tenham dito 'atividades do clube', não me disseram exatamente o que iríamos fazer...)"
22020-9 = "Millennium - Depto. de Desenvolvimento de Jogos"
22020-15 = "Toma essaaa! Prepare-se, Sensei!"
22020-16 = "Agora vou usar meu ataque especial secreto...!"
22020-17 = "Vou te mostrar o Momoi Splash!!"
22020-18 = "(Quando dei por mim, eu estava jogando jogo de luta com a Momoi na sala do clube)"
22020-19 = "[s] \"Ataque especial secreto...!!\""
22020-28 = "Fufufu! Não existem pontos cegos no meu combo! Ele não vai parar! Até o HP do Sensei! Chegar a zero!"
22020-29 = "Hyaaaah!"
22020-43 = "(Baque! Thud!)"
22020-47 = "[Player MOMORIA LOSE!]"
22020-51 = "[WINNER! Player [USERNAME]!]"
22020-57 = "Uwaaah! Por que o meu combo não tá acertando!?"
22020-58 = "[s1] \"É que, quando você fica nervosa, você só começa a esmagar os botões do controle...\"\n[s2] \"Um combo fraco desses não vai funcionar comigo, Momoi!\""
22020-61 = "Não acredito!? Você já decorou os meus padrões de ataque!?"
22020-62 = "Aliás, mana... Você tinha dito que o Sensei era um iniciante que só tinha começado a jogar hoje."
22020-63 = "Uwaah, Midori!!? Não jogue essa dura realidade na minha cara!"
22020-64 = "Essa rodada foi inválida! Totalmente inválida!"
22020-65 = "Mais uma vez! Vamos mais uma vez, Sensei! Dessa vez vou usar o meu verdadeiro combo secreto..."
22020-66 = "[s] \"Essa é a 8ª vez que você diz isso...\""
22020-67 = "Eh!? Já foram tantas vezes assim!?"
22020-68 = "Isso mesmo, mana. Vamos parar por aqui, não acha? O Sensei já deve estar cansado."
22020-69 = "M-Mas terminar as coisas perdendo desse jeito... O meu orgulho de gamer não permi..."
22020-70 = "Lá vem você de novo com isso..."
22020-71 = "Então quer dizer que você não se importa se o Sensei for embora perdendo?"
22020-72 = "Unyaaah!? I-Isso seria... a, algo ruim...?"
22020-73 = "[s] \"Eu não me importo com isso, tá tudo bem.\""
22020-74 = "Haa. Sensei, o senhor não deve mimar tanto a minha irmã assim, sabia?"
22020-75 = "Na verdade, ficar só jogando desse jeito... Mana..."
22020-76 = "Você se lembra qual era o objetivo da atividade de hoje do clube?"
22020-78 = "Ah, é mesmo...!"
22020-79 = "......'É mesmo'?"
22020-80 = "N-Não! Não é isso, Midori! Eu me lembro perfeitamente! Beleza!"
22020-81 = "[s] \"Falando nisso, eu ainda não sei o que viemos fazer hoje.\""
22020-82 = "Eh, mana... Você não tinha explicado nada pro Sensei...?"
22020-83 = "Ma~na~?"
22020-84 = "A-Agora! Eu ia falar agora!"
22020-85 = "Hoje, nós íamos..."
22020-89 = "Fazer um brainstorming para o nosso próximo jogo!"
22020-90 = "[s] \"Próximo jogo...?\""
22020-91 = "Sim. Nós estávamos conversando que já era hora de começarmos a preparar o nosso próximo projeto."
22020-92 = "Exato! E eu soube que o Sensei, que é sempre tão ocupado e difícil de encontrar, estava livre hoje. Achei que era a oportunidade perfeita e chamei você!"
22020-93 = "[s3] \"......Me desculpem por não vir visitar tanto vocês.\"\n[s4] \"De fato, eu estava com a agenda vazia hoje.\""
22020-96 = "Tudo bem, a gente sabe que o Sensei é muito ocupado... Muito obrigada por ter vindo!"
22020-97 = "Enfim! Já que o Sensei veio aqui, nós pensamos que poderíamos ouvir a sua opinião para o nosso próximo jogo~."
22020-98 = "Além disso, pensei que você poderia dar várias ideias incríveis pra gente~..."
22020-99 = "E por isso pedimos para o senhor vir aqui para a nossa sala!"
22020-100 = "[s] \"A-Ah, entendi... Sinto que as expectativas de vocês estão meio altas demais...\""
22020-102 = "[ns] \"Mas então, por que vocês ficaram só jogando jogo de luta esse tempo todo...?\""
22020-103 = "Ah, essa foi uma ideia da minha irmã."
22020-104 = "Sim, nós íamos analisar os jogos!"
22020-105 = "Não vai sair nenhuma ideia boa se a gente só ficar quebrando a cabeça do zero sem ter nenhuma inspiração, não concorda?"
22020-106 = "Por isso que nós decidimos jogar várias obras famosas para tentar ter algumas ideias através delas. Foi isso que nós combinamos de fazer."
22020-107 = "[s] \"Entendo, isso faz sentido.\""
22020-108 = "Fufufu! Não é? Especialmente esse jogo que eu estava jogando com você agora há pouco."
22020-109 = "'O Punho de Cassiopeia ~A Grande Lenda do Axolote~' é um jogo super popular que é considerado a ovelha negra dos jogos de luta, em vários sentidos!"
22020-110 = "Como é um jogo que serve como uma ótima referência para muitas coisas, se nós analisarmos ele com certeza..."
22020-111 = "Vamos ter várias ideias maravilhosas que serão úteis para o nosso próximo projeto! Com certeza!"
22020-112 = "O nosso próximo projeto vai ser um 'RPG de Exploração de Masmorras Estilo Vida Lenta Relaxante'."
22020-113 = "[s] \"Mesmo assim vocês querem colocar elementos de jogos de luta nele!?\""
22020-114 = "O que você tá dizendo, Sensei!"
22020-115 = "Do ponto de vista das pessoas normais, um RPG de Exploração de Masmorras e um Jogo de Luta podem não parecer ter nada em comum, mas..."
22020-116 = "[s] \"Podem não parecer ter nada em comum, mas...?\""
22020-117 = "Fufufu! É errado julgar as coisas só pelas aparências!"
22020-118 = "Se nós quisermos mirar no próximo Millennium Prize, é essencial tentar algo novo que ninguém consiga prever!"
22020-119 = "Exatamente! Ou seja, apenas ao nos livrarmos das ideias preconcebidas e superarmos todos os preconceitos, é que poderemos chegar além do novo horizonte...!"
22020-120 = "Combinando elementos de gêneros que parecem não ter absolutamente nenhuma relação, podemos acabar criando um jogo surpreendentemente divertido."
22020-121 = "Ah! Midori! Não rouba a minha fala!"
22020-122 = "A culpa é sua por ficar enrolando pra falar, mana."
22020-123 = "Uwaaah~ Isso é maldade~!"
22020-124 = "[s] \"Parece que vocês estão se esforçando bastante para criar esse novo jogo.\""
22020-125 = "Hm?"
22020-126 = "Ah..."
22020-127 = "Fufufu!"
22020-128 = "Mas é claroo que sim!"
22020-129 = "Sim. Não só eu e a minha irmã, mas a Yuzu-chan e a Aris-chan também. Todas nós, juntas..."
22020-130 = "Porque nós prometemos que desta vez, ganharemos o Millennium Prize com certeza."
22020-131 = "Isso mesmo. Essa é a 'Missão' que nos foi dada agora!"
22020-137 = "Momoi! Midori! Sensei! Emergência!"
22020-138 = "[s] \"Boa tarde, Aris. O que aconteceu?\""
22020-139 = "Ué, qual é o problema, Aris?"
22020-140 = "Finalmente, a Yuzu ultrapassou as 10 vitórias seguidas no online!"
22020-141 = "Eh? É sério!?"
22020-142 = "Nesse jogo horrível com o balanceamento quebrado, ela conseguiu 10 vitórias seguidas!?"
22020-160 = "[WINNER! Player UZQueen!]"
22020-165 = "Fuaah..."
22020-166 = "Você foi muito legal, Yuzu!"
22020-167 = "A Yuzu-chan é incrível."
22020-169 = "Aris ficou emocionada! Como esperado da lendária Heroína 'UZQueen'!"
22020-170 = "Ah, e-ehm...?"
22020-171 = "[s] \"Parabéns, Yuzu! Foi uma vitória impecável!\""
22020-172 = "Não é! Esse é o estilo de batalha perfeito da Yuzu, o 'Modo UZQueen'!"
22020-173 = "[s] \"'Modo UZQueen'...?\""
22020-174 = "Vou explicar! O 'Modo UZQueen' é! O buff da Yuzu que ativa sob condições específicas!"
22020-175 = "Ela fica um pouco mais audaciosa que o normal, e a velocidade de raciocínio dela aumenta em 1.5 vezes! A visão dinâmica também aumenta em 2.8 vezes!"
22020-176 = "Quando foi que você inventou esse lore todo?"
22020-177 = "A Aris também sabe! A Yuzu fica muito forte quando está assim! A Aris também quer um 'Modo UZQueen'!"
22020-178 = "[s] \"Esse tal 'Modo UZQueen' parece ser muito incrível...!\""
22020-179 = "A-Até você, Sensei!?"
22020-180 = "E-Ehm... Auuh...!"
22020-181 = "E-Eu só joguei normalmente, como eu sempre jogo..."
22020-182 = "Ver a Yuzu mandando tão bem deixou a Aris animada também!"
22020-183 = "Agora é a vez da Aris!"
22020-185 = "(E assim, sob os olhares atentos de todos, o desafio da Aris nos jogos de luta começou)"
22020-187 = "Assim como a Momoi, a Midori, a Yuzu―― e o Sensei, a Aris também se tornará uma heroína nos jogos de luta!"
22020-188 = "Eu acho que a mana se parece mais com o personagem que é derrotado pelos heróis."
22020-189 = "Irmãzinha! Às vezes a verdade machuca, sabia!?"
22020-190 = "A-Aris-chan... b-boa sorte!"
22020-191 = "Sim! A Aris vai dar o seu melhor!"
22020-192 = "(Challengers Next Battle!!)"
22020-194 = "[ns] \"Ah, parece que apareceu um oponente.\""
22020-196 = "Vou mostrar as habilidades que eu treinei jogando contra a Momoi!"
22020-197 = "Hyaaah!"
22020-201 = "Eii! Yaaah! Hah!"
22020-207 = "Todos os meus ataques foram desviados..."
22020-208 = "Não! Os ataques da Aris ainda não acabaram!"
22020-209 = "Lá vou eu!"
22020-219 = "Eh!? O que foi isso agora..."
22020-220 = "A Aris acabou de atacar ele agora, mas o HP da Aris que diminuiu?"
22020-221 = "A-Ainda não acabou! A Aris consegu..."
22020-227 = "[ns] \"Dessa vez o personagem dele... desapareceu...?\""
22020-228 = "E-Eeeh!?"
22020-234 = "Ele apareceu... atrás da Aris!?"
22020-235 = "Ah, hyah...! Auh! E-Ele atacou!"
22020-241 = "Os ataques da Aris passaram reto por ele!"
22020-243 = "Uwaah!? Dessa vez o personagem ficou invisível!?"
22020-244 = "Além disso... Ele também ficou gigante, tapando a tela toda."
22020-245 = "A-Agora... P-Parece que ele desativou as hitboxes..."
22020-254 = "U-Uwaaah! É impossível vencer esse jogador!"
22020-255 = "[s] \"Olhando pra isso, claramente ele tá...\""
22020-256 = "Qual é a desse cara! Dá pra ver de longe que ele tá usando cheaters!"
22020-257 = "Que crueldade... Será que ele acha divertido ganhar desse jeito?"
22020-258 = "(Challengers Next Battle Again!!)"
22020-263 = "Ele pediu revanche!? Com certeza ele vai usar cheater de novo!"
22020-264 = "......O que devemos fazer?"
22020-265 = "[s] \"Se o oponente está usando cheats... então talvez seja difícil ganhar...\""
22020-266 = "Rejeita logo o convite! A gente não precisa perder o nosso tempo com esse cheater aí não!"
22020-268 = "Pois é... Sinto muito, Aris-chan, mas acho que não vai ter jeito dessa vez..."
22020-273 = "A-Ainda tem um jeito..."
22020-279 = "[ns] \"Yuzu?\""
22020-281 = "......Deixa comigo. E-Eu vou assumir o controle agora."
22020-286 = "3"
22020-288 = "2"
22020-290 = "1"
22020-293 = "(Battle! START!)"
22020-296 = "!!!"
22020-302 = "Ah! Ele usou aquele cheat de invisibilidade de novo!"
22020-303 = "Tudo bem. Quando eu olhei a tela antes, percebi que o personagem fica invisível, mas a sombra continua lá..."
22020-304 = "É só eu olhar para o tamanho da sombra dele que consigo lidar com isso."
22020-305 = "[s] \"I-Incrível...! E pensar que você usaria um método assim!\""
22020-316 = "Dá pra ver claramente que você tá acertando, mas o jogo não conta o dano!"
22020-317 = "Ele usou o cheat de invencibilidade também..."
22020-318 = "Provavelmente, esse é um cheat que ajusta as hitboxes de dano."
22020-319 = "Nesse caso, eu só preciso aplicar um ataque que cause dano fixo e não dependa das hitboxes."
22020-320 = "A habilidade de provocação que esse meu personagem tem causa dano fixo se a animação não for interrompida, então..."
22020-341 = "Momoi! Midori! V-Vocês viram isso agora!?"
22020-342 = "É verdade..."
22020-343 = "O dano contou!"
22020-353 = "[ns] \"Ah! Ele começou a atacar desesperadamente do nada!\""
22020-355 = "Tudo bem. Só vou ficar no canto com a defesa ativa, ler os frames e..."
22020-356 = "No momento em que o oponente atacar..."
22020-357 = "Um pulo pra trás! E se eu usar um chute forte..."
22020-364 = "A animação de queda trava o personagem dele!"
22020-365 = "Usando isso para forçar um erro, ele não vai conseguir chegar perto a menos que consiga aplicar um contra-ataque frame perfeito."
22020-366 = "Como percebi pelas habilidades dele que ele provavelmente não conseguiria fazer isso..."
22020-367 = "Se eu for punindo cada ponto fraco dele desse jeito..."
22020-368 = "Eu posso vencer."
22020-386 = "[WINNER! Player UZQueen!]"
22020-388 = "Fuuu..."
22020-393 = "Pronto... Venci, né?"
22020-394 = "[s] \"Essa... é a UZQueen...!\""
22020-395 = "Incrível! Você é incrível, Yuzu! Chamar isso de 'incrível' ainda é pouco pra descrever o que você fez!"
22020-396 = "Sim! A Aris também estava vidrada o tempo todo!"
22020-397 = "Não importa o quanto o oponente trapaceie,"
22020-398 = "Nós temos a nossa 'Tática de Cheese'... não é isso."
22020-399 = "Uhum... S-Se você ficar abusando disso, o jogo perde a graça... E além disso... se você fizer isso com os amigos, pode acabar numa briga, então eu não gosto muito de fazer isso, mas..."
22020-400 = "Pensei que, como o oponente era um cheater, não precisava pegar leve com ele... I-Isso também faz parte dos elementos do jogo, afinal de contas."
22020-401 = "Entendido! Táticas de Cheese também são parte dos elementos do jogo! A Aris compreendeu!"
22020-402 = "Mesmo se nós pedirmos uma revanche e ele usar algum cheat para desativar a Tática de Cheese..."
22020-403 = "......Ainda assim, eu consigo vencer na raça."
22020-404 = "Sim... porque nós somos, afinal, gamers de verdade."
22020-405 = "[s] \"A Yuzu é impressionante mesmo.\""
22020-406 = "Ah, a-até o Sensei... isso... n-não foi nada demais."
22020-407 = "Mas fiquei com a alma lavada depois de ter vencido no final!"
22020-408 = "Agora que terminamos a nossa análise de jogo..."
22020-409 = "Mana, vamos começar a nossa reunião de planejamento?"
22020-410 = "......Hã, reunião de planejamento? Pra quê?"
22020-411 = "............"
22020-412 = "Manaaaaaa!"
22020-414 = "E-É-É mesmo! A gente ia fazer isso mesmo!"
22020-415 = "É-É claro que nós vamos fazer isso!"
22020-419 = "(E assim, o cotidiano pacato do Departamento de Desenvolvimento de Jogos continua como sempre)"
22020-421 = "Próximo Episódio; ~Aris, Inicia a Aventura!~"