[translation]#[Texto Final , mas eventualmente pode haver alterações na formatação de texto. - Filipe 29/06.]
22020-1 = "Episódio 2: O Dia a Dia Comum do Clube de Desenvolvimento de Jogos."
22020-3 = "(Num dia raro em que não havia trabalho na Schale\ne sobrou justamente um tempinho……)"
22020-4 = "(Chegou um recado do Clube de Desenvolvimento de\nJogos pedindo pra eu participar das atividades do clube.)"
22020-5 = "(Embora dissessem \"atividades do clube\", eu não\ncheguei a ouvir nada concreto sobre o que seria……)"
22020-9 = "Millennium · Clube de Desenvolvimento de Jogos"
22020-15 = "Toma essaaa!#nSensei, se prepara!"
22020-16 = "Agora vai o meu golpe especial\nguardado a sete chaves……!"
22020-17 = "Vou te mostrar o Momoi Splash!!"
22020-18 = "(Quando me dei conta, estava na sala do clube\njogando um jogo de luta com a Momoi.)"
22020-19 = "[s] \"O golpe especial guardado a sete chaves……!!\""
22020-28 = "Fufufu! Os meus combos não têm ponto cego!#nEnquanto o HP do Sensei não zerar! Eu não paro!"
22020-29 = "Toma láaa!"
22020-43 = "(Pá! Tóim!)"
22020-47 = "\"Jogadora MOMORIA: DERROTA!\""
22020-51 = "\"VENCEDOR! Jogador [USERNAME]!\""
22020-57 = "Buááá! Por que os meus combos não acertam!?"
22020-58 = "[s1] \"É que a Momoi, quando se desespera, fica socando os botões……\"\n[s2] \"Esses combos açucarados não colam, Momoi!\""
22020-61 = "Impossível!?#nVocê já leu o meu padrão de ataque!?"
22020-62 = "Quer dizer, mana…… você não disse que o Sensei\nera iniciante, que começou a jogar hoje?"
22020-63 = "Uaah, Midori!!? Não joga uma realidade\ntão cruel na minha cara!"
22020-64 = "Esse não valeu! Não valeu!"
22020-65 = "Mais uma! Joga mais uma comigo, Sensei!#nDessa vez vai o combo guardado de verdade, autêntico……"
22020-66 = "[s] \"Essa frase já é a 8ª vez……\""
22020-67 = "Hã!? Já foram tantas assim!?"
22020-68 = "É isso, mana. Vamos parar por aqui, vai?#nO Sensei tá numa saia justa."
22020-69 = "M-mas terminar tudo perdendo, isso fere\no meu orgulho de g-gamer……"
22020-70 = "Lá vem você de novo……"
22020-71 = "Então o Sensei pode terminar perdendo, é isso?"
22020-72 = "Nhãa!?#nIsso…… é, fi-fica assim……?"
22020-73 = "[s] \"Por mim, tá tudo bem.\""
22020-74 = "Haah. Sensei, não pode mimar tanto a mana assim, viu?"
22020-75 = "Aliás, com tanta brincadeira só……#nmana……"
22020-76 = "Você lembra qual era o objetivo da atividade de hoje?"
22020-78 = "Ah, é mesmo……!"
22020-79 = "……Era?"
22020-80 = "N-não! Não é isso, Midori!#nEu lembro direitinho, viu! Né!"
22020-81 = "[s] \"Aliás, eu ainda não ouvi direito do que se trata.\""
22020-82 = "Hã, mana…… você não explicou nada\npro Sensei……?"
22020-83 = "Maa~na~?"
22020-84 = "A-agora!#nAgora eu vou falar!"
22020-85 = "Hoje, a gente……"
22020-89 = "ia fazer um brainstorm de ideias\npro próximo jogo!"
22020-90 = "[s] \"Próximo jogo……?\""
22020-91 = "Sim. Surgiu a conversa de que já tá na hora\nde a gente preparar a próxima obra."
22020-92 = "Isso! E, como ouvi que o Sensei, que nunca tá\ndisponível, tava com um tempinho livre,#neu pensei \"é agora\" e te chamei!"
22020-93 = "[s3] \"Desculpa não conseguir aparecer muito.\"\n[s4] \"De fato, deu pra abrir justamente um tempo agora.\""
22020-96 = "Bom, a gente sabe que o Sensei é ocupado……#nentão, obrigada por ter vindo!"
22020-97 = "Enfim! Já que o Sensei veio aqui,#na gente pensou em ouvir umas opiniões pro próximo jogo."
22020-98 = "Afinal, sendo o Sensei, com certeza vai soltar\num montão de ideias incríveis~……"
22020-99 = "Foi por isso que a gente te trouxe pra sala!"
22020-100 = "[s] \"S-sim…… a expectativa tá pesando um pouco……\""
22020-102 = "[ns] \"Aliás, vocês não ficaram esse tempo todo só jogando luta……?\""
22020-103 = "Ah, isso é uma ideia da mana."
22020-104 = "Isso, a gente pensou em analisar jogos!"
22020-105 = "Ficar remoendo do zero, sem nada na cabeça,\nnão faz surgir boa ideia, né?"
22020-106 = "Então a gente decidiu jogar várias obras populares\ne, a partir daí, tentar tirar ideias.#nFoi essa a ideia."
22020-107 = "[s] \"Entendi, faz sentido.\""
22020-108 = "Fufufu! Né?#nEspecialmente este jogo que o Sensei tava jogando agora."
22020-109 = "O \"Punho de Cassiopeia ~A Grande Crônica do Axolote~\"\né um jogo popular que, no meio dos jogos de luta,#né chamado de filho rebelde em vários sentidos!"
22020-110 = "É um jogo com muitos pontos de referência, então,\nse a gente analisar isto, com certeza……"
22020-111 = "vão surgir ideias maravilhosas, úteis pro próximo\njogo! Com certeza!"
22020-112 = "O nosso próximo jogo é um \"RPG de exploração de\nmasmorra estilo slow life, bem tranquilão\"."
22020-113 = "[s] \"E mesmo assim entra elemento de jogo de luta!?\""
22020-114 = "Que é isso, Sensei!"
22020-115 = "De fato, pra uma pessoa comum, RPG de exploração\nde masmorra e jogo de luta podem parecer não\nter ponto de contato, mas……"
22020-116 = "[s] \"Podem parecer não ter, mas……?\""
22020-117 = "Fufufu! Julgar pela aparência é proibido!"
22020-118 = "Se a gente quer mirar o próximo Prêmio Millennium,\num desafio novo, que ninguém consiga prever, é essencial!"
22020-119 = "Isso, ou seja! Só largando os preconceitos e\nsuperando toda e qualquer ideia preconcebida#né que se chega ao outro lado de um novo horizonte……!"
22020-120 = "Combinando elementos de gêneros que parecem não\nter relação nenhuma,#nde repente pode sair um jogo surpreendentemente divertido."
22020-121 = "Ah! Midori! Não rouba a minha fala!"
22020-122 = "É porque a mana fica enrolando pra falar."
22020-123 = "Buááá#nque maldade~!"
22020-124 = "[s] \"Todo mundo tá com tudo no desenvolvimento da obra nova, né.\""
22020-125 = "Hm?"
22020-126 = "Ah……"
22020-127 = "Fufufu!"
22020-128 = "Mas é claro!"
22020-129 = "Sim. Não só eu e a mana, mas a Yuzu e a Aris também.#nTodo mundo junto……"
22020-130 = "A gente prometeu que, dessa vez, ia ganhar mesmo\no Prêmio Millennium."
22020-131 = "Sim.#nE essa é a \"quest\" que foi dada pra gente agora!"
22020-137 = "Momoi! Midori! Sensei!#nÉ uma emergência!"
22020-138 = "[s] \"Oi, Aris. O que houve?\""
22020-139 = "Ué, que foi, Aris?"
22020-140 = "Finalmente, a Yuzu passou de 10 vitórias\nseguidas no online!"
22020-141 = "Hã? Sério!?"
22020-142 = "10 vitórias seguidas nesse jogo de\nbalanceamento tão quebrado!?"
22020-160 = "\"VENCEDOR! Jogadora UZQueen!\""
22020-165 = "Fuáá……"
22020-166 = "Foi maneiríssimo, Yuzu!"
22020-167 = "A Yuzu é incrível, né."
22020-169 = "A Aris se emocionou!#nÉ a lendária heroína \"UZQueen\", não é à toa!"
22020-170 = "Ah, é-é…… né?"
22020-171 = "[s] \"Parabéns, Yuzu! Foi uma vitória perfeita!\""
22020-172 = "Né! Esse é o estilo perfeito da Yuzu,\no \"modo UZQueen\"!"
22020-173 = "[s] \"Modo \"UZQueen\"……?\""
22020-174 = "Deixa eu explicar! O \"modo UZQueen\" é#numa skill de buff da Yuzu que ativa sob condições específicas!"
22020-175 = "Ela fica um pouco mais ousada que o normal, o raciocínio\nfica 1,5 vez mais rápido!#nE a visão dinâmica sobe 2,8 vezes!"
22020-176 = "Quando foi que você inventou esse status?"
22020-177 = "A Aris também sabe! A Yuzu nessas horas é muito forte!#nA Aris também quer o \"modo UZQueen\"!"
22020-178 = "[s] \"O \"modo UZQueen\" é demais, hein……!\""
22020-179 = "O-o Sensei também!?"
22020-180 = "É-é que…… auu……!"
22020-181 = "E-eu só me esforcei normalmente, sabe……"
22020-182 = "Vendo o desempenho da Yuzu, a Aris\ntambém ficou animada!"
22020-183 = "Agora é a vez da Aris!"
22020-185 = "(E assim, sob o olhar de todas, começou o desafio\nda Aris no jogo de luta.)"
22020-187 = "Igual à Momoi, à Midori, à Yuzu —— e ao Sensei,#na Aris também vai virar uma heroína no jogo de luta!"
22020-188 = "A mana, mais do que heroína, eu diria que é\ndo tipo que apanha do herói."
22020-189 = "Minha irmã! Às vezes a verdade dói, viu!?"
22020-190 = "A-Aris…… b-boa sorte!"
22020-191 = "Sim! A Aris vai dar o seu melhor!"
22020-192 = "(Novo Desafiante na Fila!!)"
22020-194 = "[ns] \"Ah, parece que apareceu um desafiante.\""
22020-196 = "Vou mostrar a habilidade que treinei contra a Momoi!"
22020-197 = "Toma!"
22020-201 = "Ei! Toma! Há!"
22020-207 = "Tá tudo sendo desviado……"
22020-208 = "Não! O ataque da Aris ainda não acabou!"
22020-209 = "Lá vai!"
22020-219 = "Hã!?#nIsso agora foi……"
22020-220 = "Agora, mesmo a Aris tendo atacado, o HP\ndo lado da Aris não diminuiu?"
22020-221 = "A-ainda não!#nA Aris consegu……"
22020-227 = "[ns] \"Agora o personagem…… sumiu……?\""
22020-228 = "Hã, heein!?"
22020-234 = "Apareceu…… atrás da Aris!?"
22020-235 = "Ah, hyá……!#nAui! A-ataque!"
22020-241 = "O ataque da Aris atravessou o oponente!"
22020-243 = "Uaah!? Agora o personagem ficou transparente!?"
22020-244 = "E ainda…… ficou gigante e tá tampando\na tela inteira, né."
22020-245 = "A-agora…… p-parece que a detecção de acerto sumiu."
22020-254 = "B-buááá!#nA Aris não consegue ganhar deste jogador!"
22020-255 = "[s] \"Isso aí, por qualquer ângulo……\""
22020-256 = "O que é esse cara! Tá na cara que tá usando cheat!"
22020-257 = "Que baixaria…… ganhar de um jeito desses,\nserá que é divertido."
22020-258 = "(Desafiante Quer Revanche!!)"
22020-263 = "Pedido de revanche!?#nVai usar cheat de novo, com certeza!"
22020-264 = "……O que a gente faz?"
22020-265 = "[s] \"Se o oponente tá usando cheat…… ganhar pode ser difícil……\""
22020-266 = "Vamos recusar logo! Não precisa dar bola\npra um trapaceiro desses!"
22020-268 = "Sim…… Aris, é uma pena, mas só dessa vez……"
22020-273 = "A-ainda tem um jeito……"
22020-279 = "[ns] \"Yuzu?\""
22020-281 = "……Deixa comigo.#nE-eu vou entrar na briga."
22020-286 = "3"
22020-288 = "2"
22020-290 = "1"
22020-293 = "(Luta! COMEÇAR!)"
22020-296 = "!!!"
22020-302 = "Ah! Usou de novo o cheat de ficar transparente!"
22020-303 = "Calma.#nVendo agora há pouco, o personagem fica transparente, mas a sombra continua a mesma, então……"
22020-304 = "é só olhar o comprimento da sombra e reagir."
22020-305 = "[s] \"Q-que incrível……! Existia um jeito desses!\""
22020-316 = "Por qualquer ângulo tá acertando, mas o dano não passa!"
22020-317 = "De novo o cheat de invencibilidade……"
22020-318 = "Provavelmente, este é um cheat que mexe\nna detecção de acerto."
22020-319 = "Nesse caso, é só causar dano garantido, que\nnão depende da detecção de acerto."
22020-320 = "A skill de provocação que este personagem tem,#nse não for interrompida, causa dano garantido, então……"
22020-341 = "Momoi! Midori!#nV-vocês viram isso agora!?"
22020-342 = "É verdade……"
22020-343 = "O dano passou!"
22020-353 = "[ns] \"Ah! O oponente começou um ataque furioso do nada!\""
22020-355 = "Calma.#nFica de guarda no canto e espera, lê os frames……"
22020-356 = "No instante em que o oponente atacar……"
22020-357 = "Pula pra trás!#nE, soltando um chute forte……"
22020-364 = "O personagem do oponente vai pro chão!"
22020-365 = "Depois de um poke desses, sem um contra-ataque\ngarantido, ninguém consegue se aproximar."
22020-366 = "Pelo nível do oponente, achei que ele provavelmente\nnão ia conseguir, então……"
22020-367 = "Assim, golpeando os pontos fracos do oponente,\num por um……"
22020-368 = "dá pra vencer."
22020-386 = "\"VENCEDOR! Jogadora UZQueen!\""
22020-388 = "Ufa……"
22020-393 = "Com isso…… a gente ganhou, né?"
22020-394 = "[s] \"Então isto é……… a UZQueen……!\""
22020-395 = "Demais! Você é demais, Yuzu!#n\"Demais\" é pouco pra descrever o quanto você é demais!"
22020-396 = "Sim! A Aris também! Ficou o tempo todo vidrada,\nacompanhando!"
22020-397 = "Por mais cheat que o oponente use,"
22020-398 = "a gente tem o nosso \"golpe-trava\"……\né isso, né."
22020-399 = "Sim…… s-se usar demais, o jogo perde a graça, e……#naquilo…… entre amigos…… acaba virando briga,\nentão eu não curto muito, mas……"
22020-400 = "se o oponente é um trapaceiro, acho que não\nprecisa ter dó……#ne-e isso também é um elemento de jogo."
22020-401 = "Entendi! O golpe-trava também faz parte dos\nelementos de jogo!#nAris, compreendido!"
22020-402 = "Talvez, na revanche, ele venha com um cheat\npra anular o golpe-trava, mas……"
22020-403 = "……mesmo assim, lutando, dá pra vencer."
22020-404 = "Sim…… porque a gente é gamer."
22020-405 = "[s] \"A Yuzu é incrível de verdade.\""
22020-406 = "Ah, o-o Sensei também…… é que, n-não é\nnada de mais, não."
22020-407 = "Mas ganhar no fim foi muito satisfatório!"
22020-408 = "Já que a análise do jogo também tá feita……"
22020-409 = "mana, bora começar a reunião de planejamento?"
22020-410 = "……Hm, reunião de planejamento? De quê?"
22020-411 = "…………"
22020-412 = "Maa~na~!"
22020-414 = "I-i-isso!#nÉ mesmo!"
22020-415 = "C-claro, a gente vai fazer, oras!"
22020-419 = "(E assim, como sempre, o dia a dia do Clube de\nDesenvolvimento de Jogos segue o seu fluxo.)"
22020-421 = "Próximo episódio: ～Aris Começa a Sua Aventura!～"