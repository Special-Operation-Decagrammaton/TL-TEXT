[translation]
22020-1 = "第2話;ゲーム開発部の平凡な日常"
22020-3 = "（珍しくシャーレの仕事がなく、ちょうど時間ができたある日）"
22020-4 = "（ゲーム開発部から、部活動に付き合ってほしいという連絡があった）"
22020-5 = "（部活動といっても、何をするのか具体的な話は聞けずじまいで……）"
22020-9 = "ミレニアム・ゲーム開発部"
22020-15 = "おりゃあーっ！#n先生、覚悟して！"
22020-16 = "今から、とっておきの必殺技……！"
22020-17 = "モモイスプラッシュを見せてあげるんだから！！"
22020-18 = "（気がついたら、部室でモモイと格ゲーをしていた）"
22020-19 = "[s] \"とっておきの必殺技っ……！！\""
22020-28 = "ふっふっふっ！私のコンボに死角はないよ！#n先生の！HPがなくなるまで！止まらない！"
22020-29 = "やあーーっ！"
22020-43 = "（ドン！バタン！）"
22020-47 = "「Player MOMORIA LOSE！」"
22020-51 = "「WINNER！ Player [USERNAME]！」"
22020-57 = "うわーん！なんで私のコンボが当たらないの！？"
22020-58 = "[s1] \"モモイは焦るとレバガチャしちゃうから……。\"\n[s2] \"そんな甘々コンボなんて通じないよ、モモイ！\""
22020-61 = "そんなっ！？#nもう私の攻撃パターンを見切ったの！？"
22020-62 = "というか、お姉ちゃん……先生は今日始めたばっかりの初心者だって言ってたよね。"
22020-63 = "うわっミドリ！！？あんまり辛い現実を突きつけないで！"
22020-64 = "今のは無効！無効だから！"
22020-65 = "もう一回！もう一回やって先生！#n今度は正真正銘とっておきのコンボを……。"
22020-66 = "[s] \"その言葉、もう8回目……。\""
22020-67 = "え！？もうそんなに！？"
22020-68 = "そうだよお姉ちゃん。その辺にしておこう？#n先生が困ってるでしょ。"
22020-69 = "で、でも負けたまま終わるのは、げ、ゲーマーとしてのプライドが……。"
22020-70 = "またそんな事言って……"
22020-71 = "じゃあ先生は負けたまま終わってもいいってこと？"
22020-72 = "うにゃあっ！？#nそれは……そ、そう、なる……？"
22020-73 = "[s] \"私は別に大丈夫だよ。\""
22020-74 = "はあ。先生、あまりお姉ちゃんのこと甘やかしちゃダメですよ？"
22020-75 = "というか、こんなに遊んでばっかりで……#nお姉ちゃん……"
22020-76 = "今日の部活の目的、覚えてる？"
22020-78 = "あっ、そうだった……！"
22020-79 = "……そうだった？"
22020-80 = "ち、違う！違うのミドリ！#nちゃんと覚えてるから！ね！"
22020-81 = "[s] \"そういえば、まだちゃんと話聞いてなかったね。\""
22020-82 = "えっ、お姉ちゃん……先生に何も説明してないの……？"
22020-83 = "おね～～ちゃ～～ん？"
22020-84 = "い、今！#n今から言うから！"
22020-85 = "今日は、"
22020-89 = "次回作のアイデア出しをしようと思って！"
22020-90 = "[s] \"次回作……？\""
22020-91 = "はい。うちもそろそろ次回作の準備をしようという話が出たんです。"
22020-92 = "そう！しかも、いつも捕まらない先生の手が空いたって聞いたから、#nこれはと思って呼んでみたの！"
22020-93 = "[s3] \"……あんまり顔出せてなくてごめんね。\"\n[s4] \"たしかに、ちょうど手が空いたところだね。\""
22020-96 = "まぁ、先生が忙しいのは知ってるから……#n来てくれてありがとう！"
22020-97 = "とにかく！こうして先生に来てもらえたのだから、#n次回作の意見を聞けるんじゃないかな～って。"
22020-98 = "それに、先生ならすごいアイデアをいっぱい出してくれるんじゃないかな～って……。"
22020-99 = "そういうわけで、部室に来てもらいました！"
22020-100 = "[s] \"う、うん……ちょっと期待が重いような……。\""
22020-102 = "[ns] \"というか、ずっと格ゲーばっかやってるような……？\""
22020-103 = "あ、それはお姉ちゃんのアイデアなんです。"
22020-104 = "そう、ゲームを分析しようと思って！"
22020-105 = "何も浮かんでない状態でぐるぐる悩んだって、いいアイデアは出て来ないじゃない？"
22020-106 = "だからいろんな人気作をプレイして、その上でアイデアを出してみよう。#nという事になったんです。"
22020-107 = "[s] \"なるほど、一理あるね。\""
22020-108 = "ふふふ！でしょ？#n特にさっき先生とやってたこのゲーム。"
22020-109 = "『カシオペアの拳～ウーパールーパー大列伝～』は、#n格ゲー界隈でも色んな意味で異端児と呼ばれてる人気ゲームなんだ！"
22020-110 = "参考になる点が多いゲームだから、これを分析したらきっと……"
22020-111 = "次回作に役立つ素晴らしいアイデアが浮かんでくる！はず！"
22020-112 = "うちの次回作は「まったりスローライフ系ダンジョン探索型RPG」なんです。"
22020-113 = "[s] \"それなのに格ゲー要素が入るの！？\""
22020-114 = "何を言ってるの先生！"
22020-115 = "たしかに一般人から見たら、ダンジョン探索型RPGと格ゲーに接点がなさそうに見えるかもしれないけど……。"
22020-116 = "[s] \"なさそうに見えるかもしれないけど……？\""
22020-117 = "ふっふっふっ！見た目で判断するのはNGだよ！"
22020-118 = "次のミレニアムプライスを狙うなら、誰にも予想がつかないような新しい挑戦が必須！"
22020-119 = "そう、つまり！先入観を捨て、あらゆる偏見を乗り越えてこそ、#n新しい地平線の向こうへ行けるというもの……！"
22020-120 = "全く関係なさそうなジャンルの要素を組み合わせたら、#n意外と面白いゲームになるかもしれませんし。"
22020-121 = "あっ！ミドリ！私のセリフを奪わないでよ！"
22020-122 = "お姉ちゃんがもったいぶって言わないからだよ。"
22020-123 = "うわ～ん#nひどいよ～！"
22020-124 = "[s] \"みんな新作開発に全力なんだね。\""
22020-125 = "ん？"
22020-126 = "あ……。"
22020-127 = "ふふふ！"
22020-128 = "そりゃあ、もちろん！"
22020-129 = "はい。私とお姉ちゃんだけじゃなく、ユズちゃんとアリスちゃんも。#nみんなで一緒に……。"
22020-130 = "今度こそ、ミレニアムプライスを取ると約束しましたから。"
22020-131 = "うん。#nそれが、今私たちに与えられた「クエスト」なんだ！"
22020-137 = "モモイ！ミドリ！先生！#n非常事態です！"
22020-138 = "[s] \"こんにちは、アリス。どうしたの？\""
22020-139 = "あれ、どうしたのアリス？"
22020-140 = "ついに、ユズがオンライン10連勝を超えました！"
22020-141 = "え？本当！？"
22020-142 = "このバランスが終わったゲームで10連勝も！？"
22020-160 = "「WINNER！Player UZQueen！」"
22020-165 = "ふあぁ……"
22020-166 = "かっこよかったよ、ユズ！"
22020-167 = "ユズちゃんはすごいね。"
22020-169 = "アリスは感動しました！#nさすが伝説の勇者「UZQueen」です！"
22020-170 = "あっ、う、うん……？"
22020-171 = "[s] \"ユズおめでとう！完璧な勝利だったね！\""
22020-172 = "でしょ！これがユズのパーフェクトスタイル「UZQueenモード」だよ！"
22020-173 = "[s] \"「UZQueen」モード……？\""
22020-174 = "説明しよう！「UZQueenモード」とは！#n特定の状況下で発動するユズのバフスキルだよ！"
22020-175 = "いつもよりちょっと大胆になって、頭の回転は普段の1.5倍！#n動体視力は2.8倍も上昇するの！"
22020-176 = "そんな設定、いつの間につけたの？"
22020-177 = "アリスも知っています！こういう時のユズはすごく強いです！#nアリスも「UZQueenモード」が欲しいです！"
22020-178 = "[s] \"「UZQueenモード」ってすごいんだね……！\""
22020-179 = "せ、先生まで！？"
22020-180 = "そ、その……あうぅ……！"
22020-181 = "ふ、普通に頑張っただけ、なんだけど……。"
22020-182 = "ユズの活躍を見ていたら、アリスもやる気が出てきました！"
22020-183 = "次はアリスの番です！"
22020-185 = "（そうしてみんなが見守る中、アリスの格ゲー挑戦が始まった）"
22020-187 = "モモイ、ミドリ、ユズ――そして先生みたいに、#nアリスも格ゲーで勇者になります！"
22020-188 = "お姉ちゃんは勇者というより、勇者に倒される役だと思うけど。"
22020-189 = "妹よ！時には真実が痛い時もあるんだよ！？"
22020-190 = "あ、アリスちゃん……が、がんばれ！"
22020-191 = "はい！アリス、頑張ります！"
22020-192 = "（Challengers Next Battle！！）"
22020-194 = "[ns] \"あっ、挑戦者が現れたみたいだね。\""
22020-196 = "モモイ相手に鍛えてきた腕前、見せます！"
22020-197 = "やあっ！"
22020-201 = "えい！やあっ！はっ！"
22020-207 = "全部回避されてる……。"
22020-208 = "いいえ！まだアリスの攻撃は終わっていません！"
22020-209 = "いきます！"
22020-219 = "え！？#n今のは……"
22020-220 = "今、アリスが攻撃したのに、アリス側のHPが減ってなかった？"
22020-221 = "ま、まだ！#nアリスはでき……"
22020-227 = "[ns] \"今度はキャラクターが……消えた……？\""
22020-228 = "え、ええっ！？"
22020-234 = "アリスの後ろに……現れた！？"
22020-235 = "あっ、ひゃっ……！#nあうっ！こ、攻撃！"
22020-241 = "アリスの攻撃が相手を通過してしまいました！"
22020-243 = "うわっ！？今度はキャラクターが透明になってる！？"
22020-244 = "それに……巨大化して画面全体を隠してるね。"
22020-245 = "こ、今度は……は、判定が消えちゃったみたい。"
22020-254 = "う、うわーん！#nこのプレイヤーに勝てません！"
22020-255 = "[s] \"これって、どう見ても……。\""
22020-256 = "何なのこいつ！どう見てもチート使ってるじゃん！"
22020-257 = "ひどい……こんな方法で勝って、楽しいのかな。"
22020-258 = "（Challengers Next Battle Again！！）"
22020-263 = "再戦要求！？#nどうせまたチートを使うつもりだよ！"
22020-264 = "……どうしましょう？"
22020-265 = "[s] \"相手がチートを使っているなら……勝つのは難しいかも……。\""
22020-266 = "もう断っちゃおうよ！こんなチーターに付き合う必要ないよ！"
22020-268 = "うん……アリスちゃん、残念だけど今回ばかりは……。"
22020-273 = "ま、まだ方法はあるよ……。"
22020-279 = "[ns] \"ユズ？\""
22020-281 = "……わたしに任せて。#nら、乱入するね。"
22020-286 = "3"
22020-288 = "2"
22020-290 = "1"
22020-293 = "（Battle！ START！）"
22020-296 = "！！！"
22020-302 = "あっ！また透明になるチートを使ったよ！"
22020-303 = "大丈夫。#nさっき見てたら、キャラクターは透明になるけど、影はそのままだったから……"
22020-304 = "影の長さを見て対処すればいい。"
22020-305 = "[s] \"す、すごい……！そんな方法があったなんて！\""
22020-316 = "どうみても当たってるのに、ダメージが通ってない！"
22020-317 = "また無敵チートを……"
22020-318 = "多分、これは当たり判定を調整するチート。"
22020-319 = "それなら、当たり判定が関係ない、確定ダメージを与えればいい。"
22020-320 = "このキャラが持ってる挑発スキルは、#n妨害されなければ確定ダメージを与えられるから……"
22020-341 = "モモイ！ミドリ！#nい、今の見ましたか！？"
22020-342 = "本当だ……。"
22020-343 = "ダメージが通った！"
22020-353 = "[ns] \"あっ！相手が急に猛攻撃を始めたよ！\""
22020-355 = "大丈夫。#n端でガードしたまま待機、フレームを読んで……"
22020-356 = "相手が攻撃した瞬間に……"
22020-357 = "後ろにジャンプ！#nそして強キックを出せば……"
22020-364 = "相手のキャラがダウン状態に！"
22020-365 = "これで牽制した時は、確定反撃ができないと絶対に近付けない。"
22020-366 = "相手の実力的に、多分できないと思ったから……"
22020-367 = "こうやって、一つ一つ相手の弱点を突いていけば……"
22020-368 = "勝てるよ。"
22020-386 = "「WINNER！Player UZQueen！」"
22020-388 = "ふう……"
22020-393 = "これで……勝った、よね？"
22020-394 = "[s] \"これが………UZQueen……！\""
22020-395 = "すごい！すごいよユズ！#n「すごい」って言葉じゃ全然足りないくらいすごい！"
22020-396 = "はい！アリスも！ずっと夢中で見守ってました！"
22020-397 = "相手がいくらチートを使っても、"
22020-398 = "私たちには「ハメ技」がある……ってことだね。"
22020-399 = "うん……つ、使いすぎたらゲームが楽しくなくなっちゃうし、#nその……友達同士だと……ケンカになっちゃうから、好きじゃないけど……"
22020-400 = "相手がチート使いなら遠慮は要らないかなって……#nこ、これも、ゲーム要素の一つだし。"
22020-401 = "なるほど！ハメ技もゲーム要素の一部！#nアリス、理解しました！"
22020-402 = "もしかしたら、再戦した時にハメ技を無力化するチートを使ってくるかもしれないけど……"
22020-403 = "……それでも、戦えば勝てるよ。"
22020-404 = "うん……わたし達は、ゲーマーだから。"
22020-405 = "[s] \"ユズは本当にすごいよ。\""
22020-406 = "あっ、せ、先生まで……その、た、大したことではないです。"
22020-407 = "でも最後に勝てて、すごくスッキリしたー！"
22020-408 = "これでゲームの分析もできた事だし……"
22020-409 = "お姉ちゃん、企画会議を始めよっか？"
22020-410 = "……ん、企画会議？何の？"
22020-411 = "…………。"
22020-412 = "おね～ちゃ～ん！"
22020-414 = "そ、そ、そうだ！#nそうだったね！"
22020-415 = "も、もちろん、やるってば！"
22020-419 = "（そうして、いつものようにゲーム開発部の日常は流れていく）"
22020-421 = "次回;～アリス、冒険を始めます！～"
