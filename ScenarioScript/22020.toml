[translation]
22020-1 = "Episódio 2: O cotidiano comum do Departamento de Desenvolvimento de Jogos"
22020-3 = "(Em um dia raro em que não havia trabalho no Schale e eu estava com tempo livre)"
22020-4 = "(Recebi um contato do Departamento de Desenvolvimento de Jogos pedindo para eu participar das atividades do clube)"
22020-5 = "(Embora tenham dito 'atividades do clube', não me deram detalhes sobre o que faríamos...)"
22020-9 = "Departamento de Desenvolvimento de Jogos de Millennium"
22020-15 = "Toma essa!#nProfessor, prepare-se!"
22020-16 = "Vou usar meu golpe especial definitivo agora...!"
22020-17 = "Vou te mostrar o Momoi Splash!!"
22020-18 = "(Quando me dei conta, estava jogando um jogo de luta com a Momoi na sala do clube)"
22020-19 = "[s] \"Golpe especial definitivo...!!\""
22020-28 = "Hehehe! Não há pontos cegos no meu combo!#nNão vou parar até o HP do sensei chegar a zero!"
22020-29 = "Yaaaah!"
22020-43 = "(Bum! Bam!)"
22020-47 = "「Player MOMORIA LOSE！」"
22020-51 = "「WINNER！ Player [USERNAME]！」"
22020-57 = "Aaaah! Por que meu combo não acerta!?"
22020-58 = "[s1] \"É que a Momoi começa a apertar os botões desesperada quando fica nervosa...\"\n[s2] \"Esse combo fraquinho não funciona comigo, Momoi!\""
22020-61 = "Como assim!?#nVocê já previu meu padrão de ataque!?"
22020-62 = "Aliás, irmã... você disse que o sensei é um iniciante que começou hoje."
22020-63 = "Ah, Midori!!? Não jogue verdades tão cruéis na minha cara!"
22020-64 = "Isso não valeu! Não valeu!"
22020-65 = "Mais uma! Vamos de novo, sensei!#nDessa vez, vou usar um combo de verdade..."
22020-66 = "[s] \"Essa já é a oitava vez que você diz isso...\""
22020-67 = "Hã!? Já tudo isso!?"
22020-68 = "Pois é, irmã. Vamos parar por aqui?#nO sensei está ficando sem jeito."
22020-69 = "Ma-mas terminar perdendo fere o meu orgulho de... de gamer..."
22020-70 = "Lá vem você de novo..."
22020-71 = "Então você está dizendo que não se importa se o sensei terminar perdendo?"
22020-72 = "Nyaaah!?#nIsso... isso... significa...?"
22020-73 = "[s] \"Por mim, tudo bem.\""
22020-74 = "Ai, ai. Sensei, não pode ficar mimando tanto a minha irmã, sabe?"
22020-75 = "Aliás, ficar só brincando assim...#nIrmã..."
22020-76 = "Você lembra qual era o objetivo da atividade de hoje?"
22020-78 = "Ah, é verdade...!"
22020-79 = "......É verdade?"
22020-80 = "N-não! Não é isso, Midori!#nEu lembro muito bem! Sério!"
22020-81 = "[s] \"Falando nisso, ainda não ouvi a explicação de verdade.\""
22020-82 = "Hã, irmã... você não explicou nada para o sensei...?"
22020-83 = "Irmããããã?"
22020-84 = "E-eu vou!#nVou explicar agora!"
22020-85 = "Hoje, nós..."
22020-89 = "Pensamos em ter ideias para o nosso próximo jogo!"
22020-90 = "[s] \"Próximo jogo...?\""
22020-91 = "Sim. Surgiu o assunto de que já deveríamos começar a preparar o próximo projeto."
22020-92 = "Isso! E como ouvimos dizer que o sensei, que nunca está disponível, estava livre,#npensei que era a chance perfeita e te chamei!"
22020-93 = "[s3] \"...Desculpe por não ter aparecido muito ultimamente.\"\n[s4] \"Realmente, eu estava com o tempo livre agora mesmo.\""
22020-96 = "Bem, eu sei que o sensei é ocupado...#nObrigada por vir!"
22020-97 = "De qualquer forma! Já que conseguimos trazer o sensei aqui,#npensei que poderíamos ouvir suas opiniões para o próximo jogo."
22020-98 = "Além disso, achei que o sensei poderia dar várias ideias incríveis..."
22020-99 = "Por isso que te chamamos para vir à sala do clube!"
22020-100 = "[s] \"S-sim... é que a expectativa parece um pouco pesada...\""
22020-102 = "[ns] \"Ou melhor, parece que vocês só estão jogando jogo de luta o tempo todo...?\""
22020-103 = "Ah, isso é ideia da minha irmã."
22020-104 = "Isso mesmo, pensei em analisar os jogos!"
22020-105 = "Não adianta ficar remoendo as coisas sem ter nenhuma ideia na cabeça, não é?"
22020-106 = "Por isso, decidimos jogar vários títulos populares para, então, conseguir ter novas ideias."
22020-107 = "[s] \"Entendo, faz sentido.\""
22020-108 = "Fufufu! Viu só?#nPrincipalmente este jogo que você estava jogando com o Sensei agora pouco."
22020-109 = "『Punho de Cassiopeia ~A Grande Crônica do Axolote~』 é um jogo popular que, em vários sentidos, é chamado de dissidente no mundo dos jogos de luta!"
22020-110 = "Como é um jogo com muitos pontos que servem de referência, se analisarmos ele, com certeza..."
22020-111 = "Ideias maravilhosas para o próximo projeto vão surgir! É o que esperamos!"
22020-112 = "O nosso próximo projeto é um \"RPG de exploração de masmorras estilo slow life relaxante\"."
22020-113 = "[s] \"E mesmo assim vai ter elementos de jogo de luta!?\""
22020-114 = "O que você está dizendo, Sensei!"
22020-115 = "Pode até parecer para uma pessoa comum que um RPG de exploração de masmorras e um jogo de luta não têm nada a ver, mas..."
22020-116 = "[s] \"Pode parecer que não têm nada a ver, mas...?\""
22020-117 = "Fufufu! Julgar pela aparência é um erro!"
22020-118 = "Se queremos ganhar o próximo Millennium Prize, precisamos de um desafio novo que ninguém consiga prever!"
22020-119 = "Isso mesmo, ou seja! Só descartando preconceitos e superando todas as ideias fixas é que poderemos ir além do novo horizonte...!"
22020-120 = "Se combinarmos elementos de gêneros que parecem não ter relação nenhuma, pode acabar virando um jogo surpreendentemente interessante."
22020-121 = "Ah! Midori! Não roube a minha fala!"
22020-122 = "É porque você estava fazendo suspense e não falava logo."
22020-123 = "Uwaaa#nQue maldade!"
22020-124 = "[s] \"Vocês estão dando tudo de si no desenvolvimento do novo jogo, hein.\""
22020-125 = "Hm?"
22020-126 = "Ah..."
22020-127 = "Fufufu!"
22020-128 = "Claro que sim!"
22020-129 = "Sim. Não só eu e minha irmã, mas a Yuzu e a Alice também. #nTodas juntas..."
22020-130 = "Prometemos que, desta vez, vamos ganhar o Millennium Prize."
22020-131 = "Sim.#nEssa é a \"quest\" que nos foi dada agora!"
22020-137 = "Momoi! Midori! Sensei!#nÉ uma emergência!"
22020-138 = "[s] \"Olá, Alice. O que houve?\""
22020-139 = "Ué, o que aconteceu, Alice?"
22020-140 = "Finalmente, a Yuzu passou de 10 vitórias seguidas online!"
22020-141 = "Sério? De verdade!?"
22020-142 = "10 vitórias seguidas nesse jogo desbalanceado!?"
22020-160 = "「VENCEDORA! Player UZQueen!」"
22020-165 = "Ufa..."
22020-166 = "Foi incrível, Yuzu!"
22020-167 = "A Yuzu é incrível, né."
22020-169 = "Alice está emocionada!#nComo esperado da lendária heroína \"UZQueen\"!"
22020-170 = "Ah, s-sim...?"
22020-171 = "[s] \"Parabéns, Yuzu! Foi uma vitória perfeita!\""
22020-172 = "Viu só! Esse é o estilo perfeito da Yuzu, o \"Modo UZQueen\"!"
22020-173 = "[s] \"Modo \"UZQueen\"...?\""
22020-174 = "Deixe-me explicar! O \"Modo UZQueen\" é!#nUma habilidade de buff da Yuzu que é ativada em situações específicas!"
22020-175 = "Fico um pouco mais ousada que o normal, e meu raciocínio fica 1,5 vezes mais rápido!#nA minha visão dinâmica aumenta em 2,8 vezes!"
22020-176 = "Desde quando você criou essa configuração?"
22020-177 = "Alice também sabe! A Yuzu nessas horas é muito forte!#nAlice também quer o \"Modo UZQueen\"!"
22020-178 = "[s] \"O 'Modo UZQueen' é incrível...!\""
22020-179 = "A-até o Sensei!?"
22020-180 = "E-eu... auuu...!"
22020-181 = "E-eu só me esforcei normalmente, mas..."
22020-182 = "Vendo o desempenho da Yuzu, a Alice também ficou motivada!"
22020-183 = "Agora é a vez da Alice!"
22020-185 = "（Enquanto todos assistiam, o desafio de Alice no jogo de luta começou）"
22020-187 = "Assim como a Momoi, a Midori, a Yuzu — e o Sensei, #na Alice também vai se tornar uma heroína nos jogos de luta!"
22020-188 = "Acho que você tem mais cara de quem é derrotada pelo herói do que de heroína, irmã."
22020-189 = "Irmã! Às vezes a verdade dói, sabia!?"
22020-190 = "A-Alice-chan... b-boa sorte!"
22020-191 = "Sim! Alice vai dar o seu melhor!"
22020-192 = "（Challengers Next Battle！！）"
22020-194 = "[ns] \"Ah, parece que um desafiante apareceu.\""
22020-196 = "Vou mostrar a habilidade que treinei enfrentando a Momoi!"
22020-197 = "Hya!"
22020-201 = "Ei! Hya! Ha!"
22020-207 = "Ele desviou de tudo..."
22020-208 = "Não! O ataque da Alice ainda não acabou!"
22020-209 = "Lá vou eu!"
22020-219 = "Hã!? #nO que foi isso..."
22020-220 = "Agora há pouco, a Alice atacou, mas o HP do lado da Alice não diminuiu?"
22020-221 = "A-ainda não! #nA Alice consegue..."
22020-227 = "[ns] \"Desta vez o personagem... desapareceu...?\""
22020-228 = "E-ehhh!?"
22020-234 = "Apareceu... atrás da Alice!?"
22020-235 = "Ah, hya...! #nAu! A-ataque!"
22020-241 = "O ataque da Alice atravessou o oponente!"
22020-243 = "Ué!? Agora o personagem ficou transparente!?"
22020-244 = "E além disso... ele ficou gigante e está cobrindo a tela toda."
22020-245 = "E-e agora... a, a caixa de colisão parece ter sumido."
22020-254 = "U-uwaaan! #nNão consigo vencer esse jogador!"
22020-255 = "[s] \"Isso, por qualquer ângulo...\""
22020-256 = "O que é esse cara!? Por qualquer ângulo, ele está usando cheat!"
22020-257 = "Que horrível... será que é divertido ganhar desse jeito?"
22020-258 = "（Challengers Next Battle Again！！）"
22020-263 = "Pedido de revanche!? #nEle vai usar cheat de novo, com certeza!"
22020-264 = "...O que faremos?"
22020-265 = "[s] \"Se o oponente está usando cheat... pode ser difícil vencer...\""
22020-266 = "Vamos recusar logo! Não precisamos lidar com um trapaceiro desses!"
22020-268 = "É... Alice-chan, sinto muito, mas desta vez..."
22020-273 = "A-ainda existe um jeito..."
22020-279 = "[ns] \"Yuzu?\""
22020-281 = "...Deixem comigo. #nV-vou entrar na partida."
22020-286 = "3"
22020-288 = "2"
22020-290 = "1"
22020-293 = "（Battle！ START！）"
22020-296 = "!!!"
22020-302 = "Ah! Ele usou o cheat de ficar transparente de novo!"
22020-303 = "Tudo bem. #nEu estava observando agora pouco, o personagem fica invisível, mas a sombra continua lá, então..."
22020-304 = "É só olhar o comprimento da sombra para lidar com isso."
22020-305 = "[s] \"I-Incrível...! Eu não sabia que existia um método desses!\""
22020-316 = "Não importa como eu olhe, o golpe acertou, mas o dano não está entrando!"
22020-317 = "De novo usando trapaça de invencibilidade..."
22020-318 = "Provavelmente, isso é um cheat que ajusta a caixa de colisão."
22020-319 = "Nesse caso, é só usar um dano fixo, onde a caixa de colisão não importa."
22020-320 = "A habilidade de provocação que essa personagem tem, #nse não for interrompida, causa dano fixo, então..."
22020-341 = "Momoi! Midori! #nV-vocês viram isso agora pouco!?"
22020-342 = "É verdade..."
22020-343 = "O dano entrou!"
22020-353 = "[ns] \"Ah! O oponente começou a atacar ferozmente de repente!\""
22020-355 = "Tudo bem. #nFique na defensiva no canto, leia os frames..."
22020-356 = "No momento em que o oponente atacar..."
22020-357 = "Pule para trás! #nE então, aplique um chute forte..."
22020-364 = "O personagem do oponente caiu!"
22020-365 = "Com isso, se ele não souber contra-atacar, ele nunca vai conseguir chegar perto."
22020-366 = "Pelo nível de habilidade do oponente, achei que ele provavelmente não conseguiria..."
22020-367 = "Dessa forma, se formos atacando os pontos fracos do oponente um por um..."
22020-368 = "Dá para vencer."
22020-386 = "「WINNER! Player UZQueen!」"
22020-388 = "Ufa..."
22020-393 = "Com isso... eu venci, né?"
22020-394 = "[s] \"Isso é... UZQueen...!\""
22020-395 = "Incrível! Você é incrível, Yuzu! #n\"Incrível\" nem chega perto de descrever o quão incrível você é!"
22020-396 = "Sim! Alice também! Eu estava assistindo tudo hipnotizada!"
22020-397 = "Não importa o quanto o oponente use trapaças,"
22020-398 = "significa que nós temos o nosso \"combo infinito\"..."
22020-399 = "Sim... se usar demais, o jogo perde a graça e, #nbem... entre amigos... acaba gerando brigas, então eu não gosto muito..."
22020-400 = "Mas se o oponente é um trapaceiro, acho que não preciso ter cerimônia... #ne isso também é um dos elementos do jogo."
22020-401 = "Entendi! O combo infinito também é parte dos elementos do jogo! #nAlice compreendeu!"
22020-402 = "Talvez, na revanche, ele use um cheat para anular o combo infinito, mas..."
22020-403 = "...mesmo assim, se lutarmos, podemos vencer."
22020-404 = "Sim... porque nós somos gamers."
22020-405 = "[s] \"A Yuzu é realmente incrível.\""
22020-406 = "Ah, s-sensei também... não, não é nada demais."
22020-407 = "Mas vencer no final foi muito satisfatório!"
22020-408 = "Já que terminamos a análise do jogo..."
22020-409 = "Irmã, vamos começar a reunião de planejamento?"
22020-410 = "...Hm, reunião de planejamento? Sobre o quê?"
22020-411 = "............"
22020-412 = "Irmãzinha!"
22020-414 = "I-I-Isso mesmo! #nEra isso mesmo!"
22020-415 = "C-Claro que vamos fazer!"
22020-419 = "(E assim, o cotidiano do Clube de Desenvolvimento de Jogos segue como sempre)"
22020-421 = "Próximo episódio: ~Alice, começando a aventura!~"
