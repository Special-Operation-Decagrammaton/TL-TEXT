[translation]
1000608-1 = "O mal-entendido do Sensei"
1000608-2 = "Kivotos - Área Residencial"
1000608-3 = "Um beco estreito na área residencial."
1000608-5 = "……Iori caiu em um buraco profundo que alguém cavou."
1000608-6 = "[s] \"………。\""
1000608-7 = "………。"
1000608-8 = "[s] \"……Por que você está aí dentro?\""
1000608-9 = "Você não está vendo!? Eu caí em uma armadilha!"
1000608-10 = "Enquanto eu perseguia o Grupo dos Capacetes que causou problemas dentro do distrito de Gehenna, fui subitamente guiada para um beco sem saída. Achei que tinha algo estranho, e então……."
1000608-11 = "Eles cavaram um buraco no chão! Que covardes!"
1000608-12 = "……Você acha estranho eu ter caído em uma armadilha tão óbvia?#nB-bem, isso é verdade, mas……!"
1000608-13 = "Não tinha como evitar!#nQuando encontro um alvo, não consigo prestar atenção em mais nada……."
1000608-14 = "Eu sou uma executora de sangue frio do Comitê Disciplinar de Gehenna,#nnão deixo nenhum alvo que entra no meu campo de visão escapar!"
1000608-16 = "……Esquece isso, até quando você pretende ficar aí olhando?#nMe ajude a sair daqui logo!"
1000608-17 = "[s] Pega o celular e tira uma foto da Iori."
1000608-19 = "O-o que você está fazendo! E-espere!"
1000608-21 = "N-não tire fotos! Eu disse para não tirar!"
1000608-22 = "Por que você está tirando foto de alguém em apuros, seu demônio! Pervertido!"
1000608-23 = "[s1] \"É que a Iori em apuros é tão fofa.\"\n[s2] \"É uma cena rara que não se vê todo dia, então não resisti.\""
1000608-24 = "O que você acha que é a situação difícil de alguém!? Eu disse que não pode, então não pode!"
1000608-25 = "O que você acha que é a situação difícil de alguém!? Eu disse que não pode, então não pode!"
1000608-27 = "Grr, se é assim…… droga……!"
1000608-28 = "Ugh…… realmente não consigo sair sozinha……."
1000608-29 = "Ah, quer saber, guarda isso na memória! Quando eu sair daqui, você não vai sair impune!"
1000608-31 = "Depois disso, observei a Iori se esforçando por um tempo antes de ajudá-la a sair."
1000608-34 = "……Depois de sair do buraco, ela chutou minha canela."
