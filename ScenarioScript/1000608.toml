[translation]
1000608-1 = "先生の誤解"
1000608-2 = "キヴォトス・住宅街"
1000608-3 = "住宅街の狭い路地裏。"
1000608-5 = "……誰かが掘った深い穴に、イオリが落ちていた。"
1000608-6 = "[s] \"………。\""
1000608-7 = "………。"
1000608-8 = "[s] \"……どうしてそんなところにいるの？\""
1000608-9 = "見て分からないのか！？罠に引っかかったんだよ！"
1000608-10 = "ゲヘナの自治区内でトラブルを起こしたヘルメット団を追跡してる途中に、急に行き止まりのところに誘導されて、何かあやしいと思ったら……。"
1000608-11 = "地面に穴を掘ってやがった！卑怯なやつらめ！"
1000608-12 = "……そんな分かりやすい罠に引っかかる方がおかしいって？#nそ、それはそうだけど……！"
1000608-13 = "仕方ないだろ！#n目標を見つけたらそれ以外は目に入らなくなっちゃって……。"
1000608-14 = "私はゲヘナ風紀委員会の冷血な実行委員だ、#n視界に入った目標は逃さない！"
1000608-16 = "……そんなことより、いつまでそこで見てるつもりだ？#n早くここから出るのを手伝って！"
1000608-17 = "[s] スマホを取り出して、イオリの写真を撮る。"
1000608-19 = "な、何をしてるんだ！ま、待て！"
1000608-21 = "と、撮るな！撮るなって！"
1000608-22 = "なんで困ってる人の写真を撮るんだ、この悪魔！ヘンタイ！"
1000608-23 = "[s1] \"困ってるイオリの姿があまりに可愛くて。\"\n[s2] \"普段は見られない珍しい光景だから、つい。\""
1000608-24 = "人の窮地を何だと思ってるんだ！？ダメといったらダメだって！"
1000608-25 = "人の窮地を何だと思ってるんだ！？ダメといったらダメだって！"
1000608-27 = "ぐ、こうなったら……くうっ……！"
1000608-28 = "うぅ……やっぱり自力で出るのは無理……。"
1000608-29 = "ああもう、覚えておけよ！ここから出たらただじゃおかないからな！"
1000608-31 = "その後、イオリが頑張る姿をじっくり見てから、引っ張り出してあげた。"
1000608-34 = "……穴から抜け出した後、すねを蹴られた。"
