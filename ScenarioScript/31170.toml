[translation]
31170-1 = "Episódio 17; O traidor de Trinity"
31170-2 = "Ainda assim, Nagi-chan, você parece bem empenhada, hein? Até emprestou uma instalação como esta."
31170-3 = "Aliás, como está indo o acampamento? Aproveitando que é longe, não estão fazendo nada divertido, não? Tipo, uma festa na piscina com todo mundo de roupa de banho!"
31170-4 = "[s] \"………。\""
31170-5 = "……Ah."
31170-6 = "Ficar tão na defensiva assim me magoa, sabia? Por mais que não pareça, eu sou sensível e me machuco fácil."
31170-7 = "A propósito, como está a comida por aqui? Quer que eu envie algo gostoso? Um bolo ou um chá, talvez?"
31170-11 = "……Fufu, desculpe. O Sensei também não gosta de preâmbulos muito longos, né?"
31170-12 = "Então, vamos direto ao ponto?"
31170-13 = "Ah, aliás, a Nagi-chan não sabe que estou aqui. Como pode ver, vim sozinha, sem nenhum acompanhante!"
31170-14 = "Sendo assim, voltando ao assunto principal —"
31170-15 = "……Sensei, a Nagi-chan não te fez nenhum acordo ou proposta?"
31170-16 = "[s] \"Acordo?\""
31170-17 = "Por exemplo, sei lá... pedir para você encontrar o \"traidor de Trinity\"."
31170-18 = "[s] \"…………。\""
31170-19 = "……Ufa, eu sabia. A Nagi-chan é exatamente como eu previ."
31170-20 = "Alguma informação detalhada? Ela não te deu nada e só pediu para \"encontrar\"?"
31170-21 = "E os motivos ou objetivos? A Nagi-chan não te explicou por que o Clube de Estudos Suplementares é composto por esses membros?"
31170-22 = "……Entendi. Poxa, não te contar nada e ainda colocar um fardo desses nas costas do Sensei..."
31170-23 = "[s] \"……Eu recusei essa proposta.\""
31170-24 = "……Eh? Sério? Por quê?"
31170-25 = "Porque não quer suspeitar das suas alunas? Ou será que —"
31170-26 = "[s] \"Acho que esse não é o meu papel.\""
31170-27 = "……Heeh?"
31170-28 = "Entendi, entendi... É verdade, o Sensei pertence ao \"Schale\". Para Trinity, você é um terceiro, alguém que não tem relação com isso."
31170-29 = "Faz sentido. Bem, para nós, a própria \"Trinity\" parece ser o centro do mundo, então é complicado..."
31170-30 = "……Essa é uma resposta interessante. Faz sentido, até que é refrescante. E, por outro lado, está correto."
31170-31 = "Então, Sensei, de que lado você está?"
31170-32 = "Se não está do lado de Trinity... está do lado de Gehenna? Do Conselho Estudantil Federal? Ou talvez, não esteja do lado de ninguém?"
31170-33 = "[s] \"Eu estou do lado das minhas alunas.\""
31170-34 = "……."
31170-35 = "Ah, ahh..."
31170-36 = "Do lado das alunas, é... Entendi... Isso foi inesperado..."
31170-37 = "……."
31170-38 = "Ei, então isso significa que, tipo..."
31170-39 = "Posso considerar que o Sensei está, de certa forma, do meu lado? Mesmo que eu esteja nessa posição, não deixo de ser uma aluna..."
31170-40 = "[s] \"Claro, eu também estou do lado da Mika.\""
31170-41 = "……Uau."
31170-42 = "Você diz coisas incríveis com tanta naturalidade, Sensei..."
31170-43 = "Você é um adulto, mesmo. Fico pensando se isso é só lábia... mas, é, fico genuinamente feliz. Ehehe..."
31170-44 = "Mas aceitar isso ao pé da letra é um pouco difícil... porque, ao mesmo tempo, pode ser interpretado como não estar do lado de ninguém, né?"
31170-45 = "Por isso, em vez de aceitar assim, vou te propor um acordo."
31170-46 = "[s] \"Um acordo...?\""
31170-51 = "Vou te contar quem é o \"traidor\" dentro do Clube de Estudos Suplementares."
31170-52 = "[s] \"……!\""
31170-53 = "O \"traidor de Trinity\" que a Nagi-chan está desesperadamente tentando encontrar para expulsar."
31170-54 = "Na verdade, o problema é um pouco mais complexo e maior do que isso..."
31170-55 = "Ficar só assistindo o Sensei ser manipulado pela Nagi-chan... eu me sinto um pouco culpada."
31170-56 = "……Aliás, fui eu quem te convidou para ser o sensei responsável pelo Clube de Estudos Suplementares. Você sabia disso?"
31170-57 = "[s] \"A Mika...?\""
31170-58 = "Sim, a Nagi-chan sempre foi contra isso. Dizia que usar um favor dessa forma não era certo, ou algo do tipo. Parece que houve muita coisa entre você e a Nagi-chan, não é?"
31170-59 = "……Bem, também houve muita coisa do meu lado."
31170-60 = "Eu queria uma terceira posição, que não fosse nem Trinity nem Gehenna."
31170-64 = "……Ah, você está falando da \"traidora\", não é?"
31170-65 = "A \"traidora de Trinity\" que está no Esquadrão de Aulas de Reforço, ela é……"
31170-69 = "……Shirasu Azusa."
31170-75 = "Você demorou."
31170-76 = "……."
31170-81 = "Como foi?"
31170-82 = "……Por enquanto, tudo conforme o planejado."
31170-84 = "[ns] \"A Azusa...?\""
31170-85 = "Sim. Talvez você já saiba, mas, na verdade, ela não estava em Trinity desde o início."
31170-86 = "Ela é uma aluna que veio de uma facção que se separou de Trinity há muito tempo... a \"Escola Filial de Arius\"."
31170-87 = "……Hmm, pensando bem, nem sei se podemos chamá-la de \"aluna\"."
31170-88 = "Será que podemos chamar de aluna alguém que não está \"aprendendo nada\"?"
31170-89 = "[s] \"Por que você está me contando isso?\""
31170-90 = "……Fufu."
31170-91 = "……Belo olhar, de verdade. Isso me deixa com expectativas."
31170-92 = "Não adianta tentar esconder as coisas... então, vou ser direta."
31170-101 = "Eu quero que você a proteja."
31170-103 = "Capítulo do Tratado de Eden; Continua no Capítulo 2"
