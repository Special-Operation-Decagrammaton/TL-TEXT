[translation]
31170-1 = "Episódio 17;O Traidor de Trinity"
31170-2 = "Mas, olha, a Nagi parece que tá bem empenhada, hein. Emprestou até uma instalação dessas."
31170-3 = "Aliás, e o acampamento, como tá? Aproveitando que é longe, não tão fazendo alguma coisa divertida, não? Tipo todo mundo numa festa na piscina de maiô!"
31170-4 = "[s] \"………\""
31170-5 = "……Aha."
31170-6 = "Ser tratada com tanta desconfiança assim me magoa, viu. Eu, por mais que não pareça, sou delicada e me machuco fácil, sabia?"
31170-7 = "Aliás, aqui, a comida e tal, tá tudo bem? Quer que eu mande alguma coisa gostosa? Tipo bolo, chá."
31170-11 = "……Ufu, desculpa. O Sensei também não curte muito introdução comprida, né?"
31170-12 = "Então, vamos ao assunto principal?"
31170-13 = "Ah. Aliás, a Nagi não sabe que eu tô aqui, viu? Como dá pra ver, é uma ação solo minha, sem acompanhante!"
31170-14 = "Então, reforçando o assunto principal――"
31170-15 = "……Sensei, a Nagi não te propôs algum tipo de acordo?"
31170-16 = "[s] \"Acordo?\""
31170-17 = "Por exemplo, deixa ver…… que você procure o \"traidor de Trinity\", esse tipo de coisa."
31170-18 = "[s] \"…………\""
31170-19 = "……Ufa, é o que eu imaginava. Ai, a Nagi, é tudo como eu previa."
31170-20 = "Ela te deu alguma informação detalhada? Ou foi nada disso, só te disseram \"procura\" e pronto?"
31170-21 = "E o motivo, o objetivo? Por que o Clube de Aulas de Reforço é composto justamente por esses membros; a Nagi não te explicou?"
31170-22 = "……Ah, sei. Ai, pôr um fardo desses nas costas do Sensei sem explicar nada……."
31170-23 = "[s] \"……Essa proposta, eu recusei.\""
31170-24 = "……Hã? É mesmo? Por quê?"
31170-25 = "Porque não quer desconfiar das suas próprias alunas? Ou――"
31170-26 = "[s] \"É que isso não é bem o meu papel.\""
31170-27 = "……Ah é?"
31170-28 = "Sei, sei…… de fato, o Sensei é da \"Schale\". Um terceiro, por natureza sem relação com Trinity."
31170-29 = "Sei. Bom, pra gente, a própria \"Trinity\" sempre foi tipo o centro do mundo, então, sei lá……."
31170-30 = "……Que resposta interessante. Sei, até que é refrescante. Isso também tem lá o seu acerto."
31170-31 = "Então, o Sensei é aliado de quem?"
31170-32 = "Se não é aliado de Trinity…… é aliado de Gehenna? Do Conselho Estudantil Geral? Ou, quem sabe, não é aliado de ninguém……?"
31170-33 = "[s] \"Eu sou aliado dos alunos.\""
31170-34 = "……."
31170-35 = "A-aah……."
31170-36 = "Aliado dos alunos, é…… sei…… isso eu não esperava……."
31170-37 = "……."
31170-38 = "É-é que…… então, isso quer dizer, é……."
31170-39 = "Dá pra pensar que o Sensei é, em tese, meu aliado……? Eu também, apesar dessa minha posição, não deixo de ser uma aluna, mas……."
31170-40 = "[s] \"Claro; também sou aliado da Mika.\""
31170-41 = "……Uau."
31170-42 = "Você solta uma coisa dessas assim, tão de leve, Sensei……."
31170-43 = "Que adulto. \"Será que é oratória?\", bate esse pensamento também, mas…… sim, fiquei um pouquinho sinceramente feliz. Ehehe……."
31170-44 = "Mas, aceitar isso ao pé da letra também é meeeio difícil…… porque isso, ao mesmo tempo, dá pra interpretar como não ser aliado de ninguém, né?"
31170-45 = "Então, em vez de aceitar assim, eu é que vou propor um acordo ao Sensei."
31170-46 = "[s] \"Um acordo……?\""
31170-51 = "Vou te contar quem é o \"traidor\" que está dentro do Clube de Aulas de Reforço."
31170-52 = "[s] \"……!\""
31170-53 = "O \"traidor de Trinity\" de que a Nagi fala, aquela pessoa que ela tá agora desesperada pra achar e expulsar."
31170-54 = "Na verdade, tem um problema um pouco mais complexo e maior por trás, mas……."
31170-55 = "Ficar agora, assim, só olhando o Sensei ser levado de um lado pro outro pela Nagi…… isso me dá um pouco de pena."
31170-56 = "……Afinal, quem convidou o Sensei como professor responsável do Clube de Aulas de Reforço fui eu. Você sabia disso?"
31170-57 = "[s] \"A Mika……?\""
31170-58 = "Sim, embora a Nagi tenha sido sempre contra. Que usar assim um favor tão valioso não sei o quê, e tal. Aconteceu alguma coisa entre você e a Nagi, né?"
31170-59 = "……Bom, do meu lado também tem toda uma história."
31170-60 = "Eu queria uma terceira posição, que não fosse nem Trinity nem Gehenna."
31170-64 = "……Ah, a gente tava na história do \"traidor\", né."
31170-65 = "O \"traidor de Trinity\" que está no Clube de Aulas de Reforço é……"
31170-69 = "……a Azusa Shirasu."
31170-75 = "Você demorou."
31170-76 = "……."
31170-81 = "E o andamento?"
31170-82 = "……Por ora, conforme o plano."
31170-84 = "[ns] \"A Azusa……?\""
31170-85 = "Sim. Talvez você já saiba, mas aquela menina, na verdade, não estava em Trinity desde o começo."
31170-86 = "Ela é uma aluna vinda da chamada facção dissidente que se separou de Trinity muito tempo atrás…… da \"Filial de Arius\"."
31170-87 = "……Hmm, pensando bem, não sei se dá pra chamar de \"aluna\", viu."
31170-88 = "Uma aluna que não tem esse negócio de \"aprender algo\", dá pra chamar de aluna?"
31170-89 = "[s] \"Qual é o motivo de você me contar isso?\""
31170-90 = "……Ufu."
31170-91 = "……Que olhar bom, de verdade. Fico com expectativa."
31170-92 = "Ficar disfarçando isso e aquilo não parece adiantar…… sim, deixa eu dizer de forma direta."
31170-101 = "Eu quero que você proteja aquela menina."
31170-103 = "Arco do Tratado do Éden. Continua no Capítulo 2"
