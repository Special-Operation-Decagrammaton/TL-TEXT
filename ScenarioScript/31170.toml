[translation]
31170-1 = "Episódio 17: A Traidora de Trinity"
31170-2 = "Nossa, Nagi-chan, você tá bem envolvida nisso, hein? Até emprestou uma instalação dessas."
31170-3 = "Aliás, como tá o acampamento? Como é longe, será que elas não tão fazendo alguma safadeza? Tipo uma pool party peladinha com todo mundo！"
31170-4 = "[s] \"………。\""
31170-5 = "……Ahaha."
31170-6 = "Fico chateada de você me olhar com tanta desconfiança～. Eu até pareço delicada e sensível, sabia?"
31170-7 = "Aliás, a comida por aí tá boa? Quer que eu mande alguma coisa gostosa? Bolo, chá, essas coisas."
31170-11 = "……Fufu, desculpa. Sensei também não gosta de enrolação longa, né?"
31170-12 = "Então, vamos direto ao ponto?"
31170-13 = "Ah. Aliás, a Nagi-chan não sabe que eu tô aqui, tá? Como você pode ver, vim sozinha, sem acompanhante！"
31170-14 = "Então, voltando ao assunto――"
31170-15 = "……Sensei, a Nagi-chan não te fez nenhuma proposta ou negociação?"
31170-16 = "[s] \"Negociação？\""
31170-17 = "Tipo… «Encontre a traidora de Trinity», algo assim."
31170-18 = "[s] \"…………。\""
31170-19 = "……Fuu, como esperado. A Nagi-chan é tão previsível."
31170-20 = "Ela te deu alguma informação detalhada? Ou só te mandou «procurar» sem explicar nada?"
31170-21 = "Motivo? Objetivo? Por que o Clube de Reforço foi montado com esses membros específicos? Ela não te contou nada disso?"
31170-22 = "……Entendi. Nossa, deixar o Sensei carregando um peso desses sem explicar nada… que cruel."
31170-23 = "[s] \"……Eu recusei a proposta dela.\""
31170-24 = "……Eh? Sério? Por quê?"
31170-25 = "Porque não quer suspeitar das suas próprias alunas? Ou――"
31170-26 = "[s] \"Porque isso não é o meu papel.\""
31170-27 = "……Hee?"
31170-28 = "Entendi, entendi～…… Realmente, o Sensei pertence à Schale, uma terceira força que não tem nada a ver com Trinity."
31170-29 = "Faz sentido. Pra gente de Trinity, a própria Trinity parece o centro do mundo, então é estranho, mas…"
31170-30 = "……Resposta interessante. Refrescante. De certa forma, faz sentido."
31170-31 = "Então, de quem você é aliado, Sensei?"
31170-32 = "Se não é de Trinity… é de Gehenna? Do Conselho Estudantil Geral? Ou… de ninguém?"
31170-33 = "[s] \"Eu sou aliado das alunas.\""
31170-34 = "……。"
31170-35 = "Ah, aah～……"
31170-36 = "Aliado das alunas, né～…… Entendi～…… Isso eu não esperava…"
31170-37 = "……。"
31170-38 = "A-aquele… quer dizer que… eu também posso considerar que você é meu aliado? Mesmo eu estando nessa posição, ainda sou uma aluna…"
31170-39 = "[s] \"Claro, sou aliado da Mika também.\""
31170-40 = "……Uau."
31170-41 = "Você fala coisas pesadas com tanta naturalidade, Sensei……"
31170-42 = "É coisa de adulto? Parte de mim pensa isso, mas… uhum, fiquei um pouco genuinamente feliz. Ehehe……"
31170-43 = "Mas aceitar isso na cara é um pouco difícil～…… porque também pode ser interpretado como «não sou aliado de ninguém», né?"
31170-44 = "Então, em vez de aceitar assim, vou te fazer uma proposta."
31170-45 = "[s] \"Proposta……？\""
31170-51 = "Vou te contar quem é a «traidora» dentro do Clube de Reforço."
31170-52 = "[s] \"……っ！\""
31170-53 = "A «traidora de Trinity» que a Nagi-chan tá desesperada pra encontrar e expulsar."
31170-54 = "Na verdade, o problema é um pouco mais complicado e maior, mas…"
31170-55 = "Ficar só olhando o Sensei ser manipulado pela Nagi-chan… me dá uma certa pena."
31170-56 = "……No fim das contas, quem te convidou pro Clube de Reforço como supervisor fui eu. Você sabia disso?"
31170-57 = "[s] \"Foi você……？\""
31170-58 = "Sim, a Nagi-chan era totalmente contra. Dizia que usar o favor dela assim não era certo. Parece que rolou bastante coisa entre você e a Nagi-chan, né?"
31170-59 = "……Bom, eu também tenho meus motivos."
31170-60 = "Eu queria uma terceira força que não fosse nem Trinity nem Gehenna."
31170-64 = "……Ah, era sobre a «traidora», né."
31170-65 = "A «traidora de Trinity» dentro do Clube de Reforço é……"
31170-69 = "……[ruby=しらす]Shirasu[/ruby] Azusa."
31170-75 = "Você demorou."
31170-76 = "……。"
31170-81 = "Como foi?"
31170-82 = "……Tudo conforme o plano."
31170-84 = "[ns] \"Azusa é……？\""
31170-85 = "Sim. Você pode até saber, mas ela não é originalmente de Trinity."
31170-86 = "Ela é de uma facção que se separou de Trinity há um tempo… a «Arius Branch School»."
31170-87 = "……Uhum, pensando bem, nem sei se posso chamar ela de «aluna»."
31170-88 = "Alguém que não «aprende» nada, pode ser chamada de aluna?"
31170-89 = "[s] \"Por que você tá me contando isso？\""
31170-90 = "……Fufu."
31170-91 = "……Que olhos bons. Tô ficando animada."
31170-92 = "Não adianta tentar enrolar… então vou direto ao ponto."
31170-101 = "Quero que você proteja aquela menina."
31170-103 = "Arco: Tratado de Eden; Continua no capítulo 2"