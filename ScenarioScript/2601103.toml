[translation]
2601103-1 = "意外な共通点"
2601103-2 = "（佐天から連絡をもらい、市場にやって来た）"
2601103-8 = "[ns1] \"あっちかな……？\"\n[ns2] 声がした方へ向かう。"
2601103-14 = "……んん。"
2601103-15 = "んむむむむむ……。"
2601103-16 = "[s3] \"待たせてごめんね。\"\n[s4] \"何があったの？\""
2601103-19 = "あ、先生。来てくれてありがとうございます！"
2601103-20 = "それがですね、あれを見てほしいんですが……"
2601103-25 = "1人呼ぶだけなのに、どんだけ時間かかってるんだい！"
2601103-26 = "いやいや、「麻雀が打てる人」となると、そう簡単には見つからないもんじゃないか？"
2601103-27 = "はあ、まったく。これも本屋のおやじが抜けちまったから……。"
2601103-28 = "麻雀は4人メンツを集める方が、[ruby=やくまん]役満[/ruby]より難しいくらいだしなぁ。"
2601103-29 = "じゃあ、このままお開きにするか？本当は、もうちょっと遊んできたかったんだが……。"
2601103-31 = "[ns5] \"……麻雀？\"\n[ns6] \"あれを見てたの？\""
2601103-34 = "はい。あたしたちの世界にも同じゲームがあって……"
2601103-35 = "しかも、ルールも一緒。"
2601103-36 = "よく考えてみたら、あたしたちって普通に会話できてますし、生活スタイルも都市の構造も意外と似てるんですよね。"
2601103-37 = "違うようでいて、似ている。……それが不思議だなあって。"
2601103-38 = "……えっ？"
2601103-39 = "ああ、麻雀のルールですか。#n聞いていたら分かりますよ。"
2601103-40 = "あたしも麻雀、打てますからね。よくネト麻で打ってましたし。"
2601103-41 = "……なんだってっ！？"
2601103-45 = "……ん？"
2601103-46 = "そこのお嬢さん！今、なんと！？"
2601103-47 = "麻雀を打てるって……それは本当かい！？"
2601103-48 = "時間は大丈夫かい？#n半荘一戦で構わんから、私たちと打ってくれんか？"
2601103-49 = "は、はいっ？いやぁ、そんな急に言われても……"
2601103-50 = "頼む！この通りだ！#n最後にもう半荘打ちたかったんだが、人が見つからなくてな……！"
2601103-51 = "そうなんだ。ここで解散したら、モヤモヤして麻雀で頭がいっぱいになりそうで。#nモヤモヤして夜しか眠れそうもない！"
2601103-52 = "うーん……"
2601103-53 = "どうしよう……"
2601103-54 = "[s] 止めに入る。"
2601103-55 = "……あっ。"
2601103-56 = "あたしは大丈夫です。嫌とかではなくて、むしろ……"
2601103-60 = "せっかくですし、打たせてもらっていいですか？"
2601103-61 = "おお！本当か！！助かったよ、お嬢さん！！"
2601103-67 = "よし、早く牌を混ぜるぞ！待たせるわけにはいかないだろう！"
2601103-68 = "あい、分かった分かった。#nお嬢さん、あまり緊張せんでもいいぞ？"
2601103-72 = "……ふーん？"
2601103-73 = "舐められたもんですね。"
2601103-74 = "ふっふっふ……その言葉、後悔させてあげますよ！"
2601103-75 = "……！よし、そうこなくっちゃな！！"
2601103-76 = "おし、始めようじゃないか！"
2601103-78 = "（市場の一角で、佐天と商人の対局が始まる）"
2601103-79 = "（……意外にも白熱し、気づけば半荘4戦目に突入していた）"
2601103-90 = "……ツモ！！"
2601103-91 = "リーヅモピンフ、ジュンチャンサンショクダブドラ……ドラドラ！"
2601103-92 = "親の[ruby=サンバイマン]三倍満[/ruby]で12000ALL！"
2601103-93 = "よっし！あたしのトップで終局ですね！"
2601103-94 = "さ、早く混ぜて次に行きましょ！"
2601103-95 = "お、お嬢さん……そろそろ私たちは……"
2601103-96 = "あ、あぁ。もともと、最後に軽く半荘を流そうと思ってただけでな……"
2601103-97 = "こ、これ以上は体力が……年には勝てんくて……"
2601103-98 = "そんな……！楽しくなってきたところだったのに、やめちゃうんですか！？"
2601103-99 = "まだまだ勝負はこれからですよ！"
2601103-100 = "うう……"
2601103-101 = "だ、誰か……"
2601103-105 = "[ns] \"……。\""
2601103-107 = "[ns] 佐天を連れ出す。"
2601103-109 = "（時間を理由に、佐天を連れて行く）"
2601103-110 = "（……帰り際に振り返ると、商人たちが感謝の眼差しを送ってきた）"
