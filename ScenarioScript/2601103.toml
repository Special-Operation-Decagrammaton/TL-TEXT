[translation]
2601103-1 = "Pontos em comum inesperados"
2601103-2 = "（Recebi uma mensagem da Saten e vim ao mercado）"
2601103-8 = "[ns1] \"É por ali...?\"\n[ns2] Vou na direção de onde veio a voz."
2601103-14 = "……Hmm."
2601103-15 = "Hmmmmmmm……."
2601103-16 = "[s3] \"Desculpe pela espera.\"\n[s4] \"O que aconteceu?\""
2601103-19 = "Ah, Sensei. Obrigado por vir!"
2601103-20 = "É que, eu queria que você desse uma olhada naquilo ali……"
2601103-25 = "Já faz tanto tempo que estamos tentando chamar uma pessoa, quanto tempo mais vai levar?!"
2601103-26 = "Ora, ora, não é tão fácil assim encontrar alguém que saiba jogar Mahjong, não é?"
2601103-27 = "Ah, francamente. Tudo porque o dono da livraria foi embora……."
2601103-28 = "Juntar quatro pessoas para jogar Mahjong é quase mais difícil do que tirar um Yakuman."
2601103-29 = "Então, vamos encerrar por aqui? Na verdade, eu queria ter jogado um pouco mais……."
2601103-31 = "[ns5] \"……Mahjong?\"\n[ns6] \"Vocês estavam olhando aquilo?\""
2601103-34 = "Sim. No nosso mundo também existe o mesmo jogo……"
2601103-35 = "E as regras são iguais."
2601103-36 = "Pensando bem, conseguimos conversar normalmente, e nosso estilo de vida e a estrutura da cidade são surpreendentemente parecidos."
2601103-37 = "Parece diferente, mas é igual. ……É algo curioso."
2601103-38 = "……Eh?"
2601103-39 = "Ah, as regras do Mahjong? #nEu entendo se eu ouvir."
2601103-40 = "Eu também sei jogar Mahjong. Eu costumava jogar bastante online."
2601103-41 = "……O que você disse!?"
2601103-45 = "……Hm?"
2601103-46 = "Ei, mocinha! O que você disse agora há pouco!?"
2601103-47 = "Você sabe jogar Mahjong…… é verdade mesmo!?"
2601103-48 = "Você tem tempo? #nNão precisa ser muito, só uma partida de Hanchan, você não jogaria com a gente?"
2601103-49 = "H-han? Bem, mesmo que me peça assim de repente……"
2601103-50 = "Por favor! Eu te imploro! #nEu queria jogar mais uma partida antes de acabar, mas não conseguia encontrar ninguém……!"
2601103-51 = "É verdade. Se a gente se separar aqui, vou ficar inquieto e só vou conseguir pensar em Mahjong. #nVou ficar tão inquieto que só vou conseguir dormir à noite!"
2601103-52 = "Hmm……"
2601103-53 = "O que eu faço……"
2601103-54 = "[s] Intervir."
2601103-55 = "……Ah."
2601103-56 = "Eu não me importo. Não é que eu não queira, na verdade……"
2601103-60 = "Já que estamos aqui, posso jogar com vocês?"
2601103-61 = "Oh! É sério!! Você salvou a gente, mocinha!!"
2601103-67 = "Certo, vamos embaralhar as peças logo! Não podemos fazer ninguém esperar!"
2601103-68 = "Tá, tá, entendi. #nMocinha, não precisa ficar tão nervosa, viu?"
2601103-72 = "……Hmm?"
2601103-73 = "Estão me subestimando, hein."
2601103-74 = "Fufufu…… vou fazer vocês se arrependerem dessas palavras!"
2601103-75 = "……! Isso aí, é assim que se fala!!"
2601103-76 = "Certo, vamos começar!"
2601103-78 = "（Em um canto do mercado, a partida entre Saten e os comerciantes começa）"
2601103-79 = "（……Surpreendentemente, a partida ficou acirrada e, quando percebemos, já estávamos na quarta rodada de Hanchan）"
2601103-90 = "……Tsumo!!"
2601103-91 = "Riichi, Tsumo, Pinfu, Junchan, Sanshoku, Dabudora…… Dora Dora!"
2601103-92 = "Sanbaiman do dealer, 12000 para todos!"
2601103-93 = "Isso! Ganhei a partida!"
2601103-94 = "Vamos, embaralhem logo para a próxima!"
2601103-95 = "M-moça... já está na hora de nós..."
2601103-96 = "A-ah. Bem, eu só pretendia jogar uma última partida rápida para encerrar..."
2601103-97 = "M-mais do que isso e minha energia... não consigo vencer a idade..."
2601103-98 = "Não pode ser...! Estava ficando tão divertido, vocês vão parar agora!?"
2601103-99 = "A disputa está só começando!"
2601103-100 = "Uuu..."
2601103-101 = "A-alguém..."
2601103-105 = "[ns] \"...\""
2601103-107 = "[ns] Levar Saten embora."
2601103-109 = "(Usando o horário como desculpa, levo Saten embora)"
2601103-110 = "(...Ao olhar para trás enquanto íamos embora, os mercadores me lançaram olhares de gratidão)"
