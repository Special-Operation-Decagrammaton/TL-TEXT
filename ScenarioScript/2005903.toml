[translation]#[Não revisado] - Filipe 09/06/26
2005903-1 = "Diabinha e a compradora"
2005903-2 = "(Mais tarde, à tarde, foi com Mutsumi ao Mercado Negro)"
2005903-7 = "É por aqui, Sensei! Rápido, vamos!"
2005903-10 = "[ns] \"Fazia tempo que não vinha a uma conveniência no Mercado Negro.\""
2005903-11 = "Disseram que chegaram umas bombas legais."
2005903-12 = "Chama granada de fumaça colorida. Diz que tem um efeito inseticida incrível, sabia?"
2005903-13 = "Com uma dessas, acaba com todos os mosquitos do quarto."
2005903-14 = "E aí, não acha super útil?"
2005903-15 = "[s] \"Uau! Vou comprar uma também?\""
2005903-16 = "Kufufu. Viu? É legal, né? Vou comprar um monte."
2005903-17 = "Dizem que a embalagem é colorida..."
2005903-18 = "... Hã?"
2005903-23 = "Hmm... cadê?"
2005903-24 = "[s] \"Também não vejo bombas normais.\""
2005903-25 = "Estão procurando bombas?"
2005903-26 = "Acho que não tem. A Gangue do Capacete comprou tudo."
2005903-27 = "[s] \"A Gangue do Capacete?\""
2005903-28 = "Sim. Só sobraram essas imitações."
2005903-29 = "Se quiser, posso reservar algumas quando chegar o próximo lote."
2005903-30 = "Mas vai sair mais caro, haha."
2005903-31 = "Ahaha, melhor não."
2005903-32 = "Não quero comprar a esse ponto."
2005903-33 = "Vamos, Sensei. Parece que não tem bombas mesmo."
2005903-37 = "Kufufu, sinto cheiro de caso."
2005903-38 = "Que tal a gente investigar enquanto pergunta por aí?"
2005903-47 = "(Depois de juntar as informações...)"
2005903-49 = "É verdade que a Gangue do Capacete comprou todas as bombas."
2005903-50 = "E estão revendendo."
2005903-51 = "Como bomba é item de consumo, todo mundo está comprando as revendidas a contragosto."
2005903-52 = "Se continuar assim..."
2005903-53 = "Vai ficar cheio de revendedor! Não dá para aceitar isso, né?"
2005903-54 = "[s] \"Revenda de bomba, hein...\""
2005903-55 = "Sensei! Vamos encontrar esses caras juntos!"
2005903-56 = "Tive uma ideia!"
2005903-58 = "(Um tempo depois, em certo dia...)"
2005903-60 = "Depósito logístico secreto da Gangue do Capacete"
2005903-61 = "Já está na hora..."
2005903-62 = "Kihi! Não sei quem é o otário, mas é uma sorte. Vai comprar tudo o que a gente tem!"
2005903-63 = "Não baixe a guarda. Pode ser de outra organização."
2005903-67 = "Certo, aí está."
2005903-71 = "[ns] \"Por aqui, senhorita.\""
2005903-75 = "..."
2005903-76 = "Ca... cara de rica, hein?"
2005903-77 = "Ei, você é o comprador?"
2005903-78 = "[s1] \"Insolente!\"\n[s2] \"Esta é a senhorita Capella, da Família Cappellini!\""
2005903-81 = "Família Cappellini? Existe essa?"
2005903-82 = "E o que uma senhorita dessa quer com uma porrada de bombas?"
2005903-83 = "Ah. Que pergunta idiota."
2005903-84 = "O que [ruby=eu]esta nobre[/ruby] vai fazer não é da sua conta."
2005903-85 = "Vocês só têm que entregar a mercadoria."
2005903-86 = "I-Isso é verdade, mas..."
2005903-87 = "Se sabe, então entregue logo. Quero sair deste lugar imundo o mais rápido possível."
2005903-88 = "Argh, que mulher irritante."
2005903-89 = "Que cara chata!"
2005903-90 = "Tá bom. Primeiro, mostre o dinheiro!"
2005903-91 = "Humpf, que gente desconfiada."
2005903-95 = "[USERNAME], a bolsa."
2005903-96 = "[s] \"Sim, senhorita.\""
2005903-101 = "Isso é verdadeiro?"
2005903-102 = "Claro. Você não consegue distinguir?"
2005903-103 = "Pode ser só a superfície! Entrega aí, a gente confere!"
2005903-104 = "[s] \"Pare. Agora é a nossa vez.\""
2005903-105 = "Sim. É o nosso turno."
2005903-106 = "Mostre a mercadoria. O dinheiro só depois de confirmarmos."
2005903-107 = "Humpf, está bem."
2005903-113 = "(Ao retirar o pano, havia uma pilha de bombas)"
2005903-115 = "Podemos pegar uma?"
2005903-116 = "O-O que fazemos?"
2005903-117 = "Deixa ela pegar uma."
2005903-118 = "E-está bem!"
2005903-126 = "Confirmamos. É verdadeira."
2005903-130 = "Kufufu♪ Sensei, que sorte, as bombas estão todas juntas."
2005903-131 = "Bombas amontoadas num espaço apertado... me lembra alguma coisa, não?"
2005903-132 = "[s3] \"Entendo...\"\n[s4] \"É melhor eu me esconder?\""
2005903-135 = "Na contagem de três, começo?"
2005903-136 = "Três, dois..."
2005903-137 = "Ei! O que vocês estão cochichando?"
2005903-138 = "Um!"
2005903-139 = "Hã?"
2005903-144 = "S-sua louca!? Aqui tem um monte de bomba! Se explodir...!"
2005903-145 = "Tudo vai explodir!"
2005903-146 = "Mas não tem problema. É uma 'mensagem'!"
2005903-147 = "A-aquela... desde o começo você nunca quis comprar...!"
2005903-152 = "G-gwaah... Fujam todos...!"
2005903-159 = "Kufufu! Revendedores e bombas, tudo de uma vez!"
2005903-160 = "Agora nenhum idiota vai tentar revender bombas."
2005903-163 = "Ah, foi divertido."
2005903-164 = "Não é, Sensei?"
2005903-165 = "[s5] \"Sim, senhorita.\"\n[s6] \"Assim, você pode continuar com seu hobby tranquilamente.\""
2005903-168 = "Ahahaha! A sua imitação de mordomo é muito engraçada."
2005903-170 = "(Depois de dar uma geral no local, foram embora)"
2005903-171 = "(Tomara que tudo se resolva...)"