[translation]
2005903-1 = "The Little Devil and the Buyer"
2005903-2 = "(And in the evening, I visited the black market with Mutsuki.)"
2005903-7 = "Over here, Sensei! Let's go, hurry!"
2005903-10 = "[ns] \"It's been a while since I've been to the black market convenience store.\""
2005903-11 = "They say they've got some interesting bombs in stock~"
2005903-12 = "They're called Rainbow Smoke Bombs. #nApparently, they're super effective against insects?"
2005903-13 = "One of these and every mosquito in the room is wiped out!"
2005903-14 = "What do you think? Pretty convenient, right?"
2005903-15 = "[s] \"Oh! Maybe I should buy some too?\""
2005903-16 = "Hehehe. See? Interesting, right? #nLet's buy a bunch♪"
2005903-17 = "I heard the packaging is rainbow-colored, but..."
2005903-18 = "...Huh?"
2005903-23 = "Hmm...? #nThey're nowhere to be found."
2005903-24 = "[s] \"They don't have any regular bombs either.\""
2005903-25 = "Are you perhaps looking for bombs?"
2005903-26 = "That's probably impossible. #nThe Helmet Gang bought them all up."
2005903-27 = "[s] \"The Helmet Gang did?\""
2005903-28 = "Yes. All that's left are the imitations over there."
2005903-29 = "Would you like me to set some aside for you when we get a restock?"
2005903-30 = "It'll be a bit more expensive, though. Haha."
2005903-31 = "Ahaha. I'll pass, thanks♪"
2005903-32 = "I don't think I want them that badly~"
2005903-33 = "Let's go, Sensei. #nIt seems it's true that they're out of bombs."
2005903-37 = "Hehehe, I smell a case brewing, don't you~?"
2005903-38 = "Maybe I should do some digging while I'm at it?"
2005903-47 = "(After summarizing the information gathered from the investigation...)"
2005903-49 = "It seems it's true that the Helmet Gang bought up all the bombs."
2005903-50 = "They're reselling them."
2005903-51 = "Bombs are consumables, so it looks like everyone is forced to buy the overpriced ones."
2005903-52 = "If things keep going like this..."
2005903-53 = "It'll be nothing but scalpers! #nIsn't that just unforgivable?"
2005903-54 = "[s] \"Reselling bombs, huh...\""
2005903-55 = "Sensei! Let's find those guys together!"
2005903-56 = "I've got a great idea!"
2005903-58 = "(A while later, one day...)"
2005903-60 = "Helmet Gang's Secret Logistics Warehouse"
2005903-61 = "It's about time..."
2005903-62 = "Heh! Don't know who the sucker is, but this is a godsend. Buying our whole stock!"
2005903-63 = "Don't let your guard down. It might be someone from another organization."
2005903-67 = "Alright, they're here."
2005903-71 = "[ns] \"This way, my lady.\""
2005903-75 = "..."
2005903-76 = "Oh... they look rich, don't they?"
2005903-77 = "Hey, are you the buyer we heard about?"
2005903-78 = "[s1] \"How rude!\"\n[s2] \"This is Lady Capella of the Cappellini Family!\""
2005903-81 = "The Cappellini Family...? Who are they?"
2005903-82 = "So, what does a lady from a place like that want with a mountain of bombs?"
2005903-83 = "Ugh. What a stupid question."
2005903-84 = "What I do is none of your concern, is it?"
2005903-85 = "You just need to hand over the goods."
2005903-86 = "W-well, I guess so, but..."
2005903-87 = "If you understand, hurry up and hand them over. #nI want to get out of this filthy place as soon as possible."
2005903-88 = "Ugh, what an annoying woman."
2005903-89 = "What a nasty person!"
2005903-90 = "Enough. Show us the money first!"
2005903-91 = "Hmph. Suspicious cowards."
2005903-95 = "[USERNAME], the bag."
2005903-96 = "[s] \"Yes, my lady.\""
2005903-101 = "This is real, right?"
2005903-102 = "Obviously. Don't tell me you can't even tell the difference?"
2005903-103 = "It might just be the surface that's real! Hand it over, we'll check it ourselves!"
2005903-104 = "[s] \"Stop. It's our turn now.\""
2005903-105 = "Indeed. It's our turn."
2005903-106 = "Show us the goods. The money comes after we've finished our inspection."
2005903-107 = "Hmph, fine."
2005903-113 = "(As the cloth was pulled away, a massive pile of bombs was revealed in the box.)"
2005903-115 = "May I pick one up?"
2005903-116 = "W-what do we do?"
2005903-117 = "Just let her take one."
2005903-118 = "F-fine, go ahead!"
2005903-126 = "I've confirmed it. It's definitely the real deal."
2005903-130 = "Hehehe♪ Sensei, thanks to them, all the bombs are in one place."
2005903-131 = "A huge pile of bombs packed into a tight space... doesn't that look familiar?"
2005903-132 = "[s3] \"I see...\"\n[s4] \"Should I go hide?\""
2005903-135 = "I'll start when I count to three, okay?"
2005903-136 = "Three, two..."
2005903-137 = "Hey! What are you two whispering about—"
2005903-138 = "One!"
2005903-139 = "Huh?"
2005903-144 = "Y-you idiots!? There's a mountain of bombs right here! If you do that...!"
2005903-145 = "They're all going to blow up!"
2005903-146 = "But that doesn't matter. This is a 'message'!"
2005903-147 = "Ah, that girl...! She never intended to buy the bombs from the start...!!"
2005903-152 = "G-gah...! Everyone, run...!!"
2005903-159 = "Hehehe! Caught the scalpers and the bombs in one fell swoop!"
2005903-160 = "With this, no more idiots should try to resell bombs."
2005903-163 = "Ah~ that was fun."
2005903-164 = "Right, Sensei?"
2005903-165 = "[s5] \"Yes, my lady.\"\n[s6] \"Now you can continue your hobby in peace.\""
2005903-168 = "Ahahaha! Your butler impression is super funny."
2005903-170 = "(After cleaning up the scene, we left the area.)"
2005903-171 = "(I hope this solves things for good...)"