[translation]
2005903-1 = "小悪魔とバイヤー"
2005903-2 = "（そして夕方、ムツキとブラックマーケットを訪ねた）"
2005903-7 = "こっちだよ、先生！早く行こ！"
2005903-10 = "[ns] \"ブラックマーケットのコンビニ、久しぶりかも。\""
2005903-11 = "面白い爆弾が入荷されたんだって～"
2005903-12 = "レインボー煙幕弾ってやつ。#n殺虫効果が凄いらしいよ？"
2005903-13 = "これ一発で部屋中の蚊が全滅！"
2005903-14 = "どう？すっごい便利だと思わない？"
2005903-15 = "[s] \"おお！私も買おうかな？\""
2005903-16 = "くふふっ。ねっ、面白いでしょ？#nいっぱい買ってこ♪"
2005903-17 = "虹色のパッケージらしいんだけど……。"
2005903-18 = "……あれ？"
2005903-23 = "ん～……？#nどこにもないなー。"
2005903-24 = "[s] \"普通の爆弾も置いてないね。\""
2005903-25 = "もしかして、爆弾を探してるんですか？"
2005903-26 = "多分無理ですよ。#nヘルメット団が買い占めちゃったので。"
2005903-27 = "[s] \"ヘルメット団が？\""
2005903-28 = "ええ。あとはそこにある模造品だけです。"
2005903-29 = "よければ再入荷時に何個か取り置きしておきましょうか？"
2005903-30 = "その分割高にはなりますけどね。ははっ。"
2005903-31 = "あははっ。遠慮しとくね♪"
2005903-32 = "そこまでして買いたくはないかな～"
2005903-33 = "行こっか、先生。#n爆弾がないのは本当みたいだし。"
2005903-37 = "くふふっ、なんだか事件の匂いがするねぇ～？"
2005903-38 = "調査ついでに聞き込みでもしてみよっかな？"
2005903-47 = "（聞き込みの情報をまとめた結果……）"
2005903-49 = "ヘルメット団が爆弾を買い占めてるのは本当みたい。"
2005903-50 = "それを転売してるんだって。"
2005903-51 = "爆弾は消耗品だから、みんな泣く泣く転売品を買ってるみたいだよ。"
2005903-52 = "このままじゃ……。"
2005903-53 = "転売屋だらけになっちゃう！#nそんなの許せるわけなくない？"
2005903-54 = "[s] \"爆弾の転売、か……。\""
2005903-55 = "先生！一緒に奴らを見つけよう！"
2005903-56 = "私、いい考えがあるの！"
2005903-58 = "（しばらくして、とある日……）"
2005903-60 = "ヘルメット団の秘密物流倉庫"
2005903-61 = "そろそろ時間だな……。"
2005903-62 = "きひっ！どんなマヌケか知らねえが、ありがてえ話だ。うちのモン全部買ってくれるなんてな！"
2005903-63 = "油断するな。他の組織の奴かもしれないぞ。"
2005903-67 = "よし、来たぞ。"
2005903-71 = "[ns] \"こちらです、お嬢様。\""
2005903-75 = "……。"
2005903-76 = "お……見るからに金持ちっぽいな？"
2005903-77 = "おい、お前が例の購入者か？"
2005903-78 = "[s1] \"無礼者め！\"\n[s2] \"こちらはあのカッペリーニ・ファミリーの、カペラお嬢様だぞ！\""
2005903-81 = "カッペリーニ・ファミリー……？そんなのいたか？"
2005903-82 = "で、そんなとこのお嬢様が大量の爆弾をどうするつもりだ？"
2005903-83 = "はあ。くだらない質問ね。"
2005903-84 = "[ruby=わたくし]私が[/ruby]どうしようと、貴女たちには関係ないでしょう？"
2005903-85 = "貴女たちはただブツを渡せばいいの。"
2005903-86 = "そ、そりゃそうだけどよ……。"
2005903-87 = "分かったなら早く渡しなさい。#nこんな汚らわしい場所、すぐにでも出ていきたいんだから。"
2005903-88 = "くっ、ムカつく女だぜ。"
2005903-89 = "嫌な奴め！"
2005903-90 = "もういい。まずはカネを見せろ！"
2005903-91 = "フン。疑り深い小心者ね。"
2005903-95 = "[USERNAME]、カバンを。"
2005903-96 = "[s] \"はい、お嬢様。\""
2005903-101 = "これ、本物だよな？"
2005903-102 = "当然よ。あなた、まさか見分けられないの？"
2005903-103 = "本物は表面だけかもしれないだろ！一旦よこせ、後はこっちで確認する！"
2005903-104 = "[s] \"止まれ。次はこっちの番だ。\""
2005903-105 = "ええ。こちらのターンね。"
2005903-106 = "例の物を見せなさい。お金はこちらの確認が終わってからよ。"
2005903-107 = "フン、いいだろう。"
2005903-113 = "（布を剥がすと、箱には大量の爆弾があった）"
2005903-115 = "一つ、手に取ってみても？"
2005903-116 = "ど、どうする？"
2005903-117 = "1個くらい、好きにさせてやれ。"
2005903-118 = "い、いいだろう！"
2005903-126 = "確認できましたわ。たしかに本物ですわね。"
2005903-130 = "くふふっ♪先生、ありがたいことに爆弾が一か所にまとまってる。"
2005903-131 = "狭いところに押し込められた大量の爆弾……なんだか見覚えがない？"
2005903-132 = "[s3] \"なるほど……。\"\n[s4] \"私は隠れていればいいかな？\""
2005903-135 = "三つ数えたら始めるね？"
2005903-136 = "さんっ、にー……。"
2005903-137 = "おい！なに二人でコソコソ――"
2005903-138 = "いち！"
2005903-139 = "え？"
2005903-144 = "ばっ、バカっ！？こっちには爆弾の山があるんだぞ！これじゃ……！"
2005903-145 = "ぜーんぶ爆発しちゃうね！"
2005903-146 = "でも関係ないよ。これは「メッセージ」だから！"
2005903-147 = "あっ、あいつ……！最初から爆弾を買うつもりなんて……！！"
2005903-152 = "ぐ、ぐあっ……！みんな、逃げろ……！！"
2005903-159 = "くふふっ！転売屋と爆弾を一網打尽！"
2005903-160 = "これでもう、爆弾を転売しようとするバカは現れないはず。"
2005903-163 = "あ～楽しかった。"
2005903-164 = "ねっ？先生。"
2005903-165 = "[s5] \"ええ、お嬢様。\"\n[s6] \"これで今後も無事、趣味を続けられますね。\""
2005903-168 = "あはははっ！先生の執事の真似、超おもしろーい。"
2005903-170 = "（現場をひと通り片付け、その場を後にした）"
2005903-171 = "（これでうまく解決するといいけど……）"
