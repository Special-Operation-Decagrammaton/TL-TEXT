[translation]
34145-4 = "[ns] \"Mika……！？\""
34145-5 = "……Não acredito, você nos seguiu até aqui?"
34145-6 = "Faz tempo…… bem, nem tanto assim. Fico feliz em te ver de novo, Saori."
34145-7 = "Eu fiquei pensando em como poderia vencer o esquadrão que o Sensei está liderando…… mas não consegui pensar em nenhuma ideia muito boa."
34145-8 = "Então eu pensei: 'por que não tentar um confronto direto?' e acabei vindo……."
34145-9 = "……É, pelo visto não deu certo."
34145-11 = "Você continua forte como sempre, Sensei."
34145-13 = "Próximo episódio: O que foi deixado para trás"
