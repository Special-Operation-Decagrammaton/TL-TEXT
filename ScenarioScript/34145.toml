[translation]
34145-4 = "[ns] \"Mika...!?\""
34145-5 = "......Eu não acredito que você nos seguiu até aqui."
34145-6 = "Há quanto tempo... quer dizer, nem faz tanto tempo assim. É bom te ver de novo, Saori."
34145-7 = "Eu estava pensando em como derrotar um Esquadrão comandado pelo Sensei... mas não consegui bolar nenhum plano muito bom."
34145-8 = "Então resolvi dar as caras e ver no que ia dar... mas..."
34145-9 = "......Parece que não deu certo afinal."
34145-11 = "Você continua forte como sempre, Sensei."
34145-13 = "Próximo Episódio; Aquilo que Restou"