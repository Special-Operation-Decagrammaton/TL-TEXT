[translation]
34145-4 = "[ns] \"Mika……!?\""
34145-5 = "……Não me diga que você perseguiu a gente até aqui."
34145-6 = "Há quanto tempo…… nem tanto, né. Que bom te ver de novo, Saori."
34145-7 = "Eu fiquei pensando em como vencer o Squad comandado pelo Sensei…… mas não me veio nenhuma ideia boa."
34145-8 = "Aí pensei: \"vou tentar bater de frente uma vez?\" e vim, mas……."
34145-9 = "……no fim, não deu mesmo, né."
34145-11 = "Continua forte como sempre, Sensei."
34145-13 = "Próximo Episódio;O Que Restou"
