[translation]
10026070-1 = "Episódio 7: O motivo do limão"
10026070-2 = "（Investigamos todos os locais marcados no mapa e voltamos para a beira-mar）"
10026070-3 = "Hmm..."
10026070-4 = "............Ué?"
10026070-5 = "[s1] \"Ui?\"\n[s2] \"Alguma coisa te deixou encucada?\""
10026070-8 = "Ah, bem... eu estava revisando o que investigamos enquanto olhava o mapa."
10026070-9 = "E então, senti que algo estava estranho."
10026070-10 = "......Vou explicar um por um."
10026070-12 = "Primeiro, aqui... as ruínas que parecem um labirinto, que provavelmente eram usadas como campo de treinamento."
10026070-14 = "O próximo local que investigamos foi esta base subterrânea."
10026070-16 = "E por fim, restavam o pomar de limões e o farol. #nNão havia nada de estranho... exceto pelo pomar de limões."
10026070-17 = "A estrutura era antiga, mas definitivamente seguia o estilo da Trinity..."
10026070-21 = "Ei, ei... Hanako...?"
10026070-22 = "Aquela pessoa... a atmosfera dela não está um pouco diferente de quando chegamos aqui...?"
10026070-23 = "......É verdade."
10026070-24 = "Quando a Ui-san fica absorta em algo... ela parece outra pessoa."
10026070-25 = "Fufu, talvez essa seja a verdadeira Ui-san."
10026070-27 = "Antes de investigar, eu achei que este fosse um calabouço ou local de execução preparado pela Associação de Estudantes para evitar olhares indiscretos e impedir que os gritos de tortura fossem ouvidos pelo público, mas..."
10026070-32 = "Infelizmente, parece que minha previsão estava errada."
10026070-33 = "......Ha, haha, haha..."
10026070-34 = "......Ah. De-desculpe..."
10026070-35 = "Não era minha intenção assustar vocês, só achei que fosse uma preocupação desnecessária."
10026070-36 = "Mas, isso não parece um pouco decepcionante...?"
10026070-37 = "Pensando bem, então..."
10026070-38 = "[s3] \"Ainda tem algo que não te convence, né?\"\n[s4] \"Então, vamos investigar um pouco mais?\""
10026070-41 = "Bem, pode ser que não encontremos nada mesmo. #nNa verdade, essa é a possibilidade mais provável..."
10026070-42 = "Mas é explorando as possibilidades do \"e se\" que podemos descobrir coisas novas. #nJá que decidimos investigar, não posso desistir até o fim."
10026070-43 = "Se eu simplesmente traçar uma linha e disser \"isso é o suficiente\", nunca conseguirei realizar nada como pesquisadora."
10026070-44 = "Mesmo que não encontremos nada lá, é importante mudar a perspectiva e pensar que deve haver algo. Não podemos esquecer o sentimento de nunca desistir."
10026070-45 = "......Desta vez, vamos mudar a perspectiva. #nDe \"qual era o papel deste lugar\","
10026070-46 = "para \"por que foi fechado\"."
10026070-47 = "Concordo. Por que elas, que prezam tanto pela tradição e não negligenciam os registros, abandonaram esta ilha e a apagaram dos registros?"
10026070-48 = "Talvez existam informações que ainda não conhecemos."
10026070-49 = "Pensei a mesma coisa. Não parece algo típico da Associação de Estudantes..."
10026070-50 = "Mas, qual seria o motivo...?"
10026070-51 = "O campo de treinamento, a base subterrânea, o farol... até aqui, tudo bem."
10026070-53 = "......Mas, por que existem limões nesta ilha?"
10026070-59 = "......Será que."
10026070-60 = "Ui-san...?"
10026070-64 = "......Por favor, olhem este mapa. #nA localização do pomar de limões não parece deslocada?"
10026070-65 = "Deveria haver outros lugares mais fáceis para colher, é estranho."
10026070-66 = "Na ilha, só vi pés de limão aqui, então provavelmente foram trazidos de fora."
10026070-67 = "Mesmo que fosse para uma estadia longa na ilha, limões não servem como alimento básico... #nCom certeza, deve ter havido um motivo para isso."
10026070-68 = "......Limão... limão..."
10026070-76 = "[ns5] \"Ui...?\"\n[ns6] \"Po-por que você tirou um maçarico de repente?\""
10026070-79 = "Hmm... não consigo pensar em outra explicação."
10026070-81 = "Pronto, agora sim..."
10026070-85 = "[ns7] \"U-Ui!?\"\n[ns8] \"Você não se queimou...!?\""
10026070-88 = "Ora... que ousada♡"
10026070-89 = "Quanto mais quietas as pessoas parecem, na verdade..."
10026070-90 = "Não faça isso!"
10026070-91 = "U-Ui-san!? O-o que você está fazendo!?#nO mapa valioso...!"
10026070-93 = "……Minha dedução estava correta. A parte escrita com suco de limão tem uma capacidade de retenção de umidade menor devido ao ácido, então, ao aquecer, ela queima primeiro e aparece."
10026070-94 = "Este deve ser o verdadeiro destino."
10026070-99 = "……!? Eh, ué? Isso é……?#nDois marcadores que não estavam aqui antes……!"
10026070-100 = "Era usado para transmitir informações apenas para pessoas específicas.#nÉ chamado de \"escrita invisível\"."
10026070-101 = "Hoje em dia, muitas pessoas conhecem, então não é muito usado, mas……#nComo é um mapa antigo…… pensei que fosse isso."
10026070-103 = "Se você não soubesse o efeito, não pensaria em aquecer o mapa no fogo.#nAlém disso…… mesmo que soubesse, poucas pessoas tentariam de verdade."
10026070-104 = "Francamente, que truque desagradável de se fazer.#nSerá que não pensaram nos sentimentos desta criança?"
10026070-105 = "……Não, talvez a Associação de Estudantes tenha pensado nisso até esse ponto……"
10026070-106 = "De qualquer forma, o próximo destino foi decidido.#nEstes dois lugares que apareceram são――"
10026070-107 = "――os lugares secretos escondidos, imagino."
10026070-108 = "Então, vamos?"
10026070-112 = "U-Ui-san! Você é realmente incrível, Ui-san!!"
10026070-116 = "Eu nem conseguia imaginar algo assim!"
10026070-117 = "Vou continuar ajudando! Vamos dar o nosso melhor, Ui-san!!"
10026070-118 = "Ngh……! 2m!! 2m……!!"
10026070-122 = "Fufu♪"
10026070-123 = "Então, vamos segui-los também."
