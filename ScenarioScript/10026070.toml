[translation]
10026070-1 = "第7話;レモンである理由"
10026070-2 = "（地図に記された場所を全て調査し、再び海辺に戻ってきた）"
10026070-3 = "んん……"
10026070-4 = "…………あれ？"
10026070-5 = "[s1] \"ウイ？\"\n[s2] \"何か引っかかることでもあった？\""
10026070-8 = "あ、えっと……地図を見ながら、調査内容を振り返ってました。"
10026070-9 = "そしたら、何か違和感がありまして。"
10026070-10 = "……ひとつずつ、説明します。"
10026070-12 = "まず、ここ……おそらく訓練場として使われていた、迷路のような遺跡。"
10026070-14 = "次に調査したのは、ここの地下拠点ですね。"
10026070-16 = "そして、残るはレモン農園と灯台。#nおかしいところはありませんでした……レモン農園を除いて。"
10026070-17 = "作りは古かったですが、間違いなくトリニティ様式でしたし……"
10026070-21 = "ね、ねぇ……ハナコ……？"
10026070-22 = "あの人……ここに着いた時と雰囲気がちょっと違うような……？"
10026070-23 = "……そうですね。"
10026070-24 = "ウイさん、夢中になると……まるで普段とは別人です。"
10026070-25 = "ふふっ、あれが本来のウイさんなのかもしれませんね。"
10026070-27 = "調査する前は、拷問の悲鳴が世間に知られないよう、人目[ruby=はばか]を憚っ[/ruby]て聖徒会が用意した牢獄や処刑場かと思っていましたが……"
10026070-32 = "残念ながら、私の予想は外れてしまったようです。"
10026070-33 = "……は、ははっ、はは……。"
10026070-34 = "……あ。す、すみません……。"
10026070-35 = "怖がらせたかったわけではなくて、余計な心配だったな、と。"
10026070-36 = "ですが、これでは拍子抜けのような……？"
10026070-37 = "そう思ったら、その……"
10026070-38 = "[s3] \"まだどこか、腑に落ちないんだね。\"\n[s4] \"じゃあ、もう少し調査してみようか。\""
10026070-41 = "まあ、調べても何も出ないかもしれません。#nむしろ、その可能性の方が高いですが……"
10026070-42 = "「もしも」の可能性を探ってこそ、発見できる事もあるので。#n調べると決めた以上、最後まで諦めるわけにはいかないです。"
10026070-43 = "「これで十分」と簡単に線引きしてしまうようでは、研究者としては何も成し遂げられませんから。"
10026070-44 = "そこに何も見つからなかったとしても、必ず何かあるはず、と視点を変えてみるのが大切です。諦めない気持ちを忘れてはいけません。"
10026070-45 = "……今度は、視点を変えてみましょうか。#n「この場所の役割」から、"
10026070-46 = "「閉鎖された理由」に。"
10026070-47 = "そうですね。伝統を重んじ記録を怠らない彼女たちが、何故この島を捨て、記録からも消し去ったのか。"
10026070-48 = "まだ私たちの知らない情報があるのかもしれません。"
10026070-49 = "同じことを、考えました。聖徒会らしくないな、と……"
10026070-50 = "ですが、その理由とは……？"
10026070-51 = "訓練場、地下拠点、灯台……ここまでは、良いでしょう。"
10026070-53 = "……ただ、どうしてこの島にはレモンが？"
10026070-59 = "……もしかして。"
10026070-60 = "ウイさん……？"
10026070-64 = "……この地図を見てください。#nレモン農園だけ、位置が浮いていませんか？"
10026070-65 = "他にも収穫しやすい場所はあったはずなのに、不自然ですね。"
10026070-66 = "島内では、ここでしかレモンの木を見ませんでしたし、おそらく外部から持ち込まれたものでしょう。"
10026070-67 = "島で長期滞在するにしても、主食にはなり得ないレモンを……#nきっと、それだけの理由があったはず。"
10026070-68 = "……レモン……レモン……。"
10026070-76 = "[ns5] \"ウイ……？\"\n[ns6] \"き、急にバーナーを取り出してどうしたの？\""
10026070-79 = "うーん……やっぱり、アレしか考えられませんね。"
10026070-81 = "これで、よし……。"
10026070-85 = "[ns7] \"う、ウイ！？\"\n[ns8] \"火傷はない……！？\""
10026070-88 = "あら……大胆ですね♡"
10026070-89 = "大人しそうな方ほど、実は……"
10026070-90 = "それ以上はダメっ！"
10026070-91 = "う、ウイさん！？な、何をしているんですか！？#n貴重な地図が……！"
10026070-93 = "……私の見立ては正しかったようですね。レモン汁で書かれた部分は、酸の影響で水分の保持能力が低くなるので、[ruby=あぶ]炙[/ruby]ると先に焦げて浮かび上がります。"
10026070-94 = "これが、本当の目的地でしょう。"
10026070-99 = "……！？え、あれ？これは……？#nさっきまで無かった目印が、二つも……！"
10026070-100 = "特定の人にだけ、情報を伝えるために使われていました。#n「炙り出し」と呼ばれています。"
10026070-101 = "今となっては、多くの方が知っているので、あまり使われませんが……#n古い地図なので……コレだ、と思いまして。"
10026070-103 = "効果を知らなければ、地図を火で炙ろうとは思わないでしょう。#nそれに……知っていたとしても、実際に試す人は少ないはずです。"
10026070-104 = "まったく、嬉しくない仕掛けを施したものですね。#nこの子の気持ちを考えなかったのでしょうか。"
10026070-105 = "……いや、もしかしたら、聖徒会はそこまで考えて……。"
10026070-106 = "とにかく、次の目的地が決まりましたね。#nこの浮かび上がった二か所が――"
10026070-107 = "――隠された、秘密の場所なのでしょう。"
10026070-108 = "では、行きますか。"
10026070-112 = "う、ウイさん！本当にすごいです、ウイさん！！"
10026070-116 = "私には想像もできませんでした！"
10026070-117 = "まだまだお手伝いしますから！張り切っていきましょう、ウイさん！！"
10026070-118 = "んあっ……！2m！！2m……！！"
10026070-122 = "ふふっ♪"
10026070-123 = "では、私たちも付いていきましょう。"
