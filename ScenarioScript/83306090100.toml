[translation]
83306090100-6 = "Ah, Presidente do Comitê Disciplinar. O que faz por aqui?"
83306090100-7 = "É que você estava com uma cara de preocupada..."
83306090100-8 = "Então pensei que pudesse ter acontecido algum problema."
83306090100-9 = "Problema? Acho que não chega a tanto."
83306090100-10 = "Hoje eu estava de turno com a Kirara-chan, mas..."
83306090100-11 = "Ela deve ter parado em algum lugar no caminho, porque já passou da hora e ela não apareceu."
83306090100-12 = "Tentar organizar tudo sozinha é muita coisa, então estou um pouco enrascada."
83306090100-13 = "Entendo... Nesse caso, quer que eu ajude?"
83306090100-14 = "Sério? Bem, isso me ajudaria muito, mas você não está ocupada, Presidente?"
83306090100-15 = "Se há uma aluna em apuros, é dever do Comitê Disciplinar ajudar."
83306090100-16 = "Ahaha, entendi. Nesse caso, vou aceitar sua ajuda."
