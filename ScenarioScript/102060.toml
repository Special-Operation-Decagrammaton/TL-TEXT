[translation]
102060-1 = "第6話;第1サンクトゥム「アビドス砂漠」"
102060-3 = "みなさん！作戦開始です！"
102060-4 = "私たちはランデブーポイントに向かい――その後、第2部隊が砂漠横断鉄道に目標を誘導し合流。「守護者」までの道を確保します！"
102060-5 = "さっきも言ったかもだけど、ビナーのレーザーには気を付けてね！"
102060-9 = "はい、わかりました☆"
102060-10 = "じゃ、出発しよっか～"
102060-11 = "やってやるんだから！"
102060-13 = "こっちも始めよっか。準備はいい？"
102060-14 = "おっけ～"
102060-15 = "は、はいっ！"
102060-16 = "始めていいわよ、カヨコ。"
102060-18 = "OK。じゃ、列車を動かすね。"
102060-27 = "あ、ああっ！#nあ、あちらに何かが……！"
102060-28 = "襲撃……！？"
102060-29 = "へぇ～私たちを狙って来たの？やるじゃん♪"
102060-33 = "ふん、こんなものじゃ私たちは止められないわ。#n誤算だったってこと、教えてあげないとね。"
102060-34 = "さぁ、ハードボイルドに決めるわよ！"
