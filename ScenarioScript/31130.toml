[translation]
31130-1 = "Episódio 13: Simulado do Clube de Reforço"
31130-3 = "Bom dia！"
31130-4 = "Bom dia, Azusa-chan. Você tá bem animada logo de manhã♡"
31130-5 = "Sim, é o começo de um novo dia."
31130-6 = "Vamos, acordem logo, escovem os dentes, tomem banho e troquem de roupa. Vamos seguir a ordem direitinho."
31130-7 = "Auuu…… Azusa-chan…… só mais 10 minutinhos……"
31130-8 = "Nnn…… já é de manhã……？"
31130-9 = "Hifumi, Koharu, acordem. Já tá na hora."
31130-10 = "Nnn……"
31130-15 = "Nnn…… tô acordada……"
31130-16 = "Parece que a Hifumi-chan ainda vai demorar um pouco. Ontem ela ficou acordada até tarde…"
31130-17 = "……Como é a presidente do Clube de Reforço, deve estar com bastante pressão psicológica. Vamos deixar ela descansar mais um pouquinho."
31130-18 = "Nnn…… hm？ Aqui…… por que eu……"
31130-19 = "Bom dia, Koharu. Vamos começar a rotina da manhã."
31130-20 = "……？ Hm, eh……？"
31130-21 = "O banheiro fica por aqui, vem."
31130-22 = "……Eh, o quê, por quê……？"
31130-27 = "Ara ara, as duas tomando banho juntinhas？"
31130-28 = "Uwaaaah！？ Q-que！？ Ei, para de tirar minha roupa！？ Hyaa, uweeeh！？"
31130-29 = "Tá frio……！？ Ah, ei, espera……！ Nn, o shampoo entrou no olho……！！"
31130-30 = "Que delícia～ banho peladinha♡"
31130-32 = "Sala de Aula do Anexo"
31130-33 = "Desculpe a demora, então vamos começar？"
31130-34 = "Oookay♡"
31130-35 = "Sim."
31130-36 = "Uuu…… todo mundo me viu pelada…… tô acabada……"
31130-37 = "Koharu também me viu pelada, então não tem problema nenhum."
31130-38 = "Não é esse o problema！ Você me despiu à força！ Esse tipo de coisa é proibido！"
31130-39 = "Então da próxima vez eu que vou lavar o corpo da Koharu-chan, pode ser？"
31130-40 = "Hã！？ N-não！ Com você nunca！"
31130-45 = "E-eh……"
31130-46 = "[s] \"Hifumi, seu cabelo tá um pouco arrepiado aqui.\""
31130-47 = "Ah, obrigada. Acabei dormindo demais…"
31130-48 = "Não é isso！"
31130-49 = "Todo mundo, prestem atenção aqui！"
31130-51 = "……？"
31130-53 = "……Hoje é o primeiro dia oficial do acampamento de estudos！"
31130-54 = "Estamos numa situação complicada, que pode deixar qualquer um nervoso, mas…"
31130-55 = "Não precisa complicar as coisas！"
31130-56 = "O objetivo é só uma coisa: passar todos juntos na 2ª Prova Especial！"
31130-57 = "Isso mesmo."
31130-58 = "Exato."
31130-59 = "……。"
31130-61 = "Então……"
31130-66 = "Vamos fazer um simulado agora！"
31130-67 = "……Simulado？"
31130-68 = "Entendi……？"
31130-69 = "De repente um simulado！？ Por quê！？"
31130-70 = "Estudar sem rumo não é muito eficiente."
31130-71 = "Pra atingir o objetivo de forma sólida, precisamos saber o que cada um consegue e o que não consegue, e qual é a nossa posição atual…… primeiro temos que entender isso！"
31130-72 = "Por isso, ontem à noite preparei isso aqui！"
31130-76 = "São provas do ano passado de Trinity junto com os gabaritos！ Ainda tá incompleto, só consegui parte delas, mas…"
31130-77 = "O Sensei também me ajudou até tarde ontem…… consegui montar um simulado baseado na 2ª Prova Especial！"
31130-78 = "Tempo de prova: 60 minutos. Nota mínima: 60 de 100. Igual à prova real."
31130-79 = "Então, vamos resolver isso！"
31130-81 = "1º Simulado do Clube de Reforço"
31130-82 = "[s] \"Prontos？\""
31130-85 = "[ns] \"Então…… prova, começar！\""
31130-89 = "……。"
31130-92 = "Ara, isso aqui……♡"
31130-95 = "Já vi em algum lugar… ou não vi……"
31130-99 = "（Vamos todas nos esforçar……！）"
31130-105 = "O simulado terminou e os resultados saíram."
31130-106 = "Sensei, por favor, anuncie os resultados！"
31130-108 = "1º Simulado do Clube de Reforço, Resultados――"
31130-110 = "Hanako―4 pontos[FF6666]（Reprovada）[-]"
31130-112 = "Azusa―33 pontos[FF6666]（Reprovada）[-]"
31130-114 = "Koharu―15 pontos[FF6666]（Reprovada）[-]"
31130-116 = "Hifumi―68 pontos[007eff]（Aprovada）[-]"
31130-118 = "……Entendi."
31130-119 = "……Eh？"
31130-120 = "Ara ara."
31130-121 = "……。"
31130-125 = "Essa é a nossa realidade atual. Se continuar assim, não temos um futuro brilhante pela frente……"
31130-130 = "A partir de agora, temos uma semana pra todas passarem de 60 pontos. Precisamos usar o tempo restante de forma eficiente！"
31130-131 = "Por isso！ Primeiro, como Azusa-chan e Koharu-chan são do 1º ano……"
31130-136 = "Eu e a Hanako-chan vamos ajudar vocês duas nos estudos！ Hanako-chan, não sei o que aconteceu recentemente, mas você tirou notas altas quando era do 1º ano, né？"
31130-137 = "Ara……？ Eh, bom, sim…"
31130-138 = "Na verdade, eu encontrei as respostas da Hanako-chan do 1º ano…… então vamos analisar o que aconteceu pra você chegar nesse estado atual e, junto com o Sensei, encontrar uma solução！"
31130-142 = "Ainda tô preparando mais simulados, então vamos fazer testes periódicos pra acompanhar o progresso."
31130-143 = "……。"
31130-144 = "Essa deve ser a melhor escolha que podemos fazer agora……"
31130-145 = "Vamos nos esforçar！ Com certeza, se a gente se dedicar, vamos conseguir passar todas juntas……！"
31130-146 = "[s] （Hifumi……！）"
31130-149 = "（O Sensei também disse isso… então eu não posso só ficar preocupada. Vou fazer o que eu consigo……！）"
31130-151 = "……Sim, entendi. Vou seguir as instruções."
31130-152 = "E-entendi……"
31130-153 = "Hifumi-chan…… você é incrível. Preparou tudo isso só ontem à noite……"
31130-154 = "Ah, não, não… o Sensei também me ajudou bastante……"
31130-155 = "Entendi, então foi o Sensei."
31130-156 = "[s] \"Não fiz quase nada, isso foi mérito da Hifumi.\""
31130-157 = "Não é só isso！ Também preparei recompensas！"
31130-158 = "Eh……"
31130-160 = "（Remexe……）"
31130-164 = "Aqui！ Quem tirar boa nota ganha produtos da «Momo Friends»！"
31130-165 = "Momo Friends……？"
31130-166 = "……O que é isso？"
31130-167 = "……っ！！"
31130-168 = "Ah, aquilo……？ O «Momo Friends» que tá fazendo sucesso ultimamente…… será que vocês não conhecem……？"
31130-169 = "É a primeira vez que vejo…… ou será que vi de relance em algum lugar……？"
31130-170 = "Ehh！？"
31110-171 = "Que coisa estranha…… é um porco？ Ou um hipopótamo……？"
31110-172 = "Não é isso！ Peroro-sama é um pássaro！ Olha só essas penas majestosas！ E esse bico imponente！"
31110-173 = "……Os olhos são assustadores. E o nome também soa meio pervertido……"
31110-174 = "Ehh……！？ B-bom, algumas pessoas dizem isso mesmo…… m-mas olha bem. Quando você observa direito, fica bem fofinho――"
31110-175 = "Ah, lembrei！ A bolsa e o case do celular da Hifumi-chan eram desse personagem, né."
31110-176 = "Tinha uma cena dele chorando e pedindo «me perdoa……！» com a língua de fora e baba escorrendo……？"
31110-177 = "Eh, não, a segunda parte tá bem errada！？"
31110-178 = "……E-eu não quero."
31110-179 = "Auuu……"
31110-180 = "……。"
31110-181 = "A-Azusachan……？"
31110-182 = "……C,"
31110-183 = "……C？"
31110-185 = "C-fofo……！！！"
31110-186 = "！！？"
31110-187 = "！？"
31110-188 = "Ara……？"
31110-190 = "M-muito fofo……！ Que animal é esse redondo e fofinho……！！"
31110-191 = "Esses olhos, não dá pra ler a expressão…… não faço ideia do que ele tá pensando……！"
31110-192 = "A-Azusachan……？"
31110-193 = "Como esperado da Azusa-chan, você entendeu a fofura do Peroro-sama！ Isso mesmo！ Essa parte dele é o que torna ele fofo！"
31110-194 = "Mentira……！？"
31110-195 = "E esse aqui？ Esse comprido？ Salamandra…… não, girafa？ Parece que se enrolar no pescoço deve ser quentinho……！"
31110-196 = "Esse é o Sr. Wave Cat！ Ele vive dançando com ondas, mas como você disse, tem um produto de travesseiro de pescoço dele ultimamente……"
31110-197 = "E esse？ Esse pequenininho？"
31110-198 = "Esse é o Sr. Nikolai！ Ele vive falando coisas filosóficas e olhando de forma misteriosa！"
31110-199 = "Como recompensa, também tenho o livro dele «Para Além do Bem e do Mal», edição original！"
31110-200 = "Nossa, nossa……！！ Posso escolher qual eu quero？"
31110-201 = "Sim！ Azusa-chan, pega o que quiser！"
31110-206 = "Ara ara……"
31110-207 = "Q-que diabos……"
31110-209 = "……Não tem jeito, vou ter que usar toda a minha força."
31110-213 = "Boa gestão de motivação, Hifumi. Prometo que vou cumprir a missão e conseguir esse animal estranho e fofinho！"
31110-218 = "S-sim！ Vamos nessa！"
31110-222 = "Ehe, ehehehehehehe……"
31110-226 = "Ara ara…… a Hifumi-chan tá com uma expressão bem feliz, ou melhor, parecendo uma bonequinha……♡"
31110-227 = "[s] \"Será que ela tá feliz por ter feito novos amigos Momo……？\""
31110-228 = "É……"
31110-230 = "Próximo; Vice-Presidente do Comitê de Execução da Justiça (1)"