[translation]
31130-1 = "Episódio 13: O Simulado do Clube de Reforço"
31130-3 = "Bom dia!"
31130-4 = "Bom dia, Azusa-chan. Você está cheia de energia logo cedo, hein? ♡"
31130-5 = "Sim, porque é o começo de um novo dia."
31130-6 = "Vamos lá, levantem logo. Escovar os dentes, tomar banho e depois se vestir. Vamos seguir a ordem."
31130-7 = "Auu... Azusa-chan... 10 minutos... só mais 10 minutos..."
31130-8 = "Hmm... já é de manhã...?"
31130-9 = "Hifumi, Koharu, acordem. Vocês precisam levantar agora."
31130-10 = "Hmm..."
31130-15 = "Hmm... eu já estou acordada..."
31130-16 = "Parece que a Hifumi-chan vai demorar um pouco mais. Pelo visto, ela ficou acordada até tarde ontem..."
31130-17 = "...Como ela é a presidente do Clube de Reforço, talvez esteja sentindo uma pressão psicológica. Vamos deixá-la descansar só mais um pouco."
31130-18 = "Hmm... ué, onde... por que eu estou..."
31130-19 = "Bom dia, Koharu. Vamos começar a nos arrumar."
31130-20 = "...? Hmm, é...?"
31130-21 = "O banheiro é por aqui, venha."
31130-22 = "...Ei, o quê, por que...?"
31130-27 = "Ora, ora, vocês duas estão tomando banho juntas?"
31130-28 = "Aaaaaah!? O-o que você está fazendo!? Ei, não me tire a roupa! Kyaa, ueeh!?"
31130-29 = "Está frio...!? Ah, qual é, para com isso...! Hmm, o shampoo caiu no meu olho...!!"
31130-30 = "Isso é muito bom, uma amizade sem segredos, né? ♡"
31130-32 = "Alojamento/Sala de Aula"
31130-33 = "Desculpem a demora, podemos começar agora?"
31130-34 = "Sim~ ♡"
31130-35 = "Certo."
31130-36 = "Uuu... ela viu tudo... não tem mais jeito..."
31130-37 = "A Koharu também viu o meu corpo, então não tem problema nenhum."
31130-38 = "Não é esse o problema! Você não podia ter me despido daquele jeito! Não se faz as coisas à força!"
31130-39 = "Então, quer que eu lave o seu corpo agora, Koharu-chan?"
31130-40 = "Hã!? N-não! Você, nem pensar! De jeito nenhum!"
31130-45 = "E-ei, espera..."
31130-46 = "[s] \"Hifumi, seu cabelo está um pouco bagunçado aqui.\""
31130-47 = "Ah, obrigada. Acabei perdendo a hora..."
31130-48 = "N-não, não é isso!"
31130-49 = "Pessoal, prestem atenção aqui!"
31130-51 = "...?"
31130-53 = "...Hoje é o primeiro dia do nosso acampamento do Clube de Reforço, um dia muito importante!"
31130-54 = "Estamos em uma situação difícil e é fácil acabar entrando em pânico, mas..."
31130-55 = "Não precisamos complicar as coisas!"
31130-56 = "Só precisamos passar no 2º Exame Especial de Aproveitamento Escolar daqui a uma semana!"
31130-57 = "É verdade."
31130-58 = "Concordo."
31130-59 = "..."
31130-61 = "Por isso..."
31130-66 = "Vamos começar um simulado agora!"
31130-67 = "...Um simulado?"
31130-68 = "Entendi...?"
31130-69 = "U-um teste de repente!? Por quê!?"
31130-70 = "Estudar sem rumo não é muito eficiente."
31130-71 = "Para alcançar nossos objetivos com firmeza, precisamos saber o que conseguimos e o que não conseguimos fazer, e em que nível estamos agora... precisamos entender isso primeiro!"
31130-72 = "Sendo assim, preparei isto ontem à noite!"
31130-76 = "São as questões do exame realizado na Trinity no ano passado e seus gabaritos! Bem, ainda está incompleto, consegui reunir apenas uma parte..."
31130-77 = "O Sensei também me ajudou até tarde ontem... conseguimos montar algo como um pequeno simulado, baseado no 2º Exame Especial de Aproveitamento Acadêmico!"
31130-78 = "O tempo de prova é de 60 minutos, e a nota mínima para passar é 60 de 100. Ou seja, igual ao exame real."
31130-79 = "Vamos lá, primeiro, tentem resolver isto!"
31130-81 = "1º Simulado do Clube de Reforço"
31130-82 = "[s] \"Estão prontas?\""
31130-85 = "[ns] \"Então... comecem o exame!\""
31130-89 = "……."
31130-92 = "Ora, isto é... ♡"
31130-95 = "Parece que já vi isso em algum lugar... ou talvez não..."
31130-99 = "（Pessoal, vamos dar o nosso melhor...!）"
31130-105 = "O simulado terminou e as notas foram corrigidas."
31130-106 = "Bem, Sensei, por favor, anuncie os resultados!"
31130-108 = "Resultados do 1º Simulado do Clube de Reforço —"
31130-110 = "Hanako — 4 pontos [FF6666] (Reprovada) [-]"
31130-112 = "Azusa — 33 pontos [FF6666] (Reprovada) [-]"
31130-114 = "Koharu — 15 pontos [FF6666] (Reprovada) [-]"
31130-116 = "Hifumi — 68 pontos [007eff] (Aprovada) [-]"
31130-118 = "……Entendo."
31130-119 = "……Eh?"
31130-120 = "Ora, puxa."
31130-121 = "……."
31130-125 = "Esta é a nossa realidade atual. Se continuarmos assim, não teremos um futuro brilhante pela frente..."
31130-130 = "Para que todas consigam tirar mais de 60 pontos na próxima semana, precisamos usar o tempo restante com eficiência!"
31130-131 = "Por isso! Primeiro, como a Koharu e a Azusa estão fazendo o exame do 1º ano..."
31130-136 = "Eu e a Hanako vamos ajudar vocês com o conteúdo de estudo! Hanako, não sei o que aconteceu recentemente, mas você tirou uma nota alta no exame do 1º ano, não foi?"
31130-137 = "Ora...? Bem, é verdade..."
31130-138 = "Na verdade, acabei encontrando a prova da Hanako do 1º ano... Sobre o seu caso, Hanako, vamos descobrir a causa dessa sua situação atual e, junto com o Sensei, procurar uma solução mais tarde!"
31130-142 = "Ainda estou criando outros exames, então pretendo realizar simulados periodicamente a partir de hoje para verificar o progresso de vocês."
31130-143 = "……."
31130-144 = "Esta é, provavelmente, a melhor escolha que podemos fazer agora..."
31130-145 = "Vamos nos esforçar! Se nos dedicarmos, com certeza todas conseguiremos passar...!"
31130-146 = "[s] （Hifumi...!）"
31130-149 = "（Já que o Sensei disse aquilo, não posso ficar apenas preocupada. Vou fazer o que estiver ao meu alcance...!）"
31130-151 = "……Certo, entendi. Vou seguir as instruções."
31130-152 = "T-tá bom..."
31130-153 = "Hifumi-chan... isso é incrível. Preparar tudo isso só na noite passada..."
31130-154 = "Ah, não, não, o Sensei também me ajudou..."
31130-155 = "Entendo, o Sensei ajudou."
31130-156 = "[s] \"Não fiz nada demais, isso é fruto do esforço da Hifumi.\""
31130-157 = "E não é só isso, preparei até uma recompensa!"
31130-158 = "Bem..."
31130-160 = "（Barulho de papel...）"
31130-164 = "Aqui está! Quem tirar uma boa nota ganhará estes brindes dos \"Momo Friends\"!"
31130-165 = "Momo Friends...?"
31130-166 = "……O que é isso?"
31130-167 = "……!!"
31130-168 = "Ah, é... esses \"Momo Friends\" que estão na moda ultimamente... será que vocês não conhecem...?"
31130-169 = "É a primeira vez que vejo... não, será que já vi de relance em algum lugar...?"
31130-170 = "Hã!?"
31130-171 = "O que é isso, que coisa estranha... Um porco? Ou um hipopótamo...?"
31130-172 = "N-não é nada disso! O Peroro-sama é um pássaro! Olhe só, essas penas magníficas! E esse bico imponente!"
31130-173 = "...Os olhos são assustadores. E o nome também soa meio obsceno..."
31130-174 = "Hã...!? B-bem, algumas pessoas dizem isso mesmo, mas... o-olhe com atenção. Se você olhar bem, ele acaba ficando fofo..."
31130-175 = "Ah, lembrei. Agora que falou, a bolsa e a capinha de celular da Hifumi-chan eram desse personagem, né."
31130-176 = "Se não me engano, era aquele personagem que fica com a língua de fora, babando, e gritando 'por favor, já chega...'!"
31130-177 = "E-ei, não, a segunda parte está completamente errada!"
31130-178 = "...E-eu não quero."
31130-179 = "Auu..."
31130-180 = "..."
31130-181 = "A-Azusa-chan...?"
31130-182 = "...F-fofa,"
31130-183 = "...Fofa?"
31130-185 = "É fofo...!!!"
31130-186 = "!!?"
31130-187 = "!?"
31130-188 = "Ora...?"
31130-190 = "F-fofo demais...! O que é isso, essa criatura redonda e fofinha...!!"
31130-191 = "Esses olhos, não dá para ler a expressão... Não faço ideia do que ele está pensando...!"
31130-192 = "A-Azusa-chan...?"
31130-193 = "Como esperado da Azusa-chan, você percebeu a fofura do Peroro-sama! Isso mesmo! É exatamente esse o charme dele!"
31130-194 = "Não acredito...!?"
31130-195 = "E-e este aqui? Esse comprido? Uma salamandra... Não, uma girafa? Parece que seria quentinho se enrolasse no pescoço...!"
31130-196 = "Esse é o Wave Cat! É um gato que está sempre dançando, mas como você disse, recentemente lançaram um travesseiro de pescoço dele..."
31130-197 = "E este? Esse pequenininho?"
31130-198 = "Esse é o Sr. Nikolai! Ele sempre diz coisas filosóficas e acaba sendo visto com um olhar de estranhamento!"
31130-199 = "Como uma das recompensas desta vez, temos até o livro 'Além do Bem e do Mal' escrito por esse Nikolai, e é a primeira edição!"
31130-200 = "Incrível, incrível...!! Posso ganhar isso? S-será que posso escolher?"
31130-201 = "Sim! Pode levar o que você quiser, Azusa-chan!"
31130-206 = "Ora, ora..."
31130-207 = "O-o que é isso..."
31130-209 = "...Não tem jeito, vou dar o meu melhor."
31130-213 = "Ótima gestão de motivação, Hifumi. Prometo. Vou cumprir a missão e colocar as mãos naquele animal estranho e fofinho!"
31130-218 = "S-sim! Boa sorte!"
31130-222 = "Hehe, hehehehehe..."
31130-226 = "Nossa, a Hifumi-chan parece estar se divertindo, ou melhor, ela está com a mesma expressão do boneco...♡"
31130-227 = "[s] \"Será que ela está feliz por ter feito um amigo do Momo Friends...?\""
31130-228 = "É..."
31130-230 = "Próximo episódio: Vice-presidente do Comitê de Justiça (1)"
