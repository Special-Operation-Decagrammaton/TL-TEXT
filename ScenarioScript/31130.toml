[translation]
31130-1 = "Episódio 13;O Simulado do Clube de Aulas de Reforço"
31130-3 = "Bom dia!"
31130-4 = "Bom dia, Azusa. Cheia de energia desde de manhã♡"
31130-5 = "Sim, porque é o começo de um dia."
31130-6 = "Vamos, levantar logo, escovar os dentes, tomar banho e depois trocar de roupa. Vamos executar em ordem."
31130-7 = "Auu…… Azusa…… 10 minutos…… só mais 10 minutos……."
31130-8 = "Nnh…… já é de manhã……?"
31130-9 = "Hifumi, Koharu, acordem. Já tá na hora de levantar."
31130-10 = "Nnu……."
31130-15 = "Nh…… eu tô acordada, oras……."
31130-16 = "A Hifumi parece que vai levar mais um pouquinho. Pelo visto, ontem ela ficou acordada até tarde……."
31130-17 = "……Como ela é a presidente do Clube de Aulas de Reforço, deve ter uma pressão psicológica também. Vamos deixar ela descansar só mais um pouco."
31130-18 = "Nh…… ué, aqui é…… eu, por que……."
31130-19 = "Bom dia, Koharu. Vamos começar os preparativos da manhã."
31130-20 = "……? Nh, hã……?"
31130-21 = "O chuveiro é por aqui, vem."
31130-22 = "……Hã, quê, por quê……?"
31130-27 = "Ora, ora, vão se lavar juntinhas, as duas?"
31130-28 = "Uwaaah!? P-por quê!? P-peraí, não tira minha roupa!? Hiá, ueeh!?"
31130-29 = "Que gelado……!? Ah, que isso, peraí……! Nh, shampoo no olho……!!"
31130-30 = "Que bom, hein, a intimidade sem roupa♡"
31130-32 = "Alojamento de Acampamento - Sala de aula"
31130-33 = "Desculpem a demora; então, vamos começar?"
31130-34 = "Sii~m♡"
31130-35 = "Sim."
31130-36 = "Uu…… viram tudo…… não aguento mais……."
31130-37 = "A Koharu também viu o meu corpo pelado, então não tem problema nenhum."
31130-38 = "Não é essa a questão! Tirar minha roupa daquele jeito, na marra! Coisa forçada assim não pode!"
31130-39 = "Então, a próxima é você? Eu lavo o seu corpo, Koharu?"
31130-40 = "Hãã!? N-não pode! Só você eu não deixo, de jeito nenhum!"
31130-45 = "É-é que……."
31130-46 = "[s] \"Hifumi, esse cabelo aqui tá meio arrepiado.\""
31130-47 = "A-ah, obrigada. Eu acabei dormindo um pouquinho demais……."
31130-48 = "N-não é isso!"
31130-49 = "Pessoal, atenção aqui!"
31130-51 = "……?"
31130-53 = "……Hoje é o acampamento do Clube de Aulas de Reforço, o importante primeiro dia!"
31130-54 = "A gente tá numa situação difícil, dessas que dá pra ficar aflita à toa, mas……."
31130-55 = "Não precisa complicar no pensamento!"
31130-56 = "Passar no 2º Exame Especial de Aptidão daqui a uma semana; é só isso!"
31130-57 = "Isso mesmo."
31130-58 = "Pois é."
31130-59 = "……."
31130-61 = "E, por isso……"
31130-66 = "a partir de agora, vamos fazer um simulado!"
31130-67 = "……Simulado?"
31130-68 = "Sei……?"
31130-69 = "P-prova de repente!? Por quê!?"
31130-70 = "Estudar no escuro, sem rumo, não dá pra dizer que é lá muito eficiente."
31130-71 = "Pra atingir o objetivo com firmeza, a gente precisa primeiro entender o que consegue e o que não consegue, e em que ponto está agora……!"
31130-72 = "E por isso, ontem à noite, eu preparei isto!"
31130-76 = "São as provas que foram aplicadas em Trinity no ano passado, com o gabarito! Ainda tá meio pela metade, digamos; só consegui juntar uma parte, mas……."
31130-77 = "O Sensei também me ajudou até tarde ontem…… e a gente conseguiu montar algo parecido com um simulado, prevendo o 2º Exame Especial de Aptidão!"
31130-78 = "O tempo de prova é 60 minutos; 60 pontos ou mais de 100 é aprovação. Ou seja, igual à prova de verdade."
31130-79 = "Vamos, primeiro tentem resolver isto!"
31130-81 = "1º Simulado do Clube de Aulas de Reforço"
31130-82 = "[s] \"Prontas?\""
31130-85 = "[ns] \"Então…… prova, começar!\""
31130-89 = "……."
31130-92 = "Ora, isto é……♡"
31130-95 = "Parece que eu vi em algum lugar…… ou não vi……."
31130-99 = "(Pessoal, vamos nos esforçar……!)"
31130-105 = "O simulado terminou, e os resultados da correção saíram."
31130-106 = "Então, Sensei, o anúncio dos resultados, por favor!"
31130-108 = "1º Simulado do Clube de Aulas de Reforço, resultado――"
31130-110 = "Hanako―4 pts [FF6666]（Reprovada）[-]"
31130-112 = "Azusa―33 pts [FF6666]（Reprovada）[-]"
31130-114 = "Koharu―15 pts [FF6666]（Reprovada）[-]"
31130-116 = "Hifumi―68 pts [007eff]（Aprovada）[-]"
31130-118 = "……Ah, sei."
31130-119 = "……Hã?"
31130-120 = "Ora, ora."
31130-121 = "……."
31130-125 = "Esta é a nossa realidade atual. Do jeito que vai, não há futuro brilhante lá na frente pra gente……."
31130-130 = "Daqui até uma semana, pra todo mundo passar dos 60 pontos, a gente tem que usar o tempo que resta de forma eficiente!"
31130-131 = "E por isso! Primeiro, como a Koharu e a Azusa fazem as duas a prova do 1º ano……"
31130-136 = "eu e a Hanako vamos ajudar vocês duas no estudo! Hanako, eu não sei o que aconteceu ultimamente, mas, na prova de quando você era do 1º ano, você tirou nota alta, né?"
31130-137 = "Ora……? É que, bom, é verdade……."
31130-138 = "Na verdade, é que eu acabei achando a sua prova de quando você era do 1º ano, Hanako…… então, quanto a você, mais tarde, depois de entender direitinho a causa de você ter chegado a este estado, vamos, eu, você e o Sensei, procurar uma solução juntos!"
31130-142 = "Ainda tá pela metade, mas estou preparando outras provas também; então, a partir de hoje, quero fazer simulados regularmente e conferir o progresso."
31130-143 = "……."
31130-144 = "Esta é, provavelmente, a melhor escolha possível no momento……."
31130-145 = "Vamos nos esforçar! Com certeza, se a gente se esforçar, de algum jeito todo mundo consegue passar……!"
31130-146 = "[s] （Hifumi……!）"
31130-149 = "(O Sensei falou aquilo, então eu também não posso só ficar preocupada. Eu vou fazer o que eu posso……!)"
31130-151 = "……Sim, entendido. Sigo as instruções."
31130-152 = "T-tá bom……."
31130-153 = "Hifumi…… você é incrível. Preparar tudo isso só numa noite……"
31130-154 = "A-ah, que nada, o Sensei também me ajudou……."
31130-155 = "Sei, o Sensei."
31130-156 = "[s] \"Não fiz grande coisa; isto é fruto do esforço da Hifumi.\""
31130-157 = "E não é só isso; eu até preparei uma recompensa!"
31130-158 = "É que……"
31130-160 = "(Remexe, remexe……)"
31130-164 = "É esta! Quem tirar uma boa nota ganha de presente este produto do \"MomoFriends\"!"
31130-165 = "MomoFriends……?"
31130-166 = "……Que é isso?"
31130-167 = "……!!"
31130-168 = "U-ué……? É aquele \"MomoFriends\" que tá na moda ultimamente…… não me diga que vocês não conhecem……?"
31130-169 = "É a primeira vez que vejo…… ou, sei lá, acho que já vi de relance em algum lugar……?"
31130-170 = "Hãã!?"
31130-171 = "Que é isso, que coisa esquisita…… um porco? Ou um hipopótamo……?"
31130-172 = "N-não! O senhor Peroro é um pássaro! Olhem, essas asas magníficas! E esse bico altivo!"
31130-173 = "……Os olhos dão medo. E o nome também é meio obsceno……."
31130-174 = "Hãã……!? D-de fato, tem gente que diz isso, uma parte…… m-mas olhem bem. Olhando com calma, sei lá, fica meio fofin――"
31130-175 = "Ah, lembrei. Aliás, a mochila e a capinha do celular da Hifumi eram desse personagem, né."
31130-176 = "Se não me engano, era um personagem que fica de língua pra fora, babando, e gritando chorando \"já chega, me perdoa……!\", não era……?"
31130-177 = "Hã, n-não, a segunda parte tá tudo errada, viu!?"
31130-178 = "……E-eu não quero."
31130-179 = "Auu……."
31130-180 = "……."
31130-181 = "A-Azusa……?"
31130-182 = "……Q-que,"
31130-183 = "……que?"
31130-185 = "Que fofo……!!!"
31130-186 = "!!?"
31130-187 = "!?"
31130-188 = "Ora……?"
31130-190 = "Q-que fofo demais……! Que é isto, esta criatura redonda e fofinha……!!"
31130-191 = "Esses olhos, a expressão indecifrável…… não dá pra saber de jeito nenhum o que ele tá pensando……!"
31130-192 = "A-Azusa……?"
31130-193 = "Como esperado da Azusa, você percebeu a fofura do senhor Peroro! Isso! É essa parte que é fofa!"
31130-194 = "Mentiraa……!?"
31130-195 = "E-e este? Este comprido? Um tritão…… não, uma girafa? Sei lá, parece quentinho pra enrolar no pescoço……!"
31130-196 = "Essa é a WaveCat! É uma gata que vive dançando fazendo a onda, mas, como você disse, ultimamente saiu um produto de travesseiro de pescoço……"
31130-197 = "E este? Este pequenininho?"
31130-198 = "Esse é o Sr. Nikolai! É aquele que vive falando coisa filosófica e recebendo olhares estranhos!"
31130-199 = "Como uma das recompensas desta vez, tem até um livro que esse Nikolai escreveu, \"Além do Bem e do Mal\", e de primeira edição!"
31130-200 = "Incrível, incrível……!! Eu posso ganhar isto? N-não me diga que eu posso escolher?"
31130-201 = "Sim! Pega o que você quiser, Azusa!"
31130-206 = "Ora, ora……."
31130-207 = "Q-que é isso……."
31130-209 = "……Não tem jeito, vou dar o meu máximo."
31130-213 = "Que ótimo gerenciamento de motivação, Hifumi. Eu prometo. Vou cumprir a missão sem falta e pôr as mãos naquele animal misterioso e fofinho!"
31130-218 = "S-sim! Força!"
31130-222 = "Ehe, ehehehehehe……"
31130-226 = "Ora, sei lá, a Hifumi tá com uma cara alegre, digamos, com a mesma expressão de um bonequinho……♡"
31130-227 = "[s] \"Será que ela tá feliz de ter arranjado uma companheira de MomoFriends……?\""
31130-228 = "Hã……."
31130-230 = "Próximo Episódio;A Vice-Presidente do Comitê de Realização da Justiça (1)"
