[translation]
10000040-1 = "第4話;修行部の変わり者たち"
10000040-4 = "もう、倒しても倒してもキリがない……！"
10000040-5 = "せめてフィーナもいれば……！"
10000040-7 = "そこまでだよ！[ruby=すだまいちざ]魑魅一座[/ruby]・路上流！"
10000040-9 = "だ、誰だ！？"
10000040-11 = "何だ誰だと聞かれたら、答えてやるのが人情ね！"
10000040-14 = "（ドドンッ！！！）"
10000040-16 = "シュババッ！！"
10000040-17 = "派手に！"
10000040-18 = "可憐に……。"
10000040-19 = "う、美しく……！で、合ってます……？"
10000040-20 = "ばっちり！"
10000040-21 = "街の平和を守るため、美少女三人組の修行部……！"
10000040-22 = "ここに参上！！"
10000040-23 = "参上―……。"
10000040-24 = "えと、参上、です……。"
10000040-25 = "ふふーん！完璧な登場演出！ね、ツバキ先輩！"
10000040-26 = "ふぁ……そう？"
10000040-27 = "えっと……カエデちゃん、何だかすごい見られてる気が……。"
10000040-29 = "……ね、言ったでしょう？変わり者だって。"
10000040-30 = "……。"
10000040-31 = "……はっ！？つ、つい見惚れてしまったが、お前たちは何者だ！？"
10000040-32 = "私たちは、素敵なレディーになるために日々修行を続ける「修行部」！"
10000040-33 = "それが目的なのは、カエデだけでしょ？"
10000040-34 = "私は別にそんな修行もしてないし……とにかく寝られればそれで。"
10000040-35 = "ふぁ……眠い。ここで寝ていい？"
10000040-36 = "魑魅一座と対峙しながらも全く動じないツバキ先輩、かっこいい……！"
10000040-37 = "ああっ、でもツバキ先輩！ここで寝ちゃダメ……！"
10000040-38 = "あはは……でも、目標があるというのは良いことだと思います。"
10000040-39 = "そうだよミモリ先輩！素敵なレディーになるための修行ついでに、街の治安も守らなきゃ！"
10000040-40 = "ということで、私たち修行部の出番だよ！"
10000040-41 = "魑魅一座・路上流、覚悟！"
10000040-42 = "うん、覚悟～。"
10000040-43 = "そ、それでは、覚悟してください！"
10000040-46 = "ぐああっ！また強くなってないかあいつら！？"
10000040-47 = "無駄無駄！こっちには先生がいるんだから！"
10000040-48 = "ちっ、一体何者なんだシャーレ……！"
10000040-49 = "あの馬っ……忍者もどきはまだか！？"
10000040-50 = "えっと、確かそろそろ……。"
10000040-52 = "イズナ流忍法！四方八方もくもくの術！"
10000040-55 = "ば、爆発！？"
10000040-56 = "え、うわっ！？"
10000040-57 = "うーん……あれ、先生は？"
10000040-58 = "せ、先生……！？"
10000040-60 = "よし今のうちだ、全員突撃！"
10000040-62 = "イズナ、予告通りに再び参上しました！"
10000040-63 = "[s] \"けほっけほっ！イズナ……！？\""
10000040-64 = "イズナ、あの後気が付きました！"
10000040-65 = "たとえ先生が私の夢を認めてくれたかっこいい大人……いえ、かっこよくて悪い大人だとしても！"
10000040-66 = "こうやって敵として出会ってしまった以上……先生を倒して説得しなければなりません！"
10000040-67 = "それこそが、イズナの歩む忍びの道！忍者としての宿命だと！"
10000040-68 = "[s] \"……どういうこと？\""
10000040-69 = "さあ、お覚悟を！先生！"
10000040-70 = "イズナは、先生のことを打ち倒してみせます！"
10000040-71 = "やあっ！！"
