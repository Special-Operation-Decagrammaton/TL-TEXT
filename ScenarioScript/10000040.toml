[translation]
10000040-1 = "Episódio 4; As excêntricas do Clube de Treinamento"
10000040-4 = "Ai, não importa quantos eu derrote, eles não param de aparecer...!"
10000040-5 = "Se pelo menos a Pina estivesse aqui...!"
10000040-7 = "É aqui que vocês param! Estilo de Rua do Grupo Chimi!"
10000040-9 = "Q-quem é você!?"
10000040-11 = "Se perguntam quem somos, é uma questão de cortesia responder!"
10000040-14 = "（Badabum!!!）"
10000040-16 = "Shubaba!!"
10000040-17 = "De forma chamativa!"
10000040-18 = "De forma graciosa..."
10000040-19 = "E, de forma bela...! Está correto...?"
10000040-20 = "Perfeito!"
10000040-21 = "Para proteger a paz da cidade, o trio de garotas do Clube de Treinamento...!"
10000040-22 = "Chegou para salvar o dia!!"
10000040-23 = "Chegou... para salvar o dia."
10000040-24 = "Err, chegamos... para salvar o dia."
10000040-25 = "Fufun! Uma entrada triunfal perfeita! Né, Tsubaki-senpai!"
10000040-26 = "Ah... é mesmo?"
10000040-27 = "Err... Kaede-chan, sinto que estamos sendo muito observadas..."
10000040-29 = "...Viu? Eu não disse que elas eram excêntricas?"
10000040-30 = "……。"
10000040-31 = "……Hã!? E-eu acabei me distraindo olhando, mas quem são vocês!?"
10000040-32 = "Nós somos o Clube de Treinamento, que continua treinando dia após dia para nos tornarmos damas encantadoras!"
10000040-33 = "Esse é o objetivo só da Kaede, não é?"
10000040-34 = "Eu não estou fazendo nenhum treinamento desse tipo... contanto que eu possa dormir, está ótimo."
10000040-35 = "Ah... que sono. Posso dormir aqui?"
10000040-36 = "A Tsubaki-senpai não se abala nem um pouco ao enfrentar o Grupo Chimi, que incrível...!"
10000040-37 = "Ah, mas Tsubaki-senpai! Você não pode dormir aqui...!"
10000040-38 = "Ahaha... mas acho que ter um objetivo é algo bom."
10000040-39 = "É isso aí, Mimori-senpai! Além de treinar para nos tornarmos damas encantadoras, também temos que proteger a paz da cidade!"
10000040-40 = "Sendo assim, chegou a vez do nosso Clube de Treinamento!"
10000040-41 = "Grupo Chimi, Estilo de Rua, preparem-se!"
10000040-42 = "Sim, preparem-se~."
10000040-43 = "E-então, por favor, preparem-se!"
10000040-46 = "Argh! Elas não ficaram mais fortes de novo!?"
10000040-47 = "Inútil, inútil! Nós temos o Sensei aqui!"
10000040-48 = "Tsc, quem diabos é o Schale...!"
10000040-49 = "Aquela cavala... onde está a ninja de araque!?"
10000040-50 = "Hum, se não me engano, já deve estar chegando..."
10000040-52 = "Arte Ninja Estilo Izuna! Técnica da Cortina de Fumaça em Todas as Direções!"
10000040-55 = "U-uma explosão!?"
10000040-56 = "Ei, uau!?"
10000040-57 = "Hmm... Ué, cadê o Sensei?"
10000040-58 = "Se-Sensei...!?"
10000040-60 = "Certo, é agora! Todos, avancem!"
10000040-62 = "Izuna, como prometido, chegou novamente!"
10000040-63 = "[s] \"Cof, cof! Izuna...!?\""
10000040-64 = "Sensei, eu recuperei a consciência depois daquilo!"
10000040-65 = "Mesmo que o Sensei seja um adulto legal que reconheceu o meu sonho... não, um adulto legal e malvado!"
10000040-66 = "Já que nos encontramos como inimigos assim... eu preciso derrotar o Sensei e convencê-lo!"
10000040-67 = "Esse é o caminho ninja que a Izuna trilha! É o meu destino como ninja!"
10000040-68 = "[s] \"...O que você quer dizer com isso?\""
10000040-69 = "Vamos lá, prepare-se! Sensei!"
10000040-70 = "A Izuna vai derrotar você, Sensei!"
10000040-71 = "Yaa!!"
