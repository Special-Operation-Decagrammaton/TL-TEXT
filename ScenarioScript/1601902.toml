[translation]
1601902-1 = "Empregada perfeita"
1601902-2 = "Bom dia, Sensei."
1601902-3 = "Dito isso, vamos começar as tarefas de hoje."
1601902-10 = "A limpeza já foi concluída. Não há um grão de poeira sequer.#nMas não precisa me agradecer."
1601902-11 = "Estou apenas cumprindo o meu dever."
1601902-12 = "Aqui, por favor, seu café."
1601902-13 = "Usei uma xícara demi-tasse aquecida a 90 graus, café Bourbon Pointu com torra Full City, extraído no filtro de pano em 1,5 onças."
1601902-14 = "Acredito que poderá apreciar o sabor e o aroma originais dos grãos."
1601902-15 = "Como acompanhamento para o café, preparei também um bolo de cereja tipo Floresta Negra."
1601902-16 = "Não se preocupe. Usei um licor de cereja sem álcool."
1601902-17 = "Se tiver roupas para lavar, deixe comigo."
1601902-18 = "Preparei a lista de tarefas de hoje.#nEu mesma defini as prioridades, mas por favor, dê uma olhada."
1601902-22 = "[ns] \"...Toki?\""
1601902-23 = "Aconteceu alguma coisa?"
1601902-24 = "[s] \"A Toki é... tão eficiente assim...?\""
1601902-25 = "Com certeza. Afinal, sou uma empregada perfeita."
1601902-26 = "Mas, mesmo assim, ainda não estou usando todo o meu potencial."
1601902-27 = "Quando eu estava com a Rio-sama, eu usava o modo de empregada hiperperfeita, que era ainda mais impecável que agora."
1601902-28 = "[s] \"Então por que até agora...?\""
1601902-29 = "Porque o Sensei consegue cuidar da própria vida."
1601902-30 = "[s] \"Era realmente esse o motivo!?\""
1601902-31 = "Sensei, eu também sou humana. Se eu não descansar, vou acabar quebrando."
1601902-32 = "Aliás, existe outro motivo para alguém quebrar.#nÉ quando se passa muito tempo sem ter o que fazer."
1601902-33 = "Por isso, o Sensei precisa me acompanhar para passar o tempo."
1601902-34 = "Ah, não se preocupe, agora estou bem."
1601902-35 = "Na verdade, manter uma leve tensão é o ideal."
1601902-36 = "[s] \"Quer dizer que agora eu sou alguém que dá trabalho...?\""
1601902-37 = "Não é isso. O que quero dizer é que eu sei distinguir o tempo e o lugar."
1601902-38 = "Agora estamos em uma situação de emergência."
1601902-39 = "Cada um deve unir forças e cumprir seu papel."
1601902-40 = "Caso contrário, não conseguiremos ver o dia de amanhã."
1601902-41 = "[s] \"Essa é uma empregada perfeita de verdade, hein.\""
1601902-42 = "Paz, paz."
1601902-43 = "Sim? Há mais alguma coisa que lhe preocupa?"
1601902-44 = "Se eu cuidava da Rio-sama adequadamente todos os dias, é isso...?"
1601902-45 = "..."
1601902-46 = "Sensei."
1601902-50 = "Para aquela pessoa, todos os dias eram uma situação de emergência."
1601902-51 = "[s] \"Você também se esforçou muito, Toki.\""
1601902-52 = "Obrigada."
1601902-53 = "...De qualquer forma, é isso."
1601902-54 = "Em condições normais, eu deveria estar lhe auxiliando com o uniforme de empregada perfeita, mas..."
1601902-55 = "Por favor, me perdoe por estar vestida desta maneira."
1601902-56 = "[s1] \"Mesmo com essa roupa, Toki, você é uma empregada exemplar.\"\n[s2] \"É reconfortante ter você por perto, Toki.\""
1601902-59 = "Se é assim, que tal uma escolta 24 horas por dia?"
1601902-60 = "[s] \"Eh...?\""
1601902-61 = "Por exemplo, posso lavar suas costas."
1601902-62 = "Além disso, também posso aquecer sua cama."
1601902-63 = "Sim, com a minha temperatura corporal, certamente..."
1601902-64 = "[s] \"Espere um pouco!\""
1601902-65 = "Ah!#nPeço perdão por ter deixado passar algo tão importante."
1601902-66 = "Como a temperatura deste quarto está abaixo da média—"
1601902-67 = "deveríamos nos aproximar agora mesmo para nos aquecermos."
1601902-68 = "[s] \"E-eu agradeço, mas só a intenção já basta!\""
1601902-69 = "Não precisa se acanhar."
1601902-70 = "O Sensei é a pessoa mais importante para mim agora, então isso é o mínimo que posso fazer."
1601902-72 = "（Depois disso, acabei tendo que brincar de pega-pega com a Toki por um bom tempo）"
1601902-73 = "（Para a Toki, parece ter sido um passatempo suficiente, pois ela estava com uma expressão satisfeita）"
