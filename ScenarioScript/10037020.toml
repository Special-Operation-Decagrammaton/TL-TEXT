[translation]
10037020-1 = "Episódio 2: Águas que fluem se reúnem em um só lugar"
10037020-3 = "Oh... então este é o lugar...!"
10037020-5 = "É Shanhaijing, não é!"
10037020-6 = "Parece que a pesquisa prévia estava correta."
10037020-7 = "Tomoe! O que são aquelas telhas?#nElas têm um formato estranho!"
10037020-13 = "(Aquele é o famoso...!)"
10037020-14 = "(Não acredito que eles realmente vieram...!)"
10037020-18 = "Hm? Não estamos chamando a atenção de todos?"
10037020-19 = "Devem estar hipnotizados pelo prestígio da Presidente Cherino! Como esperado da Presidente!"
10037020-20 = "É, é mesmo? Hehe, não é uma sensação ruim."
10037020-22 = "Essa atmosfera... entendo, então é assim mesmo."
10037020-23 = "(Como esperado... parece que preciso me preparar mentalmente.)"
10037020-31 = "Mestra do Portão, venho relatar."
10037020-36 = "Os visitantes da Academia Federal Red Winter acabaram de chegar ao portão principal."
10037020-37 = "...Entendo."
10037020-41 = "Vou declarar novamente diante de todos."
10037020-42 = "Este intercâmbio é de extrema importância para a Red Winter—#ne, por extensão, para Shanhaijing."
10037020-43 = "Lembrem-se de que cada movimento nosso está sendo observado — façam o seu melhor."
10037020-45 = "Sim! Entendido, Mestra do Portão!"
10037020-46 = "Guardaremos isso em nossos corações!"
10037020-48 = "...Hum."
10037020-49 = "Então — aqui está a primeira ordem."
10037020-54 = "Recebam os visitantes calorosamente ao 'Estilo Genryumon'."
10037020-59 = "Entendido, Mestra do Portão!"
10037020-60 = "Sim! Deixe conosco, Mestra do Portão!"
10037020-61 = "[s] (Todos parecem estar empolgados demais...)"
10037020-67 = "Começou, Mestra do Portão."
10037020-68 = "Hum."
10037020-69 = "..."
10037020-73 = "Sensei, poderia me emprestar seus ouvidos por um momento?"
10037020-79 = "(Aproxima-se de Kisaki)"
10037020-80 = "Tenho um pedido."
10037020-81 = "Você poderia observar se todos estão cumprindo suas tarefas corretamente?"
10037020-82 = "Claro, não é que eu não confie neles."
10037020-83 = "É apenas que eu sou um pouco preocupada."
10037020-84 = "[s] (Acena silenciosamente)"
10037020-89 = "Mestra do Portão, se precisa de um favor, peça a mim..."
10037020-90 = "(...Se eu deixar com a Mina e algo der errado, as coisas podem acabar saindo do controle...)"
10037020-91 = "Você já tem uma tarefa muito mais importante, não tem?"
10037020-92 = "Do que está falando...?"
10037020-93 = "— A missão de escoltar a Mestra do Portão."
10037020-97 = "...! S-sim! Deixe comigo!#nNão deixarei que ninguém toque sequer um dedo na Mestra do Portão!"
10037020-98 = "Hum, uma resposta confiável. Conto com você."
10037020-99 = "Mestra do Portão...!"
10037020-100 = "(...Espero que nada aconteça.)"
10037020-109 = "A Mestra do Portão disse para recebermos ao 'Estilo Genryumon'."
10037020-110 = "Sendo assim, só pode ser 'aquilo', certo?"
10037020-111 = "Sim! 'Aquilo' mesmo!"
10037020-112 = "Hehe... vamos fazer com que eles aproveitem ao máximo as boas-vindas ao estilo Shanhaijing...!"
10037020-113 = "Precisamos garantir que este intercâmbio seja um sucesso absoluto!"
10037020-114 = "Não posso decepcionar a Mestra do Portão! Vamos!"
10037020-120 = "Registro de Interrogatório: 092-H-8"
10037020-122 = "Responsável: Membro da Genryumon"
10037020-124 = "Suspeita: Academia Federal Red Winter, 3º ano, Renkawa Cherino."
10037020-129 = "Qual é o seu nome?"
10037020-130 = "E-espere! Onde estão Marina e Tomoe?#nPara onde todos foram?"
10037020-131 = "Eu vim para uma viagem... não, para uma reunião de intercâmbio!#nNão me diga... isso é um golpe de estado!? Vocês me armaram uma cilada!?"
10037020-133 = "Cale a boca! Responda apenas o que for perguntado!"
10037020-134 = "E-eu sou a Presidente do Conselho Estudantil da Red Winter, Chefe do Departamento de Embelezamento Ambiental, Secretária-Geral, Representante do Departamento de Esportes, Chefe do Departamento de Limpeza, Presidente do Comitê Disciplinar, Chefe do Departamento de Merenda e—"
10037020-135 = "E também a melhor provadora de pudim deste mês, e a Cherino-sama que supervisiona diretamente a fábrica de castella!"
10037020-136 = "Que apresentação longa. #nNão apenas o nome, mas até os cargos..."
10037020-137 = "E, aliás, você acumula cargos demais..."
10037020-138 = "Tanto faz. #nQuais são seus hobbies?"
10037020-139 = "Que falta de educação! #nMesmo que vocês da Shanhaijing tenham proposto a reunião de intercâmbio...!"
10037020-140 = "Me trazer para um lugar desses, qual é o seu objetivo afinal!?"
10037020-142 = "Por que você foi 'guiada' até aqui, pergunta? #nIsso foi uma ordem direta da Mestra do Portão—"
10037020-146 = "Para recebê-la calorosamente ao 'estilo Genryumon'!"
10037020-147 = "Isso é uma recepção ao 'estilo Genryumon'!?"
10037020-151 = "[ns] (...Isso é)"
10037020-153 = "[ns] (...Talvez seja bem ruim...)"
10037020-156 = "[ns] \"K-Kisaki, é uma emergência!\""
10037020-157 = "O que houve? Quanta barulheira."
10037020-158 = "...O que exatamente está acontecendo?"
10037020-161 = "(Contei a Kisaki o que aconteceu na sala de interrogatório)"
10037020-165 = "...Hum."
10037020-166 = "Bom trabalho, Sensei. Primeiro, precisamos resolver essa situação."
10037020-167 = "Vou passar uma mensagem agora... não, uma correção na ordem."
10037020-168 = "Recebam a visitante como uma 'convidada importante'."
10037020-172 = "..."
10037020-173 = "(Q-que droga... eu achei que visitantes deveriam ser levados para a sala de interrogatório!)"
10037020-175 = "Sensei. Poderia me emprestar seus ouvidos por um momento?"
10037020-180 = "(Aproximo-me de Kisaki)"
10037020-181 = "É mais um pedido, na verdade..."
10037020-182 = "[s] (Assinto silenciosamente.)"
10037020-183 = "Hum... agradeço."
10037020-184 = "...Sua rapidez em entender as coisas é uma virtude."
10037020-188 = "Mina."
10037020-193 = "Ah, feh, s-sim!! Mestra do Portão!"
10037020-194 = "Se fosse você... teria lidado de outra forma, não teria?"
10037020-195 = "C-c-c-claro, Mestra do Portão! E-e-eu jamais cometeria um erro desses...!"
10037020-196 = "...Hum."
10037020-201 = "Uuu... levei uma bronca da Mestra do Portão..."
10037020-202 = "Aquele tom de voz da Mestra... ela deve estar muito brava..."
10037020-203 = "M-mas! Ela disse que se eu fizer direito da próxima vez, ela vai me perdoar!"
10037020-204 = "Ah! Não é hora de ficar deprimida!"
10037020-205 = "Como uma convidada importante, é? ...Isso é fácil!"
10037020-206 = "Desta vez, farei isso pela Mestra do Portão!"
10037020-216 = "Depois da sala de interrogatório, agora uma cela!?#nO que está acontecendo!?"
10037020-221 = "Por que será... sinto como se este lugar fosse familiar..."
10037020-222 = "O que é isso... será que a reunião de intercâmbio foi, desde o início, uma armadilha para nos prender?"
10037020-223 = "Seria este o plano do monarca sombrio...?"
10037020-225 = "Cale-se! É melhor para você se confessar logo!"
10037020-226 = "Caso contrário...!"
10037020-232 = "Ah...! Isso, não pode ser!?"
10037020-233 = "O, o que houve? Presidente Marina."
10037020-235 = "Mesmo sendo alunas de Red Winter, vocês deveriam saber o que é este animal!"
10037020-236 = "Isso mesmo, a especialidade de Shanhaijing — um panda!"
10037020-237 = "Se vocês não revelarem a conspiração..."
10037020-238 = "Eu vou tirar o bambu que este panda está comendo agora mesmo!"
10037020-243 = "Que, que maldade...! E olha que o panda não tem culpa de nada!?"
10037020-244 = "Por que o panda... ele ainda é tão pequeno...!#nVocê não tem coração, não é――!"
10037020-246 = "Se não quer que isso aconteça, confesse tudo!#nFufu... veja só, vou pegar o bambu que ele está comendo..."
10037020-251 = "Kyuu!?"
10037020-252 = "Pare com issooooooo!"
10037020-256 = "[ns] (Droga! Que droga!)"
10037020-264 = "M, Mestra da porta!?"
10037020-265 = "[s1] \"Kisaki! Concentre-se!\"\n[s2] \"A reunião de intercâmbio mal começou!\""
10037020-270 = "……Ah, é verdade."
10037020-271 = "Mina."
10037020-272 = "Sim! Mestra da porta!"
10037020-273 = "Diga o seguinte:#n#nRecebam os visitantes de Red Winter como se fossem a \"Mestra da porta de Genryumon\"."
10037020-274 = "I, isso significa que...!?"
10037020-275 = "Não temos tempo. Vá logo."
10037020-279 = "S, sim!"
10037020-283 = "……Eu queria perguntar uma coisa."
10037020-284 = "[s] \"Sim, pode perguntar qualquer coisa.\""
10037020-285 = "Minhas ordens são difíceis de entender?"
10037020-286 = "Será que é tão complicado assim?"
10037020-287 = "[s] \"Não acho que seja por isso...\""
10037020-288 = "Então, por que... você sabe o motivo?"
10037020-289 = "[s] \"…….\""
10037020-290 = "Haa..."
10037020-291 = "Eu só queria que todos recebessem bem os convidados..."
10037020-295 = "O que é isso afinal! Eu não vim até Shanhaijing para ter a experiência de ficar numa cela...!"
10037020-296 = "Por favor, acalme-se, Cherino-chan... não, Secretária-Geral Cherino.#nÉ justamente nessas horas que devemos mostrar um coração generoso."
10037020-297 = "Parece que houve um pequeno mal-entendido, mas agora as suspeitas já foram esclarecidas."
10037020-299 = "Pequeno, você diz... Chefe de gabinete Tomoe..."
10037020-300 = "O panda... fazer aquilo com ele...#nE ele ainda é tão pequeno...!"
10037020-301 = "Fufu, as palavras podem ter vários significados, sabe."
10037020-302 = "Além disso, toda essa situação pode ser usada como moeda de troca nas negociações mais tarde."
10037020-307 = "Por enquanto, vamos vestir estas roupas que recebemos de Genryumon."
10037020-308 = "Realmente, o uniforme de Red Winter é bem quente."
10037020-312 = "Vamos lá, é hora de se trocar, Cherino-chan."
10037020-322 = "Os convidados da Academia Federal de Red Winter chegaram!"
10037020-323 = "Chegaram!!"
10037020-333 = "Ugh... e, está tudo bem mesmo com isso...? A bainha está muito aberta...!"
10037020-338 = "[ns] \"Ué, outra pessoa...?\""
10037020-342 = "P, por que o Sensei está aqui...! Espera, você esqueceu de mim!?#nNão me diga que o Sensei também sofreu um tratamento cruel!?"
10037020-343 = "[s] \"Ah, não é isso... é que combina com você, Marina.\""
10037020-344 = "O quê... n, não zombe de mim! Sensei!"
10037020-345 = "Presidente Marina. Aquilo foi um elogio do jeito do Sensei."
10037020-346 = "[s3] \"Tomoe, como posso dizer...\"\n[s4] \"Você está vestindo muito bem! Combina muito com você.\""
10037020-349 = "Fufu, obrigada, Sensei."
10037020-350 = "Eu já pensava nisso há algum tempo, mas... o Sensei é muito bom em conquistar as pessoas. #nTalvez o Sensei tenha talento para agitação também. Fufu."
10037020-351 = "[s] \"Eu vou dispensar essa parte...\""
10037020-356 = "Muu...! Comrade! Você não esqueceu de mim, esqueceu!?"
10037020-357 = "[s5] \"Cherino, isso também combina muito com você.\"\n[s6] \"Especialmente as tranças, ficaram ótimas!\""
10037020-360 = "S-sério? Ehehe... Como esperado, o Comrade tem bom olho!"
10037020-364 = "Hm? Bigode...? #nAh! T-Tomoe!"
10037020-370 = "...Ninguém viu nada. Não é, Tomoe?"
10037020-371 = "Sim, Secretária-Geral."
10037020-376 = "(Será que aquele bigode falso é parte da cultura de Red Winter...)"
10037020-377 = "(Ah, valeu a pena ter organizado esse intercâmbio. Já consegui expandir meus horizontes logo de cara.)"
10037020-379 = "Viajaram de tão longe para vir a Shanhaijing — sejam bem-vindos."
10037020-387 = "Agradeço por terem aceitado o meu convite. #nSecretária-Geral Cherino, Chefe de Gabinete Tomoe, Presidente Marina."
10037020-388 = "Eu sou Kisaki Ryuge, a líder da \"Genryumon\"."
10037020-390 = "É um prazer conhecê-la, Líder Kisaki."
10037020-394 = "Vamos lá, Cherino-chan. Este é o momento de mostrar a dignidade de uma Secretária-Geral! #nComo eu ensinei antes... não, como nós praticamos..."
10037020-395 = "S-sim!? A-ah...!"
10037020-400 = "Agradeço pela calorosa recepção, Líder Kisaki!"
10037020-401 = "Eu sou a Presidente do Conselho Estudantil da Academia Federal de Red Winter, Chefe do Departamento de Embelezamento Ambiental, Secretária-Geral, Representante do Departamento de Esportes, Chefe do Departamento de Limpeza, Presidente do Comitê Disciplinar, Chefe do Departamento de Merenda e..."
10037020-403 = "E também a melhor degustadora de pudim deste mês e a Cherino-sama, que supervisiona diretamente a fábrica de castella!"
10037020-408 = "(Que apresentação longa... e \"calorosa recepção\", é... as palavras dela têm espinhos...)"
10037020-409 = "(Não há o que fazer. A culpa foi nossa, afinal.)"
10037020-410 = "(O início da batalha já foi declarado, então. Eu tinha ouvido falar, mas ela não é uma pessoa comum. Secretária-Geral Cherino.)"
10037020-412 = "Como foi? Eu disse tudo certinho, né?"
10037020-413 = "Sim, você foi muito bem."
