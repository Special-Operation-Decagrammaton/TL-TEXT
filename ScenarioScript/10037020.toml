[translation]
10037020-1 = "第2話;流れ行く水は一処に集まりて"
10037020-3 = "おぉ……ここが……！"
10037020-5 = "[ruby=せんがいきょう]山海経な[/ruby]のですね！"
10037020-6 = "事前の調査に間違いはないようですね。"
10037020-7 = "トモエ！あの瓦はなんだ？#n不思議な形をしているぞ！"
10037020-13 = "（あれが噂の……！）"
10037020-14 = "（まさか、本当に来るなんて……！）"
10037020-18 = "ん？おいらたち注目されてないか？"
10037020-19 = "チェリノ会長の威光に目を惹きつけられているのでしょう！流石会長です！"
10037020-20 = "そ、そうか？へへっ悪い気はしないな。"
10037020-22 = "この雰囲気は……なるほど、やはりそうなのですね。"
10037020-23 = "（やはり……心の準備をしておく必要がありそうですね）"
10037020-31 = "門主様、ご報告いたします。"
10037020-36 = "レッドウィンター連邦学園からの訪問客が、ただいま正門に到着したとのことです。"
10037020-37 = "……そうか。"
10037020-41 = "改めて皆の前で宣言しよう。"
10037020-42 = "此度の交流会は、レッドウィンターにとって――#nひいては山海経にとって重要な意味を持つ場じゃ。"
10037020-43 = "我らの一挙手一投足を見られていると思い――最善を尽くすように。"
10037020-45 = "はっ！かしこまりました、門主様！"
10037020-46 = "肝に銘じます！"
10037020-48 = "……うむ。"
10037020-49 = "では――最初の命じゃ。"
10037020-54 = "訪問客を「玄龍門式」で手厚く迎えるのじゃ。"
10037020-59 = "承知いたしました、門主様っ！"
10037020-60 = "はっ！お任せくださいっ！門主様！"
10037020-61 = "[s] （みんな、気合いが入りすぎているような……）"
10037020-67 = "始まりましたね、門主様。"
10037020-68 = "うむ。"
10037020-69 = "……。"
10037020-73 = "先生、少し耳を貸してくれるかの？"
10037020-79 = "（キサキに近づく）"
10037020-80 = "頼みがある。"
10037020-81 = "皆がきちんと任務を全うしているか、先生が見守っていてくれぬか？"
10037020-82 = "無論、信用しておらぬわけではない。"
10037020-83 = "[ruby=わらわ]妾[/ruby]が心配性なだけでの。"
10037020-84 = "[s] （静かに頷く）"
10037020-89 = "門主様、頼み事なら私に……"
10037020-90 = "（……ミナに任せて、万が一があれば、事をより大きくする可能性があるからのう……）"
10037020-91 = "[ruby=そなた]其方[/ruby]には、より大事なものを任せておるじゃろう？"
10037020-92 = "何のことでしょうか……？"
10037020-93 = "――門主を護衛する任務じゃ。"
10037020-97 = "……！は、はい！お任せください！#n何人たりとも門主様には指一本触れさせませんので！"
10037020-98 = "うむ、頼もしい答えじゃ。任せたぞ。"
10037020-99 = "門主様……！"
10037020-100 = "（……何事もなければ良いのじゃが）"
10037020-109 = "門主様は「玄龍門式」で迎えるようにと仰っていた。"
10037020-110 = "となれば、「アレ」しかないよな？"
10037020-111 = "ああ！「アレ」だな！"
10037020-112 = "ふっふっふっ……山海経式の歓迎を存分に味わってもらおうじゃないか……！"
10037020-113 = "交流会を絶対に成功させなければ！"
10037020-114 = "門主様を失望させるわけにはいかない！行こう！"
10037020-120 = "取調記録：092-H-8"
10037020-122 = "担当者：玄龍門の構成員"
10037020-124 = "容疑者：レッドウィンター連邦学園　3年、[ruby=れんかわ]連河[/ruby]チェリノ。"
10037020-129 = "名は？"
10037020-130 = "ま、待ってくれ！マリナとトモエは？#nみんなどこに行ったんだ？"
10037020-131 = "おいらは旅行に……いや、交流会に来たんだが！#nまさか……これはクーデターか！？おいらを嵌めたな！？"
10037020-133 = "黙れ！聞かれたことにだけ答えろ！"
10037020-134 = "お、おいらはレッドウィンターの生徒会長であり、環境美化部部長兼、書記長兼、運動部代表兼、掃除部部長兼、風紀委員長兼、給食部長兼――"
10037020-135 = "そして、今月の最優秀プリン試食家兼、カステラ工場を直接指導するチェリノ様だ！"
10037020-136 = "長ったらしい自己紹介だな。#n名前だけでなく、肩書きまで……。"
10037020-137 = "というか、兼任が多すぎるだろ……。"
10037020-138 = "まあいい。#n趣味は？"
10037020-139 = "なんて無礼なやつだ！#n交流会を申し入れたのは、お前ら山海経だというのに……！"
10037020-140 = "おいらをこんな場所に連れてきて、一体何が目的なんだ！？"
10037020-142 = "どうしてここに「案内」しているのか、だと？#nそれは門主様から直々に――"
10037020-146 = "「玄龍門式」で手厚く迎えるようにと、命じられたからだ！"
10037020-147 = "これが「玄龍門式」の歓迎なのか！？"
10037020-151 = "[ns] （……これは）"
10037020-153 = "[ns] （結構マズいかも……）"
10037020-156 = "[ns] \"き、キサキ、大変だ！\""
10037020-157 = "何事じゃ？騒々しい。"
10037020-158 = "……一体何が起きておる。"
10037020-161 = "（取調室で起きたことをキサキに話した）"
10037020-165 = "……ふむ。"
10037020-166 = "ご苦労じゃった、先生。一先ず、事を収めねばな。"
10037020-167 = "今すぐ[ruby=ことづて]言伝[/ruby]を……いや、命令の訂正を。"
10037020-168 = "訪問客を「大切な客人」のように迎えろ、と。"
10037020-172 = "……。"
10037020-173 = "（ま、マズい……訪問客は取調室に連行するものだとばかり！）"
10037020-175 = "先生。少し耳を貸してくれぬか？"
10037020-180 = "（キサキに近づく）"
10037020-181 = "また、頼み事なのじゃが……。"
10037020-182 = "[s] （静かに頷く。）"
10037020-183 = "うむ……礼を言う。"
10037020-184 = "……話が早いのは其方の美徳じゃの。"
10037020-188 = "ミナ。"
10037020-193 = "あ、ふぇ、は、はいっ！！門主様！"
10037020-194 = "其方なら……別の対処をしておったかの？"
10037020-195 = "ももももも、もちろんです、門主様！わわわわ、私があのようなヘマをするわけ……！"
10037020-196 = "……うむ。"
10037020-201 = "うぅぅ……門主様に叱られてしまった……。"
10037020-202 = "門主様のあのお声……相当お怒りになってるに違いない……。"
10037020-203 = "で、でも！次をちゃんとすれば、許してくれるって仰ってたからな！"
10037020-204 = "ああ！落ち込んでいる場合じゃない！"
10037020-205 = "大切な客人のように、か……それなら簡単だ！"
10037020-206 = "今度こそ、門主様のためにっ！"
10037020-216 = "取調室の次は牢屋！？#n一体なんなんだ！？"
10037020-221 = "なぜでしょう……馴染みのある場所のような……"
10037020-222 = "これは一体……交流会自体が最初から私たちを陥れる罠だったのでしょうか。"
10037020-223 = "これが、黒い君主の策……？"
10037020-225 = "黙れ！素直に吐いた方が身のためだぞ！"
10037020-226 = "さもなければ……！"
10037020-232 = "はっ……！それは、まさか！？"
10037020-233 = "ど、どうしたのだ？マリナ委員長。"
10037020-235 = "レッドウィンターの生徒といえど、この動物が何かは知っているはずだ！"
10037020-236 = "そう、山海経名物――パンダだ！"
10037020-237 = "お前たちが陰謀を吐かないのであれば……"
10037020-238 = "パンダが食っている竹を、この場で奪ってやるっ！"
10037020-243 = "な、なんて邪悪な……！パンダに罪はないというのに！？"
10037020-244 = "何故パンダを……まだ幼いのに……！#n貴様に人の心はないのか――！"
10037020-246 = "それがイヤなら全部白状するんだな！#nふふ……こうやって、こいつが食っている竹を……！"
10037020-251 = "キュゥ！？"
10037020-252 = "やめろぉぉぉぉぉぉぉぉ！"
10037020-256 = "[ns] （マズい！マズい！）"
10037020-264 = "も、門主様！？"
10037020-265 = "[s1] \"キサキ！しっかりして！\"\n[s2] \"まだ交流会は始まったばかりだよ！？\""
10037020-270 = "……ああ、そうじゃったな。"
10037020-271 = "ミナ。"
10037020-272 = "はいっ！門主様！"
10037020-273 = "こう伝えるのじゃ。#n#nレッドウィンターの訪問客を「玄龍門の門主」のように迎えろ、と。"
10037020-274 = "そ、それはつまり……！？"
10037020-275 = "時間が無い。はよう行け。"
10037020-279 = "は、はいっ！"
10037020-283 = "……一つ、聞きたいのじゃが。"
10037020-284 = "[s] \"うん、何でも聞いて。\""
10037020-285 = "妾の命令は、分かりにくいかの？"
10037020-286 = "そんなに理解しづらいのじゃろうか？"
10037020-287 = "[s] \"そういうわけじゃないと思うよ……。\""
10037020-288 = "であれば、何故……理由が分かるかの？"
10037020-289 = "[s] \"……。\""
10037020-290 = "はぁ……"
10037020-291 = "皆に賓客をもてなしてほしいだけなのじゃが……。"
10037020-295 = "一体なんなんだ！おいらは牢屋を体験するために山海経まで来ているのではないぞ……！"
10037020-296 = "落ち着いてください、チェリノちゃん……いいえ、チェリノ書記長。#nこういう時こそ、寛大な心を見せる時です。"
10037020-297 = "なにやら[ruby=・   ・   ・]些細な[/ruby]誤解があったようですが、今は疑いも晴れていますから。"
10037020-299 = "些細、ですか……トモエ秘書室長……。"
10037020-300 = "パンダを……あんな目に遭わせるなんて……#nしかも、まだ幼いのに……！"
10037020-301 = "ふふっ、言葉には様々な意味が含まれるものですよ。"
10037020-302 = "それに、一連の出来事は、いずれ交渉材料として使えるかもしれませんから。"
10037020-307 = "ひとまず、玄龍門からいただいたこの服を着てみましょう。"
10037020-308 = "たしかに、レッドウィンターの制服だと暑いな。"
10037020-312 = "さあ、お着替えの時間ですよ、チェリノちゃん。"
10037020-322 = "レッドウィンター連邦学園御一行様、ご到着！"
10037020-323 = "ご到着！！"
10037020-333 = "うぅ……ほ、本当にこれでいいのか……？裾が開きすぎているが……！"
10037020-338 = "[ns] \"えっ、別人……！？\""
10037020-342 = "ど、どうして先生がここに……！って、私のことを忘れたのか！？#nまさか、先生も酷い仕打ちを受けて！？！？"
10037020-343 = "[s] \"あ、そういう意味ではなくて……似合ってるね、マリナ。\""
10037020-344 = "なっ……か、からかわないでくれ！先生！"
10037020-345 = "マリナ委員長。あれは先生なりの褒め言葉なんですよ。"
10037020-346 = "[s3] \"トモエは、なんというか……。\"\n[s4] \"着こなしてるね！すごく似合ってるよ。\""
10037020-349 = "ふふ、ありがとうございます先生。"
10037020-350 = "以前から思っていたのですが……先生は人心掌握に長けているのですね。#n先生にもアジテーションの素質があるのかもしれません。ふふ。"
10037020-351 = "[s] \"それは遠慮しておくね……。\""
10037020-356 = "むぅ……！カムラッド！おいらのこと忘れてないか！？"
10037020-357 = "[s5] \"チェリノもよく似合っているよ。\"\n[s6] \"特に、三つ編みが新鮮でいいね！\""
10037020-360 = "そ、そうか？えへへ……やはりカムラッドは見る目があるな！"
10037020-364 = "ん？髭……？#nはっ！と、トモエ！"
10037020-370 = "……誰も何も見ていない。そうだな、トモエ？"
10037020-371 = "はい、書記長。"
10037020-376 = "（あのつけ髭は、レッドウィンターの文化なのじゃろうか……）"
10037020-377 = "（嗚呼、交流会を開いた甲斐があった。早速見聞を広げることができたからの）"
10037020-379 = "遠路はるばるよく山海経に参った――其方らを歓迎しよう。"
10037020-387 = "妾の申入れを承諾してくれたこと、感謝する。#nチェリノ書記長、トモエ秘書室長、マリナ委員長。"
10037020-388 = "妾は「玄龍門」の門主、[ruby=りゅうげ]竜華[/ruby]キサキじゃ。"
10037020-390 = "お初にお目にかかります、キサキ門主。"
10037020-394 = "さあ、チェリノちゃん。ここは書記長としての威厳を見せる時です！#n事前に教えた……いえ、練習していた通りに……。"
10037020-395 = "う、うん！？あ、ああ……！"
10037020-400 = "手厚い歓迎、感謝するぞ！キサキ門主。"
10037020-401 = "おいらは、レッドウィンター連邦学園の生徒会長であり、環境美化部部長兼、書記長兼、運動部代表兼、掃除部部長兼、風紀委員長兼、給食部長兼――"
10037020-403 = "そして、今月の最優秀プリン試食家兼、カステラ工場を直接指導するチェリノ様だ！"
10037020-408 = "（長い自己紹介……そして「手厚い歓迎」、か……言葉に棘があるが……）"
10037020-409 = "（致し方あるまい。此方の落ち度じゃからの）"
10037020-410 = "（戦いの火蓋は落とされたも同然、か。話に聞いてはおったが、只者ではないの。チェリノ書記長）"
10037020-412 = "どうだった？おいら、ちゃんと言えてたよな？"
10037020-413 = "はい、よくできました。"
