[translation]
2003015-1 = "Borboletas de asas unidas"
2003015-3 = "Ah, Sensei. Por aqui."
2003015-4 = "[s] \"Bom trabalho. Parece que você tem se esforçado bastante.\""
2003015-5 = "……."
2003015-6 = "É estranho. #nAté agora, eu sentia um pouco de cansaço……."
2003015-7 = "Mas, ao encontrar o Sensei, ele desapareceu como se fosse mentira."
2003015-8 = "[s] \"Será que eu tenho esse efeito todo……?\""
2003015-9 = "Fufu. Quem sabe?"
2003015-10 = "……A propósito, Sensei?"
2003015-11 = "Olhando para mim, não nota nada de diferente?"
2003015-13 = "(No momento em que ouvi essas palavras……)"
2003015-14 = "(Um suor frio escorreu pelas minhas costas)"
2003015-15 = "(Não posso errar a resposta……!)"
2003015-17 = "[ns] \"Bem, as roupas…… talvez?\""
2003015-18 = "Fufu……."
2003015-19 = "Não é algo tão óbvio assim, sabe?"
2003015-20 = "(Haruna está rindo, mas sinto que uma \"contagem\" avançou um ponto……)"
2003015-22 = "[ns] \"O-o penteado também está diferente!\""
2003015-23 = "De fato, pedi para arrumarem meu cabelo no salão que frequento especialmente para hoje, mas――"
2003015-24 = "Isso também não é algo óbvio demais?"
2003015-25 = "Da mesma forma, os óculos escuros também não são a resposta correta."
2003015-26 = "(Haruna não desfaz o sorriso, mas sinto que a \"contagem\" avançou mais um ponto)"
2003015-27 = "Fufufu……."
2003015-28 = "Tenho consciência de que estou sendo um pouco maldosa."
2003015-29 = "Mas é que, tratando-se do Sensei……"
2003015-30 = "Quem sabe, talvez você consiga, não é?"
2003015-31 = "Vamos, Sensei."
2003015-32 = "Não acha que hoje eu estou um pouco diferente……?"
2003015-33 = "(Esta é…… a última chance……!)"
2003015-35 = "[ns] \"……Ah! O enfeite de pena!!\""
2003015-37 = "！？！？"
2003015-38 = "[ns] (Eh……?)"
2003015-39 = "V-você é incrível……."
2003015-40 = "Meus olhos…… não estavam enganados……."
2003015-41 = "É como se fosse uma iguaria de primeira classe……."
2003015-43 = "(Chamei a atenção de Haruna, que estava com uma aura um tanto peculiar――)"
2003015-44 = "(Haruna ficou abalada e exibiu um sorriso sem jeito……)"
2003015-46 = "B-bem……."
2003015-47 = "Na verdade, eu mudo o enfeite de pena que uso dependendo do dia."
2003015-48 = "Normalmente, uso um pêndulo com fita――"
2003015-49 = "Em ocasiões formais, um coração circular."
2003015-50 = "Claro, às vezes escolho de acordo com o meu humor do dia."
2003015-51 = "[s] \"Entendi, então é assim.\""
2003015-52 = "E hoje, para um momento especial, uso…… o enfeite de borboleta."
2003015-53 = "É um dos meus favoritos."
2003015-58 = "Por isso…… fiquei feliz. Por você ter notado."
2003015-59 = "[ns] \"Ah, sim…….\""
2003015-60 = "Observe este enfeite com atenção."
2003015-61 = "Uma parte é uma pena amarela, e a outra é uma pena de vidro, não é?"
2003015-62 = "Sensei, você sabe o significado de cada uma?"
2003015-63 = "[s] \"É a primeira vez que ouço isso... o que significa?\""
2003015-64 = "Fufu. Se você souber o sabor de antemão, o charme da gastronomia acaba se perdendo. #nVamos deixar a resposta como um prazer para depois."
2003015-65 = "Deixando isso de lado... o fato de ser metade para cada um também tem seu próprio significado."
2003015-66 = "Isso é como um par de borboletas――"
2003015-67 = "Ou seja..."
2003015-71 = "..."
2003015-72 = "Pe-peço desculpas, mas vamos encerrar o assunto por aqui."
2003015-73 = "[s] \"Ué, por quê...?\""
2003015-74 = "Por favor, não se preocupe com isso..."
2003015-75 = "[s] \"Bem, se a Haruna diz...\""
2003015-79 = "[ns1] \"A propósito, você disse que era o seu favorito, né?\"\n[ns2] \"Não é fácil de sujar hoje...?\""
2003015-82 = "...!"
2003015-83 = "Is-isso é..."
2003015-84 = "Claro, estou ciente dos riscos."
2003015-85 = "Mas, ainda assim... havia um motivo para eu escolher isto."
2003015-86 = "[s] \"É... mesmo?\""
2003015-87 = "Sim. A pessoa em questão é um tanto insensível, então... #nTenho certeza de que ela mesma não deve ter notado."
2003015-88 = "..."
2003015-89 = "Não acha curioso?"
2003015-90 = "Você nota as pequenas diferenças nos acessórios――"
2003015-91 = "Mas não nota absolutamente nada do que está por trás disso."
2003015-92 = "Sim, absolutamente... a ponto de eu achar que é de propósito."
2003015-93 = "[s] \"Você está... brava?\""
2003015-94 = "Não, de forma alguma."
2003015-95 = "Apenas..."
2003015-96 = "Eu..."
2003015-97 = "..."
2003015-98 = "Fufu. Não é nada."
2003015-99 = "Tenho certeza de que eu também... gosto desse seu jeito, Sensei."
2003015-100 = "Bem, Sensei? A gastronomia de hoje――"
2003015-101 = "Não, espere."
2003015-102 = "Poderia me conceder um pouco do seu tempo?"
2003015-103 = "Como um \"agradecimento\" por ter notado a minha \"diferença\"――"
2003015-104 = "Hoje, deixe-me \"lhe oferecer um banquete\"."
2003015-105 = "Você sempre cuida de mim, então é também uma forma de retribuir o favor."
2003015-106 = "[s3] \"Haruna... obrigado...!\"\n[s4] \"Estou tão feliz que quase vou chorar...\""
2003015-109 = "Então, está decidido."
2003015-110 = "Vamos, Sensei. Eu lhe guiarei."
2003015-118 = "(Haruna se aproximou e suavemente entrelaçou seu braço ao meu――)"
2003015-119 = "(Caminhamos juntos por todos os cantos do local.)"
