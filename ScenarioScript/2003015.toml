[translation]
2003015-1 = "比翼の蝶"
2003015-3 = "あ、先生。こちらです。"
2003015-4 = "[s] \"お疲れ様。活躍してるみたいだね。\""
2003015-5 = "……。"
2003015-6 = "不思議ですね。#n先ほどまでは、いささかの疲労感があったのですが……。"
2003015-7 = "先生にお会いしたら、嘘のように消えてしまいました。"
2003015-8 = "[s] \"私、そんな効果あるかな……？\""
2003015-9 = "ふふっ。どうでしょう。"
2003015-10 = "……ところで、先生？"
2003015-11 = "[ruby=わたくし]私[/ruby]を見て、何かお気づきになりませんか？"
2003015-13 = "（その言葉を聞いた瞬間……）"
2003015-14 = "（背中を冷汗が伝った）"
2003015-15 = "（答えを間違えるわけにはいかない……！）"
2003015-17 = "[ns] \"えっと、服……かな？\""
2003015-18 = "ふふっ……。"
2003015-19 = "あまりに分かりやすいもの、ではありませんよ？"
2003015-20 = "（ハルナは笑っているが、何かの「カウント」が一つ進んだ気がする……）"
2003015-22 = "[ns] \"か、髪型も違うよね！\""
2003015-23 = "たしかに、行きつけの美容室に今日のためのセットをお願いしましたが――"
2003015-24 = "それも、分かりやすいところでは？"
2003015-25 = "同様に、サングラスも正解ではありません。"
2003015-26 = "（ハルナは笑顔を崩さないが、また一つ「カウント」が進んだ気がする）"
2003015-27 = "ふふふ……。"
2003015-28 = "意地悪なことをしている自覚はあるのです。"
2003015-29 = "ですが先生ならば……と思いまして。"
2003015-30 = "もしかしたら、ということもあるでしょう？"
2003015-31 = "さぁ、先生。"
2003015-32 = "今日の私は、ひと味違うと思いませんか……？"
2003015-33 = "（これが……ラストチャンス……！）"
2003015-35 = "[ns] \"……あっ！羽飾り！！\""
2003015-37 = "！？！？"
2003015-38 = "[ns] （え……？）"
2003015-39 = "さ、流石です……。"
2003015-40 = "私の目に……狂いはありませんでしたわ……。"
2003015-41 = "まるで、極上の美食のような……。"
2003015-43 = "（どこか妙な雰囲気のハルナに、声をかけたが――）"
2003015-44 = "（ハルナは動揺し、ぎこちない笑顔を浮かべていた……）"
2003015-46 = "え、えっと……。"
2003015-47 = "実は私、日によって身に着ける羽飾りを変えているのです。"
2003015-48 = "普段は、リボン付きのペンデュラム――"
2003015-49 = "フォーマルな場では、丸形のハート。"
2003015-50 = "もちろん、その日の気分で選ぶこともあります。"
2003015-51 = "[s] \"そうだったんだね。\""
2003015-52 = "そして今日は特別な時につける……蝶の羽飾り。"
2003015-53 = "私のお気に入りです。"
2003015-58 = "なので……嬉しかったです。気づいてくださって。"
2003015-59 = "[ns] \"あ、うん……。\""
2003015-60 = "この飾りをよくご覧ください。"
2003015-61 = "片方が黄色い羽、もう片方はガラスの羽になっているでしょう？"
2003015-62 = "先生は、それぞれの意味をご存じですか？"
2003015-63 = "[s] \"初めて聞いた……どういう意味なの？\""
2003015-64 = "ふふ。事前に味が分かっていては、せっかくの美食も魅力が薄れてしまうというもの。#n答えは、後の楽しみにしておきましょう。"
2003015-65 = "それはそれとして……半分ずつというのは、それ自体にも意味があるのです。"
2003015-66 = "これは、一対の蝶――"
2003015-67 = "つまり……。"
2003015-71 = "……。"
2003015-72 = "も、申し訳ないのですが、この話はここまでとさせてください。"
2003015-73 = "[s] \"えっ、どうして……？\""
2003015-74 = "どうか、お構いなく……。"
2003015-75 = "[s] \"まぁ、ハルナがそう言うなら……。\""
2003015-79 = "[ns1] \"ところで、お気に入りって言ったよね？\"\n[ns2] \"今日は汚れやすいんじゃない……？\""
2003015-82 = "……！"
2003015-83 = "そ、それは……。"
2003015-84 = "もちろん、リスクは承知の上です。"
2003015-85 = "ですが、それでも……これを選ぶ理由があったのです。"
2003015-86 = "[s] \"そう……なんだ？\""
2003015-87 = "ええ。理由の主は、どうにも鈍感な方ですので……#nきっと、ご本人はお気づきにならないかもしれませんが。"
2003015-88 = "……。"
2003015-89 = "不思議だと思いませんか？"
2003015-90 = "アクセサリーの些細な違いには、気づいてくださるのに――"
2003015-91 = "その向こう側にあるものには、まったく気づいてくださらない。"
2003015-92 = "ええ、まったく……わざとかと思うほどに。"
2003015-93 = "[s] \"なんか……怒ってる？\""
2003015-94 = "いえ、まさか。"
2003015-95 = "ただ……。"
2003015-96 = "私は……。"
2003015-97 = "……。"
2003015-98 = "ふふっ。何でもありません。"
2003015-99 = "きっと私は、先生のそういうところも……。"
2003015-100 = "さて、先生？今日の美食――"
2003015-101 = "ではなく。"
2003015-102 = "少しお時間を、いただけないでしょうか。"
2003015-103 = "私の「違い」に気づいてくださった「お礼」に――"
2003015-104 = "今日は私に「ご馳走」させてください。"
2003015-105 = "いつもお世話になっておりますし、日頃の恩返しも兼ねて。"
2003015-106 = "[s3] \"ハルナ……ありがとう……！\"\n[s4] \"嬉しくて泣いちゃいそうだよ……。\""
2003015-109 = "では、決まりですわね。"
2003015-110 = "さあ、先生。私がご案内いたしますわ。"
2003015-118 = "（近寄ってきたハルナがそっと私と腕を組み――）"
2003015-119 = "（会場の隅々まで、一緒に回った）"
