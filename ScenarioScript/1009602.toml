[translation]
1009602-1 = "水着選び"
1009602-2 = "（カンナから要請を受けて、ヴァルキューレ警察学校に向かった）"
1009602-4 = "わざわざありがとうございます、[USERNAME]先生。"
1009602-5 = "[s] \"カンナのお願いなら、いつでも歓迎だよ。\""
1009602-6 = "そ、そうですか。"
1009602-7 = "……さっそく、本題に移りたいのですが。"
1009602-8 = "[s1] \"ライフセーバーを任されたんだよね？\"\n[s2] \"水着選びで困ってるんだよね？\""
1009602-11 = "はい、その通りです。"
1009602-12 = "詳細は、場所を移してからにしましょう。"
1009602-16 = "どうぞ、先生。"
1009602-17 = "[s3] \"ここ、更衣室じゃん！\"\n[s4] \"こんな場所で二人きりは良くないよ！？\""
1009602-20 = "先生の懸念事項は理解しております。"
1009602-21 = "ですが、この時間は特別に使用許可を頂いているので、#n誰かが入ってくることはありません。"
1009602-22 = "[s] \"そういう問題じゃ……。\""
1009602-23 = "では、まずこちらを見ていただいて……。"
1009602-27 = "ライフセーバーの任務中は、水着の着用を命じられました。"
1009602-28 = "これらは、ヴァルキューレから支給された物になります。"
1009602-29 = "ですが、今回の任務は厳しい取り決めがなく、#n余計に困っておりまして。"
1009602-30 = "恥を忍んで、先生に助けを求めた次第です。"
1009602-31 = "[s5] \"つまり……。\"\n[s6] \"カンナが着る水着を選べば良いんだよね？\""
1009602-34 = "ええ、そうです。"
1009602-35 = "実はプライベートでも水着を着たことがほとんどないため、#n何を基準に選んだら良いものか分からず。"
1009602-36 = "どれも、よく見かけるデザインではありますが……。"
1009602-37 = "布面積があまりにも小さい物は、できれば避けたいと考えています。"
1009602-38 = "[s] \"たしかに、大胆なデザインだね。\""
1009602-42 = "[ns] \"それじゃあ、これはどうかな？\""
1009602-46 = "むしろ、恥ずかしい気が……！"
1009602-47 = "そうですね……。"
1009602-48 = "ライフセーバーだと周囲に伝わるような水着でお願いします。"
1009602-49 = "[s] \"なら、これがピッタリじゃない？\""
1009602-55 = "たしかに、これなら一目で分かるでしょうが……。"
1009602-56 = "さすがに、ここまで奇抜なデザインは……。"
1009602-57 = "[s] \"そうだよね……。\""
1009602-58 = "たとえば、これとか……。"
1009602-62 = "デザインも無難ですし、布面積も充分。#n腕章を着用すれば、ライフセーバーだと利用客にも伝わるでしょう。"
1009602-63 = "先生はどう思いますか？"
1009602-64 = "[s] \"私も良いと思う。\""
1009602-65 = "では、一度着てみます。"
1009602-66 = "……。"
1009602-67 = "あの、申し訳ないのですが……。"
1009602-68 = "[s7] \"あっ、ごめん！\"\n[s8] \"ここで着替えるんだもんね！\""
1009602-74 = "着てみましたが、どうでしょう？"
1009602-75 = "[s9] \"よく似合っていると思う。\"\n[s10] \"とっても可愛いね。\""
1009602-77 = "か、可愛いだなんて、お世辞はやめてください。"
1009602-78 = "私にそのような言葉は似合いませんので。"
1009602-79 = "では、これにしようと思います。"
1009602-80 = "……結局、私が自分で選んでしまいましたね。#nわざわざお呼び立てしたにもかかわらず……。"
1009602-81 = "無駄足を踏ませてしまい、申し訳ありませんでした。"
1009602-82 = "[s] \"ううん。\""
1009602-86 = "[ns] \"少しでも力になれたなら、良かったよ。\""
1009602-90 = "……はい。"
1009602-91 = "助けていただき、ありがとうございました。"
