[translation]
1001405-1 = "E assim, Izuna começa a gostar"
1001405-2 = "（E assim, fomos para a casa da Izuna para a sessão de cinema de dramas de época）"
1001405-3 = "Ah, Mestre! Seja bem-vindo!"
1001405-4 = "Conseguiu chegar até aqui sem se perder?"
1001405-5 = "Ah, vou preparar um chá agora mesmo!"
1001405-6 = "Se estiver com fome, também temos bolinhos sabor pipoca!"
1001405-7 = "[s1] \"Obrigado, vou aceitar.\"\n[s2] \"Izuna, você parece mais animada que o normal.\""
1001405-8 = "Ehehe, sim!"
1001405-9 = "Ehehe, sim!"
1001405-10 = "A série de drama de época que vamos assistir hoje é uma das favoritas da Izuna."
1001405-11 = "Poder assistir isso junto com o Mestre e discutir sobre o que achamos...!"
1001405-12 = "Eu não consegui ficar parada nos últimos dias..."
1001405-13 = "Desde que enviei o Momotalk, eu me senti flutuando de tanta empolgação!"
1001405-14 = "[s] \"E-entendo... E o que vamos assistir dessa série hoje?\""
1001405-15 = "É a obra-prima do diretor Shiba Inu Wanzou sobre ninjas: 'Os 77 Ninjas Solitários Errantes', versão Deluxe!"
1001405-16 = "[s3] \"Será que eles são realmente solitários?\"\n[s4] \"Parece que eles têm muitos amigos...\""
1001405-17 = "E cada capítulo tem uma hora de duração, totalizando 8 capítulos!"
1001405-18 = "E cada capítulo tem uma hora de duração, totalizando 8 capítulos!"
1001405-20 = "É uma superprodução que dura 8 horas no total!"
1001405-21 = "[s] \"Tudo isso!?\""
1001405-22 = "S-sim. Mas..."
1001405-23 = "Para entender o verdadeiro valor desta obra, precisamos assistir tudo..."
1001405-24 = "Não pode ser...?"
1001405-25 = "[s5] （As orelhas da Izuna, que sempre se movem animadamente,）\n[s6] （ficaram caídas de um jeito tão triste...!）"
1001405-30 = "[ns7] \"Não, não é isso. Eu estava mesmo com vontade de passar o dia\"\n[ns8] \"assistindo a um drama com calma hoje.\""
1001405-33 = "I-isso é um alívio...!"
1001405-34 = "Então vamos começar! Mestre!"
1001405-36 = "Pronto,"
1001405-37 = "Vou colocar no player..."
1001405-41 = "Hmm...? Ah, começou!"
1001405-43 = "（E assim, passamos quase 8 horas assistindo dramas de época com a Izuna）"
1001405-45 = "Foi incrível, não foi?!"
1001405-46 = "A lealdade ao seu senhor!"
1001405-47 = "Cada ninja tendo que apontar a espada um para o outro para sobreviver."
1001405-48 = "Batalhas espetaculares! Traição atrás de traição!"
1001405-49 = "E a amizade e o amor que florescem ali...!"
1001405-50 = "Mestre! O que achou!?"
1001405-51 = "Mesmo eu, que já assisti várias vezes, não pude evitar de pensar: 'Ah, que incrível!', e acabei me deixando levar!"
1001405-52 = "[s11] \"Fiquei surpreso, foi muito mais interessante do que eu imaginava...\"\n[s12] \"Estava transbordando de estilo.\""
1001405-53 = "Exatamente! Ninjas são aqueles que trabalham nas sombras, mas são seres muito estilosos!"
1001405-54 = "Exatamente! Ninjas são aqueles que trabalham nas sombras, mas são seres muito estilosos!"
1001405-55 = "[s13] \"Acho que agora entendo um pouco\"\n[s14] \"o porquê de você gostar tanto de ninjas, Izuna.\""
1001405-58 = "!! Você entendeu mesmo?!"
1001405-59 = "Mestre...!"
1001405-61 = "Eu amo isso, de todo o meu coração...!!!"
1001405-62 = "[s] \"Ué!? Izuna, calma aí!?\""
1001405-63 = "Ehe♪ Ehehe~♪"
1001405-68 = "Mestre~ Mestre~!"
1001405-69 = "Ah! É verdade! Isso é muito bom, mas a Izuna também tem uma nova série para recomendar!"
1001405-70 = "[s] \"Bem, Izuna, já está ficando tarde...\""
1001405-71 = "Eh... eu queria ver isso e conversar sobre minhas impressões com o mestre..."
1001405-72 = "É verdade. Já está tarde, então não dá, né..."
1001405-75 = "[ns] \"Não, não! Ainda dá para continuar por muito tempo!\""
1001405-77 = "Ah, muito obrigada...! Então, vamos começar!"
1001405-79 = "(Enquanto eu fazia a sessão de apreciação com a Izuna desse jeito, a noite foi avançando)"
