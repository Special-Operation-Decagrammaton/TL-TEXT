[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 22/06.]
1001405-1 = "E a Izuna, Começa a Gostar"
1001405-2 = "(Fui à casa da Izuna para uma sessão de drama de época)"
1001405-3 = "Ah, Meu Mestre! Bem-vindo!"
1001405-4 = "Você conseguiu chegar sem se perder?"
1001405-5 = "Ah, vou preparar o chá agora mesmo!"
1001405-6 = "Se estiver com fome, eu tenho uns manjus sabor pipoca também!"
1001405-7 = "[s1] \"Obrigado, eu aceito.\"\n[s2] \"Você parece estar se divertindo mais do que o normal, Izuna.\""
1001405-8 = "Ehehe, sim!"
1001405-9 = "Ehehe, sim!"
1001405-10 = "A série de drama de época que vamos assistir hoje é uma das obras favoritas da Izuna."
1001405-11 = "Poder assistir a isso e discutir sobre com o Meu Mestre...!"
1001405-12 = "Eu mal consegui ficar parada nos últimos dias..."
1001405-13 = "Desde que te mandei aquele MomoTalk, estou me sentindo nas nuvens!"
1001405-14 = "[s] \"S-Sério... O que vamos assistir dessa série hoje?\""
1001405-15 = "É a versão de luxo da obra-prima ninja dirigida pelo Shiba Inu Wanzou, 'O Bando dos 77 Ninjas Solitários Errantes'!"
1001405-16 = "[s3] \"Eles são realmente solitários?\"\n[s4] \"Parece que tem bastante gente...?\""
1001405-17 = "E cada capítulo tem uma hora, somando 8 capítulos no total!"
1001405-18 = "E cada capítulo tem uma hora, somando 8 capítulos no total!"
1001405-20 = "É um épico com 8 horas de duração ao todo!"
1001405-21 = "[s] \"Tudo isso!?\""
1001405-22 = "S-Sim. Mas..."
1001405-23 = "Para apreciar o verdadeiro valor desta obra, você tem que assistir até o final..."
1001405-24 = "Eu... estou pedindo muito...?"
1001405-25 = "[s5] (As orelhas da Izuna, que estão sempre pulando de energia,)\n[s6] (Estão caídas e tristonhas...!)"
1001405-30 = "[ns7] \"Não, não é isso. É que hoje eu estava justamente\"\n[ns8] \"com vontade de passar o dia inteiro assistindo TV.\""
1001405-33 = "A-Ainda bem...!"
1001405-34 = "Então vamos começar! Meu Mestre!"
1001405-36 = "E lá vai,"
1001405-37 = "Colocando o disco..."
1001405-41 = "Hmmm...? Ah, começou!"
1001405-43 = "(E assim, assistimos ao drama de época por quase 8 horas seguidas)"
1001405-45 = "Foi incrível, não foi!?"
1001405-46 = "A lealdade ao seu lorde!"
1001405-47 = "Ninjas forçados a apontar as espadas uns para os outros para sobreviver."
1001405-48 = "Batalhas épicas! Traições atrás de traições!"
1001405-49 = "E então, o amor e a amizade florescendo no meio de tudo isso...!"
1001405-50 = "Meu Mestre! O que achou!?"
1001405-51 = "Mesmo a Izuna já tendo assistido várias vezes, eu não consegui evitar pensar 'Ah, que legal...!' e fiquei totalmente imersa!"
1001405-52 = "[s11] \"Fiquei surpreso por ser muito mais interessante do que imaginei...\"\n[s12] \"Foi transbordante de coisas maneiras.\""
1001405-53 = "Sim! Os ninjas agem nas sombras, mas são criaturas incrivelmente legais!"
1001405-54 = "Sim! Os ninjas agem nas sombras, mas são criaturas incrivelmente legais!"
1001405-55 = "[s13] \"Acho que agora entendi um pouco por que\"\n[s14] \"a Izuna gosta tanto de ninjas.\""
1001405-58 = "...!! Você finalmente entendeu!?"
1001405-59 = "Meu Mestre...!"
1001405-61 = "Eu te amo, do fundo do meu coração...!!!"
1001405-62 = "[s] \"Uau!? Izuna, se acalma!?\""
1001405-63 = "Ehehe♪ Ehehehe~♪"
1001405-68 = "Meu Mestre~ Meu Mestre~!"
1001405-69 = "Ah! É verdade! Essa foi ótima, mas a Izuna tem uma série nova para recomendar!"
1001405-70 = "[s] \"Eh, Izuna, já está ficando tarde...\""
1001405-71 = "Ah... eu queria assistir com você e debatermos sobre..."
1001405-72 = "Mas você tem razão. É tarde e... eu estou sendo egoísta, né...?"
1001405-75 = "[ns] \"De jeito nenhum! Podemos assistir o quanto você quiser!\""
1001405-77 = "M-Muito obrigada...! Vamos começar agora!"
1001405-79 = "(E assim, a noite continuou com a nossa longa sessão de cinema juntos)"