[translation]
1001405-1 = "そしてイズナは好きになる"
1001405-2 = "（そうして時代劇の鑑賞会のため、イズナの家に向かった）"
1001405-3 = "あっ、主殿！いらっしゃいませ！"
1001405-4 = "ここまで迷わず来られましたか？"
1001405-5 = "あ、すぐお茶をお出ししますね！"
1001405-6 = "お腹が空いてましたら、ポップコーン味のお饅頭もありますよ！"
1001405-7 = "[s1] \"ありがとう、頂くね。\"\n[s2] \"イズナ、いつも以上に楽しそうだね。\""
1001405-8 = "えへへっ、はい！"
1001405-9 = "えへへっ、はい！"
1001405-10 = "今日見る時代劇シリーズは、イズナが大好きな作品の一つなんです。"
1001405-11 = "これを主殿と一緒に見ながら、感想を話し合えるなんて……！"
1001405-12 = "ここ数日じっとしていられず……。"
1001405-13 = "モモトークを送った時からずっと、どこかふわふわしたような気持ちでした！"
1001405-14 = "[s] \"そ、そっか……そのシリーズで、今日は何を見るの？\""
1001405-15 = "柴犬ワン蔵監督の忍者モノの名作『彷徨う孤独な忍者77人組』デラックスバージョンです！"
1001405-16 = "[s3] \"それ、本当に孤独かな？\"\n[s4] \"お友達がいっぱいのような……？\""
1001405-17 = "それも章ごとに1時間ずつで、全部で計8章！"
1001405-18 = "それも章ごとに1時間ずつで、全部で計8章！"
1001405-20 = "なんと、全体で8時間もある超大作です！"
1001405-21 = "[s] \"そんなに！？\""
1001405-22 = "は、はい。ですが……。"
1001405-23 = "この作品の真価を目にするためには、全部見ないといけなくて……。"
1001405-24 = "ダメ、でしょうか……？"
1001405-25 = "[s5] （いつもぴょこぴょこ元気に動くイズナの耳が、）\n[s6] （あんなにしゅんと垂れ下がって……！）"
1001405-30 = "[ns7] \"ううん、そんなことないよ。今日は一日こうして、\"\n[ns8] \"がっつりドラマを見ながら過ごしたい気分だったから。\""
1001405-33 = "そ、それはよかったです……！"
1001405-34 = "それでは始めましょう！主殿！"
1001405-36 = "よっと、"
1001405-37 = "ではプレーヤーに入れて……。"
1001405-41 = "んん……？あ、始まりました！"
1001405-43 = "（そうやって8時間近く、イズナと時代劇を鑑賞した）"
1001405-45 = "すっごく面白かったですね！"
1001405-46 = "主君への忠義！"
1001405-47 = "生き残るために、お互い刀を向けざるを得ないそれぞれの忍者。"
1001405-48 = "壮絶な戦い！裏切りに次ぐ裏切り！"
1001405-49 = "そしてそこで芽生える友情と愛……！"
1001405-50 = "主殿！どうでしたか！？"
1001405-51 = "何度か見ているはずのイズナも思わず、ああカッコいい……！と、つい浸ってしまいました！"
1001405-52 = "[s11] \"想像の何倍も面白くてびっくりした……。\"\n[s12] \"カッコよさで満ち満ちてたね。\""
1001405-53 = "そうなんです！忍者というのは影で働く者ですが、かっこいい存在なのです！"
1001405-54 = "そうなんです！忍者というのは影で働く者ですが、かっこいい存在なのです！"
1001405-55 = "[s13] \"どうしてイズナがこんなに忍者が好きなのか、\"\n[s14] \"少しは分かった気がする。\""
1001405-58 = "っ！！分かっていただけましたか！"
1001405-59 = "主殿っ……！"
1001405-61 = "好きですっ、心から……っ！！！"
1001405-62 = "[s] \"わっ！？イズナ、落ち着いて！？\""
1001405-63 = "えへっ♪えへへっ～♪"
1001405-68 = "主殿～主殿～！"
1001405-69 = "あっ！そうだ！これも良いのですが、イズナおすすめの新シリーズもあるんです！"
1001405-70 = "[s] \"えっと、イズナ、そろそろ遅い時間だし……。\""
1001405-71 = "えっ……これ見て、主殿と感想をお話したかったのですが……。"
1001405-72 = "そうですよね。もう遅いですし、ダメ、ですよね……。"
1001405-75 = "[ns] \"ううん！まだまだいくらでも！\""
1001405-77 = "あっ、ありがとうございます……！では、始めましょうっ！"
1001405-79 = "（そうやってイズナと鑑賞会をしながら、夜は更けていった）"
