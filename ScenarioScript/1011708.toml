[translation]
1011708-1 = "garota em chamas"

1011708-2 = "(Depois de um tempo recebi um Momo Talk que me deixou desconfortável...)"

1011708-6 = "Hikari está aqui!"

1011708-7 = "[s1] \"Olá, Hikari.\"\n[s2] \"O que é isso na sua mão...?\""

1011708-10 = "O novo desafio de Hikari."

1011708-11 = "Itens que ultrapassam os limites."

1011708-12 = "Dê uma olhada!"

1011708-13 = "[s3] \"Isto é....\"\n[s4] \"Caril muito picante?\""

1011708-16 = "Sim, é super picante."

1011708-17 = "Hikari comerá comida picante a partir de hoje."

1011708-18 = "Proteja seus dentes e torne-se uma nova luz."

1011708-19 = "[s] \"Pelo menos meio picante...\""

1011708-20 = "A força da mente é a força do corpo."

1011708-21 = "Em outras palavras, Hikari é invencível."

1011708-22 = "Não é difícil porque sou invencível."

1011708-23 = "[s] \"Entendo...\""

1011708-25 = "(Apesar de suas preocupações, Hikari preparou curry.)"

1011708-27 = "Vamos."

1011708-33 = "Eiyu!"

1011708-34 = "[s] \"Ah?\""

1011708-39 = "……."

1011708-40 = "...Eca."

1011708-41 = "Talvez não seja tão bom...."

1011708-42 = "[s] \"A dor virá mais tarde...\""

1011708-43 = "Hikari, crítico."

1011708-44 = "Meus lábios estão em chamas."

1011708-45 = "Fenfeheelf…."

1011708-46 = "Fuuuuuuuuuuuuuuuuuuuuuuuuu..."

1011708-47 = "[s5] \"Já está difícil respirar!\"\n[s6] \"Ei, espere, vou pegar uma coisa para você!""

1011708-53 = "(Dá o leite que comprou para Hikari)"

1011708-57 = "Ufa, fuuu..."

1011708-58 = "Ufa."

1011708-59 = "[s] \"Você se acalmou...?\""

1011708-60 = "Ufa, ainda não..."

1011708-61 = "Danos contínuos, cerca de 10 bilhões..."

1011708-62 = "Não como mais comida picante..."

1011708-63 = "A força do meu coração não tinha sentido..."

1011708-64 = "Minha boca estava em chamas."

1011708-68 = "Professor, você tem algo doce?"

1011708-69 = "Ainda estou sem palavras..."

1011708-70 = "[s7] \"Comprei um sorvete só para garantir...\"\n[s8] \"Depois de comer você escova os dentes, ok?\""

1011708-73 = "Eu prometo, vou escovar os dentes com Hikari-chan."

1011708-78 = "Professor, vamos comer também."

1011708-80 = "(Hikari provavelmente se cansou depois de tomar o sorvete e adormeceu no meu colo.)"

1011708-81 = "(...)"

1011708-85 = "[ns] \"Não consigo me mover assim...\""

1011708-86 = "(deixei ele dormir até terminar o trabalho)"

