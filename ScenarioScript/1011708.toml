[translation]
1011708-1 = "ガール・オン・ファイアー "
1011708-2 = "（どこか不安になるモモトークを受け取り、しばらくして……）"
1011708-6 = "ヒカリ参上ー。"
1011708-7 = "[s1] \"こんにちは、ヒカリ。\"\n[s2] \"その手に持ってるのは……？\""
1011708-10 = "ヒカリの新しいチャレンジー。"
1011708-11 = "限界を越えるアイテムー。"
1011708-12 = "ご覧あれー"
1011708-13 = "[s3] \"これは……。\"\n[s4] \"激辛カレー？\""
1011708-16 = "イエース、激辛ー。"
1011708-17 = "ヒカリ選手は今日から辛いものを食すー。"
1011708-18 = "歯を守ってニューヒカリとなるー。"
1011708-19 = "[s] \"せめて中辛とかで……\""
1011708-20 = "心の強さは体の強さー。"
1011708-21 = "つまりヒカリは無敵ー。"
1011708-22 = "無敵だから辛くない－。"
1011708-23 = "[s] \"なるほど……。\""
1011708-25 = "（心配をよそに、ヒカリはカレーを準備した）"
1011708-27 = "いくよー。"
1011708-33 = "よゆー！ "
1011708-34 = "[s] \"おおっ？\""
1011708-39 = "……。"
1011708-40 = "……うう。"
1011708-41 = "よゆーじゃないかも……。"
1011708-42 = "[s] \"辛さって後から来るよね……。\""
1011708-43 = "ヒカリ、クリティカルー。"
1011708-44 = "くちびる燃えるーいふぁいー。"
1011708-45 = "ふぇんふぇーへるふぅー……。"
1011708-46 = "ふぅぅーーはぁぁーーー……。"
1011708-47 = "[s5] \"息がもう辛い！\"\n[s6] \"な、なにか買ってくるから待ってて！\""
1011708-53 = "（買ってきた牛乳をヒカリに渡した）"
1011708-57 = "ふぅ、ふぅ……"
1011708-58 = "ふぅーーーー。"
1011708-59 = "[s] \"落ち着いたかな……？\""
1011708-60 = "うー、まだいだいー……。"
1011708-61 = "持続ダメージ、100億くらい……。"
1011708-62 = "もう辛いの食べない……。"
1011708-63 = "心の強さなど無意味だったのだ……。"
1011708-64 = "口の中燃えたー。"
1011708-68 = "先生、甘いのあるー？"
1011708-69 = "まだ口からひ……。"
1011708-70 = "[s7] \"念のためアイスも買ってきたけど……。\"\n[s8] \"食べたら、ちゃんと歯磨きするんだよ？\""
1011708-73 = "約束する、ヒカリちゃんと歯磨きするー。"
1011708-78 = "先生もたべよー。"
1011708-80 = "（アイスを食べたヒカリは疲れたのか、膝の上で眠りについた）"
1011708-81 = "（……）"
1011708-85 = "[ns] \"これじゃ動けないな……。\""
1011708-86 = "（そのまま仕事が終わるまで寝かせてあげた）"
