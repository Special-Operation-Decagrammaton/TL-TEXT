[translation]
10047100-1 = "Episódio 10: A magia que realiza desejos"
10047100-3 = "A-ah, falando nisso... 'No dia da destruição, o sino começará a cantar'..."
10047100-4 = "Você acredita mesmo nisso? É só uma daquelas lendas urbanas comuns, não é?"
10047100-5 = "M-mas ele está realmente tocando...!#nAquele sino agourento!"
10047100-9 = "Este timbre... não sinto nada de agourento nele."
10047100-10 = "Pelo contrário, sinto o sentimento puro daquela criança que pensa em nós..."
10047100-11 = "Mesmo que não concordem, são companheiras preciosas.#nO pesar e a ansiedade de estar do lado de quem se despede de tais amigas."
10047100-12 = "A culpa e a impotência que surgiram ao combinar todos esses sentimentos."
10047100-13 = "Mas eu acreditava que, com você, seria possível encontrar a verdadeira história que deseja realizar."
10047100-14 = "Hehe. Eu consigo ouvir, a sua gentileza ao pensar em nós."
10047100-16 = "Topo da torre do sino sem nome"
10047100-18 = "SHAAA!!! Por que eu tenho que fazer isso?!"
10047100-19 = "No fim, todo mundo acabou sendo capturado!"
10047100-20 = "Já que chegamos até aqui—"
10047100-21 = "Não vou perdoar vocês se não tiverem sucesso! Suas veteranas idiotas—!!!"
10047100-24 = "Gaaa! Gaaaaa!"
10047100-25 = "Hii! Um bando de corvos...!!"
10047100-29 = "Estão todos assustados... Vamos aproveitar essa brecha para avançar."
10047100-37 = "Mestre, sua mão!"
10047100-38 = "Vamos completar a magia que realiza desejos, todos juntos!"
