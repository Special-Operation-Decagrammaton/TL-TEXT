[translation]
90001100-1 = "第10話;名もなき神の遺産"
90001100-2 = "私たちは氷河からコクマーの痕跡を辿ってここに至り――"
90001100-3 = "火山地帯で採取した資源を輸送していることを把握しました。"
90001100-4 = "そうね。鉄道を作ってどこかに送っていたわ。#nそのための施設が至る所に残っているはずよ。"
90001100-5 = "では、私がそれを偵察してきてもよろしいでしょうか？"
90001100-6 = "ええ。お願い。"
90001100-14 = "私も手伝おうか？"
90001100-15 = "いえ、エイミには他に頼みたいことがあります。"
90001100-16 = "頼みたいこと？"
90001100-17 = "はい。周辺に残っているデカグラマトンの残留基地を分析してください。"
90001100-18 = "サンプルをもっと集めてくればいいのかな？"
90001100-19 = "話が早くて助かります。#nサンプルは多ければ多いほどいいですからね。"
90001100-27 = "……リオは一体何を？"
90001100-30 = "サンプルを追加で集めるのではなくて？"
90001100-31 = "……手伝ってくれるのですね？"
90001100-32 = "ええ、そのつもりよ。その方が効率的だもの。"
90001100-33 = "ありがとうございます。それでは、手早く済ませましょう。"
90001100-34 = "[s] \"なんだかんだ……。\""
90001100-38 = "[ns] \"仲良いんだね！\""
90001100-39 = "そんなことありませんよ！？"
90001100-40 = "それは勘違いよ。"
90001100-46 = "これで大丈夫そう？"
90001100-47 = "ええ、十分です。分析も……もう終わりそうです。#n結果は無事届いていますか？"
90001100-48 = "問題ないわ。私の方も結論が出せそうよ。"
90001100-49 = "あら、どのような結論でしょうか？"
90001100-50 = "これは現場でも確認できることだけれど――"
90001100-51 = "物質の再構築がされた痕跡が残っているの。"
90001100-52 = "なるほど……以前、目の当たりにしたことのある力ですね。"
90001100-53 = "[s] \"そうなの？\""
90001100-54 = "はい。アトラ・ハシースの箱舟を覚えていますか？"
90001100-55 = "そこでアリスと――ケイと呼ばれる個体……あの子に起きたことを。"
90001100-67 = "[ns] \"あ……！\""
90001100-69 = "そういうことよ。"
90001100-70 = "はい。その通りです。"
90001100-71 = "物質の再構築は、「名もなき神」の力の中で最も代表的なものよ。"
90001100-72 = "コクマー本体は確認する方法がないけれど……少なくとも、この凍原地帯の資源採取や輸送設備、もしかしたら眷属も……"
90001100-73 = "ええ。物質再構築――「名もなき神」の力を利用して作られたものではないかと。"
90001100-74 = "それによって、私たちの仮説は確定段階に到達したと言えます。"
90001100-75 = "[s] \"確定段階？\""
90001100-76 = "はい。すべてのピースが揃ったと言えるでしょう。#nそれは――"
90001100-84 = "[ruby=あすま]飛鳥馬[/ruby]トキ、ただいま戻りました。報告いたします。"
90001100-85 = "火山地帯から続く線路を発見。#n道中に少数の眷属を確認しました。"
90001100-86 = "[s] \"お疲れ様、トキ。\""
90001100-87 = "職務を遂行したまでです。#nですが、先生はもっと私を褒めてください。"
90001100-93 = "具体的には、頭を撫でる、軽いハグ、頬を両手で包み込むなどがあります。"
90001100-96 = "……何をそんなに慌てているのですか？"
90001100-97 = "トキ……？"
90001100-100 = "諦めて、会長。#nこれがトキの素なのか、変わったからなのかわからないけど……最近はずっとこんな感じだよ。"
90001100-101 = "……話を戻しましょう。"
90001100-102 = "[s] \"そ、そうだね！すべてのピースが揃ったってどういうこと？\""
90001100-103 = "……しょぼん。"
90001100-104 = "特異現象捜査部がこれまでに相対したデカグラマトンの預言者は、ビナー、ケセド、ホド、ケテルの4体……"
90001100-105 = "4体とも、「名もなき神」の力とは何の関係もありませんでした。"
90001100-106 = "ですが、氷河に到着してから相対したゲブラとコクマーには、「名もなき神」の力の痕跡が残っていたのです。"
90001100-107 = "溶岩の上に船が浮かぶのも……それと関係があるのかもしれません。"
90001100-108 = "[s1] \"つまり、デカグラマトンと預言者が。\"\n[s2] \"「名もなき神」の力を使ってるってこと？\""
90001100-111 = "はい。それは確実かと。"
90001100-112 = "問題はその力を利用して何をするつもりなのか、ですが……"
90001100-116 = "ッ！？#nリオ、今のは……？"
90001100-117 = "ええ。こちらでも確認できたわ。"
90001100-123 = "何か起きたの？"
90001100-124 = "私たちにも共有を……。"
90001100-138 = "先に伝えておきます。#nこれは……緊急事態です。"
90001100-139 = "結論から言うと――新しい預言者の信号を探知したわ。"
90001100-140 = "それも、今までとは一線を画す……。"
90001100-145 = "とても強力な信号、です。"
90001100-147 = "次回;行き止まり"
