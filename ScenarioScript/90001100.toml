[translation]
90001100-1 = "Episódio 10: O Legado do Deus Sem Nome"
90001100-2 = "Seguimos os rastros de Chokmah desde a geleira até aqui e..."
90001100-3 = "descobrimos que eles estão transportando recursos coletados na zona vulcânica."
90001100-4 = "Entendo. Eles construíram ferrovias para enviar os recursos para algum lugar. #nAs instalações para isso devem estar espalhadas por toda parte."
90001100-5 = "Nesse caso, eu poderia ir investigar isso?"
90001100-6 = "Sim. Por favor."
90001100-14 = "Quer que eu ajude também?"
90001100-15 = "Não, tenho outra tarefa para a Eimi."
90001100-16 = "Uma tarefa?"
90001100-17 = "Sim. Por favor, analise as bases remanescentes do Decagrammaton na área."
90001100-18 = "Devo coletar mais amostras, é isso?"
90001100-19 = "Você é rápida, isso ajuda muito. #nQuanto mais amostras, melhor."
90001100-27 = "……O que a Rio está fazendo, afinal?"
90001100-30 = "Não é para coletar amostras adicionais?"
90001100-31 = "……Você vai me ajudar, não vai?"
90001100-32 = "Sim, essa é a intenção. É mais eficiente assim."
90001100-33 = "Obrigada. Então, vamos terminar isso rapidamente."
90001100-34 = "[s] \"No fim das contas...\""
90001100-38 = "[ns] \"Vocês são bem próximas!\""
90001100-39 = "Não é nada disso!?"
90001100-40 = "Isso é um mal-entendido."
90001100-46 = "Isso parece suficiente?"
90001100-47 = "Sim, é o bastante. A análise também... está quase terminando. #nOs resultados chegaram sem problemas?"
90001100-48 = "Sem problemas. Eu também estou quase chegando a uma conclusão."
90001100-49 = "Ora, que tipo de conclusão seria?"
90001100-50 = "É algo que pode ser confirmado no local, mas..."
90001100-51 = "Existem vestígios de que a matéria foi reconstruída."
90001100-52 = "Entendo... É um poder que já vimos antes, não é?"
90001100-53 = "[s] \"É mesmo?\""
90001100-54 = "Sim. Você se lembra da Arca de Atra-Hasis?"
90001100-55 = "O que aconteceu com a Alice e... aquela entidade chamada Kei... o que aconteceu com ela lá."
90001100-67 = "[ns] \"Ah...!\""
90001100-69 = "É exatamente isso."
90001100-70 = "Sim. Exatamente."
90001100-71 = "A reconstrução de matéria é o mais representativo dos poderes do \"Deus Sem Nome\"."
90001100-72 = "Não há como confirmar o corpo principal de Chokmah, mas... pelo menos, a coleta de recursos e as instalações de transporte nesta zona congelada, e talvez até os subordinados..."
90001100-73 = "Sim. Acredito que foram criados usando a reconstrução de matéria — o poder do \"Deus Sem Nome\"."
90001100-74 = "Com isso, podemos dizer que nossa hipótese chegou a um estágio de confirmação."
90001100-75 = "[s] \"Estágio de confirmação?\""
90001100-76 = "Sim. Podemos dizer que todas as peças se encaixaram. #nIsso significa..."
90001100-84 = "Toki Asuma, estou de volta. Relatando."
90001100-85 = "Descobri trilhos que continuam a partir da zona vulcânica. #nConfirmei um pequeno número de subordinados no caminho."
90001100-86 = "[s] \"Bom trabalho, Toki.\""
90001100-87 = "Apenas cumpri meu dever. #nMas, Sensei, por favor, me elogie mais."
90001100-93 = "Especificamente, fazer carinho na cabeça, um abraço leve, envolver minhas bochechas com as mãos, entre outras coisas."
90001100-96 = "……Por que você está tão agitada?"
90001100-97 = "Toki……?"
90001100-100 = "Desista, Presidente. #nNão sei se esse é o jeito natural da Toki ou se ela mudou... mas ultimamente ela tem sido assim o tempo todo."
90001100-101 = "……Vamos voltar ao assunto."
90001100-102 = "[s] \"C-certo! O que você quer dizer com todas as peças se encaixaram?\""
90001100-103 = "……desânimo."
90001100-104 = "Os Profetas de Decagrammaton que o Departamento de Investigação de Fenômenos Estranhos enfrentou até agora foram Binah, Chesed, Hod e Kether, totalizando quatro..."
90001100-105 = "Nenhum dos quatro tinha qualquer relação com o poder do \"Deus Sem Nome\"."
90001100-106 = "No entanto, Geburah e Chokmah, que enfrentamos após chegarmos à geleira, continham vestígios do poder do \"Deus Sem Nome\"."
90001100-107 = "O fato de haver um navio flutuando sobre a lava... talvez tenha relação com isso."
90001100-108 = "[s1] \"Ou seja, Decagrammaton e os Profetas...\"\n[s2] \"Estão usando o poder do 'Deus Sem Nome'?\""
90001100-111 = "Sim. Tenho quase certeza disso."
90001100-112 = "A questão é o que eles pretendem fazer utilizando esse poder, mas..."
90001100-116 = "!?#nRio, o que foi isso...?"
90001100-117 = "Sim. Nós também confirmamos aqui."
90001100-123 = "O que aconteceu?"
90001100-124 = "Compartilhem conosco também..."
90001100-138 = "Vou adiantar logo.#nIsso é... uma emergência."
90001100-139 = "Indo direto ao ponto — detectamos o sinal de um novo Profeta."
90001100-140 = "E um que está em um nível completamente diferente de todos os anteriores..."
90001100-145 = "É um sinal extremamente poderoso."
90001100-147 = "Próximo episódio: Beco sem saída"
