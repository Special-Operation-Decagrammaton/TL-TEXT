[translation]
1301008-1 = "ポーカーフェイス"
1301008-2 = "ミレニアム・「セミナー」生徒会室"
1301008-3 = "他の生徒たちを待っていて退屈だったので、ユウカにポーカーを勧めてみた。"
1301008-4 = "ポーカー、ですか？"
1301008-5 = "まあ、良いですよ。私もちょうど退屈してましたし。"
1301008-6 = "ふふ……でも覚悟してくださいね。こう見えて私、ギャンブルには慣れてますので。"
1301008-7 = "ギャンブルというのは、自分に与えられた手札の確率と相手に与えられた手札の確率を比べて、期待値を算出するゲーム……。"
1301008-8 = "ですので、優れたギャンブラーはどんな瞬間でも感情に惑わされず冷静に確率を分析し、いつもダメージを最小限にできると言われています。"
1301008-9 = "つまり、数学が得意な人が、ギャンブルで負けるなんてことはありません。"
1301008-10 = "[s] \"やってみないと分からないかもよ？\""
1301008-11 = "ふふっ、いいでしょう。それではまず軽く一回、やってみましょうか？"
1301008-13 = "うーん……。"
1301008-15 = "（私の手札は同じ数字が3枚のスリーカード……これが揃う確率は3％にも満たない、珍しい役）"
1301008-16 = "（もちろんこれより珍しい役もたくさんあるけど、これなら勝負に出ても良さそう……）"
1301008-18 = "コール！私はスリーカードです。"
1301008-19 = "[s] \"フラッシュ。\""
1301008-20 = "はいっ？同じ柄のカードが5枚の、あのフラッシュですか！？そんな、それが揃う確率は0.2％しかないのに！"
1301008-21 = "[s] \"ギャンブルでは、こういうことも起こり得るんだよ。\""
1301008-22 = "それは、そうですけど……。"
1301008-23 = "……今回は運が良かったみたいですね。もう一回やりましょう！"
1301008-25 = "（よし、今度こそ私の勝利に違いないわ！）"
1301008-26 = "ストレート！"
1301008-27 = "[s] \"フォーカード。\""
1301008-28 = "えっ、エースのカードが全て先生の手に！？信じられません！"
1301008-29 = "ううっ……もう一回です！"
1301008-32 = "（これは、0.0015%の確率でしか出ない、限りなく最強に近い組み合わせ……これより強い形が先生の手から出るはずがない……！）"
1301008-33 = "（今回こそ私の勝ち！）"
1301008-35 = "ストレートフラッシュ！"
1301008-36 = "[s] \"ロイヤルストレートフラッシュ。\""
1301008-37 = "なっ、信じられませんっっ！！"
1301008-39 = "うう、まさか、3回連続で負けるなんて……私の手札も悪くなかったのに……やっぱり信じられないです！"
1301008-40 = "何か、計算に間違いが……？"
1301008-41 = "[s] \"ユウカは、計算に依存しすぎるから勝てなかったのかもね。\""
1301008-42 = "ですが、カードが出る確率はいつも一定なのに、計算に依存しないとなるといったいどうすれば……？"
1301008-43 = "計算より直感、本能に任せれば良い、ですって？"
1301008-44 = "くぅ……確率の戦いにおいて本能だなんて理解しがたいですが、3回も連続で勝った先生がそうおっしゃるなら、今回は認めざるを得ません……。"
1301008-45 = "[s] \"そもそも、ギャンブルはあんまり良くないよ。\""
1301008-46 = "はい。それは、私もそう思います。"
1301008-47 = "それでは、カードを片付けましょうか……。"
1301008-54 = "……先生。どうして机の上に、ハートのエースが2枚もあるんでしょうか？"
1301008-55 = "確かポーカーは一組のカードだけでプレイするゲームのはずですが……。"
1301008-56 = "もしかして……袖の中にもう一組のカードを隠して！？"
1301008-57 = "[s1] \"ギャンブルの世界は冷酷なものだよ。\"\n[s2] \"……引き分けにしない？\""
1301008-62 = "そんな言い分が、通じるわけないでしょうがぁっ！"
