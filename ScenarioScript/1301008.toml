[translation]
1301008-1 = "Poker Face"
1301008-2 = "Millennium - Sala do Conselho Estudantil \"Seminar\""
1301008-3 = "Como estava entediado esperando as outras alunas, decidi convidar a Yuuka para jogar pôquer."
1301008-4 = "Pôquer, você diz?"
1301008-5 = "Bem, tudo bem. Eu também estava ficando entediada mesmo."
1301008-6 = "Fufu... mas prepare-se. Pode não parecer, mas estou acostumada com jogos de azar."
1301008-7 = "Jogos de azar são, essencialmente, um jogo onde você compara a probabilidade da sua mão com a do seu oponente para calcular o valor esperado..."
1301008-8 = "Por isso, dizem que um bom jogador nunca se deixa levar pelas emoções, analisa as probabilidades friamente e sempre minimiza os danos."
1301008-9 = "Ou seja, alguém que é bom em matemática nunca perde em um jogo de azar."
1301008-10 = "[s] \"Talvez você só saiba se tentar, não é?\""
1301008-11 = "Fufu, tudo bem. Então, vamos começar com uma partida rápida?"
1301008-13 = "Hmm..."
1301008-15 = "(Minha mão é uma trinca... a probabilidade de conseguir isso é menor que 3%, uma mão rara.)"
1301008-16 = "(Claro, existem muitas mãos mais raras que esta, mas com isso, acho que posso arriscar...)"
1301008-18 = "Pago! Eu tenho uma trinca."
1301008-19 = "[s] \"Flush.\""
1301008-20 = "O quê? Aquele flush, com cinco cartas do mesmo naipe!? Não pode ser, a probabilidade disso acontecer é de apenas 0,2%!"
1301008-21 = "[s] \"Em jogos de azar, esse tipo de coisa pode acontecer, sabe?\""
1301008-22 = "Isso é verdade, mas..."
1301008-23 = "...Desta vez você teve sorte. Vamos jogar de novo!"
1301008-25 = "(Certo, desta vez com certeza será minha vitória!)"
1301008-26 = "Straight!"
1301008-27 = "[s] \"Four of a Kind.\""
1301008-28 = "O quê, todos os ases estão na mão do Sensei!? Não acredito!"
1301008-29 = "Grrr... mais uma vez!"
1301008-32 = "(Esta é uma combinação quase imbatível, com apenas 0,0015% de chance de ocorrer... não tem como o Sensei ter algo mais forte que isso...!)"
1301008-33 = "(Desta vez eu ganho!)"
1301008-35 = "Straight Flush!"
1301008-36 = "[s] \"Royal Straight Flush.\""
1301008-37 = "Não, não acredito nisso!!"
1301008-39 = "Ugh, não acredito que perdi três vezes seguidas... e minha mão nem estava ruim... ainda não consigo acreditar!"
1301008-40 = "Será que houve algum erro no cálculo...?"
1301008-41 = "[s] \"Talvez a Yuuka não tenha ganhado porque depende demais dos cálculos.\""
1301008-42 = "Mas as probabilidades das cartas são sempre constantes, se não depender dos cálculos, então o que eu deveria fazer...?"
1301008-43 = "Você está dizendo que devo confiar na intuição e no instinto em vez de cálculos?"
1301008-44 = "Grrr... é difícil entender como confiar no instinto em um jogo de probabilidades, mas se o Sensei, que venceu três vezes seguidas, diz isso, não tenho escolha a não ser aceitar..."
1301008-45 = "[s] \"No fim das contas, jogos de azar não são lá muito bons.\""
1301008-46 = "Sim. Eu concordo com isso."
1301008-47 = "Então, vamos guardar as cartas..."
1301008-54 = "...Sensei. Por que há dois ases de copas na mesa?"
1301008-55 = "Até onde eu sei, o pôquer é jogado com apenas um baralho..."
1301008-56 = "Será que... você escondeu outro baralho na manga!?"
1301008-57 = "[s1] \"O mundo dos jogos de azar é cruel.\"\n[s2] \"...Que tal um empate?\""
1301008-62 = "Não tem como esse tipo de desculpa colar, seu trapaceiro!"
