[translation]
10008115-7 = "（そうして、黒亀組との激闘の末……）"
10008115-8 = "くっ、まさか、こんなところで……っ！"
10008115-15 = "か、勝ったわ！！"
10008115-16 = "あ、アル様！さすがです！"
10008115-17 = "ふぅ……"
10008115-18 = "ようやく終わりか。"
10008115-25 = "あっ、賽銭箱発見～！"
10008115-26 = "[s] \"みんなお疲れ様。\""
10008115-27 = "うへ～、疲れたねぇ。先生もそうだし、便利屋も、ほかのみんなもお疲れ～。"
10008115-28 = "はい、みなさんお疲れ様でした！"
10008115-29 = "ようやく落ち着いたわね……。"
10008115-33 = "賽銭箱……。"
10008115-34 = "シロコちゃん、残念ですがダメですよ？それは返さなきゃいけないものですからね？"
10008115-35 = "……分かってる。"
10008115-36 = "……シロコ先輩、分かったなら視線を賽銭箱から外してください。"
10008115-38 = "じゃあ事件も終わったみたいだし、私たちは帰るとしよっか。"
10008115-39 = "あ、セリカちゃんはバイトもお疲れ様～。"
10008115-40 = "先生、ではまた後日！"
10008115-41 = "[s] \"うん、みんな気を付けてね。\""
10008115-47 = "じゃあ、賽銭箱を元の場所に戻そっか。"
10008115-48 = "そ、そうね！？それが目的だったわけだし！？それはもちろん……！"
10008115-49 = "アルちゃん、声が裏返ってるよ？もしかして、今更もったいなくなってきたとか？"
10008115-50 = "ふふっ、何を言ってるのかしら。"
10008115-51 = "私がそんなこと思うわけ――"
10008115-59 = "あ、さ、賽銭箱の鍵が……！？"
10008115-60 = "え、何で……？もしかして、騒動の間に蓄積したダメージで、とか……？"
10008115-64 = "あれ、賽銭箱の中身……"
10008115-65 = "[s] \"……空っぽ？\""
10008115-67 = "……え？"
10008115-68 = "あははっ！なになに、どういうこと？"
10008115-69 = "えええぇぇぇぇっ！？なっ、何でよ！？どうして中身が無いの！？"
10008115-73 = "[ns] \"この音、もしかして……！？\""
10008115-75 = "とうっ！！"
10008115-81 = "正義のヒーロー「カイテンジャー」……ここに参上！！"
10008115-86 = "……は？"
