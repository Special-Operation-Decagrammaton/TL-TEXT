[translation]
10008115-7 = "(E assim, após a batalha feroz contra o Grupo Kurokame...)"
10008115-8 = "Droga, pensar que seria aqui..."
10008115-15 = "N-nós vencemos!!"
10008115-16 = "A-Aru-sama! Como esperado de você!"
10008115-17 = "Ufa..."
10008115-18 = "Finalmente acabou."
10008115-25 = "Ah, achei a caixa de ofertas!"
10008115-26 = "[s] \"Bom trabalho a todos.\""
10008115-27 = "Uhe~, que cansaço. Bom trabalho para o Sensei, para a Problem Solver e para todos os outros."
10008115-28 = "Sim, bom trabalho a todos!"
10008115-29 = "Finalmente as coisas se acalmaram..."
10008115-33 = "Caixa de ofertas..."
10008115-34 = "Shiroko-chan, sinto muito, mas não pode. Temos que devolver isso, lembra?"
10008115-35 = "...Eu sei."
10008115-36 = "...Shiroko-senpai, se você sabe, por favor, tire os olhos da caixa de ofertas."
10008115-38 = "Bem, parece que o incidente acabou, então vamos voltar para casa."
10008115-39 = "Ah, e bom trabalho no seu emprego de meio período, Serika-chan."
10008115-40 = "Sensei, nos vemos outro dia!"
10008115-41 = "[s] \"Certo, tomem cuidado no caminho.\""
10008115-47 = "Então, vamos devolver a caixa de ofertas para o lugar original."
10008115-48 = "C-claro, né!? Esse era o objetivo, afinal!? É claro que..."
10008115-49 = "Aru-chan, sua voz falhou? Por acaso, você está com pena de devolver agora?"
10008115-50 = "Fufu, do que você está falando?"
10008115-51 = "Eu jamais pensaria em algo assim—"
10008115-59 = "A-a chave da caixa de ofertas está...!?"
10008115-60 = "Hã, por quê...? Será que foi o dano acumulado durante a confusão...?"
10008115-64 = "Ué, o conteúdo da caixa de ofertas..."
10008115-65 = "[s] \"...Está vazio?\""
10008115-67 = "...Hã?"
10008115-68 = "Ahaha! O que é isso, o que está acontecendo?"
10008115-69 = "Eeeeeehhh!? O-o que foi isso!? Por que não tem nada dentro!?"
10008115-73 = "[ns] \"Esse som, será que...!?\""
10008115-75 = "Hyaaa!!"
10008115-81 = "Os heróis da justiça, 'Kaitenger'... chegaram!!"
10008115-86 = "...Hã?"
