[translation]
10010145-1 = "Episódio 14; It Serves You Right (4)"
10010145-7 = "（……）"
10010145-11 = "O-oh, bem-vindo de volta, Sensei... Eu estava achando que você chegaria logo..."
10010145-16 = "Essa expressão... p-parece que tudo deu certo, não é?"
10010145-17 = "U-um peso saiu dos meus ombros."
10010145-18 = "……? Ah, bem, eu não vejo muito as redes sociais... e as notícias, eu ainda vejo de vez em quando pelos jornais..."
10010145-19 = "B-bem, no jornal nem sequer saiu nada desde o início... mas, pelo conteúdo, acho que era o que queriam."
10010145-20 = "De qualquer forma, bem, bom trabalho... Eu também estou exausta."
10010145-21 = "……Estou realmente exausta, sim."
10010145-22 = "T-tive que gastar muito tempo e concentração... e no final..."
10010145-23 = "Não conseguir resolver com minhas próprias forças e ficar apenas preocupada enquanto o tempo passava, é algo que eu simplesmente..."
10010145-24 = "D-desta vez deu tudo certo por acaso, mas se eu começar a pensar no \"e se\", não tem fim..."
10010145-25 = "A possibilidade de a Hinata cometer outro descuido também era algo bem provável..."
10010145-26 = "É-é por isso que as pessoas de fora... se não ficarmos vigiando de perto, não dá certo, elas fazem coisas estranhas logo de cara... e me deixam preocupada..."
10010145-27 = "Como se não se importassem com o que eu penso ou sinto... sabe, eu acabo perdendo o sono..."
10010145-28 = "Haa... desculpe, estou falando coisas estranhas de novo..."
10010145-29 = "N-não, não se preocupe com isso..."
10010145-30 = "Como posso dizer, bem..."
10010145-31 = "……Eu realmente não gosto de pessoas de fora."
10010145-32 = "[s1] \"Ui, você é gentil.\"\n[s2] \"Ui, você tem um forte senso de responsabilidade.\""
10010145-33 = "N-não diga coisas estranhas... Ah, meu Deus..."
10010145-34 = "N-não diga coisas estranhas... Ah, meu Deus..."
10010145-35 = "De qualquer forma, vamos encerrar esse assunto por aqui..."
10010145-39 = "A-a propósito, você trouxe o que eu pedi...?"
10010145-40 = "[s3] \"Sim, aqui está.\"\n[s4] Entregar o que trouxe."
10010145-41 = "Fu, fufu..."
10010145-42 = "Fu, fufu..."
10010145-43 = "O-obrigada... vou aceitar..."
10010145-44 = "……Este smoothie de limão, é?"
10010145-45 = "É, isso mesmo..."
10010145-46 = "É-é um pouco tarde para dizer isso, mas..."
10010145-47 = "Eu não gosto muito de doces... como bolos..."
10010145-48 = "S-suja meus livros e a mesa... e quando estou lendo algo, bebidas assim combinam mais..."
10010145-49 = "Não importa o quanto esteja frio, bebidas assim são..."
10010145-53 = "……"
10010145-54 = "Então, me desculpe... como eu disse naquela hora, o caso do bolo foi apenas uma implicância da minha parte..."
10010145-55 = "……?"
10010145-56 = "Da próxima vez, vai trazer um smoothie de limão...?"
10010145-57 = "……Então você pretende voltar de novo."
10010145-58 = "Fuu..."
10010145-59 = "Entendo, afinal você é o \"Sensei\"..."
10010145-60 = "Sendo assim... acho que vou parar com as defesas."
10010145-61 = "Não acho que esse tipo de coisa seja muito bom, mas..."
10010145-63 = "Então, da próxima vez, por favor, traga um café americano gelado..."
10010145-64 = "……É o que eu realmente gosto."
10010145-72 = "Ugh... e-está azedo..."
10010145-73 = "D-deveria ter pedido o café americano gelado desde o início, não é..."
10010145-77 = "……Fuu."
10010145-78 = "O Sensei... será que já chegou no Schale...?"
10010145-79 = "Então..."
10010145-80 = "B-bem, finalmente as coisas se acalmaram..."
10010145-85 = "Fazer uma cópia perfeita das escrituras... foi um trabalho exaustivo para fazer em segredo..."
10010145-90 = "..."
10010145-91 = "A Irmandade, que até hoje ainda está envolta em segredos..."
10010145-93 = "Bem, vamos ver esses segredos... vamos dar uma olhada, não é?"
10010145-94 = "A Irmã atrapalhada e o Mago da Biblioteca Antiga"
