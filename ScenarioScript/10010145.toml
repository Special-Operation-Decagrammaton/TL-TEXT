[translation]
10010145-1 = "第14話;イット・サーヴズ・ユー・ライト（４）"
10010145-7 = "（……）"
10010145-11 = "お、おかえりなさい、先生……そろそろかと思っていましたが……。"
10010145-16 = "その表情……ど、どうやら、上手く行ったようですね。"
10010145-17 = "す、少し、肩の荷が下りました。"
10010145-18 = "……？あ、その、私はSNSとかあまり見ないので……ニュースとかは、今でも新聞とかから時々……。"
10010145-19 = "ま、まあ新聞の方には、そもそも最初から載っていませんでしたが……内容的に、そうしたかったんですかね。"
10010145-20 = "とにかく、まあ、お疲れ様でした……私も、疲れましたし。"
10010145-21 = "……本当に疲れましたよ、はい。"
10010145-22 = "け、結構な時間と集中力を……それに最後は……。"
10010145-23 = "自分の力で解決もできず、心配しかできずに時間ばかりが過ぎていくのは、どうしても……。"
10010145-24 = "こ、今回は偶然上手く行きましたが、「万が一」と考え始めると、きりが無いですし……。"
10010145-25 = "ヒナタさんがまたうっかりをやらかす可能性も、十分に考えられましたし……。"
10010145-26 = "こ、これだから外の方は……細かく見てあげないとダメですし、すぐ変なことしますし……心配、させますし……。"
10010145-27 = "私の考えや気分なんて知ったことない、って感じで……ね、眠れなく、なりますし……。"
10010145-28 = "はぁ……すみません、また変なことを……。"
10010145-29 = "そ、その、お気になさらず……。"
10010145-30 = "何と言いますか、えっと……。"
10010145-31 = "……やっぱり外の方は嫌いです。"
10010145-32 = "[s1] \"ウイは優しいね。\"\n[s2] \"ウイは責任感が強いね。\""
10010145-33 = "へ、変なことを言わないでください……ああ、もう……。"
10010145-34 = "へ、変なことを言わないでください……ああ、もう……。"
10010145-35 = "とにかく、その話はここまでで……。"
10010145-39 = "と、ところで、持ってきてくれましたか……？"
10010145-40 = "[s3] \"はい、これ。\"\n[s4] 持ってきたものを渡す。"
10010145-41 = "ふ、ふふ……。"
10010145-42 = "ふ、ふふ……。"
10010145-43 = "あ、ありがとうございます……いただきます……。"
10010145-44 = "……このレモンスムージー、ですか？"
10010145-45 = "そう、ですね……。"
10010145-46 = "い、今さら、ですが……。"
10010145-47 = "私、甘いもの……ケーキとか、あんまり好きではなくって……。"
10010145-48 = "ほ、本も机も、汚れますし……何かを読む時は、こういう飲み物の方が合ってますし……。"
10010145-49 = "どれだけ寒くても、こういう飲み物が……。"
10010145-53 = "……。"
10010145-54 = "なので、すみません……あ、あの時も言いましたがケーキの件は、私のただの意地悪、みたいなもので……。"
10010145-55 = "……？"
10010145-56 = "次からは、レモンスムージーを持ってくる……？"
10010145-57 = "……次も来るつもり、ということですか。"
10010145-58 = "ふぅ……。"
10010145-59 = "なるほど、「先生」ですもんね……。"
10010145-60 = "であれば……予防線は、やめるとしましょうか。"
10010145-61 = "あんまり、こういうのはどうかと思うのですが……。"
10010145-63 = "では次は、アイスアメリカーノでお願いします……。"
10010145-64 = "……それが本当に、私の好きなものなので。"
10010145-72 = "うっ……す、酸っぱい……。"
10010145-73 = "さ、最初から、アイスアメリカーノでお願いしておくべき、でしたかね……。"
10010145-77 = "……ふぅ。"
10010145-78 = "先生は……そろそろ、シャーレに着いた頃でしょうか……。"
10010145-79 = "では……。"
10010145-80 = "よ、ようやく、落ち着いたことですし……。"
10010145-85 = "経典の完璧なコピー……こっそり作るには、しんどい作業でしたね……。"
10010145-90 = "……。"
10010145-91 = "今でもまだ、秘密にまみれたシスターフッド……。"
10010145-93 = "さて、その秘密……見せてもらうとしましょうか……。"
10010145-94 = "どたばたシスターと古書館の魔術師"
