[translation]
1002405-1 = "Onde quer que esteja"
1002405-2 = "（Shiroko chegou exatamente no horário e no local que ela enviou com antecedência, sem errar um segundo sequer）"
1002405-3 = "（Ela deve ter corrido por um longo caminho até aqui, mas sua expressão estava radiante）"
1002405-5 = "（Mesmo na praia...）"
1002405-8 = "Ah, Sensei. Por aqui."
1002405-9 = "Obrigada, eu também acabei de chegar."
1002405-10 = "[s] \"Desculpe pela espera, bom trabalho.\""
1002405-11 = "De alguma forma, está sendo mais divertido do que eu imaginava."
1002405-12 = "……Fufu."
1002405-13 = "Bem, então, vou partir. Nos vemos no próximo ponto."
1002405-18 = "（Mesmo nas profundezas das montanhas...）"
1002405-19 = "Hum, está ótimo."
1002405-20 = "Obrigada por chegar exatamente no horário, Sensei. A toalha e as outras coisas ajudam muito."
1002405-21 = "[s] \"Não está cansada? Está tudo bem?\""
1002405-22 = "Hum, estou bem... eu acho. Eu treino sempre, afinal."
1002405-23 = "É verdade que estou correndo mais do que o habitual, mas, ainda assim..."
1002405-24 = "Desta vez, é que..."
1002405-25 = "……Hum."
1002405-26 = "Não é nada, esquece."
1002405-27 = "Até mais, Sensei."
1002405-32 = "（Além disso, em qualquer outro lugar）"
1002405-36 = "Desculpe pela espera, Sensei."
1002405-37 = "Ah, obrigada pela bebida. Vou aceitar."
1002405-38 = "……Hum? Parece que estou me divertindo...?"
1002405-39 = "Bem... isso é, provavelmente..."
1002405-40 = "……Hum."
1002405-41 = "Ah, bem, já vou indo."
1002405-42 = "Estou ansiosa para te encontrar no próximo local."
1002405-47 = "Desculpe pela espera, Sensei."
1002405-48 = "Hum, está indo bem. Tudo está correndo conforme o planejado."
1002405-49 = "Se continuarmos assim, acho que conseguiremos terminar sem grandes problemas."
1002405-50 = "……Obrigada, é graças a você, Sensei."
1002405-51 = "[s] \"Acho que é mérito do seu esforço, Shiroko, mas fico feliz em ter ajudado nem que seja um pouco.\""
1002405-52 = "Hum."
1002405-53 = "Não foi só um pouco, você ajudou muito."
1002405-54 = "[s] \"Bem, se este é o último ponto de descanso, isso significa que...\""
1002405-55 = "……Hum, é isso mesmo."
1002405-56 = "Daqui em diante, pretendo correr direto até o final."
1002405-57 = "Enviarei o local final mais tarde."
1002405-61 = "（Shiroko parecia revigorada e com uma expressão de quem ainda tinha muita energia）"
1002405-63 = "（Depois de ver Shiroko partir com aquele semblante radiante, voltei para o Schale）"
