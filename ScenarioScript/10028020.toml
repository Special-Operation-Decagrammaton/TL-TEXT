[translation]
10028020-1 = "第2話;日常茶飯事"
10028020-7 = "はぁ……はぁ、はぁ……"
10028020-8 = "ちょっと……息が……ふぅ……"
10028020-13 = "でも……なんとか、乗れたっすね……はは……"
10028020-20 = "……先生？だ、大丈夫っすか？#nもしかして具合が悪くなったとか……！"
10028020-21 = "[s1] \"き、気にしないで、大丈夫……\"\n[s2] \"もう、ちょっと、体力を……つけないと、かな……\""
10028020-24 = "よ、良かったっす……"
10028020-25 = "はぁ……先生には帰りの列車で休んでもらいたかったんすけど……"
10028020-29 = "申し訳ないっす……こんな事になってしまって……"
10028020-30 = "大丈夫、って……？#nそう言ってもらえると、私はありがたいっすけど……"
10028020-31 = "でもやっぱり、幸先は悪いっす……"
10028020-32 = "ううっ……どこで間違えたんすかね……"
10028020-36 = "で、でも……！カバンはこの列車にあるはずっすから！"
10028020-37 = "最悪の事態は免れたっす！"
10028020-38 = "[s3] \"大丈夫、気にしないで。\"\n[s4] \"これくらい日常茶飯事だからね。\""
10028020-41 = "そ、そうっすよね！！これくらい、日常茶飯事っすよ！ははっ！"
10028020-42 = "カバンが見つかったら途中下車してトリニティ行きに乗り換えればいいわけだし……"
10028020-43 = "時間はたーっぷりあるっすから！今日中にさえ帰れれば問題ないっす！"
10028020-47 = "まぁ「ゲヘナ行き」ってのがちょっと引っかかるっすけど――"
10028020-52 = "…………？"
10028020-53 = "何だ？あいつ、トリニティじゃないか？#nどうしてここにトリニティが……？"
10028020-54 = "しかもあの腕章……アレ、正義実現委員会だよな？"
10028020-55 = "何でトリニティの奴が、ゲヘナ行きの列車にいるんだよ？"
10028020-70 = "……えーと。"
10028020-71 = "ちょっと、この雰囲気は……"
10028020-72 = "歓迎されてないっす、よね……"
10028020-73 = "[s5] \"どうしても学園間の相性が……\"\n[s6] \"仕方ないとはいえ……\""
10028020-76 = "おい、そこ！何の騒ぎだ！！"
10028020-80 = "ったく、ゲヘナの連中はいつも問題を起こすよな！？"
10028020-84 = "……ん？何だ？ "
10028020-85 = "トリニティの生徒じゃないか！？#n何でこの列車にいるんだ？これはゲヘナ行きだぞ？"
10028020-89 = "……いや、まあ知ったことか。乗車券を見せろ。"
10028020-90 = "え、えーっと……乗車券っすか……？#nそれが……"
10028020-91 = "……ん？乗車券がないのか？"
10028020-92 = "じゃあ、こっちの大人は？"
10028020-93 = "……2人とも持ってないって……ふざけてるのか？"
10028020-94 = "あっ……いや、ちょっと待ってほしいっす。これにはワケが――"
10028020-95 = "ワケって何だ、もしかしてアレか？"
10028020-96 = "どうせゲヘナ行きの列車なんだから、まともなものじゃないだろうって？"
10028020-97 = "……えっ。"
10028020-98 = "いや――"
10028020-99 = "うるさい乗客ばかりだから、乗務員の目を誤魔化せるとか……！"
10028020-100 = "その、待っ――"
10028020-101 = "無賃乗車くらい許されるとか思ったんだろ……？"
10028020-102 = "そうじゃなくて、一旦こっちの話を――"
10028020-103 = "言い訳なんて、もう分かってんだよ！"
10028020-104 = "いや、私たちは――"
10028020-105 = "どうせ無法地帯だろうなんて考えで……"
10028020-106 = "白昼堂々、無賃乗車をしようってんだろ！！"
10028020-107 = "だから私たちは、乗車券を買わせてほ……"
10028020-108 = "もう限界だ！！トリニティまで馬鹿にしてくるなんて！！！"
10028020-109 = "ピーッ！ピィイイイイイッ――！！全員集合！！！！！"
10028020-110 = "無賃乗車の二人組を発見！マニュアルCで対応しろ！！"
10028020-113 = "なっ、無賃乗車！？コイツらが……！！"
10028020-114 = "もう我慢ならない……問答無用だ、捕らえてやる！！"
10028020-115 = "全員、早く集合しろ！！！！"
10028020-120 = "……えーと。"
10028020-121 = "うーーん。"
10028020-122 = "おかしいな……"
10028020-123 = "……。"
10028020-128 = "こんなはずじゃ、なかったんすけどね……"
