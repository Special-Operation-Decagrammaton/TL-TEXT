[translation]
2001-1 = "女子高校生の日常"
2001-2 = "……。"
2001-3 = "……はぁ……。"
2001-4 = "……。"
2001-5 = "……。"
2001-6 = "うぅ……。"
2001-7 = "うぅぅうぅ……！"
2001-8 = "あの、ヨシミちゃん。そんなに唸らなくても……ナツちゃん、きっと時間になったら来るんじゃないかな……？"
2001-9 = "まだ約束の時間まで30分もあるし……。"
2001-10 = "あと貧乏ゆすりもやめて。てっきり地震かと思った。"
2001-11 = "……ああぁぁっ！！"
2001-12 = "もおぉぉぉぉぉぉぉおおおぉぉぉっ！！！！"
2001-13 = "ヨシミちゃん！？お、落ち着いて……！"
2001-14 = "びっくりした。"
2001-15 = "台詞と表情が合ってない！そう言うならせめてもうちょっと顔に出して！"
2001-16 = "っていうか、この状況で落ち着いてられるか！"
2001-17 = "この列を見てよ、もう数十メートル近い行列になってるじゃん！"
2001-18 = "ここのダックワーズ、一日に200個限定なんだよ！？"
2001-19 = "このままだと食べられないじゃん！っていうかもしかして、今並んでる人たちだけでもう200人いってない！？"
2001-20 = "だからといって私たちだけで行くのも違うでしょ、一人一個しか買えないんだから。"
2001-21 = "仕方ないものは仕方ない。"
2001-22 = "だ・か・ら！もうちょっと早い時間にすれば良かったって話！"
2001-23 = "私、午後2時にオープンって何回も言ったのに！"
2001-24 = "それを踏まえて約束した通りの1時半でしょ、まだ30分前。っていうかこの会話もう二回目。"
2001-25 = "だから30分前だけどもう列がさあっ！！"
2001-26 = "んむっ……！"
2001-27 = "……？"
2001-28 = "……。"
2001-29 = "……もぐもぐ……。"
2001-30 = "まあまあ、甘い物でも食べてちょっと落ち着こう？"
2001-31 = "ナツちゃんにも何か事情があるんだよ～。私たちも、こんなに人が多いとは予想してなかったんだし……。"
2001-32 = "それに……確かに食べたかったけど、たまには上手くいかないこともあるよ。"
2001-33 = "こうやってみんなで集まってお話するだけでも、私はすごく楽しいよ？"
2001-34 = "……もぐ……美味しいね、これ。"
2001-35 = "あ、あはは……気に入ってくれたのなら良かった。"
2001-36 = "ま、確かに、こんな日もあるわね！それはそれとしてこれほんと美味しい、口の中でとろける。"
2001-37 = "……ふぅ。"
2001-38 = "……ほんと単純。"
2001-39 = "何、あんたも食べたいの？素直にそう言えば良いのに、なんだかんだでカズサちゃんも構ってほしがりでちゅね～？"
2001-40 = "……（ピキッ）"
2001-41 = "そういうのやめてくれる？"
2001-42 = "そういうのやめてくれる～？"
2001-43 = "真似しないでほしいんだけど。"
2001-44 = "真似しないでほしいんだけど～。"
2001-46 = "も、もう、ほら喧嘩しないの。"
2001-47 = "か、カズサちゃんにもあげるから……ほらっ、あ～ん……。"
2001-48 = "……。"
2001-49 = "……あ……あー……"
2001-51 = "……ッターン！！ダダダダダダッ！！"
2001-52 = "……？"
2001-53 = "……？"
2001-54 = "……？"
2001-55 = "……銃弾が……綺麗にシュークリームに……。"
2001-56 = "ダダダダダダッ！ダダダダダダッ！！"
2001-57 = "ねえちょっと！並んでるのが見えないの！？今横入りしたでしょ！？"
2001-58 = "はぁ？逆ギレ！？割り込んできたのはそっちでしょう！？"
2001-59 = "……なんだ、よくある喧嘩か。"
2001-60 = "あ～あ、シュークリームもったいな。こういう場所ってよく銃弾が飛び交うわね。"
2001-61 = "ま、気にしない気にしない！"
2001-62 = "どうせもう行列は無理そうだし、アイリのこれでも食べながら……"
2001-63 = "……？"
2001-64 = "……？"
2001-65 = "……なに？"
2001-66 = "……ぷっ。"
2001-67 = "……ぶふっ！"
2001-68 = "あはっ、あははははははっ！！あんた、顔にクリームが！！あはっ、ひーーっ！！！"
2001-69 = "何それっ！変装かなにか？すごっ、芸術じゃん！"
2001-70 = "くっ、ひひひひっ……！あー、あっははははっ！！"
2001-71 = "……？ちょっと、鏡貸して……。"
2001-72 = "……！"
2001-73 = "か、カズサちゃん大丈夫だから！全然おかしくないから……！"
2001-74 = "ぜ、全然……おかしく……っ、くっ、あはっ、ごめ、カズサちゃん……ぷふっ！"
2001-75 = "い、いや、これはその……ただちょっと喉が、んんっ、んふっ、くふっ……！"
2001-76 = "素直に言ってあげなさいよ、すっごい顔してるって！"
2001-77 = "こんなの狙っても中々できないわよ、芸術点あげたいくらい！！あはははっ！！！"
2001-80 = "……。"
2001-81 = "…………こっ"
2001-82 = "こんのぉぉぉぉっ！！！"
2001-85 = "あっ、銃持ったまま列に突っ込んでった。"
2001-86 = "完全に変装して突撃する特殊部隊じゃん！？ぷはははははは！！"
2001-87 = "よ、ヨシミちゃん……変なこと言わないで、そう言われるともう……ぶふっ！"
2001-88 = "ふっ、あはっ……！"
2001-93 = "ダラララララララララッ！！ガンッ！バリーン！ダダダダダダッ！！！"
2001-95 = "（そんなよくある光景が落ち着いた後、まるで何も無かったかのようにそれぞれみんな自分の家に帰っていった）"
2001-96 = "（ナツはいつもの寝坊だったらしい）"
2001-97 = "女子高校生の日常"
