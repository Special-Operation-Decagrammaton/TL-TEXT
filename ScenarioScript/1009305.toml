[translation]
1009305-1 = "2人だけの個人授業"
1009305-2 = " （ゲヘナ学園の教室に向かった）"
1009305-9 = "あっ、先生！はろはろ～。"
1009305-10 = "ここがあたし達の教室だよ♪"
1009305-11 = "[s] \"あれ、他の生徒たちは……？\""
1009305-12 = "みんな部活とかで、どっか行っちゃった。"
1009305-13 = "ま、ゲヘナではいつものことだよ。気にしない気にしなーい。"
1009305-14 = "んじゃ、さくさく勉強しよっか♪"
1009305-18 = "はいここ！あたしの隣に座って！"
1009305-19 = "テスト範囲広いから、スピードあげてくよー！"
1009305-21 = " （キララとしばらく勉強に集中した……）"
1009305-31 = "あれ、もうこんな時間？はやっ！"
1009305-32 = "時間を忘れて勉強だなんて……あたし、覚醒しちゃったかも！？"
1009305-33 = "[s] \"お疲れ様、ちょっと休憩しよっか。\""
1009305-34 = "んー……まだ大丈夫！"
1009305-35 = "休むのも勉強の一環……？"
1009305-36 = "まあ、それもそうだけど……。"
1009305-40 = "実は今日、これが終わったらお友達と遊び行く約束しててさー？"
1009305-41 = "だから早めに終わらせたいんだよね♪"
1009305-45 = "[ns] \"なるほど。\""
1009305-47 = "[ns1] \"どっちでも大丈夫だけど……。\"\n[ns2] \"少し休んだら、その後ギアを上げるっていうのはどう？\""
1009305-50 = "ん－、それもアリだね。"
1009305-51 = "じゃあ、ちょっとだけ休憩しよっか。"
1009305-52 = "あっ、どうせなら休憩ついでに……。"
1009305-56 = "先生、ちょっとだけ手伝ってもらえる？"
1009305-57 = "勉強に集中するためにも！"
1009305-58 = "[s] \"それは良いけど、一体何を……？\""
1009305-59 = "ふふーん♪"
1009305-63 = "ベースは塗ったんだけど、まだポリッシュ塗ってなくてさー。"
1009305-64 = "一人でやると時間かかっちゃうし、#n先生に手伝ってもらったら早く終わるんじゃないかなーって！"
1009305-65 = "もう休み時間なわけだし、どう？"
1009305-66 = "[s] \"良いけど、これってつまり……？\""
1009305-67 = "えっとー……。"
1009305-68 = "ちょっと先生の机、借りるね！"
1009305-80 = "[wa:560]― [log=키라라 반짝부]どうしたの？先生。[wa:1460]もじもじして。[/log]"
1009305-81 = "[wa:2420]― [log=키라라 반짝부]そんなんじゃ、[wa:1100]休み時間終わっちゃうよ？[/log]"
1009305-84 = "[wa:360]― [log=키라라 반짝부]あ～[wa:1480]もしかして、[wa:1040]ペディキュアの塗り方わからないとか？[/log]"
1009305-85 = "[wa:3240]― [log=키라라 반짝부]やり方は簡単だよ！[wa:1760]まず[wa:520]塗るところをよ～[wa:1280]く見て……[/log]"
1009305-88 = "[ns5] \"えっと……。\"\n[ns6] \"こう、すれば……。\""
1009305-89 = "[wa:450]― [log=키라라 반짝부]ひゃっ……[wa:850]う、[wa:650]うん！[wa:700]そうやって！[/log]"
1009305-90 = "[wa:450]― [log=키라라 반짝부]ひゃっ……[wa:850]う、[wa:650]うん！[wa:700]そうやって！[/log]"
1009305-93 = "― [log=키라라 반짝부]そ、その……[wa:2300]顔、[wa:520]近すぎじゃないかなあ……[wa:1580]あははっ！[/log]"
1009305-96 = "[wa:1150]― [log=키라라 반짝부]先生、[wa:1460]鼻息めっちゃ当たるんだけど……？[/log]"
1009305-99 = "― [log=키라라 반짝부]せ、[wa:440]先生に任せるのは、[wa:1440]やっぱちょっと恥ずかしいかも……。[/log]"
1009305-102 = "[ns] \"ん……どうかした？\""
1009305-103 = "[wa:900]― [log=키라라 반짝부]あははっ！[wa:620]ううん！[wa:750]な、[wa:160]なんでもないよ！[/log]"
1009305-104 = "[wa:1730]― [log=키라라 반짝부]早く塗って、[wa:1560]勉強に戻ろ！[/log]"
1009305-108 = "……はい！これで終わり！"
1009305-112 = "んじゃ、勉強戻ろ！ね！"
1009305-113 = "……へ？顔が赤い？#nき、気のせいじゃない！？"
1009305-117 = "そうそう！ちょっと今日チーク濃かったかも！あはは！"
1009305-118 = "ほらほら、勉強戻るよ！休憩時間おわり！"
1009305-121 = " （その後、キララは顔を赤くしながら勉強を続けた……）"
