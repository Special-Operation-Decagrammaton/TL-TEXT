[translation]
10035090-1 = "Episódio 9; Jacaré, início da supressão!"
10035090-7 = "Uau!"
10035090-8 = "Como eu pensei, a carapaça é dura demais!"
10035090-9 = "Ei! Você não está errando o alvo desde agora?!"
10035090-10 = "Atira direito!"
10035090-12 = "Não fala assim. Aquilo já é quase uma lei da natureza."
10035090-13 = "Bem, eu admito que a defesa do jacaré é alta, mas..."
10035090-14 = "Atiramos tanto e ele quase não tem um arranhão."
10035090-15 = "Quem será que construiu esse troço, hein?"
10035090-16 = "Seus movimentos são ágeis e a variedade de ataques é vasta."
10035090-17 = "Pelo que parece, o alvo não são os clientes, mas sim as instalações, o que é um alívio, mas..."
10035090-18 = "Qual é a lógica de comportamento dele, afinal?"
10035090-19 = "E, para começo de conversa, qual o propósito da criação dele..."
10035090-29 = "O meca-jacaré mudou de direção!"
10035090-30 = "Tsc! Ele não vai fugir!"
10035090-39 = "[ns1] \"Aquilo ali é...!\"\n[ns2] \"A piscina infantil...!\""
10035090-44 = "Haha! Aquele bicho fugiu com o rabo entre as pernas!"
10035090-45 = "Não apareça nunca mais!"
10035090-50 = "Droga! Aquilo ali na frente é...!"
10035090-54 = "Aaaaaah!"
10035090-55 = "[ns] \"As crianças...!\""
10035090-60 = "Droga!"
10035090-70 = "Diretora Kanna!?"
10035090-72 = "Ei!"
10035090-73 = "Cão raivoso!?"
10035090-74 = "[s] \"Kanna!\""
10035090-83 = "A-as crianças estão a salvo, né!"
10035090-84 = "M-mas o jacaré ainda está...!"
10035090-85 = "Do jeito que está, ele vai colidir com o jacaré!"
10035090-91 = "……."
10035090-92 = "Afastem-se."
10035090-101 = "[ns3] \"H-hein!?\"\n[ns4] \"O jacaré... parou!?\""
10035090-104 = "O-o que foi...?"
10035090-105 = "Os movimentos do meca-jacaré... pararam. O-o que aconteceu!?"
10035090-107 = "Mais importante, vamos acabar com ele logo!"
10035090-108 = "Granada! Joguem logo!"
10035090-110 = "Seu jacaré maldito! É tudo culpa sua!"
10035090-111 = "Pague com a sua vida!"
