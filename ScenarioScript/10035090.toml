[translation]
10035090-1 = "第9話;ワニ、制圧開始！"
10035090-7 = "うわっ！"
10035090-8 = "やっぱり、外殻が硬すぎますね！"
10035090-9 = "ねえ！さっきから外れっぱなしじゃないの！"
10035090-10 = "ちゃんと撃ってよ！"
10035090-12 = "言うなって。あれはもう自然の摂理みたいなもんだから。"
10035090-13 = "ま、ワニの防御力が高いのは認めるけどさー。"
10035090-14 = "これだけ撃ったのに、ほとんど傷もついてないしね。"
10035090-15 = "これさ、ほんとに誰が作ったんだろうね？"
10035090-16 = "動作は俊敏で、攻撃のバリエーションも多彩だ。"
10035090-17 = "見たところ、攻撃対象が利用客ではなく、施設なのは救いだが……。"
10035090-18 = "やつの行動ロジックは、一体どうなっているんだ。"
10035090-19 = "そもそも、やつが作られた目的は……。"
10035090-29 = "メカワニ、方向を変えました！"
10035090-30 = "ちっ！逃げるんじゃないの！"
10035090-39 = "[ns1] \"あっちにあるのは……！\"\n[ns2] \"子供用プールが……！\""
10035090-44 = "ははっ！あいつ尻尾を巻いて逃げやがった！"
10035090-45 = "もう二度と現れるなよ！"
10035090-50 = "まずい！あの先は……！"
10035090-54 = "きゃぁぁぁ！"
10035090-55 = "[ns] \"子供たちが……！\""
10035090-60 = "くっ！"
10035090-70 = "カンナ局長！？"
10035090-72 = "ちょっとっ！"
10035090-73 = "狂犬！？"
10035090-74 = "[s] \"カンナ！\""
10035090-83 = "こ、子どもは無事だね！"
10035090-84 = "し、しかし、まだワニが……！"
10035090-85 = "あのままじゃ、ワニとぶつかる！"
10035090-91 = "……。"
10035090-92 = "下がれ。"
10035090-101 = "[ns3] \"あ、あれ！？\"\n[ns4] \"ワニが……止まった！？\""
10035090-104 = "な、なんだ……？"
10035090-105 = "メカワニの動きが……止まりました。な、何があったんでしょうか！？"
10035090-107 = "それより、はやく仕留めよう！"
10035090-108 = "手榴弾だ！はやく投げて！"
10035090-110 = "ワニめ！全部お前のせいだ！"
10035090-111 = "命で償えっ！"
