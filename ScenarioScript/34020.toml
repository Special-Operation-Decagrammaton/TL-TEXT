[translation]
34020-1 = "Episódio 2;Um Tea Party Desalinhado"
34020-3 = "Obrigada por vir, Sensei. Faz um tempo desde a sua última visita a Trinity, né."
34020-4 = "[s] \"Olá, Nagisa, e a todas.\""
34020-5 = "Nos vemos de novo, Sensei [USERNAME]. Obrigada por tudo naquele dia."
34020-6 = "……Muito prazer. Sou a Mine, comandante da Ordem dos Cavaleiros de Socorro."
34020-7 = "[s1] \"Sim, muito prazer.\"\n[s2] \"Que combinação curiosa, sei lá.\""
34020-8 = "Ufu…… mais que curiosa, digamos que é uma combinação que aflige a Nagisa."
34020-9 = "Ufu…… mais que curiosa, digamos que é uma combinação que aflige a Nagisa."
34020-10 = "Eu não tenho a intenção de afligir a host."
34020-11 = "Como membro da nobre Ordem, que ergue convicção e orgulho, apenas corrijo os que erraram o caminho."
34020-13 = "Ainda que sejam alunas do Comitê de Realização da Justiça ou do Tea Party."
34020-14 = "……."
34020-15 = "……Essas palavras, por si só, já parecem afligir a Nagisa."
34020-16 = "Bom, chega de conversa fiada."
34020-17 = "O motivo de termos chamado o Sensei era discutir o desenrolar pós-Tratado do Éden e a limpeza do incidente…… era."
34020-18 = "……."
34020-19 = "……."
34020-20 = "As líderes da Sisterhood e da Ordem dos Cavaleiros de Socorro insistiram em comparecer…… e acabou virando este formato."
34020-21 = "……A Sisterhood também mudou. Daqui pra frente, pretendemos participar ativamente de assentos como este."
34020-22 = "Eu também só estou aqui pra cumprir o meu dever como comandante da \"Ordem\"."
34020-23 = "……."
34020-24 = "[s] \"É que…… ou seja, vocês duas vieram pra conter o Tea Party……?\""
34020-25 = "Não; é puro interesse."
34020-26 = "Eu não entendo muito dessas coisas políticas."
34020-27 = "O tumulto do Tratado do Éden, com esforço, se acalmou; mas o pós-incidente e a análise da situação seguem inacabados."
34020-28 = "Nós também não somos alheias a este caso…… parte da análise está a cargo da Sisterhood."
34020-29 = "Pensem neste assento como um espaço pra compartilhar essas informações e discutir os desdobramentos."
34020-31 = "É isso."
34020-32 = "[s] \"Entendi…….\""
34020-33 = "……."
34020-34 = "Sobre a dúvida \"por que nós, e não o Tea Party?\", eu respondo."
34020-35 = "Agora, o Tea Party precisa de ajuda externa."
34020-36 = "……."
34020-37 = "Em torno do Tratado do Éden, houve o incidente de um membro do Tea Party atacar a host — e, como resultado, a situação sem precedentes de ela ser posta na prisão."
34020-38 = "Quem diria que quem ordenou o ataque à senhorita Seia foi a senhorita Mika……."
34020-39 = "……."
34020-40 = "……."
34020-41 = "Quem cuidou do tratamento da senhorita Seia, como todos sabem, fui eu. Por isso, eu também investiguei este caso à minha maneira."
34020-42 = "A senhorita Mika, no fim, foi usada pela Arius…… mas isso não faz o pecado dela desaparecer."
34020-43 = "E a atual host, a senhorita Nagisa, usou a organização extralegal chamada \"Schale\" e tentou levar alunas inocentes à expulsão."
34020-44 = "……."
34020-45 = "Ouvi dizer que ela se desculpou com as alunas prejudicadas e que, no geral, tudo se acomodou……."
34020-46 = "Ainda assim, isso não apaga os atos da senhorita Nagisa."
34020-47 = "……."
34020-48 = "A senhorita Seia, por sorte, pôde voltar à academia…… mas a saúde dela piorou em relação a antes, e ela está num estado em que não consegue sair do próprio quarto."
34020-49 = "Por isso, o meu julgamento é que o instável \"Tea Party\" de agora precisa de ajuda de fora."
34020-51 = "Entendo."
34020-52 = "……Obrigada pela explicação cuidadosa, comandante Mine."
34020-57 = "[ns] （Q-que clima pesado……）"
34020-58 = "A comandante Mine é a líder do clube de história mais antiga de Trinity, e a chefe da facção Johannes."
34020-59 = "Por direito, ela pode participar do Tea Party…… embora, até hoje, recusasse, pra se dedicar às atividades de socorro."
34020-60 = "Isso é passado."
34020-61 = "……Desenrolando este incidente, tudo converge pra Filial de Arius."
34020-63 = "O ataque ao local do Tratado do Éden; a executora, e o cérebro por trás, era a Filial de Arius."
34020-66 = "Tanto a presidente Makoto quanto a Mika, dá pra dizer, foram apenas marionetes nas mãos da Arius……."
34020-68 = "A presidente Makoto alega que, como a Arius, uma dissidência de Trinity, os atacou, ela é, na verdade, vítima; que toda a responsabilidade é nossa."
34020-69 = "E que, por isso, até a conta do salão pra cortar o cabelo queimado ela vai cobrar da gente――enfim, um monte de coisa sem pé nem cabeça…… bom, deixando isso de lado."
34020-71 = "Se a Arius puxava os fios por trás…… restam algumas dúvidas."
34020-72 = "Primeira: por que a Filial de Arius sabotou o Tratado do Éden?"
34020-73 = "Ouvi dizer que a Filial de Arius, por longo tempo, odiou tanto a nossa Trinity quanto Gehenna. Deve ter sido a chance de ouro de neutralizar, de uma vez, os quadros das duas academias."
34020-74 = "Além disso, usando o \"contrato\" chamado Tratado do Éden, elas obtiveram uma força militar incompreensível…… foi assim que a Seia explicou."
34020-75 = "Sim. Os fantasmas com a forma do \"Conselho dos Santos de Justina\". Se aqueles tivessem atacado Trinity e Gehenna daquele jeito――as duas academias teriam desmoronado sem defesa."
34020-76 = "……."
34020-77 = "O que, afinal, era aquilo?"
34020-78 = "Sobre isso há algumas hipóteses…… mas seguimos sem encontrar provas que as sustentem."
34020-79 = "O Conselho dos Santos era, por origem, o grupo antecessor da Sisterhood. Sakurako, há algo que vocês estejam escondendo de nós nesse ponto?"
34020-80 = "……Não, infelizmente."
34020-81 = "A Sisterhood é, de origem, um grupo cheio de segredos. Também é hábil no controle, na ocultação e na distorção de informações."
34020-86 = "A senhorita sabe que há muitos alunos na academia que nutrem desconfiança da Sisterhood?"
34020-92 = "……Como a senhorita, por exemplo?"
34020-93 = "……."
34020-94 = "……."
34020-95 = "[s] （Q-que clima pesado……）"
34020-99 = "……Se a senhorita imagina que eu conheço todos os segredos da Sisterhood, está enganada."
34020-100 = "Na Sisterhood existem muitas coisas seladas que nem eu conheço――embora eu não possa entrar em detalhes."
34020-101 = "……Entendo; perdão."
34020-102 = "Haa……."
34020-103 = "Aquele míssil de cruzeiro que neutralizou o sistema de proteção de Trinity…… como vai essa análise?"
34020-104 = "Estamos avançando na análise, mas, por ora, tanto a origem quanto a estrutura são desconhecidas…… só se sabe que não é uma tecnologia existente em Kivotos……."
34020-105 = "……A Filial de Arius assegurou, no mínimo, dois poderes desconhecidos, então."
34020-106 = "Sim. E isso leva à segunda dúvida."
34020-107 = "Segunda: o que a Filial de Arius está planejando?"
34020-108 = "……."
34020-109 = "……Sobre isto, nós não sabemos nada."
34020-110 = "E, acima de tudo――nós nem sabemos onde fica o distrito autônomo de Arius."
34020-111 = "……Isso sempre foi um mistério; mas, com este incidente, conseguimos algumas pistas."
34020-112 = "Naquela hora, elas se infiltraram pelas catacumbas sob a Antiga Catedral da Comunhão."
34020-113 = "As rotas de infiltração delas até hoje, sabemos, estão todas ligadas às catacumbas. A posição de lançamento do míssil de cruzeiro também era uma zona de ruínas dentro de Trinity."
34020-114 = "As ruínas subterrâneas no distrito autônomo de Trinity são numerosas. Investigar e controlar todas é impossível."
34020-115 = "E mais: as catacumbas são um labirinto cuja escala ainda nem foi esclarecida…… achar, por conta própria, o distrito autônomo de Arius a partir delas também deve ser dificílimo."
34020-116 = "Hum……."
34020-117 = "Segundo a Seia, aquele distrito autônomo é protegido por \"um certo poder\" que nós não compreendemos."
34020-118 = "Do contrário, não haveria explicação pra ele seguir escondido até hoje, disse ela……."
34020-119 = "De novo essa história de poder incompreensível……."
34020-120 = "Pela história da Azusa, que pertencia à Arius, a cada missão entregavam um mapa com a saída das catacumbas registrada."
34020-124 = "A rota do mapa mudava a cada vez e ainda vinha criptografada…… e ela, sendo traidora, já não conhece o caminho de volta pro distrito autônomo de Arius……."
34020-125 = "……Vocês interrogaram essa garota?"
34020-126 = "Hã?"
34020-127 = "A Azusa Shirasu…… vocês arrancaram dela informações da Arius?"
34020-128 = "Ela já pagou um preço suficiente! Foi marcada como traidora pelo distrito autônomo de onde veio, e, mesmo assim, se esforçou por nós!"
34020-130 = "Envolver nas nossas questões uma menina que enfim recuperou a paz do coração, e espremer dela informações da Arius…… que crueldade……!"
34020-131 = "A-ah, não! Não foi interrogatório; foi, do começo ao fim, ela mesma que contou……."
34020-133 = "E vocês acham que aquela garota teria essa disposição! Usaram o poder do Tea Party pra brutalizar uma menininha frágil, na certa……!!"
34020-134 = "Hã!? Hãã!?"
34020-135 = "Acalme-se, comandante Mine. Não há fato algum desses."
34020-136 = "……Não é isso?"
34020-137 = "Sim. Que a Nagisa é uma pessoa cruel, sem sangue nem lágrimas, é fato; mas, desta vez, não. A Azusa não recebeu tratamento indevido algum."
34020-141 = "Acima de tudo, o \"Clube de Aulas de Reforço\" é um clube sob responsabilidade do Sensei da Schale. Se algo assim tivesse acontecido, o Sensei não teria ficado calado."
34020-142 = "……É verdade."
34020-143 = "Perdão, senhorita Nagisa."
34020-144 = "……."
34020-145 = "[s3] （A xícara da Nagisa tá tremendo……）\n[s4] \"V-você tá bem, Nagisa?\""
34020-146 = "……Sim, eu também sei."
34020-147 = "……Sim, eu também sei."
34020-148 = "A Hifumi…… a Hanako, a Koharu, a Azusa……."
34020-149 = "O pessoal do Clube de Aulas de Reforço carregou muito mais do que a responsabilidade que lhes cabia……."
34020-150 = "E, entre o que elas carregaram, deve haver coisas cuja causa fui eu……."
34020-151 = "Quanto a isso, eu também tenho a minha parcela de culpa, e arrependimento……."
34020-152 = "Por isso, venho me esforçando pra que, depois do Tratado do Éden, aquelas meninas não se envolvam em assentos como este……."
34020-153 = "Este jogo de lama tem que ser papel nosso…… não podemos deixar que elas passem por uma experiência dessas……."
34020-154 = "[s] \"Nagisa……\""
34020-155 = "……Pois é, senhorita Nagisa. Perdoe a minha grosseria."
34020-156 = "……Concordo."
34020-157 = "Eu também, no fundo, gostaria de passar o posto à Hanako, mas……"
34020-158 = "o contrato que fiz com ela já terminou…… e também acho que não se deve pôr mais nada nas costas dela."
34020-159 = "Resolver, só nós, os problemas que restaram…… essa deve ser a cortesia mínima ao nosso alcance."
34020-160 = "Mas eu confio que o Sensei agirá conosco até o fim."
34020-161 = "[s] \"Sim, claro.\""
34020-162 = "……Obrigada, Sensei."
34020-164 = "As catacumbas são um labirinto gigante de que nem o mapa geral se conhece…… procurar uma entrada que muda a cada vez é, de fato, um problemão."
34020-165 = "Vamos inverter o raciocínio…… que tal ouvir alguém que conhece as passagens?"
34020-166 = "Alguém que conhece as passagens……?"
34020-169 = "A líder do \"Squad de Arius\", que liderou o ataque: Saori Joumae. Ela, com certeza, conhece as passagens a fundo."
34020-170 = "……Sei. Sendo ela, que comandava o ataque……."
34020-171 = "Mas o paradeiro do \"Squad\" é desconhecido……. Há grande chance de já terem fugido pro distrito autônomo."
34020-172 = "Fora o \"Squad\", não haveria mais uma aluna que conhece bem as passagens?"
34020-173 = "……."
34020-174 = "Deixa ver……? De quem a senhorita está falando……."
34020-179 = "Mika Misono."
34020-180 = "……!?"
34020-182 = "I-isso não…… a própria Mika disse que a única coisa que não sabe é a localização do distrito autônomo de Arius……."
34020-183 = "……Ela manteve conluio com a Arius por longo tempo. E, mesmo assim, vocês acreditam na palavra de que ela não conhece a localização da Arius?"
34020-184 = "……."
34020-185 = "……De fato, há registros de que a senhorita Mika entregou suprimentos a alunas de Arius."
34020-186 = "Pra dar o golpe, pra obter o apoio da Arius…… pensar assim é o natural."
34020-187 = "Mas…… a Mika……."
34020-188 = "A reputação e a conduta da senhorita Mika até aqui não são lá muito exemplares."
34020-189 = "A senhorita Nagisa deve saber bem…… a senhorita Mika, usando como escudo o fato de pertencer ao Tea Party, encobriu muitas faltas e problemas."
34020-190 = "As acusações e o alvoroço contra a senhorita Mika que agora ocorrem na academia――essa opinião pública também não é alheia à conduta dela até aqui."
34020-191 = "[s] （……Alvoroço?）"
34020-192 = "A Mika…… mentiu, é isso……#nEscondendo o distrito autônomo de Arius…… o que, afinal……."
34020-193 = "……."
34020-194 = "Eu compreendo bem o seu sentimento pela senhorita Mika."
34020-195 = "Dito isso, e perdoe a indelicadeza――se a discussão for \"quem é a pessoa que melhor entende a senhorita Mika\", essa pessoa não seria a senhorita Nagisa, amiga de infância dela?"
34020-196 = "……."
34020-201 = "Aos seus olhos, senhorita Nagisa: a senhorita Mika parece ainda esconder algo de nós?"
34020-205 = "Isso……."
34020-206 = "[s] （Nagisa……）"
34020-210 = "……Não; eu acredito na Mika."
34020-211 = "……."
34020-212 = "……."
34020-213 = "De fato…… a Mika não é o que se pode chamar de aluna exemplar, mas……."
34020-214 = "Ainda assim, eu acredito na Mika――porque essa foi a lição que eu aprendi desta vez."
34020-215 = "E, pra que os demais também acreditem, comparecerei à audiência de amanhã e farei a defesa da Mika."
34020-216 = "Pra que vocês――e, se preciso, esta academia inteira acredite no testemunho da Mika!"
34020-217 = "Mesmo que, com isso, eu acabe sendo acusada…… eu……."
34020-218 = "……Não; eu apenas verbalizei uma hipótese, sem segundas intenções. Perdão pelo mal-entendido, senhorita Nagisa."
34020-219 = "……Perdoe-me. Peço desculpas pela descortesia."
34020-220 = "[s] \"É que…… bom…….\""
34020-221 = "……Haa."
34020-222 = "Pois é…… já é uma boa hora; vamos encerrar por aqui?"
34020-223 = "Obrigada pelo tempo de vocês, em meio à correria."
34020-224 = "……Imagina. Foi bom poder vê-los. Obrigada."
34020-225 = "E eu também lamento muito esta situação…… as acusações contra a senhorita Mika."
34020-226 = "Vou procurar as minhas próprias medidas. Com licença."
34020-227 = "Sim――então, eu também volto pra grande catedral."
34020-228 = "Sim, cuidem-se."
34020-233 = "Haa……."
34020-234 = "……Meu estômago dói."
34020-235 = "[s] \"Bom trabalho.\""
34020-236 = "……Obrigada, Sensei. Sinto que só ando mostrando ao senhor os meus lados mais patéticos……."
34020-237 = "[s5] \"Sobre aquilo de agora há pouco…… aconteceu algo com a Mika?\"\n[s6] \"De um tempo pra cá, algo……\""
34020-238 = "……Ah. Ainda não tinha chegado aos ouvidos do senhor."
34020-239 = "……Ah. Ainda não tinha chegado aos ouvidos do senhor."
34020-240 = "Amanhã de manhã, está prevista a audiência da Mika."
34020-241 = "[s] \"Audiência?\""
34020-242 = "Sim. Chama-se audiência, mas, na prática, é mais próximo de um inquérito sobre o caso do outro dia…… melhor pensar como uma espécie de comissão de averiguação."
34020-243 = "Os pecados que a Mika cometeu até aqui…… a discussão deve girar, principalmente, em torno do Tratado do Éden……."
34020-247 = "……Sensei."
34020-251 = "A Mika…… com certeza, vai ser expulsa, eu acho."
34020-253 = "Próximo Episódio;A Princesa na Jaula"
