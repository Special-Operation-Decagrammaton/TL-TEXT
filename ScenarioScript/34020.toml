[translation]
34020-1 = "Episódio 2: Uma Festa do Chá Incomum"
34020-3 = "Obrigada por vir, Sensei. Faz um tempo desde sua última visita à Trinity."
34020-4 = "[s] \"Olá, Nagisa, pessoal.\""
34020-5 = "Nos encontramos novamente, Sensei [USERNAME]. Agradeço por sua ajuda outro dia."
34020-6 = "……Prazer em conhecê-lo. Sou Mine, a líder da Brigada de Socorro."
34020-7 = "[s1] \"Olá, prazer em conhecê-la.\"\n[s2] \"Que grupo inusitado, não é?\""
34020-8 = "Fufu…… Inusitado? Ou talvez um grupo que deixa a Nagisa-san em apuros?"
34020-9 = "Fufu…… Inusitado? Ou talvez um grupo que deixa a Nagisa-san em apuros?"
34020-10 = "Eu não tenho a intenção de deixar a anfitriã em apuros."
34020-11 = "Como membro de uma nobre brigada que defende a fé e o orgulho, meu dever é apenas corrigir aqueles que se desviaram do caminho."
34020-13 = "Mesmo que sejam alunas do Comitê de Justiça ou da Festa do Chá."
34020-14 = "……."
34020-15 = "……Essas suas palavras já parecem estar deixando a Nagisa-san em apuros."
34020-16 = "Bem, vamos encerrar a conversa fiada por aqui."
34020-17 = "O motivo de eu ter chamado o Sensei foi para discutir o desenrolar dos fatos após o Tratado do Éden e como lidar com as consequências do incidente…… mas."
34020-18 = "……."
34020-19 = "……."
34020-20 = "As líderes da Irmandade e da Brigada de Socorro insistiram em comparecer…… e acabou ficando assim."
34020-21 = "……A Irmandade também mudou. De agora em diante, pretendemos participar ativamente de reuniões como esta."
34020-22 = "Eu também estou aqui apenas para cumprir meu dever como líder da \"Brigada\"."
34020-23 = "……."
34020-24 = "[s] \"Bem…… então, vocês duas estão aqui para pressionar a Festa do Chá……?\""
34020-25 = "Não, é apenas por pura curiosidade."
34020-26 = "Eu não entendo muito bem dessas questões políticas."
34020-27 = "O tumulto do Tratado do Éden foi contido de alguma forma, mas o processamento pós-incidente e a análise da situação ainda não terminaram."
34020-28 = "Nós também não somos estranhas a este incidente…… já que parte da análise está sendo feita pela Irmandade."
34020-29 = "Pode considerar que esta reunião serve para compartilhar essas informações e discutir as medidas pós-incidente."
34020-31 = "É exatamente isso."
34020-32 = "[s] \"Entendo…….\""
34020-33 = "……."
34020-34 = "Quanto à dúvida de por que somos nós e não a Festa do Chá, eu mesma responderei."
34020-35 = "Neste momento, a Festa do Chá precisa de ajuda externa."
34020-36 = "……."
34020-37 = "Antes e depois do Tratado do Éden, ocorreu um incidente onde um membro da Festa do Chá atacou a anfitriã, resultando em uma situação sem precedentes: a prisão de uma aluna."
34020-38 = "Quem diria que foi a Mika-sama quem ordenou o ataque à Seia-sama……."
34020-39 = "……."
34020-40 = "……."
34020-41 = "Como é de conhecimento geral, fui eu quem tratou da Seia-sama. Por isso, investiguei este incidente à minha maneira."
34020-42 = "Embora a Mika-sama tenha sido usada por Arius no final das contas…… isso não apaga os crimes que ela cometeu."
34020-43 = "E a atual anfitriã, Nagisa-sama, utilizou uma organização extrajudicial chamada \"Schale\" para tentar expulsar alunas inocentes."
34020-44 = "……."
34020-45 = "Ouvi dizer que ela pediu desculpas às alunas afetadas e que tudo foi resolvido pacificamente, mas……."
34020-46 = "Ainda assim, isso não faz com que as ações da Nagisa-sama deixem de ter existido."
34020-47 = "……."
34020-48 = "Felizmente, a Seia-sama conseguiu retornar à academia, mas…… sua saúde piorou desde então, e ela não consegue mais sair do próprio quarto."
34020-49 = "Por isso, cheguei à conclusão de que a instável \"Festa do Chá\" atual precisa de ajuda externa."
34020-51 = "Entendo."
34020-52 = "……Obrigada pela explicação detalhada, Líder Mine."
34020-57 = "[ns] (Que clima tenso…….)"
34020-58 = "A Líder Mine é a líder do clube com a história mais antiga de Trinity e a chefe da facção de João."
34020-59 = "Em teoria, eu tenho o direito de participar do Chá das Partes... até agora, eu tinha recusado esse direito para me dedicar às atividades de socorro."
34020-60 = "Isso é passado."
34020-61 = "……Ao analisar este incidente, tudo aponta para a Escola Filial de Arius."
34020-63 = "O ataque ao local da conferência do Tratado do Éden foi executado e orquestrado pela Escola Filial de Arius."
34020-66 = "Pode-se dizer que tanto a Presidente Makoto quanto a Mika foram apenas marionetes nas mãos de Arius……."
34020-68 = "A Presidente Makoto alega que, como Arius, uma facção de Trinity, os atacou, ela é na verdade a vítima e que toda a responsabilidade é nossa."
34020-69 = "Por causa disso, ela até nos enviou a conta do salão de beleza para cortar o cabelo que queimou — algo completamente sem sentido... bem, deixando isso de lado."
34020-71 = "Se Arius estava puxando as cordas nos bastidores…… algumas dúvidas permanecem."
34020-72 = "Primeiro: por que a Escola Filial de Arius sabotou o Tratado do Éden?"
34020-73 = "Ouvi dizer que a Escola Filial de Arius nutre um ódio profundo tanto por Trinity quanto por Gehenna há muito tempo. Deve ter sido a oportunidade perfeita para neutralizar o pessoal de ambas as escolas de uma só vez."
34020-74 = "Além disso, eles obtiveram forças militares inexplicáveis usando o 'contrato' do Tratado do Éden... foi assim que a Seia explicou."
34020-75 = "Sim. Aqueles fantasmas com a aparência da 'Sociedade de Santa Justina'. Se eles tivessem atacado Trinity ou Gehenna diretamente, ambas as escolas teriam colapsado sem chance de defesa."
34020-76 = "……."
34020-77 = "O que exatamente era aquilo?"
34020-78 = "Existem várias hipóteses sobre isso, mas... ainda não conseguimos encontrar evidências que as comprovem."
34020-79 = "A Sociedade de Santa Justina era originalmente o grupo predecessor da Sisterhood. Sakurako-san, você não está escondendo nada de nós sobre isso?"
34020-80 = "……Não, infelizmente."
34020-81 = "A Sisterhood é, por natureza, um grupo cheio de segredos. Somos especialistas em controle, ocultação e distorção de informações."
34020-86 = "Você sabia que há muitos alunos na escola que suspeitam da Sisterhood?"
34020-92 = "……Por exemplo, você?"
34020-93 = "……."
34020-94 = "……."
34020-95 = "[s] (Q-que situação constrangedora...)"
34020-99 = "……Se você acha que eu sei todos os segredos da Sisterhood, está enganado."
34020-100 = "Existem muitas coisas ocultas na Sisterhood que nem eu mesma conheço — embora eu não possa entrar em detalhes."
34020-101 = "……Entendo, peço desculpas."
34020-102 = "Haa……."
34020-103 = "Aquele míssil de cruzeiro que neutralizou o sistema de defesa de Trinity... como está a análise dele?"
34020-104 = "Estamos avançando com a análise, mas até agora, tanto a origem quanto a estrutura são desconhecidas... só sabemos que não é uma tecnologia existente em Kivotos……."
34020-105 = "……Então, a Escola Filial de Arius garantiu pelo menos dois tipos de poderes desconhecidos."
34020-106 = "Sim. E isso nos leva à segunda dúvida."
34020-107 = "Segundo: o que a Escola Filial de Arius está planejando?"
34020-108 = "……."
34020-109 = "……Sobre isso, não sabemos absolutamente nada."
34020-110 = "Acima de tudo — nós nem sabemos onde fica o Distrito Autônomo de Arius."
34020-111 = "……Isso sempre foi um mistério, mas este incidente nos deu algumas pistas."
34020-112 = "Naquela ocasião, elas se infiltraram através das catacumbas sob a Antiga Basílica de Tongu."
34020-113 = "Descobrimos que todas as rotas de infiltração anteriores delas também estavam relacionadas às catacumbas. O local de lançamento do míssil de cruzeiro também era uma área de ruínas dentro de Trinity."
34020-114 = "Existem inúmeras ruínas subterrâneas no Distrito Autônomo de Trinity. É impossível investigar e controlar todas elas."
34020-115 = "Além disso, as catacumbas são um labirinto cuja extensão ainda não foi revelada... encontrar o Distrito Autônomo de Arius por conta própria a partir de lá será extremamente difícil."
34020-116 = "Hum……."
34020-117 = "Segundo a Seia, aquele distrito é protegido por um 'certo poder' que não conseguimos compreender."
34020-118 = "Se não fosse por isso, não haveria explicação para como conseguiram se esconder até agora, diz ela……."
34020-119 = "De novo falando sobre poderes incompreensíveis……."
34020-120 = "De acordo com Azusa-san, que pertencia a Arius, a cada missão ela recebia um mapa com a saída das catacumbas registrada."
34020-124 = "O caminho no mapa mudava a cada vez e ainda era criptografado... como uma traidora, ela diz que não sabe mais o caminho de volta para o Distrito Autônomo de Arius……."
34020-125 = "……Você interrogou aquela garota?"
34020-126 = "Hã?"
34020-127 = "Shirasu Azusa-san…… você a forçou a revelar informações sobre Arius?"
34020-128 = "Ela já pagou um preço alto o suficiente! Ela foi marcada como traidora pelo distrito de onde veio e, mesmo assim, se esforçou muito por nós!"
34020-130 = "Uma criança que finalmente recuperou a paz de espírito, sendo envolvida em nossos assuntos e interrogada sobre informações de Arius... que crueldade...!"
34020-131 = "Ah, não! Não foi um interrogatório, ela apenas nos contou por vontade própria..."
34020-133 = "Será que aquela garota realmente se sente assim?! Você deve ter usado a autoridade do Chá das Cinco para forçar uma garota indefesa a fazer algo contra a vontade dela...!!"
34020-134 = "Hã!? O quê!?"
34020-135 = "Acalme-se, Chefe Mine. Não existe tal fato."
34020-136 = "......Não é verdade?"
34020-137 = "Sim. É verdade que a Nagisa-san é uma pessoa cruel, sem sangue ou lágrimas, mas desta vez não. A Azusa-san não foi tratada de forma desrespeitosa."
34020-141 = "Acima de tudo, o 'Clube de Estudos Suplementares' é um clube que tem o Sensei do Schale como orientador. Se algo assim tivesse acontecido, o Sensei não teria ficado calado."
34020-142 = "......É verdade."
34020-143 = "Peço perdão, Nagisa-sama."
34020-144 = "......"
34020-145 = "[s3] (A xícara de chá da Nagisa está tremendo...)\n[s4] \"V-você está bem, Nagisa?\""
34020-146 = "......Sim, eu também sei disso."
34020-147 = "......Sim, eu também sei disso."
34020-148 = "Hifumi-san... Hanako-san, Koharu-san, Azusa-san..."
34020-149 = "As integrantes do Clube de Estudos Suplementares carregaram muito mais do que a responsabilidade que deveriam ter originalmente..."
34020-150 = "Entre as coisas que elas carregaram, algumas foram causadas por mim..."
34020-151 = "Em relação a isso, eu também tenho culpas a carregar e arrependimentos..."
34020-152 = "Por isso, estou me esforçando para que elas não se envolvam em situações como esta após o Tratado de Eden..."
34020-153 = "Se essa disputa suja não for nossa responsabilidade... não podemos deixar que elas passem por essa experiência..."
34020-154 = "[s] \"Nagisa...\""
34020-155 = "......Entendo, Nagisa-sama. Por favor, perdoe minha grosseria."
34020-156 = "......Concordo plenamente."
34020-157 = "Eu também, no fundo, gostaria de passar o meu papel para a Hanako-san, mas..."
34020-158 = "O contrato que fiz com ela já terminou... e penso que não devo sobrecarregá-la mais do que isso."
34020-159 = "Resolver os problemas restantes apenas entre nós... essa deve ser a cortesia mínima que podemos oferecer."
34020-160 = "No entanto, acredito que o Sensei permanecerá conosco até o fim."
34020-161 = "[s] \"Sim, claro.\""
34020-162 = "......Muito obrigada, Sensei."
34020-164 = "As catacumbas são um labirinto gigantesco onde nem o mapa completo foi descoberto... procurar uma entrada que muda a cada vez é, de fato, um problema difícil."
34020-165 = "Vamos inverter o pensamento... que tal perguntarmos a alguém que conhece as passagens?"
34020-166 = "Alguém que conhece as passagens...?"
34020-169 = "A líder do 'Esquadrão Arius', que liderou o ataque, Saori Joumae. Ela certamente deve conhecer as passagens muito bem."
34020-170 = "......Entendo. Se foi ela quem comandou o ataque..."
34020-171 = "No entanto, o paradeiro do 'Esquadrão' é desconhecido... É muito provável que já tenham fugido para o Distrito Autônomo."
34020-172 = "Além do 'Esquadrão', não existe mais uma aluna que conhece bem as passagens?"
34020-173 = "......"
34020-174 = "Hum... de quem você está falando...?"
34020-179 = "Mika Misono."
34020-180 = "......!?"
34020-182 = "M-mas isso... a própria Mika-san disse que não sabe a localização do Distrito Autônomo de Arius..."
34020-183 = "......Ela manteve contato com Arius por muito tempo. Mesmo assim, você acredita na palavra dela de que não sabe a localização de Arius?"
34020-184 = "......"
34020-185 = "......Pelo que me lembro, há registros de que a Mika-sama entregou suprimentos para as alunas de Arius."
34020-186 = "Para realizar o golpe de estado, para obter o apoio de Arius... é natural pensar dessa forma."
34020-187 = "Mas... a Mika-san..."
34020-188 = "A reputação e as ações da Mika-sama até agora não podem ser chamadas de exemplares."
34020-189 = "Acredito que a Nagisa-sama saiba muito bem... a Mika-sama usou o fato de pertencer ao Chá das Cinco como escudo para encobrir muitos erros e problemas."
34020-190 = "Atualmente, as críticas e o tumulto que estão ocorrendo na escola contra a Mika-sama — essa opinião pública também não é irrelevante em relação ao comportamento dela até agora."
34020-191 = "[s] (...Tumulto?)"
34020-192 = "Isso significa que... a Mika mentiu...? Escondendo o Distrito de Arius... O que exatamente ela está...?"
34020-193 = "……。"
34020-194 = "Eu entendo perfeitamente os sentimentos da Nagisa-sama pela Mika-sama."
34020-195 = "Dito isso, embora seja uma pergunta indelicada — se discutirmos quem é a pessoa que melhor compreende a Mika-sama, não seria você, Nagisa-sama, que é amiga de infância dela?"
34020-196 = "……。"
34020-201 = "Do seu ponto de vista, Nagisa-sama, você sente que a Mika-sama ainda está escondendo algo de nós?"
34020-205 = "Isso é……."
34020-206 = "[s] (Nagisa……)"
34020-210 = "……Não, eu acredito na Mika-san."
34020-211 = "……。"
34020-212 = "……。"
34020-213 = "Certamente... não posso dizer que a Mika-san seja uma aluna exemplar, mas……."
34020-214 = "Ainda assim, eu acredito na Mika-san — essa é a lição que aprendi desta vez."
34020-215 = "Para que outros também possam acreditar, comparecerei à audiência de amanhã para defender a Mika-san."
34020-216 = "Para que vocês — e, se necessário, toda a escola — possam acreditar no testemunho da Mika-san!"
34020-217 = "Mesmo que isso signifique que eu seja condenada por isso... eu……."
34020-218 = "……Não, eu apenas expus uma hipótese, não tive segundas intenções. Peço desculpas por causar um mal-entendido, Nagisa-sama."
34020-219 = "……Peço perdão. Sinto muito pela minha falta de educação."
34020-220 = "[s] \"Bem... é que…….\""
34020-221 = "……Haa."
34020-222 = "É verdade... já está tarde, então acho que deveríamos encerrar por hoje."
34020-223 = "Obrigada por reservar um tempo em sua agenda lotada hoje."
34020-224 = "……Não, eu que agradeço. Fico feliz por termos nos encontrado. Obrigada."
34020-225 = "E eu também me sinto muito triste com esta situação... em relação às críticas contra a Mika-sama."
34020-226 = "Vou procurar minhas próprias formas de lidar com isso. Até logo."
34020-227 = "Sim — então, eu também voltarei para a Catedral."
34020-228 = "Sim, tome cuidado."
34020-233 = "Haa……."
34020-234 = "……Meu estômago dói."
34020-235 = "[s] \"Bom trabalho.\""
34020-236 = "……Obrigada, Sensei. Sinto que só tenho mostrado meu lado patético ultimamente……."
34020-237 = "[s5] \"Sobre o que você disse antes... aconteceu algo com a Mika?\"\n[s6] \"Desde agora pouco, você parece...\""
34020-238 = "……Ah. Então a notícia ainda não chegou aos seus ouvidos, Sensei."
34020-239 = "……Ah. Então a notícia ainda não chegou aos seus ouvidos, Sensei."
34020-240 = "A audiência da Mika-san está marcada para amanhã de manhã."
34020-241 = "[s] \"Audiência?\""
34020-242 = "Sim. Embora chamemos de audiência, é melhor pensar nela como um inquérito... algo próximo a um conselho disciplinar sobre o incidente recente."
34020-243 = "Os crimes que a Mika-san cometeu até agora... especialmente os relacionados ao Tratado do Éden, serão o foco da discussão……."
34020-247 = "……Sensei."
34020-251 = "A Mika-san... provavelmente será expulsa."
34020-253 = "Próximo episódio: A Princesa na Gaiola"
