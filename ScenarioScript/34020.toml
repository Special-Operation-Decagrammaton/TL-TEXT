[translation]
34020-1 = "Episódio 2; Uma Tea Party Irregular"
34020-3 = "Agradeço por ter vindo, Sensei. Já faz um tempo desde a sua última visita à Trinity, não é?"
34020-4 = "[s] \"Olá, Nagisa, e a todas.\""
34020-5 = "Nós nos encontramos de novo, Sensei [USERNAME]. Obrigada pela sua ajuda no outro dia."
34020-6 = "......Prazer em conhecê-lo. Meu nome é Mine e sou a capitã dos Cavaleiros Hospitalários."
34020-7 = "[s1] \"Sim, prazer em conhecê-la.\"\n[s2] \"Mas que combinação mais inusitada de pessoas.\""
34020-8 = "Fufu... inusitada, ou talvez seja melhor dizer, uma combinação feita para causar problemas para a Nagisa-san."
34020-9 = "Fufu... inusitada, ou talvez seja melhor dizer, uma combinação feita para causar problemas para a Nagisa-san."
34020-10 = "Não é minha intenção causar problemas para a anfitriã."
34020-11 = "Como membro da honrosa ordem dos cavaleiros que carrega convicção e orgulho, apenas corrijo aqueles que se desviam do caminho."
34020-13 = "Mesmo que sejam estudantes do Comitê de Realização da Justiça ou da Tea Party."
34020-14 = "......"
34020-15 = "......Suas palavras parecem já estar causando problemas para a Nagisa-san."
34020-16 = "Bem, vamos deixar a conversa fiada por aqui."
34020-17 = "O motivo pelo qual chamei o Sensei foi para discutirmos sobre os desdobramentos desde o Tratado do Éden e a limpeza após o incidente... mas..."
34020-18 = "......"
34020-19 = "......"
34020-20 = "A líder da Irmandade e a capitã dos Cavaleiros Hospitalários insistiram em participar... e acabou ficando assim."
34020-21 = "......A Irmandade também mudou. A partir de agora, pretendemos participar ativamente de reuniões como esta."
34020-22 = "Eu também estou aqui apenas para cumprir minhas obrigações como capitã da 'Ordem dos Cavaleiros'."
34020-23 = "......"
34020-24 = "[s] \"Err... quer dizer que vocês duas estão aqui para manter a Tea Party sob controle...?\""
34020-25 = "Não, é puramente por interesse."
34020-26 = "Não entendo muito dessas questões políticas."
34020-27 = "A confusão do Tratado do Éden de alguma forma se acalmou, mas as providências após o incidente e a análise da situação ainda não terminaram."
34020-28 = "Nós não somos alheias a esse incidente... Parte da análise está sendo feita pela Irmandade."
34020-29 = "Pense nesta reunião como um espaço para compartilhar esse tipo de informação e discutir as consequências do que aconteceu."
34020-31 = "É exatamente isso."
34020-32 = "[s] \"Entendo...\""
34020-33 = "......"
34020-34 = "Sobre a pergunta do 'Por que não a Tea Party e sim nós?', eu mesma responderei."
34020-35 = "Neste momento, a Tea Party precisa de ajuda externa."
34020-36 = "......"
34020-37 = "Na época do Tratado do Éden, ocorreu um incidente onde um membro da Tea Party atacou a anfitriã, resultando numa situação sem precedentes de uma líder sendo colocada na prisão."
34020-38 = "Jamais imaginei que tivesse sido a Mika-sama quem ordenou o ataque contra a Seia-sama..."
34020-39 = "......"
34020-40 = "......"
34020-41 = "Como é de conhecimento público, fui eu quem cuidou da Seia-sama. Por causa disso, também tenho investigado esse incidente por conta própria."
34020-42 = "Embora a Mika-sama tenha sido usada por Arius, isso não apaga os crimes que ela cometeu."
34020-43 = "E a atual anfitriã, Nagisa-sama, usou a organização extrajudicial chamada 'Schale' para tentar forçar estudantes inocentes à expulsão."
34020-44 = "......"
34020-45 = "Ouvi dizer que ela pediu desculpas às estudantes afetadas e que as coisas se acalmaram... mas..."
34020-46 = "Ainda assim, isso não significa que as ações da Nagisa-sama nunca existiram."
34020-47 = "......"
34020-48 = "Felizmente a Seia-sama pôde retornar à academia... mas a sua condição física piorou, deixando-a com a saúde frágil a ponto de não conseguir sair do seu próprio quarto."
34020-49 = "Por isso, a minha conclusão é de que a instável 'Tea Party' atual precisa de ajuda externa."
34020-51 = "Entendo."
34020-52 = "......Agradeço pela sua explicação detalhada, Capitã Mine."
34020-57 = "[ns] (Q-Que clima constrangedor...)"
34020-58 = "A Capitã Mine é a líder do clube com a história mais antiga da Trinity e chefe da facção Johannes."
34020-59 = "Ela teria o direito de participar da Tea Party se quisesse... mas até agora ela vinha recusando, para poder realizar pessoalmente suas atividades de resgate."
34020-60 = "Isso é coisa do passado."
34020-61 = "......Desvendando esse incidente, tudo se converge para a filial de Arius."
34020-63 = "O ataque ao local da reunião do Tratado do Éden. Foi a filial de Arius quem executou e orquestrou tudo."
34020-66 = "Tanto a Presidente Makoto quanto a Mika-san foram apenas manipuladas por Arius..."
34020-68 = "A Presidente Makoto alega que foi atacada pela Arius, uma filial da Trinity, portanto, ela é a vítima da história e insiste que toda a responsabilidade recai sobre nós."
34020-69 = "Por causa disso, ela até exigiu que pagássemos as despesas do salão de beleza para cortar o cabelo que ela queimou... uma demanda completamente absurda... Bom, deixando isso de lado..."
34020-71 = "Se a Arius estava puxando as cordinhas por trás de tudo... Ainda restam algumas dúvidas."
34020-72 = "Primeiro: Por que a filial de Arius sabotou o Tratado do Éden?"
34020-73 = "Pelo que sabemos, a filial de Arius guarda rancor tanto da Trinity quanto da Gehenna há muito tempo. Teria sido a oportunidade perfeita para neutralizar o pessoal chave de ambas as academias de uma vez só."
34020-74 = "Além disso, eles conseguiram uma força militar incompreensível utilizando o 'contrato' do Tratado do Éden... Foi assim que a Seia-san explicou."
34020-75 = "Sim. Os fantasmas que assumiram a forma da 'Sociedade dos Santos Justina'. Se eles tivessem atacado Trinity ou Gehenna como estavam... ambas as academias teriam desmoronado sem poder reagir."
34020-76 = "......"
34020-77 = "O que diabos era aquilo?"
34020-78 = "Temos algumas hipóteses sobre isso... mas não conseguimos encontrar nenhuma prova que as sustente."
34020-79 = "A Sociedade dos Santos originalmente era o grupo predecessor da Irmandade. Sakurako-san, tem certeza de que não está escondendo nada de nós sobre isso?"
34020-80 = "......Não. Infelizmente."
34020-81 = "A Irmandade é, por natureza, um grupo cheio de segredos. Eles também são excelentes em controlar, esconder e distorcer informações."
34020-86 = "Você sabia que há muitas alunas na academia que suspeitam da Irmandade?"
34020-92 = "......Como você, por exemplo?"
34020-93 = "......"
34020-94 = "......"
34020-95 = "[s] (Q-Que clima constrangedor...)"
34020-99 = "......Se você acha que eu conheço todos os segredos da Irmandade, então está muito enganada."
34020-100 = "Na Irmandade, existem muitos segredos ocultos que nem mesmo eu conheço――embora eu não possa entrar em detalhes."
34020-101 = "......Entendo, peço desculpas."
34020-102 = "Haa..."
34020-103 = "Aquele míssil de cruzeiro que incapacitou os sistemas de defesa da Trinity... Como está indo a análise dele?"
34020-104 = "Estamos avançando com a análise, mas até o momento a origem e a estrutura permanecem desconhecidas... a única coisa que sabemos é que não é uma tecnologia existente em Kivotos..."
34020-105 = "......Isso significa que a filial de Arius assegurou pelo menos dois tipos de forças desconhecidas."
34020-106 = "Sim. E isso nos leva à segunda dúvida."
34020-107 = "Segundo: O que a filial de Arius está planejando?"
34020-108 = "......"
34020-109 = "......Sobre isso, não temos a menor ideia."
34020-110 = "Acima de tudo――nós nem sabemos onde fica o distrito autônomo de Arius."
34020-111 = "......Isso sempre foi um mistério, mas conseguimos obter algumas pistas graças a esse incidente."
34020-112 = "Naquele momento, elas se infiltraram através das catacumbas sob o Antigo Tabernáculo da Comunhão."
34020-113 = "Descobrimos que todas as rotas de infiltração delas até o momento estão ligadas às catacumbas. O local de lançamento do míssil de cruzeiro também ficava em um distrito de ruínas dentro da Trinity."
34020-114 = "Existem inúmeras ruínas subterrâneas no distrito autônomo da Trinity. É impossível investigar e controlar todas elas."
34020-115 = "Para piorar, as catacumbas são um labirinto cuja magnitude ainda não foi esclarecida... seria extremamente difícil encontrar o distrito autônomo de Arius por conta própria a partir de lá."
34020-116 = "Humm..."
34020-117 = "De acordo com a Seia-san, aquele distrito autônomo está protegido por um 'certo poder' que nós não conseguimos compreender."
34020-118 = "Se não fosse o caso, seria impossível explicar como elas conseguiram se manter escondidas por tanto tempo..."
34020-119 = "Mais conversas sobre poderes incompreensíveis..."
34020-120 = "De acordo com a Azusa-san, que costumava pertencer à Arius, ela recebia um mapa com as saídas das catacumbas toda vez que saía para uma missão."
34020-124 = "As rotas do mapa mudavam a cada vez, e ainda eram criptografadas... Como uma traidora, ela não sabe mais o caminho de volta para o distrito autônomo de Arius..."
34020-125 = "......Você interrogou aquela garota?"
34020-126 = "Hã?"
34020-127 = "A Azusa Shirasu-san... Você a forçou a revelar informações sobre a Arius?"
34020-128 = "Ela já pagou um preço alto o suficiente! Foi marcada como traidora pelo seu próprio distrito autônomo, e mesmo assim, se esforçou tanto por nós!"
34020-130 = "Uma garota que finalmente recuperou a paz de espírito... envolvê-la em nossos problemas e interrogá-la sobre a Arius... Como você pôde ser tão cruel...!"
34020-131 = "A-Ah, não! Eu não a interroguei, ela mesma me contou por vontade própria..."
34020-133 = "Será que aquela garota realmente faria isso de boa vontade!? Você com certeza usou o poder da Tea Party para tratar essa garota frágil com brutalidade...!!"
34020-134 = "Hã!? O quê!?"
34020-135 = "Por favor, acalme-se, Capitã Mine. Isso não é verdade."
34020-136 = "......Não?"
34020-137 = "Sim. A Nagisa-san certamente pode ser cruel, fria e insensível, mas desta vez foi diferente. A Azusa-san não sofreu nenhum tipo de tratamento desrespeitoso."
34020-141 = "Acima de tudo, o 'Clube de Reposição' é responsabilidade do Sensei da Schale. O Sensei não ficaria calado se algo assim tivesse acontecido."
34020-142 = "......É verdade."
34020-143 = "Minhas desculpas, Nagisa-sama."
34020-144 = "......"
34020-145 = "[s3] (A xícara da Nagisa tá tremendo...)\n[s4] \"V-Você tá bem, Nagisa?\""
34020-146 = "......Sim, eu também sei disso."
34020-147 = "......Sim, eu também sei disso."
34020-148 = "A Hifumi-san... A Hanako-san, a Koharu-san, a Azusa-san..."
34020-149 = "O pessoal do Clube de Reposição já assumiu um fardo muito maior do que deveriam..."
34020-150 = "Acredito que eu também fui a causa de algumas das coisas que elas tiveram de carregar..."
34020-151 = "Sobre isso, também tenho minha cota de responsabilidade e arrependimento..."
34020-152 = "É por isso que estou tentando garantir que elas não se envolvam em assuntos como este desde o Tratado do Éden..."
34020-153 = "Uma briga feia dessas deve ser restrita apenas a nós... Nunca devemos submeter essas garotas a esse tipo de experiência..."
34020-154 = "[s] \"Nagisa...\""
34020-155 = "......É verdade, Nagisa-sama. Perdoe a minha insolência."
34020-156 = "......Concordo."
34020-157 = "Eu também adoraria passar meu papel para a Hanako-san se pudesse, mas..."
34020-158 = "O meu contrato com ela terminou... e sinto que não devo colocar mais peso sobre os ombros dela."
34020-159 = "Resolver os problemas restantes sozinhas... isso é o mínimo de cortesia que podemos ter."
34020-160 = "Mas, eu acredito que o Sensei permanecerá conosco até o fim."
34020-161 = "[s] \"Sim, com certeza.\""
34020-162 = "......Muito obrigada, Sensei."
34020-164 = "As catacumbas são um labirinto gigante cujo mapa completo sequer foi descoberto... Procurar por uma entrada que muda toda hora é, sem dúvida, um problema e tanto."
34020-165 = "Vamos pensar diferente... E se a gente perguntar para alguém que conhece as rotas?"
34020-166 = "Alguém que conhece as rotas...?"
34020-169 = "A líder do 'Esquadrão Arius' que liderou o ataque, Saori Joumae. Ela certamente deve conhecer as rotas."
34020-170 = "......Entendo. Já que foi ela quem comandou a operação..."
34020-171 = "Mas, não sabemos o paradeiro do 'Esquadrão'... É bem provável que já tenham fugido para o distrito autônomo."
34020-172 = "Não há mais ninguém além do 'Esquadrão' que também conheça as rotas?"
34020-173 = "......"
34020-174 = "Err...? A quem você está se referindo...?"
34020-179 = "Mika Misono."
34020-180 = "......!?"
34020-182 = "I-Isso não... a própria Mika-san disse que não sabia a localização do distrito autônomo de Arius..."
34020-183 = "......Ela esteve se comunicando com a Arius secretamente por um bom tempo. E mesmo assim você acredita que ela não sabe a localização deles?"
34020-184 = "......"
34020-185 = "......Temos registros de que a Mika-sama entregou suprimentos aos alunos da Arius."
34020-186 = "Para instigar um golpe de estado e obter o apoio da Arius... Seria natural pensar assim."
34020-187 = "Mas... a Mika-san..."
34020-188 = "A reputação e as ações da Mika-sama até o momento não são exatamente um bom exemplo."
34020-189 = "Acho que a Nagisa-sama sabe muito bem... A Mika-sama tem usado sua posição na Tea Party como um escudo para encobrir muitas falhas e problemas."
34020-190 = "A acusação e a confusão ocorrendo atualmente na academia contra a Mika-sama... Essa opinião pública também não pode ser considerada irrelevante ao comportamento passado dela."
34020-191 = "[s] (...Confusão?)"
34020-192 = "Quer dizer que a Mika-san... mentiu...?#nEscondendo o distrito autônomo da Arius... O que diabos ela..."
34020-193 = "......"
34020-194 = "Eu entendo muito bem os seus sentimentos pela Mika-sama, Nagisa-sama."
34020-195 = "Dito isso, e desculpe a indelicadeza――se fôssemos discutir quem entende melhor a Mika-sama, não seria você, Nagisa-sama, a amiga de infância dela?"
34020-196 = "......"
34020-201 = "No seu ponto de vista, Nagisa-sama, você não acha que a Mika-sama ainda está escondendo algo de nós?"
34020-205 = "Isso é..."
34020-206 = "[s] (Nagisa...)"
34020-210 = "......Não, eu confio na Mika-san."
34020-211 = "......"
34020-212 = "......"
34020-213 = "É verdade que... a Mika-san não é lá uma estudante muito exemplar..."
34020-214 = "Mesmo assim, eu acredito nela――essa é a lição que eu aprendi desta vez."
34020-215 = "Para garantir que os outros também acreditem nela, vou comparecer à audiência amanhã e defenderei a Mika-san."
34020-216 = "A vocês, e se for necessário, até mesmo a toda esta academia... farei com que confiem no depoimento da Mika-san!"
34020-217 = "Mesmo que eu seja condenada por isso... eu..."
34020-218 = "......Não, eu apenas levantei uma hipótese, não tive nenhuma outra intenção com isso. Peço perdão por ter causado um mal-entendido, Nagisa-sama."
34020-219 = "......Com licença. Peço desculpas pela minha falta de educação."
34020-220 = "[s] \"Err... quer dizer...\""
34020-221 = "......Haa."
34020-222 = "Pois bem... Já está tarde, acho que já é hora de encerrarmos."
34020-223 = "Obrigada por tirarem um tempo em meio a toda essa correria de hoje."
34020-224 = "......Não foi nada. Foi bom me encontrar com vocês. Obrigada."
34020-225 = "E eu também estou profundamente desapontada com essa situação... em relação às acusações contra a Mika-sama."
34020-226 = "Vou tentar encontrar um meio à minha maneira. Até logo."
34020-227 = "Sim――Sendo assim, eu também vou voltar para a Catedral."
34020-228 = "Sim, tome cuidado no caminho."
34020-233 = "Haa..."
34020-234 = "......Meu estômago está doendo."
34020-235 = "[s] \"Bom trabalho.\""
34020-236 = "......Obrigada, Sensei. Sinto que estou sempre mostrando a você a minha pior versão..."
34020-237 = "[s5] \"Sobre agora a pouco... aconteceu alguma coisa com a Mika?\"\n[s6] \"Vocês estavam falando algo...\""
34020-238 = "......Ah. Então isso ainda não havia chegado aos seus ouvidos, Sensei."
34020-239 = "......Ah. Então isso ainda não havia chegado aos seus ouvidos, Sensei."
34020-240 = "Há uma audiência para a Mika-san agendada para amanhã de manhã."
34020-241 = "[s] \"Uma audiência?\""
34020-242 = "Sim. E embora seja chamada de audiência, será mais parecido com um interrogatório sobre os eventos do outro dia... Pense nisso como um tribunal disciplinar."
34020-243 = "Eles vão debater os crimes cometidos pela Mika-san até agora... focando principalmente nas questões do Tratado do Éden..."
34020-247 = "......Sensei."
34020-251 = "Acho que a Mika-san... provavelmente, será expulsa."
34020-253 = "Próximo Episódio; A Princesa na Gaiola"