[translation]
10046025-3 = "イチカちゃん……。#n君は、親しき仲にも礼儀ありという言葉を知らんのか？"
10046025-4 = "そんな仲になった覚えはないっすよ！"
10046025-5 = "ツレないねぇ～せっかく似た者同士だというのに。"
10046025-6 = "誰がっすか！！もう逃がさないっすよ！！"
10046025-7 = "ハハッ！威勢が良いじゃないか！"
10046025-12 = "…………。"
10046025-16 = "あ、すみません。目の前の光景が信じられなくて……。"
10046025-17 = "あれほど感情を露わにするイチカは、初めて見ました。"
10046025-18 = "よほど因縁でもあるのでしょうか？"
10046025-19 = "[s1] \"話すと長くなるけど……。\"\n[s2] \"あはは……色々あったね……。\""
10046025-24 = "そう、なのですね……？"
10046025-30 = "うーーん！やはり正面突破はまだ無理があったな！#n全員――撤収！"
10046025-38 = "逃がすかーっ！ハスミ先輩！私に追わせてほしいっす！"
10046025-42 = "初めての合同作戦を思い出しますね。#nいいでしょう。撃ち漏らしは私が対応します。"
10046025-47 = "二人ともストーップ！！"
10046025-51 = "……ミカ様？"
10046025-57 = "ごめんね。温泉開発部を追うのは、もうやめてもらっていいかな。"
10046025-58 = "それでは、結局……！"
10046025-59 = "うん、分かってるよ。"
10046025-60 = "でも、もうすぐナギちゃんたちが到着する時間なの。"
10046025-64 = "今回の目的は、ナギちゃんにゆっくり休んでもらうこと。"
10046025-65 = "戦ってるところとか、その痕跡とかをナギちゃんが見たら……。#nきっと不安がっちゃう。"
10046025-66 = "だから、あの子たちのことは後回し。"
10046025-67 = "今考えないといけないのは――"
10046025-72 = "騒ぎを起こさないこと……ナギちゃんに心配をかけないこと……。"
10046025-73 = "……。"
10046025-74 = "二人にも、先生にも迷惑をかけると思う。#nでも……そうさせてほしいんだ。"
10046025-75 = "[s3] \"ミカは偉いね。\"\n[s4] \"私も全力で手伝うよ。\""
10046025-82 = "……私たちこそ、申し訳ございません。#n目先に囚われ、大事を見落とすところでした。"
10046025-83 = "今回のバカンスは、ナギサ様に休んでいただくためのもの……。"
10046025-84 = "もっと先にやるべきことがあるっすよね。面目ないっす。"
10046025-88 = "証拠隠滅は手早く。もう時間がありません。"
10046025-96 = "……凄まじい量ですね。"
10046025-97 = "これだけあれば、建物の一つや二つ、簡単に建てられるでしょう……。#nここで一体何を企んでいたのでしょうか？"
10046025-98 = "温泉建設っすね。たぶん。"
10046025-99 = "……温泉開発部の悪名は伊達ではないと。"
10046025-100 = "とはいえ、これだけ押収しておけば、しばらくは静かになるでしょう。"
10046025-101 = "活動が数日止まるだけで、十分なのですから。"
10046025-102 = "あはは……うん、そうだといいね。"
10046025-103 = "このバカンスさえ無事に終われば――"
10046025-104 = "あとは、どうなってもいいから。"
10046025-108 = "ミカ様？"
10046025-112 = "ううん、なんでもない。"
10046025-113 = "ありがとね☆"
10046025-115 = "い、いえ！当然のことをしたまでっす！"
10046025-117 = "ええ、イチカの言う通りです。#nこれが私たちの仕事ですから。"
10046025-118 = "それでも、お礼を言いたかったんだ。"
10046025-119 = "……えへへっ。"
10046025-121 = "ミカ様……？？"
10046025-122 = "[s5] \"……ミカ？\"\n[s6] \"何か思いついたの……？\""
10046025-127 = "あ、ううん。ただ……。"
10046025-128 = "なんというか……今回はうまくいきそうな気がして！"
10046025-129 = "……うん！"
10046025-130 = "きっと大丈夫！"
