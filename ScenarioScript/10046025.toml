[translation]
10046025-3 = "Ichika-chan... Você não conhece o ditado de que a cortesia deve existir mesmo entre amigos?#n"
10046025-4 = "Eu não me lembro de termos esse tipo de amizade!"
10046025-5 = "Que frieza... E pensar que somos tão parecidas."
10046025-6 = "Quem é parecida com você?! Eu não vou deixar você escapar!"
10046025-7 = "Haha! Que espírito animado!"
10046025-12 = "…………"
10046025-16 = "Ah, perdão. É que eu não consigo acreditar no que estou vendo..."
10046025-17 = "É a primeira vez que vejo a Ichika demonstrar emoções tão abertamente."
10046025-18 = "Será que elas têm alguma rixa antiga?"
10046025-19 = "[s1] \"É uma longa história...\"\n[s2] \"Ahaha... Muita coisa aconteceu...\""
10046025-24 = "É mesmo, é...?"
10046025-30 = "Ugh! Como eu pensei, um ataque frontal ainda é impossível!#nPessoal, recuar!"
10046025-38 = "Não vai escapar! Hasumi-senpai! Deixe-me persegui-las!"
10046025-42 = "Isso me lembra da nossa primeira operação conjunta.#nTudo bem. Eu cuido de quem escapar."
10046025-47 = "Parem as duas!!"
10046025-51 = "……Mika-sama?"
10046025-57 = "Desculpem. Podem parar de perseguir o Departamento de Desenvolvimento de Fontes Termais?"
10046025-58 = "Mas, no fim das contas...!"
10046025-59 = "Sim, eu sei."
10046025-60 = "Mas está quase na hora da Nagi-chan chegar."
10046025-64 = "O objetivo desta vez é fazer com que a Nagi-chan descanse tranquilamente."
10046025-65 = "Se a Nagi-chan vir uma luta ou os vestígios dela...#nCom certeza ela vai ficar preocupada."
10046025-66 = "Por isso, vamos deixar aquelas garotas para depois."
10046025-67 = "O que precisamos pensar agora é..."
10046025-72 = "Não causar confusão... e não preocupar a Nagi-chan..."
10046025-73 = "……"
10046025-74 = "Eu sei que isso vai causar problemas para vocês duas e para o Sensei.#nMas... eu preciso que façam isso por mim."
10046025-75 = "[s3] \"A Mika é muito atenciosa.\"\n[s4] \"Eu também vou ajudar com tudo o que puder.\""
10046025-82 = "……Nós é que pedimos desculpas.#nFicamos presas no momento e quase perdemos de vista o que era mais importante."
10046025-83 = "Estas férias são para que a Nagisa-sama possa descansar..."
10046025-84 = "Temos coisas mais importantes a fazer, não é? Que vergonha."
10046025-88 = "Apaguem as evidências rapidamente. Não temos mais tempo."
10046025-96 = "……É uma quantidade impressionante."
10046025-97 = "Com tudo isso, daria para construir um ou dois prédios facilmente...#nO que será que elas estavam planejando aqui?"
10046025-98 = "Construir uma fonte termal, provavelmente."
10046025-99 = "……Então a má fama do Departamento de Desenvolvimento de Fontes Termais não é exagero."
10046025-100 = "De qualquer forma, se confiscarmos tudo isso, elas ficarão quietas por um tempo."
10046025-101 = "Já que alguns dias de inatividade são o suficiente."
10046025-102 = "Ahaha... Sim, espero que sim."
10046025-103 = "Desde que estas férias terminem em paz..."
10046025-104 = "O resto não importa."
10046025-108 = "Mika-sama?"
10046025-112 = "Não, não é nada."
10046025-113 = "Obrigada☆"
10046025-115 = "N-não há de quê! Fiz apenas o meu trabalho!"
10046025-117 = "Sim, como a Ichika disse.#nEste é o nosso trabalho."
10046025-118 = "Mesmo assim, eu queria agradecer."
10046025-119 = "……Ehehe."
10046025-121 = "Mika-sama...??"
10046025-122 = "[s5] \"……Mika?\"\n[s6] \"Você teve alguma ideia...?\""
10046025-127 = "Ah, não, nada. É só que..."
10046025-128 = "Como posso dizer... sinto que desta vez vai dar tudo certo!"
10046025-129 = "……Sim!"
10046025-130 = "Vai ficar tudo bem!"
