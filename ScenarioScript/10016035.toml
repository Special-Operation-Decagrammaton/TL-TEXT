[translation]
10016035-2 = "（観戦のため、席に座っていたところ……）"
10016035-7 = "あ、先生。ここにいらっしゃったのですね。"
10016035-8 = "ふふ、昨日は夜遅くまでお疲れ様でした。#n少しは眠れましたか？"
10016035-9 = "[s1] \"うん、みんなのおかげでちゃんと休めたよ。\"\n[s2] \"ノアも休めた？\""
10016035-10 = "はい、私も開会式が始まる前に少し仮眠をとりました。"
10016035-11 = "はい、私も開会式が始まる前に少し仮眠をとりました。"
10016035-12 = "その間に、知らないところで何かあったような気もしますが……"
10016035-13 = "皆さん……楽しそうで良かった。"
10016035-14 = "[s] \"頑張って準備した甲斐があったね。\""
10016035-15 = "はい、本当に。#nさて、次の種目は……"
10016035-16 = "あら、「借り物競争」ですね。"
10016035-17 = "そろそろ出かける準備をしなければ……。"
10016035-18 = "[s] \"「借り物競争」に出るの？\""
10016035-19 = "はい、選手ではなく審判ですが……。"
10016035-20 = "選手は、ゲーム開発部の[ruby=はなおか]花岡[/ruby]さんが出る予定だったのですが……ユウカちゃん本人の強い要望で、彼女が出ることになりました。"
10016035-21 = "ふふ……「借り物競争」は開催毎に伝説を生む人気の競技なんですよ。"
10016035-22 = "実行委員でさえも何を借りてくる事になるかは分からないハラハラ感……#n「好きな人」と書かれたメモが毎回必ず入っているのも見どころです。"
10016035-23 = "……果たして、ユウカちゃんが何を借りてくる事になるか、楽しみですね。"
10016035-24 = "それでは、先生。#n引き続き晄輪大祭を楽しんでくださいね。"
10016035-26 = "クロノスチャンネルをご視聴の皆さん、お待たせしました！"
10016035-27 = "さあ、ついに晄輪大祭名物「借り物競争」が幕を開けます！"
10016035-28 = "観客席も盛り上がっていますねー！"
10016035-29 = "ルールは単純明快！トラック上にある箱からメモを取り出し、そこに書かれたキーワードに合致するものと共にゴールするだけ！"
10016035-30 = "ただし、キーワードは審判に見せるまで秘匿しなければならないそうです！"
10016035-31 = "さあ、選手の入場が開始しました！"
10016035-40 = "（借り物競争をユズが交代してくれてよかった……）"
10016035-41 = "（ユズ、知らない人に話しかけるのは苦手だから……）"
10016035-42 = "（ミレニアムの総合優勝のためにも……この試合、絶対に負けられない！）"
10016035-46 = "（審判の生徒……たしか、前に見たセミナーの役員だよな？）"
10016035-47 = "（一つの試合に主催校の生徒会役員が選手と審判で出場するとは……#n　やはり怪しいな、ミレニアム……）"
10016035-48 = "（まぁいい。何を画策していようが、フィジカルで優勝すればいいだけだ！）"
10016035-52 = "（前回の大会結果の分析でメモのパターンはすべて把握しました）"
10016035-53 = "（この試合も勝って、ゲヘナの総合優勝を確定させてみせます！）"
10016035-57 = "さあ、それでは皆さん、位置について……"
10016035-58 = "よーい、ドン！"
10016035-59 = "さあ始まりました「借り物競争」！#n各選手、一斉に箱に向かっていきます！"
10016035-60 = "最初に到達したのは……"
10016035-61 = "SRT特殊学園の[ruby=そらい]空井[/ruby]サキ選手！"
10016035-62 = "SRT特殊学園は皆様御存知の通り廃校になった学園ですが、#nシャーレの協力によって大運動会に限り学園としての参加が許されています。"
10016035-63 = "果たしてサキ選手はこの試合でSRT特殊学園の初勝利を手に入れることができるのでしょうか？"
10016035-65 = "さて、一体なにが出るのやら……"
10016035-66 = "……4.2インチ白リン弾？#nこんなもの、いったい競技場のどこで手に入れるんだ！？"
10016035-67 = "ブ～！空井サキ選手、失格です！"
10016035-68 = "し、失格だと！？"
10016035-69 = "試合開始前に申し上げた通り、メモの内容を周囲に知られたら失格です。"
10016035-70 = "メモの中身が分かってしまったら面白くな――"
10016035-71 = "こほん。いえ、周囲の手助けが容易になってしまいますから。"
10016035-72 = "残念ですが……空井サキ選手は失格。SRT特殊学園はランキング外となります。"
10016035-77 = "サキ、あんた何してるのよ！"
10016035-78 = "やっぱり4人しかいない私たちじゃ……最初から無理だったんだ……"
10016035-79 = "お疲れ様でした、サキ。"
10016035-80 = "まだ試合はありますから大丈夫です。#n次で1位を狙いましょう。"
10016035-81 = "うっ……"
10016035-82 = "だ、だが、失格にならなくても1位は難しかったんじゃないのか？"
10016035-83 = "白リン弾を持っている人なんて競技場に――"
10016035-84 = "私、持ってるよ？"
10016035-85 = "なんで持ってるんだ……？"
10016035-89 = "サキ選手の失格によって状況は一気に読めなくなってまいりました！"
10016035-90 = "続いて箱に近づいたのは――ミレニアムの[ruby=はやせ]早瀬[/ruby]ユウカ選手！"
10016035-94 = "はぁ、はぁ……えっと、お題は……"
10016035-95 = "うーん……この人、じゃないし……"
10016035-96 = "こっちでもないし……#nえーっと……"
10016035-100 = "あっ、いた！"
10016035-107 = "先生、ちょっと一緒に来てください！"
10016035-108 = "[s] \"わ、私！？\""
10016035-109 = "ええ！#n時間がありません、急ぎますよ！"
10016035-114 = "ユウカ選手、メモを確認するやいなや、シャーレの先生を連れて疾走！"
10016035-115 = "現在の順位は1位！果たしてメモの中身は一体なんだったのでしょうか！？#n何故シャーレの先生を選んだのか！"
10016035-116 = "ユウカ選手独走を続け……そのままゴールラインを通過！暫定1位です！"
10016035-117 = "ですが、まだ審判のお題確認が残っております！"
10016035-121 = "へぇ……"
10016035-122 = "ユウカちゃんは、[USERNAME]先生の事をそう思っていたんですね……ふふっ。"
10016035-123 = "な、なによ！？お題は主観的なものじゃない。#n焦らさないで早く判定して！"
10016035-124 = "ふふっ……はい、お題内容は問題ありませんよ。#n早瀬ユウカ選手、1位です。"
10016035-125 = "やった！"
10016035-129 = "たしか……借りてくるものの中に「好きな人」ってあったよね？"
10016035-130 = "毎度、好きな人を連れて行ってカップル成立する選手が必ず一組は出るよね。"
10016035-131 = "他の選手のお題は「好きな人」じゃなさそうだし……"
10016035-132 = "ユウカさん、メモを見るやいなや先生のところに真っ直ぐ向かっていったよね……#nま、まさか……"
10016035-133 = "ちょ、ちょっと待って！なんか誤解されてない！？"
10016035-134 = "私のお題は「好きな人」じゃなくて――"
10016035-135 = "あっ、ダメですよユウカちゃん。お題を言うのはルール違反です。"
10016035-136 = "選手のお題を推測するところまでが「借り物競争」の観戦ポイントですからね。"
10016035-137 = "ゴールした後は言ってもいいんじゃなかったっけ？"
10016035-138 = "それに、[ruby=身内]ミレニアム生[/ruby]への誤解くらい解いたって……"
10016035-139 = "ダメです。「[ruby=こうりんたいさい]晄輪大祭[/ruby]」に例外はありません。"
10016035-140 = "結果的にユウカちゃんが恥ずかしい思いをしたとしても、ダメなものはダメです。"
10016035-141 = "だから好きな人じゃないって何回言えば――"
10016035-142 = "[s] \"好きな人じゃなかったんだ……。\""
10016035-143 = "えっえぇ！？"
10016035-144 = "い、いえ！その……先生のことが好きじゃないという意味ではなくて……"
10016035-145 = "あ……そ、そうじゃなくて！"
10016035-146 = "……今の、聞いた？"
10016035-147 = "すごい瞬間……見ちゃったね……"
10016035-148 = "ミレニアム生って大胆……。"
10016035-149 = "だから誤解だってば！"
10016035-151 = "（その後、しどろもどろのユウカを宥めるのに苦労した）"
