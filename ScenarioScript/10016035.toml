[translation]
10016035-2 = "(Estava sentado no meu lugar para assistir à competição, quando...)"
10016035-7 = "Ah, Sensei. Você veio para cá."
10016035-8 = "Fufu, obrigado pelo seu trabalho duro até tarde ontem. #nConseguiu dormir um pouco?"
10016035-9 = "[s1] \"Sim, graças a todos, consegui descansar bem.\"\n[s2] \"Você também descansou, Noa?\""
10016035-10 = "Sim, eu também tirei um cochilo antes da cerimônia de abertura começar."
10016035-11 = "Sim, eu também tirei um cochilo antes da cerimônia de abertura começar."
10016035-12 = "Sinto que algo aconteceu em algum lugar enquanto eu dormia, mas..."
10016035-13 = "Todos... parecem estar se divertindo, fico feliz."
10016035-14 = "[s] \"Valerá a pena todo o esforço que fizemos na preparação.\""
10016035-15 = "Sim, com certeza. #nBem, a próxima modalidade é..."
10016035-16 = "Ah, é a \"Corrida de Objetos\"."
10016035-17 = "Já está na hora de eu me preparar para sair..."
10016035-18 = "[s] \"Você vai participar da 'Corrida de Objetos'?\""
10016035-19 = "Sim, não como competidora, mas como juíza..."
10016035-20 = "A competidora seria a Hanaoka-san, do Departamento de Desenvolvimento de Jogos, mas... por um pedido forte da própria Yuuka-chan, ela acabou assumindo o lugar."
10016035-21 = "Fufu... a \"Corrida de Objetos\" é uma modalidade popular que cria lendas a cada edição."
10016035-22 = "A tensão de não saber o que terá que buscar, mesmo sendo parte do comitê executivo... #nO fato de sempre ter um bilhete escrito \"pessoa amada\" também é um dos pontos altos."
10016035-23 = "...Estou ansiosa para ver o que a Yuuka-chan terá que buscar."
10016035-24 = "Então, Sensei. #nContinue aproveitando o Festival Esportivo de Halo."
10016035-26 = "Espectadores do Canal Chronos, obrigado por esperarem!"
10016035-27 = "Bem, finalmente a famosa \"Corrida de Objetos\" do Festival Esportivo de Halo vai começar!"
10016035-28 = "As arquibancadas estão super animadas!"
10016035-29 = "As regras são simples e claras! Pegue um bilhete da caixa na pista e chegue à linha de chegada junto com o que estiver escrito nele!"
10016035-30 = "Porém, o conteúdo do bilhete deve ser mantido em segredo até ser mostrado ao juiz!"
10016035-31 = "Certo, a entrada dos competidores começou!"
10016035-40 = "(Ainda bem que a Yuzu trocou de lugar comigo na Corrida de Objetos...)"
10016035-41 = "(A Yuzu não é boa em falar com estranhos, afinal...)"
10016035-42 = "(Pela vitória geral do Millennium... eu não posso perder esta prova de jeito nenhum!)"
10016035-46 = "(Aquela aluna juíza... acho que já a vi antes como oficial do Seminário?)"
10016035-47 = "(Ter uma oficial do conselho estudantil da escola anfitriã participando como competidora e juíza na mesma prova... #nComo esperado, o Millennium é suspeito...)"
10016035-48 = "(Bem, não importa. Não importa o que estejam planejando, só preciso vencer pelo esforço físico!)"
10016035-52 = "(Analisei todos os padrões de bilhetes com base nos resultados da última competição.)"
10016035-53 = "(Vou vencer esta prova também e garantir a vitória geral de Gehenna!)"
10016035-57 = "Muito bem, todos, em suas posições..."
10016035-58 = "Preparar, já!"
10016035-59 = "Começou a \"Corrida de Objetos\"! #nTodos os competidores correm em direção às caixas!"
10016035-60 = "A primeira a chegar foi..."
10016035-61 = "A competidora Saki Sorai, da Academia Especial SRT!"
10016035-62 = "Como todos sabem, a Academia Especial SRT é uma escola que foi fechada, mas #ngraças à cooperação do Schale, a participação como escola foi permitida apenas para este festival."
10016035-63 = "Será que a competidora Saki conseguirá a primeira vitória da Academia Especial SRT nesta prova?"
10016035-65 = "Bem, vamos ver o que saiu..."
10016035-66 = "...4.2 polegadas de munição de fósforo branco? #nOnde diabos eu vou conseguir algo assim no estádio!?"
10016035-67 = "Bzz! Competidora Saki Sorai, desclassificada!"
10016035-68 = "D-desclassificada!?"
10016035-69 = "Como eu disse antes do início da prova, se o conteúdo do bilhete for revelado aos outros, você é desclassificada."
10016035-70 = "Se o conteúdo do bilhete for revelado, perde a graça—"
10016035-71 = "Cof, cof. Digo, porque fica fácil demais receber ajuda dos outros."
10016035-72 = "Sinto muito, mas... a competidora Saki Sorai está desclassificada. A Academia Especial SRT está fora do ranking."
10016035-77 = "Saki, o que você está fazendo!?"
10016035-78 = "Como esperado, só nós quatro... era impossível desde o começo..."
10016035-79 = "Bom trabalho, Saki."
10016035-80 = "Ainda temos outras provas, então está tudo bem.#nVamos mirar no 1º lugar na próxima."
10016035-81 = "Ugh..."
10016035-82 = "M-mas, mesmo que você não tivesse sido desclassificada, o 1º lugar não seria difícil?"
10016035-83 = "Quem é que traz munição de fósforo branco para um estádio—"
10016035-84 = "Eu trouxe, por quê?"
10016035-85 = "Por que você trouxe isso...?"
10016035-89 = "Com a desclassificação da competidora Saki, a situação ficou totalmente imprevisível!"
10016035-90 = "A próxima a se aproximar da caixa é... a competidora Hayase Yuuka, do Millennium!"
10016035-94 = "Haa, haa... bem, o tema é..."
10016035-95 = "Hmm... não é essa pessoa..."
10016035-96 = "Também não é essa...#nEhh..."
10016035-100 = "Ah, achei!"
10016035-107 = "Sensei, venha comigo por um instante!"
10016035-108 = "[s] \"E-eu!?\""
10016035-109 = "Sim!#nNão temos tempo, vamos logo!"
10016035-114 = "A competidora Yuuka, assim que conferiu o bilhete, saiu correndo levando o Sensei do Schale!"
10016035-115 = "Ela está em 1º lugar no momento! O que será que estava escrito no bilhete!?#nPor que ela escolheu o Sensei do Schale!"
10016035-116 = "A competidora Yuuka continua isolada na frente... e cruza a linha de chegada! É o 1º lugar provisório!"
10016035-117 = "Mas ainda falta a confirmação do tema pelo juiz!"
10016035-121 = "Heh..."
10016035-122 = "Então a Yuuka-chan pensava isso sobre o Sensei [USERNAME]... fufu."
10016035-123 = "O-o que foi!? O tema não é algo subjetivo. #nNão me provoque e julgue logo!"
10016035-124 = "Fufu... sim, o conteúdo do tema está correto.#nCompetidora Hayase Yuuka, 1º lugar."
10016035-125 = "Consegui!"
10016035-129 = "Se não me engano... um dos itens para pegar emprestado era \"pessoa amada\", não era?"
10016035-130 = "Sempre tem um casal que se forma quando alguém traz a pessoa amada."
10016035-131 = "O tema das outras competidoras não parece ser \"pessoa amada\"..."
10016035-132 = "A Yuuka-san foi direto até o Sensei assim que viu o bilhete...#nN-não pode ser..."
10016035-133 = "E-espera um pouco! Vocês não estão entendendo tudo errado!?"
10016035-134 = "O meu tema não era \"pessoa amada\", e sim—"
10016035-135 = "Ah, não pode, Yuuka-chan. Revelar o tema é contra as regras."
10016035-136 = "Tentar adivinhar o tema dos competidores é parte da diversão de assistir à \"Corrida de Objetos Emprestados\"."
10016035-137 = "Mas não podia falar depois de cruzar a linha de chegada?"
10016035-138 = "Além disso, eu só queria desfazer esse mal-entendido com as alunas do Millennium..."
10016035-139 = "Não pode. Não existem exceções no \"Festival Esportivo Kourin\". "
10016035-140 = "Mesmo que a Yuuka-chan passe por um momento embaraçoso, regras são regras."
10016035-141 = "Eu já disse várias vezes que não é \"pessoa amada\"—"
10016035-142 = "[s] \"Então não era \"pessoa amada\"...\""
10016035-143 = "E-ehhh!?"
10016035-144 = "N-não! Quer dizer... não é que eu não goste do Sensei..."
10016035-145 = "Ah... n-não é isso!"
10016035-146 = "...Você ouviu isso?"
10016035-147 = "Que momento incrível... acabamos de ver..."
10016035-148 = "As alunas do Millennium são bem ousadas..."
10016035-149 = "Eu disse que é um mal-entendido!"
10016035-151 = "(Depois disso, tive muito trabalho para acalmar a Yuuka, que estava toda atrapalhada.)"
