[translation]
1600006-1 = "間違った推測"
1600006-3 = "（息を切らしながら、ハルカがいるであろう森の奥へと走った）"
1600006-4 = "（思ったより深い森で、途中から道らしい道もほとんど無くなり、私も迷子同然になってしまった）"
1600006-6 = "（……もうどれくらい走っただろう）"
1600006-9 = "（不意に足がもつれ、倒れこんで近くの木にもたれかかってしまい、そのまま瞼が……）"
1600006-10 = "（……）"
1600006-12 = "……ぃ。"
1600006-13 = "[s] \"……？\""
1600006-14 = "……せい！"
1600006-15 = "……先生！目を覚ましてください、先生！！"
1600006-16 = "先生っ！！！"
1600006-18 = "先生、大丈夫ですか！？先生！"
1600006-19 = "あ……気が付かれ、ましたか……良かったです……。"
1600006-20 = "[s] \"……ハルカ？\""
1600006-21 = "あ、は、はい。ハルカです……。"
1600006-22 = "……はっ！"
1600006-23 = "す、すすすすすみません！これは、その……！"
1600006-24 = "その、緊急事態だと思ったとはいえ、その、私なんかが先生の身体に触れるだなんて……！"
1600006-25 = "え、だ、大丈夫、ですか……？え、ら、楽だからこのままで……？"
1600006-26 = "で、ですがその……！うぅ……！"
1600006-27 = "あっ、い、いえ！その、決して嫌というわけではなく、その……！！"
1600006-28 = "……あ。"
1600006-29 = "なんだか、少し顔色が……良かったです。楽になりましたか……？"
1600006-30 = "[s1] \"うん、ハルカの顔を見られて安心したからかな。\"\n[s2] \"こうして膝枕してもらえるなんて、むしろ役得だったかも。\""
1600006-31 = "……？"
1600006-32 = "……？"
1600006-33 = "！！？！？！？＆％＄！＄！＠％！？！！！？！？！？！？？！"
1600006-37 = "すみませんすみませんすみませんすみませんすみませんすみません！！その、ほんと、私なんかが……っ！！"
1600006-38 = "ほ、本当にこのままで、大丈夫ですか……？で、ですが、その……。"
1600006-39 = "……はい。そ、そういえば、どうして先生はこんな、薄暗くて汚い場所に……？"
1600006-40 = "み、見ての通り、わ、私以外は特に来ないような、特に面白くない場所ですし……。"
1600006-41 = "……え？あ、わ、私……ですか？"
1600006-42 = "私は、えっと、その……。"
1600006-43 = "今育てている雑草のために、土を探しに……。"
1600006-44 = "た、たまに来るんです。ここは結構その、良い感じの土が多くて……。"
1600006-45 = "[s3] \"なるほどね。\"\n[s4] \"ごめんね、早とちりしてた。\""
1600006-46 = "え、っと……？そ、それは、どういう……？"
1600006-47 = "え、っと……？そ、それは、どういう……？"
1600006-48 = "も、もしかして、先生は偶然ではなく、その……。"
1600006-49 = "ま、まさか私のためにここに……！？こんな遠いところに、わざわざ私なんかのために……！？ど、どうしてですか……！？"
1600006-50 = "[s] \"……えっと。\""
1600006-51 = "（モモトークを見て考えたことを、できるだけオブラートに包んで説明してみた）"
1600006-52 = "……。"
1600006-53 = "（頑張ったのだけれど、察しが良いハルカの目が徐々に泳ぎ始める）"
1600006-54 = "……。"
1600006-55 = "……す、"
1600006-56 = "[s] \"えっと、ハルカ……？だ、大丈――\""
1600006-57 = "すみませんすみませんすみませんすみませんすみませんすみませんすみませんすみませんすみませんすみませんすみませんすみませんすみませんすみません……！"
1600006-61 = "すみませんすみませんすみませんすみません、まさか、まさか軽い気持ちで送ったメッセージが、そういう風に聞こえてしまっただなんて……！"
1600006-62 = "すみませんすみません、言い訳をしてすみません、ご迷惑をおかけしてすみません、私はもう何をどうすれば……！！"
1600006-63 = "……え？な、何もしなくて良い、ですか……？で、ですが、こんなに盛大にご迷惑をおかけしてしまって私はもう……！"
1600006-64 = "……？"
1600006-65 = "普段からお散歩で、これくらい歩くから大丈夫……ですか？そ、そうなんですか……？で、ですが、先生は倒れていらっしゃいましたし……。"
1600006-66 = "あああああいえそのっ！違うんですすみません！その、決して口答えをしようとしたわけではなく……！"
1600006-67 = "[s5] ふと、ハルカの手に視線が吸い寄せられた。\n[s6] \"それは、今日連れて帰る雑草？\""
1600006-68 = "……え？あ、こ、これですか……？"
1600006-69 = "……え？あ、こ、これですか……？"
1600006-70 = "こ、これはその、土、です……先ほどその辺りで掘ったもので……。"
1600006-71 = "雑草は、ここでは手に入らないんです……ここで生きている草たちは、あ、あくまで私としては、ですが……その、「雑草」では、ないので……。"
1600006-72 = "私が育てている「雑草」は、その、もう少し寂しいと言いますか……歩道の端っこや、目立たない場所に生えてる子たちでして……。"
1600006-73 = "でも、そういう子たちにも、土が必要ですから……わ、私にできることであれば、その、少しでもと思い……。"
1600006-74 = "わ、私もその……いつも助けてもらってばかりで、使い物にならなくて……。"
1600006-75 = "だ、だからと言うわけではないのですが、その……代わりに、というのもおこがましいですが……何か、してあげたいなと……。"
1600006-76 = "[s7] \"ハルカは優しいね。\"\n[s8] \"その考え方、すごく偉いと思う。\""
1600006-77 = "そ、そんな……！いえ、そこまで立派なものではないのですが……！"
1600006-78 = "そ、そんな……！いえ、そこまで立派なものではないのですが……！"
1600006-79 = "あ、いえそのっ！せ、先生の話が間違ってると言いたいわけでもなく、えっと……！"
1600006-80 = "う、うぅ……。"
1600006-81 = "で、では……。"
1600006-82 = "……先生がそう仰るのでしたら、そう思うことに……い、いえ、そうなれるように頑張ります……！"
1600006-83 = "……は、はい？も、もうすでにそうなってる……？"
1600006-84 = "い、いえいえいえそんなことは……！あっ、その、これも決して口答えというわけではなく……！"
1600006-85 = "その……え、っと……ううぅ……っ！"
1600006-86 = "で、では……私なんかが、お、おこがましいとは、思いますが……先生が、そ、そう言ってくださるのでしたら……！"
1600006-87 = "そういうことに、させていただこうと、お、思います……！"
1600006-89 = "（その後、ハルカと一緒に土を持って帰った）"
1600006-90 = "（ハルカはやはり地形を把握していたため、帰り道は迷わず真っすぐに帰ることができた）"
1600006-94 = "（思ったより複雑な道では無かったので、何だかこっちも申し訳なくなって、ひたすら謝りたい気持ちになった）"
