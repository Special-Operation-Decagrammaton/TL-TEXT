[translation]
1600006-1 = "Suposição errada"
1600006-3 = "（Ofegante, corri para o fundo da floresta onde Haruka deveria estar）"
1600006-4 = "（A floresta era mais densa do que eu pensava, e no meio do caminho quase não havia mais trilhas, fazendo com que eu praticamente me perdesse）"
1600006-6 = "（...Quanto tempo será que eu já corri?）"
1600006-9 = "（De repente, tropecei, caí e me encostei em uma árvore próxima, e então minhas pálpebras...）"
1600006-10 = "（...）"
1600006-12 = "...se."
1600006-13 = "[s] \"...?\""
1600006-14 = "...sensei!"
1600006-15 = "...Sensei! Por favor, acorde, Sensei!!"
1600006-16 = "Sensei!!!"
1600006-18 = "Sensei, você está bem!? Sensei!"
1600006-19 = "Ah... você acordou... que bom..."
1600006-20 = "[s] \"...Haruka?\""
1600006-21 = "Ah, s-sim. Sou eu, Haruka..."
1600006-22 = "...Ah!"
1600006-23 = "D-d-d-desculpe! Isso é, bem...!"
1600006-24 = "É que, embora eu tenha pensado que fosse uma emergência, eu, alguém como eu, tocar no corpo do Sensei...!"
1600006-25 = "V-você está b-bem...? E-está confortável assim...?"
1600006-26 = "M-mas, bem...! Uuu...!"
1600006-27 = "Ah, n-não! É que, não é que eu não goste, é que...!!"
1600006-28 = "...Ah."
1600006-29 = "Parece que sua expressão melhorou um pouco... Que bom. Você se sente melhor...?"
1600006-30 = "[s1] \"Sim, acho que foi porque me senti aliviado ao ver o rosto da Haruka.\"\n[s2] \"Na verdade, ganhar um colo assim foi até uma vantagem inesperada.\""
1600006-31 = "...?"
1600006-32 = "...?"
1600006-33 = "!!?!?!?&%$!$!@%!?!!!?!?!?!!??"
1600006-37 = "Desculpe, desculpe, desculpe, desculpe, desculpe, desculpe!! É que, sério, alguém como eu...!!"
1600006-38 = "V-você tem certeza de que está tudo bem ficar assim...? M-mas, bem..."
1600006-39 = "...Sim. A propósito, por que o Sensei veio a um lugar tão escuro e sujo como este...?"
1600006-40 = "C-como pode ver, é um lugar sem graça onde ninguém além de mim costuma vir..."
1600006-41 = "...Eh? Ah, v-você... veio por mim?"
1600006-42 = "Eu, bem, é que..."
1600006-43 = "Eu vim procurar terra para as ervas daninhas que estou cultivando..."
1600006-44 = "E-eu venho aqui de vez em quando. Este lugar tem bastante terra boa..."
1600006-45 = "[s3] \"Entendo.\"\n[s4] \"Desculpe, eu tirei conclusões precipitadas.\""
1600006-46 = "Eh, bem...? O que isso significa...?"
1600006-47 = "Eh, bem...? O que isso significa...?"
1600006-48 = "S-será que o Sensei não veio por acaso, e sim..."
1600006-49 = "N-não me diga que veio aqui por minha causa...!? Em um lugar tão longe, se dando ao trabalho por alguém como eu...!? P-por que você faria isso...!?"
1600006-50 = "[s] \"...Bem.\""
1600006-51 = "（Tentei explicar o que pensei depois de ver o MomoTalk, usando as palavras mais suaves possíveis）"
1600006-52 = "..."
1600006-53 = "（Eu me esforcei, mas os olhos da Haruka, que é muito perspicaz, começam a desviar）"
1600006-54 = "..."
1600006-55 = "...D-des..."
1600006-56 = "[s] \"Ei, Haruka...? V-você está bem--\""
1600006-57 = "Desculpe, desculpe, desculpe, desculpe, desculpe, desculpe, desculpe, desculpe, desculpe, desculpe, desculpe, desculpe, desculpe, desculpe...!"
1600006-61 = "Desculpe, desculpe, desculpe, desculpe, eu nunca imaginei que a mensagem que enviei sem pensar pudesse ser interpretada dessa forma...!"
1600006-62 = "Desculpe, desculpe, desculpe por dar desculpas, desculpe por causar problemas, eu não sei mais o que fazer...!!"
1600006-63 = "……Eh? N-não preciso fazer nada……? M-mas, eu causei tantos problemas e de forma tão grandiosa, eu já não sei mais o que fazer……!"
1600006-64 = "……?"
1600006-65 = "Você costuma caminhar tanto assim nos seus passeios, então está tudo bem……? S-sério mesmo……? M-mas, o Sensei estava desmaiado……."
1600006-66 = "A-a-a-ah, não, isso não! Não é isso, me desculpe! Eu, de forma alguma, quis retrucar……!"
1600006-67 = "[s5] De repente, meu olhar foi atraído para as mãos da Haruka.\n[s6] \"Isso é uma erva daninha que você vai levar para casa hoje?\""
1600006-68 = "……Eh? Ah, i-isso……?"
1600006-69 = "……Eh? Ah, i-isso……?"
1600006-70 = "I-isso é, bem, terra…… Eu cavei ali perto agorinha mesmo……."
1600006-71 = "Não dá para encontrar ervas daninhas aqui…… As plantas que vivem aqui, b-bem, na minha opinião, pelo menos…… elas não são, tipo, \"ervas daninhas\"……."
1600006-72 = "As \"ervas daninhas\" que eu cultivo são, bem, um pouco mais solitárias, por assim dizer…… são aquelas que crescem nas beiradas das calçadas ou em lugares pouco visíveis……."
1600006-73 = "Mas, mesmo essas plantinhas precisam de terra…… E-então, se é algo que eu posso fazer, eu pensei que, pelo menos um pouco……."
1600006-74 = "E-eu também…… sempre recebo ajuda e não sirvo para nada……."
1600006-75 = "N-não que seja por isso, mas…… é presunçoso da minha parte dizer isso, mas…… eu queria fazer algo por você……."
1600006-76 = "[s7] \"Você é gentil, Haruka.\"\n[s8] \"Acho que esse seu jeito de pensar é muito admirável.\""
1600006-77 = "N-não diga isso……! Não, não é nada tão grandioso assim……!"
1600006-78 = "N-não diga isso……! Não, não é nada tão grandioso assim……!"
1600006-79 = "Ah, não, isso! E-eu não estou querendo dizer que o que o Sensei disse está errado, é que……!"
1600006-80 = "U-uu……."
1600006-81 = "E-então……."
1600006-82 = "……Se o Sensei diz isso, então vou tentar pensar assim…… N-não, vou me esforçar para conseguir pensar assim……!"
1600006-83 = "……H-hein? J-já estou assim……?"
1600006-84 = "N-não, não, não, de jeito nenhum……! Ah, isso, eu não quis retrucar de forma alguma……!"
1600006-85 = "Isso…… é, bem…… uuu……!"
1600006-86 = "E-então…… eu sei que é p-presunçoso da minha parte, alguém como eu…… mas se o Sensei d-diz isso……!"
1600006-87 = "Eu vou aceitar que seja assim, e-eu acho……!"
1600006-89 = "(Depois disso, levei a terra para casa junto com a Haruka)"
1600006-90 = "(Como a Haruka conhecia bem o terreno, conseguimos voltar para casa em linha reta, sem nos perdermos)"
1600006-94 = "(O caminho não era tão complicado quanto eu pensava, então acabei me sentindo mal e com uma vontade imensa de pedir desculpas)"
