[translation]
80000112-1 = "作戦参謀は負けたくない"
80000112-3 = "（いつものようにシャーレで仕事をしていると……）"
80000112-8 = "[ns] \"もしもし。\""
80000112-12 = "こんにちは、先生。"
80000112-13 = "今日は百花繚乱として正式な依頼があって連絡したんだけど……"
80000112-14 = "予定は空いてる？#nまあ、あまり期待はしてないけど。"
80000112-15 = "[s] \"時間なら大丈夫だよ。\""
80000112-17 = "[ns] \"それにキキョウより大切な用事なんて無いから！\""
80000112-18 = "……はぁ。シャーレの業務量くらい、把握してるよ。"
80000112-19 = "どれだけ忙しくても、生徒の頼みを聞く姿勢は高く買ってるけど……"
80000112-20 = "私は、あんたに迷惑をかけたり無理をさせたくはない。"
80000112-21 = "だから、私に気を遣ってるんだとしたら怒るから。#nもう一度、よく考えて答えて。"
80000112-22 = "[ns1] \"キキョウにそう言ってもらえて嬉しいよ。\"\n[ns2] \"でも、今日は本当に空いてるから心配しないで。\""
80000112-25 = "……ふん。"
80000112-26 = "とにかく、問題は無いのね？"
80000112-27 = "じゃ、待ってるから。"
80000112-31 = "…………これで先生を呼ぶのには成功した。"
80000112-35 = "[ns] （………切り忘れてるのかな？）"
80000112-36 = "先生が来る前に、早く準備をしないと……"
80000112-40 = "今日は絶対に完璧な作戦を………"
80000112-44 = "[ns] \"何の話だろう……？\""
80000112-46 = "（そうして、キキョウに指定された場所へ向かった）"
80000112-51 = "[ns] \"依頼の内容を聞かせてもらってもいい？\""
80000112-52 = "ああ、単純な話だよ。"
80000112-53 = "先生も知っての通り、今日はバレンタインデーでしょう？"
80000112-54 = "[s] \"そうだね。\""
80000112-55 = "こういう特別な日は、百鬼夜行で色々なイベントが開かれるの。"
80000112-56 = "だから今日は、そのイベントを手伝ってもらいたくて。#nこれも百花繚乱として大切な役目だから。"
80000112-57 = "[s] \"そうだったんだ……頑張るね。\""
80000112-58 = "やる気になってくれたみたいで良かった。"
80000112-59 = "じゃ、さっそく向かうよ。"
80000112-63 = "（こうしてキキョウと一緒に商店街の行事を手伝い始めた）"
80000112-77 = "（チョコレート作りの体験イベントから……）"
80000112-85 = "（キヴォトス全自治区チョコレートコンテストを補助したり）"
80000112-91 = "（バレンタインデーをテーマにした路上俳句バトルの審判を任されたり……）"
80000112-92 = "（その後も様々なイベントの手伝いで引っ張りだこだった）"
80000112-94 = "今日は本当にありがとうございました！"
80000112-95 = "キキョウさんと先生が手伝ってくださったおかげで、今回のイベントも大成功です！"
80000112-96 = "特に子供たちが、いつも以上に楽しそうな笑顔を見せてくれて！#nよろしければ、またお願いしてもいいでしょうか？"
80000112-97 = "[s] \"もちろん、喜んでお手伝いします。\""
80000112-98 = "……良かったね、人気みたいで。"
80000112-99 = "子供の面倒を見るの、性に合ってるんじゃない？"
80000112-100 = "はは！キキョウさんもですよ！"
80000112-101 = "それに、お二人がペアで参加していたクイズ大会で連続正解されたときは、「お姉さんカッコいい！」と子供たちみんな大喜びでしたし！"
80000112-102 = "そ、それは……たまたま、知ってる問題が多かっただけで。"
80000112-103 = "[s] \"キキョウ……もしかして照れてるの？\""
80000112-107 = "……ふん。"
80000112-112 = "[ns] \"ふぅ、気づいたらこんな時間だね。\""
80000112-116 = "……そうね、もう日が暮れる時間だもの。"
80000112-117 = "今日は一日、付き合ってくれてありがとう……先生。"
80000112-118 = "おかげで、百花繚乱としての役目を果たせた。"
80000112-119 = "………。"
80000112-120 = "それで……"
80000112-121 = "……今日一日、私と一緒に過ごした感想を聞きたいんだけど。"
80000112-122 = "[s] \"私も、楽しかったよ。\""
80000112-123 = "……そう。"
80000112-124 = "………。"
80000112-125 = "……感想は、それだけ？"
80000112-126 = "もう少し……他に何か無いの？"
80000112-127 = "[s] \"え？いや、特には……\""
80000112-128 = "よく考えてみて、先生。私たちは今日、二人で色々なイベントに参加した。"
80000112-129 = "そのどれもが……バレンタインに関するもの。"
80000112-130 = "だから、なんというか自然と……"
80000112-131 = "何かが頭の中に浮かんだりしたんじゃない？"
80000112-132 = "遠慮する必要は無い。#nあんたが思ったままの気持ちを言葉にして。"
80000112-133 = "[s] \"……あ、それなら一つあるよ。\""
80000112-134 = "やっぱり……そうだと思った。"
80000112-135 = "さあ、早く言って。"
80000112-140 = "あんたが何を思って、何を求めてるのか。"
80000112-144 = "[ns] \"キキョウの役に立てて嬉しかったよ。\""
80000112-148 = "[ns] \"だから、またいつでも頼ってね。\""
80000112-149 = "……それが、シャーレの役目だから？"
80000112-150 = "そう……それで？"
80000112-154 = "……続きを待ってるんだけど？"
80000112-155 = "[s] \"えっと……今のが私の気持ちだよ？\""
80000112-156 = "……そう。"
80000112-161 = "そうなんだ……ふふ。"
80000112-162 = "本当に、あんたは私に何も求めてないと……"
80000112-163 = "そんなの……"
80000112-164 = "――――信じらんない。"
80000112-168 = "[ns] \"キキョウ……？\""
80000112-169 = "私はあれほど念入りに作戦を立てたのに、どうしてあんたは……どうして……"
80000112-170 = "本当、たったの一度も――"
80000112-171 = "チョコレートを欲しがるそぶりすら見せないなんて……"
80000112-172 = "本当に、信じらんない……！"
80000112-173 = "[s] \"……………………はい？\""
80000112-175 = "（意図が掴めず、キキョウの真意を聞いてみると……）"
80000112-177 = "[ns] \"要するに、私たちが手伝ったイベントは全て……\""
80000112-178 = "……はあ。ここまで話して、もう隠す意味は無いか。"
80000112-179 = "そうだよ。全部あんたから、ある言葉を引き出すために計画したこと。"
80000112-180 = "――「チョコレートが欲しい」という一言のために。"
80000112-181 = "……なのに、あんたは私の気を知らずに……"
80000112-182 = "[s] \"どうしてこんな遠回りを……？\""
80000112-183 = "それは……"
80000112-184 = "あんたから欲しいって言われる前に……"
80000112-185 = "私からチョコレートを渡したら……"
80000112-186 = "[s] \"渡したら……？\""
80000112-187 = "そ、それじゃまるで……"
80000112-188 = "私が負けたみたいじゃない！"
80000112-189 = "[s] \"………………。\""
80000112-190 = "あんたに欲しいって言われたところで、駆け引きをして余裕な表情で渡そうと思ってたのに。"
80000112-191 = "最後までチョコのチの字すら出てこないなんて……！"
80000112-192 = "んんん！本当に信じられない！#n分かってる？あんたがどんな過ちを犯したのか！"
80000112-193 = "[s] \"すごく理不尽じゃありません……？\""
80000112-194 = "まさか、あんたがここまでの朴念仁だったなんて……"
80000112-195 = "……はぁ、私はどこで計算を間違えたのか。"
80000112-196 = "[s] \"あのね、あえて私がチョコを欲しいって言わなかったのは……\""
80000112-197 = "……ん？何か理由があったとでも？"
80000112-198 = "電話が繋がったままになってて、たぶんチョコを用意してくれてるのが分かったから……？"
80000112-199 = "それで、渡されるのを待ってたって……？"
80000112-200 = "つまり、私の作戦は意味が無かったと……"
80000112-201 = "…………。"
80000112-202 = "……っ！"
80000112-203 = "[s] \"キキョウの気持ちを分かってあげられなくて、ごめん。\""
80000112-204 = "いや、そもそも私が電話を切っていれば……！"
80000112-205 = "……あ、待って。#nということは、私からチョコレートがもらえると分かったうえで会いに来たわけで……"
80000112-206 = "それって要は、楽しみにしてたんじゃ……"
80000112-207 = "……こほん！"
80000112-208 = "…………はい。#nあんたの言う通り、これが準備してたチョコレート。"
80000112-214 = "あんたのためだけに、百花繚乱の作戦参謀が作った特製チョコレートだからね。"
80000112-215 = "さあ、受け取って。"
80000112-225 = "[ns] \"うん。キキョウ、ありが……\""
80000112-226 = "お礼は！"
80000112-227 = "…………お礼は……ちゃんと、味わってから……"
80000112-228 = "……味わってから、聞かせて。"
80000112-234 = "その……今は、こうしてるのも恥ずか……っ。"
80000112-235 = "感想は、A4用紙10ページ分で送ること！"
80000112-236 = "[s] \"は、はい……分かりました。\""
80000112-237 = "……ふん！"
80000112-239 = "（こうして、紆余曲折を経てキキョウから受け取ったチョコレートは……）"
80000112-240 = "（……とても、甘かった）"
