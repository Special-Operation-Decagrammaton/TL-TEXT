[translation]
80000112-1 = "A estrategista não quer perder"
80000112-3 = "（Enquanto trabalho no Schale como de costume...）"
80000112-8 = "[ns] \"Alô?\""
80000112-12 = "Olá, Sensei."
80000112-13 = "Estou entrando em contato porque a Hyakkaryouran tem um pedido formal para você hoje..."
80000112-14 = "Você está livre? #nBem, não que eu esteja esperando muito."
80000112-15 = "[s] \"Tenho tempo, sim.\""
80000112-17 = "[ns] \"Além disso, não existe nada mais importante do que um pedido da Kikyou!\""
80000112-18 = "……Haa. Eu sei muito bem qual é a carga de trabalho do Schale."
80000112-19 = "Por mais ocupado que você esteja, eu admiro sua disposição em atender aos pedidos dos alunos, mas..."
80000112-20 = "Eu não quero te causar problemas ou te forçar a fazer algo."
80000112-21 = "Então, se você estiver tentando ser gentil comigo, eu vou ficar brava. #nPense bem antes de responder de novo."
80000112-22 = "[ns1] \"Fico feliz que a Kikyou diga isso.\"\n[ns2] \"Mas hoje eu estou realmente livre, então não se preocupe.\""
80000112-25 = "……Hmph."
80000112-26 = "De qualquer forma, não há problemas, certo?"
80000112-27 = "Então, estarei te esperando."
80000112-31 = "…………Consegui chamar o Sensei com sucesso."
80000112-35 = "[ns] （………Será que ela esqueceu de desligar?）"
80000112-36 = "Preciso me preparar rápido antes que o Sensei chegue……"
80000112-40 = "Hoje, com certeza, farei uma estratégia perfeita………"
80000112-44 = "[ns] \"Do que será que ela está falando……?\""
80000112-46 = "（E assim, fui até o local indicado pela Kikyou）"
80000112-51 = "[ns] \"Pode me contar qual é o conteúdo do pedido?\""
80000112-52 = "Ah, é algo simples."
80000112-53 = "Como você sabe, Sensei, hoje é Dia dos Namorados, não é?"
80000112-54 = "[s] \"É verdade.\""
80000112-55 = "Nesse tipo de dia especial, vários eventos são realizados em Hyakkiyako."
80000112-56 = "Por isso, queria que você me ajudasse com esses eventos. #nIsso também é um papel importante para a Hyakkaryouran."
80000112-57 = "[s] \"Entendi…… farei o meu melhor.\""
80000112-58 = "Fico feliz em ver que você está motivado."
80000112-59 = "Então, vamos logo."
80000112-63 = "（Assim, comecei a ajudar com os eventos do distrito comercial junto com a Kikyou）"
80000112-77 = "（Desde o evento de experiência de fazer chocolates……）"
80000112-85 = "（Até ajudar no Concurso de Chocolates de todos os distritos de Kivotos）"
80000112-91 = "（Ou ser nomeado juiz de uma batalha de haicais de rua com o tema Dia dos Namorados……）"
80000112-92 = "（Depois disso, fomos requisitados para ajudar em vários outros eventos）"
80000112-94 = "Muito obrigado por hoje!"
80000112-95 = "Graças à ajuda da Kikyou e do Sensei, este evento também foi um grande sucesso!"
80000112-96 = "As crianças ficaram especialmente felizes e sorridentes, mais do que nunca! #nSe não for pedir muito, poderíamos contar com vocês novamente?"
80000112-97 = "[s] \"Claro, ficarei feliz em ajudar.\""
80000112-98 = "……Que bom, parece que você é popular."
80000112-99 = "Cuidar de crianças não combina com você?"
80000112-100 = "Haha! Com você também, Kikyou!"
80000112-101 = "Além disso, quando vocês dois participaram do torneio de perguntas como uma dupla e acertaram tudo, todas as crianças ficaram super animadas gritando: \"A moça é incrível!\""
80000112-102 = "I-isso é…… foi só coincidência, eu sabia muitas das perguntas."
80000112-103 = "[s] \"Kikyou…… por acaso você está corada?\""
80000112-107 = "……Hmph."
80000112-112 = "[ns] \"Ufa, nem vi que horas eram.\""
80000112-116 = "……É verdade, o sol já está se pondo."
80000112-117 = "Obrigada por me acompanhar o dia todo…… Sensei."
80000112-118 = "Graças a isso, pude cumprir meu papel como parte da Hyakka Ryoran."
80000112-119 = "………。"
80000112-120 = "Então……"
80000112-121 = "……Eu queria saber o que você achou de passar o dia de hoje comigo."
80000112-122 = "[s] \"Eu também me diverti.\""
80000112-123 = "……Entendo."
80000112-124 = "………。"
80000112-125 = "……É só isso que tem a dizer?"
80000112-126 = "Não tem mais nada…… além disso?"
80000112-127 = "[s] \"Eh? Não, nada em especial…\""
80000112-128 = "Pense bem, Sensei. Hoje, nós dois participamos de vários eventos."
80000112-129 = "E todos eles…… eram relacionados ao Dia dos Namorados."
80000112-130 = "Por isso, de certa forma, naturalmente……"
80000112-131 = "Não surgiu nada na sua mente?"
80000112-132 = "Não precisa se conter. #nColoque em palavras o que você está sentindo."
80000112-133 = "[s] \"……Ah, nesse caso, tem uma coisa sim.\""
80000112-134 = "Eu sabia…… imaginei que sim."
80000112-135 = "Vamos, diga logo."
80000112-140 = "O que você está pensando e o que você deseja."
80000112-144 = "[ns] \"Fiquei feliz por ter sido útil para a Kikyou.\""
80000112-148 = "[ns] \"Por isso, pode contar comigo sempre que precisar.\""
80000112-149 = "……Isso é porque esse é o papel do Schale?"
80000112-150 = "Entendo…… e depois?"
80000112-154 = "……Estou esperando a continuação?"
80000112-155 = "[s] \"Bem…… isso é o que eu sinto.\""
80000112-156 = "……Entendo."
80000112-161 = "É assim, é…… fufu."
80000112-162 = "Sério, você não quer nada de mim……"
80000112-163 = "Isso é……"
80000112-164 = "――――Inacreditável."
80000112-168 = "[ns] \"Kikyou……?\""
80000112-169 = "Eu planejei tudo com tanto cuidado, então por que você…… por que……"
80000112-170 = "Sério, nem uma única vez――"
80000112-171 = "Você nem deu sinal de que queria chocolate……"
80000112-172 = "Sério, inacreditável……!"
80000112-173 = "[s] \"……………………Oi?\""
80000112-175 = "(Sem entender a intenção, pergunto o que a Kikyou realmente queria dizer…)"
80000112-177 = "[ns] \"Em resumo, todos os eventos que ajudamos foram…\""
80000112-178 = "……Haa. Já que chegamos a esse ponto, não faz sentido esconder mais."
80000112-179 = "É isso mesmo. Tudo foi planejado para arrancar uma certa frase de você."
80000112-180 = "――A frase: \"Eu quero chocolate\"."
80000112-181 = "……Mas, você nem percebeu o que eu estava sentindo……"
80000112-182 = "[s] \"Por que fazer tanto rodeio……?\""
80000112-183 = "Isso é porque……"
80000112-184 = "Se eu te desse o chocolate……"
80000112-185 = "Antes de você me pedir……"
80000112-186 = "[s] \"Se me desse……?\""
80000112-187 = "E-então seria como se……"
80000112-188 = "Como se eu tivesse perdido!"
80000112-189 = "[s] \"………………。\""
80000112-190 = "Eu pretendia fazer um jogo de cena e te entregar com um sorriso confiante, assim que você me pedisse."
80000112-191 = "Mas você não mencionou nem a letra 'C' de chocolate até o fim...!"
80000112-192 = "Nnnn! Eu não acredito! #nVocê tem noção do erro que cometeu?!"
80000112-193 = "[s] \"Isso não é um pouco injusto...?\""
80000112-194 = "Quem diria que você fosse tão cabeça-dura assim..."
80000112-195 = "...Haa, onde foi que eu errei nos meus cálculos?"
80000112-196 = "[s] \"Sabe, a razão pela qual eu não pedi o chocolate diretamente foi...\""
80000112-197 = "...Hm? Você quer dizer que tinha um motivo?"
80000112-198 = "A ligação ainda estava aberta, então eu percebi que você provavelmente já estava preparando o chocolate...?"
80000112-199 = "E por isso, você ficou esperando que eu te entregasse...?"
80000112-200 = "Ou seja, o meu plano não serviu de nada..."
80000112-201 = "…………."
80000112-202 = "……!"
80000112-203 = "[s] \"Sinto muito por não ter entendido o que você estava sentindo, Kikyou.\""
80000112-204 = "Não, na verdade, se eu tivesse desligado o telefone..."
80000112-205 = "...Ah, espere. #nIsso significa que você veio me encontrar já sabendo que ganharia um chocolate de mim..."
80000112-206 = "Isso quer dizer que, no fundo, você estava ansioso por isso, não é..."
80000112-207 = "...E-ehem!"
80000112-208 = "…………Sim. #nComo você disse, este é o chocolate que eu preparei."
80000112-214 = "É um chocolate especial feito pela estrategista da Hyakkiyako, exclusivamente para você."
80000112-215 = "Vamos, aceite."
80000112-225 = "[ns] \"Sim. Kikyou, muito obri...\""
80000112-226 = "O agradecimento!"
80000112-227 = "…………O agradecimento... guarde para depois que você provar..."
80000112-228 = "...Depois que provar, você me diz."
80000112-234 = "É que... agora, estar assim é um pouco vergonhoso..."
80000112-235 = "E quero que me envie suas impressões em um relatório de 10 páginas tamanho A4!"
80000112-236 = "[s] \"S-sim... entendido.\""
80000112-237 = "...Hmph!"
80000112-239 = "(Assim, após muitas reviravoltas, o chocolate que recebi de Kikyou...)"
80000112-240 = "(...estava muito doce.)"
