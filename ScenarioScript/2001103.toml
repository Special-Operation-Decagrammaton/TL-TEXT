[translation]
2001103-1 = "Especialista no mundo das sacerdotisas"
2001103-2 = "（Para ver o visual de sacerdotisa que ela tanto se esforçou, fui até onde a Serika estava）"
2001103-3 = "[s] \"Ouvi dizer que era por aqui...\""
2001103-4 = "（Encontrei a Serika rapidamente）"
2001103-8 = "（No entanto, por algum motivo, a Serika estava parada silenciosamente em um canto...）"
2001103-9 = "[s1] \"Sacerdotisa encontrada!\"\n[s2] \"Serika?\""
2001103-10 = "Ah, Sensei!?"
2001103-11 = "Ei, por que você está aqui...!?"
2001103-12 = "Ah, Sensei!?"
2001103-13 = "Ei, por que você está aqui...!?"
2001103-14 = "Para ver o meu visual de sacerdotisa...?"
2001103-15 = "Ah, qual é, não faz sentido! Eu disse que não precisava vir!"
2001103-16 = "[s] \"............\""
2001103-17 = "O-o que foi? Por que está me encarando assim..."
2001103-18 = "Por que ficou em silêncio? Se tem algo a dizer, diga logo...!"
2001103-19 = "N-não é como se eu mesma achasse que isso combina comigo."
2001103-20 = "Mesmo que você diga que não pareço tanto uma sacerdotisa quanto esperava, isso é algo que desde o início...!"
2001103-21 = "[s3] \"Você está linda!\"\n[s4] \"Que bênção...\""
2001103-23 = "P-por que de repente!?"
2001103-25 = "P-por que de repente!?"
2001103-26 = "[s] \"É o que eu penso de verdade. Aliás, por que está aqui sozinha?\""
2001103-27 = "Ah, bem, é que..."
2001103-28 = "Hum... Sensei, o que você acha que eu deveria fazer?"
2001103-29 = "Como você sabe, estou trabalhando de meio período como sacerdotisa, e ainda estou, mas..."
2001103-30 = "Eu deveria estar cuidando das \"informações\", mas não estou conseguindo fazer direito. Sinto que perco o momento certo toda hora..."
2001103-31 = "Será que é porque não sirvo para ser sacerdotisa...?"
2001103-32 = "[s] \"Não serve?\""
2001103-33 = "Eu me preparei do meu jeito, mas acabei pensando que talvez eu não consiga dar conta."
2001103-34 = "Ah! Não, não é isso! Não estou falando mal do que aconteceu entre nós outro dia...!"
2001103-35 = "É só que as coisas são bem diferentes do que eu esperava, e tudo o que tento fazer acaba saindo errado..."
2001103-36 = "Ainda estou no trabalho, então, na verdade, eu deveria estar agindo com firmeza..."
2001103-37 = "Acho que talvez isso não seja para mim..."
2001103-38 = "[s] \"Isso não é verdade!\""
2001103-39 = "S-Sensei...?"
2001103-40 = "[s5] \"A Serika pode ser uma ótima sacerdotisa!\"\n[s6] \"Talvez você só esteja nervosa por ser a primeira vez, e a oportunidade certa ainda não apareceu!\""
2001103-41 = "V-você acha...?"
2001103-42 = "V-você acha...?"
2001103-43 = "Waaah! Mamãe, papai! Onde vocês estão!?"
2001103-44 = "Aquela ali é uma criança perdida...?"
2001103-45 = "[s] \"Olha, chegou a hora da Serika brilhar!\""
2001103-50 = "Ah, certo. Ei... você aí, por acaso está perdida?"
2001103-51 = "Snif, não é isso... Eu não me perdi, foram o papai e a mamãe que se perderam de mim...!"
2001103-52 = "Ah... entendi. Então espere um pouco, tá? A irmã mais velha aqui vai encontrar o papai e a mamãe para você."
2001103-53 = "Com licença! Tem alguém por aqui"
2001103-54 = "que se perdeu do seu filho ou filha!?"
2001103-60 = "Você estava aqui...! Eu te procurei por toda parte!"
2001103-61 = "Papai!"
2001103-62 = "Que bom... muito obrigada, sacerdotisa. Desculpe o transtorno."
2001103-63 = "Ah, não, sem problemas. Fico feliz que estejam bem."
2001103-64 = "Obrigada, moça sacerdotisa! E feliz ano novo!"
2001103-65 = "Sim, feliz ano novo! Como as coisas difíceis já acabaram este ano, espero que muitas coisas maravilhosas aconteçam daqui para frente."
2001103-67 = "……Ufa. Bem, caso encerrado, eu acho?"
2001103-68 = "[s] \"Serika, bom trabalho! Agora, vamos para ali……!\""
2001103-69 = "Hã!? Ei, espere, Sensei!?"
2001103-74 = "Ai, ai, ai…… depois de tanto tempo sem subir escadas, minhas costas……."
2001103-76 = "Com licença, você está bem?"
2001103-77 = "Ah, uma sacerdotisa. Obrigada pela preocupação, é só uma dorzinha nas costas mesmo……."
2001103-78 = "Ah, se for esse o caso, há um caminho mais fácil por aqui……"
2001103-79 = "Ora, ora, peço mil desculpas…… Hã!?"
2001103-80 = "A-aconteceu alguma coisa……!?"
2001103-81 = "A-assim que a mão da sacerdotisa tocou minhas costas, a dor sumiu de repente……! Como esperado de uma sacerdotisa, você tem um poder incrível!"
2001103-82 = "Hã……?"
2001103-83 = "Pessoal, venham aqui! Tem uma sacerdotisa incrível aqui……!"
2001103-85 = "（Depois disso, uma multidão começou a se formar ao redor de Serika）"
2001103-88 = "Sacerdotisa! Por favor, antes de eu tirar minha sorte, faça uma oração por mim……!"
2001103-89 = "Err, será que eu posso fazer isso…… bem, então, por enquanto……."
2001103-90 = "Ah, então, por favor, faça uma oração para o gacha deste jogo para mim!"
2001103-91 = "J-jogo!?"
2001103-92 = "Ah, não, quer saber? Pode girar no meu lugar! Eu confio na sacerdotisa!"
2001103-93 = "E-eu não sei se deveria me pedir uma coisa dessas……!?"
2001103-94 = "[s] \"Hmm…… se a Serika não se importar, por que não tenta?\""
2001103-95 = "Hã!? B-bem……"
2001103-96 = "Eu imploro, por favor!"
2001103-97 = "Ugh, uuuuh……! N-não me culpe pelo resultado, hein!"
2001103-98 = "Err, é aqui que aperta? Ou escreve? É, assim……?"
2001103-101 = "Oh, isso é……."
2001103-103 = "Normal, é…… muito obrigada. A realidade é cruel, como esperado. Bem, pelo menos não gastei minha sorte aqui…… vou cuidar bem da personagem que a sacerdotisa tirou para mim……."
2001103-104 = "Por que você diz isso de um jeito que me faz sentir tão culpada!?"
2001103-106 = "（Depois disso, não sei quanto tempo se passou……）"
2001103-108 = "……Moça, você tem talento para ser sacerdotisa. Que tal fazer um contrato conosco e se tornar uma especialista em sacerdotisas?"
2001103-109 = "N-não, eu não tenho tanta determinação assim……."
2001103-110 = "Por favor! Por favor, nos empreste seu poder……!"
2001103-111 = "Hã!? Ei, Sensei, me ajuda aqui!?"
2001103-116 = "Ah, estou exausta……."
2001103-120 = "É verdade que não fiquei sem fazer nada nem por um segundo……."
2001103-121 = "Além disso, teve várias coisas que não saíram como planejado……."
2001103-122 = "[s] \"Mas também aconteceram muitas coisas que deram certo. Bom trabalho.\""
2001103-123 = "……Que isso, parece que você está tentando me provocar."
2001103-124 = "Mas…… sim. Obrigada."
2001103-125 = "Porque naquela hora, o Sensei me encorajou……."
2001103-126 = "……O Sensei me ajudou de novo."
2001103-127 = "Obrigada por sempre me ajudar, Sensei."
2001103-128 = "[s] \"Pela Serika, eu faria qualquer coisa.\""
2001103-129 = "Hum, você pode dizer isso tão facilmente? Se você diz \"qualquer coisa\", significa que vai atender qualquer pedido, não importa o quão absurdo seja, certo?"
2001103-130 = "[s] \"Sim, se for um pedido da Serika.\""
2001103-131 = "……!"
2001103-133 = "Lá vem esse Sensei de novo, falando essas coisas……."
2001103-134 = "[s7] \"Por isso, não se acanhe e me conte sempre que precisar.\"\n[s8] \"Eu vou te ajudar a se tornar uma especialista no mundo das sacerdotisas!\""
2001103-135 = "……Hã?"
2001103-136 = "……Hã?"
2001103-137 = "Ah, fala sério, achei que você ia dizer algo importante..."
2001103-138 = "……Que estranho, o que foi isso?"
2001103-139 = "Sério, que bobagem."
2001103-141 = "（Depois disso, continuei observando a Serika se esforçar até o fim）"
