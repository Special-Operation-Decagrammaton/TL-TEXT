[translation]
2001103-1 = "巫女界のスペシャリスト"
2001103-2 = "（せっかくの巫女さん姿を見るため、セリカの元へと向かった）"
2001103-3 = "[s] \"確かこの辺って聞いたけど……。\""
2001103-4 = "（セリカの姿はすぐに見つかった）"
2001103-8 = "（しかしセリカはなぜか、隅っこの方で静かに立っていて……）"
2001103-9 = "[s1] \"巫女さん発見！\"\n[s2] \"セリカ？\""
2001103-10 = "え、先生！？"
2001103-11 = "ちょっ、どうして……！？"
2001103-12 = "え、先生！？"
2001103-13 = "ちょっ、どうして……！？"
2001103-14 = "私の巫女さん姿を見るため……？"
2001103-15 = "ああもうっ、意味わかんない！来なくて良いって言ったじゃん！"
2001103-16 = "[s] \"…………。\""
2001103-17 = "な、何よ、そんなにじっと見て……"
2001103-18 = "何で黙り込むわけ？言いたいことがあったら言えば……！"
2001103-19 = "べ、別に自分でもそんな、似合ってるとか思ってないし。"
2001103-20 = "思ったより巫女さんっぽくないとか言われても、そんなの最初っから……！"
2001103-21 = "[s3] \"可愛い！\"\n[s4] \"ありがたや……。\""
2001103-23 = "きゅっ、急に何なのよ！？"
2001103-25 = "きゅっ、急に何なのよ！？"
2001103-26 = "[s] \"本心だよ。ところで、どうしてこんなところに一人で？\""
2001103-27 = "ああ、えっとそれは……。"
2001103-28 = "うーん……先生、どうしたら良いと思う？"
2001103-29 = "知っての通り巫女さんとしてバイト中で、今もまあそうなんだけど……。"
2001103-30 = "一応「案内」を受け持ってるんだけどね。ちゃんとできてないっていうか、さっきからタイミングを逃しっぱなしっていうか……"
2001103-31 = "やっぱり、巫女さんとして不出来だからなのかなって……。"
2001103-32 = "[s] \"不出来？\""
2001103-33 = "自分なりに準備したつもりだったんだけど、やっぱり私じゃ全うできないのかなって思っちゃって。"
2001103-34 = "あっ！違うの、別にこの間の先生とのことを悪く言ってるわけじゃなくって……！"
2001103-35 = "ただ色々と勝手が違うし、何だかやることなすこと、ちぐはぐになっちゃって……。"
2001103-36 = "今もバイト中だから、本当はしっかりしなきゃいけないんだけど……。"
2001103-37 = "ちょっと、私には向いてなかったのかなって思って……。"
2001103-38 = "[s] \"そんなことないよ！\""
2001103-39 = "せ、先生……？"
2001103-40 = "[s5] \"セリカは立派な巫女さんになれるよ！\"\n[s6] \"多分初めてで緊張してるだけ、あとまだチャンスが来てないだけ！\""
2001103-41 = "そ、そう、かな……？"
2001103-42 = "そ、そう、かな……？"
2001103-43 = "うわあぁん！ママぁ、パパぁ！どこ～！？"
2001103-44 = "あれって、迷子の子……？"
2001103-45 = "[s] \"ほら、早速セリカの出番だよ！\""
2001103-50 = "えっ、あ、うん。えっと……そこのあなた、もしかして迷子？"
2001103-51 = "ぐすっ、違うの……私が迷子になったんじゃなくて、パパとママが迷子になっちゃって……！"
2001103-52 = "えーっと……うん、そっか。じゃあちょっと待っててね。お姉ちゃんが、迷子のパパとママを見つけてきてあげるから。"
2001103-53 = "すみませーん！この辺りに、"
2001103-54 = "お子さんとはぐれた親御さんはいらっしゃいませんかー！？"
2001103-60 = "ここにいたのか……！もうずいぶん探したぞ！"
2001103-61 = "パパっ！"
2001103-62 = "良かった……ありがとうございます、巫女さん。ご迷惑をおかけしました。"
2001103-63 = "あ、いえいえ。ご無事で何よりです。"
2001103-64 = "巫女のお姉さんありがとう！あと、あけましておめでとー！"
2001103-65 = "うん、あけましておめでとう！今年はもう辛いことが終わったから、後は素敵なことがたくさんあると良いわね。"
2001103-67 = "……ふう。まあ一件落着、かな？"
2001103-68 = "[s] \"セリカ、お疲れ様！次はあっちに……！\""
2001103-69 = "えぇっ！？ちょっ、先生待って！？"
2001103-74 = "あいたたたた……久しぶりに階段を上がったら、腰が……。"
2001103-76 = "あの、大丈夫ですか？"
2001103-77 = "あら、巫女さん。心配してくれてどうもね、ただ少し腰が痛いだけで……。"
2001103-78 = "あっ、でしたらこちらの方に楽な道が……"
2001103-79 = "あらあら、申し訳ありませんねぇ……はっ！？"
2001103-80 = "ど、どうかしましたか……！？"
2001103-81 = "み、巫女さんの手が腰に触れた瞬間、痛みがすっと消えて……！流石は巫女さん、素晴らしい力をお持ちですねぇ！"
2001103-82 = "えっ……？"
2001103-83 = "みなさん、来てください！ここにものすごい巫女さんが……！"
2001103-85 = "（それからセリカの周りに、人だかりができ始めた）"
2001103-88 = "巫女さん！どうかおみくじを引く前に、私にお祈りを……！"
2001103-89 = "えっと、私がそれやって良いのかな……じゃあとりあえず……。"
2001103-90 = "あっ、じゃあ私の方には、このゲームのガチャに対するお祈りをお願いします！"
2001103-91 = "げ、ゲーム！？"
2001103-92 = "ああいえ、いっそのこと私の代わりに引いてください！巫女さんを信じます！"
2001103-93 = "そ、そんなこと私に頼まれても……！？"
2001103-94 = "[s] \"うーん……セリカが良ければ、やってあげたら？\""
2001103-95 = "えぇっ！？う、うーん……"
2001103-96 = "この通りです、お願いします！"
2001103-97 = "うっ、うぅぅぅっ……！ど、どんな結果になっても知らないからね！"
2001103-98 = "えっと、これを押すの？え、書くの？こ、こう……？"
2001103-101 = "おお、これは……。"
2001103-103 = "ノーマル、ですか……ありがとうございました。やっぱり現実は非情ですね。運をここで使い果たさなかったということで……この巫女さんが引いてくださった子も大事に育てます……。"
2001103-104 = "何かそう言われると、すごい申し訳ない気持ちになるんだけど！？"
2001103-106 = "（それから、どれくらいの時間が経ったのか……）"
2001103-108 = "……そこのお嬢さん、巫女としての素質がお有りだ。我々と契約し、巫女のスペシャリストになってはくれぬか？"
2001103-109 = "い、いや、ちょっとそこまでの決意は……。"
2001103-110 = "お願いします！どうか、どうか我々に力を……！"
2001103-111 = "えぇっ！？ちょっ、先生助けて！？"
2001103-116 = "あー、何だかどっと疲れた……。"
2001103-120 = "一気に暇じゃなくなったのは確かだけど……。"
2001103-121 = "それに、色々上手く行かないこともあったし……。"
2001103-122 = "[s] \"でも、上手く行ったこともたくさんあったよ。お疲れ様。\""
2001103-123 = "……何それ、揚げ足取りみたい。"
2001103-124 = "でも……うん。ありがとう。"
2001103-125 = "先生があの時、私のことを励ましてくれたから……。"
2001103-126 = "……また先生に助けてもらっちゃった。"
2001103-127 = "いつも、助けてくれてありがとう。先生。"
2001103-128 = "[s] \"セリカのためなら、いくらでも。\""
2001103-129 = "ふーん、そんなこと簡単に言って良いの？「いくらでも」って言うなら、どんなにすごいお願いをしても聞いてくれるってことよね？"
2001103-130 = "[s] \"うん、セリカの頼みなら。\""
2001103-131 = "……っ！"
2001103-133 = "まーたこの先生は、そういうことを……。"
2001103-134 = "[s7] \"だから気兼ねせず、いつでも言ってくれると嬉しい。\"\n[s8] \"巫女界のスペシャリストになれるように、手伝うから！\""
2001103-135 = "……はぁ？"
2001103-136 = "……はぁ？"
2001103-137 = "ああもう、何を言ってるのかと思ったら……。"
2001103-138 = "……何それ、変なの。"
2001103-139 = "ほんっと、バカみたい。"
2001103-141 = "（その後、最後までセリカの頑張る姿を見守っていた）"
