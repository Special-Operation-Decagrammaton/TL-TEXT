[translation]
12155-2 = "理事、傷が……！！すぐに治療を！"
12155-3 = "くっ、一度退却だ！兵力の再整備に入れ！"
12155-4 = "は、はいっ！！"
12155-5 = "覚えておけ、この代償は高くつくぞ……！"
12155-7 = "たっ、退却命令っ！"
12155-8 = "本部から退却命令。"
12155-9 = "繰り返す、本部から退却命令が下った――"
12155-10 = "戦列を整え、HQに帰投せよ。"
12155-13 = "敵兵力、退却していきます……。"
12155-14 = "ふぅ……。"
12155-15 = "……ん。"
12155-16 = "……。"
12155-17 = "いや～、あれこそ正に本物の三流悪党のセリフって感じだね。「覚えておけー」なんて実際に初めて聞いたよ。"
12155-18 = "想定通り、大体上手く行った。風紀委員会相手でも通用すると良いけど……。"
12155-19 = "[s] \"……とりあえず、帰ろうか。\""
12155-20 = "……はい、先生。"
12155-21 = "きっとこの次は……今までで一番大きな戦いになると思います。"
12155-22 = "まずは帰って、ホシノ先輩を助ける方法を探さないといけません。"
12155-26 = "キヴォトス・某所"
12155-28 = "[ns] 入る。"
12155-38 = "……お待ちしておりました、[USERNAME]先生。"
12155-39 = "あなたとは一度こうして、顔を合わせてお話ししてみたかったのですよ。"
12155-40 = "……。"
12155-43 = "次回;大人の戦い"
