[translation]
2001815-1 = "Claymore, Claymore, Claymore!"
2001815-2 = "Schale - Escritório"
2001815-3 = "（Uma tarde qualquer）"
2001815-4 = "（Enquanto organizo uma montanha de documentos com a Moe――）"
2001815-9 = "Não vejo o fim disso..."
2001815-10 = "[s] \"Pois é...\""
2001815-14 = "Ah, Sensei. Como eu deveria escrever isso aqui?"
2001815-15 = "[s] \"Bem, isso é...\""
2001815-20 = "Ué... Sensei, você faz essa quantidade todo dia?"
2001815-21 = "Eu até gosto de destruição, mas... isso aqui não é demais?"
2001815-22 = "[s1] \"Desculpe pela quantidade.\"\n[s2] \"Talvez devêssemos mudar para outra tarefa para dar uma relaxada――\""
2001815-25 = "Não, não é uma reclamação nem nada..."
2001815-26 = "Fui eu quem disse que ajudaria. #nEu até estou acostumada com tarefas repetitivas."
2001815-27 = "Mas, sabe, ficar fazendo papelada o tempo todo deixa meus dedos formigando..."
2001815-28 = "[s3] \"Quer fazer uma pausa?\"\n[s4] \"Vou preparar um café, aproveite para se alongar enquanto isso.\""
2001815-31 = "Roger."
2001815-35 = "Ah, é verdade... acho que trouxe aquilo comigo."
2001815-36 = "Kuhihi... achei."
2001815-41 = "Um, dois..."
2001815-43 = "[ns] \"Espera!\""
2001815-45 = "Ué...!?"
2001815-46 = "O-o quê!? Sensei... que susto."
2001815-47 = "[s5] \"Desculpe pelo susto...\"\n[s6] \"Isso é...\""
2001815-53 = "[ns] \"Um detonador de bomba, não é?\""
2001815-54 = "...Um detonador?"
2001815-55 = "Ah... até parece um, mas é outra coisa."
2001815-56 = "Eu não sairia explodindo coisas por aí sem mais nem menos――"
2001815-60 = "――Bom, às vezes eu faço isso. #nMas isso aqui é diferente!"
2001815-61 = "Se duvida, toma. Segura aí."
2001815-62 = "Se você tocar com as próprias mãos, vai entender na hora!"
2001815-63 = "[s7] \"Será que...\"\n[s8] \"Você está tentando me fazer apertar o botão...?\""
2001815-66 = "Essa ideia é boa. Bem destrutiva, por sinal..."
2001815-67 = "Mas eu já disse que não é isso."
2001815-68 = "Olha bem. Não tem um detonador aqui, viu?"
2001815-69 = "[s9] \"É verdade... um detonador deveria ter um.\"\n[s10] \"Então, o que é isso?\""
2001815-72 = "É um exercitador de mão. Nunca usou?"
2001815-73 = "Olha, é só apertar assim... para fortalecer a pegada."
2001815-77 = "Dizem que uma estimulação moderada ajuda a aliviar o estresse."
2001815-78 = "[s11] \"Que bom que não era um detonador...\"\n[s12] \"Por que você usa um com esse formato?\""
2001815-81 = "Ah... eu fiz isso modificando um detonador quebrado."
2001815-82 = "Sabe, às vezes dá aquela vontade incontrolável de explodir algo, né? #nMesmo sabendo que não pode."
2001815-85 = "[ns] （Bom, normalmente não se deve fazer isso mesmo...）"
2001815-86 = "Para esses momentos, eu costumava carregar um detonador quebrado comigo..."
2001815-87 = "Aí pensei que, já que ia carregar, seria melhor se servisse para treinar a força das mãos."
2001815-88 = "Então, tirei o detonador e coloquei uma mola. #nE assim nasceu o exercitador perfeito♪"
2001815-89 = "Mesmo sendo uma operadora, o treinamento é essencial. #nAlém disso, força nas mãos é importante para carregar suprimentos~"
2001815-90 = "E também, a sensação de dormência nas mãos depois de usar o exercitador... vicia bastante... #nAh, ah... é quase destrutivo..."
2001815-91 = "[s13] \"É uma ótima ideia.\"\n[s14] \"Força nas mãos é bem importante mesmo.\""
2001815-94 = "Não é? #nE acho que você tem mais força do que imagina, Sensei."
2001815-95 = "Quer tentar?"
2001815-96 = "[s] \"Sendo assim...\""
2001815-102 = "P-Professor? Por que você está segurando minha mão—"
2001815-103 = "[s] \"Eh? Não era para eu ver a força da sua pegada, Moe?\""
2001815-104 = "…Não, bem, você não está errado, mas..."
2001815-105 = "Eu quis dizer para você tentar apertar o hand grip..."
2001815-106 = "Bem, acho que dá para saber a força da minha pegada pelo hand grip também..."
2001815-110 = "Hehehe... Você até que tem braços fortes, Professor."
2001815-111 = "Quer apostar uma queda de braço?"
2001815-112 = "Já que estamos aqui, quem ganhar ganha o direito de fazer o outro obedecer a qualquer pedido."
2001815-114 = "（Depois disso, apostei uma queda de braço com a Moe）"
2001815-115 = "（Embora eu tenha dado o meu melhor, perdi três vezes seguidas...）"
