[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
2001815-1 = "Claymore, Claymore, Claymore!" 
2001815-2 = "Schale - Escritório" 
2001815-3 = "（Uma tarde num dia qualquer.）" 
2001815-4 = "（Enquanto eu ajudava a organizar a imensa pilha de papéis com a Moe――）" 
2001815-9 = "Não consigo enxergar a linha de chegada dessa papelada……" 
2001815-10 = "[s] \"Pois é……\"" 
2001815-14 = "Ah, Sensei. Como que eu escrevo nessa parte aqui?" 
2001815-15 = "[s] \"Hã, isso aqui você coloca……\"" 
2001815-20 = "Ugh~…… Sensei, você precisa mesmo aguentar essa quantidade de bagulho todo dia?" 
2001815-21 = "Eu amo uma ruína absoluta de paixão, mas…… isso aqui já não é tortura psicológica extrema?" 
2001815-22 = "[s1] \"Desculpe pela quantidade absurda.\"\n[s2] \"Por que não tenta fazer outra coisa para aliviar a tensão e clarear a cabeça――\"" 
2001815-25 = "Ah não, não tô reclamando nem nada do tipo……" 
2001815-26 = "Fui eu que ofereci a ajuda afinal de contas.\nE esse tipo de trabalho de corno eu tiro de letra." 
2001815-27 = "Mas sabe como é, passar horas carimbando e digitando papel me dá coceira nos dedos……" 
2001815-28 = "[s3] \"Vamos dar uma pequena pausa, o que acha?\"\n[s4] \"Vou pegar um café para a gente, então tente se alongar por aí enquanto isso.\"" 
2001815-31 = "Beleeeza~" 
2001815-35 = "Ah, é mesmo…… se eu me lembro bem, eu trouxe 'aquilo' hoje." 
2001815-36 = "Kuhihi…… Achei." 
2001815-41 = "Aí vou eeee――" 
2001815-43 = "[ns] \"Para!!\"" 
2001815-45 = "Wah……!?" 
2001815-46 = "O, o que foi!? Sensei…… você me assustou pra caralho agora." 
2001815-47 = "[s5] \"M-Me desculpe pelo grito……\"\n[s6] \"O que você tem na mão é……\"" 
2001815-53 = "[ns] \"O detonador de uma bomba, não é?\"" 
2001815-54 = "……Detonador?" 
2001815-55 = "Aaaah…… Parece mesmo com um, mas não tem nada a ver." 
2001815-56 = "Até mesmo eu hesitaria em explodir coisas assim num ambiente fechad――" 
2001815-60 = "――Bom, quer dizer, eu explodiria. Mas não é o caso aqui!" 
2001815-61 = "Se você não acredita, olha só. Tenta apertar?" 
2001815-62 = "Acho que até você vai perceber se tentar apertar com as suas próprias mãos!" 
2001815-63 = "[s7] \"Você não estaria por acaso……\"\n[s8] \"Tentando me fazer apertar um detonador real de sacanagem……?\"" 
2001815-66 = "Opa, essa aí é uma ideia maravilhosa. Um pensamento puramente caótico e destrutivo……" 
2001815-67 = "Mas já disse que não é isso." 
2001815-68 = "Olha bem. Ele nem tem conector pra carga, tá vendo?" 
2001815-69 = "[s9] \"Verdade…… os detonadores sempre têm fiação e conectores.\"\n[s10] \"Então, para que serve isso?\"" 
2001815-72 = "É um hand grip. Nunca usou um desses?" 
2001815-73 = "Sabe, aquele aparelhinho que a gente fica apertando…… pra treinar a força das mãos e tals." 
2001815-77 = "Ouvi dizer que esse tipo de resistência é perfeito pra aliviar o estresse." 
2001815-78 = "[s11] \"Ainda bem que não era uma bomba mesmo……\"\n[s12] \"E por que diabos você usa um hand grip com esse formato?\"" 
2001815-81 = "Aah…… Fui eu que montei isso aqui modificando a carcaça de um detonador pifado." 
2001815-82 = "Sabe quando dá aquela vontade quase incontrolável de apertar um botão e fazer a poeira subir?\nMas tipo, num cenário que causaria problemas absurdos se você fizesse de verdade." 
2001815-85 = "[ns] （Bom, 'problemas absurdos' é o básico de explodir coisas na rua……）" 
2001815-86 = "Para me aliviar nesses momentos de fissura pura, eu costumava andar pra cima e pra baixo com um detonador quebrado e ficava brincando com o pino de gatilho, mas……" 
2001815-87 = "Achei que seria massa matar dois pássaros com uma cajadada só e usar pra treinar também." 
2001815-88 = "Então, eu arranquei o sistema de faísca e troquei por uma mola bem dura.\nE, voilá, nasceu um hand grip customizado irado♪" 
2001815-89 = "Apesar do nosso trabalho ser cuidar de comunicações, os operadores ainda assim não podem negligenciar a força física.\nE sem uma boa pegada, carregar suprimentos vira um pesadelo, saca~" 
2001815-90 = "Além do mais, a sensação dos músculos dormentes depois de apertar esse hand grip repetidas vezes…… acaba te deixando viciado em pouco tempo……\nHaa, haa…… Dá um sentimento bem ruinoso……" 
2001815-91 = "[s13] \"Até que foi uma ótima ideia.\"\n[s14] \"Ter mãos fortes é crucial para o seu cargo, afinal.\"" 
2001815-94 = "Né?\nSem falar que, eu sou muito mais durona do que você pensa que eu sou, Sensei." 
2001815-95 = "Quer testar?" 
2001815-96 = "[s] \"Mas é claro……\"" 
2001815-102 = "S-Sensei? O que tá fazendo com o meu brac――" 
2001815-103 = "[s] \"Ué? Você não disse que ia me mostrar o quanto a sua pegada é forte?\"" 
2001815-104 = "……Er, bom, sim, eu disse isso mesmo." 
2001815-105 = "Mas era pra você pegar o hand grip e tentar apertar por conta própria……" 
2001815-106 = "Bem, eu acho que você sentindo a minha força vai dar na mesma de qualquer forma……" 
2001815-110 = "Kuhihi…… Os braços do Sensei até que são bem fortinhos, hein." 
2001815-111 = "Bora tirar no braço de ferro?" 
2001815-112 = "Já que tamo nessa, o vencedor pode mandar o perdedor fazer o que ele quiser, que tal?" 
2001815-114 = "（Depois disso, a Moe e eu brincamos de queda de braço.）" 
2001815-115 = "（Coloquei toda a minha força e espírito na mesa, mas no fim das contas perdi humilhantemente três vezes seguidas……）" 