[translation]
2001815-1 = "Claymore, Claymore, Claymore!"
2001815-2 = "シャーレ・執務室"
2001815-3 = "（とある日の午後）"
2001815-4 = "（モエと一緒に大量の書類を片付けていると――）"
2001815-9 = "終わりが見えないね……。"
2001815-10 = "[s] \"うん……。\""
2001815-14 = "あ、先生。これってどう書けばいいの？"
2001815-15 = "[s] \"えっと、これは……。\""
2001815-20 = "うぇ～……先生って、毎日この量やってるの？"
2001815-21 = "私も破滅が好きだけどさぁ……ちょっとこれはいきすぎてない？"
2001815-22 = "[s1] \"量が多くてごめんね。\"\n[s2] \"一旦別の作業に切り替えて気分転換でも――\""
2001815-25 = "いや、別に文句とかじゃないんだけど……。"
2001815-26 = "手伝うって言ったのは私だし。#n単純作業自体は慣れてるけどさ。"
2001815-27 = "まあでも、ずっと書類作業をしていると指先がムズムズするというか……。"
2001815-28 = "[s3] \"ちょっと休憩しようか？\"\n[s4] \"コーヒー淹れてくるから、その間にストレッチでもしてて。\""
2001815-31 = "らじゃ～"
2001815-35 = "あ、そうだ……アレ、持ってきてたような。"
2001815-36 = "くひひ……あった。"
2001815-41 = "せーの――"
2001815-43 = "[ns] \"ストップ！\""
2001815-45 = "わっ……！？"
2001815-46 = "な、何！？先生……びっくりしたぁ。"
2001815-47 = "[s5] \"驚かせてごめん……。\"\n[s6] \"それって……。\""
2001815-53 = "[ns] \"爆弾の起爆スイッチ、だよね？\""
2001815-54 = "……起爆スイッチ？"
2001815-55 = "あー……見た目はそれっぽいけど別物だよ。"
2001815-56 = "私だって所構わず爆破させたりなんて――"
2001815-60 = "――まぁ、することもあるけど。#nこれは違うよ！"
2001815-61 = "疑うなら、ほら。持ってみて？"
2001815-62 = "自分の手で触ったら流石に分かるでしょ！"
2001815-63 = "[s7] \"もしかして……。\"\n[s8] \"私にスイッチを押させようとしてる……？\""
2001815-66 = "それいいね。とっても破滅的な考えだけど……。"
2001815-67 = "でも、これは違うってば。"
2001815-68 = "よく見て。雷管がないでしょ？"
2001815-69 = "[s9] \"本当だ……起爆スイッチにはついているはずだよね。\"\n[s10] \"じゃあ、これは何？\""
2001815-72 = "ハンドグリップだよ。使ったことない？"
2001815-73 = "ほら、こうやって握って……握力鍛えるヤツ。"
2001815-77 = "適度な刺激がストレス解消になるんだって。"
2001815-78 = "[s11] \"起爆スイッチじゃなくて良かった……。\"\n[s12] \"なんでそんな形のヤツ使ってるの？\""
2001815-81 = "ああ……これ、壊れた起爆スイッチを改造して作ったんだ。"
2001815-82 = "ほら、どうしても魔が差す時ってあるじゃん？#nでも絶対やっちゃいけない的な。"
2001815-85 = "[ns] （まぁ、普通はやっちゃダメだからね……）"
2001815-86 = "そういう時ように、前は壊れたスイッチを持ち歩いてたんだけど……。"
2001815-87 = "せっかくなら握力鍛えられた方が一石二鳥かなって。"
2001815-88 = "だから、雷管外してスプリングを入れてみたんだ。#nちょうどいいハンドグリップの完成ってわけ♪"
2001815-89 = "オペレーターって言っても鍛錬は欠かせないからね。#nそれに、補給を運ぶにはやっぱり握力が大事だからさ～"
2001815-90 = "あと、ハンドグリップ使った後に、手が痺れる感覚が……結構クセになって……#nはぁ、はぁ……破滅的っていうか……。"
2001815-91 = "[s13] \"いいアイデアだね。\"\n[s14] \"握力って結構大事だもんね。\""
2001815-94 = "でしょ？#nそれに、先生が思ってるより結構強いと思うよ。"
2001815-95 = "ちょっと試してみない？"
2001815-96 = "[s] \"それじゃあ……。\""
2001815-102 = "せ、先生？なんで私の手――"
2001815-103 = "[s] \"え？モエの握力を見てって意味じゃなかったの？\""
2001815-104 = "……いや、まぁ、間違ってはいないんだけど。"
2001815-105 = "ハンドグリップを握ってみて、って意味だったというか……。"
2001815-106 = "まあ、私の握力でハンドグリップの強さも分かるか……。"
2001815-110 = "くひひ……結構先生も腕鍛えてるじゃん。"
2001815-111 = "腕相撲でもしてみる？"
2001815-112 = "せっかくだし、勝った方がなんでも言うことを聞いてもらう権利をもらえるってことで。"
2001815-114 = "（その後、モエと腕相撲をした）"
2001815-115 = "（全力で挑んだものの、3回連続で負けてしまった……）"
