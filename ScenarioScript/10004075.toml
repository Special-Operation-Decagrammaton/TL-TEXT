[translation]
10004075-1 = "Episódio 7; Como instrutora"
10004075-2 = "Ugh... que desastre..."
10004075-3 = "Quem diria que, logo naquele momento, uma aluna da Valkyrie apareceria..."
10004075-4 = "E a Shun também, fingiu que não sabia de nada! Por causa disso, eu e o Sensei fomos vistos como \"uma dupla tentando forçar uma garotinha a beber alguma coisa\"!!"
10004075-5 = "[s] \"Bem, independentemente da intenção, é basicamente o que aconteceu...\""
10004075-6 = "Ainda assim, se continuar assim, vai dar ruim..."
10004075-7 = "Se chegarmos a esse ponto, talvez um paralisante mais forte...?"
10004075-8 = "[s1] \"...Não, está tudo bem.\"\n[s2] \"Eu mesma vou tentar conversar diretamente com a Shun.\""
10004075-9 = "Mas mesmo que tente convencer, essa Shun criança de agora não parece disposta a ouvir nada, sabe...?"
10004075-10 = "Mas mesmo que tente convencer, essa Shun criança de agora não parece disposta a ouvir nada, sabe...?"
10004075-11 = "E tenho certeza de que, se for direto ao ponto, vai acabar sendo enrolado pelas travessuras dela de novo..."
10004075-12 = "...E, para começar, não tínhamos combinado que hoje você passaria o dia comigo...?"
10004075-13 = "[s3] \"Sobre isso, sinto muito mesmo...\"\n[s4] \"Vamos sair juntos em uma próxima oportunidade.\""
10004075-21 = "...Bem, não tem jeito. O destino de uma aluna está em jogo. E parece que não fui só eu que fiquei esperando pelo passeio com o Sensei..."
10004075-22 = "Em troca, quando formos sair da próxima vez, você vai me pagar um macarrão fatiado bem grande com bastante óleo de pimenta! Deixe sua agenda livre, Sensei!"
10004075-23 = "[s] \"Sim, é uma promessa.\""
10004075-24 = "Fu-fu-fu...! Então, o experimento de hoje termina aqui. Ah, se precisar da minha ajuda para qualquer coisa, pode entrar em contato a qualquer momento!"
10004075-25 = "...Cuide bem da nossa instrutora de Shanhaijing, que às vezes é um pouco pouco confiável. Sensei."
10004075-29 = "[ns] \"...Sim, pode deixar.\""
10004075-34 = "...Eu odeio todos vocês."
10004075-35 = "Odeio as crianças do Jardim das Ameixeiras que não me obedecem, a Kokona-chan que joga as tarefas dela para mim... e odeio o Sensei que tenta me fazer voltar ao meu corpo original!"
10004075-36 = "Por que todos vocês me tratam mal...!?"
10004075-37 = "[s] \"Desculpe, não era minha intenção te tratar mal...\""
10004075-39 = "Se, Sensei!?"
10004075-40 = "Como você apareceu aqui de novo...!?"
10004075-42 = "Você insiste em me fazer beber aquele antídoto?"
10004075-43 = "Mesmo sendo o Sensei, não vou deixar. Eu nunca vou voltar à minha forma original!"
10004075-44 = "[s] \"...Por que isso?\""
10004075-45 = "É óbvio! Não tenho o menor desejo de voltar para aquele corpo!"
10004075-46 = "A pele é ressecada, fico sem fôlego se correr um pouco, sinto dores nos ombros o tempo todo..."
10004075-47 = "...E, além disso, todos ficam jogando as responsabilidades em cima de mim..."
10004075-48 = "...Como instrutora do Jardim das Ameixeiras, recebo privilégios que, em alguns casos, se comparam aos dos executivos do Portão do Dragão Negro. No entanto, em troca, a responsabilidade é muito pesada."
10004075-49 = "Durante o trabalho, desde que as crianças acordam até a hora de dormir, não posso tirar os olhos delas nem por um segundo. Se algo acontece, tenho que resolver tudo depois, e fico tão ocupada com isso que nem consigo assistir às aulas normais que eu deveria ter como aluna de Shanhaijing... isso acontece com frequência."
10004075-50 = "...Eu estou cansada. Cuidar das crianças só me traz sofrimento..."
10004075-51 = "[s] \"...Você realmente acha isso?\""
10004075-52 = "Passar o dia de hoje agindo como uma criança, fazendo o que eu queria... foi muito relaxante."
10004075-53 = "O Sensei também é adulto, então sabe, não é? O quão difícil é cuidar das crianças..."
10004075-54 = "Assumir responsabilidades é muito difícil. É cansativo. É exaustivo. O Sensei também ficou cansado cuidando de mim hoje, não ficou?"
10004075-55 = "[s] \"Seria mentira dizer que não estou cansado, mas fiquei mais feliz do que cansado.\""
10004075-56 = "Feliz...?"
10004075-57 = "O, o que você está dizendo!? Pare com os elogios! Como eu poderia ficar feliz depois de me envolver em tantos problemas e levar bronca em tantos lugares!?"
10004075-58 = "Não consegui cumprir a promessa com a Saya-san, gastei dinheiro e tempo mesmo tendo muito trabalho, e ainda levei bronca do pessoal da Valkyrie..."
10004075-59 = "Mesmo assim, o que você quer dizer com 'feliz'...!?"
10004075-60 = "[s] \"Poder ver o sorriso da Shun.\""
10004075-61 = "Sorriso..."
10004075-62 = "O, o que tem o sorriso!? Um sorriso vai parar um conflito!?"
10004075-63 = "O sorriso das crianças serve para alguma coisa!?"
10004075-64 = "Porque isso é, isso é...!"
10004075-65 = "[s5] \"...A Shun sabe muito bem, não sabe?\"\n[s6] \"O quão insubstituível é o sorriso puro das crianças.\""
10004075-66 = "..."
10004075-67 = "……。"
10004075-68 = "……Eu acabei pensando que eles eram um incômodo. Eu disse que os "odiava"."
10004075-69 = "Mesmo que isso tenha sido um efeito colateral do remédio... eu disse aquilo para aquelas crianças que são como anjos, que sempre acreditaram em mim e estiveram ao meu lado... e fugi da minha responsabilidade como instrutora, deixando-as para trás."
10004075-70 = "Para alguém como eu, alguém assim..."
10004075-71 = "Será que eu ainda tenho o direito de ficar diante das crianças...?"
10004075-72 = "[s] \"As crianças precisam da Shun.\""
10004075-73 = "Por que você acha isso...?"
10004075-74 = "[s] \"Olhe, ali.\""
10004075-75 = "……?"
10004075-80 = "Ei, ei, Kokona-chan, para onde a Shun-onee-chan foi~?"
10004075-81 = "Eu não quero a comida da Kokona-chan!"
10004075-82 = "Por isso, não é Kokona-chan, é \"Instrutora Kokona\"!"
10004075-83 = "Não tem como evitar que minhas habilidades culinárias não sejam tão boas! A Shun-nee-san é que é excepcionalmente boa nisso...!"
10004075-84 = "……Se não encontrarmos a nee-san hoje, você vai ter que comer a minha comida, entendeu?"
10004075-85 = "Nããão! Eu quero a da Shun-onee-chan!"
10004075-86 = "Shun-onee-chan... onde você está...? Uaaaaa..."
10004075-87 = "Ei, não chore! Mesmo que você chore, a Shun-nee-san não vai voltar por causa disso...!"
10004075-88 = "Quer saber, a que quer chorar aqui sou eu..."
10004075-89 = "Shun-nee-san, para onde você foi de verdade... ugh, uééééé..."
10004075-95 = "……。"
10004075-96 = "……De fato, não posso simplesmente deixá-las sozinhas."
10004075-97 = "Sensei. Poderia me dar o antídoto?"
10004075-103 = "[ns] Entrega o antídoto para Shun."
10004075-104 = "Muito obrigada."
10004075-105 = "……Hoje, eu realmente causei muitos problemas a você."
10004075-115 = "Aquela Shun-nee-san, quando ela voltar, eu vou reclamar bastante com ela...!"
10004075-120 = "Ora, você pode reclamar agora mesmo, se quiser."
10004075-121 = "N-Nee-san!? D-desde quando você...!?"
10004075-122 = "Sim, desculpe a demora♡"
10004075-123 = "Não importa o quão difícil seja, uma instrutora do Jardim Baika não deve mostrar lágrimas na frente das crianças. Kokona-chan, você ainda tem muito o que aprender."
10004075-124 = "E-eu não estava chorando, tá bom...!"
10004075-125 = "M-mais importante, onde você estava!? Como a Shun-nee-san não estava aqui, eu tive que preparar o lanche das crianças e fazer o jantar...!"
10004075-126 = "O preparo do lanche não era originalmente tarefa da Kokona-chan...?"
10004075-127 = "Mas, me desculpe. Por ter sumido de repente..."
10004075-128 = "Da próxima vez, vou comprar aquele sorvete de caramelo com mochi que a Kokona-chan gosta."
10004075-129 = "Ah, sério... quer dizer, não pense que vou ser subornada com um sorvete...!"
10004075-130 = "……M-mas, desta vez, vou abrir uma exceção e te perdoar. A Shun-nee-san sempre se esforça tanto..."
10004075-131 = "Ah, Shun-onee-chan! Onde você estava?"
10004075-132 = "Eu não quero a comida da Kokona-chan! Faz logo a nossa!"
10004075-133 = "Ei, a Kokona-chan fez com tanto esforço, você não deve dizer essas coisas!"
10004075-134 = "Mas a culpa de hoje foi minha... então, que tal fazermos panquecas deliciosas de sobremesa hoje?"
10004075-135 = "Uau! Oba! Eu amo a Shun-onee-chan!"
10004075-136 = "Fufu. Então, vamos comer o jantar que a Kokona-chan preparou com gosto, certo?"
10004075-137 = "Simmm!!"
10004075-145 = "……Falando nisso, eu não me despedi como Xuelin."
10004075-146 = "……Sensei, muito obrigada por tudo."
10004075-147 = "[s] \"……Sim. Até mais, Xuelin.\""
10004075-151 = "……Sim, até mais!"
10004075-153 = "Dito isso, fiquei observando suas costas até que ela desaparecesse de vista."
