[translation]
10004075-1 = "第7話;教官としての"
10004075-2 = "うぅ……なんという災難……。"
10004075-3 = "まさかよりにもよってあのタイミングで、ヴァルキューレの生徒が現れるなんて……。"
10004075-4 = "それにシュンも、思いっきりとぼけるし！そのせいでぼく様と先生が、「幼い少女を無理やり押さえつけて何かを飲ませようとしていた二人組」みたいに思われたじゃないか！！"
10004075-5 = "[s] \"まあ意図はともかく、おおよそ事実だけどね……。\""
10004075-6 = "それにしても、このままだとマズいのだ……。"
10004075-7 = "こうなったら、もっと強力な麻痺薬を……？"
10004075-8 = "[s1] \"……ううん、大丈夫。\"\n[s2] \"私が一度、直接シュンと話してみる。\""
10004075-9 = "でも説得しようにも、今の幼いシュンは話なんて聞いてくれなさそうだぞ……？"
10004075-10 = "でも説得しようにも、今の幼いシュンは話なんて聞いてくれなさそうだぞ……？"
10004075-11 = "それにきっと真正面から行っても、またシュンのいたずらに巻き込まれて撒かれちゃうと思うけど……。"
10004075-12 = "……それにそもそも、今日はぼく様に付き合ってくれる約束じゃなかったのか……？"
10004075-13 = "[s3] \"それについては、本当にごめん……。\"\n[s4] \"また今度、一緒にお出かけしよう。\""
10004075-21 = "……ま、仕方ないのだ。生徒の命運がかかってるんだし。先生とのお出かけを楽しみにしていたのは、ぼく様だけじゃないみたいだし……。"
10004075-22 = "その代わり今度お出かけする時は、ラー油たっぷりで大盛の刀削麺を奢ってもらうのだ！ちゃんとスケジュール空けてよ、先生！"
10004075-23 = "[s] \"うん、約束。\""
10004075-24 = "ふーっふっふっ……！じゃあ、今日の実験はここまでかな。あ、何かぼく様の助けが必要になったら、いつでも連絡して良いぞ！"
10004075-25 = "……ぼく様たち[ruby=せんがいきょう]山海経[/ruby]の時々頼りない教官を、よろしく頼むのだ。先生。"
10004075-29 = "[ns] \"……うん、任せて。\""
10004075-34 = "……みんな嫌いです。"
10004075-35 = "言うことを聞かない梅花園の子たちも、自分の当番を押し付けるココナちゃんも……私を元の身体に戻そうとする先生も嫌いです！"
10004075-36 = "どうしてみんな、私をいじめるんですか……！？"
10004075-37 = "[s] \"ごめんね、いじめたかったわけじゃないんだけど……。\""
10004075-39 = "せ、先生！？"
10004075-40 = "またいつの間に……！？"
10004075-42 = "どうしても、私に例の解毒剤を飲ませようと？"
10004075-43 = "いくら先生でも、そうはさせません。元の姿には、絶対に戻りませんから！"
10004075-44 = "[s] \"……それは、どうして？\""
10004075-45 = "当然でしょう！わざわざあの身体に戻りたいなんて思いません！"
10004075-46 = "お肌はガサガサで、少し走ると息切れして、すぐに肩が凝って……。"
10004075-47 = "……それに、みんな責任ばっかり押し付けてきて……。"
10004075-48 = "……梅花園の教官には、ものによっては玄龍門の幹部に比肩するほどの特権が与えられています。ただしその代わり、責任もかなり重いです。"
10004075-49 = "お仕事の間は、子どもたちが目を覚ましてから眠るまでの間、ひと時も目を離すわけにはいきません。何かが起きれば全て事後処理をしなくてはいけませんし、それらに忙殺されて、本来私も山海経の生徒として受けるはずだった普通の授業を受けられない……そんなこともざらです。"
10004075-50 = "……私は、疲れました。子どもたちの面倒を見ていても、辛いことばっかりで……。"
10004075-51 = "[s] \"……本当にそう思う？\""
10004075-52 = "今日一日、子どもみたいに好き勝手に過ごしてみて……すっごく楽でした。"
10004075-53 = "先生も大人ですから、ご存知ですよね？子どもたちの面倒を見るということが、どれだけ大変なことなのか……。"
10004075-54 = "責任を負うというのは、すっごく大変です。疲れます。しんどいです。先生も今日一日私の面倒を見て、疲れましたよね？"
10004075-55 = "[s] \"疲れてないと言ったら噓だけど、それ以上に嬉しかったよ。\""
10004075-56 = "嬉しかった……？"
10004075-57 = "な、何のことですか！？お世辞はやめてください！あんなにトラブルに巻き込まれて、色んなところで怒られて、嬉しいわけがないじゃないですか！？"
10004075-58 = "サヤさんとの約束も守れなくなってしまって、お仕事も忙しいはずなのにお金も時間も使ってしまって、ヴァルキューレの方にも怒られて……。"
10004075-59 = "それなのに、何が嬉しかったって言うんですか……！？"
10004075-60 = "[s] \"シュンの笑顔を見られたことが。\""
10004075-61 = "笑顔……。"
10004075-62 = "え、笑顔が何だって言うんですか！？笑顔で抗争が止まるんですか！？"
10004075-63 = "子どもたちの笑顔が、何かの役に立つんですか！？"
10004075-64 = "だってそれは、それは……っ。"
10004075-65 = "[s5] \"……それは、シュンもよく知ってるでしょう？\"\n[s6] \"子どもたちの純粋な笑顔が、どれだけかけがえのないものなのか。\""
10004075-66 = "……。"
10004075-67 = "……。"
10004075-68 = "……私は、迷惑だと思ってしまいました。「嫌い」だと、言ってしまいました。"
10004075-69 = "たとえこれが薬の副作用だとしても……いつも私のことを信じてそばにいてくれた、あの天使のような子たちに対して、そんなことを口にして……あの子たちを置いて、教官の責任から逃げ出しました。"
10004075-70 = "こんな、こんな私に……。"
10004075-71 = "まだ子どもたちの前に立つ資格は、あるんでしょうか……？"
10004075-72 = "[s] \"あの子たちには、シュンが必要だよ。\""
10004075-73 = "どうして、そう思うんですか……？"
10004075-74 = "[s] \"見て、あっち。\""
10004075-75 = "……？"
10004075-80 = "ねえねえココナちゃーん、シュンお姉ちゃんはどこ行ったの～？"
10004075-81 = "ココナちゃんのご飯はやだー！"
10004075-82 = "だからココナちゃんじゃなくて、「ココナ教官」！"
10004075-83 = "料理の腕は仕方ないでしょ！シュン姉さんがとびっきり上手なんだから……！"
10004075-84 = "……もし今日姉さんが見つからなかったら、ちゃんと私のを食べなさいよ？"
10004075-85 = "やーだー！シュンおねえちゃんのが良いのーー！"
10004075-86 = "シュンおねぇちゃん……どこぉー……？うぁぁぁぁん……！"
10004075-87 = "ちょっ、泣かないの！泣いてもシュン姉さんが帰ってくるわけじゃないんだから……！"
10004075-88 = "っていうか、泣きたいのは、私の方で……。"
10004075-89 = "シュン姉さん、本当にどこ行ったの……うぅっ、うぇぇぇぇぇっ……！"
10004075-95 = "……。"
10004075-96 = "……確かに、あの子たちを放っておくわけにはいきませんね。"
10004075-97 = "先生。解毒剤、頂いても良いですか？"
10004075-103 = "[ns] シュンに解毒剤を渡す。"
10004075-104 = "ありがとうございます。"
10004075-105 = "……今日は本当に、たくさんご迷惑をおかけしました。"
10004075-115 = "もうシュン姉さんったら、戻ってきたらたっぷり文句言ってやるんだから……！"
10004075-120 = "あら、今言っていただいても良いんですよ？"
10004075-121 = "ね、姉さん！？い、いつの間に……！？"
10004075-122 = "はい、お待たせしました♡"
10004075-123 = "いくら辛くても、梅花園の教官が子どもたちの前で涙を見せちゃダメですよ。ココナちゃんもまだまだですね。"
10004075-124 = "べ、別に泣いてないから……っ！"
10004075-125 = "そ、それよりどこに行ってたの！？シュン姉さんがいないから子どもたちのおやつの準備も、晩ご飯を作るのも、私がしないといけなくなったんだよ……！？"
10004075-126 = "おやつの準備は、元々ココナちゃんの当番だったような……。"
10004075-127 = "でも、ごめんなさい。急にいなくなったりして……。"
10004075-128 = "今度、ココナちゃんが好きな「バーゲンダッツ」のキャラメル味お餅入りを買ってあげますね。"
10004075-129 = "えっ、やった……って、アイスクリーム一個じゃごまかされないよ……！？"
10004075-130 = "……で、でも今回は特別に、許してあげる。シュン姉さん、いっつも頑張ってるし……。"
10004075-131 = "あ、シュンおねえちゃん！どこ行ってたのー？"
10004075-132 = "ココナちゃんのご飯はイヤ～！早く作って～！"
10004075-133 = "こらっ、ココナちゃんが一生懸命作ってくれたのに、そんなことを言ってはダメですよ！"
10004075-134 = "ですが今日のは私のせいですし……そうですね、では今日は食後のデザートに、美味しいパンケーキを作りましょう！"
10004075-135 = "わぁー！やったぁ！シュンおねえちゃん大好き！"
10004075-136 = "ふふっ。ですから、ココナちゃんが作ってくれた晩ご飯も美味しくいただきましょうね？"
10004075-137 = "は～い！！"
10004075-145 = "……そういえば、シュエリンとして挨拶をしていませんでしたね。"
10004075-146 = "……先生、本当にありがとうございました。"
10004075-147 = "[s] \"……うん。またね、シュエリン。\""
10004075-151 = "……はい、また！"
10004075-153 = "そうして、シュンのことが見えなくなるまで、その後姿をじっと見ていた。"
