[translation]
2004203-1 = "Realidade Aumentada"
2004203-2 = "（No fim de semana, conforme prometido com Maki, visitei a montanha perto de Millennium）"
2004203-7 = "Ugh, ughhh..."
2004203-8 = "[s1] \"Bom dia, Maki.\"\n[s2] \"O que está fazendo no celular?\""
2004203-11 = "Ah, você já chegou."
2004203-12 = "Desculpa, espera só um pouquinho.#nAinda não terminei as diárias de hoje..."
2004203-13 = "Já limpei a dungeon diária e gastei toda a minha estamina, então—"
2004203-14 = "Pronto, agora sim!"
2004203-18 = "[ns3] \"A gente veio até a montanha...\n[ns4] \"Não vai aproveitar a vista?\""
2004203-21 = "Ah, não precisa se preocupar com isso."
2004203-22 = "……É um jogo de Realidade Aumentada, afinal!"
2004203-23 = "Olha só. Ele se move de acordo com o terreno captado pela câmera, viu?#nEntão dá para jogar enquanto aproveito a paisagem ao redor."
2004203-24 = "[s] \"Não foi bem isso que eu quis dizer...\""
2004203-25 = "Além disso, a recepção de sinal nesta trilha é melhor do que no acampamento anterior."
2004203-26 = "Na verdade, o motivo de eu ter sugerido vir à montanha hoje foi—"
2004203-31 = "Ah, não dá para ficar parado!#nOs dias de inverno são curtos!"
2004203-32 = "Professor, vamos logo!#nSe escurecer, não vai dar para ver a paisagem!"
2004203-43 = "Hmm, tenho certeza que era por aqui."
2004203-44 = "[s5] \"Olhe para onde está andando.\"\n[s6] \"É perigoso andar olhando para o celular.\""
2004203-47 = "Ugh, tá bom, tá bom."
2004203-48 = "……Que estranho.#nO guia dizia que era por aqui."
2004203-49 = "Será que eu errei as coordenadas?"
2004203-50 = "[s] \"Está procurando alguma coisa?\""
2004203-51 = "Mais do que uma coisa, é quase um animal selvagem—"
2004203-55 = "Achei!"
2004203-56 = "Professor, olha!#nÉ uma \"Doninha Dourada\"!"
2004203-57 = "[s] \"Eu não estou vendo nada...\""
2004203-58 = "Não é aí, é no meu celular."
2004203-59 = "Pela tela, dá para ver a doninha dourada correndo, não dá?"
2004203-60 = "Hehe. A doninha dourada dá as melhores recompensas do jogo.#nMas, por outro lado, é quase impossível de achar em áreas comuns."
2004203-61 = "Um jogador disse que ela aparecia nesta trilha, então resolvi vir conferir—#nQuem diria que ela estaria aqui mesmo!"
2004203-62 = "[s7] \"O motivo de vir à montanha hoje foi...\"\n[s8] \"Por acaso, foi por causa desse jogo de RA?\""
2004203-65 = "Sim, exatamente!"
2004203-69 = "P-por que está me olhando assim!?"
2004203-70 = "A Chihiro-senpai disse que não tinha problema jogar RA!"
2004203-71 = "Disse que é bom para a saúde porque a gente se exercita!"
2004203-72 = "[s9] \"Isso é verdade, mas...\"\n[s10] \"É um desperdício ter vindo até a montanha e ficar só nisso...\""
2004203-75 = "Ugh, que sermão de adulto... bem, você é um adulto, então é normal, né."
2004203-80 = "É falta de educação ficar só no celular depois de você ter vindo até aqui..."
2004203-81 = "Vamos brincar de outra coisa!"
2004203-82 = "Já sei, que tal uma corrida?#nQuem chegar primeiro naquele vale ali ganha!"
2004203-83 = "Quem perder paga um suco, Professor!"
2004203-87 = "[ns] \"E-espera...!\""
2004203-92 = "Hehe, eu ganhei!"
2004203-96 = "Ora, ora... será que quem está fora de forma é você, Professor?"
2004203-97 = "[s11] \"É que ultimamente fico sentado o dia todo...\"\n[s12] \"Subestimei a resistência dos alunos...\""
2004203-104 = "……Hmm, esse vale aqui parece meio sem graça."
2004203-105 = "Queria que tivesse um pouco mais de cor."
2004203-106 = "[s13] \"Pelo que pesquisei, este lugar é famoso pelas folhas de outono.\"\n[s14] \"Talvez por ter passado a temporada, esteja um pouco vazio.\""
2004203-109 = "É verdade..."
2004203-114 = "Ah, tive uma ótima ideia!"
2004203-115 = "Professor, espere um pouco!"
2004203-120 = "Pronto, Professor.#nDê uma olhada na paisagem pelo meu celular!"
2004203-121 = "[ns] \"Vejamos...\""
2004203-128 = "[ns15] \"...Incrível, que folhas de outono lindas.\"\n[ns16] \"Como você fez isso?\""
2004203-131 = "É uma função de realidade aumentada!"
2004203-132 = "Com o sistema do jogo, dá até para adicionar efeitos especiais!"
2004203-133 = "Usei essa função para recriar as folhas de outono no vale."
2004203-134 = "O mundo visto através da realidade aumentada não é nada mal, né?"
2004203-135 = "[s17] \"Com certeza, é incrível...\"\n[s18] \"É até mais colorido que a realidade.\""
2004203-138 = "Não é?#nCom uma caneta e inspiração, dá para criar paisagens ainda mais divertidas!"
2004203-139 = "Já que estamos aqui, eu desenho qualquer coisa para você!"
2004203-140 = "Professor, que tipo de paisagem você quer ver?"
2004203-141 = "[s] \"Deixe-me ver, por exemplo...\""
2004203-146 = "(Depois disso, passamos um tempo agradável observando a paisagem colorida pela Maki)"
