[translation]
2004203-1 = "拡張現実"
2004203-2 = "（週末、マキと約束した通り、ミレニアム近くの山を訪れた）"
2004203-7 = "うっ、うぐぐ……。"
2004203-8 = "[s1] \"おはよう、マキ。\"\n[s2] \"スマホで何してるの？\""
2004203-11 = "あっ、もう来たんだ。"
2004203-12 = "ごめん、ちょっと待ってね。#nまだ今日のデイリーが……。"
2004203-13 = "曜日ダンジョンもクリアしたし、スタミナも全部消費したから――"
2004203-14 = "うん、これで完了！"
2004203-18 = "[ns3] \"せっかく山まで来たのに……。\"\n[ns4] \"景色を楽しまないの……？\""
2004203-21 = "あ、それなら心配しないで。"
2004203-22 = "……[ruby=AR]拡張現実[/ruby]ゲームだからね！"
2004203-23 = "見て、これ。カメラで撮られた地形に沿って動いてるでしょ？#nだからゲームしながら、周りの景色を楽しめるんだ。"
2004203-24 = "[s] \"そういう意味で言ったつもりじゃ……。\""
2004203-25 = "それにここの登山道は、前のキャンプ場よりも電波が良いからね。"
2004203-26 = "実は今日、山に行こうって言ったのも――"
2004203-31 = "はっ、こうしてる場合じゃない！#n冬の山は日が短いんだった！"
2004203-32 = "先生、早く行こ！#n暗くなると景色が見えなくなるから！"
2004203-43 = "うーん、たしかこの辺にあったような。"
2004203-44 = "[s5] \"ちゃんと前を見て歩いてね。\"\n[s6] \"歩きスマホは危ないよ。\""
2004203-47 = "う～、分かったよ。"
2004203-48 = "……おかしいなぁ。#n攻略サイトだと、この辺りって書いてあったのに。"
2004203-49 = "もしかして、座標を間違えてるのかな？"
2004203-50 = "[s] \"探し物でもしてるの？\""
2004203-51 = "物っていうより、野生動物に近いけど――"
2004203-55 = "あった！"
2004203-56 = "先生、見て！#n「黄金イタチ」だよ！"
2004203-57 = "[s] \"私には見えないけど……。\""
2004203-58 = "そっちじゃなくて、あたしのスマホ。"
2004203-59 = "画面越しだと、金色のイタチが走ってるでしょ？"
2004203-60 = "ふふっ。黄金イタチはね、このゲームで一番報酬が美味しいの。#nその分、普通のエリアじゃ全然見つからないんだけどね。"
2004203-61 = "あるプレイヤーが、この登山道に現れるって言ってたから来てみたけど――#nまさか本当にいるなんて！"
2004203-62 = "[s7] \"今日、山に来た理由は……。\"\n[s8] \"もしかして、そのARゲームのために？\""
2004203-65 = "うん、そうだよ？"
2004203-69 = "な、なんでそんな目で見るの！？"
2004203-70 = "チヒロ先輩もARゲームは大丈夫って言ってたよ！？"
2004203-71 = "運動になるから、健康にも良いって！"
2004203-72 = "[s9] \"それはそうなんだけど……。\"\n[s10] \"せっかく山まで来たのに、もったいないような……。\""
2004203-75 = "うっ、大人みたいな小言を……って、大人だから当たり前だよね。"
2004203-80 = "わざわざ来てもらったのに、スマホばっかり見てたら失礼だし……。"
2004203-81 = "何かして遊ぼう！"
2004203-82 = "そうだ、レースはどう？#nあっちの渓谷まで先に着いた人の勝ち！"
2004203-83 = "負けたらジュースね、先生！"
2004203-87 = "[ns] \"ま、待って……！\""
2004203-92 = "ふふっ、あたしの勝ち～！"
2004203-96 = "な～んだ、もしかして運動不足なのは先生のほうじゃない？"
2004203-97 = "[s11] \"最近ずっと座りっぱなしで体が……。\"\n[s12] \"生徒の体力を侮ってたよ……。\""
2004203-104 = "……うーん、ここの渓谷、なんか物足りないような。"
2004203-105 = "もうちょっと色が欲しいなぁ。"
2004203-106 = "[s13] \"調べてみたら、ここって紅葉が有名らしいね。\"\n[s14] \"シーズンが過ぎたせいか、少し寂しいね。\""
2004203-109 = "だね……。"
2004203-114 = "あっ、良いアイデアを思いついたよ！"
2004203-115 = "先生、ちょっと待っててね！"
2004203-120 = "はい、先生。#nあたしのスマホで景色を見てみて！"
2004203-121 = "[ns] \"どれどれ……。\""
2004203-128 = "[ns15] \"……すごい、きれいな紅葉だ。\"\n[ns16] \"これ、どうやったの？\""
2004203-131 = "拡張現実の機能だよ！"
2004203-132 = "ゲームのシステムで、特殊なエフェクトもつけられるんだ！"
2004203-133 = "その機能を使って、渓谷に紅葉を再現してみたの。"
2004203-134 = "拡張現実を通じて見る世界も悪くないでしょ？"
2004203-135 = "[s17] \"たしかに、すごいね……。\"\n[s18] \"現実よりも色鮮やかだね。\""
2004203-138 = "そうでしょ？#nペンとインスピレーションがあれば、もっと楽しい景色にできるよ！"
2004203-139 = "せっかくだし、あたしが何でも描いてあげる！"
2004203-140 = "先生、どんな景色が見たい？"
2004203-141 = "[s] \"そうだね、例えば……。\""
2004203-146 = "（その後、マキが彩った景色を見ながら、楽しい時間を過ごした）"
