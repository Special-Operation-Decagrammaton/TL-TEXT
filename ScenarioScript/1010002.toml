[translation]
1010002-1 = "専門家"
1010002-4 = "おはよう、先生。"
1010002-5 = "[s] \"おはよう、意外な場所で驚いたよ。\""
1010002-6 = "……そう？"
1010002-7 = "買い物は必要。"
1010002-8 = "商店街に寄ったら、色々と買っておいたほうが効率的。"
1010002-9 = "先生も何か必要？#n最近お金をたくさん手に入れたから、買ってあげる。"
1010002-10 = "[s1] \"…………。\"\n[s2] \"……たくさんのお金を、どうやって？\""
1010002-13 = "ん。"
1010002-14 = "[s] \"まさか、銀行から……？\""
1010002-15 = "……ち、違うよ。#n銀行は襲ってない。"
1010002-18 = "……ち、違うよ。#n銀行は襲ってない。"
1010002-19 = "対策委員会に迷惑はかけたくないし。#nもし逮捕されたら、こっちのシロコが誤解されるかもしれないから。"
1010002-20 = "もちろん、私は捕まるわけないけど。"
1010002-21 = "これは、ちゃんと自分で稼いだお金。#n心配しないで、先生。"
1010002-22 = "[s] \"アルバイトでもしてるの？\""
1010002-23 = "……ん、大体そんな感じ。"
1010002-24 = "最近アビドスにも人が増えてきたおかげで、#n稼げるようになってきた。"
1010002-28 = "[ns] \"良かったね。\""
1010002-30 = "（シロコと買い物をしてから、商店街をあとにした）"
1010002-35 = "買い物、楽しかった……ありがとう。"
1010002-36 = "あっ、荷物は私が持つよ。"
1010002-37 = "[s] \"大丈夫、シロコも両手いっぱいでしょ？\""
1010002-38 = "でも……。"
1010002-39 = "[s] \"シロコの家まで運べば良い？\""
1010002-40 = "私の、家……？"
1010002-41 = "……そ、それは。"
1010002-42 = "散らかってるから、ちょっと……。"
1010002-43 = "[s] \"どんな風に暮らしてるのか気になったんだけど……。\""
1010002-47 = "……ん、分かった。"
1010002-48 = "家庭訪問みたいなものだよね。"
1010002-52 = "こっち、先生。"
1010002-57 = "[ns] シロコに付いていく。"
1010002-62 = "廃ビルの入口"
1010002-64 = "ん。"
1010002-65 = "[s3] \"廃墟だよね……？\"\n[s4] \"ここに住んでるの……？\""
1010002-68 = "ううん、近道だよ。"
1010002-69 = "この廃墟を通り抜ければ、時間が短縮できる。"
1010002-70 = "[s] \"……なるほど。\""
1010002-71 = "まだ、もう少し歩くよ。"
1010002-76 = "狭いから気を付けて。"
1010002-77 = "[s] \"……まさか、ここで暮らしてるの？\""
1010002-78 = "ここは前の仮住まい。#n今はもっとちゃんとした所に住んでるよ。"
1010002-79 = "[s] \"ま、前の家！？\""
1010002-80 = "……い、行こうか。"
1010002-83 = "砂に埋もれた住宅街"
1010002-87 = "[ns5] \"捨てられた住宅街……。\"\n[ns6] \"そっか、どこも空き家になってるから……。\""
1010002-90 = "ん、有効利用。"
1010002-91 = "[s7] \"大変じゃない？\"\n[s8] \"電気とか水道とか通ってないと思うけど……。\""
1010002-94 = "ん？#nたしかに、この家は不便だね。"
1010002-95 = "[s] \"……うん？\""
1010002-96 = "あ、私が住んでるところはまだ先。"
1010002-97 = "ごめん、説明が足りなかった。"
1010002-102 = "[ns] \"……。\""
1010002-106 = "到着、ここだよ。"
1010002-110 = "入って。"
1010002-122 = "ここが、私の部屋。"
1010002-123 = "何日か掃除できてないから、散らかってるけど。"
1010002-127 = "[ns9] \"ここがシロコの部屋なんだね。\"\n[ns10] \"普通の生活をしてるんだね。\""
1010002-130 = "普通……そうかも？"
1010002-131 = "[s] \"買ってきた物は、どこに置けば良い？\""
1010002-132 = "あ、牛乳は冷蔵庫で……洗剤はあっちの棚に……。"
1010002-133 = "[s11] \"電気が通ってるんだね！\"\n[s12] \"水道も使えるんだ！\""
1010002-136 = "暑いし、クーラー点けるね。"
1010002-141 = "[ns] \"クーラーまで……！？\""
1010002-142 = "……どこか変？"
1010002-143 = "[s] \"ううん、しっかりしてて安心したよ！\""
1010002-144 = "元々は、電気も水道も通ってなかったけど……。"
1010002-145 = "昔の生徒会が設置した太陽光発電が近くにあったから、#nそれを借りてる。"
1010002-146 = "非常時のために、自転車で発電する仕組みもあるよ。#n燃料を使って発電もできる。"
1010002-147 = "[s] \"す、すごい……。\""
1010002-148 = "上水は通ってないけど、タンクが数十個あるから大丈夫。"
1010002-149 = "ちゃんと浄水してるから、そのまま飲めるよ。"
1010002-150 = "あっちの車庫は、自転車を修理する用。#n上の階には、ジムを作った。"
1010002-151 = "捨てられてる自転車のパーツを集めたら、#nわざわざ買わなくても組めるの。"
1010002-152 = "[s] \"おぉ、すごいね！\""
1010002-153 = "廃品を修理して市場で売れば、結構儲かる。"
1010002-154 = "[s] \"な、なるほど……。\""
1010002-155 = "ん。#n最近はアビドスに人が増えたおかげで、需要があるみたい。"
1010002-159 = "[ns] \"心配いらなかったね。\""
1010002-160 = "ん。"
1010002-162 = "専門家だから、任せて。"
1010002-172 = "（遅くならないうちに、帰ることにした）"
1010002-177 = "[ns] \"それじゃあ、また連絡するね。\""
1010002-178 = "……もしかしたら、繋がらないかもしれないけど。#nしばらく、ここを離れるから。"
1010002-179 = "[s13] \"離れるって？\"\n[s14] \"ロングライドでもするの？\""
1010002-184 = "ロングライド……懐かしいね。#n……もう、ライディングは辞めたんだ。"
1010002-185 = "[s] \"えっ。\""
1010002-186 = "……。"
1010002-187 = "[ns] \"ど、どうして……？\""
1010002-191 = "……探しているものがあって。"
1010002-192 = "すぐ出るわけじゃないから、また会いに来てほしい。"
1010002-196 = "それじゃ……。"
