[translation]
1003620-1 = "Piquenique de Furoshiki"
1003620-2 = "（Ao chegar ao parque no horário combinado, Hinata estava esperando no mesmo lugar de antes.）"
1003620-3 = "（Hinata segurava uma bolsa grande enquanto acenava animadamente com a outra mão.）"
1003620-7 = "Ah, Sensei!"
1003620-8 = "Já estou indo aí,"
1003620-9 = "por favor, espere um pouco!"
1003620-18 = "Obrigada por vir mesmo estando sempre tão ocupado!#nEu estava esperando por você!"
1003620-19 = "[s1] \"Desculpe, acabei me atrasando um pouco.\"\n[s2] \"Te fiz esperar bastante, né...\""
1003620-20 = "……？"
1003620-21 = "……？"
1003620-22 = "N-não, não é isso! Não foi nesse sentido...!#nEu também cheguei faz poucos minutos...!"
1003620-23 = "Não quis dizer nesse sentido, é que... me desculpe."
1003620-24 = "……？ D-desculpe,"
1003620-25 = "acabamos ficando os dois pedindo desculpas..."
1003620-26 = "……E-estou parecendo muito animada?"
1003620-27 = "É assim que eu pareço...?"
1003620-31 = "Eu achei que estava agindo como sempre..."
1003620-32 = "O Sensei percebeu tudo, não é?"
1003620-36 = "……Fufu."
1003620-37 = "[s3] \"Fico feliz que a Hinata esteja se divertindo.\"\n[s4] \"Eu também estava ansioso para te ver.\""
1003620-38 = "Sensei……."
1003620-39 = "Sensei……."
1003620-43 = "Ah, eu tinha esquecido! Tinha algo para fazer antes de conversarmos."
1003620-44 = "Você está com fome? Assim como no outro dia, hoje eu também preparei uma marmita!#nSe não se importar, gostaria de comer comigo...!"
1003620-48 = "Obrigada!#nEntão, vou estender a toalha de piquenique..."
1003620-53 = "[ns5] \"……É, é grande, né?\"\n[ns6] \"Isso tem o tamanho de uma enciclopédia bem grossa...?\""
1003620-54 = "E-eu fiquei com medo de não ser o suficiente..."
1003620-55 = "E-eu fiquei com medo de não ser o suficiente..."
1003620-56 = "Ah, não se preocupe.#nO que sobrar, eu como tudo!"
1003620-60 = "……."
1003620-61 = "Do jeito que eu falei agora, parece que eu sou uma comilona..."
1003620-62 = "B-bem, de qualquer forma!"
1003620-63 = "Sensei, por favor, coma à vontade!"
1003620-69 = "Eu preparei com todo o meu carinho..."
1003620-74 = "……Eh?"
1003620-78 = "A-ah, ué... a marmita...?"
1003620-84 = "……Um livro?"
1003620-85 = "[s7] \"Pensei que fosse uma marmita, mas é um livro...?\"\n[s8] \"É um livro muito grosso...\""
1003620-86 = "……Eh?"
1003620-87 = "……Eh?"
1003620-88 = "P-por que... por que o \"Livro de Inventário\" está aqui..."
1003620-92 = "E-eu tinha certeza que tinha preparado e colocado a marmita...?"
1003620-93 = "P-por que...!?"
1003620-94 = "[s9] \"C-calma, Hinata!\"\n[s10] \"Tudo bem, eu também faço muito isso!\""
1003620-95 = "M-mas a marmita...!"
1003620-96 = "M-mas a marmita...!"
1003620-97 = "Uuu, deixei o Sensei com fome... no fim, acabei causando problemas de novo..."
1003620-98 = "……."
1003620-99 = "D-desculpe……."
1003620-103 = "[ns11] Pego o \"Livro de Inventário\" que estava embrulhado no furoshiki.\n[ns12] \"É um livro bem grosso. Tudo bem se eu der uma olhada?\""
1003620-110 = "Ah, isso é, bem..."
1003620-111 = "Não tem problema se você quiser ver, mas acho que não é nada interessante..."
1003620-112 = "Como o nome sugere, é apenas um registro dos suprimentos da catedral que eu gerencio..."
1003620-117 = "……Sensei? #nVocê está lendo com tanta seriedade... aconteceu alguma coisa?"
1003620-118 = "S-sim, eu realmente registro tudo detalhadamente, não é...?"
1003620-119 = "Nossa catedral é muito grande... e, por causa disso, a quantidade de suprimentos para gerenciar acaba sendo enorme..."
1003620-120 = "Milhares... não, talvez existam dezenas de milhares."
1003620-121 = "Como não é uma quantidade que eu consiga memorizar, acabo mantendo esses registros."
1003620-122 = "Além disso, eu sou um pouco distraída... então faço isso para não esquecer de nada."
1003620-123 = "Hehe..."
1003620-124 = "[s13] \"Ser meticulosa é uma boa qualidade.\"\n[s14] \"Hinata, seu trabalho é muito cuidadoso.\""
1003620-130 = "……？"
1003620-131 = "É-é a primeira vez que me dizem isso...! Eu sempre cometo erros... hoje mesmo, confundi meu registro com a minha marmita..."
1003620-132 = "E sobre isso, eu só estou registrando as coisas mesmo..."
1003620-136 = "……？"
1003620-137 = "Isso é importante...?"
1003620-138 = "[s15] \"Conseguir compensar seus pontos fracos é porque você é meticulosa.\"\n[s16] \"Porque acho importante a forma como você encara a si mesma.\""
1003620-143 = "……！"
1003620-147 = "……Ah, Sensei? O que é isso?"
1003620-148 = "……Ah."
1003620-152 = "A-a marmita...!?"
1003620-153 = "Sensei, você também trouxe uma marmita?"
1003620-154 = "[s17] \"Eu também não costumo ser muito meticuloso, na verdade...\"\n[s18] \"Pensei em dividir minha marmita com você, Hinata.\""
1003620-157 = "Sensei..."
1003620-158 = "Como posso dizer... muito obrigada..."
1003620-159 = "Graças a você, não vou precisar ficar com fome."
1003620-160 = "……Fufu."
1003620-161 = "Muito obrigada mesmo...!"
1003620-163 = "(Depois disso, enquanto comíamos a marmita com a Hinata, dei uma olhada no registro de inventário.)"
1003620-164 = "(Nas páginas extensas, havia muitos itens inesperados, e a conversa continuou agradável mesmo depois de terminarmos de comer.)"
1003620-168 = "(Foi tão divertido que perdi a noção do tempo, mas levei a Hinata de volta antes que ficasse muito tarde.)"
