[translation]
1003620-1 = "風呂敷ピクニック"
1003620-2 = "（約束の時間に合わせて公園へ行くと、前と同じ場所でヒナタが待っていた）"
1003620-3 = "（ヒナタは大きなカバンを持ちながら、もう片方の手で大きく手を振ってきた）"
1003620-7 = "あっ、先生！"
1003620-8 = "すぐそちらに行きますから、"
1003620-9 = "待っていてください！"
1003620-18 = "いつもお忙しいところ来てくださってありがとうございます！#nお待ちしておりました！"
1003620-19 = "[s1] \"ごめん、ちょっと遅くなっちゃった。\"\n[s2] \"結構待たせちゃったね……。\""
1003620-20 = "……？"
1003620-21 = "……？"
1003620-22 = "い、いえいええ！そういう意味ではなく……！#n私も到着してからまだ数分しか経っていませんし……！"
1003620-23 = "そういう意味で言ったわけではなく、その……ごめんなさい。"
1003620-24 = "……？す、すみません、"
1003620-25 = "何だかお互いに謝る形に……。"
1003620-26 = "……う、浮かれてますでしょうか？"
1003620-27 = "そう見えますかね……？"
1003620-31 = "いつものように振る舞えていると思ったのですが……。"
1003620-32 = "先生にはお見通しでしたね。"
1003620-36 = "……ふふっ。"
1003620-37 = "[s3] \"ヒナタが楽しそうで良かった。\"\n[s4] \"私も、会えるの楽しみにしてたよ。\""
1003620-38 = "先生……。"
1003620-39 = "先生……。"
1003620-43 = "あ、うっかりしていました！お話よりも先にすることがあったのです。"
1003620-44 = "お腹は空いていますか？先日と同じように、今日もお弁当を作ってきたんです！#nよろしければご一緒にと……！"
1003620-48 = "ありがとうございます！#nではレジャーシートを敷いて、っと……。"
1003620-53 = "[ns5] \"……お、大きいね？\"\n[ns6] \"これ、かなり大きい百科事典みたいなサイズだね……？\""
1003620-54 = "た、足りないと困るかなと……"
1003620-55 = "た、足りないと困るかなと……"
1003620-56 = "あ、ご心配なく。#n残った分は全て私が食べますから！"
1003620-60 = "……。"
1003620-61 = "何だか今の言い方ですと、私がすごく大食漢みたいな……。"
1003620-62 = "と、とにかく！"
1003620-63 = "先生は遠慮せずに召し上がってください！"
1003620-69 = "精一杯、心を込めて作って来ましたので……"
1003620-74 = "……えっ？"
1003620-78 = "あ、あれ……お弁当が……？"
1003620-84 = "……本？"
1003620-85 = "[s7] お弁当かと思いきや、本が……？\"\n[s8] \"すごく分厚い本だ……。\""
1003620-86 = "……え？"
1003620-87 = "……え？"
1003620-88 = "な、なんで……どうして「物品管理台帳」がここに……。"
1003620-92 = "た、確かにお弁当を作って入れたはず……？"
1003620-93 = "ど、どうして……！？"
1003620-94 = "[s9] \"お、落ち着いてヒナタ！\"\n[s10] \"大丈夫、私もよくやる！\""
1003620-95 = "で、ですがお弁当が……！"
1003620-96 = "で、ですがお弁当が……！"
1003620-97 = "うぅ、先生のお腹を空かせたままになってしまい……結局またご迷惑を……。"
1003620-98 = "……。"
1003620-99 = "ご、ごめんなさい……。"
1003620-103 = "[ns11] 風呂敷に包まれていた「物品管理台帳」を手に取る。\n[ns12] \"すごく分厚い本だね。これ、見ても大丈夫？\""
1003620-110 = "あ、それは、その……。"
1003620-111 = "見ていただいても大丈夫なのですが、面白くはないかと……。"
1003620-112 = "名前通り、私が管理している聖堂の備品を記録したものですので……。"
1003620-117 = "……先生？#nそんな真剣に読まれて……何かありましたか？"
1003620-118 = "は、はい、確かに細かく記録してはいますね……？"
1003620-119 = "私たちの聖堂、すごく大きいので……それに伴い、管理する備品も多くなりがちで……。"
1003620-120 = "数千……いや、数万はあるかもしれません。"
1003620-121 = "流石に覚えておける量ではないので、こうして記録をつけているのです。"
1003620-122 = "そもそも私は、抜けているところが多いのもあって……それで、忘れないようにしておければと。"
1003620-123 = "えへへ……。"
1003620-124 = "[s13] \"几帳面なのは良いことだね。\"\n[s14] \"ヒナタは仕事が丁寧だね。\""
1003620-130 = "……？"
1003620-131 = "そ、そんなこと初めて言われました……！私、いつもドジをしてばかりなのに……今日もお弁当と台帳を間違えて……。"
1003620-132 = "それについても、ただ記録しているだけですし……。"
1003620-136 = "……？"
1003620-137 = "それが大切……？"
1003620-138 = "[s15] \"短所をカバーできるのも、几帳面だからだよ。\"\n[s16] \"自分に向き合う姿勢が大切だと思うから。\""
1003620-143 = "……！"
1003620-147 = "……あれ、先生？それ、どうされたんですか？"
1003620-148 = "……あっ。"
1003620-152 = "お、お弁当……！？"
1003620-153 = "先生も、お弁当を持ってきてたんですか？"
1003620-154 = "[s17] \"私も、いつもは几帳面って感じではないんだけど……。\"\n[s18] \"ヒナタに、私のお弁当も食べてもらおうかなって。\""
1003620-157 = "先生……。"
1003620-158 = "何と言うかその、ありがとうございます……。"
1003620-159 = "おかげ様で、お腹を空かせずに済みました。"
1003620-160 = "……ふふっ。"
1003620-161 = "本当に、ありがとうございます……！"
1003620-163 = "（その後ヒナタと一緒にお弁当を食べながら、物品管理台帳に目を通した）"
1003620-164 = "（膨大なページには意外な物品も多く、お弁当を食べ終わっても楽しい会話が続いた）"
1003620-168 = "（時間を忘れるくらい楽しかったが、遅くなる前にヒナタを送り届けた）"
