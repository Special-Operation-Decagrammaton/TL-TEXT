[translation]
80000037-1 = "Uma recompensa feita com carinho"
80000037-2 = "（Caminhando de volta com Aru, depois de resolvermos juntos um pedido que chegou à Problem Solver 68...）"
80000037-3 = "Bom trabalho hoje também, Sensei."
80000037-4 = "[s] \"Sim, bom trabalho para você também, Aru.\""
80000037-5 = "No começo eu não sabia como as coisas iam acabar, mas no fim das contas, você e eu somos os melhores parceiros."
80000037-6 = "A cara que aqueles caras fizeram no momento em que pousamos no local com tanta elegância..."
80000037-7 = "Hehe, chega a dar um frio na espinha, não é?♪"
80000037-8 = "Já que resolvemos o pedido de hoje com perfeição, o nome da Problem Solver 68 com certeza vai se espalhar ainda mais!"
80000037-9 = "Se continuarmos assim, todos os alunos de Gehenna, não, eventualmente todos os alunos de Kivotos vão tremer só de ouvir \"Problem Solver 68\"... Esse dia não deve estar tão longe, né?"
80000037-10 = "[s] \"Com certeza, talvez seja assim mesmo.\""
80000037-11 = "Hehe, eu sabia!"
80000037-12 = "Ah, mas se o nome se espalhar rápido demais, isso pode acabar sendo um problema também..."
80000037-13 = "Se a \"Problem Solver 68\" se tornar uma existência grandiosa demais e ninguém mais puder se aproximar, seria um problema, não seria?"
80000037-14 = "Aceitamos qualquer trabalho desde que haja dinheiro, somos perigosos, mas confiáveis nos momentos importantes... esse é o lema que quero manter,"
80000037-15 = "mas se tivermos \"uma dignidade que não permite que ninguém se aproxime\", seria contraproducente."
80000037-16 = "É difícil... será que o estilo de vida fora da lei é, no fim das contas, um caminho solitário?"
80000037-17 = "Bem, isso também não é ruim! É!"
80000037-18 = "Hehe..."
80000037-19 = "..."
80000037-21 = "（E-estamos em um clima bom agora, por acaso!? Não estou parecendo bem legal!?）"
80000037-22 = "Bem, chega de me gabar..."
80000037-23 = "[s] \"Você mesma disse que estava se gabando...\""
80000037-24 = "I-isso não importa! Não estrague o clima que está tão bom!"
80000037-25 = "E-enfim, para você, Sensei, que é nosso parceiro na Problem Solver 68, eu preparei uma coisa especial..."
80000037-30 = "[ns1] \"Chocolate...!\"\n[ns2] \"Posso considerar isso um presente de Dia dos Namorados?\""
80000037-31 = "N-não entenda errado! Isso é, bem..."
80000037-32 = "N-não entenda errado! Isso é, bem..."
80000037-33 = "I-isso mesmo! É apenas parte da recompensa!"
80000037-34 = "É um \"chocolate de altíssima qualidade\", com cinco \"supers\" na frente, que preparei para o Sensei que se esforça todos os dias."
80000037-35 = "Hehe, é algo que raramente se encontra até no mercado negro. Saboreie com calma, está bem?"
80000037-36 = "[s] \"Sim, obrigado!\""
80000037-37 = "E-eh, sim, claro. Bem, eu já esperava que você fosse ficar feliz de um jeito tão direto, Sensei..."
80000037-38 = "（S-ser tratada de forma tão direta assim, de alguma forma...!）"
80000037-39 = "[s] \"...Ué?\""
80000037-40 = "O que foi, Sensei?"
80000037-42 = "Atenção, atenção! Hoje é Dia dos Namorados, então estamos fazendo uma liquidação especial daquele \"chocolate de altíssima qualidade\"!"
80000037-44 = "Este produto, que parece elegante e luxuoso de qualquer ângulo! Normalmente não seria estranho se fosse vendido por 100 mil ienes, mas..."
80000037-45 = "Que coisa, houve um erro de pedido na empresa! Não tivemos escolha a não ser fazer esta grande promoção! Parece que na internet ainda estão vendendo pelo preço original, então, pensando bem, é agora ou nunca!"
80000037-46 = "Compramos estoque demais, então desistimos de tudo e estamos vendendo com \"95% de desconto\"!"
80000037-47 = "Já fico feliz se cobrir o custo do armazém,"
80000037-48 = "Agora é a chance de comprar este \"chocolate de luxo\" facilmente!"
80000037-49 = "Quem chegar primeiro leva!"
80000037-51 = "[ns] \"Nossa...\""
80000037-52 = "E-ei, espera um pouco! O que é isso!?"
80000037-53 = "Quando perguntei na internet, todos disseram que \"é caro, mas é muito bom\", então..."
80000037-54 = "Pensei que para o presente do Sensei, só podia ser isso..."
80000037-55 = "Depois de pensar muito, eu me esforcei para comprar, mas...!?"
80000037-56 = "[s] \"Entendi...\""
80000037-57 = "I-isso, será que é um golpe...!!"
80000037-58 = "[s3] \"Aru, acalme-se um pouco...\"\n[s4] \"Não é o mesmo chocolate. Este aqui foi um presente que você me deu.\""
80000037-59 = "É, você tem razão... No fim das contas, o valor de algo é puramente relativo..."
80000037-60 = "É, você tem razão... No fim das contas, o valor de algo é puramente relativo..."
80000037-61 = "O que mais importa são os sentimentos de quem dá e de quem recebe."
80000037-62 = "Hehe. Olha só eu, quase perdendo de vista o que é realmente importante."
80000037-63 = "Bem, o choque ainda não passou, mas..."
80000037-64 = "Já que o Sensei disse isso também."
80000037-65 = "É frustrante, mas..."
80000037-66 = "Já que eu já comprei..."
80000037-67 = "Não tem... jeito..."
80000037-68 = "……Não tem jeito coisa nenhuma, né!?"
80000037-69 = "Uma coisa é uma coisa, outra coisa é outra coisa! Eu não aceito isso!"
80000037-73 = "Hehe... Se você acha que eu vou ficar levando desaforo para casa para sempre, está muito enganado."
80000037-74 = "Confiança se paga com confiança, e desaforo se paga com desaforo! Retribuir na mesma moeda é o lema da Problem Solver 68!"
80000037-75 = "[s] \"Os lemas só aumentam...\""
80000037-76 = "Primeiro, vou pesquisar o site para localizar a sede e, então, atacar o local para..."
80000037-77 = "[s] \"A-Aru...?\""
80000037-78 = "Certo, decidi! Vamos lá, Sensei. Nossa próxima atividade está definida."
80000037-79 = "Além disso, na Problem Solver 68, o trabalho só termina quando voltamos para o escritório!"
80000037-80 = "Então, você vai continuar me acompanhando, né? Sensei?"
80000037-81 = "[s] \"Claro, se é um pedido da Aru.\""
80000037-82 = "Hehe, eu sabia que o Sensei diria isso!"
80000037-83 = "Observe bem, Sensei. O meu grande e audacioso desempenho como fora da lei!"
80000037-85 = "(Depois disso, acabei me envolvendo em um desenrolar digno de um filme noir com a Aru, mas essa é uma história para outra hora)"
