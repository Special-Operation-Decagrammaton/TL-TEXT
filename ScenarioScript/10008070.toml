[translation]
10008070-1 = "第7話;危機一髪（１）"
10008070-3 = "ぐあーっ！や～ら～れ～た～！"
10008070-4 = "わ、我々の夢が……！"
10008070-5 = "こんな悪党どもの手によって、我々の正義が絶たれてしまうだなんて……！"
10008070-12 = "[ns] \"やった……？\""
10008070-13 = "や、やりました！アル様！"
10008070-14 = "はぁ、はぁ……これで、終わり？"
10008070-15 = "意外と大したことなかったね？"
10008070-17 = "まあ、別にそれならそれで。これ以上続くのはもう勘弁。"
10008070-18 = "ふふっ、みんなご苦労様。我々便利屋68＋αの団結力の賜物ね。"
10008070-19 = "ああ、もちろん先生の指揮も素晴らしかったわよ。"
10008070-20 = "おかげで思ったより苦戦しなかったことだし。"
10008070-21 = "……えっと、結構褒めてるのよ？"
10008070-22 = "流石は私たち、便利屋68のパートナーね♪"
10008070-23 = "[s] \"うん、ありがとう。\""
10008070-27 = "さて、あとは賽銭箱を見つけて回収すれば……"
10008070-29 = "はっはっは。みなさん、お疲れ様でございました。"
10008070-31 = "ん……？このタイミングで一体誰よ……？"
10008070-32 = "アルちゃん、あっちあっち。"
10008070-39 = "私共に代わってゴロツキ共から賽銭箱を取り返してくださり、ありがとうございます。どう感謝すれば良いものか……。"
10008070-41 = "えっと……？"
10008070-42 = "大吉殿の管理人さんだよ。"
10008070-44 = "おっと、その格好……もしかしてアルバイトさんですかな？"
10008070-45 = "これはこれは、ただでさえお手伝いいただいているのに、その上賽銭箱を取り返すのにも協力してくださるとは……！"
10008070-46 = "ありがたい限りでございます。"
10008070-50 = "それでは、帰ったらみなさまにはしっかりお礼を致しましょう。それでは一旦……"
10008070-51 = "待った。"
10008070-52 = "……どうかされましたか？"
10008070-53 = "……取り返した人が中身を貰う。そういうルールじゃなかった？"
10008070-55 = "あ、確かに……。"
10008070-56 = "そうだね～。で、何でその賽銭箱を抱えちゃってるのかな？"
10008070-58 = "まさか、そのまま持っていく気じゃないよね？"
10008070-61 = "……。"
10008070-62 = "これは参りましたなあ、そういえばそんなお話もしていたような……。"
10008070-63 = "それに関しては何と言いましょうか、そうですねぇ……"
10008070-74 = "ど、どこからこんなに……！？"
10008070-75 = "あははっ！なぁに？"
10008070-76 = "もしかして噛みついてくるつもり？"
10008070-78 = "もう少し賢くなければ、せめて気づかない振りでもしてくれれば、丸く収まったのですが……。"
10008070-79 = "困りましたねえ、実に困りました。"
10008070-80 = "……あの時の放送で言ってたこと、最初から守る気無かったでしょ。"
10008070-81 = "[s] \"だとしたら、何であんなことを……？\""
10008070-82 = "多分これまでの手口と同じ。SNSとかマスコミを利用して、人を動かす。"
10008070-83 = "それで、自分の手だけは汚れないように物事を進める……そんなところじゃない？"
10008070-85 = "カイテンジャーから取り返すために、放送を見てる人たちを利用して……！？"
10008070-87 = "頭が回りますねぇ。仰る通りです、単にマスメディアを「使った」まで。"
10008070-88 = "「賽銭箱の中身は取り返してくれた方に」、そんなちょっとした嘘を入れ込んだだけで。"
10008070-92 = "こうしてキヴォトス各地から相当な数が集まった挙句……ほらこの通り、賽銭箱は私の手元まで戻ってきたでしょう？"
10008070-94 = "なっ……！？"
10008070-96 = "いやはや素晴らしいですね、マスコミの力というのは。"
10008070-97 = "[s] \"これが、黒亀組のやり方……。\""
10008070-98 = "なるほど、どうやら既に私共のことも把握されているようですね。"
10008070-99 = "もちろんよ！大吉殿で、資金洗浄をしてたってこともね！"
10008070-100 = "はははっ！それでは話は簡単だ。"
10008070-101 = "……？"
10008070-108 = "バレているなら良いでしょう。裏社会の住民らしく、力で解決させてもらうとしますか。"
10008070-109 = "[s] \"……っ、来る！\""
10008070-111 = "えっ、えっ！？"
