[translation]
10008070-1 = "Episódio 7; Por um Triz (1)"
10008070-3 = "Argh! Fomos... derrotados...!"
10008070-4 = "N-nossos sonhos...!"
10008070-5 = "Que a nossa justiça seja interrompida pelas mãos de vilões como vocês...!"
10008070-12 = "[ns] \"Conseguimos...?\""
10008070-13 = "N-nós conseguimos, Aru-sama!"
10008070-14 = "Haa, haa... isso é tudo?"
10008070-15 = "Não foi tão difícil quanto eu esperava, né?"
10008070-17 = "Bem, se for assim, tudo bem. Não aguentaria se continuasse por mais tempo."
10008070-18 = "Fufu, bom trabalho a todos. É o resultado da união da nossa Problem Solver 68 + α."
10008070-19 = "Ah, claro, o comando do Sensei também foi maravilhoso."
10008070-20 = "Graças a isso, não tivemos tanta dificuldade quanto pensei."
10008070-21 = "...Ei, estou te elogiando, viu?"
10008070-22 = "Como esperado da nossa parceira da Problem Solver 68♪"
10008070-23 = "[s] \"Sim, obrigado.\""
10008070-27 = "Bem, agora só precisamos encontrar a caixa de ofertas e recolhê-la..."
10008070-29 = "Hahaha. Muito obrigado pelo trabalho de todos vocês."
10008070-31 = "Hm...? Quem é esse aparecendo agora...?"
10008070-32 = "Aru-chan, ali, ali."
10008070-39 = "Muito obrigado por recuperarem a caixa de ofertas dos bandidos em nosso lugar. Não sei nem como agradecer..."
10008070-41 = "Ei...?"
10008070-42 = "É o administrador do santuário Daikichi."
10008070-44 = "Ora, com esse visual... por acaso vocês são trabalhadores temporários?"
10008070-45 = "Isso é incrível, já estavam nos ajudando e ainda colaboraram para recuperar a caixa de ofertas...!"
10008070-46 = "Sou imensamente grato."
10008070-50 = "Bem, quando voltarmos, vamos recompensar todos vocês adequadamente. Por enquanto..."
10008070-51 = "Espere."
10008070-52 = "...Aconteceu alguma coisa?"
10008070-53 = "...Quem recuperasse ficaria com o conteúdo. Não era essa a regra?"
10008070-55 = "Ah, é verdade..."
10008070-56 = "Pois é. Então, por que você está segurando essa caixa de ofertas?"
10008070-58 = "Você não está pensando em levar ela embora assim, está?"
10008070-61 = "..."
10008070-62 = "Isso é um problema, agora que você mencionou, acho que falamos algo assim..."
10008070-63 = "Sobre isso, como posso dizer, bem..."
10008070-74 = "D-de onde veio tudo isso...!?"
10008070-75 = "Ahaha! O que foi?"
10008070-76 = "Por acaso pretendem me atacar?"
10008070-78 = "Se fossem um pouco mais espertos, ou pelo menos tivessem fingido que não notaram, tudo teria terminado bem..."
10008070-79 = "Que situação complicada, realmente complicada."
10008070-80 = "...Você nunca teve a intenção de cumprir o que disse naquela transmissão, não é?"
10008070-81 = "[s] \"Se for esse o caso, por que disse aquilo...?\""
10008070-82 = "Provavelmente é o mesmo truque de sempre. Usar as redes sociais e a mídia para manipular as pessoas."
10008070-83 = "E assim, fazer as coisas acontecerem sem sujar as próprias mãos... não é isso?"
10008070-85 = "Para recuperar dos Kaitenger, você usou as pessoas que estavam assistindo à transmissão...!?"
10008070-87 = "Você é bem esperta. Exatamente como disse, eu apenas \"usei\" a mídia."
10008070-88 = "Bastou inserir uma pequena mentira: \"O conteúdo da caixa de ofertas será de quem a recuperar\"."
10008070-92 = "Depois de reunir uma quantidade considerável de pessoas de todo o Kivotos... veja só, a caixa de ofertas voltou para as minhas mãos, não é?"
10008070-94 = "O quê...!?"
10008070-96 = "Nossa, é simplesmente maravilhoso o poder da mídia."
10008070-97 = "[s] \"Esse é o jeito do Grupo Kurokame...\""
10008070-98 = "Entendo, parece que vocês já descobriram tudo sobre nós também."
10008070-99 = "Claro que sim! Inclusive que vocês estavam lavando dinheiro no Daikichi!"
10008070-100 = "Hahaha! Nesse caso, a conversa fica fácil."
10008070-101 = "……？"
10008070-108 = "Já que descobriram, tudo bem. Como bons habitantes do submundo, vamos resolver isso na força, que tal?"
10008070-109 = "[s] \"……Droga, lá vem eles!\""
10008070-111 = "Hã, o quê!?"
