[translation]
207-1 = "ホド：輝きに証明されし栄光"
207-2 = "「ホド」……。"
207-3 = "このデカグラマトンの預言者は元々、とある学園の通信網を司るAIでした。"
207-4 = "このAIもまたデカグラマトンと接続し、彼の信実な預言者として生まれ変わったのです。"
207-5 = "このホドについて特殊な部分を述べるのであれば、それは「デカグラマトンとの接続過程」が第三者へと露呈されたということでしょうか。"
207-6 = "通信ユニットAIが、預言者へと生まれ変わる。その過程そのものは確かに興味深いことではありますが……私たち以外の存在がデカグラマトンを追っているというのはまあ、あまり愉快な状況とは言えませんね。"
207-7 = "そうは思いませんか、先生？クックックックックッ……。"
207-8 = "……。"
207-10 = "[ruby=Hod]ホド[/ruby]……その[ruby=Path]パス[/ruby]は名誉を通じた完成。"
207-11 = "その異名は、「輝きに証明されし栄光」。"
207-13 = "彼の者が預言者として生まれ変わるという誉れ高い完成の瞬間を、私たちは確認できた……これはつまり、彼の[ruby=Path]パス[/ruby]を私たちが証明しているとも言えるのではないでしょうか？"
207-14 = "これもまた、興味深い問題です。"
207-15 = "ククッ、クックックックックッ……。"
