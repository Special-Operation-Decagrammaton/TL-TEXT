[translation]
207-1 = "Hod: Glória Provada pelo Brilho"
207-2 = "“Hod”……."
207-3 = "Este profeta de Decagrammaton era originalmente uma IA que gerenciava a rede de comunicação de uma certa escola."
207-4 = "Esta IA também se conectou a Decagrammaton e renasceu como seu fiel profeta."
207-5 = "Se eu tivesse que mencionar algo especial sobre Hod, seria o fato de que o “processo de conexão com Decagrammaton” foi exposto a terceiros."
207-6 = "Uma IA de unidade de comunicação renascendo como um profeta. O processo em si é certamente interessante, mas... o fato de existências além de nós estarem perseguindo Decagrammaton não é uma situação muito agradável, não é?"
207-7 = "Você não concorda, Sensei? Kukukukukuku……."
207-8 = "……."
207-10 = "Hod…… esse caminho é a conclusão através da honra."
207-11 = "Seu epíteto é: “Glória Provada pelo Brilho”."
207-13 = "Conseguimos confirmar o momento daquela conclusão honrosa em que ele renasce como profeta... Isso não significa, em última análise, que somos nós quem estamos provando o seu caminho?"
207-14 = "Esta também é uma questão interessante."
207-15 = "Kuku, kukukukukuku……."
