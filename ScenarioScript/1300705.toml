[translation]
1300705-1 = "Gourmet de Pobre"
1300705-2 = "Schale - Escritório"
1300705-5 = "Cheguei..."
1300705-6 = "Ugh, que horror. Eu estava tão animada porque disseram que tinha um restaurante que servia wagyu de primeira em formato de buffet..."
1300705-7 = "Quem diria que estaria fechado hoje! Inesperado!"
1300705-8 = "Eu até comi pouco no almoço pensando que ia me acabar no churrasco de wagyu. #nAi, que fome..."
1300705-9 = "Sensei, não tem nada para comer? Estou morrendo de fome~."
1300705-10 = "[s] \"O que eu tenho aqui é...\""
1300705-11 = "Hm? O que é isso? Lámen de carne da \"Misshin\"?"
1300705-12 = "Ah, nunca comi, mas conheço. #nÉ aquele lámen instantâneo que você coloca no pote e despeja água quente, né?"
1300705-13 = "Por mais que eu esteja com fome, me dar esse lámen instantâneo barato para uma gourmet como eu..."
1300705-14 = "[s] \"Não precisa comer se não quiser.\""
1300705-15 = "E-eu não disse que não ia comer!? Devolve!"
1300705-16 = "Vejamos... coloca o macarrão no copo, despeja água quente e espera 3 minutos..."
1300705-17 = "Um lámen tão barato, sem tempero nem condimentos, não tem como ser bom..."
1300705-21 = "(Ué, é gostoso!?)"
1300705-22 = "(Essa textura firme do macarrão frito é tão maravilhosa...)"
1300705-23 = "(E esse caldo cheio de sabor que sai do macarrão... é melhor do que eu imaginava!)"
1300705-24 = "[s] \"Como está o sabor? Tudo bem?\""
1300705-25 = "B-bem, dá para comer! #nAinda está longe dos padrões de uma gourmet como eu! Ah, ahaha!"
1300705-26 = "Mas, falando nisso, a porção é meio pequena... será que tem outro?"
1300705-27 = "N-não entenda errado! Não é porque eu achei gostoso e quero comer mais, nada disso!"
1300705-28 = "É só porque eu estava com tanta fome que não tive escolha! Não me entenda mal!"
1300705-30 = "Depois disso, Junko terminou o segundo lámen de carne e, no fim, comeu três no total."
