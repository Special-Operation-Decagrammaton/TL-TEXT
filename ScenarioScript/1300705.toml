[translation]
1300705-1 = "貧困な美食会"
1300705-2 = "シャーレ・執務室"
1300705-5 = "ただいま……。"
1300705-6 = "うう、最悪。#n最高級の和牛をビュッフェ形式で食べられるお店があるからって楽しみにしてたのにぃ……。"
1300705-7 = "まさか今日は定休日だったなんて！想定外！"
1300705-8 = "和牛の焼肉がたくさん食べられると思って、お昼を控えめにしてたのに。#nうう、お腹空いた……。"
1300705-9 = "先生、何か食べ物ない？お腹空いた～。"
1300705-10 = "[s] \"今持ってる食べ物は……。\""
1300705-11 = "ん？何これ？「ミッシン」のミートラーメン？"
1300705-12 = "あ、食べたことはないけど知ってる。#n器に入れて熱いお湯を注いで食べるインスタントラーメンでしょ？"
1300705-13 = "いくらお腹が空いてるからって、美食家の私にこんな安物のインスタントラーメン……。"
1300705-14 = "[s] \"無理に食べなくても大丈夫だよ。\""
1300705-15 = "た、食べないとは言ってないけど！？返して！"
1300705-16 = "えーっと……コップに麺を入れてお湯を注いで3分ね……。"
1300705-17 = "スープの素もかやくもないこんな安いラーメンが美味しいはずが……。"
1300705-21 = "（え、美味しいっ！？）"
1300705-22 = "（調理された油で揚げた麺特有のプリっとした食感が、こんなに素敵な……）"
1300705-23 = "（それに麺から染み出る旨味たっぷりのスープまで……想像以上！）"
1300705-24 = "[s] \"味はどう？大丈夫？\""
1300705-25 = "ま、まあまあ食べれるくらいね！#n美食家の私の基準には遠く及ばないけど！あは、あはは！"
1300705-26 = "それよりちょっと量が少ないんだけど……もう一個あったりする？"
1300705-27 = "か、勘違いしないで！美味しくてもっと食べたいとか、そういうのじゃないから！"
1300705-28 = "ただお腹が空きすぎて仕方なかっただけだから！誤解しないでよね！"
1300705-30 = "それから、ジュンコは二つ目のミートラーメンをキレイに完食し、結局計三つ食べた。"
