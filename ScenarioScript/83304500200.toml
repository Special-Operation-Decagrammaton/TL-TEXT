[translation]
83304500200-7 = "これで全員ね？"
83304500200-8 = "はい、イオリも居ますね？"
83304500200-9 = "アコちゃん！？そこでどうして私を呼ぶの！？"
83304500200-10 = "私たち風紀委員会で何かあるとしたら、イオリの可能性が高いですから。"
83304500200-11 = "あなた、よく罠に引っかかりますし……"
83304500200-12 = "くっ！悔しい！何よりも否定できないのが悔しい……！"
83304500200-17 = "委員長、全員訓練の準備が整いました。"
83304500200-18 = "分かった、それじゃあ始めよう。対テロ訓練開始。"
