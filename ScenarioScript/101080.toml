[translation]
101080-1 = "第8話;光の到来"
101080-3 = "シロコ先輩、早く！"
101080-4 = "シロコちゃ～ん、早く出発しないと遅れちゃうよ。"
101080-5 = "もう着く。今、最高速度で向かってる。"
101080-6 = "は～い。#nでも、事故に遭ったら危ないから自転車に乗りながらの通話は禁止です。"
101080-7 = "ん、分かった。じゃあ後で。"
101080-11 = "あはは……何度申し入れをしても音沙汰がなかった、あの連邦生徒会が……#nついに、ですね……。"
101080-12 = "そうだねぇ……#n昔、あまりにも頭にきて、連邦生徒会を襲撃しようと考えたこともあったなぁ～"
101080-13 = "連邦生徒会を……？#nいくらホシノ先輩でも、それは無理じゃ……"
101080-14 = "今はもう無理だよ～#n身体も痛いし、昔みたいに動けなくなっちゃって……おじさんが若かった頃の話ね。"
101080-15 = "あはは……年の差、あまりないんですけどね……。"
101080-19 = "ホシノ先輩の頃と状況が変わりましたからね。今は先生もいますし。"
101080-20 = "おじさんさ～、なんだか最近昔のことを思い出すんだよ。#nシロコちゃんに初めて会った時とか、ノノミちゃんが急に訪ねて来た時とか……"
101080-21 = "急に何言い出すのよ。本当に年寄りみたいな事を……。 "
101080-22 = "シロコ先輩と初めて会った時、ですか？#n私、その話初めて聞きます。どんな感じだったんですか？"
101080-23 = "あれ、話したことなかったっけ？"
101080-24 = "シロコちゃん、初めて会った時は完全に野良猫みたいな感じでさ～#nノノミちゃんとおじさんで、シロコちゃんを捕獲するのにどれだけ苦労したことか……"
101080-25 = "なんで捕獲なのよ……"
101080-27 = "ホシノ先輩、この話は……"
101080-28 = "別に隠す必要もないんじゃない？"
101080-33 = "そうですが……#nその……シロコちゃん、アビドスに来る前の記憶が無いんです。"
101080-34 = "えっ？記憶喪失？"
101080-35 = "何それ、映画みたいな話じゃん！？"
101080-36 = "それは……"
101080-37 = "……何か、ヘン。"
101080-38 = "えっ……？ "
101080-39 = "シロコ先輩……？"
101080-46 = "……今まで見たことないくらい、PMCがたくさんいる。"
101080-47 = "トラックにタンク、兵士……みんな同じ方角に向かってる。"
101080-48 = "あっちは……アビドス砂漠……"
101080-50 = "……ちょっと、見に行ってくる。"
101080-51 = "し、シロコ先輩……！？"
101080-52 = "なっ、何言ってんの！一人じゃ危ないでしょ！"
101080-53 = "……シロコちゃん、危ないから帰っておいで。 "
101080-54 = "ん、危険なことはしない。遠くからちょっと見てくるだけ。すぐ戻る。"
101080-55 = "もしかしたら……今のこの状況は、先生が私たちを呼んだ事と、関係あるのかも。"
101080-56 = "せ、先輩……"
101080-57 = "……ん？今、地面が…………地震……？ "
101080-58 = "……不思議な光が見える……黒……いや、虹……？"
101080-60 = "……！！"
101080-68 = "……！！？"
101080-71 = "[ns] \"…………！！！\""
101080-72 = "……ん？"
101080-73 = "何をモタモタしてるんだ、その距離すら当てられないのか？"
101080-74 = "あ、あれ……？#n銃身が……曲がった……？"
101080-76 = "クソッ！こうして銃口を直接当てちまえば……"
101080-81 = "……は、発射不良？#nい、一体どういうことだ！？"
101080-82 = "このバカ！私がやる！"
101080-83 = "ま、待て！#n殺すのはダメだって、ジェネラルから……"
101080-87 = "……。"
101080-88 = "……。"
101080-89 = "[ns] \"…………。\""
101080-90 = "あ、ありえない。どうして一発も……？#nい、一体何が……！？"
101080-92 = "私がいる限り、先生を傷つけることはできません！"
101080-93 = "先生の安全は、この私――#nシッテムの箱のOSであるスーパーアロナが守ってますから！"
101080-94 = "先生！この隙に早く……！！"
101080-102 = "……え？"
101080-109 = "これは……"
101080-110 = "何かが……近づいてきます……"
101080-120 = "な、何だ今のは……！？"
101080-121 = "地震か……？"
101080-124 = "[ns1] （シッテムの箱の電源が……？）\n[ns2] （アロナ……！？）"
101080-127 = "[ns] （あ、頭が……）"
101080-130 = "ちっ……とにかく逃げられないようにすればいいんだろ。#nその辺に転がしておけ。"
101080-131 = "急いで目標地点に移送するぞ。"
101080-133 = "……！！"
101080-134 = "こ、ここからでも感じられます！"
101080-135 = "これは……この色……"
101080-136 = "シロコちゃん！！#n危ないから早く帰っておいで！"
101080-144 = "シロコちゃん、電話に出てください……シロコちゃん！"
101080-145 = "……。"
101080-146 = "……ダメです、出ません……。"
101080-147 = "ちょっと……シロコ先輩一体何してるのよ！！"
101080-148 = "あ……あう……えっと、こういう時、一体どうすれば……。"
101080-149 = "……アヤネちゃんは先生に連絡してください！助けを求めましょう！"
101080-150 = "は、はい……！#n先生に連絡、先生に……。"
101080-155 = "ダメです、先生も……連絡が、取れません……。"
101080-156 = "……。"
101080-157 = "せ、先生まで……！？#nど、どうして……"
101080-161 = "あっ、出た……！？#nし、シロコちゃん、どこにいるんですか？"
101080-162 = "シロコ先輩！？"
101080-163 = "先輩、聞こえてるなら答えて！#nねえ、大丈夫なの！？一体どうしたの！？"
101080-164 = "シロコちゃん？答えてくださいシロコちゃん、いったい何が……！"
101080-168 = "また、切れた……？"
101080-169 = "…………し、"
101080-170 = "シロコちゃん――！！"
101080-174 = "次回;衝突（１）"
