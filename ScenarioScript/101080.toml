[translation]
101080-1 = "Episódio 8; A Chegada da Luz"
101080-3 = "Shiroko-senpai, rápido!"
101080-4 = "Shiroko-chaaan, se não sairmos logo vamos nos atrasar."
101080-5 = "Tô chegando. Tô indo na velocidade máxima."
101080-6 = "Ceeerto.#nMas é proibido falar no celular enquanto anda de bicicleta, é perigoso sofrer um acidente."
101080-7 = "Hm, entendi. Até logo, então."
101080-11 = "Ahaha... Aquele mesmo Conselho Estudantil Geral que ignorava todos os nossos pedidos...#nFinalmente, hein..."
101080-12 = "Pois é...#nNo passado, a gente ficou com tanta raiva que até pensamos em invadir o Conselho Estudantil Geral~"
101080-13 = "O Conselho Estudantil Geral...?#nPor mais que seja você, Hoshino-senpai, acho que seria impossível..."
101080-14 = "Hoje em dia é impossível mesmo~#nMeu corpo dói e eu já não me movo como antigamente... Essa é uma história de quando o tio aqui era mais jovem."
101080-15 = "Ahaha... A nossa diferença de idade nem é tão grande assim, mas tudo bem..."
101080-19 = "A situação mudou desde a sua época, Hoshino-senpai. Agora também temos o Sensei com a gente."
101080-20 = "Sabe~ o tio aqui tem lembrado bastante do passado ultimamente.#nDe quando conheci a Shiroko-chan, de quando a Nonomi-chan apareceu de repente..."
101080-21 = "De onde surgiu esse papo do nada? Falando que nem uma idosa mesmo..."
101080-22 = "De quando conheceram a Shiroko-senpai?#nEu nunca ouvi essa história. Como foi?"
101080-23 = "Ué, eu nunca tinha contado?"
101080-24 = "Quando a gente conheceu a Shiroko-chan, ela parecia um gatinho de rua, sabe~#nVocês não fazem ideia do sufoco que a Nonomi-chan e o tio aqui passaram pra conseguir capturar ela..."
101080-25 = "Como assim \"capturar\"...?"
101080-27 = "Hoshino-senpai, sobre isso..."
101080-28 = "Ah, não tem por que a gente esconder, né?"
101080-33 = "É verdade, mas...#nÉ que... a Shiroko-chan não tem memória nenhuma de antes de vir pra Abydos."
101080-34 = "Hã? Amnésia?"
101080-35 = "Que isso, parece até história de filme!?"
101080-36 = "Isso é..."
101080-37 = "……Tem alguma coisa estranha."
101080-38 = "Hã...?"
101080-39 = "Shiroko-senpai...?"
101080-46 = "……Tem mais tropas da PMC aqui do que eu já vi na vida."
101080-47 = "Caminhões, tanques, soldados... Todos indo na mesma direção."
101080-48 = "Pra lá fica... o deserto de Abydos..."
101080-50 = "……Vou lá dar uma olhada."
101080-51 = "S-Shiroko-senpai...!?"
101080-52 = "M-Mas o que você tá falando?! É muito perigoso ir sozinha!"
101080-53 = "……Shiroko-chan, é perigoso, volta pra cá."
101080-54 = "Hm, não vou fazer nada arriscado. Só vou dar uma olhadinha de longe. Volto num instante."
101080-55 = "Talvez... essa situação toda tenha a ver com o motivo do Sensei ter chamado a gente."
101080-56 = "S-Senpai..."
101080-57 = "……Hm? O chão tá... tremendo...?"
101080-58 = "……Tô vendo uma luz estranha... preta... não, parecem as cores do arco-íris...?"
101080-60 = "……！！"
101080-68 = "……！！？"
101080-71 = "[ns] \"…………！！！\""
101080-72 = "……Hm?"
101080-73 = "O que você tá enrolando? Não consegue acertar nem dessa distância?"
101080-74 = "U-Ué...?#nO cano da arma... entortou...?"
101080-76 = "Merda! Se eu encostar a arma direto nele..."
101080-81 = "……F-Falha no disparo?#nO-O que diabos tá acontecendo!?"
101080-82 = "Seu idiota! Deixa que eu faço!"
101080-83 = "E-Espera!#nO General disse pra não matar..."
101080-87 = "……。"
101080-88 = "……。"
101080-89 = "[ns] \"…………。\""
101080-90 = "I-Impossível. Por que nenhum tiro...?#nO-O que tá rolando...!?"
101080-92 = "Enquanto eu estiver aqui, vocês não vão encostar um dedo no Sensei!"
101080-93 = "A segurança do Sensei é garantida por mim――#na Super Arona, o SO da Caixa de Shittim!"
101080-94 = "Sensei! Aproveite essa brecha e corra...!!"
101080-102 = "……Hã?"
101080-109 = "Isso é..."
101080-110 = "Alguma coisa... tá se aproximando..."
101080-120 = "O-O que foi isso agora...!?"
101080-121 = "Um terremoto...?"
101080-124 = "[ns1] （A Caixa de Shittim desligou...?）\n[ns2] （Arona...！？）"
101080-127 = "[ns] （M-Minha cabeça...）"
101080-130 = "Tsc... De qualquer forma, só precisamos garantir que ele não fuja.#nJoga ele em qualquer canto aí."
101080-131 = "Vamos transferi-lo pro ponto de encontro rápido."
101080-133 = "……！！"
101080-134 = "D-Dá pra sentir até daqui!"
101080-135 = "Isso... Essa cor..."
101080-136 = "Shiroko-chan!!#nÉ perigoso, volta logo pra cá!"
101080-144 = "Shiroko-chan, atende o telefone, por favor... Shiroko-chan!"
101080-145 = "……。"
101080-146 = "……Nada, ela não atende..."
101080-147 = "Caramba... O que a Shiroko-senpai tá fazendo, hein!!"
101080-148 = "A... au... err, numa hora dessas, o que a gente faz..."
101080-149 = "……Ayane-chan, entre em contato com o Sensei! Vamos pedir ajuda!"
101080-150 = "S-Sim...!#nLigar pro Sensei, ligar pro Sensei..."
101080-155 = "Não dá... não consigo entrar em contato... com o Sensei também..."
101080-156 = "……。"
101080-157 = "A-Até o Sensei...!?#nM-Mas por que..."
101080-161 = "Ah, atendeu...!?#nS-Shiroko-chan, onde você tá?"
101080-162 = "Shiroko-senpai!?"
101080-163 = "Senpai, responde se estiver ouvindo!#nEi, você tá bem!? O que aconteceu!?"
101080-164 = "Shiroko-chan? Responde, por favor, Shiroko-chan, o que foi que... !"
101080-168 = "Desligou... de novo?"
101080-169 = "…………S-"
101080-170 = "Shiroko-chan――！！"
101080-174 = "Próximo episódio; Colisão (1)"