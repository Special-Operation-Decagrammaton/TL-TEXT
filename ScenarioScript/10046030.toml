[translation]
10046030-1 = "第3話;ストーリーテラーのシナリオ"
10046030-4 = "ナギサ、起きてくれ。"
10046030-5 = "到着だ。"
10046030-10 = "おや、先生。#n出迎えがあるとは思わなかった。"
10046030-11 = "待たせて済まない。#nもっとスピードを出すべきだったな。"
10046030-15 = "ナギサ、ナギサ。"
10046030-19 = "う、うぅん……。#nもう陸地に着いたのですか……？"
10046030-20 = "ずっと陸地を走っていたのだが……空を飛ぶ夢でも見ていたのかい？"
10046030-21 = "いえ、そもそも眠ってなどいません……#nとにかく、今日からは動かない地面だけを陸地と呼ぶことにします。"
10046030-29 = "ナギサ、地面は元々動かないものだよ。"
10046030-35 = "セイアさん……運転のクセは、まだ直っていなかったのですね……。"
10046030-36 = "まるで私が危険運転をしたかのような言い草だね。#n法定速度を遵守したつもりだが？"
10046030-37 = "この辺りの道路には速度制限なんて無いではありませんか！！"
10046030-41 = "……あ、先生。"
10046030-42 = "到着早々、お見苦しい姿を……。"
10046030-43 = "こんなビーチで、堅苦しい挨拶はいただけないな。"
10046030-47 = "……ん？先生？"
10046030-48 = "まるで不思議なものを見るかのような目をしているね。"
10046030-49 = "[s1] \"二人とも……。\"\n[s2] \"……楽しむ気満々だね！\""
10046030-54 = "当然だ。遊びに来ているのだから。"
10046030-55 = "普段の生活を忘れ……僅かばかりの逸脱が許される日。#n変わらず無為に過ごすのは、勿体無いだろう？"
10046030-56 = "私は違います。#nお二人があまりにも強く言うものですから……。"
10046030-57 = "また始まったか。"
10046030-58 = "今日はプライベートだろう？他人の目もない。#n好きに楽しむがいいさ。"
10046030-63 = "失礼。"
10046030-70 = "[ruby=ゆりぞの]百合園[/ruby]セイアだ。#n君はティーパーティーの……ああ、かけ間違いではない。"
10046030-71 = "知っての通り、ナギサは休暇中だ。#n……そう。該当業務はすべて私のほうへ回してくれ。では。"
10046030-76 = "セイアさん……？"
10046030-77 = "約束を忘れるには些か早すぎるだろう。#nそれとも、端から守るつもりがなかったのかい？"
10046030-78 = "すでにケリをつけた議題だ。#n今日の業務はすべて――"
10046030-79 = "……セイアさんにお任せする。#nはい、たしかにそのように約束していました。"
10046030-80 = "しかし、連絡手段を奪うのは流石に――"
10046030-81 = "約束と関係ない、とは言うまいな？"
10046030-85 = "敢えて遠方まで足を運び、バカンスを楽しむ理由は何か。"
10046030-86 = "ルーチン化した日常生活から離れ、心身ともに休息できる環境をつくる。#nそれが、本来の目的だと理解しているがね。"
10046030-87 = "それとも、私の理解に誤りでも？"
10046030-88 = "……いえ。セイアさんのおっしゃる通りです。"
10046030-89 = "では、このスマホは私が預かっておこう。"
10046030-90 = "日常との連絡手段が残っていては、君を仕事から分離したとは言えないからね。"
10046030-91 = "それは飛躍しすぎでは……。"
10046030-92 = "まぁ、君がどんな選択をしようと、私は構わないさ。"
10046030-93 = "だが、ミカはどう思うだろうね？"
10046030-94 = "……！"
10046030-99 = "ナギサは最初から約束を守るつもりがなかった……#nそれを知ってしまったミカは、果たしてどんな表情をするだろうか。"
10046030-100 = "ふむ、俄然興味が湧いてきた。#nナギサは私の好奇心を満たしてくれるか否か、さあ楽しみだね。"
10046030-101 = "くっ……！"
10046030-106 = "はあ、分かりました。私のスマホはセイアさんにお預けします。"
10046030-110 = "ミカさんだけで手一杯なのに……。"
10046030-111 = "どうしてセイアさんまで……。"
10046030-120 = "ふむ、あれでナギサは押しに弱いのか。"
10046030-121 = "どうだい、先生。#nミカの真似事……我ながら、中々の出来だったと思うのだが。"
10046030-122 = "[s3] \"今のって、ミカの真似だったの？\"\n[s4] \"似てる……かな？\""
10046030-127 = "おや、冴えない反応だね。"
10046030-128 = "まあいいさ。次また挑戦してみよう。#nまだ、ナギサの真似が残っているからね。"
10046030-129 = "先生。"
10046030-130 = "もしかすると……いや、確実に君は「特別な何か」を見ることになる。#n強いて言うならば……これはある種の前日譚。"
10046030-134 = "「お姫様を乗せたカボチャの馬車。#n　その馬車引きネズミは、どこから来たのか」"
10046030-135 = "そう、これはそういう物語だ。"
10046030-139 = "……あぁ、つい悪い癖が出てしまったね。そう難しい話ではないのさ。"
10046030-145 = "平たく言えば……。"
10046030-146 = "すなわち……。"
10046030-151 = "いや、やめておこう。"
10046030-152 = "[s5] \"き、気になる！\"\n[s6] \"続き……続きは！？\""
10046030-155 = "ふふ、ネタバレはよくないからね。"
10046030-156 = "「先に知っている」ことほど、面白味に欠けるものもないさ。"
10046030-157 = "……シリアスな話をするつもりはなかったんだ。"
10046030-158 = "そう重く捉えないでくれ。#n無論、これを聞けば先生が戸惑うだろうことは、想定の範疇だがね。"
10046030-159 = "この目で見たい……確かめたいという悪い癖は、中々治らないものだ。"
10046030-163 = "……ん？何か言いたげな顔だね。"
10046030-164 = "治すつもりなんて微塵もないくせに。#n君が考えているのはそんなところかな？"
10046030-165 = "然らば、私からの返事は至ってシンプルだ。#n当然だろう？とね。"
10046030-166 = "その「悪い癖」だって、今の百合園セイアを構成する一要素なのだから。"
10046030-167 = "もしかすると、治すという表現自体、語弊があるのかもしれない。#nこれはより根深いところに作用する、根源的な変化の話だからね。"
10046030-168 = "とはいえ、今日はさすがに自重しようか。"
10046030-169 = "自己中心的で、後先考えないおてんば娘が、苦心の末に用意した一日だからね。"
10046030-170 = "あくまで、同じティーパーティーの一員として――"
10046030-171 = "いや、友人として、誠心誠意臨まなければ失礼だろうさ。"
10046030-176 = "（ドサッ！バターン！）"
10046030-180 = "今の音は？"
10046030-181 = "砂浜のほうからだな。"
10046030-182 = "[s7] \"あっ、そういえば……！\"\n[s8] （さっき押収した温泉開発部の資材がまだ……！）"
10046030-191 = "ええと……。"
10046030-192 = "これは……何でしょうか。"
10046030-193 = "こんなものがあった記憶はないのですが……。"
10046030-197 = "な、ナギちゃん！？"
10046030-198 = "わ、私が全部説明するから！"
10046030-199 = "いいえ、結構です。"
10046030-203 = "（ど、どうしよう……）"
10046030-204 = "（やっぱり怪しまれてる！）"
10046030-205 = "（このままだと……）"
10046030-212 = "危険が潜む場所で、のんきに遊んでなどいられません。"
10046030-213 = "より安全なところへ移動しましょう。"
10046030-214 = "ここから一番近いセーフハウスは――"
10046030-218 = "じゃ、じゃあ、このバカンスは……？"
10046030-222 = "もちろん、中止です。"
10046030-228 = "ダメぇぇぇぇーっ！！！"
10046030-232 = "っ！？#nいきなり大声を出して、どうしたのですか？"
10046030-236 = "あ、ううん！ナギちゃん、これはね！"
10046030-237 = "はぁ……大方予想がつきますが……#n困りましたね……。"
10046030-238 = "ちゃんと説明するから！"
10046030-239 = "いえ、結構です。"
10046030-240 = "この件に関しては、黙認することにいたしましょう。"
10046030-244 = "……え？"
10046030-245 = "可能性の一つとして、想定はしていました。#n私たちの代になってからは、使ってこなかったのですから。"
10046030-246 = "今さら、私有地だから荷物を除けろと言っても、近隣住民は納得しないでしょう。"
10046030-247 = "……ですが、この量には少々驚きました。#nどこかで工事でも行われるのでしょうか？"
10046030-248 = "え……あれ？"
10046030-249 = "あ、あぁ～そういえば！今朝、工事の関係者さんが来たんだ！#nちょっとここに物を置かせてもらう、とか言ってたような～？"
10046030-250 = "報告するの忘れちゃってた☆"
10046030-254 = "はい？#nそれは……そちらの方が問題かと。"
10046030-255 = "ごめんってば～準備で忙しかったんだよ～"
10046030-259 = "それよりさ、早くお昼食べない？私お腹空いちゃった！"
10046030-264 = "まったく、あなたはいつもいつも……。"
10046030-272 = "…………。"
10046030-273 = "なんとか、誤魔化せたかな……？"
10046030-278 = "ミカ。"
10046030-282 = "わっ、セイアちゃん！いたの？"
10046030-283 = "ああ。楽しそうだったから、声をかけるのはためらわれてね。"
10046030-287 = "良い演技だった。#nトリニティを欺いてみせただけのことはある。"
10046030-288 = "そ、その話するのあり！？"
10046030-289 = "ふふ、すまない。#n君の慌てた様子を見ていると、つい意地悪を言いたくなってしまうんだ。"
10046030-290 = "それより今日のナギサは……なるほど、やはり。"
10046030-291 = "予想より早い気はするが、長らく多忙を極めていたからね。"
10046030-292 = "[s9] \"やはりって？\"\n[s10] \"やっぱり気になる……！\""
10046030-297 = "落ち着かない様子を見せる者はここにもいたか。"
10046030-298 = "言うのは構わないが。"
10046030-302 = "…………。"
10046030-303 = "いや、ネタバレはよしておこう。"
10046030-304 = "セイアちゃんはす～ぐそういう言い方するんだから。"
10046030-305 = "これが私の性分なものでね。#nむしろ、そろそろ君が汲み取れるようになって欲しいくらいだ。"
10046030-306 = "むっかぁ……！"
10046030-307 = "はぁ……ここは我慢しないと。"
10046030-308 = "ふむ？"
10046030-309 = "計画は順調だし、別に怒る必要はないもんね！"
10046030-310 = "あとは材料さえ届けば、お昼のバーベキューを始められるし――"
10046030-314 = "あれ、今何時？"
10046030-319 = "12時40分……？"
10046030-320 = "う～ん……12時半には届くはずなのに……。"
10046030-321 = "なんか嫌な予感……。"
10046030-325 = "う、ううん！大丈夫！"
10046030-326 = "まさかトラブルなんて……。"
10046030-335 = "13時に……なっちゃった……。"
10046030-336 = "ちょっと電話してみるね。"
10046030-344 = "あ、もしもし？#n今日、バーベキ――"
10046030-352 = "えっ！？"
10046030-353 = "ま、待って。どういうこと？#n……え？"
10046030-354 = "トラックが襲撃されて……って、聞き間違いだよね……？"
10046030-355 = "え、ごめん、もうちょっと詳しく説明してくれる？"
10046030-360 = "うん、うん。"
10046030-361 = "配送してたトラックがジャックされて、失踪中……？"
10046030-365 = "どうしてそうなるの！？"
10046030-366 = "いやいや！運んでるのって、お金とか宝石じゃないんだよ？"
10046030-367 = "も、もちろん一番良いものではあるけど……食材だよ？"
10046030-371 = "今、叫び声が聞こえたような……なにかトラブルでも？"
10046030-375 = "き、気のせいじゃないかな？#n大丈夫だから、ナギちゃんは休んでて！"
10046030-376 = "あの……何かあったんすか？"
10046030-377 = "い、イチカちゃん！？ならいっか……。"
10046030-378 = "えと……信じられないと思うんだけど……。"
10046030-383 = "うーん……食材目当てにトラックを襲いそうな集団っすか……。"
10046030-384 = "少なくとも、片手じゃ足りないくらいは思いつくっすね……。"
10046030-385 = "そんなに！？"
10046030-386 = "まあ……この仕事をしてると、色々あるんすよ。"
10046030-387 = "それより、どうするっすか？#n今から買い物に行くにしても、時間かかっちゃいますし……。"
10046030-388 = "あ。一応持ってきたパンとソーセージがあるっす。#n味気ないっすけど、お昼にはなると思うっすよ。"
10046030-389 = "それは……ダメ！"
10046030-393 = "どうしてっすか？"
10046030-394 = "お昼はバーベキューって、ナギちゃんに言っちゃったんだもん。"
10046030-395 = "なのにバーベキューじゃなかったら、バカンスはそこで終わりなんだよ！"
10046030-396 = "いや……それはちょっと飛躍しすぎじゃないっすか……？"
10046030-397 = "用意できなかった理由に、ナギちゃんが気づいたら……？"
10046030-398 = "あー……それは、ちょっとヤバいかもっすね。"
10046030-399 = "でしょ！？#nでも、いきなりバーベキューの準備なんてできないよ……。"
10046030-404 = "[ns11] \"可能性が……あるかも、しれない。\"\n[ns12] \"でも、この手だけは……使いたくなかったのに……！\""
10046030-409 = "[ns] \"使いたくなかったのにっ！！！\""
10046030-410 = "せ、先生！？大丈夫？"
10046030-411 = "えーと……その方法だと、先生が困ることになっちゃうの？"
10046030-412 = "無理はしなくていいんだよ？#nあくまで私たちの問題だからね。"
10046030-413 = "え？心配なのは……私？どういうこと？"
10046030-418 = "私のことなら、別に遠慮しなくていいよ。"
10046030-419 = "どんな方法かは知らないけど、今日のためなら何でもするって決めたからね！"
10046030-423 = "……なるほど。事情は分かりました。"
10046030-435 = "美食について私たちを頼ったのは――"
10046030-440 = "良い選択と言えるでしょう。うふふっ。"
