[translation]
10046030-1 = "Episódio 3; O cenário do contador de histórias"
10046030-4 = "Nagisa, acorde."
10046030-5 = "Chegamos."
10046030-10 = "Ora, Sensei. #nNão esperava que houvesse alguém para nos receber."
10046030-11 = "Desculpe pela espera. #nEu deveria ter acelerado um pouco mais."
10046030-15 = "Nagisa, Nagisa."
10046030-19 = "U-uhm... #nJá chegamos em terra firme...?"
10046030-20 = "Nós estivemos dirigindo em terra firme o tempo todo... Será que você estava sonhando que voava pelos céus?"
10046030-21 = "Não, eu nem sequer estava dormindo... #nDe qualquer forma, a partir de hoje, chamarei de terra firme apenas o chão que não se move."
10046030-29 = "Nagisa, o chão, por natureza, não se move."
10046030-35 = "Seia-san... o seu hábito de dirigir ainda não mudou, pelo visto..."
10046030-36 = "É como se você estivesse dizendo que eu dirijo de forma perigosa. #nEu não segui o limite de velocidade permitido?"
10046030-37 = "Não existe limite de velocidade nas estradas desta região!!"
10046030-41 = "...Ah, Sensei."
10046030-42 = "Logo na chegada, apresentando uma cena tão deplorável..."
10046030-43 = "Não é apropriado fazer saudações formais em uma praia como esta."
10046030-47 = "...Hm? Sensei?"
10046030-48 = "Você está me olhando como se estivesse vendo algo estranho."
10046030-49 = "[s1] \"Vocês duas...\"\n[s2] \"...Estão prontas para aproveitar, hein!\""
10046030-54 = "Naturalmente. Afinal, viemos aqui para nos divertir."
10046030-55 = "Esquecer a vida cotidiana... um dia onde um pequeno desvio é permitido. #nSeria um desperdício passar o tempo sem fazer nada, não acha?"
10046030-56 = "Eu sou diferente. #nÉ que vocês duas insistiram tanto..."
10046030-57 = "Lá vamos nós de novo."
10046030-58 = "Hoje é um momento privado, não é? Não há olhares de estranhos. #nSinta-se à vontade para aproveitar."
10046030-63 = "Com licença."
10046030-70 = "Aqui é Seia Yurizono. #nVocê é do Chá das Cinco... Ah, não, não é um engano."
10046030-71 = "Como você sabe, Nagisa está de férias. #n...Isso mesmo. Por favor, encaminhe todas as tarefas pertinentes para mim. Até logo."
10046030-76 = "Seia-san...?"
10046030-77 = "É um pouco cedo demais para esquecer nossas promessas. #nOu será que você nunca teve a intenção de cumpri-las desde o início?"
10046030-78 = "Esse é um assunto que já encerramos. #nTodas as tarefas de hoje serão..."
10046030-79 = "...Deixadas aos cuidados da Seia-san. #nSim, eu certamente prometi isso."
10046030-80 = "Mas, tirar meus meios de comunicação é um pouco demais..."
10046030-81 = "Você não vai dizer que isso não tem relação com a promessa, vai?"
10046030-85 = "Qual é o motivo de viajar para tão longe para aproveitar as férias?"
10046030-86 = "Criar um ambiente onde possamos nos afastar da rotina diária e descansar o corpo e a mente. #nEntendo que esse seja o objetivo principal."
10046030-87 = "Ou será que meu entendimento está equivocado?"
10046030-88 = "...Não. É exatamente como a Seia-san disse."
10046030-89 = "Então, ficarei com este smartphone."
10046030-90 = "Se você mantiver um meio de contato com o cotidiano, não posso dizer que você se separou do trabalho."
10046030-91 = "Isso não é um salto lógico demais...?"
10046030-92 = "Bem, não me importo com a escolha que você fizer."
10046030-93 = "Mas, o que a Mika pensaria disso?"
10046030-94 = "...!"
10046030-99 = "Nagisa não tinha a intenção de cumprir a promessa desde o início... #nQue tipo de expressão a Mika faria ao descobrir isso?"
10046030-100 = "Hum, meu interesse aumentou subitamente. #nEstou ansiosa para ver se a Nagisa vai satisfazer minha curiosidade ou não."
10046030-101 = "Droga...!"
10046030-106 = "Ah, entendi. Deixarei meu smartphone com a Seia-san."
10046030-110 = "Já é difícil lidar apenas com a Mika-san..."
10046030-111 = "Por que a Seia-san também..."
10046030-120 = "Hum, então a Nagisa é fácil de convencer."
10046030-121 = "O que achou, Sensei?#nUma imitação da Mika... devo dizer que me saí muito bem."
10046030-122 = "[s3] \"Isso foi uma imitação da Mika?\"\n[s4] \"Será que ficou parecido?\""
10046030-127 = "Ora, que reação desanimadora."
10046030-128 = "Bem, não importa. Tentarei de novo na próxima.#nAinda falta a imitação da Nagisa, afinal."
10046030-129 = "Sensei."
10046030-130 = "Talvez... não, certamente você verá algo \"especial\".#nSe é que posso dizer assim... isso é uma espécie de prólogo."
10046030-134 = "「A carruagem de abóbora que levava a princesa.#n　De onde veio o rato que a conduzia?」"
10046030-135 = "Sim, é uma história desse tipo."
10046030-139 = "...Ah, acabei caindo em um mau hábito. Não é um assunto tão complicado assim."
10046030-145 = "Para ser direta..."
10046030-146 = "Ou seja..."
10046030-151 = "Não, melhor deixar para lá."
10046030-152 = "[s5] \"E-estou curioso!\"\n[s6] \"E a continuação... o que acontece depois!?\""
10046030-155 = "Fufu, spoilers não são bons, sabe."
10046030-156 = "Não há nada menos interessante do que \"já saber o que vai acontecer\"."
10046030-157 = "...Eu não pretendia falar de algo tão sério."
10046030-158 = "Não leve tão a sério.#nClaro, eu já esperava que o Sensei ficasse confuso ao ouvir isso."
10046030-159 = "Esse meu mau hábito de querer ver e confirmar as coisas com meus próprios olhos... é algo difícil de curar."
10046030-163 = "...Hm? Você está com uma cara de quem quer dizer algo."
10046030-164 = "Como se eu não tivesse a menor intenção de me curar.#nÉ isso que você está pensando, não é?"
10046030-165 = "Se for esse o caso, minha resposta é bem simples.#n\"É óbvio\", eu diria."
10046030-166 = "Afinal, esse \"mau hábito\" também é um dos elementos que compõem a Mika Misono de agora."
10046030-167 = "Talvez o termo \"curar\" seja inadequado.#nEstamos falando de uma mudança fundamental que atua em um nível muito mais profundo."
10046030-168 = "Dito isso, hoje vou me conter."
10046030-169 = "Afinal, este é um dia preparado com muito esforço por uma garota egocêntrica e impulsiva."
10046030-170 = "Como membro do Tea Party, devo agir de acordo—"
10046030-171 = "Não, como amiga, seria falta de educação não participar de todo o coração."
10046030-176 = "(Baque! Estrondo!)"
10046030-180 = "Que barulho foi esse?"
10046030-181 = "Veio da direção da praia."
10046030-182 = "[s7] \"Ah, falando nisso...!\"\n[s8] (Os materiais do Departamento de Desenvolvimento de Fontes Termais que confiscamos ainda estão...!)"
10046030-191 = "Bem..."
10046030-192 = "O que é... isso?"
10046030-193 = "Não me lembro de ter visto algo assim por aqui..."
10046030-197 = "Na-Nagi-chan!?"
10046030-198 = "Eu, eu explico tudo!"
10046030-199 = "Não, obrigada."
10046030-203 = "(O que eu faço...)"
10046030-204 = "(Ela está desconfiada mesmo!)"
10046030-205 = "(Se continuar assim...)"
10046030-212 = "Não podemos ficar brincando despreocupadamente em um lugar onde há perigo."
10046030-213 = "Vamos nos mudar para um lugar mais seguro."
10046030-214 = "O esconderijo mais próximo daqui é—"
10046030-218 = "Ma-mas então, e essas férias...?"
10046030-222 = "Claro, estão canceladas."
10046030-228 = "NÃÃÃÃÃÃOOOO!!!"
10046030-232 = "!?#nPor que gritou de repente?"
10046030-236 = "Ah, não é nada! Nagi-chan, é que!"
10046030-237 = "Haa... eu já imaginava...#nQue situação problemática..."
10046030-238 = "Eu vou explicar direitinho!"
10046030-239 = "Não, está tudo bem."
10046030-240 = "Quanto a este assunto, vamos optar por ignorar."
10046030-244 = "……Eh?"
10046030-245 = "Eu tinha previsto isso como uma das possibilidades. #nAfinal, não usamos este lugar desde a nossa geração."
10046030-246 = "Não adiantaria dizer agora que é propriedade privada e pedir para removerem a carga; os vizinhos não aceitariam."
10046030-247 = "……Mas, fiquei um pouco surpresa com a quantidade. #nSerá que vai haver alguma obra por aqui?"
10046030-248 = "Eh…… ué?"
10046030-249 = "Ah, ahh~ falando nisso! O pessoal da obra veio aqui hoje de manhã! #nEles disseram algo como: 'Poderia deixar a gente colocar umas coisas aqui?', não foi?"
10046030-250 = "Esqueci de avisar☆"
10046030-254 = "Sim? #nIsso…… acho que é um problema maior ainda."
10046030-255 = "Já disse que sinto muito~ Eu estava ocupada com os preparativos~"
10046030-259 = "Mas mudando de assunto, não vamos almoçar logo? Estou com fome!"
10046030-264 = "Francamente, você sempre faz isso……"
10046030-272 = "…………."
10046030-273 = "Será que consegui enganar ela……?"
10046030-278 = "Mika."
10046030-282 = "Uah, Seia-chan! Você estava aí?"
10046030-283 = "Sim. Parecia tão divertida que hesitei em te chamar."
10046030-287 = "Foi uma boa atuação. #nNão é à toa que você conseguiu enganar a Trinity."
10046030-288 = "Ei, pode falar disso assim!?"
10046030-289 = "Fufu, desculpe. #nAo ver o seu jeito apressado, acabo querendo ser um pouco maldosa."
10046030-290 = "Mas, falando da Nagisa hoje…… entendo, como esperado."
10046030-291 = "Acho que foi mais cedo do que o previsto, mas ela esteve extremamente ocupada por muito tempo, afinal."
10046030-292 = "[s9] \"Como esperado?\"\n[s10] \"Estou curiosa……!\""
10046030-297 = "Então havia alguém aqui que também não conseguia ficar parada."
10046030-298 = "Não me importo que você diga isso."
10046030-302 = "…………."
10046030-303 = "Não, melhor não dar spoilers."
10046030-304 = "A Seia-chan sempre fala desse jeito."
10046030-305 = "É da minha natureza. #nNa verdade, eu gostaria que você já tivesse aprendido a entender isso."
10046030-306 = "Que raiva……!"
10046030-307 = "Haa…… preciso me controlar."
10046030-308 = "Hum?"
10046030-309 = "O plano está correndo bem, não tem motivo para ficar brava!"
10046030-310 = "Só falta os ingredientes chegarem para começarmos o churrasco do almoço――"
10046030-314 = "Ué, que horas são agora?"
10046030-319 = "12:40……?"
10046030-320 = "Hmm…… era para ter chegado às 12:30……"
10046030-321 = "Estou com um pressentimento ruim……"
10046030-325 = "N-não, está tudo bem!"
10046030-326 = "Não deve ter acontecido nenhum problema……"
10046030-335 = "Já são…… 13:00……"
10046030-336 = "Vou ligar para eles."
10046030-344 = "Ah, alô? #nSobre o churrasco de hoje――"
10046030-352 = "Eh!?"
10046030-353 = "E-espera. Como assim? #n……Eh?"
10046030-354 = "O caminhão foi atacado…… isso é um erro de audição, né……?"
10046030-355 = "Eh, desculpa, pode me explicar melhor?"
10046030-360 = "Sim, sim."
10046030-361 = "O caminhão de entrega foi sequestrado e está desaparecido……?"
10046030-365 = "Por que as coisas terminaram assim!?"
10046030-366 = "Não, não! O que estamos transportando não é dinheiro nem joias, sabe?"
10046030-367 = "B-bem, claro que são ingredientes da melhor qualidade, mas..."
10046030-371 = "Acabei de ouvir um grito... aconteceu algum problema?"
10046030-375 = "I-imaginação sua, talvez?#nEstá tudo bem, então a Nagi-chan deveria descansar!"
10046030-376 = "Hum... aconteceu alguma coisa?"
10046030-377 = "I-Ichika-chan!? Então está tudo bem..."
10046030-378 = "Bem... eu sei que é difícil de acreditar, mas..."
10046030-383 = "Hmm... grupos que atacariam um caminhão por causa de ingredientes, é?"
10046030-384 = "Pelo menos, consigo pensar em tantos que não daria para contar nos dedos de uma mão..."
10046030-385 = "Tantos assim!?"
10046030-386 = "Bem... trabalhando com isso, a gente vê de tudo."
10046030-387 = "Mas, o que vamos fazer?#nMesmo que a gente vá comprar agora, vai levar muito tempo..."
10046030-388 = "Ah. Eu trouxe pão e salsichas, por precaução.#nNão é nada sofisticado, mas acho que serve para o almoço."
10046030-389 = "Isso... não pode!"
10046030-393 = "Por que não?"
10046030-394 = "Porque eu disse para a Nagi-chan que o almoço seria um churrasco."
10046030-395 = "Se não for um churrasco, as férias acabam ali mesmo!"
10046030-396 = "Não... você não acha que isso é um pouco exagerado...?"
10046030-397 = "E se a Nagi-chan descobrir o motivo de não termos conseguido preparar tudo...?"
10046030-398 = "Ah... isso seria um problema sério, hein."
10046030-399 = "Viu!?#nMas não tem como preparar um churrasco do nada..."
10046030-404 = "[ns11] \"Existe... uma possibilidade.\"\n[ns12] \"Mas, eu não queria... ter que usar esse método...!\""
10046030-409 = "[ns] \"Eu não queria ter que usar isso!!!\""
10046030-410 = "P-Sensei!? Você está bem?"
10046030-411 = "Hum... esse método vai acabar te prejudicando, Sensei?"
10046030-412 = "Não precisa se forçar, sabe?#nNo fim das contas, o problema é nosso."
10046030-413 = "Hã? Você está preocupado... comigo? O que quer dizer com isso?"
10046030-418 = "Quanto a mim, não precisa se conter."
10046030-419 = "Não sei qual é o método, mas decidi que faria qualquer coisa por este dia!"
10046030-423 = "...Entendo. Compreendo a situação."
10046030-435 = "Ter recorrido a nós em relação à gastronomia foi..."
10046030-440 = "Uma excelente escolha, eu diria. Ufufu."
