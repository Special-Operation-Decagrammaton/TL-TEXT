[translation]
83306105100-5 = "Uau! O que eu faço! Eu perdi o meu vale-refeição!"
83306105100-6 = "Eu não te avisei para conferir se ele estava bem guardado no bolso?"
83306105100-7 = "Não é como se eu tivesse perdido de propósito, sabia!"
83306105100-8 = "Hoje é o dia em que finalmente podemos comer a comida da festa, eu estava esperando por isso há tanto tempo!"
83306105100-9 = "Logo em um dia como hoje, eu tinha que perder."
83306105100-10 = "Acontecer justamente em um dia importante... é uma história bem comum, não é?★"
83306105100-12 = "Mesmo assim, por que tinha que ser hoje!"
83306105100-18 = "Parece que vocês estão com problemas."
83306105100-19 = "Ah! P-Presidente do Comitê Disciplinar! Eu não fiz nada de errado hoje, juro!"
83306105100-20 = "Nós somos apenas alunas pobres e miseráveis... babando diante da deliciosa comida da festa!"
83306105100-21 = "Somos alunas trágicas e dignas de pena!"
83306105100-22 = "Hã? A única que não pode comer porque perdeu o vale é a Junko, não é? Nós temos os nossos."
83306105100-23 = "Sim, eu também tenho o meu."
83306105100-24 = "Eu também estou com o meu aqui~"
83306105100-26 = "Nós não somos todas do Clube de Pesquisa Gastronômica!?"
83306105100-27 = "Junko, isso é um equívoco."
83306105100-28 = "Hã?"
83306105100-29 = "Nós, do Clube de Pesquisa Gastronômica, somos um grupo que busca a gastronomia suprema."
83306105100-30 = "Mas, se alguém ficar para trás nesse processo, significa apenas que essa pessoa foi deixada para trás."
83306105100-31 = "W-waaaaaah! Não precisava falar desse jeito, poxa!"
83306105100-32 = "...Use o meu vale-refeição."
83306105100-33 = "Não. Como membro do Clube de Pesquisa Gastronômica, não posso permitir tal atalho."
83306105100-34 = "Você é bem rigorosa com essas coisas, hein."
83306105100-35 = "Fufu, chame isso de dedicação à gastronomia."
83306105100-36 = "...Portanto, vamos todas ajudar a procurar o vale da Junko."
83306105100-37 = "Sério, mesmo!?"
83306105100-38 = "Sim, claro. A comida só se torna mais saborosa quando compartilhada com companheiros... e amigos."
83306105100-39 = "É, não tem jeito~! Estou com fome, mas é mais gostoso comer todo mundo junto!"
83306105100-40 = "Fufu. Bem, eu já imaginava que terminaria assim desde o começo~★"
83306105100-41 = "Vocês..."
83306105100-42 = "Eu também vou ajudar."
83306105100-43 = "Pessoal... obrigada!"
