[translation]
83306105100-5 = "うわぁ！どうしよう！食券を失くしちゃった！"
83306105100-6 = "だからポケットにちゃんと入ってるか聞いたのに～"
83306105100-7 = "私だって好きで失くしたわけじゃないんだから！"
83306105100-8 = "今日はせっかくのパーティー料理が食べられる日だから、ずっと楽しみにしてたのに！"
83306105100-9 = "よりによって、こんな日に失くしてしまうだなんて。"
83306105100-10 = "大事な日に限って～というのは、よくある話ですね★"
83306105100-12 = "だからって、なんで今日なのよ！"
83306105100-18 = "何か困っているようね。"
83306105100-19 = "あっ！ふ、風紀委員長！今日はまだ何もしてないからね！"
83306105100-20 = "私たちは、美味しいパーティー料理の前で哀れによだれを垂らすだけの……"
83306105100-21 = "悲劇的で可愛そうな生徒だよ！"
83306105100-22 = "え？食べられないのは食券を失くしたジュンコだけでしょ？私たちは持ってるよ？"
83306105100-23 = "はい、私も持っております。"
83306105100-24 = "私もしっかり持ってますよ～"
83306105100-26 = "私たち全員で美食研究会じゃないの！？"
83306105100-27 = "ジュンコさん、それは間違いですわ。"
83306105100-28 = "え？"
83306105100-29 = "私たち美食研究会は、究極の美食を追い求める集まり。"
83306105100-30 = "ですが、その過程で脱落する者が居たとしても、それはその人が見捨てられただけ。"
83306105100-31 = "う、うわああぁぁぁん～！そんなに風に言わなくてもいいじゃない、もう！"
83306105100-32 = "……私の食券を使ってちょうだい。"
83306105100-33 = "いえ。美食研究会の一員として、そのような抜け道は許せませんわ。"
83306105100-34 = "そういうところは厳しいのね。"
83306105100-35 = "ふふ、美食へのこだわりだと言ってください。"
83306105100-36 = "……ですから、皆さんでジュンコさんの食券を探しましょう。"
83306105100-37 = "えっ、本当！？"
83306105100-38 = "ええ、もちろん。料理とは、仲間……そして友人と共に食べてこそ、より美味しいものになるのですから。"
83306105100-39 = "うん、仕方ないね～！お腹は空いてるけど、みんなで一緒に食べた方が美味しいから！"
83306105100-40 = "ふふっ。まぁ、最初からこうなると思っていましたけどね～★"
83306105100-41 = "あんた達……！"
83306105100-42 = "私も手伝ってあげる。"
83306105100-43 = "みんな……ありがとう！"
