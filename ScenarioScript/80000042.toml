[translation]
80000042-1 = "おやつ担当の甘い気持ち"
80000042-6 = "いやー、たくさん買い物しましたねぇ。"
80000042-7 = "生活必需品からおやつまで色々……付き合っていただいて、ありがとうございました！"
80000042-8 = "[s1] \"ううん、これくらい全然。ちょっと手が痛いくらいで……。\"\n[s2] \"すごい量だね……重い……。\""
80000042-9 = "えっと、そうですか？"
80000042-10 = "えっと、そうですか？"
80000042-11 = "まあ確かに今回はバレンタイン用に、色々と買いましたが……。"
80000042-12 = "[s] \"この重さ、もしかしてダンベルが入ってる……？\""
80000042-13 = "いえいえ、そんなことは無いですよ～。"
80000042-14 = "でもやっぱり重いんですね……確かに結構疲れてらっしゃるような……。"
80000042-15 = "[s] \"面目ない……。\""
80000042-16 = "ふふっ。では、ちょっと二人で「悪いこと」でもしていきましょうか？"
80000042-17 = "[s] \"悪いこと……？\""
80000042-19 = "（ノノミと二人で、近くの川沿いのベンチに座って少し休むことにした）"
80000042-21 = "風が涼しくて、気持ち良いですね～。"
80000042-22 = "[s] \"……悪いこと？\""
80000042-23 = "ふふっ、はい。普段ならお買い物を終えたら、すぐ帰らないとですからね。"
80000042-24 = "こうやって帰る前にふたりだけでこっそり休むのは、ちょっとだけ「悪いこと」です。"
80000042-25 = "今日は天気も良いですし、こうしてお散歩するのは気持ち良くて楽しいですね～☆"
80000042-26 = "先生はいかがです？"
80000042-27 = "[s] \"私も楽しいよ、良いところだね。\""
80000042-28 = "ふふっ、それは良かったです。"
80000042-29 = "うーん、何か忘れているような……？"
80000042-30 = "あっ、せっかくですし……おやつの時間にしましょうか！"
80000042-36 = "はい、どうぞ！"
80000042-37 = "[s] \"チョコレート？\""
80000042-38 = "はい、こちらもどうぞ！"
80000042-39 = "[s] \"チョコレートキャンディーだ。\""
80000042-40 = "こちらも！"
80000042-41 = "[s] \"チョコレートキャラメル……？\""
80000042-42 = "あとは～……"
80000042-43 = "[s3] \"ノノミ、ストップ！\"\n[s4] \"どこからこんなにチョコレートが……？\""
80000042-44 = "あ、びっくりされました？実はこれ、さっきお買い物の時に買ったんです！"
80000042-45 = "あ、びっくりされました？実はこれ、さっきお買い物の時に買ったんです！"
80000042-50 = "[ns5] \"色んなチョコレートのお菓子が……\"\n[ns6] \"もう雪崩が起きそうなくらいに……。\""
80000042-51 = "はい、みんなで食べたいなと思いまして。それぞれどんなチョコレートなら喜んでくれるかなと思いつつ、色んなのをたくさん入れたんです。"
80000042-52 = "はい、みんなで食べたいなと思いまして。それぞれどんなチョコレートなら喜んでくれるかなと思いつつ、色んなのをたくさん入れたんです。"
80000042-53 = "もちろん、先生にも☆さあ、ぜひ食べてください！"
80000042-54 = "これでもアビドスのおやつ担当ですからね、これだけではありませんよ～！"
80000042-55 = "一つずつ差し上げますので、感想もひとつずつお願いしますね？ふふっ☆"
80000042-56 = "はい、あーん！"
80000042-57 = "[s] \"あーん……\""
80000042-59 = "（そうやってノノミから一つずつ食べさせてもらい、山のようなチョコレートを崩していった）"
