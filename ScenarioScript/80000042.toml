[translation]
80000042-1 = "O sentimento doce da responsável pelos lanches"
80000042-6 = "Nossa, nós compramos muita coisa, não é?"
80000042-7 = "Desde itens essenciais do dia a dia até lanches... muito obrigada por me acompanhar!"
80000042-8 = "[s1] \"Não, não foi nada. Só estou com as mãos um pouco doloridas...\"\n[s2] \"É uma quantidade incrível... está pesado...\""
80000042-9 = "Ah, é mesmo?"
80000042-10 = "Ah, é mesmo?"
80000042-11 = "Bem, é verdade que desta vez compramos várias coisas para o Dia dos Namorados, mas..."
80000042-12 = "[s] \"Com esse peso, será que tem halteres aqui dentro...?\""
80000042-13 = "Não, não, nada disso~."
80000042-14 = "Mas realmente está pesado... você parece estar bem cansado, de fato..."
80000042-15 = "[s] \"Que vergonha...\""
80000042-16 = "Fufu. Então, que tal nós dois fazermos uma \"travessura\"?"
80000042-17 = "[s] \"Uma travessura...?\""
80000042-19 = "(Decidi sentar em um banco perto do rio com a Nonomi para descansar um pouco)"
80000042-21 = "O vento está fresco, é muito agradável~."
80000042-22 = "[s] \"...Uma travessura?\""
80000042-23 = "Fufu, sim. Normalmente, quando terminamos as compras, temos que voltar logo, não é?"
80000042-24 = "Ficar descansando aqui escondidos, só nós dois antes de voltar, é uma pequena \"travessura\"."
80000042-25 = "O tempo está ótimo hoje, e passear assim é muito agradável e divertido~☆"
80000042-26 = "O que acha, Sensei?"
80000042-27 = "[s] \"Eu também estou me divertindo, é um ótimo lugar.\""
80000042-28 = "Fufu, fico feliz em ouvir isso."
80000042-29 = "Hmm, sinto que estou esquecendo de algo...?"
80000042-30 = "Ah, já que estamos aqui... que tal fazermos a hora do lanche!"
80000042-36 = "Aqui, pegue!"
80000042-37 = "[s] \"Chocolate?\""
80000042-38 = "Sim, pegue este também!"
80000042-39 = "[s] \"É um bombom de chocolate.\""
80000042-40 = "Este também!"
80000042-41 = "[s] \"Caramelo de chocolate...?\""
80000042-42 = "E também..."
80000042-43 = "[s3] \"Nonomi, pare!\"\n[s4] \"De onde veio tanto chocolate...?\""
80000042-44 = "Ah, te surpreendi? Na verdade, comprei tudo isso durante as compras agora pouco!"
80000042-45 = "Ah, te surpreendi? Na verdade, comprei tudo isso durante as compras agora pouco!"
80000042-50 = "[ns5] \"Tantos tipos de doces de chocolate...\"\n[ns6] \"A ponto de causar uma avalanche...\""
80000042-51 = "Sim, eu queria que todos comessem juntos. Fiquei pensando em qual tipo de chocolate cada um gostaria, e acabei colocando vários tipos diferentes."
80000042-52 = "Sim, eu queria que todos comessem juntos. Fiquei pensando em qual tipo de chocolate cada um gostaria, e acabei colocando vários tipos diferentes."
80000042-53 = "Claro, para você também, Sensei☆ Vamos, por favor, coma!"
80000042-54 = "Afinal, sou a responsável pelos lanches de Abydos, então não é só isso~!"
80000042-55 = "Vou te dar um por um, então quero que me dê sua opinião sobre cada um, está bem? Fufu☆"
80000042-56 = "Vamos, diga 'ah'!"
80000042-57 = "[s] \"Ah...\""
80000042-59 = "(Assim, fui sendo alimentado pela Nonomi, um por um, enquanto a montanha de chocolates diminuía)"
