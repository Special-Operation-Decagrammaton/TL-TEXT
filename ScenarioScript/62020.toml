[translation]
62020-1 = "Episódio 2: O som da corneta"
62020-3 = "Isso mesmo! Podem pegar daqui!"
62020-4 = "Temos o suficiente para todos, então, por favor, formem uma fila!"
62020-11 = "Tem bastante, mas... o que é isso...?"
62020-13 = "Isto é uma \"ração terapêutica nutricional\"."
62020-18 = "Após os exames médicos, concluímos que vocês estão, no geral, com deficiência nutricional."
62020-19 = "Não chega a ser uma desnutrição grave, mas é preocupante que a dieta de vocês esteja concentrada apenas em gorduras saturadas e açúcares."
62020-20 = "Por isso, criamos isto para melhorar a carência nutricional de vocês—"
62020-21 = "Tem um alto valor nutricional, com 500 kcal por pacote."
62020-22 = "Por isso, trouxemos isto para vocês. #nÉ rico em vitaminas, minerais e fibras, sendo a refeição ideal para vocês agora."
62020-23 = "Não se preocupem com o sabor. É levemente adocicado, tem um aroma agradável e é macio, então é fácil de comer."
62020-24 = "Recomendo consumir de 2 a 3 unidades por dia."
62020-26 = "Ah, muito obrigada..."
62020-27 = "Isto é um \"canudo purificador de água portátil\"!"
62020-28 = "É um item incrível que transforma até água suja em água potável!"
62020-29 = "O uso é simples! Basta colocar a ponta do canudo na poça d'água e sugar!"
62020-30 = "Porém! Existem dois pontos de atenção que vocês precisam lembrar."
62020-31 = "Primeiro, suguem a água lentamente ao beber!"
62020-32 = "Segundo, não confiem cegamente, pois existem coisas como sais e vírus que ele não consegue remover!"
62020-33 = "...Foi o que a veterana me disse!"
62020-35 = "Com isso... não precisaremos mais correr para coletar água toda vez que chover... ou ficar com dor de barriga por beber água de poças diretamente... é isso!?"
62020-36 = "Sim, exatamente. #nAlém disso, também temos kits de primeiros socorros."
62020-37 = "Dentro dele, há 30 tipos de suprimentos médicos."
62020-38 = "Tudo isso!?"
62020-39 = "Além de antissépticos e gaze, contém uma lanterna pequena, pilhas, bolsas térmicas, manta de alumínio e mais—"
62020-40 = "É o kit de primeiros socorros padrão do nosso Clube de Atividades Voluntárias Sem Nome!"
62020-42 = "Isso ser o padrão... é impressionante demais..."
62020-45 = "Que surpresa. Não esperava que tivéssemos uma aula em um lugar como este..."
62020-46 = "[s] \"Pois o caminho do aprendizado não tem fim nem limites.\""
62020-47 = "E-entendo..."
62020-48 = "Mas... será que estudar tem algum sentido...?"
62020-49 = "Especialmente matemática... funções quadráticas, cálculo..."
62020-50 = "[s1] \"A matemática em si pode não ser útil diretamente.\"\n[s2] \"Mas o hábito de pensar matematicamente certamente será uma ajuda.\""
62020-53 = "Pensar matematicamente...? O que isso significa?"
62020-55 = "Isso também me deixa curiosa."
62020-56 = "Eu... acho que entendo um pouco."
62020-57 = "...A matemática tenta expressar situações com precisão através de números."
62020-58 = "Então, quem estuda matemática aprende a definir claramente a causa e o efeito de um problema, e a explicar o processo... não é isso?"
62020-59 = "Entendi. Assim, você ganha a capacidade de combinar várias evidências e proposições para pensar de forma lógica, chegando a conclusões como \"por isso acontece assim\"."
62020-61 = "E também conseguir encontrar ordem ou regras, mesmo em coisas que parecem caóticas à primeira vista...?"
62020-62 = "Mas... isso realmente acaba sendo útil?"
62020-63 = "[s3] \"Torna mais fácil convencer os outros.\"\n[s4] \"Quando a lógica faz sentido, é mais fácil de aceitar.\""
62020-68 = "[ns5] \"Por isso, estudar matemática tem seu significado.\"\n[ns6] \"Para se acostumar com o pensamento matemático.\""
62020-71 = "[ns7] \"Além disso, não é só isso--\"\n[ns8] \"E também, saber matemática é um pouco estiloso, não é?\""
62020-74 = "Entendo..."
62020-75 = "..."
62020-76 = "Isso... é bom."
62020-77 = "Naquela época também..."
62020-81 = "Se eu tivesse pensado daquela forma..."
62020-82 = "Será que eu teria evitado passar por aquilo...?"
62020-83 = "O que aconteceu?"
62020-87 = "I-Isso é..."
62020-97 = "Arius? Ah, eles não foram os que causaram aquele tumulto durante o Tratado de Éden?"
62020-98 = "Por que uma encrenqueira dessas estaria em um lugar como este...?"
62020-99 = "É por isso que crianças mal-educadas são assim..."
62020-100 = "Se estivessem em uma escola decente, nunca teriam causado aquele incidente..."
62020-104 = "Muita coisa... aconteceu."
62020-105 = "Fora de Arius..."
62020-110 = "..."
62020-111 = "I-iieee... Como eu pensei, adultos são assustadores...#nO mundo é cruel, não é?"
62020-112 = "Ué? Mas pensando bem, o Sensei também é um adulto, não é...?"
62020-113 = "[s9] \"É verdade...\"\n[s10] \"Por isso, como um adulto, eu peço desculpas.\""
62020-118 = "Eh? S-Sensei, não precisa chegar a tanto..."
62020-119 = "Chegar a tanto..."
62020-123 = "...snif... ugh..."
62020-124 = "...Bem, não é sua culpa, embora eu não saiba de nada."
62020-125 = "O mundo lá fora é um lixo, de qualquer forma."
62020-126 = "M-Misaki-san..."
62020-127 = "Talvez fique mais fácil se você pensar que a culpa é toda dos adultos e do mundo."
62020-128 = "Embora não seja algo tão simples de se resolver."
62020-129 = "..."
62020-130 = "Por isso, é melhor ignorar."
62020-131 = "Aceite apenas as partes que você consegue aceitar.#nSe não fizer isso, você não vai aguentar."
62020-132 = "Este mundo não tem nada de bom, afinal."
62020-133 = "Eu mesma não sei qual é o motivo para continuar vivendo, mas..."
62020-134 = "..."
62020-135 = "Mas, como o Sensei disse para eu \"tentar viver\".#nEstou aqui agora."
62020-141 = "...fufu."
62020-142 = "Eh, ehehe..."
62020-143 = "Ah."
62020-148 = "...O quê? Que reação é essa?"
62020-149 = "[s] \"Misaki... você cresceu tanto... snif.\""
62020-153 = "Sensei, fique quieto!#nE pare de fingir que está emocionado."
62020-154 = "Aliás, Sensei, você tem noção? Você é o maior problema de todos."
62020-155 = "Eh...? É-é mesmo?"
62020-156 = "Sim, você é o pior tipo."
62020-157 = "Você nos dá esperança por conta própria, mas o problema é que não é tudo mentira."
62020-158 = "...Se fosse tudo mentira, eu teria desistido facilmente."
62020-159 = "Tome cuidado. Esse aí é do tipo que não alimenta o peixe depois de fisgá-lo."
62020-160 = "É melhor você ficar prevenida também."
62020-161 = "É-é mesmo, é...?"
62020-162 = "[s] \"Eh? Então, quer ficar comigo para sempre?\""
62020-165 = "Por que você fala desse jeito!"
62020-170 = "..."
62020-171 = "Vazio... tudo é apenas vazio..."
62020-172 = "Sa-chan?"
62020-173 = "[s] \"...?\""
62020-174 = "É uma frase que ouvi tantas vezes que já estou cansada dela... mas acho que muitas vezes foi mal interpretada."
62020-175 = "Todas as coisas eventualmente passam... por isso, não há necessidade de se forçar.#nOriginalmente, esse é o significado."
62020-176 = "Eu, vocês... tudo passa da mesma forma."
62020-177 = "Mas talvez, ao olhar para trás algum dia, chegue o momento em que possamos rir juntos e dizer: 'Naquela época, coisas assim também aconteceram'."
62020-178 = "Claro... também existe a possibilidade de que isso não aconteça."
62020-179 = "O futuro é o futuro justamente porque não sabemos. #nFicar preso a um único pensamento não é algo muito louvável."
62020-180 = "......O único futuro que deveria ser garantido é o pagamento pelo trabalho."
62020-182 = "Fufu. Isso é realmente importante."
62020-183 = "Ehehe..."
62020-190 = "!?"
62020-192 = "!!!"
62020-193 = "[s11] (Esse som... uma trombeta...?)\n[s12] (Com isso... talvez seja a quarta vez...?)"
62020-198 = "D-desculpem! #nAgora, lá fora... está acontecendo algo terrível!"
62020-203 = "Pessoal, por favor, acalmem-se! #nEntrar em pânico é ainda mais perigoso!"
62020-209 = "O que aconteceu?"
62020-214 = "Saori Joumae..."
62020-215 = "......"
62020-216 = "Olhem para lá."
62020-227 = "O que... é aquilo?"
62020-228 = "......Não sei. Apareceu de repente há pouco tempo. #nOs ataques parecem atingir, mas o efeito é mínimo."
62020-232 = "(Essa presença... é a mesma daquela 'coisa' que vi quando ouvi o som da trombeta antes...?)"
62020-233 = "(Aquilo, será que é...)"
62020-234 = "O que é aquilo...? Apareceu depois da trombeta, né? #nE tem quatro deles..."
62020-235 = "Hã? Trombeta? Eu não ouvi nada..."
62020-236 = "Hã? Foi um som super alto, não foi?"
62020-237 = "S-senpai? Você ouviu, senpai?"
62020-242 = "Não, eu também não ouvi nada em particular..."
62020-244 = "Viu só!"
62020-245 = "......Não parece estranho?"
62020-255 = "Aaaah!? Eles estão vindo na nossa direção!"
62020-267 = "Pessoal, por favor, fiquem atrás de nós!!"
62020-269 = "Uau!?"
62020-275 = "Estão todos bem? Alguém se feriu?"
62020-276 = "Estamos prontos! Líder... digo, senpai!"
62020-278 = "Então..."
62020-279 = "......"
62020-283 = "Nós, do 'Clube de Atividades de Serviço Sem Nome', protegeremos todos vocês!"
62020-285 = "Nós também vamos."
62020-286 = "Bem... era de se esperar."
62020-287 = "Pense nisso como proteger nossa escola. Não importa o que aquilo seja."
62020-292 = "......"
62020-293 = "P-pessoal, por favor, tomem cuidado...!"
