[translation]
62020-1 = "Episódio 2; O Som da Trombeta"
62020-3 = "Oiii! Podem vir pegar por aqui!"
62020-4 = "Tem o suficiente para todos, então façam uma fila, por favor!"
62020-11 = "Tem bastante coisa, mas... o que é isso...?"
62020-13 = "Isso aqui é o 'Alimento Terapêutico Nutricional'."
62020-18 = "Com base nos exames médicos, concluímos que todas vocês estão com deficiência nutricional no geral."
62020-19 = "Não chega a ser desnutrição, mas é preocupante que a alimentação de vocês seja baseada quase apenas em gorduras saturadas e carboidratos."
62020-20 = "E isso aqui foi feito justamente para melhorar essa falta de nutrientes--"
62020-21 = "Tem um alto valor nutricional, um pacote só já tem 500kcal."
62020-22 = "Por isso, estamos entregando isso a vocês. #nÉ rico em vitaminas, minerais e fibras, então acredito que seja a refeição ideal para a atual situação de vocês."
62020-23 = "Não se preocupem com o gosto. É saboroso, levemente doce e bem macio, então é fácil de comer."
62020-24 = "Recomendamos que comam de 2 a 3 desses por dia."
62020-26 = "A-Ah, muito obrigada..."
62020-27 = "Esse aqui é um 'Canudo Purificador de Água Portátil'!"
62020-28 = "É um item incrível que transforma até água suja em água potável!"
62020-29 = "É super fácil de usar! É só colocar a ponta do canudo na poça e chupar!"
62020-30 = "Mas atenção! Tem dois pontos importantes para se lembrar."
62020-31 = "Primeiro: chupe a água devagar!"
62020-32 = "Segundo: ele não remove coisas como sal ou vírus... então não confiem cegamente nele!"
62020-33 = "...Foi isso que a Senpai disse!"
62020-35 = "Quer dizer que... com isso, a gente não vai mais precisar correr para coletar água toda vez que chover... nem ter dor de barriga por beber água da poça direto!?"
62020-36 = "Sim, exatamente isso. #nTambém temos kits de primeiros socorros."
62020-37 = "Tem 30 tipos diferentes de suprimentos médicos aí dentro."
62020-38 = "Tudo isso!?"
62020-39 = "Além de desinfetante e gaze, tem lanterna pequena com pilhas, aquecedores portáteis, cobertores térmicos de alumínio..."
62020-40 = "É o kit de emergência com as especificações padrão do Clube de Voluntariado Sem Nome!"
62020-42 = "Se isso é o padrão... é incrível demais..."
62020-45 = "Que surpresa. Não esperava que você fosse dar aula até num lugar como esse..."
62020-46 = "[s] \"O caminho do aprendizado não tem fim nem limites, não é mesmo.\""
62020-47 = "E-Entendo..."
62020-48 = "Mas... estudar tem mesmo algum sentido...?"
62020-49 = "Especialmente matemática... funções quadráticas, cálculo diferencial e integral..."
62020-50 = "[s1] \"A matemática em si pode não ser útil diretamente com frequência.\"\n[s2] \"Mas o hábito de pensar de forma matemática com certeza vai ajudar.\""
62020-53 = "Pensar de forma matemática...? O que quer dizer com isso?"
62020-55 = "Acho que também fiquei curiosa sobre isso."
62020-56 = "Eu... acho que entendo um pouco."
62020-57 = "...A matemática tenta expressar as situações de forma precisa com números."
62020-58 = "Então quem estuda matemática aprende a definir claramente a causa e o efeito de um problema e a explicar esse processo... não é isso?"
62020-59 = "Ah, entendi. Assim você desenvolve a habilidade de combinar vários argumentos e premissas e pensar de forma lógica, tipo 'é por isso que acontece'."
62020-61 = "Mesmo que pareça tudo bagunçado à primeira vista, você consegue encontrar ordem e regras...?"
62020-62 = "Mas... e isso serve pra alguma coisa no final das contas?"
62020-63 = "[s3] \"Fica mais fácil de persuadir os outros.\"\n[s4] \"Porque quando a lógica faz sentido, é mais fácil de concordar.\""
62020-68 = "[ns5] \"É por isso que estudar matemática também tem o seu valor.\"\n[ns6] \"Para se acostumar com o pensamento matemático.\""
62020-71 = "[ns7] \"E não é só isso--\"\n[ns8] \"Ser boa em matemática te deixa com uma aparência mais legal, né!\""
62020-74 = "Entendi..."
62020-75 = "..."
62020-76 = "Isso... é muito bom."
62020-77 = "Naquela época também..."
62020-81 = "Se a gente pudesse ter pensado dessa forma..."
62020-82 = "Será que a gente não precisaria ter passado por tudo aquilo...?"
62020-83 = "O que aconteceu?"
62020-87 = "B-Bem, isso..."
62020-97 = "Arius? Ah, não foram elas que causaram aquele alvoroço no Tratado do Éden?"
62020-98 = "O que essas problemáticas estão fazendo num lugar como esse...?"
62020-99 = "É por isso que não se pode confiar em crianças mal educadas..."
62020-100 = "Pra começo de conversa, se estudassem numa escola decente, não teriam causado aquele incidente..."
62020-104 = "Aconteceram... muitas coisas."
62020-105 = "Fora da Arius..."
62020-110 = "..."
62020-111 = "I-Iiii... os adultos são realmente assustadores... #nO mundo é um lugar cruel, não é..."
62020-112 = "Ué? Mas pensando bem, o Sensei também é um adulto, não é...?"
62020-113 = "[s9] \"É verdade...\"\n[s10] \"Por isso, eu peço desculpas como adulto.\""
62020-118 = "Hã? S-Sensei... não precisa fazer isso..."
62020-119 = "Não precisa de tudo isso..."
62020-123 = "...Sniff... Uuu..."
62020-124 = "...Bem, a culpa não é sua, sei lá."
62020-125 = "O mundo lá fora é cruel na maioria das vezes."
62020-126 = "M-Misaki-san..."
62020-127 = "Pode ser que fique mais fácil se você pensar que todos os adultos e o mundo inteiro são ruins."
62020-128 = "Mas as coisas também não são tão simples de se resolver assim."
62020-129 = "..."
62020-130 = "Então, é só ignorar."
62020-131 = "Só aceite aquilo que você consegue aceitar. #nSenão você não aguenta."
62020-132 = "Esse mundo não vale a pena, de qualquer forma."
62020-133 = "Eu também não sei qual é o sentido de continuar vivendo, mas..."
62020-134 = "..."
62020-135 = "Mas o Sensei me disse para 'tentar viver'. #nEntão, eu estou aqui agora."
62020-141 = "...Hehe."
62020-142 = "E-Ehehe..."
62020-143 = "Pois é."
62020-148 = "...Que reação é essa?"
62020-149 = "[s] \"Misaki... você cresceu tanto... sniff.\""
62020-153 = "Fica quieto, Sensei! #nE não precisa fingir que tá emocionado."
62020-154 = "Falando nisso, Sensei, você tem noção das coisas? O maior problema de todos aqui é você."
62020-155 = "Hã...? S-Sério?"
62020-156 = "Sim, você é o pior de todos."
62020-157 = "Você nos mostra esperança do nada, e a parte mais irritante é que nem tudo é mentira."
62020-158 = "...Se fosse tudo mentira, a gente teria desistido de uma vez."
62020-159 = "Toma cuidado. Esse cara é do tipo que não alimenta o peixe depois de pescar."
62020-160 = "É melhor você ficar de olho nele também."
62020-161 = "E-Entendo..."
62020-162 = "[s] \"Hã? Então você quer ficar junto pro resto da vida?\""
62020-165 = "E por que você tem que falar desse jeito!?"
62020-170 = "..."
62020-171 = "Vaidade... tudo não passa de vaidade..."
62020-172 = "Sacchan?"
62020-173 = "[s] \"...?\""
62020-174 = "Já ouvi essas palavras tantas vezes que meus ouvidos até doem... mas acho que elas são mal interpretadas com frequência."
62020-175 = "Todas as coisas passarão com o tempo... por isso, não há necessidade de se sobrecarregar. #nOriginalmente, era só isso que significava."
62020-176 = "Tanto eu, quanto vocês... tudo passará de forma igual."
62020-177 = "Mas talvez chegue o dia em que olhemos para trás e possamos rir, dizendo: 'Aquelas coisas também aconteceram, não é'."
62020-178 = "Claro... também há a possibilidade de que isso não aconteça."
62020-179 = "É o futuro justamente porque não sabemos. #nFicar preso a uma única ideia não é algo muito louvável."
62020-180 = "...A única coisa no futuro que deve ser garantida é o pagamento pelo nosso trabalho."
62020-182 = "Hehe. Isso é realmente importante."
62020-183 = "Ehehe..."
62020-190 = "!?"
62020-192 = "!!!"
62020-193 = "[s11] (Esse som... de uma trombeta...?)\n[s12] (Essa já é... a quarta vez...?)"
62020-198 = "C-Com licença! #nTem uma coisa... terrível acontecendo lá fora!"
62020-203 = "Pessoal, por favor, se acalmem! #nEntrar em pânico só vai piorar a situação!"
62020-209 = "O que aconteceu?"
62020-214 = "Joumae Saori..."
62020-215 = "..."
62020-216 = "Olhem para lá."
62020-227 = "O que... é aquilo?"
62020-228 = "...Não sabemos. Apareceu de repente. #nNossos ataques parecem acertar, mas o efeito é mínimo."
62020-232 = "(Essa presença... é igual 'àquilo' que eu vi quando a trombeta tocou antes...?)"
62020-233 = "(Será que é...?)"
62020-234 = "O que é aquilo...? Eles surgiram depois da trombeta, não é? #nTem quatro deles ali..."
62020-235 = "Hã? Trombeta? Eu não ouvi nada..."
62020-236 = "Como assim? Fez um barulhão."
62020-237 = "S-Senpai? Você ouviu, Senpai?"
62020-242 = "Não, eu também não ouvi nada..."
62020-244 = "Viu só!"
62020-245 = "...Tem alguma coisa estranha, não acha?"
62020-255 = "Waaah!? Eles estão vindo pra cá!"
62020-267 = "Pessoal, fiquem atrás de nós!!"
62020-269 = "Uwah!?"
62020-275 = "Estão todas bem? Alguém se machucou?"
62020-276 = "Estamos prontas! Capitã-- Senpai!"
62020-278 = "Muito bem, então..."
62020-279 = "..."
62020-283 = "Nós do 'Clube de Voluntariado Sem Nome' protegeremos vocês!"
62020-285 = "Nós vamos também."
62020-286 = "Bem... isso já era esperado."
62020-287 = "Pense que estamos protegendo nossa antiga escola. O que quer que seja aquilo, não importa."
62020-292 = "..."
62020-293 = "P-Pessoal, tomem cuidado, por favor...!"