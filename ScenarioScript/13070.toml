[translation]
13070-1 = "Episódio 7; Limites do corpo"
13070-6 = "……Shiroko-chan?"
13070-7 = "Você está me seguindo faz um tempo, o que você quer com esse velho aqui?"
13070-8 = "Hum, só estou te seguindo."
13070-9 = "Isso é um pouco problemático...#nAlém disso, uma estudante do ensino médio seguindo um velho, que tipo de situação é essa?"
13070-10 = "……Por que você veio aqui?#nMesmo que não more mais ninguém aqui……"
13070-11 = "……Sim."
13070-12 = "Não tem…… mais ninguém aqui, né."
13070-13 = "Este é o lugar onde conheci a Sempai Yume pela primeira vez."
13070-14 = "A antiga presidente do conselho estudantil……"
13070-15 = "Por isso, quando me dei conta, meus pés já tinham me trazido para cá…… sim, é mais ou menos isso."
13070-19 = "Eu também não sei o que aconteceu com a Sempai."
13070-20 = "……."
13070-21 = "Mas, acho que não é bom continuar escondendo as coisas de todo mundo."
13070-22 = "……."
13070-23 = "Ayane, Nonomi e Serika, todas estão preocupadas.#nIsso também tem relação com o desaparecimento da presidente do conselho estudantil?"
13070-28 = "Ah!#nTem um carro-forte sem escolta ali!"
13070-38 = "Sempai Hoshino!"
13070-47 = "Não vou deixar escapar."
13070-49 = "Noaaah!?#nVocê ficou mais rápida de novo, Shiroko-chan!?"
13070-50 = "Quer dizer, aquilo de agora foi um gesto de consideração desse velho, sabe……!#nVocê não consegue ler o clima nem um pouco!?"
13070-51 = "Não quero, vou te pegar."
13070-52 = "Ah, meu Deus……!#nEu só queria ficar um pouco sozinha, sabia!?"
13070-59 = "A Sempai Shiroko está atrasada……"
13070-60 = "……Vou entrar em contato com o mordomo, afinal."
13070-61 = "……Da Nephthys, certo?"
13070-62 = "Sim, se for a Nephthys, eles devem saber de algo.#nAlém disso, não temos outras pistas agora……"
13070-63 = "V-você está bem?#nDaquela vez, vocês pareciam um pouco desconfortáveis……"
13070-64 = "Como não entro em contato com a minha família há muito tempo……#nAcho que eles não têm uma boa impressão de mim."
13070-65 = "……Eu não me importo muito com isso, na verdade.#nO contato, se não me engano, é……"
13070-66 = "……Por favor, não se force, Sempai Nonomi."
13070-67 = "……Sim."
13070-75 = "Desculpe, ela escapou."
13070-76 = "Sempai Shiroko!"
13070-77 = "Entendo……"
13070-78 = "Hum…… ainda me falta força."
13070-79 = "Ah, ela ficou deprimida……"
13070-80 = "Se nem a Sempai Shiroko conseguiu, ninguém mais conseguiria alcançar."
13070-81 = "……A Sempai Hoshino disse.#nQue vai para a escola amanhã, então não precisamos nos preocupar."
13070-83 = "Foi isso que ela disse……"
13070-84 = "……Talvez a Sempai Hoshino precise de um tempo agora."
13070-85 = "……."
13070-89 = "……Ah."
13070-93 = "……Senhorita."
13070-94 = "Mordomo, sobre aquilo……"
13070-95 = "Você quer saber sobre a ferrovia transdesértica?"
13070-96 = "……Sim."
13070-97 = "Então você realmente sabe de algo, não é?"
13070-98 = "Certamente, eu estou ciente."
13070-99 = "O que a Nephthys está planejando?#nQual é o objetivo do fundo de investimento privado?"
13070-100 = "O desaparecimento da ex-presidente do conselho estudantil e a relação com o contrato...?"
13070-101 = "Estou ciente disso — mas não há necessidade de a senhorita se preocupar com assuntos relacionados ao trabalho, não é?"
13070-102 = "……Isso é."
13070-103 = "Talvez seja, mas……"
13070-107 = "……Faz dois anos que não conversamos adequadamente, não é?#nComo tem passado?"
13070-108 = "……Sim."
13070-109 = "O limite do seu cartão é suficiente?#nSe precisar, posso lhe entregar um novo cartão com o limite aumentado, então#npor favor, peça a qualquer momento."
13070-110 = "N-não…… está tudo bem.#nMesmo agora, não estou passando por dificuldades, então……"
13070-111 = "……."
13070-112 = "Quanto a mim, estou bem……#nMordomo, Nephthys——"
13070-114 = "A senhorita não deve fazer nada e continuar vivendo como tem feito até agora.#n……Você não se esqueceu do tamanho do prejuízo que causou, esqueceu?"
13070-115 = "……."
13070-120 = "Hum……"
13070-122 = "Com todo o respeito, a senhorita sempre criticou a Nephthys.#nMuitos achariam que pedir algo agora é um pouco de "cara de pau", não acha……?"
13070-123 = "Isso é……"
13070-124 = "……Peço desculpas pelo tom severo.#nMas a Nephthys está enfrentando uma crise no momento."
13070-125 = "……Eh?"
13070-126 = "Não é exagero dizer que a sobrevivência da empresa será decidida#nna assembleia geral daqui a dois dias."
13070-127 = "O que exatamente vai acontecer nessa assembleia……"
13070-128 = "……O pessoal de Abydos também está aí agora?"
13070-134 = "……."
13070-136 = "Amanhã, irei visitá-los pessoalmente.#nComo já está tarde hoje, conversaremos com mais detalhes naquela ocasião."
13070-137 = "E senhorita, não se esqueça do cartão. Eu farei a troca.#nBem, por hoje, despeço-me."
13070-138 = "Eh? Não precisa disso——"
13070-142 = "……."
13070-143 = "Nonomi-senpai……"
13070-144 = "……Não se preocupe com isso.#nMais importante, dizer que a sobrevivência da Nephthys está em jogo……"
13070-145 = "Pode ser uma situação mais complexa do que eu imaginava……"
13070-146 = "Eu também vou tentar reunir algumas informações."
13070-147 = "Você está bem……?#nAyane-chan, você também está cansada, não está?"
13070-148 = "Isso é…… mas……!"
13070-149 = "[s] \"Vamos voltar cedo para casa e descansar hoje.\""
13070-150 = "Sensei?"
13070-151 = "……Vamos fazer isso, Ayane-chan.#nEm momentos como este, descansar também é importante."
13070-152 = "Shiroko-chan, Serika-chan e também o Sensei……"
13070-154 = "Eu estou bem."
13070-155 = "Não, não, Shiroko-senpai, seu rosto também parece cansado.#nVolte para casa e descanse direito, tá?"
13070-156 = "……Hum."
13070-157 = "Ahaha…… afinal, nós corremos atrás da Hoshino-senpai com tudo o que tínhamos……"
13070-158 = "[s1] \"Eu também vou voltar para o Schale e investigar algumas coisas.\"\n[s2] \"Vamos nos reunir todos novamente amanhã.\""
13070-161 = "Hum, entendi."
13070-162 = "Então, pessoal, até amanhã."
13070-163 = "Sim, até mais."
13070-168 = "……."
13070-169 = "Aconteceu alguma coisa, Ayane-chan?"
13070-170 = "……Não sente que tem algo estranho acontecendo?"
13070-171 = "Algo estranho?"
13070-172 = "A ferrovia transcontinental, a assembleia de credores, o conselho estudantil de Abydos……"
13070-173 = "A data do contrato descoberto por acaso e o dia do desaparecimento da Yume-senpai……"
13070-174 = "É como se algo muito grande, que nós desconhecemos, estivesse em movimento……"
13070-175 = "Sim, por isso vamos nos reunir de novo amanhã, certo?"
13070-176 = "É verdade, mas não é bem isso..."
13070-177 = "Como posso dizer, é uma sensação estranha..."
13070-178 = "[s] \"Sensação estranha?\""
13070-179 = "……Sim."
13070-181 = "É como se houvesse uma intenção oculta de alguém...#nSinto uma certa malícia..."
13070-182 = "Malícia... mas de quem exatamente?"
13070-183 = "[s] \"…….\""
13070-184 = "……É, você tem razão.#nTalvez eu esteja pensando demais."
13070-185 = "Sensei, por favor, não se preocupe com isso."
13070-186 = "……Provavelmente estou confusa por falta de informações."
13070-187 = "Temos uma reunião marcada com o pessoal da Nefthys amanhã, #nvou aproveitar para coletar o máximo de informações possível."
13070-188 = "[s] \"Entendido, mas não se esforce demais, está bem?\""
13070-189 = "……Sim.#nVamos voltar, Serika-chan."
13070-190 = "E-espera aí, Ayane-chan."
13070-195 = "[ns] Retornar ao Schale."
13070-199 = "Estratégia número 1: \"O que já aconteceu não pode ser mudado\"."
13070-200 = "Se o Sensei insiste em mudar o futuro a todo custo, #nbasta usar o passado a nosso favor."
13070-201 = "Mesmo para o Sensei, mudar o passado deve ser impossível."
13070-207 = "Ou seja, a chave para a estratégia está no... \"passado\"."
13070-216 = "Eu..."
13070-219 = "Vamos lá, Sensei... Hehe, hehehe..."
13070-221 = "Existem quatro estratégias no total."
13070-222 = "A primeira já está em andamento... #ne a segunda também, em breve... Heheh."
13070-223 = "Ora, talvez a quarta estratégia nem precise ser usada. Quem sabe..."
13070-224 = "Vou me divertir vendo as suas escolhas... Heheh, hehehehe..."
13070-228 = "[ns] \"Arona, Plana.\""
13070-230 = "Sim, Sensei!"
13070-231 = "Confirmação, aguardando ordens."
13070-232 = "[ns] \"Tenho algo que preciso terminar antes do amanhecer.\""
13070-234 = "[ns5] \"Se eu acabar dormindo no meio do caminho,\"\n[ns6] \"vocês poderiam me acordar de algum jeito?\""
13070-237 = "Passar a noite em claro... V-você está bem, Sensei?"
13070-238 = "U-uuh... Entendido! #nMas, por favor, faça pausas para descansar!"
13070-239 = "Compreendido.#nUm despertador matinal, pode deixar comigo."
13070-240 = "[ns] \"...Ah, e mais uma coisa.\""
13070-242 = "[ns] \"...Houve algum movimento da Gematria?\""
13070-243 = "Gematria? #nDesde aquela vez, nada em especial..."
13070-244 = "Qual é o motivo da pergunta, Sensei?"
13070-245 = "[s] \"...Não, esqueça, está tudo bem.\""
13070-254 = "Bom dia~."
13070-255 = "Bom dia."
13070-256 = "Sim, sim☆ #nFico feliz em ver que a Ayane-chan e a Serika-chan estão bem."
13070-257 = "……Nonomi-senpai, você não conseguiu dormir?"
13070-258 = "Fufu... Desculpe, eu até dormi um pouco."
13070-263 = "Bom dia."
13070-264 = "Parece que a Shiroko-senpai está bem."
13070-265 = "Hm?"
13070-266 = "Só estou dizendo que fico feliz que esteja bem. #nE a Hoshino-senpai?"
13070-267 = "Ainda não recebi contato. #nMas ela disse que viria."
13070-268 = "Aliás, e o Sensei...?"
13070-269 = "Sendo o Sensei como é, #ntenho certeza de que ele está investigando algo."
13070-270 = "……Não me diga que você pretende aparecer por aqui do nada perto do anoitecer?"
13070-271 = "Amanhã é o dia da assembleia geral, se ficar muito tarde, os preparativos……"
13070-275 = "Munya…… hmm, fuhihi……"
13070-276 = "……Senpai, Arona-senpai."
13070-277 = "Fuah…… Plana-chan? #nO que houve……?"
13070-281 = "Noa, já é de manhã!? #nEu preciso acordar o Sensei……!"
13070-282 = "Não há problema. #nO Sensei ficou acordado a noite toda."
13070-283 = "Então está bem……"
13070-284 = "Não, quer dizer, virar a noite de novo não é algo bom, mas……"
13070-285 = "Isso é verdade…… Aliás, Arona-senpai. #nHavia alguma previsão de obra para hoje?"
13070-286 = "Obra? Não, não deveria ter nada……?"
13070-287 = "……Uma anomalia foi detectada no sistema de encanamento de gás."
13070-288 = "……Eh?"
13070-290 = "Confusão, é um fenômeno que vejo pela primeira vez…… #nO encanamento de gás está mudando."
13070-291 = "Como se alguém estivesse intervindo à força…… Está retorcido, distorcido, é desagradável……"
13070-292 = "……E-espere um pouco!"
13070-296 = "Sensei!!!"
13070-305 = "……Estratégia, número 2."
13070-306 = "Mesmo sendo um portador de milagres, o corpo físico tem limites."
13070-307 = "Esse é o seu ponto fraco, Sensei…… não é? #nHihi, hi……"
13070-308 = "Hihihi, hihihihihi!"
13070-310 = "Ihihihihihihihihihi!!"
13070-312 = "\nPróximo episódio: Grêmio de Abydos (1)"
