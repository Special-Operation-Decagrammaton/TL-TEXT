[translation]
1011006-1 = "夢見る雛鳥はいつかの巣立ちに歌を捧ぐ"
1011006-2 = "（議題の数が二桁を超える会議は長時間に及んだ）"
1011006-3 = "（会議が終わる頃には、外は真っ暗になっていた）"
1011006-8 = "[ns1] \"鳥の声……？\"\n[ns2] 声のする方に向かって歩く。"
1011006-14 = "[ns3] \"ここは……\"\n[ns4] \"公園……?\""
1011006-17 = "……先生？"
1011006-22 = "やはり先生か。"
1011006-23 = "ようやく解放されたのかい？随分と長丁場だったようだね。"
1011006-24 = "こんなことなら今回は顔を出しておけば良かっただろうか。"
1011006-25 = "いやなに。私の出席が意味を成す会議であれば、積極的に参加をしているのだが……"
1011006-26 = "事前に聞いていた話では、その限りでは無かったのだよ。"
1011006-27 = "……ん？何をしていたかって？"
1011006-28 = "ただの散歩だよ。#n銃声も手榴弾の音も、噂話の声さえもこの場所までは届かないからね。"
1011006-29 = "一人、静かに歩くには打ってつけという訳さ。"
1011006-33 = "……いや、白状しよう。"
1011006-34 = "実は、先生が通りかかるのを待っていた。"
1011006-35 = "[s5] \"鳥の声に誘われてここまで来たんだけど……\"\n[s6] \"セイアの手に乗ってる子の声だったの？\"  "
1011006-38 = "鳥の声……？"
1011006-43 = "……成程。"
1011006-44 = "少なくとも、私が意図した事では無かったよ。"
1011006-45 = "もしかしたら、先生が聞いたのは、この子の鳴き声だったかもしれないね。"
1011006-46 = "だが、確たることは私にも分からない。"
1011006-47 = "ここには、他にも多くの鳥たちが居る。"
1011006-48 = "この子だって、ずっと私の手の上に居る訳でも無いからね。"
1011006-49 = "[s7] \"なるほどね。\"\n[s8] \"なんだか不思議だね。\""
1011006-52 = "鳥たちはそこかしこに居るからね。"
1011006-53 = "先生の聞いた声がどの子のものだったのか。"
1011006-54 = "その答えはもはや誰にも分からない。#n謎解きとしては悪問もいいところだね。"
1011006-55 = "とはいえ、付いて行きたくなるような、可愛らしい声だったのだろう？"
1011006-56 = "何気ない日常にある微かな好奇心。"
1011006-57 = "その鳴き声に引き寄せられたならば、#nそれも悪くない経験と言えるのではないかな。"
1011006-58 = "[s9] \"確かに良い経験だった。\"\n[s10] \"楽しそうに歌ってるみたいだったよ。\""
1011006-61 = "それは良かった。私が褒められたわけではなくとも、嬉しく思う。#nあの子たちは歌うのが上手だからな。"
1011006-62 = "それと……"
1011006-63 = "実は、私も歌うことは嫌いじゃないんだ。"
1011006-64 = "……そうか。"
1011006-65 = "……へぇ。先生は、そんな驚き方もするのだね。"
1011006-66 = "この場で、先生のために歌って見せてあげたいところだが……"
1011006-67 = "今日はお預けかな。#n初めてを聴かせるなら、もっと望ましい時があるはずだからね。"
1011006-71 = "そんな目で見ないでくれ……"
1011006-72 = "歌は、私にとって重要な意味を持つものなんだ。"
1011006-73 = "少し、昔話をさせてもらうが……私も幼いころは本当に会話が下手でね。#n何を言っても、周りを不快にさせてばかりだった……"
1011006-74 = "長年の習慣を直すのは至難の技だったし、そもそも当時はそれを直そうなんて思いもしなかった。"
1011006-75 = "だが、誤解されることなく「本当の気持ち」を伝えたい。#nそう思うタイミングは、幾度と無く私にも訪れた。"
1011006-76 = "……その時、私に取れた唯一の手段が「歌」だったのだよ。"
1011006-77 = "ティーパーティーやシスターフッド、救護騎士団、トリニティの生徒たち。"
1011006-78 = "時には他校との交流でも、必要な時には歌で気持ちを伝えてきたものだ。"
1011006-79 = "常に偽善的で、自分の言葉すら正直に話せない私にとって。"
1011006-80 = "誰かに捧ぐ歌は「本当の気持ち」を表現できる唯一の手段であり……"
1011006-81 = "翻せば「本当の気持ち」を伝える時だけ、歌うことにしている。"
1011006-90 = "露骨にがっかりした様子を見せてくれるじゃないか。"
1011006-91 = "何も、意地悪をしたいわけでは無いのだよ。"
1011006-92 = "……先生はいつも私の「本当の気持ち」を理解してくれる。"
1011006-93 = "伝えるまでもなく理解してくれるから……私の歌声を披露する機会は来ないものと思っていたんだ。"
1011006-94 = "とはいえ、柄にもなく話し過ぎてしまったのも事実。#n不用意に先生の興味を引いてしまった私の落ち度だな……。"
1011006-95 = "勿体ぶらず……今が最良なのかもしれないね。"
1011006-96 = "先生……君という人は、いつの間にか相手をその気にさせる天才だ。"
1011006-97 = "致し方ない。「本当の気持ち」を歌に乗せて伝えてみようか。"
1011006-98 = "アカペラで済まないが……伴奏は鳥たちに委ねるとしよう。"
1011006-99 = "先生。"
1011006-106 = "今日のこの日と、先生のために歌う……"
1011006-107 = "私の「感謝の歌」だ。"
