[translation]
1011006-1 = "Um passarinho sonhador dedica uma canção para um dia deixar o ninho."

1011006-2 = "(As reuniões com mais de dois dígitos de itens na agenda duraram muito tempo)"

1011006-3 = "(Quando a reunião terminou, já estava escuro lá fora.)"

1011006-8 = "[ns1] \"Sons de pássaros...?\"\n[ns2] Caminhe na direção do som."

1011006-14 = "[ns3] \"Aqui é...\"\n[ns4] \"Estacionamento...?\""

1011006-17 = "……Sensei?"

1011006-22 = "Afinal, é um Sensei?"

1011006-23 = "ようやく解放されたのかい？随分と長丁場だったようだね。"
1011006-24 = "Se fosse esse o caso, me pergunto se deveria ter mostrado minha cara desta vez."

1011006-25 = "Não, o quê? Se for uma reunião que faça sentido para mim participar, eu participo ativamente..."

1011006-26 = "Pelo que ouvi anteriormente, não foi esse o caso."

1011006-27 = "……sim? O que você estava fazendo?"

1011006-28 = "É apenas uma caminhada. #nO som de tiros, granadas e até fofocas não chegam a este lugar."

1011006-29 = "É perfeito para caminhar sozinho e tranquilo."

1011006-33 = "...Bem, deixe-me confessar."

1011006-34 = "Na verdade, eu estava esperando a Senseia passar."

1011006-35 = "[s5] \"Fui atraído até aqui pela voz de um pássaro...\"\n[s6] \"Foi a voz da criança na mão de Seia?\""

1011006-38 = "Sons de pássaros...?"

1011006-43 = "...Eu vejo."

1011006-44 = "Pelo menos, não foi isso que eu pretendia."

1011006-45 = "Talvez o que a Senseia ouviu tenha sido o choro dessa criança."

1011006-46 = "Mas não tenho certeza."

1011006-47 = "Existem muitos outros pássaros aqui."

1011006-48 = "Esta criança não estará em minhas mãos para sempre."

1011006-49 = "[s7] \"Entendo.\"\n[s8] \"É meio estranho.\""

1011006-52 = "Os pássaros estão por toda parte."

1011006-53 = "Qual voz de criança a Senseia ouviu?"

1011006-54 = "Ninguém sabe mais a resposta. #n Perguntas ruins também são boas para resolver enigmas."

1011006-55 = "Porém, ela tinha uma voz fofa que dava vontade de segui-la, certo?"

1011006-56 = "Uma curiosidade sutil na vida cotidiana."

1011006-57 = "Se você se sente atraído pelo choro, acho que não é uma experiência ruim."

1011006-58 = "[s9] \"Foi definitivamente uma boa experiência.\"\n[s10] \"Eles pareciam estar se divertindo cantando.\""

1011006-61 = "Isso foi bom. Mesmo não tendo sido elogiado, estou feliz. #nEssas crianças cantam bem."

1011006-62 = "E..."

1011006-63 = "Na verdade, eu também não odeio cantar."

1011006-64 = "...Eu vejo."

1011006-65 = "...Ei. Os Senseies surpreendem coisas assim."

1011006-66 = "Eu gostaria de cantar para o Sensei aqui, mas..."

1011006-67 = "Acho que vou deixar isso para você hoje. #nDeve haver um momento mais desejável para ouvi-lo pela primeira vez."

1011006-71 = "Por favor, não me olhe assim..."

1011006-72 = "As músicas têm um significado importante para mim."

1011006-73 = "Deixe-me contar um pouco sobre o passado... Quando eu era jovem, eu era muito ruim em conversar. #nNão importa o que eu disse, apenas deixei todos ao meu redor desconfortáveis..."

1011006-74 = "Foi extremamente difícil quebrar hábitos antigos e, na época, nunca pensei em mudá-los."

1011006-75 = "Contudo, quero transmitir meus “verdadeiros sentimentos” sem ser mal interpretado. #nO momento de pensar dessa forma já me ocorreu muitas vezes."

1011006-76 = "...Naquela época o único método que eu tinha era cantar."

1011006-77 = "O Tea Party, a Irmandade, a Ordem de Socorro e os estudantes da Trinity."

1011006-78 = "Às vezes, mesmo interagindo com outras escolas, eu expressava meus sentimentos por meio de músicas quando necessário."

1011006-79 = "Para alguém como eu, que é sempre hipócrita e nem consegue falar honestamente minhas próprias palavras."

1011006-80 = "Uma música dedicada a alguém é a única maneira de expressar seus verdadeiros sentimentos..."

1011006-81 = "Em outras palavras, só canto quando quero transmitir meus verdadeiros sentimentos."

1011006-90 = "Ele claramente parece desapontado."

1011006-91 = "Não quero ser mau."

1011006-92 = "...Meu Sensei sempre entende meus “verdadeiros sentimentos”."

1011006-93 = "Achei que nunca teria a chance de mostrar minha voz para cantar, porque eles entenderiam sem que eu tivesse que contar."

1011006-94 = "Porém, também é verdade que acabei falando demais sem motivo. #nA culpa foi minha por atrair inadvertidamente o interesse do Sensei..."

1011006-95 = "Não espere...Talvez agora seja o melhor momento."

1011006-96 = "Sensei... você é um gênio que pode fazer os outros se sentirem como você antes que percebam."

1011006-97 = "Eu não posso evitar. Vamos expressar nossos “verdadeiros sentimentos” através da música."

1011006-98 = "Não posso fazer a cappella, mas deixo o acompanhamento para os pássaros."

1011006-99 = "Sensei."

1011006-106 = "Eu canto para este dia e minha Senseia..."

1011006-107 = "Esta é a minha \"música de agradecimento\"."

