[translation]
1011006-1 = "Os bebês pássaros sonhadores dedicam uma canção para um dia deixar o ninho."

1011006-2 = "(A reunião, com uma agenda com mais de dois dígitos, durou muito tempo)."

1011006-3 = "(No final da reunião, já estava escuro lá fora)."

1011006-8 = "[ns1] \"Birdsong......? \"\n[ns2] Caminhe em direção à voz."

1011006-14 = "[ns3] \"This is ......\"\n[ns4] \"Park ......? \""

1011006-17 = "...... professor?"

1011006-22 = "Afinal, você é um professor."

1011006-23 = "Eles finalmente deixaram você ir? Parece que foi uma jornada muito longa."

1011006-24 = "Se for esse o caso, eu deveria ter aparecido dessa vez?"

1011006-25 = "Não, o quê. Se for uma reunião em que minha presença faz sentido, estou participando ativamente. ......"

1011006-26 = "Isso não era tudo o que tínhamos ouvido antes."

1011006-27 = "...... Hmm? O que eu estava fazendo?"

1011006-28 = "É apenas uma caminhada. #nPorque o som de tiros, granadas e até mesmo o som de fofocas não chega a este lugar."

1011006-29 = "É um ótimo lugar para caminhar sozinho e em paz."

1011006-33 = "...... Não, vamos falar a verdade."

1011006-34 = "Na verdade, eu estava esperando que o médico passasse."

1011006-35 = "[s5]\"Fui atraído para cá pelo som dos pássaros. ......\"\n[s6]\"Essa era a voz da garota na mão de Seia? \""

1011006-38 = "Birdsong. ......?"

1011006-43 = "...... 成程."

1011006-44 = "Pelo menos, essa não era minha intenção, você sabe."

1011006-45 = "Talvez tenha sido o grito dela que o médico ouviu."

1011006-46 = "Mas também não tenho certeza."

1011006-47 = "Há muitos outros pássaros aqui."

1011006-48 = "Ela também não estará em minhas mãos o tempo todo."

1011006-49 = "[s7] \"Estou vendo. \"\n[s8] \"É um pouco estranho. \"\"\n[s8] \"Estou vendo."

1011006-52 = "Os pássaros estão por toda parte."

1011006-53 = "Qual foi a voz da criança que o professor ouviu?"

1011006-54 = "A resposta não é mais conhecida por ninguém. Como um enigma #n, é uma pergunta ruim."

1011006-55 = "No entanto, era uma voz adorável que fazia com que você quisesse acompanhar, não era?"

1011006-56 = "Ligeira curiosidade na vida cotidiana casual."

1011006-57 = "Se você se sentir atraído pelo som desse grito, #nNão é uma experiência ruim."

1011006-58 = "[s9] \"Foi definitivamente uma boa experiência. \"\n[s10] \"Foi como cantar por diversão. \"\n[s10]""

1011006-61 = "É bom ouvir isso. Fico feliz, mesmo que isso não seja um elogio para mim. #nElas são boas cantoras, essas garotas."

1011006-62 = "E ......"

1011006-63 = "Na verdade, também não me importo de cantar."

1011006-64 = "...... Entendo."

1011006-65 = "...... Heh. Os professores têm uma maneira de surpreender você, não é?"

1011006-66 = "Eu adoraria estar aqui para cantar para os professores e mostrar a eles como se faz. ......"

1011006-67 = "Acho que vou deixar isso para hoje. Se vou permitir que você ouça o #n pela primeira vez, deve haver um momento mais desejável."

1011006-71 = "Não olhe para mim dessa maneira. ......"

1011006-72 = "Cantar é algo que significa muito para mim."

1011006-73 = "Deixe-me contar um pouco sobre os velhos tempos. ...... Eu era uma péssima conversadora quando era menina. Não importava o que eu dissesse, eu sempre deixava as pessoas desconfortáveis. ......"

1011006-74 = "Foi extremamente difícil quebrar um hábito antigo e, na época, nunca me ocorreu consertá-lo."

1011006-75 = "Mas quero transmitir meus "verdadeiros sentimentos" sem ser mal interpretado. #Já tive muitas ocasiões em que me senti assim."

1011006-76 = "...... O único recurso que eu podia usar naquele momento era cantar."

1011006-77 = "Tea Party, Sisterhood, Rescue Knights e alunos da Trinity."

1011006-78 = "Algumas vezes foi uma forma de comunicação com outras escolas e outras vezes foi uma forma de expressar sentimentos por meio da música, quando necessário."

1011006-79 = "Sempre hipócrita para mim, e nem mesmo honesto em minhas próprias palavras."

1011006-80 = "Uma música dedicada a alguém é a única maneira de expressar "sentimentos verdadeiros" e ......"

1011006-81 = "Eu só canto quando me viro e digo a eles como "realmente me sinto"."

1011006-90 = "Você está me mostrando o quanto está decepcionado."

1011006-91 = "Não quero ser maldoso com nada, você sabe."

1011006-92 = "Os professores do ...... sempre entendem meus "verdadeiros sentimentos"."

1011006-93 = "Não precisei dizer a eles, pois eles entendem. ...... Pensei que a oportunidade de mostrar minha voz cantada nunca chegaria."

1011006-94 = "No entanto, também é verdade que falei demais fora do personagem. #A culpa é minha por ter atraído inadvertidamente o interesse do professor. ......"

1011006-95 = "Não é uma perda de tempo. ...... Talvez agora seja o melhor momento."

1011006-96 = "Professor ......, você é um gênio em fazer com que eles se envolvam antes que você perceba."

1011006-97 = "Não há escolha. Posso lhe dizer como realmente me sinto em uma música?"

1011006-98 = "Desculpe-me por ser a cappella, mas deixarei o acompanhamento do ...... para os pássaros."

1011006-99 = "Professor."

1011006-106 = "Cante para esse dia e para seu professor: ......"

1011006-107 = "É minha "música de agradecimento"."

