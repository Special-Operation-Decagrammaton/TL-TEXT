[translation]
1003205-1 = "激しい戦い"
1003205-3 = "（ムツキに呼ばれ、約束の場所へと向かった）"
1003205-4 = "くふふっ。先生、逃げずによく来たね？"
1003205-5 = "それぐらい勝負に自信があるってことかな～？"
1003205-6 = "[s] \"自信っていうか、ムツキにせっかく呼ばれたからっていうか……？\""
1003205-7 = "……私が、呼んだから？"
1003205-8 = "ふーん……でも先生？ここまで来たからには、ただじゃ帰さないよ？"
1003205-9 = "こう見えても私、羽根つきには自信があるんだから！"
1003205-10 = "今回お正月の福袋で手に入れた、この「最強の羽子板」で！"
1003205-11 = "先生をコテンパンにしちゃうよっ！くふふっ！"
1003205-12 = "[s1] \"「最強の羽子板」……？\"\n[s2] \"何か特殊な機能とかが……？\""
1003205-13 = "あはっ、それより聞いて驚かないでよ～？"
1003205-14 = "あはっ、それより聞いて驚かないでよ～？"
1003205-15 = "この羽根つきには特別なルールがあるの、それは……"
1003205-16 = "負けた方は、勝った方の言うことを何でもひとつ聞く！"
1003205-17 = "[s] \"ムツキのいつもの独自ルール……！\""
1003205-18 = "あははっ！先生がそんなに余裕でいられるのも、今だけだよ！"
1003205-19 = "さあ先生、いざ尋常に勝負！"
1003205-20 = "[s] \"余裕ではないけど……よし、やろう！\""
1003205-23 = "（そうして、ムツキとの熱い戦いが始まった）"
1003205-24 = "じゃあ、私からね。"
1003205-28 = "やっ！"
1003205-32 = "（ムツキの羽子板は、綺麗に空を切った）"
1003205-36 = "[ns] \"……？\""
1003205-37 = "……うん、今のは練習。じゃあ本番ね！"
1003205-38 = "本気で行くよ、先生！"
1003205-39 = "やぁっ！"
1003205-43 = "（またもやムツキの羽子板は、いっそ美しく空を切った）"
1003205-47 = "[ns] \"ムツキ……？\""
1003205-48 = "……ち、違う違う！待って、今のは無し！もう一回！"
1003205-49 = "やあっ！！"
1003205-53 = "（ムツキの羽子板は以下略）"
1003205-57 = "…………。"
1003205-58 = "……あはっ！やるじゃん先生！"
1003205-59 = "まさかこーんな切り札を隠してたなんて。それはまあ、あそこまで余裕でいられるわけだね～？"
1003205-60 = "これじゃあ流石のムツキちゃんでも、一筋縄ではいかなそう！"
1003205-61 = "[s] \"まだ何もしてないけどね……。\""
1003205-62 = "むー、おもちゃ屋さんで「最強の羽子板」っていうから買ってきたのに……不良品？"
1003205-63 = "あはっ。なら仕方ないなー、今日の勝負は無かったことに……"
1003205-67 = "[ns3] \"……それで良いの？\"\n[ns4] \"じゃあムツキが言った通り、敗者は勝者の……\""
1003205-68 = "えっ、待って待って！？"
1003205-69 = "えっ、待って待って！？"
1003205-70 = "違うよ、勝負はまだ終わってないから！"
1003205-71 = "これは、そう！一瞬で勝負が終わっても面白くないから！"
1003205-72 = "せっかくお正月の遊びなんだから、じっくり味わいたいでしょ？"
1003205-73 = "ね、つまりこれは先生のため！"
1003205-74 = "[s] \"ムツキ理論……。\""
1003205-75 = "とにかく仕切り直し！もう一回！勝負はまだ、始まったばっかり！"
1003205-76 = "もう容赦しないよ、先生？今度こそ本当に……！"
1003205-77 = "[s] \"……うん、良し！\""
1003205-79 = "（その後も、何度もトライしたものの……）"
1003205-80 = "ああっ！何でっ！？"
1003205-82 = "わっ！？い、今のは風のせいで……！"
1003205-84 = "何で先生が打つと変な軌道になるの！？何その必殺技～！？"
1003205-87 = "（ビギナーズラックなのか、それとも単純に運が良かったのか……）"
1003205-88 = "（正確にカウントし始めてから、12回中12回の完全勝利を収めた）"
1003205-91 = "あり得なーい！どうして先生そんなに強いの！？"
1003205-92 = "何かズルい羽子板とか使ってる？秘密兵器とか？何したの先生、教えてっ！"
1003205-93 = "[s] \"いや、特に何も……。\""
1003205-94 = "ああも～、せっかく先生の顔を黒く塗ってあげようと思ったのにぃー！"
1003205-95 = "うーっ……！"
1003205-96 = "……。"
1003205-100 = "……良いこと思いついた。"
1003205-101 = "[s] （なんだか凄まじく悪い予感が……）"
1003205-102 = "よし、先生もう一回！もう一回だよ！次こそは、ぜーったいに私が勝つから！それで先生を泣かしてあげるから！"
1003205-103 = "あ、先生が先攻で良いよ？"
1003205-104 = "私が本気出したら怖いってところ、見せてあげるんだから！"
1003205-105 = "[s] \"えっと、じゃあ……。\""
1003205-109 = "打つ前にー……あはっ、隙あり～！"
1003205-110 = "[s] \"ムツキ！？\""
1003205-111 = "先生の、"
1003205-112 = "首元に～…"
1003205-113 = "かぷっ♪"
1003205-119 = "あーっ！先生、羽根を落としちゃったね？"
1003205-120 = "ふふっ、先生そこが敏感なんだ？顔真っ赤だよ～？"
1003205-121 = "何はともあれ残念だけど、羽根を落としたんだから先生の負けだよね？"
1003205-122 = "[s] \"い、今のは色々とルール違反じゃ……！？\""
1003205-123 = "くふふっ、先生～？それは「負け惜しみ」って言うんだよ？"
1003205-124 = "というわけで～……"
1003205-127 = "[wa:150]― あはっ、[wa:700]ざ～んねん！[wa:1150]私の勝ちだよ、[wa:1150]先生！"
1003205-130 = "[wa:100]― くふふっ、"
1003205-132 = "― ここまでの[wa:500]健闘は[wa:500]認めてあげるけど～……"
1003205-135 = "― 勝負の世界は[wa:800]厳しいものだから、"
1003205-137 = "― 仕方ないよね？[wa:1300]くふっ♪"
1003205-140 = "[wa:200]― さーて、[wa:1100]何を描いちゃおっかなぁ？"
1003205-142 = "― マル？[wa:650]バツ？[wa:850]それとも他のが良い？"
1003205-145 = "― 今なら[wa:350]先生の言うこと、"
1003205-147 = "[wa:50]― 何でも[wa:300]聞いてあげるよ？"
1003205-150 = "[wa:100]― あっ、[wa:850]でも気が変わっちゃった。"
1003205-152 = "― 普通の記号だと[wa:800]ちょっと寂しいし……"
1003205-155 = "[wa:150]― お顔全体に、[wa:1650]くまなく[wa:350]塗ってあげるねっ！"
1003205-158 = "うん、落書き完了！"
1003205-164 = "……くふっ、あはははっ！先生すごい顔になってる！くくっ、良い感じ～！"
1003205-165 = "[s] \"もう一回！今度こそ勝って……！\""
1003205-166 = "先生、何言ってるの？私が勝ったんだから、今日はもうこれでおしまい！"
1003205-167 = "[s] \"勝ち逃げとかずるい！？\""
1003205-168 = "えー、そんなこと無いよ？"
1003205-169 = "それとも先生、さっきのをまたやってほしいってこと？"
1003205-170 = "なになに、そういうこと？はまっちゃった？"
1003205-171 = "[s] \"いや、そういう意味じゃなくて……！\""
1003205-172 = "あはははっ！冗談だよ～、照れてる先生も可愛いっ！くふふっ♪"
1003205-173 = "じゃあ今日はこんなところかな、面白かったし大満足！"
1003205-174 = "じゃあ私が勝ったんだし、まだまだ言うこと聞いてくれるよね？もちろん拒否権とか無いけど！"
1003205-175 = "[s] \"いったい何を……。\""
1003205-176 = "今から私と、"
1003205-182 = "お散歩行こっ！"
1003205-186 = "あ、顔は洗っちゃダメだよ、そのまま！ほらほら先生、早く！"
1003205-188 = "（そうして無邪気に笑うムツキに手を引かれて、そのまま周りを散歩した）"
1003205-189 = "（どんな派手な模様が描かれていたのかは分からないままだったものの、周囲の注目は凄まじく、ムツキは終始楽しそうにしていた……）"
