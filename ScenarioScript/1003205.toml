[translation]
1003205-1 = "Uma batalha intensa"
1003205-3 = "（Chamado por Mutsuki, você se dirige ao local combinado）"
1003205-4 = "Kufufu. Sensei, você veio mesmo sem fugir, hein?"
1003205-5 = "Isso significa que você está confiante na vitória, né~?"
1003205-6 = "[s] \"Mais do que confiança, é porque você me chamou, Mutsuki...?\""
1003205-7 = "……Porque eu chamei?"
1003205-8 = "Hmm... Mas Sensei? Já que chegou até aqui, não vou deixar você sair ileso, viu?"
1003205-9 = "Pode não parecer, mas eu sou muito boa no Hagoita!"
1003205-10 = "Com esta \"Raquete Suprema\" que consegui no pacote de Ano Novo!"
1003205-11 = "Vou te dar uma surra, Sensei! Kufufu!"
1003205-12 = "[s1] \"\"Raquete Suprema\"...?\"\n[s2] \"Ela tem alguma função especial...?\""
1003205-13 = "Ahaha, mas não se surpreenda com o que vou dizer agora, tá?"
1003205-14 = "Ahaha, mas não se surpreenda com o que vou dizer agora, tá?"
1003205-15 = "Este jogo de Hagoita tem uma regra especial, e ela é..."
1003205-16 = "Quem perder, terá que fazer qualquer coisa que o vencedor pedir!"
1003205-17 = "[s] \"A regra única de sempre da Mutsuki...!\""
1003205-18 = "Ahaha! Sensei, aproveite essa sua calma enquanto pode!"
1003205-19 = "Vamos lá, Sensei, que comece o desafio!"
1003205-20 = "[s] \"Não estou calmo, mas... tudo bem, vamos nessa!\""
1003205-23 = "（E assim, a batalha acalorada contra Mutsuki começou）"
1003205-24 = "Então, eu começo."
1003205-28 = "Ya!"
1003205-32 = "（A raquete de Mutsuki cortou o ar graciosamente）"
1003205-36 = "[ns] \"...?\""
1003205-37 = "……Hum, aquilo foi só um treino. Agora é pra valer!"
1003205-38 = "Vou com tudo, Sensei!"
1003205-39 = "Yaa!"
1003205-43 = "（Mais uma vez, a raquete de Mutsuki cortou o ar de forma até bela）"
1003205-47 = "[ns] \"Mutsuki...?\""
1003205-48 = "……N-não, não é isso! Espera, esquece essa! Mais uma vez!"
1003205-49 = "Yaa!!"
1003205-53 = "（A raquete de Mutsuki, etc.）"
1003205-57 = "…………."
1003205-58 = "……Ahaha! Você é bom, Sensei!"
1003205-59 = "Quem diria que você estava escondendo um trunfo desses. Com isso, faz sentido você estar tão tranquilo, né~?"
1003205-60 = "Desse jeito, nem a Mutsuki aqui vai conseguir vencer tão fácil!"
1003205-61 = "[s] \"Eu ainda nem fiz nada, na verdade...\""
1003205-62 = "Hum, comprei na loja de brinquedos porque dizia \"Raquete Suprema\", será que é um produto com defeito...?"
1003205-63 = "Ahaha. Então não tem jeito, vamos fingir que a partida de hoje nunca aconteceu..."
1003205-67 = "[ns3] \"...Tudo bem pra você?\"\n[ns4] \"Então, como você disse, Mutsuki, o perdedor deve...\""
1003205-68 = "Ei, espera, espera!?"
1003205-69 = "Ei, espera, espera!?"
1003205-70 = "Não, a partida ainda não acabou!"
1003205-71 = "É que, sabe! Não teria graça se acabasse num instante!"
1003205-72 = "Já que é uma brincadeira de Ano Novo, temos que aproveitar com calma, né?"
1003205-73 = "Viu, isso é pelo seu bem, Sensei!"
1003205-74 = "[s] \"A lógica da Mutsuki...\""
1003205-75 = "De qualquer forma, vamos recomeçar! Mais uma vez! A partida só está começando!"
1003205-76 = "Não vou mais pegar leve, Sensei! Desta vez, de verdade...!"
1003205-77 = "[s] \"...Certo, combinado!\""
1003205-79 = "（Depois disso, tentei várias vezes, mas...）"
1003205-80 = "Ah! Por que isso!?"
1003205-82 = "Ué!? I-isso foi por causa do vento...!"
1003205-84 = "Por que a trajetória fica estranha quando o Sensei rebate!? Que golpe especial é esse!?"
1003205-87 = "（Será sorte de principiante, ou apenas pura sorte mesmo...）"
1003205-88 = "（Desde que comecei a contar com precisão, obtive 12 vitórias perfeitas em 12 tentativas）"
1003205-91 = "Não acredito! Por que o Sensei é tão forte!?"
1003205-92 = "Você está usando uma raquete trapaceira? Ou alguma arma secreta? O que você fez, Sensei, me conta!"
1003205-93 = "[s] \"Não, não fiz nada em especial...\""
1003205-94 = "Ah, poxa... eu queria tanto pintar o rosto do Sensei de preto!"
1003205-95 = "Ugh...!"
1003205-96 = "..."
1003205-100 = "...Tive uma ideia melhor."
1003205-101 = "[s] （Sinto um pressentimento terrivelmente ruim...）"
1003205-102 = "Beleza, Sensei, mais uma vez! Só mais uma! Na próxima, eu vou ganhar com certeza! E aí eu vou fazer o Sensei chorar!"
1003205-103 = "Ah, pode começar servindo, Sensei!"
1003205-104 = "Vou te mostrar o que acontece quando eu levo isso a sério!"
1003205-105 = "[s] \"Bem, então...\""
1003205-109 = "Antes de rebater... ah, brecha!"
1003205-110 = "[s] \"Mutsuki!?\""
1003205-111 = "No pescoço do"
1003205-112 = "Sensei..."
1003205-113 = "Mordidinha♪"
1003205-119 = "Ah! Sensei, você deixou a peteca cair, né?"
1003205-120 = "Fufu, então o Sensei é sensível ali? Seu rosto está todo vermelho~!"
1003205-121 = "De qualquer forma, é uma pena, mas como você deixou a peteca cair, o Sensei perdeu, né?"
1003205-122 = "[s] \"I-isso não foi uma violação das regras...?\""
1003205-123 = "Kufufu, Sensei? Isso se chama \"chorar pelo leite derramado\", sabia?"
1003205-124 = "Sendo assim..."
1003205-127 = "[wa:150]— Ah, [wa:700]que pena! [wa:1150]Eu ganhei, [wa:1150]Sensei!"
1003205-130 = "[wa:100]— Kufufu,"
1003205-132 = "— Eu até reconheço o seu [wa:500]esforço [wa:500]até aqui, mas..."
1003205-135 = "— O mundo das competições é [wa:800]cruel,"
1003205-137 = "— Então não tem jeito, né? [wa:1300]Kufu♪"
1003205-140 = "[wa:200]— Bom, [wa:1100]o que será que eu vou desenhar?"
1003205-142 = "— Um círculo? [wa:650]Um X? [wa:850]Ou prefere outra coisa?"
1003205-145 = "— Se for agora, [wa:350]eu faço"
1003205-147 = "[wa:50]— qualquer coisa [wa:300]que o Sensei pedir!"
1003205-150 = "[wa:100]— Ah, [wa:850]mudei de ideia."
1003205-152 = "— Símbolos comuns são [wa:800]meio sem graça..."
1003205-155 = "[wa:150]— Vou pintar [wa:1650]o seu rosto inteiro, [wa:350]sem deixar nenhum espaço!"
1003205-158 = "Pronto, rabisco concluído!"
1003205-164 = "...Kufu, ahahahaha! Sensei, seu rosto está incrível! Kuku, ficou ótimo!"
1003205-165 = "[s] \"Mais uma vez! Dessa vez eu vou ganhar...!\""
1003205-166 = "Sensei, do que você está falando? Eu ganhei, então por hoje é só!"
1003205-167 = "[s] \"Sair ganhando assim é trapaça!?\""
1003205-168 = "Ah, que nada!"
1003205-169 = "Ou será que o Sensei quer que eu faça aquilo de novo?"
1003205-170 = "O que foi, o que foi? Ficou viciado?"
1003205-171 = "[s] \"Não, não é nesse sentido...!\""
1003205-172 = "Ahahaha! É brincadeira, viu? O Sensei ficando sem graça também é uma gracinha! Kufufu♪"
1003205-173 = "Bom, acho que por hoje é só. Foi divertido e estou super satisfeita!"
1003205-174 = "Já que eu ganhei, você ainda vai continuar me obedecendo, né? E claro, sem direito a recusa!"
1003205-175 = "[s] \"O que exatamente você...\""
1003205-176 = "Agora, comigo,"
1003205-182 = "vamos dar um passeio!"
1003205-186 = "Ah, não pode lavar o rosto, deixa como está! Vamos, vamos, Sensei, rápido!"
1003205-188 = "(Assim, sendo puxado pela mão por Mutsuki, que ria inocentemente, fomos dar uma volta pelo local)"
1003205-189 = "(Embora eu não tenha descoberto que tipo de desenho chamativo ela tinha feito, a atenção que atraímos foi enorme, e Mutsuki pareceu se divertir do início ao fim...)"
