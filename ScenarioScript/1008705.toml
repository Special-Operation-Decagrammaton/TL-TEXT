[translation]
1008705-1 = "とにかく忙しかったんです！"
1008705-3 = "（アコに呼び出され、パーティー会場にやって来た）"
1008705-7 = "お待ちしていました、先生。"
1008705-8 = "[s] \"これは何の集まりなの？\""
1008705-9 = "ゲヘナと交流がある企業の親睦会です。"
1008705-10 = "何かと面倒ではありますが、これも行政官の仕事ですので。"
1008705-11 = "いつも通り制服で出席しようかとも思いました。"
1008705-15 = "ですが、自宅でドレスを試着したところ少し動きづらく……"
1008705-16 = "せっかくですし、この場を有効に使って慣れておこうかと。"
1008705-17 = "[s] \"それで予行演習って言ってたんだね。\""
1008705-18 = "はい、その通りです。"
1008705-19 = "当日は、先生と一緒に過ごす時間も無いでしょうし…………"
1008705-20 = "先生と一緒に選んだドレスですから……初めては……"
1008705-25 = "そ、そういうことですから、今日は付き合っていただきます！！"
1008705-26 = "[s] \"私でよければ、喜んで。\""
1008705-27 = "……はい。"
1008705-33 = "[ns] アコの手を取る。"
1008705-40 = "うーん……"
1008705-41 = "[s] \"大丈夫？歩きづらそうだけど……\""
1008705-45 = "はい……"
1008705-46 = "このドレス、思ったより裾が長くて……"
1008705-51 = "あっ……！"
1008705-56 = "きゃっ！？"
1008705-57 = "[ns] \"アコ、大丈夫！？\""
1008705-61 = "こ、転んでしまうところでした。裾がヒールに引っかかって……"
1008705-62 = "でも先生が支えてくださったおかげで……"
1008705-66 = "……あれ？"
1008705-67 = "もしかして……背中、破れてませんか……？"
1008705-71 = "たぶん、腰の辺りから……"
1008705-72 = "[s] \"ちょっと見てみるね？\""
1008705-74 = "あ、はい……お願いします。"
1008705-79 = "き、きゃああ！？や、やっぱり破れてますよね……！"
1008705-80 = "[s1] \"大丈夫だよ、落ち着いて。\"\n[s2] \"とりあえず、隅のほうに移動しようか。\""
1008705-88 = "[wa:100]― [log=아코 드레스]こ、[wa:750]このままでは困ります！[/log]"
1008705-90 = "― [log=아코 드레스]もしも他の人が[wa:850]気づいてしまったら……[/log]"
1008705-93 = "― [log=아코 드레스]大変なことに[wa:850]なってしまいます……！[/log]"
1008705-96 = "[ns] \"じっとしてて、ひとまず安全ピンで応急処置を……\""
1008705-97 = "[wa:150]― [log=아코 드레스]よ、[wa:700]よりによって[wa:650]こんなタイミングで……！[/log]"
1008705-100 = "― [log=아코 드레스]やっぱり、[wa:1100]これは先生と一緒に[wa:1000]来たから……？[/log]"
1008705-103 = "[ns] \"……えっ！？\""
1008705-104 = "[wa:150]― [log=아코 드레스]先生！[wa:900]なんとかしてください！[/log]"
1008705-107 = "― [log=아코 드레스]私が大変なことになる前に、[wa:1900]早く！[/log]"
1008705-110 = "[ns3] ドレスを直していると、見覚えのある紐が目に入った。\n[ns4] \"これは……\""
1008705-111 = "[wa:200]― [log=아코 드레스]え？[wa:950]な、[wa:650]何ですか？[wa:750]その顔は……[/log]"
1008705-112 = "[wa:200]― [log=아코 드레스]え？[wa:950]な、[wa:650]何ですか？[wa:750]その顔は……[/log]"
1008705-115 = "― [log=아코 드레스]……んん？[/log]"
1008705-118 = "― [log=아코 드레스]な、[wa:600]何ですか？[/log]"
1008705-120 = "― [log=아코 드레스]一体何を見つけたんですか……？[/log]"
1008705-123 = "[ns] \"……返品するんじゃなかったっけ？\""
1008705-124 = "[wa:250]― [log=아코 드레스]そ、[wa:700]それは、[wa:650]その……[/log]"
1008705-126 = "― [log=아코 드레스]返品には、[wa:950]色々と[wa:550]手間がかかるものですから……。[/log]"
1008705-129 = "― [log=아코 드레스]その……[wa:1900]風紀委員会の仕事が忙しくて、[/log]"
1008705-131 = "― [log=아코 드레스]時間が[wa:400]なかったというか……。[/log]"
1008705-134 = "[wa:100]― [log=아코 드레스]とにかくそういうことですから！[/log]"
1008705-136 = "― [log=아코 드레스]そういうことにしておいてください！[/log]"
1008705-139 = "（どうにかドレスを直し、パーティーは事なきを得た）"
1008705-140 = "（落ち込んでいたアコをゲヘナまで送ってから、シャーレに戻った）"
