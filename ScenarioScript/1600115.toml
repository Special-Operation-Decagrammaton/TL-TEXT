[translation]
1600115-1 = "幸運のお守り"
1600115-2 = "（アスナに言われて向かった先では激しい戦闘が繰り広げられていた）"
1600115-8 = "これ！潜入任務なんだけどなぁ？#n全然見つかっちゃってる！"
1600115-9 = "あんな目立つ格好で潜入ってマジで言ってんのか？"
1600115-10 = "普通バレるだろ！舐めやがって！"
1600115-11 = "そんなこと言われても……これ、ユニフォームだし――"
1600115-15 = "そっか！脱げば良かったんだね！"
1600115-19 = "[ns1] \"す、ストーップ！\"\n[ns2] \"アスナ、来たよ！\""
1600115-23 = "あっ！ご主人様！やっほー！"
1600115-24 = "それじゃあプランB！正面突破、スタート♪"
1600115-28 = "誰かあいつを止めろ！"
1600115-29 = "先へ行かせるな！"
1600115-37 = "（その後、激しい戦闘へと突入し――）"
1600115-39 = "くそっ……ちょっとぐらい足止めできると思ったのに……。"
1600115-40 = "これが……C&C……。"
1600115-46 = "[ns] \"アスナ、大丈夫？\""
1600115-47 = "全然！元気だよ！"
1600115-48 = "あ、でもリボン落としちゃったみたい。#nちょっと探してくるね！"
1600115-50 = "この辺かな？"
1600115-54 = "うーん、見つからないなぁ……。"
1600115-58 = "ちょっと！踏まないで！"
1600115-59 = "わっ！ごめんごめん！"
1600115-60 = "ねね、青いリボン見なかった？"
1600115-61 = "は？知らないけど……#nってか、あんたに撃たれたとこ痛いんだけど……。"
1600115-62 = "ごめんごめん！ゆっくり休んでて！"
1600115-66 = "あ！#nあったー！"
1600115-68 = "ご主人様、お待たせ♪"
1600115-69 = "[s] \"リボン、見つかったの？\""
1600115-70 = "うん！ちゃんとあったよ！"
1600115-71 = "すぐ見つかってよかった～！#nそれじゃ、任務完了の報告にいこっか！"
1600115-76 = "[ns] \"そういえばそのリボン、ずっとつけてるよね。\""
1600115-77 = "さすがご主人様、気づいてたんだ！#nそうなの！ずっとつけてるんだ～"
1600115-82 = "これ、アスナのラッキーアイテムなの！#nつけてると色んなことがうまくいくんだよ！"
1600115-83 = "例えば……？"
1600115-84 = "そうだなぁ……色々あるんだけど……。"
1600115-85 = "あ、これとかかな！"
1600115-86 = "テスト勉強したくなくて、ぜーんぜんしてなかったんだけど……。"
1600115-87 = "ヤマカンが全部正解だったの！！"
1600115-88 = "[s] \"全部！？\""
1600115-89 = "そう！全部！すごいでしょ？"
1600115-90 = "他にもいきつけのカフェとかで～"
1600115-91 = "1日限定20食のデザートがね――"
1600115-92 = "もうなくなっちゃってるかもな～って時でも食べられるんだ♪#nアスナがラスイチの日もあったり！"
1600115-93 = "[s] \"すごいね！\""
1600115-94 = "後は戦闘中に～"
1600115-95 = "弾も弾倉も全部なくなっちゃってピーンチ！みたいな時にも――"
1600115-96 = "リボンを投石紐代わりに使ったら全員倒せちゃったり！"
1600115-97 = "[s] \"そ、それはラッキー……なのかな？\""
1600115-98 = "ラッキーだよ！アスナを守ってくれる幸運のリボンだって思ってるんだ！"
1600115-99 = "全然ほつれたりしてないでしょ？#n頑張って手入れしてるんだ。"
1600115-100 = "[s5] \"でも今日みたいに、解けちゃったり……。\"\n[s6] \"本当に失くしてしまったら、どうするの？\""
1600115-103 = "本当に失くしちゃったら……？"
1600115-104 = "そうだなぁ……。"
1600115-105 = "うーん……。"
1600115-106 = "う～～～～ん……。"
1600115-107 = "[s] \"変なこと言ってごめん……！\""
1600115-108 = "失くしちゃっても大丈夫かも！"
1600115-109 = "[s] \"えっ？\""
1600115-110 = "すっごく悲しいとは思うよ？"
1600115-111 = "でも、アスナの目の前には――"
1600115-112 = "最高の幸運のめぐり合わせがもういるから大丈夫！"
1600115-113 = "ご主人様のことだよ！"
1600115-114 = "だから、もしリボンを失くしちゃっても大丈夫！"
1600115-115 = "[s7] \"アスナ……！なんだか照れるね。\"\n[s8] \"でも、失くさないように気をつけようね！\""
1600115-118 = "へへっ、うん！"
1600115-119 = "ご主人様もリボンも、今まで以上に大切にするね！"
1600115-121 = "（その後、お互いのささやかな幸運の話をしながらアスナと一緒に帰った）"
