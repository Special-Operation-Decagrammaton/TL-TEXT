[translation]
1600115-1 = "Amuleto da Sorte"
1600115-2 = "（Seguindo as instruções de Asuna, o local para onde se dirigiram estava em meio a um combate intenso）"
1600115-8 = "Ei! Isso era para ser uma missão de infiltração, não era?#nJá nos descobriram!"
1600115-9 = "Você está falando sério sobre se infiltrar usando um traje tão chamativo?"
1600115-10 = "É óbvio que iam te notar! Tá tirando a gente?!"
1600115-11 = "Mesmo que me digam isso... este é o meu uniforme, então—"
1600115-15 = "Ah, entendi! Era só ter tirado ele, né!"
1600115-19 = "[ns1] \"P-pare!\"\n[ns2] \"Asuna, cheguei!\""
1600115-23 = "Ah! Mestre! Oi, oi!"
1600115-24 = "Então, plano B! Ataque frontal, começar♪"
1600115-28 = "Alguém pare ela!"
1600115-29 = "Não deixem ela passar!"
1600115-37 = "（Depois disso, a situação escalou para um combate intenso—）"
1600115-39 = "Droga... e eu que pensei que conseguiria atrasá-la um pouco..."
1600115-40 = "Isso é... a C&C..."
1600115-46 = "[ns] \"Asuna, você está bem?\""
1600115-47 = "Com certeza! Estou ótima!"
1600115-48 = "Ah, mas parece que deixei cair meu laço.#nVou ali procurar rapidinho!"
1600115-50 = "Será que é por aqui?"
1600115-54 = "Hmm, não estou achando..."
1600115-58 = "Ei! Não pise nisso!"
1600115-59 = "Opa! Foi mal, foi mal!"
1600115-60 = "Ei, ei, você viu um laço azul por aí?"
1600115-61 = "Hã? Não sei de nada...#nE aliás, o lugar onde você atirou em mim está doendo..."
1600115-62 = "Foi mal, foi mal! Pode descansar um pouco!"
1600115-66 = "Ah!#nAchei!"
1600115-68 = "Mestre, desculpe a demora♪"
1600115-69 = "[s] \"Você encontrou o laço?\""
1600115-70 = "Sim! Estava bem aqui!"
1600115-71 = "Que bom que achei rápido!#nEntão, vamos lá reportar a conclusão da missão!"
1600115-76 = "[ns] \"Falando nisso, você sempre usa esse laço, né?\""
1600115-77 = "Como esperado do Mestre, você percebeu!#nÉ verdade! Eu uso ele o tempo todo~"
1600115-82 = "Este é o meu amuleto da sorte!#nQuando eu uso ele, tudo dá certo!"
1600115-83 = "Por exemplo...?"
1600115-84 = "Deixa ver... tem várias coisas, mas..."
1600115-85 = "Ah, talvez isso aqui!"
1600115-86 = "Eu não queria estudar para a prova, então não estudei nadinha..."
1600115-87 = "Mas eu chutei tudo e acertei todas as respostas!!"
1600115-88 = "[s] \"Todas!?\""
1600115-89 = "Isso! Todas! Incrível, né?"
1600115-90 = "Tem outras coisas também, tipo no café que eu sempre vou~"
1600115-91 = "A sobremesa que só tem 20 unidades por dia—"
1600115-92 = "Mesmo quando eu acho que já deve ter acabado, eu sempre consigo comer!#nTeve um dia que eu peguei a última!"
1600115-93 = "[s] \"Isso é incrível!\""
1600115-94 = "E também, durante o combate~"
1600115-95 = "Quando as balas e o pente acabam e eu estou em uma enrascada—"
1600115-96 = "Eu uso o laço como uma funda e acabo derrotando todo mundo!"
1600115-97 = "[s] \"I-isso é sorte... será?\""
1600115-98 = "É sorte sim! Eu acredito que é um laço da sorte que me protege!#n"
1600115-99 = "Ele nem está desfiado, né?#nEu me esforço bastante para cuidar dele."
1600115-100 = "[s5] \"Mas, como hoje, às vezes ele se solta...\"\n[s6] \"O que você faria se o perdesse de verdade?\""
1600115-103 = "E se eu perdesse de verdade...?"
1600115-104 = "Deixe-me ver..."
1600115-105 = "Hmm..."
1600115-106 = "Hmmmmmm..."
1600115-107 = "[s] \"Desculpe por dizer algo estranho...!\""
1600115-108 = "Talvez fique tudo bem mesmo se você perder!"
1600115-109 = "[s] \"Eh?\""
1600115-110 = "Eu ficaria muito triste, claro."
1600115-111 = "Mas, bem na frente da Asuna..."
1600115-112 = "Já existe a maior sorte de todas, então está tudo bem!"
1600115-113 = "Estou falando de você, Mestre!"
1600115-114 = "Por isso, mesmo que eu perca a fita, não tem problema!"
1600115-115 = "[s7] \"Asuna...! Isso me deixa um pouco envergonhada.\"\n[s8] \"Mas vamos tomar cuidado para não perder, está bem?\""
1600115-118 = "Hehe, combinado!"
1600115-119 = "Vou cuidar do Mestre e da fita ainda melhor do que antes!"
1600115-121 = "(Depois disso, voltei para casa com a Asuna enquanto conversávamos sobre nossas pequenas sortes.)"
