[translation]#[Texto revisado, mas pode haver alterações como Censura.] Em aguardo de revisão de formatação de texto. - Filipe 10/06.
41050-1 = "Episódio 5: Desconfiança Duradoura"
41050-2 = "Academia de Polícia Valkyrie - Saguão"
41050-8 = "Ah... Todas estão a salvo."
41050-9 = "Opa, a Miyako também tá aqui."
41050-10 = "Miyako-chan..."
41050-12 = "Finaaaalmente acabou... Acabou mesmo, né?"
41050-13 = "Eu queria ir pra casa logo, os meus pirulitos já acabaram..."
41050-14 = "Como você consegue pensar nessas coisas numa hora dessas?"
41050-15 = "Daqui a pouco eles vão nos chamar e dizer qual vai ser a nossa sentença."
41050-16 = "A julgar pelo clima dos interrogatórios... O mínimo que devemos esperar é a expulsão."
41050-17 = "E daí? A Academia Especial SRT já acabou mesmo. Ser expulsa ou não vai mudar o quê?"
41050-19 = "M-Mas se esse é o \"mínimo\"... então..."
41050-20 = "É, tem coisas muito piores que expulsão."
41050-21 = "Por exemplo, levarem a gente pra um laboratório subterrâneo secreto e usarem a gente como cobaia pra experimentos sombrios..."
41050-22 = "?!?!"
41050-23 = "É-É o meu fim..."
41050-29 = "Me desculpem, se eu tivesse comandado vocês melhor..."
41050-30 = "Vocês não teriam que passar por nada disso..."
41050-31 = "……Opa, peraí, por que é você que tá pedindo desculpas?"
41050-32 = "Quê, você tá sentindo o peso da responsabilidade, é?"
41050-33 = "Miyako, não entenda errado. A partir do exato milésimo de segundo em que decretaram o fechamento da nossa academia, você não é mais a nossa líder de esquadrão nem nada."
41050-34 = "Então faz favor de não ficar sentindo pena da gente como se você fosse responsável. Não precisamos que ninguém fique se martirizando por nós agora."
41050-35 = "Isso é... Mas, eu..."
41050-36 = "[s] \"Bom trabalho hoje, meninas.\""
41050-37 = "A-Ah, você..."
41050-38 = "O t-tal do... Sensei da Schale?"
41050-39 = "Hiii...?!"
41050-40 = "[s] \"……Ok, desculpa por existir.\""
41050-42 = "O senhor ainda está aqui, Sensei."
41050-43 = "Tem mais algum negócio pendente com a Valkyrie?"
41050-44 = "……Ou, não me diga que veio ver a gente de novo?"
41050-45 = "[s] \"Sim. Vim avisar sobre a decisão do Comitê de Administração em relação à punição de vocês.\""
41050-47 = "……Ghh!"
41050-48 = "Hmph. Pra mim tanto faz qual for."
41050-49 = "……"
41050-53 = "[ns1] \"Para resumir: todas foram liberadas.\"\n[ns2] \"Vocês já estão livres. Podem ir para onde quiserem.\""
41050-56 = "……Quê?"
41050-57 = "……Liberadas? E a punição?"
41050-58 = "Peraí, então isso quer dizer que a gente pode voltar pra SRT?!"
41050-59 = "[s] \"Não. Infelizmente isso está fora do meu alcance por enquanto...\""
41050-60 = "Ah. Fiquei feliz por nada."
41050-64 = "Ter lidado com o motim com tanto sucesso... O senhor usou a influência de sua conquista para obter o poder de decisão sobre nossa sentença?"
41050-65 = "……Por mais difícil que seja de aceitar, eu entendo a situação."
41050-66 = "Sendo assim, o que o senhor quer que façamos?"
41050-67 = "[s] \"Como assim 'fazer o quê'? O que VOCÊS querem fazer da vida?\""
41050-68 = "E ele ainda pergunta pra gente..."
41050-69 = "Se não dá pra voltar pra SRT, eu não tô nem aí pra onde eu vou..."
41050-70 = "A única coisa que eu quero agora é um lugar pra descansar. Eu tô mortinha com farofa..."
41050-71 = "[s] \"Se quiserem, podem ir descansar lá na Schale. Na verdade, até as portas do alojamento estão abertas se quiserem viver lá. se preferirem, é claro.\""
41050-72 = "……Hã? Oi?"
41050-73 = "Chamar um bando de garotas colegiais indefesas pra morar na sua casinha e \"descansar\"? O que você tá planejando? Qual é a tara doentia da vez?"
41050-75 = "……Que nojo. Eu não acredito que o senhor é um degenerado desse nível..."
41050-76 = "E-Eu sabia... você vai usar os nossos corpos de brinquedo pra se vingar do que fizemos naquele dia no parque..."
41050-77 = "Haha, aposto que ele com certeza vai obrigar a gente a vestir umas roupinhas bem minúsculas e fazer umas paradinhas bem indecentes e pervertidas no quartinho dele~"
41050-78 = "Já ouvi boatos fortíssimos de que o escritório do Schale é completamente infestado de câmeras escondidas em ângulos duvidosos e escutas de áudio debaixo do colchão..."
41050-79 = "V-V-Você... vai gravar a gente sem roupa no banho e escutar tudo o que a gente faz no escuro debaixo das cobertas...?!"
41050-80 = "Sabe como é, né? Pique obrigar a gente a recriar aquelas cenas pesadas de doujinshi +18 que o autor tem que entupir de tarja preta na censura~"
41050-81 = "[s3] \"NÃO!!! EU NÃO VOU FAZER ABSOLUTAMENTE NADA DISSO!!\"\n[s4] \"De onde vocês tiraram tanta besteira?!\""
41050-84 = "……Nós até agradecemos a sua \"oferta caridosa\", mas seremos obrigadas a recusar."
41050-85 = "Se a gente ficar no bem-bom, recebendo cama, comidinha na boca e sei lá mais quais \"massagens corporais duvidosas\", o nosso protesto contra o Conselho Estudantil Geral perde totalmente o sentido."
41050-87 = "E outra, ir pra Schale ia ser só moleza e libertinagem, né? A única coisa que a gente ia treinar lá seriam \"posições exóticas\" Zero disciplina e treinamento militar de verdade."
41050-88 = "Aturar um ou dois dias dessa sua pouca vergonha até vai, mas ficar presa pra sempre num ninho de preguiça desses? Nem ferrando."
41050-89 = "E aposto que você ia confiscar meus explosivos, e também que os únicos \"brinquedinhos perigosos\" que você ia deixar eu usar lá, são os debaixo da coberta... credo, que tédio."
41050-90 = "A-Acreditar assim do nada num homem mais velho cheio de segundas intenções... me dá calafrios..."
41050-91 = "[s] \"Er... E se vocês montarem um acampamento militar naquele parque de antes, então?\""
41050-93 = "Aquele parque...? O mesmo onde a gente armou o protesto?"
41050-94 = "O \"Parque dos Coelhinhos\", é...? Por mim, de boa. Pelo menos lá o único animal selvagem é a natureza, e não você. O perrengue de lá serve de sobra como um campo de treinamento de selva da SRT."
41050-95 = "Pra mim também tanto faz. Até porque a gente deixou todo o nosso arsenal largado por lá mesmo."
41050-96 = "P-Pode ser..."
41050-98 = "Pensando bem, acampar lá é como dar continuidade ao nosso protesto, então por nós tudo bem, mas..."
41050-99 = "Você tem certeza disso? Não vai ficar chorando no banho \"porque ficou sem nós na sua cama?\" Pra você tá tranquilo a gente invadir o parque assim?"
41050-100 = "[s5] \"Eu não tava tramando nada disso!! E por mim tá tudo bem, sério...\"\n[s6] \"A questão é se vocês vão ficar bem e seguras por lá. E se precisarem de uma ajuda por lá é só...\""
41050-101 = "Dispensamos. Não somos o tipo de garotinhas ingênuas e indefesas que precisam de um homem pra salvar o dia."
41050-102 = "Dispensamos. Não somos o tipo de garotinhas ingênuas e indefesas que precisam de um homem pra salvar o dia."
41050-103 = "E outra... só pra deixar bem claro: a gente ainda NÃO confia nem um pingo em você."
41050-104 = "Dar uma de \"paizão bonzinho\" bancando o nosso lado não vai mudar isso nem ferrando e a gente não vai abaixar a guarda e se entregar tão fácil, ouviu bem?"
41050-105 = "[s7] \"...Tá, eu já desisti de salvar a minha reputação hoje.\"\n[s8] \"Tranquilo, Mas Desde que vocês não passem necessidade como frio ou fome, é o que importa pra mim.\""
41050-110 = "……Tarado esquisito."
41050-111 = "Então, a gente se vê..."
41050-112 = "Na próxima vez que você vier tentar espiar a gente, é bala na cara!"
41050-113 = "Saki, a gente não vai deixar ele espiar nem de perto, muito menos de longe."
41050-120 = "E-Ei, me esperem...?! Não me deixem sozinha aqui com ele...!"
41050-122 = "Próximo Episódio: Em Busca de Suprimentos"