[translation]
41050-1 = "Episódio 5: Desconfiança Duradoura"
41050-2 = "Saguão da Academia Valkyrie"
41050-8 = "Ah… vocês estão bem."
41050-9 = "O quê, Miyako também está aqui."
41050-10 = "Miyako-chan…"
41050-12 = "Finalmente acabou… acabou, né?"
41050-13 = "Quero ir logo, mas meus doces acabaram…"
41050-14 = "Não é hora de estar tão tranquila."
41050-15 = "E a nossa punição? Vão nos dizer agora, né?"
41050-16 = "Pelo jeito… bom, o mínimo que podemos esperar é a expulsão."
41050-17 = "Diz isso, mas a SRT já foi fechada, né. A expulsão não muda nada."
41050-19 = "M-mas, se é o 'mínimo'…"
41050-20 = "Bem, pode ser algo pior."
41050-21 = "Ser levada para uma instalação subterrânea suspeita e… servir de cobaia…"
41050-22 = "!?!?"
41050-23 = "E-estou ferrada…"
41050-29 = "Desculpem. Se eu tivesse sido melhor…"
41050-30 = "Talvez vocês não tivessem passado por isso…"
41050-31 = "……Ei, por que você está se desculpando?"
41050-32 = "O quê, está se sentindo responsável?"
41050-33 = "Miyako, não se engane. Desde o momento em que o fechamento foi decidido, você não é mais a comandante."
41050-34 = "Mesmo assim, não quero que assuma responsabilidades que não lhe cabem."
41050-35 = "Isso é… mas eu…"
41050-36 = "[s] \"Bom trabalho.\""
41050-37 = "A-ah, você é…"
41050-38 = "O da Schale…?"
41050-39 = "Hiii…?!"
41050-40 = "[s] \"……Já peço desculpas pelo que está por vir.\""
41050-42 = "Ainda está aqui, Professor."
41050-43 = "Tem algum assunto na Valkyrie?"
41050-44 = "……Ou será que, pasme, veio falar conosco?"
41050-45 = "[s] \"Sim. Sobre a punição, vinda da Administração.\""
41050-47 = "……Ugh!"
41050-48 = "Bem, seja qual for, não me importo."
41050-49 = "……"
41050-53 = "[ns1] \"Antes de mais nada, todas estão livres.\"\n[ns2] \"Vocês estão soltas agora. Podem ir para onde quiserem.\""
41050-56 = "……Hã?"
41050-57 = "……Livres? E a punição?"
41050-58 = "Espera, quer dizer que podemos voltar para a SRT?"
41050-59 = "[s] \"Não. Isso não é possível…\""
41050-60 = "Ah, então me iludi à toa."
41050-64 = "Quer dizer que a Schale vai decidir a punição, em reconhecimento ao sucesso da operação no parque?"
41050-65 = "……É difícil de aceitar, mas entendi a situação."
41050-66 = "E então, o que o senhor quer que façamos?"
41050-67 = "[s] \"O que eu quero? O que vocês querem fazer?\""
41050-68 = "Por que está perguntando para a gente?"
41050-69 = "Se não podemos voltar para a SRT, tanto faz para onde vamos…"
41050-70 = "Quero descansar em algum lugar. Estou exausta…"
41050-71 = "[s] \"Podem descansar na Schale, ou até morar lá, se quiserem.\""
41050-72 = "……Hã?"
41050-73 = "Juntar alunas do sexo feminino na sua casa, o que pretende fazer?"
41050-75 = "……Inacreditável."
41050-76 = "A-ah, então você ficou chateado com aquela vez e…"
41050-77 = "Vai nos obrigar a fazer coisas indecentes…"
41050-78 = "Falando nisso, ouvi dizer que a Schale está cheia de escutas escondidas…"
41050-79 = "Vai espionar nossas vidas… para quê…?!"
41050-80 = "Vai nos obrigar a fazer coisas que não podem ser desenhadas em mangás comuns?"
41050-81 = "[s3] \"Não, não, não!!\"\n[s4] \"Para onde essa conversa está indo?!\""
41050-84 = "……Agradeço a boa vontade, mas não posso aceitar."
41050-85 = "Se vivêssemos confortavelmente na Schale, nosso objetivo de 'protestar contra o Conselho Estudantil' perderia o sentido."
41050-87 = "Na Schale, não há regulamentação ou treinamento adequados, certo?"
41050-88 = "Um ou dois dias até vai, mas ficar lá permanentemente é insuportável."
41050-89 = "Além disso, os explosivos devem ser proibidos…"
41050-90 = "C-confiar de repente assim é um pouco…"
41050-91 = "[s] \"Então, que tal acampar naquele parque?\""
41050-93 = "Aquele parque… onde protestamos?"
41050-94 = "O 'Parque dos Coelhinhos'… para mim está bom. O ambiente se assemelha a um campo de treinamento da SRT."
41050-95 = "Para mim também. Até porque deixei meu equipamento lá."
41050-96 = "E-eu também…"
41050-98 = "De certa forma, é uma continuação do protesto. Para nós, não há problema…"
41050-99 = "Mas o senhor está de acordo com isso?"
41050-100 = "[s5] \"Comigo tudo bem, mas…\"\n[s6] \"E vocês, estão bem? Se precisarem de ajuda…\""
41050-101 = "Não se preocupe. Não somos apenas crianças indefesas."
41050-102 = "Não se preocupe. Não somos apenas crianças indefesas."
41050-103 = "E, para ser clara, ainda não confiamos no senhor."
41050-104 = "Mesmo que nos trate com bondade, isso não muda."
41050-105 = "[s7] \"Sim, tudo bem.\"\n[s8] \"Desde que vocês não estejam sofrendo, é o que importa.\""
41050-110 = "……Que cara estranho."
41050-111 = "Então…"
41050-112 = "Na próxima vez que nos encontrarmos, seremos inimigas!"
41050-113 = "Não, desde o início já éramos inimigas."
41050-120 = "E-esperem…! Não me deixem para trás…!"
41050-122 = "Próximo Episódio: Vamos Começar a Aquisição de Alimentos"