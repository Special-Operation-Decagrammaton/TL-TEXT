[translation]
41050-1 = "Episódio 5: Desconfiança Persistente"
41050-2 = "Escola de Polícia Valkyrie - Lobby"
41050-8 = "Ah... vocês estão todos bem?"
41050-9 = "Ora, a Miyako também estava aqui?"
41050-10 = "Miyako-chan..."
41050-12 = "Finalmente acabou... acabou mesmo, né?"
41050-13 = "Eu queria ir embora logo, e meus doces também acabaram..."
41050-14 = "Você acha que é hora de ficar falando essas coisas com calma?"
41050-15 = "Nós ainda vamos receber a sentença sobre a nossa punição, não vamos?"
41050-16 = "Pelo que parece... bem, no mínimo, é melhor se preparar para a expulsão."
41050-17 = "Mesmo que digam isso, a Academia SRT já não existe mais, né? Não vai mudar nada se formos expulsas."
41050-19 = "M-mas, se isso é o \"mínimo\"..."
41050-20 = "Bem, existem possibilidades bem piores."
41050-21 = "Como ser levadas para instalações subterrâneas suspeitas para fazerem sabe-se lá o quê, ou servirem de cobaia para experimentos..."
41050-22 = "！？！？"
41050-23 = "J-já era para mim..."
41050-29 = "Desculpem, se eu tivesse feito um trabalho melhor..."
41050-30 = "Vocês não teriam passado por tudo isso..."
41050-31 = "...Ei, por que você está se desculpando?"
41050-32 = "O quê, está se sentindo responsável ou algo assim?"
41050-33 = "Miyako, não se engane. Desde o momento em que o fechamento da academia foi decidido, você não é mais a líder do esquadrão nem nada do tipo."
41050-34 = "Mesmo assim, não adianta nada ficar assumindo responsabilidades por conta própria. Não é como se alguém estivesse esperando isso de você agora."
41050-35 = "Isso é... mas, eu..."
41050-36 = "[s] \"Bom trabalho.\""
41050-37 = "V-você é..."
41050-38 = "D-do Schale...?"
41050-39 = "Hii...！？"
41050-40 = "[s] \"...Já peço desculpas por qualquer coisa.\""
41050-42 = "Você ainda estava aqui, Sensei."
41050-43 = "Tem algum assunto na Valkyrie?"
41050-44 = "...Ou, embora eu ache difícil de acreditar, você tem assuntos conosco?"
41050-45 = "[s] \"Sim. Sobre a punição decidida pelo Comitê Administrativo.\""
41050-47 = "...!"
41050-48 = "Bem, não me importo com qualquer que seja a punição."
41050-49 = "..."
41050-53 = "[ns1] \"Por enquanto, todas estão liberadas.\"\n[ns2] \"Estão livres. Podem ir para onde quiserem.\""
41050-56 = "...Como é?"
41050-57 = "...Liberadas? E a punição?"
41050-58 = "Espere, isso significa que podemos voltar para a SRT?"
41050-59 = "[s] \"Não. Isso não é possível, mas...\""
41050-60 = "Que droga, perdi meu tempo ficando feliz."
41050-64 = "O sucesso da operação no parque... isso significa que, por causa desse mérito, o Schale ficou responsável por decidir a punição?"
41050-65 = "...É difícil de entender, mas compreendi a situação."
41050-66 = "Então, Sensei, o que você quer que a gente faça?"
41050-67 = "[s] \"Não importa o que eu diga... o que vocês querem fazer?\""
41050-68 = "Por que está perguntando isso para a gente..."
41050-69 = "Se não podemos voltar para a SRT, não importa para onde formos..."
41050-70 = "Por enquanto, eu só quero descansar em algum lugar. Estou exausta..."
41050-71 = "[s] \"Podem descansar no Schale, ou até mesmo morar lá, se quiserem.\""
41050-72 = "...Hã?"
41050-73 = "O que você pretende fazer reunindo as alunas no seu escritório?"
41050-75 = "……Eu não consigo acreditar."
41050-76 = "A-Acho que você ainda está guardando rancor pelo que aconteceu antes……"
41050-77 = "É, com certeza vamos ser forçadas a fazer todo tipo de coisa indecente~."
41050-78 = "Falando nisso, já ouvi rumores de que o Schale está cheio de escutas instaladas por toda parte."
41050-79 = "E-Espionar nossas vidas, para quê……!?"
41050-80 = "Será que vamos ser forçadas a fazer coisas que nem aparecem em mangás comuns?"
41050-81 = "[s3] \"Não, não, não!!\"\n[s4] \"A conversa está indo para um caminho muito estranho!!\""
41050-84 = "……Agradeço a boa intenção, mas não posso aceitar essa proposta."
41050-85 = "Se vivermos uma vida confortável no Schale, nosso objetivo original de \"protestar contra o Conselho Estudantil Geral\" não fará sentido."
41050-87 = "Mesmo que fôssemos para o Schale, não é como se houvesse disciplina ou treinamento adequado lá, certo?"
41050-88 = "Um ou dois dias tudo bem, mas não conseguiria suportar ficar lá por muito tempo."
41050-89 = "Além disso, o manuseio de materiais perigosos deve ser proibido lá……."
41050-90 = "A-Acreditar em você de repente é um pouco……."
41050-91 = "[s] \"Então, que tal acampar naquele parque?\""
41050-93 = "Aquele parque…… o lugar onde fizemos a manifestação?"
41050-94 = "O \"Parque dos Coelhinhos\"…… Por mim, tudo bem. Em termos de ambiente, é quase como um campo de treinamento de campo da SRT."
41050-95 = "Por mim também. Além disso, deixamos nossos equipamentos lá mesmo."
41050-96 = "E-Eu também……."
41050-98 = "De certa forma, será uma continuação do protesto, então para nós não há problema, mas……."
41050-99 = "Professor, você tem certeza disso?"
41050-100 = "[s5] \"Eu estou bem com isso, é claro…….\"\n[s6] \"Mas e vocês, estão bem com isso? Se houver algo que eu possa fazer……\""
41050-101 = "Não nos importamos. Nós não somos apenas crianças indefesas."
41050-102 = "Não nos importamos. Nós não somos apenas crianças indefesas."
41050-103 = "Além disso…… reforçando, nós não confiamos em você, Professor."
41050-104 = "Mesmo que você nos mostre essa bondade agora, isso não vai mudar."
41050-105 = "[s7] \"Sim, eu entendo isso.\"\n[s8] \"Desde que vocês não sofram, para mim já está ótimo.\""
41050-110 = "……Que pessoa estranha."
41050-111 = "Então……."
41050-112 = "Na próxima vez que nos encontrarmos, seremos inimigas!"
41050-113 = "Não, a gente já é inimiga desde o começo."
41050-120 = "E-Espere……!? Não me deixe para trás……!"
41050-122 = "Próximo episódio: Vamos começar a busca por suprimentos"
