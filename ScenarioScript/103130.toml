[translation]
103130-1 = "Episódio 13; A Qualificação de \"Herói\" (2)"
103130-2 = "……Começou, né."
103130-3 = "O conceito básico da \"Arca de Atrahasis\" é \"coletar\" os dados ao redor e \"transformá-los\"."
103130-4 = "Mas se a existência original, e não uma cópia, intervir... ela deve conseguir atravessar aquela barreira, não importa a interpretação multidimensional."
103130-6 = "Naquela hora, a Arca que estava sendo gerada pelos dados da cidade fortaleza...#ntinha a forma de um abrigo gigante."
103130-7 = "Provavelmente... porque foi construída com base na cidade fortaleza projetada pelo medo que habitava o seu coração, Rio."
103130-8 = "……Então, a Arca que a Aris gerou agora é...?"
103130-9 = "……Fufufu, a resposta já tá na ponta da língua♪"
103130-20 = "Os dados da \"Utnapishtim\" estão sendo desmembrados――e reconstruídos!? Tem certeza que isso vai dar certo?"
103130-21 = "Pera, o quê..."
103130-22 = "Esse tamanho todo... não parece nem um pouco com uma arma... Será que――"
103130-23 = "!? Aquilo é... a nossa obra-prima do Departamento de Engenharia..."
103130-24 = "Quer dizer, olha o tamanho desse negócio, não tá fora de escala!?"
103130-25 = "Aquilo é..."
103130-26 = "Uma Espada de Luz...!?"
103130-28 = "Sim. Aquela é a verdadeira \"Arca de Atrahasis\", uma \"Prova de Heroísmo\" construída com base na coragem da Aris――"
103130-29 = "Bem... se fosse pra dar um nome..."
103130-30 = "Que tal \"Espada de Luz: Supernova de Atrahasis\"?"
103130-32 = "Alvo confirmado. Ponto crítico de potência ultrapassado...!"
103130-33 = "Carregamento de poder mágico... 100%, lá vai!"
103130-34 = "Um golpe de justiça para destruir o mal..."
103130-38 = "……Pois é, Aris."
103130-39 = "Vamos usar――a expressão de vocês aqui."
103130-43 = "Vai, heroína...!#nSalve o nosso mundo!!!"
103130-45 = "Com certeza!#nA Aris vai corresponder às expectativas de todas!!"
103130-46 = "LUZ――――――"
103130-50 = "――――A !!!!!!!!"
103130-58 = "Confirmação de disparo de energia de altíssima concentração vindo da Espada de Luz!!"
103130-59 = "A energia está indo direto na Arca...!!"
103130-60 = "Calculando a trajetória do feixe――Margem de erro de 0,003%! Sem problemas!!"
103130-61 = "A energia disparada vai atingir o centro da Arca em instantes!#n……Mas――"
103130-67 = "……Pois é.#nSerá que a Espada de Luz realmente vai conseguir atravessar a \"barreira multidimensional\" da Arca...?"
103130-78 = "Aris……!!"
103130-79 = "Aris――――！！"
103130-100 = "Direto no alvo! Barreira multidimensional, estraçalhada!!!"
103130-101 = "[s] \"Conseguimos!!!\""
103130-102 = "Aaaaah…………!!!"
103130-103 = "Realmente――você conseguiu atravessar a barreira multidimensional...! "
103130-104 = "A barreira multidimensional não conseguiu manter a \"coexistência de estados\" e começou a colapsar――! "
103130-113 = "A-Ahn.../!?"
103130-114 = "A-Aris!?"
103130-115 = "Aris-chan!! Fica firme...!"
103130-117 = "A-Aris-chan...!? Tá tudo bem com você!?"
103130-118 = "T-Tô levando ela pra um lugar seguro agora mesmo!"
103130-119 = "……/!?"
103130-120 = "N-Não pode ser..."
103130-121 = "Não...! Ela perdeu a consciência, mas a Aris-chan tá bem!"
103130-122 = "Sim. Ela só tá dormindo... Vamos levar ela pra enfermaria e ficar de olho nela...!"
103130-123 = "E-Entendido, conto com vocês...!"
103130-129 = "A onda de choque vai chegar aqui em uns 5 segundos!#nPreparem-se para o impacto, pessoal!!"
103130-130 = "A \"coexistência de estados\" da barreira multidimensional desapareceu!#nConfirmei a parada da função final!!"
103130-131 = "Beleza... isso quer dizer que a Arca tá indefesa agora, né?"
103130-136 = "Ughhhh...!!"
103130-137 = "R-Rin-senpai...!"
103130-138 = "Não podemos perder essa chance...!!"
103130-139 = "O quê, o quê?"
103130-141 = "Utnapishtim, avançar com velocidade máxima!!"
103130-142 = "A-Agora...!??"
103130-144 = "É isso mesmo!#nSe a gente não invadir antes que o inimigo tome a iniciativa, já era!"
103130-145 = "S-Sim! Entendido!!"
103130-146 = "Potência máxima... Avançar――!!!"
103130-157 = "Faltam uns 3 segundos pra colidir com a barreira...!!"
103130-158 = "Aaaaaah... V-Vai dar tudo certo, né!?"
103130-159 = "A barreira multidimensional tá desativada, então com certeza vai dar tudo certo...!"
103130-160 = "Sim. Vamos atravessar a barreira e invadir o interior da Arca assim mesmo!!"
103130-161 = "……O-O impacto vem aí!! Se segurem firme!!"
103130-173 = "Barreira, atravessada!!! Ayane-san, controle de emergência!"
103130-174 = "Sim! Sequência de controle de emergência, ativada!!"
103130-183 = "\"Nave Principal de Utnapishtim\", motores de empuxo reverso ativados!#nCuidado com a sobrecarga nos motores!"
103130-184 = "Estamos prestes a colidir com o corpo principal da Arca!!#nPreparem-se para mais impacto, pessoal!!"
103130-185 = "Colisão com o revestimento externo da Arca!!"
103130-202 = "……。"
103130-203 = "Haa... haa... "
103130-204 = "D-Deu certo...?"
103130-205 = "Acho que sim..."
103130-206 = "Aqui é... dentro da Arca?"
103130-207 = "……Sim.#nFinalmente... conseguimos invadir."
103130-208 = "[s] \"Que bom... foi um sucesso total.\""
103130-210 = "Haa... perdi uns anos de vida agora..."
103130-211 = "Quem diria que ia dar certo mesmo fazendo desse jeito..."
103130-212 = "Ai, ai... minhas pernas tão bambas..."
103130-214 = "Sério mesmo, a gente conseguiu lidar com a Arca...#nEu nunca imaginei que conseguiríamos superar isso usando um método desses."
103130-215 = "Pois é... A Aris realmente salvou o mundo."
103130-217 = "……Não. A Aris diria o seguinte――"
103130-218 = "\"Foi porque eu tinha companheiras que eu consegui realizar isso\"."
103130-219 = "……。"
103130-220 = "Pra ser mais precisa... porque você estava lá, Rio.#nPorque tivemos as suas ideias."
103130-221 = "Nem eu, sendo essa supergenial linda, teria pensado em algo assim."
103130-222 = "……Himari, eu..."
103130-223 = "……Por enquanto, ainda não.#nMas se――nós conseguirmos salvar o mundo,"
103130-224 = "com certeza será graças a você, Rio."
103130-225 = "[s] \"É verdade. A Rio salvou o mundo.\""
103130-227 = "Eu..."
103130-228 = "………… "
103130-229 = "……。"
103130-233 = "Rio...?"
103130-249 = "Princesa..."
103130-250 = "Adeus, Key..."
103130-251 = "Agora, a Aris..."
103130-253 = "Me desculpa... Mesmo depois de você ter me ensinado..."
103130-273 = "……Princesa."
103130-274 = "Você sabia que se usasse esse poder, você mesma estaria em perigo..."
103130-275 = "……"
103130-276 = "Mesmo correndo o risco de desaparecer――de perder a sua vida..."
103130-279 = "Será que você não tem medo nem da morte, se for pra me――pra salvar todo mundo?"
103130-280 = "Essa é a sua coragem... é isso que significa ser uma \"Heroína\"?"
103130-283 = "……Não. Você não vai desaparecer.#nEu me recuso a deixar isso acontecer."
103130-284 = "……Não se preocupe, você não vai desaparecer... Eu não vou deixar."
103130-287 = "Aquilo que deveria desaparecer não é a heroína, mas sim――a \"ferramenta\" que destrói o mundo."
103130-288 = "Isso é o certo a se fazer. Por isso――"
103130-291 = "――Agora está tudo bem. "
103130-293 = "……E outra coisa,"
103130-294 = "Não peça desculpas pra mim――Aris."
103130-302 = "Key..."
103130-309 = "Aris... Será que eu tô sonhando?#nEla tá com uma cara tão gentil."
103130-310 = "……。"
103130-311 = "Ué...? A Aris-chan falou alguma coisa agora há pouco..."
103130-312 = "A-Aris-chan?#n\"Ke\"...?"
103130-313 = "Aris...?#nVocê tá chorando...?"
103130-323 = "Próximo episódio; Invasão"