[translation]
103130-1 = "Episódio 13; Qualificações de “Herói” (2)"

103130-2 = "... Já começou."

103130-3 = "O conceito básico da ``Arca de Atlas Hasith'' é ``coletar'' e ``transformar'' os dados circundantes."

103130-4 = "Por outro lado, se o original, e não a cópia, interviesse... deveria ser possível penetrar essa barreira, independentemente da interpretação multidimensional."

103130-6 = "Naquela época, a arca que estava prestes a ser criada a partir dos dados da cidade-fortaleza... #nTinha a forma de um enorme abrigo."

103130-7 = "Talvez...O Rio, foi construído a partir de uma cidade-fortaleza que era uma projeção do medo que morava em seu coração."

103130-8 = "...Se sim, e a arca que Alice acabou de criar...?"

103130-9 = "...Hehe, a resposta já saiu ♪"

103130-20 = "Os dados de “Utnapishtim” foram desmontados e reconstruídos! ? Isso está realmente bem?"

103130-21 = "Ah, isso..."

103130-22 = "Esse tamanho torna difícil acreditar que seja uma arma... talvez..."

103130-23 = "! ? Essa foi uma obra-prima do nosso departamento de engenharia..."

103130-24 = "Não é uma ordem de magnitude maior?"

103130-25 = "Aquilo é..."

103130-26 = "Espada de luz...! ?"

103130-28 = "Sim. Essa é a "Arca de Atlas Hasith" original e é a "Prova do Herói" construída sobre a [ruby=coração]coragem[/ruby]de #nAlice ――"

103130-29 = "Bem... se eu tivesse que dar um nome..."

103130-30 = "É "Espada de Luz: Supernova de Atlas Hasith"?"

103130-32 = "Confirmação de destino. Rompendo o ponto crítico de saída...!"

103130-33 = "Carregamento mágico... 100%, vamos lá!"

103130-34 = "Um golpe de justiça que esmaga o mal..."

103130-38 = "...Isso mesmo, Alice."

103130-39 = "Aqui, vamos pegar emprestada sua expressão."

103130-43 = "Vá, herói...! #nSalve nosso mundo! ! !"

103130-45 = "Claro! #nAlice vai corresponder às expectativas dos seus amigos! !"

103130-46 = "luz------"

103130-50 = "----Ei! ! ! ! ! !"

103130-58 = "Da espada de luz... confirmamos a liberação de energia de altíssima concentração! !"

103130-59 = "A energia está indo direto para a arca...! !"

103130-60 = "Calculando a trajetória do feixe - o erro é de 0,003%! Sem problemas! !"

103130-61 = "A energia emitida chegará em breve ao centro da arca! #n...Mas――"

103130-67 = "……Concordo. #nA espada de luz será capaz de penetrar na “barreira multidimensional” da Arca..."

103130-78 = "Alice...! !"

103130-79 = "Alice ――――! !"

103130-100 = "É um golpe direto! Barreira multidimensional, quebrada! ! !"

103130-101 = "[s] \"Oba!!!\""

103130-102 = "Oh…! ! !"

103130-103 = "Você realmente penetrou a barreira multidimensional...!"

103130-104 = "A barreira multidimensional não conseguiu manter a “coexistência de Estados” e começou a ruir!"

103130-113 = "Ah, ah…! ?"

103130-114 = "Ah, Alice! ?"

103130-115 = "Alice! ! Aguente firme...!"

103130-117 = "Ah, Alice-chan...! ? Tudo bem! ?"

103130-118 = "E-estou levando você para um lugar seguro agora mesmo!"

103130-119 = "...! ? #nAh, é isso..."

103130-120 = "lar……! Embora ela tenha perdido a consciência, Alice está segura!"

103130-121 = "sim. Ele só está dormindo... Vou levá-lo para a enfermaria e vamos ver como ele está...!"

103130-122 = "Ah, sim, eu pedi...!"

103130-129 = "Após cerca de 5 segundos, uma onda de choque virá em sua direção! #n Pessoal, preparem-se para o choque! !"

103130-130 = "A “coexistência de estados” da barreira multidimensional desapareceu! #nConfirmamos que a função final foi interrompida! !"

103130-131 = "Ok... então isso significa que a Arca agora está indefesa, certo?"

103130-136 = "Guuuuuu...! !"

103130-137 = "R-senpai Rin...!"

103130-138 = "Não perca esta oportunidade...! !"

103130-139 = "Hein, hein?"

103130-141 = "Utnapishtim, avance em velocidade máxima! !"

103130-142 = "E-é agora...! ?"

103130-144 = "Isso se encaixa! #nTemos que avançar antes que o inimigo dê o primeiro passo!"

103130-145 = "Ah, sim! Entendido! !"

103130-146 = "Vou avançar com potência máxima...! ! !"

103130-157 = "Demora cerca de 3 segundos até a barreira atingir...! !"

103130-158 = "Ahhh... está tudo bem! ?"

103130-159 = "A barreira multidimensional foi neutralizada agora, então tenho certeza que tudo ficará bem...!"

103130-160 = "sim. Rompa a barreira e entre na arca! !"

103130-161 = "...Ei, vai ser um choque! ! Segure firme! !"

103130-173 = "Rompa a barreira! ! ! Ayane-san, controle de emergência!"

103130-174 = "sim! A sequência de controle de emergência está instalada e funcionando! !"

103130-183 = "A "nave principal de Utnapishtim" ativa o reversor de empuxo! #nCuidado para não sobrecarregar o motor!"

103130-184 = "Em breve colidirá com a própria arca! ! #nTodos, preparem-se para mais choque! !"

103130-185 = "colide com a parede externa da arca! !"

103130-202 = "……."

103130-203 = "Suspiro...suspiro..."

103130-204 = "Bem, você teve sucesso...?"

103130-205 = "Bem, parece que sim..."

103130-206 = "Isto está... dentro da arca?"

103130-207 = "……sim. #nFinalmente...conseguimos invadir o interior."

103130-208 = "[s] \"Bom... grande sucesso.\""

103130-210 = "Suspiro... minha expectativa de vida foi encurtada..."

103130-211 = "Nunca pensei que realmente teria sucesso com algo assim..."

103130-212 = "Suspiro... não consigo colocar força nas pernas..."

103130-214 = "Realmente, nunca imaginei que seria capaz de lidar com a Arca...#nEu seria capaz de superá-la desta forma."

103130-215 = "É isso mesmo... Alice realmente salvou o mundo."

103130-217 = "……não. Alice responderia assim--"

103130-218 = "“Consegui fazer isso porque tinha amigos”, disse ele."

103130-219 = "……."

103130-220 = "Para ser exato...Rio, é porque você estava lá. #nFoi por causa da sua ideia."

103130-221 = "Acho que nem eu, uma garota super genial e linda, poderia ter tido tal ideia."

103130-222 = "...Himari, eu--"

103130-223 = "...Ainda não. #nE se conseguirmos salvar o mundo,"

103130-224 = "Tenho certeza que é tudo graças a você, Rio."

103130-225 = "[s] "Isso mesmo. O Rio salvou o mundo.""

103130-227 = "EU……"

103130-228 = "None"

103130-229 = "……."

103130-233 = "Rio...?"

103130-249 = "princesa……."

103130-250 = "Adeus, Kei..."

103130-251 = "Agora Alice..."

103130-253 = "Me desculpe... eu deveria ter contado a Alice..."

103130-273 = "...Princesa."

103130-274 = "Você... sabe que se usar esse poder, você estará em perigo..."

103130-275 = "None"

103130-276 = "Mesmo que minha própria existência possa desaparecer - eu posso até perder minha vida..."

103130-279 = "Você não tem medo da morte se for para me salvar... a todos?"

103130-280 = "É essa a sua coragem... é isso que faz de você um “herói”?"

103130-283 = "……não. Você não deve desaparecer. #nEu rejeito."

103130-284 = "...Não se preocupe, você não vai desaparecer...Eu não vou deixar isso acontecer."

103130-287 = "O ser que deveria desaparecer não deveria ser um herói, mas uma “ferramenta” que destruirá o mundo."

103130-288 = "Isso está correto. Porque #n――"

103130-291 = "--Agora, está tudo bem."

103130-293 = "...E,"

103130-294 = "Por favor, não se desculpe comigo, Alice."

103130-302 = "Kei...."

103130-309 = "Alice... você está sonhando? #nVocê tem um rosto gentil."

103130-310 = "……."

103130-311 = "Huh...? E-eu acho que Alice acabou de dizer alguma coisa..."

103130-312 = "Ah, Alice? #n "Ke"...?"

103130-313 = "Alice...? #nVocê está chorando...?"

103130-323 = "Próxima vez; correr"

