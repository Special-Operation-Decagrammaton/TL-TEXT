[translation]
103130-1 = "第13話;「勇者」の資格（２）"
103130-2 = "……始まったのね。"
103130-3 = "「アトラ・ハシースの箱舟」の基本概念は、周りのデータを「収集」し、「変形」させること。"
103130-4 = "それに対し、コピーではなくオリジナルの存在が介入したのなら……多次元解釈とは関係なく、あのバリアを貫通できるはずよ。"
103130-6 = "あの時、要塞都市のデータで生み出されようとしていた箱舟は……#n巨大なシェルターの形をしていました。"
103130-7 = "おそらく……リオ、あなたの心に巣食った恐怖が投影された要塞都市を基盤として構築されたからでしょう。 "
103130-8 = "……であれば、今アリスが生み出した箱舟は……？"
103130-9 = "……ふふっ、答えはもう出ていますよ♪"
103130-20 = "「ウトナピシュティム」のデータが分解されて――再構築されている！？本当に、これでいいのかい？"
103130-21 = "あ、あれ……"
103130-22 = "銃とは思えないあの大きさ……もしかして――"
103130-23 = "！？あれは、私たちエンジニア部の会心作……"
103130-24 = "って、大きさが桁違いじゃないですか！"
103130-25 = "あれは……"
103130-26 = "光の剣……！？"
103130-28 = "ええ。あれが本来の「アトラ・ハシースの箱舟」であり、#nアリスの[ruby=こころ]勇気[/ruby]を基盤として構築された、「勇者の証」――"
103130-29 = "そうですね……名付けるとすれば"
103130-30 = "「光の剣：アトラ・ハシースのスーパーノヴァ」でしょうか？"
103130-32 = "ターゲット確認。出力臨界点突破……！"
103130-33 = "魔力充電……100%、行きます！"
103130-34 = "悪を打ち砕く正義の一撃……"
103130-38 = "……そうね、アリス。"
103130-39 = "ここは――貴女たちの表現を借りるとしましょう。"
103130-43 = "行け、勇者よ……！#n私たちの世界を救いなさい！！！"
103130-45 = "もちろんです！#nアリスは、仲間の期待に応えます！！"
103130-46 = "光――――――"
103130-50 = "――――よ！！！！！！"
103130-58 = "光の剣から……超高濃度エネルギーの発射を確認！！"
103130-59 = "エネルギーが、箱舟に真っ直ぐ向かってる……！！"
103130-60 = "ビームの軌道を計算中――誤差は0.003%！問題ありません！！"
103130-61 = "発射されたエネルギーは、まもなく箱舟の中央に届きます！#n……ですが――"
103130-67 = "……そうですね。#n果たして、箱舟の「多次元バリア」を、光の剣が貫通できるでしょうか……"
103130-78 = "アリス……！！"
103130-79 = "アリス――――！！"
103130-100 = "直撃です！多次元バリア、粉砕！！！"
103130-101 = "[s] \"やった！！！\""
103130-102 = "っ…………！！！"
103130-103 = "本当に――多次元バリアを貫通したのですね……！ "
103130-104 = "多次元バリアが「状態の共存」を維持できず、崩壊を開始しました――！ "
103130-113 = "あ、ああっ……！？"
103130-114 = "あ、アリス！？"
103130-115 = "アリスちゃん！！しっかりして……！"
103130-117 = "あ、アリスちゃんは……！？大丈夫なの！？"
103130-118 = "い、今、安全な場所に連れて行ってるとこ！"
103130-119 = "……！？#nそ、そんな……"
103130-120 = "いえ……！意識は失っていますが、アリスちゃんは無事です！ "
103130-121 = "はい。眠っているだけです……医務室に連れて行って、わたしたちが様子を見ます……！"
103130-122 = "え、ええ、頼んだわよ……！"
103130-129 = "約5秒後、こちらに衝撃波が来ます！#nみなさん衝撃に備えてください！！"
103130-130 = "多次元バリアの「状態の共存」が消失！#n最終機能の停止を確認したよ！！ "
103130-131 = "よし……という事は、箱舟はもう無防備ってことよね？"
103130-136 = "ぐううっ……！！"
103130-137 = "り、リン先輩……！"
103130-138 = "このチャンスを、逃してはなりません……！！"
103130-139 = "えっ、えっ？"
103130-141 = "ウトナピシュティム、最大速力で突進します！！"
103130-142 = "い、今ですか……！？"
103130-144 = "それで合ってる！#n敵に先手を打たれる前に突入しないと！"
103130-145 = "は、はい！分かりました！！"
103130-146 = "最高出力で……突進します――！！！"
103130-157 = "ば、バリア衝突まで約3秒……！！"
103130-158 = "うあああ……だ、大丈夫なんだよね！？ "
103130-159 = "今は多次元バリアが無力化された状態ですから、きっと大丈夫です……！"
103130-160 = "はい。バリアを突破し、このまま箱舟内部に侵入します！！"
103130-161 = "……しょ、衝撃来るよ！！しっかり掴まって！！"
103130-173 = "バリア、突破！！！アヤネさん、緊急制御を！"
103130-174 = "はい！緊急制御シーケンス、稼働！！"
103130-183 = "「ウトナピシュティムの本船」、逆推力装置を稼働！#nエンジンへの過負荷に注意して！"
103130-184 = "まもなく、箱舟本体と衝突します！！#nみなさん、さらなる衝撃に備えてください！！"
103130-185 = "は、箱舟の外壁と衝突！！"
103130-202 = "……。"
103130-203 = "はぁ……はぁ…… "
103130-204 = "せ、成功したの……？"
103130-205 = "そ、そうみたいです……。"
103130-206 = "ここが……箱舟の中？"
103130-207 = "……はい。#nようやく……内部に侵入できました。"
103130-208 = "[s] \"よかった……大成功だね。\""
103130-210 = "はぁ……寿命が縮みました……。"
103130-211 = "まさか、本当にこんなやり方で成功するとはね……。"
103130-212 = "はぁぁ……脚に力が入りません……。"
103130-214 = "本当に、箱舟を対処しきるだなんて……#nこのような方法で乗り切れるとは、想像もしておりませんでした。 "
103130-215 = "そうね……本当に、アリスが世界を救ったわ。"
103130-217 = "……いいえ。アリスならこう答えるでしょう――"
103130-218 = "「仲間がいたから、やり遂げられた」、と。"
103130-219 = "……。"
103130-220 = "正確には……リオ、あなたがいたから。#nあなたの発想があったから、と。 "
103130-221 = "超天才美少女の私でさえも、あのような発想はできなかったと思います。"
103130-222 = "……ヒマリ、私は――"
103130-223 = "……今はまだ、ですが。#nもしも――私たちが世界を救うことに成功したのであれば、"
103130-224 = "それはきっと、リオ――あなたのおかげでしょう。"
103130-225 = "[s] \"そうだよ。リオが世界を救ったんだ。\""
103130-227 = "私は……"
103130-228 = "………… "
103130-229 = "……。"
103130-233 = "リオ……？"
103130-249 = "王女……。"
103130-250 = "さようなら、ケイ……"
103130-251 = "これでアリスは……"
103130-253 = "ごめんなさい……アリスに、教えて、くれたのに……。"
103130-273 = "……王女よ。 "
103130-274 = "あなたは……その力を使えば、自らが危険に晒されると分かっていて……"
103130-275 = "……"
103130-276 = "自身の存在が消えるかも――命を落とすかも、しれないというのに……"
103130-279 = "私を――皆を救うためであれば、死をも恐れないのでしょうか。 "
103130-280 = "それが、あなたの勇気……それが、「勇者」なのでしょうか。"
103130-283 = "……いいえ。あなたは消えてはなりません。#n私はそれを拒否します。"
103130-284 = "……心配しないでください、あなたは消えません……私がそれをさせません。"
103130-287 = "消えるべき存在は、勇者ではなく――世界を滅ぼす「道具」であるべきなのですから。 "
103130-288 = "それが正しいのです。#nですから――"
103130-291 = "――これで、大丈夫です。 "
103130-293 = "……それと、"
103130-294 = "私に、謝らないでください――アリス。"
103130-302 = "ケイ……。"
103130-309 = "アリス……夢を見てるのかな？#n優しい顔をしてる。"
103130-310 = "……。"
103130-311 = "あれ……？い、今アリスちゃんが何か言ってたような……"
103130-312 = "あ、アリスちゃん？#n「ケ」……？"
103130-313 = "アリス……？#n泣いてるの……？"
103130-323 = "次回;突入"
