[translation]
13060-1 = "第6話;契約書"
13060-3 = "ユメ先輩がサインした、契約書……？"
13060-4 = "アビドス生徒会が、砂漠横断鉄道における関連施設の使用権を#nネフティスから買い入れるという契約です。"
13060-6 = "ネフティスから……。"
13060-8 = "……自治区の力が弱まれば、当然ながら権利を売るしかなくなりますよね？"
13060-9 = "この鉄道は元より、アビドス生徒会とネフティスの共同プロジェクト。#n本来の受注者である前者がその権利を有していましたが、#n資金難によりネフティスへと売却したのです。"
13060-10 = "前生徒会長としては、それを買い戻す算段だったのでしょう。"
13060-11 = "そう、これはその契約書です。"
13060-13 = "……ち、ちょっと貸してもらえる？"
13060-15 = "売主「セイント・ネフティス」と買主「アビドス生徒会」は……#n砂漠横断鉄道の施設使用権を100万円で売り渡し……#n乙は契約金の一部として1万円を即時に支払うことを約束する。"
13060-16 = "本契約の締結後、2年以内に残金を全て支払い……"
13060-17 = "乙が本契約に基づく支払いの遅延をした場合、#n乙は甲に対して遅延損害金を……"
13060-18 = "……アビドス生徒会長、[ruby=くちなし]梔子[/ruby]ユメ。"
13060-19 = "……。"
13060-22 = "……ユメ先輩の字だ。"
13060-23 = "忘れるわけない……これは、先輩の……"
13060-24 = "仰った通り、アビドス生徒会が砂漠横断鉄道の施設使用権を、#nネフティスから100万円で買収すると書かれています。"
13060-25 = "い、いつの間にこんなものを……私が知らない間に……"
13060-26 = "……ユメ先輩が残したものは、全部集めたはずなのに。#nメモの一枚、小さなゴミまで……"
13060-27 = "でも、こんな契約書の話、聞いたこともない……"
13060-29 = "恐らく……契約が完了していないので、伝えなかったのではないでしょうか？"
13060-33 = "なにせ、まだ支払いが済んでいないのですから。"
13060-34 = "まだ契約は有効、ということですか……？"
13060-35 = "ええ。契約金の支払いまでは確認できましたが、#nまだ残金が納められておりません。"
13060-36 = "その後、契約の存在自体が忘れ去られて今に至ります。#n担当者が退社した際に、引き継ぎが行なわれなかったのかと。"
13060-37 = "そしてこの度、倉庫の整理をしていたところで「偶然」発見された次第です。"
13060-39 = "偶然……？"
13060-40 = "[s] \"偶然、ですか。\""
13060-41 = "ん……"
13060-43 = "私どもとしても、悩ましい状況なのですよ。"
13060-44 = "この契約の影響で、我々は砂漠横断鉄道の権利を得たと思いきや、#n関連施設の使用権は売買中のため手がつけられません。"
13060-45 = "これさえ見つからなければ……"
13060-47 = "そ、それで……？"
13060-48 = "そこで皆さんには、「この契約を保持する意志があるのか」を確認していただきたいのです。"
13060-49 = "……ええと。#nそれを聞くために、ここまで……？"
13060-51 = "私どもにとっては、それだけ重要な問題なのです。"
13060-52 = "この件さえ解決できれば我々は、二日後に開かれる債権者団体の総会で、砂漠横断鉄道の持ち分を主張できます。"
13060-53 = "債権者団体の、総会……？"
13060-54 = "どうせ、借金取りの集会のことでしょ。"
13060-55 = "物は言いようですね。#n私募ファンドに出資した投資家が集まる場のことですよ。"
13060-56 = "あらためてお聞きします、小鳥遊ホシノさん。#n残金を支払い、この権利を購入する意志はありますか？"
13060-58 = "……。"
13060-59 = "いや、急にそんなこと言われても……"
13060-60 = "今さらこの権利を買ったところで……"
13060-61 = "それに、借金をわざわざ増やすなんて……"
13060-62 = "ええ、ええ。#nこんな権利に100万も払う価値ありませんよね？"
13060-63 = "すでに抱えている借金の返済だけで大変でしょうから。"
13060-64 = "では、この契約は破棄するということでよろしいですね？"
13060-66 = "ホシノさん、ここにサインを。"
13060-67 = "ち、ちょっと待ってもらえる？#nそんなに急かされても、おじさん困っちゃうよ。"
13060-69 = "[ns] \"少し、考える時間をもらえませんか？\""
13060-71 = "ん？"
13060-72 = "[s1] \"この子たちにとって、急な話でしたから。\"\n[s2] \"……それとも、何かこの場でサインさせたい理由が？\""
13060-75 = "ふむ……"
13060-76 = "そう来ましたか……"
13060-77 = "やはり、焦りすぎたのでは……？"
13060-78 = "落ち着きましょう。#nどうせ二日後には無効になる契約です。"
13060-80 = "二日後……？"
13060-85 = "日付をご覧ください。#n契約書が交わされたのは、二年前の二日後。#nその日になれば、契約は自動的に無効になるのです。"
13060-86 = "この件は早めに解決しておきたかったのですが……"
13060-87 = "……仕方ありません。"
13060-88 = "二日後の正午に、アビドス中央駅旧庁舎で総会が開かれます。"
13060-89 = "もし、この契約を維持したいとお考えであれば、#n会場までお越しください。"
13060-90 = "――それが可能ならば、ですが。"
13060-91 = "……？"
13060-95 = "可能なら、というのは……"
13060-96 = "……。"
13060-98 = "少しでも遅れたら、その時点で契約は無効になりますので。"
13060-99 = "私どもからお伝えする内容は以上となります。"
13060-100 = "質問は……無いようですね。"
13060-101 = "では、そろそろ出るとしましょうか。"
13060-110 = "……？"
13060-111 = "何をしているのですか、監督官。#n帰りの案内を。"
13060-112 = "……失礼する。"
13060-117 = "うーん……。"
13060-118 = "……。"
13060-119 = "えっと、話をまとめると……"
13060-121 = "いやいやいや！#nまとめるまでもなく怪しいわよ！"
13060-122 = "セリカちゃん……！？"
13060-123 = "急に借金取りが現れたと思ったら、昔の契約をどうするか決めてほしいだなんて！"
13060-124 = "忘れられた契約書、中身は誰も見向きしない施設の使用権……#nそれも、二日後には自動的に切れる契約を今になってわざわざ……"
13060-125 = "絶対裏があるに決まってるわよ！"
13060-129 = "……シロコ先輩、それどういう意味の視線？"
13060-130 = "ううん、私も同意。#nセリカが怪しいって思うくらいだから、絶対に何かあるはず。"
13060-131 = "そうよね……って、何かその言い方引っかかるんだけど。"
13060-132 = "[s] \"まずは砂漠横断鉄道について調べてみようか。\""
13060-133 = "……はい、私も気になります。#nあの失敗した事業に、どんな秘密が隠されてるのか……"
13060-134 = "[s3] \"慎重に事を進めた方が良さそうだね。\"\n[s4] \"まだ時間は残されてる。\""
13060-135 = "……ホシノ先輩。"
13060-136 = "……ホシノ先輩。"
13060-137 = "この問題の鍵は、二年前の生徒会長……#n梔子ユメさんにあるような気がしています。"
13060-141 = "ですが私たちは……当時のアビドスで、何が起こったのか知りません。"
13060-142 = "あ、アヤネちゃん……？"
13060-143 = "……ホシノ先輩、教えていただけますか。#n「アビドス生徒会」のこと。"
13060-144 = "ノノミ先輩も、何か知っているんですよね？"
13060-146 = "そ、それは……"
13060-148 = "……この教室は元々、生徒会室として使われていたわけではありませんよね。#n学園祭事務局の教室だったはずです。"
13060-149 = "……何故かひとつだけ施錠されている、一階の教室。"
13060-150 = "そこが、本来の生徒会室ですよね。#nどうして鍵が……？"
13060-151 = "ん、私も気になる。#nどうして前の生徒会長は、借金を増やすような契約をしたの？"
13060-152 = "え？#nシロコ先輩も知らないの？"
13060-153 = "ん……詳しく聞いたことはなかった。"
13060-154 = "たしかシロコ先輩は、あとから先輩たちに捕獲されたんだっけ。"
13060-155 = "捕獲されたわけじゃ……"
13060-157 = "ま、待ってください。#nホシノ先輩も困って……"
13060-158 = "……大丈夫だよ、ノノミちゃん。"
13060-162 = "生徒会長は……ユメ先輩は、色々と問題を起こしてばっかりの人で……"
13060-163 = "……簡単に言うと、すぐ騙されちゃうタイプだったんだ。#nそれで、いつもトラブルに巻き込まれてた。"
13060-164 = "そ、そうなんだ……#nよく卒業できたわね、その先輩。"
13060-165 = "……卒業、できなかったよ。"
13060-170 = "――ユメ先輩は、卒業前に失踪したから。"
13060-171 = "……！！"
13060-172 = "失踪……？"
13060-176 = "し、失踪！？#nどういうこと！？"
13060-178 = "突然行方不明になって……それから33日後に、アビドス砂漠で発見された。"
13060-179 = "ヘイローが破壊された状態で……"
13060-180 = "それは……。"
13060-181 = "何があったの！？"
13060-182 = "……「事故」だったみたい。#n砂漠で遭難して……"
13060-183 = "事故って何よ！？どういうこと！？"
13060-184 = "……私も、詳しくは知らない。"
13060-185 = "え！？"
13060-186 = "どうして？#n先輩は、副生徒会長だったんだよね？"
13060-187 = "それは……"
13060-188 = "……ユメ先輩が失踪する3日前から、私は先輩の行方を知らなかった。"
13060-189 = "先輩が失踪したってことも、後から知った。"
13060-190 = "どうして遭難したのか……"
13060-191 = "そもそも、何で砂漠に行ったのか……"
13060-192 = "何を考えてたのか……"
13060-193 = "どれだけ先輩の足跡を追っても……#n結局、分からなかった。"
13060-194 = "きっと、あの手帳には書いてあったはずなんだ。"
13060-195 = "手帳……？"
13060-196 = "ユメ先輩は何かがあると、絶対手帳に記録しててさ。"
13060-202 = "……私の知らない先輩が、今になって見つかるなんて。"
13060-203 = "それも、おかしな部分は一つや二つじゃない。#n契約が中途半端なのもそう。"
13060-204 = "契約書を交わしてから2年も経ったのに、どうして今になって……"
13060-205 = "…………。"
13060-206 = "…………あ。"
13060-207 = "……？"
13060-208 = "この日付、は……"
13060-209 = "ほ、ホシノ先輩……！？"
13060-211 = "いつもありがとう、ホシノちゃん！！#nお元気でね！"
13060-221 = "ほ、ホシノ先輩！？"
13060-222 = "だ、大丈夫？"
13060-226 = "契約書が、交わされた日……"
13060-227 = "これ……"
13060-228 = "ユメ先輩が――失踪した日だ。"
13060-229 = "……！！"
13060-235 = "こんな砂漠のド真ん中に、また大勢の人が集まるわけないでしょう！？#n夢物語もいい加減にしてください！"
13060-239 = "こんなもの要りません！#nやるなら先輩一人でやってください！"
13060-243 = "もう付き合ってられません！#n生徒会は終わりです！"
13060-254 = "[ns] \"ホシノ！？\""
13060-255 = "ほ、ホシノ先輩！#nどこ行くの！？"
13060-256 = "私が行く！"
13060-265 = "シロコちゃん……！"
13060-266 = "ど、どうしよう。#n私たちも追いかけたほうが……"
13060-267 = "でもホシノ先輩に追いつけるのなんて、シロコ先輩くらいだし……。"
13060-268 = "そ、それはそうですが……でも……"
13060-269 = "その……ユメ会長が失踪した日と書類の日付が同じってことは……"
13060-270 = "……おそらく、そうでしょう。"
13060-275 = "ユメ会長は、この契約書を交わした後に……"
13060-277 = "……失踪、した？"
13060-283 = "次回;肉体の限界"
