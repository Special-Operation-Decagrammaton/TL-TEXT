[translation]
13060-1 = "Episódio 6: O Contrato"
13060-3 = "Um contrato... assinado pela Sempai Yume?"
13060-4 = "É um contrato onde o Conselho Estudantil de Abydos compra da #nNephthys o direito de uso das instalações relacionadas à Ferrovia Trans-Deserto."
13060-6 = "Da Nephthys..."
13060-8 = "...Se o poder do distrito autônomo enfraquece, é natural que não restem opções além de vender os direitos, não é?"
13060-9 = "Esta ferrovia era originalmente um projeto conjunto entre o Conselho Estudantil de Abydos e a Nephthys. #nComo a primeira era a contratante original, ela detinha os direitos, mas devido a dificuldades financeiras, vendeu-os para a Nephthys."
13060-10 = "Como ex-presidente do conselho, ela provavelmente planejava recomprá-los."
13060-11 = "Sim, este é o contrato para isso."
13060-13 = "...P-pode me emprestar um pouco?"
13060-15 = "O vendedor 'Saint Nephthys' e o comprador 'Conselho Estudantil de Abydos'... #nvendem o direito de uso das instalações da Ferrovia Trans-Deserto por 1 milhão de ienes... #ne a segunda parte promete pagar 10 mil ienes imediatamente como parte do valor do contrato."
13060-16 = "Após a assinatura deste contrato, o saldo restante deverá ser pago integralmente dentro de 2 anos..."
13060-17 = "Caso a segunda parte atrase o pagamento com base neste contrato, #na segunda parte deverá pagar à primeira parte juros de mora..."
13060-18 = "...Presidente do Conselho Estudantil de Abydos, Yume Kuchinashi."
13060-19 = "..."
13060-22 = "...É a letra da Sempai Yume."
13060-23 = "Eu nunca esqueceria... Isso é da Sempai..."
13060-24 = "Como eu disse, está escrito que o Conselho Estudantil de Abydos compraria o direito de uso das instalações da Ferrovia Trans-Deserto da #nNephthys por 1 milhão de ienes."
13060-25 = "Q-quando ela fez isso... sem que eu soubesse..."
13060-26 = "...Eu deveria ter reunido tudo o que a Sempai Yume deixou. #nAté o último bilhete, até o menor pedaço de lixo..."
13060-27 = "Mas eu nunca ouvi falar desse contrato..."
13060-29 = "Provavelmente... como o contrato não foi concluído, ela não chegou a contar, não é?"
13060-33 = "Afinal, o pagamento ainda não foi finalizado."
13060-34 = "Quer dizer que o contrato ainda é válido...?"
13060-35 = "Sim. Confirmamos o pagamento da entrada, mas #no saldo restante ainda não foi quitado."
13060-36 = "Depois disso, a existência do contrato foi esquecida até hoje. #nProvavelmente não houve uma passagem de bastão quando o responsável saiu da empresa."
13060-37 = "E agora, enquanto organizávamos o depósito, ele foi encontrado por 'acaso'."
13060-39 = "Por acaso...?"
13060-40 = "[s] \"Por acaso, é?\""
13060-41 = "Hmm..."
13060-43 = "Para nós, também é uma situação problemática."
13060-44 = "Por causa deste contrato, embora pensemos que adquirimos os direitos da Ferrovia Trans-Deserto, #no direito de uso das instalações relacionadas não pode ser tocado por estar em processo de compra e venda."
13060-45 = "Se isso não tivesse sido encontrado..."
13060-47 = "E-então...?"
13060-48 = "Por isso, queremos confirmar se vocês têm a intenção de manter este contrato."
13060-49 = "...Bem. #nVocês vieram até aqui só para perguntar isso...?"
13060-51 = "Para nós, é um problema importante."
13060-52 = "Se resolvermos isso, poderemos reivindicar nossa parte na Ferrovia Trans-Deserto na assembleia de credores que acontecerá daqui a dois dias."
13060-53 = "Assembleia de credores...?"
13060-54 = "No fim das contas, é só uma reunião de cobradores de dívidas, né?"
13060-55 = "Que maneira de falar. #nÉ um local onde se reúnem os investidores que aplicaram em fundos privados."
13060-56 = "Pergunto novamente, Takanashi Hoshino. #nVocê tem a intenção de pagar o saldo restante e adquirir este direito?"
13060-58 = "..."
13060-59 = "Não, mesmo que me perguntem isso de repente..."
13060-60 = "Comprar esse direito agora..."
13060-61 = "Além disso, aumentar a dívida de propósito..."
13060-62 = "Sim, sim. #nNão vale a pena pagar 1 milhão por um direito desses, certo?"
13060-63 = "Já deve ser difícil o suficiente pagar as dívidas que vocês já têm."
13060-64 = "Então, podemos considerar este contrato como cancelado?"
13060-66 = "Hoshino-san, assine aqui."
13060-67 = "E-espera um pouco, pode ser? #nMesmo que me pressione assim, o tio aqui fica sem saber o que fazer."
13060-69 = "[ns] \"Poderia nos dar um tempo para pensar?\""
13060-71 = "Hm?"
13060-72 = "[s1] \"Para elas, isso foi algo muito repentino.\"\n[s2] \"...Ou será que você tem algum motivo para querer que assinem aqui agora?\""
13060-75 = "Hum..."
13060-76 = "Então é assim que as coisas são..."
13060-77 = "Como eu suspeitava, será que não estamos sendo apressados demais...?"
13060-78 = "Vamos nos acalmar. #nDe qualquer forma, é um contrato que perderá a validade em dois dias."
13060-80 = "Em dois dias...?"
13060-85 = "Por favor, observem a data. #nO contrato foi firmado há dois anos, dois dias atrás. #nQuando esse dia chegar, o contrato será automaticamente invalidado."
13060-86 = "Eu queria ter resolvido isso mais cedo, mas..."
13060-87 = "...Não há o que fazer."
13060-88 = "Daqui a dois dias, ao meio-dia, uma assembleia geral será realizada no antigo prédio administrativo da Estação Central de Abydos."
13060-89 = "Se vocês pretendem manter este contrato, #npor favor, compareçam ao local."
13060-90 = "――Isso se for possível, é claro."
13060-91 = "...?"
13060-95 = "O que quer dizer com 'se for possível'..."
13060-96 = "..."
13060-98 = "Se chegarem com qualquer atraso, o contrato será invalidado naquele exato momento."
13060-99 = "Isso é tudo o que tínhamos para informar."
13060-100 = "Parece que não há... perguntas."
13060-101 = "Bem, então acho que já podemos ir."
13060-110 = "...?"
13060-111 = "O que está fazendo, supervisor? #nNos guie para a saída."
13060-112 = "...Com licença."
13060-117 = "Hmm..."
13060-118 = "..."
13060-119 = "Bem, resumindo a situação..."
13060-121 = "Não, não, não! #nNem precisa resumir, isso já está suspeito demais!"
13060-122 = "Serika-chan...!?"
13060-123 = "Do nada, cobradores de dívidas aparecem e querem que a gente decida o que fazer com um contrato antigo!"
13060-124 = "Um contrato esquecido, sobre o direito de uso de uma instalação que ninguém se importa... #ne ainda por cima, um contrato que expira automaticamente em dois dias, vindo à tona justamente agora..."
13060-125 = "Com certeza tem algo por trás disso!"
13060-129 = "...Shiroko-senpai, o que significa esse seu olhar?"
13060-130 = "Nada, eu concordo. #nSe até a Serika acha suspeito, com certeza tem algo errado."
13060-131 = "É verdade... mas esse seu jeito de falar me incomoda um pouco."
13060-132 = "[s] \"Primeiro, vamos investigar sobre a Ferrovia Trans-Deserto.\""
13060-133 = "...Sim, eu também estou curiosa. #nQue tipo de segredo está escondido naquele projeto fracassado..."
13060-134 = "[s3] \"É melhor prosseguirmos com cautela.\"\n[s4] \"Ainda temos tempo.\""
13060-135 = "...Hoshino-senpai."
13060-136 = "...Hoshino-senpai."
13060-137 = "Sinto que a chave para este problema está na presidente do conselho estudantil de dois anos atrás... #na Yume-san."
13060-141 = "Mas nós... não sabemos o que aconteceu em Abydos naquela época."
13060-142 = "A-Ayane-chan...?"
13060-143 = "...Hoshino-senpai, poderia nos contar? #nSobre o 'Conselho Estudantil de Abydos'."
13060-144 = "Nonomi-senpai também sabe de algo, não sabe?"
13060-146 = "I-Isso é..."
13060-148 = "...Esta sala não era usada originalmente como a sala do conselho estudantil, certo? #nDeveria ser a sala do comitê do festival escolar."
13060-149 = "...A sala no primeiro andar que, por algum motivo, está sempre trancada."
13060-150 = "Aquela é a verdadeira sala do conselho estudantil, não é? #nPor que a chave está..."
13060-151 = "Hum, eu também estou curiosa. #nPor que a presidente anterior fez um contrato que só aumentaria as dívidas?"
13060-152 = "Hã?#nA Shiroko-senpai também não sabe?"
13060-153 = "Hmm... Eu nunca ouvi os detalhes."
13060-154 = "Se bem me lembro, a Shiroko-senpai foi capturada pelos veteranos depois, não foi?"
13060-155 = "Não foi bem uma captura..."
13060-157 = "E-espere um pouco.#nA Hoshino-senpai também está ficando perturbada..."
13060-158 = "...Está tudo bem, Nonomi-chan."
13060-162 = "A presidente do conselho estudantil... a Yume-senpai, era alguém que só causava problemas..."
13060-163 = "...Para dizer de forma simples, ela era do tipo que se deixava enganar facilmente.#nPor causa disso, ela sempre acabava envolvida em confusões."
13060-164 = "S-sério isso...#nComo ela conseguiu se formar, sendo assim?"
13060-165 = "...Ela não conseguiu se formar."
13060-170 = "――A Yume-senpai desapareceu antes da formatura."
13060-171 = "...!!"
13060-172 = "Desapareceu...?"
13060-176 = "De-desapareceu!?#nO que você quer dizer com isso!?"
13060-178 = "Ela sumiu de repente... e 33 dias depois, foi encontrada no deserto de Abydos."
13060-179 = "Com o seu halo destruído..."
13060-180 = "Isso é..."
13060-181 = "O que aconteceu!?"
13060-182 = "...Parece que foi um \"acidente\".#nEla se perdeu no deserto..."
13060-183 = "Que acidente o quê!? O que você está dizendo!?"
13060-184 = "...Eu também não sei os detalhes."
13060-185 = "Hã!?"
13060-186 = "Por quê?#nVocê era a vice-presidente do conselho estudantil, não era?"
13060-187 = "Isso é..."
13060-188 = "...Eu não sabia do paradeiro da Yume-senpai desde três dias antes dela desaparecer."
13060-189 = "Eu só soube que ela tinha desaparecido depois."
13060-190 = "Por que ela se perdeu..."
13060-191 = "Para começar, por que ela foi ao deserto..."
13060-192 = "O que ela estava pensando..."
13060-193 = "Não importa o quanto eu seguisse os passos dela...#nNo fim, eu não descobri nada."
13060-194 = "Com certeza, deveria estar escrito naquele caderno."
13060-195 = "Caderno...?"
13060-196 = "A Yume-senpai sempre anotava tudo no caderno quando algo acontecia."
13060-202 = "...Eu não esperava encontrar uma parte da senpai que eu desconhecia agora."
13060-203 = "E não é só uma ou duas coisas estranhas.#nO fato de o contrato estar incompleto também é uma delas."
13060-204 = "Já se passaram dois anos desde que o contrato foi assinado, por que só agora..."
13060-205 = "............"
13060-206 = "............Ah."
13060-207 = "...?"
13060-208 = "Esta data, é..."
13060-209 = "Ho-Hoshino-senpai...!?"
13060-211 = "Obrigada por tudo, Hoshino-chan!!#nFique bem!"
13060-221 = "Ho-Hoshino-senpai!?"
13060-222 = "Vo-você está bem?"
13060-226 = "O dia em que o contrato foi assinado..."
13060-227 = "Isso..."
13060-228 = "É o dia em que a Yume-senpai――desapareceu."
13060-229 = "...!!"
13060-235 = "Não tem como um monte de gente se reunir no meio desse deserto de novo, tem!?#nChega de contos de fadas!"
13060-239 = "Eu não preciso disso!#nSe quiser fazer, faça você mesma, senpai!"
13060-243 = "Eu não aguento mais isso!#nO conselho estudantil acabou!"
13060-254 = "[ns] \"Hoshino!?\""
13060-255 = "Ho, Hoshino-senpai!#nAonde você vai!?"
13060-256 = "Eu vou atrás dela!"
13060-265 = "Shiroko-chan...!"
13060-266 = "O, o que a gente faz?#nSerá que deveríamos ir atrás também..."
13060-267 = "Mas a única que conseguiria alcançar a Hoshino-senpai é a Shiroko-senpai..."
13060-268 = "Is, isso é verdade, mas... mesmo assim..."
13060-269 = "Tipo... o fato de a data do documento ser a mesma do dia em que a presidente Yume desapareceu..."
13060-270 = "...Provavelmente, é isso mesmo."
13060-275 = "A presidente Yume, depois de assinar este contrato..."
13060-277 = "...Desapareceu?"
13060-283 = "Próximo episódio: O Limite do Corpo"
