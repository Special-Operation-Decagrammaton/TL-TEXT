[translation]
1010703-1 = "書記の取材生活"
1010703-2 = "（チアキからのモモトークから間もなく……）"
1010703-7 = "やっほ！こんにちは、先生～！"
1010703-8 = "プレゼント持ってきましたよ！"
1010703-9 = "どうですか？超ワクワクしてきません～？"
1010703-10 = "[s] \"お、おはよぉ……チアキ……。\""
1010703-11 = "げっ！？大丈夫ですか、先生？"
1010703-12 = "すごく体調悪そうですね……風邪ですか？"
1010703-16 = "え？仕事が多すぎて徹夜してた……？"
1010703-17 = "でしたら……ちょうどいいですね！"
1010703-18 = "[s] \"う、うん？\""
1010703-19 = "それはなんと～ぉ！じゃじゃーん！"
1010703-20 = "「週刊万魔殿」の定期購読記念プレゼント！"
1010703-21 = "封筒の中にありますので、開けてみてください！"
1010703-22 = "[s] 封筒を開ける。"
1010703-24 = "[ns] \"これは……？\""
1010703-25 = "はい！スイーツビュッフェの利用券2枚です！"
1010703-26 = "疲れた時には、やっぱり甘～いスイーツ！"
1010703-27 = "私も編集作業が行き詰まった時なんかは、よく利用してます！"
1010703-28 = "なので、今の先生にぴったりなプレゼントかと！"
1010703-29 = "[s] \"チアキ……ありがとう！\""
1010703-30 = "はいっ、どういたしまして～！"
1010703-31 = "休憩するのは大事ですからね。"
1010703-32 = "というわけで、今すぐ使っちゃいましょうか？"
1010703-33 = "[s] \"でも、まだ仕事が……。\""
1010703-34 = "もう！疲れてる時は仕事の効率も下がっちゃいますよ～！"
1010703-35 = "時には立ち止まって、休憩するのも大事です！"
1010703-36 = "ちょっとだけ！ね？ちょっとだけ～！"
1010703-37 = "[s] \"じゃ、じゃあそうしようかな？\""
1010703-38 = "はい！しちゃいましょう～！"
1010703-39 = "ではでは、お店までご案内しますね～！"
1010703-41 = "わぁ！美味しそうなスイーツがいっぱい！"
1010703-42 = "早く入りましょう、先生！"
1010703-43 = "いらっしゃいませ！2名様ですね？"
1010703-44 = "はい～！"
1010703-46 = "[ns] \"こちら、利用券です。\""
1010703-47 = "ありがとうございます！"
1010703-48 = "席までご案内いたしますね。"
1010703-51 = "……ご利用に関する説明は以上となります。#n他に気になるところはございますか？"
1010703-52 = "いえ、ありませ……あ！"
1010703-53 = "もしよかったら……ここのスイーツ、記事にしてもいいですか？"
1010703-54 = "お店の雰囲気も素敵ですし、種類も豊富で超気に入ってるんです！"
1010703-55 = "ぜひ、「週刊万魔殿」に載せたいと思っているんですが……！"
1010703-56 = "どうぞご遠慮なく。当店としては大歓迎です。"
1010703-57 = "わあ！ありがとうございます！"
1010703-58 = "では、ごゆっくりどうぞ。"
1010703-62 = "これで次の特集も準備万端ですね！"
1010703-63 = "いやぁ～まさかスイーツカフェでネタを思いつくなんて！#nこれも書記兼、記者兼、編集長兼、発行人のヒラメキってやつですかね～"
1010703-64 = "しかもこのお店、スイーツが100種類もあるらしいですよ！#n一つひとつ味見して、そのレビューを記事にしたら……！"
1010703-65 = "「週刊万魔殿」がベストセラーになること、間違いなしですね！"
1010703-66 = "[s] \"100種類、全部食べられるの？\""
1010703-70 = "はっ！そうでした！私、マカロン5つが限界なのに！？"
1010703-71 = "うぅ……どうしよう……。"
1010703-72 = "え、えっと……先生、もしよかったら、その……"
1010703-73 = "[s1] \"いいよ。私も手伝うね。\"\n[s2] \"食べて感想を言えばいいんだね？\""
1010703-76 = "うぅ、ありがとうございますぅ……。"
1010703-77 = "なるべく味が被らないようにしましょう……。"
1010703-80 = "さて、まずはマンゴータルトの写真から……。"
1010703-84 = "先生、あーんしてみてください！"
1010703-85 = "[ns3] \"あーん。\"\n[ns4] 手で受け取る。"
1010703-88 = "おお、いいですね！"
1010703-89 = "マンゴータルトですよ～"
1010703-96 = "どうですか、お味は？"
1010703-97 = "[s] \"うーん……甘くて……。\""
1010703-98 = "甘くて？"
1010703-99 = "[s] \"美味しい！\""
1010703-100 = "さっきのチェリークッキーと同じですよ？"
1010703-101 = "まだ10個目なのに……。"
1010703-102 = "やっぱり、100種類全部を味見するのって無謀でしたかね……？"
1010703-103 = "[s] \"胃のキャパ的に厳しいんじゃないかな……。\""
1010703-104 = "うぅ……目玉特集の予定だったのにぃ……。"
1010703-108 = "……あ！"
1010703-109 = "でしたら、他のお客さんに聞けばいいんですよね！"
1010703-110 = "これだけの人数がいるなら、きっといけると思います！"
1010703-111 = "[s] \"うん、それは良さそうだね。\""
1010703-115 = "あ、ちょうどあちらに二人組のお客さんが！"
1010703-120 = "[ns] \"大丈夫かな……。\""
1010703-123 = "レビューしてくれる人は、多ければ多いほど良いんですから！"
1010703-124 = "さっそく頼んでみますね！"
1010703-129 = "こんにちは～！"
1010703-130 = "あぁん？なんだ？"
1010703-131 = "「週刊万魔殿」の取材なんですけど、いくつかお聞きしてもいいですか？"
1010703-132 = "今スイーツ食ってる最中なんだけど？"
1010703-133 = "はい！だからぜひ取材のご協力をお願いしたく！"
1010703-134 = "は、はぁ？"
1010703-135 = "このパフェ、どんな味なのかご感想をお聞かせください～！"
1010703-136 = "え、ああ……甘いな。"
1010703-137 = "なるほど！"
1010703-138 = "どんな風に甘く感じましたか？#nチョコレートみたいな？それともパイナップルみたいな？"
1010703-139 = "えっ？違いとかあんの？"
1010703-140 = "もちろんありますよ！チョコレートは舌の上を滑るような甘味で、パイナップルは口の中をパンチするような一撃があります！"
1010703-141 = "そ、そう言われたら、なんとなく違いが分かるような……？"
1010703-142 = "でしょでしょ～！流石ですね！"
1010703-143 = "あ、こちらのクッキーはどんな味ですか？"
1010703-144 = "一口食べてみる？"
1010703-145 = "いいんですか？じゃあ、お言葉に甘えて……"
1010703-150 = "うわっ、辛っ！"
1010703-151 = "あははっ！ホットソースで作ったらしいよ。うちらもビックリしたんだから。"
1010703-152 = "ほれ、牛乳飲みな。"
1010703-156 = "うぅ、辛い……でも、いい体験になりました！これならいいネタになるかも～！"
1010703-157 = "ここのマカロン、美味しいからオススメだよ。"
1010703-161 = "[ns] （いつの間にか仲良くなってる……）"
1010703-167 = "いやぁ～もうこんな時間ですか。#n流石に100種類全部は無理でしたね！"
1010703-168 = "お腹いっぱい！スイーツで満腹になったの、初めてかもしれません～"
1010703-169 = "先生と皆さんのおかげで、取材も無事に終わりました！"
1010703-170 = "私一人だったら、絶対できませんでした。"
1010703-171 = "本当にありがとうございました！これで「週刊万魔殿」もより甘くなるでしょう！"
1010703-172 = "それに、新しい友達もできましたし、嬉しいですね～！"
1010703-173 = "[s] \"さっき取材してた子？\""
1010703-174 = "はい～！"
1010703-175 = "二人とも、「週刊万魔殿」を定期購読してくれるって！"
1010703-176 = "写真も一緒に撮っちゃいました！"
1010703-177 = "これです！"
1010703-181 = "あ、あれ？"
1010703-182 = "[s] \"写真……ブレてるね。\""
1010703-183 = "そう、ですね……記事に載せるスイーツの写真も全部……。"
1010703-184 = "ど、どうしよう……。"
1010703-185 = "……ま、仕方ないか！"
1010703-186 = "やり直し！今からもう一度取材してきます！"
1010703-187 = "[s] \"や、やり直し！？\""
1010703-188 = "はい！記事のために！そして「週刊万魔殿」のために！"
1010703-189 = "幸い、利用券はまだ残ってますので！"
1010703-190 = "それじゃ、行ってきますね～！"
