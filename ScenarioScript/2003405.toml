[translation]
2003405-1 = "Para dar as boas-vindas à sorte"
2003405-2 = "Você conhece o \"Udon de Ano Novo\"?"
2003405-3 = "[s] \"Não seria 'Soba de Ano Novo'?\""
2003405-4 = "Sim, é Udon de Ano Novo mesmo."
2003405-5 = "Dentre os muitos tipos de \"Udon de Ano Novo\", ouvi dizer que esse em específico é excepcional..."
2003405-6 = "Para ter cuidado com anúncios virais na internet, você diz? Fufu, é verdade, mas..."
2003405-7 = "Eu prefiro acreditar em uma avaliação 4 estrelas com 500 comentários do que em uma 5 estrelas com apenas 10 comentários★"
2003405-8 = "A avaliação desse Udon de Ano Novo era... 4.3 estrelas com 872 comentários."
2003405-9 = "[s] \"Isso parece promissor!\""
2003405-10 = "Ah, um novo comentário foi postado."
2003405-11 = "\"O macarrão é um pouco mais grosso que o udon comum, é firme e macio\""
2003405-12 = "\"Simples, com um sabor que remete ao básico\""
2003405-13 = "\"O caldo é um pouco suave, mas vem com muitos temperos\""
2003405-14 = "\"Talvez por ser um amuleto de sorte para o ano novo... a combinação de oden rosa e camarão frito. O tempurá estava delicioso\""
2003405-15 = "[s1] \"Parece ter uma boa reputação.\"\n[s2] \"Onde vende?\""
2003405-18 = "Bem, dizem que fica em uma área de serviço um pouco longe daqui."
2003405-19 = "Mesmo indo de carro, leva cerca de 2 horas."
2003405-20 = "Ouvi dizer que, por ser um lugar remoto, não há nem trem direto para lá."
2003405-21 = "[s] \"Que problema, como vamos chegar lá?\""
2003405-22 = "Fufu..."
2003405-27 = "Então, eu peguei emprestado!"
2003405-28 = "[s3] \"...Hã...\"\n[s4] \"Você... 'pegou emprestado', né...?\""
2003405-31 = "Sim! Eu \"peguei emprestado\"★"
2003405-32 = "Assim que eu terminar o que preciso, vou devolver exatamente para o lugar de onde tirei, então não se preocupe★"
2003405-33 = "[s] \"Dá para chamar isso de pegar emprestado!?\""
2003405-37 = "Chegamos! É aquela área de serviço ali."
2003405-38 = "Hmm~ está meio entediante..."
2003405-39 = "...Talvez esteja faltando um pouco de emoção★"
2003405-40 = "[s] \"U-udon! Vamos comer o udon logo!\""
2003405-41 = "Fufu, não precisa ter tanta pressa. Você também estava ansioso, não é, Sensei?★"
2003405-42 = "Bem, de acordo com o mapa... é por aqui."
2003405-44 = "Aqui está! O seu Udon de Ano Novo!"
2003405-45 = "Itadakimasu."
2003405-46 = "[s] \"Itadakimasu~\""
2003405-51 = "Hum..."
2003405-52 = "..."
2003405-56 = "Está delicioso!"
2003405-57 = "[s] \"É diferente de qualquer udon que já comi!\""
2003405-58 = "Será porque serviram o caldo quente logo após colocar o macarrão frio?"
2003405-59 = "O macarrão está fresquinho e mantém a sua textura firme."
2003405-60 = "Como o macarrão é mais grosso que o normal, não deve ter sido fácil cozinhá-lo mantendo essa elasticidade."
2003405-61 = "E ainda assim, eles conseguiram... este lugar é autêntico."
2003405-62 = "O caldo suave realça ainda mais o sabor dos temperos e do macarrão... o oden e o camarão frito também são verdadeiras iguarias."
2003405-63 = "[s] \"A Akari de agora parece outra pessoa!\""
2003405-64 = "Fufu... afinal, eu também sou um membro do Clube de Pesquisa Gastronômica, sabe?"
2003405-65 = "Pessoalmente, prefiro pratos com bastante volume para comer à vontade, mas..."
2003405-66 = "Eu entendo o conceito de \"gastronomia\"."
2003405-67 = "...Claro que o caminho para me tornar a maior autoridade no assunto ainda é longo."
2003405-68 = "[s] \"Acho que a Akari está ótima do jeito que é.\""
2003405-69 = "Fufu, obrigada."
2003405-75 = "Mas, ainda assim..."
2003405-76 = "...sinto que essa quantidade não é o suficiente..."
2003405-77 = "[s] \"...Eu imaginei que diria isso.\""
2003405-78 = "Vocês dois também vieram para o tour do udon?"
2003405-79 = "Tour do udon?"
2003405-80 = "Esta região é famosa pelo udon... existem muitas lojas de udon operando por toda a área."
2003405-81 = "Pelo que ouvi, o número de lojas de udon é maior do que o de lojas de conveniência..."
2003405-82 = "...!"
2003405-83 = "Então, visitar as lojas mais conhecidas da região e aquelas escondidas que são verdadeiras joias..."
2003405-84 = "É chamado de \"tour do udon\"!"
2003405-85 = "I-isso mesmo. O site de turismo da região tem uma lista com as lojas de udon, então, se quiserem, podem dar uma olhada."
2003405-86 = "Que tour maravilhoso! ★"
2003405-87 = "Sensei, você ouviu, não ouviu?"
2003405-88 = "[s5] \"...Sim, eu ouvi.\"\n[s6] \"Acho que já sei qual será a próxima fala da Akari...\""
2003405-91 = "Vamos começar o tour do udon imediatamente!"
2003405-92 = "[s] \"Entendido...\""
2003405-94 = "(E assim, o tour do udon com a Akari começou)"
2003405-100 = "(...No meio do caminho, perdi a conta de quantas lojas visitamos e desisti de contar...)"
2003405-105 = "(Ao ver no site que um certificado de conclusão seria entregue para quem visitasse todas as lojas famosas da região, Akari...)"
2003405-106 = "(...ficou com os olhos ainda mais brilhantes e se dedicou totalmente ao tour do udon...!)"
2003405-109 = "[ns] \"Ei, Akari...\""
2003405-110 = "Sensei? Aconteceu alguma coisa?"
2003405-111 = "Fufu... você está perguntando se é realmente necessário completar todas as lojas de udon?"
2003405-112 = "..."
2003405-113 = "Você sabia, Sensei? Dizem que, se você não terminar de comer o toshikoshi soba, terá má sorte no ano novo."
2003405-114 = "[s] \"Essa história existe mesmo...?\""
2003405-115 = "Por isso, ao comer o macarrão da virada, é importante terminar pelo menos o macarrão completamente."
2003405-116 = "...Nós viemos comer o udon da virada agora."
2003405-117 = "Se deixarmos sobrar udon... isso significa que precisamos completar todas as lojas...!"
2003405-118 = "Não seria terrível se algo de ruim acontecesse no ano novo? ★"
2003405-119 = "[s] \"Isso não é só uma desculpa para comer udon à vontade!?\""
2003405-120 = "De jeito nenhum! ★ O que você pensa de mim? ★"
2003405-123 = "(O tour do udon com a Akari continuou até o anoitecer...)"
2003405-125 = "(Nós... finalmente...!)"
2003405-127 = "Conseguimos, Sensei! O certificado de conclusão do tour do udon!"
2003405-128 = "[s7] \"Você realmente completou tudo...\"\n[s8] \"Eu já esperava que isso fosse acontecer!\""
2003405-131 = "Aliás, já está tão tarde..."
2003405-136 = "...O que faremos, Sensei?"
2003405-137 = "Eu... não tenho muita confiança para dirigir à noite..."
2003405-142 = "(Depois disso, chamei um motorista particular para levar a Akari para casa)"
2003405-143 = "(A digestão de tanto udon foi difícil...)"
