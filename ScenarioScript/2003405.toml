[translation]
2003405-1 = "幸運を迎えるために"
2003405-2 = "「年越しうどん」をご存じですか？"
2003405-3 = "[s] \"「年越しそば」ではなく？\""
2003405-4 = "ええ、「年越しうどん」です。"
2003405-5 = "数ある「年越しうどん」の中でも、噂で聞いたそのうどんは格別らしく……"
2003405-6 = "ネットにはバイラル広告が多いから気をつけて、ですか？フフ、それはそうですが……。"
2003405-7 = "私はレビュー10件の星5より、レビュー500件の星4の評価を信じるほうなんです★"
2003405-8 = "その年越しうどんの評価は……星4.3にレビュー872件でした。"
2003405-9 = "[s] \"それは期待できそうだね！\""
2003405-10 = "あ、新しいレビューが投稿されてますね。"
2003405-11 = "「普通のうどんより麺が少し厚くて、ぷりぷりしてて、滑らか」"
2003405-12 = "「シンプルで、基本に立ち返った味」"
2003405-13 = "「スープは少し薄味だが、薬味がたっぷり」"
2003405-14 = "「新年の縁起物だからかな……ピンクのおでんとエビフライの組み合わせ。天ぷらが美味しかった」"
2003405-15 = "[s1] \"評判が良さそうだね。\"\n[s2] \"どこで売ってるの？\""
2003405-18 = "それが、ここからちょっと遠いサービスエリアだそうです。"
2003405-19 = "車で移動しても、2時間くらいはかかる場所で。"
2003405-20 = "辺鄙なところにあるせいか、直通鉄道も通ってないと聞きました。"
2003405-21 = "[s] \"困ったなぁ、どうやって行こう？\""
2003405-22 = "フフ……"
2003405-27 = "なので、借りてきました！"
2003405-28 = "[s3] \"……えっ……。\"\n[s4] \"これ……「借り」たんだよね……？ \""
2003405-31 = "はい！「借り」ましたよ★"
2003405-32 = "用事が済んだらちゃんと元の場所に戻しておきますので、心配しないでください★"
2003405-33 = "[s] \"それ借りたって言えるの！？\""
2003405-37 = "着きました！あのサービスエリアです。"
2003405-38 = "ん～なんか退屈ですね……"
2003405-39 = "……ちょっと、刺激が足りてないかもしれません★"
2003405-40 = "[s] \"う、うどん！早くうどんを食べよう！ \""
2003405-41 = "フフッ、そんなに急がなくても。先生も楽しみにされていたんですね★"
2003405-42 = "えーと、地図によりますと……こっちです。"
2003405-44 = "へいおまち！年越しうどんです！"
2003405-45 = "いただきます。"
2003405-46 = "[s] \"いただきます～\""
2003405-51 = "うん……"
2003405-52 = "……。"
2003405-56 = "美味しいですね！"
2003405-57 = "[s] \"これまで食べてきたうどんと、なんか違う！\""
2003405-58 = "冷たい麺に温かいスープを注いだ直後に出されたからでしょうか。"
2003405-59 = "麺がひんやりしていて、コシが保たれてます。"
2003405-60 = "普通のうどんより麺が太いので、弾力を維持したまま茹でるのは容易ではなかったはず。"
2003405-61 = "なのにそれを見事に成し遂げた……このお店は、本物ですね。"
2003405-62 = "薄味のスープが薬味と麺の味をさらに引き立てていて……おでんもエビフライも、なかなかの絶品です。"
2003405-63 = "[s] \"今のアカリ、別人みたい！\""
2003405-64 = "フフッ……一応私も、美食研究会の一員ですよ？"
2003405-65 = "個人的には、たくさん食べられるボリュームの多いものが好みですが……"
2003405-66 = "「美食」の概念なら、理解していますので。"
2003405-67 = "……もちろん[ruby=ナンバーワン]第一人者[/ruby]への道のりは、まだまだ遠いですけどね。"
2003405-68 = "[s] \"アカリはそのままでいいと思うよ。\""
2003405-69 = "フフ、ありがとうございます。"
2003405-75 = "でもやはり……"
2003405-76 = "……この量では物足りなく感じてしまいますね……。"
2003405-77 = "[s] \"……そうだろうと思った。\""
2003405-78 = "お二方も、うどんツアーに来られたんですか？"
2003405-79 = "うどんツアー？"
2003405-80 = "この辺はうどんが有名でして……地域全体でたくさんのうどん屋が営業されているんです。"
2003405-81 = "聞いたところによりますと、コンビニの数よりうどん屋の数のほうが多いとか……。"
2003405-82 = "……！"
2003405-83 = "地域内で特に名が知られている店や、隠れ名店を巡回することを……"
2003405-84 = "「うどんツアー」と呼ぶんですね！"
2003405-85 = "そ、そうです。地域の観光案内ホームページにうどん屋の紹介が載ってありますので、よろしければご覧になってください。"
2003405-86 = "そんな素敵なツアーがあったなんて★"
2003405-87 = "先生、聞きましたよね？"
2003405-88 = "[s5] \"……うん、聞いたよ。\"\n[s6] \"アカリの次のセリフ、分かるかも……。\""
2003405-91 = "早速、うどんツアーに行きましょう！"
2003405-92 = "[s] \"分かった……。\""
2003405-94 = "（そうして、アカリとのうどんツアーが始まった）"
2003405-100 = "（……途中から何軒目か分からなくなり、数えることを諦めた……）"
2003405-105 = "（地域内の有名店を制覇した人には認定証が贈呈されるというホームページの告知文をみたアカリは……）"
2003405-106 = "（さらに目を輝かせ、うどんツアーに没頭するのであった……！）"
2003405-109 = "[ns] \"ねえ、アカリ……。\""
2003405-110 = "先生？どうかされましたか？"
2003405-111 = "フフッ……うどん屋の制覇、やらないとダメなのか、ですか？"
2003405-112 = "……。"
2003405-113 = "ご存知ですか？先生。年越しそばは、食べ残すと不運が訪れるとされています。"
2003405-114 = "[s] \"そんな話、あったっけ……？\""
2003405-115 = "だから年越しそばを食べるときは、せめて麺だけでもきれいに食べ切ることが大事なんです。"
2003405-116 = "……私たちは今、年越しうどんを食べに来てます。"
2003405-117 = "うどんを残したら……つまり、すべてのうどんを制覇しなければ……！"
2003405-118 = "新年に何か、良くないことが起きてしまうのではないでしょうか★"
2003405-119 = "[s] \"思う存分うどんを食べたいがためのこじつけじゃ！？\""
2003405-120 = "まさか★私をなんだと思ってるんですか★"
2003405-123 = "（アカリとのうどんツアーは日が暮れるまで続き……）"
2003405-125 = "（私たちは……遂に……！）"
2003405-127 = "やりました、先生！うどん制覇認定証です！"
2003405-128 = "[s7] \"本当に制覇しちゃったね……。\"\n[s8] \"こうなると予想はしてたけど！\""
2003405-131 = "ところで、もうこんな時間に……"
2003405-136 = "……どうしましょう、先生？"
2003405-137 = "私……夜間運転は少し、自信がなくて……。"
2003405-142 = "（その後、運転代行を呼んでアカリを送り届けた）"
2003405-143 = "（うどんの消化は大変だった……）"
