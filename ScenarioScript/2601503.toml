[translation]
2601503-1 = "Garota Anônima"
2601503-4 = "Ah."
2601503-5 = "Sensei? O que está fazendo aqui a essa hora?"
2601503-6 = "……Não que eu possa falar muita coisa, mas…… haha."
2601503-7 = "Eu não estava conseguindo pegar no sono, sabe?"
2601503-8 = "Já que estou aqui, pensei em fazer uma caminhada noturna……."
2601503-9 = "Você também está com esse sentimento, Sensei?"
2601503-10 = "……Tive sorte, talvez."
2601503-11 = "Ah, nada, só falando sozinha."
2601503-12 = "Então, vamos nessa?"
2601503-18 = "……."
2601503-19 = "[s] \"Está preocupada com algo?\""
2601503-20 = "……Eh? Por que a pergunta de repente?"
2601503-21 = "Ah, não…… é que ninguém costuma me perguntar isso, então fiquei um pouco surpresa."
2601503-22 = "Eu não sou do tipo que fica preocupada com as coisas, sabe?"
2601503-23 = "Não é que eu nunca me preocupe, mas……."
2601503-24 = "Não é nada que valha a pena pedir conselhos."
2601503-25 = "Não precisa se preocupar com isso."
2601503-26 = "[s] \"Então, próxima pergunta! Você costuma ir à praia?\""
2601503-27 = "V-veio com uma pergunta normal do nada?"
2601503-28 = "Não é como se eu fosse sempre…… quer dizer, não é hora de tentar enrolar, né……."
2601503-29 = "Esta é a primeira vez que venho à praia."
2601503-30 = "Não tem um motivo profundo, na verdade."
2601503-31 = "……Hmm, como eu deveria dizer."
2601503-32 = "O Comitê de Justiça, todo mundo é tão sério, sabe……."
2601503-33 = "Rígidas consigo mesmas? Algo assim? Tem muitas garotas assim lá…… Claro, não são todas."
2601503-37 = "Você não acha, Sensei?"
2601503-38 = "[s1] \"Com certeza…….\"\n[s2] \"Tenho a impressão de que há muitas garotas sérias mesmo.\""
2601503-41 = "Elas poderiam ter escolhido uma vida escolar divertida, mas todas preferem fazer patrulhas e coisas do tipo."
2601503-42 = "No meio disso, eu sair para me divertir sozinha parece meio estranho, sabe?"
2601503-43 = "……Aconteceu algo que te deixou curiosa?"
2601503-44 = "[s3] \"Algumas garotas ficam animadas quando vêm à praia, mas――\"\n[s4] \"É que a Ichika estava bem calma.\""
2601503-47 = "Ah…… é verdade, muitas ficam bem animadas, né."
2601503-48 = "Mas eu não sou do tipo que demonstra esse tipo de emoção――"
2601503-49 = "Não……! No fundo, estou super animada, viu?"
2601503-53 = "……Acho que essa não colou muito. Haha."
2601503-54 = "Eu achava que era boa em manter o controle, mas…… Sensei, você sempre bagunça o meu ritmo……."
2601503-55 = "……E olha que eu acabei falando até disso."
2601503-59 = "O motivo de eu nunca ter ido à praia antes…… não é nada demais, sério, mas……."
2601503-60 = "……Bem, acho que não tem problema contar para você, Sensei."
2601503-61 = "……Eu não consigo aproveitar muito a praia."
2601503-62 = "É como se fosse apenas uma paisagem um pouco diferente do habitual……."
2601503-63 = "Patrulhas no distrito, visitas a outras escolas para assuntos diplomáticos……."
2601503-64 = "Para mim, é só mais uma dessas expedições."
2601503-65 = "Tinha até uma veterana que queria muito vir à praia, será que foi certo eu ter vindo no lugar dela?"
2601503-66 = "……Desculpe por ser tão pessimista. Não foi nada divertido, né?"
2601503-67 = "[s5] \"Obrigado por compartilhar isso comigo.\"\n[s6] \"Então era assim que você se sentia.\""
2601503-70 = "Mesmo assim, parece que passo uma imagem de seriedade, e dizem que sou uma das promessas do comitê, sabe?"
2601503-71 = "Pelo menos, dizem que sou um talento capaz de atender às expectativas dos superiores……."
2601503-72 = "……Isso soou um pouco como se eu estivesse me gabando, né."
2601503-73 = "……Não é algo difícil, né?"
2601503-74 = "Todo mundo passa por dificuldades, sabe."
2601503-75 = "Não é como se todo mundo tivesse suas próprias \"dificuldades\"?"
2601503-76 = "Na minha opinião, parece que o Sensei e os veteranos têm uma vida muito mais difícil."
2601503-80 = "……Hm?"
2601503-81 = "Como foi que isso virou uma entrevista de repente……?"
2601503-82 = "[s7] \"Do que você está falando?\"\n[s8] \"Droga, descobriu……!\""
2601503-85 = "Como eu pensei…… o Sensei sempre me deixa fora de ritmo."
2601503-86 = "Não que eu ache ruim, sabe? Na verdade, eu agradeço."
2601503-87 = "……É só que, parece que não consigo esconder nada de você."
2601503-88 = "……Conversar sobre tudo isso me deixou mais leve!"
2601503-89 = "Acho que vou dormir muito bem hoje."
2601503-90 = "Muito obrigada!"
2601503-92 = "（Depois disso, caminhei mais um pouco pela praia com Ichika e voltamos para a pousada）"
