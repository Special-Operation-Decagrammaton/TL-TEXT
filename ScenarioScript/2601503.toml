[translation]
2601503-1 = "アノニマス・ガール"
2601503-4 = "あれっ。"
2601503-5 = "先生？こんな時間に何してるっすか？"
2601503-6 = "……いや、全然人のこと言えないんすけど……はは。"
2601503-7 = "な～んか寝付けなかったんすよね～"
2601503-8 = "せっかくだし、夜の散歩でもしようかなって……。"
2601503-9 = "先生もそんな気分っすか？"
2601503-10 = "……ツイてたかも。"
2601503-11 = "や、独り言っすよ。"
2601503-12 = "んじゃ行きますか。"
2601503-18 = "……。"
2601503-19 = "[s] \"何か悩んでるの？\""
2601503-20 = "……えっ？急になんすか？"
2601503-21 = "あ、いえ……普段あんま聞かれないんで、ちょっと驚いたっす。"
2601503-22 = "私、悩むキャラじゃないっすからね～"
2601503-23 = "まったく悩まないわけじゃないっすけど……。"
2601503-24 = "わざわざ相談するほどのもんでもないっす。"
2601503-25 = "気にしなくていいっすよ。"
2601503-26 = "[s] \"では次の質問です！よく海に行くの？\""
2601503-27 = "い、いきなり普通の質問来たっすね？"
2601503-28 = "別にいつも行くわけじゃ……って、ここ誤魔化すとこじゃないか……。"
2601503-29 = "海に来たのは、はじめてっす。"
2601503-30 = "深い理由はないっすけどね。"
2601503-31 = "……うーん、なんて言えばいいのやら。"
2601503-32 = "正義実現委員会って、みんな真面目っていうか……。"
2601503-33 = "自分に厳しい？みたいな？そういう子が多いんすよ……。もちろん、みんながみんなじゃないっすけど。"
2601503-37 = "そう思わないっすか、先生？"
2601503-38 = "[s1] \"確かに……。\"\n[s2] \"真面目な子が多い印象はあるかも。\""
2601503-41 = "楽しい学園生活も選べたはずなのに、みんな進んで巡回したりしてるんすよね。"
2601503-42 = "そんな中、私だけ遊びにいくのもなんかな～って。"
2601503-43 = "……気になることでもあったっすか？"
2601503-44 = "[s3] \"海に来ると浮かれる子もいるけど――\"\n[s4] \"イチカは落ち着いてたからさ。\""
2601503-47 = "ああ……たしかに、テンションあがる子は多いっすよね。"
2601503-48 = "でも私は、そんな感情出すタイプじゃないんで――"
2601503-49 = "いや……！内心、ウキウキっすよ？"
2601503-53 = "……ちょっとスベってたっすかね。ははっ。"
2601503-54 = "自分じゃ要領いいと思ってたんすけど、私……先生にはペース狂わされっぱなしっすね……。"
2601503-55 = "……って、こんなことまで話しちゃうし。"
2601503-59 = "今まで海に行かなかったのは……ほんとに大した理由じゃないっす、ないっすけど……。"
2601503-60 = "……まあ、先生にならいっか。"
2601503-61 = "……私は、あんまり海を楽しめないんすよ。"
2601503-62 = "普段とちょっとだけ違う風景でしかないっていうか……。"
2601503-63 = "自治区の巡回や、外交業務での他校訪問……。"
2601503-64 = "そういう遠征の一つにすぎないっすね。"
2601503-65 = "海に行きたがってた後輩もいましたし、こんな私が来てよかったんすかね～"
2601503-66 = "……なんか暗くて申し訳ないっす。面白くなかったっすよね？"
2601503-67 = "[s5] \"話してくれて、ありがとう。\"\n[s6] \"そう感じてたんだね。\""
2601503-70 = "なのに、私真面目に見えるっぽくて、委員会の中では有望株らしいんすよ？"
2601503-71 = "少なくとも、上の期待に応えられる人材……らしいっす。"
2601503-72 = "……なんか自慢っぽかったっすね。"
2601503-73 = "……大変じゃないのか、っすか？"
2601503-74 = "大変なのはみんな同じっすよ。"
2601503-75 = "誰だって、それぞれ「大変なこと」があるもんじゃないっすか？"
2601503-76 = "私からすれば、先生や先輩たちのほうがずっと大変そうっすけど。"
2601503-80 = "……うん？"
2601503-81 = "いつの間にか、面談になってないすか……？"
2601503-82 = "[s7] \"な、なんのこと？\"\n[s8] \"バレたか……！\""
2601503-85 = "やっぱ……先生には調子狂わされるんすよね～"
2601503-86 = "イヤじゃないっすよ？むしろ有難いっす。"
2601503-87 = "……ただ、隠し事ができなくなるっていうか。"
2601503-88 = "……いろいろ話せて、スッキリしたっす！"
2601503-89 = "今日はぐっすり眠れそうっすね。"
2601503-90 = "ありがとうございます！"
2601503-92 = "（その後、イチカともう少し海辺を歩いてから、宿に戻った）"
