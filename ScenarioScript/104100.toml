[translation]
104100-1 = "Episódio 10; Epílogo (2)"
104100-3 = "Pessoal, foco nos estudos...!"
104100-4 = "Ai, ai... N-Não tô entendendo nada..."
104100-5 = "Fufu. Com toda a correria de agora, vocês nem tiveram tempo de estudar para a prova, né?"
104100-6 = "Pois é. Não sei responder absolutamente nada. Mas, mesmo que pareça inútil――"
104100-7 = "Ei, não adianta tentar resistir, sabia!?#nÉ uma prova dissertativa, né!?"
104100-8 = "……Uhum."
104100-9 = "Ufufu♡ Pois é.#nParece que o 'Clube de Reforço Escolar' vai continuar por mais um bom tempo, hein."
104100-10 = "A-Auuu……."
104100-12 = "Então, se cuida e vai nessa, Sa-chan."
104100-13 = "M-Mas……."
104100-14 = "Claro que sim. Não tem como desistir de 'se encontrar', né."
104100-15 = "Hehe... é verdade. Não é o tipo de coisa que a gente desiste no meio do caminho."
104100-16 = "……。"
104100-17 = "Vai ficar tudo bem... A Sa-chan ainda tem tanta coisa pra fazer e tanta coisa pra ver, né."
104100-21 = "A gente não é mais criança igual àquela época... então vai dar tudo certo."
104100-22 = "……Entendi."
104100-28 = "……Patrão?……Ah, sou eu."
104100-29 = "Ei, seus Cabeças de Capacete!! Reúnam-se agora!!"
104100-30 = "Vamos lá dar uma lição naqueles caras!!#nVão ter que trabalhar 56 horas de graça pra compensar essas faltas!!"
104100-31 = "O quê……!"
104100-32 = "Os caras da Aru estão aqui agora――Guh, ghuuuh!?"
104100-33 = "O-O que é aquilo!? V-Venham logo pra cá!#nSe expulsarem eles, eu considero pagar pelo menos o salário mínimo!!"
104100-34 = "Se quiserem trabalho no futuro, melhor se apressarem!! Guh!?"
104100-35 = "……Entendido. Já estou indo."
104100-39 = "Pessoal……então, tchau."
104100-40 = "……Parece que vocês tão ocupados, que bom."
104100-41 = "D-De vez em quando entra em contato, viu, líder……."
104100-42 = "Vai com Deus, Sa-chan."
104100-43 = "……Uhum."
104100-45 = "……。"
104100-49 = "……Se cuida, líder."
104100-51 = "Uhe~, Serika-chan, aceito mais uma rodada, por favor."
104100-52 = "Hã, de novo!?"
104100-53 = "Isso mesmo! Além disso, a Shiroko-chan se esforçou muito, ela precisa repor as energias!"
104100-54 = "Já tô cheia, não aguento mais……."
104100-56 = "Que nada! A Shiroko-chan aguenta comer mais, né.#nVocê passou por tanta coisa, tem que aproveitar pra comer enquanto pode."
104100-57 = "A-Ahaha……."
104100-58 = "Tudo bem, mas espero que vocês tenham dinheiro pra pagar o lámen, né!?#nAh, e nada de usar o cartão da Nonomi-senpai, ouviu!?"
104100-59 = "……Que tal descontar do salário da Serika-chan?"
104100-60 = "Q-O que você tá dizendo!? Para de falar besteira!!"
104100-61 = "Mestre, manda mais uma pra cá~."
104100-66 = "Haa……hoje é por conta da casa. Bom trabalho, pessoal."
104100-67 = "Então, para as moças aqui,#nmais uma rodada de Lámen Gigante!"
104100-68 = "C-Chefe!? Você vai ter prejuízo assim, sabia!?"
104100-69 = "Nossa, esse Chefe é demais. Que generosidade~."
104100-70 = "Uau~, lá vou eu☆#nMas é claro que a gente vai pagar!"
104100-72 = "Ah, deixa disso, não esquenta não. Uma hora dessas, tem que se alimentar bem!"
104100-76 = "Ahaha……então, vamos aceitar com gratidão."
104100-77 = "Uhum……."
104100-78 = "Serika-chan, senta aqui com a gente pra comer também~#nO tio aqui fica triste se a Serika-chan não estiver por perto~."
104100-79 = "Para de falar essas coisas estranhas!? Eu ainda tô no horário de trabalho, sabia!?"
104100-80 = "Relaxa, Serika-chan. Hoje o movimento tá fraco mesmo."
104100-81 = "……S-Sério? Então, tá bom……só dessa vez……"
104100-82 = "Vem, Serika-chan. Senta aqui☆"
104100-83 = "Uhum, tem um lugar vago do meu lado também."
104100-87 = "Uhe~……Serika-chan, onde você vai sentar? Do lado da Shiroko-chan?#nOu do lado da Nonomi-chan?"
104100-88 = "Isso……na verdade pode ser muito importante, hein? Escolhe com cuidado~"
104100-93 = "Sentar no colo do tio foi uma surpresa inesperada~"
104100-94 = "Cala a boca! A Hoshino-senpai tem que aprender a lição dessa vez!"
104100-95 = "Que crueldade~ tem que pensar nas costas do tio aqui também..."
104100-96 = "Ahaha……então, acho que eu vou sentar do lado da Hoshino-senpai……."
104100-97 = "Uau☆ Então eu vou grudar na frente da Hoshino-senpai☆"
104100-98 = "Uhum, eu vou ficar atrás."
104100-99 = "Em volta de mim... a-alguém me ajuda. O tio aqui foi cercado por um bando de colegiais..."
104100-100 = "Desse jeito, o tio... Uheee~~~"
104100-103 = "Beleza, chegamos! Plana-chan."
104100-104 = "Aqui é o lugar onde a Plana-chan vai morar a partir de agora!"
104100-105 = "Eer……sim."
104100-106 = "Então……conto com você, Arona-senpai."
104100-107 = "Errado, Plana-chan! Aqui é a hora daquela fala, sabia!"
104100-108 = "……Aquela fala."
104100-109 = "Sim!! É a hora dela! A Plana-chan com certeza deve saber qual é!"
104100-110 = "……Eu realmente preciso fazer isso?"
104100-111 = "（Ficando encarando）"
104100-112 = "……Entendido."
104100-118 = "Bem-vinda de volta, Plana-chan."
104100-123 = "……Cheguei, Arona-senpai."
104100-128 = "Bom trabalho……Rin-senpai."
104100-129 = "Bom trabalho, Chefe de Mediação."
104100-130 = "Sim……err, sobre isso……"
104100-131 = "……Está tudo bem, Ayumu. Acho que o melhor a se fazer é ficar quieta até a votação de reconfiança terminar. Não posso dar mais trabalho pra você, Ayumu."
104100-132 = "'Mais' trabalho, que isso……."
104100-134 = "É verdade, Rin-senpai. A gente foi até o espaço juntas, esqueceu?"
104100-135 = "……Momoka."
104100-136 = "Bom……eu até pensei em dar um perdido de novo dessa vez……#nmas já que cheguei até aqui, achei que tinha que cuidar da Rin-senpai~"
104100-137 = "Fufu……sim, eu também."
104100-138 = "……Ayumu, Momoka.#nFalando nisso, tem uma coisa que eu não contei pra vocês."
104100-143 = "……Obrigada por ficarem do meu lado."
104100-144 = "……！！"
104100-145 = "U-Uau……!? A Rin-senpai se curvando pra pedir desculpas..."
104100-146 = "Isso é sinal de que alguma coisa estranha vai acontecer……com certeza vai chover canivete amanhã……"
104100-147 = "M-Momoka-chan……."
104100-149 = "……E continuarei contando com vocês. #nConto com o apoio de vocês."
104100-150 = "……Sim! Nós que contamos com você."
104100-151 = "Tá bom, tá bom. Não tem jeito, né... Conta com a gente~"
104100-153 = "Ah……falando nisso.#nChegou uma carta para a senpai."
104100-154 = "……Uma carta?"
104100-155 = "Sim. Deixei em cima da mesa, mas……"
104100-156 = "Não tinha remetente escrito…… Eu dei uma checada por segurança, mas#nparece uma carta normal. Ah, não li o conteúdo!"
104100-157 = "……Entendido, vou dar uma olhada."
104100-159 = "Niaha~. Sensei, quanto tempo."
104100-160 = "[s] \"Niya!\""
104100-161 = "Nossa, que desempenho incrível, não deu nem pra segurar as lágrimas. #nSério, meu coração tá explodindo de emoção!"
104100-162 = "[s] \"Obrigado, Niya. Bom trabalho pra você também.\""
104100-163 = "Pois é, mas então……Sensei."
104100-164 = "É um assunto bem interessante――não, na verdade, é bem importante para mim……"
104100-165 = "[s] \"Hã? O que houve?\""
104100-166 = "……É verdade que você saiu correndo pelado pelo campo?"
104100-170 = "[ns1] \"……………………。\"\n[ns2] \"Não, sério, é tudo um grande mal-entendido.\""
104100-173 = "……Ué? Que estranho. Mais precisamente…… Tem relatos de que você estava correndo pelado, todo sujo de poeira, segurando um tablet em uma mão e indo em direção aos alunos com um sorriso de orelha a orelha――"
104100-174 = "[s] \"………………。\""
104100-175 = "Cof, cof……Bom, o Sensei tem uma reputação a zelar, né? Então vou parar por aqui."
104100-176 = "[s] \"……Você me ligou só pra perguntar isso?\""
104100-177 = "Não. Na verdade, recebi uma mensagem do Clube de Pesquisa Ninjutsu."
104100-178 = "Ah, e só pra avisar, elas já voltaram em segurança."
104100-179 = "Conseguimos confirmar que elas encontraram a vice-presidente do Hyakkiyako. #nMas não deu pra confirmar se a Kuzunoha é real ou não……"
104100-180 = "Estou com uma carta que diz ser da Kuzunoha."
104100-181 = "E ela é endereçada ao――'Sensei do Schale'. #nBom, não sei se é verdade ou não."
104100-182 = "Não sei o que diz, mas tô te mandando os dados agora."
104100-183 = "[s] \"Obrigado, Niya.\""
104100-184 = "Nyahaha. Espero que ajude~"
104100-185 = "Dá uma passada no Distrito de Hyakkiyako qualquer dia desses.#nVai ter um festival bem legal em breve."
104100-191 = "[ns] （Lendo a carta que recebeu da Niya）"
104100-194 = "Hum, ouvi uns boatos de que o Sensei [USERNAME] está procurando por mim.#n……Não, talvez eu deva dizer, 'procurando' no futuro."
104100-195 = "De qualquer forma, preciso ir direto ao ponto――"
104100-196 = "Não existe método para reverter alguém que foi corrompido pela 'Cor' (Chroma)."
104100-197 = "Isso é――tal qual os mortos não ressuscitam.#nÉ uma regra absoluta deste mundo."
104100-198 = "Mas, se mesmo assim……você diz que tem alguém que quer salvar,"
104100-203 = "――Venha me encontrar."
104100-208 = "……É aqui, então."
104100-210 = "Não tem remetente……."
104100-211 = "O conteúdo é――"
104100-215 = "“Para a Rin-chan”"
104100-216 = "Isso é……"
104100-217 = "Essa caligrafia……"
104100-218 = "……。"
104100-222 = "Presidente do Conselho Estudantil Geral……?"