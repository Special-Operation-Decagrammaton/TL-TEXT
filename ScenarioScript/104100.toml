[translation]
104100-1 = "Episódio 10; Epílogo (2)"

104100-3 = "Pessoal, vamos lutar...!"

104100-4 = "Ugh... eu não entendo nada..."

104100-5 = "Hehe. Desta vez todos tiveram sucesso e não pude estudar para o exame."

104100-6 = "ah. Não conheço nenhum problema. Mas mesmo que seja uma coisa vã..."

104100-7 = "Não, não adianta resistir! ? #nEste é um formato descritivo! ?"

104100-8 = "……Sim."

104100-9 = "Hehehe ♡ Isso mesmo. #nParece que o ``Clube de Aulas Complementares'' continuará."

104100-10 = "Ah, ai..."

104100-12 = "Pois bem, por favor, tenha cuidado. Sa-chan."

104100-13 = "Mas..."

104100-14 = "Não é verdade? Não existe aposentadoria quando você está "procurando por si mesmo"."

104100-15 = "Hehe... isso mesmo. Não é algo que você deva desistir no meio do caminho."

104100-16 = "……."

104100-17 = "Está tudo bem...Sacchan ainda tem muitas coisas que quer ver e fazer."

104100-21 = "Não somos as crianças que éramos naquela época... então está tudo bem."

104100-22 = "...Eu entendo."

104100-28 = "...Seu empregador? ...Ah, sou eu."

104100-29 = "Ei, grupo de capacete! ! Reúna-se rapidamente! !"

104100-30 = "Ele... eu vou puni-lo! ! #nVou fazer você trabalhar exatamente 56 horas sem remuneração para compensar sua ausência desta vez! !"

104100-31 = "O que...!"

104100-32 = "Os faz-tudo estão aqui agora - ugh! ?"

104100-33 = "O que, o que é isso? ? Venha aqui rápido! #nSe nos livrarmos deles, consideraremos o salário mínimo por hora! !"

104100-34 = "Se você quer um emprego no futuro, corra! ! Argh! ?"

104100-35 = "……entendido. Indo agora."

104100-39 = "Todo mundo... é isso."

104100-40 = "...Parece que você está ocupado, o que é bom."

104100-41 = "Por favor, entre em contato comigo de vez em quando, Líder..."

104100-42 = "Bem-vindo, Sacchan."

104100-43 = "……Sim."

104100-45 = "……."

104100-49 = "...Cuide-se, líder."

104100-51 = "Ei, Celica-chan, por favor, me dê outra ajuda."

104100-52 = "Ah, de novo! ?"

104100-53 = "Yeah, yeah! Além disso, Shiroko-chan trabalhou duro, então precisamos garantir que ela receba bastante nutrição!"

104100-54 = "já estou cheio..."

104100-56 = "Oh não! Shiroko-chan pode comer mais, certo? #nAcabei de passar por muitos problemas, então preciso comer o máximo que puder."

104100-57 = "Ah, ahaha…."

104100-58 = "O que você quiser, você pode pagar pelo ramen! ? #nOh, não tenho cartão para Nonomi-senpai!"

104100-59 = "...Que tal deduzir do salário por hora da Celica?"

104100-60 = "O que você está falando? ? Não seja estúpido! !"

104100-61 = "Mestre, por favor, tome outra bebida."

104100-66 = "Suspiro... desta vez é uma delícia da loja. Bom trabalho a todos."

104100-67 = "Pois bem, outra tigela de #n jumbo ramen para vocês, meninas!"

104100-68 = "Ei, general! ? Isso colocaria você no vermelho! ?"

104100-69 = "Bem, como esperado do general. Isso é muito peso."

104100-70 = "Uau~ Itadakimasu☆#nClaro que vou pagar por isso!"

104100-72 = "Bem, eu realmente não me importo. Em momentos como esse, preciso me alimentar direito!"

104100-76 = "Ahaha... Pois bem, muito obrigado."

104100-77 = "sim……."

104100-78 = "Celica-chan, vamos sentar aqui e comer juntos ~ #n vou me sentir sozinho sem Celica-chan ~."

104100-79 = "Não diga nada estranho! ? Ainda estou trabalhando meio período! ?"

104100-80 = "Está tudo bem, Celica-chan. Eu tenho tempo livre hoje de qualquer maneira."

104100-81 = "...E-é isso mesmo? Bem, então... às vezes..."

104100-82 = "Sim, Celica-chan. Por favor, venha aqui ☆"

104100-83 = "Hmm, há espaço ao meu lado também."

104100-87 = "Uau... Celica-chan, onde você deveria sentar? Ao lado de Shiroko-chan? #n Ou ao lado da Nonomi-chan?"

104100-88 = "Isso...talvez seja realmente super importante? Tenha cuidado ~"

104100-93 = "No colo do meu tio foi inesperado."

104100-94 = "うるさいわね！今回はホシノ先輩もちゃんと反省しなさいよ！"

104100-95 = "ひどいなぁ～おじさんの腰のことも考えてくれないと……"

104100-96 = "Ahaha... Então estarei ao lado de Hoshino-senpai também..."

104100-97 = "Uau☆Então vou ficar na frente de Hoshino-senpai☆"

104100-98 = "Hmm, estou atrás."

104100-99 = "Frente, trás, esquerda, direita... Alguém por favor me ajude. Tio, eu estava cercado por garotas do ensino médio..."

104100-100 = "Nesse ritmo, tio... Uau..."

104100-103 = "Tudo bem, chegamos! Prana-chan."

104100-104 = "Esta é a casa onde Prana passará seu tempo a partir de agora!"

104100-105 = "Hum... sim."

104100-106 = "Pois bem... Muito obrigado, Arona-senpai."

104100-107 = "Isso está errado, Prana-chan! Aqui estão essas linhas!"

104100-108 = "...Essa linha."

104100-109 = "sim! ! Chegou a hora dessa linha! Prana-chan também deve saber disso!"

104100-110 = "...Se eu não fizer isso, isso não acontecerá?"

104100-111 = "(Jeeeeee)"

104100-112 = "……Entendido."

104100-118 = "Bem vindo de volta, Prana."

104100-123 = "...Estou em casa, Arona-senpai."

104100-128 = "Obrigado pelo seu trabalho duro... Lin-senpai."

104100-129 = "Obrigado pelo seu trabalho árduo, Diretor do Gabinete de Mediação."

104100-130 = "Sim... hum..."

104100-131 = "...Está tudo bem, Ayumu. Acho que seria uma boa ideia ficar quieto até que meu voto de reconfiança termine. Não posso causar problemas para Ayumu novamente."

104100-132 = "Novamente, é isso..."

104100-134 = "Isso mesmo, Rin-senpai. Fomos para o espaço juntos, certo?"

104100-135 = "...Momoka."

104100-136 = "Bem...pensei que seria melhor voltar dessa vez também...#nAgora que cheguei até aqui, tenho que cuidar da Rin-senpai."

104100-137 = "Hehe... sim, eu também."

104100-138 = "...Ayumu, Momoka. #nAgora que penso nisso, há algo que não te contei."

104100-143 = "...Obrigado por estar comigo."

104100-144 = "...! !"

104100-145 = "Uau...! ? Não acredito que chegará o dia em que Rin-senpai inclinará a cabeça..."

104100-146 = "Isso é um sinal de que algo está para acontecer... Tenho certeza que as lanças cairão amanhã..."

104100-147 = "Além disso, Momoka-chan..."

104100-149 = "...e obrigado pelo seu apoio contínuo. #nMuito obrigado pelo seu apoio."

104100-150 = "……sim! Muito obrigado pelo seu apoio."

104100-151 = "Sim, sim. Bem, acho que não posso evitar... Prazer em conhecê-lo~"

104100-153 = "Ah... agora que penso nisso. #nUma carta foi entregue ao meu superior."

104100-154 = "...Uma carta?"

104100-155 = "sim. Deixei na minha mesa..."

104100-156 = "Não havia nenhum nome escrito no remetente... Verifiquei brevemente só para ter certeza, mas parece uma carta normal. Ah, não vi o conteúdo!"

104100-157 = "...Ok, vou verificar."

104100-159 = "Nyaha ~. Professor, já faz muito tempo."

104100-160 = "[s] \"Niya!\""

104100-161 = "Bem, foi uma ótima apresentação que eu não conseguia assistir sem chorar. #nMeu coração está realmente cheio!"

104100-162 = "[s] \"Obrigado, Niya. Obrigado pelo seu trabalho duro, Niya.\""

104100-163 = "Então, o que é... sensei?"

104100-164 = "Isso é... é muito interessante para mim - não, é uma história importante..."

104100-165 = "[s] \"Hmm? O que há de errado?\""

104100-166 = "...É verdade que você correu nu pelos campos?"

104100-170 = "[ns1] \"…………………….\"\n[ns2] \"Não, é realmente um mal-entendido.\""

104100-173 = "...Huh? Isso é loucura. Para ser mais preciso... há relatos de testemunhas oculares dele correndo até os alunos, nu e coberto de poeira, com um tablet na mão e um grande sorriso no rosto..."

104100-174 = "[s] \"…………………….\""

104100-175 = "Cohon... bem, eu também tenho um cargo de professor, certo? Não vou prosseguir com isso."

104100-176 = "[s] \"...Você entrou em contato comigo para perguntar isso?\""

104100-177 = "lar. Na verdade, fui contatado pelo Departamento de Pesquisa de Ninjutsu."

104100-178 = "Ah, a propósito, essas crianças voltaram em segurança."

104100-179 = "Em primeiro lugar, posso confirmar que consegui me encontrar com o vice-presidente da Hyakka Ryouran. #n, mas não consegui confirmar a existência de Kuzunoha..."

104100-180 = "Recebi uma carta de um autoproclamado Kuzunoha."

104100-181 = "E isso foi endereçado ao ``Professor da Placa de Petri.'' #nBem, independentemente de ser verdade ou não."

104100-182 = "Não sei os detalhes, mas enviarei os dados o mais breve possível."

104100-183 = "[s] \"Obrigado, Niya.\""

104100-184 = "Nyahaha. Eu gostaria de poder ajudar ~"

104100-185 = "Da próxima vez, venha para a Área Autônoma Hyakki Yako mais uma vez. #nUm festival interessante será realizado em breve."

104100-191 = "[ns] (Lendo a carta que Niya me deu)"

104100-194 = "Hmm, ouvi que o sensei [NOME DE USUÁRIO] estava procurando uma concubina. #n...Não, devo dizer que procure por [ruby=・]pre[/ruby][ruby=・]determine[/ruby]."

104100-195 = "Sério, você deveria contar sua conclusão primeiro."

104100-196 = "Não há como restaurar alguém que foi revertido pela “cor”."

104100-197 = "É como se os mortos não pudessem voltar à vida. #nEsta é a regra absoluta deste mundo."

104100-198 = "Mas ainda assim... se houver alguém que queira ajudar,"

104100-203 = "--Por favor, visite minha concubina."

104100-208 = "...É isso?"

104100-210 = "O remetente não está escrito..."

104100-211 = "O conteúdo é ――"

104100-215 = ""Para Rin-chan""

104100-216 = "isso é……"

104100-217 = "Essa caligrafia..."

104100-218 = "……."

104100-222 = "Presidente do Conselho Estudantil da Federação...?"

