[translation]
901010600120-8 = "Hello!"
901010600120-14 = "Oh? Aren't you the one who brought me some inari sushi the other day?"
901010600120-15 = "Are you here for another promotion today?"
901010600120-16 = "No, unfortunately, the 'FOX EATS' review event has already ended..."
901010600120-20 = "Instead, I have plenty of energy drinks left over from the event. #nWould you like one?"
901010600120-21 = "...If it's free, I see no reason to refuse."
901010600120-25 = "Did you catch a lot of crabs today, too?"
901010600120-26 = "Yeah. A significant amount. #nI thought the boat was going to capsize."
901010600120-27 = "If only the market price for crabs wasn't so low..."
901010600120-28 = "It's a shame that you can't sell them at their original value even though you have so many."
901010600120-29 = "Come to think of it, you catch crabs with traps, right?"
901010600120-30 = "I often hear that their legs break or their claws get damaged during capture... but the crabs here are all in great condition."
901010600120-31 = "Since you land them so carefully, I'm sure the price of the crabs will stabilize soon."
901010600120-36 = "...You're a kind soul."
901010600120-37 = "If everyone were like you, I wouldn't have such a hard time training the newcomers."
901010600120-38 = "Newcomer training? Did something happen?"
901010600120-39 = "It's nothing major. #nA new guy who was working on the fishing boat recently just up and vanished... Honestly, where did that Miyaguchi go?"
901010600120-40 = "He could have at least left a note..."
901010600120-41 = "That sounds rough."
901010600120-42 = "To just disappear like that... do you think something happened to him?"
901010600120-43 = "Like maybe he fell ill or got into an accident..."
901010600120-44 = "Hmph. That guy is just spineless."
901010600120-45 = "He must have run away because crab fishing was too tough. He was always complaining about maintaining the fishing gear, too."
901010600120-46 = "Is crab fishing really that difficult?"
901010600120-47 = "It's not that bad. It's a job anyone can do if they have the guts."
901010600120-48 = "Go ahead and ask the other crew members. #nThey all know just how soft he was."
901010600120-49 = "Honestly, this is why kids these days..."