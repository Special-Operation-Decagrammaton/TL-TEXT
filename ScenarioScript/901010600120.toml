[translation]#[Texto Final. - Filipe 05/07.]
901010600120-8 = "Olá!"
901010600120-14 = "Ora? Você não é a menina que trouxe inarizushi outro dia?"
901010600120-15 = "Veio fazer outra promoção hoje?"
901010600120-16 = "Não, infelizmente o evento de avaliação do 'FOX EATS' já acabou……"
901010600120-20 = "Mas ainda tenho bastante energético que sobrou do evento.#nAceita um?"
901010600120-21 = "……Se é de graça, não vou recusar."
901010600120-25 = "Hoje também pegou bastante caranguejo?"
901010600120-26 = "Sim. Uma quantidade danada.#nQuase virou o barco."
901010600120-27 = "Pena que o preço do caranguejo tá tão baixo……"
901010600120-28 = "É uma pena ter tanto e não conseguir vender pelo valor de custo."
901010600120-29 = "Falando nisso, caranguejo se pega com armadilhas, né."
901010600120-30 = "Eu ouço falar que as pernas quebram ou as pinças se machucam na captura…… mas os caranguejos daqui estão todos em ótimo estado."
901010600120-31 = "Com um desembarque tão cuidadoso assim, o preço do caranguejo deve se estabilizar."
901010600120-36 = "……Você é gentil."
901010600120-37 = "Se todo mundo fosse como você, não ia ter tanto trabalho pra ensinar novato."
901010600120-38 = "Ensinar novato? Aconteceu alguma coisa?"
901010600120-39 = "Nada de mais.#nSó que um novato que trabalhava no barco sumiu do nada…… mas onde foi parar aquele Miyaguchi."
901010600120-40 = "Podia pelo menos deixar um bilhete……"
901010600120-41 = "Isso é complicado."
901010600120-42 = "Sumir do nada assim…… será que aconteceu alguma coisa?"
901010600120-43 = "Ficou doente, sofreu um acidente……?"
901010600120-44 = "Que nada, aquele ali só não tem fibra mesmo."
901010600120-45 = "Deve ter fugido porque a pesca do caranguejo é pesada. Só reclamava da manutenção dos equipamentos."
901010600120-46 = "A pesca de caranguejo é tão puxada assim?"
901010600120-47 = "Puxada não é. Qualquer um com disposição consegue."
901010600120-48 = "Pergunta pros outros marinheiros.#nTodo mundo sabe como ele era molenga."
901010600120-49 = "Ah, a juventude de hoje……"