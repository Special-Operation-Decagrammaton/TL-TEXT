[translation]
901010600120-8 = "Olá!"
901010600120-14 = "Opa? Você não é a moça que entregou o inarizushi outro dia?"
901010600120-15 = "Veio fazer outra promoção?"
901010600120-16 = "Não, infelizmente o evento de avaliação do \"FOX EATS\" terminou..."
901010600120-20 = "Mas ainda tenho um monte de bebida energética que sobrou. Aceita uma?"
901010600120-21 = "... Se é de graça, não vou recusar."
901010600120-25 = "Pegaram bastante caranguejo hoje?"
901010600120-26 = "Sim, uma quantidade danada. Quase virou o barco."
901010600120-27 = "Se o preço não estivesse tão baixo..."
901010600120-28 = "É uma pena vender por pouco, mesmo tendo muito."
901010600120-29 = "Aliás, caranguejo se pega com armadilha, né."
901010600120-30 = "Dizem que as patas quebram, as pinças machucam... mas os caranguejos daqui estão todos em bom estado."
901010600120-31 = "Com um trabalho tão cuidadoso, o preço deve se estabilizar."
901010600120-36 = "... Você é muito boazinha."
901010600120-37 = "Se todos fossem como você, treinar novato não seria problema."
901010600120-38 = "Treinar novato? Aconteceu alguma coisa?"
901010600120-39 = "Nada demais. Um novato que trabalhava no barco sumiu do nada... cadê aquele Miyaguchi?"
901010600120-40 = "Podia pelo menos ter deixado um bilhete."
901010600120-41 = "Isso é preocupante."
901010600120-42 = "Sumir de repente... será que aconteceu alguma coisa?"
901010600120-43 = "Doença grave, acidente..."
901010600120-44 = "Hum, aquele é só um covarde."
901010600120-45 = "Com certeza fugiu porque o trabalho de pesca de caranguejo era pesado. Ele vivia reclamando."
901010600120-46 = "O trabalho é tão pesado assim?"
901010600120-47 = "Não é tanto. Qualquer um faz, com um pouco de determinação."
901010600120-48 = "Pergunte para os outros pescadores. Todos sabem como ele era mole."
901010600120-49 = "Aff, essa juventude de hoje..."