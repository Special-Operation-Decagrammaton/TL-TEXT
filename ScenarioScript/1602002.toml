[translation]
1602002-1 = "ある狙撃手のスモールトーク"
1602002-3 = "（シャーレの近くに最近人気のカフェがオープンしたと聞いたので行ってみた）"
1602002-4 = "（午後のカフェは、そこそこ混雑していた）"
1602002-5 = "[ns1] （ここがSNSで話題のカフェか……）\r\n[ns2] （客の好みに合わせたコーヒーを提供してくれるって聞いたけど……）"
1602002-10 = "いらっしゃいませ。ご注文はお決まりでしょうか。\r\n"
1602002-11 = "[s] \"えっと、ブラックコーヒーで。\""
1602002-12 = "ご来店は初めてでしょうか？\r\n"
1602002-13 = "当店ではお客様に最適な一杯をご提供すべく、多種多様な豆と機材を揃えております。#nなんなりとお申し付けください。"
1602002-14 = "豆はウォッシュドとナチュラル、どちらがお好みですか？#n焙煎は、どの程度にいたしましょう？"
1602002-15 = "[s] \"えっと、豆は何があるんですか……？\""
1602002-16 = "ブルボン、ティピカ、ゲイシャ、カトゥアイ、と多数あり――"
1602002-17 = "焙煎方法は、段階ごとに承っております。\r\n"
1602002-21 = "[ns] \"なるほど……それじゃあえっと……。\""
1602002-25 = "あれ、[USERNAME]先生？\n"
1602002-26 = "先生もフルリンクを見て来たの？#n最近、SNSでバズってたもんね～"
1602002-27 = "[s3] \"オトギ！\"\r\n[s4] \"ちょうど良かった。助けて……。\""
1602002-30 = "……ん？そんな顔して、どうしたの？\r\n"
1602002-31 = "[s] \"オトギは、ここによく来るの？\""
1602002-32 = "ううん、初めて。何かあったの？"
1602002-33 = "……ああ、ちょっとメニュー複雑だよね。"
1602002-34 = "というかそれなら普通にお店の人に聞けばいいじゃん。\r\n"
1602002-35 = "混んでるから、あれこれ聞いたら迷惑になる？"
1602002-40 = "んじゃ、私に任せて！\r\n"
1602002-43 = "すいませーん。\r\n"
1602002-44 = "豆の説明のウォッシュドとナチュラルって、どういうことですか？"
1602002-45 = "ウォッシュドは、果肉を取り除いて水で洗ってから乾燥させたもので、すっきりとした味わいになります。"
1602002-46 = "ナチュラルは、果肉がついたまま乾燥させたもので、フルーツのような風味が特徴です。"
1602002-47 = "おぉ、フルーティーなコーヒーってこと？#nふっしぎ～"
1602002-48 = "私はゆず茶が好きなんだけど、近いのってあります？"
1602002-49 = "本日、柑橘系の香りが特徴のブルボンが入りましたので、そちらにいたしましょうか。"
1602002-50 = "抽出方法のご希望は？"
1602002-51 = "うーん……よく分からないから、お任せで。"
1602002-52 = "では、ハンドドリップでお淹れしますね。"
1602002-53 = "お連れ様は……。"
1602002-54 = "[s] \"わ、私も、同じもので！\""
1602002-55 = "かしこまりました。少々お待ちくださいませ。"
1602002-59 = "[ns5] \"おかげで助かったよ……。\"\n[ns6] \"最近のお店って、こんなに複雑なんだ。\""
1602002-62 = "そうだねぇ……ニーズに合わせてくれるお店が最近は人気かも。"
1602002-63 = "私は、店員さんとおしゃべりできるから好きだけど。\r\n"
1602002-64 = "注文が複雑すぎると、怖くなってやめちゃう人も多いみたい。"
1602002-65 = "いくら注文が細かくたって、お客さんを食べる料理店なんて、存在しないのにねぇ。"
1602002-68 = "……お待たせしました。ご注文のコーヒーです。"
1602002-69 = "あ、来た来た。"
1602002-70 = "ん～……ほんとに柑橘系のいい香りがする。"
1602002-71 = "冷たくしたら、アイスティーみたいな感じになるかも？"
1602002-72 = "アイスだと香りが落ちてしまうのでオススメしませんが、必要でしたら氷をお持ちしましょうか？"
1602002-73 = "ううん。せっかくだから、今日はこの香りを楽しもうかな。"
1602002-74 = "あと、アイスコーヒーに合う豆を教えて。次はそっちにするから。"
1602002-75 = "比較できるよう、他のコールドブリューのサンプルをお持ちしましょうか？\r\n"
1602002-76 = "それ、気になるかも。お願いしてもいい？"
1602002-84 = "[ns7] \"知らない人と、こんなに会話が弾むなんて……。\"\n[ns8] \"なんか、オトギは他の狙撃手よりも社交的なんだね。\""
1602002-87 = "他の狙撃手……？"
1602002-88 = "ああ、たしかに単独作戦が多いし――"
1602002-89 = "狙撃手は臆病で内向的っていうイメージはあるかもね。"
1602002-90 = "孤独な一匹狼スタイルは、腕がいい人も多いけど……。"
1602002-91 = "仲間と円滑に進めるためには、ある程度の社交性が必要なんだよ。"
1602002-92 = "それに人と話すことが気にならないのは、私の狙撃手としての鉄則でもあるからね。"
1602002-93 = "[s] \"狙撃手としての鉄則？\""
1602002-94 = "うん、例えば――"
1602002-98 = "あれ？――ねえ、しおり落としたよ。\r\n"
1602002-101 = "あ、ありがとうございます！大切なしおりなんです！\r\n"
1602002-102 = "このサイン、見たことあるかも……。"
1602002-103 = "もしかして「禁断の愛」シリーズの作家、恋よ鯉先生のサイン？\r\n"
1602002-104 = "そうなんです！出版記念イベント限定のもので！\r\n"
1602002-105 = "一目で分かるなんて……あなたも恋よ鯉先生のファンなんですか？"
1602002-106 = "ファンって言うほどじゃないけど、この作家の本は買って読んでるよ～"
1602002-107 = "先週の新作短編集はご存知ですか？\r\n"
1602002-108 = "ううん、知らなかったぁ。"
1602002-109 = "良かった……ではこちらをどうぞ。\r\n"
1602002-110 = "え、これ新刊でしょ？もらっちゃっていいの？"
1602002-111 = "気にしないでください。これは「布教用」ですから。"
1602002-115 = "じゃあ、ありがたくもらっちゃうね。\r\n"
1602002-116 = "あ、良かったらSNS教えて。後で感想送るからさ。"
1602002-118 = "はい、ぜひ……！\r\n\r\n"
1602002-134 = "（その後も、オトギは店員や他のお客さんと楽しそうに会話をして……）\r\n"
1602002-135 = "（色々な情報を集めたり、サービスをうけていた）\r\n"
1602002-137 = "ああ、楽しかったぁ～\r\n"
1602002-138 = "ありがと、先生。久しぶりに楽しい午後を過ごせたよ～"
1602002-139 = "[s] \"私もとても楽しかったよ。\""
1602002-143 = "[ns] \"それで……「狙撃手としての鉄則」って？\""
1602002-144 = "ああ、その話、途中だったね。\r\n"
1602002-145 = "任務中って、多くのチャンスが回ってくるからさ。"
1602002-146 = "今、引き金を引くべきなのか、待つべきなのか、悩むことが多いんだけど――"
1602002-151 = "私は、迷わずチャンスを掴んだほうがいいって思ってる。\r\n"
1602002-152 = "ミスをしても取り返せるけど―― #n一瞬のチャンスを逃したら、永遠に取り戻せないから。"
1602002-153 = "だから新しいことに出会ったら、ぶつかっていくようにしてるんだ。"
1602002-154 = "[s9] \"素晴らしい考えだね。\"\n[s10] \"これからも変わらないでほしいな。\""
1602002-157 = "ふふ。自慢じゃないけど、色々経験してきた方だと思うよ。"
1602002-158 = "空でも、大地でも、海でも。私の予測を外れる状況は、ほぼない――\r\n"
1602002-160 = "新商品です！ご試食どうぞ！"
1602002-161 = "新気鋭の味！カップ麺界の革命、チリチョコレート炒め麺！"
1602002-162 = "…………。"
1602002-163 = "新しい物を見つけた時は避けずに、挑むべき……。"
1602002-164 = "[s11] \"いや、無理に挑む必要はないよ！？\"\r\n[s12] \"時には挑まなくても、良い時があるよ？\""
1602002-167 = "ううん、先生。"
1602002-168 = "SRTの特殊隊員たるもの、失敗だと分かってても、突撃しなきゃいけない時がある！"
1602002-169 = "さあて、お味見といこうか……。"
1602002-171 = "（そしてオトギは、悲壮な表情で、誰も試食しようとしなかった炒め麺を食べ……）\r\n"
1602002-174 = "あはは……新気鋭の味だったね……。"
1602002-181 = "[ns] \"オトギー！\""
1602002-183 = "（苦しそうな表情で倒れてしまった）\r\n"
