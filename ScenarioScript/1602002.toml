[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1602002-1 = "A Conversa Fiada de uma Sniper" 
1602002-3 = "（Ouvi dizer que um café popular abriu recentemente\nperto da Schale, então decidi dar uma olhada.）" 
1602002-4 = "（O café à tarde estava\nrazoavelmente lotado.）" 
1602002-5 = "[ns1] （Então este é o café que está\nfazendo sucesso nas redes sociais...）\n[ns2] （Ouvi dizer que eles servem cafés\npersonalizados ao gosto do cliente, mas...）" 
1602002-10 = "Bem-vindo. Já sabe o que vai pedir?\n" 
1602002-11 = "[s] \"Hmm, vou querer\num café preto.\"" 
1602002-12 = "É a sua primeira vez aqui?\n" 
1602002-13 = "Em nosso estabelecimento, para oferecer a xícara perfeita, temos uma\ngrande variedade de grãos e equipamentos.\nPor favor, sinta-se à vontade para pedir o que desejar." 
1602002-14 = "Prefere os grãos lavados (washed) ou naturais (natural)?\nE qual o nível de torra que gostaria?" 
1602002-15 = "[s] \"Eh... Quais\ntipos de grãos vocês têm...?\"" 
1602002-16 = "Temos Bourbon, Typica, Geisha, Catuai e muitos outros――" 
1602002-17 = "Os métodos de torra podem ser ajustados\nem diferentes níveis.\n" 
1602002-21 = "[ns] \"Entendi...\nEntão, ahn...\"" 
1602002-25 = "Ué, Sensei?\n" 
1602002-26 = "Veio aqui por causa da Full Link também?\nTem bombado bastante nas redes sociais ultimamente, né~" 
1602002-27 = "[s3] \"Otogi!\"\n[s4] \"Chegou na hora certa. Me ajuda...\"" 
1602002-30 = "……Hmm? Com essa cara aí,\no que aconteceu?\n" 
1602002-31 = "[s] \"Você vem muito\naqui, Otogi?\"" 
1602002-32 = "Não, é a minha primeira vez.\nAconteceu alguma coisa?" 
1602002-33 = "……Ah, o menu é meio\ncomplicado, não é?" 
1602002-34 = "Mas, se é só isso, era só perguntar\npara a pessoa do balcão, não é?\n" 
1602002-35 = "Ah, acha que ia incomodar por causa\nde toda essa fila?" 
1602002-40 = "Bom, deixa comigo então!\n" 
1602002-43 = "Com licença~\n" 
1602002-44 = "Na explicação dos grãos, o que significa\n'lavado' e 'natural'?" 
1602002-45 = "Os 'lavados' têm a polpa removida e são lavados com água\nantes da secagem, resultando num sabor mais limpo." 
1602002-46 = "Os 'naturais' secam com a polpa ainda no grão,\no que lhes confere um sabor frutado característico." 
1602002-47 = "Ooh, então é um café com gosto de fruta?\nQue mágico~" 
1602002-48 = "Eu gosto de chá de yuzu, tem algum\nque seja parecido com isso?" 
1602002-49 = "Hoje recebemos um lote de Bourbon que tem\num aroma cítrico bem marcante. O que acha dele?" 
1602002-50 = "Tem alguma preferência de extração?" 
1602002-51 = "Hmm... Eu não entendo muito disso,\nentão vou deixar com você." 
1602002-52 = "Certo, então faremos no\nmétodo hand drip (coado à mão)." 
1602002-53 = "E para o seu acompanhante..." 
1602002-54 = "[s] \"E-Eu vou querer o mesmo!\"" 
1602002-55 = "Entendido.\nPor favor, aguardem um instante." 
1602002-59 = "[ns5] \"Ufa, você me salvou...\"\n[ns6] \"As lojas de hoje em dia são bem complexas.\"" 
1602002-62 = "Pois é...\nAcho que lojas que se adaptam aos gostos de cada um estão em alta." 
1602002-63 = "Eu gosto, porque dá pra bater\num papo com os funcionários.\n" 
1602002-64 = "Mas parece que muita gente acaba desistindo\npor achar o pedido complicado demais." 
1602002-65 = "Sendo que, não importa o quão detalhado seja o pedido,\nnão existe restaurante que vá comer os próprios clientes, né?" 
1602002-68 = "……Desculpe a demora.\nAqui estão os seus cafés." 
1602002-69 = "Ah, chegou, chegou." 
1602002-70 = "Hmm~...\nRealmente tem um cheirinho cítrico muito bom." 
1602002-71 = "Se gelar, talvez fique parecendo\num chá gelado?" 
1602002-72 = "Não recomendamos porque o aroma se perde com o gelo,\nmas se desejar, posso trazer um pouco." 
1602002-73 = "Não, não. Já que estamos aqui,\nacho que vou aproveitar esse aroma hoje." 
1602002-74 = "Ah, me diga quais grãos ficam bons no café gelado.\nNa próxima eu peço esse." 
1602002-75 = "Para que possa comparar, gostaria que eu trouxesse\nalgumas amostras de Cold Brew?\n" 
1602002-76 = "Ooh, fiquei interessada.\nPosso pedir então?" 
1602002-84 = "[ns7] \"Não acredito que você conseguiu conversar tanto\ncom alguém que nem conhecia...\"\n[ns8] \"Você parece ser bem mais sociável\nque os outros snipers, Otogi.\"" 
1602002-87 = "Outros snipers...?" 
1602002-88 = "Ah, é verdade que a gente faz\nmuitas missões solo, e――" 
1602002-89 = "Acho que existe mesmo esse estereótipo\nde que sniper é tímido e introvertido." 
1602002-90 = "Muitos caras bons de mira têm aquele\nestilo lobo solitário, mas..." 
1602002-91 = "Para fazer as coisas fluírem bem com a equipe,\né preciso ter pelo menos um pouquinho de sociabilidade." 
1602002-92 = "Além disso, não me importar de conversar com os outros\ntambém é uma das minhas regras de ouro como sniper." 
1602002-93 = "[s] \"Regras de ouro\ncomo sniper?\"" 
1602002-94 = "Uhum, por exemplo――" 
1602002-98 = "Opa?―― Ei, você deixou\no seu marcador de página cair.\n" 
1602002-101 = "Ah, muito obrigada!\nEsse marcador é muito precioso para mim!\n" 
1602002-102 = "Acho que eu já vi\nessa assinatura antes..." 
1602002-103 = "Por acaso é a assinatura do mestre Koiyo Koi,\no autor da série 'Amor Proibido'?\n" 
1602002-104 = "Isso mesmo!\nFoi exclusivo do evento de lançamento!\n" 
1602002-105 = "E pensar que você reconheceria de relance...\nVocê também é fã das obras do autor?" 
1602002-106 = "Não diria que sou uma super fã,\nmas eu compro e leio os livros dele sim~" 
1602002-107 = "Você ficou sabendo da nova coletânea de\ncontos que lançou na semana passada?\n" 
1602002-108 = "Não, dessa eu\nnão sabia." 
1602002-109 = "Que bom...\nEntão, por favor, fique com isto.\n" 
1602002-110 = "Ué, esse não é o volume novo?\nTem certeza que eu posso aceitar?" 
1602002-111 = "Não se preocupe.\nEsta é a minha cópia 'de panfletagem'." 
1602002-115 = "Nesse caso,\nvou aceitar com muita gratidão.\n" 
1602002-116 = "Ah, se não se importar, me passa suas redes sociais.\nTe mando o que achei depois." 
1602002-118 = "Sim, por favor...!\n\n" 
1602002-134 = "（Depois disso, Otogi continuou conversando alegremente\ncom os funcionários e outros clientes...）\n" 
1602002-135 = "（E conseguiu coletar várias informações\ne até alguns agrados da casa.）\n" 
1602002-137 = "Ah, isso foi muito divertido~\n" 
1602002-138 = "Obrigada, Sensei.\nFazia tempo que eu não tinha uma tarde tão legal assim~" 
1602002-139 = "[s] \"Eu também\nme diverti bastante.\"" 
1602002-143 = "[ns] \"E então... o que seria essa tal\n'regra de ouro como sniper'?\"" 
1602002-144 = "Ah, é mesmo,\neu estava no meio dessa história, não estava?\n" 
1602002-145 = "Sabe, durante uma missão,\nmuitas oportunidades caem no nosso colo." 
1602002-146 = "Muitas vezes eu me pego pensando\nse devo puxar o gatilho agora ou se devo esperar――" 
1602002-151 = "Eu acredito que a melhor opção\né agarrar a chance sem hesitar.\n" 
1602002-152 = "Se eu cometer um erro, dá para consertar depois――\nMas se eu deixar uma oportunidade escapar, nunca mais a terei de volta." 
1602002-153 = "Por isso, quando encontro algo novo,\neu faço questão de ir de encontro a isso." 
1602002-154 = "[s9] \"É uma mentalidade maravilhosa.\"\n[s10] \"Espero que você nunca perca essa essência.\"" 
1602002-157 = "Fufu. Não querendo me gabar,\nmas acho que eu já experimentei muita coisa na vida." 
1602002-158 = "Seja no céu, na terra ou no mar.\nQuase não existe situação que fuja das minhas previsões――\n" 
1602002-160 = "Novo produto!\nVenham experimentar!" 
1602002-161 = "Um sabor revolucionário!\nA revolução dos macarrões instantâneos, Macarrão de Chili com Chocolate!" 
1602002-162 = "…………" 
1602002-163 = "Quando encontro algo novo...\nnão devo evitar, devo enfrentar..." 
1602002-164 = "[s11] \"Não, acho que não precisa se forçar a experimentar isso!!\"\n[s12] \"Tem horas que é melhor simplesmente não se envolver, sabia?\"" 
1602002-167 = "De jeito nenhum, Sensei." 
1602002-168 = "Como um membro das Forças Especiais da SRT, tem vezes que\nprecisamos avançar mesmo sabendo que vai dar errado!" 
1602002-169 = "Muito bem, vamos ver que gosto isso tem..." 
1602002-171 = "（E então Otogi, com uma expressão solene,\ncomeu o macarrão que ninguém mais ousava provar...）\n" 
1602002-174 = "Ahaha... Realmente...\num sabor revolucionário..." 
1602002-181 = "[ns] \"Otogiii!\"" 
1602002-183 = "（E desmaiou com uma expressão\nde agonia no rosto.）\n" 