[translation]
1602002-1 = "A Certain Marksman's Small Talk"
1602002-3 = "(I heard a popular cafe recently opened near Schale, so I decided to check it out.)"
1602002-4 = "(The cafe was quite crowded in the afternoon.)"
1602002-5 = "[ns1] (So this is the cafe everyone's talking about on SNS)\n[ns2] (I heard they serve coffee tailored to the customer's preferences, but...)"
1602002-10 = "Welcome. What would you like for your order?"
1602002-11 = "[s] \"Umm, a black coffee, please.\""
1602002-12 = "Is this your first time visiting us?"
1602002-13 = "To provide our customers with the perfect cup, we have a wide variety of beans #nand equipment. Please feel free to ask for anything."
1602002-14 = "For the beans, do you prefer washed or natural?#nAnd how dark would you like the roast?"
1602002-15 = "[s] \"Umm, what kind of beans do you have...?\""
1602002-16 = "We have Bourbon, Typica, Geisha, Catuai, and many more—"
1602002-17 = "We offer various roasting methods as well.\r\n"
1602002-21 = "[ns] \"I see... In that case, umm...\""
1602002-25 = "Oh, Sensei?"
1602002-26 = "Did you come here because you saw it on the feed too?#nIt's been buzzing on social media lately~"
1602002-27 = "[s3] \"Otogi!\"\n[s4] \"Perfect timing. Please help me...\""
1602002-30 = "...Hm? What's with that look?#nWhat happened?"
1602002-31 = "[s] \"Do you come here often, Otogi?\""
1602002-32 = "Nope, first time. Is something wrong?"
1602002-33 = "...Ah, the menu is a bit complicated."
1602002-34 = "I mean, if that's the case, you could just ask the staff."
1602002-35 = "You worried asking too many questions would be a bother since it's crowded?"
1602002-40 = "Well then, leave it to me!"
1602002-43 = "Excuse me~"
1602002-44 = "What do \"washed\" and \"natural\" mean in the bean descriptions?"
1602002-45 = "Washed means the pulp is removed and the beans are washed with water before #ndrying, resulting in a clean, refreshing taste."
1602002-46 = "Natural beans are dried with the fruit still on, which gives them a fruity flavor."
1602002-47 = "Ooh, so it's a fruity coffee?#nHow fascinating~"
1602002-48 = "I like Yuzu tea, do you have anything close to that?"
1602002-49 = "We’ve just received a Bourbon with a citrusy aroma today, would you like to go #nwith that?"
1602002-50 = "How would you like it brewed?"
1602002-51 = "Hmm... I'm not really sure, so I'll leave it to you."
1602002-52 = "Very well, I will prepare it using the hand drip method."
1602002-53 = "And for your partner..."
1602002-54 = "[s] \"I-I'll have the same thing!\""
1602002-55 = "Understood. Please wait a moment."
1602002-59 = "[ns5] \"You really saved me there...\"\n[ns6] \"Shops these days are so complicated.\""
1602002-62 = "Yeah... Shops that cater to specific needs seem to be popular lately."
1602002-63 = "I like it though, since I get to chat with the staff."
1602002-64 = "It seems like when the ordering is too complicated, many people get intimidated #nand just give up."
1602002-65 = "No matter how picky the order is, it’s not like there’s a restaurant that eats its #ncustomers, you know"
1602002-68 = "...Thank you for waiting. Here is the coffee you ordered."
1602002-69 = "Ah, it's here, it's here."
1602002-70 = "Mmm... It really does have a nice citrusy scent."
1602002-71 = "If you chilled it, maybe it would taste like iced tea?"
1602002-72 = "The aroma diminishes when iced so I wouldn't recommend it, but I can bring you #nsome ice if you'd like?"
1602002-73 = "No, it’s fine. Since it’s a special occasion, I think I’ll enjoy this aroma today."
1602002-74 = "Also, tell me which beans go well with iced coffee. I'll get that next time."
1602002-75 = "Would you like me to bring a sample of another cold brew so you can compare?"
1602002-76 = "I am a bit curious about that. Could I ask you to do that?"
1602002-84 = "[ns7] \"You can strike up such a lively conversation with a stranger...\"\n[ns8] \"It seems like you're much more social than other marksmen, Otogi.\""
1602002-87 = "Other marksmen...?"
1602002-88 = "Ah, it's true that we have a lot of solo operations, so—"
1602002-89 = "There might be an image of snipers being timid and introverted."
1602002-90 = "That lone wolf style does produce a lot of skilled shooters, but..."
1602002-91 = "To work smoothly with your teammate, you need a certain level of social skills."
1602002-92 = "Besides, not minding talking to people is also one of my golden rules as a sniper."
1602002-93 = "[s] \"Golden rules as a sniper?\""
1602002-94 = "Yeah, for example—"
1602002-98 = "Hey, you dropped your bookmark."
1602002-101 = "Ah, thank you so much! It's a very important bookmark!"
1602002-102 = "I think I've seen this signature before..."
1602002-103 = "Could it be the signature of Koi-Yo-Koi sensei, the author of the \"Forbidden Love\" #nseries?"
1602002-104 = "Yes, that's right! It was exclusive to the publication commemorative event!"
1602002-105 = "To recognize it at a glance... Are you a fan of Koi-yo-Koi sensei too?"
1602002-106 = "I wouldn't go so far as to call myself a fan, but I do buy and read this author's #nbooks~"
1602002-107 = "Did you know about the new short story collection from last week?"
1602002-108 = "Nope, I had no idea."
1602002-109 = "Thank goodness... Then, please take this."
1602002-110 = "Wait, this is the new book, right? Are you sure I can have it?"
1602002-111 = "Don’t worry about it—this one’s for spreading the word."
1602002-115 = "I'll gratefully accept it"
1602002-116 = "Oh, if you'd like, give me your contact. I'll send you my thoughts on it later."
1602002-118 = "Yes, please do...!"
1602002-134 = "(After that, Otogi continued to chat happily with the staff and other customers...)"
1602002-135 = "(She gathered various pieces of information and received extra services.)"
1602002-137 = "Ah, that was fun~"
1602002-138 = "Thanks, Sensei. I was able to spend a fun afternoon for the first time in a while~"
1602002-139 = "[s] \"I had a lot of fun too.\""
1602002-143 = "[ns] \"So... what was that about your \"Golden rules as a sniper\"?\""
1602002-144 = "Ah, we were in the middle of that conversation, weren't we."
1602002-145 = "During a mission, a lot of opportunities come your way."
1602002-146 = "I often wondering whether I should pull the trigger now or wait a little longer—"
1602002-151 = "I believe it's better to seize the opportunity without hesitation."
1602002-152 = "You can make up for a mistake, but if you miss that one chance, you’ll never get it back."
1602002-153 = "That's why whenever I encounter something new, I make sure to tackle it head-on."
1602002-154 = "[s9] \"That's a wonderful mindset.\"\n[s10] \"I hope you never change.\""
1602002-157 = "Hehe. Not to brag, but I think I've experienced quite a lot."
1602002-158 = "In the sky, on land, or at sea. There are almost no situations that fall outside my #npredictions—"
1602002-160 = "It's a new product! Please have a sample!"
1602002-161 = "A bold new flavor! A revolution in the cup noodle world: Chili Chocolate Stir-fried #nNoodles!"
1602002-162 = "..."
1602002-163 = "When you find something new, you shouldn't avoid it, you should take it on…"
1602002-164 = "[s11] \"No, you don't have to force yourself to do it!\"\n[s12] \"Sometimes it's okay not to take on a challenge, you know?\""
1602002-167 = "No, Sensei."
1602002-168 = "As a special operator of SRT, there are times you have to charge in even knowing #nit's going to end in failure!"
1602002-169 = "Well then, let's have a taste..."
1602002-171 = "(And so Otogi, with a tragic expression, eating the stir-fried noodles that #nno one else was willing to try...)"
1602002-174 = "Ahaha... It sure was a bold new flavor..."
1602002-181 = "[ns] \"Otogi—!\""
1602002-183 = "(She collapsed with a painful expression.)"