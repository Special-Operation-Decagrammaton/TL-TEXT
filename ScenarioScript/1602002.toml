[translation]
1602002-1 = "Papo furado de um atirador"
1602002-3 = "（Ouvi dizer que um café popular abriu perto do Schale, então decidi dar uma passada）"
1602002-4 = "（O café estava razoavelmente cheio para uma tarde）"
1602002-5 = "[ns1] （Então este é o café que está bombando nas redes sociais...）\r\n[ns2] （Ouvi dizer que eles preparam o café de acordo com o gosto do cliente, mas...）"
1602002-10 = "Bem-vindo. Já decidiu o seu pedido?\r\n"
1602002-11 = "[s] \"Err, um café preto, por favor.\""
1602002-12 = "É a sua primeira vez aqui?\r\n"
1602002-13 = "Para oferecer a xícara perfeita aos nossos clientes, temos uma grande variedade de grãos e equipamentos. #nPor favor, sinta-se à vontade para pedir o que desejar."
1602002-14 = "Quanto aos grãos, prefere o método lavado ou natural? #nE qual nível de torra gostaria?"
1602002-15 = "[s] \"Err, quais são as opções de grãos...?\""
1602002-16 = "Temos Bourbon, Typica, Geisha, Catuai, entre muitos outros—"
1602002-17 = "Quanto ao método de torra, oferecemos diversos níveis.\r\n"
1602002-21 = "[ns] \"Entendi... então, hum...\""
1602002-25 = "Ué, Sensei [USERNAME]?\n"
1602002-26 = "Você também veio por causa do que viu nas redes sociais? #nUltimamente, esse lugar está super comentado, né~"
1602002-27 = "[s3] \"Otogi!\"\r\n[s4] \"Que bom que te encontrei. Me ajuda...\""
1602002-30 = "……Hm? Por que está com essa cara?\r\n"
1602002-31 = "[s] \"Otogi, você vem muito aqui?\""
1602002-32 = "Não, é minha primeira vez. Aconteceu alguma coisa?"
1602002-33 = "……Ah, o menu é um pouco complicado, né."
1602002-34 = "Aliás, se é assim, por que não pergunta para o atendente?\r\n"
1602002-35 = "Como está cheio, não seria um incômodo ficar perguntando tudo?"
1602002-40 = "Então deixa comigo!\r\n"
1602002-43 = "Com licença.\r\n"
1602002-44 = "Sobre a explicação dos grãos, o que significa 'lavado' e 'natural'?"
1602002-45 = "O método lavado consiste em remover a polpa e lavar o grão com água antes da secagem, resultando em um sabor mais limpo."
1602002-46 = "O método natural consiste em secar o grão com a polpa ainda nele, o que confere um sabor característico que lembra frutas."
1602002-47 = "Uau, então é um café com sabor de fruta? #nQue coisa curiosa~"
1602002-48 = "Eu gosto de chá de yuzu, tem algo parecido?"
1602002-49 = "Hoje recebemos um Bourbon com notas cítricas marcantes, gostaria de experimentar esse?"
1602002-50 = "Qual método de extração prefere?"
1602002-51 = "Hum... não entendo muito, então deixo por sua conta."
1602002-52 = "Entendido, vou preparar no método de coado manual."
1602002-53 = "E para o seu acompanhante...?"
1602002-54 = "[s] \"Ah, eu vou querer o mesmo!\""
1602002-55 = "Com certeza. Por favor, aguarde um momento."
1602002-59 = "[ns5] \"Obrigado, você me salvou...\"\n[ns6] \"Os cafés de hoje em dia são tão complicados.\""
1602002-62 = "Pois é... acho que os lugares que se adaptam às necessidades dos clientes estão na moda."
1602002-63 = "Eu gosto porque dá para conversar com os atendentes.\r\n"
1602002-64 = "Mas parece que muita gente desiste quando o pedido é complicado demais."
1602002-65 = "Por mais detalhado que seja o pedido, não existe restaurante que coma o cliente, né?"
1602002-68 = "……Desculpe a demora. Aqui está o seu café."
1602002-69 = "Ah, chegou."
1602002-70 = "Hum~... realmente tem um aroma cítrico muito bom."
1602002-71 = "Se colocar gelo, será que fica parecido com chá gelado?"
1602002-72 = "Não recomendo, pois o aroma se perde com o gelo, mas se precisar, posso trazer algumas pedras de gelo?"
1602002-73 = "Não, deixa pra lá. Já que estou aqui, vou aproveitar esse aroma hoje."
1602002-74 = "Ah, me diga quais grãos combinam com café gelado. Vou pedir esse na próxima."
1602002-75 = "Para que possa comparar, gostaria que eu trouxesse algumas amostras de cold brew?\r\n"
1602002-76 = "Isso parece interessante. Pode ser?"
1602002-84 = "[ns7] \"É surpreendente como a conversa flui tão bem com alguém que acabei de conhecer...\"\n[ns8] \"Sabe, Otogi, você é bem mais sociável do que outros atiradores.\""
1602002-87 = "Outros atiradores...?\r\n"
1602002-88 = "Ah, é verdade que muitos trabalham sozinhos, e..."
1602002-89 = "Existe essa imagem de que atiradores são tímidos e introvertidos, né?"
1602002-90 = "O estilo lobo solitário é comum entre os que são bons de mira, mas...\r\n"
1602002-91 = "Para as coisas fluírem bem com os aliados, é preciso ter um certo nível de sociabilidade."
1602002-92 = "Além disso, não me incomodar em conversar com as pessoas também é uma regra de ouro para mim como atiradora."
1602002-93 = "[s] \"Uma regra de ouro como atiradora?\""
1602002-94 = "Sim, por exemplo..."
1602002-98 = "Ué? Ei, você deixou cair seu marcador de página.\r\n"
1602002-101 = "Ah, muito obrigada! É um marcador muito importante para mim!\r\n"
1602002-102 = "Esse autógrafo, acho que já vi antes..."
1602002-103 = "Por acaso é o autógrafo da autora Koi yo Koi, da série \"Amor Proibido\"?\r\n"
1602002-104 = "Isso mesmo! É uma edição limitada do evento de lançamento!\r\n"
1602002-105 = "Reconhecer de primeira... você também é fã da Koi yo Koi?"
1602002-106 = "Não diria que sou fã, mas compro e leio os livros dessa autora~"
1602002-107 = "Você conhece a nova coletânea de contos da semana passada?\r\n"
1602002-108 = "Não, não sabia."
1602002-109 = "Que bom... então, por favor, fique com este.\r\n"
1602002-110 = "Ué, esse é o lançamento, né? Tem certeza que posso aceitar?"
1602002-111 = "Não se preocupe. Este é para \"divulgação\"."
1602002-115 = "Então, vou aceitar com prazer.\r\n"
1602002-116 = "Ah, se quiser, me passa seu perfil nas redes sociais. Depois te mando o que achei."
1602002-118 = "Sim, com certeza...!\r\n\r\n"
1602002-134 = "(Depois disso, Otogi continuou conversando alegremente com os funcionários e outros clientes...)\r\n"
1602002-135 = "(Coletando várias informações e recebendo um ótimo atendimento.)\r\n"
1602002-137 = "Ah, foi tão divertido~\r\n"
1602002-138 = "Obrigada, Sensei. Fazia tempo que eu não passava uma tarde tão agradável~"
1602002-139 = "[s] \"Eu também me diverti muito.\""
1602002-143 = "[ns] \"Então... sobre a 'regra de ouro como atiradora'?\""
1602002-144 = "Ah, a gente não terminou de falar sobre isso, né?\r\n"
1602002-145 = "Durante as missões, muitas oportunidades surgem."
1602002-146 = "Muitas vezes fico na dúvida se devo puxar o gatilho agora ou esperar, mas..."
1602002-151 = "Eu acho que é melhor agarrar a oportunidade sem hesitar.\r\n"
1602002-152 = "Erros podem ser corrigidos, mas... #nSe você perder uma oportunidade única, nunca mais poderá recuperá-la."
1602002-153 = "Por isso, sempre que encontro algo novo, tento encarar de frente."
1602002-154 = "[s9] \"É um pensamento excelente.\"\r\n[s10] \"Espero que você continue assim.\""
1602002-157 = "Hehe. Não é por me gabar, mas acho que já passei por muita coisa.\n\n"
1602002-158 = "No céu, na terra ou no mar. Quase não existem situações que fujam das minhas previsões--\r\n"
1602002-160 = "Produto novo! Venham provar!"
1602002-161 = "Um sabor inovador! A revolução do mundo dos macarrões instantâneos: macarrão frito com chocolate e pimenta!"
1602002-162 = "............"
1602002-163 = "Quando encontrar algo novo, não deve evitar, deve encarar..."
1602002-164 = "[s11] \"Não, não precisa se forçar a encarar isso, né!?\"\r\n[s12] \"Às vezes, é melhor não encarar, sabia?\""
1602002-167 = "Não, Sensei."
1602002-168 = "Como uma agente especial da SRT, tem horas que precisamos avançar, mesmo sabendo que vai dar errado!"
1602002-169 = "Muito bem, vamos à degustação..."
1602002-171 = "(E então, Otogi, com uma expressão trágica, comeu o macarrão que ninguém mais quis provar...)\r\n"
1602002-174 = "Ahaha... foi um sabor bem inovador mesmo..."
1602002-181 = "[ns] \"Otogi!\""
1602002-183 = "（Caiu no chão com uma expressão de dor）\r\n"
