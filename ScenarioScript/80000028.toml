[translation]
80000028-1 = "チョコレート味の秘薬"
80000028-2 = "サヤの研究室"
80000028-3 = "（連絡を受けて、サヤの研究室を訪れた。）"
80000028-4 = "ぼく様の研究室へようこそなのだ、先生！"
80000028-5 = "今日は先生に試してみたい薬があって、ここに呼んだのだ。"
80000028-6 = "それはこの……チョコレートで作った、不老不死の霊薬！"
80000028-7 = "外に出たらチョコがやたら安く売り出されてたから、せっかくだしチョコレートを使った霊薬を作ってみたのだ。"
80000028-8 = "[s] 逃げる。"
80000028-9 = "ちょっ、どうして逃げるのだ先生！"
80000028-10 = "これも全ては、錬丹術の発展のために必要なことなのに！"
80000028-11 = "[s] \"チョコレートでどうやって不老不死の薬を……？\""
80000028-12 = "チョコレートには抗酸化作用のある成分がたくさん含まれているのだ。"
80000028-13 = "これらの成分を取り出して濃縮、そして他の色んな材料と混ぜれば、身体の年齢を戻すことができそうだと思わないか？"
80000028-18 = "それで完成したのが、この薬。"
80000028-19 = "さあ、先生。心配せずにグイッと行くのだ。チョコを使ってることもあって、味も悪くないはず。"
80000028-20 = "[s] 覚悟を決めて、サヤから渡された薬を飲む。"
80000028-26 = "効果はどうだ？若返ったか？"
80000028-27 = "[s] \"よく分からないかも……。\""
80000028-28 = "そうなのか……？うーん、若返らなかったとしても、身体が光るとか毛が生えるとか、そういう効果はあるはずなのに……。"
80000028-29 = "[s] \"その副作用を知ってて飲ませたんだね……。\""
80000028-30 = "まあまあ。とりあえず、成分の分析でもしてみるのだ。"
80000028-31 = "うーん、これは……あんなにたくさん材料を混ぜたのに、完成品の成分はほぼ普通のチョコレートになってるのだ。中和されちゃったかな？"
80000028-32 = "最終的にはただのチョコレートになった、と……。"
80000028-37 = "仕方ない。失敗作っぽくて申し訳ないけど、これは先生にあげるのだ。"
80000028-38 = "どうせチョコなんだし、そもそもぼく様はそんなにチョコレート好きじゃないし。"
80000028-39 = "それに今日普通に渡したら、なんか変な感じになるし……。"
80000028-40 = "え、今日……？もしかして先生、本気で聞いてるのか？"
80000028-41 = "……。"
80000028-42 = "やっぱり、深刻な副作用が出てるかもしれないのだ。このままここで、検査でもするか？"
