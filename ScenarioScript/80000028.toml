[translation]
80000028-1 = "Elixir com sabor de chocolate"
80000028-2 = "Laboratório da Saya"
80000028-3 = "（Após receber o contato, visitei o laboratório da Saya.）"
80000028-4 = "Bem-vindo ao meu laboratório, Sensei!"
80000028-5 = "Chamei você aqui hoje porque tenho um remédio que quero que experimente."
80000028-6 = "É este... um elixir da imortalidade feito de chocolate!"
80000028-7 = "Como o chocolate estava sendo vendido muito barato lá fora, aproveitei a oportunidade para criar um elixir usando chocolate."
80000028-8 = "[s] Fugir."
80000028-9 = "Ei, por que você está fugindo, Sensei!"
80000028-10 = "Tudo isso é necessário para o avanço da alquimia!"
80000028-11 = "[s] \"Como você pretende fazer um remédio da imortalidade com chocolate...?\""
80000028-12 = "O chocolate contém muitos componentes com propriedades antioxidantes."
80000028-13 = "Se extrairmos esses componentes, concentrarmos e misturarmos com vários outros ingredientes, não acha que seria possível reverter a idade do corpo?"
80000028-18 = "E o que ficou pronto foi este remédio."
80000028-19 = "Vamos lá, Sensei. Beba tudo sem se preocupar. Como leva chocolate, o sabor não deve ser ruim."
80000028-20 = "[s] Tomo coragem e bebo o remédio que a Saya me entregou."
80000028-26 = "Como está o efeito? Você rejuvenesceu?"
80000028-27 = "[s] \"Acho que não sinto nada...\""
80000028-28 = "É mesmo...? Hmm, mesmo que não tenha rejuvenescido, deveria ter efeitos como o corpo brilhar ou crescer pelos, pelo menos..."
80000028-29 = "[s] \"Então você sabia desses efeitos colaterais e me fez beber mesmo assim...\""
80000028-30 = "Bem, bem. Por enquanto, vou analisar os componentes."
80000028-31 = "Hmm, isso é... apesar de ter misturado tantos ingredientes, os componentes do produto final são praticamente apenas chocolate comum. Será que foram neutralizados?"
80000028-32 = "No fim das contas, virou apenas chocolate, então..."
80000028-37 = "Não tem jeito. Sinto muito por ser um fracasso, mas pode ficar com isso, Sensei."
80000028-38 = "De qualquer forma é só chocolate, e eu nem gosto tanto assim de chocolate."
80000028-39 = "Além disso, se eu te entregasse normalmente hoje, seria um pouco estranho..."
80000028-40 = "Hã, hoje...? Por acaso você está perguntando sério, Sensei?"
80000028-41 = "……"
80000028-42 = "Talvez você esteja sofrendo de efeitos colaterais graves, afinal. Que tal fazermos alguns exames aqui mesmo?"
