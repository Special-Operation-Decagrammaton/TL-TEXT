[translation]
42120-1 = "Episódio 12: Resolução Inabalável"
42120-5 = "Parque dos Coelhinhos"
42120-7 = "[ns] \"Cheguei, meninas!\""
42120-9 = "[ns1] \"Ué… pra onde todo mundo foi…?\"\n[ns2] \"Puxa vida, eu comprei marmitas de luxo recheadas de carne de primeira pra vocês…\""
42120-16 = "(……Dei a volta no parque inteiro duas vezes, mas não havia sinal do Esquadrão RABBIT.)"
42120-25 = "(As barracas que antes abrigavam o esquadrão estavam meticulosamente vazias e varridas. No centro da mesa de acampamento, apenas uma única carta de papel branco sob uma pedra.)"
42120-29 = "[ns3] \"O que é isso…?\"\n[ns4] Abri o papel cuidadosamente e comecei a ler a caligrafia da Miyako."
42120-34 = "Para o Professor."
42120-35 = "Professor, é a Miyako. Eu peço o seu mais sincero perdão por me despedir através de uma folha de papel covarde como esta."
42120-39 = "A partir do amanhecer de hoje, nós encerramos as nossas atividades de protesto no Parque dos Coelhinhos e retornaremos aos braços das nossas veteranas."
42120-44 = "As palavras que elas nos disseram no subsolo naquele dia cortaram as nossas ilusões… e nós não conseguimos rebatê-las."
42120-45 = "Além disso… agora que a Diretora Kaya, a única pessoa no governo simpática à ressurreição da nossa Academia, sentou na cadeira de Presidente Interina… a nossa greve na chuva perdeu qualquer sentido tático."
42120-46 = "A nossa sobrevivência nesse parque era brutal demais para continuarmos nos agarrando a uma rebelião vazia e sem propósito."
42120-49 = "A fome constante, o chão de pedra congelante… a humilhação de não ter nem água limpa para lavar nossos corpos sujos de lama…#nNós causamos muita pena e muito incômodo às pessoas ao nosso redor por orgulho."
42120-50 = "E o senhor, Professor… o senhor foi o nosso maior escudo. Nos protegeu, nos alimentou, e nos ouviu."
42120-51 = "Se o senhor não estivesse ao nosso lado, as nossas pernas teriam quebrado muito antes e nós já teríamos desistido."
42120-52 = "Mas agora, as nossas veteranas nos chamam."
42120-53 = "Lá com elas, a Saki terá a hierarquia de ferro que tanto ama; a Moe terá os explosivos táticos que tanto deseja; e a Miyu não terá mais que chorar num saco de dormir molhado. Elas nos deram tudo."
42120-54 = "Confesso que, no fundo da minha alma, os meus ideais ainda sangram e protestam contra essa rendição silenciosa…"
42120-59 = "Mas… no fim do dia, nós somos apenas armas. Fomos forjadas para calar a boca, obedecer a quem segura o gatilho, e matar o alvo."
42120-60 = "Eu fecho meus olhos e rezo com todas as minhas forças para que esta seja a escolha certa para a sobrevivência das minhas meninas."
42120-61 = "……Me perdoe por ser essa aluna ingrata que foge no meio da noite e toma a decisão sem pedir o seu conselho."
42120-62 = "A honra diz que eu deveria olhar nos seus olhos e confessar essa fraqueza. Ou, no mínimo, ligar e ouvir os seus sermões e conselhos uma última vez…"
42120-63 = "Mas se eu escutasse o tom gentil da sua voz… eu sinto que eu iria fraquejar, chorar e jogar a missão fora…"
42120-64 = "Por favor, aceite esta carta fria como a minha despedida. A sua cadete implora por misericórdia."
42120-65 = "Agradeço infinitamente pelo seu calor em nossos dias mais escuros."
42120-66 = "O lixo e os entulhos do nosso acampamento serão recolhidos por equipes de limpeza quando o plano final das nossas veteranas for concretizado."
42120-70 = "Se o destino permitir… eu rezo para que, um dia… nossas armas não estejam apontadas uma para a outra quando nos reencontrarmos."
42120-71 = "De sua aluna, Miyako."
42120-74 = "[ns] Começo a guardar e organizar as tralhas solitárias que as meninas deixaram no parque."
42120-82 = "Arredores do Distrito D.U. - Campo de Treinamento Militar Abandonado"
42120-85 = "Se as coordenadas criptografadas que a veterana mandou baterem, o ponto de extração é bem aqui…"
42120-90 = "Peraí… Isso aqui é uma instalação militar completa?!"
42120-92 = "Como diabos uma mega-estrutura desse porte com pista de pouso tá escondida num buraco no meio da floresta…?"
42120-94 = "Isso é bruxaria. Eu cruzei esses dados de GPS com a visão de satélite comercial hoje de manhã e a tela só mostrava terra batida e árvore…"
42120-95 = "Será que elas ergueram uma cúpula de ECM de grau militar pra distorcer radares e lentes ópticas na atmosfera?!"
42120-101 = "……Este é o Centro de Treinamento e Operações Especiais Confidencial da SRT, erguido pela Presidente Desaparecida."
42120-102 = "O complexo inteiro foi construído fora dos orçamentos públicos como um 'Site Black' para ser a última linha de defesa do governo em caso de colapso.#nEu também só conhecia essa lenda urbana no papel… é a primeira vez que piso aqui…"
42120-104 = "……Demoraram. Finalmente aceitaram o seu destino."
42120-112 = "Comandante Yukino…"
42120-120 = "……Iniciando protocolo de relatório."
42120-121 = "Cadete Tsukiyuki Miyako e três agentes remanescentes, ex-membros da Academia SRT, acatam a ordem absoluta de conscrição imposta pelo Esquadrão FOX."
42120-122 = "Sob esta premissa, o Esquadrão RABBIT é oficialmente declarado morto e desmantelado. O controle tático, a vida e a morte de cada ex-membro são agora transferidos incondicionalmente para a autoridade da Comandante do Esquadrão FOX, Shichido Yukino."
42120-124 = "――Transferência de cadeia de comando confirmada e selada. A partir deste segundo, as cadetes lideradas por Tsukiyuki Miyako não possuem mais nomes ou autonomia, e atuarão exclusivamente como um Destacamento Tático descartável sob o selo do Esquadrão FOX."
42120-130 = "Sejam muito bem-vindas ao verdadeiro submundo militar, Destacamento RABBIT."
42120-131 = "……Nós servimos à FOX."
42120-139 = "Opa, as portinhas abriram! Venham pras trincheiras com a gente, coelhinhas!"
42120-140 = "……Vocês rastejam devagar. Nós odiamos esperar por subordinados atrasados."
42120-141 = "Veterana Otogi… Veterana Kurumi…!"
42120-143 = "A caminhada pela lama deve ter sido cansativa pra vocês."
42120-144 = "Estão morrendo de fome, não estão? Preferem que eu esquente a janta primeiro, ou querem jogar essa sujeira no ralo com um banho quente e sabonete?"
42120-149 = "E-Espera… banho quente…?"
42120-150 = "Nessa base… tem água quente saindo do teto pra gente…?"
42120-152 = "Mas é claro que sim. #nA assepsia corporal de um soldado dita noventa por cento da imunidade dele no front. Sangue seco e bactérias derrubam mais esquadrões que balas inimigas."
42120-153 = "Se o alto comando esperasse que a elite sangrasse em simulações sem ter um chuveiro de alta pressão pra limpar a farda depois… seria um inferno amador."
42120-159 = "Ah… ops… e-eu sinto muito pela insensibilidade…"
42120-160 = "Não peça desculpas. A escolha de definhar na lama abraçadas aos nossos egos rasgados foi cem por cento nossa."
42120-162 = "Nossos alojamentos subterrâneos possuem duchas de alta pressão e camas com colchões térmicos para cada uma de vocês.#nSintam-se em casa e usem à vontade."
42120-164 = "M-Muito obrigada… de verdade…!"
42120-165 = "Uuuuuh, aleluia… Eu vou me esfregar com bucha até a minha pele derreter e depois hibernar por três dias debaixo de um edredom cheiroso…"
42120-167 = "Lavar o sangue é bom, mas antes disso… eu acho que a gente tem um pequeno ritual pendente."
42120-175 = "O Trote Tático de Aperfeiçoamento de Sobrevivência começa agora! Chão!"
42120-180 = "T-Trote Tático…? O-O que é isso?!#nPor que logo agora…?"
42120-182 = "Quando a gente limpou o chão com a cara de vocês no cativeiro, eu notei que a memória muscular e o tempo de reação de vocês viraram um lixo frouxo."
42120-183 = "Por isso, como presente de boas-vindas da veterana, eu vou torturar vocês na pista de obstáculos até os ossos de vocês lembrarem do básico!"
42120-185 = "Destacamento RABBIT, vistam a farda de assalto pesado e formem linha no pátio em um minuto! Quem demorar paga dez voltas!!"
42120-186 = "Uuuuu… e eu achando que meus ossinhos doloridos iam abraçar o edredom quente logo…"
42120-187 = "As nossas ídolas absolutas quebrando o nosso corpo na porrada e ensinando táticas… Meu Deus, isso é um sonho virando realidade."
42120-188 = "Foco, esquadrão! Abandone a bagagem no chão e equipem os coletes pesados! Não vamos fazer feio pros olhos das veteranas!"
42120-189 = "……Eu acho que não tem nenhum outro masoquista fardado em toda a academia que sorriria perante uma sentença de tortura física surpresa, além de você, Saki."
42120-190 = "Tanto faz, se no final dessa desgraça eu puder chorar debaixo de água limpa e quente… eu aceito tomar surra o dia todo e focar no treinamento."
42120-192 = "Fufu. Ver o pátio cheio de gritos de ordem me encheu de nostalgia.#nVou caprichar no tempero do ensopado de carne pra repor o músculo rasgado delas à noite."
42120-198 = "……Miyako? Qual o problema?#nOs seus olhos estão vagando longe de novo."
42120-199 = "Ah, não… não é nada demais… eu só…"
42120-205 = "……Esquece. Minha mente me traiu."
42120-209 = "Próximo Episódio: Choque e Pavor"