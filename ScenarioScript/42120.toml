[translation]
42120-1 = "Episódio 12; Determinação"
42120-5 = "Parque dos Coelhinhos"
42120-7 = "[ns] \"Cheguei.\""
42120-9 = "[ns1] \"Ué, cadê todo mundo...?\"\n[ns2] \"Trouxe marmitas de carne bovina de alta qualidade, mas...\""
42120-16 = "（...Procurei pelo parque por um tempo, mas não consegui encontrar as integrantes do esquadrão RABBIT em lugar nenhum.）"
42120-25 = "（A barraca onde as integrantes do esquadrão dormiam estava limpa e arrumada, e uma carta foi deixada para trás.）"
42120-29 = "[ns3] \"Isso é...\"\n[ns4] Leio a carta deixada sobre a mesa."
42120-34 = "Para o Sensei [USERNAME]."
42120-35 = "Sensei, aqui é a Miyako. Sinto muito por me despedir através de uma carta."
42120-39 = "A partir de hoje, encerraremos a manifestação no Parque dos Coelhinhos e retornaremos para onde estão nossas veteranas."
42120-44 = "Isso se deve ao fato de termos aceitado as palavras das veteranas naquele dia e..."
42120-45 = "Já que a Chefe Kaya, que é favorável à restauração da SRT, tornou-se a representante da Presidente do Conselho Estudantil, #nnão há mais motivos para continuarmos com a manifestação aqui."
42120-46 = "A vida no parque não é nada fácil para continuarmos uma luta sem propósito."
42120-49 = "Em um ambiente onde é difícil conseguir comida, um lugar para dormir... ou até mesmo tomar banho... #ncausamos muitos problemas a todos vocês."
42120-50 = "Além disso, o Sensei nos ajudou muito."
42120-51 = "Se não fosse pelo Sensei, acho que teríamos desistido há muito tempo."
42120-52 = "Mas agora, temos nossas veteranas."
42120-53 = "A vida com a disciplina rigorosa que a Saki busca, o equipamento poderoso que a Moe deseja, #ne o quarto aquecido que a Miyu quer; temos tudo isso."
42120-54 = "Embora, em relação às minhas convicções, ainda haja algo que me incomoda..."
42120-59 = "No fim das contas, somos apenas armas que seguem ordens."
42120-60 = "Espero apenas que esta seja a melhor escolha."
42120-61 = "...Sinto muito por ser uma aluna ruim que decide as coisas por conta própria, sem consultar o Sensei."
42120-62 = "Eu sei que o correto seria conversar pessoalmente, e se não fosse possível, pelo menos ligar para o Sensei para pedir conselhos, mas..."
42120-63 = "Se eu ouvisse a voz do Sensei, sinto que acabaria ficando confusa..."
42120-64 = "Por favor, perdoe-me por me despedir desta forma, através de uma carta."
42120-65 = "Até agora, causamos muitos transtornos."
42120-66 = "Limparemos os suprimentos que ficaram no parque assim que a operação terminar."
42120-70 = "Se houver uma oportunidade, espero que possamos nos encontrar novamente... em outro lugar e em outras circunstâncias."
42120-71 = "De Miyako."
42120-74 = "[ns] Recolho um pouco da bagagem deixada no parque."
42120-82 = "Subúrbios de D.U. - Campo de Treinamento Militar Abandonado"
42120-85 = "Se as coordenadas estiverem corretas, este é o tal ponto, mas..."
42120-90 = "Isso é... um campo de treinamento militar?"
42120-92 = "Como uma instalação desse porte existia em um lugar tão isolado..."
42120-94 = "Estranho. Nas fotos de satélite e nos mapas online, aparece apenas como um terreno baldio..."
42120-95 = "Será que instalaram algum dispositivo de ECM de grande porte para bloquear as funções de reconhecimento das câmeras?"
42120-101 = "...Este é um campo de treinamento militar exclusivo da SRT, construído antes do desaparecimento da Presidente do Conselho Estudantil."
42120-102 = "Sua própria existência era tratada como confidencial para que pudesse ser usada como base em caso de emergência. #nÉ a primeira vez que venho aqui também, mas..."
42120-104 = "...Parece que você finalmente tomou uma decisão."
42120-112 = "Veterana Yukino..."
42120-120 = "...Relatando."
42120-121 = "Pertencente à Academia Especial SRT, Tsukiyuki Miyako e as outras três integrantes receberam ordens de transferência para o esquadrão FOX."
42120-122 = "Portanto, a partir deste momento, o esquadrão RABBIT está dissolvido. A autoridade de controle das integrantes do esquadrão é transferida para a capitã do esquadrão FOX, a capitã Shichido Yukino."
42120-124 = "――Transferência de autoridade de controle confirmada. A partir deste momento, Tsukiyuki Miyako e as outras três atuarão como o destacamento RABBIT, subordinado ao esquadrão FOX."
42120-130 = "Bem-vindas ao esquadrão FOX, destacamento Miyako."
42120-131 = "...Muito obrigada."
42120-139 = "Ah, chegaram. Nossas veteranas coelhinhas."
42120-140 = "...Demoraram. Pretendiam fazer as veteranas esperarem por quanto tempo?"
42120-141 = "Veterana Otogi, veterana Kurumi...!"
42120-143 = "Pessoal, obrigada pelo esforço de virem de tão longe."
42120-144 = "Vocês estão com fome, né? Querem comer? Ou preferem um banho?"
42120-149 = "U-um banho...?"
42120-150 = "A-aqui também tem um chuveiro...?"
42120-152 = "Claro que tem. #nManter a higiene é um problema sério que afeta diretamente o poder de combate de uma unidade."
42120-153 = "Mesmo em condições precárias, treinar sem instalações de banho é..."
42120-159 = "Ah... d-desculpe."
42120-160 = "Está tudo bem. Escolhemos aquele parque como nossa base por conta própria."
42120-162 = "Este campo de treinamento tem chuveiros e camas para todos. #nPodem usar as instalações o quanto quiserem."
42120-164 = "Muito obrigada...!"
42120-165 = "Ah, que cansaço... Quero logo tomar um banho e me enfiar em um cobertor bem fofinho..."
42120-167 = "Um banho é bom, mas antes disso..."
42120-175 = "Vamos começar o treinamento de aprimoramento de habilidades especiais agora!"
42120-180 = "T-treinamento de habilidades especiais...? #nPor que..."
42120-182 = "Senti que a capacidade básica de combate de vocês caiu bastante na última batalha."
42120-183 = "Por isso, aproveitando a festa de boas-vindas, vou testar as habilidades de vocês com calma mais uma vez."
42120-185 = "Esquadrão RABBIT, todas troquem de roupa e se reúnam no campo de treinamento!"
42120-186 = "Ugh... e eu que pensei que finalmente ia conseguir dormir em uma cama..."
42120-187 = "As veteranas nos treinando pessoalmente... isso me dá ânimo."
42120-188 = "Certo, vamos nos apressar. Precisamos desarrumar as malas e trocar de roupa logo!"
42120-189 = "...Acho que você é a única na SRT que consegue ficar feliz com um treinamento inesperado."
42120-190 = "Mas, como aqui tem chuveiros... acho que vou conseguir me concentrar no treino sem preocupações."
42120-192 = "Hehe. Já que as novatas chegaram, vai valer a pena preparar o jantar."
42120-198 = "...? Miyako, o que houve? #nEstá preocupada com alguma coisa?"
42120-199 = "Ah, não... é só que..."
42120-205 = "...Não é nada."
42120-209 = "Próximo episódio: Choque e Pavor"
