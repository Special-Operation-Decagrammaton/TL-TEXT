[translation]
10002180-1 = "後日談その5;狙撃手の矜持"
10002180-2 = "（その後スイカ割りに使ったスイカを、みんなで食していた）"
10002180-3 = "このスイカ、冷たくて美味しいです！"
10002180-4 = "そうですね。ちょっと砂が付いてしまいましたが、甘くて良い感じです。"
10002180-5 = "こんなに砂が付いてしまったのはその、銃を使ったからだと思うのですが……。"
10002180-6 = "えっと、あ、アズサちゃんはどうです？美味しいですか？"
10002180-7 = "水分補給には最適だね。ただ、こういう摂取方法では、あまりにも簡単に多量の水分が摂取できてしまうことが、逆にデメリットかな。"
10002180-8 = "不意の利尿作用にどう対応するか、その方策を考えておかないと……。"
10002180-9 = "あわわわっ！"
10002180-10 = "そ、そういう話は今はダメです！他の方もいますし、その、せ、先生もいらっしゃいますし……！"
10002180-15 = "す、すすすスイカ……！せ、先生と一緒に、す、スイカ……きひひひひひっ、モグモグ……。"
10002180-16 = "くひひひひひ、ひひっ……。"
10002180-17 = "モグモグモグモグ……うーん、美味しい～！"
10002180-18 = "スイカってすごいよね！塩を振っても美味しいし、砂糖をかけても美味しいし！"
10002180-19 = "はっ、だとするともしかして……わさびを付けても美味しかったり！？"
10002180-21 = "はいっ！？わ、わさびは流石に、無理なのではないでしょうか……！？"
10002180-22 = "（それにしても良かったです。ようやく、ちょっと平和なひと時が……スイカ割りという名の狙撃合戦も、中断してもらえましたし……）"
10002180-24 = "さて、では食べ終わったら次の項目を始めましょうか？"
10002180-25 = "えっと、ハスミさんからもらったリストで残っているのは……"
10002180-26 = "あ、そういえば私、一つ気になることがあるんだけど……。"
10002180-27 = "は、はい。なんでしょう、イズミさん？"
10002180-28 = "結局さっきのあのスイカ割り？の勝負は、どっちが勝ったの？"
10002180-29 = "……はい？"
10002180-30 = "ちゅ、中断させたイズミさんがそれを言いますか！？というかその話題、再燃させちゃ駄目です！！"
10002180-36 = "……そういえば、まだ決着はついてない。"
10002180-37 = "危うく失念するところでした、ありがとうございます。このまま曖昧にしてしまっては、正義実現委員会の名折れです！"
10002180-38 = "それはこっちも同じ。明確な結論を出さずに戦場から退くなんて……補習授業部の名にかけて、そんなことは出来ない。"
10002180-40 = "アズサちゃん！？補習授業部の看板にそんな重さは無いと思いますよ！？"
10002180-41 = "にしても、勝負を続けようにもスイカがもう無いし……。"
10002180-42 = "では、別のものを使いましょう！"
10002180-43 = "あのヤシの木の実なんていかがでしょうか？"
10002180-44 = "なるほど。私としてはもっと難易度を高くして、あの浜辺の岩に乗っかっている小石でも構わない。"
10002180-45 = "そういうことであれば、あの水平線あたりに浮かんでいるブイでも大丈夫です！"
10002180-46 = "お、お二人ともちょっと待ってください……！"
10002180-47 = "ここで競っても何にもなりませんし、危ないですし……それよりもその、ハスミさんから渡されたリストを……！"
10002180-48 = "[s] \"まあスポーツの範疇だと思うし、良いんじゃないかな？\""
10002180-50 = "先生まで！？"
10002180-51 = "そういえば、ちょうどここに先生が海岸のお店で購入した「1/7スケールフィギュア」……？とかいうものがある。"
10002180-52 = "ちょうど分かりやすくて良い的になりそうだ。先生、ちょっと借りるね。"
10002180-53 = "[s] \"無益な争いは止めた方が良いと先生は思うな！！！！\""
10002180-58 = "（ドタバタ……ドカン！！パキィィィンッ！）"
10002180-62 = "ど、どうして結局こうなっちゃうんですかぁぁっ！？"
10002180-68 = "モグモグ……。"
10002180-69 = "うん！"
10002180-70 = "スイカにわさびも結構合うね！！"
