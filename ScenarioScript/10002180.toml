[translation]
10002180-1 = "Epílogo 5: O orgulho de um atirador"
10002180-2 = "（Depois disso, todos comeram a melancia que foi usada para a brincadeira de quebrar a melancia）"
10002180-3 = "Esta melancia está geladinha e deliciosa!"
10002180-4 = "É verdade. Acabou pegando um pouco de areia, mas está doce e muito boa."
10002180-5 = "Acho que entrou tanta areia assim porque, bem, usamos armas para isso..."
10002180-6 = "Err, ah, Azusa-chan, o que você acha? Está gostosa?"
10002180-7 = "É ótima para se hidratar. Mas, o lado negativo de consumir dessa forma é que é fácil demais ingerir uma grande quantidade de água de uma vez só."
10002180-8 = "Preciso pensar em uma estratégia para lidar com o efeito diurético inesperado..."
10002180-9 = "Awa-wa-wa!"
10002180-10 = "E-esse tipo de assunto não pode ser discutido agora! Tem outras pessoas aqui e, bem, o Sensei também está presente...!"
10002180-15 = "Me-me-me-melancia...! Com o Sensei, me-melancia... kihihihihi, nham nham..."
10002180-16 = "Kuhihihihi, hihi..."
10002180-17 = "Nham nham nham nham... hum, que delícia~!"
10002180-18 = "Melancia é incrível, né! Fica boa com sal e também fica boa com açúcar!"
10002180-19 = "Ah, sendo assim, será que... também ficaria gostosa com wasabi!?"
10002180-21 = "Hã!? Wa-wasabi já é pedir demais, não acha...!?"
10002180-22 = "（Ainda bem que, finalmente, tivemos um momento de paz... e conseguimos interromper aquela batalha de tiro disfarçada de brincadeira de quebrar melancia...）"
10002180-24 = "Bem, então, quando terminarem de comer, podemos começar o próximo item?"
10002180-25 = "Err, o que sobrou da lista que a Hasumi-san nos deu é..."
10002180-26 = "Ah, falando nisso, tem uma coisa que eu queria saber..."
10002180-27 = "S-sim. O que seria, Izumi-san?"
10002180-28 = "No fim das contas, quem ganhou aquela disputa de quebrar melancia?"
10002180-29 = "……Sim?"
10002180-30 = "Vo-você que interrompeu a gente está perguntando isso, Izumi-san!? E não tente reacender esse assunto!!"
10002180-36 = "……Pensando bem, ainda não houve um vencedor."
10002180-37 = "Quase me esqueci disso, obrigada. Deixar as coisas assim, sem conclusão, seria uma desonra para o Comitê de Justiça!"
10002180-38 = "O mesmo vale para mim. Retirar-me do campo de batalha sem um resultado claro... em nome do Clube de Estudos Suplementares, não posso permitir isso."
10002180-40 = "Azusa-chan!? Acho que o nome do Clube de Estudos Suplementares não tem esse peso todo!"
10002180-41 = "Mas, mesmo que queiram continuar, não tem mais melancia..."
10002180-42 = "Então, vamos usar outra coisa!"
10002180-43 = "Que tal aquele coco ali?"
10002180-44 = "Entendo. Por mim, podemos aumentar a dificuldade e usar aquela pedrinha em cima da rocha na praia."
10002180-45 = "Se for assim, aquela boia flutuando perto do horizonte também serve!"
10002180-46 = "E-esperem um pouco, vocês duas...!"
10002180-47 = "Competir aqui não vai levar a nada e é perigoso... Em vez disso, vamos focar na lista que a Hasumi-san nos deu...!"
10002180-48 = "[s] \"Acho que está dentro do escopo de um esporte, então por que não?\""
10002180-50 = "Até você, Sensei!?"
10002180-51 = "Falando nisso, o Sensei acabou de comprar uma \"figura escala 1/7\"... ou algo assim, na loja da praia."
10002180-52 = "Parece um alvo fácil e perfeito. Sensei, vou pegar emprestado."
10002180-53 = "[s] \"O Sensei acha que vocês deveriam parar com essa disputa inútil!!!!!!!!\""
10002180-58 = "（Tumulto... Estrondo!! Crack!!）"
10002180-62 = "Po-por que as coisas sempre acabam assim!?"
10002180-68 = "Nham nham..."
10002180-69 = "Hum!"
10002180-70 = "Melancia com wasabi até que combina bem!!"
