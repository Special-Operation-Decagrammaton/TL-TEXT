[translation]
1402-1 = "GUNS N' PEPPERS（２）"
1402-2 = "Departamento de Engenharia - Sala de Trabalho"
1402-3 = "Está pronta, Kotori?"
1402-4 = "Com certeza, Senpai! Estou pronta!"
1402-5 = "Muito bem... o momento da revelação."
1402-7 = "Tcharam! Finalmente está pronto!#nEste é o novo invento do nosso Departamento de Engenharia, uma submetralhadora equipada com um dispositivo de disparo de Chavasco!"
1402-8 = "Parece uma submetralhadora comum, mais do que eu esperava.#nMas ela funciona de verdade, não é?"
1402-9 = "Com certeza, Senpai! Só precisamos de munições especiais feitas com uma mistura de pimenta e vinagre, em vez de balas comuns!"
1402-10 = "Se você colocar essa munição especial no pente e puxar o gatilho, a explosão da pólvora fará com que os ingredientes da pimenta fermentem em altíssima velocidade..."
1402-11 = "Pshhhhhhh!!"
1402-12 = "E assim, o Chavasco é disparado pelo cano!"
1402-13 = "Deixe-me ver..."
1402-16 = "...Entendo, isso é definitivamente Chavasco. E tem o mesmo gosto do que vendem na loja, não é?"
1402-17 = "Fizemos experimento atrás de experimento para conseguir reproduzir esse sabor!#nColocamos toda a essência da tecnologia do Millennium nesta arma!"
1402-18 = "Além disso, se mudar para o modo automático, ela consegue disparar 1 litro de Chavasco por segundo..."
1402-19 = "Ratatatatatata!"
1402-20 = "Hehe! Com esta arma, de agora em diante, não importa onde ou quando eu coma pizza, poderei colocar o quanto de Chavasco eu quiser!"
1402-21 = "Entendo, isso é surpreendente. É melhor do que eu imaginava."
1402-22 = "Esta arma é, de fato, perfeitamente..."
1402-23 = "...completamente inútil, não é?"
1402-24 = "Bem, é verdade...#nÉ muito mais fácil e econômico carregar um frasco pequeno de Chavasco do que carregar esta arma por aí."
1402-25 = "E depois de usar, o cano fica todo melado de Chavasco, então a limpeza é um incômodo...#nTambém tem problemas de higiene..."
1402-27 = "Hehe... bem, é divertido, então está tudo bem."
1402-28 = "Invenções nem sempre trazem resultados satisfatórios. É aproveitando o processo de qualquer coisa que, um dia, grandes resultados surgem naturalmente."
1402-29 = "É verdade! Ao realizar este experimento, conseguimos obter vários conhecimentos sobre dispositivos de disparo de líquidos. Acho que podemos aplicar essas tecnologias de várias formas no futuro."
1402-30 = "Como dizem, o erro é o professor do sucesso..."
1402-33 = "...A propósito, de quem é esta arma que vocês usaram para a modificação?"
1402-34 = "Hã? Esta arma não era da Utaha-senpai?"
1402-35 = "A minha é bem menor que essa.#nAlém disso, a minha é tecnicamente uma pistola-metralhadora sem coronha. Esta aqui é uma submetralhadora, não é?"
1402-36 = "Mas esta não é minha!"
1402-37 = "...Também não é minha."
1402-38 = "...Espere. Este padrão de dragão desnecessariamente chamativo..."
1402-39 = "Se tem alguém que gravaria um padrão desses em uma arma..."
1402-42 = "Ah, finalmente terminaram o conserto?#nÉ raro o Departamento de Engenharia demorar tanto."
1402-43 = "Neru-senpai...!?#nO-o que você está fazendo aqui?"
1402-44 = "Hã? Como assim o que estou fazendo? Vim buscar a arma que deixei para conserto.#nAlgum problema?"
1402-45 = "A-a-ah, é verdade... é verdade!?#nE-eu me esqueci completamente. Ahaha..."
1402-46 = "Hum, o que foi? Disse que esqueceu, mas já estava com a minha arma pronta aí, não estava?#nO conserto terminou, né? Então vou levar."
1402-47 = "E-espere! Esta arma ainda tem um problema...!"
1402-48 = "Hã? Com tanto tempo que tiveram, ainda não terminaram o conserto?#nEntão o que foi aquele \"está pronto\" que ouvi lá de longe?"
1402-49 = "...Não me digam que vocês aceitaram consertar minha arma e ficaram fazendo outras coisas enquanto isso! Hã?!"
1402-50 = "N-não, não é nada disso...!"
1402-51 = "Ah, é? Então sem problemas.#nVou levar."
1402-53 = "S-sim... c-cuidado ao sair..."
1402-54 = "Ah, valeu. Vou usá-la bastante de novo."
1402-56 = "S-s-s-senpai! O que faremos!?#nA Neru-senpai levou a arma modificada embora!?"
1402-57 = "Se ela descobrir que a arma dela foi transformada em um dispensador de Chavasco, com certeza não vamos sair ilesas disso..."
1402-58 = "Estamos perdidas... Não tenho dúvidas de que a Neru-senpai vai voltar furiosa e nos cobrir de Chavasco...!"
1402-59 = "Calma, vocês duas. Ela ainda não descobriu."
1402-60 = "Se conseguirmos recuperar a arma antes que a Neru perceba e terminarmos o conserto, podemos resolver isso pacificamente."
1402-61 = "Quer dizer que temos que roubar a arma da Neru-senpai sem ela perceber!? Isso é impossível! Seria mais realista tentar colocar um sino na coleira de um leão enfurecido!"
1402-62 = "Em ambos os casos, o resultado final é a morte, não é mesmo..."
1402-63 = "Primeiro, vou criar uma réplica para trocar pela arma da Neru. Até que eu termine, quero que vocês duas distraiam a Neru para que ela não toque no gatilho."
1402-64 = "Mas... e se a Neru-senpai perceber que algo está errado com a arma dela antes de terminarmos?"
1402-65 = "Eu nem quero pensar nisso..."
1402-66 = "Vamos apenas rezar para que a paciência dela não se esgote."
