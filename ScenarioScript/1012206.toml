[translation]
1012206-1 = "De mim que comecei a caminhar..."

1012206-2 = "(Fui procurar Mika, que parecia diferente do normal.)"

1012206-5 = "[ns] \"Isso é...?\""

1012206-6 = "Hehehe...hehe."

1012206-10 = "[ns] \"Mika...?\""

1012206-12 = "um……."

1012206-13 = "Sensei~ Daaaa~ Ehehe~"

1012206-14 = "Você realmente veio..."

1012206-15 = "Ei, se você apenas sentar aqui..."

1012206-16 = "[ns] \"Hmm? O que aconteceu...?\""

1012206-17 = "Não consigo parar de me apaixonar por isso. Eu me pergunto se devo beber..."

1012206-18 = "Ei, você tem algo em que pensar?"

1012206-19 = "Sensei, você também gosta?"

1012206-20 = "Ahaha. Sente-se ao meu lado."

1012206-21 = "[ns] (senta ao lado de Mika)"

1012206-24 = "Ahaha... ele sentou ao meu lado..."

1012206-25 = "[ns1] \"Há algo que você queira conversar?\"\n[ns2] \"Vou perguntar qualquer coisa.\""

1012206-28 = "um……."

1012206-29 = "Hehe... essa é uma ótima resposta..."

1012206-30 = "Pois bem, podemos conversar?"

1012206-34 = "...Pensei nisso por um momento."

1012206-35 = "No passado? Warahi, você quer uma princesa?"

1012206-36 = "Ahaha~ não estou mentindo, é verdade…?"

1012206-37 = "Consegui tudo que queria e fiz o que quis."

1012206-38 = "Ei, todos ouviram o que eu disse."

1012206-39 = "O mesmo vale para a facção Patel... Acho que eles nem serão escolhidos pelo Tea Party..."

1012206-40 = "Todas essas coisas parecem óbvias..."

1012206-41 = "Hehehe... Warahi é uma criança perfeita e é reconhecida por todos como uma criança incrível..."

1012206-42 = "Uuuuu..."

1012206-43 = "[ns] \"…….\""

1012206-44 = "Isso foi realmente estúpido."

1012206-45 = "Eu fiz algo que não pode ser desfeito... e fui punido..."

1012206-46 = "Mesmo depois disso..."

1012206-47 = "Hehe, é por isso...."

1012206-48 = "A princesa da festa do chá que estava sempre brilhando e sendo mimada... eu não conseguia entendê-la de jeito nenhum."

1012206-49 = "O \"eu verdadeiro\" não é uma boa garota, e eu não sou nada legal..."

1012206-50 = "Ela é uma garota muito má que tem um coração sombrio e está bem com isso, desde que seja boa."

1012206-51 = "Esse fui eu..."

1012206-55 = "Eu me pergunto por que sempre acabo fazendo bagunça..."

1012206-56 = "Por que... por que...?"

1012206-60 = "[ns] \"Era com isso que você estava preocupado.\""

1012206-61 = "Sim……."

1012206-62 = "Ultimamente, quando estou sozinho, me pego pensando em coisas assim..."

1012206-63 = "[s3] \"É certamente difícil falar.\"\n[s4] \"A atmosfera tem que ser diferente do normal.\""

1012206-69 = "Ah, isso...?"

1012206-70 = "[s] \"Você está bebendo suco, certo?\""

1012206-71 = "Uh, uh..."

1012206-72 = "O que devo fazer? É tão constrangedor! !"

1012206-73 = "Não consigo mais ver o rosto do meu Sensei! !"

1012206-74 = "[s] \"Era difícil falar quando você estava em seu estado habitual de tensão.\""

1012206-75 = "Ei, me escute, Sensei! ? Dizem que nesse tipo de ambiente você pode falar abertamente! ?"

1012206-76 = "Porque... eu estava com medo de falar sobre isso..."

1012206-77 = "Então pensei, talvez devesse imitar um adulto..."

1012206-78 = "[ns5] \"Você não precisa se forçar a fazer isso, está tudo bem.\"\n[ns6] \"Agora, Mika pode dizer honestamente como ela se sente, certo?\""

1012206-81 = "……Sim."

1012206-82 = "Já é uma história sombria... Ugh."

1012206-83 = "……."

1012206-84 = "Parece estúpido..."

1012206-85 = "Ao Sensei e a todos..."

1012206-86 = "Acho que vou continuar incomodando você..."

1012206-87 = "Acho que não posso fazer coisas que são normais para outras crianças. #nEntão, continuei fazendo coisas estranhas..."

1012206-88 = "[s7] \"Acho que Mika está fazendo um ótimo trabalho.\"\n[s8] \"Agora é um momento importante para olhar para si mesmo.\""

1012206-91 = "Ah, sim?"

1012206-92 = "Você está trabalhando duro...?"

1012206-93 = "É importante olhar para si mesmo..."

1012206-97 = "Eu pensei que era estúpido por me preocupar tanto, mas..."

1012206-98 = "Não é um desperdício...?"

1012206-99 = "[s] \"É um passo importante para avançar.\""

1012206-100 = "Para seguir em frente..."

1012206-101 = "Um passo importante..."

1012206-108 = "Talvez eu ainda não saiba..."

1012206-109 = "mas……."

1012206-110 = "Sensei para mim..."

1012206-111 = "Porque essas são as palavras que você disse..."

1012206-112 = "Acho que vou continuar a me preocupar um pouco mais com isso."

1012206-113 = "[s9] \"Vamos valorizar esse sentimento.\"\n[s10] \"O tempo que passamos nos preocupando assim... apoiará Mika no futuro.\""

1012206-116 = "……."

1012206-117 = "Sim, nunca vou esquecer..."

1012206-118 = "Estou pensando nisso há muito tempo..."

1012206-119 = "...Estou feliz por ter conseguido conversar com a Senseia."

1012206-125 = "Bem, eu me senti meio aliviado... e então comecei a sentir sono..."

1012206-126 = "[s] \"...Hein?\""

1012206-127 = "Hummm..."

1012206-128 = "……."

1012206-134 = "[ns11] \"…….\"\n[ns12] \"...Mika?\""

1012206-138 = "(Carreguei Mika, que havia adormecido, nas costas para o quarto...)"

