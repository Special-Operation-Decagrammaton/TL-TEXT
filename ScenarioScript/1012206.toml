[translation]
1012206-1 = "歩み始めた私から……"
1012206-2 = "（なんだかいつもと様子が違うミカを探しに行った）"
1012206-5 = "[ns] \"こっちかな……？\""
1012206-6 = "ふへへぇ……へへ。"
1012206-10 = "[ns] \"ミカ……？\""
1012206-12 = "あ……。"
1012206-13 = "せんせぇ～だあぁ～えへへ～ "
1012206-14 = "本当にぃ……来てくれたんだねぇ～"
1012206-15 = "私ねえ、ここれぇ、座ってただけらよぉ～うぅん……。"
1012206-16 = "[ns] \"ん？どうしたの……？\""
1012206-17 = "おいひくてとまらなくなっちゃっらぁ。なんはい飲んらかなぁ……。"
1012206-18 = "ちょっと～考え事もあっらひぃ？"
1012206-19 = "先生も、ろむ～？"
1012206-20 = "あははっ。隣に座っれすわっれぇ～"
1012206-21 = "[ns] （ミカの隣に座る）"
1012206-24 = "あははぁ……となり座ってくれたぁ……。"
1012206-25 = "[ns1] \"なにか、話したいことがあるんでしょ？\"\n[ns2] \"なんでも聞くよ。\""
1012206-28 = "あ……。"
1012206-29 = "へへぇ～……ご名答ぉ……。"
1012206-30 = "じゃぁ～話しちゃおっかな～？"
1012206-34 = "……ちょっと、考えてみたんら。"
1012206-35 = "昔はれぇ～？わらひ、お姫様らったんらよぉ？"
1012206-36 = "あはは～うそじゃないって、ほんとらよぉ……？"
1012206-37 = "欲しいものはなんれも手に入ったし、好き勝手してたのぉ～"
1012206-38 = "みん～な言うこと聞いてくれてへぇ～"
1012206-39 = "パテル分派でもそうれ……ひょのまま、ティーパーティーにも選ばれたりねぇ……。"
1012206-40 = "ぜ～んぶ、当たり前のことらとおもっへふぁのぉ……。"
1012206-41 = "えへへぇ……わらひはかんぺきで、みんなが認めるすごい子なんらってぇ……。"
1012206-42 = "うぅぅ……。"
1012206-43 = "[ns] \"……。\""
1012206-44 = "ほんと、バカだったなあ。 "
1012206-45 = "取り返しがつかないことをして……罰を受けて……。"
1012206-46 = "その後も……。"
1012206-47 = "へへ、だからぁ……。"
1012206-48 = "いつもキラキラして～ちやほやされてたティーパーティーのお姫様は……ち～っともわかっれなかったんらぁ。"
1012206-49 = "「ほんとの私」は良い子じゃないし、ちっとも素敵じゃないのにれぇ～……。"
1012206-50 = "腹黒くて、自分が良ければそれでいい、とっても悪い子。"
1012206-51 = "それが……私だったんだよね……。"
1012206-55 = "なんで、いつもめちゃくちゃにしちゃうんだろう……。"
1012206-56 = "なんで……なんでなの……？"
1012206-60 = "[ns] \"それで悩んでたんだね。\""
1012206-61 = "うん……。"
1012206-62 = "最近は、一人になると、こんなことばっかり考えちゃう……。"
1012206-63 = "[s3] \"たしかに、話しづらいよね。\"\n[s4] \"いつもと違う空気でもないと。\""
1012206-69 = "あ、あれ……？"
1012206-70 = "[s] \"飲んでるの、ジュースでしょ？\""
1012206-71 = "う、うぅ……。"
1012206-72 = "ど、どうしよ～！すっごく恥ずかしい！！"
1012206-73 = "もう、先生の顔見れないよ～！！"
1012206-74 = "[s] \"いつものテンションだと、話しづらかったんだよね。\""
1012206-75 = "ちょ、ちょっと聞いて先生！？こういう雰囲気だと腹を割って話せる～とかって言うでしょ！？"
1012206-76 = "その……こんなこと、話すの怖かったから……。"
1012206-77 = "そ、それで、大人の真似しちゃおうかな……って。"
1012206-78 = "[ns5] \"無理にそんなことしなくても、大丈夫。\"\n[ns6] \"今のミカなら、素直に気持ちを伝えられるでしょ？\""
1012206-81 = "……うん。"
1012206-82 = "もう……黒歴史確定だよ……ううぅ。"
1012206-83 = "……。"
1012206-84 = "バカみたい……。"
1012206-85 = "先生にも、みんなにも――"
1012206-86 = "ずっと迷惑かけっぱなしなんだろうな……。"
1012206-87 = "私ね、きっと他の子にとって普通のことができないんだよ。#nそれで、変なことばっかりして……。"
1012206-88 = "[s7] \"ミカはよく頑張ってると思う。\"\n[s8] \"今は自分を見つめ直す、大事な時期なんだよ。\""
1012206-91 = "え、ええっ？"
1012206-92 = "頑張ってる……？"
1012206-93 = "自分を見つめ直すのが、大事……。"
1012206-97 = "こんなに悩んで、バカみたいって思ってたけど……。"
1012206-98 = "無駄じゃない……のかな？"
1012206-99 = "[s] \"前に進むための、大事な一歩だよ。\""
1012206-100 = "前に進むための……。"
1012206-101 = "大事な……一歩……。"
1012206-108 = "まだ、ちょっとわかんないかも……。"
1012206-109 = "でも……。"
1012206-110 = "先生が、私のために――"
1012206-111 = "言ってくれた言葉だから……。"
1012206-112 = "これからも、もう少しだけ悩んでみようかな。"
1012206-113 = "[s9] \"その気持ちを大事にしよう。\"\n[s10] \"そうやって悩んだ時間が……これからのミカを支えてくれる。\""
1012206-116 = "……。"
1012206-117 = "うん、忘れないね……。"
1012206-118 = "ずっと……悩んでみる……。"
1012206-119 = "……先生に話せて、よかった。"
1012206-125 = "あれ、なんかほっとしたら……眠くなっ……ちゃっ……。"
1012206-126 = "[s] \"……あれ？\""
1012206-127 = "うぅぅん……。"
1012206-128 = "……。"
1012206-134 = "[ns11] \"……。\"\n[ns12] \"……ミカ？\""
1012206-138 = "（眠ってしまったミカをおんぶして、部屋まで運んだ……）"
