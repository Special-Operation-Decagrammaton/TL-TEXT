[translation]
2003102-1 = "豪華に"
2003102-2 = "（レッドウィンター連邦学園の近くで用事があったので、お菓子を買って旧校舎に立ち寄った）"
2003102-15 = "……あ、先生。"
2003102-16 = "ごめん、ドライフルーツを整理してて気付かなかった。"
2003102-17 = "畳を取りに来たんだよね？この前モモトークで話したやつ。"
2003102-18 = "ちょっと待ってて。あと少しで整理が終わるから……。"
2003102-19 = "[s] \"急いでないし、ゆっくりでいいよ。\""
2003102-23 = "[ns1] \"はい、先に渡しておくね。\"\n[ns2] \"前に言ってたお菓子だよ。\""
2003102-26 = "ええっ、本当に買ってきてくれたの？"
2003102-27 = "ちょっと言ってみただけだったのに……#n覚えてくれたなんて、嬉しいな。"
2003102-32 = "ありがとう、先生。みんなと分けて食べるね。"
2003102-33 = "[s] \"どういたしまして。ところで、まだ浴衣なんだね。\""
2003102-34 = "うん。もう温泉郷を運営することはないと思うけど……。"
2003102-35 = "素材がいいから、ルームウェアに丁度よくてさ。#n旧校舎ではよく着てるんだ。"
2003102-39 = "……温泉郷はなくなっちゃったけど、いろんなものが残ったからね。"
2003102-40 = "畳や浴衣みたいな備品はたくさんあるし……"
2003102-41 = "小さいけど、温泉だって残ってる。#n1人か2人しか入れないから、お客さんを呼べるほどじゃないけど。"
2003102-42 = "だからしばらくは、寒い冬でも温かいお湯で身体を洗えそうだよ。"
2003102-46 = "[ns3] \"待って、お湯で洗えそうって……。\"\n[ns4] \"じゃあ、今までは……？\""
2003102-49 = "ふふっ。先生、もしかして生徒のお風呂事情が気になるの？"
2003102-50 = "もう、本当にいやらしいんだからぁ。"
2003102-54 = "……まあ、冗談はさておき。#n先生だから、それくらいは教えてもいいか。"
2003102-55 = "今までは、近くの川で洗ってたんだ。#n旧校舎にはまともな入浴施設がないからね。"
2003102-56 = "冬は氷が張ってたけど、割って入れば大丈夫だったし……。"
2003102-57 = "[s5] \"大問題だよ！？風邪ひいちゃうから！\"\n[s6] \"シャーレのシャワー室、使っていいよ！？\""
2003102-60 = "ふふっ、先生は優しいね。"
2003102-61 = "提案は嬉しいけど、遠慮するよ。#nシャーレはレッドウィンターから離れてるし、#nシャワーを浴びるためだけに行くのは少し手間というか……。"
2003102-62 = "それに、今はもう大丈夫だよ。#nさっきも言った通り、小さな温泉は残ってるし。#nもう凍った川の水で身体を洗うことはないと思う。"
2003102-63 = "そういえば、その温泉なんだけど……#nちょうど今日、アレンジしたところなんだ。"
2003102-64 = "[s] \"温泉を、アレンジ……？\""
2003102-65 = "うん。温泉郷を運営してたときにお客さんから聞いたんだけど、#n入浴施設によっては果物や香料を入れたお風呂があるんだって。"
2003102-66 = "そうすれば香りがよくなったり、#n身体にいい成分を加えたりできるみたいだよ。"
2003102-67 = "その話を思い出して、せっかくだから試してみたの。#n果物や香料だったら、旧校舎の敷地内でいくらでも手に入るし。"
2003102-68 = "旧校舎はおやつも行き渡らないし、#n楽しめるような娯楽もほとんどないから……。"
2003102-73 = "せめてお風呂くらいは豪華な気分で入れたら、#nみんなも気分転換になるんじゃないかと思って。"
2003102-74 = "[s7] \"いい考えだね。\"\n[s8] \"きっとみんなも喜ぶよ。\""
2003102-77 = "ふふっ、そうだったらいいな。"
2003102-78 = "あ。せっかくだし、先生も入ってみる？"
2003102-79 = "ここの整理が終わるまで、もう少し時間がかかりそうでさ。"
2003102-80 = "その間に入ってみて、感想を聞かせてほしいな。"
2003102-81 = "[s] \"そんなに特別な温泉へ、先に入っていいの？\""
2003102-82 = "もちろん。先生には普段から色々とお世話になってるからね。"
2003102-83 = "ふふっ、楽しんでくれるといいな。"
2003102-85 = "（シグレがアレンジしたという「特別」なお風呂に入った）"
2003102-89 = "（香料のせいか、お湯はルビーのように赤みを帯びていた……）"
2003102-94 = "[ns9] \"ほのかに広がる香りは悪くないんだけど……。\"\n[ns10] \"なんだか、顔が熱いような……。\""
2003102-99 = "あ、先生。湯加減はどう？"
2003102-100 = "[s11] \"うん。ちょうどいいんだけど……。\"\n[s12] \"お湯に一体何を混ぜたの？\""
2003102-103 = "ん？ぶどうジュースだよ。"
2003102-104 = "……旧校舎で眠ってたやつだけど。"
2003102-108 = "[ns] \"ぶどうジュースって……まさかアレじゃないよね？\""
2003102-109 = "ふふっ、本当にただのぶどうジュースだってば。先生は心配性だなぁ。"
2003102-110 = "ほら、ちゃんとラベルにもそう書いてあるでしょ？#n匂いだって――あっ。"
2003102-111 = "[s] \"シ、シグレさん……？\""
2003102-112 = "えっと、ぶどうジュースではあったんだけど……#nもしかしたら、ちょっと発酵してたかも？"
2003102-113 = "でもまあ、そんなに大きな問題じゃないでしょ？"
2003102-114 = "「液体」が入ったお風呂に浸かるってだけで、#n直接口から飲むわけじゃないし……。"
2003102-115 = "それに「液体」に含まれてた身体にいい成分を#n肌から吸収できるわけだし――"
2003102-116 = "[s] \"いやいやいやいや！\""
2003102-117 = "だから細かいことは気にしないで。隣、失礼するね。"
2003102-118 = "やらなきゃいけないことも終わったし、私も温泉に――"
2003102-119 = "[ns13] \"絶対ダメ！\"\n[ns14] \"この温泉は元通りにして！\""
2003102-123 = "……どうしても、ダメなの？"
2003102-124 = "この温泉を作るために、結構時間がかかったのに……。"
2003102-125 = "……最後にちょっとだけ浸かってみるのもダメ？"
2003102-126 = "[s] \"ダメです。\""
2003102-130 = "…………はぁ、わかった。"
2003102-132 = "（その後、赤く染まった温泉水を捨てて、湯船をきれいに掃除した）"
2003102-133 = "（……ただ入っていた「液体」のせいか、しばらく頭が痛かった）"
