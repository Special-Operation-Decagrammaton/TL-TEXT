[translation]
2003102-1 = "Luxuosamente"
2003102-2 = "（Como eu tinha um compromisso perto da Academia Federal de Red Winter, comprei alguns doces e passei no prédio antigo da escola）"
2003102-15 = "……Ah, Sensei."
2003102-16 = "Desculpe, eu estava organizando as frutas secas e não percebi você chegar."
2003102-17 = "Você veio buscar os tatames, né? Aqueles que a gente comentou no MomoTalk outro dia."
2003102-18 = "Espere um pouco. Já estou terminando de organizar……."
2003102-19 = "[s] \"Não estou com pressa, pode fazer com calma.\""
2003102-23 = "[ns1] \"Certo, vou te entregar isso primeiro.\"\n[ns2] \"São os doces que eu tinha mencionado antes.\""
2003102-26 = "Eita, você realmente comprou para mim?"
2003102-27 = "Eu só tinha comentado por comentar……#nFico feliz que você tenha lembrado."
2003102-32 = "Obrigada, Sensei. Vou dividir com todo mundo."
2003102-33 = "[s] \"De nada. Aliás, você ainda está de yukata?\""
2003102-34 = "Sim. Acho que não vamos mais operar o resort de águas termais, mas……."
2003102-35 = "O material é bom, então serve perfeitamente como roupa de ficar em casa.#nEu costumo usar bastante aqui no prédio antigo."
2003102-39 = "……O resort de águas termais pode ter acabado, mas várias coisas ficaram para trás."
2003102-40 = "Temos muitos suprimentos, como os tatames e os yukatas……"
2003102-41 = "E, embora seja pequena, a fonte termal também continua aqui.#nSó cabe uma ou duas pessoas, então não dá para receber clientes, mas..."
2003102-42 = "Por isso, pelo menos durante o inverno rigoroso, vou conseguir me lavar com água quente."
2003102-46 = "[ns3] \"Espere, 'conseguir se lavar com água quente'……\"\n[ns4] \"Então, até agora……?\""
2003102-49 = "Fufu. Sensei, por acaso você está curioso sobre os hábitos de banho das alunas?"
2003102-50 = "Nossa, você é realmente um pervertido."
2003102-54 = "……Bem, deixando as brincadeiras de lado.#nComo é você, Sensei, acho que posso contar."
2003102-55 = "Até agora, a gente se lavava no rio ali perto.#nO prédio antigo não tem instalações de banho decentes, sabe."
2003102-56 = "No inverno, o rio ficava congelado, mas era só quebrar o gelo e entrar que dava tudo certo……."
2003102-57 = "[s5] \"Isso é um problema grave!? Você vai acabar pegando um resfriado!\"\n[s6] \"Pode usar o chuveiro do Schale, se quiser!\""
2003102-60 = "Fufu, o Sensei é muito gentil."
2003102-61 = "Agradeço a proposta, mas vou recusar.#nO Schale fica longe de Red Winter, e ir até lá só para tomar um banho dá muito trabalho……."
2003102-62 = "Além disso, agora está tudo bem.#nComo eu disse, a pequena fonte termal ainda existe.#nAcho que não vou mais precisar me lavar na água congelada do rio."
2003102-63 = "Falando nisso, sobre essa fonte termal……#nEu fiz um arranjo nela justamente hoje."
2003102-64 = "[s] \"Um arranjo... na fonte termal?\""
2003102-65 = "Sim. Quando operávamos o resort, ouvi de um cliente que, dependendo do lugar, eles colocam frutas ou essências na água."
2003102-66 = "Dizem que isso deixa o aroma mais agradável e adiciona componentes bons para o corpo."
2003102-67 = "Lembrei disso e resolvi testar.#nFrutas e essências são coisas que consigo encontrar aos montes aqui no terreno do prédio antigo."
2003102-68 = "O prédio antigo não tem nem lanches suficientes, e quase não temos entretenimento para nos divertir……."
2003102-73 = "Pensei que, se pelo menos na hora do banho elas pudessem se sentir luxuosas, seria uma boa forma de relaxar."
2003102-74 = "[s7] \"É uma ótima ideia.\"\n[s8] \"Tenho certeza de que todas vão adorar.\""
2003102-77 = "Fufu, espero que sim."
2003102-78 = "Ah. Já que estamos aqui, o Sensei não quer entrar também?"
2003102-79 = "Ainda vai levar um tempo para eu terminar de organizar tudo aqui."
2003102-80 = "Enquanto isso, entre lá e me diga o que achou."
2003102-81 = "[s] \"Posso mesmo ser o primeiro a entrar nessa fonte termal tão especial?\""
2003102-82 = "Claro. Você sempre cuida tão bem da gente, Sensei."
2003102-83 = "Fufu, espero que você aproveite."
2003102-85 = "（Entrei no banho \"especial\" que a Shigure preparou）"

2003102-89 = "（Talvez por causa das essências, a água estava avermelhada como um rubi……）"
2003102-94 = "[ns9] \"O aroma suave não é ruim, mas……\"\n[ns10] \"Sinto como se meu rosto estivesse ficando quente……\""
2003102-99 = "Ah, Sensei. Como está a temperatura da água?"
2003102-100 = "[s11] \"Está boa, mas……\"\n[s12] \"O que exatamente você misturou na água?\""
2003102-103 = "Hm? Suco de uva."
2003102-104 = "……Era um que estava guardado aqui no prédio antigo."
2003102-108 = "[ns] \"Suco de uva... não é o que eu estou pensando, né?\""
2003102-109 = "Fufu, eu já disse que é só suco de uva. O Sensei é tão preocupado."
2003102-110 = "Olha, está escrito no rótulo, não está? E o cheiro... ah."
2003102-111 = "[s] \"Sh-Shigure-san...?\""
2003102-112 = "Bem, era suco de uva, mas... talvez tenha fermentado um pouco?"
2003102-113 = "Mas, bem, não é um problema tão grande, né?"
2003102-114 = "É só um banho imerso em um \"líquido\", não é como se você fosse beber diretamente..."
2003102-115 = "Além disso, você pode absorver os componentes bons para o corpo que estão no \"líquido\" através da pele..."
2003102-116 = "[s] \"Não, não, não, não!\""
2003102-117 = "Então não se preocupe com detalhes. Com licença, vou entrar aí do lado."
2003102-118 = "Já terminei o que tinha que fazer, então eu também vou entrar na fonte termal..."
2003102-119 = "[ns13] \"De jeito nenhum!\"\n[ns14] \"Limpe essa fonte termal agora mesmo!\""
2003102-123 = "...Então, não tem jeito mesmo?"
2003102-124 = "Eu levei bastante tempo para preparar essa fonte termal..."
2003102-125 = "...Nem um mergulho rápido antes de terminar?"
2003102-126 = "[s] \"Não pode.\""
2003102-130 = "............Haa, entendi."
2003102-132 = "(Depois disso, descartamos a água da fonte termal tingida de vermelho e limpamos a banheira completamente)"
2003102-133 = "(...Talvez por causa do \"líquido\" em que estávamos, fiquei com dor de cabeça por um tempo)"
