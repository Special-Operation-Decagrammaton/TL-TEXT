[translation]
1300115-1 = "風が来る音"
1300115-4 = "（チセに連絡をもらい、陰陽部の休憩室にやって来た）"
1300115-8 = "[ns] \"チセ？\""
1300115-13 = "あ、先生。"
1300115-14 = "ここだよ～。"
1300115-15 = "[s] \"床で何してるの？\""
1300115-16 = "お日様が元気だから……。"
1300115-17 = "じっとしてたの。"
1300115-18 = "こうしてないと、溶けちゃいそう。"
1300115-19 = "[s] \"少し動いただけでも汗が出るよね……。\""
1300115-20 = "さあ、先生も一緒に待とう。"
1300115-21 = "きっと聞こえて来るよ。"
1300115-22 = "[s] \"「風が来る音」が？\""
1300115-23 = "うん、きれいな音だよ。"
1300115-24 = "涼しい音なの。"
1300115-25 = "耳を澄ませば、すぐ聞こえてくると思うよ～。"
1300115-26 = "[s] \"……？\""
1300115-27 = "先生、じっとしてて。"
1300115-28 = "こうやって耳を傾けて、静かに待っていれば……。"
1300115-34 = "聞こえた？"
1300115-35 = "[s] \"鐘の音……？\""
1300115-36 = "ちょっと違うよ。"
1300115-37 = "本当はね〜。"
1300115-42 = "[ns] \"風鈴だったんだ。\""
1300115-43 = "うん、そうだよ～。"
1300115-44 = "吊るしておいたの。"
1300115-45 = "[s] \"たしかに、風鈴の音は風が来る合図だね。\""
1300115-46 = "うん、清らかな音。"
1300115-47 = "毎年、この季節になったら出してるの。"
1300115-48 = "一番大切な風鈴だから。"
1300115-49 = "[s] \"ほかの風鈴とは何が違うの……？\""
1300115-50 = "同じように見えるけど……。"
1300115-51 = "これは、青い音がするから。"
1300115-52 = "[s] \"青い音……？\""
1300115-53 = "うん。"
1300115-54 = "青くて、清らかな音。"
1300115-59 = "先生も、一緒に聞こう？"
1300115-60 = "こっち来て。"
1300115-64 = "ここで横になってみて。"
1300115-71 = "（チセの隣で横になってみた）"
1300115-74 = "じゃあ、先生。"
1300115-75 = "静かに耳を澄ませて。"
1300115-76 = "[s] \"……。\""
1300115-81 = "[ns1] \"うん、青い音がするね。\"\n[ns2] \"うん、清らかな音だね。\""
1300115-84 = "そうでしょ？"
1300115-85 = "……あっ。"
1300115-89 = "暑#nい#n日#nに"
1300115-91 = "床#n横#nた#nわ#nり"
1300115-93 = "触#nれ#nる#n風"
1300115-98 = "（その後、しばらくの間、チセと風鈴の音に耳を傾けた……）"
