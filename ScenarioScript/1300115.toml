[translation]
1300115-1 = "O som do vento chegando"
1300115-4 = "（Recebi uma mensagem da Chise e vim até a sala de descanso do Departamento Yin-Yang）"
1300115-8 = "[ns] \"Chise?\""
1300115-13 = "Ah, Sensei."
1300115-14 = "Estou aqui~."
1300115-15 = "[s] \"O que está fazendo no chão?\""
1300115-16 = "O sol está tão forte..."
1300115-17 = "Então fiquei quietinha aqui."
1300115-18 = "Se eu não fizer isso, sinto que vou derreter."
1300115-19 = "[s] \"É verdade, só de se mexer um pouco já dá para suar...\""
1300115-20 = "Vamos lá, Sensei, espere comigo."
1300115-21 = "Tenho certeza de que você vai ouvir."
1300115-22 = "[s] \"O 'som do vento chegando'?\""
1300115-23 = "Sim, é um som lindo."
1300115-24 = "Um som refrescante."
1300115-25 = "Se você aguçar os ouvidos, acho que vai conseguir ouvir logo~."
1300115-26 = "[s] \"...?\""
1300115-27 = "Sensei, fique parado."
1300115-28 = "Se você inclinar a cabeça assim e esperar em silêncio..."
1300115-34 = "Ouviu?"
1300115-35 = "[s] \"O som de um sino...?\""
1300115-36 = "Não é bem isso."
1300115-37 = "Na verdade..."
1300115-42 = "[ns] \"Era um furin (sino de vento).\""
1300115-43 = "Sim, isso mesmo~."
1300115-44 = "Eu o pendurei ali."
1300115-45 = "[s] \"Realmente, o som do furin é o sinal de que o vento está chegando.\""
1300115-46 = "Sim, um som puro."
1300115-47 = "Eu o coloco todo ano, quando chega esta estação."
1300115-48 = "Porque é o meu furin mais precioso."
1300115-49 = "[s] \"O que ele tem de diferente dos outros...?\""
1300115-50 = "Parece igual aos outros, mas..."
1300115-51 = "É que este faz um som azul."
1300115-52 = "[s] \"Um som azul...?\""
1300115-53 = "Sim."
1300115-54 = "Um som azul e puro."
1300115-59 = "Sensei, vamos ouvir juntos?"
1300115-60 = "Venha aqui."
1300115-64 = "Tente deitar aqui."
1300115-71 = "（Deitei ao lado da Chise）"
1300115-74 = "Então, Sensei."
1300115-75 = "Escute com atenção e em silêncio."
1300115-76 = "[s] \"...\""
1300115-81 = "[ns1] \"Sim, faz um som azul.\"\n[ns2] \"Sim, é um som puro.\""
1300115-84 = "Viu só?"
1300115-85 = "...Ah."
1300115-89 = "Em#n um#n di#na#n qu#nente"
1300115-91 = "Dei#n-se#n no#n ch#não"
1300115-93 = "O#n ven#nto#n que#n to#nca"
1300115-98 = "（Depois disso, por um tempo, fiquei ouvindo o som do furin junto com a Chise...）"
