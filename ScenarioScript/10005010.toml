[translation]
10005010-1 = "Episódio 1; Vamos ser espertos"
10005010-2 = "（Voltando dois dias atrás, durante a reunião de estratégia...）"
10005010-5 = "Há cerca de 37 horas, Kurosaki Koyuki, aluna do primeiro ano da Millennium Science School... codinome \"Coelho Branco\", escapou da sala de detenção."
10005010-6 = "Quando percebi a situação, ela já tinha passado completamente pela rede de vigilância do Seminar."
10005010-7 = "Ora, aquela menina de novo?"
10005010-8 = "Ela é o tipo de pessoa que faz besteira quando menos esperamos."
10005010-9 = "E então, ela escapou e fez algo de novo? Tipo formatar todo o banco de dados da escola...?"
10005010-10 = "……Emissão de títulos de dívida sem autorização."
10005010-11 = "E ainda por cima, em nome do Seminar. Parece que ela ainda está imprimindo sem parar e não pretende parar..."
10005010-12 = "Se continuar nesse ritmo, conforme os cálculos, em dois dias... como você pode imaginar, estaremos falidos."
10005010-16 = "……Ou seja, a situação é bem grave."
10005010-17 = "……."
10005010-18 = "Realmente, é uma situação nada boa..."
10005010-19 = "[s1] \"……'Coelho Branco'?\"\n[s2] \"'Kurosaki Koyuki'……?\""
10005010-20 = "Ah, falando nisso, talvez o Sensei não soubesse."
10005010-21 = "Ah, falando nisso, talvez o Sensei não soubesse."
10005010-22 = "Deixe-me explicar a partir daí."
10005010-25 = "Kurosaki Koyuki, codinome \"Coelho Branco\"... esse codinome existe porque, até agora, várias operações de captura foram emitidas e ela sempre conseguiu escapar..."
10005010-26 = "Ela é uma das alunas mais problemáticas da Millennium e uma dor de cabeça para o Seminar... ah, ela não pertence mais ao grupo, então é uma \"ex-membro do Seminar\"."
10005010-27 = "Ela é uma grande criadora de problemas, uma variável ambulante, ou melhor, uma semente de caos que corre por aí."
10005010-30 = "……? Ah, é verdade."
10005010-31 = "Se fosse apenas uma fuga, não estaríamos tão preocupados."
10005010-32 = "Ela é uma garota com um talento muito peculiar."
10005010-33 = "Embora seja limitado, ela possui uma habilidade absurda em áreas específicas..."
10005010-34 = "Simplificando, é a capacidade de decifrar sistemas de criptografia em uma velocidade estranha."
10005010-35 = "Mesmo as criptografias digitais avançadas usadas na Millennium, ela consegue quebrar a maioria sem esforço algum."
10005010-36 = "Mais do que uma questão de capacidade de cálculo, é um tipo de habilidade onde ela \"entende intuitivamente como decifrar a criptografia\"."
10005010-37 = "Ela consegue decifrar facilmente códigos que nem os computadores de ponta da Millennium conseguem resolver instantaneamente."
10005010-38 = "Ela é anormalmente boa em processar coisas como a criptografia RSA. Foi por causa dessa habilidade que a trouxemos para o Seminar, mas..."
10005010-39 = "Eu não imaginava que ela fosse tão problemática assim... é bem isso. Fufu."
10005010-40 = "Problemática... isso não é nem de longe o suficiente para descrevê-la."
10005010-41 = "Se ela não fosse uma ex-membro do Seminar, já teria sido enviada para o Departamento Correcional há muito tempo."
10005010-42 = "Mas como ela já conhece vários segredos confidenciais da Millennium, não podemos simplesmente fazer isso..."
10005010-43 = "……Bem, é isso sobre ela. De qualquer forma, o pedido é esse."
10005010-44 = "Sim. Então, basta que nós a capturemos, certo?"
10005010-45 = "Isso mesmo. Como a situação é bem grave, não temos outra escolha a não ser pedir a vocês..."
10005010-46 = "Ah, e desta vez, não podemos usar nossos autômatos ou drones."
10005010-47 = "Ora, existe algum motivo para isso?"
10005010-48 = "A capacidade de combate dela, mesmo sendo otimista, era de nível de estudante do ensino fundamental... na verdade, se pudéssemos usar drones, não precisaríamos enviar tantas pessoas, não é...?"
10005010-49 = "É que..."
10005010-50 = "O lugar para onde ela fugiu não é um local onde possamos enviar autômatos."
10005010-51 = "Não é no distrito autônomo da Millennium nem em D.U., é no distrito de outra escola..."
10005010-52 = "[s3] \"Distrito de outra escola……?\"\n[s4] \"Até onde ela foi?\""
10005010-53 = "\"Escola de Ensino Médio Marítimo Odisseia\"... uma escola composta por vários navios."
10005010-54 = "\"Escola de Ensino Médio Marítimo Odisseia\"... uma escola composta por vários navios."
10005010-55 = "Ela está dentro do \"Golden Fleece\", um dos navios de cruzeiro deles."
10005010-56 = "A Odisseia tem um certo intercâmbio com a Millennium, então entramos em contato antes, mas..."
10005010-57 = "Parece que está meio fora da jurisdição, por assim dizer..."
10005010-58 = "Disseram que o conselho estudantil não ouve ninguém, que não sabem o que está acontecendo dentro do navio e que ele opera de forma independente com o orçamento que eles mesmos geram..."
10005010-59 = "Ora, ora... nossa aluna problemática acabou entrando em um lugar que já é um problema para a própria escola..."
10005010-60 = "Além disso, emitir títulos de dívida e fazer algo assim... o que será que eles estão planejando? Preparando um golpe de estado, talvez?"
10005010-61 = "O fato de ainda não sabermos disso também é uma sensação ruim... Espero que eles não estejam mancomunados com algum grupo perigoso para tramar algo terrível..."
10005010-62 = "E se descobrirem que os títulos usados para isso estavam em nome do Seminar...!"
10005010-63 = "Ah, céus, só consigo imaginar coisas ruins..."
10005010-64 = "Em resumo, é isso. Por mais que esteja fora da jurisdição deles, também não está sob a nossa."
10005010-65 = "Enviar autômatos e drones para fora do seu próprio distrito autônomo é uma violação clara das regras."
10005010-66 = "Entendo..."
10005010-67 = "Então é por isso que precisam da nossa força, não é?"
10005010-68 = "...Exato. Precisamos de força para resolver isso \"silenciosamente\"."
10005010-69 = "Ahaha, entendido..."
10005010-70 = "Bem, é basicamente isso."
10005010-71 = "Como você deve ter entendido, a situação é bem perigosa. Não podemos falhar."
10005010-72 = "Ou seja, agir discretamente, fingindo ser passageiros comuns, algo assim..."
10005010-73 = "E além disso, o mais rápido possível, mas sem causar alvoroço. A última parte, \"sem causar alvoroço\", é a mais importante, então grave bem isso!"
10005010-74 = "Leve isso a sério. Como estaremos operando fora do nosso distrito, não podemos causar problemas! Silenciosamente, e se possível, sem que ninguém perceba! Ou seja..."
10005010-75 = "Quero que sejam elegantes!"
10005010-77 = "...Muito bem, então vamos agir com elegância."
10005010-78 = "[s5] \"O que devemos fazer agora?\"\n[s6] \"O que devemos fazer especificamente?\""
10005010-79 = "Sim, vamos começar a falar sobre essa parte."
10005010-80 = "Sim, vamos começar a falar sobre essa parte."
10005010-81 = "Primeiro, a prioridade é estabelecer uma base dentro do navio."
10005010-82 = "Subam até o andar das cabines e garantam um quarto vazio. Ele servirá como nossa base temporária durante a operação. Se algo acontecer, nos reportem por lá."
10005010-83 = "Depois disso, sigam para a sala de sistemas, desativem o sistema de monitoramento de todo o navio e então localizem o Coelho Branco—"
10005010-84 = "Ei, quem está aí!?"
10005010-85 = "...!"
10005010-86 = "...!?"
10005010-87 = "?"
10005010-94 = "O que vocês estão fazendo na casa de máquinas!?"
10005010-95 = "...Hã?"
10005010-96 = "E que roupa é essa? Estão brincando com a gente?"
10005010-97 = "...? Do que você está falando?"
10005010-98 = "Essa é a nossa pergunta. Por que vocês não estão vestidas de coelhinhas?"
10005010-99 = "Vocês não parecem ser da equipe de segurança..."
10005010-100 = "Por que estão usando roupas de empregada...?"
10005010-101 = "Isso está muito suspeito... Desculpem se forem clientes, mas vamos ter que revistá-las."
10005010-102 = "Ei, aqui! Reúnam-se!"
10005010-103 = "...Tsc!"
10005010-113 = "...Gah!?"
10005010-118 = "...Ah."
10005010-119 = "Nossa, a líder é muito apressada... Poderia ter tentado resolver na conversa..."
10005010-120 = "E olha que ela insistiu tanto em \"sem que ninguém perceba\" e \"com elegância\"."
10005010-121 = "Ahaha, já quebramos a promessa!"
10005010-122 = "Não, é que, sabe..."
10005010-123 = "Ah... Sensei. É aquilo, sabe como é...!"
10005010-124 = "[s7] \"Foi repentino, então não teve jeito...\"\n[s8] \"Bem, sinto muito, mas foi inevitável...\""
10005010-125 = "É, é isso mesmo!"
10005010-126 = "É, é isso mesmo!"
10005010-127 = "Não tinha como evitar!"
10005010-128 = "E ainda não virou um alvoroço total!"
10005010-129 = "Beleza, estamos salvas!"
10005010-130 = "O que foi esse barulho alto agora...!?"
10005010-131 = "De onde veio aquela voz!? É um invasor!?"
10005010-136 = "……。"
10005010-137 = "……。"
10005010-143 = "Fora♪"
