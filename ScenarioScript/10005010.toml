[translation]
10005010-1 = "第1話;スマートに行こう"
10005010-2 = "（再び二日前に戻り、作戦会議中のこと……）"
10005010-5 = "約37時間前、ミレニアムサイエンススクール1年生の「[ruby=くろさき]黒崎[/ruby]コユキ」……コードネーム「白兎」が、反省部屋から脱走。"
10005010-6 = "その状況を私が把握した頃には、もう完全にセミナーの監視網を抜けた状態だったわ。"
10005010-7 = "あら、またあの子ですか。"
10005010-8 = "ふと忘れた頃に色々とやらかす子ですねぇ。"
10005010-9 = "それで、脱出してまた、何かをしでかしたのですか？学園のデータベースを全部初期化したとか……？"
10005010-10 = "……無断での債券発行。"
10005010-11 = "それも、セミナーの名前で。今もまだ、バンバン刷ってて止めてないみたいで……。"
10005010-12 = "このままのペースで行くと、計算通りなら2日後には……お察しの通り、破産よ。"
10005010-16 = "……つまり、結構マズいわ。"
10005010-17 = "……。"
10005010-18 = "確かに、良くない状況ですね……。"
10005010-19 = "[s1] \"……「白兎」？\"\n[s2] \"「黒崎コユキ」……？\""
10005010-20 = "あ、そういえば先生はご存じなかったかもしれませんね。"
10005010-21 = "あ、そういえば先生はご存じなかったかもしれませんね。"
10005010-22 = "そこからご説明いたしましょう。"
10005010-25 = "黒崎コユキ、コードネーム「白兎」……こんなコードネームがあるのは、これまで何度も彼女の捕獲作戦が発令されては、たびたび逃げられているという経緯もあるためでして……。"
10005010-26 = "ミレニアムの中でもかなりの問題児でして、セミナーの悩みの種とのことで……あ、今はもう所属はしていないので、「元セミナー所属」の子ですね。"
10005010-27 = "かなりのトラブルメーカーで、歩き回る変数と言いますか、駆け回る混乱の種と言いますか。"
10005010-30 = "……？あ、そうですね。"
10005010-31 = "ただ脱走するだけだったら、これほど頭を抱えることはないのですけれど。"
10005010-32 = "かなり特異な才能を持っている子なんです。"
10005010-33 = "限定的ではありますが、特定領域におけるとんでもない能力を持っていまして……。"
10005010-34 = "簡単に言いますと、暗号システムを異様な速度で解いてしまう、という能力です。"
10005010-35 = "ミレニアムで使われているような高度なデジタル暗号でも、その大半を何の苦も無く解除してしまうんですよ。"
10005010-36 = "計算能力の問題というよりは、「暗号の解き方が感覚的に分かってしまう」という類の能力ですね。"
10005010-37 = "ミレニアム最高峰のコンピューターですら即座には解読できない暗号を、簡単に解いてしまうんです。"
10005010-38 = "RSA暗号ですとか、そういうタイプの処理が異常なまでに得意ということですね。その能力を買って、セミナーに連れてきたんですけど……。"
10005010-39 = "まさか、あそこまで問題児とは思っていなかった……という感じですね。ふふっ。"
10005010-40 = "問題児……なんて可愛いもんじゃないわよ、まったく。"
10005010-41 = "元セミナー所属じゃなかったら、とっくに矯正局行きでもおかしくないくらいだわ。"
10005010-42 = "ただもうミレニアムの機密事項を色々と知っちゃってるから、そうするわけにもいかなくて……。"
10005010-43 = "……まあ、あの子についてはこんなものね。とにかく、今回はそういう依頼よ。"
10005010-44 = "はい。私たちで彼女を捕まえればよい、ということですよね？"
10005010-45 = "そうね。結構マズい状況ってこともあって、あなたたちに頼むしかなくって……。"
10005010-46 = "あ、それから今回は、私たちのオートマタとかドローンは使えないから。"
10005010-47 = "あら、それは何か理由が？"
10005010-48 = "あの子の戦闘能力は、高く見積もっても中学生レベルでしたし……むしろドローンさえ使えれば、大人数で出向かなくてもすぐに済みそうなのですが……？"
10005010-49 = "それが……。"
10005010-50 = "あの子が逃げた先が、そもそもオートマタとかを送れるような場所じゃないのよね。"
10005010-51 = "ミレニアム自治区でもD.U.でもない、他の学校の自治区で……。"
10005010-52 = "[s3] \"他の学校の自治区……？\"\n[s4] \"どこまで行っちゃったの？\""
10005010-53 = "「オデュッセイア海洋高等学校」……複数の船で構成された学校です。"
10005010-54 = "「オデュッセイア海洋高等学校」……複数の船で構成された学校です。"
10005010-55 = "その内のひとつのクルーズ船である「ゴールデンフリース号」の中に、あの子はいます。"
10005010-56 = "オデュッセイアはミレニアムとそれなりに交流がある学校なので、先にちょっと連絡はしてみたのですが……。"
10005010-57 = "どうやら半分管轄外、と言いますか……。"
10005010-58 = "生徒会の話も聞かない、船の中が今どうなっているのかすら分からない、自分たちで稼いだ予算で独自の運用がなされている船で……とのことでした。"
10005010-59 = "あらあら……あちらの学校にとっても問題の場所に、我々の問題児が飛び込んでしまったと……。"
10005010-60 = "その上債券を発行して、そんなところで何をしているんでしょうね？クーデターの準備とかでしょうか？"
10005010-61 = "そこがまだ分かってないのも、嫌な感じなのよね……どこか悪い集団と結託して、何かとんでもないことを企んでないと良いのだけど……。"
10005010-62 = "しかもそれに使われたのが、セミナー名義の債券だなんてことになったら……！"
10005010-63 = "ああもう、嫌な想像ばっかり膨らむわ……。"
10005010-64 = "つまりそういうことで、いくら向こうの管轄外と言っても、だからって私たちの学校の管轄でもない。"
10005010-65 = "自分たちの自治区外にオートマタやドローンを送るなんてことは、明確なルール違反。"
10005010-66 = "なるほど……。"
10005010-67 = "それで私たちの力が必要、ということですね。"
10005010-68 = "……そうね、「静かに」処理してくれる力が必要なのよ。"
10005010-69 = "あはは、了解です……。"
10005010-70 = "まあ、大体こんなところね。"
10005010-71 = "分かったと思うけど、結構危ない事態だから。失敗は許されないわ。"
10005010-72 = "つまりおとなしく、普通の乗船客を装うとかそういう方法で……。"
10005010-73 = "その上でできるだけ早く、でも騒ぎにならないように。後者の「騒ぎにならないように」が一番大事だから、ちゃんと覚えておきなさいよ！"
10005010-74 = "肝に銘じて。私たちの自治区外での活動になるんだから、絶対面倒な騒ぎにしないこと！静かに、できれば誰にも気が付かれないように！つまり……"
10005010-75 = "スマートにお願い！"
10005010-77 = "……さて、ではスマートにやるとしましょうか。"
10005010-78 = "[s5] \"この後はどうすれば良い？\"\n[s6] \"具体的には何をすれば？\""
10005010-79 = "はい、その部分のお話を始めましょう。"
10005010-80 = "はい、その部分のお話を始めましょう。"
10005010-81 = "まずは船内における、拠点を作ることが第一ですね。"
10005010-82 = "客室がある階まで上って、空き部屋を一つ確保。そこを作戦中の臨時の拠点にします。何かあれば逐次そちらで。"
10005010-83 = "その後はシステムルームに向かい、船全体の監視システムを無力化してから白兎の位置を――"
10005010-84 = "そこっ、誰だ！？"
10005010-85 = "……！"
10005010-86 = "……！？"
10005010-87 = "？"
10005010-94 = "機関室で何をやってる！？"
10005010-95 = "……あぁん？"
10005010-96 = "つーか何だその服装？ふざけてんのか？"
10005010-97 = "……？何を言っている？"
10005010-98 = "それはこちらの台詞だ、なぜバニー姿に着替えていない？"
10005010-99 = "警備担当でもなさそうだし……。"
10005010-100 = "どうしてメイド服を……？"
10005010-101 = "怪しいな……お客様だったら悪いが、ちょっと調べさせてもらおうか。"
10005010-102 = "おい、こっちだ！集合！"
10005010-103 = "……ちっ！"
10005010-113 = "……がはっ！？"
10005010-118 = "……あ。"
10005010-119 = "全く、リーダーは手が早いんですから……もっと口を使って切り抜けるとか……。"
10005010-120 = "あんなに「気が付かれないように」「スマートに」って言われてたのに。"
10005010-121 = "あはは、もう約束破っちゃったね！"
10005010-122 = "いや、何つーかその……。"
10005010-123 = "あー……先生。あれだ、これはだな……！"
10005010-124 = "[s7] \"急だったし、やむなしってことで……。\"\n[s8] \"まあ、申し訳ないけど不可抗力、かな……？\""
10005010-125 = "そ、そうだよな！"
10005010-126 = "そ、そうだよな！"
10005010-127 = "仕方ねぇよな！"
10005010-128 = "別にまだ騒ぎになってねぇし！"
10005010-129 = "おし、セーフ！"
10005010-130 = "何か今、大きな音が……！？"
10005010-131 = "さっきの声はどこからだ！？侵入者か！？"
10005010-136 = "……。"
10005010-137 = "……。"
10005010-143 = "アウトー♪"
