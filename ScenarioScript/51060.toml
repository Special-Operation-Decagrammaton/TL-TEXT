[translation]
51060-1 = "Episódio 6; O Próximo Destino"
51060-4 = "(Após concluir os procedimentos necessários, eu e Yukari saímos pelas ruas da Hyakkiyako)"
51060-9 = "Funfufunfun~♪"
51060-10 = "[s] \"Bem, primeiramente...\""
51060-14 = "(Mesmo que eu atue como a 'testemunha' externa...)"
51060-15 = "[ns] (Ainda precisaremos de outro membro da Hyakkaryouran para atestar a validade dos critérios...)"
51060-16 = "Com a ajuda do Clube Yin-Yang... e do Sensei da Schale, a vitória está praticamente garantida!"
51060-17 = "A partir daqui, começa a marcha triunfal da Yukari~!!"
51060-18 = "[s] \"Yukari, que tipo de comitê é a Hyakkaryouran?\""
51060-19 = "Eh...?"
51060-20 = "Como assim, que tipo...?"
51060-21 = "[s1] \"Antes da batalha de sucessão, eu gostaria de saber direito...\"\n[s2] \"O que é a Hyakkaryouran exatamente.\""
51060-24 = "Entendo, realmente..."
51060-25 = "............"
51060-26 = "[s] \"Ah, claro, não precisa se não quiser...!\""
51060-31 = "Fufu, não! #n Deixe com esta que vos fala, a maior elite da Hyakkaryouran!"
51060-41 = "A Hyakkaryouran... seu nome oficial é Comitê de Conciliação de Conflitos Hyakkaryouran."
51060-42 = "É um pouco embaraçoso dizer isso, mas... é um comitê que reúne apenas a mais excepcional elite da Academia Combinada Hyakkiyako."
51060-44 = "Suas origens remontam à época em que a Hyakkiyako ainda não era uma 'aliança', sendo um comitê com uma longa história..."
51060-45 = "Sua principal atividade é a mediação de conflitos e disputas entre facções e comitês dentro da academia."
51060-46 = "[s] \"Então é algo parecido com o Comitê Disciplinar.\""
51060-49 = "Sim. É verdade que também fomos encarregadas pelo 'Grande Profeta' da função de prender e orientar os alunos problemáticos, mas..."
51060-50 = "O que nós mais valorizamos não é punir ou orientar, e sim a 'mediação'."
51060-51 = "Na maioria dos conflitos que ocorrem dentro da aliança, ambas as partes têm culpa."
51060-52 = "Por isso, nós procuramos entender os sentimentos de ambos os lados, servir de ponte e mediar para que cheguem a um acordo."
51060-53 = "......Esse é o nosso papel."
51060-54 = "[s] \"......Parece ser muito difícil.\""
51060-55 = "Pode ser difícil, mas é por isso que podemos ser úteis a todos!"
51060-56 = "Por isso, tenho muito orgulho das atividades da Hyakkaryouran!"
51060-57 = "[s] \"Você realmente gosta da Hyakkaryouran, não é?\""
51060-58 = "Sim!"
51060-59 = "A Hyakkaryouran é――"
51060-60 = "Uma existência que eu admiro muito."
51060-72 = "Ei! Esperem aí!"
51060-77 = "Hã? Que anãzinha é essa?"
51060-78 = "Se não quiser se machucar, é melhor dar o fora daqui logo."
51060-80 = "Eu estava só observando, mas..."
51060-81 = "O que vocês estão fazendo desde agora há pouco!?"
51060-83 = "Hã?"
51060-85 = "Eu só tô dizendo que essa redinha de pegar peixinho dourado é uma porcaria, e que eu quero usar a minha redinha Super Ultra Hyper Miracle."
51060-86 = "Isso não passa de um motivo egoísta! #n Parem com isso agora!"
51060-88 = "Essa pirralha, parece que só vai aprender apanhan――"
51060-93 = "Toma!!"
51060-102 = "Ugh...!? Essa garota!?"
51060-104 = "Oprimir os mais fracos e arruinar o festival... #n Mesmo que todos permitam, eu, Yukari, não permitirei!"
51060-110 = "Hah! Se tá falando isso tudo, é porque tá preparada, né?"
51060-111 = "Sua atrevida!"
51060-115 = "Ei, vocês!"
51060-132 = "Ugh...!!"
51060-153 = "Q-Quem tá aí!?"
51060-160 = "Você se machucou?"
51060-165 = "A... ah, não... estou bem."
51060-167 = "Que bom..."
51060-169 = "Atirar do nada assim, você...!"
51060-170 = "Você não sabe quem nós somos!?"
51060-171 = "Sim, eu sei. São vocês que sempre causam confusão nos festivais, não é?"
51060-172 = "As atrevidas―― são vocês."
51060-181 = "Hii!! Que precisão absurda...!"
51060-182 = "Cabelos brancos extremamente longos, e um haori azul-claro... será que...!?"
51060-191 = "F-Fujam! É a Hyakkaryouran, a Hyakkaryouran tá aqui!!"
51060-196 = "Doryaa! Não deixarei escapar! #n O grêmio comercial já nos avisou sobre vocês!"
51060-197 = "Estão prontas para virar a noite ouvindo sermão?"
51060-198 = "Chega de conversa fiada."
51060-202 = "Vamos persegui-las logo."
51060-203 = "Eu sei, eu sei! Tô indo na frente! #n Nagusa-senpai, o resto é com você!"
51060-208 = "Ah... hum..."
51060-210 = "Sua postura, de não recuar mesmo diante da injustiça."
51060-215 = "Foi muito legal."
51060-216 = "......!"
51060-217 = "Deixe o resto com a gente. Até mais."
51060-225 = "Meu lugar, o primeiro que eu escolhi por vontade própria..."
51060-226 = "Um dia, eu também serei como a Nagusa-senpai..."
51060-230 = "*Ahem*! De qualquer forma, senti fortemente que não podia ignorar a situação atual da Hyakkaryouran!"
51060-231 = "Para poder trazer de volta..."
51060-232 = "A Hyakkaryouran daqueles dias..."
51060-233 = "Eu, a elite Yukari, vencerei a 'Batalha de Sucessão' e obterei as qualificações para ser a presidente!"
51060-234 = "[s3] \"Falando nisso, você mencionou receber um 'Emblema'.\"\n[s4] \"O que é esse emblema exatamente?\""
51060-237 = "Deixe-me ver..."
51060-238 = "Para a presidente da Hyakkaryouran, há algo chamado 'Prova de Qualificação' que é passado de geração em geração pelo 'Grande Profeta'..."
51060-239 = "Dizem que quem herda esse emblema pode assumir a posição de presidente."
51060-240 = "E a 'Batalha de Sucessão' é um evento para herdar essa prova!"
51060-241 = "Mas... eu nunca vi o emblema com os meus próprios olhos."
51060-242 = "[s] \"Ah, então você nunca o viu pessoalmente.\""
51060-243 = "Sim... desde que entrei, não tive a chance de vê-lo..."
51060-244 = "Mas, você pode ver como ele é no site de relações públicas da Hyakkaryouran, então..."
51060-248 = "(Eu estava impressionado que elas tivessem até um site de relações públicas, mas isso durou pouco...)"
51060-252 = "O emblema... é este aqui!"
51060-257 = "[ns] \"Isto é, uma arma...?\""
51060-258 = "Sim. Isso mesmo."
51060-259 = "Herdada do Grande Profeta Kuzunoha, algo que apenas as presidentes de cada geração podem possuir..."
51060-260 = "É 'uma arma capaz de capturar fantasmas'!"
51060-261 = "[s5] \"Capturar fantasmas...?\"\n[s6] \"Uma arma...?\""
51060-264 = "Fufu, não o culpo por se surpreender."
51060-265 = "A história de que 'A presidente da Hyakkaryouran pode se encontrar com a Srta. Kuzunoha' e――"
51060-266 = "A história de que 'A presidente da Hyakkaryouran pode capturar fantasmas!' são informações confidenciais que até mesmo na Hyakkaryouran, apenas alguns conhecem!"
51060-267 = "[s] \"Isso não é praticamente uma lenda urbana...?\""
51060-271 = "O-O que você está dizendo...!?"
51060-272 = "Isso... isso é cruel! Uma arma especial passada para a presidente... Não há história mais emocionante que essa!"
51060-273 = "[s] \"S-Sim...\""
51060-274 = "Bem... dito isto, é apenas algo que ouvi falar... então, no fim, é só um boato. #n Não sei se é verdade ou não."
51060-275 = "Mas, se eu vencer a batalha de sucessão sem problemas e colocar minhas mãos nessa arma..."
51060-276 = "......Eu não terei medo de andar na rua à noite!"
51060-277 = "[s] \"É um bom objetivo.\""
51060-281 = "[ns7] \"Sobre a 'Batalha de Sucessão', mesmo que eu atue como testemunha...\"\n[ns8] \"Você tem alguém em mente entre os membros da Hyakkaryouran?\""
51060-284 = "Alguém que poderia me ajudar..."
51060-289 = "Eu tenho duas pessoas em mente."
51060-290 = "A capitã de ataque da Hyakkaryouran, Renge-senpai. #n E a outra, a Kikyou-senpai, que atuou como nossa estrategista silenciosa."
51060-292 = "As duas foram as que mais ficaram irritadas quando a Nagusa-senpai desapareceu."
51060-293 = "Se eu explicar a situação, tenho certeza de que elas ficarão felizes em me ajudar com a Batalha de Sucessão!"
51060-295 = "Depois, só preciso vencer!"
51060-296 = "O problema da Hyakkaryouran está resolvido!"
51060-297 = "[s] \"Onde será que elas duas estão agora?\""
51060-298 = "Hmm... acho que a Kikyou-senpai deve estar na sala de mediação da Hyakkaryouran..."
51060-299 = "Mas a casa da Renge-senpai fica perto daqui, então vamos para lá primeiro!"
51060-303 = "Vamos, por aqui!"
51060-305 = "Área residencial da Hyakkiyako"
51060-308 = "Se continuarmos por esta avenida e virarmos à esquerda no final, estaremos na casa da Renge-senpai!"
51060-311 = "Chegamos, é aqui."
51060-312 = "Então, vou chamá-la."
51060-317 = "Boa tarde, Renge-senpai! Aqui é a Yukari!"
51060-321 = "[ns] \"......Nenhuma resposta.\""
51060-322 = "A-Ara...? Isso não devia estar acontecendo..."
51060-329 = "[ns] \"Espera, Yukari, tem um aviso na porta...\""
51060-330 = "Aviso...?"
51060-334 = "Ehm, deixa eu ver..."
51060-335 = "Uhum, uhum... Ah, sim, entendi."
51060-340 = "............O quê?"
51060-341 = "[s] \"O que está escrito?\""
51060-342 = "Ehm... bem..."
51060-349 = "(No papel entregue por uma Yukari confusa, estava escrito o seguinte:)"
51060-352 = "<Para quem tiver algum assunto comigo>"
51060-353 = "<Fui em uma jornada para recuperar a minha juventude!>"
51060-357 = "[log=Silhueta da Renge]<Não pretendo voltar tão cedo!>[/log]"
51060-361 = "[ns] \"............Juventude?\""
51060-363 = "Próximo Episódio; Garota Juvenil(?) (1)"
