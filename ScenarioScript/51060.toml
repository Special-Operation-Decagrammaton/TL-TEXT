[translation]
51060-1 = "Episódio 6; O Próximo Destino"
51060-4 = "（Após terminar os procedimentos necessários, saí com Yukari para as ruas de Hyakkiyako）"
51060-9 = "Hum hum hum hum~♪"
51060-10 = "[s] \"Então, primeiro...\""
51060-14 = "（Mesmo que eu atue como a \"testemunha\" externa...）"
51060-15 = "[ns] （Ainda preciso de mais um membro da Hyakka Ryoran para julgar se os critérios estão corretos...）"
51060-16 = "Se pudermos contar com o apoio do Conselho Yin-Yang... e também do Sensei do Schale, a vitória estará praticamente garantida!"
51060-17 = "A partir de agora, o avanço triunfante da Yukari começa~!!"
51060-18 = "[s] \"Ei, Yukari, que tipo de comitê é a Hyakka Ryoran?\""
51060-19 = "Hã...? "
51060-20 = "Que tipo, você diz..."
51060-21 = "[s1] \"Antes da batalha de sucessão, eu queria...\"\n[s2] \"entender melhor como funciona o comitê.\""
51060-24 = "Entendo, de fato..."
51060-25 = "…………。"
51060-26 = "[s] \"Ah, claro, não precisa se sentir obrigada...!\""
51060-31 = "Fufu, não! #nDeixe comigo, a elite número um da Hyakka Ryoran!"
51060-41 = "Hyakka Ryoran... o nome oficial é Comitê de Mediação de Conflitos Hyakka Ryoran."
51060-42 = "É um pouco embaraçoso dizer isso vindo de mim, mas... é um comitê que reúne apenas a elite mais talentosa de toda a Academia Hyakkiyako."
51060-44 = "Sua origem remonta a uma época em que Hyakkiyako ainda não era uma \"união\", sendo um comitê de longa tradição..."
51060-45 = "Nossa principal atividade é mediar conflitos e disputas entre facções e comitês dentro da academia."
51060-46 = "[s] \"Então é tipo o Comitê Disciplinar?\""
51060-49 = "Sim. É verdade que o \"Grande Profeta\" nos confiou o papel de prender e orientar os alunos problemáticos, mas..."
51060-50 = "O que nós mais valorizamos não é punir ou dar sermões, mas sim a \"mediação\"."
51060-51 = "Na maioria dos conflitos que surgem na união, ambos os lados têm sua parcela de culpa."
51060-52 = "Por isso, nós compreendemos os sentimentos de ambos, servimos como uma ponte e mediamos para que cheguem a um acordo."
51060-53 = "……Esse é o nosso papel."
51060-54 = "[s] \"……Parece ser algo bem difícil.\""
51060-55 = "Às vezes é difícil, mas é justamente por isso que podemos ser úteis a todos!"
51060-56 = "Por isso, sinto muito orgulho das atividades da Hyakka Ryoran!"
51060-57 = "[s] \"Você realmente gosta muito da Hyakka Ryoran, né, Yukari?\""
51060-58 = "Sim!"
51060-59 = "A Hyakka Ryoran é..."
51060-60 = "Para mim, uma existência que eu admiro."
51060-72 = "Ei! Espere aí!"
51060-77 = "Hã? Quem é essa pirralha?"
51060-78 = "Se não quiser se machucar, é melhor dar o fora daqui."
51060-80 = "Eu estava observando em silêncio, mas..."
51060-81 = "O que vocês pensam que estão fazendo?!"
51060-83 = "Hã?"
51060-85 = "A gente só disse que queria usar esse super ultra hiper milagroso pegador de peixes porque esse aqui é uma porcaria."
51060-86 = "Isso não passa de um motivo egoísta! #nParem com isso agora!"
51060-88 = "Essa pirralha... se eu não te der uma lição, você não vai entender—"
51060-93 = "Ei!!"
51060-102 = "Droga...!? Q-quem é essa!?"
51060-104 = "Fazer bullying com os mais fracos e estragar o festival... #nMesmo que outros perdoem, eu, Yukari, não vou perdoar!"
51060-110 = "Hah! Se você fala tanto, espero que esteja preparada!"
51060-111 = "Sua insolente!"
51060-115 = "Ei, vocês!"
51060-132 = "Ah...!!"
51060-153 = "Q-quem está aí!?"
51060-160 = "Você se machucou?"
51060-165 = "Ah... ah, sim... estou bem, sim."
51060-167 = "Entendo... que bom."
51060-169 = "V-você atirou do nada, sua...!"
51060-170 = "Você não sabe quem nós somos!?"
51060-171 = "Sim, eu sei. Vocês estão sempre fazendo bagunça nos festivais, não é?"
51060-172 = "Quem não conhece o seu lugar aqui... são vocês."
51060-181 = "Hii!! Que precisão de tiro é essa...!"
51060-182 = "Cabelos brancos incrivelmente longos e um haori azul-claro... não pode ser...!?"
51060-191 = "F-fujam! É o Hyakkiyako Ryoran, o Hyakkiyako Ryoran chegou!!"
51060-196 = "Doryaa! Acham que vão escapar?#nJá fomos denunciados pela associação comercial!"
51060-197 = "Estão todos preparados para passar a noite inteira ouvindo sermão?"
51060-198 = "Chega de conversa fiada."
51060-202 = "Vamos persegui-los logo."
51060-203 = "Entendido! Vou na frente!#nNagusa-senpai, o resto é com você!"
51060-208 = "Ah... isso..."
51060-210 = "Essa sua postura de não se intimidar mesmo diante de atos malignos."
51060-215 = "Foi muito, muito legal."
51060-216 = "……!"
51060-217 = "Deixe o resto conosco. Até mais."
51060-225 = "O lugar que eu escolhi por conta própria pela primeira vez..."
51060-226 = "Eu também, um dia, como a Nagusa-senpai..."
51060-230 = "C-cof, cof! De qualquer forma, eu senti fortemente que não posso deixar o Hyakkiyako Ryoran atual como está!"
51060-231 = "Quero que volte a ser como era naquela época..."
51060-232 = "Quero recuperar o Hyakkiyako Ryoran..."
51060-233 = "Eu, como uma elite, vou vencer a 'Guerra de Sucessão' e conquistar o título de presidente!"
51060-234 = "[s3] \"Falando nisso, você disse que ia receber uma prova.\"\n[s4] \"O que exatamente é essa prova?\""
51060-237 = "Bem..."
51060-238 = "Para a presidente do Hyakkiyako Ryoran, existe algo chamado 'Prova de Qualificação', que é herdado de geração em geração pela 'Grande Profetisa'..."
51060-239 = "Dizem que quem herda essa prova pode assumir o cargo de presidente."
51060-240 = "A 'Guerra de Sucessão' é o evento para herdar isso!"
51060-241 = "Eu nunca... vi a prova pessoalmente, no entanto."
51060-242 = "[s] \"Ah, então você nunca viu de verdade.\""
51060-243 = "Sim... desde que entrei, não tive a oportunidade de ver..."
51060-244 = "Mas, como é a prova, pode ser visto no site de relações públicas do Hyakkiyako Ryoran..."
51060-248 = "(Enquanto eu me impressionava por existir até um site de relações públicas...)"
51060-252 = "A prova é... esta aqui!"
51060-257 = "[ns] \"Isso é uma arma...?\""
51060-258 = "Sim. Exatamente."
51060-259 = "É algo que apenas as presidentes de cada geração podem empunhar, herdado da Grande Profetisa Kuzunoha..."
51060-260 = "É uma 'arma capaz de capturar fantasmas'!"
51060-261 = "[s5] \"Capturar fantasmas...?\"\n[s6] \"Uma arma...?\""
51060-264 = "Fufu, não é de se estranhar que esteja surpreso."
51060-265 = "A história de que 'a presidente do Hyakkiyako Ryoran pode encontrar a Srta. Kuzunoha' e..."
51060-266 = "'A presidente do Hyakkiyako Ryoran pode capturar fantasmas!' são segredos de estado que apenas alguns poucos no Hyakkiyako Ryoran conhecem!"
51060-267 = "[s] \"Isso já não é uma lenda urbana...?\""
51060-271 = "Q-que tipo de coisa você está dizendo...!?"
51060-272 = "Isso... é terrível! Uma arma especial herdada pela presidente... não existe história mais emocionante que essa!"
51060-273 = "[s] \"E-entendo...\""
51060-274 = "Bem... dito isso, como é apenas algo que ouvimos falar... no fim das contas, é um boato.#nNão sei qual é a verdade."
51060-275 = "Mas, se eu conseguir vencer a batalha de sucessão e colocar minhas mãos naquela arma..."
51060-276 = "...não terei mais medo de andar à noite!"
51060-277 = "[s] \"É um bom objetivo.\""
51060-281 = "[ns7] \"Sobre a 'batalha de sucessão', eu estarei presente, mas...\"\n[ns8] \"Você tem alguém em mente dos membros da Hyakkiyako?\""
51060-284 = "Alguém que possa me dar uma força..."
51060-289 = "Tenho duas pessoas em mente."
51060-290 = "Uma é a capitã de vanguarda da Hyakkiyako, Renge-senpai. E a outra é Kikyou-senpai, que atuava como uma estrategista silenciosa."
51060-292 = "As duas ficaram extremamente furiosas quando Nagusa-senpai desapareceu."
51060-293 = "Se explicarmos a situação, tenho certeza de que ficarão felizes em ajudar na batalha de sucessão!"
51060-295 = "Depois disso, só preciso vencer!"
51060-296 = "Os problemas da Hyakkiyako estarão resolvidos!"
51060-297 = "[s] \"Onde será que as duas estão agora?\""
51060-298 = "Hmm... acho que a Kikyou-senpai deve estar na sala de mediação da Hyakkiyako..."
51060-299 = "Como a casa da Renge-senpai é mais perto daqui, vamos começar por lá!"
51060-303 = "Vamos, é por aqui!"
51060-305 = "Área residencial de Hyakkiyako"
51060-308 = "Siga por esta avenida principal e vire à esquerda no final, a casa da Renge-senpai fica ali!"
51060-311 = "Chegamos, é aqui."
51060-312 = "Vou chamá-la."
51060-317 = "Olá, Renge-senpai! É a Yukari!"
51060-321 = "[ns] \"...Não há resposta.\""
51060-322 = "Ah, ora...? Não deveria ser assim..."
51060-329 = "[ns] \"Espere, Yukari, tem um bilhete na porta...\""
51060-330 = "Um bilhete...?"
51060-334 = "Vejamos, o que diz..."
51060-335 = "Hmm, hmm... entendo, faz sentido."
51060-340 = "............Oi?"
51060-341 = "[s] \"O que estava escrito?\""
51060-342 = "Bem... é que..."
51060-349 = "(O papel entregue por uma Yukari confusa dizia o seguinte)"
51060-352 = "<Para quem precisa de mim>"
51060-353 = "<Fui em uma jornada para recuperar minha juventude!>"
51060-357 = "[log=렌게 실루엣]<Não pretendo voltar tão cedo!>[/log]"
51060-361 = "[ns] \"............Juventude?\""
51060-363 = "Próximo episódio: Juventude (?) Garota (1)"
