[translation]
51060-1 = "第6話;次の目的地"
51060-4 = "（必要な手続きを終え、ユカリと百鬼夜行の街に繰り出した）"
51060-9 = "ふんふふんふん～♪"
51060-10 = "[s] \"それじゃ、まずは……\""
51060-14 = "（外部の「立会い人」は私がやるとしても……）"
51060-15 = "[ns] （もう一人、基準が正しいかを判断するための百花繚乱の幹部が……）"
51060-16 = "陰陽部……それにシャーレの先生からもお力添えをいただけるのなら、勝利は約束されたも同然です！"
51060-17 = "ここからはユカリ快進撃の始まりですの～！！"
51060-18 = "[s] \"ねえユカリ、百花繚乱ってどんな委員会なの？\""
51060-19 = "へ……？ "
51060-20 = "どんな、と申しますと……"
51060-21 = "[s1] \"継承戦の前に、百花繚乱がどんな委員会なのか……\"\n[s2] \"ちゃんと知っておきたくて。\""
51060-24 = "なるほど、たしかに……"
51060-25 = "…………。"
51060-26 = "[s] \"あっ、もちろん無理にとは……！\""
51060-31 = "ふふっ、いえ！#n百花繚乱いちのえり～とであるこの身共にお任せください！"
51060-41 = "百花繚乱……正式名称は、百花繚乱紛争調停委員会。"
51060-42 = "身共の口から言うのは少々照れくさくもありますが……百鬼夜行連合学院の中でも、優秀なえり～とだけを集めた委員会ですのよ。"
51060-44 = "その成り立ちは、百鬼夜行が「連合」ではなかった時代にまでさかのぼるほど由緒ある委員会で……"
51060-45 = "主な活動は、学院内で発生した派閥・委員会同士の対立や紛争の仲裁です。"
51060-46 = "[s] \"風紀委員会みたいなものなんだね。\""
51060-49 = "ええ。「大預言者」から問題児の逮捕や教え導く役割を託されたのも事実ですが……"
51060-50 = "身共たちが一番大切にしているのは、罰を下したり導くことではなく「仲裁」です。"
51060-51 = "連合内で発生する対立のほとんどは、両者に非があります。"
51060-52 = "なので、お互いの思いを汲み取って架け橋となり、納得できるよう仲裁する。"
51060-53 = "……それが、身共たちの役割です。"
51060-54 = "[s] \"……とても、大変そうだけど。\""
51060-55 = "大変なこともありますが、だからこそ皆様の助けとなれるのですわ！"
51060-56 = "ゆえに身共は、百花繚乱の活動をとっても誇らしく思うのです！"
51060-57 = "[s] \"ユカリは本当に百花繚乱が好きなんだね。\""
51060-58 = "ええ！"
51060-59 = "百花繚乱は――"
51060-60 = "身共にとって、憧れの存在ですから。"
51060-72 = "そこ！お待ちなさい！"
51060-77 = "あ？なんだこのチビは。"
51060-78 = "痛い目を見たくなかったら、とっとと失せるんだな。"
51060-80 = "黙って見ていれば……"
51060-81 = "さっきから何をなさっているのですか！"
51060-83 = "ハァ？"
51060-85 = "この金魚すくいのポイがしょぼいから、こっちのスーパーウルトラハイパーミラクルポイを使いたいって言ってるだけじゃねえか。"
51060-86 = "ただの自己中心的な理由ではありませんか！#nおやめなさい！"
51060-88 = "このガキが、一回痛い目に遭わせないと分から――"
51060-93 = "えいっ！！"
51060-102 = "くっ……！？こ、こいつ！？"
51060-104 = "弱い者いじめをしてお祭りをめちゃくちゃにするだなんて……#n誰が許しても、このユカリが許しませんの！"
51060-110 = "ハッ！そこまで言うんなら覚悟はできてるんだろうな？"
51060-111 = "この身の程知らずが！"
51060-115 = "おい、お前ら！"
51060-132 = "っ……！！ "
51060-153 = "だ、誰だ！？"
51060-160 = "ケガは？"
51060-165 = "あ……あっ、はい……大丈夫、です。"
51060-167 = "そう……良かった。"
51060-169 = "い、いきなり銃を撃つなんて、お前っ……！"
51060-170 = "私たちが何者か知らないのか！？"
51060-171 = "うん、知ってる。お祭りでいつも騒いでるよね。"
51060-172 = "身の程知らずは――あなた達の方。"
51060-181 = "ひっ！！なんだこの命中精度……！"
51060-182 = "とんでもなく長い[ruby=しろかみ]白髪[/ruby]に水色の羽織……まさか……！？"
51060-191 = "に、逃げろ！百花繚乱だ、百花繚乱が来たぞ！！"
51060-196 = "どりゃぁあっ！逃がすか！#n商会からもう通報されてるんだよ！"
51060-197 = "全員、徹夜で説教受ける覚悟はできてるか？"
51060-198 = "無駄話はそこまで。"
51060-202 = "早く追いかけるよ。"
51060-203 = "分かってるって！先に行ってる！#nナグサ先輩、後はお願いします！ "
51060-208 = "あっ……その……"
51060-210 = "悪事を目の当たりにしても[ruby=ひる]怯[/ruby]まないその姿勢。"
51060-215 = "すごく、格好良かったよ。"
51060-216 = "……！"
51060-217 = "あとは私たちに任せて。それじゃ。"
51060-225 = "身共が、初めて自ら選択した居場所……"
51060-226 = "身共も、いつかはナグサ先輩のように……"
51060-230 = "こ、こほん！ともかく、身共は今の百花繚乱を放ってはおけないと強く思ったのです！"
51060-231 = "また、あの頃のような……"
51060-232 = "百花繚乱を取り戻したくて……"
51060-233 = "えり～とである身共の手で「継承戦」に勝利し、委員長としての資格を手に入れてみせますの！"
51060-234 = "[s3] \"そういえば、証を受け取るって言ってたよね。\"\n[s4] \"証って具体的にどういうものなの？\""
51060-237 = "そうですね……"
51060-238 = "百花繚乱の委員長には、代々「大預言者」から継承される、「資格の証」というものがございまして……"
51060-239 = "その証を引き継いだ者が、委員長の座につけると言われているのです。"
51060-240 = "「継承戦」はそれを継承するための行事、なのだそうです！"
51060-241 = "証を実際に目にしたことは……ありませんが。"
51060-242 = "[s] \"あ、実際に見たことはないんだね。\""
51060-243 = "はい……身共が入ってからは、目にする機会がなく……"
51060-244 = "ですが、証がどのような物なのかは、百花繚乱の広報用サイトで見られますので……"
51060-248 = "（広報用サイトもあるんだと感心するのもつかの間……）"
51060-252 = "証は……こちらですわ！"
51060-257 = "[ns] \"これは、銃……？\""
51060-258 = "ええ。そうですの。"
51060-259 = "代々の委員長だけが手にできる、大預言者クズノハから引き継がれた……"
51060-260 = "「幽霊を捕らえる事ができる銃」ですの！"
51060-261 = "[s5] \"幽霊を捕らえる……？\"\n[s6] \"銃……？\""
51060-264 = "ふふっ、驚くのも無理はありません。"
51060-265 = "「百花繚乱の委員長はクズノハ様と会える」というお話と――"
51060-266 = "「百花繚乱の委員長は、幽霊を捕らえられる！」というお話は、百花繚乱でも一部の者しか知らない、極秘事項なのですから！"
51060-267 = "[s] \"それってもはや都市伝説では……？\""
51060-271 = "な、なんて事を仰るのですか……！？"
51060-272 = "そんな……ひどいですの！委員長に受け継がれる特別な銃……これほど心躍るお話は他にありませんのに！"
51060-273 = "[s] \"う、うん……。\""
51060-274 = "まあ……とはいえ、あくまでも伝聞ですので……結局のところ噂です。#n事実がどうなのかは分かりません。"
51060-275 = "ただ、身共が継承戦で無事に勝利し、その銃を手にできたら……"
51060-276 = "……夜道も怖くありませんわ！"
51060-277 = "[s] \"良い目標だね。\""
51060-281 = "[ns7] \"「継承戦」についてだけど、私は立ち会うとして……\"\n[ns8] \"百花繚乱のメンバーは誰か心当たりあるの？\""
51060-284 = "身共の力になってくれそうな方……"
51060-289 = "二人ほど心当たりがありますわ。"
51060-290 = "一人は百花繚乱の切り込み隊長、レンゲ先輩。#nそして、もう一人は寡黙な参謀として活躍されていたキキョウ先輩。"
51060-292 = "お二人は、ナグサ先輩が行方をくらませた時に、一番腹を立てておりました。"
51060-293 = "事情を話せば、きっと喜んで継承戦を手伝ってくださるはず！"
51060-295 = "後は身共が勝利するだけですの！"
51060-296 = "百花繚乱の問題は万事おーけーですわ！"
51060-297 = "[s] \"その二人は今、どこに居るんだろう？\""
51060-298 = "んー……キキョウ先輩なら、百花繚乱の調停室にいると思いますが……"
51060-299 = "ここからでしたら、レンゲ先輩のご自宅が近いので、まずはそちらに向かいましょう！"
51060-303 = "さあ、こちらです！"
51060-305 = "百鬼夜行の住宅街"
51060-308 = "この大通りを進んで突き当たりを左に曲がれば、レンゲ先輩のご自宅ですの！"
51060-311 = "着きましたわ、こちらです。"
51060-312 = "それでは、呼んでみますの。"
51060-317 = "ごきげんよう、レンゲ先輩！ユカリですの！"
51060-321 = "[ns] \"……反応が無いね。\""
51060-322 = "あ、あら……？そんなはずは……"
51060-329 = "[ns] \"待ってユカリ、ドアの前に何か張り紙が……\""
51060-330 = "張り紙……？"
51060-334 = "ええと、どれどれ……"
51060-335 = "ふむふむ……ええ、なるほど。"
51060-340 = "…………はい？"
51060-341 = "[s] \"なんて書いてあったの？\""
51060-342 = "えっと……その……"
51060-349 = "（戸惑った表情のユカリから渡された紙には、こう書いてあった）"
51060-352 = "＜アタシに用があるヤツへ＞"
51060-353 = "＜青春を取り戻す旅に行ってくる！＞"
51060-357 = "[log=렌게 실루엣]＜しばらく帰ってくる予定は無い！＞[/log]"
51060-361 = "[ns] \"…………青春？\""
51060-363 = "次回;青春（？）少女（１）"
