[translation]
2000102-1 = "Quando precisar de ajuda, chame a C&C!"
2000102-2 = "Arredores de Millennium - Área Comercial"
2000102-4 = "……。"
2000102-5 = "Aqui é Call Sign Zero-Two, cheguei em frente ao prédio onde os reféns estão sendo mantidos."
2000102-6 = "Os criminosos estão usando um computador agora, provavelmente tentando descriptografar a senha."
2000102-7 = "Parece que o arquivo ainda não foi transferido, que bom."
2000102-8 = "Consegui visualizar a posição dos reféns daqui."
2000102-9 = "Presumo que pertençam ao Departamento de Segurança do Conselho Estudantil, capturadas ao tentarem proteger os arquivos."
2000102-10 = "Por enquanto, os reféns são duas alunas de Millennium e... hein?"
2000102-11 = "Se, Sensei?"
2000102-12 = "Por que diabos o Sensei está aqui...?"
2000102-13 = "Acabei de receber um relatório dizendo que ele foi capturado junto com as alunas de Millennium ao tentar protegê-las...!"
2000102-14 = "Francamente... aquele homem!"
2000102-15 = "Julgo a situação como nível de emergência! Zero-Two! Vou invadir agora!"
2000102-17 = "E, espere!"
2000102-19 = "Dentro do prédio"
2000102-20 = "Hehe, está na hora de começar a transferência do arquivo."
2000102-21 = "Se conseguirmos enviar este arquivo para o cliente, ficaremos ricos..."
2000102-22 = "(BOOM!)"
2000102-23 = "O, o, o que foi isso!"
2000102-24 = "A, ataque! O Maid Club invadiu!"
2000102-25 = "Droga! Já nos encontraram!"
2000102-26 = "Temos que dar um jeito de levar pelo menos este arquivo..."
2000102-28 = "(BANG!)"
2000102-30 = "Argh!"
2000102-31 = "Q, que tipo de pessoa é você!"
2000102-32 = "F, fujam!"
2000102-35 = "Sensei!"
2000102-36 = "Você está bem? Por que está em um lugar como este..."
2000102-37 = "Hein? As alunas de Millennium estavam em perigo e você não conseguiu salvá-las...?"
2000102-38 = "Então, sem escolha, você acabou sendo capturado junto com elas?"
2000102-39 = "……Inacreditável."
2000102-40 = "Eu respeito essa sua bondade e capacidade de comando, Sensei, mas..."
2000102-41 = "Uma única bala pode ser fatal... Como o Sensei é fisicamente fraco, essa definitivamente não foi uma escolha inteligente."
2000102-42 = "Se eu não tivesse chegado, o que eles teriam feito com você...?"
2000102-43 = "Atirem!"
2000102-45 = "Droga! Restos do grupo?"
2000102-46 = "Vocês são bem persistentes..."
2000102-47 = "Hmph, persistentes!?"
2000102-48 = "Por que você não desiste logo!"
2000102-49 = "Ei, empregada. #nSua missão é resgatar os reféns e recuperar o arquivo antes que ele seja transferido, não é?"
2000102-50 = "Se não fosse isso, você não teria atirado primeiro em quem estava no computador."
2000102-51 = "……!"
2000102-52 = "Hahaha, sinto muito, mas já é tarde demais! #nA descriptografia da senha! E a transferência do arquivo também! Isso mesmo, você não chegou a tempo!"
2000102-53 = "O, o quê!?"
2000102-54 = "Hahaha! Quando você atacou agora há pouco, o tempo restante para a transferência já era inferior a 10 segundos! #nNeste momento, o arquivo já deve ter sido transferido para o cliente..."
2000102-55 = "Ué?"
2000102-56 = "O, o, o quê?!"
2000102-57 = "……?"
2000102-58 = "A transferência do arquivo parou faltando 1 segundo! Por que diabos..."
2000102-59 = "……Hm?"
2000102-60 = "P-Professor!? O que você tem aí na mão é……."
2000102-61 = "[s1] \"Eu…… parei o tempo. Heh.\"\n[s2] \"Eu tirei o cabo da internet.\""
2000102-62 = "B-Bom trabalho, Professor! Mandou bem!"
2000102-63 = "B-Bom trabalho, Professor! Mandou bem!"
2000102-64 = "Droga! Devolva esse cabo!"
2000102-65 = "[s3] Devolver o cabo.\n[s4] Perguntar à Karin o que fazer."
2000102-66 = "O cabo? Tudo bem, eu devolvo."
2000102-67 = "O cabo? Tudo bem, eu devolvo."
2000102-68 = "De qualquer forma, agora……."
2000102-69 = "(TUM!)"
2000102-71 = "(CABUUUM!)"
2000102-72 = "Argh! O PC!"
2000102-73 = "V-V-Você vai me pagar!"
2000102-76 = "Ufa……."
2000102-77 = "Com isso, finalmente…… a missão foi concluída?"
2000102-78 = "Hm? Ah, não vou persegui-los. Pode haver remanescentes por aí."
2000102-79 = "Meu papel não é derrotá-los, mas sim proteger as pessoas que estão aqui."
2000102-80 = "E também, proteger você, Professor……."
2000102-81 = "Ah, falando nisso, esqueci de dizer."
2000102-82 = "Obrigada, Professor. Graças a você, consegui concluir a missão em segurança."
2000102-83 = "Quem diria que você tiraria o cabo da internet naquela situação."
2000102-84 = "……."
2000102-85 = "Sobre o que eu disse antes, de que você era fraco, eu retiro o que disse."
2000102-86 = "Você é uma pessoa corajosa, Professor."
2000102-89 = "Ah, uma comunicação. #n…… Parece que o resto do Maid Club está cuidando dos remanescentes."
2000102-90 = "Já está na hora de voltar."
2000102-91 = "……Bem, Professor."
2000102-92 = "Conto com você daqui para frente."
