[translation]
2000102-1 = "お手伝いが必要な時は、C&Cへ！"
2000102-2 = "ミレニアム近郊・繁華街"
2000102-4 = "……。"
2000102-5 = "こちらコールサインゼロツー、人質が捕らえられている建物の前に到着した。"
2000102-6 = "現在犯人たちはパソコンを使用中、おそらくパスワードを解析している模様。"
2000102-7 = "まだファイルは転送されてない様子、良かった。"
2000102-8 = "今、私の方でも人質たちの位置を視認できた。"
2000102-9 = "おそらくはファイルを保護しようとして捕まった、生徒会の保安部所属だと推定される。"
2000102-10 = "とりあえず人質は、ミレニアムの女子生徒二人と……ん？"
2000102-11 = "せ、先生？"
2000102-12 = "いったいなぜ先生がここに……？"
2000102-13 = "巻き込まれたミレニアムの女子生徒たちを守ろうとして、一緒に捕まったという報告が今……！"
2000102-14 = "まったく……あの人は！"
2000102-15 = "状況は緊急レベルと判断！ゼロツー！先に侵入する！"
2000102-17 = "ま、待ってください！"
2000102-19 = "建物内部"
2000102-20 = "へへ、そろそろファイルの転送を始めようか。"
2000102-21 = "このファイルさえ依頼主に送れれば、私たちも大金持ちに……。"
2000102-22 = "（ドカーン！）"
2000102-23 = "な、な、何だ！"
2000102-24 = "しゅ、襲撃だ！メイド部が突入してきた！"
2000102-25 = "くそ！もう嗅ぎ付けられたのか！"
2000102-26 = "何とかしてこのファイルだけでも……。"
2000102-28 = "（ターン！）"
2000102-30 = "ぐあっ！"
2000102-31 = "な、なんてやつだ！"
2000102-32 = "に、逃げろ！"
2000102-35 = "先生！"
2000102-36 = "大丈夫？どうしてこんなとこに……。"
2000102-37 = "ん？ミレニアムの女子生徒たちが危ない目に遭ってたけど、助けられなくて……。"
2000102-38 = "仕方ないからそのまま一緒に捕まった？"
2000102-39 = "……信じられない。"
2000102-40 = "先生のそういう善良な意志や、指揮能力は尊敬するけれど……。"
2000102-41 = "弾丸一発でも危険なことになり得るんだ……。先生自身は弱いのだから、決して賢明な選択ではないだろう。"
2000102-42 = "もし私が来なかったら、先生はこいつらに……。"
2000102-43 = "撃て！"
2000102-45 = "くっ！残党か！"
2000102-46 = "諦めの悪いやつらだな……。"
2000102-47 = "ふっ、諦めだと！？"
2000102-48 = "お前の方こそ諦めたらどうだ！"
2000102-49 = "おい、メイド。#nお前の任務はどうせ、人質を救出し、ファイルが転送される前に回収することだろう？"
2000102-50 = "そうじゃなけりゃ、パソコンの前にいるやつを真っ先に撃ったりはしないだろうからな。"
2000102-51 = "……！"
2000102-52 = "ふはは、悪いがもう手遅れだよ！#nパスワードの解析も！そしてファイルの転送もな！そうだ、お前は間に合わなかったんだ！"
2000102-53 = "な、なに！？"
2000102-54 = "ふはは！さっきお前が攻撃してきた時、すでにファイルの転送残り時間は10秒を切っていた！#n今頃ファイルは依頼主の元に転送され……"
2000102-55 = "あれ？"
2000102-56 = "な、な、なにぃ？！"
2000102-57 = "……？"
2000102-58 = "ファイルの転送が1秒を残して止まってるだと！いったいどうして……。"
2000102-59 = "……ん？"
2000102-60 = "せ、先生！？その手にあるのは……。"
2000102-61 = "[s1] \"私が……時を止めた。フッ。\"\n[s2] \"インターネットの線、抜いちゃった。\""
2000102-62 = "よ、よくやった先生！ナイスだ！"
2000102-63 = "よ、よくやった先生！ナイスだ！"
2000102-64 = "くっ！その線を返せ！"
2000102-65 = "[s3] 線を返す。\n[s4] カリンにどうするか聞く。"
2000102-66 = "線？返してもいい。"
2000102-67 = "線？返してもいい。"
2000102-68 = "どうせもう……。"
2000102-69 = "（ターンッ！）"
2000102-71 = "（ドカーーーン！）"
2000102-72 = "くあああっ！PCが！"
2000102-73 = "お、お、覚えてろ！"
2000102-76 = "ふぅ……。"
2000102-77 = "これでようやく……任務完了か？"
2000102-78 = "ん？ああ、追わない。残党がいるかもしれないし。"
2000102-79 = "私の役割はあいつらを倒すことじゃなくて、ここにいる人たちを守ることだから。"
2000102-80 = "それから、先生のことも……。"
2000102-81 = "ああ、そういえば言い忘れていた。"
2000102-82 = "ありがとう、先生。おかげで任務を無事完了できた。"
2000102-83 = "まさかあの状況でネットの線を抜くなんて。"
2000102-84 = "……。"
2000102-85 = "さっき、弱いって言ったこと、取り消す。"
2000102-86 = "先生は勇気のある人だ。"
2000102-89 = "あ、通信。#n……残党は他のメイド部が清掃してるらしい。"
2000102-90 = "もう帰らなきゃ。"
2000102-91 = "……えっと、先生。"
2000102-92 = "これからも、よろしく。"
