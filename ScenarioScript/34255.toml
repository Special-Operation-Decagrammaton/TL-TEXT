[translation]
34255-5 = "O-O que está acontecendo! Por que não conseguimos contato com a Madame!?"
34255-6 = "Emergência!! Pelas dezenas de entradas das catacumbas no distrito...!!"
34255-7 = "T-Tropas de Trinity...!!"
34255-8 = "O-O quê!?"
34255-14 = "P-Por aqui!"
34255-15 = "T-Tropas em frente!"
34255-23 = "Q-Quem está aí!!"
34255-30 = "Então este é o distrito de Arius..."
34255-31 = "Como a Seia-sama disse... este lugar precisa de 'salvação'."
34255-37 = "P-Parem!!"
34255-51 = "—Por favor, me perdoem. Eu negligenciei meus deveres por conta de sentimentalismos pessoais. Vocês também são pessoas que precisam de salvação, não é...?"
34255-52 = "Serina, Hanae. Cuidem dos ferimentos delas."
34255-53 = "S-Sim... Capitã."
34255-54 = "E além disso—eu peço que as pessoas que eu ferir daqui em diante também recebam cuidados médicos imediatos."
34255-55 = "Estou indo!!"
34255-64 = "C-Capitã..."
34255-66 = "Esse é o nosso lema: 'A Capitã Mine destrói, e as Cavaleiras Hospitalárias curam'!! #nFaz tempo que as Cavaleiras Hospitalárias não mostram seu verdadeiro poder!"
34255-67 = "N-Nós não temos esse lema, Hanae..."
34255-69 = "Vamos lá, movam-se rápido, meninas!"
34255-70 = "Com convicção e orgulho no coração! Ofereçam salvação prontamente a quem precisar!"
34255-71 = "Libertaremos o distrito de Arius e salvaremos o Sensei e a Mika-sama!!"
34255-73 = "Sim!"
34255-74 = "Ser chamada do nada de madrugada para uma missão dessas...! #nBuáá!"
34255-76 = "Próximo Episódio; O Nosso Futuro"