[translation]
34255-5 = "O-o que aconteceu! Por que não conseguimos contato com a Madame!?"
34255-6 = "É uma emergência!! Dezenas de entradas das catacumbas no distrito autônomo estão..."
34255-7 = "S-soldados da Trinity estão...!!"
34255-8 = "O-o quê!?"
34255-14 = "P-por aqui!"
34255-15 = "A-avançar!"
34255-23 = "Q-quem está aí!!"
34255-30 = "Então este é o Distrito Autônomo de Arius..."
34255-31 = "Como a Seia-sama disse... eles realmente precisam de 'socorro'."
34255-37 = "P-parem!!"
34255-51 = "――Por favor, perdoem-me. Por causa de um sentimento pessoal, negligenciei o dever que deveria cumprir. Mesmo sabendo que elas também são pessoas que precisam de socorro..."
34255-52 = "Serina, Hanae. Cuidem dos ferimentos delas."
34255-53 = "S-sim... Comandante."
34255-54 = "E então―― peço que socorram e tratem prontamente os feridos que eu irei causar a partir de agora."
34255-55 = "Vamos nessa!!"
34255-64 = "C-comandante..."
34255-66 = "Isso é exatamente o nosso lema: 'A Comandante Mine destrói e a Cavalaria cura'!!#nFaz tempo que a Cavalaria de Socorro não mostra seu verdadeiro valor!"
34255-67 = "N-não existe um lema desses..."
34255-69 = "Vamos, movam-se com agilidade!"
34255-70 = "Com fé e orgulho no peito! Socorro adequado, onde for necessário!"
34255-71 = "Vamos libertar o Distrito Autônomo de Arius e salvar o Sensei e a Mika-sama!!"
34255-73 = "Sim!"
34255-74 = "Ser chamada de madrugada para uma missão dessas de repente...!#nUaaaaa!"
34255-76 = "Próximo episódio: O nosso futuro"
