[translation]
34255-5 = "O-o que houve! Por que não há contato com a Madame!?"
34255-6 = "Emergência!! Das dezenas de entradas das catacumbas espalhadas pelo distrito……!!"
34255-7 = "S-soldados de Trinity……!!"
34255-8 = "C-como é que é!?"
34255-14 = "É-é por aqui!"
34255-15 = "M-mobilizar!"
34255-23 = "Q-quem é!!"
34255-30 = "Então este é o distrito autônomo de Arius……."
34255-31 = "É como a senhorita Seia disse…… aqui é preciso \"socorro\"."
34255-37 = "P-parem!!"
34255-51 = "――Perdoem-me. Por um sentimentalismo pessoal, negligenciei o dever que me cabia. Sendo que elas também são pessoas que precisam de socorro……."
34255-52 = "Serina, Hanae. Cuidem do tratamento delas."
34255-53 = "S-sim…… comandante."
34255-54 = "E――os feridos que eu gerar de agora em diante, peço que socorram e tratem prontamente."
34255-55 = "Lá vou eu!!"
34255-64 = "C-comandante……"
34255-66 = "É exatamente o nosso lema: \"a comandante Mine quebra e a Ordem conserta\"!!#nDepois de tanto tempo, a Ordem dos Cavaleiros de Socorro mostra a que veio!"
34255-67 = "E-esse lema não existe, viu……."
34255-69 = "Vamos, mexam-se com agilidade!"
34255-70 = "Com convicção e orgulho no peito! Socorro adequado, onde for preciso!"
34255-71 = "Libertar o distrito autônomo de Arius e salvar o Sensei e a senhorita Mika!!"
34255-73 = "Sim!"
34255-74 = "Ser convocada de madrugada pra uma missão dessas, do nada……!#nBuááá!"
34255-76 = "Próximo Episódio;O Nosso Daqui pra Frente"
