[translation]
32010-1 = "Episódio 1: O Monstro Gigante"
32010-3 = "[ns] \"Azusa… é a traidora……？\""
32010-4 = "Sim. Por isso quero que você proteja ela."
32010-5 = "……Ah, desculpa. Fui direta demais？ Talvez o jeito ruim da Nagi-chan tenha pegado em mim."
32010-6 = "Pra não deixar o Sensei confuso, vou explicar desde o começo direitinho？"
32010-7 = "Eu não sou tão inteligente quanto a Nagi-chan ou a Seia-chan, mas…"
32010-8 = "Vou me esforçar pra explicar de um jeito que fique claro！"
32010-9 = "[s] \"Tá bom, pode falar.\""
32010-10 = "Primeiro, sobre a «Trinity General School». Como a Nagi-chan disse antes, o maior característica dela é ser uma escola formada pela união de várias facções."
32010-12 = "Pater, Filius, Sanctus… essas três facções viraram o centro de Trinity, como eu já tinha contado."
32010-13 = "Mas na verdade tem muitas outras: a precursora da atual «Ordem dos Cavaleiros de Resgate», a «Sisterhood» e várias facções grandes e pequenas."
32010-14 = "No começo, essas facções se viam como inimigas, tipo Trinity e Gehenna hoje em dia."
32010-15 = "Era uma época de conflito todo santo dia."
32010-16 = "Aí, em vez de continuar brigando, resolveram fazer um pacto de paz."
32010-17 = "Vamos parar de lutar e virar uma única escola… essa conversa foi o que chamamos de «Primeira Assembleia Geral»."
32010-18 = "[s] \"Sim, já ouvi falar disso em algum lugar.\""
32010-20 = "Pois é… e então…"
32010-21 = "Depois dessa assembleia nasceu a atual «Trinity General School»."
32010-22 = "Ainda existem resquícios das facções antigas, mas com o tempo as pessoas pararam de ligar. Hoje a maioria nem lembra que teve briga."
32010-23 = "Mas aquela assembleia não terminou em paz total… tinha uma facção que se opôs até o fim."
32010-24 = "Essa facção era a «Arius»."
32010-26 = "No começo eles não eram tão diferentes de nós, só mais uma facção."
32010-27 = "Tinha uma pequena diferença de interpretação das escrituras, mas eram bem parecidos."
32010-28 = "Tinham aulas no capela, aparência quase igual… e odiavam Gehenna do fundo do coração."
32010-29 = "Mas a Arius se opôs ferozmente à união… e no final virou conflito."
32010-30 = "Trinity, que ganhou um poder enorme com a união, começou a esmagar a Arius com toda força."
32010-31 = "Quando se tem poder demais, a gente acaba querendo testar ele… é uma história comum. A Arius acabou virando o alvo perfeito."
32010-32 = "E assim, a Arius foi destruída."
32010-33 = "Expulsa do território de Trinity. Agora… não sei os detalhes, mas parece que eles estão escondidos em algum lugar de Kivotos."
32010-34 = "Deve ter sido uma guerra brutal. Eles se esconderam tão bem que nem o Conselho Estudantil Geral sabe onde fica o território deles."
32010-35 = "Pra maioria dos alunos, é tipo «existia uma escola assim？» A maioria nem sabe que essa briga aconteceu."
32010-36 = "Desapareceram dos holofotes, e hoje mal sobrou sombra… essa é a Arius Branch School."
32010-37 = "[s] \"Azusa é dessa… Arius Branch School……\""
32010-39 = "Sim."
32010-40 = "E o «Tratado de Eden» que a Nagi-chan tá empurrando… é basicamente uma recriação da «Primeira Assembleia Geral»."
32010-41 = "Tratado de Eden… as duas grandes escolas prometendo que vão se dar bem de agora em diante."
32010-42 = "……Parece uma história bonita, né？ Mas na real, o cerne é criar uma nova força militar unindo as forças de Trinity e Gehenna, chamada de «Organização do Tratado de Eden», ou ETO."
32010-43 = "……Isso. O Tratado de Eden é, no fundo, uma aliança militar."
32010-48 = "O objetivo é o nascimento de uma enorme força militar combinando as forças de Trinity e Gehenna……"
32010-51 = "Uma força tão esmagadora nascendo… justo agora, num período de caos total com a ausência da Presidente do Conselho Estudantil Geral."
32010-52 = "Com um poder tão grande nas mãos, o que será que a Nagi-chan pretende fazer？"
32010-53 = "Atacar o Conselho Estudantil Geral que tá sem líder e virar a nova Presidente？"
32010-54 = "Ou esmagar Millennium, que tá crescendo como uma nova força？"
32010-55 = "Não sei os detalhes, mas uma coisa eu posso afirmar com certeza."
32010-56 = "Quando se tem um poder tão grande, a tendência é usar ele pra eliminar o que não gosta…"
32010-57 = "Do mesmo jeito que Trinity fez com Arius no passado."
32010-58 = "Ou talvez… do mesmo jeito que aconteceu com a Seia-chan……"
32010-62 = "……Não, desculpa. Isso foi um deslize."
32010-63 = "[s] \"O que aconteceu com a Seia？\""
32010-64 = "……。"
32010-65 = "……Como eu já contei antes. A Seia-chan está internada."
32010-66 = "[s] \"……Posso perguntar onde ela está agora？\""
32010-67 = "Uuuu……"
32010-68 = "……Sensei, você realmente quer saber？"
32010-69 = "……Se eu contar isso, não vou mais poder voltar atrás."
32010-70 = "Se o Sensei souber a verdade e me trair… eu vou estar acabada."
32010-71 = "Mesmo assim, quer saber？"
32010-72 = "[s] \"Trair…\""
32010-73 = "……Não, tudo bem. Você disse que é meu aliado."
32010-74 = "Se eu for traída depois disso… bom, até que não seria ruim. Ehehe."
32010-75 = "……A Seia-chan não está internada."
32010-80 = "O Halo dela foi destruído."
32010-81 = "[s] \"……っ！？\""
32010-82 = "……。"
32010-84 = "Não é brincadeira. É verdade."
32010-85 = "No ano passado, a Seia-chan foi atacada de repente por alguém."
32010-86 = "Oficialmente dizem que ela está «internada», mas… a verdade é essa."
32010-87 = "Além de nós do Tea Party, quase ninguém em Trinity sabe disso."
32010-88 = "Talvez a «Sisterhood» saiba… a rede de informação delas é absurda."
32010-89 = "Enfim, é um segredo desse nível."
32010-91 = "[ns] \"O culpado ainda……？\""
32010-92 = "……Sim, não sabemos. A investigação está em andamento, mas não temos nada concreto… e como a Seia-chan já era uma pessoa cheia de segredos…"
32010-93 = "……É, basicamente isso."
32010-94 = "[s] \"………。\""
32010-95 = "Mas não quer dizer que não temos suspeitos… só que ainda é cedo pra falar baseado em suposições."
32010-96 = "……Voltando ao assunto."
32010-97 = "«Shirasu Azusa»…… fui eu que fiz ela se transferir pra Trinity."
32010-98 = "[s] \"Você, Mika？\""
32010-99 = "Sim, escondido da Nagi-chan. Fiz todos os documentos falsos e matriculei ela."
32010-100 = "……Por quê？ Você deve estar se perguntando."
32010-101 = "A Arius Branch School ainda nos odeia."
32010-102 = "Enquanto a gente vive no luxo, elas sobrevivem em condições horríveis, sem nem saber o que significa «aprender»…"
32010-103 = "Elas recusam nossa mão estendida e a ajuda do Conselho Estudantil Geral. Tudo por causa do ódio do passado."
32010-104 = "……Eu queria uma reconciliação com Arius."
32010-105 = "Mas esse ódio é grande demais pra ser apagado facilmente… tem camadas e camadas de mal-entendidos e desconfiança. É algo que eu sozinha não consigo resolver."
32010-106 = "A Nagi-chan e a Seia-chan eram contra… por motivos políticos. Entendo o lado delas. Afinal, somos o Tea Party."
32010-107 = "Eu sou desajeitada com política, mas… será que é tão difícil voltar a se dar bem？"
32010-108 = "Não dá pra tomar chá junto e resolver os mal-entendidos como antes？"
32010-112 = "Eu queria que aquela menina… «Shirasu Azusa»… virasse o símbolo da reconciliação."
32010-113 = "Não sei muito sobre ela, mas parece que era uma das melhores alunas de Arius. Quis apostar nessa possibilidade."
32010-114 = "Talvez eu pudesse ter convencido a Nagi-chan a fazer isso oficialmente, mas… eu duvidei que ela fosse aceitar."
32010-115 = "Achei que ela não ia me ouvir."
32010-116 = "Se o Tratado de Eden fosse assinado… aí sim a reconciliação com Arius viraria impossível de verdade. Por isso eu queria fazer antes."
32010-117 = "Queria mostrar pra todo mundo que uma aluna de Arius consegue viver feliz em Trinity."
32010-118 = "Mas foi aí que a Nagi-chan começou a falar que tinha uma «traidora» em Trinity…"
32010-119 = "……Não sei por que a Nagi-chan começou a pensar isso. Talvez eu tenha feito algo que chamou atenção."
32010-120 = "Aí ela criou o «Clube de Reforço» pra impedir que atrapalhasse o tratado."
32010-121 = "No começo eu nem entendi o que era «Clube de Reforço»… ah, Sensei. Você perguntou por que justamente essas meninas foram escolhidas？"
32010-122 = "As que estão lá são as que a Nagi-chan suspeita."
32010-125 = "A Hanako-chan é bem excêntrica, mas é uma aluna absurdamente talentosa. No sentido acadêmico mesmo. Já chegou a ser cogitada como candidata a Presidente do Conselho, ou seja, membro do Tea Party."
32010-126 = "A «Sisterhood» também tentou recrutar ela. Não deu certo, pelo que ouvi."
32010-131 = "Na aula no capela, ela apareceu de biquíni no meio daquela atmosfera sagrada… eu estava lá por acaso, as freiras expulsaram ela e a expressão de todo mundo foi impagável. Ahaha."
32010-134 = "……Mas, apesar de ser tão talentosa e ter um futuro brilhante pela frente, ela de repente mudou. Chegou a ficar quase reprovada."
32010-135 = "……Por quê, né？"
32010-137 = "É claro que dá pra entender a vontade de investigar. Aquela menina já tinha contato com a alta cúpula de Trinity e sabia de vários segredos importantes."
32010-138 = "Pra Nagi-chan, era impossível ignorar."
32010-141 = "A Koharu-chan… ela é uma menina pura, boa, que não tem nada a ver com política suja."
32010-146 = "Por que ela foi escolhida… bom, acho que foi simplesmente porque foi «suspeita». A causa direta não foi ela, mas a Hasumi-chan e o resto."
32010-147 = "[s] \"Hasumi e as outras……？\""
32010-150 = "Uma força militar enorme, especialmente alguém como a Hasumi-chan que odeia Gehenna do fundo do coração, fora do controle… a ansiedade de que algo possa acontecer…"
32010-151 = "Acho que a Nagi-chan queria algum tipo de garantia contra isso."
32010-152 = "Se fosse o Comitê de Execução da Justiça, qualquer um serviria. Como a Koharu-chan tinha notas ruins, ela foi a escolhida."
32010-153 = "Ou seja, ela é uma refém. Sobre a expulsão, a Hasumi-chan provavelmente sabia."
32010-154 = "[s] \"……。\""
32010-155 = "Você tá com cara de quem acha que a Hasumi-chan nunca faria isso？ Uhum, não sei o quanto vocês são próximos, mas…"
32010-156 = "Ouvi dizer que já rolou uma coisa assim antes."
32010-158 = "Sala do Comitê de Execução da Justiça"
32010-163 = "……。"
32010-164 = "……。"
32010-165 = "H-Hasumi-senpai, por favor se acalme――"
32010-169 = "Eu nunca, NUNCA vou perdoar！！ Pandemônio！！ Gehenna！！ Por que, POR QUE eles chegam a esse ponto……！！"
32010-170 = "Hii……！"
32010-171 = "Haa… haa……"
32010-172 = "……Escutem bem. Eu declaro aqui e agora."
32010-173 = "De agora em diante eu…… eu……っ！"
32010-175 = "A Hasumi-chan é vice-presidente do «Comitê de Execução da Justiça», a força militar de Trinity, e odeia Gehenna com todas as forças."
32010-176 = "É óbvio que ela vai se opor ao Tratado de Eden com tudo. «Aliança com Gehenna？ Jamais！»"
32010-177 = "E tem a… Hifumi-chan."
32010-180 = "Hifumi-chan é gentil, fofa, uma boa menina. A Nagi-chan gosta muito dela."
32010-181 = "……Mas mesmo assim, o olhar desconfiado da Nagi-chan acabou caindo nela."
32010-183 = "Parece que ela saía escondida da escola e ia pra lugares suspeitos. Mercados negros onde alunos de Trinity são proibidos de entrar, esse tipo de coisa."
32010-184 = "Também chegaram informações de que ela tem ligação com alguma organização criminosa. Uma menina que parece tão pura e inocente…"
32010-185 = "[s] \"……………………。\""
32010-186 = "A Nagi-chan gosta da Hifumi-chan, mas mesmo assim desconfiou. Bom, isso é bem a cara dela."
32010-187 = "E aí a suspeita da Nagi-chan de que «tem uma traidora em Trinity» foi crescendo com as informações, até virar «qual dessas meninas é a traidora？」"
32010-188 = "Nem era mais uma questão de se existia ou não, pra ela já era fato consumado."
32010-189 = "……Essa é a situação atual. Acho que consegui explicar tudo que eu sei."
32010-190 = "[s] \"A traidora……\""
32010-191 = "……O que a palavra «traidora» realmente significa. Se eu esclarecer isso um pouco, consigo dar uma resposta mais clara."
32010-192 = "Primeiro, a Nagi-chan acha que «alguém está tentando enganar Trinity». Que tem um espião."
32010-193 = "Nesse sentido, a «traidora» que a Nagi-chan menciona é a menina que falsificou o histórico, a «Shirasu Azusa»."
32010-194 = "Como eu disse antes, ela é originalmente de Arius, que é inimiga de Trinity."
32010-195 = "Por minha causa, ela foi jogada no meio dessa briga política enorme sem saber de nada…"
32010-196 = "Mas eu não posso deixar ela ser expulsa assim."
32010-197 = "Por isso quero que você proteja ela. Agora, só você pode fazer isso."
32010-198 = "E, de certa forma… eu também sou uma «traidora» pra Nagi-chan. Porque eu não apoio o Tratado de Eden que ela tá empurrando."
32010-199 = "Como não sou a host, não tenho poder pra atrapalhar, mas…"
32010-200 = "……。"
32010-201 = "……E, de outro ponto de vista, também dá pra dizer isso, né？"
32010-202 = "A «traidora de Trinity»……"
32010-206 = "Pode ser a própria Nagi-chan. Você não acha？"
32010-207 = "A pessoa que está tentando transformar Trinity, que vivia em harmonia, num [ruby=リヴァイアサン]monstro gigante[/ruby]…… não seria uma interpretação válida？"
32010-209 = "……Bom, mas tudo isso é só a minha versão unilateral da história."
32010-210 = "Então, no final, a decisão é sua, Sensei. Vai proteger a Azusa？ Vai procurar a traidora？ Vai confiar na Nagi-chan？ Ou vai confiar em mim？"
32010-211 = "[s] \"Mika, pra você isso é suficiente？\""
32010-212 = "Sobre aquela menina eu tenho responsabilidade… mas eu só consigo pedir ajuda."
32010-213 = "……Hm, espera？ Isso que você disse agora… será que tá preocupado comigo？"
32010-214 = "Ahaha. Você é realmente gentil, Sensei. Uhum, quase me faz acreditar. Ehehe……"
32010-215 = "Mas não precisa se preocupar comigo. Apesar da aparência, eu sou bem forte♪"
32010-216 = "Então, por hoje é isso. Foi bom conversar com você de novo, Sensei."
32010-217 = "E ficar sozinha com você por muito tempo pode gerar rumores estranhos. Fufu…… bom, eu não me importo nem um pouco com isso."
32010-218 = "Até mais, Sensei."
32010-220 = "（Depois de se despedir da Mika, voltei para onde as meninas estavam.）"
32010-222 = "Próximo; Sisterhood"