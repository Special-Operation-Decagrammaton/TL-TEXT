[translation]
32010-1 = "Episódio 1;O Monstro Colossal"
32010-3 = "[ns] \"A Azusa, uma traidora……?\""
32010-4 = "Sim. E, por isso, eu quero que você proteja aquela menina."
32010-5 = "……Ah, desculpa. Fui um pouco direta demais, né?#nDeve ter me pegado o vício ruim da Nagi."
32010-6 = "Pra você, Sensei, que tá confuso, deixa eu tentar explicar um pouco mais desde o comecinho?"
32010-7 = "Eu não sou lá muito inteligente, que nem a Nagi ou a Seia, mas……."
32010-8 = "vou me esforçar pra passar direitinho a mensagem!"
32010-9 = "[s] \"Sim, por favor.\""
32010-10 = "Primeiro, sobre esta \"Academia Geral de Trinity\".#nComo a Nagi falou outro dia, a maior característica dela é ser \"uma escola formada pela reunião de muitas facções\"."
32010-12 = "Pater, Filius, Sanctus…… que essas três facções se tornaram o centro de Trinity, isso eu já contei."
32010-13 = "Mas, pra ser exata, também havia várias outras facções, grandes e pequenas, incluindo a que deu origem à atual \"Ordem dos Cavaleiros de Socorro\", e também a \"Sisterhood\"."
32010-14 = "Originalmente, essas várias facções se viam como inimigas umas das outras,#njusto como a Trinity e a Gehenna de hoje."
32010-15 = "Dizem que houve uma era de conflito atrás de conflito, todo santo dia."
32010-16 = "Então, decidiu-se fazer uma promessa: em vez de continuar guerreando, seguir em paz."
32010-17 = "\"A gente não precisa mais lutar, vamos virar uma única academia\"…… essa conversa foi o chamado \"Primeiro Concílio\"."
32010-18 = "[s] \"Sim, já ouvi isso em algum lugar.\""
32010-20 = "Pois é, e aí……"
32010-21 = "o que nasceu desse concílio foi a \"Academia Geral de Trinity\", onde a gente está hoje."
32010-22 = "Mentira dizer que não restou nenhum resquício da época das facções…… mas é o correr dos tempos, né? Hoje em dia, a maioria das vozes já nem liga mais pra isso."
32010-23 = "Mas esse concílio não terminou numa conversa pacífica e harmoniosa…… naquela época, houve uma academia que ficou contra até o fim."
32010-24 = "E essa foi a \"Arius\"."
32010-26 = "Originalmente, uma facção que não devia ser tão diferente da gente."
32010-27 = "Havia só uma pequena diferença de interpretação sobre as escrituras; no mais, dizem que era bem parecida em várias coisas."
32010-28 = "Tinha as aulas na capela direitinho, a aparência era quase igual…… e, ainda assim, odiava Gehenna do fundo do coração."
32010-29 = "Mas essa Arius se opôs ferozmente à formação da união……#ne, no fim, isso acabou levando a um conflito."
32010-30 = "A Academia Geral de Trinity, que virou união e passou a ter um poder imenso, começou a reprimir a Arius por completo, com essa grande força."
32010-31 = "Quando se tem poder demais, dá vontade de testar essa força…… isso é uma história comum. No fim das contas, talvez dê pra dizer que a Arius foi, tristemente, um alvo bem conveniente."
32010-32 = "E, assim, a Arius foi esmagada."
32010-33 = "Expulsa do distrito autônomo de Trinity, agora…… os detalhes eu não sei, mas parece que ela se esconde em algum canto de Kivotos."
32010-34 = "Deve ter sido uma luta bem violenta. Depois disso, parece que ela se escondeu num lugar impossível de achar; provavelmente, nem o próprio Conselho Estudantil Geral sabe, até hoje, onde fica esse distrito autônomo."
32010-35 = "Pra maioria dos alunos, é tipo \"existia uma academia dessas?\". Quase todos, com certeza, nem sabem que houve um conflito desses."
32010-36 = "E, assim, deixou de aparecer no palco principal, e hoje até a sua sombra ficou fraca…… essa é a Filial de Arius."
32010-37 = "[s] \"E a Azusa é dessa Filial de Arius…….\""
32010-39 = "Sim."
32010-40 = "E aí…… o \"Tratado do Éden\", que a Nagi tá tocando, aquilo é uma reprodução do \"Primeiro Concílio\" de que eu falei."
32010-41 = "O Tratado do Éden…… a promessa de que duas grandes academias vão, de agora em diante, se dar bem."
32010-42 = "……Sei lá, soa como uma coisa boa, né? Mas, na real, será? Porque o cerne dele é criar um grupo militar totalmente novo, unindo a força de Gehenna e Trinity: a Organização do Tratado do Éden, a tal \"ETO\"."
32010-43 = "……Isso. O Tratado do Éden é, digamos, uma espécie de aliança militar."
32010-48 = "O objetivo é o nascimento de um único e grande grupo militar, unindo o poderio de Trinity e Gehenna……."
32010-51 = "Um grupo com um poder avassalador desses nascendo…… justo neste período de tanta confusão, com a presidente do Conselho Estudantil Geral desaparecida."
32010-52 = "Usando esse grande poder, o que será, afinal, que a Nagi tá querendo fazer?"
32010-53 = "Atacar o Conselho Estudantil Geral, que está sem presidente, e se tornar ela mesma a presidente?"
32010-54 = "Ou arrancar pela raiz aquele novo broto chamado Millennium?"
32010-55 = "Claro, os objetivos exatos eu não sei…… mas só uma coisa eu posso dizer com clareza."
32010-56 = "Quem consegue um poder tão grande, com certeza vai eliminar aquilo de que não gosta……"
32010-57 = "igual Trinity fez com a Arius no passado."
32010-58 = "Ou, quem sabe, igual à Seia……"
32010-62 = "……Não, desculpa. Aquilo agora foi uma gafe."
32010-63 = "[s] \"O que aconteceu com a Seia?\""
32010-64 = "……."
32010-65 = "……É como eu falei antes. A Seia está internada."
32010-66 = "[s] \"……Posso perguntar onde ela está agora?\""
32010-67 = "Hmm……."
32010-68 = "……Você quer mesmo saber, Sensei?"
32010-69 = "……Se eu contar isso, eu já não tenho mais volta."
32010-70 = "Se você, depois de saber a verdade daqui pra frente, me trair…… aí, pra mim, com certeza, é o fim."
32010-71 = "Mesmo assim, quer saber?"
32010-72 = "[s] \"Trair, de jeito nenhum――\""
32010-73 = "……Não, mas tá tudo bem. Porque, agora há pouco, você disse que é meu aliado."
32010-74 = "Mesmo que, com isso, eu seja traída, como é que eu digo…… sim, acho que até isso não seria tão ruim. Ehehe."
32010-75 = "……A Seia não está internada, nada disso."
32010-80 = "A aureola dela foi destruída."
32010-81 = "[s] \"……!?\""
32010-82 = "……."
32010-84 = "Não é brincadeira; é a verdade."
32010-85 = "No ano passado, a Seia foi atacada de repente por alguém."
32010-86 = "Pra fora, consta como \"internada\", mas…… essa é que é a verdade."
32010-87 = "Tirando a gente do Tea Party, ninguém em Trinity sabe disso ainda."
32010-88 = "Quem sabe a \"Sisterhood\" saiba, talvez…… porque a rede de informação daquele pessoal não é brincadeira."
32010-89 = "Enfim, é um assunto sigiloso a esse ponto."
32010-91 = "[ns] \"E o culpado, ainda……?\""
32010-92 = "……Sim, não se sabe. Em investigação, digamos, ou melhor, nada se sabe…… até porque a Seia, de origem, era uma menina cheia de segredos."
32010-93 = "……Sim, bom, é isso."
32010-94 = "[s] \"………\""
32010-95 = "Dito isso, não é que não haja suspeitas…… mas, no estágio atual, falar uma mera suposição em voz alta também não fica bem."
32010-96 = "……E aí, voltando ao assunto."
32010-97 = "\"Azusa Shirasu\"…… quem transferiu aquela menina pra esta academia fui eu."
32010-98 = "[s] \"A Mika?\""
32010-99 = "Sim, escondido da Nagi. Falsifiquei toda a papelada, tipo a lista de alunos, e matriculei aquela menina."
32010-100 = "……\"Por quê?\", você deve estar pensando."
32010-101 = "A Filial de Arius, ainda hoje, nos odeia."
32010-102 = "A gente aqui desfruta de um ambiente próspero, enquanto elas, num ambiente péssimo, continuam sem sequer saber o que é \"aprender\"……."
32010-103 = "Elas continuam recusando tanto a mão que a gente estende quanto a ajuda do Conselho Estudantil Geral. Por causa do ódio do passado."
32010-104 = "……Eu queria fazer as pazes com a Filial de Arius."
32010-105 = "Mas esse ódio é grande demais pra se apagar com facilidade…… e os mal-entendidos e as desconfianças acumulados até aqui também são demais. A ponto de fugir das minhas mãos."
32010-106 = "Mas tanto a Nagi quanto a Seia eram contra a minha opinião…… por razões políticas. E até isso eu entendo. Afinal, a gente é o Tea Party."
32010-107 = "Eu sou desajeitada, então essa coisa de política não é muito o meu forte…… mas será que fazer as pazes de novo agora é assim tão difícil?"
32010-108 = "Será que não dá pra, tipo antes, tomando um chá, desfazer os mal-entendidos de parte a parte?"
32010-112 = "Eu queria que aquela menina…… que a existência chamada \"Azusa Shirasu\" se tornasse o símbolo da reconciliação."
32010-113 = "Sobre aquela menina eu não sei lá muita coisa, mas parece que ela era uma aluna bem talentosa até na Arius, e eu quis apostar nessa possibilidade."
32010-114 = "Talvez houvesse o caminho de convencer a Nagi e tocar tudo oficialmente, mas…… quanto a isso eu meio que fiquei desconfiada, digamos……"
32010-115 = "Achei que a Nagi não fosse me escutar nesse ponto."
32010-116 = "Se o Tratado do Éden for assinado…… aí, dessa vez, a reconciliação com a Arius vai virar mesmo algo impossível. Por isso, eu quis, de algum jeito, realizá-la antes disso."
32010-117 = "Eu quis provar pra todo mundo que um aluno da Arius também consegue viver direitinho em Trinity e ser feliz……."
32010-118 = "Mas, no meio disso, a Nagi começou a dizer que há um \"traidor\" em Trinity……."
32010-119 = "……Por que a Nagi começou a pensar isso, eu não sei. Talvez, enquanto eu me mexia assim, eu tenha feito alguma besteira."
32010-120 = "E aí a Nagi, pra impedir que sabotassem o tratado, criou o \"Clube de Aulas de Reforço\"."
32010-121 = "No começo eu me perguntei o que era esse \"Clube de Aulas de Reforço\", mas…… ah, aliás, Sensei. Você chegou a perguntar por que são justamente aquelas meninas?"
32010-122 = "Quem está ali são as meninas de quem a Nagi desconfiou."
32010-125 = "A Hanako tem umas partes bem excêntricas, mas é uma aluna de verdade, de verdade talentosa. Claro, em termos de notas também. Aliás, ela já chegou a ser cotada como candidata a presidente do conselho estudantil, ou seja, ao Tea Party."
32010-126 = "Ouvi dizer que a \"Sisterhood\" também se esforçou pra atraí-la. Parece que não deu certo, mas."
32010-131 = "Numa aula na capela, quando ela apareceu de maiô, sozinha, no meio daquele clima devoto, foi épico. Por acaso eu tava lá; ela foi expulsa pela irmã, e a cara de todo mundo ficou impagável. Aha."
32010-134 = "……Mas, mesmo sendo tão talentosa e promissora, aquela menina mudou de repente. A ponto de chegar quase à beira da reprovação."
32010-135 = "……Por que será, né?"
32010-137 = "De fato, dá pra entender bem a vontade de investigar. Aquela menina já tinha contato com a cúpula de Trinity e vários lugares, e acabou sabendo de um número e tanto de segredos."
32010-138 = "Pra Nagi, não dá pra não se preocupar, né."
32010-141 = "A Koharu…… aquela menina não tem nada a ver com essa política toda enrolada; é uma menina pura e boa."
32010-146 = "Se a gente for falar por que ela…… ah, nesse sentido, aquela menina é \"porque foi alvo de suspeita\". A causa direta não é ela mesma, e sim a Hasumi e as outras."
32010-147 = "[s] \"A Hasumi e as outras……?\""
32010-150 = "A insegurança de uma existência com grande poderio militar, ainda mais uma como a Hasumi, que tem um ódio forte contra Gehenna, não estar sob o próprio controle…… a desconfiança de que algo pode acontecer……"
32010-151 = "Acho que a Nagi quis ter alguma garantia contra isso."
32010-152 = "Do Comitê de Realização da Justiça, provavelmente, qualquer uma serviria. Só que, como as notas dela estavam ruins, foi essa menina que acabou escolhida."
32010-153 = "Ou seja, aquela menina é um refém. Sobre o assunto da \"expulsão\", provavelmente, a Hasumi também devia saber."
32010-154 = "[s] \"…….\""
32010-155 = "Essa é uma cara de \"a Hasumi jamais faria uma coisa dessas\"? Hmm, eu não sei o quão próximos você e a Hasumi são, mas……."
32010-156 = "Ouvi dizer que, tempos atrás, aconteceu uma coisa assim."
32010-158 = "Comitê de Realização da Justiça - Sala de aula"
32010-163 = "……."
32010-164 = "……."
32010-165 = "V-veterana Hasumi, se acalme――"
32010-169 = "Jamais, jamais vou perdoar!! Pandemonium!! Gehenna!! Por que, por que a esse ponto……!!"
32010-170 = "Hi……!"
32010-171 = "Haa, haa……."
32010-172 = "……Escutem, escutem bem. Eu declaro, aqui e agora."
32010-173 = "De agora em diante, eu…… eu……!"
32010-175 = "A Hasumi é a vice-presidente do grupo militar de Trinity, o \"Comitê de Realização da Justiça\", e odeia Gehenna com todas as forças."
32010-176 = "Que ela vá se opor com tudo ao Tratado do Éden é mais claro que a luz do dia, não é? \"Uma aliança logo com aquela Gehenna, sei……\", né."
32010-177 = "E depois…… a Hifumi, né."
32010-180 = "A Hifumi é gentil, fofa, uma boa menina. A Nagi também gosta muito dela."
32010-181 = "……Mas, mesmo assim, o olhar de suspeita da Nagi acabou recaindo sobre ela."
32010-183 = "Pelo visto, ela saía escondida pra fora da academia e ia a lugares suspeitos. Mercado negro, onde alunos de Trinity são proibidos de entrar, e vários outros cantos."
32010-184 = "E também chegou a informação de que ela tem ligação com algum grupo criminoso. E olha que ela parece uma menina tão bondosa e pura……."
32010-185 = "[s] \"…………………\""
32010-186 = "Mesmo a Nagi gostando da Hifumi, ainda assim o olhar de suspeita recaiu sobre ela. Bom, isso também, se é pra dizer que é bem a cara da Nagi, é bem a cara da Nagi."
32010-187 = "E aí, a desconfiança que havia dentro da Nagi, de que \"talvez haja um traidor dentro de Trinity\", conforme várias informações foram sendo reunidas e a coisa avançou,"
32010-188 = "virou a suspeita \"qual daquelas ali é o traidor de Trinity?\"."
32010-189 = "Já não se fala mais se existe ou não; pra Nagi, o \"traidor\" já virou uma realidade dada como certa."
32010-190 = "……Essa é a situação atual. Ficou um pouco longo, mas, com isso, acho que contei tudo o que eu sei agora."
32010-191 = "[s] \"Traidor…….\""
32010-192 = "……A que a palavra \"traidor\" se refere. Deixando isso um pouco mais claro, aí sim dá pra chegar a uma resposta certa."
32010-193 = "Primeiro, a Nagi, agora, com certeza pensa \"há alguém tentando enganar a gente, Trinity\". Que alguém seja um espião."
32010-194 = "Nesse sentido, o \"traidor\" de que a Nagi fala agora é aquela menina que se infiltrou falsificando o histórico, a \"Azusa Shirasu\"."
32010-195 = "Aquela menina, como eu falei, é, na verdade, de Arius, que é inimiga de Trinity."
32010-196 = "Por minha culpa, aquela menina, sem saber de nada, acabou parando bem no meio de uma disputa complexa e política……."
32010-197 = "Mas não dá pra deixar que aquela menina seja expulsa desse jeito."
32010-198 = "Por isso, eu quero que você a proteja. Porque isso, agora, só você, Sensei, consegue fazer."
32010-199 = "E também, em certo sentido…… o \"traidor\", pra Nagi, também sou eu. Porque eu não sou a favor do Tratado do Éden que a Nagi tá tocando."
32010-200 = "Como eu, que não sou a host, não tenho poder nenhum, não dá pra atrapalhar nem nada."
32010-201 = "……."
32010-202 = "……E também. De outro ponto de vista, ao mesmo tempo, dá pra dizer o seguinte, não dá?"
32010-203 = "O \"traidor de Trinity\"……"
32010-206 = "também dá pra dizer que é a Nagi. Você não acha?"
32010-207 = "Uma existência tentando transformar a Trinity, que até agora mantinha a harmonia, num monstro colossal…… um jeito de ver assim também não é tão estranho."
32010-209 = "……Bom, mas até isso, tudo, tudo, não passa de uma versão unilateral, a minha."
32010-210 = "Então, claro, no fim quem decide é você, Sensei. Proteger a Azusa Shirasu, ou encontrar o traidor…… Acreditar na Nagi. Ou acreditar em mim."
32010-211 = "[s] \"Mika, pra você, só isso já basta?\""
32010-212 = "Sobre aquela menina eu tenho responsabilidade e…… mas eu só posso pedir, nada mais."
32010-213 = "……Hm, ué? Não é isso; será que agora você…… tá preocupado comigo?"
32010-214 = "Aha. Você é gentil de verdade, Sensei. Hmm, sei lá, quase me faz entender errado."
32010-215 = "Comigo não precisa se preocupar. Por mais que não pareça, eu sou bem forte♪"
32010-216 = "Então, por hoje é isso. Poder conversar assim de novo com você, Sensei, foi divertido."
32010-217 = "E, além disso, se a gente ficar muito tempo só nós dois, pode acabar surgindo um boato estranho, né. Ufu…… bom, por mim até que não teria problema nenhum."
32010-218 = "Então, até mais, Sensei."
32010-220 = "(Depois de despedir-se da Mika, voltou para junto de todas.)"
32010-222 = "Próximo Episódio;Sisterhood"
