[translation]
32010-1 = "Episódio 1; O Monstro Gigante"
32010-3 = "[ns] \"Azusa é uma traidora...?\""
32010-4 = "Sim. E é por isso que eu quero que você proteja aquela garota."
32010-5 = "Ah, desculpe. Fui direta demais, não fui? Acho que acabei pegando o mau hábito da Nagi-chan."
32010-6 = "Para você, Sensei, que deve estar confuso, talvez seja melhor eu começar explicando desde o início, não acha?"
32010-7 = "Eu não sou tão inteligente quanto a Nagi-chan ou a Seia-chan, mas..."
32010-8 = "Vou me esforçar para explicar tudo direitinho!"
32010-9 = "[s] \"Sim, por favor.\""
32010-10 = "Primeiro, sobre a 'Escola Trinity'. Como a Nagi-chan disse antes, a característica principal dela é ser uma escola formada pela união de várias facções."
32010-12 = "Pater, Filius, Sanctus... como eu já disse, essas três facções se tornaram o núcleo da Trinity."
32010-13 = "Mas, para ser exata, existem muitas outras facções, grandes e pequenas, incluindo o grupo que deu origem ao atual 'Esquadrão de Socorro' e a 'Sisterhood'."
32010-14 = "Originalmente, essas facções viviam se tratando como inimigas, quase como a relação atual entre Trinity e Gehenna."
32010-15 = "Dizem que houve uma época em que os conflitos aconteciam todos os dias."
32010-16 = "Foi então que decidiram parar de lutar e fizeram uma promessa de viverem em harmonia."
32010-17 = "Nós não precisamos mais lutar, vamos nos tornar uma única escola... Foi essa a discussão que deu origem ao chamado 'Primeiro Concílio'."
32010-18 = "[s] \"Sim, já ouvi falar disso em algum lugar.\""
32010-20 = "Pois é, e então..."
32010-21 = "Foi após esse concílio que nasceu a 'Escola Trinity' onde estamos agora."
32010-22 = "Seria mentira dizer que não restou nenhum vestígio daquela época de facções... mas acho que é o fluxo dos tempos, não é? Hoje em dia, a maioria das pessoas nem liga mais para isso."
32010-23 = "Mas o concílio não terminou em um consenso total... houve uma escola que se opôs até o fim."
32010-24 = "Essa escola era a 'Arius'."
32010-26 = "Originalmente, era apenas mais uma facção, não muito diferente de nós."
32010-27 = "Eles tinham apenas pequenas divergências na interpretação das escrituras, e eram bem parecidos conosco em vários aspectos."
32010-28 = "Eles também tinham aulas na capela, a aparência era quase idêntica... e, ainda assim, odiavam Gehenna do fundo do coração."
32010-29 = "Mas a Arius se opôs ferozmente à criação da união... e, no fim das contas, isso acabou levando a um conflito."
32010-30 = "A Trinity, que se tornou uma escola com um poder imenso após a união, começou a reprimir a Arius impiedosamente usando essa força."
32010-31 = "É comum dizer que, quando alguém ganha um poder grande demais, acaba querendo testar essa força. No fim das contas, infelizmente, a Arius acabou sendo o alvo perfeito."
32010-32 = "E assim, a Arius foi destruída."
32010-33 = "Foram expulsos do distrito autônomo de Trinity e agora... não sei os detalhes, mas parece que estão escondidos em algum lugar de Kivotos."
32010-34 = "Deve ter sido uma batalha terrível. Eles se esconderam em um lugar tão remoto que, provavelmente, nem o Conselho Estudantil Federal sabe onde fica o distrito deles até hoje."
32010-35 = "Para a maioria das alunas, é como se essa escola nem existisse. A maioria provavelmente nem sabe que esse conflito aconteceu."
32010-36 = "E assim, eles desapareceram do palco principal e, hoje em dia, sua existência se tornou quase uma sombra... essa é a Escola Filial de Arius."
32010-37 = "[s] \"Então a Azusa é da Escola Filial de Arius...\""
32010-39 = "Sim."
32010-40 = "E então... o 'Tratado de Eden' que a Nagi-chan está promovendo é uma recriação daquele 'Primeiro Concílio' que mencionei."
32010-41 = "O Tratado de Eden... uma promessa de que as duas grandes escolas viverão em harmonia a partir de agora."
32010-42 = "...Parece uma história bonita, não é? Mas será que é verdade? Porque o cerne disso é a criação de um grupo armado totalmente novo, a Organização do Tratado de Eden, conhecida como 'ETO', que combina o poder militar de Gehenna e Trinity."
32010-43 = "...Exatamente. O Tratado de Eden é, por assim dizer, uma espécie de aliança militar."
32010-48 = "O objetivo é o nascimento de um grande grupo armado que combina as forças de Trinity e Gehenna..."
32010-51 = "Um grupo com um poder tão avassalador nascendo justamente agora, em um período de tanta confusão com o desaparecimento da Presidente do Conselho Estudantil..."
32010-52 = "O que será que a Nagi-chan pretende fazer usando esse grande poder?"
32010-53 = "Atacar o Conselho Estudantil Federal na ausência da presidente e tentar se tornar a nova Presidente do Conselho Estudantil?"
32010-54 = "Ou talvez eliminar o novo broto que é Millennium?"
32010-55 = "Claro, não sei os detalhes, mas... uma coisa eu posso dizer com clareza."
32010-56 = "Quando se obtém um poder tão grande, certamente se acaba eliminando o que não lhe agrada..."
32010-57 = "Assim como a Trinity fez com a Arius no passado."
32010-58 = "Ou talvez, como aconteceu com a Seia-chan..."
32010-62 = "...Não, desculpe. Acho que falei demais."
32010-63 = "[s] \"O que aconteceu com a Seia?\""
32010-64 = "..."
32010-65 = "……Como eu disse antes. A Seia-chan está hospitalizada."
32010-66 = "[s] \"……Posso perguntar onde ela está agora?\""
32010-67 = "Hmm……."
32010-68 = "……Sensei, você realmente quer saber?"
32010-69 = "……Se eu contar isso, não haverá mais volta para mim."
32010-70 = "Se você souber a verdade sobre o que vem a seguir e me trair…… eu certamente estarei acabada."
32010-71 = "Mesmo assim, você quer saber?"
32010-72 = "[s] \"Trair você, eu jamais――\""
32010-73 = "……Não, está tudo bem. Afinal, você disse agora pouco que está do meu lado."
32010-74 = "Se eu for traída por isso, como posso dizer…… bem, acho que não seria tão ruim assim. Ehehe."
32010-75 = "……A Seia-chan não está hospitalizada."
32010-80 = "O halo dela foi destruído."
32010-81 = "[s] \"……!?\""
32010-82 = "……."
32010-84 = "Não é uma piada, é a verdade."
32010-85 = "No ano passado, a Seia-chan foi atacada repentinamente por alguém."
32010-86 = "Para o público, dizemos que ela está \"hospitalizada\", mas…… essa é a verdadeira realidade."
32010-87 = "Exceto por nós do Tea Party, ninguém em Trinity sabe disso ainda."
32010-88 = "Talvez a \"Sisterhood\" saiba…… a rede de informações delas não é brincadeira."
32010-89 = "De qualquer forma, é um assunto altamente confidencial."
32010-91 = "[ns] \"O culpado, ainda……?\""
32010-92 = "……Sim, não sabemos. Estamos investigando, ou melhor, não sabemos de nada…… Para começar, a Seia-chan sempre foi uma garota cheia de segredos."
32010-93 = "……Sim, é basicamente isso."
32010-94 = "[s] \"…….\""
32010-95 = "Dito isso, não é como se eu não tivesse suspeitas…… mas não quero falar apenas suposições neste estágio."
32010-96 = "……Então, voltando ao assunto."
32010-97 = "\"Shirasu Azusa\"…… fui eu quem a transferiu para esta escola."
32010-98 = "[s] \"Você, Mika?\""
32010-99 = "Sim, sem a Nagi-chan saber. Eu falsifiquei todos os documentos, como a lista de alunos, e a matriculei."
32010-100 = "……Você deve estar se perguntando \"por quê?\", né."
32010-101 = "A filial de Arius ainda nos odeia até hoje."
32010-102 = "Nós desfrutamos de um ambiente tão rico, enquanto elas vivem em condições precárias, sem nem saber o que significa \"aprender\"……"
32010-103 = "Elas continuam rejeitando a mão que estendemos e a ajuda do Conselho Estudantil Federal. Por causa do ódio do passado."
32010-104 = "……Eu queria me reconciliar com a filial de Arius."
32010-105 = "Mas esse ódio é tão grande que não pode ser apagado facilmente…… e há muitos mal-entendidos e suspeitas acumulados ao longo do tempo. É algo que não consigo carregar sozinha."
32010-106 = "Mas tanto a Nagi-chan quanto a Seia-chan eram contra a minha opinião…… por razões políticas. Mas eu entendo o lado delas. Afinal, somos o Tea Party."
32010-107 = "Eu sou desajeitada, então não sou muito boa com política…… mas será que é tão difícil voltarmos a nos dar bem?"
32010-108 = "Será que não podemos resolver nossos mal-entendidos enquanto tomamos um chá, como fazíamos antes?"
32010-112 = "Eu queria que aquela garota…… \"Shirasu Azusa\", se tornasse um símbolo de reconciliação."
32010-113 = "Eu não sei muito sobre ela, mas parece que ela era uma aluna muito talentosa em Arius, e eu quis apostar nessa possibilidade."
32010-114 = "Poderia ter havido uma maneira de convencer a Nagi-chan e fazer tudo formalmente, mas…… eu acabei duvidando um pouco disso……"
32010-115 = "Pensei que a Nagi-chan não me ouviria sobre isso."
32010-116 = "Se o Tratado do Éden for assinado…… então, dessa vez, a reconciliação com Arius se tornará realmente impossível. Por isso, eu queria realizar isso de qualquer jeito antes que acontecesse."
32010-117 = "Eu queria provar para todos que uma aluna de Arius pode viver bem em Trinity e ser feliz……"
32010-118 = "Mas, no meio disso, a Nagi-chan começou a dizer que havia um \"traidor\" em Trinity……."
32010-119 = "……Não sei por que a Nagi-chan começou a pensar assim. Talvez eu tenha feito algo errado enquanto agia pelas costas dela."
32010-120 = "Então, para evitar que atrapalhassem o tratado, a Nagi-chan criou o \"Clube de Aulas de Reforço\"."
32010-121 = "No começo, eu me perguntei o que era esse \"Clube de Aulas de Reforço\"…… ah, aliás, Sensei. Você já perguntou por que são aquelas garotas?"
32010-122 = "As que estão lá são as garotas de quem a Nagi-chan suspeitava."
32010-125 = "A Hanako-chan tem um jeito bem peculiar, mas ela é uma aluna realmente, realmente talentosa. Claro, em termos de notas também. Na verdade, ela chegou a ser cogitada como candidata a presidente do conselho estudantil, ou seja, para o Tea Party."
32010-126 = "Ouvi dizer que a 'Sisterhood' também se esforçou para tentar trazê-la para o lado delas. Parece que não deu muito certo, no entanto."
32010-131 = "Foi incrível quando ela apareceu usando apenas um traje de banho durante a aula na capela, naquele ambiente tão piedoso. Eu estava lá por acaso, mas ela foi expulsa pela irmã, e as expressões de todos foram impagáveis. Ahaha."
32010-134 = "……Mas, mesmo sendo tão talentosa e com um futuro promissor, ela mudou de repente. A ponto de ficar prestes a ser reprovada."
32010-135 = "……Por que será, né?"
32010-137 = "Com certeza, dá para entender perfeitamente o motivo de quererem investigar. Ela já tinha contatos com o alto escalão da Trinity e vários outros lugares, e acabou descobrindo um bom número de segredos."
32010-138 = "Para a Nagi-chan, é impossível não se preocupar com isso."
32010-141 = "A Koharu-chan é... ela é uma menina pura e boa, que não tem nada a ver com essa política suja ou coisas do tipo."
32010-146 = "Se você me pergunta por que ela... ah, nesse sentido, acho que foi porque ela 'foi suspeita'. A causa direta disso não foi ela mesma, mas sim a Hasumi-chan e as outras."
32010-147 = "[s] \"A Hasumi e as outras...?\""
32010-150 = "A insegurança de ter uma existência com um poder militar gigantesco, especialmente alguém como a Hasumi-chan que nutre um ódio tão forte contra Gehenna, fora do seu controle... a suspeita de que algo poderia acontecer..."
32010-151 = "Acho que a Nagi-chan queria algum tipo de garantia contra isso."
32010-152 = "Se fosse o Comitê de Justiça, acho que qualquer uma serviria. Só que, como as notas dela estavam ruins, ela acabou sendo a escolhida."
32010-153 = "Em suma, ela é uma refém. Sobre o assunto da 'expulsão', a Hasumi-chan provavelmente também sabia."
32010-154 = "[s] \"……。\""
32010-155 = "Essa é uma cara de quem acha que a Hasumi-chan seria incapaz de fazer algo assim? Hum, não sei o quão próxima você é da Hasumi-chan, Sensei, mas..."
32010-156 = "Ouvi dizer que algo assim aconteceu antes."
32010-158 = "Sala do Comitê de Justiça"
32010-163 = "……。"
32010-164 = "……。"
32010-165 = "Ha, Hasumi-senpai, por favor, acalme-se—"
32010-169 = "Eu nunca, eu nunca vou perdoar!! Pandemonium!! Gehenna!! Por que, por que chegar a esse ponto...!!"
32010-170 = "Hic...!"
32010-171 = "Haa, haa..."
32010-172 = "……Escutem bem, escutem muito bem. Eu declaro aqui agora."
32010-173 = "De agora em diante, eu... eu...!"
32010-175 = "A Hasumi-chan é a vice-presidente do grupo militar da Trinity, o 'Comitê de Justiça', e ela odeia Gehenna profundamente."
32010-176 = "Não é óbvio que ela se oporia com todas as forças ao Tratado de Eden? Tipo, 'uma aliança com aquela Gehenna, jamais'."
32010-177 = "E tem também... a Hifumi-chan."
32010-180 = "A Hifumi-chan é gentil, fofa e uma boa menina. A Nagi-chan também gosta muito dela."
32010-181 = "……Mas, mesmo assim, o olhar de suspeita da Nagi-chan se voltou para ela."
32010-183 = "Parece que ela saía da escola escondida e ia a lugares suspeitos. Como o mercado negro, onde a entrada de estudantes da Trinity é proibida, e vários outros lugares."
32010-184 = "Além disso, surgiram informações de que ela tem envolvimento com algum grupo criminoso. Mesmo parecendo uma menina tão bondosa e pura..."
32010-185 = "[s] \"……………………。\""
32010-186 = "Mesmo a Nagi-chan gostando da Hifumi-chan, o olhar de suspeita foi direcionado a ela. Bem, isso também é bem a cara da Nagi-chan, se for pensar bem."
32010-187 = "Então, a suspeita que a Nagi-chan tinha de que 'poderia haver um traidor dentro da Trinity', conforme as informações foram sendo coletadas e o processo avançou,"
32010-188 = "acabou se transformando na dúvida de 'quem, dentre eles, é o traidor da Trinity?'."
32010-189 = "Ela já nem discute mais se existe ou não; para a Nagi-chan, o 'traidor' já é um problema real e concreto."
32010-190 = "……Essa é a situação atual. Foi um pouco longo, mas acho que consegui falar tudo o que sei agora, não é?"
32010-191 = "[s] \"Traidor...\""
32010-192 = "……Se esclarecermos um pouco o que a palavra 'traidor' significa, posso te dar uma resposta adequada."
32010-193 = "Primeiro, a Nagi-chan com certeza pensa agora que 'há alguém tentando enganar a nós, a Trinity'. Como se alguém fosse um espião."
32010-194 = "Nesse sentido, o 'traidor' de quem a Nagi-chan fala agora é aquela menina que entrou falsificando seu histórico, 'Shirasu Azusa'."
32010-195 = "Como mencionei antes, ela é, na verdade, uma menina vinda de Arius, que é inimiga da Trinity."
32010-196 = "Por minha causa, ela acabou se metendo bem no meio desse conflito político complexo sem saber de nada..."
32010-197 = "Mas não podemos deixar que ela seja expulsa dessa forma."
32010-198 = "Por isso, quero que você a proteja. É algo que só você, Sensei, pode fazer agora."
32010-199 = "E, em certo sentido... para a Nagi-chan, eu também sou uma 'traidora'. Porque eu não sou a favor do Tratado de Eden que a Nagi-chan está promovendo."
32010-200 = "Como não sou a anfitriã, não tenho poder nenhum, então não posso atrapalhar nem fazer nada."
32010-201 = "……。"
32010-202 = "……E também. Sob outra perspectiva, ao mesmo tempo, podemos dizer o seguinte, não é?"
32010-203 = "“A traidora da Trinity”..."
32010-206 = "Dá para dizer que é a Nagi-chan também. Não acha?"
32010-207 = "Uma existência que está tentando transformar a Trinity, que até agora mantinha a harmonia, em um monstro gigantesco... Não seria tão estranho ver as coisas dessa forma."
32010-209 = "......Bem, mas tudo isso, incluindo o que acabei de dizer, não passa de uma história unilateral minha."
32010-210 = "Por isso, no final, é claro que é você quem decide, Sensei. Se vai proteger a Shirasu Azusa, se vai encontrar a traidora... Se vai acreditar na Nagi-chan. Ou se vai acreditar em mim."
32010-211 = "[s] \"Mika, você está bem com isso?\""
32010-212 = "Eu tenho responsabilidade sobre aquela garota... mas, como só posso pedir favores, não há nada que eu possa fazer."
32010-213 = "......Hm, ué? Não me diga que agora há pouco... você estava preocupado comigo?"
32010-214 = "Ahaha. Você é realmente gentil, Sensei. Hmm, sinto que vou acabar me iludindo."
32010-215 = "Não precisa se preocupar comigo. Pode não parecer, mas eu sou bem forte, sabe?♪"
32010-216 = "Bem, acho que por hoje é só. Foi divertido poder conversar com você assim de novo, Sensei."
32010-217 = "Além disso, se ficarmos muito tempo sozinhos, vão acabar surgindo rumores estranhos, né? Fufu... bem, por mim, não teria problema nenhum."
32010-218 = "Então, até mais. Sensei."
32010-220 = "（Após me despedir de Mika, voltei para onde os outros estavam.）"
32010-222 = "Próximo episódio: Sisterhood"
