[translation]
90002240-1 = "Episódio 24: O Céu Inseparável"
90002240-3 = "Todos embarcaram?#nMarkt, você também está a bordo, certo?"
90002240-4 = "Claro. Podemos partir a qualquer momento."
90002240-9 = "Então, Toki, por favor."
90002240-10 = "Entendido. Iniciando decolagem."
90002240-18 = "……."
90002240-19 = "Por que você me salvou?"
90002240-20 = "[s] \"Achei que era o certo a se fazer.\""
90002240-21 = "Eu era inimiga de vocês."
90002240-22 = "[s] \"Mas agora não é mais.\""
90002240-23 = "Talvez eu me torne sua inimiga novamente algum dia."
90002240-24 = "[s] \"É mesmo?\""
90002240-28 = "……."
90002240-29 = "Eu não sei bem."
90002240-30 = "O Continente de Aço era tudo para mim."
90002240-31 = "Foi lá que despertei e conheci Ein, Soph e Oul."
90002240-35 = "……."
90002240-36 = "Não poderei mais vê-los, não é?"
90002240-37 = "Não mais……."
90002240-38 = "……Ah."
90002240-39 = "Eu deveria tê-los abraçado mais."
90002240-40 = "Deveria ter feito mais carinho, conversado mais com eles."
90002240-41 = "Se eu soubesse que terminaria assim……."
90002240-42 = "Deveria ter feito muito mais……."
90002240-43 = "[s] \"…….\""
90002240-48 = "Sensei?"
90002240-50 = "[ns1] \"É só uma hipótese, na verdade…….\"\n[ns2] \"Se eu não tivesse feito nada, será que eles teriam sobrevivido?\""
90002240-54 = "……."
90002240-55 = "Acredito que o resultado teria sido o mesmo."
90002240-56 = "[s3] \"Mesmo assim, se eu não tivesse interferido,\"\n[s4] \"talvez eles…….\"\n[s5] \"pudessem ter vivido pelo menos um segundo a mais.\""
90002240-60 = "Você está se sentindo responsável?"
90002240-61 = "E por um peso…… que você não consegue carregar."
90002240-62 = "……."
90002240-63 = "Eu…… só consigo dizer coisas frias. Deve ser da minha natureza."
90002240-64 = "Por isso, vou ser direta――"
90002240-65 = "No fim das contas, eles estavam tentando mudar Kivotos como bem entendiam."
90002240-66 = "Havia motivos e razões para isso…… e as intenções deles."
90002240-67 = "Mas, o que você acha que significa viver em uma Kivotos transformada no Continente de Aço?#nSerá que…… as pessoas que vivem em Kivotos conseguiriam suportar?"
90002240-68 = "Eles…… cometeram erros. Assim como eu cometi no passado."
90002240-69 = "Mas, se me perguntar se isso justificava um fim como este……."
90002240-70 = "Sinto muito…… nem eu mesma sei responder a isso."
90002240-72 = "……."
90002240-77 = "[ns] \"……Eu gostaria de ouvir o que está no seu coração, Rio.\""
90002240-79 = "……."
90002240-80 = "Você disse uma vez que não queria falhar mais."
90002240-81 = "Em outras palavras…… significava que eu não queria me arrepender."
90002240-82 = "Pensando agora, acho que foi isso que causou tudo.#nTentar controlar todas as variáveis, tentar me preparar para todas as possibilidades……."
90002240-83 = "Mas, no fim……."
90002240-84 = "Rio-senpai……."
90002240-85 = "Obrigada."
90002240-86 = "Eh...?"
90002240-87 = "Rio... obrigada."
90002240-88 = "Por ter sentido tristeza... pelas minhas irmãs."
90002240-89 = "É que eu simplesmente não consigo aceitar..."
90002240-90 = "É mesmo?"
90002240-91 = "Se é assim, então por agora, já é o suficiente."
90002240-95 = "Kei, e também o Sensei."
90002240-96 = "E todos vocês que estão aqui."
90002240-97 = "Do fundo do meu coração... obrigada."
90002240-102 = "..."
90002240-103 = "Ugh..."
90002240-104 = "Ugh... eu não consigo aceitar isso... não pode ser..."
90002240-105 = "Por que... por que...!"
90002240-106 = "[s] \"...\""
90002240-111 = "[ns] \"O que você quer fazer daqui para frente?\""
90002240-112 = "...Eu não sei."
90002240-113 = "Até agora, eu nunca tinha parado para pensar nisso."
90002240-114 = "Mas..."
90002240-116 = "[log=아인]N-nós queremos que a irmã mais velha viva.[/log]"
90002240-117 = "[log=소프]Não importa o que aconteça, você tem que sobreviver.[/log]"
90002240-120 = "[log=오르]Veja mais coisas, conheça mais pessoas.[/log]"
90002240-121 = "[log=오르]Viva muitas experiências.[/log]"
90002240-124 = "[log=아인]Muito, muito mais do que nós...[/log]"
90002240-127 = "Foi isso que me pediram. Que eu vivesse."
90002240-128 = "O que isso significa, ou qual o sentido disso, eu ainda não sei bem."
90002240-129 = "Mas, se foram as últimas palavras deixadas por Ein, Soph e Or..."
90002240-130 = "Eu sinto que devo fazer isso."
90002240-131 = "Fomos criadas, não conseguimos cumprir nosso propósito e, no fim, fomos descartadas assim..."
90002240-132 = "Acho que já chega disso, não acha?"
90002240-133 = "...?"
90002240-134 = "Eu também fui criada."
90002240-135 = "Eu também perdi meu propósito, esqueci de tudo... e embora eu pense que só me resta recomeçar do zero—"
90002240-136 = "Não acho que seja impossível viver."
90002240-138 = "I-isso mesmo! Quem você é, no fim das contas... é algo que só você pode decidir!"
90002240-139 = "..."
90002240-140 = "Para vocês, pode não ser um problema tão difícil, mas..."
90002240-145 = "Não. Para nós também é difícil."
90002240-146 = "Pois é. Se fosse fácil, ninguém sofreria."
90002240-151 = "..."
90002240-152 = "Mas antes disso, que tal pararmos de nos separar entre \"vocês\" e \"nós\"...?"
90002240-154 = "Sim? Mas entre mim e vocês existe..."
90002240-156 = "Não é bem assim."
90002240-157 = "Não importa como acordamos ou como nascemos. #nEu acho que somos todos iguais."
90002240-162 = "..."
90002240-163 = "Mesmo assim, tudo bem... para vocês?"
90002240-164 = "[s] \"Por mim tudo bem... e vocês, o que acham?\""
90002240-177 = "..."
90002240-179 = "Obrigada."
90002240-181 = "..."
90002240-182 = "..."
90002240-183 = "Midori? Você está bem?"
90002240-184 = "Ah? Sim, estou bem... eu acho. Afinal, tudo terminou em segurança."
90002240-185 = "...Não parece que você esteja."
90002240-186 = "...É."
90002240-187 = "É por causa da Malkuth, não é?"
90002240-188 = "Sim... a Malkuth, a Ain, a Soph, a Oul..."
90002240-189 = "..."
90002240-190 = "Sabe, eu fiquei pensando em uma coisa."
90002240-191 = "Digamos que algo terrível aconteça, sabe?"
90002240-192 = "E só resta um único pod de fuga!"
90002240-193 = "O que nós deveríamos fazer?"
90002240-194 = "U-um único pod de fuga..."
90002240-195 = "O que você faria... se fosse você, irmã?"
90002240-196 = "Hmm."
90002240-197 = "Hmmmm...!"
90002240-198 = "Hmmmmmm...!!!"
90002240-202 = "Ah, que preguiça de pensar nisso! Vou pensar depois! Ahaha!"
90002240-203 = "Irmã!?"
90002240-207 = "O que foi isso... meu Deus..."
90002240-212 = "..."
90002240-213 = "É claro que eu deixaria para a Midori."
90002240-214 = "Porque eu sou a irmã mais velha, afinal."
90002240-218 = "(Talvez pelo cansaço acumulado, todas estavam dormindo profundamente)"
90002240-219 = "(Embora estivesse exausta... ao fechar os olhos, eu sentia que me lembraria de algo, então não conseguia dormir)"
90002240-228 = "Sensei..."
90002240-229 = "Sensei..."
90002240-231 = "[ns] \"O que houve? Tudo terminou bem... você não parece muito animada?\""
90002240-232 = "Terminou bem... sim, talvez seja verdade, mas..."
90002240-233 = "Não! Na verdade, não é! Porque o Sensei não pensa assim, não é?"
90002240-234 = "Afirmativo. Os sinais vitais e a expressão do Sensei mostram que você não pensa nada disso."
90002240-235 = "[s] \"...Ficou tão óbvio assim no meu rosto?\""
90002240-236 = "Sim... e, bem, até eu que estou olhando... ugh..."
90002240-237 = "Afirmativo. Eu também..."
90002240-238 = "[s6] \"Entendo.\"\n[s7] \"Mesmo assim, vocês duas não precisam chorar.\""
90002240-241 = "Não é isso! Não temos como evitar...! Porque..."
90002240-242 = "Como o Sensei não chora... como você finge que está tudo bem...!"
90002240-243 = "[s8] \"Obrigado por pensarem assim.\"\n[s9] \"Mas... eu acho que é assim que deve ser.\""
90002240-246 = "Por que... você diz isso?"
90002240-247 = "[s10] \"Não podemos desfazer o que aconteceu.\"\n[s11] \"Pois não há perdão para arrependimentos ou desculpas.\""
90002240-250 = "..."
90002240-251 = "..."
90002240-252 = "Então, o que nos resta fazer?"
90002240-253 = "[s12] \"Continuar vivendo.\"\n[s13] \"Não importa o quão doloroso ou difícil seja.\""
90002240-256 = "Você quer dizer que devemos lembrar de tudo e carregar esse peso...?"
90002240-257 = "Por tudo o que perdemos e por tudo o que deixamos passar..."
90002240-258 = "[s14] \"Sim. Mesmo sem saber o que nos espera lá na frente.\"\n[s15] \"...Mesmo que, no fim, não tenhamos conquistado nada.\""
90002240-263 = "..."
90002240-264 = "..."
90002240-265 = "Nós estamos aqui com você."
90002240-266 = "Não importa o que aconteça..."
90002240-267 = "Por isso, Sensei..."
90002240-268 = "Por favor, não desista."
90002240-269 = "Enquanto o Sensei não desistir, nós também poderemos reunir todas as nossas forças até o fim."
90002240-271 = "[ns] \"...Sim.\""
90002240-277 = "[ns] \"Obrigado(a).\""
90002240-279 = "(Muitas coisas aconteceram)"
90002240-288 = "(Olhando para trás, pareceu um instante)"
90002240-297 = "(Ainda assim, vivemos experiências que não caberiam em palavras)"
90002240-302 = "(Deixando tudo isso para trás)"
90002240-309 = "(Junto com uma nova aluna)"
90002240-315 = "(Retornei ao Millennium Science School)"
