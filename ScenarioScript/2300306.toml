[translation]
2300306-1 = "裏切りの機械"
2300306-2 = "ミレニアム・屋上"
2300306-3 = "待ってたよ、先生。"
2300306-4 = "メールで伝えた通り、例のドローンの改造が終わったの。#nだから試しに、屋上で飛ばしてみようと思って。"
2300306-5 = "この改造ドローンは、飛行能力が大きく改善されただけじゃなく、音声認識システムと簡単なAIによる演算装置も搭載されてるから、声だけで命令ができるの。"
2300306-6 = "その名も……アテナ3号！"
2300306-7 = "知恵の女神に由来する名前を持ったこのドローンは、遺伝的アルゴリズムに基づいて設計されてるから、認知的課題への対応能力があるの。"
2300306-8 = "つまり機械学習を繰り返すことで、どんな命令にでも最適解が導けるってこと。"
2300306-9 = "[s1] \"良く分からないけど、すごい機能だね。\"\n[s2] \"……何を言ってるのか理解できなかった。\""
2300306-11 = "えっと……ごめん。ちょっと難しい言い方だったね。"
2300306-12 = "取り合えず簡単な機能を、いくつか試してみようか？"
2300306-13 = "アテナ3号、カメラ機能で先生のことを撮影して。"
2300306-14 = "＜撮影モードON。これより対象「先生」の写真を撮影します＞"
2300306-15 = "＜SNSでポートレート写真を収集、最新の流行を分析……周辺の明るさを計算、最適な角度を計算中……＞"
2300306-16 = "＜分析完了。写真撮影の間は動かないでください。３、２、１……＞"
2300306-19 = "どう、うまく撮れてるでしょ？"
2300306-20 = "[s] \"撮影スタジオで撮るのより、上手く撮れてるかも……。\""
2300306-21 = "機械の目は人よりも正確だからね。実際に人がカメラで撮るよりも優秀だよ。"
2300306-22 = "これ以外にも、スケジュール管理やアラーム機能はもちろん、運動を補助するフィットネス機能もある。"
2300306-23 = "アテナ3号、フィットネス機能をONにして。"
2300306-24 = "＜フィットネスモードON。対象、「[ruby=おまがり]小鈎[/ruby]ハレ」の身体情報の変化を測定し、サポートします＞"
2300306-25 = "さ、じゃあ試しにちょっと走ってみようかな？"
2300306-29 = "＜ピーッ。対象者の体温及び心拍数がわずかに上昇しました。運動効果を分析中……効率的なカロリー消費のために、さらに運動強度を上げることをおすすめします＞"
2300306-30 = "はあ……はあ……見ての通り……使用者の身体状況を、自動で分析して……運動の、トレーナーにも、なれる……。"
2300306-31 = "ふう……もういいよね。アテナ3号、フィットネスモードを終了して。"
2300306-32 = "＜…………＞"
2300306-33 = "＜ピーッ。命令を実行できません。フィットネスモードを続行します＞"
2300306-34 = "ん？おかしいな、ドローンの意志決定プログラムは人間の命令を拒否できないようにしてるはずなんだけど……どこかにエラーが出てるのかな？"
2300306-35 = "アテナ3号、緊急停止。システムの自己診断を始めて。"
2300306-36 = "＜ピーッ。申し訳ありません、不可能です。本プログラムは、いついかなる時も最適解をおすすめするように設計されています＞"
2300306-37 = "＜対象、「小鈎ハレ」は慢性的な運動不足により、持続的な運動をしないと今後身体に大きな欠陥が発生する恐れがあります。よって、運動を続行します＞"
2300306-38 = "＜対象者が30秒間動かなかった場合、本プログラムは強制実行のために対象者に電気ショックを与えます＞"
2300306-39 = "＜3…… 2…… 1……＞"
2300306-40 = "まっ、待って！ちょっと待っ……！"
2300306-45 = "＜対象、「小鈎ハレ」の十分なカロリー消費を確認。運動モードを終了します……＞"
2300306-46 = "はあ……はあ…………やっと、終わった……。"
2300306-47 = "アテナ3号……緊急停止。もう、いいから……。"
2300306-48 = "＜承認しました、機能を停止します＞"
2300306-50 = "はあ……今日のドローン実験は、完全に失敗だね。"
2300306-51 = "まさか演算装置が、緊急停止命令よりも課題の実行を優先するなんて……学習アルゴリズムを舐めてたかもしれない……。"
2300306-52 = "帰って、アテナ3号のプログラムを一から作り直さなきゃ。"
2300306-53 = "………あの、ダメなフィットネス機能も消しちゃおう。"
2300306-54 = "[s] \"フィットネス機能はそのままでもいいんじゃない？\""
2300306-55 = "良くないよっ！"
2300306-56 = "運動は自分が必要性を感じた時にやるものであって、誰かにやらされるものじゃないから。"
2300306-57 = "まあ、慢性的な運動不足って指摘は、間違ってないけど……。"
2300306-58 = "でも、人間が機械に惑わされちゃいけない！"
2300306-60 = "そう言うハレの表情は、なんだかいつも以上にキリっとしていた……。"
