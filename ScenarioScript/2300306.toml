[translation]
2300306-1 = "A Máquina Traidora"
2300306-2 = "Millennium - Terraço"
2300306-3 = "Eu estava te esperando, Sensei."
2300306-4 = "Como eu te avisei por e-mail, a modificação daquele drone terminou.#nEntão, pensei em testá-lo aqui no terraço."
2300306-5 = "Este drone modificado não só teve sua capacidade de voo melhorada, como também possui um sistema de reconhecimento de voz e um dispositivo de processamento com uma IA simples, então você pode dar comandos apenas com a voz."
2300306-6 = "O nome dele é... Athena 3!"
2300306-7 = "Este drone, que recebeu o nome da deusa da sabedoria, foi projetado com base em algoritmos genéticos, por isso tem a capacidade de lidar com tarefas cognitivas."
2300306-8 = "Ou seja, ao repetir o aprendizado de máquina, ele consegue encontrar a solução ideal para qualquer comando."
2300306-9 = "[s1] \"Não entendi muito bem, mas é uma função incrível.\"\n[s2] \"...Não consegui entender o que você disse.\""
2300306-11 = "Ah... desculpe. Acho que usei termos um pouco difíceis."
2300306-12 = "Por enquanto, que tal testarmos algumas funções simples?"
2300306-13 = "Athena 3, use a função de câmera para tirar uma foto do Sensei."
2300306-14 = "<Modo de captura ON. A partir de agora, fotografarei o alvo 'Sensei'.>"
2300306-15 = "<Coletando retratos nas redes sociais, analisando as últimas tendências... calculando o brilho ao redor, calculando o ângulo ideal...>"
2300306-16 = "<Análise concluída. Por favor, não se mova durante a foto. 3, 2, 1...>"
2300306-19 = "E então, ficou boa, não ficou?"
2300306-20 = "[s] \"Talvez tenha ficado melhor do que as tiradas em um estúdio fotográfico...\""
2300306-21 = "É que os olhos de uma máquina são mais precisos que os humanos. É superior a uma foto tirada por uma pessoa de verdade."
2300306-22 = "Além disso, ele tem funções de gerenciamento de agenda e alarme, e claro, uma função de fitness para auxiliar nos exercícios."
2300306-23 = "Athena 3, ligue a função de fitness."
2300306-24 = "<Modo fitness ON. Medindo e dando suporte às mudanças nas informações corporais do alvo, 'Hare Komagari'.>"
2300306-25 = "Certo, então vamos tentar correr um pouco?"
2300306-29 = "<Bip. A temperatura corporal e a frequência cardíaca do alvo subiram levemente. Analisando o efeito do exercício... para uma queima calórica eficiente, recomendo aumentar a intensidade do exercício.>"
2300306-30 = "Ha... ha... como você pode ver... ele analisa automaticamente a condição física do usuário... e pode até se tornar um... treinador de exercícios..."
2300306-31 = "Ufa... já chega, né? Athena 3, encerre o modo fitness."
2300306-32 = "<............>"
2300306-33 = "<Bip. Não é possível executar o comando. Continuando o modo fitness.>"
2300306-34 = "Hm? Que estranho, o programa de tomada de decisão do drone deveria ser incapaz de recusar comandos humanos... será que tem algum erro em algum lugar?"
2300306-35 = "Athena 3, parada de emergência. Inicie o autodiagnóstico do sistema."
2300306-36 = "<Bip. Sinto muito, impossível. Este programa foi projetado para recomendar a solução ideal a qualquer momento.>"
2300306-37 = "<O alvo, 'Hare Komagari', corre o risco de desenvolver grandes problemas físicos no futuro devido à falta crônica de exercícios, caso não se exercite continuamente. Portanto, o exercício continuará.>"
2300306-38 = "<Caso o alvo não se mova por 30 segundos, este programa aplicará um choque elétrico no alvo para forçar a execução.>"
2300306-39 = "<3... 2... 1...>"
2300306-40 = "Es-espera! Espera um pouco...!"
2300306-45 = "<Consumo calórico suficiente do alvo, 'Hare Komagari', confirmado. Encerrando o modo de exercício...>"
2300306-46 = "Ha... ha... finalmente... acabou..."
2300306-47 = "Athena 3... parada de emergência. Já chega, pode parar..."
2300306-48 = "<Aprovado, interrompendo funções.>"
2300306-50 = "Ha... o experimento com o drone de hoje foi um fracasso total."
2300306-51 = "Quem diria que o dispositivo de processamento priorizaria a execução da tarefa em vez do comando de parada de emergência... talvez eu tenha subestimado o algoritmo de aprendizado..."
2300306-52 = "Tenho que voltar e refazer o programa do Athena 3 do zero."
2300306-53 = ".........Ah, e vou apagar aquela função de fitness inútil também."
2300306-54 = "[s] \"A função de fitness não pode ficar como está?\""
2300306-55 = "Não pode, não!"
2300306-56 = "Exercício é algo que você faz quando sente necessidade, não algo que alguém te obriga a fazer."
2300306-57 = "Bem, a parte de que eu tenho falta crônica de exercícios não está errada, mas..."
2300306-58 = "Mas os humanos não devem ser enganados pelas máquinas!"
2300306-60 = "A expressão de Hare ao dizer isso parecia, de alguma forma, mais determinada do que o habitual..."
