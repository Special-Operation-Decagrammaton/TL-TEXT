[translation]
63070-1 = "Episódio 7: Tentativa"
63070-2 = "……。"
63070-3 = "Ainda não me acostumei com isso……."
63070-7 = "Olá, Subaru! Vim para o exame da tarde."
63070-11 = "Sinto muito, eu tive aula de manhã e não consegui vir antes……."
63070-12 = "Aula, é?"
63070-13 = "Suponho que isso seja o normal."
63070-14 = "……。"
63070-18 = "As instalações da enfermaria da Sociedade de Socorro são confortáveis para você?"
63070-19 = "……Sim. Nunca vi instalações tão bem equipadas."
63070-20 = "Graças a isso, parece que a recuperação de todos está sendo rápida."
63070-21 = "Já estou começando a ficar impaciente aqui~"
63070-22 = "Não podemos receber alta logo……?"
63070-23 = "De jeito nenhum! É perigoso quando se está quase curado!"
63070-24 = "Têm que aguentar até que a capitã dê permissão!"
63070-25 = "Como ela mesma disse."
63070-26 = "……。"
63070-30 = "Diga, Subaru?"
63070-31 = "Sim?"
63070-32 = "Sobre nós…… você não nos odeia, odeia?"
63070-33 = "Por que a pergunta de repente? #nVocês estão cuidando de nós, só tenho gratidão……."
63070-34 = "……。"
63070-35 = "É assim, então."
63070-36 = "Sim……."
63070-38 = "(Naquele dia)"
63070-39 = "(O dia em que as trombetas dos anjos pararam)"
63070-40 = "(Muitos estudantes visitaram a filial de Arius)"
63070-41 = "(O Departamento de Medicina de Emergência de Gehenna, a Sociedade de Socorro de Trinity. E muitos outros)"
63070-64 = "(Nós fomos transferidas para o prédio principal da Sociedade de Socorro)"
63070-65 = "(Até hoje, estamos aqui recebendo tratamento e aguardando a recuperação)"
63070-67 = "……Ainda há estudantes que estão confusas com o fato de terem recebido ajuda de Trinity e Gehenna."
63070-68 = "Embora seja estranho dizer isso depois de termos sido salvas……."
63070-69 = "Ficaríamos gratas se pudessem nos dar um pouco mais de tempo para processar tudo. #nDesculpe-nos."
63070-73 = "Não! Na verdade, nós é que……."
63070-74 = "Sim……."
63070-75 = "Deixando isso de lado."
63070-76 = "Sou grata por terem cuidado de nós."
63070-80 = "Não, não! De jeito nenhum!"
63070-82 = "Como está a sua condição?"
63070-83 = "Eu estou bem. Mas e você, Mine……?"
63070-84 = "Não se preocupe. Embora eu não seja tão forte, ainda sou a capitã da Sociedade de Socorro."
63070-85 = "……O que aconteceu com você naquele dia, Mine?"
63070-86 = "Sim?"
63070-87 = "Ah, você quer dizer o dia em que eu desmaiei."
63070-88 = "……。"
63070-89 = "Eu apenas protegi a todos vocês."
63070-90 = "Fico feliz que possamos conversar assim, com saúde."
63070-91 = "Subaru…… o que você pensa sobre isso……? #nSobre o passado e o futuro de Arius……."
63070-92 = "Seria mentira dizer que não sinto nada em meu coração."
63070-93 = "……。"
63070-94 = "Mas... mesmo carregando esse sentimento, pretendo continuar vivendo."
63070-95 = "Essa emoção pode acabar transbordando, ou talvez vá diminuindo aos poucos.#nOu talvez eu queime até o fim e não reste nada além de cinzas."
63070-96 = "……Mesmo assim, eu preciso continuar vivendo."
63070-97 = "……Entendo. Essa sua determinação firme, eu também farei questão de aprender."
63070-98 = "Sim, aprender——"
63070-103 = "A partir de agora, é hora de estudar para as provas!!!"
63070-104 = "Hã!?"
63070-105 = "Mantenham o foco! O tempo que resta até as provas é curto!"
63070-106 = "Se o corpo e a mente já estão tranquilos, vocês devem aproveitar esta oportunidade para focar nos estudos.#nNão é essa a postura correta de uma estudante?"
63070-107 = "Para nós, da Cavalaria de Socorro, isso não é diferente."
63070-108 = "Conciliar o socorro com os estudos! Vamos mostrar como a Cavalaria de Socorro deve agir!"
63070-109 = "Não é, pessoal?"
63070-110 = "Sim, capitã!"
63070-111 = "Fufu, que boa resposta."
63070-112 = "Então, Subaru-san. E todas vocês de Arius."
63070-113 = "Boa sorte nas provas."
63070-117 = "Era para ser uma conversa tão boa... por que terminou assim...?"
63070-118 = "Estudar, hein..."
63070-119 = "Sinceramente, não quero fazer isso..."
63070-120 = "……Para ser sincera, eu também não."
63070-121 = "Eu quero me esforçar!"
63070-122 = "É bom ter motivação...#nDesta vez, talvez seja a minha vez de aprender com a Maia-san..."
63070-128 = "Oh? O que é aquilo...?"
63070-137 = "Sim, por aqui. O básico do CQB é mais ou menos isso."
63070-138 = "O ideal é não ser levada para um combate corpo a corpo, mas nunca se sabe o que pode acontecer em campo."
63070-139 = "In-incrível..."
63070-140 = "Que legal...!"
63070-144 = "Hã...? Receber tantos aplausos assim..."
63070-145 = "Em Arius, isso era algo que se esperava que todos soubessem..."
63070-146 = "A-ah! Aquilo... aquela... técnica de combate corpo a corpo? Você poderia nos ensinar também?"
63070-147 = "Hã? Mas vocês não precisam..."
63070-148 = "Você mesma disse! Nunca se sabe o que pode acontecer!"
63070-150 = "Acho que, nos dias de hoje, técnicas de autodefesa são essenciais para nós também!"
63070-152 = "Isso mesmo! Como damas——"
63070-153 = "Devemos proteger a nós mesmas e ensinar boas maneiras a quem for rude conosco!"
63070-154 = "Sim! Exatamente!"
63070-158 = "Será que Trinity vai ficar bem...?"
63070-159 = "Será que acabamos despertando algo terrível...?"
63070-160 = "Isso! Vamos fundar o Clube de Pesquisa de CQB!"
63070-161 = "Boa ideia! Então, a presidente e a vice-presidente serão..."
63070-162 = "Claro, deveria ser alguém especializado, não é?"
63070-166 = "Sem objeções! Contamos com vocês!"
63070-171 = "Nós!? Mas um cargo tão importante, eu não sei se..."
63070-172 = "I-iiih..."
63070-173 = "Não se preocupem! Se tiverem qualquer dificuldade, eu ajudarei com tudo!"
63070-174 = "Então, pessoal! Por favor, aplaudam mais uma vez!"
63070-178 = "P-por favor, cuidem de nós..."
63070-179 = "Como as coisas chegaram a esse ponto..."
63070-181 = "Aquele... senpai?"
63070-182 = "Sim? Aconteceu alguma coisa?"
63070-183 = "……。"
63070-184 = "Será que nós também conseguiremos……?"
63070-185 = "Pode ser que muitas coisas sejam diferentes do que eram antes, mas……."
63070-190 = "Você acha que conseguiremos construir um novo ninho por conta própria?"
63070-191 = "……。"
63070-192 = "Vamos tentar."
63070-194 = "O que será que eu queria fazer?"
63070-195 = "Você estava tentando proteger Arius com todas as suas forças."
63070-197 = "Se o resultado fosse esse, teria sido melhor não ter feito nada……."
63070-198 = "Não diga isso."
63070-199 = "O que você tentou fazer tem significado."
63070-201 = "É verdade que, mesmo com esforço, algumas coisas não mudam."
63070-202 = "Talvez a gente falhe. Talvez fique pior do que está agora."
63070-203 = "Mas, pense bem."
63070-204 = "Se estamos no fundo do poço, o único caminho é subir, não é?"
63070-206 = "Não importa qual seja o resultado."
63070-208 = "Próximo episódio: Hora do Chá"
