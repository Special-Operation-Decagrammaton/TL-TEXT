[translation]
1004702-1 = "キラキラを見つけたい"
1004702-2 = "（そんなわけで、チセに会うために海を訪れていた）"
1004702-6 = "[ns] \"あ、チセ。\""
1004702-7 = "先生だ～。"
1004702-8 = "[s1] \"とりあえず来てみたけど……。\"\n[s2] \"今日は何をしに？\""
1004702-11 = "それは……。"
1004702-12 = "[s] \"それは……?\""
1004702-21 = "何だろうね～？"
1004702-25 = "[ns] \"……そっか。\""
1004702-26 = "……あ、思い出した。"
1004702-27 = "きらきら。"
1004702-28 = "きらきらを、見つけにいかなきゃ。"
1004702-29 = "[s] \"きらきら……？\""
1004702-30 = "私、今日から夏休みなの。"
1004702-31 = "それで、何をしようかなって悩んで。"
1004702-32 = "昨日ネットで検索したの。「夏　やること」って。"
1004702-33 = "[s3] \"チセもネット使うんだね。\"\n[s4] \"なるほど、計画的！\""
1004702-36 = "やった、褒められた。"
1004702-37 = "そう、それでね。"
1004702-38 = "こういうのを見つけたの。"
1004702-39 = "先生にも見せてあげる。"
1004702-47 = "これこれ、見て。見える？"
1004702-55 = "[ns] \"近い！チセ、ちょっと近いかも！\""
1004702-56 = "そうなの？"
1004702-60 = "じゃあ、これくらい？"
1004702-62 = "（ほぼゼロ距離まで迫ってくるチセを落ち着かせ、）"
1004702-63 = "（目に入ったのはネットの記事だった）"
1004702-64 = "（見出しの内容は……）"
1004702-65 = "[s5] \"「この夏、自分だけの大人な輝きをゲットして――\"\n[s6] \"一肌脱いで成長しよう！夏完全攻略マニュアル！」……？\""
1004702-68 = "うん、だから、この夏休み中にキラキラを見つけ出して……"
1004702-69 = "成長したいな～って。"
1004702-70 = "[s] \"……なるほど？\""
1004702-71 = "せっかくの夏休みだから。"
1004702-72 = "大事に使いたいなって思って……"
1004702-73 = "この貴重な時間……"
1004702-74 = "何をしたら陰陽部の部員として、それに俳句を作る人……"
1004702-75 = "俳句erとしても、成長できるのかなって。"
1004702-76 = "[s] \"それ「ハイカー」って読むと、またちょっと別の意味なんじゃ……？\""
1004702-77 = "それで、これを見つけたの。"
1004702-78 = "キラキラを見つければ、成長できる……"
1004702-79 = "じゃあそれを、見つけないとなって。"
1004702-80 = "だから、探しに行きたいの、私だけのきらきらを。"
1004702-81 = "[s7] \"なるほど。成長自体は良いことだと思うけど……\"\n[s8] \"多分この記事は、ちょっと違うっていうか……。\""
1004702-84 = "……？"
1004702-85 = "違う？"
1004702-86 = "きらきら、探しちゃダメなの？"
1004702-90 = "先生と見つけにいくの、楽しみにしてたのに……。"
1004702-91 = "[s] \"ぐっ……！\""
1004702-93 = "[ns] \"いや、それ自体は止めないんだけど、協力するんだけど……！\""
1004702-94 = "やった～。"
1004702-95 = "じゃあ行こう、先生。"
1004702-96 = "頑張ってきらきらを見つけて……"
1004702-97 = "全部脱ぎ捨てて、成長しちゃお～。"
1004702-98 = "[s] \"あの、あまり「脱ぐ」とかは口にしない方が……。\""
1004702-99 = "先生と私、ふたりとも……"
1004702-100 = "戦車になれるくらい、成長できたら良いな～。"
1004702-101 = "[s] \"戦車……になれるかは分からないけど、頑張ろう！\""
1004702-102 = "（そうして、チセとのきらきら探しが始まった）"
1004702-108 = "[ns] \"ところでチセ、「きらきら」って具体的には……？\""
1004702-109 = "あ、それはね～……"
1004702-110 = "きらきらしてるもの、だよ。"
1004702-111 = "だから、きらきらしてるものを見つけるの。"
1004702-112 = "[s] \"分かるけど分からない……！\""
1004702-113 = "夏の海にピッタリのきらきら……。"
1004702-114 = "今ここでしか見つけられないきらきらは……。"
1004702-115 = "あ、見て、先生。"
1004702-116 = "あそこ、きらきらがある。"
1004702-120 = "[ns] \"ま、待って、チセ……！\""
1004702-125 = "きらきらしてる……"
1004702-130 = "……これ、クラゲさん？"
1004702-131 = "[s] \"……ゴミ袋、だね。日差しに反射して輝いて見えたのかな。\""
1004702-132 = "そっかぁ……。"
1004702-133 = "ゴミ袋って、こんなにキラキラしてたんだね。"
1004702-134 = "よいしょっと。"
1004702-135 = "[s] \"それ、持って帰るの？\""
1004702-136 = "放っておいたら、また海に流されちゃうかもだし。"
1004702-137 = "きらきらの袋のクラゲさんは、連れて帰ろうかなって。"
1004702-138 = "あ、先生あそこ。"
1004702-139 = "また、きらきらがある。"
1004702-143 = "[ns] \"チセ速い！待って！\""
1004702-149 = "このきらきら……小石?"
1004702-150 = "[s] \"えっと……「抹茶味ラムネ」の瓶？\""
1004702-151 = "そっか～……。"
1004702-152 = "じゃあ、これも……よいしょ。"
1004702-153 = "次に行こうか、先生。"
1004702-154 = "きらきらを求めて、出発～。"
1004702-161 = "これは、貝さん？"
1004702-162 = "[s] \"使い切ったパウダーケース……？\""
1004702-163 = "そっか～。"
1004702-169 = "これは？ワカメ？"
1004702-170 = "[s] \"それは、海で使う網かな……。\""
1004702-174 = "じゃあ先生、これは?"
1004702-175 = "これは？"
1004702-180 = "……これは何だろ？"
1004702-182 = "（その後もきらきらを探してチセと砂浜を歩き回り、）"
1004702-183 = "（色んなものを収集していった）"
1004702-185 = "たくさん見つかったね～。"
1004702-186 = "[s] \"そうだね、殆どゴミだったけど……。\""
1004702-190 = "（約3時間、チセと一緒に見つけたものは……）"
1004702-191 = "（抹茶ラムネの瓶、ゴミ袋、ひび割れたBDの欠片、網、）"
1004702-192 = "（捨てられたペットボトル、ワカメが絡まったブイ……）"
1004702-193 = "[s] \"……良い掃除になったね。\""
1004702-195 = "……すごい。"
1004702-196 = "[s] \"すごい……？\""
1004702-197 = "今日一日集めたこれ……。"
1004702-198 = "全部キラキラしてた。"
1004702-199 = "クラゲみたいに、小石みたいに、サンゴ礁みたいに、貝みたいに。"
1004702-200 = "海ってこんなにも、きらきらで溢れていたんだね。"
1004702-201 = "[s] \"……確かにそうかもね。\""
1004702-202 = "でも、まだ足りない。"
1004702-203 = "目を閉じると、浮かび上がってくるものがあるの……。"
1004702-204 = "ずっと探してたきらきら……。"
1004702-205 = "まだぼんやりしてて、はっきりは見えないんだけど……。"
1004702-206 = "何だと思う、先生？"
1004702-207 = "[s] \"んー、何だろ……。\""
1004702-208 = "……。"
1004702-209 = "まあでも、先生が一緒に探してくれただけで。"
1004702-210 = "それで、私は……"
1004702-214 = "……あ、ご飯の時間だ。そろそろ帰ろっか、先生。"
1004702-215 = "[s] \"「私は」の続きが気になるんですが！？\""
1004702-216 = "んー……。"
1004702-217 = "あ、そういえば……。"
1004702-218 = "先生と一日中探して、見つからなかったことは……。"
1004702-219 = "つまり、これって……。"
1004702-220 = "……私やっぱり、戦車にはなれないのかな？"
1004702-221 = "[s] \"……大丈夫、まだ夏休みは始まったばっかりだし。\""
1004702-222 = "先生?"
1004702-223 = "[s9] \"チセが見つけたいものを見つけるまで、どこまでも付き合うよ。\"\n[s10] \"だから、心配しないで。\""
1004702-226 = "……。"
1004702-227 = "……そうだね。"
1004702-228 = "先生とこの後も……"
1004702-229 = "あ。"
1004702-233 = "[ns] \"チセ？\""
1004702-234 = "先生、今ね……。"
1004702-235 = "……ううん、なんでもない。"
1004702-237 = "そうだね、夏休みは始まったばかりだから……行こう、先生。"
1004702-238 = "じゃあ、帰宅帰宅～。"
1004702-239 = "競争しよう、先生。"
1004702-240 = "先に帰れた方がトマトね。"
1004702-241 = "[s] \"トマト！！？！？！？！？\""
1004702-246 = "（そうしてチセと一緒に日が沈んでいく海辺を歩き、リゾートへと戻ったのだった）"
