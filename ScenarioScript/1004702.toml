[translation]
1004702-1 = "Quero encontrar algo brilhante"
1004702-2 = "（Por conta disso, fui até a praia para encontrar a Chise）"
1004702-6 = "[ns] \"Ah, Chise.\""
1004702-7 = "Sensei!"
1004702-8 = "[s1] \"Eu vim aqui por enquanto, mas...\"\n[s2] \"O que veio fazer hoje?\""
1004702-11 = "Isso é..."
1004702-12 = "[s] \"Isso é...?\""
1004702-21 = "O que será, hein?"
1004702-25 = "[ns] \"...Entendi.\""
1004702-26 = "...Ah, lembrei."
1004702-27 = "Brilhante."
1004702-28 = "Eu preciso ir encontrar algo brilhante."
1004702-29 = "[s] \"Algo brilhante...?\""
1004702-30 = "Minhas férias de verão começam hoje."
1004702-31 = "Por isso, fiquei pensando no que fazer."
1004702-32 = "Ontem pesquisei na internet: \"O que fazer no verão\"."
1004702-33 = "[s3] \"A Chise também usa a internet, né?\"\n[s4] \"Entendi, que planejada!\""
1004702-36 = "Eba, fui elogiada."
1004702-37 = "Sim, e então."
1004702-38 = "Eu encontrei isso aqui."
1004702-39 = "Vou mostrar para o sensei também."
1004702-47 = "Olha só, veja. Consegue ver?"
1004702-55 = "[ns] \"Está perto! Chise, talvez esteja perto demais!\""
1004702-56 = "É mesmo?"
1004702-60 = "Então, assim está bom?"
1004702-62 = "（Acalmo a Chise, que se aproximou a quase zero distância,）"
1004702-63 = "（e o que vi foi um artigo da internet）"
1004702-64 = "（O conteúdo da manchete era...）"
1004702-65 = "[s5] \"\"Neste verão, conquiste seu próprio brilho adulto--\"\n[s6] \"Tire a pele e cresça! Manual completo para o verão!\"...?"
1004702-68 = "Sim, por isso, quero encontrar algo brilhante durante estas férias de verão..."
1004702-69 = "E crescer um pouco."
1004702-70 = "[s] \"...Entendi?\""
1004702-71 = "Já que são as férias de verão."
1004702-72 = "Quero aproveitar bem..."
1004702-73 = "Esse tempo precioso..."
1004702-74 = "O que eu poderia fazer para crescer como membro do Departamento Yin-Yang e como alguém que escreve haicais..."
1004702-75 = "Como uma \"haicaista\", será que consigo crescer?"
1004702-76 = "[s] \"Se ler isso como \"hiker\" (trilheira), não teria um significado um pouco diferente...?\""
1004702-77 = "Por isso, encontrei isso."
1004702-78 = "Se eu encontrar algo brilhante, poderei crescer..."
1004702-79 = "Então, eu preciso encontrar."
1004702-80 = "Por isso, quero ir procurar o meu próprio brilho."
1004702-81 = "[s7] \"Entendo. Acho que crescer é algo bom, mas...\"\n[s8] \"Talvez esse artigo seja um pouco diferente, sabe...\""
1004702-84 = "...?"
1004702-85 = "Diferente?"
1004702-86 = "Não posso procurar por algo brilhante?"
1004702-90 = "Eu estava tão animada para procurar com o sensei..."
1004702-91 = "[s] \"Guh...!\""
1004702-93 = "[ns] \"Não, eu não vou te impedir, eu vou colaborar, mas...!\""
1004702-94 = "Eba."
1004702-95 = "Então vamos, Sensei."
1004702-96 = "Vamos nos esforçar para encontrar o brilho..."
1004702-97 = "Vamos nos livrar de tudo e crescer~."
1004702-98 = "[s] \"Ei, talvez seja melhor não sair falando sobre 'se livrar' de tudo...\""
1004702-99 = "Eu e você, Sensei..."
1004702-100 = "Seria ótimo se pudéssemos crescer tanto a ponto de virar um tanque de guerra~."
1004702-101 = "[s] \"Não sei se virar um tanque é possível, mas vamos dar o nosso melhor!\""
1004702-102 = "（Assim, a busca pelo brilho com Chise começou）"
1004702-108 = "[ns] \"A propósito, Chise, o que exatamente seria esse 'brilho'...?\""
1004702-109 = "Ah, isso é..."
1004702-110 = "São coisas que brilham."
1004702-111 = "Por isso, vamos encontrar coisas que brilham."
1004702-112 = "[s] \"Entendi, mas ao mesmo tempo não entendi nada...!\""
1004702-113 = "Um brilho que combina perfeitamente com o mar de verão..."
1004702-114 = "O brilho que só podemos encontrar aqui e agora é..."
1004702-115 = "Ah, olhe, Sensei."
1004702-116 = "Ali, tem um brilho."
1004702-120 = "[ns] \"E-espere, Chise...!\""
1004702-125 = "Está brilhando..."
1004702-130 = "...Isso é uma água-viva?"
1004702-131 = "[s] \"...É um saco de lixo. Acho que ele brilhou por causa do reflexo do sol.\""
1004702-132 = "Entendi..."
1004702-133 = "Então sacos de lixo brilham desse jeito, né."
1004702-134 = "Prontinho."
1004702-135 = "[s] \"Você vai levar isso para casa?\""
1004702-136 = "Se deixarmos aqui, pode acabar indo parar no mar de novo."
1004702-137 = "Acho que vou levar a água-viva de saco brilhante para casa."
1004702-138 = "Ah, Sensei, ali."
1004702-139 = "Tem outro brilho."
1004702-143 = "[ns] \"Chise, você é rápida! Espere!\""
1004702-149 = "Esse brilho... é uma pedrinha?"
1004702-150 = "[s] \"Hum... uma garrafa de refrigerante sabor chá verde?\""
1004702-151 = "Entendi~..."
1004702-152 = "Então, isso também... prontinho."
1004702-153 = "Vamos para o próximo, Sensei."
1004702-154 = "Em busca do brilho, partiu~."
1004702-161 = "Isso é uma concha?"
1004702-162 = "[s] \"Um estojo de pó compacto vazio...?\""
1004702-163 = "Entendi~."
1004702-169 = "E isso? Alga?"
1004702-170 = "[s] \"Isso parece ser uma rede usada no mar...\""
1004702-174 = "Então, Sensei, e isso?"
1004702-175 = "E isso?"
1004702-180 = "...O que será isso?"
1004702-182 = "（Depois disso, continuei andando pela areia com Chise em busca de brilhos,）"
1004702-183 = "（e fomos coletando várias coisas）"
1004702-185 = "Encontramos bastante coisa~."
1004702-186 = "[s] \"Pois é, embora a maioria fosse lixo...\""
1004702-190 = "（Após cerca de 3 horas, as coisas que encontrei com Chise foram...）"
1004702-191 = "（Uma garrafa de refrigerante de chá verde, um saco de lixo, um pedaço de um disco de habilidade rachado, uma rede,）"
1004702-192 = "（Garrafas PET descartadas, uma boia enrolada em algas...）"
1004702-193 = "[s] \"……Fizemos uma boa limpeza, não é?\""
1004702-195 = "……Incrível."
1004702-196 = "[s] \"Incrível……?\""
1004702-197 = "Tudo isso que coletamos hoje……"
1004702-198 = "Tudo brilhava tanto."
1004702-199 = "Como águas-vivas, como pedrinhas, como recifes de coral, como conchas."
1004702-200 = "O mar é tão cheio de brilhos, não é mesmo?"
1004702-201 = "[s] \"……Talvez seja verdade.\""
1004702-202 = "Mas ainda não é o suficiente."
1004702-203 = "Quando fecho os olhos, tem algo que surge na minha mente……"
1004702-204 = "Aquele brilho que eu estava procurando há tanto tempo……"
1004702-205 = "Ainda está meio embaçado, não consigo ver claramente, mas……"
1004702-206 = "O que você acha que é, Sensei?"
1004702-207 = "[s] \"Hmm, o que será…….\""
1004702-208 = "……"
1004702-209 = "Bem, mas só de você ter procurado comigo,"
1004702-210 = "isso já me faz……"
1004702-214 = "……Ah, é hora de comer. Vamos voltar logo, Sensei."
1004702-215 = "[s] \"Eu estou curioso sobre o que vem depois de 'isso já me faz'……!?\""
1004702-216 = "Hmm……"
1004702-217 = "Ah, falando nisso……"
1004702-218 = "O fato de termos procurado o dia todo com você e não termos encontrado……"
1004702-219 = "Ou seja, isso significa que……"
1004702-220 = "……Será que eu realmente não consigo me tornar um tanque?"
1004702-221 = "[s] \"……Não se preocupe, as férias de verão acabaram de começar.\""
1004702-222 = "Sensei?"
1004702-223 = "[s9] \"Eu vou te acompanhar até onde for preciso, até a Chise encontrar o que procura.\"\n[s10] \"Então, não se preocupe.\""
1004702-226 = "……"
1004702-227 = "……É verdade."
1004702-228 = "Depois disso, com o Sensei……"
1004702-229 = "Ah."
1004702-233 = "[ns] \"Chise?\""
1004702-234 = "Sensei, agora pouco……"
1004702-235 = "……Não, não é nada."
1004702-237 = "É verdade, as férias de verão acabaram de começar, então…… vamos, Sensei."
1004702-238 = "Então, hora de voltar para casa~"
1004702-239 = "Vamos apostar uma corrida, Sensei."
1004702-240 = "Quem chegar primeiro ganha um tomate."
1004702-241 = "[s] \"TOMATE！！？！？！？！？\""
1004702-246 = "（E assim, caminhei com Chise pela praia enquanto o sol se punha e voltamos para o resort.）"
