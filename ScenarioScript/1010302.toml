[translation]
1010302-1 = "嘘と真"
1010302-2 = "先生、ここだ！#n助けてくれ！"
1010302-3 = "[s1] \"マリナ、落ち着いて！\"\n[s2] \"何があったの？\""
1010302-6 = "そ、それはだな……。"
1010302-7 = "この店に食事に来たんだが……。"
1010302-8 = "いらっしゃいませ、お連れ様ですね？#nごゆっくりお召し上がりください！"
1010302-9 = "……こんな感じで困っているんだ。"
1010302-10 = "[s] \"えっと、どういうこと？\""
1010302-11 = "ええっと……。"
1010302-12 = "この店の料理が、すごく美味しいと聞いて来たのだが……。"
1010302-13 = "何も考えずに注文したら、こんなにも料理を出されてしまったんだ。"
1010302-14 = "それで、こんなおもてなしを受けても良いものか心配になって……。"
1010302-15 = "このスープに入ってるコリコリしたものは、いったい……。"
1010302-16 = "野菜炒めも、不思議なくらいコクがある。"
1010302-17 = "エビのサンドイッチ……#nいや、天ぷらのような料理に、黄金色のチャーハンまで。"
1010302-18 = "そのうえ、山海経の滞在中にかかった費用は、すべて玄龍門が負担してくれるらしい。"
1010302-19 = "……こんな料理、レッドウィンターでは想像すらできなかった。"
1010302-20 = "玄龍門にあまり負担をかけてしまっては、#nレッドウィンターの名を汚さないかと心配で……。"
1010302-21 = "[ns] （たしかに、量はすごいけど……）"
1010302-23 = "[ns] （一般的な食材を使っているような……？）"
1010302-24 = "せ、先生？#nジッと見ていないで、何か言ってほしいのだが……。"
1010302-25 = "やはり、これは過剰なもてなしなのだな？"
1010302-26 = "[s] \"これくらいなら、きっと大丈夫だと思うよ。\""
1010302-27 = "そう、なのか？#n先生がそう言ってくれて、少しは安心したが……。"
1010302-28 = "食事はいかがでしたか？#nこちらはデザートの杏仁豆腐になります！"
1010302-29 = "豆腐の一種なのか？#nしかし、このツヤと食感は初めてだ……。"
1010302-30 = "……そうか、豆腐プリンのようなものか！#nこれはすごい、プリンが2つ食べられるな！"
1010302-31 = "[s] \"良かったね、マリナ。\""
1010302-33 = "……食べ過ぎてしまった。"
1010302-34 = "……なに？#n山海経では、食べ過ぎるくらいが礼儀なのか？#nなんとも不思議な文化だ。"
1010302-35 = "それにしても、#nこんな美味しい料理を作るには、高価な材料が必要だったはず……。"
1010302-36 = "料理長、今日の料理に使われた食材について教えてくれないか？"
1010302-37 = "ははっ、それは営業秘密です。"
1010302-38 = "き、気になるじゃないか！#nそうだ、さっきのスープに入っていたコリコリしたものは！？"
1010302-39 = "あの野菜炒めも複雑な味をしていたぞ！"
1010302-40 = "……誰にも言わないから、こっそり教えてもらえないか？"
1010302-41 = "仕方ありませんね、良いでしょう。"
1010302-42 = "最初に提供した料理は、きくらげのフカヒレスープです。"
1010302-43 = "きくらげの中には、フカヒレと食感が似ているものもありまして。"
1010302-44 = "なかでも、当店が独自のルートで仕入れた特殊な白きくらげを使用しています！"
1010302-45 = "500年が経過した切り株から、#n一切の太陽光を浴びずに育った逸品です！"
1010302-46 = "そ、そうだったのか！？"
1010302-47 = "[s3] （あ、山海経流の冗談だ……）\n[s4] （面白いから、このまま見ていよう）"
1010302-50 = "あの野菜炒めには、#n全体の数パーセントしか採れない高品質なチンゲンサイを使っています！"
1010302-51 = "1年中水温が変わらない海域にだけ存在する、巨大エビも！"
1010302-52 = "1000年かけて仕込んだ醤油で作ったソースに、鳳凰の胸肉も！#nキヴォトスのどこを探しても見つからない厳選食材を、これでもかと入れました！"
1010302-53 = "そ、そうだったのか！？"
1010302-55 = "うう……どうすれば良いのだ、先生。"
1010302-56 = "私のせいで、玄龍門に迷惑をかけてしまったのでは……。"
1010302-57 = "[s5] \"大丈夫、安心して。\"\n[s6] \"アレ、全部冗談だから。\""
1010302-60 = "じ、冗談だと！？"
1010302-61 = "……なるほど、山海経流のノリか。#n本当は全部、よくある材料だった、と？"
1010302-62 = "……ふぅ、それを聞いて安心した。#nしかし、普通の食材であれほどの味を再現するとは……。"
1010302-63 = "いや、そうか。#n食材の話は冗談だとしても、料理人が一流なのだな。"
1010302-64 = "嘘で誤魔化そうとしたところで、真実には敵わない……#nふっ、また学びを得てしまった。"
1010302-65 = "よし。"
1010302-66 = "こうなった以上、グルメ旅を楽しもう！"
1010302-67 = "もちろん、先生も付いてきてくれるな？"
1010302-68 = "[s] \"う、うん……。\""
1010302-69 = "では、まずはあっちの路地だ！"
1010302-72 = "こ、これは……！？"
1010302-73 = "ふっふっふ……東城通りにようこそ。#nここはご覧の通り、様々な虫の串焼きで知られる名所です。"
1010302-74 = "足を運んだということは、それ相応の覚悟がお有りですね？"
1010302-75 = "[s] \"ま、マリナ……大丈夫そう？\""
1010302-76 = "……。"
1010302-77 = "ああ。もう分かっているぞ、先生。"
1010302-78 = "どうせ、これも冗談なのだろう。"
1010302-79 = "見た目は虫の形をしているが、#n中身は美味しいに違いない！"
1010302-80 = "[s] \"本当にそうなのかな……？\""
1010302-81 = "私を信じてくれ、先生！#nこうなったら、全種類制覇といこう！"
1010302-82 = "行くぞっ、突撃ー！"
1010302-84 = "これは……サソリの串焼きか？#nいや、サソリの形をしているだけだったな。"
1010302-85 = "どれどれ……うっ！？"
1010302-86 = "なっ、本物のサソリじゃないか！#nつまり、今まで食べてきた串焼きは、すべて虫だったと……？"
1010302-87 = "……あれ、意外とイケるな？#n少し皮は硬いが、カリッとしていて香ばしいぞ。"
1010302-88 = "つ、次は……ヒトデの串焼き！？#nこんなのまで売ってるのか！？"
1010302-89 = "いや、何事も挑戦だな。#n見ててくれ、先生！"
1010302-93 = "……くっ。なんだ、この焦げたような味は。#n中は魚のような気も……。"
1010302-95 = "（その後もマリナは、様々な虫の串焼きを味わった……）"
1010302-96 = "（マリナがどんな学びを得たのかは、聞かないことにしておいた……）"
