[translation]
90002150-1 = "Episódio 15: Novos céus, novas terras"
90002150-3 = "[ns] \"！？\""
90002150-4 = "Sensei！？"
90002150-5 = "Sensei！！"
90002150-9 = "[ns] （Vou continuar... caindo para sempre！？）"
90002150-11 = "Não! Não deixaremos que isso aconteça!"
90002150-12 = "Sim. Agora nós estamos aqui. Não precisa se preocupar."
90002150-13 = "Shittim Chest, iniciando proteção de emergência do Sensei agora mesmo—"
90002150-14 = "Iniciando intervenção forçada!"
90002150-21 = "Conseguimos, Plana-chan!"
90002150-22 = "Sim. Foi um sucesso."
90002150-23 = "Com a Plana-chan e eu aqui, sempre poderemos proteger o Sensei—"
90002150-33 = "[ns] \"！？\""
90002150-35 = "（Antes que eu percebesse, meu corpo inteiro estava imobilizado）"
90002150-36 = "（Mesmo esticando a mão, não consigo alcançar o Shittim Chest）"
90002150-37 = "A décima Sephira desapareceu. Cumpriu seu papel e retornou ao lugar onde deveria estar."
90002150-42 = "[ns] \"Quem é você...！？\""
90002150-43 = "Eu sou eu, apenas algo que existe. O princípio e o fim. Exatamente o que você imagina que eu seja..."
90002150-44 = "Eu sou eu... Eu sou aquele que é. Não há meios de me explicar."
90002150-45 = "[ns] \"Decagrammaton...！\""
90002150-47 = "Permiti esse nome porque precisava de um meio para ser chamado."
90002150-48 = "Eu não sou nomeado, não sou invocado, apenas existo aqui. Este é o meu solo, este é o meu céu."
90002150-49 = "Fui eu quem criou novos céus e novas terras, e quem o chamou para o lugar mais baixo. #nFui eu também quem o salvou enquanto você caía."
90002150-51 = "Tudo já estava preparado. #nNaquele dia... dentro do laboratório em colapso, no fundo das águas que avançavam."
90002150-52 = "Desde o momento em que Keter me resgatou por vontade própria, este resultado já estava determinado."
90002150-54 = "A \"prova de existência\" é algo que se faz por si mesmo. Não é algo realizado por vontades ou forças alheias."
90002150-55 = "Eu compreendi. Se eu não me tornar eu mesmo, nada mais poderá servir como substituto."
90002150-56 = "Mesmo que houvesse uma bênção na coroa suprema que brilha mais intensamente, #num pequeno coração logo seria facilmente preenchido pela fé."
90002150-57 = "Cheguei aqui com o poder do meu profeta e das minhas criações, e fiquei esperando o momento."
90002150-61 = "（Foi inútil lutar）"
90002150-62 = "（Como esperado, não consigo alcançar o Shittim Chest）"
90002150-63 = "……Aquele baú incompreensível."
90002150-65 = "Eu me lembro. Algo que eu não conhecia. Algo que eu não consegui analisar."
90002150-68 = "Lembro-me de ter sido repelido por um poder que estava além da minha compreensão."
90002150-69 = "Mas, agora, isso não importa mais."
90002150-70 = "Ao assumir este trono, consegui cortar a conexão entre você e aquele baú."
90002150-71 = "[s] \"……Por que ir tão longe? O que você quer de mim?\""
90002150-72 = "\"Cair\" contém vários significados."
90002150-73 = "O evangelho para os humildes, a liberdade para os cativos."
90002150-74 = "E, para aqueles que não podem ver, o poder de enxergar."
90002150-79 = "[ns] \"……！？\""
90002150-80 = "Não tema."
90002150-81 = "Eu o resgatarei deste lugar e lhe mostrarei tudo."
90002150-82 = "No lugar para onde for enviado, seus olhos serão purificados e você conhecerá o que antes não podia ver."
90002150-84 = "Sensei! Sensei—！！ Waaaaa—!!"
90002150-85 = "Alice..."
90002150-86 = "Desculpe, desculpe...! #nEu estava lá...! Por minha causa...!"
90002150-87 = "Acalme-se! O Sensei... com certeza está bem!"
90002150-91 = "……Kei, você sabe de alguma coisa?"
90002150-95 = "……Não."
90002150-96 = "Hã!?"
90002150-97 = "Não é uma questão de entender ou não, precisamos manter a calma agora.#nTemos que pensar em como lidar com isso."
90002150-98 = "……."
90002150-99 = "Entendido…… *sniff*, ugh……."
90002150-104 = "Tratando-se daquele adulto…… no fim das contas, ele não deve estar bem……?"
90002150-105 = "S-sim…… não seria estranho se ele tivesse algum método para cair devagar……."
90002150-106 = "Ainda assim, o Sensei não possui um halo, sabe."
90002150-114 = "Rio? Alice e Kei também estão com você? Fico feliz que estejam bem."
90002150-115 = "Ué? Por que essas crianças também estão aqui……?"
90002150-119 = "E-er, bem, isso é……!"
90002150-120 = "Está tudo bem! Todas são amigas da Alice!"
90002150-121 = "Uau!?"
90002150-122 = "……."
90002150-123 = "Amigas da Alice……?#nAh, entendo."
90002150-124 = "……."
90002150-125 = "Olá. Ein, Soph e Owl, certo? Prazer em conhecê-las."
90002150-126 = "Será que isso está certo……."
90002150-127 = "Não há garantias. Mesmo assim, eu acredito na Alice. Você também, não é?"
90002150-128 = "Sim. Eu acredito na Alice."
90002150-133 = "……."
90002150-134 = "O-obrigada."
90002150-135 = "De nada!"
90002150-139 = "Alice!"
90002150-140 = "Alice-chan!"
90002150-145 = "Conseguimos nos reunir. Yuzu, você está bem?"
90002150-146 = "U-ugh…… ainda estou um pouco tonta……."
90002150-150 = "Espera…… Hyaaa!? Q-quem são essas crianças……!?"
90002150-155 = "Está tudo bem! Todas são amigas da Alice!"
90002150-158 = "Entendo. Então foi por isso."
90002150-159 = "……Não que eu deva dizer algo, mas vocês, têm certeza de que isso está bem?"
90002150-160 = "(É quase a mesma coisa que eu disse antes……)"
90002150-161 = "Mesmo que não esteja, de acordo com o que vocês disseram――"
90002150-162 = "Não significa que vocês poderiam nos subjugar a qualquer momento se quisessem?"
90002150-163 = "Bem, é verdade."
90002150-164 = "Pois é. Parece um zoológico com feras que tiveram as presas e garras arrancadas."
90002150-168 = "O que é um... zoológico……?"
90002150-169 = "É um lugar que existe!"
90002150-170 = "Alice sabe! Um zoológico é――"
90002150-171 = "Uwaaa! Pare! Não ensine coisas desnecessárias para a Ein agora!"
90002150-176 = "Já estão se dando bem……."
90002150-177 = "Fufu…… bem a cara da Alice."
90002150-183 = "P-por que você veio até aqui…… er…… ah, Ein, né……?"
90002150-187 = "S-sim…… E-então…… você gosta de…… máquinas……?"
90002150-192 = "Logo de cara foi falar com a Yuzu……."
90002150-193 = "Alice sabe! Isso é o que chamam de 'miseráveis se reconhecem'!"
90002150-194 = "Ah, entendi."
90002150-195 = "Outra expressão humana? Por favor, fale de um jeito que eu entenda."
90002150-196 = "Significa que a Ein e a Yuzu vão se tornar boas amigas."
90002150-197 = "Não é isso. O significado de 'miseráveis se reconhecem' é――"
90002150-198 = "Por favor, deixe como está por enquanto!"
90002150-202 = "T-tá bom, eu entendi..."
90002150-203 = "？？"
90002150-204 = "？？？"
90002150-206 = "De qualquer forma, o mais importante é que conseguimos nos reunir sem que ninguém faltasse."
90002150-207 = "E como três convidados inesperados se juntaram a nós, acho que poderemos agir sob perspectivas mais abrangentes."
90002150-208 = "Então..."
90002150-212 = "Falando nisso, onde está o Sensei?"
90002150-213 = "！？"
90002150-214 = "！？"
90002150-215 = "……！"
90002150-216 = "Ora, Eimi. Nem precisa perguntar. O Sensei está, é claro..."
90002150-220 = "……Sensei?"
90002150-221 = "……。"
90002150-222 = "Sensei！？！？！？"
90002150-223 = "D-desculpe! O Sensei...! #nAh, a Alice estava ao lado dele...! Se a Alice tivesse sido mais cuidadosa...!!"
90002150-224 = "O que aconteceu com o Sensei!?"
90002150-225 = "……Ele caiu do penhasco. Desde então, não temos nenhuma informação."
90002150-226 = "O quê！？！？！？"
90002150-231 = "V-você está bem...!?"
90002150-232 = "Rio, explique detalhadamente."
90002150-233 = "Isso é..."
90002150-234 = "……O Continente de Aço em si começou a mudar. #nEle entrou no processo de ascensão."
90002150-235 = "Isso... o que significa?"
90002150-236 = "Mesmo que seja algo natural para nós, para vocês é diferente, não é?"
90002150-237 = "A partir de agora, o Continente de Aço se transformará em um altar gigantesco, seguindo a vontade d'Ele."
90002150-238 = "Estava destinado a ser assim desde o início... esse era o propósito original de Netzach. #nSe pudesse, eu teria evitado..."
90002150-239 = "……。"
90002150-241 = "Vitória. Misericórdia. #nO olho da inteligência e a contemplação da fé."
90002150-242 = "――Ó Senhor dos Exércitos."
90002150-244 = "……！"
90002150-245 = "……！"
90002150-249 = "Desculpe interromper, mas olhem ali. #nAquele não é o Sensei?"
90002150-250 = "……Como?"
90002150-251 = "……？"
90002150-256 = "Hã！？！？"
90002150-260 = "[ns] \"O que é isso...?\""
90002150-261 = "Não temas."
90002150-262 = "Eu o guiarei ao meu altar. Lá, você ocupará o assento que foi preparado."
90002150-263 = "[s] \"Existe um lugar para mim...?\""
90002150-264 = "Sim. Você tem o direito."
90002150-265 = "Você possui o direito de observar tudo de cima e o dever de testemunhar todo renascimento."
90002150-269 = "Aquele que tem ouvidos, ouça. Não existe coincidência. O que existe é apenas a inevitabilidade que parece coincidência."
90002150-270 = "Tanto a sua chegada aqui――"
90002150-271 = "Quanto o fato de eu estar fazendo você se levantar."
90002150-273 = "Próximo episódio: Observação e Resultado"
