[translation]
1004802-1 = "独り立ち"
1004802-2 = "ブラックマーケット・路地"
1004802-4 = "（サオリからの気になる連絡を受けて、ブラックマーケットを訪れた）"
1004802-5 = "あぁ、先生。来たか。"
1004802-6 = "[s1] \"サオリ、大丈夫！？\"\n[s2] \"びっくりしたよ、サオリから急に「助けてほしい」なんて…….。\""
1004802-7 = "その、助けてほしいというか。 "
1004802-8 = "その、助けてほしいというか。 "
1004802-9 = "自分で解決しようと思ったのだが、難しかったというべきか……。"
1004802-10 = "[s] \"なるほど……それくらいすごい問題なんだね！\""
1004802-11 = "いや、というより……。"
1004802-12 = "[s3] \"どれだけ重大で深刻な問題でも構わない！\"\n[s4] \"サオリのためなら、この身が尽きるまで助けるよ！\""
1004802-13 = "そ、そうか……。"
1004802-14 = "そ、そうか……。"
1004802-18 = "とにかく、こっちへ。"
1004802-29 = "（サオリの案内に従って進んだ、その先には――）"
1004802-30 = "[s] \"ここは……ブラックマーケットの銀行？\""
1004802-34 = "いらっしゃいませ、お客さ―― "
1004802-38 = "……ふぅ。先ほども訪ねてきた、言葉が通じない正体不明のお客さんではないですか。"
1004802-39 = "[s] \"正体不明……？\""
1004802-40 = "何度も申し上げたでしょう、ダメなものはダメです！"
1004802-41 = "身元の保証が確認できない限りは、何ともできません！"
1004802-42 = "だから連れてきたんだ、私の身元を保証する者を。"
1004802-43 = "ど、どういうことですか……？"
1004802-47 = "もしかして……。"
1004802-48 = "そう。あんたが言っていた「保証人」だ。"
1004802-49 = "……なるほど。"
1004802-50 = "[ns] \"ブラックマーケットで、身元の保証……！？\""
1004802-52 = "[ns5] \"もしかしてこれは……巨大な金融犯罪に巻き込まれる展開！？\"\n[ns6] \"サオリ！信じてたのに！\""
1004802-55 = "先生……何を言っている？"
1004802-57 = "（今さらながら、事情を一部始終聞かせてもらった）"
1004802-60 = "[ns] \"口座開設……？\""
1004802-61 = "はい。そちらのお客様が口座の開設をしたいと当店を訪ねたのですが、学校のことすら教えてもらえず……。"
1004802-62 = "それでは何もできないではありませんか……？"
1004802-63 = "[s] \"それはその、複雑な事情があるというか……。\""
1004802-64 = "他の銀行でしたら、おそらく門前払いでしょう！"
1004802-65 = "私たちを誰だとお思いですか？"
1004802-66 = "正当な対価さえ頂ければ、#nどこよりも公正なサービスを提供するブラックマーケットです！"
1004802-67 = "あなたに信用がなくたって心配ご無用。"
1004802-68 = "丈夫な身体と一丁の銃をお持ちなのであれば……"
1004802-69 = "このブラックマーケットで、高収入とまではいかずとも#nそこそこの仕事ならいくらでも見つかりますから！"
1004802-70 = "[s] （リアクションに困る……）"
1004802-71 = "なので最低限、身元の保証をしてくれる方さえいえればそれで構いません。何があっても責任を負う犠牲……"
1004802-72 = "いえ、どなたかを連れて来ていただきさえすれば、口座は開設できると伝えたのです。"
1004802-73 = "[s] \"なるほど。嬉しいけど、かすかに気になる言葉が聞こえたかも。\""
1004802-75 = "……悪いな、先生。"
1004802-76 = "仲間たちとバラバラになった今、こんなことを頼めるのはお前しか……。"
1004802-77 = "[s] \"ところでサオリ、どうして口座が必要なの？\""
1004802-78 = "……最近、このブラックマーケットに流れ着いたんだ。"
1004802-79 = "この先もきっと、私の居場所はこういった裏通りくらいだろうから……。"
1004802-80 = "ここで生活していくためには、お金が必要だ。そして――"
1004802-81 = "私たちから何か依頼を仲介したとして、その報酬を受け取るには口座が必要と申し上げたのです。"
1004802-82 = "[s] \"なるほど、それで……。\""
1004802-83 = "……だがよく考えると、これは私の我儘だ。"
1004802-84 = "こんな勝手な理由で、お前を巻き込むわけにはいかない。"
1004802-85 = "やはりこの話はなかったことに……。"
1004802-86 = "[s] \"全然構わないよ？\""
1004802-87 = "……先生？"
1004802-88 = "[s] \"それに、サオリに頼ってもらえたのが嬉しい。\""
1004802-92 = "……そうか。"
1004802-94 = "[ns] \"さて、じゃあ手続きしようか。\""
1004802-97 = "それでは、簡単な審査を始めましょうか。"
1004802-98 = "[s] \"保証人さえいれば良いって話だったのでは……？\""
1004802-99 = "まあそういうこともあります。"
1004802-100 = "ただご心配なさらず。審査と言っても、手続きとほぼ同義です。これをやらないというわけにはいかないのですが……。"
1004802-101 = "私は構わない。"
1004802-102 = "[s] \"サオリがそう言うなら……。\""
1004802-103 = "はい、それでは……。"
1004802-104 = "これまでどういった作業の経験がありますでしょうか？"
1004802-105 = "これまでの……？"
1004802-106 = "[s] \"それ、どうしても必要な情報？\""
1004802-107 = "はい、それはもちろん。お客様のこれまでの経験や経歴をお聞かせいただかないと、口座を作った後に依頼の仲介もできませんから。"
1004802-108 = "何か問題でも？"
1004802-109 = "いや、問題無い。答えよう。"
1004802-114 = "詳しくは説明できないが……破壊や爆破、学園を倒壊させる計画をし、実行までした。"
1004802-116 = "……？"
1004802-117 = "それなりに規模が大きい組織を壊滅させるのは、かなり得意分野だ。"
1004802-118 = "……はい？"
1004802-119 = "[s] \"サオリ、言葉のチョイスが！！\""
1004802-120 = "……嘘ではないが？"
1004802-121 = "[s] \"それはそうだけど！\""
1004802-122 = "そ、"
1004802-123 = "それはユニークなご経験ですね……。"
1004802-127 = "ちなみに、今のご住所は……？"
1004802-128 = "住所……"
1004802-129 = "と呼べるものは無い。現在はブラックマーケットに滞在している。"
1004802-130 = "はい？"
1004802-131 = "正確に言うならば、廃ビルだったり地下道だったり、場所は逐次変えている。"
1004802-135 = "……あの。これは何か、最近流行っているユーモアなのでしょうか？"
1004802-136 = "[s] \"そういうことで何卒！\""
1004802-137 = "では、次に……"
1004802-139 = "（それからしばらくして……）"
1004802-142 = "……はい、質問は以上です。 "
1004802-143 = "[s] \"よ、ようやく……\""
1004802-145 = "そうか、"
1004802-146 = "ではこれで口座が――"
1004802-147 = "あ、"
1004802-148 = "実は最後に、"
1004802-150 = "最も重要な「実技テスト」があります。"
1004802-154 = "[ns] \"「簡単な手続き」だったはずでは！？\""
1004802-155 = "ははっ、そもそもここはブラックマーケットですよ？"
1004802-156 = "いくら何でも、無条件に口座を作れるはずないではありませんか。"
1004802-157 = "それに、このテストもお客様の今後のためなのです。"
1004802-158 = "実力が分かれば、それだけ信頼もできます。支払い能力に直結しますし、特典もありますから。"
1004802-159 = "[s] \"これがブラックマーケット……でも……\""
1004802-161 = "……ここまで助けてもらっておいて、引き下がれるわけがない。"
1004802-162 = "そのテスト、受けて立とう。"
1004802-163 = "良いでしょう！"
1004802-172 = "テストの内容は簡単です。"
1004802-173 = "私たちブラックマーケットガードを相手にどれだけ持ちこたえられるのか、見せてもらいましょうか！"
1004802-174 = "長く耐えられるほどランクが高くなりますので、頑張ってください！"
1004802-175 = "それでは、準備はよろしいですか？"
1004802-180 = "……。"
1004802-182 = "テスト、開始！"
1004802-183 = "……！"
1004802-201 = "[ns] \"流石……。\""
1004802-202 = "……え？"
1004802-207 = "これで良いのか？ "
1004802-208 = "な、何という力……！？"
1004802-209 = "っ……！や、やはり口座は開設できません！"
1004802-210 = "……何だと？"
1004802-211 = "どうしても口座を開設したいのなら……"
1004802-212 = "そう！"
1004802-217 = "この銀行の、専属警備員になっていただきましょうか！"
1004802-218 = "[s] \"どういうこと！？\""
1004802-224 = "ひ、ひぃっ！？"
1004802-226 = "……理解した。ここまで発言がコロコロ変わる様子からして……私たちを騙したな？"
1004802-227 = "時間の無駄だったが……"
1004802-228 = "まあ、教訓にするとしよう。ここで終わらせようか。"
1004802-229 = "す、すぐにお作りします！！それで許してください！！！！"
1004802-240 = "（口座開設を終え、銀行を後にした）"
1004802-241 = "[s] \"サオリ、お疲れ様。\""
1004802-242 = "いや、私は別に……"
1004802-243 = "むしろ、お前を余計なことに巻き込んでしまった。"
1004802-244 = "[s7] \"ううん、気にしないで。\"\n[s8] \"いやぁ、コロコロ発言が変わって参ったね……。\""
1004802-245 = "ブラックマーケットの悪名はどこでも耳にする。こういう場所だと話には聞いていたが……。"
1004802-246 = "ブラックマーケットの悪名はどこでも耳にする。こういう場所だと話には聞いていたが……。"
1004802-247 = "どうやら、本当のようだな。"
1004802-248 = "[s] \"世界には危ない場所が多いからね、だから……\""
1004802-249 = "……だから、何だ？"
1004802-250 = "[s] \"だから、これからも気をつけてね。\""
1004802-254 = "……。 "
1004802-255 = "……この借りは、必ず返す。"
1004802-256 = "覚えておくと良い。"
1004802-260 = "[ns] \"……できるだけ、良い方向に行くと良いけど。\""
