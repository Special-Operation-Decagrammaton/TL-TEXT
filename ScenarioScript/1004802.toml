[translation]
1004802-1 = "Independência"
1004802-2 = "Mercado Negro - Beco"
1004802-4 = "（Após receber uma mensagem preocupante de Saori, você visitou o Mercado Negro）"
1004802-5 = "Ah, Sensei. Você veio."
1004802-6 = "[s1] \"Saori, você está bem!?\"\n[s2] \"Fiquei assustado quando você me mandou uma mensagem do nada pedindo ajuda...\""
1004802-7 = "Bem, não é exatamente que eu precise de ajuda."
1004802-8 = "Bem, não é exatamente que eu precise de ajuda."
1004802-9 = "Eu tentei resolver sozinha, mas deveria dizer que foi difícil..."
1004802-10 = "[s] \"Entendo... então é um problema sério assim!\""
1004802-11 = "Não, na verdade..."
1004802-12 = "[s3] \"Não importa o quão grave ou sério seja o problema!\"\n[s4] \"Se for pela Saori, eu ajudarei até o fim!\""
1004802-13 = "E-entendo..."
1004802-14 = "E-entendo..."
1004802-18 = "De qualquer forma, venha por aqui."
1004802-29 = "（Você seguiu a orientação de Saori e, à frente, encontrou—）"
1004802-30 = "[s] \"Isto é... um banco no Mercado Negro?\""
1004802-34 = "Bem-vindo, cliente— "
1004802-38 = "...Humpf. Não é aquele cliente estranho que veio aqui mais cedo e com quem não conseguimos nos comunicar?"
1004802-39 = "[s] \"Cliente estranho...?\""
1004802-40 = "Eu já disse várias vezes, o que não pode, não pode!"
1004802-41 = "Enquanto a identidade não for confirmada, não podemos fazer nada!"
1004802-42 = "É por isso que eu trouxe alguém para garantir minha identidade."
1004802-43 = "O-o que você quer dizer com isso...?"
1004802-47 = "Será que..."
1004802-48 = "Isso. É o \"fiador\" de quem você falou."
1004802-49 = "...Entendo."
1004802-50 = "[ns] \"Garantir a identidade... no Mercado Negro!?\""
1004802-52 = "[ns5] \"Será que isso é... o começo de um grande crime financeiro!?\"\n[ns6] \"Saori! Eu confiava em você!\""
1004802-55 = "Sensei... do que você está falando?"
1004802-57 = "（Agora, você ouviu a história completa do que aconteceu）"
1004802-60 = "[ns] \"Abrir uma conta...?\""
1004802-61 = "Sim. Esta cliente veio até nossa loja querendo abrir uma conta, mas não quis nem nos dizer de qual escola ela é..."
1004802-62 = "Sem isso, não podemos fazer nada, não é...?"
1004802-63 = "[s] \"É que, sabe, existem circunstâncias complicadas...\""
1004802-64 = "Se fosse em outro banco, provavelmente você seria expulsa!"
1004802-65 = "Quem você acha que nós somos?"
1004802-66 = "Desde que recebamos o pagamento justo, somos o Mercado Negro que oferece o serviço mais imparcial de todos!"
1004802-67 = "Não se preocupe se você não tem crédito."
1004802-68 = "Se você tem um corpo resistente e uma arma..."
1004802-69 = "Neste Mercado Negro, mesmo que não seja uma renda alta, você sempre encontrará algum trabalho decente!"
1004802-70 = "[s] （Não sei como reagir a isso...）"
1004802-71 = "Portanto, o mínimo necessário é alguém que garanta sua identidade. Alguém que assuma a responsabilidade caso algo aconteça..."
1004802-72 = "Não, eu apenas disse que se você trouxesse alguém, a conta poderia ser aberta."
1004802-73 = "[s] \"Entendo. Fico feliz, mas acho que ouvi algumas palavras preocupantes ali.\""
1004802-75 = "...Desculpe, Sensei."
1004802-76 = "Agora que me separei dos meus companheiros, você é o único a quem posso pedir isso..."
1004802-77 = "[s] \"A propósito, Saori, por que você precisa de uma conta?\""
1004802-78 = "...Recentemente, acabei vindo parar neste Mercado Negro."
1004802-79 = "Provavelmente, meu lugar daqui para frente será em becos como este..."
1004802-80 = "Para viver aqui, preciso de dinheiro. E então—"
1004802-81 = "Eu disse que, para receber a remuneração de qualquer trabalho que intermediarmos, é necessário ter uma conta bancária."
1004802-82 = "[s] \"Entendo, então é por isso...\""
1004802-83 = "……Mas, pensando bem, isso é um capricho meu."
1004802-84 = "Não posso te envolver nisso por um motivo tão egoísta."
1004802-85 = "Acho melhor esquecermos esse assunto……."
1004802-86 = "[s] \"Não tem problema nenhum, sabia?\""
1004802-87 = "……Sensei?"
1004802-88 = "[s] \"Além disso, fico feliz que a Saori tenha confiado em mim.\""
1004802-92 = "……Entendo."
1004802-94 = "[ns] \"Bem, então vamos prosseguir com os trâmites.\""
1004802-97 = "Muito bem, vamos começar com uma breve avaliação."
1004802-98 = "[s] \"Não era só precisar de um fiador...?\""
1004802-99 = "Bem, às vezes acontece."
1004802-100 = "Mas não se preocupe. Embora eu chame de avaliação, é praticamente o mesmo que o procedimento padrão. Não tem como pular essa parte, infelizmente……."
1004802-101 = "Eu não me importo."
1004802-102 = "[s] \"Se a Saori diz isso…….\""
1004802-103 = "Certo, então……."
1004802-104 = "Que tipo de experiência de trabalho você possui até agora?"
1004802-105 = "Experiência……?"
1004802-106 = "[s] \"Isso é realmente uma informação necessária?\""
1004802-107 = "Sim, com certeza. Se não soubermos sobre a sua experiência e histórico, não poderemos intermediar trabalhos para você após a criação da conta."
1004802-108 = "Algum problema?"
1004802-109 = "Não, sem problemas. Eu responderei."
1004802-114 = "Não posso explicar em detalhes, mas…… planejei e executei destruições, explosões e até a queda de academias."
1004802-116 = "……?"
1004802-117 = "Destruir organizações de grande porte é uma das minhas especialidades."
1004802-118 = "……Como é?"
1004802-119 = "[s] \"Saori, cuidado com a escolha das palavras!!\""
1004802-120 = "……Não é mentira, é?"
1004802-121 = "[s] \"Isso é verdade, mas!\""
1004802-122 = "E-,"
1004802-123 = "Essa é uma experiência bastante única……."
1004802-127 = "A propósito, qual é o seu endereço atual……?"
1004802-128 = "Endereço……"
1004802-129 = "Não tenho nada que possa ser chamado assim. Atualmente, estou hospedada no Mercado Negro."
1004802-130 = "Como é?"
1004802-131 = "Para ser exata, mudo de lugar constantemente, seja em prédios abandonados ou passagens subterrâneas."
1004802-135 = "……Com licença. Isso é algum tipo de humor que está na moda ultimamente?"
1004802-136 = "[s] \"É por aí mesmo, por favor!\""
1004802-137 = "Bem, então, a seguir……"
1004802-139 = "(Algum tempo depois……)"
1004802-142 = "……Certo, as perguntas terminam aqui."
1004802-143 = "[s] \"Fi-finalmente……\""
1004802-145 = "Entendo,"
1004802-146 = "Então, com isso, a conta está――"
1004802-147 = "Ah,"
1004802-148 = "Na verdade, por último,"
1004802-150 = "temos o mais importante: o \"teste prático\"."
1004802-154 = "[ns] \"Não era para ser um 'procedimento simples'!?\""
1004802-155 = "Haha, afinal, estamos no Mercado Negro, não é?"
1004802-156 = "Por mais que queira, não tem como abrir uma conta sem condições, não é?"
1004802-157 = "Além disso, este teste também é para o seu próprio bem, cliente."
1004802-158 = "Se soubermos sua capacidade, poderemos confiar mais em você. Isso está diretamente ligado à sua capacidade de pagamento e também há benefícios."
1004802-159 = "[s] \"Isto é o Mercado Negro... mas...\""
1004802-161 = "……Depois de ter recebido tanta ajuda, não tem como eu recuar agora."
1004802-162 = "Eu aceito esse teste."
1004802-163 = "Muito bem!"
1004802-172 = "O conteúdo do teste é simples."
1004802-173 = "Vamos ver quanto tempo você consegue aguentar contra nós, os guardas do Mercado Negro!"
1004802-174 = "Quanto mais tempo você resistir, maior será sua classificação, então dê o seu melhor!"
1004802-175 = "Então, está pronto?"
1004802-180 = "……."
1004802-182 = "Teste, começar!"
1004802-183 = "……!"
1004802-201 = "[ns] \"Como esperado...\""
1004802-202 = "……Hã?"
1004802-207 = "Isso é o suficiente?"
1004802-208 = "Q-que tipo de força é essa……!?"
1004802-209 = "Ah……! M-mesmo assim, não posso abrir a conta!"
1004802-210 = "……O que você disse?"
1004802-211 = "Se você quer tanto abrir uma conta……"
1004802-212 = "Isso!"
1004802-217 = "Que tal se tornar um segurança exclusivo deste banco!"
1004802-218 = "[s] \"O que isso significa!?\""
1004802-224 = "I-iiih!?"
1004802-226 = "……Entendi. Vendo como suas palavras mudam a todo momento…… você nos enganou, não foi?"
1004802-227 = "Foi uma perda de tempo, mas……"
1004802-228 = "Bem, vamos considerar isso uma lição. Vamos acabar com isso aqui."
1004802-229 = "E-eu vou fazer agora mesmo!! Por favor, me perdoe!!!!"
1004802-240 = "(Terminou de abrir a conta e saiu do banco)"
1004802-241 = "[s] \"Saori, bom trabalho.\""
1004802-242 = "Não, eu não fiz nada de especial……"
1004802-243 = "Pelo contrário, acabei te envolvendo em problemas desnecessários."
1004802-244 = "[s7] \"Não, não se preocupe com isso.\"\n[s8] \"Nossa, foi difícil acompanhar tantas mudanças de opinião...\""
1004802-245 = "A má fama do Mercado Negro é ouvida em toda parte. Eu já tinha ouvido falar que era um lugar assim, mas……"
1004802-246 = "A má fama do Mercado Negro é ouvida em toda parte. Eu já tinha ouvido falar que era um lugar assim, mas……"
1004802-247 = "Pelo visto, é verdade."
1004802-248 = "[s] \"Existem muitos lugares perigosos no mundo, por isso……\""
1004802-249 = "……Por isso, o quê?"
1004802-250 = "[s] \"Por isso, continue se cuidando.\""
1004802-254 = "……."
1004802-255 = "……Eu vou retribuir esse favor."
1004802-256 = "É bom que se lembre disso."
1004802-260 = "[ns] \"……Espero que as coisas sigam para um caminho melhor, na medida do possível.\""
