[translation]
90002130-1 = "Episódio 13; Crianças"
90002130-5 = "[ns] \"Ela foi para algum lugar...\""
90002130-6 = "Malkuth..."
90002130-7 = "...Você está preocupado?"
90002130-8 = "..."
90002130-10 = "Viver não é nada além de sofrimento. Não desvie o olhar desse fato."
90002130-11 = "Nós não nascemos por vontade própria; fomos apenas lançados neste mundo sem saber de nada."
90002130-13 = "A vida em si é cheia de contradições e absurdos, e é por isso que sofremos dores irracionais."
90002130-14 = "Nós apenas tentamos romper esse ciclo."
90002130-16 = "Ain, Soph, Aur. Pensem mais uma vez."
90002130-17 = "Qual é o nosso propósito, a razão pela qual estamos aqui."
90002130-19 = "Sniff... ugh..."
90002130-20 = "Essa voz é...?"
90002130-21 = "Um choro...? Será que é a Momoi ou a Midori...?"
90002130-22 = "Ugh... ughhh..."
90002130-26 = "[ns] \"Vamos lá.\""
90002130-27 = "Deveríamos ser mais cautelosos. Pode ser uma armadilha...!"
90002130-28 = "Ele não está ouvindo. Ele já foi. #nFrancamente, aquele homem... Alice, vamos atrás dele!"
90002130-29 = "Sim! Alice protegerá o Sensei!"
90002130-32 = "(Não foi fácil encontrar a dona do choro)"
90002130-33 = "(Paredes surgiam por toda parte, bloqueando o caminho)"
90002130-34 = "(Mas, sem desistir, eles continuaram avançando e, finalmente...)"
90002130-37 = "A voz está perto. Estamos quase lá."
90002130-38 = "Provavelmente está do outro lado desta parede. Vamos dar a volta."
90002130-39 = "[ns] \"...Hã?\""
90002130-43 = "Ah, hã...?"
90002130-44 = "Por que vocês estão aqui...!"
90002130-45 = "..."
90002130-52 = "(Soph atacou)"
90002130-53 = "Sua... sua...!"
90002130-54 = "Se não fossem vocês... se vocês não estivessem aqui!"
90002130-55 = "Se vocês não tivessem vindo aqui--!!"
90002130-56 = "Sensei!"
90002130-57 = "Sensei!? #n...Ué?"
90002130-65 = "(Soph começou a socar descontroladamente)"
90002130-66 = "(No entanto, suas mãos pequenas eram fracas demais)"
90002130-67 = "(...Parecia uma garotinha inexperiente desferindo socos)"
90002130-68 = "Se eu fizesse isso! Se eu fizesse aquilo! A irmã mais velha...!"
90002130-69 = "Por favor, pare!"
90002130-74 = "Por favor... pare de fazer isso..."
90002130-75 = "Por que você está me impedindo...?"
90002130-79 = "...Não importa o que você faça agora, nada vai mudar. #nVocê sabe disso, não sabe?"
90002130-80 = "..."
90002130-86 = "Ugh... ugh... uaaaaaah..."
90002130-87 = "..."
90002130-89 = "A irmã mais velha... morreu."
90002130-90 = "Nós... nós a matamos."
90002130-91 = "Nó... nós..."
90002130-92 = "Com estas mãos-- nós a matamos!!!!"
90002130-93 = "Esfaqueamos! Destruímos! A personalidade e os dados! #nTudo! Destruímos tudo!!"
90002130-98 = "Tudo isso é uma maldição. Tudo o que podemos pensar, tudo o que podemos sentir. #nE muito menos... o fato de nos apaixonarmos por alguém."
90002130-99 = "Teria sido melhor se sentimentos não existissem desde o início."
90002130-104 = "O poder de ver, ouvir e falar... não serve para absolutamente nada."
90002130-105 = "Se ao menos não pudéssemos fazer nada..."
90002130-106 = "Não teríamos nos machucado."
90002130-108 = "Por que será que nós... viemos ao mundo?"
90002130-111 = "E-então... você precisa de algo...? #nO-o que nós poderíamos fazer agora, depois de tudo..."
90002130-112 = "[s] \"…….\""
90002130-113 = "Você sabia?"
90002130-114 = "Nós não temos um halo."
90002130-115 = "Ou seja, mistério, sublimidade, milagres, segredos... nada disso nos foi concedido desde o princípio."
90002130-116 = "Apesar disso, ainda somos capazes de sentir, pensar... e tomar nossas próprias decisões."
90002130-120 = "...É frustrante."
90002130-121 = "Talvez, se tivéssemos nos entregado ao medo, o resultado teria sido outro."
90002130-122 = "M-mas... nós conseguimos... suportar de alguma forma."
90002130-123 = "Mesmo sem receber nada... mesmo sem ter nada..."
90002130-124 = "Desde que a Irmã estivesse conosco..."
90002130-126 = "Se pudéssemos estar com a Irmã..."
90002130-127 = "Mesmo que nós não tivéssemos... a Irmã possuía um halo, então..."
90002130-129 = "Por isso, se vocês não tivessem aparecido...!"
90002130-130 = "A Irmã não precisaria ter morrido..."
90002130-131 = "Poderíamos ter vivido em paz para sempre!"
90002130-136 = "...Façam o que quiserem conosco. Já não importa mais."
90002130-137 = "Fizemos tudo o que podíamos e chegamos a este fim."
90002130-138 = "Essa era a história. É só isso."
90002130-143 = "O objetivo de vocês era tornar Decagrammaton um deus, não era?"
90002130-144 = "E... o fato de Malkuth ter sido sacrificada por isso significa que..."
90002130-145 = "Será que... Decagrammaton está no corpo de \"Malkuth\"...!?"
90002130-146 = "……."
90002130-147 = "...Mesmo assim, nós não queríamos perder a Irmã."
90002130-148 = "Usar o corpo da Irmã como receptáculo para Ele ascender ao trono divino. #nIsso era apenas um dos muitos planos que existiam."
90002130-149 = "Por isso, tentamos realizar isso através de outro plano."
90002130-151 = "Q-quando Ele passou por todas as Sephirot... e percorreu todos os caminhos corretamente... #nE finalmente tentou se tornar um deus... Foi aí que o plano começou..."
90002130-152 = "Nós sugerimos isso. #nQue cobriríamos Kivotos com o Continente de Aço."
90002130-153 = "Pois, dessa forma, Ele também teria conseguido se tornar um deus."
90002130-155 = "[ns] \"E quanto aos habitantes de Kivotos?\""
90002130-156 = "...N-não é como se os habitantes fossem convertidos em Continente de Aço..."
90002130-157 = "Eles só precisariam se adaptar e viver no Continente de Aço."
90002130-158 = "Nossa missão era torná-Lo um deus, de acordo com o desejo d'Ele. #nOs meios não foram determinados."
90002130-159 = "Portanto, se o nosso plano tivesse dado certo... #nA Irmã não teria precisado ser sacrificada..."
90002130-160 = "[s3] \"Então vocês, para manter Malkuth viva...\"\n[s4] \"tentaram transformar Kivotos no Continente de Aço?\""
90002130-166 = "...Sim."
90002130-167 = "E-era mesmo necessário chegar a esse ponto...?"
90002130-168 = "Necessário...? #nVocê está perguntando... se era necessário...?"
90002130-169 = "E se você soubesse que o Sensei ia morrer!? Vocês não fariam nada!?"
90002130-170 = "!!!"
90002130-171 = "...!"
90002130-172 = "...Viu só? Todo mundo tem algo insubstituível."
90002130-173 = "Não é óbvio... que não mediríamos esforços para proteger isso?"
90002130-178 = "...Entendo o seu ponto de vista. Mas ainda não consigo aceitar."
90002130-179 = "Vocês acordaram antes da 'Irmã Mais Velha', não foi?"
90002130-180 = "Então, isso significa que... bem..."
90002130-181 = "Ah, céus. Como devo dizer isso...?#nConsegue entender o que quero dizer?"
90002130-182 = "I-Isso é..."
90002130-183 = "...É sobre como podemos valorizar tanto uma Irmã Mais Velha que nunca conhecemos ou com quem nunca conversamos, não é?"
90002130-184 = "É simples.#n...Embora seja algo que só se aplica a nós."
90002130-185 = "Fomos apenas criadas para amar."
90002130-186 = "[s] \"……！\""
90002130-187 = "I-Isso é..."
90002130-188 = "Nós fomos criadas. Não nascemos."
90002130-189 = "...Agimos exatamente como fomos programadas.#nDiferente de vocês, nossa personalidade e caráter não são formados através de experiências."
90002130-190 = "N-Nós fomos configuradas para... então..."
90002130-191 = "Não cheguei a perguntar o motivo, mas consigo imaginar."
90002130-195 = "Provavelmente porque era a forma mais racional e eficiente."
90002130-196 = "Racional e eficiente..."
90002130-197 = "Você entende, não entende?#nPara preservar o alvo em um estado perfeito—"
90002130-198 = "A maneira mais rápida de protegê-lo é programar uma obsessão pelo alvo."
90002130-199 = "Esta é uma história sobre isso."
90002130-200 = "A Irmã Mais Velha era o sacrifício, e nós éramos os palhaços.#nUma história patética, preparada desde o início."
90002130-201 = "Bem, talvez o fato de a obsessão ter sido configurada de forma tão forte tenha sido um pequeno imprevisto."
90002130-202 = "Afinal, o Continente de Aço não era necessário no roteiro original."
90002130-203 = "P-Por favor, não diga isso..."
90002130-204 = "Uma história dessas é triste demais... acho que é estranho..."
90002130-205 = "Estranho? Do ponto de vista de vocês, não é tudo estranho?"
90002130-206 = "Amar a Irmã Mais Velha? Gostar de alguém?"
90002130-207 = "E o que é um deus, afinal? Não tem como fazer nada a respeito disso, tem?"
90002130-208 = "...Mas não tínhamos escolha a não ser fazer."
90002130-209 = "Porque não havia mais nada que pudéssemos fazer desde o início!"
90002130-215 = "...Por isso, seria melhor se—"
90002130-216 = "Se não tivéssemos nascido."
90002130-217 = "Não teríamos que passar por tanto sofrimento..."
90002130-220 = "[ns] (Aproxima-se das três)"
90002130-223 = "O-O que...!?"
90002130-225 = "[ns] (Abaixa-se para ficar na altura dos olhos das três)"
90002130-230 = "Hã...?"
90002130-232 = "[ns] \"Vocês se esforçaram muito.\""
90002130-233 = "Ah... ahhh!?"
90002130-234 = "Sensei?"
90002130-235 = "(Ah... essa pessoa...)"
90002130-240 = "[ns] \"Vocês realmente se esforçaram muito.\""
90002130-241 = "S-Sim!?"
90002130-242 = "V-Você é idiota ou o quê!?#nKivotos poderia ter se transformado inteiramente no Continente de Aço, sabia!?"
90002130-243 = "...Sim?"
90002130-244 = "B-Bem, é verdade... nós nos esforçamos para que ninguém morresse, mas..."
90002130-245 = "Isso é... sim..."
90002130-246 = "N-Não brinque comigo! Nós não nos importávamos com vocês!#nE, aliás... por que você..."
90002130-247 = "É verdade. Por que o Sensei diria algo assim?#nPara você, nós somos..."
90002130-248 = "D-Deveríamos desaparecer... não somos 'inimigas'?"
90002130-249 = "[s] \"Mesmo assim, eu quero que vocês vivam.\""
90002130-253 = "[ns] \"Não importa o que tenha acontecido.\""
90002130-256 = "[ns] \"No fim, eu quero que vocês também sejam felizes.\""
90002130-258 = "E-e que sentido isso tem...?"
90002130-259 = "A minha irmã... não está mais aqui."
90002130-260 = "Ela não está em lugar nenhum."
90002130-261 = "Em um mundo sem a minha irmã, que motivo haveria para viver...?"
90002130-267 = "Ei, ei! Não faça carinho na minha cabeça!"
90002130-268 = "Mesmo que faça isso, nós...!"
90002130-269 = "[s] \"Este mundo é injusto, não é?\""
90002130-270 = "......!"
90002130-271 = "[ns5] \"Onde ninguém sofra.\"\n[ns6] \"Onde ninguém se machuque.\""
90002130-274 = "[ns7] \"Se existisse um mundo onde viver não fosse doloroso.\"\n[ns8] \"Seria... tão bom, não seria?\""
90002130-277 = "Por que..."
90002130-278 = "Por que você diz uma coisa dessas...?"
90002130-279 = "É simples."
90002130-280 = "Essa pessoa é... exatamente assim."
90002130-281 = "......?"
90002130-282 = "......"
90002130-283 = "......!"
90002130-288 = "O Sensei é sempre assim."
90002130-290 = "Próximo episódio: O que nos foi dado ao nascer"
