[translation]
10034090-1 = "後日談その1;椎名ツムギ"
10034090-5 = "[ns1] \"着いたね。\"\n[ns2] \"ここで合ってるかな。\""
10034090-8 = "うん、教えてくれた住所で間違いなさそう。"
10034090-10 = "学園じゃないのね……。"
10034090-11 = "当然ながら、私たちみたいに屋上でもない、と。"
10034090-12 = "思っていたよりも、本格的な雰囲気……。"
10034090-18 = "ていうか、このまま入って良いの？#nチケットとかは？#nせめて挨拶するとか……。"
10034090-19 = "まあ、確かに挨拶くらい行きたいところだけど。"
10034090-20 = "本番前は忙しくなるって、本人も言ってたし。"
10034090-21 = "じゃあ、演奏が終わったら連絡入れておけば良さそうね。"
10034090-27 = "部を代表して、アイリに連絡してもらおう。"
10034090-28 = "だ、だから、部長はやらないって……。"
10034090-29 = "ノンノン、部長と代表は別だよ。#n……はっ、もしかして能ある鷹は爪を隠すと？"
10034090-30 = "それもまたロック……。"
10034090-31 = "うぅ、違うんだってばぁ……。"
10034090-33 = "みんな、そろそろ始まるわよ。#n先生もツムギって人のこと、知ってるのよね？"
10034090-34 = "[s] \"うん、少しだけナツに近い雰囲気かも。\""
10034090-35 = "ほぉ……？"
10034090-36 = "えぇ、なんか不安になってきたんだけど……。"
10034090-37 = "それは、またどういう……。"
10034090-38 = "と、とりあえず入ろう……！"
10034090-52 = "キェェェェェ！人間の死が社会の福祉だぁぁぁぁぁぁ！！！"
10034090-53 = "ウォェェェェェェェェェェェェッ！！！！"
10034090-57 = "死ね！死ね！全部死んじまええぇぇぇ！！！"
10034090-58 = "わあああああぁぁぁぁぁぁ！！！"
10034090-63 = "…………。"
10034090-64 = "…………。"
10034090-65 = "…………。"
10034090-66 = "…………。"
10034090-70 = "「ナツみたいな印象」……だっけ？"
10034090-71 = "[s3] \"あ、いや……えっと、その……。\"\n[s4] \"私が見た時とは別人のような……。\""
10034090-77 = "少し、自分の行ないを振り返ろっかな……。"
