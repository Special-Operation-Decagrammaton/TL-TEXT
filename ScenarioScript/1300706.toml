[translation]
1300706-1 = "胃の鍛錬"
1300706-2 = "ゲヘナ学園・教室"
1300706-6 = "まだ足りない……。"
1300706-7 = "もっと、もっと努力しないと……！"
1300706-8 = "[s] \"何かあったの？\""
1300706-9 = "あ、先生。"
1300706-10 = "ううん、食べ物にはなんの問題もなかったの。#nケーキは美味しかったし、種類も多かったし……。"
1300706-11 = "問題は……私が他の部員に比べてたくさん食べられなかったこと！"
1300706-12 = "私はたった3皿目でお腹がいっぱいになっちゃったのに、アカリはケーキだけで何十皿食べてたの！"
1300706-13 = "みんな同じお金を払ってバイキングに行ったのに、食べる量にここまで差が出るなんて……結果的に私は損じゃない！？"
1300706-14 = "[s] \"一番損してるのはそのお店の方じゃないかな……。\""
1300706-15 = "とにかく！これは不公平！私も先輩たちみたいにたくさん食べたい！"
1300706-16 = "何かいい方法ないかな、先生？"
1300706-17 = "[s] \"普段から胃を鍛えておくとか！\""
1300706-18 = "胃を鍛える？#nふーん……たしかに、胃腸は食べ物の量によっていくらでも広がるって言うわよね……。"
1300706-19 = "普段からたくさん食べてれば、胃も広がって先輩たちみたいに大食いできるかも！"
1300706-20 = "でも、どんな食べ物で胃を鍛えたらいいんだろ？"
1300706-21 = "うーん……そうだ、味付きの乾燥昆布とかいいかも！"
1300706-22 = "昆布だったら、噛めば噛むほど味が出てすぐ飽きなさそうだし、カロリーも低いから太る心配もないよね？"
1300706-23 = "じゃあ、軽く試しに食べてみよっかな……。"
1300706-25 = "……うう……。"
1300706-26 = "お腹いっぱいになるまで食べたんだけど、気持ち悪い……。#nなんかお腹の中で膨らんでる……。"
1300706-27 = "ううっ、先生、これ以上は……。"
1300706-30 = "おえええええっ！"
1300706-32 = "それから、ジュンコが昆布を全部吐き出すまで背中をさすったり叩いたりしてあげた。"
