[translation]
1300706-1 = "Treinamento estomacal"
1300706-2 = "Academia Gehenna - Sala de aula"
1300706-6 = "Ainda não é o suficiente..."
1300706-7 = "Preciso me esforçar mais, muito mais...!"
1300706-8 = "[s] \"Aconteceu alguma coisa?\""
1300706-9 = "Ah, Sensei."
1300706-10 = "Não, não teve problema nenhum com a comida. #nO bolo estava delicioso e tinha muita variedade..."
1300706-11 = "O problema é que... eu não consegui comer tanto quanto as outras integrantes do clube!"
1300706-12 = "Eu já estava cheia no terceiro prato, mas a Akari comeu dezenas de pratos só de bolo!"
1300706-13 = "Todas pagamos o mesmo valor pelo buffet, então ter uma diferença tão grande na quantidade que comemos... no fim das contas, eu não saí perdendo!?"
1300706-14 = "[s] \"Acho que quem saiu perdendo de verdade foi o dono do restaurante...\""
1300706-15 = "De qualquer forma! Isso é injusto! Eu também quero comer tanto quanto as veteranas!"
1300706-16 = "Você tem alguma ideia, Sensei?"
1300706-17 = "[s] \"Que tal treinar o estômago no dia a dia?\""
1300706-18 = "Treinar o estômago? #nHmm... é verdade, dizem que o estômago pode se expandir dependendo da quantidade de comida..."
1300706-19 = "Se eu comer bastante sempre, meu estômago pode se expandir e eu vou conseguir comer tanto quanto as veteranas!"
1300706-20 = "Mas, que tipo de comida seria boa para treinar o estômago?"
1300706-21 = "Hmm... já sei, talvez alga seca temperada seja uma boa!"
1300706-22 = "Se for alga, quanto mais você mastiga, mais sabor tem, então não enjoa fácil, e como tem poucas calorias, não preciso me preocupar em engordar, né?"
1300706-23 = "Então, vou tentar comer um pouco para testar..."
1300706-25 = "...Ugh..."
1300706-26 = "Comi até ficar cheia, mas estou me sentindo mal... #nSinto como se estivesse expandindo dentro da minha barriga..."
1300706-27 = "Ugh, Sensei, não aguento mais..."
1300706-30 = "Bleeegh!"
1300706-32 = "Depois disso, fiquei acariciando e dando tapinhas nas costas da Junko até ela colocar toda a alga para fora."
