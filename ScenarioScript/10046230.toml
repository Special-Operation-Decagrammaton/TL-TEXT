[translation]
10046230-3 = "せ、先輩！"
10046230-4 = "あれ、コハル？何か用っすか？"
10046230-5 = "手伝いに来ました！私も正義実現委員会の一員なので！"
10046230-6 = "うーん……でも、今の所属は……。"
10046230-10 = "……。"
10046230-11 = "ま、頼んじゃいますか。"
10046230-12 = "ほ、本当ですか！？"
10046230-13 = "もちろんっす。#nコハルみたいな優秀な後輩がいてくれたら、私も心強いっすから。"
10046230-14 = "イチカ先輩と、初めての合同作戦……！"
10046230-15 = "わ、私、頑張ります！"
10046230-16 = "頼りにしてるっすよ！"
10046230-21 = "や、やった！"
10046230-22 = "頑張って活躍して、正義実現委員会に復帰してやるんだから！"
10046230-28 = "……。"
10046230-29 = "補習授業部にいるのは成績のせいっすよね……？#nそれとこれとは関係ないんじゃ……。"
10046230-30 = "まあ、無粋なことは言いっこなしで。"
