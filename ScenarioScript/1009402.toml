[translation]
1009402-1 = "メイドな気分！"
1009402-2 = "（勢いの良いモモイの言葉を受け……）"
1009402-3 = "（漠然とした不安を抱えつつ、急いでシャーレに向かった）"
1009402-8 = "[ns] \"モモイ？いるかな……？\""
1009402-12 = "[wa:420]― [log=모모이 메이드]うへへ……[wa:2420]お菓子、[wa:1490]美味しい……。[/log]"
1009402-13 = "[wa:3020]― [log=모모이 메이드]日差しが温かくて……[wa:3080]ソファもふわふわ……。[/log]"
1009402-16 = "[ns] \"モモイさん？メイドは？お掃除は？\""
1009402-17 = "[wa:630]― [log=모모이 메이드]うぅん……[wa:1590]おそうじ……？[/log]"
1009402-18 = "[wa:2790]― [log=모모이 메이드]するから……[wa:2330]これだけ食べて……[wa:2370]ちょっと[wa:670]休んでから……。[/log]"
1009402-21 = "[wa:1420]― [log=모모이 메이드]あれ？[wa:1430]先生？[/log]"
1009402-22 = "[wa:3340]― [log=모모이 메이드]そっか。[wa:1580]これ、[wa:720]まだ夢なんだね。[/log]"
1009402-25 = "[wa:670]― [log=모모이 메이드]夢の中でも先生に会えるなんて……[wa:4220]いい夢だねぇ……。[/log]"
1009402-26 = "[wa:3160]― [log=모모이 메이드]今日はなんだか、[wa:1960]楽しいことがあるかも……[wa:2560]うへへ……。[/log]"
1009402-29 = "[wa:670]― [log=모모이 메이드]むにゃむにゃ……[wa:3070]あ、[wa:1180]ボーナスライフだ……。[/log]"
1009402-32 = "[ns] \"まったく……。\""
1009402-33 = "（モモイの肩を揺すってみても起きず……）"
1009402-34 = "（いたずらごころも相まって、軽くデコピンをしてみた）"
1009402-40 = "んうわっ！？"
1009402-41 = "何すんのさぁ！"
1009402-45 = "ってあれ、先生……？"
1009402-46 = "[ns] \"モモイ、掃除はしてくれたの？\""
1009402-47 = "こ、これは、その……だ、だから！"
1009402-48 = "し、仕方なかったの！#n誰だって同じ状況になったら、きっと……っ！"
1009402-54 = "とにかく聞いて！このソファの周りを整理しようと思ったの！"
1009402-55 = "でも、動いてたらお腹が空いてきて……。#n掃除をするにも、まずは腹ごしらえをしないとでしょ？"
1009402-56 = "そしたらそこに、ちょうどお菓子があるじゃん！"
1009402-57 = "ちょっと食べて掃除しようと思ったんだけど……#n食べ終わったら今度は、眠くなってきて……。"
1009402-58 = "そんな時、目の前に柔らかそうなソファがあったらさっ！"
1009402-59 = "誰だって、少し横になりたくなっちゃうよね？"
1009402-60 = "[ns] \"ふむふむ、それで？\""
1009402-61 = "だ、だから、えっと……。"
1009402-65 = "ちょっと横になるだけのつもりだったんだよ？#nでも、このソファがあまりにふかふかだったからっ！"
1009402-66 = "だから悪いのは私じゃなくて、このソファ！#nそれに、先生もだよ！"
1009402-67 = "[s] \"え？私も……？\""
1009402-68 = "生徒が来るところに、こんなふかふかのソファを置くなんて！"
1009402-69 = "寝心地の良いソファは誰にとっても、あったかいベッドと同じぐらい#n危険な罠なんだよ？"
1009402-70 = "朝、ベッドからなかなか起き上がれないのも、このふかふかに潜む#n恐ろしい魔物のせいなんだから！"
1009402-71 = "だ、だから……これは事故だったの！#nなんだっけ、不可能力……？ってやつ！"
1009402-72 = "[s] \"「不可抗力」かな……？\""
1009402-73 = "と、とにかく……っ！"
1009402-75 = "（モモイの熱心な説明は、その後も続いた……）"
1009402-77 = "[ns] \"……で、今に至ると。\""
1009402-78 = "うん……。"
1009402-79 = "ごめんね、先生……。"
1009402-80 = "[s1] \"それじゃあ本来の目的に戻って。\"\n[s2] \"今から、一緒にお掃除しようか。\""
1009402-83 = "ええっ！？掃除！？"
1009402-84 = "そもそも掃除のためにシャーレに来たっていうのは……#nそ、それはまあ、そうだけどっ！"
1009402-85 = "で、でもさ、ほら……先生が普段からちゃんと綺麗にしてたら……。#n私が掃除をするまでもなかったわけじゃん？"
1009402-86 = "それはさすがに本末転倒だって？だ、だって、面倒なんだもん！"
1009402-87 = "[s3] \"掃除は始めるまでが一番大変だけど。\"\n[s4] \"手を動かせば、すぐ終わるはず！\""
1009402-90 = "な、なるほど？さすが先生！それはそうかも！"
1009402-97 = "だから、逃げずに箒を持て、って……？うぅ――"
1009402-100 = "わ、わかったよ！やればいいんでしょ！#nうぅぅ、メイドの気分ってこういう感じだったの！？"
1009402-102 = "（覚悟を決めたモモイと「シャーレのお掃除大作戦」を決行した……）"
1009402-118 = "ふぅ～終わったあ！"
1009402-119 = "いやぁ～さすが私！やればできる子！"
1009402-120 = "あ、先生もお疲れさま！#nふっふっふ、でもっ！本番はここからだよ！"
1009402-121 = "[s] \"また不安になってきた！\""
1009402-122 = "ふふふ……鋭くなったね、先生。"
1009402-123 = "考えてみてよ！#nメイドってさ、普通は雇われて仕事をするもんでしょ？"
1009402-124 = "ご主人様に雇われて家事をして、報酬をもらう仕事じゃん？"
1009402-125 = "[s] \"そう、だよね……？\""
1009402-126 = "だから先生はご主人様として、メイドに報酬を支払わないと！"
1009402-127 = "[s] \"私も一緒に掃除したのに！？\""
1009402-128 = "ダメダメ！そもそも掃除なんて自分でやるのが普通だから！"
1009402-129 = "[s] \"それは、その通りだけど……！\""
1009402-130 = "とにかく！先生はメイドに報酬を支払う義務があるっ！"
1009402-131 = "別にね、お金が欲しいなんて野暮なことは言わないよ？"
1009402-132 = "私が先生にして欲しいこと……それは……！"
1009402-136 = "一日中、一緒に遊んでくれること！"
1009402-137 = "何で遊べばいいかわからないって？#nふっふっふっ。先生はそう言うと思って……！"
1009402-138 = "じゃ～ん！ゲーム機をたくさん持ってきたの！"
1009402-140 = "（綺麗になったシャーレで、モモイと楽しくゲームした……）"
1009402-141 = "（プレイ中、興奮したモモイは目隠ししたりくすぐったりと#n物理的に妨害してきた……！）"
1009402-142 = "（そして……）"
1009402-144 = "お聞きになりました？シャーレの先生のお話……。"
1009402-145 = "ええ……最近噂になってますね。#nなんでも、生徒にメイド服を着せていろんなプレイを試してるって……。"
1009402-147 = "（シャーレの評判は、ますます変な形で広まっていくのだった……）"
