[translation]
80000136-1 = "É meu!"
80000136-2 = "Escritório do Schale"
80000136-3 = "（Ao retornar ao Schale, um objeto incomum saltou aos meus olhos）"
80000136-7 = "（...Algo que parecia ser um chocolate gigante）"
80000136-11 = "（Será que aquilo é...）"
80000136-12 = "[ns] \"...Ritsu?\""
80000136-13 = "Acertou em cheio!"
80000136-14 = "Um chocolate surpresa para o Sensei!"
80000136-15 = "Feliz Dia dos Namorados, Sensei!"
80000136-16 = "[s] \"Obrigado, Ritsu.\""
80000136-17 = "Hehe."
80000136-18 = "Mas falando nisso, como você sabia?"
80000136-19 = "Por que você achou que era meu?"
80000136-20 = "[ns] \"Afinal, eu sou o Sensei.\""
80000136-25 = "[ns] \"...Como vou guardar esse chocolate?\""
80000136-26 = "Quanto a isso, não se preocupe!"
80000136-27 = "Sem problemas, Sensei!"
80000136-28 = "[s] \"O que quer dizer?\""
80000136-29 = "Não precisa colocar na geladeira."
80000136-30 = "Não importa o quão quente o verão seja, está tudo bem!"
80000136-31 = "Porque aquele chocolate..."
80000136-32 = "Nunca vai derreter!"
80000136-33 = "[s1] \"Como assim!?\"\n[s2] \"Tecnologia misteriosa...?\""
80000136-36 = "Você vai entender se tocar nele! Vamos, Sensei!"
80000136-37 = "（Conforme incentivado, toquei com cautela...）"
80000136-38 = "[ns] \"I-Isso é...!\""
80000136-39 = "Fufu... É isso mesmo!"
80000136-40 = "[s] \"Entendi, por isso não derrete.\""
80000136-44 = "[ns] \"Um chocolate... feito de pedra?\""
80000136-45 = "Isso! #nFeito de mármore marrom!"
80000136-46 = "E aí? Ficou surpreso?"
80000136-47 = "[s3] \"Fiquei surpreso duas vezes...\n[s4] \"Pela aparência, não dava para saber que era pedra...\""
80000136-50 = "Hehe, fui elogiada!"
80000136-51 = "...? Ah, o modo de preparo?"
80000136-52 = "Não tem jeito, vou abrir uma exceção só para o Sensei!"
80000136-53 = "Vou explicar tudo, do começo ao fim!"
80000136-55 = "（Assim, enquanto observávamos o chocolate (?), ela me ensinou sobre escultura）"
80000136-56 = "（Ainda assim...）"
80000136-59 = "[ns5] \"Como você entrou aqui, Ritsu?\"\n[ns6] \"Normalmente, a segurança deveria ter sido ativada...\""
80000136-62 = "Eh? #nPela ventilação!"
80000136-67 = "（...Depois que a Ritsu foi embora, revisei a segurança）"
