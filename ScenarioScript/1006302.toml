[translation]
1006302-1 = "Residentes da sala de reflexão"

1006302-2 = "(Fui para um prédio no centro do Milênio para me encontrar com Koyuki por enquanto)."

1006302-3 = "(O prédio, que normalmente não temos a oportunidade de visitar, estava estranhamente bem guardado)."

1006302-4 = " \"\n[s2] \"A Koyuki está aqui? "

1006302-7 = "...... Ha, essa voz!"

1006302-13 = "Professor! Professor! Aqui está, aqui está!"

1006302-19 = "SENTIDO!!!"

1006302-20 = "[s3] \"...... Koyuki! \"\n[s4] \"Será que essa voz é ......! "

1006302-30 = "Professor! Eu acreditava que o professor viria!"

1006302-31 = "Por favor! Posso lhe pedir para abrir a porta? Se você tem a autoridade do professor #n, deve ser capaz de abri-la!"

1006302-32 = "A única pessoa em quem posso confiar é meu professor! #nOu, você não me deixaria assim, não é?"

1006302-33 = "[s5] \"Espere, vou abrir a porta em um minuto. \"\n[s6] Abra a porta e entre."

1006302-44 = "Uuuu! É o professor!"

1006302-45 = "Estou muito feliz por você estar aqui, ah! Obrigado #n!"

1006302-46 = "De fato e de verdade, se o médico não tivesse vindo,"

1006302-47 = "Fiquei imaginando o que aconteceria!"

1006302-48 = "O quê? Por que está com tanta pressa, senhor? Vamos ver. ......."

1006302-49 = "Mm-hmm."

1006302-50 = "Bem, vamos deixar isso para lá!"

1006302-56 = "Há algo que o senhor queira fazer então, doutor?"

1006302-61 = "Ha ha para ....... Você ainda está se perguntando por que ligou para ......?"

1006302-65 = "Esta é uma sala de reflexão, caso você esteja se perguntando. ...... #n Veja, eu fui pego, então vou ficar assim até amanhã à noite. ......"

1006302-66 = "Então, eles me disseram que ninguém iria ao restaurante, exceto para o jantar. ......"

1006302-67 = "Eu estava entediado. ......"

1006302-71 = "Ora, ora! Não importa quais são os detalhes! Até os professores chegaram até aqui, então vamos pensar no que vamos fazer para jogar! Sejam positivos!"

1006302-72 = "[s7] \"Não, espere. Não havia algo errado ......? \"\n[s8] \"Eu vim aqui com pressa porque você me pediu para ajudá-lo. ...... \""

1006302-75 = "...... Sim!"

1006302-76 = "Não, estou com problemas, certo? Olhe, dê uma boa olhada em mim! #Não importa como você olhe para mim, você está em apuros!"

1006302-77 = "[s] \"....... \""

1006302-81 = "[ns9] \"......? \"\n[ns10] \"Qual deles é ......? \"\n""

1006302-84 = ""

1006302-85 = "Esta sala! #nEu estava preso nesta sala de reflexão apertada e não podia fazer nada!"

1006302-86 = "...... O quê?"

1006302-87 = "Por que você ficou trancado em primeiro lugar? #nE se você quisesse sair, poderia. ......?"

1006302-88 = "Ha ha ha ha ha! Você está brincando de novo! Você sabe do que estou falando. ......"

1006302-89 = "É verdade que posso sair de um lugar como esse em um instante!"

1006302-90 = "O problema é o que vem depois!"

1006302-91 = "No momento em que eles sabem que eu saí daqui, os veteranos dos seminários e da C&C chegam correndo e com muita vontade!"

1006302-95 = "Ugh ...... Imagine só ......."

1006302-96 = "Bem, é por isso que acho que não posso me livrar completamente do ......, e é por isso que estou sendo discreto agora."

1006302-97 = "Pensei em segurá-los até que eu pudesse pensar em um plano para o que farei em seguida. #n ha ha ha!"

1006302-98 = "[s11] \"\"....... \"\n[s12] (É óbvio que ele não está sentindo pena de si mesmo. ......)"

1006302-101 = "Bem, isso não é importante! Vamos pensar no que vamos fazer..."

1006302-102 = "O que é isso?"

1006302-103 = "É estranhamente habitada para uma sala de reflexão, você acha?"

1006302-104 = "Essa é uma observação maravilhosa, doutor. Já fui colocado nessa sala de reflexão tantas vezes que agora ela é minha própria sala!"

1006302-105 = "Toda vez que sou pego, trago alguns itens pessoais! #nObrigado a você por me deixar confortável. Ha ha ha ha ha!"

1006302-106 = "[s] \"............. \""

1006302-107 = "...... Uma reviravolta na sorte, por assim dizer!"

1006302-108 = "Já fui pego mais vezes do que posso contar! #nEntão decidi facilitar as coisas para mim mesmo!"

1006302-109 = "E veja! Na verdade, debaixo dessa almofada, embora os idosos não tenham percebido. ......"

1006302-113 = "...... Ja! Há jogos de tabuleiro escondidos assim!"

1006302-114 = "[s13] \"...... eh! \"\n[s14] \"Não, esta é uma sala de reflexão. ...... \""

1006302-117 = "Ni-ha-ha-ha~! Não é cedo demais para ficar surpreso! #n Que surpresa, há doces embaixo do sofá! Hmmm, até mesmo uma revista em quadrinhos atrás do bebedouro!"

1006302-118 = "Agora, se eu tivesse alguém com quem jogar, seria uma base secreta particular e muito confortável para mim!"

1006302-119 = "Que tal, não é incrível? Os #nHumanos são animais de adaptação! Podemos nos adaptar rapidamente a qualquer ambiente!"

1006302-124 = "...... Doutor? O que há de errado com seu rosto desse jeito?"

1006302-125 = "Ha ha! Você ficou surpreso? #nNão importa o quanto você seja um professor de placa de petri, você não esperava isso?"

1006302-126 = " \"\n[s16] \"Por falar em inesperado. ...... \""

1006302-129 = "Aqui está, vá em frente! Se você é um professor, pode comer meus doces à vontade! #nNão precisa ser tímido~?"

1006302-130 = "A noite foi longa, então você terá muito tempo para jogar hoje! Ainda nem é noite!"

1006302-131 = "...... Ah."

1006302-132 = "Esqueci de lhe dizer, não conte aos idosos! #n ha ha ha!"

1006302-137 = "(Depois disso, Koyuki e eu jogamos jogos de tabuleiro na "sala de reflexão" até tarde da noite)."

1006302-141 = "(...... Naturalmente, entrei em contato com o seminário assim que voltei à minha placa de Petri e relatei sobre Koyuki)"

