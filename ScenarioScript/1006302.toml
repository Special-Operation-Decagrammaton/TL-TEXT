[translation]
1006302-1 = "Residente da sala de reflexão"

1006302-2 = "(Fui para um prédio no centro do Millennium para conhecer Koyuki primeiro.)"

1006302-3 = "(A segurança era estranhamente rígida no prédio, que normalmente não tenho oportunidade de visitar.)"

1006302-4 = "[s1] \"Há um lugar como esse no Millennium...\"\n[s2] \"Koyuki está aqui?\""

1006302-7 = "...Ha, aquela voz!"

1006302-13 = "professor! professor! Está aqui, está aqui!"

1006302-19 = "Professor! ! !"

1006302-20 = "[s3] \"...Koyuki!\"\n[s4] \"Talvez essa voz seja...!?\""

1006302-30 = "professor! Acreditei que o professor viria! !"

1006302-31 = "Eu te imploro! Posso pedir-lhe para abrir a porta? ? #nVocê poderá abri-lo se tiver permissão do professor!"

1006302-32 = "A única pessoa em quem você pode confiar é seu professor! #nOu talvez você não me abandone assim! ?"

1006302-33 = "[s5] \"Espere, vou abrir agora mesmo.\"\n[s6] Abra a porta e entre."

1006302-44 = "Yay! É um professor! ! !"

1006302-45 = "Estou feliz que você veio! ! ! #nObrigado!"

1006302-46 = "Realmente, se o professor não tivesse vindo,"

1006302-47 = "Eu me perguntei o que aconteceria!"

1006302-48 = "foto? Por que você está tão ansioso? Bem..."

1006302-49 = "Hummm."

1006302-50 = "Bem, vamos deixar assim!"

1006302-56 = "Então, há algo que você gostaria de fazer, professor?"

1006302-61 = "... Ha ha. Você está se perguntando por que eu liguei para você, afinal...?"

1006302-65 = "Este é basicamente um espaço de reflexão... #nOlha, fui preso, então ficarei assim até amanhã à noite..."

1006302-66 = "Então me disseram que ninguém viria exceto na hora das refeições..."

1006302-67 = "Porque era chato..."

1006302-71 = "Bem, bem! Os detalhes estão bem! ! Até o professor chegou até aqui, então vamos pensar com o que brincar! Seja positivo! !"

1006302-72 = "[s7] \"Não, espere. Não houve algo errado...?\"\n[s8] \"Vim correndo porque você me pediu para ajudá-lo...\""

1006302-75 = "……sim! ?"

1006302-76 = "Não, você está com problemas, não está? Olha, por favor, dê uma boa olhada em mim! #nNão importa onde você olhe, você está em apuros!"

1006302-77 = "[s] \"…….\""

1006302-81 = "[ns9] \"...?\"\n[ns10] \"Q-Qual parte...?\""

1006302-84 = "...Já!"

1006302-85 = "Este quarto! #nFiquei preso em uma sala de reflexão tão apertada e não pude fazer nada!"

1006302-86 = "……foto?"

1006302-87 = "Por que você foi preso em primeiro lugar? #nE se você quisesse aparecer, você poderia ter aparecido...?"

1006302-88 = "Hahahaha! Outra piada! Até o professor sabe..."

1006302-89 = "É verdade que se eu tivesse as mãos poderia facilmente escapar de um lugar como este!"

1006302-90 = "O problema vem depois disso! !"

1006302-91 = "No momento em que descobrissem que eu havia saído daqui, meus veteranos dos seminários e do C&C viriam correndo!"

1006302-95 = "Ugh... só imaginando..."

1006302-96 = "Bem, é por isso que... não acho que serei capaz de escapar completamente, então estou indo com calma por enquanto."

1006302-97 = "Até que eu consiga pensar em um plano sobre o que fazer a seguir, acho que vou deixá-lo ser pego. Hahaha por #n!"

1006302-98 = "[s11] \"Suspiro...\"\n[s12] (É claro que ele não mostra nenhum sinal de remorso...)"

1006302-101 = "Bem, tudo bem! Vamos pensar no que jogar..."

1006302-102 = "O que? O que?"

1006302-103 = "Parece estranhamente vivido para uma sala de reflexão, certo?"

1006302-104 = "Você tem maravilhosos poderes de observação, senhor. Estive nesta sala de reflexão tantas vezes que ela se tornou minha própria sala!"

1006302-105 = "Cada vez que sou preso, eles trazem mais alguns itens pessoais! #nObrigado por me deixar mais confortável. Hahahaha!"

1006302-106 = "[s] \"………….\""

1006302-107 = "...Ou seja, uma inversão da ideia! ! !"

1006302-108 = "Já fui preso mais vezes do que consigo contar! #nSe for esse o caso, vamos em frente e facilitar para mim!"

1006302-109 = "E olhe! Na verdade, meus superiores não perceberam o que estava acontecendo debaixo desta almofada..."

1006302-113 = "... Yay! ! ! É assim que os jogos de tabuleiro ficam escondidos!"

1006302-114 = "[s13] \"...Eh!\"\n[s14] \"Não, esta é uma sala de reflexão...\""

1006302-117 = "Ni-ha-ha-ha~! Ainda é cedo para se surpreender! #nTem doces embaixo do sofá! Hehe, tem até um mangá atrás do servidor de água!"

1006302-118 = "Contanto que eu tenha alguém com quem brincar, ela se tornará uma base secreta muito confortável só para mim!"

1006302-119 = "O que você acha? Não é incrível? #nHumanos são animais adaptativos! Adapta-se facilmente a qualquer ambiente!"

1006302-124 = "……professor? O que há de errado em fazer uma cara dessas?"

1006302-125 = "Ha ha! Você ficou surpreso? #nMesmo se você fosse professor de placas de Petri, isso foi inesperado, não foi?"

1006302-126 = "[s15] \"Certamente fiquei surpreso, mas...\"\n[s16] \"Se eu disser inesperado, é inesperado...\""

1006302-129 = "Aqui você vai! Se você fosse professor, poderia comer meus doces como quisesse! #nNão há necessidade de ser tímido~?"

1006302-130 = "É uma noite longa, então você pode se divertir bastante hoje! Ainda nem é noite! ! !"

1006302-131 = "……um."

1006302-132 = "Esqueci de mencionar isso, mas é segredo dos meus mais velhos! Hahaha por #n!"

1006302-137 = "(Depois, joguei jogos de tabuleiro com Koyuki na “sala de reflexão” até tarde da noite.)"

1006302-141 = "(...Claro, entrei em contato com o seminário imediatamente após retornar à placa de Petri e relatei sobre Koyuki.)"

