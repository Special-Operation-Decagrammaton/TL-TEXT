90001160-420 = "[log=???]Dar forma e nascer significa[/log]"
90001160-422 = "[log=???]que o \"infinito\" se rebaixa ao \"finito\".[/log]"
90001160-424 = "[log=???]E o nascimento — é acompanhado pela destruição.[/log]"
90001160-428 = "Portanto — o pássaro que quebra a casca voa em direção a Deus."
90001160-431 = "Finalmente…… vamos nos encontrar."
90001160-432 = "O que fizemos não foi em vão, afinal."
90001160-433 = "Ugh, ugh……!"
90001160-435 = "Não chore, Ein. Hoje é o melhor dia de todos, não é?"
90001160-436 = "E você, Soph, não parece estar tentando segurar o choro também?"
90001160-437 = "Cala a boca……."
90001160-439 = "Cheguem aos confins da terra e tornem-se testemunhas."
90001160-440 = "Deem vida ao lugar que trouxe o pecado e contemplem tudo novamente."
90001160-444 = "Canções aos justos, silêncio aos ímpios."
90001160-445 = "Alvorecer na noite escura, bênçãos às feridas incuráveis."
