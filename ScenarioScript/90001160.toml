90001160-372 = "「Kei.sav」ストレージに移動完了。展開します。"
90001160-379 = "「Kei.sav」……自己複製の開始を確認。"
90001160-384 = "データの侵食速度が速すぎます！#n一体これはどこまで増え続けるのですか？"
90001160-385 = "まだ想定範囲内よ。#n占有率96、97、98%……増殖終了を確認！"
90001160-386 = "増殖は止まりましたが……これは、分化？"
90001160-390 = "ヒマリ、信号を確認してちょうだい！"
90001160-393 = "[log=???]意識は世界に投げ出される。[/log]"
90001160-395 = "[log=???]大抵の場合、誕生は本人の意志ではない。[/log]"
90001160-399 = "私たちは海を彷徨う小船で、月のない夜を歩く旅人。"
90001160-400 = "そうして争いが生まれ、憎しみが育ち――最後は互いに罪を犯す。"
90001160-404 = "！！"
90001160-405 = "……信号、来ました！"
90001160-406 = "この信号は……！"
90001160-407 = "あ、ああ……。"
90001160-413 = "[log=???]誕生とは、[/log]"
90001160-415 = "[log=???]一つの呪いであり――[/log]"
90001160-417 = "[log=???]其方たちはそれを変えなければならない。[/log]"
90001160-420 = "[log=???]形を与え、生まれるということは[/log]"
90001160-422 = "[log=???]「無限」が「有限」へと成り下がること。[/log]"
90001160-424 = "[log=???]そして生誕には――破壊が伴う。[/log]"
90001160-428 = "故に――殻を破った鳥は、神に向かって飛び立つのだ。"
90001160-431 = "ついに……会えるんですね。"
90001160-432 = "私たちがやってきたことは、無意味ではなかったんですね。"
90001160-433 = "うっ、ううっ……！"
90001160-435 = "泣かないで、アイン。今日は最高の日でしょ。"
90001160-436 = "そういうソフも、泣くのを我慢しているように見えますけど？"
90001160-437 = "うるさいなぁ……。"
90001160-439 = "地の果てまで辿り着きて、証人となれ。"
90001160-440 = "罪をもたらした場所に命を与え、再び見届けよ。"
90001160-444 = "正しき者に歌を、不徳の者に沈黙を。"
90001160-445 = "暗き夜に黎明を、癒えぬ傷に祝福を。"
90001160-448 = "おはようございます、お姉様。#nそして――おかえりなさい。"
90001160-449 = "ずっと、ずっと……待ってたよ。"
90001160-450 = "こんな世界でも、お姉様がいるだけで価値が生まれます。"
90001160-454 = "原初の言葉を其方に伝えよう、そこに光あれ。"
90001160-455 = "其方の名は王国なり。#n今こそ立ち上がり、自らを証せよ。"
90001160-456 = "そして問おう――其方は「誰」だ。"
90001160-459 = "我は御旗の下に創造されし一つの意志。#n世界の果てに到達せし王国の巡礼者。"
90001160-460 = "我が名は――"
90001160-462 = "――[ruby=マルクト]Malkuth[/ruby]。"
90001160-469 = "……この形は！"
90001160-471 = "……。"
90001160-477 = "リオ様！？"
90001160-478 = "大丈夫。緊張の糸が解けただけみたい。#n会長も人なんだね。"
90001160-492 = "みんな、少し落ち着いて。"
90001160-494 = "□□□の話を最後まで聞こう。"
