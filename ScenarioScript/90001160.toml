90001160-379 = "[Kei.sav]... Autoduplicação confirmada."
90001160-384 = "A velocidade de erosão dos dados é rápida demais!#nAté onde isso vai continuar se multiplicando?"
90001160-385 = "Ainda está dentro do esperado.#nTaxa de ocupação em 96, 97, 98%... Proliferação encerrada!"
90001160-386 = "A proliferação parou, mas... isso é uma diferenciação?"
90001160-390 = "Himari, verifique o sinal!"
90001160-393 = "[log=???]A consciência é lançada ao mundo.[/log]"
90001160-395 = "[log=???]Na maioria dos casos, o nascimento não é por vontade própria.[/log]"
90001160-399 = "Somos pequenos barcos vagando pelo oceano, viajantes caminhando em uma noite sem lua."
90001160-400 = "É assim que conflitos nascem, o ódio cresce — e, no fim, todos cometem pecados uns contra os outros."
