[translation]
90001160-1 = "第16話;呼ぶ声"
90001160-5 = "すーっ……はぁ……。"
90001160-6 = "――時は来たれり！"
90001160-10 = "は、はい！"
90001160-14 = "ええ、これより先は失敗など許されません。"
90001160-15 = "そ、そうですね……いよいよ、お姉様を起こすのですから！"
90001160-17 = "アインはもうちょっと落ち着いて！"
90001160-19 = "ふ、ふえっ！？"
90001160-20 = "分かりました……頑張ります。"
90001160-21 = "まあ、緊張はミスのもとですからね。"
90001160-25 = "冷却水の残量……ギリギリ大丈夫です！"
90001160-26 = "利用可能なエネルギーを、すべて「ゾーハルの依代」へ。#n少しの間、多次元バリアを解除します。"
90001160-28 = "危険だけど、仕方ない……。"
90001160-32 = "いくよ！"
90001160-47 = "データジェル変換完了。"
90001160-48 = "神経信号連結、確認。"
90001160-50 = "連結――結合強度確認。"
90001160-51 = "確認しました。#n問題ありません。"
90001160-52 = "それでは、相互接続を行います。"
90001160-58 = "相互接続の安定化を確認……コネクトーム、アクティブエリアチェック。"
90001160-59 = "コネクトーム、アクティブ正常化……結果を画面に表示しましょうか？"
90001160-60 = "表示しなくて大丈夫。集中して。"
90001160-66 = "第一意識領域[ruby=プシャット]Peshat[/ruby]接近。皮質領域、正常。デルタ波確認。"
90001160-67 = "次、第二意識領域[ruby=レメズ]Remez[/ruby]接近。髄質領域、正常。シータ波確認。"
90001160-68 = "第三意識領域[ruby=ドラッシュ]Derash[/ruby]接近。核内部領域……し、信号異常！？"
90001160-69 = "ど、どどどど、どうしましょう？"
90001160-70 = "大丈夫、これで合ってるよ。"
90001160-72 = "ええ。ここから先は私たちがどうにかできる領域ではありません。"
90001160-78 = "……第四意識領域[ruby=ソッド]Sod[/ruby]、観測成功。"
90001160-79 = "エネルギー供給を安定化させるために、多次元バリアを解除します。"
90001160-80 = "あとは経過を見守るだけですね。"
90001160-82 = "わ、私たちは……何をすれば……？"
90001160-86 = "……。"
90001160-87 = "うーん……祈ってようかな。"
90001160-88 = "そうですね。私たちは、あの方のために存在するのですから。"
90001160-89 = "は、はい……無事に、この地で目覚めますように――"
90001160-91 = "――私たちの[ruby=マルクト]お姉様[/ruby]。"
90001160-101 = "「Kei.sav」をどうするつもりなのか、聞かせていただけますか――リオ。"
90001160-102 = "以前、私もこのファイルを分析してみましたが、収穫はありませんでした。"
90001160-103 = "あなたはそのような結果が出て当然だと言いましたね？"
90001160-104 = "ええ。一般的な技術では解析不可能よ。"
90001160-105 = "データを展開するつもりなのでしょうけど……それは2キロバイトから増えることはありません。既に試しています。"
90001160-106 = "一応、あなたの言う通りストレージを用意しましたが……。"
90001160-107 = "あら、「名もなき神」の技術も試しているのかしら？"
90001160-111 = "……詳しく伺っても？"
90001160-112 = "「Kei.sav」が本当に「名もなき神」の鍵――ケイの痕跡なら、私たちが使う記録媒体との互換性はないわ。"
90001160-113 = "分かりやすく言えば、「名もなき神」の力に対応する環境が必要ということよ。"
90001160-114 = "理屈は分かりますが、どのように用意するのですか……？"
90001160-115 = "それは――"
90001160-119 = "……このデータは生きている、と？"
90001160-120 = "以前の私であれば、否定していたかもしれないけれど……。"
90001160-121 = "その通りよ、ヒマリ。私たちが生命の範疇をどこまで、そしてどのように定義するかは別として。"
90001160-122 = "このデータには、そう解釈できる部分がたしかに存在するわ。"
90001160-131 = "[ns1] \"トキもエイミも、この話についていけるんだよね……。\"\n[ns2] \"私には、さっぱり分からないけど……。\""
90001160-136 = "心配しないでください先生。#n私も全く分かっておりませんので、ぶい。"
90001160-137 = "私が色々と理解して手伝っているように見えるとしたら……。"
90001160-138 = "お二人の指示が的確なのでしょう。#n私の知識は、リオ様の背中を見て学んだことだけですから。"
90001160-139 = "ちょうど今、手が空いたので先生に遊んでいただけないかと視線を送っているところです。先生、ご指示を。"
90001160-143 = "今のは我ながら完璧なメイドのセリフでした。#n迅速にお褒めの言葉を。"
90001160-144 = "何をしているのかと思ったら……先生も忙しいんだから行くよ。#n暇ならこっち手伝って。"
90001160-154 = "今度、私と二人きりで遊んでください。約束しましたね、すでに約束したことになっています。忘れないでくださいね？"
90001160-155 = "[s] \"う、うん、分かった……。\""
90001160-162 = "「全知」の私が口にするのはおかしいかもしれませんが……。"
90001160-163 = "……思ったんだけど、他の学位も自分で授与してみたら？"
90001160-164 = "それではまるで私がイメージ作りのために「全知」の学位を自称しているみたいじゃないですか。"
90001160-165 = "自称じゃなかったんだ……。"
90001160-166 = "はあ……そんなことより、リオ。#n私たちは前人未到の領域に足を踏み入れたという認識で良いのですか？"
90001160-171 = "……ええ。この分野の知識は、まだ体系化されていないのだけれど。"
90001160-172 = "自分たちが扱うものについて、多くの人間は正しく把握できていないわ。#nだから、知識を体系化し、統制しなければならない。"
90001160-173 = "でも、それは昔の話でしょう？#nあなたの考えが変わることもあるんですね。"
90001160-174 = "……人は変化する生き物よ。"
90001160-183 = "これで準備は終わりですか？"
90001160-184 = "ええ。後はケイを移動させるだけよ。"
90001160-185 = "分かりました。#nこのストレージにケイを移動させれば良いのですね。"
90001160-186 = "移動させた後は、基本見守るだけになるわ。"
90001160-187 = "途中で想定外の事態が起こらないことを祈るばかりね。"
90001160-192 = "そうなった場合、どうするのですか？"
90001160-194 = "物理的な手段を取るしかないわ。"
90001160-196 = "なるほど……このストレージを取り外せば良いのですね。"
90001160-197 = "えっと……変な気配を感じたら壊せば良いってこと？"
90001160-199 = "……ええ、そうなるわね。"
90001160-205 = "なぜ私を見るのですか、リオ？"
90001160-206 = "いえ……貴女はこのやり方に反論するかと思って。"
90001160-210 = "……いくら私でも、他に手段がないことくらい分かっておりますとも。"
90001160-211 = "それに――「名もなき神」の力を一番理解しているのはあなたです。"
90001160-212 = "その決定に口を出すつもりはありません。"
90001160-213 = "……ありがとう。"
90001160-215 = "できれば壊さなくて済むよう願ってるけどね。"
90001160-216 = "こちらの準備は終わりました、いつでも始められます。"
