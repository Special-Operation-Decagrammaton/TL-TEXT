[translation]
90001160-1 = "Episódio 16: A Voz que Chama"
90001160-5 = "Inspira... Expira..."
90001160-6 = "— O momento chegou!"
90001160-10 = "S-sim!"
90001160-14 = "Sim, daqui em diante, falhas não serão toleradas."
90001160-15 = "C-certo... Afinal, vamos despertar a nossa irmã mais velha!"
90001160-17 = "Ein, tente se acalmar um pouco!"
90001160-19 = "H-hã!?"
90001160-20 = "Entendido... Farei o meu melhor."
90001160-21 = "Bem, o nervosismo é a causa de muitos erros, afinal."
90001160-25 = "Nível de líquido refrigerante... No limite, mas está tudo bem!"
90001160-26 = "Transferindo toda a energia disponível para o \"Recipiente de Zohar\".#nDesativando a barreira multidimensional por um breve momento."
90001160-28 = "É perigoso, mas não temos escolha..."
90001160-32 = "Lá vamos nós!"
90001160-47 = "Conversão de gel de dados concluída."
90001160-48 = "Conexão de sinal neural, confirmada."
90001160-50 = "Conexão — força de ligação confirmada."
90001160-51 = "Confirmado.#nSem problemas."
90001160-52 = "Dando início à interconexão."
90001160-58 = "Estabilização da interconexão confirmada... Verificação da área ativa do conectoma."
90001160-59 = "Normalização do conectoma ativo... Quer que eu exiba os resultados na tela?"
90001160-60 = "Não precisa exibir. Concentre-se."
90001160-66 = "Aproximando-se da primeira área de consciência. Área cortical, normal. Ondas delta confirmadas."
90001160-67 = "Próximo, aproximando-se da segunda área de consciência. Área medular, normal. Ondas teta confirmadas."
90001160-68 = "Aproximando-se da terceira área de consciência. Área interna do núcleo... A-anomalia de sinal!?"
90001160-69 = "O-o-o-o que devemos fazer?"
90001160-70 = "Está tudo bem, é assim mesmo."
90001160-72 = "Sim. Daqui em diante, é uma área que não podemos controlar."
90001160-78 = "...Quarta área de consciência, observação bem-sucedida."
90001160-79 = "Para estabilizar o fornecimento de energia, desativarei a barreira multidimensional."
90001160-80 = "Agora só nos resta observar o progresso."
90001160-82 = "N-nós... o que devemos fazer...?"
90001160-86 = "..."
90001160-87 = "Hmm... Acho que vou rezar."
90001160-88 = "Concordo. Afinal, nós existimos por causa dela."
90001160-89 = "S-sim... Que ela possa despertar em segurança neste lugar —"
90001160-91 = "— a nossa."
90001160-101 = "Pode me dizer o que pretende fazer com o \"Kei.sav\" — Rio?"
90001160-102 = "Eu mesma tentei analisar esse arquivo anteriormente, mas não obtive resultados."
90001160-103 = "Você disse que era natural que esse fosse o resultado, não disse?"
90001160-104 = "Sim. É impossível analisar com a tecnologia convencional."
90001160-105 = "Você pretende expandir os dados, mas... eles nunca passam de 2 kilobytes. Eu já tentei."
90001160-106 = "Preparei o armazenamento como você pediu, mas..."
90001160-107 = "Ora, será que você também está testando a tecnologia dos \"Deuses Sem Nome\"?"
90001160-111 = "...Pode me explicar melhor?"
90001160-112 = "Se o \"Kei.sav\" for realmente a chave dos \"Deuses Sem Nome\" — o vestígio de Kei —, então ele não é compatível com as mídias de armazenamento que usamos."
90001160-113 = "Em termos simples, precisamos de um ambiente que suporte o poder dos \"Deuses Sem Nome\"."
90001160-114 = "Entendo a lógica, mas como pretende preparar algo assim...?"
90001160-115 = "Isso é..."
90001160-119 = "...Você está dizendo que esses dados estão vivos?"
90001160-120 = "Se fosse a "eu" de antes, talvez eu tivesse negado, mas..."
90001160-121 = "Exatamente, Himari. Independentemente de onde ou como definimos os limites da vida."
90001160-122 = "Neste dado, certamente existe uma parte que pode ser interpretada dessa forma."
90001160-131 = "[ns1] \"A Toki e a Eimi conseguem acompanhar esse assunto, né...\"\n[ns2] \"Eu, por outro lado, não entendo absolutamente nada...\""
90001160-136 = "Não se preocupe, Sensei. #nEu também não entendo nada, bui."
90001160-137 = "Se parece que estou entendendo tudo e ajudando..."
90001160-138 = "É porque as instruções de vocês duas são precisas. #nMeu conhecimento é apenas o que aprendi seguindo os passos da Rio-sama."
90001160-139 = "Como estou livre agora, estou lançando um olhar para ver se o Sensei quer brincar comigo. Sensei, quais são as ordens?"
90001160-143 = "Essa foi uma fala de empregada perfeita, se me permite dizer. #nAguardo seus elogios prontamente."
90001160-144 = "Eu me perguntava o que você estava fazendo... Sensei, você está ocupado, então vamos. #nSe estiver livre, me ajude aqui."
90001160-154 = "Da próxima vez, brinque só comigo. Você prometeu, já está decidido que prometeu. Não se esqueça, está bem?"
90001160-155 = "[s] \"Ah, sim, entendi...\""
90001160-162 = "Pode parecer estranho vindo de mim, que sou a \"Onisciente\"..."
90001160-163 = "...Mas eu estava pensando, por que você não se autoconcede outros diplomas também?"
90001160-164 = "Isso faria parecer que eu me autodenomino \"Onisciente\" apenas para criar uma imagem, não acha?"
90001160-165 = "Então não era autodenominação..."
90001160-166 = "Haa... Deixando isso de lado, Rio. #nPodemos considerar que entramos em um território inexplorado?"
90001160-171 = "...Sim. O conhecimento nesta área ainda não foi sistematizado."
90001160-172 = "Muitas pessoas não compreendem corretamente o que estamos lidando. #nPor isso, o conhecimento precisa ser sistematizado e controlado."
90001160-173 = "Mas isso é coisa do passado, não é? #nVejo que seus pensamentos também podem mudar."
90001160-174 = "...As pessoas são seres que mudam."
90001160-183 = "A preparação termina aqui?"
90001160-184 = "Sim. O resto é apenas mover a Kei."
90001160-185 = "Entendido. #nEntão só preciso mover a Kei para este armazenamento, certo?"
90001160-186 = "Depois de movê-la, basicamente só teremos que observar."
90001160-187 = "Só espero que nada inesperado aconteça no caminho."
90001160-192 = "Se isso acontecer, o que faremos?"
90001160-194 = "Não teremos escolha a não ser recorrer a meios físicos."
90001160-196 = "Entendo... Então basta desconectar este armazenamento."
90001160-197 = "Espera... quer dizer que se eu sentir algo estranho, é só destruir?"
90001160-199 = "...Sim, é isso mesmo."
90001160-205 = "Por que você me olha, Rio?"
90001160-206 = "Não é nada... Achei que você fosse contestar esse método."
90001160-210 = "...Mesmo eu, entendo que não há outros meios."
90001160-211 = "Além disso — você é quem melhor entende o poder do \"Deus Sem Nome\"."
90001160-212 = "Não pretendo interferir nessa decisão."
90001160-213 = "...Obrigada."
90001160-215 = "Embora eu espere que não precisemos destruir nada."
90001160-216 = "Minha preparação está concluída, podemos começar a qualquer momento."
