[translation]
10034100-1 = "後日談その2;裏切れるということは"
10034100-2 = "[ns1] \"そういえば、この間みんなが侵入した時……。\"\n[ns2] \"最初、正義実現委員会はいなかったんだよね？\""
10034100-5 = "うん、そうだよ。"
10034100-6 = "たしか自警団の人と、学園祭の関係者くらいじゃない？"
10034100-7 = "正義実現委員会は、別のことで忙しかったみたいだし……。"
10034100-8 = "想像してなかったんでしょ。#nまさか天下のティーパーティーが主催する学園祭で、奇襲が発生するなんて。"
10034100-9 = "……あんたもその一人でしょ。"
10034100-10 = "もちろん、忘れたなんて言わないよ。#nあの作戦は痺れたね、我らがキャスパリーグの先導する――"
10034100-11 = "……やめてって言ったよね？"
10034100-15 = "…[ruby=きょうやま]…杏山カ[/ruby]ズサ直伝の、喧嘩が弱くても勝てる方法！"
10034100-17 = "真正面から勝てない相手には、想定外の方法で気を引く……だっけ？"
10034100-18 = "その通り、すんごく効果的だったね。"
10034100-19 = "……だからって、いきなりスカートを脱いで突っ込むとは思わなかったけど。"
10034100-20 = "スパッツを履いてたから問題無い無い。#n完璧な計算のうえに成り立った戦術だよ。"
10034100-21 = "……念のため言っておくけど、スカートを脱げとは教えてないからね、私。"
10034100-22 = "でも、カズサの助言のおかげで目的地にたどり着けたのは本当でしょ？"
10034100-23 = "戦闘はほぼ私がやってたのに、なんであんたが得意げな顔してるの。"
10034100-24 = "正義実現委員会が応援に来てからは、すぐやられちゃったし。"
10034100-25 = "あいつらと真正面から戦っても、勝てるわけないでしょ……。"
10034100-26 = "終わったことなんだし、もう良いじゃん。"
10034100-27 = "私も久しぶりに体を動かせてスッキリしたし。"
10034100-29 = "話は全部聞きましたよ、杏山カズサ！"
10034100-30 = "また問題を起こしたんですね！！"
10034100-34 = "……げっ。"
10034100-35 = "よりによって、あいつの耳に入るだなんて……。"
10034100-37 = "[ns] \"…………。\""
10034100-41 = "[ns3] \"じゃあ、私は先に……。\"\n[ns4] \"ちょっと急用が……。\""
10034100-44 = "……ちょっ、先生！？"
10034100-45 = "ウソでしょ！？ねぇ！？"
10034100-50 = "……あ！#nそういえば私も用事を思い出したわ。"
10034100-54 = "じゃあ私もこの辺で。"
10034100-62 = "え、えっと……。"
10034100-64 = "う、嘘でしょ！？"
10034100-65 = "ねえ！#nちょっと、置いてかないでよ！"
10034100-66 = "こ、この……"
10034100-72 = "裏切り者おおおっ！！"
