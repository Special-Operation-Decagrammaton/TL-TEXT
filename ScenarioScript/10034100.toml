[translation]
10034100-1 = "Epílogo 2; Sobre a capacidade de trair"
10034100-2 = "[ns1] \"Falando nisso, daquela vez que vocês invadiram...\"\n[ns2] \"No começo, o Comitê de Justiça não estava lá, né?\""
10034100-5 = "Sim, é verdade."
10034100-6 = "Acho que eram só o pessoal do comitê disciplinar e os organizadores do festival escolar, não?"
10034100-7 = "Parece que o Comitê de Justiça estava ocupado com outras coisas..."
10034100-8 = "Vocês não imaginavam, né? #nQue um ataque surpresa aconteceria no festival escolar organizado pela ilustre Tea Party."
10034100-9 = "……Você também é uma delas, sabia?"
10034100-10 = "Claro, não diria que esqueci. #nAquela operação foi eletrizante, liderada pela nossa Cath Palug—"
10034100-11 = "……Eu disse para parar com isso, não disse?"
10034100-15 = "…O método ensinado diretamente por Kazusa Kyoyama para vencer mesmo sendo fraca em brigas!"
10034100-17 = "Distrair o oponente com um método inesperado quando não se pode vencer de frente... era isso, né?"
10034100-18 = "Exatamente, foi super eficaz."
10034100-19 = "……Ainda assim, não achei que você fosse tirar a saia e avançar de repente."
10034100-20 = "Eu estava usando shorts por baixo, então não tem problema. #nFoi uma tática baseada em cálculos perfeitos."
10034100-21 = "……Só para constar, eu não te ensinei a tirar a saia, viu?"
10034100-22 = "Mas é verdade que, graças aos conselhos da Kazusa, conseguimos chegar ao destino, não é?"
10034100-23 = "Eu fiz quase todo o trabalho de combate, por que você está com essa cara de orgulhosa?"
10034100-24 = "Depois que o Comitê de Justiça veio dar apoio, fomos derrotadas rapidamente."
10034100-25 = "Não tem como vencer lutando de frente contra elas..."
10034100-26 = "Já passou, então deixa pra lá."
10034100-27 = "Eu também me senti bem por poder me exercitar um pouco depois de tanto tempo."
10034100-29 = "Eu ouvi tudo, Kazusa Kyoyama!"
10034100-30 = "Você causou problemas de novo, não foi!!"
10034100-34 = "……Droga."
10034100-35 = "Logo agora, tinha que chegar aos ouvidos dela..."
10034100-37 = "[ns] \"………….\""
10034100-41 = "[ns3] \"Bem, eu vou indo na frente...\"\n[ns4] \"Tenho um assunto urgente...\""
10034100-44 = "……Ei, Sensei!?"
10034100-45 = "Não pode ser, né!? Ei!?"
10034100-50 = "……Ah! #nFalando nisso, eu também lembrei de um compromisso."
10034100-54 = "Então eu também vou ficando por aqui."
10034100-62 = "E-ei, espera..."
10034100-64 = "N-não acredito!?"
10034100-65 = "Ei! #nEi, não me deixem para trás!"
10034100-66 = "S-suas..."
10034100-72 = "TRAIDORASSSS!!!"
