[translation]
1013703-1 = "時間感覚"
1013703-2 = "（用事があってブラックマーケットに足を運んだものの探していたものが見つからず、帰ろうとした瞬間――）"
1013703-3 = "（路地から騒がしい声が聞こえてきた）"
1013703-11 = "逃げるな！こっちへこーい！！"
1013703-12 = "誰が行くかバカ！"
1013703-13 = "捕まえがいがある相手を逃がすと思う？地の果てでも追いかけてやるぞ～！"
1013703-14 = "ひぃぃっ！！"
1013703-21 = "ってか今日、時間厳守しないといけない日なんだけど！"
1013703-22 = "だから！大人しく！捕まって！ほしいんだけど！？"
1013703-23 = "はい！手錠！穴二つ！手二つ！#n使い方、分かるよね？"
1013703-24 = "はぁ！？誰が自分に手錠かけるヤツがいるんだよ！？"
1013703-25 = "頭おかしいんじゃないのか！？#nえいっ！"
1013703-31 = "がはっ……！うっ……！"
1013703-32 = "ははっ！テフロン加工弾だ！痛いだろ？"
1013703-33 = "バッグで防げるわけないもんなぁ！"
1013703-34 = "ヴァルキューレの防弾服程度――"
1013703-41 = "はぁ？？？？？？"
1013703-42 = "弾倉一つ空にしたのにノーダメージってなんだよ！？"
1013703-43 = "あーあ、スクールバッグ穴だらけになっちゃったじゃん！"
1013703-44 = "もうこれじゃあ教科書、読めないんだけど？"
1013703-45 = "どう責任とってくれんのよ！！コラァーッ！"
1013703-57 = "いや、それはお前がバッグを盾にしたからだろ！！"
1013703-62 = "当たったら痛いじゃん！使えるもんがあるなら使うでしょうが！"
1013703-63 = "なんで教科書、テープでぐるぐる巻きになってんだよ！？"
1013703-68 = "大切だから！だってば！"
1013703-69 = "んじゃ本で殴るんじゃねぇよ！いたっ！"
1013703-71 = "お前、本当に警察か？やってることスケバンと一緒じゃねえか！"
1013703-72 = "文句があるなら、ヴァルキューレに入ることだね～#n手続きくらいならしたげるよ。"
1013703-73 = "んで、今シメられるのと、逮捕されてからシメられるの……どっちがいい？"
1013703-74 = "どっちも同じだろ！！"
1013703-75 = "選ばせてあげてんだから、とっとと選びな！"
1013703-77 = "[ns] \"あ、あの……とりあえず話し合いとか……。\""
1013703-78 = "しゃ、シャーレの先生！？"
1013703-79 = "助けてくださいぃ！！！"
1013703-80 = "ちょっ！先生に言うのは反則でしょ！？"
1013703-81 = "ち、ちわーっす、先生！あたしら、ちょーっと遊んでただけっていうか？"
1013703-83 = "[ns] \"友達同士、仲良く、しないとね……？\""
1013703-84 = "これ、あたしが怒られる展開なんすか！？"
1013703-85 = "あっ！先生、今何時っすか？"
1013703-86 = "あたしのスマホ壊れちゃって……ってかあとで弁償してよね！"
1013703-87 = "はぁ？自分でスマホ使って人を殴っといて……#nそれはちょっと酷くねぇか！？"
1013703-89 = "[ns] \"5時59分だけど……。\""
1013703-90 = "……！"
1013703-91 = "は？17時59分？"
1013703-92 = "やば……もう退勤時間じゃん……。"
1013703-93 = "ほら、手錠渡しとくからちゃんとかけといてね。朝9時にヴァルキューレに来るんだよ！#n逃げたら容赦しない。"
1013703-94 = "あたしとの約束だからね？"
1013703-95 = "んじゃ先生、お先に失礼します！今日は時間厳守の日なんで！"
1013703-96 = "お疲れ様ーっした！"
1013703-98 = "[ns] \"え、ええ……？\""
1013703-103 = "……は？"
1013703-104 = "帰ってった……？"
1013703-105 = "ヴァルキューレ、一体どうなってんだ……？"
1013703-106 = "[s] \"ど、どうしたんだろう……。\""
1013703-108 = "翌日・午前8時59分"
1013703-109 = "（昨日に引き続き、騒がしい声が聞こえてきた）"
1013703-114 = "ひぃぃっ！！ここは昨日と全然違う街なのに！どうやって場所分かったんだよ！！"
1013703-115 = "逃げたら容赦しないって言ったよねぇ？"
1013703-116 = "あの後、一応張り込んでたんだけど……いやぁ～ビンゴだったかぁ。"
1013703-117 = "お前帰るって言ってたじゃねぇか！！"
1013703-118 = "ざーんねん、張り込みは趣味なんだよね。#n仕事じゃないってわけ。"
1013703-119 = "9時まであと8秒！首を洗って待ってるんだねぇ！"
1013703-120 = "うわーん！助けてぇ！！もう逃げませんから！！！"
1013703-127 = "（コノカは9時になったタイミングで容疑者を逮捕した）"
1013703-128 = "（時間を確認したコノカは、こちらに気がつくと満面の笑みを返してくれた）"
