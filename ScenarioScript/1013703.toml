[translation]
1013703-1 = "senso de tempo"

1013703-2 = "(O momento em que fui ao mercado negro comprar alguma coisa, mas não encontrei o que procurava e estava prestes a voltar para casa...)"

1013703-3 = "(Uma voz barulhenta foi ouvida no beco.)"

1013703-11 = "Não fuja! Venha aqui! !"

1013703-12 = "Idiota quem vai!"

1013703-13 = "Você acha que vai deixar alguém que vale a pena ser capturado escapar? Vou persegui-lo até os confins da terra!"

1013703-14 = "Ei! !"

1013703-21 = "Bom, hoje é o dia que tenho que ser pontual!"

1013703-22 = "é por isso! Fique quieto! Pegue-me! Quero isso! ?"

1013703-23 = "sim! algemas! Dois buracos! Duas mãos! #nVocê sabe como usar, certo?"

1013703-24 = "Ha! ? Quem diabos colocaria algemas em mim? ?"

1013703-25 = "Você está louco? ? #nEi!"

1013703-31 = "Ah...! Eca...!"

1013703-32 = "Haha! É uma bala tratada com Teflon! Não dói?"

1013703-33 = "Não há como uma bolsa evitar isso!"

1013703-34 = "O traje à prova de balas da Valquíria..."

1013703-41 = "Huh? ? ? ? ? ?"

1013703-42 = "O que há sem danos, mesmo que eu tenha esvaziado um carregador? ?"

1013703-43 = "Ah, minha mochila escolar está cheia de buracos!"

1013703-44 = "Não consigo mais ler o livro, posso?"

1013703-45 = "Como você pode assumir a responsabilidade? !コラァーッ！"

1013703-57 = "Não, é porque você usou a bolsa como escudo! !"

1013703-62 = "Dói se bater em você! Se tiver algo que eu possa usar, eu uso!"

1013703-63 = "Por que o livro está embrulhado em fita adesiva? ?"

1013703-68 = "Porque é importante! Datteba!"

1013703-69 = "Então não me bata com um livro! Lá estava!"

1013703-71 = "Você é realmente a polícia? O que você está fazendo não é igual ao Sukeban?"

1013703-72 = "Se você tiver alguma reclamação, eu diria para se juntar à Valquíria ~#nEu ficaria feliz com o procedimento."

1013703-73 = "Então, o que é melhor: sofrer bullying agora ou sofrer bullying depois de ser preso?"

1013703-74 = "Ambos são iguais! !"

1013703-75 = "Estou deixando você escolher, então escolha rápido!"

1013703-77 = "[ns] \"Ah, uh...vamos conversar por enquanto...\""

1013703-78 = "Oh, professor de placa de Petri! ?"

1013703-79 = "Por favor me ajude! ! !"

1013703-80 = "Ei! É contra a lei contar ao professor! ?"

1013703-81 = "Chi-chiwassu, professor! Você está dizendo que estávamos apenas brincando um pouco?"

1013703-83 = "[ns] \"Amigos têm que se dar bem...?\""

1013703-84 = "Este é um desenvolvimento que me deixa com raiva? ?"

1013703-85 = "Ah! Professor, que horas são agora?"

1013703-86 = "Meu smartphone está quebrado...você terá que pagar por ele mais tarde!"

1013703-87 = "Huh? Usei meu smartphone para bater nas pessoas...#nIsso não é um pouco cruel! ?"

1013703-89 = "[ns] \"São 5:59...\""

1013703-90 = "...!"

1013703-91 = "dentes? 17:59?"

1013703-92 = "Ah não... já é hora de sair do trabalho..."

1013703-93 = "Aqui, vou lhe entregar as algemas, então, por favor, pendure-as corretamente. Estou chegando em Valquíria às 9h! #nSe você fugir, não terei piedade."

1013703-94 = "É uma promessa comigo, certo?"

1013703-95 = "Bem, sensei, peço desculpas antecipadamente! Hoje é dia de pontualidade!"

1013703-96 = "Obrigado pelo seu trabalho duro!"

1013703-98 = "[ns] \"Eh, sim...?\""

1013703-103 = "……dentes?"

1013703-104 = "Você foi para casa...?"

1013703-105 = "ヴァルキューレ、一体どうなってんだ……？"

1013703-106 = "[s] \"E-eu me pergunto o que está acontecendo...\""

1013703-108 = "Dia seguinte・8h59"

1013703-109 = "(Continuando com ontem, ouvi vozes barulhentas.)"

1013703-114 = "Ei! ! Esta é uma cidade completamente diferente de ontem! Como você conheceu o lugar? !"

1013703-115 = "Eu te disse que não teria misericórdia se você fugisse, certo?"

1013703-116 = "Depois disso, fiquei vigiado por um tempo, mas... bem, acho que foi bingo."

1013703-117 = "Você disse que estava indo para casa! !"

1013703-118 = "Afinal, vigiar é um hobby. #nNão dá trabalho."

1013703-119 = "Faltam 8 segundos para as 9 horas! Estou esperando você lavar o pescoço!"

1013703-120 = "Uau! Me ajude! ! Não vou mais fugir! ! !"

1013703-127 = "(Konoka prendeu o suspeito às 9 horas)"

1013703-128 = "(Konoka verificou a hora e me deu um grande sorriso quando me notou.)"

