[translation]
62110-1 = "Episódio 11; Discípulas"
62110-3 = "U-Um anjo!"
62110-4 = "É um \"Anjo do Apocalipse\"! E tem dois deles...!"
62110-5 = "Qual era o número da vez do som da trombeta?"
62110-6 = "Se não me engano... acho que essa é a quinta e a sexta vez...?"
62110-7 = "Então, o que resta é...?"
62110-8 = "......"
62110-9 = "Ei, espera! Eles não estão vindo na nossa direção!?"
62110-13 = "Aaaaaaaaah!?"
62110-19 = "!!!"
62110-20 = "O-O anjo está... atacando as alunas de Arius...!"
62110-21 = "Então era verdade... será que era mesmo...?"
62110-22 = "Exatamente como a Ui e a Shimiko disseram..."
62110-25 = "......Deve haver algo em comum entre aqueles que conseguem ouvir a trombeta."
62110-26 = "—Provavelmente, é a aula do Sensei."
62110-28 = "Portanto, as alunas que ouviram o som da trombeta. Ou seja, se usarmos as palavras do Apocalipse, as alunas que sentiram os \"sinais do fim do mundo\"—"
62110-29 = "Eu acredito que elas foram as alunas que conseguiram aceitar o \"conhecimento de fora de Arius\" sem resistência."
62110-31 = "As outras também, mais cedo ou mais tarde..."
62110-32 = "Podem acabar sendo vistas como \"inimigas\" pelas alunas que não querem que Arius mude."
62110-34 = "E daí? Mesmo que seja isso, vamos só ficar olhando?"
62110-35 = "Todas elas são alunas de Arius, afinal."
62110-40 = "S-Será que vai dar certo...? Mesmo da última vez tendo sido tão difícil..."
62110-41 = "Agora... não temos nem o pessoal do Esquadrão de Socorro..."
62110-42 = "Mas o número de anjos também é a metade. ...Vamos começar."
