[translation]
62110-1 = "Episódio 11; Os Discípulos"
62110-3 = "É-É um anjo!"
62110-4 = "É um 'Anjo do Apocalipse'! E tem dois deles...!"
62110-5 = "Quantas vezes a trombeta já tocou mesmo?"
62110-6 = "Se não me engano... com essa agora, foram a quinta e a sexta vez...?"
62110-7 = "Então, quanto falta...?"
62110-8 = "……."
62110-9 = "E-Ei, espera aí! Eles não estão vindo na nossa direção?!"
62110-13 = "Uwaaaaaaaaaaaah?!"
62110-19 = "!!!"
62110-20 = "O-Os anjos... estão atacando as alunas de Arius...!"
62110-21 = "No fim das contas... era verdade mesmo...?"
62110-22 = "Exatamente como a Ui-san e a Shimiko-san tinham dito..."
62110-25 = "...Deve haver algum ponto em comum entre aquelas que conseguem ouvir a trombeta."
62110-26 = "―― Provavelmente, as aulas do Sensei."
62110-28 = "Por isso, as alunas que ouviram o som da trombeta — ou seja, usando as palavras do Apocalipse, as alunas que perceberam os 'sinais do fim do mundo' ――"
62110-29 = "Acredito que tenham sido aquelas que conseguiram aceitar o 'conhecimento de fora de Arius' sem resistência."
62110-31 = "Mais cedo ou mais tarde, as outras garotas também..."
62110-32 = "Há a possibilidade de serem vistas como 'inimigas' pelas alunas que não querem que Arius mude."
62110-34 = "E então? Mesmo se for isso, vamos só ficar olhando?"
62110-35 = "Afinal, somos todas alunas de Arius."
62110-40 = "S-Será que vai dar tudo bem...? Sendo que já tivemos tanta dificuldade da outra vez..."
62110-41 = "E agora... o pessoal da Ordem de Cavalaria de Resgate também não está aqui..."
62110-42 = "Mas o número de anjos também caiu pela metade. ...Vamos começar."