[translation]
1010202-1 = "Probabilidade de ganhar"

1010202-2 = "(Eu estava curioso sobre o Momotalk antes, então visitei Hiyori.)"

1010202-5 = "Eh, ehehe…."

1010202-6 = "Ah, professora?"

1010202-7 = "Ei, você veio...! #nEu estava prestes a te perguntar..."

1010202-8 = "[s] \"O que Hiyori está fazendo?\""

1010202-9 = "Ah, é isso..."

1010202-10 = "Ehehe. #nEstou escrevendo isso porque quero um maiô..."

1010202-11 = "É um cartão-postal de sorteio de revista, mas parece que se #n episódio for escolhido, você ganhará um maiô."

1010202-12 = "Se você escrever sobre nossas circunstâncias vivendo em ruínas no meio do verão assim e nos enviar..."

1010202-13 = "Tenho certeza que o responsável vai ficar com pena de você e te dar um maiô de presente. #nEhehe...!"

1010202-14 = "[s1] \"Disseram que você poderia ganhar um maiô de graça...\"\n[s2] \"Eu não sabia que era um cartão postal de prêmio...\""

1010202-17 = "Se você enviar hoje, pode chegar antes de você ir para a praia!"

1010202-18 = "A razão pela qual eu quis perguntar sobre a placa de Petri foi para perguntar se estaria tudo bem se eu fizesse da placa de Petri o destinatário do presente..."

1010202-19 = "Como você sabe, não temos endereço...hehe."

1010202-20 = "[s] \"Claro, não me importo muito...\""

1010202-23 = "[ns] Verifique a revista que Hiyori está segurando na mão."

1010202-24 = "(...Foi uma revista publicada há dois meses)"

1010202-25 = "先生、どうかされたんですか？"
1010202-26 = "急にそんな目を……#nや、やっぱり先生も、私のことを不憫だと思ってるんですね……！ ?"

1010202-27 = "...Minha vida não se parece em nada com esta ruína."

1010202-28 = "Ah. #nNa verdade, está melhor agora..."

1010202-29 = "As chances de ganhar deveriam aumentar ainda mais, infelizmente...Eh, hehe."

1010202-30 = "[s3] \"Hmm...\"\n[s4] (Não vamos falar que o período de inscrição já passou...)"

1010202-33 = "Hehe, terminei de escrever."

1010202-34 = "Sensei, você poderia, por favor, deixar isso na caixa de correio no caminho para casa...?"

1010202-35 = "...Estou ansioso pelo maiô!"

1010202-37 = "(O prêmio que Hiyori tentou enviar expirou, então ela o trouxe de volta para a placa de Petri.)"

1010202-38 = "[ns] \"Deixe-me ler por um momento...\""

1010202-40 = "Olá, vivo com dor todos os dias."

1010202-41 = "Minha vida é como uma pedra sem diversão nem felicidade, mas gostaria de ir ao mar pelo menos uma vez."

1010202-42 = "Por favor me ajude a realizar meu pequeno sonho."

1010202-43 = "Prêmio desejado: Maiô VIP dourado de luxo de alta qualidade"

1010202-46 = "[ns] \"...Hmm.\""

1010202-48 = "（その後、ショッピングモールで水着を購入した）"
1010202-50 = "あっ、先生。それはもしかして……！"
1010202-51 = "É isso, certo? #nIsso chegou! ?"

1010202-52 = "[s5] \"Ah, isso mesmo.\"\n[s6] \"Parece que você ganhou o sorteio.\""

1010202-55 = "Waaaaaaaaaaaaa!"

1010202-56 = "Isto significa que se esperares, haverá bom tempo no percurso marítimo...! #nFinalmente, há felicidade na minha vida...!"

1010202-60 = "...Bem, não parece um \"maiô VIP de luxo dourado de alta qualidade\"."

1010202-61 = "まあ、細かいことは良いでしょう……えへへ。"
1010202-62 = "さっそく着てみますね……！"
1010202-66 = "...Ehehe, o que você acha?"

1010202-67 = "[s] \"Combina bem com você.\""

1010202-68 = "Eu estou tão feliz...."

1010202-69 = "Parece que todo o trabalho duro que fiz até agora valeu a pena..."

1010202-73 = "Isso mesmo."

1010202-77 = "Este não é o momento!"

1010202-78 = "[s] \"...O que é isso?\""

1010202-79 = "Estes são os postais de prémios de revistas que colecionei até agora!"

1010202-80 = "Este tem óculos escuros e este tem uma boia! #nVocê pode até comprar uma máquina de gelo raspado...!"

1010202-81 = "Hehe, o que devemos fazer se obtivermos todas as respostas... #nVocê poderá passar o verão mais luxuoso...!"

1010202-82 = "Ah, está tudo bem. Também temos postais para #nprofessores!"

1010202-83 = "Ehehe. Estou ansioso pelo mar...!"

