[translation]
1012003-1 = "2º período “Aula extracurricular: Arte”"

1012003-9 = "Ei, ei, professor, estive esperando."

1012003-10 = "Por que um filme de repente?"

1012003-11 = "Fiquei preso praticando bateria por um tempo..."

1012003-12 = "É a primeira vez que toco bateria. #nEu não me inspiro se enfrento isso o tempo todo..."

1012003-13 = "Enquanto procurava por uma nova inspiração, ouvi que um revival de “Session” estava sendo exibido."

1012003-14 = "Não é uma obra-prima atemporal?"

1012003-15 = "E eu ainda não vi."

1012003-16 = "Você tem que assistir isso."

1012003-17 = "Então preparei esse ingresso... #nSim, isso é para o professor."

1012003-18 = "[s] \"Certamente...você não pode perder isso.\""

1012003-19 = "Nihi, certo?"

1012003-20 = "E quando você vem ao cinema..."

1012003-21 = "Existem alguns doces que você não deve esquecer."

1012003-22 = "São doces que só podem ser degustados aqui."

1012003-23 = "É um doce que se aperfeiçoa casando com um filme."

1012003-24 = "--"Pipoca"."

1012003-25 = "O quê, você vai comprar? #n...obrigado pelo ingresso?"

1012003-26 = "Ah... então vou acreditar na sua palavra..."

1012003-27 = "Posso ter um pouco de luxo...?"

1012003-29 = "(Natsu então escolheu pipoca que veio em quatro sabores: caramelo, morango, éclair e creme de leite #n.)"

1012003-34 = "(Quando entrei no teatro, os assentos estavam vazios.)"

1012003-37 = "Hehe, conforme planejado."

1012003-38 = "[s1] \"Plano...?\"\n[s2] \"Algum tipo de armadilha!?\""

1012003-41 = "Pense nisso, senhor."

1012003-42 = "Como posso aproveitar ao máximo os filmes?"

1012003-43 = "Por que as pessoas vão aos cinemas?"

1012003-44 = "Tela grande e som potente――"

1012003-45 = "E se você pudesse ter tudo só para você?"

1012003-46 = "[s3] \"I-Isso é verdade...\"\n[s4] \"Estranhamente persuasivo...!\""

1012003-49 = "Nihi."

1012003-50 = "É por isso que escolhi propositalmente um horário gratuito."

1012003-51 = "Também verifiquei se o tempo de exibição coincide com o de um filme de grande sucesso."

1012003-53 = "(O teatro escureceu quando chegou a hora do show.)"

1012003-54 = "É hora do show...!"

1012003-61 = "(Se eu estivesse me concentrando, tudo terminaria rapidamente.)"

1012003-63 = "……Sim."

1012003-64 = "Foi mais do que eu esperava."

1012003-65 = "Fiquei surpreso que o personagem principal ficou preso por 15 anos e foi forçado a comer apenas doces, mas nunca esperei que o culpado fosse o mestre do personagem principal..."

1012003-66 = "Esqueci minha pipoca e acabei assistindo o filme..."

1012003-67 = "Quero levar isto para casa comigo, mas..."

1012003-68 = "Hum..."

1012003-69 = "Professor, você ainda tem trabalho a fazer na placa de Petri?"

1012003-70 = "[s5] \"Ugh, esqueci...\"\n[s6] \"Estou começando a ficar triste...\""

1012003-73 = "Isso mesmo, isso mesmo. Entendi."

1012003-74 = "Vamos dar a pipoca para a professora."

1012003-75 = "Quando estou cansado, quero algo doce."

1012003-76 = "Essas crianças devem ser uma fonte de força para o professor."

1012003-77 = "[s] \"Obrigado. Eu atendo.\""

1012003-79 = "(Depois de voltar à placa de Petri, terminei o resto do meu trabalho enquanto comia pipoca.)"

1012003-80 = "(...a doçura intensa era perfeita para acordar da sonolência)"

