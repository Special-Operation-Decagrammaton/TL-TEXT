[translation]
1012003-1 = "2時間目「課外授業：芸術」"
1012003-9 = "やぁやぁ先生、待ってたよ。"
1012003-10 = "どうしていきなり映画かって？"
1012003-11 = "ちょっとドラムの練習が行き詰っちゃっててね……。"
1012003-12 = "ドラムの演奏は初めてだし。#nずっと向き合ってるとインスピレーションも湧かなくって……。"
1012003-13 = "新しい刺激を探してたら、『ゼッション』がリバイバル上映されるって話を聞いたの。"
1012003-14 = "あの不朽の名作だよ？"
1012003-15 = "しかも、私はまだ観たことがない。"
1012003-16 = "これは観るしかないよね。"
1012003-17 = "そこで用意したのが……このチケット。#nはい、これは先生の分。"
1012003-18 = "[s] \"たしかに……これは見逃せないね。\""
1012003-19 = "にひ、でしょでしょ？"
1012003-20 = "そして、映画館に来たら――"
1012003-21 = "忘れちゃいけないお菓子がある。"
1012003-22 = "それは、ここでしか味わえないお菓子。"
1012003-23 = "それは、映画とのマリアージュで完成されるお菓子。"
1012003-24 = "――「ポップコーン」。"
1012003-25 = "え、買ってくれるの？#n……チケットのお礼？"
1012003-26 = "おぉ……じゃあお言葉に甘えて……。"
1012003-27 = "ちょっと贅沢してもいい……？"
1012003-29 = "（そうしてナツは、キャラメル味、イチゴ味、エクレア味、#nクロテッドクリーム味の4種類が楽しめるポップコーンを選んだ）"
1012003-34 = "（シアターに入ると、席はガラガラだった）"
1012003-37 = "ふふ、計画通り。"
1012003-38 = "[s1] \"計画……？\"\n[s2] \"なにかの罠！？\""
1012003-41 = "考えてみて、先生。"
1012003-42 = "どうやったら映画を最高に楽しめるか。"
1012003-43 = "なぜ映画館にまで来るのか。"
1012003-44 = "大画面と、迫力のサウンド――"
1012003-45 = "それを独り占めできたら……？"
1012003-46 = "[s3] \"た、たしかに……。\"\n[s4] \"妙に説得力が……！\""
1012003-49 = "にひ。"
1012003-50 = "だからわざわざ空いている時間帯を選んだわけだよ。"
1012003-51 = "大ヒットしてる映画と上映時間が被ってるのもチェック済み。"
1012003-53 = "（上映時間になりシアターが暗くなった）"
1012003-54 = "イッツショータイム……！"
1012003-61 = "（集中していたらあっという間に終わってしまった）"
1012003-63 = "……うん。"
1012003-64 = "想像以上だったね。"
1012003-65 = "主人公が15年も監禁されて、スイーツだけ食べさせられてたのも驚きだったけど……#nまさかその犯人が、主人公の師匠だったなんて……。"
1012003-66 = "この私が、ポップコーンを忘れて映画に見入ってしまった……。"
1012003-67 = "このまま持って帰りたいけど……。"
1012003-68 = "うーん……。"
1012003-69 = "先生、まだシャーレの仕事残ってる？"
1012003-70 = "[s5] \"うっ、せっかく忘れてたのに……。\"\n[s6] \"悲しくなってきちゃった……。\""
1012003-73 = "そっかそっかー。分かった。"
1012003-74 = "ポップコーンは先生にあげよう。"
1012003-75 = "疲れると甘いものが欲しくなる。"
1012003-76 = "この子たちが先生の力になってくれるはずだ。"
1012003-77 = "[s] \"ありがとう。いただくね。\""
1012003-79 = "（シャーレに戻ったあと、ポップコーンを食べながら残りの仕事を片付けた）"
1012003-80 = "（……強烈な甘さが、眠気覚ましに最適だった）"
