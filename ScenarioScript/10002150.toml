[translation]
10002150-1 = "Epílogo parte 2; Um castelo de areia perfeito?"
10002150-2 = "Ufa... mas, por mais que tenha ocorrido uma batalha, pensar que aquele castelo enorme desmoronou em um instante..."
10002150-3 = "Como a Azusa-san disse, talvez 'tudo seja efêmero'..."
10002150-4 = "[s] \"Era um castelo incrível, que pena...\""
10002150-5 = "Sim, concordo. Mas, na minha opinião, ainda não foi o suficiente."
10002150-6 = "Afinal, o valor de um castelo de areia..."
10002150-7 = "É determinado pelo seu poder de defesa!"
10002150-8 = "Areia molhada é um material fácil de conseguir, mas, ao mesmo tempo, é um material que desmorona facilmente com forças externas."
10002150-9 = "Precisamos conseguir materiais mais fortes..."
10002150-10 = "Por exemplo... vejamos, que tal misturar cimento na areia? Não ficaria um pouco mais resistente?"
10002150-15 = "Não, mesmo que criássemos argamassa com isso, a resistência à tração seria duvidosa. Existe a possibilidade de desmoronar facilmente."
10002150-16 = "Para conseguir resistir a ataques como aquele de agora, seria melhor combinar outros métodos."
10002150-17 = "Entendo, então que tipo de materiais deveríamos usar...?"
10002150-18 = "A argamassa em si não é um material ruim. O preço da matéria-prima é barato e é fácil de encontrar."
10002150-19 = "Porém, como eu disse antes, o problema é a resistência à tração."
10002150-20 = "Ou seja... basta enterrar vergalhões de ferro dentro da argamassa."
10002150-21 = "Se fizermos isso, com certeza o castelo ficará muito mais resistente do que o anterior."
10002150-22 = "Entendo."
10002150-23 = "Como esperado da Azusa-san, aprendi mais uma coisa hoje."
10002150-24 = "Até agora, com todo o respeito, eu só via a Azusa-san como uma encrenqueira... mas estou surpresa que você tenha esse tipo de conhecimento. É incrível."
10002150-25 = "Essa frase deveria ser minha. Até agora, eu te via apenas como um membro obstinado do Comitê de Justiça..."
10002150-26 = "Mas essa sua flexibilidade me fez pensar que existem pessoas assim por aqui. Vou mudar minha opinião sobre você."
10002150-27 = "[s] \"Isso não deixa de ser um 'castelo de areia'... ou deixa?\""
10002150-29 = "Não, o material contém 'areia' de verdade!"
10002150-31 = "Como foi construído com fins defensivos, é um 'castelo' legítimo."
10002150-34 = "““Por isso é um castelo de areia!””"
10002150-35 = "[s] \"Vocês estão em total sintonia, hein...?\""
10002150-37 = "...Bem, então vamos recomeçar e procurar cimento e vergalhões para construir o 'castelo de areia'."
10002150-38 = "Certo, eu vou preparar o terreno então!"
10002150-43 = "(Depois disso, Mashiro e Azusa se entenderam cada vez melhor e começaram a construir uma fortificação na praia, sob o nome de 'castelo de areia'...)"
