[translation]
10002150-1 = "後日談その2;完全無欠な砂の城？"
10002150-2 = "ふう……しかしいくら戦闘になったとはいえ、あの大きなお城が、ここまで一瞬で崩れてしまうだなんて……。"
10002150-3 = "アズサさんの言う通り、「全ては虚しいもの」なのかもしれませんね……。"
10002150-4 = "[s] \"すごいお城だったのに、残念……。\""
10002150-5 = "はい、同感です。しかし私としては、まだまだ足りなかったのだと思います。"
10002150-6 = "そもそも砂のお城の価値というものは……。"
10002150-7 = "防御力で決まるものですから！"
10002150-8 = "濡れた砂というのは簡単に手に入る素材ですが、同時に外からの力で簡単に崩れてしまう素材でもあります。"
10002150-9 = "もっと、強い材料を手に入れなくては……。"
10002150-10 = "例えば……そうですね、砂にセメントを混ぜるのはいかがでしょう？少しは強固になるのではないでしょうか？"
10002150-15 = "いや、それでモルタルを生み出したとしても、引張強度が心許ない。簡単に崩れてしまう可能性がある。"
10002150-16 = "さっきのような攻撃にも耐えられるようにするためには、他の方法も組み合わせた方が良い。"
10002150-17 = "なるほど、ではどのような材料を使えば……？"
10002150-18 = "モルタル自体は素材として悪くない。原材料の価格も安いし、簡単に手に入る。"
10002150-19 = "ただ、さっきも言ったように問題は抗張力。"
10002150-20 = "つまり……モルタルの中に、鉄筋を埋め込めば良い。"
10002150-21 = "そうすればきっと、さっきのとは比べ物にならないほど強固なお城になるはず。"
10002150-22 = "なるほど。"
10002150-23 = "さすがはアズサさんです、また一つ賢くなりました。"
10002150-24 = "今までアズサさんのことは、恐縮ながら問題児としか認識できておりませんでしたが……こんなノウハウをお持ちだったなんて、驚きました。素晴らしいです。"
10002150-25 = "それはこっちの台詞。これまでずっと、あくまでもあの頑迷な正義実現委員会のメンバーとして見ていたけれど……。"
10002150-26 = "ここまでの柔軟な対応力、こういう者もいるんだと思わされた。考えを改めよう。"
10002150-27 = "[s] \"それはもはや、「砂のお城」じゃないんじゃ……？\""
10002150-29 = "いえ、材料にしっかり「砂」が入ってます！"
10002150-31 = "防衛目的で構築したものだから、れっきとした「お城」だよ。"
10002150-34 = "「「だから砂のお城（です）！」」"
10002150-35 = "[s] \"息ピッタリだね……？\""
10002150-37 = "……さて、じゃああらためて「砂のお城」を作るために、セメントと鉄筋を探しに行こうか。"
10002150-38 = "それでは、私は地盤をならしておきますので！"
10002150-43 = "（その後も、マシロとアズサはますます意気投合していき、海辺に「砂の城」という名のトーチカを築き始めた……。）"
