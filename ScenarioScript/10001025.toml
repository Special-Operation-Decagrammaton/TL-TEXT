[translation]
10001025-1 = "第2話;昼下がりのクーデター"
10001025-2 = "レッドウィンター連邦学園・会長執務室"
10001025-4 = "うぅ……ああもう、うるさいうるさい！いったい何の騒ぎだ！？"
10001025-5 = "おちおち昼寝もできないではないか！"
10001025-8 = "ちぇ、チェリノちゃん！緊急事態です！"
10001025-9 = "こら！いくら急ぎの用事だとしても、お昼寝の時間は邪魔するなと言ったはずだ！"
10001025-10 = "トモエ秘書室長、お前も粛清されたいのか！？"
10001025-11 = "も、申し訳ありません……！"
10001025-12 = "……ですが、緊急事態です。"
10001025-13 = "武装した生徒たちが事務局に押し寄せてきています！"
10001025-14 = "なんだ、またクーデターか？今回はどこの部活だ？"
10001025-15 = "「チョコミント解放戦線」か？それとも「唐揚げにレモンをかけることを許さない革命家集団」か？"
10001025-16 = "まあ、どこだとしてもクーデターなら、マリナ委員長に任せておけばいい。気にするな。"
10001025-17 = "そんな些細なことでわざわざ――"
10001025-19 = "あの、それが……"
10001025-20 = "クーデターを起こした人がその、他でもないマリナ保安委員長でして。"
10001025-22 = "……なっ、なんだと！？"
10001025-26 = "いたた……。"
10001025-27 = "大丈夫ですか、会長！？"
10001025-28 = "だ、大丈夫……。"
10001025-29 = "そ、それより！どうしてマリナがクーデターを？おいらは何もしてないのに！"
10001025-30 = "それは、分かりませんが……。"
10001025-31 = "まさか……この前、マリナが大事に取っておいたプリンをこっそり食べたからか？"
10001025-32 = "それとも、マリナが大事にしている熊のぬいぐるみに、よだれを垂らしたまま昼寝をしたからか？"
10001025-33 = "[s] \"……多分、プリンの方じゃないかな？\""
10001025-34 = "うう……どうしようカムラッド、今からでも新しいプリンを買ってきた方が良いだろうか？"
10001025-35 = "しかし、今レッドウィンター連邦学園に残ってるのは、水を混ぜた薄味のプリンしかないし……。"
10001025-36 = "とにかくここは危険です。もうすぐマリナ委員長の率いる親衛隊が、事務局に到着します。"
10001025-37 = "銃撃戦になるでしょうし、先生も私たちと一緒に避難しましょう。"
10001025-38 = "だ、だが、一体どこに逃げるんだ？"
10001025-39 = "レッドウィンターの外郭付近の、旧校舎へ向かいましょう。"
10001025-40 = "あそこに隠れれば、マリナ委員長も簡単には見つけられないかと。そこに一時撤退を。"
10001025-41 = "そ、そうか、一時的な撤退だな！"
10001025-42 = "決して逃げるわけじゃない！"
10001025-44 = "はい。さあ、急ぎましょう！"
