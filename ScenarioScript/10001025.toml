[translation]
10001025-1 = "Episódio 2: Golpe de Estado no Início da Tarde"
10001025-2 = "Academia Red Winter - Escritório da Presidente"
10001025-4 = "Ugh... Ah, chega, que barulheira! Que confusão é essa, afinal!?"
10001025-5 = "Não dá nem para tirar uma soneca à tarde em paz!"
10001025-8 = "Che, Cherino-chan! É uma emergência!"
10001025-9 = "Ei! Eu já disse para não me interromper durante a hora da soneca, não importa o quão urgente seja o assunto!"
10001025-10 = "Tomoe, chefe da secretaria, você também quer ser expurgada!?"
10001025-11 = "M-mil perdões...!"
10001025-12 = "...Mas é uma emergência."
10001025-13 = "Alunas armadas estão invadindo a secretaria!"
10001025-14 = "O quê, outro golpe de estado? De qual clube é desta vez?"
10001025-15 = "A 'Frente de Libertação de Chocolate com Menta'? Ou o 'Grupo Revolucionário que Não Tolera Colocar Limão no Frango Frito'?"
10001025-16 = "Bem, não importa quem seja, se é um golpe, é só deixar com a presidente Marina. Não se preocupe com isso."
10001025-17 = "Não precisa me incomodar por algo tão trivial—"
10001025-19 = "Bem, é que..."
10001025-20 = "A pessoa que liderou o golpe é, nada mais nada menos, que a presidente do comitê de segurança, Marina."
10001025-22 = "...O-o quê você disse!?"
10001025-26 = "Ai, ai..."
10001025-27 = "Você está bem, Presidente!?"
10001025-28 = "E-estou bem..."
10001025-29 = "E-Ei, esquece isso! Por que a Marina faria um golpe de estado? Eu não fiz nada!"
10001025-30 = "Eu não sei dizer, mas..."
10001025-31 = "Será que... foi porque eu comi escondido aquele pudim que a Marina estava guardando com tanto carinho?"
10001025-32 = "Ou será porque eu tirei uma soneca babando em cima do urso de pelúcia que ela tanto estima?"
10001025-33 = "[s] \"...Provavelmente foi por causa do pudim, não acha?\""
10001025-34 = "Uuu... o que eu faço, Camarada? Será que é melhor eu ir comprar um pudim novo agora mesmo?"
10001025-35 = "Mas, agora só restou aquele pudim aguado misturado com água na Academia Red Winter..."
10001025-36 = "De qualquer forma, aqui é perigoso. A guarda pessoal liderada pela presidente Marina chegará à secretaria em breve."
10001025-37 = "Vai haver um tiroteio, então Sensei, vamos evacuar conosco."
10001025-38 = "M-Mas, para onde exatamente vamos fugir?"
10001025-39 = "Vamos em direção ao prédio antigo, perto da periferia de Red Winter."
10001025-40 = "Se nos escondermos lá, acho que a presidente Marina não nos encontrará facilmente. Vamos recuar temporariamente para lá."
10001025-41 = "E-Entendi, um recuo temporário!"
10001025-42 = "Não é como se eu estivesse fugindo!"
10001025-44 = "Sim. Vamos, precisamos nos apressar!"
