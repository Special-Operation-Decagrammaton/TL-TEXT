[translation]
10036120-1 = "スクワッドがお祭りを楽しむ方法"
10036120-2 = "（サオリのDJステージが終わったあと……）"
10036120-5 = "ライブ、とても素晴らしかったです！"
10036120-6 = "雑誌の表紙を飾ってもおかしくないくらいでした！"
10036120-11 = "ほ、褒めすぎだ。"
10036120-12 = "……気づいたら終わっていた。#nもう一度やるのは無理だろう。"
10036120-13 = "だが、みんなが楽しんでくれたのなら何よりだ。"
10036120-18 = "うん、楽しかったよ。"
10036120-19 = "私も、ヒヨリも、ミサキも……すごく盛り上がったの。"
10036120-20 = "ミサキも？"
10036120-24 = "か、勝手に巻き込まないでよ。"
10036120-25 = "わ、私はただ……場に合わせただけ。"
10036120-26 = "ふふ、素直じゃないね。"
10036120-27 = "サッちゃんも休憩時間だよね？#nみんなで会場を見て回ろう。"
10036120-28 = "今しか休む時間、なさそうだったから。"
10036120-29 = "夜のお祭りは、昼と雰囲気が違うよ。"
10036120-30 = "せっかく海に来たんだから、バイトばかりじゃもったいない。"
10036120-32 = "そ、そこまで気にする必要は……。"
10036120-33 = "ダメ。"
10036120-34 = "サッちゃんも一緒に楽しむの。"
10036120-35 = "わ、分かった。"
10036120-36 = "では、あそこのクラゲ水槽エリアはどうだ？"
10036120-37 = "クラゲ水槽って何……？"
10036120-38 = "で、では、アレなんかどうでしょう……？"
10036120-43 = "「全弾発射！」"
10036120-44 = "「標的を阻止し……」"
10036120-45 = "「景品をゲットしよう！」"
10036120-46 = "……人、いっぱいだね。"
10036120-47 = "……あんまり気は乗らないけど。"
10036120-48 = "人がいっぱいいるし、照明で目がチカチカするし。"
10036120-50 = "……。"
10036120-51 = "そ、そうですよね……#nやっぱり、私たちにゲームをする機会なんて……。"
10036120-52 = "一晩中クラゲの水槽でも眺めてるのがお似合いです……。"
10036120-54 = "お、落ち着け、ヒヨリ。#nミサキは嫌とは言ってない。"
10036120-56 = "なっ……。"
10036120-57 = "一度やってみるのも悪くないだろう。"
10036120-58 = "うん。みんなと一緒なら、楽しそう。"
10036120-63 = "……はぁ。"
10036120-64 = "仕方ないね。"
10036120-65 = "え、えへへ……！"
