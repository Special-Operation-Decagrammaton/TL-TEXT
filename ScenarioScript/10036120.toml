[translation]
10036120-1 = "Como o esquadrão aproveita o festival"
10036120-2 = "（Depois que o show de DJ da Saori terminou……）"
10036120-5 = "O show foi maravilhoso!"
10036120-6 = "Foi tão bom que não seria exagero dizer que daria capa de revista!"
10036120-11 = "E-está exagerando nos elogios."
10036120-12 = "……Quando percebi, já tinha acabado. #nSeria impossível fazer de novo."
10036120-13 = "Mas, se todos se divertiram, é o que importa."
10036120-18 = "Sim, foi divertido."
10036120-19 = "Eu, a Hiyori e a Misaki... ficamos muito animadas."
10036120-20 = "A Misaki também?"
10036120-24 = "N-não me envolva nisso sem permissão."
10036120-25 = "E-eu só... entrei no clima do ambiente."
10036120-26 = "Fufu, você não é nada sincera."
10036120-27 = "Sa-chan, agora é hora de descansar, né? #nVamos dar uma volta pelo local com todo mundo."
10036120-28 = "Parece que esse é o único momento que teremos para descansar."
10036120-29 = "O festival à noite tem uma atmosfera diferente do dia."
10036120-30 = "Já que viemos até a praia, seria um desperdício ficar só trabalhando."
10036120-32 = "N-não precisa se preocupar tanto assim……"
10036120-33 = "Não aceito não."
10036120-34 = "A Sa-chan também vai se divertir com a gente."
10036120-35 = "T-tá bom, entendi."
10036120-36 = "Então, que tal aquela área do aquário de águas-vivas?"
10036120-37 = "O que é um aquário de águas-vivas……?"
10036120-38 = "E-então, que tal aquilo ali……?"
10036120-43 = "“Disparo total!”"
10036120-44 = "“Interceptar o alvo……”"
10036120-45 = "“Vamos pegar os prêmios!”"
10036120-46 = "……Tem muita gente aqui, né."
10036120-47 = "……Não estou muito a fim."
10036120-48 = "Tem gente demais e as luzes estão deixando meus olhos cansados."
10036120-50 = "……."
10036120-51 = "V-verdade, né…… #nNo fim das contas, não é como se tivéssemos chances de jogar jogos……"
10036120-52 = "Ficar olhando para o aquário de águas-vivas a noite toda combina mais com a gente……"
10036120-54 = "A-acalme-se, Hiyori. #nMisaki não disse que não queria."
10036120-56 = "O quê……"
10036120-57 = "Tentar uma vez não deve ser ruim."
10036120-58 = "Sim. Se for com todo mundo, parece divertido."
10036120-63 = "……Haa."
10036120-64 = "Não tem jeito, né."
10036120-65 = "E-ehehe……!"
