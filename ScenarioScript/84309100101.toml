[translation]
84309100101-6 = "貴女たち、仲が良さそうね。"
84309100101-7 = "あん？急にどうした。"
84309100101-8 = "……何でもないわ。"
84309100101-10 = "興味があるなら、今度一緒に、脱出ゲームにでも参加してみるかい？ものによっては、潜入ミッションさながらの緊張感を味わえるらしい。"
84309100101-11 = "トリニティで開催されるものなら、君も気兼ねなく参加できるのではないかな。"
84309100101-13 = "脱出ゲームだぁ？あんなのお遊びじゃねえか。"
84309100101-14 = "私が参加してもいいのかしら……。"
84309100101-15 = "参加したいのか、したくないのか。シンプルな話だろ？"
84309100101-16 = "私は……。"
84309100101-17 = "……やるべきことが終わったら、また話すわ。"
84309100101-18 = "分かった……もちろん、その場合は君にも同行してもらうよ？ネル。"
84309100101-22 = "……なんであたしが！？"
84309100101-23 = "ああ。三人一緒だ。"
