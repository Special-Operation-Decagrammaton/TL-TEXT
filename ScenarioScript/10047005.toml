[translation]
10047005-1 = "プロローグ;予言"
10047005-5 = "……時は、満ちました。"
10047005-6 = "アルカナの導きのもと、新たな未来を占う時です……。"
10047005-7 = "にゅふふっ……では始めましょうか。#n「忌むべき者たち」が終末をもたらす前に。"
10047005-13 = "『……運命に導かれし者よ』"
10047005-14 = "『星の加護は、やがて……希望の光に』"
10047005-15 = "『それは暁に昇り、不浄を消し去る太陽にして……』"
10047005-16 = "『挫折を乗り越え、進み征く勝利の戦車』"
10047005-17 = "『その偉大なる力は、不吉な塔を崩し――』"
10047005-19 = "『[ruby=さんらん]燦爛[/ruby]たる夜明けをもたらすだろう』"
10047005-24 = "……こ、これは！"
10047005-25 = "間違いありません……！#nまさに、みんなの願いが叶うという予言！"
10047005-26 = "にゅふふ。私の芸術センスが爆発する日も……近い！"
10047005-27 = "にゅふっ、にゅふふふ……。"
10047005-28 = "にゅふふふふふ……！！"
10047005-32 = "どんな未来だろうと、怖くありません！"
10047005-33 = "さぁ、踏み出しましょう――"
10047005-34 = "歴史に刻まれる、輝かしい一歩を！"
