[translation]
10047005-1 = "Prólogo; Profecia"
10047005-5 = "……O tempo chegou."
10047005-6 = "Sob a orientação dos arcanos, é hora de prever um novo futuro……."
10047005-7 = "Nyufufu…… então, vamos começar? #nAntes que os \"malditos\" tragam o fim."
10047005-13 = "『……Ó, aquele guiado pelo destino』"
10047005-14 = "『A bênção das estrelas, em breve…… se tornará a luz da esperança』"
10047005-15 = "『Ela é o sol que ascende na alvorada e apaga a impureza……』"
10047005-16 = "『A carruagem da vitória que supera os fracassos e segue em frente』"
10047005-17 = "『Seu grande poder derrubará a torre sinistra――』"
10047005-19 = "『Trará um amanhecer resplandecente』"
10047005-24 = "……I-isso é!"
10047005-25 = "Não há dúvidas……! #nÉ exatamente a profecia de que os desejos de todos se realizarão!"
10047005-26 = "Nyufufu. O dia em que meu senso artístico explodirá…… está próximo!"
10047005-27 = "Nyufu, nyufufufu……."
10047005-28 = "Nyufufufufufu……!!"
10047005-32 = "Não importa que tipo de futuro seja, não tenho medo!"
10047005-33 = "Vamos lá, dê o passo――"
10047005-34 = "Um passo glorioso que ficará gravado na história!"
