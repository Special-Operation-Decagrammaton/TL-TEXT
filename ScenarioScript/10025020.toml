[translation]
10025020-1 = "Episódio 2: A Sombra da Vila de Yatoura"
10025020-2 = "Vila de Yatoura - Cais"
10025020-14 = "Com licença... olá."
10025020-15 = "……."
10025020-16 = "Você é um dos moradores, por acaso?"
10025020-17 = "……."
10025020-18 = "Bem... eu vim aqui para nadar com uns amigos, mas o tempo não está muito bom..."
10025020-19 = "Sabe de algum lugar por perto onde o mar esteja mais calmo?"
10025020-20 = "……Se quer nadar, procure em outro lugar."
10025020-21 = "Yatoura é uma vila entediante onde a única coisa que presta são os camarões."
10025020-22 = "S-sério?#nEu acho que é uma vila encantadora, na verdade..."
10025020-23 = "Humpf... você tem um gosto peculiar."
10025020-27 = "Faça o que quiser.#nMas não atrapalhe a pescaria."
10025020-28 = "……Muito obrigada."
10025020-32 = "Ah... aquele é o barco usado para descarregar os camarões?"
10025020-33 = "……É sim."
10025020-34 = "É maior do que eu pensava.#nVocês vão sair para pescar agora?"
10025020-36 = "……Você acha mesmo que alguém sairia para pescar a esta hora?"
10025020-37 = "Ah, não... perdão."
10025020-39 = "A pescaria termina ao amanhecer.#nAgora os barcos estão apenas ancorados para não se moverem."
10025020-40 = "E-entendo, compreendo..."
10025020-41 = "……Vocês conseguiram pescar camarões?"
10025020-43 = "……Por que quer saber disso?"
10025020-44 = "Não foi por nenhum motivo especial... peço desculpas se lhe causei algum incômodo."
10025020-46 = "É que ultimamente não temos visto camarões de Yatoura na D.U., então fiquei curiosa..."
10025020-47 = "Até nas redes sociais o pessoal estava comentando se algo tinha acontecido..."
10025020-51 = "……Eu não sei de nada."
10025020-52 = "Ei, espere—"
10025020-53 = "Lidamos com seres vivos.#nSe fosse possível pescar o quanto quiséssemos, todo mundo estaria pescando camarão, não acha?"
10025020-54 = "Tudo depende do humor do mar. Além disso, meu trabalho termina quando trago os camarões.#nO que acontece depois não é comigo."
10025020-56 = "E outra, não sei por que uma forasteira se importa tanto com o nosso trabalho.#nNão me importo que faça turismo, mas tome cuidado com o que diz.#nCuriosidade excessiva não é algo agradável."
10025020-58 = "Sim... sinto muito."
10025020-66 = "Entendido? Não ouse atrapalhar a pescaria."
10025020-67 = "Dizem que a curiosidade matou o gato.#n...É melhor tomar cuidado com os \"Profundos\"."
10025020-73 = "……\"Profundos\"?"
10025020-78 = "Em frente à Filial de Yatoura da Guarda Costeira da Valkyrie"
10025020-82 = "Ei, tem alguém aí?"
10025020-90 = "Ugh... quem é que vem a esta hora..."
10025020-97 = "……Hmm, nunca vi esse rosto antes... bem, quem é você?"
10025020-98 = "Ah, eu vim aqui para nadar, mas—"
10025020-99 = "……Nadar? Na Vila de Yatoura?"
10025020-100 = "Tem certeza de que está no lugar certo? Não seria outra vila?"
10025020-101 = "Que jeito rude de falar.#nAcho que deve haver turistas que visitam esta vila, sim."
10025020-102 = "Não... é que é muito raro ver turistas visitando uma vila como esta..."
10025020-103 = "Nós só estamos aqui porque fomos designadas, mas se pudéssemos, nos transferiríamos para outra filial o quanto antes."
10025020-105 = "Neste fim de mundo, basicamente não há trabalho, então é impossível conseguir qualquer mérito..."
10025020-107 = "(É a primeira vez que vejo uma aluna da Valkyrie falar tão mal da sua própria área de jurisdição...)"
10025020-109 = "Entendo. De qualquer forma, eu queria saber de antemão quais pontos devo evitar ao nadar por aqui..."
10025020-110 = "Houve algum acidente ou incidente recentemente?"
10025020-111 = "……Quem sabe. Acho que não, não é?"
10025020-112 = "……？"
10025020-113 = "Se tivesse ocorrido um acidente marítimo, acho que estaria nos jornais."
10025020-114 = "Nós também estamos ocupadas. Então, divirtam-se."
10025020-115 = "Você não disse agorinha que não tinha trabalho!?"
10025020-117 = "É por isso que esse pessoal da Valkyrie..."
10025020-122 = "Nós também, no começo..."
10025020-127 = "Não... não é nada, por favor, não se preocupe."
10025020-128 = "De qualquer forma, estamos ocupadas com o trabalho, então, por favor, tente não causar problemas."
10025020-130 = "Se algo como um acidente marítimo acontecer por causa de um julgamento dos \"Profundos\", isso causará transtornos aos moradores da vila.#n"
10025020-139 = "……Que agouro."
10025020-140 = "……O que são esses \"Profundos\"?"
10025020-148 = "……Ninguém está olhando, né?"
10025020-149 = "Ah, puxa vida, como são frios com forasteiros.#nEu só queria perguntar uma coisinha, não precisavam ter agido daquele jeito."
10025020-150 = "Mas bem, consegui a informação...#nCom isso, pescar um peixão não é só um sonho..."
10025020-151 = "A-ah, com licença..."
10025020-155 = "Desculpe por atrapalhar...#nÉ que, faz um tempo que minha linha de pesca está no seu pé..."
10025020-156 = "Opa!? De onde você surgiu!?"
10025020-160 = "Bem... eu estou pescando aqui faz um bom tempo..."
10025020-161 = "É como eu pensei... mesmo de roupa de banho, eu não tenho presença nenhuma..."
10025020-163 = "Com o tempo, todos esquecem de mim... e no fim, acabo como uma estrela-do-mar seca..."
10025020-165 = "Não, não! Não é nada disso!"
10025020-166 = "Eu só estava distraído pensando em algumas coisas, por isso não notei.#nEu que peço desculpas por ter atrapalhado."
10025020-167 = "Como um pedido de desculpas... vou te dar um pouco das minhas iscas.#nPelo visto, é isso que se usa por aqui."
10025020-171 = "Ah, muito obrigada..."
10025020-172 = "……Por acaso, você veio para a Vila Yotoura para pescar...?"
10025020-173 = "Ah!#nOuvi boatos de que dá para pescar peixes enormes aqui!"
10025020-174 = "A-ah, entendo... Eu só vim passear com amigos...#nNão sabia que este era um ponto de pesca..."
10025020-175 = "Bem, que tipo de peixe se pesca nesta vila...?"
10025020-176 = "P-peixe, é..."
10025020-177 = "……Carapaus, talvez?"
10025020-178 = "Carapaus... acho difícil pegar um com uma isca para peixes tão grandes..."
10025020-179 = "São peixes pequenos...#nCom essa isca..."
10025020-180 = "S-sério...?"
10025020-181 = "M-mas... pode ser que existam peixes enormes que só mordem iscas grandes!"
10025020-183 = "Além disso, se os \"Profundos\" me derem uma força, devo conseguir pescar um carapau de 1 metro!"
10025020-185 = "\"Profundos\"...?"
10025020-187 = "……Opa."
10025020-188 = "Não, esquece. Foi só um pensamento alto."
10025020-189 = "De qualquer forma, vou procurar um ponto de pesca, então não me siga!#nEntendido? Peixes são sensíveis a barulho!"
10025020-190 = "……Ah, é. Não conte para o pessoal da vila que ouviu isso de mim!"
10025020-197 = "……Tem algo estranho."
