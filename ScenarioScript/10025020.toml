[translation]
10025020-1 = "第2話;[ruby=やとうら]夜戸浦[/ruby]村の影"
10025020-2 = "夜戸浦村・船着場"
10025020-14 = "あの……こんにちは。"
10025020-15 = "……。"
10025020-16 = "住民の方、でしょうか？"
10025020-17 = "……。"
10025020-18 = "その……友達と海水浴に来たのですが、天気があまり良くなくて……"
10025020-19 = "どこか、近くに波が落ち着いている浜辺はないでしょうか？"
10025020-20 = "……海水浴なら、他をあたれ。"
10025020-21 = "[ruby=やとうら]夜戸浦[/ruby]は、エビだけが取り柄のつまらない村だからな。"
10025020-22 = "そ、そうでしょうか？#n私は素敵な村だと思いますが……。"
10025020-23 = "フン……物好きだな。"
10025020-27 = "好きにするがいい。#nだが、漁の邪魔だけはしないでくれ。"
10025020-28 = "……ありがとうございます。"
10025020-32 = "あっ……あちらがエビの水揚げで使われている船でしょうか？"
10025020-33 = "……そうだ。"
10025020-34 = "思ったよりも大きいんですね。#nこれから漁に出るのですか？"
10025020-36 = "……こんな時間から漁に出るヤツがいると思うのか？"
10025020-37 = "いっ、いえ……。"
10025020-39 = "漁なら明け方に終わっとる。#n今は船が動かんように留めているところじゃ。"
10025020-40 = "そ、そうなのですね……。"
10025020-41 = "……エビは捕れましたか？"
10025020-43 = "……それを聞いてどうする。"
10025020-44 = "特に深い意味があったわけでは……気を悪くされたなら申し訳ありません。"
10025020-46 = "最近D.U.で夜戸浦産のエビを見なくなったので、気になりまして……"
10025020-47 = "SNSでも何かあったのでは、と話題になっていましたし……"
10025020-51 = "……ワシは知らん。"
10025020-52 = "あの――"
10025020-53 = "ワシらは生き物を相手にしておる。#n思い通りに水揚げできるなら、みんなエビ漁をしてるはずだろう？"
10025020-54 = "すべては海の機嫌次第。それに、ワシの仕事はエビを捕ってくるところまでじゃ。#n後のことは知らん。"
10025020-56 = "それに、よそ者がワシらの仕事を気にして何になるというのだ。#n好きに観光するのは構わんが、口には気をつけることだな。#n無用な詮索は気分が良いものではない。"
10025020-58 = "はい……すみません。"
10025020-66 = "いいか、くれぐれも漁の邪魔はするな。"
10025020-67 = "好奇心は猫をも殺すと言うじゃろう。#n……「深きもの」には気をつけることだ。"
10025020-73 = "……「深きもの」？"
10025020-78 = "ヴァルキューレ海洋警備局・夜戸浦支部前"
10025020-82 = "おーい、誰か居ないのか？"
10025020-90 = "う……誰だ、こんな時間に……"
10025020-97 = "……んん、初めてみる顔だな……えっと、どちら様ですか？"
10025020-98 = "ああ、私はここに海水浴に来たんだが――"
10025020-99 = "……海水浴ですか？[ruby=ここ]夜戸浦村[/ruby]に？"
10025020-100 = "本当に合ってます？別の村ではなく？"
10025020-101 = "ひどい言い様だな。#nこの村を訪れる観光客だっているだろうに。"
10025020-102 = "いえ……こんな村に観光客が訪れるのは、本当に珍しいので……"
10025020-103 = "私たちは配属されたから仕方なく留まっているだけで、できることなら一日でも早く別の支所に移りたいと思ってるんですよ。"
10025020-105 = "こんな僻地じゃ、基本的に仕事もないので実績を上げられるはずもなく……。"
10025020-107 = "（自分の担当エリアをここまで悪し様に言うヴァルキューレ生は初めて見たな……）"
10025020-109 = "そうなんだな。ともあれ、ここで泳ぐ際に気をつけなければならないポイントを事前に聞いておきたいんだが……"
10025020-110 = "ここ最近、事故や事件はなかったか？"
10025020-111 = "……さあ。ないんじゃないですか？"
10025020-112 = "……？"
10025020-113 = "海難事故が起きたのであれば、新聞に載ってると思いますけど。"
10025020-114 = "私たちも忙しいんですよ。それじゃあ、ごゆっくり。"
10025020-115 = "さっきは仕事がないって言ってなかったか！？"
10025020-117 = "これだから、ヴァルキューレのヤツらは……。"
10025020-122 = "私たちだって、初めは――"
10025020-127 = "いえ……何でもありません、気にしないでください。"
10025020-128 = "とにかく、私たちは仕事で忙しいので、問題だけは起こさないようにお願いしますよ。"
10025020-130 = "「深きもの」に裁きを下されて海難事故でも起きようものなら、#n村の皆さんに迷惑がかかりますので。"
10025020-139 = "……縁起でもない。"
10025020-140 = "……「深きもの」ってなんだ？"
10025020-148 = "……誰も見てないよな？"
10025020-149 = "あーあ、まったく余所者にどんだけ冷たいんだ。#nちょっと教えてほしいだけなのに、あんな風にしなくてもよぉ。"
10025020-150 = "まあでも、情報は手に入れたし……#nこれで大物も夢じゃ――"
10025020-151 = "あ、あの……"
10025020-155 = "邪魔しちゃってごめんなさい……#nその、先ほどから私の釣り糸が、あなたの足に……"
10025020-156 = "おわっ！？いつの間に人がっ！？"
10025020-160 = "えっと……結構前から、ここで釣りをしてたんですが……"
10025020-161 = "やっぱり……私は水着姿でも存在感がないんですね……"
10025020-163 = "いつしかみんなに忘れられて……最後は干からびたヒトデのように……"
10025020-165 = "違う違う！そういう意味じゃないから！"
10025020-166 = "ちょっと考え事をしてたから、気づかなかっただけなんだ。#nこっちこそ邪魔しちゃって悪かったな。"
10025020-167 = "お詫びと言ってはなんだが……オレのルアーを少し分けてやるよ。#nこの辺りだと、これを使うみたいでさ。"
10025020-171 = "あ、ありがとうございます……"
10025020-172 = "……もしかして、[ruby=ここ]夜戸浦村[/ruby]には釣りをするために……？ "
10025020-173 = "ああ！#nここでなら大物が釣れるって噂を聞いてな！"
10025020-174 = "そ、そうなんですね……私は友達と観光に来ただけなので……#nここが釣りスポットだったなんて、知りませんでした……"
10025020-175 = "えっと、この村ではどんなお魚が釣れるんですか……？"
10025020-176 = "さ、魚か……"
10025020-177 = "……アジ、とか？"
10025020-178 = "アジ……こんな大物用のルアーじゃ、難しいと思います……"
10025020-179 = "小さいお魚ですし……#nこのルアーでは……"
10025020-180 = "そ、そうか……？"
10025020-181 = "で、でも……大きいルアーじゃないと引っかからないような大物がいるかもしれないじゃないか！"
10025020-183 = "それに「深きもの」が力を貸してくれれば、1m級のアジが釣れるはずだ！"
10025020-185 = "「深きもの」……？"
10025020-187 = "……っと。"
10025020-188 = "いや、気にすんな。ただの独り言だ。"
10025020-189 = "ともかく、オレは釣りポイントを探しに行くから、ついてくるんじゃねーぞ！#nいいか？魚は音に敏感だからな！"
10025020-190 = "……あ、そうだ。今の話、オレから聞いたって村の人たちには内緒にしてくれ！"
10025020-197 = "……何か、変。"
