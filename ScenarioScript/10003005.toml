[translation]
10003005-1 = "Ordem de Missão Especial de Emergência da Administradora do Comitê de Disciplina"
10003005-3 = "Vamos tirar férias!"
10003005-7 = "……Sim?"
10003005-8 = "Férias……? De novo, tão de repente……?"
10003005-10 = "Ora……? A reação de vocês não está muito boa, não é? Não é como se eu estivesse brincando ou algo do tipo, sabe?"
10003005-12 = "Não é questão de ser boa ou não……"
10003005-13 = "Quando ouvi que era uma convocação de emergência, imaginei do que se tratava, mas……"
10003005-14 = "Não me importo que você vá tirar férias, mas…… não tem nada a ver conosco, ou melhor, não sei por que está nos contando isso……"
10003005-15 = "Bem, tudo bem. Então, para onde você vai tirar férias, Ako-chan?"
10003005-17 = "……Sim?"
10003005-18 = "Do que você está falando? Não estou falando das minhas férias!"
10003005-19 = "Ou melhor…… será que vocês acharam que eu chamei todos aqui só para me gabar das minhas próprias férias?"
10003005-20 = "Eu pareço ser o tipo de pessoa que faria algo assim……!?"
10003005-21 = "Estou chocada…… bem, deixando isso de lado. Essas \"férias\" de que falo são para o nosso Comitê de Disciplina……"
10003005-22 = "Não, sendo mais precisa, estou falando das férias da Presidente!"
10003005-24 = "……Da Presidente?"
10003005-25 = "Por que de repente algo assim……?"
10003005-27 = "É que…… ultimamente, o comportamento da Presidente tem estado estranho……"
10003005-28 = "O estresse deve ter aumentado tanto que chego a ficar preocupada com o estado dela……"
10003005-29 = "O que você quer dizer com isso?"
10003005-30 = "Por exemplo, hoje de manhã, quando visitei a sala da Presidente……"
10003005-34 = "Presidente. Vou deixar aqui o relatório com a agenda desta semana."
10003005-35 = "E também trouxe um café que preparei, sinta-se à vontade para tomar."
10003005-37 = "……Hum."
10003005-39 = "Recebi uns grãos muito bons por acaso outro dia."
10003005-40 = "Preparei com calma, então o aroma está maravilhoso."
10003005-41 = "……Entendo."
10003005-43 = "Ah……"
10003005-44 = "(Fufu. A Presidente está tão concentrada no trabalho que nem percebeu que o café está esfriando…… Ela é maravilhosa como sempre……!)"
10003005-45 = "Hum……? Ei, Ako, o que é essa \"Proposta de Cooperação em Atividades de Patrulha com o Schale\"……?"
10003005-46 = "Ah……? Bem, pensei que seria bom se o Schale pudesse nos ajudar um pouco com as patrulhas regulares do Comitê de Disciplina."
10003005-47 = "……Patrulhar junto com o Schale?"
10003005-48 = "Sim. Mas é apenas uma proposta, se a Presidente disser que não precisa de tal cooperação……"
10003005-49 = "……Não, deixe aí. Se o Schale colaborar, não será algo ruim para o Comitê de Disciplina."
10003005-50 = "……Entendo. Com o Schale, é……"
10003005-52 = "Ah, Presidente……!? Esse é o café que eu estava bebendo……!"
10003005-53 = "……Ah, me enganei."
10003005-54 = "Presidente, é tão raro você cometer um erro desses……"
10003005-55 = "Espere um pouco. Você está dizendo que a Presidente está estranha só por causa disso……?"
10003005-56 = "Qualquer um comete erros assim, não é? É algo para se preocupar tanto?"
10003005-57 = "Eu também não achei que fosse um problema, mas……?"
10003005-58 = "Não termina por aí! Depois disso também……!"
10003005-60 = "……Hum, ainda assim."
10003005-65 = "O café que a Ako preparou é realmente gostoso."
10003005-66 = "……Será que estamos ouvindo as alucinações da Ako-chan agora……?"
10003005-67 = "A Presidente comentar sobre algo que ela come ou bebe é algo tão raro……"
10003005-68 = "Administradora Ako, se você está tão cansada a ponto de ter alucinações auditivas, talvez devesse descansar um pouco……"
10003005-69 = "Não é isso!? Eu ouvi claramente com meus próprios ouvidos, não é alucinação!"
10003005-71 = "Bem, se isso for verdade…… a Presidente deve estar muito cansada mesmo……"
10003005-72 = "Não é como se a Presidente nunca tivesse dito nada antes, mas…… ela realmente disse que estava \"gostoso\", não foi?"
10003005-73 = "Não é algo como \"não é tão ruim assim\", \"não é que eu não consiga beber\" ou \"preciso de cafeína\", não é? Será que o administrador ouviu errado...?"
10003005-75 = "Será que eu estou sendo intimidada agora...? Mesmo estando nesta posição...?"
10003005-76 = "Hmm, bem, de qualquer forma, se o que a Ako-chan está dizendo for realmente verdade..."
10003005-77 = "……Isso é um caso bastante sério."
10003005-78 = "Não é mesmo!? Vocês também acham que isso é estranho, não acham!?"
10003005-79 = "É uma situação de emergência!! Se continuarmos assim, a sobrevivência do Comitê de Disciplina estará em risco!"
10003005-80 = "……Eh, o que você quer dizer com isso?"
10003005-82 = "Se, por acaso, a presidente desmaiasse de exaustão... não seria de se estranhar se o Comitê de Disciplina entrasse em colapso no mesmo dia!"
10003005-83 = "Eh, tipo...?"
10003005-84 = "Não acho que o Pandemonium Society ficaria parado observando se soubesse que o Comitê de Disciplina está sem a presidente..."
10003005-85 = "Eles tentariam tomar o controle de Gehenna e ficariam felizes em nos subjugar!"
10003005-86 = "Se isso acontecer, a Academia Gehenna... não, Kivotos, cairá em um caos sem precedentes!"
10003005-87 = "Em outras palavras, este é um caso que envolve o destino de Kivotos!"
10003005-90 = "Eu entendo o que você quer dizer, mas..."
10003005-91 = "De qualquer forma!"
10003005-92 = "Acima de tudo, a presidente precisa de um descanso agora...! Portanto, eu, Ako Amau, administradora do Comitê de Disciplina de Gehenna, declaro aqui."
10003005-93 = "Tudo pela presidente, pelo Comitê de Disciplina... e pelo futuro de Kivotos!"
10003005-95 = "Como administradora do Comitê de Disciplina, emito aqui uma ordem especial de emergência! Custe o que custar, vamos dar um descanso para aquela presidente ocupada!!"
10003005-97 = "Que exagero..."
10003005-98 = "A administradora Ako fica assim às vezes quando se trata da presidente..."
10003005-99 = "Eu concordo com a ideia, mas não acho que a presidente vá simplesmente dizer \"entendi\" e sair de férias... Eu quase nunca a vi tirar folga..."
10003005-100 = "Verdade. Mesmo que a forçássemos a tirar férias, por algum motivo, ela estaria de volta à academia poucas horas depois..."
10003005-102 = "Pois é... não importa o quanto falemos sobre descanso, ela sempre diz: \"Eu já descanso, uns cinco minutos por dia\"..."
10003005-103 = "A presidente é uma viciada em trabalho de carteirinha..."
10003005-104 = "Essa operação não está fadada ao fracasso desde o início...?"
10003005-105 = "Não! Se não há um motivo, basta criá-lo! Um motivo especial que até a presidente aceite!"
10003005-106 = "Isso é verdade, mas será que conseguimos fazer isso...?"
10003005-107 = "Sim, deixem comigo! Justamente outro dia, recebemos uma solicitação do Pandemonium Society."
10003005-108 = "\"Entreguem o plano de treinamento de verão deste ano\", disseram."
10003005-109 = "Ugh..."
10003005-110 = "Ah... de novo não."
10003005-111 = "Isso é tão chato..."
10003005-112 = "De qualquer forma, eles nem querem que façamos o treinamento direito..."
10003005-113 = "Eles só vão encontrar falhas no plano e reclamar de tudo! E depois vão nos forçar a ir para algum lugar absurdo...!"
10003005-114 = "Eu não quero de jeito nenhum ser mandada para o Vulcão Hinomu como no ano passado... Por que ir para um lugar tão quente no auge do verão..."
10003005-115 = "Mas, como Comitê de Disciplina, não podemos ignorar, né... suspiro."
10003005-116 = "Verdade. Originalmente, eu estava pensando em conversar com o pessoal do departamento de planejamento do Comitê de Disciplina para fazer um treinamento tático qualquer por aqui e enrolar..."
10003005-117 = "Mas a situação mudou. Já que estamos nessa, vamos aproveitar isso."
10003005-118 = "Então você quer dizer que vai convencer a presidente com isso? Mas como...?"
10003005-119 = "Exatamente, Chinatsu."
10003005-120 = "Vamos usar as exigências irritantes do Pandemonium Society para criar um plano de acampamento para o Comitê de Disciplina!"
10003005-121 = "Se dissermos que é uma exigência do Pandemonium Society, a presidente não poderá recusar!"
10003005-122 = "Mas Ako-chan. Mesmo dizendo isso, treinamento ainda é treinamento, não é?"
10003005-123 = "Isso não é o oposto de descansar?"
10003005-124 = "Fufu. É simples, Iori."
10003005-127 = "Vamos fazer o acampamento de verão deste ano na praia!"
10003005-128 = "Vamos para a praia e confinar a presidente em um hotel à beira-mar!"
10003005-129 = "……Confinar?"
10003005-130 = "O que você quer dizer com isso...? Onde foi parar o papo de férias...?"
10003005-131 = "É o que chamam de 'hotel-férias', um 'staycation'!"
10003005-132 = "Hokance... o que é isso?"
10003005-133 = "Hokance... já ouvi falar. É a abreviação de 'férias em um hotel'... é uma nova forma de passar as férias, onde você relaxa tranquilamente em um hotel para aproveitar o clima de férias, certo?"
10003005-134 = "Sim, exatamente."
10003005-135 = "Primeiro, levaremos a Presidente para o mar sob o pretexto de um treinamento."
10003005-136 = "E assim que chegarmos, vamos trancá-la em um hotel à beira-mar e, durante esse período, não entregaremos nenhum trabalho para que ela seja forçada a descansar."
10003005-137 = "E se a impedirmos de sair do hotel, será perfeito...!"
10003005-138 = "Ako-chan, isso é realmente férias!?"
10003005-139 = "Afinal, qualquer um que fique sem nada para fazer acaba ficando parado e só tem a opção de descansar! Se a forçarmos a esse estado, mesmo que ela não faça mais nada, pelo menos ela deve dormir!"
10003005-140 = "Só isso já seria um lucro! A Presidente, sabe-se lá há quantos dias não dorme direito..."
10003005-141 = "Sim... bem, entendi a ideia geral."
10003005-142 = "Será que vai dar certo com a Presidente...?"
10003005-143 = "Fufu, exatamente, Chinatsu. Por isso, preparei uma medida de segurança..."
10003005-145 = "O Sensei do Schale!"
10003005-146 = "Peço o apoio total do Sensei!"
10003005-147 = "[s1] \"Vim porque fui chamado, mas...\"\n[s2] \"Entendi a história, mas ao mesmo tempo não entendi...?\""
10003005-148 = "Hã, quê? Como assim, por que o Sensei...?"
10003005-149 = "Hã, quê? Como assim, por que o Sensei...?"
10003005-150 = "O Schale tem autoridade suficiente para aconselhar e sugerir planos de treinamento para o Comitê Disciplinar de Gehenna."
10003005-151 = "Ou seja, se o Sensei colaborar bem, mesmo que haja alguma interferência, será possível forçar o local do treinamento para o mar. Além disso, é mais fácil conseguir concessões em várias outras coisas."
10003005-152 = "O Schale tinha esse tipo de autoridade... não tem mais limites."
10003005-153 = "Bem, é o Sensei, afinal. Ele está em uma posição de guiar os alunos."
10003005-154 = "[s] \"Entendi o que precisa ser feito, mas será que vai dar certo...?\""
10003005-155 = "Ora, está hesitante? Não me diga que pretende recusar... espero que não, certo?"
10003005-156 = "Bem, se por acaso for o caso, eu tenho meus próprios planos."
10003005-157 = "Nos documentos que coletei no Departamento de Informações, havia várias informações interessantes sobre o Sensei..."
10003005-158 = "Nossa, lá vem a Ako-chan sendo má de novo..."
10003005-159 = "Administradora Ako, esse tipo de atitude com o Sensei do Schale..."
10003005-160 = "[s] \"Não, eu não vou recusar. Pelo contrário, contem com a minha colaboração.\""
10003005-161 = "...?"
10003005-162 = "[s3] \"Tudo isso é por causa da Hina, não é?\"\n[s4] \"Já que todos estão agindo com boas intenções, é claro que vou colaborar.\""
10003005-163 = "Ugh... n-não esperava que você viesse com esse tipo de resposta..."
10003005-164 = "Ugh... n-não esperava que você viesse com esse tipo de resposta..."
10003005-165 = "...Bem, é bem a cara do Sensei, eu suponho."
10003005-166 = "Você foi pega de surpresa, Administradora Ako."
10003005-167 = "[s] \"Além disso, se eu colaborar, vou poder ver todas de biquíni, né!?\""
10003005-168 = "Eu fui uma idiota por ter te elogiado nem que fosse um pouco! Pervertido! Morra logo!"
10003005-170 = "(Que canseira...)"
10003005-171 = "B-bem, de qualquer forma, a colaboração do Sensei está garantida! Só falta convencer a Presidente...!"
10003005-173 = "Sim, entendi."
10003005-174 = "...Hã!? P-Presidente, tem certeza mesmo...!? Você vai mesmo...!?"
10003005-175 = "Não é questão de ter certeza, o treinamento de verão é um evento anual, não é? Não há motivos para recusar."
10003005-176 = "C-certo! É verdade...!"
10003005-178 = "(Haa...)"
10003005-179 = "(Ako-chan, quando se trata da Presidente, dá para ver claramente no seu rosto o que você está planejando...)"
10003005-180 = "Falando nisso, a inspeção deste ano já foi feita."
10003005-181 = "Na região 94-13 do vulcão Hinomu em Gehenna, aquele chalé no sopé."
10003005-182 = "Lá, nem o Pandemonium vai reclamar. O ambiente é rigoroso na medida certa, e se é para fazer, vamos fazer direito."
10003005-183 = "De novo aquele vulcão!? E nem foi o Pandemonium que forçou!?"
10003005-184 = "...Algum problema?"
10003005-185 = "E-ei, Presidente? Quando você diz \"inspeção\", será que você já tinha planejado tudo...?"
10003005-186 = "Sim. Eu imaginei que o Pandemônio fosse dizer algo a respeito em breve."
10003005-187 = "(Não pode ser...! D-desse jeito, todo o plano vai por água abaixo...!)"
10003005-188 = "(O-o que eu faço...!?)"
10003005-191 = "[ns5] \"Acampamento de verão significa praia!\"\n[ns6] \"Acampamento de verão significa trajes de banho!\""
10003005-192 = "……Praia? Trajes de banho……? O que houve, Sensei? Por que de repente... E por que você está aqui……?"
10003005-193 = "……Praia? Trajes de banho……? O que houve, Sensei? Por que de repente... E por que você está aqui……?"
10003005-194 = "……? Na verdade, a Ako também estava preparando secretamente um plano de treinamento em um novo local para desta vez……?"
10003005-195 = "S-sim! É isso mesmo! Eu já tinha avisado o Sensei com antecedência, mas……!"
10003005-196 = "A presidente já é muito ocupada, e não podemos continuar deixando todo o peso sobre ela para sempre."
10003005-197 = "Eu gostaria de reduzir um pouco a carga dela, então…… enquanto uso o plano da presidente como referência, você poderia me deixar tentar organizar o plano desta vez?"
10003005-198 = "Isso é bom, mas nunca fizemos um acampamento na praia antes……."
10003005-199 = "O-o Sensei disse que conhece bem a praia! Tenho certeza de que poderemos realizar um treinamento novo e eficiente!"
10003005-200 = "……Entendo."
10003005-201 = "……Entendido."
10003005-202 = "Se a Ako insiste tanto assim……"
10003005-203 = "……! V-você permite?"
10003005-204 = "Sim, eu confio em você. Você é a oficial administrativa para momentos como este, e já que a Ako se deu ao trabalho de sugerir isso."
10003005-205 = "Como você disse antes, não seria eficiente se eu continuasse carregando tudo sozinha……."
10003005-207 = "Então, por enquanto, conto com você desta vez."
10003005-208 = "Capriche."
10003005-211 = "(Oh……)"
10003005-212 = "(Quem diria que daria certo……)"
10003005-213 = "(Consegui! Com isso……!)"
10003005-214 = "[ns] \"É a praaaaaia!\""
10003005-216 = "(Dessa forma, ficou decidido que o palco do acampamento de treinamento de verão do Comitê Disciplinar deste ano seria a \"praia\")"
10003005-218 = "#video;10003"
