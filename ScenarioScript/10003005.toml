[translation]
10003005-1 = "風紀委員会行政官緊急特務命令"
10003005-3 = "バカンスに行きます！"
10003005-7 = "……はい？"
10003005-8 = "バカンス……？また急だね……？"
10003005-10 = "あら……？反応がいまいちですね？特に冗談ですとか、そういったわけではないですよ？"
10003005-12 = "いまいちも何も……。"
10003005-13 = "緊急の呼び出しと聞いて、何のことかと思ったら……。"
10003005-14 = "バカンスに行かれることは構わないのですが……私たちには関係無いと言いますか、それを聞かされても困ると言いますか……。"
10003005-15 = "まあ良いけど。で、アコちゃんはどこにバカンスに行くの？"
10003005-17 = "……はい？"
10003005-18 = "何を言ってるんですか、私の休暇の話ではありません！"
10003005-19 = "と言いますか……もしかして私、ただ自分の休暇を自慢するために皆さんを呼び出したのだと思われていたんですか？"
10003005-20 = "普段の私、そんなことをする人に見えていたんですか……！？"
10003005-21 = "ショックです……まあ、それはさておき。今回の「バカンス」というのは、私たち風紀委員会……"
10003005-22 = "いえ、正確には、委員長のバカンスのことを言っているんです！"
10003005-24 = "……委員長の？"
10003005-25 = "どうしてまた急にそんなことを……？"
10003005-27 = "それは……最近、委員長の様子がおかしくって……。"
10003005-28 = "ストレスがひどくなったのか、つい心配になってしまうほどのご様子と言いますか……"
10003005-29 = "どういうこと？"
10003005-30 = "例えば今日の午前中、委員長の執務室を訪れた時に……"
10003005-34 = "委員長。こちらに今週の日程についてまとめた報告書、置いておきますね。"
10003005-35 = "それからコーヒーを淹れてきましたので、よろしければどうぞ。"
10003005-37 = "……うん。"
10003005-39 = "先日、偶然良い豆を頂きまして。"
10003005-40 = "時間をかけてゆっくり淹れてみたので、とっても良い香りですよ。"
10003005-41 = "……そう。"
10003005-43 = "はぁ……。"
10003005-44 = "（ふふっ。コーヒーが冷めることにも気づかず、仕事に夢中な委員長……いつも通り素敵です……！）"
10003005-45 = "ん……？ねえアコ、この「シャーレとのパトロール業務の提携に関する提案書」って……？"
10003005-46 = "えっと……？ああ、こちらは今度の風紀委員会の定期パトロールについて、少しシャーレにお手伝いしていただくのが良いのではないかと思いまして。"
10003005-47 = "……シャーレと一緒に、パトロール？"
10003005-48 = "はい。ただ、あくまで提案ですので、委員長がそんな協力なんて要らないと仰るのであれば……"
10003005-49 = "……いや、そのまま置いといて。シャーレがもし協力してくれるなら、それは風紀委員会にとって悪くないことのはず。"
10003005-50 = "……そう。シャーレと、ね……。"
10003005-52 = "あっ、委員長っ……！？そちらは私の飲みかけの……！"
10003005-53 = "……あ、間違えた。"
10003005-54 = "もう委員長ったら、そんな間違いをされるなんて珍しい……。"
10003005-55 = "ちょっと待って。まさか委員長がおかしいって、それだけ……？"
10003005-56 = "それぐらいの間違い、誰にだってあるでしょ。そんなに気にすることか？"
10003005-57 = "私としても、特に問題だとは思いませんでしたが……？"
10003005-58 = "これで終わりではないんです！その後も……！"
10003005-60 = "……うん、それにしても。"
10003005-65 = "やっぱり、アコが淹れてくれたコーヒーは美味しい。"
10003005-66 = "……もしかして私たち今、アコちゃんの妄想を聞かされてる……？"
10003005-67 = "あの委員長が、口に入れるものについて感想を言うなんて……。"
10003005-68 = "アコ行政官、幻聴が聞こえるほど疲れてるのでしたら、少しお休みになった方が……。"
10003005-69 = "違いますよ！？ちゃんとこの耳でしっかり聞いたことです、幻聴ではありません！"
10003005-71 = "まあ、もし仮にそれが事実だとすると……委員長、相当疲れてそうだな……。"
10003005-72 = "委員長が何かを言うこと自体は、今までに皆無だったわけではありませんが……本当に「美味しい」って言ったんですよね？"
10003005-73 = "「そんなに悪くない」とか「飲めないわけじゃない」とか、「やっぱりカフェインが無いと」とか、そういうのではないのですよね？やはり、行政官の聞き間違えなのでは……？"
10003005-75 = "もしかして私、今いじめられてるんでしょうか……？仮にもこの立場なのに……？"
10003005-76 = "うーん、まあ取り合えず、アコちゃんが言ってることが本当に事実だとすると……。"
10003005-77 = "……これは、かなり深刻な事案ですね。"
10003005-78 = "そうですよね！？やはり皆さんから見てもおかしいですよね！？"
10003005-79 = "非常事態ですよ！！このままでは風紀委員会の存亡に関わります！"
10003005-80 = "……え、どういうこと？"
10003005-82 = "もし仮に委員長が過労で倒れてしまったら……その日のうちに、風紀委員会は壊滅してしまっても不思議ではありません！"
10003005-83 = "えっと……？"
10003005-84 = "委員長が不在の風紀委員会と聞い[ruby=パンデモニウム・ソサエティー]て、万魔殿が黙[/ruby]って静観しているとは思えませんし……。"
10003005-85 = "ゲヘナにおける主導権を握ろうとして、嬉々として私たちを押さえつけにかかるはずです！"
10003005-86 = "そうなったらこのゲヘナ学園は……いえ、キヴォトスは、史上かつてない混乱に陥ってしまいます！"
10003005-87 = "つまりこれは、キヴォトスの命運を賭けた事案なんです！"
10003005-90 = "言ってることは、分からないでもないけど……。"
10003005-91 = "とにかく！"
10003005-92 = "何よりも今の委員長には、お休みが必要です……！ゆえにゲヘナ風紀委員の行政官たるこの私、[ruby=あまう]天雨[/ruby]アコは、ここに宣言します。"
10003005-93 = "全ては委員長と風紀委員会……そしてキヴォトスの未来のために！"
10003005-95 = "風紀委員会の行政官として、ここに緊急特務命令を発令します！何としてでも、あの忙しい委員長にお休みを！！"
10003005-97 = "そんな大げさな……。"
10003005-98 = "アコ行政官は委員長のことになると、時々こうなりますよね……。"
10003005-99 = "それ自体は賛成だけど、委員長が「そっか」って易々とバカンスに行ってくれるとは思えないな……今まで休暇を取ってるところすら、ほとんど見たこと無いし……。"
10003005-100 = "確かにそうですね。無理に休暇を取ってもらっても、数時間後には何故か学園にいますし……。"
10003005-102 = "そうなんですよね……いくら休息の話をしても、いつも「休みなら取ってる、一日に五分くらい」と……。"
10003005-103 = "委員長、筋金入りのワーカーホリックだからな……。"
10003005-104 = "この作戦、最初からすでに破綻しているのでは……？"
10003005-105 = "いえ！理由が無いなら作れば良いのです！委員長も納得するような、特別な理由を！"
10003005-106 = "それはそうだけど、そんなことできるのか……？"
10003005-107 = "ええ、任せてください！ちょうど先日、万魔殿から要請がありました。"
10003005-108 = "「今年の夏季訓練の計画書を提出しろ」、と。"
10003005-109 = "うっ……。"
10003005-110 = "はあ……またですか。"
10003005-111 = "あれ、めんどくさいんだよな……。"
10003005-112 = "どうせ、本当に訓練をきちんとしてほしいと思っているわけではないでしょうに……。"
10003005-113 = "あいつら、どうせ計画書の[ruby=あら]粗[/ruby]を見つけて文句ばっかり付けてくるに決まってる！それで何かまた、とんでもないところに無理やり行かせようとして……！"
10003005-114 = "去年みたいに、ヒノム火山に行かされるのだけは絶対に嫌だ……何で夏真っ盛りにあんな熱いところに……。"
10003005-115 = "でも風紀委員会として、無視することはできないですしね……ふぅ。"
10003005-116 = "そうですね。元々今年の夏季訓練は、風紀委員会の企画部の面々ともお話して、その辺で適当に戦術訓練でもして誤魔化そうかと思っていましたが……。"
10003005-117 = "状況が変わりました。せっかくですし、これを利用しましょう。"
10003005-118 = "それで委員長を説得するということですか？一体どうやって……？"
10003005-119 = "その通りですよ、チナツ。"
10003005-120 = "万魔殿の面倒な言いがかりを利用して、風紀委員会の合宿プランを立てるんです！"
10003005-121 = "万魔殿の要求だからと言えば、委員長も断ることはできないはず！"
10003005-122 = "でもアコちゃん。そうは言っても、訓練は訓練でしょ？"
10003005-123 = "休ませるのとは話が真逆じゃない？"
10003005-124 = "ふふっ。簡単な話ですよ、イオリ。"
10003005-127 = "今年の夏合宿は、海で行うことにしましょう！"
10003005-128 = "海へ行って、委員長を海辺のホテルに幽閉するのです！"
10003005-129 = "……幽閉？"
10003005-130 = "どういうことだ……？休暇の話はどこに……？"
10003005-131 = "いわゆるホカンスですよ、ホカンス！"
10003005-132 = "ホカ……何て？"
10003005-133 = "ホカンス……聞いたことがあります。「ホテルでバカンス」の略で……のんびりとホテルで休息を取って、バカンス気分を味わうという新しい休暇の形、ですよね？"
10003005-134 = "はい、その通りです。"
10003005-135 = "まずは委員長を連れて、訓練という体で海へと向かいます。"
10003005-136 = "そして到着し次第、海辺のホテルに委員長を押し込めて、この期間中はどんな仕事も渡さずに無理やり休んでいただきましょう。"
10003005-137 = "そしてホテルから出られないようにしてしまえば、これで完璧に……！"
10003005-138 = "アコちゃんそれ本当に休暇！？"
10003005-139 = "そもそも誰だって、やることが無くなればボーっとして、ゆっくり過ごすしかないはずです！無理やりその状態にすれば、他に何をしなかったとしても取り合えず寝てくださるはず！"
10003005-140 = "それだけでも儲けものです！委員長ったら、もう何日まともに寝てないことか……。"
10003005-141 = "うん……まあだいたい話は分かったけど。"
10003005-142 = "果たして、あの委員長相手にそんなに上手く行くでしょうか……？"
10003005-143 = "ふふっ、その通りですねチナツ。ですから、ダメ押しの手段を用意しました……"
10003005-145 = "シャーレの先生です！"
10003005-146 = "先生には、全面的にサポートをお願いします！"
10003005-147 = "[s1] \"呼ばれたから来てみたのは良いけど……。\"\n[s2] \"話は分かったような分からないような……？\""
10003005-148 = "えっ、はぁ？どういうこと、どうして先生が……？"
10003005-149 = "えっ、はぁ？どういうこと、どうして先生が……？"
10003005-150 = "シャーレには、ゲヘナの風紀委員会の訓練計画に助言・進言するだけの権利が十分にあります。"
10003005-151 = "つまり先生が上手く協力してくだされば、多少横やりが入ったとしても、今回の訓練地を無理やり海にすることは可能なはず。それ以外にも色々と無理が利きやすいです。"
10003005-152 = "シャーレにそんな権限があったのか……もう何でもアリだな。"
10003005-153 = "まあ、先生ですからね。生徒たちを導く立場ですから。"
10003005-154 = "[s] \"やるべきことは理解したけど、そんなに上手く行くかな……？\""
10003005-155 = "あら、弱腰ですね？まさかとは思いますが、断るおつもり……なんてことはありませんよね？"
10003005-156 = "まあ万が一それならそれで、私にも考えがありますよ？"
10003005-157 = "情報部で集めた資料の中には、先生の面白い情報が色々とありましたし……。"
10003005-158 = "うわっ、いつもの悪いアコちゃんだ……。"
10003005-159 = "アコ行政官、シャーレの先生にそのような態度は……。"
10003005-160 = "[s] \"まさか、断るなんてことはしないよ。むしろ協力させて。\""
10003005-161 = "……？"
10003005-162 = "[s3] \"それもこれも、全部ヒナのためなんでしょ？\"\n[s4] \"みんなが善意で動いてるんだから、当然協力するよ。\""
10003005-163 = "うっ……ま、まさかそういうパターンで来るとは……。"
10003005-164 = "うっ……ま、まさかそういうパターンで来るとは……。"
10003005-165 = "……ま、先生らしいといえば先生らしいけど。"
10003005-166 = "珍しく一本取られましたね、アコ行政官。"
10003005-167 = "[s] \"それに、協力したらみんなの水着姿が見られるんだよね！？\""
10003005-168 = "ちょっとでも褒めた私がバカだった！ヘンタイっ！やっぱり死ね！"
10003005-170 = "（やれやれですね……）"
10003005-171 = "と、とにかく、これで先生のご協力は確保できました！残るは委員長を何とか攻略するのみ……！"
10003005-173 = "うん、分かった。"
10003005-174 = "……えっ！？い、委員長、本当に大丈夫ですか……！？行ってくださるんですか……！？"
10003005-175 = "大丈夫も何も、夏季の合宿訓練は恒例行事でしょう？何も断る理由は無い。"
10003005-176 = "そっ、そうですね！そうでしたね……！"
10003005-178 = "（はぁ……）"
10003005-179 = "（アコちゃん、委員長相手だと何を企んでるのか顔でバレバレなんだよな……）"
10003005-180 = "そういえば、今年の下見はもう済んでる。"
10003005-181 = "ゲヘナのヒノム火山94-13地区、麓にあるあの山荘。"
10003005-182 = "あそこなら万魔殿も文句は言わないはず。環境も良い感じに過酷だし、やるからには徹底的に。"
10003005-183 = "またあの火山！？万魔殿に強制されたわけでもないのに！？"
10003005-184 = "……何か問題が？"
10003005-185 = "え、えっと、委員長？「下見」ということはもしかして、既に計画を立てられて……？"
10003005-186 = "うん。そろそろ万魔殿が言い出す頃かと思って。"
10003005-187 = "（そんな……！こ、これでは全ての計画が水の泡に……！）"
10003005-188 = "（ど、どうすれば……！？）"
10003005-191 = "[ns5] \"夏の合宿といったら海でしょ！\"\n[ns6] \"夏の合宿といったら水着でしょ！\""
10003005-192 = "……海？水着……？どうしたの先生、急に何を……それに、どうしてここに……？"
10003005-193 = "……海？水着……？どうしたの先生、急に何を……それに、どうしてここに……？"
10003005-194 = "……？実はアコも密かに、今回新しい場所で行う訓練計画を練ってくれてた……？"
10003005-195 = "は、はいっ！そうです！先生には事前にお伝えしていたのですが……！"
10003005-196 = "委員長は普段から多忙ですし、いつまでも全ての負担をかけっぱなしにするわけにはいきません。"
10003005-197 = "少しでも負担を減らせればと思うので……委員長の立てられた計画を参考にさせていただきつつ、今回は試しに、私に計画を任せていただけませんか？"
10003005-198 = "それは良いけど、今まで海での合宿なんて……。"
10003005-199 = "せ、先生が海に詳しいとのことでして！きっと新しい、効率的な訓練ができるはずです！"
10003005-200 = "……そう。"
10003005-201 = "……分かった。"
10003005-202 = "アコが、そこまで言うなら……"
10003005-203 = "……っ！い、良いんですか？"
10003005-204 = "うん、任せる。こういう時のための行政官だし、アコがせっかくこう言ってくれたわけだし。"
10003005-205 = "さっき言われた通り、全部を私が抱えたままっていうのも、効率的ではないだろうから……。"
10003005-207 = "じゃあ、とりあえず今回はお願い。"
10003005-208 = "しっかりね。"
10003005-211 = "（おお……）"
10003005-212 = "（まさか上手く行くとは……）"
10003005-213 = "（やりました！これで……！）"
10003005-214 = "[ns] \"海だーーーーーー！\""
10003005-216 = "（こうして今年の風紀委員会の夏季合宿訓練の舞台は、「海」になることが決定した）"
10003005-218 = "#video;10003"
