[translation]
1301206-1 = "Conexão de Ferro"
1301206-2 = "Escola de Polícia Valkyrie - Prédio Principal"
1301206-4 = "Olá a todos, bem-vindos à Escola de Polícia Valkyrie!"
1301206-5 = "Eu sou Kirino, do Departamento de Segurança Pública, e serei a guia de vocês hoje."
1301206-6 = "Eca, Departamento de Segurança Pública? Por que não o Departamento de Segurança ou o de Investigação?"
1301206-7 = "Eu queria ouvir histórias sobre prender criminosos assustadores..."
1301206-8 = "Idiota, o Departamento de Segurança e o de Investigação são ocupados. É por isso que só o Departamento de Segurança Pública, que não faz nada, tem tempo para cuidar da gente. Coisas de adulto, sabe como é."
1301206-9 = "I-isso não é verdade! Pode não ser tanto quanto o Departamento de Segurança, mas o Departamento de Segurança Pública também se ocupa com várias tarefas todos os dias...!"
1301206-10 = "Procuramos itens perdidos dos cidadãos e patrulhamos a cidade para garantir que não haja perigo...!"
1301206-11 = "Que sem graça."
1301206-12 = "Não tem nenhum trabalho mais chamativo?"
1301206-13 = "B-bem, trabalho chamativo, você diz...?"
1301206-14 = "[s1] \"Kirino, mantenha a calma.\"\n[s2] \"Ficar parada deve ser entediante, por que não começa o tour?\""
1301206-17 = "C-certo! Então, pessoal, por favor, me sigam!"
1301206-18 = "Primeiro, vou mostrar o prédio e explicar um pouco sobre a história da Escola de Polícia Valkyrie!"
1301206-20 = "Este é o dormitório onde as alunas da Escola de Polícia Valkyrie vivem!"
1301206-21 = "Para que possamos responder rapidamente quando um incidente ocorre, a maioria das alunas vive aqui, dentro da escola."
1301206-22 = "Na entrada, está gravada a citação da primeira presidente do conselho estudantil. Toda vez que entram ou saem, as alunas reafirmam seus deveres em seus corações e refletem sobre suas próprias ações."
1301206-23 = "Como está escrito aqui: 'A polícia deve sempre considerar a segurança dos cidadãos como prioridade máxima e servir às outras alunas —"
1301206-24 = "Que chato~."
1301206-25 = "Não tem graça~."
1301206-26 = "Ensina pra gente um jeito mais legal de prender os bandidos!"
1301206-27 = "M-mas, é importante começar entendendo a mentalidade..."
1301206-28 = "Por exemplo, vocês não acham que uma polícia que exerce seus direitos como bem entende, sem pensar na segurança dos cidadãos, é igual a um criminoso?"
1301206-29 = "Esquece isso, conta logo histórias de incidentes passados!"
1301206-30 = "Irmãzona, você já foi pro campo de batalha e atirou com arma também?"
1301206-31 = "Não me diga que, por ser do Departamento de Segurança Pública, você não consegue atirar... né?"
1301206-32 = "C-claro que consigo! Para uma aluna da Valkyrie, uma pontaria precisa é uma habilidade essencial! Isso não muda, não importa o departamento!"
1301206-33 = "Além disso, acabei de resolver um caso de reféns usando minha pontaria outro dia...!"
1301206-34 = "[s3] \"…….\"\n[s4] \"Que incrível, como esperado.\""
1301206-36 = "(N-não me olhe assim, Sensei...! As crianças vão acabar duvidando de mim...!)"
1301206-38 = "Coloque um pouco mais de emoção nisso!?"
1301206-39 = "Você atirou em um caso com reféns? Não ficou com medo...?"
1301206-40 = "Sim, claro que tive medo pensando no que poderia acontecer, mas eu precisava salvar os reféns."
1301206-41 = "Incrível... Eu tinha ficado desapontada por ser o Departamento de Segurança Pública, mas é muito legal!"
1301206-42 = "(E-eu não menti, mas... meu coração dói um pouco...)"
1301206-43 = "(Mas parece que consegui despertar o interesse das crianças... Com isso, acho que podemos continuar o tour adequadamente!)"
1301206-44 = "Irmãzona, o que é isso na sua cintura? Também é uma arma?"
1301206-45 = "Ah, isso é uma granada de fumaça. Não tem o poder de uma granada comum, mas pode bloquear a visão do oponente. É muito eficaz, especialmente quando há reféns."
1301206-46 = "No incidente que aconteceu em Shiba Town no mês passado, o caso foi resolvido usando exatamente este tipo de granada de fumaça!"
1301206-47 = "Shiba Town no mês passado... Você quer dizer aquele caso em que um grupo de estudantes armados atacou a loja de pudim!?"
1301206-48 = "Foi a irmãzona que resolveu aquele caso!!"
1301206-49 = "Incrível! Que legal!"
1301206-50 = "A-ahahaha..."
1301206-51 = "(Bem, não foi a granada de fumaça que eu joguei que resolveu o caso, mas... é verdade que 'o caso foi resolvido com uma granada de fumaça'...!)"
1301206-52 = "E esse elástico de cabelo do lado?"
1301206-53 = "Isso não é um elástico, são algemas. Depois de capturar um criminoso, usamos isso para imobilizá-lo."
1301206-54 = "Claro, elas são feitas para serem muito resistentes para que o criminoso não escape, e não abrem sem a chave, não importa o que façam, então é preciso ter cuidado ao usar."
1301206-55 = "É mesmo? Parece que dá pra tirar se puxar forte..."
1301206-56 = "Pode parecer assim, mas elas têm dentes por dentro, então é impossível abrir com força normal."
1301206-57 = "Já que estamos aqui, vou mostrar como se usa na prática!"
1301206-58 = "Primeiro, imobilizamos o criminoso para que ele não consiga se mover, e então colocamos a algema em um dos pulsos assim."
1301206-61 = "Depois, soltamos a trava e, dependendo da situação, prendemos em algum lugar... e colocamos a outra parte no pulso oposto..."
1301206-64 = "Pronto, está preso! Agora você não consegue mais se mexer!"
1301206-70 = "Vejam só, não solta de jeito nenhum, né? Querem tocar?"
1301206-71 = "Uau, que incrível!"
1301206-72 = "É a primeira vez que vejo algemas de verdade!"
1301206-73 = "Fufu, fico feliz que tenham gostado."
1301206-74 = "Bem, agora é hora de abrir... Ué, a chave... Ah, opa..."
1301206-75 = "Ah não!?"
1301206-81 = "(Ah! Minha mão escorregou e a chave da algema...!)"
1301206-82 = "(Logo agora, caiu dentro do ralo...!?)"
1301206-83 = "Hmm? Moça, o que aconteceu?"
1301206-84 = "E-eu, bem... é que..."
1301206-87 = "[wa:800]― (O-o que eu faço...!)"
1301206-89 = "― (Hmph, [wa:800]nn...! [wa:850]N-não [wa:1050]sai...!)"
1301206-92 = "[ns] \"Ei, Kirino. Se eu não vi errado, a chave acabou de cair no ralo...\""
1301206-93 = "[wa:100]― ...Hein? [wa:500]N-não, [wa:400]de jeito nenhum!"
1301206-95 = "[wa:200]― Como uma oficial que pertence à polícia, [wa:1550]não tem como eu [wa:900]perder a chave!"
1301206-98 = "― P-por [wa:550]isso, [wa:700]isso é..."
1301206-100 = "― É um [wa:450]treinamento de [wa:500]simulação de fuga! [wa:150]"
1301206-103 = "― Para o caso de uma situação inesperada, [wa:1350]caso eu seja capturada por acidente..."
1301206-105 = "― Vou mostrar agora [wa:950]como escapar!"
1301206-108 = "[ns] \"...Você está bem?\""
1301206-109 = "[wa:400]― Fiquem tranquilos! [wa:950]Para alguém que passou por um treinamento rigoroso [wa:500]como eu,"
1301206-111 = "― Isso é [wa:400]fácil!"
1301206-114 = "[wa:250]― Guuuuh...! [wa:1650]Funununununu...!"
1301206-117 = "― ...Me desculpem."
1301206-119 = "― Por favor, me ajude, [wa:1200]Sensei..."
1301206-122 = "Depois disso, até que uma aluna da Valkyrie que passava pelo local a ajudasse, Kirino ficou um tempo presa nas algemas, sendo alvo das risadas das crianças..."
1301206-127 = "Ugh... eu estraguei tudo..."
1301206-128 = "Em vez de mostrar uma imagem legal como policial, acabei mostrando a mim mesma algemada... Desse jeito, pareço mais uma criminosa..."
1301206-129 = "Vendo isso, nenhuma criança vai querer ser policial, né..."
1301206-130 = "[s5] \"Está tudo bem.\"\n[s6] \"Bom trabalho. Vamos, levante a cabeça.\""
1301206-131 = "Mas..."
1301206-132 = "Mas..."
1301206-133 = "Moça!"
1301206-134 = "Ué... pessoal, vocês ainda não tinham ido embora...?"
1301206-135 = "Obrigada por hoje! Foi muito divertido ver tantas coisas!"
1301206-136 = "Ah... m-mas eu só cometi erros..."
1301206-137 = "Como membro da Academia de Polícia Valkyrie, em vez de mostrar uma imagem legal, acabei terminando de um jeito vergonhoso..."
1301206-138 = "Não, não! Eu aprendi que as algemas são super resistentes!"
1301206-139 = "Você respondeu todas as nossas perguntas estranhas, ficamos muito felizes!"
1301206-140 = "Em outras escolas, ninguém nunca nos ouviu com tanta atenção!"
1301206-141 = "Eu também quero ser uma policial gentil como você um dia!"
1301206-145 = "P-pessoal... muito obrigada...!"
1301206-146 = "Eu, Kirino Nakatsukasa... continuarei me esforçando para não me tornar arrogante, para sempre ver as coisas pelo ponto de vista de vocês e para me tornar uma policial que possa protegê-los de verdade!"
1301206-147 = "[s] \"Que bom que a mensagem foi transmitida.\""
1301206-148 = "Sim... elas ouviram tudo com atenção, e eu também fiquei muito feliz."
1301206-149 = "Mas erro é erro. Vou usar o dia de hoje como uma lição e refletir bastante para não repetir essas falhas no futuro."
1301206-150 = "Da próxima vez, vou me esforçar no treinamento de fuga para conseguir tirar as algemas mesmo se eu perder a chave!"
1301206-151 = "[s] \"...Acho que o seu foco de esforço está um pouco errado, não?\""
