[translation]
1301206-1 = "アイアン・コネクション"
1301206-2 = "ヴァルキューレ警察学校・本館前"
1301206-4 = "みなさん、ヴァルキューレ警察学校へようこそ！"
1301206-5 = "本官が今日みなさんの案内を担当する、生活安全局のキリノです。"
1301206-6 = "ええー、生活安全局ー？どうして警備局とか捜査局じゃないのー？"
1301206-7 = "こわーい犯罪者をタイホするお話が聞きたかったのに……。"
1301206-8 = "ばーか、警備局や捜査局は忙しいの。だから暇な生活安全局くらいしかやってくれないの、オトナのジジョーってやつ。"
1301206-9 = "そ、そんなことはありませんよ！？たしかに警備局ほどではありませんが、生活安全局も日々、様々な業務に明け暮れて……！"
1301206-10 = "市民の方の落とし物を探してあげたり、何か危険が無いか街をパトロールをしたり……！"
1301206-11 = "何それ地味ー。"
1301206-12 = "もっと派手なお仕事とか無いのー？"
1301206-13 = "え、えっと、派手な仕事、ですか……？"
1301206-14 = "[s1] \"キリノ、落ち着いて。\"\n[s2] \"じっとしてても退屈だろうし、まずは案内をしたら？\""
1301206-17 = "そ、そうですね！ではみなさん、本官について来てください！"
1301206-18 = "まずは建物の案内をしつつ、ヴァルキューレ警察学校の歴史について説明いたしますので！"
1301206-20 = "こちらは、ヴァルキューレ警察学校の生徒たちが生活をする寮です！"
1301206-21 = "事件が起きた時に素早く対応できるよう、ほとんどの生徒たちは校内にあるこの寮で生活をしているんです。"
1301206-22 = "入り口には初代生徒会長の名言が刻まれております。ここを出入りするたびに、生徒たちは自らの責務を胸に刻み直すと共に、自身の行動を省みるのです。"
1301206-23 = "ここに書かれている通り、「警察は常に市民の安全を最優先に考え、他の生徒たちに奉仕する立場であり――"
1301206-24 = "つまんな～い。"
1301206-25 = "面白くな～い。"
1301206-26 = "もっとカッコよく犯人をタイホする方法とか教えてー！"
1301206-27 = "で、ですが、まずは考え方から入るのは大事なことでして……。"
1301206-28 = "例えば市民の安全を考えずに、好き勝手に権利を振りかざして活動する警察なんて、犯罪者と同じだと思いませんか？"
1301206-29 = "そういうのは良いからさあ、もっと今までの事件の話とか聞かせてよ！"
1301206-30 = "おねーちゃんも現場に行って、銃撃ったりしたことあるのー？"
1301206-31 = "まさか、おねえちゃんは生活安全局だから撃てない……なんてことはないよね？"
1301206-32 = "も、もちろんですよ！ヴァルキューレの生徒にとって、正確無比な射撃の腕は必須の技術！それは、どの部署であっても変わりません！"
1301206-33 = "それに本官はついこの間、とある人質事件を射撃で解決したばかりですから……！"
1301206-34 = "[s3] \"……。\"\n[s4] \"すごいねー、さっすがー。\""
1301206-36 = "（そ、そんな目で見ないでください先生……！園児たちに疑われてしまいます……！）"
1301206-38 = "もう少し感情を込めてください！？"
1301206-39 = "人質がいる事件で銃を撃ったの？怖くなかったの……？"
1301206-40 = "はい、もちろん万が一のことを考えると怖い気持ちもありましたが、人質の方を助けないといけませんから。"
1301206-41 = "すごい……生活安全局って聞いてガッカリしてたけど、かっこいい！"
1301206-42 = "（う、嘘はついてませんが……何だか微妙に心が痛みます……）"
1301206-43 = "（ですが、園児の子たちの興味を引けたようですし……これできちんと見学を進められそうですね！）"
1301206-44 = "おねえちゃん、その腰に付けてるのは何？それも武器？"
1301206-45 = "ああ、これは煙幕弾ですね。手榴弾より威力はありませんが、相手の視界を遮ることができます。まさに人質がいる時などに使うと、すごく効果的ですね。"
1301206-46 = "先月、芝タウンで起きた事件においても、これと同じタイプの煙幕弾で事件が解決したんです！"
1301206-47 = "先月の芝タウン……それって、ブソーした学生集団がプリンのお店を襲った、あの事件のこと！？"
1301206-48 = "おねーちゃんがあの事件を解決したんだ！！"
1301206-49 = "すごい！かっこいい！"
1301206-50 = "あ、あはは……。"
1301206-51 = "（まあ、事件を解決したのは、私の投げた煙幕弾ではありませんでしたが……「煙幕弾で事件が解決した」のは本当のことです……！）"
1301206-52 = "じゃあ、その横に付いてるシュシュは？"
1301206-53 = "これはシュシュではなく、手錠ですね。悪い犯罪者を捕まえた後、手に付けて動けなくするんです。"
1301206-54 = "もちろん犯罪者が逃げられないようすごく丈夫にできていて、鍵が無いと何をしても外せないようになっているので、使う時には注意が必要です。"
1301206-55 = "そーなの？引っ張ればすぐ取れそうだけど……。"
1301206-56 = "見た感じはそう思えるかもしれませんが、内側に歯が付いてることもあるので、普通の力では絶対に外れないんですよ。"
1301206-57 = "ではせっかくですし、実際に使用するところをお見せしましょう！"
1301206-58 = "まず犯罪者が動けないように制圧してから、こうして片腕に手錠をかけます。"
1301206-61 = "そして留め具を外し、場合によってはこうしてどこかに引っかけて……もう片方を逆の手首にかけると……。"
1301206-64 = "はい、逮捕です！これでもう動けません！"
1301206-70 = "ご覧ください、全然外れないでしょう？触ってみますか？"
1301206-71 = "わー、すごーい！"
1301206-72 = "本物の手錠、初めて見た！"
1301206-73 = "ふふっ、喜んでくれてよかったです。"
1301206-74 = "それではそろそろ解錠……あれ、鍵が……あ、よい、しょっ……"
1301206-75 = "とぁっ！？"
1301206-81 = "（あぁっ！手が滑って、手錠の鍵が！？）"
1301206-82 = "（よりによって、排水口の中に……！？）"
1301206-83 = "んー？おねえちゃん、どうしたの？"
1301206-84 = "え、えっとですね……その……"
1301206-87 = "[wa:800]― （ど、[wa:450]どうしましょう……！）"
1301206-89 = "― （ふんっ、[wa:800]んっ……！[wa:850]は、[wa:1050]外れない……！）"
1301206-92 = "[ns] \"ねえキリノ。見間違いでなければ今、鍵が排水口に……。\""
1301206-93 = "[wa:100]― ……え？[wa:500]い、[wa:400]いやいや！"
1301206-95 = "[wa:200]― 仮にも警察に属する本官が、[wa:1550]鍵を失くすわけが[wa:900]ないではありませんか！"
1301206-98 = "― で、[wa:550]ですから、[wa:700]これは……。"
1301206-100 = "― だ、[wa:450]脱出訓練の[wa:500]予行演習です！ [wa:150] "
1301206-103 = "― 想定外の事態が起きて、[wa:1350]万が一拘束されてしまった時のために……"
1301206-105 = "― これより本官が、[wa:950]脱出の仕方をお見せします！"
1301206-108 = "[ns] \"……大丈夫？\""
1301206-109 = "[wa:400]― ご安心ください！[wa:950]本官のように[wa:500]しっかり訓練を積んだ者であれば、"
1301206-111 = "― これくらい[wa:400]簡単ですから！"
1301206-114 = "[wa:250]― くうううっ……！[wa:1650]ふぬぬぬぬぬぬっ……！"
1301206-117 = "― ……ごめんなさい。"
1301206-119 = "― 助けてください、[wa:1200]先生ぇ……。"
1301206-122 = "その後、通りすがりのヴァルキューレの生徒が助けてくれるまで、キリノはしばらく手錠に縛られたまま園児たちに笑われてしまうのだった……。"
1301206-127 = "うぅ……やってしまいました……。"
1301206-128 = "警察としてカッコいい姿を見せるどころか、手錠をかけられた姿を見せてしまうなんて……これではむしろ犯罪者側です……。"
1301206-129 = "こんな姿を見て、警察に憧れる子なんていないですよね……。"
1301206-130 = "[s5] \"大丈夫だよ。\"\n[s6] \"お疲れ様。ほら、顔を上げて。\""
1301206-131 = "ですが……"
1301206-132 = "ですが……"
1301206-133 = "おねえちゃん！"
1301206-134 = "あれ……みなさん、まだ帰られてなかったんですか……？"
1301206-135 = "今日はありがとう！色々見られて、すっごく楽しかったよ！"
1301206-136 = "あ……で、ですが、本官はミスばかりしてしまって……。"
1301206-137 = "ヴァルキューレ警察学校の一員として、カッコいい姿を見せるどころか、最後にはみっともない姿を……。"
1301206-138 = "ううん、手錠がすっごく固いんだってことも分かったし！"
1301206-139 = "変な質問も全部答えてくれて、すっごくうれしかった！"
1301206-140 = "他の学校だと、こんなにお話を聞いてくれるところはなかったもん！"
1301206-141 = "私もいつか、おねえちゃんみたいに親切な警察になりたい！"
1301206-145 = "み、みなさん……ありがとうございます……！"
1301206-146 = "この[ruby=なかつかさ]中務[/ruby]キリノ……これからも慢心することなく、みなさんの目線に立って。そして、しっかりとみなさんを守ることができる警察になれるよう、努力していきます！"
1301206-147 = "[s] \"ちゃんと伝わって良かったね。\""
1301206-148 = "はい……あの子たちも話をしっかり聞いてくれて、私も嬉しかったです。"
1301206-149 = "しかし、ミスはミスです。今後は失敗を繰り返さないよう、今日のことは教訓としてしっかり反省します。"
1301206-150 = "次回は鍵を無くしても手錠が外せるように、頑張って脱出の訓練をしておこうと思います！"
1301206-151 = "[s] \"……頑張る方向性が違うんじゃ？\""
