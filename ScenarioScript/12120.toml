[translation]
12120-1 = "第12話;幾つかの秘密"
12120-2 = "じゃーん！"
12120-3 = "ホシノちゃん見て見てー！アビドス砂祭りの昔のポスター！やっと手に入れたよー！"
12120-4 = "この時はまだ、オアシスが湖みたいに広がってたんだよねー。あ、このポスターは記念にあげる！"
12120-5 = "えへへ、すっごく素敵でしょー？もし何か奇跡が起きたら、またこの頃みたいに人がたっくさん集まって――"
12120-6 = "奇跡なんて起きっこないですよ、先輩。"
12120-7 = "そんなもの、あるわけないじゃないですか。それよりも現実を見てください！"
12120-8 = "は、はう……。"
12120-9 = "こんな砂漠のド真ん中に、もう大勢の人なんて来るはずがないでしょう！？夢物語もいい加減にしてください！"
12120-10 = "うえぇ、だってホシノちゃーん……ご、ごめんね？"
12120-11 = "……っ。"
12120-12 = "そうやってふわふわと、奇跡だの幸せだの何だの……。"
12120-13 = "もっとしっかりしてください！あなたはアビドスの生徒会長なんですよ！？もう少し、その肩に乗った責任を自覚したらどうなんですか！"
12120-14 = "（ビリビリッ――！）"
12120-16 = "対策委員会・教室"
12120-17 = "……ふぅ。"
12120-18 = "もうっ、一体何なのよ！"
12120-19 = "カイザーコーポレーションは、あそこで一体何を企んで……？"
12120-20 = "「宝物を探している」、と言っていましたが……。"
12120-21 = "あの砂漠には何も無いはずです。でたらめを言ってるんだと思います。"
12120-22 = "石油など、お金になりそうな地下資源は何一つ残っていません……はるか昔に、すでにそういう調査結果が出ているんです。"
12120-23 = "だとすると、どうして……。"
12120-24 = "いやいや、今はそれよりも借金の方でしょ！3000％とか言ってなかった！？"
12120-25 = "保証金も要求してきましたし……あと一週間で、3億円だなんて……。"
12120-27 = "……行ってくる。あそこで何をしているのか、調べないと。"
12120-28 = "し、シロコ先輩！？行くって、一体どこへ……？"
12120-29 = "PMCの施設。徹底的に準備すれば、何とか潜入できると思う。行って、何をしてるのか確認する。"
12120-30 = "ま、待ってシロコ先輩！それより今は、借金の話の方が先でしょ！"
12120-31 = "……。"
12120-32 = "……借金はもう、真っ当なやり方じゃ返せない。何か、別の方法を……。"
12120-33 = "だ、ダメですよ！それではまた……"
12120-34 = "……私はシロコ先輩に賛成！学校が無くなったら全部終わりなんだから、もうなりふり構ってられない！！"
12120-35 = "そんな、セリカちゃん……！？"
12120-36 = "セリカちゃん待って！そんなことしたら、あの時と同じだよ！？"
12120-37 = "そ、そういう意味じゃない！そうじゃなくて、でも……！"
12120-38 = "あの時ホシノ先輩が止めてくれたのに、自分から進んで犯罪者になるの！？"
12120-39 = "わ、私は……。"
12120-40 = "……。"
12120-41 = "ほらほら、みんな落ち着いて～。"
12120-42 = "頭から湯気が出てるよ～？"
12120-43 = "ん……。"
12120-44 = "……。"
12120-45 = "……。"
12120-46 = "はい、すみません……。"
12120-47 = "……ごめん、こんな風にしたいわけじゃなかった。"
12120-48 = "うん、みんな分かってるよ。シロコちゃんも、いい子だからね。"
12120-49 = "……。"
12120-50 = "まっ、とりあえず今日はこの辺にしとこう。"
12120-51 = "うへ～、じゃあ解散解散～。一回頭を冷やして、また明日集まることにしようよ。これは委員長命令ってことで。"
12120-52 = "[s] \"……そうだね。とりあえず、みんな一旦帰ろう。\""
12120-54 = "（ノノミとアヤネ、セリカは家に帰り、ホシノとシロコだけが残った）"
12120-55 = "ん～？シロコちゃんは何かまだやることがある感じ？"
12120-56 = "……先輩、ちょっといい？"
12120-57 = "うへ～、おじさんとお話したいことがあるの？照れるな～。"
12120-58 = "[s] \"私も。\""
12120-59 = "……先生も？うへ、おじさんモテモテだ～。"
12120-60 = "でもさ、今日は疲れたし、色んなことがあったじゃん？"
12120-61 = "また明日話そう、大体どんな話かは分かってるから。"
12120-62 = "……ん、分かった。"
12120-63 = "先生……。"
12120-64 = "[s] 頷く。"
12120-65 = "ん、じゃあまた明日……。"
12120-67 = "うへ～、先生やるねえ？私の可愛いシロコちゃんと、いつの間に目と目で意思疎通ができる仲になったんだ～？"
12120-68 = "いやいや、やっぱり先生は侮れない大人だな～。おじさんは流れに付いていけなくて何だか寂しいよ。"
12120-73 = "[ns] \"ホシノ、聞いてもいい？\""
12120-74 = "ん～、何を？"
12120-75 = "[s] ホシノの退部・退会届を差し出す。"
12120-78 = "それって……。"
12120-79 = "うへ～、いつの間に……！これ、盗ったのはきっとシロコちゃんだよね？"
12120-80 = "全くシロコちゃんったら、いくら何でも先輩のかばんを漁るのはダメでしょ～。"
12120-81 = "先生、きちんとシロコちゃんを叱っといてよ～？あのままじゃとんでもない大悪党になっちゃってもおかしくないってー。"
12120-82 = "[s1] \"うん。それはそれで、また今度ね。\"\n[s2] \"今は、この退部届について聞きたいな。\""
12120-83 = "……。"
12120-84 = "……。"
12120-85 = "そっかー……。"
12120-86 = "[s] \"聞かせてくれる？\""
12120-87 = "……。"
12120-88 = "うーん。逃がしてくれそうには……ないよね～？"
12120-89 = "……はあ、仕方ないなあ。"
12120-92 = "面と向かってっていうのも何だし……先生、ちょっとその辺一緒に歩かない？"
12120-93 = "[s] ホシノと一緒に廊下に出る。"
12120-100 = "けほっ、けほっ……うわぁ、ここも砂だらけじゃ～ん……。"
12120-101 = "ま、仕方ないんだけどね。掃除をしようにも、そもそも人数に対して建物が大きすぎて……。"
12120-102 = "砂嵐が減ってくれれば良いんだけど……。"
12120-103 = "うへ～、せっかくの高校生活が全部砂色だなんて、ちょっとやるせないと思わない？"
12120-104 = "[s] \"ホシノは、この学校が好きなんだね。\""
12120-105 = "……今の話の流れで、本当にそう思う？うへ、やっぱ先生は変な人だね。"
12120-106 = "……砂漠化が進む前、アビドスはかなり大きくて力のある学校だったって言われてるけど……そんな記憶も実感も、おじさんには全く無いんだよね～。"
12120-107 = "最初から全部めちゃくちゃで、ちゃんとしたものなんて何一つない学校だった。"
12120-108 = "おじさんが入学した時のアビドス本館は、今はもう砂漠の中に埋もれちゃったし。当時の先輩たちだって、もうみんないなくなった。"
12120-109 = "今いるここは、砂漠化を避けて何回も引っ越した結果に辿り着いた、ただの別館。"
12120-110 = "……ま、でもここに来てシロコちゃんやノノミちゃん、アヤネちゃんにセリカちゃんと会えたから……。"
12120-111 = "……。"
12120-112 = "……うへ、やっぱり好きなのかもしれないな～。"
12120-113 = "[s] \"…………。\""
12120-114 = "……先生、正直に話すよ。"
12120-116 = "私は2年前から、変なやつらから提案を受けてた。"
12120-117 = "[s] \"提案？\""
12120-118 = "カイザーコーポレーション……。"
12120-119 = "提案というかスカウトというか……アビドスに入学した直後からずっと、何回もね。"
12120-120 = "そういえば、ついこの間もあったな～……。"
12120-122 = "あなたに、決して拒めないであろう提案をひとつ。"
12120-123 = "アビドス高校を退学し、私共の企業に所属する……その条件を呑んでいただければ、今アビドスが背負っている借金の半分近くをこちらで負担しましょう。"
12120-124 = "ククッ、ククククッ……さあ、答えを聞きましょう。もしイエスならば、こちらにサインを。"
12120-126 = "……何度も言ったはずだよ、断るって。"
12120-127 = "……。"
12120-129 = "それは誰から見たって破格の条件だった。でも、当時は私がいなくなったらアビドス高校が崩壊するって思ってたからこそ、ずっと断ってたけど……。"
12120-130 = "……あいつら、PMCで使える人材を集めているみたい。"
12120-131 = "[s] \"……その人は、一体何者？\""
12120-132 = "私も、あいつの正体は知らない……ただ、私は黒服って呼んでる。"
12120-133 = "[s] \"黒服……。\""
12120-134 = "何となくぞっとするやつで……キヴォトス広しといえども、ああいうタイプのやつは見たこと無かったし……。"
12120-135 = "怪しいやつだけど、別に特段問題を起こしたりはしなかった……。"
12120-136 = "何なんだろうね。あのカイザーの理事ですら、黒服のことは恐れてるように見えたけど……。"
12120-137 = "[s] \"じゃあ、この退部届は……。\""
12120-138 = "……うへ。"
12120-139 = "……まあ、1ミリも悩んでなかったって言ったら嘘だし。ちょっとした気の迷いっていうか。"
12120-140 = "……うん、もう捨てちゃおっか。"
12120-142 = "うへ～、スッキリした。"
12120-143 = "余計な誤解を招いてごめんね。ただ、こんな話をみんなにしたところで、心配させるだけで良いことも何も無さそうだったからさ。"
12120-144 = "でもまあ、可愛い後輩たちにいつまでも隠しごとをしたままっていうのも良くないし……明日、みんなにちゃんと話すよ。"
12120-145 = "聞かされたところで困らせちゃうだけだろうけど、隠しごとなんて無いに越したことはないだろうし。"
12120-146 = "実際のところ、今はあの提案を受ける以外、他の方法は思いついてないんだけどね……。"
12120-147 = "[s] \"……きっと何か、方法があるはず。\""
12120-148 = "……。"
12120-149 = "そうだね、奇跡でも起きてくれれば良いんだけど……。"
12120-150 = "……奇跡、かあ。"
12120-151 = "……さ～てと、この話はこれでおしまい。"
12120-152 = "じゃあ、また明日。先生。"
12120-153 = "さよなら。"
12120-157 = "[ns] \"ホシノ！\""
12120-158 = "な、なに……？"
12120-159 = "[s] \"私が大人として、どうにかする！だから……！\""
12120-160 = "……。"
12120-161 = "……うへへ。私、そんなに元気なさそうだったかな？"
12120-165 = "うん。ありがとう、先生。"
12120-170 = "（翌日）"
12120-171 = "はぁ、お疲れ様です……。"
12120-174 = "あれ、私が一番乗り……？"
12120-176 = "……？"
12120-178 = "これは……？"
12120-179 = "……嘘、"
12120-180 = "何でっ……どうしてっ！！！！？？"
12120-182 = "（机の上にはホシノが残した退部・退会届、そしてみんなへの手紙が置かれていた）"
12120-184 = "次回;手をすり抜けたもの"
