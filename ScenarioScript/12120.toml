[translation]
12120-1 = "Episódio 12: Alguns Segredos"
12120-2 = "Tcharam!"
12120-3 = "Hoshino-chan, olha só! Um pôster antigo do Festival de Areia de Abydos! Finalmente consegui um!"
12120-4 = "Naquela época, o oásis ainda se estendia como um lago. Ah, pode ficar com esse pôster de lembrança!"
12120-5 = "Hehehe, não é maravilhoso? Se algum milagre acontecesse, talvez as pessoas voltassem a se reunir aqui como antigamente..."
12120-6 = "Milagres não existem, veterana."
12120-7 = "Não tem como algo assim acontecer. Em vez disso, tente encarar a realidade!"
12120-8 = "Ha, hau..."
12120-9 = "Não tem como um monte de gente vir para o meio deste deserto agora, não é!? Pare de viver no mundo da lua!"
12120-10 = "Uéé, mas Hoshino-chan... d-desculpa, tá?"
12120-11 = "..."
12120-12 = "Ficar falando essas coisas vagas sobre milagres e felicidade..."
12120-13 = "Tente ser mais sensata! Você é a presidente do conselho estudantil de Abydos, não é!? Que tal ter um pouco mais de consciência da responsabilidade que carrega nos ombros?"
12120-14 = "(Biri-biri!)"
12120-16 = "Sala do Comitê de Contramedidas"
12120-17 = "...Ufa."
12120-18 = "Poxa, o que será que está acontecendo?"
12120-19 = "O que a Kaiser Corporation está planejando fazer ali...?"
12120-20 = "Eles disseram que estavam 'procurando por um tesouro', mas..."
12120-21 = "Não deveria ter nada naquele deserto. Acho que estão mentindo."
12120-22 = "Não restou nenhum recurso subterrâneo que valha dinheiro, como petróleo... Resultados de pesquisas feitas há muito tempo já confirmaram isso."
12120-23 = "Então, por que..."
12120-24 = "Não, não, o problema agora é a dívida, não é!? Eles não falaram em 3000% de juros!?"
12120-25 = "E ainda exigiram um depósito de garantia... 300 milhões em apenas uma semana..."
12120-27 = "...Eu vou lá. Preciso investigar o que eles estão fazendo."
12120-28 = "S-Shiroko-senpai!? Ir lá? Para onde exatamente...?"
12120-29 = "Às instalações da PMC. Se eu me preparar bem, acho que consigo me infiltrar. Vou lá confirmar o que eles estão fazendo."
12120-30 = "E-espera, Shiroko-senpai! Antes disso, temos que resolver o assunto da dívida!"
12120-31 = "..."
12120-32 = "...Não dá mais para pagar essa dívida pelos meios convencionais. Precisamos de algum outro método..."
12120-33 = "N-não pode! Se fizermos isso, de novo..."
12120-34 = "...Eu concordo com a Shiroko-senpai! Se a escola fechar, tudo acaba, então não podemos mais nos preocupar com as aparências!!"
12120-35 = "Serika-chan, não diga isso...!?"
12120-36 = "Serika-chan, espera! Se fizerem isso, vai ser igual àquela vez!?"
12120-37 = "N-não é isso que eu quis dizer! Não é isso, mas...!"
12120-38 = "A Hoshino-senpai nos impediu naquela época, e agora você quer se tornar uma criminosa por vontade própria!?"
12120-39 = "E-eu..."
12120-40 = "..."
12120-41 = "Ei, ei, pessoal, vamos nos acalmar."
12120-42 = "Estão saindo fumaça pelas orelhas de vocês, sabia?"
12120-43 = "Nn..."
12120-44 = "..."
12120-45 = "..."
12120-46 = "Sim, me desculpem..."
12120-47 = "...Desculpe, eu não queria que as coisas chegassem a esse ponto."
12120-48 = "Sim, todas nós entendemos. A Shiroko-chan também é uma boa menina, afinal."
12120-49 = "..."
12120-50 = "Bem, por hoje vamos parar por aqui."
12120-51 = "Uhe~, então está encerrado. Vamos esfriar a cabeça e nos reunir novamente amanhã. Isso é uma ordem da presidente."
12120-52 = "[s] \"...É verdade. Por enquanto, vamos todas para casa.\""
12120-54 = "（Nonomi, Ayane e Serika foram para casa, restando apenas Hoshino e Shiroko）"
12120-55 = "Hmm? Shiroko-chan, você ainda tem algo para fazer?"
12120-56 = "……Senpai, pode me dar um minuto?"
12120-57 = "Uhe~, quer conversar com o tio aqui? Não me deixe sem graça~."
12120-58 = "[s] \"Eu também.\""
12120-59 = "……Sensei também? Uhe, o tio aqui está muito popular, hein."
12120-60 = "Mas olha, hoje foi cansativo e tanta coisa aconteceu, né?"
12120-61 = "Vamos conversar amanhã. Eu já imagino mais ou menos sobre o que é."
12120-62 = "……Hum, entendi."
12120-63 = "Sensei……."
12120-64 = "[s] Acena com a cabeça."
12120-65 = "Hum, então até amanhã……."
12120-67 = "Uhe~, o Sensei é bom nisso, hein? Desde quando você e minha querida Shiroko-chan ficaram tão próximos a ponto de se entenderem só pelo olhar?"
12120-68 = "Não, não, o Sensei é um adulto que não dá para subestimar mesmo. O tio aqui não consegue acompanhar o ritmo e se sente até um pouco solitário."
12120-73 = "[ns] \"Hoshino, posso te perguntar uma coisa?\""
12120-74 = "Hum~, o quê?"
12120-75 = "[s] Entrega o pedido de saída/desligamento do clube da Hoshino."
12120-78 = "Isso é……."
12120-79 = "Uhe~, desde quando……! Isso, com certeza foi a Shiroko-chan que pegou, né?"
12120-80 = "Francamente, Shiroko-chan, não importa o motivo, não se deve mexer na bolsa dos outros, sabia?"
12120-81 = "Sensei, dê uma bronca na Shiroko-chan, está bem? Do jeito que ela está, não seria surpresa se ela se tornasse uma grande vilã."
12120-82 = "[s1] \"Sim. Falaremos disso outra hora.\"\n[s2] \"Agora, quero perguntar sobre este pedido de saída.\""
12120-83 = "……."
12120-84 = "……."
12120-85 = "Entendi……."
12120-86 = "[s] \"Pode me contar?\""
12120-87 = "……."
12120-88 = "Hmm. Parece que você não vai me deixar escapar…… né?"
12120-89 = "……Ah, não tem jeito mesmo."
12120-92 = "Não é o tipo de coisa para se falar cara a cara…… Sensei, quer dar uma volta por aí comigo?"
12120-93 = "[s] Sai para o corredor com Hoshino."
12120-100 = "Cof, cof…… nossa, aqui também está cheio de areia……."
12120-101 = "Bem, não tem o que fazer. Mesmo que a gente tente limpar, o prédio é grande demais para o número de pessoas que temos……."
12120-102 = "Seria bom se as tempestades de areia diminuíssem……."
12120-103 = "Uhe~, não acha um pouco triste que a nossa vida escolar seja toda na cor da areia?"
12120-104 = "[s] \"Hoshino, você gosta desta escola, não é?\""
12120-105 = "……Depois do que acabamos de falar, você realmente acha isso? Uhe, o Sensei é mesmo uma pessoa estranha."
12120-106 = "……Dizem que antes da desertificação, Abydos era uma escola bem grande e poderosa…… mas o tio aqui não tem nenhuma memória ou noção real disso."
12120-107 = "Desde o começo, tudo era uma bagunça, uma escola sem nada que prestasse."
12120-108 = "O prédio principal de Abydos, de quando eu entrei, já está enterrado na areia. E os veteranos daquela época já se foram todos."
12120-109 = "O lugar onde estamos agora é apenas um anexo, para onde nos mudamos várias vezes para fugir da desertificação."
12120-110 = "……Bem, mas foi aqui que eu conheci a Shiroko-chan, a Nonomi-chan, a Ayane-chan e a Serika-chan, então……."
12120-111 = "……."
12120-112 = "……Uhe, talvez eu goste mesmo daqui."
12120-113 = "[s] \"………….\""
12120-114 = "……Sensei, vou ser sincera com você."
12120-116 = "Há dois anos, eu venho recebendo propostas de gente estranha."
12120-117 = "[s] \"Propostas?\""
12120-118 = "Kaiser Corporation……."
12120-119 = "Mais do que propostas, era como um recrutamento…… desde que entrei em Abydos, várias e várias vezes."
12120-120 = "Falando nisso, isso aconteceu não faz muito tempo..."
12120-122 = "Tenho uma proposta para você, uma que você certamente não poderá recusar."
12120-123 = "Abandone a escola de Abydos e junte-se à nossa corporação... Se aceitar essa condição, cobriremos quase metade da dívida que Abydos carrega atualmente."
12120-124 = "Hehe, hehehehe... Vamos lá, quero ouvir sua resposta. Se for um sim, assine aqui."
12120-126 = "Eu já disse várias vezes que não."
12120-127 = "..."
12120-129 = "Para qualquer um, era uma oferta excepcional. Mas, na época, eu achava que se eu fosse embora, a escola de Abydos entraria em colapso, então continuei recusando..."
12120-130 = "...Parece que eles estão reunindo talentos para usar na PMC."
12120-131 = "[s] \"...Quem é essa pessoa, afinal?\""
12120-132 = "Eu também não sei a verdadeira identidade dele... Eu apenas o chamo de Kurofuku (Terno Preto)."
12120-133 = "[s] \"Terno Preto...\""
12120-134 = "Ele me dá arrepios... Mesmo em Kivotos, nunca vi ninguém do tipo dele..."
12120-135 = "Ele é um cara suspeito, mas não causou nenhum problema em particular..."
12120-136 = "O que será que ele é? Até o diretor da Kaiser parecia ter medo dele..."
12120-137 = "[s] \"Então, esse pedido de saída...\""
12120-138 = "...Uhe."
12120-139 = "...Bem, seria mentira dizer que não hesitei nem um pouco. Foi só um momento de fraqueza, por assim dizer."
12120-140 = "...É, acho que vou jogar fora agora."
12120-142 = "Uhe~, que alívio."
12120-143 = "Desculpe por causar mal-entendidos. É que, mesmo que eu contasse isso para todo mundo, só ia preocupá-los e não ia adiantar nada."
12120-144 = "Mas, bem, também não é bom ficar escondendo coisas das minhas queridas kouhais para sempre... Amanhã, vou contar tudo para elas."
12120-145 = "Elas provavelmente só vão ficar preocupadas, mas é melhor não ter segredos."
12120-146 = "Na verdade, agora, não consigo pensar em outra solução além de aceitar aquela proposta..."
12120-147 = "[s] \"...Com certeza deve haver um jeito.\""
12120-148 = "..."
12120-149 = "É verdade, seria bom se um milagre acontecesse..."
12120-150 = "...Um milagre, é?"
12120-151 = "...Bom, chega de falar disso."
12120-152 = "Então, até amanhã, Sensei."
12120-153 = "Adeus."
12120-157 = "[ns] \"Hoshino!\""
12120-158 = "Q-que foi...?"
12120-159 = "[s] \"Como adulto, eu vou dar um jeito! Por isso...!\""
12120-160 = "..."
12120-161 = "...Uhehe. Eu parecia tão desanimada assim?"
12120-165 = "Sim. Obrigada, Sensei."
12120-170 = "(No dia seguinte)"
12120-171 = "Ah, bom trabalho..."
12120-174 = "Ué, sou a primeira a chegar...?"
12120-176 = "...?"
12120-178 = "Isso é...?"
12120-179 = "...Não pode ser,"
12120-180 = "Por que... Por que isso!!!!??"
12120-182 = "(Sobre a mesa, estavam o pedido de saída de Hoshino e uma carta para todas)"
12120-184 = "Próximo episódio: O que escapou pelas mãos"
