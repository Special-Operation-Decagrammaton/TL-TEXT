[translation]
1006315-1 = "Eu o farei de volta!"

1006315-2 = "(Dirigindo-se à sala de reflexão para ajudar Koyuki)"

1006315-8 = "(Ao entrar na sala, um objeto sobre a escrivaninha chamou sua atenção)."

1006315-9 = "(Colocadas, bolas transparentes)"

1006315-10 = "(Nele flutuava um trevo de quatro folhas)."

1006315-11 = "[ns] \"This is ....... \""

1006315-14 = "O que o senhor acha, doutor?"

1006315-15 = "Naquela época, trancamos o trevo!"

1006315-16 = "Isso pode matá-lo."

1006315-17 = "Não há necessidade de se preocupar em perdê-lo!"

1006315-18 = "Ha ha ha! Permanente!"

1006315-19 = "[ns] \"Good ......! \""

1006315-21 = "[ns] \"......Lembro-me de que deixei cair algo. \""

1006315-22 = "Sim!"

1006315-23 = "Como este trevo de quatro folhas..."

1006315-24 = "Procure minha medalha também, doutor!"

1006315-25 = "[s1] \"Medalha? \"\n[s2] \"......Se você estiver com problemas, posso lhe emprestar uma? \""

1006315-28 = "Não se trata apenas de uma medalha!"

1006315-29 = "É aquele com um pequeno furo. ...... É o meu tesouro."

1006315-30 = "[s]\"Poderia ser ...... isso? \""

1006315-31 = "...... O quê?"

1006315-36 = "(Tira do bolso e mostra para Koyuki)"

1006315-42 = "Ah! Por que o professor está fazendo isso!"

1006315-43 = "Não me diga que você não está ...... se vingando de mim por causa do livro ...... fino!"

1006315-44 = "[Não, não é. Eu o peguei em frente à sala de reflexão. \""

1006315-45 = "Isso é absolutamente falso! Você está dizendo todas as coisas certas só porque #nãoconseguiu descobrir!"

1006315-46 = "O quê, ......? Isso não é uma #n mentira: ......?"

1006315-47 = "Ah ...... que ......."

1006315-48 = "Desculpe. ......."

1006315-49 = "Você o deixou cair quando foi para a aula? ......."

1006315-56 = "(Entregando uma medalha com um furo para Koyuki)"

1006315-57 = "Ha ha! Eu sabia que estava certo em chamar o médico!"

1006315-58 = "Obrigado, senhor!"

1006315-59 = "Huh, você está de volta em minhas mãos ...... haha ......."

1006315-60 = "[s3] \"É uma medalha especial? \"\n[s4] \"Como uma medalha de erro ....... \""

1006315-63 = "Medalha de erro? O que é isso?"

1006315-64 = "Ah, você quer dizer que os que apresentam erros de fabricação podem ser vendidos por um preço mais alto?"

1006315-65 = "Ah, não, não. Esta é a medalha original da Koyuki! #nPorque fui eu quem fez o buraco nesta medalha!"

1006315-66 = "[s]\"De fato ...... essa não é uma medalha comum. \""

1006315-67 = "É para uso em fliperama!"

1006315-68 = "[s5] \"Então, por que você fez um buraco? \"\n[s6] \"Como ...... quando você acaba fazendo buracos nas carteiras da sala de aula? \""

1006315-71 = "Buracos na mesa. ...... De fato, é divertido. ......"

1006315-72 = "Mas ...... phew. #Não se trata desse tipo de brincadeira infantil, certo?"

1006315-73 = "Qual é o segredo - é uma "medalha de vitória" que fiz há muito tempo!"

1006315-74 = "[s] \"Ganhar medalhas? \""

1006315-75 = "Sim! #nEsta medalha tem um fio condutor, não tem?"

1006315-76 = "Segure a extremidade da corda e coloque-a na máquina de jogos."

1006315-77 = "[s7]\"Quando o jogo termina, você puxa a corda e... ߡ"\n[s8]\"Você coleta as medalhas! \""

1006315-80 = "Resposta correta! Essa é a quintessência, senhor!"

1006315-84 = "[ns] \"Then it's 'cheat medal'. ......! \""

1006315-85 = "O quê? Do que está falando?"

1006315-86 = "Isso é para um jogo justo!"

1006315-87 = "Você já participou de um jogo de guindaste em que o braço estava muito solto? ......?"

1006315-88 = "O mesmo vale para a última "escalada em uma cafeteria"! #nQuando chegou a nossa vez, de repente se tornou um padrão difícil!"

1006315-89 = "As [ruby=yatsura]máquinas de jogos[/ruby] estão tentando nos derrubar!"

1006315-90 = "Então, temos que fazer isso de volta!"

1006315-91 = "[s]\"É um crime. ....... \""

1006315-92 = "Droga. ......!"

1006315-93 = "Achei que somente o professor entenderia. ......"

1006315-94 = "E, de qualquer forma, não posso lhe dar essa medalha!"

1006315-95 = "Em primeiro lugar, não posso usá-lo! #nNos dias de hoje, todos eles têm segurança aprimorada!"

1006315-96 = "[\"Então, por que você se importa tanto? \""

1006315-97 = "E? #n Então, é ......."

1006315-101 = "...... hmm."

1006315-102 = "Por que isso acontece?"

1006315-103 = "É como se eu não conseguisse me livrar do ......."

1006315-104 = "Bem, o que importa para você os detalhes? #Vamos nos divertir! Vamos nos divertir!"

1006315-105 = "Tenho um novo jogo de tabuleiro escondido debaixo da minha cama!"

1006315-107 = "(Depois de jogar um jogo de tabuleiro com Koyuki na sala de reflexão...)"

1006315-108 = "(Koyuki se inscreveu em um curso de um dia sobre boas maneiras em público na Valkyrie)"

