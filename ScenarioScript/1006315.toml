[translation]
1006315-1 = "やり返してやります！"
1006315-2 = "（コユキを手伝うために、反省部屋に向かった）"
1006315-8 = "（部屋に入ると、机の上の物に目が留まった）"
1006315-9 = "（置かれているのは、透明の玉）"
1006315-10 = "（その中に、四つ葉のクローバーが浮かんでいた）"
1006315-11 = "[ns] \"これは……。\""
1006315-14 = "どうですか、先生！"
1006315-15 = "あの時のクローバーを閉じ込めたんです！"
1006315-16 = "これで枯れることも――"
1006315-17 = "なくす心配もありません！"
1006315-18 = "にははは！永久保存版です！"
1006315-19 = "[ns] \"いいね……！\""
1006315-21 = "[ns] \"……そういえば、落とし物をしたんだっけ。\""
1006315-22 = "そうなんです！"
1006315-23 = "この四つ葉のクローバーのように――"
1006315-24 = "私のメダルも探してください、先生！"
1006315-25 = "[s1] \"メダル？\"\n[s2] \"……困ってるなら、貸そうか？\""
1006315-28 = "ただのメダルじゃないんです！"
1006315-29 = "ちっちゃい穴が空いてるやつで……私の宝物なんです。"
1006315-30 = "[s] \"もしかして……これ？\""
1006315-31 = "……え？"
1006315-36 = "（ポケットから取り出して、コユキに見せた）"
1006315-42 = "はっ！？どうして先生がこれを！？"
1006315-43 = "まさか……薄い本の時の仕返しに……！？"
1006315-44 = "[s] \"違うよ。反省部屋の前で拾ったんだ。\""
1006315-45 = "絶対嘘です！#n図星だからって適当なことを言ってるんですよね！？"
1006315-46 = "え……？#n嘘じゃない……？"
1006315-47 = "あっ……その……。"
1006315-48 = "すみません……。"
1006315-49 = "授業に行くときに落としたのかな……。"
1006315-56 = "（穴の空いたメダルをコユキに渡した）"
1006315-57 = "にはは！やっぱり先生を呼んで正解でした！"
1006315-58 = "ありがとうございます、先生！"
1006315-59 = "ふふ、私の手に戻ってきましたね……にははは……。"
1006315-60 = "[s3] \"特別なメダルなの？\"\n[s4] \"エラーメダル……みたいな。\""
1006315-63 = "エラーメダル？何ですか、それ。"
1006315-64 = "あ、製造ミスのやつは高く売れるっていう？"
1006315-65 = "いやー、違いますよ。これは、コユキオリジナルメダルです！#nこのメダルに穴を空けたのは私ですから！"
1006315-66 = "[s] \"たしかに……これ、よくあるメダルじゃないね。\""
1006315-67 = "ゲーセン用ですからね！"
1006315-68 = "[s5] \"じゃあ、なんで穴を空けたの？\"\n[s6] \"教室の机につい穴を開けちゃう……みたいな？\""
1006315-71 = "机に穴……たしかに楽しいですよね……。"
1006315-72 = "ですが……ふっふっふ。#nこれは、そんな幼稚な遊びとは違いますよ？"
1006315-73 = "何を隠そう――私が昔作った「勝負メダル」なんです！"
1006315-74 = "[s] \"勝負メダル？\""
1006315-75 = "はい！#nこのメダルには糸が通してありますよね？"
1006315-76 = "糸の端を握ったまま、ゲーム機に入れます。"
1006315-77 = "[s7] \"ゲームが終わったら、糸を引っ張って――\"\n[s8] \"メダルを回収するんだね！\""
1006315-80 = "正解！流石ですね、先生！"
1006315-84 = "[ns] \"それじゃ「チートメダル」だよ……！\""
1006315-85 = "え？なに言ってるんですか。"
1006315-86 = "これはフェアな勝負のためですよ！"
1006315-87 = "クレーンゲームで、やたらアームがゆるかったこと……ありません？"
1006315-88 = "この前の「喫茶店登山」もそう！#n私たちの番になったら、急に難しいパターンになりましたよね！？"
1006315-89 = "[ruby=やつら]ゲーム機[/ruby]は私たちを陥れようとしてるんです！"
1006315-90 = "だったら、やりかえさないと！"
1006315-91 = "[s] \"それ、犯罪……。\""
1006315-92 = "くっ……！"
1006315-93 = "先生にだけはわかってもらえると思ったのに……！"
1006315-94 = "と、とにかく、このメダルは渡せません！"
1006315-95 = "そもそも使えないんですよ！#n最近のやつは、みんなセキュリティが強化されちゃって！"
1006315-96 = "[s] \"じゃあ、何でそんな大事にしてるの？\""
1006315-97 = "え？#nそ、それは……。"
1006315-101 = "……うーん。"
1006315-102 = "なんででしょうね。"
1006315-103 = "なんか……捨てられないっていうか。"
1006315-104 = "まあ細かいことはいいじゃないですか。#nそれよりほら！せっかくですし、遊びましょうよ！"
1006315-105 = "新作ボードゲームを、ベッドの下に隠してあるんです！"
1006315-107 = "（反省部屋でコユキとボードゲームを楽しんだ後――）"
1006315-108 = "（ヴァルキューレの「公共マナー講座一日コース」にコユキを登録した）"
