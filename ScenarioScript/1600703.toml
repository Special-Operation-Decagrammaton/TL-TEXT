[translation]
1600703-1 = "合間合間に休憩を"
1600703-2 = "シャーレ・オフィス"
1600703-5 = "おはようございます、先生。"
1600703-6 = "先日モモトークでお話した件は、何とかなりましたのでご報告までに。"
1600703-7 = "来週までに頂ければ、全然……"
1600703-9 = "[s1] \"あ、これその報告書。\"\n[s2] \"遅れてごめんね。\""
1600703-10 = "あら、こんなに量があるのに……。"
1600703-11 = "あら、こんなに量があるのに……。"
1600703-12 = "すみません、結果的に急かしてしまいましたね。ですが、ありがとうございます。"
1600703-13 = "流石は大人と言いますか……先生は、責任感が強いお方なんですね。"
1600703-14 = "[s3] \"元々は、私のミスだったからね……。\"\n[s4] \"トモエの手を汚すわけにはいかないから……\""
1600703-15 = "ふふっ、おかげさまで少々手間が省けました。ありがとうございます、先生。"
1600703-16 = "ふふっ、おかげさまで少々手間が省けました。ありがとうございます、先生。"
1600703-17 = "ところで先生、顔色が悪いですが……大丈夫ですか？目の下にクマが……。"
1600703-18 = "もしかしてこの報告書のために、徹夜を……？"
1600703-19 = "[s] \"ちょっとだけね。\""
1600703-20 = "無理なさらずとお伝えしましたのに……。"
1600703-21 = "やはり急かしたような形になってしまって、申し訳ありません。"
1600703-22 = "とりあえず、今は少しでもお昼寝をされてはいかがですか？"
1600703-23 = "[s] \"仕事中に昼寝は、ちょっと気が引けるというか……。\""
1600703-24 = "いえ、休息もれっきとしたお仕事の一環です。"
1600703-25 = "お疲れの状態で業務を進めるよりも、お昼寝を挟んでスッキリしてからの方が効率的だという研究結果もありますからね。"
1600703-26 = "ご存じかもしれませんが、チェリノ会長も昼食の後はいつもお昼寝をされているんです。"
1600703-27 = "よろしければ先生が快適にお昼寝できるように、この後少々準備をしてもよろしいですか？"
1600703-28 = "[s] \"じゃあ、お願いしよっかな……。\""
1600703-29 = "はい、それでは少々お待ちください。"
1600703-45 = "先生、お待たせいたしました。"
1600703-46 = "（トモエの後をついていく）"
1600703-50 = "シャーレ・居住区"
1600703-51 = "[ns] \"これは……？\""
1600703-53 = "先生が気持ちよくお休みになれるよう、特別に用意したお昼寝セットです。"
1600703-54 = "腰に負担がかからない最高級の寝具、重さがほとんど感じられない特殊な生地でできたパジャマ、睡眠に効果があるハーブティー、聴いてるだけで眠くなるクラシック音楽などなど……。"
1600703-55 = "ここがレッドウィンターでしたら、さらに良いものがご用意できたのですが……今後は色々と、シャーレに物を常備しておくことも検討した方が良いかもしれません。"
1600703-56 = "では、先生。早速着替えて横になってください。"
1600703-57 = "[s5] \"十分すごいセットだと思う……。\"\n[s6] \"絶対に寝させてみせるという強い意志を感じる……。\""
1600703-58 = "あら、そうですか？チェリノ会長はむしろ、少なくともこれくらい環境が整わないとお休みになれないので……。"
1600703-59 = "あら、そうですか？チェリノ会長はむしろ、少なくともこれくらい環境が整わないとお休みになれないので……。"
1600703-60 = "それはさておき……さあ、どうぞ？"
1600703-61 = "こうしている間にも時間は経ってしまいますし……せっかくなので、しっかり休んでいただかないと。"
1600703-63 = "トモエに手伝ってもらいつつパジャマに着替えて、ハーブティーを飲んでから、寝具の上に横になった。"
1600703-65 = "それでは、電気を消しますね。"
1600703-68 = "ね〜んねん　ころりよ〜　おころりよ～♪"
1600703-69 = "[s] \"まさかの子守歌！\""
1600703-70 = "あ、つい……チェリノ会長は「子守歌がないと眠れない」とぐずる時がありまして……。"
1600703-71 = "えっと……何か違う曲の方が良いですか？"
1600703-72 = "[s] \"ううん、大丈夫。ありがとう。\""
1600703-73 = "ふふ、それでは続けますね。"
1600703-74 = "先生はよい子だ　ねんねしな～♪"
1600703-76 = "昼寝セットのおかげなのか、トモエから異様なプレッシャーが放たれていたにも関わらず、すぐに眠りにつくことができた……。"
1600703-77 = "トモエのおかげで、その日は最高の昼寝を享受できた……。"
