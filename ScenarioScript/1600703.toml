[translation]
1600703-1 = "Faça pausas de vez em quando"
1600703-2 = "Escritório do Schale"
1600703-5 = "Bom dia, Sensei."
1600703-6 = "Estou aqui para informar que o assunto que discutimos no MomoTalk outro dia foi resolvido."
1600703-7 = "Se puder me entregar até a semana que vem, não tem problema..."
1600703-9 = "[s1] \"Ah, aqui está o relatório.\"\n[s2] \"Desculpe pela demora.\""
1600703-10 = "Nossa, mesmo com essa quantidade toda..."
1600703-11 = "Nossa, mesmo com essa quantidade toda..."
1600703-12 = "Sinto muito, acabei te apressando. Mas, agradeço muito."
1600703-13 = "Como esperado de um adulto... Sensei, você é uma pessoa com um forte senso de responsabilidade."
1600703-14 = "[s3] \"Originalmente, o erro foi meu...\"\n[s4] \"Não posso deixar que a Tomoe suje as mãos por minha causa...\""
1600703-15 = "Fufu, graças a isso, economizei um pouco de trabalho. Obrigada, Sensei."
1600703-16 = "Fufu, graças a isso, economizei um pouco de trabalho. Obrigada, Sensei."
1600703-17 = "Aliás, Sensei, você está com uma aparência ruim... está tudo bem? Tem olheiras embaixo dos seus olhos..."
1600703-18 = "Será que você passou a noite em claro por causa deste relatório...?"
1600703-19 = "[s] \"Só um pouquinho.\""
1600703-20 = "Eu disse para não se esforçar tanto..."
1600703-21 = "Sinto muito, acabei agindo como se estivesse te apressando."
1600703-22 = "Por enquanto, que tal tirar uma soneca, mesmo que seja por pouco tempo?"
1600703-23 = "[s] \"Tirar uma soneca durante o trabalho é um pouco constrangedor...\""
1600703-24 = "Não, o descanso também é uma parte legítima do trabalho."
1600703-25 = "Existem resultados de pesquisas que dizem que é mais eficiente tirar uma soneca e se refrescar do que continuar trabalhando cansado."
1600703-26 = "Talvez você saiba, mas a Presidente Cherino também sempre tira uma soneca após o almoço."
1600703-27 = "Se não se importar, posso preparar algumas coisas para que você possa tirar uma soneca confortavelmente?"
1600703-28 = "[s] \"Bem, acho que vou aceitar...\""
1600703-29 = "Sim, então por favor, aguarde um momento."
1600703-45 = "Sensei, desculpe a espera."
1600703-46 = "(Seguindo a Tomoe)"
1600703-50 = "Área Residencial do Schale"
1600703-51 = "[ns] \"O que é isso...?\""
1600703-53 = "É um conjunto de soneca preparado especialmente para que você possa descansar confortavelmente, Sensei."
1600703-54 = "Roupas de cama de alta qualidade que não sobrecarregam a lombar, um pijama feito de um tecido especial que quase não se sente o peso, um chá de ervas que ajuda no sono, música clássica que dá sono só de ouvir, e por aí vai..."
1600703-55 = "Se estivéssemos em Red Winter, eu poderia ter preparado coisas ainda melhores... Talvez eu deva considerar manter várias coisas estocadas aqui no Schale no futuro."
1600703-56 = "Bem, Sensei. Por favor, troque de roupa e deite-se imediatamente."
1600703-57 = "[s5] \"Acho que esse conjunto já é incrível o suficiente...\"\n[s6] \"Sinto uma determinação inabalável em me fazer dormir...\""
1600703-58 = "Ah, é mesmo? Na verdade, a Presidente Cherino não consegue descansar a menos que o ambiente esteja pelo menos assim..."
1600703-59 = "Ah, é mesmo? Na verdade, a Presidente Cherino não consegue descansar a menos que o ambiente esteja pelo menos assim..."
1600703-60 = "Deixando isso de lado... Vamos, por favor?"
1600703-61 = "O tempo continua passando enquanto estamos aqui... Já que estamos nisso, você precisa descansar de verdade."
1600703-63 = "Com a ajuda da Tomoe, troquei de pijama, tomei o chá de ervas e me deitei na cama."
1600703-65 = "Então, vou apagar a luz."
1600703-68 = "Dorme, dorme, meu bem... dorme, dorme, meu bem...♪"
1600703-69 = "[s] \"Uma canção de ninar, sério?!\""
1600703-70 = "Ah, foi sem querer... Às vezes a Presidente Cherino faz birra dizendo que \"não consegue dormir sem uma canção de ninar\"..."
1600703-71 = "Bem... você prefere alguma outra música?"
1600703-72 = "[s] \"Não, está tudo bem. Obrigado.\""
1600703-73 = "Fufu, então vou continuar."
1600703-74 = "Sensei é uma boa criança, durma agora...♪"
1600703-76 = "Talvez por causa do conjunto de soneca, ou apesar da pressão estranha que a Tomoe estava emanando, consegui adormecer imediatamente..."
1600703-77 = "Graças à Tomoe, pude desfrutar da melhor soneca daquele dia..."
