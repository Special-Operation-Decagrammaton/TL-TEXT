[translation]
1001220-1 = "トレーナーの限界"
1001220-2 = "シャーレ付近の公園"
1001220-3 = "（早朝、ジョギングの準備をしてスミレを待っていたら……）"
1001220-10 = "あ、トレーナー。先にいらっしゃっていたのですね。"
1001220-11 = "すみません、思ったよりたくさん準備があって……。"
1001220-12 = "[s] \"全然大丈夫だよ。私も来たばかりだから。\""
1001220-14 = "[ns] \"でもジョギングでそんなに準備することあるかな……？\""
1001220-15 = "はい、もちろん。"
1001220-16 = "運動効率を最大化するためには、徹底した準備が不可欠ですから。"
1001220-17 = "スニーカーからランニングベルトまで……#nあらゆる装備を適切に着用する必要があります。#nでなければ、怪我に繋がることもありますので。"
1001220-18 = "[s] \"そ、そっか……。\""
1001220-19 = "今日は久々のジョギングでしたし、新しい装備を着用してきました。"
1001220-20 = "新しい場所で新しい装備を着て運動するのは、なんだか少し緊張しますね。"
1001220-21 = "では……軽くいってみましょうか？"
1001220-28 = "（10分後……）"
1001220-36 = "はぁ、はぁ……。"
1001220-37 = "[s] \"……スミレ、大丈夫？\""
1001220-38 = "だ、大丈夫です……#nまだ1kmも、走っていませんから……。"
1001220-39 = "まだまだ……全然いけます……。"
1001220-40 = "[s1] \"でも、いつもと違って随分と疲れてるように見えるけど……。\"\n[s2] \"体調が悪いなら、無理しないで。\""
1001220-47 = "い、いえ……そういうわけでは、ないと思います。"
1001220-48 = "コンディションは、いつもよりいい方だと思いますし……"
1001220-49 = "だから、息が切れているのは……"
1001220-54 = "この砂袋のせいでしょうか……？"
1001220-55 = "[s] \"……砂袋？\""
1001220-56 = "はい。ジョギング前に両腕と両足へ装着していたのです。"
1001220-57 = "そのため、いつもより運動負荷が上がってしまい、#nすぐに疲れてしまったのかもしれません。"
1001220-58 = "[s3] \"砂袋をつけてジョギングするなんて、すごいね。\"\n[s4] \"でも、普段の運動量でも十分なんじゃ……？\""
1001220-61 = "筋肉を鍛えるためには、かける負荷を増やしていかねばなりません。"
1001220-62 = "もちろん無理しないことも大切ですが、#n同じ負荷の運動ばかりしていると、成長も止まってしまいますので。"
1001220-63 = "己の限界を知り、#nそれを乗り越えるために挑戦し続ける……#nそれこそ、正しいトレーニングの姿勢と言えるでしょう！"
1001220-64 = "[s] \"立派な心構えだね。\""
1001220-66 = "[ns] \"私も運動の強度を上げてみようかな……。\""
1001220-67 = "素晴らしい考えです！"
1001220-68 = "でしたらトレーナーも、#nこの砂袋をつけて運動してみるのはいかがですか？"
1001220-69 = "両腕につけているものをお貸ししますので！"
1001220-70 = "[s] \"ありがとう。じゃあ……。\""
1001220-75 = "[ns] \"お、重い……！？\""
1001220-76 = "え？そんなに重いでしょうか？"
1001220-77 = "手足に負担がかかりすぎない程度の#n重さにしたはずなのですが……。"
1001220-78 = "[s] \"この砂袋……何kgくらいあるの？\""
1001220-79 = "ええと……片方5kgずつですから……。"
1001220-80 = "合わせて10kgくらいでしょうか？"
1001220-81 = "[s] \"……それってダンベル持って走るようなものじゃない？\""
1001220-82 = "ダンベルを持って走る……"
1001220-83 = "ふふっ、面白い発想ですね。"
1001220-84 = "今度やってみるのもいいかもしれません。"
1001220-85 = "[ns5] （両足が枷をはめられたように重い……）\n[ns6] （スミレはこんなものをずっとつけて……？）"
1001220-89 = "さあ、トレーナー！#nトラックを完走するまでまだまだ距離がありますよ！#nもう一踏ん張りです！"
1001220-90 = "いきますよ――いち、に！いち、に！#nトレーナーも来て下さい！#n一緒に自分の限界を越えましょう！"
1001220-99 = "[ns] \"ま……待って……！\""
1001220-101 = "（その後も、砂袋をつけてジョギングを続けようとしたが……）"
1001220-102 = "（あまりに重すぎて、途中でリタイアしてしまった）"
