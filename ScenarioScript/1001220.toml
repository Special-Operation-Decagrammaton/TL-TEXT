[translation]
1001220-1 = "O limite do treinador"
1001220-2 = "Parque perto do Schale"
1001220-3 = "（Madrugada, enquanto esperava Sumire pronta para correr...）"
1001220-10 = "Ah, Treinador. Você já chegou."
1001220-11 = "Desculpe, é que tive mais preparativos do que esperava..."
1001220-12 = "[s] \"Está tudo bem. Eu também acabei de chegar.\""
1001220-14 = "[ns] \"Mas precisa de tanto preparo assim para uma corrida...?\""
1001220-15 = "Sim, com certeza."
1001220-16 = "Para maximizar a eficiência do exercício, uma preparação minuciosa é indispensável."
1001220-17 = "Desde os tênis até a cinta de corrida...#nÉ preciso usar todo o equipamento adequadamente.#nCaso contrário, pode acabar resultando em lesões."
1001220-18 = "[s] \"E-entendi...\""
1001220-19 = "Hoje foi minha primeira corrida em um tempo, então vim usando equipamento novo."
1001220-20 = "Fazer exercícios em um lugar novo com equipamento novo me deixa um pouco nervosa."
1001220-21 = "Então... vamos começar devagar?"
1001220-28 = "（10 minutos depois...）"
1001220-36 = "Haa, haa..."
1001220-37 = "[s] \"...Sumire, você está bem?\""
1001220-38 = "E-estou bem...#nAinda nem corremos 1km..."
1001220-39 = "Ainda dá... consigo continuar..."
1001220-40 = "[s1] \"Mas você parece muito mais cansada do que o normal...\"\n[s2] \"Se não estiver se sentindo bem, não se force.\""
1001220-47 = "N-não... não acho que seja isso."
1001220-48 = "Acho que meu condicionamento está até melhor que o normal..."
1001220-49 = "Então, o motivo de eu estar ofegante é..."
1001220-54 = "Será que é por causa destes sacos de areia...?"
1001220-55 = "[s] \"...Sacos de areia?\""
1001220-56 = "Sim. Eu os prendi nos meus braços e pernas antes de começar a correr."
1001220-57 = "Por causa disso, a carga do exercício ficou maior que o normal e#ntalvez eu tenha me cansado rápido demais."
1001220-58 = "[s3] \"Correr usando sacos de areia, isso é incrível.\"\n[s4] \"Mas a sua carga de exercício habitual já não é o suficiente...?\""
1001220-61 = "Para fortalecer os músculos, é preciso aumentar a carga aplicada."
1001220-62 = "Claro que não se forçar é importante, mas#nse você fizer apenas exercícios com a mesma carga, o crescimento acaba estagnando."
1001220-63 = "Conhecer os próprios limites e#ncontinuar desafiando a si mesmo para superá-los...#nEssa é a postura correta para o treinamento!"
1001220-64 = "[s] \"Essa é uma mentalidade admirável.\""
1001220-66 = "[ns] \"Será que eu deveria aumentar a intensidade do meu exercício também...?\""
1001220-67 = "Excelente ideia!"
1001220-68 = "Sendo assim, Treinador,#nque tal tentar se exercitar usando estes sacos de areia?"
1001220-69 = "Vou te emprestar os que estou usando nos braços!"
1001220-70 = "[s] \"Obrigado. Então...\""
1001220-75 = "[ns] \"Q-que pesado...!\""
1001220-76 = "Eh? É tão pesado assim?"
1001220-77 = "Eu deveria ter colocado um peso que não sobrecarregasse#ndemais as mãos e os pés..."
1001220-78 = "[s] \"Esses sacos de areia... pesam quantos quilos?\""
1001220-79 = "Bem... são 5kg em cada lado, então..."
1001220-80 = "Dá uns 10kg no total, eu acho?"
1001220-81 = "[s] \"...Isso não é basicamente correr segurando halteres?\""
1001220-82 = "Correr segurando halteres..."
1001220-83 = "Fufu, que ideia interessante."
1001220-84 = "Talvez seja bom tentar fazer isso da próxima vez."
1001220-85 = "[ns5] （Minhas pernas estão pesadas como se estivessem acorrentadas...）\n[ns6] （A Sumire usa isso o tempo todo...?）"
1001220-89 = "Vamos lá, Treinador!#nAinda falta muito para completar a volta na pista!#nMais um esforço!"
1001220-90 = "Lá vamos nós — um, dois! Um, dois!#nTreinador, venha também!#nVamos superar nossos limites juntos!"
1001220-99 = "[ns] \"E-espera...!\""
1001220-101 = "(Depois disso, tentei continuar a corrida usando sacos de areia, mas...)"
1001220-102 = "(Eram pesados demais, então acabei desistindo no meio do caminho.)"
