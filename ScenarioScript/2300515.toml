[translation]
2300515-1 = "A Flower Blooming in the Desert"
2300515-3 = "[ns1] \"I finished my work before the evening!\"\n[ns2] \"Hooray for me!\""
2300515-7 = "I-I didn't really do anything special..."
2300515-8 = "I'm happy you're praising me for being thorough, but..."
2300515-9 = "But, since I finished my work early—"
2300515-10 = "What are you going to do now?"
2300515-11 = "[s3] \"Slack off with Ayane?\"\n[s4] \"Lounge around with Ayane?\""
2300515-14 = "S-Sensei!"
2300515-15 = "..."
2300515-16 = "No, well... it's nothing."
2300515-17 = "Actually, I'm happy..."
2300515-18 = "I-I'll go prepare some snacks!"
2300515-24 = "Ah!?"
2300515-25 = "[s] \"What's wrong!?\""
2300515-26 = "Oh, I just dropped my hairpin. #nPlease, don't worry about it."
2300515-32 = "Here you go, Sensei."
2300515-33 = "Coffee and chocolate. It's your favorite brand."
2300515-34 = "Hehe..."
2300515-35 = "How long do you think it's been since I met you? #nI know at least that much."
2300515-37 = "(Enjoyed a peaceful break with Ayane)"
2300515-39 = "[ns] \"That hairpin you dropped earlier... it's the one you always wear, right?\""
2300515-42 = "Eh?"
2300515-43 = "You really pay close attention to me, don't you..."
2300515-44 = "[ns] \"I was just concerned because you said you dropped it.\""
2300515-45 = "Eh?"
2300515-46 = "I'm... actually, really happy about that..."
2300515-47 = "This is shaped like a flower, but... it's actually a flower that doesn't exist."
2300515-48 = "[ns] \"Is that so? It looks like something that could exist somewhere...\""
2300515-49 = "That's what you'd think, right? #nBut... even when I looked it up, there was no matching flower."
2300515-50 = "The closest one is a Saxifraga, but... the number of petals is different."
2300515-51 = "So, this pin is probably... just designed with a flower motif."
2300515-52 = "But... that's exactly why I like this shape."
2300515-53 = "I feel like I'm the only one who knows... and can remember it."
2300515-54 = "[ns] \"That's a lovely way of thinking.\""
2300515-55 = "Thank you."
2300515-56 = "I think... we should cherish the things that are usually overlooked."
2300515-57 = "Like receipts... or contracts... #nThere are so many things that you can avoid losing money on if you check them properly."
2300515-58 = "Like those contract terms written in such small print that you'd need a magnifying glass to read them...!"
2300515-59 = "[s] \"That's very practical...\""
2300515-60 = "Ugh... I'm so glad you understand."
2300515-61 = "Back to the pin... #nActually, I started using this when I entered middle school, so I'm very attached to it."
2300515-62 = "I even end up buying socks with similar patterns when I see them..."
2300515-63 = "...Huh?"
2300515-64 = "W-Why am I suddenly talking about socks in front of Sensei!?"
2300515-65 = "Or rather, what was I trying to talk about!?"
2300515-66 = "[s] \"Don't ask me!\""
2300515-67 = "R-Right... I'm sorry. I got a bit flustered."
2300515-70 = "..."
2300515-71 = "S-Speaking of flowers... Sensei, did you know that flowers bloom in the desert?"
2300515-72 = "[s] \"In the desert?\""
2300515-73 = "I've never seen it myself, but..."
2300515-74 = "Once every few years, or even decades, when it rains..."
2300515-75 = "Seeds hidden in the sand sprout and bloom all at once."
2300515-76 = "A few weeks later, the hot winds wither everything away, so..."
2300515-77 = "Before that happens, they somehow manage to leave behind the next generation of seeds."
2300515-78 = "The new seeds... wait patiently in the sand for the next rain."
2300515-79 = "When I think about it, it doesn't feel like someone else's story."
2300515-80 = "...Will it ever rain in Abydos, too?"
2300515-81 = "[s] \"Yeah. It will rain someday.\""
2300515-82 = "Though, for it to rain in the desert..."
2300515-83 = "It would require an abnormal weather event."
2300515-84 = "So, it's not necessarily a good thing, you know."
2300515-85 = "[s] \"S-Should I take back what I just said...!?\""
2300515-86 = "Ahaha... please don't worry about it."
2300515-87 = "There's a chance it could rain even without abnormal weather."
2300515-88 = "Besides... it has already rained in Abydos."
2300515-89 = "[s5] \"Is that so?\"\n[s6] \"When did it rain?\""
2300515-92 = "Hehe, I thought you'd say that."
2300515-93 = "Whether a flower bloomed at that time..."
2300515-94 = "Hmm..."
2300515-95 = "At least... for me, yes. #nI think it did."
2300515-96 = "[s] \"I'm even more confused now...\""
2300515-97 = "I-I'm sorry."
2300515-98 = "But, it's still a secret from you, Sensei."
2300515-99 = "[s] \"What does that mean!?\""
2300515-100 = "Hehe, what could it mean?"
2300515-101 = "But someday, when it really rains—"
2300515-102 = "And flowers bloom in Abydos..."
2300515-103 = "I want to see that sight with you, Sensei."
2300515-104 = "[s] \"Yeah. Let's see it together.\""
2300515-105 = "It's a promise, okay?"
2300515-106 = "Now, so you don't forget our promise..."
2300515-107 = "I'll give this to you."
2300515-112 = "Hehe, it's okay. I have a spare."
2300515-113 = "O-Of course, you don't have to wear it..."
2300515-114 = "I'd be happy if you just kept it safe."
2300515-115 = "[ns] \"Thank you.\""
2300515-117 = "No."
2300515-122 = "Actually, the one who wants to express gratitude is us..."
2300515-123 = "It's me."
2300515-125 = "(Spent the rest of the time slacking off to the fullest with a happier-than-usual Ayane)"