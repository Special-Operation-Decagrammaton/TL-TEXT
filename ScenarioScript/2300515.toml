[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 24/06.]
2300515-1 = "Uma Flor no Deserto"
2300515-3 = "[ns1] \"Consegui terminar o trabalho antes do fim da tarde!\"\n[ns2] \"Viva a Ayane!\""
2300515-7 = "N-Não foi nada de mais..."
2300515-8 = "Fico feliz que elogie o meu trabalho tão bem, mas..."
2300515-9 = "Como terminamos tudo tão cedo assim――"
2300515-10 = "O que o Sensei pretende fazer agora?"
2300515-11 = "[s3] \"Que tal matarmos serviço juntos?\"\n[s4] \"Vamos ficar de bobeira?\""
2300515-14 = "S-Sensei!"
2300515-15 = "......"
2300515-16 = "Não, bem... eu não me importo."
2300515-17 = "Na verdade... eu ia adorar."
2300515-18 = "V-Vou preparar uns lanchinhos!"
2300515-24 = "Ah!?"
2300515-25 = "[s] \"O que foi!?\""
2300515-26 = "Nada, só deixei o meu grampo de cabelo cair.\nNão se preocupe."
2300515-32 = "Aqui, Sensei. Pode comer."
2300515-71 = "Você sabia que até no deserto nascem flores?"
2300515-72 = "[s] \"No deserto?\""
2300515-73 = "Eu também nunca vi pessoalmente, mas..."
2300515-74 = "Dizem que quando chove, algo que só acontece uma vez a cada muitos e muitos anos..."
2300515-75 = "As sementes escondidas na areia brotam, e o deserto inteiro floresce de uma só vez."
2300515-76 = "E como tudo seca semanas depois por conta dos ventos quentes..."
2300515-77 = "Elas dão um jeito de deixar novas sementes para trás antes de murcharem."
2300515-78 = "Essas novas sementes... ficam esperando pacientemente na areia até a próxima chuva."
2300515-79 = "Pensando nisso, sinto que a nossa situação não é tão diferente assim."
2300515-80 = "......Será que um dia vai chover em Abydos também?"
2300515-81 = "[s] \"Sim, um dia vai chover.\""
2300515-82 = "Mas para chover no deserto..."
2300515-83 = "Precisa acontecer uma anomalia climática."
2300515-84 = "Então... não significa necessariamente que seja algo bom, sabe?"
2300515-85 = "[s] \"A-Acho melhor eu retirar o que eu disse, né...\""