[translation]
2300515-1 = "砂漠に咲く花"
2300515-3 = "[ns1] \"夕方前に仕事が片づいたー！\"\n[ns2] \"アヤネ、ばんざーい！\""
2300515-7 = "た、大したことはしていませんよ……。"
2300515-8 = "仕事が丁寧だと褒めていただけるのは嬉しいですが……。"
2300515-9 = "ですが、お仕事が早く終わってしまった分――"
2300515-10 = "この後は何をなさるんですか？"
2300515-11 = "[s3] \"アヤネとサボる？\"\n[s4] \"アヤネとダラダラする？\""
2300515-14 = "せ、先生！"
2300515-15 = "……。"
2300515-16 = "いや、では……別に。"
2300515-17 = "むしろ、嬉しいです……。"
2300515-18 = "お、お菓子準備してきますね！"
2300515-24 = "あっ！？"
2300515-25 = "[s] \"どうしたの！？\""
2300515-26 = "いえ、ヘアピンを落としてしまっただけです。#n気にしないでください。"
2300515-32 = "はい、どうぞ先生。"
2300515-33 = "コーヒーとチョコです。先生がお好きな銘柄ですよ。"
2300515-34 = "ふふ……。"
2300515-35 = "先生とお会いしてからどれだけ経ったと思っているんですか？#nそのくらい、分かりますよ。"
2300515-37 = "（アヤネと一緒に穏やかな休憩時間を楽しんだ）"
2300515-39 = "[ns] \"さっき落としたって言っていたヘアピン……いつも着けているものだよね？\""
2300515-42 = "え？"
2300515-43 = "よく見ていてくださっているのですね……。"
2300515-44 = "[ns] \"落としたって言ってたから気になって。\""
2300515-45 = "え？"
2300515-46 = "ちょっと……すごく、うれしい、かも……。"
2300515-47 = "これ、花の形をしているんですが……実は存在しない花なんです。"
2300515-48 = "[ns] \"そうなの？どこかにありそうな見た目なのに……。\""
2300515-49 = "そう思いますよね？#nですが……調べても、該当する花はありませんでした。"
2300515-50 = "一番近いのはユキノシタですが……花びらの枚数が違います。"
2300515-51 = "なので、このピンはきっと……花をモチーフにしただけなのかもしれません。"
2300515-52 = "でも……だからこそ、この形が好きなんです。"
2300515-53 = "私だけが知り……覚えていてあげられるような気がして。"
2300515-54 = "[ns] \"素敵な考え方だね。\""
2300515-55 = "ありがとうございます。"
2300515-56 = "私は……普段見過ごされがちなものこそ、大切にしないといけないと思うんです。"
2300515-57 = "領収書や……契約書など……。#nきちんと確認すれば損をしなくて済むものがたくさんありますから。"
2300515-58 = "それこそ……ルーペがないと読めないくらい、小さい文字で書かれた契約書の要項とか……！"
2300515-59 = "[s] \"切実だね……。\""
2300515-60 = "うぅ……分かっていただけて嬉しいです。"
2300515-61 = "ピンの話に戻りますが……。#n実はこれ……中学生になってから使い始めたので、すごく思い入れがあるんです。"
2300515-62 = "同じような模様の靴下を見かけた時にも買ってしまうくらい……。"
2300515-63 = "……あれ？"
2300515-64 = "ど、どうして急に先生の前で靴下の話をしているんでしょうか！？"
2300515-65 = "というか、私は何の話がしたかったんでしょう！？"
2300515-66 = "[s] \"それを私に聞かれても！\""
2300515-67 = "そ、そうですよね……すみません。取り乱してしまいました。"
2300515-70 = "……。"
2300515-71 = "は、花といえば……先生は、砂漠にも花が咲くってご存じですか？"
2300515-72 = "[s] \"砂漠に？\""
2300515-73 = "私も見たことはないのですが……。"
2300515-74 = "何年か、何十年に一度、雨が降ると……。"
2300515-75 = "砂の中に隠れていた種が芽吹いて、一斉に花を咲かせるんです。"
2300515-76 = "数週間後には、熱風で全て枯れてしまうので……。"
2300515-77 = "その前に、どうにかして次の種を残すんです。"
2300515-78 = "新しい種は……また砂の中で、次の雨が降るのをじっと待つのだそうです。"
2300515-79 = "そう考えたら、他人事のような気がしなくて。"
2300515-80 = "……アビドスにも、いつか雨が降るでしょうか？"
2300515-81 = "[s] \"うん。いつか降るよ。\""
2300515-82 = "ただ、砂漠に雨が降るためには……。"
2300515-83 = "異常気象が必要ではあります。"
2300515-84 = "だから、必ずしも良いことだとは、限らないんですけどね。"
2300515-85 = "[s] \"い、今言ったこと、取り消したほうがいいかな……！？\""
2300515-86 = "あはは……気にしないでください。"
2300515-87 = "異常気象じゃなくても、雨が降る可能性はありますから。"
2300515-88 = "それに……アビドスにはもう、雨が降りました。"
2300515-89 = "[s5] \"そうなの？\"\n[s6] \"いつ降ったの？\""
2300515-92 = "ふふ、先生はそうおっしゃると思いました。"
2300515-93 = "その時に花が咲いたかどうか……。"
2300515-94 = "うーん……。"
2300515-95 = "少なくとも……私にとっては、そうですね。#n咲いたと思います。"
2300515-96 = "[s] \"もっと分からなくなってきた……。\""
2300515-97 = "す、すみません。"
2300515-98 = "でも、先生にはまだ秘密です。"
2300515-99 = "[s] \"どういうことなの！？\""
2300515-100 = "ふふ、どういうことでしょうね？"
2300515-101 = "だけどいつか、本当に雨が降って――"
2300515-102 = "アビドスに花が咲いたら……。"
2300515-103 = "その光景を、先生と一緒に見たいです。"
2300515-104 = "[s] \"そうだね。一緒に見よう。\""
2300515-105 = "約束ですよ？"
2300515-106 = "では、約束を忘れないように……。"
2300515-107 = "こちらを差し上げます。"
2300515-112 = "ふふっ、大丈夫です。スペアはあるので。"
2300515-113 = "も、もちろん身に着けていただく必要はないので……。"
2300515-114 = "大事にしていただけると、うれしいです。"
2300515-115 = "[ns] \"ありがとう。\""
2300515-117 = "いいえ。"
2300515-122 = "むしろ感謝を伝えたいのは、私たち……。"
2300515-123 = "私のほうです。"
2300515-125 = "（いつもより楽しそうなアヤネと一緒に、残りの時間も全力でサボった）"
