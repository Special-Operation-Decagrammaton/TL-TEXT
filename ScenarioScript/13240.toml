[translation]
13240-1 = "Episódio 24: Trem Blindado Schemata"
13240-10 = "Droga!"
13240-17 = "……Eu não esperava que chegássemos a este ponto."
13240-18 = "Poderia sair do caminho logo, garota do tapa-olho?"
13240-19 = "Eu quero destruí-lo antes que os veteranos cheguem."
13240-20 = "Ah, imagino que sim."
13240-21 = "……Mas eu ainda não fui derrotada!"
13240-25 = "……Você está no meu caminho."
13240-27 = "Não vou deixar você passar!"
13240-37 = "……A estratégia está finalmente na fase final."
13240-38 = "Primeira regra da estratégia: 'O que já aconteceu não pode ser mudado'."
13240-39 = "Segunda: 'O corpo físico tem limites'."
13240-40 = "Terceira: 'O coração não pode ser previsto nem controlado'."
13240-45 = "E a quarta: 'Um pequeno ferimento pode ser fatal'."
13240-46 = "Esta é uma campanha que busca a psicologia enquanto somos atormentados pelo desejo e pela culpa."
13240-47 = "Quando este caos chegar ao fim, #n eu alcançarei a 'Sexta Regra Antiga'."
13240-51 = "……Hm?"
13240-52 = "Algo está……."
13240-59 = "Chegamos, não é……?"
13240-60 = "Hm, a Hoshino-senpai deve estar aqui."
13240-61 = "A Suou-san e o trem blindado também……."
13240-63 = "É por ali, vamos nos apressar!"
13240-71 = "……."
13240-72 = "Isso é um pouco diferente do que eu imaginei……?"
13240-73 = "Ouvi dizer que era um tipo de museu construído pelo conselho estudantil de Abydos há centenas de anos……#n mas isso não parece ser o caso."
13240-74 = "Tem até canhões automáticos e antiaéreos aqui."
13240-75 = "Tem o emblema de Gehenna."
13240-76 = "Po-por que o emblema de Gehenna estaria no deserto de Abydos?"
13240-77 = "……."
13240-82 = "Olhem."
13240-83 = "O quê."
13240-85 = "Aquilo é……."
13240-88 = "[ns] \"Aquilo é o tal…….\""
13240-89 = "Trem blindado……."
13240-90 = "Es-espera. Ninguém me disse que era tão grande. #n Minha percepção de profundidade está ficando confusa!?"
13240-91 = "……É, é tão grande assim."
13240-92 = "Hm……."
13240-95 = "[ns] \"Entendo, Gehenna também…….\""
13240-96 = "Provavelmente foi a pessoa que deu a ideia para o projeto da ferrovia trans-deserto."
13240-97 = "Mas esse tamanho é incompreensível…… #n Como pode existir tal tecnologia em Kivotos……."
13240-99 = "Então, como será que eles construíram isso……."
13240-100 = "……."
13240-102 = "Sensei!"
13240-105 = "Aquilo usa uma tecnologia que não existe em Kivotos atualmente!"
13240-106 = "Uma arma antiga, ou algo equivalente……!"
13240-107 = "Será que……!?"
13240-108 = "[s] \"……Pode ser a Gematria.\""
13240-109 = "Vou investigar um pouco mais!"
13240-110 = "Ugh…… nessas horas, se a Plana-chan estivesse aqui……."
13240-111 = "[s] \"Como está a Plana?\""
13240-112 = "Ela ainda está dormindo. Parece que está muito cansada……."
13240-117 = "P-Plana!?"
13240-118 = "Arona, veterano…… Sensei."
13240-124 = "Plana, você está bem? Sente alguma dor em algum lugar!?"
13240-125 = "[s] \"Plana, você está bem?\""
13240-126 = "……Enquanto eu dormia, senti um olhar sobre mim."
13240-127 = "Um olhar……?"
13240-128 = "……Sim. Mesmo agora, estamos sendo observados por alguém."
13240-129 = "[s] \"…….\""
13240-130 = "Hã!? Mas não tem ninguém aqui……."
13240-131 = "Plana……?"
13240-132 = "Esse olhar é……."
13240-137 = "Plana……!?"
13240-146 = "O que é isso……!?"
13240-147 = "É por ali!"
13240-148 = "O disparo da veterana Hoshino!"
13240-149 = "Vamos nessa!"
13240-154 = "Sensei, venha rápido também!"
13240-155 = "[ns] \"……Entendido!\""
