[translation]
13240-1 = "第24話;列車砲シェマタ"
13240-10 = "くっ！"
13240-17 = "……ここまでだとは。"
13240-18 = "さっさと[ruby=ど]退[/ruby]いてもらって良いかな、眼帯ちゃん。"
13240-19 = "後輩たちが来る前に、破壊したいんだよね。"
13240-20 = "ああ、そうだろうな。"
13240-21 = "……だが、まだ私は負けてなどいない！"
13240-25 = "……邪魔だよ。"
13240-27 = "行かせるものか！"
13240-37 = "……攻略は、いよいよ最終段階です。"
13240-38 = "攻略法1つ目、「既に起きた出来事は変えられない」。"
13240-39 = "2つ目、「肉体には物理的な限界がある」。"
13240-40 = "3つ目、「心は予測も制御もできない」。"
13240-45 = "そして4つ目、「小さな傷が致命傷となる」。"
13240-46 = "これは欲望と罪悪に苛まれる過程で、心理を追求するキャンペーン。"
13240-47 = "この混沌が終わりを迎えたその時、#n私は「六つ目の古則」に到達することでしょう。"
13240-51 = "……ん？"
13240-52 = "何かが……。"
13240-59 = "着いたのね……？"
13240-60 = "ん、ここにホシノ先輩がいるはず。"
13240-61 = "スオウさんも、列車砲も……。"
13240-63 = "あちらです、急ぎましょう！"
13240-71 = "……。"
13240-72 = "なんか、想像と違うんだけど……？"
13240-73 = "数百年前のアビドス生徒会が建てた展示館……#nのようなところだと聞いていましたが。"
13240-74 = "機関砲に対空砲まであるじゃない。"
13240-75 = "ゲヘナのマークがある。"
13240-76 = "ど、どうしてアビドス砂漠にゲヘナのマークが？"
13240-77 = "……。"
13240-82 = "見て。"
13240-83 = "なっ。"
13240-85 = "アレが……。"
13240-88 = "[ns] \"アレが例の……。\""
13240-89 = "列車砲……。"
13240-90 = "ま、待って。あんなに大きいとか聞いてないわよ。#n遠近感がおかしくなるんだけど！？"
13240-91 = "……こ、こんなに大きいなんて。"
13240-92 = "ん……。"
13240-95 = "[ns] \"なるほど、ゲヘナも……。\""
13240-96 = "砂漠横断鉄道事業に入れ知恵した人物が、おそらくそうなのかと。"
13240-97 = "でも、あの大きさは理解できません……。#nキヴォトスにこんな技術があるなんて……。"
13240-99 = "なら、どうやって作ったのかしら……。"
13240-100 = "……。"
13240-102 = "先生！"
13240-105 = "アレは現時点のキヴォトスに存在しない技術が使われています！"
13240-106 = "古代兵器、もしくはそれに並ぶ……！"
13240-107 = "まさか……！？"
13240-108 = "[s] \"……ゲマトリアかもしれない。\""
13240-109 = "もう少し調べてみます！"
13240-110 = "うう……こういう時、プラナちゃんがいれば……。"
13240-111 = "[s] \"プラナの調子はどう？\""
13240-112 = "まだ眠っています。#nなんだかすごく疲れているみたいで……。"
13240-117 = "ぷ、プラナちゃん！？"
13240-118 = "アロナ、先輩……先生。"
13240-124 = "プラナちゃん、大丈夫ですか？#nどこか痛みませんか！？"
13240-125 = "[s] \"プラナ、大丈夫？\""
13240-126 = "……眠っている最中に、視線を感じました。"
13240-127 = "視線……？"
13240-128 = "……はい。#n今も私たちは、誰かに観測されています。"
13240-129 = "[s] \"……。\""
13240-130 = "ええっ！？#nここには誰もいませんが……。"
13240-131 = "プラナちゃん……？"
13240-132 = "この視線は……。"
13240-137 = "プラナちゃん……！？"
13240-146 = "これは……！？"
13240-147 = "あっちです！"
13240-148 = "ホシノ先輩の銃声！"
13240-149 = "行くわよ！"
13240-154 = "先生も早く！"
13240-155 = "[ns] \"……分かった！\""
