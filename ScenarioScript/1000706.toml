[translation]
1000706-1 = "Atividade de limpeza"
1000706-2 = "Kivotos - Centro da cidade"
1000706-3 = "Eba, obrigada por pagar o sorvete, Sensei."
1000706-4 = "[s] \"Um presente para a Maki por ter passado no teste de recuperação.\""
1000706-5 = "Se era um presente, eu deveria ter dado algo para você, Sensei, já que me ajudou a estudar..."
1000706-6 = "Mas já que você insistiu, vou aproveitar cada mordida, Sensei!"
1000706-7 = "Ah, é verdade, Sensei. #nVocê sabia que abriu uma loja de roupas nova por aqui?"
1000706-8 = "Eu vi quando estava passando, e eles vendem várias roupas com um estilo mais adulto bem legal."
1000706-9 = "Tenho certeza de que você vai encontrar algo que goste. Eu vou te ajudar a escolher, então vamos juntos!"
1000706-10 = "[s] \"Claro.\""
1000706-11 = "Lalala~, compras com o Sensei~♪"
1000706-12 = "Ué, que cheiro é esse?"
1000706-14 = "……Eca, alguém jogou lixo ali perto da parede de novo."
1000706-15 = "[s] \"De novo? Isso acontece sempre?\""
1000706-16 = "Sim, aquela parede fica num lugar escondido e, como está cheia de pichações que parecem coisa de delinquente, as pessoas que passam por aqui acabam jogando lixo nela."
1000706-17 = "Acho que, como a parede está suja, as pessoas acabam jogando lixo sem nem pensar."
1000706-18 = "Se a parede estivesse um pouco mais limpa, acho que ninguém jogaria lixo ali tão facilmente..."
1000706-19 = "[s] \"Entendi, que situação complicada.\""
1000706-20 = "Pois é, é verdade..."
1000706-22 = "……"
1000706-27 = "Hum hum~♪ #nJá limpei o lixo... assim ficou limpo e bonitinho, né?"
1000706-28 = "[s] \"O que você está fazendo?\""
1000706-29 = "U-uai!? #nSe-Sensei, desde quando você está aí!?"
1000706-30 = "I-i-isso não é nada suspeito, eu juro..."
1000706-31 = "[s] \"……Você desenhou na parede suja?\""
1000706-32 = "É que... a parede estava velha e suja... #nPensei que, se eu desenhasse algo fofo, as pessoas pensariam duas vezes antes de jogar lixo ali..."
1000706-33 = "……Mas promessa é promessa, né? Desculpa por ter quebrado a regra."
1000706-34 = "Sensei, você está bravo, né? Buuu..."
1000706-35 = "[s] \"……Desta vez passa.\""
1000706-36 = "Hã?"
1000706-37 = "[s] \"Vou deixar passar só desta vez.\""
1000706-38 = "Sensei... muito obrigada!"
1000706-39 = "[s] \"Em troca, vamos pedir desculpas ao dono depois juntos.\""
1000706-40 = "Ah, é verdade, né... #nNão muda o fato de que eu desenhei..."
1000706-41 = "Mas fico mais tranquila porque você disse que vamos \"juntos\". #nFicar com medo de ser pega pela polícia sozinha de novo não é nada legal."
1000706-42 = "Sensei, por último, pode me ajudar a limpar esse lixo grande que sobrou?"
1000706-43 = "[s] \"Tudo bem.\""
1000706-44 = "Hehe, obrigada."
1000706-45 = "Espero que ninguém jogue mais lixo aqui. ...Né?"
