[translation]
1000706-1 = "美化活動"
1000706-2 = "キヴォトス・市内"
1000706-3 = "やった、アイス奢ってくれてありがと、先生。"
1000706-4 = "[s] \"無事に再テストを乗り越えたマキにプレゼント。\""
1000706-5 = "プレゼントなら、あたしの方から勉強を教えてくれた先生に渡さなきゃいけなかったのに……。"
1000706-6 = "でもせっかくだし、美味しくいただくね、先生！"
1000706-7 = "そうだ、先生。#nこの辺に新しい洋服屋ができたの知ってる？"
1000706-8 = "通りがけに見たんだけど、色々と、良い感じの大人っぽい服も売ってたんだ。"
1000706-9 = "きっと先生が好きそうな服も見つけられると思うよ。あたしが選んであげるから、一緒に行こう！"
1000706-10 = "[s] \"うん。\""
1000706-11 = "ルンルン～、先生とショッピング～♪"
1000706-12 = "あれ、何の匂いだろ？"
1000706-14 = "……うえ、また誰かがあの壁のところにゴミを捨てたんだ。"
1000706-15 = "[s] \"また？よくあることなの？\""
1000706-16 = "うん、あの壁は目立たないところにある上に、不良がやったような落書きがいっぱいされてるからか、通りすがりの人たちがよくゴミを捨てていくんだよね。"
1000706-17 = "多分壁が汚いから、そのせいでみんなが何気なくゴミを捨てていくんだと思う。"
1000706-18 = "もう少し壁自体が綺麗だったら、みんなそう簡単にゴミを捨てたりしないと思うんだけど……。"
1000706-19 = "[s] \"そうなんだ、大変だね。\""
1000706-20 = "うん、本当に……。"
1000706-22 = "……。"
1000706-27 = "ふんふん～♪#nゴミも片付けたし……これぐらいだったら、綺麗だし可愛い、よね？"
1000706-28 = "[s] \"何してるの？\""
1000706-29 = "う、うわっ！？#nせ、先生、いつからいたの！？"
1000706-30 = "こ、こ、これは別に怪しいことをしてたわけじゃなくて……。"
1000706-31 = "[s] \"……汚れた壁に、絵を？\""
1000706-32 = "だ、だって……壁が古くて汚かったから……#n可愛い絵を描いておけば、みんながゴミを捨てる前にもう一度考え直してくれたりしないかなって、思って……。"
1000706-33 = "……でも約束は約束だよね、破って、ごめんなさい。"
1000706-34 = "先生、やっぱり怒ってるよね？ううう……。"
1000706-35 = "[s] \"……今回だけだよ。\""
1000706-36 = "え？"
1000706-37 = "[s] \"今回は特別に見逃すね。\""
1000706-38 = "先生……本当にありがとう！"
1000706-39 = "[s] \"その代わり、持ち主には後で一緒に謝りに行こう。\""
1000706-40 = "うっ、それはそうだよね……#n描いたことに違いはないし……。"
1000706-41 = "でも、先生が「一緒に」って言ってくれるから少し安心した。#nまた一人でお巡りさんに捕まるのはちょっと怖いし。"
1000706-42 = "先生、最後に、この残った大きいゴミを片付けるの、手伝ってくれる？"
1000706-43 = "[s] \"いいよ。\""
1000706-44 = "ふふ、ありがと。"
1000706-45 = "みんながこれ以上ここにゴミを捨てないといいな。……ね？"
