[translation]
33150-1 = "Episódio 15: A Resposta para o Quinto Antigo Preceito"
33150-2 = "……."
33150-3 = "Este é o ponto final de todos os esforços inúteis……."
33150-4 = "Eu avisei a Azusa. Repetidas vezes, eu disse que terminaria desta forma."
33150-5 = "Mesmo assim, Azusa se apegou à esperança. Uma esperança frágil."
33150-6 = "……."
33150-7 = "Eu não te avisei?"
33150-8 = "Este é o fim da história. Um final onde tudo é vazio e tudo leva à catástrofe. Olhar além disso só trará uma sucessão de dores inúteis."
33150-9 = "No fim das contas, é uma história onde todos são encurralados e, eventualmente, alguém acaba matando alguém. Uma história onde alguém é forçado a se tornar um assassino."
33150-10 = "É uma história desagradável, detestável, abominável, que faz qualquer um franzir a testa."
33150-11 = "Triste, dolorosa, deprimente. E, ainda assim, uma história com um gosto amargo que permanece…… Você não acha?"
33150-12 = "Mas, inegavelmente, é também uma história verdadeira……."
33150-13 = "Esta é a verdadeira face desta história."
33150-14 = "……."
33150-15 = "Você disse uma vez, sobre o quinto antigo preceito:"
33150-16 = "“Só nos resta acreditar que o paraíso existe”."
33150-17 = "E eis o resultado de acreditar."
33150-18 = "Desde o início, era algo impossível. O Tratado do Éden, a promessa mútua de “vamos parar de nos odiar”."
33150-19 = "Algo que, por mais que tentassem, não poderia ser realizado……."
33150-20 = "Além disso, o nome do tratado é “Éden”. Usar o nome do paraíso aqui… a piada de mau gosto da Presidente do Conselho Estudantil Federal é irônica demais. Chega a ser quase maliciosa."
33150-24 = "Após esse processo, há algo que pôde ser confirmado, não é?"
33150-27 = "É o ressentimento acumulado pela desconfiança entre Gehenna e Trinity. E o ressentimento que os membros de Arius carregam."
33150-28 = "Através disso, este tratado foi concluído de uma forma distorcida. E, o mais irônico de tudo, carregando o nome daquele paraíso que não existe em lugar algum e que nem sequer pode ser provado……."
33150-30 = "Talvez seja um final apropriado para nós, que fomos expulsos do paraíso."
33150-33 = "[s] \"……Entendi, Seia.\""
33150-37 = "[ns] \"……Você também não viu o que aconteceu depois, não é?\""
33150-38 = "……?"
33150-39 = "……Existe a necessidade de ver?"
33150-40 = "Depois de um final triste, ver o epílogo que se segue apenas aumenta a melancolia. Apenas prolonga o sofrimento."
33150-41 = "……E então? O que você quer dizer com “entendi”?"
33150-42 = "[s] \"……Você estava com medo de confirmar o que aconteceria depois, não estava?\""
33150-43 = "O que você…"
33150-44 = "[s] \"Por isso você se escondeu no sonho e não conseguiu acordar, vagando por todo esse tempo.\""
33150-45 = "Eu, eu……."
33150-46 = "Sensei…… O que exatamente você……?"
33150-47 = "[s1] \"Fico feliz por ter encontrado a Seia. Espere um pouco.\"\n[s2] \"Eu tenho algo que preciso fazer, então preciso voltar.\""
33150-48 = "Voltar……?"
33150-49 = "Voltar……?"
33150-50 = "Espere. Diferente de mim, seu corpo nem sequer está curado ainda."
33150-51 = "E, acima de tudo, o fato de você ter acordado não muda nada. Isso já foi confirmado pela minha previsão do futuro……"
33150-52 = "Não, é a verdade deste mundo que já havia sido deduzida pelos “Sete Antigos Preceitos”……!"
33150-53 = "[s3] \"Na verdade, eu não tenho tanto interesse assim em provar o paraíso.\"\n[s4] \"Jogos de palavras como os “Sete Antigos Preceitos” não são minha prioridade.\""
33150-54 = "……."
33150-55 = "……."
33150-56 = "……Você pretende negar os Sete Antigos Preceitos?"
33150-57 = "A existência ou não do paraíso é uma lição de casa para todas as pessoas, não é? Se não pudermos provar sua existência, nada……"
33150-58 = "……Sensei. Você ainda acredita no paraíso?"
33150-59 = "Sem sequer conseguir provar, você acredita cegamente?"
33150-60 = "“É possível provar a verdade daqueles que alcançaram o paraíso?”……"
33150-61 = "Quer dizer que isso não é sobre a prova do paraíso, mas apenas sobre se é possível acreditar nele……?"
33150-62 = "[ns] \"……Desculpe, mas agora eu preciso ir ajudar as alunas.\""
33150-64 = "[ns] \"Nos vemos mais tarde, Seia.\""
33150-65 = "……Espere, Sensei. Há mais uma coisa que eu preciso perguntar."
33150-66 = "Apenas acreditar não mudará nada."
33150-67 = "Mesmo que você acredite, não haverá significado algum nisso, não é……!?"
33150-70 = "[ns] \"Se você pensar que não é um traje de banho, mas sim roupa íntima, então é roupa íntima.\""
33150-71 = "……Hã?"
33150-72 = "……Eh, roupa íntima?"
33150-73 = "O-o que exatamente você está…… Traje de banho, roupa íntima……? De qual regra antiga isso vem? Não, eu nunca ouvi falar de algo assim……"
33150-74 = "[ns] \"Espere por mim, Seia.\""
33150-76 = "……."
33150-77 = "……Ele foi embora."
33150-78 = "Você está indo em direção ao epílogo que virá a seguir, não é?"
33150-79 = "Eu…… eu……."
33150-81 = "……."
33150-82 = "Puxa……."
33150-83 = "……De fato, talvez tenha sido assim mesmo."
33150-84 = "A história que virá a seguir……"
33150-85 = "Mesmo que seja assustador, eu preciso confirmar até o fim."
33150-86 = "Isso é o meu dever, suponho……."
33150-87 = "……."
33150-92 = "Não há o que fazer."
33150-93 = "Melancólica, triste, dolorosa…… mesmo que seja uma história com um gosto amargo até o fim……."
33150-94 = "……Eu também vou observar tudo com meus próprios olhos até o fim."
33150-96 = "Próximo episódio: Alguns fragmentos"
