[translation]
33150-1 = "Episódio 15; A Resposta Para a Quinta Regra Antiga"
33150-2 = "......"
33150-3 = "Este é o ponto final de toda essa luta sem sentido..."
33150-4 = "Eu avisei a Azusa. De novo e de novo, que esse seria o desfecho."
33150-5 = "Mas, mesmo assim, a Azusa se apegou à esperança. A uma esperança frágil."
33150-6 = "......"
33150-7 = "Foi por isso que eu avisei, não foi?"
33150-8 = "Este é o fim da história. Um final onde tudo é vazio e tudo leva à catástrofe. Ver o que acontece daqui pra frente só trará uma sucessão de dor sem sentido."
33150-9 = "Esta é, no fim das contas, uma história em que todos são encurralados e alguém acaba matando alguém. Uma história onde alguém não tem escolha a não ser se tornar um assassino."
33150-10 = "Uma história desagradável, desconfortável, abominável e de dar nojo."
33150-11 = "Uma história triste, dolorosa e deprimente. Que só deixa um gosto amargo no fim... Você não acha?"
33150-12 = "Mas, sem sombra de dúvidas, também é uma história verdadeira..."
33150-13 = "Esta é a verdadeira natureza desta história."
33150-14 = "......"
33150-15 = "Você disse isso antes, em relação à Quinta Regra Antiga, não foi?"
33150-16 = "'Só nos resta acreditar que o paraíso existe'."
33150-17 = "Pois bem, este é o resultado dessa sua crença."
33150-18 = "Isso era impossível desde o começo. O Tratado do Éden, uma promessa de 'vamos parar de nos odiar'."
33150-19 = "Quando é óbvio que isso nunca daria certo..."
33150-20 = "E para piorar, o tratado leva o nome de 'Éden'. Usar o nome do paraíso aqui... a piada de mau gosto da Presidente do Conselho Federal chega a ser irônica, como sempre. Se bobear, dá até para sentir malícia nisso."
33150-24 = "Mas acho que deu para confirmar algo durante esse processo."
33150-27 = "O rancor mútuo entre Gehenna e Trinity, acumulado pela desconfiança. E o ódio que as alunas de Arius guardam."
33150-28 = "Através de tudo isso, este tratado foi concluído de uma forma distorcida. E o mais irônico de tudo, carregando o nome de um paraíso... que não existe em lugar nenhum e nem sequer pode ser provado."
33150-30 = "É um desfecho que talvez seja perfeito para nós, que fomos expulsas do paraíso."
33150-33 = "[s] \"...Eu entendi, Seia.\""
33150-37 = "[ns] \"...Você também não viu o que aconteceu depois, não é?\""
33150-38 = "......?"
33150-39 = "...Tem alguma necessidade de ver?"
33150-40 = "Ver o epílogo que segue um final triste só aumentaria a tristeza. Só traria mais sofrimento."
33150-41 = "...E então? O que você quer dizer com 'entendi'?"
33150-42 = "[s] \"...Você estava com medo de ver o resto da história, não estava?\""
33150-43 = "O que..."
33150-44 = "[s] \"Foi por isso que se escondeu nesse sonho e ficou vagando sem conseguir acordar.\""
33150-45 = "E-Eu..."
33150-46 = "Sensei... do que diabos você está falando...?"
33150-47 = "[s1] \"Foi bom te encontrar, Seia. Fique me esperando.\"\n[s2] \"Eu tenho coisas a fazer, então preciso voltar.\""
33150-48 = "Voltar...?"
33150-49 = "Voltar...?"
33150-50 = "Espere. Diferente de mim, o seu corpo sequer está curado."
33150-51 = "E, acima de tudo, acordar não vai mudar nada. Eu já vi isso nas minhas premonições..."
33150-52 = "Não, é a verdade deste mundo, já deduzida pelas 'Sete Regras Antigas'...!"
33150-53 = "[s3] \"Pra falar a verdade, não tô muito interessado em provar o paraíso.\"\n[s4] \"Um joguinho de palavras como as 'Sete Regras Antigas' não é a minha prioridade.\""
33150-54 = "......"
33150-55 = "......"
33150-56 = "...Você pretende negar as Sete Regras Antigas?"
33150-57 = "A existência do paraíso é o grande dever de casa para todos, não é? Se não pudermos provar que ele existe, nada vai..."
33150-58 = "...Sensei. Você ainda acredita no paraíso?"
33150-59 = "Mesmo sem poder provar, vai apenas acreditar cegamente?"
33150-60 = "'Será possível provar a verdade de quem alcançou o paraíso?'..."
33150-61 = "Quer dizer que isso não é sobre provar o paraíso, mas sim sobre se você consegue acreditar nele...?"
33150-62 = "[ns] \"...Me desculpa, agora eu preciso ir salvar as minhas alunas.\""
33150-64 = "[ns] \"Até depois, Seia.\""
33150-65 = "...Espere, Sensei. Tem mais uma coisa que eu quero perguntar."
33150-66 = "Só acreditar não vai mudar nada."
33150-67 = "Mesmo se você acreditar, isso não tem sentido nenhum...!?"
33150-70 = "[ns] \"Se você acreditar que é roupa íntima em vez de biquíni, então é roupa íntima.\""
33150-71 = "...Hã?"
33150-72 = "...Quê, roupa íntima?"
33150-73 = "D-Do que diabos você está falando... biquíni, roupa íntima...? Isso é de qual Regra Antiga, quer dizer, eu nunca ouvi falar de algo assim..."
33150-74 = "[ns] \"Fique me esperando, Seia.\""
33150-76 = "......"
33150-77 = "...Ele foi."
33150-78 = "Você vai em direção ao epílogo que nos aguarda, não é."
33150-79 = "Eu... eu..."
33150-81 = "......"
33150-82 = "Ufa..."
33150-83 = "...Pensando bem, talvez ele tenha razão."
33150-84 = "O resto da história..."
33150-85 = "Mesmo que eu tenha medo, preciso confirmar até o final."
33150-86 = "Então esse é o meu dever..."
33150-87 = "......"
33150-92 = "Fazer o quê."
33150-93 = "Mesmo que seja deprimente, triste e doloroso... mesmo que a história só deixe um gosto amargo no final..."
33150-94 = "...Eu também vou assistir a tudo isso com os meus próprios olhos até o fim."
33150-96 = "Próximo Episódio; Alguns Fragmentos"