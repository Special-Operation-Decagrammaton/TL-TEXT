[translation]
33150-1 = "Episódio 15;A Resposta à Quinta Regra Antiga"
33150-2 = "……."
33150-3 = "Este é o ponto final de toda essa luta sem sentido……."
33150-4 = "Eu avisei a Azusa. De novo e de novo, que o desfecho seria este."
33150-5 = "E, mesmo assim, a Azusa acabou abraçando uma esperança. Uma tênue esperança."
33150-6 = "……."
33150-7 = "Eu não disse?"
33150-8 = "Este é o desfecho da história. Um final em que tudo é vão, em que tudo chega à catástrofe. Ver o que vem daqui pra frente é só uma sequência de sofrimento sem sentido."
33150-9 = "Isto é, no fim das contas, uma história em que cada um é encurralado e, no fim, alguém mata alguém. Uma história em que alguém não tem como não virar assassino."
33150-10 = "Uma história desagradável, incômoda, abominável, de fazer franzir a testa."
33150-11 = "Triste, penosa, de dar melancolia. E que, ainda por cima, deixa só um gosto amargo no fim…… você não acha?"
33150-12 = "Mas é, também, inegavelmente, uma história verdadeira……."
33150-13 = "Esta é a verdadeira face desta história."
33150-14 = "……."
33150-15 = "Você, tempos atrás, disse o seguinte sobre a quinta regra antiga, né."
33150-16 = "\"Só resta acreditar que o paraíso existe\"."
33150-17 = "Pois bem: o resultado de acreditar é isto."
33150-18 = "Era, desde a origem, algo impossível. O Tratado do Éden, a promessa de \"chega de nos odiarmos\"."
33150-19 = "Sendo que uma coisa dessas jamais poderia dar certo……."
33150-20 = "E, ainda por cima, o nome do tratado veio como \"Éden\". O nome do paraíso, logo aqui; a piada desagradável da presidente do Conselho Estudantil Geral é irônica além da conta, como sempre. Por pouco, chega quase a soar maldade."
33150-24 = "Passando por este processo, há coisas que se puderam constatar."
33150-27 = "O rancor mútuo de Gehenna e Trinity, acumulado da desconfiança. E o rancor que as de Arius carregam."
33150-28 = "Através deles, este tratado acabou completado numa forma distorcida. E, ironia das ironias, carregando o nome desse paraíso…… que não existe em lugar algum, que nem sequer se pode provar."
33150-30 = "Talvez seja, de fato, o desfecho digno de nós, que fomos expulsos do paraíso."
33150-33 = "[s] \"……Entendi, Seia.\""
33150-37 = "[ns] \"……Você também não viu o que aconteceu depois, né?\""
33150-38 = "……?"
33150-39 = "……Há necessidade de ver?"
33150-40 = "Depois de um final triste, ver o epílogo que o segue só aumenta o pesar. Só encadeia mais sofrimento."
33150-41 = "……E então? O que foi que você \"entendeu\"?"
33150-42 = "[s] \"……Confirmar a história daqui pra frente dava medo, né.\""
33150-43 = "O que……"
33150-44 = "[s] \"Por isso você se escondeu dentro do sonho, sem conseguir acordar, vagando esse tempo todo.\""
33150-45 = "E-eu……."
33150-46 = "Sensei…… o que é que você……?"
33150-47 = "[s1] \"Que bom ter encontrado a Seia. Espera um pouco.\"\n[s2] \"Eu tenho o que fazer, então preciso voltar.\""
33150-48 = "Voltar……?"
33150-49 = "Voltar……?"
33150-50 = "Espere. Diferente de mim, o seu corpo nem sequer sarou ainda."
33150-51 = "E, acima de tudo, não é porque você acordou que algo vai mudar. Isso a minha previsão do futuro já esclareceu……"
33150-52 = "não; é a verdade deste mundo, que as \"sete regras antigas\" já deduziam……!"
33150-53 = "[s3] \"Na verdade, a prova do paraíso não me interessa tanto.\"\n[s4] \"Jogos de palavras como as 'sete regras antigas' não são a prioridade.\""
33150-54 = "……."
33150-55 = "……."
33150-56 = "……Você pretende negar as sete regras antigas?"
33150-57 = "A existência ou não do paraíso é o dever de casa de todos, não é? Sem provar a existência dele, nada……"
33150-58 = "……Sensei. Você ainda acredita no paraíso?"
33150-59 = "Sem nem poder provar, apenas acreditando cegamente?"
33150-60 = "\"É possível provar a verdade daquele que chegou ao paraíso?\"……"
33150-61 = "Ou seja, você diz que isto não é sobre a prova do paraíso, e sim, apenas, sobre ser capaz de acreditar nele……?"
33150-62 = "[ns] \"……Desculpa, agora eu preciso ir salvar os alunos.\""
33150-64 = "[ns] \"Até mais, Seia.\""
33150-65 = "……Espere, Sensei. Há mais uma coisa que eu quero perguntar."
33150-66 = "Só acreditar não muda nada."
33150-67 = "Acreditar, por si só, não carrega sentido nenhum……!?"
33150-70 = "[ns] \"Se você acreditar que não é maiô, e sim lingerie, então é lingerie.\""
33150-71 = "……Hã?"
33150-72 = "……Quê, lingerie?"
33150-73 = "M-mas o que…… maiô, lingerie……? Isso é de qual regra antiga; não, isso eu nunca ouvi……"
33150-74 = "[ns] \"Espera por mim, Seia.\""
33150-76 = "……."
33150-77 = "……Foi, é."
33150-78 = "Você vai em direção ao epílogo que segue."
33150-79 = "E eu…… eu……."
33150-81 = "……."
33150-82 = "Ufa……."
33150-83 = "……De fato, talvez fosse isso mesmo."
33150-84 = "A história daqui pra frente……"
33150-85 = "por mais que dê medo, eu preciso confirmá-la até o fim."
33150-86 = "Este é o meu dever, é……."
33150-87 = "……."
33150-92 = "Não tem jeito."
33150-93 = "Melancólica, triste, penosa…… e, ainda que seja uma história de gosto amargo até o fim……."
33150-94 = "……eu também hei de testemunhá-la, com estes olhos, até o fim."
33150-96 = "Próximo Episódio;Alguns Fragmentos"
