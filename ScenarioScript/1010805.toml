[translation]
1010805-1 = "アフターダーク"
1010805-2 = "（生徒たちの悩み相談のために、ミレニアムを訪れた）"
1010805-3 = "（あれこれ相談に乗っているうちに、気付けば遅い時間になっていた……）"
1010805-5 = "先生、今日はありがとうございました！"
1010805-6 = "おかげで校庭のゴミ箱のデザインは決まりそうです！"
1010805-7 = "[s1] \"力になれたなら良かった。\"\n[s2] \"でも、爆発機能はやめようね……？\""
1010805-10 = "分かりました！#nそれより、こんな遅くまでごめんなさい。"
1010805-11 = "色々お願いしてしまったから、ご飯を食べる時間もなかったですよね……？"
1010805-12 = "[s] \"大丈夫だよ、シャーレに戻ったら食べるから。\""
1010805-13 = "そうですか……では、お気を付けてください！"
1010805-17 = "[ns3] （ちょっとお腹空いたな……）\n[ns4] （コンビニで何か食べようかな？）"
1010805-21 = "いらっしゃいませ！"
1010805-22 = "チキンサラダとトーストですね、トーストはお焼きしますか？"
1010805-23 = "[s] \"黒焦げになるくらい焼いてください。\""
1010805-24 = "ありがとうございました！#nまたお越しください！"
1010805-26 = "（小腹を満たして、帰ろうとしたその時）"
1010805-27 = "[ns5] （あれ……）\n[ns6] \"……ユウカ？\""
1010805-31 = "[wa:830]― [log=유우카 파자마]はむ、[wa:890]もぐもぐ……[wa:2670]おいひ……[/log]"
1010805-34 = "[wa:100]― [log=유우카 파자마]う、[wa:360]うわあっ！？[/log]"
1010805-38 = "[wa:460]― [log=유우카 파자마]せ、[wa:1050]先生？[/log]"
1010805-40 = "― [log=유우카 파자마]こんな時間に[wa:860]どうして……？[/log]"
1010805-43 = "[wa:530]― [log=유우카 파자마]え、[wa:360]えっと……[wa:880]これは、[wa:770]その……[/log]"
1010805-45 = "― [log=유우카 파자마]ちょっと[wa:480]寝付けなくて、[wa:1170]散歩に出たら……[/log]"
1010805-48 = "[wa:150]― [log=유우카 파자마]そこの貼り紙の[wa:1600]「エンジェルチキン」が[/log]"
1010805-50 = "― [log=유우카 파자마]目に入ったんです……。[/log]"
1010805-53 = "[wa:480]― [log=유우카 파자마]だ、[wa:530]だって、[wa:300]仕方ないでしょう？[/log]"
1010805-55 = "― [log=유우카 파자마]この時間の[wa:500]エンジェルチキンは、[wa:650]揚げたてなんです！[/log]"
1010805-58 = "― [log=유우카 파자마]あっつあつで[wa:1540]肉汁[wa:550]たっ[wa:310]ぷりなんですから！[/log]"
1010805-60 = "― [log=유우카 파자마]買わない手は[wa:690]ありません！[/log]"
1010805-63 = "[wa:500]― [log=유우카 파자마]だ、[wa:600]だから[wa:610]その……[wa:1130]別に、[wa:500]毎日毎日、[/log]"
1010805-65 = "― [log=유우카 파자마]夜食を取ってるわけじゃ、[wa:1230]ないんですから……。[/log]"
1010805-68 = "[wa:540]― [log=유우카 파자마]えっ[wa:550]と……[wa:1140]よかっ[wa:520]たら、[/log]"
1010805-70 = "― [log=유우카 파자마]先生も一口、[wa:1640]食べますか？[/log]"
1010805-74 = "[ns7] \"ありがとう。でも、今は遠慮しておくよ。\"\n[ns8] \"こんな時間にチキンなんて、高校生の胃袋はすごいね。\""
1010805-77 = "か、からかわないでください！"
1010805-78 = "うぅ……先生に会うと分かってたら、もっと軽いおやつにしたのに……。"
1010805-79 = "こんにゃくゼリーとか豆のスナックとか……。"
1010805-80 = "[s] \"もしかして、よく眠れてないの？\""
1010805-81 = "えっと……。"
1010805-82 = "……そうですね。"
1010805-83 = "最近は先生のアドバイス通り、無理に寝ようとするのはやめたんです。"
1010805-84 = "でもベッドに横になると、色々考えてしまって……。"
1010805-85 = "パソコンのファンが回る音やカーテン越しの明かり、トラックが走る音……。"
1010805-86 = "誰かが明日のために頑張っているのに、このまま眠って良いのかな、と。"
1010805-87 = "もちろん、その誰かのおかげでのんびりできているのは分かってますが……。"
1010805-88 = "少し、考えすぎてしまって……それで散歩に出たんです。#nでも、まさかこんなチキンを食べているところを先生に見られるとは……。"
1010805-89 = "[s] \"私は良いと思うよ。\""
1010805-93 = "[ns9] \"気分転換の散歩って落ち着くよね。\"\n[ns10] \"お腹が空いてたら寝られないよね。\""
1010805-96 = "本当ですか……？"
1010805-97 = "いつも先生は、優しい言葉ばかりかけてくれるので……。"
1010805-98 = "[s11] \"……食べてすぐ寝たら体に悪いし、\"\n[s12] \"よかったら一緒に歩こうか。\""
1010805-101 = "ふふっ、良いですね。"
1010805-102 = "じゃあ、お気に入りの散歩コースを教えてあげます。"
1010805-103 = "暗いですし、離れないでくださいね。"
1010805-105 = "（その後、ユウカと二人で静かに歩いて過ごした）"
