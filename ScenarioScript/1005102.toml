[translation]
1005102-1 = "情熱の学ラン"
1005102-2 = "エンジニア部・作業室"
1005102-3 = "（ウタハに白衣を届けるべく、エンジニア部の作業室を訪ねた）"
1005102-9 = "[ns] \"ウタハ、おまたせ。\""
1005102-10 = "あれ……先生？"
1005102-11 = "少し待ってくれないか？#nすぐに終わらせるから……。"
1005102-17 = "先生……もしかして、白衣を届けに？"
1005102-18 = "こんな時間に、わざわざすまない。"
1005102-19 = "……気を使わせてしまったようだね。"
1005102-20 = "[s] \"気にしなくて大丈夫だよ。\""
1005102-22 = "[ns] \"どうして学ランを……？\""
1005102-23 = "あー……それが、制服の上から着られそうな、ちょうど良い服がなくてね。"
1005102-24 = "機械の修理をしているとすぐに汚れてしまうんだ。"
1005102-25 = "エンジンの煤もつくし、ハブのグリスアップを行うから……"
1005102-26 = "それに、鋭い工具を扱う関係で、下手をすると制服自体もダメになってしまうし。"
1005102-27 = "だから、普段は安全のために制服の上から白衣を羽織るようにしているんだけど、#n今日はちょうど全部洗濯してしまっていたから……代わりにこの学ランを着ているんだ。"
1005102-28 = "[s] \"……不便じゃないの？\""
1005102-29 = "うーん……少し動きにくいけど、意外と悪くないよ。"
1005102-30 = "……むしろ[ruby=かえ]却[/ruby]って、いつもの白衣より良いかもしれない。"
1005102-31 = "カラーが首元まで保護してくれるから、襟の状態を気にする必要がないし、#n黒なら煤がついても目立たないところが良いね。"
1005102-32 = "何より……この服からは情熱の香りがする。"
1005102-33 = "[s] \"……情熱の香り？\""
1005102-34 = "ああ。身体の奥底から湧き上がるような……何とも形容しがたい香りだ。"
1005102-35 = "冷静な瞳と同じくらい、ひたむきな情熱もマイスターにとって欠かせない素質だからね。"
1005102-36 = "この格好で工具に触れていると、大運動会を思い出すよ。#nあの日の熱気が今も身体に残っているみたいだ。"
1005102-37 = "スタジアムを埋め尽くす応援団の歓声……地面を照りつける太陽の匂い……。"
1005102-38 = "それこそが情熱の香りだ。#nマイスターのインスピレーションが刺激されるね。"
1005102-39 = "ふふ。どうだい、先生？#n先生もこの学ランから漂う[ruby=マイスター]情熱[/ruby]の香りを感じるかい？"
1005102-45 = "[ns] \"ウタハの匂いがする。\""
1005102-46 = "……わ、私の匂い？"
1005102-47 = "も……もしかして臭かったり？"
1005102-48 = "そ、そういえば……前回の大運動会が終わってから、#n学ランをクリーニングに出そうとよけたけど……結局出せてないんだった……"
1005102-49 = "………。"
1005102-58 = "……急にいなくなって悪かったね。お待たせした。"
1005102-59 = "ほら、いつも通り作業中は白衣じゃないと落ち着かなくて。"
1005102-60 = "軽くて動きやすいし、汚れに気付きやすいからさ。"
1005102-61 = "服も工具と一緒。正しい使い方をしてこそ、真価を発揮してくれるんだ。"
1005102-62 = "[s] \"学ラン脱いじゃったんだ。\""
1005102-63 = "うん？あれは……"
1005102-64 = "……また機会があれば、着ないこともなくは……"
1005102-65 = "大事な後輩が作ってくれたものだし、素材もデザインもお気に入りだからね。"
1005102-66 = "……もちろん、次は絶対に洗濯してから……。"
1005102-67 = "だが、やはり機械を整備するなら白衣の方が断然良い。"
1005102-68 = "なんでかって？エンジニア部の部長が白衣を脱いで学ランで過ごすようになったら、ミレニアム中の生徒から驚かれるかもしれないからね。"
1005102-69 = "それでも、もし開発で情熱が必要とあらば……"
1005102-70 = "……また学ランに袖を通して活動するのも、良いかもね。……ふふ。"
