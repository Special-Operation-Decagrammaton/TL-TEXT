[translation]
1005102-1 = "Gakuran da Paixão"
1005102-2 = "Departamento de Engenharia - Sala de Trabalho"
1005102-3 = "（Visitei a sala de trabalho do Departamento de Engenharia para entregar o jaleco à Utaha）"
1005102-9 = "[ns] \"Utaha, desculpe a demora.\""
1005102-10 = "Ah... Sensei?"
1005102-11 = "Poderia esperar um pouco?#nJá vou terminar..."
1005102-17 = "Sensei... por acaso, veio trazer o jaleco?"
1005102-18 = "Sinto muito por incomodar a esta hora."
1005102-19 = "...Parece que acabei te causando preocupação."
1005102-20 = "[s] \"Não precisa se preocupar com isso.\""
1005102-22 = "[ns] \"Por que está usando um gakuran...?\""
1005102-23 = "Ah... é que eu não tinha nenhuma roupa adequada para vestir por cima do uniforme."
1005102-24 = "Quando estou consertando máquinas, acabo me sujando muito rápido."
1005102-25 = "Fica fuligem do motor, e como preciso lubrificar os cubos..."
1005102-26 = "Além disso, por lidar com ferramentas afiadas, se eu não tomar cuidado, acabo estragando o próprio uniforme."
1005102-27 = "Por isso, normalmente uso o jaleco por cima do uniforme por segurança, mas hoje, como eu tinha colocado todos para lavar... acabei vestindo este gakuran no lugar."
1005102-28 = "[s] \"...Não é desconfortável?\""
1005102-29 = "Hmm... é um pouco difícil de se mover, mas não é tão ruim quanto pensei."
1005102-30 = "...Na verdade, pode ser até melhor que o meu jaleco de sempre."
1005102-31 = "A gola protege até o pescoço, então não preciso me preocupar com o estado da gola do uniforme, e o preto é bom porque a fuligem não aparece tanto."
1005102-32 = "E acima de tudo... esta roupa tem cheiro de paixão."
1005102-33 = "[s] \"...Cheiro de paixão?\""
1005102-34 = "Sim. É um aroma difícil de descrever... como algo que brota das profundezas do corpo."
1005102-35 = "Assim como um olhar sereno, uma paixão fervorosa é uma qualidade indispensável para um mestre."
1005102-36 = "Quando toco nas ferramentas vestindo isso, lembro-me do Grande Festival Esportivo.#nParece que o calor daquele dia ainda permanece no meu corpo."
1005102-37 = "Os gritos da torcida que lotavam o estádio... o cheiro do sol batendo no chão..."
1005102-38 = "Isso é o cheiro da paixão.#nEstimula a inspiração de um mestre, sabe."
1005102-39 = "Fufu. E então, Sensei?#nVocê também sente o cheiro da paixão que emana deste gakuran?"
1005102-45 = "[ns] \"Sinto o seu cheiro, Utaha.\""
1005102-46 = "...O-o meu cheiro?"
1005102-47 = "S-será que estou fedendo?"
1005102-48 = "A-ah, falando nisso... depois que o último Grande Festival Esportivo terminou, eu separei o gakuran para levar à lavanderia, mas... acabei não levando..."
1005102-49 = "..."
1005102-58 = "...Desculpe por ter sumido de repente. Obrigado por esperar."
1005102-59 = "Veja bem, não consigo me sentir à vontade trabalhando sem o meu jaleco de sempre."
1005102-60 = "Ele é leve, fácil de se mover e é mais fácil notar quando está sujo."
1005102-61 = "Roupas são como ferramentas. Elas só mostram seu verdadeiro valor quando usadas corretamente."
1005102-62 = "[s] \"Você tirou o gakuran.\""
1005102-63 = "Hm? Aquilo..."
1005102-64 = "...Se houver outra oportunidade, não é como se eu não fosse usar de novo..."
1005102-65 = "Foi algo feito por uma kouhai importante, e gosto muito tanto do material quanto do design."
1005102-66 = "...Claro, da próxima vez, com certeza vou lavar antes..."
1005102-67 = "Mas, ainda assim, o jaleco é definitivamente melhor para fazer manutenção em máquinas."
1005102-68 = "Por que? Se a chefe do Departamento de Engenharia começasse a andar por aí de gakuran em vez de jaleco, os alunos de toda a Millennium poderiam se assustar."
1005102-69 = "Ainda assim, se um dia a paixão for necessária para o desenvolvimento..."
1005102-70 = "...Talvez seja bom vestir o gakuran novamente para trabalhar. ...Fufu."
