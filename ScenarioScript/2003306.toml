[translation]
2003306-1 = "偉大な議長の日常"
2003306-3 = "キシシッ。この間は先生に、私が手がけているビジネスを見せてやっただろう。"
2003306-4 = "我[ruby=パンデモニウム・ソサエティー]々万魔殿が[/ruby]独占する出版事業の運営やマコトタワーの建設事業。それに加え、このマコト様のグッズ販売、観光事業など……"
2003306-5 = "これらは全て、万魔殿の権威をキヴォトス中に知らしめ、マコト様の名を轟かせるためのもの。"
2003306-6 = "そして……ついに準備が整った。"
2003306-7 = "キキキキキッ！ああ！この[ruby=はぬま]羽沼[/ruby]マコト様の偉大な計画が、今日ここに実現する！"
2003306-8 = "結果が待ち遠しくて仕方ないだろう、先生。"
2003306-9 = "[s] \"……たしかに、気にはなるかな。\""
2003306-10 = "キキキッ！そうか！"
2003306-11 = "やはり先生も期待していたのだな！"
2003306-12 = "今日こそは、このマコト様の魅力的な提案を今まで頑なに断ってきた先生も……"
2003306-13 = "「最初から万魔殿に協力していれば……マコト様、この通り……！」#nと後悔するに違いない。"
2003306-14 = "[s] \"さすがに、そこまでは……\""
2003306-15 = "案ずるな、先生。"
2003306-16 = "寛大な心で先生を迎え入れてやろう、キシシシシッ！！"
2003306-17 = "[s] \"……う、うん。\""
2003306-18 = "うむ、善は急げだ。さっそく現場に――"
2003306-26 = "ぎ、議長……！大変です！"
2003306-27 = "ん？何事だ？"
2003306-29 = "そ、それが……議長の自伝に問題があったと印刷所から連絡が……！"
2003306-30 = "[s] \"……自伝？\""
2003306-32 = "話は聞いたぞ！この私の自伝が出版できないだと！？"
2003306-33 = "ぎ、議長！"
2003306-34 = "何の問題が起きたのだ！"
2003306-35 = "今まで数々の逆境を乗り越えてきた経験や苦悩をありのまま記した歴史。#nつまりは、キヴォトスの全生徒にとって大きな助けとなるに違いない教え――"
2003306-36 = "そんな今年のベストセラーが約束されているこのマコト様の自伝に、#n一体どんなトラブルが起きたと！？"
2003306-37 = "[s] \"まさか、そこまで壮大な本だなんて……！\""
2003306-38 = "そ、それが……"
2003306-39 = "印刷費を何度も計算してみたのですが、どうやっても利益が見込めません！"
2003306-40 = "…………利益、だと？"
2003306-41 = "（その後、印刷所の職員から事情を聞いたところ……）"
2003306-42 = "議長は「このマコト様が作る自伝だ。最高級の材料をありったけ使え」と……"
2003306-43 = "指示に従い、最高級の本革で製本するなど拘ってきました。#nですが、その結果として……"
2003306-44 = "予算はとうに底をつき、これ以上の生産はできません。#nそれに印刷費が[ruby=かさ]嵩[/ruby]んだため、売れば売るほど赤字になってしまい採算がとれません！"
2003306-45 = "このままでは、刊行を諦めるしか……"
2003306-46 = "な、何だと……！"
2003306-47 = "こ、このマコト様の記念すべき初の自伝だ……#nただ、最高の本を作りたかっただけだというのに……！"
2003306-48 = "[s] \"どうしても予算は限られてるからね……\""
2003306-49 = "どうやら、材料の見直しからやり直す必要が……"
2003306-50 = "ぐっ……！"
2003306-51 = "……仕方ない、全てのビジネスが成功するとは限らないからな。"
2003306-52 = "残念だが、今回はやむを得な――"
2003306-58 = "ぎ、議長！大変です！"
2003306-59 = "……！？"
2003306-60 = "今度は何事だ！"
2003306-61 = "その……マコトタワーが完成したとの報告を受けて確認に行ったところ、#nまったくの予想外な事態に……！"
2003306-63 = "な、なに……？"
2003306-65 = "な、な、な……"
2003306-66 = "なんだぁぁ！これはぁぁぁぁぁ！"
2003306-67 = "こ、これが……マコトタワーだと？"
2003306-68 = "超高層ビルは……？#nキヴォトス全土が見下ろせる……この私の権威を示すビルは一体……"
2003306-69 = "[s] \"ビルというか、倉庫のような……\""
2003306-70 = "こちらに建設業者の残した報告書があります！"
2003306-71 = "なんだと？担当者はどこに行ったのだ？"
2003306-72 = "いや、まずはその報告書を読むとしよう……！#nなんと書いてある！？"
2003306-73 = "あ、えっと……その……"
2003306-75 = "稀代のカリスマ性を持つリーダーであり、投資家としても素晴らしい素質を持つ羽沼マコト議長へ。"
2003306-76 = "この度は私どもに、このような大規模事業を委託していただき誠にありがとうございました。"
2003306-77 = "ご依頼の通り、「400インチ」のマコトタワーを竣工いたしました。"
2003306-78 = "受け渡しも立ち会いたかったところなのですが、急ぎ次の現場に向かわなければならず、このようなご挨拶になってしまい申し訳ありません。"
2003306-82 = "それでは、またのご依頼をお待ちしております。"
2003306-84 = "[ns] \"400インチって……まさか。\""
2003306-85 = "け、契約書だ！それと設計図も持ってこい！"
2003306-86 = "はいっ！"
2003306-93 = "なっ！！"
2003306-94 = "ほ、本当にインチで書かれているじゃないか……"
2003306-95 = "くっ……400という数字だけ見て読み飛ばしてしまった……偉業を目の前にして浮かれていたあまり……私は奴らを信じて任せたというのにっ……！"
2003306-96 = "[s] \"そこは一番大事なところじゃないの……！？\""
2003306-97 = "おのれ……このマコト様の信頼を裏切るなんて！"
2003306-98 = "絶対に、絶対に許さな――"
2003306-99 = "ぎ、議長……！大変です！"
2003306-100 = "なっ！ま、また問題か！？"
2003306-102 = "……議長をモデルにしたグッズの担当業者が夜逃げしたようです！"
2003306-106 = "それだけではありません！開発中のリゾート地域に温泉が湧き出したと聞きつけた温泉開発部が、一挙に押し寄せてきたとの報告が！"
2003306-110 = "さらには観光事業に関する二重契約が明らかになり……#n先方から違約金の請求が届いております……！"
2003306-114 = "あ、あう……えあっ……うごおぉ……"
2003306-115 = "ぐはっ！！"
2003306-120 = "[ns] \"ま、マコト……！？大丈夫！？\""
2003306-122 = "ぎ、議長……！！！"
2003306-125 = "たかが……！"
2003306-126 = "[s] \"マコト……？\""
2003306-127 = "たかが、この程度で――"
2003306-128 = "この程度のショックで、このマコト様が倒れると思うなぁぁぁっ！！"
2003306-130 = "ま、マコト議長！！"
2003306-132 = "はぁ……はぁ……！全部員を集めよ！"
2003306-133 = "まずは建設業者からだ。我々を騙したあの命知らずを探せ！"
2003306-134 = "使える手段は何だって使って構わない。"
2003306-135 = "たとえ地の果てだろうと、このマコト様を愚弄した対価を必ずや支払わせてやるのだ！"
2003306-136 = "……いいか、お前たち！"
2003306-138 = "はいっ！！！"
2003306-142 = "[ns] \"……すごいね、マコトは。\""
2003306-143 = "ん？"
2003306-144 = "あぁ、これくらい今まで何度もあったからな。"
2003306-145 = "キキキッ、よくあることだ。"
2003306-146 = "[s] \"よくあるの……！？\""
2003306-147 = "たかが、この程度で立ち止まるわけにはいかない！"
2003306-148 = "このマコト様は、これからゲヘナを……いや、キヴォトス全土を手中に収めるのだ！"
2003306-149 = "そこに至るまで、まだ道のりは長いが……"
2003306-150 = "まずは我々を欺いた業者に処罰を与えるとしよう！"
2003306-151 = "[s] \"……マコトらしいね、私も協力するよ。\""
2003306-152 = "キキキッ、ようやく万魔殿と手を組む決心がついたのか。"
2003306-153 = "[s] \"……それは丁重にお断りします。\""
2003306-154 = "キキキッ、まあ良い。そう簡単に事が進んでは物足りないからな。#n今は目の前の問題を解決するのが先決だ！"
2003306-155 = "ただちに向かうとしよう！急いでリムジンを手配するのだ！"
2003306-156 = "あっ、議長。その……今回のトラブルでリムジンのレンタル代が支払えず、先ほど業者に回収されてしまいました……"
2003306-157 = "……………………。"
2003306-158 = "…………先生。#nもし良かったら……その、電車賃を……貸してくれないか……？"
2003306-159 = "[s] \"う、うん……\""
2003306-160 = "キキキッ。この恩は、しかと胸に刻んでおこう！"
2003306-161 = "よし、全員揃っているな？#n……万魔殿の出陣だ！"
2003306-163 = "はいっ！！"
2003306-165 = "（その後、マコトと一緒に様々なトラブルを解決していった）"
