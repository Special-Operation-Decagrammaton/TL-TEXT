[translation]
2003306-1 = "O cotidiano da grande presidente"
2003306-3 = "Kishishi. Outro dia, eu mostrei ao Sensei os negócios que estou conduzindo, não foi?"
2003306-4 = "A operação do negócio editorial que nós, a Pandemonium Society, monopolizamos, e o projeto de construção da Torre Makoto. Além disso, a venda de produtos da minha pessoa, a Makoto-sama, o setor de turismo, etc..."
2003306-5 = "Tudo isso serve para espalhar a autoridade da Pandemonium Society por todo o Kivotos e fazer o nome da Makoto-sama ecoar."
2003306-6 = "E... finalmente, os preparativos estão prontos."
2003306-7 = "Kikikikiki! Ah! O grande plano de Hanuma Makoto-sama se concretiza aqui hoje!"
2003306-8 = "Você deve estar ansioso pelo resultado, não é, Sensei?"
2003306-9 = "[s] \"...Com certeza, estou curioso.\""
2003306-10 = "Kikiki! Entendo!"
2003306-11 = "Como esperado, o Sensei também estava na expectativa!"
2003306-12 = "Hoje, até mesmo o Sensei, que sempre recusou teimosamente as propostas fascinantes desta Makoto-sama..."
2003306-13 = "Irá se arrepender dizendo: \"Se eu tivesse colaborado com a Pandemonium Society desde o início... Makoto-sama, por favor...!\""
2003306-14 = "[s] \"Não acho que chegue a tanto...\""
2003306-15 = "Não se preocupe, Sensei."
2003306-16 = "Eu o receberei de braços abertos com minha magnanimidade, kishishishishi!!"
2003306-17 = "[s] \"...Ah, sim.\""
2003306-18 = "Muito bem, não há tempo a perder. Vamos logo ao local—"
2003306-26 = "P-presidente...! É uma emergência!"
2003306-27 = "Hm? O que houve?"
2003306-29 = "B-bem... a gráfica entrou em contato dizendo que houve um problema com a autobiografia da presidente...!"
2003306-30 = "[s] \"...Autobiografia?\""
2003306-32 = "Eu já ouvi a história! Como assim minha autobiografia não pode ser publicada!?"
2003306-33 = "P-presidente!"
2003306-34 = "Que tipo de problema aconteceu!?"
2003306-35 = "Uma história que registra fielmente minhas experiências e angústias ao superar inúmeras adversidades. Ou seja, ensinamentos que certamente serão de grande ajuda para todos os estudantes de Kivotos—"
2003306-36 = "Que tipo de problema poderia ter ocorrido com a autobiografia desta Makoto-sama, que já tem o best-seller deste ano garantido!?"
2003306-37 = "[s] \"Quem diria que era um livro tão grandioso assim...!\""
2003306-38 = "B-bem, é que..."
2003306-39 = "Calculamos os custos de impressão várias vezes, mas não há como prever lucro de jeito nenhum!"
2003306-40 = "............Lucro, você disse?"
2003306-41 = "(Depois disso, ao ouvir a situação dos funcionários da gráfica...)"
2003306-42 = "A presidente disse: \"É uma autobiografia feita por mim, Makoto-sama. Usem os melhores materiais que puderem\"..."
2003306-43 = "Seguimos as instruções e nos esforçamos, como encadernar com o melhor couro legítimo. Mas, como resultado..."
2003306-44 = "O orçamento já se esgotou e não podemos produzir mais. Além disso, como os custos de impressão aumentaram, quanto mais vendermos, maior será o prejuízo, tornando impossível equilibrar as contas!"
2003306-45 = "Deste jeito, não teremos escolha a não ser desistir da publicação..."
2003306-46 = "O-o que você disse...!"
2003306-47 = "E-esta é a primeira autobiografia memorável desta Makoto-sama... Eu só queria fazer o melhor livro possível...!"
2003306-48 = "[s] \"O orçamento é sempre limitado, afinal...\""
2003306-49 = "Parece que será necessário rever os materiais e começar tudo de novo..."
2003306-50 = "Guh...!"
2003306-51 = "...Não tem jeito, nem todos os negócios são bem-sucedidos."
2003306-52 = "É uma pena, mas desta vez não há como evitar—"
2003306-58 = "P-presidente! É uma emergência!"
2003306-59 = "...!?"
2003306-60 = "O que aconteceu agora!"
2003306-61 = "Bem... quando fui verificar a Torre Makoto após receber o relatório de que estava concluída, deparei-me com uma situação totalmente inesperada...!"
2003306-63 = "O-o que...?"
2003306-65 = "O-o-o..."
2003306-66 = "O que é issooooo! O que é issooooo!"
2003306-67 = "I-isso é... a Torre Makoto?"
2003306-68 = "O arranha-céu... onde está?#nAquele que domina toda Kivotos... o prédio que deveria exibir a minha autoridade, onde está ele...?"
2003306-69 = "[s] \"Mais do que um prédio, parece um depósito...\""
2003306-70 = "Aqui está o relatório deixado pela construtora!"
2003306-71 = "O quê? Para onde foi o responsável?"
2003306-72 = "Não, primeiro vamos ler esse relatório...!#nO que está escrito nele!?"
2003306-73 = "Ah, bem... é que..."
2003306-75 = "À Presidente Makoto Hanuma, uma líder com um carisma inigualável e um talento extraordinário como investidora."
2003306-76 = "Gostaríamos de agradecer sinceramente por nos confiar este projeto de grande escala."
2003306-77 = "Conforme solicitado, concluímos a Torre Makoto de \"400 polegadas\"."
2003306-78 = "Gostaríamos de estar presentes na entrega, mas precisamos seguir para o próximo local de trabalho com urgência, por isso pedimos desculpas por nos despedirmos desta forma."
2003306-82 = "Esperamos pelo seu próximo pedido."
2003306-84 = "[ns] \"400 polegadas... não pode ser.\""
2003306-85 = "O, o contrato! Traga o contrato e as plantas também!"
2003306-86 = "Sim!"
2003306-93 = "Não!!"
2003306-94 = "E, está realmente escrito em polegadas..."
2003306-95 = "Droga... eu vi o número 400 e pulei o resto... estava tão empolgada com a grande obra que... e pensar que eu confiei neles para fazer o trabalho...!"
2003306-96 = "[s] \"Isso não era a parte mais importante...?\""
2003306-97 = "Malditos... como ousam trair a confiança da Lady Makoto!"
2003306-98 = "Eu nunca, nunca vou perdoar vocês—"
2003306-99 = "Pre, Presidente...! É uma emergência!"
2003306-100 = "O quê! Outro problema!?"
2003306-102 = "...A empresa responsável pelos produtos com a imagem da Presidente fugiu durante a noite!"
2003306-106 = "Não é só isso! O Departamento de Desenvolvimento de Fontes Termais ouviu que brotou uma fonte termal na área do resort em desenvolvimento e eles invadiram o local!"
2003306-110 = "Além disso, descobrimos um contrato duplo relacionado ao projeto turístico...#ne recebemos uma cobrança de multa rescisória da outra parte...!"
2003306-114 = "Ah, au... eah... ugooo..."
2003306-115 = "Guah!!"
2003306-120 = "[ns] \"Ma, Makoto...!? Você está bem!?\""
2003306-122 = "Pre, Presidente...!!!"
2003306-125 = "Apenas...!"
2003306-126 = "[s] \"Makoto...?\""
2003306-127 = "Apenas, por causa disso—"
2003306-128 = "Você acha que eu, a grande Makoto, vou cair por causa de um choque desses!?"
2003306-130 = "Pre, Presidente Makoto!!"
2003306-132 = "Haa... haa...! Reúnam todos os membros!"
2003306-133 = "Comecem pela construtora. Encontrem aqueles insensatos que nos enganaram!"
2003306-134 = "Podem usar qualquer meio necessário."
2003306-135 = "Mesmo que seja no fim do mundo, eu farei com que paguem o preço por zombar da grande Makoto!"
2003306-136 = "...Entendido, pessoal!"
2003306-138 = "Sim!!!"
2003306-142 = "[ns] \"...Incrível, Makoto.\""
2003306-143 = "Hã?"
2003306-144 = "Ah, isso já aconteceu várias vezes antes."
2003306-145 = "Kiki-ki, é algo comum."
2003306-146 = "[s] \"É comum...!?\""
2003306-147 = "Eu não posso parar por causa de algo tão trivial!"
2003306-148 = "Eu, a grande Makoto, vou tomar Gehenna... não, toda Kivotos nas minhas mãos!"
2003306-149 = "O caminho até lá ainda é longo, mas..."
2003306-150 = "Primeiro, vamos punir a empresa que nos enganou!"
2003306-151 = "[s] \"...É bem a sua cara, Makoto. Eu vou ajudar também.\""
2003306-152 = "Hehehe, finalmente decidiu unir forças com o Pandemônio, não é?"
2003306-153 = "[s] \"……Eu recuso educadamente.\""
2003306-154 = "Hehehe, tudo bem. Não teria graça se as coisas fossem tão fáceis assim. #nAgora, resolver o problema à nossa frente é a prioridade!"
2003306-155 = "Vamos partir imediatamente! Preparem a limusine agora mesmo!"
2003306-156 = "Ah, Presidente. É que... por causa dos problemas recentes, não conseguimos pagar o aluguel da limusine e a empresa a recolheu agora pouco..."
2003306-157 = "……………………."
2003306-158 = "…………Sensei. #nSe não se importar... você poderia... me emprestar... o dinheiro da passagem de trem...?"
2003306-159 = "[s] \"S-sim...\""
2003306-160 = "Hehehe. Guardarei este favor com carinho no meu coração!"
2003306-161 = "Muito bem, estão todos prontos? #n……O Pandemônio vai partir!"
2003306-163 = "Sim!!"
2003306-165 = "(Depois disso, resolvi vários problemas junto com a Makoto)"
