[translation]
10047070-1 = "第7話;伝説の証明"
10047070-2 = "（寮に戻って、みんなと頑張って掃除した）"
10047070-6 = "[ns] \"……これは？\""
10047070-7 = "（黒い布をかぶせられたキャンバスが、部屋の隅にいくつも積まれていた）"
10047070-11 = "それは……見ない方がいいよぉ。"
10047070-12 = "エリちゃんの……昔の絵だから。"
10047070-13 = "そっとしといてねぇ……。"
10047070-14 = "[ns] \"ずっと持ってるんだね。\""
10047070-15 = "自分の歩みを……振り返りたいんだって。"
10047070-16 = "未熟な、過去の自分と向き合うのは……つらいはずなのに……。"
10047070-17 = "私たちのなかで一番の……努力家さん。"
10047070-23 = "[ns] \"……夢を追う少女、か。\""
10047070-24 = "マスター？ここで何をされているのですか？"
10047070-25 = "[s] \"あっ、え、えっと……！\""
10047070-26 = "……前世の話。"
10047070-27 = "先生は……私とのこと、覚えてないんだって……。"
10047070-28 = "えっ！まさか、先輩が言ってた前世の絆って……！"
10047070-30 = "[ns] \"わ、私は何も知らないよ……！\""
10047070-32 = "（……カノエの機転のおかげで、会話の内容はバレなかった）"
10047070-37 = "[ns] \"エリの夢、か……。\""
10047070-38 = "（そんなことを考えつつ、掃除を続けた）"
10047070-41 = "にゅふふ。原状回復完了、です！"
10047070-42 = "はぁ……次こんなことしたら、タダじゃおかないからね……。"
10047070-43 = "おおっ！では、趣向を変えた儀式ならば……。"
10047070-44 = "ちょっとは反省してっ！"
10047070-45 = "たしかに、爆発が少し強かったからねぇ……。"
10047070-46 = "やっぱり、安全にやるなら……外かな……。"
10047070-47 = "ですが、敷地内は寮監隊が目を光らせています。"
10047070-48 = "答えが出ない……こんな時こそ……。"
10047070-49 = "アルカナの魔法！タロットカードの出番です！"
10047070-53 = "……そうくると思った。"
10047070-54 = "まず、失敗した原因を分析してみましょうか？"
10047070-58 = "マスター。この中から3枚選んで、テーブルに伏せてください。"
10047070-59 = "[ns] 慎重にカードを選び、テーブルに伏せる。"
10047070-64 = "では、見てみますね。"
10047070-68 = "ふむ、これは……。"
10047070-69 = "……火力不足、でしょうか。"
10047070-74 = "イヒッ……寮ごと、吹き飛ばすべきだったかなぁ……。"
10047070-75 = "なるほど。悪魔は刺激的な相手にしか会ってくれないのですね。"
10047070-76 = "……寮を吹き飛ばしたら、「退学」って悪魔と会えたかもね。"
10047070-77 = "うーん、この場合の「火力」は、抽象的な意味のようです。"
10047070-78 = "それにこれは……古い歴史という意味もあります。"
10047070-79 = "うーーーん……。"
10047070-83 = "マスター、すみません。#nもう一枚選んでもらえませんか？"
10047070-84 = "[ns] 頷いてカードを選ぶ。"
10047070-92 = "これは……正位置の魔術師？"
10047070-93 = "[s1] \"それって……。\"\n[s2] \"良いの？悪いの？\""
10047070-96 = "魔術師のカードはいろいろな解釈ができまして……。"
10047070-97 = "素晴らしい能力を持ちながら、予測不可能な一面があります。"
10047070-98 = "それ、先輩たちと一緒じゃん。"
10047070-99 = "私たちと……一緒？"
10047070-106 = "それですよ！"
10047070-107 = "ありがとうございますレナちゃん！さすがオカ研の一員です！"
10047070-108 = "なっ、なに？急に不安になってきたんだけど。"
10047070-109 = "これは、古い歴史を参考にし、変革を目指せ――という意味です。#nそれも、魔法関連の！"
10047070-110 = "みなさん！#nワイルドハントの魔法にまつわる話を覚えてますか？"
10047070-111 = "もしかして……アレ……？"
10047070-112 = "なるほど。"
10047070-113 = "語り継がれる存在を、現代に蘇らせる……それもまた芸術です。"
10047070-114 = "何なの！？勝手に盛り上がってないで、教えてよ！"
10047070-115 = "巨大魔法陣ですよ！"
10047070-116 = "満月の夜！#n学院の重要施設を繋げて巨大な魔法陣を描くと、#nすごいことが起こるという伝説！"
10047070-117 = "[s] \"結局、それってどんなことが起きるの？\""
10047070-118 = "言い伝えだから……詳しくはわからないけど……。"
10047070-119 = "なんでも、「願い」が叶うらしいよぉ……。"
10047070-120 = "にゅふふ、ドキドキしませんか？"
10047070-121 = "本気？"
10047070-122 = "真夜中に寮を出て、学院全体に絵を描くの……？"
10047070-123 = "寮監隊に捕まっちゃったら、どうするつもり！？"
10047070-124 = "イヒッ、レナちゃん……よく聞いてぇ。"
10047070-129 = "バレなきゃ、いいんだよぉ？"
10047070-130 = "ふふ、芸術は、冒険から生まれるものですから。"
10047070-131 = "言い伝え通りなら、私の夢も叶うはず……！"
10047070-132 = "……それはそれとして、面白そうですし！"
10047070-133 = "シャーッ！そんなことだろうと思った！#n先生も見てないで止めて！"
10047070-137 = "[ns3] \"エリの夢が叶えられるなら、助けになりたい。\"\n[ns4] \"もちろん、やりすぎない範囲でね。\""
10047070-140 = "私も賛成です。お互いの夢を応援し合う関係。#nそれが――"
10047070-145 = "――仲間ぁ。"
10047070-146 = "……ですから！"
10047070-147 = "ううう……！"
10047070-148 = "あーもー！勝手にすれば！？#nその代わり、私は絶対助けないからね！"
10047070-149 = "大丈夫です！レナちゃんの心配もわかってますから。"
10047070-150 = "決して、迷惑をかけないようにします。"
10047070-151 = "ふんっ、言うのは簡単だけどさ……。"
10047070-153 = "それじゃ……まずは調査だねぇ……。"
10047070-154 = "この学院に隠れる……巨大な魔法陣の正体を――"
10047070-155 = "みんなで芸術情報館に行って、施設を確認しましょう！"
10047070-159 = "……レナちゃん、ご一緒にどうですか？"
10047070-160 = "私は先輩たちがまたやらかさないか、監視するだけ。"
10047070-161 = "ほんっと～……に！深い意味はないからね！"
10047070-162 = "ふふ、わかっていますよ。"
10047070-164 = "ワイルドハントの芸術情報館"
10047070-189 = "（調査は思ったよりも難航し……）"
10047070-194 = "（思うような成果は得られなかった）"
10047070-195 = "（どの施設を繋いでも、#nへんてこな魔法陣が現れるだけだった……）"
10047070-204 = "（さらに調査が続き……）"
10047070-209 = "……ようやく、見つけました。"
10047070-210 = "これが！学院に隠された、巨大な魔法陣の正体……です！"
10047070-217 = "ほ、本物……？昔の地図にそれっぽく描いたんじゃないの？"
10047070-218 = "にゅふふっ、本物です。"
10047070-219 = "今の学院基準で考えていたのが間違いだったんです。"
10047070-220 = "設立初期にあった建物を繋いでみると……#n完璧な対称の魔法陣になりました。"
10047070-221 = "それも、数字を利用した……いわば「魔方陣」です！"
10047070-222 = "こちらの、線で結んだ各施設。#nその住所に着目して、末尾の数字を足すと……。"
10047070-223 = "見てください！合計が26になる線が6本できました！"
10047070-224 = "これは100％意図された構造！#n学院の創立に、オカルトの影響があったのは本当でした！"
10047070-225 = "うそでしょ……。"
10047070-226 = "まるで、誰かに見つけてもらうのを待っていたかのような……。"
10047070-227 = "疑う余地のない、本物の魔法陣ですね……#n完成したら、一体なにが起きるのでしょう。"
10047070-231 = "……でも、一つ、問題があるよぉ。"
10047070-236 = "これは現在の学院の地図……昔とは全然違う。"
10047070-237 = "取り壊された建物はもちろん……新しく建てられた建物も……。"
10047070-238 = "問題はここ……魔法陣の線の上にできた建物。"
10047070-242 = "はっ！まさかこれは……！？"
10047070-243 = "あら。"
10047070-244 = "そう……この地図通りに、魔法陣を完成させるには……。"
10047070-246 = "[log=카노에]寮監隊の宿舎を通らないといけないんだぁ。[/log]"
