[translation]
10047070-1 = "Episódio 7; A Prova da Lenda"
10047070-2 = "（Voltei para o dormitório e ajudei todo mundo com a limpeza）"
10047070-6 = "[ns] \"……O que é isso?\""
10047070-7 = "（Várias telas cobertas por panos pretos estavam empilhadas no canto do quarto）"
10047070-11 = "É melhor... você não ver isso."
10047070-12 = "São as pinturas antigas da Eri-chan..."
10047070-13 = "Deixe como está, por favor..."
10047070-14 = "[ns] \"Ela mantém isso guardado há muito tempo, né?\""
10047070-15 = "Dizem que ela quer... olhar para trás e ver sua própria trajetória."
10047070-16 = "Encarar o seu passado imaturo... deve ser doloroso, mas ainda assim..."
10047070-17 = "Ela é a mais esforçada... entre todas nós."
10047070-23 = "[ns] \"……Uma garota que persegue seus sonhos, é?\""
10047070-24 = "Mestre? O que está fazendo aqui?"
10047070-25 = "[s] \"Ah, é, bem...!\""
10047070-26 = "……Sobre a vida passada."
10047070-27 = "Dizem que o Sensei... não se lembra de nada sobre mim..."
10047070-28 = "Hã! Não me diga que o laço da vida passada que a veterana mencionou é...!"
10047070-30 = "[ns] \"E-eu não sei de nada...!\""
10047070-32 = "（……Graças ao raciocínio rápido da Kanoe, o conteúdo da conversa não foi descoberto）"
10047070-37 = "[ns] \"O sonho da Eri, hein...\""
10047070-38 = "（Enquanto pensava nisso, continuei a limpeza）"
10047070-41 = "Nyufufu. Restauração do estado original, concluída!"
10047070-42 = "Haa... se fizerem isso de novo, não vou deixar passar em branco..."
10047070-43 = "Oh! Então, se mudarmos o método do ritual..."
10047070-44 = "Reflita um pouco sobre isso!"
10047070-45 = "De fato, a explosão foi um pouco forte demais..."
10047070-46 = "Afinal, se quisermos fazer com segurança... talvez seja melhor lá fora..."
10047070-47 = "Porém, a equipe de monitoramento do dormitório está de olho em todo o terreno."
10047070-48 = "Não encontro uma resposta... é nessas horas que..."
10047070-49 = "Magia arcana! É a vez das cartas de tarô!"
10047070-53 = "……Eu sabia que você diria isso."
10047070-54 = "Primeiro, que tal analisarmos a causa da falha?"
10047070-58 = "Mestre. Escolha três cartas daqui e coloque-as viradas para baixo na mesa."
10047070-59 = "[ns] Escolhe as cartas com cuidado e as coloca viradas para baixo na mesa."
10047070-64 = "Então, vamos dar uma olhada."
10047070-68 = "Hum, isso é..."
10047070-69 = "……Falta de poder de fogo, talvez?"
10047070-74 = "Ihi... será que eu deveria ter explodido o dormitório inteiro...?"
10047070-75 = "Entendo. Então o demônio só aparece para quem é um parceiro estimulante."
10047070-76 = "……Se tivesse explodido o dormitório, talvez tivesse encontrado o demônio da \"expulsão\"."
10047070-77 = "Hmm, o \"poder de fogo\" neste caso parece ter um significado abstrato."
10047070-78 = "Além disso, isso também significa... uma história antiga."
10047070-79 = "Hmmmm..."
10047070-83 = "Mestre, sinto muito. #nPoderia escolher mais uma carta?"
10047070-84 = "[ns] Assente e escolhe uma carta."
10047070-92 = "Isso é... o Mago na posição vertical?"
10047070-93 = "[s1] \"O que isso significa...?\"\n[s2] \"É bom? Ou ruim?\""
10047070-96 = "A carta do Mago pode ter várias interpretações..."
10047070-97 = "Embora possua habilidades maravilhosas, tem um lado imprevisível."
10047070-98 = "Isso é exatamente igual às veteranas."
10047070-99 = "Com a gente…… juntos?"
10047070-106 = "É isso!"
10047070-107 = "Muito obrigada, Rena-chan! Como esperado de um membro do Clube de Pesquisa de Arte!"
10047070-108 = "Q-quê? De repente, comecei a ficar preocupada."
10047070-109 = "Isso significa: basear-se na história antiga para buscar uma revolução. #nE claro, uma revolução relacionada à magia!"
10047070-110 = "Pessoal! #nVocês se lembram das histórias sobre a magia de Wildhunt?"
10047070-111 = "Será que é... aquilo...?"
10047070-112 = "Entendo."
10047070-113 = "Trazer de volta à vida uma existência que foi passada adiante através das eras... isso também é arte."
10047070-114 = "Do que vocês estão falando!? Não fiquem empolgadas sozinhas, me expliquem!"
10047070-115 = "É o Círculo Mágico Gigante!"
10047070-116 = "Na noite de lua cheia! #nDiz a lenda que, se você conectar as instalações importantes da academia para desenhar um círculo mágico gigante, #numa coisa incrível acontecerá!"
10047070-117 = "[s] \"No fim das contas, o que acontece exatamente?\""
10047070-118 = "Como é uma lenda... não sabemos os detalhes, mas..."
10047070-119 = "Dizem que qualquer \"desejo\" pode se realizar..."
10047070-120 = "Nyu-fufu, não é emocionante?"
10047070-121 = "Sério?"
10047070-122 = "Sair do dormitório no meio da noite para desenhar pela academia inteira...?"
10047070-123 = "O que vocês vão fazer se forem pegas pela equipe de monitoramento do dormitório!?"
10047070-124 = "Ihi, Rena-chan... escute bem."
10047070-129 = "Se ninguém descobrir, não tem problema, né?"
10047070-130 = "Fufu, a arte nasce da aventura, afinal."
10047070-131 = "Se a lenda for verdadeira, meu sonho também deve se realizar...!"
10047070-132 = "……E além disso, parece divertido!"
10047070-133 = "Ah! Eu sabia que ia dar nisso! #nSensei, não fique só olhando, pare elas!"
10047070-137 = "[ns3] \"Se o sonho da Eri puder ser realizado, quero ajudar.\"\n[ns4] \"Claro, desde que não exagerem.\""
10047070-140 = "Eu também concordo. Um relacionamento onde apoiamos os sonhos umas das outras. #nIsso é..."
10047070-145 = "――Amizade."
10047070-146 = "……Por isso!"
10047070-147 = "Uuuu...!"
10047070-148 = "Ah, chega! Façam o que quiserem! #nMas, em troca, eu não vou ajudar em nada, viu!"
10047070-149 = "Está tudo bem! Nós entendemos a preocupação da Rena-chan."
10047070-150 = "Prometemos não causar problemas."
10047070-151 = "Humph, falar é fácil, mas..."
10047070-153 = "Então... primeiro, vamos investigar..."
10047070-154 = "A verdadeira forma do círculo mágico gigante escondido nesta academia..."
10047070-155 = "Vamos todos ao Centro de Informações de Arte para verificar as instalações!"
10047070-159 = "……Rena-chan, gostaria de vir conosco?"
10047070-160 = "Eu só vou para vigiar e garantir que vocês não façam nenhuma besteira de novo."
10047070-161 = "Sério mesmo...! Não tem nenhum outro motivo, viu!"
10047070-162 = "Fufu, eu entendo."
10047070-164 = "Centro de Informações de Arte de Wildhunt"
10047070-189 = "(A investigação foi mais difícil do que o esperado...)"
10047070-194 = "(Não obtivemos os resultados esperados)"
10047070-195 = "(Não importava quais instalações conectássemos, #napenas círculos mágicos estranhos apareciam...)"
10047070-204 = "(A investigação continuou...)"
10047070-209 = "……Finalmente, encontramos."
10047070-210 = "Isto é! A verdadeira forma do círculo mágico gigante escondido na academia...!"
10047070-217 = "É, é real...? Não é só algo que desenharam num mapa antigo para parecer real?"
10047070-218 = "Nyu-fufu, é real."
10047070-219 = "Foi um erro pensar com base nos padrões escolares atuais."

10047070-220 = "Quando conectamos os edifícios que existiam nos primeiros dias do estabelecimento...#nTornou-se um círculo mágico simétrico perfeito."

10047070-221 = "それも、数字を利用した……いわば「魔方陣」です！"

10047070-222 = "Aqui, cada instalação é conectada por uma linha.#nSe você olhar aquele endereço e somar os números no final..."

10047070-223 = "Por favor, dê uma olhada! Agora temos 6 linhas com um total de 26!"

10047070-224 = "Esta é uma estrutura 100% intencional!#nÉ verdade que a fundação da academia foi influenciada pelo ocultismo!"

10047070-225 = "Isso é mentira..."

10047070-226 = "É como se eu estivesse esperando alguém me encontrar..."

10047070-227 = "Não há dúvida, é um verdadeiro círculo mágico...#nO que acontecerá quando estiver concluído?"

10047070-231 = "...Mas há um problema."

10047070-236 = "Este é um mapa da academia atual... completamente diferente do passado."

10047070-237 = "Não apenas os edifícios demolidos, mas também os edifícios recém-construídos..."

10047070-238 = "O problema está aqui...um edifício construído na linha do círculo mágico."

10047070-242 = "Ha! De jeito nenhum isso é...! ?"

10047070-243 = "falta."

10047070-244 = "Sim...para completar o círculo mágico de acordo com este mapa..."

10047070-246 = "[log=카노에]Tenho que passar pelos aposentos do supervisor do dormitório.[/log]"

