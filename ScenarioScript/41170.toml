[translation]
41170-1 = "Episódio 17; Operação Trevo (1)"
41170-4 = "Escola de Polícia Valkyrie - Corredor"
41170-10 = "Aqui é RABBIT 1, horário atual 2330. Acabamos de chegar ao Ponto E."
41170-11 = "Não há sinais de sentinelas, mas confirmei vários equipamentos que parecem ser câmeras de vigilância no corredor oposto."
41170-12 = "Aqui é o Acampamento RABBIT. Já hackeei essas câmeras, então não se preocupe com elas~."
41170-13 = "Pelo que vi na tela, não há guardas por perto. Pode seguir tranquila até o Ponto S."
41170-14 = "Moe-chan, você é rápida como sempre..."
41170-15 = "Hehehe, esse nível de segurança é fichinha para mim."
41170-16 = "...Desculpe estragar o clima, mas o hack só deve durar uns 30 minutos. Parece que um código aleatório é gerado a cada meia hora, e esse circuito é um pouco complicado. Então, por favor, terminem a missão em 30 minutos."
41170-17 = "Pelo conteúdo, deve ser aquela vice-presidente da Veritas de novo... Que irritante."
41170-18 = "Mesmo sendo o prédio principal da Valkyrie, não ter segurança é um pouco estranho, não acha?"
41170-19 = "Já disse que está tudo bem, confie em mim!"
41170-20 = "Não estava falando com você, Moe. Estava falando da Valkyrie."
41170-21 = "...Mesmo sendo inimigas agora, é de se espantar. É por isso que eu não quero vir para a Valkyrie."
41170-22 = "Bem, de qualquer forma, o Ponto S, onde o livro de registros de transações do Departamento de Segurança — o \"Trevo\" — está guardado, fica no terceiro subsolo. Usem a escada do lado oeste, que tem menos tráfego."
41170-23 = "...Repetindo, o limite de tempo é de 30 minutos. Conto com vocês até lá."
41170-28 = "RABBIT 1, entendido."
41170-29 = "A-a propósito, e o Sensei...?"
41170-30 = "Diferente da última vez, a rota de infiltração é difícil, então não é possível para o Sensei. Após discutirmos, decidimos deixá-lo para trás."
41170-31 = "Além disso, se formos descobertas, pode acabar em um tiroteio."
41170-32 = "[s1] \"Desculpe por não ser útil...\"\n[s2] \"Estarei torcendo por vocês nos bastidores...\""
41170-33 = "Bem, de certa forma, é o grupo de sempre."
41170-34 = "Bem, de certa forma, é o grupo de sempre."
41170-35 = "I-isso é verdade..."
41170-36 = "Sim. Apenas nós..."
41170-37 = "Miyako, que expressão é essa? Algum problema?"
41170-38 = "N-não. Estava apenas pensando na operação."
41170-42 = "Então, vamos avançar até o Ponto S mantendo a vigilância!"
41170-47 = "Nesta sala estão todos os documentos da Valkyrie..."
41170-48 = "É uma porta resistente. É natural, já que aqui também devem estar todas as evidências relacionadas a crimes."
41170-50 = "Apesar disso, ainda não tem nenhum guarda por aqui."
41170-51 = "Bem, é bom que seja fácil."
41170-52 = "...Quer dizer, o que estamos esperando? Por que não entramos logo?"
41170-53 = "Esta porta é eletrônica."
41170-54 = "Parece que a Moe-chan está tentando desbloqueá-la com todo o esforço..."
41170-55 = "...Ei, não me diga que esse tempo conta dentro dos \"30 minutos\"?"
41170-60 = "Não me apresse! Eu já estou fazendo o mais rápido que posso!"
41170-61 = "Tsc, não dá para simplesmente explodir a porta?"
41170-62 = "Você acha que consegue com essa espessura? Se acha que pode, por que não tenta?"
41170-63 = "Mas não me responsabilizo se o alarme tocar."
41170-67 = "Ah, entendi. Se eu decodificar isso..."
41170-73 = "...Concluído!"
41170-79 = "...3 minutos, demorou bastante."
41170-80 = "Isso já é extremamente rápido, sabia!?"
41170-81 = "Você tem noção da dificuldade disso!?"
41170-83 = "Agora não é hora para brigas."
41170-84 = "Não temos muito tempo, vamos nos apressar."
41170-85 = "Procurem pelas evidências relacionadas àquele suborno."
41170-86 = "Então,"
41170-87 = "Eu vou ficar com a estante da direita."
41170-93 = "Ugh, que escuro..."
41170-100 = "Hum, vejamos..."
41170-101 = "Departamento de Segurança Pública, Departamento de Segurança Pública..."
41170-106 = "“Kaiser Industries”, registros de uma semana atrás..."
41170-110 = "É isso!"
41170-115 = "Muito bem, Saki. Pode me mostrar?"
41170-120 = "……Entendo."
41170-124 = "“Trevo”... Conseguimos provas de subornos ilegais entre a “Kaiser Industries” e o Departamento de Segurança Pública."
41170-125 = "Como o Sensei disse, parece que o caso da “reurbanização da Cidade dos Coelhinhos” estava envolvido nisso."
41170-126 = "[s3] \"Entendi, então era isso...\"\n[s4] \"De qualquer forma, bom trabalho a todos.\""
41170-127 = "Com esses documentos, poderemos impedir as ações delas."
41170-128 = "Com esses documentos, poderemos impedir as ações delas."
41170-129 = "Vamos dar uma lição naqueles caras do Departamento de Segurança Pública."
41170-137 = "Hm? O que você está fazendo, Miyu?"
41170-138 = "A, a porta, você fechou..."
41170-139 = "……Se fechou, é só abrir."
41170-140 = "Ma, mas essa porta..."
41170-141 = "Não tem maçaneta nem nada... talvez não dê para abrir."
41170-146 = "……Hã!?"
41170-148 = "Próximo episódio: Operação Trevo (2)"
