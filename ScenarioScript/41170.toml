[translation]#[Texto revisado.] Em aguardo de revisão de formatação de texto. - Filipe 10/06.
41170-1 = "Episódio 17: Operação Trevo (1)"
41170-4 = "Sede da Academia Valkyrie - Corredores"
41170-10 = "Aqui é RABBIT 1. Horário atual: 2330. Chegamos no Ponto Echo."
41170-11 = "Zero contato visual com patrulhas inimigas. Detectamos um ninho de câmeras de vigilância no corredor a frente."
41170-12 = "Aqui é o Acampamento RABBIT na escuta. Pode ignorar os olhos eletrônicos, eu já deixei todas as câmeras cegas e tocando imagem em loop~."
41170-13 = "Pela leitura térmica, não tem uma alma viva num raio de cinquenta metros. Caminho livre pra infiltrar no Ponto Sierra."
41170-14 = "Moe-chan, você quebrou o firewall deles tão rápido assim...?"
41170-15 = "Kuhihi, brincar com a segurança da Valkyrie antes do jantar abre o apetite."
41170-16 = "……Mas não vamos comemorar tão cedo. Esse bypass só vai durar 30 minutos. O sistema vai rodar um gerador de código aleatório agressivo depois disso, e segurar esse firewall sozinha vai ser dureza. A missão tem que acabar em meia hora, sem choro."
41170-17 = "Pela assinatura digital enjoada desse código, aposto que é coisa da vice-presidente da Veritas... Que saco."
41170-18 = "Isso aqui é a fortaleza principal da Valkyrie... como é possível não ter patrulha física num lugar desses?"
41170-19 = "O radar tá limpo, caramba! Confia no meu trampo!"
41170-20 = "Não tô duvidando de você, Moe. Tô duvidando da inteligência tática da Valkyrie."
41170-21 = "……É impressionante a incompetência do inimigo. Mais um motivo pra eu preferir morrer do que ser transferida pra essa escola de piadas."
41170-22 = "Guarda o veneno pra depois. O Ponto Sierra, o arquivo-morto onde repousa o nosso Alvo Trevo (os livros contábeis da Segurança Pública), fica no subsolo nível 3. Usem as escadas do setor oeste pra garantir."
41170-23 = "……Vou repetir pra não ter desculpa: o relógio tá correndo, vocês têm 30 minutos. Não me decepcionem."
41170-28 = "Entendido, RABBIT 1 desligando."
41170-29 = "A-A propósito... cadê o Sensei...?"
41170-30 = "A rota de infiltração exige aptidão física militar, o que o Sensei obviamente não tem. O conselho decidiu que ele seria um peso morto e nós o deixamos na base."
41170-31 = "E, caso o pior aconteça e tenhamos que abrir fogo no caminho de volta, a presença de um civil na linha de tiro só atrapalharia."
41170-32 = "[s1] \"Foi mal por ser inútil...\"\n[s2] \"Tô aqui do rádio rezando por vocês...\""
41170-33 = "Bom, pelo menos a gente trabalha sem babá."
41170-34 = "Bom, pelo menos a gente trabalha sem babá."
41170-35 = "É-É... tem razão..."
41170-36 = "Isso mesmo. Somos apenas... nós e a nossa sorte..."
41170-37 = "Miyako, que cara de derrota é essa? Tem algo te incomodando?"
41170-38 = "N-Não. Só estava repassando as etapas do plano na cabeça."
41170-42 = "Mantenham a formação. Avançando sorrateiramente para o Ponto Sierra!"
41170-47 = "……Então é aqui que dormem todos os segredos sujos da Valkyrie."
41170-48 = "Essa porta blindada não é brincadeira. É natural, considerando a montanha de evidências criminais arquivadas lá dentro."
41170-50 = "E pra variar, não tem um mísero guarda vigiando um cofre desses."
41170-51 = "Sorte a nossa. Menos gente pra socar."
41170-52 = "……E aí, qual o atraso? Por que ninguém arromba isso de uma vez?"
41170-53 = "A tranca é uma fechadura eletrônica de alta segurança..."
41170-54 = "A Moe-chan tá suando frio lá na base tentando quebrar o código agora..."
41170-55 = "……Moe, me diz que o tempo que você tá perdendo na tranca não tá sendo descontado daqueles '30 minutos' do sistema principal."
41170-60 = "NÃO ME APRESSA QUE EU PERCO O CÓDIGO! TÔ TENTANDO ENTRAR NESSA DROGA!"
41170-61 = "Tsc. Não era mais fácil e rápido explodir as dobradiças da porta?"
41170-62 = "Olha a espessura desse aço, sua primata! Cê quer implodir o subsolo inteiro?! Se quiser se matar, vai em frente!"
41170-63 = "Mas se o alarme estourar, não vem chorar no meu colo."
41170-67 = "Ah, peguei você! Decodificando o firewall em três, dois..."
41170-73 = "……BOOYAH! Tranca liberada!"
41170-79 = "……Cê perdeu 3 minutos nisso? Que lerdeza."
41170-80 = "Pra quebrar um código de criptografia militar em 3 minutos, você tinha que me agradecer de joelhos, sua ingrata!!"
41170-81 = "Cê não faz ideia do ninho de rato cibernético que eu tive que desarmar!!"
41170-83 = "Parem de berrar no rádio! Vamos ser descobertas."
41170-84 = "O tempo está contra nós. Vamos entrar."
41170-85 = "Vasculhem tudo e encontrem as provas de lavagem de dinheiro e propina."
41170-86 = "Beleza."
41170-87 = "Eu limpo as prateleiras da direita."
41170-93 = "A-Aqui é tão escuro... me dá arrepios..."
41170-100 = "Deixa eu ver..."
41170-101 = "Segurança Pública, cadê você, sua desgraçada...?"
41170-106 = "Pasta da 'Kaiser Industry'. Histórico de transações carimbado da semana passada..."
41170-110 = "BINGO!"
41170-115 = "Excelente trabalho, Saki. Deixe-me analisar."
41170-120 = "……Confirmado."
41170-124 = "O 'Alvo Trevo' foi assegurado. A prova cabal do esquema de propina entre a 'Kaiser Industry' e o Escritório de Segurança Pública."
41170-125 = "A intuição do Sensei estava correta... O dinheiro sujo da reurbanização da Vila dos Coelhinhos pagou todo o equipamento da Kanna."
41170-126 = "[s3] \"Aquele instinto de mercado negro não falha...\"\n[s4] \"Mandaram muito bem, meninas. Foi um golpe de mestre.\""
41170-127 = "Com essa carta na manga, a gente bota a Segurança Pública no nosso bolso."
41170-128 = "Com essa carta na manga, a gente bota a Segurança Pública no nosso bolso."
41170-129 = "A gente vai fazer aquela cambada de policial corrupto engolir o próprio orgulho."
41170-137 = "Hm? Miyu, por que você tá encolhida aí na porta?"
41170-138 = "M-Meninas... eu bati a porta sem querer e ela... trancou..."
41170-139 = "……É só girar a maçaneta e abrir de novo, imbecil."
41170-140 = "E-Esse é o problema..."
41170-141 = "A porta é uma placa lisa de aço por dentro... não tem maçaneta, não tem teclado numérico... Acho que não abre por dentro..."
41170-146 = "……"
41170-148 = "Próximo Episódio: Operação Trevo (2)"