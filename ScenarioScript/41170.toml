[translation]
41170-1 = "Episódio 17: Operação Trevo (1)"
41170-4 = "Corredor da Academia Valkyrie"
41170-10 = "Aqui RABBIT1, horário 23:30. Acabamos de chegar ao Ponto Echo."
41170-11 = "Nenhum sentinela à vista. Confirmados vários equipamentos que parecem câmeras de vigilância no corredor em frente."
41170-12 = "Aqui Acampamento RABBIT. Essas câmeras já foram hackeadas, pode ignorar, OK~"
41170-13 = "Pelas imagens, não há guardas por perto. Podem ir tranquilos até o Ponto Sierra."
41170-14 = "Moe-chan, como sempre, rápida…"
41170-15 = "Kuhihi, uma segurança dessas é fichinha."
41170-16 = "…Falando nisso, não vou abusar, mas o hack só dura 30 minutos. Parece que a cada 30 minutos gera um código randômico, e este circuito está meio pesado. Então, concluam a missão em 30 minutos."
41170-17 = "Pelo jeito é aquela vice-presidente do Veritas de novo… que chatice."
41170-18 = "É a sede da Valkyrie, e mesmo assim não tem segurança? Que palhaçada."
41170-19 = "Fica tranquilo, confia em mim!"
41170-20 = "Não tava falando de você, estava falando da Valkyrie."
41170-21 = "…Inimigo ou não, é de cair o queixo. É por isso que não quero ir para a Valkyrie."
41170-22 = "Bom, de qualquer forma, o livro de registros do Bureau – o 'Trevo' – está no Ponto Sierra, terceiro subsolo. Usem a escada oeste, que tem menos movimento."
41170-23 = "…Repito, limite de 30 minutos. Conto com vocês."
41170-28 = "RABBIT1, entendido."
41170-29 = "A-aliás, e o Professor…?"
41170-30 = "Diferente da última vez, a rota de infiltração é complicada, então o Professor não vem. Por decisão da maioria, o deixamos para trás."
41170-31 = "Além disso, pode haver tiroteio se formos descobertos."
41170-32 = "[s1] \"Desculpa ser inútil…\"\n[s2] \"Vou torcer daqui…\""
41170-33 = "Bem, de certa forma, é a formação de sempre."
41170-34 = "Bem, de certa forma, é a formação de sempre."
41170-35 = "É… é verdade…"
41170-36 = "Sim. Só nós…"
41170-37 = "Miyako, que expressão é essa? Algum problema?"
41170-38 = "N-não. Só estava pensando na operação."
41170-42 = "Então, vamos com cuidado até o Ponto Sierra!"
41170-47 = "Nesta sala ficam todos os documentos da Valkyrie…"
41170-48 = "Porta robusta. Provavelmente há provas de crimes também, o que é natural."
41170-50 = "Mesmo assim, não tem segurança nenhuma."
41170-51 = "Bem, o que é fácil é bom."
41170-52 = "…Aliás, o que estamos esperando? Não vamos entrar?"
41170-53 = "Esta porta é eletrônica."
41170-54 = "A Moe-chan está tentando destrancar…"
41170-55 = "…Ei, não me diga que esse tempo está contado nos '30 minutos'?"
41170-60 = "Não fica apressando! Já estou indo o mais rápido possível!"
41170-61 = "Droga, não dá para arrombar a porta?"
41170-62 = "Com essa espessura, acha que dá? Se acha, tenta."
41170-63 = "Mas se o alarme tocar, não me responsabilizo."
41170-67 = "Ah, entendi. Se eu decodificar isso…"
41170-73 = "…Limpo!"
41170-79 = "…3 minutos. Demorou um bocado."
41170-80 = "Mas já foi bem rápido, sabia?!"
41170-81 = "Você sabe como é difícil? Fala sério!"
41170-83 = "Não é hora de brigar."
41170-84 = "Não temos muito tempo, vamos nos apressar."
41170-85 = "Procurem as provas da propina."
41170-86 = "Então,"
41170-87 = "Fico com a estante da direita."
41170-93 = "Ugh, escuro…"
41170-100 = "Ahm…"
41170-101 = "Bureau, Bureau…"
41170-106 = "'Kaiser Industry', registros de uma semana atrás…"
41170-110 = "É isto!"
41170-115 = "Boa, Saki. Posso ver?"
41170-120 = "…Entendo."
41170-124 = "'Trevo'… Provas da propina ilegal entre a 'Kaiser Industry' e o Bureau foram garantidas."
41170-125 = "Como o Professor disse, o caso da 'revitalização da Vila dos Coelhinhos' estava no meio."
41170-126 = "[s3] \"É mesmo, então…\"\n[s4] \"Bom trabalho, pessoal.\""
41170-127 = "Com este documento, poderemos impedi-los."
41170-128 = "Com este documento, poderemos impedi-los."
41170-129 = "Vamos dar uma lição naquele pessoal do Bureau."
41170-137 = "Hã? O que está fazendo, Miyu?"
41170-138 = "A-a porta… fechou…"
41170-139 = "…Se fechou, é só abrir."
41170-140 = "M-mas esta porta…"
41170-141 = "Não tem maçaneta… então talvez não dê para abrir."
41170-146 = "…Hã?!"
41170-148 = "Próximo Episódio: Operação Trevo (2)"