[translation]
1012102-1 = "海の正装ですの！"
1012102-5 = "[ruby=かでのこうじ]勘解由小路[/ruby]ユカリ！参上ですの！"
1012102-6 = "おや……？#n机の上が書類でいっぱい……。"
1012102-7 = "もしや……今日は特別お忙しい日でしたか……！？"
1012102-8 = "[s1] \"生徒の相談はいつでも歓迎だよ！\"\n[s2] \"ちょうど休憩しようと思ってたところだし。\""
1012102-11 = "なるほど……ないすたいみんぐ！ですの！"
1012102-12 = "お邪魔になっていたらどうしようかと……#n思い過ごしでよかったですわ！"
1012102-13 = "……では、改めて。"
1012102-14 = "[s3] \"琵琶と舞で悩んでるんだっけ？\"\n[s4] \"……海に行くんだよね？\""
1012102-17 = "ふふっ。身共、勘解由小路家の者として、#n最低限の教養は叩き込まれてきましたから。"
1012102-18 = "当然、海での遊び方も心得ております！"
1012102-19 = "[s] \"なるほど……？\""
1012102-20 = "小舟を出して潮風を愛でつつ、海の幸に舌鼓を打ち……。#n波の音に耳を傾けながら静かに時を過ごす――"
1012102-21 = "海で遊ぶとはこういうことですのよね！"
1012102-25 = "……あら？"
1012102-26 = "多少の違いこそあれ、毎年このような流れであったはず……。#n身共、何やら勘違いしておりますか？"
1012102-27 = "はい？いえ。百花繚乱の先輩方からは特に伺っておらず……。"
1012102-28 = "もしや先生、すでに何かお気づきですの？"
1012102-29 = "なんと！ぜひとも身共にご教示いただけませんか？"
1012102-30 = "何を着ていくつもりだったのか……#nそれはもちろん、着物を――"
1012102-35 = "先生？急にどちらへ……？"
1012102-37 = "ここは……ぶてぃっく、ですの？"
1012102-38 = "水着？いえ、用意はしておりません。"
1012102-39 = "ふふっ、おかしな事を仰るのですね。#nまるで、これから水に入るかのような――"
1012102-40 = "……え？"
1012102-41 = "入りますの？"
1012102-42 = "海に……！？"
1012102-43 = "[s5] \"あれ、海水浴は苦手？\"\n[s6] \"泳いだことなかったりする？\""
1012102-46 = "より一層、楽しみになってまいりました！"
1012102-47 = "海で泳ぐ！#nであればたしかに、水着が必要ですの！"
1012102-48 = "……。"
1012102-49 = "して、水着はどちらに？"
1012102-50 = "好きなものを選べばいい……？"
1012102-51 = "ここに並ぶもの、すべてが水着……！？"
1012102-52 = "まったく気づきませんでしたわ！#nこれほど、ばらえてぃ豊かだなんて！"
1012102-53 = "この中から一着……目移りしてしまいます……。"
1012102-54 = "ふふん～ふふっん～♪#nど～れに～いたしましょう？"
1012102-55 = "こちらの水着、ふりるがついておりますの！"
1012102-56 = "こちらは艶やかで、まるで紙細工のような美しさ！"
1012102-57 = "そして、こちらは……。"
1012102-61 = "こちらは……本当に水着ですの……？"
1012102-62 = "先生、助けてくださいまし！#nどれも素敵で一つになど絞れません！"
1012102-64 = "（しばらく悩んだ末、ユカリはついに一着の水着を選び取った）"
1012102-68 = "先生……？#n着替え終わったのですが……。"
1012102-71 = "正しく着こなせておりますでしょうか……？"
1012102-72 = "少々、布が……少ないような……？"
1012102-73 = "皆さん、こういったものを着て、海を楽しんでおられるのですね……。"
1012102-74 = "ですが、これはこれで気に入りましたわ！"
1012102-75 = "普段の装束を思えば、なんと動きやすいことでしょう！#nまるで身共に翼が生えたかのようですの！ふふっ♪"
1012102-76 = "身共、妙案を思いつきましたの！"
1012102-77 = "着慣れていないならば、慣れるまで着続ければいいだけのこと！"
1012102-78 = "つまり、本日はこのまま街を――！"
1012102-79 = "[s7] \"私はユカリを信じてたのに！\"\n[s8] \"街歩きに水着は不適切です！\""
1012102-82 = "そ、そうなんですの……？"
1012102-83 = "……。"
1012102-84 = "完璧に理解いたしました！"
1012102-85 = "たしかに、街中を水着で歩いている方はいらっしゃいません！"
1012102-86 = "名残惜しいですが、本日の「水着たいむ」はここまで、ということで。"
1012102-88 = "（その後、帰り道のユカリはずっと楽しそうにしていた）"
