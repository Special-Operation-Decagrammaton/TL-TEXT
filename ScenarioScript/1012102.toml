[translation]
1012102-1 = "É um vestido formal para o mar!"

1012102-5 = "[ruby=Kade no Kouji]Kakayukoji[/ruby]Yukari! Estou aqui!"

1012102-6 = "Oh...? #nA mesa está cheia de documentos..."

1012102-7 = "Talvez... hoje tenha sido um dia particularmente agitado...! ?"

1012102-8 = "[s1] \"Consultas de estudantes são sempre bem-vindas!\"\n[s2] \"Eu estava pensando em fazer uma pausa.\""

1012102-11 = "Entendo... Noisutaimingu! É isso!"

1012102-12 = "Eu não sabia o que fazer se estava incomodando você... #nEstou feliz por ter conseguido passar o tempo!"

1012102-13 = "...Agora então, mais uma vez."

1012102-14 = "[s3] \"Você está preocupado com Biwa e Mai?\"\n[s4] \"...Você vai para a praia, certo?\""

1012102-17 = "Hehe. Como membros da família Kakayokoji, aprendemos o nível mínimo de educação."

1012102-18 = "Claro, também sabemos brincar no mar!"

1012102-19 = "[s] \"Entendo...?\""

1012102-20 = "Pegue um pequeno barco e aproveite a brisa do mar enquanto saboreia os frutos do mar... #nPasse um tempo tranquilamente enquanto ouve o som das ondas――"

1012102-21 = "Isto é o que significa brincar no mar!"

1012102-25 = "……falta?"

1012102-26 = "Embora possa haver algumas diferenças, deveria ter sido igual todos os anos... #nVocês dois estão entendendo mal alguma coisa?"

1012102-27 = "sim? lar. Não ouvi nada dos meus veteranos em Hyakka Ryoran..."

1012102-28 = "Professor, você já notou alguma coisa?"

1012102-29 = "Oh meu Deus! Você poderia, por favor, me ensinar sobre isso?"

1012102-30 = "O que você planejava vestir...#nClaro, um quimono..."

1012102-35 = "professor? Em que direção devo ir de repente...?"

1012102-37 = "Isto é... uma boutique?"

1012102-38 = "Maiô? Não, não o preparamos."

1012102-39 = "Hehe, você está dizendo algo estranho. #nÉ como se eu estivesse prestes a entrar na água――"

1012102-40 = "……foto?"

1012102-41 = "Você está entrando?"

1012102-42 = "Para o mar...! ?"

1012102-43 = "[s5] \"Então, você não gosta de nadar no mar?\"\n[s6] \"Você nunca nadou antes?\""

1012102-46 = "Estou ansioso por isso ainda mais!"

1012102-47 = "Nade no mar! Se você é #n, definitivamente precisa de um maiô!"

1012102-48 = "……."

1012102-49 = "Então, qual maiô devo usar?"

1012102-50 = "Devo escolher o que gosto...?"

1012102-51 = "Tudo alinhado aqui é maiô...! ?"

1012102-52 = "Eu não percebi nada! #nNão acredito que tem tanta variedade!"

1012102-53 = "Um desses...não consigo parar de olhar..."

1012102-54 = "Hehehehehehehe♪#nOnde devo ir?"

1012102-55 = "Este maiô vem com babado!"

1012102-56 = "Isso é brilhante e bonito, assim como a papelada!"

1012102-57 = "E isso..."

1012102-61 = "Isso é realmente um maiô?"

1012102-62 = "Professor, por favor me ajude! #nSão todos tão maravilhosos que não consigo escolher só um!"

1012102-64 = "(Depois de pensar um pouco, Yukari finalmente escolheu um maiô.)"

1012102-68 = "professor……? #nTerminei de trocar de roupa, mas..."

1012102-71 = "Você está usando corretamente?"

1012102-72 = "Parece que não há pano suficiente...?"

1012102-73 = "Todo mundo está usando essas coisas e curtindo o mar..."

1012102-74 = "Porém, gostei deste!"

1012102-75 = "Se você pensar nas roupas que normalmente usa, como é fácil se movimentar! #nÉ como se nós dois tivéssemos asas! Hehe♪"

1012102-76 = "Todos nós tivemos uma ideia brilhante!"

1012102-77 = "Se você não está acostumado a usá-lo, continue usando até se acostumar!"

1012102-78 = "Ou seja, hoje ficaremos na cidade assim――!"

1012102-79 = "[s7] \"Eu confiei na Yukari!\"\n[s8] \"Maiôs são inadequados para passear pela cidade!\""

1012102-82 = "E-É mesmo...?"

1012102-83 = "……."

1012102-84 = "Eu entendo completamente!"

1012102-85 = "Certamente não há pessoas andando pela cidade em trajes de banho!"

1012102-86 = "Infelizmente, isso é tudo para a “Hora do Maiô” de hoje."

1012102-88 = "(Depois disso, Yukari parecia estar se divertindo no caminho para casa.)"

