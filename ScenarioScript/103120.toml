103120-23 = "6 minutos antes da colisão...! #nNão é hora de ficar brigando, está tudo bem, se apresse...!"
103120-25 = "--Alice, eu entendo."
103120-30 = "Ah, Alice...?"
103120-31 = "……."
103120-32 = "Presidente Rio, você estava em um lugar como este. #nFoi um prazer reencontrá-lo."
