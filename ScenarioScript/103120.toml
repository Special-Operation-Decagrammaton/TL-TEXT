[translation]
103120-1 = "Episódio 12; A Qualificação de \"Herói\" (1)"
103120-5 = "N-Não pode ser..."
103120-6 = "Então, contra quem diabos a gente tava lutando...!?"
103120-7 = "Reduz a velocidade da nave!#nSe a gente continuar assim, vai acabar colidindo com aquela barreira multidimensional deformada!"
103120-8 = "Se a gente bater nela sem estar sincronizada――#nA gente vai ou ser sugada para uma dimensão desconhecida, ou ser reduzida a pó. Não tem terceira opção!"
103120-9 = "E-Err... mesmo que a gente reduza a velocidade, a colisão é inevitável...!"
103120-10 = "Não tem mais nada que a gente possa fazer?"
103120-12 = "……Não tem. Aquilo não é mais ciência, se tornou um conceito.#nNão existe nenhum meio de colapsar aquele estado por enquanto..."
103120-13 = "――Exceto por um único método."
103120-14 = "……！！"
103120-15 = "Se aquilo é uma cópia do conceito da \"Arca de Atrahasis\", então a única coisa capaz de intervir naquilo é..."
103120-16 = "……A própria Arca, por ser a mesma existência."
103120-17 = "A mesma Arca...?"
103120-18 = "……！！#nNão pode ser...!"
103120-19 = "Q-Que papo é esse de repente!?#nNão tem Arca nenhuma por aqui――"
103120-20 = "Não, isso aí já é demais!!#nSe a gente fizer isso, aí é que..."
103120-21 = "Big Sister, você realmente não tem jeito mesmo――!"
103120-23 = "6 minutos para a colisão...!#nNão é hora de ficar brigando, deem um jeito de fazer qualquer coisa, rápido...!"
103120-25 = "――Aris, eu entendi."
103120-30 = "A-Aris...?"
103120-31 = "……。"
103120-32 = "Presidente Rio, então você estava aí.#nFico feliz de poder te ver de novo."
103120-34 = "Aris-chan..."
103120-35 = "Hã, Presidente!?#nE que papo é esse de mandar um drone sem aparecer pessoalmente!?"
103120-37 = "……Aris,"
103120-38 = "Eu――"
103120-39 = "Sim, eu sei."
103120-40 = "Nessa situação――precisamos do poder da Aris, a \"Princesa dos Deuses Sem Nome\", certo."
103120-42 = "M-Mas Aris-chan...!"
103120-43 = "N-Não faz isso, Aris!!"
103120-44 = "Se acontecer aquela coisa de novo――"
103120-45 = "Aris-chan...!"
103120-46 = "[s] \"Pessoal, se acalmem um pouco.\""
103120-48 = "……。"
103120-52 = "[ns] \"Vamos ouvir o que a Aris tem a dizer até o fim.\""
103120-55 = "U-Uhum..."
103120-56 = "Aris-chan... pode falar tudo o que você quer dizer."
103120-62 = "Sim――Momoi, Midori, Yuzu."
103120-63 = "E Yuuka, Himari-senpai, Presidente Rio."
103120-64 = "……Sensei."
103120-65 = "O Sensei disse que eu mesma posso decidir quem eu quero ser."
103120-66 = "A Aris é a \"Princesa dos Deuses Sem Nome\", membro do \"Departamento de Desenvolvimento de Jogos\"――#nSou uma \"aluna da Millennium\", e uma \"aluna da Schale\"."
103120-67 = "A Aris é... uma \"Rei Demônio\" e uma \"Heroína\"."
103120-68 = "……A Aris é a \"Aris\" que ela mesma deseja ser."
103120-69 = "Por isso, como a \"Princesa dos Deuses Sem Nome\"..."
103120-73 = "Eu vou pedir um favor para a \"Key\"."
103120-75 = "……！！"
103120-77 = "Se a \"Arca de Atrahasis\" que está dentro da Aris puder resolver a crise atual..."
103120-78 = "Se isso for salvar o mundo..."
103120-79 = "A \"Arca de Atrahasis\" deixa de ser uma arma que destrói o mundo――#ne passa a ser a arma de um herói que salva o mundo."
103120-80 = "Aris, isso é..."
103120-81 = "Se isso puder salvar o mundo, é o que a Aris deseja."
103120-82 = "Assim, a Himari-senpai não vai mais precisar odiar a Presidente Rio."
103120-83 = "E a Presidente Rio não vai mais precisar se odiar, nem se esconder."
103120-84 = "A mim mesma...?"
103120-85 = "……Aris."
103120-86 = "Esse é o..."
103120-87 = "A missão de um \"Herói\"."
103120-89 = "Não... você não vai."
103120-90 = "Quando a Nave Principal de Utnapishtim foi ativada, o motivo de você ter saído ilesa por um milagre foi..."
103120-91 = "Porque aquele \"adulto\" assumiu todas as consequências e feridas."
103120-92 = "Mas isso também deve chegar ao fim em breve.#nAquele adulto não aguentará os ferimentos e chegará ao fim da sua vida."
103120-93 = "Nessas condições, se você tentar gerar a \"Arca\" novamente――"
103120-94 = "Isso vai..."
103120-95 = "……"
103120-96 = "Princesa, você..."
103120-107 = "Key."
103120-108 = "Princesa... Não faça isso. Se você reiniciar o protocolo da Arca aqui, você――"
103120-109 = "Key... me desculpa."
103120-110 = "……Por quê?"
103120-112 = "Eu queria pedir desculpas para você."
103120-113 = "Eu não conseguia entender você, Key, então eu te rejeitei e virei as costas...#nEu tentei fugir de você."
103120-114 = "Eu estava com medo de você... eu tinha medo...#nEu não deveria ter virado as costas..."
103120-115 = "Mesmo que eu não conseguisse entender, eu deveria ter enfrentado você."
103120-117 = "……"
103120-119 = "Como a Aris não sabe muito sobre a Key, tentei me colocar no seu lugar."
103120-120 = "Se a sua razão de existir é ser a \"Chave\" que leva o mundo à destruição...#nImagino que deva ter sido doloroso..."
103120-123 = "Foi por isso que a Aris pensou que você também devia estar sofrendo esse tempo todo."
103120-125 = "Princesa, eu――"
103120-127 = "O Sensei me ensinou que eu mesma posso decidir quem eu quero ser."
103120-130 = "Você também pode se tornar quem você deseja ser, Key.#nNão precisa da permissão de ninguém."
103120-132 = "……"
103120-134 = "Por isso, a Aris acha que \"Key\" é um nome muito bonito."
103120-135 = "É um nome que eu li por engano... igual ao nome da Aris."
103120-136 = "Não tem nenhum motivo, propósito ou significado especial por trás disso."
103120-138 = "……Então você quer que eu, uma existência que leva o mundo à destruição,#nnão sofra mais?"
103120-139 = "Você quer me salvar?#n...É isso, Princesa?"
103120-141 = "……A Aris não sabe se é alguém capaz de salvar outra pessoa."
103120-142 = "A Aris é só uma \"Heroína aprendiz\"... Mas,"
103120-145 = "Eu acredito que o sentimento de querer salvar alguém... é o que qualifica um \"Herói\"."
103120-147 = "……"
103120-156 = "…………Inicializando."
103120-157 = "A-Aris...?"
103120-158 = "O quê!? Aris-chan...!?"
103120-159 = "Aris... não, será que essa é a <Key>...?"
103120-160 = "……Não, espera aí."
103120-161 = "……Codinome \"AL-1S\" inicializado."
103120-162 = "Executando protocolo ATRAHASIS."
103120-163 = "A-Aris..."
103120-164 = "S-Será que dá pra confiar...?"
103120-165 = "……。"
103120-170 = "[ns] \"Vai dar tudo certo――vamos confiar na Aris.\""
103120-174 = "A-Aris-chan...!?"
103120-175 = "……É você mesma, Aris-chan?"
103120-176 = "Sim. A Aris está bem."
103120-177 = "……Isso significa que você submeteu a <Key> dos \"Deuses Sem Nome\"?"
103120-178 = "……Não, não foi submissão――"
103120-179 = "Sim. A Key atendeu ao pedido da Aris."
103120-180 = "……?"
103120-181 = "Mas eu não consigo fazer isso sozinha. Agora, a Aris precisa do poder de todo mundo..."
103120-182 = "E do poder da Presidente Rio."
103120-183 = "D-Do meu...?"
103120-187 = "Por favor, apareça, Rio-senpai."
103120-188 = "Tsc... E-Eu..."
103120-197 = "……。"
103120-198 = "……Aris, eu queria te ver."
103120-201 = "Você parece estar mais magra do que antes. Tá dormindo direito?"
103120-202 = "Aris, eu..."
103120-203 = "……Eu..."
103120-204 = "……Por escolha própria, eu te..."
103120-206 = "Rio-senpai... não precisa se desculpar com a Aris."
103120-207 = "……Claro, sei que você não vai me perdoar..."
103120-208 = "――Não precisa me perdoar."
103120-209 = "Porque... companheiras conseguem entender o que a outra sente, mesmo sem precisar dizer uma palavra."
103120-213 = "Eu..."
103120-214 = "Sua... \"companheira\"...?"
103120-215 = "Sim. A Rio-senpai é companheira da Aris."
103120-216 = "Afinal, a Rio-senpai ajudou o Sensei, a Himari-senpai... e todo mundo. Então, agora somos \"companheiras\"."
103120-217 = "M-Mas eu..."
103120-218 = "Tudo bem."
103120-219 = "É muito comum que vilões do início da história se tornem aliados depois.#nOuvi dizer que esse é o caminho de todo herói. Então, tá tudo bem."
103120-223 = "A Rio-senpai é quem mais se esforçou de todo mundo para proteger este mundo."
103120-224 = "Eu queria dizer para uma pessoa incrível como você... \"Obrigada por se tornar companheira da Aris\"."
103120-226 = "……Eu..."
103120-227 = "Tsc... Eu..."
103120-228 = "……。"
103120-234 = "Então... vamos nessa!"
103120-235 = "A partir de agora é o meu turno!!"
103120-236 = "Aris-chan! Boa sorte!!"
103120-237 = "Aris, faz favor, explode esse castelo do Rei Demônio!!"
103120-238 = "Aris-chan... por favor...!!"
103120-249 = "……。"
103120-251 = "Executando busca global para garantir recursos disponíveis conectados à AL-1S."
103120-253 = "Expandindo área de recursos."
103120-255 = "Recurso encontrado: Verificando recursos totais da \"Utnapishtim\"――99,99 milhões de exabytes de dados."
103120-261 = "………Protocolo ATRAHASIS ativado agora."
103120-263 = "Iniciando processo de ativação do codinome \"Arca de Atrahasis\"."
103120-266 = "A princesa pegou a chave, e a arca está preparada."
103120-271 = "A Princesa dos Deuses Sem Nome, AL-1S, autoriza――a descida de um Novo Santuário aqui――――!"
