103120-1 = "Episódio 12; Qualificações de “Herói” (1)"
103120-5 = "Isso mesmo..."
103120-6 = "Então contra quem estamos lutando...? ?"
103120-7 = "Por favor, diminua a velocidade do navio de guerra! #nNesse ritmo, colidiremos com essa barreira multidimensional deformada!"
103120-8 = "Se eles colidirem num estado em que não estejam mais ligados, temos duas opções: ou somos levados para uma dimensão desconhecida ou somos feitos em pedaços!"
103120-9 = "Ah, hum... mesmo que você reduza a velocidade, uma colisão é inevitável...!"
103120-10 = "Há mais alguma coisa que eu possa fazer?"
103120-12 = "...Não há. Tornou-se uma espécie de conceito, não uma ciência. #nAtualmente não há como destruir essa situação..."
103120-13 = "--Exceto por um método."
103120-14 = "...! !"
103120-15 = "Se isso é uma cópia do conceito da “Arca de Atla Hasith”, quem pode intervir nisso..."
