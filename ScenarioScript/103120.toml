103120-48 = "……."
103120-52 = "[ns] \"Vamos ouvir as palavras de Alice até o fim.\""
103120-55 = "Ah, sim..."
103120-56 = "Alice-chan...Eu quero que você me conte tudo o que você quer dizer."
103120-62 = "Sim --- Momoi, Midori e Yuzu."
103120-63 = "E Yuuka, Himari-senpai e o Presidente Rio."
103120-64 = "……sensei."
103120-65 = "A professora disse a Alice que ela poderia decidir quem ela queria ser."
103120-66 = "Alice é a ``Princesa dos Deuses Sem Nome'' e membro do ``Departamento de Desenvolvimento de Jogos'' - #n ``Estudante do Millennium'' e ``Estudante da Placa de Petri.''"
103120-67 = "Alice é... o \"Rei Demônio\" e o \"Herói\"."

