103120-40 = "Esta situação requer o poder de Alice, a “princesa sem nome dos deuses”."
103120-42 = "Mas, Alice-chan...!"
103120-43 = "Não, não, Alice! !"
103120-44 = "Algo assim aconteceu novamente..."
103120-45 = "Alice-chan...!"
