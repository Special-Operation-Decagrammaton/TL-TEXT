[translation]
103120-1 = "第12話;「勇者」の資格（１）"
103120-5 = "そん、な……"
103120-6 = "では、私たちが戦っている相手は一体……！？"
103120-7 = "戦艦のスピードを落としてちょうだい！#nこのままでは、あの変形した多次元バリアに衝突してしまうわ！"
103120-8 = "連動しなくなってしまった状態で衝突すれば――#n私たちは未知の次元に取り込まれるか、そのまま粉々になるかの二択よ！"
103120-9 = "あ、あの……スピードを落としたとしても、衝突は避けられません……！"
103120-10 = "何か他に手立ては無いのでしょうか。 "
103120-12 = "……無いわ。あれは科学ではなく、一種の概念と化している。#nあの状態を瓦解させる手段は、現状存在し得ない……"
103120-13 = "――ただ一つの方法を、除いて。"
103120-14 = "……！！"
103120-15 = "あれが「アトラ・ハシースの箱舟」という概念をコピーしたものであるのなら、あれに介入できるのは……"
103120-16 = "……同一存在である、[ruby=・   ・]箱舟[/ruby]だけでしょうね。"
103120-17 = "同一の、箱舟……？ "
103120-18 = "……！！#nまさか……！"
103120-19 = "い、いきなり何の話！？#n箱舟なんてどこにも――"
103120-20 = "いえ、それだけはいけません！！#nこれ以上そんな事をしてしまえば……"
103120-21 = "ビッグシスター、あなたという人は、本当に――！"
103120-23 = "衝突6分前……！#nケンカしている場合じゃありません、なんでもいいですから、早く……！"
103120-25 = "――アリス、理解しました。 "
103120-30 = "あ、アリス……？"
103120-31 = "……。 "
103120-32 = "リオ会長、こんな所にいたんですね。#nもう一度会えて、よかったです。"
103120-34 = "アリスちゃん……"
103120-35 = "えっ、会長！？#nというか、姿を見せないでドローンを送るってどういう事！？"
103120-37 = "……アリス、"
103120-38 = "私は――"
103120-39 = "はい、分かっています。"
103120-40 = "この状況は――「名もなき神々の王女」であるアリスの力が、必要なんですよね。"
103120-42 = "で、でもアリスちゃん……！ "
103120-43 = "だ、ダメだよアリス！！"
103120-44 = "またあんな事に――"
103120-45 = "アリスちゃん……！"
103120-46 = "[s] \"みんな、少し落ち着いて。\""
103120-48 = "……。 "
103120-52 = "[ns] \"アリスの言葉を、最後まで聞こう。\""
103120-55 = "う、うん……"
103120-56 = "アリスちゃん……言いたいこと、全部話してほしいな。"
103120-62 = "はい――モモイ、ミドリ、ユズ。"
103120-63 = "そしてユウカ、ヒマリ先輩、リオ会長。"
103120-64 = "……先生。"
103120-65 = "先生は、アリスのなりたい存在はアリスが決めていい、と言いました。"
103120-66 = "アリスは「名もなき神々の王女」で、「ゲーム開発部」のメンバーで――#n「ミレニアムの生徒」で、「シャーレの生徒」です。"
103120-67 = "アリスは……「魔王」で「勇者」です。 "
103120-68 = "……アリスは、アリスが望んでいる「アリス」です。 "
103120-69 = "だから「名もなき神々の王女」として……"
103120-73 = "「ケイ」にお願いをします。 "
103120-75 = "……！！"
103120-77 = "アリスの中にある「アトラ・ハシースの箱舟」で……今の危機を解決できるのなら、 "
103120-78 = "それで――世界を、救えるのなら、 "
103120-79 = "「アトラ・ハシースの箱舟」は、世界を滅亡させる兵器ではなく――#n世界を救う、勇者の武器になれます。"
103120-80 = "アリス、それは……"
103120-81 = "それで世界を救えるのなら、アリスはそれを望みます。 "
103120-82 = "そうすれば、ヒマリ先輩はこれ以上リオ会長を恨まなくて良くなります。"
103120-83 = "そしてリオ会長は、自分自身を恨まなくて良くて、隠れる必要もなくなります。"
103120-84 = "私、自身を……？"
103120-85 = "……アリス。"
103120-86 = "それがアリスの――"
103120-87 = "「勇者」の、使命ですから。"
103120-89 = "いいえ……なりません。"
103120-90 = "ウトナピシュティムの本船が起動した時、あなたが奇跡的に無事でいられたのは……"
103120-91 = "全ての報いと、その傷を――あの「大人」が被ったからです。"
103120-92 = "ですが、それも間もなく終わりを迎えるでしょう。#nあの大人は傷に耐えきれず、生を終えることでしょう。"
103120-93 = "そのような状況で、再び「箱舟」を生成するとなれば――"
103120-94 = "それは……"
103120-95 = "……"
103120-96 = "王女よ、あなたは……"
103120-107 = "ケイ。"
103120-108 = "王女……なりません。ここで箱舟のプロトコルを再起動したら、あなたは――"
103120-109 = "ケイ……ごめんなさい。 "
103120-110 = "……何故ですか？"
103120-112 = "あなたに、謝りたかったんです。 "
103120-113 = "アリスはケイを理解できなかったから、拒絶して、目を背けました……#nケイから逃げようとしました。"
103120-114 = "ケイのことが怖くて、恐れていました……#n目を背けるべきではなかったのに……"
103120-115 = "理解できないとしても……ケイと向き合うべきでした。"
103120-117 = "……"
103120-119 = "アリスはケイのことをよく知らないので、ケイの立場になって考えてみたのです。"
103120-120 = "世界を滅亡に導く「鍵」であることが、ケイの存在理由なら……#nきっと、苦しかったと思います……"
103120-123 = "だから、ケイもずっと苦しかったんじゃなかったのかな、とアリスは考えました。"
103120-125 = "王女よ、私は――"
103120-127 = "自分のなりたい存在は、自分で決めていい、と先生が教えてくれました。 "
103120-130 = "ケイも、ケイが望む存在になることができます。#n誰かに許可をもらう必要もありません。 "
103120-132 = "……"
103120-134 = "だからアリスは「ケイ」という名前、とても良い名だと思います。 "
103120-135 = "ケイは、間違えて読んでしまった名前です……アリスの名前みたいに。"
103120-136 = "そこには特別な理由も、目的も、意味もありません。"
103120-138 = "……だから、世界を滅亡させる私という存在が、#nこれ以上苦しまないでほしいと考えているのですか？"
103120-139 = "私を、助けたいと？#n……そういうことなのでしょうか、王女よ。 "
103120-141 = "……アリスは、アリスが誰かを助けられるような存在なのかは分かりません。"
103120-142 = "アリスは「見習い」勇者ですから……でも、 "
103120-145 = "誰かを助けたいと思う気持ちこそ――#n「勇者」の資格であると、信じています。"
103120-147 = "……"
103120-156 = "…………起動開始。"
103120-157 = "あっ、えっ、アリス？"
103120-158 = "わっ！？アリスちゃん……！？"
103120-159 = "アリス……いえ、これは＜Key＞……？"
103120-160 = "……いえ、待ってちょうだい。"
103120-161 = "……コードネーム「AL-1S」起動完了。"
103120-162 = "プロトコルATRAHASISを実行します。"
103120-163 = "あ、アリス……"
103120-164 = "だ、大丈夫なのかな？"
103120-165 = "……。"
103120-170 = "[ns] \"大丈夫――アリスを信じよう。\""
103120-174 = "あ、アリスちゃん……！？ "
103120-175 = "……アリスちゃんなんだよね？"
103120-176 = "はい。アリスは大丈夫です。 "
103120-177 = "……ということは、「名もなき神」の＜Key＞を服従させたのね？"
103120-178 = "……いえ、これは服従ではなく―― "
103120-179 = "はい。ケイがアリスのお願いを聞いてくれました。"
103120-180 = "……？"
103120-181 = "でも、アリス一人ではできません。#n今のアリスには、みんなの力が……"
103120-182 = "そして、リオ会長の力が必要です。"
103120-183 = "わ、私の……？"
103120-187 = "顔を見せてください、リオ[ruby=・   ・]先輩[/ruby]。"
103120-188 = "っ……わ、私は……"
103120-197 = "……。"
103120-198 = "……アリスは、リオ先輩と会いたかったです。 "
103120-201 = "なんだか、前よりも痩せたように見えます。ちゃんと寝ていますか？"
103120-202 = "アリス、私は……"
103120-203 = "……私、は、 "
103120-204 = "……自らの選択で、貴女を――"
103120-206 = "リオ先輩……アリスに謝らなくても大丈夫です。"
103120-207 = "……もちろん、貴女は私を許さないでしょうけれど……"
103120-208 = "――許す必要はありません。"
103120-209 = "なぜなら……仲間同士は、言葉にしなくても気持ちが伝わるものですから。"
103120-213 = "私が……"
103120-214 = "貴女の……「仲間」……？"
103120-215 = "はい。リオ先輩は、アリスの仲間です。 "
103120-216 = "リオ先輩はこうして先生やヒマリ先輩……それに、みんなを助けているのですから。だから、アリスたちはもう「仲間」です。"
103120-217 = "で、でも私は……貴女を…… "
103120-218 = "大丈夫です。"
103120-219 = "序盤のボスが、後半で仲間になるのはよくあることです。#nお約束の展開だって聞きました。だから、大丈夫です。 "
103120-223 = "リオ先輩は、この世界を守るために、誰よりも頑張った人です。"
103120-224 = "そんなすごい人に……「アリスの仲間になってくれてありがとう」、と伝えたかったんです。"
103120-226 = "……私は、 "
103120-227 = "っ……私は……貴女を…… "
103120-228 = "……。 "
103120-234 = "では……始めます！"
103120-235 = "ここからはアリスのターンです！！"
103120-236 = "アリスちゃん！頑張って！！"
103120-237 = "お願いアリス、魔王城をぶっ飛ばして！！"
103120-238 = "アリスちゃん……お願い……！！"
103120-249 = "……。"
103120-251 = "AL-1Sに接続された利用可能なリソースを確保するため、全体検索を実行。"
103120-253 = "リソース領域の拡大。"
103120-255 = "リソース名、「ウトナピシュティム」の全体リソース――9999万エクサバイトのデータを確認。"
103120-261 = "………現時刻をもって、プロトコルATRAHASIS稼動。"
103120-263 = "コード名「アトラ・ハシースの箱舟」起動プロセスを開始します。"
103120-266 = "王女は鍵を手に入れ、箱舟は用意された。"
103120-271 = "名もなき神々の王女、AL-1Sが承認します――ここに、[ruby=サンクトゥム]新たな聖域が舞い[/ruby]降りん――――！"
103120-279 = "???"
103120-280 = "＜＜＜私の…………＞＞＞"
103120-283 = "???"
103120-284 = "＜＜＜私の大切な…………＞＞＞"
103120-287 = "???"
103120-288 = "＜＜＜私の大切な…………よ。＞＞＞"
103120-292 = "???"
103120-293 = "＜＜＜私の大切な…………アリス＞＞＞"
103120-297 = "ケイ"
103120-298 = "＜＜＜私の大切な…………アリス＞＞＞"
103120-305 = "次回;「勇者」の資格（２）"
