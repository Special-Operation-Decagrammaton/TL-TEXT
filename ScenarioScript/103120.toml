103120-214 = "Seu… “companheiro”…?"
103120-215 = "sim. Rio-senpai é amiga de Alice."
103120-216 = "É assim que Rio-senpai ajuda sua professora, Himari-senpai... e todos os outros. É por isso que Alice e os outros agora são amigos."
103120-217 = "Mas eu... você..."
103120-218 = "tudo bem."
103120-219 = "É comum que chefes nos estágios iniciais se tornem aliados nos estágios posteriores. #nOuvi dizer que era um desenvolvimento prometido. Então, está tudo bem."
103120-223 = "Rio-senpai é uma pessoa que trabalhou mais duro do que qualquer outra pessoa para proteger este mundo."
103120-224 = "Eu queria dizer para uma pessoa tão incrível... ``Obrigado por ser amigo de Alice.''"
103120-226 = "……EU,"
