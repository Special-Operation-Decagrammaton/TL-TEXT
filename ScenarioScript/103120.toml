103120-109 = "Kei... me desculpe."
103120-110 = "……por que é que?"
103120-112 = "Eu queria me desculpar com você."
103120-113 = "Alice não conseguia entender Kei, então ela o rejeitou e se afastou...#nEla tentou fugir de Kei."
103120-114 = "Eu estava com medo e com medo do Kei...#nEu não deveria ter me afastado..."
103120-115 = "Mesmo que ele não entendesse... ele deveria ter enfrentado Kei."
103120-117 = "None"
103120-119 = "Alice não conhece Kei muito bem, então ela tenta se colocar no lugar de Kei."
103120-120 = "Se a razão da existência de Kei é ser a “chave” que leva à destruição do mundo...#nTenho certeza que deve ter sido doloroso..."
103120-123 = "Então, pensou Alice, talvez Kei devesse ter sentido dor o tempo todo."
103120-125 = "Princesa, eu-"
103120-127 = "Meu sensei me ensinou que posso decidir por mim mesmo quem quero ser."
103120-130 = "Kei também pode ser o que Kei quer ser. #nVocê não precisa da permissão de ninguém."
103120-132 = "None"
103120-134 = "É por isso que acho que o nome de Alice, “Kei”, é um nome muito bom."
103120-135 = "Kei é um nome que li incorretamente... assim como o nome de Alice."
103120-136 = "Não há nenhuma razão, propósito ou significado específico para isso."
103120-138 = "...É por isso que você pensa que eu, a pessoa que vai destruir o mundo, não quero que você sofra mais?"
103120-139 = "Você quer me ajudar? #n...É isso que você quer dizer, princesa?"
103120-141 = "...Não sei se Alice é o tipo de pessoa que pode ajudar alguém."
