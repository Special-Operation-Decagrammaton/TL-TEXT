103120-79 = "A ``Arca de Atlas Hasith'' não é uma arma que destruirá o mundo, mas uma arma dos bravos que salvará o mundo."
103120-80 = "Alice, isso é..."
103120-81 = "Se isso significa salvar o mundo, Alice quer."
103120-82 = "Se fizermos isso, Himari-senpai não terá mais que guardar rancor do Presidente Rio."
