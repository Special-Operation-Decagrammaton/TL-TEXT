[translation]
90001065-3 = "防衛突破！トキ、お願い！"
90001065-4 = "はい。遠くへ離れてください。"
90001065-12 = "施設の破壊を確認……！妨害電波が止まりました！"
90001065-16 = "ようやく回線が繋がったわ。大丈夫かしら？"
90001065-17 = "ええ、無事です。"
90001065-18 = "AMASの制御権も戻ったわ。"
90001065-19 = "リオ様のトレーラーも動き出しました。良かったです。"
90001065-20 = "貴方達のいるその場所は……？"
90001065-23 = "ジャミングされてる間に移動したんだ。妨害電波を出す施設があってね。"
90001065-24 = "それを破壊したら……その奥に大きな建物が見えてきたの。"
90001065-25 = "……氷河だけではなく、陸上の……こんな場所に？"
90001065-26 = "これは……まさか……。"
90001065-27 = "何か気付いたのですか、リオ？"
90001065-32 = "今断言するのは難しいわ。"
90001065-33 = "けれど、一つだけ確かなのは……この地域で採掘された資源量は、私がこれまで調査していた預言者――"
90001065-34 = "氷河地域で採掘していた船の預言者が獲得した量を上回っているわ。"
90001065-35 = "そこには意味があるはずよ。理由もなく大量の資源を採取するわけがないもの。"
90001065-36 = "こんなに……一体何に使うつもりなのかしら？"
90001065-37 = "もしかしたら……。"
90001065-39 = "（自分たちの王国でも作るつもりで……？）"
90001065-43 = "……これからどうすれば良いのでしょう？"
90001065-44 = "[s] \"……この施設を探索しよう。\""
90001065-45 = "危険ではありませんか？"
90001065-46 = "でも、さっきよりはマシなんじゃない？#n通信も繋がったし。"
90001065-47 = "ええ。私たちの目的は、現場の探索と預言者の追跡ですから。"
90001065-48 = "また敵兵が現れたら、倒せばいいだけです。私は最強のメイドであり、秘密エージェントですから。"
90001065-49 = "……なんだか不吉の前兆のような物言いですね。"
90001065-50 = "……分かりました。こんな何もない凍原地帯にこれだけの施設を建設するなんて。"
90001065-51 = "それだけで調査する価値はあると思います。"
90001065-52 = "リオの言う通り、私たちが調べてきた情報と違う状況になっているようですし。"
90001065-53 = "はぁ……そう言うと思った……。"
90001065-54 = "ヒマリ部長はそういう方ですから。"
90001065-55 = "最近、私に対して誤解を生むような表現が増えている気がしますが……。"
90001065-59 = "まあいいでしょう。#nそれでは皆さん、探索を続けましょう。"
90001065-61 = "次回;探索"
