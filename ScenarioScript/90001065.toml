[translation]
90001065-3 = "Defesa rompida! Toki, por favor!"
90001065-4 = "Entendido. Por favor, afastem-se."
90001065-12 = "Confirmo a destruição das instalações...! A interferência de rádio parou!"
90001065-16 = "Finalmente a conexão foi restabelecida. Vocês estão bem?"
90001065-17 = "Sim, estamos bem."
90001065-18 = "O controle do AMAS também retornou."
90001065-19 = "O trailer da Rio-sama também começou a se mover. Que bom."
90001065-20 = "Onde exatamente vocês estão...?"
90001065-23 = "Nós nos movemos enquanto estávamos sob interferência. Havia uma instalação emitindo o sinal de bloqueio."
90001065-24 = "Depois que a destruímos... um prédio enorme apareceu logo atrás."
90001065-25 = "...Não apenas geleiras, mas em terra firme... em um lugar como este?"
90001065-26 = "Isso é... não pode ser..."
90001065-27 = "Você notou algo, Rio?"
90001065-32 = "É difícil afirmar agora."
90001065-33 = "Mas uma coisa é certa... a quantidade de recursos extraídos nesta região supera o que o Profeta que eu estava investigando até agora—"
90001065-34 = "Supera a quantidade obtida pelo Profeta do navio que estava minerando na região glacial."
90001065-35 = "Deve haver um significado nisso. Eles não coletariam tantos recursos sem um motivo."
90001065-36 = "Tanto assim... para que será que eles pretendem usar tudo isso?"
90001065-37 = "Talvez..."
90001065-39 = "(Será que eles pretendem construir o próprio reino...?)"
90001065-43 = "...O que devemos fazer agora?"
90001065-44 = "[s] \"...Vamos explorar esta instalação.\""
90001065-45 = "Não é perigoso?"
90001065-46 = "Mas não é melhor do que antes?#nA comunicação foi restabelecida."
90001065-47 = "Sim. Nosso objetivo é explorar o local e rastrear o Profeta."
90001065-48 = "Se inimigos aparecerem novamente, basta derrotá-los. Afinal, sou a empregada mais forte e uma agente secreta."
90001065-49 = "...Isso soa como um presságio de má sorte."
90001065-50 = "...Entendido. Construir uma instalação desse porte em uma zona de tundra desolada como esta."
90001065-51 = "Só por isso, já acho que vale a pena investigar."
90001065-52 = "Como a Rio disse, a situação parece ser diferente das informações que coletamos até agora."
90001065-53 = "Ah... eu sabia que você diria isso..."
90001065-54 = "A diretora Himari é desse jeito mesmo."
90001065-55 = "Sinto que ultimamente você tem usado expressões que geram mal-entendidos sobre mim..."
90001065-59 = "Bem, tudo bem.#nEntão, pessoal, vamos continuar a exploração."
90001065-61 = "Próximo; Exploração"
