[translation]
1012103-1 = "百花繚乱に恥じぬよう"
1012103-2 = "（ユカリと待ち合わせしたプールに到着した）"
1012103-3 = "（あたりを見回すと……）"
1012103-5 = "百鬼夜行近くのプール前"
1012103-9 = "（連日の猛暑の影響か、プールの外なのに、既に大勢の人で賑わっている）"
1012103-10 = "先生！こちらですわ！"
1012103-14 = "身共はこっちですわ！"
1012103-18 = "こうも混雑していますと、はぐれてしまいそうですの……。"
1012103-19 = "せ、先生……少しだけ袖に掴まってもよろしいでしょうか……？"
1012103-20 = "よろしいんですの！？#n……では、えいっ！"
1012103-25 = "ふふっ。これで、もう安心ですわ。"
1012103-26 = "さて……うぉーたーぱーく――"
1012103-27 = "聞きしに勝る、実に素晴らしい場所……！"
1012103-28 = "[s1] \"まだ入口だけどね。\"\n[s2] \"中に入ったらもっと驚くよ。\""
1012103-31 = "本当に大切なものとは、目に見えずとも感じ取れるものです。"
1012103-32 = "皆さまの楽しそうなお顔。これこそが何よりの証拠ですもの！"
1012103-33 = "先生、こうしている場合ではありません！"
1012103-34 = "さあ！参りましょう！"
1012103-36 = "わぁ……！#n先生、ご覧くださいまし！"
1012103-37 = "皆さん水着姿でいらっしゃいますわ！"
1012103-38 = "[s3] \"びしょ濡れになっちゃうからね。\"\n[s4] \"ユカリも、水着似合ってるよ。\""
1012103-41 = "普段とは異なる装いで、特別な時間を楽しむ――"
1012103-42 = "お祭りみたいですのね！"
1012103-43 = "普段は[ruby=もっぱ]専[/ruby]ら、百花繚乱のお務めで主催側のことが多いですが――"
1012103-44 = "ざわざわ……。"
1012103-48 = "あら……？気のせいでしょうか。#n何やら雰囲気が変わったような……？"
1012103-49 = "皆さん、出口に向かっておられます。#nまさか、中で何か事故でも……？"
1012103-53 = "ご来場の皆様に、繰り返しご連絡いたします。#n誠に申し訳ございませんが、本日は営業を終了いたします。"
1012103-54 = "ご利用中のお客様はプールから上がり、#n速やかにご退場くださいますようお願い申し上げます。  "
1012103-55 = "こ、これは一体どういうことですの……！？"
1012103-56 = "閉園までは、まだ時間があるはずなのに……？"
1012103-57 = "最近は大人しいと思っておりましたが……お嬢様も世話の焼ける方ですね。"
1012103-61 = "ですが、心配には及びません。#nこのプールは貸し切りにしましたので。"
1012103-62 = "あなたは……！どうしてここに……！？"
1012103-63 = "貸し切りとはどういうことですの！？"
1012103-64 = "いささか急なお願いではありましたが……#n話の分かるオーナー様でよかったです。"
1012103-65 = "[ruby=かでのこうじ]勘解由小路[/ruby]家の名声があってこそ、でしょうか。"
1012103-66 = "家の名を使ってまで……？#n[ruby=かよう]斯様[/ruby]なこと、身共は望んでおりませんわ！"
1012103-67 = "なりません！これは家の名誉に関わる問題！#n勘解由小路家の令嬢が、衆目の中で肌を晒すなど許されません！"
1012103-68 = "もちろん、先生は例外です。多大なるご恩もございますし――"
1012103-69 = "何より、お嬢様のご意向もありますので……。"
1012103-70 = "気兼ねなく、このひと時をご堪能下さいませ！"
1012103-71 = "[s] \"ありがとうございます……？\""
1012103-73 = "先生と二人きり。#nこれは、身共が密かに願い続けてきたことではありますが……。"
1012103-74 = "では、私はすぐに退散しますので、後はどうぞごゆっくり……。#nおほほほほ。"
1012103-76 = "えぇ～っ！今日はプール入れないの！？"
1012103-77 = "昨日からずっと楽しみにしてたのに！"
1012103-78 = "ほらほら泣かないの。また今度来ようね。"
1012103-81 = "先生。"
1012103-82 = "身共は、先生と過ごすひと時を――先生のことを思うと、#n心が弾み、胸が高鳴ります。"
1012103-83 = "それはきっと、身共にとって誇らしく、#nかけがえのないものだから。"
1012103-87 = "ですので、先生。"
1012103-88 = "[s5] \"うん、言いたいことはわかったよ。\"\n[s6] \"ユカリのやりたいようにやってごらん。\""
1012103-91 = "身共は……己が幸せのために、他者を不幸にするなど――"
1012103-92 = "たとえ家の意向であっても……いえ。勘解由小路家の者だからこそ！#n身共の信念に反しますの！"
1012103-93 = "そこまでおっしゃるのであれば仕方ありません……。#nですが、プールの利用はご遠慮願います。それで構いませんね？"
1012103-94 = "それで皆さんが笑顔になるのなら。"
1012103-95 = "承知いたしました。#n……どうしてそこまで。"
1012103-99 = "先生、申し訳ございません。"
1012103-100 = "家の事情でこのようなことに……。"
1012103-101 = "あら？先生、何を見て……。"
1012103-105 = "ご来場の皆様にご連絡いたします。#n本日の営業は通常通り継続させていただくこととなりました。"
1012103-106 = "混乱を招いたお詫びとして、本日は無料開放といたします！#nすでに入場料をお支払いいただいたお客様には、カウンターにて返金対応をいたします！"
1012103-107 = "どうせ貸切料は払われてるし……それよりも評判を回復しないと……！#nえっ？あっ！マイクのスイッチが……！"
1012103-108 = "えっ、何だったんだ？#n偉い人が来るんじゃなかったのか……？"
1012103-109 = "なんだっていいじゃん！無料だって！行こ行こ！"
1012103-111 = "わーい！プールに入れるんだって！"
1012103-112 = "早くスライダーの列に並ぼっ！"
1012103-116 = "こらこら、走ると危ないよ～！"
1012103-119 = "皆さん、楽しそうに笑って……。"
1012103-120 = "[ns7] \"これがユカリの望んだ結果、だよね？\"\n[ns8] \"なら、私も嬉しいよ。\""
1012103-123 = "はい！！"
1012103-125 = "（結局、水泳の練習はできなかったものの、心温まるひとときを過ごした）"
