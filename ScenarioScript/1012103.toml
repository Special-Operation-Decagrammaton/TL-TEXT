[translation]
1012103-1 = "Não tenha vergonha da abundância de flores"
1012103-2 = "(Ele chegou na piscina onde conheceu Yukari.)"
1012103-3 = "(Olhando ao redor...)"
1012103-5 = "Em frente à piscina perto de Hyakki Yako"
1012103-9 = "(Talvez devido ao intenso calor do dia, mesmo estando fora da piscina, já estava lotada de gente.)"
1012103-10 = "sensei! Aqui está!"
1012103-14 = "Todos nós estamos aqui!"
1012103-18 = "Quando está tão lotado é fácil se separar..."
1012103-19 = "Bem, sensei... você se importaria se eu agarrasse sua manga um pouquinho...?"
1012103-20 = "Tudo bem! ? #n... Bom, então!"
1012103-25 = "Hehe. Eu me sinto seguro agora."
1012103-26 = "Agora...Wooter Park――"
1012103-27 = "Um lugar verdadeiramente maravilhoso que é ainda melhor do que o que ouvi...!"
1012103-28 = "[s1] \"Ainda é a entrada.\"\n[s2] \"Você ficará ainda mais surpreso quando entrar.\"\"\n1012103-31 = \"O que é verdadeiramente importante é algo que pode ser sentido mesmo que não possa ser visto.\"\n1012103-32 = \"Os rostos felizes de todos. Esta é a melhor prova!\"\n1012103-33 = \"Sensei, não é hora!\"\n1012103-34 = \"aqui vamos nós! Vamos!\"\n1012103-36 = \"Uau...! #n Sensei, por favor dê uma olhada!\"\n1012103-37 = \"Todo mundo está em seus trajes de banho!\"\n1012103-38 = \"[s3] \"Você vai ficar encharcado.\"\n[s4] \"Yukari fica bem de maiô também.\""

1012103-41 = "Aproveite um momento especial com uma roupa diferente do habitual."
1012103-42 = "Parece um festival!"
1012103-43 = "Normalmente trabalho na parte de organização, trabalhando com seni e outros, mas..."
1012103-44 = "barulhento……."
1012103-48 = "falta……? É apenas minha imaginação? #nParece que a atmosfera mudou de alguma forma...?"
1012103-49 = "Todos estão se dirigindo para a saída. #nSerá que houve algum acidente lá dentro...?"
1012103-53 = "Manteremos contato com todos os nossos participantes. #nPedimos desculpas pelo transtorno, mas estaremos fechados hoje."
1012103-54 = "Se você estiver usando a piscina, saia da piscina e saia imediatamente."
1012103-55 = "Ei, o que diabos isso significa...!? ?"
1012103-56 = "Ainda deve haver tempo até o parque fechar...?"
1012103-57 = "Achei que você estava quieto ultimamente... mas a jovem também é uma pessoa carinhosa."
1012103-61 = "Mas não se preocupe. #nEsta piscina é reservada para uso privado."
1012103-62 = "você……! Por que você está aqui...! ?"
1012103-63 = "O que significa um aluguel privado? ?"
1012103-64 = "Embora tenha sido um pedido um tanto repentino...estou feliz que o proprietário tenha entendido a história."
1012103-65 = "Kakayokoji Acho que é por causa da reputação da família."
1012103-66 = "Mesmo usando o nome da minha família...? #nSenhorEu não quero nada assim para mim!"
1012103-67 = "Isso não vai acontecer! Isso é uma questão de honra familiar! #nA filha da família Yukoji não pode expor sua pele em público!"
1012103-68 = "Os professores são uma exceção, é claro. Devo-lhe muita gratidão..."
1012103-69 = "Acima de tudo, tenho os desejos da jovem..."
1012103-70 = "Fique à vontade para aproveitar esse momento!"
1012103-71 = "[s] \"Obrigado...?\""
1012103-73 = "Sozinho com o sensei. #nIsso é algo que sempre desejamos secretamente..."
1012103-74 = "Pois bem, irei embora imediatamente, então, por favor, não tenha pressa... #nOhhohohoho."
1012103-76 = "Uau! Não posso ir à piscina hoje! ?"
1012103-77 = "Estou ansioso por isso desde ontem!"
1012103-78 = "Olhe, olhe, não chore. Eu voltarei na próxima vez."
1012103-81 = "sensei."
1012103-82 = "Quando todos passamos tempo com o sensei, quando pensamos nele, nossos corações palpitam e incham."
1012103-83 = "Tenho certeza de que é algo de que ambos nos orgulhamos e é insubstituível."
1012103-87 = "Portanto, senhor."
1012103-88 = "[s5] \"Sim, entendo o que você quer dizer.\"\n[s6] \"Faça o que Yukari quer.\""
1012103-91 = "Minha família... faço os outros infelizes pela minha própria felicidade..."
1012103-92 = "Mesmo que seja a vontade da família... não. Porque ele é da família Kakayukoji! #nIsso vai contra as crenças de todos!"
1012103-93 = "Se é isso que você está dizendo, não posso evitar... #nNo entanto, evite usar a piscina. Tudo bem?"
1012103-94 = "Se isso te faz sorrir."
1012103-95 = "Eu entendo. #n...Por que tanto?"
1012103-99 = "Sensei, me desculpe."
1012103-100 = "Isso aconteceu devido a circunstâncias familiares..."
1012103-101 = "falta? Sensei, o que você está olhando?"
1012103-105 = "Entraremos em contato com todos os participantes. #nOs negócios de hoje continuarão normalmente."
1012103-106 = "Como desculpa pela confusão, ofereceremos o evento gratuitamente hoje! #nClientes que já pagaram a entrada receberão reembolso no balcão!"
1012103-107 = "A taxa de fundação já foi paga de qualquer maneira... mais do que isso, tenho que restaurar minha reputação...! #nHuh? Ah! O interruptor do microfone...!"
1012103-108 = "O que foi isso? #nNão vinha uma grande pessoa...?"
1012103-109 = "Não importa o que aconteça! É grátis! Vá, vá!"
1012103-111 = "yay! Você pode entrar na piscina!"
1012103-112 = "Apresse-se e faça fila para o controle deslizante!"
1012103-116 = "Vamos, é perigoso correr!"
1012103-119 = "Todos estavam rindo e se divertindo...."
1012103-120 = "[ns7] \"Esse é o resultado que Yukari queria, certo?\"\n[ns8] \"Então ficarei feliz também.\""
1012103-123 = "sim! !"
1012103-125 = "(Mesmo que no final eu não tenha conseguido praticar natação, me diverti muito.)"
