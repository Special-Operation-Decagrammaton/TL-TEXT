[translation]
1005806-1 = "「救護」の在り方"
1005806-6 = "（ミネの力を借りて、素早く仕事を片付けられた）"
1005806-7 = "これで今日の作業は、一通り終わったようですね。"
1005806-8 = "[s] \"ミネは書類仕事も得意なんだね。\""
1005806-9 = "いえ、それほどでも。"
1005806-10 = "私も救護騎士団では責任者の立場にありますので、書類と付き合う機会もそれなりにあるからかもしれません。"
1005806-11 = "思いがけずに得られたスキルのひとつですね。"
1005806-12 = "[s] \"今日はミネの「救護」のおかげで助かったよ。\""
1005806-16 = "……！"
1005806-17 = "なるほど、これもまたひとつの「救護」の在り方……！"
1005806-18 = "ありがとうございます、先生。大変勉強になりました。"
1005806-19 = "[s] （ちょっとくらい笑ってもらえるかなと思って言ったんだけど……）"
1005806-23 = "……失礼しました、私のですね。"
1005806-24 = "[s] \"出てもらって大丈夫だよ。\""
1005806-25 = "はい、ありがとうございます。"
1005806-30 = "こちら救護騎士団です。救護のご用命でしょうか？"
1005806-36 = "た、助けてください！道に迷って……！"
1005806-37 = "あの森です……「キヴォトスの樹海」です！"
1005806-38 = "「キヴォトスの樹海」ですね？"
1005806-39 = "もう少し詳しい状況をご説明いただけませんか？"
1005806-40 = "分からないんです……"
1005806-41 = "視界が暗くて遠くも見えず、どれも似たような木ばかりで……。"
1005806-45 = "……で……し……。"
1005806-50 = "もしもし……聞こえていますか！？"
1005806-54 = "電話が切れてしまいました……。"
1005806-58 = "先生、これは一刻の猶予もありません。"
1005806-59 = "[s] \"何が起きてるの……！？\""
1005806-60 = "「キヴォトスの樹海」で、誰かが救護の手を求めています！"
1005806-61 = "大至急向かわねば！"
1005806-62 = "[s] \"「キヴォトスの樹海」……？\""
1005806-63 = "はい、聞いたことはありませんか？"
1005806-64 = "「キヴォトスの樹海」は、一度入ったら抜け出せないと有名な場所……。"
1005806-65 = "その森に入るとGPSが機能しなくなったり、方位磁石が異常な動きをしたり……。"
1005806-66 = "一度でも道に迷ってしまうと出られなくなってしまう場所として、恐れられているのです。"
1005806-67 = "[s] \"それはもう立入禁止にした方が良いんじゃ……！？\""
1005806-68 = "すでに案内板などで、むやみに立ち入らないよう警告は出されておりますが……。"
1005806-69 = "禁止されているからこそ、興味を持つ者が後を絶たず……。"
1005806-70 = "目的は人それぞれです。それこそSNSに投稿するためだったり、肝試しだったり、あるいは単純な好奇心から「キヴォトスの樹海」に足を踏み入れる人たちも見受けられます。"
1005806-71 = "先ほど私のところに届いた電話の主も、きっとそのうちの一人でしょう。"
1005806-72 = "先生、本日はありがとうございました。"
1005806-73 = "私は急ぎますので、お先に失礼いたします。"
1005806-83 = "[ns] \"ちょっと待って……！\""
1005806-97 = "しかし、先生まで「キヴォトスの樹海」に来ていただかなくても……。"
1005806-98 = "[s1] \"今日はミネに助けてもらったから、お互いさまってことで。\"\n[s2] \"ミネも大切な生徒だし、一人で危険な場所には行かせられないよ。\""
1005806-101 = "大切な、生徒……。"
1005806-102 = "ふふっ、そうでしたね。私自身の立場をすっかり忘れていました。"
1005806-103 = "つまり私と一緒に「救護」活動を担っていただける、ということですね。"
1005806-104 = "やはり今からでも、救護騎士団の臨時顧問になっていただくのはいかがでしょうか？"
1005806-105 = "[s] \"そういえば前、そんな話もあったね……。\""
1005806-106 = "ええ。"
1005806-107 = "何度でも申し上げますが、先生は素晴らしい「救護」の才能と精神をお持ちですので。"
1005806-111 = "とにかく、今は先を急ぐとしましょうか。"
1005806-112 = "……実は「キヴォトスの樹海」に訪れるのは、私も初めてのことなのです。"
1005806-113 = "思っていたよりも、緊張しております……。"
1005806-114 = "[s] \"ミネでも緊張するんだね。\""
1005806-115 = "……私も「大切な」生徒だと言っていただいたから、かもしれません。"
1005806-116 = "すみません、こんな時に。そんなに慌てなくても大丈夫ですよ。"
1005806-117 = "では、参りましょう！"
1005806-122 = "先生、足元の木にお気をつけください！"
1005806-127 = "これで大丈夫ですね。"
1005806-128 = "もう少し資源を大切に……？"
1005806-132 = "確かに、それもそうですね。"
1005806-136 = "引き続き足元に注意しながら進みましょう。"
1005806-139 = "遊歩道を外れてから結構な時間歩いてきましたが……人の痕跡が見当たりませんね。"
1005806-140 = "……色々と不安になってきましたが、私たちに救護を要請した生徒もきっと同じ気持ちでしょう。"
1005806-147 = "先生は大丈夫ですか？"
1005806-151 = "日陰で助かりましたが、足元も悪いのでご無理なさらず。"
1005806-155 = "かなり奥深くまで来ましたね……。"
1005806-156 = "しかしGPSが機能しないというのは、やはり単なる噂だったようです。"
1005806-160 = "とはいえ、バッテリーも減ってきてしまいました……。"
1005806-161 = "予備の分を持ってくるべきでしたね。"
1005806-162 = "……ありがとうございます。そうですね、急な出動であれば準備が心許ないのはよくあることです。今は最善を尽くしましょう。"
1005806-164 = "（結局夜になっても、手がかりは見つからず……）"
1005806-166 = "……。"
1005806-167 = "こんな時間になってしまいましたね。"
1005806-168 = "申し訳ありません、先生。救護となると、周りが見えなくなってしまうようで……。"
1005806-169 = "やはり、先生を勢いで巻き込んでしまわない方が良かったかもしれません。"
1005806-170 = "[s3] \"ううん、私がついてきたんだから気にしないで。\"\n[s4] \"その気持ちの真っすぐさは、ミネの良い所だよ。\""
1005806-176 = "……ありがとうございます、先生。"
1005806-181 = "あちらに休めそうな場所がありますね。"
1005806-182 = "少し休憩を取りませんか？シャーレを出てから、ずっと歩き詰めでしたから。"
1005806-189 = "先生はこちらの切り株に……"
1005806-190 = "落ち葉はどかしましたので、どうぞ。"
1005806-195 = "[wa:400]― 先生、[wa:1200]大丈夫ですか？"
1005806-197 = "― お怪我などは[wa:700]ありませんか？"
1005806-200 = "[wa:500]― 夜の空気は[wa:1450]気持ちが良いですね……。"
1005806-203 = "― 草の香りに、[wa:1400]川のせせらぎ……"
1005806-205 = "― 心が落ち着きます。"
1005806-208 = "[wa:350]― ……どうされましたか？"
1005806-210 = "― 眩しい…[wa:1400]ですか…？"
1005806-213 = "[wa:50]― ふふ、[wa:1800]確かに[wa:1200]そうかもしれませんね。"
1005806-216 = "[wa:400]― 落ち着かないようでしたら、[wa:1600]私にもたれたり"
1005806-218 = "― 膝でお休みいただいても[wa:1500]構いませんよ。"
1005806-221 = "― ご心配[wa:400]なさらないでください。"
1005806-224 = "― たとえ何があっても、"
1005806-226 = "[wa:100]― 私が必ず[wa:1300]先生をお守りしますので。"
1005806-229 = "（ミネの膝を借りて、少しのあいだ休ませてもらった）"
1005806-235 = "なんとか入り口まで戻ってこられました……。"
1005806-239 = "バッテリーも、まだ何とか……。"
1005806-240 = "[s] \"ミネの方は、疲れてない？\""
1005806-241 = "私は大丈夫です。むしろ先生にはなれないことをさせてしまい……。"
1005806-242 = "いつかきちんと「顧問」になっていただいたら、こういうことも増えるかもしれませんが……ふふっ。"
1005806-247 = "もしかして、あの生徒から……？"
1005806-251 = "た、助けてください！森で迷ってるんです……！"
1005806-252 = "あの「キヴォトスの樹海」です！"
1005806-253 = "あらためてですが、もう少し詳しい状況をご説明いただけませんか？"
1005806-254 = "ですが、何も分からなくて……"
1005806-255 = "とにかく、木がたくさんあることしか……。"
1005806-256 = "今「キヴォトスの樹海」にいます、少しでもヒントをいただければ。"
1005806-260 = "えっ、嘘だろ！？"
1005806-261 = "まじで行ったのかよ、やべぇな！"
1005806-266 = "イタ電すればあの救護騎士団を動かせるとか、もっと早く思いつけば良かったな！"
1005806-267 = "ははっ、相当迷ったんじゃないの？"
1005806-268 = "そもそも本当だったところで、あそこで人探しは無理だろ！"
1005806-273 = "……。"
1005806-274 = "[ns] \"えっと……ミネ？\""
1005806-275 = "三つ、過ちがあります。"
1005806-276 = "一つ目、いくら私でも二度目は様々な可能性を考えるということ。"
1005806-277 = "二つ目、いたずら電話であることを失念してしまったこと。"
1005806-278 = "三つ目、あまりこういった方法を乱用すべきではないのですが……"
1005806-279 = "いくつかの条件があるとはいえ、「救護騎士団は逆探知の権限がある」と知らなかったこと。"
1005806-280 = "先生。"
1005806-281 = "これより私は、「救護」を必要としている方の元へ参ろうと思います。"
1005806-282 = "誰かが道を誤ってしまったとき……。"
1005806-283 = "正しい道を示すことも、私たちが行うべき「救護」です。"
1005806-284 = "先生も、そう思いませんか？"
1005806-288 = "[ns5] \"えっと……ほどほどにね？\"\n[ns6] \"手加減してあげてね……。\""
1005806-291 = "ご理解いただき、ありがとうございます。"
1005806-292 = "それでは申し訳ありませんが、お先に失礼します。また後日。"
1005806-293 = "救護騎士団、参ります！#n『救護が必要な場に救護を』！"
1005806-299 = "（その後、ミネは猛烈なスピードでどこかへ消えていった）"
1005806-303 = "（いたずら電話の犯人たちの顛末については、ミネのみぞ知る……）"
