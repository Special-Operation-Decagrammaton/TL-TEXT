[translation]
1005806-1 = "Como deveria ser o “alívio”"

1005806-6 = "(Com a ajuda de Mine, consegui realizar o trabalho rapidamente.)"

1005806-7 = "Parece que o trabalho de hoje está concluído."

1005806-8 = "[s] \"O meu também é bom com papelada.\""

1005806-9 = "Não, nem tanto."

1005806-10 = "Também estou em uma posição de responsabilidade nos Cavaleiros Socorros, então isso pode ser porque tenho muitas oportunidades para lidar com documentos."

1005806-11 = "É uma das habilidades que adquiri inesperadamente."

1005806-12 = "[s] \"Graças ao 'resgate' de Mine, fui salvo hoje. \""

1005806-16 = "...!"

1005806-17 = "Entendo, essa é outra forma de “alívio”...!"

1005806-18 = "Obrigado, senhor. Eu aprendi muito."

1005806-19 = "[s] (Eu disse isso porque pensei que poderia dar uma risadinha...)"

1005806-23 = "...Com licença, é meu."

1005806-24 = "[s] \"Tudo bem se você sair.\""

1005806-25 = "Sim, obrigado."

1005806-30 = "Estes são os Cavaleiros Socorros. Você precisa de ajuda?"

1005806-36 = "Por favor me ajude! Eu me perdi...!"

1005806-37 = "É aquela floresta... “O Mar de Árvores de Kivotos”!"

1005806-38 = "É o \"Mar de Árvores Kivotos\"?"

1005806-39 = "Você poderia explicar a situação com mais detalhes?"

1005806-40 = "Não sei..."

1005806-41 = "Minha visão estava tão escura que eu não conseguia enxergar longe, e todas as árvores pareciam parecidas..."

1005806-45 = "...E... e..."

1005806-50 = "Olá... você pode me ouvir! ?"

1005806-54 = "Meu telefone tocou..."

1005806-58 = "Senhor, não há demora nisso."

1005806-59 = "[s] \"O que está acontecendo...!?\""

1005806-60 = "Alguém está procurando uma ajuda na “Árvore dos Kivotos”!"

1005806-61 = "Eu tenho que ir para lá o mais rápido possível!"

1005806-62 = "[s] \"\"Kivotos Mar de Árvores\"...? \""

1005806-63 = "Sim, você já ouviu falar?"

1005806-64 = "``O Mar das Árvores de Kivotos'' é um lugar famoso por ser impossível escapar depois de entrar."

1005806-65 = "Quando eles entram na floresta, o GPS para de funcionar e a bússola se move de forma anormal..."

1005806-66 = "É temido como um lugar onde, se você se perder pelo menos uma vez, nunca mais conseguirá sair."

1005806-67 = "[s] \"Não seria melhor deixar esse lugar fora dos limites...!?\""

1005806-68 = "Já foram emitidos avisos em painéis informativos e outros locais para não invadir desnecessariamente..."

1005806-69 = "Justamente por ser proibido, não faltam pessoas interessadas nele..."

1005806-70 = "O propósito é diferente para cada pessoa. Algumas pessoas pisaram no Mar de Árvores de Kivotos para postar no SNS, para testar sua coragem ou simplesmente por curiosidade."

1005806-71 = "A pessoa que me ligou antes provavelmente era um deles."

1005806-72 = "Obrigado, professor, por hoje."

1005806-73 = "Estou com pressa, então, por favor, me desculpe primeiro."

1005806-83 = "[ns] \"Espere um minuto...!\""

1005806-97 = "Porém, mesmo que o professor não venha ao “Mar de Árvores de Kivotos”..."

1005806-98 = "[s1] \"A minha me ajudou hoje, então nós dois podemos nos separar.\"\n[s2] \"A minha também é uma aluna importante e não posso deixá-la ir sozinha a lugares perigosos.\""

1005806-101 = "Meus preciosos alunos..."

1005806-102 = "Hehe, isso mesmo. Eu tinha esquecido completamente minha própria posição."

1005806-103 = "Em outras palavras, você pode se juntar a mim na realização de atividades de “socorro”."

1005806-104 = "Por que não se tornar um conselheiro temporário dos Cavaleiros Socorros agora mesmo?"

1005806-105 = "[s] \"Pensando bem, houve uma história como essa antes...\""

1005806-106 = "Sim."

1005806-107 = "Direi isso repetidas vezes, mas você tem um grande talento e espírito de \"alívio\"."

1005806-111 = "De qualquer forma, vamos nos apressar agora."

1005806-112 = "...Na verdade, esta é a primeira vez que visito o “Mar de Árvores de Kivotos”."

1005806-113 = "Estou mais nervoso do que esperava..."

1005806-114 = "[s] \"Até o meu fica nervoso.\""

1005806-115 = "...Talvez seja porque também me disseram que eu era um aluno “importante”."

1005806-116 = "Sinto muito, em um momento como este. Está tudo bem se você não entrar em pânico tanto."

1005806-117 = "Bem, vamos lá!"

1005806-122 = "Professor, por favor, tome cuidado com a árvore sob seus pés!"

1005806-127 = "Isso está bem."

1005806-128 = "Deveríamos cuidar melhor dos nossos recursos...?"

1005806-132 = "Sim, isso também é verdade."

1005806-136 = "Por favor, continue a observar o seu passo."

1005806-139 = "Já faz algum tempo que caminho desde que saí do passeio, mas não encontro vestígios de pessoas."

1005806-140 = "...Estou começando a ficar ansioso com várias coisas e tenho certeza que os alunos que solicitaram nossa ajuda sentem o mesmo."

1005806-147 = "Seu professor está bem?"

1005806-151 = "Ajudou o fato de eu estar na sombra, mas não tinha uma boa base, então não tive que me esforçar muito."

1005806-155 = "Eu cheguei bem fundo..."

1005806-156 = "No entanto, parece que era apenas um boato de que o GPS não funcionava."

1005806-160 = "Porém, a bateria está fraca..."

1005806-161 = "Eu deveria ter trazido um sobressalente."

1005806-162 = "……obrigado. Bem, é comum que as pessoas não estejam preparadas para envios repentinos. Vamos fazer o nosso melhor por enquanto."

1005806-164 = "(No final, mesmo à noite, nenhuma pista foi encontrada...)"

1005806-166 = "……."

1005806-167 = "Chegou a hora."

1005806-168 = "Desculpe, senhor. Quando se trata de proporcionar alívio, é como se eu não pudesse ver o que me rodeia..."

1005806-169 = "Afinal, talvez fosse melhor não envolver o professor com tanta força."

1005806-170 = "[s3] \"Não, estou te seguindo, então não se preocupe com isso.\"\n[s4] \"Essa franqueza de sentimento é o que eu gosto no Meu.\""

1005806-176 = "...Obrigado, Sensei."

1005806-181 = "Há um lugar ali onde você pode descansar."

1005806-182 = "Você gostaria de fazer uma pequena pausa? Tenho andado por aí desde que saí da placa de Petri."

1005806-189 = "A professora está nesse toco..."

1005806-190 = "As folhas caídas foram removidas, então dê uma olhada."

1005806-195 = "[wa:400]― Professor, [wa:1200]Você está bem?"

1005806-197 = "- Você está ferido [wa:700]?"

1005806-200 = "[wa:500]― O ar noturno [wa:1450] é bom..."

1005806-203 = "- O cheiro da grama, o som do rio [wa:1400]..."

1005806-205 = "- Isso acalma sua mente."

1005806-208 = "[wa:350]―― O que aconteceu?"

1005806-210 = "- É deslumbrante...[wa:1400]...?"

1005806-213 = "[wa:50]― Hehe, [wa:1800] Isso pode ser verdade [wa:1200]."

1005806-216 = "[wa:400]- Se você não se sentir confortável, apoie-se em mim [wa:1600]"

1005806-218 = "- Não me importo [wa:1500] se você descansar no meu colo."

1005806-221 = "- Por favor, não se preocupe [wa:400]."

1005806-224 = "- Não importa o que aconteça,"

1005806-226 = "[wa:100]― Eu definitivamente protegerei [wa:1300] sensei."

1005806-229 = "(Peguei emprestado o colo da minha e a deixei descansar um pouco.)"

1005806-235 = "Consegui voltar para a entrada..."

1005806-239 = "A bateria ainda está de alguma forma..."

1005806-240 = "[s] \"Você não está cansado, meu?\""

1005806-241 = "estou bem. Na verdade, eu o fiz fazer coisas que ele não poderia fazer como professor..."

1005806-242 = "Se algum dia eu me tornasse um \"conselheiro\" adequado, talvez pudesse fazer mais disso... hehe."

1005806-247 = "Talvez daquele aluno...?"

1005806-251 = "Por favor me ajude! Estou perdido na floresta...!"

1005806-252 = "Aquele “Mar de Árvores Kivotos”!"

1005806-253 = "Mais uma vez, você poderia explicar a situação com mais detalhes?"

1005806-254 = "Mas eu não entendo nada..."

1005806-255 = "Só posso dizer que tem muitas árvores..."

1005806-256 = "Atualmente estou no Mar das Árvores de Kivotos, se você pudesse me dar algumas dicas."

1005806-260 = "Ah, isso é mentira! ?"

1005806-261 = "Você realmente foi lá? Oh não!"

1005806-266 = "Eu gostaria de ter descoberto antes que poderia mover os cavaleiros substitutos com um Itaden!"

1005806-267 = "Haha, você deve estar bastante confuso, não é?"

1005806-268 = "Mesmo que fosse verdade, seria impossível encontrar alguém lá!"

1005806-273 = "……."

1005806-274 = "[ns] \"Hum...Meu?\""

1005806-275 = "Terceiro, há erros."

1005806-276 = "Primeiro, por mais que eu goste, na segunda vez penso em várias possibilidades."

1005806-277 = "Em segundo lugar, esqueci que era um trote."

1005806-278 = "Terceiro, não devemos abusar muito destes métodos..."

1005806-279 = "Embora houvesse algumas condições, eu não sabia que os Cavaleiros Socorros tinham autoridade para conduzir a detecção reversa."

1005806-280 = "professor."

1005806-281 = "De agora em diante, gostaria de ir ao encontro daqueles que precisam de “alívio”."

1005806-282 = "Quando alguém toma o caminho errado..."

1005806-283 = "Mostrar-lhes o caminho certo também é uma forma de “alívio” que devemos proporcionar."

1005806-284 = "Você também não acha, professor?"

1005806-288 = "[ns5] \"Hum... com moderação?\"\n[ns6] \"Por favor, seja gentil...\""

1005806-291 = "Obrigado pela sua compreensão."

1005806-292 = "Sinto muito, mas por favor me dê licença primeiro. Até mais."

1005806-293 = "Os Cavaleiros Socorros estão aqui! #n “Alívio onde é necessário”!"

1005806-299 = "(Depois disso, o meu desapareceu em algum lugar a uma velocidade tremenda.)"

1005806-303 = "(Só o meu sabe o que aconteceu com os autores do trote...)"

