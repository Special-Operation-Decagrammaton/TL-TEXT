[translation]
10044050-1 = "Episódio 5; Os Fora da Lei da Estrada, Novamente"
10044050-3 = "Dizem que o trem de carga que está aqui agora..."
10044050-4 = "...está carregando algo muito importante!!"
10044050-9 = "É aquele ali!!"
10044050-10 = "Que sorte! Quem diria que seria tão fácil de achar!"
10044050-11 = "Chefe... não, Capitã! Dê as ordens!"
10044050-12 = "Por enquanto, partam com os que estiverem mais perto! A força principal deve se mover agora também!"
10044050-13 = "Tomem aquele trem!"
10044050-18 = "Uooo! É uma ordem da Capitã! Vamos nessa!!!"
10044050-25 = "...Não, espere."
10044050-26 = "Hã?"
10044050-27 = "Aquilo foi um plantão de notícias, não foi?"
10044050-28 = "E daí?"
10044050-29 = "Isso significa que... todo mundo ficou sabendo daquilo, não é...?"
10044050-30 = "Ah..."
10044050-31 = "Não é perigoso?"
10044050-33 = "Um trem de carga carregado de ouro!?"
10044050-35 = "Armas capazes de subjugar Kivotos?#nEssa história é real mesmo!?"
10044050-37 = "Isso é..."
10044050-39 = "Só nos resta roubar!!"
10044050-40 = "Dizem que tudo o que há no mundo está ali dentro!!"
10044050-41 = "Quem chegar primeiro leva!!!"
10044050-46 = "Ah, ah... por que um atrás do outro...!"
10044050-47 = "Uou, a Hikari também está em rede nacional?"
10044050-48 = "Que loucura, estamos no centro das atenções!"
10044050-49 = "[ns] \"Não acredito que as coisas chegaram a esse ponto...\""
10044050-51 = "De qualquer forma, vamos coletar logo e partir!!"
10044050-52 = "É, tem razão... se começarmos a andar, não será tão fácil para eles interferirem..."
10044050-58 = "Equipe de vanguarda, chegada!"
10044050-59 = "Procurem, procurem! O trem de carga!"
10044050-66 = "Ah, ah! Trem de carga! Onde!?"
10044050-67 = "Ah...! Vocês são o pessoal da CCC que entrou em contato antes, né...!?"
10044050-69 = "Onde está?"
10044050-70 = "É, é por aqui...!"
10044050-76 = "Hm? Quem são eles...?"
10044050-77 = "O que foi, conhecidos?"
10044050-78 = "Se não me engano... isso! Aqueles reclamões da pizza!!"
10044050-79 = "Aquele pessoal que você mencionou?"
10044050-80 = "É! O pessoal da Highlander! Não tem erro!"
10044050-81 = "Então... temos que retribuir o favor, não é mesmo!"
10044050-82 = "Não somos mais entregadores de delivery! Agora somos os Fora da Lei da Estrada!"
10044050-84 = "Ei, vocês!"
10044050-90 = "Nos vimos faz pouco tempo, hein!"
10044050-91 = "Viemos acertar as contas!"
10044050-93 = "..."
10044050-94 = "Quem são vocês?"
10044050-95 = "Não ouse dizer que esqueceu!#nPor causa de vocês, nós..."
10044050-96 = "Ah! Os entregadores de pizza...!"
10044050-97 = "Por causa da reclamação de vocês, fomos demitidos depois daquilo!"
10044050-98 = "Se tivesse dado certo, poderíamos ter aguentado por mais uns dois dias!"
10044050-99 = "Ficar fazendo esse escândalo por causa daquilo... Vocês estão exigindo serviço demais!"
10044050-101 = "B-bem, eu acho que é o mínimo..."
10044050-102 = "Pois é! Aquilo nem é pizza!"
10044050-103 = "Que reação defensiva, que cafona."
10044050-105 = "Ficam aí falando o que querem...!"
10044050-106 = "Ei, todos aqui! Vamos mostrar para eles o quanto somos assustadores!"
