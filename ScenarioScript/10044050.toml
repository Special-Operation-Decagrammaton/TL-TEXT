[translation]
10044050-1 = "第5話;道路のアウトロー再び"
10044050-3 = "今ここにある貨物列車に――"
10044050-4 = "――とても大事な何かが積まれているとのことです！！"
10044050-9 = "あれだ！！"
10044050-10 = "ついてるぜ！こんな簡単に見つかるとはな！"
10044050-11 = "ボス――いや、総長！指示を！"
10044050-12 = "とりあえず近いヤツから出発だ！主力も今すぐ移動しろ！"
10044050-13 = "あの列車を押さえるんだ！"
10044050-18 = "うおお！総長の命令だ！いくぞぉぉおおお！"
10044050-25 = "……いや、待て。"
10044050-26 = "あん？"
10044050-27 = "あれ、ニュース速報だったよな？"
10044050-28 = "だから？"
10044050-29 = "てことは……みんながあれを知っちまったんだよな……？"
10044050-30 = "あー……。"
10044050-31 = "ヤバくね？"
10044050-33 = "金を積んだ貨物列車！？"
10044050-35 = "キヴォトスを制圧できるほどの武器だと？#nその話、本当か！？"
10044050-37 = "こんなの――"
10044050-39 = "奪うしかないだろ！！"
10044050-40 = "この世のすべてがそこにあるって！！"
10044050-41 = "早い者勝ちだぁっ！！！"
10044050-46 = "はぁ、はぁ……な、なんで次から次に……！"
10044050-47 = "うおー、ヒカリも全国区ー？"
10044050-48 = "やーばいね、大注目じゃん！"
10044050-49 = "[ns] \"まさか、こんなことになるだなんて……。\""
10044050-51 = "とにかくちゃっちゃと回収して出発するよ！！"
10044050-52 = "そ、そうですね……走りだせば、そうそう手は出せないでしょうし……。"
10044050-58 = "先発隊、到着！"
10044050-59 = "探せ探せ！貨物列車だ！"
10044050-66 = "はぁ、はぁ！貨物列車！どこ！？"
10044050-67 = "あっ……！先ほど連絡してくれたCCCの方々ですよね……！？"
10044050-69 = "どこにあるー？"
10044050-70 = "こ、こっちです……！"
10044050-76 = "ん？あいつらは……？"
10044050-77 = "なんだ、知り合いか？"
10044050-78 = "たしか……そうだ！ピザの時のクレーマー！！"
10044050-79 = "お前が言ってたやつか？"
10044050-80 = "ああ！ハイランダーの連中だ！間違いない！"
10044050-81 = "なら……そのお礼はしないとだよなぁ！"
10044050-82 = "もうデリバリー配達員じゃねぇ！うちらは道路のアウトロー！"
10044050-84 = "おい、お前ら！"
10044050-90 = "さっきぶりだな！"
10044050-91 = "借りを返しに来てやったぞ！"
10044050-93 = "……。"
10044050-94 = "どなたー？"
10044050-95 = "忘れたとは言わせねぇぞ？#nお前らのせいでうちらは――"
10044050-96 = "あ！ピザの配達員だ……！"
10044050-97 = "お前らのクレームのせいで、あの後クビになったんだよ！"
10044050-98 = "うまくいきゃ2日は粘れたはずなのに！"
10044050-99 = "あの程度で騒ぎやがって……お前らはサービスを求めすぎなんだよ！"
10044050-101 = "さ、最低限だと思うんですけど……。"
10044050-102 = "そうそう！あんなのピザじゃないよ！"
10044050-103 = "逆ギレー、ダサいー。"
10044050-105 = "言わせておけばベラベラと……！"
10044050-106 = "おいっ全員集まれ！うちらの怖さを思い知らせてやるぞ！"
