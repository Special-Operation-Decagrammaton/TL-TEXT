[translation]
2005406-1 = "Life Staff (2)"
2005406-4 = "Peço mil desculpas..."
2005406-5 = "[s1] \"Não se preocupe. Você deve estar muito cansada.\"\n[s2] \"Qualquer um pode acabar perdendo a hora às vezes.\""
2005406-8 = "Mas, especialmente nesta situação em que preciso estar tão alerta..."
2005406-9 = "Isso me torna uma Life Staff indigna para o Sensei..."
2005406-10 = "Sim? Para não me culpar tanto?"
2005406-11 = "Porque o Sensei estava dependendo demais de mim? Não, não é isso..."
2005406-12 = "Mas, ainda assim..."
2005406-13 = "[s3] \"Certo, entendi.\"\n[s4] \"Hoje, eu serei a Life Staff da Himari!\""
2005406-16 = "...Sim?"
2005406-17 = "O Sensei, minha...?"
2005406-18 = "Mas isso é...!"
2005406-19 = "Eh? Sim, bem, eu costumo receber ajuda de todos vocês, mas..."
2005406-20 = "A Eimi nem se fala, e ultimamente a Toki também..."
2005406-21 = "Ainda assim, ter o Sensei me ajudando é... um pouco diferente, por assim dizer..."
2005406-22 = "[s] \"Entendi, não é bom forçar a barra, né.\""
2005406-23 = "N-não! Não é isso! Pelo contrário...!"
2005406-24 = "Pelo contrário..."
2005406-25 = "U-uuuh..."
2005406-30 = "(Estou feliz a ponto de não conseguir expressar em palavras...)"
2005406-31 = "(Mas também estou igualmente envergonhada...!)"
2005406-36 = "[ns5] \"A Himari sempre se esforça muito, então não tem problema mimar um pouco de vez em quando.\"\n[ns6] \"Se eu puder ajudar, é só pedir!\""
2005406-41 = "Você não deveria dizer coisas assim tão levianamente, sabia?"
2005406-42 = "...Ainda bem que foi comigo."
2005406-43 = "Se você baixasse a guarda perto da Rio, por exemplo..."
2005406-44 = "Seria uma dor de cabeça enorme, entende?"
2005406-45 = "[s] \"Bem, quanto a isso...\""
2005406-46 = "Hã!?"
2005406-47 = "Você está dizendo que... não se importa com o quanto os alunos te causem problemas?"
2005406-48 = "Você é uma pessoa tão..."
2005406-49 = "Por favor, não diga essas coisas repetidamente!"
2005406-50 = "E ainda por cima de forma tão inconsciente... Não tente testar a minha paciência."
2005406-51 = "Se eu quisesse, eu também poderia..."
2005406-52 = "[ns] \"Himari?\""
2005406-55 = "N-não é nada! Não é nada mesmo!"
2005406-56 = "Ehem."
2005406-57 = "Bem, se o Sensei insiste tanto assim..."
2005406-58 = "Acho que vou aproveitar para ser mimada ao máximo hoje. Tudo bem para você?"
2005406-59 = "[s7] \"Claro. Pode pedir o quanto quiser.\"\n[s8] \"Aceito esse desafio!\""
2005406-62 = "Fufufu..."
2005406-63 = "Prepare-se, está bem?"
2005406-64 = "(Assim começou o tempo de mimar a Himari)"
2005406-67 = "Eu gostaria de lavar as mãos. #nO banheiro é logo ali, mas..."
2005406-68 = "Seria tão bom se alguém me levasse até lá no colo..."
2005406-69 = "[ns] \"O-ok!\""
2005406-75 = "(Naquele momento... a respiração quente da Himari roçou o meu ouvido)"
2005406-76 = "[ns] \"!?!?!\""
2005406-77 = "Ora. É motivo para ficar tão surpreso assim?"
2005406-78 = "Respirar é algo natural para quem está vivo, não é?"
2005406-80 = "(Não está errado, mas reprimi a vontade de retrucar)"
2005406-81 = "(Esforçando-me para manter a calma, continuei a atender aos caprichos de Himari)"
2005406-87 = "……。"
2005406-88 = "(Achei que meu coração fosse explodir……)"
2005406-89 = "(Quem diria que eu ficaria tão nervosa……)"
2005406-90 = "(Eu não sabia que algo assim seria tão vergonhoso……!)"
2005406-93 = "O que faremos…… perdi a força nos braços."
2005406-94 = "Apesar disso, sinto uma fominha……."
2005406-95 = "Tem um brownie de chocolate na geladeira…… será que alguém poderia me dar na boca～?"
2005406-99 = "Sensei, obrigada."
2005406-100 = "Então……."
2005406-104 = "[ns] \"！？！？！？\""
2005406-105 = "Fufu. Aconteceu algo, Sensei?"
2005406-106 = "Parecia tão delicioso que――"
2005406-107 = "Eu só me inclinei um pouco para dar uma "mordidinha" e provar."
2005406-108 = "[s] \"V-você queria tanto assim…….\""
2005406-113 = "(Sinto como se meu rosto estivesse pegando fogo……!)"
2005406-114 = "(O rosto do Sensei está tão perto!)"
2005406-115 = "(Não, fui eu quem se aproximou, mas ainda assim……!)"
2005406-116 = "……。"
2005406-117 = "(Ainda assim…… uma garota tão linda se aproximou, não é?#nSerá que o Sensei não sentiu nada?)"
2005406-121 = "(……Será que é justamente por isso?)"
2005406-122 = "……。"
2005406-123 = "(Será que encurtar a distância tão de repente acaba sendo contraproducente……?)"
2005406-124 = "(Como se fosse o caso de adicionar catalisador demais……)"
2005406-125 = "(Em vez de acelerar o resultado, acabam sendo gerados subprodutos indesejados, ou a estabilidade geral diminui, afinal)"
2005406-126 = "(A pressa é inimiga da perfeição, como dizem)"
2005406-127 = "(Cometer um erro desses…… preciso refletir)"
2005406-130 = "Ora. Quando percebi, já é noite."
2005406-131 = "[s] \"Hã? Já é essa hora!?\""
2005406-132 = "Sim. Aqui, a distinção entre dia e noite não é clara.#nPor isso, a noção de tempo acaba ficando confusa."
2005406-133 = "Acima de tudo, este é um lugar onde "fenômenos singulares" ocorrem em tempo real."
2005406-134 = "Por causa disso, meus hábitos de vida estão desregulados…… e como tenho dificuldade para dormir, ficaria feliz se houvesse alguém ao meu lado para me fazer pegar no sono."
2005406-135 = "[s] \"Isso realmente funciona!?\""
2005406-136 = "Ora?"
2005406-137 = "Você não confia em mim, Sensei?#nMesmo que eu confie no Sensei mais do que em qualquer outra pessoa no mundo."
2005406-138 = "[s] \"……！！\""
2005406-140 = "[ns9] \"Entendi, é verdade.\"\n[ns10] \"Como staff da Himari, eu confio em você.\""
2005406-144 = "(Para fazer Himari dormir, levei-a até a cama)"
2005406-145 = "(Nesse momento……!)"
2005406-146 = "Ei♪"
2005406-151 = "[ns] \"Himari!?\""
2005406-152 = "Sensei? Você vai me fazer dormir, não vai?"
2005406-153 = "Sabe, quando não consigo dormir, eu preciso que alguém fique ao meu lado～"
2005406-154 = "Sim? Se eu peço para Eimi ou Toki fazerem isso também?"
2005406-158 = "(……Não. Nada disso)"
2005406-159 = "(Se a Eimi estivesse por perto, eu provavelmente teria uma insolação. Mas……)"
2005406-164 = "Sim, talvez seja especialmente verdade quando não estou nem um pouco com sono, como hoje."
2005406-165 = "(Desculpe, Sensei)"
2005406-166 = "(Só mais um pouquinho…… deixe-me ser mimada)"
2005406-167 = "[ns11] \"Entendido.\"\n[ns12] \"Mas, só vou ficar aqui até você dormir, certo?\""
2005406-170 = "Sim! Com certeza!"
2005406-176 = "（Apaguei a luz do quarto e sentei ao lado da cama da Himari）"
2005406-177 = "（No quarto silencioso, nossas respirações nos envolvem suavemente）"
2005406-178 = "（Eu tinha prometido ficar até a Himari dormir, mas...）"
2005406-179 = "（Acabei ficando com sono antes dela...）"
2005406-186 = "Sensei...?"
2005406-187 = "Você acabou dormindo?"
2005406-188 = "Sua respiração ritmada, sua temperatura corporal levemente mais baixa..."
2005406-189 = "Fufu..."
2005406-190 = "Acho que, entre todos nós, o Sensei é quem está mais cansado."
2005406-194 = "（Sinto como se alguém estivesse acariciando minha cabeça...）"
2005406-196 = "Sensei."
2005406-197 = "...Sensei."
2005406-198 = "Nosso..."
2005406-199 = "Agora, meu Sensei..."
2005406-200 = "Você sabia?"
2005406-201 = "Neste momento, estou sendo uma garota muito má."
2005406-202 = "Se você ainda estivesse acordado, eu gostaria que você colocasse toda a culpa no sono..."
2005406-203 = "E se você estiver realmente dormindo, eu gostaria de ficar assim pelo maior tempo possível..."
2005406-204 = "Ficar pensando em coisas assim..."
2005406-205 = "Fufu, até eu mesma fico impressionada."
2005406-206 = "Se fosse para culpar alguém, eu gostaria de reclamar um pouco com o Sensei por ter me deixado assim..."
2005406-207 = "Mas isso seria covardia da minha parte."
2005406-212 = "Desculpe, Sensei."
2005406-213 = "Mas... Sensei?"
2005406-214 = "O Sensei, neste exato momento..."
2005406-215 = "E com certeza, daqui para frente também..."
2005406-216 = "Para mim, é mais importante do que qualquer pessoa ou qualquer coisa..."
2005406-217 = "Você é alguém insubstituível."
2005406-220 = "（Por algum motivo, sinto-me muito tranquila... e perdi a consciência completamente）"
2005406-221 = "Sensei, descanse bem."
2005406-222 = "Por favor, cuide-se."
