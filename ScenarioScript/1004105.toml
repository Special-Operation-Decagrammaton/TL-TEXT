[translation]
1004105-1 = "Mesmo que não fique limpo"
1004105-2 = "……."
1004105-3 = "[s] \"Misaki, você está bem?\""
1004105-4 = "Desculpe, é uma longa história."
1004105-5 = "Faz um tempo que... eu não como nada..."
1004105-6 = "Ugh..."
1004105-11 = "[ns] \"Misaki!?\""
1004105-12 = "É que... meu corpo está pesado... estou ficando tonta..."
1004105-13 = "[s] \"...Seu corpo está muito quente.\""
1004105-15 = "...Onde é aqui?"
1004105-16 = "[s] \"Tinha um hotel por perto... desculpe, não parecia ter nenhum lugar melhor.\""
1004105-17 = "……."
1004105-18 = "[s1] \"Não se force, você está com muita febre...\"\n[s2] \"Acho que é um resfriado, descanse um pouco agora.\""
1004105-19 = "……."
1004105-20 = "……."
1004105-21 = "[s] \"Deixei comida e roupas limpas aqui.\""
1004105-23 = "[ns] \"Descanse bastante, e coma algo quando conseguir.\""
1004105-24 = "...Você vai embora?"
1004105-25 = "[s] \"Desculpe, preciso sair um pouco. Fique em repouso.\""
1004105-26 = "...Entendo."
1004105-31 = "Que ridículo... um corpo físico é algo tão insignificante..."
1004105-32 = "Ser impedida por algo assim..."
1004105-33 = "Eu queria... ter sido libertada desse corpo..."
1004105-34 = "Este mundo sempre, desse jeito, me..."
1004105-35 = "……"
1004105-36 = "Solidão."
1004105-39 = "[ns] \"Voltei.\""
1004105-41 = "[ns] \"Ué, Misaki... onde você está...?\""
1004105-43 = "[ns3] \"Som de água...?\"\n[ns4] Abre a porta."
1004105-48 = "[wa:1300]— ...Sensei?[wa:2300] Você voltou."
1004105-50 = "— Esqueceu de algo[wa:1300] importante?"
1004105-53 = "[wa:1500]— ...Eu?"
1004105-55 = "— Você está...[wa:1200] preocupado comigo...?"
1004105-58 = "[wa:1800]— Que coisa,"
1004105-60 = "— Se preocupar com algo tão trivial..."
1004105-63 = "— Você não tem nada melhor para fazer,[wa:1850] mesmo sendo um adulto."
1004105-66 = "[wa:1700]— Este mundo frio e barulhento,"
1004105-68 = "— E eu também."
1004105-71 = "— ...Não importa o quanto chova,"
1004105-73 = "— Nada será lavado ou ficará limpo."
1004105-76 = "[wa:2000]— ...Dizem que não é assim."
1004105-78 = "— Se eu pudesse acreditar nisso,[wa:1700] como uma idiota..."
1004105-82 = "……."
1004105-83 = "Eu... vivi sem ter interesse particular em nada."
1004105-84 = "Se eu morresse ou vivesse, tanto faz... não sinto nada."
1004105-85 = "Mas... Sensei, quando olho para você..."
1004105-86 = "...Eu fico com raiva."
1004105-87 = "Fico extremamente irritada..."
1004105-88 = "Não consigo entender direito."
1004105-89 = "...É uma sensação estranha."
1004105-90 = "[s] \"……Entendi.\""
1004105-91 = "……A culpa deve ser minha. Até hoje, o Sensei me ajudou."
1004105-92 = "Quando o Sensei foi embora…… de repente, eu não consegui aguentar……"
1004105-93 = "……."
1004105-94 = "……Então, onde você foi?"
1004105-95 = "[s] \"Fui comprar um antitérmico.\""
1004105-96 = "……Entendi."
1004105-97 = "[s] \"Escolhi um docinho para ser mais fácil de tomar.\""
1004105-98 = "……."
1004105-99 = "……Hã?"
1004105-100 = "Docinho, você diz…… quer dizer xarope infantil?"
1004105-101 = "……Por quê?"
1004105-102 = "[s] \"Bem, pensei que talvez você não fosse muito fã de remédios amargos……\""
1004105-103 = "Remédio é tudo igual depois que você engole."
1004105-104 = "Por que se preocupar com esse tipo de coisa?"
1004105-105 = "[s] \"É que também foi o que me recomendaram na farmácia……\""
1004105-106 = "Mesmo assim, quem compra algo para crianças……?"
1004105-107 = "[s] \"Desculpe…….\""
1004105-109 = "(Depois disso, fui questionado por Misaki por um tempo, mas consegui fazer com que ela tomasse o remédio.)"
