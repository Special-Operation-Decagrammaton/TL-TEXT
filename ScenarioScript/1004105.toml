[translation]
1004105-1 = "綺麗にならなくても"
1004105-2 = "……。"
1004105-3 = "[s] \"ミサキ、大丈夫？\""
1004105-4 = "ごめん、話すと長くなる。"
1004105-5 = "しばらく……何も食べてなくて……。"
1004105-6 = "う……。"
1004105-11 = "[ns] \"ミサキ！？\""
1004105-12 = "ちょっと、身体が重くて……くらくらする……。"
1004105-13 = "[s] \"……体がすごく熱い。\""
1004105-15 = "……ここは？"
1004105-16 = "[s] \"近くにホテルがあったから……ごめん、他に良いところが無さそうで。\""
1004105-17 = "……。"
1004105-18 = "[s1] \"無理しないで、すごい熱なのに……。\"\n[s2] \"風邪だと思う、今はゆっくり休んで。\""
1004105-19 = "……。"
1004105-20 = "……。"
1004105-21 = "[s] \"食べ物と着替えはここにあるから。\""
1004105-23 = "[ns] \"ゆっくり休んで、食べれるようになったらご飯食べて。\""
1004105-24 = "……行っちゃうの？"
1004105-25 = "[s] \"ごめん、ちょっと出てくるね。安静にしてて。\""
1004105-26 = "……そう。"
1004105-31 = "バカバカしい……肉体なんて、取るに足らないものなのに……。"
1004105-32 = "こんなことで足を引っ張られて……。"
1004105-33 = "私は……こんな肉体から、解放されたかったのに……。"
1004105-34 = "この世界はいつも、こんな風に私を……。"
1004105-35 = "……"
1004105-36 = "寂しい。"
1004105-39 = "[ns] \"ただいま。\""
1004105-41 = "[ns] \"あれ、ミサキ……どこにいるの……？\""
1004105-43 = "[ns3] \"水の音……？\"\n[ns4] 扉を開ける。"
1004105-48 = "[wa:1300]― ……先生？[wa:2300]帰ってきたんだ。"
1004105-50 = "― 何か、[wa:1300]大事な忘れ物でも？"
1004105-53 = "[wa:1500]― ……私？"
1004105-55 = "― 私を、[wa:1200]心配して……？"
1004105-58 = "[wa:1800]― そんな、"
1004105-60 = "― くだらないことまで気にするなんて……。"
1004105-63 = "― 暇なんだね、[wa:1850]大人なのに。"
1004105-66 = "[wa:1700]― この冷たくて騒がしい世の中も、"
1004105-68 = "― 私も。"
1004105-71 = "― ……どれだけ雨が降ったところで、"
1004105-73 = "― 洗い流されて綺麗にはならない。"
1004105-76 = "[wa:2000]― ……そんなことないんだって。"
1004105-78 = "― 馬鹿みたいに、[wa:1700]信じられたら……"
1004105-82 = "……。"
1004105-83 = "私は……何に対しても、特に興味も持たずに生きてきた。"
1004105-84 = "死のうが生きようが、どっちでもよかった……何も思わないから。"
1004105-85 = "でも……先生、あなたを見てると……"
1004105-86 = "……腹が立つ。"
1004105-87 = "ものすごく、イライラして……。"
1004105-88 = "よく分からなくなる。"
1004105-89 = "……変な感じ。"
1004105-90 = "[s] \"……そっか。\""
1004105-91 = "……悪いのは、きっと私。今日だって、先生は私を助けてくれた。"
1004105-92 = "先生が行っちゃった時……急に、耐えられなくて……"
1004105-93 = "……。"
1004105-94 = "……それで、どこに行ってきたの？"
1004105-95 = "[s] \"解熱剤を買いに。\""
1004105-96 = "……そっか。"
1004105-97 = "[s] \"飲みやすいように、甘いやつにしたよ。\""
1004105-98 = "……。"
1004105-99 = "……えっ？"
1004105-100 = "甘いやつって……子ども用のシロップってこと？"
1004105-101 = "……どうして？"
1004105-102 = "[s] \"えっと、もしかしたら苦い薬は得意じゃないかもと思って……\""
1004105-103 = "薬なんて飲み込んでしまえば全部同じだよ。"
1004105-104 = "どうしてそんな所に気を使うの。"
1004105-105 = "[s] \"薬局で勧めてもらったっていうのもあって……。\""
1004105-106 = "だからって普通、子ども向けを買う……？"
1004105-107 = "[s] \"ごめんなさい……。\""
1004105-109 = "（その後もしばらくミサキに問い詰められたものの、どうにか薬を飲んでもらうことに成功した。）"
