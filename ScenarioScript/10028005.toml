[translation]
10028005-1 = "Prólogo; Trem de Escolta"
10028005-64 = "O alvo chegou! Coloquem as correntes nele!"
10028005-72 = "Entra logo! Não tente resistir."
10028005-77 = "……Muito bem, parem!#nFique quieto aí."
10028005-78 = "Correntes e algemas fixadas!!"
10028005-83 = "O seu destino será decidido no quartel-general. Provavelmente, hoje será o último dia que você verá a luz do sol.#nAproveite bem o seu último dia."
10028005-84 = "…………."
10028005-85 = "……Tsc, ficou mudo, é?"
10028005-86 = "Dito isso, tem certeza de que é esse mesmo?#nEle parece só um pirralho, não consigo acreditar que precise de tanta vigilância……"
10028005-87 = "Ele é o líder daqueles que causaram aquele incidente bem no meio do local onde os executivos estavam reunidos. Não tem como ser alguém normal."
10028005-88 = "Bem, é verdade que a fama de louco dele é bem conhecida……"
10028005-89 = "Até o Comitê de Disciplina de Gehenna o mantém sob vigilância como um indivíduo perigoso."
10028005-90 = "Mas isso acaba hoje.#nAfinal, a nossa família, a infame——"
10028005-91 = "——a \"Família Arancino\", aceitou o serviço de eliminá-lo."
10028005-92 = "…………."
10028005-93 = "Fechem a porta! Todos, entrem e sentem-se!!"
10028005-94 = "Todos, permaneçam em seus postos até chegarmos!"
10028005-100 = "Conexão dos vagões verificada. Sem anormalidades!"
10028005-101 = "……Partindo!!"
