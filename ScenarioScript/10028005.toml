[translation]
10028005-1 = "プロローグ;護送列車"
10028005-64 = "対象が到着した！鎖をつけろ！"
10028005-72 = "さっさと入れ！悪足掻きはするなよ。"
10028005-77 = "……よし、止まれ！#n大人しくしてるんだぞ。"
10028005-78 = "鎖、足枷の固定完了！！"
10028005-83 = "お前の処分は本部で決まる。陽の光が見られるのも今日で最後だろうな。#nせいぜい、最後の1日を楽しむといい。"
10028005-84 = "…………。"
10028005-85 = "……チッ、黙りやがって。"
10028005-86 = "というか、本当にコイツで合ってるのか？#nただのチビにしか見えないんだが、ここまでの警戒が必要とは到底……"
10028005-87 = "幹部が集う会場のド真ん中で、あんなことをしでかすヤツらのトップだぞ。まともな訳がない。"
10028005-88 = "ま、たしかにコイツがイカレてるってのは有名だよな……"
10028005-89 = "あのゲヘナの風紀委員が、要注意人物として目を光らせてるくらいだ。"
10028005-90 = "だが、それも今日で最後。#nなんせ私たちのファミリーでも悪名高い――"
10028005-91 = "――「アランチーノ・ファミリー」が、始末を請け負ったんだ。"
10028005-92 = "…………。"
10028005-93 = "ドアを閉めろ！全員、中に移動して座るんだ！！"
10028005-94 = "全員、到着するまで持ち場で待機しろ！"
10028005-100 = "車両の連結を確認。異常なし！"
10028005-101 = "……出発する！！"
10028005-107 = "…………。"
10028005-108 = "…………♪"
10028005-113 = "#video;10028"
