[translation]
104060-1 = "Episódio 6; Condições iguais"

104060-7 = "Análise da situação... confirmou que a ligação com Utnapishtim foi desligada. Experimente um desvio."

104060-11 = "...A tentativa falhou. O acesso ao Utnapishtim foi bloqueado. Eu não posso intervir."

104060-15 = "Confirme se a supressão da "interpretação multidimensional" é mantida - acelere o cálculo e tente novamente a destruição."

104060-19 = "Não é possível acelerar os cálculos. Confirme o processo de manifestação do Santuário Terrestre [rubi=Encarnação]um. Confirme a manifestação temporária."

104060-23 = "Verifique se há corrupção de objetos temporários. Impossível manifestar."

104060-24 = "...Se isto continuar, o plano irá falhar."

104060-25 = "……."

104060-36 = "...Verifique o status. Confirmamos que a ``Sequência de Autodestruição'' para ``A Arca de Atlas Hasith'' está em preparação."

104060-37 = "Após a ativação da sequência, a arca explode e entra em disposição final. A função “Interpretação Multidimensional” será excluída permanentemente."

104060-38 = "...Tome medidas imediatas――"

104060-42 = "--Não pode ser calculado. Devido à falta de recursos, o Processo de Manifestação do Sanctuum[/ruby]se..."

104060-43 = "...Foi cancelado."

104060-51 = "Eu fiz isso... certo?"

104060-52 = "Ei, o que vai acontecer agora? #nEsse lugar vai explodir...?"

104060-53 = "Talvez seja isso que significa, certo?"

104060-58 = "……."

104060-59 = "Ah, Fuuka-san?"

104060-64 = "Talvez a tensão tenha diminuído... Obrigado pelo seu trabalho duro, Fuuka-san."

104060-65 = "Então, os preparativos terminaram, certo?"

104060-66 = "Sim, deveria ser assim..."

104060-67 = "Hehehe..."

104060-68 = "Uau, por que você está sorrindo tão desconfiado de novo?"

104060-70 = "um! Eu tenho que ir ajudar meu professor! !"

104060-71 = "Ah, isso mesmo... professora..."

104060-72 = "Sim. É apenas uma refeição que você pode terminar até o último prato."

104060-73 = "A batalha ainda não acabou. #nAgora, vamos terminar."

104060-74 = "A amizade é realmente maravilhosa, não é?"

104060-75 = "Bem, era isso que eu estava imaginando... mas não consigo evitar."

104060-80 = "Vamos! !"

104060-81 = "Vou carregar Fuuka nas costas! Vamos! !"

104060-83 = "A cor do céu mudou de novo...!"

104060-84 = "Você finalmente conseguiu! #nA sequência de autodestruição de “A Arca” também começou a se mover."

104060-85 = "Bem, tudo o que resta agora é pegar a professora e Shiroko-chan e escapar antes da explosão."

104060-86 = "...Estamos indo para o professor! #n Ayane-chan, por favor, fuja primeiro!"

104060-87 = "Não... eu também escaparei depois de me encontrar com meu professor e os mais velhos! #nPor favor, fique comigo até então."

104060-88 = "mas……."

104060-89 = "Pois bem, por favor, continue até o fim, Ayane-chan. #nDeixei a orientação para você."

104060-90 = "sim! Então, vamos embora imediatamente! !"

104060-91 = "Vamos! !"

104060-94 = "Você me ouviu, se apresse! #nVou usar a “sequência de fuga” criada pelo Presidente Rio!"

104060-95 = "O que é aquilo? ...Onde está o departamento de desenvolvimento de jogos agora?"

104060-96 = "No momento estamos indo para a área central da Arca!"

104060-97 = "Sim! Vou ajudar o professor!"

104060-98 = "Sim, é daqui mesmo...! !"

104060-99 = "Bem, você pode escapar a qualquer momento...!"

104060-100 = "um pouco! ?"

104060-104 = "Ah, agora eu entendo! #nDepois, quando o professor voltar, a gente foge! ?"

104060-105 = "sim! Por favor, deixe comigo, Yuka!"

104060-110 = "O céu..."

104060-111 = "Ver? Surpreendentemente legal, certo?"

104060-112 = "Sim. Confirmamos que o “Sanctum of Illusion” que apareceu desapareceu."

104060-113 = "Terminei de limpar e acompanhar Toki-chan, mas o que mais devo fazer?"

104060-114 = "Bem, só há uma coisa a fazer, certo?"

104060-117 = "Vou esperar o professor voltar."

104060-118 = "……Sim! Então estou confiante!"

104060-119 = "No entanto, a situação ainda é imprevisível...#nPrecisamos ficar de olho em outras áreas também."

104060-120 = "Sim, está certo. Mas tenho certeza que vai ficar tudo bem."

104060-122 = "advertência. A ``sequência de suicídio'' para ``A Arca de Atlas Hasith'' está sendo preparada. Se a sequência for ativada, a chance de sobrevivência dentro da nave após a explosão é inferior a 0,0003%."

104060-123 = "[ruby=Sunao Okami] Sand Wolf Shiroko [/ruby] Loco, Sand Wolf Shiroko, [NOME DE USUÁRIO] Sensei. Eu prevejo que todos eles morrerão. Precisamos urgentemente de conceber uma contramedida."

104060-127 = "...Eu vejo."

104060-128 = "Sim... ganhando tempo. #n――Eu acreditava que todos conseguiriam sobreviver."

104060-129 = "[s] \"Porque acredito em todos.""

104060-133 = "Sim, não me importo se não ganhar."

104060-134 = "Basta ganhar com [ruby=・]mi[/ruby][ruby=・]n[/ruby][ruby=・]na[/ruby]."

104060-135 = "Todo mundo, certo..."

104060-136 = "[s] \"Sim. Todos estarão aqui em breve.""

104060-137 = "Uma força-tarefa – e uma “placa de Petri”."

104060-141 = "[ns] \"Vou impedi-lo até então. --Há palavras que quero transmitir.\""

104060-142 = "As palavras que quero transmitir..."

104060-143 = "No momento, estamos projetando uma solução alternativa. Existe uma solução. De agora em diante, seguirei um caminho diferente para Utnapishtim――"

104060-144 = "...Não, não é necessário."

104060-148 = "Cada vez que tento, obtenho o mesmo resultado repetidamente. #nTenho certeza que o professor vai superar a crise novamente."

104060-149 = "Vamos ficar juntos e lutar contra isso – certamente, isto é uma ameaça."

104060-150 = "É assim que você faz – você criou milagres muitas vezes até agora."

104060-156 = "Nesse caso, você deve primeiro se livrar do “professor”."

104060-157 = "Então, a autodestruição da Arca, a manifestação do Santuário...#nEu poderia fazer tudo de novo."

104060-158 = "Se não houver [ruby=・]primeiro[/ruby][ruby=・]raw[/ruby]."

104060-159 = "sim. Se eu não tiver professor... tudo vai desmoronar."

104060-160 = "Portanto, usaremos todas as nossas forças."

104060-166 = "...Verifique as instruções. Suporte de cálculo cancelado para "Caixa de Shittim". #nMude para o modo de suporte de combate."

104060-172 = "[ns] \"O local mudou...?\""

104060-173 = "De agora em diante, alocarei todas as minhas habilidades para apoiar o combate."

104060-174 = "[s1] \"Eu também tenho uma Alona super talentosa!!\"\n[s2] \"Alona!!\""

104060-177 = "sim! ! Super Alona estará ajudando os professores a partir de agora! !"

104060-178 = "Não importa quem seja, Arona não perdoará ninguém que fizer mal ao [NOME DE USUÁRIO] sensei!"

104060-179 = "Não, não vou deixar você machucar o professor."

104060-180 = "……sim. Tenho certeza de que ambos sentimos o mesmo."

104060-181 = "Mas, senhor. Não pense que as condições são as mesmas. #nAs batalhas que vivi são de uma escala diferente da sua."

104060-182 = "Mesmo que o desempenho de “Shittim's Box” seja o mesmo, a diferença na experiência não pode ser superada."

104060-183 = "[ns3] \"………….\"\n[ns4] Retire o cartão do adulto."

104060-187 = "...Isso mesmo, o professor tinha razão."

104060-188 = "Na verdade, se fosse esse o caso, eu poderia ignorar todas as cartas da minha mão e alcançar a vitória."

104060-189 = "Mas... não é como se você tivesse esquecido, certo? professor."

104060-190 = "Quem [ruby=・]Quem[/ruby] são os Prenapates na sua frente?"

104060-199 = "Bem, professora...! ? P-Prenapates também tirou alguma coisa...! !"

104060-200 = "Ah, isso...! ! ?"

104060-203 = "...! ?"

104060-204 = "[ns] \"………………………………!!\""

104060-205 = ""Cartão adulto" vs. "cartão adulto"..."

104060-206 = "Nesse caso, qual “carta” vencerá?"

104060-208 = "Próxima vez; mesma situação, mesma escolha"

