[translation]
104060-1 = "第6話;同等の条件"
104060-7 = "状況分析……ウトナピシュティムとの接続解除を確認。迂回路を試行します。"
104060-11 = "……試行失敗。ウトナピシュティムへのアクセスが遮断されています。介入できません。"
104060-15 = "「多次元解釈」の抑制が維持されていることを確認――演算を加速し、破壊を再試行。"
104060-19 = "演算の加速が不可能。地上サンクトゥ[ruby=インカーネーション]ムの顕現プロ[/ruby]セスを確認。一時的な顕現を確認。"
104060-23 = "一時オブジェクトの破損を確認。顕現不可能。"
104060-24 = "……このままでは、計画が失敗します。"
104060-25 = "……。"
104060-36 = "……状態を確認。「アトラ・ハシースの箱舟」の「自爆シーケンス」が準備中であることを確認しました。"
104060-37 = "シーケンス起動時、箱舟は爆発および最終処理に移行。「多次元解釈」機能は永久消滅します。"
104060-38 = "……すぐに対処を――"
104060-42 = "――演算不可能。リソース不足により、サンクトゥ[ruby=インカーネーション]ムの顕現プロ[/ruby]セスが――"
104060-43 = "……キャンセルされました。"
104060-51 = "やった……んだよね？"
104060-52 = "ねえ、これからどうなっちゃうの～？#nここが爆発しちゃうの……？"
104060-53 = "多分、そういうことですよね？"
104060-58 = "……。"
104060-59 = "あら、フウカさん？"
104060-64 = "おそらく緊張が解けたのでしょう……お疲れ様でした、フウカさん。"
104060-65 = "じゃ、準備は終わったんだよね？"
104060-66 = "ええ、本来であればそうですが……"
104060-67 = "うふふ……。"
104060-68 = "うわっ、何でまた怪しい笑顔を浮かべてるのよ……"
104060-70 = "あ！先生を助けに行かなきゃ！！"
104060-71 = "そ、そうだった……先生……"
104060-72 = "ええ。最後の一品まで平らげてこそ、コース料理というもの。"
104060-73 = "まだ戦いは終わっておりません。#nさあ、仕上げとまいりましょうか。"
104060-74 = "友情って本当に素晴らしいですよね★"
104060-75 = "ま、だいたい想像してたけど……仕方ないわね。"
104060-80 = "いくわよ！！"
104060-81 = "フウカは私がおんぶするね～！いっくよ～！！"
104060-83 = "空の色がまた変わった……！"
104060-84 = "ついに成功したんですね！#n「箱舟」の自爆シーケンスも動き始めました。"
104060-85 = "んじゃ後は……爆発前に先生とシロコちゃんを連れて脱出するだけ、かな？"
104060-86 = "……私たちは先生の所に行ってきます！#nアヤネちゃんは先に脱出しててください！"
104060-87 = "いえ……私も、先生と先輩方と合流してから脱出します！#nそれまでご一緒させてください。"
104060-88 = "でも……。"
104060-89 = "んじゃ、最後までよろしくねアヤネちゃん。#n案内は任せたよ。"
104060-90 = "はい！それでは、すぐに移動しましょう！！"
104060-91 = "行くわよ！！"
104060-94 = "聞こえてたでしょ、あんた達も急いで！#nリオ会長が作った「脱出シーケンス」を使うわよ！"
104060-95 = "ってあれ？……ゲーム開発部は今どこにいるの？"
104060-96 = "現在、箱舟の中央エリアに向かっています！"
104060-97 = "うん！先生を助けに行くよ！"
104060-98 = "はい、ここからすぐなので……！！"
104060-99 = "だ、脱出は、いつでもできる、から……！"
104060-100 = "ちょっと！？"
104060-104 = "ああもう……分かったわよ！#nじゃあ、先生が戻ってきたら脱出するからね！？"
104060-105 = "はい！任せてくださいユウカ！"
104060-110 = "空が……。"
104060-111 = "ほらな？案外イケただろ？"
104060-112 = "ええ。出現していた「虚妄のサンクトゥム」の消滅を確認しました。"
104060-113 = "お掃除もトキちゃんの護送も終わったけど、あと何したらいいの～？"
104060-114 = "そりゃあ、やる事は1つだろ？"
104060-117 = "先生が帰ってくるのを、待つんだよ。"
104060-118 = "……うん！それなら私、自信あるよ～！"
104060-119 = "ですが、依然として予断を許さない状況です……#n他の地域にも目を配る必要がありますから。"
104060-120 = "うん、そうだね。でも、きっと大丈夫。"
104060-122 = "警告。「アトラ・ハシースの箱舟」の「自爆シーケンス」が準備中。当該シーケンスが起動した場合、爆発後の船内における生存確率は0.0003%以下です。"
104060-123 = "[ruby=すなおおかみ]  砂狼シ[/ruby]ロコ、砂狼シロコ、[USERNAME]先生。全員死亡と予測します。至急、対処法の設計が必要――"
104060-127 = "……そっか。"
104060-128 = "そう……時間稼ぎ。#n――みんながやり遂げるって信じてたんだ。"
104060-129 = "[s] \"みんなを信じてるからね。\""
104060-133 = "そう――私が勝てなくても構わない。"
104060-134 = "[ruby=・]み[/ruby][ruby=・]ん[/ruby][ruby=・]な[/ruby]で勝てばいいから。"
104060-135 = "みんなで、ね……。"
104060-136 = "[s] \"うん。もうすぐみんなが来てくれる。\""
104060-137 = "対策委員会が――そして「シャーレ」が。"
104060-141 = "[ns] \"それまで阻止するよ。――伝えたい言葉があるから。\""
104060-142 = "伝えたい言葉……。"
104060-143 = "対処法を設計中。解決策は存在します。これより、別ルートでウトナピシュティムを――"
104060-144 = "……いや、必要ない。"
104060-148 = "試したところで、同じ結果が繰り返されるだけ。#n先生なら、また危機を乗り越えるだろうね。"
104060-149 = "みんなと力を合わせて立ち向かう――たしかに、これは脅威だね。"
104060-150 = "先生はそうやって――今まで何度も奇跡を生み出してきたから。"
104060-156 = "なら、最初に「先生」を始末すればいい。"
104060-157 = "そうしたら、箱舟の自爆も、サンクトゥムの顕現も……#nいくらでもまたやり直せる。"
104060-158 = "[ruby=・]先[/ruby][ruby=・]生[/ruby]がいなければ。"
104060-159 = "そう。先生さえいなければ……全部、崩れるから。"
104060-160 = "だから、私たちの力を全てぶつける。"
104060-166 = "……指示を確認。「シッテムの箱」の演算支援を中止。#n戦闘支援モードに切り替えます。"
104060-172 = "[ns] \"場所が、変わった……？\""
104060-173 = "これより、私の能力を全て戦闘支援に割り当てます。"
104060-174 = "[s1] \"私にも、超有能なアロナちゃんがいる！！\"\n[s2] \"アロナ――ッ！！\""
104060-177 = "はい！！今からスーパーアロナが、先生をお手伝いします！！"
104060-178 = "相手が誰であろうと、[USERNAME]先生に悪さをする人は、このアロナが許しません！"
104060-179 = "ん、先生を傷つけさせない。"
104060-180 = "……そう。きっと、お互い同じ気持ちだと思う。"
104060-181 = "でも、先生。同じ条件だと思わないで。#n私が経験してきた戦いは、あなた達のソレとは規模が違う。"
104060-182 = "「シッテムの箱」の性能が同等であっても、経験の差は埋まらない。"
104060-183 = "[ns3] \"…………。\"\n[ns4] 大人のカードを取り出す。"
104060-187 = "……そうだね、先生にはソレがあったね。"
104060-188 = "確かにソレなら、全ての手札を無視して勝利を手に入れられるかもしれない。"
104060-189 = "でも……忘れたわけじゃないでしょう？先生。"
104060-190 = "あなたの前にいるプレナパテスが、[ruby=・]誰[/ruby]なのか。"
104060-199 = "せ、先生……！？ぷ、プレナパテスも、何かを取り出しました……！！"
104060-200 = "あ、あれは……！！？"
104060-203 = "……！？"
104060-204 = "[ns] \"…………………………！！\""
104060-205 = "「大人のカード」対「大人のカード」……"
104060-206 = "その場合、どちらの「カード」が勝つんだろうね？"
104060-208 = "次回;同じ状況、同じ選択"
