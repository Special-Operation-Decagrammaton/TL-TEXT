[translation]
10009055-3 = "……Mais um pouco, só mais um pouco."
10009055-4 = "Por favor, espere. Só mais um pouco e, com minhas próprias mãos, eu irei..."
10009055-8 = "……！"
10009055-13 = "Chega disso."
10009055-14 = "Você é aquela que estava ao lado do Sensei naquele momento..."
10009055-15 = "Não sei por que você está mirando no Sensei, mas..."
10009055-16 = "O perigo deve ser eliminado antes que brote."
10009055-17 = "……Fufufu, é mesmo?"
10009055-18 = "Não tente resistir inutilmente, pois já está..."
10009055-22 = "Te encontrei, não vou deixar você escapar desta vez! Sua raposa do desastre!"
10009055-27 = "Chega disso, Wakamo!"
10009055-28 = "Desta vez... desta vez eu não vou deixar você escapar, entendeu!?"
10009055-29 = "Se você escapar de novo, isso vai afetar minhas notas...!"
10009055-31 = "Po-por favor, renda-se pacificamente!"
10009055-35 = "Haa... já estou exausta..."
10009055-37 = "Xeque-mate, eu diria?"
10009055-38 = "……Entendo, bem, não importa."
10009055-39 = "Fufufu... de qualquer forma, é só desta vez."
10009055-40 = "……？"
10009055-44 = "Em breve..."
10009055-51 = "Na-não vou deixar você escapar!"
10009055-52 = "Peguem ela!"
10009055-62 = "……Então é isso, o importante é que conseguimos capturá-la em segurança!"
10009055-63 = "De alguma forma, a resistência dela foi mais intensa do que nunca..."
10009055-64 = "……Não consigo parar de pensar naquelas últimas palavras."
10009055-65 = "[s] \"Sena?\""
10009055-66 = "……Não, talvez eu esteja pensando demais."
10009055-67 = "Além disso, essa já é a quinta fuga, não é..."
10009055-68 = "Será que a Academia de Polícia Valkyrie é..."
10009055-70 = "Incompetente em vários aspectos, né? A consciência de segurança é baixa demais."
10009055-71 = "[s] \"Chihiro!\""
10009055-72 = "Ei, Sensei. Acabei de terminar de verificar toda a segurança por aqui."
10009055-73 = "Nos reencontramos mais cedo do que eu pensava. Bem, apesar disso, parece que muita coisa aconteceu de novo..."
10009055-74 = "De qualquer forma, a segurança desta área está garantida. A Veritas deu uma olhada e fiz os ajustes necessários."
10009055-75 = "Mas o maior problema é que... a Valkyrie, que deveria ser o pilar da manutenção da ordem pública, tem uma segurança terrível."
10009055-76 = "Ei, está tudo bem por aí?"
10009055-77 = "[s] \"Bem, vendo o que aconteceu até agora, provavelmente é verdade...\""
10009055-79 = "Be-bem, não tenho como rebater isso, mas..."
10009055-80 = "Mas veja só!"
10009055-81 = "Is-isso mesmo! Como pode ver, nós a capturamos novamente!"
10009055-82 = "Além disso, após os eventos de agora pouco, a Chefe do Departamento de Segurança disse que tomaria medidas especiais!"
10009055-83 = "[s] \"Medidas especiais?\""
10009055-84 = "Sim. Como a Wakamo continua escapando da prisão repetidamente, a Chefe do Departamento de Segurança finalmente ficou pálida de preocupação."
10009055-85 = "Parece que ela finalmente admitiu a falta de capacidade e começou a dizer que vai colaborar com as organizações de segurança de outras escolas."
10009055-86 = "Justamente com quem tem experiência, por assim dizer. Entramos em contato com as pessoas que lidaram com a \"Raposa do Desastre\" junto com o Sensei anteriormente."
10009055-87 = "[s] \"Ah, então isso significa que...\""
10009055-94 = "É exatamente isso. Desculpe a demora, Sensei."
10009055-95 = "Causar um tumulto logo no Dia dos Namorados..."
10009055-96 = "Não podemos deixar que estraguem o momento em que todos estão se divertindo."
10009055-98 = "Só enfrentei a \"Raposa do Desastre\" algumas vezes, mas se puder ser de alguma ajuda, aqui estou. Vim em nome do Comitê Disciplinar."
10009055-99 = "Sendo assim... conto com você, Chinatsu."
10009055-100 = "Sim, é uma ocasião especial, afinal."
10009055-101 = "Faz tempo que não nos reunimos assim, não é? Com esse grupo..."
10009055-102 = "De qualquer forma, nós também vamos colaborar, então pode ficar tranquilo."
10009055-103 = "[s] \"Obrigado a todos!\""
10009055-105 = "Conto com vocês!"
10009055-106 = "Além disso, o lado da Valkyrie também aumentou a escala da segurança, então não deixaremos nem um rato escapar!"
10009055-107 = "Então, desta vez, pode confiar na gente, tá?"
10009055-109 = "……Por precaução, eu também vou me juntar a vocês."
10009055-110 = "É preocupante demais deixar isso de lado."
10009055-111 = "[s] \"A dupla Chihiro e Yuuka!\""
10009055-112 = "Ah, é, da Veritas...?"
10009055-113 = "B-bem, é verdade. Sendo a vice-diretora da Veritas, é muito reconfortante..."
10009055-114 = "Que raro, a Seminar puxando o saco. Será que é porque o Sensei está aqui?"
10009055-115 = "Bem, vou aceitar como algo raro e ser grata por isso."
10009055-116 = "……!"
10009055-120 = "Então,"
10009055-121 = "já vou indo, Sensei."
10009055-122 = "[s] \"Sim, tome cuidado.\""
10009055-128 = "Com todos eles reunidos, parece que podemos ficar bem tranquilos."
10009055-129 = "Então, vamos nos esforçar na patrulha até o fim, Sensei."
10009055-130 = "[s] \"……Sim, vamos.\""
