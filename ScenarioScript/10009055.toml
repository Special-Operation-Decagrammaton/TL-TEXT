[translation]
10009055-3 = "……もう少し、もう少しです。"
10009055-4 = "待っていてください。あと少しすれば、私の手で直に……"
10009055-8 = "……！"
10009055-13 = "そこまでです。"
10009055-14 = "あなたは、あの時先生のそばにいた……。"
10009055-15 = "どうして先生を狙っているのかは分かりませんが……"
10009055-16 = "危険は、その芽が出ぬうちに。"
10009055-17 = "……ふふふっ、左様ですか。"
10009055-18 = "余計な抵抗はしないように、すでに――"
10009055-22 = "見つけた、もう逃さないぞ！災厄の狐め！"
10009055-27 = "そこまでだ、ワカモ！"
10009055-28 = "今度こそ……今度こそ逃さないからな！？"
10009055-29 = "これ以上逃したら、成績に影響が……！"
10009055-31 = "お、おっ、おとなしく投降してください！"
10009055-35 = "はぁーっ……もうすでに疲れた……。"
10009055-37 = "チェックメイト、だと思いますが？"
10009055-38 = "……なるほど、まあ構いません。"
10009055-39 = "ふふふっ……どうせ、もうこれっきりです。"
10009055-40 = "……？"
10009055-44 = "もうすぐ……"
10009055-51 = "に、逃がすかっ！"
10009055-52 = "捕まえろーっ！"
10009055-62 = "……ってわけで、無事捕まえられて何より！"
10009055-63 = "何だか、今まで以上に抵抗が激しかったですね……。"
10009055-64 = "……どうしても気になりますね、最後の言葉。"
10009055-65 = "[s] \"セナ？\""
10009055-66 = "……いえ、考えすぎかもしれません。"
10009055-67 = "それより、これで計五回目の脱出ですか……"
10009055-68 = "もしかしてですが、ヴァルキューレ警察学校というのは……"
10009055-70 = "色んな側面でダメダメだね。セキュリティ意識が低すぎる。"
10009055-71 = "[s] \"チヒロ！\""
10009055-72 = "やぁ、先生。ちょうど今、その辺のセキュリティの点検を一通り終わらせてきたところ。"
10009055-73 = "思ったより早い再会だったね。まあその割に、また色々と起きてたみたいだけど……。"
10009055-74 = "とりあえず、この辺一帯のセキュリティは大丈夫。ヴェリタスでちゃんと見て、必要な分は微調整しておいたから。"
10009055-75 = "でも一番大きな問題があって……治安維持の要を担ってるはずのヴァルキューレ、そのセキュリティが酷いのなんのって。"
10009055-76 = "ねぇ、色々と大丈夫？"
10009055-77 = "[s] \"まあ、これまでの経緯を見てると多分その通りなんだろうね……。\""
10009055-79 = "ま、まぁ反論の余地は無いけど……で、"
10009055-80 = "でもほら！"
10009055-81 = "そ、そうです！あのようにまた捕まえましたので！"
10009055-82 = "それに先ほどまでの事態を受けて、警備局長もとっておきの対策を行うと仰ってましたし！"
10009055-83 = "[s] \"とっておきの対策？\""
10009055-84 = "うん。ワカモがこう何度も何度も脱獄を繰り返すせいで、警備局長もついに顔が真っ青になっちゃってさ。"
10009055-85 = "ちゃんと力不足を認めて、他の学校の治安維持組織とかと連携して対応に当たるって言い始めたらしいよ。"
10009055-86 = "ちょうど、経験者と言いますか。以前「災厄の狐」さんが脱獄した際に、先生と一緒に対応されていた方々と連絡が取れまして。"
10009055-87 = "[s] \"あ、っていうことはもしかして……。\""
10009055-94 = "そういうことです。お待たせしました、先生。"
10009055-95 = "よりによってバレンタインデーに暴れるだなんて……。"
10009055-96 = "せっかく皆さんが楽しまれているところを、荒らさせるわけにはいきませんから。"
10009055-98 = "「災厄の狐」と交戦したのは数回程度ですが、それでも何かお役に立てるのであれば。そういうことで、風紀委員会より参りました。"
10009055-99 = "そういうことで……よろしくお願いしますね、チナツさん。"
10009055-100 = "はい、せっかくのイベントですし。"
10009055-101 = "何だか久しぶりね、この面子……。"
10009055-102 = "とにかく私たちも協力しますので、安心してください。"
10009055-103 = "[s] \"みんな、ありがとう！\""
10009055-105 = "よろしくお願いします！"
10009055-106 = "それに、ヴァルキューレ側も勿論警備の規模を拡大していますから、もうネズミ一匹逃がしませんよ！"
10009055-107 = "ってわけで、今度こそ私たちを信じてよ？"
10009055-109 = "……念のため、私も合流する。"
10009055-110 = "放っておくには心配すぎるし。"
10009055-111 = "[s] \"チヒロとユウカのコンビ！\""
10009055-112 = "えっ、あ、ヴェリタスの……？"
10009055-113 = "ま、まあ、そうですね。あのヴェリタスの副部長ですから、すっごく心強くは……"
10009055-114 = "珍しいね、セミナーのごますりなんて。先生の前だからかな？"
10009055-115 = "まあ、珍しいものとして有難く受け取っておくよ。"
10009055-116 = "……っ！"
10009055-120 = "じゃ、"
10009055-121 = "行ってくるね。先生。"
10009055-122 = "[s] \"うん、気を付けてね。\""
10009055-128 = "あそこまで揃っているなら、それなりに安心できそうですね。"
10009055-129 = "では。最後までパトロール頑張りましょうか、先生。"
10009055-130 = "[s] \"……うん、そうだね。\""
