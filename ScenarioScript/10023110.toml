[translation]
10023110-1 = "エピローグ;ハッピーエンドは、いつまでも！"
10023110-5 = "……"
10023110-6 = "……"
10023110-7 = "ひぃ……"
10023110-9 = "うわあぁぁぁん！ネル先輩が怒ってます！アリス、怖いです！"
10023110-11 = "あのな、お前ら……"
10023110-12 = "許して、ネル先輩！"
10023110-13 = "……あぁ？何の事だよ。"
10023110-14 = "わざわざ言わせないと気が済まないの？#nひどいよ先輩！"
10023110-15 = "いや、だから何の事だよ……"
10023110-16 = "みんな、ごめんね！#n私が……私が最初から断ってたら……こんな事にはならなかったはずなのに……！"
10023110-17 = "もう終わりだよ……ネル先輩はカンカンだし……ゲーム開発部は廃部に……#nC&Cの名前を騙った罪は重い……"
10023110-18 = "うぅ……頑張って守ってきた部活なのに……#nアリスもユズも、こうして一緒に居られるようになったのに……！"
10023110-20 = "モモイ……"
10023110-21 = "な、泣かないでください。モモイ、アリスは……"
10023110-22 = "アリスたちは大丈夫です。#n離れていても心は一緒だと、アリスは学びました……！"
10023110-24 = "はぁ……お前ら、何か勘違いしてるみたいだけどよ……"
10023110-25 = "あたしはまだ何も……"
10023110-26 = "って、いつもあたしの事そう思ってたのか！？"
10023110-27 = "ふふ、どうでしょう？"
10023110-28 = "おい、自業自得だって言いてぇのか！？"
10023110-30 = "先輩方、申し訳ありません。"
10023110-31 = "証拠品は確保しましたが、容疑者を捕らえることができず……"
10023110-33 = "ああ、それはあたしらが捕まえたから気にすんな。"
10023110-34 = "いえ。私の不手際で先輩方のお手を煩わせてしまったので……"
10023110-35 = "別に、んなこと気にすんなよ。#n終わり良ければ全て良しっつうだろ。"
10023110-36 = "んで……"
10023110-41 = "お前ら。"
10023110-46 = "ひぃっ！？"
10023110-47 = "い、命だけは……！"
10023110-49 = "お待ちください、ネル先輩。"
10023110-50 = "あぁん？"
10023110-51 = "今回の件……あまりゲーム開発部を責めないでください。"
10023110-52 = "ほう？"
10023110-53 = "ゲーム開発部は何も悪くありません。"
10023110-54 = "本来であれば、先輩方に連絡し、応援を待つべきだったところを、私はしませんでした。"
10023110-55 = "そして、ゲーム開発部の仲間として――友人として。#n共に戦う道を選びました。"
10023110-56 = "ですから……もし彼女たちに責任があると言うのなら、私も一緒に。"
10023110-58 = "そ、そうです。ネル先輩！#nトキとアリスは仲間です。友達です！"
10023110-59 = "友達が困っていたら、助け合うとゲームで学びました。#nなので、なので……"
10023110-61 = "いや、だから……あたしが言いたいのはな……"
10023110-62 = "なんだ、その……"
10023110-63 = "よくやった、って。"
10023110-68 = "えっ……？"
10023110-69 = "はっ！？あなたネル先輩そっくりの偽物とかじゃないよね？"
10023110-71 = "なに言ってんだ！"
10023110-72 = "ったく、人が褒めてやってんのによ……"
10023110-74 = "えっと……本当に、許してくれるんですか……？"
10023110-75 = "あぁん？"
10023110-79 = "許すも何も、結果的にちゃんと解決させたんだろ。"
10023110-80 = "ならそれで良いって。容疑者も捕まって、証拠品も揃ってるわけだしな。"
10023110-81 = "あとは全部ヴァルキューレに渡すだけだろ？"
10023110-86 = "（ネル先輩……身長は小さいけど器は大きいのかも……）"
10023110-87 = "（お姉ちゃん！言葉に気をつけて！聞こえたらどうするの！）"
10023110-93 = "んで、トキ、お前も……"
10023110-94 = "はい、どんな処分も受け入れる覚悟は出来ています。"
10023110-95 = "だから、そうじゃねぇって……あぁ、ったくよ！"
10023110-96 = "まず、なんでバニーガールなんだ？"
10023110-97 = "もちろん潜入作戦だからです。"
10023110-101 = "……はぁ。"
10023110-102 = "だから、あん時あれほど着たくないって……"
10023110-104 = "ん？リーダー、あんなに似合ってたのに？"
10023110-105 = "あはは！トキちゃんも可愛いね！"
10023110-110 = "ありがとう、ございます……"
10023110-111 = "とにかく！"
10023110-112 = "あたしが言いたいのはだな……"
10023110-114 = "はい。自粛、謹慎、監禁、どんな内容でも受け入れますので。"
10023110-115 = "だから！"
10023110-116 = "あぁもう……"
10023110-117 = "[s1] \"ネルはトキを褒めてるんだよ。\"\n[s2] \"置いてけぼりにしちゃった事、謝りたいんだよね。\""
10023110-121 = "せ、先生！？！？"
10023110-122 = "くそ……先生がいる事忘れてた……！"
10023110-124 = "それは、一体どういう……？"
10023110-125 = "あぁもう！だから！"
10023110-129 = "……よくやったな。それと……悪かったよ。"
10023110-130 = "だから、なんだ。その……お前を置いていきたかったわけじゃねぇから。"
10023110-131 = "今回は急な任務で、お前一人に任せるしか無かったんだよ。#nでも、最後までやり遂げてくれたし……"
10023110-132 = "その……お疲れさん。"
10023110-134 = "ふふ、そういう事です、トキちゃん。#nリーダーはこういう時、素直じゃないですからね。"
10023110-135 = "余計なこと言うんじゃねぇよ！"
10023110-136 = "だってさ、トキちゃん！良かったね！"
10023110-142 = "……ありがとうございます。"
10023110-144 = "はぁ……疲れたぁ～#nこんだけ苦労したのに、報酬どころか依頼自体が無くなっちゃったし……無駄骨だよ。"
10023110-145 = "でも、次回作のネタにはなったんじゃない？"
10023110-146 = "次回作……？"
10023110-147 = "あ～たしかに……ネタだけならたくさんね……"
10023110-148 = "[s] \"あ、そういえば。ヴァルキューレから懸賞金が貰えるはずだよ。\""
10023110-149 = "え……？懸賞金って、どういう事？#nそんなの初めて聞いたよ？"
10023110-150 = "[s3] \"私もさっき知ったんだけど、この盗品は……\"\n[s4] \"ヴァルキューレも探してたみたいで。\""
10023110-153 = "クエスト達成報酬ですね！#nパンパカパーン！アリスたちは懸賞金を手に入れました！"
10023110-156 = "あっ！じゃあ、そのお金でプライステーションが――"
10023110-157 = "もっと良い使い道があるよね、お姉ちゃん！？"
10023110-158 = "なんでぇ！私たちはゲーム開発部だよ！#nゲーム開発部がゲームに投資しないで、どこに投資するっていうの！"
10023110-160 = "アリス、考えがあります！"
10023110-161 = "ゲーム開発部の部長はユズです！ユズに決めてもらいましょう！"
10023110-167 = "……一つ考えが、ある……"
10023110-168 = "え？なになに？"
10023110-169 = "そのお金は……次回作の開発費に使うのはどうかな。"
10023110-170 = "次回作の開発費……？"
10023110-172 = "……そういえばセミナーに貰った[ruby=R&D]研究開発費[/ruby]が、そろそろ底を尽きそうだね……"
10023110-173 = "流石はユズです！"
10023110-175 = "わたし達が……ここで得た経験を生かせば、"
10023110-176 = "もっと面白い物が作れるかも……"
10023110-178 = "そうだね！私に良いアイデアあるよ！"
10023110-179 = "聞いて聞いて！えっとね――"
10023110-180 = "口頭じゃなくて、ちゃんと企画書にしてよ……お姉ちゃん。"
10023110-181 = "そ、そんな……私は企画書が苦手なんだぞ、妹よ。"
10023110-182 = "シナリオライター兼プランナーなのに、企画書が苦手でどうするの！"
10023110-184 = "帰ったら……すぐコーディングの準備をしないと……"
10023110-186 = "待って！この溢れるアイデアを上手く形にするためにも……"
10023110-187 = "とりあえずゲームしない？"
10023110-188 = "それはダメ！どうせ遊んでる間にアイデアがどこかに消えてしまった～とか言うでしょ！"
10023110-190 = "アリス、いつでも準備できてます！"
10023110-192 = "みんな元気いっぱいだね……ふふっ……"
10023110-197 = "（そうして、急に訪れた非日常からいつもの日常へと戻っていき――）"
10023110-198 = "（彼女たちは楽しそうに夜更けまで遊んでいた）"
10023110-200 = "（そうして、誰もが寝静まる頃……）"
10023110-204 = "[ns] \"モモイ。\""
10023110-205 = "ん？どうしたの、先生？"
10023110-206 = "[s] \"本当に大変だったね……\""
10023110-207 = "うん……"
10023110-208 = "一時はどうなる事かと思ったよ……"
10023110-209 = "でもね！"
10023110-210 = "[s] \"ん……？\""
10023110-211 = "ミドリも、ユズも、アリスも！#n――それに、トキも。一緒にいてくれたから！"
10023110-212 = "大変だったけど、本当にすっごくすっごく楽しかったよ！"
10023110-213 = "先生はどうだった？"
10023110-214 = "[s] \"うん、私も楽しかったよ。\""
10023110-215 = "へへっ、良かった！"
10023110-220 = "（モモイたちゲーム開発部の笑顔は、これまで以上に輝いて見えた）"
10023110-225 = "\"……うん、もちろん。みんな大切な生徒だよ。\""
10023110-233 = "……"
10023110-237 = "\"……うん、もちろん。みんな大切な生徒だよ。\""
10023110-238 = "……先生。"
10023110-242 = "\"……うん、もちろん。みんな大切な生徒だよ。\""
10023110-243 = "ふう……"
10023110-244 = "こんなにも、胸が締めつけられるなんて……この鼓動は一体……"
10023110-245 = "ですが苦しくは……むしろ、幸せな気持ちに。"
10023110-246 = "何故でしょう。先生なら、この答えを知っているのでしょうか？"
10023110-247 = "……"
10023110-248 = "私に盗めない物などありません。いつだって……大切な物は皆のために。"
10023110-249 = "人は生まれながらにして名を持つわけでは無い。それは、心も同様です。#n……人生とは、常に選択の連続である、と。"
10023110-250 = "先生、いつの日か――"
10023110-256 = "――この気持ちの名を、頂きに参ります。"
10023110-259 = "白亜の予告状～一虚飾の館と美学の在り処～"
