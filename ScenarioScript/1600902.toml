[translation]
1600902-1 = "忍者少女は気難しい"
1600902-3 = "（いつものようにシャーレで仕事をしていると……）"
1600902-8 = "[ns] \"……そろそろお昼でも食べようかな。\""
1600902-9 = "（仕事がひと段落して立ち上がろうとしたその時、何か変な音が聞こえた）"
1600902-12 = "[ns] \"……とりあえず今日は時間も無いし、カップ麺で良いかな。\""
1600902-14 = "[ns] \"あとは3分待って……\" "
1600902-16 = "（おとなしくカップ麵が出来上がるのを待っていると……）"
1600902-21 = "[ns] \"……ん？\""
1600902-25 = "[ns] \"……？？\""
1600902-28 = "[ns] \"……気のせいかな？\""
1600902-31 = "[ns] \"あ、3分経ってる。\""
1600902-34 = "……ふふっ、隙あり！"
1600902-38 = "ぎゃっ！"
1600902-42 = "ちょっとぉ！避けないでよ、先生殿！私のアンブッシュが見事に成功しそうだったのに！"
1600902-43 = "[s] \"いやいやいや……。\""
1600902-44 = "まったく、勿体ない。"
1600902-45 = "にしても、"
1600902-46 = "私の完璧な奇襲を避けるなんて……先生殿、なかなかやるね！"
1600902-47 = "[s] \"それほどでも……少し前からちらちら見えてたし。\""
1600902-48 = "むむむっ……！"
1600902-49 = "「お前のアンブッシュなどお見通しだ」と……"
1600902-50 = "なるほど、強者の台詞！"
1600902-51 = "強くない言葉から強さが感じられる表現、良いよね！"
1600902-52 = "うん、やっぱり私の目に狂いは無かった！先生殿には素質がある！"
1600902-53 = "[s1] \"素質……？\"\n[s2] \"ごめんミチル、ちょっと今カップ麵が……。\""
1600902-54 = "素質と言ったら、忍者の素質に決まってるでしょ！"
1600902-55 = "素質と言ったら、忍者の素質に決まってるでしょ！"
1600902-56 = "[s] \"忍者の素質……。\""
1600902-57 = "うんうん大丈夫、分かってるよ。"
1600902-58 = "急に忍者を始めるとなっても、その不安な気持ちはよく理解できる。"
1600902-59 = "まず初心者の時は、コツコツとステップアップしていくことが大事だよね？"
1600902-60 = "じゃあまずは……例えば、忍者オタクから始めるのはどう？"
1600902-61 = "[s] \"忍者オタクがレベルアップすると、忍者に……？\""
1600902-62 = "あ、でも初歩ばっかりやるのも、時には退屈だったりするよね。"
1600902-63 = "うんうん、それも分かる。"
1600902-64 = "複雑な心境、それもまた当然のことだね！"
1600902-65 = "[s] \"話が勝手に進んでいく……！？\""
1600902-66 = "でも心配しないで、先生殿！私を誰だと思ってるの？私はあの忍術研究部の部長、[ruby=ちどり]千鳥[/ruby]ミチル！"
1600902-67 = "まあ、部活はまだ非公認だけど……将来性はバッチリ！"
1600902-68 = "とにかくそんな先生のためだけに、今なら何と、私たち忍術研究部から「忍者プランB」をご案内！"
1600902-69 = "[s] \"何か通販番組みたいになってきた。\""
1600902-70 = "まあとにかく、導入には色んなパターンがあるから心配ないよ。"
1600902-71 = "そう、たとえば……"
1600902-72 = "亀とか！"
1600902-73 = "[s3] \"話が加速して止まらない……！\"\n[s4] \"亀と忍者に、何の関係が……？\""
1600902-74 = "亀と言えば忍者！結構昔からそう相場は決まってるの！"
1600902-75 = "亀と言えば忍者！結構昔からそう相場は決まってるの！"
1600902-76 = "基地を下水道にするのがちょっとハードル高いけど、まあこの間ミレニアムの工事が入ったところなら綺麗だろうし、多分大丈夫……な気がする。"
1600902-77 = "[s] \"話が見えてこないんだけど、ミチルが今日来たのはどうして……？\""
1600902-78 = "あ、うっかりしてた！"
1600902-79 = "先生殿先生殿！大変なの！本当に大変なことが起きてて……！"
1600902-80 = "えーっと、まず私、動画チャンネル「少女忍法帖ミチルっち」を運営してるでしょ？"
1600902-81 = "[s5] \"うん、そうだったね。\"\n[s6] \"忍術とかを紹介するチャンネルだよね。\""
1600902-82 = "そうそう！あのチャンネル、週に2回アップするようにしてるんだけど……全然アイデアが浮かばなくなっちゃって……"
1600902-83 = "そうそう！あのチャンネル、週に2回アップするようにしてるんだけど……全然アイデアが浮かばなくなっちゃって……"
1600902-84 = "もー完全にピンチ！もう「ミチルの忍者人生、17年目にして最大の危機！？」みたいなタイトルで雑談配信するしかないくらい！"
1600902-85 = "そのことを相談したくて来てたの！"
1600902-86 = "[s] \"なるほど。\""
1600902-87 = "このピンチを救えるのは、もう先生殿くらいしかいないんじゃ！？って思って……！"
1600902-88 = "私の頭ではもう限界が来ちゃったんだけど……"
1600902-89 = "先生殿だったら、大人ならではのアイディアを閃いてくれるかも？って。"
1600902-90 = "それでアンブッシュしに来たってわけ！"
1600902-91 = "[s7] \"アンブッシュは要らなかったんじゃ……？\"\n[s8] \"助けを求めるためだったのに、どうして奇襲が……。\""
1600902-92 = "とにかくお願い、先生殿！一応それっぽいネタの候補は考えてきたから、どれが良いか意見をくれるだけでも……！"
1600902-93 = "とにかくお願い、先生殿！一応それっぽいネタの候補は考えてきたから、どれが良いか意見をくれるだけでも……！"
1600902-94 = "まずはたとえば……「パルクール系忍者に人気の忍具、TOP10レビュー！」とか。"
1600902-95 = "他にも……「『忍者デストロイヤー実写版』のCGについて分析してみよう！」とか。"
1600902-96 = "あ、「忍者はどうしてラーメン屋で『ニンニク多めチャーシュー追加』にしがちなのか！」でも良いかも！"
1600902-97 = "[s9] \"最後のは一体……？\"\n[s10] \"それ、忍者の話かな……？\""
1600902-98 = "細かいことは良いから！さあ、先生殿はどれがいいと思う？"
1600902-99 = "細かいことは良いから！さあ、先生殿はどれがいいと思う？"
1600902-100 = "見ただけで忍者に興味が湧いて、"
1600902-101 = "「忍者って最高だな～」って思えて、"
1600902-102 = "「これを作った忍術研究部の部長ってもしかして天才！？」ってなるような……！"
1600902-103 = "そんな最高の動画になりそうなネタ、どれかな！？"
1600902-104 = "[s] \"期待が重い！！\""
1600902-105 = "あ、もちろんこれ以外のネタでも大歓迎！"
1600902-106 = "忍術研究部の目標は「忍者をより多くの人に知ってもらうこと」！あとゆくゆくは、正式な部活として認めてもらうこと！"
1600902-107 = "それに関係することなら、何でもOK！先生殿だったら、きっと画期的なアイディアを出してくれるだろうし！"
1600902-108 = "[s] \"じゃあ、例えば……\""
1600902-109 = "おぉっ……！？"
1600902-110 = "[s11] \"どの作品に登場する忍者が一番強いのか？とか。\"\n[s12] \"どの作品に登場する忍者が一番素早いのか？とか。\"\n[s13] \"どの作品に登場する忍者が一番カッコよいか？とか。\""
1600902-111 = "なっ……！？"
1600902-112 = "なっ……！？"
1600902-113 = "なっ……！？"
1600902-114 = "[s] \"ほら、忍者って色んな漫画とか映画に出てるから。\""
1600902-115 = "……。"
1600902-116 = "[s] \"その中のどの忍者が一番……ってミチル？目が怖いけど……。\""
1600902-117 = "いやいやいやいやいや！！それは違うよ！先生殿！"
1600902-118 = "そもそも別作品の忍者を比較って、何を基準に比べるわけ！？"
1600902-119 = "そもそも数が膨大だし！小説、漫画、映画、アニメ……！"
1600902-120 = "あの「柴犬ワン蔵」監督の作品から、私が考えたオリジナル作品まで……！"
1600902-121 = "[s] \"オリジナル作品、気になる……。\""
1600902-122 = "それぞれの作品には固有の世界観、各々の趣があるわけで……"
1600902-123 = "それに、作品ごとの世界観とかパワーバランスだってある！それを「強さ」とか「速さ」とかで分けようなんて、そもそも無理！！"
1600902-124 = "そこに「違い」こそあれど、それは優劣じゃないんだから！そもそも忍者っていうのは、色んな媒体において常に時代と共に進化し続けているものであって……！"
1600902-125 = "くっ、これがオタクと一般人の差異……！"
1600902-126 = "[s] \"何かごめん！？\""
1600902-127 = "くっ、これは一から説明するしかない！先生殿、そこに座って！"
1600902-128 = "今から忍者の凄さと歴史について、その起源から説明してあげるから！"
1600902-129 = "[s] \"ミチル、私お昼ご飯が……。\""
1600902-130 = "とにかく、忍者というのはね……！"
1600902-131 = "[s] \"う、うん……。\""
1600902-133 = "（そうしてミチルから3時間もの間、忍者コンテンツの歴史に関する講義（要約ver）を受けることになった……）"
1600902-134 = "（その間放置され続けたカップ麵は、笑えるほど伸びてしまった）"
