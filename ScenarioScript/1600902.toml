[translation]
1600902-1 = "A garota ninja é difícil de lidar"
1600902-3 = "（Como de costume, enquanto trabalho no Schale...）"
1600902-8 = "[ns] \"……Acho que já está na hora de almoçar.\""
1600902-9 = "（Assim que terminei uma parte do trabalho e estava prestes a me levantar, ouvi um som estranho）"
1600902-12 = "[ns] \"……Bem, hoje não tenho muito tempo, então um miojo serve.\""
1600902-14 = "[ns] \"Agora é só esperar 3 minutos...\" "
1600902-16 = "（Enquanto espero pacientemente o miojo ficar pronto...）"
1600902-21 = "[ns] \"……Hm?\""
1600902-25 = "[ns] \"……??\""
1600902-28 = "[ns] \"……Será que foi impressão minha?\""
1600902-31 = "[ns] \"Ah, já se passaram 3 minutos.\""
1600902-34 = "……Hehe, baixou a guarda!"
1600902-38 = "Kyaa!"
1600902-42 = "Ei! Não desvie, Sensei! Minha emboscada ia ser um sucesso total!"
1600902-43 = "[s] \"Não, não, não...\""
1600902-44 = "Poxa, que desperdício."
1600902-45 = "Mas ainda assim,"
1600902-46 = "Conseguir desviar do meu ataque surpresa perfeito... Sensei, você é muito bom!"
1600902-47 = "[s] \"Não é para tanto... Eu já estava vendo você ali faz um tempo.\""
1600902-48 = "Mumuuh...!"
1600902-49 = "\"Eu já previa sua emboscada\"..."
1600902-50 = "Entendo, uma fala de alguém forte!"
1600902-51 = "Expressar força através de palavras que não parecem fortes, isso é muito bom!"
1600902-52 = "Sim, eu não estava enganada! Sensei, você tem talento!"
1600902-53 = "[s1] \"Talento...?\"\n[s2] \"Desculpe, Michiru, é que agora o meu miojo...\""
1600902-54 = "Quando falo de talento, estou falando de talento ninja, é claro!"
1600902-55 = "Quando falo de talento, estou falando de talento ninja, é claro!"
1600902-56 = "[s] \"Talento ninja...\""
1600902-57 = "Sim, sim, tudo bem, eu entendo."
1600902-58 = "Mesmo que você comece a ser um ninja de repente, eu entendo bem esse sentimento de insegurança."
1600902-59 = "Primeiro, quando se é iniciante, é importante ir subindo de nível aos poucos, não é?"
1600902-60 = "Então, que tal começar... por exemplo, como um otaku de ninjas?"
1600902-61 = "[s] \"Se um otaku de ninjas subir de nível, ele vira um ninja...?\""
1600902-62 = "Ah, mas fazer só o básico às vezes pode ser entediante, né."
1600902-63 = "Sim, sim, eu entendo isso também."
1600902-64 = "Esse estado de espírito complexo, isso também é natural!"
1600902-65 = "[s] \"A conversa está seguindo sozinha...!?\""
1600902-66 = "Mas não se preocupe, Sensei! Quem você acha que eu sou? Eu sou a presidente do Clube de Pesquisa Ninjutsu, Chidori Michiru!"
1600902-67 = "Bem, o clube ainda não é oficial... mas o potencial é enorme!"
1600902-68 = "De qualquer forma, só para você, Sensei, agora estamos oferecendo o \"Plano Ninja B\" do nosso Clube de Pesquisa Ninjutsu!"
1600902-69 = "[s] \"Parece até um programa de vendas pela TV.\""
1600902-70 = "Bem, de qualquer forma, existem vários padrões de introdução, então não se preocupe."
1600902-71 = "Sim, por exemplo..."
1600902-72 = "Tartarugas!"
1600902-73 = "[s3] \"A conversa acelerou e não para mais...!\"\n[s4] \"O que tartarugas têm a ver com ninjas...?\""
1600902-74 = "Falou em tartaruga, falou em ninja! Isso já é uma regra estabelecida há muito tempo!"
1600902-75 = "Falou em tartaruga, falou em ninja! Isso já é uma regra estabelecida há muito tempo!"
1600902-76 = "Transformar a base em um esgoto é um pouco difícil, mas como houve uma obra da Millennium por aqui recentemente, deve estar limpo, então acho que... provavelmente dá certo."
1600902-77 = "[s] \"Não estou entendendo nada, por que a Michiru veio aqui hoje...?\""
1600902-78 = "Ah, esqueci completamente!"
1600902-79 = "Professor! Professor! É uma emergência! Algo muito sério aconteceu...!"
1600902-80 = "Bem, primeiro de tudo, eu gerencio o canal de vídeos \"Diário Ninja da Michiru\", sabe?"
1600902-81 = "[s5] \"Sim, eu lembro.\"\n[s6] \"É aquele canal sobre ninjutsu, né?\""
1600902-82 = "Isso mesmo! Eu tento postar dois vídeos por semana, mas... as ideias simplesmente pararam de vir..."
1600902-83 = "Isso mesmo! Eu tento postar dois vídeos por semana, mas... as ideias simplesmente pararam de vir..."
1600902-84 = "Estou em apuros! A ponto de ter que fazer uma live de bate-papo com um título tipo \"A maior crise nos 17 anos de vida ninja da Michiru!?\""
1600902-85 = "Vim aqui justamente para pedir conselhos sobre isso!"
1600902-86 = "[s] \"Entendo.\""
1600902-87 = "Pensei que o único que poderia me salvar dessa crise era o Professor...!"
1600902-88 = "Meu cérebro já chegou no limite..."
1600902-89 = "Pensei que, sendo um adulto, o Professor talvez tivesse alguma ideia brilhante."
1600902-90 = "Por isso que eu vim fazer uma emboscada!"
1600902-91 = "[s7] \"A emboscada era mesmo necessária...?\"\n[s8] \"Você veio pedir ajuda, por que me atacou de surpresa...?\""
1600902-92 = "De qualquer forma, por favor, Professor! Eu até pensei em algumas sugestões de temas, só preciso que você me dê sua opinião sobre qual é o melhor...!"
1600902-93 = "De qualquer forma, por favor, Professor! Eu até pensei em algumas sugestões de temas, só preciso que você me dê sua opinião sobre qual é o melhor...!"
1600902-94 = "Primeiro, por exemplo... \"Top 10 ferramentas ninja populares entre ninjas de parkour!\""
1600902-95 = "Ou então... \"Vamos analisar o CG de 'O Destruidor de Ninjas: Versão Live-Action'!\""
1600902-96 = "Ah, ou talvez \"Por que ninjas tendem a pedir 'muito alho e porco extra' nas lojas de lámen!\""
1600902-97 = "[s9] \"O que foi esse último...?\"\n[s10] \"Isso é mesmo sobre ninjas...?\""
1600902-98 = "Não se preocupe com os detalhes! Então, Professor, qual você acha melhor?"
1600902-99 = "Não se preocupe com os detalhes! Então, Professor, qual você acha melhor?"
1600902-100 = "Algo que faça as pessoas se interessarem por ninjas só de olhar,"
1600902-101 = "que as faça pensar \"Ninjas são demais!\","
1600902-102 = "e que as faça pensar \"Será que a presidente do Clube de Pesquisa de Ninjutsu que criou isso é um gênio!?\"..."
1600902-103 = "Qual desses temas seria esse vídeo perfeito!?"
1600902-104 = "[s] \"Quanta pressão!!\""
1600902-105 = "Ah, claro, qualquer outro tema também é bem-vindo!"
1600902-106 = "O objetivo do Clube de Pesquisa de Ninjutsu é \"fazer com que mais pessoas conheçam os ninjas\"! E, futuramente, ser reconhecido como um clube oficial!"
1600902-107 = "Se tiver relação com isso, qualquer coisa serve! Como é o Professor, com certeza terá uma ideia revolucionária!"
1600902-108 = "[s] \"Então, por exemplo...\""
1600902-109 = "Oh...!?"
1600902-110 = "[s11] \"Qual ninja de qual obra é o mais forte?\"\n[s12] \"Qual ninja de qual obra é o mais rápido?\"\n[s13] \"Qual ninja de qual obra é o mais legal?\""
1600902-111 = "O quê...!?"
1600902-112 = "O quê...!?"
1600902-113 = "O quê...!?"
1600902-114 = "[s] \"Ora, ninjas aparecem em vários mangás e filmes, não é?\""
1600902-115 = "..."
1600902-116 = "[s] \"Qual desses ninjas é o mais... Michiru? Seus olhos estão assustadores...\""
1600902-117 = "Não, não, não, não, não!! Isso está errado, Professor!"
1600902-118 = "Para começar, comparar ninjas de obras diferentes, qual seria o critério!?"
1600902-119 = "A quantidade é enorme! Romances, mangás, filmes, animes...!"
1600902-120 = "Desde as obras do diretor \"Shiba Inu Wanzou\" até as minhas próprias obras originais...!"
1600902-121 = "[s] \"Fiquei curioso sobre as obras originais...\""
1600902-122 = "Cada obra tem seu próprio universo e seu próprio charme..."
1600902-123 = "Além disso, cada mundo tem seu próprio equilíbrio de poder! Tentar classificar por \"força\" ou \"velocidade\" é impossível desde o início!!"
1600902-124 = "Embora existam \"diferenças\", isso não significa que um seja superior ao outro! Ninjas, em várias mídias, estão sempre evoluindo com o tempo...!"
1600902-125 = "Droga, essa é a diferença entre um otaku e uma pessoa comum...!"
1600902-126 = "[s] \"Desculpa por alguma coisa!?\""
1600902-127 = "Droga, vou ter que explicar desde o começo! Professor, sente-se ali!"
1600902-128 = "Vou te explicar a grandeza e a história dos ninjas, desde a sua origem!"
1600902-129 = "[s] \"Michiru, meu almoço...\""
1600902-130 = "De qualquer forma, ninjas são...! "
1600902-131 = "[s] \"S-sim...\""
1600902-133 = "(E assim, acabei recebendo uma palestra de 3 horas da Michiru sobre a história do conteúdo ninja (versão resumida)...)"
1600902-134 = "(O macarrão instantâneo, deixado de lado durante todo esse tempo, ficou tão inchado que era até engraçado)"
