[translation]
10035010-1 = "第1話;ライフセーバー、任務開始！"
10035010-2 = "やってきましたよ！"
10035010-3 = "ここが、D.U.最大規模のウォーターパーク「エーギル」ですか！"
10035010-4 = "広すぎて迷ってしまいそうです！"
10035010-5 = "はあ、よりによって屋外かぁ……"
10035010-6 = "これじゃ、炎天下のパトロールと同じじゃん。"
10035010-7 = "何を言っているんですか！フブキ！"
10035010-8 = "我々の職務は、市民の皆さんの安全を守ることなんですよ？"
10035010-9 = "ちょっと暑いからといって、挫けるわけにはいきません！"
10035010-10 = "我々の努力あってこそ、皆さんが快適にプールで過ごせるのですから！"
10035010-12 = "市民を守る前に、干からびちゃいそうなんだけど。"
10035010-13 = "日焼け止めも塗ってないしさ～"
10035010-14 = "屋内プールに配属してほしかったなぁ。"
10035010-15 = "ねえ、局長もそう思うでしょ？"
10035010-19 = "はぁ……。"
10035010-20 = "局長？どうしました？"
10035010-21 = "顔色が悪いですよ。それに、いつもより少し覇気がないような……"
10035010-22 = "も、もしかして、熱中症の初期症状でしょうか！？"
10035010-23 = "大変です！フブキ！局長を涼しい場所に連れて行きましょう！#nライフセーバーも呼ばないと……！"
10035010-24 = "あっ、ラ、ライフセーバーは私でした！"
10035010-26 = "落ち着けキリノ。私は熱中症などではない。"
10035010-27 = "ただ……この状況に頭が追いついていないだけだ。"
10035010-28 = "まだ？もう諦めたほうが早いよ～"
10035010-29 = "そう単純な話ではない。"
10035010-30 = "そもそも、初めてなんだ。"
10035010-31 = "ウォーターパークに来るのも、こんなに布面積が少ない服を着るのも。"
10035010-32 = "それに……勤務中にプールに来るのも。"
10035010-34 = "そ、そうでしたか……。"
10035010-35 = "そもそも、どうして局長が出向することになったのでしょう？"
10035010-36 = "だよね。私とキリノは生活安全局だから分かるけどさ。"
10035010-37 = "公安局長が一緒に出向だなんて、絶対何か裏があるでしょ～"
10035010-39 = "ああ、それは――"
10035010-47 = "副局長！これは一体どういうことだ！"
10035010-48 = "あ、来たんすね、姉御。"
10035010-49 = "今、懸垂中なんで……これだけやらせてください……！"
10035010-50 = "っしょ！"
10035010-53 = "ふぅ～スッキリした。#nそれで何か用っすか？姉御。"
10035010-54 = "局内で本格的な運動はするなと……"
10035010-55 = "まあ、いい。"
10035010-56 = "何故、私が出向することになっているんだ？"
10035010-57 = "このままでは生活安全局の臨時局員としてプール行きだ！"
10035010-59 = "はぁ、そんなことになってるんすか～"
10035010-60 = "シラを切るな！#n企んだのはお前だろう、副局長！"
10035010-61 = "リストにはお前のサインがあった。"
10035010-62 = "言い逃れはできないぞ。"
10035010-66 = "ふっ、ははっ！思った通りっすね。"
10035010-67 = "「企む」ってほど、大それたことはしてないっすよ……。"
10035010-68 = "まあ、リストに姉御を入れたのは、あたしですが。"
10035010-69 = "ちょうど姉御がいない時に、要請が届いたのでね。"
10035010-70 = "お前っ……！"
10035010-71 = "これは姉御のためなんすよ。"
10035010-72 = "はぁ？"
10035010-73 = "だって、毎日毎日、犯罪者の取り調べやデスクワークで、#nまともに休んでないじゃないっすか。"
10035010-74 = "このままじゃ、マジで体壊しちゃいますよ？"
10035010-75 = "だから……私をウォーターパークに送りつけると？"
10035010-76 = "そういうことっす！"
10035010-77 = "ライフセーバーも別に楽じゃないっすけど。#nどうせ外部の人間に重要な仕事はさせないと思うんすよ。"
10035010-78 = "ウォーターパーク側としては「ヴァルキューレ警察学校が協力している」っていう#n安心感を売りにしたいだけっすから。"
10035010-79 = "だから、この機にリフレッシュしてきてほしいっす！"
10035010-80 = "ああ！働きすぎの上司を思う部下の心遣い。#n感動で泣いてくれてもいいんすよ！"
10035010-82 = "……今すぐ取り消せ。"
10035010-83 = "私には、プールで休んでいる暇などない。"
10035010-84 = "生活安全局に増員を要請するように。"
10035010-88 = "ちょ、待ってくださいよ、姉御。"
10035010-89 = "ほんとにそれで後悔しないんすか？"
10035010-90 = "……何がだ？"
10035010-91 = "ぶっちゃけ……これ、姉御にも良い機会になると思うんすよ。"
10035010-92 = "……？"
10035010-94 = "姉御……入学した時は生活安全局に志願してたんすよね？"
10035010-95 = "お前っ、どうしてそれを！？"
10035010-96 = "姉御ほどじゃないっすけど、副局長にも書類の閲覧権限はありますからね。"
10035010-97 = "気になって、ちょいと調べてみたんすよ。"
10035010-98 = "姉御は、公安局に必要な人っすけど……。"
10035010-99 = "心残りがあるのなら、この機にやってみてもいいんじゃないかなって。"
10035010-100 = "市民対応の業務、ずっとやってみたかったんじゃないんすか？"
10035010-104 = "ふっ。"
10035010-105 = "？"
10035010-106 = "調子に乗るな、副局長。"
10035010-107 = "はぇ？"
10035010-108 = "たしかに生活安全局を志望していた時期もある。#nだが、もうとっくに踏ん切りがついているんだ。"
10035010-109 = "こんな[ruby=こわもて]強面[/ruby]が、まともに市民対応ができるわけないだろう。"
10035010-110 = "いまさら心残りなど無い。"
10035010-111 = "出向者については、再考するよう上に要請しておく。"
10035010-112 = "これ以上、お前が動く必要はない。"
10035010-114 = "でも……。"
10035010-115 = "その、もう終わってるんすよ。"
10035010-116 = "何がだ？"
10035010-117 = "申請も通って、予算まで下りちゃってるっす。"
10035010-118 = "それにほら。本日付けで人事通達まで！"
10035010-119 = "なっ……！"
10035010-122 = "それは……機密事項だ。"
10035010-123 = "なになに？言いかけてやめられたら気になるじゃん。"
10035010-125 = "[ns1] \"そうだね。私も聞きたかったのに。\"\n[ns2] \"途中で止められると気になるよ。\""
10035010-129 = "あれ？先生じゃありませんか！"
10035010-130 = "このようなところでお会いするとは、奇遇ですね！"
10035010-131 = "いやぁー、それにしっかり水着だし。"
10035010-132 = "さては、先生も遊ぶ気満々だねー？"
10035010-133 = "[s] \"こんにちは、キリノにフブキ。それとカンナも。\""
10035010-134 = "ど、どうして[USERNAME]先生が、こちらに……？"
10035010-135 = "今回の支援任務は、シャーレとは関係ないはずですが。"
10035010-136 = "[s] \"みんなの様子を見てほしいと連絡があって。\""
10035010-137 = "（副局長……！）"
10035010-138 = "[s] \"まあ、私のことは気にしないで。\""
10035010-140 = "[ns] \"ただの利用客だと思ってほしいな。\""
10035010-141 = "はい！分かりました！"
10035010-142 = "もしも溺れそうになったら、ご一報ください！#n本官がすぐ助けに行きます！"
10035010-143 = "[s] （溺れてる時に連絡する余裕あるかな……？）"
10035010-144 = "せっかく会えたんだし、一緒にプールで遊ぼうよ。#nまあ、パトロールもほどほどにしつつさ。"
10035010-145 = "まずはフードコートのドーナッツ屋に行こっか。小腹も空いてきたし。"
10035010-146 = "またサボるつもりですか、フブキ！"
10035010-150 = "はあ……。"
10035010-151 = "[s] \"カンナ、何か心配事？\""
10035010-152 = "あ、いえ。"
10035010-153 = "その、[USERNAME]先生にここでお会いすると思っていなかったもので。"
10035010-154 = "すこし驚いただけです。"
10035010-155 = "[s] \"ライフセーバーの水着、似合ってるよ。\""
10035010-156 = "……気にかけていただき、ありがとうございます。"
10035010-157 = "ですが、やはりこれは、私には不適切なものでしょう。"
10035010-158 = "不適切……？あっ、サイズのことでしょうか？"
10035010-159 = "たしかに、ちょっとキツそうだよね～"
10035010-160 = "そ、そういう話ではない！"
10035010-164 = "業務放送です。待機中のライフセーバーのみなさん――"
10035010-165 = "ブリーフィングを行います。施設中央に集合してください。"
10035010-170 = "ついに任務開始ですね！#n張り切っていきましょう！"
