[translation]
51160-1 = "第16話;[ruby=ごりょう]御稜[/ruby]ナグサ"
51160-5 = "（はやる気持ちと期待に満ちた声、軽快な足取り）"
51160-6 = "（百鬼夜行の街は今、お祭りへの期待に満ちている）"
51160-8 = "（昔の百鬼夜行ではよく見た光景）"
51160-9 = "（こんな街を、私たちは……百花繚乱は……）"
51160-12 = "一緒に警備、したね。"
51160-13 = "…………ねえ、アヤメ。"
51160-15 = "アヤメ先輩がまた問題児を追い払ったんだって！"
51160-16 = "これでもう127回目？#n全部1人で解決しちゃうなんて！すごい！"
51160-17 = "この間は木から下りられなくなった子猫も助けたんだって！"
51160-18 = "この前なんてさ……！"
51160-20 = "（アヤメのことを）"
51160-21 = "（みな口々に話した）"
51160-23 = "本当、すごいよねアヤメ先輩！"
51160-24 = "アヤメ先輩がいたら何の心配もいらなそ～！"
51160-25 = "[ruby=ななかど]七稜ア[/ruby]ヤメ先輩……私もいつかは先輩みたいに！"
51160-27 = "アヤメ先輩が百花繚乱にいてくれてよかったー！"
51160-32 = "うん。アヤメがいれば百花繚乱は大丈夫。"
51160-33 = "アヤメがいれば……私もこのまま百花繚乱の活動を続けられる。"
51160-34 = "アヤメの幼馴染として……"
51160-35 = "ずっと、アヤメの隣にいられる。"
51160-37 = "そう思って――"
51160-38 = "――いたのに。"
51160-41 = "ねえ、聞いた？アヤメ委員長が姿を消したって。"
51160-42 = "噂ではクズノハ様と会ってから姿を消した、って聞いたけど。"
51160-43 = "えっ、マジ？でもクズノハ様ってただの噂じゃないの？"
51160-44 = "どうなんだろ……ていうか、これからどうしよう？"
51160-45 = "これから百花繚乱はどうなっちゃうの？#n委員長の座が空席になるんだよね？"
51160-46 = "私たち……どうなるんだろ。 "
51160-51 = "それなら大丈夫じゃない？"
51160-52 = "まあ、私たちにはナグサ先輩がいるし。"
51160-53 = "アヤメ先輩がいなくても、優秀なナグサ先輩が残ってくれてるし！"
51160-55 = "だから大丈夫！"
51160-62 = "違う……そうじゃない。"
51160-63 = "（これは、口にできなかった本当の気持ち）"
51160-64 = "……私には、できないよ。"
51160-67 = "（残された私に、こ[ruby=あかし]の銃は[/ruby]重すぎる）"
51160-68 = "だって……私は……"
51160-72 = "[ruby=■ ■ ■ ■ ■ ■、■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■。]アヤメじゃないから[/ruby]。"
51160-76 = "[ruby=■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■。]私はアヤメの代わりになれないから[/ruby]。"
51160-77 = "[ruby=■ ■ ■ ■ ■ ■ ■ ■ ■ ■、■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■ ■。]百花繚乱の委員長としての資格があるのは、アヤメだけだから[/ruby]。"
51160-79 = "私にはそんな資格……そんなものは……"
51160-80 = "……あなたが居ない[ruby=ここ]百花繚乱[/ruby]で……私はこれ以上……"
51160-84 = "[ns] \"やっぱり、君がナグサだったんだね。\""
51160-88 = "……！"
51160-92 = "（忍術研究部より「ナグサらしき人を西地区で発見」という連絡を受け、現場に急ぐと）"
51160-93 = "（以前にも言葉を交わしたことのある少女がいた）"
51160-94 = "あなたは、この前の……シャーレの先生。"
51160-95 = "[s] \"そういう君は、あの時の無限焼き鳥の幸せスパイラルっ子！\""
51160-96 = "幸せスパ……何？"
51160-97 = "……くだらない冗談はやめて。 "
51160-98 = "その様子……もう知ってるみたいだね。#n特に隠すつもりもなかったけど。"
51160-99 = "[s] \"ナグサ。\""
51160-103 = "そう、私[ruby=ごりょう]が御稜ナ[/ruby]グサ。#n百花繚乱の副委員長。"
51160-104 = "いや、証を返却した今は……「元」副委員長かな。"
51160-105 = "それで、何の用？ "
51160-106 = "用事……？あなたが？"
51160-107 = "[s] \"以前会った時、継承戦と百花繚乱のことを話したよね。\""
51160-109 = "（あの後に起きた出来事をナグサに説明した）"
51160-110 = "（ユカリと共にキキョウに会いに行ったこと、キキョウとの継承戦の結果、そしてユカリがお祭りで巫女として舞うと決めたことを）"
51160-112 = "……そう。"
51160-113 = "それが正解じゃないかな。その選択は正しいよ。"
51160-114 = "[s] \"……本当にそう思うの？\""
51160-115 = "……どうして、それを聞くの？"
51160-116 = "[s1] \"ユカリはずっと君の話をしていたよ。\"\n[s2] \"君に憧れて百花繚乱に入った、と。\""
51160-119 = "[ns3] \"そんな彼女が百花繚乱を抜けて……\"\n[ns4] \"元の場所に帰るべきだと君は本当に思ってるの？\""
51160-122 = "………………。"
51160-123 = "私は…………"
51160-124 = "[s] \"ナグサが委員長の証を返却しようとしたのは聞いたよ。\""
51160-125 = "何でそうしたのか……"
51160-126 = "どうして皆のいる場所に帰らず、百花繚乱として活動しないのか……#n聞きたいの？"
51160-127 = "………………。"
51160-128 = "答えは単純だよ。"
51160-129 = "百花繚乱の委員長は「[ruby=ななかど]七稜[/ruby]アヤメ」だから。"
51160-130 = "委員長の座にはアヤメこそがふさわしい。 "
51160-131 = "アヤメじゃないとダメなの。"
51160-132 = "私は、アヤメの代わりにはなれない。#nだから引き下がろうと思った。"
51160-136 = "あの子たちが思うほど……私にはふさわしくないの。"
51160-137 = "今は皆、納得できないって言ってるけど。"
51160-138 = "時間が経てばきっと分かってくれるはず。"
51160-140 = "委員長代理という肩書は……ただ押しつけられただけ。"
51160-141 = "そう、本当にそれだけ――"
51160-146 = "[log=???][ff4444]＜ウソ＞[-][/log]"
51160-149 = "……！？"
51160-150 = "[s] \"今のは……？\""
51160-157 = "[ns] \"あ、お祭りの始まりの合図……\""
51160-158 = "（空に花が咲く――）"
51160-160 = "（お祭りが――始まる）"
51160-171 = "[ruby=すだまいちざ]魑魅一座[/ruby]、あなた達……！"
51160-176 = "ひっ！？"
51160-177 = "ち、違う……アレはあたしらじゃ……！ "
51160-178 = "あたしらは何もしてない！本当だってば！"
51160-179 = "[s] \"まずは落ち着いて……一体何があったのか教えて。\""
51160-180 = "あたしらはただ、あいつの質問に答えただけで！ "
51160-181 = "助けてほしい？"
51160-182 = "って、言われて「そう」返しただけで……！"
51160-192 = "……！"
51160-193 = "[s] \"アレは一体……。\""
51160-194 = "………………[ruby=かいだん]幻魎百物語[/ruby]。"
51160-195 = "どうして……ここにあれが……！？"
51160-198 = "役者がそろいましたね。"
51160-199 = "始めましょうか。"
51160-203 = "……手前どもだけの[ruby=かいだん]風流[/ruby]を。"
51160-205 = "次回;街を歩く怪談（１）"
