[translation]
51160-1 = "Episódio 16; Goryo Nagusa"
51160-5 = "（Voz cheia de entusiasmo e expectativa, passos leves）"
51160-6 = "（A cidade de Hyakkiyako está agora repleta de expectativa pelo festival）"
51160-8 = "（Uma cena que eu via muito na antiga Hyakkiyako）"
51160-9 = "（Uma cidade como esta, nós... a Hyakka Ryoran...）"
51160-12 = "Nós fizemos a patrulha juntas, não foi?"
51160-13 = "…………Ei, Ayame."
51160-15 = "Dizem que a veterana Ayame expulsou mais um encrenqueiro!"
51160-16 = "Já é a 127ª vez, não é?#nResolver tudo sozinha! Que incrível!"
51160-17 = "Ouvi dizer que outro dia ela até salvou um gatinho que não conseguia descer da árvore!"
51160-18 = "E daquela outra vez também...!"
51160-20 = "（Sobre a Ayame）"
51160-21 = "（Todos falavam sem parar）"
51160-23 = "Sério, a veterana Ayame é incrível!"
51160-24 = "Se a veterana Ayame estiver aqui, não precisamos nos preocupar com nada!"
51160-25 = "Veterana Nanakado Ayame... eu também quero ser como você um dia!"
51160-27 = "Que bom que a veterana Ayame está na Hyakka Ryoran!"
51160-32 = "Sim. Se a Ayame estiver aqui, a Hyakka Ryoran ficará bem."
51160-33 = "Se a Ayame estiver aqui... eu também poderei continuar com as atividades da Hyakka Ryoran."
51160-34 = "Como amiga de infância da Ayame..."
51160-35 = "Sempre poderei estar ao lado da Ayame."
51160-37 = "Eu pensava assim—"
51160-38 = "—mas não era."
51160-41 = "Ei, você ouviu? Dizem que a presidente Ayame desapareceu."
51160-42 = "Ouvi boatos de que ela sumiu depois de se encontrar com a Srta. Kuzunoha."
51160-43 = "Sério? Mas a Srta. Kuzunoha não é só um boato?"
51160-44 = "Quem sabe... mas, o que vamos fazer agora?"
51160-45 = "O que vai acontecer com a Hyakka Ryoran?#nO cargo de presidente vai ficar vago, né?"
51160-46 = "Nós... o que será de nós?"
51160-51 = "Mas não está tudo bem?"
51160-52 = "Bem, nós temos a veterana Nagusa."
51160-53 = "Mesmo sem a veterana Ayame, a talentosa veterana Nagusa ainda está aqui!"
51160-55 = "Então está tudo bem!"
51160-62 = "Não... não é isso."
51160-63 = "（Este é o sentimento verdadeiro que eu não conseguia colocar em palavras）"
51160-64 = "……Eu não consigo fazer isso."
51160-67 = "（Para mim, que fui deixada para trás, esta arma é pesada demais）"
51160-68 = "Porque... eu..."
51160-72 = "Porque eu não sou a Ayame."
51160-76 = "Porque eu não posso substituir a Ayame."
51160-77 = "Porque a única que tem as qualificações para ser a presidente da Hyakka Ryoran é a Ayame."
51160-79 = "Eu não tenho tais qualificações... algo assim..."
51160-80 = "……Nesta Hyakka Ryoran onde você não está... eu não posso mais..."
51160-84 = "[ns] \"Então era você mesma, Nagusa.\""
51160-88 = "……!"
51160-92 = "（Recebi um contato do Clube de Pesquisa de Ninjutsu dizendo \"encontramos alguém parecida com a Nagusa no distrito oeste\", e corri para o local）"
51160-93 = "（Lá estava a garota com quem eu já tinha conversado antes）"
51160-94 = "Você é... aquela pessoa de antes... o Sensei do Schale."
51160-95 = "[s] \"E você é a garota da espiral de felicidade do yakitori infinito daquela vez!\""
51160-96 = "Espiral de felici... o quê?"
51160-97 = "……Pare com essas piadas sem graça."
51160-98 = "Essa sua reação... parece que você já sabe. #nNão que eu tivesse a intenção de esconder."
51160-99 = "[s] \"Nagusa.\""
51160-103 = "Isso mesmo, eu sou Goryou Nagusa. #nVice-presidente do Hyakkiyako Ryoran."
51160-104 = "Não, agora que devolvi o emblema... acho que sou a \"ex\"-vice-presidente."
51160-105 = "Então, o que você quer?"
51160-106 = "Assuntos... comigo?"
51160-107 = "[s] \"Quando nos vimos antes, conversamos sobre a batalha de sucessão e o Hyakkiyako Ryoran.\""
51160-109 = "(Expliquei para Nagusa os eventos que ocorreram depois daquilo)"
51160-110 = "(Sobre ter ido encontrar Kikyou com Yukari, o resultado da batalha de sucessão contra Kikyou e a decisão de Yukari de dançar como sacerdotisa no festival)"
51160-112 = "……Entendo."
51160-113 = "Acho que essa é a resposta certa. Essa escolha está correta."
51160-114 = "[s] \"……Você realmente acha isso?\""
51160-115 = "……Por que você está me perguntando isso?"
51160-116 = "[s1] \"Yukari falou de você o tempo todo.\"\n[s2] \"Disse que entrou para o Hyakkiyako Ryoran porque te admirava.\""
51160-119 = "[ns3] \"Uma garota assim deixou o Hyakkiyako Ryoran...\"\n[ns4] \"Você realmente acha que ela deveria voltar para o lugar de onde veio?\""
51160-122 = "………………."
51160-123 = "Eu…………"
51160-124 = "[s] \"Ouvi dizer que você tentou devolver o emblema da presidente.\""
51160-125 = "Por que você fez isso..."
51160-126 = "Por que você não volta para onde todos estão e não continua suas atividades como Hyakkiyako Ryoran... #nVocê quer que eu responda?"
51160-127 = "………………."
51160-128 = "A resposta é simples."
51160-129 = "Porque a presidente do Hyakkiyako Ryoran é a \"Nanakado Ayame\"."
51160-130 = "Apenas Ayame é digna do cargo de presidente."
51160-131 = "Tem que ser a Ayame."
51160-132 = "Eu não posso substituir a Ayame. #nPor isso decidi me retirar."
51160-136 = "Eu não sou tão digna quanto aquelas garotas pensam..."
51160-137 = "Embora todas digam que não aceitam isso agora."
51160-138 = "Com o tempo, tenho certeza de que elas vão entender."
51160-140 = "O título de presidente interina foi... apenas algo que me empurraram."
51160-141 = "Sim, foi realmente só isso――"
51160-146 = "[log=???][ff4444]＜Mentira＞[-][/log]"
51160-149 = "……!?"
51160-150 = "[s] \"O que foi isso...?\""
51160-157 = "[ns] \"Ah, o sinal do início do festival...\""
51160-158 = "(Flores desabrocham no céu――)"
51160-160 = "(O festival――vai começar)"
51160-171 = "Chimi Ichiza, vocês...!"
51160-176 = "Hii!?"
51160-177 = "N-não... aquilo não fomos nós...! "
51160-178 = "Nós não fizemos nada! É a verdade, eu juro!"
51160-179 = "[s] \"Primeiro, acalmem-se... me digam o que aconteceu.\""
51160-180 = "Nós só respondemos à pergunta daquela pessoa!"
51160-181 = "\"Querem ajuda?\""
51160-182 = "Foi o que ela perguntou, e nós respondemos \"sim\"...!"
51160-192 = "……!"
51160-193 = "[s] \"O que é aquilo...\""
51160-194 = "………………Kaidan Hyakumonogatari."
51160-195 = "Por que... isso está aqui...!?"
51160-198 = "Os atores estão todos reunidos."
51160-199 = "Vamos começar?"
51160-203 = "……A nossa própria lenda urbana elegante."
51160-205 = "Próximo episódio; A lenda urbana que caminha pela cidade (1)"
