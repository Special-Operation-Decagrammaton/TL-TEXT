[translation]
84303301000-5 = "ありがとうございました……！頑張って作ったゲームが、誰かを傷つけてしまうところでした……。"
84303301000-6 = "何でこんなことに……昨日までみんな楽しくプレイしてたんだよ！？"
84303301000-7 = "ゲームは何も変わってないはず……ユズちゃんも、コードに問題はないって言ってたし……。"
84303301000-9 = "おそらく、闇の力の影響です！でも、シーフが助けてくれました！"
84303301000-10 = "情報収集が得意なシーフなら、答えを知っているかもしれません！"
84303301000-15 = "本当……！？"
84303301000-16 = "あなたは大丈夫……でしたか？"
84303301000-17 = "というか……アリスちゃん？こちらの方は……？"
84303301000-19 = "自己紹介が遅れて済まない。"
84303301000-20 = "トリニティ総合学園、ティーパーティーの[ruby=ゆりぞの]百合園[/ruby]セイアだ。"
84303301000-21 = "今回、トリニティの生徒を引率する立場でもある。"
84303301000-22 = "だから、本件の解決は私の役目でもあったのだよ。だからあまり気にしないでくれ。"
84303301000-27 = "……引率？……てぃーぱーてぃーってなに？"
84303301000-28 = "うーん……。"
84303301000-30 = "所謂、生徒会のようなものだ。ミレニアムでいうところの、セミナーだろうか。"
84303301000-35 = "ってことは、ユウカみたいな人だ！"
84303301000-36 = "なんか、もう少し上の立場な気が……。"
84303301000-38 = "（私がゲームの影響を受けなかったのは、事前に情報を共有されていたからだろう）"
84303301000-39 = "（警戒心を持っていなければ、他の生徒と変わらなかったはず）"
84303301000-46 = "ということはシーフじゃなくて、シーフ王ですね！"
84303301000-51 = "アリスちゃん……！？"
84303301000-52 = "おそらく期待されているような立場では無いと思うが……"
84303301000-53 = "成すべきことを成しているだけだ。偉い身分ではないさ。"
84303301000-54 = "なるほど……！"
84303301000-55 = "シーフ王のパーティーには、賢者がいるのですね？"
84303301000-56 = "すべてを見通す賢者が、私たちを助けるためにシーフ王を送り込んだ……！"
84303301000-58 = "……えっ！？"
84303301000-59 = "そうなんですか……！？"
84303301000-61 = "さて、どうだろうね。"
84303301000-62 = "いずれにせよ……君たちは無実だと、私が証言しよう。"
84303301000-63 = "そのためにも、解析が必要だ。そのゲームを渡して貰えないだろうか？"
84303301000-68 = "えっ？わ、私たちのゲームを……？"
84303301000-69 = "構いませんが……でも、コードを読めるんですか？"
84303301000-71 = "いや、私は読めない。けれど、読める者には心当たりがある。"
84303301000-75 = "……君たちの言うところの「賢者」がね。"
