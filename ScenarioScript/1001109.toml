[translation]
1001109-1 = "午後過ぎの甘いお昼寝"
1001109-5 = "梅花園・休憩室"
1001109-7 = "あらっ、先生。ちゃんと睡眠はとれていますか？お疲れのご様子ですが……。"
1001109-8 = "いくらシャーレの仕事が忙しいからって、睡眠はちゃんととらなきゃダメですよ？"
1001109-9 = "そうだ、ちょうど[ruby=ばいかえん]梅花園[/ruby]の子たちは野外活動で外に出ているので、休憩室で少しだけお昼寝をされたらいかがですか？"
1001109-10 = "大丈夫です。子供たちが帰ってくる前には起こしますので、一眠りなさってください。"
1001109-13 = "そうやって断るのでしたら……私が無理やり抱きしめて寝かせちゃいますよっ！"
1001109-15 = "ふふ、そうですか。軽いお昼寝は健康にもいいんですよ。#nさあ、布団を敷いてあげますので、ここに横になってください。"
1001109-19 = "先生がよく眠れるよう、私が子守唄を歌ってあげます。"
1001109-20 = "ねんねん、ころりよ、おころりよ、ぼうやはよい子だ。#nねんねしな……。"
1001109-23 = "ゆっくりとまぶたが落ちる……。"
1001109-27 = "― あら、[wa:1500]お目覚めになりましたか。"
1001109-30 = "― 今日は……[wa:1500]本当に楽しかったです。[wa:2200]ふふ。"
1001109-33 = "― あら、[wa:1500]もう子供たちが帰ってくる時間ですね。"
1001109-35 = "― そろそろお仕事にお戻りになった方が良いのでは……。"
1001109-38 = "― いえ、やはり……[wa:2000]ふふ、[wa:1200]もう少しゆっくりしていてください、[wa:2300]先生。"
1001109-40 = "― 今日の授業は[wa:1300]私が代わりますので。"
1001109-43 = "― ああ……[wa:2500]可愛い……[wa:1800]ふふっ。"
1001109-46 = "お加減いかがですか？"
1001109-47 = "[s] \"うん、よく寝た。もう起きるね。\""
1001109-48 = "ダメです、先生。もう少し横になっていてください。"
1001109-49 = "この大事な機会……いえ、せっかくの休憩ですので。"
1001109-50 = "私も昨夜眠れなかったせいか、なんだか。こうして横になっていたいです。"
1001109-51 = "そうだ、今度は先生が私に、子守唄を歌ってくれませんか？"
1001109-52 = "私が眠りにつくまで頭をトントンしながら……先生の暖かい声を聞かせてください。"
1001109-53 = "とはいえ、子供たちがもうすぐ帰ってくるのに、本当に寝てしまうのはダメですが……。"
1001109-56 = "ふふ、でも今日くらいは、もう少しこうしていてもいいでしょう。"
1001109-57 = "先生の前では私も、ただのお寝坊さんな生徒なので。"
