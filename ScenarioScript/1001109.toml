[translation]
1001109-1 = "Uma soneca doce depois do almoço"
1001109-5 = "Jardim das Ameixeiras - Sala de Descanso"
1001109-7 = "Ora, Sensei. Você tem dormido o suficiente? Parece bem cansado..."
1001109-8 = "Não importa o quanto o trabalho no Schale seja ocupado, você precisa dormir direito, sabia?"
1001109-9 = "Ah, já sei! As crianças do Jardim das Ameixeiras estão fora em atividades ao ar livre, então por que não tira uma soneca aqui na sala de descanso?"
1001109-10 = "Não se preocupe. Eu te acordo antes que as crianças voltem, então pode descansar um pouco."
1001109-13 = "Se você vai recusar desse jeito... então eu vou te abraçar à força para você dormir!"
1001109-15 = "Fufu, entendo. Uma soneca leve faz bem para a saúde, sabe. #nVenha, vou arrumar o futon para você, deite-se aqui."
1001109-19 = "Para que você durma bem, Sensei, eu vou cantar uma canção de ninar."
1001109-20 = "Dorme, dorme, meu bem, dorme logo. O menino é bonzinho. #nDorme agora..."
1001109-23 = "Suas pálpebras vão se fechando lentamente..."
1001109-27 = "― Ora, [wa:1500] você acordou."
1001109-30 = "― Hoje foi... [wa:1500] muito divertido. [wa:2200] Fufu."
1001109-33 = "― Ah, [wa:1500] já está na hora das crianças voltarem."
1001109-35 = "― Não seria melhor você voltar ao trabalho logo...?"
1001109-38 = "― Não, na verdade... [wa:2000] fufu, [wa:1200] fique aqui mais um pouco, [wa:2300] Sensei."
1001109-40 = "― A aula de hoje [wa:1300] eu assumirei por você."
1001109-43 = "― Ah... [wa:2500] tão fofo... [wa:1800] fufu."
1001109-46 = "Como você está se sentindo?"
1001109-47 = "[s] \"Sim, dormi bem. Já vou levantar.\""
1001109-48 = "Não pode, Sensei. Fique deitado mais um pouco."
1001109-49 = "Esta oportunidade preciosa... digo, já que estamos descansando, aproveite."
1001109-50 = "Talvez porque eu não tenha dormido bem ontem à noite, mas... eu também quero ficar deitada assim."
1001109-51 = "Ah, que tal se agora você cantar uma canção de ninar para mim, Sensei?"
1001109-52 = "Enquanto eu adormeço, dê tapinhas na minha cabeça... e deixe-me ouvir sua voz calorosa."
1001109-53 = "Embora, com as crianças voltando logo, não seja bom eu realmente dormir..."
1001109-56 = "Fufu, mas acho que só por hoje, podemos ficar assim mais um pouco."
1001109-57 = "Pois, na frente do Sensei, eu também sou apenas uma aluna que gosta de dormir."
