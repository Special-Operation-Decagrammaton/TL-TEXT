[translation]
1003705-1 = "A limpeza da Chefe do Comitê de Segurança"
1003705-2 = "Você está atrasado!"
1003705-3 = "Eu disse para você vir na frente da Secretaria às 7 da manhã!"
1003705-4 = "[s] \"Desculpe, eu me atrasei...\""
1003705-5 = "Um atraso de 10 minutos é algo grave! Na Academia Federal Red Winter, o tempo que flui continuamente é considerado um dos nossos maiores bens!"
1003705-6 = "Cada vez que você desperdiça tempo com desculpas, seu pecado aumenta!"
1003705-7 = "[s] \"Entendi... Mas a gente precisa mesmo limpar tão cedo assim?\""
1003705-8 = "Naturalmente. É melhor fazer esse tipo de coisa antes que a vida de todos comece."
1003705-9 = "Este é um lugar que todos usam durante o dia, então este é o melhor momento para limpar com foco total."
1003705-10 = "Antes que todos cheguem para a aula, precisamos até remover a umidade do chão."
1003705-11 = "Apesar disso, um atraso de \"10 minutos\" em uma situação onde cada minuto e segundo conta..."
1003705-12 = "E se a limpeza não terminar por causa desses 10 minutos!?"
1003705-13 = "E se, por causa disso, algum aluno escorregar e cair!?"
1003705-14 = "Isso seria um ato de traição evidente contra a Academia Federal Red Winter! Ou seja, é o mesmo que ser um espião!"
1003705-15 = "[s] \"D-desculpe... Então, vamos começar logo.\""
1003705-16 = "Hum, esse é um argumento válido. É frustrante, mas é verdade."
1003705-17 = "Deixaremos a punição pelo seu atraso para depois que terminarmos de limpar o banheiro."
1003705-18 = "Para compensar, você também deve se dedicar à limpeza!"
1003705-19 = "Dito isso, vamos iniciar a \"Limpeza Revolucionária do Banheiro\"!"
1003705-22 = "[wa:150]― Droga... [wa:1600]Essa sujeira na fresta, [wa:2300]você é bem resistente, não é?"
1003705-25 = "[wa:50]― Mas, [wa:1350]diante do ataque feroz [wa:1400]desta Chefe do Comitê de Segurança,"
1003705-27 = "[wa:150]― até quando você consegue aguentar?"
1003705-30 = "[wa:300]― Fufu..."
1003705-32 = "― Não subestime [wa:2400]o poder desta nova arma."
1003705-35 = "[wa:250]― Com este novo detergente [wa:1000]que comprei,"
1003705-37 = "[wa:100]― até as frestas mais difíceis [wa:1250]ficarão perfeitas!"
1003705-40 = "[wa:150]― Ah, [wa:750]espere, Sensei! [wa:1350]Eu não disse para você secar bem [wa:800]os espelhos e vidros [wa:750]depois de lavar com detergente?!"
1003705-42 = "[wa:350]― "
1003705-45 = "[wa:50]― Para esse tipo de coisa, [wa:1050]especialmente [wa:400]usando jornal,"
1003705-47 = "― você consegue [wa:300]trazer de volta [wa:950]o brilho verdadeiro!"
1003705-50 = "[wa:250]― Além disso, [wa:1000]esse tipo de produto de limpeza"
1003705-52 = "[wa:50]― é bastante perigoso [wa:750]se usado em locais fechados."
1003705-55 = "[wa:100]― Ao usar, [wa:900]não se esqueça de ventilar o ambiente!"
1003705-58 = "[wa:300]― Mantendo a segurança [wa:900]em mente,"
1003705-60 = "― vamos exterminar completamente [wa:1200]os poluentes [wa:300]que ameaçam [wa:700]o ambiente sanitário [wa:1200]desta Red Winter!"
1003705-63 = "― [wa:750]Exterminar!"
1003705-66 = "Ufa... Conseguimos terminar dentro do tempo."
1003705-67 = "Você também se esforçou, Sensei. Vou cancelar o seu erro desta manhã!"
1003705-68 = "Ainda assim, hoje está mais perfeito do que nunca."
1003705-69 = "Ver tudo tão polido assim... sinto como se minha alma estivesse sendo lavada."
1003705-70 = "...Hm, o que foi, Sensei? Por que está me olhando assim? Tem algo que queira dizer?"
1003705-71 = "[s1] \"...Sua habilidade de limpeza é incrível.\"\n[s2] \"Mudei minha opinião sobre você, Marina.\""
1003705-72 = "Fufu, pode continuar me elogiando."
1003705-73 = "Fufu, pode continuar me elogiando."
1003705-74 = "Afinal, eu sou... a Chefe do Comitê de Segurança da grandiosa Academia Federal Red Winter!"
1003705-75 = "Comparado a lidar com elementos subversivos que se opõem à Secretaria, isso é moleza!"
1003705-76 = "[ns] \"Mas não sei, parecia que estava brilhando mais do que nunca...\""
1003705-78 = "[ns] \"...Marina, já pensou em ser a chefe do Departamento de Limpeza?\""
1003705-79 = "O-o que você disse!?"
1003705-80 = "O que você está dizendo? Quem você acha que eu sou? Eu sou a Chefe do Comitê de Segurança da Academia Federal Red Winter!"
1003705-81 = "Como alguém que almeja ser a próxima presidente do conselho estudantil da Academia Red Winter, não posso me contentar com um cargo tão comum!"
1003705-82 = "Bem, é verdade que o tempo que passo limpando é divertido, mas..."
1003705-83 = "Acumular os cargos de chefe do comitê de segurança e chefe do clube de limpeza... talvez isso não seja uma má ideia."
1003705-84 = "No entanto, atualmente, o cargo de 'chefe do clube de limpeza' é ocupado pela presidente Cherino. Para que eu me torne a chefe do clube de limpeza..."
1003705-85 = "...devo organizar outro golpe de estado?"
1003705-87 = "(Depois disso, deixei Marina, que começou a elaborar um plano grandioso, e voltei para o Schale.)"
