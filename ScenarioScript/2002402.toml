[translation]
2002402-1 = "午後のティータイム"
2002402-2 = "（ナギサとの約束当日。むせ返るような日差しの中、ティーパーティーのテラスへと足を踏み入れた）"
2002402-4 = "トリニティ・テラス"
2002402-5 = "お待ちしておりました、先生。"
2002402-6 = "ちょうどアフタヌーン・ティーの準備もできたところではありますが……"
2002402-7 = "……まずは汗を拭かれた方が良さそうですね。"
2002402-8 = "まさかとは思いますが、こちらまで走ってこられたんですか？"
2002402-9 = "[s] \"ナギサとの約束に遅れるわけにはいかないなって……。\""
2002402-10 = "お気持ちは嬉しいですが、そんなにご無理をされることはありませんよ。"
2002402-11 = "……そんな状態ですと、冷たい飲み物の方がよろしいでしょうか？"
2002402-12 = "少々お待ちください、今アイスティーをご用意しますので。"
2002402-13 = "[s] \"ありがとう。あ、冷たいのだったらちょうどさっき買ってきたヤツが……\""
2002402-15 = "[ns] バッグからペットボトルの紅茶を取り出す。"
2002402-16 = "……？"
2002402-17 = "あ、それも紅茶なのですね……すぐに飲める状態の……？"
2002402-18 = "そういうものもあるのですね……初めて見たブランドです……。"
2002402-23 = "……先生。もしよろしければ、その紅茶を少し分けていただけませんか？"
2002402-24 = "お恥ずかしい話ですが私、キヴォトスにあるはずの紅茶はおおよそ把握していたつもりだったのです。"
2002402-25 = "「レプトン」のようなポピュラーなものから、トリニティでもなかなか手に入らない「トワイライト」社の高級茶葉まで……"
2002402-26 = "ですが、先生がお持ちのブランドを見たのは初めてです。まだまだ勉強が足りないようですね。"
2002402-27 = "後学のためにも、少し味わわせていただけませんか？"
2002402-28 = "[ns] \"うん、それはもちろん。\""
2002402-30 = "ありがとうございます、先生。"
2002402-31 = "では……"
2002402-35 = "……。"
2002402-38 = "（……甘い！？）"
2002402-39 = "（な、何ですかこの紅茶は！？何という甘さ、あやうくむせ返るところでした……！）"
2002402-40 = "（紅茶にジャムを入れる飲み方も知ってはいましたが……それとはまた別のと言いますか、砂糖がそのまま残っているかのような強烈な甘味……）"
2002402-41 = "（そしてこのあまりにも強い、合成香味料の香り……紅茶の風味が全く感じられません……！？）"
2002402-42 = "（口の中が甘さだらけに……お口直しが欲しいところではありますが……）"
2002402-43 = "（それでは、せっかくの紅茶を分けてくださった先生に失礼ですし……）"
2002402-45 = "ご、ごちそうさまでした。何と言いますか……個性的な味わいですね。"
2002402-46 = "好みが分かれる「紅茶の香り」は、あくまでフレーバー程度に。その代わりに「甘み」を、これでもかと強調していて、何と言えば良いのでしょう……大衆的と言いますか、新鮮と言いますか……。"
2002402-47 = "こ、これなら、普段お茶を嗜まないと聞くミレニアムやゲヘナの方々も、手軽に紅茶が楽しめるかもしれませんね。ふ、ふふ……。"
2002402-48 = "[s1] \"うん。これペットボトルだけど美味しいよね。\"\n[s2] \"流石はナギサ、カバー範囲が広い。\""
2002402-49 = "わ、私にとっても、大変良い経験になりました。"
2002402-50 = "わ、私にとっても、大変良い経験になりました。"
2002402-51 = "こういった衝撃……いえ、味わいを頂けるなんて。今日は素晴らしい日ですね。"
2002402-52 = "あはは……では気を取り直して、#nこちらでご用意したアフタヌーン・ティーを――"
2002402-53 = "[s] \"他にも色んなペットボトルの紅茶持ってるけど、どう？\""
2002402-54 = "……え？"
2002402-55 = "な、何故そんなに持っているのですか……？え、まだある？"
2002402-56 = "そ、その、これ以上は、えぇっと……。"
2002402-57 = "[s3] \"ナギサが用意してくれた分も美味しく頂くね。\"\n[s4] \"これだけ沢山あると迷っちゃうね。\""
2002402-58 = "そ、そうですね……！？"
2002402-59 = "そ、そうですね……！？"
2002402-60 = "そ、それでは……こちらのラベルのものをいただきますね。"
2002402-62 = "（紅茶を飲み過ぎたせいか、ナギサの顔色が悪くなってきたため、その日は早めにお開きすることにした）"
