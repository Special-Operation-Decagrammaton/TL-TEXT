[translation]
2002402-1 = "Chá da tarde"
2002402-2 = "（Dia do compromisso com Nagisa. Sob um sol escaldante, pisei no terraço da festa do chá.）"
2002402-4 = "Terraço da Trinity"
2002402-5 = "Eu estava à sua espera, Sensei."
2002402-6 = "Acabei de preparar o chá da tarde, mas..."
2002402-7 = "...parece que seria melhor se você secasse esse suor primeiro."
2002402-8 = "Não me diga que você veio correndo até aqui?"
2002402-9 = "[s] \"Eu não podia me atrasar para o compromisso com a Nagisa...\""
2002402-10 = "Fico feliz com o seu gesto, mas não precisa se esforçar tanto."
2002402-11 = "...Nesse estado, talvez uma bebida gelada fosse melhor?"
2002402-12 = "Espere um momento, vou preparar um chá gelado agora mesmo."
2002402-13 = "[s] \"Obrigado. Ah, se for algo gelado, eu acabei de comprar um...\""
2002402-15 = "[ns] Tiro um chá de garrafa da bolsa."
2002402-16 = "……？"
2002402-17 = "Ah, isso também é chá... e já está pronto para beber...?"
2002402-18 = "Não sabia que existiam coisas assim... É uma marca que nunca vi antes..."
2002402-23 = "...Sensei. Se não se importar, poderia compartilhar um pouco desse chá comigo?"
2002402-24 = "É um pouco embaraçoso admitir, mas eu achava que conhecia praticamente todos os chás disponíveis em Kivotos."
2002402-25 = "Desde os mais populares, como o \"Lepton\", até as folhas de chá de luxo da empresa \"Twilight\", que são difíceis de encontrar até na Trinity..."
2002402-26 = "Mas é a primeira vez que vejo a marca que você tem aí. Parece que ainda tenho muito o que aprender."
2002402-27 = "Para fins de estudo, poderia me deixar provar um pouco?"
2002402-28 = "[ns] \"Claro, sem problemas.\""
2002402-30 = "Muito obrigada, Sensei."
2002402-31 = "Então..."
2002402-35 = "……。"
2002402-38 = "（...Doce!?）"
2002402-39 = "（Q-que chá é esse!? Que doçura é essa, quase engasguei...!）"
2002402-40 = "（Eu sabia que algumas pessoas colocam geleia no chá, mas... isso é algo diferente, uma doçura intensa como se o açúcar estivesse intacto...）"
2002402-41 = "（E esse aroma tão forte de aromatizante sintético... não consigo sentir o sabor do chá de jeito nenhum...!?）"
2002402-42 = "（Minha boca está cheia de açúcar... eu adoraria algo para limpar o paladar, mas...）"
2002402-43 = "（Seria falta de educação com o Sensei, que gentilmente compartilhou o chá comigo...）"
2002402-45 = "M-muito obrigada. Como posso dizer... é um sabor bem peculiar."
2002402-46 = "O \"aroma de chá\", que costuma dividir opiniões, é apenas um toque. Em vez disso, eles enfatizaram a \"doçura\" ao máximo. Como devo descrever... é popular, ou talvez, inovador..."
2002402-47 = "Dessa forma, talvez até o pessoal de Millennium ou Gehenna, que não costuma apreciar chá, consiga aproveitar facilmente. He, hehe..."
2002402-48 = "[s1] \"Sim. É de garrafa, mas é muito gostoso.\"\n[s2] \"Como esperado da Nagisa, seu conhecimento é vasto.\""
2002402-49 = "F-foi uma experiência muito valiosa para mim também."
2002402-50 = "F-foi uma experiência muito valiosa para mim também."
2002402-51 = "Receber um choque desses... digo, provar um sabor assim. Hoje é um dia maravilhoso."
2002402-52 = "Ahaha... então, recompondo-me, vamos ao #nchá da tarde que preparei aqui—"
2002402-53 = "[s] \"Eu tenho vários outros chás de garrafa aqui, quer provar?\""
2002402-54 = "...Eh?"
2002402-55 = "P-por que você tem tantos...? Eh, tem mais?"
2002402-56 = "B-bem, isso já é demais, er..."
2002402-57 = "[s3] \"Vou aproveitar o chá que você preparou também.\"\n[s4] \"Com tantas opções, fica difícil escolher.\""
2002402-58 = "É-é verdade...!?"
2002402-59 = "É-é verdade...!?"
2002402-60 = "E-então... vou provar este aqui pelo rótulo."
2002402-62 = "（Talvez por ter bebido chá demais, Nagisa começou a parecer pálida, então decidimos encerrar o encontro mais cedo naquele dia.）"
