[translation]
34130-1 = "Episódio 13; O Nosso Passado"
34130-3 = "[ns1] (Seia...)\n[ns2] (Mika...)"
34130-8 = "S-Sensei?"
34130-9 = "......Desculpe, te acordei?"
34130-10 = "Teve um pesadelo?#n――Bem, é difícil dormir profundamente num ambiente desses. Embora nós já estejamos acostumadas."
34130-11 = "[s] \"...O que vocês estavam fazendo?\""
34130-12 = "Eu estava de olho na Líder. Parece que o antitérmico fez efeito, ela não tem mais febre. Agora ela está dormindo..."
34130-13 = "Mas também não podemos ficar descansando pra sempre.#n......As perseguidoras ainda não chegaram, então vamos partir em uns 30 minutos."
34130-14 = "[s] \"30 minutos, hein...\""
34130-15 = "Sim. Precisa de mais alguma coisa?"
34130-16 = "[s3] \"...Você pode continuar a história de antes?\"\n[s4] \"Eu gostaria de ouvir a história de vocês.\""
34130-17 = "Hum... B-Bem..."
34130-18 = "Hum... B-Bem..."
34130-19 = "O que você quer com isso... Não é uma história divertida de se ouvir."
34130-23 = "......Bem, se servir as partes que eu conheço, eu te conto. Já que temos um tempo sobrando mesmo."
34130-24 = "......"
34130-26 = "――Minhas primeiras lembranças são da figura da 'Madame' declarando o fim da longa guerra civil."
34130-27 = "Como éramos crianças, não sabíamos nada sobre a guerra civil, nem sobre a 'Madame'.#nApenas aceitávamos tudo de forma vaga, pensando que 'as coisas são assim'."
34130-28 = "A 'Madame' disse que era a nova presidente do conselho estudantil da Arius, a mestre e governante. Depois disso, ela começou a ensinar muitas coisas para as alunas que restaram."
34130-30 = "[ruby=Vanitas vanitatum et omnia vanitas]Tudo é vaidade. Não importa até onde se vá, tudo é apenas vaidade[/ruby]."
34130-32 = "Várias técnicas de combate... e a verdade de que 'Tudo é vaidade'..."
34130-33 = "Fomos ensinadas que t-todo o sofrimento pelo qual passávamos era culpa da 'Trinity'...#nE que a 'Gehenna' era uma existência com a qual jamais poderíamos coexistir..."
34130-34 = "[ns] \"......\""
34130-36 = "Q-Que, como nós possuíamos a 'vontade de matar' que odeia e despreza os outros...#nÉramos iguais a 'assassinas'..."
34130-37 = "E que não existia lugar para 'assassinas' além deste distrito autônomo..."
34130-38 = "A 'ela' dizia que era a única existência verdadeira que nos ensinaria a verdade, e a adulta a quem as alunas deveriam obedecer e respeitar..."
34130-39 = "C-Como era uma adulta falando... nós aceitamos sem duvidar de nada..."
34130-41 = "Todo mundo seguia os ensinamentos.#nPorque se você se rebelasse, você seria punida... como a Azusa-chan, ou a Princesa."
34130-42 = "[s] \"......\""
34130-43 = "Hiii...!? S-Sensei!? Você está com uma cara assustadora...!?"
34130-44 = "......Eu te avisei. Não é uma história divertida."
34130-45 = "Que medo... Adultos dão medo..."
34130-46 = "[s5] \"...Me desculpe. Vocês podem me falar mais sobre a Atsuko?\"\n[s6] \"Por que a Atsuko é chamada de 'Princesa'?\""
34130-47 = "P-Por que a Princesa é chamada assim..."
34130-48 = "P-Por que a Princesa é chamada assim..."
34130-49 = "Bem... P-Porque ela é uma princesa...?"
34130-50 = "A Princesa... era uma princesa desde que éramos pequenas."
34130-52 = "Dizem que ela carrega o sangue da antiga presidente do conselho estudantil que governava o distrito autônomo.#nPor isso ela era chamada de 'Sangue Real'."
34130-53 = "Parece que a presidência do distrito autônomo de Arius costumava ser hereditária.#n――Se as coisas tivessem sido diferentes, era ela quem deveria se tornar a presidente do conselho estudantil da filial de Arius."
34130-54 = "......A Líder, a Hiyori e eu sempre tivemos uma vida miserável nas favelas desde crianças."
34130-55 = "A Princesa nas minhas memórias... sempre usou roupas cheias de elegância desde os velhos tempos.#nE-Ela era completamente diferente da gente... he, hehe..."
34130-57 = "Para mim e para a Líder, a Princesa era um alvo de inveja.#n......Mas a Misaki-san não parecia se importar muito..."
34130-58 = "......Bem, não é como se eu não me importasse nada. Eu só não demonstrava."
34130-59 = "A-Ah, era assim!?"
34130-60 = "A Princesa era muito gentil. Ela estendeu a mão até mesmo para alguém como eu..."
34130-61 = "Pensando bem, ela costumava rir bastante antes de começar a usar a máscara...#nA Atsuko... é uma pessoa muito importante para mim também."
34130-62 = "......"
34130-63 = "――Depois que a guerra civil acabou, começaram a espalhar rumores de que a Princesa seria oferecida como um sacrifício pelas mãos da 'ela'."
34130-64 = "Nós não entendíamos direito o porquê daquilo..."
34130-65 = "Só achávamos que ela tinha sido escolhida por ser uma existência nobre e respeitada por todos."
34130-66 = "......"
34130-67 = "Mas, a Líder não aceitou isso.#nPor isso, ela trouxe a Princesa, que deveria ser oferecida como sacrifício, para perto da gente."
34130-68 = "Eu não sei como ela conseguiu trazê-la, mas..."
34130-69 = "Duvido que a 'ela' fosse libertar a Princesa de bom grado... Então acho que a Líder fez algum tipo de acordo ou promessa com a 'ela'."
34130-70 = "[s] \"......\""
34130-73 = "Me disse que, se eu quisesse mudar o destino da Princesa, teria de obedecer às suas ordens..."
34130-74 = "Que se eu fizesse isso, pouparia não apenas a Princesa... mas as minhas companheiras também."
34130-76 = "E foi assim, que a Princesa escondeu o rosto e a voz, e começou a receber treinamento com a gente."
34130-77 = "A Líder... guiou a Hiyori, a Princesa, eu, e mais tarde a Azusa, pessoalmente. Olhando para trás, essas são memórias bem dolorosas."
34130-78 = "Eu nem quero lembrar disso... a Líder era tão assustadora naquela época..."
34130-79 = "Depois disso, nós fomos chamadas de 'Esquadrão', e encarregadas de realizar muitas missões para a Arius."
34130-80 = "......Mas, no fim das contas, nós falhamos nas missões, e a Princesa foi capturada como 'sacrifício' assim como prometido."
34130-81 = "......"
34130-82 = "......E agora estamos voltando para Arius como traidoras, acompanhadas do Sensei da 'Schale', que era o nosso alvo original――Realmente, não é uma história nem um pouco engraçada."
34130-87 = "Vejo que estão tendo uma conversa interessante."
34130-88 = "L-Líder!?"
34130-89 = "......Eu acordei. Como você está se sentindo?"
34130-90 = "Consigo me mover sem problemas... Foi de grande ajuda."
34130-91 = "A-Ainda bem... hehe... Pensei que estivesse tudo acabado para nós..."
34130-92 = "Entendi... Se a febre baixou, acho que está tudo bem."
34130-93 = "Mas não se esqueça de que você ainda não está na sua condição normal."
34130-94 = "......Então, o que vamos fazer agora?"
34130-95 = "Nós vamos salvar a Princesa agora, não é...?"
34130-96 = "Sim."
34130-97 = "Vamos para a Basílica de Arius resgatar a Princesa. Esse foi o nosso único objetivo desde o início."
34130-98 = "......"
34130-99 = "......"
34130-100 = "Como você planeja se infiltrar na Basílica?#nA esta altura, ela também já sabe que nós nos infiltramos no distrito autônomo."
34130-101 = "Eu já tenho uma rota em mente. ――Vamos em direção ao antigo prédio escolar da filial de Arius."
34130-106 = "A-Ao antigo prédio escolar?#nMas a-aquele lugar é uma ruína que está abandonada há muito tempo...!?"
34130-107 = "E o que tem lá?"
34130-108 = "......Eu ouvi isso da Princesa. Dizem que, há muito tempo, quando a Sociedade dos Santos construiu a filial de Arius, eles fizeram um corredor subterrâneo conectando a Basílica à filial."
34130-109 = "[s] \"A Sociedade dos Santos construiu a filial de Arius...?\""
34130-110 = "......Sim. Há muito tempo atrás――quem apoiou a fuga da Arius, que se opôs à união de Trinity, foi a Sociedade dos Santos Justina."
34130-111 = "Elas, que foram as que mais condenaram a Arius, lideraram a fuga da Arius para fora do distrito autônomo de Trinity e a sua reconstrução."
34130-112 = "O corredor foi construído há muito tempo, então é bem provável que a 'ela' tenha deixado ele passar despercebido."
34130-113 = "Vai ser um desvio, mas deveremos conseguir entrar na Basílica em segurança."
34130-114 = "Você sabe onde esse corredor fica?"
34130-115 = "Não... O primeiro passo será procurar por ele."
34130-116 = "Entendi..."
34130-117 = "M-Mas não há outro jeito, né?#nO-Ou então, nós vamos forçar a entrada na Basílica...? Mesmo sabendo que é absolutamente impossível..."
34130-118 = "Forçar a entrada está fora de cogitação. ......Pois é. Normalmente eu nunca procuraria algo baseado num boato desses, mas com o Sensei aqui... Dá pra tentar, não?"
34130-119 = "[s] \"Sim. Vamos ver o que conseguimos achar.\""
34130-120 = "S-Sim!"
34130-127 = "O antigo prédio escolar não fica longe daqui. Vamos nos mover sem chamar atenção."
34130-132 = "Entendido."
34130-133 = "Vamos partir!"
34130-140 = "Em algum lugar no distrito autônomo de Arius"
34130-143 = "*Cof, cof*..."
34130-144 = "Nossa... Fiquei tanto tempo presa no quarto que acho que fiquei enferrujada... Ou será que é culpa dos rocamboles?"
34130-150 = "......Mas, pelo jeito, parece que cheguei."
34130-158 = "O-O que foi isso!? Quem é você!!"
34130-159 = "V-Você é!?"
34130-160 = "Ahaha, oi☆ ......Ah, que oportunidade perfeita!"
34130-161 = "Ei, ei, para que lado fica a Basílica de Arius?"
34130-162 = "I-Invasora!! Entrem em contato com o pelotão principal imediatamente..."
34130-169 = "Ei, não pode. ――É falta de educação fazer escândalo no meio da noite. Não ensinaram isso a vocês?"
34130-171 = "A-Atirem!! Todas as unidades, ataquem!!"
34130-175 = "Ai, isso dói..."
34130-176 = "Bom, não é como se eu não esperasse por isso."
34130-183 = "Próximo Episódio; Encontro Inesperado"