[translation]
34130-1 = "Episódio 13;O Nosso Até Aqui"
34130-3 = "[ns1] （Seia……）\n[ns2] （Mika……）"
34130-8 = "S-Sensei?"
34130-9 = "……Desculpa, te acordei?"
34130-10 = "Sonhou com algo?#n――Bom, num ambiente desses, dormir fundo é difícil mesmo. A gente já tá acostumada."
34130-11 = "[s] \"……O que vocês estavam fazendo?\""
34130-12 = "A gente tava de olho na Líder. O antitérmico parece ter feito efeito; a febre já passou. Agora ela dorme……."
34130-13 = "Mas não dá pra descansar pra sempre, né.#n……Os perseguidores ainda não chegaram, então, daqui a uns 30 minutos, partimos."
34130-14 = "[s] \"30 minutos, é…….\""
34130-15 = "Sim. Precisa de alguma coisa?"
34130-16 = "[s3] \"……Dá pra me contar a continuação daquela história?\"\n[s4] \"Quero ouvir a história de vocês.\""
34130-17 = "É que…… i-isso……."
34130-18 = "É que…… i-isso……."
34130-19 = "Pra que ouvir isso……? Não é uma história agradável de escutar."
34130-23 = "……Bom, se servir o que eu sei, eu conto. De todo jeito, tá sobrando tempo."
34130-24 = "……."
34130-26 = "――A primeira lembrança é a figura da \"Madame\" declarando o fim da guerra interna que durou anos."
34130-27 = "A gente era pequena, então não sabia nada nem da guerra, nem da \"Madame\".#nSó aceitamos, vagamente, um \"ah, é assim\"."
34130-28 = "A \"Madame\" dizia ser a nova presidente do conselho de Arius, a dona, a soberana. E, assim, passou a ensinar muitas coisas às alunas que restaram."
34130-30 = "Tudo é vão. Por mais longe que se vá, tudo não passa de algo vão."
34130-32 = "Várias técnicas de combate…… e a \"verdade\" de que \"tudo é vão\"……."
34130-33 = "Q-que todo o sofrimento que a gente vive é culpa de \"Trinity\"……#ne que \"Gehenna\" é, de saída, uma existência com quem a coexistência é impossível; foi o que nos ensinaram……."
34130-34 = "[ns] \"…….\""
34130-36 = "Q-que nós, por termos a \"vontade de matar\", de odiar e detestar alguém……#nsomos o mesmo que \"assassinas\"……."
34130-37 = "E que, fora este distrito autônomo, não há lugar pra \"assassinas\"……."
34130-38 = "\"Ela\" dizia ser a existência verdadeira que ensina a verdade, a adulta a quem as alunas deviam obedecer e respeitar……."
34130-39 = "P-por ser palavra de adulto…… a gente aceitava, sem duvidar……."
34130-41 = "Todo mundo seguia esses ensinamentos.#nQuem se rebelava apanhava…… como a Azusa, ou a Hime."
34130-42 = "[s] \"…….\""
34130-43 = "Hi……!? S-Sensei!? Sua cara tá assustadora……!?"
34130-44 = "……Eu avisei. Que não era uma história agradável."
34130-45 = "Que medo…… adulto dá medo……."
34130-46 = "[s5] \"……Desculpa. Podem me contar sobre a Atsuko?\"\n[s6] \"Por que a Atsuko é chamada de 'Hime'?\""
34130-47 = "P-por que a Hime é chamada assim……."
34130-48 = "P-por que a Hime é chamada assim……."
34130-49 = "É que…… p-porque ela é uma princesa……?"
34130-50 = "A Hime…… era uma princesa desde quando a gente era pequena."
34130-52 = "Dizem que ela carrega o sangue da antiga presidente do conselho de Arius, que governava o distrito.#nPor isso a chamavam de \"sangue real\"."
34130-53 = "A presidência do distrito de Arius, até então, parece que era hereditária.#n――Por direito, era ela que devia se tornar a presidente da Filial de Arius."
34130-54 = "……Eu, a Líder e a Hiyori, desde pequenas, levávamos uma vida miserável na favela."
34130-55 = "A Hime, na minha memória…… sempre vestia roupas cheias de classe.#nT-totalmente diferente da gente…… he, hehe……."
34130-57 = "Pra mim e pra Líder, a Hime era objeto de admiração.#n……A Misaki parecia não ter muito interesse, mas……."
34130-58 = "……Não; não é que eu não tivesse interesse nenhum. Eu só não demonstrava."
34130-59 = "É-é sério!?"
34130-60 = "A Hime era muito gentil. Até pra alguém como eu, ela estendia a mão……."
34130-61 = "Aliás, na época em que não usava máscara, ela ria bastante…….#nA Atsuko…… é alguém querido pra mim também."
34130-62 = "……."
34130-63 = "――Depois que a guerra interna acabou, começou a correr o boato de que a Hime seria oferecida como sacrifício pelas mãos \"dela\"."
34130-64 = "Por que, exatamente, a gente não entendia bem……."
34130-65 = "A gente achava que ela tinha sido escolhida por ser uma existência nobre, respeitada por todos."
34130-66 = "……."
34130-67 = "Mas a Líder não aceitou isso.#nPor isso, trouxe pra junto da gente a Hime, que seria oferecida como sacrifício."
34130-68 = "Como ela conseguiu trazê-la, eu não sei……."
34130-69 = "Não dá pra crer que \"ela\" libertaria a Hime de bom grado…… então acho que houve alguma promessa entre a Líder e \"ela\"."
34130-70 = "[s] \"…….\""
34130-73 = "Que, se ela quisesse mudar o destino da Hime, obedecesse às ordens dela……."
34130-74 = "Que, assim, não só a Hime…… ela salvaria as outras companheiras também."
34130-76 = "E, assim, a Hime, escondendo o rosto e a voz, passou a treinar junto com a gente."
34130-77 = "A Líder…… treinou pessoalmente a mim, à Hiyori, à Hime――e à Azusa, que se juntou depois. Lembrando agora, é só uma memória dura."
34130-78 = "Nem quero lembrar…… a Líder daquela época dava muito medo……."
34130-79 = "Depois disso, a gente passou a ser chamada de \"Squad\" e a cumprir muitas missões da Arius."
34130-80 = "……Mas, no fim, a gente não cumpriu a missão, e a Hime, como prometido, acabou capturada como \"sacrifício\"."
34130-81 = "……."
34130-82 = "……E, ainda por cima, a gente tá voltando pra Arius como traidoras, junto do Sensei da \"Schale\", que era o alvo original――uma história que não dá nem pra rir."
34130-87 = "Vocês conversam sobre algo interessante, hein."
34130-88 = "L-Líder!?"
34130-89 = "……Você acordou. Como se sente?"
34130-90 = "Não a ponto de não conseguir me mexer…… obrigada."
34130-91 = "Q-que bom…… hehe…… eu já achava que tinha acabado tudo……."
34130-92 = "Sei…… se a febre baixou, deve estar tudo bem."
34130-93 = "Mas não esquece que a sua condição de agora não é a normal, viu."
34130-94 = "……E aí, o que fazemos agora?"
34130-95 = "A gente vai salvar a Hime agora…… né?"
34130-96 = "Sim."
34130-97 = "Rumo à Basílica de Arius, resgatar a Hime. Desde o início, o objetivo é só esse."
34130-98 = "……."
34130-99 = "……."
34130-100 = "E como você pretende entrar na Basílica?#nQue a gente já se infiltrou no distrito, ela também sabe."
34130-101 = "A rota eu já pensei. ――Vamos ao prédio velho da Filial de Arius."
34130-106 = "A-ao prédio velho?#nA-aquilo lá é uma ruína largada há um tempão, viu……!?"
34130-107 = "O que tem lá?"
34130-108 = "……Foi uma história que eu ouvi da Hime. Quando o Conselho dos Santos construiu a Filial de Arius, dizem que fez um corredor subterrâneo ligando a Basílica à filial."
34130-109 = "[s] \"O Conselho dos Santos construiu a Filial de Arius……?\""
34130-110 = "……Sim. Antigamente――quem apoiou a fuga da Arius, que se opôs à união de Trinity, foi o Conselho dos Santos de Justina."
34130-111 = "Elas, que mais acusaram a Arius, lideraram o êxodo da Arius pra fora do distrito de Trinity e a sua reconstrução."
34130-112 = "O corredor foi feito há muito tempo, então há grande chance de \"ela\" também não o conhecer."
34130-113 = "É uma volta maior, mas deve dar pra entrar na Basílica em segurança."
34130-114 = "E você sabe onde fica esse corredor?"
34130-115 = "Não…… primeiro, é achá-lo."
34130-116 = "Sei……."
34130-117 = "M-mas não tem outro jeito, né?#nO-ou, então, invadimos a Basílica na marra……? Impossível, claro……."
34130-118 = "Na marra é impossível. ……Pois é. Normalmente eu jamais sairia procurando com base num boato, mas agora tem o Sensei…… deve dar, não?"
34130-119 = "[s] \"Sim. Por ora, vamos lá ver.\""
34130-120 = "S-sim!"
34130-127 = "O prédio velho não fica longe daqui. Vamos nos mover sem chamar atenção."
34130-132 = "Entendido."
34130-133 = "Partiu!"
34130-140 = "Algum lugar do distrito autônomo de Arius"
34130-143 = "Cof, cof……."
34130-144 = "Hmm…… será que é porque eu fiquei o tempo todo no quarto? Enferrujei…… será culpa do rocambole?"
34130-150 = "……Bom, enfim, parece que cheguei."
34130-158 = "Q-quem é!? Quem é você!!"
34130-159 = "V-você é!?"
34130-160 = "Ahaha, olá☆……Ah, que ótimo, na hora certa!"
34130-161 = "Ei, ei, a Basílica de Arius é pra que lado?"
34130-162 = "U-uma invasora aqui! Avisem a tropa principal, rápido……."
34130-169 = "Ei, não pode――fazer barulho de madrugada incomoda, né. Não te ensinaram isso?"
34130-171 = "F-fogo!! Todas, atacar!!"
34130-175 = "Aai……."
34130-176 = "Bom, eu já imaginava que ia dar nisso."
34130-183 = "Próximo Episódio;Reencontro"
