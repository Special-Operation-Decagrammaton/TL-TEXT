[translation]
34130-1 = "Episódio 13; O que nos trouxe até aqui"
34130-3 = "[ns1] （Seia……）\n[ns2] （Mika……）"
34130-8 = "Se, Sensei?"
34130-9 = "……Desculpe, eu te acordei?"
34130-10 = "Teve um pesadelo? #n――Bem, é difícil dormir profundamente num ambiente desses. Embora nós estejamos acostumadas."
34130-11 = "[s] \"……O que vocês estavam fazendo?\""
34130-12 = "Estávamos observando a líder. Parece que o antitérmico fez efeito, ela não está mais com febre. Agora ela está dormindo……."
34130-13 = "Não podemos descansar para sempre, no entanto. #n……Os perseguidores ainda não chegaram, então vamos partir em uns 30 minutos."
34130-14 = "[s] \"30 minutos, é…….\""
34130-15 = "Sim. Precisa de alguma coisa?"
34130-16 = "[s3] \"……Pode continuar o que estava dizendo antes?\"\n[s4] \"Quero ouvir a história de vocês.\""
34130-17 = "Bem…… i, isso é……."
34130-18 = "Bem…… i, isso é……."
34130-19 = "Por que quer saber de algo assim…… não é uma história agradável de se ouvir."
34130-23 = "……Bem, se for dentro do que eu sei, eu conto. De qualquer forma, temos tempo de sobra."
34130-24 = "……."
34130-26 = "――Minha primeira memória é a figura da \"Madame\" declarando o fim da guerra civil que durou anos."
34130-27 = "Como éramos crianças, não sabíamos nada sobre a guerra civil ou sobre a \"Madame\". #nApenas aceitamos vagamente que era assim que as coisas eram."
34130-28 = "A \"Madame\" dizia que era a nova presidente do conselho estudantil de Arius, nossa mestra e governante. E assim, começou a ensinar muitas coisas aos alunos que restaram."
34130-30 = "Tudo é vaidade. Não importa o quão longe você vá, tudo é apenas vaidade."
34130-32 = "Várias técnicas de combate…… e a verdade de que \"tudo é vaidade\"……."
34130-33 = "F, fomos ensinadas que toda a dor que sentimos é culpa da \"Trinity\"…… #nE que \"Gehenna\" é uma existência com a qual é impossível coexistir……."
34130-34 = "[ns] \"…….\""
34130-36 = "Como nós possuímos uma \"vontade de matar\" que odeia e despreza os outros…… #nSomos iguais a \"assassinos\"……."
34130-37 = "E que, fora desta zona autônoma, não há lugar para \"assassinos\"……."
34130-38 = "Ela dizia que era a única existência verdadeira que ensinava a verdade, e que era uma adulta a quem os alunos deveriam obedecer e respeitar……."
34130-39 = "C, como era uma adulta falando…… aceitamos sem duvidar……."
34130-41 = "Todos seguiam esses ensinamentos. #nSe desobedecêssemos, éramos punidas…… como a Azusa-chan ou a Princesa."
34130-42 = "[s] \"…….\""
34130-43 = "Hii……!? S, Sensei!? Sua expressão está assustadora……!?"
34130-44 = "……Eu avisei. Que não era uma história agradável."
34130-45 = "Que medo…… adultos são assustadores……."
34130-46 = "[s5] \"……Desculpe. Pode me contar sobre a Atsuko?\"\n[s6] \"Por que chamam a Atsuko de 'Princesa'?\""
34130-47 = "P, por que chamam a Princesa assim……."
34130-48 = "P, por que chamam a Princesa assim……."
34130-49 = "Bem…… p, porque ela é uma princesa……?"
34130-50 = "A Princesa…… era uma princesa desde que éramos pequenas."
34130-52 = "Dizem que ela carrega o sangue da antiga presidente do conselho estudantil de Arius que governava a zona autônoma. #nPor isso a chamavam de \"Sangue Real\"."
34130-53 = "Parece que o cargo de presidente da zona autônoma de Arius era hereditário até então. #n――Originalmente, era ela quem deveria ter se tornado a presidente do conselho estudantil da filial de Arius."
34130-54 = "……A líder, eu e Hiyori vivíamos uma vida miserável na favela desde pequenas."
34130-55 = "A Princesa na minha memória…… sempre usou roupas cheias de elegância. #nN, nós éramos completamente diferentes…… he, hehe……."
34130-57 = "Para mim e para a líder, a Princesa era um objeto de inveja. #n……Embora a Misaki-san não parecesse muito interessada……."
34130-58 = "……Não, eu não é que não tivesse interesse nenhum. Só não demonstrava."
34130-59 = "S, sério isso!?"
34130-60 = "A Princesa era muito gentil. Mesmo para alguém como eu, ela estendia a mão……."
34130-61 = "Falando nisso, quando ela não usava máscara, ela sorria bastante…… #nAtsuko é…… uma pessoa muito importante para mim também."
34130-62 = "……."
34130-63 = "――Depois que a guerra civil terminou, começou a circular o boato de que a Princesa seria oferecida como sacrifício pelas mãos \"dela\"."
34130-64 = "Nós não entendíamos bem o porquê……."
34130-65 = "Achávamos que ela tinha sido escolhida por ser uma existência nobre, respeitada por todos."
34130-66 = "……。"
34130-67 = "Mas o líder não se convenceu com isso. #nPor isso, ele trouxe a princesa, que deveria ter sido oferecida como sacrifício, para perto de nós."
34130-68 = "Não sei como ele conseguiu trazê-la, mas..."
34130-69 = "Não acho que \"ela\" libertaria a princesa de bom grado... Então, imagino que o líder tenha feito algum tipo de acordo com \"ela\"."
34130-70 = "[s] \"……。\""
34130-73 = "Que se quisesse mudar o destino da princesa, deveria seguir as ordens dela..."
34130-74 = "E que, se fizesse isso, não apenas a princesa, mas... os outros companheiros também seriam poupados."
34130-76 = "Foi assim que a princesa começou a esconder o rosto e a voz, e a treinar conosco."
34130-77 = "O líder... treinou pessoalmente a mim, a Hiyori, a princesa — e a Azusa, que se juntou a nós depois. Mesmo lembrando agora, só me traz memórias dolorosas."
34130-78 = "Nem quero me lembrar... porque o líder naquela época era muito assustador..."
34130-79 = "Depois disso, fomos chamados de \"Esquadrão\" e passamos a executar muitas missões de Arius."
34130-80 = "...Mas, no fim das contas, não conseguimos cumprir as missões, e a princesa acabou sendo capturada como \"sacrifício\", exatamente como prometido."
34130-81 = "……。"
34130-82 = "...Além disso, estamos voltando para Arius como traidores, junto com o professor do \"Schale\", que era nosso alvo original — é uma história que realmente não tem graça."
34130-87 = "Estão contando uma história interessante."
34130-88 = "L-líder!?"
34130-89 = "...Você acordou. Como está se sentindo?"
34130-90 = "Não estou a ponto de não conseguir me mover... obrigado."
34130-91 = "Q-que bom... hehe... achei que tudo tinha acabado..."
34130-92 = "Entendo... se a febre baixou, acho que está tudo bem."
34130-93 = "Mas não se esqueça de que você não está em condições normais agora."
34130-94 = "...Então, o que faremos agora?"
34130-95 = "Vamos salvar a princesa agora, não é...?"
34130-96 = "Sim."
34130-97 = "Vamos em direção à Basílica de Arius e resgatar a princesa. Esse é o nosso único objetivo desde o início."
34130-98 = "……。"
34130-99 = "……。"
34130-100 = "Como pretende entrar na Basílica? #nEla já sabe que estamos infiltrados na região autônoma."
34130-101 = "Já pensei na rota. — Vamos para o prédio antigo da filial de Arius."
34130-106 = "O-o prédio antigo? #nMas aquilo é uma ruína que está abandonada há muito tempo...!?"
34130-107 = "O que tem lá?"
34130-108 = "...Foi algo que ouvi da princesa. Dizem que, quando a Associação de Estudantes construiu a filial de Arius, eles criaram um corredor subterrâneo que ligava a Basílica à filial."
34130-109 = "[s] \"A Associação de Estudantes construiu a filial de Arius...?\""
34130-110 = "...Sim. Antigamente — quem apoiou a fuga de Arius, que se opunha à União de Trinity, foi a Associação de Estudantes Justina."
34130-111 = "Elas, que foram as que mais condenaram Arius, lideraram o êxodo de Arius para fora da região autônoma de Trinity e sua reconstrução."
34130-112 = "Como o corredor foi feito há muito tempo, é muito provável que \"ela\" tenha deixado passar despercebido."
34130-113 = "Será um caminho mais longo, mas devemos conseguir entrar na Basílica com segurança."
34130-114 = "Você sabe onde fica esse corredor?"
34130-115 = "Não... primeiro teremos que começar procurando pelo corredor."
34130-116 = "Entendo..."
34130-117 = "M-mas não temos outra escolha, né? #nO-ou será que vamos invadir a Basílica à força...? Embora seja impossível..."
34130-118 = "Invadir à força não dá. ...É verdade. Normalmente, eu nunca tentaria procurar algo baseada apenas em boatos, mas agora temos o professor... talvez a gente consiga, não é?"
34130-119 = "[s] \"Sim. Vamos tentar por enquanto.\""
34130-120 = "S-sim!"
34130-127 = "O prédio antigo não fica longe daqui. Vamos nos mover sem chamar atenção."
34130-132 = "Entendido."
34130-133 = "Vamos partir!"
34130-140 = "Algum lugar na região autônoma de Arius"
34130-143 = "Cof, cof..."
34130-144 = "Hum... será que fiquei enferrujada porque fiquei no quarto o tempo todo ultimamente... ou será por causa do rocambole?"
34130-150 = "……Bem, de qualquer forma, parece que chegamos."
34130-158 = "Q-quem é você!!?"
34130-159 = "V-você é...!"
34130-160 = "Ahaha, olá☆……Isso, que sorte a minha!"
34130-161 = "Ei, ei, para que lado fica a Basílica de Arius?"
34130-162 = "U-um invasor aqui! Rápido, contatem o esquadrão principal..."
34130-169 = "Ei, não pode fazer isso — é um incômodo fazer barulho no meio da noite, sabia? Ninguém te ensinou isso?"
34130-171 = "A-atirem!! Todos, ataquem!!"
34130-175 = "Ai, ai..."
34130-176 = "Bem, eu já imaginava que terminaria assim."
34130-183 = "Próximo episódio: Encontro"
