[translation]
2004903-1 = "砂遊びもつまらない"
2004903-4 = "……あ、先生。"
2004903-5 = "来る気はしてたけど……。"
2004903-6 = "モモトークがあんな感じだったから……。#n先生だったらそうするかなって。"
2004903-7 = "前回はまんまと乗せられたけど……今回も同じだとは思わないで。"
2004903-8 = "[s1] \"砂のお城作り……面白いのに。\"\n[s2] \"ミサキと……お城……。\""
2004903-10 = "またそうやって……！"
2004903-11 = "言ったでしょ？もうつきあわないって。"
2004903-12 = "そもそも、砂で城を作ろうとするのが理解できない。"
2004903-13 = "どうせ最後は崩れるのに。なんでわざわざ……。"
2004903-14 = "あぁ、別に先生が一人でやるのは勝手だよ。"
2004903-15 = "好きなだけどうぞ。"
2004903-16 = "[ns] ミサキの隣で砂の城を作り始める。"
2004903-18 = "……。"
2004903-19 = "…………。"
2004903-20 = "[s] \"うーん、何度やっても崩れちゃうな……。\""
2004903-21 = "……砂を積むだけじゃすぐ崩れるよ。#n水を加えて固めないと。"
2004903-25 = "ちょっと貸して。"
2004903-26 = "まず水で湿らせて……#nバケツに入れて固めたあと、ひっくり返せば――"
2004903-27 = "ほら、崩れない。"
2004903-28 = "あとはこうやって木の枝を挿して……周りの形も……。"
2004903-31 = "[wa:550]― [log=미사키 수영복]ん……。[/log]"
2004903-33 = "― [log=미사키 수영복]もうちょっと……[wa:1680]こっちも削って……。[/log]"
2004903-36 = "[wa:1840]― [log=미사키 수영복]ここに枝を……[wa:2080]この角度で……。[/log]"
2004903-38 = "― [log=미사키 수영복]……[wa:1510]うん、[wa:1430]これでいいかな。[/log]"
2004903-41 = "[wa:1880]― [log=미사키 수영복]……あれ？[/log]"
2004903-43 = "― [log=미사키 수영복]なんで私、[wa:1720]砂の城なんて[wa:1130]作ってるの……？[/log]"
2004903-46 = "[wa:530]― [log=미사키 수영복]……っ！[wa:1640]先生……！[/log]"
2004903-49 = "[ns] \"えっ、いや、私は……。\""
2004903-50 = "[wa:830]― [log=미사키 수영복]最初から[wa:610]こうさせるつもりだったんじゃ……！[/log]"
2004903-53 = "― [log=미사키 수영복]……[wa:450]全然、[wa:1820]これっぽっちも、[wa:1670]楽しんでないからね！[/log]"
2004903-57 = "[ns3] \"でも、素敵なお城じゃない？\"\n[ns4] \"時間をかけた分、きれいにできたんじゃないかな。\""
2004903-60 = "何だっていいよ。#nどうせ崩れちゃうし、意味のないことだから……。"
2004903-61 = "そんなに頑張ってもないし。"
2004903-65 = "まあでも……悪くは――"
2004903-68 = "[ns] \"あっ、お城が……。\""
2004903-69 = "……。"
2004903-70 = "[s] \"崩れちゃった……。\""
2004903-71 = "ほらね……結局、全部無駄なんだよ。"
2004903-72 = "いくら頑張ったって、振り出しに戻るだけ。"
2004903-73 = "砂の城は、砂に戻った。"
2004903-74 = "何も残らない、ただの徒労。"
2004903-75 = "[s5] \"でも、全部が無意味だったわけじゃないよ。\"\n[s6] \"いい写真が撮れたからね。\""
2004903-78 = "……どういうこと？"
2004903-79 = "見て……って。"
2004903-80 = "……っ！？！？"
2004903-81 = "これ、いつの間に……！！"
2004903-82 = "[s] \"頑張ってる姿ってカッコイイよね！\""
2004903-86 = "消して。"
2004903-87 = "今すぐ。"
