[translation]
2004903-1 = "Brincar na areia é um tédio."
2004903-4 = "……Ah, Sensei."
2004903-5 = "Eu imaginei que você viria, mas……."
2004903-6 = "O MomoTalk estava daquele jeito…… então pensei que, se fosse você, Sensei, provavelmente faria isso."
2004903-7 = "Da última vez eu caí direitinho na sua conversa, mas…… não pense que vai ser igual desta vez."
2004903-8 = "[s1] \"Fazer castelos de areia…… é divertido, sabe?\"\n[s2] \"Misaki e…… um castelo…….\""
2004903-10 = "Lá vem você de novo……!"
2004903-11 = "Eu não disse? Que não ia mais entrar nessa."
2004903-12 = "Para começo de conversa, não entendo por que alguém tentaria fazer um castelo de areia."
2004903-13 = "De qualquer forma, ele vai desmoronar no final. Por que se dar ao trabalho……."
2004903-14 = "Ah, bem, se você quer fazer sozinho, Sensei, o problema é seu."
2004903-15 = "Fique à vontade."
2004903-16 = "[ns] Começo a construir um castelo de areia ao lado de Misaki."
2004903-18 = "……."
2004903-19 = "…………."
2004903-20 = "[s] \"Hmm, não importa o quanto eu tente, ele desmorona…….\""
2004903-21 = "……Só empilhar a areia não vai adiantar, ele vai desmoronar. #nVocê precisa adicionar água para firmar."
2004903-25 = "Me empresta um pouco."
2004903-26 = "Primeiro, umedeça com água…… #ncoloque no balde e compacte, depois vire de cabeça para baixo――"
2004903-27 = "Viu? Não desmorona."
2004903-28 = "Agora, espete um galho de árvore assim…… e ajuste o formato ao redor……."
2004903-31 = "[wa:550]― [log=미사키 수영복]Hmm…….[/log]"
2004903-33 = "― [log=미사키 수영복]Mais um pouco…… [wa:1680]ajuste aqui também…….[/log]"
2004903-36 = "[wa:1840]― [log=미사키 수영복]Coloque o galho aqui…… [wa:2080]neste ângulo…….[/log]"
2004903-38 = "― [log=미사키 수영복]…… [wa:1510]Pronto, [wa:1430]acho que assim está bom.[/log]"
2004903-41 = "[wa:1880]― [log=미사키 수영복]……Ué?[/log]"
2004903-43 = "― [log=미사키 수영복]Por que eu estou [wa:1720]fazendo um castelo de areia……?[/log]"
2004903-46 = "[wa:530]― [log=미사키 수영복]……! [wa:1640]Sensei……![/log]"
2004903-49 = "[ns] \"Ah, não, eu…….\""
2004903-50 = "[wa:830]― [log=미사키 수영복]Você planejou [wa:610]me fazer fazer isso desde o início, não foi……![/log]"
2004903-53 = "― [log=미사키 수영복]…… [wa:450]Eu não estou, [wa:1820] nem um pouco, [wa:1670]me divertindo, viu![/log]"
2004903-57 = "[ns3] \"Mas não é um castelo maravilhoso?\"\n[ns4] \"Já que dedicamos tempo a ele, ficou bem bonito, não acha?\""
2004903-60 = "Tanto faz. #nDe qualquer jeito ele vai desmoronar, é tudo uma perda de tempo……."
2004903-61 = "E eu nem me esforcei tanto assim."
2004903-65 = "Bem, mas…… não foi tão ruim――"
2004903-68 = "[ns] \"Ah, o castelo…….\""
2004903-69 = "……."
2004903-70 = "[s] \"Desmoronou…….\""
2004903-71 = "Viu só…… no final, é tudo inútil."
2004903-72 = "Não importa o quanto você se esforce, você só volta para o ponto de partida."
2004903-73 = "O castelo de areia voltou a ser areia."
2004903-74 = "Não sobra nada, é apenas um esforço em vão."
2004903-75 = "[s5] \"Mas não significa que tudo foi sem sentido.\"\n[s6] \"Porque eu consegui tirar uma foto muito boa.\""
2004903-78 = "……O que você quer dizer?"
2004903-79 = "Olha…… isso."
2004903-80 = "……!?!?"
2004903-81 = "Quando foi que você tirou isso……!!"
2004903-82 = "[s] \"Ver você se esforçando é muito legal!\""
2004903-86 = "Apaga."
2004903-87 = "Agora mesmo."
