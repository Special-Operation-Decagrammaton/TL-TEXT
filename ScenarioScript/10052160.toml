[translation]
10052160-1 = "Malkuth: Peregrino do reino que chegou ao fim do mundo"

10052160-2 = "[ns] \"Aquelas crianças!?\""

10052160-3 = "...Parece que ele está se escondendo."

10052160-4 = "Por que ele fez isso? Mesmo depois desse período, ele ainda não parece estar disposto a me contar."

10052160-5 = "Talvez eu ainda não tenha carinho suficiente..."

10052160-6 = "...Não é tão simples, Alice."

10052160-7 = "No entanto, é incompreensível."

10052160-8 = "Embora eles tenham dito que estavam fazendo isso por nós, eles ainda não nos contaram nada sobre a situação, apesar de estarem em uma situação tão difícil."

10052160-9 = "Isso mesmo. #nSó falar sobre isso já deve lhe dar algum tempo. É ineficiente."

10052160-10 = "Ou você está fazendo isso sem pensar nas consequências? #nEntão acho que não há nada que eu possa falar."

10052160-11 = "Não importa como você diga, eu não teria causado essa situação levianamente..."

10052160-15 = "Bem, ou os Quatro Reis Celestiais do Castelo do Demônio não sabem a real situação, ou apenas dizem coisas que não fazem sentido!"

10052160-16 = "Acho que não precisei perguntar, certo? #nÉ uma economia de tempo!"

10052160-17 = "O que você faria se houvesse algo que você não pudesse contar?"

10052160-18 = "Não importa quais sejam as circunstâncias, isso definitivamente não é uma boa ideia..."

10052160-20 = "E-eu acho que está tudo bem aqui...! #nAh, tenho certeza que essas pessoas não vão me encontrar..."

10052160-22 = "Ugh... isso é cansativo."

10052160-23 = "Até aqui..."

10052160-27 = "Ain, Soph, Coruja, vocês estão bem?"

10052160-28 = "Ah, sim...! ainda--"

10052160-34 = "Sem problemas! #nUm...Ain parece um pouco cansada, mas não se preocupe com ela."

10052160-40 = "Oh meu Deus. Tanto Ain quanto Soph não têm coragem. #nAinda não――!"

10052160-46 = "……."

10052160-47 = "Ain, Soph, Coruja."

10052160-48 = "O Continente de Aço foi a sua vontade, certo?"

10052160-49 = "Sim... o que há de errado nisso?"

10052160-50 = "Fiquei muito feliz em saber que Ain, Soph e Owl criaram este continente de aço por vontade própria."

10052160-51 = "Mas por que decidiram criar um continente siderúrgico? #nO que eu estava tentando tirar disso - ainda não sei."

10052160-52 = "Um plano para expandir o Continente Steel e cobrir Kivotos. #nVejo que não há uma razão sólida para este plano."

10052160-53 = "Isso é..."

10052160-54 = "tudo bem. Eu não tive a intenção de [ruby=to]culpar[/ruby] nenhum de vocês."

10052160-55 = "Mas por que ele estava tentando expandir o Continente do Aço?"

10052160-56 = "E sobre o fato de você nem me contar o motivo."

10052160-57 = "Simplesmente me perguntando."

10052160-58 = "Não creio que essas coisas teriam acontecido se não tivéssemos nos apegado ao Continente do Aço."

10052160-59 = "……."

10052160-60 = "Desculpe, irmã."

10052160-61 = "Há uma razão pela qual não posso dizer isso."

10052160-62 = "Não deve ser pronunciado como um som..."

10052160-63 = "Mas por favor acredite em mim. É tudo pela minha irmã..."

10052160-67 = "Não, é para sua irmã e para nós."

10052160-68 = "Ain, Soph e Owl para mim?"

10052160-69 = "Por que diabos?"

10052160-70 = "Ei, irmã."

10052160-71 = "Sim, Soph."

10052160-75 = "Irmã, você quer viver?"

10052160-76 = "sim?"

10052160-77 = "……."

10052160-78 = "Desculpe, não entendi a intenção da pergunta..."

10052160-79 = "Agora que você ganhou consciência, é natural que queira continuar fazendo isso. #nNesse sentido...Sim, eu quero viver."

10052160-80 = "No entanto, Ain, Soph, Coruja."

10052160-81 = "Você já sabe, certo?"

10052160-82 = "Sim. Claro. Muito mais do que qualquer outra pessoa."

10052160-83 = "Mesmo assim, queremos viver..."

10052160-84 = "Quero viver para sempre com minha irmã."

10052160-85 = "isso é……."

10052160-86 = "...!"

10052160-87 = "Eu vejo."

10052160-88 = "Ainda não entendi completamente, mas se é isso que você quer."

10052160-89 = "Uh, uh..."

10052160-90 = "……."

10052160-91 = "Desculpe, irmã. Já estamos..."

10052160-92 = "Sim eu sei."

10052160-93 = "Você está bem. #nDe agora em diante, por favor, acredite em mim."

10052160-94 = "Para essa pessoa e para minhas preciosas irmãs."

10052160-97 = "Olá a todos!"

10052160-102 = "Esta é a batalha final do chefe, certo?"

10052160-103 = "sim. Acho que é uma metáfora adequada. “Momoi às vezes diz coisas boas.”"

10052160-104 = "Hmm... quantos apelidos eu tenho?"

10052160-105 = "Você realmente quer saber?"

10052160-106 = "U-uh... está tudo bem."

10052160-107 = "Por favor, concentre-se adequadamente, agora!"

