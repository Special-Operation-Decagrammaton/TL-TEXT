[translation]
1601303-1 = "コハルの危機"
1601303-3 = "（海辺の大きな岩を目印に歩いていると、コハルの姿を発見した）"
1601303-7 = "（どうやら、岩の上から海を眺めているようだ）"
1601303-8 = "[s1] \"ごめんね、待たせちゃって。\"\n[s2] \"コハル、ここで何してるの？\""
1601303-13 = "せ、先生……？"
1601303-14 = "あ、その、えっと……"
1601303-15 = "……なんか、よく分かんない。#nただ座ってみただけ……"
1601303-16 = "[s3] \"そうなの？\"\n[s4] \"どうして呼び出したの……？\""
1601303-19 = "何でだろう、自分でもよく分かんないんだけど……"
1601303-20 = "本当に、どうしちゃったのかな？#n先生を呼ぶ理由なんてなかったのに。"
1601303-21 = "気づいたら、先生に連絡しちゃってて……"
1601303-22 = "[s5] \"海が大きすぎたから、とか？\"\n[s6] \"こんなに綺麗な景色だもんね。\""
1601303-25 = "ん……"
1601303-26 = "そう、かも。"
1601303-27 = "そういえば、先生は滝を見ながらぼーっとしてたよね？"
1601303-28 = "……？"
1601303-29 = "先生だけじゃないんだ……#nいろんな人がよくやるって、本当に……？"
1601303-30 = "時間を無駄にしちゃうような気がするけど……"
1601303-31 = "せっかく遠くまで来たのに、何もしないなんて、意味分かんない。"
1601303-32 = "でも、先生がそこまで言うなら……"
1601303-36 = "うん、よし。#n私も……やってみよっかな。"
1601303-37 = "[s7] \"きっと、何か分かると思うよ。\"\n[s8] \"私も隣にいるからね。\""
1601303-42 = "当然でしょ……#nって、まさか、また1人でどっか行こうとしてたの！？"
1601303-43 = "他の人のとこに行って何するつもり！？"
1601303-44 = "私の目がなかったら、何も知らない人に、あんなコトやこんなコトを……"
1601303-45 = "もう！そんなの許さないんだから！私のそばから離れちゃダメ！禁止！禁止っ――！！"
1601303-46 = "[s9] \"何も言ってないんだけど……。\"\n[s10] \"……どこも行かないよ。\""
1601303-49 = "……またそんな事いって！騙されないんだからね！"
1601303-52 = "（こうして、コハルの隣で海を眺めて過ごすことになった）"
1601303-56 = "……いつまでこうしてればいいの？"
1601303-57 = "うーん……全然分かんない……#nやっぱ、こういうのは大人になってからじゃないとダメなのかな……"
1601303-58 = "か、考えるな、感じろって……？"
1601303-59 = "もう、私のことバカにしてるでしょ。#n先生の言ったことは、もうなんとなく理解してるし！"
1601303-60 = "はぁ……もういいかな。満喫した！"
1601303-61 = "じゃ、先生。行くわよ。"
1601303-62 = "帰って、みんなにも話そ……"
1601303-68 = "……！？"
1601303-69 = "……ふぇ！？な、何！？先生！！#nう、うしろ……後ろに水が……！！"
1601303-70 = "さっきまでは砂浜だったのに……！？#nど、どういうこと！？海になっちゃった！！"
1601303-71 = "[s11] \"あれ、本当だ。\"\n[s12] \"そういえば、今は上げ潮だったね。\""
1601303-74 = "なんでそんなに平気な顔してるの！？#nもう帰る道がなくなっちゃったのよ！？"
1601303-75 = "まさか……知ってたのにわざと教えてくれなかったの？"
1601303-76 = "わ、私……読んだことある……#n誰もこない場所だからって、外でいけないコトをしちゃう話……！！"
1601303-77 = "[s13] \"落ち着いて、コハル。\"\n[s14] \"まだ浅いから全然大丈夫だよ。\""
1601303-80 = "こんな状況で落ち着けるわけないでしょ！！"
1601303-81 = "最初から、これを狙って……！"
1601303-82 = "ちょっと油断したら、すぐこんな……！"
1601303-88 = "せ、先生！？……何してるの？#nそっちはもう水が……"
1601303-92 = "そ、そんな急に飛び込んだらダメ！！溺れちゃうでしょ！？#n危ないから、先生！！"
1601303-93 = "[s15] \"まだ腰のあたりだし、そこまで遠くないから。\"\n[s16] \"コハルもおいで、ほら。\""
1601303-96 = "で、でも……！！"
1601303-101 = "ひ、ひいっ！！"
1601303-102 = "せ、先生！待って！#n置いていかないで！"
1601303-108 = "（無事に砂浜まで戻ってこられたが……）"
1601303-109 = "（水深が浅かったにもかかわらず、コハルはずっと背中にくっついていた）"
1601303-115 = "ぅ……うっ……ううぅ……。"
1601303-116 = "………………うぅ。"
1601303-122 = "[ns17] \"よく頑張ったね、コハル。\"\n[ns18] \"大丈夫、もう怖くないよ。\""
1601303-125 = "うるさいっ！！先生のバカ！"
1601303-126 = "本っ当に怖かったんだから！！"
1601303-127 = "ビックリした……まさかあんな急に海面が上昇するなんて……"
1601303-128 = "え……？"
1601303-129 = "腰くらいの高さしか無かったって……？"
1601303-135 = "し、知らない！海に変わりはないんだから！"
1601303-136 = "プールとは全然違うし、心の準備ってのがあるの……！！"
1601303-137 = "ううん、そんなことが言いたいんじゃなくて……#nうぅ……もう、疲れた……"
1601303-143 = "せ、先生……"
1601303-144 = "もう少しだけ、ここにいてくれる？#n約束だよ、絶対だから……"
1601303-146 = "（その後、コハルが落ち着くまで寄り添ってから……）"
1601303-147 = "（元気になったところで、一緒に拠点まで戻った）"
