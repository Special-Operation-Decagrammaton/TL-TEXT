[translation]
1601303-1 = "A Crise de Koharu"
1601303-3 = "（Caminhando em direção à grande rocha na praia como ponto de referência, avistei Koharu.）"
1601303-7 = "（Parece que ela está observando o mar de cima da rocha.）"
1601303-8 = "[s1] \"Desculpe, te fiz esperar.\"\n[s2] \"Koharu, o que está fazendo aqui?\""
1601303-13 = "P-Professor...?"
1601303-14 = "Ah, bem, é que..."
1601303-15 = "……Eu não sei bem. Só sentei aqui um pouco..."
1601303-16 = "[s3] \"É mesmo?\"\n[s4] \"Por que você me chamou...?\""
1601303-19 = "Por que será? Nem eu mesma sei direito..."
1601303-20 = "Sério, o que deu em mim? Não tinha motivo nenhum para chamar o Professor."
1601303-21 = "Quando me dei conta, já tinha entrado em contato com você..."
1601303-22 = "[s5] \"Talvez porque o mar seja grande demais?\"\n[s6] \"A vista é muito bonita, não é?\""
1601303-25 = "Hum..."
1601303-26 = "É, talvez."
1601303-27 = "Falando nisso, o Professor estava lá olhando para a cachoeira sem fazer nada, né?"
1601303-28 = "……？"
1601303-29 = "Não é só o Professor... Muita gente faz isso, é sério...?"
1601303-30 = "Sinto que é um desperdício de tempo..."
1601303-31 = "Vim de tão longe, não faz sentido não fazer nada."
1601303-32 = "Mas, se o Professor diz isso..."
1601303-36 = "Certo, tudo bem. Eu também... acho que vou tentar."
1601303-37 = "[s7] \"Tenho certeza de que você vai entender algo.\"\n[s8] \"Eu estarei aqui do seu lado também.\""
1601303-42 = "É óbvio... Espera, não me diga que você ia sair por aí sozinho de novo!?"
1601303-43 = "O que você pretende fazer indo atrás de outras pessoas!?"
1601303-44 = "Se eu não estivesse de olho, você faria isso e aquilo com alguém que não sabe de nada..."
1601303-45 = "Ah! Eu não vou permitir isso! Não pode sair do meu lado! Proibido! Proibidooo――!!"
1601303-46 = "[s9] \"Eu não disse nada disso...\"\n[s10] \"……Não vou a lugar nenhum.\""
1601303-49 = "……De novo com isso! Não vou cair nessa!"
1601303-52 = "（Assim, passamos o tempo observando o mar ao lado de Koharu.）"
1601303-56 = "……Até quando temos que ficar assim?"
1601303-57 = "Hum... Não entendo nada... Será que esse tipo de coisa só funciona quando a gente vira adulto...?"
1601303-58 = "N-não pense, sinta...?"
1601303-59 = "Ah, você está me fazendo de boba, né? Eu já entendi mais ou menos o que o Professor quis dizer!"
1601303-60 = "Haa... Já chega. Aproveitei bastante!"
1601303-61 = "Então, Professor. Vamos embora."
1601303-62 = "Vamos voltar e contar para todo mundo..."
1601303-68 = "……！？"
1601303-69 = "……Hã!? O-o quê!? Professor!! A-a água atrás... atrás de nós está..."
1601303-70 = "Até agora pouco era areia...! O que aconteceu!? Virou mar!!"
1601303-71 = "[s11] \"Olha só, é verdade.\"\n[s12] \"Falando nisso, a maré está subindo agora.\""
1601303-74 = "Por que você está com essa cara tão calma!? O caminho de volta sumiu, sabia!?"
1601303-75 = "Não me diga... Você sabia e não me avisou de propósito?"
1601303-76 = "E-eu... já li sobre isso... Histórias de gente que faz coisas proibidas em lugares desertos...!!"
1601303-77 = "[s13] \"Fique calma, Koharu.\"\n[s14] \"Ainda está raso, está tudo bem.\""
1601303-80 = "Como eu vou ficar calma numa situação dessas!!"
1601303-81 = "Desde o começo, você estava planejando isso...!"
1601303-82 = "Bastou um segundo de descuido e olha só...!"
1601303-88 = "P-Professor!? ...O que você está fazendo? A água já está chegando ali..."
1601303-92 = "N-não pode pular assim de repente!! Você vai se afogar, sabia!? É perigoso, Professor!!"
1601303-93 = "[s15] \"A água está só na altura da cintura, não é tão fundo.\"\n[s16] \"Koharu, venha também, vamos.\""
1601303-96 = "Ma-mas...!!"
1601303-101 = "I-iiih!!"
1601303-102 = "P-Professor! Espere! #nNão me deixe para trás!"
1601303-108 = "(Conseguimos voltar para a areia em segurança, mas...)"
1601303-109 = "(Mesmo que a água estivesse rasa, Koharu ficou grudada nas minhas costas o tempo todo)"
1601303-115 = "Ugh... ugh... uuuuh..."
1601303-116 = "..............uuuh."
1601303-122 = "[ns17] \"Você foi muito bem, Koharu.\"\n[ns18] \"Está tudo bem, não precisa mais ter medo.\""
1601303-125 = "Cala a boca!! Professor idiota!"
1601303-126 = "Eu fiquei com muito, muito medo mesmo!!"
1601303-127 = "Foi um susto... quem diria que o nível do mar subiria tão de repente..."
1601303-128 = "Hã...?"
1601303-129 = "Que a água só batia na cintura...?"
1601303-135 = "E-eu não sei! O mar continua sendo o mar!"
1601303-136 = "É completamente diferente de uma piscina, e existe uma coisa chamada preparação mental...!!"
1601303-137 = "Não, não é isso que eu queria dizer... #nUgh... chega, estou exausta..."
1601303-143 = "P-Professor..."
1601303-144 = "Pode ficar aqui comigo só mais um pouco? #nPromete? É uma promessa, hein..."
1601303-146 = "(Depois disso, fiquei ao lado dela até que Koharu se acalmasse...)"
1601303-147 = "(Assim que ela se sentiu melhor, voltamos juntos para a base)"
