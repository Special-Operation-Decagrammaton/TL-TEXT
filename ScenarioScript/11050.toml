[translation]
11050-2 = "Episódio 5;Um dia comum na vida de Serika"
11050-3 = "Área residencial de Abydos, 45° quarteirão"
11050-6 = "(Reconheci um rosto familiar por uma área de Abydos)"
11050-7 = "Ugh... É você de novo."
11050-8 = "[s] \"Bom dia.\""
11050-9 = "Bom dia! Espera, não! Pare de ser tão amigável."
11050-10 = "Você ainda não ganhou a minha confiança."
11050-11 = "Está vagando por aí sem pressa desde o início da manhã. #nE ainda se chama de adulto..."
11050-12 = "[s] \"Está indo para a escola agora, Serika-chan?\""
11050-13 = "O-o que! Por que você está me chamando pelo meu primeiro nome?#nE \"-chan\"?!"
11050-14 = "O que eu faço não é da sua conta."
11050-15 = "Você fica andando sem rumo por aí de manhã cedo, é um péssimo exemplo de adulto."
11050-16 = "Até! Que tal me deixar em paz? Tô ocupada."
11050-17 = "Huh? Você quer ir pra escola juntos?"
11050-18 = "Você sabe, por que eu tenho que ir para a escola com você?"
11050-19 = "Além disso, hoje não tem aula, então não preciso ir à escola."
11050-20 = "Hmm? Então, para onde eu estou indo? ...E porque eu contaria isso?"
11050-21 = "Tchau, bye bye!"
11050-23 = "(Serika saiu correndo, levantando poeira)"
11050-24 = "[s] Seguir ela."
11050-26 = "Ahn!? P-por que você está me seguindo??"
11050-27 = "Quer saber pra onde estou indo?"
11050-28 = "O que você tá falando?! Sai daqui! Seu stalker!!"
11050-29 = "Tá, tá... já entendi! Vou te dizer pra onde eu tô indo!"
11050-30 = "...É o meu trabalho de meio período."
11050-31 = "Eu não posso pegar leve como você. Eu tenho que ganhar dinheiro!"
11050-32 = "Feliz agora? Para de me seguir!"
11050-34 = "[s] Seguir ela."
11050-37 = "Ugh... Tão persistente."
11050-38 = "...Huh? Aonde eu trabalho?"
11050-39 = "Ah meu Deus! Eu não te entendo! É pra lá, seu adulto mau! Se ir lá eu vou te matar!!"
11050-41 = "(Serika [ruby=(de novo)]saiu correndo[/ruby], levantando poeira)"
11050-43 = "Bem-vindo ao Shiba Seki Ramen!"
11050-44 = "Quantas pessoas no grupo? Mostrarei a vocês uma mesa vazia."
11050-45 = "Por favor espere um momento! Segunda porção de Ramen pra mesa 3!"
11050-46 = "(Porta abre)"
11050-47 = "Bem-vindo ao Shiba Seki Ramen..."
11050-48 = "Huuuh!?"
11050-49 = "Oi! Mesa pra cinco☆"
11050-50 = "Haha... Oi Serika-chan..."
11050-51 = "Oi."
11050-52 = "Por que vocês estão aqui...?!"
11050-53 = "Uhe~ Sabia que era aqui."
11050-54 = "[s] \"Olá.\""
11050-55 = "Até o Sensei... Realmente está me stalkeando!"
11050-56 = "Uhee~ O Sensei não é mauu. Nós deduzimos que esse era o único lugar que poderia estar trabalhando."
11050-57 = "Então foi você Hoshino-senpai? Ugh."
11050-59 = "Essas são as suas colegas, Serika-chan? por favor, pare de falar e anote seus pedidos."
11050-60 = "S-sim, senhor. Me sigam, vou mostrar uma mesa pra vocês."
11050-62 = "Senseeei, aqui! Senta do meu ladinho!"
11050-63 = "...Nn, a cadeira ao meu também tá vazia."
11050-64 = "[s1] Sente-se ao lado da Nonomi. \n[s2] Sente-se ao lado da Shiroko."
11050-65 = "(Senta)"
11050-66 = "Tá um pouco apertado, mas você tá bem, né?"
11050-67 = "Ara, você está desconfortável? Que tal você sentar no meu colo?"
11050-68 = "O que você tá fazendo em público?!"
11050-69 = "Haha, só estou brincando, Serika-chan☆"
11050-70 = "Existem muitos outros lugares vazios! Sentem-se CORRETAMENTE!"
11050-71 = "Haha... tá, tá."
11050-73 = "(Senta)"
11050-74 = "Hmm..."
11050-75 = "Não tem espaço! Shiroko-senpai, se tá deixando o Sensei discomfortável! Se afasta um pouco!"
11050-76 = "Não, você tá bem né, Sensei?"
11050-77 = "Por que você tá recusando?! Sentem-se CORRETAMENTE!!"
11050-78 = "Ah, desculpa..."
11050-81 = "Serika-chan. O seu uniforme de trabalho é fofo☆"
11050-82 = "Não sabia que era assim, Serika-chan. Escolheu trabalhar aqui por causa do uniforme, né?"
11050-83 = "Não, não, não! Nada disso! #nEssa era uma loja que eu frequentava..."
11050-84 = "Aposto que se eu tirasse fotos de você nesse uniforme, Serika-chan, conseguiria uma boa grana. #nO que você acha Sensei? Quer ser o meu premeiro cliente?"
11050-85 = "Por favor, pare com essas ideias estranhas, Senpai..."
11050-86 = "Quando você começou a trabalhar aqui?"
11050-87 = "Há cerca de uma semana..."
11050-88 = "Agora entendi o motivo de você desaparecer de vez em quando. Era porque estava trabalhando! ☆"
11050-89 = "Já é o suficiente! Peçam alguma coisa!!"
11050-90 = "\"Decidiram o que vão pedir?\" é o que quis dizer né? Serika-chan, você tem que sorrir e atender os clientes com gentileza."
11050-91 = "Ah... Decidiram o que vão pedir?"
11050-92 = "Eu gostaria de um pouco de chashu ramen, por favor!"
11050-93 = "Um shio ramen."
11050-94 = "Hmm... gostaria de um miso ramen."
11050-95 = "Eu quero o miso especial! Com chashu grelhado!"
11050-96 = "Sensei, não hesite em pedir qualquer coisa. #nEste restaurante é um dos melhores que ainda restam em Abydos!"
11050-97 = "...A propósito, todo mundo trouxe o seu próprio dinheiro? #nVocês não vão fazer com que a Nonomi-senpai pague de novo, certo?"
11050-98 = "Eu não me importo com isso. Ainda tá bem abaixo do limite do cartão da minha família. ☆"
11050-99 = "Não, podemos deixar você fazer isso. Tenho certeza que o Sensei vai pagar a conta hoje, né?"
11050-100 = "...Huh? Ninguém te contou? Hahaha, agora você sabe!"
11050-101 = "[s] (Fugir)"
11050-102 = "Pra onde você acha que tá indo?"
11050-103 = "(Eu fui pego)"
11050-105 = "Uhe~ você tem um cartão de adulto, Sensei. Esta é a sua hora de usar ele!"
11050-106 = "Você não costuma usar um cartão de adulto em um lugar como este...#nEntão a sua intenção desde o início era essa, senpai."
11050-107 = "Sensei, essa é uma ótima chance de saciar a fome das suas alunas fofas, não é?"
11050-108 = "..."
11050-112 = "(Sussurra) Aqui Sensei, pague com esse cartão."
11050-113 = "Huh? OK? Mas..."
11050-115 = "(Acabei pagando as refeições de todas)"
11050-116 = "Uau! Tava delicioso, Sensei!"
11050-117 = "Obrigada pela refeição."
11050-118 = "Un, estou satisfeita."
11050-119 = "Saiam logo! E não voltem mais! Vocês estão atrapalhando o meu trabalho!"
11050-120 = "Ahaha... Te vejo amanhã, Serika-chan..."
11050-121 = "Eu odeio vocês! Que todas morram!!"
11050-122 = "Hahaha, fico feliz em ver que você tá bem."
11050-123 = "[s] (Ir embora)"
11050-126 = "(Fecha a porta)"
11050-127 = "aaaah... Finalmente acabou. Mas que dia agitado."
11050-128 = "Todas apareceram e foi uma barulhera e tanta."
11050-129 = "Chegar aonde eu trabalho e ficar tagarelando \"Sensei! Sensei!\". É tão irritante, o que tá acontecendo?"
11050-130 = "Tenho certeza que a Hoshino-senpai chamou o Sensei de próposito, por causa do que aconteceu ontem!"
11050-131 = "...Não me façam rir. Se vocês acham que eu irei desistir tão facilmente, estão erradas..."
11050-136 = "..."
11050-137 = "É ela?"
11050-138 = "...Sim, é a membra da Força-Tarefa Hipotecária de Abydos."
11050-139 = "Se prepare. Vamos pegá-la no próximo bloco."
11050-142 = "..."
11050-143 = "Hmm..."
11050-144 = "...A cada dia que passa essa vizinhança fica mais e mais vazia. Tinha muita gente antes."
11050-145 = "E a segurança também piorou..."
11050-146 = "Não. Temos que persistir... e reconstruir a escola..."
11050-147 = "Quando eu receber o meu salário, vou usar para pagar a dívida, e então..."
11050-152 = "...!?"
11050-153 = "Quem são vocês?!"
11050-154 = "Você é Kuromi Serika?"
11050-155 = "...A Gangue do Capacete Kata-Kata? Vocês ainda estão por aqui?"
11050-156 = "Ótimo. Já estava de mau humor, agora vou garantir que vocês nunca mais coloquem seus pés por aqui!"
11050-157 = "(Da-da-da-da-da-da-da-da!!)"
11050-158 = "H-Huh?!"
11050-159 = "(Por trás também!?... É uma esmboscada.)"
11050-160 = "Peguem ela."
11050-161 = "(Boom!)"
11050-162 = "(Treme!)"
11050-163 = "(Tosse tosse)"
11050-164 = "(Uma arma antiaérea...? Não... esse é o som de um Flak 41 modernizado...?)"
11050-165 = "(De onde veio...?)"
11050-166 = "(Elas não estão brincando dessa vez... isso é perigoso...)"
11050-167 = "(Minha... consciência...)"
11050-168 = "(...)"
11050-170 = "(Baque)"
11050-172 = "..."
11050-173 = "Deveríamos espancá-la mais um pouco?"
11050-174 = "Não, isso é o suficiente. Joga ela dentro do carro e vá até o ponto de encontro."
11050-177 = "(Vrum)"
11050-179 = "Próxima Episódio;Missão de Resgate!"