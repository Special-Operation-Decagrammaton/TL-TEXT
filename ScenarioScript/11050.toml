[translation]
11050-2 = "Episódio 5; O dia comum de Celica"
11050-3 = "Área residencial de Abydos/área de 45 quarteirões"
11050-6 = "(Conheci um rosto conhecido em uma área residencial de Abydos)"
11050-7 = "Ugh...o que...! ?"
11050-8 = "[s] \"Bom dia.\""
11050-9 = "O que, “bom dia”? Você pode, por favor, parar de ser tão familiar?"
11050-10 = "Ainda não reconheci meu sensei!"
11050-11 = "Estou vagando por aí sem pressa desde o início da manhã. #nVocê tem um bom status."
11050-12 = "[s] \"Celica está indo para a escola agora?\""
11050-13 = "O-o que! Por que você está me ligando corretamente?"
11050-14 = "Não importa o que eu faça, não tem nada a ver com você, certo?"
11050-15 = "Se você passear por um lugar como esse de manhã cedo, vai parecer um péssimo exemplo de adulto, certo?"
11050-16 = "Até lá! Que tal apenas relaxar? Estou ocupado."
11050-17 = "foto? Se formos para a escola, iremos juntos?"
11050-18 = "Você sabe, por que eu tenho que ir para a escola com você?"
11050-19 = "Além disso, sinto muito, mas hoje é dia de aula livre, então não preciso ir à escola."
11050-20 = "sim? Então, onde você está indo? ...Você não pode me ensinar isso, certo?"
11050-21 = "Até lá, tchau."
11050-23 = "(Celica foi embora, levantando poeira)"
11050-24 = "[s] perseguição."
11050-26 = "Eiaaaa! ? P-por que você está me seguindo? ?"
11050-27 = "Se você me seguir, saberá para onde estou indo?"
11050-28 = "O que você está falando? ? Vá até lá! Eu não sou um perseguidor! !"
11050-29 = "Entendido! Eu entendo! Devo apenas dizer a você para onde ir?"
11050-30 = "...É meu trabalho de meio período."
11050-31 = "Ah, eu não posso pegar leve como você. Eu tenho que ganhar algum dinheiro!"
11050-32 = "Já basta, certo? Não me siga!"
11050-34 = "[s] perseguição."
11050-37 = "Ugh... isso é persistente."
11050-38 = "……foto? Você está curioso sobre seu trabalho de meio período?"
11050-39 = "Ah, já! Eu não entendo! Vá até lá! Não é um bom adulto! ! Basta ir até lá! Eu vou te matar! ?"
11050-41 = "(Celica foi embora, levantando poeira)"
11050-43 = "Bem-vindo! Shibaseki Ramen!"
11050-44 = "Quantas pessoas? Mostraremos a você um lugar vazio!"
11050-45 = "por favor espere um momento! Tabela 3, bolas adicionais adicionadas!"
11050-46 = "(garara)"
11050-47 = "Bem-vindo! No Shibaseki Ramen..."
11050-48 = "Uau! ?"
11050-49 = "Hum, são 5 pessoas!"
11050-50 = "Ah, haha... Celica-chan, você está tão cansada..."
11050-51 = "Obrigado pelo seu trabalho duro."
11050-52 = "Ei, pessoal... por que vocês estão aqui...! ?"
11050-53 = "Nossa, pensei que fosse aqui."
11050-54 = "[s] \"Olá.\""
11050-55 = "Bem, até o sensei... afinal, é um perseguidor! ?"
11050-56 = "Ei, o sensei não é ruim. Falando no trabalho de meio período da Celica-chan, esse é o único, certo? Foi por isso que vim."
11050-57 = "Hoshino-senpai...! ! Eca...!"
11050-59 = "Você é um estudante de Abydos? Celica-chan, por favor, pare de falar e anote meu pedido."
11050-60 = "Ah, ah... sim, General. Agora, vou mostrar-lhe um assento espaçoso... por favor, venha aqui..."
11050-62 = "Sim, sensei aqui! O lugar ao meu lado está vazio!"
11050-63 = "...Hmm, o que está ao meu lado também está vazio."
11050-64 = "[s1] Sente-se ao lado de Nonomi. \n[s2] Sente-se ao lado de Shiroko."
11050-65 = "(Sutão)"
11050-66 = "Hmm, é um pouco pequeno, mas está tudo bem, certo?"
11050-67 = "Ah, você está com cãibras? Nesse caso, você poderia sentar no meu colo?"
11050-68 = "O que você está fazendo? Na loja de outra pessoa!"
11050-69 = "Haha, estou brincando, Celica-chan☆"
11050-70 = "Existem muitos outros lugares vazios! Todos sentem-se corretamente!"
11050-71 = "Ah, haha... haha."
11050-73 = "(Sutão)"
11050-74 = "Hum..."
11050-75 = "Muito estreito! Shiroko-senpai, se você ficar assim, o sensei terá problemas! Aproxime-se!"
11050-76 = "Não, estou bem. Certo, sensei?"
11050-77 = "Por que você está se segurando aí? ? Há muitos lugares vazios! Sente-se corretamente!"
11050-78 = "Ah, eu entendo..."
11050-81 = "Celica-chan. O uniforme de trabalho de meio período é tão fofo☆"
11050-82 = "Bem, Celica-chan é assim? Você é do tipo que consegue um emprego de meio período usando uniforme?"
11050-83 = "Não, não, não! Não importa! #nEssa era uma loja que eu frequentava..."
11050-84 = "Se você tirar uma foto da Celica de uniforme, provavelmente conseguirá ganhar muito dinheiro. #nO que você acha? Você não vai comprar um, senhor?"
11050-85 = "Por favor, pare de fazer trabalhos paralelos estranhos, Senpai..."
11050-86 = "Quando você começou a trabalhar meio período?"
11050-87 = "Bom, há cerca de uma semana..."
11050-88 = "Isso mesmo ☆ Acho que o motivo pelo qual ele desaparecia de vez em quando era porque ele estava trabalhando meio período!"
11050-89 = "Bem, isso é o suficiente! Encomende agora! ?"
11050-90 = "\"Você está pronto para fazer o pedido?\" certo? Celica-chan, você tem que sorrir e atender os clientes com gentileza."

11050-91 = "Ah... já decidiu fazer seu pedido?"
11050-92 = "Eu gostaria de um pouco de macarrão chashu, por favor!"
11050-93 = "Eu sou sal."
11050-94 = "Bem... estou usando missô..."
11050-95 = "Para mim, miso ramen especial! Com coberturas de chashu grelhado!"
11050-96 = "Senseies, não hesitem em perguntar por Janjan. #nEste restaurante é tão delicioso! Especialidade de Abydos, ramen Shibaseki!"
11050-97 = "...A propósito, todo mundo está bem com dinheiro? Talvez #n você esteja planejando que Nonomi-senpai trate você de novo?"
11050-98 = "Sim, estou bem com isso. Com este cartão, ainda tenho muito espaço até o limite."
11050-99 = "Não, não posso me dar ao luxo de tratá-lo novamente. Tenho certeza que o sensei vai me presentear com alguma coisa. Certo, Sensei?"
11050-100 = "……foto? É a primeira vez que você ouve isso? Haha, acabei de ouvir, então é bom!"
11050-101 = "[s] Fuja."
11050-102 = "Eu não vou deixar você fazer isso."
11050-103 = "(eu fui pego)"
11050-105 = "Ei, há um cartão de adulto. Esta é a sua vez!"
11050-106 = "Não parece ser um lugar onde você possa usar cartão de adulto, mas...#n-senpai, você nos convidou para jantar com essa intenção desde o início."
11050-107 = "Como sensei, essa é uma ótima chance de saciar a fome dos seus lindos alunos, não é?"
11050-108 = "……."
11050-112 = "(Bruto) Sensei, por favor pague secretamente com isso."
11050-113 = "foto……? OK? mas……."
11050-115 = "(Terminei de pagar para todos)"
11050-116 = "Oh não! Foi incrível, Senseia!"
11050-117 = "Obrigado pela refeição."
11050-118 = "Sim, estou satisfeito graças a você."
11050-119 = "Saia rapidamente! Não volte mais! Porque está interferindo no trabalho!"
11050-120 = "Ah, haha... Celica-chan, até amanhã..."
11050-121 = "Eu realmente odeio isso! ! Todo mundo vai morrer! !"
11050-122 = "Haha, fico feliz em ver que você está bem."
11050-123 = "[s] Vá para casa."
11050-126 = "(Obrigado pelo seu trabalho duro!)"
11050-127 = "Suspiro... finalmente terminou. Foi um dia agitado."
11050-128 = "Eu não gostaria que todos viessem se fosse barulhento."
11050-129 = "Embora houvesse pessoas trabalhando lá, os Senseies estavam muito entusiasmados. É realmente chato, o que é isso?"
11050-130 = "Hoshino-senpai, você deve ter trazido o sensei aqui de propósito por causa do que aconteceu ontem!"
11050-131 = "...Não seja bobo. Se você acha que posso quebrá-lo tão facilmente, você está errado."
11050-136 = "……."
11050-137 = "É você?"
11050-138 = "...Sim, está certo. Sou membro da Força-Tarefa de Abydos."
11050-139 = "Você está pronto? Vou pegá-lo no próximo bloco."
11050-142 = "……."
11050-143 = "Huh..."
11050-144 = "...Pensando bem, também não há muitas pessoas por aqui. Não foi tão longe antes."
11050-145 = "Parece que a ordem pública piorou..."
11050-146 = "Não adianta se continuar assim. Se não fizermos o nosso melhor... e se não reconstruirmos a escola..."
11050-147 = "Por enquanto, assim que conseguir o dinheiro do meu trabalho de meio período, vou usá-lo para pagar os juros..."
11050-152 = "...! ?"
11050-153 = "O que é isso, pessoal?"
11050-154 = "KuromiCelica... certo?"
11050-155 = "...Gangue de Capacetes Katakata? Vocês ainda estão vagando por aqui?"
11050-156 = "Estava certo. O bug estava no lugar errado. Garantirei que você nunca mais coloque os pés nesta área...! !"
11050-157 = "(Da-da-da-da-da-da-da-da!!)"
11050-158 = "Eca! !"
11050-159 = "(Há também um inimigo atrás de mim!?...Esses caras estão me atacando desde o começo...)"
11050-160 = "Pegue-me."
11050-161 = "(Empurraoooo!!)"
11050-162 = "Faça-faça-faça! ! !"
11050-163 = "Keho, Keho..."
11050-164 = "(Arma antiaérea...? Não... esse som de explosão é Flak41 Kai...?)"
11050-165 = "(Apoio de fogo? De onde veio...? Não, não, isso é... de jeito nenhum...)"
11050-166 = "(Ei, esses caras não são tão fortes... eles são perigosos...)"
11050-167 = "(Consciência...)"
11050-168 = "(...)"
11050-170 = "(Baque)"
11050-172 = "……."
11050-173 = "Você quer continuar?"
11050-174 = "Não, não tem sentido se você não fizer uso dele. Isso deveria ser suficiente. Entre no carro e vá até o ponto de encontro."
11050-177 = "(Bum...)"
11050-179 = "Próxima vez; operação de resgate!"
