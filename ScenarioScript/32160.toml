[translation]
32160-1 = "Episódio 16;Batalha Feroz"
32160-2 = "Alojamento de Acampamento"
32160-4 = "É por aqui! Confirmei que ela entrou neste prédio ainda levando o alvo!"
32160-5 = "Sei…… então ela montou uma base aqui, a maldita Azusa Shirasu."
32160-6 = "As entradas que dão pra dentro são só duas! Uma delas está bloqueada por uma barricada!"
32160-7 = "A entrada aberta é uma…… não, aquela é armadilha. Explodam a barricada bloqueada e invadam por ali!"
32160-8 = "Vai virar um alvoroço; será que tá tudo bem?"
32160-9 = "Sim, não faz mal. Chegou contato do \"Squad\" bem a tempo; já já a tropa de reforço entra no distrito autônomo de Trinity."
32160-10 = "Nessas alturas, é melhor já contar com uma guerra total contra Trinity. Mas, o máximo possível, antes disso, recuperamos o alvo!"
32160-12 = "Vamos!"
32160-21 = "Invadir!"
32160-23 = "Foi o que eu pensei."
32160-25 = "Q-quê!?"
32160-29 = "Guaaah!?"
32160-30 = "Gh! Não recuem, não recuem! Se a gente invadir, com a superioridade numérica, a vantagem é nossa!"
32160-33 = "Q-aqui também!?"
32160-36 = "U-uma Claymore!? Duwaah!?"
32160-39 = "Que é isso, um saco plástico……? N-não, IED!? Guaaah!!"
32160-47 = "……Você deu trabalho, hein, Azusa Shirasu."
32160-48 = "……."
32160-49 = "……Sei, diminuíram bastante. Como esperado da Azusa."
32160-50 = "Sim."
32160-51 = "Se seguir assim, é um beco sem saída…… cadê o alvo?"
32160-52 = "Escondi."
32160-53 = "……É melhor abrir o bico logo. Outras tropas estão vindo pra cá e, a qualquer momento, vão cercar este prédio. Fugir ou resistir, de qualquer jeito, é inútil."
32160-54 = "……Reforço?"
32160-55 = "Sim, e em escala de tropas!"
32160-56 = "……E o \"Squad\"?"
32160-57 = "Nem é preciso o \"Squad\" vir. Além do mais, pelo visto, ele tem outra coisa a fazer."
32160-58 = "Então não tem problema."
32160-62 = "Gh, a esta altura……! Já sei que daqui pra frente só tem o ginásio!"
32160-63 = "E que não tem mais armadilha! Vai deixar escapar, persigam!"
32160-68 = "……Sei, não fugiu, era uma emboscada."
32160-69 = "Mas, é só isso?"
32160-70 = "Só vocês quatro, contra a gente, por quantos minutos acham que aguentam? Num lugar sem rota de fuga desses!"
32160-72 = "Auu……."
32160-73 = "……Gh."
32160-74 = "Isso mesmo, não há mais rota de fuga. Vocês não têm como escapar."
32160-75 = "Pois é; por ora, vamos ao arremate♡"
32160-76 = "[s] \"Eu estava esperando.\""
32160-78 = "Gh!"
32160-80 = "Não sei se vocês conhecem…… é o responsável pelo Clube de Aulas de Reforço e o orientador da \"Schale\"♡"
32160-81 = "Vamos começar a batalha de aniquilação. Sensei, as ordens."
32160-85 = "[ns] \"Então, Clube de Aulas de Reforço, vamos.\""
