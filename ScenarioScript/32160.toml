[translation]
32160-1 = "Episódio 16; Batalha Feroz"
32160-2 = "Alojamento"
32160-4 = "É por aqui! Confirmamos que ela entrou neste prédio com o alvo!"
32160-5 = "Entendo... então foi aqui que ela montou a sua base. Maldita Shirasu Azusa."
32160-6 = "Só existem duas entradas para o interior! E uma delas está bloqueada por uma barricada!"
32160-7 = "Então só sobra uma entrada aberta... não, é uma armadilha. Explodam a barricada e invadam por lá!"
32160-8 = "Isso vai fazer muito barulho, tem certeza disso?"
32160-9 = "Não tem problema. Acabei de receber uma mensagem do 'Squad', os reforços logo entrarão no Distrito da Trinity."
32160-10 = "Neste ponto, é melhor já esperarmos uma guerra total contra a Trinity. Mas, até lá, vamos recuperar o alvo o mais rápido possível!"
32160-12 = "Vamos!"
32160-21 = "Invadir!"
32160-23 = "Já imaginava."
32160-25 = "O quê!?"
32160-29 = "Gwaaah!?"
32160-30 = "Ugh! Não recuem, não recuem! Se conseguirmos entrar, a vantagem é nossa por causa dos números!"
32160-33 = "Ah, aqui também!?"
32160-36 = "M-Minas Claymore!? Uwaaaah!?"
32160-39 = "O que é isso, uma sacola plástica...? Não, um IED!? Gyaaaaah!!"
32160-47 = "...Você nos deu bastante trabalho, Shirasu Azusa."
32160-48 = "......"
32160-49 = "...Olha só, os números delas diminuíram bastante. Como esperado da Azusa-chan."
32160-50 = "Aham."
32160-51 = "Daqui para trás é um beco sem saída, hein... Onde está o alvo?"
32160-52 = "Escondi."
32160-53 = "...É melhor você abrir o bico logo. Outras equipes estão a caminho e prestes a cercar este prédio. Fugir ou resistir, não faz diferença, é inútil."
32160-54 = "...Reforços?"
32160-55 = "Sim, e na escala de batalhões!"
32160-56 = "...E o 'Squad'?"
32160-57 = "Não precisamos do 'Squad' para lidar com você. Além do mais, parece que elas têm coisas mais importantes para fazer."
32160-58 = "Então tá tranquilo."
32160-62 = "Tch, mesmo numa situação dessas...! Nós sabemos que não há nada além do ginásio aí na frente!"
32160-63 = "E também sabemos que você não tem mais armadilhas preparadas! Não deixem ela escapar, atrás dela!"
32160-68 = "...Entendo, então você não estava fugindo, estava nos atraindo para uma emboscada."
32160-69 = "Mas é só isso?"
32160-70 = "Quanto tempo vocês acham que vão durar, sendo só quatro contra todas nós? Num lugar sem rota de fuga como esse!"
32160-72 = "Auuu..."
32160-73 = "...Ugh."
32160-74 = "Você tem razão, não há rota de fuga. Vocês não podem escapar."
32160-75 = "Pois é, o que acham da gente terminar logo com isso?♡"
32160-76 = "[s] \"A gente tava esperando vocês.\""
32160-78 = "!"
32160-80 = "Não sei se vocês o conhecem... mas este é o responsável pelo Clube de Reposição e o conselheiro da 'Schale', o nosso Sensei♡"
32160-81 = "Iniciando batalha de aniquilação. Sensei, dê as ordens."
32160-85 = "[ns] \"Então, Clube de Reposição, vamos lá!\""