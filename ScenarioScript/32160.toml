[translation]
32160-1 = "Episódio 16: Batalha Intensa"
32160-2 = "Alojamento"
32160-4 = "Aqui está! Confirmei que eles entraram neste prédio com o alvo!"
32160-5 = "Entendo... Então estabeleceram uma base aqui, Shirasu Azusa."
32160-6 = "Só há duas entradas para o interior! Uma delas está bloqueada por uma barricada!"
32160-7 = "Só há uma entrada aberta... Não, aquilo é uma armadilha. Explodam a barricada bloqueada e invadam por lá!"
32160-8 = "Vai causar um alvoroço, será que não tem problema?"
32160-9 = "Ah, não importa. Acabei de receber um contato do \"Esquadrão\", reforços entrarão no Distrito Autônomo de Trinity em breve."
32160-10 = "Neste ponto, é melhor assumir que haverá um conflito total com Trinity. Mas, antes disso, vamos recuperar o alvo a todo custo!"
32160-12 = "Vamos!"
32160-21 = "Invadir!"
32160-23 = "Eu sabia."
32160-25 = "O quê!?"
32160-29 = "Guaaa!?"
32160-30 = "Droga! Não recuem, não recuem! Como estamos em maior número, temos a vantagem se avançarmos!"
32160-33 = "O quê, aqui também!?"
32160-36 = "Droga, uma Claymore!? Dwaaa!?"
32160-39 = "O que é isso, um saco plástico...? Um IED!? Gyaaaa!!"
32160-47 = "...Você nos deu trabalho, Shirasu Azusa."
32160-48 = "..."
32160-49 = "...Entendo, o número deles diminuiu bastante. Como esperado da Azusa-chan."
32160-50 = "Sim."
32160-51 = "Se continuarmos assim, é um beco sem saída... Onde está o alvo?"
32160-52 = "Escondi."
32160-53 = "...É melhor falar logo. Outras unidades estão vindo para cá e estão prestes a cercar este prédio. Fugir ou resistir, de qualquer forma, é inútil."
32160-54 = "...Reforços?"
32160-55 = "Sim, e em unidades completas!"
32160-56 = "...E o \"Esquadrão\"?"
32160-57 = "Não precisamos esperar pelo \"Esquadrão\". Além disso, parece que eles têm outras coisas para fazer."
32160-58 = "Então não há problema."
32160-62 = "Droga, a essa altura do campeonato...! Eu já sei que só tem um ginásio à frente!"
32160-63 = "E que não há mais armadilhas! Não os deixem escapar, persigam-nos!"
32160-68 = "...Entendo, não foi uma fuga, foi uma emboscada."
32160-69 = "Mas é só isso?"
32160-70 = "Vocês acham que quatro pessoas podem aguentar contra nós por quanto tempo? Em um lugar sem saída como este!"
32160-72 = "Auu..."
32160-73 = "...!"
32160-74 = "Exatamente, não há mais saída. Vocês não podem escapar."
32160-75 = "É isso mesmo, vamos terminar logo com isso, certo? ♡"
32160-76 = "[s] \"Eu estava esperando por vocês.\""
32160-78 = "!"
32160-80 = "Não sei se vocês sabem, mas... eu sou o responsável pelo Clube de Estudos Suplementares e o professor conselheiro do \"Schale\" ♡"
32160-81 = "Iniciando a batalha de aniquilação. Professor, dê as ordens."
32160-85 = "[ns] \"Muito bem, Clube de Estudos Suplementares, vamos nessa.\""
