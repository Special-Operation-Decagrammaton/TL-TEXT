[translation]
32175-2 = "……Ah, sei, sei. Por isso é que todo mundo fica falando \"Schale\", \"Schale\". Que incômodo, um \"adulto\"."
32175-3 = "Foi imprevisto, mas…… sim, bom, acho que não tem problema. Vai levar um tempinho, mas."
32175-4 = "Com a Seia e a Nagi fora de cena, agora eu enfim posso começar; e olha vocês aí atrapalhando à toa."
32175-5 = "……!"
32175-6 = "Bom, a tropa de reforço parece que ainda vem vindo, então vamos continuar?"
32175-7 = "Mika, deixa eu te perguntar uma coisa! O ataque à Seia também foi por ordem sua!?"
32175-8 = "……?"
32175-9 = "Aha, a Hanako também faz um olhar desses, hein."
32175-10 = "Sim, foi por ordem minha. A Seia vivia falando umas coisas estranhas. Paraíso disso, daquilo, só coisa difícil."
32175-11 = "Mas eu não mandei destruir a aureola. Eu não sou assassina."
32175-12 = "Eu só achei melhor mantê-la trancada numa jaula até se formar. Mas, naturalmente, acabou dando naquilo."
32175-17 = "……."
32175-18 = "Mais do que isso, não é mais rápido perguntar pra própria envolvida? ……Ei, Azusa Shirasu. Parece que tem um mal-entendido aí, então, no meu lugar, você não explica?"
32175-19 = "A Seia ter acabado daquele jeito foi o estopim pra situação ficar deste tamanho, viu?"
32175-20 = "Foi a partir daí que um monte de coisa saiu do controle…… ei, o que você acha disso?"
32175-28 = "I-isso é……."
32175-29 = "Azusa……? Isso é, afinal, que história……?"
32175-30 = "N-não é isso…… aquilo foi……."
32175-34 = "Hmm?"
32175-35 = "Uns alunos de Trinity estão vindo pra cá!"
32175-36 = "……? Por quê? Gente que desafiaria a lei marcial do Tea Party, já não tem……"
32175-37 = "……Tem, sim. Um grupo independente, a quem nem o Tea Party pode dar ordem."
32175-38 = "Confirmado, é da grande catedral! Isso quer dizer……"
32175-42 = "……Sisterhood!?"
32175-49 = "Próximo Episódio;Também um Mundo Assim (2)"
