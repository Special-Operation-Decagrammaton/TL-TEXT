[translation]
32175-2 = "......Entendi, saquei, saquei. Agora dá pra entender por que todo mundo só fala 'Schale' pra cá e 'Schale' pra lá. 'Adultos' dão um trabalho danado, né."
32175-3 = "Foi inesperado, mas... é, tá tranquilo. Só vai demorar um pouquinho mais do que o previsto."
32175-4 = "A Seia-chan e a Nagi-chan vão sair de cena, e eu finalmente vou poder começar o que eu queria... Poxa, vocês bem que podiam não ficar atrapalhando, né."
32175-5 = "......!"
32175-6 = "Bom, os reforços não param de chegar, então vamos continuar brincando?"
32175-7 = "Mika-san, me responda uma coisa! O ataque à Seia-chan também foi uma ordem sua!?"
32175-8 = "......?"
32175-9 = "Ahah, não sabia que você também conseguia fazer uma cara dessas, Hanako."
32175-10 = "Sim, a ordem foi minha. A Seia-chan só ficava com umas conversas estranhas. Papo chato de paraíso pra lá e pra cá, só coisas difíceis."
32175-11 = "Mas eu não mandei destruírem o halo dela. Eu não sou uma assassina."
32175-12 = "Eu só achei que seria bom trancar ela numa jaula até a formatura. Mas, acabou acontecendo daquele jeito, fazer o quê."
32175-17 = "......"
32175-18 = "Se quiserem saber mais, não é melhor perguntar pra quem tava lá fazendo o trabalho sujo? ...Ei, Shirasu Azusa. Parece que rolou um mal-entendido aí, será que você pode explicar as coisas pra eles no meu lugar?"
32175-19 = "O que aconteceu com a Seia-chan foi o estopim pra essa confusão toda tomar essa proporção, sabia?"
32175-20 = "A partir dali as coisas saíram do controle e viraram essa bola de neve sem volta... E aí, o que você tem a dizer sobre isso?"
32175-28 = "I-Isso é..."
32175-29 = "Azusa-chan...? Do... do que exatamente ela tá falando...?"
32175-30 = "N-Não... Aquilo foi..."
32175-34 = "Humm?"
32175-35 = "Algumas alunas da Trinity estão vindo na nossa direção!"
32175-36 = "...? Mas como? Não sobrou mais ninguém que tivesse a coragem de desobedecer à lei marcial da Tea Party..."
32175-37 = "...Sobrou sim. Um grupo independente, no qual a Tea Party não tem o poder de mandar."
32175-38 = "Confirmamos, elas tão vindo da Catedral! O que significa que..."
32175-42 = "...A Irmandade!?"
32175-49 = "Próximo Episódio; Mesmo Num Mundo Assim (2)"