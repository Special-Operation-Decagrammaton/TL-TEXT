[translation]
32175-2 = "……Entendi, é isso mesmo. Não é à toa que todo mundo vive falando de \"Schale\", \"Schale\". Que incômodo, esses \"adultos\"."

32175-3 = "Foi inesperado, mas... bem, acho que não tem problema. Só vai levar um pouco mais de tempo."
32175-4 = "A Seia e a Nagi já vão sair de cena, e agora que finalmente posso começar, eu realmente não queria que ninguém viesse me atrapalhar."
32175-5 = "……！"
32175-6 = "Bem, parece que ainda tem reforços chegando, então vamos continuar?"
32175-7 = "Mika, me responda uma coisa! Foi você quem deu a ordem para atacar a Seia!?"
32175-8 = "……？"
32175-9 = "Ah, a Hanako também faz essa cara, né?"
32175-10 = "Sim, fui eu quem mandou. A Seia sempre dizia coisas estranhas. Sobre paraíso e outras coisas complicadas."
32175-11 = "Mas eu não mandei destruir o halo dela. Eu não sou uma assassina."
32175-12 = "Eu só achei que seria melhor mantê-la trancada em uma gaiola até a formatura. Mas, naturalmente, as coisas acabaram saindo daquele jeito."
32175-17 = "……。"
32175-18 = "Não seria mais fácil perguntar para a própria pessoa sobre isso? ...Ei, Shirasu Azusa. Parece que há um mal-entendido, por que você não explica no meu lugar?"
32175-19 = "O fato de a Seia ter acabado daquele jeito foi o que fez a situação chegar a esse ponto, não foi?"
32175-20 = "A partir daí, tudo saiu do controle... então, o que você acha disso?"
32175-28 = "Is-isso é..."
32175-29 = "Azusa-chan...? Do que exatamente você está falando...?"
32175-30 = "N-não é... aquilo foi..."
32175-34 = "Hmm?"
32175-35 = "Algumas alunas de Trinity estão vindo para cá!"
32175-36 = "……? Por quê? Aquelas que desobedeceriam à lei marcial do Tea Party já..."
32175-37 = "……Elas estão aqui. Um grupo independente que nem o Tea Party consegue controlar."
32175-38 = "Confirmado, elas vêm da Catedral! Isso significa que..."
32175-42 = "……A Sisterhood!?"
32175-49 = "Próximo episódio: Um mundo assim (2)"
