[translation]
1004906-1 = "猫舌"
1004906-3 = "先生、いるよね？"
1004906-4 = "……失礼します。"
1004906-8 = "こんにちは、先生。"
1004906-9 = "……え？何の用って？"
1004906-10 = "……何よ。そう言われると用事がある時だけ来る人みたいに聞こえるじゃん。#nちょっとひどいかも。"
1004906-11 = "べ、別に……用事がないわけではないけど……"
1004906-12 = "でも、今回はちょっと違うの。"
1004906-13 = "実は、これなんだけど……"
1004906-18 = "[ns1] \"これは……チョコケーキ？いやちょっと違う……？\"\n[ns2] \"今日は何かの記念日だっけ？\""
1004906-19 = "えっと、正確には「フォンダンショコラ」っていうお菓子なんだけど……"
1004906-20 = "えっと、正確には「フォンダンショコラ」っていうお菓子なんだけど……"
1004906-21 = "その……先生、好きかなって。"
1004906-22 = "ちょ、ちょうど来る時に、フォンダンショコラで有名なお店のそばを通ったから……。"
1004906-23 = "どうかなー、って……。"
1004906-24 = "………"
1004906-25 = "……まぁ、いいや。ホントは違うんだけど、先生だし。"
1004906-26 = "一応……先生にあげようと持ってきたのは事実なんだけど。"
1004906-27 = "ちょっと、私一人だと食べられなくて。先生、ちょっと手を近づけてみて。"
1004906-31 = "[ns3] \"まだ温かいね。熱がすごい。\"\n[ns4] \"おぉ……出来立てかな？\""
1004906-32 = "うん……フォンダンショコラって、中に熱いチョコが入ってるんだ。"
1004906-33 = "うん……フォンダンショコラって、中に熱いチョコが入ってるんだ。"
1004906-34 = "私、ただのチョコケーキだと思って買っちゃって……#nもっとよく見ればよかった……失敗した。"
1004906-35 = "……ん？何か問題でもあるのかって？"
1004906-36 = "……それが………うーん……。"
1004906-37 = "私、その……熱いの火傷しちゃうから苦手で……。"
1004906-38 = "このフォンダンショコラ、チョコが熱すぎて食べられなくって……。"
1004906-39 = "だからといって冷めるまで待つのもちょっと……#n普通、こういうのって冷めたら美味しくないじゃん？"
1004906-40 = "せっかく買ったのにもったいないし、熱いうちに食べられる人にあげようと思って。"
1004906-41 = "……んー？"
1004906-42 = "結局「処理」させるために持ってきたのって……？"
1004906-43 = "何、何よ！？そんな言い方しなくてもいいじゃん！？#n捨てるために持って来たわけじゃないし！？"
1004906-44 = "ちゃんと新品だよ！？ただ私が食べられないだけで……！"
1004906-45 = "[s5] \"カズサは猫舌なんだね。\"\n[s6] \"熱いものが苦手なのってまるで猫みたいだね。\""
1004906-46 = "……！？"
1004906-47 = "……！？"
1004906-48 = "う、んん……猫舌……？"
1004906-49 = "そ、そうなのかな……？あんまり考えたことなかったけど……"
1004906-53 = "……ちょっと待って、先生。"
1004906-54 = "先に言っておくけど、そんなこと言われても嬉しくないよ。#n私、猫嫌いだから。"
1004906-55 = "……別にそういうわけじゃないの？#nそう……まぁ、どっちでもいいけど……"
1004906-59 = "……なんかやっぱり気になる。"
1004906-60 = "どう考えてもからかおうとしてたよね……"
1004906-61 = "……うん？フォンダンショコラありがたくいただきます？#nそ、そう。どういたしまして……。"
1004906-62 = "んー……。"
1004906-63 = "……うーん、わからない………はぁ……。"
1004906-65 = "（疑うような目付きのカズサを見ながら、温かいフォンダンショコラを美味しく「処理」した）"
1004906-66 = "（カズサの言う通り、とても甘くてまろやかな味だった）"
