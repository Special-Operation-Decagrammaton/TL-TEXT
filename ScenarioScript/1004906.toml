[translation]
1004906-1 = "Língua de gato"
1004906-3 = "Sensei, você está aí?"
1004906-4 = "……Com licença."
1004906-8 = "Olá, Sensei."
1004906-9 = "……Eh? O que eu quero?"
1004906-10 = "……O que foi? Dito desse jeito, parece que eu só venho aqui quando preciso de algo. #nIsso é um pouco cruel."
1004906-11 = "B-bem…… não é que eu não precise de nada, mas……"
1004906-12 = "Mas, desta vez é um pouco diferente."
1004906-13 = "Na verdade, é sobre isto aqui……"
1004906-18 = "[ns1] \"Isso é…… um bolo de chocolate? Não, é um pouco diferente……?\"\n[ns2] \"Hoje é algum tipo de data comemorativa?\""
1004906-19 = "Bem, para ser exata, é um doce chamado \"fondant au chocolat\"……"
1004906-20 = "Bem, para ser exata, é um doce chamado \"fondant au chocolat\"……"
1004906-21 = "É que…… pensei que o Sensei talvez gostasse."
1004906-22 = "E-eu passei perto de uma loja famosa de fondant au chocolat quando estava vindo para cá……"
1004906-23 = "E fiquei pensando se você gostaria……"
1004906-24 = "………"
1004906-25 = "……Bem, deixa pra lá. Na verdade não é bem assim, mas é o Sensei, então."
1004906-26 = "De qualquer forma…… é verdade que eu trouxe para dar ao Sensei."
1004906-27 = "Ei, eu não consigo comer sozinha. Sensei, aproxime a mão um pouco."
1004906-31 = "[ns3] \"Ainda está quente. O calor é intenso.\"\n[ns4] \"Oh…… será que acabou de sair do forno?\""
1004906-32 = "Sim…… o fondant au chocolat tem chocolate quente dentro."
1004906-33 = "Sim…… o fondant au chocolat tem chocolate quente dentro."
1004906-34 = "Eu comprei achando que era só um bolo de chocolate comum…… #nDevia ter olhado melhor…… que falha."
1004906-35 = "……Hm? Perguntou se tem algum problema?"
1004906-36 = "……É que……… hum……."
1004906-37 = "Eu, tipo…… não gosto de coisas quentes porque acabo me queimando……"
1004906-38 = "Esse fondant au chocolat, o chocolate está quente demais e eu não consigo comer……"
1004906-39 = "E esperar esfriar também não é uma opção…… #nNormalmente, esse tipo de coisa não fica gostoso depois que esfria, né?"
1004906-40 = "Seria um desperdício já que comprei, então pensei em dar para alguém que consiga comer enquanto está quente."
1004906-41 = "……Hm?"
1004906-42 = "Então você trouxe para eu \"dar um jeito\" nele……?"
1004906-43 = "O quê, o quê foi!? Não precisa falar desse jeito, né!? #nEu não trouxe para jogar fora, tá!?"
1004906-44 = "Está novinho em folha, tá!? É só que eu não consigo comer……!"
1004906-45 = "[s5] \"Kazusa, então você tem língua de gato.\"\n[s6] \"Não gostar de coisas quentes faz você parecer um gato.\""
1004906-46 = "……!?"
1004906-47 = "……!?"
1004906-48 = "L-língua de gato……?"
1004906-49 = "S-será……? Nunca tinha pensado nisso, mas……"
1004906-53 = "……Espere um pouco, Sensei."
1004906-54 = "Vou avisar logo, não fico feliz em ouvir isso. #nEu não gosto de gatos."
1004906-55 = "……Não é nada disso? #nEntendo…… bem, tanto faz……"
1004906-59 = "……Ainda estou achando estranho."
1004906-60 = "De qualquer jeito que eu pense, você estava tentando me provocar……"
1004906-61 = "……Hm? Vai aceitar o fondant au chocolat com gratidão? #nAh, entendi. De nada……"
1004906-62 = "Hm……"
1004906-63 = "……Hum, não sei…… haa……"
1004906-65 = "(Enquanto observava Kazusa com um olhar desconfiado, o Sensei \"deu um jeito\" no delicioso fondant au chocolat quente)"
1004906-66 = "(Como Kazusa disse, o sabor era muito doce e suave)"
