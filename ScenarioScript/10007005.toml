[translation]
10007005-1 = "Prólogo; Um certo dia na Classe Especial 227"
10007005-2 = "Ruínas próximas à Classe Especial 227 do antigo prédio escolar"
10007005-4 = "Ugh, não sai..."
10007005-8 = "Hnnngh...! Sinto que falta só um pouquinho, mas...!"
10007005-13 = "Nodoka, por que não descansa um pouco e toma um chocolate quente?"
10007005-14 = "Ah, Shigure-chan."
10007005-15 = "Minhas mãos e pés estavam começando a congelar... Obrigada! Vou aceitar!"
10007005-21 = "Ahhh, estou revivendo..."
10007005-22 = "A felicidade de sentir esse calor se espalhando pelo corpo todo..."
10007005-23 = "Quando estávamos no prédio principal, podíamos beber isso facilmente a qualquer hora, mas agora, até conseguir água quente é difícil..."
10007005-24 = "...Quando será que vamos poder voltar para o prédio principal?"
10007005-25 = "Não se preocupe, Nodoka. Naquele festival, a Presidente Cherino prometeu que revogaria nossa suspensão."
10007005-26 = "Com certeza, se aguentarmos só mais um pouco, a Presidente Cherino virá nos buscar."
10007005-27 = "Mas! Já se passaram meses desde então!"
10007005-28 = "Aquela presidente baixinha e atrevida com certeza esqueceu da gente e deve estar tirando uma soneca despreocupada agora, não, com certeza ela está!"
10007005-29 = "Se eu soubesse que ia acabar assim, deveria ter sido mais firme quando ela veio ao prédio antigo da última vez...!"
10007005-30 = "Bem, você perdeu para a presidente naquela época, Nodoka..."
10007005-31 = "...A propósito, o que você estava fazendo?"
10007005-32 = "Eu estava tentando tirar esse pilar de madeira que está enterrado de um jeito estranho."
10007005-33 = "Como esfriou de novo ultimamente, a lenha para a fogueira não está sendo suficiente..."
10007005-34 = "Pensei em aproveitar para organizar as coisas por aqui e me livrar dos pilares inúteis."
10007005-35 = "Entendi, vou te ajudar."
10007005-36 = "Então, vamos unir forças...!"
10007005-41 = "Então, no 'três' do 'um, dois, três', puxamos juntas!"
10007005-43 = "Um, dois..."
10007005-49 = "Três!"
10007005-56 = "BOOOOM!!!"
10007005-58 = "U-uma explosão!?"
10007005-59 = "Será que era uma mina enterrada no chão!? Ou um ataque de toupeiras gigantes!?"
10007005-60 = "Calma, Nodoka. Não tem como ser toupeiras... eu acho."
10007005-61 = "E-então, o que foi aquela explosão...?"
10007005-65 = "Aquilo é..."
10007005-72 = "E-eh!?"
10007005-73 = "Água saindo do chão...!?"
10007005-74 = "Será que aquele pilar servia como uma tampa para um lençol freático?"
10007005-75 = "E-está saindo com uma força incrível..."
10007005-78 = "O-o que eu faço... Se a água continuar saindo assim, não vai ser um desastre...?"
10007005-79 = "T-tem algum material para bloquear a água...!?"
10007005-85 = "Ah, é verdade, eu tirei o pilar justamente porque não tínhamos materiais..."
10007005-86 = "Ugh, acabar assim em um lugar desses... Nós só queríamos passar este inverno aquecidas..."
10007005-87 = "Sermos esquecidas por todos e morrer congeladas solitárias neste prédio antigo..."
10007005-88 = "Ei, ei, não fique deprimida tão rápido, Nodoka. Talvez não seja algo tão ruim assim, sabe?"
10007005-89 = "O que tem de bom nessa situação!?"
10007005-90 = "Olha, isso não é apenas água subterrânea."
10007005-91 = "...?"
10007005-95 = "Ué, esse cheiro... e parece estar quente..."
10007005-96 = "Será que isso é... uma fonte termal?"
10007005-97 = "Parece que tivemos sorte e uma fonte termal brotou."
10007005-98 = "Com isso, não precisaremos mais ferver água toda vez que quisermos tomar banho."
10007005-99 = "I-isso é verdade, mas..."
10007005-100 = "É um desperdício ter uma fonte termal num lugar desses... aliás, o que a gente deveria fazer com isso agora...?"
10007005-102 = "Espera, você estava falando de uma fonte termal agora há pouco!?"
10007005-103 = "Q-quem está aí!? Um urso!?"
10007005-111 = "Hã, um urso? Tem ursos em Red Winter?"
10007005-112 = "Onde, onde? Quero ver!"
10007005-114 = "Err, quem são vocês...?"
10007005-116 = "Opa, desculpem a demora nas apresentações!"
10007005-117 = "Hoje é um dia perfeito para o desenvolvimento!"
10007005-118 = "Onde quer que haja uma fonte termal, nós estaremos lá—"
10007005-119 = "Somos o Departamento de Desenvolvimento de Fontes Termais da Academia Gehenna!"
10007005-125 = "Gehenna...?"
10007005-126 = "Por que alguém de Gehenna estaria aqui...?"
10007005-127 = "Mesmo que estejamos suspensas, não vamos permitir que alunas de outra escola invadam nosso território!"
10007005-128 = "Ahaha♪ Calma, calma, não se preocupe com isso. Não viemos aqui para causar problemas."
10007005-129 = "Nós só viemos porque ouvimos dizer que tinha uma fonte termal aqui!"
10007005-130 = "Bem, é verdade que uma nova fonte termal surgiu, mas..."
10007005-131 = "Essa fonte surgiu faz pouco tempo..."
10007005-132 = "Entendi, que timing perfeito!"
10007005-133 = "Como sempre, a Presidente Kasumi não falha nas informações!"
10007005-134 = "Mas antes, *sniff, sniff*... hum, que cheiro forte e bom!"
10007005-135 = "Posso dar uma olhada no estado da fonte? Bem, mesmo que digam não, eu vou olhar de qualquer jeito!"
10007005-136 = "Bom, se for só isso... espera, você já está olhando..."
10007005-137 = "Hum hum, entendo, entendo..."
10007005-143 = "Entendi, esta fonte termal é..."
10007005-144 = "Não entendo muito bem, mas é uma ótima fonte!"
10007005-145 = "Você analisou com tanta seriedade para chegar a uma conclusão tão vaga..."
10007005-146 = "Pois é! Eu não entendo nada dessas coisas complicadas de níveis de minerais ou números!"
10007005-147 = "Mas tenho certeza de que é ótima, dá até vontade de tirar a roupa e pular dentro agora mesmo!"
10007005-148 = "...Hã? A presidente deu permissão para a construção?"
10007005-149 = "OK! Então, vamos logo construir uma instalação termal aqui!"
10007005-155 = "U-uma escavadeira grande e uma perfuratriz...!?"
10007005-156 = "E-esperem! O que vocês pretendem fazer!?"
10007005-157 = "Hm? Como eu disse, vamos aproveitar essa fonte para construir um complexo termal."
10007005-158 = "Não, não, não! Este é o antigo prédio escolar que nós, da Classe Especial 227, gerenciamos!"
10007005-159 = "Não podemos permitir que outra escola venha aqui desenvolver nada por conta própria...!"
10007005-160 = "Mas não tem nada em volta além de floresta e prédios velhos, não é?"
10007005-161 = "Ah, será que vocês estavam planejando construir outra coisa aqui em vez de um resort termal?"
10007005-162 = "Bem, não é exatamente isso, mas..."
10007005-163 = "Então não tem problema nenhum transformar isso num resort termal, né♪"
10007005-164 = "Bom, mesmo que vocês se oponham, eu vou fazer de qualquer jeito!"
10007005-165 = "Que absurdo..."
10007005-166 = "Vamos lá, pessoal!"
10007005-167 = "Queimem toda a floresta ao redor e removam todos os prédios antigos!"
10007005-168 = "Na verdade, eu sempre quis queimar todas essas árvores cobertas de neve de uma vez só. Vamos lá, hora do desenvolvimento!!"
10007005-177 = "Err... o que é isso..."
10007005-178 = "Bem, não é uma boa ideia? Esse prédio abandonado já ia ser demolido de qualquer forma. Se elas querem construir algo novo, que seja."
10007005-179 = "Bom, por enquanto, vamos tomar um chocolate quente e observar a situação."
10007005-180 = "Eu sei, mas... estou muito preocupada..."
10007005-185 = "I-isso é...!"
10007005-186 = "O que diabos é isso!?"
10007005-187 = "Como pode ver, é um resort de águas termais!"
10007005-188 = "Hehe, estou satisfeita com o resultado, ficou melhor do que eu imaginava♪"
10007005-189 = "Não é um resort de águas termais grande demais!? Tem até uma pousada, o que vocês fizeram para chegar a esse ponto!?"
10007005-190 = "Nós deixamos a construção de lado, mas não imaginávamos que chegaria a esse tamanho...!?"
10007005-191 = "Bem, acabamos encontrando várias fontes termais durante a obra. Fomos cavando mais e mais, e acabou virando esse resort magnífico..."
10007005-192 = "Mas, está tudo bem! Afinal, nunca é demais ter romance e águas termais!"
10007005-193 = "É, é mesmo..."
10007005-194 = "Ah, como esta área era originalmente de vocês, podem usar como quiserem, sem problemas."
10007005-195 = "Podem monopolizar uma fonte só para vocês, ou chamar todo mundo para se divertir na água. Hmm, só de imaginar já fico animada!"
10007005-196 = "N-não é disso que estamos falando..."
10007005-197 = "Ah, uma mensagem da chefe? Sinais de outra fonte termal por perto?"
10007005-198 = "Então não temos tempo para descansar!"
10007005-199 = "Mais fontes termais! Mais desenvolvimento!! O objetivo é uma fonte para cada pessoa!"
10007005-200 = "Bem, vamos desenvolver outra fonte ali perto, então se tiverem qualquer problema, é só chamar!"
10007005-206 = "Passaram por aqui como um furacão..."
10007005-207 = "Quem diria que o prédio antigo viraria um resort num piscar de olhos..."
10007005-208 = "É bom que o prédio tenha ficado bonito e novo, mas como vamos administrar algo tão grande e espaçoso..."
10007005-212 = "Por enquanto, que tal entrarmos na água...?"
10007005-215 = "#video;10006"
