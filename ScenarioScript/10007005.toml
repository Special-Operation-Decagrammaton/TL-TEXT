[translation]
10007005-1 = "プロローグ;227号特別クラスのとある一日"
10007005-2 = "旧校舎227号特別クラス付近の廃墟"
10007005-4 = "うぅ、抜けない……。"
10007005-8 = "ふんんっ……！あと少しな気がするの、にっ……！"
10007005-13 = "ノドカ、ちょっと休んでココアでもどう？"
10007005-14 = "あ、シグレちゃん。"
10007005-15 = "ちょうど手足が冷えて来たところで……ありがとう！いただきます！"
10007005-21 = "はぁ、生き返る……"
10007005-22 = "この温かさが全身に行きわたる幸せ……。"
10007005-23 = "本校舎にいた頃はいつでも簡単に飲めたのに、今はもうお湯すら手に入れるのが難しい状態で……。"
10007005-24 = "……いつになったら、本校舎に戻れるんだろ。"
10007005-25 = "心配しないで、ノドカ。この前のお祭りの時にチェリノ会長が、停学処分を解除してくれるって約束してくれたんだし。"
10007005-26 = "きっともう少し我慢してれば、チェリノ会長が私たちを迎えに来てくれるよ。"
10007005-27 = "でも！あれからもう何か月も経ってるのに！"
10007005-28 = "きっとあの生意気なチビ会長は今頃私たちのことなんて忘れたまま、のん気に昼寝でもしてるに決まってま、じゃなくて決まってるっ！"
10007005-29 = "こうなると分かってたら、この前旧校舎に来た時にもっときつく言っておけば良かった……！"
10007005-30 = "まあ、ノドカはあの時会長に負けたわけだし……。"
10007005-31 = "……ところで、何をしてたの？"
10007005-32 = "この変な形で埋まってる木の柱を抜こうと思って。"
10007005-33 = "ここ最近また寒くなってきたせいで、たき火の薪も足りないし……。"
10007005-34 = "この辺の整理も兼ねて、不要な柱たちを片付けようかなって。"
10007005-35 = "そっか、手伝うよ。"
10007005-36 = "じゃあ、一緒に力を合わせて……！"
10007005-41 = "じゃあ「いち、にの、さん」の「さん」で同時に！"
10007005-43 = "いち、にの……"
10007005-49 = "さんっ！"
10007005-56 = "ドゴオオオォォォン！！"
10007005-58 = "ば、爆発！？"
10007005-59 = "地面に埋もれてた地雷とか！？それとも巨大なモグラの襲撃！？"
10007005-60 = "落ち着いてノドカ。流石にモグラは無い……はず。"
10007005-61 = "じゃ、じゃあさっきの爆発はいったい……？"
10007005-65 = "あれは……。"
10007005-72 = "え、えっ！？"
10007005-73 = "地面から水が……！？"
10007005-74 = "もしかしたらさっきの柱が、地下水脈の栓になってたとか？"
10007005-75 = "も、ものすごい勢いで出てるけど……。"
10007005-78 = "ど、どうしよう……このまま水が出続けたら、大変なことになっちゃうんじゃ……？"
10007005-79 = "な、何か水をせき止めるような資材とかは……！？"
10007005-85 = "って、元々資材が無いから柱を抜いたんだった……。"
10007005-86 = "うぅ、こんなところで全部終わりだなんて……私たちはただ、この冬を暖かく過ごしたかっただけなのに……。"
10007005-87 = "こうして誰からも忘れられたまま、この旧校舎で寂しく凍死するだなんて……。"
10007005-88 = "ほらほら、そんな一気に落ち込まないでノドカ。そうそう悪いことでもないかもよ？"
10007005-89 = "この状況のどこが悪くないんですかっ！？"
10007005-90 = "ほら、これただの地下水じゃないよ。"
10007005-91 = "……？"
10007005-95 = "あれ、この香り……それに何だか温かいような……。"
10007005-96 = "もしかしてこれ……温泉？"
10007005-97 = "どうやら運良く、温泉が湧き出たみたいだね。"
10007005-98 = "これでもうシャワーのたびに、お湯を沸かさなくても済みそう。"
10007005-99 = "そ、それはそうだけど……。"
10007005-100 = "こんなところに温泉ができても勿体ないっていうか……そもそもこれ、この後どうすれば……？"
10007005-102 = "今もしかして、温泉のこと話してた！？"
10007005-103 = "だ、誰ですか！？熊！？"
10007005-111 = "え、熊？レッドウィンターって熊がいるの？"
10007005-112 = "どこどこ？見てみたい！"
10007005-114 = "えっと、あなたたちは……？"
10007005-116 = "おっと、挨拶が遅れちゃったね！"
10007005-117 = "今日も今日とて開発日和っ！"
10007005-118 = "温泉があると聞けばどこへでも──"
10007005-119 = "ゲヘナ学園の、温泉開発部だよ！"
10007005-125 = "ゲヘナ……？"
10007005-126 = "ゲヘナの方が、どうしてここに……？"
10007005-127 = "私たちは今停学中の身とはいえ、他校の生徒の領域侵犯を許したりはしませんよ！"
10007005-128 = "あははっ♪まあまあそんなことは気にしないで、別に事を構えようってわけじゃないからさ。"
10007005-129 = "私たちはただ、ここに温泉があるって聞いて来ただけだから！"
10007005-130 = "えっと、まあ新しい温泉が出てきたのは事実ですが……。"
10007005-131 = "この温泉が出てきたの、ついさっきなんだけど……？"
10007005-132 = "そっか、正にナイスタイミング！"
10007005-133 = "いつものことながら流石はカスミ部長、その情報に間違いなし！"
10007005-134 = "それより、くんくん……うん、濃くて良い匂いだね！"
10007005-135 = "ちょっと温泉の状態を確認してみてもいい？ま、駄目って言われても勝手に確認しちゃうけど！"
10007005-136 = "うん、まあそれくらいなら……って、もう確認してるじゃないですか……。"
10007005-137 = "ふむふむ、うんうん……。"
10007005-143 = "なるほど、この温泉は……"
10007005-144 = "よく分からないけど、良い温泉だね！"
10007005-145 = "真剣に見てた割に、ざっくりなんですね……。"
10007005-146 = "まあね！私は何かの含有量とか数値とか、そういう難しいことよく分かんないし！"
10007005-147 = "でも良い感じなのは間違いないよ、今すぐ服を脱いで飛び込んじゃいたいくらい！"
10007005-148 = "……え？部長から建設許可が下りたの？"
10007005-149 = "OK！じゃあ、さくっと温泉施設でも作っちゃおうか！"
10007005-155 = "お、大型ショベルに穿孔機……！？"
10007005-156 = "ま、待ってください！いったい何をしようとしてるんですか！？"
10007005-157 = "ん？さっき言ったように、この温泉を活かして温泉施設を建てようかなって。"
10007005-158 = "いやいやいや！ここは私たち227号特別クラスが管理してる旧校舎なんですよ！"
10007005-159 = "他の学校に、勝手に開発を許すなんてことは……！"
10007005-160 = "でもこの周辺って、森と古い建物くらいしか無くない？"
10007005-161 = "あ、もしかしてここに温泉郷じゃなくて、他の建物を建てようとしてたとか？"
10007005-162 = "いえ、特にそういうわけではないですが……。"
10007005-163 = "じゃあ、ここを温泉郷にしちゃっても問題無いよね♪"
10007005-164 = "まあ、反対されても強行するけど！"
10007005-165 = "そんな無茶苦茶な……。"
10007005-166 = "さあ、みんな！"
10007005-167 = "この辺の森を全部燃やして、古い建物も全部撤去しよう！"
10007005-168 = "実は前から、雪の積もった木々をぶわっと丸ごと燃やしてみたかったんだよね。さあ、開発の時間だよ！！"
10007005-177 = "えっと……これは一体どういう……。"
10007005-178 = "まあ、良いんじゃない？そもそもこの廃墟も、もともと撤去される予定だったんだし。新しくしてくれるって言うなら、それもそれで。"
10007005-179 = "まあ、とりあえずココアでも飲みながら様子を見てみよう。"
10007005-180 = "それはそうだけど……なんかすごく不安……。"
10007005-185 = "こ、これは……！"
10007005-186 = "これはいったい何なんですか！？"
10007005-187 = "見ての通り、温泉郷だよ！"
10007005-188 = "ふふん、思ったよりも良い感じの仕上がりになって満足満足♪"
10007005-189 = "相当大規模な温泉郷じゃないですか！？旅館まであって、一体何をどうしたらこうなるんですか！？"
10007005-190 = "そのまま建設を放置したのは私たちですけど、まさかこんな規模だなんて……！？"
10007005-191 = "うーん、何か工事中にも幾つか温泉を掘り当てちゃってさ。それをどんどん繰り返していったらこんな立派な温泉郷に……"
10007005-192 = "ま、でもOKOK！なにせロマンと温泉は、あればあるだけ良いものなんだし！"
10007005-193 = "え、えぇ……。"
10007005-194 = "あ、ここは元々あなたたちの管理区域だから、もちろん自由に使ってもらって大丈夫だよ。"
10007005-195 = "ひとりで一つの温泉を独占するもよし、みんなを呼んでわちゃわちゃと温泉を楽しむも良し。うーん、想像しただけで楽しいね！"
10007005-196 = "そ、そういう話じゃなくって……。"
10007005-197 = "え、部長から連絡？近くにまた別の源泉の気配？"
10007005-198 = "じゃあ休んでる暇は無いね！"
10007005-199 = "もっと多くの温泉を！もっと多くの開発を！！目指せ、ひとりにひとつずつの温泉！"
10007005-200 = "じゃあ、私たちは近くで別の温泉を開発してるから、何か問題とかあったらいつでも呼んでね！"
10007005-206 = "嵐のように過ぎ去っていったねぇ……。"
10007005-207 = "まさか、旧校舎が一瞬でリゾート地になるなんて……。"
10007005-208 = "綺麗で新しい建物になったのは良いことだけど、こんな大きくて広いのをどう管理すれば……。"
10007005-212 = "取り敢えず、温泉入ろっか……？"
10007005-215 = "#video;10006"
