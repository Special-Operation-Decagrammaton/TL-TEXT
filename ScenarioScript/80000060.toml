[translation]
80000060-1 = "Material de reforço: Chocolate"
80000060-2 = "（Recebi uma mensagem da Natsu e fui até a sala de aula）"
80000060-6 = "Como esperado do Sensei, pontual como sempre."
80000060-7 = "Bem, hoje é... você já sabe, não sabe?"
80000060-8 = "Um dia especial é algo que, por si só, já nos apresenta um propósito e uma ação."
80000060-9 = "Existem coisas que, em dias comuns, não conseguimos dizer facilmente. Mas apenas em dias como este, somos libertados com uma justificativa dessas restrições que, embora pareçam não ter sentido, possuem um significado..."
80000060-10 = "Em suma, é um dia em que, por vários motivos, nossos sentimentos ficam flutuando no ar."
80000060-11 = "Se todos os dias fossem assim, talvez o mundo fosse muito mais bonito do que é agora, não acha?"
80000060-12 = "Bem, se fosse assim, provavelmente teríamos criado outro \"dia especial\" por algum outro motivo..."
80000060-13 = "Um \"dia especial\" só tem significado porque é raro."
80000060-14 = "Se os dias especiais aumentarem, eventualmente eles se misturarão ao cotidiano, e outros dias especiais surgirão."
80000060-19 = "Então, que valor será que este \"Dia dos Namorados\", que se tornou um costume, tem agora?"
80000060-20 = "Com tantas empresas e campanhas cobrindo este dia, o quão especial ele ainda é, eu me pergunto?"
80000060-21 = "Mas, estando no meio disso tudo, pensar dessa forma pode ser apenas mais uma das minhas próprias amarras. É um problema complicado."
80000060-22 = "Não sei que sentido faz conversar sobre isso, mas..."
80000060-23 = "[s1] \"Com certeza, esse é um ponto de vista válido.\"\n[s2] \"A Natsu não gosta muito do Dia dos Namorados?\""
80000060-24 = "...Eu gosto do Dia dos Namorados. Não seria exagero dizer que eu o amo."
80000060-25 = "...Eu gosto do Dia dos Namorados. Não seria exagero dizer que eu o amo."
80000060-26 = "Afinal, sou membro do \"Clube de Doces do Pós-Aula\", alguém que constantemente saboreia a preciosidade de trocar sentimentos através de doces, sabe?"
80000060-27 = "Mas o fato de minhas palavras soarem um pouco estranhas... e o fato de o meu jeito de falar parecer ainda mais distante do chão do que o habitual..."
80000060-33 = "[ns] \"Isso é um chocolate feito à mão?\""
80000060-34 = "...Fufu."
80000060-35 = "Pedir uma resposta para isso não é um pouco carente de romance?"
80000060-36 = "Bem, nesse ponto, acho que eu mesma, que continuo acumulando palavras em um dia como este, também sou um pouco estranha."
80000060-37 = "...O Dia dos Namorados é um dia para trocar sentimentos através de doces."
80000060-38 = "Dentro disso, certamente há vários sentimentos. Amor, afeição... ou talvez algo que não possa ser expresso por tais rótulos."
80000060-39 = "Acho que, apenas hoje, todos têm permissão para silenciar as palavras."
80000060-40 = "Afinal, hoje é o Dia dos Namorados. Um dia doce com uma justificativa, dado a todos que não conseguem expressar bem seus sentimentos com palavras no dia a dia."
80000060-41 = "Ao mesmo tempo, para alguém como eu, que gosta de procurar por várias palavras, é um dia frustrante onde isso acaba se tornando algo desnecessário."
80000060-42 = "...É por ser um \"dia especial\" assim."
80000060-47 = "...Por isso, hoje, apenas aceite sem dizer nada."
80000060-51 = "Isso já é o suficiente."
80000060-55 = "Sim, agora está perfeito. Viu?"
80000060-57 = "（Recebi o chocolate da Natsu e nós dois deixamos a sala de aula）"
