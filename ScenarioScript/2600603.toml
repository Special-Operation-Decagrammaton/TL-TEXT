[translation]
2600603-1 = "Diário de Observação"
2600603-2 = "Telhado de um prédio"
2600603-4 = "Nodoka está olhando através de um telescópio, completamente absorta em algo."
2600603-5 = "Que estranho...#nAté agora pouco, você estava sentado no seu escritório..."
2600603-6 = "Será que foi ao banheiro?"
2600603-7 = "[s] \"Quem você está procurando?\""
2600603-8 = "Aah!? P-Sensei?"
2600603-9 = "D-Desde quando você está aí? Você deveria estar no Schale até agora pouco..."
2600603-10 = "Sim? Você veio porque viu minha mensagem e ficou preocupado?"
2600603-11 = "Uuu, se eu soubesse que isso aconteceria, não teria mandado o MomoTalk..."
2600603-12 = "[s] \"Você estava me observando com o telescópio?\""
2600603-13 = "Bem, isso... eu não estava observando você de propósito, Sensei..."
2600603-15 = "...N-Não tem jeito! Se eu não observar a minha dose diária do Sensei, não consigo me sentir motivada!"
2600603-16 = "A culpa é sua, Sensei, por ser tão difícil de encontrar!"
2600603-17 = "Sim? Você disse que se eu quisesse ver seu rosto, era só pedir diretamente?"
2600603-18 = "O-Obrigada... mas eu não posso fazer isso."
2600603-19 = "Porque o rosto do Sensei brilha muito mais quando eu observo escondida pelo telescópio do que quando olho diretamente para você!"
2600603-20 = "Aquele seu perfil desprotegido... ah, ah..."
2600603-21 = "Ah...! E-Esqueça o que eu acabei de dizer!"
2600603-23 = "Depois disso, entrei em contato com o Secretariado de Red Winter e pedi que vigiassem a Nodoka com mais rigor."
2600603-24 = "O período de detenção na classe especial da Nodoka foi estendido..."
