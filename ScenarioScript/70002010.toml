[translation]
70002010-1 = "O dia brilhante de Kirara e Erika (1)"
70002010-3 = "Máscara noturna, ok!#nTouca de dormir, ok!"
70002010-4 = "Preparação concluída!#nHora de dormir!"
70002010-5 = "O que será que vou fazer amanhã?"
70002010-9 = "Hm?"
70002010-10 = "O que será que é..."
70002010-11 = "Sério!? É um lançamento!"
70002010-12 = "Nossa, e ainda é a continuação daquele outro!?"
70002010-13 = "Não dá para dormir agora, né!?"
70002010-14 = "Vamos criar memórias da nossa juventude!"
70002010-19 = "Falando em criar memórias...!"
70002010-25 = "……!"
70002010-31 = "Kirara-chan, vamos voltar para casa juntas."
70002010-32 = "……."
70002010-34 = "Ué, o que houve?"
70002010-36 = "Ah!? Erika-chan!? Quando você chegou!?"
70002010-37 = "Cheguei agora pouco.#nO sinal já tocou."
70002010-38 = "Ah, sim, entendi."
70002010-39 = "Você parece meio distraída, aconteceu alguma coisa?"
70002010-40 = "Ah, não, nada demais!? Não aconteceu nada!"
70002010-41 = "Se for para dizer algo, talvez seja porque fiquei acordada até tarde ontem? Estou um pouco sem dormir."
70002010-46 = "……?"
70002010-49 = "Sim, hoje você também está brilhante!"
70002010-50 = "Onde vamos passar na volta?"
70002010-51 = "Ah! Erika-chan, olha só!"
70002010-52 = "Hm?"
70002010-59 = "Ah, aquela garota..."
70002010-60 = "Que legal, tapioca!#nQuer dizer, aquilo não é aquela edição limitada que todo mundo comenta?"
70002010-61 = "Ah, aquela que é super difícil de conseguir?#nComo será que ela comprou?"
70002010-62 = "Vamos perguntar diretamente para ela♪"
70002010-66 = "……Lá vamos nós de novo."
70002010-71 = "Oii, oii!"
70002010-72 = "Ah, ah!? Quem é?"
70002010-73 = "Muito prazer, eu sou a Kirara!#nE essa aqui é a Erika-chan!"
70002010-74 = "Você vai acabar assustando ela chegando assim de repente."
70002010-75 = "Você está ocupada agora?"
70002010-76 = "Ah, é, hum... não estou ocupada, mas..."
70002010-78 = "Então, nos dá um minutinho do seu tempo!"
70002010-79 = "Ah, sim... acho que tudo bem..."
70002010-80 = "Obrigada♪#nEssa bebida de tapioca, é aquela edição limitada, né?"
70002010-81 = "Ouvi dizer que é impossível de conseguir, como você conseguiu?"
70002010-82 = "A gente queria muito saber disso!"
70002010-83 = "Lá vem você pressionando a pessoa de novo..."
70002010-84 = "Desculpa pela abordagem repentina."
70002010-85 = "É que a gente também estava querendo, mas nunca conseguimos comprar. Ficamos curiosas."
70002010-86 = "Ah, entendi..."
70002010-87 = "Realmente, dizem que é difícil conseguir na fila normal.#nPor isso eu reservei logo cedo, mas..."
70002010-88 = "Ah, dá para reservar! Eu não sabia!"
70002010-89 = "Obrigada por contar♪#nComo forma de agradecimento, vou te passar o contato da minha creperia favorita!"
70002010-90 = "Já que estamos aqui, passa seu MomoTalk pra gente, vamos ser amigas♪"
70002010-91 = "A-amigas?"
70002010-92 = "Isso mesmo♪ Tem algum problema?"
70002010-93 = "Ah, não... não é um problema, mas..."
70002010-94 = "Obrigada!"
70002010-96 = "Ah, é verdade... talvez eu esteja me intrometendo, mas..."
70002010-97 = "Hm? O que foi?"
70002010-98 = "Esse chá de bolhas de edição limitada não é muito gostoso—"
70002010-104 = "Ué, o que foi isso?"
70002010-105 = "Uau! O café de doces está!"
70002010-106 = "Hein!? O que, o que aconteceu!?"
70002010-109 = "Hum, diziam que era um estabelecimento famoso, mas..."
70002010-110 = "Uma escolha de ingredientes sem critério. #nUm método que depende totalmente de marketing viral..."
70002010-111 = "O básico não foi respeitado. Os ingredientes devem estar sofrendo com isso."
70002010-112 = "Mas, mas, o sanduíche de pepino com xilitol estava uma delícia~!"
70002010-113 = "Isso é só você, Izumi!"
70002010-114 = "Não ser um rodízio é um ponto negativo~★"
70002010-115 = "Se você queria um rodízio, deveria ter ido a um lugar assim desde o começo! #nE falando nisso, eu nem consegui comer nada!?"
70002010-123 = "Chega disso, Clube de Pesquisa Gastronômica!"
70002010-125 = "Ora, ora."
70002010-126 = "Comitê Disciplinar!? Como chegaram tão rápido!?"
70002010-128 = "Recebemos uma denúncia do Departamento de Merenda e reforçamos a patrulha, mas—"
70002010-129 = "Quem diria que encontraríamos vocês tão rápido."
70002010-130 = "E além disso, explodindo outro estabelecimento... isso é mais uma acusação, rendam-se!"
70002010-132 = "Gostaríamos de explicar várias coisas, mas... #nSinto muito, temos um compromisso agora."
70002010-133 = "— Akari-san."
70002010-134 = "Sim, sim~★ #nAté a próxima então♪"
70002010-135 = "Izumi, não fique aí parada, vamos recuar!"
70002010-141 = "E-espera~! Não me deixem para trás~!!"
70002010-147 = "Ei, voltem aqui!"
70002010-155 = "Tosse, tosse..."
70002010-156 = "Eles fugiram usando o caminhão que roubaram do Departamento de Merenda..."
70002010-157 = "Ei, vocês duas do Clube de Ir para Casa!"
70002010-159 = "Hm, nós?"
70002010-160 = "Preciso de ajuda! #nDesta vez temos que capturar o Clube de Pesquisa Gastronômica!"
70002010-161 = "Ah, mesmo que você peça assim de repente..."
70002010-163 = "Ok♪"
70002010-164 = "Tem certeza mesmo?"
70002010-165 = "Porque parece divertido!"
70002010-166 = "...Isso é bem a sua cara, Kirara-chan."
70002010-167 = "Entendi, eu ajudo."
70002010-168 = "Isso♪ Erika-chan é demais!"
70002010-170 = "Valeu!"
70002010-171 = "Vamos nessa!"
70002010-176 = "Ihuuu!"
70002010-181 = "(E assim, continuaram correndo...)"
70002010-183 = "Ah, ah... não aguento mais~."
70002010-184 = "Nossa, o caminhão e o Comitê Disciplinar sumiram de vista."
70002010-185 = "Será que estamos um pouco fora de forma?"
70002010-186 = "É bem difícil a gente conseguir alcançar aquilo."
70002010-187 = "Ahaha, mas foi divertido! Fazia tempo que eu não suava tanto!"
70002010-188 = "Sim, eu também."
70002010-193 = "Vocês duas aí!"
70002010-195 = "Hm?"
70002010-201 = "Eu me perdi! Poderiam me ajudar?"
70002010-203 = "Sinto que vamos fazer novas amigas...!"
70002010-204 = "Aliás, para onde você quer ir?"
70002010-206 = "Eu queria ir para um lugar chamado... cruzamento em frente ao Grande Auditório."
70002010-208 = "Ah, então não é tão longe."
70002010-209 = "Sim! Desça essas escadas aqui, siga reto por ali e..."
70002010-213 = "Hum... é meio difícil explicar falando. #nErika, você não quer levar ela até lá?"
70002010-214 = "É verdade, vamos juntas."
70002010-215 = "Beleza, então venham comigo!"
70002010-217 = "Obrigada! Vocês estão me salvando!"
70002010-218 = "Vamos lá, pessoal, hora de ir!"
70002010-223 = "Por aqui, por aqui!"
70002010-232 = "Chegamos!"
70002010-233 = "É aqui mesmo, né?"
70002010-235 = "Sim! Bate certinho com as coordenadas que a chefe enviou!"
70002010-236 = "Obrigada! Bom, nós temos atividades do clube agora, então tchau!"
70002010-238 = "De nada! Até mais!"
70002010-245 = "É tão bom fazer uma boa ação!"
70002010-246 = "Com certeza, é mesmo."
70002010-253 = "Sério, nunca é entediante voltar para casa com a Kirara."
70002010-254 = "— Toda vez, algo diferente acontece."
70002010-259 = "O Clube de Desenvolvimento de Fontes Termais está explodindo coisas de novo!"
70002010-260 = "Pessoal, afastem-se! Vão acabar sendo atingidas!"
70002010-264 = "Pois é! Todo dia é uma aventura! É tão divertido!"
70002010-265 = "Mas, sinto que ainda falta um pouquinho de algo."
70002010-266 = "Hm? O que foi?"
70002010-267 = "Hum..."
70002010-271 = "Ahaha! Nada não!"
70002010-272 = "Vamos indo para casa?"
70002010-277 = "Bom, é aqui que a gente se separa."
70002010-278 = "Então, até amanhã."
70002010-279 = "..."
70002010-280 = "Kirara?"
70002010-281 = "...Sim, acho que preciso contar para você, Erika."
70002010-282 = "Sobre o que você estava preocupada agora há pouco?"
70002010-283 = "Ah, sério? Deu para perceber na minha cara?"
70002010-284 = "Quanto tempo você acha que a gente passa juntas? É claro que eu percebo."
70002010-285 = "Como parecia que você estava pensativa, eu não perguntei."
70002010-286 = "Ahaha! Realmente, não dá para esconder nada de você, Erika."
70002010-287 = "Bem, é que..."
70002010-288 = "Eu me divirto muito agora, mas sinto que falta um pouco de algo."
70002010-289 = "O quê?"
70002010-291 = "Juventude!"
70002010-292 = "Emoção!!"
70002010-293 = "Brilho!!!"
70002010-294 = "H-hum...?"
70002010-295 = "O que você quer dizer com isso?"
70002010-296 = "Bem, é que, tipo..."
70002010-298 = "Eu quero participar de um clube!"
70002010-299 = "Um clube?"
70002010-300 = "De onde veio isso de repente?"
70002010-301 = "Ontem, eu assisti a 'Nossa História de Juventude: Edição do Clube Mais Forte'..."
70002010-302 = "Ah, aquela que você está viciada ultimamente?"
70002010-303 = "Isso mesmo! O protagonista se esforça muito no clube, e parecia ser tão divertido..."
70002010-304 = "Por isso, eu fiquei com vontade de tentar!"
70002010-305 = "Ser do 'clube de ir para casa' é legal, mas acho que se eu entrar em um clube de verdade, posso encontrar coisas ainda mais divertidas!"
70002010-306 = "As pessoas que encontrei hoje também estavam todas se esforçando em seus clubes, sabe?"
70002010-307 = "Achei que seria um desperdício terminar meus tempos de estudante sem conhecer a diversão de um clube!"
70002010-309 = "Pensei que talvez eu estivesse perdendo mais da metade da minha juventude!"
70002010-310 = "V-você acha...?"
70002010-311 = "Com certeza! Quando as pessoas falam sobre memórias da juventude, quase sempre mencionam o clube!"
70002010-312 = "Se a Kirara acha isso..."
70002010-313 = "Bem, por que não?#nVamos tentar."
70002010-314 = "Você vai participar comigo?"
70002010-315 = "Bom, isso é o de sempre, não é?"
70002010-316 = "Dessa vez também vou te acompanhar, somos melhores amigas, afinal."
70002010-317 = "Eba! A Erika é demais! Obrigada!"
70002010-318 = "Então, que tipo de clube você quer? Já decidiu onde quer entrar?"
70002010-319 = "Não! Vou pensar nisso agora!"
70002010-320 = "Hmm, entendi."
70002010-325 = "Então, que tal isso?"
70002010-326 = "A maioria dos lugares tem um sistema de experiência, né..."
70002010-327 = "Por que você não experimenta vários clubes antes de decidir em qual quer entrar?"
70002010-331 = "Essa é uma ótima ideia! Gostei!"
70002010-333 = "Espero encontrar um clube que seja brilhante e empolgante!"
