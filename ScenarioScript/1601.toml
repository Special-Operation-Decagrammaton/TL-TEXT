[translation]
1601-1 = "給食部のドタバタ衛生管理評価（１）"
1601-2 = "（ゲヘナ学園の学生食堂）"
1601-3 = "（給食の配膳が始まる3時間前）"
1601-7 = "くんくん、くんくん。"
1601-9 = "匂いからして、この辺りだと思うんだけど……。"
1601-13 = "あっ！見つけた……！"
1601-15 = "さて、じゃあ――"
1601-17 = "ジュリ、そこっ！"
1601-18 = "はいっ！"
1601-20 = "えっ！？うわぁっ！？"
1601-25 = "捕まえた！クッキー泥棒！"
1601-26 = "はい！確保です！"
1601-27 = "ううっ！？もぐもぐ……！"
1601-28 = "もぐもぐ……ごっくん、ぷはっ！何なのよ！"
1601-29 = "「何なの」はこっちのセリフ。"
1601-30 = "朝早くからこんなところで何してるの？"
1601-31 = "そうですよ！"
1601-32 = "そ、それは、えーっと……。"
1601-33 = "今日、デザートとしてクッキーが出るって聞いたから。"
1601-34 = "それで、えっと、その……。"
1601-39 = "あっ、そう！クッキーがちゃんと美味しいかどうか、確認してあげようと思って！"
1601-40 = "美食研究会の一員としてね！"
1601-42 = "ふーん……。"
1601-43 = "はぁ、お腹が空いてるんだろうけど、これは給食なの。"
1601-44 = "ちゃんと給食の時間まで待ってて。"
1601-45 = "そんなご無体な！ちょっとだけ、ちょっとだけで良いから！"
1601-46 = "あっ、クッキーじゃなくてスープでもいいよ！"
1601-47 = "そういうことじゃない！"
1601-48 = "はあ、今日は忙しいんだから早く出ていってもらえる？"
1601-49 = "え、何で？何かあるの？"
1601-50 = "今日は給食部の衛生評価が実施される日なんですよ。"
1601-51 = "調査員が来て、色々とチェックされる日なの。"
1601-52 = "設備の清潔さとか、食材の賞味期限とか……。"
1601-53 = "他にも、色んな評価をされる日なんです。"
1601-54 = "前回はかなり低い評価だったせいで、予算も半分になっちゃったし……。"
1601-55 = "そういえばあれ、どうしてなんだろう……徹底的に準備したはずなのに……。"
1601-56 = "調査員の人も帰るまで笑顔だったのに、どうして……？"
1601-57 = "ふ、フウカ先輩落ち着きましょう！深呼吸です、深呼吸！"
1601-59 = "……うん、あれはもう過ぎたこと！#n過去のことは過去のことだし、未来に目を向けないと！"
1601-60 = "はい、きっと運が悪かっただけです！"
1601-61 = "とにかくそういうことだから、早く帰ってもらって……。"
1601-63 = "総員手を上げろ！その場で動くな！"
1601-64 = "えっ？"
1601-69 = "あらっ？"
1601-70 = "……ん？"
1601-71 = "なんだ、美食研究会か。#nいつもの面子以外に、変な食ざ……怪しいのがいると思ったら。"
1601-72 = "何だと思ったの！？"
1601-73 = "待って、どうして風紀委員会がここにいるの？"
1601-74 = "いつまで私に対して、そんな態度でいられるかな。"
1601-75 = "ど、どういうこと！？"
1601-76 = "今日の給食部の衛生評価は本来の調査員の代わりにこの私、風紀委員会のイオリが担当する。"
1601-77 = "風紀委員会が？どうして……？"
1601-78 = "大した理由じゃない。"
1601-79 = "前回給食部に来た調査員は、食中毒と診断された。"
1601-80 = "しょ、食中毒！？"
1601-81 = "つまり、学生食堂のどこかに細菌やウイルスが蔓延している可能性がある。"
1601-82 = "例えば、そこで食べてるクッキーとかな！"
1601-84 = "もぐもぐ……"
1601-85 = "ごっくん。\n#n……？"
1601-86 = "少しは動揺したらどうなんだ！！"
1601-87 = "それより食中毒だなんて、そんなはずない！何かの間違いに決まってる！"
1601-88 = "私たちの給食は確かに、時々美味しくな……。"
1601-89 = "美味し……く……"
1601-90 = "全然美味しくないけど！"
1601-91 = "もう少しためらって！#nっていうか「全然」！？"
1601-92 = "と、とにかく、食中毒が起こるような杜撰な管理はしてない。"
1601-93 = "そうです！フウカ先輩がどれだけ衛生面に気を付けていることか！"
1601-94 = "口では何とでも言える。"
1601-95 = "でも一つ確かなことは、前回担当した調査員がここの評価を終えた後に食中毒になったということだ。"
1601-96 = "その調査員は評価を終えた後、お腹を押さえてお手洗いへと走りながらこう言ったらしい……"
1601-99 = "「あの給食部には魔物が棲んでいる」、と。"
1601-100 = "嘘でしょ！？映画の話か何か！？どういうこと！？"
1601-101 = "どれだけ酷ければあんな言葉が出てくるのか……。"
1601-102 = "今日、私がその実態を徹底的に暴いてやる！"
1601-103 = "（いや、結局なんで風紀委員が来たのかは分からなかったんだけど！？）"
1601-104 = "わ、私だって負けられません！"
1601-105 = "いくら相手が風紀委員会だとしても！"
1601-108 = "私たち給食部が、一筋縄ではいかないというところを見せて差し上げます！"
1601-109 = "気合だけは十分だな、良いだろう。"
1601-110 = "全力でかかってこい！"
1601-111 = "はい！"
1601-116 = "（……なに、この熱血展開？衛生評価ってこういうのだっけ？え、おかしいのって私！？）"
1601-118 = "（そうして、イオリによる衛生管理評価が始まった）"
