[translation]
1601-1 = "Avaliação de Higiene do Clube de Merenda (1)"
1601-2 = "（Refeitório da Academia Gehenna）"
1601-3 = "（3 horas antes do início da distribuição da merenda）"
1601-7 = "Sniff, sniff."
1601-9 = "Pelo cheiro, deve ser por aqui..."
1601-13 = "Ah! Achei...!"
1601-15 = "Muito bem, então――"
1601-17 = "Juri, ali!"
1601-18 = "Sim!"
1601-20 = "Hã!? Uau!?"
1601-25 = "Te peguei! Ladrão de biscoitos!"
1601-26 = "Isso! Capturado!"
1601-27 = "Ugh!? Mastiga, mastiga...!"
1601-28 = "Mastiga, mastiga... engole, puf! O que é isso!?"
1601-29 = "Sou eu quem deveria perguntar isso."
1601-30 = "O que você está fazendo aqui tão cedo?"
1601-31 = "Pois é!"
1601-32 = "I-isso é, bem..."
1601-33 = "Ouvi dizer que hoje teria biscoitos de sobremesa."
1601-34 = "Então, bem, é que..."
1601-39 = "Ah, é isso! Eu só queria verificar se os biscoitos estavam gostosos!"
1601-40 = "Como um membro do Clube de Pesquisa Gastronômica, é claro!"
1601-42 = "Hum..."
1601-43 = "Ai, ai, eu sei que você está com fome, mas isso é merenda escolar."
1601-44 = "Por favor, espere até a hora da merenda."
1601-45 = "Que crueldade! Só um pouquinho, só um pouquinho mesmo!"
1601-46 = "Ah, se não puder ser biscoito, pode ser sopa também!"
1601-47 = "Não é esse o ponto!"
1601-48 = "Ai, estamos ocupadas hoje, pode ir embora logo?"
1601-49 = "Ué, por quê? Tem alguma coisa acontecendo?"
1601-50 = "Hoje é o dia da avaliação de higiene do Clube de Merenda."
1601-51 = "É o dia em que os inspetores vêm para verificar várias coisas."
1601-52 = "A limpeza das instalações, a data de validade dos ingredientes..."
1601-53 = "Além disso, seremos avaliadas em vários outros pontos."
1601-54 = "Da última vez, a nota foi tão baixa que nosso orçamento foi cortado pela metade..."
1601-55 = "Falando nisso, por que será que aquilo aconteceu... eu tinha me preparado tão bem..."
1601-56 = "Até o inspetor estava sorrindo quando foi embora, por que será...?"
1601-57 = "F-Fuuka-senpai, vamos nos acalmar! Respire fundo, respire fundo!"
1601-59 = "…Sim, o que passou, passou! O passado é passado, preciso focar no futuro!"
1601-60 = "Isso, com certeza foi só azar!"
1601-61 = "De qualquer forma, é por isso, então por favor, vá embora..."
1601-63 = "Todos, mãos ao alto! Não se movam!"
1601-64 = "Hã?"
1601-69 = "Ué?"
1601-70 = "…Hm?"
1601-71 = "Ora, é o Clube de Pesquisa Gastronômica. Achei que, além dos suspeitos de sempre, tinha algum ingrediente... digo, alguém suspeito por aqui."
1601-72 = "O que você achou que eu era!?"
1601-73 = "Espere, por que o Comitê Disciplinar está aqui?"
1601-74 = "Vamos ver por quanto tempo você consegue manter essa atitude comigo."
1601-75 = "O-o que você quer dizer com isso!?"
1601-76 = "A avaliação sanitária do Departamento de Merenda de hoje será feita por mim, Iori, do Comitê Disciplinar, em vez do inspetor original."
1601-77 = "O Comitê Disciplinar? Por que...?"
1601-78 = "Não é nada demais."
1601-79 = "O inspetor que veio ao Departamento de Merenda da última vez foi diagnosticado com intoxicação alimentar."
1601-80 = "In-intoxicação alimentar!?"
1601-81 = "Ou seja, existe a possibilidade de bactérias ou vírus estarem se espalhando em algum lugar do refeitório estudantil."
1601-82 = "Como, por exemplo, nesse biscoito que você está comendo aí!"
1601-84 = "Mastiga, mastiga..."
1601-85 = "Engole.\n#n...?"
1601-86 = "Pelo menos finja que está abalada com isso!!"
1601-87 = "Além disso, intoxicação alimentar? Isso é impossível! Deve ter sido algum erro!"
1601-88 = "Nossa merenda é, de fato, às vezes não tão gostosa..."
1601-89 = "Gostosa... não..."
1601-90 = "Na verdade, não é nada gostosa!"
1601-91 = "Hesite um pouco mais! #nE outra, 'nada gostosa'!?"
1601-92 = "De, de qualquer forma, não temos uma gestão descuidada que causaria intoxicação alimentar."
1601-93 = "É isso mesmo! Você não faz ideia de quanto a Fuuka-senpai se preocupa com a higiene!"
1601-94 = "Qualquer um pode dizer qualquer coisa."
1601-95 = "Mas uma coisa é certa: o inspetor anterior teve intoxicação alimentar logo após terminar a avaliação aqui."
1601-96 = "Dizem que, ao terminar a avaliação, ele saiu correndo para o banheiro segurando a barriga e disse..."
1601-99 = "“Existe um monstro habitando aquele Departamento de Merenda”."
1601-100 = "Mentira, né!? Isso é cena de filme ou o quê!? O que isso significa!?"
1601-101 = "O quão ruim deve ser para alguém dizer algo assim..."
1601-102 = "Hoje, eu vou expor a verdadeira face desse lugar!"
1601-103 = "(Não, mas eu ainda não entendi por que o Comitê Disciplinar veio aqui!?)"
1601-104 = "E-eu também não vou perder!"
1601-105 = "Mesmo que o oponente seja o Comitê Disciplinar!"
1601-108 = "Vamos mostrar a vocês que o Departamento de Merenda não é um osso fácil de roer!"
1601-109 = "Pelo menos determinação vocês têm, muito bem."
1601-110 = "Venham com tudo!"
1601-111 = "Sim!"
1601-116 = "(...O que é esse clima de anime de luta? Avaliação sanitária é assim mesmo? Ei, será que a estranha sou eu!?)"
1601-118 = "(E assim, a avaliação de higiene feita por Iori começou.)"
