[translation]
13400-1 = "第40話;夢が残した足跡"
13400-5 = "雷が……。"
13400-6 = "オアシス全体に……。"
13400-10 = "ヒナちゃん、立てる？"
13400-14 = "……ええ、大丈夫。"
13400-23 = "これは……。"
13400-24 = "……花火？"
13400-25 = "雷に反応したのかな……。"
13400-34 = "……これは。"
13400-35 = "アレ、魚の形してない？"
13400-36 = "きれい……まるで海みたいです！"
13400-39 = "……。"
13400-40 = "もしかして……#n何らかの刺激が加わると、プラズマを発生する鉱物じゃないかしら。"
13400-41 = "でも、超高価で希少な金属のはず。"
13400-42 = "……。"
13400-45 = "（超高価……？）"
13400-46 = "……日が昇る。"
13400-49 = "……先輩の言う通りでした。"
13400-50 = "見つけましたよ、お宝。"
13400-51 = "まさか、本当に見つけられるとは思いませんでしたけど。"
13400-52 = "私が間違ってました……。"
13400-55 = "……先輩。"
13400-63 = "う、うわっ！#nさっきより勢いが！"
13400-64 = "……なるほど、100g1000万円の価値を持ってるだけあるわ。"
13400-65 = "へ！？"
13400-66 = "え？"
13400-67 = "ここ二年くらいの間に、十倍くらい相場が上がったのよ。"
13400-68 = "ちょ、ちょっと、この連鎖どうにかして止めないと！#nダメ、お金がっ！"
13400-69 = "少しでも確保するわよ！#nアヤネちゃん、スコップは！？"
13400-70 = "いきなり言われても……。"
13400-71 = "もう、ちゃんと持ってきておかないから！"
13400-74 = "いや、たぶんツルハシじゃないと――"
13400-75 = "この爆発を止める方法は？"
13400-76 = "……無理じゃないかしら。#n連鎖反応は、一帯の鉱物が燃え尽きるまで続く。"
13400-77 = "わあ！#n幻想的ですね～☆"
13400-82 = "シロコ、私があげた覆面を袋にしないで。"
13400-83 = "でも……。"
13400-84 = "シロコ先輩、呼び方が一緒だと混乱するんだけど、何とかならない？"
13400-85 = "じゃあ、私は「ちびシロコ」って呼ぶよ。"
13400-86 = "ん、すぐに大きくなる。"
13400-87 = "なら、「よわシロコ」。"
13400-91 = "ちょっと、危ないでしょ！"
13400-92 = "無駄だよ。私はあなたにはない事を経験し、知らないことを知っている。この差は――"
13400-93 = "ん、今度こそ負けない。"
13400-96 = "もう、落ち着いてください！"
13400-97 = "わあ～、そろそろフィナーレですかね？"
13400-106 = "うーん……。"
13400-107 = "……まぁ、いっか。"
13400-110 = "おじさんがカッコつけようとすると、いつもこんな感じだよね～。"
13400-111 = "……うへ～。"
13400-113 = "次回;残されたもの"
