[translation]
1003403-1 = "花嫁修行その１：家庭料理編"
1003403-2 = "百鬼夜行・第7学生食堂"
1003403-3 = "ちょうどここの学生食堂が空いてましたので、特別にお借りすることができました。"
1003403-4 = "今日の大和撫子としての修行は事前にお伝えした通り、料理です。"
1003403-5 = "なので、まずは鉄板の家庭料理に挑戦してみようかと。"
1003403-6 = "[s] \"何の料理を作るの？\""
1003403-7 = "家庭料理の代表格……"
1003403-8 = "肉じゃがです！"
1003403-9 = "[s1] \"にっ、肉じゃが！\"\n[s2] \"家庭料理の中の家庭料理！\""
1003403-10 = "ふふ、大和撫子の目指すべき料理とは……。"
1003403-11 = "ふふ、大和撫子の目指すべき料理とは……。"
1003403-12 = "何よりもまず上品に、ですが過度に飾らず……それでいて、決して物足りなくもないものを作ることです。"
1003403-13 = "肉じゃがは、作るだけならそれほど難しくはありません。材料もシンプルです。"
1003403-14 = "大和撫子を目指してこれまで培ってきた私の実力をお見せするのに、ちょうどいい料理かなと思いまして。"
1003403-15 = "先生は肉じゃが、お好きですか……？"
1003403-16 = "[s3] \"愛してます。\"\n[s4] \"ミモリが作る物なら何でも！\""
1003403-17 = "そ、それは良かったです。"
1003403-18 = "ありがとうございます、ふふっ。"
1003403-19 = "[s] \"この前のサンドイッチも、すごく美味しかったから。\""
1003403-20 = "あ、あの時の……。"
1003403-21 = "あ、ありがとうございます……！"
1003403-22 = "[s] \"今回も楽しみにしてるね。\""
1003403-23 = "そこまで言ってくださるなんて……。"
1003403-24 = "……っ！"
1003403-25 = "私、決めました！今回は今までにないほど、全力でお作りします！"
1003403-26 = "一生懸命！全力で！"
1003403-27 = "[s5] \"えっと、そこまで気合が入ると……。\"\n[s6] \"さっき言ってた「上品に」からは少し離れるのでは……？\""
1003403-28 = "大丈夫です、お任せください！"
1003403-29 = "大丈夫です、お任せください！"
1003403-30 = "[s] \"わ、分かった。頑張って……？\""
1003403-33 = "[ns] \"えっと、ミモリ……大丈夫？\""
1003403-34 = "少々お待ちください、先生……今慎重に、針にぴったりになるように精緻な作業をしておりますので……。"
1003403-35 = "1gも誤差が無いよう、レシピに書いてある通りに……。"
1003403-36 = "[s] \"そこまで気にしなくてもいいんじゃないかな……？\""
1003403-37 = "いいえ、そんなことはありません。"
1003403-38 = "せっかく先生が楽しみにしてくださっているのですから、大和撫子を目指す者として、全力で先生の期待にお応えしてみせます。"
1003403-39 = "きっと今日の日のために、私はこれまで力を蓄えてきたのです……。"
1003403-40 = "そうに違いありません！"
1003403-42 = "[s] \"心遣いは嬉しいけど……空回りしないといいな……。\""
1003403-46 = "（トッ）"
1003403-47 = "醬油、料理酒、砂糖、そしてお水の量に至るまで、寸分の狂いもなくレシピ通りです。"
1003403-48 = "では、あらためて始めます！"
1003403-49 = "これらの調味料を全て加えて……。"
1003403-50 = "お肉と玉ねぎ、人参をお鍋に入れて、ゆっくり沸騰させます！"
1003403-52 = "（グツグツグツ……）"
1003403-53 = "こうやって沸騰してくると、玉ねぎが徐々に透き通ってきます。"
1003403-54 = "このタイミングで火を弱めて……蓋をして、20分程煮詰めます……。"
1003403-55 = "玉ねぎが透き通ったら、ジャガイモを入れて、さらに煮ます……。"
1003403-58 = "（グツグツグツ……）"
1003403-59 = "完成しました。私の全力を注いで作った、肉じゃがです……！"
1003403-60 = "……食べていただけますか？"
1003403-61 = "[s] \"うん、じゃあいただきます。\""
1003403-62 = "……（ゴクリ）。"
1003403-63 = "[s] \"あむっ、モグモグ……。\""
1003403-67 = "[ns] \"……んんっ！？\""
1003403-68 = "い、いかがですか？"
1003403-69 = "[s] \"……しょっぱい、すっごく。\""
1003403-70 = "え……？そ、そんな、きっちり測ったはずですのに……！ま、待ってください……！"
1003403-71 = "ふーっ、ふーっ、はむっ……モグモグ。"
1003403-73 = "うっ……しょっぱいですね……これは、いったい……。"
1003403-74 = "[s] \"ミモリ、これ砂糖じゃなくて塩じゃない？\""
1003403-75 = "あ、ああっ……！"
1003403-76 = "ど、どうしてこんなミスを……す、すみません、先生……。"
1003403-77 = "ちゃんと確認していれば……私、なんてことを……。"
1003403-78 = "せっかく、先生に家庭料理を召し上がっていただく良い機会でしたのに……。"
1003403-79 = "がっかりさせてしまいました……。"
1003403-80 = "こんなことでは、大和撫子なんてまだまだです……。"
1003403-81 = "[s] \"大丈夫だよ、ミモリ。\""
1003403-82 = "ですが、先生……。"
1003403-83 = "[s7] \"一度の失敗で、全部がダメになるわけじゃないから。\"\n[s8] \"ここからどう挽回するかを考えるのはどう？\""
1003403-84 = "……お優しい言葉、ありがとうございます。先生。"
1003403-85 = "……お優しい言葉、ありがとうございます。先生。"
1003403-86 = "そうですね。大和撫子になろうというのに、すぐに意気消沈してしまうのも良くありません。"
1003403-87 = "先生の仰る通り、お見苦しい姿を見せるよりも、"
1003403-88 = "挽回する方法を探す方が建設的……ですね。"
1003403-89 = "ですが、どうしましょう。こうなってしまっては……。"
1003403-90 = "あっ、そういえばここの食堂の棚に……。"
1003403-91 = "少々お待ちください、先生！"
1003403-96 = "[ns] \"これって……。\""
1003403-97 = "その……戸棚にカレーのルーが残っていたのを思い出しまして。"
1003403-98 = "肉じゃがとカレーは、材料も似ていますし。"
1003403-99 = "それをさらに大きな鍋で作れば、しょっぱい味もある程度調整できるのではないかな、と……。"
1003403-100 = "も、もちろん無理して食べていただく必要は……！"
1003403-104 = "[ns] \"はむっ……うん、すごく美味しいよ。ミモリ。\""
1003403-105 = "よ、よかったです……。"
1003403-107 = "……ふふっ。"
1003403-108 = "[s] \"どうしたの？\""
1003403-109 = "あ、いえ、考えてみたらカレーも、家庭料理の一つと言われるものだなと思いまして。"
1003403-110 = "最終的には、どうにか先生に家庭料理を振舞うことができたので、"
1003403-111 = "何だかほっとして、気が抜けてしまって。"
1003403-112 = "これも、先生が諦めないでと言ってくださったおかげです。"
1003403-113 = "そのことがすごく嬉しくて、つい。"
1003403-114 = "[s] \"それは良かった。\""
1003403-115 = "はい、ありがとうございます。"
1003403-116 = "先生と一緒に修行ができて良かったです。"
1003403-117 = "さあ、まだたくさん残っていますので……"
1003403-118 = "もう一皿、如何ですか？"
1003403-120 = "（そうして、ミモリと楽しい食卓を囲んだ）"
