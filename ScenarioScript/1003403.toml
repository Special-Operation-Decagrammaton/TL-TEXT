[translation]
1003403-1 = "Treinamento de noiva parte 1: Culinária caseira"
1003403-2 = "Hyakkiyako - 7º Refeitório Estudantil"
1003403-3 = "Como o refeitório estudantil estava vazio agora, consegui pedir emprestado especialmente para nós."
1003403-4 = "Como mencionei antes, o treinamento de hoje para me tornar uma Yamato Nadeshiko será sobre culinária."
1003403-5 = "Por isso, pensei em começar desafiando um clássico da culinária caseira."
1003403-6 = "[s] \"Que prato você vai fazer?\""
1003403-7 = "O representante da culinária caseira..."
1003403-8 = "Nikujaga!"
1003403-9 = "[s1] \"Ni-Nikujaga!\"\n[s2] \"O prato mais caseiro de todos!\""
1003403-10 = "Fufu, o prato que uma Yamato Nadeshiko deve almejar é..."
1003403-11 = "Fufu, o prato que uma Yamato Nadeshiko deve almejar é..."
1003403-12 = "Algo que seja, acima de tudo, elegante, sem ser excessivamente decorado... e que, ainda assim, não deixe nada a desejar."
1003403-13 = "Nikujaga não é tão difícil de fazer. Os ingredientes também são simples."
1003403-14 = "Pensei que seria o prato perfeito para mostrar a habilidade que cultivei até agora buscando ser uma Yamato Nadeshiko."
1003403-15 = "Sensei, você gosta de Nikujaga...?"
1003403-16 = "[s3] \"Eu amo.\"\n[s4] \"Qualquer coisa que a Mimori fizer!\""
1003403-17 = "I-isso é ótimo."
1003403-18 = "Obrigada, fufu."
1003403-19 = "[s] \"O sanduíche da outra vez também estava muito gostoso.\""
1003403-20 = "A-aquele de lá..."
1003403-21 = "M-muito obrigada...!"
1003403-22 = "[s] \"Estou ansioso por este também.\""
1003403-23 = "Dizer algo assim para mim..."
1003403-24 = "……!"
1003403-25 = "Eu decidi! Desta vez, vou preparar com toda a minha força, como nunca antes!"
1003403-26 = "Com todo o meu esforço! Com toda a minha força!"
1003403-27 = "[s5] \"Bem, com tanta determinação assim...\"\n[s6] \"Isso não vai acabar se afastando um pouco daquela 'elegância' que você mencionou?\""
1003403-28 = "Está tudo bem, pode deixar comigo!"
1003403-29 = "Está tudo bem, pode deixar comigo!"
1003403-30 = "[s] \"E-entendi. Boa sorte...?\""
1003403-33 = "[ns] \"Ei, Mimori... você está bem?\""
1003403-34 = "Espere um momento, Sensei... Estou realizando um trabalho preciso agora, ajustando tudo exatamente como na receita..."
1003403-35 = "Para que não haja nem 1g de erro, exatamente como está escrito na receita..."
1003403-36 = "[s] \"Não precisa se preocupar tanto assim, precisa...?\""
1003403-37 = "Não, não é isso."
1003403-38 = "Já que o Sensei está esperando ansiosamente, como alguém que almeja ser uma Yamato Nadeshiko, vou corresponder às suas expectativas com todas as minhas forças."
1003403-39 = "Com certeza, eu acumulei forças até hoje para este dia..."
1003403-40 = "Não pode ser de outra forma!"
1003403-42 = "[s] \"Fico feliz com a sua consideração, mas... espero que não acabe exagerando...\""
1003403-46 = "(Toc)"
1003403-47 = "Desde a quantidade de molho de soja, saquê culinário, açúcar e água, está tudo exatamente conforme a receita, sem erro algum."
1003403-48 = "Então, vamos começar de novo!"
1003403-49 = "Adicionando todos esses temperos..."
1003403-50 = "Colocando a carne, a cebola e a cenoura na panela, e deixando ferver lentamente!"
1003403-52 = "(Borbulhando...)"
1003403-53 = "Quando começa a ferver assim, a cebola vai ficando transparente aos poucos."
1003403-54 = "Neste momento, abaixo o fogo... coloco a tampa e deixo cozinhar por cerca de 20 minutos..."
1003403-55 = "Quando a cebola estiver transparente, adiciono a batata e cozinho mais um pouco..."
1003403-58 = "(Borbulhando...)"
1003403-59 = "Está pronto. Este é o Nikujaga que fiz colocando todo o meu esforço...!"
1003403-60 = "……Você poderia experimentar?"
1003403-61 = "[s] \"Certo, então vou aceitar.\""
1003403-62 = "……(Gulp)."
1003403-63 = "[s] \"Nham, mastiga, mastiga...\""
1003403-67 = "[ns] \"……Hmmmm!?\""
1003403-68 = "E-está tudo bem?"
1003403-69 = "[s] \"……Está salgado, muito salgado.\""
1003403-70 = "Hã……? N-não pode ser, eu medi tudo com precisão……! E-espere um pouco……!"
1003403-71 = "Assopra, assopra, nham…… mastiga, mastiga."
1003403-73 = "Ugh…… está salgado mesmo…… o que será que aconteceu……."
1003403-74 = "[s] \"Mimori, isso não é açúcar, é sal, não é?\""
1003403-75 = "A-ah……!"
1003403-76 = "C-como eu pude cometer um erro desses…… d-desculpe, Sensei……."
1003403-77 = "Se eu tivesse verificado direito…… o que eu fiz……."
1003403-78 = "E olha que era uma ótima oportunidade para o Sensei provar minha comida caseira……."
1003403-79 = "Eu acabei te decepcionando……."
1003403-80 = "Desse jeito, ainda estou longe de ser uma dama japonesa ideal……."
1003403-81 = "[s] \"Está tudo bem, Mimori.\""
1003403-82 = "Mas, Sensei……."
1003403-83 = "[s7] \"Um erro não estraga tudo.\"\n[s8] \"Que tal pensarmos em como consertar isso?\""
1003403-84 = "……Obrigada pelas suas palavras gentis, Sensei."
1003403-85 = "……Obrigada pelas suas palavras gentis, Sensei."
1003403-86 = "É verdade. Mesmo querendo ser uma dama japonesa ideal, não é bom ficar desanimada tão facilmente."
1003403-87 = "Como o Sensei disse, em vez de mostrar uma figura tão lamentável,"
1003403-88 = "é mais construtivo procurar uma forma de consertar…… não é?"
1003403-89 = "Mas o que faremos? Agora que chegou a esse ponto……."
1003403-90 = "Ah, falando nisso, na prateleira da cantina……."
1003403-91 = "Espere um momento, Sensei!"
1003403-96 = "[ns] \"Isso é…….\""
1003403-97 = "Bem…… lembrei que ainda tinha um pouco de curry no armário."
1003403-98 = "Os ingredientes do ensopado de carne e do curry são parecidos, afinal."
1003403-99 = "Se eu fizer em uma panela maior com isso, acho que o sabor salgado pode ser ajustado, de certa forma……."
1003403-100 = "M-mas, claro, você não precisa se forçar a comer……!"
1003403-104 = "[ns] \"Nham…… sim, está muito gostoso, Mimori.\""
1003403-105 = "Q-que bom……."
1003403-107 = "……Fufu."
1003403-108 = "[s] \"O que foi?\""
1003403-109 = "Ah, não, é que pensando bem, o curry também é considerado um tipo de comida caseira."
1003403-110 = "No fim das contas, consegui servir uma comida caseira para o Sensei,"
1003403-111 = "então me senti aliviada e relaxei um pouco."
1003403-112 = "Isso também é graças ao Sensei, que me disse para não desistir."
1003403-113 = "Fiquei muito feliz com isso, e acabei sorrindo."
1003403-114 = "[s] \"Fico feliz em ouvir isso.\""
1003403-115 = "Sim, obrigada."
1003403-116 = "Foi muito bom poder treinar junto com o Sensei."
1003403-117 = "Bem, ainda sobrou bastante, então……"
1003403-118 = "Aceita mais um prato?"
1003403-120 = "(E assim, compartilhei uma refeição agradável com a Mimori)"
