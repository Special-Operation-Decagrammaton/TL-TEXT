[translation]
1005902-1 = "再び穏やかな日常へ"
1005902-4 = "あっ、先生！やっほー☆"
1005902-5 = "待ってたよー！"
1005902-11 = "それじゃ行こっか！こっちこっち。"
1005902-12 = "[s] \"どこに行くの？\""
1005902-14 = "ショッピング！#n色々買いたいものがあるの。"
1005902-20 = "（楽しそうに駆けていくミカの後を追いかけていくと――）"
1005902-24 = "うーん！いい天気……"
1005902-29 = "やっぱり外の空気は気持ち良いねー！"
1005902-30 = "[s] \"嬉しそうだね。\""
1005902-31 = "そうかな？まぁでも、外を自由に歩けるのは嬉しいよ。"
1005902-32 = "前の生活から大分変わったから、#n慣れるまで時間かかっちゃうと思うけど……"
1005902-33 = "まあ大丈夫。すぐ慣れると思う！"
1005902-34 = "[s] \"そんなに生活変わっちゃったの？\""
1005902-35 = "んー……今までは建物を一人で使ってたんだけど、#n今は他の生徒と一緒に机を並べて勉強しなきゃだったり……"
1005902-36 = "ご飯も学食を利用しなきゃだったり？"
1005902-37 = "髪も自分で乾かしてるし……その辺かなぁ？"
1005902-38 = "[s] \"なるほど……ちょっと大変だね。\""
1005902-39 = "それに、寮暮らしになったから……"
1005902-40 = "洗濯やアイロンがけも自分でやらなきゃだし、#nみんなと同じ時間にご飯を食べたり、お風呂入らないといけないんだよ？"
1005902-41 = "消灯時間も決められちゃって……#n息が詰まっちゃう！"
1005902-42 = "[s1] \"それくらい普通じゃない？\"\n[s2] \"寮だとよくある話だと思うけど……。\""
1005902-47 = "ん～、まぁ、先生がそう言うならそうなんだろうけど……"
1005902-48 = "そんなにルールガチガチじゃない寮だってあるはずなのになぁ……#nハズレ引いちゃったのかも。"
1005902-49 = "まぁ……大丈夫。きっとすぐ慣れると思う☆"
1005902-50 = "[s] \"そうだね。ミカならすぐ慣れるよ。\""
1005902-51 = "それじゃ、気を取り直して……"
1005902-58 = "いざ！ショッピングへ出発～！"
1005902-60 = "トリニティ近郊の書店"
1005902-61 = "[ns] \"ショッピングって……本？\""
1005902-62 = "うん、授業に使うやつ。#n辞書とか参考書はこういうところでしか買えないからね。"
1005902-63 = "今まで使ってたやつは無くなっちゃったからさ。"
1005902-64 = "[s] \"……そっか。\""
1005902-65 = "ちょっと待っててね、すぐ買ってくるから！"
1005902-70 = "（そうして待っていると……）"
1005902-74 = "お待たせ☆"
1005902-75 = "思ったより時間かかっちゃった。"
1005902-76 = "[s] \"いっぱい買ったんだね。\""
1005902-77 = "うん……小説とか雑誌も欲しくなっちゃって……"
1005902-78 = "そろそろ衝動買いもやめないとなのになぁ……。"
1005902-79 = "ま、なんとかなるよね☆"
1005902-83 = "それじゃ、次行こっか。"
1005902-84 = "[s] \"他にもあるんだね。\""
1005902-89 = "[ns3] \"……？\"\n[ns4] ついていく。"
1005902-97 = "[ns] \"……洋服屋さん？\""
1005902-98 = "うん、ちょっと欲しい物あって。"
1005902-102 = "ここで待っててね、先生。"
1005902-103 = "すぐ終わるから！"
1005902-104 = "[ミカがいなくなり場面転換]"
1005902-108 = "（そうして待っていると……）"
1005902-113 = "お会計させていただきます。"
1005902-118 = "学園指定の運動靴が1点、室内履きが1点、指定の体操服が1点……"
1005902-119 = "ハンカチが2点、指定の水着が1点、運動用タオルが2点、そして……"
1005902-126 = "[ns] \"指定の物が多いね。\""
1005902-130 = "あっ、う、うん……。"
1005902-131 = "前に使ってたヤツ、どっかいっちゃって……#nあはは……。"
1005902-132 = "[s] \"…………そっか。\""
1005902-133 = "ま、買い替えたかったから、ちょうど良いんだけどね！"
1005902-135 = "お支払方法はどうされますか？"
1005902-139 = "じゃあ、これで。"
1005902-143 = "カードをお預かりします。"
1005902-151 = "……申し訳ございません、こちらのカードは利用できないみたいでして。"
1005902-153 = "あっ、あれぇっ！？"
1005902-154 = "えっと……ちょっと待って！？"
1005902-155 = "……。"
1005902-156 = "タオルとハンカチを1つずつキャンセルで……#nあと、室内履きもなしで！"
1005902-162 = "ダメですね。"
1005902-164 = "あ、ううっ……。"
1005902-165 = "じゃあ水着もなしで……あと、"
1005902-169 = "[ns] \"水着がないと水泳の授業で困るんじゃ……？\""
1005902-170 = "大丈夫、水着は持ってるから！"
1005902-171 = "ちょうど良いタイミングだから買い替えようと思ってたの。"
1005902-175 = "はい、これもキャンセルで。"
1005902-182 = "申し訳ありません――"
1005902-183 = "じゃ、じゃあ体操着も……"
1005902-187 = "……他のカードなどはお持ちでしょうか？"
1005902-192 = "[ns5] \"こちらでお願いします。\"\n[ns6] 大人のカードで支払う。"
1005902-200 = "はい、無事決済できました。"
1005902-201 = "せ、先生……！？#nど、どうして……。"
1005902-202 = "[s] \"さ、帰ろっか。\""
1005902-209 = "……。"
1005902-210 = "[ns] \"これからは、計画的に使わないとね。\""
1005902-211 = "……。"
1005902-212 = "……こんなつもりじゃなかったのに。"
1005902-213 = "私は、先生と買い物を楽しみたかっただけなのになぁ。"
1005902-214 = "なんでこんな……情けない姿ばっか……。"
1005902-215 = "いつも私って、先生に迷惑かけてさ……。"
1005902-216 = "[s7] \"学園生活に必要な物だったんだから、いいんだよ。\"\n[s8] \"ミカが無事に帰ってきたプレゼント。\""
1005902-221 = "……プレゼント、ね。"
1005902-222 = "うん……そう、だね……。"
1005902-223 = "[s] \"だから、これからも頑張ってね。\""
1005902-227 = "……うん。"
1005902-228 = "ありがとね、先生……大切にする。"
1005902-229 = "[s] \"それじゃ、仕事があるからそろそろ戻るね。\""
1005902-230 = "あっ、うん……。"
1005902-235 = "（ミカを見送ってから、シャーレに帰った。）"
