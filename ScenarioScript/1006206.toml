[translation]
1006206-1 = "メイドの中のメイド"
1006206-2 = "トキの工房"
1006206-3 = "（なんだか心配になって、トキがいるはずのオフィスを訪れた）"
1006206-4 = "（電話したら気付いてくれるかな……？）"
1006206-10 = "すみません、先生。まだもう少しかかりそうで……。"
1006206-11 = "えっ、わざわざこちらまで？#n私を心配して……？"
1006206-12 = "そこまで心配されるとは思っておらず……。#n最初から説明しておくべきでしたね。"
1006206-13 = "私の落ち度です。申し訳ありません。"
1006206-14 = "え……？どうして先生が謝るのですか……？"
1006206-15 = "あ……もうオフィスの前にいるのですね。"
1006206-16 = "えっと、どうしましょう……。"
1006206-17 = "外で待っていただくわけにはいきませんし、中にお入りください。"
1006206-21 = "（邪魔をしてしまい申し訳なく思いながら、トキの待つ部屋に向かった）"
1006206-30 = "[wa:600]― むさ苦しいところですが、[wa:1600]どうぞ。[wa:800]先生。"
1006206-32 = "[wa:600]― いつも通り、[wa:900]装備の[wa:300]点検をしておりました。"
1006206-35 = "[wa:900]― ご心配をおかけし、[wa:1300]申し訳ありません。"
1006206-38 = "[ns] \"毎日こうやって手入れしてるの？\""
1006206-39 = "[wa:200]― はい、[wa:900]常に最善の[wa:600]状態を[wa:400]保つようにしています。"
1006206-42 = "[wa:800]― C&Cの[wa:700]名に相応しい、"
1006206-44 = "[wa:500]― そんな[wa:300]メイドになる[wa:400]ためにも。"
1006206-47 = "[ns] \"知らなかった……トキはすごいね。\""
1006206-48 = "[wa:200]― そう……[wa:800]でしょうか。[wa:2000]特別な[wa:400]ことでは[wa:300]ないと思いますが。"
1006206-50 = "[wa:700]― 先生が[wa:500]そう言って[wa:300]くださって……[wa:1800]少し……"
1006206-53 = "[ns] \"少し？\""
1006206-54 = "[wa:1000]― 決めました。"
1006206-56 = "[wa:500]― 今日の整備は、[wa:1200]普段より[wa:400]完璧に[wa:500]実行します。"
1006206-59 = "[wa:1000]― 目標は[wa:1100]「キヴォトス最強のメイド」、[wa:2000]「メイドの中のメイド」[wa:1200]です。"
1006206-62 = "[wa:900]― それでは[wa:400]先生……"
1006206-64 = "[wa:400]― おそばで、[wa:900]見守っていて[wa:500]くださいね？"
1006206-67 = "（しばらく装備の手入れに集中するトキを見守った）"
1006206-69 = "大変お待たせしました、先生。"
1006206-70 = "今日もお仕事を始めましょう。"
1006206-71 = "私、[ruby=あすま]飛鳥馬[/ruby]トキが完璧に先生を補佐いたします。"
1006206-73 = "（そうして、明るい笑みを浮かべるトキと肩を並べながら、シャーレに戻った）"
