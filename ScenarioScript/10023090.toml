[translation]
10023090-1 = "Episódio 9; Transferência de Propriedade"
10023090-22 = "Uuuuu... que medo..."
10023090-24 = "Incrível, Yuzu! Você passou pela segurança sem ser notada!"
10023090-25 = "Yuzu-chan, como estava a situação?"
10023090-27 = "Surpreendentemente... a vigilância não estava tão rigorosa até o portão principal..."
10023090-28 = "Parece que os guardas... estão quase todos dentro do portão principal..."
10023090-29 = "E, quando olhei pela fresta da porta... o interior da mansão estava cheio de seguranças..."
10023090-30 = "Afinal... não temos outra escolha a não ser este método, Sensei?"
10023090-31 = "[s1] \"Sim...\"\n[s2] \"Primeiro, precisamos dispersar a atenção dos inimigos.\"\n[s3] \"Quando o sinal da 'Ladra da Benevolência' aparecer, vamos invadir pela frente.\""
10023090-35 = "Se fizermos isso, os guardas certamente ficarão confusos..."
10023090-36 = "Não adianta hesitar agora! Vamos seguir o plano!"
10023090-42 = "(Enquanto esperávamos prendendo a respiração...)"
10023090-47 = "(O som de fogos de artifício sendo lançados veio dos fundos da mansão)"
10023090-49 = "Ei, aquilo... o Sr. Doda disse alguma coisa?"
10023090-50 = "Não, não ouvi nada..."
10023090-56 = "(Quando os fogos explodiram no meio do céu noturno...)"
10023090-57 = "(Os 5 caracteres de 'Ladra da Benevolência' apareceram...!)"
10023090-61 = "É a 'Ladra da Benevolência'!!"
10023090-62 = "Reunir! Todos, vamos atrás da 'Ladra da Benevolência'!!"
10023090-68 = "É o sinal... Sensei."
10023090-69 = "[s] \"Foi um sinal impossível de não entender...\""
10023090-71 = "Sim. Pelo menos, não tem como confundir."
10023090-72 = "Vamos em um minuto."
10023090-73 = "Pode fazer isso, Alice?"
10023090-75 = "Com certeza! Agora é a vez da heroína!"
10023090-76 = "Avançar no evento junto com os aliados...#nVamos subir de nível juntos!"
10023090-80 = "...Hm? Agora é uma confusão ali?"
10023090-81 = "O que está acontecendo afinal...?"
10023090-84 = "Luz――!"
10023090-89 = "!!!"
10023090-97 = "Vamos começar!"
10023090-102 = "Vou neutralizar rapidamente."
