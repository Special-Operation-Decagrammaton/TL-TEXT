[translation]
10023090-1 = "第9話;所有権の移転"
10023090-22 = "ううううぅ……怖かった……"
10023090-24 = "すごいよ、ユズ！警備に全く気付かれないなんて！"
10023090-25 = "ユズちゃん、どんな状況だった？"
10023090-27 = "意外と……正門までは監視が厳しくなかった……"
10023090-28 = "警備員は……ほとんど正門の内側にいるみたい……"
10023090-29 = "と、扉の隙間から覗いたら……お屋敷の中は警備でいっぱいだったけど……"
10023090-30 = "やっぱり……この方法しか無いんでしょうか、先生？"
10023090-31 = "[s1] \"うん……\"\n[s2] \"まずは敵の意識を分散させないとね。\"\n[s3] \"「慈愛の怪盗」の合図が来たら、正面突破するよ。\""
10023090-35 = "そうすれば、きっと警備員は混乱するはずだし……"
10023090-36 = "今さら悩んでも仕方ないよ！作戦通りいこう！"
10023090-42 = "（息を潜めて待っていると……）"
10023090-47 = "（屋敷の裏側から、花火が打ち上がる音がした）"
10023090-49 = "おい、あれ……銅田さん何か言ってたか？"
10023090-50 = "いや、何も聞いてないが……？"
10023090-56 = "（花火が夜空の真ん中で爆発すると……）"
10023090-57 = "（「慈愛の怪盗」の5文字が浮かんだ……！）"
10023090-61 = "「慈愛の怪盗」だ！！"
10023090-62 = "集合！全員で「慈愛の怪盗」を追うぞ！！"
10023090-68 = "合図です……先生。"
10023090-69 = "[s] \"これ以上なく分かりやすい合図だったね……\""
10023090-71 = "ええ。少なくとも、間違えることはなさそうです。"
10023090-72 = "1分後に私たちも行きましょう。"
10023090-73 = "お願いできますか、アリス？"
10023090-75 = "もちろんです！今こそ勇者の出番ですね！"
10023090-76 = "仲間と一緒にイベントを進めて……#nみんなでレベルアップするのです！"
10023090-80 = "……ん？今度はあっちで騒ぎか？"
10023090-81 = "一体どうなってるんだ……？"
10023090-84 = "光よ――！"
10023090-89 = "！！！"
10023090-97 = "さあ、始めるよ！"
10023090-102 = "速やかに制圧します。"
