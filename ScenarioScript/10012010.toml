[translation]
10012010-1 = "第1話;本当に、人生何が起こるか分からない"
10012010-2 = "……というのが今朝までの状況でした。"
10012010-3 = "なんだか……幸運が続きすぎて怖いくらいですが。"
10012010-4 = "[s1] \"なるほど……色んなことがあったんだね。\"\n[s2] \"すごい豪運だね！\""
10012010-5 = "そ、そうですね。自分でもちょっと……未だに現実味がないです。"
10012010-6 = "そ、そうですね。自分でもちょっと……未だに現実味がないです。"
10012010-10 = "まぁまぁ、生きてりゃこんなこともあるよ……おじさんもちょっとビックリしちゃったけどさ。"
10012010-11 = "うんうん！きっと今まで頑張ってきた分が報われたんですよ！"
10012010-12 = "先生もそう思いますよね？"
10012010-13 = "あ、えっとですね。今回先生をお呼びしたのは……"
10012010-14 = "先生は対策委員会の顧問だから。こういう時は呼ばないと、と思って。"
10012010-15 = "ま、それを伝えるためだけに呼んだわけじゃないんだけどねぇ～"
10012010-16 = "……実は。"
10012010-18 = "セリカちゃんが当たったの、「リゾート利用券」だったんです。あはは……。"
10012010-22 = "わ、私だって知らなかったの！「1等」って聞いたら商品券か現金だと思うじゃない普通！"
10012010-23 = "まぁまぁ。現金だったとしても借金の返済に充てられちゃうんだし、逆に良かったんじゃない？"
10012010-24 = "いい機会だから、たまには思いっきり羽根を伸ばそうよ。リゾートでゆっくりできるなんて、あんまりないよ～？"
10012010-25 = "そうですよ！なので、みんなでバカンスに行くことにしたんです～！"
10012010-26 = "今までずっと、みんな学校のために頑張ってきたじゃないですか。たまにはこんな休暇もいいかなって☆"
10012010-28 = "……はい。なので、先生にご連絡したわけです。"
10012010-29 = "えっと、その……もし、先生さえよろしければ……。"
10012010-30 = "[s3] \"一緒に連れて行ってくれるの？\"\n[s4] \"リゾート楽しみだね！\""
10012010-31 = "もちろん。"
10012010-32 = "もちろん。"
10012010-33 = "それに、ちょっと遠いところにあるから引率の大人がいないとね。"
10012010-34 = "先生もまさか、こんな可愛い生徒たちをそのまま送り出したりしないよね？"
10012010-35 = "せ、先生……まさか、私たちだけで行かせたりなんかしないよね？"
10012010-36 = "[s5] \"もちろん。よろしくね。\"\n[s6] \"もちろん！人生って何が起こるか分からないね。\""
10012010-37 = "よし！それじゃあこれで決定ですね☆"
10012010-38 = "よし！それじゃあこれで決定ですね☆"
10012010-39 = "ん。すぐに準備するね。"
10012010-40 = "私もヘリを整備してきますね！"
10012010-47 = "うへー、みんな忙しないね～"
10012010-48 = "青春だね、青春。おじさんには眩しいや……。"
10012010-49 = "ん？ああ、私も楽しみだよ。"
10012010-50 = "なんてったって、リゾートだからね。"
10012010-51 = "アビドスの日差しは強かったからさ～。ここみたいに「あったかい日差し」の下でダラダラできるなんて、最高じゃない？"
10012010-52 = "生きてたらこんなこともあるんだねぇ……"
10012010-53 = "本当に……。"
10012010-55 = "人生ってのは本当、分かんないもんだね……。"
10012010-62 = "?"
