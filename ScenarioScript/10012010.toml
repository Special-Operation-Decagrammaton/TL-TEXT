[translation]
10012010-1 = "Episódio 1; Sério, nunca se sabe o que a vida nos reserva"
10012010-2 = "……Essa era a situação até esta manhã."
10012010-3 = "De alguma forma... é até assustador ter tanta sorte seguida."
10012010-4 = "[s1] \"Entendo... então aconteceram muitas coisas.\"\n[s2] \"Que sorte incrível!\""
10012010-5 = "É, pois é. Nem eu mesma... ainda consigo acreditar que é real."
10012010-6 = "É, pois é. Nem eu mesma... ainda consigo acreditar que é real."
10012010-10 = "Ora, ora, coisas assim acontecem na vida... até eu fiquei um pouco surpreso."
10012010-11 = "Sim, sim! Com certeza é a recompensa por todo o esforço de vocês até agora!"
10012010-12 = "O Sensei também acha isso, não acha?"
10012010-13 = "Ah, bem... a razão pela qual chamei o Sensei aqui foi..."
10012010-14 = "O Sensei é o consultor do Comitê de Contramedidas. Achei que deveria chamá-lo em momentos como este."
10012010-15 = "Bem, não foi só para dizer isso que te chamei, na verdade~"
10012010-16 = "……Na verdade."
10012010-18 = "O que a Serika ganhou foi um \"Voucher de Resort\". Ahaha..."
10012010-22 = "E-eu também não sabia! Quando ouvi \"1º lugar\", qualquer um pensaria em um vale-presente ou dinheiro, não é?!"
10012010-23 = "Ora, ora. Mesmo que fosse dinheiro, iria tudo para pagar as dívidas, então não foi melhor assim?"
10012010-24 = "Já que é uma boa oportunidade, vamos aproveitar para relaxar um pouco. Não é sempre que podemos descansar em um resort, né?"
10012010-25 = "Exatamente! Por isso, decidimos ir todas juntas para umas férias!"
10012010-26 = "Até agora, todas nós temos nos esforçado muito pela escola. Achei que umas férias assim seriam boas de vez em quando☆"
10012010-28 = "……Sim. Por isso entramos em contato com o Sensei."
10012010-29 = "Bem, é que... se o Sensei não se importar..."
10012010-30 = "[s3] \"Vocês vão me levar junto?\"\n[s4] \"Estou ansioso pelo resort!\""
10012010-31 = "Claro."
10012010-32 = "Claro."
10012010-33 = "Além disso, é um lugar um pouco longe, então precisamos de um adulto para acompanhar."
10012010-34 = "O Sensei não deixaria alunas tão fofas irem sozinhas, deixaria?"
10012010-35 = "S-Sensei... você não vai deixar a gente ir sozinha, vai?"
10012010-36 = "[s5] \"Claro. Contem comigo.\"\n[s6] \"Com certeza! A vida é cheia de surpresas.\""
10012010-37 = "Ótimo! Então está decidido☆"
10012010-38 = "Ótimo! Então está decidido☆"
10012010-39 = "Hum. Vou preparar tudo agora mesmo."
10012010-40 = "Eu vou preparar o helicóptero!"
10012010-47 = "Uheee, elas são tão agitadas~"
10012010-48 = "Isso é juventude, pura juventude. Chega a ser ofuscante para um tio como eu..."
10012010-49 = "Hum? Ah, eu também estou ansioso."
10012010-50 = "Afinal, é um resort."
10012010-51 = "O sol de Abydos é muito forte, né~. Poder relaxar sob um \"solzinho agradável\" como este, não é o máximo?"
10012010-52 = "Coisas assim acontecem quando se está vivo..."
10012010-53 = "Realmente..."
10012010-55 = "A vida é realmente uma caixinha de surpresas..."
10012010-62 = "?"
