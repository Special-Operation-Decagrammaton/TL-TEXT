[translation]
10008055-2 = "Guh!"
10008055-3 = "Sensei, você não vai ficar do lado dessas encrenqueiras, vai!?"
10008055-4 = "[s1] \"Não é bem ficar do lado...\"\n[s2] \"Eu só queria que você ouvisse o que elas têm a dizer...\""
10008055-8 = "(Expliquei para Iori tudo o que aconteceu até agora)"
10008055-12 = "Então... a Problem Solver 68 e aquela aluna de Abydos não estão atrás do conteúdo da caixa de ofertas."
10008055-13 = "Elas estão realmente tentando recuperar o que é delas?"
10008055-14 = "...Você quer que eu acredite nisso?"
10008055-15 = "[s] \"Acredite! Por favor!\""
10008055-16 = "Não adianta falar mais nada. Você continua sendo cabeça-dura como sempre..."
10008055-17 = "Hã!?"
10008055-26 = "Iori, como está a situação? Já resolveu tudo?"
10008055-27 = "Ah, Ako-chan! É que, bem, fui interrompida..."
10008055-28 = "Interrompida...? ...Não me diga que foi o Grupo Kurokame!?"
10008055-29 = "(...Grupo Kurokame?)"
10008055-30 = "Não, foi a Problem Solver 68 e uma aluna de Abydos. E o Sensei também."
10008055-31 = "Eu não interrompi nada! Foram vocês que nos atacaram do nada, não foram!?"
10008055-32 = "...Problem Solver 68, Abydos e o Sensei?"
10008055-33 = "[s] \"Oi, Ako. Feliz Ano Novo.\""
10008055-34 = "Por que o Sensei está... bem, feliz Ano Novo para você também."
10008055-35 = "Não, espere um pouco, o que é isso...?"
10008055-38 = "Entendo... Já compreendi a situação. O pessoal da Problem Solver 68, junto com aquela pessoa de Abydos, estão perseguindo a caixa de ofertas para recuperá-la. E, para isso, pediram a cooperação do Schale... ou melhor, arrastaram vocês para o lado delas."
10008055-39 = "Que método mais traiçoeiro..."
10008055-40 = "?"
10008055-41 = "Aliás, o Comitê Disciplinar parece estar bem livre, hein. Achei que estivessem atrás de encrenqueiras, mas acabaram arrumando briga com quem passava por perto."
10008055-42 = "Ora, muito obrigada. Esse seu jeito de falar, que finge ser uma conversa normal mas revela o quanto você odeia perder, é bem a sua cara, Kayoko-san."
10008055-43 = "Bem, para nós, vocês estão atrapalhando. Seria bom se saíssem logo do caminho."
10008055-44 = "É mesmo?..."
10008055-45 = "..."
10008055-49 = "Kufufu. Bem, como será que isso vai terminar?"
10008055-50 = "???"
10008055-51 = "[s] \"Bem...\""
10008055-53 = "Ah..."
10008055-54 = "Bem, não importa."
10008055-55 = "...Iori, eu disse para você lidar com as encrenqueiras, mas não disse para criar problemas com o Schale, disse?"
10008055-56 = "O que você está fazendo, meu Deus."
10008055-57 = "Será que a Iori gosta tanto do trabalho no Comitê Disciplinar que não quer ir para casa nem no Ano Novo?"
10008055-58 = "Que mudança de assunto descarada é essa!? E Ako-chan, a culpa é minha!? Eu saí no meu dia de folga e recebo esse tratamento!?"
10008055-59 = "E você, Ako-chan, que me deixou cuidando de tudo sozinha, o que você estava fazendo até agora!?"
10008055-60 = "Eu estava coletando informações, por isso demorei."
10008055-61 = "Essa pequena série de confusões começou quando os Kaitenger roubaram a caixa de ofertas."
10008055-62 = "Na verdade, o ponto importante dessa situação não é esse."
10008055-63 = "[s] \"O que você quer dizer?\""
10008055-64 = "Concluindo, toda essa série de eventos no \"Daikichi-den\"... trata-se de um grande esquema de fraude envolvendo uma organização chamada Grupo Kurokame."
10008055-65 = "O quê!?"
10008055-66 = "[s] \"Grupo Kurokame...?\""
10008055-67 = "Sim. A organização criminosa \"Grupo Kurokame\"... e aquele \"Daikichi-den\" pode ser considerado um local para lavagem de dinheiro."
10008055-68 = "O-o que você quer dizer com isso!?"
10008055-69 = "Exatamente o que eu disse. Aquela caixa de ofertas provavelmente estava sendo usada para movimentar fundos ilegais."
10008055-70 = "Não é um assunto complicado. Eles colocam o dinheiro obtido ilegalmente dentro da caixa de ofertas. Só isso já é o suficiente para desviar a atenção de órgãos de segurança, como a Academia de Polícia Valkyrie."
10008055-71 = "Com esse tipo de fachada, mesmo que haja alguma suspeita, ninguém vai tentar mexer na caixa de ofertas à força."
10008055-72 = "Claro, se uma quantia considerável de dinheiro estivesse circulando, a história seria outra. Mas o Grupo Kurokame preparou um segundo método."
10008055-73 = "[s] \"Um segundo método, será que...\""
10008055-74 = "Sim,"
10008055-75 = "O uso da mídia e das redes sociais."
10008055-76 = "Embora fosse um slogan sem graça, como \"um lugar onde os desejos se realizam\", na verdade, o efeito foi enorme. Tornou-se conhecido como um lugar famoso."
10008055-77 = "E, como pode ver, ficou lotado de \"tolos\" atraídos por isso."
10008055-79 = "Ugh...!?"
10008055-80 = "...Com a grande publicidade, o número de pessoas que colocam moedas na caixa de oferendas aumenta."
10008055-81 = "Naturalmente, o valor das oferendas também continua crescendo..."
10008055-82 = "A ponto de ficar impossível distinguir de quanto era o dinheiro ilegal original do Grupo Kurokame."
10008055-83 = "[s] \"Esconder uma árvore em uma floresta...\""
10008055-84 = "Ora, parece que você já tinha percebido tudo, não é? Como esperado da Kayoko."
10008055-85 = "Hah, que jeito forçado de falar..."
10008055-86 = "Para começar, \"Grande Templo da Sorte\" é um nome um pouco estranho para um lugar desses, não acha? E dizer que \"desejos se realizam\", se fosse apenas um boato, tudo bem, mas eles mesmos espalharem isso... é um sacrilégio, ou melhor, é algo estranho."
10008055-91 = "Ei, espere um pouco! Então, o \"lugar onde os desejos se realizam\" e o \"se você for impuro, os desejos se invertem\", tudo isso é mentira...?"
10008055-92 = "Impureza... inverter...? Eu nunca ouvi falar de nada disso..."
10008055-93 = "...I-isso mesmo! B-bem, eu já sabia! Era tudo um golpe, sim, eu sabia!"
10008055-94 = "Então, aquele \"se recuperarem a caixa de oferendas, devolveremos tudo\" é..."
10008055-95 = "Se fosse tratado como um caso de roubo, agências como a Valkyrie inevitavelmente interviriam. Eles provavelmente pensaram em impedir isso, nem que fosse temporariamente, não é?"
10008055-96 = "\"Não é um assunto para a polícia, afinal, isso é apenas um evento de Ano Novo\"... com esse tipo de desculpa."
10008055-98 = "Ahahahaha!"
10008055-99 = "Então foi um evento surpresa planejado até esse ponto?"
10008055-100 = "E provavelmente, o objetivo do Grupo Kurokame não era apenas esse..."
10008055-102 = "E-eu fui contratada como sacerdotisa em um lugar desses...!?"
10008055-103 = "Quer dizer, uma organização criminosa não deveria contratar sacerdotisas, isso é um desrespeito com elas!"
10008055-104 = "Bem, o lugar já era assim antes mesmo do Grupo Kurokame assumir o controle, então as sacerdotisas provavelmente não sabiam de nada..."
10008055-105 = "[s3] \"De qualquer forma, acho que a Serika fica bem de sacerdotisa!\"\n[s4] \"De qualquer forma, acho que o coração da Serika como sacerdotisa é verdadeiro!\""
10008055-106 = "E-eh...!? B-bem, não é como se eu me importasse tanto por ter sido contratada em um lugar estranho... mas fico feliz que diga isso..."
10008055-107 = "E-eh...!? B-bem, não é como se eu me importasse tanto por ter sido contratada em um lugar estranho... mas fico feliz que diga isso..."
10008055-108 = "Eu só faço o meu trabalho,"
10008055-109 = "e contanto que eu receba meu pagamento como prometido, está tudo bem."
10008055-110 = "[s5] \"Sendo assim, os Kaitengers estão...\"\n[s6] \"Será que eles estão realmente agindo pela justiça...?\""
10008055-111 = "Bem, dependendo da interpretação, pode ser visto dessa forma, não é? Tudo depende de como você define \"justiça\"."
10008055-112 = "Bem, dependendo da interpretação, pode ser visto dessa forma, não é? Tudo depende de como você define \"justiça\"."
10008055-113 = "Talvez eles queiram agir como justiceiros, mas..."
10008055-114 = "No entanto, não sei ao certo. Afinal, a identidade e o objetivo dos Kaitengers nunca foram muito claros."
10008055-115 = "Honestamente, isso não importa. O que é importante para nós, do Comitê Disciplinar, é resolver essa confusão que está acontecendo perto de Gehenna."
10008055-116 = "[s] \"Entendo.\""
10008055-117 = "Sim. Não importa se o oponente é o Kaitenger, o Grupo Kurokame ou os encrenqueiros da escola. Se eles perturbam a disciplina enquanto a presidente está fora, eu apenas corrigirei isso."
10008055-118 = "Sendo assim, não podemos perder tempo. Iori, continue perseguindo os encrenqueiros... e você também, Sensei."
10008055-119 = "Embora seja o primeiro dia do ano novo, parece que você continua se envolvendo em problemas desnecessários... mas é melhor não ser tão bonzinho assim."
10008055-120 = "Até mais."
10008055-126 = "Ako-chan, você não quer me deixar descansar, né..."
10008055-127 = "...Ufa."
10008055-128 = "Então, pessoal da Loja de Conveniência, não causem mais problemas!"
10008055-132 = "Sensei, até mais. Conto com você este ano também. ...Bem, vamos continuar perseguindo os encrenqueiros. Comitê Disciplinar, vamos!"
10008055-135 = "Sim!!"
10008055-140 = "(E assim, o Comitê Disciplinar partiu como o vento)"
