[translation]
10008055-2 = "ぐっ！"
10008055-3 = "先生、まさか問題児たちの肩を持つつもり！？"
10008055-4 = "[s1] \"肩を持つっていうか……。\"\n[s2] \"とりあえず話を聞いてほしいんだけど……。\""
10008055-8 = "（イオリに、これまでのことを説明した）"
10008055-12 = "つまり……便利屋68もそこのアビドスの生徒も、賽銭箱の中身を狙ってるわけじゃなくって。"
10008055-13 = "あくまで、本当に取り返そうとしてるってこと？"
10008055-14 = "……私にそれを信じろと？"
10008055-15 = "[s] \"信じて！お願い！\""
10008055-16 = "それ以上言っても無駄かもよ。相変わらず、頭が固いんだから……。"
10008055-17 = "はぁっ！？"
10008055-26 = "イオリ、状況はいかがですか？全部片付きました？"
10008055-27 = "あっ、アコちゃん！それがその、邪魔をされて……。"
10008055-28 = "邪魔を……？……まさか、黒亀組ですか！？"
10008055-29 = "（……黒亀組？）"
10008055-30 = "いや、便利屋68とアビドスのひとり。あと先生。"
10008055-31 = "別に邪魔も何もしてないわよ！いきなり襲ってきたのはそっちでしょう！？"
10008055-32 = "……便利屋68にアビドス、それに先生？"
10008055-33 = "[s] \"やっ、アコ。あけましておめでとう。\""
10008055-34 = "どうして先生が……えっと、あけましておめでとうございます。"
10008055-35 = "ではなく待ってください、これは一体……？"
10008055-38 = "なるほど……おおよそ把握しました。便利屋68のみなさんはアビドスのその方と一緒に、賽銭箱を取り返そうと追撃中。それにあたってシャーレと協力……と言いますか、味方に引きずり込んだと。"
10008055-39 = "何ともズルいやり方ですね……。"
10008055-40 = "？"
10008055-41 = "ところで、風紀委員会は暇そうだね。問題児を追いかけてると思いきや、通りすがりの人に喧嘩を売るなんて。"
10008055-42 = "あら、これはどうも。普通の会話に見せかけて意外と負けず嫌いなその言い方、相変わらずカヨコさんらしいですね。"
10008055-43 = "まあ、こっちからしても邪魔されてる状況だからね。早めにどいてほしい。"
10008055-44 = "そうですか……。"
10008055-45 = "……。"
10008055-49 = "くふふっ。さて、どうなるのかな～？"
10008055-50 = "？？？"
10008055-51 = "[s] \"えっと……。\""
10008055-53 = "はあ……"
10008055-54 = "まあ、構いません。"
10008055-55 = "……イオリ、私は問題児たちを片付けるように言いましたが、シャーレと揉め事を起こせとは言ってないんですよ？"
10008055-56 = "何をしているんですか、全くもう。"
10008055-57 = "もしかしてイオリは風紀委員会の仕事が好き過ぎて、正月だとしても帰りたくないとかそういうことなんですか？"
10008055-58 = "何その白々しい方向転換！？っていうかアコちゃん、私のせい！？せっかくの休日に出動したのにこの仕打ち！？"
10008055-59 = "アコちゃんこそ私に任せっきりで、今まで何してたのさ！？"
10008055-60 = "情報を集めていたら遅くなっただけです。"
10008055-61 = "カイテンジャーが賽銭箱を盗んだことから始まった、この小さな一連の騒動。"
10008055-62 = "実は今回の事態で重要なのはそこではありません。"
10008055-63 = "[s] \"どういうこと？\""
10008055-64 = "結論から申し上げますと、今回の「大吉殿」での一連の出来事……これらは、黒亀組という組織が絡んでる大々的な詐欺ですね。"
10008055-65 = "えぇっ！？"
10008055-66 = "[s] \"黒亀組……？\""
10008055-67 = "はい。犯罪組織「黒亀組」……そしてその「大吉殿」は、[ruby=マネーロンダリング]資金洗浄[/ruby]のための場所と言えるでしょう。"
10008055-68 = "なっ、ど、どういうこと！？"
10008055-69 = "言った通りの意味です、その賽銭箱は不法資金のために使われていたのでしょう。"
10008055-70 = "難しいお話ではありません。不法に集めた資金を、まずは賽銭箱の中に入れておく。これだけで、ヴァルキューレ警察学校などの治安機関の視線を逸らすことができます。"
10008055-71 = "こういった扱いであれば、多少疑わしくとも無理に賽銭箱をどうこうしようとはなりません。"
10008055-72 = "もちろん、相当の規模の金額が動けば話は別でしょう。しかし黒亀組は、もう一つの手段を用意していました。"
10008055-73 = "[s] \"もう一つの手段って、もしかして……\""
10008055-74 = "はい、"
10008055-75 = "あのマスコミやSNSの利用です。"
10008055-76 = "「願い事が叶う場所」だなんていう、あんな面白味の無いキャッチフレーズでしたが、実際のところ効果は絶大。有名な場所として知られるようになりました。"
10008055-77 = "こうしてご覧の通り、それに引き付けられて訪ねてくる「おバカさんたち」で埋め尽くされるほどに。"
10008055-79 = "うっ……！？"
10008055-80 = "……大々的な宣伝によって、ここでお賽銭を入れる人の数が増える。"
10008055-81 = "もちろん自然と、お賽銭の額もどんどん膨らんでいく……"
10008055-82 = "元々あった黒亀組の不法資金がどれくらいあったのか、分からなくなるくらいに。"
10008055-83 = "[s] \"木を隠すなら森の中……。\""
10008055-84 = "あら、とっくに見抜いていた……という感じですね？やはり、流石はカヨコさんです。"
10008055-85 = "はぁ、何そのわざとらしい言い方……。"
10008055-86 = "そもそも「大吉殿」って、ああいった場所の名称としては少しおかしいでしょう？それに「願いが叶う」などと、噂程度ならまだしも自分たちで言い出すなんて、罰当たりと言いますかおかしい話です。"
10008055-91 = "ちょっ、ちょっと待って！それじゃあ「願い事が叶う場所」っていうのも、「穢れが付いたらお願い事が裏返る」っていうのも、全部嘘……？"
10008055-92 = "穢れ……裏返る……？そういったお話は、完全に初耳ですが……？"
10008055-93 = "……そ、そう！ま、まあ知ってたわよ！全部詐欺だったんでしょう、ええ知ってたわ！"
10008055-94 = "じゃあ、「賽銭箱を取り戻したら全部お渡しします」っていうのは……"
10008055-95 = "盗難事件として扱われてしまえば、必然的にヴァルキューレなどの機関が介入してきます。それを一時的にでも止めようと思ったのではないでしょうか？"
10008055-96 = "「警察の方々がいらっしゃるようなことではありません、これはあくまでお正月のイベントですから」……そのような言い分で。"
10008055-98 = "あはははっ！"
10008055-99 = "そこまで考えられたサプライズイベントだったってこと？"
10008055-100 = "あと多分、黒亀組の狙い目はそれだけじゃなくって……"
10008055-102 = "わ、私はそんな場所に、巫女さんとして雇われてたわけ……！？"
10008055-103 = "っていうか犯罪組織が巫女さんを雇わないでよ、巫女さんたちに失礼じゃん！"
10008055-104 = "まあ黒亀組が掌握する前からそういう場所でしたので、巫女の方々には何も知らされていないでしょうけど……。"
10008055-105 = "[s3] \"何はともあれ、セリカの巫女姿は良いと思う！\"\n[s4] \"何はともあれ、セリカの巫女さんとしての心は本物だと思う！\""
10008055-106 = "え、えぇっ……！？ま、まあ別に変なとこに雇われたこと自体は、そこまで気にしてるわけじゃないけど……そういう風に言ってくれるのは嬉しいかな……。"
10008055-107 = "え、えぇっ……！？ま、まあ別に変なとこに雇われたこと自体は、そこまで気にしてるわけじゃないけど……そういう風に言ってくれるのは嬉しいかな……。"
10008055-108 = "私はちゃんとやることやって、"
10008055-109 = "約束通りバイト代さえ貰えればそれで良いし。"
10008055-110 = "[s5] \"だとすると、カイテンジャーは……\"\n[s6] \"もしかして、本当に正義のために……？\""
10008055-111 = "まあ、解釈によってはそう捉えることもできるかもしれませんね？「正義」というものを、どのように定義するか次第ですが。"
10008055-112 = "まあ、解釈によってはそう捉えることもできるかもしれませんね？「正義」というものを、どのように定義するか次第ですが。"
10008055-113 = "もしかしたら、義賊的なことをしたいのかもしれませんが……。"
10008055-114 = "ただ、正確なところは分かりません。元々カイテンジャーについては、その正体も目的もいまいち分かっていませんので。"
10008055-115 = "それはまあ正直なところ、どうでも良いのです。我々風紀委員会として大事なことは、ゲヘナ付近で起きているこの混乱を片付けること。"
10008055-116 = "[s] \"なるほど。\""
10008055-117 = "はい。相手がカイテンジャーであれ、黒亀組であれ、校内の問題児であれ構いません。委員長が席を外しているこのタイミングで風紀を乱すなら、私がそれを正すのみ。"
10008055-118 = "というわけで、時間を無駄にしてはいられません。イオリ、引き続き問題児たちを追ってください……それから、先生。"
10008055-119 = "新年の初日だというのに、相変わらず余計な騒動に巻き込まれているようですが……お人よしも大概にした方が良いですよ。"
10008055-120 = "では、また。"
10008055-126 = "アコちゃん、私に休ませる気ないな……。"
10008055-127 = "……ふう。"
10008055-128 = "じゃあ便利屋、お前たちもこれ以上面倒な騒ぎを起こすなよ！"
10008055-132 = "先生も、またね。今年もよろしく。……じゃあ引き続き、問題児を追いかけるとしよう。風紀委員会、行くぞ！"
10008055-135 = "はいっ！！"
10008055-140 = "（そうして風紀委員会は、風のように去っていった）"
