[translation]
10011025-2 = "Guaaa!?"
10011025-7 = "Q-Quem são esses..."
10011025-9 = "Espera, olhando bem, não é o Sensei do Schale?!"
10011025-10 = "Aquele mesmo de quem dizem: 'Não se aproxime se não quiser ter problemas'?"
10011025-11 = "[s] \"De onde vocês tiraram essa história...\""
10011025-12 = "Droga, esse cara é perigoso de verdade! Fujam!"
10011025-17 = "[ns] \"Queria saber a fonte disso... Mas enfim, Tsukuyo, bom trabalho. Você está bem?\""
10011025-18 = "Se-Sensei...!"
10011025-20 = "[ns] \"Já se acalmou?\""
10011025-21 = "Muito obrigada, Sensei..."
10011025-22 = "Sinto muito por ter causado problemas..."
10011025-23 = "[s1] \"Não se preocupe, eu que peço desculpas por não ter conseguido evitar.\"\n[s2] \"Na verdade, eu que agradeço.\""
10011025-26 = "..."
10011025-27 = "Eu, por ter esse corpo tão grande assim..."
10011025-28 = "Acabo chamando atenção, por assim dizer..."
10011025-29 = "Então, obrigada por ter me ajudado..."
10011025-30 = "[s] \"Não acho que precise se preocupar com isso. Vamos indo?\""
10011025-31 = "Sim...!"
10011025-38 = "..."
10011025-45 = "..."
10011025-46 = "[s] \"...Tem algo no meu rosto?\""
10011025-47 = "Ah, não, não é isso...!"
10011025-48 = "Desculpe, é que eu acabei ficando encarando..."
10011025-49 = "[s] \"Tudo bem, não se preocupe. Só fiquei curioso sobre o que houve.\""
10011025-50 = "Bem, é que..."
10011025-51 = "Sabe..."
10011025-52 = "Como posso dizer..."
10011025-53 = "Eu sempre tive curiosidade de saber como era o 'Mestre' da Izuna-chan..."
10011025-54 = "..."
10011025-55 = "[s] \"Ah, entendo.\""
10011025-56 = "Desde que a Izuna-chan entrou para o Clube de Pesquisa de Ninjutsu,"
10011025-58 = "ela não para de dizer..."
10011025-59 = "'Vou me tornar a melhor ninja de Kivotos pelo meu Mestre!'"
10011025-60 = "Ah, e toda vez que ela diz isso, a presidente pergunta: 'Vou perguntar só por precaução, mas você não está sendo enganada por alguém estranho, está?'..."
10011025-61 = "[s] \"Ah...\""
10011025-62 = "Ah, não! Não é que eu ache que o Sensei seja suspeito...!"
10011025-63 = "Bem, antes de te conhecer, passou um pouco pela minha cabeça, mas..."
10011025-66 = "Quando a Izuna-chan fala isso, ela está sempre sorrindo..."
10011025-67 = "Então eu também fiquei com vontade de te conhecer..."
10011025-68 = "[s3] \"Entendo. E o que achou depois de me conhecer pessoalmente?\"\n[s4] \"Qual foi a sua impressão?\""
10011025-72 = "Bem, não tive uma impressão ruim, de jeito nenhum...!"
10011025-73 = "Mesmo sendo uma visita repentina... você não me rejeitou..."
10011025-74 = "[s] \"É mesmo?\""
10011025-75 = "Você não ficou bravo comigo..."
10011025-76 = "E mesmo eu dizendo que sou uma 'ninja', você não riu de mim..."
10011025-77 = "Quando fomos ao Departamento Yin-Yang, você disse aquelas coisas por nós..."
10011025-78 = "Eu fiquei surpresa."
10011025-79 = "Pensei que ainda existissem pessoas assim."
10011025-80 = "Por isso, eu fiquei feliz."
10011025-81 = "Acho que a Izuna-chan e a presidente também ficariam felizes."
10011025-82 = "[s] \"Vocês três são bem próximas, né.\""
10011025-83 = "Ah..."
10011025-84 = "S-sim!"
10011025-85 = "No começo, eu também fiquei muito preocupada se eu realmente podia estar aqui, mas..."
10011025-86 = "Eu gosto da Izuna-chan e também respeito a nossa chefe."
10011025-87 = "Para alguém como eu, que só tem o corpo grande..."
10011025-90 = "Você é a Tsukuyo?"
10011025-95 = "Mesmo sendo assim..."
10011025-96 = "De qualquer forma, eu... eu quero me esforçar!"
10011025-97 = "Seguindo as regras de ferro dos ninjas, eu também não vou perder...!"
10011025-101 = "Não sei se estou indo bem, mas..."
10011025-102 = "De qualquer modo, primeiro... a apresentação de hoje...!"
10011025-103 = "[s5] \"...Entendo.\"\n[s6] \"A Tsukuyo com certeza vai conseguir.\""
10011025-106 = "S-sim, muito obrigada...!"
10011025-109 = "Ah, Tsukuyo-dono!"
10011025-110 = "Vocês duas estão atrasadas~, já estou cansada de esperar."
10011025-111 = "Ah, desculpe pela demora...!"
