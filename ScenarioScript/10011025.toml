[translation]
10011025-2 = "ぐあぁっ！？"
10011025-7 = "な、なんだこいつら……。"
10011025-9 = "って、よく見たらシャーレの先生じゃねぇか！"
10011025-10 = "それってあの、「酷い目に遭いたくなかったら近寄るな」って言われてるあの！？"
10011025-11 = "[s] \"どこからそんなお話が……。\""
10011025-12 = "くそっ、本気でヤバい奴だ！逃げろ！"
10011025-17 = "[ns] \"出所が気になる……ところでツクヨ、お疲れ様。大丈夫？\""
10011025-18 = "せ、先生ーーーーー！"
10011025-20 = "[ns] \"そろそろ落ち着いた？\""
10011025-21 = "ありがとうございます、先生……。"
10011025-22 = "その、お手数をかけて、すみません……。"
10011025-23 = "[s1] \"ううん、こっちこそかわせなくてごめんね。\"\n[s2] \"むしろありがとう。\""
10011025-26 = "……。"
10011025-27 = "私、こうして身体ばっかり大きいせいで……。"
10011025-28 = "よく、目を付けられる、と言いますか……。"
10011025-29 = "その、助けていただき、ありがとう、ございます……。"
10011025-30 = "[s] \"気に病むことじゃないと思うよ。じゃあ行こうか。\""
10011025-31 = "はいっ……！"
10011025-38 = "……。"
10011025-45 = "……。"
10011025-46 = "[s] \"……私の顔に、何か付いてる？\""
10011025-47 = "あ、いえ、そうではなく……！"
10011025-48 = "すみません、その、変に見つめてしまって……。"
10011025-49 = "[s] \"ううん、気にしないで。単にどうしたのかなって。\""
10011025-50 = "えっと、それはですね……"
10011025-51 = "あの……"
10011025-52 = "何と言いますか……"
10011025-53 = "イズナちゃんの「主殿」がどんな方なのか、"
10011025-54 = "ずっと気になってて……。"
10011025-55 = "[s] \"ああ、なるほど。\""
10011025-56 = "イズナちゃん、忍術研究部に入って以来、"
10011025-58 = "ずっと言ってるんです……"
10011025-59 = "「主殿のために、キヴォトスいちの忍者になります！」って。"
10011025-60 = "あ、そのたびに部長が、「一応聞くけど、変な人に騙されたりしてない？」とも……。"
10011025-61 = "[s] \"あー……。\""
10011025-62 = "あ、いえ！先生が怪しいですとか、そういったわけではなく……！"
10011025-63 = "えっと、会う前は少しだけ、頭をよぎらなかったわけではないのですが……。"
10011025-66 = "イズナちゃんがそれを言う時、いつも笑顔で……。"
10011025-67 = "私も会ってみたいなって、思って、たので……。"
10011025-68 = "[s3] \"なるほど。直接会ってみてどう？\"\n[s4] \"どんな感じの印象だった？\""
10011025-72 = "えっと、その、決して悪い感じでは無くて……！"
10011025-73 = "突然の訪問、だったのに……拒絶されたり、しませんでしたし……。"
10011025-74 = "[s] \"なるほど？\""
10011025-75 = "怒られたりもしませんでしたし……"
10011025-76 = "「忍者」って言っても、笑ったり、しなくて……。"
10011025-77 = "陰陽部のところに行ったときは、私たちのために、あんなことを言ってくれて……。"
10011025-78 = "びっくり、しました。"
10011025-79 = "こういう人もいるんだな、って。"
10011025-80 = "だから、嬉しかったんです。"
10011025-81 = "イズナちゃんも、部長も、喜んでると思います。"
10011025-82 = "[s] \"三人とも、仲良しだね。\""
10011025-83 = "あ……"
10011025-84 = "は、はいっ！"
10011025-85 = "最初は私も、ここにいて良いのかなって、すごく、心配でしたが……。"
10011025-86 = "イズナちゃんのことも、好きですし、部長も、尊敬してます。"
10011025-87 = "こんな、ただ身体が大きいだけの私に……"
10011025-90 = "あなたがツクヨ？"
10011025-95 = "こんな、私でも……"
10011025-96 = "とにかく、その、頑張りたいんです！"
10011025-97 = "忍者の鉄則に則って、私も、負けないように……！"
10011025-101 = "上手く行ってるかは、怪しいですが……。"
10011025-102 = "とにかく、まずは。今日の公演を……！"
10011025-103 = "[s5] \"……そっか。\"\n[s6] \"ツクヨならきっとできるよ。\""
10011025-106 = "は、はい、ありがとうございます……！"
10011025-109 = "あ、ツクヨ殿ー！"
10011025-110 = "二人とも遅い～、もう待ちくたびれたよー。"
10011025-111 = "あ、お待たせ、しました……！"
