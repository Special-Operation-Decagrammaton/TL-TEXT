[translation]
90100010-1 = "Episódio 1; O Kunekune"
90100010-7 = "Ei, você ouviu... aquele boato?"
90100010-8 = "Hã, qual boato?"
90100010-9 = "Sabe aquela passarela que tem na saída sul da estação Shirounagi?"
90100010-10 = "Aquela perto do rio? É um lugar super quente no verão porque não tem nada para fazer sombra."
90100010-12 = "Essa mesma. Como não tem nem árvores na calçada, quase ninguém passa por lá, mas..."
90100010-13 = "Dizem que, ultimamente, tem alguém fazendo ginástica lá na hora do almoço."
90100010-14 = "Bom, não é normal ter gente por lá?"
90100010-15 = "Não, é que..."
90100010-17 = "Dizem que a pessoa usa um traje de corpo inteiro branco. #nDe longe, parece um 'espantalho branco'."
90100010-18 = "Bem, é estranho, mas... não sei se é para tanto."
90100010-19 = "Dizem que, quando tentam falar com ele, ele desaparece num piscar de olhos. #nComo ele se afasta como uma miragem antes que percebam, quase ninguém viu o rosto dele."
90100010-20 = "Isso é... um pouco estranho, sim."
90100010-22 = "...Ué? Se 'quase ninguém' viu, significa que teve gente que viu o rosto dele?"
90100010-23 = "Sim. Uma garota do clube de atletismo que estava correndo por perto viu."
90100010-24 = "Como ele se afastava assim que ela chegava perto, o espírito competitivo dela despertou... #ne ela saiu correndo atrás dele desesperada. E então, quando ela viu o rosto dele de frente—"
90100010-28 = "—Dizem que, desde então, ela não consegue mais falar."
90100010-29 = "O-o que você quer dizer com isso!?"
90100010-30 = "Parece que, depois de ver o rosto do espantalho de perto, ela desmaiou na hora."
90100010-31 = "E desde aquele dia... ela fica balançando o corpo sem parar, como se estivesse tendo um pesadelo."
90100010-32 = "—Kunekune, balançando assim..."
90100010-33 = "Kunekune...?"
90100010-34 = "É, kunekune."
90100010-39 = "Próximo episódio; Entre o Super-humano e a Raposa"
