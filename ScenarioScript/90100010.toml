[translation]#[Texto revisado.] Em aguardo de revisão de formatação de texto. - Filipe 13/06.
90100010-1 = "Episódio 1: A Sombra Sinuosa do Kunekune"
90100010-7 = "Ei, você ouviu... aquele boato?"
90100010-8 = "Hã? Que boato?"
90100010-9 = "Sabe aquele calçadão na saída sul da Estação Shirounagi?"
90100010-10 = "Aquele que beira o rio? Onde não tem sombra nenhuma e o sol frita a gente no verão?"
90100010-12 = "Esse mesmo. Como não tem nem árvore por lá, quase ninguém passa pra caminhar, mas..."
90100010-13 = "Recentemente, dizem que tem uma pessoa fazendo ginástica lá bem na hora do almoço."
90100010-14 = "Ué, normal, tem doido pra tudo, né?"
90100010-15 = "É, mas a parada bizarra é que..."
90100010-17 = "Dizem que a pessoa veste uma daquelas roupas coladas brancas de corpo inteiro.#nE que, de longe, parece um \"espantalho branco\"."
90100010-18 = "Bom, é esquisito, sim... mas acho que não é pra tanto alarde."
90100010-19 = "Acontece que, se você tenta chamar a pessoa, ela simplesmente some do nada.#nQuando você pisca, ela já tá longe, igual miragem no asfalto quente. Dizem que quase ninguém conseguiu ver o rosto dela."
90100010-20 = "Credo, isso é meio... bizarro mesmo."
90100010-22 = "……Peraí. \"Quase ninguém\" quer dizer que teve alguém que conseguiu ver o rosto?"
90100010-23 = "Sim. Uma garota do clube de atletismo que tava correndo por lá viu."
90100010-24 = "Como a figura se afastava rápido sempre que ela tentava chegar perto, a alma de atleta dela pegou fogo...#nDizem que ela correu atrás feito louca. E aí, quando ela conseguiu olhar pro rosto do espantalho de frente――"
90100010-28 = "――Dizem que ela nunca mais conseguiu falar."
90100010-29 = "C-Como assim?!"
90100010-30 = "Ela olhou pro rosto do espantalho de perto e simplesmente desmaiou na hora."
90100010-31 = "E desde esse dia... ela não para de se debater e balançar o corpo sem parar, como se estivesse presa num pesadelo constante."
90100010-32 = "――Se retorcendo toda, sabe... num vaivém bizarro."
90100010-33 = "Se retorcendo...?"
90100010-34 = "É. Se retorcendo... igual um Kunekune."
90100010-39 = "Próximo Episódio: Entre a Raposa e o Sobrenatural"