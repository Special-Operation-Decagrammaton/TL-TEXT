[translation]#[Texto Final. - Filipe 13/07.]
90100010-1 = "Episódio 1; Kune, Kune, Kune"
90100010-7 = "Ei, aquele boato…… ficou sabendo?"
90100010-8 = "Hã? Qual deles?"
90100010-9 = "Sabe o calçadão na saída sul da estação Shirounagi?"
90100010-10 = "Aquele na beira do rio?#nNão tem nada pra bloquear o sol, no verão vira uma fornalha."
90100010-12 = "Esse mesmo.#nTambém não tem uma árvore, então quase ninguém passeia por lá……"
90100010-13 = "Dizem que ultimamente, ao meio-dia, tem alguém fazendo ginástica lá."
90100010-14 = "Ué, tem gente pra tudo, não tem?"
90100010-15 = "Não, é que……"
90100010-17 = "Parece que a pessoa usa um collant branco de corpo inteiro.#nDe longe, dizem que parece um \"espantalho branco\"."
90100010-18 = "Tá, é estranho, mas…… nem é tanto assim, vai."
90100010-19 = "Dizem que, se você tenta puxar assunto, ela some num piscar de olhos.#nQuando percebem, já tá longe, feito miragem. Quase ninguém viu o rosto dela."
90100010-20 = "Ok, isso é…… meio estranho, sim."
90100010-22 = "……Peraí. Se \"quase ninguém\" viu, é porque ALGUÉM viu o rosto?"
90100010-23 = "Aham. Uma menina do clube de atletismo que corria por perto viu."
90100010-24 = "Toda vez que chegava perto, a coisa se afastava#ne o espírito competitivo dela falou mais alto……#nDizem que perseguiu com tudo. E, quando viu o rosto de frente――"
90100010-28 = "――daquele dia em diante, ela nunca mais falou."
90100010-29 = "C-Como assim?!"
90100010-30 = "Depois de ver a cara do espantalho de pertinho#nela desmaiou ali mesmo."
90100010-31 = "E parece que…… desde esse dia, ela fica se balançando sem parar#ncomo se estivesse presa num pesadelo."
90100010-32 = "――Se contorcendo…… kune-kune, tipo assim."
90100010-33 = "Kunekune……?"
90100010-34 = "É. Kunekune."
90100010-39 = "Próximo Episódio;Entre a Super-Humana e a Raposa"