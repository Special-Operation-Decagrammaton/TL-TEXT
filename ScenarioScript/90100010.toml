[translation]
90100010-1 = "Episode 1;Kunekune"
90100010-7 = "Hey, have you heard... that rumor?"
90100010-8 = "Huh? Which one?"
90100010-9 = "You know the promenade by the south exit of Shirounagi Station?"
90100010-10 = "The one along the river? It's so hot in the summer because there's absolutely no shade."
90100010-12 = "Exactly. There aren't even any street trees, so not many people go for walks there, but..."
90100010-13 = "Lately, people say there's someone doing gymnastics there at noon."
90100010-14 = "Isn't that just someone doing their own thing?"
90100010-15 = "No, it's just that..."
90100010-17 = "Apparently, they're wearing a full-body white spandex suit.#nFrom a distance, people say they look like a 'white scarecrow'."
90100010-18 = "Well, I guess that's weird, but... is it really that big of a deal?"
90100010-19 = "They say that whenever someone tries to call out to them, they just vanish. #nThey disappear into the distance like a heat haze before you even realize it, so almost no one has seen their face."
90100010-20 = "Okay, that's... that's a bit strange."
90100010-22 = "...Wait? If 'almost no one' has seen them, does that mean someone actually has?"
90100010-23 = "Yeah. A girl from the track team who was running nearby saw them."
90100010-24 = "Since they kept moving further away every time she got close, it apparently ignited her competitive spirit...#nShe chased after them with everything she had. And when she finally saw their face head-on—"
90100010-28 = "—Ever since then, she hasn't been able to speak a word."
90100010-29 = "W-what do you mean!?"
90100010-30 = "Apparently, she fainted right after seeing the scarecrow's face up close."
90100010-31 = "And ever since that day, it's like she's trapped in a nightmare#nshe just keeps swaying her body back and forth."
90100010-32 = "—Like this... wriggling back and forth."
90100010-33 = "Wriggling...?"
90100010-34 = "Yeah, just wriggling."
90100010-39 = "Next Episode;Between Superhuman and Fox"