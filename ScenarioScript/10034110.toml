[translation]
10034110-1 = "7 dias antes: Se for fazer, faça direito"
10034110-4 = "Ei! Só falta uma semana, então vamos dar o nosso melhor!"
10034110-5 = "Com a intenção de sermos selecionadas, é claro!"
10034110-6 = "Pouco tempo resta até o dia da batalha decisiva. Essa situação..."
10034110-8 = "...é realmente rock."
10034110-9 = "Até quando você vai ficar dizendo isso?"
10034110-10 = "...Até o show acabar e eu tirar essa roupa, suponho."
10034110-11 = "Não é como se fosse uma voz de evento limitado de um jogo."
10034110-12 = "Digo, a gente não deveria estar praticando?"
10034110-13 = "V-vamos dar o nosso melhor! Se formos nós, talvez..."
10034110-14 = "...Não, vai dar tudo certo, com certeza!"
10034110-15 = "...Airi?"
10034110-16 = "Ah, bem... é que..."
10034110-17 = "...Eu pensei que, se for com todas vocês, eu consigo."
10034110-18 = "...Hehe."
10034110-22 = "É verdade... já que vamos fazer isso, vamos nos esforçar."
10034110-23 = "...Não acha que sua atitude mudou de repente?"
10034110-24 = "N-não é nada..."
10034110-25 = "...Vamos lá, começando agora!!"
10034110-26 = "Digo, por que você está dando as ordens?"
