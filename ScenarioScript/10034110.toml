[translation]
10034110-1 = "7日前：やるならきちんと"
10034110-4 = "ほら！あと1週間しかないし張り切っていくわよ！"
10034110-5 = "もちろん入選するつもりでね！"
10034110-6 = "決戦の日まで、残り時間わずか。この状況……"
10034110-8 = "……実にロック。"
10034110-9 = "それ、いつまで言ってるわけ？"
10034110-10 = "……ライブが終わって、この服を脱ぐまでかな。"
10034110-11 = "ゲームの期間限定ボイスじゃないんだから。"
10034110-12 = "っていうか、練習やらなくて良いの？"
10034110-13 = "が、頑張ろう！私たちなら、多分……"
10034110-14 = "……ううん、絶対に上手く行くから！"
10034110-15 = "……アイリ？"
10034110-16 = "あ、えっと……その……。"
10034110-17 = "……みんなとなら、できるかなって。"
10034110-18 = "……えへへ。"
10034110-22 = "そうだね……せっかくやるんだし、頑張ろう。"
10034110-23 = "……なんか急に態度が違くない？"
10034110-24 = "べ、別に……。"
10034110-25 = "……ほら、始めるよ！！"
10034110-26 = "っていうか、なんであんたが仕切ってるのよ。"
