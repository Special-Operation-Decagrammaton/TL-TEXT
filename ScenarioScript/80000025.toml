[translation]
80000025-1 = "髭のチョコレート"
80000025-2 = "レッドウィンター連邦学園・第一給食施設"
80000025-3 = "良く来たなカムラッド、待っていたぞ！"
80000025-4 = "今日呼んだのは他でもない。レッドウィンター連邦学園における偉大な成果を、カムラッドにも共有しようと思ってな！"
80000025-5 = "まあおいらが率いるレッドウィンター連邦学園は、もともと日々偉大な成果を挙げているんだが。はっはっはっはっは！"
80000025-6 = "[s] \"その偉大な成果っていうのは、ここに関係があるの？\""
80000025-7 = "うむ。良い質問だ、カムラッド！"
80000025-8 = "ここのみんなは今、レッドウィンター連邦学園の特製ミルクチョコ「チェリョンカ」を作っているのだ。"
80000025-9 = "「チェリョンカ」は、このチェリノ様の肖像画が刻まれたレッドウィンター連邦学園の特産品。このチョコレートを食べた生徒たちは「歯が溶けそうなくらい甘い」と口を揃えて賞賛する！"
80000025-10 = "おいらも、このチェリョンカは大好きでな。"
80000025-11 = "料理長、出来立てのチェリョンカをここに。"
80000025-17 = "……うむ、やはり美味しい。この強烈な甘みは良いものだ……。"
80000025-18 = "しかしこれだけ美味しいというのに、だ。レッドウィンター連邦学園以外のキヴォトスの生徒たちは、どうやらこの「チェリョンカ」の存在すら知らないらしい。"
80000025-19 = "一度でも味わえば、きっとやみつきになるであろうに。"
80000025-20 = "そして！聞いたところによるとどうやら「バレンタインデー」という、キヴォトスの生徒たちがお互いチョコレートを交換するイベントが開かれるらしい。"
80000025-21 = "だからこの機会に、「チェリョンカ」が偉大で素晴らしいチョコレートであることを広めようと思ってな。"
80000025-22 = "[s] \"なるほど。ところで、どうして私を……？\""
80000025-23 = "そりゃあもちろん、カムラッドはシャーレの先生だからな。"
80000025-24 = "カムラッドはこれまで様々な学校の生徒たちと、色々と交流をしてきたのだろう？ならば我々レッドウィンター連邦学園の偉大さを伝える「親善大使」のような存在としては、持って来いじゃないか！"
80000025-25 = "さあ、カムラッド。この「チェリョンカ」がどれだけ偉大なものなのか、キヴォトス全域に知らしめてきてくれ！"
80000025-26 = "[s] \"その前に、チョコレートの味見をさせてもらえる？\""
80000025-27 = "そ、そうか。確かにその偉大さは事前に味わっておかなくてはな。"
80000025-28 = "料理長、今すぐカムラッドに出来立てのチョコレートを。"
80000025-32 = "……何？材料が不足して、さっきおいらが食べた分で最後だと？"
80000025-33 = "うぅっ、生産システムも真っ当に動かせないとは……"
80000025-34 = "こうなったら、全員粛清だ！"
80000025-38 = "……ふむ。まあちょっとした騒ぎがあったが、気にするなカムラッド。"
80000025-39 = "[s] \"チョコレートの生産は大丈夫……？\""
80000025-40 = "も、もちろんだ。材料はさらに不足してしまったが、皆が同じ気持ちでしっかりと頑張れば、チョコレートくらい幾らでも用意はできるはず。"
80000025-41 = "おいらが導いている限り、レッドウィンター連邦学園に不可能は無い！"
80000025-45 = "と、とりあえず……"
80000025-50 = "このおいらの食べかけのチョコレートでも貰っておいてくれ。"
80000025-51 = "それをしっかりと味わい、その感想をすぐキヴォトス全域に伝えるように。"
80000025-52 = "しっかり頼んだぞ！"
80000025-54 = "（チェリノからもらったミルクチョコレートは異様に甘く、そしてかなり固かった……。）"
