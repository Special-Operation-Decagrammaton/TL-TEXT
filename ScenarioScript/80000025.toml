[translation]
80000025-1 = "Chocolate de Bigode"
80000025-2 = "Academia Federal Red Winter - Primeira Instalação de Refeições"
80000025-3 = "Que bom que veio, Camarada, eu estava te esperando!"
80000025-4 = "Não chamei você aqui por acaso. Quero compartilhar com você, Camarada, as grandes conquistas da Academia Federal Red Winter!"
80000025-5 = "Bem, a Academia Federal Red Winter que eu lidero já alcança grandes feitos diariamente, é claro. Hahahaha!"
80000025-6 = "[s] \"Essas grandes conquistas têm algo a ver com este lugar?\""
80000025-7 = "Hum. Boa pergunta, Camarada!"
80000025-8 = "Todos aqui estão produzindo o chocolate ao leite especial da Academia Federal Red Winter, o \"Cheryonka\"."
80000025-9 = "O \"Cheryonka\" é um produto especial da Academia Federal Red Winter, gravado com o retrato de Sua Excelência Cherino. As alunas que provam este chocolate dizem em uníssono: \"É tão doce que chega a derreter os dentes!\""
80000025-10 = "Eu também adoro este Cheryonka."
80000025-11 = "Chefe de cozinha, traga o Cheryonka recém-feito aqui."
80000025-17 = "……Hum, realmente delicioso. Esta doçura intensa é algo maravilhoso……."
80000025-18 = "Mas, apesar de ser tão delicioso, parece que as alunas de Kivotos, fora da Academia Federal Red Winter, nem sequer conhecem a existência deste \"Cheryonka\"."
80000025-19 = "Se provassem apenas uma vez, certamente ficariam viciadas."
80000025-20 = "E! Ouvi dizer que haverá um evento chamado \"Dia dos Namorados\", onde as alunas de Kivotos trocam chocolates entre si."
80000025-21 = "Por isso, quero aproveitar esta oportunidade para espalhar que o \"Cheryonka\" é um chocolate grandioso e maravilhoso."
80000025-22 = "[s] \"Entendo. Mas, por que eu……?\""
80000025-23 = "Ora, é claro que é porque você, Camarada, é o Sensei do Schale."
80000025-24 = "Você já interagiu com alunas de várias escolas, não é? Sendo assim, você é a pessoa perfeita para ser uma espécie de \"embaixador da boa vontade\" para transmitir a grandeza da nossa Academia Federal Red Winter!"
80000025-25 = "Vamos, Camarada. Vá e faça com que toda Kivotos saiba o quão grandioso é este \"Cheryonka\"!"
80000025-26 = "[s] \"Antes disso, posso provar o chocolate?\""
80000025-27 = "Ah, é verdade. De fato, você precisa provar essa grandeza antes de qualquer coisa."
80000025-28 = "Chefe de cozinha, dê ao Camarada o chocolate recém-feito agora mesmo."
80000025-32 = "……O quê? Os ingredientes acabaram e o que eu comi agora há pouco era o último?"
80000025-33 = "Ugh, não conseguir nem manter o sistema de produção funcionando……"
80000025-34 = "Se é assim, expurgo para todos!"
80000025-38 = "……Hum. Bem, houve um pequeno tumulto, mas não se preocupe, Camarada."
80000025-39 = "[s] \"A produção do chocolate está bem……?\""
80000025-40 = "C-claro que sim. Os ingredientes ficaram ainda mais escassos, mas se todos se esforçarem com o mesmo sentimento, seremos capazes de preparar quantos chocolates forem necessários."
80000025-41 = "Enquanto eu estiver liderando, não há nada impossível para a Academia Federal Red Winter!"
80000025-45 = "P-por enquanto……"
80000025-50 = "Fique com este chocolate que eu comecei a comer."
80000025-51 = "Saboreie-o bem e transmita suas impressões para toda Kivotos imediatamente."
80000025-52 = "Conto com você!"
80000025-54 = "(O chocolate ao leite que recebi de Cherino era estranhamente doce e bastante duro……)"
