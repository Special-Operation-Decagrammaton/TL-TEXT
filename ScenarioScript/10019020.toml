[translation]
10019020-11 = "防衛隊とパラシュート隊が合流。#n現在、最後の交戦中。"
10019020-21 = "ははっ！結構やるじゃねーか！#nお前、気に入った！"
10019020-22 = "ひゃっはははあぁーーっ！"
10019020-26 = "……あの二人、楽しそうだね。"
10019020-27 = "なかなか珍しい光景っすねぇ～"
10019020-28 = "う、うーん……。"
10019020-29 = "それにしても……"
10019020-36 = "敵の数が全然減りません。"
10019020-37 = "これでは埒があきませんね……"
10019020-42 = "……ご苦労、諸君！"
10019020-43 = "え、えっと……どちら様でしょうか？"
10019020-51 = "あれ、あの制服は……"
10019020-52 = "レッドウィンター……？"
10019020-59 = "おいらこそが、このレッドウィンター連邦学園の生徒会長であり、環境美化部部長兼、書記長兼、清掃部部長兼、風紀委員長兼、給食部部長の――"
10019020-60 = "偉大なるチェリノ様だ！！"
10019020-61 = "カムラッドの救援要請を受けて、諸君たちを助けに来たぞ！#nこの一大事に、おいらが居なくては皆が困るだろうからな！"
10019020-66 = "……。"
10019020-67 = "……。"
10019020-69 = "えっーと……愉快なアクセサリーっすね。"
10019020-70 = "あれってヒゲ？#nあはははっ！すっご～い！"
10019020-72 = "（何だあのヒゲ……か……カッケェ！？！？）"
10019020-73 = "……。"
10019020-74 = "……ええっと、応援部隊、なんですよね？"
10019020-81 = "そうだよ。レッドウィンターの応援部隊を確認。#nこれで互角に渡り合えそうだね。"
10019020-84 = "おら！仕切り直しだ、行くぞ！！"
10019020-85 = "きひひっ……"
10019020-87 = "諸君、戦列を整えろ！ "
10019020-88 = "これより、レッドウィンター大決戦を始める！"
