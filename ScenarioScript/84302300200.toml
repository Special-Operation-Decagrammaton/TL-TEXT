[translation]
84302300200-5 = "良いニュースと、悪いニュースがあるわ。"
84302300200-6 = "まずは悪いニュースから。どうやら想定よりはるかに動きが大きくなっている。"
84302300200-7 = "もはや……ミレニアムEXPOの破綻だけでは済まないわ。"
84302300200-8 = "もし、私たちだけで手に負えないと判断した場合、セミナーに連絡を入れるつもりよ。"
84302300200-9 = "良いニュースは、今ならまだこちらで対処できるということ。"
84302300200-10 = "次に彼女たちが問題を起こす場所を突き止めたわ。"
84302300200-11 = "今度は先手を打たせてもらいましょう。"
84302300200-12 = "場所は――ミレニアム・フィットネスセンター。"
