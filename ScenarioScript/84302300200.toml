[translation]
84302300200-5 = "Tenho uma notícia boa e uma notícia ruim."
84302300200-6 = "Começando pela ruim. Parece que a situação está se tornando muito maior do que o previsto."
84302300200-7 = "Não vai mais terminar apenas com o fracasso da Millennium EXPO."
84302300200-8 = "Se eu julgar que não conseguiremos lidar com isso sozinhas, pretendo entrar em contato com o Seminar."
84302300200-9 = "A boa notícia é que, por enquanto, ainda podemos resolver isso por conta própria."
84302300200-10 = "Descobri onde elas vão causar problemas da próxima vez."
84302300200-11 = "Desta vez, vamos dar o primeiro passo."
84302300200-12 = "O local é... o Millennium Fitness Center."
