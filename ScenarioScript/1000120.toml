[translation]
1000120-1 = "Vento Quente"
1000120-2 = "（Convidado por Eimi, vim investigar o deserto perto de Millennium）"
1000120-3 = "（……Investigamos por um tempo considerável, mas não encontramos nada em especial）"
1000120-8 = "……Hmm……."
1000120-13 = "Hmmmm……."
1000120-14 = "[s1] \"……Eimi?\"\n[s2] \"Você está bem? Não está cansada……?\""
1000120-17 = "……Ah."
1000120-18 = "Não, não se preocupe."
1000120-19 = "Esse tipo de coisa acontece com frequência."
1000120-25 = "Só de saber que não há nada de anormal aqui, já conseguimos coletar dados importantes."
1000120-26 = "Além disso, estou acostumada a ficar fora por longos períodos."
1000120-27 = "Estou um pouco mais preocupada com você, Sensei……."
1000120-28 = "Sensei, você está bem?#nParece um pouco cansado."
1000120-29 = "[s3] \"Hmm, é verdade……。\"\n[s4] \"Mais do que cansaço, acho que é o calor.\""
1000120-32 = "De fato, com esse tempo, não é para menos."
1000120-33 = "Não tem vento, nem sombra para descansar……."
1000120-34 = "Trouxemos bastante água, mas ainda assim, é uma situação onde é fácil se esgotar sob o sol escaldante."
1000120-35 = "Eu também estou acostumada com o calor, mas……#njá estou toda suada……."
1000120-36 = "Na verdade…… eu adoraria tirar a roupa para me refrescar agora mesmo, mas……."
1000120-40 = "……Eu sei. Se eu tentasse tirar, você me impediria, né?#nEu sei disso, afinal."
1000120-41 = "Por isso, desta vez eu me preparei adequadamente."
1000120-42 = "Eu disse, não disse? \"Preparei algo para momentos como este\"."
1000120-43 = "Bem……."
1000120-50 = "[ns5] \"Um mini ventilador?\"\n[ns6] \"É surpreendentemente fofo…….\""
1000120-54 = "……Não julgue pela aparência, Sensei."
1000120-55 = "Ele é muito mais eficiente do que parece."
1000120-56 = "Além de ser pequeno e fácil de carregar…… pedi para fazerem algumas modificações nele, então――"
1000120-57 = "Quando eu ligo o interruptor―― veja só."
1000120-62 = "[ns7] \"O-o quê? Que vento forte……!?\"\n[ns8] \"Isso não é só um pouquinho, não é!?\""
1000120-65 = "Para superar uma situação dessas, é necessária uma certa potência."
1000120-66 = "Como não temos o luxo de ficar expostos ao vento por muito tempo, é uma medida para baixar a temperatura corporal rapidamente. Com essa potência, dá para se refrescar logo, não dá?"
1000120-67 = "Bom, então……."
1000120-71 = "É por isso, Sensei, venha aqui."
1000120-75 = "Apesar da alta potência, é um ventilador pequeno, então o alcance do vento não é tão grande."
1000120-76 = "Para baixar a temperatura corporal sua e a minha de forma eficiente, precisamos ficar colados agora."
1000120-77 = "Ou seja, precisamos manter nossos corpos o mais próximos possível.#nEntende, né?"
1000120-81 = "……?#nSensei?"
1000120-82 = "Ficar parado aí só vai te deixar com mais calor, não vai?#nVenha logo."
1000120-83 = "Está hesitante……?"
1000120-84 = "Não é bom ficarmos tão próximos?#nPor quê?"
1000120-85 = "……Não entendo a lógica, Sensei.#nNão há motivo para se afastar de mim agora. Precisamos priorizar a eficiência."
1000120-86 = "……Hmm."
1000120-87 = "Eu disse para vir aqui."
1000120-92 = "……Sensei."
1000120-94 = "（…………）"
1000120-95 = "（Depois disso, fiquei colado na Eimi enquanto nos refrescávamos juntos com o vento do ventilador）"
1000120-96 = "（No entanto, o calor emanado pelo corpo da Eimi acabou transformando o vento do ventilador em um ar escaldante……）"
