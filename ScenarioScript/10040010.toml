[translation]
10040010-1 = "第1話;そして共犯者に"
10040010-2 = "ふっふっふっ。"
10040010-4 = "今年も残りわずか。"
10040010-5 = "嵐のような一年でした。#nいま余裕でいられるのが、嘘のように感じるほど。"
10040010-6 = "……しかし、私は生き残りました。"
10040010-7 = "そう、最後まで生き残ったのです。#n私の幸せを妬み、遮る者から逃げ抜きました。"
10040010-8 = "ふっ、そんな自分が誇らしい……。"
10040010-9 = "そろそろいいのではないでしょうか。#n激動の時間を生き抜いた自分自身に、ささやかなプレゼントを贈っても。"
10040010-14 = "……孤独に、祝杯をあげようじゃありませんか。"
10040010-15 = "この歪んだ世界に……自由を渇望する私の孤高の魂に。"
10040010-19 = "……\"[ruby=Cheers]乾杯[/ruby]\"。"
10040010-26 = "……あ。"
10040010-31 = "「あ」じゃないわよ……何よこれ？#n変な画像なんか映して……。"
10040010-32 = "綺麗ですね。#n夜景の画像でそれっぽい雰囲気でも出そうとしてたんです？"
10040010-34 = "分かってるならそっとしといてくれません！？#n先輩は空気も読めないんですか！？"
10040010-35 = "あんたにだけは言われたくないんだけど……。"
10040010-36 = "ひとり寂しく年末パーティーをしてただけじゃないですか！#nみじめな自分を慰めるために！"
10040010-37 = "なんで反省部屋でパーティーしてるのよ……。"
10040010-38 = "というか、みじめには見えないんだけど！？#n思いっきりくつろいでるじゃない！？"
10040010-39 = "ずいぶんな言いようですね！？#nそもそも誰のせいでこんなとこに閉じ込められてると！？"
10040010-40 = "懲りずにセミナーの予算に手を出したあんたの自業自得でしょ！！"
10040010-41 = "まったく、今度は何に使ったのよ！？"
10040010-42 = "予算はあんたのポケットマネーじゃないんだから、#n勝手に使っちゃダメって何度言えば……！！"
10040010-46 = "はぁ……。"
10040010-47 = "反省部屋に閉じ込めても無駄なのかしら……。"
10040010-49 = "……！？"
10040010-50 = "つまり、釈放ってことですか！？"
10040010-51 = "……はぁ？"
10040010-52 = "そんなわけないでしょ……。"
10040010-53 = "ええぇぇぇぇ！？#nでもさっき、無駄って言ったじゃないですか！？"
10040010-54 = "あああぁぁぁ～！！！#nひどい！ひどすぎますっ！"
10040010-55 = "……話すだけ無駄みたいね。"
10040010-57 = "まあコユキちゃんらしいと思いますよ。"
10040010-59 = "はぁ……。"
10040010-60 = "まあ……百歩譲って私のせいだとしましょう。"
10040010-61 = "百歩譲って……？"
10040010-62 = "今日が何の日かくらい分かりますよね？#n年末ですよ？今年最後の一日なんですよ？"
10040010-63 = "だというのに、こんな監獄みたいなとこでひとりぼっちなんて……！"
10040010-64 = "あまりにもあんまりじゃないですか？"
10040010-65 = "今日くらい……楽しんだっていいじゃないですかぁ……？"
10040010-70 = "だから反省しなさいって言ってるの――！！！"
10040010-76 = "反省を！"
10040010-80 = "しなさい！"
10040010-84 = "良いわね？"
10040010-88 = "ちゃんと！"
10040010-92 = "反省するのよ！！"
10040010-97 = "いたたたたっ！暴力反対！！"
10040010-98 = "まったく、もう……。"
10040010-99 = "分かったわ、要は退屈なのよね？"
10040010-105 = "……あれ？"
10040010-106 = "なにか考えが？"
10040010-108 = "コユキはとりあえず、そこで大人しくしてなさい。"
10040010-109 = "ノアは、その……#n悪いけど、今日って時間大丈夫？"
10040010-110 = "はい、私は大丈夫ですよ。"
10040010-111 = "ありがとう。じゃあ、ちょっと時間もらうわね。"
10040010-112 = "ちゃんと大人しくしてなさいよ！#nもし何かしでかしたら、今度こそただじゃおかないんだから！"
10040010-113 = "ただじゃおかないって、いったい何を……。"
10040010-117 = "……はっ！"
10040010-118 = "まさか、またノア先輩を使って……！"
10040010-119 = "何よいきなり……#nっていうか、ノアと私で態度違くない？"
10040010-120 = "もしかして、私なんて怖くないって言いたいわけ！？"
10040010-121 = "たしかにノアの記憶力はすごいけど……。"
10040010-122 = "いや、それもありますけど……もっとこう……。"
10040010-123 = "先輩も感じたことありません？"
10040010-124 = "独特の[ruby=あつ]圧[/ruby]……というか？"
10040010-125 = "言ってることと本音が違ってそうで、考えが読めない、的な？"
10040010-126 = "……感じません？"
10040010-130 = "…………。"
10040010-132 = "……？"
10040010-133 = "……………………。"
10040010-134 = "…………？？？"
10040010-135 = "……コユキちゃん。"
10040010-136 = "そういう話は、本人のいないところでしましょうね……？"
10040010-137 = "……あ。"
10040010-138 = "えっと、その……ノア先輩は、気にしないかなって……。"
10040010-142 = "……………………。"
10040010-147 = "……びゃっ！"
10040010-149 = "……さっきから何の話してるのよ？"
10040010-150 = "というか、何考えてるのか分かんないのはあんたの方でしょ！"
10040010-151 = "まあ、ノアのイタズラに思うところがないわけじゃないけど。#nあんたに比べたらたいしたことないわ。"
10040010-157 = "え、ええ……マジで言ってます？"
10040010-159 = "何よ、その顔……。"
10040010-160 = "あ、いえ……ユウカ先輩は、それで良いんじゃないですか？"
10040010-161 = "……！？"
10040010-168 = "な、なんでー！？#n今のは何がダメなんです！？"
10040010-169 = "なんかちょっと、許せなくて。"
10040010-170 = "それで、さっきの返事は？#nちゃんと大人しくできる？"
10040010-171 = "はいぃ……。"
10040010-172 = "……はぁ、なんか疲れちゃった。#n行きましょ、ノア。"
10040010-178 = "……………………。"
10040010-179 = "……な、何ですか先輩？"
10040010-180 = "ふふっ……。"
10040010-181 = "なんでもないです。"
10040010-191 = "…………。"
10040010-192 = "…………くくくっ。"
10040010-193 = "……行きましたね？"
10040010-198 = "くくくくっ……には、にはははは……！！"
10040010-200 = "（……その頃、シャーレでは）"
10040010-207 = "[ns1] \"はぁ……仕事が多すぎる。\"\n[ns2] \"大晦日なのに……。\""
10040010-211 = "年末調整が終わってないって……もう年末ですよ？"
10040010-212 = "しかも、こんなに残って……#nどうしてもっと早く相談してくれなかったんですか！"
10040010-213 = "せ～ん～せ～い～！！"
10040010-215 = "締め切りは来週だから大丈夫……？"
10040010-216 = "どこが大丈夫なんですか！"
10040010-217 = "これは[ruby=・   ・]年末[/ruby]調整ですよ！#n今年中に終わらせてください！"
10040010-218 = "……リタイア？#nもう、ゲームじゃないんですよ！"
10040010-219 = "言い訳してないで、手を動かしてください！"
10040010-220 = "あとで確認しますからね……！！"
10040010-221 = "……絶対ですよ！！"
10040010-223 = "（…………）"
10040010-224 = "（まあ、完全に自業自得だもんなぁ）"
10040010-229 = "[ns3] \"……こんな時間に誰だろう？\"\n[ns4] 電話を取る。"
10040010-234 = "……あ、つながった。"
10040010-235 = "やっほー先生！こんばんは！"
10040010-236 = "[s5] \"コユキ、どうかしたの？\"\n[s6] \"こんな時間に連絡だなんて、珍しいね。\""
10040010-239 = "もう～冷たいなぁ。私たちの仲じゃないですか？"
10040010-243 = "というか、今なにしてるんですか？#n仕事です？"
10040010-244 = "あ、いえ……やっぱそうですよね。"
10040010-245 = "……はい？"
10040010-246 = "……？"
10040010-247 = "からかうために連絡したのか、って？#nちょっと、ひどくないですか！？私を何だと思ってるんです！？"
10040010-248 = "ふっふっふ……。"
10040010-249 = "用ならちゃんとありますよ。"
10040010-250 = "実は、先生が好きそうなものを用意したんです。"
10040010-251 = "それは……。"
10040010-252 = "じゃかじゃかじゃかじゃか……じゃん！"
10040010-257 = "[ns7] \"こ、これは、ムシクイーンカードの！？\"\n[ns8] \"まさか、最新パック……！？\""
10040010-260 = "にはははは！先生なら分かりますよね！#n発売間もない最新パック、しかも初回生産分のレアモノです！"
10040010-261 = "今からこのパックを開封しちゃいま～す。#nどんなカードが入ってるか、楽しみですねぇ？"
10040010-262 = "……え？"
10040010-263 = "どこで手に入れたのかって？#nもちろん、ちゃんと買いましたよ……？"
10040010-264 = "そのお金はどこからって？#nそりゃあ……。"
10040010-268 = "……なんでそんなこと聞くんです？"
10040010-269 = "[s9] \"コユキ、また怒られるよ……。\"\n[s10] \"バレたらどうなるか、わかるでしょ……。\""
10040010-272 = "怒られる……？"
10040010-273 = "にはははは！面白いことを言いますね、先生！"
10040010-274 = "今日は今年の最後の日じゃないですか？#nだから怒られたとしても、それは来年の話！"
10040010-275 = "来年のことなんて、今はどうでもいいんです！#nホント先生は心配性なんですから！"
10040010-276 = "目の前のカードパックのほうが今は大事！そう思いません？"
10040010-277 = "[s11] \"なるほど、すごい考え方だ……。\"\n[s12] \"さすが、斬新な発想だね……。\""
10040010-280 = "とにかく！今からこのパックを開封しますからねっ！"
10040010-281 = "せっかく楽しい時間を共有しようと思ったのに、#n先生は薄情なことばっかり言うんですね！"
10040010-282 = "……どこにいるのか、って？"
10040010-283 = "いつも通り、反省部屋ですけど？"
10040010-287 = "[ns13] \"いつも通りって……。\"\n[ns14] \"反省部屋が本来の用途で使われる日はくるのかな……。\""
10040010-290 = "にははは！#nなんですか、その顔！もしかして感心しました？"
10040010-291 = "それで、いつ来るんです？#n夜は長いですし、先生が来るまで待っててあげますよ！"
10040010-292 = "……はい？"
10040010-293 = "忙しいから無理……？"
10040010-294 = "今日中に終わらせないと、明日ユウカ先輩に怒られる……？"
10040010-295 = "それって……。"
10040010-299 = "はぁ……。"
10040010-300 = "さっきの話、忘れちゃいました？"
10040010-301 = "怒られたとしてもそれは来年の話、って言いましたよね？"
10040010-302 = "ごちゃごちゃ考えて動かないなんて、先生らしくないですよ！"
10040010-303 = "[s15] \"私らしいって……？\"\n[s16] \"いや、いくらなんでもそれは……。\""
10040010-306 = "やれやれ、ここまで言ってもダメですか……。"
10040010-307 = "良いでしょう。#nならこっちにも考えがあります。先生を試させてもらいますよ。"
10040010-308 = "ふっふっふっ……。"
10040010-309 = "[s17] \"こ、コユキ？\"\n[s18] \"何をするつもり……？\""
10040010-315 = "さぁ始まりました、開封タイム！"
10040010-316 = "まずはひとパックめ！"
10040010-317 = "てりゃあっ～！！"
10040010-321 = "[ns] \"…………。\""
10040010-323 = "[ns19] \"……！！！！！！\"\n[ns20] \"実況するなんて……！！\""
10040010-327 = "う～ん、ハズレかぁ……。"
10040010-328 = "にははは！いや、残念ですよぉ。#nレアカードが出ると思ったんですけどねぇ。"
10040010-329 = "まあ、まだまだパックはいっぱいありますけどぉ？"
10040010-330 = "でも、私が一人で開け続けたら……。"
10040010-336 = "……すぐなくなっちゃいますねぇ！いいんですかぁ、先生？"
10040010-337 = "[s21] \"…………くっ！！\"\n[s22] \"負けるわけには……！！\""
10040010-340 = "いや～！先生と一緒にパックの開封式、したかったなぁ～？"
10040010-341 = "でも先生は立派な大人だから、カードなんかに興味ないんですよねぇ～？"
10040010-342 = "……じゃあ、私一人で楽しむしかないですよねぇ～？"
10040010-343 = "最新パックだから、見たことない性能のカードが入ってるかもしれませんねぇ……。"
10040010-344 = "今ならすぐにデッキを組めますし、#n新しい戦略を試せるかもしれないのになぁ～？"
10040010-345 = "そういえばこのパック、次の入荷まで一週間もかかるらしいですよぉ～？"
10040010-346 = "まぁ、新しくデッキを組むのは諦めて、#n人のデッキを真似るだけで先生が満足できるならぁ……。"
10040010-347 = "……私はぜーんぜん、構いませんけどねぇ～？"
10040010-348 = "なにせ、先生は……[ruby=・   ・   ・]お仕事[/ruby]で忙しそうですし？"
10040010-349 = "そうですよね？"
10040010-350 = "[s23] \"こ、このっ……！\"\n[s24] \"[ruby=くろさき]黒崎[/ruby]コユキ……！！\""
10040010-353 = "……ふっふっふっ。"
10040010-354 = "もう一度聞きましょう。"
10040010-355 = "どうです？#n今年の最後を、一緒にアツい夜で締めくくりません？"
10040010-359 = "……野暮は言いっこなしです。どうします？"
