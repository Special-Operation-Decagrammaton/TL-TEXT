[translation]
10040010-1 = "Episódio 1: E então, aos cúmplices"
10040010-2 = "Hehehe."
10040010-4 = "Já falta pouco para o fim do ano."
10040010-5 = "Foi um ano como uma tempestade. #nParece até mentira que eu consiga ficar tão tranquila agora."
10040010-6 = "……Mas eu sobrevivi."
10040010-7 = "Sim, sobrevivi até o fim. #nEscapei daqueles que invejavam minha felicidade e tentavam me impedir."
10040010-8 = "Heh, sinto orgulho de mim mesma por isso……."
10040010-9 = "Acho que já está na hora, não é? #nDe me dar um pequeno presente por ter sobrevivido a tempos tão turbulentos."
10040010-14 = "……Vamos brindar, solitariamente."
10040010-15 = "A este mundo distorcido…… e à minha alma solitária que anseia por liberdade."
10040010-19 = "……\"Brinde\"."
10040010-26 = "……Ah."
10040010-31 = "Não vem com esse \"ah\"…… O que é isso? #nPor que está projetando uma imagem estranha……."
10040010-32 = "É bonita, não é? #nVocê estava tentando criar um clima com essa imagem de vista noturna?"
10040010-34 = "Se você sabe, por que não me deixa em paz!? #nSênior, você não sabe ler o ambiente!?"
10040010-35 = "Eu não esperava ouvir isso logo de você……."
10040010-36 = "Eu só estava fazendo uma festa de fim de ano sozinha! #nPara consolar a mim mesma por ser tão miserável!"
10040010-37 = "Por que você está fazendo uma festa na sala de reflexão……."
10040010-38 = "Aliás, você não parece nada miserável!? #nVocê está super à vontade, não está!?"
10040010-39 = "Que jeito de falar, hein!? #nPara começo de conversa, por culpa de quem eu estou trancada aqui!?"
10040010-40 = "É culpa sua por ter mexido no orçamento do Seminar sem aprender a lição!!"
10040010-41 = "Francamente, no que você gastou dessa vez!?"
10040010-42 = "O orçamento não é o seu dinheiro pessoal, #nquantas vezes eu tenho que dizer para não usar sem permissão……!!"
10040010-46 = "Haa……."
10040010-47 = "Será que trancar você na sala de reflexão é inútil……."
10040010-49 = "……!?"
10040010-50 = "Quer dizer que eu estou liberada!?"
10040010-51 = "……Hã?"
10040010-52 = "Claro que não……."
10040010-53 = "Eeeeeh!? #nMas você acabou de dizer que era inútil, não disse!?"
10040010-54 = "Aaaaaah!!! #nQue cruel! Isso é cruel demais!"
10040010-55 = "……Parece que falar com você é perda de tempo."
10040010-57 = "Bem, acho que isso é bem a cara da Koyuki."
10040010-59 = "Haa……."
10040010-60 = "Bem…… vamos supor, por um momento, que a culpa seja minha."
10040010-61 = "Por um momento……?"
10040010-62 = "Você sabe que dia é hoje, né? #nÉ fim de ano, sabe? O último dia do ano!"
10040010-63 = "E mesmo assim, ficar sozinha neste lugar que parece uma prisão……!"
10040010-64 = "Isso não é demais?"
10040010-65 = "Pelo menos hoje…… eu não poderia me divertir um pouco……?"
10040010-70 = "É por isso que eu estou dizendo para você refletir――!!!"
10040010-76 = "Reflita!"
10040010-80 = "Agora!"
10040010-84 = "Entendeu?"
10040010-88 = "Direito!"
10040010-92 = "Reflita de verdade!!"
10040010-97 = "Ai ai ai! Não à violência!!"
10040010-98 = "Francamente, chega……."
10040010-99 = "Entendi, o problema é que você está entediada, né?"
10040010-105 = "……Ué?"
10040010-106 = "Tem alguma ideia?"
10040010-108 = "Koyuki, por enquanto, fique quieta aí."
10040010-109 = "Noah, é que... #nDesculpe, você tem um tempo hoje?"
10040010-110 = "Sim, eu estou livre."
10040010-111 = "Obrigada. Então, vou precisar de um pouco do seu tempo."
10040010-112 = "E trate de ficar quieta! #nSe fizer alguma besteira, desta vez eu não vou deixar passar!"
10040010-113 = "Não deixar passar... o que exatamente você quer dizer com isso...?"
10040010-117 = "...Ah!"
10040010-118 = "Será que ela vai usar a Noah-senpai de novo para...!"
10040010-119 = "Por que essa reação repentina... #ne aliás, por que você me trata de um jeito diferente da Noah?"
10040010-120 = "Por acaso está querendo dizer que não tem medo de mim!?"
10040010-121 = "É verdade que a memória da Noah é incrível, mas..."
10040010-122 = "Não, não é só isso... é mais como se..."
10040010-123 = "Você não sente isso também, Senpai?"
10040010-124 = "Uma certa pressão única... por assim dizer?"
10040010-125 = "Como se o que ela diz fosse diferente do que ela realmente pensa, e não desse para ler a mente dela?"
10040010-126 = "...Você não sente?"
10040010-130 = "............"
10040010-132 = "...?"
10040010-133 = "...................."
10040010-134 = "............???"
10040010-135 = "...Koyuki-chan."
10040010-136 = "Esse tipo de conversa deve ser feita quando a pessoa não está por perto, não acha...?"
10040010-137 = "...Ah."
10040010-138 = "Bem, é que... eu achei que a Noah-senpai não se importaria..."
10040010-142 = "...................."
10040010-147 = "...Iiiih!"
10040010-149 = "...Do que vocês estão falando desde agora?"
10040010-150 = "E aliás, a pessoa que ninguém consegue entender o que está pensando é você!"
10040010-151 = "Bom, não é como se eu não tivesse minhas ressalvas com as travessuras da Noah. #nMas comparado a você, não é nada demais."
10040010-157 = "E-ei... você está falando sério?"
10040010-159 = "O que é essa cara..."
10040010-160 = "Ah, não... Yuuka-senpai, não está tudo bem assim?"
10040010-161 = "...!?"
10040010-168 = "P-por que isso!? #nO que teve de errado no que eu disse agora!?"
10040010-169 = "É que, de alguma forma, eu não consigo perdoar."
10040010-170 = "Então, qual é a resposta de antes? #nVocê consegue ficar quieta?"
10040010-171 = "Sim..."
10040010-172 = "...Ai, estou exausta. #nVamos, Noah."
10040010-178 = "...................."
10040010-179 = "...Q-que foi, Senpai?"
10040010-180 = "Fufu..."
10040010-181 = "Não é nada."
10040010-191 = "............"
10040010-192 = "............Hehehe."
10040010-193 = "...Elas foram embora, né?"
10040010-198 = "Hehehe... ni-hahahaha...!!"
10040010-200 = "(...Nesse momento, no Schale)"
10040010-207 = "[ns1] \"Ai... tem trabalho demais.\"\n[ns2] \"E olha que é véspera de Ano Novo...\""
10040010-211 = "Dizer que o ajuste de fim de ano não terminou... mas já estamos no fim do ano, sabe?"
10040010-212 = "E ainda por cima, sobrou tudo isso...#nPor que você não me pediu ajuda mais cedo!"
10040010-213 = "Preeeeese-feeeessor!!"
10040010-215 = "O prazo é semana que vem, então está tudo bem...?"
10040010-216 = "Como assim está tudo bem?!"
10040010-217 = "Isso é um ajuste de fim de ano!#nTermine isso ainda este ano!"
10040010-218 = "...Desistir?#nOra, isso não é um jogo!"
10040010-219 = "Pare de dar desculpas e mãos à obra!"
10040010-220 = "Vou conferir depois, viu...!!"
10040010-221 = "...É uma promessa!!"
10040010-223 = "（…………）"
10040010-224 = "（Bom, é totalmente minha culpa, afinal）"
10040010-229 = "[ns3] \"...Quem será a essa hora?\"\n[ns4] Atende o telefone."
10040010-234 = "...Ah, atendeu."
10040010-235 = "Oii, Professor! Boa noite!"
10040010-236 = "[s5] \"Koyuki, aconteceu alguma coisa?\"\n[s6] \"É raro você ligar a essa hora.\""
10040010-239 = "Nossa, que frio... Não somos amigos?"
10040010-243 = "Aliás, o que você está fazendo agora?#nTrabalhando?"
10040010-244 = "Ah, não... É, imaginei que fosse."
10040010-245 = "...Sim?"
10040010-246 = "...?"
10040010-247 = "Se eu liguei só para te provocar?#nEi, isso não é um pouco cruel!? O que você pensa de mim!?"
10040010-248 = "Fufufu..."
10040010-249 = "Eu tenho um motivo, sim."
10040010-250 = "Na verdade, eu preparei algo que o Professor deve gostar."
10040010-251 = "É isso..."
10040010-252 = "Tã-tã-tã-tã... Tcharam!"
10040010-257 = "[ns7] \"I-isso é, um pacote de cartas Mushqueen!?\"\n[ns8] \"Não pode ser, o pacote mais recente...!?\""
10040010-260 = "Ni-hahaha! O Professor entende, né!#nÉ o pacote mais recente que acabou de sair, e ainda por cima, uma raridade da primeira tiragem!"
10040010-261 = "Vou abrir esse pacote agora mesmo.#nEstou ansiosa para ver quais cartas vêm dentro, não está?"
10040010-262 = "...Hã?"
10040010-263 = "Onde eu consegui?#nClaro que eu comprei, né...?"
10040010-264 = "De onde veio o dinheiro?#nOra, isso..."
10040010-268 = "...Por que você pergunta essas coisas?"
10040010-269 = "[s9] \"Koyuki, você vai levar bronca de novo...\"\n[s10] \"Você sabe o que acontece se descobrirem...\""
10040010-272 = "Levar bronca...?"
10040010-273 = "Ni-hahaha! Você diz cada coisa engraçada, Professor!"
10040010-274 = "Hoje não é o último dia do ano?#nEntão, mesmo que eu leve bronca, isso é problema do ano que vem!"
10040010-275 = "Não me importo com o ano que vem agora!#nComo você é preocupado, Professor!"
10040010-276 = "O pacote de cartas na minha frente é mais importante agora! Não acha?"
10040010-277 = "[s11] \"Entendo, que linha de raciocínio incrível...\"\n[s12] \"Como esperado, uma ideia inovadora...\""
10040010-280 = "Enfim! Vou abrir esse pacote agora!"
10040010-281 = "Eu tentei compartilhar um momento divertido, mas#no Professor só diz coisas insensíveis!"
10040010-282 = "...Onde eu estou?"
10040010-283 = "Como sempre, na sala de reflexão, ué?"
10040010-287 = "[ns13] \"Como sempre...\"\n[ns14] \"Será que um dia a sala de reflexão será usada para o seu propósito original...\""
10040010-290 = "Ni-haha!#nO que é essa cara? Por acaso ficou impressionado?"
10040010-291 = "Então, quando você vem?#nA noite é uma criança, vou ficar te esperando!"
10040010-292 = "...Sim?"
10040010-293 = "Não pode porque está ocupado...?"
10040010-294 = "Se não terminar hoje, vai levar bronca da Yuuka amanhã...?"
10040010-295 = "Isso é..."
10040010-299 = "Ah..."
10040010-300 = "Você esqueceu do que falamos agora pouco?"
10040010-301 = "Eu disse que, mesmo que a gente leve uma bronca, isso é problema para o ano que vem, não disse?"
10040010-302 = "Ficar pensando demais e não agir não combina nada com você, Sensei!"
10040010-303 = "[s15] \"Não combina comigo...?\"\n[s16] \"Não, de jeito nenhum, isso é...\""
10040010-306 = "Puxa vida, nem depois de falar tudo isso você se convence..."
10040010-307 = "Tudo bem. #nEntão eu tenho um plano. Vou ter que testar você, Sensei."
10040010-308 = "Hehehe..."
10040010-309 = "[s17] \"K-Koyuki?\"\n[s18] \"O que você pretende fazer...?\""
10040010-315 = "E agora, começou: hora de abrir os pacotes!"
10040010-316 = "Primeiro pacote!"
10040010-317 = "Toma essa!!"
10040010-321 = "[ns] \"............\""
10040010-323 = "[ns19] \"......!!!!!!\"\n[ns20] \"Você está narrando tudo...!!\""
10040010-327 = "Hmm, não veio nada de bom..."
10040010-328 = "Ni-hahaha! Ah, que pena. #nEu achei que viria uma carta rara."
10040010-329 = "Bem, ainda tem muitos pacotes sobrando, sabe?"
10040010-330 = "Mas, se eu continuar abrindo sozinha..."
10040010-336 = "...eles vão acabar rapidinho! Tem certeza disso, Sensei?"
10040010-337 = "[s21] \"............Droga!!\"\n[s22] \"Não posso perder...!!\""
10040010-340 = "Ah! Eu queria tanto fazer uma cerimônia de abertura de pacotes com você, Sensei!"
10040010-341 = "Mas como você é um adulto exemplar, não tem interesse em cartas, né?"
10040010-342 = "...Então, só me resta aproveitar sozinha, não é?"
10040010-343 = "Como é o pacote mais recente, talvez contenha cartas com habilidades que nunca vimos antes..."
10040010-344 = "Se fosse agora, poderíamos montar um deck e #ntentar estratégias novas, que pena..."
10040010-345 = "Falando nisso, parece que esse pacote vai demorar uma semana inteira para chegar de novo, sabia?"
10040010-346 = "Bem, se você se contenta em desistir de montar um deck novo e #napenas copiar o deck dos outros..."
10040010-347 = "...por mim, tudo bem, não me importo nem um pouco!"
10040010-348 = "Afinal, você parece estar ocupado com o seu trabalho, não é?"
10040010-349 = "Não é verdade?"
10040010-350 = "[s23] \"Sua...!\"\n[s24] \"Kurosaki Koyuki...!!\""
10040010-353 = "...Hehehe."
10040010-354 = "Vou perguntar mais uma vez."
10040010-355 = "E então? #nQue tal encerrarmos o final deste ano com uma noite intensa juntos?"
10040010-359 = "...Sem perguntas chatas. O que vai ser?"
