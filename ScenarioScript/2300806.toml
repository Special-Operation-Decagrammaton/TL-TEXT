[translation]
2300806-1 = "私の望み"
2300806-2 = "（マリーに指定された場所は、トリニティのとある射撃場だった）"
2300806-3 = "（広い空間でほとんど音も無く、下手をすれば大聖堂や図書館よりも静まり返っていた）"
2300806-4 = "……お越しいただいてありがとうございます、先生。"
2300806-9 = "急なご連絡になってしまって申し訳ありません。"
2300806-10 = "その、本当に大したことではなかったのですが……。"
2300806-11 = "[s1] \"気にしないで。ところで、ここは……。\"\n[s2] \"マリーが射撃場……何だかちょっと見慣れないかも？\""
2300806-12 = "あ、ここはですね、その……。"
2300806-13 = "あ、ここはですね、その……。"
2300806-14 = "特にお話したい内容が射撃や銃に関係しているわけではないのですが……ただ、静かな場所ですので。"
2300806-15 = "ご覧の通り普段は誰もおらず、結構静かでして。お祈りにも集中しやすい場所なんです。"
2300806-16 = "タイミングによっては大聖堂や、懺悔室の中よりも静まっているかもしれません。"
2300806-17 = "ですので時々、何かに悩んだときやお祈りをする時などに、ここに来ることがあるんです。"
2300806-18 = "も、もしかして変、でしょうか……？"
2300806-19 = "[s3] \"ううん、そんなことないと思うよ。\"\n[s4] \"そう聞いてみると納得したし、何となく似合ってるかも。\""
2300806-20 = "あ、ありがとうございます。"
2300806-21 = "あ、ありがとうございます。"
2300806-22 = "実は私も、元々この場所は全然知らなくって……。"
2300806-23 = "ただ、時々「他のシスターの方々も訪れる場所」とは聞いていたのですが……。"
2300806-28 = "ですが実際にこうして来てみると、この静かな空気は……。"
2300806-29 = "心を落ち着かせたい時や、自らのことを反省する時などにぴったりの空間なんです。"
2300806-30 = "それ以外にも例えば、自らを励ましたい時や、雑念を無くしたい時……"
2300806-31 = "雑念……"
2300806-35 = "[ns] \"……マリー？\""
2300806-36 = "そ、その……。"
2300806-37 = "実は、以前お休みを頂いた時にも、ずっと自分なりに悩んだりしていたのですが……。"
2300806-38 = "他のシスターにも聞いてみたところ、「誰にでも時折そういうことはある」と言われまして……。"
2300806-39 = "それでも私は、悩んでしまって……これで良いのかな、と。自己管理ができていないのでは、と……。"
2300806-40 = "ですが、それに対しても「奉仕する気持ちは大切だけれど、自分に対して奉仕してあげる気持ちも時には大切だ」、とのことでして……。"
2300806-41 = "それで、考えてみたんです。"
2300806-42 = "今日も先ほどまで、ここでお祈りをしながら……それで、辿り着きました。"
2300806-43 = "ですがそれは自分でも、あまりに予想外だったと言いますか、どうして良いのか迷うと言いますか……。"
2300806-45 = "……に。"
2300806-46 = "[s5] \"……に？\"\n[s6] \"……？\""
2300806-47 = "先生と、一緒に……。"
2300806-48 = "先生と、一緒に……。"
2300806-49 = "その……時々、本当に時々で良いので……。"
2300806-50 = "あの時のように、私と、その……。"
2300806-51 = "一緒に……。"
2300806-52 = "一緒の、時間を……過ごしたいな、と……その、特別何かをしなくても、私は大丈夫ですし……。"
2300806-53 = "以前来ていただいた時……私、何と言えば良いのでしょうか……本当に、嬉しかったんです。"
2300806-54 = "も、もちろん。自分でも分かってはいるのです。こういった感情は、シスターらしくないものだと。"
2300806-55 = "面倒を見てほしい、付き合ってほしい、すぐそばにいたい……。"
2300806-56 = "こういった気持ちは、誰かのために行動するべきシスターとしての道とは、下手をしたら相反するようなものにも思えます。"
2300806-57 = "分かっては、いるのですが……。"
2300806-58 = "……？"
2300806-59 = "喜んで……？"
2300806-60 = "そ、そんなあっさり……！"
2300806-61 = "良いの、ですか……？"
2300806-62 = "[s7] \"もちろん。それに、生徒と先生なんだから。\"\n[s8] \"24時間、ずっとシスターじゃなくても良いんじゃないかな？\""
2300806-63 = "……！"
2300806-64 = "……！"
2300806-65 = "先生……。"
2300806-69 = "……ふふっ。少し、考え過ぎていたのかもしれません。"
2300806-70 = "はい、それでは……立派なシスターになりたいという気持ちも、もちろん今まで通り持ちつつ……。"
2300806-71 = "これから私も、ひとりの生徒として。あらためて先生と接していきたいと思います。"
2300806-72 = "思えば、先生に対しては「話す」ということを……当の私が忘れてしまっていましたね。いつも、「ぜひ話してください」と何度も口にしていたのに。"
2300806-73 = "こうしてお話をして気持ちを共有できただけで、すごく楽になりました。"
2300806-79 = "……本当に、ありがとうございます。"
2300806-80 = "それではこれからも、"
2300806-81 = "よろしくお願いします。先生。"
2300806-85 = "……甘えたがりの私のことも、許してくださいね？"
2300806-87 = "（その後マリーと一緒にお互いお祈りをしてから、シャーレへと戻った）"
