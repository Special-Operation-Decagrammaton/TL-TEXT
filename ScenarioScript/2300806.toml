[translation]
2300806-1 = "Meu desejo"
2300806-2 = "（O local indicado por Mari era um dos campos de tiro de Trinity.）"
2300806-3 = "（Era um espaço amplo, quase sem som algum, e, se bobear, mais silencioso que a catedral ou a biblioteca.）"
2300806-4 = "……Obrigada por vir, Sensei."
2300806-9 = "Peço desculpas por ter entrado em contato tão de repente."
2300806-10 = "Bem, na verdade não é nada muito importante, mas……"
2300806-11 = "[s1] \"Não se preocupe. Aliás, por que aqui……?\"\n[s2] \"Mari em um campo de tiro…… Acho que não estou acostumado a ver isso.\""
2300806-12 = "Ah, é que aqui, bem……"
2300806-13 = "Ah, é que aqui, bem……"
2300806-14 = "Não é que o assunto que quero tratar tenha a ver com tiro ou armas…… é só que este é um lugar silencioso."
2300806-15 = "Como pode ver, geralmente não há ninguém aqui, então é bem calmo. É um lugar onde é fácil se concentrar nas orações."
2300806-16 = "Dependendo do momento, pode ser até mais silencioso do que a catedral ou o confessionário."
2300806-17 = "Por isso, às vezes, quando estou preocupada com algo ou preciso rezar, eu venho aqui."
2300806-18 = "E-está sendo estranho, por acaso……?"
2300806-19 = "[s3] \"Não, acho que não é estranho.\"\n[s4] \"Agora que você explicou, faz sentido, e até que combina com você.\""
2300806-20 = "Ah, muito obrigada."
2300806-21 = "Ah, muito obrigada."
2300806-22 = "Na verdade, eu mesma não conhecia este lugar originalmente……"
2300806-23 = "Só tinha ouvido dizer que era um lugar que \"outras irmãs também visitam\", mas……"
2300806-28 = "Mas, ao vir aqui pessoalmente, este ar silencioso……"
2300806-29 = "É o espaço perfeito para quando quero acalmar meu coração ou refletir sobre mim mesma."
2300806-30 = "Além disso, por exemplo, quando quero me encorajar ou quando quero eliminar pensamentos mundanos……"
2300806-31 = "Pensamentos mundanos……"
2300806-35 = "[ns] \"……Mari?\""
2300806-36 = "B-bem……"
2300806-37 = "Na verdade, da última vez que tirei uma folga, passei o tempo todo preocupada comigo mesma……"
2300806-38 = "Quando perguntei a outras irmãs, elas me disseram que \"todo mundo passa por isso de vez em quando\"……"
2300806-39 = "Ainda assim, eu continuava preocupada…… pensando se estava tudo bem, ou se eu não estava conseguindo cuidar de mim mesma……"
2300806-40 = "Mas, sobre isso, me disseram que \"embora o sentimento de servir aos outros seja importante, às vezes também é importante servir a si mesma\"……"
2300806-41 = "Então, eu pensei sobre isso."
2300806-42 = "Hoje, até pouco tempo atrás, enquanto rezava aqui…… foi quando eu cheguei a uma conclusão."
2300806-43 = "Mas, para mim mesma, foi algo tão inesperado que não sei bem como agir, ou melhor, como dizer……"
2300806-45 = "……com."
2300806-46 = "[s5] \"……Com?\"\n[s6] \"……?\""
2300806-47 = "Com o Sensei……"
2300806-48 = "Com o Sensei……"
2300806-49 = "Bem…… de vez em quando, só de vez em quando, se puder……"
2300806-50 = "Como daquela vez, eu gostaria de, bem……"
2300806-51 = "Juntos……"
2300806-52 = "Passar um tempo…… juntos…… bem, não precisamos fazer nada especial, eu ficaria bem só com isso……"
2300806-53 = "Da última vez que você veio…… eu, como posso dizer…… fiquei muito feliz."
2300806-54 = "C-claro. Eu mesma sei disso. Que sentimentos como este não são apropriados para uma irmã."
2300806-55 = "Querer que cuidem de mim, querer companhia, querer estar sempre ao seu lado……"
2300806-56 = "Sentimentos assim, se formos analisar, podem até parecer contraditórios ao caminho de uma irmã que deve agir em prol dos outros."
2300806-57 = "Eu sei disso, mas……"
2300806-58 = "……?"
2300806-59 = "Com prazer……?"
2300806-60 = "V-você aceitou tão facilmente……!"
2300806-61 = "Tudo bem, mesmo……?"
2300806-62 = "[s7] \"Claro. Além disso, somos aluno e sensei.\"\n[s8] \"Não precisa ser uma irmã 24 horas por dia, precisa?\""
2300806-63 = "……！"
2300806-64 = "……！"
2300806-65 = "Sensei……。"
2300806-69 = "……hehe. Talvez eu estivesse pensando demais nisso."
2300806-70 = "Sim, então…… mantendo o desejo de me tornar uma irmã exemplar como sempre tive……."
2300806-71 = "De agora em diante, eu também gostaria de interagir com você, Sensei, como uma aluna comum."
2300806-72 = "Pensando bem, eu mesma me esqueci de \"conversar\" com você, Sensei. Mesmo tendo dito tantas vezes: \"por favor, fale comigo\"."

2300806-73 = "Só de poder conversar assim e compartilhar meus sentimentos, me sinto muito mais leve."
2300806-79 = "……Muito obrigada, de verdade."
2300806-80 = "Então, daqui para frente,"
2300806-81 = "conto com você. Sensei."
2300806-85 = "……Por favor, me perdoe por ser tão carente, está bem?"
2300806-87 = "（Depois disso, rezei junto com a Mari e então voltei para o Schale）"
