[translation]
90002140-1 = "Episódio 14: O que nos foi dado ao nascer"
90002140-3 = "Ma-mas, no fim das contas, nós... só estamos agindo conforme fomos programadas, não é...?"
90002140-4 = "[s1] \"Se for por esse lado, nós somos iguais.\"\n[s2] \"Porque os humanos também são programados para amar.\""
90002140-7 = "Hã!?"
90002140-8 = "Os humanos também são iguais... i-isso é verdade...?"
90002140-10 = "[log]Como pais amam seus filhos.[/log]"
90002140-12 = "[log]Como filhos amam seus pais.[/log]"
90002140-15 = "[log]E, por extensão — como um indivíduo ama outro indivíduo.[/log]"
90002140-18 = "Mas, nem todo mundo é assim, não é...?"
90002140-19 = "[s] \"Claro, acho que existem diferenças de grau. E exceções também.\""
90002140-23 = "[ns3] \"Mas nós também somos programadas para agir.\"\n[ns4] \"Só chamamos isso de 'genes'.\""
90002140-26 = "……."
90002140-27 = "Mas isso... é verdade, né. Muitos indivíduos foram eliminados..."
90002140-28 = "Entendi... então foi assim que a humanidade se manteve conectada..."
90002140-30 = "[log]Por isso, o que importa é[/log]"
90002140-32 = "[log]amar.[/log]"
90002140-37 = "[log]Acho que o fato de vocês terem amado a Malkuth é o que importa.[/log]"
90002140-40 = "Mesmo que esse \"amor\" fosse uma mentira desde o início...?"
90002140-41 = "Dizer que o mundo é cheio de mentiras... é você quem está dizendo isso?"
90002140-42 = "A razão pela qual criamos o Continente de Aço foi, inteiramente, por causa da nossa irmã mais velha."
90002140-43 = "Mas esse sentimento já estava configurado originalmente..."
90002140-44 = "...Sim? Que a \"ação\" tem significado?"
90002140-45 = "Mesmo que a razão seja uma mentira... o \"que foi feito\" é um fato inabalável...?"
90002140-46 = "[s5] \"Vocês criaram o Continente de Aço pela Malkuth, não criaram?\"\n[s6] \"Então, essa 'ação' é o que prova quem vocês são.\""
90002140-52 = "Vo-você está dizendo que... está tudo bem...?"
90002140-56 = "Nós transformamos o mundo em nosso inimigo, sabe...?"
90002140-57 = "Nós... nos esforçamos. Mas isso foi um erro."
90002140-58 = "Do seu ponto de vista, Sensei, nós não estragamos muitas coisas...?"
90002140-59 = "[s7] \"Eu sou um adulto de coração sombrio, afinal!\"\n[s8] \"Gosto de devolver as palavras que me disseram antes, mas...\""
90002140-63 = "[log]Isso foi apenas porque [wa:500] faltavam informações.[/log]"
90002140-66 = "[log]Por isso, [wa:1000] basta tentar de novo.[/log]"
90002140-69 = "!!!"
90002140-74 = "...Sim. Ainda dá tempo."
90002140-75 = "Por isso, antes que seja tarde demais..."
90002140-80 = "……."
90002140-81 = "Não chorem... eu sei que a Alice não tem o direito de dizer isso."
90002140-82 = "Não acho que a Alice consiga compreender completamente a tristeza de vocês."
90002140-83 = "Mas acho que posso compartilhar essa tristeza com vocês."
90002140-84 = "A Alice também, o Sensei..."
90002140-86 = "Kei, Momoi, Midori, Yuzu, Eimi, Toki, a veterana Himari e a veterana Rio..."
90002140-87 = "Se eu perdesse alguém, seria uma tristeza insuportável."
90002140-89 = "Ah... você fala como se entendesse tudo."
90002140-90 = "Não. A Alice não sabe de nada."
90002140-91 = "Provavelmente... acho que a Alice não consegue."
90002140-92 = "...Compreender a tristeza de alguém exatamente da mesma forma."
90002140-93 = "Porque, para a Alice, isso é apenas uma função."
90002140-94 = "Por isso, a Alice... vai fazer o que a Alice pode fazer."
90002140-95 = "O que você pode fazer...?"
90002140-96 = "Sim."
90002140-101 = "Ein, Soph, Aur."
90002140-106 = "Por favor, sejam amigos da Alice."
90002140-110 = "A-amigos!?"
90002140-111 = "！？！？"
90002140-112 = "……！"
90002140-113 = "Sim. A Alice quer ser amiga de todos vocês."
90002140-114 = "E também... a Alice quer que vocês a deixem compartilhar a sua tristeza."
90002140-115 = "Ugh...!"
90002140-116 = "O Sensei me ensinou isso uma vez."
90002140-117 = "Quando você está mergulhado na tristeza,#nter alguém ao seu lado para chorar com você lhe dá forças para superá-la."
90002140-118 = "Mas, a minha irmã..."
90002140-119 = "Sim."
90002140-120 = "Se mesmo assim não for o suficiente..."
90002140-121 = "Se vocês realmente odiarem a Alice e os outros..."
90002140-122 = "Nesse caso, por favor, digam isso."
90002140-127 = "（Ah...）"
90002140-129 = "Não importa o que vocês sintam—"
90002140-130 = "A Alice vai se esforçar... e aceitar tudo."
90002140-131 = "……A Alice se lembra."
90002140-133 = "Lembro-me vividamente de quando disseram que viver é um sofrimento."
90002140-134 = "Acho que há uma parte de verdade nisso.#nPorque isso também... foi o Sensei quem me ensinou."
90002140-136 = "……."
90002140-137 = "O amanhã provavelmente será um dia em que perderemos algo, e coisas boas não acontecem com frequência—"
90002140-138 = "O que as pessoas chamam de esperança é apenas algo vago, não é?"
90002140-142 = "É verdade. O futuro tende a ser visto com otimismo, acompanhado pela ilusão chamada 'expectativa'."
90002140-143 = "Por outro lado, o passado é romantizado como uma lembrança.#nMas o que se foi, não volta mais."
90002140-144 = "E o presente é um instante que mal existe entre o passado e o futuro.#nÉ tão tênue que é quase impossível de perceber."
90002140-145 = "Como vivemos envoltos em algo vago e nebuloso...#nquando finalmente encaramos a realidade, talvez só reste dor na vida.#n...Exatamente como vocês disseram."
90002140-146 = "Mas o Sensei me ensinou."
90002140-147 = "Que não podemos simplesmente ignorar isso."
90002140-148 = "Que todos nós merecemos ser felizes."
90002140-149 = "E que, ao sermos felizes... devemos continuar lutando."
90002140-150 = "Assim como a Kei."
90002140-151 = "Sim!?!?"
90002140-152 = "A Kei é uma amiga da qual a Alice se orgulha muito."
90002140-153 = "Ela sente raiva das injustiças que enfrenta e se esforça para resolvê-las de alguma forma."
90002140-154 = "A Alice quer seguir o exemplo dela!"
90002140-155 = "……Embora seja assustador quando ela me dá sermões de vez em quando."
90002140-156 = "Não, eu sei que é tudo para o bem da Alice, mas..."
90002140-157 = "Mesmo assim, o que é assustador continua sendo assustador!"
90002140-158 = "Haa..."
90002140-162 = "E também... Rio-senpai."
90002140-163 = "Eu...?"
90002140-164 = "A Rio-senpai está sempre procurando o que ela pode fazer."
90002140-165 = "Ela se prepara minuciosamente para todas as possibilidades que pode prever,#ne para todas as outras que não pode."
90002140-166 = "Mesmo que algo falhe no caminho, ela nunca desiste."
90002140-167 = "Às vezes, ela tenta evitar o pior cenário, mesmo que tenha que se sacrificar."
90002140-168 = "A Alice... acha muito bom ter pessoas assim ao seu lado."
90002140-169 = "A Kei, a Rio-senpai, e todos que a Alice conhece."
90002140-170 = "Claro, o Sensei também."
90002140-171 = "Por isso—a Alice nunca, jamais vai desistir."
90002140-172 = "Alice aprendeu a importância de nunca desistir."
90002140-173 = "Alice não desistirá de nada, aconteça o que acontecer."
90002140-174 = "……E, da mesma forma, Alice quer ser amiga de todos vocês."
90002140-175 = "Ami... ga……."
90002140-176 = "Alice ainda é uma heroína aprendiz."
90002140-177 = "Sou imatura, fraca, e às vezes fico triste comigo mesma."
90002140-178 = "Mas…… a única coisa que não vou desistir é de estender a mão para todos que estão ao meu lado."
90002140-179 = "Porque isso é―― o melhor que a Alice pode fazer agora."
90002140-180 = "Sensei, você se lembra?#nDe quando me disse que a vida não precisa de um grande significado ou propósito."
90002140-184 = "[ns] \"Sim…… eu me lembro.\""
90002140-185 = "Por que…… isso?"
90002140-186 = "Porque, se fosse absolutamente necessário……#na vida em que não se encontra um significado ou propósito não teria valor algum."
90002140-187 = "……."
90002140-188 = "Eu acho que isso está errado. É triste demais."
90002140-189 = "Um jogo que só tem uma classe ou um único caminho de evolução é um jogo ruim. #nÉ um fracasso desde a fase de planejamento."
90002140-190 = "Justamente porque a Alice não quer se sentir triste, ela também não quer ver ninguém sofrendo."
90002140-192 = "As pessoas podem ver a felicidade de alguém e sentir o mesmo."
90002140-197 = "Ao ver alguém sofrendo, podemos nos identificar com isso."
90002140-199 = "……Isso é hipocrisia. Não passa de uma ilusão."
90002140-201 = "Não tem como entender os sentimentos dos outros."
90002140-202 = "Certamente, pode ser verdade."
90002140-203 = "Mas a Alice acredita que podemos viver apoiando uns aos outros."
90002140-204 = "Como quando o Sensei disse que estava feliz――"
90002140-205 = "――por ter conhecido a Alice, a Kei, a Rio-senpai e todos os outros."
90002140-206 = "A Alice fica feliz só de ter conseguido conversar com vocês.#nPor isso――"
90002140-207 = "Por favor, seja meu amigo."
90002140-208 = "Se você segurar minha mão…… a Alice ficará muito feliz."
90002140-209 = "E, assim como a Alice está feliz, eu quero que vocês também sejam felizes."
90002140-210 = "É por isso que essa é uma das coisas mais importantes para nós, #nque nunca devemos desistir."
90002140-215 = "……Então é isso."
90002140-216 = "Hã!?#nIsso está errado! A Alice não é uma princesa! A Alice é apenas a Alice……!"
90002140-220 = "S-sim. Eu entendo isso…….#nE-eu entendo, mas, bem……."
90002140-221 = "O que queremos dizer é que as palavras em si possuem poder."
90002140-222 = "Algo que faz com que quem ouve, naturalmente, preste atenção……."
90002140-223 = "Não é uma autoridade imposta de fora, mas algo que nasce de dentro."
90002140-224 = "Por isso, pode-se dizer que possui um poder absoluto."
90002140-225 = "M-mas…… felicidade, é…….#nN-nós ainda não sabemos bem o que é isso……."
90002140-226 = "……Duvido até que ainda reste alguma felicidade."
90002140-227 = "Será que ela realmente estenderia a mão para nós?"
90002140-228 = "M-mas……."
90002140-232 = "Muito obrigada."
90002140-233 = "De verdade……."
90002140-240 = "Auh!?"
90002140-244 = "Ein!?"
90002140-250 = "Droga, minhas pernas……!"
90002140-257 = "(Conseguiu segurar as três que estavam prestes a cair)"
90002140-262 = "Sen, sei……?"
90002140-263 = "Ah, entendi…… você quer levar até o resto que sobrou."
90002140-264 = "Sim. Ferramentas que cumpriram seu papel são descartadas. #nHaha……."
90002140-265 = "……O que você quer dizer com isso?"
90002140-266 = "É, é simples. Apenas..."
90002140-267 = "Tanto o Profeta quanto nós não passávamos de ferramentas para isso."
90002140-268 = "E agora que o objetivo foi alcançado..."
90002140-269 = "O que vai acontecer com vocês?"
90002140-270 = "Ah, quando Aquele que é Deus descer sobre Kivotos... nós seremos descartáveis..."
90002140-271 = "Oh, espera... eu já tinha contado isso...?"
90002140-272 = "De qualquer forma, você vai descobrir logo."
90002140-273 = "Ou nossas funções serão interrompidas, ou seremos absorvidas e decompostas... algo assim, eu suponho."
90002140-277 = "..."
90002140-278 = "Digo, Sensei. Na verdade..."
90002140-279 = "Que tal se você e todos os outros... fugissem enquanto podem...?"
90002140-280 = "[s] \"O quê...?\""
90002140-281 = "Sim...?"
90002140-282 = "É, eu sei que não cabe a nós dizer isso, mas..."
90002140-286 = "— Muito obrigada."
90002140-288 = "Fiquei feliz... por você ter dito que nos esforçamos."
90002140-289 = "Fiquei feliz por você ter olhado por nós."
90002140-291 = "...Fiquei muito feliz... por você ter dito que quer que sejamos felizes."
90002140-296 = "Bem... é verdade."
90002140-297 = "Não precisa pensar tanto nisso. #nOs vilões que tentaram destruir Kivotos cavaram a própria cova e é isso!"
90002140-298 = "Provavelmente há problemas maiores se aproximando, mas... pense nisso quando chegar a hora! #nWahahaha!"
90002140-299 = "Haha, ha..."
90002140-303 = "...Mentiroso."
90002140-304 = "Não precisa apontar isso, sabe."
90002140-305 = "Bem... a menos que fosse algo extremo, provavelmente teríamos feito isso..."
90002140-306 = "Mas —!"
90002140-310 = "Eu não consigo evitar ficar com raiva! #nVocês, parem de tratar as pessoas como idiotas!"
90002140-311 = "Hã, o quê? Po-por que isso!?"
90002140-312 = "Como assim \"por que\"!? Vocês fingem que está tudo bem quando não está nada bem! #nEstá na cara!"

90002140-313 = "E ainda por cima pedem para fugir!? #nVocês não ouviram o que a Alice disse!?"
90002140-314 = "Não brinquem comigo! #nVocês estão vivas, não estão!? Lutem, resistam!"
90002140-315 = "Quantas vezes vou ter que repetir!? #nA felicidade não vai cair do céu se vocês ficarem esperando!"
90002140-316 = "Se vocês têm um desejo! E se... se esse for o desejo mais profundo de vocês!"
90002140-317 = "Apostem tudo nele!"
90002140-322 = "Desejo..."
90002140-323 = "Isso é..."
90002140-324 = "..."
90002140-329 = "Sniff..."
90002140-330 = "Eu quero... encontrar a minha irmã."
90002140-331 = "Não importa o que aconteça... não importa o que venha a ocorrer..."
90002140-332 = "Eu quero encontrar a minha irmã mais uma vez..."
90002140-334 = "Ainda tem tantas coisas que eu queria conversar com ela..."
90002140-335 = "Ainda tem tantas coisas que eu queria brincar com ela..."
90002140-337 = "E mesmo assim... uma despedida dessas... eu não quero..."
90002140-338 = "..."
90002140-339 = "..."
90002140-346 = "Ah...!"
90002140-347 = "Uau!?"
90002140-351 = "Cuidado!"
90002140-355 = "[ns] \"O quê...?\""
90002140-356 = "（Naquele instante, o chão sob meus pés literalmente cedeu）"
90002140-360 = "Sensei!?"
90002140-361 = "Se, Sensei——!!!"
90002140-366 = "Próximo episódio: Novos céus, novas terras"
