[translation]
10017090-1 = "Epílogo; O Conto de Natal é"
10017090-5 = "Oh... eu realmente não esperava que terminasse assim..."
10017090-6 = "Hehe, verdade. Nunca sabemos como as coisas vão acabar, não é?"
10017090-7 = "Você se lembra? Quando eu disse para você passar aqui mais tarde, se pudesse."
10017090-8 = "Sim, claro. Naquela época, eu pensei que seria apenas um \"se der certo\"..."
10017090-9 = "Houve um momento em que pensei que tudo estava perdido, mas fico feliz que tenha dado certo. Afinal, a justiça sempre vence."
10017090-10 = "Eu senti que terminaria assim desde o começo!"
10017090-11 = "Ora, é mesmo?"
10017090-12 = "Ah, desculpe por dizer algo tão presunçoso!?"
10017090-13 = "Não, de forma alguma. Na verdade, é uma atitude que eu gostaria de aprender."
10017090-14 = "E-eu fico feliz em ouvir isso, mas é um pouco vergonhoso...!"
10017090-15 = "[ns] \"Como representante, Mine, gostaria de dizer algumas palavras?\""
10017090-20 = "Eu...? Mesmo agora, sinto que é um pouco atrevido da minha parte estar aqui..."
10017090-21 = "Assumir a responsabilidade, é...? Hmmm..."
10017090-22 = "Bem, eu causei muitas confusões hoje, mas... os membros do Esquadrão de Socorro cumpriram seus deveres este ano."
10017090-23 = "Quanto a isso, acho que cada um de vocês pode se orgulhar."
10017090-24 = "Eu também continuarei me aprimorando daqui para frente."
10017090-29 = "Será que isso vai dar certo..."
10017090-30 = "Bem, vamos torcer para que as coisas melhorem."
10017090-35 = "O mundo do chá é profundo, não sei o que fazer com isso..."
10017090-36 = "Se não for um incômodo, posso dar uma palavrinha? Eu entendo um pouco sobre o assunto."
10017090-37 = "M-Mine, comandante!? É uma honra...!"
10017090-38 = "É verdade, a comandante entende muito dessas coisas, não é?"
10017090-39 = "Afinal, para um tratamento melhor, é necessário ter diversos tipos de conhecimento!"
10017090-44 = "Seria bom se esse esforço fosse aplicado em outras áreas também..."
10017090-45 = "...É verdade."
10017090-50 = "Ah, é verdade! Estas são luvas e gorros que fizemos... vocês gostariam de aceitar?"
10017090-51 = "S-sério, podemos mesmo...?"
10017090-52 = "Sim, fizemos bastante. Por favor, aceitem, afinal é Natal."
10017090-53 = "Muito obrigada... Graças a vocês, parece que será um Natal maravilhoso."
10017090-54 = "Hehehe. Feliz Natal a todos!"
10017090-55 = "Que todos vocês tenham um ótimo Natal."
10017090-56 = "Mais uma vez, obrigado pelo trabalho duro durante este ano. Feliz Natal."
10017090-58 = "Feliz Natal!"
10017090-59 = "O Feliz Natal da Catedral ~O Presente do Esquadrão de Socorro~"
