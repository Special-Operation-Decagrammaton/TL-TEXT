[translation]
10017090-1 = "エピローグ;クリスマスキャロルは"
10017090-5 = "おぉ……本当にこうなるとは……。"
10017090-6 = "ふふっ、確かに。#n何がどうなるか、分からないものですね。"
10017090-7 = "覚えてますか？#n良ければ後で寄ってください、とお伝えしたこと。"
10017090-8 = "はい、もちろんです。あの時は、「もし行ければ」くらいに思っていたのですが……。"
10017090-9 = "一時はどうなることかと思いましたが、良かったです。#nやはり正義は勝つものですね。"
10017090-10 = "私は最初からこうなる気がしていました！"
10017090-11 = "あら、そうだったんですか？"
10017090-12 = "あっ、生意気なこと言ってすみません！？"
10017090-13 = "いえ、そんなことは。むしろその姿勢は、見習いたいくらいです。"
10017090-14 = "そ、そう言ってもらえると嬉しいですが、恥ずかしいですね……！"
10017090-15 = "[ns] \"代表として、ミネから一言どう？\""
10017090-20 = "私、ですか……今でもここに居ること自体、厚かましいのではと思うものの……。"
10017090-21 = "責任は取る、ですか……？うぅーん……"
10017090-22 = "その、今日は色んな事を起こしてしまいましたが……#n救護騎士団各位は、今年もそれぞれ責務を果たしてくれました。"
10017090-23 = "その点については、それぞれが誇りを持っても良いと思います。"
10017090-24 = "私の方も、今後さらに自分自身を磨いていきます。"
10017090-29 = "それで大丈夫か……。"
10017090-30 = "まあ、改善されることを願いましょう。"
10017090-35 = "紅茶の世界は深いですね、これは一体どうしたら……。"
10017090-36 = "もしお節介でなければ、少しお話をよろしいでしょうか？#n多少は分かる方でして。"
10017090-37 = "ミ、ミネ団長！？#n光栄です……！"
10017090-38 = "確かに、団長はそういうのもお詳しいですもんね。"
10017090-39 = "より良い治療のためには、様々な知識が必要ですからね！"
10017090-44 = "その努力が、もう少し別方面にも発揮されてくれると良いのですが……。"
10017090-45 = "……そうだな。"
10017090-50 = "あ、そうだ！#nこれ私たちが作った手袋と帽子なんですが……よろしければいかがですか？"
10017090-51 = "い、良いんですか……？"
10017090-52 = "はい、多めに作りましたので。#nぜひ受け取ってください、せっかくのクリスマスですし。"
10017090-53 = "ありがとうございます……#nおかげで、素敵なクリスマスになりそうです。"
10017090-54 = "えへへっ。#nみなさんメリークリスマス、です！"
10017090-55 = "皆さんにとって、良いクリスマスになりますように。"
10017090-56 = "あらためて一年間、お疲れ様でした。#nメリークリスマス。"
10017090-58 = "メリークリスマス！"
10017090-59 = "聖堂のメリークリスマス 〜救護騎士団の贈り物〜"
