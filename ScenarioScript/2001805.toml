[translation]
2001805-1 = "Unexploded Ordnance"
2001805-2 = "（モエはシャーレの当番だったため、オフィスを訪ねてきた）"
2001805-3 = "こんにちは、先生。今日の当番もよろしくね。"
2001805-4 = "くひひ……当番の仕事を口実に、先生のパソコンにどんなファイルが保存されているのか見れると思うと、今からもう興奮するよ……。"
2001805-5 = "[s1] \"そんなに面白いものはないと思うけど……。\"\n[s2] \"モエが来ると聞いて、データを前もって別のところに移しておいたんだ。\""
2001805-6 = "ちぇっ……余計なことを。"
2001805-7 = "ちぇっ……余計なことを。"
2001805-8 = "まさか……この前のこと、まだ気にしているの？"
2001805-9 = "そりゃあ緊急用リセットボタンを勝手に押したのは、私だけど――"
2001805-14 = "正直に言って、先生。"
2001805-15 = "半日かけて作業したデータが全部消えたとき、先生も感じたよね？"
2001805-16 = "長い努力の産物が、一瞬で水の泡になる瞬間のカタルシス……。"
2001805-17 = "あのゾクゾクする快感を……！#nはぁ、はぁ……。"
2001805-18 = "[s] \"ゾッとはしたけど……。\""
2001805-19 = "あーあ……データが全部移されちゃってるなんて、残念。"
2001805-20 = "それで、今日はどんな仕事をするの？#n前と同じように報告書の整理？"
2001805-21 = "……え？今日は何もしなくてもいいの？"
2001805-22 = "しばらくシャーレの仕事でオフィスを空けるから、#nその間、何も触らないでじっと席に座ってお留守番してほしい……？"
2001805-23 = "え、別にいいけど……本当にそれだけでいいの？"
2001805-24 = "SRTのオペレーターがわざわざ手伝いに来たっていうのに、番犬を任せるなんて。"
2001805-25 = "先生のお願いだし、もうちょっと難しいものでも聞けるけど？"
2001805-26 = "……それか本当に、犬みたいに首輪でもつけて待ってよっか？"
2001805-27 = "[s3] \"そんな趣味はないよ……！？\"\n[s4] \"「何も触らずに」待っててね。\""
2001805-28 = "はいはーい！それが命令なら。"
2001805-29 = "はいはーい！それが命令なら。"
2001805-30 = "じゃあオフィスは私に任せて、先生は用事を済ませてきて。#n私は命令通り、何もしないで待ってるから。"
2001805-34 = "……どうしてそんな顔で見るわけ？#n本当に何も触らないってば。"
2001805-36 = "（……怪しい笑みを浮かべるモエを後にして、建物を出た）"
2001805-39 = "……なーんて言ったけど。#nシャーレのオフィスを調べられる絶好のチャンスを逃すわけないっしょ！"
2001805-40 = "シャーレが保有する新型兵器や、秘密兵器を発見できるかもしれないし……。"
2001805-41 = "もしかしたら、先生の恥ずかしい秘密も見つけられるかも……くひひ……。"
2001805-42 = "それじゃ、まずは隅から見てみますか！"
2001805-48 = "……ん？この赤いボタン何？"
2001805-49 = "ガンラックのそばにある、赤くて大きなボタン……。"
2001805-50 = "どう見ても怪しい……何に使うんだろ？"
2001805-54 = "ここはシャーレで、先生の執務室。"
2001805-55 = "連邦生徒会でも触れることは難しい、超法規的な捜査権を持つ先生の机の、#nすぐ手の届くところにあるボタン……。"
2001805-56 = "きっと……ものすごく非常事態の時にだけ使えるボタンなんだろうな。"
2001805-57 = "たとえばキヴォトスの全生徒を招集するボタンとか……。"
2001805-58 = "シャーレの地下室に眠っている古代兵器を起動させられるだとか……。"
2001805-59 = "それかサンクトゥムタワーが丸々打ち上げられる、みたいな……？"
2001805-60 = "いずれにせよ、私じゃ責任とれないほどの、とんでもない結果を招くはず……。"
2001805-61 = "ああ……妄想してたら全身が火照って……もう、我慢できない……！"
2001805-62 = "はぁ、はぁ……もう無理だよ。#n本当に押しちゃう……押しちゃうよ……！"
2001805-63 = "……えいっ！"
2001805-68 = "なっ、なに！？天井から水が！？"
2001805-69 = "あっ、つ、冷たい！"
2001805-73 = "[ns] \"ただいま――\""
2001805-75 = "[ns] \"うわっ！？なにこれ！？どうしたの？\""
2001805-76 = "私が聞きたいってば！"
2001805-77 = "先生、このボタンなに？"
2001805-78 = "[s5] \"モエ、もしかして……。\"\n[s6] \"緊急用シャワーのボタンを触ったの？\""
2001805-79 = "……緊急用シャワーの、ボタン？"
2001805-80 = "……緊急用シャワーの、ボタン？"
2001805-81 = "緊急用シャワーって……あの、危ない薬物をかぶった時に洗い流すヤツだよね？"
2001805-82 = "[s7] \"シャーレには色んな生徒が来るからね。\"\n[s8] \"緊急時にすぐ対応できるよう、赤いボタンにしたんだ。\""
2001805-87 = "[ns9] \"にしてもモエ……何も触らないでってお願いしたのに……。\"\n[ns10] \"がっかりだよ……。\""
2001805-88 = "私こそがっかりだよ！"
2001805-89 = "私こそがっかりだよ！"
2001805-93 = "私がそのボタンを押すまで、どれだけ期待してたかわかる？"
2001805-94 = "きっと私なんかじゃ責任がとれないような……とんでもない破滅が起こるって期待してたのに……。"
2001805-95 = "少なくともミサイルくらいは出ると思ってたのに！"
2001805-96 = "なのに……ビショビショになった程度のハプニングで終わるなんて……。"
2001805-97 = "私のがっかりに対する責任取ってよ！"
2001805-99 = "（その後、開き直っているモエを宥めるのにしばらく苦労した……）"
