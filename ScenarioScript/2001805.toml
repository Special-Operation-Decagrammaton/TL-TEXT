[translation]
2001805-1 = "Artilharia Não Explodida"
2001805-2 = "（Moe veio visitar o escritório, já que era sua vez de ficar de plantão no Schale）"
2001805-3 = "Olá, Sensei. Conto com você no plantão de hoje também."
2001805-4 = "Kuhihi... Só de pensar que, com a desculpa do trabalho de plantão, vou poder ver que tipo de arquivos estão salvos no seu computador, já fico empolgada..."
2001805-5 = "[s1] \"Não acho que tenha nada tão interessante assim...\"\n[s2] \"Como soube que você viria, transferi os dados para outro lugar com antecedência.\""
2001805-6 = "Ah, qual é... Que desnecessário."
2001805-7 = "Ah, qual é... Que desnecessário."
2001805-8 = "Não me diga que... você ainda está pensando naquilo?"
2001805-9 = "Tudo bem, fui eu quem apertou o botão de reset de emergência sem permissão, mas—"
2001805-14 = "Seja sincero, Sensei."
2001805-15 = "Quando os dados em que você trabalhou por meio dia sumiram, você também sentiu, não sentiu?"
2001805-16 = "A catarse do momento em que o fruto de um longo esforço se transforma em água num piscar de olhos..."
2001805-17 = "Aquele prazer arrepiante...! Ah, ah..."
2001805-18 = "[s] \"Eu fiquei arrepiado, mas...\""
2001805-19 = "Ah, puxa... Que pena que todos os dados foram movidos."
2001805-20 = "Então, que tipo de trabalho vamos fazer hoje?#nOrganizar relatórios como da última vez?"
2001805-21 = "...Hã? Hoje não preciso fazer nada?"
2001805-22 = "Você vai sair do escritório por um tempo para cuidar de assuntos do Schale e quer que eu fique sentada na cadeira, sem tocar em nada, cuidando do lugar...?"
2001805-23 = "Ah, tudo bem, mas... é só isso mesmo?"
2001805-24 = "Uma operadora da SRT veio aqui de propósito para ajudar, e você me deixa como um cão de guarda."
2001805-25 = "É um pedido seu, Sensei, mas eu poderia aceitar algo um pouco mais difícil, sabia?"
2001805-26 = "...Ou então, quer que eu coloque uma coleira e espere como um cachorro de verdade?"
2001805-27 = "[s3] \"Eu não tenho esse tipo de fetiche...!?\"\n[s4] \"Fique esperando 'sem tocar em nada'.\""
2001805-28 = "Sim, sim! Se é uma ordem."
2001805-29 = "Sim, sim! Se é uma ordem."
2001805-30 = "Então pode deixar o escritório comigo e ir resolver seus assuntos.#nComo ordenou, vou ficar aqui sem fazer nada."
2001805-34 = "...Por que está me olhando com essa cara?#nEu disse que não vou tocar em nada."
2001805-36 = "（Deixando Moe para trás com um sorriso suspeito, saí do prédio）"
2001805-39 = "...Foi o que eu disse, mas...#nNão tem como eu perder a chance perfeita de investigar o escritório do Schale!"
2001805-40 = "Talvez eu encontre armas novas ou armas secretas que o Schale possui..."
2001805-41 = "E quem sabe, talvez eu até encontre algum segredo embaraçoso seu, Sensei... kuhihi..."
2001805-42 = "Então, vamos começar dando uma olhada em cada canto!"
2001805-48 = "...Hm? O que é esse botão vermelho?"
2001805-49 = "Perto do suporte de armas, um botão vermelho e grande..."
2001805-50 = "Parece suspeito de qualquer jeito... Para que será que serve?"
2001805-54 = "Aqui é o Schale, a sala de trabalho do Sensei."
2001805-55 = "Um botão que fica ao alcance da mão na mesa do Sensei, que possui autoridade investigativa extrajudicial que nem mesmo o Conselho Estudantil Geral consegue tocar..."
2001805-56 = "Com certeza... deve ser um botão que só pode ser usado em situações de emergência extrema."
2001805-57 = "Tipo um botão para convocar todos os estudantes de Kivotos..."
2001805-58 = "Ou para ativar armas antigas que estão adormecidas no porão do Schale..."
2001805-59 = "Ou talvez para lançar a Torre Sanctum inteira, quem sabe...?"
2001805-60 = "De qualquer forma, deve causar um resultado absurdo que eu não conseguiria assumir a responsabilidade..."
2001805-61 = "Ah... só de imaginar, meu corpo todo esquenta... não consigo mais aguentar...!"
2001805-62 = "Ah, ah... não dá mais.#nEu vou apertar... eu vou apertar mesmo...!"
2001805-63 = "...Já foi!"
2001805-68 = "O quê, o quê!? Água caindo do teto!?"
2001805-69 = "Ah, tá, tá gelada!"
2001805-73 = "[ns] \"Cheguei—\""
2001805-75 = "[ns] \"Ué!? O que é isso!? O que aconteceu?\""
2001805-76 = "É isso que eu queria saber!"
2001805-77 = "Sensei, o que é esse botão?"
2001805-78 = "[s5] \"Moe, por acaso...\"\n[s6] \"Você tocou no botão do chuveiro de emergência?\""
2001805-79 = "......O botão do chuveiro de emergência?"
2001805-80 = "......O botão do chuveiro de emergência?"
2001805-81 = "Chuveiro de emergência... aquele que serve para se lavar caso entre em contato com substâncias perigosas, né?"
2001805-82 = "[s7] \"Vários alunos vêm ao Schale, sabe.\"\n[s8] \"Coloquei um botão vermelho para que possamos reagir rapidamente em emergências.\""
2001805-87 = "[ns9] \"Mesmo assim, Moe... eu pedi para você não tocar em nada...\"\n[ns10] \"Estou decepcionado...\""
2001805-88 = "Eu é que estou decepcionada!"
2001805-89 = "Eu é que estou decepcionada!"
2001805-93 = "Você tem ideia de quanta expectativa eu criei até apertar aquele botão?"
2001805-94 = "Eu esperava que algo terrível e catastrófico acontecesse, algo que nem alguém como eu conseguiria resolver..."
2001805-95 = "Pelo menos eu achei que um míssil fosse sair dali!"
2001805-96 = "Mas, no fim... tudo terminou com um incidente de ficar encharcada..."
2001805-97 = "Você vai ter que se responsabilizar pela minha decepção!"
2001805-99 = "(Depois disso, tive um bom trabalho para acalmar a Moe, que não demonstrava nenhum arrependimento...)"
