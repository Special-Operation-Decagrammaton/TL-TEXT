[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
2001805-1 = "Bomba Não Detonada" 
2001805-2 = "（A Moe veio ao escritório porque hoje é o dia dela atuar como ajudante de turno da Schale.）" 
2001805-3 = "Oi, Sensei. Vamos trabalhar duro hoje também." 
2001805-4 = "Kuhihi…… Só de pensar no que eu vou poder fuçar no seu computador usando o dever de ajudante como desculpa, eu já tô super animada……" 
2001805-5 = "[s1] \"Acho que não tem nada de muito interessante no meu PC, mas……\"\n[s2] \"Como eu já sabia que a Moe vinha hoje, eu movi os dados importantes para outro lugar.\"" 
2001805-6 = "Tch…… Pra que fazer isso." 
2001805-7 = "Tch…… Pra que fazer isso." 
2001805-8 = "Não me diga que…… ainda tá bravo pelo que aconteceu da última vez?" 
2001805-9 = "Quer dizer, a culpa de ter apertado o botão de Reset de Emergência sem permissão foi minha mesmo, mas――" 
2001805-14 = "Sendo sincera com você, Sensei." 
2001805-15 = "Quando os dados que demoraram metade de um dia pra fazer sumiram de vez, você também sentiu, não sentiu?" 
2001805-16 = "A catarse do momento em que o fruto de um longo e árduo esforço vira poeira num estalar de dedos……" 
2001805-17 = "Aquele prazer alucinante……!\nHaa, haa……" 
2001805-18 = "[s] \"A única coisa que eu senti foi um desespero mortal, mas……\"" 
2001805-19 = "Aah~…… Que pena que os dados sumiram daqui." 
2001805-20 = "E aí, qual vai ser o trabalho de hoje?\nVamos organizar relatórios que nem da outra vez?" 
2001805-21 = "……Hã? Não precisamos fazer nada hoje?" 
2001805-22 = "Você vai ter que sair do escritório para resolver uns assuntos da Schale,\nentão quer que eu fique quietinha na minha cadeira tomando conta do lugar sem tocar em nada……?" 
2001805-23 = "Ah, por mim beleza…… Mas é sério que só isso basta?" 
2001805-24 = "Uma operadora incrível da SRT vem até aqui pra ajudar e você bota ela pra atuar como um cão de guarda." 
2001805-25 = "Como é um pedido seu, Sensei, eu até quebro o galho se quiser que eu faça coisas mais difíceis, sabia?" 
2001805-26 = "……Ou quer que eu coloque uma coleira e espere como um cachorrinho?" 
2001805-27 = "[s3] \"Eu não curto esse tipo de brincadeira……!?\"\n[s4] \"Apenas 'não toque em nada' e fique me esperando.\"" 
2001805-28 = "Sim, senhooor! Já que isso é uma ordem." 
2001805-29 = "Sim, senhooor! Já que isso é uma ordem." 
2001805-30 = "Então deixa o escritório comigo e vai lá cuidar das suas coisas.\nComo você ordenou, eu não vou tocar num fio de cabelo de nada daqui." 
2001805-34 = "……Por que essa cara de desconfiado?\nEu juro que não vou encostar em nada." 
2001805-36 = "（……Deixei o prédio enquanto observava o sorriso muito suspeito no rosto da Moe.）" 
2001805-39 = "……Eu disse isso, mas.\nComo se eu fosse perder a chance de ouro de bisbilhotar o escritório da Schale inteiro!" 
2001805-40 = "Quem sabe eu não acho as plantas de uma arma secreta ou de um armamento super moderno que a Schale tem guardado a sete chaves……" 
2001805-41 = "Ou melhor ainda, quem sabe eu não descubro os segredos mais sujos e constrangedores do Sensei…… kuhihi……" 
2001805-42 = "Então, vamos começar vasculhando os cantos primeiro!" 
2001805-48 = "……Hm? Que botão vermelho é esse?" 
2001805-49 = "Um botão grande e vermelho bem do ladinho do estande de armas……" 
2001805-50 = "Isso grita 'suspense' por todos os lados…… Pra que será que serve?" 
2001805-54 = "Esta aqui é a Schale, e este é o escritório do Sensei." 
2001805-55 = "E esse é um botão bem acessível na mesa do Sensei, que possui autoridade investigativa extrajudicial que até mesmo o Conselho Estudantil Geral hesita em tocar……" 
2001805-56 = "Com certeza…… deve ser um botão ativado apenas em casos de emergência absurda." 
2001805-57 = "Tipo um botão de convocação geral de todas as alunas de Kivotos……" 
2001805-58 = "Ou para acionar uma arma ancestral que repousa nas catacumbas da Schale……" 
2001805-59 = "Ou talvez disparar a Torre do Sanctum inteira para o espaço……?" 
2001805-60 = "Seja lá o que for, deve desencadear algo tão monumental que eu jamais seria capaz de assumir a responsabilidade……" 
2001805-61 = "Aah…… Só de imaginar meu corpo já tá pegando fogo…… Não aguento mais……!" 
2001805-62 = "Haa, haa…… Foda-se.\nEu vou apertar…… Eu vou apertar saporra……!" 
2001805-63 = "……Toma!" 
2001805-68 = "O, o quê!? Água do teto!?" 
2001805-69 = "Ah, q-que gelada!" 
2001805-73 = "[ns] \"Estou de vo――\"" 
2001805-75 = "[ns] \"Uwaaah!? Que bagunça é essa!? O que aconteceu?\"" 
2001805-76 = "Eu que te pergunto!" 
2001805-77 = "Sensei, que droga de botão é esse?" 
2001805-78 = "[s5] \"Moe, por um acaso você……\"\n[s6] \"Tocou no botão do chuveiro de emergência?\"" 
2001805-79 = "……Botão do, chuveiro de emergência?" 
2001805-80 = "……Botão do, chuveiro de emergência?" 
2001805-81 = "Chuveiro de emergência…… Você diz aquele negócio pra lavar o corpo caso a gente seja coberta por substâncias químicas perigosas?" 
2001805-82 = "[s7] \"Sim, porque várias alunas diferentes vêm à Schale o tempo todo.\"\n[s8] \"Fizemos ser um botão vermelho para garantir um fácil acesso em emergências.\"" 
2001805-87 = "[ns9] \"Mas sério, Moe…… Eu pedi pra você não tocar em nada……\"\n[ns10] \"Estou decepcionado……\"" 
2001805-88 = "EU QUE TÔ DECEPCIONADA AQUI!" 
2001805-89 = "EU QUE TÔ DECEPCIONADA AQUI!" 
2001805-93 = "Você tem noção da expectativa que eu criei antes de apertar esse botão?" 
2001805-94 = "Eu tava jurando que ele ia desencadear o verdadeiro apocalipse que eu nunca seria capaz de pagar……" 
2001805-95 = "Achei que pelo menos um míssil ou algo do tipo ia sair!" 
2001805-96 = "E agora…… tudo termina num banho frio no meio da sala……" 
2001805-97 = "Você vai ter que se responsabilizar pela minha decepção extrema, ouviu!?" 
2001805-99 = "（Depois disso, levei um bom tempo para tentar acalmar uma Moe encharcada e revoltada com a situação……）" 