[translation]
10042070-1 = "Episódio 7; LAST GIRL STANDING"
10042070-4 = "Juri!?"
10042070-9 = "Não faça isso, Chinatsu.#nVocê vai acabar sendo envolvida."
10042070-10 = "Ma-mas...!"
10042070-11 = "Ngh! Nnngh!!! Nnnnngh!"
10042070-12 = "...Você quer acabar assim?"
10042070-13 = "N-não..."
10042070-32 = "Por aqui!"
10042070-36 = "Muito bem, eu serei sua oponente!"
10042070-37 = "Se você quer continuar causando confusão...!"
10042070-39 = "Vai ter que me derrotar primeiro!!!"
10042070-43 = "...Parou!?"
10042070-44 = "[ns] \"Isso é...!\""
10042070-45 = "Ela se tornou uma isca para criar uma abertura para o ataque..."
10042070-46 = "Parece até uma cena de filme.#nSensei, quer um pouco de pipoca?"
10042070-47 = "De onde você tirou isso...?"
10042070-51 = "...Juri!"
10042070-52 = "Juri...!"
10042070-53 = "...(mastigando)"
10042070-59 = "Sensei, agora!"
10042070-61 = "[ns1] \"O movimento parou...!\"\n[ns2] \"Agora, atirem!\""
10042070-64 = "A-a pessoa com autoridade para ordenar o disparo está..."
10042070-65 = "A boca da oficial administrativa está bloqueada por tentáculos.#nAlém disso, parece que ela desmaiou..."
10042070-66 = "A menos que a autoridade seja transferida, será difícil disparar."
10042070-67 = "Ei, você também é do Comitê Disciplinar, não é!?#nVocê não pode dar a ordem no lugar dela!?"
10042070-68 = "Eu adoraria fazer isso, mas..."
10042070-69 = "Não tem jeito.#nOrganizações como esta valorizam a cadeia de comando acima de tudo."
10042070-70 = "Ma-mas..."
10042070-71 = "Eu ouvi tudo."
10042070-72 = "A Ako começou a mover as unidades de artilharia de repente, então eu vim ver o que estava acontecendo..."
10042070-73 = "[ns] \"Essa voz!\""
10042070-75 = "A partir deste momento, transfiro a autoridade de operação e controle da unidade de artilharia, que estava com a Ako, para o Sensei do Schale."
10042070-76 = "Todos os membros do Comitê Disciplinar mobilizados devem seguir as ordens do Sensei até o fim da operação... Câmbio."
10042070-77 = "[s3] \"Hina!\"\n[s4] \"Que timing perfeito...!!\""
10042070-84 = "Não parece que temos muito tempo."
10042070-85 = "Então, Sensei.#nPor favor, assuma o comando no local."
10042070-86 = "...Ah, e mais uma coisa."
10042070-87 = "Enviei uma pessoa que estava dormindo para ajudar."
10042070-88 = "Uma pessoa que estava dormindo...?"
10042070-89 = "Ah!"
10042070-95 = "Desta vez eu não vou baixar a guarda...!!"
10042070-96 = "Vou fazer você pagar pelo que fez!!"
10042070-97 = "Entendo, cumprindo a promessa."
10042070-98 = "Agora todos estão reunidos."
10042070-99 = "Então, Sensei... por favor, assuma o comando."
10042070-103 = "[ns] \"Unidade de artilharia--\""
10042070-105 = "[ns] \"--fogo!!!\""
10042070-116 = "Os movimentos da panqueca gigante ficaram lentos."
10042070-117 = "--Precisamos dar o golpe final rapidamente."
10042070-118 = "Afinal, avançar após um disparo de artilharia em massa é o básico."
10042070-119 = "[s5] \"Bem, já está na hora...\"\n[s6] \"Vamos acabar com essa luta.\""
