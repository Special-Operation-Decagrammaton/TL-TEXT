[translation]
10042070-1 = "第7話;LAST GIRL STANDING"
10042070-4 = "ジュリさん！？"
10042070-9 = "いけません、チナツ。#n巻き込まれてしまいます。"
10042070-10 = "で、でも……！"
10042070-11 = "んうっ！んんっ！！！んんーーっ！"
10042070-12 = "……ああなりたいのですか？"
10042070-13 = "い、いえ……。"
10042070-32 = "こっちです！"
10042070-36 = "さあ、あなたの相手は私です！"
10042070-37 = "それ以上、暴れたいのなら……！"
10042070-39 = "私を倒してからにしてくださいっ！！！"
10042070-43 = "……止まった！？"
10042070-44 = "[ns] \"これは……！\""
10042070-45 = "自身が囮になって、攻撃のチャンスを作る……。"
10042070-46 = "まるで映画のワンシーンのようですね。#n先生も、ポップコーン食べますか？"
10042070-47 = "それ、どこから持ってきたのよ……。"
10042070-51 = "……ジュリ！"
10042070-52 = "ジュリさん……！"
10042070-53 = "……（もぐもぐ）"
10042070-59 = "先生、今です！"
10042070-61 = "[ns1] \"動きが止まった……！\"\n[ns2] \"今だ、撃てーっ！\""
10042070-64 = "ほ、砲撃の権限を持つ人が……！"
10042070-65 = "行政官の口が触手で塞がれています。#nそれに、どうやら気絶しているようで……。"
10042070-66 = "権限が移譲されない限り、発砲は難しいかと。"
10042070-67 = "えっ、あなたも風紀委員でしょ！？#n代わりに命令しちゃダメなの！？"
10042070-68 = "私も、そうしたい気持ちはやまやまですが……。"
10042070-69 = "仕方ありません。#nこういった組織は、指揮系統を何よりも大切にしていますから。"
10042070-70 = "で、でも――"
10042070-71 = "話は聞かせてもらったわ。"
10042070-72 = "アコが急に砲撃部隊を動かすから、何事かと思ったら……。"
10042070-73 = "[ns] \"この声は！\""
10042070-75 = "現時刻をもって、アコが持つ砲撃隊の運用および統制権限を、シャーレの先生へ移譲する。"
10042070-76 = "動員された全風紀委員は、作戦終了まで先生の指揮に従うように……以上。"
10042070-77 = "[s3] \"ヒナ！\"\n[s4] \"ナイスタイミング……！！\""
10042070-84 = "あまり時間がないように見えるけど。"
10042070-85 = "それじゃあ、先生。#n現場の指揮をお願い。"
10042070-86 = "……ああ、それと。"
10042070-87 = "眠っていた人員を、一人向かわせておいたから。"
10042070-88 = "眠っていた人員……？"
10042070-89 = "あっ！"
10042070-95 = "今度こそ油断しないぞ……！！"
10042070-96 = "借りは返させてもらうからな！！"
10042070-97 = "なるほど、フラグ回収ですね。"
10042070-98 = "これで全員揃いました。"
10042070-99 = "では、先生……指揮をお願いします。"
10042070-103 = "[ns] \"砲撃隊――\""
10042070-105 = "[ns] \"――発射！！！\""
10042070-116 = "巨大パンケーキの動きが鈍くなりました。"
10042070-117 = "――早く「とどめ」を刺さなくては。"
10042070-118 = "一斉射撃の後に突撃を行うのは、定石ですからね。"
10042070-119 = "[s5] \"じゃあ、そろそろ……。\"\n[s6] \"この戦いを、終わらせにいこう。\""
