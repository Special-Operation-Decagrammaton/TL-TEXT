[translation]#[Texto Final. - Filipe 08/07.]
70010010-1 = "O Fim da Era Manual (1)"
70010010-2 = "Pavilhão de Engenharia da Computação – Millennium EXPO"
70010010-3 = "A demonstração vai começar!"
70010010-4 = "Antes de começar, temos uma palavra dos membros do gabinete de Red Winter."
70010010-8 = "Hmm. Bom acolhimento."
70010010-9 = "Sou a presidente do conselho estudantil de Red Winter, chefe do Departamento de Embelezamento Ambiental, secretária-geral, chefe da limpeza, representante dos clubes esportivos, presidente do comitê estudantil, presidente do Comitê de Disciplina, chefe da cantina――"
70010010-10 = "e a provadora de pudim do mês, e a presidente da Academia de Ciências de Red Winter, Cherino-sama!"
70010010-11 = "Vim à Millennium EXPO para trazer mais avanços à nossa tecnologia de ponta. Tenho grandes expectativas."
70010010-12 = "……Obrigado, presidente Cherino. Então, vamos apresentar!#nA obra-prima de Millennium…… o supercomputador 'SEN9000'!"
70010010-17 = "Hã? Isso é um supercomputador? Sem monitor nem teclado."
70010010-18 = "É porque eu uso imagens e voz para entrada e saída de dados!"
70010010-24 = "Olá!#nPresidente do conselho estudantil de Red Winter, chefe do Departamento de Embelezamento Ambiental, secretária-geral, chefe da limpeza, representante dos clubes esportivos, presidente do comitê estudantil, presidente do Comitê de Disciplina, chefe da cantina――"
70010010-25 = "e a provadora de pudim do mês, e a presidente da Academia de Ciências de Red Winter, Cherino-sama! Bem-vinda à Millennium!"
70010010-26 = "O-que é isso!? Falou comigo do nada!?"
70010010-27 = "E ainda decorou todos os meus títulos? Só de ouvir uma vez!?"
70010010-28 = "(Até imitou o erro de pronúncia da presidente……)"
70010010-29 = "(Pensei que só eu conseguisse fazer isso!)"
70010010-31 = "Fufu, a SEN9000 respondeu antes de eu falar."
70010010-32 = "A SEN9000 tem um modelo de diálogo. Portanto, entende palavras sem digitação e responde a comandos. Por exemplo――"
70010010-33 = "SEN9000, qual sua especialidade?"
70010010-34 = "Sim! Sou boa em cálculos matemáticos e responder perguntas com precisão!"
70010010-35 = "Então, vamos começar pela matemática. Consegue resolver este problema?"
70010010-37 = "Aquilo é…… matemática? Quase não tem números……"
70010010-38 = "E é manuscrito. Será que vai entender?"
70010010-40 = "……"
70010010-41 = "Hunf, não tem como."
70010010-42 = "Tecnologia que não existe em Red Winter, não pode existir em outra――"
70010010-43 = "……Desculpe! Foi mal! Eu não percebi que estava no mudo!"
70010010-44 = "Mas, mesmo para uma demonstração, não precisava de um problema tão fácil? A resposta é 42!"
70010010-50 = "Correto!#nTambém tem capacidade de aprendizado de linguagem, e recentemente aprendeu a contar piadas."
70010010-51 = "Agora, vamos fazer perguntas.#nPresidente, que tal fazer uma pergunta?"
70010010-52 = "E-eu!?"
70010010-53 = "Bem…… quantas estátuas minhas existem em Red Winter?"
70010010-54 = "Fufufu. Vamos ver se você consegue responder!"
70010010-56 = "Total de 199, e mais uma a ser inaugurada no próximo mês."
70010010-57 = "Esta informação foi obtida das redes sociais oficiais e da versão digital do 'Urso Vermelho',#n……e pode conter imprecisões."
70010010-58 = "Além disso, estatisticamente, mais de 10 estátuas serão destruídas na próxima semana."
70010010-59 = "Fui útil?"
70010010-60 = "Respondeu sem hesitar……?"
70010010-61 = "A informação também…… é precisa……"
70010010-63 = "Além disso, tem várias outras funções.#nAgora, isto――"
70010010-64 = "Uu……"
70010010-72 = "Com isso, encerramos a demonstração!"
70010010-74 = "Que incrível! Parece que faz tudo!"
70010010-75 = "Essa é a tecnologia de Millennium…… além do que imaginava……"
70010010-77 = "E a todos de Red Winter!#nObrigado por virem hoje!"
70010010-78 = "U-u……"
70010010-84 = "I-irrelevante!!"
70010010-90 = "Mostraram algo interessante!#nMas! Isso também existe na grandiosa Red Winter!"
70010010-91 = "E é maior e mais quente!"
70010010-92 = "(Presidente, isso não é motivo de orgulho para um computador……)"
70010010-96 = "Incrível!#nEntão Red Winter também tem um supercomputador!"
70010010-97 = "Desculpe a ignorância…… nunca vi na Sociedade de Estudos de Computação……"
70010010-98 = "É-é porque era tão bom que ficava em segredo!"
70010010-99 = "Mas vendo a apresentação de hoje, Millennium finalmente está nos alcançando. Então posso revelar!"
70010010-100 = "S-sério?"
70010010-101 = "Vou convidá-los para Red Winter.#nVou mostrar nossa tecnologia!"
70010010-103 = "Então, vou na segunda-feira que vem!"
70010010-104 = "……Hã?"
70010010-105 = "Tenho um compromisso perto!"
70010010-106 = "A tecnologia de ponta de Red Winter, envolta em mistério……!#nQue honra poder vê-la! No dia, conto com vocês!"
70010010-110 = "A-ah, segunda-feira que vem!"
70010010-111 = "Preparem-se para ver a grandeza de Red Winter!"
70010010-114 = "O que fazer……?"
70010010-115 = "Segunda-feira…… não temos supercomputador nenhum……"
70010010-116 = "Que tal orquestrar um golpe de estado para coincidir com a visita?"
70010010-117 = "Boa ideia, mas…… o último golpe deu tão certo que a restauração foi trabalhosa. Por enquanto, não."
70010010-118 = "Hmm…… será que alguém tem um?…… Ou mandar fazer――"
70010010-122 = "Presidente Cherino, o orçamento da Turma Especial 183 chegou."
70010010-123 = "Dizem que a pesquisa teórica e o design do computador estão prontos."
70010010-124 = "Sério? Bem feito, Tomoe!"
70010010-125 = "Mandem começar a construção agora!#nCom a autoridade do gabinete, mobilizem todos os recursos e mão de obra!"
70010010-126 = "Então, sobre o orçamento…… considerando a tecnologia eletrônica de Red Winter――"
70010010-127 = "160 bilhões de válvulas termiônicas."
70010010-128 = "27 usinas de energia."
70010010-129 = "3 novas cidades para a equipe residente.#nE……"
70010010-131 = "……Hã?"
70010010-132 = "Para o terreno, precisamos demolir 8 montanhas."
70010010-133 = "Eita……"
70010010-134 = "Com jornadas de 16 horas, 7 dias por semana, em turnos, com toda a força de trabalho――"
70010010-135 = "a conclusão levará cerca de 6 séculos."
70010010-136 = "……"
70010010-137 = "Vamos começar?"
70010010-139 = "Millennium vem na semana que vem! Não dá tempo!!"
70010010-143 = "A-atchim!"
70010010-145 = "(Estou com sede…… vou tomar um chá……)"
70010010-149 = "(Aliás…… a secretária Tomoe parece preocupada…… ainda bem que o Comitê de Segurança não está envolvido――)"
70010010-153 = "(……!? O chá foi para o lugar errado……! Vou me engasgar!)"
70010010-154 = "C-cof!"
70010010-159 = "……Marina, o que é engraçado?"
70010010-160 = "Você acha divertido me ver em apuros?"
70010010-162 = "N-não! C-cof, não é isso……!"
70010010-163 = "Então…… está me desprezando por ter perdido o bigode?"
70010010-164 = "N-não, é o ch-á――"
70010010-165 = "Farsa? Está chamando isso de farsa?"
70010010-167 = "(M-merda! Vou ser purgada!)"
70010010-168 = "Ch-á……"
70010010-172 = "Já começamos! O Comitê de Segurança já começou os preparativos!"
70010010-173 = "O quê? É verdade?"
70010010-174 = "Claro! Eu, Marina, vou preparar tudo até o prazo!"
70010010-175 = "Marina."
70010010-176 = "S-sim!"
70010010-181 = "Ter um vassalo leal como você é uma bênção."
70010010-182 = "Sua dedicação a Red Winter e a mim merece elogios."
70010010-183 = "……Entendi. Deixo isso com você.#nSe der certo, darei a 'Medalha de Bigode do Trabalho'――"
70010010-184 = "Não! Isso é pouco!"
70010010-185 = "Vou conceder a medalha de 'Herói Federal de Red Winter'!"
70010010-186 = "Sim! Pode deixar!"
70010010-192 = "O que fazer……?"
70010010-193 = "Até semana que vem……? Não temos computador……"
70010010-198 = "O que fazer? Como assim."
70010010-199 = "Um tirano pedindo ajuda à classe trabalhadora?"
70010010-200 = "Wahaha! Você tá enrascada!"
70010010-201 = "Posso usar isso no mangá?#nAh, tô rindo demais!"
70010010-202 = "Antes disso, pode entregar o manuscrito atual?#nQuem não cumpre prazo também está enrascado."
70010010-203 = "Achou……"
70010010-207 = "Mufufu. Isso vai dar uma vergonha.#nQue tal uma entrevista prévia?"
70010010-208 = "A chefe de segurança purgada por causa de chá…… na capa do próximo 'Urso Vermelho'."
70010010-209 = "Mesmo sendo não-ficção, a tolice é tamanha que não tem valor literário."
70010010-210 = "Dou 2 de 10."
70010010-212 = "Por que nota?"
70010010-213 = "Como as críticas normais não surtiam efeito, implementei um sistema de pontos."
70010010-214 = "Ah, o manuscrito da Mel é 0.#nSe não está completo, não é uma obra."
70010010-215 = "Ei…… tem uma pessoa mais interessante para criticar bem aqui, não?"
70010010-217 = "……Podem rir à vontade.#n……mas vocês podem me ajudar?"
70010010-218 = "Não. Não há mão de obra para um tirano."
70010010-219 = "Por que eu―― quero dizer, nós – ajudaríamos você?"
70010010-220 = "Bom, é que……"
70010010-221 = "Na verdade…… quando a presidente perguntou com quem eu estava fazendo isso――"
70010010-222 = "eu, no impulso, falei os nomes de vocês……"
70010010-223 = "Que vamos unir forças……"
70010010-230 = "Q-quê!?"
70010010-231 = "1 ponto, 1 ponto!! Você está louca?"
70010010-232 = "Por que nos envolver?"
70010010-233 = "Eita…… vamos ser purgados!"
70010010-235 = "Tirania não basta, quer jogar a culpa dos erros no povo?"
70010010-236 = "Aumentar os envolvidos para confundir a responsabilidade?#nFizemos algo para merecer isso?"
70010010-238 = "N-não! Falei no desespero.#nNão tive má intenção…… juro."
70010010-239 = "Conheço vocês…… achei que éramos amigos……"
70010010-241 = "Amigos……?"
70010010-242 = "Hã?"
70010010-244 = "Esquece…… desculpa ter citado vocês……"
70010010-245 = "……Vou confessar à presidente.#nVou assumir a responsabilidade para que vocês não sejam prejudicadas."
70010010-246 = "Eu devia ter sido mais cuidadosa…… se somos amigas……#n……desculpa mesmo."
70010010-250 = "……9 pontos."
70010010-251 = "Ei!! Por que nota tão alta? Meu mangá você detona!"
70010010-252 = "Comparado à emoção de uma história humana real, a Mel ainda está longe."
70010010-253 = "Ela confiou em mim porque me considerava amiga…… isso tocou o coração."
70010010-255 = "Amigo…… a chefe de segurança dizer isso……"
70010010-256 = "Isto é…… furo de reportagem nível máximo. Mufufu."
70010010-258 = "Então, não éramos amigas…… foi ilusão minha……"
70010010-260 = "N-não, não é isso!"
70010010-261 = "Mas ajudar, como fazer? Não sabemos, né? "
70010010-262 = "É…… mesmo com toda a força de trabalho de Red Winter, levaria 600 anos…… com cinco de nós……"
70010010-263 = "Não, quatro.#nA Mel não devia estar aqui, né?"
70010010-264 = "Já tô quase terminando!"
70010010-266 = "Marina Ikegura…… membro do gabinete de Red Winter, chefe do Comitê de Segurança……"
70010010-267 = "Ela achava que era 'amiga' de um capanga de tirano……"
70010010-273 = "Bem-vinda ao nosso lado, camarada!"
70010010-274 = "C-camarada!?"
70010010-276 = "Minori!?"
70010010-277 = "Ora…… que reviravolta."
70010010-278 = "Pensei em negociar com o Comitê de Segurança, mas…… aconteceu isso."
70010010-279 = "Presidente, na hora de buscar negócios, é melhor ter senso de oportunidade."
70010010-280 = "Perdão. Mufufu."
70010010-282 = "……Marina, você acordou para a luta de classes!"
70010010-283 = "Junte-se à linha de frente! O amanhã sem preocupações é conquistado por nós!"
70010010-284 = "Agradeço, mas é impossível……"
70010010-285 = "Uma obra tão grande…… mesmo com o Departamento todo, não dá……"
70010010-286 = "Talvez preparar um golpe seja mais realista……"
70010010-287 = "O que exatamente a presidente quer?#nEntendi que é uma máquina complexa."
70010010-288 = "O computador que vimos na EXPO."
70010010-289 = "Ele respondia a qualquer pergunta."
70010010-291 = "Uma máquina que responde perguntas?"
70010010-292 = "Isso é fácil."
70010010-297 = "……Fácil?"
70010010-299 = "[log]Um dia antes da visita ao Departamento de Ciências Computacionais de Millennium[/log]"
70010010-301 = "Presidente Marina, amanhã é o grande dia."
70010010-302 = "Não vai me dizer que não conseguiu, né?"
70010010-303 = "De jeito nenhum!"
70010010-304 = "A demonstração está completamente preparada!"
70010010-305 = "Camaradas!#nAqui está o supercomputador feito com a tecnologia de Red Winter!"
70010010-311 = "Este é o mais avançado supercomputador, nascido sob a liderança da presidente Cherino……"
70010010-312 = "o 'RFC9001'!"
70010010-314 = "RFC……?"
70010010-315 = "É a sigla para 'Computador Federal de Red Winter', e '9001' significa um passo além do '9000' de Millennium!"
70010010-316 = "Marina……! Eu confiava em você!"
70010010-323 = "Muito bem!!"
70010010-324 = "(Elogio da presidente Cherino!…… fazia tempo!)"
70010010-325 = "C-cof cof! Por segurança, a entrada de dados é por escrito.#nColoque a pergunta nesta fenda."
70010010-327 = "Ele responde a tudo igual ao de Millennium?"
70010010-328 = "Então……#n'Quem é o maior líder de Red Winter?'"
70010010-334 = "O quê? Nem isso?"
70010010-336 = "É-é que foi configurado para linguagem formal, então leva um tempo!"
70010010-337 = "Só mais um momento……"
70010010-342 = "Saiu!"
70010010-343 = "'A presidente do conselho estudantil de Red Winter, chefe do Departamento de Embelezamento Ambiental, secretária-geral, chefe da limpeza, representante dos clubes esportivos, presidente do Comitê de Disciplina, chefe da cantina――'"
70010010-344 = "'e a provadora de pudim do mês, e a presidente da Academia de Ciências de Red Winter, Cherino-sama!'"
70010010-345 = "Oh! Ele decorou todos os meus títulos!"
70010010-347 = "Isso é o básico!"
70010010-348 = "É um supercomputador de alto desempenho que aprendeu como um humano!"
70010010-349 = "('Como um humano'…… claro. Afinal――)"
70010010-351 = "Dentro da caixa"
70010010-352 = "Assim tá bom?"
70010010-354 = "Ora, você decorou aquela lista enorme."
70010010-355 = "No departamento de publicações, era chato digitar, então fizemos uma versão impressa."
70010010-356 = "Tipo Banksy?"
70010010-358 = "Conheça o inimigo e a si mesmo, e vencerá todas as batalhas.#nDecorar os títulos do tirano é básico da revolução!"
70010010-359 = "Shh! Não façam barulho!#nVão descobrir que estamos na caixa!"
70010010-360 = "Relaxa! Esta caixa é à prova de som.#nProjetada para não vazar."
70010010-361 = "Podemos ver e ouvir o exterior pelos microfones e frestas."
70010010-362 = "Isso é loucura!#nSe descobrirem, vamos morar aqui até formar……"
70010010-364 = "Até que é confortável…… tô ficando com sono…… mufu……"
70010010-365 = "……F……"
70010010-366 = "É falta de oxigênio!"
70010010-367 = "Precisávamos entrar todas?"
70010010-369 = "Uma pessoa tem limites."
70010010-370 = "E não podemos ignorar um camarada em apuros."
70010010-371 = "Não podia deixar a tragédia acontecer."
70010010-372 = "Se soubesse que o plano era tão ruim, não teria ajudado!"
70010010-374 = "Então, Takane se comoveu."
70010010-375 = "A escritora que veio caçar ideias com desculpa de brincadeira, o que diz?"
70010010-376 = "Ah…… o prazo é importante, mas coletar ideias para o futuro também é――"
70010010-378 = "Chegou a próxima pergunta!"
70010010-380 = "(Será que as outras estão bem?)"
70010010-381 = "(Se descobrirem…… vou ser colocada na caixa também!)"
70010010-383 = "Desta vez, algo difícil! Trouxe um problema de matemática!"
70010010-384 = "Recomendado pela Academia. Sem um bom desempenho, não resolve!"
70010010-386 = "(Problema de nível acadêmico!? M-merda!)"
70010010-388 = "Também tenho o gabarito. Vamos testar!"
70010010-393 = "P-Presidente! C-claro que tenho confiança……!"
70010010-394 = "Hã? Tem problema?"
70010010-395 = "Na verdade……!"
70010010-396 = "(Era loucura…… melhor confessar antes que descubram!)"
70010010-397 = "Desculpe! Perdoe――"
70010010-402 = "Oh! Saiu a resposta!"
70010010-404 = "――ei, ué?"
70010010-406 = "Vamos ver……"
70010010-407 = "Não entendo o conteúdo, mas é igual ao gabarito."
70010010-408 = "Marina! Incrível!"
70010010-409 = "……Você ia dizer algo?"
70010010-411 = "(……Acertou? Tão rápido?)"
70010010-412 = "N-não! Obrigado por preparar a pergunta!"
70010010-413 = "Hmm. Verificar também é trabalho de presidente. Isso é o mínimo! Hahaha!"
70010010-414 = "A-ahaha! Hahaha!"
70010010-416 = "A-pergunta de agora! Foi a Minori que resolveu?"
70010010-417 = "Tinha mais símbolos, eu acho?"
70010010-418 = "Ela começou a resolver antes mesmo do papel entrar, né?"
70010010-420 = "Não quero me gabar, mas era um problema normal."
70010010-422 = "E ainda acertou…… 10 de 10!"
70010010-423 = "Mufufu, elogios, hein."
70010010-425 = "Presidente Minori, você é estudiosa…… incrível……"
70010010-426 = "As correntes da tirania se rompem com vontade de aço e intelecto de fogo!"
70010010-427 = "É por isso que você é uma das pessoas mais perigosas de Red Winter. Suas palavras têm peso. Mufufu."
70010010-429 = "Mais uma pergunta!"
70010010-443 = "(Até agora, conseguimos enganar……)"
70010010-444 = "(mas por que sinto um mau pressentimento?)"