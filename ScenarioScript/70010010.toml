[translation]
70010010-1 = "O Fim da Era Manual (1)"
70010010-2 = "Pavilhão de Engenharia da Computação da Millennium Expo"
70010010-3 = "Daremos início à demonstração agora!"
70010010-4 = "Antes de começarmos, gostaria de convidar os membros do Secretariado de Redwinter, que vieram especialmente para esta ocasião, para dizerem algumas palavras."
70010010-8 = "Hum. Uma recepção digna de mim, bom trabalho."
70010010-9 = "Eu sou... a Presidente do Conselho Estudantil da Academia Federal de Redwinter, Chefe do Departamento de Embelezamento Ambiental, Secretária-Geral, Chefe do Departamento de Limpeza, Representante do Departamento de Esportes, Presidente do Conselho Estudantil, Presidente do Comitê Disciplinar, Chefe do Departamento de Merenda e—"
70010010-10 = "E a provadora de pudins mais excelente deste mês, além de Presidente da Academia de Ciências de Redwinter, Cherino!"
70010010-11 = "Vim à Millennium EXPO para trazer mais progresso à tecnologia de ponta da Academia Federal de Redwinter. Estou com grandes expectativas."
70010010-12 = "...Presidente Cherino, muito obrigada. Então, apresento a vocês! #nO grande feito da Millennium... o supercomputador 'SEN9000'!"
70010010-17 = "Hã? Isso é um supercomputador? #nNão tem nem monitor nem teclado."
70010010-18 = "É porque eu realizo a entrada e saída de informações usando imagem e voz!"
70010010-24 = "Muito prazer! #nEu sou a Presidente do Conselho Estudantil da Academia Federal de Redwinter, Chefe do Departamento de Embelezamento Ambiental, Secretária-Geral, Chefe do Departamento de Limpeza, Representante do Departamento de Esportes, Presidente do Conselho Estudantil, Presidente do Comitê Disciplinar, Chefe do Departamento de Merenda e—"
70010010-25 = "E a provadora de pudins mais excelente deste mês, além de Presidente da Academia de Ciências de Redwinter, Cherino! Bem-vinda à Millennium Science School!"
70010010-26 = "O-o que é isso!? Ela começou a falar do nada!?"
70010010-27 = "E ela decorou todos os meus títulos!? Mesmo tendo ouvido apenas uma vez!?"
70010010-28 = "(Até imitou os erros de fala da Presidente...)"
70010010-29 = "(Eu achava que só eu era capaz de fazer isso!)"
70010010-31 = "Fufu, o SEN9000 respondeu antes mesmo que eu pudesse terminar."
70010010-32 = "Este SEN9000 possui um modelo de diálogo integrado. Por isso, ele entende palavras sem precisar de entrada de texto e pode responder a comandos. Por exemplo, assim—"
70010010-33 = "SEN9000, pode me dizer quais são suas especialidades?"
70010010-34 = "Sim! Sou excelente em cálculos matemáticos e em responder perguntas com precisão!"
70010010-35 = "Então, vamos começar com matemática. Você poderia resolver este problema?"
70010010-37 = "Aquilo é... matemática? Quase não tem números..."
70010010-38 = "Além disso, está escrito à mão. Será que ele consegue entender?"
70010010-40 = "..."
70010010-41 = "Humph, é impossível que ele consiga responder."
70010010-42 = "Não tem como uma tecnologia que não existe na nossa Academia Federal de Redwinter estar em outra escola—"
70010010-43 = "...Desculpe! Que descuido o meu! #nNão percebi que estava no mudo e acabei falando sozinha!"
70010010-44 = "Mas, mesmo sendo uma demonstração, não precisava me dar um problema tão fácil, né? A resposta é 42!"
70010010-50 = "Correto! #nComo ele também tem capacidade de aprendizado de modelos de linguagem, ultimamente ele até consegue fazer piadas."
70010010-51 = "Agora, vamos pedir para ele responder a uma pergunta. #nJá que estamos aqui, Presidente, gostaria de fazer alguma pergunta?"
70010010-52 = "E-eu!?"
70010010-53 = "Certo... Quantas estátuas minhas existem dentro da Academia Federal de Redwinter, no total?"
70010010-54 = "Hahaha. E então? Duvido que consiga responder!"
70010010-56 = "Um total de 199, e mais uma está prevista para ser revelada no início do próximo mês."
70010010-57 = "Esta informação foi baseada nas redes sociais oficiais, na edição eletrônica do 'Red Bear' e em comunicados de imprensa, portanto, pode haver margem de erro."
70010010-58 = "Além disso, estatisticamente, mais de 10 estátuas serão destruídas na próxima semana."
70010010-59 = "Fui útil?"
70010010-60 = "Ele respondeu sem hesitar...?"
70010010-61 = "E as informações... são precisas, também..."
70010010-63 = "Além dessas, existem várias outras funções. #nA seguir, temos isto—"
70010010-64 = "Ugh..."
70010010-72 = "Com isso, encerramos a demonstração!"
70010010-74 = "Foi incrível! Acho que ele consegue fazer qualquer coisa, não é!?"
70010010-75 = "Essa é a capacidade tecnológica da Millennium... é mais do que eu imaginava..."
70010010-77 = "E aos membros da Academia Federal de Redwinter! #nMais uma vez, muito obrigada por terem vindo hoje!"
70010010-78 = "U-ugh..."
70010010-84 = "I-isso é um absurdo!!"
70010010-90 = "Foi algo bem interessante de se ver! #nMas! I-isso também existe na grandiosa Academia Federal de Redwinter!"
70010010-91 = "E é muito maior e mais quente, viu!"
70010010-92 = "（Presidente, isso não é algo para se gabar sobre um computador...）"
70010010-96 = "Incrível!#nEntão Red Winter também operava um supercomputador...!"
70010010-97 = "Peço perdão pela minha ignorância... é que eu nunca vi um no Clube de Pesquisa de Computação..."
70010010-98 = "I-Isso é porque o desempenho dele é tão alto que o mantivemos em segredo esse tempo todo!"
70010010-99 = "Mas, vendo a apresentação de hoje, parece que a tecnologia de Millennium finalmente nos alcançou. Acho que não tem problema contar a vocês agora!"
70010010-100 = "S-Sério mesmo!?"
70010010-101 = "Que tal eu convidar vocês para a Academia Red Winter na próxima vez?#nVou mostrar a vocês o nosso poder tecnológico!"
70010010-103 = "Então, irei na segunda-feira da semana que vem!"
70010010-104 = "……Eh?"
70010010-105 = "É que eu tenho um compromisso por perto nessa data!"
70010010-106 = "A tecnologia de ponta de Red Winter, envolta em mistério...!#nÉ uma honra poder vê-la! Conto com vocês no dia!"
70010010-110 = "Ah, sim! Segunda-feira da semana que vem, certo!"
70010010-111 = "Prepare-se para gravar a grandeza da Academia Red Winter em seus olhos!!"
70010010-114 = "O que eu faço...?"
70010010-115 = "Segunda-feira que vem... nós não temos um supercomputador..."
70010010-116 = "Que tal induzirmos um golpe de elementos subversivos para coincidir com a data da visita?"
70010010-117 = "É uma boa ideia, mas... da última vez o golpe deu certo demais e foi um incômodo retomar o poder. Não quero isso por enquanto."
70010010-118 = "Hmm... se procurarmos bem, será que alguém não tem um escondido...?#nOu talvez, simplesmente mandar construir um—"
70010010-122 = "Presidente Cherino, o orçamento de produção que solicitamos à Classe Especial 183 chegou."
70010010-123 = "Disseram que a pesquisa teórica da tecnologia e o design do computador já foram concluídos."
70010010-124 = "Sério!? Muito bem, Tomoe!"
70010010-125 = "Comecem a produção agora mesmo!#nCom a autoridade do Secretariado, vamos mobilizar todos os recursos e mão de obra!"
70010010-126 = "Sobre o detalhamento do orçamento...#nConsiderando a tecnologia de engenharia eletrônica da Academia Red Winter—"
70010010-127 = "Precisaremos de 160 bilhões de válvulas."
70010010-128 = "27 usinas de energia para o fornecimento elétrico."
70010010-129 = "E precisamos preparar 3 novas cidades para a moradia da equipe residente.#nE também..."
70010010-131 = "……Hm?"
70010010-132 = "Para garantir o terreno das instalações, teremos que demolir 8 montanhas."
70010010-133 = "Ah, não..."
70010010-134 = "Trabalhando 16 horas por dia, 7 dias por semana, com turnos rotativos e toda a mão de obra disponível—"
70010010-135 = "A previsão é de que leve cerca de 6 séculos para ser concluído."
70010010-136 = "……."
70010010-137 = "Devemos começar?"
70010010-139 = "Millennium vem na semana que vem, sabia!? Não vai dar tempo!!!"
70010010-143 = "Acho... achim!"
70010010-145 = "（Fiquei com a garganta seca de tanta tensão... vou tomar uma xícara de chá...）"
70010010-149 = "（Mas, falando nisso... a Chefe de Gabinete Tomoe parece estar em apuros... ainda bem que o Comitê de Segurança não está envolvido—）"
70010010-153 = "（……!? O chá foi para o lugar errado...! Estou engasgando...!）"
70010010-154 = "C-Cof!"
70010010-159 = "……Marina, o que há de tão engraçado?"
70010010-160 = "Acha engraçado me ver em apuros?"
70010010-162 = "N-Não é isso! C-Cof, não é nada disso...!"
70010010-163 = "Então... você está me menosprezando porque estou sem o meu bigode?"
70010010-164 = "N-Não, é que o ch-chá—"
70010010-165 = "Chá? Você quer dizer que esta situação é uma farsa?"
70010010-167 = "（M-Meu Deus! Se continuar assim, serei expurgada...!!）"
70010010-168 = "Chá..."
70010010-172 = "Estamos começando...!#nIsso! O Comitê de Segurança já começou os preparativos para o supercomputador!"
70010010-173 = "O quê? É verdade?"
70010010-174 = "Com certeza! Eu, Marina, assumirei a responsabilidade e providenciarei tudo dentro do prazo!"
70010010-175 = "Marina."
70010010-176 = "S-sim, senhora!"
70010010-181 = "Ter uma subordinada leal como você ao meu lado me faz uma pessoa de sorte."
70010010-182 = "Essa sua dedicação em servir a Red Winter e a mim... é digna de admiração."
70010010-183 = "...Entendido. Deixarei este assunto em suas mãos. #nSe tudo terminar bem, eu lhe concederei a 'Ordem do Trabalho do Bigode de Primeira Classe'—"
70010010-184 = "Não! Isso é muito pouco!"
70010010-185 = "Concederei a você a medalha de 'Heroína da Federação de Red Winter'!"
70010010-186 = "Sim! Pode deixar comigo!"
70010010-192 = "O que eu faço...?"
70010010-193 = "Até a semana que vem...? #nEu nem sequer construí um supercomputador..."
70010010-198 = "O que quer dizer com 'o que fazer'?"
70010010-199 = "Você é uma tirana, e ainda assim vem pedir ajuda para nós, as massas trabalhadoras?"
70010010-200 = "Wahahaha! Você está encurralada, hein!"
70010010-201 = "Posso usar essa história como tema para o meu mangá? #nAh, estou rindo tanto que até dói!"
70010010-202 = "Antes disso, poderia me entregar o rascunho atual? #nUma veterana que não consegue cumprir o prazo também está encurralada, sabe?"
70010010-203 = "Murchou..."
70010010-207 = "Mufufu. Desse jeito, você vai passar uma vergonha terrível, não é? #nQue tal fazermos uma entrevista antecipada?"
70010010-208 = "A chefe do comitê de segurança expurgada por causa de chá... vamos usar isso na capa da próxima edição da 'Red Bear'."
70010010-209 = "Embora seja um relato real, é tão estúpido que não vejo valor literário algum."
70010010-210 = "Dou nota 2 de 10."
70010010-212 = "Por que a nota?"
70010010-213 = "Como as críticas comuns não pareciam surtir efeito em vocês, introduzi um sistema de pontuação desde ontem."
70010010-214 = "Ah, o rascunho atual da Meru é nota 0. #nSe não estiver concluído, não pode ser chamado de obra."
70010010-215 = "Err... tem alguém bem na nossa frente que merece mais críticas do que eu, por que não falamos disso?"
70010010-217 = "...Podem rir o quanto quiserem. #nDe alguma forma, vocês não poderiam me dar uma mãozinha...?"
70010010-218 = "Recusado. Não temos mão de obra para oferecer a uma tirana."
70010010-219 = "Por que eu — não, por que nós deveríamos colaborar com você?"
70010010-220 = "Bem, existe um motivo para isso..."
70010010-221 = "Na verdade... a Presidente me perguntou com quem eu estava trabalhando..."
70010010-222 = "E, sem pensar, acabei mencionando o nome de vocês..."
70010010-223 = "Disse que todos nós uniríamos forças..."
70010010-230 = "O-o que você disse!?!?"
70010010-231 = "Nota 1, nota 1!! Você perdeu o juízo!?"
70010010-232 = "Por que nos envolveu nisso!?"
70010010-233 = "Hie... t-todos nós seremos expurgados!"
70010010-235 = "Não satisfeita apenas com a tirania, agora quer que o povo carregue a responsabilidade pelos seus erros?"
70010010-236 = "É uma tática para aumentar o número de envolvidos e tornar a responsabilidade ambígua? #nSerá que fizemos algo para sermos odiadas?"
70010010-238 = "N-não é isso! Eu entrei em pânico e acabei falando. #nNão tive más intenções... é verdade."
70010010-239 = "Como conheço vocês... eu simplesmente presumi... que éramos amigos..."
70010010-241 = "Amigos...?"
70010010-242 = "Hã?"
70010010-244 = "E-esqueçam... me desculpem, por ter mencionado os nomes de vocês, de verdade..."
70010010-245 = "...Vou confessar tudo para a Presidente. #nAssumirei a responsabilidade para que vocês não sejam injustiçadas."
70010010-246 = "Eu deveria ter sido mais cautelosa... ainda mais se tratando de amigos... #nSinto muito, de verdade."
70010010-250 = "Nota 9... é isso."
70010010-251 = "Ei!! Por que uma nota tão alta!? #nSendo que você fala tão mal do meu mangá!"
70010010-252 = "Comparado à emoção de uma história humana realista, #na Meru ainda tem muito o que aprender."
70010010-253 = "Queria contar com vocês porque achei que éramos amigos... isso tocou o meu coração."
70010010-255 = "Amigos... pensar que aquela chefe do comitê de segurança diria algo assim..."
70010010-256 = "Isso é... um furo de reportagem exclusivo. Mufufufu."
70010010-258 = "Pelo visto, não éramos amigos mesmo... Foi só uma suposição minha..."
70010010-260 = "N-não, não é nada disso!"
70010010-261 = "Mesmo querendo ajudar, não fazemos ideia de como começar, sabe? Pessoal?"
70010010-262 = "Exatamente... #nMesmo mobilizando toda a força de trabalho de Red Winter, levaria 600 anos, não é? #nNão acho que nós cinco faríamos diferença..."
70010010-263 = "Não... seriam quatro, na verdade. #nA veterana Meru não tem tempo para esse tipo de coisa, tem?"
70010010-264 = "Eu já disse que estou quase terminando!"
70010010-266 = "Marina Ikekura. Membro do comitê administrativo de Red Winter e chefe do comitê de segurança..."
70010010-267 = "Então eu era considerada uma 'amiga' por um lacaio da tirania..."
70010010-273 = "Dou as boas-vindas à nossa causa como camarada!"
70010010-274 = "C-camarada!?"
70010010-276 = "Minori!?"
70010010-277 = "Ora... que reviravolta inesperada."
70010010-278 = "Eu pretendia insistir um pouco mais para tentar negociar com o comitê de segurança, mas... foi assim que as coisas terminaram..."
70010010-279 = "Diretora, mesmo que esteja buscando uma oportunidade de negócio, deveria ter um pouco mais de noção do momento."
70010010-280 = "Peço perdão. Mufufu."
70010010-282 = "...Marina, você finalmente despertou para a consciência de classe do povo, temendo a tirania do opressor."
70010010-283 = "Junte-se à linha de frente da luta! Vamos conquistar um amanhã sem preocupações com nossas próprias mãos!"
70010010-284 = "Agradeço o sentimento, mas não vejo como isso seria possível..."
70010010-285 = "Uma obra tão grandiosa... seria impossível mesmo com todo o departamento de engenharia trabalhando..."
70010010-286 = "Sinceramente, acho que preparar um golpe de estado seria mais realista..."
70010010-287 = "O que exatamente você quer, presidente Cherino? #nEntendi que é uma máquina complexa, mas..."
70010010-288 = "É o computador que vi durante a visita à EXPO de Millennium."
70010010-289 = "Ele respondia a qualquer pergunta."
70010010-291 = "Uma máquina que responde perguntas?"
70010010-292 = "Ora, isso é fácil."
70010010-297 = "...Fácil!?"
70010010-299 = "[log]1 dia antes da visita ao Departamento de Pesquisa de Engenharia de Millennium[/log]"
70010010-301 = "Chefe Marina, o dia de amanhã está chegando."
70010010-302 = "Você não pretende vir com um relatório medíocre dizendo que não conseguiu preparar nada, pretende?"
70010010-303 = "De forma alguma!"
70010010-304 = "A preparação para a demonstração já está perfeita!"
70010010-305 = "Camarada! #nAqui está o supercomputador criado com a tecnologia de ponta de Red Winter!"
70010010-311 = "Este é o supercomputador de última geração, #nnascido sob a orientação da presidente Cherino..."
70010010-312 = "O 'RFC9001'!"
70010010-314 = "RFC...?"
70010010-315 = "É a abreviação de 'Computador Federal de Red Winter', e o '9001' significa que está um passo à frente do '9000' de Millennium!"
70010010-316 = "Marina...! Eu sabia que podia confiar em você!"
70010010-323 = "Muito bem!!"
70010010-324 = "(O elogio da presidente Cherino...! Há quanto tempo eu não ouvia isso!)"
70010010-325 = "C-cof! Por questões de segurança, a entrada de dados é feita por escrito. #nPor favor, insira o papel com a pergunta nesta abertura."
70010010-327 = "Ele também responde qualquer coisa, igual àquele de Millennium, né?"
70010010-328 = "Então... #n'Quem é a líder suprema da Academia Federal de Red Winter?'"
70010010-334 = "O que foi? Nem isso ele consegue responder?"
70010010-336 = "E-ele foi configurado para usar uma linguagem formal, então levará um momento!"
70010010-337 = "Por favor, aguarde um instante..."
70010010-342 = "Saiu!"
70010010-343 = "'A presidente do conselho estudantil da Academia Federal de Red Winter, diretora do departamento de embelezamento ambiental, secretária-geral, diretora do departamento de limpeza, representante do departamento de esportes, chefe do comitê disciplinar, diretora do departamento de merenda escolar e...'"
70010010-344 = "'...também a provadora de pudim mais talentosa deste mês e presidente da Academia de Ciências de Red Winter, a senhorita Cherino.'"
70010010-345 = "Oh! Ele conhece todos os meus títulos perfeitamente!"
70010010-347 = "Isso é só o começo!"
70010010-348 = "Porque sou um supercomputador de altíssimo desempenho, que aprendeu exatamente como um humano!"
70010010-349 = "（“Exatamente como um humano”... É claro. Afinal de contas—）"
70010010-351 = "Dentro da caixa"
70010010-352 = "Isso serve, não serve?"
70010010-354 = "Nossa, você se lembra bem de algo tão longo assim."
70010010-355 = "No departamento editorial, é um incômodo digitar tudo toda vez, então fizemos versões impressas dos títulos."
70010010-356 = "Tipo uma cena de banco de dados?"
70010010-358 = "Conheça seu inimigo e conheça a si mesmo, e você não estará em perigo em cem batalhas. #nEntender com precisão os títulos dos opressores é o básico da revolução!"
70010010-359 = "Shiu, shiu...! Por favor, não faça tanto barulho! #nVamos acabar sendo descobertos aqui dentro da caixa!?"
70010010-360 = "Fique tranquila! Esta é uma caixa à prova de som especial feita pelo número 183. #nEla foi projetada para que nenhum som escape."
70010010-361 = "Nós só precisamos verificar o que está acontecendo lá fora através do microfone externo e do visor."
70010010-362 = "Isso é loucura demais, não importa como você olhe! #nSe formos descobertos... talvez tenhamos que viver aqui dentro até nos formarmos..."
70010010-364 = "Até que é confortável, de certa forma... estou começando a ficar com sono... mufu..."
70010010-365 = "...Fu..."
70010010-366 = "Isso não é apenas falta de oxigênio!?"
70010010-367 = "Para começar, precisávamos mesmo entrar todos aqui?"
70010010-369 = "Porque há um limite para o que uma pessoa pode responder sozinha."
70010010-370 = "Além disso, não poderíamos simplesmente ignorar um camarada em apuros, poderíamos?"
70010010-371 = "Acho que 'não poderíamos deixar uma tragédia acontecer' seria mais preciso."
70010010-372 = "Se eu soubesse que esse plano não valia nem dois pontos, #nnão teria colaborado desde o início!"
70010010-374 = "Entendo. Então a Takane sentiu compaixão."
70010010-375 = "Alguma palavra da escritora que quebra prazos e veio aqui brincar usando a busca por material como desculpa?"
70010010-376 = "Ugh...! O prazo à minha frente é importante, mas coletar material para o futuro também é essencial e—"
70010010-378 = "A próxima pergunta está vindo!"
70010010-380 = "（Será que o pessoal lá dentro está bem...）"
70010010-381 = "（Se descobrirem... talvez até eu acabe sendo colocada na caixa...!）"
70010010-383 = "Desta vez, vamos fazer uma difícil! Preparei um problema de matemática!"
70010010-384 = "É um problema recomendado pela academia. Com um desempenho medíocre, não deveria ser possível responder!"
70010010-386 = "（Um problema de nível acadêmico!? I-isso é ruim!）"
70010010-388 = "Também recebi o manual de soluções. Muito bem, vamos testar isso imediatamente!"
70010010-393 = "P-Presidente! E-eu, claro que tenho confiança, mas...!"
70010010-394 = "Hum? Existe algum problema?"
70010010-395 = "Bem, na verdade...!"
70010010-396 = "（Eu sabia que era uma loucura... talvez fosse melhor confessar antes que descubram...!）"
70010010-397 = "Sinto muito mesmo! Por favor, me perdoe—"
70010010-402 = "Oh! A resposta saiu!"
70010010-404 = "—e... espere, o quê?"
70010010-406 = "Vejamos..."
70010010-407 = "Não entendo muito bem o conteúdo, mas é igual ao gabarito."
70010010-408 = "Marina! Isso é incrível!"
70010010-409 = "E então... você não ia dizer algo?"
70010010-411 = "（...Acertou? Tão rápido assim!?）"
70010010-412 = "N-não! Obrigado por preparar o problema!"
70010010-413 = "Sim. A verificação também é um trabalho importante como presidente. Isso é o mínimo! Hahaha!"
70010010-414 = "A-ahahaha! Hahaha!"
70010010-416 = "O-o problema de agora! Foi a Minori quem resolveu!?"
70010010-417 = "Eu tive a impressão de que havia mais símbolos do que números!?"
70010010-418 = "Ela começou a resolver no meio do caminho enquanto o papel entrava, não foi?"
70010010-420 = "Não pretendo ser modesta, mas era um problema comum, não era?"
70010010-422 = "E ainda por cima acertou... foi uma atuação nota dez!"
70010010-423 = "Mufufu, um sucesso absoluto, não é?"
70010010-425 = "Diretora Minori, você conseguiu estudar... isso é incrível..."
70010010-426 = "As correntes da opressão devem ser cortadas com uma vontade de aço e uma inteligência ardente como o fogo!"
70010010-427 = "Como esperado da pessoa mais perigosa de Red Winter. O que você diz é realmente diferente. Mufufufu."
70010010-429 = "Pergunta, lá vem outra!"
70010010-443 = "(Até aqui, consegui enrolar de alguma forma, mas...)"
70010010-444 = "(Por que será... sinto um mau pressentimento...)"
