[translation]
33130-1 = "Episódio 13; O Lado Inalcançável"
33130-2 = "......"
33130-3 = "A Hanako é inteligente."
33130-4 = "Apenas com as informações espalhadas pelo tabuleiro, ela com certeza conseguiria chegar bem perto da verdade."
33130-5 = "A situação que está se desenrolando agora, a causa dela e o fato de que ela não tem meios para impedir isso. Ela já deve ter entendido tudo."
33130-6 = "A Academia Trinity, que ela finalmente passou a gostar... Ter que assistir ao seu fim sem poder fazer nada é algo cruel para a Hanako."
33130-7 = "......"
33130-8 = "E parece que ela não é a única chegando a essa conclusão. Bem, dizer que ela 'não está sozinha' aqui definitivamente não significa que há esperança."
33130-9 = "Hifumi, que estava correndo de um lado para o outro procurando a Azusa... ela também parece estar chegando a uma conclusão parecida."
33130-10 = "Uma mensagem. Coordenadas, um horário e códigos usando nomes de animais. Ela não seria boba a ponto de não perceber quem enviaria uma mensagem assim."
33130-17 = "Azusa-chan...?"
33130-18 = "Azusa-chan, sou eu. Onde você está...?"
33130-19 = "Azusa-chan... por favor, me responda, Azusa-chan...!"
33130-25 = "Azusa... chan...?"
33130-26 = "......Hifumi."
33130-27 = "Azusa-chan, onde você estava até agora...? A escola está uma loucura..."
33130-28 = "......Sim, eu sei."
33130-29 = "Azusa-chan...?"
33130-30 = "......Alguém precisa impedir isso."
33130-31 = "Como assim...? Por que você está com essa cara...?"
33130-32 = "Azusa-chan..."
33130-38 = "Não se aproxime!!"
33130-39 = "......!!"
33130-40 = "......"
33130-41 = "......Obrigada, Hifumi."
33130-42 = "Mas é até aqui. Você não pode passar daqui."
33130-43 = "Daqui para frente, é o meu lugar."
33130-44 = "Alguém boa como você, Hifumi, não deve vir mais adiante."
33130-45 = "A-Azusa-chan...? Do... do que você está falando...?"
33130-46 = "Por que não pode ser eu...?"
33130-50 = "......Essa história não combina com uma garota normal e gentil como você, Hifumi."
33130-51 = "Azusa-chan, eu...!"
33130-52 = "'Assassina'."
33130-53 = "......!"
33130-54 = "......Agora que me tornei uma assassina, não podemos mais ser amigas, não é?"
33130-55 = "A-Azusa-chan...?"
33130-56 = "M-Mas, mas você não é assim..."
33130-57 = "A culpa é minha."
33130-58 = "Foi por minha causa que todo mundo se machucou... e o Sensei foi baleado."
33130-59 = "O Comitê de Realização da Justiça, a Tea Party, a Irmandade e até o pessoal de Gehenna..."
33130-60 = "A Seia estar em coma, a academia ter sido destruída até esse ponto... tudo é culpa minha."
33130-61 = "Hifumi, Hanako e Koharu. Se continuar assim, vocês também correrão perigo."
33130-63 = "I-Isso não é culpa sua, Azusa-chan... isso é..."
33130-64 = "V-Vai ficar tudo bem. O-O Sensei vai..."
33130-65 = "O Sensei com certeza vai acordar logo, então... então...!"
33130-66 = "Hifumi."
33130-67 = "Esse tipo de final feliz... não existe neste mundo."
33130-68 = "......"
33130-69 = "A partir de agora, eu vou 'destruir' o halo da Saori."
33130-70 = "Não há outra forma de impedir essa situação."
33130-71 = "E-Espera, uma forma... com certeza deve haver uma forma...!"
33130-77 = "Eu vou matar uma pessoa agora."
33130-78 = "Alguém que foi ensinada que isso é o normal em um lugar onde isso é o normal, treinada para agir como se isso fosse a coisa mais normal do mundo..."
33130-79 = "Essa é a verdadeira eu."
33130-80 = "Alguém como eu não pode ficar no mesmo mundo que você, Hifumi."
33130-81 = "Azusa... chan...?"
33130-86 = "......Hifumi. Obrigada por me considerar sua amiga."
33130-89 = "Obrigada por me chamar de 'Azusa-chan'."
33130-92 = "Obrigada por me dar bichinhos de pelúcia fofos."
33130-97 = "Obrigada por me levar à praia. Obrigada por me dar memórias tão divertidas."
33130-100 = "Obrigada por me ensinar que existem coisas fofas,"
33130-101 = "coisas bonitas e coisas que eu ainda não conhecia."
33130-106 = "Todos os dias no Clube de Reposição..."
33130-107 = "Foi tão bom passar dias tão incríveis e poder aprender tantas coisas."
33130-111 = "Aprender foi algo muito divertido... Eu nunca vou esquecer o tempo que passamos, nem que eu morra."
33130-112 = "Fico feliz por ter sido uma aluna do Clube de Reposição, mesmo que por pouco tempo..."
33130-117 = "Obrigada, Hifumi. Adeus."
33130-121 = "Azusa... chan..."
33130-122 = "Não, espera, por favor, espera..."
33130-123 = "Com certeza, deve ter outro jeito... O-O Sensei, o pessoal..."
33130-124 = "Porque... Porque a gente ainda..."
33130-125 = "A gente prometeu que 'da próxima vez vamos todas juntas pra praia'... A gente ainda nem assistiu o anime das aventuras do Peroro-sama juntas..."
33130-126 = "N-Não vai, por favor..."
33130-127 = "Azusa-chan... não, não vai... por favor, espera, Azusa-chan..."
33130-129 = "Azusa-chan!!!!"
33130-135 = "Próximo Episódio; Na Escuridão"