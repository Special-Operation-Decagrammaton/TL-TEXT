[translation]
33130-1 = "Episódio 13; O Lado Inalcançável"
33130-2 = "……."
33130-3 = "Hanako é inteligente."
33130-4 = "Mesmo apenas com as informações espalhadas pelo tabuleiro, ela certamente conseguirá chegar bem perto da verdade."
33130-5 = "A situação que se desenrola agora, a causa disso, e até mesmo o fato de que não há nada que eu possa fazer para impedir... Ela deve ter entendido tudo."
33130-6 = "A Trinity, que ela finalmente aprendeu a amar... ter que assistir ao seu fim sem poder fazer nada é algo cruel para a Hanako."
33130-7 = "……."
33130-8 = "E parece que ela não é a única que está chegando a essa conclusão. Bem, dizer que 'não é a única' aqui não significa que haja esperança."
33130-9 = "Hifumi, que estava correndo por toda parte procurando por Azusa... ela também parece estar chegando a uma conclusão semelhante."
33130-10 = "Uma única mensagem. Coordenadas, horário e um código usando nomes de animais. Ela não é do tipo que não perceberia quem é a pessoa que enviaria uma mensagem dessas."
33130-17 = "Azusa...?"
33130-18 = "Azusa, sou eu. Onde você está...?"
33130-19 = "Azusa... responda, Azusa...!"
33130-25 = "Azusa...?"
33130-26 = "……Hifumi."
33130-27 = "Azusa, onde você esteve até agora... A escola está um caos..."
33130-28 = "……Sim, eu sei."
33130-29 = "Azusa...?"
33130-30 = "……Alguém precisa parar com isso."
33130-31 = "O que isso significa... Por que você está com essa cara...?"
33130-32 = "Azusa..."
33130-38 = "Não chegue perto!!"
33130-39 = "……!!"
33130-40 = "……."
33130-41 = "……Obrigada, Hifumi."
33130-42 = "Mas é aqui que termina. Você não deve vir além daqui."
33130-43 = "Daqui para frente, é o meu lugar."
33130-44 = "Alguém bondosa como a Hifumi não deve vir mais longe."
33130-45 = "A-Azusa...? Do que, do que você está falando...?"
33130-46 = "O que há de errado comigo...?"
33130-50 = "……Essa não é uma história para uma Hifumi comum e gentil."
33130-51 = "Azusa, eu...!"
33130-52 = "“Assassina”"
33130-53 = "……!"
33130-54 = "……Agora que me tornei uma assassina, não podemos mais ser amigas, certo?"
33130-55 = "A-Azusa...?"
33130-56 = "Mas, mas a Azusa não é assim..."
33130-57 = "É minha culpa."
33130-58 = "Por minha causa, todos se machucaram... O Sensei foi baleado."
33130-59 = "O Comitê de Justiça, o Chá das Cinco, a Irmandade, e até mesmo o pessoal de Gehenna..."
33130-60 = "O fato de Seia ter entrado em coma e a escola ter sido destruída até este ponto... é tudo culpa minha."
33130-61 = "Hifumi, e também Hanako e Koharu. Se continuar assim, todos vocês estarão em perigo."
33130-63 = "I-Isso não é culpa sua, Azusa... Isso é..."
33130-64 = "E-Está tudo bem. O, o Sensei..."
33130-65 = "O Sensei certamente vai acordar logo, e... por isso...!"
33130-66 = "Hifumi."
33130-67 = "Esse tipo de final feliz... não existe neste mundo."
33130-68 = "……."
33130-69 = "Vou agora para "destruir" o halo de Saori."
33130-70 = "Não há outra maneira de parar esta situação."
33130-71 = "E-espere, um jeito... se for um jeito, com certeza...!"
33130-77 = "Eu vou matar alguém agora."
33130-78 = "Um lugar onde isso é natural, onde me ensinaram que isso é natural, uma existência treinada para agir como se isso fosse natural..."
33130-79 = "Essa é a verdadeira eu."
33130-80 = "Alguém como eu não pode estar no mesmo mundo que a Hifumi."
33130-81 = "Azusa... chan...?"
33130-86 = "...Hifumi. Obrigada por me considerar sua amiga."
33130-89 = "Obrigada por me chamar de 'Azusa-chan'."
33130-92 = "Obrigada por me dar um bicho de pelúcia tão fofo."
33130-97 = "Obrigada por me levar à praia. Obrigada pelas memórias divertidas."
33130-100 = "Obrigada por me ensinar que existem coisas fofas,"
33130-101 = "coisas lindas e coisas que eu desconhecia."
33130-106 = "Os dias no Clube de Reforço..."
33130-107 = "Foi muito bom passar dias tão maravilhosos e aprender tantas coisas."
33130-111 = "Aprender era algo realmente divertido... Eu nunca vou esquecer esse tempo, nem mesmo se eu morrer."
33130-112 = "Fico feliz por ter sido uma aluna do Clube de Reforço, mesmo que por pouco tempo..."
33130-117 = "Obrigada, Hifumi. Adeus."
33130-121 = "Azusa... chan..."
33130-122 = "Não, espere, por favor, espere..."
33130-123 = "Com certeza deve haver outro jeito... O-o Sensei, todos nós..."
33130-124 = "Porque... porque, ainda..."
33130-125 = "Nós prometemos que 'da próxima vez iríamos todos juntos à praia', não foi? Nós ainda nem assistimos ao anime de aventuras do Peroro-sama juntos..."
33130-126 = "N-não vá embora..."
33130-127 = "Azusa-chan... não, não vá... espere, Azusa-chan..."
33130-129 = "Azusa-chan!!!!"
33130-135 = "Próximo episódio: Na escuridão"
