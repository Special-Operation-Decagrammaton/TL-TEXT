[translation]
33130-1 = "Episódio 13;O Outro Lado Inalcançável"
33130-2 = "……."
33130-3 = "A Hanako é inteligente."
33130-4 = "Só com as informações caídas no tabuleiro, ela, de fato, é capaz de chegar bem ao lado da verdade."
33130-5 = "A situação que agora se desenrola, a sua causa, e até o fato de que ela mesma não tem meios de impedi-la. Ela deve ter compreendido tudo."
33130-6 = "A Academia Geral de Trinity, de que ela enfim conseguiu gostar…… só poder assistir ao fim dela, sem nada a fazer, é uma história cruel pra Hanako."
33130-7 = "……."
33130-8 = "E quem está prestes a chegar lá parece não ser só uma. Bom, esse \"não ser só uma\", aqui, não significa, de forma alguma, uma história com esperança."
33130-9 = "A Hifumi, que corria de um lado pro outro procurando a Azusa…… ela também parece estar alcançando uma conclusão parecida."
33130-10 = "Uma única mensagem. Coordenadas e horário, e um código usando nome de animal. Quem seria o remetente de uma mensagem dessas; ela não é de não perceber."
33130-17 = "Azusa……?"
33130-18 = "Azusa, sou eu. Onde você está……?"
33130-19 = "Azusa…… responde, Azusa……!"
33130-25 = "A-zu-sa……?"
33130-26 = "……Hifumi."
33130-27 = "Azusa, onde você esteve até agora…… a academia tá num alvoroço……."
33130-28 = "……Sim, eu sei."
33130-29 = "Azusa……?"
33130-30 = "……Isto, alguém precisa deter."
33130-31 = "O que isso quer…… por que essa cara……."
33130-32 = "Azusa……"
33130-38 = "Não chega perto!!"
33130-39 = "……!!"
33130-40 = "……."
33130-41 = "……Obrigada, Hifumi."
33130-42 = "Mas é até aqui. Daqui pra frente, você não pode vir."
33130-43 = "Daqui pra frente é o meu lugar."
33130-44 = "Uma pessoa bondosa como você, Hifumi, não pode ir além."
33130-45 = "A-Azusa……? Do que, do que você tá falando……?"
33130-46 = "O que é que eu tenho de errado……?"
33130-50 = "……É uma história que não combina com a Hifumi, comum e gentil."
33130-51 = "Azusa, eu……!"
33130-52 = "\"Assassina\"."
33130-53 = "……!"
33130-54 = "……Eu, virando assassina, já não posso mais ser sua amiga, posso?"
33130-55 = "A-Azusa……?"
33130-56 = "Mas, mas você não é desse……"
33130-57 = "É culpa minha."
33130-58 = "Por minha culpa, todo mundo se machucou…… e o Sensei foi baleado."
33130-59 = "O Comitê de Realização da Justiça, o Tea Party, a Sisterhood, e o pessoal de Gehenna também……"
33130-60 = "A Seia ter entrado em coma, a academia ter sido destruída a este ponto…… é tudo, tudo culpa minha."
33130-61 = "Hifumi, e a Hanako e a Koharu também. Do jeito que vai, até vocês vão acabar em perigo."
33130-63 = "I-isso não é culpa sua, Azusa…… isso é……"
33130-64 = "T-tá tudo bem. O-o Sensei……"
33130-65 = "O Sensei também, com certeza, vai acordar logo…… então……!"
33130-66 = "Hifumi."
33130-67 = "Um final feliz desses…… não existe neste mundo."
33130-68 = "……."
33130-69 = "A partir de agora, eu vou \"destruir\" a aureola da Saori."
33130-70 = "Fora isso, não há método pra deter esta situação."
33130-71 = "E-espera, um método…… um método, com certeza……!"
33130-77 = "Eu vou, agora, matar uma pessoa."
33130-78 = "Uma existência criada num lugar onde isso é o normal, ensinada de que isso é o normal, e treinada pra agir como se isso fosse o normal……."
33130-79 = "Essa é a verdadeira eu."
33130-80 = "Alguém assim como eu não pode ficar no mesmo mundo que a Hifumi."
33130-81 = "A-zu-sa……?"
33130-86 = "……Hifumi. Obrigada por me considerar sua amiga."
33130-89 = "Obrigada por me chamar de \"Azusa\"."
33130-92 = "Obrigada por me dar um pelúcia fofo."
33130-97 = "Obrigada por me levar ao mar. Obrigada por me dar memórias felizes."
33130-100 = "Obrigada por me ensinar que existem coisas fofas, coisas bonitas,"
33130-101 = "coisas que eu não conhecia."
33130-106 = "Os dias no Clube de Aulas de Reforço……"
33130-107 = "Que bom ter vivido dias tão maravilhosos, ter aprendido tanta coisa."
33130-111 = "Aprender era uma coisa boa de verdade…… o tempo que passamos, nem morta eu esqueço."
33130-112 = "Que bom ter podido ser, nem que por um pouquinho, uma aluna do Clube de Aulas de Reforço……."
33130-117 = "Obrigada, Hifumi. Adeus."
33130-121 = "A-zu-sa……."
33130-122 = "Não pode; espera, espera, por favor……."
33130-123 = "Com certeza tem outro jeito…… o-o Sensei, todo mundo……."
33130-124 = "Porque…… porque, ainda……"
33130-125 = "\"Da próxima, vamos todos juntos ao mar\", a gente prometeu, não prometeu……? A gente ainda nem viu junto o anime de aventura do senhor Peroro……"
33130-126 = "N-não vai, por favor……"
33130-127 = "Azusa…… não pode, não vai…… espera, Azusa……"
33130-129 = "Azusaaa!!!!"
33130-135 = "Próximo Episódio;Dentro da Escuridão"
