[translation]
1004003-1 = "Talvez não seja tão ruim assim."
1004003-2 = "（Cheguei ao local de encontro com Tsukuyo）"
1004003-3 = "（Enquanto pensava que havia mais gente do que o esperado, vi a figura de Tsukuyo ao longe）"
1004003-4 = "27 anos e 4 meses de experiência como olheiro de modelos... Meu instinto está me dizendo! Você com certeza pode ser uma estrela!"
1004003-5 = "Sim... a melhor e mais alta modelo de Kivotos!"
1004003-7 = "Eu, na verdade, não quero ser modelo, eu quero ser uma ninja..."
1004003-8 = "...Ninja? Haha, que coisa engraçada de se dizer."
1004003-9 = "Mas, pensando bem, esse tipo de personalidade também é interessante, não é?"
1004003-10 = "Não, não é isso...!"
1004003-11 = "Ah,"
1004003-12 = "Sensei...!?"
1004003-13 = "[s] \"Poderia me dar licença um instante?\""
1004003-18 = "Ah..."
1004003-27 = "E-espere aí. Eu não sou uma pessoa suspeita, de jeito nenhum. É que a sua aura de diamante bruto, o seu brilho como talento... espere, espere! Por favor, espere!"
1004003-28 = "Futura superestrelaaaaaa!!"
1004003-30 = "[ns1] \"Acho que estamos seguros agora que chegamos aqui.\"\n[ns2] \"Você está bem, Tsukuyo? Se machucou?\""
1004003-31 = "Obrigada... eu não me machuquei, mas..."
1004003-32 = "Obrigada... eu não me machuquei, mas..."
1004003-33 = "U-uwaaaaaan!!"
1004003-34 = "Eu fiquei com medo...! Sensei...!"
1004003-35 = "Snif... como eu tenho esse corpo, acabo sempre me envolvendo em situações estranhas..."
1004003-36 = "E acabei causando problemas para você também, Sensei..."
1004003-37 = "[s] \"Não é problema nenhum, de verdade.\""
1004003-38 = "É mesmo...?"
1004003-39 = "Se for assim, fico aliviada... é que eu sempre sou assim..."
1004003-40 = "Como sou maior que as outras pessoas, acabo chamando atenção..."
1004003-41 = "Sempre acabo sendo abordada por gente estranha ou me metendo em confusão..."
1004003-42 = "Na semana passada, enquanto eu caminhava pela rua, o pessoal do Grupo do Capacete..."
1004003-43 = "\"Que porte físico incrível! Acho que um capacete ficaria ótimo em você! O que acha!?\""
1004003-44 = "Disseram isso... e eu fiquei tão assustada que saí correndo..."
1004003-45 = "Falaram comigo tão de repente que minha mente ficou em branco..."
1004003-46 = "[s3] \"Então é assim que o Grupo do Capacete recruta pessoas...\"\n[s4] \"É normal a mente ficar em branco quando alguém te aborda do nada...\""
1004003-47 = "Sim... especialmente porque eu entro em pânico muito fácil..."
1004003-48 = "Sim... especialmente porque eu entro em pânico muito fácil..."
1004003-49 = "Além disso, existem vários outros problemas..."
1004003-50 = "Por isso, eu sinto que, no fim das contas, sou um incômodo para você, Sensei..."
1004003-51 = "Só de estar aqui, acabo bloqueando a visão das pessoas..."
1004003-52 = "E fora isso, sinto que várias outras coisas problemáticas podem acontecer..."
1004003-53 = "Desculpe por ser tão alta..."
1004003-54 = "[s5] （A autoestima dela é bem baixa...）\n[s6] \"E-está tudo bem! Você não fez nada de errado!\""
1004003-55 = "Mas, eu..."
1004003-56 = "Mas, eu..."
1004003-57 = "[s] \"Tsukuyo, que tal tentar olhar para isso de uma perspectiva diferente?\""
1004003-58 = "Uma perspectiva diferente...?"
1004003-59 = "[s7] \"Tsukuyo, você pode ser um pouco mais alta que os outros.\"\n[s8] \"Mas é justamente por isso que acho que você consegue ver coisas que os outros não veem.\""
1004003-60 = "Coisas que os outros... não veem...?"
1004003-61 = "Coisas que os outros... não veem...?"
1004003-62 = "...Err, Sensei?"
1004003-68 = "Hya... err, Sensei...!?"
1004003-69 = "[s] \"Por que não tenta endireitar um pouco a postura? Talvez você consiga ver muitas outras coisas.\""
1004003-70 = "Ah..."
1004003-71 = "Manter a postura... ereta..."
1004003-72 = "............"
1004003-73 = "Waaaaah! Irmãzinha, onde você está~?!"
1004003-74 = "...! Sensei, tem uma criança chorando ali, na sombra...!"
1004003-75 = "[s] \"Oh, é hora da ninja agir! Vamos ajudá-la!\""
1004003-76 = "Ah... sim!"
1004003-82 = "(Assim, junto com Tsukuyo, decidimos ajudar a garotinha que estava chorando por ter se perdido da irmã.)"
1004003-84 = "Muito obrigada por trazer minha irmãzinha de volta! Eu realmente não sei como agradecer...!"
1004003-85 = "Não, não precisa... afinal, eu sou uma ninja. Isso é apenas... o meu dever...!"
1004003-86 = "Ni-ninja...?"
1004003-87 = "Obrigada, moça alta!"
1004003-88 = "Ah, essa menina! Que falta de educação...!"
1004003-89 = "Não, está tudo bem. Foi justamente por eu ser alta que consegui encontrá-la...!"
1004003-90 = "Bem, sendo assim, até mais! ...Da próxima vez, não solte a mão da sua irmã, tá bom?"
1004003-91 = "Tá, prometo! Tchauzinho!"
1004003-96 = "[ns] \"Você foi incrível, Tsukuyo.\""
1004003-97 = "...Como o Sensei disse, foi exatamente assim."
1004003-98 = "Eu sempre achei que ser alta só trazia problemas..."
1004003-99 = "Por isso eu vivia curvada, olhando sempre para baixo para evitar contato visual... tentando, pelo menos, não atrapalhar ninguém..."
1004003-100 = "Mas, como eu sou alta... consegui ver coisas que os outros não viam..."
1004003-101 = "Muito obrigada, Sensei...!"
1004003-102 = "[s] \"Não, eu não fiz nada.\""
1004003-103 = "Não, foi graças ao Sensei. Sinto que meu campo de visão se abriu um pouco."
1004003-104 = "Por isso, daqui em diante...!"
1004003-105 = "Ah! Encontrei você, a futura superestrela!"
1004003-106 = "...?"
1004003-110 = "Hehe, dessa vez você não escapa...! Escute, você tem um talento que brilha como a luz do sol, capaz de iluminar todo este Kivotos!"
1004003-112 = "De novo, não...!?"
1004003-113 = "Ugh... realmente, ser alta é um problema...!"
1004003-117 = "[ns] \"E-espere! Tsukuyo...!\""
1004003-119 = "(Depois disso, alcancei Tsukuyo e fiquei com ela até que se acalmasse.)"
