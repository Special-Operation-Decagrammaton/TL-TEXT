[translation]
1004003-1 = "悪くないかも、です"
1004003-2 = "（ツクヨとの待ち合わせ場所に到着した）"
1004003-3 = "（思ったより人手が多いなあと考えていると、向こうの方にツクヨの姿が見えた）"
1004003-4 = "モデルスカウト歴27年4ヶ月……その私の勘が告げている！君は、きっとスターになれる！"
1004003-5 = "そう……キヴォトス最高の、長身モデルに！"
1004003-7 = "私はその、モデルではなく、忍者になりたくて……。"
1004003-8 = "……忍者？ははっ、面白いことを言う。"
1004003-9 = "しかしなるほど、そういうキャラ付けもありだね？"
1004003-10 = "いえ、そうではなく……！"
1004003-11 = "あっ、"
1004003-12 = "先生……！？"
1004003-13 = "[s] \"ちょっと良いですか？\""
1004003-18 = "あっ……。"
1004003-27 = "ま、待ちたまえ。私は決して怪しい者ではない。本当にそこの彼女の、才能の原石としてのきらめきにちょっと待った、待って！待ってください！"
1004003-28 = "未来のスーパースタぁぁぁぁぁぁっ！！"
1004003-30 = "[ns1] \"ここまで来れば大丈夫かな。\"\n[ns2] \"ツクヨ大丈夫？怪我とかない？\""
1004003-31 = "ありがとう、ございます……怪我とかは、無いのですが……。"
1004003-32 = "ありがとう、ございます……怪我とかは、無いのですが……。"
1004003-33 = "う、うわああぁぁん！！"
1004003-34 = "怖かった、です……！先生……！"
1004003-35 = "ぐすっ……私がこんな身体だから、変なことに、巻き込まれがちで……。"
1004003-36 = "先生にも、迷惑を、かけてしまって……。"
1004003-37 = "[s] \"全然迷惑なんかじゃないよ。\""
1004003-38 = "そう、なんですか……？"
1004003-39 = "なら、良かったのですが……私、いつも、こんな感じで……。"
1004003-40 = "人より大きいので、目立ちますし……。"
1004003-41 = "よく変な人に捕まったり、巻き込まれたり……。"
1004003-42 = "先週も、道を歩いていたら、ヘルメット団の、みなさんが……。"
1004003-43 = "「良い体格してんねえ！ヘルメットとか似合いそうじゃん！どう！？」"
1004003-44 = "って……それで、びっくりして、逃げてしまって……。"
1004003-45 = "急に話しかけられて、頭の中が真っ白に、なっちゃって……。"
1004003-46 = "[s3] \"ヘルメット団って、そうやって勧誘してるんだ……。\"\n[s4] \"急に声をかけられると、頭の中が真っ白になるよね……。\""
1004003-47 = "はい……特に私は、すぐパニックに、なってしまって……。"
1004003-48 = "はい……特に私は、すぐパニックに、なってしまって……。"
1004003-49 = "それ以外にも、色々と問題が……。"
1004003-50 = "なので、私、やっぱり先生にも、迷惑なんじゃないかって……。"
1004003-51 = "こうしてるだけで、視界を、塞いでしまいますし……。"
1004003-52 = "それ以外にも色々、困ったことが起きてしまいそう、で……。"
1004003-53 = "すみません、背が高くて……。"
1004003-54 = "[s5] （自己評価がだいぶ低い……）\n[s6] \"だ、大丈夫！何も悪くないよ！\""
1004003-55 = "ですが、私……。"
1004003-56 = "ですが、私……。"
1004003-57 = "[s] \"ツクヨ、少し違った方向に考えてみるのはどうかな？\""
1004003-58 = "違った方向、とは……？"
1004003-59 = "[s7] \"ツクヨはみんなより少し背が高いかもしれないけど。\"\n[s8] \"だからこそ、他の人には見えてないものも見えると思う。＂"
1004003-60 = "他の人には、見えてない、もの……？"
1004003-61 = "他の人には、見えてない、もの……？"
1004003-62 = "……えっと、先生？"
1004003-68 = "ひゃっ……えっと、先生……！？"
1004003-69 = "[s] \"もう少し背筋を伸ばしてみたら？色んなものが見えるかも。\""
1004003-70 = "あ……。"
1004003-71 = "背筋を、伸ばす……。"
1004003-72 = "…………。"
1004003-73 = "うわああん！おねえちゃーん、どこ～！？"
1004003-74 = "……！先生、あそこの陰のところに、泣いてる子が……！"
1004003-75 = "[s] \"お、忍者の出番だね！助けよう！\""
1004003-76 = "あっ……はい！"
1004003-82 = "（そうやってツクヨと一緒に、姉とはぐれて泣いている女の子を助けることになった）"
1004003-84 = "妹を連れてきてくださり、ありがとうございます！本当に、どうお礼を言えば……！"
1004003-85 = "いえ、そんな……忍者、ですので。これくらいは、当然のこと、です……！"
1004003-86 = "に、忍者……？"
1004003-87 = "大きいおねえちゃん、ありがとう！"
1004003-88 = "あっ、この子ったら！失礼なことを……！"
1004003-89 = "いえ、大丈夫です。身長が高かったからこそ、この子を、見つけられたので……！"
1004003-90 = "それでは、これにて！……次はお姉ちゃんの手、離さないようにね？"
1004003-91 = "うん、約束！バイバーイ！"
1004003-96 = "[ns] \"カッコ良かったよ、ツクヨ。\""
1004003-97 = "……先生の、おっしゃる通り、でした。"
1004003-98 = "背が高くて、嫌なことがたくさんだなって、思ってましたが……。"
1004003-99 = "それでつい背中も丸まって、視線を避けるために、下ばかり向いて……せめて少しでも、邪魔にならないように、と……。"
1004003-100 = "ですが、私の背が、大きかったから……他の人とは、違うものが……。"
1004003-101 = "ありがとう、ございます、先生……！"
1004003-102 = "[s] \"ううん、私は何もしてないよ。\""
1004003-103 = "いえ、先生の、おかげです。視界が少し、広がったような気がします。"
1004003-104 = "なので、これからも……！"
1004003-105 = "ああっ！見つけた、未来のスーパースター！"
1004003-106 = "……？"
1004003-110 = "ふふっ、今度こそ逃さないぞ……！聞いてくれ、君はこのキヴォトスを明るく照らす、サンライトのような才能を持っているんだ！"
1004003-112 = "また、ですか……！？"
1004003-113 = "うぅ……やっぱり、大きいのは、困りものです……！"
1004003-117 = "[ns] \"ま、待って！ツクヨ……！\""
1004003-119 = "（その後ツクヨに追いついて、落ち着くまで一緒にいた）"
