[translation]
10015030-1 = "Episódio 3: O Treinador do Millennium"
10015030-5 = "Anexo Oeste do Millennium"
10015030-6 = "（Enquanto faço a ronda pelos clubes com a Noa e peço ajuda com as tarefas do Festival Esportivo...）"
10015030-7 = "Bem... o reparo dos equipamentos quebrados ficou com o Clube de Engenharia, e as tarefas de computação com o Veritas..."
10015030-8 = "O que resta agora é a verificação das condições dos atletas e a organização das inscrições."
10015030-9 = "[s] \"Verificação de condições?\""
10015030-10 = "Sim. Para garantir que os atletas tenham o melhor desempenho possível nas partidas, verificar e apoiar as condições individuais também é trabalho do Seminar."
10015030-11 = "No entanto, como o pessoal do Seminar, inclusive eu, somos leigos nessas áreas... estamos contando com a colaboração do \"Clube de Treinamento\"."
10015030-12 = "……A esta hora, provavelmente elas devem estar fazendo os últimos ajustes."
10015030-16 = "Que tal darmos uma passada no centro de fitness para apoiar os atletas?"
10015030-23 = "Centro de Fitness do Millennium"
10015030-24 = "Joguem o quadril para trás, e mantenham os joelhos alinhados com a ponta dos pés!"
10015030-25 = "Vamos lá, mais 2 séries de agachamento!"
10015030-26 = "Es-espera um pouco, Chefe Sumire!#nVocê disse que aquela era a última série, não disse!?"
10015030-27 = "É verdade!#nE você não tinha dito que a anterior também era a última!?"
10015030-28 = "O agachamento com barra é um exercício que utiliza pesos para sobrecarregar os músculos e estimular o crescimento..."
10015030-29 = "Preparei barras de baixo peso para as iniciantes, mas o treinamento repetitivo é essencial para fornecer o estímulo adequado."
10015030-30 = "Para alcançarmos bons resultados no Festival Esportivo, vamos nos esforçar juntas até o fim sem desistir!"
10015030-32 = "Se continuarmos com esse treinamento rigoroso..."
10015030-33 = "Vamos desmaiar antes mesmo do festival começar..."
10015030-38 = "……Já está nesse horário, hein."
10015030-39 = "Bem então... depois de um breve descanso, vamos retomar o treinamento."
10015030-45 = "Fufu, a Sumire continua rigorosa como sempre."
10015030-46 = "Ué? Noa... e o Treinador?"
10015030-47 = "O que fazem aqui a esta hora?"
10015030-48 = "Viemos verificar como estão os atletas, aproveitando a inspeção final para o Festival Esportivo de amanhã."
10015030-49 = "Obrigada pelo trabalho duro treinando até tarde."
10015030-50 = "[s1] \"Sumire, quanto tempo.\"\n[s2] \"Você parece mais animada que o normal.\""
10015030-53 = "Com certeza, Treinador."
10015030-54 = "Amanhã é o dia do \"Festival Esportivo Kourin\" organizado pelo Millennium!"
10015030-55 = "Até as alunas do Millennium que normalmente não se interessam por esportes, #nnesse dia, não conseguirão tirar os olhos do drama sem roteiro criado pelos atletas."
10015030-56 = "Os atletas se chocando intensamente na quadra..."
10015030-57 = "Os gritos da torcida ecoando pelo local..."
10015030-59 = "Isso mesmo... é a chance perfeita para transmitir o charme dos esportes para as alunas do Millennium!"
10015030-60 = "[s] \"C-calma...\""
10015030-61 = "Ah, me empolguei... peço desculpas."
10015030-62 = "Hoje eu estava suando a camisa com as outras alunas para me preparar para as partidas de amanhã, mas..."
10015030-68 = "……Ué?#nAté agora pouco estávamos agachando juntas, mas para onde elas foram...?"
10015030-69 = "……Parece que elas foram embora mais cedo para descansar para a partida de amanhã."
10015030-70 = "Ainda é cedo para dormir, mas já está bem tarde."
10015030-71 = "Hã? Mas a gente só fez um alongamento leve e agachamentos!"
10015030-72 = "O treinamento em circuito para iniciantes exige que fortaleçamos vários grupos musculares em sequência..."
10015030-73 = "Como chegou uma máquina de cabos nova, #neu pretendia ensinar outros exercícios de isolamento também..."
10015030-74 = "Eu até preparei shakes de proteína para beberem logo após o exercício..."
10015030-75 = "[s] \"Você preparou bastante coisa, hein...\""
10015030-76 = "Claro. #nComo é um treinamento confiado pelo Seminar, não posso desperdiçar nem um segundo."
10015030-77 = "O corpo humano é um objeto composto por várias variáveis. Por isso, um cronograma de treinamento padronizado pode gerar diversos erros."
10015030-78 = "Nós, do \"Clube de Treinamento\", analisamos minuciosamente desde a dieta até os hábitos de vida dos atletas, apresentando um cronograma otimizado para o ambiente e as características de cada um."
10015030-79 = "……Como eu disse antes, este Festival Esportivo é uma oportunidade de mostrar o charme dos esportes para as alunas, mas... também é uma oportunidade de provar os resultados dos experimentos do nosso clube."
10015030-80 = "Sim... por isso, estou muito ansiosa pelo Festival Esportivo de amanhã."
10015030-81 = "[s3] \"Ao ver esse tipo de cena...\"\n[s4] \"Sumire, você também é, sem dúvida, uma aluna do Millennium.\""
10015030-84 = "Hehe, é que todas as atividades do Millennium são baseadas em pesquisas científicas."
10015030-85 = "Já que o pessoal do Clube de Treinamento se esforçou tanto, seria ótimo se os atletas do Millennium conseguissem bons resultados neste Grande Festival Esportivo."
10015030-86 = "......Infelizmente, isso parece difícil."
10015030-90 = "A maioria dos atletas que participarão do torneio são iniciantes que nunca passaram por um treinamento... e o período de preparação também não foi suficiente."
10015030-91 = "Mas não se preocupe. #nO valor do Grande Festival Esportivo não está na vitória ou nos recordes, mas na própria participação!"
10015030-92 = "......Mas, para ser sincera, é um pouco decepcionante."
10015030-93 = "Para compensar o curto período de treinamento, eu elaborei um plano para desenvolver os músculos de forma eficiente, mas todos acabaram desistindo no meio do caminho..."
10015030-94 = "[s] \"O cronograma era tão pesado assim?\""
10015030-95 = "Não, de forma alguma. #nPara construir músculos equilibrados, eu só pedi 2 horas de exercícios anaeróbicos por dia."
10015030-96 = "Claro, o tempo gasto com alongamentos para aquecimento e #nexercícios aeróbicos foi excluído..."
10015030-97 = "M-mas, mesmo que demore, não passa de 4 horas por dia!"
10015030-98 = "[s] (Acho que entendo por que as alunas que vêm ao Clube de Treinamento fogem...)"
10015030-99 = "Ah, é verdade... já que você se deu ao trabalho de vir à academia, #npor que o Sensei não aproveita para se exercitar um pouco também?"
10015030-100 = "[s7] \"Eu adoraria o convite, mas estou ocupado com os preparativos do Grande Festival Esportivo...\"\n[s8] \"Nós temos alguns assuntos para tratar... não é, Yuuka?\""
10015030-103 = "Não, não há necessidade de tanta pressa."
10015030-104 = "A ronda pelos clubes terminou mais rápido do que eu pensava, #ne o que resta é apenas ir ao Clube de Engenharia para buscar os robôs consertados..."
10015030-105 = "Como somos nós que estamos pedindo o favor, chegar cedo demais só vai atrapalhá-los..."
10015030-106 = "Então, não tem problema descansar aqui por mais uns 30 minutos."
10015030-107 = "30 minutos, é..."
10015030-108 = "É o tempo perfeito para fazer um pouco de musculação!"
10015030-114 = "[ns] \"Então... Yuuka, você quer se exercitar também?\""
10015030-115 = "Sim, com certeza—"
10015030-119 = "Ah, surgiu um assunto urgente..."
10015030-120 = "Sinto muito, mas preciso resolver isso primeiro..."
10015030-121 = "Enquanto isso, Sensei, aproveite o treino com a Sumire com calma."
10015030-125 = "[ns] \"Ei, isso não vale! Fugir sozinha!\""
10015030-126 = "Hehe, eu estava justamente querendo fazer um isolamento muscular com o Sensei usando a nova Máquina Ultra-Smile!"
10015030-130 = "Vamos, primeiro fique aqui."
10015030-135 = "[ns] \"P-pesado...!\""
10015030-136 = "O que houve? Você está balançando."
10015030-137 = "Alinhe os joelhos com a ponta dos pés e mantenha a coluna reta!"
10015030-138 = "Mais 3 séries... vamos começar!"
10015030-140 = "Sensei, tome cuidado para não se machucar~"
10015030-145 = "(Depois disso, por 30 minutos... treinei intensamente com a Sumire até ficar exausto...)"
