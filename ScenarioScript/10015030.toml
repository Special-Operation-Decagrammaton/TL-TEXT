[translation]
10015030-1 = "第3話;ミレニアムのトレーナー"
10015030-5 = "ミレニアム・西側別館"
10015030-6 = "（ノアと一緒に部活を巡回し、大運動会の業務をお願いしていると……）"
10015030-7 = "えっと……故障した機器の修理はエンジニア部に、電算業務もヴェリタスにお任せしましたし……"
10015030-8 = "あと残っているのは、出場選手のコンディションチェックと、エントリーの整理ですね。"
10015030-9 = "[s] \"コンディションチェック？\""
10015030-10 = "はい。選手が試合で最善のパフォーマンスが出せるよう、個人のコンディションをチェックし、サポートするのもセミナーの仕事ですから。"
10015030-11 = "ただ、私含むセミナーの者はこのような分野に関しては門外漢なので……#n「トレーニング部」の皆さんにご協力頂いています。"
10015030-12 = "……この時間ならおそらく、彼女たちも最後の調整をしているところでしょう。"
10015030-16 = "選手たちの応援も兼ねて、ちょっとフィットネスセンターに寄ってみましょうか？"
10015030-23 = "ミレニアム・フィットネスセンター"
10015030-24 = "お尻を後ろに突き出して、膝とつま先の向きは一緒！"
10015030-25 = "さあ、スクワット2セット追加です！"
10015030-26 = "ちょ、ちょっと待ってください、スミレ部長！#nさっき、最後のセットだって言ってましたよね！？"
10015030-27 = "そうですよ！#nしかもその前も最後って言ってませんでした！？"
10015030-28 = "バックスクワットはバーベルを使用して筋肉に負荷を与え、成長を促す運動……"
10015030-29 = "初心者の皆さんのために低重量のバーベルを用意しましたが、しっかりとした刺激を与えるためには反復トレーニングは必須ですからね。"
10015030-30 = "大運動会で良い成績を修めるためにも、諦めず最後まで一緒に頑張りましょう！"
10015030-32 = "こんな厳しいトレーニングをずっと続けてたら……"
10015030-33 = "大会が始まる前に倒れちゃうよ……。"
10015030-38 = "……もうこんな時間なんですね。"
10015030-39 = "それでは……少し休憩した後、引き続きトレーニングを再開しましょう。"
10015030-45 = "ふふ、スミレさんは相変わらず厳しいですね。"
10015030-46 = "あれ？ノアさん……そしてトレーナー？"
10015030-47 = "こんな時間にどうされたのですか？"
10015030-48 = "明日行われる大運動会の最終点検がてら、選手の皆さんの様子を見に来ました。"
10015030-49 = "深夜までのトレーニング、お疲れ様です。"
10015030-50 = "[s1] \"スミレ、久しぶり。\"\n[s2] \"いつもより生き生きしてるね。\""
10015030-53 = "もちろんです、トレーナー。"
10015030-54 = "明日はミレニアム主催の「[ruby=こうりんたいさい]晄輪大祭[/ruby]」当日なんですから！"
10015030-55 = "普段はスポーツに興味がないミレニアム生も、#nこの日だけは選手が織りなす脚本のないドラマから、目を離せないことでしょう。"
10015030-56 = "コートの上で熱くぶつかり合う選手……"
10015030-57 = "会場に響き渡る歓声……"
10015030-59 = "そう……ミレニアム生にスポーツの魅力を伝える絶好のチャンスなんです！"
10015030-60 = "[s] \"お、落ち着いて……。\""
10015030-61 = "あ、思わず……失礼しました。"
10015030-62 = "今日は明日の試合に備えて、他の生徒と一緒に汗を流していましたが……"
10015030-68 = "……あれ？#n先ほどまで一緒にスクワットをしていたはずですが、彼女たちはどこに……？"
10015030-69 = "……明日の試合のために、先に帰ったみたいですね。"
10015030-70 = "寝るには早いですが、だいぶ遅い時間ですから。"
10015030-71 = "えっ？まだ軽いストレッチとスクワットしかしてませんよ？"
10015030-72 = "初心者用のサーキットトレーニングは、様々な部位の筋肉を順番に強化していかないといけないのに……"
10015030-73 = "新しいケーブルマシンも届いたから、#n他のアイソレーション種目も教えようと思っていたのに……"
10015030-74 = "運動が終わった後すぐ飲めるよう、プロテインドリンクも用意したのに……"
10015030-75 = "[s] \"色々と用意してたんだね……。\""
10015030-76 = "もちろんです。#nセミナーに任されたトレーニングですから、一秒たりとも無駄にはできません。"
10015030-77 = "人体は様々な変数で構成されたオブジェクトです。そのため、画一化されたトレーニングスケジュールでは、様々な誤差が生じる可能性があります。"
10015030-78 = "私たち「トレーニング部」では、選手の皆さんの献立から生活習慣まで細かく分析し、個人の環境と特性に最適化されたトレーニングスケジュールを提示しています。"
10015030-79 = "……先ほど言ったように、今回の大運動会は生徒たちにスポーツの魅力を伝える機会でもありますが……私たちトレーニング部の実験の成果を証明できる機会でもあるのです。"
10015030-80 = "ええ……ですので、明日の大運動会はとても楽しみです。"
10015030-81 = "[s3] \"こういう姿を見ると……。\"\n[s4] \"スミレも、間違いなくミレニアムの生徒なんだね。\""
10015030-84 = "ふふ、ミレニアムの活動はすべて科学的な研究に基づいて行われていますから。"
10015030-85 = "トレーニング部の皆さんに頑張っていただいた分、今回の大運動会ではミレニアムの選手たちが良い記録を残せたらいいですね。"
10015030-86 = "……残念ですが、それは難しそうです。"
10015030-90 = "大会に出場するほとんどの選手が、トレーニングを経験したことのないスポーツ初心者で……トレーニング期間も十分ではありません。"
10015030-91 = "ですがご安心を。#n大運動会の価値は競技の勝敗や記録ではなく、参加そのものにありますからね！"
10015030-92 = "……でも、少し残念なのも事実です。"
10015030-93 = "短いトレーニング期間を補うために、筋肉を効率的に成長させることができるトレーニングプランを立てたのですが、みんな途中で諦めてしまって……"
10015030-94 = "[s] \"そんなにハードスケジュールだったの？\""
10015030-95 = "いえ、そんなことは。#nバランスが取れた筋肉を作るため、1日2時間の無酸素運動をお願いしただけですよ。"
10015030-96 = "もちろん、ウォーミングアップのためのストレッチと、#n有酸素運動にかかる時間は除外していますけど……"
10015030-97 = "で、ですが、長くても1日4時間は超えないので！"
10015030-98 = "[s] （トレーニング部に来た生徒が逃げる理由が分かる気がする……）"
10015030-99 = "そうだ……せっかくフィットネスクラブに来ていただいたので、#nトレーナーも軽く運動をしていかれては？"
10015030-100 = "[s7] \"お誘いは嬉しいんだけど、大運動会の準備が忙しくて……。\"\n[s8] \"私たちはちょっと用事が……ね、ノア？\""
10015030-103 = "いえ、そんなに急ぐ必要はありませんよ。"
10015030-104 = "各部活の巡回も思ったより早く終わりましたし、#n残りはエンジニア部のところに行って、修理されたロボットを受け取るぐらいですし……"
10015030-105 = "お願いをしている立場ですから、早く行っても困らせてしまうでしょうし……"
10015030-106 = "あと30分くらいは、ここで休んでも大丈夫ですよ。"
10015030-107 = "30分ですか……"
10015030-108 = "軽くウェイトトレーニングをするのに、ちょうどいい時間ですね！"
10015030-114 = "[ns] \"そしたら……ノアも一緒に運動する？\""
10015030-115 = "ええ、それはもう――"
10015030-119 = "あら、急な案件が……"
10015030-120 = "残念ですが、私は先にこちらを処理しないと……。"
10015030-121 = "その間、先生はスミレさんとゆっくりトレーニングを楽しんでください。"
10015030-125 = "[ns] \"あっ、ずるい！一人だけ逃げるなんて！\""
10015030-126 = "ふふっ、ちょうど、新導入したウルトラスミスマシンで、トレーナーと一緒にアイソレーションをしたかったところです！"
10015030-130 = "さあ、まずはここに立ってください。"
10015030-135 = "[ns] \"お……重い……！\""
10015030-136 = "どうしました？ふらついてますよ。"
10015030-137 = "膝とつま先の向きを一致させて、腰はまっすぐに！"
10015030-138 = "あと3セット……始めます！"
10015030-140 = "先生、怪我にお気をつけて～"
10015030-145 = "（その後30分間……疲れ果てるまでスミレとみっちりトレーニングをした……）"
