[translation]
1600705-1 = "雪の中で"
1600705-4 = "（そうして各地での演説を終えて、レッドウィンター連邦学園の事務局へと戻ろうとしていた……）"
1600705-5 = "ふふ、今回の演説も上手くいったようで何よりです。"
1600705-6 = "最初は会長の能力を疑っていた生徒たちも、演説が終わる頃には一様に会長を褒め称えていましたし……。"
1600705-7 = "しばらくチェリノちゃんが失言をしても安心……いえ、会長の偉大さを疑う生徒は現れないでしょう。"
1600705-8 = "[s1] \"トモエは本当に話すのが上手だね。\"\n[s2] \"危うく私も信じるところだった。\""
1600705-9 = "ふふっ、お褒めの言葉ありがとうございます。先生。"
1600705-10 = "あら……そのお言葉は心外ですね。チェリノ会長が素敵でかつ偉大な生徒会長であることは、紛れもない事実なんですよ？"
1600705-11 = "このレッドウィンター連邦学園の自治区はかなりの広さを誇っており、チェリノ会長に直接会えることができないことも多くて、噂を鵜呑みにしてしまう生徒も多いのです。"
1600705-12 = "だからこそ、生徒たちが間違った噂に振り回されないように、こうして時々定期的に巡回して演説を行わなければならないんです。"
1600705-13 = "[s] \"なるほど……ところで巡回はこれで終わり？\""
1600705-14 = "えっと、まだ旧校舎方面と図書館付近に向かいたいところなのですが……。"
1600705-15 = "今日はもう中断して、事務局に帰るとしましょう。"
1600705-16 = "先ほど天気予報を確認したところ、これからこの辺りの天気が相当荒れるようでして。"
1600705-19 = "あらっ、言ってるそばから……風もすごいことになってきましたね。"
1600705-20 = "雪がこれ以上強くなる前に、急いで移動しましょう！"
1600705-22 = "（数時間後……）"
1600705-26 = "あ、あら？おかしいですね、たしかこちらの方向で合っていたはずですが……。"
1600705-27 = "[s] \"雪で視界が覆われて、方向感覚が狂ったのかな……？\""
1600705-28 = "ええ、そうですね……どうやら遭難してしまったようです。"
1600705-29 = "近くに休憩できる場所があればよいのですが……。"
1600705-30 = "[s] \"あっちに小屋みたいなのが見えない？\""
1600705-31 = "あれは……倉庫ですね！山道を補修するために、資材などが保管されている場所です。"
1600705-32 = "流石は先生ですね、よく見つけてくださいました。あそこなら、身体を休められるでしょう。"
1600705-33 = "では、これ以上視界が悪くなる前に……！"
1600705-39 = "[wa:500]― ふぅ、[wa:1300]何も見えなくなるほど[wa:1650]すごい吹雪でしたね……。"
1600705-42 = "[wa:1000]― 先生も、[wa:850]上着を脱いではいかがですか？"
1600705-45 = "[wa:600]― そのまま濡れた服を着ていると、"
1600705-47 = "― 風邪を引いてしまいますよ？"
1600705-50 = "[wa:1000]― ……先生？[wa:1400]どうかされましたか、"
1600705-52 = "[wa:250]― 何か[wa:850]気になることでも？"
1600705-55 = "[wa:1000]― その表情、[wa:1550]もしかして……[wa:200] "
1600705-58 = "― 先ほどの演説では足りず、"
1600705-60 = "― もっとチェリノ会長の[wa:1400]お話が聞きたいのですか？"
1600705-63 = "[wa:800]― こんなタイミングですし、[wa:1000]ちょうど良いですね。"
1600705-65 = "― では[wa:650]雪が止むまで、[wa:1400]一緒にチェリノ会長の偉大さについて"
1600705-68 = "― 語り合うとしましょう♪"
1600705-71 = "その後雪が止むまで、チェリノの偉大さについての話は止まらなかった。"
1600705-73 = "ふう、やっと雪が止みましたね……。"
1600705-74 = "思ったより長い吹雪だった気もしますが……チェリノ会長の偉大さについて語り合っていたら、あっという間でしたね？"
1600705-75 = "先生もそう思いません？"
1600705-76 = "[s] \"えっと、何て言うか……。\""
1600705-77 = "その表情は……なるほど？"
1600705-78 = "チェリノ会長のことについて、まだまだ色々気になるということですね！"
1600705-79 = "大丈夫です、まだまだ時間はたっぷりあります。"
1600705-80 = "事務局に戻ったら、先ほどの続きから語り合いましょうか！"
1600705-81 = "[s] \"今日はそろそろお腹いっぱいかな……。\""
