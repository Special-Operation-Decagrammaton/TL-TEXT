[translation]
1600705-1 = "Na neve"
1600705-4 = "（E assim, após terminar os discursos em vários locais, eles estavam tentando retornar à secretaria da Academia Federal Red Winter...）"
1600705-5 = "Fufu, fico feliz que o discurso de hoje tenha corrido bem."
1600705-6 = "Mesmo os alunos que inicialmente duvidavam da capacidade da Presidente, ao final do discurso, estavam todos a elogiando..."
1600705-7 = "Por um tempo, não precisaremos nos preocupar caso a Cherino-chan cometa algum deslize... digo, nenhum aluno duvidará da grandeza da Presidente."
1600705-8 = "[s1] \"Tomoe, você realmente sabe falar bem.\"\n[s2] \"Por pouco eu quase acreditei também.\""
1600705-9 = "Fufu, agradeço pelos elogios, Sensei."
1600705-10 = "Ora... esse comentário é um tanto ofensivo. É um fato inegável que a Presidente Cherino é uma presidente estudantil maravilhosa e grandiosa, sabe?"
1600705-11 = "O distrito da Academia Federal Red Winter é imenso, e como muitas vezes não é possível encontrar a Presidente Cherino pessoalmente, muitos alunos acabam acreditando em boatos."
1600705-12 = "É justamente por isso que, para evitar que os alunos sejam levados por boatos errados, precisamos fazer essas rondas e discursos periodicamente."
1600705-13 = "[s] \"Entendo... a propósito, a ronda termina aqui?\""
1600705-14 = "Bem, eu ainda gostaria de ir em direção ao prédio antigo e perto da biblioteca, mas..."
1600705-15 = "Vamos encerrar por hoje e voltar para a secretaria."
1600705-16 = "Verifiquei a previsão do tempo agora há pouco, e parece que o clima por aqui vai ficar bastante severo."
1600705-19 = "Ora, falando nisso... o vento também começou a ficar muito forte."
1600705-20 = "Vamos nos apressar antes que a neve piore!"
1600705-22 = "（Algumas horas depois...）"
1600705-26 = "Ah, ora? Que estranho, eu tinha certeza de que era nesta direção..."
1600705-27 = "[s] \"Será que a visibilidade coberta pela neve nos fez perder o senso de direção...?\""
1600705-28 = "Sim, é verdade... parece que acabamos ficando perdidos."
1600705-29 = "Seria bom se houvesse um lugar para descansar por perto..."
1600705-30 = "[s] \"Não está vendo algo como um galpão ali?\""
1600705-31 = "Aquilo é... um depósito! É onde guardam materiais para a manutenção das estradas da montanha."
1600705-32 = "Como esperado do Sensei, você encontrou muito bem. Lá poderemos descansar um pouco."
1600705-33 = "Então, antes que a visibilidade piore ainda mais...!"
1600705-39 = "[wa:500]— Ufa, [wa:1300] foi uma nevasca [wa:1650] tão forte que não dava para ver nada..."
1600705-42 = "[wa:1000]— Sensei, [wa:850] por que não tira o casaco também?"
1600705-45 = "[wa:600]— Se continuar com as roupas molhadas,"
1600705-47 = "— você vai acabar pegando um resfriado, sabe?"
1600705-50 = "[wa:1000]— ...Sensei? [wa:1400] Aconteceu alguma coisa?"
1600705-52 = "[wa:250]— Tem algo [wa:850] que está te incomodando?"
1600705-55 = "[wa:1000]— Essa expressão... [wa:1550] será que... [wa:200] "
1600705-58 = "— o discurso de agora não foi o suficiente,"
1600705-60 = "— e você quer ouvir mais [wa:1400] sobre a Presidente Cherino?"
1600705-63 = "[wa:800]— Já que estamos nesta situação, [wa:1000] é uma ótima oportunidade."
1600705-65 = "— Então, [wa:650] até a neve parar, [wa:1400] vamos conversar"
1600705-68 = "— sobre a grandeza da Presidente Cherino♪"
1600705-71 = "Depois disso, até a neve parar, a conversa sobre a grandeza de Cherino não cessou."
1600705-73 = "Ufa, finalmente a neve parou..."
1600705-74 = "Sinto que a nevasca durou mais do que eu pensava, mas... conversando sobre a grandeza da Presidente Cherino, passou num piscar de olhos, não é?"
1600705-75 = "Você não acha, Sensei?"
1600705-76 = "[s] \"Bem, como posso dizer...\""
1600705-77 = "Essa expressão... entendo?"
1600705-78 = "Significa que você ainda tem muita curiosidade sobre a Presidente Cherino!"
1600705-79 = "Não se preocupe, ainda temos muito tempo."
1600705-80 = "Quando voltarmos para a secretaria, vamos continuar de onde paramos!"
1600705-81 = "[s] \"Acho que por hoje já estou satisfeito...\""
