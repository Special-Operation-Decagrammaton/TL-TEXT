[translation]
2000006-1 = "Se eu pudesse sonhar, passaria o dia com você."
2000006-2 = "Departamento de Engenharia da Millennium"
2000006-3 = "Dormir é importante."
2000006-4 = "Bem, se eu puder me deitar, não me importo nem se for dentro de um caixão."
2000006-5 = "Parece que a insônia é algo terrível."
2000006-6 = "Tem muita gente ao meu redor que sofre com isso."
2000006-7 = "Hm? ...Você acha que minhas olheiras pioraram?"
2000006-8 = "Não... é só que eu passei noites demais em claro."
2000006-9 = "……"
2000006-10 = "……Ah, não fique me encarando tanto assim."
2000006-11 = "De qualquer forma, para quem não consegue dormir bem, a noite se torna um período doloroso e difícil."
2000006-12 = "Por isso, preparei dois protótipos para começar."
2000006-13 = "O primeiro, o nome dele é..."
2000006-14 = "“Máquina de Desmaio”."
2000006-15 = "[s1] \"Parece que há um erro grave no nome, mas...\"\n[s2] \"É um travesseiro?\""
2000006-16 = "É só impressão sua."
2000006-17 = "Bem, ele tem o formato de um item de cama, pelo menos."
2000006-18 = "Embora varie de pessoa para pessoa..."
2000006-19 = "Dizem que as pessoas passam 1/3 do dia, ou melhor, da vida, na cama."
2000006-20 = "Portanto, investir em roupas de cama é uma escolha que garante que 1/3 da sua vida seja passado com conforto."
2000006-21 = "Por enquanto, você poderia se deitar em cima dessa máquina em formato de travesseiro?"
2000006-22 = "Hm? Você quer dormir profundamente, mas não quer desmaiar?"
2000006-23 = "Hmm, eu também não tenho muita confiança em ergonomia humana."
2000006-24 = "Mas você nunca ouviu dizer que, às vezes, depois de desmaiar, a pessoa se sente tão bem quanto se tivesse dormido por muito tempo?"
2000006-25 = "Hm? Então desmaiar não serve?"
2000006-26 = "Hmm, talvez você tenha razão."
2000006-27 = "Bem, isso é apenas um protótipo."
2000006-28 = "Existem outras criações... que podem satisfazer melhor o Sensei."
2000006-29 = "O nome dela é..."
2000006-30 = "“Cano de Ferro de Desmaio”, mas..."
2000006-35 = "Ah, por que você está se afastando tanto?"
2000006-36 = "Sensei, parece que você está entendendo errado de novo."
2000006-37 = "Embora seja um método um pouco clássico...#nO efeito deste Cano de Ferro de Desmaio foi verificado."
2000006-38 = "[s] \"Se eu errar um passo, parece que vou dormir para sempre.\""
2000006-39 = "Ah, não entenda mal. Não é para bater na nuca do Sensei com isso,"
2000006-40 = "não é esse tipo de método clássico."
2000006-41 = "Este cano de ferro tem..."
2000006-42 = "a minha função favorita."
2000006-43 = "[s3] \"Função de autodestruição...?\"\n[s4] \"Função letal...?\""
2000006-44 = "É uma função de alto-falante Bluetooth."
2000006-45 = "É uma função de alto-falante Bluetooth."
2000006-46 = "Neste cano de ferro, você pode colocar aulas de física que dão sono só de ouvir..."
2000006-47 = "ou cerca de 200 músicas de indução ao sono, e reproduzir como quiser."
2000006-48 = "[s5] \"Será que devo tentar?\"\n[s6] \"Dá para dormir com isso...?\""
2000006-49 = "Sério?"
2000006-50 = "Sério?"
2000006-51 = "Então vamos tentar, Sensei.#nEu já preparei uma cama simples."
2000006-52 = "Quer se deitar um pouco?"
2000006-54 = "Ótimo. Então, vou ligar a música."
2000006-55 = "Cano de Ferro de Desmaio... iniciando."
2000006-61 = "……。"
2000006-62 = "……hehe. Sensei, você parecia estar exausto."
2000006-63 = "Você perdeu a consciência quase no momento em que a música começou a tocar."
2000006-64 = "Graças a isso, esta obra também... provavelmente receberá uma boa avaliação."
2000006-65 = "Além disso..."
2000006-66 = "……hehe."
2000006-67 = "Seu rosto enquanto dormia era adorável."
