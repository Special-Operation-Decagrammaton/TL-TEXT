[translation]
2000006-1 = "もしも夢を見られるのなら、あなたと共に一日を"
2000006-2 = "ミレニアム・エンジニア部"
2000006-3 = "睡眠は大事。"
2000006-4 = "まあ、私は横になれるなら、棺の中でも気にしないけど。"
2000006-5 = "不眠というものは辛いものらしい。"
2000006-6 = "私の周りにも、それで辛そうにしてる人が多いから。"
2000006-7 = "うん？……クマがひどくなった気がするって？"
2000006-8 = "いや……私はただ、徹夜のしすぎで。"
2000006-9 = "……。"
2000006-10 = "……あ、あんまりじっと見ないで。"
2000006-11 = "とにかく、よく眠れない人たちにとって、夜は苦しくて辛い時間になってる。"
2000006-12 = "だから、とりあえずは二つほど試作品を用意してみた。"
2000006-13 = "一つ目、これの名前は……"
2000006-14 = "「気絶マシン」。"
2000006-15 = "[s1] \"名前から深刻なエラーが発見されてるみたいだけど。\"\n[s2] \"枕かな？\""
2000006-16 = "気のせいだよ。"
2000006-17 = "一応、寝具の形をしてるけどね。"
2000006-18 = "人によって差はあるだろうけど……。"
2000006-19 = "人は一日の、いや人生の1/3をベッドの上で過ごすらしい。"
2000006-20 = "だから、寝具に投資をすることは、人生の1/3を心地良く過ごせるようにしてくれる選択だと言える。"
2000006-21 = "とりあえず、この枕型の機械の上に横になってくれる？"
2000006-22 = "ん？熟睡はしたいけど、気絶はしたくない？"
2000006-23 = "うーん、私も人体工学にはあまり自信ないけど。"
2000006-24 = "たまに気絶した後、まるで長い時間寝て起きたみたいに気持ちよかった、って話を聞いたことない？"
2000006-25 = "うん？とにかく気絶はダメ？"
2000006-26 = "うーん、それもそうかも。"
2000006-27 = "まあ、これはプロトタイプに過ぎない。"
2000006-28 = "もっと先生を満足させられる……他の作品もあるから。"
2000006-29 = "その名も……"
2000006-30 = "「失神鉄パイプ」、というものだけど……。"
2000006-35 = "あっ、なんでそんなに離れるの。"
2000006-36 = "先生、また誤解してるみたいだね。"
2000006-37 = "多少古典的な方法だけれど……#nこの失神鉄パイプの効果は検証されてる。"
2000006-38 = "[s] \"一歩間違えたら永遠に眠れそう。\""
2000006-39 = "あ、誤解しないで。これで先生の後頭部を殴るとか、"
2000006-40 = "そういう古典的な方法ではないから。"
2000006-41 = "この鉄パイプには……"
2000006-42 = "私の一番のお気に入り機能が付いてるの。"
2000006-43 = "[s3] \"自爆機能……？\"\n[s4] \"殺傷機能……？\""
2000006-44 = "Bluetoothスピーカー機能だよ。"
2000006-45 = "Bluetoothスピーカー機能だよ。"
2000006-46 = "この鉄パイプには、聞くだけで眠くなってくる物理学講義10講とか……。"
2000006-47 = "約200曲の睡眠誘導音楽を、好きなように出力できるの。"
2000006-48 = "[s5] \"一度試してみようかな？\"\n[s6] \"それで眠れるわけ……。\""
2000006-49 = "本当に？"
2000006-50 = "本当に？"
2000006-51 = "じゃあ試してみよう、先生。#nとりあえず簡単な寝具は用意したから。"
2000006-52 = "一度横になってみる？"
2000006-54 = "よし。じゃ、音楽を流すね。"
2000006-55 = "失神鉄パイプ……起動。"
2000006-61 = "……。"
2000006-62 = "……ふふっ。#n先生、疲れてたみたいだね。"
2000006-63 = "ほぼ音が流れ始めた瞬間に、意識を失ってた。"
2000006-64 = "今回の作品も……おかげでいい評価がもらえそう。"
2000006-65 = "それに……"
2000006-66 = "……ふふっ。"
2000006-67 = "寝顔、可愛かったよ。"
