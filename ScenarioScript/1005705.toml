[translation]
1005705-1 = "Requisitos gourmet atendidos. É a comida, a estação..."

1005705-2 = "(Eu estava esperando Haruna no lugar prometido)"

1005705-6 = "Obrigado por esperar, senhor."

1005705-7 = "Desculpe por estar atrasado."

1005705-8 = "[s] \"Está tudo bem, acabei de chegar.\""

1005705-9 = "Isso seria ótimo."

1005705-10 = "Tenho pensado nisso desde então."

1005705-11 = "O que é realmente importante quando se trata de comida gourmet?"

1005705-12 = "Depois de pensar nisso muitas vezes..."

1005705-13 = "Afinal, não basta apenas a comida ser saborosa...foi o que pensei."

1005705-14 = "Então hoje me preparei para satisfazer todos os elementos que pude imaginar."

1005705-15 = "Hehehe."

1005705-16 = "Com isso, você certamente encontrará a melhor refeição gourmet."

1005705-17 = "[s] \"Entendo...estou ansioso por isso.\""

1005705-18 = "Isto é o que preparei primeiro."

1005705-23 = "É um prato de Ano Novo embalado em uma caixa de três camadas."

1005705-24 = "elementos da gastronomia. Não é apenas como você cozinha, mas também a estação... em outras palavras, “sazonal” também é importante."

1005705-25 = "Outra coisa é que você precisa de alguém com quem compartilhar suas refeições. #nFoi por isso que liguei para você, Sensei."

1005705-26 = "Agora que esses elementos foram atendidos, você certamente terá uma refeição deliciosa como nunca provou antes."

1005705-27 = "[s] \"Ok, então vamos tentar.\""

1005705-28 = "Hehe, isso mesmo."

1005705-29 = "Agora, Senseies, por favor, tomem seus lugares."

1005705-30 = "Deixe a preparação comigo."

1005705-37 = "[wa:500]― O que é importante para a comida gourmet é"

1005705-39 = "[wa:50] - A comida, a pessoa... [wa:2000] e o tempo."

1005705-42 = "[wa:200]― Da mesma forma, [wa:1350] situações"

1005705-44 = "[wa:200]― É uma existência indispensável."

1005705-47 = "[wa:100]- Ufufu. [wa:1800], então"

1005705-49 = "- Vamos alimentar um ao outro [wa:450] hoje [wa:700]?"

1005705-52 = "[wa:500] - Em primeiro lugar, eu... [wa:2600] Sim, senhor."

1005705-54 = "[wa:200]- Por favor, abra a boca...[wa:1800]Ah...[wa:1000]."

1005705-57 = "[wa:200]-- [wa:600]--[wa:900]--por favor, se apresse."

1005705-59 = "[wa:100]― Eu também...[wa:1050]Estou envergonhado..."

1005705-62 = "- Até que a Senseia me diga isso,"

1005705-64 = "- Vou [wa:800] continuar assim, ok?"

1005705-67 = "[wa:400]― Olha... [wa:1300]Ah...[wa:800]Hmm."

1005705-70 = "Qual é o gosto?"

1005705-71 = "[s1] \"Bem, estava definitivamente delicioso...!\"\n[s2] \"Estou tão animado que não consigo provar!?\""

1005705-74 = "Ufufu, foi isso mesmo?"

1005705-75 = "Se for esse o caso, então mais uma vez, hmmm..."

1005705-81 = "Sim, você se saiu bem. Estou feliz que você tenha gostado também."

1005705-82 = "Então... agora é a sua vez de me alimentar?"

1005705-83 = "[s] \"Oh, você realmente vai fazer isso!? Agora!?\""

1005705-84 = "sim. Então vamos alimentar um ao outro."

1005705-88 = "Pois bem, por favor. Hum..."

1005705-90 = "(Eles se revezaram comendo osechi enquanto esvaziavam o jubako...)"

1005705-93 = "Hehehe."

1005705-94 = "Esta foi uma refeição deliciosa que guardarei para o resto da minha vida."

1005705-95 = "Obrigado, senhor."

1005705-96 = "[s3] \"Eu ficaria feliz se você dissesse isso.\"\n[s4] \"Mas foi muito embaraçoso...\""

1005705-99 = "Hehe... Aliás, ainda dá tempo? #nEu gostaria que pudéssemos passar um pouco mais de tempo juntos..."

1005705-100 = "Por alguma razão, minhas mãos estão ficando frias..."

1005705-104 = "Você não acha, senhor?"

1005705-111 = "(De mãos dadas com Haruna, caminhamos juntos pela cidade)"

