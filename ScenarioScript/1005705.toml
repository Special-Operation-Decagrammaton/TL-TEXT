[translation]
1005705-1 = "美食を満たす要件。それは料理、季節……"
1005705-2 = "（約束した場所でハルナを待っていた）"
1005705-6 = "お待たせいたしました、先生。"
1005705-7 = "遅くなってしまい申し訳ありません。"
1005705-8 = "[s] \"大丈夫、着いたばかりだよ。\""
1005705-9 = "それなら良かったです。"
1005705-10 = "あれから考えてみました。"
1005705-11 = "美食において、本当に大事なこととは。"
1005705-12 = "何度も考えた結果……"
1005705-13 = "やはり、ただ料理の味が素晴らしいだけでは足りない……そう思いました。"
1005705-14 = "なので本日は、私の考え得る全ての要素を満たす準備をしたのです。"
1005705-15 = "うふふ。"
1005705-16 = "これできっと、究極の美食にたどり着けることでしょう。"
1005705-17 = "[s] \"なるほど……それは期待しちゃうね。\""
1005705-18 = "まず用意したのは、こちらですわ。"
1005705-23 = "三段の重箱いっぱいに詰めた、おせち料理です。"
1005705-24 = "美食の要素。それはどう料理するのかもそうですが、季節……つまりは「旬」も大事になってきます。"
1005705-25 = "さらにもう一つ、食事を共にする相手の存在が必要ですわ。#nだからこそ、先生をお呼びしたのです。"
1005705-26 = "これらの要素を満たした今なら、きっとかつて味わったことのない美食になるでしょう。"
1005705-27 = "[s] \"よし、じゃあ試してみよっか。\""
1005705-28 = "うふふ、そうですわね。"
1005705-29 = "では、先生はお席にどうぞ。"
1005705-30 = "準備は私にお任せください。"
1005705-37 = "[wa:500]― 美食にとって大切なものは、"
1005705-39 = "[wa:50]― 料理と相手……[wa:2000]そして時期。"
1005705-42 = "[wa:200]― それと同じくらい、[wa:1350]シチュエーションも"
1005705-44 = "[wa:200]― なくてはならない存在です。"
1005705-47 = "[wa:100]― うふふっ。[wa:1800]ですので、"
1005705-49 = "― 今日は[wa:450]食べさせあいっこを[wa:700]いたしましょう？"
1005705-52 = "[wa:500]― まずは私から……[wa:2600]はい、先生。"
1005705-54 = "[wa:200]― お口を開けて……[wa:1800]あ～ん[wa:1000]してください。"
1005705-57 = "[wa:200]― も、[wa:600]もう、[wa:900]早くなさってください。"
1005705-59 = "[wa:100]― 私も……[wa:1050]恥ずかしいのですが……。"
1005705-62 = "― 先生が口にしてくださるまで、"
1005705-64 = "― 私は[wa:800]このまま続けますわよ？"
1005705-67 = "[wa:400]― ほら……[wa:1300]あ～[wa:800]ん。"
1005705-70 = "お味はいかがですか？"
1005705-71 = "[s1] \"た、確かにおいしかったけど……！\"\n[s2] \"ドキドキして味が分からないんだけど！？\""
1005705-74 = "うふふっ、そうでしたか。"
1005705-75 = "でしたらもう一度、あ～ん……。"
1005705-81 = "はい、よくできましたわ。召し上がってくださり、私もうれしいです。"
1005705-82 = "では……今度は先生が私に食べさせる番ですよ？"
1005705-83 = "[s] \"ほ、本当にするの！？今！？\""
1005705-84 = "はい。食べさせあいっこ、ですから。"
1005705-88 = "ではお願いします。んっ……。"
1005705-90 = "（順番におせちを食べさせ合いながら、重箱を空けていった……)"
1005705-93 = "うふふっ。"
1005705-94 = "これは……一生記憶に残る美食になりましたね。"
1005705-95 = "ありがとうございます、先生。"
1005705-96 = "[s3] \"そう言ってもらえたら嬉しいな。\"\n[s4] \"かなり恥ずかしかったけどね……\""
1005705-99 = "ふふっ……ところで、まだお時間はありますか？#nもう少し一緒に過ごせればと……思いまして。"
1005705-100 = "何だか、手が冷たくなってきましたわね……。"
1005705-104 = "そうは思いませんか、先生？"
1005705-111 = "（ハルナと手をつないで、一緒にのんびりと街を回った）"
