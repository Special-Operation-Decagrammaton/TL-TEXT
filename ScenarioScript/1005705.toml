[translation]
1005705-1 = "Requisitos gastronômicos. É a culinária, a estação ......"

1005705-2 = "(Ele estava esperando por Haruna no local combinado)"

1005705-6 = "Desculpe tê-lo feito esperar, doutor."

1005705-7 = "Pedimos desculpas pelo atraso."

1005705-8 = "[\"Não se preocupe, acabamos de chegar. \""

1005705-9 = "Isso teria sido bom."

1005705-10 = "Tenho pensado sobre isso desde então."

1005705-11 = "O que realmente importa na gastronomia."

1005705-12 = "Depois de muita reflexão: ......"

1005705-13 = "Afinal de contas, não basta que a comida tenha um sabor excelente. ......"

1005705-14 = "Portanto, hoje eu estava preparado para atender a todos os fatores que eu pudesse imaginar."

1005705-15 = "Hmmm."

1005705-16 = "Isso certamente o levará à melhor experiência gastronômica."

1005705-17 = "[s]\"Entendo. ...... Eu já esperava por isso. \""

1005705-18 = "Aqui está o que preparamos primeiro."

1005705-23 = "Uma caixa empilhada de três níveis cheia de pratos osechi."

1005705-24 = "Elementos da gastronomia. A forma como o produto é cozido é importante, mas também a estação ......, em outras palavras, a "estação"."

1005705-25 = "E mais uma coisa: você precisa de alguém com quem compartilhar uma refeição. #nPor isso convidamos o médico."

1005705-26 = "Agora que esses elementos foram atendidos, certamente será uma experiência gastronômica como você nunca experimentou antes."

1005705-27 = "[\"Ok, vamos tentar então. \""

1005705-28 = "Uh-huh, sim."

1005705-29 = "Agora, por favor, sentem-se, senhor."

1005705-30 = "Deixe a preparação por minha conta."

1005705-37 = "[wa:500]- O que é importante para a gastronomia,"

1005705-39 = "[wa:50]- Cozinhar e a outra parte ......[wa:2000] e a época do ano."

1005705-42 = "[wa:200]- Além disso, [wa:1350]Situações."

1005705-44 = "[wa:200]- Eles são indispensáveis."

1005705-47 = "[wa:100]- ugh. [wa:1800]- então,"

1005705-49 = "- Vamos [wa:450]alimentar uns aos outros [wa:700]hoje?"

1005705-52 = "[wa:500]- Deixe-me primeiro ......[wa:2600] Sim, senhor."

1005705-54 = "[wa:200]- Por favor, abra sua boca e ......[wa:1800]ahh[wa:1000]."

1005705-57 = "[wa:200]- nem [wa:600]mais, [wa:900]por favor, faça isso rapidamente."

1005705-59 = "[wa:100]- Também estou ......[wa:1050] envergonhado, mas ......."

1005705-62 = "- Até que o professor se manifeste,"

1005705-64 = "- Vou continuar assim, está bem?"

1005705-67 = "[wa:400]- veja ......[wa:1300]ah-[wa:800]n."

1005705-70 = "O que você acha do sabor?"

1005705-71 = "[s1] \"\"\"\"}Com certeza estava gostoso, mas ......! \"\"\n[s2] \"Estou tão nervoso que não consigo sentir o gosto! \"\"\n[s2]]"

1005705-74 = "É isso mesmo?"

1005705-75 = "Se for o caso, novamente, ah~n ......."

1005705-81 = "Sim, muito bem. Fico feliz que tenha gostado e que você também tenha gostado."

1005705-82 = "Então, ...... agora é sua vez de me alimentar, doutor?"

1005705-83 = "["Ho, você realmente faz isso! Agora! \""

1005705-84 = "Sim. Nós nos alimentamos uns aos outros, portanto."

1005705-88 = "Então, por favor. Hmmm. ......."

1005705-90 = "(Eles se revezaram para alimentar uns aos outros com seus osechi e esvaziaram suas caixas empilhadas. ......)"

1005705-93 = "Hmmm."

1005705-94 = "Essa é uma experiência gastronômica que ...... será lembrada pelo resto de sua vida."

1005705-95 = "Obrigado, senhor."

1005705-96 = "[s3] \"Fico feliz que você tenha dito isso. \"\n[s4] \"Foi bastante embaraçoso, no entanto. ......\""

1005705-99 = "Hmmm... ...... A propósito, você ainda tem algum tempo para passar conosco? #nEu estava pensando se poderíamos passar um pouco mais de tempo juntos ......."

1005705-100 = "Minhas mãos estão ficando um pouco frias. ......"

1005705-104 = "O senhor não acha, doutor?"

1005705-111 = "(De mãos dadas com Haruna, elas passearam juntas pela cidade em um ritmo tranquilo)."

