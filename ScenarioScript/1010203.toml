[translation]
1010203-1 = "日焼け止め？"
1010203-2 = "（ヒヨリがいる場所に急いで向かった）"
1010203-4 = "うぅぅ……痛いです、痒いです。"
1010203-5 = "あれっ、先生。ど、どうしてここに？"
1010203-6 = "い、いてっ……！"
1010203-7 = "[s1] \"ヒヨリ、大丈夫？\"\n[s2] \"ちょっと見せて。\""
1010203-10 = "うぅ……見てください、先生。こんなに赤く……。"
1010203-11 = "海水で洗い流そうとしても、肌が痛くて……！"
1010203-12 = "うわぁぁああん！#n結局、夏を楽しめずに終わるんです！#nせっかく水着も手に入ったのに……。"
1010203-13 = "私には、真っ暗な廃墟がお似合いなんです……。"
1010203-14 = "[s] \"落ち着いて。まず、日陰に移動しよう。\""
1010203-15 = "ぐすん……はい。"
1010203-18 = "……え？#nどこからか、香ばしい匂いがする、って？"
1010203-19 = "先生は鼻が良いんですね。"
1010203-20 = "[s] \"これって……ごま油？\""
1010203-21 = "は、はい。#n日焼け止めを買うお金がなくて……。"
1010203-22 = "雑誌で見たんですけど、ビーチではオイルを塗るみたいなので……えへへ。"
1010203-23 = "そ、そもそもごま油も残りが少なくて、お腹と胸にしか塗れていませんが……。"
1010203-24 = "一応、塗ったので試しに日光浴をしてみたら……。"
1010203-25 = "[s] \"ごま油じゃ、日焼け止めにはならないよ！？\""
1010203-26 = "そ、そうだったんですね。#n……肌も焼けてヒリヒリしますし、もう私は海を楽しめません。#nやっぱり終わりです……。"
1010203-27 = "もう暗い洞窟の中で、夏が終わるのを待つしかないんです……#nこれからは、一生コウモリと暮らす羽目になるんですよね……！"
1010203-28 = "全部おしまいです！#nうわぁぁぁぁああん！"
1010203-30 = "（泣いているヒヨリをなんとか宥めて、近くの海の家に入った）"
1010203-32 = "氷で冷やすと少しマシになりました……。"
1010203-33 = "赤くなった肌も完全に元通り……とは言えませんが。#nま、まだ少し痛いですけど……。"
1010203-34 = "え、えへへ、先生。#nお腹の方もお願いして良いですか？"
1010203-35 = "つ、冷たくて気持ち良いです……。"
1010203-36 = "[s] \"次からは、ちゃんと日焼け止めクリームを塗ろうね？\""
1010203-37 = "えへへ、はい。"
1010203-38 = "でも、先生に手当までしてもらえて、これはこれで良かったのかもしれません。"
1010203-44 = "ゴリゴリ君のアイスバー1個くれ！"
1010203-45 = "私はコーンポタージュ味を！"
1010203-46 = "はい、まいど！"
1010203-48 = "……。"
1010203-49 = "……アイス、美味しそうですね。"
1010203-50 = "私には、ただ見ていることしかできませんが……。"
1010203-51 = "[s] \"ちょっと待ってて、ヒヨリ。\""
1010203-52 = "えっ、良いんですか……？"
1010203-56 = "あ、ありがとうございます！"
1010203-57 = "お、美味しいです……！"
1010203-58 = "[s] \"あんまり無理はしないでね。\""
1010203-59 = "は、はい……！"
1010203-60 = "もう元気になったので、日に当たっても……。"
1010203-66 = "あ、あれ……！？"
1010203-72 = "[wa:700]― [log=히요리 수영복]いたたた……[wa:2930]痛いですぅぅ……[/log]"
1010203-75 = "[wa:700]― [log=히요리 수영복]ひえっ！？[wa:1000]私のアイスバーが？[/log]"
1010203-78 = "― [log=히요리 수영복]終わりです！[wa:1550]もう終わりです！[/log]"
1010203-79 = "[wa:2350]― [log=히요리 수영복]一口しか食べてないのに[wa:1600]砂だらけになってしまうなんて……！[/log]"
1010203-82 = "[wa:1600]― [log=히요리 수영복]やっぱり[wa:1500]私にはアイスバーさえも[wa:1700]許されないんですね……！[/log]"
1010203-83 = "[wa:2500]― [log=히요리 수영복]完全に見放されました……！[/log]"
1010203-86 = "― [log=히요리 수영복]私の人生は[wa:1900]どうしてこんなに[wa:900]苦難に満ちているのでしょうか？[/log]"
1010203-87 = "[wa:2300]― [log=히요리 수영복]他の人は[wa:1000]夏を楽しんでいるというのに……。[/log]"
1010203-90 = "[wa:570]― [log=히요리 수영복]どんなに頑張っても、[/log]"
1010203-91 = "[wa:1950]― [log=히요리 수영복]私にとっては[wa:1600]届かない夢のようなものだなんて……。[/log]"
1010203-94 = "[wa:80]― [log=히요리 수영복]……え？[wa:1450]もう一つ[wa:800]買ってくださるんですか？[/log]"
1010203-97 = "[wa:1200]― [log=히요리 수영복]それって……[wa:3100]落としたアイスバーが無事だったら[/log]"
1010203-98 = "[wa:1420]― [log=히요리 수영복]2倍食べられたってことですよね……？[/log]"
1010203-101 = "― [log=히요리 수영복]うわぁん！[wa:2100]やっぱり終わりです！[/log]"
1010203-104 = "……ぐすん。"
1010203-105 = "ありがとうございます、先生。#nかき氷まで買ってくださって……。"
1010203-106 = "えへへ……い、いただきます。"
1010203-107 = "[s] \"少し元気になった？\""
1010203-108 = "は、はい。"
1010203-109 = "先生には、いつもお世話になりっぱなしで……#n嬉しいんですけど、どこか申し訳ない気持ちも……"
1010203-110 = "ど、どうしたんですか、その目は。#nわ、私にだって自覚はあるんですよ……？"
1010203-111 = "ですから、次は何かして差し上げます。"
1010203-112 = "……ざ、雑誌でも拾ってくるとか。"
1010203-113 = "先生はどんなものがお好きですか？#nやっぱり、エッチな雑誌が……。"
1010203-114 = "[s3] \"いやいや、そういうのは大丈夫だから。\"\n[s4] \"気にしなくて良いんだよ。\""
1010203-117 = "そ、そうですか……。"
1010203-118 = "でも……何かをしてもらったら、お返しをするように教わりましたので……。"
1010203-119 = "その、期待していてくださいね……えへへ。"
