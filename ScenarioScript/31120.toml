[translation]
31120-1 = "Episódio 12;A Noite do Primeiro Dia de Acampamento"
31120-2 = "……."
31120-3 = "No fim, a gente não conseguiu de fato entrar na piscina e brincar, né……."
31120-4 = "Aliás, encher de água levava um tempo e tanto…… me desculpem, eu tinha me esquecido disso."
31120-5 = "Não, não tem por que se desculpar. Foi bem divertido."
31120-6 = "……Que linda."
31120-7 = "Pois é. Uma piscina de madrugada é uma paisagem que a gente não vê com facilidade……."
31120-12 = "(Cochilando……)"
31120-13 = "Ora, Koharu, com soninho?"
31120-14 = "N-não tô, não…… mas, cansei um pouquinho……."
31120-15 = "De fato, hoje foi aquela correria de faxina geral desde de manhã, né."
31120-16 = "Então, que tal a gente voltar pros quartos e descansar?"
31120-17 = "A partir de amanhã o acampamento de estudos começa pra valer…… se não dormir logo, pode atrapalhar o dia de amanhã."
31120-18 = "Sim."
31120-19 = "Pois é, então por hoje é isso."
31120-21 = "Então, bom trabalho a todas."
31120-22 = "Bom trabalho."
31120-23 = "Sim, então até amanhã."
31120-24 = "……Bom trabalho."
31120-25 = "[s] \"Vou estar no quarto ali; se acontecer algo, é só me chamar a qualquer hora.\""
31120-26 = "Sim, vou guardar isso bem na memória♡"
31120-27 = "N-não pode…… esse tipo de safadeza, como membro do Comitê de Realização da Justiça……!"
31120-31 = "Todo mundo parece cansado, então vamos dormir logo?"
31120-32 = "Então, boa noite."
31120-37 = "[ns] Volta pro quarto."
31120-40 = "Quarto do Sensei"
31120-42 = "[ns1] \"………\"\n[ns2] \"Bom…….\""
31120-47 = "Afinal, o Clube de Aulas de Reforço……"
31120-48 = "foi criado justamente para expulsar alunos."
31120-51 = "[ns] （A Nagisa, na verdade, no que será que está pensando……）"
31120-59 = "Um som de batida na porta……?"
31120-60 = "[ns3] \"……?\"\n[ns4] \"Pode entrar.\""
31120-63 = "Ah, é que, com licença……."
31120-64 = "[s] A porta se abre."
31120-69 = "É que, desculpa a hora, de madrugada……."
31120-70 = "[s] \"Hifumi? O que foi?\""
31120-71 = "É que, sei lá, eu não consigo dormir, digamos……."
31120-72 = "Fiquei pensando nisso e naquilo, e aí, é que…… auu……."
31120-74 = "Decidiu conversar um pouco com a Hifumi."
31120-76 = "Sensei, o senhor também, bom trabalho hoje."
31120-77 = "[s] \"Você é que teve trabalho, Hifumi. Bom trabalho.\""
31120-78 = "A partir de amanhã é o acampamento pra valer, mas…… será que a gente vai ficar bem assim……."
31120-79 = "Se a gente reprovar no 2º exame daqui a uma semana, tem o 3º exame……."
31120-80 = "E se, por acaso, a gente reprovar nele também……"
31120-81 = "[s] \"……Todo mundo, expulso.\""
31120-82 = "……Então o senhor também sabia, né."
31120-83 = "Ainda não contei pra ninguém; até porque nem sei se é algo que dá pra contar……."
31120-84 = "É prova de aptidão, mas eu nem entendo direito por que é esse sistema de avaliação tipo \"todo mundo ao mesmo tempo\", e ainda por cima nos darem uma instalação de acampamento dessas só pra nossa prova……."
31120-85 = "Além disso……."
31120-86 = "Uu……."
31120-87 = "[s] \"Hifumi, a Nagisa te disse mais alguma coisa……?\""
31120-88 = "Não, é-é que……!?"
31120-89 = "É que a Nagisa, é, deixa ver……."
31120-90 = "……."
31120-91 = "……Sim."
31120-92 = "A Nagisa me disse pra \"não contar a ninguém\", mas…… é uma coisa que foge das minhas mãos, e……."
31120-93 = "É que, como é que eu digo……."
31120-94 = "[s] \"Que ela quer que você encontre o 'traidor de Trinity'?\""
31120-95 = "……!?"
31120-96 = "Então o senhor também ouviu isso, né……."
31120-97 = "……."
31120-98 = "……Sim, quando eu estava conversando com a Nagisa――"
31120-100 = "Hifumi…… será que você poderia procurar o traidor que está no Clube de Aulas de Reforço?"
31120-101 = "Hã, hãã……!?"
31120-102 = "Falando com franqueza, quanto a esse Clube de Aulas de Reforço, eu não me importo muito com o resultado das provas e tudo mais. Ser expulso caso não passe na prova é, no fim, o último recurso."
31120-103 = "Hifumi. Reúna o máximo de informação possível sobre elas e encontre o \"traidor\" o mais rápido que puder."
31120-104 = "É pra isso que você está agora no Clube de Aulas de Reforço, Hifumi."
31120-105 = "É que, por que logo eu, uma coisa dessas……."
31120-106 = "……\"Por quê\", é?"
31120-107 = "A resposta é que você, Hifumi, estava conectada à Schale."
31120-108 = "Enquanto o \"Sensei da Schale\", uma terceira força, estiver junto, o \"traidor\" não pode agir à toa."
31120-109 = "É como uma tampa pra que o lixo não pule pra fora da lixeira…… digamos."
31120-110 = "L-lixeira……?"
31120-111 = "……Perdão, esqueça. Aquilo foi um monólogo. Enfim――"
31120-112 = "N-Nagisa……! E-eu, é que, esse tipo de coisa……!"
31120-113 = "……Hifumi."
31120-119 = "Não há outra opção. E, ainda que tenha sido inevitável, se der errado, você, Hifumi, vai acabar tendo o mesmo fim, viu……?"
31120-120 = "……Gh."
31120-122 = "[ns] （A Nagisa, a Hifumi……）"
31120-123 = "E-eu, é que, traidor e tal, uma história dessas……."
31120-124 = "Somos todas alunas da mesma escola, não somos……? Hoje mesmo, todo mundo fez faxina junto, comeu junto……."
31120-125 = "E, com isso, me pedir pra descobrir quem é o traidor, uma coisa, uma coisa dessas……."
31120-126 = "Uma coisa dessas, eu não……."
31120-127 = "[s] \"…….\""
31120-128 = "……."
31120-129 = "[s] \"Você é gentil, Hifumi.\""
31120-130 = "H-hã……!?"
31120-131 = "[s] \"Quanto a esse assunto, você não precisa se preocupar, Hifumi.\""
31120-132 = "S-Sensei……?"
31120-133 = "[s] \"Deixa comigo. Eu vou resolver isso de algum jeito.\""
31120-134 = "……."
31120-135 = "[s] \"Quero que você, Hifumi, se esforce naquilo que você pode fazer.\""
31120-136 = "Naquilo que eu posso fazer……."
31120-137 = "……."
31120-138 = "……Sim! Entendido! Ah, é que, o que exatamente eu posso fazer eu ainda não sei…… mas vou pensar um pouco a respeito!"
31120-139 = "Sensei, muito obrigada! Sei lá, meu coração ficou mais leve……!"
31120-142 = "(No mesmo horário……)"
31120-144 = "Alojamento de Acampamento - Saguão"
31120-145 = "……."
31120-146 = "Hanako? O que você tá fazendo num lugar desses?"
31120-147 = "Ora, Azusa. Você ainda tava acordada? E, de uniforme……?"
31120-148 = "Já dormi um tanto. Então pensei em fazer uma vigília."
31120-149 = "Vigília……? Não, mais do que isso, Azusa…… não me diga que, na verdade, você não conseguiu dormir nada? Você não tá com cara de quem dormiu direito, viu……?"
31120-150 = "……Em lugar que eu não conheço, não consigo dormir muito."
31120-151 = "……."
31120-152 = "Não precisa se preocupar. Também recebi treinamento pra ficar em ação a noite inteira, então uns 5 dias sem dormir não é problema."
31120-153 = "Não…… não é bem disso que eu tô falando……."
31120-154 = "A Hanako também tá passeando? Pelo visto a Hifumi também foi passear em algum lugar. Como todo mundo deve estar insegura num lugar estranho, achei que, por isso também, talvez fosse melhor fazer uma vigília."
31120-155 = "É por isso, então não precisa se preocupar."
31120-156 = "……Azusa, não se force demais, tá."
31120-161 = "……."
31120-163 = "E, assim, a noite do primeiro dia de acampamento foi passando……."
31120-165 = "Próximo Episódio;O Simulado do Clube de Aulas de Reforço"
