[translation]
31120-1 = "Episódio 12: A primeira noite do acampamento"
31120-2 = "……."
31120-3 = "No fim das contas, não conseguimos entrar na piscina para brincar, não é……."
31120-4 = "Pensando bem, encher a piscina leva bastante tempo…… me desculpe, eu tinha esquecido disso."
31120-5 = "Não, não precisa se desculpar. Foi divertido o suficiente."
31120-6 = "……Que lindo."
31120-7 = "É verdade. Uma piscina no meio da madrugada é uma vista que não se vê com frequência……."
31120-12 = "(Cochilando……)"
31120-13 = "Ora, Koharu-chan, está com sono?"
31120-14 = "N-não estou não…… mas, estou um pouco cansada……."
31120-15 = "De fato, hoje foi uma correria com a limpeza geral desde cedo, não é?"
31120-16 = "Então, que tal voltarmos para os quartos para descansar?"
31120-17 = "O acampamento de estudos começa para valer amanhã…… se não dormirmos logo, podemos acabar prejudicando o dia de amanhã."
31120-18 = "Sim."
31120-19 = "Concordo, então por hoje é só."
31120-21 = "Bem, bom trabalho a todos."
31120-22 = "Bom trabalho."
31120-23 = "Sim, até amanhã."
31120-24 = "……Bom trabalho."
31120-25 = "[s] \"Estarei no quarto ao lado, então se precisar de algo, pode me chamar a qualquer hora.\""
31120-26 = "Sim, vou me lembrar disso♡"
31120-27 = "N-não pode…… esse tipo de coisa indecente, como membro do Comitê de Justiça……!"
31120-31 = "Parece que todos estão cansados, vamos dormir logo."
31120-32 = "Então, boa noite."
31120-37 = "[ns] Voltando para o quarto."
31120-40 = "Quarto do Sensei"
31120-42 = "[ns1] \"…….\"\n[ns2] \"Bem…….\""
31120-47 = "Para começo de conversa, o Clube de Estudos……"
31120-48 = "foi criado para expulsar as alunas."
31120-51 = "[ns] (O que a Nagisa está realmente pensando……)"
31120-59 = "Som de batidas na porta……?"
31120-60 = "[ns3] \"……?\"\n[ns4] \"Pode entrar.\""
31120-63 = "Ah, hum, com licença……."
31120-64 = "[s] A porta se abre."
31120-69 = "É, desculpe incomodar a essa hora da noite……."
31120-70 = "[s] \"Hifumi? O que houve?\""
31120-71 = "É que, eu não consigo dormir……."
31120-72 = "Fiquei pensando em várias coisas, e então…… aaaaah……."
31120-74 = "Decidi conversar um pouco com a Hifumi."
31120-76 = "Sensei, bom trabalho hoje também."
31120-77 = "[s] \"Bom trabalho para você também, Hifumi.\""
31120-78 = "O acampamento de estudos começa para valer amanhã, mas…… será que ficaremos bem desse jeito……."
31120-79 = "Se falharmos no segundo exame daqui a uma semana, haverá o terceiro exame……."
31120-80 = "E se, por acaso, falharmos nele também……"
31120-81 = "[s] \"……Todas serão expulsas.\""
31120-82 = "……Então você já sabia, Sensei."
31120-83 = "Ainda não contei para ninguém, e nem sei se é algo que eu deveria contar……."
31120-84 = "Mesmo sendo um exame acadêmico, não entendo por que existe esse sistema de avaliação de \"todas ao mesmo tempo\", e por que nos forneceram até uma instalação de acampamento só para o nosso exame……."
31120-85 = "Além disso……."
31120-86 = "Uuu……."
31120-87 = "[s] \"Hifumi, a Nagisa te disse mais alguma coisa...?\""
31120-88 = "Ah, i-isso...!?"
31120-89 = "A, a Nagisa-sama me disse, bem..."
31120-90 = "……"
31120-91 = "……Sim."
31120-92 = "A Nagisa-sama me pediu para \"não contar a ninguém\", mas... é um assunto que eu não consigo lidar sozinha..."
31120-93 = "Bem, como eu deveria dizer..."
31120-94 = "[s] \"Ela pediu para você encontrar o 'traidor da Trinity'?\""
31120-95 = "……!?"
31120-96 = "Então o Sensei também recebeu essa ordem, não é..."
31120-97 = "……"
31120-98 = "……Sim, quando eu estava conversando com a Nagisa-sama――"
31120-100 = "Hifumi-san... você poderia procurar pelo traidor que está no Esquadrão de Reforço?"
31120-101 = "Eh, eeh...!?"
31120-102 = "Para ser sincera, não estou particularmente preocupada com os resultados dos testes do Esquadrão de Reforço agora. A regra de que quem não passar será expulso é, no fim das contas, apenas um último recurso."
31120-103 = "Hifumi-san. Você poderia reunir o máximo de informações sobre elas e encontrar o \"traidor\" o mais rápido possível?"
31120-104 = "É por isso que você está no Esquadrão de Reforço agora, Hifumi-san."
31120-105 = "Mas, por que eu teria que fazer algo assim..."
31120-106 = "……\"Por que\", você pergunta?"
31120-107 = "A resposta é porque você, Hifumi-san, tem uma conexão com o Schale."
31120-108 = "Enquanto o \"Sensei do Schale\", uma terceira força, estiver por perto, o \"traidor\" não poderá agir imprudentemente."
31120-109 = "É como uma tampa para evitar que o lixo saia da lixeira... eu suponho."
31120-110 = "Li, lixeira...?"
31120-111 = "……Perdão, esqueça o que eu disse. Foi apenas um pensamento em voz alta. De qualquer forma――"
31120-112 = "Na, Nagisa-sama...! Eu, bem, esse tipo de coisa...!"
31120-113 = "……Hifumi-san."
31120-119 = "Não há outras opções. Além disso, embora não tenha sido intencional, se você falhar, o mesmo acontecerá com você, Hifumi-san... entende?"
31120-120 = "……!"
31120-122 = "[ns] (A Nagisa está... usando a Hifumi...)"
31120-123 = "Eu, bem, essa história de traidor, algo assim..."
31120-124 = "Todas nós somos alunas da mesma escola, não somos...? Hoje mesmo, nós limpamos tudo juntas e comemos juntas..."
31120-125 = "E agora, me pedir para investigar quem é o traidor, algo assim, algo assim..."
31120-126 = "Eu não consigo fazer algo assim..."
31120-127 = "[s] \"……\""
31120-128 = "……"
31120-129 = "[s] \"A Hifumi é muito gentil.\""
31120-130 = "Eh, eeh...!?"
31120-131 = "[s] \"Não precisa se preocupar com esse assunto, Hifumi.\""
31120-132 = "Se, Sensei...?"
31120-133 = "[s] \"Deixe comigo. Eu vou resolver isso de alguma forma.\""
31120-134 = "……"
31120-135 = "[s] \"Eu quero que a Hifumi se esforce no que ela pode fazer.\""
31120-136 = "O que eu... posso fazer..."
31120-137 = "……"
31120-138 = "……Sim! Entendido! Ah, bem, eu ainda não sei o que posso fazer... mas vou tentar pensar sobre isso!"
31120-139 = "Sensei, muito obrigada! Sinto que meu coração ficou mais leve...!"
31120-142 = "(No mesmo momento...)"
31120-144 = "Dormitório - Lobby"
31120-145 = "……"
31120-146 = "Hanako? O que está fazendo aqui?"
31120-147 = "Ah, Azusa-chan. Você ainda está acordada? E ainda por cima, de uniforme...?"
31120-148 = "Eu já dormi o suficiente. Por isso, pensei em ficar de vigia."
31120-149 = "Vigia...? Não, mais importante que isso, Azusa-chan... será que, na verdade, você não conseguiu dormir nada? Não parece que você descansou bem..."
31120-150 = "...É que em lugares aos quais não estou acostumada, não consigo dormir muito bem."
31120-151 = "..."
31120-152 = "Não precisa se preocupar. Eu recebi treinamento para operar durante a noite toda, então ficar uns 5 dias sem dormir não é um problema."
31120-153 = "Não... não é sobre isso que estou falando..."
31120-154 = "Hanako também está passeando? Parece que Hifumi também saiu para caminhar em algum lugar. Como acho que todos estão ansiosos por estarem em um lugar desconhecido, pensei que seria bom ficar de vigia por causa disso também."
31120-155 = "É por isso, então não se preocupe, está tudo bem."
31120-156 = "...Azusa-chan, por favor, não se esforce demais."
31120-161 = "..."
31120-163 = "E assim, a primeira noite do acampamento passou..."
31120-165 = "Próximo episódio: O simulado do Clube de Estudos Suplementares"
