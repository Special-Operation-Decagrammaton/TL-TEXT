[translation]
31120-1 = "Episódio 12: Primeira Noite do Acampamento"
31120-2 = "……。"
31120-3 = "No final, não conseguimos nem entrar na piscina pra brincar…"
31120-4 = "Realmente, encher a piscina demora mais do que eu imaginava… desculpa, eu me esqueci."
31120-5 = "Não precisa pedir desculpa. Foi divertido o suficiente."
31120-6 = "……Que lindo."
31120-7 = "Realmente. Uma piscina à meia-noite é uma vista que não se vê todo dia…"
31120-12 = "（Zzz……）"
31120-13 = "Ara, Koharu-chan tá com sono?"
31120-14 = "N-não tô não…… mas tô um pouco cansada…"
31120-15 = "É, hoje foi corrido desde cedo com a grande limpeza."
31120-16 = "Então, que tal voltarmos pros quartos e descansar?"
31120-17 = "Amanhã começa o acampamento de estudos pra valer… se não dormirmos direito, vai atrapalhar amanhã."
31120-18 = "Sim."
31120-19 = "Então, por hoje é só isso."
31120-21 = "Bom trabalho, todo mundo."
31120-22 = "Bom trabalho."
31120-23 = "Sim, até amanhã."
31120-24 = "……Bom trabalho."
31120-25 = "[s] \"Vou estar no quarto do outro lado. Se precisarem de mim, é só chamar.\""
31120-26 = "Sim, vou lembrar direitinho♡"
31120-27 = "P-proibido…… esse tipo de safadeza…… como membro do Comitê de Execução da Justiça……！"
31120-31 = "Todo mundo parece cansado, então vamos dormir logo."
31120-32 = "Então, boa noite."
31120-37 = "[ns] Volta pro quarto."
31120-40 = "Quarto do Sensei"
31120-42 = "[ns1] \"………。\"\n[ns2] \"Bem……。\""
31120-47 = "No fundo, o Clube de Reforço foi criado…"
31120-48 = "…para expulsar alunas."
31120-51 = "[ns] （O que a Nagisa realmente está pensando……）"
31120-59 = "Alguém batendo na porta……？"
31120-60 = "[ns3] \"……？\"\n[ns4] \"Pode entrar.\""
31120-63 = "Ah, com licença……"
31120-64 = "[s] A porta se abre."
31120-69 = "Desculpe incomodar tão tarde da noite……"
31120-70 = "[s] \"Hifumi？ O que aconteceu？\""
31120-71 = "É que… não tô conseguindo dormir direito……"
31120-72 = "Fiquei pensando em várias coisas e… auuu……"
31120-74 = "Acabei conversando um pouco com a Hifumi."
31120-76 = "Sensei, você também deve estar cansado hoje."
31120-77 = "[s] \"Hifumi que se esforçou bastante também.\""
31120-78 = "Amanhã começa o acampamento de estudos de verdade, mas… será que a gente vai conseguir assim……"
31120-79 = "Se a gente reprovar na segunda prova… na terceira…"
31120-80 = "Se a gente reprovar em todas……"
31120-81 = "[s] \"……Todo mundo vai ser expulso.\""
31120-82 = "……Então o Sensei já sabia."
31120-83 = "Ainda não contei pra ninguém, mas nem sei se posso contar… e também não entendo por que o sistema de avaliação é «todos juntos» numa prova de desempenho… e ainda nos deram esse anexo todo só pra isso…"
31120-84 = "Além disso……"
31120-85 = "Uuu……"
31120-86 = "[s] \"Hifumi, a Nagisa te disse mais alguma coisa……？\""
31120-87 = "N-não, é que……！？"
31120-88 = "A Nagisa-sama me disse pra não contar pra ninguém, mas… não é algo que eu consiga resolver sozinha…"
31120-89 = "Como eu posso dizer…"
31120-90 = "[s] \"「Encontre a traidora dentro do Clube de Reforço」？\""
31120-91 = "……！？"
31120-92 = "Então o Sensei também ouviu isso…"
31120-93 = "……。"
31120-94 = "……Sim. Quando eu estava conversando com a Nagisa-sama――"
31120-100 = "Hifumi-san…… você poderia procurar a traidora que está dentro do Clube de Reforço?"
31120-101 = "Eh, ehh……！？"
31120-102 = "Vou ser sincera. Na verdade, não estou nem um pouco preocupada com os resultados das provas do Clube de Reforço. A expulsão por reprovação é só o último recurso."
31120-103 = "Hifumi-san. Por favor, colete o máximo de informações possível sobre elas e encontre a «traidora» o mais rápido que puder."
31120-104 = "Você está no Clube de Reforço justamente pra isso."
31120-105 = "M-mas por que eu… uma coisa dessas…"
31120-106 = "……「Por que eu」."
31120-107 = "A resposta é porque você tem ligação com a Schale."
31120-108 = "Enquanto o «Sensei da Schale», uma terceira força, estiver junto, a «traidora» não vai agir de forma imprudente."
31120-109 = "É como uma tampa pra impedir que o lixo saia da lixeira… algo assim."
31120-110 = "L-lixeira……？"
31120-111 = "……Desculpe, esquece o que eu disse. Foi um monólogo. Enfim――"
31120-112 = "N-Nagisa-sama……！ E-eu, uma coisa dessas……！"
31120-113 = "……Hifumi-san."
31120-119 = "Não temos outra escolha. E, mesmo que tenha sido inevitável, se você falhar, vai acabar no mesmo destino que elas…？"
31120-120 = "……っ。"
31120-122 = "[ns] （A Nagisa está usando a Hifumi como……）"
31120-123 = "E-eu… uma traidora… uma coisa dessas…"
31120-124 = "Todo mundo é aluno da mesma escola… hoje mesmo a gente limpou tudo junto, comeu junto…"
31120-125 = "E agora você quer que eu procure quem é a traidora… uma coisa dessas… eu não consigo…"
31120-126 = "Uma coisa dessas, eu…"
31120-127 = "[s] \"……。\""
31120-128 = "……。"
31120-129 = "[s] \"……Hifumi é uma pessoa muito gentil.\""
31120-130 = "Eh, ehh……！？"
31120-131 = "[s] \"Sobre esse assunto, não precisa se preocupar. Deixa comigo.\""
31120-132 = "S-Sensei……？"
31120-133 = "[s] \"Vou resolver do meu jeito. Confia em mim.\""
31120-134 = "……。"
31120-135 = "[s] \"Hifumi, faz o que você consegue fazer.\""
31120-136 = "O que eu consigo fazer……"
31120-137 = "……。"
31120-138 = "……Sim！ Entendi！ Ah, mas eu ainda não sei direito o que posso fazer… mas vou pensar em algo！"
31120-139 = "Obrigada, Sensei！ Meu coração ficou mais leve……！"
31120-142 = "（No mesmo horário……）"
31120-144 = "Lobby do Anexo"
31120-145 = "……。"
31120-146 = "Hanako？ O que você tá fazendo aqui？"
31120-147 = "Ara, Azusa-chan. Ainda acordada？ E ainda de uniforme……？"
31120-148 = "Já dormi um pouco. Então pensei em fazer uma vigília."
31120-149 = "Vigília……？ Não, mas Azusa-chan…… será que você não dormiu direito？ Não tá com cara de quem dormiu bem…"
31120-150 = "……Não durmo bem em lugares desconhecidos."
31120-151 = "……。"
31120-152 = "Não precisa se preocupar. Eu treinei pra ficar acordada a noite inteira, então consigo ficar 5 dias sem dormir sem problema."
31120-153 = "Não… não é sobre isso…"
31120-154 = "Hanako também tá passeando？ Parece que a Hifumi também saiu pra algum lugar. Como todo mundo deve estar ansiosa num lugar novo, achei melhor fazer vigília."
31120-155 = "Então não precisa se preocupar."
31120-156 = "……Azusa-chan, não se força demais, tá？"
31120-161 = "……。"
31120-163 = "E assim, a primeira noite do acampamento passou…"
31120-165 = "Próximo; Simulado do Clube de Reforço"