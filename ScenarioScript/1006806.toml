[translation]
1006806-1 = "おやすみ、レイサ"
1006806-2 = "スラム街"
1006806-3 = "（念のため、レイサが担当しているスラム街に向かった)"
1006806-7 = "（辺りは静まり返っており、レイサの寝言が通りまで聞こえてくるほどだった）"
1006806-11 = "うへへ……もう食べられません……ひひ……"
1006806-17 = "[ns1] そっと肩を揺する。\n[ns2] \"こんな所で寝たら風邪引くよ。\""
1006806-20 = "うひひ……せんせぇ……"
1006806-21 = "せんせぇ……"
1006806-22 = "……先生？"
1006806-23 = "……あれ？"
1006806-24 = "うひゃあああああああっ！！！"
1006806-25 = "せ、先生！？どうして先生が！？#nん、んん！？えっ！？あれっ！？"
1006806-26 = "……寂しがってると思って？#nぱ、パトロールなら、いつも1人でやっていますが……"
1006806-27 = "あっ、いえいえいえ！嫌とかではなくて！むしろ……#nもも、元はといえば、私が勝手に心配になって見回りをしているだけなので……"
1006806-28 = "[s3] \"私も心配性だから。\"\n[s4] \"少し風に当たりたかったんだ。\""
1006806-31 = "そ、そうなのですか……？#nうーん……？"
1006806-32 = "ああ……いえ、毎日こんな時間までパトロールしてるわけではないのですが……"
1006806-33 = "さ、さっきから話を逸らそうとしてませんか！？#n寒いので先生は帰ってください！先生こそ風邪を引いちゃいますよ！"
1006806-34 = "[s5] \"余計、1人にできないよ。\"\n[s6] \"防寒対策はバッチリだよ。\""
1006806-37 = "へへ……"
1006806-38 = "……たしかに2人でお喋りしていれば、多少は眠気も……？"
1006806-39 = "んん……そうなんですが……でも、お忙しい先生にそんなこと……"
1006806-43 = "本当に、お願いしても……？"
1006806-44 = "そ、それでは、よろしく！お願いいたします！！"
1006806-46 = "（2人で眠気と戦いながら、静かな夜の街を見回った)"
1006806-47 = "（何事も起きずに明け方を迎え、やわらかく澄んだ空気が肺を満たしていく)"
1006806-54 = "やはり、何も起きませんでしたね。#nあはは、今日はそんな気がしていました！"
1006806-55 = "……いえ！残念なわけではないですよ？#nむしろ喜ぶところです！"
1006806-56 = "自警団の仕事がなくなったとしても、この平和が続いてほしい。"
1006806-57 = "……と、私の尊敬する方が言ってました！"
1006806-58 = "……どうしても、徹夜明けは眠くなりますね……"
1006806-59 = "ふあ、ふぁあ……"
1006806-65 = "[ns7] 倒れないよう、優しく肩に手を回す。\n[ns8] \"レイサ、もう少し頑張れそう？\""
1006806-69 = "はっ！すみません！#nまた先生の前で情けないところを……"
1006806-70 = "ところで、先生は……眠くないのでしょうか？"
1006806-71 = "よくあるって……一体、普段からどんな生活をされて……"
1006806-72 = "……あっ。"
1006806-73 = "[ns9] \"……レイサ？\"\n[ns10] \"どうかしたの？\""
1006806-79 = "……見てください、先生。"
1006806-84 = "……きれいです、ね。"
1006806-87 = "[wa:1500]― ……なんだか、[wa:1400]不思議な気分です。[wa:2600]こうして……"
1006806-89 = "[wa:600]― 人と一緒に、[wa:1700]日の出を見るのは[wa:1100]初めてで。"
1006806-92 = "[wa:1000]― そういえば、[wa:1400]誰かと二人きりで[wa:1300]過ごした時間も……。"
1006806-94 = "[wa:1900]― もしかすると、[wa:1700]これが最長かも……[wa:1800]はは。"
1006806-97 = "[wa:300]― んん……"
1006806-99 = "[wa:500]― また変なことを言って[wa:1300]しまった気がします……。"
1006806-102 = "[wa:700]― 実は[wa:400]まだ、[wa:800]少し眠くて……"
1006806-104 = "[wa:1000]― 自分でも[wa:1000]何を言っているのか、[wa:1000]よく……。"
1006806-107 = "[wa:200]― で、[wa:800]でも[wa:300]先生は……[wa:2100]なんでも分かってくださるから……"
1006806-110 = "[wa:700]― 今回も……"
1006806-112 = "[wa:600]― いつもみたいに、[wa:1200]分かってくださいね。[wa:2000]へへ……。"
1006806-115 = "[wa:200]― ん……[wa:1800]いいですね……。"
1006806-118 = "[wa:900]― 先生……[wa:1800]ありがとうございます……[wa:2000]ひひ……。"
1006806-122 = "ふや……せんせい……"
1006806-124 = "（……気持ち良さそうに寝ているレイサをおぶって、シャーレに戻り……）"
1006806-125 = "（休憩室でゆっくり寝かせてから、部屋まで送り届けた)"
