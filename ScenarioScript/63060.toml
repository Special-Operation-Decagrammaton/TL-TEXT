[translation]
63060-1 = "Episódio 6; Descendo ao mais baixo"
63060-3 = "Líder do Esquadrão Arius. Saori Joumae... é você, certo? Já ouvi falar muito de você. #nComo somos ambas do primeiro ano, vamos dar o nosso melhor nesta missão."
63060-4 = "Você é a Subaru Kakehashi, certo? Já fui informada sobre a orientação."
63060-5 = "Isso é... o que é isso?"
63060-6 = "……."
63060-7 = "……Ah, sobre aquela época."
63060-8 = "O dia em que encontrei Saori Joumae pela primeira vez em uma missão."
63060-9 = "Nós duas ainda éramos do primeiro ano."
63060-10 = "Uma aluna fria e obstinada. Essa foi a minha primeira impressão."
63060-11 = "Antes da missão, eu gostaria de alinhar o plano de operação, mas—"
63060-12 = "Isso já está terminado. Aqui está o plano. Dê uma olhada."
63060-16 = "……Sim?"
63060-17 = "Aconteceu alguma coisa?"
63060-18 = "Bem, eu acho que as coisas têm uma ordem a ser seguida..."
63060-19 = "Entender a força uma da outra, confirmar as áreas de especialidade, compartilhar os cenários previstos, e além disso—"
63060-20 = "Se não tem confiança, pode desistir. Para esta missão, eu sozinha já sou o suficiente."
63060-21 = "……No esquadrão, vocês são sempre assim?"
63060-22 = "No caso do esquadrão, esse tipo de conversa nem é necessária. #nPorque cada uma apenas cumpre o seu papel."
63060-23 = "Você não vai me dizer que isso é a sua forma de ser atenciosa, vai?"
63060-24 = "Exatamente, por quê?"
63060-25 = "……Entendo."
63060-33 = "Por favor, me explique!"
63060-34 = "Não há nada para explicar, era apenas o necessário para a execução da missão."
63060-35 = "Para Saori Joumae, a existência de qualquer um fora do esquadrão parecia não ter importância."
63060-36 = "Por isso, às vezes, em missões que exigiam cooperação com outros, as coisas sempre ficavam tensas."
63060-37 = "……Pensando bem, eu fui a única que conseguiu lidar com aquela personalidade."
63060-38 = "Eu estava na linha de tiro, sabia!? #nMesmo assim, despejar todo o poder de fogo restante, o que você tinha na cabeça!?"
63060-39 = "Nós já somos do segundo ano, sabia!? #nNão pode olhar um pouco ao redor antes de agir!?"
63060-40 = "Eu apenas escolhi o método que permite concluir a missão o mais rápido possível."
63060-41 = "As virtudes de uma missão estão na força, na vitória e na conclusão rápida. O fracasso é um pecado."
63060-42 = "……Então, o que acontece com o resto não importa?"
63060-46 = "Finalmente você começou a entender."
63060-47 = "Não é isso que eu quis dizer!!"
63060-49 = "Eu soube. Parece que você... não passou de ano."
63060-50 = "Ah, parece que foi isso que aconteceu."
63060-51 = "Pensando agora, aquilo deve ter sido a vontade da Madame."
63060-52 = "Para a Madame, tudo, exceto o esquadrão... #nnão, exceto Atsuko, não passava de ferramentas."
63060-53 = "Talvez por isso ela estivesse tentando usar a Saori daquela maneira."
63060-54 = "……Por algum motivo, eu não conseguia suportar isso de jeito nenhum."
63060-55 = "Assim como todas as outras crianças que sofriam em Arius."
63060-56 = "Você não sente nada? Você não vai para o terceiro ano, sabe?"
63060-57 = "Nada em especial. É apenas o fato de que não pude subir para o terceiro ano."
63060-58 = "Como poderei continuar sendo a líder do esquadrão por mais um ano, não é uma notícia ruim."
63060-59 = "……No fim das contas, é sempre sobre o esquadrão."
63060-60 = "Isso é um problema?"
63060-61 = "Não, não é. #nSendo assim, a partir de agora eu sou sua veterana. Tente dar o seu melhor também."
63060-62 = "Sobre isso."
63060-63 = "……O que foi?"
63060-64 = "Parece que as minhas 'calouras' estão contando com você."
63060-65 = "……Entendo. Fico lisonjeada."
63060-66 = "Ah. Parece que esse é um papel difícil para mim."
63060-67 = "Mas o papel de instrutor é outra história."
63060-68 = "……Isso significa que quer que eu cuide do bem-estar mental das alunas? #nSeu treinamento acaba deixando muitas alunas com o psicológico abalado, sabia?"
63060-69 = "Como esperado, você é perspicaz. Sou sempre grato por isso."
63060-70 = "Por favor, pare de fazer coisas que as deixam abaladas desde o início!!!"
63060-72 = "Mas…… é verdade."
63060-73 = "Não importa a situação, Saori Joumae nunca mudava."
63060-74 = "É justamente por isso que eu achava impossível que ela mudasse."
63060-95 = "[ns] \"Acordou?\""
63060-97 = "Onde…… onde estamos?"
63060-98 = "[s] \"No lugar que você chamou de Porta Pacis.\""
63060-99 = "O lugar continua o mesmo, então."
63060-100 = "……."
63060-101 = "Por quanto tempo eu fiquei inconsciente?"
63060-102 = "[s] \"Cerca de 10 segundos, eu acho.\""
63060-103 = "Entendo."
63060-104 = "Tudo…… acabou?"
63060-105 = "[s] \"Isso é algo que eu também gostaria de saber…….\""
63060-106 = "Entendo."
63060-107 = "É, né……."
63060-108 = "……."
63060-113 = "…………."
63060-114 = "………………."
63060-115 = "……………………Acabou, não é?"
63060-116 = "Sim. Tudo…… acabou."
63060-117 = "Eu……."
63060-118 = "No fim, não consegui fazer nada……."
63060-119 = "Por causa do meu egoísmo, todos……."
63060-120 = "Cheguei a esse ponto……."
63060-121 = "……Ugh."
63060-122 = "(Pude ouvir os soluços de Subaru)"
63060-123 = "(Olhei um pouco ao redor e me sentei ao lado de Subaru)"
63060-129 = "(Decidi esperar até que Subaru se acalmasse)"
63060-132 = "Sensei. ……Por que você não diz nada?"
63060-133 = "……Eh? Você não sabe o que dizer……?"
63060-134 = "Essa é a frase que eu queria dizer……."
63060-135 = "[s] \"Foi difícil, não foi?\""
63060-136 = "……."
63060-137 = "O que será que eu queria fazer?"
63060-138 = "[s] \"Você estava tentando proteger Arius com todas as suas forças.\""
63060-139 = "E o resultado é este estado deplorável."
63060-140 = "……."
63060-141 = "Tudo acabou. Foi tudo sem sentido."
63060-142 = "Tentei desesperadamente, e o resultado foi este."
63060-143 = "Pelas crianças feridas, por aquelas que não tinham um lugar para ficar. #ne também…… certamente, por mim mesma."
63060-144 = "Porque eu não queria uma vida em que fosse levada pela correnteza, como antigamente……."
63060-145 = "Mas……."
63060-146 = "Se o final fosse esse, teria sido melhor não fazer nada……."
63060-147 = "[s1] \"Não é verdade.\"\n[s2] \"O fato de você ter tentado tem significado.\""
63060-150 = "……Mesmo com esse resultado?"
63060-151 = "Minha motivação também não era pura."
63060-152 = "Eu só estava tentando me exibir na frente das outras."
63060-153 = "A Saori estava certa."
63060-154 = "Eu falava de forma arrogante sobre o 'jeito de Arius', mas, no fim das contas... não havia nada ali."
63060-155 = "[s3] \"Mas você percebeu que 'era assim', não percebeu?\"\n[s4] \"Além disso, como você é uma estudante, o 'processo' também deve ser valorizado.\""
63060-158 = "A dor de ser avaliada apenas pelos resultados é algo para quando eu for adulta... não é?"
63060-159 = "……."
63060-160 = "Não quero usar o fato de ser estudante como desculpa, mas..."
63060-164 = "Sim...?#nQue é uma atitude admirável e que você quer que eu continue mantendo...?"
63060-165 = "……."
63060-166 = "Mas, mesmo dizendo isso."
63060-167 = "O que vai mudar em uma vida que está no fundo do poço?"
63060-168 = "De qualquer forma, nós só vivemos assim e terminaremos assim."
63060-169 = "Não importa o quanto você polir o lixo, ele não vai virar uma joia."
63060-170 = "……."
63060-171 = "Por favor, não me faça ter sonhos que não podem ser realizados.#nIsso é o mais cruel de tudo."
63060-172 = "Dizer que o esforço será recompensado é a coisa mais irresponsável que existe, não é?"
63060-173 = "[s5] \"É verdade, há coisas que não mudam mesmo com esforço.\"\n[s6] \"Talvez você fracasse.\"\n[s7] \"Talvez fique pior do que está agora.\""
63060-179 = "[ns8] \"Mas pense bem.\"\n[ns9] \"Se você já está no fundo, o único caminho é subir, não é?\""
63060-182 = "……Você não está tentando me encorajar com isso, está?"
63060-184 = "Mas não deixa de ser verdade, não é?"
63060-188 = "Saori...?"
63060-193 = "……Foi algo terrível."
63060-194 = "Porque nós realmente vivíamos uma vida no fundo do poço."
63060-195 = "A ponto de não haver mais para onde cair, nem para onde fugir."
63060-196 = "Então, não importa o que aconteça, só nos resta seguir em frente."
63060-197 = "Foram dias terríveis. Sério mesmo."
63060-198 = "E-ehehe... Mesmo que exista um fundo... ainda mais profundo que o fundo do poço..."
63060-199 = "E-então, nesse caso, podemos dizer que só demos uma olhada no porão... não é?"
63060-200 = "Squad... vocês ficaram todos idiotas de uma vez?"
63060-201 = "Dizem que isso se chama habilidade de sobrevivência."
63060-202 = "……Se não fosse assim, não daria para aguentar."
63060-203 = "N-no fim, o motivo... não importa qual seja... ehehe..."
63060-204 = "É isso mesmo. Por isso, vamos todos juntos."
63060-205 = "Porque, estando com todos, sinto que ganho forças.#n……Não que seja um motivo de conto de fadas como esse."
63060-206 = "Arius não consegue fazer nada se não estivermos todos juntos."
63060-207 = "Não é?"
63060-216 = "Senpai, não vai se levantar logo?"
63060-217 = "Se ficar deitada no chão, suas roupas vão ficar cheias de lama, sabe?"
63060-222 = "……."
63060-227 = "Acho que já estão sujas."
63060-228 = "Ainda assim, acho melhor não sujar mais do que isso."
63060-229 = "……."
63060-230 = "Sim. Você tem razão."
63060-248 = "Líder!?"
63060-249 = "Uwaaaaaa!! Líder-----!!"
63060-250 = "Serina? Hanae?#nAqui é... entendo. Então é a enfermaria da Unidade de Socorro."
63060-251 = "……."
63060-252 = "Quantos dias faltam... para o exame!?"
63060-253 = "Hã!? I-isso também é importante, mas agora o repouso é..."
63060-254 = "O exame é a prioridade máxima!!!"
63060-255 = "Ficar atrás de outros departamentos é algo que não podemos permitir de jeito nenhum!"
63060-256 = "……."
63060-257 = "Sim! Comandante! Com certeza!"
63060-258 = "……."
63060-259 = "É verdade. Ainda temos tempo, então vamos nos preparar com calma."
63060-260 = "Pessoal, estão todas bem, certo?"
63060-262 = "Sim!"
63060-264 = "Próxima vez; Tentativa"
