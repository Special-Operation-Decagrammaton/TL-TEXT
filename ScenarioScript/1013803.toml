[translation]
1013803-1 = "Porque você não vai admitir isso!"

1013803-2 = "(Fui para o local de encontro especificado por Lena)"

1013803-5 = "Ah, aqui, aqui!"

1013803-6 = "[s1] \"Você está no ponto de ônibus a esta hora?\"\n[s2] \"Onde você está indo?\""

1013803-9 = "Bem..."

1013803-10 = "a partir de agora……."

1013803-11 = "Estou indo para uma ruína que dizem ser mal-assombrada."

1013803-12 = "[s] \"O que, um fantasma!?\""

1013803-13 = "Bem, não posso evitar!"

1013803-14 = "Eu disse aos meus mais velhos: ``Vou provar que não existem fantasmas!''"

1013803-15 = "[s] \"Todo mundo parece estar me seguindo.\""

1013803-16 = "Eu disse para você não vir."

1013803-17 = "Parece que vai ser uma brincadeira..."

1013803-18 = "Sou o único com passe de viagem."

1013803-19 = "Porém, ir sozinho é um pouco..."

1013803-20 = "[s] \"É aí que eu entro.\""

1013803-21 = "Bem, eu realmente não penso assim...!"

1013803-22 = "Enfim, não há empréstimo ou empréstimo!"

1013803-23 = "[s] \"Entendido! Vou proteger Lena!\""

1013803-24 = "Suspiro... eu me pergunto por que isso aconteceu..."

1013803-25 = "Ah, o ônibus chegou."

1013803-30 = "(Então chegamos a um lugar deserto...)"

1013803-31 = "Em breve estará em ruínas."

1013803-32 = "É um lugar onde eu costumava me divertir muito. #nHá rumores sobre ruídos estranhos desde que o prédio foi construído."

1013803-33 = "E parece que ainda consigo ouvir aquele som..."

1013803-34 = "As crianças que foram lá para testar sua coragem desmaiaram ou passaram mal, então ninguém parece mais se aproximar delas."

1013803-35 = "[s] \"Você sabe bastante, não é?\""

1013803-36 = "Bem, normalmente você descobriria como é!"

1013803-37 = "Aqui vamos nós! Vou te provar que não existem fantasmas!"

1013803-42 = "(E então, conforme avançamos pelas ruínas...)"

1013803-43 = "[ns] \"Há uma certa atmosfera...\""

1013803-44 = "Existem sete maravilhas neste lugar."

1013803-45 = "O primeiro. O som de batidas na janela ecoou pelo corredor no meio da noite."

1013803-46 = "Segundo. A 13ª escada que não existe."

1013803-47 = "Terceiro. Uma figura vagando pelo corredor."

1013803-48 = "Quarto. Uma cerejeira manchada de sangue pode ser vista da janela."

1013803-49 = "Quinto. O som de uma campainha vindo de um alto-falante quebrado."

1013803-50 = "Sexto. Sons de choro vazaram da sala de máquinas subterrânea."

1013803-51 = "O sétimo é--"

1013803-52 = "--Ninguém sabe disso ainda."

1013803-53 = "Aqueles que perceberem isso serão confrontados com um desastre..."

1013803-54 = "[s] \"Sinto que já ouvi tudo isso antes.\""

1013803-55 = "Ah, não é? Esta não é uma história comum?"

1013803-56 = "de qualquer forma. Depois de verificar tudo, pretendo enviar fotos para meus idosos."

1013803-57 = "Porque nada jamais acontecerá. #nProva de que não existem fantasmas――"

1013803-61 = "...! ?"

1013803-62 = "Naná, o que...?"

1013803-66 = "Ei...! !"

1013803-70 = "[ns] \"O som de batidas na janela ecoa no corredor no meio da noite...!\""

1013803-71 = "E-não tem como ter mais ninguém além de nós!"

1013803-72 = "[s] \"Vamos dar uma olhada.\""

1013803-73 = "...! !"

1013803-74 = "[s3] \"Não se preocupe.\"\n[s4] \"Eu nunca vou deixar você ir.\""

1013803-77 = "Bem, quem está tão preocupado...! !"

1013803-82 = "De qualquer forma, vamos!"

1013803-91 = "Ah! Ah...!"

1013803-95 = "O que, não é um corvo..."

1013803-96 = "Eu me pergunto por que ele cutucou a janela. Não há outro alimento."

1013803-97 = "[s] \"Não era um corvo, era na verdade um fantasma...?\""

1013803-98 = "Shhh! ! Isso não pode ser verdade!"

1013803-99 = "Vamos tirar uma foto primeiro! Preciso deixar evidências de que o barulho no corredor era de um corvo."

1013803-106 = "Olhar. Você está tirando boas fotos, não é? Não há coisas estranhas na foto."

1013803-107 = "Continuarei investigando os Sete Mistérios nesse ritmo!"

1013803-109 = "(Ao contrário de sua voz animada, Lena nunca largou sua mão.)"

1013803-111 = "[ns] (Vamos ter cuidado para não me largar também)"

1013803-113 = "(E então Lena e eu começamos a investigar as ruínas)"

1013803-115 = "Corredor com sombra de uma pessoa"

1013803-122 = "Onde você pode ver cerejeiras manchadas de sangue"

1013803-127 = "Sala de máquinas subterrânea onde sons de choro podem ser ouvidos"

1013803-137 = "(conferi e tirei fotos de todos os lugares chamados de Sete Maravilhas)"

1013803-138 = "(No final, o fantasma não apareceu.)"

1013803-140 = "Ufa, assim como pensei. #nNão existe fantasma."

1013803-141 = "Tudo é causado por animais e edifícios envelhecidos."

1013803-142 = "OK! Peguei algumas evidências, então vamos para casa. #nTenho que mostrar aos meus mais velhos."

1013803-143 = "[s5] \"Consegui provar que não existem fantasmas, mas...\"\n[s6] \"Ainda devemos dar as mãos?\""

1013803-146 = "Bem, isso é..."

1013803-147 = "M-Não é como se eu estivesse me conectando porque estou com medo!"

1013803-148 = "Está escuro... e seria perigoso se eu caísse!"

1013803-149 = "[s] \"Sim, sim, é perigoso.\""

1013803-151 = "(Levei Lena para a Caçada Selvagem)"

1013803-157 = "(Mesmo pensando que a exploração das ruínas havia chegado ao fim...)"

