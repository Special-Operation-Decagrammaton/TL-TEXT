[translation]
1013803-1 = "認めないんだから！"
1013803-2 = "（レナの指定通り、待ち合わせ場所へ向かった）"
1013803-5 = "あ、こっちこっち！"
1013803-6 = "[s1] \"こんな時間にバス停に？\"\n[s2] \"どこへ行くの？\""
1013803-9 = "えっと……。"
1013803-10 = "今から……。"
1013803-11 = "幽霊が出るって噂の廃墟に行くの。"
1013803-12 = "[s] \"え、幽霊！？\""
1013803-13 = "だ、だって仕方ないのよ！"
1013803-14 = "先輩たちに「幽霊はいないって証明する」って言っちゃったんだもん！"
1013803-15 = "[s] \"みんなもついてきそうなのに。\""
1013803-16 = "私が来ないでって言ったの。"
1013803-17 = "イタズラとかしそうだし……。"
1013803-18 = "外出証があるのも私だけだから。"
1013803-19 = "でも、なんか一人で行くのは……やっぱちょっと、さ……。"
1013803-20 = "[s] \"そこで私の出番ってことだね。\""
1013803-21 = "まあ、別に本当に[ruby=・   ・]出る[/ruby]とは思ってないけど……！"
1013803-22 = "とにかく、これで貸し借りなしよ！"
1013803-23 = "[s] \"了解！レナを守るよ！\""
1013803-24 = "はあ……なんでこんなことになったんだろ……。"
1013803-25 = "あっ、バスが来たわ。"
1013803-30 = "（そしてひと気のない場所に到着し……）"
1013803-31 = "もうすぐ廃墟よ。"
1013803-32 = "元々いわくつきの場所でね。#n建物ができた時から妙な音がするって噂があったの。"
1013803-33 = "で、その音が今でも聞こえるらしくて……。"
1013803-34 = "肝試しに行った子たちが気を失ったり気分が悪くなったりで、#n今はもう誰も近づかないみたいだけど。"
1013803-35 = "[s] \"結構詳しいんだね？\""
1013803-36 = "ど、どういうところかくらい、普通調べるでしょ！"
1013803-37 = "ほら、行くわよ！幽霊なんていないって証明してやるんだから！"
1013803-42 = "（そうして廃墟の中を進んでいくと……）"
1013803-43 = "[ns] \"なんか雰囲気あるね……。\""
1013803-44 = "この場所には七不思議があるんだって。"
1013803-45 = "一つ目。真夜中の廊下に鳴り響く、窓を叩く音。"
1013803-46 = "二つ目。存在しない13番目の階段。"
1013803-47 = "三つ目。廊下を徘徊する人影。"
1013803-48 = "四つ目。窓から見える、血に染まった桜の木。"
1013803-49 = "五つ目。壊れたスピーカーから聞こえてくる、鐘の音。"
1013803-50 = "六つ目。地下機械室から漏れてくる泣き声。"
1013803-51 = "七つ目は――"
1013803-52 = "――それはまだ、誰も知らないんだって。"
1013803-53 = "それに気づいた人には、災いが降りかかる……とか。"
1013803-54 = "[s] \"なんだかどれも聞いた事があるような話だね。\""
1013803-55 = "そ、そうでしょ？よくある話でしょ？"
1013803-56 = "とにかく。全部確認したら先輩たちに写真を送るつもり。"
1013803-57 = "絶対何も起きないから。#n幽霊はいないって証明――"
1013803-61 = "……！？"
1013803-62 = "ななっ、なに……？"
1013803-66 = "ひいっ……！！"
1013803-70 = "[ns] \"真夜中の廊下に鳴り響く、窓を叩く音……！\""
1013803-71 = "わ、私たち以外に、誰かいるわけないじゃん！"
1013803-72 = "[s] \"確認してみようか。\""
1013803-73 = "……！！"
1013803-74 = "[s3] \"心配しないで。\"\n[s4] \"絶対手は離さないから。\""
1013803-77 = "だっ、誰がそんな心配……！！"
1013803-82 = "と、とにかくい、行くわよ！"
1013803-91 = "ガァッ！ガァァッ……！"
1013803-95 = "なんだ、カラスじゃない……。"
1013803-96 = "なんで窓なんか突っついたのかしら。別に食べ物なんてないのに。"
1013803-97 = "[s] \"カラスじゃなくて、本当に幽霊だったとか……？\""
1013803-98 = "シャーッ！！そんなわけないでしょ！"
1013803-99 = "まずは写真撮るよ！廊下の音はカラスだったって証拠を残さないと。"
1013803-106 = "見て。よく撮れてるでしょ。変なものも写り込んでないし。"
1013803-107 = "この調子で七不思議調査、続けるわよ！"
1013803-109 = "（張り切った声とは裏腹に、握った手は絶対に離さないレナだった）"
1013803-111 = "[ns] （私も離さないように気をつけよう）"
1013803-113 = "（そうしてレナと廃墟の調査を始めた）"
1013803-115 = "人影があるという廊下"
1013803-122 = "血に染まった桜の木が見える場所"
1013803-127 = "泣き声がするという地下機械室"
1013803-137 = "（七不思議と呼ばれる場所をすべて確認し、写真を撮った）"
1013803-138 = "（結局、幽霊は現れなかった）"
1013803-140 = "ふう、やっぱり思った通り。#n幽霊なんているわけないじゃない。"
1013803-141 = "全部動物とか建物の老朽化が原因だって。"
1013803-142 = "よし！証拠も撮ったし帰ろっか。#n先輩たちに見せないと。"
1013803-143 = "[s5] \"幽霊はいないって証明できたけど……。\"\n[s6] \"手はまだ繋いでいた方がいい？\""
1013803-146 = "そ、それは……。"
1013803-147 = "べ、別に、怖くて繋いでるわけじゃないから！"
1013803-148 = "く、暗いし……転んだりしたら危ないでしょ！"
1013803-149 = "[s] \"うんうん、危ないからね。\""
1013803-151 = "（レナをワイルドハントまで送ってあげた）"
1013803-157 = "（そうして廃墟探索は幕を閉じたと思ったものの……）"
