102-6 = "Equipamentos lúdicos em instalações onde a eletricidade deveria ser cortada começam a se mover sozinhos à noite. Ou engolir estudantes inteiros se eles chegarem perto..."

102-7 = "Não importa se o equipamento do playground se move sozinho, mas se os alunos desaparecerem é um problema."

102-8 = "Quero que o professor vá e descubra o que está acontecendo."

102-9 = "Se você encontrar alguma pista, informe-a imediatamente ao Conselho Estudantil da Federação. Prazer em conhecê-lo!"

