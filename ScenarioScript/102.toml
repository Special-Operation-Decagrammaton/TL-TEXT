[translation]
102-1 = "特別依頼・クレジット回収"
102-2 = "連邦生徒会・オペレーションルーム"
102-3 = "今、生徒たちの間で「スランピア」って呼ばれてるその廃墟は、元々はモモグループが「ユートピア」って名前で建設したテーマパークだったの。"
102-4 = "まあ、経営不振で半年もしないうちに廃業しちゃったんだけど。（パリッ）"
102-5 = "問題は……最近、奇妙な噂が広まってて。"
102-6 = "電気が絶たれたはずの施設の遊具が、夜になるとひとりでに動くとか。それに近づいた生徒を丸呑みにしちゃうとか……。"
102-7 = "勝手に遊具が動くのはどうでもいいんだけど、生徒が消えちゃうのは問題だから。"
102-8 = "先生に行ってもらって、何が起きてるのか調べてほしいの。"
102-9 = "何でもいいから、もし手がかりが見つかったら、すぐ連邦生徒会に報告してね。よろしく～！"
