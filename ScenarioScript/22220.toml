[translation]
22220-1 = "第22話;王女のためのパヴァーヌ（１）"
22220-4 = "あっ！あそこ！見て！"
22220-5 = "……本当に倒すなんて。"
22220-6 = "ネル先輩すごい！"
22220-8 = "ユズちゃんもすごかった！全部、ユズちゃんの作戦のおかげだからね！"
22220-9 = "わ、わたしは……と、特に何か、したわけじゃ、ないから……"
22220-13 = "…………。"
22220-19 = "[ns] \"ネル……！大丈夫！？\""
22220-21 = "……しびれる。"
22220-22 = "[s] \"……え？\""
22220-23 = "身体がしびれて……動けねぇ……。"
22220-24 = "クソ、あんま騒ぐな……頭に響く……#n……大丈夫だ、ちょっと休んだら良くなる。"
22220-25 = "つーか、うちの連中は？"
22220-26 = "[s1] \"みんな無事だよ。しばらくは動けないと思うけど。\"\n[s2] \"先に上がって、ネルの世話を頼んだって言ってたよ。\""
22220-27 = "……そうか。#nは、誰が誰の世話をしろっていうのやら。"
22220-28 = "……そうか。#nは、誰が誰の世話をしろっていうのやら。"
22220-29 = "……おい、チビども。"
22220-30 = "う、うん？"
22220-31 = "アカネやアスナ、カリンと……あたしらがここまで繋いできた。"
22220-32 = "あとはもう一つだけだろ。"
22220-33 = "そいつ、ぜってぇ連れ戻せよ。"
22220-39 = "うん！"
22220-40 = "[s] \"ありがとう、ネル……みんな、行こう！\""
22220-42 = "着いた！"
22220-43 = "ここがエリドゥ中央タワーの最上階……"
22220-44 = "（……ゴクッ）"
22220-46 = "地図によると、ここのどこかにアリスがいるはず。"
22220-51 = "そう、アリスならここにいるわ。"
22220-52 = "会長……！"
22220-53 = "……！"
22220-54 = "まだ戦うつもり！？"
22220-56 = "いいえ。トキが倒れた時点で、私が持っている手札はすべて消えた。"
22220-57 = "認めましょう……私の負けよ。"
22220-58 = "[s] \"リオ……。\""
22220-59 = "本当に……貴女たちはここまで来たのね。"
22220-60 = "近い将来、キヴォトスの脅威になる事が確定しているあの子を救うために……"
22220-61 = "遮るものをすべてを薙ぎ払って……。"
22220-62 = "当たり前だよ！最初からそう決めてたからね！"
22220-63 = "アリスが、[ruby=  ・    ・    ・    ・    ・    ・    ・    ・    ・    ・    ・  ]キヴォトスに終焉を招く[/ruby]としても？"
22220-64 = "急に何？アリスの事そんな風に言わないでよ！"
22220-65 = "私は、ただ……"
22220-66 = "[ns3] \"リオが何を根拠に動いたのかは分からない。\"\n[ns4] \"でも、一つだけはっきりと言えるよ。\""
22220-69 = "[ns5] \"リオは、誰にも相談せず、一人で全てを判断して結論づけた。\"\n[ns6] \"そして、君が正しいと信じる事を他人に強要した。\""
22220-70 = "……！！"
22220-71 = "……！！"
22220-75 = "先生……貴方も、私の行動が独善だと言うの……？"
22220-76 = "でも……私は……！！"
22220-77 = "私、は……"
22220-78 = "先生、アリスの場所が分かったよ。"
22220-79 = "その部屋の隅に、電力が集中する施設があるはず。アリスはそこにいる。"
22220-80 = "ミドリ！ユズ！"
22220-81 = "うん！お姉ちゃん！"
22220-86 = "[ns] \"リオ、続きはこの後にしようか。\""
22220-87 = "…………。"
22220-93 = "アリス！お待たせ！"
22220-94 = "アリスちゃん！"
22220-96 = "アリスちゃん……。"
22220-97 = "…………。"
22220-98 = "[ns] \"アリス……？\""
22220-102 = "な、なにが起きてるの！？"
22220-103 = "あ、あそこのモニターが……！"
22220-105 = "これは………！！"
22220-119 = "ぃま……急に……な…が……！？"
22220-121 = "通信が……き……"
22220-123 = "……み…な……応答……！？"
22220-127 = "[ns] \"チヒロ……！\""
22220-128 = "エリドゥのシステム全体が……ハッキング…………"
22220-129 = "いえ、これは単純なハッキングではない……"
22220-130 = "都市全体が「何か」に変質していっている？"
22220-131 = "こんな事してる場合じゃない！早くケーブルを外してアリスを……！"
22220-132 = "その行為は推奨しません。"
22220-133 = "！！"
22220-136 = "現在「王女」の表層人格は内部データベースの深層部に隔離されています。"
22220-137 = "強制的に接続を解除すると、取り返しのつかない損傷が起こるでしょう。"
22220-138 = "アリス……！？一体何を……？"
22220-139 = "お姉ちゃん、これアリスじゃないよ……"
22220-140 = "アリス……？"
22220-141 = "それは、あなた達が私たちの「王女」を呼ぶ際の名称……。"
22220-142 = "「王女」に名前は不要です。#n名前は存在の目的と本質を乱します。"
22220-143 = "何を言ってるの！？ねえ、あなたは誰！アリスちゃんを返して！"
22220-145 = "私の個体名は＜Key＞。"
22220-148 = "王女を助ける無名の司祭たちが残した修行者であり、#n彼女が戴冠する玉座を継ぐ「鍵」＜Key＞です。"
22220-149 = "[s] \"……なに？\""
22220-150 = "彼女は「王女」であり、私は「鍵」。#nそれが私たちの存在であり目的。"
22220-151 = "今、我々を妨害していた攻撃が止まったことを確認しました。"
22220-152 = "只今よりエラーを修正し、本来あるべき玉座に「王女」を導かせていただきます。"
22220-154 = "AL-1Sに接続された利用可能リソースを確保するため、全体検索を実行。"
22220-156 = "リソース領域の拡大。"
22220-158 = "リソース名、要塞都市「エリドゥ」の全体リソース――1万エクサバイトのデータを確認。"
22220-159 = "………現時刻をもって、プロトコルATRAHASIS稼動。"
22220-161 = "コード名「アトラ・ハシースの箱舟」起動プロセスを開始します。"
22220-163 = "……！！#nアトラ・ハシース……！？"
22220-168 = "プロセスサポートのため[ruby=Divi:Sion]追従者[/ruby]を呼び出します。"
22220-182 = "……エリドゥ各地で、[ruby=Divi:Sion]追従者[/ruby]の出現……？"
22220-183 = "[s] \"リオ……一体これは何が起きてるの？アリスは……。\""
22220-184 = "いえ、そんなはずが……私の計算は……でも……！"
22220-185 = "私は……キヴォトスに終焉がもたらされることを懸念して、#nこの要塞都市エリドゥを建設した。"
22220-186 = "私が動員できるミレニアムのすべての技術と力、エネルギー、#nそして資源をここに集めたというのに……。"
22220-187 = "けれど……むしろ、そのせいで……この都市が……"
22220-188 = "終焉の発端に……？"
22220-189 = "私は……"
22220-190 = "――間違っていた？"
22220-191 = "箱舟製作に必要なリソース確保23%…………。"
22220-192 = "……46%…………。"
22220-193 = "先生！このままでは……！"
22220-194 = "このまま、エリドゥのすべてのリソースを奪われてしまったら、#nキヴォトスが終わってしまう。"
22220-195 = "決断を下さなければ……！"
22220-196 = "[s] \"……決断？\""
22220-199 = "王女は鍵を手に入れ、箱舟は用意された。"
22220-200 = "無名の司祭の要請により、この地に新しい「サンクトゥム」を建立する。"
22220-201 = "その到来で初めて、すべての神秘はアーカイブ化され――"
22220-202 = "このままでは、世界が滅びる……！！"
22220-206 = "みんなと一緒に逃げてちょうだい、先生。"
22220-207 = "[s] \"逃げてって、リオ……いったい何を。\""
22220-208 = "今からこの都市自体が変貌し、箱舟という新しい概念に歪曲される。#nそうしたら……このキヴォトスは……。"
22220-209 = "私のせいよ……。"
22220-210 = "私がこの都市を作らなかったら、最初からこんな事にならなかったのに……。"
22220-211 = "私が……私のせいで……。"
22220-212 = "だから私が、止めないと……。"
22220-214 = "ど、どういう意味ですか……？"
22220-215 = "……私一人で、システムを止めてみせるわ。"
22220-216 = "[s] \"……リオ。\""
22220-217 = "私の命一つで……世界の終焉を防ぐことができるというのなら#nそうするわ――そうしなければならない。"
22220-218 = "……早く！！これは極めて論理的な選択よ、先生！"
22220-226 = "[ns] \"トロッコ問題について……話してたよね。\""
22220-228 = "[ns7] \"トロッコ問題には二つの選択肢しかない。\"\n[ns8] \"君はそこで犠牲の少ない方を選ぼうとしたわけだし。\""
22220-229 = "私は……。"
22220-230 = "私は……。"
22220-231 = "[ns] \"……それが君の優しさなんだね、リオ。\""
22220-233 = "[ns] \"でも二つの選択は、誰かが犠牲になる結果しかないのであれば……。\""
22220-235 = "[ns] \"私はその質問自体が間違っていると答えるよ。\""
22220-236 = "それは……問題の答えではないわ、先生。ただの詭弁よ。"
22220-237 = "思考実験の前提条件を否定するのは、ただの屁理屈でしかないわ。"
22220-238 = "[s] \"レバーを引く人が、見落としたものがあるんじゃないのかな？\""
22220-239 = "……！？"
22220-240 = "[s] \"本当に周囲に手を差し伸べてくれる人がいなかったのか、とか。\""
22220-241 = "……！？"
22220-242 = "……73%………………89%…………"
22220-244 = "リソース確保99%……………………。"
22220-246 = "[ns] \"私は、全員で力を合わせて「全てを救う」選択肢を選びたい。\""
22220-247 = "そ、そんな選択肢はないわ……。"
22220-248 = "ノア！今よ！#n電力という電力を全部落としちゃって！"
22220-249 = "は～い、ユウカちゃん。#nその言葉を待ってました♪"
22220-250 = "えいっ！"
22220-256 = "次回;王女のためのパヴァーヌ（２）"
