22220-235 = "[ns] \"Eu respondo que a pergunta em si está errada.\""
22220-236 = "Isso…… não é uma resposta para o problema, Sensei. É apenas um sofisma."
22220-237 = "Negar as premissas de um experimento mental é apenas uma desculpa esfarrapada."
