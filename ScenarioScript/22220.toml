22220-133 = "!!"
22220-136 = "Atualmente, a personalidade superficial da \"Princesa\" está isolada nas camadas profundas do banco de dados interno."
22220-137 = "Se a conexão for forçada, danos irreversíveis ocorrerão."
22220-138 = "Alice……!? O que você está fazendo……?"
22220-139 = "Irmã, essa não é a Alice……"
22220-140 = "Alice……?"
22220-141 = "Esse é o nome que vocês usam para chamar a nossa \"Princesa\"……."
22220-142 = "A \"Princesa\" não precisa de um nome.#nNomes perturbam o propósito e a essência da existência."
22220-143 = "O que você está dizendo!? Ei, quem é você! Devolva a Alice!"
22220-145 = "Meu nome de indivíduo é <Key>."
22220-148 = "Sou uma praticante deixada pelos sacerdotes sem nome que servem à Princesa, e a \"Chave\" <Key> que herdará o trono onde ela será coroada."
22220-149 = "[s] \"……O quê?\""
22220-150 = "Ela é a \"Princesa\" e eu sou a \"Chave\".#nEsse é o nosso propósito e a nossa existência."
22220-151 = "Confirmei que os ataques que nos obstruíam cessaram agora."
22220-152 = "A partir de agora, corrigirei os erros e guiarei a \"Princesa\" ao trono onde ela deve estar."
22220-154 = "Executando busca global para garantir os recursos disponíveis conectados à AL-1S."
22220-156 = "Expandindo a área de recursos."
22220-158 = "Nome do recurso: Recursos totais da cidade-fortaleza \"Eridu\" — 10 mil exabytes de dados confirmados."
22220-159 = "………No horário atual, protocolo ATRAHASIS ativado."
22220-161 = "Iniciando processo de ativação do codinome \"Arca de Atra-Hasis\"."
22220-163 = "……!!#nAtra-Hasis……!?"
22220-168 = "Chamando os seguidores para suporte ao processo."
22220-182 = "……O surgimento de seguidores em várias partes de Eridu……?"
22220-183 = "[s] \"Rio…… o que está acontecendo aqui? E a Alice…….\""
22220-184 = "Não, isso não deveria ser possível…… Meus cálculos…… mas……!"
22220-185 = "Eu…… construí esta cidade-fortaleza, Eridu, por temer que o fim chegasse a Kivotos."
22220-186 = "Reuni aqui toda a tecnologia, poder, energia e recursos do Millennium que eu poderia mobilizar, mas……"
22220-187 = "No entanto…… por causa disso…… esta cidade……"
22220-188 = "Tornou-se o estopim do fim……?"
22220-189 = "Eu……"
22220-190 = "――estava errada?"
22220-191 = "Recursos necessários para a construção da Arca: 23%…………."
22220-192 = "……46%…………."
22220-193 = "Sensei! Se continuar assim……!"
22220-194 = "Se todos os recursos de Eridu forem roubados agora, #nKivotos chegará ao fim."
22220-195 = "Eu preciso tomar uma decisão……!"
22220-196 = "[s] \"……Uma decisão?\""
22220-199 = "A princesa obteve a chave e a Arca foi preparada."
22220-200 = "A pedido dos Sacerdotes Sem Nome, um novo \"Sanctum\" será estabelecido nesta terra."
22220-201 = "Com sua chegada, pela primeira vez, todos os mistérios serão arquivados e――"
22220-202 = "Se continuar assim, o mundo vai acabar……!!"
22220-206 = "Por favor, fuja com todos, Sensei."
22220-207 = "[s] \"Fugir, Rio…… do que exatamente você está falando?\""
22220-208 = "A partir de agora, esta cidade irá se transformar e ser distorcida em um novo conceito chamado Arca. #nSe isso acontecer…… esta Kivotos……."
22220-209 = "A culpa é minha……."
22220-210 = "Se eu não tivesse construído esta cidade, nada disso teria acontecido desde o início……."
22220-211 = "Eu…… por minha causa……."
22220-212 = "Por isso, eu preciso impedir……."
22220-214 = "O, o que você quer dizer com isso……?"
22220-215 = "……Eu mesma vou parar o sistema."
22220-216 = "[s] \"……Rio.\""
22220-217 = "Se a minha vida for o suficiente para…… impedir o fim do mundo, #nentão eu farei isso―― é o que eu devo fazer."
22220-218 = "……Rápido!! Essa é uma escolha extremamente lógica, Sensei!"
22220-226 = "[ns] \"Nós estávamos falando sobre…… o dilema do bonde, não é?\""
22220-228 = "[ns7] \"O dilema do bonde só tem duas opções.\"\n[ns8] \"E você tentou escolher a que causaria menos sacrifícios.\""
22220-229 = "Eu……."
22220-230 = "Eu……."
