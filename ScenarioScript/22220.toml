[translation]
22220-1 = "Episódio 22; Pavane para a Princesa (1)"
22220-4 = "Ah! Ali! Olhem!"
22220-5 = "......Ela realmente foi derrotada."
22220-6 = "Neru-senpai, incrível!"
22220-8 = "A Yuzu-chan também foi incrível! Tudo isso foi graças à estratégia da Yuzu-chan, viu!"
22220-9 = "E, eu... n-não fiz nada de especial..."
22220-13 = "............"
22220-19 = "[ns] \"Neru......! Você está bem!?\""
22220-21 = "......Está dormente."
22220-22 = "[s] \"......Eh?\""
22220-23 = "Meu corpo está dormente...... não consigo me mover."
22220-24 = "Droga, não gritem tanto... isso ecoa na minha cabeça... #n ......Estou bem, vou ficar melhor depois de descansar um pouco."
22220-25 = "E falando nisso, cadê o resto do meu pessoal?"
22220-26 = "[s1] \"Eles estão todos bem. Embora eu ache que não consigam se mover por um tempo.\"\n[s2] \"Eles disseram para eu subir primeiro e cuidar de você, Neru.\""
22220-27 = "......É mesmo. #n Hã, quem tem que cuidar de quem aqui?"
22220-28 = "......É mesmo. #n Hã, quem tem que cuidar de quem aqui?"
22220-29 = "......Ei, nanicas."
22220-30 = "H, hã?"
22220-31 = "A Akane, a Asuna, a Karin e... nós nos conectamos até aqui."
22220-32 = "Só falta mais uma coisa, não é?"
22220-33 = "Tragam aquela ali de volta a qualquer custo."
22220-39 = "Sim!"
22220-40 = "[s] \"Obrigado, Neru...... pessoal, vamos!\""
22220-42 = "Chegamos!"
22220-43 = "Este é o andar mais alto da torre central de Eridu..."
22220-44 = "(......Gulp)"
22220-46 = "De acordo com o mapa, a Aris deve estar em algum lugar aqui."
22220-51 = "Isso mesmo, a Aris está aqui."
22220-52 = "Presidente......!"
22220-53 = "......!"
22220-54 = "Você ainda pretende lutar!?"
22220-56 = "Não. No momento em que a Toki caiu, todas as minhas cartas desapareceram."
22220-57 = "Vou admitir...... eu perdi."
22220-58 = "[s] \"Rio......\""
22220-59 = "Realmente...... vocês vieram até aqui."
22220-60 = "Para salvar aquela garota, que está destinada a trazer o fim a Kivotos num futuro próximo..."
22220-61 = "Passando por cima de tudo o que impedia o caminho......"
22220-62 = "É óbvio! Decidimos isso desde o começo!"
22220-63 = "Mesmo se a Aris trouxer o fim a Kivotos?"
22220-64 = "Por que isso do nada? Não fale da Aris desse jeito!"
22220-65 = "Eu apenas..."
22220-66 = "[ns3] \"Não sei qual foi a base que a Rio usou para agir.\"\n[ns4] \"Mas posso dizer uma coisa com clareza.\""
22220-69 = "[ns5] \"A Rio não consultou ninguém, julgou e concluiu tudo sozinha.\"\n[ns6] \"E forçou os outros a aceitarem o que ela acredita ser o correto.\""
22220-70 = "......!!"
22220-71 = "......!!"
22220-75 = "Sensei...... você também acha que minhas ações foram egoístas...?"
22220-76 = "Mas...... eu......!!"
22220-77 = "Eu, eu......"
22220-78 = "Sensei, descobri onde a Aris está."
22220-79 = "Deve haver uma instalação que concentra energia no canto da sala. A Aris está lá."
22220-80 = "Midori! Yuzu!"
22220-81 = "Sim! Mana!"
22220-86 = "[ns] \"Rio, vamos deixar o resto para depois.\""
22220-87 = "............"
22220-93 = "Aris! Espere por nós!"
22220-94 = "Aris-chan!"
22220-96 = "Aris-chan......"
22220-97 = "............"
22220-98 = "[ns] \"Aris......?\""
22220-102 = "Q, o que está acontecendo!?"
22220-103 = "A, aquele monitor ali......!"
22220-105 = "Isto é.........!!"
22220-119 = "A, agora... de repente... o q... uê......!?"
22220-121 = "A comunicação está... caindo..."
22220-123 = "......Alguém... responda......!?"
22220-127 = "[ns] \"Chihiro......!\""
22220-128 = "Todo o sistema de Eridu está...... sendo hackeado............"
22220-129 = "Não, isso não é um hack simples..."
22220-130 = "A cidade inteira está se transformando em 'alguma coisa'?"
22220-131 = "Não temos tempo para isso! Tirem logo os cabos e salvem a Aris...!"
22220-132 = "Não recomendo esse ato."
22220-133 = "!!"
22220-136 = "No momento, a personalidade superficial da 'Princesa' está isolada nas profundezas do banco de dados interno."
22220-137 = "Se desconectarmos à força, ocorrerão danos irreversíveis."
22220-138 = "Aris......!? O que você está fazendo...?"
22220-139 = "Mana, essa não é a Aris..."
22220-140 = "Aris...?"
22220-141 = "Esse é o nome que vocês usam para chamar a nossa 'Princesa'..."
22220-142 = "A 'Princesa' não precisa de um nome. #n Nomes perturbam o propósito e a essência da existência."
22220-143 = "O que você está dizendo!? Ei, quem é você! Devolva a Aris-chan!"
22220-145 = "Meu nome individual é <Key>."
22220-148 = "Sou a praticante deixada pelos Sacerdotes Sem Nome que servem a Princesa, #n e a <Key> que herdará o trono onde ela será coroada."
22220-149 = "[s] \"......O quê?\""
22220-150 = "Ela é a 'Princesa', e eu sou a 'Chave'. #n Isso é o que somos e nosso propósito."
22220-151 = "Confirmei que os ataques que nos obstruíam pararam."
22220-152 = "A partir de agora, corrigirei os erros e guiarei a 'Princesa' ao trono onde ela deve estar."
22220-154 = "Executando busca global para garantir recursos utilizáveis conectados à AL-1S."
22220-156 = "Expandindo a área de recursos."
22220-158 = "Nome do recurso: todos os recursos da Cidade-Fortaleza 'Eridu'―― confirmando 10 exabytes de dados."
22220-159 = ".........A partir deste momento, protocolo ATRAHASIS ativado."
22220-161 = "Iniciando processo de ativação do codinome 'Arca de Atra-Hasis'."
22220-163 = "......!! #n Atra-Hasis......!?"
22220-168 = "Invocando Seguidores para suporte ao processo."
22220-182 = "......Seguidores aparecendo por toda Eridu......?"
22220-183 = "[s] \"Rio...... o que está acontecendo aqui? E a Aris......\""
22220-184 = "Não, isso não deveria acontecer... meus cálculos... mas...!"
22220-185 = "Eu...... preocupada com o fim que seria trazido a Kivotos, #n construí esta Cidade-Fortaleza Eridu."
22220-186 = "Mesmo tendo reunido toda a tecnologia, poder, energia e recursos da Millennium que eu podia mobilizar aqui......"
22220-187 = "Mas...... pelo contrário, por causa disso...... esta cidade......"
22220-188 = "Se tornou a origem do fim......?"
22220-189 = "Eu......"
22220-190 = "――estava errada?"
22220-191 = "Recursos necessários para a construção da Arca: 23%............"
22220-192 = "......46%............"
22220-193 = "Sensei! Desse jeito......!"
22220-194 = "Se todos os recursos de Eridu forem roubados assim, #n Kivotos chegará ao fim."
22220-195 = "Precisamos tomar uma decisão......!"
22220-196 = "[s] \"......Decisão?\""
22220-199 = "A Princesa obteve a Chave e a Arca foi preparada."
22220-200 = "A pedido dos Sacerdotes Sem Nome, estabeleceremos um novo 'Sanctum' nestas terras."
22220-201 = "Com a chegada disso, todos os mistérios serão arquivados――"
22220-202 = "Se continuar assim, o mundo vai acabar......!!"
22220-206 = "Fuja com todos, Sensei."
22220-207 = "[s] \"Fuja? Rio...... do que está falando?\""
22220-208 = "Daqui em diante, esta cidade vai se transformar e se distorcer em um novo conceito chamado Arca. #n Se isso acontecer...... esta Kivotos......"
22220-209 = "É culpa minha......"
22220-210 = "Se eu não tivesse construído esta cidade, nada disso teria acontecido desde o começo......"
22220-211 = "Eu...... é por minha culpa......"
22220-212 = "Por isso, eu preciso parar......"
22220-214 = "Q, o que você quer dizer......?"
22220-215 = "......Eu mesma, sozinha, vou parar o sistema."
22220-216 = "[s] \"......Rio.\""
22220-217 = "Se com a minha vida eu puder... prevenir o fim do mundo #n eu farei―― eu preciso fazer."
22220-218 = "......Depressa!! Essa é uma escolha extremamente racional, Sensei!"
22220-226 = "[ns] \"Nós conversamos... sobre o Dilema do Bonde, não foi?\""
22220-228 = "[ns7] \"O Dilema do Bonde só tem duas escolhas.\"\n[ns8] \"E você escolheu a que tinha menos sacrifícios nele.\""
22220-229 = "Eu......"
22220-230 = "Eu......"
22220-231 = "[ns] \"......Essa é a sua gentileza, Rio.\""
22220-233 = "[ns] \"Mas se as duas escolhas resultam em sacrifícios......\""
22220-235 = "[ns] \"Eu respondo que a própria pergunta está errada.\""
22220-236 = "Isso...... não é a resposta para o problema, Sensei. É apenas um sofisma."
22220-237 = "Negar os pré-requisitos de um experimento mental é apenas um argumento furado."
22220-238 = "[s] \"A pessoa que puxa a alavanca não esqueceu de algo?\""
22220-239 = "......!?"
22220-240 = "[s] \"Se não havia realmente ninguém ao redor que pudesse ajudar, por exemplo.\""
22220-241 = "......!?"
22220-242 = "......73%................89%......"
22220-244 = "Recursos obtidos 99%................."
22220-246 = "[ns] \"Eu quero escolher a opção onde todos se unem para 'salvar a todos'.\""
22220-247 = "E, essa opção não existe......"
22220-248 = "Noa! Agora! #n Desligue toda a energia, toda a energia que tiver!"
22220-249 = "Sim, Yuuka-chan. #n Eu estava esperando por essas palavras♪"
22220-250 = "Aí vai!"
22220-256 = "Próximo Episódio; Pavane para a Princesa (2)"