[translation]
1300802-1 = "Ajuda no trabalho de meio período"
1300802-2 = "Abydos - Mercado Externo"
1300802-3 = "Você está atrasado! Eu esperei um tempão, sabia?"
1300802-4 = "[s] \"Eu cheguei na hora, não cheguei?\""
1300802-5 = "Normalmente, em um trabalho de meio período, a gente chega um pouco antes do horário combinado."
1300802-6 = "[s] \"Você é bem rigorosa com essas coisas, Serika.\""
1300802-7 = "Mas, como você veio direitinho, acho que posso confiar em você nesse ponto."
1300802-8 = "Hm? Ainda não disse que ia fazer? Não diga uma coisa dessas."
1300802-9 = "É um desperdício ficar à toa, não é? #nConsiderando a saúde, a situação financeira e tudo mais, é melhor se manter em movimento."
1300802-10 = "Hã? Quer saber com o que precisa ajudar?"
1300802-12 = "Pronto, pegue isto."
1300802-13 = "[s] \"Panfletos?\""
1300802-15 = "O trabalho de hoje é distribuir panfletos. #nÉ só colocar nas caixas de correio por aqui ou entregar para quem passar, mas cada um vale 1 iene, viu!"
1300802-16 = "Por isso, velocidade é tudo nesse trabalho! Hoje tem uma quantidade especialmente grande, então eu precisava de alguém para me ajudar."
1300802-17 = "[s] \"É só distribuir isso?\""
1300802-18 = "O que você está dizendo? Fui eu quem chamei o Sensei, então não posso te deixar fazer o trabalho pesado..."
1300802-19 = "O Sensei só precisa me dar suporte aqui."
1300802-20 = "Fique esperando aqui, e quando eu voltar depois de distribuir os panfletos, me entregue outro maço. Eu pego, vou distribuir, e repetimos o processo."
1300802-21 = "Viu? É fácil, né? Vou te dar metade do que eu ganhar hoje por isso! Vamos dar o nosso melhor!"
1300802-22 = "[s1] \"Não seria mais rápido se distribuíssemos juntos?\"\n[s2] \"Não precisa dividir o pagamento comigo.\""
1300802-23 = "Nada disso, vamos, vamos, não temos tempo para isso. Vamos começar logo! Primeiro, me dê 500 unidades!"
1300802-24 = "Nada disso, vamos, vamos, não temos tempo para isso. Vamos começar logo! Primeiro, me dê 500 unidades!"
1300802-25 = "[s] Entrega o maço de panfletos."
1300802-27 = "Já volto!!"
1300802-30 = "Pronto, voltei! O próximo!"
1300802-31 = "[s] Entrega o maço de panfletos."
1300802-33 = "Já volto!!"
1300802-38 = "Haa... haa... o próximo!"
1300802-39 = "[s] Entrega o maço de panfletos."
1300802-41 = "Ufa... lá vou eu!"
1300802-46 = "Haa... haa... haa..."
1300802-48 = "Haa..."
1300802-49 = "[s3] \"O ritmo não está rápido demais?\" \n[s4] \"Você parece estar sofrendo...\""
1300802-50 = "E-estou bem, se não for nesse ritmo, não vou terminar hoje."
1300802-51 = "E-estou bem, se não for nesse ritmo, não vou terminar hoje."
1300802-53 = "Ufa... então, já volto!"
1300802-57 = "[s5] ……………….\n[s6] ……Acho que é melhor eu ajudar mesmo."
1300802-58 = "(Decidiu ir distribuir os panfletos)"
1300802-59 = "(Decidiu ir distribuir os panfletos)"
1300802-62 = "(Cambaleia) ...Cheguei... haa..."
1300802-63 = "[s] \"Bom trabalho.\""
1300802-64 = "Quanto... quanto ainda falta?"
1300802-65 = "[s7] \"Não tem mais, acabou.\"\n[s8] Mostra a bolsa vazia."
1300802-66 = "Ué..."
1300802-67 = "Ué..."
1300802-68 = "Eu tinha certeza de que ainda faltava uma quantidade que exigiria mais algumas voltas... será que foi impressão minha?"
1300802-69 = "[s9] \"Foi impressão sua.\"\n[s10] \"Talvez você tenha se confundido por causa do cansaço.\""
1300802-70 = "Bem, deve ser! Ahaha, finalmente acabou! Eba!"
1300802-71 = "Bem, deve ser! Ahaha, finalmente acabou! Eba!"
1300802-72 = "[s] \"Bom trabalho.\""
1300802-73 = "Sim! Você também fez um ótimo trabalho, Sensei!"
1300802-74 = "Ah... honestamente, eu estava no meu limite... minhas pernas estão bambas..."
1300802-75 = "Bem, então vamos buscar o pagamento do trabalho de meio período?"
1300802-77 = "(Tentei pegar o pagamento e dar tudo para a Serika, mas...)"
1300802-78 = "O quê?"
1300802-79 = "Esse é o dinheiro que você ganhou trabalhando honestamente, Sensei. Você tem que receber o que é seu por direito!"
1300802-80 = "(E assim, ela recusou.)"
1300802-82 = "Ahhh, hum..."
1300802-83 = "Nem acredito que já é noite, estou exausta. Você está bem, Sensei?"
1300802-84 = "[s] \"Sim. Aliás, no que você vai usar o dinheiro do trabalho?\""
1300802-85 = "Hm? Eu não vou usar. Esse dinheiro vai direto para o Comitê de Contramedidas, é claro."
1300802-86 = "[s] \"...Entendi.\""
1300802-87 = "Sim, precisamos juntar cada centavo possível. Para pagar a dívida da escola."
1300802-88 = "...Se as outras integrantes do Comitê souberem que esse é o meu pagamento individual, elas não vão querer aceitar."
1300802-89 = "Por isso eu pedi a sua ajuda, Sensei!"
1300802-90 = "..."
1300802-91 = "Então, você pode me ajudar de vez em quando daqui para frente? Você me ajudou muito hoje."
1300802-92 = "[s] Aceno com a cabeça."
1300802-93 = "Hehe, obrigada."
1300802-94 = "Até mais então! Acho que vou para casa tomar um banho, estou com fome também."
1300802-95 = "Tchau, Sensei!"
1300802-97 = "(Preciso pensar no que fazer com o dinheiro que recebi pelo trabalho.)"
1300802-99 = "(.........)"
1300802-100 = "(Vou doar para o Comitê de Contramedidas anonimamente.)"
