[translation]
1300802-1 = "アルバイトのお手伝い"
1300802-2 = "アビドス・外郭市場"
1300802-3 = "遅いじゃないの！結構待ったんだから。"
1300802-4 = "[s] \"時間通りに来たよ？\""
1300802-5 = "アルバイトっていうのは普通、約束の時間より少し早く来るものなの。"
1300802-6 = "[s] \"セリカはそういうところ、厳格なんだね。\""
1300802-7 = "でもこうしてちゃんと来てくれるし、そういう点は信用できるかな。"
1300802-8 = "ん？まだやるとは言ってない？そんなこと言わないでよ。"
1300802-9 = "ただ暇な時間を過ごすのはもったいないでしょ。#n健康のこととか、資金の余裕のこととか色んなことを考慮しても、体を動かした方がいいしね。"
1300802-10 = "え？何を手伝えばいいかって？"
1300802-12 = "さ、これを受け取って。"
1300802-13 = "[s] \"チラシ？\""
1300802-15 = "今日の仕事はチラシを配るバイトなの。#nこれを周辺のポストとか通りすがりの人たちに配ればいいんだけど、1枚で1円だからね！"
1300802-16 = "だからスピードが命の仕事なの！今日は特に量が多いから一緒にやってくれる人が欲しくて。"
1300802-17 = "[s] \"これを配ればいいの？\""
1300802-18 = "何言ってんの。先生を呼んだのは私なんだから、大変な仕事をさせるわけにはいかないし……。"
1300802-19 = "先生はここで私の補助をしてくれればいいの。"
1300802-20 = "ここで待っててもらって、私がチラシを配り終えて戻ってきたらもう一つチラシの束を渡して。私がそれをもらって配りにいって、その繰り返し。"
1300802-21 = "どう、簡単でしょ？これで私がもらった日当の半分をあげるから！頑張るわよ！"
1300802-22 = "[s1] \"一緒に配った方が早く終わりそうじゃない？\"\n[s2] \"バイト代を分けるなんて、そんなことしなくていいよ。\""
1300802-23 = "いいから、ほらほら、こんなことしてる時間はないの。さっさと始めるわよ！まず500枚ちょうだい！"
1300802-24 = "いいから、ほらほら、こんなことしてる時間はないの。さっさと始めるわよ！まず500枚ちょうだい！"
1300802-25 = "[s] チラシの束を渡す。"
1300802-27 = "行ってくるわ！！"
1300802-30 = "さあ、戻ったわよ！次！"
1300802-31 = "[s] チラシの束を渡す。"
1300802-33 = "行ってくるわ！！"
1300802-38 = "はあ……はあ……次！"
1300802-39 = "[s] チラシの束を渡す。"
1300802-41 = "ふう……行くわよ！"
1300802-46 = "はあ……はあ……はあ……。"
1300802-48 = "はあ……。"
1300802-49 = "[s3] \"ペース、速すぎない？\" \n[s4] \"辛そうに見えるけど……。\""
1300802-50 = "だ、大丈夫よ、このくらいのスピードじゃないと今日中に終わらないんだから。"
1300802-51 = "だ、大丈夫よ、このくらいのスピードじゃないと今日中に終わらないんだから。"
1300802-53 = "ふう……じゃあ、行ってくるわ！"
1300802-57 = "[s5] ………………。\n[s6] ……やっぱり手伝った方がいいかも。"
1300802-58 = "（チラシを配りに行くことにした）"
1300802-59 = "（チラシを配りに行くことにした）"
1300802-62 = "（ふらっ）……ただいま……はあ……。"
1300802-63 = "[s] \"お疲れ様。\""
1300802-64 = "あと……どれぐらい残ってる？"
1300802-65 = "[s7] \"もう無いよ、終わり。\"\n[s8] 空っぽのバックを見せる。"
1300802-66 = "あれ……。"
1300802-67 = "あれ……。"
1300802-68 = "たしかあと数回はやらなきゃいけない量が残ってたと思うんだけど……気のせいかな……。"
1300802-69 = "[s9] \"気のせいだよ。\"\n[s10] \"疲れてて見間違えたのかも。\""
1300802-70 = "ま、そっか！あははっ、やっと終わった！やったー！"
1300802-71 = "ま、そっか！あははっ、やっと終わった！やったー！"
1300802-72 = "[s] \"お疲れ様。\""
1300802-73 = "うん！先生もお疲れ様！"
1300802-74 = "はあ……正直限界だった……足がふらふらする……。"
1300802-75 = "ま、そしたらバイト代を受け取りに行こっか？"
1300802-77 = "（バイト代をもらって、全部セリカに渡そうとしたのだけど）"
1300802-78 = "なに？"
1300802-79 = "先生が正当に働いて貰ったお金じゃん。働いた分はきちんと貰わないと！"
1300802-80 = "（と、断られた）"
1300802-82 = "ふあぁー、んー。"
1300802-83 = "終わったと思ったらもう夜だし、疲れたわね。先生は大丈夫？"
1300802-84 = "[s] \"うん。ところでバイト代は何に使うの？\""
1300802-85 = "ん？私は使わないよ。このお金はもちろん対策委員会のところに行くの。"
1300802-86 = "[s] \"……そっか。\""
1300802-87 = "うん、一円でも多く集めないと。学校の借金を返すために。"
1300802-88 = "……対策委員会のみんなは、これが個人のバイト代だって知ったら受け取ろうとしないから。"
1300802-89 = "だから先生にも手伝ってもらったの！"
1300802-90 = "……。"
1300802-91 = "だから、これからもたまには手伝ってくれる？今日はすごく助かったから。"
1300802-92 = "[s] 頷く。"
1300802-93 = "ふふっ、ありがと。"
1300802-94 = "じゃあまたね！私は家に帰ってシャワーでも浴びようかな、お腹もすいたし。"
1300802-95 = "バイバイ、先生！"
1300802-97 = "（もらったバイト代をどうするか考えてみないと）"
1300802-99 = "（………）"
1300802-100 = "（匿名で対策委員会に寄付しておこう）"
