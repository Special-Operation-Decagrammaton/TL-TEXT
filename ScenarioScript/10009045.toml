[translation]
10009045-2 = "ふぅー……"
10009045-3 = "……助かったよ先生、おかげで今回もワカモを捕まえられた。"
10009045-4 = "[s] \"今回はどうやって脱獄を……？\""
10009045-5 = "あー……"
10009045-6 = "それが……"
10009045-8 = "……ほんと、どうやったんだろうね？"
10009045-9 = "[s] \"何も分からなくなってる！？\""
10009045-10 = "いやー、こっちもバタバタ続きでさぁ。"
10009045-11 = "何度もすみません先生……！今度こそ、今度こそこういったことが無いように努力を……！"
10009045-12 = "そうそう、今度は本当に大丈夫だって！"
10009045-13 = "根拠は？"
10009045-14 = "えっ、こ、根拠ですか！？"
10009045-15 = "根拠……うーん……。"
10009045-16 = "いやいや大丈夫だって、任せてよ。"
10009045-17 = "そこは信じてほしいなー？"
10009045-18 = "そうですね、では信じます。"
10009045-19 = "[s] \"あっさり！\""
10009045-20 = "まっ、お互い大変な身ってことで。こういう日もあるよ。"
10009045-21 = "じゃ、今度こそちゃんとやるから！"
10009045-22 = "パトロールの方は、何卒よろしくお願いいたします！"
10009045-28 = "では先生、次の街区へ向かいましょうか。"
10009045-29 = "[s] \"うん……。\""
