[translation]
10009045-2 = "Ufa..."
10009045-3 = "…Salvou-me, Sensei. Graças a você, conseguimos capturar a Wakamo desta vez também."
10009045-4 = "[s] \"Como ela escapou da prisão desta vez...?\""
10009045-5 = "Ah..."
10009045-6 = "Sobre isso..."
10009045-8 = "…Sério, como será que ela fez isso?"
10009045-9 = "[s] \"Você não faz ideia!?\""
10009045-10 = "Ah, é que tem sido uma correria atrás da outra por aqui."
10009045-11 = "Sinto muito por incomodar tantas vezes, Sensei...! Desta vez, eu prometo que vou me esforçar para que algo assim não aconteça novamente...!"
10009045-12 = "Isso, isso! Desta vez vai dar tudo certo, pode acreditar!"
10009045-13 = "Qual é a base disso?"
10009045-14 = "Hã? A-a base, você diz!?"
10009045-15 = "A base... hum..."
10009045-16 = "Não, não, vai dar tudo certo, pode deixar comigo."
10009045-17 = "Você pode confiar em mim, né?"
10009045-18 = "Entendo. Então, eu confio."
10009045-19 = "[s] \"Que fácil!\""
10009045-20 = "Bem, ambos temos vidas complicadas. Dias assim acontecem."
10009045-21 = "Então, desta vez eu vou fazer direito!"
10009045-22 = "Por favor, continue contando com a gente para as patrulhas!"
10009045-28 = "Bem, Sensei, vamos seguir para o próximo quarteirão."
10009045-29 = "[s] \"Sim...\""
