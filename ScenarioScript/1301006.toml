[translation]
1301006-1 = "寝坊"
1301006-2 = "ミレニアム・セミナー"
1301006-3 = "先生といい、みんなもそうだけど、どうしてこんなに遅刻するのかしら……。"
1301006-4 = "規則正しく寝て起きてさえいれば、遅刻なんてしないでしょうに。どうしてこんな簡単なことができないの……。"
1301006-5 = "ミレニアムの全生徒がしっかり校則を守って生活してくれれば、私の仕事ももっと減るのに……。"
1301006-8 = "んんっ……あら、もうこんな時間。"
1301006-9 = "これ以上起きてると、明日に響くわね……シャーレの会議もあることだし。"
1301006-10 = "早く仕事を、終わらせない、と……。"
1301006-13 = "……？あれ、いつの間に朝に……。"
1301006-14 = "ああ、あのまま生徒会の仕事をしながら……やっちゃったわね……。"
1301006-15 = "それよりも今何時……。"
1301006-16 = "午前11時！？ち、遅刻じゃない！"
1301006-17 = "急いで髪のセットをして……！いや、その前に会議の資料を……！"
1301006-20 = "シャーレ・執務室"
1301006-22 = "お、遅くなりました！"
1301006-23 = "[s] \"おはよう、ユウカ。\""
1301006-24 = "す、すみません。昨日遅くまで仕事をしてて、そのまま寝てしまって……。"
1301006-25 = "………。"
1301006-26 = "えっと、先生。今日は遅刻しませんでしたか？"
1301006-27 = "[s] \"うん、昨日絶対に遅刻しないでって言われたから。\""
1301006-28 = "……ごめんなさい！"
1301006-29 = "先生にあれだけ言っておきながら、自分が遅刻するなんて……弁解の余地もありません。"
1301006-30 = "こうなった以上、罰は甘んじて受けます。"
1301006-31 = "さあ、何でも構いません。私に命令してください！"
1301006-32 = "[s] \"別に良いのに……。\""
1301006-33 = "いいえ、罰則も規則です！自分で言っておきながら自分だけは例外なんて、セミナーの会計として面子が立ちません！"
1301006-34 = "ですので、どうぞ！"
1301006-36 = "[s] \"じゃあ、居住区で昼寝してきてくれる？\""
1301006-37 = "……え？それは、罰ではないのでは……？"
1301006-38 = "きちんとしたものでないと、罰になりません。"
1301006-39 = "[s] \"いつも頑張り屋さんのユウカに必要な罰はこれだよ。\""
1301006-40 = "でも……。"
1301006-41 = "[s] \"どんな命令でも良いんでしょ？\""
1301006-42 = "はぁ……本当に、先生らしいと言いますか……。"
1301006-43 = "分かりました。ではご命令通り、少し休んでくることにします。"
1301006-44 = "ですが、「遅刻をしても大丈夫」とは思ってませんから！今後も先生の遅刻については、私が厳しく見張ります！"
1301006-45 = "もちろん、私も遅刻しないようにしますから！"
1301006-47 = "その後、ユウカが眠っている間、セミナーの溜まった仕事を片付けておいた。"
