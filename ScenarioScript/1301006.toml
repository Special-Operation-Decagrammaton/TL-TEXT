[translation]
1301006-1 = "Dormir demais"
1301006-2 = "Seminário do Millennium"
1301006-3 = "O Sensei, e todo mundo também... por que será que se atrasam tanto assim?"
1301006-4 = "Se dormissem e acordassem no horário, não se atrasariam. Por que algo tão simples é tão difícil para vocês?"
1301006-5 = "Se todos os alunos do Millennium seguissem as regras da escola direitinho, meu trabalho diminuiria bastante..."
1301006-8 = "Hmm... nossa, já está nesse horário."
1301006-9 = "Se eu ficar acordada mais tempo, vai acabar me prejudicando amanhã... ainda tenho a reunião no Schale."
1301006-10 = "Preciso terminar... o trabalho logo..."
1301006-13 = "...? Ué, quando foi que amanheceu?"
1301006-14 = "Ah, eu acabei pegando no sono enquanto fazia o trabalho do conselho estudantil..."
1301006-15 = "Mas que horas são agora...?"
1301006-16 = "11 da manhã!? A-atrasada!"
1301006-17 = "Preciso arrumar o cabelo rápido...! Não, antes disso, os documentos da reunião...!"
1301006-20 = "Schale - Escritório"
1301006-22 = "D-desculpe o atraso!"
1301006-23 = "[s] \"Bom dia, Yuuka.\""
1301006-24 = "D-desculpe. Fiquei trabalhando até tarde ontem e acabei dormindo..."
1301006-25 = "..."
1301006-26 = "Diga, Sensei. Você não se atrasou hoje, né?"
1301006-27 = "[s] \"Sim, porque você me disse ontem para não me atrasar de jeito nenhum.\""
1301006-28 = "...Me desculpe!"
1301006-29 = "Depois de ter dito tudo aquilo para o Sensei, eu mesma me atrasar... não tenho desculpas."
1301006-30 = "Já que as coisas chegaram a esse ponto, aceitarei qualquer punição."
1301006-31 = "Vamos, pode ser qualquer coisa. Por favor, me dê uma ordem!"
1301006-32 = "[s] \"Não precisa disso...\""
1301006-33 = "Não, punições também são regras! Se eu mesma me coloco como exceção depois de ter dito aquilo, perco minha credibilidade como tesoureira do Seminário!"
1301006-34 = "Por isso, por favor!"
1301006-36 = "[s] \"Então, que tal tirar uma soneca na área residencial?\""
1301006-37 = "...Hein? Isso não seria... uma punição, seria?"
1301006-38 = "Tem que ser algo adequado, senão não conta como punição."
1301006-39 = "[s] \"Essa é a punição que a Yuuka, que sempre se esforça tanto, precisa.\""
1301006-40 = "Mas..."
1301006-41 = "[s] \"Você disse que qualquer ordem servia, não disse?\""
1301006-42 = "Ah... isso é tão a sua cara, Sensei..."
1301006-43 = "Entendido. Então, como ordenou, vou descansar um pouco."
1301006-44 = "Mas não pense que isso significa que \"se atrasar não tem problema\"! Continuarei vigiando seus atrasos rigorosamente!"
1301006-45 = "E, claro, eu também vou me certificar de não me atrasar mais!"
1301006-47 = "Depois disso, enquanto Yuuka dormia, adiantei o trabalho acumulado do Seminário."
