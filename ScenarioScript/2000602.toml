[translation]
2000602-1 = "O segredo de um gênio"
2000602-2 = "（Chegando ao ponto de encontro, enquanto esperava por Saya...）"
2000602-3 = "Uwaaaaa! Cuidado aí, é perigoso!"
2000602-4 = "[s] \"...Essa voz, é a Saya?\""
2000602-10 = "O-o que você está fazendo, Sensei!"
2000602-11 = "É perigoso ficar parado no meio do caminho assim...!"
2000602-12 = "[s1] \"Não sou eu quem deveria estar levando bronca, né!?\"\n[s2] \"Se eu tivesse dado um passo em falso, teria sido um acidente grave!?\""
2000602-15 = "Mas Sensei, um skate não é um carro, sabia?"
2000602-16 = "Andar de skate na calçada não é nenhum problema legal!"
2000602-17 = "Eu não sou uma detetive famosa, nem ando de skate com motor turbo carregado por energia solar ou algo do tipo. Aquilo sim seria perigoso."
2000602-18 = "[s] \"Aliás, de onde veio esse skate?\""
2000602-19 = "Pensando bem, você ainda não conhece muito bem esta área, né, Sensei?"
2000602-20 = "Fu-fu-fu-fu... Não é segredo para ninguém que, para percorrer a Associação Genbu nos dias de folga, um veículo como o skate é essencial!"
2000602-21 = "A Associação Genbu é tão vasta que você não conseguiria percorrer tudo a pé nem em um dia inteiro... Mas não dá para usar qualquer veículo. Afinal, é justamente nos becos estreitos, onde motos não entram, que ficam as lojas mais escondidas e incríveis!"
2000602-22 = "É por isso que o skate é perfeito!"
2000602-23 = "Como o skate é pequeno, é fácil de carregar, e em estradas pavimentadas ele é tão rápido quanto uma bicicleta, então é ideal para circular pela Associação Genbu."
2000602-24 = "Já que estamos nisso, por que você não compra um skate também, Sensei?"
2000602-25 = "[s] \"Parece uma boa ideia, mas não é perigoso?\""
2000602-26 = "Que nada! Na verdade, é muito mais seguro que uma bicicleta!"
2000602-27 = "Eu também não fico fazendo manobras radicais, então, se cair, no máximo vou ficar com um hematoma."
2000602-28 = "Vou te emprestar o meu para você testar, quer tentar?"
2000602-29 = "[s] \"Então, só uma vez...\""
2000602-38 = "…………."
2000602-39 = "...Ué? O Sensei não tinha coordenação motora...? Que queda artística foi essa..."
2000602-40 = "Hm? Quer saber se tem algum segredo?"
2000602-41 = "Hum, como eu sou um gênio desde que nasci... eu já sabia andar desde o começo, então não sei explicar nenhum segredo! Haha♪"
2000602-42 = "Se é que existe um, acho que o importante é ter o sentimento de \"se tornar um só com o skate\"."
2000602-43 = "[s3] \"Me tornar um só com o skate...\"\n[s4] \"Certo, me empreste sua força! Skate!\""
2000602-49 = "[ns] \"VAI!\""
2000602-50 = "GAH!!"
2000602-52 = "Oh, está indo devagar, mas parece bom..."
2000602-53 = "Hm...?"
2000602-55 = "Ahhh!? Achei que você tinha tropeçado, mas o Sensei está rolando ladeira abaixo abraçado com o skate!? E ainda por cima em uma descida!!"
2000602-56 = "Você realmente se tornou um só com o skate!? Não, não foi isso que eu quis dizer! Senseiiiiii!!?"
2000602-58 = "...Depois disso, continuei rolando por mais 12 voltas e meia até que a Saya, que veio correndo atrás, finalmente conseguiu me parar."
2000602-59 = "Fiquei com o corpo todo cheio de hematomas e, no dia seguinte, não consegui nem levantar da cama..."
