[translation]
1013205-1 = "Agora é a minha vez...!"

1013205-2 = "restaurante"

1013205-3 = "(Nos encontramos em um restaurante sofisticado de uma loja de departamentos às 13h)"

1013205-4 = "Olá, professor!"

1013205-5 = "Estou com fome... estou vazio, certo?"

1013205-6 = "Não adianta se não houver vagas...!"

1013205-7 = "[s] \"Não!?\""

1013205-8 = "Muito obrigado pela sua ajuda..."

1013205-9 = "今度は私が、ご馳走しようと、思いまして……。"

1013205-10 = "Então hoje... que bom que você veio!"

1013205-11 = "[s] \"Esta loja parece cara...\""

1013205-12 = "Ehehe…."

1013205-13 = "Por favor, deixe comigo... tenho dinheiro para meu trabalho de meio período!"

1013205-14 = "Além disso, o almoço é em estilo buffet... tão acessível!"

1013205-15 = "Se você escrever um comentário, você pode obter um desconto...e se combinar com um cupom...!"

1013205-19 = "...Desculpe. #nTeria sido bom se eu pudesse ter sido tão legal quanto o Sr. Sensei e lhe oferecer um banquete..."

1013205-20 = "[s] \"Bem, eu também uso muito cupons!\""

1013205-21 = "Ah, é verdade...?"

1013205-22 = "Então, então...!"

1013205-23 = "Primeiro, algumas bebidas..."

1013205-29 = "Ah... me desculpe..."

1013205-34 = "M-olá…."

1013205-41 = "Sim, sim... hum, desculpe."

1013205-42 = "Modelo representativo...?"

1013205-43 = "Não, não... mas desta vez..."

1013205-44 = "Sim, com licença...."

1013205-48 = "[ns] \"Qual é o seu telefone agora?\""

1013205-49 = "Ah, o ex-presidente."

1013205-50 = "Ouvi falar do modelo adequado..."

1013205-51 = "... eu recusei."

1013205-52 = "Hum... eu só ia pegar uma bebida."

1013205-53 = "Vamos, senhor."

1013205-55 = "(Depois de uma refeição divertida com Tsukuyo...)"

1013205-56 = "(Decidi dar uma volta pela loja de departamentos.)"

1013205-58 = "Shopping no porão da loja de departamentos"

1013205-60 = "Sensei, isso combina com seu gosto...?"

1013205-61 = "[s1] \"Foi incrível!\"\n[s2] \"Todos os pratos estavam deliciosos!\""

1013205-64 = "Ehehe... fico feliz se você gostar...!"

1013205-65 = "Próximo...que tal sobremesa?"

1013205-66 = "Outro dia abriu uma sorveteria caseira."

1013205-67 = "Aparentemente é uma loja famosa que busca o melhor sabor com bastante gordura do leite...!"

1013205-68 = "[s] \"Entendo... isso é interessante!\""

1013205-69 = "Na verdade, tem fama de ser muito delicioso..."

1013205-71 = "...Não mais."

1013205-75 = "...?"

1013205-78 = "Nessa altura, não consigo usar roupas bonitas de jeito nenhum..."

1013205-79 = "このサイズだと、靴も全然ないし……。"

1013205-80 = "Bem, se você procurar, você encontrará!"

1013205-81 = "mas……."

1013205-82 = "Este corpo não combina comigo de qualquer maneira."

1013205-83 = "Todos os manequins... são muito mais baixos que eu."

1013205-84 = "Mas..."

1013205-88 = "Hum, professora..."

1013205-89 = "...Tudo bem se eu ligar para você?"

1013205-90 = "[s] \"Claro.""

1013205-91 = "obrigado……."

1013205-96 = "...Sim, sou Tsukuyo."

1013205-97 = "Quanto ao modelo de prova, ainda dá tempo...? #nSim... obrigado!"

1013205-101 = "[ns] \"Tsukuyo...?\""

1013205-102 = "...decidi aceitar a oferta que fiz anteriormente."

1013205-103 = "Sou grande, mas..."

1013205-104 = "...Achei que poderia dar coragem a alguém."

1013205-105 = "Quero curtir a moda e recebê-la sem me preocupar com o tamanho do corpo..."

1013205-106 = "Sinto muito... mas não sei se isso terá tanto efeito..."

1013205-107 = "[s3] \"Isso não é verdade!\"\n[s4] \"Tsukuyo é Kivotos e o melhor modelo!\""

1013205-110 = "Huh...!"

1013205-111 = "Então... me desculpe."

1013205-112 = "Sorvete da próxima vez...!"

1013205-116 = "(alguns dias depois)"

1013205-118 = "Shopping no porão da loja de departamentos"

1013205-121 = "(Nossa, minha foto está em um anúncio de uma loja de roupas...!)"

1013205-122 = "(Ugh... eu estava preparado para isso, mas ainda é constrangedor...!)"

1013205-123 = "(Para quem está olhando isso...)"

