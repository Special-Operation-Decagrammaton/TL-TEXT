[translation]
1008503-1 = "acampamento de luxo"

1008503-3 = "(Ao visitar o Millennium para trabalhar em placas de Petri, visitei a sala do clube Veritas.)"

1008503-8 = "Banheiro Veritas"

1008503-10 = "[ns1] \"Lebre, você não está aí...?\"\n[ns2] \"Comprei o sabor maracujá do Yokai MAX...\""

1008503-16 = "[ns3] \"Uau, está frio!\"\n[ns4] \"Um refrigerador em um dia como este...?\""

1008503-23 = "Ah... Sensei, você está aqui."

1008503-24 = "Desculpe, fui buscar a entrega."

1008503-28 = "Esse é...o sabor de maracujá do \"Yokai MAX\"?"

1008503-29 = "Eu só queria beber, obrigado Sensei."

1008503-30 = "[s5] \"De nada.\"\n[s6] \"Você não está com frio...?\""

1008503-33 = "Ah, não se preocupe. Porque é intencional."

1008503-34 = "O servidor do clube está funcionando com capacidade total para testar o computador em nuvem recém-introduzido."

1008503-35 = "Os servidores geram muito calor. Eu mantenho fresco para não superaquecer."

1008503-36 = "...Então, por favor, seja paciente, mesmo que esteja um pouco frio."

1008503-37 = "[s7] \"Eu realmente não me importo...\"\n[s8] \"Hare, você está bem?\""

1008503-40 = "Sim, está tudo bem."

1008503-41 = "Por precaução, peguei emprestado alguns equipamentos de camping do vice-gerente."

1008503-46 = "Jaquetas para o frio, cobertores, aquecedores elétricos, claro..."

1008503-47 = "Sopa que aquece até o núcleo e macarrão."

1008503-48 = "Em outras palavras, a sala de descanso de hoje é..."

1008503-50 = "É também um local de glamping!"

1008503-54 = "[ns] \"Local de acampamento de luxo...?\""

1008503-55 = "Sim. É gratificante de várias maneiras."

1008503-56 = "Glamping é uma forma de curtir acampar sem ter que se preocupar em montar uma barraca ou fazer preparativos."

1008503-57 = "Este é o banheiro da Veritas, mas também há vários equipamentos de camping...#nAcho que pode ser chamado de glamping em certo sentido."

1008503-58 = "Depois que nos acostumamos a fazer glamping na sala do clube, pensamos que seria uma boa ideia acamparmos juntos."

1008503-59 = "Bem, não é tão diferente do banheiro habitual..."

1008503-60 = "Isso também é prática de acampamento!"

1008503-61 = "[s] \"Talvez seja um treino...?\""

1008503-62 = "Não diga isso. Me dei ao trabalho de pegar emprestado alguns equipamentos de camping, então acho que gostaria de aproveitar um glamping relaxante hoje."

1008503-66 = "Primeiro, dê uma mordida no \"Yokai MAX\"..."

1008503-71 = "Ufa... Afinal, o Enadri que você bebe no glamping é algo especial."

1008503-72 = "Pois bem, vamos começar a trabalhar..."

1008503-76 = "(...E então eu assisti Hare trabalhar enrolado em um futon.)"

1008503-79 = "Hmm, isso pode ser um pouco complicado."

1008503-80 = "Para configurar a capacidade de um nó para aumentar automaticamente quando o acesso estiver concentrado..."

1008503-84 = "......Goku, Goku."

1008503-85 = "[s9] \"Hum, Hare-san...?\"\n[s10] \"O número de latas na mesa...\""

1008503-90 = "……Sim? pode……?"

1008503-91 = "Huh? Já terminei de beber! ?"

1008503-92 = "[s11] \"Eu queria saber se você deveria dizer alguma coisa...\"\n[s12] \"Talvez seja melhor jogar o lixo fora mais cedo?\""

1008503-95 = "Hum... isso mesmo."

1008503-96 = "Porém, se eu sair do meu lugar num momento em que estou concentrado, sou interrompido..."

1008503-100 = "……um. #nA propósito, estamos acampando agora."

1008503-101 = "O lixo gerado no camping deverá ser recolhido em um só lugar..."

1008503-102 = "Vou jogar fora mais tarde, então você não vai me perdoar por hoje...?"

1008503-103 = "[s] \"Nesse caso, só por hoje.\""

1008503-104 = "Hehe, obrigado."

1008503-105 = "Pois bem, deixe assim..."

1008503-111 = "(Depois disso, a vida preguiçosa de acampamento de Hare continua...)"

1008503-115 = "Hehe, comer macarrão enquanto descansa no seu saco de dormir é algo especial."

1008503-116 = "Parecia que eu estava comendo na cama... a sensação de imoralidade era a melhor."

1008503-122 = "Huh..."

1008503-123 = "Apesar de ter bebido tantas bebidas energéticas, senti sono..."

1008503-124 = "Enrolado em um saco de dormir em um quarto com ar condicionado, me sinto tão fofo..."

1008503-128 = "Ufa... finalmente foi esclarecido."

1008503-129 = "Resta esperar que a análise dos dados termine..."

1008503-130 = "Talvez eu devesse tirar uma soneca enquanto isso."

1008503-131 = "Sensei, você poderia, por favor, apagar a luz da sala?"

1008503-132 = "Este saco de dormir é tão aconchegante... não consigo sair..."

1008503-140 = "S-Sensei...? O que aconteceu de repente? #nVocê parece tão assustador..."

1008503-145 = "[ns] \"...Acorde, lebre!\""

1008503-149 = "Ei, ei...?"

1008503-150 = "[s13] \"Você não pode mais fazer isso.\"\n[s14] \"Você tem usado o acampamento como desculpa para continuar relaxando.\""

1008503-153 = "[ns] \"Comece a alongar agora!\""

1008503-154 = "Mas... hoje é dia de glamping, certo? #nNão há necessidade de forçar seu corpo a se mover――"

1008503-155 = "Se você movimentar o corpo e a temperatura corporal aumentar, você consegue ficar sem um saco de dormir?"

1008503-156 = "Sim, é verdade, mas... é um pouco difícil usar energia..."

1008503-157 = "Além disso, existe uma teoria de que atividades que usam o cérebro queimam mais calorias do que exercícios..."

1008503-162 = "Ah, espere, Sensei... eu entendo! #nSe você consegue se levantar sozinho...!"

1008503-168 = "(...Depois disso, tirei Hare e estiquei-a até que a temperatura corporal dela subisse.)"

