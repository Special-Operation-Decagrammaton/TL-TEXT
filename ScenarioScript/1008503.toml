[translation]
1008503-1 = "glamping"

1008503-3 = "(Visitei a sala do clube Veritas quando estava visitando a Millennium em um trabalho para a Shahre)."

1008503-8 = "Banheiro da Veritas"

1008503-10 = "[ns1] \"Halle, você está aí ......? \"\n[ns2] \"Comprei um sabor de maracujá do 'Spectre MAX' - ᢙ""

1008503-16 = "[ns3] \"Uau, está frio! \"\n[ns4] \"Mais frio em um dia como este ......? "

1008503-23 = "Oh, ...... doutor, o senhor está aqui."

1008503-24 = "Desculpe, tive que pegar um mensageiro."

1008503-28 = "Esse é o ...... sabor de maracujá do "Yokai MAX"?"

1008503-29 = "Eu só precisava de um drinque, obrigado, doutor."

1008503-30 = "[s5] \"De nada. \"\n[s6] \"Não está um pouco frio ......? \"\n[s6] \"Está frio.""

1008503-33 = "Oh, não se preocupe com isso. É de propósito."

1008503-34 = "Estamos testando nosso computador em nuvem recém-instalado e estamos executando os servidores na sala do clube com capacidade total."

1008503-35 = "Os servidores geram muito calor. Nós os resfriamos para que não fiquem sem calor."

1008503-36 = "É o site ......, portanto, tenha paciência se estiver um pouco frio."

1008503-37 = "[s7] \"Não tenho problemas com isso, mas não ......\"\n[s8] \"A Halle não tem problemas com isso? \""

1008503-40 = "Sim, está tudo bem."

1008503-41 = "Peguei emprestado alguns equipamentos de acampamento com o diretor assistente, por precaução."

1008503-46 = "Casacos quentes, cobertores e aquecedores elétricos estão disponíveis no site ......"

1008503-47 = "Sopas e cup noodles que o aquecem até o âmago."

1008503-48 = "Quero dizer, a sala de descanso de hoje..."

1008503-50 = "Tão bom quanto os locais de glamping!"

1008503-54 = "[ns] \"Glamping site ......? \""

1008503-55 = "Sim, tenho muitas coisas para fazer. Tenho muitas coisas para oferecer."

1008503-56 = "O glamping é uma ótima maneira de desfrutar de um acampamento sem o incômodo de montar e preparar uma barraca."

1008503-57 = "Este é um banheiro da Veritas, mas há também todos os tipos de equipamentos de camping, então acho que você poderia chamá-lo de glamping de certa forma ......#n."

1008503-58 = "Depois de me acostumar com o glamping no salão do clube, achei que seria uma boa ideia acamparmos juntos da próxima vez."

1008503-59 = "Bem, não é muito diferente de uma sala de descanso comum: ......"

1008503-60 = "Isso também é chamado de prática de acampamento!"

1008503-61 = "[s]\"É uma prática ......? \""

1008503-62 = "Não diga isso. Aluguei equipamentos de camping e acho que gostaria de relaxar e aproveitar o glamping hoje."

1008503-66 = "Primeiro, tome um gole de 'Yokai MAX': ......"

1008503-71 = "Fuu...... afinal, beber energizante no glamping é especial."

1008503-72 = "Então, vamos ao trabalho: ......"

1008503-76 = "(...... e observou Halle, que estava enrolada em um futon e trabalhando nele)"

1008503-79 = "Hmmm, isso pode ser um pouco complicado."

1008503-80 = "Para configurar um nó para aumentar automaticamente sua capacidade quando o acesso for intenso: ......"

1008503-84 = "............ Goku, goku."

1008503-85 = "[s9] \"Hum, Halle, ......? \"\n[s10] \"O número de latas em sua mesa é ......\.""

1008503-90 = "O endereço ...... pode ser usado? Pode ......?"

1008503-91 = "O quê? Eu já terminei de beber!"

1008503-92 = "[s11]\"Achei que seria uma boa ideia falar sobre isso. ......\"\n[s12]\"Acho que você deve jogar o lixo fora o mais rápido possível. \""

1008503-95 = "Hmmm. ...... Sim."

1008503-96 = "Mas se eu sair do assento quando estiver me concentrando, serei desconectado. ......"

1008503-100 = "...... Ah. #nOh, a propósito, você está acampando agora."

1008503-101 = "E o lixo do acampamento deve ser mantido em um único lugar. ......"

1008503-102 = "Vou jogar fora depois, pode me perdoar por hoje ......?"

1008503-103 = "[\"Só por hoje, então. \""

1008503-104 = "Obrigado."

1008503-105 = "Bem, então vamos manter isso assim: ......"

1008503-111 = "(A vida preguiçosa de Halle em acampamentos continuou depois: ......)"

1008503-115 = "Hmmm, há algo especial em comer cup noodles enquanto se descansa em um saco de dormir."

1008503-116 = "Sinto-me como se estivesse comendo na cama. ...... Adoro a sensação de imoralidade."

1008503-122 = "......"

1008503-123 = "Estou começando a sentir sono depois de todas essas bebidas energéticas. ......"

1008503-124 = "Quando você está enrolado em um saco de dormir em um quarto com ar-condicionado, você está ...... wow ......"

1008503-128 = "O site ...... finalmente ficou claro."

1008503-129 = "O restante está apenas aguardando a conclusão da análise dos dados. ......"

1008503-130 = "Acho que vou tirar um cochilo nesse meio tempo."

1008503-131 = "Doutor, o senhor pode apagar as luzes do meu quarto?"

1008503-132 = "Esse saco de dormir é tão aconchegante, ...... que não consegui sair dele. ......"

1008503-140 = "Se, senhor. ......? O que está acontecendo de repente? #nVocê parece tão assustado. ......"

1008503-145 = "[ns] \"......Acorde, Halle! \""

1008503-149 = "Sim, sim. ......?"

1008503-150 = "[s13] \"Você não pode ir mais longe. \"\n[s14] \"Você continua usando o acampamento como desculpa para ser preguiçoso. \""

1008503-153 = "[ns] \"O alongamento vai começar agora! \""

1008503-154 = "Mas ...... hoje é dia de glamping, ok? #nNão é preciso se forçar a ser físico..."

1008503-155 = "Se eu me movimentar e minha temperatura corporal aumentar, posso passar sem um saco de dormir?"

1008503-156 = "Sim, é verdade, mas não quero me dar ao trabalho de usar a energia do ....... ......"

1008503-157 = "Além disso, algumas pessoas acreditam que as atividades que usam a cabeça queimam mais calorias do que os exercícios..."

1008503-162 = "Bem, espere, senhor, ...... Eu entendo! #nEu mesmo a colocarei. ......"

1008503-168 = "(...... então levou Halle para fora e a esticou até que ela se aquecesse)"

