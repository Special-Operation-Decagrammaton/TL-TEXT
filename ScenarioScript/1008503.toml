[translation]
1008503-1 = "グランピング"
1008503-3 = "（シャーレの仕事でミレニアムを訪れたついでに、ヴェリタスの部室に足を運んだ）"
1008503-8 = "ヴェリタス・休憩室"
1008503-10 = "[ns1] \"ハレ、居ないのかな……？\"\n[ns2] \"「妖怪MAX」のパッションフルーツ味を買ってきたんだけど――\""
1008503-16 = "[ns3] \"うわっ、寒っ！\"\n[ns4] \"こんな日にクーラー……？\""
1008503-23 = "あ……先生、来てたんだ。"
1008503-24 = "ごめん、宅配便を受け取りに行ってて。"
1008503-28 = "それ……「妖怪MAX」のパッションフルーツ味？"
1008503-29 = "ちょうど飲みたかったの、ありがとう先生。"
1008503-30 = "[s5] \"どういたしまして。\"\n[s6] \"なんか寒くない……？\""
1008503-33 = "あ、気にしないで。わざとだから。"
1008503-34 = "新しく導入したクラウドコンピュータのテストで、部室のサーバーをフル稼働させてるの。"
1008503-35 = "サーバーは発熱がすごいからね。熱暴走しないように冷やしてるんだ。"
1008503-36 = "……だから、多少寒くても我慢してね。"
1008503-37 = "[s7] \"私は別に構わないけど……\"\n[s8] \"ハレは大丈夫なの？\""
1008503-40 = "うん、大丈夫。"
1008503-41 = "念のため、副部長にキャンプ道具を借りておいたんだ。"
1008503-46 = "防寒ジャケットに毛布、電気カイロはもちろん……"
1008503-47 = "身体の芯まで温まるスープと、カップ麺。"
1008503-48 = "つまり、今日の休憩室は――"
1008503-50 = "グランピング場も同然！"
1008503-54 = "[ns] \"グランピング場……？\""
1008503-55 = "うん。色々充実してるからね。"
1008503-56 = "面倒なテントの設営や準備をしなくてもキャンプを堪能できるのがグランピング。"
1008503-57 = "ここはヴェリタスの休憩室だけど、キャンプ道具も色々あるから……#nある意味グランピングと言えるんじゃないかな？"
1008503-58 = "部室でのグランピングに慣れてきたら、今度はみんなでキャンプに行くのもアリかなって。"
1008503-59 = "まあ、いつもの休憩室とあんまり変わらないけど……"
1008503-60 = "これもキャンプの練習ってことで！"
1008503-61 = "[s] \"練習になるのかな……？\""
1008503-62 = "そう言わずに。せっかくキャンプ道具を借りてきたんだし、今日はのんびりグランピングを楽しみたいかな。"
1008503-66 = "まずは「妖怪MAX」を一口……"
1008503-71 = "ふぅ……やっぱりグランピングで飲むエナドリは格別。"
1008503-72 = "それじゃ、作業を始めようか……"
1008503-76 = "（……そして、布団でぐるぐる巻きになりながら作業に勤しむハレを見守った）"
1008503-79 = "うーん、これはちょっと厄介かも。"
1008503-80 = "アクセスが集中したとき、ノードの容量が自動的に増えるよう設定するには……"
1008503-84 = "…………ごくっ、ごくっ。"
1008503-85 = "[s9] \"あの、ハレさん……？\"\n[s10] \"机の上に置いてある缶の数が……\""
1008503-90 = "……うん？缶……？"
1008503-91 = "あれ？もう飲み終わっちゃった！？"
1008503-92 = "[s11] \"口を出すのはどうかと思ったんだけど……\"\n[s12] \"ゴミは早めに捨てた方がいいんじゃないかな？\""
1008503-95 = "うーん……そうだね。"
1008503-96 = "でも、集中してるタイミングで離席したら途切れちゃうし……"
1008503-100 = "……あ。#nそういえば、今はキャンプ中だよね。"
1008503-101 = "キャンプ場で出たゴミは、一か所にまとめておくものだし……"
1008503-102 = "後で捨てるから、今日のところは許してくれない……？"
1008503-103 = "[s] \"それなら、今日だけね。\""
1008503-104 = "ふふ、ありがとう。"
1008503-105 = "それじゃ、このままで……"
1008503-111 = "（その後もハレの怠惰なキャンプ生活は続き……）"
1008503-115 = "ふふ、寝袋でゴロゴロしながら食べるカップ麺は格別だね。"
1008503-116 = "まるでベッドの上で食べてるような心地がして……背徳感が最高。"
1008503-122 = "ふあぁ……"
1008503-123 = "あれだけエナジードリンクを飲んだのに、なんだか眠くなってきた……"
1008503-124 = "クーラーの効いた部屋で寝袋に包まれてると……ふわぁ……"
1008503-128 = "ふぅ……ようやく片付いた。"
1008503-129 = "残りはデータ分析が終わるのを待つだけだし……"
1008503-130 = "その間、お昼寝でもしてようかなぁ。"
1008503-131 = "先生、部屋の明かりを消してくれる？"
1008503-132 = "この寝袋、居心地が良すぎて……どうも出られそうになくて……"
1008503-140 = "せ、先生……？急にどうしたの？#nそんな怖い顔して……"
1008503-145 = "[ns] \"……起きて、ハレ！\""
1008503-149 = "え、えぇ……？"
1008503-150 = "[s13] \"これ以上はダメだよ。\"\n[s14] \"キャンプを言い訳に、ずっとダラけてるよね。\""
1008503-153 = "[ns] \"これよりストレッチを開始します！\""
1008503-154 = "でも……今日はグランピングの日だよ？#n無理に身体を動かす必要は――"
1008503-155 = "身体を動かして体温が上がれば、寝袋が無くても大丈夫？"
1008503-156 = "そ、その通りだけど……わざわざエネルギーを使うのはちょっと……"
1008503-157 = "それに、頭を使う活動は、運動よりもカロリーを消費するという説も――"
1008503-162 = "ま、待って、先生……分かったから！#n自分で立てるってば……！"
1008503-168 = "（……その後、ハレを連れ出して体温が上がるまでストレッチをした）"
