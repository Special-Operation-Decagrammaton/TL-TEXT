[translation]
10007025-1 = "第2話;227号温泉郷へようこそ！"
10007025-5 = "227号温泉郷・入口"
10007025-8 = "こ、これは……"
10007025-9 = "これは、一体……！？"
10007025-10 = "[s] \"すごい、かなり立派な温泉郷だね。\""
10007025-11 = "か、感心してる場合じゃないぞカムラッド！"
10007025-12 = "たしか旧校舎には温泉郷を建てるための材木はおろか、薪に使う分さえ足りなかったはず……なのに、いつの間にどうやってこんな立派な温泉郷を……。"
10007025-19 = "はぁ……本当に良いお湯でしたね。"
10007025-20 = "ええ。それに売店にあったミルクティーも素晴らしかったです。やはり瓶に入っていると何だか味が違うように感じられますね。トリニティにも欲しいくらいです。"
10007025-21 = "ええ、また是非来たいですね。"
10007025-26 = "レッドウィンターにも、こんなに素晴らしい温泉があったとはな……正直驚いた。"
10007025-27 = "露天風呂から眺める雪景色……あれは流石にゲヘナには無いものだからな。"
10007025-31 = "た、他校の生徒たちまで来ているではないか！"
10007025-32 = "旧校舎を観光名所にして他校の生徒を招くことなど、おいらは許可した覚えはないぞ！？"
10007025-34 = "しかも、おいらが心血を注いで建設した「白ひげ遊園地」より、もっと人気があるだなんて……。"
10007025-35 = "ううっ！特別クラスのやつらはどこだ？全員粛清してやる！"
10007025-40 = "もう、先ほどから何の騒ぎですか？温泉郷中に声が響いて困ってしまいます。"
10007025-41 = "いくらお客様だとしても、営業妨害をするのであれば……。"
10007025-45 = "って、先生！？あとチェリノ会長！？"
10007025-46 = "どっ、どうしてここへ？"
10007025-47 = "[s1] \"あ、ノドカ。着物、似合ってるね。\"\n[s2] \"新しく温泉ができたって聞いて。\""
10007025-48 = "待て待て！「どうして」はこちらのセリフだ！"
10007025-49 = "待て待て！「どうして」はこちらのセリフだ！"
10007025-50 = "この温泉郷は一体何なんだ！旧校舎はどこに！？"
10007025-51 = "えっと、それはですね……。"
10007025-56 = "……こほん。チェリノ会長、227号温泉郷へようこそおいでくださいました。"
10007025-57 = "ここ私たちの227号温泉郷でぜひ、溜まった日々のお疲れを癒してくださいね。"
10007025-58 = "話を逸らすな！それにどうしていつの間に「227号温泉郷」になってるんだ！そんなことは聞いてないぞ！"
10007025-59 = "も、元はと言えば「227号特別」クラスだって非公式なものじゃないですか！"
10007025-60 = "それをどう変えようと、そしてここで何をどうしようと、基本的には私たちの勝手のはずです！"
10007025-61 = "私たちはもう虐げられるだけの存在ではありません……ここで温泉を運営して、私たちは大きく変わったのです。"
10007025-62 = "今やキヴォトスのあちこちからいらっしゃるお客様のおかげで、貧しさに苦しむことも無くなりました。"
10007025-63 = "プリンはおろか、パンの数すら心配していたあの頃の私たち……それも今となっては、もはや遥か昔のこと……！"
10007025-64 = "なにせ今の私は、食後のプリンを毎回二つも食べられるほど裕福なのですから！"
10007025-65 = "なっ……ぷ、プリンを二つもだと！？"
10007025-66 = "[s] \"えっと……すごいこと、なのかな？\""
10007025-67 = "もちろんです。レッドウィンター連邦学園でプリンを二つも食べられるのは、これまでチェリノ会長くらいでしたから。"
10007025-68 = "それにもっと綺麗に星空や、色々な素晴らしいものを観測できるよう、望遠鏡の新型レンズもたくさん購入しちゃいました！"
10007025-69 = "あとは……あとは何をしたかな……。"
10007025-70 = "なにせお金が有り余っているので、正直何に使ったか覚えていなくて……逆に困っちゃうくらいですね。ふふっ……。"
10007025-75 = "ううっ……許せない……。"
10007025-76 = "反省させるための旧校舎送りだったのに、こんなおいら並みに豪華な生活を楽しむだなんて……！"
10007025-77 = "粛清だ！今すぐこの「粛清君1号」で、温泉郷を丸ごと撤去してやる！"
10007025-78 = "ま、待ってください！それだけは止めてください！"
10007025-79 = "せっかく長い苦労の果てに、明日のご飯を心配しなくても良くなったのに……羨ましいからって温泉を撤去するだなんて酷いです！"
10007025-80 = "そもそも私たちが温泉郷を運営していても、チェリノ会長や事務局に迷惑がかかるわけじゃないですよね？"
10007025-81 = "そ、それはそうだが……。"
10007025-82 = "でもダメなものはダメだ！いくら実害が無くとも、普通の生徒がこんな派手な生活を楽しんでるだなんて、これを容認したら書記長として面子が立たない！"
10007025-83 = "ううっ……こうなったら、できるだけこの方法は使いたくなかったけど……。"
10007025-88 = "シグレちゃん、「アレ」を持ってきてく……持ってきて！"
10007025-90 = "な、なんだ？おいらに酷いことをする気か！？"
10007025-96 = "はい。チェリノ会長のために用意した、特製の「髭温泉まんじゅう」だよ。"
10007025-97 = "ん？なんだ、ワイロか……？"
10007025-98 = "髭が描いてあるとはいえ、ただの温泉まんじゅうではないか。こんな物でおいらを懐柔できるだなんて、甘い考えだな。"
10007025-99 = "まあとにかく食べてみて。そしたら考えが変わるかもよ？"
10007025-100 = "ふんっ。たかだか温泉まんじゅうなんかで、考えが変わるわけが……"
10007025-108 = "美味しいっ！？"
10007025-109 = "ふわふわでもちっとした薄皮、そしてしっとりと柔らかいあんこ……その二つが素晴らしいバランスを……！こんなまんじゅう、食べたこと無い！"
10007025-110 = "温泉の利益で高級食材をたくさん購入して、最高級のまんじゅうを作ってみたの。"
10007025-111 = "このまんじゅう、この間来た他の学校の美食家たちにも認めてもらったんだから。"
10007025-112 = "いかがですか、チェリノ会長？"
10007025-113 = "温泉郷の運営にさえ目をつぶっていただければ、入浴無料はもちろんのこと、一緒にこの「髭温泉まんじゅう」を好きなだけ差し上げますよ？"
10007025-114 = "……し、仕方ないな。立派な最高権力者というものは、生徒のお願いも聞くものだし……そこまで言うなら、今回は特別に見逃してやろう！"
10007025-115 = "だが、決して温泉まんじゅうが欲しいわけじゃないからな！"
10007025-117 = "お待ちください。いくらチェリノ会長が目を瞑ってくださるとはいえ、この温泉郷の建築自体はやはりルールに反しています。"
10007025-118 = "その通りだ。レッドウィンター連邦学園の風紀、そして事務局の権威のためにも、こんな違法建築物はすぐに――"
10007025-123 = "トモエさん。実はここには、みんなで一緒に入れる大きな温泉がありまして。"
10007025-124 = "お疲れのトモエさんにはぜひチェリノ会長と一緒に、と思ったのですが……いかがですか？"
10007025-125 = "なっ……！チェリノ会長と一緒に、温泉……？"
10007025-126 = "ああ、そういえば向こうにある露天風呂には、よく熊たちが来てて。"
10007025-127 = "あのふかふかな熊と戯れながら一緒に露天風呂なんて、楽しいだろうな……。"
10007025-128 = "ふ、ふかふかな熊だと……！？"
10007025-129 = "ふむ……し、仕方ないですね。考えてみたら、レッドウィンター連邦学園に一つぐらい温泉郷があっても良い気はしますし……。"
10007025-130 = "ま、まあ、保安委員たちの士気のためにも、入浴施設というのは悪くないだろうな。"
10007025-131 = "……決して熊と一緒に、露天風呂に入りたいというわけではない！"
10007025-132 = "はい！ではレッドウィンター連邦学園の事務局からいらっしゃった3名様、ご案内いたします！"
10007025-133 = "脱衣所はこちらですよー。"
10007025-137 = "ふう……何とかクレーマーをやりこめるのに成功しましたね。"
10007025-138 = "あっ、先生がクレーマーという意味ではありませんので！"
10007025-139 = "むしろ先生には来ていただけて嬉しいです！"
10007025-140 = "[s3] \"それにしても、本当にすごい場所だね。\"\n[s4] \"たくさん生徒たちが来てて、すごく賑わってるね。\""
10007025-141 = "はい、おかげさまで何だか忙しくはなりましたが……今までより色々と、できることも増えましたし。"
10007025-142 = "はい、おかげさまで何だか忙しくはなりましたが……今までより色々と、できることも増えましたし。"
10007025-143 = "高級なお菓子をたくさん食べたり、望遠鏡の古いレンズを新調したり……"
10007025-144 = "温泉の管理と言いつつ、色々と覗けますし……これなら、先生のこともはっきり……"
10007025-145 = "……はっ！"
10007025-146 = "い、今のは聞かなかったことにしてください！"
10007025-147 = "[s] \"……何だかちょっと心配になってきた。\""
10007025-148 = "いえいえ、何もご心配なさらず！227号温泉郷として、全力でおもてなしをいたしますから！"
10007025-157 = "さあっ、こちらの浴衣をどうぞ。"
10007025-158 = "支配人権限で、先生には特別に専用の露天風呂をご用意いたしますので。"
10007025-159 = "どうぞの〜んびり、ゆ〜っくりと温泉を楽しんでくださいね！"
10007025-160 = "……ふふっ、先生の入浴シーン……はあ、はぁっ……。"
10007025-167 = "ノドカの怪しげな視線を背に受けながら、露天風呂へと向かった……。"
