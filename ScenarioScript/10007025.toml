[translation]
10007025-1 = "Episódio 2; Bem-vindos à Estância Termal 227!"
10007025-5 = "Estância Termal 227 - Entrada"
10007025-8 = "I-Isso é..."
10007025-9 = "O que é isso, afinal...!?"
10007025-10 = "[s] \"Incrível, é uma estância termal muito imponente.\""
10007025-11 = "N-Não é hora de ficar impressionado, camarada!"
10007025-12 = "Até onde eu sabia, no antigo prédio da escola não havia nem madeira suficiente para construir uma estância, quanto mais para usar como lenha... e ainda assim, quando e como construíram algo tão grandioso assim..."
10007025-19 = "Ah... foi um banho realmente maravilhoso."
10007025-20 = "Sim. E o chá com leite que tinha na loja também estava excelente. O sabor parece diferente quando vem em uma garrafa, não é? Queria que tivéssemos isso em Trinity também."
10007025-21 = "Sim, com certeza quero voltar."
10007025-26 = "Eu não esperava que Red Winter tivesse uma estância termal tão magnífica... honestamente, estou surpreso."
10007025-27 = "A vista da neve a partir do banho ao ar livre... isso é algo que Gehenna definitivamente não tem."
10007025-31 = "A-Até alunas de outras escolas estão vindo aqui!"
10007025-32 = "Eu não me lembro de ter dado permissão para transformar o antigo prédio da escola em um ponto turístico e convidar alunas de outras escolas!"
10007025-34 = "E ainda por cima, é mais popular do que o \"Parque de Diversões do Barba Branca\", que eu construí com tanto suor e sangue..."
10007025-35 = "Grrr! Onde estão as alunas da classe especial? Vou expurgar todas elas!"
10007025-40 = "Ora, que barulheira é essa desde agora? As vozes estão ecoando por toda a estância e isso é um problema."
10007025-41 = "Mesmo que sejam clientes, se estiverem atrapalhando o funcionamento..."
10007025-45 = "Espere, Sensei!? E a Presidente Cherino!?"
10007025-46 = "P-Por que vocês estão aqui?"
10007025-47 = "[s1] \"Ah, Nodoka. O quimono combina com você.\"\n[s2] \"Ouvi dizer que tinham construído uma nova estância termal.\""
10007025-48 = "Espere, espere! \"Por que\" é o que eu deveria perguntar!"
10007025-49 = "Espere, espere! \"Por que\" é o que eu deveria perguntar!"
10007025-50 = "O que é essa estância termal, afinal! Onde está o antigo prédio da escola!?"
10007025-51 = "Bem, sobre isso..."
10007025-56 = "...Ehem. Presidente Cherino, seja bem-vinda à Estância Termal 227."
10007025-57 = "Por favor, aproveite para curar o cansaço do dia a dia aqui na nossa Estância Termal 227."
10007025-58 = "Não mude de assunto! E por que, de repente, virou \"Estância Termal 227\"! Eu não fiquei sabendo de nada disso!"
10007025-59 = "B-Bem, para começar, a classe \"Especial 227\" já não era algo não oficial?"
10007025-60 = "Como decidimos mudar isso, e o que fazemos aqui, basicamente é um problema nosso!"
10007025-61 = "Nós não somos mais apenas seres oprimidos... ao administrar esta estância, nós mudamos drasticamente."
10007025-62 = "Graças aos clientes que vêm de todos os cantos de Kivotos, não sofremos mais com a pobreza."
10007025-63 = "Naquela época, nos preocupávamos até com a quantidade de pão, sem falar no pudim... isso agora parece algo de um passado muito distante...!"
10007025-64 = "Afinal, agora sou tão rica que posso comer dois pudins após as refeições!"
10007025-65 = "O quê... d-dois pudins!?"
10007025-66 = "[s] \"Bem... isso é algo impressionante?\""
10007025-67 = "Com certeza. Até agora, a única pessoa na Academia Federal de Red Winter que podia comer dois pudins era a Presidente Cherino."
10007025-68 = "E também compramos muitas lentes novas para o telescópio, para podermos observar o céu estrelado e outras coisas maravilhosas com mais clareza!"
10007025-69 = "E o que mais... o que mais fizemos..."
10007025-70 = "Como temos dinheiro sobrando, honestamente, nem me lembro de tudo em que gastamos... é quase um problema, hehe..."
10007025-75 = "Grrr... não posso perdoar isso..."
10007025-76 = "Eu as mandei para o antigo prédio da escola como punição, e elas estão desfrutando de uma vida luxuosa que rivaliza com a minha...!"
10007025-77 = "É um expurgo! Vou usar este \"Expurgador nº 1\" agora mesmo para demolir toda a estância termal!"
10007025-78 = "E-Espere, por favor! Pare com isso!"
10007025-79 = "Depois de tanto esforço, finalmente não precisamos mais nos preocupar com a comida de amanhã... é cruel querer demolir a estância só por inveja!"
10007025-80 = "Além disso, mesmo que a gente administre a estância, não estamos causando problemas para a Presidente Cherino ou para a secretaria, certo?"
10007025-81 = "B-Bem, isso é verdade, mas..."
10007025-82 = "Mas o que é errado, é errado! Mesmo que não haja danos reais, se eu permitir que alunas comuns desfrutem de uma vida tão extravagante, minha reputação como Secretária-Geral vai por água abaixo!"
10007025-83 = "Grrr... se chegou a esse ponto, eu não queria usar este método, mas..."
10007025-88 = "Shigure, traga \"aquilo\"... traga logo!"
10007025-90 = "Q-que é isso? Você pretende fazer algo terrível comigo!?"
10007025-96 = "Sim. É um 'Manju de Fonte Termal do Bigode' especial, preparado para a Presidente Cherino."
10007025-97 = "Hm? O que é isso, suborno...?"
10007025-98 = "Mesmo que tenha um bigode desenhado, não passa de um simples manju de fonte termal. Você é muito ingênua se acha que pode me manipular com algo assim."
10007025-99 = "Bem, de qualquer forma, experimente. Talvez você mude de ideia depois?"
10007025-100 = "Humpf. Não tem como eu mudar de ideia por causa de um simples manju de fonte termal..."
10007025-108 = "É delicioso!?"
10007025-109 = "A massa fina, fofa e macia, e o recheio de feijão doce, úmido e suave... os dois estão em um equilíbrio maravilhoso...! Nunca comi um manju assim!"
10007025-110 = "Usei os lucros da fonte termal para comprar muitos ingredientes de luxo e fazer o manju mais refinado possível."
10007025-111 = "Este manju foi até aprovado pelos gourmets de outras escolas que vieram aqui outro dia."
10007025-112 = "O que acha, Presidente Cherino?"
10007025-113 = "Se a senhora puder fechar os olhos para a operação desta estância termal, além do banho gratuito, eu lhe darei quantos 'Manjus de Fonte Termal do Bigode' a senhora quiser."
10007025-114 = "...T-tá bom, não tem jeito. Uma grande autoridade suprema deve atender aos pedidos de seus alunos... Já que insiste tanto, vou deixar passar desta vez, como uma exceção!"
10007025-115 = "Mas não pense que é porque eu queria o manju de fonte termal!"
10007025-117 = "Espere um pouco. Por mais que a Presidente Cherino feche os olhos, a construção desta estância termal em si ainda viola as regras."
10007025-118 = "Exatamente. Pela disciplina da Academia Red Winter e pela autoridade da secretaria, essa construção ilegal deve ser imediatamente..."
10007025-123 = "Tomoe-san. Na verdade, aqui tem uma grande fonte termal onde todos podem entrar juntos."
10007025-124 = "Pensei que seria bom para a cansada Tomoe-san entrar junto com a Presidente Cherino... o que acha?"
10007025-125 = "O quê...!? Entrar na fonte termal... com a Presidente Cherino?"
10007025-126 = "Ah, falando nisso, os ursos costumam vir ao banho ao ar livre ali."
10007025-127 = "Deve ser divertido entrar no banho ao ar livre enquanto brincamos com aqueles ursos fofinhos..."
10007025-128 = "U-ursos fofinhos, você disse...!?"
10007025-129 = "Hum... b-bem, não tem jeito. Pensando bem, acho que não faria mal ter uma estância termal na Academia Red Winter..."
10007025-130 = "B-bem, para o moral dos membros do Comitê de Segurança, uma instalação de banho não seria nada mal."
10007025-131 = "...Não é que eu queira entrar no banho ao ar livre com os ursos, de jeito nenhum!"
10007025-132 = "Sim! Então, os três representantes da secretaria da Academia Red Winter, por favor, me sigam!"
10007025-133 = "O vestiário é por aqui."
10007025-137 = "Ufa... conseguimos lidar com os reclamões com sucesso."
10007025-138 = "Ah, não estou dizendo que o Sensei é um reclamão!"
10007025-139 = "Na verdade, estou muito feliz que o Sensei tenha vindo!"
10007025-140 = "[s3] \"Ainda assim, este lugar é realmente incrível.\"\n[s4] \"Tem muitos alunos vindo, está bem movimentado.\""
10007025-141 = "Sim, graças a isso ficamos um pouco ocupados, mas... conseguimos fazer muito mais coisas do que antes."
10007025-142 = "Sim, graças a isso ficamos um pouco ocupados, mas... conseguimos fazer muito mais coisas do que antes."
10007025-143 = "Comer muitos doces caros, comprar lentes novas para o telescópio antigo..."
10007025-144 = "Dizendo que é para gerenciar a fonte termal, posso observar várias coisas... assim, posso ver o Sensei claramente..."
10007025-145 = "...Ah!"
10007025-146 = "E-esqueça o que eu acabei de dizer!"
10007025-147 = "[s] \"...Comecei a ficar um pouco preocupado.\""
10007025-148 = "Não, não, não se preocupe com nada! Como a Estância Termal 227, vamos atendê-lo com todo o nosso esforço!"
10007025-157 = "Vamos, pegue este yukata."
10007025-158 = "Como gerente, preparei um banho ao ar livre especial apenas para o Sensei."
10007025-159 = "Por favor, aproveite a fonte termal com muita calma e tranquilidade!"
10007025-160 = "...Fufu, a cena do banho do Sensei... ah, ahhh..."
10007025-167 = "Senti o olhar suspeito de Nodoka nas minhas costas enquanto seguia para o banho ao ar livre..."
