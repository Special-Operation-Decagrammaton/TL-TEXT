[translation]
1010502-1 = "Por favor, dê uma mordida"

1010502-2 = "(Fui para a sala de aula para apoiar Marie)"

1010502-8 = "...?"

1010502-9 = "Qual deles é você...?"

1010502-10 = "Ei, professor! ?"

1010502-11 = "Qual é o seu propósito aqui?"

1010502-12 = "...Pelo meu apoio?"

1010502-13 = "Talvez seja porque enviei o Momotalk?"

1010502-14 = "...... sinto muito."

1010502-15 = "Estou me esforçando para ocupar o precioso tempo do professor..."

1010502-16 = "Mesmo que eu seja o único lá."

1010502-17 = "Na verdade, vocês dois estavam lá há pouco tempo, mas depois do treino, eles partiram para a próxima tarefa."

1010502-18 = "Porém, pensei em praticar um pouco mais."

1010502-22 = "Não se preocupe! #nJá tenho a música e a coreografia memorizadas."

1010502-23 = "No entanto, gostaria de dar a todos um bom desempenho..."

1010502-24 = "...Isso é melhor que isso!"

1010502-25 = "Antes que eu percebesse, já era hora do almoço."

1010502-26 = "Se o professor ainda não comeu..."

1010502-27 = "Você gostaria de comer minha lancheira comigo?"

1010502-28 = "Pode não ser suficiente para duas pessoas comerem, mas..."

1010502-29 = "[s1] \"Vou ficar bem.\"\n[s2] \"Se quiser continuar praticando, você precisa se alimentar adequadamente.\""

1010502-32 = "...Hum."

1010502-33 = "Não posso simplesmente comer na frente da professora..."

1010502-34 = "Acho que vou almoçar depois do treino."

1010502-35 = "Eh..."

1010502-36 = "Você já está indo para casa? ?"

1010502-37 = "[s3] \"É difícil comer quando estou por perto.\"\n[s4] \"Você está atrapalhando Marie.\""

1010502-40 = "Não, isso não é verdade."

1010502-41 = "É que estou me preocupando demais com as coisas..."

1010502-42 = "...Eu entendo, professor. #nQuando você voltar, por favor, faça uma refeição adequada."

1010502-46 = "Sim, eu aceito."

1010502-51 = "[ns5] Limpe o chão da sala de aula. \n[ns6] Limpe seus pertences na sala de aula."

1010502-54 = "...O que você está fazendo de repente?"

1010502-55 = "Quando se trata de limpar e arrumar, você mesmo pode fazer isso! ?"

1010502-56 = "Por que se preocupar em pedir ao professor para fazer isso..."

1010502-57 = "...Eh?"

1010502-58 = "Você quer ajudar em alguma coisa...?"

1010502-59 = "É verdade que é constrangedor ter pessoas olhando para o seu rosto o tempo todo enquanto você come..."

1010502-60 = "Claro que estou feliz em ouvir isso."

1010502-61 = "No entanto, parece que o professor está apenas prestando atenção em mim..."

1010502-62 = "[s7] \"Quero fazer algo por Marie.\"\n[s8] \"Quero que você se concentre na prática por enquanto.\""

1010502-65 = "Mesmo que você diga isso..."

1010502-66 = "……."

1010502-71 = "[ns9] \"...Marie?\"\n[ns10] \"Acho que foi uma ajuda desnecessária...\""

1010502-76 = "……professor."

1010502-77 = "Você poderia, por favor, ouvir meu egoísmo?"

1010502-78 = "Pense nisso como um pedido para ajudá-lo a se concentrar em sua prática."

1010502-79 = "... Kohon."

1010502-80 = "Pois bem, senhor."

1010502-81 = "Aqui..."

1010502-85 = "[ns11] \"Este é o da Marie...\"\n[ns12] \"É realmente bom?\""

1010502-88 = "...Este tamagoyaki é para o professor."

1010502-89 = "Apenas dividir um acompanhamento não fará diferença."

1010502-90 = "Além disso, me incomodava ser o único a comer."

1010502-91 = "Então, para se concentrar na prática..."

1010502-92 = "Por favor, tenha um."

1010502-93 = "……professor."

1010502-94 = "Não, certo...?"

1010502-95 = "……."

1010502-97 = "...Abra a boca, senhor."

1010502-98 = "Ah, ah…."

