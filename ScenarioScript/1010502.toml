[translation]
1010502-1 = "一口どうぞ"
1010502-2 = "（マリーを応援するために、レッスン室へ向かった）"
1010502-8 = "……？"
1010502-9 = "どちら様ですか……？"
1010502-10 = "せ、先生！？"
1010502-11 = "こちらには何のご用で……。"
1010502-12 = "……私の応援に？"
1010502-13 = "もしかして、モモトークを送ったせいでしょうか。"
1010502-14 = "……申し訳ありません。"
1010502-15 = "先生の貴重なお時間を、わざわざ……。"
1010502-16 = "それも、私しかいないというのに。"
1010502-17 = "実は、先ほどまでお二人もいたのですが、#n練習が終わったら次の用事に向かわれました。"
1010502-18 = "ですが、私はもう少し練習しておこうと思ったのです。"
1010502-22 = "ご安心ください！#n歌も振り付けも、すでに覚えてはいます。"
1010502-23 = "ただ、少しでも良いパフォーマンスを皆さんに……。"
1010502-24 = "……そ、それより！"
1010502-25 = "気づけば、お昼の時間になっていましたね。"
1010502-26 = "先生も、まだ食べていないようでしたら……。"
1010502-27 = "私のお弁当を一緒に食べませんか？"
1010502-28 = "二人で食べるには、少ないかもしれませんが……。"
1010502-29 = "[s1] \"私は大丈夫だよ。\"\n[s2] \"練習を続けるなら、ちゃんと食べないとね。\""
1010502-32 = "……うーん。"
1010502-33 = "先生の前で、私だけ食べるわけには……。"
1010502-34 = "お昼は練習が終わってからにしようと思います。"
1010502-35 = "えっ……。"
1010502-36 = "もう帰ってしまうんですか！？"
1010502-37 = "[s3] \"私がいると、食べづらいよね。\"\n[s4] \"マリーの邪魔になってるよね。\""
1010502-40 = "そ、そんなことはありません。"
1010502-41 = "私が色々と気にしすぎているだけで……。"
1010502-42 = "……分かりました、先生。#n帰ったら、きちんとお食事を取ってくださいね。"
1010502-46 = "い、いただきます。"
1010502-51 = "[ns5] レッスン室の床を拭く。\n[ns6] レッスン室の荷物を片付ける。"
1010502-54 = "……急に何を？"
1010502-55 = "掃除や片付けなら、最後に自分で行いますよ！？"
1010502-56 = "わざわざ先生にやってもらうのは……。"
1010502-57 = "……えっ？"
1010502-58 = "少しでも力になりたい、と……？"
1010502-59 = "たしかに、食事中の顔をずっと見られているのは恥ずかしいですし……。"
1010502-60 = "そのお気持ちは、もちろん嬉しいです。"
1010502-61 = "ただ、これでは先生に気を遣っていただいてばかりのような……。"
1010502-62 = "[s7] \"マリーのために何かしたいんだ。\"\n[s8] \"今は練習に集中してほしいから。\""
1010502-65 = "そう言われましても……。"
1010502-66 = "……。"
1010502-71 = "[ns9] \"……マリー？\"\n[ns10] \"余計なお世話だったかな……。\""
1010502-76 = "……先生。"
1010502-77 = "ひとつ、私のわがままを聞いていただけますか？"
1010502-78 = "練習に集中するためのお願いだと思ってください。"
1010502-79 = "……こほん。"
1010502-80 = "それでは、先生。"
1010502-81 = "こちらを……。"
1010502-85 = "[ns11] \"これはマリーのじゃ……。\"\n[ns12] \"本当に良いの？ \""
1010502-88 = "……この卵焼きは、先生の分です。"
1010502-89 = "おかずを一つ分けたくらいでは、変わりませんから。"
1010502-90 = "それに、私だけ食事をしているのが気になってしまいまして。"
1010502-91 = "なので、練習に集中するためにも……。"
1010502-92 = "おひとつ、召し上がってください。"
1010502-93 = "……先生。"
1010502-94 = "ダメ、でしょうか……？"
1010502-95 = "……。"
1010502-97 = "……お口を開けてください、先生。"
1010502-98 = "あ、あーん……。"
