[translation]
90000130-1 = "Episódio 14; Sinal"
90000130-2 = "Sala do Departamento de Investigação de Fenômenos Singulares"
90000130-5 = "Sensei, desculpe por te chamar de repente."
90000130-6 = "Obrigada por vir."
90000130-7 = "[s] \"Tudo bem. O que aconteceu?\""
90000130-8 = "Bem... eu queria que você ouvisse sem ficar bravo..."
90000130-9 = "[s] \"...Hum?\""
90000130-10 = "Primeiro, não fui eu quem chamou o Sensei, mas sim—"
90000130-19 = "Protocolo de convocação de emergência, sem anormalidades."
90000130-20 = "[s] \"E-espera... o quê?\""
90000130-21 = "Saber quanto tempo o Sensei leva para chegar em caso de emergência é extremamente importante para a execução da missão. Afinal, você é o responsável."
90000130-25 = "[ns] \"...Toki?\""
90000130-26 = "Sim. Asuma Toki. Como somos próximos, achei que poderia pular as apresentações. Aliás, \"próximos\" significa que temos uma relação muito íntima."
90000130-27 = "O Sensei chegou dentro do tempo previsto — e confirmei que o protocolo de convocação de emergência funciona normalmente."
90000130-28 = "[s] \"Então... quer dizer que...\""
90000130-29 = "Sim, não aconteceu nada em especial."
90000130-30 = "Se é que posso dizer... não fui chamada para missões da C&C, e o assunto do Departamento de Desenvolvimento de Jogos também já se resolveu, então estou em espera por tempo indeterminado..."
90000130-31 = "Em suma, estou entediada."
90000130-35 = "[ns] \"Então você apertou o botão de emergência só para passar o tempo...?\""
90000130-37 = "Exatamente. Paz, paz."
90000130-38 = "Toki, vamos parar com isso. É falta de educação."
90000130-39 = "Entendo... serei mais cuidadosa da próxima vez. De qualquer forma, brinque comigo, Sensei. Estou sem nada para fazer."
90000130-40 = "Você está me ouvindo?"
90000130-41 = "[s1] \"A Toki sempre foi assim...?\"\n[s2] \"A Eimi virou a veterana...\""
90000130-49 = "Ora, que barulhento."
90000130-50 = "Diretora."
90000130-51 = "Diretora Himari, bem-vinda de volta."
90000130-52 = "Sensei e... Toki...? Aconteceu alguma coisa?"
90000130-53 = "Não é que tenha acontecido algo, mas..."
90000130-58 = "..."
90000130-62 = "Ué, o que é isso...?"
90000130-63 = "Toki...?"
90000130-64 = "Definitivamente não fui eu. Eu não apertaria o botão de emergência sem motivo."
90000130-65 = "Deixando isso para perguntar depois..."
90000130-71 = "Diretora... este sinal..."
90000130-78 = "Sim... quem diria que ele apareceria de novo..."
90000130-79 = "Sinal?"
90000130-80 = "...Sim. É algo que já vimos antes... mas eu achei que nunca mais apareceria..."
90000130-81 = "Que sinal seria esse...?"
90000130-82 = "Aquele é — o sinal do Decagrammaton."
90000130-87 = "Decagrammaton... ouvi dizer que o corpo principal afundou sob as águas da área de ruínas submersas."
90000130-88 = "Exatamente. Não creio que aquele corpo de máquina tenha sobrevivido àquela explosão. A probabilidade de ele ainda estar vivo é praticamente zero."
90000130-89 = "...E ainda assim."
90000130-90 = "Consegui localizar a origem do sinal."
90000130-91 = "Essas coordenadas são... a \"Região do Mar de Gelo\", um lugar tão frio que até o mar congela."
90000130-92 = "Deveria ser uma área abandonada sem distritos autônomos, mas... o Decagrammaton em um lugar desses...?"
90000130-93 = "...Vou verificar."
90000130-98 = "...Como eu pensei. — A probabilidade de este sinal ser do Decagrammaton é baixa."
90000130-99 = "À primeira vista parece, mas não passa de uma imitação."
90000130-100 = "Nesse caso..."
90000130-101 = "Será que este é outro profeta...?"
90000130-102 = "Até agora, a Seção de Investigação de Fenômenos Singulares encontrou 4 profetas, incluindo Hod...#nOuvi dizer que existem outros 6."
90000130-103 = "Sim... existe a possibilidade de ser o 5º profeta, #nou talvez um novo inimigo que imita o Decagrammaton."
90000130-104 = "De qualquer forma, não podemos afirmar nada até verificarmos pessoalmente."
90000130-105 = "Mas, uma coisa é clara — não importa qual seja a verdadeira identidade daquilo..."
90000130-110 = "..."
90000130-115 = "— é que aquilo está nos chamando."
90000130-117 = "Próximo episódio: Geleira (1)"
