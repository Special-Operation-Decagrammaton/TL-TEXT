[translation]
90000130-1 = "第14話;信号"
90000130-2 = "特異現象捜査部・部室"
90000130-5 = "先生、急に呼び出してごめん。"
90000130-6 = "来てくれてありがとう。"
90000130-7 = "[s] \"大丈夫。一体何があったの？\""
90000130-8 = "その……怒らないで聞いてほしいんだけど……"
90000130-9 = "[s] \"……うん？\""
90000130-10 = "まず、先生を呼んだのは私じゃなくて――"
90000130-19 = "緊急招集プロトコル、異常なし。"
90000130-20 = "[s] \"え、えっと……？\""
90000130-21 = "緊急事態が発生した際、どの程度の時間で先生がいらっしゃるかは、#n作戦遂行において極めて重要です。責任者ですので。"
90000130-25 = "[ns] \"……トキ？\""
90000130-26 = "はい。[ruby=あすま]飛鳥馬[/ruby]トキです。私たちの仲ですので、名乗りは省略させていただければと。ちなみに「私たちの仲」とは、非常に親密な関係を意味します。"
90000130-27 = "先生は無事時間内に到着――そして、緊急招集プロトコルが正常に動作することを確認しました。"
90000130-28 = "[s] \"ええと……つまり……。\""
90000130-29 = "はい、特に何かが起きたわけではありません。"
90000130-30 = "強いて言えば……C&Cの任務で呼ばれることもなく、#nゲーム開発部の件も一段落しているため、無期限の待機状態……。"
90000130-31 = "つまり、退屈です。"
90000130-35 = "[ns] \"それで、暇つぶしに非常ベルを押してみた、と……？\""
90000130-37 = "その通りです。ピース、ピース。"
90000130-38 = "トキ、それは流石にやめよう。失礼だよ。"
90000130-39 = "そうなのですね……以降、気をつけます。#nとにかく遊んでください、先生。暇です。"
90000130-40 = "話聞いてる？"
90000130-41 = "[s1] \"こういうキャラだったっけ、トキ……。\"\n[s2] \"エイミが先輩になってる……。\""
90000130-49 = "おや、賑やかですね。"
90000130-50 = "部長。"
90000130-51 = "ヒマリ部長、おかえりなさい。"
90000130-52 = "先生と……トキ……？#n何かありましたか？"
90000130-53 = "何かあったわけでは、ないんだけど……"
90000130-58 = "……。"
90000130-62 = "あら、これは……？"
90000130-63 = "トキ……？"
90000130-64 = "断じて違います。私は無闇に非常ベルを押したりなどしません。"
90000130-65 = "それは後で話を聞くとして……"
90000130-71 = "部長……この信号……"
90000130-78 = "ええ……まさか再び現れるだなんて……"
90000130-79 = "信号？"
90000130-80 = "……うん。#n前にもあったものなんだけど……もう二度と現れないと思ってたのに……"
90000130-81 = "あの信号とは一体……？"
90000130-82 = "あれは――デカグラマトンの信号です。"
90000130-87 = "デカグラマトン……本体は廃墟水没地区の水面下に沈んだと聞きましたが。"
90000130-88 = "その通りです。朽ちた[ruby=肉体]自販機[/ruby]であの爆発に耐え抜いたとは思えません。アレが生存している確率は、ゼロと言ってもよいでしょう。"
90000130-89 = "……だというのに。"
90000130-90 = "信号の発信源、特定できたよ。"
90000130-91 = "この座標は……海をも凍らせる極寒の地、「氷海地域」ですね。"
90000130-92 = "自治区も存在しない破棄された地域のはずですが……#nこんなところにデカグラマトンが……？"
90000130-93 = "……確認します。"
90000130-98 = "……やはり。#n――この信号がデカグラマトンの可能性は低いです。"
90000130-99 = "一見似ていますが、真似たものに過ぎません。"
90000130-100 = "となると……。"
90000130-101 = "これは別の預言者……なのでしょうか。"
90000130-102 = "今までに特異現象捜査部が見つけた預言者は、ホドを含め4つ……#nあと6つは存在すると伺っています。"
90000130-103 = "ええ……5番目の預言者である可能性も、#nデカグラマトンを模した新しい敵である可能性もあります。"
90000130-104 = "どちらにせよ、直接確かめるまでは断言できません。"
90000130-105 = "ですが、1つだけ明確なのは――アレの正体が何であれ……。"
90000130-110 = "……。"
90000130-115 = "私たちを呼んでいる――ということです。"
90000130-117 = "次回;氷河（１）"
