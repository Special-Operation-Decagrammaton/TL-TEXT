[translation]
84308100300-12 = "Bem..."
84308100300-13 = "Primeiro, quero organizar a situação corretamente."
84308100300-19 = "Só para confirmar, mas..."
84308100300-20 = "Vocês estiveram aqui o tempo todo?"
84308100300-26 = "E-Ei, espera...!"
84308100300-30 = "Hm...? Ué."
84308100300-31 = "N-Não é a Neru-senpai...? Por que!?"
84308100300-35 = "Por que você está aqui... quer dizer, como você chegou até aqui!?"
84308100300-36 = "Primeiro, eu gostaria que respondessem à minha pergunta."
84308100300-37 = "Entendo. Então os invasores eram vocês."
84308100300-38 = "Invasores...!? Nós!?"
84308100300-39 = "Nós só estávamos no nosso estande!"
84308100300-41 = "Vocês sabiam que não podiam entrar depois do fechamento, não sabiam?"
84308100300-42 = "Incrível! Vocês superaram uma masmorra de alta dificuldade! A Seia-san é realmente a Rainha dos Ladrões!"
84308100300-44 = "(...Rainha dos Ladrões)"
84308100300-45 = "Não precisa se preocupar! A Alice e as outras só vieram para tornar o jogo ainda mais incrível!"
84308100300-46 = "Ora...?"
84308100300-48 = "Bem, é que... estávamos tentando aplicar um patch. Mas não tivemos tempo durante o horário de funcionamento."
84308100300-49 = "Ah, agora entendo."
84308100300-50 = "Então não invadiram após o fechamento, mas sim permaneceram aqui depois que fechou."
84308100300-51 = "Isso mesmo! Então não foi uma invasão!"
84308100300-52 = "(Acho que dá no mesmo que invadir...)"
84308100300-53 = "Entendido. Sendo assim, não tenho a intenção de culpá-las."
84308100300-54 = "Vou apenas relatar a situação. Decidir que tipo de julgamento tomar não é minha função, afinal."
84308100300-56 = "Um encontro inesperado com a Rainha dos Ladrões! A Alice ficou muito feliz!"
84308100300-57 = "...Espere um pouco. Você disse agora há pouco que ia \"relatar a situação\", não disse?"

84308100300-58 = "A Seia-san não é aluna do Millennium nem organizadora da EXPO... como você sabia que estávamos aqui?"
84308100300-59 = "E, acima de tudo, para quem você vai \"relatar\"...?"

84308100300-64 = "Perdão, minha explicação foi insuficiente."
84308100300-65 = "É para..."
84308100300-70 = "Mikamo Neru."
84308100300-76 = "...Ah."
84308100300-77 = "Ah!?"
84308100300-78 = "Neru-senpai...!?"
84308100300-80 = "Bem, com licença."
84308100300-84 = "Es-espere, Seia-san!"
84308100300-85 = "Ei, pense melhor sobre esse relatório, por favor...!!"
84308100300-87 = "Waaaaah!"
84308100300-89 = "Já é Game Over!!!"
