[translation]
84308100300-12 = "その……。"
84308100300-13 = "まずは状況を正しく整理したい。"
84308100300-19 = "念のための確認だが……。"
84308100300-20 = "君たちはずっとここにいたのか？"
84308100300-26 = "え、えっと……！"
84308100300-30 = "ん……？あれ。"
84308100300-31 = "ネ、ネル先輩じゃ、ない……？何で！？"
84308100300-35 = "何でここに……というか、どうやってここまで！？"
84308100300-36 = "まずは私の質問に答えて欲しいのだが。"
84308100300-37 = "なるほど。侵入者とは君たちだったのか。"
84308100300-38 = "侵入者……！？私たちが！？"
84308100300-39 = "自分のブースに居ただけだよ！"
84308100300-41 = "閉場してからは入っちゃダメだって知ってたでしょ？"
84308100300-42 = "すごいです！高難易度ダンジョンを突破したんですね！セイアさんはやっぱりシーフ王です！"
84308100300-44 = "（……シーフ王）"
84308100300-45 = "心配いりません！アリスたちは、ゲームをより素晴らしいものにするために来ただけなので！"
84308100300-46 = "ほう……？"
84308100300-48 = "えっと、その……パッチを当てようとしてたんです。でも開場中はなかなかタイミングが無くって。"
84308100300-49 = "ああ、得心がいったよ。"
84308100300-50 = "閉場後に侵入したのではなく、閉場後も残っていた、と。"
84308100300-51 = "そうそう！だから忍び込んだわけじゃないもん！"
84308100300-52 = "（忍び込んだようなものだと思うが……）"
84308100300-53 = "分かった。それならば、君たちを咎めるつもりはない。"
84308100300-54 = "私は状況を報告するだけに留めよう。どういった判断を下すのか、それを考えるのは私の役目ではないからね。"
84308100300-56 = "シーフ王との突発エンカウント！アリス、とても嬉しかったです！"
84308100300-57 = "……待ってください。今、「状況を報告する」と言いましたよね？"
84308100300-58 = "セイアさんはミレニアムの生徒でも、EXPOの主催者でもないはず……どうして私たちがここに居るって分かったんですか？"
84308100300-59 = "そもそも、誰に「報告」を……？"
84308100300-64 = "済まない、説明が不足していたね。"
84308100300-65 = "それは――"
84308100300-70 = "美甘ネルだ。"
84308100300-76 = "……えっ。"
84308100300-77 = "えっ！？"
84308100300-78 = "ネル先輩……っ！？"
84308100300-80 = "では、私はこれで。"
84308100300-84 = "まっ、待ってくださいセイアさん！"
84308100300-85 = "ちょっ、ちょっと報告は考え直して欲しいというか……！！"
84308100300-87 = "うわぁーん！"
84308100300-89 = "もうゲームオーバーです！！！"
