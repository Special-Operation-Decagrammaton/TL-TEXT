[translation]
12080-1 = "第8話;アビドス砂漠へ（３）"
12080-3 = "ふむ、ドローンにオートマタか……。"
12080-4 = "この辺り、何でかこういうのが良く集まるんだよね。"
12080-5 = "……っ！？皆さん、前方に何かあります！"
12080-6 = "砂埃で、まだはっきりと姿が見えないのですが……！"
12080-7 = "巨大な町……いえ工場、或いは駐屯地……？と、とにかく、ものすごい大きな施設のようなものが……？"
12080-8 = "……こんなところに施設？何かの見間違いじゃなくて？"
12080-9 = "今のところ、こっちからは干からびたオアシスしか見えてないけど……。"
12080-10 = "恐らく見間違いではないと思うのですが……とりあえず、肉眼で確認できるところまで進んでみてください！"
12080-12 = "……。"
12080-13 = "何これ……。"
12080-14 = "この張り巡らされてる有刺鉄線、優に数キロメートル先までありそう……。"
12080-15 = "工場……？石油ボーリング施設、ではなさそうな……一体何なのでしょう、この建物は……？"
12080-16 = "こんなの、昔は無かった……。"
12080-19 = "うわっ！？なになに！？"
12080-21 = "侵入者だ！"
12080-22 = "捕らえろ、逃がすな！"
12080-25 = "前方から、正体不明の兵力が攻撃を仕掛けてきています！"
12080-26 = "よく分からないけど、歓迎の挨拶なら返してあげた方が良さそうだね？"
12080-27 = "じゃ、派手に行こっか～！"
