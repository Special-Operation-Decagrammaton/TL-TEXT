[translation]
12080-1 = "Episódio 8: Rumo ao Deserto de Abydos (3)"
12080-3 = "Hmm, drones e autômatos..."
12080-4 = "Não sei por que, mas esse tipo de coisa costuma se reunir por aqui."
12080-5 = "……!? Pessoal, tem algo logo à frente!"
12080-6 = "A poeira está atrapalhando, então ainda não consigo ver direito...!"
12080-7 = "Uma cidade gigante... não, uma fábrica, ou talvez um posto avançado...? De qualquer forma, parece ser uma instalação enorme...?"
12080-8 = "……Uma instalação num lugar desses? Não está vendo coisas?"
12080-9 = "Pelo que vejo daqui, só tem um oásis seco..."
12080-10 = "Acho que não estou vendo coisas... De qualquer forma, vamos avançar até conseguirmos ver melhor!"
12080-12 = "……."
12080-13 = "O que é isso..."
12080-14 = "Esse arame farpado estendido parece ir por quilômetros..."
12080-15 = "Uma fábrica...? Não parece ser uma plataforma de petróleo... O que diabos é esse prédio...?"
12080-16 = "Isso não existia antigamente..."
12080-19 = "Uau!? O que foi isso!?"
12080-21 = "Intrusos!"
12080-22 = "Peguem eles, não deixem escapar!"
12080-25 = "Forças desconhecidas estão nos atacando pela frente!"
12080-26 = "Não sei bem o que são, mas acho que deveríamos retribuir as boas-vindas, não é?"
12080-27 = "Então, vamos fazer barulho!"
