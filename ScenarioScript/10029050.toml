[translation]
10029050-1 = "Episódio 5; A Railgun de Tokiwadai"
10029050-2 = "Ruínas Subterrâneas do Millennium"
10029050-4 = "Deveríamos ter descido bastante, mas..."
10029050-5 = "Não acha estranho? Não há nenhum sinal de pessoas por aqui."
10029050-6 = "……Tem certeza de que estamos no caminho certo?"
10029050-7 = "Sem problemas. Além disso, a falta de vestígios já era esperada."
10029050-8 = "É a prova de que ninguém coloca os olhos aqui há muito tempo."
10029050-9 = "……Ah, o que será que eu faço com a lata de cavala que deixei no freezer quando eu chegar em casa?"
10029050-10 = "Digo, aconteceu alguma coisa, Sensei?"
10029050-11 = "……Eh?"
10029050-12 = "O motivo de eu não me surpreender mesmo se entrarmos em combate, você diz?"
10029050-13 = "Hmm…… bem, é que……"
10029050-14 = "Existem várias coisas no nosso mundo também."
10029050-15 = "Não vou dizer nomes, mas tem gente que vive causando problemas, sabe?"
10029050-16 = "A Misaka-san é uma das sete \"Esper Nível 5\" que existem na Cidade Acadêmica, e é chamada de \"Railgun de Tokiwadai\"!"
10029050-18 = "……Hmm? O que você acabou de dizer……?"
10029050-19 = "[s1] \"Railgun……?\"\n[s2] \"Esper Nível 5……?\""
10029050-22 = "Não precisa se preocupar com isso. Não consigo usar meus poderes direito aqui de qualquer forma."
10029050-23 = "Mudando de assunto, Shokuhou, o que você acha que as pessoas são?"
10029050-24 = "Ora, do que você está falando?"
10029050-25 = "Não finja que não sabe! #nVocê deveria pelo menos parecer um pouco arrependida!"
10029050-26 = "Calma, calma, vocês duas. #nTem gente olhando, brigar aqui é um pouco……"
10029050-30 = "……Hm?"
10029050-31 = "Ei, vocês não ouviram um barulho de máquina funcionando agora……?"
10029050-35 = "……Ah, é esse som."
10029050-36 = "[s3] \"Será que é o que a Eimi mencionou…….\"\n[s4] \"Finalmente, eles apareceram.\""
10029050-39 = "Sim, acho que são os autômatos das ruínas."
10029050-40 = "……Análise de padrão, concluída."
10029050-41 = "Então, vamos começar o combate."
