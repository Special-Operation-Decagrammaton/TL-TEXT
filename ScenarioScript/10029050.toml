[translation]
10029050-1 = "第5話;常盤台の[ruby=レールガン]超電磁砲[/ruby]"
10029050-2 = "ミレニアム廃墟地下"
10029050-4 = "かなり下まで来たはずだけど……"
10029050-5 = "何か変じゃない？人の痕跡がないのよね。"
10029050-6 = "……これで本当に道は合ってるの？"
10029050-7 = "問題ないよ。それに、痕跡がないのは予想通り。"
10029050-8 = "長い間、誰の目にも触れていない証拠だから。"
10029050-9 = "……あっ、冷凍庫に入れっぱなしのサバ缶、帰ったら何に使おうかな。"
10029050-10 = "って、どうかしましたか、先生？"
10029050-11 = "……え？"
10029050-12 = "戦闘になっても驚かない理由、ですか？"
10029050-13 = "うーん……それは、まあ……"
10029050-14 = "色々とあるのよ、私たちの世界にも。"
10029050-15 = "誰とは言わないけど、よく問題を起こしてる人もいるしぃ？"
10029050-16 = "[ruby=みさか]御坂[/ruby]さんは、学園都市で七人しか存在しない「[ruby=レベル5]超能力者[/ruby]」で、「常盤台の[ruby=レールガン]超電磁砲[/ruby]」って呼ばれてるんですよ！"
10029050-18 = "……むむ？今、なんと言いましたか……？"
10029050-19 = "[s1] \"[ruby=レールガン]超電磁砲[/ruby]……？\"\n[s2] \"[ruby=レベル5]超能力者[/ruby]……？\""
10029050-22 = "気にしなくていいわよ。ここじゃ満足に能力使えないし。"
10029050-23 = "それよ[ruby=しょくほう]り食蜂、[/ruby]人を何だと思ってるの？"
10029050-24 = "あらぁ、何のことかしら？"
10029050-25 = "しらばっくれるんじゃないわよ！#n少しは悪びれたりするもんでしょうが！"
10029050-26 = "まあまあ、お二人とも。#n皆さんが見てますし、ここで喧嘩はちょっと……"
10029050-30 = "……ん？"
10029050-31 = "あれ、いま何か機械の動く音がしませんでした……？"
10029050-35 = "……あ、この音です。"
10029050-36 = "[s3] \"もしかして、エイミが言ってた……。\"\n[s4] \"いよいよ、お出ましだね。\""
10029050-39 = "うん、廃墟のオートマタだと思う。"
10029050-40 = "……パターン分析、完了。"
10029050-41 = "それじゃあ、戦闘開始。"
