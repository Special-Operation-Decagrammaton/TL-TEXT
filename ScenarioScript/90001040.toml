[translation]
90001040-1 = "第4話;邂逅・再び"
90001040-2 = "！！！"
90001040-3 = "ちょっと強すぎない……？"
90001040-4 = "先日とは段違いですね。"
90001040-5 = "まるで別物のような……！"
90001040-9 = "[ns1] （どうしよう……！？）\n[ns2] （脱出を優先しよう……！）"
90001040-16 = "ゲブラ、接近してきます！"
90001040-17 = "……。"
90001040-18 = "私が時間を稼ぎますので、その間に――"
90001040-19 = "それ、本当に悪癖だと思うよ。"
90001040-25 = "（しかし、この状況でヘリだけを離陸させられるでしょうか……？）"
90001040-26 = "（せめて先生だけでも、そして……）"
90001040-28 = "AMAS部隊――出撃。"
90001040-32 = "[ns] \"え……？\""
90001040-33 = "まさか！？"
90001040-39 = "――挨拶は非効率的だから省かせてもらうわ。"
90001040-43 = "今はそんなことをしている場合ではないでしょう？"
90001040-46 = "あっ────あなた──！？"
90001040-48 = "[ns] \"リオ！\""
90001040-49 = "目の前の敵に集中しなさい。"
90001040-50 = "5番目の預言者――ゲブラに関しては……対策があるの。#n支援するわ。"
90001040-51 = "……今は他に方法がありません、任せましたよリオ！"
90001040-52 = "[s] \"ありがとう！\""
