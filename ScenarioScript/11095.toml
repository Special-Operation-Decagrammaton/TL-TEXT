[translation]
11095-2 = "（キーンコーンカーンコーン）"
11095-3 = "……あ、定時だ。"
11095-4 = "今日の日当だとここまでね。あとは自分たちで何とかして。#nみんな、帰るわよ。"
11095-5 = "は、はあ！？ちょ、ちょっと待ってよ！！"
11095-8 = "終わったってさ。"
11095-9 = "帰りにそば屋でも寄ってく？"
11095-12 = "こらー！！ちょっ、どういうことよ！？ちょっと！帰っちゃダメ！！"
11095-13 = "……。"
11095-14 = "こりゃヤバいね。まさかこの時間まで決着がつかないなんて……アルちゃん？#nどうする？逃げる？"
11095-15 = "あ……うう……。"
11095-16 = "こ、これで終わったと思わないことね！アビドス！！"
11095-17 = "あはは、アルちゃん、完全に三流悪役のセリフじゃんそれ。"
11095-18 = "うるさい！逃げ……じゃなくて、退却するわよ！"
11095-21 = "待って！……あ、行っちゃいましたね。"
11095-22 = "うへ～逃げ足速いね、あの子たち。"
11095-23 = "……詳しいことはわかりませんが、敵兵力の退勤……いえ、退却を確認。"
11095-24 = "困りましたね……妙な便利屋にまで狙われるとは、先が思いやられます……#n一体何が起きているのでしょうか……。"
11095-25 = "まあ、少しずつ調べるとしよう。まずは社長のアルって子の身元から洗ってみたら。何か出てくるよ、きっと。"
11095-26 = "はい。皆さん、お疲れ様でした。一旦、帰還してください。"
11095-28 = "次回;手がかりを探して"
