[translation]
10046005-1 = "Prólogo; Uma escolha difícil"
10046005-21 = "[log]Resumo até aqui[/log]"
10046005-25 = "……Eu gostaria que você levasse esta mala para o Chá das Cinco ainda hoje."
10046005-26 = "Além disso, como a mala está em um local distante do Distrito Autônomo de Trinity……."
10046005-32 = "Hahahaha!"
10046005-37 = "Professor, por que você se deu ao trabalho de vir a um lugar tão remoto?"
10046005-38 = "Kinugawa Kasumi……?"
10046005-42 = "……Não é aquela criminosa procurada de Gehenna?"
10046005-45 = "(Após muitas reviravoltas, a mala acabou nas mãos da chefe do Departamento de Desenvolvimento de Fontes Termais — Kinugawa Kasumi)"
10046005-49 = "O que é isso, que combinação é essa――!?"
10046005-50 = "Este trem está indo para Gehenna, não está……? #nPor que uma integrante do Comitê de Justiça de Trinity está aqui!?"
10046005-51 = "E essa tal de Kasumi…… é aquela Kasumi……!?"
10046005-52 = "Professor, não me diga que você esteve com ela esse tempo todo……? #nEi…… diga que não é verdade!!"
10046005-55 = "(Com a invasão do Comitê Disciplinar de Gehenna, a situação tornou-se ainda mais caótica……)"
10046005-59 = "Em suma, a garota de Trinity e o professor não têm escolha a não ser obedecer às minhas ordens. #nEi, mocinha, o que me diz?"
10046005-60 = "Bem, observe só. Veja que tipo de escolha aquela garota fará…… #nPara recuperar esta mala, ela terá que atirar na Iori."
10046005-61 = "Ei? Do Comitê de Justiça…… hum, qual é o nome mesmo?"
10046005-62 = "……Ichika-chan?"
10046005-63 = "Não é? Se o conteúdo disso quebrar, vai ser um problema, não vai?"
10046005-69 = "…………."
10046005-70 = "Ah, chega!! Desde aquela hora, mala, mala, mala, já deu……!!!"
10046005-71 = "…………."
10046005-72 = "Ficar enrolando por causa de uma simples mala――"
10046005-82 = "……Oh?"
10046005-83 = "Ah! Ahahahaha!!"
10046005-84 = "Hahahaha!!!"
10046005-85 = "Viu só, eu não disse!?"
10046005-86 = "Nossa vitória já estava clara, não estava? Francamente."
10046005-87 = "Já que a mala está aqui, a mocinha nunca iria――"
10046005-95 = "……Guh!?"
10046005-102 = "…………Ah."
10046005-103 = "……Eu atirei."
10046005-105 = "(……Assim, o incidente do trem que agitou Trinity e Gehenna #nchegou ao fim, deixando um gosto amargo.)"
10046005-113 = "Eu vim porque você insistiu tanto que era urgente……."
10046005-114 = "Quem diria que o pedido de socorro viria da Ichika-chan."
10046005-115 = "……."
10046005-116 = "Usar o professor para me chamar, hein."
10046005-117 = "Não parece ser para me prender…… #nBem, então, qual é o motivo da sua visita?"
10046005-118 = "……."
10046005-119 = "……Por favor."
10046005-123 = "Hmm~?"
10046005-127 = "Eu preciso…… que você me ajude."
10046005-133 = "……Oh?"
10046005-134 = "Ha, haha! Hahahaha!!"
10046005-135 = "Que mudança de ventos é essa? #nNunca pensei que ouviria tais palavras da Ichika-chan."
10046005-136 = "Ah, fique tranquila. É claro que eu ajudarei. Não somos amigos?"
10046005-137 = "…………."
10046005-138 = "Mas…… você não é nada fraca, não é? #nAcho que, na época do trem, você resolveu tudo sozinha."
10046005-139 = "Comparada a você, eu sou apenas uma cidadã comum, bondosa e frágil. #nDependendo da situação, talvez eu não tenha força suficiente…… quem sabe?"
10046005-140 = "……Sobre aquilo――"
10046005-141 = "――Eu estava errado."
10046005-142 = "Por isso, quero que me perdoe."
10046005-143 = "Entendo, foi assim que soou para você."
10046005-144 = "……Nós somos parecidos. Naquele trem, eu disse exatamente isso."
10046005-148 = "Isso é algo sobre mim, mas…… #npor menor que seja o ressentimento, eu nunca o esqueço."
10046005-149 = "Eu realmente pensei que você me odiasse do fundo do coração."
10046005-150 = "…………."
10046005-151 = "Ora, ora, ora? Parece que eu não estava enganado! #nSim, esse é o olhar. Esse olhar cheio de hostilidade contra mim."
10046005-152 = "…………."
10046005-153 = "Realmente interessante. Mesmo assim, você vai se curvar diante de mim? #nBem, afinal, para quê?"
10046005-157 = "Deixe-me ouvir os detalhes."
10046005-160 = "#video;10046"
