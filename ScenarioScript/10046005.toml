[translation]
10046005-1 = "プロローグ;苦渋の選択"
10046005-21 = "[log]これまでのあらすじ[/log]"
10046005-25 = "……カバンを今日中にティーパーティーに持って行ってほしいのです。"
10046005-26 = "また、カバンはトリニティ自治区から離れた場所にあるため……。"
10046005-32 = "ハーハッハッハッハ！"
10046005-37 = "先生は何用で、わざわざこんな僻地に来たんだ？"
10046005-38 = "[ruby=きぬがわ]鬼怒川[/ruby]、カスミ……？"
10046005-42 = "……ゲヘナの指名手配犯じゃないっすか。"
10046005-45 = "（紆余曲折の末、カバンは温泉開発部の部長――鬼怒川カスミの手に渡り）"
10046005-49 = "何なんだよ、この組み合わせは――！？"
10046005-50 = "この列車、ゲヘナ行きだろ……？#n何でトリニティの正義実現委員がここにいるんだよ！？"
10046005-51 = "それにカスミって……あのカスミか……！？"
10046005-52 = "まさか先生、ずっとアイツと一緒にいたんじゃないよな……？#nなあ……違うと言ってくれ！！"
10046005-55 = "（ゲヘナ風紀委員会の乱入で、状況はさらに混迷を極め……）"
10046005-59 = "つまりトリニティの子と先生は、私の言いなりになるしかない。#nなあ、そこのお嬢ちゃん？"
10046005-60 = "まあ、見てみなって。あのお嬢ちゃんがどんな選択をするか……#nこのカバンを取り戻すためにイオリちゃんを撃つはずさ。"
10046005-61 = "なあ？正義実現委員の……ええと。"
10046005-62 = "……ニカちゃん？"
10046005-63 = "そうだろ？この中身、割れたらまずいんだろう？"
10046005-69 = "…………。"
10046005-70 = "あーーっもう！！さっきからカバン、カバン、カバンってもう……！！！"
10046005-71 = "…………。"
10046005-72 = "たかがカバン1つでぐだぐだと――"
10046005-82 = "……おっ？"
10046005-83 = "あは！あはははっ！！"
10046005-84 = "ハーハッハッハッハ！！！"
10046005-85 = "ほら、だから言っただろう！？"
10046005-86 = "こちらの勝ちは目に見えていたじゃないか～まったく。"
10046005-87 = "お嬢ちゃんは、こちらにカバンがある以上絶対――"
10046005-95 = "……ごふっ！？"
10046005-102 = "…………あ。"
10046005-103 = "……撃っちゃったっす。"
10046005-105 = "（……こうしてトリニティとゲヘナを騒がせた列車事件は、#n苦い後味を残して幕を下ろしたのだった）"
10046005-113 = "どうしても！と言うから来てみれば……。"
10046005-114 = "まさか、[ruby=・]イ[/ruby][ruby=・]チ[/ruby][ruby=・]カ[/ruby]ちゃんからのラブコールだったとは。"
10046005-115 = "……。"
10046005-116 = "先生を動かしてまで、私を呼びだすとはねぇ。"
10046005-117 = "私を捕らえるため……ではなさそうだ。#nはてさて、一体どういうご用向きかな？"
10046005-118 = "……。"
10046005-119 = "……っす。"
10046005-123 = "ん～？"
10046005-127 = "助けて……ほしいっす。"
10046005-133 = "……ほぅ？"
10046005-134 = "は、ははっ！ハーハッハッハッハ！！"
10046005-135 = "どういう風の吹き回しだ？#nあのイチカちゃんからそんな言葉を聞けるだなんて。"
10046005-136 = "ああ、安心してくれ。もちろん助けるとも。私たちの仲じゃあないか。"
10046005-137 = "…………。"
10046005-138 = "だが……お嬢ちゃんは決して非力ではないだろう？#n列車の時だって、一人ですべて片付けていたと思うのだが。"
10046005-139 = "それに比べて私は、善良でか弱い一般人なものでね。#n場合によっては～力不足かも……分からんなぁ？"
10046005-140 = "……あの時のことは――"
10046005-141 = "――私が悪かったっす。"
10046005-142 = "だから、許してほしいっす。"
10046005-143 = "なるほど、そう聞こえてしまったか。"
10046005-144 = "……我々は似ている。あの列車で、私はそう言ったはずだ。"
10046005-148 = "これは私の話なんだが……。#nたとえどれほど小さな恨みであっても、決して忘れはしない。"
10046005-149 = "君には心底嫌われているものだとばかり思っていたのだがね。"
10046005-150 = "…………。"
10046005-151 = "おやおやおや？勘違いではなかったようだ！#nそう、その眼だ。私への[ruby=てきがいしん]敵愾心[/ruby]に満ちた、その眼。"
10046005-152 = "…………。"
10046005-153 = "実に面白い。それでも私に頭を下げるのかね？#nはてさて一体何のために？"
10046005-157 = "詳しく、聞かせてもらおうじゃないか。"
10046005-160 = "#video;10046"
