[translation]
2002903-1 = "Leitura de mentes no mar de verão"
2002903-4 = "Quarto de hotel"
2002903-5 = "（Consegui dormir profundamente depois de muito tempo）"
2002903-6 = "（Ao verificar o relógio, para minha surpresa, ainda era de manhã）"
2002903-7 = "[ns] \"Bocejo... O que eu deveria fazer hoje...?\""
2002903-14 = "（No momento em que abri a porta para sair do quarto...）"
2002903-15 = "Corredor do hotel"
2002903-16 = "Ah, Sensei."
2002903-17 = "Bom dia. Fufu, você ainda parece estar com sono, não é?"
2002903-18 = "Você vai sair para algum lugar hoje?"
2002903-19 = "[s1] \"É que eu ainda não decidi nada.\"\n[s2] \"O que eu estava planejando fazer mesmo...?\""
2002903-22 = "Ah, entendo. ...Sim, compreendido."
2002903-23 = "[s] \"O que você entendeu!?\""
2002903-24 = "Então, agora... que tal eu tentar adivinhar o que está na sua mente, Sensei?"
2002903-25 = "[s] \"Você vai me mostrar a leitura de mentes da Mimori!\""
2002903-26 = "E-eu fico um pouco envergonhada quando você fica tão feliz assim..."
2002903-31 = "[ns3] \"Mas desta vez, acho que não vai ser fácil.\"\n[ns4] \"Eu realmente acabei de acordar.\"\n[ns5] \"Nem eu mesmo sei o que quero fazer!\""
2002903-35 = "Fufu, eu entendo como você se sente, Sensei. #nÀs vezes temos dias assim, não é?"
2002903-36 = "Mas, eu diria que há um prazer especial em momentos como esse."
2002903-37 = "Você acabou de acordar e saiu do quarto agora pouco..."
2002903-38 = "Sua consciência ainda não está clara por causa do sono e você está meio distraído, não é?"
2002903-39 = "[s] \"O-oh...?\""
2002903-40 = "Além disso... seu corpo está pesado e você está com preguiça de sair."
2002903-41 = "Mas, ao mesmo tempo, sente que seria um desperdício passar o dia todo no hotel."
2002903-42 = "Fufu, o que me diz?"
2002903-43 = "[s6] \"Com certeza, é exatamente como a Mimori disse...!\"\n[s7] \"...Eu me rendo.\""
2002903-46 = "Fufufu, eu venci, não é?"
2002903-47 = "Então, como recompensa, você não gostaria de me fazer companhia hoje?"
2002903-48 = "[s] \"Na verdade, eu adoraria!\""
2002903-57 = "Aqui está, Sensei. Uma limonada."
2002903-58 = "É rica em vitaminas e tem um sabor refrescante."
2002903-59 = "Ora, tem um pedaço de limão no canto da sua boca... #nEspere um momento, por favor."
2002903-66 = "...Pronto, agora está tudo bem. O que achou da limonada?"
2002903-67 = "[s8] \"Eu estava justamente com sede.\"\n[s9] \"A propósito, era isso que você queria fazer, Mimori?\""
2002903-70 = "Outros pedidos, você diz...?"
2002903-71 = "Fufu. Para mim, isso já é uma recompensa."
2002903-72 = "[s10] \"Tudo bem, mas como você sabia o que eu estava pensando?\"\n[s11] \"Será que é algum tipo de poder sobrenatural?\""
2002903-75 = "Ah... sobre isso?"
2002903-76 = "..."
2002903-77 = "Eu não sou capaz de usar nenhum tipo de poder sobrenatural."
2002903-78 = "É que seu cabelo estava bagunçado, então presumi que você tinha acabado de acordar."
2002903-79 = "Quando perguntei se você ia ao mar, você respondeu que não tinha planos, lembra?"
2002903-80 = "Você parecia não ter lavado o rosto ainda e, ao observar sua expressão, percebi que sua consciência não estava totalmente desperta."
2002903-84 = "[ns12] \"Vou me esforçar um pouco mais...\"\n[ns13] \"Parece mais uma dedução do que uma leitura de mentes.\""
2002903-87 = "Fufu, como esperado do Sensei."
2002903-88 = "Na verdade, a leitura de mentes e a dedução têm muitas coisas em comum."
2002903-89 = "Sim? #nVocê sente que minha leitura de mentes tem algo além de uma simples dedução?"
2002903-90 = "I-isso não é verdade...! Sensei, você é realmente muito bom em fazer piadas."
2002903-91 = "Vamos, Sensei! Vá lavar o rosto logo."
2002903-92 = "Já que viemos até o mar, seria um desperdício passar o tempo todo no hotel, não acha?"
2002903-94 = "(Terminei de me arrumar e fui em direção ao mar junto com a Mimori, que parecia estar tentando disfarçar algo)"
