[translation]
2002903-1 = "夏の海の読心術"
2002903-4 = "ホテルの部屋"
2002903-5 = "（久しぶりに、ぐっすり睡眠が取れた）"
2002903-6 = "（時計を確認すると、驚いたことにまだ午前中だった）"
2002903-7 = "[ns] \"ふぁあ……今日は何をしようかな……？\""
2002903-14 = "（とりあえず部屋を出ようと、ドアを開けた瞬間……）"
2002903-15 = "ホテル・廊下"
2002903-16 = "あ、先生。"
2002903-17 = "おはようございます。ふふっ、まだ眠そうですね？"
2002903-18 = "今日は、どこかにお出かけですか？"
2002903-19 = "[s1] \"それが、まだ何も決めてないんだよね。\"\n[s2] \"何しようとしてたんだっけ……？\""
2002903-22 = "ああ、なるほど。……はい、分かりました。"
2002903-23 = "[s] \"何が！？\""
2002903-24 = "それでは今から……先生のお心を当ててみましょうか？"
2002903-25 = "[s] \"ミモリの読心術を見せてくれるんだね！\""
2002903-26 = "そ、そんなに喜ばれると……少し、恥ずかしいです。"
2002903-31 = "[ns3] \"でも今回は、簡単じゃないと思うよ。\"\n[ns4] \"本当に起きたばっかりだからね。\"\n[ns5] \"自分でも何をしたいのか分かってないんだ！\""
2002903-35 = "ふふっ、先生のお気持ちも分かります。#nたまにありますよね、そういう日も。"
2002903-36 = "ですが、そういった時こその楽しみがあると言いますか。"
2002903-37 = "先生は起きてから、すぐお部屋から出てきたばかり……"
2002903-38 = "まだ寝起きで意識がハッキリせずに、ぼーっとしていますね？"
2002903-39 = "[s] \"お、おお……？\""
2002903-40 = "それに……身体も重く、出かけるのが億劫でしょう。"
2002903-41 = "かといって、ホテルで過ごすのはもったいなく感じている、と。"
2002903-42 = "ふふっ、いかがでしょうか？"
2002903-43 = "[s6] \"たしかに、ミモリの言葉通りだよ……！\"\n[s7] \"……参りました。\""
2002903-46 = "ふふふっ、私の勝ちですね？"
2002903-47 = "では、ご褒美に今日は私に付き合っていただきませんか？"
2002903-48 = "[s] \"むしろ、喜んで付き合うよ！\""
2002903-57 = "どうぞ、先生。レモネードです。"
2002903-58 = "ビタミンも豊富ですし、味わいもスッキリしていますよ。"
2002903-59 = "あら、口元にレモンの果肉が……#n少々お待ちくださいね。"
2002903-66 = "……はい、これで大丈夫です。レモネードはいかがでしたか？"
2002903-67 = "[s8] \"ちょうど喉が乾いてたんだ。\"\n[s9] \"ところで、これがミモリのしたかったことなの？\""
2002903-70 = "他のお願い事、ですか……？"
2002903-71 = "ふふっ。私にとっては、これがご褒美ですから。"
2002903-72 = "[s10] \"なら良いんだけど、どうして私の考えが分かったの？\"\n[s11] \"やっぱり、超能力とか？\""
2002903-75 = "あ……そのことですね？"
2002903-76 = "……。"
2002903-77 = "私は超能力のようなものが使えるわけではありません。"
2002903-78 = "ただ、先生は髪が乱れてましたので、おそらく寝起きだと考えました。"
2002903-79 = "その後の質問で海に行くのかと聞いたところ、そういった予定はないとお答えくださいましたよね？"
2002903-80 = "まだ顔も洗っていないご様子でしたし、表情を覗いても意識がハッキリしていませんでしたから。"
2002903-84 = "[ns12] \"もう少し、頑張ろうと思います……。\"\n[ns13] \"読心術というより、推理みたいだね。\""
2002903-87 = "ふふ、さすが先生です。"
2002903-88 = "実は、読心術と推理は似ている部分が多いんです。"
2002903-89 = "はい？#n私の読心術には、推理以上の何かがあるような気がするのですか？"
2002903-90 = "そ、そんなことは……！先生ったら、本当に冗談がお上手ですね。"
2002903-91 = "さあ、先生！早くお顔を洗ってきてください。"
2002903-92 = "せっかく海まで来たのに、ホテルで過ごすのはもったいないですよ？"
2002903-94 = "（支度を済ませ、何か誤魔化そうとしているミモリと一緒に海へ向かった）"
