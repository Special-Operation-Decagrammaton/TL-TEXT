[translation]
2004202-1 = "落ち葉掃除"
2004202-2 = "ミレニアム・スタディーエリア"
2004202-3 = "（週末、落ち葉掃除をすることになったマキを手伝うため、ミレニアムを訪れた）"
2004202-11 = "先生、来てくれてありがとう！"
2004202-12 = "さすがに一人じゃ終わりそうになくってさ。"
2004202-13 = "[s1] \"ずっとは手伝えないけど……。\"\n[s2] \"お昼頃までは時間があったから。\""
2004202-16 = "大丈夫、来てくれただけでも嬉しいよ。"
2004202-17 = "ヴェリタスの先輩たちは、ちっとも手伝ってくれなかったの。"
2004202-18 = "チヒロ先輩は、自分でやらないと反省にならないとか言ってたし……。"
2004202-19 = "ハレ先輩とコタマ先輩は、寒いから無理って。"
2004202-20 = "[s] \"最近、急に寒くなったような。\""
2004202-22 = "[ns] \"今日はマキも厚着だね。\""
2004202-23 = "うん、風邪を引いたら大変だもん。"
2004202-24 = "ちょっと前まで汗が止まらないくらい暑かったのに、#nすっかり寒くなっちゃったね。"
2004202-25 = "葉っぱも全部落ちて、もう冬って感じだし、時間が経つのって早いなぁ。"
2004202-26 = "あっ、のんびり話してる場合じゃなかった！"
2004202-27 = "そろそろ始めよっか、先生。"
2004202-33 = "（その後、マキと一緒に落ち葉掃除をした）"
2004202-35 = "（約1時間後……）"
2004202-37 = "思ったよりすぐ片づいたね。"
2004202-41 = "見て、先生！#n落ち葉があたしの身長くらい積もってる！"
2004202-42 = "ふふっ、何かの作品みたい。"
2004202-43 = "そういえば、紅葉って不思議だよね。"
2004202-44 = "自然に存在するものって大体彩度が低いのに、#n遠くからでもはっきり分かるような色をしてるでしょ？"
2004202-45 = "動物もこれくらいカラフルだったら、世界はもっと鮮やかになるのに……。"
2004202-46 = "どうして、植物も動物も目立たない色が多いんだろ？"
2004202-47 = "[s] \"目立つと危ないからじゃない？\""
2004202-48 = "なんで……？"
2004202-49 = "[s3] \"敵に見つかりやすいからね。\"\n[s4] \"取られたり、食べられちゃったりするでしょ？\""
2004202-52 = "たしかに、言われてみれば……。"
2004202-53 = "グラフィティとかハッキングをする時、派手なほど反応が大きいんだよね。#nグラフィティの上から落書きされてたり、匿名のハッカーから攻撃されたり……。"
2004202-54 = "目立つ色には、人の競争心を煽る効果でもあるのかな。"
2004202-55 = "[s5] \"必ずしも、そうとは限らないけどね。\"\n[s6] \"花とか孔雀の羽の場合は違うから。\""
2004202-58 = "そっか……#n色を隠したままじゃ、良い出会いもなくなっちゃうんだ。"
2004202-59 = "あたしもグラフィティを描いてきて、#n嫌な人とも会ってきたけど、良い人のほうが多かったし。"
2004202-60 = "グラフィティをしてなかったら、#nヴェリタスの先輩たちとも出会えなかったし……。"
2004202-61 = "[s] \"私はマキの髪色もきれいだと思うよ。\""
2004202-62 = "えっ……？"
2004202-63 = "[ns7] \"人混みの中で、マキの髪が見えると……。\"\n[ns8] \"元気がもらえるんだ。\"\n[ns9] \"もちろん、グラフィティからもね。\""
2004202-67 = "それって……。"
2004202-68 = "いや、意味は伝わってるけど、その……うわっ！？"
2004202-73 = "[ns] \"マキ、大丈夫？\""
2004202-75 = "……う、うん。"
2004202-76 = "でも、せっかく掃除したのにやり直しかぁ。"
2004202-77 = "[s10] \"すぐに片づけられると思うよ。\"\n[s11] \"[ruby=赤色]紅葉[/ruby]は見つけやすいからね。\""
2004202-83 = "……うん。"
2004202-84 = "ありがとう、先生。"
