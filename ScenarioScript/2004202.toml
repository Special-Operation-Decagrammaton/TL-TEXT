[translation]
2004202-1 = "Limpeza de folhas secas"
2004202-2 = "Área de Estudos do Millennium"
2004202-3 = "（Visitei o Millennium para ajudar Maki, que acabou ficando responsável pela limpeza das folhas secas no fim de semana）"
2004202-11 = "Professor, obrigado por vir!"
2004202-12 = "Sinceramente, eu não ia conseguir terminar isso sozinha."
2004202-13 = "[s1] \"Não posso ajudar por muito tempo, mas...\"\n[s2] \"Eu tinha um tempo livre até a hora do almoço.\""
2004202-16 = "Tudo bem, só de você ter vindo eu já fico feliz."
2004202-17 = "As veteranas da Veritas não me ajudaram nem um pouco."
2004202-18 = "A veterana Chihiro disse que se eu não fizesse sozinha, não serviria como reflexão..."
2004202-19 = "E a Hare e a Kotama disseram que não podiam porque estava muito frio."
2004202-20 = "[s] \"Parece que esfriou de repente ultimamente.\""
2004202-22 = "[ns] \"Você também está bem agasalhada hoje, Maki.\""
2004202-23 = "Sim, seria um problema se eu pegasse um resfriado."
2004202-24 = "Até pouco tempo atrás estava tão quente que eu não parava de suar, mas agora#nficou bem frio, né."
2004202-25 = "As folhas caíram todas, parece que o inverno chegou. O tempo passa rápido, não é?"
2004202-26 = "Ah, não é hora de ficar conversando à toa!"
2004202-27 = "Vamos começar logo, Professor."
2004202-33 = "（Depois disso, limpei as folhas secas junto com a Maki）"
2004202-35 = "（Cerca de 1 hora depois...）"
2004202-37 = "Terminamos mais rápido do que eu pensava."
2004202-41 = "Olha só, Professor!#nAs folhas secas estão acumuladas até a altura da minha cintura!"
2004202-42 = "Hehe, parece até uma obra de arte."
2004202-43 = "Falando nisso, as cores do outono são misteriosas, né?"
2004202-44 = "As coisas que existem na natureza geralmente têm cores pouco saturadas, mas#nelas têm cores que dá para ver claramente mesmo de longe, né?"
2004202-45 = "Se os animais fossem tão coloridos assim, o mundo seria muito mais vibrante..."
2004202-46 = "Por que será que tantas plantas e animais têm cores tão discretas?"
2004202-47 = "[s] \"Não é porque seria perigoso se fossem chamativos?\""
2004202-48 = "Por que...?"
2004202-49 = "[s3] \"Porque seria mais fácil para os inimigos te encontrarem.\"\n[s4] \"Eles acabariam sendo capturados ou devorados, não é?\""
2004202-52 = "É verdade, agora que você falou..."
2004202-53 = "Quando eu faço grafite ou hackeio algo, quanto mais chamativo, maior a reação. #nAlguém picha por cima do meu grafite, ou recebo ataques de hackers anônimos..."
2004202-54 = "Será que cores chamativas têm o efeito de atiçar o espírito competitivo das pessoas?"
2004202-55 = "[s5] \"Nem sempre é assim, na verdade.\"\n[s6] \"No caso das flores ou das penas do pavão, é diferente.\""
2004202-58 = "Entendi...#nSe eu escondesse minhas cores, eu perderia a chance de bons encontros."
2004202-59 = "Eu também fiz grafites e acabei conhecendo pessoas desagradáveis, mas conheci muito mais gente boa."
2004202-60 = "Se eu não tivesse feito grafite,#neu nem teria conhecido as veteranas da Veritas..."
2004202-61 = "[s] \"Eu acho a cor do seu cabelo muito bonita, Maki.\""
2004202-62 = "Hã...?"
2004202-63 = "[ns7] \"Quando vejo o seu cabelo no meio da multidão...\"\n[ns8] \"Eu me sinto mais animado.\"\n[ns9] \"Claro, e com os seus grafites também.\""
2004202-67 = "Isso é..."
2004202-68 = "Não, eu entendi o que você quis dizer, mas... ué!?"
2004202-73 = "[ns] \"Maki, você está bem?\""
2004202-75 = "......S-sim."
2004202-76 = "Mas que droga, a gente tinha acabado de limpar e agora vamos ter que fazer tudo de novo."
2004202-77 = "[s10] \"Acho que conseguimos limpar rápido.\"\n[s11] \"Afinal, as folhas vermelhas são fáceis de achar.\""
2004202-83 = "......Sim."
2004202-84 = "Obrigada, Professor."
