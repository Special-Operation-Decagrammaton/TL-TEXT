[translation]
11100-2 = "Episódio 10; Procurando por pistas"
11100-3 = "Área residencial de Abydos"
11100-6 = "Ah, Senseia. bom dia."
11100-7 = "foto? Aonde você vai tão cedo?"
11100-8 = "Bom, hoje é dia de pagar os juros...Tenho muitos preparativos a fazer."
11100-9 = "Tenho que ir para a escola cedo e me preparar para o pagamento, e tenho que reconsiderar meus planos futuros..."
11100-10 = "Ah, agora que penso nisso. Encontrei informações sobre pessoas de ontem.#nVocê poderia verificar os detalhes na escola mais tarde?"

11100-11 = "Eu era um estudante na Gehenna Academy."
11100-13 = "Ah, é o sensei! Ei!"
11100-15 = "O que, o que! ?"
11100-16 = "Jajaan! Ei! What a coincidence to meet in a place like this!"
11100-17 = "(cheirando) Ahaha! sim? pesado? doloroso? Basta ter um pouco de paciência, Sensei."
11100-20 = "O-o que você está fazendo! Por favor, saia!"
11100-21 = "Ah, não puxe."
11100-22 = "...Achei que fosse alguém, mas é a garota de óculos de Abydos, certo?"
11100-23 = "Ei, nos conhecemos na loja de ramen ontem, certo?"
11100-24 = "Nós nos conhecemos na invasão da escola depois! O que você quer dizer? #nDe repente agindo de forma familiar..."
11100-25 = "Além disso, não sou uma garota de óculos, sou Ayane!"
11100-26 = "sim? Afinal, não gostamos particularmente de garotas de óculos."
11100-27 = "No entanto, é um trabalho que assumo como parte das atividades do meu clube. Não é normal ser amigo fora do trabalho?"
11100-28 = "Espere, você está tentando diferenciar entre público e privado agora? ?"
11100-29 = "Está tudo bem. Além disso, o sensei da “placa de Petri” não é só para vocês, certo? Certo, Sensei?"
11100-30 = "[s]\"Eu ficaria feliz se você pudesse viver sem brigar.\""
11100-31 = "Haha, acho que isso é impossível. Isso também é trabalho. Al-chan está muito motivada e ficará brava se eu me esforçar demais."
11100-32 = "Bem, venha visitar meu faz-tudo algum dia, Sensei. Tenho certeza que Al-chan e todos os outros ficarão felizes."
11100-33 = "Tchau, então. Ayane-chan estará aqui novamente na próxima vez."
11100-34 = "Nunca haverá outro momento! ! Da próxima vez que te ver, vou atirar em você na hora!"
11100-35 = "Sim, sim."
11100-37 = "Suspiro…suspiro…."
11100-38 = "O que é essa pessoa...!"
11100-40 = "...Desculpe por deixar você esperando. Após a aplicação de várias taxas de juros variáveis, o valor dos juros é de 7.883.250 ienes."
11100-41 = "Todos os pagamentos foram feitos em dinheiro e pronto."
11100-42 = "Obrigado por fazer negócios com a Kaiser Loan. Esperamos seu apoio contínuo no próximo mês."
11100-44 = "(Brororo...)"
11100-46 = "……."
11100-47 = "……."
11100-48 = "Bem, consegui passar este mês."
11100-49 = "...Quanto tempo até que seja pago?"
11100-50 = "Como o reembolso é de 309 anos...se incluir o valor até agora..."
11100-51 = "Você não precisa me dizer, seria ainda mais estressante se você me contasse os números exatos..."
11100-52 = "De qualquer maneira, não posso pagar até morrer! Não adianta calcular! !"
11100-53 = "……."
11100-54 = "A propósito, por que o Kaiser Loan só aceita dinheiro? #nEu até me dei ao trabalho de arranjar um veículo para transporte de dinheiro..."
11100-55 = "……."
11100-57 = "Shiroko-senpai, você não pode atacar aquele carro."
11100-58 = "Sim, eu sei."
11100-59 = "Nem planeje!"
11100-60 = "Sim……."
11100-61 = "Bem, o problema em questão deve ser resolvido primeiro."
11100-62 = "De qualquer forma, vamos voltar para a sala de aula."
11100-64 = "Parece que todos estão aqui, então vamos começar. Primeiramente, gostaria de falar sobre dois casos."
11100-65 = "Primeiro, sobre o ataque da noite passada."
11100-67 = "O que nos atingiu foi um clube chamado \"Handyman 68\"."

11100-68 = "Na Gehenna, os alunos são conhecidos por serem bastante perigosos e terem mau comportamento."
11100-69 = "Um faz-tudo é um prestador de serviços que faz tudo o que lhe é pedido."
11100-70 = "O nome do líder do clube é Al."
11100-71 = "Ele parece se autodenominar o “presidente”."
11100-75 = "Há três membros abaixo dela, cada um com o título de gerente de escritório, gerente de seção e funcionário regular."
11100-78 = "Nossa, é sério."
11100-79 = "Foi o presidente ☆ Isso é incrível!"
11100-80 = "Não, é apenas uma coisa “autoproclamada”…e agora parece que eles estão em alguma área de Abydos. Nos encontramos novamente esta manhã..."
11100-81 = "É permitido iniciar um negócio na Gehenna Academy?"
11100-82 = "Acho que não... mas acho que ele começou seu próprio negócio sozinho."
11100-83 = "Ah... isso significa que é contra as regras da escola. Eles não pareciam crianças más, mas..."
11100-84 = "Não, parece que ele tem sido extremamente delinquente até agora e é tratado como uma criança problemática até na Gehenna."
11100-85 = "Uma organização tão perigosa tem como alvo a nossa escola! Eu tenho que ter mais cuidado!"
11100-86 = "Da próxima vez vou pegá-lo e interrogá-lo."
11100-87 = "Sim, se você tiver a chance, por favor..."
11100-88 = "A propósito, Ayane-chan, aconteceu alguma coisa? Sinto uma quantidade extraordinária de ressentimento..."
11100-89 = "...Não, nada em particular. A seguir, vamos falar sobre o mentor da gangue de capacetes que atacou Celica!"
11100-90 = "Como resultado da análise dos fragmentos da arma estratégica obtidos na batalha outro dia...#nDescobriu-se que se trata de um número de modelo que não está mais sendo comercializado."
11100-91 = "Isso significa que não está mais em produção?"
11100-92 = "Eu me pergunto como eles conseguiram isso."
11100-93 = "A única forma de obter números de modelos cuja produção foi descontinuada é através do “mercado negro” da Kivotos."
11100-94 = "O mercado negro... não é um lugar muito perigoso?"
11100-95 = "isso mesmo. Ouvi dizer que há grupos de alunos que abandonaram os estudos, tiraram licença ou foram expulsos da escola por vários motivos, e também há muitas atividades de clube não sancionadas que não foram aprovadas pelo Conselho Estudantil da Federação."
11100-96 = "Gosta do faz-tudo 68?"
11100-97 = "sim. Também ouvi dizer que o Handyman 68 causou alguns problemas no mercado negro."
11100-98 = "Então esse é o ponto importante!"
11100-99 = "sim. Uma maneira pode ser procurar uma relação entre dois eventos."
11100-100 = "Ok, então está decidido. Vamos explorar o mercado negro."
11100-101 = "Pode haver algumas pistas inesperadas."
11100-103 = "Próxima vez; Para o mercado negro (1)"
