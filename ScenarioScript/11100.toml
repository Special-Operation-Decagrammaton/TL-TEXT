[translation]
11100-2 = "第10話;手がかりを探して"
11100-3 = "アビドス・住宅街"
11100-6 = "あ、先生。おはようございます。"
11100-7 = "え？こんな朝早くからどこへ、ですか？"
11100-8 = "えっと、今日は利息を返済する日でして……色々と準備があるんです。"
11100-9 = "早めに登校して返済の準備もしないとですし、今後の計画も見直さないとなので……。"
11100-10 = "あ、そういえば。昨日の方々の情報が見つかりました。#n後ほど学校で詳細をご確認いただけますか？"
11100-11 = "ゲヘナ学園の生徒だったのですが、"
11100-13 = "あっ、先生じゃん！おっはよー！"
11100-15 = "な、ななっ！？"
11100-16 = "じゃじゃーん！どもどもー！こんなところで会うなんて、偶然だね！"
11100-17 = "（すりすり）あははー！ん？重い？苦しい？ちょっとだけガマンだよー、先生。"
11100-20 = "な、何してるんですか！離れてください！"
11100-21 = "おっと、引っ張らないでよー。"
11100-22 = "……誰かと思いきや、アビドスのメガネっ娘ちゃんじゃーん？"
11100-23 = "おっはよー、昨日ラーメン屋で会ったよね？"
11100-24 = "その後の学校の襲撃でもお会いしました！どういうことですか？#nいきなりなれなれしく振舞って……。"
11100-25 = "それに、メガネっ娘じゃなくて、アヤネです！"
11100-26 = "ん？だって私たち、別にメガネっ娘ちゃんたちのことが嫌いなわけじゃないし。"
11100-27 = "ただ、部活で請け負ってる仕事だからさ。仕事以外の時は仲良くしたっていいじゃん？"
11100-28 = "いっ、今さら公私を区別しようということですか！？"
11100-29 = "別にいいじゃん。それに「シャーレ」の先生は、あんたたちだけのモンじゃないでしょ？だよね、先生？"
11100-30 = "[s]\"ケンカしないで仲良くしてくれると嬉しいな。\""
11100-31 = "あはは、それはムリかなー。こっちも仕事だからね。アルちゃんがモチベ高くてさ、てきとうにやると怒られちゃうから。"
11100-32 = "ま、いつかうちの便利屋に遊びにおいでよ、先生。アルちゃんもみんなも、きっと喜ぶからさ。"
11100-33 = "そんじゃ、バイバ～イ。アヤネちゃんもまた今度ね。"
11100-34 = "また今度なんてありません！！今度会ったらその場で撃ちます！"
11100-35 = "はいはーい。"
11100-37 = "はあ……はあ……。"
11100-38 = "何ですか、あの人は……！"
11100-40 = "……お待たせしました。変動金利等を諸々適用し、利息は788万3250円ですね。"
11100-41 = "全て現金でお支払いいただきました、以上となります。"
11100-42 = "カイザーローンとお取引いただき、毎度ありがとうございます。来月もよろしくお願いいたします。"
11100-44 = "（ブロロロ……）"
11100-46 = "……。"
11100-47 = "……。"
11100-48 = "はぁ、今月も何とか乗り切ったねー。"
11100-49 = "……完済まであとどれぐらい？"
11100-50 = "309年返済なので……今までの分を入れると……。"
11100-51 = "言わなくていいわよ、正確な数字で言われるとさらにストレス溜まりそう……。"
11100-52 = "どうせ死ぬまで完済できないんだし！計算してもムダでしょ！！"
11100-53 = "……。"
11100-54 = "ところで、カイザーローンはなぜ現金でしか受け付けないのでしょうね？#nわざわざ現金輸送車まで手配して……。"
11100-55 = "……。"
11100-57 = "シロコ先輩、あの車は襲っちゃダメだよ。"
11100-58 = "うん、わかってる。"
11100-59 = "計画もしちゃダメ！"
11100-60 = "うん……。"
11100-61 = "ま、とりあえず先に解決するべきは、目の前の問題の方でしょ。"
11100-62 = "とにかく教室に戻ろうー。"
11100-64 = "全員揃ったようなので始めます。まずは、2つの事案についてお話ししたいと思います。"
11100-65 = "最初に、昨晩の襲撃の件です。"
11100-67 = "私たちを襲ったのは「便利屋68」という部活です。"
11100-68 = "ゲヘナでは、かなり危険で素行の悪い生徒たちとして知られています。"
11100-69 = "便利屋とは頼まれたことは何でもこなすサービス業者で……。"
11100-70 = "部活のリーダーの名前はアルさん。"
11100-71 = "自らを「社長」と称しているようです。"
11100-75 = "彼女の下には3人の部員がいて、#nそれぞれ室長、課長、平社員の肩書があるとのことです。"
11100-78 = "いやぁー、本格的だねー。"
11100-79 = "社長さんだったんですね☆すごいです！"
11100-80 = "いえ、あくまでも「自称」なので……それで今はアビドスのどこかのエリアに入り込んでいるようです。今朝も会いましたし……。"
11100-81 = "ゲヘナ学園では、起業が許可されているの？"
11100-82 = "それはないと思いますが……勝手に起業したのではないでしょうか。"
11100-83 = "あら……校則違反ってことですね。悪い子たちには見えませんでしたが……。"
11100-84 = "いえ、それが今までかなり非行の限りを尽くしたようで、ゲヘナでも問題児扱いされているようです。"
11100-85 = "そんな危険な組織が私たちの学校を狙っているのです！もっと気を引き締めないといけません！"
11100-86 = "次は取っ捕まえて取り調べでもするかー。"
11100-87 = "はい、機会があればぜひ……。"
11100-88 = "ところでアヤネちゃん、何かあったの？並々ならぬ恨みを感じるんだけど……。"
11100-89 = "……いえ、特に何も。続きまして、セリカちゃんを襲ったヘルメット団の黒幕についてです！"
11100-90 = "先日の戦闘で手に入れた戦略兵器の破片を分析した結果……#n現在は取引されていない型番だということが判明しました。"
11100-91 = "もう生産してないってこと？"
11100-92 = "それをどうやって手に入れたのかしら。"
11100-93 = "生産が中止された型番を手に入れる方法は……キヴォトスでは「ブラックマーケット」しかありません。"
11100-94 = "ブラックマーケット……とっても危ない場所じゃないですか。"
11100-95 = "そうです。あそこでは中退、休学、退学……様々な理由で学校を辞めた生徒たちが集団を形成しており、連邦生徒会の許可を得ていない非認可の部活もたくさん活動していると聞きました。"
11100-96 = "便利屋68みたいに？"
11100-97 = "はい。それから便利屋68も、ブラックマーケットで#n何度か騒ぎを起こしていると聞きました。"
11100-98 = "では、そこが重要ポイントですね！"
11100-99 = "はい。ふたつの出来事の関連性を探すのも、ひとつの方法かもしれません。"
11100-100 = "よし、じゃあ決まりだねー。ブラックマーケットを調べてみよう。"
11100-101 = "意外な手がかりがあるかもしれないしね。"
11100-103 = "次回;ブラックマーケットへ（１）"
