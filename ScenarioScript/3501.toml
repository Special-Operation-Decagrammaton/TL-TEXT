[translation]
3501-1 = "雪見風呂"
3501-4 = "……よっし、完成～！"
3501-5 = "バッチリだね！これならみんなも喜ぶんじゃないかな？#nね、メグちゃん？"
3501-6 = "おぉ～！！すっごーい！！#n今週掘ったヤツの中で一番いい温泉かも！！"
3501-7 = "早くみんなにも見せてあげよーっと！！"
3501-8 = "ふぅ……にしても、ずっと掘ってたから疲れたなぁ。"
3501-9 = "奥まったとこにあるし……資材を運ぶのも一苦労だったね。"
3501-10 = "こんなんじゃ、いくら泉質が良くても人が来ないかも……。"
3501-11 = "うーん、たしかに……。"
3501-12 = "どうしよう……。"
3501-17 = "……あれ、どうしたの？"
3501-18 = "私たちが悩む必要ないんじゃない？#nそういうのはカスミ部長に聞けばいいよ！"
3501-19 = "部長ならきっと、なんとかしてくれると思う！#nというか、もしかしたらもう既に手を打ってくれてるかもだし！"
3501-24 = "あははっ！たしかに！"
3501-25 = "カスミ部長なら、なんとかしてくれるよね。"
3501-26 = "そういや部長は？一緒じゃないの？"
3501-27 = "部長も来てるよ～！ちょっと聞きに行ってくるね！"
3501-28 = "みんなは先に休んでて！"
3501-29 = "え……メグちゃんが？"
3501-30 = "メグちゃんだって一緒に頑張ってくれたのに、私たちだけ先に休むのも……。"
3501-31 = "ううん、気にしないで！まだ全然大丈夫だよ！元気いっぱい！"
3501-32 = "みんな疲れてるでしょ？温泉でゆっくり疲れをとっていっちゃいなよ！"
3501-33 = "後は任せて！"
3501-34 = "いってきま～す！"
3501-42 = "ほんと、いつも頑張ってくれてるよねメグちゃん。"
3501-43 = "仕事も一番やってて……#nそういえば、メグちゃんって小さな温泉くらいなら一人でも掘れるらしいよ。"
3501-44 = "えっ、そうなの！？ほんとに……？"
3501-45 = "実際にこの目で見たわけじゃないんだけど、#n今日の作業ぶりを見てたら納得だよね……。"
3501-46 = "……た、たしかに。"
3501-47 = "メグちゃんってすごいんだね……。"
3501-48 = "だよね。元部長は伊達じゃないんだなぁ。"
3501-49 = "……え？"
3501-50 = "元部長？"
3501-51 = "あれ？……知らなかったの？"
3501-52 = "そういえば、君は新入りか。#nうちの部は、何度も解散したり再結成したりするもんね。"
3501-53 = "実はメグちゃん、温泉開発部の部長だったんだ。#nでも、カスミ部長が来たからその座を譲ったの。"
3501-54 = "なんで？"
3501-55 = "さぁ、理由まではわかんない。"
3501-56 = "まあでも普通に考えたら、カスミ部長がブレインだからじゃない？#nそれにメグちゃん自身、あんまり肩書きにこだわってないみたいだし。"
3501-57 = "……それが本当なら作業班長らしい話だね。"
3501-58 = "ははっ！たしかに……。"
3501-60 = "それもそうだね。"
3501-64 = "部長～！カスミ部長～～！！"
3501-65 = "……ん？"
3501-66 = "おお、メグではないか。#nどうしたんだ、そんな大声を出して。"
3501-67 = "部長ここにいた！！"
3501-68 = "って、あれ？もう温泉入ってる！？#nいつもは最後なのに。"
3501-69 = "ははっ、まあ、大した理由じゃあないさ。"
3501-70 = "少しばかり昔を思い出してね。#n今日はなんだかやる気が沸いてきたんだ。"
3501-71 = "ところで、どうしたんだい？#nみんなと一緒にいたんじゃ……"
3501-72 = "なにかトラブルでも？"
3501-73 = "トラブルってほどじゃないんだけど……。"
3501-74 = "ここを掘ってくれたみんなが、#nこんな僻地じゃ人が来ないんじゃないのかって気にしてて……。"
3501-75 = "私たちでさえ資材を運ぶのも一苦労だったのに、温泉目当ての人がここまで来れるのかな～って。"
3501-76 = "ハーハッハッハッハ！何かと思いきや、そんなことか。"
3501-77 = "心配ご無用！人なんぞ、シャトルバスで運べばいいだけだ。#n資材と違って自力で歩けるからな！"
3501-78 = "たしかに奥まったところにはあるが、道は舗装している。#nあとでバスを何台か手配すれば問題ないだろう。"
3501-80 = "おおーー！さすが部長……！"
3501-84 = "……あれ、うちってバスあるっけ？"
3501-85 = "ハーハッハッハッハ！"
3501-86 = "……無い！"
3501-87 = "だが、バスくらい適当にカイザーPMCかブラックマーケットの輸送車両をジャックすればいい。"
3501-88 = "つまり、すべて想定の範囲内ってことだ！"
3501-89 = "部員のみんなには、#n余計なことなど気にせず温泉でのんびりするといい、と伝えてくれ。"
3501-90 = "まだここの温泉は完成してないからな！温泉は建物があればいいってわけじゃあない。"
3501-92 = "そっか！わかった～！みんなに伝えておくね！"
3501-97 = "えーっと……「とりあえず寝て起きたら何とかなる」、ってことでいい？"
3501-98 = "ハーハッハッハッハ！ああ、その通りだ！賢いな！流石だぞ、メグ！"
3501-99 = "えへへ……部長にそう褒められると、なんか照れちゃうね……。"
3501-105 = "ん？メグ？"
3501-106 = "意外だな。メグもこっちの湯が気に入ったのか？#n他に、もっと広くて熱々の温泉もあるのに。"
3501-107 = "さっき部長が言っていた事を思い出して、ちょっとね！"
3501-108 = "うん……？"
3501-109 = "……あぁ、昔の話か？"
3501-110 = "うん！部長、雪好きでしょ？#n雪見風呂ならなおさら！"
3501-111 = "ははっ――"
3501-115 = "……ん？"
3501-116 = "待て……そんなこと言ったか？"
3501-117 = "ううん、言ってないよ。"
3501-118 = "でも部長、初めて会った時、雪の中で寝てたじゃん？"
3501-119 = "私が温泉を掘ってお湯に入れたら、つらそうな顔が気持ちよさそうになってたもん！"
3501-120 = "雪の中……つらそうな寝顔……"
3501-121 = "……あぁ。"
3501-122 = "……なるほど。"
3501-123 = "……そういうことか。"
3501-124 = "「雪の中で寝ていた」、ねぇ――本当に、メグらしい表現だな。"
3501-125 = "……部長？"
3501-126 = "ははっ、いや。なんでもない。"
3501-127 = "しかし、それは初めて聞く話だな！#nあの時の私は、お湯の中で気持ちよさそうにしてたのか？"
3501-128 = "うん！だから見た瞬間ピンと来たの！#n「あ、この人。雪が降る温泉が大好きなんだなぁ」って！"
3501-129 = "なるほど……。"
3501-130 = "……ふふっ。"
3501-131 = "……部長？"
3501-132 = "ハーハッハッハッハ！！ああ！雪見風呂こそ温泉の[ruby=だいごみ]醍醐味[/ruby]ではないか！上は涼しく、下は温かい！"
3501-133 = "死に際の人間さえ生き返らせるほどの威力を持っている！"
3501-134 = "痛みをお湯で洗い流す！まさに至高そのものといえよう！"
3501-135 = "うんうん！温泉最高！#n雪見風呂、最高！！"
3501-136 = "みんなもいつか、この素晴らしさに気づいてほしいなぁ～！"
3501-137 = "まあまあ……じきに分かるはずだ。そう焦らずとも良い。"
3501-138 = "今日はメグもゆっくり休んでおけ。明日もやることが山積みだからな！"
3501-139 = "うん！あ、そうだ！みんなにさっきの件言ってこないと！"
3501-140 = "じゃあ私、先に行くね！"
3501-141 = "ああ。滑りやすいから気をつけるんだぞ～！"
3501-142 = "はーい！！"
3501-147 = "温泉、なぁ……。"
3501-151 = "ふふ……"
3501-153 = "……そりゃあ、好きになるに決まってるだろう？"
3501-154 = "雪見風呂"
