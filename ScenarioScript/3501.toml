[translation]
3501-1 = "Banho na Neve"
3501-4 = "……Muito bem, concluído!"
3501-5 = "Ficou perfeito! Acho que todo mundo vai adorar, não acham?#nNão é, Meg-chan?"
3501-6 = "Uau!! Incrível!!#nTalvez seja a melhor fonte termal que cavamos esta semana!!"
3501-7 = "Vou mostrar para todo mundo logo!"
3501-8 = "Ufa... mas, como ficamos cavando o tempo todo, estou exausta."
3501-9 = "Fica em um lugar tão isolado... transportar os materiais foi um trabalho árduo, né."
3501-10 = "Desse jeito, não importa o quão boa seja a qualidade da água, talvez ninguém venha..."
3501-11 = "Hum, é verdade..."
3501-12 = "O que faremos..."
3501-17 = "……Ei, o que houve?"
3501-18 = "Não precisamos nos preocupar com isso, precisamos?#nÉ só perguntar para a Chefe Kasumi sobre essas coisas!"
3501-19 = "Tenho certeza de que a Chefe dará um jeito!#nOu melhor, talvez ela já tenha até tomado providências!"
3501-24 = "Ahaha! É verdade!"
3501-25 = "A Chefe Kasumi com certeza vai dar um jeito."
3501-26 = "Falando nisso, onde está a Chefe? Ela não está com você?"
3501-27 = "A Chefe também veio! Vou lá perguntar rapidinho!"
3501-28 = "Vocês podem descansar primeiro!"
3501-29 = "Eh... a Meg-chan vai?"
3501-30 = "A Meg-chan também se esforçou tanto quanto nós, não podemos simplesmente descansar primeiro..."
3501-31 = "Não, não se preocupem! Ainda estou muito bem! Cheia de energia!"
3501-32 = "Vocês estão cansadas, não estão? Aproveitem a fonte termal para relaxar e tirar o cansaço!"
3501-33 = "Deixem o resto comigo!"
3501-34 = "Já volto!"
3501-42 = "Sério, a Meg-chan sempre se esforça tanto."
3501-43 = "Ela é quem mais trabalha...#nFalando nisso, dizem que a Meg-chan consegue cavar uma fonte termal pequena até sozinha."
3501-44 = "Sério, é verdade isso!?"
3501-45 = "Eu não vi com meus próprios olhos, mas...#nvendo o trabalho dela hoje, faz sentido..."
3501-46 = "……É, verdade."
3501-47 = "A Meg-chan é incrível..."
3501-48 = "Pois é. Ser uma ex-chefe não é para qualquer um."
3501-49 = "……Eh?"
3501-50 = "Ex-chefe?"
3501-51 = "Ué? ...Você não sabia?"
3501-52 = "Ah, é verdade, você é novata.#nNosso departamento vive se dissolvendo e se reorganizando, né."
3501-53 = "Na verdade, a Meg-chan era a chefe do Departamento de Desenvolvimento de Fontes Termais.#nMas ela cedeu o cargo quando a Chefe Kasumi chegou."
3501-54 = "Por quê?"
3501-55 = "Quem sabe, não sei o motivo exato."
3501-56 = "Mas, pensando bem, não é porque a Chefe Kasumi é o cérebro do grupo?#nAlém disso, a própria Meg-chan não parece se importar muito com títulos."
3501-57 = "……Se isso for verdade, é bem a cara da nossa líder de equipe."
3501-58 = "Haha! É verdade..."
3501-60 = "Faz sentido."
3501-64 = "Chefe~! Chefe Kasumi~~!!"
3501-65 = "……Hm?"
3501-66 = "Oh, é a Meg.#nO que houve para estar gritando desse jeito?"
3501-67 = "A Chefe estava aqui!!"
3501-68 = "Espera, o quê? Você já está na fonte termal!?#nVocê sempre é a última a entrar."
3501-69 = "Haha, bem, não é nada demais."
3501-70 = "Lembrei um pouco dos velhos tempos.#nHoje, por algum motivo, senti uma vontade renovada de trabalhar."
3501-71 = "Mas, o que houve?#nVocê não estava com os outros..."
3501-72 = "Algum problema?"
3501-73 = "Não chega a ser um problema, mas..."
3501-74 = "O pessoal que cavou aqui está preocupado... #nserá que alguém viria até um lugar tão remoto assim?"
3501-75 = "Até para nós foi um sufoco trazer os materiais, será que as pessoas que querem curtir a fonte termal conseguiriam chegar até aqui?"
3501-76 = "Hahahaha! Pensei que fosse algo grave, mas é só isso?"
3501-77 = "Não se preocupe! É só transportar as pessoas com um ônibus fretado. #nDiferente dos materiais, elas podem andar por conta própria!"
3501-78 = "Embora seja um lugar isolado, a estrada está pavimentada. #nNão será problema providenciar alguns ônibus mais tarde."
3501-80 = "Uau! Como esperado do nosso chefe...!"
3501-84 = "...Ei, a gente tem ônibus?"
3501-85 = "Hahahaha!"
3501-86 = "...Não temos!"
3501-87 = "Mas é só sequestrar alguns veículos de transporte da Kaiser PMC ou do mercado negro."
3501-88 = "Ou seja, tudo está dentro do planejado!"
3501-89 = "Diga aos membros do clube para #nnão se preocuparem com bobagens e apenas relaxarem na fonte termal."
3501-90 = "Afinal, a fonte termal daqui ainda não está pronta! Não basta apenas ter o prédio."
3501-92 = "Entendi! Beleza! Vou avisar todo mundo!"
3501-97 = "Hum... então posso dizer que \"se dormir e acordar, tudo se resolve\"?"
3501-98 = "Hahahaha! Isso mesmo! Que esperta! Como esperado de você, Meg!"
3501-99 = "Hehehe... fico até sem jeito quando o chefe me elogia assim..."
3501-105 = "Hm? Meg?"
3501-106 = "Surpreendente. Você também gostou desta água? #nMesmo existindo outras fontes termais maiores e mais quentes por aí."
3501-107 = "Lembrei do que o chefe disse agora há pouco, só isso!"
3501-108 = "Sim...? "
3501-109 = "...Ah, você está falando de antigamente?"
3501-110 = "Sim! Chefe, você gosta de neve, né? #nE de um banho observando a neve, melhor ainda!"
3501-111 = "Haha..."
3501-115 = "...Hm?"
3501-116 = "Espere... eu disse isso?"
3501-117 = "Não, não disse."
3501-118 = "Mas chefe, quando a gente se conheceu, você estava dormindo na neve, não estava?"
3501-119 = "Quando eu cavei a fonte e te coloquei na água, aquela sua cara de sofrimento mudou para uma de puro prazer!"
3501-120 = "Na neve... cara de sofrimento enquanto dormia..."
3501-121 = "...Ah."
3501-122 = "...Entendo."
3501-123 = "...É isso."
3501-124 = "\"Dormindo na neve\", é... essa é bem a cara da Meg mesmo."
3501-125 = "...Chefe?"
3501-126 = "Haha, não, nada não."
3501-127 = "Mas essa é a primeira vez que ouço essa história! #nNaquela época, eu parecia estar aproveitando a água?"
3501-128 = "Sim! Por isso, na hora, eu saquei tudo! #n\"Ah, essa pessoa ama fontes termais com neve caindo!\""
3501-129 = "Entendo..."
3501-130 = "...Fufu."
3501-131 = "...Chefe?"
3501-132 = "Hahahaha!! Sim! Um banho observando a neve é a verdadeira essência de uma fonte termal! O ar frio em cima e o calor embaixo!"
3501-133 = "Tem o poder de trazer de volta à vida até quem está à beira da morte!"
3501-134 = "Lavar a dor com a água quente! É o ápice da perfeição!"
3501-135 = "Isso mesmo! Fontes termais são o máximo! #nBanho na neve é o melhor!!"
3501-136 = "Espero que um dia todos percebam essa maravilha!"
3501-137 = "Bem, bem... logo eles entenderão. Não precisa ter tanta pressa."
3501-138 = "Hoje, descanse um pouco também, Meg. Amanhã teremos uma montanha de coisas para fazer!"
3501-139 = "Sim! Ah, é verdade! Preciso contar para todo mundo sobre o que aconteceu agora pouco!"
3501-140 = "Então eu vou indo na frente!"
3501-141 = "Certo. O chão está escorregadio, então tome cuidado!"
3501-142 = "Pode deixar!!"
3501-147 = "Fontes termais, hein..."
3501-151 = "Hehe..."
3501-153 = "……Bem, é claro que eu acabaria gostando, não é?"
3501-154 = "Banho na neve"
