[translation]
70005020-1 = "Registro de um certo dia 19 de fevereiro (1)"
70005020-3 = "[log]19 de fevereiro[/log]"
70005020-6 = "Escola Gehenna - Sala do Comitê Disciplinar"
70005020-8 = "……."
70005020-9 = "……."
70005020-10 = "……."
70005020-11 = "Alguém poderia me explicar essa situação?"
70005020-12 = "……Isso é um erro de entrega."
70005020-13 = "O destinatário original parece ser... o Xuanlongmen da Escola Secundária Shanhaijing."
70005020-14 = "É hora de ficar analisando friamente?!"
70005020-15 = "Foi você quem pediu uma explicação, Ako-chan!"
70005020-16 = "Já chega! Eu mesma vou entrar em contato! Precisamos resolver isso imediatamente...!"
70005020-17 = "Espere um momento."
70005020-18 = "Sim?"
70005020-19 = "O Xuanlongmen é uma organização que exerce funções de conselho estudantil na Escola Secundária Shanhaijing. #nEm outras palavras, o equivalente ao Pandemonium Society em Gehenna."
70005020-20 = "E daí?"
70005020-21 = "Por outro lado, o Comitê Disciplinar é a organização que mantém a disciplina e a ordem em Gehenna."
70005020-22 = "Dependendo da situação, podemos cooperar com o exterior, mas..."
70005020-23 = "……Se isso se tornar uma interação direta com o 'conselho estudantil' de outra escola..."
70005020-24 = "Ah."
70005020-25 = "Como vocês imaginaram..."
70005020-26 = "Dependendo de como for interpretado, pode se tornar um problema diplomático..."
70005020-27 = "Se isso chegar aos ouvidos do Pandemonium Society..."
70005020-32 = "Só de imaginar o tipo de problema que eles vão criar..."
70005020-33 = "Ah, meu Deus! Ninguém aqui tem amigos em Shanhaijing?!"
70005020-34 = "……."
70005020-35 = "Hã!? Vocês realmente não têm...?"
70005020-36 = "Bem, tecnicamente... se for para entrar em contato... temos uma conexão com o 'Clube de Pesquisa de Alquimia'..."
70005020-37 = "Clube de Pesquisa de Alquimia? Que tipo de lugar é esse?"
70005020-38 = "Se eu tivesse que dizer... é um clube parecido com o Departamento de Medicina de Emergência."
70005020-39 = "Ah, entendi."
70005020-40 = "……."
70005020-42 = "Então, vamos usar esse contato para falar com Shanhaijing de forma 'privada'."
70005020-47 = "……."
70005020-48 = "……."
70005020-49 = "O que devemos fazer..."
70005020-50 = "Não me pergunte..."
70005020-51 = "De onde é esse bolo?"
70005020-55 = "Está escrito Gehenna. Bem... 'Para a Presidente Hina Sorasaki, com todo o meu carinho'?"
70005020-56 = "Hina Sorasaki? Acho que já ouvi esse nome..."
70005020-60 = "Se não me engano... ela é a presidente do Comitê Disciplinar de Gehenna, certo? Dizem que ela é uma super-humana perfeita que sustenta a escola sozinha..."
70005020-61 = "Humpf! A nossa Mestra é muito mais talentosa, é claro!"
70005020-62 = "Por que você está falando disso do nada...?"
70005020-64 = "Aliás, e o nosso bolo...?"
70005020-65 = "Não sei. Mas acho que precisamos avisar o Comitê Disciplinar de Gehenna que este bolo foi entregue aqui."
70005020-66 = "……É verdade."
70005020-67 = "Nesse caso, quem é o responsável..."
70005020-68 = "……O chefe de relações públicas, talvez?"
70005020-69 = "……A 'Xiangzhu', você diz?"
70005020-70 = "Seguindo o protocolo, seria ela."
70005020-71 = "E-está tudo bem mesmo...?"
70005020-72 = "……Não há outra escolha."
70005020-79 = "Hm? Um telefonema do Clube de Pesquisa de Alquimia?"
70005020-83 = "Escute bem, Diretora Executiva Mina! #nRecebemos um contato \"privado\" do Departamento de Medicina de Emergência de Gehenna!"
70005020-84 = "Vou transferir agora!"
70005020-85 = "Um contato \"privado\"...?"
70005020-90 = "Muito prazer, Mina-san. Meu nome é Chinatsu, da Academia Gehenna."
70005020-91 = "A-ah, sim..."
70005020-92 = "O bolo que deveria ter chegado aí hoje, acabou sendo entregue aqui por engano."
70005020-93 = "!!!"
70005020-99 = "Obrigada pela explicação. Entendo, então os bolos foram trocados. #nSobre como procederemos daqui em diante..."
70005020-100 = "Nós também vamos analisar a situação por aqui. Assim que tivermos um plano definido, entraremos em contato novamente."
70005020-105 = "O que eu faço agora..."
70005020-106 = "Desse jeito, eles vão acabar..."
70005020-107 = "Eles?"
70005020-108 = "N-não é nada!"
70005020-109 = "De qualquer forma, eu assumirei a responsabilidade e darei um jeito nisso! Sinto muito pelo trabalho que te causei."
70005020-110 = "Ah, não se preocupe. Diretora Executiva, não se esforce demais."
70005020-115 = "Haa..."
70005020-119 = "……Caso aconteça alguma coisa, por favor, entre em contato conosco."
70005020-120 = "Sendo sincera, não acho que o Genryumon consiga resolver as coisas sem a presença da líder."
70005020-122 = "Haaaaaa..."
70005020-123 = "Não há outra saída... Reconhecer os próprios limites também é uma forma de força..."
70005020-124 = "Mas..."
70005020-125 = "Não, ficar hesitando não é nada 'hard-boiled'. Decisão rápida e imediata!"
70005020-127 = "Comercial Genbu"
70005020-128 = "……Que azar o seu. Mas, talvez tenha sido uma boa ideia pedir nossa ajuda. #nPor acaso, eu tenho uma ótima ideia."
70005020-129 = "V-verdade?"
70005020-130 = "Presidente. O Comercial Genbu ainda não fez negócios com Gehenna. O que pretende fazer?"
70005020-131 = "Sim. Por isso, quero aproveitar esta oportunidade para expandir nossos horizontes."
70005020-132 = "Aliás, vocês gostam de cantar?"
70005020-133 = "Cantar?"
70005020-134 = "Como assim?"
