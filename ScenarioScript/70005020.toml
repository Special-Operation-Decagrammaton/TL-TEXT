[translation]#[Texto Final. - Filipe 08/07.]
70005020-1 = "Registro de um Certo 19 de Fevereiro (1)"
70005020-3 = "[log]19 de Fevereiro[/log]"
70005020-6 = "Sala do Comitê de Disciplina – Gehenna"
70005020-8 = "……"
70005020-9 = "……"
70005020-10 = "……"
70005020-11 = "Alguém pode explicar essa situação?"
70005020-12 = "……Isso foi um erro de entrega."
70005020-13 = "O destinatário original era…… o Portão do Dragão Negro, da Academia Sankakkei."
70005020-14 = "Agora não é hora de analisar com calma!?"
70005020-15 = "Quem pediu explicação foi você, Ako-chan!?"
70005020-16 = "Já chega! Eu mesma vou entrar em contato! Precisamos agir rápido……!"
70005020-17 = "Espere."
70005020-18 = "Hã?"
70005020-19 = "O Portão do Dragão Negro é uma organização com funções de conselho estudantil em Sankakkei.#nEm outras palavras, é como o Pande-mônio em Gehenna."
70005020-20 = "E daí?"
70005020-21 = "Por outro lado, o Comitê de Disciplina mantém a ordem e a disciplina em Gehenna."
70005020-22 = "Em alguns casos, cooperamos com outras instituições……"
70005020-23 = "……mas se isso se tornar um contato direto com o 'conselho estudantil' de outra escola……"
70005020-24 = "Ah."
70005020-25 = "É exatamente como vocês imaginaram……"
70005020-26 = "Dependendo da interpretação, pode virar um problema diplomático……"
70005020-27 = "Se isso chegar ao Pande-mônio……"
70005020-32 = "Só de imaginar as picuinhas que vão inventar……"
70005020-33 = "Ah, droga! Alguém aí tem amigos em Sankakkei?"
70005020-34 = "……"
70005020-35 = "Hã!? Ninguém tem……?"
70005020-36 = "Bom, na verdade…… se quisermos contato…… temos ligação com a 'Sociedade de Alquimia'……"
70005020-37 = "Sociedade de Alquimia? Que tipo de clube é esse?"
70005020-38 = "Se forçar uma comparação…… é como o Clube de Medicina de Emergência."
70005020-39 = "Ah, entendi."
70005020-40 = "……"
70005020-42 = "Então, por esse intermédio, vamos tentar um contato 'privado' com Sankakkei."
70005020-47 = "……"
70005020-48 = "……"
70005020-49 = "E agora……?"
70005020-50 = "Não me pergunte……"
70005020-51 = "De quem é esse bolo?"
70005020-55 = "Está escrito Gehenna. Hmm…… 'Para a presidente Hina, com todo carinho'?"
70005020-56 = "Hina? Já ouvi esse nome……"
70005020-60 = "Ela é a presidente do Comitê de Disciplina de Gehenna, não? Dizem que é uma super-humana que sustenta a escola sozinha……"
70005020-61 = "Hunf! Nossa líder é muito melhor!"
70005020-62 = "Do que você tá falando……?"
70005020-64 = "Aliás, cadê o nosso bolo?"
70005020-65 = "Não sei. Mas precisamos avisar o Comitê de Disciplina de Gehenna que o bolo chegou aqui."
70005020-66 = "……É verdade."
70005020-67 = "Nesse caso, quem deve cuidar disso é……"
70005020-68 = "……a diretora de relações públicas?"
70005020-69 = "……a 'Senhora Fragrância'?"
70005020-70 = "Pelas regras, sim."
70005020-71 = "S-será que vai dar certo……?"
70005020-72 = "……Não tem escolha."
70005020-79 = "Hã? Telefone da Sociedade de Alquimia?"
70005020-83 = "Escute, Mina!#nA Sociedade de Medicina de Emergência de Gehenna enviou um contato 'privado'!"
70005020-84 = "Vou transferir agora!"
70005020-85 = "Contato 'privado'……?"
70005020-90 = "Prazer, Mina. Sou Chinatsu, de Gehenna."
70005020-91 = "Ah, sim……"
70005020-92 = "O bolo que deveria chegar aí hoje, chegou aqui."
70005020-93 = "!!!"
70005020-99 = "Obrigada pela explicação. Então os bolos foram trocados mesmo.#nQuanto aos próximos passos……"
70005020-100 = "Vamos discutir aqui também. Assim que definirmos, entramos em contato."
70005020-105 = "O que fazer……"
70005020-106 = "Assim, aqueles caras vão……"
70005020-107 = "Aqueles caras?"
70005020-108 = "N-nada não!"
70005020-109 = "Enfim, vou dar um jeito nisso! Desculpe o incômodo."
70005020-110 = "Ah, não. Não se force também."
70005020-115 = "Haa……"
70005020-119 = "……Se acontecer algo, entre em contato."
70005020-120 = "Sinceramente, não acho que o Portão do Dragão Negro consiga resolver isso sem a líder."
70005020-122 = "Ahhhhh……"
70005020-123 = "É inevitável…… reconhecer os próprios limites também é força……"
70005020-124 = "Mas……"
70005020-125 = "Não, hesitar não é hard-boiled. Decisão rápida!"
70005020-127 = "Câmara de Comércio Genbu"
70005020-128 = "……Que azar. Mas pedir nossa ajuda foi a decisão certa.#nAté porque, tive uma boa ideia."
70005020-129 = "S-sério?"
70005020-130 = "Presidente. A Câmara Genbu ainda não fez negócios com Gehenna. O que pretende fazer?"
70005020-131 = "É. Quero aproveitar pra expandir nossos contatos."
70005020-132 = "Aliás, vocês gostam de cantar?"
70005020-133 = "Cantar?"
70005020-134 = "É?"