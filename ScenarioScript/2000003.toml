[translation]
2000003-1 = "Chamas que explodem no coração"
2000003-2 = "Millennium - Corredor"
2000003-3 = "（Visitei Millennium para encontrar a Hibiki）"
2000003-4 = "（CABRUM!）"
2000003-5 = "[s1] \"!?\"\n[s2] \"Som de explosão?\""
2000003-11 = "Millennium - Departamento de Engenharia"
2000003-12 = "（Tosse, tosse）"
2000003-13 = "Ah, será que a quantidade de pólvora estava alta demais...#nNão tem jeito, meu conhecimento em química ainda é insuficiente..."
2000003-14 = "Hm?"
2000003-15 = "Sensei...?"
2000003-16 = "[s3] \"O que houve?\"\n[s4] \"Ouvi um som de explosão.\""
2000003-20 = "Ah... não é nada, estou bem."
2000003-21 = "Como escrevi no e-mail, o que estou criando agora é uma máquina de lançar fogos de artifício."
2000003-22 = "Falando em fogos de artifício, Hyakkiyako é a mais famosa, claro."
2000003-23 = "Mas em Millennium, eles também são lançados durante o festival noturno."
2000003-24 = "Já que aceitei o pedido, quero criar uma máquina capaz de lançar fogos de artifício dignos daquele momento."
2000003-25 = "A explosão de agora foi... uma das minhas tentativas e erros."
2000003-26 = "O que quero mostrar ao Sensei hoje é algo diferente, um novo conceito de fogos de artifício."
2000003-27 = "Possibilitar a criação de fogos de artifício não através da química, mas da ciência..."
2000003-28 = "Criei um projetor de hologramas, uma máquina que lança um novo conceito de fogos de artifício que derruba completamente o senso comum sobre os tradicionais."
2000003-29 = "[s5] \"Holograma? Aquele tipo de imagem projetada no ar?\"\n[s6] \"Incrível... mas sinto que a direção está um pouco errada.\""
2000003-30 = "Isso. Mais precisamente, um display tridimensional."
2000003-31 = "Embora não seja algo tão tecnicamente impressionante."
2000003-32 = "A tecnologia de hologramas em si já é usada no dia a dia."
2000003-33 = "Aquela parte brilhante no cartão de crédito ou nas notas do Sensei, usada para evitar cópias ilegais, também é um tipo de holograma."
2000003-34 = "Se usar este projetor, posso projetar qualquer tipo de fogo de artifício no céu noturno, com baixa luminosidade."
2000003-35 = "Não é perigoso como aquele que usa pólvora negra de antes, e#nse houver recursos, posso exibir fogos de artifício no céu noturno quase que permanentemente."
2000003-36 = "Hm? O problema não é esse...?"
2000003-37 = "Talvez fogos de artifício holográficos não consigam preencher o lado emocional?"
2000003-38 = "Mas, talvez, os fogos de artifício holográficos sejam justamente os que..."
2000003-39 = "Consigam preencher até mesmo aquele sentimento especial de \"efemeridade\" típico dos fogos de artifício."
2000003-40 = "Hmm... você está com uma cara de quem não se convenceu."
2000003-41 = "Mas acho que o Sensei entende mais de fogos de artifício do que eu."
2000003-42 = "Certo, desta vez vou aceitar a opinião do Sensei."
2000003-43 = "Sendo assim, que tal isto? Não testei tão bem quanto o projetor de hologramas, mas..."
2000003-44 = "Ele voa expelindo luz, solta fumaça e, ao atingir o ápice, explode de forma chamativa..."
2000003-45 = "É um pouco grande e bruto, mas é o que mais se aproxima dos fogos de artifício comuns."
2000003-48 = "[ns7] \"Essa é uma luz de ódio que nunca deveria brilhar.\"\n[ns8] \"Que legal!\""
2000003-49 = "Na verdade, já existe um histórico de um esconderijo de uma organização criminosa que foi envolto em chamas brilhantes por causa disso."
2000003-50 = "Na verdade, já existe um histórico de um esconderijo de uma organização criminosa que foi envolto em chamas brilhantes por causa disso."
2000003-51 = "O fato de as pessoas que viram isso reagirem gritando também coincide perfeitamente com o momento do lançamento de fogos de artifício."
2000003-52 = "Hm? Isso também não serve?#nEi, absolutamente não?"
2000003-53 = "Hmm, que pena.#nAcho que só me resta fazer os fogos de artifício comuns que explodi por engano antes."
2000003-54 = "Acho que eles são um pouco comuns demais, sinto que falta algo."
2000003-55 = "……."
2000003-56 = "Ah, que vergonha."
2000003-57 = "Eu queria mostrar uma versão legal de mim para o Sensei."
2000003-58 = "[s] \"Você já é legal o suficiente agora.\""
2000003-59 = "……."
2000003-60 = "Hehe, obrigada."
2000003-61 = "……Ah, Sensei. #nNão toque naquele interruptor."
2000003-62 = "Um deles é o botão de disparo deste míssil, então—"
2000003-63 = "[s9] (Click)\n[s10] Minha mão escorregou."
2000003-64 = "Ah……."
2000003-65 = "Ah……."
2000003-67 = "(Zzzzzzzzzum)"
2000003-68 = "Ah, foi disparado……."
2000003-70 = "(BOOOOOOOOM!!)"
2000003-71 = "……."
2000003-73 = "O enorme fogo de artifício, ou melhor, o míssil que atingiu a Millennium Tower, parece ter sido visto por todas as alunas da Millennium."
