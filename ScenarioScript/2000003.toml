[translation]
2000003-1 = "心に打ち上がる炎"
2000003-2 = "ミレニアム・廊下"
2000003-3 = "（ヒビキに会うため、ミレニアムを訪れた）"
2000003-4 = "（ドカアアァァン！）"
2000003-5 = "[s1] \"！？\"\n[s2] \"爆発音？\""
2000003-11 = "ミレニアム・エンジニア部"
2000003-12 = "（ケホケホ）"
2000003-13 = "はあ、火薬の量が多すぎたかな……#nどうも化学の方は知識が足りなくていけない……。"
2000003-14 = "うん？"
2000003-15 = "先生……？"
2000003-16 = "[s3] \"どうしたの？\"\n[s4] \"爆発音が聞こえて。\""
2000003-20 = "あ……なんでもない、大丈夫。"
2000003-21 = "メールで書いたように、今私が作ってるのは、花火を打ち上げる機械。"
2000003-22 = "花火といえばやっぱり、百鬼夜行が一番有名だけど。"
2000003-23 = "ミレニアムでも、夜のお祭りで打ち上げられるの。"
2000003-24 = "私も依頼を受けた以上は、その瞬間にふさわしい花火を打ち上げられる機械を作ろうと思ってる。"
2000003-25 = "さっきの爆発は……試行錯誤の一つ。"
2000003-26 = "今日先生に見せようと思ってるのは、それとはまた別の、新しい概念としての花火だよ。"
2000003-27 = "化学ではなく、科学によって花火の生成を可能とする……。"
2000003-28 = "従来の花火に対する常識を完全に覆す、新しい概念としての花火を打ち上げる機械……ホログラム映写機を作ったの。"
2000003-29 = "[s5] \"ホログラムって、あの空中に投影する映像の？\"\n[s6] \"すごい……けど、方向性がちょっと間違ってる気がする。\""
2000003-30 = "そう。もっと正確に言えば、立体ディスプレイ。"
2000003-31 = "と言っても、そんなに技術的にすごいものでもない。"
2000003-32 = "ホログラムの技術自体は今やもう、日常的に使われてるものだし。"
2000003-33 = "先生のクレジットカードとか紙幣とかの、不法コピーを防ぐために光ってるその部分に使われている技術も、ホログラムの一種だから。"
2000003-34 = "この映写機を使えば照度の低い空中に、簡単に言えば夜空に、ありとあらゆる花火を投影できるの。"
2000003-35 = "さっきの黒色火薬を使ったやつみたいに危険でもないし、#nリソースさえあれば半永久的に、夜空に花火が出力できる。"
2000003-36 = "ん？それが問題ではなくて……？"
2000003-37 = "ホログラムの花火だと、感情的な部分は埋められないかも？"
2000003-38 = "でも、もしかしたら逆にホログラムの花火こそが、"
2000003-39 = "花火に特有の「儚さ」っていう特別な感情まで、埋められるかもしれない。"
2000003-40 = "うーん……納得いってなさそうな表情だね。"
2000003-41 = "でも、私より先生の方が花火についてよく知ってると思うから。"
2000003-42 = "そうだね、今回は先生の意見を受け入れることにしよう。"
2000003-43 = "それなら、これはどう？ホログラムの映写機ほどちゃんと実験できてないけど……。"
2000003-44 = "光を噴射しながら飛んで、煙を出して、頂点に達すると派手に爆発する……"
2000003-45 = "ちょっと大きくてごついけど、一般的な花火に一番近いもの。"
2000003-48 = "[ns7] \"これは決して輝かせてはならない憎悪の光だ。\"\n[ns8] \"カッコいいね！\""
2000003-49 = "実際に、とある犯罪組織のアジトがこれによって燦爛と輝く業火に包まれて燃え上がったっていう実績もある。"
2000003-50 = "実際に、とある犯罪組織のアジトがこれによって燦爛と輝く業火に包まれて燃え上がったっていう実績もある。"
2000003-51 = "それを見た人々が叫び声をあげるような反応を示すという点も、花火を打ち上げる時と完全に一致。"
2000003-52 = "うん？これもダメ？#nえ、絶対にダメ？"
2000003-53 = "うーん、残念。#nさっき間違えて爆破させた、普通の花火をまた作るしかないか。"
2000003-54 = "あれはちょっと普通過ぎて、物足りない気もするけど。"
2000003-55 = "……。"
2000003-56 = "はぁ、面目ない。"
2000003-57 = "先生にカッコいい姿を見せたかったのに。"
2000003-58 = "[s] \"今でも十分にカッコいいよ。\""
2000003-59 = "……。"
2000003-60 = "ふふっ、ありがとう。"
2000003-61 = "……あっ、先生。#nそこのスイッチは、触っちゃダメだよ。"
2000003-62 = "その中の一つは、このミサイルの発射スイッチだか――"
2000003-63 = "[s9] （カチッ）\n[s10] 手が滑った。"
2000003-64 = "あっ……。"
2000003-65 = "あっ……。"
2000003-67 = "（キュイイイィィィン）"
2000003-68 = "あー、発射され……。"
2000003-70 = "（ドカアアァァァァン！！）"
2000003-71 = "……。"
2000003-73 = "ミレニアムタワーに命中した巨大な花火、もといミサイルは、ミレニアムの全生徒たちに見えていたらしい。"
