[translation]
33230-1 = "Episódio 23; No Subsolo do Antigo Tabernáculo"
33230-2 = "......Acho que agora é o fim."
33230-3 = "Pois é, não há mais nada depois disso..."
33230-4 = "......"
33230-5 = "Ainda não..."
33230-6 = "Ainda tem... aquilo... no subsolo do Antigo Tabernáculo..."
33230-15 = "Saori...!?"
33230-16 = "Para o subsolo do Antigo Tabernáculo...!"
33230-17 = "O jeito que ela falou parece que ainda tem algum meio restante, precisamos impedi-la!"
33230-23 = "Então ela ainda tinha esse poder..."
33230-24 = "......Eu vou."
33230-25 = "A-Azusa-chan, eu também...!"
33230-26 = "Você está ferida, fique em repouso. Não se preocupe, eu estou bem. Vou parar a Saori e volto logo."
33230-27 = "[s] \"Eu também vou.\""
33230-28 = "......Obrigada, Sensei."
33230-29 = "Azusa-chan, tome cuidado...!"
33230-30 = "......Sim. Eu já estou bem."
33230-35 = "Hifumi, Hanako, Koharu... Já volto."
33230-36 = "Sim!"
33230-37 = "Estaremos esperando."
33230-38 = "T-Tome cuidado, viu!"
33230-42 = "[ns] \"Então, vamos nessa.\""
33230-45 = "Azusa..."
33230-46 = "Saori, vamos acabar com isso."
33230-47 = "......Tudo bem. Vou apostar tudo, farei desta a última batalha."
33230-48 = "......Você ainda acha que pode me vencer num mano a mano, de frente?"
33230-49 = "Não, eu não estou sozinha."
33230-51 = "Ah, Sensei...!"
33230-52 = "Vou acabar com tudo. Com você, e com aquele adulto!"
33230-53 = "Neste mundo onde tudo é vazio, conheça a verdade!!"
33230-58 = "[ns] \"Azusa, vamos.\""
33230-59 = "......Sim."