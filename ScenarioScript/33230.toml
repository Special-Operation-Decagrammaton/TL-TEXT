[translation]
33230-1 = "Episódio 23;No Subsolo da Catedral Antiga"
33230-2 = "……Agora sim acabou, né."
33230-3 = "Pois é, mais que isso já……."
33230-4 = "……."
33230-5 = "Ainda não……."
33230-6 = "Ainda há, no subsolo da catedral antiga…… aquilo……."
33230-15 = "Saori……!?"
33230-16 = "Pro subsolo da catedral antiga……!"
33230-17 = "Foi um jeito de falar de quem ainda tem algum recurso; temos que detê-la!"
33230-23 = "Ainda tinha essa força, é……."
33230-24 = "……Eu vou."
33230-25 = "A-Azusa, eu também……!"
33230-26 = "Com esse ferimento, fica em repouso. Não precisa se preocupar. Eu vou deter a Saori e volto logo."
33230-27 = "[s] \"Eu vou junto.\""
33230-28 = "……Obrigada, Sensei."
33230-29 = "Azusa, se cuida……!"
33230-30 = "……Sim. Eu já estou bem."
33230-35 = "Hifumi, Hanako, Koharu…… eu já volto."
33230-36 = "Sim!"
33230-37 = "Estaremos esperando."
33230-38 = "S-se cuida, viu!"
33230-42 = "[ns] \"Então, vamos?\""
33230-45 = "Azusa……."
33230-46 = "Saori, vamos terminar com isto."
33230-47 = "……Que seja. Apostando tudo, farei desta a última batalha."
33230-48 = "……Você ainda acha que, em 1 contra 1, de frente, consegue me vencer?"
33230-49 = "Não; eu não estou sozinha."
33230-51 = "Gh, o Sensei……!"
33230-52 = "Vou dar um fim em tudo. Em você, e nesse adulto também!"
33230-53 = "Neste mundo em que tudo é vão, conheçam a verdade!!"
33230-58 = "[ns] \"Azusa, vamos.\""
33230-59 = "……Sim."
