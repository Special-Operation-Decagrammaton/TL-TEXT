[translation]
33230-1 = "Episódio 23; No subsolo da Antiga Catedral"
33230-2 = "……Acho que agora é o fim."
33230-3 = "Pois é, não tem mais nada que possamos fazer……."
33230-4 = "……."
33230-5 = "Ainda não……."
33230-6 = "Ainda tem aquilo…… no subsolo da Antiga Catedral……."
33230-15 = "Saori……!?"
33230-16 = "Para o subsolo da Antiga Catedral……!"
33230-17 = "Ela falou como se ainda houvesse algum meio, precisamos impedi-la!"
33230-23 = "Então ela ainda tinha esse poder……."
33230-24 = "……Eu vou."
33230-25 = "A-Azusa-chan, eu também……!"
33230-26 = "Com esse ferimento, fique em repouso. Não se preocupe, eu estou bem. Vou impedir a Saori e volto logo."
33230-27 = "[s] \"Eu também vou.\""
33230-28 = "……Obrigada, Sensei."
33230-29 = "Azusa-chan, tome cuidado……!"
33230-30 = "……Sim. Eu já estou bem."
33230-35 = "Hifumi, Hanako, Koharu…… estou indo."
33230-36 = "Certo!"
33230-37 = "Estaremos esperando."
33230-38 = "T-tome cuidado!"
33230-42 = "[ns] \"Então, vamos lá.\""
33230-45 = "Azusa……."
33230-46 = "Saori, vamos acabar com isso."
33230-47 = "……Muito bem. Vou apostar tudo e fazer desta a nossa última batalha."
33230-48 = "……Você ainda acha que pode me vencer em um duelo direto?"
33230-49 = "Não, eu não estou sozinha."
33230-51 = "Ah, Sensei……!"
33230-52 = "Vou acabar com tudo. Com você e com esse adulto também!"
33230-53 = "Neste mundo onde tudo é vazio, sinta a verdade na pele!!"
33230-58 = "[ns] \"Azusa, vamos.\""
33230-59 = "……Sim."
