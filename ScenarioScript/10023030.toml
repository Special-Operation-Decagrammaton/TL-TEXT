[translation]
10023030-1 = "第3話;時計の無い心臓"
10023030-2 = "「慈愛の怪盗」……って、誰？"
10023030-3 = "「慈愛の怪盗」は、かの悪名高き「七囚人」の一人。#n本当の名は存じておりませんが……"
10023030-4 = "[s1] \"「七囚人」……！？\"\n[s2] \"ワカモと同じ……？\""
10023030-5 = "その通りです。#n「災厄の狐」と呼ばれるワカモは、現れるたびに辺りを焦土と化していきますが……"
10023030-6 = "その通りです。#n「災厄の狐」と呼ばれるワカモは、現れるたびに辺りを焦土と化していきますが……"
10023030-7 = "「慈愛の怪盗」は……ターゲットにしたものは必ず盗んでいくことで有名です。"
10023030-9 = "「怪盗」っていうか……ただの犯罪者じゃん！それに変な名前！"
10023030-10 = "お姉ちゃん……"
10023030-11 = "ほう……「慈愛の怪盗」に対してそのような反応をされるとは……#n流石はC&C。"
10023030-12 = "ですが……「慈愛の怪盗」の所業は、到底無視できるものではありません。#n予告状が届いたが最後。どのような警備も無意味で、宝は奪われてきました……。"
10023030-13 = "もっとも、予告状があまりにも難解なため、盗られるまで何が狙われているのか分からない、というのも大きいのでしょうが。"
10023030-17 = "パンパカパーン！クエスト内容の更新です。次は「慈愛の怪盗」と対決です！"
10023030-18 = "その予告状……わたしたちも見て……良いですか？"
10023030-19 = "ええ、もちろんです。"
10023030-20 = "こちらをどうぞ。"
10023030-22 = "1日に22回、向き合う2人の旅人。"
10023030-24 = "正確な2人。計り知れない20。そして半歩。"
10023030-26 = "月の届かない場所、止まった舞とアンティキティラの裏側。"
10023030-28 = "一度も授与された事の無い、贅沢であるが不遇な剣のもとへ伺います。#n――慈愛の怪盗"
10023030-31 = "これは……？"
10023030-35 = "「慈愛の怪盗」の予告状です。まずもって、これを読み解くのが難しく……"
10023030-36 = "にもかかわらず「慈愛の怪盗」は、「堂々と予告状を送り、盗みを成功させた」と自らの犯行を流布するのです。"
10023030-37 = "ああ、何度読んでも分かりません。#n1日に22回、向き合う2人の旅人とは、一体何を指すのでしょう？"
10023030-41 = "この屋敷に、1日22回も顔を合わせてる人が居るってことじゃないかな？"
10023030-42 = "なに言ってるの、お姉ちゃん。#nそもそもどうやって顔を合わせた回数をカウントするの？"
10023030-44 = "アリス、分かりました！この旅人たちはNPCのことです。#nクエストカウンターのNPCなら、1日に20回どころか、もっと会えます！"
10023030-45 = "アリスちゃん……現実にクエストカウンターのNPCは居ないよ……"
10023030-47 = "そんな事ありません！#nユズは特定の場所に行くと会う事ができ、話をしたらクエストをくれます！"
10023030-49 = "ううぅ……完全には否定できないけど……"
10023030-53 = "[ns] \"1日に22回なら、大体1時間に1回ペースだね……。\""
10023030-54 = "1日は24時間だから、2時間は会わないんですね……"
10023030-55 = "24時間……もしかして……？"
10023030-56 = "すみません……明太郎さん。#nこの屋敷に、アナログ時計はありますか……？"
10023030-57 = "え、ええ……ホールの真ん中に、大きな壁掛けの時計があります……"
10023030-58 = "少し……その時計を見ても良いですか……？"
10023030-59 = "はい、それはもちろんです。もしかして、なにか手掛かりが……？"
10023030-60 = "ユズちゃん、何か分かったの？"
10023030-62 = "わたしの考えが正しければ……この予告状は……"
10023030-64 = "やっぱり……！"
10023030-65 = "ど、どうしたのユズ？#n時間ならスマホで分かるよ？"
10023030-66 = "ううん、違うの。スマホ……というか、デジタル時計じゃ分かりにくくて。"
10023030-67 = "……1行目と2行目の途中までは解読できたと、思う……！"
10023030-69 = "！！！"
10023030-70 = "えっ！？どういう事？どうやって！？"
10023030-72 = "「1日に22回向き合う2人の旅人」は……#nたぶん、アナログ時計の短針と長針のことを言ってるんだと思う。"
10023030-73 = "ですがユズ、1日は24時間です。2回多いです！"
10023030-74 = "そう……わたしも最初はそう思ってた。でもね、アリスちゃん。#n時計の針は午前と午後でそれぞれ11回……#n[ruby=・   ・    ・   ・  ・ ・  ・    ・   ・   ・   ・   ・    ・   ・]合計して22回しか重ならない[/ruby]。"
10023030-75 = "短針は毎分0.5度ずつ移動して、長針は毎分6度ずつ移動するから……#n12時の所だけ2回重なって、残りの20回は違う時刻に重なるんだけど……"
10023030-76 = "11時から12時の間は、針が重ならないから……"
10023030-78 = "おおっ……流石はC&C、驚きの推理力！#nでは、その続きも既に？"
10023030-82 = "えーっと#n「そして半歩。月の届かない場所、止まった舞とアンティキティラの裏側」。"
10023030-83 = "「一度も授与された事の無い、贅沢であるが不遇な剣のもとへ伺います」だよね？"
10023030-84 = "半歩、半歩……ここも時間の事だと思うけど。"
10023030-85 = "半歩……半分……"
10023030-86 = "あ！もしかして30分のことじゃない？"
10023030-87 = "ユズちゃん、時計の針が重なる瞬間で、30分前後になるのって何時か分かる？"
10023030-89 = "それなら、5時27分から7時38分の間……かな？"
10023030-90 = "つまり、怪盗はその時間に侵入してくるという事ですか？"
10023030-91 = "でも「月の届かない場所、止まった舞とアンティキティラの裏側」が分かってないよ……これってどういう意味だろう？"
10023030-96 = "アンティキティラ……アンティキティラ……"
10023030-97 = "んんっ！？"
10023030-98 = "何か、心当たりでもありましたか？"
10023030-99 = "い、いえ何も！アンティキティラの裏側なんて、本当に突拍子も無い話ですね。しかし……「授与された事の無い、贅沢であるが不遇な剣」でしたら、心当たりがあります。"
10023030-100 = "おそらく……明後日から展示される美術品の事でしょう。"
10023030-101 = "こちらになります。"
10023030-106 = "……！"
10023030-107 = "叙任式の絵です。#n主人から剣を渡される事で騎士となる光景を描いた1枚ですね。"
10023030-108 = "絵画に描かれた剣であれば、「一度も授与された事の無い」に当てはまるのでは？"
10023030-109 = "そういう意味では、「不遇」とも言えるでしょう。"
10023030-111 = "言われてみれば……？"
10023030-112 = "……"
10023030-114 = "こちらの絵画は、ちょうどオークションに出品予定の貴重な一品でして、お求めの方も多いはず。"
10023030-115 = "嗚呼、この大切な絵画を狙うだなんて……#n皆様のお力が無ければ、何も出来ずに奪われる様をただ見ているだけでした。"
10023030-116 = "狙われている品も判明したことですし、皆様にはこちらの絵画を全力で守っていただきたく……"
10023030-117 = "え？#n他にも貴重な物があるんじゃ……？"
10023030-118 = "いえいえ！予告状の謎は解けたのですから、後はこれを守っていただければ！#nはっはっは、間抜けな「慈愛の怪盗」め……"
10023030-119 = "まさか奴も、これほど優秀な皆様がいらっしゃるとは、夢にも思わないでしょう！"
10023030-120 = "あはは。そ、そうかな？"
10023030-121 = "でも……"
10023030-125 = "お、お役に立てて……何よりです……"
10023030-126 = "クエストクリアです！#n次は絵を守る連続クエストですね！"
10023030-130 = "そして大変恐縮なのですが、皆様に追加でお願いしたい事がございまして……"
10023030-131 = "……なんでしょうか？"
10023030-132 = "明日から3日間、この屋敷の警備をお任せしても良いでしょうか？"
10023030-133 = "構いませんが……もし、予告状の解が間違ってたら？"
10023030-134 = "もちろん、怪盗の狙いが別にある可能性も否定できません。#n……ですが、皆様が捕らえてくだされば良いだけのこと。"
10023030-135 = "「慈愛の怪盗」は神出鬼没で有名ですが、C&Cの実力の前では赤子も同然。#nはっはっは、そうですよね？"
10023030-136 = "是非ともお願い致します。報酬は十分にご用意しますので……そうですね、"
10023030-137 = "コレくらいでいかがでしょう？"
10023030-141 = "！！！？？"
10023030-143 = "（ほ……本当に、こんな金額を……？）"
10023030-144 = "（1人1台、最新のプライステーションPro7に……ZBOXシリーズZも買えちゃう！いやいや、2台ずつ買ってもお釣りが出るよね！）"
10023030-145 = "（ど、どうしよう？ミドリ！？）"
10023030-146 = "（私に聞かれても！）"
10023030-148 = "[ns] （……まずは落ち着こう）"
10023030-150 = "[ns] \"一度、私たちだけで話し合っても良いでしょうか？\""
10023030-151 = "ああ、これは気が利かず失礼を。それでは、私は席を外しておりますね。"
10023030-155 = "はああああ……ありがとう、先生。#n頭がパンクするところだったよ……。"
10023030-156 = "ど、どうしましょう、先生？#n「七囚人」だなんて、もう私たちの手には負えません……。"
10023030-157 = "帰りたい……ロッカー……心の故郷……。"
10023030-158 = "みんな、どうしてそんな反応をしているのですか……？#nアリス、一体どうすれば良いのでしょう……。"
10023030-159 = "[s3] \"まずは依頼をどうするか決めようか？\"\n[s4] \"本当の事を話して、辞退しようか？\""
10023030-160 = "……依頼を辞退したら、一体どうなるんでしょうか……？"
10023030-161 = "……依頼を辞退したら、一体どうなるんでしょうか……？"
10023030-162 = "たぶん……依頼人は抗議すると思う。#n今になって嘘でしたなんて言ったら、ミレニアム全体の問題になるかも……"
10023030-163 = "そ、そうなったらネル先輩も、絶対怒る……よね？"
10023030-164 = "想像したくない……"
10023030-166 = "ですがモモイ！これはアリスたちに与えられたクエストです！#n一度受注したクエストは最後までやるべきだと、モモイが言っていました。"
10023030-167 = "なのに、破棄しても良いのですか……？"
10023030-168 = "あ、アリス……！も、もちろんその通りなんだけど……！"
10023030-169 = "でも……私たちには荷が重いよ……"
10023030-170 = "[s] \"時には、クエストに逆らう事も必要かもしれないね。\""
10023030-171 = "先生？"
10023030-172 = "それは……どういう？"
10023030-173 = "[s] \"なにも怪盗と戦う必要はないんじゃないかな。\""
10023030-174 = "戦わなくても、良い……？"
10023030-175 = "私、先生の言いたい事が分かったかも！"
10023030-176 = "要は怪盗に何も奪われなければ私たちの勝ちって事でしょ？"
10023030-179 = "！！！"
10023030-181 = "もうここまで来ちゃったし、先生も一緒にいる。#nそれに屋敷の防犯設備もすごいんでしょ？"
10023030-182 = "怪盗と正面から戦ったり、捕まえる必要は無い。#nお宝を盗られなければ良いんだよ！"
10023030-183 = "たしかに、それならまだ可能性はあるかも……"
10023030-184 = "わたし達は……C&C相手に戦った経験もあるし……#nもっと凄い戦いも、してきたから……"
10023030-185 = "それを活かせば……"
10023030-186 = "[s] \"成功したら、報酬が貰えるかもしれない。でも、リスクはあるよ。\""
10023030-187 = "（確かに、その報酬さえあれば……わたし達ゲーム開発部の……）"
10023030-188 = "じゃあ、決まりだね？"
10023030-189 = "はあ……本当に大丈夫かな。"
10023030-190 = "私達ならできるよ！#nそれに、これってC&Cに貸しを作るチャンスじゃない？"
10023030-191 = "本来は、C&Cが受けるはずだったんだし！"
10023030-193 = "アリス、頑張ります！#n先生と一緒なら、アリスたちは無敵です！"
10023030-197 = "……お気持ちは固まったのですね。#n引き受けてくださりありがとうございます。"
10023030-198 = "それでは先ほど申し上げた通り、#n[ruby=・  ・   ・]3日間[/ruby]この屋敷と美術品を守っていただきたく思います。"
10023030-199 = "3日間でいいんですか？"
10023030-200 = "ええ。明日から開催するイベントの期間中だけで構いません。"
10023030-201 = "初日はゲストを集めてパーティーを、2日目は美術品の展示。#nそして最終日に……美術品のオークションを開催する予定です。"
10023030-202 = "……か、怪盗は、その3日のうち、どこかで来る……ということですね……"
10023030-203 = "ええ、おそらく。#n初日はパーティー会場で給仕をしながら守っていただければと思います。"
10023030-205 = "えっ、給仕……？"
10023030-206 = "ええ。木を隠すなら森の中と申しますでしょう？#n正体を隠して会場に紛れるには最適かと。#nちょうど皆様、給仕に最適な格好をなされておりますし。"
10023030-207 = "念のためお伝えしておきますが……ゲストに怪盗が紛れ込んでいる可能性もあります。#n油断なさらぬよう、くれぐれもご注意を。"
10023030-209 = "（何か、引っかかるような……）"
10023030-210 = "（予告状の解は、本当に合っているのかな……？#n　他の可能性もありそうなのに……）"
