[translation]
1012406-1 = "pássaro preto no céu de verão"

1012406-2 = "(Enquanto eu estava descansando um pouco, o mar à noite ficou completamente escuro.)"

1012406-6 = "(Vejo Hasumi vindo do hotel em minha direção)"

1012406-10 = "Professor, você está aqui."

1012406-11 = "Obrigado por esperar."

1012406-12 = "[s1] \"Não, na verdade, está certo!\"\n[s2] \"Tinha que ser dessa vez.""

1012406-15 = "Não...? Você tem algum plano?"

1012406-16 = "No entanto, nada em particular neste momento――"

1012406-17 = "[s3] \"Eu queria te mostrar...\"\n[s4] \"Falando em verão!""

1012406-20 = "Professor... o que isso significa?"

1012406-21 = "[ns5] \"Jan!\"\n[ns6] (Mostra o conjunto de fogos de artifício que ele tirou)"

1012406-24 = "Fogos de artifício...?"

1012406-28 = "Na verdade, agora você já experimentou brincar no mar com seu professor."

1012406-29 = "Também fizemos castelos de areia, nos enterramos na areia, nadamos e até partimos melancia... embora não pudéssemos jogar vôlei de praia."

1012406-30 = "E finalmente, fogos de artifício."

1012406-34 = "...Essas são todas as coisas que listei anteriormente como “coisas para fazer na praia no verão”."

1012406-35 = "[s7] \"Sim, pensei que alguém quisesse fazer isso.\"\n[s8] \"Além disso, acho que alguém passou para outra criança... e se sentiu sozinho.\""

1012406-38 = "...No início, era apenas uma ideia trivial."

1012406-39 = "Descobri que existia um jogo assim e comecei a divagar..."

1012406-40 = "Queria que você se lembrasse disso..."

1012406-41 = "[s9] \"É a ideia de Hasumi do ``melhor mar de verão''. \"\n[s10] \"Eu queria te dar isso de presente. \""

1012406-46 = "[ns] \"Obrigado como sempre, Hasumi.\""

1012406-47 = "...O professor é muito esperto."

1012406-48 = "[s11] \"Ah, começou!\"\n[s12] (Olhando para os fogos de artifício florescendo no céu noturno)"

1012406-54 = "[ns] \"É lindo...\""

1012406-56 = "Sim... realmente..."

1012406-57 = "Não consigo tirar os olhos de você..."

1012406-59 = "(Nós dois fizemos fila e assistimos aos fogos de artifício até que os fogos de artifício que havíamos preparado acabassem.)"

1012406-61 = "Um momento divertido é... é realmente um momento fugaz."

1012406-62 = "Eu gostaria de poder ficar assim para sempre..."

1012406-63 = "[s] \"Talvez seja o mar de verão, incluindo esse sentimento.\""

1012406-64 = "Hehe... isso mesmo. Não fazia ideia que a praia no verão pudesse ser tão divertida."

1012406-65 = "No próximo verão, gostaria de agendar uma data apenas para brincar."

1012406-66 = "[s13] \"Que bom que você gostou!\"\n[s14] \"Eu também me diverti!""

1012406-69 = "Sim, foi uma experiência maravilhosa, mas..."

1012406-70 = "O mais importante é com quem você passa seu tempo."

1012406-71 = "次の夏も……ご一緒に……。"

1012406-72 = "...Não, não é nada. Não é algo que eu seja muito ganancioso..."

1012406-77 = "...Sensei, devemos voltar logo?"

