[translation]
1012406-1 = "夏空の黒い鳥"
1012406-2 = "（少し休んでいる間に、夜の海はすっかり暗くなっていた）"
1012406-6 = "（ホテルの方から、ハスミがこちらへと向かってくるのがみえる）"
1012406-10 = "先生、ここにいらしたのですね。"
1012406-11 = "お待たせしました。"
1012406-12 = "[s1] \"いや、むしろちょうどいいよ！\"\n[s2] \"この時間じゃないとダメだったんだ。\""
1012406-15 = "ダメ……？何かご予定でも？"
1012406-16 = "ですが、この時間では特に何も――"
1012406-17 = "[s3] \"見せたかったんだ……。\"\n[s4] \"夏と言えば！っていうやつをね。\""
1012406-20 = "先生……それはどういう？"
1012406-21 = "[ns5] \"ジャーン！\"\n[ns6] （取り出した花火セットを見せる）"
1012406-24 = "花火……ですか。"
1012406-28 = "確かに、これで海の遊びを、先生と一通り体験したことになりますね。"
1012406-29 = "砂のお城を作り、砂に埋まり、水泳、スイカ割りも……ビーチバレーだけは叶いませんでしたが。"
1012406-30 = "そして、最後に花火。"
1012406-34 = "……どれも、私が以前「夏の海でやること」として挙げていたものです。"
1012406-35 = "[s7] \"そう、誰かがやりたがっていたなって思ってね。\"\n[s8] \"あと、その誰かは他の子に譲って……寂しかったんじゃないかなって。\""
1012406-38 = "……最初は、些細な思いつきだったんです。"
1012406-39 = "「こんな遊びがあるらしい」と知り、とりとめなく……。"
1012406-40 = "それを覚えてくださっていたなんて……。"
1012406-41 = "[s9] \"ハスミが考えた「最高の夏の海」だからね。\"\n[s10] \"それを、プレゼントしたかったんだ。\""
1012406-46 = "[ns] \"いつもありがとう、ハスミ。\""
1012406-47 = "……先生は本当にずるい方です。"
1012406-48 = "[s11] \"あっ、始まった！\"\n[s12] （夜空に花開く花火を見つめる）"
1012406-54 = "[ns] \"綺麗だね……。\""
1012406-56 = "はい……本当に……。"
1012406-57 = "目が離せません……。"
1012406-59 = "（用意した花火が尽きるまで、二人で並んで花火を眺めた）"
1012406-61 = "楽しい時間というのは……本当に一瞬ですね。"
1012406-62 = "ずっとこのまま過ごしていたいくらいです……。"
1012406-63 = "[s] \"その気持ちも含めて、夏の海なのかも。\""
1012406-64 = "ふふ……そうですね。夏の海がこんなに楽しいとは、知らなかったです。"
1012406-65 = "次の夏は、ただ遊ぶだけの日程を組みたいものです。"
1012406-66 = "[s13] \"楽しんでくれたみたいでよかった！\"\n[s14] \"私も楽しかったよ！\""
1012406-69 = "ええ、どれも素敵な経験でしたが……。"
1012406-70 = "何よりも大切なのは、誰と過ごしたか、ですね。"
1012406-71 = "次の夏も……ご一緒に……。"
1012406-72 = "……いえ、何でもありません。あまり、欲を出すものではないですね……。"
1012406-77 = "……先生、そろそろ戻りましょうか。"
