[translation]
84305300300-5 = "あー……。"
84305300300-6 = "これで大体片付いたっぽいな。"
84305300300-10 = "んで、まだやんのか？"
84305300300-15 = "ひ、ひぃっ！！"
84305300300-16 = "や、やりません！降参！！"
84305300300-22 = "くっ……。"
84305300300-23 = "くぅっ……！！一度ならず二度までも！"
84305300300-24 = "コケにされたこと、忘れませんから。いつか――"
84305300300-26 = "いつか必ず……この借りは返してやりますから！！"
