[translation]
1006703-1 = "バニーの噂"
1006703-2 = "シャーレ・オフィス"
1006703-4 = "本日もシャーレは平和ですね。良いことです。"
1006703-5 = "あ、先生。そちらのポテチを取っていただけますか？"
1006703-10 = "[ns1] \"トキが気を許してくれるのは嬉しいけど……\"\n[ns2] \"流石に緩みすぎじゃない！？\""
1006703-14 = "ん？#nそれは重大な問題でしょうか？"
1006703-15 = "……違うのでしたら、気にする必要はありませんね。#n分かっています、ポテチの補充はお任せください。"
1006703-17 = "（最近、一つ悩みができた）"
1006703-18 = "（それは……トキがシャーレに馴染みすぎているということだ）"
1006703-19 = "（数日前、それとなくトキに話を振ってみたが……）"
1006703-21 = "どうして毎日のようにシャーレで過ごしているのか、ですか？"
1006703-22 = "理由はいくつかありますが……#n一番は私の所属が明確になっていない事にあります。"
1006703-23 = "C&C所属、コールサインゼロフォーとして、#nいまだ先輩方と行動を共にできない状況ですので。"
1006703-24 = "そんな私にとって、ここシャーレに優る場所はありません。"
1006703-25 = "キヴォトスの様々な情報が集まってきますし、#n有事の際は迅速に対応が可能です。"
1006703-26 = "エージェントとして自身の立場を顧みるのであれば、#n誰しもシャーレで過ごすと思いますが……間違っておりましたか？"
1006703-28 = "（トキの言い分には一理あるため、何も言い返す事ができず……）"
1006703-29 = "（今日に至るまでズルズルと……）"
1006703-31 = "あむ……しょっぱいものを食べ続けていたら、喉が渇きました。#n先生のお茶を頂きます。"
1006703-41 = "あ、茶柱が立っていますね。今日は良いことがあるかもしれません。"
1006703-42 = "落ち着く香り……飲みやすいですね。#n先生が緑茶にも造詣が深いとは知りませんでした。"
1006703-43 = "[s] \"えっと……贈り物だから、あんまり詳しくはないんだよね。\""
1006703-44 = "そうでしたか。想定通りの答えで、少しガッカリしました。"
1006703-45 = "[ns] \"勝手にガッカリされたんだけど！？\""
1006703-46 = "本日のランチは――"
1006703-47 = "……いえ、何でもありません。私のことはお気になさらず。#n先生が自分の分だけ注文し、お腹を空かせた私の隣で食事を堪能されたとしても……"
1006703-48 = "私の心は極めて穏やかです。何も思うところはありません。#nええ……何も思うところはありませんとも。"
1006703-56 = "[ns3] \"すみません、シャーレですが……\"\n[ns4] \"スペシャルヘルシーランチセット、2人前で……\""
1006703-59 = "おや、2人前を注文されたのですね。#n先生には量が多いでしょうに。"
1006703-60 = "……仕方ありませんね。私が一緒に食べて差し上げます。"
1006703-61 = "[s] \"うん……健康のためには野菜とタンパク質も大切だからね。\""
1006703-62 = "まるで、普段の私が不健康な食生活をしているかのような言い草ですね。"
1006703-63 = "[s] \"違った……？\""
1006703-64 = "……。"
1006703-65 = "……過去は過去です。#nいつまでも過ぎたことを気にしていても仕方ありませんよ。"
1006703-66 = "[s] \"せめて取り繕おうよ！？\""
1006703-72 = "[ns] \"そういえば、トキ……\""
1006703-74 = "……お呼びでしょうか？"
1006703-75 = "もちろん、日が暮れたら自分のオフィスに戻る予定です。"
1006703-76 = "具体的な帰る時間、ですか……？"
1006703-77 = "……。"
1006703-78 = "もしかして、私がここにいては……邪魔、でしょうか……？"
1006703-79 = "[s5] \"いやいや！そうじゃないんだけど！\"\n[s6] \"ここにいても暇じゃないのかなって！\""
1006703-82 = "退屈など致しません。"
1006703-83 = "……ここに居ても問題ないのですね？"
1006703-84 = "[s] \"……うん、トキが大丈夫なら。\""
1006703-85 = "それでは遠慮なく……"
1006703-86 = "……え？シャーレに変な噂が？"
1006703-88 = "（その噂とは……）"
1006703-90 = "聞きました？#n最近、シャーレの先生が……"
1006703-91 = "ええ、近所で噂になってますからね！#n生徒たちに、毎日バニーガールの格好をさせているんだとか。"
1006703-92 = "私たちと街で会った時は、あんな優しそうに挨拶してくれるのに……"
1006703-93 = "ついさっきも、バニー服でシャーレを訪れる生徒がいたみたいですよ？"
1006703-94 = "（……のような内容だった）"
1006703-98 = "（それをトキに話すと……）"
1006703-99 = "毎日バニーガールの格好でシャーレを出入りしているのは、私だけです。#n先生が聞いた噂は、「生徒たち」だったのでしょう？"
1006703-100 = "つまりは事実無根の噂話ですね。"
1006703-101 = "先生が私にバニーガールの格好をさせている、というのも間違っていると思いますが……"
1006703-102 = "……それとも、私が気づいていないだけで、本当は着てほしかったんですか？"
1006703-103 = "[ns] \"それはないから！！\""
1006703-104 = "では、何も気にする必要はありませんね。"
1006703-105 = "そのような噂話、無視していればそのうち収まります。#n人の噂も七十五日と言いますから。"
1006703-106 = "よって、この問題は解決したという事で。"
1006703-107 = "[s] \"本当に大丈夫なのかな……？\""
1006703-108 = "ええ、大丈夫ですとも。"
1006703-109 = "世間体……？#n……よく分かりません。この話はそろそろ終わりにいたしましょう。"
1006703-114 = "あ、出前が届いたようですね。もうお腹が限界……"
1006703-118 = "私が受け取ってきます。"
1006703-122 = "先生、ペンを落としましたよ……#nえ？先生が取りに行かれるのですか？"
1006703-123 = "……"
1006703-124 = "私の方が扉に近いですが……承知しました。"
1006703-126 = "（ギリギリ世間体は保たれたが、食事はあまり喉を通らなかった……）"
