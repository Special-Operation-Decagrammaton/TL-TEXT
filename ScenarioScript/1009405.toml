[translation]
1009405-1 = "メイドの休息！"
1009405-2 = "[ns] \"あれ？行き先はゲーム開発部の部室じゃないの？\""
1009405-3 = "う～ん、最初はそのつもりだったんだけど……。"
1009405-4 = "色んな部活から、先生の休息をぜひ支援したいって言われて。"
1009405-5 = "ダイエット部、生活健康部、トレーニング部……#nそれに、エンジニア部まで！"
1009405-6 = "聞いただけで不安になってきた？#n大丈夫！心配しすぎだって！"
1009405-7 = "トレーニング部とエンジニア部は、先生も慣れてるでしょ？#n他の部活は初めて聞いたかもしれないけど！"
1009405-8 = "ダイエット部は食事制限や運動をしないで、科学的な方法で#n体づくりをすることを目的とした健全な部活！"
1009405-9 = "生活健康部は合法的な人体実験で、体質改善を目指している#n真っ当な部活なんだからね！"
1009405-10 = "[s] \"説明を聞いたらもっと不安になってきた！\""
1009405-11 = "大丈夫大丈夫！#nミレニアムに先生を傷つけるような生徒なんて滅多にいないよ！"
1009405-12 = "んん？悪意がないのはわかってるって？#nだったら、何も心配することないじゃん！"
1009405-13 = "みんなのことを信じよう！#nきっと身も心もスッキリするからさっ！"
1009405-14 = "もう使用後のレビューを書くって約束しちゃったし。#n今さら逃げられないよ！"
1009405-15 = "というわけで……最初に試すのは――"
1009405-16 = "この、超高周波マッサージマシン！"
1009405-17 = "説明しよう！超高周波マッサージマシンとは！#n筋肉をほぐす効果を最大化するために……！"
1009405-18 = "一般的なマッサージマシンを遥かに凌駕した周波数になるように#n改良したものである！"
1009405-19 = "……って、マニュアルに書かれてるね。"
1009405-20 = "使い方は簡単だよ！#nマッサージが必要な場所にこうやってマシンを装着して……。"
1009405-21 = "スイッチをオンにすればオッケー！"
1009405-23 = "（不安に震えながら、マッサージマシンのスイッチを入れた……）"
1009405-29 = "[ns] \"うわぁぁあぁぁあぁぁ！？\""
1009405-30 = "し、振動がぁぁぁ凄いぃぃ！あぁぁ頭の中まで揺れてるぅぅぅ！"
1009405-31 = "うわぁぁぁ……め、めまいがぁぁぁぁ！"
1009405-32 = "は、はやくぅぅぅスイッチをぉぉぉ、オフにぃぃぃ……！#n指が動かないぃぃぃ……！"
1009405-33 = "せせせ先生ぇぇ！助けてぇぇぇ！！"
1009405-35 = "（何とかして、マッサージマシンの電源を切った……）"
1009405-40 = "はぁ、はぁ……あ、危なかったぁ……。"
1009405-41 = "う、うぅっ！つ、次！#n次は絶対に大丈夫！さあ、特殊EMSスーツの出番だ！"
1009405-42 = "[s] \"特殊EMSスーツ？\""
1009405-43 = "これはね……運動はしたくない！でも、トレーニング効果は欲しい！#nそんな人のために開発された特別なスーツ！"
1009405-44 = "[s1] \"運動せずにトレーニングの効果が！？\"\n[s2] \"画期的だね！さっそく試してみよう！\""
1009405-47 = "ふっふっふっ……！そう言うと思った！"
1009405-48 = "私も、キツイ運動はイヤだし……。"
1009405-49 = "このスーツは筋肉を電気で刺激するから……。"
1009405-50 = "筋繊維も強化されて、持久力もアップするんだって！"
1009405-52 = "（モモイと一緒にマニュアルを読みつつ、EMSスーツを試してみた）"
1009405-59 = "うわぁぁぁあぁぁぁっ！？！？"
1009405-60 = "し、刺激が強いぃぃぃぃっ！"
1009405-61 = "き、筋肉がびりびりするぅぅぅぅ……！"
1009405-62 = "先生ぇ！助けてぇぇ！！"
1009405-65 = "（どうにかしてEMSスーツの電源を切った……）"
1009405-68 = "[ns] \"これ……本当に大丈夫……？\""
1009405-69 = "つ、次っ！これは絶対に間違いないよ！#nなんたって、トレーニング部とエンジニア部の共同開発！"
1009405-70 = "ええっ、不安も倍増した！？#nへーき！へーきっ！たまには信じてあげようよ！"
1009405-71 = "見てみて！これはただのストレッチローラーだから！"
1009405-72 = "……マニュアルによると。#n研究から分かった慢性的な疲労の原因は、不自然な姿勢……。"
1009405-73 = "そこで、姿勢を維持する体幹を強化するために開発されたのが#nこのAI搭載のストレッチローラー！"
1009405-74 = "このローラーは使う人の状態を自動的にチェックして#n最適な形に変化するらしいよ！"
1009405-75 = "どれどれ……。#nまずローラーの上に座って、体を前後に動かす、と――"
1009405-80 = "う、うわぁぁぁ！？"
1009405-81 = "このローラー！は、はやすぎるっ！しかも、勝手に動いてぇぇ！#nど、どこかに連れてかれるぅぅ！先生ぇぇ――！"
1009405-82 = "[s3] \"た、助けてあげたいけど、私も……！\"\n[s4] \"うわぁぁ！壁にぶつかる――！\""
1009405-86 = "（その後も休息のために準備された様々なマシンを試した結果……）"
1009405-87 = "（モモイと一緒に、筋肉痛で倒れることになってしまった）"
