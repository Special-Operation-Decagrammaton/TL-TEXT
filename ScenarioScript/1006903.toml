[translation]
1006903-1 = "Prove-o primeiro!"

1006903-2 = "O Genbutsu Shokai"

1006903-3 = "(Fui contatado pela Lumi e visitei a Câmara de Comércio de Gemba)."

1006903-8 = "Bem-vindo, doutor! Obrigado por ter vindo ao #n."

1006903-9 = "Fico feliz que eles estejam ansiosos, mas ......#nAcho que fico um pouco envergonhado quando eles esperam tanto. ...... haha."

1006903-10 = "[s1]\"Ah, a propósito, ......\"\n[s2]\"Você não perguntou a todos na Assembleia Geral? \"\n[s2]""

1006903-13 = "Ah~......"

1006903-14 = "Tentei falar com ela. ......"

1006903-15 = "Disseram-me que eu estava ocupado praticando minha culinária!"

1006903-16 = "Todo mundo tem um desejo genuíno de enfrentar a comida, mas #n-cooperação é um pouco, haha!"

1006903-17 = "[s] (algo suspeito ......)"

1006903-24 = "Bem, então vamos começar com o primeiro item."

1006903-25 = "Não precisa se preocupar com mais nada. Basta nos dizer o que você pensa com sinceridade."

1006903-26 = "......? Bem, se lhe for servido ...... um prato tão ousadamente verde, você não ficará surpreso, certo? Não se preocupe, é esse tipo de comida!"

1006903-31 = "(Prove a comida de Lumi)."

1006903-35 = "[ns3] \"\"\"......! \"\n[ns4]\"Amargo! Muito amargo para minha língua. ...... \"\n[ns5] \"Puxa. O que há nesse ......! \""

1006903-39 = "Ah ...... Eu sabia. #nOkay, então lembre-se do que você acabou de provar."

1006903-43 = "[ns] \"Ok, não! \""

1006903-44 = "Bem, bem, bem, você vai ter que ficar comigo mais um pouco."

1006903-48 = "(Prove o próximo prato)."

1006903-52 = "[ns6] \"Agora a quantidade de gordura! \"\n[ns7] \"É tão apimentado que chega a ser nojento! "

1006903-55 = "Entendo. ...... Mas acho que é isso que devo fazer até agora. #nSim, este é o último."

1006903-56 = "[s]\"Perdoe-me já. ....... \""

1006903-57 = "Haha."

1006903-58 = "Espero que você não diga isso e que fique comigo até o fim."

1006903-59 = "Está tudo bem, está tudo bem. Tenho certeza de que não vai se arrepender, certo?"

1006903-60 = "Além disso, há muitas coisas que acontecem na vida. #n, você é um adulto, sabe disso, não sabe?"

1006903-65 = "(...... pronto e pegando os pauzinhos para o último prato)"

1006903-69 = "[ns8] \"Oh, isso é ......? \"\n[ns9] \"É a primeira vez que estou provando, mas é ...... muito gostoso! \""

1006903-72 = "Ufa, você finalmente conseguiu."

1006903-73 = "É difícil fazer o melhor uso do amargor dos ingredientes."

1006903-74 = "Mas não vou adicionar ...... sal a gosto."

1006903-75 = "Então, desta vez, decidi ser criativo com a gordura e o tempero."

1006903-76 = "Primeiro, para reduzir a afirmação de amargor, adicione riqueza com gordura para suavizar o sabor. ......"

1006903-77 = "Achei que, se acrescentasse um pouco de picante, ele teria um sabor refrescante."

1006903-78 = "Com base na reação do professor, parece que estou no caminho certo."

1006903-79 = "[\"Você sempre teve que inventar coisas como essa. \""

1006903-80 = "...... À minha maneira, tenho minhas próprias obsessões."

1006903-81 = "O cozimento é delicado, portanto, uma pequena mudança no tempero pode resultar em um prato completamente diferente."

1006903-82 = "...... repetidamente tentando e falhando. #nBem, eu estaria mentindo se dissesse que não é um trabalho árduo."

1006903-83 = "[s10] \"Acho que é muito admirável. \"\n[s11] \"...... Acho que entendo por que não há alunos da Câmara de Comércio de Xuanwu agora. \""

1006903-86 = "Haha, alguns dias eles comem, só por precaução. ......"

1006903-87 = "Bem, tudo está bem quando acaba bem, certo?"

1006903-88 = "Tenho alguns pratos que gostaria de fazer adaptando esse protótipo."

1006903-89 = "A base do sabor já foi decidida, tudo o que resta é finalizá-la!"

1006903-90 = "Você terá um gostinho de tudo, então espere ansiosamente!"

1006903-91 = "[s12]\"Esse é o problema. ......\"\n[s13]\"Na verdade, estou tão cheio disso. ......\""

1006903-94 = "O quê? Degustação em outro momento?"

1006903-95 = "Mas essas coisas precisam tomar forma antes que a ideia escape. ......"

1006903-99 = "Ei, ...... doutor, aonde você está indo?"

1006903-101 = "(Tenta sair enquanto Lumi está de costas, mas é rapidamente descoberta e não tem sucesso)"

1006903-102 = "(Embora meu estômago estivesse no limite, eu tinha que provar a comida que saía uma após a outra. ......)"

