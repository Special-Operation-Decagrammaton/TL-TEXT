[translation]
1006903-1 = "Prove primeiro!"

1006903-2 = "Genbu Shokai"

1006903-3 = "(Visitei Genbu Shokai após ser contatado por Rumi)"

1006903-8 = "Bem-vindo, Sensei! #nObrigado por ter vindo."

1006903-9 = "Fico feliz que as pessoas estejam ansiosas por isso, mas...#nAcho que fico um pouco envergonhado quando as pessoas têm tantas expectativas sobre mim...Ahaha."

1006903-10 = "[s1] \"Agora que penso nisso...\"\n[s2] \"Você não perguntou a todos do Genbu Shokai?\""

1006903-13 = "Ah..."

1006903-14 = "Tentei ligar para você, mas..."

1006903-15 = "Disseram-me que estava ocupado praticando culinária!"

1006903-16 = "A paixão de todo mundo pela culinária é genuína, mas falta um pouco de #coordenação, haha!"

1006903-17 = "[s] (Parece meio suspeito...)"

1006903-24 = "Pois bem, vamos começar pelo primeiro item."

1006903-25 = "Não há necessidade de se preocupar muito. Por favor, diga-me sua opinião honesta."

1006903-26 = "...? Bem... não tem como evitar que eu fique surpreso quando me servem um prato tão verde. Está tudo bem, porque esse é o tipo de comida que é!"

1006903-31 = "(Prove a culinária de Rumi)"

1006903-35 = "[ns3] \"I-Isso é...!?\"\n[ns4] \"Amargo! É tão amargo que minha língua dói...! \"\n[ns5] \"Geho. O que há nisso...!?\""

1006903-39 = "Ah... acho que é isso. #nOk, então lembre-se de qual é o gosto agora."

1006903-43 = "[ns] \"Ok, por que não!?\""

1006903-44 = "Bem, fique comigo um pouco mais."

1006903-48 = "(Prove o próximo prato)"

1006903-52 = "[ns6] \"Desta vez, a quantidade de gordura!\"\n[ns7] \"É tão picante que você pode engasgar!?\""

1006903-55 = "Entendo... mas até agora está como esperado. #nSim, este é o último."

1006903-56 = "[s] \"Por favor, me perdoe...\""

1006903-57 = "Ahaha."

1006903-58 = "Eu ficaria feliz se você não dissesse isso e ficasse comigo até o fim."

1006903-59 = "Está tudo bem, está tudo bem. Tenho certeza que você não vai se arrepender, certo?"

1006903-60 = "Além disso, muitas coisas acontecem quando você está vivo. #n, o Sensei é adulto, então você entende isso?"

1006903-65 = "(...eu me decido e estico meus pauzinhos para o último prato.)"

1006903-69 = "[ns8] \"Oh, o que...?\"\n[ns9] \"Esta é a primeira vez que provo isso... é tão delicioso!\""

1006903-72 = "Hehe, você finalmente conseguiu."

1006903-73 = "É difícil aproveitar o amargor dos ingredientes."

1006903-74 = "Mas...eu pessoalmente não gosto de adicionar sal para ajustar o sabor."

1006903-75 = "Então, dessa vez resolvi experimentar algo diferente com gordura e tempero."

1006903-76 = "Em primeiro lugar, para suprimir o amargor, adicionar riqueza com gordura e suavizar o sabor..."

1006903-77 = "Acho que adicionar um pouco de tempero daria um sabor refrescante."

1006903-78 = "A julgar pela reação do Sensei, parece que acertei no alvo."

1006903-79 = "[s] \"É assim que você sempre tem ideias.\""

1006903-80 = "...Tenho minhas próprias preferências particulares."

1006903-81 = "Os pratos são delicados, então basta mudar um pouco os temperos para fazer um prato completamente diferente."

1006903-82 = "...Você tenta de novo e de novo, apenas para falhar de novo e de novo. #nBem, eu estaria mentindo se dissesse que não foi difícil."

1006903-83 = "[s10] \"Acho que é uma coisa muito admirável.\"\n[s11] \"...Acho que entendo porque não há alunos do Genbu Shokai agora.\""

1006903-86 = "Haha, tem dias que ele come..."

1006903-87 = "Bem, está tudo bem quando acaba bem, certo?"

1006903-88 = "Existem alguns pratos que gostaria de fazer usando este protótipo."

1006903-89 = "Agora que a base do sabor está decidida, só falta finalizar!"

1006903-90 = "Vou deixar você provar tudo, então, por favor, aguarde ansiosamente!"

1006903-91 = "[s12] \"É isso...\"\n[s13] \"Na verdade, já estou cheio...\""

1006903-94 = "foto? Você tentará novamente na próxima vez?"

1006903-95 = "Mas esse tipo de coisa tem que tomar forma antes que a ideia desapareça..."

1006903-99 = "Espere um minuto... Sensei, onde você está indo?"

1006903-101 = "(Ele tentou voltar quando Rumi virou as costas, mas foi rapidamente localizado e fracassou.)"

1006903-102 = "(Mesmo que meu estômago tenha chegado ao limite, acabei degustando os pratos que iam saindo um após o outro...)"

