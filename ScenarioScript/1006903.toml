[translation]
1006903-1 = "まずは味見して！"
1006903-2 = "玄武商会"
1006903-3 = "（ルミから連絡をもらって、玄武商会を訪れた)"
1006903-8 = "いらっしゃい、先生！#n来てくれてありがとね。"
1006903-9 = "楽しみにしてもらえるのは嬉しいけど……#nそんなに期待されると、ちょっと照れくさいかな……あはは。"
1006903-10 = "[s1] \"そういえば……\"\n[s2] \"玄武商会のみんなには頼まなかったの？\""
1006903-13 = "あ～……"
1006903-14 = "声は掛けてみたんだけど……"
1006903-15 = "料理の練習で忙しいって言われちゃって！"
1006903-16 = "みんな料理に向き合う気持ちは本物だけど、#n協調性がちょっとね、あはは！"
1006903-17 = "[s] （なんか怪しいような……）"
1006903-24 = "それじゃ、まずは一品目。"
1006903-25 = "余計な気遣いは無用だよ。率直な感想を教えて。"
1006903-26 = "……？まぁ……こんな思いっきり緑色の料理を出されたら、#n驚くのも仕方ないか。大丈夫、そういう料理だから！"
1006903-31 = "（ルミの料理を味わう）"
1006903-35 = "[ns3] \"こ、これは……！？\"\n[ns4] \"苦っ！苦すぎて舌が……！ \"\n[ns5] \"げほっ。これ、何が入ってるの……！？\""
1006903-39 = "あー……やっぱりそっか。#nよし、それじゃ今の味を覚えておいてね。"
1006903-43 = "[ns] \"よし、じゃないよ！？\""
1006903-44 = "まぁまぁ、もうちょっと付き合ってよ。"
1006903-48 = "（次の料理を味わう）"
1006903-52 = "[ns6] \"今度は脂の量が！\"\n[ns7] \"むせるくらい辛いんだけど！？\""
1006903-55 = "なるほど……でも、ここまでは想定通りかな。#nはい、これが最後だよ。"
1006903-56 = "[s] \"もう許して……。\""
1006903-57 = "あははっ。"
1006903-58 = "そう言わずに、最後まで付き合ってくれると嬉しいな。"
1006903-59 = "大丈夫、大丈夫。きっと後悔しないと思うよ？"
1006903-60 = "それに、生きてれば色々あるものだからね。#nって、先生は大人だから、それくらい分かってるか。"
1006903-65 = "（……覚悟を決めて、最後の料理に箸を伸ばす）"
1006903-69 = "[ns8] \"あ、あれ……？\"\n[ns9] \"初めての味だけど……すごく美味しい！\""
1006903-72 = "ふふっ、やっと成功したね。"
1006903-73 = "食材の苦味をうまく活かすのは難しくてさ。"
1006903-74 = "でも……塩を加えて味を整えるのは、私としてはなしなんだよね。"
1006903-75 = "それで、今回は脂と辛味で工夫してみようと思ったんだ。"
1006903-76 = "まずは苦味の主張を抑えるために、脂でコクを加えて味をまろやかにして……"
1006903-77 = "さらにちょっぴり辛味を加えれば、さっぱりした味わいになるかなって。"
1006903-78 = "先生のその反応を見るに、あたしの狙い通りみたいだね。"
1006903-79 = "[s] \"いつも、こうやって工夫していたんだね。\""
1006903-80 = "……あたしなりに、こだわりがあるんだ。"
1006903-81 = "料理は繊細だから、少し味付けを変えるだけで、まったく違う料理になる。"
1006903-82 = "……何度も挑戦しては、失敗の繰り返し。#nそりゃあ、大変じゃないって言ったら、嘘になるかもね。"
1006903-83 = "[s10] \"すごく立派なことだと思う。\"\n[s11] \"……玄武商会の生徒が今いない理由、分かったような気がする。\""
1006903-86 = "あはは、一応食べてくれる日もあるんだけどね……。"
1006903-87 = "ま、終わりよければ全て良し、ってことで？"
1006903-88 = "今回の試作品を応用して、何品か作ってみたい料理があるんだ。"
1006903-89 = "味のベースは決まったから、あとは仕上げるだけ！"
1006903-90 = "全部味見してもらうから、期待して待っててね！"
1006903-91 = "[s12] \"そのことなんだけど……\"\n[s13] \"実は、もうお腹いっぱいで……\""
1006903-94 = "え？試食はまた今度？"
1006903-95 = "でも、こういうのはアイデアが逃げる前に形にしないと……"
1006903-99 = "ちょっと……先生、どこ行くの？"
1006903-101 = "（ルミが後ろを向いた隙に帰ろうとしたが、すぐ見つかり失敗に終わってしまう）"
1006903-102 = "（お腹が限界を迎えても、次々と出てくる料理の味見をする事になった……）"
