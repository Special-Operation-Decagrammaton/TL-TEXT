[translation]
1014008-1 = "A Watching Fox"
1014008-2 = "(One day, when a General Student Council meeting dragged on...)"
1014008-3 = "(Around the time I left the station to return to Schale...)"
1014008-8 = "[ns1] \"The streetlights...?\"\n[ns2] \"...The road is dark.\""
1014008-12 = "[ns] \"Whoa!?\""
1014008-14 = "[ns3] (It's dark, I almost tripped.)\n[ns4] (There's no one around, either...)"
1014008-18 = "I heard a robber appeared in this town recently."
1014008-19 = "They say they follow people from deserted places and steal their wallets and stuff."
1014008-22 = "[ns] \"I need to hurry...\""
1014008-26 = "[ns] (Is someone following me...?)"
1014008-30 = "[ns5] \"H-Help me!\"\n[ns6] \"I-I don't have anything valuable...!\""
1014008-33 = "...What are you saying?"
1014008-37 = "Don't tell me you mistook me for a robber?"
1014008-38 = "[s7] \"It's you, Kurumi... Thank goodness.\"\n[s8] \"...I thought I was being tailed.\""
1014008-41 = "I saw you on my way back from the convenience store, so I followed you... #nI knew it was you, Sensei."
1014008-42 = "If you were that scared, why were you walking alone at night?"
1014008-43 = "...I told you it's okay to contact me."
1014008-44 = "[s] \"I thought I'd be fine since I'd arrive soon.\""
1014008-45 = "You're really naive."
1014008-46 = "If you're like that, you're going to get attacked by bad people someday, you know?"
1014008-47 = "[s9] \"More importantly, do you have a flashlight or something?\"\n[s10] \"It's too dark to see the road.\""
1014008-50 = "A flashlight? I don't have one on me right now."
1014008-51 = "If it's my smartphone's flashlight..."
1014008-55 = "Ugh, I only have 10% battery left."
1014008-56 = "[s] \"What about your flash shield, Kurumi?\""
1014008-57 = "This emits a temporary burst of light, so it's not suited for illuminating the road."
1014008-58 = "Besides, if I did that in the middle of the night, it would be a nuisance to the #nneighbors, wouldn't it?"
1014008-59 = "[s] \"You're absolutely right...\""
1014008-65 = "Here, hold my hand."
1014008-66 = "I might not look at it, but I have good night vision, so I don't think you'll trip if you #nfollow me."
1014008-67 = "...Are you wondering if it's really necessary to hold hands?"
1014008-68 = "I-It doesn't mean anything weird, okay!? This is actually a commonly used tactic!"
1014008-69 = "D-Don't misunderstand! Come on, hold my hand properly!"
1014008-73 = "(I walked through the dark alley while holding Kurumi's hand.)"
1014008-75 = "[ns] \"You're... used to these kinds of situations, Kurumi.\""
1014008-76 = "Of course. It's a pointman's job to guide the squad."
1014008-77 = "Even in dark places, I stand at the front and light the way. It's the usual."
1014008-78 = "But I can't let my guard down."
1014008-79 = "If I were to take the wrong path in the dark..."
1014008-80 = "I'd end up putting everyone in danger."
1014008-81 = "With every step I take, a wave of fear washes over me."
1014008-83 = "...Wondering if I'm guiding everyone in the right direction."
1014008-84 = "[s11] \"The darkness makes you more anxious, doesn't it.\"\n[s12] \"Because unless you take a step forward, you can't see anything.\""
1014008-88 = "Right. That's what makes me anxious——"
1014008-89 = "[s] \"But, you're holding my hand right now, aren't you?\""
1014008-90 = "…………。"
1014008-91 = "[s13] \"If it looks like you're about to lose your step, Kurumi, then I'll support you.\"\n[s14] \"That's exactly why a platoon has backup.\""
1014008-94 = "Hehe, you've started saying things that sound like a special forces member too, #nSensei."
1014008-95 = "Yes. Holding hands isn't just about leading someone forward."
1014008-96 = "So, Sensei——"
1014008-100 = "You absolutely cannot let go of my hand."
1014008-102 = "(After that, I returned to Schale still holding Kurumi's hand.)"