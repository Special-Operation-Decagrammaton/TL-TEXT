[translation]
1014008-1 = "The Fox Seeing Me Off"
1014008-2 = "(One day, when the General Student Council meeting ran late)"
1014008-3 = "(By the time I left the station and headed back to Schale...)"
1014008-8 = "[ns1] \"The streetlights are...?\"\n[ns2] \"...The road is dark.\""
1014008-12 = "[ns] \"Whoa!?\""
1014008-14 = "[ns3] (It's so dark, I'm about to trip)\n[ns4] (And there's nobody around...)"
1014008-18 = "I heard a mugger has been appearing in this city lately."
1014008-19 = "They say they follow people from deserted areas and steal their wallets and such."
1014008-22 = "[ns] \"I need to hurry...\""
1014008-26 = "[ns] (Is someone following me...?)"
1014008-30 = "[ns5] \"P-please, help!\"\n[ns6] \"I-I don't have anything valuable on me...!\""
1014008-33 = "...What are you saying?"
1014008-37 = "Don't tell me you mistook me for a mugger?"
1014008-38 = "[s7] \"Kurumi? Oh, thank goodness.\"\n[s8] \"...I thought I was being followed.\""
1014008-41 = "I saw you on my way back from the convenience store and followed you, but... I suppose it really was you, Sensei."
1014008-42 = "If you're that scared, why were you walking down a dark road alone?"
1014008-43 = "...I told you that you could contact me, didn't I?"
1014008-44 = "[s] \"I thought it would be fine since I'd be there soon.\""
1014008-45 = "You really are naive."
1014008-46 = "If you keep that up, you'll get attacked by some bad person eventually."
1014008-47 = "[s9] \"More importantly, do you have a flashlight?\"\n[s10] \"It's too dark to see the path.\""
1014008-50 = "A flashlight? I don't have one on me right now."
1014008-51 = "I have my smartphone's light function, but..."
1014008-55 = "Ugh, I only have 10% battery left."
1014008-56 = "[s] \"What about Kurumi's flash shield?\""
1014008-57 = "That's for emitting a temporary burst of light; it's not suited for illuminating a path."
1014008-58 = "Besides, if I did that in the middle of the night, it would disturb the neighbors, wouldn't it?"
1014008-59 = "[s] \"You're absolutely right...\""
1014008-65 = "Here, take my hand."
1014008-66 = "I have good night vision, so if you follow me, I don't think you'll fall."
1014008-67 = "...Are you asking if it's necessary to hold hands?"
1014008-68 = "I-it's not like that! This is actually a commonly used tactic!"
1014008-69 = "D-don't misunderstand! Come on, hold my hand properly!"
1014008-73 = "(I walked through the dark alley while holding Kurumi's hand)"
1014008-75 = "[ns] \"Kurumi... you seem used to situations like this.\""
1014008-76 = "Of course. A point man's job is to lead the squad."
1014008-77 = "Even in the dark, I stand at the front and light the way. It's routine for me."
1014008-78 = "But I can't let my guard down."
1014008-79 = "If I take the wrong path in the darkness..."
1014008-80 = "I'd be putting everyone in danger."
1014008-81 = "With every step I take, fear washes over me."
1014008-83 = "...I wonder if I'm really leading everyone in the right direction."
1014008-84 = "[s11] \"Darkness makes the anxiety grow, doesn't it?\"\n[s12] \"Because until you take that first step, you can't see anything.\""
1014008-88 = "Yes. That's what makes me anxious—"
1014008-89 = "[s] \"But you're holding my hand right now, aren't you?\""
1014008-90 = "…………"
1014008-91 = "[s13] \"If Kurumi ever loses her footing, I'll be there to support you.\"\n[s14] \"That's exactly why a squad has a rearguard.\""
1014008-94 = "Hehe, you're starting to sound like a special forces operative, Sensei."
1014008-95 = "Yes. The hands we hold aren't just for leading the other person forward."
1014008-96 = "So, Sensei—"
1014008-100 = "Don't you ever let go of this hand."
1014008-102 = "(After that, I returned to Schale while still holding Kurumi's hand)"