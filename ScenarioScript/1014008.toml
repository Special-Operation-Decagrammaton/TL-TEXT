[translation]
1014008-1 = "見送るキツネ"
1014008-2 = "（連邦生徒会の会議が長引いたある日）"
1014008-3 = "（駅を出てシャーレへ復帰する頃……）"
1014008-8 = "[ns1] \"街灯が……？\"\n[ns2] \"……道が暗い。\""
1014008-12 = "[ns] \"うわっ！？\""
1014008-14 = "[ns3] （暗いから、転びそうになる）\n[ns4] （ひとけがないし……）"
1014008-18 = "最近この街に強盗が現れたんだって。"
1014008-19 = "ひとけのない場所からあとをつけて財布とかを盗むらしいわ。"
1014008-22 = "[ns] \"急がないと……。\""
1014008-26 = "[ns] （誰かにつけられてる……？）"
1014008-30 = "[ns5] \"た、助けてください！\"\n[ns6] \"か、金目のものはありません……！\""
1014008-33 = "……なに言ってるの？"
1014008-37 = "まさか、私を強盗だと勘違いしてたの？"
1014008-38 = "[s7] \"クルミか……よかった。\"\n[s8] \"……尾行されたのかと思ったよ。\""
1014008-41 = "コンビニ帰りに見かけたから追ってたけど……やっぱり先生だったのね。"
1014008-42 = "そこまで怯えるなら、なんでひとりで夜道を歩いてたの？"
1014008-43 = "……私に連絡していいって言ったでしょ。"
1014008-44 = "[s] \"すぐ着くから大丈夫だと思って。\""
1014008-45 = "本当に甘いわね。"
1014008-46 = "そんなんじゃ、いつか悪い子に襲われちゃうわよ？"
1014008-47 = "[s9] \"それより、懐中電灯とか持ってる？\"\n[s10] \"暗すぎて道が見えなくて。\""
1014008-50 = "懐中電灯？今は持ってないけど。"
1014008-51 = "スマホのライト機能なら……。"
1014008-55 = "げっ、バッテリーが残り10％しかないわ。"
1014008-56 = "[s] \"クルミの閃光盾は？\""
1014008-57 = "これは一時的に光を放つもので、道を照らすのには向いてないの。"
1014008-58 = "それに、こんな夜中にそんなことしたら近隣の迷惑になるでしょ？"
1014008-59 = "[s] \"おっしゃる通りです……。\""
1014008-65 = "ほら、私の手握って。"
1014008-66 = "こう見えて夜目が利くから、私について来れば倒れることはないと思うわ。"
1014008-67 = "……手を握る必要はあるのかって？"
1014008-68 = "べ、別に変な意味じゃないわよ！？これは実際よく使われる戦術なんだから！"
1014008-69 = "ご、誤解しないで！ほら、ちゃんと手握って！"
1014008-73 = "（クルミの手を握ったまま、暗い路地を歩いた）"
1014008-75 = "[ns] \"クルミは……こういう状況に慣れているんだね。\""
1014008-76 = "当然。ポイントマンは、隊を導くのが仕事だもの。"
1014008-77 = "暗い場所でも先頭に立って、道を照らす。いつものことよ。"
1014008-78 = "でも気を緩めることはできないわ。"
1014008-79 = "暗闇の中、私が進む道を間違ってしまったら……。"
1014008-80 = "みんなを危険にさらすことになっちゃうんだから。"
1014008-81 = "一歩進むたびに、恐怖が押し寄せてくるの。"
1014008-83 = "……私は、みんなを正しい方向へ導けているのかなって。"
1014008-84 = "[s11] \"暗闇は、不安が大きくなるよね。\"\n[s12] \"一歩踏み出さない限り、何も見えないからさ。\""
1014008-88 = "そう。それが私を不安にさせ――"
1014008-89 = "[s] \"でも、今は私の手を握っているでしょう？\""
1014008-90 = "…………。"
1014008-91 = "[s13] \"クルミが足を踏み外しそうになったら、そのときは私が支える。\"\n[s14] \"だからこそ、小隊には後ろ盾が存在するんだよ。\""
1014008-94 = "ふふっ、先生も特殊部隊っぽいことを言うようになったわね。"
1014008-95 = "ええ。繋いだ手は、相手を前へ導くためだけじゃない。"
1014008-96 = "だから、先生――"
1014008-100 = "絶対、この手を離しちゃダメよ。"
1014008-102 = "（その後、クルミと手を握ったままシャーレへ帰ってきた）"
