[translation]
90100080-1 = "Episódio 8: Além da Miragem"
90100080-3 = "Aqui é FOX3, câmbio."
90100080-4 = "Horário padrão de Kivotos: 1000. Temperatura de 28 graus Celsius, velocidade do vento de aproximadamente 3 nós."
90100080-5 = "Junto com a FOX4, estou monitorando o Ponto Romeu, na direção #n0-3-0, em busca do fenômeno singular conhecido como 'Espantalho Branco'."
90100080-6 = "A temperatura do solo está subindo bem, mas ainda não há sinal de miragens."
90100080-10 = "Que tédio. Ficar esperando por um alvo que a gente nem sabe quando vai aparecer..."
90100080-11 = "Ah, Otogi — quer dizer, FOX4! Não interrompa a frequência!"
90100080-12 = "Não precisa ser tão detalhista, né? #nÉ bem mais divertido ficar conversando."
90100080-13 = "Aqui é FOX4. Como a FOX3 disse, não tem nem sinal de miragem, muito menos de fenômeno singular. #nAcho que o solo ainda não está quente o suficiente."
90100080-14 = "……Mas, falando nisso, tudo bem esperar na sombra hoje?"
90100080-15 = "É bem mais tranquilo do que antes, então não tenho do que reclamar."
90100080-19 = "Aqui é FOX1. Sem alterações na missão. Foquem na miragem agora."
90100080-20 = "Ainda não temos provas concretas contra o suspeito, mas se observarmos o local sob a mesma perspectiva da vítima, talvez encontremos alguma pista."
90100080-21 = "Então... quer dizer que se a gente ficar olhando para a miragem, algo vai aparecer?"
90100080-22 = "Tipo um zumbi distorcido pelo calor vindo na nossa direção?"
90100080-23 = "I-Isso é impossível, não acha!?"
90100080-24 = "Até confirmarmos a identidade do 'Espantalho Branco', não podemos descartar nada como 'impossível'."
90100080-25 = "……Era brincadeira. A capitã realmente não entende piadas, né?"
90100080-30 = "Aqui é FOX2. Observando a direção 2-1-0 no Ponto Sierra. #nPor aqui também não há nada de anormal por enquanto."
90100080-31 = "Mas, mudando de assunto... será que o Sensei não vem hoje?"
90100080-32 = "Ah, ele disse que tinha outro trabalho para fazer."
90100080-33 = "Por quê? Você precisava de algo?"
90100080-34 = "N-Não, não é nada disso..."
90100080-35 = "Não sei explicar... estou com um pressentimento ruim."
90100080-36 = "Fico um pouco insegura só de pensar em agir sem a ajuda do Sensei de repente."
90100080-37 = "Ué, a gente sempre resolveu as coisas sozinhas até agora, não resolveu?"
90100080-38 = "Bom, é verdade que quando o Sensei está por perto, ele traz uns doces gostosos e tudo fica mais divertido."
90100080-39 = "Você não acha que o Sensei é tipo um oficial de suprimentos, acha...?"
90100080-40 = "E falando nisso, FOX4... você engordou desde que saiu do Departamento Correcional, né?"
90100080-41 = "É músculo!"
90100080-44 = "FOX2. Aconteceu alguma coisa?"
90100080-45 = "Não. Como eu disse, é só um pressentimento. Não ligue para isso."
90100080-46 = "Mas a intuição da Niko costuma estar certa. Não podemos ignorar."
90100080-47 = "……Isso não parece a FOX1. Um pouco insegura e guiada pelo instinto."
90100080-48 = "Você não disse para não tirarmos conclusões precipitadas até termos todas as informações?"
90100080-49 = "Diferente do planejamento de operações, no campo, a intuição também pode ser uma arma."
90100080-50 = "Nunca se é cauteloso o suficiente."
90100080-51 = "Às vezes o corpo lembra das coisas por causa da experiência... faz sentido."
90100080-52 = "Mas o que me preocupa não é um ataque surpresa do inimigo, ou um atirador, ou algo do tipo..."
90100080-53 = "Talvez a própria operação tenha uma armadilha. Aquele medo fundamental de, sem perceber, acabar apontando a arma para um aliado."
90100080-54 = "Por exemplo... é, como naquela 'Caça ao Coelho'."
90100080-55 = "…………."
90100080-56 = "……FOX1. A Presidente do Conselho Estudantil... ela era realmente a Presidente?"
90100080-57 = "Obviamente. A FOX2 também viu as imagens e as fotos, não viu?"
90100080-58 = "Sim. O rosto, o comportamento... sem dúvida, era a Presidente do Conselho Estudantil que eu me lembro."
90100080-59 = "Mas talvez seja porque estamos lidando com ela... a ansiedade não vai embora durante a missão."
90100080-60 = "Se pelo menos o Sensei estivesse aqui do nosso lado..."
90100080-61 = "Mas não podemos ficar chamando o Sensei todo dia, ele é muito ocupado."
90100080-65 = "Entendido. Vou manter isso em mente por enquanto."
90100080-67 = "Aqui é FOX4, a temperatura externa atingiu 31 graus."
90100080-68 = "A tremulação do calor está começando a aparecer."
90100080-69 = "Consegue ver algo que parece um espantalho?"
90100080-70 = "Nem um pouco. Ah, mas se se sobrepor à luz branca refletida na janela, talvez... pareça um espantalho branco?"
90100080-72 = "Hmm..."
90100080-73 = "FOX4?"
90100080-74 = "Não, é que estou um pouco tonta... talvez seja por ficar olhando para a tremulação do calor por muito tempo..."
90100080-75 = "Falando nisso, ouvi de um membro da equipe que estava em uma missão em Odisseia."
90100080-76 = "Disseram que, se você vir um aluno olhando fixamente para a superfície da água, precisa tirá-lo de lá imediatamente."
90100080-77 = "Por quê?"
90100080-79 = "Não me deram detalhes, mas dizem que o movimento das ondas hipnotiza as pessoas ou algo assim."
90100080-80 = "Por isso, antes que a pessoa se jogue, você deve afastá-la da água."
90100080-82 = "Isso não é... tipo aquela história do 'canto da sereia' dos livros infantis?"
90100080-83 = "Bem, é mais realista do que um monstro metade humano, metade peixe cantando em cima de uma rocha."
90100080-84 = "Então, FOX4, tome cuidado. #nVocê pode acabar sendo atraída pela tremulação do calor e arrastada para o outro lado do asfalto."
90100080-85 = "Imagina. Já fizemos operações parecidas várias vezes, não já?"
90100080-86 = "Além disso, como tenho uma parceira tagarela aqui do lado, não vai ser tão fácil assim—"
90100080-91 = "...Ué?"
90100080-92 = "O que foi?"
90100080-93 = "Ali... será que sempre teve um campo de grama ali?"
90100080-94 = "Campo de grama? Onde, em que direção?"
90100080-95 = "Do outro lado da estrada. Dá para ver um campo de grama sob o céu azul. #nNão está no mapa... seria uma miragem?"
90100080-96 = "A grama está alta... e tem um espantalho... e atrás dele, uma pessoa de roupas brancas rindo—"
90100080-97 = "Hã...? Isso! Não é o 'espantalho branco'!?"
90100080-98 = "FOX4, quais são as coordenadas!? Onde!?"
90100080-110 = "É assustador... na direção de onde vem esse vento abafado..."
90100080-115 = "Todos diziam que era um 'espantalho branco', mas... aquilo não é um espantalho."
90100080-116 = "Ele se move por vontade própria. Ele não consegue existir de outra forma... #nComo não pode interferir se não for observado, ele dança vestindo roupas brancas chamativas."
90100080-117 = "Do que você está falando!? FOX4! Se controla!!"
90100080-118 = "Está vindo... está vindo! Uma onda cinzenta gigante, como se estivesse tendo espasmos, contorcendo-se, como se estivesse dançando, contorcendo-se—"
90100080-119 = "Contorcendo, contorcendo, contorcendo—"
90100080-129 = "OTOGI!!"
90100080-135 = "Q-o que foi!? Ouvi um disparo..."
90100080-136 = "Ponto Romeu, responda. O que aconteceu?"
90100080-140 = "Ai, ai... parece que a FOX3 ficou estranha de repente! #nEla veio correndo do nada e me deu um soco na cabeça!"
90100080-141 = "Hã!? Você está louca!? Sabe quem eu sou?"
90100080-145 = "Por que você pergunta isso... estou vendo esse seu peito reto de sempre bem na minha frente."
90100080-146 = "Não brinca comigo! Quantos dedos você está vendo aqui!?"
90100080-147 = "Dois...? O que foi, aconteceu alguma coisa?"
90100080-151 = "Ainda bem... #nQue o número de vítimas não aumentou..."
90100080-152 = "FOX3. Relate a situação."
90100080-153 = "Aqui é a FOX3. A FOX4, que estava observando a tremulação do calor até agora pouco—"
90100080-154 = "Disse que viu o 'espantalho branco'."
90100080-155 = "Eu!?"
90100080-156 = "Sim. Não se lembra? #nVocê começou a dizer coisas estranhas como 'um campo de grama sob o céu azul' e 'ondas cinzentas'."
90100080-157 = "Não me lembro de nada."
90100080-158 = "Eu estava ouvindo a Kurumi falar sobre Odisseia enquanto #nolhava para a tremulação do calor pela mira."
90100080-159 = "Por que será? Será que tive um devaneio?"
90100080-160 = "Se você está bem, é o que importa. Houve algum dano causado pelo disparo acidental de agora pouco?"
90100080-161 = "Ugh... vou verificar agora."
90100080-162 = "Espero que não tenha atingido nada importante."
90100080-166 = "……Ué?"
90100080-167 = "O-o que houve? Não me diga que você acertou um civil ou algo do tipo—"
90100080-168 = "Não, é que... para começar, não há marca de bala. #nMas a munição não falhou, então eu definitivamente disparei."
90100080-169 = "Hã? Tá querendo dizer que uma bala de calibre .50 simplesmente evaporou no ar?"
90100080-170 = "……Será que era um fantasma de verdade, afinal?"
90100080-173 = "FOX1, tem alguma ideia do que possa ser?"
90100080-174 = "Ainda não posso afirmar nada. Mas precisamos organizar a situação."
90100080-178 = "Todos os membros, retornem ao QG imediatamente. Recolham os equipamentos e se reúnam no ponto de encontro."
90100080-180 = "Entendido!"
90100080-182 = "Próximo episódio: Pistas"
