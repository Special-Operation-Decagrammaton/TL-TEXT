[translation]#[Texto Final. - Filipe 13/07.]
90100080-1 = "Episódio 8; Do Outro Lado da Miragem"
90100080-3 = "Reportando, aqui é FOX3."
90100080-4 = "Horário padrão de Kivotos: 10h00.#nTemperatura de 28°C, vento de uns 3 nós."
90100080-5 = "No ponto Romeo com a FOX4,#nmonitorando no azimute 0-3-0 a ocorrência do fenômeno anômalo――#n vulgo \"espantalho branco\"."
90100080-6 = "A temperatura do chão sobe conforme o esperado,#nmas ainda sem sinal de miragem."
90100080-10 = "Que tédio, véi. Esperar um alvo que ninguém sabe quando vem."
90100080-11 = "Ei, Otogi―― digo, FOX4! Não invade o canal!"
90100080-12 = "Precisa se apegar a esses detalhes?#nBater papo é bem mais divertido."
90100080-13 = "Aqui é FOX4. Como disse a FOX3, nada de fenômeno anômalo; nem miragem comum subiu ainda.#nDeve faltar calor no chão."
90100080-14 = "……Aliás, tá certo mesmo esperar na sombra hoje?"
90100080-15 = "Tá bem mais de boa que antes, reclamar eu não vou."
90100080-19 = "Aqui é FOX1. A operação não mudou. Foco na miragem."
90100080-20 = "Ainda não temos prova decisiva do suspeito; mas, observando a cena com a mesma visão das vítimas, podemos captar pistas."
90100080-21 = "Ou seja…… se ficar encarando a miragem, alguma coisa aparece?"
90100080-22 = "Tipo um zumbi todo retorcido no formato da miragem vindo andando~"
90100080-23 = "I-Isso não existe, tá?!"
90100080-24 = "Até confirmarmos a identidade do \"espantalho branco\", não podemos descartar nada como \"impossível\"."
90100080-25 = "……Brincadeira, ué.#nA capitã não entende uma piada mesmo, né."
90100080-30 = "Aqui é FOX2. No ponto Sierra, observando o azimute 2-1-0.#nPor aqui também tudo normal até agora."
90100080-31 = "Mudando de assunto…… o Sensei não vem hoje?"
90100080-32 = "Ah, ele disse que tinha outro compromisso hoje."
90100080-33 = "Que foi? Precisava dele pra algo?"
90100080-34 = "N-Não, não é isso……"
90100080-35 = "Sei lá…… tô com um mau pressentimento."
90100080-36 = "Agir de repente sem o apoio do Sensei me deixou meio inquieta."
90100080-37 = "Ué, até hoje a gente sempre resolveu tudo sozinha, não?"
90100080-38 = "Bom, com o Sensei junto sempre aparece um docinho gostoso, isso é verdade."
90100080-39 = "Você acha que o Sensei é o quê, oficial de suprimentos……?"
90100080-40 = "Aliás, FOX4…… você engordou depois que saiu da Agência Correcional, né?"
90100080-41 = "É músculo!"
90100080-44 = "FOX2. Aconteceu algo?"
90100080-45 = "Não. Como eu disse, é só um pressentimento.#nNão liga."
90100080-46 = "Mas a intuição da Niko costuma acertar.#nNão dá pra ignorar."
90100080-47 = "……Nem parece a FOX1. Meio insegura,#nmeio no feeling."
90100080-48 = "Não era você que dizia pra não julgar#nnada sem informação completa?"
90100080-49 = "Diferente do planejamento, em campo a intuição também pode ser uma arma."
90100080-50 = "Cautela nunca é demais."
90100080-51 = "Com experiência, o corpo às vezes lembra sozinho…… faz sentido."
90100080-52 = "Mas o que me incomoda não é emboscada, nem sniper, nada disso……"
90100080-53 = "É que talvez exista uma armadilha na própria operação.#nComo se, sem perceber, a gente estivesse apontando a arma pros aliados――#numa inquietação pela raiz."
90100080-54 = "Tipo…… é. Como na \"Caça ao Coelho\" daquela vez."
90100080-55 = "…………"
90100080-56 = "……FOX1. A Presidente do Conselho……#nera mesmo a Presidente do Conselho?"
90100080-57 = "Claro. Você também conferiu os vídeos e as fotos, FOX2."
90100080-58 = "Sim. O rosto, os gestos…… era, sem dúvida, a Presidente das minhas lembranças."
90100080-59 = "Mas, vai ver é por estarmos lidando com um Lore…… a inquietação não passa desde que a missão começou."
90100080-60 = "Se ao menos o Sensei estivesse aqui do lado……"
90100080-61 = "Mas também não dá pra convocar o Sensei, ocupado como é, todo santo dia."
90100080-65 = "Certo. Por ora, fica registrado."
90100080-67 = "Aqui é FOX4. Temperatura externa chegou a 31°C."
90100080-68 = "A miragem já vai começar a subir."
90100080-69 = "Consegue ver algo de espantalho?"
90100080-70 = "Nadica. Ahh, mas…… se juntar com a luz branca refletida nas janelas, até que parece um espantalho branco…… será?"
90100080-72 = "Hmm……"
90100080-73 = "FOX4?"
90100080-74 = "Não, só uma tontura…… deve ser de tanto encarar a miragem……"
90100080-75 = "Falando nisso, ouvi de uma operadora que serviu na Odysseia."
90100080-76 = "Se vir uma aluna encarando a superfície da água em silêncio, tem que afastar na hora."
90100080-77 = "Por quê?"
90100080-79 = "Não ouvi os detalhes, mas parece que o balanço das ondas hipnotiza as pessoas."
90100080-80 = "Então é pra afastar da água antes que a pessoa se jogue sozinha."
90100080-82 = "Isso é tipo…… o \"canto das sereias\" dos livros infantis?"
90100080-83 = "Bom, é mais realista que um monstro metade peixe cantando na pedra."
90100080-84 = "Então se cuida, FOX4.#nVai que a miragem te seduz e te arrasta pro outro lado do asfalto."
90100080-85 = "Que nadaa. Já fizemos um monte de operação parecida."
90100080-86 = "E, com uma parceira tagarela do lado, não é fácil assim me――"
90100080-91 = "……Ué?"
90100080-92 = "Que foi?"
90100080-93 = "Tinha…… um campo aberto ali?"
90100080-94 = "Campo? Onde, que direção?"
90100080-95 = "Do outro lado da estrada. Um campo verde sob o céu azul.#nNão tá no mapa…… miragem?"
90100080-96 = "O mato tá alto…… tem um espantalho……#ne atrás dele, uma pessoa de branco sorrindo――"
90100080-97 = "Hã……? Isso! Não é o \"espantalho branco\"?!"
90100080-98 = "FOX4, coordenadas! Pra onde?!"
90100080-110 = "Pro lado de onde sopra…… esse vento abafado e arrepiante……"
90100080-115 = "Todo mundo falava \"espantalho branco\", mas…… aquilo não é espantalho."
90100080-116 = "Ele se move com vontade própria. Sem isso, não consegue existir……#nSó interfere se for observado; por isso dança com essa roupa branca chamativa."
90100080-117 = "Que papo é esse?! FOX4! Acorda!!"
90100080-118 = "Vem…… tá vindo!#nUma onda cinza gigante, como uma convulsão, kune-kune, como uma dança, kune-kune――"
90100080-119 = "kunekunekunekunekunekune――"
90100080-129 = "OTOGI!!"
90100080-135 = "Q-Quê?! Eu ouvi um tiro……"
90100080-136 = "Ponto Romeo, responda. O que houve?"
90100080-140 = "Aaai…… a FOX3 pirou do nada!#nVeio correndo e me deu um cascudo na cabeça!"
90100080-141 = "Hã?! VOCÊ que pirou! Sabe quem eu sou?"
90100080-145 = "Pra que essa pergunta…… o peito tábua de sempre tá bem na minha frente."
90100080-146 = "Sem gracinha! Quantos dedos você tá vendo?!"
90100080-147 = "Dois……? Que foi, hein?"
90100080-151 = "Ainda bem……#nO número de vítimas não aumentou……"
90100080-152 = "FOX3. Relate a situação."
90100080-153 = "Aqui é FOX3. A FOX4, que observava a miragem até agora――"
90100080-154 = "disse que viu o \"espantalho branco\"."
90100080-155 = "Eu?!"
90100080-156 = "Você mesma. Não lembra?#nComeçou a falar coisa estranha: \"um campo verde de céu azul\", \"uma onda cinza\"……"
90100080-157 = "Não lembro de nada."
90100080-158 = "Eu achava que tava olhando a miragem pela luneta,#nouvindo a Kurumi contar a história da Odysseia."
90100080-159 = "Estranho. Será que sonhei acordada?"
90100080-160 = "O importante é que está bem.#nA bala disparada agora há pouco causou algum dano?"
90100080-161 = "Uu…… vou conferir."
90100080-162 = "Tomara que não tenha voado pra lugar errado."
90100080-166 = "……Ué?"
90100080-167 = "Q-Que foi? Não me diga que acertou um cidadão――"
90100080-168 = "Não, é que…… não tem marca de bala.#nMas a munição não falhou; o disparo aconteceu, com certeza."
90100080-169 = "Hã? Uma bala calibre .50 evaporou no ar, é isso?"
90100080-170 = "……Vai ver era fantasma de verdade."
90100080-173 = "FOX1, alguma hipótese?"
90100080-174 = "Ainda não posso afirmar. Mas precisamos organizar a situação."
90100080-178 = "Todas as operadoras, retornem ao QG agora.#nRecolham o equipamento e reúnam-se no ponto de encontro."
90100080-180 = "Copiado!"
90100080-182 = "Próximo Episódio;A Pista"