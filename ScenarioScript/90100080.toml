[translation]
90100080-1 = "Episódio 8: Do Lado de Lá da Miragem"
90100080-3 = "Checagem de rádio, aqui FOX3."
90100080-4 = "Fuso horário travado nas 1000 pelo relógio de Kivotos. Temperatura escaldante de 28 graus Celsius. Velocidade dos ventos morta na casa dos três nós."
90100080-5 = "A minha unidade faz par com a FOX4 no ponto tático Romeo.#nMiras apontadas a azimute 0-3-0, engatilhadas para flertar com a anomalia do 'Espantalho Branco'."
90100080-6 = "As termográficas do solo mostram que o asfalto tá fervendo como panela de pressão, porém... nada de distorção ótica de vapor brotando da pista ainda."
90100080-10 = "Haah... Que tédio fúnebre. Ficar caçando fantasma com hora marcada pra não aparecer é o auge da falência bélica."
90100080-11 = "Ei, Otogi―― quer dizer, Soldado FOX4! Corta o chiado no canal criptografado!"
90100080-12 = "Deixa a rádio fluir e para de afiar as regras, Sargento.#nA fofoca lubrifica o tempo sob o sol pra gente não surtar na trincheira."
90100080-13 = "O rádio da FOX4 tá com a Kurumi. A gente não atirou bala nem numa fumaça inofensiva de calor na pista até agora. O asfalto não chegou na temperatura pra fritar vapor."
90100080-14 = "……E, mudando de assunto, você tá lidando com o calor sob a farda e o suor aí no esconderijo de boas?"
90100080-15 = "A fornalha de fora e o asfalto tavam me cozinhando viva. Aqui na moita pelo menos venta um pouco por debaixo das roupas."
90100080-19 = "Aqui é a FOX1 assumindo. Zero mutação nos escopos da missão. Colem as pupilas nessas Miragens Térmicas de calor no piche."
90100080-20 = "A falta de corpos criminais e provas não freia a tática.#nInfiltrar as retinas das vítimas, sugar as paisagens com o mesmo olho que os mortos usaram... é o anzol pra puxar a linha de chumbo."
90100080-21 = "Traduz a tese: A capitã prega que se nós queimarmos os olhos fitando o mormaço fumegante do cimento, a aberração salta das chamas...?"
90100080-22 = "Tipo, um defunto contorcido gotejando vapor brotando do asfalto arrastando a perna fúnebre e derretendo na tela~?"
90100080-23 = "Q-Que absurdo nojento e irreal!! O manual de caça rejeita anomalias alienígenas!"
90100080-24 = "Enquanto os nossos laudos não dissecarem e esmagarem o núcleo atômico dessa farsa do 'Espantalho', engula a foice do 'Impossível'. Os nossos manuais não rechaçam hipóteses no escuro."
90100080-25 = "……Nossa, o sarcasmo morre atirado nas trincheiras de chumbo perto da Capitã... Ela não sabe relaxar, incrível."
90100080-30 = "A escuta cai na FOX2. Bússola marcando Ponto Sierra, alinhando a mira na janela 2-1-0.#nZero respingos assombrados no meu radar, tudo mortífero de tão quieto."
90100080-31 = "Rompe o silêncio de radar um segundo... o Sensei não vai pisar no asfalto pra grudar na gente hoje?"
90100080-32 = "Pelo canal seguro, ele disse que a burocracia do gabinete na Schale arrastou o pescoço dele pra outra emergência civil."
90100080-33 = "Hum? Qual o atrito? A ausência sentida e a carência bateram na tenente~?"
90100080-34 = "Pausa a provocação. A pauta não é flerte juvenil e eu não sinto falta dos toques dele..."
90100080-35 = "A espinha dorsal congela... Um cheiro de enxofre e traição no ar suja meu faro."
90100080-36 = "Descer ladeira e rodar tática cega nas ruas de Kivotos sem as mãos dele cobrindo nossas costas me engatilha fobia paramilitar."
90100080-37 = "Ué, lavagem cerebral sedutora do Sensei já comeu sua mente? A nossa artilharia sempre lavou o asfalto com sangue e esmagou milícias solitariamente como exército."
90100080-38 = "Eu admito as escusas que, quando a retaguarda charmosa e rica do Sensei tá na rua com a gente, o banquete de lanches, doces caros e bebidas chiques rola solto sem parar e isso alivia demais a língua."
90100080-39 = "O meu ouvido registrou essa difamação... Você atirou o prestígio e aura moral do cara no lixo pra reduzir a patente do Sensei a garçom particular e sugar os doces dele?!"
90100080-40 = "E pra botar o esqueleto na balança FOX4... A gordura do seu quadril e as coxas duplicaram desde que a Correcional chutou nosso rabo pra fora, ne? Devorou luxos demais, sua gulosa~"
90100080-41 = "É MASSA MAGRA DE TREINO MILITAR E DESENVOLVIMENTO FEMININO, SUA VACA INVEJOSA!"
90100080-44 = "Alô, FOX2. O radar de caça pinicou algum alerta tático no meio do show de vocês?"
90100080-45 = "Rádio limpo. Como cantei pra elas, o suor na espinha e a agonia é intuição fantasma apenas. Aborta a neurose."
90100080-46 = "Negativo. O histórico das suas glândulas e o seu faro letal não dão alarme falso, Niko. Ignorar intuição de Sargento é crime."
90100080-47 = "……Essa flexibilidade mística destoa da máquina tática dura e inflexível da FOX1. O jargão de faro instintivo é muito passional."
90100080-48 = "O seu dogma principal não pregava 'Esmague a impulsividade na poeira e só morda se os laudos na mesa fecharem a cota empírica'?"
90100080-49 = "Nas simulações frias da mesa burocrática, o papel pede precisão. Mas na calçada de sangue vivo... O faro predatório engatilha e é fuzil vivo."
90100080-50 = "A trincheira grita que a desconfiança esquizofrênica é o primeiro escudo contra morte certa."
90100080-51 = "Veteranos calejados não raciocinam na rua, as entranhas balísticas assumem o controle sozinhas e sentem o chumbo chegando... Não descarto a tese."
90100080-52 = "Entretanto, a paranóia na minha espinha não mapeia um laser de snipers nas sombras ou armadilhas de gangue..."
90100080-53 = "A intuição sussurra de que a raiz, o cordão umbilical, a base dessa guerra é o tumor. Como se os fios se rompessem amanhã e, na cegueira, o nosso pelotão enfiasse a bala pelas costas da nossa própria aliança... Essa é a foice do pesadelo que congela minhas veias."
90100080-54 = "Um replay macabro daquele expurgo sangrento da operação de 'Caça às Coelhas' no passado sombrio, por exemplo."
90100080-55 = "…………"
90100080-56 = "……FOX1. A engrenagem da Coroa que senta na torre e mexe as nossas cordas hoje... é farsa genética ou o núcleo da Presidente Autêntica?"
90100080-57 = "A resposta é axiomática. FOX2 e todos os radares balísticos decodificaram o visual, a postura e a voz das filmagens com sucesso atômico, não decodificaram?"
90100080-58 = "Sim. Os laudos ópticos, as molduras de perfil e a aura esnobe... tudo cimenta o registro visual arquivado do fantasma da Presidente no meu crânio."
90100080-59 = "Porém as trincheiras engolem meu fôlego... e a caçada por lendas assombradas dessa 'Lore' irreal parasita meus calafrios noturnos... a fobia se instala como vírus o expediente inteiro."
90100080-60 = "Se a silhueta charmosa do Sensei estivesse cravada ao nosso flanco pra blindar os tiros e segurar nossas mãos... O pânico acalmaria."
90100080-61 = "E o meu HD reza a lógica pura de que nós não podemos sugar o fôlego federal da agenda dele todos os dias da semana como amantes carentes e parasitas, né."
90100080-65 = "Entendido. Arquivarei a sua crise mística no dossiê pra uso futuro."
90100080-67 = "As caldeiras na escuta, FOX4 assume. O termostato do cimento cruzou os 31 graus nas margens externas."
90100080-68 = "O asfalto está exalando nuvens atômicas de mormaço e vapor na pista."
90100080-69 = "O espelho das ruas pinta o Espantalho fantasma no vapor cego?"
90100080-70 = "Teses furadas. Se as íris engolirem as reflexões cegantes dos vidros frontais das vielas na luz do sol e eu piscar forçando as córneas, o borrão cruza pra forma fantasmagórica que parece... talvez? Um pedaço de palha branco..."
90100080-72 = "Eita, balanço doentio do corpo..."
90100080-73 = "Alô, FOX4?!"
90100080-74 = "Falso alerta balístico... o giroscópio do meu labirinto surtou e atirou vertigem... fixar a retina na distorção óptica térmica esmaga a sanidade cerebral..."
90100080-75 = "Isso me atira pra pauta paramilitar que um veterano naval encouraçado da Escola Odisseia relatou numa patrulha morta, se liguem:"
90100080-76 = "A doutrina marítima dita que se o fuzileiro calar o rádio e fixar a visão cadavérica olhando cegamente pra maré negra e ondulante no abismo aquático... a recruta próxima é ordenada a espancar a nuca dele e chutar o corpo pra trás longe do balaústre na pura força física."
90100080-77 = "Qual o diagnóstico e a anomalia pra isso?!"
90100080-79 = "As planilhas de patologia psiquiátrica dizem que o ritmo hipnótico e monótono infinito do balanço fúnebre do mar esmaga a blindagem cerebral e lança hipnose suicida nos lobos do córtex."
90100080-80 = "Pra travar o pânico irracional e o impulso zumbi do recruta se fuzilar e mergulhar em suicídio cego na água escura, o resgate violento e rápido pra longe do abismo é lei da patente."
90100080-82 = "Puta merda militar... isso mimetiza contos de fadas fúnebres como as 'Sereias Carnívoras nuas e a Canção do Inferno do Mar' que seduzem e destroem marinheiros nas cartilhas infantis?"
90100080-83 = "A tese militar e da patologia química cerebral tem mais peso do asfalto do que culpar aberrações de escamosas cantantes nos arrecifes frios."
90100080-84 = "As atas recomendam alerta vermelho na sua espinha, FOX4.#nSe você afogar a mente e a consciência for devorada pelo vapor cego do calor nas ruas... e o asfalto derretido emboscar o seu cérebro e puxar você pro submundo hipnótico da loucura também..."
90100080-85 = "Pfffft. O humor irônico não tem validade balística. A farda já lavou essas vielas com chumbo e tática escura mil vezes na folha de ponto do quartel."
90100080-86 = "Sem falar que as orelhas dessa falante paranóica grudada no meu radinho não fecham o bico, a chance deu apagar e ir pro alé--"
90100080-91 = "……O radar endoidou...?"
90100080-92 = "Qual a leitura corrompida?"
90100080-93 = "A topografia dos mapas... a-acusa alguma maldita clareira verde e pasto de mato no meio dessa cimentada?!"
90100080-94 = "Mato verde e pasto?! Descreve as coordenadas cardinais! Quantas horas?!"
90100080-95 = "Além do concreto da pista... As cortinas pintam um horizonte com capim e tapetes verdes de fazenda debaixo do sol limpo e anil.#nOs radares cartográficos e o GPS estão vazios para isso... O que diabos ferveu a lente...?! Ilusão termal do calor?"
90100080-96 = "O matagal infesta, é denso... E no meio das folhas mortas... um Espantalho fúnebre.#nE-Ele... No horizonte rasgado... tem um vulto de lençol alvejado esgarçando um sorriso putrefato cego e demente..."
90100080-97 = "As artérias de pânico apitaram! Essa figura putrefata!! É O ALVO: O ESPANTALHO BRANCO!! NÃO É?!"
90100080-98 = "Despeje a latitude e longitude, FOX4!! Pra qual cruzamento aponta?!"
90100080-110 = "O vento nojento... sufocante, fétido, exala podridão mística e ferve as orelhas desse buraco podre aqui..."
90100080-115 = "A massa burra na viela apelida aquilo como cego 'Espantalho Branco'... Erro patético.#nAquela anomalia cadavérica jamais coube no laudo de um pau com palhas amarradas morto."
90100080-116 = "A monstruosidade mística pulsa livre arbítrio, retorce carne e possui motor... E-Ela engole vida alheia pra se materializar na rua...#nO demônio necessita arrastar e parasitar retinas e os olhos mortais alheios pra assumir existência nesse nosso plano físico, e-é por isso... Por isso ela veste farrapos brancos brilhantes no meio do escuro!! Pra sequestrar a atenção!!"
90100080-117 = "O SEU CÉREBRO PIFOU?! OTOGI!! TRATA DE REANIMAR DESSA MERDA!!"
90100080-118 = "O avanço dela destrói espaço... E-ELA INVADE!! Uma represa de neblina grisalha letal... A carcaça morta sofre espasmos necróticos de epilético, a espinha dança fúnebre... T-Tremendo e rebolando e dançando pra c-cá... se retorcendo..."
90100080-119 = "Rebolando, estalando fúnebre, retorcendo... e contorcendo... asfalto putrefato rebolando... retorcendo e retor--"
90100080-129 = "OTOGI!!!! ACORDA PRA VIDA, RECRUTA!!!"
90100080-135 = "B-BALÍSTICA ROMPEU NA VIA?! EU CAPTEI DETONAÇÃO SÔNICA DE FUZIL PESADO ALI!"
90100080-136 = "Ponto Tático Romeo, destrave as bocas e mande rádio. Fogo no perímetro cívico?!"
90100080-140 = "AUGH! C-Caralho... Q-Qual a disfunção neural letal no cérebro da FOX3 agorinha?!#nA maluca tática rasgou o asfalto berrando no meio da moita e atirou um coronhaço contundente na lata da minha cabeça!"
90100080-141 = "A SUA PARASITA DOENTIA DE UMA FIGA! O NEURÔNIO RESETOU?! TÁ REGISTRANDO MEU RG NA RETINA?!"
90100080-145 = "De onde diabos a insanidade mental do nada...? Os olhos captam a mesma tábua de passar roupa plana do seu peitoral e farda, sua histérica."
90100080-146 = "Deleta a piada de peito, a pauta é sobrevivência psiquiátrica! Essa quantidade de dedos na sua fuça dá que cálculo de adição na mente?! SOMA!!"
90100080-147 = "……Dois dedos enfiados no meu nariz. Qual o estresse da loucura?!"
90100080-151 = "……O milagre médico e a força dos deuses varreu.#nA poça da vala evitou faturar e assassinar a nossa contagem cívica fúnebre..."
90100080-152 = "Corta a comemoração, FOX3. Rádio para o relatório militar."
90100080-153 = "A FOX3 atesta nas linhas. Segundos cruciais retroativos, o HD e os globos oculares da FOX4 rastreavam o vapor no asfalto e a infeliz engasgou na loucura..."
90100080-154 = "E cuspiu no rádio a maldição de avistamento e encontro letal de face com o 'Espantalho Branco'."
90100080-155 = "E-Eu atirei essa bizarrice?!"
90100080-156 = "Cravado e registrado na fita sonora da operação! A amnésia consumiu, abençoada?!#nOs vômitos no rádio incluíam lixo poético de 'Prados verdes azuis celestes do inferno', e teses profanas de 'ondas cinzentas fúnebres de morte em espasmo e rebolando'."
90100080-157 = "A fita tá vazia. Deleção absoluta nos arquivos da cabeça."
90100080-158 = "O cenário cimentado era o rádio cuspindo os laudos navais do Encouraçado Odisseia com a Kurumi, enquanto a lente do fuzil fritava a fumaça de cimento nas calçadas... Nada cruza o abismo disso."
90100080-159 = "A disfunção não acha lógica... Será que o sol escaldante injetou alucinação térmica diurna no lombo do meu cérebro?"
90100080-160 = "O laudo e a blindagem corporal intocada é a premissa prioritária de alívio. No entanto, o chumbo descarregado que o rádio ouviu? Fez buraco na demografia urbana de reféns ou baixas?"
90100080-161 = "Uugh... Processo de averiguação engatilhado..."
90100080-162 = "A fé tática reza pra desgraça balística não ter varado e furado patrimônio cívico, senão o BOPE da Valkyrie desce matando as pulgas."
90100080-166 = "……Bússola cega, pane no sistema?"
90100080-167 = "D-Dispara as informações, Otogi!! Não trava! A bala suja ceifou um pescoço de civil ou varou placa do gov――"
90100080-168 = "O laudo rasga a biologia e as matrizes lógicas... A bala evaporou. O rombo da cápsula não deixou rastro e a carne do asfalto tá limpa de buraco.#nA agulha do fuzil empurrou a espoleta e o tambor tá manchado, o chumbo massivo cuspiu cano afora com atestado visual..."
90100080-169 = "Você delira e morde patifaria mística... Um chumbo estúpido de perfuração balística grossa do fuzil Calibre 50 derreteu e estilhaçou na atmosfera?!"
90100080-170 = "……A ciência tomba. O combate englobava atrito macabro e balístico contra mortos-vivos reais e literais de assombração fantasma, afinal."
90100080-173 = "FOX1, a cartilha mental cruza a fumaça dessa aberração mística tática do além?"
90100080-174 = "Os laboratórios e as diretrizes cegas ainda refutam cravar vereditos de fantasmas no papel. Porém a varredura das provas materiais fúnebres e a recomposição do lixo do tiroteio exige conselho imediato e seguro."
90100080-178 = "Comandos táticos para todo o destacamento de FOX: Exfiltração e recuo paramilitar instantâneo e imediato de volta ao Quartel General. Encaixotem a artilharia blindada e migrem fardas ao ponto Rendezvous e vão sumir da calçada."
90100080-180 = "Copiado e Carimbado!!"
90100080-182 = "Próximo Episódio: Pistas e Pegadas"