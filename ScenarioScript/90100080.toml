[translation]#[Texto revisado.] Em aguardo de revisão de formatação de texto. - Filipe 13/06.
90100080-1 = "Episódio 8: Do Outro Lado da Miragem"
90100080-3 = "Aqui FOX3."
90100080-4 = "10h00, 28°C, vento 3 nós."
90100080-5 = "Estou com a FOX4 no Ponto Romeo. Mirando no azimute 0-3-0, aguardando o \"Espantalho Branco\"."
90100080-6 = "O asfalto está fervendo, mas ainda não há miragem."
90100080-10 = "Haah... que tédio. Ficar esperando um fantasma que não aparece."
90100080-11 = "Ei, Otogi― digo, FOX4! Pare de poluir o canal cripto!"
90100080-12 = "Relaxa. Fofoca ajuda a passar o tempo sem enlouquecer."
90100080-13 = "FOX4 aqui. Nada de miragem ainda. Não está quente o suficiente."
90100080-14 = "……Mudando de assunto, você está aguentando o calor?"
90100080-15 = "Do lado de fora, estaria assando. Aqui no mato pelo menos ventila."
90100080-19 = "FOX1 assumindo. Sem mudanças. Foquem nas miragens de calor."
90100080-20 = "A falta de evidências não nos impede. Observar o que as vítimas viram pode ser a chave."
90100080-21 = "Ou seja... vamos ficar encarando miragem até aparecer monstro?"
90100080-22 = "Tipo um zumbi saindo do asfalto~?"
90100080-23 = "Isso é nojento e impossível!!"
90100080-24 = "Até provarmos o contrário, não descartemos hipóteses."
90100080-25 = "……Nossa, como a capitã é sem humor."
90100080-30 = "FOX2 aqui. Ponto Sierra, sem anomalias."
90100080-31 = "O Sensei não vai vir hoje?"
90100080-32 = "Ele está ocupado com outra emergência."
90100080-33 = "Ah, sentiu saudades, tenente~?"
90100080-34 = "Para com isso. Não é o caso..."
90100080-35 = "Só estou com um mau pressentimento."
90100080-36 = "Fazer operação sem a retaguarda dele me deixa nervosa."
90100080-37 = "Ué, desde quando a gente precisa de babá? Sempre agimos sozinhas."
90100080-38 = "Mas com ele, a gente ganha lanches e bebidas caras..."
90100080-39 = "Você está reduzindo o Sensei a um garçom?"
90100080-40 = "E por falar em gordura, FOX4... você engordou desde que saiu da prisão, hein? Gulosa~"
90100080-41 = "É MASSA MAGRA DE TREINO, SUA INVEJOSA!"
90100080-44 = "FOX2, algum alerta?"
90100080-45 = "Não. Só intuição, pode ignorar."
90100080-46 = "Sua intuição não costuma falhar, Niko. Não ignore."
90100080-47 = "……Isso é muito subjetivo para a FOX1."
90100080-48 = "Você não dizia \"só agir com evidências\"?"
90100080-49 = "No campo, intuição pode salvar."
90100080-50 = "Desconfiar até da própria sombra é o primeiro escudo."
90100080-51 = "Veteranos sentem o perigo na espinha... Não vou ignorar."
90100080-52 = "Mas meu pressentimento não é sobre snipers ou armadilhas..."
90100080-53 = "É sobre essa guerra ser uma cilada. Como se amanhã a gente tivesse que atirar nos nossos próprios aliados."
90100080-54 = "Como naquela \"Caça às Coelhas\" no passado."
90100080-55 = "…………"
90100080-56 = "……FOX1, a Presidente atual... é realmente a Presidente?"
90100080-57 = "Claro. As imagens e a voz não deixam dúvidas."
90100080-58 = "Sim. A aparência, os gestos... tudo igual ao que lembro."
90100080-59 = "Mas essa caçada a Lores está me deixando paranoica. Sinto medo o tempo todo."
90100080-60 = "Se o Sensei estivesse aqui, seria mais tranquilo."
90100080-61 = "Mas ele tem seus afazeres."
90100080-65 = "Entendido. Anotado."
90100080-67 = "FOX4 aqui. A temperatura externa passou de 31°C."
90100080-68 = "As miragens estão começando."
90100080-69 = "Está vendo algum espantalho?"
90100080-70 = "Não. Mas se o reflexo do sol nos vidros der um borrão branco... talvez."
90100080-72 = "Eita, tonto..."
90100080-73 = "FOX4?!"
90100080-74 = "Falso alarme. Ficar focando a miragem deu vertigem."
90100080-75 = "Isso me lembrou uma história do encouraçado Odysseus."
90100080-76 = "Dizem que, se um recruta fica olhando fixo para o mar, o sargento tem que dar um tapa na nuca dele para não pular."
90100080-77 = "Por que?"
90100080-79 = "O movimento hipnótico das ondas pode induzir ao suicídio. Por isso, tiram o sujeito de perto."
90100080-80 = "Para evitar que o recruta se jogue, a regra é violenta e rápida."
90100080-82 = "Isso parece com a lenda das sereias."
90100080-83 = "Explicação neurológica é mais plausível do que sereias."
90100080-84 = "Portanto, FOX4, cuidado. Se a miragem te hipnotizar e te puxar――"
90100080-85 = "Pff, por favor. Já fiz isso mil vezes."
90100080-86 = "Além disso, com essa tagarela ao meu lado――"
90100080-91 = "……O quê?"
90100080-92 = "O que foi?"
90100080-93 = "Não tinha... uma clareira verde ali?"
90100080-94 = "Clareira? Onde? Que horas?"
90100080-95 = "Além do asfalto... um campo verde, com grama. Não está no mapa... miragem?"
90100080-96 = "No meio do mato... um espantalho. Uma pessoa branca rindo... se retorcendo..."
90100080-97 = "O quê?! É O ALVO: O ESPANTALHO BRANCO!"
90100080-98 = "FOX4, coordenadas!! Para onde?!"
90100080-110 = "Para onde o vento fétido sopra..."
90100080-115 = "As pessoas chamam aquilo de \"Espantalho Branco\"... mas não é um espantalho."
90100080-116 = "Ele tem vontade própria. Só pode existir se for observado. Por isso se veste de branco e dança. Para chamar atenção."
90100080-117 = "OTOGI!! VOLTE A SI!!"
90100080-118 = "Está vindo... uma onda cinza... retorcendo... dançando..."
90100080-119 = "Retorcendo... retorcendo..."
90100080-129 = "OTOGI!!!"
90100080-135 = "O que foi?! Ouvi um tiro!"
90100080-136 = "Ponto Romeo, responda! O que houve?"
90100080-140 = "AUHG! P-Porra... a FOX3 ficou louca e me deu uma coronhada!"
90100080-141 = "SUA PARASITA! SABE QUEM SOU?!"
90100080-145 = "Do que você está falando? Peito plano de sempre..."
90100080-146 = "NÃO É HORA DE PIADA! QUANTOS DEDOS ESTOU MOSTRANDO?!"
90100080-147 = "……Dois. Qual o problema?"
90100080-151 = "……Ufa. Ninguém morreu."
90100080-152 = "FOX3, reporte."
90100080-153 = "FOX3 aqui. A FOX4 estava olhando a miragem e..."
90100080-154 = "disse ter visto o \"Espantalho Branco\"."
90100080-155 = "Falei isso?"
90100080-156 = "Sim. Não lembra? Falou de \"campo verde\", \"onda cinza\", e um monte de groselha."
90100080-157 = "Não lembro de nada."
90100080-158 = "Só lembro de ouvir a Kurumi falando da história do Odysseus enquanto olhava pela luneta..."
90100080-159 = "Pode ter sido um delírio pelo calor."
90100080-160 = "O importante é que ninguém se machucou. A bala que você disparou não feriu nenhum civil?"
90100080-161 = "Ugh... vou verificar."
90100080-162 = "Tomara que não tenha acertado nada..."
90100080-166 = "……Estranho."
90100080-167 = "O que foi? Atingiu alguém?!"
90100080-168 = "Não... não há marcas de bala em lugar nenhum. Mas o tiro foi dado, a arma está descarregada..."
90100080-169 = "Uma bala .50 evaporou no ar?"
90100080-170 = "……A ciência falha. Talvez fosse mesmo um fantasma."
90100080-173 = "FOX1, o que acha?"
90100080-174 = "Ainda não dá para cravar. Mas precisamos organizar isso."
90100080-178 = "Ordem geral: retornem ao QG imediatamente. Façam a retirada."
90100080-180 = "Entendido!!"
90100080-182 = "Próximo Episódio: Pistas e Rastros"