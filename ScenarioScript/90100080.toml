[translation]
90100080-1 = "Episode 8;From Beyond the Heat Haze"
90100080-3 = "Reporting, this is FOX3."
90100080-4 = "Current time is 1000 Kivotos Standard Time. Temperature is 28 degrees Celsius, wind speed approximately 3 knots."
90100080-5 = "Currently monitoring for the singular phenomenon—codenamed 'White Scarecrow'—at Point Romeo with FOX4, bearing 0-3-0."
90100080-6 = "The ground temperature is rising steadily, but there's no sign of a heat haze yet."
90100080-10 = "Man, this is boring. Waiting for a target that might not even show up..."
90100080-11 = "Ah, Otogi—I mean, FOX4! Don't interrupt the channel!"
90100080-12 = "Isn't it fine not to worry about such small details? #nIt's more fun if we just chat."
90100080-13 = "This is FOX4. FOX3 is right, there's not even a normal heat haze, let alone a singular phenomenon. #nI guess the ground isn't hot enough yet."
90100080-14 = "...Still, are you sure it's okay to be waiting in the shade today?"
90100080-15 = "It's way easier than before, so I'm not complaining."
90100080-19 = "This is FOX1. No changes to the operation. Focus on the heat haze for now."
90100080-20 = "We don't have definitive evidence on the suspect yet, but if we observe the scene from the same perspective as the victims, we might be able to pick up a clue."
90100080-21 = "So... you mean if we stare at the heat haze long enough, something will pop out?"
90100080-22 = "Like a zombie, all distorted and squiggly in the shape of the haze~"
90100080-23 = "T-that's impossible, isn't it!?"
90100080-24 = "Until we confirm the true nature of the 'White Scarecrow,' we cannot simply dismiss it as 'impossible'."
90100080-25 = "...I'm just joking. You really don't get jokes, Captain."
90100080-30 = "This is FOX2. Observing bearing 2-1-0 at Point Sierra. #nNothing unusual here either so far."
90100080-31 = "More importantly... I wonder if Sensei is coming today?"
90100080-32 = "Oh, they said they had other work to do."
90100080-33 = "What, did you need something?"
90100080-34 = "N-no, it's not like that, but..."
90100080-35 = "I don't know... I have a bad feeling about this."
90100080-36 = "Thinking about operating without Sensei's help all of a sudden makes me a bit uneasy."
90100080-37 = "Eh, we've handled things on our own before, haven't we?"
90100080-38 = "Well, it is fun when Sensei is around because they bring tasty snacks and stuff."
90100080-39 = "Do you think of Sensei as a supply officer or something...?"
90100080-40 = "And anyway, FOX4... you've gained weight since we left the Correctional Bureau, haven't you?"
90100080-41 = "It's muscle!"
90100080-44 = "FOX2. Did something happen?"
90100080-45 = "No. Like I said, it's just a hunch. Don't worry about it."
90100080-46 = "However, Niko's intuition is often correct. We cannot ignore it."
90100080-47 = "...That doesn't sound like FOX1. A bit weak, and emotional."
90100080-48 = "Didn't you say not to make rash judgments until we have all the information?"
90100080-49 = "Unlike planning an operation, intuition can be a weapon in the field."
90100080-50 = "You can never be too cautious."
90100080-51 = "Sometimes your body remembers things from experience... so you have a point."
90100080-52 = "But what I'm worried about isn't an enemy ambush, or a sniper, or anything like that..."
90100080-53 = "Maybe there's a pitfall in this operation itself. Like the fundamental anxiety that we might be pointing our guns at our allies without even realizing it."
90100080-54 = "For example... yes, like that 'Rabbit Hunt' back then."
90100080-55 = "…………."
90100080-56 = "...FOX1. Was the General Student Council President... really the General Student Council President?"
90100080-57 = "Obviously. FOX2, you confirmed it with the footage and photos, didn't you?"
90100080-58 = "Yes. Her features, her behavior... without a doubt, it was the General Student Council President I remember."
90100080-59 = "But maybe it's because we're dealing with an uncertain existence like Roa... the anxiety hasn't left me the whole mission."
90100080-60 = "If only Sensei were by my side..."
90100080-61 = "But we can't call a busy Sensei every single day, can we?"
90100080-65 = "I see. For now, I'll keep that in mind."
90100080-67 = "This is FOX4, outside temperature has reached 31 degrees."
90100080-68 = "The heat haze should start appearing soon."
90100080-69 = "Can you see anything that looks like a scarecrow?"
90100080-70 = "Not at all. Ah, but if it overlaps with the white light reflecting off the window glass, it might look like a white scarecrow... maybe?"
90100080-72 = "Hmm..."
90100080-73 = "FOX4?"
90100080-74 = "No, I'm just a bit dizzy... maybe it's from staring at the heat haze for so long..."
90100080-75 = "Come to think of it, I heard this from an operative working on a mission at Odyssea."
90100080-76 = "They said if you see a student staring silently at the water's surface, you have to pull them away immediately."
90100080-77 = "Why?"
90100080-79 = "I didn't get the details, but something about the movement of the waves hypnotizing people."
90100080-80 = "So you have to pull them away from the water before they jump in themselves."
90100080-82 = "Is that... like the 'Siren's Song' from a storybook?"
90100080-83 = "Well, it's more realistic than a half-human, half-fish monster singing on a rock, I suppose."
90100080-84 = "So be careful, FOX4. #nYou might get dragged beyond the asphalt, lured by the heat haze."
90100080-85 = "No way. We've done similar operations many times before."
90100080-86 = "Besides, I've got a chatty partner right next to me, so it won't be that easy—"
90100080-91 = "...Huh?"
90100080-92 = "What's wrong?"
90100080-93 = "Was there... a meadow over there?"
90100080-94 = "A meadow? Where, at what bearing?"
90100080-95 = "Across the road. I can see a meadow under a blue sky. #nIt's not on the map... a mirage?"
90100080-96 = "The grass is overgrown... and there's a scarecrow, one of them... and a person in white clothes smiling beyond it—"
90100080-97 = "Hm...? That's it! Isn't that the 'White Scarecrow'!?"
90100080-98 = "FOX4, what are the coordinates!? Where!?"
90100080-110 = "It's eerie... in the direction where the stifling, muggy wind is blowing from..."
90100080-115 = "Everyone kept calling it a 'White Scarecrow'... but that's no scarecrow."
90100080-116 = "It moves with a will of its own. It can't exist otherwise... #nIt has to wear conspicuous white clothes and dance because it can't interfere unless it's observed."
90100080-117 = "What are you talking about!? FOX4! Get a grip!!"
90100080-118 = "It's coming... It's coming! A giant gray wave, twitching, wriggling, dancing, wriggling—"
90100080-119 = "Wriggle wriggle wriggle wriggle wriggle wriggle—"
90100080-129 = "OTOGI!!"
90100080-135 = "W-what!? I heard a gunshot..."
90100080-136 = "Point Romeo, respond. What happened?"
90100080-140 = "Ow... It looks like FOX3 suddenly went crazy! #nShe just ran over and punched me in the head!"
90100080-141 = "Huh!? Are you sane!? Do you know who I am?"
90100080-145 = "Why are you asking me that... I can see your usual flat chest right in front of me."
90100080-146 = "Don't mess with me! How many fingers am I holding up!?"
90100080-147 = "Two...? What, what's wrong?"
90100080-151 = "Thank goodness... #nThat the number of victims didn't increase..."
90100080-152 = "FOX3. Report the situation."
90100080-153 = "This is FOX3. FOX4, who was observing the heat haze until just a moment ago—"
90100080-154 = "Said she witnessed the 'White Scarecrow'."
90100080-155 = "I did!?"
90100080-156 = "Yes. Don't you remember? #nYou started saying weird things like 'something about a meadow under a blue sky' and 'something about a gray wave'."
90100080-157 = "I don't remember at all."
90100080-158 = "I thought I was looking at the heat haze through my scope while listening to Kurumi talk about Odyssea."
90100080-159 = "I wonder why. Maybe I was having a daydream."
90100080-160 = "If you're safe, that's all that matters. Any damage from the stray bullet fired earlier?"
90100080-161 = "Ugh... checking now."
90100080-162 = "I hope it didn't fly somewhere dangerous."
90100080-166 = "...Huh?"
90100080-167 = "W-what is it? Don't tell me you hit a civilian—"
90100080-168 = "No, it's just... there are no bullet holes at all. #nBut the round wasn't a dud, so I definitely fired it."
90100080-169 = "Huh? You mean a .50 caliber bullet just evaporated in mid-air?"
90100080-170 = "...I guess it really was a ghost after all."
90100080-173 = "FOX1, do you have any ideas?"
90100080-174 = "I can't say for sure yet. But we need to organize the situation."
90100080-178 = "All units, return to HQ immediately. Recover your equipment and assemble at the rendezvous point."
90100080-180 = "Roger!"
90100080-182 = "Next Episode;Clues"