[translation]
80000067-1 = "気にしたら負け"
80000067-2 = "（ネルから連絡を貰って、ミレニアムのキャンパスに来ていた）"
80000067-3 = "よぉ、先生！"
80000067-4 = "[s1] \"……ネル？\"\n[s2] 音がした方を振り向く。"
80000067-8 = "早かったな、むしろ待たせちまって悪ぃ。"
80000067-9 = "あん、用事？あー、まぁそりゃ……いや、いきなりその話題に入るのは……。"
80000067-10 = "まぁ、大したことじゃねぇよ。そんなに期待しすぎんな。"
80000067-11 = "その、あたしはただ……。"
80000067-15 = "いや、まあでも先生なら気に入ってくれっかなとは思ってる。すげーやつ選んできたから。"
80000067-16 = "……おらっ、受け取れ！"
80000067-21 = "[ns3] \"こ、これは……？\"\n[ns4] \"すごい形……！？\""
80000067-22 = "どうよ、ビックリしたか！？"
80000067-23 = "どうよ、ビックリしたか！？"
80000067-24 = "かっけぇだろ？つか良くね？いやー、これ探すのに結構苦労したんだよ。どこ行っても地味なのしか無くってよぉ。"
80000067-25 = "……あん？これが何かって？"
80000067-26 = "先生知らねーのか？今日はバレンタインデーだろ？"
80000067-27 = "それも忘れるくらい忙しいのかよ、相変わらず大変だなおい。ま、ちゃんとあたしが覚えといてやったからよ。"
80000067-28 = "……え、そういう意味じゃない？……デザイン？"
80000067-29 = "あー……もしかして迫力が足りなかったか？まあ確かにあらためて見ると、もうちょい大きくても良かったかもしれねーけど。"
80000067-30 = "それか、もういっそ彫刻とか……。"
80000067-31 = "……あん？"
80000067-32 = "バレンタインデーの意味？"
80000067-33 = "チョコレート渡す日だろ？それ以外に何かあんのか？"
80000067-34 = "[s5] \"……ううん、気にしないで。ありがとう。\"\n[s6] \"とりあえず、カッコよくて良いね。\""
80000067-35 = "ははっ、そうそう。小さいことは気にせず、喜びゃ良いんだよ。"
80000067-36 = "ははっ、そうそう。小さいことは気にせず、喜びゃ良いんだよ。"
80000067-37 = "あーそれよりほら、早く開けようぜ。"
80000067-38 = "どんな味なのか気になってたんだよな。"
80000067-39 = "[s7] \"それは全然良いんだけど……。\"\n[s8] \"……大丈夫？\""
80000067-40 = "……あん、どうしたんだよ？"
80000067-41 = "……あん、どうしたんだよ？"
80000067-42 = "まさかダメとは言わねぇよな？あたしが買ってきたんだから良いだろ？"
80000067-46 = "ほら座れよ！さっさと食おうぜ！"
80000067-47 = "[s] \"……。\""
80000067-49 = "（その後ネルと一緒に、周囲の視線を浴びながらチョコレートを分けて食べた）"
80000067-50 = "（味はもちろん良かったものの、デザインなど別の方がつい気になってしまった）"
