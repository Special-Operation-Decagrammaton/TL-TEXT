[translation]
10035080-1 = "第8話;黒幕、逃がしません！"
10035080-2 = "一体どういうことなんだ……ワニが出るなんて……。"
10035080-3 = "ここは安全なんだよね？"
10035080-4 = "ねえ、もう家に帰ろう？ここにいたくないよ。"
10035080-8 = "楽しいはずのウォーターパークが、お通夜みたいだね～。"
10035080-9 = "お客さんたちの顔も暗いですね……。"
10035080-10 = "帰りはじめている方もいますし……。"
10035080-11 = "あんな事件が起きたんだ。仕方ないだろう。"
10035080-12 = "メカワニを捕獲しない限り、この騒ぎは収まらない。"
10035080-13 = "やっぱり、私たちもワニの捜索に当たるべきでしょうか？"
10035080-14 = "いや、この事件の黒幕を突き止めるのが先だ。私たちは――"
10035080-15 = "あのワニを……ウォーターパークに解き放った奴を捕まえる。"
10035080-16 = "え！？あのワニって、誰かが連れて来たものなんですか？"
10035080-17 = "あのワニは生物ではない。ワニ型のロボットだ。"
10035080-18 = "つまり、人の手で作られたものということだ。#nそして、あの攻撃性……。奴らの狙いは想像できる。"
10035080-19 = "テロ、もしくは営業妨害……。動機はわからないが。#n犯人はテロリストと見なすべきだろう。"
10035080-21 = "テロリスト……！"
10035080-22 = "き、局長は、犯人が誰なのかわかっているんですね？"
10035080-23 = "あれあれ、さっき私たちを見て、逃げた奴がいたじゃん？"
10035080-24 = "はっ！それは、まさか！"
10035080-25 = "[s1] \"もしかしてヘルメット団が……。\"\n[s2] \"まさか、ラブがあのワニを……。\""
10035080-28 = "ヘルメット団の幹部、[ruby=こまかぜ]河駒風[/ruby]ラブ……！"
10035080-29 = "分かりました！発見次第、捕縛します！"
10035080-30 = "本官はさっそく捜索に――"
10035080-34 = "あ？"
10035080-35 = "あ。"
10035080-36 = "[s] （なんて間の悪い……！）"
10035080-37 = "捕まえろ！"
10035080-38 = "ひぃ！"
10035080-46 = "逃がしません！"
10035080-63 = "うっ！"
10035080-69 = "よ、よし！無事、捕縛しました！"
10035080-70 = "逃がしませんよ！テロリストさん！"
10035080-71 = "誰がテロリストよ！"
10035080-72 = "[ruby=えんざい]冤罪[/ruby]だわ！うちらに非は無い！"
10035080-73 = "冤罪ってー？"
10035080-76 = "あんたがやらかしたことは、全部わかってるって！"
10035080-80 = "ラブ隊長を放せ！"
10035080-81 = "ヴァルキューレめ！言いがかりだ！"
10035080-83 = "言いがかりだと？ふっ！"
10035080-84 = "貴様らの犯罪行為……今すぐ逮捕されても文句は言えないはずだ！"
10035080-86 = "うちらが何をしたって言うのよ！！"
10035080-87 = "私たちと目が合った瞬間、逃げたじゃありませんか！"
10035080-88 = "何かやましいことをしたんでしょう！？"
10035080-89 = "そんないい加減な理由で疑うなんて！これだからヴァルキューレどもは！"
10035080-90 = "[s3] \"はーい！みんな注目！\"\n[s4] \"一旦、落ち着こうか。\""
10035080-93 = "[USERNAME]先生？"
10035080-97 = "[ns] \"状況を整理する必要がありそうだから。\""
10035080-99 = "[ns] \"まず、それぞれの事情を説明しようか。\""
10035080-100 = "分かりました。キリノ、フブキ、奴をちゃんと捕まえていろ。"
10035080-106 = "さあ言ってみろ、河駒風ラブ。#nウォーターパークにメカワニを放った理由はなんだ？"
10035080-107 = "ひ、ひぃ……"
10035080-108 = "こ、これが噂に聞いた公安局の狂犬……。"
10035080-109 = "答えろ。"
10035080-110 = "わ、ワニを放ったって、どういう意味よ！？"
10035080-111 = "シラを切るな！この状況をつくったのは貴様だろう！"
10035080-112 = "……？"
10035080-113 = "誤解よ！ワニを放ったのはうちらじゃない！"
10035080-114 = "あのワニ……その、なんて言うの……？#n「メタル・ウェポン・スピード・クロコダイル」って言うべき？"
10035080-116 = "（局長とネーミングセンスが近いなぁ……）"
10035080-117 = "とにかく、あのワニは、うちらとはなんの関係もないから！"
10035080-118 = "あ、あんたたちも何か言いなさいよ！"
10035080-119 = "隊長の言う通りだ！こっちも今、避難しているところなんだ！"
10035080-120 = "ヘルメット団にあんなワニを作る金があるわけないだろ……。"
10035080-122 = "む、無関係、だと……？"
10035080-123 = "では、さっきはなぜ逃げたんだ？#nやましいことがないのに、逃げる理由などないだろう？"
10035080-124 = "[USERNAME]先生に、ヴァルキューレの連中が3人もいるんだから！#n逃げるに決まってるでしょ！"
10035080-125 = "何も悪いことしてないのに、ですか？"
10035080-126 = "これは、うちらの本能みたいなもんなの！"
10035080-127 = "警察を見たらまず逃げる……かぁ。根本が違うよねぇ……。"
10035080-128 = "[s] \"ラブ、ウォーターパークにはどうして来たの？\""
10035080-129 = "ここに来た理由？"
10035080-130 = "そんなの、遊びに来たに決まってるじゃん？"
10035080-131 = "そう、そう！"
10035080-132 = "ヘルメット団にも休暇は必要なんだ！"
10035080-133 = "見ろ！ちゃんと入場券だって買ってる！"
10035080-134 = "しかも、金が足りなくて、肉体労働までしたんだぞ！"
10035080-135 = "「ヘルメット団総連合会」に行けない奴らを労うために、#nわざわざ連れてきたってのに……。"
10035080-136 = "夏にプールで遊んで何が悪いっていうの！"
10035080-138 = "うちらだって、いつも騒ぎを起こしてるわけじゃないし！"
10035080-139 = "[s5] （本当に悔しそうに見える……。）\n[s6] （嘘は言ってなさそうだけど……。）"
10035080-140 = "す、すまない……てっきり、お前たちの仕業かと思って……。"
10035080-141 = "す、すまない……てっきり、お前たちの仕業かと思って……。"
10035080-142 = "本官がまたミスを……"
10035080-143 = "ま、日頃の行いが返ってきた感じでしょー。"
10035080-144 = "はあ！？"
10035080-148 = "[ns] \"待って。大事なことを忘れてる。\""
10035080-150 = "[ns] \"それなら、メカワニを放ったのは誰？\""
10035080-160 = "きゃぁぁぁ！ワニが屋内まで！"
10035080-161 = "みんな逃げろ！"
10035080-163 = "うわっ！皆さん！ひ、避難してください！"
10035080-164 = "これはちょっとまずったなぁ～。"
10035080-165 = "う、うぅ。せっかくの休暇が台無しよ……！"
10035080-167 = "総員、戦闘用意だ！ワニを制圧する！"
