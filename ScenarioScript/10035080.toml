[translation]
10035080-1 = "Episódio 8; O mentor, não vou deixar escapar!"
10035080-2 = "O que isso significa exatamente... aparecer um crocodilo..."
10035080-3 = "Aqui é seguro, né?"
10035080-4 = "Ei, vamos logo para casa? Não quero ficar aqui."
10035080-8 = "O parque aquático, que deveria ser divertido, parece um velório, né~."
10035080-9 = "O rosto dos clientes também está sombrio..."
10035080-10 = "Tem gente até começando a ir embora..."
10035080-11 = "Um incidente desses aconteceu. Não tem como evitar."
10035080-12 = "Enquanto não capturarmos o crocodilo mecânico, essa confusão não vai acabar."
10035080-13 = "Será que nós também deveríamos ajudar na busca pelo crocodilo?"
10035080-14 = "Não, encontrar o mentor desse incidente é a prioridade. Nós vamos..."
10035080-15 = "Capturar aquele crocodilo... e quem o soltou no parque aquático."
10035080-16 = "Hã!? Aquele crocodilo foi trazido por alguém?"
10035080-17 = "Aquele crocodilo não é um ser vivo. É um robô em forma de crocodilo."
10035080-18 = "Ou seja, foi feito por mãos humanas. #nE aquela agressividade... dá para imaginar o objetivo deles."
10035080-19 = "Terrorismo ou sabotagem comercial... Não sei o motivo, mas #no culpado deve ser considerado um terrorista."
10035080-21 = "Terrorista...!"
10035080-22 = "O-o Diretor sabe quem é o culpado, não sabe?"
10035080-23 = "Ora, ora, não tinha alguém que fugiu quando nos viu agora pouco?"
10035080-24 = "Ah! Isso, não pode ser!"
10035080-25 = "[s1] \"Será que o Bando dos Capacetes...\"\n[s2] \"Não me diga que a Love soltou aquele crocodilo...\""
10035080-28 = "A líder do Bando dos Capacetes, Komakaze Love...!"
10035080-29 = "Entendido! Assim que encontrarmos, vamos capturá-la!"
10035080-30 = "Vou começar as buscas imediatamente..."
10035080-34 = "Ah?"
10035080-35 = "Ah."
10035080-36 = "[s] (Que péssima hora...!)"
10035080-37 = "Peguem ela!"
10035080-38 = "Eek!"
10035080-46 = "Não vou deixar escapar!"
10035080-63 = "Ugh!"
10035080-69 = "B-bom! Captura realizada com sucesso!"
10035080-70 = "Não vou deixar você escapar! Sua terrorista!"
10035080-71 = "Quem você está chamando de terrorista?!"
10035080-72 = "Isso é uma acusação falsa! Nós não temos culpa de nada!"
10035080-73 = "Acusação falsa, é?"
10035080-76 = "Nós sabemos muito bem o que você fez!"
10035080-80 = "Soltem a capitã Love!"
10035080-81 = "Valkyrie! Isso é uma calúnia!"
10035080-83 = "Calúnia, é? Hmph!"
10035080-84 = "Os atos criminosos de vocês... não teriam do que reclamar se fossem presas agora mesmo!"
10035080-86 = "O que você acha que a gente fez?!"
10035080-87 = "Vocês fugiram assim que nossos olhares se cruzaram!"
10035080-88 = "Devem ter feito algo de errado, não é?!"
10035080-89 = "Suspeitar da gente por um motivo tão vago! É por isso que o pessoal da Valkyrie é assim!"
10035080-90 = "[s3] \"Ei, ei! Atenção, pessoal!\"\n[s4] \"Vamos nos acalmar um pouco.\""
10035080-93 = "Sensei [USERNAME]?"
10035080-97 = "[ns] \"Parece que precisamos organizar a situação.\""
10035080-99 = "[ns] \"Primeiro, vamos explicar o lado de cada um.\""
10035080-100 = "Entendido. Kirino, Fubuki, mantenham ela bem presa."
10035080-106 = "Vamos, diga logo, Kawakoma Love.#nPor que você soltou o crocodilo mecânico no parque aquático?"
10035080-107 = "I-iih..."
10035080-108 = "E-essa é a tal cadela raivosa da Segurança Pública que dizem por aí..."
10035080-109 = "Responda."
10035080-110 = "Q-que crocodilo o quê, do que você está falando!?"
10035080-111 = "Não tente me enganar! Foi você quem causou essa situação, não foi?!"
10035080-112 = "...?"
10035080-113 = "É um mal-entendido! Não fomos nós que soltamos o crocodilo!"
10035080-114 = "Aquele crocodilo... bem, como se diz...?#nDevo chamá-lo de \"Crocodilo de Combate Metálico Veloz\"?"
10035080-116 = "(O senso de nomenclatura dela é parecido com o da chefe...)"
10035080-117 = "De qualquer forma, aquele crocodilo não tem nada a ver com a gente!"
10035080-118 = "Ei, vocês também, digam alguma coisa!"
10035080-119 = "A capitã tem razão! Nós também estamos tentando evacuar agora!"
10035080-120 = "O Grupo dos Capacetes nem teria dinheiro para construir um crocodilo desses..."
10035080-122 = "I-inocentes, vocês dizem...?"
10035080-123 = "Então, por que fugiram agora há pouco?#nSe não têm nada a esconder, não há motivo para fugir, certo?"
10035080-124 = "Tem o sensei [USERNAME] e três pessoas da Valkyrie aqui!#nÉ óbvio que a gente ia fugir!"
10035080-125 = "Mesmo sem ter feito nada de errado?"
10035080-126 = "Isso é como um instinto para nós!"
10035080-127 = "Fugir assim que vê a polícia... é, a mentalidade é bem diferente mesmo..."
10035080-128 = "[s] \"Love, por que você veio ao parque aquático?\""
10035080-129 = "Por que eu vim aqui?"
10035080-130 = "Ora, é óbvio que viemos para nos divertir, não é?"
10035080-131 = "Isso, isso mesmo!"
10035080-132 = "O Grupo dos Capacetes também precisa de férias!"
10035080-133 = "Olha só! Nós até compramos os ingressos!"
10035080-134 = "E como não tínhamos dinheiro suficiente, até fizemos trabalho braçal para conseguir!"
10035080-135 = "Eu trouxe o pessoal que não consegue ir para a \"Associação Geral do Grupo dos Capacetes\"#njustamente para recompensá-los..."
10035080-136 = "O que há de errado em querer brincar na piscina durante o verão!"
10035080-138 = "A gente não fica causando confusão o tempo todo, sabia!"
10035080-139 = "[s5] (Ela parece realmente frustrada...)\n[s6] (Não parece que ela está mentindo...)"
10035080-140 = "D-desculpe... eu achei que tinha sido obra de vocês..."
10035080-141 = "D-desculpe... eu achei que tinha sido obra de vocês..."
10035080-142 = "Eu cometi um erro novamente..."
10035080-143 = "Bem, parece que o que vai, volta, né?"
10035080-144 = "O quê!?"
10035080-148 = "[ns] \"Espere. Estamos esquecendo de algo importante.\""
10035080-150 = "[ns] \"Se é assim, quem soltou o crocodilo mecânico?\""
10035080-160 = "Aaaah! O crocodilo entrou no prédio!"
10035080-161 = "Todos, fujam!"
10035080-163 = "Ah! Pessoal! P-por favor, evacuem!"
10035080-164 = "Isso complicou um pouco as coisas..."
10035080-165 = "Ah, droga. Nossas férias foram arruinadas...!"
10035080-167 = "Todos, preparem-se para o combate! Vamos neutralizar o crocodilo!"
