[translation]
1702-1 = "O Fantasma do Andar Deserto (2)"
1702-2 = "Hospital Geral Santa Teresa - 4º Andar, Ala Deserta"
1702-4 = "Ufufu... Urameshiya~, urameshiya~!!"
1702-5 = "Urameshiyaa..."
1702-7 = "...Tsc, não tem ninguém olhando mesmo, acho que vou parar com essa atuação clichê de fantasma."
1702-10 = "Fufu, o plano foi um sucesso. Quem diria que fingir ser um fantasma no meio da noite faria as pessoas sumirem tão rápido..."
1702-11 = "Os pacientes, e até os médicos e enfermeiras, estão com tanto medo do fantasma que ninguém mais chega perto desta área. Agora posso agir como bem entender!"
1702-12 = "Vejamos, primeiro vou dar uma olhada para ver se encontro algo que dê para vender e fazer um dinheiro..."
1702-15 = "...Hm? Passos?"
1702-19 = "Ha-Hanae-chan... você realmente pretende continuar com a exploração? #nNão parece ter nada aqui, sabe..."
1702-20 = "Não pode ser! Não podemos voltar até provarmos que não há fantasmas neste andar! #nOs pacientes ainda estão com medo, mesmo agora!"
1702-21 = "Por que a Hanae-chan é tão corajosa só nessas horas? Uuu..."
1702-24 = "Quem está aí? Não parecem ser enfermeiras deste hospital... #nSão alunas voluntárias?"
1702-26 = "Bem, não importa. Quem quer que seja, não vou perdoar ninguém que atrapalhe meu plano. #nVou fingir ser um fantasma e dar um susto nelas!"
1702-31 = "Hii!? V-você ouviu isso, Hanae-chan!? Algo se moveu atrás da cortina!"
1702-32 = "Ué? Não deveria ter nada ali até agora pouco... Será que algum gatinho entrou pela janela?"
1702-33 = "Gatinho, gatinho... Pode sair, por favor."
1702-35 = "Fufufu, urameshiya~, urameshiya~!"
1702-36 = "KYAAAAAA! U-um fantasma! Um fantaaaasma!!"
1702-37 = "Se não saírem daqui agora, vou roubar as almas de vocês!"
1702-38 = "Senpai! O pente azul! #nDentro dele estão as balas de prata que pegamos com a Sisterhood!"
1702-39 = "Eu não queria ter que usar isso, mas..."
1702-42 = "D-desculpe, fantasma! Com isso, por favor, faça a passagem para o outro mundo!"
1702-44 = "Ei, ué!? #nAtirar de repente, que tipo de comportamento é esse!"
1702-45 = "E isso aqui é um hospital, sabia!? Ficar balançando essas coisas perigosas por aí, e se alguém se machucar?!"
1702-46 = "Hã? Armas são muito úteis até em hospitais. Podem servir como muletas para pacientes feridos, ou para fazer pacientes que estão fingindo doença levantarem!"
1702-47 = "Armas são como itens mágicos essenciais em um hospital!"
1702-48 = "E-e além disso, como você não é uma pessoa viva, não deveria sentir nada mesmo sendo atingido por balas, certo...?"
1702-50 = "B-bem, isso é verdade, mas..."
1702-52 = "Ai! E-ei, espere um pouco!"
1702-53 = "Mesmo que sejam balas de prata para exorcismo, não tem como não serem inofensivas para quem está vivo! Se acertar, vai ferir, e se der errado, pode até matar, sabia?!"
1702-55 = "Hm? O fantasma já não deveria estar morto? Vai morrer de novo?"
1702-56 = "Eu entendo o seu apego à vida, mas este não é o seu lugar! #nPor favor, faça a passagem pacificamente!"
1702-59 = "P-pare com isso! Eu já entendi!"
1702-60 = "E-eu perdi! Por favor, pare com isso!"
1702-62 = "Depois disso, mesmo após o fantasma (?) declarar rendição, ele continuou sendo atingido por balas por mais algum tempo..."
