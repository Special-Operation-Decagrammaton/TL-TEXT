[translation]
1702-1 = "無人フロアの幽霊さん（２）"
1702-2 = "聖テレサ総合病院・4階無人フロア"
1702-4 = "うふふ……うらめしや～、うらめしや～！！"
1702-5 = "うらめしやぁ……。"
1702-7 = "……ちっ、見てる人もいないし、ベタベタな幽霊の演技なんてもうやめるか。"
1702-10 = "ふふ、計画は成功だな。真夜中に幽霊の真似をしただけで、こんなに早く人がいなくなるとは……。"
1702-11 = "患者はもちろん、医者と看護師たちも幽霊が怖くて、この辺りにはもう誰一人近寄らない。これで好き勝手に動ける！"
1702-12 = "どれどれ、まずは売って金になりそうな物でもないか調べてみるか……。"
1702-15 = "……ん？足音？"
1702-19 = "は、ハナエちゃん……本当に探索を続けるつもりなんですか？#nと、特に何もなさそうですが……。"
1702-20 = "ダメです！このフロアに幽霊がいないことをきちんと証明するまで帰れません！#nこうしている今も患者さんたちは怖がってるんですから！"
1702-21 = "どうしてハナエちゃんはこういう時だけ勇敢なんですか、ううぅ……。"
1702-24 = "誰だ？この病院の看護師たちではなさそうだが……#nボランティアの生徒たちか？"
1702-26 = "まあいい、誰であろうとこの私の計画を邪魔するやつは許さない。#n幽霊の真似をして、びっくりさせてやるとするか！"
1702-31 = "ひいっ！？い、今の聞きましたか、ハナエちゃん！？カーテンの向こうで何かが動きましたよ！"
1702-32 = "あれれ？そこは、さっきまで何もいなかったはずなのですが……窓から猫さんでも入ってきたんでしょうか？"
1702-33 = "猫さん、猫さーん。出てきてくださ～い。"
1702-35 = "ふふふっ、うらめしや～、うらめしや～！"
1702-36 = "キャアアアアァァァァッッ！ゆ、幽霊ですっ！幽霊っっっ！！"
1702-37 = "今すぐ出て行かないと、お前らの魂を奪ってやるぞ～！"
1702-38 = "先輩！青色の弾倉を！#nその中にシスターフッドで貰ってきた、銀の弾丸が入ってます！"
1702-39 = "これだけは使いたくなかったのですが……"
1702-42 = "す、すみません、幽霊さん！これで、成仏してください！"
1702-44 = "え、うわっ！？#nい、いきなり銃を撃つなんて、なんてことを！"
1702-45 = "それにここは病院だぞ！？そんな危ない物を振り回して、誰か怪我でもしたらどうするんだ！"
1702-46 = "へ？銃は病院でもとっても役立ちますよ。怪我した患者さんのための松葉杖としても使えますし、仮病の患者さんを立ち上がらせるためにも使えますし！"
1702-47 = "銃は病院でも必須の、魔法道具のようなものです！"
1702-48 = "そ、それに、幽霊さんは生きてる方ではないのですから、銃で撃たれても何ともないでは……？"
1702-50 = "そ、それはそう、だが……。"
1702-52 = "痛っ！ちょ、ちょっと待て！"
1702-53 = "いくら除霊用の銀の弾丸だと言っても、生きてる人に無害だなんてわけないだろう！当たったら怪我するだろうし、一歩間違ったら死ぬかもしれないんだぞ！？"
1702-55 = "んん？幽霊さんはもう死んでるはずなのに、また死んでしまうんですか？"
1702-56 = "生前への未練は分かりますが、ここはあなたがいる場所ではありません！#n素直に成仏してください！"
1702-59 = "や、やめろ！分かったから！"
1702-60 = "わ、私の負けだ！頼むからやめてくれー！"
1702-62 = "その後、幽霊（？）が降参を宣言してからも、しばらくの間銃弾を浴びせられ続けた……。"
