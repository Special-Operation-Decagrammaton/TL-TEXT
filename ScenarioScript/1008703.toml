[translation]
1008703-1 = "とにかく返品します！"
1008703-4 = "お客様、お着替えは済みましたか？"
1008703-11 = "ど、どうですか……先生？"
1008703-12 = "[s1] \"おお……よく似合ってるよ。\"\n[s2] \"綺麗だよ、アコ。\""
1008703-15 = "……先生の好みに合わせましたから。"
1008703-16 = "どこか気になる点はございますか？"
1008703-21 = "……そうですね。#n強いて言えば、少し背中が心許ないような……"
1008703-25 = "なんというか……ちょっと……"
1008703-26 = "たしかに仰る通りですが、お似合いだと思いますよ。"
1008703-27 = "……ふむ、フィッティングの調整はしておいた方が良いかと。#n一度、着替えていただいてもよろしいですか？"
1008703-34 = "うーん……"
1008703-35 = "[s] \"似合ってると思うけど、気になるところでもあった？\""
1008703-39 = "気になる、と言いますか……"
1008703-45 = "その……"
1008703-51 = "……風紀委員会から？"
1008703-55 = "はい、私です。"
1008703-61 = "え[ruby=パンデモニウム・ソサエティー]っ？万魔殿がま[/ruby]た問題を！？"
1008703-62 = "はい、今は席を外していまして……#nはい……はい、すぐ向かいますので、私が到着するまで待機していてください！"
1008703-66 = "すみません、急用で帰らなくては。"
1008703-67 = "[s] \"どうしたの？\""
1008703-68 = "いつもの面倒な事件です！"
1008703-69 = "大したことありませんので、お気になさらず。"
1008703-73 = "では先生！ドレスをお願いします！"
1008703-79 = "[ns] \"……相変わらず忙しそうだ。\""
1008703-83 = "あれ、お客様は……？"
1008703-84 = "[s3] \"急用で先に帰りました。\"\n[s4] \"ドレスは私が受け取ります。\""
1008703-87 = "そうでしたか……もうお直しは済んでおります。"
1008703-88 = "……ああ、失礼いたしました。"
1008703-92 = "一つ、伝え忘れていたことがありまして。"
1008703-96 = "こちらのドレスですが、インナーの着用を推奨しております。"
1008703-97 = "綺麗なシルエットを保つためにも、ぜひご検討ください。"
1008703-98 = "[s] \"アコが引っかかってたのは、そこだったのかな？\""
1008703-99 = "別途お支払いが必要にはなってしまいますが、いかがでしょう？"
1008703-100 = "どうぞ、実物をご覧ください。"
1008703-104 = "[ns] \"……紐に見えるような。\""
1008703-105 = "ええ。デザインを活かすために、こうなっておりまして……"
1008703-109 = "[ns5] \"怒られそうな気が……でも一応、買って帰ろうかな。\"\n[ns6] \"分かりました、それもお願いします。\""
1008703-112 = "では、ドレスとご一緒にラッピングいたします。"
1008703-113 = "お買い上げ、ありがとうございました。"
1008703-121 = "（アコの姿が見えなかったので、席にドレスを置いて帰った）"
