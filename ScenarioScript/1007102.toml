1007102-57 = "E foi. Também precisamos comprar novos trajes de banho para nossas operações subaquáticas."

1007102-58 = "Quando saí da escola SRT, não tinha dinheiro para levar meu traje de banho. ......"

1007102-59 = "Hmm ......"

1007102-67 = "Oh, isso é ...... fofo ......"

1007102-68 = "[\"Você gosta desse traje de banho? \""

1007102-72 = "Ah ...... sim, não ......"

1007102-73 = "Bem, ......"

1007102-77 = "Sim, chamou minha atenção, mas ......"

1007102-78 = "Esses trajes de banho não são adequados para operações. ......"

1007102-79 = "Os babados dificultam a movimentação e a falta de bolsos dificulta o transporte de equipamentos."

1007102-80 = "Portanto, esse traje de banho, que é feito de material durável e tem bolsos, provavelmente será melhor."

1007102-81 = "[s7] \"Há muitas atribuições diferentes. Por exemplo, ......\"\n[s8] \"Se você quiser se misturar aos turistas, acho que deve usar um traje de banho bonito. \""

1007102-84 = "Bem, quando você coloca as coisas dessa forma, é realmente preocupante. ......"

1007102-85 = "Como líder de pelotão de um pelotão RABBIT, você deve sempre carregar a quantidade mínima de equipamentos."

1007102-86 = "Equipamento de rádio para compartilhar informações e munição sobressalente. ......#nKits de primeiros socorros em caso de emergência. ......"

