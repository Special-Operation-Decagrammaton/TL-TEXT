[translation]
1007102-1 = "SRT、購入します"
1007102-3 = "（ミヤコから送られてきた座標は、予想外の場所だった）"
1007102-5 = "D.U.中央百貨店前"
1007102-7 = "[ns] \"……ここで合ってるのかな？\""
1007102-8 = "（作戦用の装備とは関係なさそうな場所だったので、座標を間違えたのかと思ったものの……）"
1007102-12 = "あ、先生。もういらっしゃったのですね。こちらです。"
1007102-13 = "無事に到着されたようで、安心しました。"
1007102-14 = "では、合流できましたし、さっそく目標地点に移動を……"
1007102-15 = "[s] \"ちょっと待って、ミヤコ。\""
1007102-19 = "どうかしましたか……？"
1007102-20 = "[s1] \"たしかSRTの装備に関する相談だったよね。\"\n[s2] \"なのに、どうして百貨店に……？\""
1007102-23 = "あ……たしかに、そうですね。"
1007102-24 = "私の説明が足りませんでした。すみません。"
1007102-25 = "[s3] \"ううん、謝らなくて大丈夫だよ。\"\n[s4] \"ただ、理由が気になって。\""
1007102-28 = "その……先日、任務の依頼人から、百貨店の商品券を頂きまして。"
1007102-29 = "あまりにも大きな額だったので最初はお断りしたのですが、使う予定がないし期限が近いからもらってくれると嬉しい、と……"
1007102-30 = "せっかくなので、夏の作戦に必要な装備を購入しようかと。#nただ、想像以上に百貨店の売り場が広く……"
1007102-31 = "SRT学園では、支給品で生活していたので……こういった買い物はあまり慣れていないんです。"
1007102-32 = "商品券を無駄にしないためにも、先生にアドバイスを頂けたらと。"
1007102-33 = "[s5] \"私もキャンプ用品はあまり詳しくないけど……\"\n[s6] \"精一杯、手伝うね。\""
1007102-36 = "ありがとうございます、先生。"
1007102-40 = "それでは、雨や湿気から電化製品を保護するカバーから見に行きましょう。"
1007102-42 = "（その後、ミヤコと一緒に百貨店を回り、夏のキャンプに必要な物を購入した）"
1007102-45 = "……なるほど。こういったタブレット錠剤は、まとめて買えばより安く購入できるのですね。"
1007102-46 = "ありがとうございます、先生。#nおかげでお金を節約できました。"
1007102-47 = "[s] \"大したことはしてないよ。\""
1007102-48 = "私たちのような世間知らずは、知らないことが多くて損をしやすいですから。"
1007102-49 = "こういう時に、信頼できる大人からアドバイスを頂けると、本当に助かります。"
1007102-50 = "えっと、あと必要な物は……"
1007102-54 = "あれ、ここは……？"
1007102-55 = "[s] \"水着コーナーだね。\""
1007102-56 = "いろんな種類の水着が……こんなにたくさんあるのですね。"
1007102-57 = "そうでした。水中作戦に備えて、新しい水着も用意しなければ。"
1007102-58 = "SRT学園を出る時は、余裕がなくて水着を持ってくる事ができなかったので……"
1007102-59 = "ふむ……"
1007102-67 = "あ、これ……かわいい……"
1007102-68 = "[s] \"その水着が気に入ったの？\""
1007102-72 = "あ……い、いえ……"
1007102-73 = "え、ええと……"
1007102-77 = "たしかに、目に留まりはしましたが……"
1007102-78 = "このような水着は、作戦に適さないので……"
1007102-79 = "フリルがあると動きにくそうですし、ポケットもないので、装備の携帯も難しそうです。"
1007102-80 = "ですので、丈夫な素材で、ポケットもついているこちらのスイムウェアの方が良さそうです。"
1007102-81 = "[s7] \"いろいろな任務があるよね。たとえば……\"\n[s8] \"観光客に紛れるなら、可愛い水着がいいと思うよ。\""
1007102-84 = "そ、そう言われると、たしかに悩んでしまいますが……"
1007102-85 = "RABBIT小隊の小隊長として、常に最小限の装備は携帯する必要があります。"
1007102-86 = "情報を共有するための無線機器に予備の弾薬……#n万が一に備えて応急処置キットも……"
1007102-87 = "どんなに軽量化したとしても、収納スペースは必要です。"
1007102-88 = "……なので、やはり。#n私の好みよりも、実用性を優先させるべきでしょう。"
1007102-89 = "[ns] \"……スペースが無いなら、私が代わりに持つよ。\""
1007102-90 = "お話はありがたいですが、いつ、どのような時に装備が必要となるか分かりません。"
1007102-91 = "そのたびに、先生を探すわけには――"
1007102-92 = "[ns] \"それなら、心配しなくてもいいよ。\""
1007102-96 = "[ns] \"作戦中は、常にミヤコのそばにいるからね。\""
1007102-103 = "……はい！"
1007102-105 = "（その後、可愛い水着を買ってから、ミヤコと子ウサギ公園に戻った）"
