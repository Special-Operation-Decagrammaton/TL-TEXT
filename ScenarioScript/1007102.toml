[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1007102-1 = "SRT, Iniciando Compra" 
1007102-3 = "（As coordenadas que Miyako enviou apontavam para um local inesperado.）" 
1007102-5 = "Em frente à Loja de Departamentos Central de D.U." 
1007102-7 = "[ns] \"……É aqui mesmo?\"" 
1007102-8 = "（Achei que ela tivesse errado as coordenadas, já que o lugar não parecia ter relação com equipamentos táticos, mas……）" 
1007102-12 = "Ah, Sensei. Você já chegou. É por aqui." 
1007102-13 = "Que alívio ver que chegou em segurança." 
1007102-14 = "Bom, já que nos encontramos, vamos direto para o local alvo……" 
1007102-15 = "[s] \"Espera um pouco, Miyako.\"" 
1007102-19 = "Ocorreu algum problema……?" 
1007102-20 = "[s1] \"Você disse que queria conversar sobre equipamentos da SRT, certo?\"\n[s2] \"Então, por que estamos numa loja de departamentos……?\"" 
1007102-23 = "Ah…… Tem razão." 
1007102-24 = "Faltou explicação da minha parte. Peço desculpas." 
1007102-25 = "[s3] \"Não, não precisa se desculpar.\"\n[s4] \"Eu só fiquei curioso sobre o motivo.\"" 
1007102-28 = "É que…… Outro dia, recebemos vales-presente de uma loja de departamentos de um cliente." 
1007102-29 = "O valor era tão alto que recusei de início, mas ele insistiu dizendo que ficaria feliz se aceitássemos, pois não tinha planos de usar e a validade estava próxima……" 
1007102-30 = "Já que estamos com eles, pensei em comprar os equipamentos necessários para as nossas operações de verão.\nSó que…… o setor de vendas era muito maior do que eu imaginava……" 
1007102-31 = "Como vivíamos apenas com os suprimentos fornecidos pela Academia SRT…… não estou muito acostumada com esse tipo de compra." 
1007102-32 = "Para não desperdiçar os vales-presente, gostaria de pedir os seus conselhos, Sensei." 
1007102-33 = "[s5] \"Eu também não entendo muito de equipamentos de acampamento, mas……\"\n[s6] \"Vou ajudar no que eu puder.\"" 
1007102-36 = "Muito obrigada, Sensei." 
1007102-40 = "Então, vamos primeiro olhar as capas protetoras para proteger os aparelhos eletrônicos da chuva e da umidade." 
1007102-42 = "（Depois disso, andei pela loja com a Miyako e compramos os itens necessários para acampar no verão.）" 
1007102-45 = "……Entendo. Então, comprar esse tipo de pastilha purificadora em grandes quantidades sai mais barato." 
1007102-46 = "Muito obrigada, Sensei.\nGraças a você, conseguimos economizar." 
1007102-47 = "[s] \"Não fiz nada demais.\"" 
1007102-48 = "Pessoas com pouca experiência de vida como nós não conhecem muitas coisas e acabam saindo no prejuízo facilmente." 
1007102-49 = "Receber conselhos de um adulto confiável em momentos assim é de grande ajuda." 
1007102-50 = "Ahn, o que mais precisamos é……" 
1007102-54 = "Ué, aqui é a……?" 
1007102-55 = "[s] \"Seção de trajes de banho.\"" 
1007102-56 = "Existem tantos tipos diferentes de trajes de banho…… nunca imaginei que fossem tantos assim." 
1007102-57 = "É verdade. Precisamos preparar novos trajes de banho para as operações aquáticas." 
1007102-58 = "Quando saímos da Academia SRT, não tínhamos espaço e acabamos não trazendo os nossos trajes de banho……" 
1007102-59 = "Hmm……" 
1007102-67 = "Ah, esse aqui…… é fofinho……" 
1007102-68 = "[s] \"Gostou desse traje de banho?\"" 
1007102-72 = "A-Ah…… n-não……" 
1007102-73 = "Hã, b-bom……" 
1007102-77 = "É verdade que chamou a minha atenção, mas……" 
1007102-78 = "Um traje de banho como este não é adequado para operações……" 
1007102-79 = "Os babados parecem dificultar a movimentação e não há bolsos, o que dificulta carregar equipamentos." 
1007102-80 = "Por isso, este traje de banho aqui, feito de material resistente e com bolsos, parece ser a melhor escolha." 
1007102-81 = "[s7] \"Existem vários tipos de missões, sabe. Por exemplo……\"\n[s8] \"Se for para se misturar com os turistas, acho que um traje de banho fofo é a melhor opção.\"" 
1007102-84 = "S-Se você diz isso, eu realmente fico em dúvida, mas……" 
1007102-85 = "Como comandante do Esquadrão RABBIT, preciso carregar o mínimo de equipamento necessário o tempo todo." 
1007102-86 = "Rádios para comunicação, munição reserva……\nE um kit de primeiros socorros para qualquer emergência……" 
1007102-87 = "Por mais que eu tente reduzir o peso, ainda preciso de espaço de armazenamento." 
1007102-88 = "……Então, no fim das contas.\nEu devo priorizar a praticidade em vez dos meus gostos pessoais." 
1007102-89 = "[ns] \"……Se não tem espaço, eu carrego para você.\"" 
1007102-90 = "Agradeço a oferta, mas não sabemos quando ou em que situação o equipamento será necessário." 
1007102-91 = "Não posso ficar procurando por você toda vez que precisi――" 
1007102-92 = "[ns] \"Nesse caso, não precisa se preocupar.\"" 
1007102-96 = "[ns] \"Durante as operações, eu estarei sempre ao seu lado, Miyako.\"" 
1007102-103 = "……Certo!" 
1007102-105 = "（Depois disso, comprei o traje de banho fofo e retornei ao Parque dos Coelhinhos com a Miyako.）" 