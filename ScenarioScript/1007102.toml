1007102-25 = "[s3] \"Não, você não precisa se desculpar. \"\n[s4] \"Eu só estava me perguntando por quê. \"\"\n[s4] \"Eu só estava me perguntando por quê.""

1007102-28 = "O ...... recebeu recentemente um vale-presente de uma loja de departamentos de um cliente em um trabalho."

1007102-29 = "Inicialmente, recusei por se tratar de uma quantia muito alta, mas ele disse que não pretendia usá-la e que estava perto do prazo final, portanto, ficaria feliz em recebê-la. ......"

1007102-30 = "Já que estou aqui, pensei em comprar o equipamento necessário para minha operação de verão. #nMas a área de vendas das lojas de departamentos é muito maior do que eu imaginava. ......"

1007102-31 = "Na SRT Academy, eu vivia de suprimentos, por isso não estou acostumado a fazer esse tipo de compra no site ......."

1007102-32 = "Eu esperava que o médico pudesse me dar alguma orientação sobre como evitar o desperdício dos vales-presente."

1007102-33 = "[s5]\"Eu também não sei muito sobre equipamentos de acampamento, mas ......\"\n[s6]\"Eu o ajudarei da melhor forma possível. \"\"\n[s6]"Eu o ajudarei da melhor forma possível.""

1007102-36 = "Obrigado, senhor."

1007102-40 = "Agora vamos dar uma olhada nas capas que protegem os aparelhos da chuva e da umidade."

1007102-42 = "(Depois, ele e Miyako foram às lojas de departamento e compraram coisas para a colônia de férias)."

1007102-45 = "...... Entendo. Então, esses tablets são mais baratos para comprar em grandes quantidades?"

1007102-46 = "Obrigado, doutor. #Obrigado por economizar meu dinheiro."

