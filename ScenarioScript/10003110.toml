[translation]
10003110-1 = "風紀委員会 夏の合宿訓練 実践編"
10003110-4 = "ほら、もっときびきび動け！そんなんじゃ逃げられるぞ！"
10003110-5 = "は、はいっ……！"
10003110-6 = "りょ、了解です！すみません！"
10003110-7 = "返事は短く！口よりも足を動かせ！"
10003110-8 = "はぁ、大丈夫かこれ……。"
10003110-9 = "イオリ、訓練は順調ですか？"
10003110-10 = "あっ、アコちゃん。"
10003110-11 = "順調……とは言えないかも。だいぶ動きが悪い。"
10003110-12 = "スケバンやら何やらがいつ来るかも分からないのに、こんな状態で対処できるのかな……。"
10003110-13 = "なるほど、そうですね……イオリ、一つ提案があります。"
10003110-14 = "ん？"
10003110-15 = "指示を出す本人がまずは実際にやってみせる、というのが、やはり大事だと思うんです。特に動きのリズム感のようなものは、誰かが動く姿を客観的に見て、初めてコツを掴めることもありますから。"
10003110-16 = "……え？"
10003110-17 = "ですからイオリ、一度射撃のお手本を見せてもらえませんか？"
10003110-18 = "え、お手本？私？"
10003110-19 = "はい♪"
10003110-20 = "いや、それ別に私じゃなくても……。"
10003110-21 = "さあ、時間も無いのでテキパキ始めましょう。それに……"
10003110-25 = "今の私は委員長の代理です。拒否権はありませんよ？"
10003110-26 = "ああもう、分かった分かった！やれば良いんでしょ、やれば！"
