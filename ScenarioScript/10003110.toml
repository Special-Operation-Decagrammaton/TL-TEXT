[translation]
10003110-1 = "Comitê Disciplinar: Treinamento de Acampamento de Verão, Edição Prática"
10003110-4 = "Ei, movam-se com mais agilidade! Desse jeito, eles vão escapar!"
10003110-5 = "S-sim...!"
10003110-6 = "E-entendido! Desculpe!"
10003110-7 = "Respostas curtas! Mexam as pernas mais do que a boca!"
10003110-8 = "Haa, será que isso vai dar certo..."
10003110-9 = "Iori, o treinamento está indo bem?"
10003110-10 = "Ah, Ako."
10003110-11 = "Bem... não diria isso. Os movimentos estão bem lentos."
10003110-12 = "Não sabemos quando as delinquentes ou qualquer outra pessoa podem aparecer, será que vamos conseguir lidar com isso nesse estado..."
10003110-13 = "Entendo, é verdade... Iori, tenho uma sugestão."
10003110-14 = "Hm?"
10003110-15 = "Acho que é muito importante que a pessoa que dá as ordens demonstre na prática primeiro. Especialmente com coisas como o ritmo dos movimentos, às vezes só conseguimos pegar o jeito observando alguém fazer de forma objetiva."
10003110-16 = "……Hã?"
10003110-17 = "Por isso, Iori, você poderia nos mostrar um exemplo de tiro?"
10003110-18 = "Hã, um exemplo? Eu?"
10003110-19 = "Sim♪"
10003110-20 = "Não, não precisa ser necessariamente eu..."
10003110-21 = "Vamos, não temos tempo, então vamos começar logo. Além disso..."
10003110-25 = "No momento, sou a representante da presidente do comitê. Você não tem direito de recusa, entendeu?"
10003110-26 = "Ah, droga, entendi, entendi! Eu faço, tá bom, eu faço!"
