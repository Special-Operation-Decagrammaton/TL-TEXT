[translation]
10012065-1 = "第6話;真夏の夜の夢"
10012065-5 = "よいしょ……っと。"
10012065-6 = "ふう、これで全部運び終わりました。"
10012065-7 = "こっちも大体終わったわ。先生の方は？"
10012065-8 = "[s1] \"こっちも全部終わったよ。\"\n[s2] \"イタタ、腰が……。\""
10012065-9 = "そこに置いといてくれたら、後は私がやるから。"
10012065-10 = "全然痛がってないじゃない……。"
10012065-11 = "急にバーベキューパーティだなんて……"
10012065-12 = "まだ修理も終わってないのに、こんなことしている場合でしょうか……？"
10012065-14 = "大丈夫だよ、アヤネちゃん。"
10012065-15 = "私たちもちょっとは休まないとね。ずっと掃除ばっかしてたらバカンスの意味がないじゃん？"
10012065-16 = "せっかく海に来たんですから、記念撮影もしましょう☆遊ぶ時はちゃんと遊ばないとですよ～！"
10012065-18 = "……先輩たち、準備するのもバカンスのうちとかなんとか言ってなかったっけ。"
10012065-20 = "あははは……。"
10012065-21 = "もう終わった話は忘れようよ～"
10012065-22 = "あと残ってるのって、ヘリの修理だけじゃん？その辺は明日やればいいしさ～"
10012065-23 = "準備はこれで終わりです！"
10012065-24 = "今からはバカンスの時間ですからね～☆"
10012065-29 = "ヘリ……。"
10012065-30 = "心配することないですよ、アヤネちゃん。"
10012065-31 = "倉庫に部品もいっぱいありましたし、明日みんなでやれば大丈夫です。"
10012065-32 = "うん。修理に最低でも一日はかかるし、一気にやるなら今日じゃなくて明日からやった方がいい。"
10012065-33 = "それに、暗いところでの整備は危ないからね。明日頑張るために、今日はゆっくり羽を伸ばそう。"
10012065-34 = "うんうん！これは全部必要な休息なんですよ！"
10012065-35 = "ノノミ先輩、シロコ先輩……。"
10012065-37 = "……そういえばあの変なヤツら、あれからずっと見ないわね？"
10012065-38 = "警備システムのおかげなのかしら？"
10012065-39 = "もしかしたら島の外に追い出されたのかも……"
10012065-40 = "あの時の警備ロボットだけでも、かなりの数いましたし。"
10012065-42 = "向こうも何か移動手段あるだろうし、それに乗って帰ったんじゃないかね～"
10012065-43 = "わざとではなかったんですが、酷いことをしちゃったかもですね……"
10012065-44 = "最初に攻撃してきたのはあっちなんだし、気にすることないんじゃない？"
10012065-45 = "私たちは自分たちのリゾートを守っただけだし……"
10012065-46 = "……ん。先生も守った。"
10012065-47 = "そうそう！先生も守っ……！"
10012065-48 = "たのは、今は関係ないでしょ！？"
10012065-49 = "ああもう！荷物運んだならシート敷いて！私、準備してくるから！"
10012065-53 = "あはは……じゃあ、私もセリカちゃんを手伝いに行ってきますね。"
10012065-57 = "……うへ、青春だねぇ～"
10012065-58 = "[s] \"じゃあ私たちも始めよっか。\""
10012065-63 = "……うん、そうしよっか。"
10012065-138 = "（楽しく時間を過ごしていたら、いつの間にか夜になっていた）"
10012065-139 = "（疲れて眠っている対策委員会の子たちを置いて、夜の空気に当たりながら砂浜を散歩した）"
10012065-140 = "（……。）"
10012065-141 = "ここにいらっしゃったんですね、先生。"
10012065-142 = "[s] \"……？\""
10012065-143 = "……ジャーン！ノノミの登場、ですよ☆"
10012065-144 = "ちょっとお姿が見えないと思って……何をされてたんですか？"
10012065-145 = "[s3] \"風にあたりに来たんだ。\"\n[s4] \"ここが一番涼しいからね。\""
10012065-146 = "そうなんですね～じゃあ、私も……。"
10012065-147 = "そうなんですね～じゃあ、私も……。"
10012065-153 = "[ns5] \"……ノノミ？\"\n[ns6] \"隣に！？\""
10012065-154 = "ふふっ、私も涼みに来たんです。"
10012065-155 = "ふふっ、私も涼みに来たんです。"
10012065-156 = "ちょっと暑くて寝苦しかったですし……"
10012065-157 = "他のみんなは、くたくたになってぐっすり寝てますよ。"
10012065-158 = "シロコちゃんも、セリカちゃんも、アヤネちゃんも……。"
10012065-159 = "そして……。"
10012065-160 = "[s7] \"……ノノミ？\"\n[s8] \"どうしたの？\""
10012065-161 = "いえ、大したことじゃないんです。"
10012065-162 = "いえ、大したことじゃないんです。"
10012065-166 = "ただ……こんな風に色んなことを忘れて遊べたのは初めてだなって。"
10012065-167 = "私たちはいつも、学校のことで頭がいっぱいだったから……。"
10012065-168 = "たまには、こうやって何も考えないではしゃぐのも、いいものですね。"
10012065-169 = "……帰ったらまた学校の問題と向き合わなきゃいけないけど、こういう休暇も大事だよね～。"
10012065-170 = "……あれ、ホシノ先輩？"
10012065-178 = "どんな面白い話をしているのかな？二人っきりで。"
10012065-179 = "あれ、さっきまで先輩、クジラを枕にしてお休みになってませんでしたか？"
10012065-180 = "そそ。んで、今起きたの～。"
10012065-181 = "うへ、私も暑くて目が覚めた……ってとこかな？"
10012065-182 = "あはは……先輩でも寝苦しい時があるんですね……。"
10012065-187 = "いい雰囲気だね～。おじさん、こういうの嫌いじゃないよ。久しぶりにのんびりできたよ。"
10012065-188 = "先輩はいつものんびりしてますよ～？墜落するヘリの中でも眠れるくらい☆"
10012065-189 = "ノノミちゃん、いつもよりちょっとツッコミが強くない～？"
10012065-190 = "なになに～？他の子がいないから、ツッコミが強くなってるのか、それとも夏の海だからなのか。おじさん、ビックリしちゃった。"
10012065-191 = "うーん……。"
10012065-192 = "とりあえずは夏の海のせいってことで？"
10012065-193 = "うーむ、悲しいねぇ。うちの繊細で可愛い後輩たちが、どうしてこんな風に育っちゃったのか……"
10012065-195 = "うふふ、「繊細で可愛い」はお互い様じゃないですか？"
10012065-196 = "バーベキューパーティの時も……いつもと違って、先輩は色々手伝ってくれましたしね。"
10012065-201 = "な、夏の海って怖いね！？ノノミちゃ～ん！？"
10012065-202 = "……ま、まぁおじさんがテキパキ手伝ってるのは珍しいかもだけどさ！雰囲気の影響なのかな！？"
10012065-203 = "ああ、もしかしたらバーベキューセットの影響もあるかも……"
10012065-207 = "元々はアビドス砂祭りで使うために買ったものだったからねぇ。"
10012065-209 = "……先輩。"
10012065-210 = "……ほら。"
10012065-211 = "ノノミちゃんにそんな顔させちゃうから、こういう話はしないんだよ。"
10012065-212 = "シロコちゃんも、アヤネちゃんも、セリカちゃんも同じ。"
10012065-213 = "うちの可愛い後輩たちに余計な悩みを増やしたくないんだ。今でも十分頑張ってくれてるからね。"
10012065-214 = "……でも、今は言いましたよね。"
10012065-215 = "そりゃあ、今だから……真夏の夜の海だからさ。"
10012065-216 = "だからノノミちゃんも……その顔はここだけにして、忘れようね。約束だぞ？"
10012065-220 = "……はい、分かりました。約束です☆"
10012065-221 = "……うん。"
10012065-222 = "せっかくですし、もう少し続けましょう？"
10012065-223 = "「ここだけ」のお話ですから。"
10012065-224 = "うへ……続けるの？おじさん、そろそろ限界だよ～もうやめちゃダメ？"
10012065-225 = "ダメです。次にいつこういう機会があるか分からないでしょう？"
10012065-226 = "ね？先生。"
10012065-227 = "[s9] \"そうだね。\"\n[s10] \"まあ、真夏の夜の海だからね。\""
10012065-228 = "うへ～先生まで！！おじさんの味方はいないの～？"
10012065-229 = "うへ～先生まで！！おじさんの味方はいないの～？"
10012065-235 = "（その後、二人と夜中まで会話をしてそのまま眠った）"
