[translation]
10012065-1 = "Episódio 6: Sonho de uma noite de verão"
10012065-5 = "Heave... ho."
10012065-6 = "Ufa, terminei de carregar tudo."
10012065-7 = "Eu também terminei por aqui. E você, Sensei?"
10012065-8 = "[s1] \"Eu também terminei tudo aqui.\"\n[s2] \"Ai, ai, minhas costas...\""
10012065-9 = "Pode deixar aí, eu cuido do resto."
10012065-10 = "Você nem parece estar sentindo dor..."
10012065-11 = "De repente, uma festa de churrasco..."
10012065-12 = "Ainda nem terminamos os reparos, será que é mesmo o momento para isso...?"
10012065-14 = "Está tudo bem, Ayane-chan."
10012065-15 = "Nós também precisamos descansar um pouco. Se ficarmos só limpando, qual seria o sentido das férias?"
10012065-16 = "Já que viemos até a praia, vamos tirar fotos comemorativas também☆ Temos que aproveitar quando é hora de aproveitar!"
10012065-18 = "...As veteranas não tinham dito que preparar as coisas também fazia parte das férias?"
10012065-20 = "Ahahaha..."
10012065-21 = "Esquece o que já passou~"
10012065-22 = "O que falta é só o conserto do helicóptero, não é? Podemos resolver isso amanhã~"
10012065-23 = "Os preparativos acabaram!"
10012065-24 = "De agora em diante, é hora de férias~☆"
10012065-29 = "O helicóptero..."
10012065-30 = "Não precisa se preocupar, Ayane-chan."
10012065-31 = "Tinha um monte de peças no depósito, se fizermos todos juntos amanhã, vai dar certo."
10012065-32 = "É. O conserto vai levar pelo menos um dia, então é melhor começar amanhã do que tentar fazer tudo de uma vez hoje."
10012065-33 = "Além disso, fazer manutenção no escuro é perigoso. Para darmos o nosso melhor amanhã, vamos relaxar hoje."
10012065-34 = "Isso mesmo! Tudo isso é um descanso necessário!"
10012065-35 = "Nonomi-senpai, Shiroko-senpai..."
10012065-37 = "...Falando nisso, não vimos mais aqueles caras estranhos desde aquela hora, né?"
10012065-38 = "Será que foi por causa do sistema de segurança?"
10012065-39 = "Talvez eles tenham sido expulsos da ilha..."
10012065-40 = "Só aqueles robôs de segurança daquela hora já eram um número considerável."
10012065-42 = "Eles provavelmente tinham algum meio de transporte, devem ter ido embora nele~"
10012065-43 = "Não foi por querer, mas talvez tenhamos sido um pouco duras com eles..."
10012065-44 = "Eles que nos atacaram primeiro, não precisa se preocupar com isso, né?"
10012065-45 = "Nós só protegemos o nosso resort..."
10012065-46 = "...Hum. E protegemos o Sensei também."
10012065-47 = "Isso mesmo! E protegemos o Sensei...!"
10012065-48 = "Isso não tem nada a ver agora, tem?!"
10012065-49 = "Ah, chega! Se já carregaram a bagagem, estendam a toalha! Eu vou preparar as coisas!"
10012065-53 = "Ahaha... então, eu vou lá ajudar a Serika-chan."
10012065-57 = "...Uhe, isso é juventude, hein~"
10012065-58 = "[s] \"Então, vamos começar também?\""
10012065-63 = "...Sim, vamos fazer isso."
10012065-138 = "(Enquanto nos divertíamos, a noite caiu sem perceber)"
10012065-139 = "(Deixei as meninas do Comitê de Contramedidas dormindo de cansaço e fui caminhar pela areia, sentindo a brisa noturna)"
10012065-140 = "(...)"
10012065-141 = "Você estava aqui, Sensei."
10012065-142 = "[s] \"...?\""
10012065-143 = "...Tcharam! A Nonomi chegou, hein☆"
10012065-144 = "Não vi você por lá... o que estava fazendo?"
10012065-145 = "[s3] \"Vim pegar um pouco de ar.\"\n[s4] \"Porque aqui é o lugar mais fresco.\""
10012065-146 = "Entendo~ Então, eu também..."
10012065-147 = "Entendo... então, eu também..."
10012065-153 = "[ns5] \"...Nonomi?\"\n[ns6] \"Bem aqui!?\""
10012065-154 = "Fufu, eu também vim me refrescar."
10012065-155 = "Fufu, eu também vim me refrescar."
10012065-156 = "Estava um pouco quente e difícil de dormir..."
10012065-157 = "As outras meninas estão exaustas e dormindo profundamente."
10012065-158 = "Shiroko-chan, Serika-chan, Ayane-chan também..."
10012065-159 = "E então..."
10012065-160 = "[s7] \"...Nonomi?\"\n[s8] \"O que houve?\""
10012065-161 = "Não, não é nada demais."
10012065-162 = "Não, não é nada demais."
10012065-166 = "É só que... é a primeira vez que consigo esquecer de tudo e apenas me divertir assim."
10012065-167 = "Nós sempre estivemos com a cabeça cheia por causa da escola..."
10012065-168 = "De vez em quando, é bom não pensar em nada e apenas aproveitar, não é?"
10012065-169 = "...Quando voltarmos, teremos que encarar os problemas da escola novamente, mas esse tipo de férias também é importante, né?"
10012065-170 = "...Ué, Senpai Hoshino?"
10012065-178 = "Que tipo de conversa interessante vocês estão tendo? A sós."
10012065-179 = "Ué, até agora pouco a Senpai não estava dormindo usando a baleia como travesseiro?"
10012065-180 = "Isso mesmo. E acabei de acordar~."
10012065-181 = "Uhe, acho que acordei porque também estava calor..."
10012065-182 = "Ahaha... então até a Senpai tem dificuldade para dormir às vezes..."
10012065-187 = "Que clima bom, né~. O tio aqui não desgosta disso. Faz tempo que não relaxo assim."
10012065-188 = "A Senpai está sempre relaxada, não está? Consegue até dormir dentro de um helicóptero caindo☆"
10012065-189 = "Nonomi-chan, não está sendo um pouco mais afiada nos comentários do que o normal~?"
10012065-190 = "O que, o que~? É porque as outras não estão aqui, ou é por causa do mar de verão? O tio aqui ficou surpreso."
10012065-191 = "Hmm..."
10012065-192 = "Por enquanto, podemos colocar a culpa no mar de verão?"
10012065-193 = "Hmm, que triste. Como será que minhas delicadas e adoráveis kouhais acabaram crescendo desse jeito..."
10012065-195 = "Ufufu, 'delicadas e adoráveis' não vale para nós duas?"
10012065-196 = "Na festa de churrasco também... diferente do habitual, a Senpai nos ajudou com várias coisas, não é?"
10012065-201 = "O-o mar de verão é assustador, né!? Nonomi-cha~n!?"
10012065-202 = "...B-bem, talvez seja raro o tio aqui ajudar de forma tão eficiente! Será que é a influência do clima!?"
10012065-203 = "Ah, talvez a influência do conjunto de churrasco também tenha algo a ver..."
10012065-207 = "Originalmente, eu tinha comprado para usar no Festival de Areia de Abydos, sabe."
10012065-209 = "...Senpai."
10012065-210 = "...Olha só."
10012065-211 = "É por isso que eu não falo sobre essas coisas, porque acabo fazendo a Nonomi-chan ficar com essa cara."
10012065-212 = "O mesmo vale para a Shiroko-chan, Ayane-chan e Serika-chan."
10012065-213 = "Não quero aumentar as preocupações das minhas adoráveis kouhais. Elas já estão se esforçando o suficiente."
10012065-214 = "...Mas agora você disse, não disse?"
10012065-215 = "Bem, é porque é agora... é uma noite de mar no auge do verão, afinal."
10012065-216 = "Por isso, Nonomi-chan também... guarde essa expressão apenas para este momento e vamos esquecer. É uma promessa, tá?"
10012065-220 = "...Sim, entendi. É uma promessa☆"
10012065-221 = "...Sim."
10012065-222 = "Já que estamos aqui, vamos continuar um pouco mais?"
10012065-223 = "Afinal, é uma conversa que fica \"apenas aqui\"."
10012065-224 = "Uhe... continuar? O tio aqui já chegou no limite~ não dá para parar?"
10012065-225 = "Não dá. Você não sabe quando teremos outra oportunidade dessas, sabe?"
10012065-226 = "Né, Sensei?"
10012065-227 = "[s9] \"É verdade.\"\n[s10] \"Bem, é uma noite de mar no auge do verão, afinal.\""
10012065-228 = "Uhe~ Até você, Sensei!! Não tem ninguém do lado deste tiozinho~?"
10012065-229 = "Uhe~ Até você, Sensei!! Não tem ninguém do lado deste tiozinho~?"
10012065-235 = "(Depois disso, conversei com as duas até tarde da noite e acabei pegando no sono)"