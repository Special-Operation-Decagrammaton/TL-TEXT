[translation]
2004502-1 = "静かなる・フィーナ"
2004502-2 = "（百鬼夜行へやってきた）"
2004502-7 = "[ns] \"久しぶりだから、道に迷っちゃったな……。\""
2004502-9 = "道に迷うとこでした！ありがとう！"
2004502-10 = "あのー……呉服屋さんってどこですか？"
2004502-12 = "[ns1] （あ、ガイドさんがいるんだ）\n[ns2] \"すみません、ちょっと道を教えてもらえますか？\""
2004502-15 = "もちろんデース！どちらへご案内シマ――"
2004502-20 = "あっ！センセイ！"
2004502-21 = "こんにちは！こちらが生まれ変わったフィーナになりマス！"
2004502-22 = "[s3] \"フィーナ！？\"\n[s4] \"生まれ変わったってどういうこと！？\""
2004502-25 = "いい質問デス！"
2004502-26 = "ワタシは今、百鬼夜行の商店街からのお願いで、ガイドを務めていマス！"
2004502-30 = "ちょうどお仕事中なのデスが、先生もご一緒にどうデスカ？"
2004502-31 = "[s] \"フィーナがいいなら、喜んで。\""
2004502-32 = "イエス！それではフィーナについてきてクダサイ！"
2004502-34 = "ここが、百鬼夜行を一望できる展望台デース！"
2004502-35 = "あちらに見えるのが、ワタシたちのシンボルである神木！毎年、あれを祀るお祭りが行なわれてマス！"
2004502-36 = "おお……カッコいい！"
2004502-37 = "神木をバックに撮りたいんだけど、ガイドさん、いいかな？"
2004502-38 = "もちろんデス！"
2004502-45 = "ここは、百鬼夜行の名産品が盛り沢山の、「食べ歩き横丁」デス！"
2004502-46 = "気になるお店があれば、何でも聞いてクダサイネ！"
2004502-47 = "不肖フィーナ、ご案内しマス！"
2004502-48 = "うわぁ！いい匂い！"
2004502-49 = "全部美味しそう……。"
2004502-50 = "迷ったときは、こちらの焼き鳥屋さんがオススメデース！"
2004502-52 = "お次に紹介するのは渦巻映画村！ここには……アレ？"
2004502-53 = "……？"
2004502-57 = "？"
2004502-61 = "……ナナナナゼ！？"
2004502-62 = "[s] \"フィーナ、どうしたの？\""
2004502-63 = "い、いつもここにいたハズ……。"
2004502-64 = "ピンチデス！！"
2004502-65 = "[s] \"映画のセットなら、もう撮影が終わっちゃったのかも……。\""
2004502-66 = "ち、違うんデス……。"
2004502-67 = "毎日ココにいる、ミニ柴蔵が見当たらないんデース！"
2004502-68 = "[s] \"ミニ……？\""
2004502-69 = "名作「るろうの柴蔵」の柴蔵の服を着たワンちゃんが、ここでお昼寝していマシテ……。"
2004502-70 = "映画村の名物といえばミニ柴蔵！なんデス！"
2004502-71 = "[s6] \"ワンちゃんにもその日の気分があるから……。\"\n[s7] \"別の場所でお昼寝してるのかも？\""
2004502-74 = "た、たしかに元の柴蔵も、映画の中でさすらってマシタ……！"
2004502-75 = "毎日ここで寝てたから、つい……！痛恨の極みデス！"
2004502-76 = "ガイドさん、ここにも何かあるの～？"
2004502-77 = "さっきからずっと待ってるんだけど……。"
2004502-82 = "（イ、イケマセン……テンパっちゃってマス……！）"
2004502-83 = "（オーノー！フィーナ、頭が真っ白デス……）"
2004502-84 = "[ns] \"ガイドさん、この等身大パネルすごいですね！\""
2004502-85 = "（……お頭！！）"
2004502-86 = "ハ、ハイ！それは、映画村で撮影をおこなった、人気俳優たちデス！ここでは無声映画の時代から盛んに――"
2004502-91 = "（恩に着マス……お頭……！）"
2004502-93 = "（落ち着きを取り戻したフィーナの見事な案内で、ガイドツアーは無事大成功を収めた）"
