[translation]
2004502-1 = "Fina, a Silenciosa"
2004502-2 = "（Chegou em Hyakkiyako）"
2004502-7 = "[ns] \"Faz tempo que não venho aqui, então acabei me perdendo...\""
2004502-9 = "Eu estava prestes a me perder! Obrigado!"
2004502-10 = "Com licença... onde fica a loja de tecidos?"
2004502-12 = "[ns1] （Ah, tem um guia aqui）\n[ns2] \"Desculpe, poderia me indicar o caminho?\""
2004502-15 = "Com certeza! Para onde deseja ser guiado――"
2004502-20 = "Ah! Sensei!"
2004502-21 = "Olá! Esta é a Fina, agora uma nova mulher!"
2004502-22 = "[s3] \"Fina!?\"\n[s4] \"Como assim, uma nova mulher!?\""
2004502-25 = "Boa pergunta!"
2004502-26 = "Estou trabalhando como guia a pedido do distrito comercial de Hyakkiyako!"
2004502-30 = "Estou em pleno trabalho agora, mas o que acha de vir comigo, Sensei?"
2004502-31 = "[s] \"Se a Fina não se importar, ficarei feliz em ir.\""
2004502-32 = "Yes! Então, por favor, siga a Fina!"
2004502-34 = "Este é o mirante de onde se pode ver toda Hyakkiyako!"
2004502-35 = "Aquela que você vê ali é a Árvore Sagrada, nosso símbolo! Todos os anos, realizamos um festival para homenageá-la!"
2004502-36 = "Uau... que legal!"
2004502-37 = "Eu queria tirar uma foto com a Árvore Sagrada ao fundo, guia, pode ser?"
2004502-38 = "Com certeza!"
2004502-45 = "Aqui é o \"Beco da Gastronomia\", repleto de especialidades de Hyakkiyako!"
2004502-46 = "Se houver alguma loja que lhe interesse, pode perguntar o que quiser!"
2004502-47 = "Eu, Fina, serei sua guia!"
2004502-48 = "Uau! Que cheiro bom!"
2004502-49 = "Tudo parece delicioso..."
2004502-50 = "Se estiver em dúvida, recomendo esta loja de espetinhos!"
2004502-52 = "A seguir, apresento a Vila Cinematográfica Uzumaki! Aqui tem... ué?"
2004502-53 = "...?"
2004502-57 = "?"
2004502-61 = "...P-por que!?"
2004502-62 = "[s] \"Fina, o que houve?\""
2004502-63 = "E-eu tinha certeza de que ele estava sempre aqui..."
2004502-64 = "É uma emergência!!"
2004502-65 = "[s] \"Se for um cenário de filme, talvez as filmagens já tenham acabado...\""
2004502-66 = "N-não é isso..."
2004502-67 = "O Mini Shibazou, que fica aqui todos os dias, não está em lugar nenhum!"
2004502-68 = "[s] \"Mini...?\""
2004502-69 = "É um cachorrinho que usa as roupas do Shibazou, do clássico \"Rurou no Shibazou\", e ele costuma tirar uma soneca aqui..."
2004502-70 = "O Mini Shibazou é a atração principal da Vila Cinematográfica! É!"
2004502-71 = "[s6] \"Cachorros também têm seus dias de humor...\"\n[s7] \"Talvez ele esteja tirando uma soneca em outro lugar?\""
2004502-74 = "V-verdade, o Shibazou original também vivia vagando pelo filme...!"
2004502-75 = "Como ele dormia aqui todos os dias, eu acabei...! Que erro terrível!"
2004502-76 = "Guia, tem algo aqui também?"
2004502-77 = "Estamos esperando aqui faz um tempo..."
2004502-82 = "（N-não pode ser... estou entrando em pânico...！）"
2004502-83 = "（Oh no! Fina, minha mente ficou em branco...）"
2004502-84 = "[ns] \"Guia, esse painel em tamanho real é incrível!\""
2004502-85 = "（...Chefe！！）"
2004502-86 = "S-sim! Esses são os atores populares que filmaram na Vila Cinematográfica! Aqui, desde a era do cinema mudo, tem sido muito――"
2004502-91 = "（Sou grata... Chefe...！）"
2004502-93 = "(Com a orientação impecável de Fina, que recuperou a calma, o tour guiado foi um sucesso absoluto)"
