[translation]
83304600200-9 = "そこの風紀委員会！止まれ！"
83304600200-16 = "マコト……何か用？"
83304600200-17 = "それはこちらのセリフだ。こんな所で何をしている。"
83304600200-18 = "先ほど訓練を終えたので、部室に戻っているのですが……？"
83304600200-19 = "訓練を終えただと？もう？"
83304600200-20 = "はい、終わりましたが……？"
83304600200-21 = "その程度の訓練量では、とてもじゃないが足りん！"
83304600200-22 = "あまりにも足りていない！"
83304600200-24 = "……。"
83304600200-25 = "もうじき始まるパーティーが、どれほど重要なのか知らないのか……！？"
83304600200-26 = "いつ、どんな問題が起きるのか！誰も予測できない！"
83304600200-27 = "だからこそ、十分な訓練をして備えておく必要がある！"
83304600200-28 = "つまり！これでは足りない！まったく足りるものか！今までの2倍……いや、3倍の訓練を行なってもらう！"
83304600200-29 = "お前たちが訓練を怠っていたせいで……私たちのイブキが傷ついたんだ！そんな不祥事が二度と起こってたまるか！"
83304600200-30 = "ああもう、話になりませんね……！"
83304600200-31 = "そもそも、イブキちゃんが怪我をしたのは完全にあなたのせ――"
83304600200-32 = "口答えをするようなら、万魔殿の権限を使ってお前らの訓練量をさらに増やしてやってもいいがな！"
83304600200-34 = "分かった、いいよ。"
83304600200-35 = "委員長！？"
83304600200-36 = "ここで言い争っても仕方ない。"
83304600200-37 = "そっちの言う通り、3倍の訓練を行なう。"
83304600200-38 = "キキキッ！そう来なくてはな……！"
83304600200-39 = "でも、それ以上あなたが口を挟むようなら……"
83304600200-45 = "私も黙ってはいない。"
83304600200-46 = "うぐっ！？さ、さっさとマコト様の指示に従うんだな！"
