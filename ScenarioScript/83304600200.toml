[translation]
83304600200-9 = "Ei, vocês do Comitê Disciplinar! Parem aí!"
83304600200-16 = "Makoto... precisa de algo?"
83304600200-17 = "Essa é a minha pergunta. O que estão fazendo aqui?"
83304600200-18 = "Acabamos de terminar o treinamento e estamos voltando para a sala do clube, mas...?"
83304600200-19 = "Terminaram o treinamento? Já?"
83304600200-20 = "Sim, terminamos, mas...?"
83304600200-21 = "Essa quantidade de treinamento não é nem de longe o suficiente!"
83304600200-22 = "É insuficiente demais!"
83304600200-24 = "..."
83304600200-25 = "Você não sabe o quão importante é a festa que vai começar em breve...!?"
83304600200-26 = "Ninguém pode prever quando ou que tipo de problema pode acontecer!"
83304600200-27 = "É por isso que vocês precisam treinar o suficiente para estarem preparadas!"
83304600200-28 = "Ou seja! Isso não é o bastante! De jeito nenhum! Quero que façam o dobro... não, o triplo do treinamento!"
83304600200-29 = "Por causa da negligência de vocês no treinamento... a nossa Ibuki se machucou! Não vou permitir que um incidente desses aconteça de novo!"
83304600200-30 = "Ah, chega, não dá para conversar com você...!"
83304600200-31 = "Para começar, a Ibuki ter se machucado foi inteiramente culpa sua—"
83304600200-32 = "Se continuar retrucando, posso usar a autoridade do Pandemonium para aumentar ainda mais a carga de treinamento de vocês!"
83304600200-34 = "Entendido, tudo bem."
83304600200-35 = "Presidente!?"
83304600200-36 = "Não adianta discutir aqui."
83304600200-37 = "Faremos o triplo do treinamento, como você quer."
83304600200-38 = "Kikiki! Assim que se fala...!"
83304600200-39 = "Mas, se você continuar se intrometendo mais do que isso..."
83304600200-45 = "Eu não vou ficar calada."
83304600200-46 = "Ugh!? Lo-logo, sigam as instruções da Lady Makoto!"
