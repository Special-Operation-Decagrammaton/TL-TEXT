[translation]
1300009-1 = "Dando as boas-vindas a uma tarde radiante"
1300009-2 = "Schale - Escritório"
1300009-4 = "……"
1300009-5 = "……………。"
1300009-8 = "Ora, Mestre. Que coincidência encontrar você por aqui, não é?"
1300009-9 = "[s1] \"Você não me fez trabalhar o dia todo até agora!?\"\n[s2] \"Eu vim porque você me chamou, então não é coincidência.\""
1300009-10 = "Fufu, não se preocupe com detalhes tão pequenos."
1300009-11 = "Fufu, não se preocupe com detalhes tão pequenos."
1300009-12 = "Como você disse, este encontro não é uma coincidência."
1300009-13 = "É o destino."
1300009-14 = "……。"
1300009-15 = "Fufu, não fique tão confuso."
1300009-16 = "Já que acabei de... terminar de receber sua ajuda na minha missão, preparei uma recompensa. Vamos?"
1300009-20 = "Uma certa casa"
1300009-25 = "Fufu, é mais bonita do que eu imaginava."
1300009-26 = "Esta casa? Fui eu quem a preparei."
1300009-27 = "Por favor, espere um pouco neste quarto."
1300009-28 = "É sério. Não saia daqui até que eu chame, entendeu?"
1300009-29 = "Ah, você deve estar cansado depois de ter me ajudado tanto. Pode se deitar um pouco, se quiser."
1300009-31 = "……。"
1300009-34 = "Mestre."
1300009-35 = "Mestre, por favor, acorde."
1300009-38 = "[ns3] Acordar e sair para ver.\n[ns4] Dormir mais um pouco……."
1300009-40 = "……。"
1300009-41 = "（Sussurro……）"
1300009-42 = "……？"
1300009-43 = "（Um aroma agradável）"
1300009-44 = "……。"
1300009-45 = "（Sussurro, sussurro……）"
1300009-46 = "……？"
1300009-47 = "（Um aroma agradável）"
1300009-48 = "（Desliza）"
1300009-50 = "Acordou?"
1300009-51 = "Fufu. Você realmente dormiu, devia estar exausto."
1300009-52 = "Bem, então vamos começar? O momento clássico, porém perfeito, entre uma empregada e seu mestre."
1300009-55 = "― Ora.[wa:1000] Bem-vindo de volta."
1300009-57 = "― Como foi[wa:1200] o seu dia hoje?"
1300009-60 = "― Ah,[wa:1000] Mestre.[wa:1500] Acabaram de chegar[wa:1000] folhas de chá da melhor qualidade."
1300009-62 = "― Gostaria que eu preparasse[wa:1500] uma xícara para você?"
1300009-65 = "― Sim?[wa:1500] Esta não é,[wa:1000] você diz, a nossa casa?"
1300009-68 = "― Fufu.[wa:1500] Não se preocupe.[wa:2000] Mesmo que não seja a nossa casa,"
1300009-70 = "― Nós estamos juntos agora, não estamos?"
1300009-73 = "Fufu, gostou do presente que preparei? Eu sempre sonhei com algo assim."
1300009-74 = "Akane, da C&C. Continuarei a servi-lo com toda a minha sinceridade."
