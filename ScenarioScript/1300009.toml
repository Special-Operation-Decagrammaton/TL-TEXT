[translation]
1300009-1 = "輝く午後を迎えて"
1300009-2 = "シャーレ・執務室"
1300009-4 = "……"
1300009-5 = "……………。"
1300009-8 = "あらっ、ご主人様。こんなところでお会いするなんて、偶然ですね？"
1300009-9 = "[s1] \"さっきまで一日中こき使ったよね！？\"\n[s2] \"呼ばれて来たんだから、偶然じゃないでしょ。\""
1300009-10 = "ふふ、細かいことを気にしてはいけませんよ。"
1300009-11 = "ふふ、細かいことを気にしてはいけませんよ。"
1300009-12 = "おっしゃる通り、この出会いは偶然ではありません。"
1300009-13 = "運命です。"
1300009-14 = "……。"
1300009-15 = "ふふっ、そんなに戸惑わないでください。"
1300009-16 = "ちょうど今……今回、私の任務を手伝ってくださったお返しのご用意ができましたので、参りましょうか？"
1300009-20 = "とある家"
1300009-25 = "ふふ、思ってたより綺麗ですね。"
1300009-26 = "この家ですか？私が用意した家です。"
1300009-27 = "少しだけ、こちらの部屋でお待ちください。"
1300009-28 = "絶対です。私がお呼びするまで、絶対に出てはいけませんよ？"
1300009-29 = "あ、お手伝いしていただいたばかりで、お疲れですよね。少し横になっていただいても構いません。"
1300009-31 = "……。"
1300009-34 = "ご主人様。"
1300009-35 = "ご主人様、起きてください。"
1300009-38 = "[ns3] 起きて、外に出てみる。\n[ns4] もう少し寝る……。"
1300009-40 = "……。"
1300009-41 = "（ガサッ……）"
1300009-42 = "……？"
1300009-43 = "（いい香りがする）"
1300009-44 = "……。"
1300009-45 = "（ガサガサッ……）"
1300009-46 = "……？"
1300009-47 = "（いい香りがする）"
1300009-48 = "（スッ）"
1300009-50 = "お目覚めになりましたか。"
1300009-51 = "ふふっ。本当にお眠りになるなんて、お疲れだったのですね。"
1300009-52 = "さあ、では始めましょうか？メイドとご主人様の、典型的ながらも、最高のお時間を。"
1300009-55 = "― あら。[wa:1000]おかえりなさいませ。"
1300009-57 = "― 今日一日、[wa:1200]いかがでしたか？"
1300009-60 = "― あ、[wa:1000]ご主人様。[wa:1500]ちょうど[wa:1000]最高級の茶葉が入りましたよ。"
1300009-62 = "― 私の方で一杯、[wa:1500]ご用意いたしましょうか？"
1300009-65 = "― はい？[wa:1500]ここは、[wa:1000]私たちのお家ではないですって？"
1300009-68 = "― ふふっ。[wa:1500]気にしません。[wa:2000]私たちのお家ではなくても、"
1300009-70 = "― 私たちは今、一緒にいるのですから。"
1300009-73 = "ふふっ、私がご用意したプレゼント、お気に召されましたか？こういうの、憧れていたんです。"
1300009-74 = "C&Cのアカネ。これからも誠心誠意で、ご奉仕いたします。"
