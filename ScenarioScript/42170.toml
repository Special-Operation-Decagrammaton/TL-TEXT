[translation]
42170-1 = "Episódio 17; Vestes Bordadas na Noite"
42170-2 = "Parque dos Coelhinhos"
42170-6 = "（Na manhã seguinte, enquanto limpava as instalações deixadas pelo Esquadrão RABBIT...）"
42170-11 = "Revirar os pertences de uma aluna que não está presente..."
42170-12 = "Como esperado, o professor [USERNAME] é um adulto suspeito."
42170-19 = "[ns] \"Bem-vinda de volta, Miyako.\""
42170-20 = "Sim, estou de volta—"
42170-25 = "—Não. RABBIT 1, retornando ao Acampamento RABBIT."
42170-26 = "[s] \"As outras não estão com você?\""
42170-30 = "Eu não consegui... falar com as outras."
42170-31 = "Mesmo tendo abandonado meu papel como líder do esquadrão por conta própria, pedir para que elas abandonem a paz que finalmente conquistaram para voltar ao acampamento é algo que... sinto muito em pedir."
42170-32 = "......Elas certamente conseguirão encontrar suas próprias convicções, mesmo sem a ajuda do professor."
42170-33 = "—Antes disso."
42170-34 = "Tenho um assunto importante para discutir com o professor."
42170-36 = "（...Ouvi de Miyako sobre o Conselho Estudantil Geral e o Esquadrão FOX）"
42170-39 = "[ns1] \"Uma bomba no subsolo da estação...?\"\n[ns2] \"...Isso não é terrorismo!?\""
42170-42 = "Shiu, professor. Fale mais baixo."
42170-43 = "Esta é uma operação ultrassecreta que apenas alguns membros do Conselho Estudantil Geral conhecem. #nSe esse fato se espalhar entre os cidadãos, causará um grande caos."
42170-44 = "[ns] \"Desculpe, é que fiquei surpreso com a gravidade da situação...\""
42170-46 = "[ns] \"Que tipo de bomba é essa tal de termobárica?\""
42170-47 = "A bomba termobárica é um artefato especial desenvolvido para atacar trincheiras e bunkers que são difíceis de conquistar com armas de fogo convencionais."
42170-48 = "Após o impacto, ela queima todo o oxigênio dentro do raio da explosão, gerando chamas poderosas e ondas de choque."
42170-49 = "Embora a bomba termobárica seja eficaz mesmo se usada na superfície... ela possui a característica de vaporizar ao longo da nuvem de névoa dispersa em espaços fechados, por isso é mais eficaz em subsolos ou cavernas."
42170-50 = "Não apenas todos os combatentes dentro do raio efetivo serão atingidos pela explosão, como a onda de choque fará com que os edifícios da região desmoronem sem deixar vestígios."
42170-51 = "Se o que foi anunciado no projeto <A.N.T.I.O.C.H.> for verdade—o alcance do dano será de tudo dentro de um raio de 5km, incluindo a Cidade dos Coelhinhos."
42170-52 = "[s] \"Por que usar uma bomba dessas...?\""
42170-53 = "......Provavelmente para incutir medo."
42170-56 = "A veterana Yukino disse que era pela restauração da Academia Especial SRT... #nmas esta operação não passa de uma demonstração de força do Conselho Estudantil Geral."
42170-57 = "Se a nova presidente interina do Conselho Estudantil Geral mostrar que usa armas poderosas sem hesitação, #nas facções insatisfeitas com suas políticas não poderão se rebelar facilmente."
42170-59 = "......Independentemente do objetivo, se esta operação for executada, não haverá como voltar atrás."
42170-60 = "Por isso, eu—antes que as veteranas não possam mais retornar, #npretendo impedir esta operação."
42170-61 = "Assim como as veteranas abriram o caminho para nós—#neu quero proteger o caminho de volta delas. Para que possam retornar a qualquer momento."
42170-62 = "Mas não tenho muita confiança em como começar, ou em estratégias e ações concretas..."
42170-63 = "......Por isso, gostaria de pedir a sabedoria do professor."
42170-67 = "[ns] \"Existe alguma forma de parar a detonação?\""
42170-68 = "A ogiva pesa quase uma tonelada, então não podemos transportá-la diretamente. #nA menos que mobilizemos máquinas pesadas, será difícil capturá-la."
42170-69 = "A Kaiser Security, que está guardando a estação, não permitiria a aproximação de máquinas pesadas..."
42170-70 = "Mas... no pior dos casos, talvez possamos detonar a ogiva antes que o transporte seja concluído."
42170-71 = "Para parar a detonação antes que percebam, #né necessário que várias pessoas se aproximem da ogiva e removam o detonador."
42170-72 = "[s] \"Várias pessoas, é...\""
42170-74 = "[ns] \"Então, só forças especiais podem parar forças especiais, não é?\""
42170-75 = "......SRT contra SRT, é isso."
42170-76 = "Como o Esquadrão FOX está encarregado, eu estava preparada para uma guerra especial, mas..."
42170-77 = "Eu, que não tenho armas, experiência—nem mesmo a capacidade física necessária... #nserá que realmente conseguirei vencer?"
42170-78 = "[s3] \"Se a Miyako acredita nisso.\"\n[s4] \"Com certeza você consegue.\""
42170-83 = "......É verdade."
42170-84 = "Se eu não acreditar em mim mesma, não poderei convencer ninguém."
42170-85 = "—Agora, eu acredito em mim mesma."
42170-86 = "—RABBIT 1, iniciando a operação!"
42170-88 = "Estação dos Coelhinhos"
42170-97 = "Aqui é RABBIT 1. Horário atual, 1030. Acabamos de chegar ao local da operação."
42170-98 = "Eu já esperava por isso até certo ponto, mas... a vigilância está bem rigorosa."
42170-102 = "Há 6 guardas protegendo a entrada principal. #nComo deve haver pelo menos dois grupos patrulhando os arredores da estação..."
42170-103 = "Parece difícil nos infiltrarmos sem sermos notados pelos guardas."
42170-104 = "[s] \"Que tal um ataque frontal?\""
42170-105 = "Até três pessoas, acho que conseguiríamos neutralizar simultaneamente, mas..."
42170-106 = "Se passar disso, há o risco de os inimigos chamarem reforços."
42170-107 = "...Nessas horas, se as integrantes do esquadrão estivessem aqui."
42170-108 = "Poderíamos fazer uma operação de distração... Além delas, alguém..."
42170-112 = "...Ora, ora, vejam só."
42170-121 = "Dizem que o destino é um encontro inesperado... Hum. Que coincidência realmente estranha."
42170-122 = "[s] \"Você é...\""
42170-124 = "Houve um tempo em que eu era um buscador que perseguia a pobreza voluntária e praticava uma vida de não-ação e naturalidade..."
42170-125 = "Mas agora, como um membro exemplar da sociedade, sirvo à sociedade civil —"
42170-130 = "Um membro da sociedade — sou Descartes!"
42170-134 = "[ns5] \"Fico feliz em te ver de novo, Descartes.\"\n[ns6] \"...O que você está fazendo aqui?\""
42170-137 = "Você não consegue entender só de olhar para este uniforme?"
42170-138 = "Bem, parece que você viveu uma vida longe da disciplina... #nEu vou te ensinar especialmente."
42170-142 = "Eu entrei para a Kaiser Security e recebi vários treinamentos."
42170-143 = "Sobre como uma vida sem trabalhar, vivendo como um parasita da infraestrutura social, é miserável e imoral..."
42170-144 = "E sobre como a recompensa do trabalho obtida com o suor do rosto é algo sagrado...!"
42170-145 = "E assim — após concluir esses cursos, fui recontratado como segurança da Kaiser Security e, desta forma, contribuo para a manutenção da ordem pública!"
42170-147 = "Ah, entendo..."
42170-148 = "Interrogar pessoas suspeitas é o dever de um segurança! #nVocês, que estão espiando a estação nas sombras, são alvos de interrogatório!"
42170-152 = "Por mais que você seja um benfeitor a quem devo favores do passado, não posso negligenciar meu dever como membro da sociedade. Por favor, colabore...!"
42170-153 = "Bem, é que..."
42170-154 = "[s] \"Você não poderia fingir que não viu desta vez?\""
42170-155 = "Como é? Quer que eu finja que não vi?"
42170-156 = "Sensei, você pretende profanar o orgulho de mim, que trabalho como um segurança da Kaiser Security — um membro exemplar da sociedade!?"
42170-157 = "Eu tenho o dever de manter esta estação, onde meus camaradas da So-kaku-ko residem, segura e bela —"
42170-159 = "...A Kaiser Corporation está tentando destruir a Estação Coelhinho."
42170-164 = "O-o que você disse!?"
42170-165 = "Pode ser difícil de acreditar, mas na verdade..."
42170-167 = "(...Miyako explicou a situação brevemente)"
42170-170 = "...É uma informação que não merece confiança."
42170-171 = "Instalar bombas em uma estação usada por cidadãos apenas para exibir poderio militar... Qualquer pessoa com bom senso acharia impensável."
42170-172 = "Mas, considerando o que a Kaiser Corporation tem feito até agora, talvez não seja uma história tão absurda assim."
42170-173 = "Eu senti na pele o quão gananciosos eles são quando recebi o treinamento na Kaiser Security..."
42170-174 = "Prometeram que nos dariam um pudim por dia como lanche, mas..."
42170-175 = "Ontem, disseram que o estoque de pudim acabou e me deram konjac!"
42170-176 = "Ah, entendo..."
42170-178 = "...Mas eu aguentei até esse tipo de humilhação."
42170-179 = "Mesmo que houvesse algumas divergências, acredito que uma virtude que um membro da sociedade deve ter é não se importar com isso no trabalho...!"
42170-180 = "E ainda assim, os figurões do Conselho Estudantil Federal e da Kaiser Corporation vão explodir a Estação Coelhinho por desejos ainda maiores...?"
42170-181 = "Esta Estação Coelhinho, que é a base de vida dos moradores daqui e onde meus camaradas que não conseguiram emprego estão hospedados?"
42170-182 = "Eu não vou perdoar... esses burgueses!"
42170-183 = "— Deixe comigo. #nSe for para proteger a Estação Coelhinho e meus camaradas, colaborarei com o que for preciso!"
42170-185 = "Obrigada por entender, Descartes."
42170-186 = "Primeiro, como o número de inimigos é grande, eu gostaria que você fizesse uma distração para dispersar as forças deles..."
42170-187 = "Lutar não é um problema, mas... na verdade, quando fui preso, confiscaram todas as minhas armas..."
42170-188 = "A pistola que tenho agora também está com balas de festim..."
42170-189 = "Não há problema. #nTenho munição de sobra, vou lhe entregar."
42170-193 = "Ah, essa sensação de peso e frieza... que saudade."
42170-194 = "Eu já estava farto de tanto tempo sendo alvo de olhares de desprezo e de ver minha paciência se esgotar..."
42170-195 = "Obrigado, Miyako. #nEstá na hora de eu voltar a ser o líder da Shokakuko, Descartes!"
42170-197 = "Agora, só preciso causar uma confusão longe da entrada para desviar o olhar dos guardas..."
42170-206 = "Camaradas da Shokakuko! Assim que ouvirem esta transmissão, reúnam-se na Estação Coelhinho!"
42170-207 = "A Kaiser Corporation, esse bando de pirralhos gananciosos, está tentando profanar nosso solo sagrado!"
42170-208 = "...Ué? Líder, você não tinha parado com essa coisa de estudante ou sei lá o quê?"
42170-209 = "“Shokakuko”! #n“Sociedade para a Busca da Felicidade Certa sem a Necessidade de Possuir”, abreviado como “Shokakuko”!"
42170-213 = "Ejem... Eu não desisti de uma vida sem posses."
42170-214 = "Eu apenas estava tentando realizar um treinamento de infiltração para entender o que aqueles que possuem bens pensam e quais desejos eles nutrem!"
42170-215 = "E, como resultado, descobri que a Kaiser Corporation, que tenta se enraizar aqui, é um bando de pirralhos que perderam o juízo."
42170-216 = "A esses vulgares, cegos pela ganância e desprovidos de moral... #nvamos ensinar a “alegria de não possuir nada”!"
42170-217 = "Bem... não tenho nada melhor para fazer, então se me chamarem, eu vou."
42170-218 = "Se for para dar uma lição em pragas... pode deixar comigo."
42170-219 = "Então, avancem contra esse bando de pirralhos podres—"
42170-220 = "“Shokakuko”, atacar!"
42170-226 = "Ei, eu ia dar o sinal..."
42170-227 = "[s] \"Eles foram embora...\""
42170-228 = "...Já que as coisas chegaram a esse ponto, fazer uma distração será difícil, mas... #npor um tempo, eles vão desviar a atenção dos inimigos."
42170-229 = "Eu também vou lutar. Sensei, por favor, assuma o comando!"
