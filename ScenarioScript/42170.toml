[translation]#[Texto revisado, mas pode haver alterações como Censura.] Em aguardo de revisão de formatação de texto. - Filipe 11/06.
42170-1 = "Episódio 17;Caminhada Noturna em Sedas de Gala"
42170-2 = "Parque dos Coelhinhos"
42170-6 = "（Na manhã seguinte, eu estava de volta ao parque, embalando as coisas que o Esquadrão RABBIT deixou para trás……）"
42170-11 = "Invadir o acampamento de colegiais ausentes e futucar as tralhas pessoais delas……"
42170-12 = "As fofocas estavam certas. O Sensei da Schale é um adulto com hábitos bem questionáveis."
42170-19 = "[ns] \"Bem-vinda de volta, Miyako.\""
42170-20 = "Sim…… eu estou de volta――"
42170-25 = "――Não, correção. Operadora RABBIT 1 reassumindo posto no Acampamento RABBIT."
42170-26 = "[s] \"O resto do esquadrão não veio atrás de você?\""
42170-30 = "As outras…… eu não tive coragem de chamá-las para virem comigo."
42170-31 = "Fui eu quem abaixou a cabeça, entregou os pontos e arrastou todas elas pra dentro daquela bolha de conforto militar. Puxá-las de volta pra miséria da rua agora porque eu tive uma crise moral…… seria uma hipocrisia covarde da minha parte."
42170-32 = "……E eu confio que, mesmo sem as minhas ordens, elas são lobas que vão encontrar a própria verdade sozinhas."
42170-33 = "――Mas antes disso."
42170-34 = "O relógio tá correndo, Sensei. Precisamos falar de tática de guerra."
42170-36 = "（……Miyako me atualizou sobre o plano genocida do Conselho e da Esquadrão FOX.）"
42170-39 = "[ns1] \"Uma bomba de aniquilação em massa?! Debaixo de uma estação civil?!\"\n[ns2] \"……Mas isso…… isso é um ataque terrorista de Estado!!\""
42170-42 = "Shiii. Fale baixo, Sensei. As paredes têm ouvidos."
42170-43 = "Essa operação letal é coberta por sigilo absoluto de Nível Black no Conselho. Se a população vazar um pio sobre a detonação da bomba, a cidade inteira será engolida por uma onda de pânico sem precedentes."
42170-44 = "[ns] \"Foi mal…… a crueldade da ideia fritou o meu cérebro por um segundo……\""
42170-46 = "[ns] \"Essa tal ogiva \"Termobárica\"…… o que exatamente ela faz?\""
42170-47 = "Munições Termobáricas são armas do juízo final desenhadas primariamente para destruir bunkers e trincheiras subterrâneas indestrutíveis que armas convencionais não conseguem arranhar."
42170-48 = "No milissegundo do impacto, a ogiva detona o núcleo e suga praticamente todo o oxigênio do raio de explosão num instante, gerando um inferno de chamas hiperbáricas contínuas e uma onda de choque de pressão avassaladora."
42170-49 = "Se soltar uma dessas na superfície já pulveriza quarteirões inteiros…… o efeito de detonação em um túnel fechado de metrô é aterrorizante. A nuvem de aerossol inflamável viaja pelos dutos antes de queimar, amplificando o poder do choque em milhares de vezes em ambiente confinado."
42170-50 = "A asfixia e a cremação no epicentro matam todos os alvos biológicos de imediato…… e o coice da onda de choque fará com que toda a infraestrutura civil e os prédios acima do túnel entrem em colapso e engulam a cidade em escombros."
42170-51 = "Se a massa nuclear dos projetos <A.N.T.I.O.C.H.> bater com as contas teóricas―― O epicentro vai devorar a Estação dos Coelhinhos inteira e incinerar um raio absoluto de cinco quilômetros do mapa."
42170-52 = "[s] \"Mas por que…… por que explodir a própria cidade……?\""
42170-53 = "……Semeio de Terror. Controle pelo medo."
42170-56 = "A Veterana Yukino vomitou pra mim que o genocídio civil servirá de alicerce cimentado em sangue para justificar a \"importância tática\" da volta da Academia SRT……#nMas isso é ilusão. Esse banho de sangue é só um show pirotécnico pra Presidente Interina ameaçar Kivotos."
42170-57 = "Quando a sociedade ver a Nova Presidente acender a fogueira e obliterar um bairro sem pestanejar…… o terror nascerá. Os políticos opositores e a população baixarão a crista e ajoelharão por puro medo de serem o próximo alvo."
42170-59 = "……Independente das fábulas ou dos motivos que elas tenham, se a ogiva tocar o núcleo e a centelha bater, o massacre será irreversível."
42170-60 = "É por isso que eu estou aqui. ――Antes que minhas veteranas escorreguem pro abismo negro sem volta,#neu vou arrebentar os portões, infiltrar a operação e neutralizar a ogiva termobárica."
42170-61 = "Quando eu era caloura, elas forjaram com as próprias mãos a estrada que eu sigo hoje――#nAgora é a minha vez de defender a retaguarda delas. Eu vou impedir que a alma da FOX seja manchada com o sangue dos inocentes, e deixarei o caminho livre para elas voltarem para a luz."
42170-62 = "A motivação eu tenho…… mas sendo realista…… a minha experiência em desativar armas do juízo final ou montar um plano de infiltração solitária beira o zero……"
42170-63 = "……É por isso que as mãos e o cérebro tático do senhor são indispensáveis agora, Sensei."
42170-67 = "[ns] \"Como a gente interrompe a ignição do núcleo?\""
42170-68 = "O torpedo e a carcaça da ogiva pesam quase uma tonelada de puro aço balístico. Arrastar a bomba no braço e roubar do silo é impossível sem um guindaste militar.#nE o pátio está forrado de mercenários…… roubar maquinário não é uma opção furtiva."
42170-69 = "Os seguranças da Kaiser fuzilariam qualquer operador de empilhadeira num piscar de olhos……"
42170-70 = "Sendo assim…… nós teremos que jogar xadrez contra o relógio. O desarme deve acontecer enquanto a bomba ainda estiver sendo transferida do vagão de carga para o abismo do silo."
42170-71 = "E para anular a Ogiva <A.N.T.I.O.C.H.> sem acionar as contra-medidas, a doutrina pede uma incursão sincronizada: #nUma equipe invade o perímetro, flanqueia os operadores e neutraliza os detonadores primários no núcleo."
42170-72 = "[s] \"\"Uma equipe\" inteira, hein……\""
42170-74 = "[ns] \"Só uma Força Especial letal consegue impedir outra Força Especial letal.\""
42170-75 = "……Sangue de SRT contra sangue de SRT. Esse é o campo de batalha."
42170-76 = "Quando deduzi que a segurança do pacote estava sob a jurisdição do [ruby=Esquadrão FOX]das minhas veteranas[/ruby], eu preparei a minha alma para o inferno do combate assimétrico……"
42170-77 = "Eu não tenho o poder de fogo delas. Não tenho a frieza letal e nem os músculos que elas têm……#nSerá que eu, uma cadete falha, consigo desbancar os monstros que me ensinaram a atirar?"
42170-78 = "[s3] \"Se a Operadora RABBIT 1 engatilhar a arma e acreditar que o tiro vai ser fatal.\"\n[s4] \"Então eu juro que você vai derrubar as quatro, Miyako.\""
42170-83 = "……É isso."
42170-84 = "A hesitação é o primeiro passo pro caixão. Se a ponta da lança tremer, os aliados perdem a fé."
42170-85 = "――O dedo no gatilho é meu, e a convicção é de aço."
42170-86 = "――RABBIT 1. Dando início à incursão tática letal!"
42170-88 = "Estação dos Coelhinhos"
42170-97 = "Aqui é RABBIT 1. Horário: 10:30. Infiltração silenciosa na zona de cerco do alvo confirmada."
42170-98 = "Eu já desenhava que o formigueiro estaria forrado de chumbo, mas…… a densidade de sentinelas cobrindo o asfalto é sufocante."
42170-102 = "Temos um grupo de seis fuzileiros bloqueando a garganta da entrada principal.#nAlém disso, notei duas patrulhas itinerantes de suporte rondando o alambrado lateral……"
42170-103 = "Rastejar pra dentro pela porta da frente sem soar o alarme geral de intruso beira o impossível tático."
42170-104 = "[s] \"E se a gente abrir caminho fuzilando todo mundo de frente?\""
42170-105 = "Se a barreira fosse de até três fuzileiros simultâneos, eu matava o ângulo, cegava os flancos e suprimia com tiro rápido……"
42170-106 = "Mas com seis sentinelas agrupados, o fogo cruzado deles é superior.#nE o pior de tudo: se o disparo for ouvido, as patrulhas acionam o rádio e inundam o pátio com reforços da Kaiser."
42170-107 = "……Nessas horas de fogo pesado, a ausência de uma unidade de supressão e atiradores faz muita falta."
42170-108 = "Se eu tivesse uma bucha de canhão barulhenta para chamar o fogo pra longe da porta, a infiltração fluiria…… Mas quem é que eu posso usar como isca agora……"
42170-112 = "……Ora, ora, os Deuses do Destino tramaram um encontro espetacular!"
42170-121 = "No xadrez kármico da vida…… Humpf. Acho que cruzar as nossas almas neste beco sujo é a ironia poética perfeita do universo, não acham?"
42170-122 = "[s] \"E você é……?\""
42170-124 = "Eu já fui um mestre espiritual. Um monge que buscou a pureza através da Fome, pregando as maravilhas da Vida Sem Consumo e sem Salário……"
42170-125 = "Mas a iluminação mudou de lado! Hoje eu sou a peça produtiva do sistema! Eu sou o martelo da Justiça que esmaga os parasitas em nome da Sociedade de Bem!"
42170-130 = "――Contemplem o Trabalhador Assalariado, Descartes!"
42170-134 = "[ns5] \"Que maravilha que a sua vida deu uma guinada pra melhor, Descartes!\"\n[ns6] \"……Mas o que te traz a essa praça de guerra?\""
42170-137 = "A senhora é cega por acaso? A minha farda tática reluzente não entrega a resposta óbvia?"
42170-138 = "Bem, vindo de uma delinquente armada que sobrevive quebrando as leis e correndo solta na anarquia…… não me espanta essa sua ignorância de normas.#nVou desenhar para o seu intelecto limitado."
42170-142 = "O chicote da Kaiser Security bateu nas minhas costas e moldou o meu caráter inútil! Eu passei pelo campo de reeducação corporativa!"
42170-143 = "Lá, eu descobri que ser um indigente romântico e sugar infraestrutura pública sem dar lucro ao Estado é o maior dos pecados e a ruína da civilização limpa……"
42170-144 = "E eles pregaram no meu crânio o êxtase celestial que é vender o próprio sangue e a própria espinha dorsal em troca do sagrado Contra-Cheque!"
42170-145 = "Graças a essa lavagem cereb…… err, digo, \"iluminação\", eu fui recrutado e forjado como Cão de Guarda Oficial da Kaiser Security! E hoje eu dedico o meu fuzil a caçar mendigos e manter a Estação intocável!"
42170-147 = "O-Oh, uau…… parabéns pela recuperação…… eu acho."
42170-148 = "Fiscalizar ratos imundos rondando os becos é o dever sagrado do Segurança!!#nA senhora espiando a base de rapina pelos arbustos é uma infratora potencial! Pare para inspeção!!"
42170-152 = "Mesmo a senhora tendo estendido a mão para mim na época da indigência cega, o peso do meu Crachá Corporativo me proíbe de abrir a porta da corrupção!! Não vou aliviar pra ti!"
42170-153 = "Ahm…… olha, o buraco é mais fundo……"
42170-154 = "[s] \"Você não pode fingir que virou a cara por cinco minutos e não nos viu?\""
42170-155 = "Hiiih?! Fingir amnésia e prevaricar no meu turno de trabalho?!"
42170-156 = "O senhor tá sugerindo que eu, um Mercenário da Kaiser, prostitua a minha dignidade de membro honesto do sistema capitalista e suje a farda com propina moral?!"
42170-157 = "O sangue sagrado da Irmandade FeliSem corre na Estação dos Coelhinhos! Eu tenho a missão divina de varrer qualquer ameaça a essa praça……!"
42170-159 = "……É exatamente por isso. A Kaiser Corporation vai transformar a Estação dos Coelhinhos em uma cratera de escombros em chamas."
42170-164 = "C-COMO É QUE É?! DO QUE CÊ TÁ FALANDO?!"
42170-165 = "Eu sei que parece filme de terror genérico, mas a brutalidade da verdade é a seguinte……"
42170-167 = "（……Miyako relatou o roteiro sangrento do plano da Bomba A.N.T.I.O.C.H. para ele num tom cirúrgico e letal.）"
42170-170 = "……A probabilidade desse roteiro apocalíptico ser real é baixíssima."
42170-171 = "Plantarem um artefato do juízo final num centro urbano apenas para \"inflar o próprio ego\" e gerar medo barato…… Mentes corporativas sãs nunca assinariam um cheque suicida desses."
42170-172 = "Embora…… julgando pelo rastro de carnificina, propina e esgoto corporativo que a Kaiser semeou nos últimos anos…… a loucura genocida não seja exatamente alienígena no manual deles."
42170-173 = "Eu mesmo senti na pele o veneno e a crueldade sanguinária dessa empresa maldita durante os meus dias no Campo de Concentr…… quer dizer, Treinamento da Security……"
42170-174 = "Os bastardos dos meus generais apertaram a minha mão e juraram diante de Deus que, se fôssemos recrutas submissos, ganharíamos UM PUDIM NOBRE POR DIA na marmita……"
42170-175 = "Mas na noite de ontem…… OS CANALHAS DISSERAM QUE FALTAVA ESTOQUE E ME SERVIRAM UM BLOCO NOJENTO DE GELEIA DE KONJAC NO LUGAR DA SOBREMESA!!"
42170-176 = "E-Entendo a sua fúria nutricional……"
42170-178 = "……Mesmo engolindo e mastigando a humilhação do konjac com lágrimas, eu me curvei e silenciei!"
42170-179 = "No mercado de trabalho violento, você engole sapo, limpa a bota do chefe e não quebra a hierarquia. Foi essa a ética estoica do proletariado que eu jurei seguir!!"
42170-180 = "Mas ouvir que os engravatados intocáveis do Conselho e da Kaiser vão afundar uma estação inteira no inferno termobárico pra saciar o próprio tesão de poder……?"
42170-181 = "A mesma estação de concreto onde os irmãos indigentes de rua dormem no chão duro porque a sociedade os chutou pro escanteio?!"
42170-182 = "ESCORIA BURGUESA MALDITA!! IMPERDOÁVEL!!"
42170-183 = "――Eu sou a espada da rebelião!#nPra defender a honra dos sem-teto e salvar a estação, eu boto fogo no meu crachá! Diga o que você precisa que eu faça!"
42170-185 = "Sua fúria de classe é música pros meus ouvidos táticos, Descartes."
42170-186 = "O bloqueio na porta principal é pesado demais pro meu fuzil passar limpo. Eu preciso de uma isca que atraia o enxame de seguranças para os flancos opostos da praça."
42170-187 = "Sem problema, quebrar a cara de mercenários é a minha praia! O único entrave tático é…… quando eles me sequestraram no campo, os vermes confiscaram todo o meu arsenal balístico……"
42170-188 = "Esse revólver que os porcos me deram no turno só tem bala de festim barulhenta e de festim pra cego assustar trombadinha……"
42170-189 = "Isso não é um entrave. Nós preenchemos lacunas logísticas.#nPegue essas caixas de chumbo pesado. Tem bala suficiente pra fazer a praça virar queijo suíço."
42170-193 = "Ohhh, sinta só a poesia e a frieza do peso metálico dessa arma no punho……"
42170-194 = "Odeio essa roupa social apertada e os olhares fuzilantes dos burgueses me chamando de lixo. A vida de cão não serve pro meu ego."
42170-195 = "Agradeço o arsenal, Miyako.#nA partir do som do tambor girando, o capacho assalariado morre…… e o Glorioso Descartes, o Messias da Irmandade FeliSem renasce no asfalto!!"
42170-197 = "A gente só precisa que você jogue pedras e atire pro alto numa guarita bem distante do saguão. Desvie o faro deles pra longe……"
42170-206 = "Atenção, Irmandade Sublime do FeliSem! Todos os maltrapilhos da rádio clandestina, levantem as bundas do esgoto e marchem armados para o pátio da Estação!"
42170-207 = "A corporação imunda de urubus famintos, conhecida como Kaiser, ousa lançar bombas contra o chão sagrado onde a gente defeca e dorme!"
42170-208 = "……Ué? Chefe, você não tinha metido a farda e virado trabalhador honesto……?"
42170-209 = "SILÊNCIO SOBRE A MINHA VIDA PESSOAL!!#nO foco é a FeliSem, \"A Busca Pela Felicidade no Nada\"!!"
42170-213 = "Cof, cof…… Eu não vendi os meus ideais de mendigo ao dinheiro sujo……"
42170-214 = "Eu me enfiei nas tripas venenosas do Inimigo Capitalista pra sugar as intenções da Elite Burguesa e mapear as fraquezas da fera em uma infiltração espiã suicida!"
42170-215 = "E os meus relatórios de esgoto confirmaram o terror: a Kaiser não passa de um ninho de urubus sádicos querendo esmagar a espinha dorsal de quem não tem teto."
42170-216 = "É hora do troco sangrento. Vamos enfiar chumbo grosso nas pernas dos idiotas materialistas……#nE afogar os engravatados no êxtase doloroso de não possuir \"Absolutamente Nada\"!!"
42170-217 = "Ahhh, que canseira…… Mas deitar no papelão já tava dando calo.#nBora levantar e atirar numas fardas caras."
42170-218 = "O sangue da burguesia vai escorrer no ralo…… e o meu fuzil tá com fome."
42170-219 = "Sinfonia macabra nos canos de fuzil, meus fiéis ratos! Apontem as baionetas contra o Império Kaiser e gritem o caos!!"
42170-220 = "FELISEM, ATAQUE SUICIDA TOTAL NO PORTÃO LESTEEEE!!"
42170-226 = "Hã…… espera, Descartes, você devia atacar pelo sul e eu ia dar um s--"
42170-227 = "[s] \"E lá vai o herói anarquista fazer poeira voar……\""
42170-228 = "……A insurreição prematura e o caos dele ferraram a tática da isca friamente calculada……#nMas o barulho ensurdecedor ali na frente já tá engolindo a atenção da tropa toda."
42170-229 = "O meu silenciador e as minhas balas não podem hesitar agora. Assuma a comunicação e a visão periférica, Sensei!"