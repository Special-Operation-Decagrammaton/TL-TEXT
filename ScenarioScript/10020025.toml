[translation]
10020025-5 = "O "Motor Dimensional" da Área 2 foi destruído!!"
10020025-11 = "A-a Shiroko-san está tentando fugir de novo!"
10020025-28 = "Espere!!"
10020025-29 = "Shiroko-chan!!"
10020025-35 = "Ah..."
10020025-42 = "Aaah...!? E-ela escapou de novo..."
10020025-48 = "Será que vamos ficar repetindo isso para sempre...?"
10020025-49 = "Será que é possível mesmo detê-la...?"
10020025-51 = "..."
10020025-52 = "Não... tem algo diferente."
10020025-53 = "...Eh?"
10020025-54 = "Aquela garota... aquela Shiroko-chan, parece que está nos evitando."
10020025-55 = "N-nos evitando...?"
10020025-56 = "Tive essa impressão. #nComo se ela tivesse medo de encarar a gente..."
10020025-57 = "..."
10020025-59 = "P-por que...!? #nNão tem motivo nenhum para ter medo!"
10020025-60 = "..."
10020025-68 = "Confirmo a destruição do "Motor Dimensional" da Área 2."
10020025-69 = "Com isso, garantimos duas das quatro áreas. #nJá temos metade sob nosso controle."
10020025-70 = "...Se ocuparmos mais uma, teremos uma chance de vitória."
10020025-72 = "É verdade... já que garantimos metade das funções de processamento da Arca, vamos ser um pouco mais agressivos."
10020025-73 = "A partir de agora, vamos rastrear a localização da Shiroko-san."
10020025-74 = "Se queremos capturar alguém que corre livremente por aí... #nprecisamos colocar uma coleira nela para rastreá-la a qualquer momento♪"
10020025-75 = "Vou hackear o sistema central da Arca e vasculhar os sistemas de defesa, alarmes e redes de comunicação internos."
10020025-76 = "Se houver algum progresso, eu aviso."
10020025-77 = "...Sim, conto com você."
10020025-78 = "Então, Sensei, vamos passar para a próxima etapa."
10020025-79 = "Invasão à Área 3 da "Arca de Atra-Hasis" — #ncontinue nos dando as ordens!"
10020025-81 = "Bem, é isso. #nDe agora em diante, nós também vamos ajudar, Sensei."
10020025-82 = "Sim! Como conseguimos ocupar duas áreas, o lado da defesa ficou mais folgado."
10020025-83 = "Deixamos a defesa da nave com o Clube de Desenvolvimento de Jogos e o pessoal do Clube de Pesquisa Gastronômica, e decidimos ir com você, Sensei."
10020025-85 = "Isso mesmo! Vamos encontrar a Shiroko-senpai e capturá-la!"
10020025-86 = "Isso aí! Operação de captura iniciada~♧"
