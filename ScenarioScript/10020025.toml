[translation]
10020025-5 = "第2エリアの「次元エンジン」、破壊しました！！"
10020025-11 = "し、シロコさんがまた逃げようとしています！"
10020025-28 = "待って！！"
10020025-29 = "シロコちゃん！！"
10020025-35 = "っ……。"
10020025-42 = "ああっ……！？ま、また、逃げられました……。"
10020025-48 = "ずっと、これを繰り返すのでしょうか……。"
10020025-49 = "アレを引き留めることなんてできるの……？"
10020025-51 = "……。"
10020025-52 = "いや……何か、違う。 "
10020025-53 = "……え？ "
10020025-54 = "あの子……あのシロコちゃんは、私たちを避けているように見える。"
10020025-55 = "わ、私たちを……ですか？ "
10020025-56 = "そんな感じがしたの。#n私たちと向き合うのを、どこか恐れているような……"
10020025-57 = "……。"
10020025-59 = "な、なんで……！？#n怖がる必要なんてないじゃない！"
10020025-60 = "……。"
10020025-68 = "第2エリアの「次元エンジン」破壊を確認したよ。"
10020025-69 = "これで4つのうちの2つのエリアを確保できた。#n半分はこっちのものになったね。"
10020025-70 = "……あと1つ占領できれば、勝機はある。"
10020025-72 = "そうですね……箱舟の演算機能を半分確保できた事ですし――#n少し、積極的にいってみましょうか。"
10020025-73 = "これより――シロコさんの位置を追跡します。"
10020025-74 = "自由に走り回る彼女を捕らえるのでしたら……#nいつでも追跡できるよう、リードをつけておかなくては♪"
10020025-75 = "箱舟の中枢システムをハッキング――内部に存在する防御システム及び警報装置、通信網を漁ってみる事としましょう。"
10020025-76 = "何か進捗がありましたら、声を掛けますね。 "
10020025-77 = "……はい、よろしくお願いします。"
10020025-78 = "では先生、私たちは次の段階に移りましょう。 "
10020025-79 = "「アトラ・ハシースの箱舟」第3エリアへ突入――#n引き続き、指揮をお願いします！"
10020025-81 = "ま、そういうことだから。#nこれからは私たちも手伝うよ、先生。"
10020025-82 = "はい！エリアを2つ占領できたので、防衛側も余裕ができたんです。"
10020025-83 = "船の防衛は、ゲーム開発部と美食研究会のみなさんにお任せして、私たちは先生と共に行くことになりました。"
10020025-85 = "そうよ！シロコ先輩を探して、捕まえてやるんだから！"
10020025-86 = "うんうん！捕獲作戦スタートです～♧"
