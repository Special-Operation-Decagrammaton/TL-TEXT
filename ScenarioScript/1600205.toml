[translation]
1600205-1 = "A resposta correta é: o Sensei!"
1600205-2 = "Ah, você veio, Sensei! Eu estava esperando por você!"
1600205-3 = "O motivo de eu ter chamado o Sensei hoje é...!"
1600205-4 = "……(Olha em volta)"
1600205-5 = "……Ah."
1600205-6 = "……Falando nisso, como estamos em uma biblioteca, é melhor falarmos baixo. Caso contrário, incomodaremos as pessoas ao redor……"
1600205-7 = "A bibliotecária daqui é bem assustadora. Eu mesma já fui repreendida algumas vezes……"
1600205-8 = "Não, não é como se eu estivesse na lista negra……! Eu acho que não, sim, provavelmente."
1600205-9 = "Com certeza sou apenas uma \"pessoa de atenção\"…… Sempre me pedem para fazer silêncio."
1600205-10 = "……Hehehe."
1600205-11 = "B-bem, de qualquer forma, o que eu queria perguntar ao Sensei hoje é…… isto aqui!"
1600205-12 = "Sim, é um livro de psicologia."
1600205-13 = "Mas não é apenas um livro de psicologia. Tem autobiografias, revistas de fofoca e também……"
1600205-16 = "Na verdade, recebi uma \"pergunta\" de certa pessoa recentemente."
1600205-17 = "Como a maioria das pessoas costuma fugir de mim, é raro eu receber algo assim, então estou nervosa sobre como responder corretamente."
1600205-18 = "Eh, não parece? Não é verdade! Eu estou bem nervosa, acredite……!"
1600205-19 = "De qualquer forma, já que me fizeram a pergunta, quero explicar da forma mais perfeita e clara possível, mas……"
1600205-20 = "O conteúdo da pergunta é……"
1600205-22 = "“Eu mesma não entendo bem os meus sentimentos……”"
1600205-23 = "“O que é esse sentimento confuso? Será que a Kotori saberia me dizer?”"
1600205-26 = "……Foi essa a pergunta. Sinceramente, nem eu sei o que é o quê……"
1600205-27 = "Se fosse algo já esclarecido cientificamente, eu poderia explicar por horas, mas……"
1600205-28 = "Mas no dicionário da Kotori não existe a palavra \"não sei\", então acabei dizendo: \"Eu te explico na próxima vez que nos virmos!\""
1600205-29 = "Por isso, preciso entender de qualquer jeito antes de nos encontrarmos de novo! O que é esse \"sentimento confuso\" que ela mencionou!"
1600205-30 = "……Essa é a história resumida."
1600205-31 = "Ainda não entendi nada, estou perdida. Pesquisei e pesquisei, mas não cheguei a lugar nenhum, bati em uma parede e não consigo ver a resposta……"
1600205-32 = "Revirei vários materiais impressos, mas nenhum deles tem uma definição unificada, e na internet, então, nem se fala……"
1600205-33 = "Desse jeito, não vou conseguir nem organizar os dados."
1600205-34 = "O que você acha que devo fazer? Sensei, o que você faria em uma situação dessas?"
1600205-35 = "Não, na verdade, será que você, Sensei…… não saberia? O que é, afinal, esse \"sentimento confuso\"?"
1600205-36 = "[s1] \"Que tal verificar com o material mais próximo de você?\"\n[s2] \"Que tal consultar a referência mais fácil de entender?\""
1600205-37 = "S-se existisse algo assim, seria ótimo, mas onde exatamente……"
1600205-38 = "S-se existisse algo assim, seria ótimo, mas onde exatamente……"
1600205-39 = "……Eh?"
1600205-40 = "……Eu?"
1600205-41 = "Eh, o-o que você quer dizer com isso?"
1600205-42 = "Que tal começar olhando para si mesma……?"
1600205-43 = "M-mesmo que você diga isso…… o que exatamente isso significa……"
1600205-44 = "Porque eu não sou ela…… e ela e eu somos tipos bem diferentes……"
1600205-45 = "……Talvez eu tenha o mesmo sentimento? Hum, não sei bem, mas……"
1600205-46 = "Tente se lembrar bem da pessoa que fez a pergunta……? Isso eu consigo, mas por que……"
1600205-47 = "……Hum."
1600205-48 = "Não entendi muito bem, mas já que é um conselho do Sensei, vou pensar nisso mais uma vez."
1600205-49 = "Aquela pergunta…… a aparência dela…… a expressão……"
1600205-51 = "Hummm…… aquele gesto, quando eu faço esse tipo de coisa…… esse sentimento confuso……"
1600205-52 = "As vezes em que eu fiz essa expressão foram……"
1600205-53 = "Naquela hora, o que eu estava pensando…… hum, hummmm?"
1600205-54 = "Ah!"
1600205-55 = "S-será que…… entendi! Já sei!"
1600205-56 = "Isso é! É o mesmo que quando eu estou pensando no Sensei……"
1600205-57 = "……！！"
1600205-58 = "[s] \"……Kotori?\""
1600205-59 = "Ah, bem, hum, é que……."
1600205-60 = "……Bem, Sensei. Eu poderia ir ao banheiro……?"
1600205-61 = "Eu, eu volto logo!"
1600205-62 = "[s] \"……?\""
1600205-63 = "E, então!!"
1600205-65 = "(Kotori saiu correndo daquele jeito e, por algum motivo, não voltou mais)"
1600205-66 = "(Um tempo depois, recebi apenas uma mensagem dizendo: \"Graças a você, tudo foi resolvido, muito obrigada\")"
