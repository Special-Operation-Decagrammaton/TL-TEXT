[translation]
901010400310-7 = "Ah, olha só. Diz que são caranguejos pescados hoje de manhã."
901010400310-8 = "Já deu fome... que tal um caranguejo no almoço?"
901010400310-9 = "Hmm... prato de caranguejo é meio..."
901010400310-10 = "Por quê?"
901010400310-11 = "Oras, caranguejo tem que descascar, né?"
901010400310-12 = "Uma vez eu me machuquei fazendo isso..."
901010400310-13 = "Ah... e ficar catando a carne também é um saco."
901010400310-14 = "Então vamos de outra coisa no almoço."
901010400310-20 = "(Talvez eu consiga encontrar alguma pista do caso aqui.)"
901010400310-21 = "(Vou colher umas informações rapidinho.)"