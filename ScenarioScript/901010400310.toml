[translation]#[Texto Final. - Filipe 05/07.]
901010400310-7 = "Ah, olha. Dizem que são caranguejos pescados hoje de manhã."
901010400310-8 = "Já tô com fome…… que tal caranguejo no almoço?"
901010400310-9 = "Hmm…… caranguejo é complicado……"
901010400310-10 = "Por quê?"
901010400310-11 = "É que, cara, tem que descascar……"
901010400310-12 = "Uma vez eu me machuquei com isso……"
901010400310-13 = "Ah…… e é trabalhoso pra tirar a carne."
901010400310-14 = "Então vamos almoçar outra coisa."
901010400310-20 = "(Talvez eu consiga encontrar alguma pista do caso aqui)"
901010400310-21 = "(Vou tentar colher umas informações)"