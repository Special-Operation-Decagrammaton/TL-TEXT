[translation]
80000128-1 = "Um presente inesperado"
80000128-2 = "（Como sempre, enquanto eu trabalhava...）"
80000128-3 = "[ns] \"Estou exausto...\""
80000128-5 = "Professor, está aí?"
80000128-10 = "Ah, você está aí mesmo."
80000128-11 = "[s] \"Ah, Nozomi...\""
80000128-12 = "Pahyahya, você parece estar morrendo?"
80000128-13 = "Bem, eu já imaginava que seria algo assim."
80000128-14 = "Sendo assim..."
80000128-15 = "Toma, aqui."
80000128-20 = "Não é nada demais, mas dizem que ajuda a recuperar as energias."
80000128-21 = "Você provavelmente já ganhou chocolates, e imaginei que estivesse ocupado com o trabalho..."
80000128-22 = "Nesse caso, é mais fácil comer gomas, pahya!"
80000128-23 = "[ns] \"Nozomi...!\""
80000128-25 = "Uau, que cara é essa?"
80000128-26 = "Está escrito na sua cara que você está emocionado, né?"
80000128-27 = "Não é como se eu tivesse feito isso à mão, sabe?"
80000128-28 = "Pahya!#nO professor é surpreendentemente sensível a essas coisas."
80000128-29 = "Então, coma direitinho, tá?"
80000128-30 = "Eu só passei por aqui rapidinho, já vou indo."
80000128-31 = "Pensei em ficar um pouco mais para vadiar, mas você parece ocupado hoje também."
80000128-32 = "Hã? Posso ficar mais um pouco?"
80000128-36 = "O quê?#nEstá a fim de brincar comigo?"
80000128-37 = "[s] \"Trabalho eu posso fazer a qualquer hora!\""
80000128-38 = "Pahyahya! É assim que se fala!"
80000128-43 = "Muito bem, então..."
80000128-44 = "...do que vamos brincar?"
80000128-46 = "（Esqueci do trabalho e brinquei com a Nozomi com tudo o que tinha）"
80000128-47 = "（Depois disso, como agradecimento por aliviar o estresse, a Nozomi me ajudou com o trabalho até tarde）"
