[translation]
80000101-1 = "大事なもの"
80000101-2 = "（ミナから連絡をもらい、玄龍門に訪れた）"
80000101-3 = "……そこで考えた。私にとって、本当に大事なものとは何だろうか、と！"
80000101-4 = "サングラス？コート？二丁拳銃？#nもちろん、どれも大事だ。一つに絞れないくらいな！"
80000101-5 = "門主様はもちろん、それ以外にも面倒を見なければならない構成員も居る。#n執行部長として、管理しなければならない仕事も欠かせない。"
80000101-6 = "[s] \"……大事なものが多すぎて、選べなかったってこと？\""
80000101-7 = "ああ、まさに昨日はその結論に至った。#nだが、今日の私は一味違うぞ。"
80000101-8 = "数えきれないほどの葛藤を経て、ようやく答えを得たのだ！"
80000101-9 = "それが何なのか、先生も気になってきたのか？#nフッ、さすがは先生だ。"
80000101-10 = "答えは……"
80000101-11 = "これだ！"
80000101-15 = "[ns] \"これは……！？\""
80000101-16 = "私は考えた。"
80000101-17 = "考えて、考えに考えた末に出した結論。"
80000101-18 = "私にとって、本当に大事なもの。それは……"
80000101-19 = "玄龍門の全てだ！"
80000101-20 = "[s] \"……たしかに！\""
80000101-21 = "いかにも！そして今日は、世間でバレンタインデーと呼ばれている日！"
80000101-22 = "そんな記念すべき日に何もしないなど、義に反する！"
80000101-23 = "[s] （急に話が飛んだような……？）"
80000101-24 = "私は玄龍門の執行部長として！玄龍門を象徴するこの文様を、こうしてチョコレートの形にして先生に送ろうと思ったのだ！"
80000101-25 = "[s] \"えっと……うん。ありがとう、さっそく頂くね。\""
80000101-26 = "待て！"
80000101-27 = "何をするつもりだ？今、玄龍門の文様を真っ二つにしようとしなかったか！？"
80000101-28 = "[s] \"だって、割らないと食べられないし……\""
80000101-29 = "ダメだ！許さないぞ！少なくとも、私の目が黒いうちは許可できない！"
80000101-30 = "なら、どうやって食べればいいかって？#n……一口で食べるんだ！"
80000101-31 = "……チョコレートが大きすぎる？#nそ、それは……"
80000101-32 = "……。"
80000101-33 = "（困った、何も考えてなかった）"
80000101-34 = "とにかく！根性だ！気合いで口を大きく開けて、一口で食べるんだ！"
80000101-35 = "[s] \"さ、さすがにそれは……\""
80000101-36 = "ええい！貸してくれ、先生！"
80000101-37 = "こうなったら、私が……！"
80000101-38 = "……って、どう考えても無理じゃないか！"
80000101-39 = "[s] \"当たり前でしょ！？\""
80000101-40 = "いや、できる！#n山海経の伝統、そして義と侠があればどんな困難でも……！"
80000101-44 = "……あっ。"
80000101-45 = "[s] \"玄龍門の文様をしたチョコレートが……粉々に！\""
80000101-46 = "ど、どどど、どうしよう、先生！？"
80000101-47 = "他でもなく、玄龍門の執行部長であるこの私が、玄龍門の文様を傷つけたと知られたら……！"
80000101-48 = "ああああっ、申し訳ございません、門主様！故意ではありません！！#nも、もちろん故意ではないからと言って……！"
80000101-49 = "[s] \"落ち着いて、ミナ。とりあえず深呼吸をしようか。\""
80000101-50 = "わ、分かった。すぅ……はぁ……すぅ……はぁ。"
80000101-51 = "それで……私はどうすれば……"
80000101-52 = "[s1] \"まだ誰にも見られてないよね？\"\n[s2] \"だから、これを早く食べちゃえば私たちだけの秘密だよ。\""
80000101-55 = "！"
80000101-56 = "そうか……そういう方法があったか！"
80000101-57 = "さすがは先生だ！今日も助けられてしまったな！"
80000101-58 = "それじゃあ、さっそく……一緒にチョコレートを食べてしまおう！"
80000101-60 = "ふぅ……結構多かったな。"
80000101-61 = "[s] \"……お疲れ様、ミナ。\""
80000101-62 = "いや、苦労したのは先生も同じだ。"
80000101-63 = "とにかく、これでもう大丈夫そうだな。"
80000101-64 = "この功績を賞して、先生を玄龍門の名誉幹部に推薦しようと思うんだが、どうだろう？"
80000101-65 = "[s] \"……それは本当に大丈夫だから。\""
80000101-66 = "いや、先生。よく考えてみてほしい。#nこれはお互いにとって良いものじゃないか？"
80000101-67 = "玄龍門は先生という強力な味方を得る。#nそして先生は、玄龍門の名の下、いつ、どこでも……"
80000101-68 = "ん？本当に大丈夫だって？#nふむ……そうか、残念だ。"
80000101-69 = "ところで……何か忘れているような気がするんだが。"
80000101-70 = "バレンタインデー、チョコレート……チョコレート……#n何か大事な話があったような……"
80000101-72 = "（何かを思い出そうとするミナの気を逸らせ、なんとか話を切り上げた）"
