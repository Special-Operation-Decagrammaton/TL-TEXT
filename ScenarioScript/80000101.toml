[translation]
80000101-1 = "Algo importante"
80000101-2 = "（Recebi um contato da Mina e fui visitar o Genryumon）"
80000101-3 = "……Foi então que eu pensei. O que é que é realmente importante para mim?"
80000101-4 = "Meus óculos escuros? Meu sobretudo? Minhas pistolas duplas?#nClaro, tudo isso é importante. Não conseguiria escolher apenas uma coisa!"
80000101-5 = "Além da nossa líder, há outros membros de quem preciso cuidar.#nComo chefe da divisão de execução, o trabalho que preciso gerenciar também é indispensável."
80000101-6 = "[s] \"……Então você quer dizer que tem coisas importantes demais e não conseguiu escolher?\""
80000101-7 = "Ah, exatamente, cheguei a essa conclusão ontem.#nMas hoje, eu sou uma pessoa diferente."
80000101-8 = "Depois de incontáveis conflitos internos, finalmente encontrei a resposta!"
80000101-9 = "Você também ficou curioso para saber o que é, Sensei?#nHmph, como esperado do Sensei."
80000101-10 = "A resposta é……"
80000101-11 = "Isto aqui!"
80000101-15 = "[ns] \"Isso é……!?\""
80000101-16 = "Eu pensei."
80000101-17 = "Pensei, pensei e, depois de muito refletir, cheguei a uma conclusão."
80000101-18 = "O que é realmente importante para mim. É……"
80000101-19 = "Tudo o que compõe o Genryumon!"
80000101-20 = "[s] \"……Com certeza!\""
80000101-21 = "Exatamente! E hoje é o dia que todos chamam de Dia dos Namorados!"
80000101-22 = "Não fazer nada em um dia tão memorável seria contra a justiça!"
80000101-23 = "[s] （O assunto mudou de repente, não foi……?）"
80000101-24 = "Como chefe da divisão de execução do Genryumon, decidi transformar o emblema que simboliza o Genryumon em um chocolate para te dar, Sensei!"
80000101-25 = "[s] \"Bem…… entendi. Obrigado, vou comer agora mesmo.\""
80000101-26 = "Espere!"
80000101-27 = "O que você pretende fazer? Você não ia partir o emblema do Genryumon ao meio agora pouco!?"
80000101-28 = "[s] \"Mas, se eu não partir, não consigo comer……\""
80000101-29 = "Não pode! Eu não permito! Pelo menos, enquanto eu estiver viva, não vou deixar!"
80000101-30 = "Então, como você deveria comer, pergunta?#n……Coma de uma vez só!"
80000101-31 = "……O chocolate é grande demais?#nI-Isso é……"
80000101-32 = "……."
80000101-33 = "（Droga, não pensei nisso）"
80000101-34 = "De qualquer forma! Tenha determinação! Abra a boca bem grande e coma de uma vez só!"
80000101-35 = "[s] \"A-Aí já é demais……\""
80000101-36 = "Argh! Me dê isso aqui, Sensei!"
80000101-37 = "Já que chegou a esse ponto, eu mesma vou……!"
80000101-38 = "……Espera, não importa como eu pense, isso é impossível!"
80000101-39 = "[s] \"É óbvio, não é!?\""
80000101-40 = "Não, é possível!#nCom a tradição de Shanhaijing, e com justiça e cavalheirismo, qualquer dificuldade pode ser superada……!"
80000101-44 = "……Ah."
80000101-45 = "[s] \"O chocolate com o emblema do Genryumon…… está em pedaços!\""
80000101-46 = "O-O-O que eu faço, Sensei!?"
80000101-47 = "Se souberem que eu, a chefe da divisão de execução do Genryumon, danifiquei o emblema do Genryumon……!"
80000101-48 = "Aaaah, me perdoe, Líder! Não foi de propósito!!#nB-Bem, só porque não foi de propósito, não significa que……!"
80000101-49 = "[s] \"Calma, Mina. Vamos respirar fundo primeiro.\""
80000101-50 = "T-Tudo bem. Inspira…… expira…… inspira…… expira."
80000101-51 = "E agora…… o que eu devo fazer……"
80000101-52 = "[s1] \"Ninguém viu ainda, certo?\"\n[s2] \"Então, se comermos isso logo, será um segredo só nosso.\""
80000101-55 = "!"
80000101-56 = "Entendi…… então era esse o método!"
80000101-57 = "Como esperado do Sensei! Você me salvou de novo!"
80000101-58 = "Então, vamos lá…… vamos comer o chocolate juntos!"
80000101-60 = "Ufa... Tinha bastante coisa, hein."
80000101-61 = "[s] \"...Bom trabalho, Mina.\""
80000101-62 = "Não, você também se esforçou bastante, Sensei."
80000101-63 = "De qualquer forma, parece que agora está tudo bem."
80000101-64 = "Para recompensar esse feito, estou pensando em recomendar o Sensei como membro honorário da Genryumon. O que acha?"
80000101-65 = "[s] \"...É melhor deixar isso de lado.\""
80000101-66 = "Não, Sensei. Pense bem. #nIsso não seria bom para ambos?"
80000101-67 = "A Genryumon ganharia um aliado poderoso como você. #nE o Sensei, sob o nome da Genryumon, poderia, a qualquer hora e em qualquer lugar..."
80000101-68 = "Hm? Você disse que é melhor deixar de lado? #nHumm... Entendo, que pena."
80000101-69 = "Aliás... Sinto que estou esquecendo de algo."
80000101-70 = "Dia dos Namorados, chocolate... chocolate... #nHavia algo importante sobre isso..."
80000101-72 = "(Distrai a Mina enquanto ela tenta se lembrar de algo e consegue encerrar o assunto)"
